body:
  text: 歴代名臣奏議卷六十三明楊士竒等撰治道宋理宗時右諌議大夫徐榮叟入對言自楮幣不通物價倍長而民始怨自米運多阻粒食孔艱而民益怨此見之京師者然也外而郡邑苛征横歛無所不有嚴刑峻罰靡所不施和糴則科抑以取贏軍需則並緣而規利逃亡强令代納蠲放忍至重催犯私販者不問多寡槩遭黥徒逋官課者不恤有無動輙監繋囹圄充斥率是干連詞訟追呼莫非枝蔓如此則民安得而不怨甚者富家巨室武斷鄉閭貴族豪宗侵牟民庶茹寃者不敢告負抑者不得伸怨氣薫蒸天示之應此亢陽之所以為沴也遷權禮部尚書著作佐郎髙斯得輪對曰臣猥以非才濫汙東觀每懼尸素無補秋毫兹幸登文石之陛以望清光敢輸毣毣之愚少殫忠報之分惟陛下幸垂聽焉臣嘗静思當世之故竊以為關乎宗社之存亡者不一而足陛下神明之慮既有所遺而二三大臣復皆視為故常莫有赤心血誠身任其責者是以大化雖更羣賢雖聚而天下之勢反日趨於危亡而不可救止也且今日關乎宗社之存亡者陛下亦知之乎姦邪有覆出之憂邉郵有必至之禍國計有將敗之虞三者其機已兆其形已成大臣分任其責汲汲以圖之猶懼弗濟而可漠然不以恫瘝其身乎權兇去位以来所締結者莫不壊散所排斥者莫不收用攻詆之疏多見施行朋比之儔悉就流竄戚里之與為姻婭者又奉詔而停昏上心若堅定國是若昭然士大夫皆舉手相賀曰自今其無反覆之憂矣臣竊以為未也何則内庭之耳目故在而外邪愈急於窺覘都城之巢穴未破而姦朋猶有於依據帷幄之臣邪正混淆固有覘顔候色援助小人如鄭居中之主蔡京諫憲之任忠佞錯糅固有柔邪深險黙伺時變如楊畏之主章厚在庭百執事出死力以排姦者百無二三希後福而中立者十盖八九甚至隂持異見以力沮草茅之公議陽附善類而甘為權孽之私人指目昭然有不可揜嗚呼國之多釁如此非宰相之責乎夫成周冢宰以正百官為職者也而王之六宫亦統焉今羣臣厖雜甚矣宰相所當别其淑慝為上一分明之至於宫禁衺黷貨外交人言籍籍豈可坐視而不之問顧乃幷包兼容之意多别邪辨正之慮淺憂讒避謗之心重直前邁往之志微遂使衆臣爭衡大權旁落養成積輕之勢以啟窺覦之漸是得為知其職分矣乎罅隙之不塗幾微之不察一切以虚心無我之道待詭譎變詐之人蹊術既熟羽翼既成不幸變故乗之上心一移凶渠立至使宗社有淪亡之憂衣冠遭魚肉之禍生靈罹塗炭之厄當是時也雖潔身以去其能逃萬世之清議乎故姦邪有覆出之憂宰相之責也數年以来敵攻雲南傳聞日駭荆蜀廣右所奏畧同天生斯人最能為兵批汴𢷬蜀咸襲其背則兵出竒道蓋其常能無足恠者廟堂之上雖尚致疑而宥府之臣蓋嘗論建今既任主兵之責矣則向之所陳固當力守而速圖之且其所謂命蜀帥撫結諸蠻邀截障蔽命廣帥選邑宜守控扼險阻者陛下亦既亟從其議矣今閱數月蜀之所撫結者何族廣之所控扼者亦何地招募戍卒孰任其事聮結峒丁孰尸其責遣使以訪境外之事終何所聞易師以任經理之寄果何所就夫古之大臣圖事揆䇿不為空言發慮出謀動有成效不以敵國緩急為作輟不以人言有無為勤怠今既以知軍戎萬里之情見推於天下矣及至謀人之國任人之事當存亡關繋之秋無始終負荷之志悠悠泛泛自同衆人陛下専屬之意固如是哉且臣近者聞諸上流閫幕以謂大理久已失守而朝論方在疑信之間可為痛哭幕府之言必有自来不識是說也帥閫嘗以白于廟堂否乎萬一有之而帥閫不以告二府不及知則亦誤陛下之任使矣夫以知兵之臣居本兵之地而又專任主兵之責疆事安危衆所交屬乃今勍敵謀我而不思所以待之危機將發而不圖所以救之一旦鐵騎長驅電發焱至江沱之間土傾瓦解任事之臣寧得不執其咎乎故敵有必至之禍主兵大臣之責也國家版圖日蹙財力日耗用度不給尤莫甚於邇年聞之主計之臣嵗入之數不過一萬二千餘萬而其所出乃至二萬五千餘萬蓋鑿空取辦者過半而後僅給一嵗之用問其取辦之術則亦不過増楮而已矣嗚呼造幣以立國不計其末流剥爛糜滅之害而茍焉以救目前之急是飲鴆以止渴也豈有為天下阽危者若是而上不驚者陛下愍國計之屈分命大臣顓領其事蓋將使之究本末源流而圖惟變通之術也固當㑹出入之大凡察盈虚之至理破茍且之弊習為經久之逺圖今也不惟理之無術而反耗之日甚大農經用廩廩不繼額外創給日以益多大兵之劵不詢之有司一日之間而頓増三十餘萬淮蜀制臣以科降為請則一捐亦各千數百萬其他凡所饋給視舊悉増夫軍旅之費誠不宜惜然不度其力不慮其終豈不甚乎且理財無他道亦曰去其蠧財者而已矣蠧財之大者莫若軍旅而宫掖次之今江淮荆蜀符籍半虚主帥務私資為囊槖根株盤結未有能窮其姦利而一清之者今主財之臣亦嘗以覈軍旅之實為請乎六宫横費浮滛百出羣奄羽化要索無藝嬖寵祈恩賜予日繁外庭不敢問有司不得計也今主財之臣亦嘗以省宫掖之用為請乎濫費之不節宿蠧之不除乃徒張官置吏日事紛更緣飾美觀隳紊體統使才名之士不容而嗜進之人得售國家用度日以不給蓋有如賈誼所謂大命將泛莫之振救者臣不知何以善其後乎故國計有將敗之虞主財大臣之責也夫姦邪能覆人之國勍敵能亡人之國而財用空竭猶之氣血凋耗亦足以斃人之國有一于此已可甚懼況三患交至而無人焉以任之可不為之寒心哉且是三者本皆宰相之所當總執政之所當與而非可以分任者亦既謀之不臧而分任爾矣則職分所在可得而辭其責乎雖然臣又竊有疑焉何則二三大臣責任雖不同而心不可以不同側聞廟堂之上同異浸彰道路傳言抑難深信然國論未固窺伺孔多纎芥一開何事不有目前百怪且將舞鰌鱔而號狐狸禍亂相尋往往出於衆人之所易宗社之憂又豈特去一位之姦而已哉故以人才言之執政當進其可進而不必望其為助宰相當用其可用而不必疑其植黨以政事言之宰相所當謀諸同列毋獨運以貽自用之譏執政所懐當告諸其長毋專達以取侵權之誚如同舟而期於濟如共車而主於行夫如是慶歴元祐之治雖未能以遽致紹聖元符之禍尚庶幾其可紓乎然而臣尚有說於此請得以終陳之夫職分之不盡心志之不同二三大臣信有罪矣待遇之未誠信任之未篤愚臣妄謂陛下亦有過焉何則嘉祐之定國本任其責者韓琦也今陛下以為家事而獨謀於左右之嬖御元祐之擇臺諌預其議者司馬光也今陛下懲創太過而專決於寵幸之從臣伸國法以繩横恣廟堂責也卒壓於威命而中輟内降以抑僥倖宰相之事也竟屈於宣諭而奉行彼居其位而不得行其道方赧然以冒其所愧又安能展布四體以志伊尹周公之事業哉臣願陛下推誠以待之虚心以任之毋以小謀大毋以内圖外而使大臣得以粗伸其志焉如此而獨職分之不盡心志之不同以負任使則天下之責固將歸之而不貸矣臣出位有言無所逃罪惟陛下幸赦斯得又奏曰臣頃者䝉恩共貳禮闈每惟此官蓋古宗伯之屬以佐掌邦禮為務職分所繋至為不輕故常日夜深思欲於簠簋爼豆升降周旋之外求為有補於國家之大政者而得其說敢為陛下陳之夫禮者何也天之經地之義君人之大柄天下之大閑而禹湯文武成王周公之所謹以守其國者也故三代盛時紀綱森嚴法制明備尊卑有分貴賤有别車服物采各有等衰天下之人日由乎規矩繩墨之中而不敢踰越以故民志一定禍亂不生憑藉維持至於數百年之久用此道也周室既衰禮制大壊秦漢繼之掃滅無餘末流之弊習俗薄惡民人抵冒諸侯驕横而漢法不得行外戚顓恣而大臣不得制宦寺放紛而朝廷不得治漢之宗社遂以陵夷此賈誼仲舒王吉劉向之徒所以發憤慨歎而孜孜於述舊禮明王制以救之也我國家承五季衰亂之餘知天下之禍敗原於禮制不立故創業之初立經陳紀為萬世法先儒程頥論歴代之禮獨以為本朝大綱甚正而司馬光亦以為大宋受命太祖太宗能立禮之大節是以百年之間敎化興行臣民軌道凡漢氏蕃臣閹戚壊國喪家之事一皆無之制度紀綱如此聖子神孫世世持循而弗失可也然臣觀自頃以来祖宗典則之舊浸以隳廢壊法亂紀之風漸不可制竊為陛下憂之宫邸無故而妄求進秩不問也嬖寵恃恩而豪奪人田不問也戚畹葬埋過於侈忲以溷有司不問也宦寺怙勢頥指氣使駕使者而傾之不問也而宗藩之横則又甚焉有縱恣輿臺囊槖巨盜而邀求内批以免死者矣有嗾使徒卒伐人宰木而躪藉官吏以求勝者矣凡此數端奸禮犯義在崇觀政宣之間固不以為恠而隆興乾淳之世則未必有也陛下其可恬然視之而畧不加警乎且上之人既已決隄壊防而聽其所趨矣而䑓諌侍從給舎之臣復無一人敢逆遏其横流至於都司少有牴牾則加以無君之罪不旋踵而逐去其於聖德能不虧損乎恃恩犯法之徒能不踴躍而攘臂乎政和間諌官董葆光上疏請裁抑省吏朝廷方為施行忽降御筆手詔云於豐亨豫大之時為五季衰亂裁損之計詔下葆光移符寶郎堂後官醵錢入寶籙宫作千道齋以報上恩自後省吏之横不可復制臣謂今日事雖不同而紀綱陵遲豪猾得氣無以大異政刑俱失逺邇效尤無恠乎民挺於敓攘吏肆於豪奪而略無忌憚也臣願陛下思聖人為國以禮之訓而致行之法三代之所以得監秦漢之所以失力守祖宗之法度痛抑親昵之私情毋使憑藉扶持之地日縱尋斧以至於衰亂而不可反宗社之憂其猶可及救乎臣以禮為職言之及此不識忌諱惟陛下恕其狂僭黄應龍對策曰臣聞天下固有將治之時人主當堅必治之志時也者天運之已至時勢之可為而不容必者也志也者心君之所主治道之從出而當先定者也志至而時未應尤當立此志以俟夫機之乗時至而志莫符將恐玩愒一生天下無可為之事矣是以聖人出而新一世之宇宙斡萬化之綱維圖治必有定謀致治必有定力酧酢事物果中肯綮則不變其初心恢張政理既得要領則堅持其初意不以議論紛紜而牽制不以效驗悠邈而動揺雖處世道艱棘之衝而此志常明雖當國勢搶攘之㑹而此志常銳矧乗時勢之將治當應事機而亟圖正宜立靠實之規模為就實之事業振士氣而羞其行飭吏治而責其成外治必嚴邦計必裕經理地利之策蘇救民瘼之方莫不因時可為隨時有立堅吾志而力行之天下事可以徐就吾之條理矣儻圖揆之不審或始銳而終隳把握之不牢每暫作而還輟則景象方回事功愈邈况欲自登而平以階萬方於太平也哉恭惟皇帝陛下英姿天縱聖敬日躋臨位以来十有八載閱歴多而世故熟涵飬至而天君清以時考之適符古人再登之候以理揆之正開世道久鬱之機政化更新有其時矣方且崇化尊道程能授官嘆邊圉之尚虚念國力之猶耗條戰守之備明斂散之權不可謂無其志也猶登進臣等於庭而策之以當今之務顧臣至愚曷稱明㫖切謂時難得而易失志當立而不移昔武帝策士大庭欲聞至論之極上嘉古治欲致諸福之祥有臣仲舒以髙明在加意告之然臣考其武功爵之置乃帝即位之十八年也若操持尚謬然帝之志不以是而衰而終遂雄材之畧者唐太宗夜讀周禮欲追古制之隆夙興聽理將嫓虞朝之盛有臣彦博以願如貞觀初儆之然攷其遼東之行太宗在位之十八年也若喜功未忘而太宗之志不以是而衂卒成致太平之功方今事體固不可以漢唐比時雖相似志甚不侔危證稍解而病之脉猶存否道已傾而泰之基猶淺所宜奮發澡厲振迅激昻大勢粗回者使日進而日新大體僅定者俾愈久而愈固則乗此將治之時可以為必治之世矣書曰時哉不可失正謂是也謹昩死上愚對臣伏讀聖策曰惟天惟祖宗全付有家朕思日孜孜無墜天之降寳命以無羞祖宗之洪烈休德臣有以見陛下不以時之已至而㤀上天眷佑之意列聖付托之隆也臣聞消厄運於艱棘者若非人力之强為振事勢於因循者由君心之先定上天生時者也祖宗啟陛下以此時者也時之未至此志果立尚可轉弱而為强時之已至此志不立未免墮强而為弱臣不敢逺考請以藝祖皇帝之事明之五季不綱亂離斯瘼方將跨九垠以為爐矣藝祖出而汛掃之渙屯夷䝉收拾破碎之天下曾不數載六合為一何成功之速哉觀其訪大臣於風雪之夜立志如此其勤也收兵權於盃酒之間用志如此其果也士卒茍犯吾法惟有劔耳藩侯不為撫養斷不容之行其志如此其決也用能為我宋開億萬年之丕址豈偶然哉為天地立心為生民立命為當世開太平惟我藝祖皇帝為無愧於斯言皆此志之堅為之地也陛下果能以藝祖為法則念皇穹所降之寳命則當惕然自勉曰時方助順予弗能愛惜力以迓續天休寧不上負皇天之眷佑乎念寧王所遺之寳龜則必凛然自愧曰時尚可為予而不能事事何以見宗廟寧不負祖宗之付托乎朝省夕惟念念不替卓然而警悟生躍然而精神奮則陛下之所以策臣者斷可以致有用之實效而臣之所獻言者亦不墮於空談矣臣伏讀聖策曰因惟隆古盛時三載有考績之程三考有黜陟之法盖九嵗而進業曰登又九嵗而再登曰平由是三登而太平則王德流洽禮樂用成朕自臨御以来今十有八年蓋再登曰平之候而觀時撫運圖事揆策未有致平之階今策茂異冀聞康濟大畧輔予于治肆垂聽而問焉臣有以見陛下當可為之時而慨然有志於古者登平之治也臣聞古之為治者不患治之難成而患時之未順不患時之未至而患志之弗立虞廷惟無怠無荒而有惟熙之志故三考黜陟遂以致雍熙之和成周惟無逸無淫而有功崇之志故王德流洽迄以躋盈成之盛後世之君卧薪之志先定故二十年生聚敎訓可以沼仇人之國若復讎之志不立雖四十九年之久而西周之美竟莫克尋陛下心事固落落於十八年之前而往者不可追来者當亟圖今雖未有再登之實而致平不可謂之無其階矣在天者雖非有五風十雨之和而祝融收威象緯循軌不至於前日之灾異遝来也在地者雖未有六府三事允治而海若奉職鯨波復常不至如前日之潰決四出也在人者雖非有烟火萬里之樂而邊塵少息道殣稍希不至如前日之枕藉可憐也此正上天開陛下以自治之嵗月而祖宗遺陛下以大有為之機㑹也曩者一國三公事權渙散今宰衡獨運捜舉憲章意外僥倖時有裁抑是已有志於守法度矣既曰守矣則當執此之政堅如金石曩者威福潛移賞罰無章今則拔去回邪登崇耆俊或用或舎稍加甄别是有志於公賞罰矣既曰公矣則當據此之公無私如天地曩政令多私朝行夕改今則上下相與檢察稽違詔令所頒期於遵守是有志於信號令矣既曰信矣則當行此之令信如四時由是而粹美士風由是而淬磨吏習警邊虞而裕國計講屯田而備荒政件件葺理事事作新不嘗試於茍且之謀雖覆却萬變交乎其前而堅苦刻厲久益自信勇往直前無所疑礙如射者之期於必中如奕者之期於必勝意所欲為何不可者昔者藝祖皇帝嘗大開宫門聖訓有曰此如我心小有邪曲人皆見之陛下果能充藝祖此意而明白洞達公平廣大力而行之則康濟大畧自有陛下之家法在而禮樂用成之治可以駸駸等而上之矣臣伏讀聖䇿曰漢武尊經而黜百家顯宗臨雍而拜三老是正學所當崇朕躬教立道庶幾士知嚮方然雋慧者勦說以飾智辨㨗者浮道以譁衆將何以使之羞其行臣有以見陛下因士知所向之時而有志於新士習矣然臣切以為士習之不美非教詔之所能移而特患夫在上者表厲之未至有如三俊克即則見德之夫不期而自式三后迭用則利口之習雖靡而可移建武之罷黜百家雖有統一聖真之功而平時以跅弛取人則何恠乎自鬻之千數永平之正座自講雖有觀聽圜橋之盛而異日之名節相尚則實激於桐江之一絲世之從行不從言尚矣厥今士習何如哉師道不立而鄉無善俗䝉養弗端而世乏良才沒身於場屋之技者剽竊詞章而不究本原疾鞭於功名之途者專騰口說而弗顧理義平居而論視富貴如浮雲退省其私有攫金於白晝道義安在㢘耻缺然昔我藝祖當皇業初基日不暇給而即位之月欵謁先聖繪先賢先儒之像儒道復振實自此始陛下隆師重道遹遵先猷邇日於祇謁原廟之次舉行鉅典頒九聖四賢之賛以明道統旌先儒從祀之禮而黜異端羣士嚮風四方易聽臣願陛下於用人之際尤加崇正大之實學而又清心寡欲以表倡於其上則又何飾智譁衆者之足慮哉臣伏讀聖䇿曰漢宣綜核吏能咸精有唐中興實才是用是吏治所當責朕程能授官庶事知敏事然刻峭者深文巧詆叨懫者致期視成將何以使之平其政臣有以見陛下當吏道多端之時而有志於飭吏治矣臣竊以為吏治之未飭非督責之所能化而惟患夫在上者賞罰之未公有如三載考績之法明則後之言循吏之效者稱堯舜第一治行之表見則世之稱循吏之實者歸孝文惟其名實之必核此神爵所以有民安其業之風惟其實才之是用此開元所以有治致中興之美上有實政則下有實吏久矣厥今吏治何如哉布宣德澤者不一二而貪黷者常接踵遵奉詔條者不多見而欺謾具文者㒺悛心勇於辦事者既並縁以遂其自便之私期於寡過者又懦弱而恣其奸胥之欲蒼鷹之毒肆碩鼠之斂繁囊橐雖豐根本殊竭昔我藝祖當洪基肇造庶事草創而愛民一念首關聖慮縣令坐贓除名為民此懲贓吏初指揮也自是㢘潔風行於天下陛下施政行令動守成憲往者亦嘗重贓吏之罰矣然或謂監司之按發臺臣之劾奏固間見施行而夤縁牽復者未聞其必罰掊克取贏者不聞其盡斥臣願陛下大明黜陟於程能之際不徒求其敏於集事而必欲其毋蠧吾民治行顯著者則増秩賜金以久其任罪狀明白者則褫爵削籍以警其餘尚何峭刻叨懫者之足憂哉臣伏讀聖䇿曰苻秦侮晉投鞭斷流司馬吞吳造舟流柹是邊防所當飭朕堅邊設候將以備不虞然溝封未繕敵有覦心伍乗未修士寡鬬志其何以固吾圉陛下之言及此豈非當邊塵之少息而有申儆國人之志乎臣聞今日邊備有不可以前日論也向者敵性憚暑惟防秋冬邇年敵駐河南關隴之間往来倏忽是無一日而不當備也向者哨騎窺覦惟在淮甸邇年蜀壊敵来多出開達施黔蹊逕錯雜是無一處不當備也幸去冬以来羽書希警或謂彼厄於旱蝗或謂彼訌於内變理誠有此事豈信然上天有福華之心與吾自治之暇有一月之暇當為一月之工夫有一嵗之暇當辦一嵗之備具然臣不知邊烽徹候幾時矣邊頭擺布阻險塞衝能常如對壘時否督府罷司再嵗矣朝中措置蒐卒謀乗能常如開府時否也藩籬門户豈不知有㨗徑之衝未聞控扼有何策水舟陸步豈不知缺守把之處未聞措辦何方朝廷責之列閫帥閫責之偏裨此曰作急施行彼曰畫時遵禀豈廟筭之難測抑兵計之尚神第恐風塵一驚未免倉皇四顧惟是腹心之隱疾莫如將惰而兵驕恭聞建隆初將士有不用命者悉置極典此始嚴驕兵之法也臣願陛下率藝祖之志而行之念金甌之屢缺不容再錯慮玉帳之乏才所當預謀謹周人綢户之防存光武包桑之戒紀律必嚴不可因咽而廢食斥堠必謹不容視䕃以媮安革敵去而舞之心為冰合復来之備側聞邇者廷紳抗疏謂敵人姦謀叵測聚衆河洛終為搶麥之謀備粟近邊為誘流民之計若如所論良可深憂然則欲固邊備非堅自治之志則不可臣伏讀聖策曰漢増錢幣以給軍費唐𣙜茶鹽以濟中興是邦計所當裕朕理財正辭將以佐經用然𣙜禁日密國課無裨楮法嵗更民聽滋惑其何以阜吾財陛下之言及此豈非當事勢差定而有阜通九府之志乎臣聞今日財用又非可以平時言也昔人謂江淮財用可濟中興而比年以来沃饒之地半成淪弃所取辦者僅東南之一隅自昔立國東南者充給於摘山煑海之利比年以来經濟乏才法多變易蠧弊不勝其百出亦未有嵗養五六十萬兵而事力不屈未有嵗糴米五百萬斛而民力可供未有嵗出十四五千萬楮而國力可繼者論財計於今日是誠築底之時然理財正辭生必有道若徒以威刼力制而求足是謂挺刄之政豈謂本源之知曾不念夫廩廥乃怨之聚帑藏乃横之府蜀居兵荒之後而有刼糴掇糴截糴之苦吳居旱澇之餘而有敷糶勸糶奏糶之憂茶鹽之新鈔老鈔貼換無常楮幣之新界舊界變更無定臣不知陛下所謂正辭而禁民為非曰義者果何如也痛籌經畫之無方尚有節用之一說共惟建隆初用度最為簡約宫中雖一物猶不妄用聖訓且謂一縑欲易一敵人首又養兵不過三十萬而南征北伐無不如意所當者破所撃者敗臣願陛下充藝祖之志而推之節之又節雖苦節而何傷為所當為勿泛為而無益循孔氏為疾用舒之訓懐衛文布衣帛冠之圖側聞邇者廷紳進言猶謂根本撥而為太平之粉飾財用乏而襲豐亨之調度事力微而興不急之土木蠧弊甚而濫當尼之私恩若如所陳未知逺筭然則欲贍邦計非嚴自節之志尤不可臣伏讀聖䇿曰晉開汝潁齊墾芍陂耕屯之效可覆也朕畫地授田將為戰守之備然逺耕則資盜粮近墾則奪民産其何以為經理之方臣有以見陛下念邊戍之未易撤而圖為經乆之規也夫田不井授國有兵費粮以漕運士不宿飽今淮堧沃壤葦白而茅黄荆襄腴田狐嘷而獸舞亟講屯田之制是誠足用之方然築室道謀欲書掣肘立論不堅或以浮議而易沮設心不廣或憚少費而遽休不曰官兵不可服田則曰民户不敢復業臣謂欲興屯田之利先備屯田之害近逼兵争之境須為收刈之防首以逺屯藝之早稻黍踰夏而已熟棗雖秋而無恐多其斥堠䕶以遊兵既有主謀尤須久任如我藝祖之任郭進在山西更十餘年陛下肆頒明命使㳂江諸閫繋銜措置必有端緒可績勿為嵗月淺圖分孔明以渭上之師主充國以金城之畧決期後效勿廢前功則晉之汝潁齊之芍陂又安足專美於前代臣伏讀聖䇿曰漢立常平隋置義倉荒政之制可舉也朕分道置使為斂散之用然偽指囷倉以肆欺不求芻牧而立視其何以為詔救臣有以見陛下念民生之不易保而欲為凶荒之防也夫舜牧分咨烝民是粒湯民無瘠備具為先今之所謂常平義倉特有其名招糴勸分實司其命郡多遏糴之禁吏無安富之心使以安撫為號者擁節而宵征官以常平為名者移文而曉揭飽鮮自若形鵠何知或行樁留之令而以販鬻為資或嚴過界之法而坐視鄰國為壑秦飢孔亟晉閉方安此曲防之禁不可以不除也以至未寛糴户之憂先重富家之擾借以上命不無勒認之行移威以重權復迫難供之數目不計稅之在亡而計田之多寡不問室之虚實而惟户之髙下有稱貸而益者或鬻産以從之杞國未肥魯人先瘠此覈實之政不可以不審也若此侵欺當先禁戢如我藝祖初立法令應商稅毋得割收苛留此薄稅斂初指揮也自是寛卹之政達於天下陛下勤卹民隱玉食弗飴措置流移屢頒詔㫖而救荒舊制尤切舉行乃有偽指囷倉以肆欺不求芻牧而立視此之不戢方羨慕於漢之常平隋之義倉安能以頓革吏奸哉臣伏讀聖筞曰凡是六者在今實為要務朕不敏明未能究悉今天下事勢極矣規模施設必如藝祖之肇基髙宗之中興乃克有濟然建隆創業不數載而底定炎興再造必持久而後成伊欲逺法藝祖則深弊積媮若非可以頓革近法髙宗則扶顛持危又非可以緩圖施之于今將何道而可臣又有以見陛下既加意於時務之要而又欲因再登曰平之候而追配夫創業中興之盛也藝祖之事臣已畧陳其梗槩於前矣乃若炎興恢復之志臣安敢畧蓋藝祖皇帝以金戈鐵馬取天下若髙宗皇帝以麥飯豆粥收天下其規模雖若大殊而志嚮未始不一於今度之當時以綴旒一縷之人心而較之坐奄東南半壁之基者孰難而孰易敵人以回山倒海之深謀而比之近日北方專事殺戮之惨者孰智而孰拙陛下處此將不櫛風沐雨而收天下乎我髙宗能奮身緝理極力支撐立國冰泮之上緫覽羣策延納英豪屢挫勍敵之鋒再造中天之業盖有由也聖訓嘗曰當乗此時大作規模又因敵退戒飭諸將不可弛備當為再至之防恢復一念既見於翰墨游神之間警省寸誠勿替於宫闈静坐之頃此其自立之志為何如哉既而兼取創業興復之規而身任其責者又有孝宗焉聖訓有言規恢逺畧㒺不在初煩文末節蓋未暇問又謂朕此心於天下一日定行一兩遭今考其淳熙六年即位之十八年也嘗曰賞罰自是欲當朕守此甚久故以言其士習則謂浮靡非偉厚之噐詭激無平正之用去取既當則何士習之不新以言其吏治則命官犯贓者決配舉主不自劾者貶秩典憲既嚴則吏治何不飭因淮西奏諸將分定關隘則以為兵不可太分須屯大兵於要害之地則邊備何不修封樁庫錢毫髮不妄用宫中浮費必加痛節則財力何不裕詔建康都統謂屯田内有亡費之利外有守禦之備卿宜計度詳悉以聞則屯田無不可行今浙江熟處糴米均撥不熟軍州以備賑糶則荒政安有不舉陛下而欲六者之務無不振葺必行又當以孝宗皇帝為法臣區區之愚盡在是矣惟願陛下守之以堅行之以果則何患乎積媮深弊之難革扶顛持危之未易以緩圖矣而陛下又終䇿之曰子大夫其傅經誼通正言毋枉執事朕將親覽焉臣又有以見陛下好問之誠有加無已臣嘗聞之張載曰明善為本固執之乃立擴充之則大又嘗聞之程顥曰今将救千古深痼之弊為生民長久之計非極聽覽之明盡邪正之辨致一而不二其能勝之乎盖亦謂人君立心要當如是而臣畎畆孤忠幸造闕庭懐不能已敢展盡底藴以為陛下獻一曰正朝綱以破天下之疑夫自古國家之興非一端而其興也必由政權之有所主自古國家之亂非一證而其亂也莫大於政權之有所分人主當以天下為一家而以家治天下先賢皆謂三代而下惟本朝家法最正昔之以貴近撓亂權綱莫甚於漢以宦者濁亂天下莫甚於唐國朝列聖相承深監前弊君臣問對内宦不許與聞外間文字侍省不得進受戚里預政事有禁外家通賔客有禁陛下聦明天縱獨運乾綱恪守家法斷無漢唐之失然臣来自山林聞諸道路間謂許史私恩頗譁物論南陽近属類玷清華倖門浸開鼠穴難窒天下疑其有外戚之形羽衣之黠間通宫闕䦨入之禁為之少弛貂璫之狡卹予過厚給舎雖當駮繳其徒實繁天下疑有宦寺女謁之形以陛下之英果此輩何足容其奸人言如此亦可畏哉臣願陛下勇於自治剛以制欲率履公平正大之道盡滌曖昩疑似之私使體統一而朝廷尊紀綱正而天下定臣所謂破天下之疑者此也二曰答天心以慰天下之望我朝受祖宗三百年無疆惟休之天命基岱嶽而源洪河卜世卜年未艾也而全付予有家于陛下天之属望厚矣試以累年之天變參之明堂電而誕夕雷震躬之懼當省也鬱攸煽而王畿災焦土之炬可憐也夏陽沴而秋雨淫粢盛之害可弔也鄭火復作魯雹繼聞齊彗方禳漢虹復見災異接迹逺近寒心太白失次至形李尋之憂坤載不寧又勤谷永之奏此天欲扶持全安者為何如而陛下之所以祇承奉若者又何如乃自新元以来麥秋小稔雨暘若時天下莫不欣欣然曰此陛下化絃更張之後君德有加之所致也顒然翹首願見太平臣願陛下正當力行好事之時日勉一日雖休勿休敬天有圖不但觀覽於内殿而必常省於心中之圖克己書銘不但警省於翰墨而必常刻於心中之銘以不愧屋漏為無忝以存心飬性為匪懈則不惟有以欽若上天之意而亦有以恭順列聖在天之靈不惟有以慰民望之深而亦有以衍社稷億載無窮之慶此臣所謂慰天下之望者此也臣奮身草茅不識忌諱惟知有事君無隱之大義而不計其言之狂瞽惟陛下裁赦而施行之天下幸甚侍左郎官徐元杰上奏曰臣空疎末學塵滓班行謬兼經筵講說之員無補聖學緝熙之益戴恩天之涵覆濫卿月之遷陞惟有動息凌兢堅苦刻厲凡可以勉竭愚𠂻仰禆聖德者臣之職分然也臣竊惟天下有至難之事知之而能有為則難者易天下有至易之事忽之而不勉為則易者難陛下心契兩儀道包萬有其圖事宻而識認親其應事周而發用審舉天下莫不服陛下之知其進退大臣也有禮其待遇羣臣也有恩舉天下莫不服陛下之仁其除奸也投機而決去其進賢也㧞茹而彚征舉天下莫不服陛下之勇隂凝方翳而天日開眀陽和一舒而萬物吐氣弊之積者作而新玩之久者振而起昭回宸翰布告昕庭中外警雷霆之聲運量合乾坤之造是陛下居得致之位而又有能致之資古今之所謂難能者皆陛下之所易不惟人心順說之天意亦和應響答矣不惟畿甸歌舞之四方萬里亦相賀矣不惟三衙禁旅歡樂之而邊方將帥士卒亦莫不舉手加額矣臣日夜感嘆以為此真千載一時之㑹有君如此其忍負之然臣之所喜今日也臣之所慮亦今日也夫人心虚靈孰不具衆理而應萬事而所具者易以湮汨所應者易以差舛何也蓋事理莫不有當然之極致當然而然無往而不契天下之心不當然而然毫釐之差千里以謬所關於家國天下之事其弊可勝捄哉是以大學之道其本在明明德其用在新民其極在各止於至善不可以不察也夫以前乎十年陛下非不銳然英明厲精聽斷也非不奮然作新與民更始也然明德新民之事俱未能各知其所止是以定靜安慮之工夫未幾而間斷所謂慮而能得之效竟流於儒者之空言是豈大學之敎無益於人之家國天下哉抑亦始初清明之見本末先後始終之不審而知及仁守勇以行之者有未切實爾昔傅說之告髙宗曰知之非艱行之惟艱必終之曰王忱不艱夫人主患不忱爾不忱則就其便安舒肆者轉移之善念必至於間斷外邪客氣皆得以乗之而失位觀望之徒方將竊間抵巇幸其寡謀而鮮成覬其敵不来而欲舞也此忱一悠久㝎静安慮只在陛下方寸間蓋至要至切至近至易之地是為長者折枝之𩔖非若回世道於紀綱紊弛之後之為難也夫惟忽之以為易不勉其所難自沮於其難不反求其所易此中材庸主之通患而英君誼辟所以憤然常自警省也陛下撫政琴當調之候而不露解張之迹此大學定静安慮而後能得之㫖也然而天下之事當其疑似之未決舉世同以為憂及其果斷之已定識者獨以為聖慮之方勞也今議者𩔖曰國家以火德王天下丙午陽九之㑹邇在目前敵人慓悍行見衰弱安保其無他寇之崛興鹽楮壅遏尤難疎通或者方料儒生之多腐此不待舉世憂之而愚臣亦憂之然事關國脉當究病源其用藥也有方其察證也有訣是以明主銷未形之患為不見之圖悲感於歡愉之時憂勤於燕息之頃謂荒怠易肆則儆戒無虞而不敢忽謂耽樂易從則寅畏自度而不敢寧惠吉逆凶澟澟乎世數或然之變識微見逺汲汲乎人事可恃之求自古君臣以修德為福至之基而明良賡歌必曰敕天之命惟時惟幾也矧今登庸耆碩左右弼丞期之以周召之夾輔勉之以丙魏之同心合之以房杜善謀而能斷朝夕納誨以輔台德繩愆糾繆而格其非心自是而金玉聖躬清明純一常如對越在天之時自是而夙夜畏威陟降左右常持祈天永命之敬故朝廷必正實係於心術之微風化由基實在乎宫庭之邃使不有關雎麟趾之意則雖有周官之法度皆故事皆具文也表裏切實之工夫鮮有不墮於自欺之萌而終淪於私小之間斷也何以言之蓋天下之事變無窮人主之志慮易惑圖治不可太銳責效不可太早視聽不可以不一取舎不可以不明情分之牽制者不可以不勇決嫌疑之間隔者不可以不盡袪國是之出於公共者不可以不力維體統之在所當正者不可以不申辨以任賢使能為中興之基則不可不合才德而廣捜揚以賞功罰罪為微權之寓則不可不守信必而示勸懲知君子小人消長之不常也處泰道包荒朋亾之日又不可不為城復于隍之慮夫如是則所謂理内御外足國裕民之政必將日新又新與明德而俱融陛下與大臣謀之固已静定安慮黙得夫鼓舞變通之道必不至輕於變更而蹈往轍之失易曰神而化之使民宜之此之謂也昔先朝范鎮有言曰欲備契丹莫若寛天下之民至論浮費之節則曰請自宫掖始今日君臣上下能即是而推行之將見元氣内實精神外充本朝尊强遐衝坐折况乎財賦淵藪重在魚鹽今之江淮即古之江淮也隨材器使經理以人作而興之惟意氣爾大學曰生財有大道仁者以財發身不仁者以身發財又援楚書之辭曰楚國無以為寳惟善以為寳為人上者誠能好仁而惡不仁舉善以為不能者之勸則天下國家之事自然徐就吾之條理矣臣蚤夜念此輙於講讀之次諄怛條陳終始以定静安慮為奏蓋深信聖賢之書如桑麻穀粟之不可廢惟陛下與大臣深思而亟圖之則宗社幸甚天下幸甚兼中書門下省檢正諸房公事王爚疏奏願詔大臣相與憂亂而思治懼危而圖安哀恫警省修德行政摧抑羣隂之氣燄保護微陽之根本批札畢杜於私蹊官賞宏闢於正路使内治明如天日外治勁如風霆則精神運動陽彚昭蘇世道昌明物情熙洽上以迓續天命於譴告之餘下以固結人心於解紐之際其孰能禦之徐僑遷太常少卿趣入覲手疏數千言皆感憤剴切上劘主闕下逮羣臣分别黒白無所回隱帝數慰諭之顧見其衣履垢敝愀然謂曰卿可謂清貧僑對曰臣不貧陛下乃貧耳帝曰朕何為貧僑曰陛下國本未建疆宇日蹙權幸用事將帥非才旱蝗相仍盜賊並起經用無藝帑藏空虚民困於横斂軍怨於掊克羣臣養交而天子孤立國勢阽危而陛下不悟臣不貧陛下乃貧耳劉克莊上奏曰臣聞易曰窮則變變者猶醫家汗下之劑不得已而用不可以屢試也寳紹壊證極矣陛下慨然改號端平一變之功侔於元祐不幸邊烽告警適丁是時外患之来勢如風雨謂宜堅初志修内治以待之執事者方咎用賢之無益疑更化之致寇再變而為嘉熙三變而為淳祐皆求以愈於端平也然而卒不能有所愈也於是四變而為乙巳五變而為丁未其間豈無賢揆率不能久局面隨之而變此如沈痼之人屢汗屢下之餘難乎其處方矣夫亟易相而圖任靡終數更化而規模不立此所以每變而愈下歟惟丁未轉局則異於是以端平之舊相修復端平之政事收拾端平之人才致太平而起頌聲宜無難者而時異事殊不可槩論諸老殄瘁宿望一空名臣欲盡来者誰繼經費繁浩大司農不能給未免講求生財之說人才衰少見大夫無可使未免參用喜事之人諸公貴人志得意滿既取其美官又全美名而去一二自好之士方且栖遲偃仰弓旌雖遣翔而未集使當饋有乏才之歎翹館無可延之賢或者見其如此遂曰陛下與大臣改端平之政矣甚者以為改端平之心矣自古政事不能無弊端平之失在於施行銳周防疎除擢驟而已然則以今之審矯昔之銳以今之宻矯昔之疎以今之乆矯昔之驟因時酌宜扶偏捄失不得不然端平之政或可改也若夫召故老起諸賢抑世卿杜近習去副封開言路絀贓吏減斛靣數大節目皆陛下與大臣端平之初心天命之眷顧國祚之靈長人心之親附繋焉自始至今孰敢議其非者斷斷乎不可改已臣在田里見元㑹所下除書作而曰謂陛下與大臣改端平之心者誣也臣聞仁宗以恭儉安静為治體終其身而不變孝宗以剛明果斷為治體亦終其身而不變中間雖有小因革要皆不失其初心故嘉祐淳熙之盛為本朝冠臣敢誦二祖之治為陛下獻昔富弼再相上謂歐陽脩曰弼頃為人所讒今必顧慮不若堅守初志臣敢誦富弼之事為大臣勉詩云愛莫助之臣不勝卷卷知安慶府黃幹擬應詔封事曰臣竊以為天下之患非有形之易見者為可憂而無形之難知者尤可慮自姦臣擅權竊弄兵柄搔動南北之生靈使之肝膽塗地不知其幾千萬遂使怨毒之氣上干隂陽旱蝗相因流殍滿野此誠非常之變有形之可見者也雖三尺童子皆知以為深憂自天誅顯行姦臣就戮諸賢彚進公道復升薄海内外延頸以觀太平而歴觀州縣之事盖有凛然若不能一朝居者是豈好為異論以驚世駭俗哉蓋嘗竊謂今天下無一事之不弊無一民之得所一郡之大以言乎兵則不强以言乎財則不裕以言乎城堡則不修以言乎器械則不備以言乎風俗則喜事而嚚訟以言乎官吏則誕謾而具文此臣所謂無一事之不弊者是也雖今之氓負隂抱陽君以為天國以為本聽其自善自惡自貧自富自安自危而漠然不以為意今貪吏害之酷吏害之黥胥又害之弓手土兵之追逮者又害之兼并豪户之徒又害之凛然何以自立而中産之家十室九破小民則今日壊而明日死之矣此臣所謂無一民之得其所者是也盖嘗深求其故竊以今之天下當極弊之勢茍不速反而正之則壊爛頽靡而不可收拾前輩以謂視其容貌無以異於常人而倉公扁鵲所望而走者也然則今之天下當何如管子曰禮義㢘耻是謂四維四維不張國乃滅亡夫禮義㢘耻行於士大夫之間而足以維國祚於長久者何也使士大夫知禮義知㢘耻則必知君之當尊民之當愛祿之不可茍食而職之不可茍廢也今也不然士大夫之處心者不復知有君不復知有民知有細書疉幅華言麗語以取知而已知有擎跽曲拳卑詞下氣取容而已知有苞苴賄賂請託奔競以求進而已歴代名臣奏議卷六十三
