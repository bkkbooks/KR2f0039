body:
  text: 歴代名臣奏議卷一百六十六眀楊士竒等撰選舉宋神宗熈寜元年右正言孫覺上奏曰臣竊見朝廷設科以取天下之士而所謂進士明經者乃因隋唐五代之弊行之百有餘年其法愈宻得人愈踈其間雖有勞烈之臣建造功業謀謨卓犖有紀於世必皆其人不因循於流俗能自奮拔於昧漏濁淖之中類非科試之方有以得之也臣以謂天下之生才非於古今偏有薄厚在上所以驅之耳今誠有道徳之雋經綸之彦不由科舉則無以進仕於朝廷是使天下皆汨沒於彫蟲篆刻之技棄置於章句括帖之學也古者少而學之壯而行之今也學非所以從仕仕無用其素學天下人才日少而士常不足於用其不自於此歟祖宗之時其法數變矣然一時議者亦多率其私意以傅合當世之宜故其法雖更而其弊猶在也臣竊計來年之春當下詔選士以陛下聦明睿智將大有為於時而取士之法不蚤有所更定則不足以盡得天下之才不盡得天下之才則不足以新天下之化臣謹條取士之弊并所當改定者具列如後一文章之於國家固已末矣詩賦又文章之末歟今乃拘以聲勢之逆順音韻之上下配合綴緝甚於俳優之辭近嵗以來朝廷務以經術材識收攬天下之士有司往往隂考論䇿以定去留不專決於詩賦學者亦多治經好古脩身謹行至於詩賦之業類不精於往時矣臣謂人情之所共廢者聖人不能強使之興今上下厭棄人人知其無用朝廷因而去之使天下學者學其所可用仕者用其所嘗學顧不美歟願下羣臣講求所當考試以代去詩賦之法一學究諸科多不通經義而猥以記誦為工記誦不能則或務為節抄至斷裂句讀錯謬文辭甚可閔笑仁宗患其如此始立明經科將以變學究諸科之習今西北諸州頗願習為明經矣然變法之初為法太宻類非中材可以勉强往者甞設說書一科亦多通經之士臣願更賜參酌明經新法稍依說書之制其逐州解𤼵并登第人數並減諸科額以處之如此則人數不増於舊而學究諸科習通經術矣一國家所取天下之士專用進士明經數科然東南之進士西北之諸科則數畧相埒至於被邊州郡或更十數嵗乃無一人見收取者雖由其業不精無以應有司之格然人情不能無望也取士之意務在得人而臣願朝廷别設科格或以邊臣保任若漢六郡良家專以取邊州材武䇿畧之士所得人數即以逐州充進士明經學究之額一進士明經諸科舊各以三百人為額治平中更増五十員三嵗一取士凡六百五十人亦不為少然不足以盡得天下之士何也所以取之之途狹耳士茍可用亦何必進士明經哉臣願以治平新増五十人毎遇下詔取士時許諸路轉運使提㸃刑獄知州通判薦文行殊異經術政事或有兵謀材畧之人若往時之遺逸并許兩制侍從官不以内外各得推薦一人若二人類所薦之士别於試格足收五十人而止所舉非其人若已仕而坐法者如律亦因以觀臣下薦賢之能一朝廷自慶厯以來詔天下立學郡縣往往有學舍官田房廊之利京師亦自析國子監之半以為太學太學諸生常數百人州學舍多亦或至百人學校之盛侔於漢唐矣然國家未有學校選士之法臣願詔天下州郡守臣到任一年以上得舉所學者才行尤異升之太學無其人則闕既至官為廪給更以日月詳觀而屢試之每嵗判國子監至直講共薦十人朝廷更以䇿試然後推㤙所得人數即以充進士之額其公卿大夫之子弟及舊在生員即乞别定入學之法右臣所請改定取士凡五條皆博採羣言以為有補天下而便於舊格其後三條稍用保任薦舉法薦取材畧文行之士以廣朝廷捜擇之路比之科塲汎然收舉者利害不相侔矣然臣不敢具為科格伏望聖慈下兩制雜學士待制以上臺諫官三館秘閣臣寮博加論議必有良法可以行之有論議不同者聽為别狀朝廷取其最優者施行之翰林學士司馬光上奏曰臣聞國之政治在於審官官之得人在於選士士之嚮道在於立教教之歸正在於擇術是知選士者治亂之樞機風俗之根原也竊見近嵗公卿大夫務為髙竒之論喜誦老莊之言流及科塲亦相習尚新進後生未知臧否口𫝊耳剽翕然成風至有讀易未識卦爻已謂十翼非孔子之言讀禮未知篇數已謂周官為戰國之書讀詩未盡周南召南已謂毛鄭為章句之學讀春秋未知十二公已謂三𫝊可束之髙閣循守注䟽者謂之腐儒穿鑿臆說者謂之精義且性者子貢之所不及命者孔子之所罕言今之舉人𤼵口秉筆先論性命乃至流蕩忘返遂入老莊縱虚無之談騁荒唐之辭以此欺惑考官獵取名第禄利所在衆心所趣如水赴壑不可禁遏彼老莊棄仁義而絶禮學非堯舜而薄周孔死生不以為憂存亡不以為患乃匹夫獨行之私言非國家教人之正術也魏之何晏晉之王衍相與祖述其道宅心事外選舉者以此為賢仕宦者以此為榮遂使紀綱大壊裔夷並興生民塗炭神州陸沈今若於選士之際用此為術臣懼向者仕宦之士皆何晏王衍之徒則政事安得不隳風俗安得不壊正始永嘉之弊將復見於今矣伏望朝廷特下詔書以此戒勵内外公卿大夫仍指揮禮部貢院豫先曉示進士將來程試若有僻經妄說其言渉老莊者雖復文辭髙妙亦行黜落庻㡬不至疑誤後學敗亂風俗二年光又上論貢舉狀曰臣准御史臺牒准勅節文天下學校貢舉之法宜令兩府兩省待制以上御史臺三司三館臣僚各限一月具議狀聞奏者臣聞詩云無競維人四方其訓之言欲強於天下者無如得人得人而任之以事則四方斯順之矣臣竊惟取士之弊自古始以來未有若近世之甚者也何以言之三代以前其取士無不以徳行為本而未嘗專貴文辭也漢氏始制茂才孝亷等科皆命公卿大夫州郡舉有經術徳行䇿試以治道然後官之故其風俗敦尚名節降及末世雖政衰於上而俗清於下由取士之術素加奬厲故也魏晉以降貴通才而賤守節習尚浮華舊俗益敗然所舉秀孝猶以經術取之州郡皆置中正以品其才行一言一動之失或終身為累士猶兢兢不敢自放隋始置進士唐益以明經等科而秀孝遂絶止有進士明經二科皆自投牒求試不復使人察舉矣進士初但試䇿及長安神龍之際加試詩賦於是進士專尚属辭不本經術而明經止於誦書不識義理至於徳行則不復誰何自是以來儒雅之風日益頽壊為士者狂躁險薄無所不為積日既乆不勝其弊於是又設謄錄封彌之法盖朝廷苦其難制而有司急於自營也夫欲捜羅海内之賢俊而掩其姓名以考之雖有顔閔之徳茍不能為賦詩論䇿則不免於遭擯棄為窮人雖有跖蹻之行茍善為賦詩論䇿則不害於取髙第為美官臣故曰取士之弊自古始以來未有若近世之甚者非虚言也今幸遇陛下聖明心知貢舉之極弊慨然𤼵憤深詔羣臣使得博議利病更立新規是千載一時也議者或曰古人鄉舉里選今欲知士之徳行宜委知州知縣者采察其實保而薦之臣獨以為不然古者分地建國自卿大夫士皆以其國人為之猶患處士之徳行不可得而詳也故又擇其鄉之賢者使為閭胥比長自㓜及長朝夕察其所為然後士之徳行美惡莫得而隠也今夫知州知縣雜四海九州之人逺者三嵗而更近者數月而更或初到官即遇科塲遽責之知所部士人徳行誠亦難矣又應開封府舉者常不減數千人而開封府獄訟之繁知府者自旦至暮耳不暇聽目不暇視又安有餘裕可使之察數千人之徳行乎議者又曰宜去封彌謄録委有司考其文辭叅以行實而取之臣獨以為不然夫士之徳行知州縣者尚不能知而有司居京師一旦集天下之士獨以何術知之其術不過以衆人之毁譽決之孔子曰衆好之必察焉衆惡之必察焉夫衆之毁譽庸詎足以盡其實乎必如是行之臣見其愛憎互起毁譽交作請託公行賄賂上流謗讟並興獄訟不息將紛然淆亂朝廷必厭苦之而復用封彌謄録矣夫封彌謄録固為此數者而設之也譬猶築防以障洚水也今不絶其源而徒去其防則横流之患愈不可救矣臣雖至愚平生固甞竭其思慮欲以少救其弊今敢陳二䇿乞陛下俯加裁擇臣聞上之所為下之所歸也國家從來以詩賦論䇿取人不問徳行故士之求仕進者日夜孜孜專以習詩賦論䇿為事唯恐不能勝人父教其子兄勉其弟不是過也今若更以徳行取人則士之力於徳行亦猶是也誠風化清濁之源歴代訛謬而不悟必待聖朝然後正之者也夫徳行脩之於心藏之於身雖家人有所不知況於州縣况於朝廷將何從知之故必待明哲公正之臣知而舉之然後四海之士皆可得而官使也然舉薦之法既行則干求属請誠所不能無也要在所舉非其人者國家以嚴法繩之勿加㤙貸則茍且狥私之人皆知懼矣且國家既以徳行取士則彼貪猾輕躁之人依附權要枉道求進者皆為清議所貶見棄於時雖有舉者必不多矣臣愚欲乞今後應係舉人令升朝官以上嵗舉一人提㸃刑獄以上差遣者嵗舉二人諫議大夫或待制以上嵗舉二人不以所部非所部鄉里除自已親戚及曽犯真刑或私罪情理重曽經罰贖及不孝不友盜竊滛亂明有迹狀者不得舉外其餘皆得舉之仍於舉狀内明言臣今保舉某州某科某人有學術節行乞賜召試若舉狀既上之後却有前後諸般違碍事𤼵其舉主並依律文貢舉非其人分故失從公私罪定斷受贓而舉者以枉法論其舉狀逐時送下禮部貢院置簿記録若應舉人而不舉者嵗終委貢院勘㑹姓名聞奏乞嚴加懲罰朝廷毎遇三年一開貢舉委貢院截自詔下之日勘㑹選擇舉主最多者從上取之倍於毎次科塲南省奏名人數具姓名聞奏乞下本貫𤼵遣赴闕其本貫更不考試即具狀申解送赴貢院仍出公慿給付逐人令赴貢院照會限十一月内取齊十二月内引見正月内委貢院内考試進士試經義三道子史䇿三道時務䇿三道更不試詩賦及論明經及九經等諸科試本經及論語孝經大義共四十道明經加試時務䇿三道其帖經墨義一切皆不試對䇿及大義但取義理優長不取文辭華巧唯所對經史乖辟時務踈濶者即行黜落其奏名人數並依科塲舊制至御試時進士明經各試時務䇿一道九經等諸科試本經大義十道所有名字髙下並只以舉主多者為上舉主數同則以舉狀到省月日先後為次其舉人所納家狀及授官後吏部所給告身並須開坐元初舉主人數姓名若及第後犯私罪情理重及贓重其舉主並減一等坐之未及第者減三等皆不以去官及赦原如此則羣臣不敢挾私妄舉士人皆崇尚經術重惜操履士風丕變矣朝廷若不能行此保舉之法其次莫若修學校之法以取之臣伏見慶厯以來天下諸州雖立學校大抵多取丁憂及停閒官員以為師長藉其供給以展私惠聚在任官員及市井豪民子弟十數人逰戲其間坐耗糧食未甞講習修謹之士多恥而不入間有二千石自謂能興學者不過盛修室屋増置莊産廣積糧儲多聚生徒以采虛名師長之人自謂能立教者不過謹其出入節其逰戲教以鈔節經史剽竊時文以夜繼晝習詩賦論䇿以取科名而已此豈先王立學之意耶於以修明聖道長育人材化民成俗固以踈矣臣欲乞自今天下州學只許置教授一人委本州長吏於本處命官中選擇無過犯有節行能講說為衆所服者舉奏補充若本州無人則奏乞下銓司選差委銓司於見在銓選人内揀選進士明經諸科出身人歴任無贓私罪能講說經書者奏補充逐州教授應舉人初入學者並為外舍生唯赴聽講及公試外不得於學中宿食其教授毎日講書畢取在學諸生姓名書於籖上雜置筩中抽取三人問以聽過書中疑義三條使對衆觧說通者置簿記録粗者不問不通者有罰毎月中兩次公試各試所習舉業委教授考定優劣等第具姓名出榜示訖亦置簿記録其有過犯者小過則罰錢中過則降等大過則斥出學亦置簿記録毎遇春秋釋奠畢委教授選擇外舎生到學及半年以上自前釋奠以來說書多通公試多在優等過犯情輕少即升入内舍為初等生始聽於學中宿食又選擇初等生升為中等生中等生升為髙等生皆如外舍生之法其有二人以上比較難決者即特令說書及試所業以決之皆須具狀申於州委知州通判更加審覆委得公當然後給牒補之如後來有過降等者其牒即毁抹其教授選擇糾舉升降等第若有不公委知州通判覺察取勘聞奏乞行衝替其開封府舉人舊無府學並令寓教於國子監其國子監學人須實是品官子弟方得依條入學其教試選升之法並與外州同以直講比教授判監同判監比知州通判凡國子監開封府及諸州軍内舍髙等生額並用本處解額之半其中等倍髙等初等倍中等若人數未足則闕之不得濫額補人若遇詔下開貢舉委本處判監同判監知州通判截自其日勘㑹髙等生補及半年以上者具姓名結罪保明聞奏仍與給公慿許令免解直就省試其髙等生占不盡解額方許本處其除舉人取解其中等初等生於取解時仍别立號每七人中取一人奏名如此則舉人亦稍向經術崇行義矣夫經術深淺非程試所能知行義美惡非朝夕所能察今使之處於學校經二三年累經選擇升至髙等又占解額妨衆人進取之路若其髙等生經術則講說常通文藝則屢入優等過犯則全然輕少行義則為衆所服比之糊名謄録考其一日所試賦詩論䇿偶有所長而取之者相去逺矣况近年舉人或一無行能横遇恩澤幸得免解者不可勝數今髙等生行能如此裁免一解豈足惜哉此學校之法也若朝廷又不能如此只於舊條之中毛舉數事微有更張則於取士之道並無所益徒更煩苛不若悉循舊貫之為愈也光為樞宻副使又上奏曰臣先曽起請應資䕃出身人初授差遣者更不試詩只委審官院流内銓試孝經論語大義共三道仍令主判臣僚更將所對義面加詢問若義理精通者特保明聞奏優與差遣稍通者依常調不通者且令修學候一周年外再試必須試中方得出官若年四十以上聽依舊制只寫家狀讀律自後不蒙朝廷施行臣今復差知審官院竊見資䕃人初授差遣者令試詩一首實為無益不惟其間有牆面者假手於人徒長姦偽就使自作詩得如曹劉沈宋其於立身治民有何所用古者二帝三王皆立木學之官以教公卿大夫子弟其故何哉盖以其人將嗣守官業茍無徳行道藝則必害及於民故也今者欲使公卿大夫子弟盡肄業於大學則其父兄不常在京師固難齊壹若但使之習業於家而考校於初授差遣之際業不習者不得出官則不煩勸督而人人自勉於學矣此乃事之易行者也嚮若使之盡通詩書禮樂則中材以下或有所不及今但使之習孝經論語儻能盡朞年之功則無不精熟矣此乃業之易習者也然孝經論語其文雖不多而立身治國之道盡在其中就使學者不能踐履亦知天下有周公孔子仁義禮樂其為益也豈可與一首律詩為比哉臣竊以為此事用力不勤更張甚易而為益稍大别無所損伏望聖慈詳察或有可取乞檢臣前奏特賜施行翰林學士吕公著上奏曰臣先准中書批狀送兩制議選知州以下條制内一項王珪等議未曽歴知州人不得權入轉運判官以上差遣臣愚以為未便竊以國家承平雖乆於人材素飬之法有所未備緩急求才猶恐難得若資格愈宻則簡拔愈難今知州以下從審官院差遣則嚴其條式可也轉運判官以上自朝廷推擢則不當更増以資格昔荀況稱賢與能不待次而舉疲不能不待頃而廢董仲舒亦稱小才雖累日不離於小官賢才雖未乆不害為輔佐且漢之部刺史今之監司如雋不疑乃自布衣拔為青州刺史當時號為稱職方今豪俊之士多伏在下位若必待其已歴知州然後使則或至白首而不見旌用臣愚以謂知州有治迹者固當升入監司自餘果有才能為衆所推雖資歴尚淺亦繫自朝廷不次選擇充轉運判官權𤼵遣省府推判官及權充知州差遣若試用無効自可退從常調如此則勸沮兼行賢愚無滯公著又上奏曰臣謹按學記古之教者家有塾黨有庠遂有序國有學王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士樂正崇四術立四教順先王詩書禮樂以造士大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之周禮鄉大夫三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以其禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府自堯舜三代以來其飬士取人之法雖隨時損益不同然教必本於學校進必由於鄉里此六七聖人所不易也逮乎秦漢而下聖王之迹既息凡所謂禮樂教化之官皆以廢絶至於設科取士則各出於一時之茍且國家承其極弊之後而因循未暇制作雖天下學校頗甞修建然取士之路不出於此而欲人之就學也不亦難乎其為科之法則專以進士經學大抵皆襲唐制而已夫上之取士者將以治事而長民而所以取之者乃不過試之以辭章記誦之學盖亦乖矣今誠不能革茍且之弊興廢絶之法而望賢才之加多風俗之漸變終亦不可得也故臣竊以謂貢舉之弊不可不革而學校之制所宜漸復雖進士經學行之既乆為有司者安於課試之格為士人者狃於進取之術可以漸去而未可以遽廢莫若先建學校兼而行之學校所進者嵗増則科舉所取者嵗减如此不十數年間士皆以學校進矣所謂學校之法者天子自立太學於京師取道徳足以為天下師法者主之自開封府及天下州縣皆立學取道徳足以為人師者主之然學校教化所以一道徳同風俗之原今若人自為教則師異說人異習故宜博選天下所謂有道徳可以為人師先集於太學使講議所以教育之法而朝廷以道揆其得失講議既定然後取其得者置之要㑹州府使主其學其餘州郡即委轉運司與知州通判於本州及属縣内選經術通明行誼素著者一人使主州學如本州無人即轉運司於同路州縣選差並令就見朝廷所置學官於本路㑹府而受朝廷教育之法或本州士人道徳可以為人師而不仕者委本州與轉運司彂遣赴闕當度其可否特與注官就差本處主學仍於太學受所以教育之法所謂貢舉之法者應天下士人並須本縣公吏等結罪保明鄉貢素行方得入於州學州學毎嵗貢士量州府大小大郡貢二人其小郡士人絶少處二嵗若三嵗貢一人並知州通判與主學官於學生内選入學一年以上經明行修者貢于朝廷而升于太學者官為給食太學毎嵗於學生内選到住太學一年以上經明行修通世務可以治人者七十人進於朝廷其在上等者委中書門下量才官使其在次等者送流内銓依名次注官計一嵗所貢者七十人三嵗所貢者二百人則後次科場進士經學南省奏名之數内可各減一百人二嵗之後就學者衆諸州所貢人數可以倍増而太學三嵗可増置四百人則進士經學奏名内更各減一百人又行之三嵗科舉可盡罷而士之進者皆出於學校矣其到太學及一年以上經術行誼入下等及經雖稍通行有毁玷者並罷歸本州一不與選願歸者亦聽其自太學罷歸非行有毁玷者並不碍後來選貢應天下知州通判及掌學官所貢士人上等者為最在任皆最者特與旌賞入下等為殿在任皆殿者當行重罰其本郡士人實有經行蔽而不舉者委安撫轉運使提㸃刑獄及御史臺覺察以聞當行重罰又按舜典命夔典樂教胄子王制樂正崇四術立四教王太子王子羣后之太子卿大夫元士之適子皆造焉周禮大司樂掌成均之法以治建國之子弟焉古者四民各有業而不雜故士之子常為士盖於治事長民皆其世業則所學所行習見而易入是以王者之於教學莫不以國子為先務盖庶人非秀異絶倫不得為士士之子非教飬有素亦不得在官臣以謂應已有官者並須入國子學取道徳足以為人師者主國子監嵗選學生十人或十五人聞于朝廷而升于太學如諸州貢士之法既至太學及一嵗以上委太學官選經明行修通於世務可以治人者天下士衮同進于朝廷如到國子監一年以上不與選願出官者即學官委保經義稍通行無毁玷年及格者聞于朝廷而關送審官院流内銓依無出身人例差注又今年科舉之法既未可遽罷則須權作處置按進士之科始於隋而盛於唐初猶專䇿試至唐中宗乃加以詩賦後世遂不能易取人以言固未足見其實至於詩賦又不足以觀言是以昔人以鴻都篇賦比之尚方技巧之作此有識者皆知其無用於世也臣以謂自後次科場進士可罷詩賦而代以經先試本經大義十道然後試以論䇿夫試於有司固未能得人之實材然此法既設則人稍宗經今建立學校將以經術教飬則代賦以經亦變法之漸也又經學一科雖其來盖逺然自唐以後始加填帖由是應此科者專務記誦此於章句音切尚不能辨然而舉用之曰此可以治人不待有識者然後知其非也臣以謂自後次科場明經止用正文填帖更不以注而増試大義如此應明經者漸多而諸科之弊自消矣公著又乞寛假長民官狀曰臣伏見審官院流内銓以知縣縣令闕多凡選人被舉充職官及轉京官者例差知縣已被差者不通舉辟不許避免臣竊以為當國家有道之時付之以百里之地有民人社稷之重則士子所宜願為今乃設一切之令強所不欲與坐殿負犯者亡異此殆郡縣法網太宻而勸别之道不明吏有盡心奉法治行明白者未聞有所襃異一罹㣲文則不能自免於譴斥加以近嵗朝廷以更改法度郡縣之吏或不能奉行故其常法之外峻其黜典經赦去官多不原免積累嵗月坐此殿累者益衆臣愚以為長民之官朝廷宜少寛假非有贓私顯狀及罷軟尤不勝任者雖坐小法無輕替易仍詔諸路監司牧守其所属令長有奉公愛民治效尤異者毎嵗别薦三二人間或奬拔待以不次其次如職事修舉有舉主合轉京官者特與依諸州教授例就任改官許令再任如此則勤亷者得以自保勞能者有所激勸中才足以強勉異効不至滯留御史中丞吕誨上奏曰臣竊以用人不考其素舉類不責其實欲官清而事舉不亦難乎且如三院御史闕員例以本臺丞雜翰林學士連狀薦舉務在盡公其如類各不同議亦難合一有情弊害公尤甚臣欲乞朝廷委内外兩省官嵗舉五人録其所長隨而器使如風節可以充御史詞學可以備館職明敏可以剸繁劇循良可以為牧守武略可以任將領章上公車籍於二簿遇有員闕閲其所籍循名責實進擬數人御筆親㸃一名用之敢以匪人充薦者委有司彈糾重行黜責如不稱職正其保任之罪若此掄材有素一官闕則預擇之擇之詳矣而又絶其私狥之路進擢之恩一出於上宜其有補公朝任官舉能之術也誨改諫議大夫知鄧州上奏曰臣准學士院關報中書劄子奉聖㫖舉諫官二人者仰承詔命俯及外臣有以見宸衷虚竚樂聞過失中外均慶臣所以懽忻而不已也臣向以言事得罪雖居外補尚忝諫垣之任仍預舉官之數輙有誠言上裨衮闕惟其僭越之罪敢避死亡之誅臣聞國朝故事諫官除授一出於聖選盖耳目機宻之任不可繇他岐而進示至公於天下也御史乃付學士中丞保舉比來任人不次政府甄擇賢能除授或聞除選人李定御史定不持毋服為有司劾奏舍人封還詞頭例皆奪職乃付禮官議定之罪夫行不為人所信已不足取如或有罪禮法固無容焉然求忠臣必於孝子之門者以其孝於親則忠可移於事君也以定充選其甄録之意可知矣既而公論不與遂以諫官御史並委兩省官保任臣竊以臺諫官所責甚重數年以來稱職者甚衆大言入則大罪之小言入則小罪之去者相望於道路來者遲疑不願就職以至諫院御史臺闕官日乆中丞不補者半年三院為之一空言路梗塞一至於此朝政或闕下情不通則有所蔽焉用事者豈徒然哉臣竊計自詔降以來在京近臣所舉員數已多而未聞除授必候自外舉官畢集然後掄選或見任逺方此追還則曠日遲乆言職㡬廢徒有擇官之名而非開言路之實也兹所以未見至公副陛下虚求之意焉書云朝夕納誨以輔台徳是不可一日而虛也唐太宗三日不聞諫官言必責輔臣其聽納忘倦寤寐思之書於簡䇿後世為美陛下推廣是心非夙夕渇於正論歟臣以謂求之之博不若用之之速既用之則信任而必堅與之圖回於正道斯誠為治之術也如博求其人而信任不固言者既衆而黜之不已臣將恐來者難阻鉗結自安忠臣義士遯逃巖穴公議消薄國家之大患也刳胎毁卵損傷至㣲其類猶或不至聖人所以為之深誡漢文帝受郎官之書其言是則用之非則置之乃除誹謗妖言之罪所以通治道而來諫者臣伏願陛下恢廣此度而行之則天下之福也仍乞於中外兩禁臣寮已舉官數内先擇三五人充諫官餘補御史闕員庶㡬言職不為虚設副天下觀瞻宜有益於聖徳也臣待罪譴謫之中不當有言然愛君之義與日積深身雖補外而心在王室因被㫖舉官輙以上陳􅅹懇輸忠亦區區自信之效矣伏冀髙明特賜省納臣所舉諫官二員已具别狀四年殿中丞直史館蘇軾狀奏准敕講求學校貢舉利害令臣等各具議狀聞奏者右臣伏以得人之道在於知人知人之法在於責實使君相有知人之才朝廷有責實之政則胥史皂𨽻未甞無人而況於學校貢舉乎雖因今之法臣以為有餘使君相無知人之才朝廷無責實之政則公卿侍從甞患無人況學校貢舉乎雖復古之制臣以為不足矣夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移順其所欲行而治之則易為功強其所不欲而復之則難為力使三代聖人復生於今其選舉飬才亦必有道矣何必由學且天下固甞立學矣慶厯之間以為太平可待至於今日惟有空名僅存今陛下必欲求德行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宫室斂民財以食㳺士百里之内置官立師獄訟聽于是軍旅謀于是又當以時簡不率教者屏之逺方終身不齒則無乃徒為紛亂以患苦天下耶若乃無大變改而望有益于時則與慶厯之際何異故臣以謂今之學校特可因循舊制使先王之舊物不廢於吾世足矣至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今為孰精言語文章與今為孰優所得文武長才與今為孰多天下之士與今為孰辦較此四者而短長之議決矣今議者所欲變改不過數端或曰鄉舉徳行而略文章或曰專取䇿論而罷詩賦或欲舉唐室故事兼採譽望而罷封彌或欲罷經生朴學不用貼墨而考大義此數者皆知其一不知其二者也臣請歴言之夫欲興徳行在於君人者修身以格物審好惡以表俗孟子所謂君仁莫不仁君義莫不義君之所向天下趨焉若欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以亷取人則敝車羸馬惡衣菲食凡可以中上意無所不至矣徳行之弊一至於此自乎文章而言之則䇿論為有用詩賦為無益自政事言之則詩賦䇿論均為無用矣雖知其無用然自祖宗以來莫之廢者以為設科取士不過如此也豈獨吾祖宗自古堯舜亦然書曰敷奏以言明試以功自古堯舜以來進人何甞不以言試人何甞不以功乎議者必欲以䇿論定賢愚能否臣請有以質之近世士大夫文章華靡者莫如楊億使楊億尚在則忠清鯁亮之士也豈得以華靡少之通經學古者莫如孫復石介使孫復石介尚在則迂濶矯誕之士也又可施之於政事之間乎自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之近世士人纂類經史綴緝時務謂之䇿括待問條目搜抉略盡臨時剽竊竄易首尾以眩有司有司莫能辨也且其為文也無規矩準繩故學之易成無聲病對偶故考之難精以易學之士付難考之吏其弊有甚於詩賦者矣唐之通牓故是弊法雖有以名取人厭伏衆論之美亦有賄賂公行權要請託之害一使㤙去王室權歸私門降及中葉結為朋黨之論通牓取人又豈足尚哉諸科舉人多出三路能文者既已變而為進士曉義者又皆去以為明經其餘皆朴魯不化者也至於人材則有定分施之有政能否自彰今進士日夜治經傳子史貫穿馳騖可謂博矣至於臨政曷甞用其一二顧視舊學已為虚器而欲使此等分别注䟽粗識大義而望其才能増長亦已踈矣臣故曰此數者皆知其一而不知其二也特願陛下留意其逺者大者必欲登俊良黜庸回總覽衆才經略世務則在陛下與二三大臣下至諸路職司與良二千石耳區區之法何預焉然臣竊有私憂過計者敢不以告昔王衍好老莊天下皆師之風俗陵夷以至南渡王縉好佛捨人事而修異教大厯之政至今為笑故孔子罕言命則為知者少也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫性命之説自子貢不得聞而今之學者恥不言性命此可信也哉今士大夫至以佛老為聖人鬻書於市者非莊老之書不售也讀其文浩然無當而不可窮觀其貌超然無着而不可挹此豈真能然哉盖中人之性安於放而樂於誕耳使天下之士能如莊周齊死生一毁譽輕富貴安貧賤則人主之名器爵祿所以礪世磨鈍者廢矣陛下亦安用之而況其實不能而竊取其言以欺世者哉臣願陛下明勅有司試之以法言取之以實學博通經術者雖朴不廢稍渉浮誕者雖工必黜則風俗稍厚學術近正庶㡬得忠實之士不至蹈衰季之風則天下幸甚神宗時同知禮院劉攽上奏曰臣准御史䑓告報進詔書天下學校貢舉之法博訪臣等令得詳議者臣愚以謂人主之舉事與人臣之獻議不同人臣之議者盛言古事以為髙侈言已忠以為博迂逺而不切事情漫汗而不濟世務雖已自知其無益於治矣而猶為之何也其言之有理其持之有故其名之所存足以夸衆眩俗故敢為而不疑耳人主之舉事則不然度時之所宜因俗之所安不以虚名而棄實效不慕逺業而捐近功使令出而下必信事舉而俗必定故與其出令不當而亟改之不若謀事於始而慎慮也今陛下患選舉之法不明教育之方未善此必有以前古久逺之事感動上聽者不可不察也本朝承百王之末創起律令雖未及三代其隨時因俗從宜應變増損不常亦自一朝之制而選舉之法行之百有餘嵗累朝將相名卿及今之所謂賢材與共天下之論議者皆非以他塗進者也而誣以謂未甞得人臣竊以為過矣且臣論之今時選舉之患不在創法之未善而在有司之弗良不患試言之非要而患聽者之不察何以言之今國家求賢良異材之人則使公卿薦舉求文學經術之士則使郡縣推擇此雖三代取士何以過此帝典之言曰敷納以言孔子曰不知言無以知人也然則未知人莫如聽言故國家試士以文詞亦二帝敷納之比也誠使有司兼仲山將明之才懐孟子知言之術精聽慎擇則賢不肖豈不較然由是觀之取士之法本未甞失而有司之聽或不能盡今以有司之不能盡而變法法雖亟變而不擇人付之雖法如三代猶將終無益也議者或謂文詞之為藝薄陋不足以待天下之士臣愚以謂今進士之初仕者不過得為吏部選人國家待門䕃恩澤者亦為選人流外小吏亦為選人選人如此之卑也而天下之士以文詞應此選豈不固有餘裕哉朝廷設置何等爵禄而更囏難其選乎且進士成名者國家亦何嘗便以為才傑而任用之或以文章顯或以法律用或以善政事稱或以治財賦進皆待其來日成效而後有取則夫取士之始亦何用靳靳遴惜若不得已哉且朝廷更選舉之法將以想望髙材豪傑之士也今天下之士至於禮部者嵗不下二千人朝廷豈能以玉帛之聘弓旌之招而遍得此乎必亦使之投牒自進耳士之投牒自進必非豪傑之士伊尹管仲之儔雖更其科試而取之徒小異其名目然其得士未有以異於前也更恐好利衒鬻之人崇虚名以亂真則取士之失又甚於往日矣議者又謂不如一用鄉舉里選者此又知其一未知其二也夫二漢之用鄉舉里選所以得人者其時郡縣之吏自廷掾諸曹卒史馭吏亭長㳺儌皆賢士為之故其臨財不茍則知其亷值事能斷則知其智文武才略莫不畢効故其譽之有實舉之不難自流品分别郡縣吏卒棄絶為賤不齒於縉紳賢士不復從此役士之居鄉里者何由察知茍慿虚名以進人後有不稱將復相與蔽護其短而謂之材終亦不得真賢實亷矣是鄉舉里選又不可盡用也凡此數端皆臣所以深疑者也不知臣之愚陋至此耶抑亦千慮將有一得也然愚者之志專則難移故臣願朝廷且毋庸輕變選舉之法不如因舊法而慎選有司之為愈也雖然尚有一說今有人於此明辯足以判獄訟智略足以治財賦而文詞不足以自發經藝不至于浹洽則將捐棄終身無仕進之望其材豈不可惜哉臣願陛下為設從政科使公卿及監司舉如此人以充選必有舉者三人乃召而用之且毋以為真試之三年才任其事然後命之以官即不可使復還為民而坐其舉者如此則天下之材士殆無遺逸矣臣聞教育之法所以治性也性修則智明智明則應物不惑不惑則盛徳之士也自兩漢以來學者未嘗不以利禄為心夫可誘以利禄而勉强為善則徳性離矣是故造士不及三代者由此也今陛下建學校為置明師而誨道之毋問其所學毋限其所能則賢材莫不養育矣若惡文章之弊而以經藝勸之學者之志不出於為禄利也則文章之士變而為經藝雖曰不同其離於徳性也均矣天之生材有昏有明智明材大者非小智小識之所能掩也及其淺晦下材雖日撻之亦終不能以致髙大士脩之於家足以成材亦何待學官程課督趣之哉臣愚不足以知逺略惟陛下裁幸起居舍人同知諫院范純仁論貢舉䟽曰臣近奉徳音以朝廷不能均取四方之士慮有遺才令臣具合設科制及取人之法進呈臣智識淺昧不能畫逺大之䇿上副詔㫖輒以所見粗陳一二竊以自祖宗以來取人唯進士科為盛凡舉擇公卿近侍多取進士出身之人故天下之士競務此科而進然進士舉業文賦唯閩蜀江浙之人所長至南省則與西北之人一處糊名通考故西北之人得進者少今若明行分别則必東南之人興難進之歎而寄貫巧偽者益多不若用臣前來所上貢舉之䇿先於天下郡縣各立學校養士之法仍擇明師以教之每科詔之下委州郡長吏及學官於進士明經中唯取土著之人先曽入州縣學各及三百日已上才行優於衆人者許用解額中人數三分之一特為薦送至南省謂之特舉之科南省只試䇿論經義仍各分路分考校逐路各與優立分數取人至御前亦依分數與放及第則諸路得人無不均一朝廷遂於貢舉優立五路之法又乞詔政府今後舉䑓省舘閣經筵職司並於明經進士或無出身人中數路參取但擇才行優長不必限以科第如此則四方賢士可以俱進矣更望聖慈詳酌施行純仁又論薦舉䟽曰臣聞唐虞之際俊乂在官成湯亦曰旁求俊彦詩稱濟濟多士文王以寧孔子論政則曰赦小過舉賢才是皆以舉擇人材為治道之先務也方今天下之廣士民之衆不減古昔而庻官得人不及前代良以舉用之道未能開廣選任既由政府多以資任采擇執政不過數人豈能遍知天下之士雖輾轉詢訪只亦得之私言未如公舉之審實也唐則天以僭竊之政務求多士以收人心廣令臣寮舉薦兼亦人得自舉選任之道固為太冗然猶多得賢俊下無遺材故姚崇宋璟之徒相繼而出開元之治實有頼焉況當陞下刻意勞心興治補弊之際若不敷求賢才與之共政則何以致百揆時叙庶政惟熈者乎求才之術莫若特詔内外之臣各舉所知其大兩省已上於省府諸路職司人中舉堪充職司知州等人及諸路監司臺諫省府舉堪充轉運判官知州等人亦許舉堪充清要之人毎舉三員並於舉章之中終身保任一有不職與之同罪及前來應詔舉到未曽進用及臣寮所舉自代之人一處參較凡是庶官有闕便可選擇進用如此則俊傑彚進官無曠職上可以輔成聖政下可以激勸多士知諫院陳㐮上奏曰臣伏見今嵗科塲開封府就試進士三千二百七十餘人合解三百十人為額國子監一千六百餘人合解百人為額皆是十分之中未取其一英俊既多而剽辭挾書真偽淆雜若不精加考校去留之際不無差誤孤寒得失所繫不輕貢舉條制雖令考試官通考縁三場卷子數目稍多自來承例分定方始考校得失其間好惡不同未必取捨皆是洎至考到合格人數便即類聚奏號更不將退落卷子令衆官一處衮同再考輕易漏略非惟不恤舉人進取之艱難殊不體認朝廷取士之意臣今擘畫欲乞今來考試官初考校時權令分定卷子除考到詞理優長已合格者及辭理紕繆與犯不考式者已係黜落外將逐官退下中等卷子在去留之間者令衆官一處公共看詳與近下合格卷子比校優劣然後升黜仍將三場卷子連粘通考所貴得士之實不至差繆所有考校雖無日限校量一月之内以詩賦䇿論通考毎人一日考得一十五副至二十副已來如將退落下等卷子更令衆官參考須至更展日限方得了當今乞將就試舉人卷子與考試官員數均定日以二十副為凖自引試初場通計人數與五七日限通考退落卷子以引試日為始計其日限如更日限未足未得奏名所貴考校精詳不失辭業之士襄又上奏曰臣竊見外州軍不係免解舉人近日甚有經中書待漏院及攔截宰相投狀陳乞免解未䝉指揮施行其間多是逺方孤貧羸老之人徒歩入京羇旅困窮深可憐憫訪聞有經三四十年已前曽與鄉薦潦倒場屋今來為見陛下龍飛初榜嘉祐二年已前府監一舉進士尚許免解以此扶衰戴白奔走逺來有覬望一例推恩之意若令白首空歸古人所歎欲望陛下憫其衰暮之年無所成立因兹首牓特與推恩應進士經三十年諸科四十年已前曽與鄉貢不以舉數場第見在京師者許依府監免解人例與南省收試如不願就試者並賜一本州文學助教之名不理選限使歸田里霑朝廷一命之榮必知上戴聖仁死無遺恨抑以見陛下隆儒優老之意不為無勸也元豐三年判三班院曽鞏請令長貳自舉属官奏曰臣伏以陛下本原周禮參之以有唐六典之書考諸當世之宜裁以聖慮更定官制以幸天下臣誠不自揆欲少助萬一令無足取者亦足以致區區愛君之心竊觀於書其在堯典稱堯之徳曰平章百姓百姓昭明則平其賢不肖功罪之分而章之以爵賞使百官莫不昭明者此人主之事也其在說命曰惟說式克欽承旁招俊乂列于庶位則承人主之志廣引人材進諸朝廷者此宰相之事也其在冏命穆王命伯冏為周太僕正其戒之曰慎簡乃僚無以巧言令色便辟側媚其惟吉士則使得自簡属僚以共成其任者此諸司長官之事也其上下之體相承如此所以周天下之務盖先王之成法也故陸贄相唐陳致理之具以謂百司之長至於副貳之官與夫兩省供奉之職請委宰臣叙擬以聞其餘臺省属僚請委長官選擇指陳材實終身保任其以舉授之繇各載除書之内得賢則有進考増秩襃升之賞失實則有奪俸贖金黜免之罰非特搜揚下位而已亦以閲試大官其所取之士既責行能亦計資望此贄之大指也贄於經畫之材近世未見其比其在相位所陳先務如此質之於古實應先王之法施之後世可以推行誠古今之通議也陛下隆至道開大明配天地立人極循名定位以董正治官千載以來盛徳之事也創制之始新命之官任之以彌綸衆職所繫尤重其所更革著於甲令或差若毫髪四方受其敝或誤於須臾累嵗不能救則於選用之體尤不可假非其人且臺省長官僕射尚書左右丞侍郎御史中丞皆國之重任陛下所選擇而授今尚書既領天下之事郎員外郎凡二十四司用吏㡬百員其餘属佐尚不在數中若使本司長貳之官自郎以下員有未備皆舉二人以聞以陛下之明其於羣臣材分無不周知取其所舉擇用其一其餘書之於籍以為内外之官選用之備庶㡬為官得人足以上副陛下作則垂憲非常之大志且本朝著例御史中丞知雜至於省府之長固得自舉其属而館閣監司牧守之官亦嘗屢詔近位皆得薦用所知名臣偉人往往由此而出則推而廣之求於故事實有已試之效其所薦之士采用其一其餘書之於籍以備選擇猶舊闕御史一員聽舉二人其不中選者亦以次甄進則稽諸累朝亦故事也伏惟陛下本冏命太僕慎簡乃僚之意采陸贄臺省長官舉吏懇懇之論推本朝已試之法使先王之迹自陛下追而踐之如此則任衆之道隆進賢之路廣踈逺之士懐材者皆得彚征要近之臣奬善者皆得自達以陛下之臨照誰敢不應之以公以陛下之考覈誰敢不赴之以實既得其人授之以位然後陛下以公聽並觀分别淑慝以執中主要信行其賞罰如此則允釐百工庶績咸熈可無為而致堯之平章百姓百姓昭明如是而已如臣之說為可采者其推行之法陸贄所陳惟陛下察其踈宻詳加損益鞏又請令州縣特舉士奏曰臣聞三代之道鄉里有學士之秀者自鄉升諸司徒自司徒升諸學大樂正論其秀者升諸司馬司馬論其賢者以告于王論定然後官之任官然後爵之位定然後禄之論定然後官之者鄭康成云謂使試守任官然後爵之者盖試守而能任其官然後命之以位也其取士之詳如此然此特於王畿之内論其鄉之秀士耳故在周禮則稱鄉老獻賢能之書于王也至於諸侯貢士則有一適再適三適之賞黜爵削地之罰而其法之詳莫得而考此三代之事也漢興采董生之議始令郡國舉孝亷一人其後又以口為率口百二十萬至不滿十萬自一嵗至三嵗自六人至一人察舉各有差至用丞相公孫𢎞太常孔臧議則又置太常博士弟子員郡國縣官有好文學孝悌謹順出入無悖者所聞令相長丞上属所二千石二千石謹察可者令詣太常受業如弟子一嵗皆課試通一藝以上補文學掌故缺其髙第可為郎中者太常籍奏即有秀才異等輙以名聞又請以治禮掌故比二百石及百石吏選擇為左右内史大行下郡太守卒史皆各二人邊郡一人不足擇掌故以補中二千石属文學掌故補郡屬備員其郡國貢士太常試選之法詳矣此漢之事也今陛下隆至徳昭大道參天地本人倫興學崇化以風天下唐虞用心何以加此然患今之學校非先王教養之法今之科舉非先王選士之制聖意卓然自三代以後當塗之君未有能及此者也臣以謂三代學校勸教之具漢氏郡國太常察舉之目揆今之宜理可參用今州郡京師有學同於三代而教養選舉非先王之法者豈不以其遺素厲之實行課無用之空文非陛下隆世教育人材之本意歟誠今州縣有好文學厲名節孝悌謹順出入無悖者所聞令佐升諸州學州謹察其可者上太學以州大小為嵗及人數之差太學一嵗謹察其可者上禮部禮部謹察其可者籍奏自州學至禮部皆取課試通一藝以上御試與否取自聖裁今既正三省諸寺之任其都事主事掌故之屬舊品不卑宜清其選更用士人以應古義遂取禮部所選之士中第或髙第者以次使試守滿再嵗或三嵗選擇以為州屬及縣令丞即有秀才異等皆以名聞不拘此制如此者謂之特舉其課試不用糊名謄録之法使之通一藝以上者非獨采用漢制而已周禮大司徒以鄉三物教萬民而賔興之亦以禮樂射御書數也如臣之議為可取者其教養選用之意願降明詔以諭之得人失士之效當信賞罰以厲之以陛下之所嚮孰敢不䖍於奉承以陛下之至明孰敢不公於考擇行之以漸循之以久如是而俗化不羙人材不盛官守不修政事不舉者未之聞也其舊制科舉以習者既久難一日廢之請且如故事惟貢舉踈數一以特舉為準而入官試守選用之叙皆出特舉之下至夫教化已洽風俗既成之後則一切罷之如聖意以謂可行其立法彌綸之詳願詔有司而定議焉神宗時知審官院蘇頌上貢舉議曰臣竊謂以今之科試取士比之往年至為詳宻往年專以詞賦為考式而學古者或詘於聲病今則詩賦䇿論通考不專於一場取捨往年雖通考三場而學經術者或困於無文今則有明經之舉往年敦樸之士或不習科舉無由自達今則有遺逸之薦是則詩賦所遺者取之於策論䇿論所失者選之於明經二者又不能盡則擢之於遺逸天下茍有懐才負藝之人靡不畢為朝廷收擢而任用之矣今明詔猶以為不足者臣竊謂其弊不在法制之失而在於措置之未盡耳夫措置之未盡其說有四一曰考試闗防太宻二曰士子不事所業三曰詐冒戸貫取應四曰取人多少不均所謂考試闗防太宻封彌謄錄是也夫封彌謄錄本欲示至公於天下然而徒致疑於士大夫而未必盡至公之道又因而失士者亦有之何則國家取士行實為先今既封彌謄錄考官但校文詞何由知其行實故雖有瓌異之士所試小戾程式或致退落平時甞負玷累茍一日之長可取便預收采士之賢否而進退之間繫乎幸與不幸往往是矣是豈朝廷之本意邪臣竊覩天聖四年仁宗皇帝詔書曰如聞舉送之士操履罕修黜於有司則紛然起謗升于科選又多以敗官由習尚於虚浮宜特行於敦戒自今諸州發解諸舉人並須考訪履行或有乖僻彰暴雖所試可取不得一例解送以此見朝廷之意先士行而後文藝也若封彌謄錄則何由辨其賢否而得如詔書之敦戒乎為今之便則莫若去封彌謄錄之法使有司得專叅詳考察一則主司知朝廷委任不疑益務盡心二則負實學者得以自明程文小疵不虞見棄三則淺陋之人固無僥倖之望至公之道無大於此議者或曰此法行之已久今多士競進一旦改革必致諠訟何以弭之臣以為士子之行莫若鄉曲最知其詳儻或素履無聞因而黜落自厭羣議復何異乎多言邪若其行完學富之人偶不預薦既知朝廷所以取之之意則人人自重不敢輕發養其亷恥異日足為嘉士其所勸盖多矣若曰南省聚天下之士不下數千人主司無由一一知其賢否雖見姓名亦何益於公選臣以謂此法宜先施之州郡亦庶㡬存鄉舉里選之遺範也望自今並委知州通判職官常加察訪本州行能之士記其姓名更相論辨遇詔下轉運司為精擇試官依常赴院鏁宿其舉人試卷更不封彌謄錄仍别差官㸃檢收納應有塗注乙處並印記訖逐旋發送試院不得稽留令試官依公考校文藝除雜犯不考式者先行黜落外其餘悉定髙下訖報州令知州通判職官同入試院共加審覆以素有聲稱著於鄉里者為先然後定其去留依額解送試官及州官若有偏曲私狥令監司嚴加按察具奏其事重行黜降如此詮擇必無幸進之人比至南省則是已經鄉里察訪設令依舊封彌謄錄只考文藝亦不容無狀之人得預奏名也其殿試考式繫之朝廷非有司所當措議也所謂士子不事所業者舉人不納公卷是也舊制秋賦先納公卷一副古律詩賦文論共五卷預薦者仍親赴貢院投納及於試卷頭自寫家狀其知舉官去試期一月前差入貢院先行考校内事業殊異者至日更精加試驗如程試與公卷全異及書體與家狀不同者並行駁放或假借他人文字辨認彰露亦便扶出永不得赴舉是舉人先納公卷所以預見其學業趣向如何亦有助於選擇也景祐已前學者平居必課試雜文古律詩賦以備秋卷頗有用心於著述者自慶厯初罷去公卷舉人唯習舉業外以雜文古律賦詩為無用之言而不留心者多矣此豈所以激勸士之篤學業文之意邪臣欲望自今舉人請應依前令投納公卷一副不得假借他人文字并親書試卷頭家狀一准舊制委知舉考試官預先看詳以偹將來與試卷叅驗是非而升黜焉如此庶㡬人知向學不為茍且之事矣所謂詐冒户貫請應者今外郡舉人赴開封府取應是也天下州郡舉子既以本處人多解額少往往競赴京師旋求户貫鄉舉之弊無甚於此雖朝廷加以峻文而終不能禁止者盖以開封府舉人不多解額動以數百人適所以招徠之而使其冒法欲革其弊莫若預為之防於罷舉之嵗令本府下諸縣察訪見今土著實有多少舉人候見得的實數目闗送貢院比校外郡人數酌中解名處量其分數别立定額外方舉人知其如此豈肯不逺數千里冒峻文而求寄貫乎其府中減下人數却乞移與國子監添起名額既已革寄貫詐冒之弊又足廣庠序樂育之風如此行之誠兩有所便也或曰府中減下人國子監又復添額則人人競赴庠序投狀其於冒妄不亦均乎是不然也在開封府則有詐名冒貫之弊於國子監自是四方俊造進取之所事體固不相類容其趨進復何害邪所謂取士多少不均者進士與制科遺逸是也臣竊以往年放進士毎榜不下四五百人自間年放牓亦常近二百人諸科大約依進士人數而制科入等者不過兩三人明經不過三五人遺逸之薦復未有定制臣以謂舉制科者博通古今貫穿經史顧其積學勤亦至矣明經者雖誦數或闕而大義多通遺逸之薦縱不能盡如詔書之所求要之皆鄉里推許之人此數科比之進士諸科初學幸中者多取之亦未為謬濫也臣伏覩新制三嵗科詔毎牓以三百人為限是進士諸科之路已廣而制舉遺逸議論猶未及之況近制明經已許均減諸科之數雖取人未多是已有定制臨時可以通融損彼而益此也臣愚欲望自今年科舉進士毎牓且以二百五十人為限留其餘五十人以待制舉及遺逸之類其制舉䇿入優等者自依常例在下等者望量添人數比類賜以出身以酬其積學之勤其舉遺逸仍望立為定制毎放牓而後下詔諸路州郡及轉運司共察訪如士人中顯有履行純固經術文藝優贍為衆人推許者或場屋黜落或邱園髙蹈咸許保薦毎路限以五人並敦遣赴京師依例試以䇿論考定髙下優者賜以科名與制舉所増人共足所留進士五十人之數下等亦望量推恩渥或與免將來文解如此則取士之路益廣而行藝之人無有棄遺奬育人材敦激偷窳上助風教不為無益也判太常寺韓維議貢舉狀曰右臣伏奉勅命議考校貢舉之法者臣謹按周禮大司徒之職以鄉三物教萬民而賔興之曰六徳曰六行曰六藝所以脩身事君事父母接兄弟親戚朋友鄉黨之道無不教也至于射御書數亦皆時所資用無非事而為之者故起而仕之則其所施設皆素業也今之士固未嘗教也而又誘之以華靡無用之文程之以誦記不講之言至于行能則澷然不省矣故及其仕也平居之所先務者今則無所施矣前日之所力習者今則不足用矣其所以時得賢俊之士而官之者幸也今欲講圖善法以變其習俗則當先去其無益者而使就其益者臣請以五事言之一罷詩賦更令於所習一大經中令人通習某經問大義十道但以文辭解釋不必全記注䟽取其言典雅得聖人之意者通七以上為合格一本設明經舉其所取人數與諸科相通者亦欲漸誘經生使習義理之學而比來中選尚少盖進士患於不能記誦諸科患於不能解釋今請少損貼墨之數以來進士所放諸科既少則其翹然者必須力學以趨此舉又諸科試大義常在末場多是合格人數已定雖有大義不中程亦難復黜落今試大義條中有不指義理而但引注䟽備為通及六分為粗當更議今請稍移大義在前黜其不通者則記誦者不得專進此皆所以儆厲諸科使漸就明經也一州府軍監諸學毎生徒百人以上生徒數以秋賦就試人為准特置教授官一員不及百人以職官若曹官兼領教授官委兩制三館國子監官雜舉籍其名遇其闕則授之一毎當解發自知州至凡當職官吏及雖非當職而仕者及雖不仕而以道藝處鄉里者并應舉人大㑹州之聽事或學之講堂令衆評行義尤異者以品目髙下書為一狀無尤異者聽勿舉俟程試定合格人數如所舉人在得中者升其名於上列仍以名移南省試日稍加優異優異法别當議殿試亦如之一於常科之外别開數路如近嵗敦遣之比其人材繫自朝廷所欲得者臨時命科凡此皆變舊法之尤無益者而稍加奬厲之道也若夫道徳貴於朝廷則下知所慕矣教化明於太學則四方有所成矣惟在陛下與一二執政之臣力行而詳處之則明詔所謂一道徳而奬進人材斯無難矣厯代名臣奏議卷一百六十六
