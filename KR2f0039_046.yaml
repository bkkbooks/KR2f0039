body:
  text: 厯代名臣奏議卷四十六明楊士竒等撰治道宋髙宗建炎二年胡銓對策曰臣聞國將興聽於民將亡聽于天湯武聽於民其興也勃焉桀紂聽于天其亡也忽焉方桀紂之未亡也謂已有天命曰我生不有命在天彼以天命為真可恃偃然自謂子孫帝王萬世之業也及其亡也諸侯歸商者三千資以勝夏則成湯以興諸侯歸周者八百資以勝商則武王以興夫湯武聽于民而反以興非民興之也修人事以應天是以興桀紂聽于天而反以亡非天亡之也恃天命而虐于人是以亡興亡之端厥監在民而不在天甚易曉也而中材庸主每每反之此忠臣義士之所以深悲天下之所以亂亡相尋而世主不悟也陛下起干戈鋒鏑之間適丁天下倥偬不暇給之秋外亂內訌憸人柄朝邊方有風塵之虞中原有新羈之馬赤子入無知之俗民愁盜起禍稔蕭墻王室搖搖然幾如一髮引千鈞當此之時可謂亂甚矣臣愚謂陛下宜焦心嘗膽聽于民之時也而陛下策臣等數十條大槩質之於天首曰蓋聞治道本天天道本民又曰豈朕不德無以動天又曰何精誠之弗效禍亂之難戡也似皆聽于天者此臣等所深疑而願為陛下直言無諱也伏讀聖䇿曰蓋聞治道本天天道本民故視聽從違不急于算數占候而惟民是察持以至誠無逺弗届古先哲王罔不由斯道也臣有以見陛下聽于天而不聽于民之弊也臣謹按春秋禍變之由與祖宗已然之故事為陛下陳之為春秋之說者曰正次王王次春王者上承天之所為而下以正其所為此漢儒傅會之論臣謂不然臣聞聖人作春秋尊一王之法為萬代訓未嘗有明言天者蓋謂天道難測若深言之則遂以為茫昧莫究而忽于天若淺言之則天下後世遂溺于隂陽灾異而蔽于天聖人推變于天常與人事雜而書之至其變見禍敗或應于數十年之後甚則或不旋踵而應國家將有失道之敗天乃先出灾異以譴告之不知自省又出怪異以警懼之尚不改悔覆敗乃至茍無其事變不虛生若痛自惕懼側身修行則禍灾滅塞可轉為福此春秋之大凡也以此知天心之愛人君而欲止其亂也自非大無道之世天盡欲扶持而安全之此古先哲王所以持以至誠而不及于算數占候誠知夫天人相與之際甚可畏也我國家自江南平定太祖感宇縣分割生民受弊涕下惻然思布聲教以撫養之是時識者知天命固已牢不可解矣且如擇一法官細事也而太宗擇王濟則曰無或有寃濫以致天下灾任一憲臺細事也而真宗選諸道提㸃刑獄則曰一夫受寃即有灾沴夫一夫受寃宜未害也而祖宗惕然動念懼致天罰則民之不可忽而造物之不可欺也陛下龍飛之初傳􅊾四走天下莫不翕然響應臣雖不識天理以人事卜之知天意固已有在比來聖慮漸解浸不克終國勢委靡而不振生民愁苦而無聊天意向背殆有不測可勝寒心願陛下持以至誠以春秋為戒而謹持之以祖宗為監而力行之無以草茅之言而罷之則天下幸甚聖䇿曰朕承宗廟社稷之託于俶擾阽危之後懷父母兄弟之憂于攜二單微之時念必撫民以格天庶或悔禍以靖亂踰年于兹寢興在是兹又陛下聽于天而不聽于民之弊也嗚呼陛下興言及此亦知有宗廟社稷之託乎亦知有父母兄弟之憂乎知有宗廟社稷之託所與任其託者為誰知有父母兄弟之憂所與分其憂者為誰任其託分其憂一非其人則天下之大勢無復救矣臣聞天下大器得之甚難敗之甚易莫不由夫祖宗辛苦艱難以成立之莫不由夫子孫奢傲以覆墜之成立於百年而覆墜于一日遂使祖宗艱難之業並與宗廟社稷一旦成墟是以聖人作春秋於亂君亡國痛以王法繩之謹按昭二十二年書王室亂劉子單子以王猛居于皇是時新有景王之難王猛以幼冲而嗣大位劉單以庸材而相幼君社稷危如贅斿則王室安得不亂夫王室天下根本根本一亂而播遷于皇則俶擾阽危亦甚矣卒之天王播奔避子朝之難終昭公之世僅復成周至黃池之會而天下奔潰聖人獨反覆書之重社稷也陛下以單微幼冲之資獨戡多難則危如王猛左右大臣以憸佞而佐大計則庸如劉單臣恐王室之亂又甚于子朝之難矣安知江都之幸不變為狄泉之脅迫乎是陛下知承宗廟社稷之託於俶擾阽危之後而未知荆卿何羅竊發于肘腋之間願陛下思太祖得天下之難而早圖之監春秋王室之禍而慎守之毋謂懷父母兄弟之憂于攜二單微之時而遂解體也謹按襄二十八年書曰公如楚二十九年書曰公在楚又曰公至自楚竊原公如晉如齊如京師皆未嘗書在獨于楚書在何也曰楚虎狼之國也襄公如楚既非常而逾年不反禍且不測書曰在楚者蓋臣子痛君父之失所在也以今兩宮有沙漠之狩孰與如楚之危哉且襄二十八年如楚至二十九年而歸春秋深危之況兩宮暴露于穹廬三年于此矣則陛下懷父母兄弟之憂臣愚不知何以處之為陛下之計者獨不念在楚之事乎臣願慎擇賢佐惟斷惟果側身憂灾如宣王厲精綜核如孝宣鋤去亂略如光武剛明果斷如憲宗復讎刷恥如勾踐以春秋為戒而謹持之以祖宗為監而力行之毋以草茅之言而罷之則天下幸甚陛下首䇿以此中則曰府庫單匱軍費倍滋而賦斂加薄外患未弭寇盜尚多而追胥有程擇守令以厚牧養責案廉以戢貪暴命令為民而下者十常六七凡曰聚所欲去所惡者朕有未聞未有聞而不恤恤而不行也此又陛下聽于天而不聽于民之弊也臣聞治天下者正如療疾方天下之受病也府庫單匱軍費倍滋則病在血脉矣外患未弭寇盜尚多則病在腸胃矣客邪干正矣擇守令以厚牧養正猶導之以湯液醪醴而助真氣也責案廉以戢貪暴正猶投之以砭劑而攻强陽也如使人血脉受病腸胃又受病而導之以湯液醪醴者或失節焉則疾益甚疾既甚而投之以砭劑又非良焉秖速其死耳醫國者亦然故方天下受病之際府庫竭矣軍費滋矣外患熾矣寇盜多矣乃牧之以不賢之守令擾之以不才之按廉是猶疾已深而投之以野葛豈不殆哉臣請厯言其弊臣聞府庫單匱軍費倍滋者以兵冗而坐食也以師老而費財也以生寡而食衆也三者今之最大弊也自古兵無事而食則不可使聚聚則不可使無事而食其勢然也昔漢之兵制有踐更之卒而無營田之兵京師亦不過南北期門羽林之兵而止邊境有事諸侯有變皆以虎符調發郡國之兵事已輒罷是以其兵雖不知農而天下不困兵甲未嘗聚也唐置十六衛無事則力耕而積粟非但自贍且以廣縣官之儲是以其兵雖聚于京師而天下亦不困者未嘗無事而食也我朝沿近代養兵之法中下一兵衣糧給與嵗約五六十緡太祖得周代之兵中外止十有二萬而已至乾德間中外止十萬兵耳太宗盡有天下添兵至多亦止三十餘萬真宗當全盛之時乃始五十餘萬當時軍數非多尚慮耗蠧調度命汰疲冗周瑩不奉減兵之詔則怒而罷之向敏中奏軍額漸多則反覆詰難之誠知夫兵無事則不可使聚聚則不可使無事而食臣故曰兵冗而坐食今之最大弊也按兵法興師十萬日費千金以日計之費已如此況今曠日彌年兵拏不解百人仰食縣官則挾千夫之名大槩雖數百為輩要歸則無異于數十萬之兵而坐食連年無毫髮功則農夫之力安得不困饋餉之卒安得不疲謹案莊公八年春師次于郎夏師及齊師圍郕秋師還春秋書用兵未有厯三時而後反者獨于此書春書夏書秋惡莊公無故勞師興圍郕之役卒之郕降于齊而魯師無功比秋乃還故書曰師還者惡其夏已無功秋始班師暴露滯留之甚是後二十八年有告糴之舉其禍正基于圍郕之役矣以今征役之久動至纍年校之春秋三時而反者不已太甚乎則府庫竭而軍費滋自不足怪臣故曰師老而費財者今之最大弊也兵冗而坐食師老而費財加以生寡食衆入少用多陛下雖賦斂加薄而州縣之追科實煩何則用度既匱則其勢不得不取于民矣臣前所謂追胥有程而外患未弭盜賊尚多者其弊在朝廷多過生靈多怨使朝廷無過生靈無怨則外患寇盜亦何名而動哉蓋自古姦雄如陳涉吳廣之起于秦赤眉黃巾之起于漢蘇峻之亂晉安史之亂唐本皆巨盜凶渠伺朝廷之過執以為辭幸生靈之怨唱而稱義遂至迭起州縣劫令殺守相挻為亂今明盛之朝豈有大過竊聞長老之談或謂戚近撓權姦臣盜柄刑賞不必行小人不盡除綱紀不甚振此豈過之漸邪何則自古亂天下國家多自戚近撓權如漢之諸呂竇霍唐之諸武韋張竊弄朝柄一敗赤族國家俱破今乃有肺腑領樞柄戚屬將衛兵漢南北軍之禍其監不逺儻不少戢是增朝廷之過而起姦雄之膽大亂之後豈宜復然晉趙王倫石勒之徒心窺人主口責宰相實姦雄伺過而後動不幸因之以饑饉加之以灾荒生民愁苦無聊則姦人乘隙奮飛血視千里此外患所以未弭寇盜所以尚多是雖追胥有程何以救其亂謹按昭十一年楚子虔誘蔡侯般殺之于申蔡般弒逆之賊王誅之所必加春秋反惡楚靈何也曰討蔡般可矣誘而討之此匹夫之賤行春秋所甚惡也前日下詔書招納叛亡許以不死此輩皆投戈請命謂陛下示以大信也然而陽示以信隂加以刑是誘討也陛下為人父母奈何以天子詔書為誘人之餌臣恐大信一失則後來以招降為悔自今上下猜忌如寇讎聚處得間則更相魚肉惟先發者為雄耳何怪乎寇盜之未弭也臣前所謂擇守令以厚牧養而守令多不賢者朝廷輕守令也責按廉以戢貪暴而按廉多不才者朝廷輕按廉也守令一不賢則郡縣受禍按廉一不才則守令敢于為姦故責守令在擇按廉此祖宗之成法也太祖太宗注意守令尤切太宗嘗親選諸州長吏又親書其厯戒曰公務刑政惠愛臨民奉法除姦方可書為勞績因顧錢若水曰朕暑中書此豈不勞乎蓋為任官擇人以安百姓耳嗚呼太宗不憚盛暑而親札賜行今守令則未嘗有召對者太宗躬自選擇而延見便殿今乃有付吏部而注擬者是朝廷輕守令也朝廷輕守令則守令輕郡縣郡縣之職一輕則牧養之方盡廢使要近州縣或非其人彼畏朝廷耳目之近尚憚不敢逞若逺方細民雖使盜跖為之守檮杌叨餮為之令斯民雖千百為輩號呼聚罵朝廷不知其為害豈不大哉臣聞太祖以錢文敏知瀘州戒之曰比聞郭思齊掊斂不法恃其遐逺謂朝廷不知耳至則為朕鞫之夫瀘州去京師四千餘里而郭思齊不法太祖已盡知之今州縣稍逺者其守令過失朝廷乃不聞則逺如瀘州者陛下必不䏻知矣彼何憚而不為盜耶然則所賴以糾察其弊者尚賴按廉耳如使按廉又非其人則其禍可勝言哉臣聞太祖以按廉之職出為朝廷耳目或由聖選或令舉充選之既艱責之亦重凡寬一按廉是壞一路之事一路不治是使數百萬軍民受殃自太宗即位厲精求理詔轉運使考核職任之廢舉又遣使察廉官吏之汚潔如劉文質察舉部內官吏則有遷移之寵如王德裔部內不治則有黜爵之罰賞罰如此其嚴則按廉振威按廉振威則守令振職厥今守令不職是按廉未得人也往者遣使撫諭諸道天下想望風采以為行被大惠卒之廚傳騷然公行賄賂甚者責子女于郡縣輦家屬以偕行雖官以撫諭為名而民有供輸之苦守令之外復增一蠧夫逺方細民不幸遭不賢守宰終嵗抱寃引領輶軒之出以雪其憤而按廉又不才是使終身懷寃而莫之控訴也則民安得不多怨而易動此姦雄所以竊發也謹按春秋閔元年齊仲孫來聖人嘉而字之重其將命從宜以安鄰國之難方閔之初叔牙慶父媒糵魯禍閔公始立國人危如贅斿齊人可折箠取之當是時魯之輕重在齊仲孫乃䏻說其君務寧魯難卒使閔不失國而魯人以安湫之力也經書仲孫之來喜其一出而民安存魯也以今兩河淮甸兵革之餘豈不甚于魯國之難而按廉之出未聞如仲孫以務寧魯難為懷者以春秋之法責之則罪人矣臣故曰守令不職是按廉未得人也夫以守令既不職而按廉又失職如此則陛下命令為民而下雖十常六七而壅遏詔書者十常八九矣是陛下有恤民之詔無及民之惠州縣知有守牧之令不聞有天子之詔三數年來邊防用兵凡百科斂不以四方有無物之處但嚴令督之近海州軍例科鎗幹居山州縣則買鵝翎有司既不辨有無州縣或罕䏻條奏官取一物民費數倍且如前日勸誘一事監司責辦于郡郡責辦于縣縣移文于鄉假軍期急速為名迫若星火小有不至則械繫苦掠人皆畏死其敢有辭是名為勸誘而實暴斂之監司郡守但務上供以悅朝廷則忽而不知省宰相大臣但務足用以悅陛下則知而不敢言上下相䝉民窮無訴是陛下恤民之詔雖多于孝文而天下乾耗乃甚于孝武傷和召怨咎將誰歸臣聞咸平中議改元赦書頗多蠲免或謂三司必以惠澤太廣為言真宗責曰非理害民之事朝廷所不可行若赦令既行必使良人受賜矣時方午雷震帝惻然曰豈赦令少及民之惠上天以雷警朕邪嗚呼祖宗以赦令未遍懼速天罰則陛下命令多壅實悖天心其害殆不為細願陛下以春秋為戒而謹持之以祖宗為監而力行之不以草茅為嫌而罷之則天下幸甚陛下中䇿臣以此又念迎親之使接武在道而敵情未孚保國之謀刻意在兵而軍勢未張躬純儉以敦本而驕侈之習未悛擴大公以示訓而私枉之俗尚勝刑賞不足以振偷惰之氣播告不足以革狂悖之心田畝未安旱蝗害嵗豈朕不德無以動天抑政令失宜而民以為病乎何精誠之弗效而禍亂之難戡也此又見陛下聽于天而不聽于民之弊也臣謂陛下躬純儉而驕奢弗悛者是陛下未必純儉也擴大公而私枉尚勝者是大公未必䏻擴也賞罰不足以振偷惰是大柄下移也播告不足以革狂悖是危亂之兆也田畝未安而旱蝗害嵗則生民失職而怨沴並作也若乃遣迎親之使而敵情未孚則臣竊有說焉臣聞慶厯中契丹聚兵境上遣其使蕭英劉六符來聘是時使來非時而兵既壓境中外忿怨仁宗皇帝命宰相擇所以報聘者得左正言富弼片言折六符之謀卒挫其主自景德以來北方無事八十餘年于此矣豈惟弼之力哉是時宰相則晏殊參政則范仲淹樞密則杜衍韓琦諫官則余靖歐陽修皆天下之所仰望而北敵之所畏憚者彼知朝廷有人故弼之計得而敵計不得逞以今廟堂之上宰相有如晏殊者乎參政有如范仲淹者乎樞密有如杜衍韓琦者乎諫臣有如余靖歐陽修者乎臣知陛下必無此等人物矣而欲求敵情之孚此臣所大惑也臣聞猛虎所以百獸畏者為爪牙也使棄爪牙則孤豚特犢皆得搏噬譬之國無徑兵則蕞爾之區皆為勍敵故春秋雖惡窮兵之禍至于兵不素養而取具臨時者又深罪之謹按僖二十六年齊人伐我北鄙公子遂如楚乞師公以楚師伐齊取榖說者曰乞重辭也重師也臣謂聖人非唯意在于重師蓋其惡魯之無備也夫齊為魯難久矣自甗之役齊敗于宋而魯不救是時孝公有切骨之恨至二十六年春侵我西鄙怨已結矣為魯計者正宜早夜預防常若寇至乃恬然熟臥養成腹脅之疽根不旋踵而齊人伐我北鄙矣乃至乞師于楚以取榖焉假夷狄而伐中國不可之最大者也以今敵勢大張害甚于齊而兵不素養乃甚于魯議者乃欲借助兵于髙麗何異乞師于楚以伐榖者哉是陛下徒知軍勢之未張而不知兵將之未練可為陛下痛哭流涕者此也國初劒南交廣各僭大號荆南江表止通貢奉西戎北狄未盡賔服太祖垂意將帥命李漢超等守關南命郭進禦并寇命姚內斌守慶州以為既得名將非厚通其意無以得其死力故許收逐郡關征酒𣙜之利不惟養犒士卒兼使豐富其家又慮所費不足仍許圗回其家屬在京師者並厚撫之則將帥之心更無私慮但專力邊事而已又慮奏陳之事未盡機要時許入朝自陳至升殿賜坐又復厚賜遣之以故邊臣多富于財得以養募死力使為間諜盡知蕃夷情狀多致克捷二十年間無西北之憂平西蜀復湖湘下嶺表克江南盡得東南之地雖諸將之功實太祖馭將之力也以今將佐偏裨其雄挺孰與李漢超其才略孰與姚內斌其鎮重孰與馬仁瑀其運籌決敵孰與韓令坤以陛下駕馭諸將孰與太祖然而借之重權祿之顯秩賜之重賞其恩禮已過先朝數等矣是陛下擇將不如太祖而恩禮則過之適足以啓諸將之驕心而長姦臣之觖望假令收復兩河迎還二聖陛下何以加之夫戰勝之兵勇智百倍敗亡之卒沒世不復蓋所以戰勝者氣也今之士不戰而氣已索此天下之大憂也昔者六國之際秦人出兵于山東開關延敵六國之師皆逡巡不敢進然長平之敗廉頗猶䏻收拾餘燼北摧栗腹西抗强秦振刷磨淬不自屈服是時秦人圍邯鄲梁王使新將軍如趙欲遂帝秦而魯仲連慷慨流涕深以為不可非徒惜帝秦之虛名惜夫天下之大勢有所不可也而議者乃謂宜尊奉敵國不可一觸其意陛下何不以魯仲連抗秦之事諭之然則何怪乎軍勢之未張也夫春秋何為作也為天下無王而作也周衰天下不知有王陪臣竊國命家臣僭大夫聖人有憂之作春秋以代王之賞罰書天子書王書天王者誅賞之大柄也書天子書王皆其常稱也其曰天王則至大之稱天王與周官司服所稱天王皆以嗣君之初君道未著人心未寧正危疑之機大姦之所伺非常之時故大威武以防之稱天王者大威武以防天下之時故曰非常也然則又書天子書王何也曰春秋作王者威權喪矣大政大法諸侯擅而行之護强恃衆迭相吞據是本末大弱之世名分大亂之時非剛健大過之才若九二焉不足以震其弱非毒衆窮討之役若唐太宗焉不足以戡其亂故仲尼于春秋凡有出于王為之者皆書天王言于斯時王之所為當大誅賞不可循常道冀後世興王之知變也是時吳楚之君皆鴟視虎踞僭號稱王諸蠻羣酋洊據中土如此則文辭之告猶可治之也歟霸侯暴國迭相傾噬伯子之存不䏻十數如此則誅賞之令猶可治之也歟故曰有用我者吾其為東周乎東周僅存禮文而已非撥亂反正之道也故春秋必書天王者正賞罰于大亂之時也若事非王為但從諸侯之稱只書王者禮之常也其曰天子者所謂至貴以親諸侯也莊王不書天王以其寵逆賊之人不足以當至大之稱故去天字以重其譏重莊王之譏則魯桓之罪彰矣春秋大逆外始于州吁內始于魯桓聖人著其惡如此若曰世大亂則從惡者衆趨善者鮮善若不豫則是賞不足以有勸大姦大惡不加誅則是罰不足以有懲賞罰不行而䏻興衰撥亂者無有矣陛下臨御之初正春秋危疑之機稱天王以臨下之時大柄大權乃悉竊弄權臣之手太阿倒持收之良難是陛下有春秋之亂而無春秋之賞罰則何以駕馭羣雄而平大亂也竊觀太祖太宗所以取天下其要在賞罰二事而已當時賞則常薄刑則常嚴方澶淵之役李繼隆有疾戰破敵之功但加開府階爾臣嘗怪真宗何賞如是之薄也其深意以謂既殺敵將而不䏻破其衆此將之可責也有將帥之寄而獨賞內臣不可以為後世法此所以薄其賞一也又以自古宦者領兵未嘗不為亂如太宗朝內侍王繼恩出平蜀亂大有功止受宣政使爾謹守先帝之法而不敢違此所以薄其賞二也至馭之以刑則未嘗不嚴且如主將戰沒則降黜别將如王繼勳者誅戮親兵如荆罕儒者威令如此嚴則人皆死力求賞故太祖兵法罪在不赦而春秋兵法尤嚴于馭軍城濮之役楚師敗績則得臣死之書曰殺其大夫得臣罪在得臣也鄢陵之役楚又敗績則子反死之書曰殺其大夫公子側罪在子反也二子皆以失律喪師不逃重戮則見夷狄用兵其刑賞常嚴而中國常寬此夷狄所以常得志成襄之後中國纍纍受制于吳楚者抑有由矣厥今軍勢未張而動見敗衄是有春秋之亂而無春秋之賞罰臣故曰賞罰不足以振偷惰則是大柄下移也如使大柄一移則陛下徒擁虛器而已何怪乎播告不足以革狂悖也然臣愚不識狂悖者為誰謂前日詆忤權臣者為狂悖乎謂左右便嬖為狂悖乎謂前日詆忤者為狂悖則臣不敢奉詔如謂左右便嬖為狂悖則陛下豈不䏻斷然而去之哉竊料陛下所不䏻去之者則是推委權臣之弊也自古以推委臣下為盛美然亦或以治或以亂漠髙祖推委羣傑則治至其後推委王鳳王音至于王莽則亂光武推委二十八將而取天下則治至其後推委后族至于董呂二袁則亂魏委荀彧則治至委司馬則亂唐文皇駕馭英豪而取天下則治至明皇推委李林甫楊國忠則亂初以推委而天下治終以推委而天下亂何弊之然哉當推委之際超擢十人上從其九是九分之恩出于下矣如此則數年之間左右前後皆權臣之黨也若黜削十人上從其九是九分之威出于下矣如此則數年之間中外逺近無敢忤權臣者以故忠義解體而上之勢孤矣前日將相大臣放意誅戮寃及無辜陛下不得一舉手此豈推委之弊邪明皇天寶之禍未大逺也此可不為寒心哉厥今天下大體皆壞獨祖宗德澤未泯人心未厭譬羸病之人厭厭待盡獨氣血尚在爾如使人心一離則是氣血又將絶天下無復可言者矣而陛下以田畝未安旱蝗害嵗為患則是生民失職人心將離氣血將絶之時也謹按春秋灾異變見常與人相符灾異見于上則禍敗應于下猶鐵炭之低昂見效可信者也凡春秋書螽者傷旱蝗之害稼也然書螽凡九而哀公十數月之間凡三書之甚之也甚之者疾其害民之甚也按是時十三年之間而帥師伐某侵某取某戰于某比他公為特甚干戈至此而糜爛其民矣生靈至此而為血肉矣黃池之會夷狄之盟中原天下日趨于亡矣乃復暴興田賦民怨禍稔嵗大旱蝗人有艱食之苦聖人于此不一年而三書螽傷之也是知旱蝗之患實兵戈怨毒之餘所由作也比年以來敵人橫行干戈爛熳而不息未嘗一年間不戰生民日委頓四夷日熾肆天下不知有生之樂幾年于此矣創痍之民肝腦塗地邱壠發掘辜及朽骨胔腐血流者不知幾億萬生靈之命陛下不得而見也士卒死邊野之外婦哭其夫母哭其子寡婦弱子抱負轊車望寃弔哀于千里之外塗悲巷泣怨痛徹天陛下不得而聞也陛下不見其所不見不聞其所不聞驅萬死之地而卒無一毫之利積毀銷骨積怨傷和隂沴作而灾疫興何怪乎田畝未安螽蝗之害嵗也今者兩河淮甸赤地千里飛蝗蔽天公卿大臣熟視無計而請為遣蝗之舉嗚呼正使蝗而可遣是移腹心之疾而置諸股肱不知他境之民何苦而加之哉臣聞天禧中真宗以嵗旱蝗秋稼不稔慨然動念實慮政令闕失有爽天意因詔削茶鹽條禁之峻刻者以懲旱蝗之變以今政令闕違豈惟茶鹽一二事而已臣知旱蝗為害實天意大警陛下也而議者尚謂天灾流行由厯數運會非政令失宜之咎嗚呼天下有善則歸諸巳天下有禍則歸諸天此何聖賢之用心也願陛下少戢誅討少息調發練兵實粟養吾鋭氣而全中國之力以銷旱蝗之灾毋以精誠弗效而怠荒毋畏禍亂難戡而息志以春秋為戒而謹持之以祖宗為監而力行之無以草茅為嫌而罷之則天下幸甚陛下中䇿臣以此又念伊欲復親族奠疆埸清寇攘善風俗使百姓安業而亹亹迓衡何修而可以臻此臣于是見陛下真欲興衰撥亂以起天下之病也竊觀陛下首懷父母兄弟之憂中念迎親之使至此又以復親族為言是陛下痛念二聖鑾輿暴露而未有迎復兩宮之䇿也夫漢髙祖所以還太公于椘軍豈獨侯生力哉臣嘗料髙帝有勝項王者五以兵强力壯則楚不如漢以三傑為用則楚不如漢以駕馭諸將則椘不如漢以關中廩粟之富則楚不如漢以關中形勢之重則椘不如漢五者皆項王所不如則何苦而拘于太公哉以今凋弊之餘無漢之兵力無漢之三傑無漢之駕馭無漢之廩粟而又違逺上都棄去兩河則又無關中之形勢而欲求親族之復雖使如侯生千百輩往焉臣知其無䏻為也故臣謂欲復親族莫若復兩河不得兩河則親族不可復今陛下以奠疆埸為念是欲復兩河也兩河得失係天下輕重唐神堯起晉陽以一旅取天下而後世子孫不䏻以天下取河北其難如此晉于春秋為大嘗驅役諸侯至秦萃鋭兵之晉乃得韓遂折天下脊韓信聨齊有之故蒯通知漢椘輕重在信宋武號英雄得蜀關中盡有故疆十分之八然不䏻使一人渡河以窺邊是兩河之地王者不得則不王霸者不得則不霸賊得之則天下不安臣故曰不得兩河則親族不可得而復也咸平中真宗與王濟極論邊事濟言蠢兹小國敢爾慿陵蓋謀謨當位之臣未有昔人之比且國家所恃獨一河耳此誠急賢之秋不然臣懼北戎飲馬于河渚矣嗚呼濟之言誠切中今日之病臣謂欲復親族而收兩河亦誠陛下急賢之秋當以濟言為監也然當今最大患者親族之未復疆埸之未奠寇攘之未清而臣愚所最患者風俗之敗壞也風俗天下之筋絡也譬人之身所恃以維持氣血者唯筋絡耳風俗一敗則筋絡又絶矣漢唐之亡其弊皆風俗之先壞也故臣嘗論東漢之亡與李唐大略相似東漢之季閹童亂政毒被生靈豪傑據郡而起天下遂裂為三國唐末宦者蠧于內藩鎮潰于外天下遂磔為五代然三國之士其好惡去就尚有可觀雖天厭漢德而劉氏猶擁虛器亦卒以禪代終五季之亂其臣皆凶狠頑鄙戕賊君親專為梟雄豈天于東漢之季獨多君子而唐末専為小人哉誠風俗染激然也中原亂亡自古更迭亦天下常事蓋未有不亡之國然當其時有推變于天而言者有以人事前知而言者有握節以死者有衛社稷而死者有憤國破亡猶奮不顧并家族破滅者亦有知幾之士掛冠而去之不蹈其禍者我國家涵養天下之久士大夫受君父之賜亦甚久一朝國家有難自公卿劒履間以及下之百執事凡幾人自王畿以達四方郡邑有位凡幾人前知而言者為誰死名節死社稷者為誰破家狥國者為誰知幾而掛冠者為誰推變于天而知其將亡者又復誰也方晉南渡士流尚有聚于新亭傷國之衰對江山而下泣者周之東遷尚有不恤其緯而憂宗國之殞者以今兩宮播越則非直東遷之辱也而陛下倉皇逺狩則非直南渡之迫也誰復有泣對江山而憂宗周之殞者哉自晉風俗之壞而海內橫潰生靈魚肉甫二百餘載以晉監今其禍可勝言哉昔田橫一豪士恥北面臣漢遂自殺從者五百餘人皆死之無一人降漢者諸葛誕魏室一叛臣及其既敗所養死士三百人就戮皆曰為諸葛公死無憾今之士大夫蒙國厚恩何啻齊卒之受恩于田橫死士就養于諸葛哉而忍恥含垢視君父之僇辱甘心焉嗚呼縱不愧田橫之客又獨不愧諸葛之奴邪臣故曰今之最大患者風俗之敗壞也風俗一敗則筋絡又將絶矣願陛下以春秋為戒而謹持之以祖宗為監而力行之不以草茅為嫌而罷之則天下幸甚雖然陛下䇿臣等數十條皆當今之大弊臣既已極言之而聖䇿尚謂子大夫涉艱險以副詳延誠亦勤矣其必有至言欲為朕陳者其悉言之無隱若乃矜空文而無補于實咎既往而無益于今者非朕之所欲聞也其以朕所未聞而切于時者言之朕將親覽焉臣又見陛下真有意求苦口之言以救天下之病也然臣觀陛下求苦口之言雖若甚切而在廷之士必不敢盡言無諱何也臣聞鵲巢覆而鳳不至直士受禍則忠臣杜口往者從東南來道路籍籍皆謂陛下即位以來不旬月之間戮直言者三有是乎豈道路之妄議乎儻如所言則傷威損德為害不淺謹按春秋陳殺其大夫泄冶說者謂泄冶以直諫被誅國之大惡是時蓋宣公九年也而十年有徵舒之禍十一年而楚子入陳不三年之間而陳國大亂嗚呼戮直言之禍而至于此然而泄冶被誅權不在陳靈而在徵舒前日議士被誅權不在陛下而在左右専殺之禍春秋大惡而況専殺直士惡又甚矣此楚子入陳所以得藉口而討徴舒則敵人乘隙將以假討惡為名而躡入陳之軌矣臣是以卜在廷之士必不敢盡言無諱也然而臣猶敢區區竭愚者竊自惟念陛下詔臣等無矜空言而陳實務則陛下知前日濫誅為過而改之是陛下樂聞其過矣臣而不言是負陛下使臣言不從則陛下負臣抑臣嘗聞太平興國中有布衣皂囊獻書者其辭狂妄太宗覽之弗罪因謂宰相曰比降詔書許言事故雖狂悖亦不加罪至淳化中武程上疏狂瞽李昉請加黜削以懲之太宗責曰曷嘗以言罪人哉嗚呼太宗樂聞直言如此而大臣尚請黜敢言之士幸而太宗不從如使太宗不樂直言而李昉之請得入焉則武程者爼上肉矣今臣纍千萬言則其罪過于皂囊之書以臣疏賤則甚于武程而有狂瞽之論使陛下樂聞讜言尚患見忌借使人主一惡直言大臣如昉者又從而媒糵之則臣言亦危矣幸陛下以祖宗為念而擴太宗納諫之量大臣體陛下之意而無李昉惡直言之心則畏避而不敢言者亦臣所竊恥也臣故曰願陛下以春秋為戒而謹持之以祖宗為監而力行之無以草茅為嫌而罷之則天下幸甚臣謹對三年張浚上言曰臣自建康抵江州境凡二十日所厯兩州六縣莫不纍經殘破滿目蕭然斷椽破瓦狼藉于道父老知朝廷命大臣出使扶攜逺迓感嘆咨嗟臣每見則羞愧汗顔身無所措因念今日之事皆因風教敗亡淳朴凋喪侈靡太甚天實惡之其勢非一大改革使上下內外反本還淳去華就實熙熙然復見堯舜三代之遺俗治道未易成也臣既念之深則求其所以致此之䇿竊以謂若欲撥亂反正以力拯其弊此事特在陛下明教化而以身率之于前嚴刑罰而以政繩之于後日積一日治或可圖陛下躬厯險阻纍試艱難身率之教宜優為之惟刑罰一事臣始備員二府日固願陛下赫然大明黜陟一洗而丕變之顧以時方多故人心未定驟而更革不易服從臣雖受陛下眷知之深而德望威名亦未聞于天下區區改作適取怨尤臣所以輕捨朝夕奉承之恩冒犯艱險可虞之地其意誠欲為陛下稍强兵勢先定國本異時果䏻建立尺寸之功陛下不以其不可用而尚加使令則犬馬之力深欲有為于後日也然則當今所急務在于陛下身率之更加勉强以行之而已臣願陛下早暮見天無忘誠禱思天下之所以困窮生民之所以塗炭而自反自咎身任其責衣服之尚有鮮美者去之飲食之尚有豐肥者止之文采之可以亂目者屏之讒佞之可以惑耳者逺之淡然漢然與道為一茍言之非有益于天下生靈者弗聽也茍思之非有利于天下生靈者弗及也以此而化家人以此而化天下積久而行之則可以動天下可以格人自近及逺自內及外民雖至愚豈不感格至于兵革之事雖陛下所當留意要之兵本凶器聖人不得已而用之凡所以救亂止難難止則已非陛下中心所樂而深好之也所當急務者特在于明教化耳自古帝王所以致治莫不深明此理臣仰惟陛下英睿之質仁勇之資必䏻坐進此道臣于陛下分則君臣情則父子故雖逺去天威而區區愛君之心朝夕思有以自效臣言蕪陋惟陛下裁赦浚又奏時政七弊曰臣幸䝉陛下不以臣愚不肖置諸宰輔顧慙駑下不足以奉承德意伏自惟念君臣相與莫過于誠一毫欺妄乖戾所生臣區區中懷淺陋之見為日久矣儻畏縮隱默終不以言豈惟上負陛下亦非所以格天心召和氣也是用齊沐洗心百拜以獻惟明主詳酌而行焉臣竊惟方今政事施設數年以來更張非一夙夜以思多所未曉臣謹條列其大者用備乙夜之觀僭越之罪不可以逃臣嘗謂人主之職専在論相古之賢君留意于此殆不茍然考其素履詢之國人幸而得之遂足以濟一代之用如成湯之于伊尹髙宗之於傅說文王之于太公彼其精神會遇默運于一堂之上而中和之氣洋洋乎敷洽于宇宙矣後世創業中興之君如漢髙祖世祖唐太宗最可稱者當時風雲相際附翼之臣亦莫不始終展竭各效所長豈無傷功害䏻之人隂肆間隙二三主者終不以是而疑棄之知之深而用之專也陛下踐阼九年于兹矣所倚以為腹心共斷天下之事者果有之乎所藉以振飭紀綱輔成一代之法者果有之乎為陛下牧養小民而久任其職者誰歟為陛下經理財用而首尾其事者誰歟然則國勢安得而不衰治功安得而興起也所幸陛下神聖之資長于駕御二三將帥任用不惑不以人言而遽廢不以一敗而遂黜故雖中庸之人各䏻盡力軍政可備使令不然臣未見宗廟血食之所矣此臣之所以未曉者一也臣聞自昔人君之命相也莫不相與講論天下之大計與夫修德立政之舉次第而施為故日積月纍成效可冀譬諸為室先廣基址次定規模付諸匠者以責其成一有不合安可輕委臣竊惟自建炎以來陛下選用大臣未知責以何事大臣之進說于陛下亦未知何以奉詔臣但見夫一相之入親舊之間不問賢否例叨要職而讎隙之人率多廢棄又見夫臺諫排擊多自堂除大臣因之遂為進退而陛下所以攘冦敵圗中興求人才立法度理財用治軍政則漠然皆不及之朝廷聚訟殆止私意耳此臣之所未曉者二也臣竊考祖宗崇設臺諫之意將以輔治非以擾治也慮夫四方萬里之逺人才之善惡官吏之䏻否民情之利便廟堂不能盡見而周知臺諫得以風聞而論列臣故曰將以輔治非以擾治也至于不幸而大臣之選非其人又得以力爭明辨于前蓋非懷姦觀望伺候主意而收拾細故于其後也臣請復借築室以喻之主人于此將營大室固必選求匠者授以成規凡運斤之徒得以旁招梁棟之材得以選用亦必有監視之人焉以警偷惰繩不法俾匠者得以成其功大匠譬諸宰相也監視之人譬諸臺諫也今匠者求人擇材次第施設而監視者在傍纖悉指數謂某人為不可用某材為非所宜自朝及夕紛爭不已則匠雖智巧而亦縮手不䏻為矣曷亦各守其職而務存大體姑責其成與不成乎故謂匠為不䏻立廢之可也使匠營室而俾監視者一二細擲不可也不然空為紛張徒費嵗月室何由成為主人者既不䏻成大廈風雨之所淩逼烈日之所觸犯而終不知監視者為非焉方且輟食興嘆謂匠無人不省其任之不専而聽之惑也人情失于斷大而樂于聞小每每如此今臺諫之間事或類焉此臣之所未曉者三也臣竊惟仁宗皇帝之時風俗忠厚事皆可法當時臣寮廷論大臣者所言雖行旋亦補外所以隆體貌崇教化防邪僻破朋黨也使言事之人復居要職大臣疑似之過何自而明夫惟兩出事乃顯著公議既分復加召用其用意深矣比年以來為中丞為諫議多以詆毁大臣而得之好進之徒姦巧百出或隂肆揣摩或公為反復士風薄惡莫此為甚甚者伺候人主之意隂結內臣之私榻前之語往往預聞觀勢乘時以快宿忿時有異同則使人導意謂不如是無以解主上之疑大臣之黨有聞望者則必先求細故而厯詆之使無敢議其私焉外示不畏强禦之名內懷力圖進取之計其于人主治道了不相干此臣之所未曉者四也古者設官分職凡以為民夫人主以一身而臨蒞天下捨百姓其何以有為哉監司守宰奉行人主德意而推之以及民者也治兵之官所以救民之難理財之官所以息民之力事雖不同實皆加惠元元耳祖宗時郎曹之選非纍歷親民有所不授自臺閣而出為二守者十常七八蓋使之更歷世故諳曉民情養成其材以備任用是以內外均一百姓蒙福至于執政之除則又重其事為郡守監司為沿邊轉運使為二路帥臣為三司副使正使然後預簽書樞密之選今則不然事口語者可致言官弄文采者偕升館職日進月遷驟竊要位一居朝列視州縣為冗官故有為大臣而不知民情之休戚財用之盈虛以至軍政之始末者有為侍從而不知州縣政事所宜施行者況責之以天下之大計哉或十百為朋更相汲引繼處華要不啻手拾彼為州縣之官者自視流落不復有寸進之望因循茍且民受其苦此臣之所未曉者五也當熙豐之前天下未嘗聞某年人材某時政事也蓋祖宗盛時君臣立政惟以利民是則行之非則更之而已自是而後公道不明假借名號以行其私黜陟用捨更為進退人材隨時各立門户非為國家計也夫天下之事要當惟其是而已何必曰此熙豐之失此元祐之得此紹聖之非取此去彼以彰先朝之未至乎此臣之所未曉者六也舜之罪也殛鯀其舉也用禹古之聖人示天下以至公未嘗容私意于其間也今舊出蔡京王黼之門者不問賢否一切廢罷京黼秉政踰二十年天下士夫將何所適而可乎至于元祐子孫則一切任用夫以其賢德之後物色而奬借之則可也謂其為元祐之家槩蒙進任此何理耶昔者有大功德于天下莫若堯舜禹湯未聞後世人君必求其子孫盡録之也此臣之所未曉者七也臣愚無識知誤䝉陛下知遇每思慮所及必欲盡言無隱念臣而不以告陛下誰為陛下力陳者惟是所學淺陋所見迂僻臣不敢自逃其罪惟陛下裁擇建炎間中書舍人季陵入對言事有可深慮者四尚可恃者一大駕未有駐蹕之地賢人皆無經世之心兵柄分而將不和政權去而主益弱所恃以僅存者人心未厭而已前年議渡江人以為可朝廷以為不可故諱言南渡而降詔回鑾去年議幸蜀人以為不可朝廷以為可故弛備江淮經營關陕以今觀之孰得孰失維揚之變朝廷不及知而功歸宦寺錢塘之變朝廷不能救而功歸將帥是致此曹有輕朝士之心黃潛善好自用不䏻用人呂頤浩知使䏻不知任賢自張慤許景衡飲恨而死凡知幾自重者往往卷懷退縮今天下不可謂無兵劉光世韓世忠張俊各招亡命以張軍勢各效小勞以報主恩然勝不相遜敗不相救大敵一至人自為謀耳周望在浙西人䏻言之張浚在陕右無敢言者夫軍事恐失機會便宜可也乃若自降詔書得無竊命之嫌邪官吏責以辦事便宜可也乃若安置從臣得無忌器之嫌邪以至賜姓氏改寺額此皆傷于太專臣恐自陕以西不知有陛下矣惟祖宗德澤在人心未忘所望以中興者此耳陛下宜有以結之今欲薄斂以裕民財而用度方闕輕徭以紓民力而師旅方興罪己之詔屢降憂民之言屢聞丁寧切至終莫之信臣謂動民以行不以言陛下爵當賢祿當功刑當罪施設注措無不當理天下不心服者未之有也湖州通判張燾上書略曰人主戡定禍亂未有不本于至誠而䏻有濟者陛下踐阼以來號令之發未足以感人心政事之施未足以慰人望豈非在我之誠有未修乎天下治亂在君子小人用舍而已小人之黨日勝則君子之類日退將何以弭亂而圖治紹興初監察御史劉一止上言陛下憫宿蠧未除頺綱未振民困財竭故置司講究然未聞有所施行得無有以疑似之說欺陛下曰如此將失人心夫所謂失人心者必刑政之苛賦役之多好惡之不公賞罰之不明若皆無是則所失者小人之心耳何病焉時秦檜請置修政局一止又言宣王內修政事修其外攘之政而已今之所修特簿書獄訟官吏遷降土木營建之務未見所當急也又謂人材進用太遽仕者或不由銓選朝士入而不出外官雖有異䏻不見召用非軍事而起復皆幸門不塞之故請選近臣曉財利者倣劉晏法瀕江置司以制國用鄉村置義倉以備水旱增重監司之選後多採用其言吏部侍郎綦崇禮上奏曰臣嘗觀周宣王之小雅于車攻則曰內修政事外攘夷狄復文武之境土于吉日則曰䏻慎微接下無不自盡以奉其上然則中興之效本于修政事而政事之修亦在夫小大之臣無不自盡而已今朝廷播遷庶事草創外備彊敵內鋤羣盜日不暇給而百司庶府小大之臣類多茍且偷安不務舉職姑息胥吏闊略細務纍資養譽猶襲承平之弊其間亦有孜孜奉公疚心職事者則衆必非笑指以為迂至摘其事而靳之曰了得其事便足以勝夷狄否臣切怪之且國家大體輔弼大臣任之所謂百司庶府之臣知治其一官一職而已夫使一官一職而皆治焉則事將無所不治傳曰嫠不恤其緯而憂宗周之隕為將及焉彼憂之誠是也盍亦圗其所憂而效于上歟儻無所陳其智謀以裨國論之萬一乃徒私憂過計空言廢實亦奚救于危亂哉今不及其暇時修起庶政顧以細務為不足省則大事亦將委靡而紀綱弛矣紀綱既弛而欲駕馭豪傑以興衰撥亂不亦難乎臣愚欲望聖斷深察兹弊申飭百執事之臣各揚其職無以空言憂國而妨實務庶幾細大畢舉紀律設張則內治外攘無所不可矣崇禮遷兵部侍郎又上奏曰臣聞為天下者審夫議論規橅所存而已規橅者國家所恃以立議論者規橅所待而定議論定則規橅立規橅立而國家之勢成矣議論不定則規橅不立規橅不立而國家之勢危矣夫規橅議論尤急于天下多事之際議論定則成不定則敗規橅立則存不立則亡此成敗存亡之機也仰惟陛下初紹大統適當冦敵搏噬盜賊慿凌之時凡所為議論規橅有未能定今八年之久天下之變至此已極戎狄之要雖未可得而其情已見盜賊之暴雖未盡平而其勢已蹙事固有失之于始收之于終其在今日收終之時也故臣愚竊以為今日之議論規橅宜不出三者恢復中原以成再造之功上也因所有之地而疆理之中也茍目前之安而無所為下也語其上則今之力誠未可為守其下則吾之勢不可復立惟度時量力就其中者為之中者既成則其上可馴而致茍止于下則雖志于中者有不可得矣臣愚欲望陛下發自聖志明詔大臣無取言髙以害實治毋偷茍安以玩嵗月議論審其可用規橅定其適中以此立政事以此任人材以此責功效如是而期月之間治功不成未之見也權知渠州虞允文召對上言曰臣聞聖人與天同功天不變其道而萬物化聖人不變其道而萬民順天非有心于化物也物化于一氣之周流聖人非有心于順民也民順于一德之終始蓋不變則常常則久久則安自然之理也古之聖人圗回天下持心以一慮治以終不忽其所可輕不矜其所已得御其情以求可慎之事因其事以防或縱之情亹亹繹繹純而不已其在書曰終始惟一時乃日新夫德至于日新而不變者以其一也有萬之衆尚有不順其治哉恭惟陛下得一之妙見于始終日用之際臣請有以明之撥亂反正既得天矣而不忘于寅畏解嬈除苛既安民矣而不忘于焦勞立政立事既法祖宗矣而不忘于繼述三十餘年之間勤于己而佚于人儉于國而豐于天下凡務損以自克之道無不用其至薄海內外孰不歸仁嗚呼盛哉然而天下之事一日而萬變天下之人一心而百僞變則有害正之基僞則有亂真之漸安危治忽所由分也故虞舜之惟幾商湯之慎終周成王之持盈其保治之術汲汲如此臣愚欲望陛下堅守常道益懷永圗凡一慮之萌一事之作必畏天必安民必法祖宗則君德不二治理如一億萬年之洪業永永無窮矣臣不勝犬馬愛君之誠惟陛下留神省察中書舍人周麟之論賞罰名實狀曰臣聞自古中興之君惟漢宣帝為得治道之要史臣稱之曰孝宣之治信賞必罰綜核名實嗚呼斯言盡之矣仰惟皇帝陛下以英睿之姿系隆景祚躬履多難式遏寇略事同乎創業校飾百度濟登至平功兼乎守成盛德丕烈固已超出百王上矣而臣猶區區以宣帝為言者以陛下方厲精聽斷剗除宿弊用更化于四方施之于今莫此為急信賞必罰則公道舉綜核名實則真賢興二者國家之先務雖堯舜三代之治不外是而宣帝能用之以救弊願陛下取法焉若夫雜霸術尚刑名此則宣帝之失臣不敢為陛下道髙宗時御史中丞許景衡上奏曰臣自蒙誤恩備位執法閲日滋久了無建明不獨智慮短淺言辭澀訥之故亦以陛下方圖東幸纖悉措置上關宸慮竊謂與其狂易之黷寧負不敏之罪今者駐蹕淮甸上下安寧此正講明治道興滯補廢之時也故不揆迂愚輒以見聞昧死上獻庶幾有補聖政之萬一臣竊觀方今人材未備而政事不立法度未修而宿弊尚存浮費不節而國用空虛賦役煩重而民力困弊命令不行而事多壅滯賞罰未明而人無懲勸賊盜繼作而吏民被害邊境危急而武備弗嚴姦贓未逐而貪暴滋多公議未伸而親黨害政凡此十事之利病實繫國家之安危安危所在變故難測以陛下之神武英斷必䏻成中興之業以陛下之誠心孝友必䏻迎二聖之歸其事雖曰多端其要不過十者而已惟是十事之利其講之則不可不熟十事之害其去之則不可不速講之熟則是非明白去之速則立見治效欲望睿旨下三省樞密院公共討論修復祖宗之成憲稽參士夫之公議下從民欲上取聖裁于以致中國之安榮于以釋異域之憂鬱在陛下果斷力行之而已李綱初至行在上本政論曰臣竊以朝廷天下之本也政事法度于是乎出故中書進擬門下審駁尚書奉行所以宣布天子之命令使四方禀承焉政出于一則朝廷尊而天下安政出于二三則朝廷卑而天下危天下之安危係于朝廷之尊卑而朝廷之尊卑係于宰輔之賢否與夫人主聽任之重輕其可忽乎唐至文宗之朝可謂衰弱矣武宗既立得一李德裕相之而威令遂振何哉德裕知所本故也其初為相即上言曰宰輔非其人當亟廢罷至天下之政則不可不歸中書武宗聽之號令紀綱咸自已出故䏻削平僭僞號為中興然則于艱難多事之秋所以出政者尤不可以不一也自崇觀以來政出多門閹宦恩幸女謁皆得以干預朝政所謂宰輔者保身固寵不敢以為言遂失其職法度廢弛馴致靖康之禍非一朝一夕之積也臣愚誠願陛下深思天下安危之本察德裕之言而法武宗之任人監崇觀之失以刷靖康之大耻宗社生靈不勝幸甚李光上治道劄子曰臣嘗謂帝王者神民萬物之主也以一身而寄天下之上所恃者衆心之所戴也歷考自古興衰撥亂之君未有不因乎人心而䏻有為者蓋觀人心之所與則知天命之所歸故金人之盛强或不足畏盜賊之猖獗或不足憂中原之竊據或不足慮關陕之捷奏或不足喜臣願陛下凡所舉措務合人心而已今移蹕之初扶攜之民歸往如市海內顒顒皆託命于陛下士民傾屬以觀聖化之行則今日之所施為安得不汲汲乎昔梁襄王問于孟子曰天下惡乎定對曰定于一孰能一之對曰不嗜殺人者能一之孰能與之曰天下莫不與也又曰不行王政爾茍行王政四海之內皆引領而望之欲以為君夫豈在山河之固甲兵之利土地之廣哉臣願陛下克己恭勤隆道德于上大臣守法奉公肅紀綱于下明賞罰辨邪正懲汙僞之黨以砥礪名節去姦贓之吏以惠養小民容受直言駕馭英傑如是而人心不歸海內不服未之前聞也惟陛下留神省察著作郎張嵲出為福建路轉運判官上疏略曰古之人君其患有二不在于拒諫在納諫而不䏻用不在于不知天下利害在知而不以為意陛下渡江十年矣外有勍敵之國內有驕悍之兵下有窮困無聊之民進言者多矣今皆以為陳腐而别取新竒之說任事者衆矣今皆習是以為當然而更為迂濶之事此近于納諫而不知用知利害而不知恤也為今之計朝斯夕斯非是二者不務數年之後庶其有濟國之所惡者莫大于朋黨今一宰相用凡其所與者不擇賢否而盡用之一宰相去凡其所與者不擇賢否而盡逐之宜其朋黨之寖成也右司諫潘良貴上奏曰臣嘗謂自古一治一亂不可為常由堯舜迄于五代三千二百九十餘年其間所以治者無他君臣協心各相戒飭凡所施為合于大公至正之道而已所以亂者無他君臣異志皆務因循凡所施為悖于大公至正之道而已仰惟祖宗之有天下兵不血刃市不易肆天意人心不約自歸當時制為法度立為紀綱非益于國非利于民有所弗措是以海內廓廓無事百有餘年承平既久姦臣擅權肆為蔽欺率意改作祖宗紀綱法度廢壞殆盡遂繼之以大亂陛下紹承大業于艱難之際焦心勞思欲恢復中原迎還二聖九年于兹矣然而治道殊未有以稱聖意者臣謂大公至正之道尚塞而未行也夫祖宗順此道而治其後逆此道而亂今不欲治安如祖宗時則已如必欲之可不兢兢業業朝夕唯此道之是念乎臣願陛下靜澄其心思祖宗創業之難念父兄逺狩之久憫生靈常懷塗炭之苦憤土地日有侵削之憂凡下一令行一事必先以此四者為念然後發之于政詔大臣同心協力勿以一毫私意曲狥人情斷自今日其已往者漸以公正之道更革之其方來者力以公正之道固守之如四時之有信如金石之不移則天下庶乎有休息之期也如其不然臣恐萬事寖以大壞雖無敵國外患而中國自弊矣唯陛下留神察焉歷代名臣奏議卷四十六
