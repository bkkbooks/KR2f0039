body:
  text: 歷代名臣奏議卷三百四十九明楊士竒等撰四裔宋孝宗隆興元年顯謨閣直學士虞允文論敵遂衰弱乞和四州不可棄上奏曰臣今日伏準三省樞密院劄子盧仲賢齎北界書回議用敵國禮講和其南北歸附人彼此各不發遣臣除巳施行外臣竊念敵兵盛強凌夸中國幾四十年今陛下嗣位之初敵遂衰弱通書乞和亟正名分上天右序昭若日月大勳之集實基於此而臣卷卷之忠謂陛下宜審今日之機以答天之休賜蓋敵揭榜蔡州有云歲幣舊疆如故逺近傳録竊有所議以敵所不惜者虛名所必取者實利也蓋自海陵死敵兵一散馬多死亡裒既嗣立而昏庸契丹渤海之族因得以乘其釁隙而信其讎憤中原起義之師迭作於山東兩河之間內阻外訌殆無以植立其國特其用事之臣猶欲倔強繆為大舉以要我之和不頓一戟而得地得財何敵之每能用其術而我每墮其計中也彼謂海泗唐鄧四州以兵取則有勝有負以兵守則有得有失而知中國之意常汲汲於名分之正故棄虛取實大言夸我而不知亮興兵舊約巳亡我之名分我自正之何待彼之從違而後有不正之名也士大夫懲靖康之禍不敢言兵亦垂四十年矣敵欲戰則上下憂懼如不可以朝夕敵欲和則輕於割地惟恐一失其意獨不思今日與靖康之初敵兵盛衰之勢如何官軍之可用不可用又何如也且海泗二州襟帶山東淮北之地得之所以繫其民之心而唐鄧二州利害尤重以之而守則上流之勢固以之而戰則窺洛趨汴外連兩河之民漢光武諸葛亮恢復漢祚其規摹皆出於此光武得之而中興亮不得之而馳驅於蜀漢之逺故大功終以不遂方册可考也竊意朝廷之議必不出於此而臣去國萬里偶當襄漢一面茍有所見敢不盡誠再三披露願陛下深察之如曰本朝事力未給姑從其請若敵退而歸得以全力平其內難數年之後馬益蕃庶兵財兼裕不知我所積事力能與之相當否也一失此時之機臣恐後患有甚於今日比見探報敵今以迫促之期脅我以和恭惟陛下方以祖宗陵廟中原萬姓為心必不惜一介幅紙申命大臣别與之議如其不從臣雖巳丐祠茍一日未去尚當躬率三軍嚴陳以待必不與此敵俱生天地神明實臨之惟陛下財幸允文又論不當棄四州地與敵和上奏曰臣比準朝廷行下以敵國禮講和臣輒一具奏疏敵巳衰之迹乞不棄四州之地方以冒昧日積憂惶伏奉御劄許臣以忠勤諭臣以能副陛下之意恩禮加重腹心示眷臣之欲報言之為淺伏讀聖詔所謂四郡之地敵人若許我則當遣使以欵之若不許我則不復議和睿謀閎深聖斷英果固非臣所及亦非在廷將相大臣百執事所能及也傳曰有君如此其忍負之臣尚願畢其説惟陛下幸擇竊謂自古中國之於外裔或戰或和必因盛衰之勢而用之若當戰而和與當和而戰此安危存亡之機不可不察也漢髙祖唐太宗皆起於秦隋大亂之後其所遭之時所用將相所集兵車所都勝勢大率皆略相似及天下初定髙祖和胸奴太宗征突厥其不同遽如此何哉冒頓方盛而頡利衰故也二君者豈能為天下之機特因其機而不失爾臣不知士大夫以今日之敵為盛耶衰耶方敵盛時力茍不足尚以和而訹我我每墮其計中自宣和靖康而來可迭考而究見之也彼欲取契丹始訹我以海上之盟彼未得太原又訹我以城下之盟達蘭以蒙國為患棄河南之地而訹我以盟烏珠既引兵臨淮知江南不可下又訹我以盟數十年之間凡四與我盟而率自叛之而謂和猶可恃耶彼力不足雖戰必和彼力有餘雖和必戰往事歷歷可鑒而世不悟有識者不知涕泗之橫集也彼今已衰不止於力之不足一和之後彼之力有餘不知今日之盟士大夫能保其不叛否也况海陵死舊盟巳亡皇帝者我自帝也上天之所畀付也大國者我自國也祖宗之所傳授也何有於不正之名而汲汲於正之乎姪國之稱豈無猶子之嫌未可以言敵國而四州之地與和尚原商於一帶之險皆不可以輕棄願陛下深思而熟計之當前歲之冬海陵敗於采石死於揚州敵兵散亡遁去我乘其機僅能得此四州而官軍以戰而死者幾人戰騎殁於陳者幾乘輸財發軵所費者不知其幾千萬計第功行賞所遷補者又不知其幾千萬官也而一旦忍棄之乎棄之之後敵無可乘之機如曩時又可以必取之乎使必取而得之國家之所以耗蠧費用士馬之所以散佚死傷又不知幾倍於前日也士大夫厚祿於朝者亦嘗逺慮却顧一念及此乎或者謂太上皇帝得和戎之福陛下所宜循守而不知太上當漢髙祖之機休飬民力積兵積財堅忍二十年之久以待敵之衰而以唐太宗之機付陛下於今日也繼代之功孰大焉浮言熒惑古所深慮願陛下於問安之餘從容及臣之説二聖合謀敉寧天下開聖子神孫萬世之丕基臣不勝大幸允文又論敵中情偽不可棄四州之地上奏曰臣於二月初得探報敵帥拘留胡昉等嘗於初五日奏敵必不敢執我使人巳而又報大酋取昉往燕山臣心實笑之今據探報二月十一日自燕山發回昉等相傳以為大酋不欲和必至於戰臣竊有二疑若彼之君臣果不欲和何不執我使人即日發兵尅期會戰今二小介且不敢留發之使歸當是有相就之意於文移中或有大言亦是用弱之勢當如此其不出於戰一也春今巳三月若和議不成境上之敵必整促會合分道窺邊自旬日來方且於界首置擺鋪每鋪三十騎以伺我動息又畫淮河汝河濶狹處為圖再劄量步口淺深又驅旁邊居民使之內徙皆是反為防我之計其不出於戰二也使其恥於怯名便出忿兵僥幸一戰我徐以兵應之主客勞逸之勢分曲直之理著官軍破之必矣况迫於暑月敵無深入久留之便要是四州之地必不可棄當如陛下神謨聖斷無疑也臣比遣官團結鄧州人丁得一萬三千七百九户凡三萬七千五百六十一口選壯丁及一萬四千六百五十二人而中丁之數又三千七百一十四人視襄陽户口丁數乃三四倍果可輕棄之乎先正司馬光嘗論三晉者齊楚之藩蔽齊楚者三晉之根柢形勢相資表裏相依安有撤其藩蔽以媚盜曰盜將愛我而不攻豈不悖哉臣竊於今日海泗唐鄧之勢亦云伏惟陛下運獨斷之明下不移之令以就大功或羣言一搖棄地請和臣聞命之日即挂衣冠而去決不敢先負陛下也冒昧再三伏用震恐允文又論召回信使當殿議中外戰守之備并安集歸正流民上言曰臣準金字牌遞御前封降三省樞密院劄子通問使王之望等赴行在奏事三月二日奉聖旨劄下荆襄川陕嚴為邊備仍不得先事妄舉臣巳具知稟狀聞奏訖臣於前月初五日嘗具劄子謂胡昉之歸敵之弱勢可見冒昧以二策上干天聼不自意臣之上䇿有合於淵衷伏惟陛下勇智如成湯為天所錫方略如漢髙為天所授中外大小之臣實榮千載之遇效謀效力誰敢不自盡以赴功名之會報萬分之一臣竊詳諸處探報敵兵率多內徙或聚於亳州或聚於應天府或聚於汴洛二京如其內難未平當自此稍稍逺去若只留近郡即是已迫暑月為歇泊之計簽民料馬以俟秋冬入冦則必勝之算不一之備凡在我者不可緩也春已垂莫敵又寖退必無深入久戰之憂况天誅亟決羣疑自定事當歸于一屈指防秋之日不過數月間士馬之增損金穀之盈虛戎器之有餘不足山川形勢之險夷與兵出入或守或戰之地有司所宜蚤計預定惜分隂而不敢怠之時也敵比下令盡驅旁邊之民逃避者論以軍法民相驚譁謂當徙於黃河之北老幼扶攜咸來歸正者纍纍不絶而藏匿於山林間者又甚衆怨咨之聲盈於道路天將亡之遽奪其魄至此所謂為淵驅魚為叢驅爵以兆陛下湯武之興也應天順人之舉雷動而風行臣與江漢草木日月以兾所有歸正之民臣亦巳遣官齎錢米賑給而安集之矣伏乞睿照允文又論敵中衰弊令兩軍習拒馬法上奏曰臣伏讀明詔以軍政之弊有敵人雖弱而我不得志之歎臣嘗與有識之士日夜飲此恨久矣今陛下明以訓臣是臣千載之遇合其敢不勉臣竊見昔自金人竭其國兵財之力大舉以渡江一敗之後亟抵滅亡敵氣頓索中原之民因見敵之力果不可以勝天也起義兵而歸正之人相與而趨赴延及渤海契丹之族而敵勢遂孤敵中始多事外訌內阻日有岌岌之勢况頻年旱蝗今山東河北斗米千錢燕山之價倍之咸平黃龍之價又兩倍之人皆相食所至盜起識者謂天之亡之其在兹乎臣見荆鄂兩軍諸將多以其兵不能戰於平原為憂臣比與王彥商量造木拒馬用陕西陳法教習兩軍蓋中原平夷騎兵所利而議者多欲造車以當騎而不知拒馬之用如車而其便利捷疾兵不能潰去車所不若也自三國南北時用以取勝載於正史近歲吳璘用於西邊數致大捷而王彥自謂尤精其法臣之孤忠不獨使荆鄂之兵為陛下守漢上一面而已伏乞睿察乾道六年盧陽西據獠楊添朝冦邊知沅州孫叔傑調兵數千討之敗績死者十七八初猺人與省户交爭殺二人死叔傑輒出兵破其十三柵奪還所侵地於是猺人相結為亂諸司請調常德府城兵三百人益官兵三千人合擊討之宰臣虞允文奏曰蠻夷為變皆守臣貪功所致今猺人仇視守臣若更去叔傑量遣官軍示以兵威徐與盟誓自可平定帝允其奏俾葉行代叔傑開示恩信諭以禍福遂招降之邊境悉平前知武岡軍趙善穀言武岡與湖北廣西鄰壤為極邊之地溪洞七百八十餘所缺洞𨽻綏寧縣五溪洞𨽻臨江縣紹興三十年減冗員改縣為臨口寨然五洞之猺俗尤獷悍釁生毫髮則操戈相讎寨官不能為重輕况本軍巡防寨柵惟真良三門兵溪香平有土軍可偹守禦餘有官無兵其闕硤武陽等寨設巡檢二員徒費廪祿以臣所知宜復臨口寨為縣則猺蠻易於制伏汰去冗員則官廪亦無虛費實邊郡之利也隆興二年胡銓為兵部侍郎上疏曰自靖康迄今凡四十年三遭大變皆在和議則北敵之不可與和彰然矣肉食鄙夫萬口一談牢不可破非不知和議之害而爭言為和者是有三説焉曰偷懦曰茍安曰附會偷懦則不知立國茍安則不戒鴆毒附會則覬得美官小人之情狀具于此矣今日之議若成則有可弔者十若不成則有可賀者亦十請為陛下極言之何謂可弔者十真宗皇帝時宰相李沆謂王旦曰我死公必為相切勿與敵講和吾聞出則無敵國外患如是者國常亡若與敵和自是中國必多事矣旦殊不以為然既而遂和海內乾耗旦始悔不用文靖之言此可弔者一也中原謳吟思歸之人日夜引領望陛下拯溺救焚不啻赤子之望慈父母一與敵和則中原絶望後悔何及此可弔者二也海泗今日之藩籬咽喉也彼得海泗且決吾藩籬以瞰吾室扼吾咽喉以制吾命則兩淮決不可保兩淮不可保則大江決不可守大江不可守則江浙決不可安此可弔者三也紹興戊午和議既成檜建議遣二三大臣如路允迪等分往南京等州交割歸地一旦叛盟劫執允迪等遂下親征之詔敵復請和其反覆變詐如此檜猶不悟奉之如初事之愈謹賂之愈厚卒有海陵之變驚動輦轂太上謀欲入海行朝居民一空覆轍不逺忽而不戒臣恐後車又將覆也此可弔者四也紹興之和首議決不與歸正人口血未乾盡變前議凡歸正之人一切遣還如程師回趙良嗣等聚族數百幾為蕭墻憂今必盡索歸正之人與之則反側生變不與則敵決不肯但已夫反側則肘腋之變深敵決不肯但已則必别起釁端猝有如前之謀不知何以伐之此可弔者五也自檜當國二十年間竭民膏血以餌勍敵迄今府庫無旬月之儲千村萬落生理蕭然重之以蝗蟲水潦自此復和則蠧國害民殆有甚焉者矣此可弔者六也今日之患兵費巳廣養兵之外又增歲幣且少以十年計之其費無慮數千億而歲幣之外又有私覿之費私覿之外又有賀正生辰之使賀正生辰之外又有泛使一使未去一使復來生民疲於奔命帑廪涸於將迎瘠中國以肥敵陛下何憚而為之此其可弔者七也側聞敵人嫚書欲書御名欲去國號大字欲用再拜議者以為繁文小簡不必計較臣切以為議者可斬也夫四郊多壘卿大夫之辱楚子問鼎義士之所深恥獻納二字富弼以死爭之今勍敵橫行與多壘孰辱國號大小與鼎輕重孰多獻納二字與再拜孰重臣子欲君父屈己以從之則是多壘不足辱問鼎不必恥獻納不必爭此其可弔者八也臣恐再拜不巳必至稱臣稱臣不巳必至請降請降不巳必至納土納土不巳必至銜璧銜璧不已必至輿櫬輿櫬不已必至如晉帝青衣行酒然後為快此其可弔者九也事至於此求為匹夫尚可得乎此其可弔者十也竊觀今日之勢和決不成倘乾剛獨斷追回使者魏祀康湑等絶請和之議以鼓戰士下哀痛之詔以收人心天下庶乎其可為矣如此則有可賀者亦十省數千億之歲幣一也專意武偹足食足兵二也無書名之恥三也無去大之辱四也無再拜之屈五也無稱臣之忿六也無請降之禍七也無納土之悲八也無銜璧輿櫬之哭九也無青衣行酒之寃十也去十弔而就十賀利害較然雖三尺童稚亦知之而陛下不悟春秋左傳謂無勇者為婦人今日舉朝之人皆婦人也如以臣言為不然乞賜流放竄殛以為人臣出位犯分之戒孝宗時詮又上疏曰臣嘗讀商書伊尹作咸有一德言君臣皆有純一之德也其初曰皇天眷求一德俾作神主惟尹躬暨湯咸有一德克享天心其中曰非天私我有商惟天佑於一德非商求于下民惟民歸于一德德惟一動罔不吉又曰終始惟一時乃日新又曰惟和惟一又曰善無常主協于克一其終曰俾萬姓咸曰大哉王言一哉王心説者謂一德之言故曰大能一德則一心臣謹案是篇言一字凡九蓋明人主德與心不可二三何則二三則方寸亂矣竊嘗譬之稽天之潦不能終朝而泰山之溜可以達石一與不一故也側行之蟲無爪牙之利上食稿壤下飲黃泉蟹六跬而二螯非蛇鱓之穴無所寄託者顓與不顓故也一則顓二三則不顓此必至之理也顓則成不顓則敗亦必至之理也大凡人之立事無不鋭始而工於初以其用志不分顓且一也至其半則稍怠卒而漫漶不振志分故也陛下初登寶位以剛健之資奮然欲大有為於天下嘗語臣朕決不與敵和一日侍從之臣同班上殿葉顒等首啓和議之請陛下靣折之曰卿等不知主辱臣死之義乎喑嗚流涕顒等羞縮而退臣是時親聆玉音服膺絫息知陛下真撥亂興衰之主是年冬臣被旨措置海道以禦戎冦才出北關而和議之使已在道矣和議既講在彼無厭之欲難塞日務求釁或蕩搖我邊鄙或憑陵我城邑和雖在口禍實藏心陛下見幾於未奔沉之先慨然有恢復之志四海之內皆引領而望曰吾君果撥亂興衰之主也然臣竊有疑焉何也以和議之使未絶而恢復之言日彰也夫和議未絶則吾歲幣之害無時弭也恢復之言日彰則彼講和之議必不堅也然而陛下持兩端之説無一定之論為陛下謀主者豈不曰姑與之和而密圖恢復之計乎臣竊以為大不然也夫不費歲幣姑與之和議猶不可况裒民膏血以為歲幣而和議不堅是無益也和而無益是舉生靈之膏血委之溝壑也而忍乎難臣者則曰安知和議之不堅曰召公戒成王以祈天成湯誥萬方曰請命祈請二字乃人主所以尊敬天命也陛下為陵寢遣使以祈請為名是尊之敬之與天等也彼乃謂我妄有僥求夫以尊之敬之為妄則和議之不堅彰彰矣議者必曰彼強我弱彼衆我寡彼實我虛彼大我小彼盛我羸吾安得不出其下吾又安得計校生靈之膏血也哉臣又以為不然臣聞秦以傑顚徐由邈綿可以強弱論乎紂臣億萬周士三千可以衆寡論乎隋洛口倉唐資以興可以虛實論乎魯雞不期蜀雞不支可以大小論乎尫羸致夀盛壯暴亡可以羸壯論乎然則亦顧吾自治之道如何爾茍能自治彼又何足畏耶臣雖蠢愚竊謂陛下有髙世之行九敵人有取滅之理三是我能自治而彼不能也請索言之臣聞陛下愛敬盡於事親髙世之行一也友于兄弟二也九族以睦三也平章百姓四也任賢勿二五也克勤于邦六也克儉於家七也樂善不倦八也惠鮮鰥寡九也敵人虐用其民取滅之理一也阻兵安忍二也惡直醜正三也以彼取滅之理當吾髙世之行已不戰而勝矣臣謂亦顧吾自治之道如何者此也然則焉用以民膏血委溝壑之為快哉臣願陛下一德一心應天順民俾萬姓咸曰大哉王言一哉王心罔俾阿衡專美有商臣雖不敏請事斯語矣惟聖神少加意焉銓為中書舍人論復讐疏曰臣聞前車覆後車戒自紹興初肉食者不能逺謀遂墮敵計和議三十年廢防弛備干戈朽鈇鉞鈍上下偷安不戒宴安之鴆一旦金人肆席卷并吞之計宗廟社稷幾不血食天下寒心陛下即位以來懲羮吹虀誓不與敵人共天日夜厲民秣馬搜乘補卒志馳於伊吾之北氣軼乎甌脫之外不復鴈門之踦不巳也不澡二殽之恥不巳也敵人知陛下鋭意興復知吾力修守備知吾將士思奮近者輒移書請和非甘言誘我即詭計欵我爾陛下宜鑒前車之覆益修守備益張吾軍益固吾圉且戒將士曰北敵強暴之國貔虎之羣忘我祖宗之大德而謀動干戈是以有靖康之禍殘毁我宗廟陵蔑我社稷劫遷我二帝垢衊我兩宫皇室淑女媲於穹廬掖庭良人汚於沙漠玉牒帝胄僕於龍荒尚忍言之哉又有甚可憤者我徽宗皇帝梓宫雖返而大讐未報我欽宗皇帝訃音雖聞而梓宫未返興言及此為之酸鼻又有大可憤者我國家山陵發掘殆遍我哲宗皇帝陵寢既發而又暴其骨昨者太常少卿方庭實請命祈哀歸奏其實所不忍聞臣是以痛心疾首飲恨啜泣思欲如古人枕戈待旦以雪吾恥思欲如古人卧薪嘗膽以逞吾憤未嘗一日不北望慨然痛哭流涕也尚忍與之盟哉如此則將士激勵不戰而氣巳倍不然雖增歲幣還故疆如前日屈膝請盟臣恐復有如海陵者竊發於近甸矣銓又上奏曰臣竊謂自昔外侮憑陵中原未有如今日之甚者也非外侮有常勝之勢蓋中國御之失其道爾何謂御之失其道自靖康之變二聖蒙塵兩宫執辱非有他也講和禍之也自維揚之變太上皇浮海生靈屠戮大內飛羅綺之灰九衢轔公卿之骨非有他也講和禍之也自海陵之變淮甸丘墟原野饜人之肉川谷流人之血遺毒至今非有他也講和禍之也夫自靖康迄今凡四十年三遭大變皆坐和議則敵人之不可與和彰彰然矣范成大內殿論敵使生事劄子曰臣竊聞前日金國遣使來奉夀觴其正使沿路於瑣瑣末節多欲少變舊例皆非國體重輕特出一時無稽之説陛下待之有法一不得志而去然自近年未嘗敢爾其所以敢爾者士大夫竊議謂有兩説或謂山東飢旱民多流徙恐為吾所窺測故為此驕狀以示泰然而堅盟信或謂彼國以陛下天錫神武不忘中原經理邊陲江淮增勢必慮和好不久敵之君臣或有計議使者恐預知之故敢肆然出此二説是非固未易決要之皆所以啓陛下自治待時之計何則從前之説彼憚於興役而懼吾有謀耶則安知其無可乘之機從後之説彼疑吾經略而不恃和好耶則安知其無先事之舉故曰皆所以啓陛下自治待時之計臣愚欲望聖慈與帷幄大臣乘此間暇之時稍紓不急之務益講待敵之策蚤夜孜孜更甚前日以待事至而應焉臣去年面對嘗陳三力之説一曰日力寸隂可惜者是也二曰國力資用所出者是也三曰人力愚慮智術之所及者是也此三力者有限不可糜費於不急之地盡用以待敵猶恐不給臣區區愚忠因使人之來又有所感故復為陛下略言之伏惟留神省察乾道四年敷文閣待制汪應辰轉對論自治劄子曰右臣準御史臺牒十一月一日視朝當臣轉對者臣愚不肖不足以論天下之事然竊以為天下者先後本末之序要須有一定之計然後從事所謂事豫則立也昔班固論外域之患以為漢興忠言嘉謨之臣運籌䇿相與爭於廟堂之上總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始臣亦以為國家自艱難來所以待敵人者不過和戰兩説然而皆未得其本也欲和者則以無事為安諱兵而不言偃武而不修欲戰者則不相時不量力而姑徼幸於一勝此二者皆非也二者皆非則將何適而可亦曰反其本而巳反其本者自治之謂也吾所以自治者周密堅固無所不備則或和或戰特應之而已詩人之稱文王曰肆不殄厥愠亦不殞厥問柞棫拔矣行道兌矣昆夷駾矣維其喙矣夫外域而侵中國此文王之所當愠怒而不釋者也故不殄厥愠國與外域為鄰則聘問之禮有所不可已也故不殞厥問茍吾之政事井井乎其有條理所植之木則拔而茂盛所行之道則兌而成蹊以中國之治而制外域之亂則彼將遁逃而日以困窮矣文王之政其先後本末之序如此萬世所不可易也恭惟陛下有勤勞恭儉之德有剛明果斷之才又有將大有為之志而適當艱難之運祖宗陵寢越在異域中原士民淪于兵革豈可以殄厥愠哉惟是國勢未強民力未裕聖明逺覽俯就和議慰薦撫循交接賂遺所以待敵人者甚備蓋非淺見狹聞者所能窺測度量之萬一臣願陛下無欲速無見小利而専以自治為本譬如農夫是穮是蓘人事既盡天時自至然後可以收其成若不藝其田或揠苖而助之長皆為不知時矣此臣所謂無欲速也孫權時江邊諸將多陳便宜有所掩襲丞相顧雍以為兵法戒於小利此等所陳欲邀功名而為其身非為國也宜禁制之茍不足以耀威損敵皆不宜聼此臣所謂無見小利也富弼使北歸言於仁宗皇帝願常思敵人輕慢中國之恥坐薪嘗膽不忘戒備內則修政令明賞罰辨别邪正節省財用外則選將帥練士卒安輯疲瘵崇建威武臣所謂専以自治為本者此其目也仰惟陛下以勤勞恭儉之德而持之以久以剛明果斷之才而慮之以審以將大有為之志而養之以晦凡自治之䇿如富弼所云者無不畢舉真積力久其效自見天意人事若合符節必將有不麾而去不祈而獲者矣臣不勝仰望之至孝宗時廣西提點刑獄林光朝陛辭劄子曰臣聞近日有自嶺外來者謂南丹馬路不可開白皮鹽場不可罷緣此二事關涉蕃漢即非州縣泛泛議論恐亦不可不早定也陛下不以臣為駑劣使之按刑嶺右是宜宣布陛下寬簡好生之意至如招誘買馬及鹽場廢置各有主此者然事關蕃漢嫌隙一開是二三有司者之責故不得不為此過計夫寇賊姦宄多出於邊人舜嘗以是命臯陶臯陶一治刑獄之官而舜輒以是命之蓋為冀州之外即荒域遐陬是邊人迫近中都必有為此寇賊姦宄之事者故舜以是責之治刑獄之官上古外裔皆小小種落為甚易治自秦人鞭笞六國合為一家胸奴於是時亦效中州併吞他部是以有控弦三十萬之衆上古外裔與秦漢以來不同使唐虞三代遇秦漢之外裔不知禦戎當出何䇿漢之郡縣過交州數千里唐之安南都護府即漢之日南也本朝以交州為荒梗不毛之地置之度外今南方外裔正如唐虞之時乃小小種落耳宜州邊南面為髙峯寨髙峯寨去南丹州止一程羅殿多産馬每來雍州互市即為自把蠻所梗數年前羅殿欲取道南丹徑來宜州賣馬南丹蓋嘗主此説而其説亦甚可聼自後議者又復多端謂南丹之外乃為永樂州永樂從來不與南丹相下往時南丹為永樂所攻尚怨宜州不出救兵若置場南丹則南丹所以望我者又非前比也南丹一件雖未得其要領然無妨吾事惟白皮鹽場忽然罷去一帶亭户往往失業遂逃入交州蓋緣溪洞不得白皮場鹽却轉食交州鹽溪洞數十為吾扞蔽惟知有內地鹽豈可令交州鹽却流入溪洞傳聞交州界上前此有産鹽地分故易成爭奪後來不聼交人於近地煮鹽是以白皮鹽場自紹興之初官賣帳歷一一可驗不應令交州鹽却過來溪洞若此一事縱而不問恐積月纍歲非必一典刑獄之官所能治也臣愚謂南丹馬路白皮鹽場是皆邊面細事不當處之太驟欲望睿斷行下本路令逐旋措置此為有司所當為之事不宜上瀆旒扆緣是關涉蕃漢有此隄防故不避喋喋光朝直寶謨閣輪對劄子曰臣聞古之為關也蓋以禦暴惟譏異言察異服不使竒邪之人變亂於國中此為關之本意也是故蠻夷猾夏寇賊姦宄舜以是命臯陶豈唐虞所都與北人相近深恐羣敵變亂邊方而為是寇賊姦宄之事此不可不責之治獄者天下釁端常生於所忽釁之未萌以簡書治之為有餘及其已甚以甲兵取之為不足唐虞盛時所以治荒服者如此是治之於其早未嘗攻之於末流也東南有海道所以扞隔諸蕃如三佛齊大食占城闍婆等數國每聼其往來相為互市遂於嶺南之廣州福建之泉州各置市舶一司諸蕃通貨舉積於此荆淮湖外及四川之逺商賈絡繹非泉即廣百貨所出有無易此亦生人大利也臣昨在嶺外見諸蕃之貨近年以來多是蕃人以厚資停塌而責商賈以數倍之息所以如是者謂其自有貨賣之處近聞蕃客十十五五嘗在都下自賣蕃物而以金銀為回貨今又聞轉而之他中國禁令如此濶疏非所以待逺人也夫金銀可貴吾之所寶以塗金銷金為服用則坐罪為不輕若之何棄其所可貴者於化外窮髮之鄉此物一去即不復相流通豈不重可惜也然中國所得蕃物往往可以充耳目之玩若用之於救水旱行軍旅一皆為無用之物至如金銀可貴自古而然豈可使之日蠧月耗而不加恤焉臣之過計又不特此一事如前年於吉陽軍買馬今年復於泉州買馬及器仗此釁漸生烏可縱而不問往時海外有一種落俗呼為毗舍耶忽然至泉州之平湖此尚在一絶島續又至北鎮去州治無二十里之逺其視兵刃一無所畏啖食生人乃如芻豢每得尺鐵爭先收拾所過之處刀斧鉤鑿為之一空及散走嶺外殺人為糧挾舟而行出沒水中猶履平地潮惠一帶莫不戒嚴此曹叵測也初不知所托在何等處尚能為吾民之害况所謂熟蕃往來中都者乎臣願聖慈戒勑嶺外及福建一路所有蕃客止令於廣州泉州相與貿易不得輒出二州之界庶幾他處金銀可貴之物不至泄之界外且無往日意外之患不勝幸甚韓元吉進故事曰唐書李大亮傳時突厥亡帝遂欲懷四夷諸部降者人賜袍一領帛五匹首領拜將軍中郎將列五品者贏百員又置降胡河南詔大亮為西北道安撫大使以綏大度設拓設泥熟特勒及七姓種落之未附者大亮上言屬者突厥傾國入朝陛下不即俘江淮變其俗而加賜物帛悉官之引處內地豈久安計哉臣以為諸稱藩請附者宜羈縻受之使居塞外畏威懷德永為藩臣所謂行虛惠收實福河西積困兵革州縣蕭條願停招慰省勞役使邊人得就農畝此中國利也帝納其計臣聞唐太宗之平突厥也降者尚十餘萬帝用溫彥博之議度朔方地建順祐化長四州置定襄雲中二都督統之然擢酋豪為將軍郎將者尚五百人奉朝請者且百員入長安自籍者數千户也當時廪給之費蓋亦可見故大亮安撫伊吾而陳羈縻塞外之䇿蓋既往者不咎姑欲無事招徠於七姓種落以寬河西州縣而已且漢置降胸奴五原塞下以為捍蔽未始官於朝也太宗之降突厥遂官於朝矣夫取其才而用之固足以見聖王之大至於奉朝請者多籍長安者衆則是煩費中國以養裔夷之俘亦不可不慮者故大亮有言太宗遂悟可謂明矣哉仰惟國家履中興之運敵勢就衰慕義效順者襁負來歸既巳處之州縣矣則異時系踵而至者臣亦願聖神鑒此而預為之謀也元吉權吏部尚書進故事曰唐書太宗引諸衛將卒習射於顯德殿庭諭之曰外域侵盜自古有之患在邊境小安則人主逸逰忘戰是以寇來莫之能禦今朕不使汝曹穿池築苑専習弓矢居間無事則為汝師突厥入寇則為汝將庶幾中國之民可以少安乎數年之間悉為精鋭臣觀太宗可謂不忘突厥也當時羣臣不察以為兵刃至御在所而後世諸儒亦議太宗閲武殿庭以人主之尊而行將帥之事臣知太宗之志在突厥者以其非得巳也蓋唐初外域之患莫甚於突厥自隋即以公主妻之髙祖得天下羣盜角立懼其為助故卑詞厚幣約以連和其禮有為之屈者及連歲內侮益甚至欲遷都避之不勝其憤武德八年命有司削其敵國之禮更所與書為詔若敕都酋頡利因自將其衆襲武功而瞰渭橋時太宗方即位以六騎直出與頡利隔水語僅成白馬之盟敵始退舍由是言之髙祖之憤幾貽大悔未若太宗之能忍也然帝雖能忍而其志不一日忘敵故敵退未踰月即殿庭以教戰士校其射藝誘以厚賞此特其一端爾他所以備敵者從可知也貞觀之治用賢納諫之方選將練兵之法皆足以自致於安強然後堅坐不瞬以待其隙及頡利勢衰羊馬多死又內與突利相攻擊諸部皆畔逮貞觀四年始命李靖以六總管之師才十萬人破之隂山擒頡利以獻觀帝之告羣臣有曰國家初定太上皇以百姓之故奉突厥詭而臣之朕常痛心疾首思一刷恥於天下其勸髙祖不必移都則曰願假數年係頡利之頸致之闕下至是果酬其言嗚呼有志者事竟成必有忍其乃有濟太宗之謂矣何則夫待外國之禮或可屈而志不可屈也唯禮或可屈故權時之宜有所不校若太王事獯鬻文王事昆夷於傳有之矣唯志不可屈故勾踐之報吳太宗之擒頡利皆是道也臣竊仰國家今與敵和豈異是哉日者奉使之臣辱命而還陛下既已備正典刑矣敵之驕慢吾使而禮有未得伸者譬猶無知之人瀆慢長上固不能不為之動亦何足與之校是非曲直乎臣所願陛下沉幾先物擴帝王之度以容之堅忍不顧厲太宗之志以圖之如聞彼境旱蝗已久民心離二諸雛各擅兵柄互相窺伺天道好還豈患無頡利之變陛下聖德英武逺邁於太宗假以歲月則渭上之恥未必不啓吾定襄之功也臣是以因貞觀之事以證之云員興宗上殿輪對劄子一察敵情曰臣聞聖人有外懼故有微權有密機權以忍而後濟機以忍而後發忍不忍之間安危繫焉使其伸縮在我平日晦之一日伸之大事不足定矣外懼何為也哉昔勾踐為國蕞爾國也奉夫差以玉帛又奉之以子女常人所不忍者勾踐一􅋀忍之此豈其真情也哉彼其奔走事人之日皆隂謀生聚教訓之日也故吳不有越而越卒有吳者勾踐得此微權也曹公之於袁紹也地不如紹兵不如紹紹未除大將軍操不拜也則避紹而與之曹公豈避人者哉彼其曲意奉紹者所以怠紹之心而緩河北之兵也故袁不併曹而曹卒併之者曹公有此密機也彼兩人興而機權用機權用而曹之王易王越之霸易霸臣固知其忍而後動者也恭惟陛下稟希世之明天錫之勇常有掃清中都囊槖宇宙之意矣然而即位四年遵養時晦敵有小大勢有堅脆陛下權敵以御時俯已為和柔之盟陛下意豈在是哉機權之在是也陛下忍之亦至矣越王曹公之事規模雖小充而用之必在陛下度內也然臣近者聞諸道路敵有無故之形和有不堅之意衆説紛紛不可執取議者猶欲以祖宗待契丹之禮以待之是不知彼己者也自紹興至今敵凡幾和和亦幾變信書在道暴骨在野前日已不可保後日庸可保乎豈可見其形不察其實信其偽不昭其姦百事揚揚猶類平日上下復欲長此安窮也為今日之慮當堅籌謀當預措置江淮諸處屯兵幾所孰要孰害兵甲增減為數幾何孰訓孰惰諸將可倚者凡幾何人軍食可理凡幾何事惟精應敵惟長守扞至纖至悉不暫解弛臣猶恐其未也若將相循循尚猶偷玩今日得報則四靣倉皇明日無報則整容間暇謀國如此抱虎而寢虎未及起因謂之安未有不為傷矣夫四夷軌道兵甲不興誰不願之不幸或有外禦雖宣王不免也臣竊恐近臣大吏轉以簿書期會為故捨此弗圖一忽有警持循將何及也詩曰維彼雨雪先集維霰而知雨雪者見其兆也陛下察敵之兆而預計之機權在中應變在外陛下舉能辦此願戒小大之臣勿為偷怠而已杜牧曰國家大事小臣不當言臣與牧同一罪也惟陛下幸赦二恤歸附曰臣聞天下歸往謂之王四夷觀赴謂之中國樂於觀赴而極其歸往聖人之能事於此在矣臣竊觀鄉者江淮歸正士卒捨氊裘襲禮義此豈一都督府有以諭而來之耶誠以吾宋有大義中國有至仁北方將士樂歸陛下之德者也臣前自上流過沿江諸郡歸正之士往往而見其間逰談坐作意態慘戚多不自聊者臣退窮所聞則所在統軍宿將不能推原陛下德意接之不以恩惠是以囂囂相從於此臣竊思之華夷萬里異生不異情人之情去親戚而捨墳墓甘酸苦而受困折者皆非情之所安者也設若諸將能為朝廷相親相比布露恩私如待寵子如支漏甕則歸附之士未暖席而得此生矣近聞諸將敢有奴𨽻服役之者臣恐歸附生心役不以義則其徇義之意輕撫不以情則其效上之心薄待不以恩則其投命之意衰風塵忽警是縱虎狼於檻而保其不噬囓者也如是其可乎臣以為諸將無見於此矣昔唐初有事於突厥中葉有事於中原回鶻特勒之徒何力國昌之將其人皆蕃衆也其兵皆蕃兵也唐有恩意以寵之巍官劇職共濟其用而共復京師唐於歸附一日不輕如此未聞諸將服役之陵籍之也臣愚伏望陛下垂厚恩布明旨凡歸正士卒分戍所在深詔沿江督將與逐路帥臣務加存恤賜給之間務加優厚使其客主之勢一委曲相濟則情自相通然後旌其首領功狀最白忠效最篤者陛下特賜勞問亦寵矣後有緩急出入死地彼又何辭安知無國昌何力之徒為我用為我守哉揚雄曰御得其道則天下狙詐咸作使此事是也惟陛下幸察知婺州李椿奏曰臣竊見自紹興十年以後節次歸正中原之人或在軍中或散民間此皆國家赤子頃因南渡遂成隔絶今既來歸如子投父固宜存撫以繫中原人心唯是降人吾之仇讎反覆難憑天姿殘忍因敗來降蓋非本意逃死而巳強梗之性不可以義理曉不可以恩信結弱則服強則叛其來久矣若必以謂將欲收而用之則當置之于有用之地有以要束之兼於大衆之中使不得恣壓以勢力恐或可用今散在州郡間驕橫凌民無所不有又多懶惰不習軍務髙官厚祿無用而有害豈宜置而不議為今之計當因其任滿悉添差上江屯駐中分配隊伍毋令管事其官髙頭首令充不釐務兵將官庶幾有以關防其出入禁衛者切乞聖慈逺之臣伏願陛下鑒唐太宗之處突厥幾至狼狽晉武帝之處氐羌終致傾危苻秦之信慕容垂鮮卑猖獗當時有識之士皆知其必然臣愚慮實憂之所以不避瀆聖之誅冒昧言之臣不勝恐懼待罪椿為司農卿上奏曰竊見朝廷區處降人未盡其宜私心深憂自北而來者皆曰歸明歸正然我中原之人偶因國家南渡隔絶數十年身雖陷於北敵其心豈忘祖宗二百餘年仁厚之恩又豈樂與非族同處今既來歸固有可用之理其間猶有不逞好亂之人自疑南北之異時於沿邊作梗者其人皆有人心可以利害誘之恩信結之也如降人我之仇讐反覆無常天姿殘忍弱則服強則叛不可以恩信結不可以道理曉其來久矣故晉武帝時劉石雜居中國不用郭欽江統之言不十二年濁亂中華秦苻堅委信慕容垂不用王猛之言鮮卑猖獗唐太宗受突厥之降不用魏徵之言幾至狼狽宣和間契丹郭藥師歸朝朝廷待之至厚不逾年乃為金兵前驅首來犯順此古今之明驗也今降人或布州郡或掌事軍中或往來闕下或宿衛禁庭此臣所以深憂者也臣年齒衰暮疾病相仍死亡無日矣固未必見其為害近見耶律卦里所為觸類而思之恐為害於他日伏望朝廷於間暇之時酌古驗今思患而豫防不動聲色有以處之措宗社於泰山之安天下幸甚若直待臨事而慮則無及矣如臣愚言可採乞賜敷納密切施行制置四川兼知成都趙汝愚論羌賊降後乞修德任賢狀奏曰臣昨據黎州申報羌賊奴兒結之弟三開以疾自斃賴苖率其餘黨悉降伏蒙聖恩除臣龍圖閣直學士臣自惟守邊無狀何敢論功嘗瀝悃誠乞賜恩免兹奉溫詔尚閟俞音臣義當固辭豈容虛受實緣臣近方辭免召命陳乞祠祿不敢再三煩瀆天聽已於今月十九日望闕祗拜新命訖伏念臣蒙陛下之知最深荷陛下之恩最厚敢因前事少效愚忠臣伏見黎州自太祖皇帝玉斧畫河之後二百餘年三陲晏然一塵不動蠢兹小醜敢為亂階殺略吏民擾我西鄙覆亡將士犯我王略積十餘稔罪惡貫盈狡計益深乍服乍叛犁庭掃穴理無可赦陛下神武不殺惟務羈縻聖度有容屢行恩宥夫力行者逺無不至真積者隱無不彰終之帝德升聞天鑒昭格渠魁送死授首窮荒餘黨悉平歸心大化是知人衆者勝天天定亦能勝人非虛語也書曰惟德動天無逺弗屆滿招損謙受益時乃天道臣愚伏願陛下觀天道為甚邇信聖言為易行推其所既為增其所未至內以修德為本外以用賢為助自然天意悅於上人情協於下雖以之掃清中原克復境土宜無難者區區小羌顧何足為陛下道哉臣學術淺陋無所知識嘗究觀羌賊本末而竊有感焉故因兹摧謝而輒獻其誠唯陛下留神幸甚汝愚論金國人使生事狀奏曰臣蚤來在幕次侍班承閣門傳旨令改别日朝見臣詢問得今來使人頗失恭順奉書不虔觸犯天威罪當萬死陛下盛德全度曲示含容天地人神孰不慶幸然臣竊謂禮者體也義者宜也得體合宜雖強必服萬一調護之際稍失事宜竊恐強敵益驕更貽後患故臣謂莫若且令館伴臣寮委曲開諭援之以久例曉之以至理我直彼曲夫復何辭然後令就館中封進國書徐降指揮朝見蓋陛下威尊固不宜再屈兼恐臨期復有變態則於朝廷事體將來益難區處若彼堅執愚暗倔強不從則當致饋有司稍加常禮移文對境告以事因但當曲折其詞亦不至遽生邊釁説諭使人此意料彼安敢不從然須示以優遊待之間暇稍遲且暮彼自憂疑若欲姑務曲從别加厚賜非惟有傷國體亦恐别啓戎心或謂國家連歲旱傷未宜輕舉敵情難測將起爭端臣則謂不然使彼誠有深謀決非卑詞可已若祇是使人生事正可伐之以謀臣伏抱愚誠輒陳管見惟聖明裁擇幸甚歷代名臣奏議卷三百四十九
