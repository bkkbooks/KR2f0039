body:
  text: 歷代名臣奏議卷一百十七明楊士竒等撰風俗宋髙宗紹興二十七年監登聞鼓院范同上言曰今民俗有所謂火化者生則奉養之具唯恐不至死則燔爇而棄捐之何獨厚於生而薄於死乎甚者焚而置之水中識者見之動心國朝著令貧無葬地者許以係官之地安葬河東地狹人衆雖至親之喪悉皆焚棄韓琦鎮并州以官錢市田數頃給民安葬至今為美談然則承流宣化使民不畔於禮法正守臣之職也方今火葬之慘日益熾甚事關風化理宜禁止仍飭守臣措置荒間之地使貧民得以收葬少裨風化之美帝從之孝宗乾道五年敷文閣待制汪應辰上論士大夫惇尚節義劄子曰臣比者進見伏蒙聖喻如何得士大夫敦尚節義臣雖率爾以對猝遽之間未能究極本末又蒙聖喻令臣陳其説者竊以風俗之邪正未嘗不係乎人君之取舍所謂邪正者雖曲折萬狀要不出乎利與義而已君子所知者義也故為人臣則盡心戮力而無所避直言正論而無所隱凡義之所當為雖死生禍福臨之而不顧也小人所知者利也利在君上則惟君上之從外若柔順而其實危險外若恭謹而其實欺慢及其見利則逝見便則奪又何有於君上哉故傳曰未有好利而愛其君者未有好義而忘其君者夫邪正之分其明白如此而昔之人主常患不能辨别之者蓋從順則取恱違異則致疑介特則無助阿黨則易與廉靜則易退巧佞則難逺故以同異為愛憎以愛憎為是非而取舍皆失其真矣恭惟陛下明智聰察洞見幽隱凡中外羣臣其材分髙下皆無逃於聖鑒矣然而風俗猶未能變者臣竊謂當今之失在於取人不觀其行用人不核其實今但曰是能辦事也是能趨時也則其他不必問也夫天下之事以忠信誠慤之心行之猶懼不濟况付之於無行之人乎欺罔以售其説刻剝以營其私蓋將無所不至矣而其益人之國者果何在哉此不觀其行之弊也今有言曰某利可興某功可就往往進之以爵祿豫之以事權徐而考之則名實相反績用不效非特不治其罪而爵祿事權猶且如故而或有加焉此不核其實之弊也夫不觀其行則頑頓者無所愧恥不核其實則誕謾無所忌憚是驅天下之人使去義而就利也其積浸久其流浸逺將有不可勝言者矣伏望陛下為久安長治之計思清源端本之道於邪正義利之辨特留聖意奬任忠厚正直之士貴其和而不必其同取其大節而不求其備若夫浮虛傾躁前後反覆者則懲沮而差擇之以明示好惡所在行之以必持之以久則公論伸正道明人皆化而為善所得者皆實才所行者皆實事矣何患士風之不美節義之不立也淳熙四年吏部侍郎周必大上言曰臣聞古者治天下有要道所以陶成風俗者禮義廉恥也所以維持紀綱者法令賞罰也二者相須闕一不可固未有風俗不正而能立紀綱者也及至後世謂禮義廉恥為迂而難行謂法令賞罰為切而易見是徒採其名耳未究其實也六經所載不敢詳引姑以管仲言之仲固霸者之佐知富國強兵而已然著書八十六篇首以禮義廉恥為國四維彼豈迂而不切者哉蓋上有賞則思茍就上有罰則思茍免上有法令則相與破壞而莫之守此皆禮義廉恥不立之所致而賈誼所為長太息於漢文之時者也仰惟陛下宵旰圗治日勤一日凡可以陶成風俗維持紀綱無所不用其至然而算計見效尚未能仰副聖意者非以士風未能丕變故耶益張四維固宜汲汲也今夫君臣上下各有差等尊卑貴賤不相踰節是之謂禮如此則在上之位安矣觀近臣以其所為主觀逺臣以其所主進退取舍直道而行是之謂義如此則民心無巧詐矣純潔有所守則臨事必端諒過失無所蔽則事上必忠實是之謂廉如此則其行自全矣平正其心詭隨不容售也委蛇其行枉道不容伸也是之謂恥如此則邪事不生矣凡此四者其是非可得而考其次序可得而見非若繫風捕影之無形畫餅説河之無實由是而之焉二帝三王之治且不難致於富國強兵乎何有顧朝廷力行何如爾孝宗時集英殿修撰帥福建趙汝愚申請舉子倉事上疏曰臣等伏見木路上四州軍風俗多不舉子大為一方之害者其弊有三一者違逆天倫夭絶人命傷朝廷仁夀之化姦天地隂陽之和二者建邵之間男多女少姦淫劫略之事無日無之遂致殺傷倍多觸犯刑辟三者建邵等州既不舉子貴家富室難得奴婢却以髙價買於他州緣此姦詐之徒誘略泉福等州無知男女前去貨買遂致父子生離夫婦中絶雖遵用敕律徒流編配而利之所在終不能禁凡此三者朝廷法令非不嚴備又纍降指揮許支義倉錢米接濟貧乏不能舉子之家德意非不隆厚秪緣本路多是山田義倉等米歲入不多州縣不能均給無以取信百姓風俗無由丕變臣等竊見前安撫史浩任內嘗有奏請乞於諸縣各置官莊收積租課添助贍養當時雖未凖回降指揮數內建陽一縣已有置到官莊歲收米三百六十九石逐年係安撫司收管未曾給散臣等今措置先於建陽一縣就將上件官莊米選委土著官員士人驗實給散行之數月已成倫序復用建陽縣例於建寧府崇安建安甌寧南劒州劒浦尤溪五縣次第推行間臣等照得元降指揮舉子事係專委常平司管幹緣諸縣有安撫司官莊米所以不免兩司同共措置候將來事定日仍將所置官莊撥歸常平司管幹許兩司公共點檢庶幾縣道不致作弊然而舉子數目頗多官莊米數有限臣等照得淳熙三年六月二十四日凖行在尚書户部符凖都省批下吏部尚書韓元吉劄子自乾道五年以福建路有不舉子之風貧乏之家生子皆賜以常平錢一千米一斛又因守臣之請除其所納隨身丁錢臣比為郡閩中詢之父老數年之間小民利於官給錢米不敢溺子全活甚衆然猶恐積日纍月州縣怠於驗實又謂常平所破錢米已多吝於支與為不可繼者今常平錢物雖有定額獨所謂户絶田産州縣不常有而止許出賣福建八州內四州溺子為甚民貧土薄所絶田産至為微細間有寺觀絶業取八州所得積而用之亦可助上件支遣也欲望聖慈更賜睿旨應福建民户寺觀絶産自今並不許出賣専一拘檢令常平司置籍歲收其租通融以充一路養子之費其不足處月支常平錢米提舉官逐歲稽考按治州縣須依元降指揮當切驗實當官散給務要實惠及民本部檢凖乾道五年四月十五日敕節文臣僚劄子奏福建路有貧乏之家生子者許所屬自陳委自長官驗實於常平錢當官量行支給每生一子若給米一石錢一貫亦不為多如或可採其餘路州軍有似此亦乞依此施行三省同奉聖旨依奏并凖淳熙三年二月四日敕臣僚劄子奏乞行下諸路將出賣未盡田山等並與住賣依舊召人承佃輸納官租奉聖旨權住賣令見佃人依舊且行承佃其已承買約錢未盡與展限一季本部今勘當欲依本官所陳事理施行符常平司一依今來都省批狀指揮施行今來常平司見盡數究實根據上件田産欲乞聖慈特降睿旨許令於民户寺觀絶産田並與住賣召人承佃將所收租利與安撫司所置官莊及常平義倉錢米通融以充一路養子之費庶幾實惠及民風俗一變以廣朝廷好生之德不勝幸甚樞密院檢詳文字兼檢正李椿上奏曰臣竊謂天下之事固有似可緩而所繫實要切者風俗僭侈當有節制是也易繫曰黃帝堯舜垂衣裳而天下治以衣裳而治天下有似可緩者而定上下之分明三綱之常自此始豈不要切哉伏自軍興以來士大夫服紫衫以便戎事不為過也而四方皂吏士庶服之不復有上下之别且一衫之費貧者亦難辦甲服而乙不服人情所恥故雖欲從儉不可得也不惟紫衫其他衣服華侈綺繡絣金異色竒巧日益以甚所以民多貧困不知節約故也仰惟陛下躬行節儉於上而士庶侈僭於下理宜有以節制之易象曰節以制度不傷財不害民不為非要切之事也伏望聖慈付禮官酌古今之宜定衣服之制非命官軍兵朝省人不得服紫衫華侈之物一切禁之變奢僭之風還儉厚之俗明上下之分息貪困之由天下幸甚椿為吏部侍郎又上奏曰臣伏覩在法祖父母父母在及身亡服未闋别籍異財者合坐之罪非輕又收養異姓出繼立嫡皆有舊條從來人畏法禁守之以常風俗淳厚伏自國家南渡以來時有建議立法者或父母在日許令標撥産業既分便不同爨或致互相兼并有父母見在一貧一富者有棄父母而别居者又有母受一子之分者以致身後詞訴紛紛皆是或有産業而無子孫許令身後立繼多是意在圖其産業本無繼絶之義親疏爭立或夤夜葬埋強行舉挂或計囑親鄰掩有資財論訴尤多連年不決或收養異姓既違法令遣棄任情悉因財産以至兄弟叔姪殊無恩義遞互番論俱遭罪責不知悔改如此等類本合入户絶官司豈利此而立法正謂息爭端耳今來士大夫亦多有此詞訴愚民視效循習為常近年官員合得身後恩澤自長承受以絶妄得之心且人之有子與無豈人能為天理命分而已苟子以承父之遺恩或子亡不得受恩則孫當承祖之遺恩諸孫同視為祖豈宜不從長而從房必有隔驀爭論之弊如此則是朝廷恩澤適足以為薄風之端薄風習熟士夫亦不復知其非矣皆因輕議改法以從私欲遂致風俗薄惡不復有中原承平渾厚之風風俗天下之元氣胡可不正臣愚願聖慈詳酌下有司檢討前後改法之因應别籍異財及無子孫身後立繼及養異姓子孫及身後恩澤悉循舊法以絶爭端以正風俗天下幸甚椿又上奏曰臣竊謂人身之強弱在氣血天下之盛衰在風俗氣血充實雖有無妄之疾可以勿藥而愈風俗醇正雖有非意之事可以不勞而治蓋氣血者身之本也風俗者天下之本也故司馬光曰風俗天下之大事教化國家之急務不可不正也邇來有敗風俗傷教化之語始出於吏輩之口傳之於士大夫之間遂為口實而施之於政事者曰從窄不曰從是而曰從窄豈理也哉從窄之風既行則凡有立功該賞者則必問難而沮之有犯疑失之罪者則必觀望而入之臣伏覩賞令諸功賞未酬敘而逢格改者格輕聽依立功時格重聽從重賞又斷獄律失入者減三等失出者減五等仰見國家立法深合古訓賞疑惟重罪疑惟輕之義也則從窄之政豈不乖國家仁厚之教耶臣近承都堂宣示陛下與大臣論不立朋黨問答仰見聖學髙明深得忠恕一貫之道臣不勝欽歎欣躍之至則從窄之風決非聖意之所許也故敢敷奏伏願陛下有以救其弊然則僥幸不可不禁欺罔不可不戢名分不可不嚴貪汚不可不治一歸於是而後可欲望睿慈特作聖意詔百司凡施於有政者悉從是不得蹈習從窄之語庶賞罰惟允一變厚風而革薄俗天下幸甚中書舍人崔敦詩上奏曰臣聞民俗之厚薄關於天下之治亂堯舜之民比户皆可封也所以為治朝桀紂之民比屋皆可誅也所以為亂世自昔聖帝明王所以移風易俗以夀天下之脈知夫不可以法防而禁止於是一以教化為先暨秦漢以來風俗益弊而時君世主不務崇尚教化方區區於法禁之間法愈繁而姦愈生禁愈密而詐愈出是以董仲舒王吉之徒始推原所自而以教化不修為言竊觀文帝之世一以君子長者之道待天下鎮之以淵默示之以淳朴用能海內富庶興於禮義斷獄數百幾致刑措教化之效詎不然歟臣仰惟陛下勤儉之德仁孝之資尚忠厚以迪民彜崇朴素以先天下是以四海之民觀感而化悉趨於善然而比年以來民俗日薄閭閻之內田野之間習囂囂頑庸之態扇乖爭陵犯之風以疾視為常情以讎殺為美事及其極弊至於滅人情絶天理不可忍言漢魏相所謂今年子弟殺父兄妻殺夫以為非小變者此之謂也而士夫方循習為常恬不為怪蓋病在腹心發見于外已非美證而顧以為緩豈不戾歟雖然近民之官無如郡守上之所使以承流宣化風俗不善宜責於此臣伏望睿慈發德音下明詔俾四方長吏頗以教化為務射鄉食饗之禮可舉者舉之孝友睦姻之俗可旌者旌之要不専於法禁而務以移風易俗使民回心而鄉道兹至治之本也且昔之為郡其民有為不善則閉閣自責今使陛下之長吏人人各以風俗為任則陛下之民其有不歸於善者乎惟聖意留神幸甚員興宗上風俗議曰臣聞聖人於天下之民寬然無所不愛彼無所不愛則宜其無所不教也天下之人油然而生林然而羣方聖人之未作教化之未敷性或浮而傾情或暴而放其始非能周旋曲折而安於禮也雍容和易而安於樂也純一不移而安於信也質直通明而安於義也聖人憂焉有道於此驅天下之人潛納於其中銷其冥頑之姿而制其暴戾之氣使之雍容溫厚由於禮樂而歸於信義雖千百年而俗不變世雖衰弱而民必歸厚三代之風例皆如此彼亦何以至此也則教之使然也臣觀其時朝廷鄉黨閨門之間雍雍穆穆其訓則五常六學其分則士農工賈其衣則黼黻文章其食則籩豆簠簋其治則井田肉刑其進取則學校庠序其飲宴則鄉射齒德之分其野祭大蠟則有歌鼓之節朝會相御之禮一揖之為安而三揖之為尚再拜之為簡而百拜之為尚是其上下紆徐不迫之態形於日用之間而舉不以為難者自後世觀之三代之君民教意煩勞得無迂闊而不可用歟不知禹湯之君惠顧元元其導之深習之熟禮樂信義便民而無蹈浮薄者其權固在於此也嗚呼此三代之所以治周孔之所以言而當時所以為俗歟及秦之興暴而不親刻而不舒非笑先王之六藝破壞聖人之藩墻天下之士民相與從事於迫急慘酷之法不復有三代中和容與之態悲夫秦世輕為天下而壞民俗者乃至於此哉漢室之興公卿上下知斯人憔悴而難與為治也遂欲振之以安謐示之以不競其後搢紳喑喑和附氣益不振故始變為阿諛之俗東京之士懲前世之禍起於柔懦而不振也中世以降竒言過行多矯激以振之故東京再變而為矯亢之俗矯亢而不已故激而為變者必出為三國之惑亂三國惑亂而不已故激而為變者必出為兩晉之虛無其後則愈激而愈變俗愈流訛至唐猶未有所底止也惟我國家列聖相嗣斯民坐解凋弛陶染忠厚故太祖太宗以至仁宗聖言日出足以聳動天下此亦三代先教後懲之俗也陛下臨御以來每於民風猶所加意此採羣臣之言戒奔競去茍且凡有以涉教化者無所不用其至矣德肩三代道並祖宗信其無憾也然臣竊窺逺邇之間習俗久染猶有未盡革者是則官吏不能盡敷德意之過耳且如巨藩劇邑凶民大姦豪斷鄉曲挾持官吏州縣恐懾吏弭首而奉之橫欺小民長其頑嚚此一俗也姦人誦法如誦詩書以教唆為養生以鼓鬬為樂事良民怯畏蓋亦坐是此又一俗也士人以干擾郡縣為資身官吏以販貨道路為得計漸廢廉恥不知紀極不知聖哲在上豈容如此此又一俗也糜金之工肩摩不息暗銷之匠踵接不已竒異之貨夸尚相仍權量出入大小盡變巧詐敢爾是官吏不戒約之過此又一俗也凡此四俗州縣尚未盡革而川峽為尤甚也陛下髙拱九重民俗王風久在聖度凡臣所未議者聖明已先行之惟此毫末決自聖志即賜禁戒此猶遡坂走圓也其又何難之有直寶文閣知靜江府兼廣西安撫李浩入對論俗不美者八其言曰陛下所求者規諫而臣下専務迎合所貴者執守而臣下專務順從所惜者名器而僥幸之路未塞所重者廉恥而趨附之門尚開儒術可行而有險詖之徒下情當盡而有壅蔽之患期以氣節而偷惰者得以茍容責以實效而誕慢者得以自售上問誕慢謂誰浩具以實對翌日謂宰相曰李浩直諒遂除權吏部侍郎直煥章閣王師愈論士大夫習俗上疏曰臣聞相與以維持天下國家者搢紳之士也搢紳之士其用心也公凡舉事焉謀於上者必盡公以採於下聽於下者必盡公以助其上可否之相濟利害之灼見擇其善者而從之故事無不舉而功必隨之矣一或異是乃欲事舉而功成豈不戞戞乎其難哉臣嘗觀先正蘇軾在嘉祐間嘗有言曰今之世所可患者士大夫信服於朝廷者不篤皆好議論以務非其上使人眩於是非而無所從從之則事舉無可為者不從則其所行者常多故而易敗夫所以多故而易敗者人各持其私意以賊之議論勝於下而幸其無功者衆也其言又曰今世之舉事者雖甚小而欲成之者常不過數人欲壞之者常不可勝數嗟乎嘉祐之際可謂盛矣士大夫習俗已如此矣臣竊謂軾之言不特中當時之病亦今日之砭劑也私意一萌惟務已之説勝而謀於上者又未必皆可行而必有成故其弊終至於此耳嗟乎此豈國家之福哉臣愚欲望陛下申飭文武小大之臣各去其私意毋茍且以為同毋矯激以立異凡舉事焉上必盡公以謀於下下必盡公以助其上從善而力行殆見其事舉而功成矣罔俾嘉祐之風俗為軾所議者復熾於今日不其美歟光宗紹熙二年司農寺主簿吕祖儉上奏曰臣聞天下未嘗無事也然其所恃以為安者蓋有忠藎徇臣之臣扶持正救於其間茍人才壞而習俗偷則所恃以為安者既失之矣將何以防其微漸而支其變故耶惟我本朝作成封殖治極隆平繇景德迄于治平豈為無事然皆有其人以當之故天下無變容動色之虞自王安石惡異好同創為一道德同風俗之説於是人才始壞而直諒消亡逮至崇觀間蔡京用事又倡為豐亨豫大之説於是人才愈壞而俗益驕靡當是時也孰不自謂天下廓然無事然靖康之變曾不旋踵三綱幾於墜地如吳幵莫儔首與敵通傳道意旨助成僭竊王時雍徐秉哲追捕宗室戚里係纍送敵迫逐出郊凡若此比難以悉數臣每念及此常切痛心推原禍本是皆狃於熙寧以來邪説之所致也恭惟陛下紹承髙宗夀皇之休緒虛心無我察納雅言有合乎君人之大德是宜四方萬里惟動丕應不應復有熙寧餘論以壞人心然驗之風聲氣習則猶未能無疑拱默成風頽靡成俗精鋭銷耎氣節益衰有所覆護則立一説以自寬有所遷就則求一説以自解間有務為修潔自好者則相與指為詭異其欲發憤悶陳忠讜者則相與指為矯激不幸而少有差忒則又從而媒糵之必使之甘為庸人而後已人材習俗既至於此稍有事變憂在國家陛下亦嘗深察其所以然之故乎蓋比年以來邇列近臣立為皇極之言申以安靜和平之説始觀其名外則甚美徐究其實中乃不然不惟偷合取容者得以假是而務雷同懷茍且以為全軀保妻子之計而斯説之熾將使朝廷之上無復有面折廷爭之風矣仗義守正志存忠愛者議論既不能雷同則必罪之以不協于極舉動既不能苟且則必罪之以不務和平茍被之以是名而不可辭則加之以是罪而不可避風俗頽壞祗務自營儻復浸淫國將何恃是斯説者乃誣害一世君之陷穽而為實禍蔽塞之根本也伏望陛下慨然深念力救此風奬拔忠直以作新斯人拒闢邪説以恢洪正論發為明詔風示多方使忠藎徇國者有以自立而不為習俗之所詆誣而中材常士有以自奮而不為習俗之所移奪夫如是習俗之論可破而不諱之路可開人材作興治道自舉而我之所恃以為安者將益堅固而不可拔矣光宗時軍器少監劉光祖上奏曰比年以來士大夫不慕廉靖而慕奔競不尊名節而尊爵位不樂公正而樂軟美不敬君子而敬庸人既安習以成風謂茍得為至計良由前輩老成零落殆盡後生晚進議論無所據依學術無所宗主正論益衰士風不競幸詔大臣妙求人物必朝野所共屬賢愚所同敬者一二十人參錯立朝國勢自壯臣雖終歲無所奏糾固亦未至曠官今日之患在於不封殖人才臺諫但有摧殘廟堂初無長養臣處當言之地豈以排擊為能哉寧宗嘉定十七年起居舍人魏了翁論士大夫風俗疏曰臣聞人主所與共天下者二三大臣也二三大臣所與共政事者內外百執事也君臣一心上下同德表裏無二顛末不渝然後平居有所裨益緩急可以倚仗如人各有心身自為謀則可否不得以相濟小大不能以相維而天下之患有不可終窮者矣易之同人曰同人于野亨其彖曰維君子為能通天下之志蓋人之心公則一致私則萬殊無以通之則萬殊不一之私心足以害天下至同之公理此其事伏於冥冥而人莫之覺故論今日風俗之弊者莫不議其尚同也而臣則疑其未嘗有同也進焉而柔良退焉而剛方面焉而唯唯否否背焉而戚戚嗟嗟成焉而挾其所嘗言以誇於人不成焉而託於所嘗料以議其上省曹之勘當掾屬之書擬有司之按事長吏之舉賢恩焉則斂而歸已怨焉則委之曰此安能以自由天象之妖祥時政之得失除授之當否疆埸之緩急言焉則矜以為功否焉則訕之曰此徒言而無益嗚呼龍斷而望可左可右踦閭而語可出可入蓋耆利亡恥之人貪前慮後者之為耳士大夫而若此則其心豈復以國事為飢渴休戚者哉蹤迹詭袐朋友有不及知情態橫生父子有不相悉使此習也而日長月益見利則逝見便則奪陛下亦何賴於此也况自比歲封章奏疏對策上書大率應故事徒文具而無惻怛忠敬之實而諉曰惡訐以近名也忌激以敗事也其號為讜直亦不過先為稱贊之詞而後微致規切之意如論治道則曰大綱已舉而節目小有未備論疆事則曰處置得宜而奉行稍若未至前後相師如此類者未易悉舉然猶日鍛月煉晝刪夜改而後上逹夫齊人無以仁義與王言而孟子謂其不敬莫大乎是今之為此説者是敬朝廷乎慢朝廷乎昔者固有百勸而一諷八律而一諫者矣固有約至上前而背其議出言不可而入言可者矣又有始是什三中是什五後是什八始言十事俄去五六又去七八者矣所以裴回顧望則亦有説臨之以投竄死徙也震之以斧鉞刀鋸也然猶有駢頸刑戮竄名雷霆而不顧者今未有漢唐之甚而知莫敢言言莫敢盡非誠不敢也彼其心謂吾君不能行謂吾相不能受寧襮順而裏藏面從而腹誹人見其同也而臣見其未嘗同也人謂其有禮且敬也臣謂其至無禮也至大不敬也雖然士習至此亦有由然者矣老師宿儒零替殆盡後生晚輩不見典刑既無所則效重以正人端士散漫不合故妄揣時尚習諛踵陋而久不之覺臣為此懼深願陛下與二三大臣察人心邪正之實推世變倚伏之幾拓開規摹收拾人物茍挺特自守者雖無順適之可喜而決知其無反覆難信之憂必假借而納用之雷同相隨者雖無觸忤之可憎而決知其有包藏不測之患必疏逺而芟夷之若是則意嚮所形人心胥奮平居有規警之益緩急無乏才之憂其於治道興替關係匪輕臣不勝區區寧宗時將作監主簿牛大年上言曰今日士氣亦久靡矣宜體立國之意以振起之夫有扶持作興之意而後搢紳無貪名嗜利之習無貪名嗜利之習而後有持正秉義之操國家之休戚在士大夫之風俗而風俗之善惡在朝廷惟陛下為之振起機括一運天下轉移而風俗易矣理宗寶慶元年禮部侍郎真德秀上奏曰臣聞國於天地必有與立焉三綱五常是也夫自髙卑奠位而大分已明帝降之衷而善性均有然維持而主張之繄君師是賴故聖人者作躬行此道以標的乎天下君臣之綱正於上而天下皆知有敬父子之綱正於上而天下皆知有親夫婦之綱正於上而天下皆知有别三者正而昆弟朋友之倫亦莫不正使凡生人之類各有寧宇不相鬭暴賊殺者此唐虞三代數聖人之功所以與天地同其大也夫所謂五常者亦豈出乎三綱之外哉父子之恩即所謂仁君臣之敬即所謂義夫婦之别即所謂禮智者知此而已信者守此而已未有三綱正而五常或虧亦未有三綱廢而五常獨存者嗚呼是理也其扶持宇宙之棟幹奠安生民之柱石歟人而無此則冠裳而禽犢矣國而無此則中夏而裔夷矣臣嘗讀詩至六月之序曰小雅盡廢則四夷交侵而中國微夫小雅之詩財二十餘篇而綱常之義略備中國之所以為中國者賴此而已而至於盡廢焉是自為夷也四夷交侵之禍安得不以其類至乎又嘗考觀古昔有當衰微削弱之世而綱常未至泯絶猶足以僅存者亦有治安強盛之世綱常隳弛卒至於大壞而不可救者周自東遷日以卑矣然桓文出力以奬王室則猶有君臣也諸侯會盟以定世子則猶有長幼也故能擁持虛器尚數百年晉氏之興奄有吳蜀再傳而至惠帝可謂極盛矣而陽德不剛隂慝內熾讒巧交煽國本遽搖諸王跋扈主威遂奪三綱盡廢而劉石之變興唐至明皇亦太平極治之日而宫闈怙寵黷亂天常姦諛肆欺潛竊國命凶邪造釁戕伐本支三綱盡廢而羯胡之難作即晉唐之事以驗序詩者之言千載相望若合符契有天下者奈何其不監哉惟我祖宗繼天立極其於事親教子之法正家睦族之道尊主御臣之方大抵根本仁義故先朝名臣或以為家法最善或以為大綱甚正或以為三代而下皆未之有猗歟休哉聖子神孫所當兢兢保持而勿墜也恭惟陛下天啓睿明肇膺大寶此正端本澄源之時臣來自逺方竊聞朝野之論以謂陛下有承順太母之孝有憂憫元元之仁苟推是心何往非善獨不幸處天倫之變有未盡其道者雖棣華之愛方篤而布粟之謡遽興流聞四方所損非淺夫一政之行一令之出茍乖於理害且隨之綱常大端是謂人極人極不立國將奈何且民無常情惟上所導大學曰上老老而民興孝上長長而民興弟又曰一家仁一國興仁一家讓一國興讓蓋情雖無常而性則本善倡之則應作之則興故慈孝隆於上則下有忠順之風愛敬虧於上則下有陵犯之俗影響相從至於可畏伏惟陛下深懲往悔而思所以補過者焉夫天子之孝與臣庶不同陛下欲報先皇之大德則繼志述事所當先衰麻之數哭踊之節其次也欲報慈闈之至恩則先意承志者不可後滫瀡之奉跪拜之恭其末也兢兢朝夕惟實德是充惟大政是習使朝廷以治而宗社以安則子道修矣誦二南正始之詩而思異時之擇配者不可不謹玩大易正家之義而思平居之反身者不可不嚴近而九族必有以廣親睦之仁內而六宫必有以示肅雍之化則家道正矣委任臣工者人君之大體躬親聽斷者人君之大權二義並行初不相悖必使政令出於公朝而絶多門之私威柄歸於王室而無倒持之失則君道立矣子道修者仁之本家道正者禮之源而君道之立則又天下大義所由定陛下儻能明此三者而行之一本於誠則不求感人而人自孚不求正俗而俗自化姦雄不得為辭以動衆夷狄不得伺隙以生心治安長久之計無越諸此臣以迂疏誤蒙召擢置在春官實掌邦禮深惟治亂安危之本豈在玉帛鐘鼓之間故於進對之初首以大經大法為陛下告狂愚無取惟聖明擇焉淳祐間知南劍州徐元杰上奏曰臣聞之詩曰周雖舊邦其命維新言邦邑承襲之舊而當作新乎民以迎天命之常新也今錢塘駐蹕之久驕奢淫逸長此安窮人欲熾而天理泯矣滌舊染之風聲回新美之氣習此其機括在陛下而已然自曩時有納聲色以固寵位者而後舉天下成誨淫之風至今觀光上國之士自一命以至班改粉白黛緑羣載後車其勢已不容不貪黷臣觀都人生女自襁褓而教歌舞計日而鬻之不復有人父母之心士大夫以其良貴不資之身每每自戕於冶容茍售者之賤則夫嚴事君父而告之以不邇聲色覬其育粹清明也奚其信昔墨翟不入朝歌之邑今堂堂禮樂之區此風積習轉轉日甚連甍罕良家矣是可不為風俗慮乎唐太宗出宫女三千人蓋其英武有大志如此孰謂陛下春秋鼎盛而不能為太宗之勇乎繼今其端本於宫掖之邃率先以禮制心而後士大夫能以禮自防民德可以歸厚矣自曩時有來苞苴以啓貪殘者而後舉天下成誨盜之風今苞苴之路雖窒士大夫猶忍施劫奪之政其弊在於不貴桑麻榖粟而貴金銀之器用匹夫之家亦越分而求之莫畿甸為尤甚比年金銀踴直上應乎天象之占楮幣積輕反以為郡縣折變之利士大夫方征求竊取不念胞體之本同向也緑林鼪鼯之擾生靈肝腦塗地以至上關玉食之憂而士大夫至自賈禍者懷璧其罪也齊髙帝曰吾治天下當使黃金與土同價陛下動心於此不以人廢言而以流化自近始繼今惟儉朴實用之崇置金銀於無用之地屛貪殘以挽生意消物欲以還天真是亦陛下訓廉謹刑之一助矣今流風交煽侈習競趨渡江以前窮奢極娛之禍厥鑒猶不逺也京畿根本實係觀瞻風俗樞機端自聖化為今之計莫若抑文尚質務實去華明禮教而為之範因人情而為之防欲使都人知有人父母之心不可不使士大夫知有暗室屋漏之愧臣願陛下以身帥臣下臣下以身率天下舊邦新命此其日也臣迫於憂愛而言之惟陛下與二三大臣亟圖之元杰為侍左郎又上奏曰臣既懇懇納忠為陛下大臣解士論之疑敷陳於黼座之前矣然念國於天地必有與立君臣上下交相維持所以為國逺慮扶世常經者要當隨事救失不當以患失為事蓋救失與患失異救失者綱常必飭名義必正經紀必陳立制度必昭明謂正心修身為齊家治國之本故自上而下自早而暮惟以聞義不徙不善不改為憂他又何所患焉彼患失者一切反是以私恩為必報而每急於徇人以競進為良圖而不顧於喪已得位者以同流合汙為至行任事者以便私適已為長策謂觸忤為妨進則事有可論不暇及也謂喑啞為圓機則心知其非何敢議也滔滔流俗幾年于兹悠悠風塵賢者不免若是者豈非患失之習有以痼之邪夫惟心有患失之蔽見利害而不見是非名位光顯第第茍容而不知名義植立凛凛難挫且今日在朝布列致身通顯者皆天資之美者也勇往直前聖賢事業夫孰不可勉者日用動息事無非學交遊切磨學無非事人苦不自覺耳粵昔警省之助莫大於官師之相規有志功業之賢臣亦必曰勤攻吾闕求如不及可也不然本心之失懵不知救顧惴惴然患外物之失孔子曰茍患失之無所不至矣吁可畏哉雖然士大夫當化風俗不當議風俗當論事理之是非不當恤身事之利害泛然言人之失則甚易奮然救已之失則甚難臣早夜憂薰動息猛省堅苦刻厲粗謹初心惟恐庸愚易至間斷一不自覺駸駸小人之歸尚何以議人哉臣之初來惟欲一面清光於去天稍久之餘亟求還山勉卒舊業者臣之心也恩除太過隱然於心將亦不免動於患失之私矣因念學無止法過必改之反求本心痛切警懼日月之不再而人之所以為人者渺茫也臣既請罷職事伏惟陛下曲成臣志放臣還山臣犬馬之齒未衰事陛下之日儘長感時憂深誼當引去惟陛下矜赦元杰又上言曰臣又聞人才難得自昔之通患人心不正今日之隱憂莫深焉夫士大夫不可以負知己固也自他人對知己而言則重在於知己自知己對君父而言則君尊如天無二上也他何敢知臣嘗怪夫舉主之薦人則終身有門生之稱士夫干求汲引其未薦之始已諛之以恩門矣以公舉而為私謝以朝廷之公法而便豫者求者之私欲士風既壞習俗已成雖有識之士勉強而從俗焉臣前日講次讀國朝通略而陛下與臣嘉歎藝祖皇帝之逺慮始詔進士不得呼知舉官為師門恩門并自稱曰門生此正人心之要術也今日士大夫知有私恩而鮮知有君父陛下既奮然作新之矣臣於此欲乞陛下明詔大臣取藝祖之所以戒進士者戒今日之士大夫請自來歲元日為始凡下而舉主之薦進上而大臣之擬除皆當使士大夫知有國法知有君恩不許仍襲恩門恩家恩座恩公之稱併於門生二字亦合禁止內則令臺諫給舍覺察之外則使監司郡守稽劾之如此則人心正而風俗定其於世道非小補云寶祐元年起居郎牟子才上疏曰臣聞羞惡人之良心廉恥國之大禁比年以來羞惡不立廉恥盡已皆由士大夫急於富貴不自知其失口失色以至此極也易曰比之匪人不亦傷乎程頤以為三不中正而所比皆不中正其失皆可知言傷則悔吝不足道也古之人寧道之不行而不輕其去就是以孔孟雖在春秋戰國之時而進必以正彌子瑕謂孔子主我衛卿可得也孔子答以有命孟子出弔於滕嬖人王歡朝暮見孟子未嘗與之言行事此皆孔孟之門大公案也為孔孟之學者安可踰越廉恥跌宕羞惡而惟匪人之比乎近者張元忠之事亦今日士大夫一大廉恥也窟穴既空書簡畢見姓名具在氣節盡頽風俗之衰莫此為甚天下惟精金不變惟良玉不燼惟大廉不汚惟真儒不磷或變或燼非精金良玉也或貪或磷非大廉真儒也人豈無真羞惡今以誘而奪世豈無真廉恥今以誘而喪士大夫而以世道自任當精擇乎此然獨為君子固伯玉之所當恥而衆醉獨醒亦屈原之所自見陛下安可以為細故而忽之耶先朝李士寧以卜祝賤流招權納勢朝士曲意交結多有書尺往還惟王旦一人無書尺童貫輩以內侍強幹為上所信士大夫爭趨其門至書姓名于簿宇文粹中一人無姓名其他如林霛素郭天信之流趨者瀾倒迄至敗露今元忠非卜史宦官之比特依憑假託一黥奴耳士大夫屈不資之軀下交之固已可羞今乃與之接杯酒盡殷勤通書簡話情素亦獨何心哉陛下涵養人才惟恐不至而諸臣乃負陛下如此陛下又一切涵容之天覆地載聖度固自寬𢎞而彼獨不愧於心乎參之公論以為淑慝不明士大夫以身處汚穢而不羞以狐行暮夜為得計其何以示天下後世哉臣愚欲望陛下以此為監凡有夤緣憑藉由他蹊以進者擯而斥之其為厚廉恥明羞惡者大矣惟陛下實圖利之理宗時司農卿權工部侍郎陳塏上奏曰臣願陛下轉移世道之樞機砥礪士大夫之廉恥使知名義為重利祿為輕久去國以恬退聞者召之久立朝以更迭請者從之甘言容恱者必斥真情丐間者勿留如此則君臣上下皆以真實相與四維既張士大夫難進易退之風當見於聖世人才幸甚權司封郎官許應龍上奏曰臣聞天下有當然之理不可有所激尤不可有所徇激則矯枉以過正故不合乎中徇則迎合以茍容又豈復有至當之論哉古之君子平心以應物毋固毋我惟視夫理之如何耳其行已則中不倚而和不流其待人則上不諂而下不瀆論事則明辨是非而不立異以求勝事上則將順正救不以訐而為直外不為人之所忌中不失吾之所守安見其所謂激而又孰得以議其徇哉此乃時中之道士大夫之所當尚也奈何人無定守視時變遷見夫激之可以立名也則假公以濟私惡常而好異互相矛盾不問是非若是者固不能以成事而秪見其多事又見夫徇之可以媒進也則揣摩而求合阿附以取容同聲相應無復可否若是者雖不至於生事而必至於誤事握風俗之樞者將欲約其偏而歸之中可不示之以好惡而使之知所趨避哉仰惟陛下以中正履位以道德同俗建用皇極以革偏詖之私並用才德以示翕受之公保合太和以杜分朋植黨之漸既不使之過於激復不使之流於徇可謂得大中之道而明善俗之方矣然士大夫之心既不至於激則必至於和賢和於朝固帝治之盛然和而不同斯謂之君子焉一或苟同則其弊復流於徇是又不可不察也利害可言也復恐時好之不合姦弊當革也復恐吏強而難制難從之請恐有所拂而曲從之不可行之事或有所迫而強行之薦舉則多徇於私囑豫決則或持於兩可若是之類皆未免有所徇也轉而移之誠不容緩今陛下不倦於聽納大臣方切於延訪以公滅私屢形於戒飭用例破法纍見於申明固未嘗不欲聞正論而明公道也然作之而未應倡之而未隨者何邪昔人有言曰人臣事君之常情不從其令而從其意臣願陛下益開衆正杜絶羣枉奬端方之士振委靡之習使天下昭然知上意之所向則觀感之下孰不精白一心以承休德在位正直之風當不愧於羔羊矣狂瞽之言冒犯天威惟陛下赦其愚許應龍進抑奔競故事曰昔慶厯間輔臣列奏答手詔謂躁進之途宜塞臣等謂躁進懷貪之人何代無有在朝廷辨明而進退之如責人實效旌人清節貪冒者廢之趨附者抑之如此則多士知勸各生廉退之心皇祐間常患搢紳奔競仁宗諭近臣曰恬退守道者旌擢則躁求者自當知恥於是宰相文彥博曰韓維安於恬退乞加甄録以厚風俗臣聞求者豫之不求者不豫此人之所以求也夫奔競之習固不能免特在夫上之人處之如何耳爵祿在上下皆趨而爭之故名曰奔競則其弊非在下也誘之於上而禁之於下猶聚羶而欲去蟻雖防禁日嚴亦豈能杜絶之哉惟當崇尚恬退不待其求徑加擢用公道既眀不可幸得則人皆勉於為善以求自見頭鑽肘刺既知無益則奔競之習不待革而自止仁祖諭近臣曰恬退守道者旌擢則躁求者知恥慶厯輔臣亦謂責實效而旌清節則多士知勸此乃清源正本之論今之奔競其弊已極未歷仕而求辟無寸功而冒賞捨法用例宛轉扳援趨權附勢妄圖榮進承乏則冀即真未滿則思內擢圖近次則攘人之闕而勒令改替百計營求不進不止其得者必不肯以僥幸自名則其不得者必以沉淪為歎舉生妄心恥不若人何所不至欲望風俗之厚不亦難乎推原其故雖起於在下者有所求而亦基於在上者有以遂其求惟不待求而自豫有所求而不豫兹實救弊之要術也蓋中人之性易流榮進之念誰獨無之不求自得則孰不各安其分不求不得亦無惑乎求者之多也誠使兩造吾門者抑之以戒貪進安於靜退者薦之以厚風俗則伺候於王公之門奔走於形勢之塗者必皆聞風斂迹恐為清議之所指目况敢冒然而求進乎夫一兔在野百人逐之以可求而得也積肉在市過者不顧以求而不可得也茍皆知不當得者不容妄求則奔競之風不患其難革矣惟陛下與大臣圖之元英宗時監察御史烏克遜良楨以國俗父死則妻其從母兄弟死則收其妻父母死無憂制遂上奏曰綱常皆出於天而不可變議法之吏乃言國人不拘此例諸國人各從本俗是漢南人當守綱常國人諸國人不必守綱常也名曰優之實則陷之外若尊之內實侮之推其本心所以待國人者不若漢南人之厚也請下禮官有司及右科進士在朝者會議自天子至於庶人皆從禮制以成列聖未遑之典明萬世不易之道歷代名臣奏議卷一百十七
