body:
  text: 歴代名臣奏議卷六十六明楊士竒等撰治道元世祖至元三年許衡召至京師命議事中書省衡乃上䟽其一曰為天下國家有大規模規模既定循其序而行之使無過焉無不及焉則治功可期否則心疑目眩變易紛更日計有餘而嵗計不足未見其可也昔子産處衰周之列國孔明用西蜀之一隅且有定論而終身由之況堂堂天下可無一定之論而妄為之哉古今立國規摹雖各不同然其大要在得天下心得天下心無它愛與公而已矣愛則民心順公則民心服既順且服於為治也何有然開創之始重臣挾功而難制有以害吾公小民雜屬而未一有以梗吾愛於此為計其亦難矣自非英睿之君賢良之佐未易處也勢雖難制必求其所以制衆雖未一必求其所以一前慮却顧因時順理予之奪之進之退之内主甚堅外行甚易日戞月摩周旋曲折必使吾之愛吾之公逹於天下而後已至是則紀綱法度施行有地天下雖大可不勞而理也然其先後之序緩急之宜宻有定則可以意㑹而不可以言傳也是之謂規摹國朝土宇曠逺諸民相雜俗既不同論難遽定考之前代北方奄有中夏必行漢法可以長久故後魏遼金歴年最多其它不能實用漢法皆亂亡相繼史册具載昭昭可見也國家乃處逺漢無事論此必知今日形勢非用漢法不宜也陸行資車水行資舟反之則必不能行幽燕以北服食宜凉蜀漢以南服食宜熱反之則必有變異以是論之國家當行漢法無疑也然萬世國俗累朝勲貴一旦驅之下從臣僕之謀改亡國之俗其勢有甚難者茍非聦悟特逹曉知中原實歴代帝王為治之地則必咨嗟怨憤諠譁其不可也竊甞思之寒之與暑固為不同然寒之變暑也始於㣲温温而熱熱而暑積百有八十二日而寒氣始盡暑之變寒其勢亦然山木之根力可破石是亦積之之騐也茍能漸之磨之待以嵗月心堅而確事易而常未有不可變者然事有大小時有久近期小事於逺則遷延虚曠而無功期大事於近則急廹倉皇而不逹此創業垂統也以北方之俗改用中國之法也非三十年不可成功在昔金國初亡便當議此此而不務孰為可務顧乃宴安逸豫垂三十年飬成尾大之勢祖宗失其機於前陛下繼其難於後外事征伐内撫瘡痍雖曰守成實如創業規摹之定又難於嚮時矣然尾大之勢計聖謀神筭已有處之之道非臣區區所能及也此外唯當齊一吾民使之富實興學練兵隨時損益稍為定制如臣輩者皆能論此在陛下篤信而堅守之不雜小人不營小利不責近效不恤浮言則天下之心庶幾可得而致治之功庶幾可成也其二曰中書管天下之務固不勝其煩也然其大要在用人立法二者而已近而譬之髮之在頭不以手理而以櫛理又譬之食之在器不以手取而以匕取手雖不能自為而能用夫櫛與匕焉是即手之為也上之用人何以異此不有司直欲躬役庶務將見日勤日苦而日愈不暇矣古人謂得士者昌自用則小意正如此夫賢者識治之體知事之要與庸人相懸盖十百而千萬也布之周行百職具舉宰職總其要而臨之不煩不勞此所謂省也然人之賢否未能灼知其詳固不敢用或已知其孰為君子孰為小人復畏首畏尾患得患失坐視其弊而不敢進退之徒曰知人而實不能用人亦何益哉人莫不飲食也獨膳夫為能致氣味之美莫不覩日月也獨術者為能歩虧食之數得法與不得法固難一律論有馬不能習必借人乘之有玉不能治必求玊人雕琢之小物尚爾況堂堂天下神器可使不得法者為耶古人謂為山必因丘陵為下必因川澤意正如此夫治人者法也守法者人也人法相維上安下順而宰職優㳺廊廟之上不煩不勞此所謂省也里巷之談動以古為詬戲不知今日口之所食身之所衣皆古人遺法而不可違者豈天下之大國家之重而古成法反可違邪其亦弗思甚矣用人立法今雖未能遽如古昔然已仕者便當頒降俸給使可飬㢘未仕者且當寛立條格俾就叙用則失職之怨少可舒矣外設監司糾察汚濫内專吏部考定資歴則非分之求漸可息矣再任三任抑髙舉下則人才爵位略可平矣舎此則堆積壅塞參差謬戾茍延嵗月莫知所期俸給之數叙用之格監司之條例先當擬定至於貴家世襲品官任子驅良抄數之便宜續當議之亦不可緩也此其大凡要須深探古人所以用人立法之意推而行之則何難見之有若夫得行與不得行在上之委任者何如而能行與不能行又在執政者得人不得爾此非臣之所能及也其三曰民生有欲無主乃亂上天眷命作之君師必與之聦明剛斷之資重厚包容之量使首出庶物而表正萬邦此盖天以至難任之非予之可安之地而娛之也堯舜以來聖帝明王莫不兢兢業業小心畏慎日中不暇未明求衣誠知天之所畀至難之任初不可以易心處知其為難而以難處則難或可易不知為難而以易䖏則它日之難有不可為者矣孔子謂人之言曰為君難為臣不易則其説所由來逺矣為臣不易臣已告之安圖至為君之難尤陛下所當專意者臣請舉其切而要者欵陳於後人君不患出言之難而患踐言之難知踐言之難則其出言不容不慎矣昔劉安世見司馬温公問盡心行已之要可以終身行之者公曰其誠乎劉公問行之何先公曰自不妄語始劉公初甚易之及退而自隱括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕臣按劉安世一士人也所交者一家之親也一鄉之衆也同列之臣不過數十百人而止耳然以言行相較猶有自相掣肘矛盾者況天下之大兆民之衆事有萬變日有萬㡬而人君以一身一心酧酢之欲言無失豈易能哉故有昔之所言而今日不記者今之所命而後日自違者可否異同紛更變易紀綱不得布而法度不得立臣下雖欲黽勉而竟無所持循徒汩没於瑣碎之中卒於無補況因之為弊者又日新月盛而不可遏在下之人疑惑驚眩且議其無法無信一至於此也此無他至難之地不以難處而以易處之故也茍從古者大學之道以修身為本凡一事之來一言之發必求其所以然與其所當然不牽於愛不蔽於憎不因於喜不激於怒虛心端意熟思而審處之雖有不中者盖鮮矣奈何為人上者多樂舒肆為人臣者多事容悦容恱本為私也私心盛則不畏人矣舒肆本為欲也欲心熾則不畏天矣以不畏天之心與不畏人之心感合無間則其所務者皆快心事耳快心則口欲言而言身欲動而動又豈肯兢兢業業以修身為本一言一事熟思而審處之乎此人君踐言之難所以又難於天下之人也人之情偽有易有險險者難知易者易知易知者雖談笑之頃几席之間可得其底藴難知者雖同居共事閲月窮年猶莫測其意之所向雖然此特繫夫人之險易者然也又有衆寡之辨焉寡則易知衆則難知難知非不智也用智分也易知非多智也合小智而成大智也故在上之人難於知下而在下之人易於知上其勢然也處難知之地御難知之人欲其不見欺也盖難矣昔包孝肅剛嚴峭直號為明察有編民犯法當杖脊吏受賕與之約曰今見尹必付我責狀汝第呼號自辯我與汝分此罪汝決杖我亦決杖既而包引囚問畢果付吏責狀囚如吏言分辯不已吏人厲聲訶之曰但受脊杖出去何用多言包謂其恃權捽吏於庭杖之十七特寛囚罪止從杖坐以沮吏勢不知乃為所賣卒如素約臣謂此一京尹耳其見於人不過誤一事害一人而已人君處億兆之上所操者予奪進退賞罰生殺之權不幸見欺以非為是以是為非其害可勝既耶人君唯無喜怒也有喜怒則賛其喜以市恩鼓其怒以張勢人君惟無愛憎也有愛憎則假其愛以濟私藉其憎以復怨甚至本無喜也誑之使喜本無怒也激之使怒本不足愛也強譽之使愛本無可憎也強短之使憎若是則進者未必為君子退者未必為小人予者或無功而奪者或有功也以至賞之罰之生之殺之鮮有得其正者人君不悟日在欺中方仗若曹擿發細隱以防天下之欺欺而至此欺尚可防耶大抵人君以知人為貴以用人為急用得其人則無事於防矣既不出此則所近者争進之人耳好利之人耳無耻之人耳彼挾詐用術千蹊萬逕以蠱君心於此欲防其欺雖堯舜不能也賢者以公為心以愛為心不為利回不為勢屈寘之周行則庶事得其正天下被其澤賢者之於人國其重固如此也然或遭時不偶務自韜晦有舉一世而人不知者雖或知之而當路之人未有同𩔖不見汲引獨人君有不知者人君雖或知之召之命之泛如廝養而賢者有不屑就者雖或接之以貌待之以禮而其所言不見信用有超然引去者雖或信用復使小人叅於其間責小利期近效有用賢之名無用賢之實賢者亦豈肯尸位素餐徒費廪禄取譏誚於天下也雖然此特論難進者然也又有難合者焉人君位處崇髙日受容恱大抵樂聞人之過而不樂聞已之過務快已之心而不務快民之心賢者必欲匡而正之扶而安之使知堯舜之正堯舜之安而後已故其勢難合況奸邪佞婞醜正惡直肆為詆毀多方以陷之將見罪戾之不免又可望庶事得其正天下被其澤邪自古及今端人雅士所以重於進而輕於退者盖以此爾大禹聖人聞善即拜益戒之曰任賢勿貳去邪勿疑貳之一言在大禹猶當警省後世人主宜如何哉此任賢之難也奸邪之人其為心險其用術巧惟險也故千態萬狀而人莫能知如以甘言卑辭誘人於過失然後發之之𩔖惟巧也故千蹊萬徑而人莫能禦如勢在近習則誘近習勢在宫闈則諂宫闈之𩔖人君不察以諂為恭以訐為公以欺為可信以佞為可近喜怒愛惡人主故不能無然有可者有不可者而奸邪之人一於迎合竊其勢以立已之威濟其欲以結主之愛愛隆於上威擅於下大臣不敢議近親不敢言毒被天下而上莫之知此前人所謂城狐也所謂社䑕也至是而求去之不已難乎雖然此由人主不悟誤至於此猶有說焉如宇文士及之佞太宗灼見其情而竟不能斥李林甫妒賢嫉能明皇洞見其奸而卒不能退邪之惑人有如此者可不畏㢤上以誠愛下下以忠報上有感必應理固宜然然考之往昔有不可以常情論者禹抑洪水以救天下其功大矣啓賢能敬承繼禹之道其澤深矣然一傳而太康才畋于洛萬姓即仇而去之吁可恠也漢高帝起布衣天下之士雲合景從其困滎陽也紀信至捐生以赴急人心之歸可見矣及天下已定而相聚沙中有謀反者此又何邪竊嘗思之民之戴君本於天命初無不順之心也特由使之失望使之不平然後怨望生焉禹啓愛下既如赤子矣民之奉上亦如父母矣今太康尸位以逸豫㓕厥徳非所以為父母也是以失望秦楚殘暴故天下叛之漢政寛仁故天下歸之今高帝用愛憎行誅賞非所以為寛仁也是以不平推是二者參較古今凡有恩澤於民而民怨且怒者莫不𩔖乎此也大抵人君即位之始多發美言詔告天下天下恱之冀其有實既而實不能副遂怨心生焉一𩔖同等無大相逺人君特以已之私好獨厚一人則其不厚者已有疾之之意況厚其有罪而薄其有功豈得不怒於心耶失望之怨不平之怒鬱而不解雖曰愛之惡在其為愛之也必如古者大學之道以修身為本凡一言也一動也舉可以為天下法一賞也一罰也舉可以合天下公則億兆之心將不求而自得又豈有失望不平之累哉奈何此道不明為人君者不喜聞過為人臣者不敢盡言合二者之心以求天下之心則其難得也固宜三代而下稱盛治者無若漢之文景然考之當時天象數變如日食地震山崩水潰長星彗星孛星之𩔖未易遽數前此後此凡若是者小則有水旱之應大則有亂亡之應未有徒然而已者獨文景克承天心消弭變異使四十年間海内殷富黎庶樂業移告訐之風為醇厚之俗且建立漢家四百年不拔之業猗歟偉哉未見其比也秦之苦天下乆矣加以楚漢之戰生民糜滅戸不過萬文帝承諸吕變故之餘入繼正統專以飬民為務其憂也不以已之憂為憂而以天下之憂為憂其樂也不以已之樂為樂而以天下之樂為樂今年下詔勸農桑也恐生民之不遂明年下詔減租稅也慮民用之或乏懇愛如此宜其民心得而和氣應也臣竊見前年秋孛出西方彗出東方去年冬彗見東方復見西方議者咸謂當除舊布新以應天變臣謂與其妄意揣度曷若直法文景之恭儉愛民為理明義正而可信也天之樹君本為下民故孟子謂民為重君為輕書亦曰天視自我民視天聽自我民聽以是論之則天之道恒在於下恒在於不足也君人者不求之下而求之高不求之不足而求之有餘斯其所以召天變也變已生矣象已著矣乖戾之幾已萌而不可遏矣猶且因仍故習抑其下而損其不足謂之順天不亦難乎此六者難之目也舉其要則脩徳用賢愛民三者而已此謂治本治本立則紀綱可布法度可行治功可必否則愛惡相攻善惡交病生民不免於水火以是為治萬不能也其四曰語古之聖君必曰堯舜語古之賢相必曰稷契盖堯舜能知天道而順承之稷契又知堯舜之心而輔賛之此所以為法於天下而可傳於後世也天之道好生而不私堯與舜亦好生而不私若克明俊徳至黎民於變敬授人時至庶績咸熈此順承天道之實也稷播百榖以厚民生契敷五教以善民心此輔賛堯舜之實也是義也出書之首篇曰堯典曰舜典臣自十七八時已能誦説爾後温之復之推之衍之思之又思之苦心極力至年五十始大曉悟以是參諸往古而徃古聖賢之言無不同騐之歴代而歴代治亂之迹無不合自此胸中廓然無有凝滯㫁知此説實自古聖君賢相平天下之要道既幸得之常以語人而人之聞者忽焉泛焉莫以為意察其所至正如臣在十七八時盖無臣許多思慮許多工夫其不能領解理固宜然然間與一二知者相與講論心融意㑹雖終日竟夕不知其有倦且怠也盖此道之行民可使富兵可使彊人才由之以多國勢由之以重臣夙夜念之至熟也今國家徒知斂財之巧不知生財之由不惟不知生財而歛財酷又害於生財也徒欲防人之欺不欲飬人之善所以防者為欺也不欺則無事於防矣欲其不欺非衣食以厚其生禮義以飬其心則不能也徒患法令之難行不患法令無可行之地上多賢才皆知為公下多富皆知自愛則令自行禁自止誠能自今以始優重農民勿使擾害盡敺㳺惰之人歸之南畆嵗課種樹懇諭而督行之十年以後當倉盈庫積非今日比矣自上都中都下及司縣皆設學校使皇子以下至於庶人之子弟皆從事於學日明父子君臣之大倫自洒掃應對至於平天下要道十年已後上知所以御下下知所以事上上下和睦又非今日比矣能是二者則萬目皆舉不能是二者它皆不可期也是道也堯舜之道也堯舜之道好生而不私唯能行此乃可好生而不私也孟子曰我非堯舜之道不敢陳於王前臣愚區區竊亦願學其五曰夫天下所以定者民志定也民志定則士安於士農安於農工商安於工商則在上一人有可安之理民不安於白屋必求禄仕仕不安於卑位必求尊榮四方萬里輻輳並進各懐無厭無耻之心在上之人可不為寒心哉臣聞取天下者尚勇敢守天下者崇退譲不尚勇敢則無以取天下不崇退讓則無以守天下取也守也各有其宜君人者不可以不審也審而後發發無不中否則觸事遽喜喜之色見於貌喜之言出於口人皆知之徐考其故知無可喜者則必悔其喜之失無可怒者則必悔其怒之失其至先喜後怒先怒後喜先喜是則後之怒非也先怒是則後之喜非也號令數變無他也喜怒不節之故是以先王潛心恭黙不易喜怒其未發也雖至近莫能知其發也雖至親莫能移故號令簡而無悔無悔則自不中變也人之揣君必於喜怒知君之喜怒者莫如近愛是以在下希進之人求託近愛近愛不察乃與之為地甚至無喜生喜無怒生怒在上獨以喜之怒之為當理而不知天下四方譏笑怨謗正以為不當理也最宜深念失於不守大體易於喜怒也數變已不可數失信尤不可周幽王無道不畏天不愛民酒荒色荒故不恤方今無此何苦使人之不信書奏帝嘉納焉衡又上䟽曰國家自壬辰之後便當詢求賢哲商論歴代創業垂統之宜參酌古令稍為定制使後世子孫垂拱守成此有國之先務也因習宴安已為不可而其委任又多殘民蠹國之流壬寅以還民益困弊至於己酉庚戍民之困弊極矣困弊既極殆將起亂當是時陛下有愛民之譽好賢之名聞於天下天下望之如旱之望雨故先皇帝繼統民皆欣悦將謂信從陛下選任善人以改更弊政以興天下不意仍踵前失再用此徒委以天下之民使之刻剥付天下之物使之侵削大為失望所賴者分河南闗中得陛下委之諸賢不一二嵗疲民大安恩雖未普而天下之心已歸矣此曹畏避威名不敢恣横但於君臣骨肉之間隂行譛愬將欲不利於陛下天命人心皆在於此故不得遂其所願然委付事實為不可而其間節目又少有可不可焉其可者已在不可之中不得為可其不可者是又不可之不可者也淺見若此未知是否臣某伏覩先皇帝聖㫖叮嚀懇至其大要欲事辦民安二者而已然所委之人惟能刻剥窮民阿附近要肆為欺蔽竊據寵權又烏知事之所以辦民之所以安乎自壬寅之後民已困苦至於己酉庚戍民困苦極矣虐政所加無從控告先皇帝在潛邸固知此弊及其繼統不唯不見黜逐且遽復大權而委用之於此見欺而所命之㫖皆屬不可不必更於其中有可不可之辨也借寇兵而資盜糧不必指其兵曰孰利孰鈍指其糧曰孰新孰陳伏念臣草茅寒士聞見陋狹本非長材學且迂逺陛下好賢樂善旁求隱匿而某也偶以虚名塵瀆聖聽䝉陛下招聘徴延訪問為治之方擢居祭酒之職方且慙靦無由以副陛下眷顧之勤豈意非常之寵忽由天降㧞臣陪列之中遽升台鼎之重承命震駭不知所措敬詣宸闕懇辭再三而陛下執之愈堅用是惶惑畏悚雖以孱病之軀忘其固陋思進一言以圖報効輙罄竭愚誠指陳時政而庸戅鄙直不能回互矯切事情幸陛下聖恩𢎞大不惟不遽加誅責且仍使尸居相位任大功小虚負寵光愈増憂懼以故向來之病有加無退竊自惟度於國則殊無寸補於身則日就危困可不懼哉毫釐有差則寰海致弊豈可茍叨榮寵以妨天下之賢哉乞復居舊職以虚陛下待賢之地博選周行以揚陛下敬天之休則臣某不勝幸甚五年衛輝路揔管臣陳祐謹齋沐百拜獻書於皇帝陛下臣今越職言事事曰三本皆國家大計非不知獲罪于時也顧臣起身微賤臣之先王謂穆格大王也拔臣於畎畝之中進臣於陛下陛下任臣以方面之重錫臣以虎符之榮臣叨居陛下之官食陛下之禄將踰十年矣是以朝夕感愧毎思敷陳國計効死以報陛下亦所以報先王也儻蒙陛下察臣愚忠以臣言萬一有補於時貰以不死俾開言路臣之幸也若以臣言狂瞽冐犯時忌其罪當死死於國計臣之義也伏望陛下賜以燕閒之暇熟覽臣言則臣纎芥之忠山嶽之罪舉無逃於聖鑑矣惟陛下仁聖裁之臣聞殷周漢唐之有天下也天生創業之君必生守文之主盖創業之君天所以定禍亂也守文之主天所以致隆平也昔我聖朝之興也太祖皇帝龍飛朔方雷震雲合天下響應統一四海君臨萬邦雖湯武之盛未之有也天眷聖朝實生陛下陛下神武聖文經天緯地能盡守文之美兼隆創業之基兆民懽康品物咸遂典章文物燦然可觀暨遐域逺方之民上古所不能臣者陛下悉能臣之雖髙宗之興殷成康宣王之興周文景光武之興漢太宗憲宗之興唐無以過也是以海内豪傑之士翕然向風咸謂天命陛下啓太平之運者有四民望陛下樹太平之本者有三臣請條列而言之陛下昔在藩邸之初奉辭伐罪西舉大理勢若摧枯南渡長江神於反掌此天命陛下揚萬里之威定四方之亂將降大任於陛下即位之後内難方殷藩王之階亂者在北逆賊之連禍者在東然天戈一指俱從平蕩此天命陛下削藩鎮有釁之權新唐虞無為之化將以躋斯民於仁壽之域也臣故曰天命陛下啓太平之本者有三其一曰太子國本建立之計宜早臣聞三代盛王有天下者皆以傳子非不欲法堯舜禪譲之美也顧其勢有不能爾何則時俗有厚薄之殊民情有變遷之異茍或傳非其人禍源一啓則後世爭之其亂未易息也以是見聖人公天下之憂深矣故孟軻曰天與賢則與賢天與子則與子夫所謂天與子者非謂天有諄諄之言告諭人主以傳子之計也政謂時運推移無非天理聖人能與時消息動合天意故自天祐之吉無不利是以三代享祚長久至有踰六七百年者以其傳子之心公於為天下不私於已故也伏見聖代隆興不崇儲貳故授受之際天下憂危曩者建藩屏之國授諸侯之兵所以尊王室衛社稷實祖宗創業之𢎞規也迨乎中統之初頗異於是恃其國之大也謀傾王室者有之恃其兵之强也圖危社稷者有之當是之時賴陛下斷自聖衷筭無遺䇿故揔攬權綱則藩鎮之禍銷矣深固根本則朝廷之計定矣此陛下守文之善經也何以言之天下者太祖之天下也法令者太祖之法令也陛下豈欲變易舊章作為新制以快天下耳目之觀聽哉誠以時移事變理勢當然不得不爾期於宗社之安而已矣由此觀之國本之議昭然甚明不可緩也語曰雖有智慧不如乘勢雖有鎡基不如待時今年榖屢登四海晏然此其時矣億兆戴徳侯王向化此其勢矣誠萬世一時也夫天與不受則違天意民望不副則失民心失民心則可憂違天意則可懼此安危之機不可不察也伏惟陛下上承天意下順民心體三代宏逺之規法春秋嫡長之義内親九族外恊萬邦建皇儲於春宫隆帝基於聖代俾入監國事出撫戎政絶覬覦之心壹中外之望則民心不搖邦本自固矣陛下藴謙光之徳縱不欲以天下傳子孫獨不念宗廟之靈社稷之重生民之塗炭乎願陛下熟計而為之則天下臣民之幸甚矣其二曰中書政本責成之任宜專臣伏見陛下勵精為治頃年以來建官分職綱理衆務可謂備矣曰中書曰御史曰樞宻曰制國用曰左右部夫承命宣制奉行文書銓叙品流編齊户口均賦役平獄訟此左右部之責也通漕運謹出納充府庫實倉廪百姓富饒國用豐備此制國用之職也修軍政嚴武備闢疆埸肅號令謹先事之防銷未形之患士馬精强敵人畏服此樞宻之任也若夫屏貴近退姦邪絶臣下之威福强公室杜私門糾劾非違肅清朝野非御史不能也如斗之承天斟酌元氣運行四時條舉綱維著明紀律揔百揆平萬幾求賢審官獻可替否内親同姓外撫四夷綏之以利鎮之以靜涵養人材變化風俗立經國之逺圖建長世之大議孜孜奉國知無不為作新太平之化非中書不可也且皇天以億兆之命懸之於陛下之手陛下父事上天子愛下民其道無他要在慎擇宰相委任責成而已欽惟陛下元首之尊也中書股肱之任也御史耳目之司也方今之宜非中書則無以尊上非御史則無以肅下下不肅則内慢上不尊則外侮内慢外侮亂之始也上尊下肅治之基也故虞書載明良之歌賈生設堂陛之喻其㫖豈不深且逺哉凡今之所以未臻於至治者良由法無定體人無定分政出多門不相統一故也臣謂諸外路軍民錢榖之官宜悉委中書通行遷轉其賞罰黜陟一聽於中書其善惡能否一審於御史如此則官有定名之實法有畫一之規矣又大臣貴和不貴同和於義則公道昭明有揖讓之治同於利則私怨萌生起忿爭之亂此必然之效也誠能中外戮力將相同心和若鹽梅固如金石各慕相如寇恂相下之義夾輔王室叶賛聖猷陛下臨之以日月之明懐之以天地之量操威福之權執文武之柄俾法有定體人有定分上之使下如身之運臂臂之任指下之事上如使足之承身身之尊首各勤厥職各盡乃心夫如是天下何憂不理國勢何憂不振乎雖西北諸子未覲天顔東南一隅未霑聖化其來庭之議稱藩之奏可尅日而待不足為陛下憂也所可憂者大臣未和大政未通羣小流言熒惑聖聽干撓庶政虧損國威摧壯士之心鉗直臣之口至使人情以緘黙為賢以盡節為愚以告訐為忠以直言為諱是皆姦人敵國之幸非陛下之福也臣恐此弊不已習以成風將見私門萬啟於下公道孤立於上雖有臯夔為臣伊周作輔亦不能善治矣陛下有垂成太平之功而復有小人基亂之釁此臣所以為陛下惜也今大臣設有姦邪不忠竊弄威柄者御史自當言之乃其職也百官自當論之乃其分也烏在無頼小人不為鄉黨所齒者驟興攻訐之風於朝廷之上乎臣知國家承平吉祥之言必不出於若輩之口也惟陛下逺之則天下幸甚其三曰人材治本選舉之方宜審臣聞君天下者勞於求賢逸於得人其來尚矣盖天地間有中和至順之氣生而為聰明特逹之人以待時君之用是以聖王遭時定制不借材於異代皆取士於當時臣愚以為今之天下猶古之天下也今之君臣猶古之君臣也今之人材猶古之人材也賢俊經綸之士豈皆生於曩代而獨不生於當今哉顧惟陛下求之與否爾伏見取人之法今之議者互有異同或以選舉為盡美而賤科第或以科第為至公而輕選舉是皆一已之偏見非古今之通論也夫二帝三王之下隋唐以上數千百年之間明君睿主所得社稷之臣王覇之輔盖亦多矣其豐功盛烈章章然著於天下後世之耳目者迹其從來亦可考也或起之於耕耘或求之於版築或獵之於屠釣或遇獻言而入侍或由薦進而登朝至於賢良方正直言孝亷貢舉之著遭際萬殊不可勝紀豈一出於科第乎自隋唐以降迄於宋金數百年間代不乏人名臣偉器例皆以科第進豈皆一出於選舉乎及乎遇合於君聚精會神於朝廷之上皆能尊主庇民論道佐時寧復有彼優此劣之間哉夫士之處世亦猶魚之處水今魴之在河鯉之在洛人皆知之其取之之術固有筌罾網釣之不同期於得魴得鯉則一也臣愚謂方今取士宜設三科以盡天下之材以公天下之用亡金之士以第進士并歴顯官耆年宿徳老成之人分布臺省諮詢典故一也内則將相公卿大夫各舉所知外則府尹州牧嵗貢有差進賢良則受賞進不肖則受罰二也頒降詔書布告天下限以某年開設科舉三也三科之外繼以門廕勞効參之可謂才徳兼收勲賢並進如此則人人自勵安敢茍且庶幾野無遺材多士盈朝將相得人於上守令稱職於下時雍丕變政化日新陛下端拱無為而天下治矣夫天下猶重器也器之安危置之在人陛下誠欲措天下於泰山之安基宗社於磐石之固可不以求材為急務乎詩曰濟濟多士文王以寧其斯之謂歟抑臣又聞凡人臣進深計之言於上自古為難昔漢賈誼當文帝治平之世建言諸侯強大將不利於社稷譬猶抱火厝之積薪之下而寝其上火未及然因謂之安甚非安上全下之計莫若衆建諸侯而少其力可謂切中時病矣然當時舉皆以誼言為過故帝雖嘉之而不能用逮景帝之世七國連兵幾危漢室誼之言始騐於此矣董仲舒當武帝窮兵黷武之初重斂苛刑之際一踵亡秦之餘弊唯崇尚虚文而欲求至治仲舒以為更化而不更化雖有大賢不能善治譬之琴瑟不調甚者當更張而不更張雖有良工不能善鼓耳又言臨淵羡魚不如退而結網臨政願治不如退而更化可謂深識治體矣然當時舉朝皆以其言為迂故帝雖納之而不果行逮季年之後海内虛耗户口減半帝於是發仁聖之言下哀痛之詔仲舒之言始騐於此矣向若文帝用賈誼之言武帝行仲舒之䇿其禍亂之極必不至此漢之為漢又豈止如是而已哉暨乎有唐馭宇太宗皇帝清明在躬以納諌為心而魏徴之倫耻其君不及堯舜是以知無不言言無不聽聽無不行故能身致太平比功較徳優邁前主矣臣誠才識駑鈍不足以比擬前賢如霄壤涇渭固自有間然於遭逢聖明誠誠懇懇志在納忠其義一也臣請以人身之計言之且冬之祁寒夏之甚暑此天之變於上者也在修人事以應之故祁寒則衣之以裘甚暑則服之以葛非人情惡常而好變也盖亦理勢當然不得不爾期於康寕其身而已矣或者安於循習昧於變通冬之裘且加於流火鑠金之夏夏之葛茍施之堅氷拆地之冬將見嚴酷癘人危在朝夕矣又烏能答天地之正筭飬喬松之上壽哉國計安危理亦如此臣愚竊謂三本之䇿若施之於太祖用武之世有所未遑行之於陛下文明之時誠得其宜矣此實天下之公論非臣一人之私意也願陛下不以人廢言力而行之則可以塞禍亂之源可以興太平之化可以保子孫於萬世可以福蒼生於無窮矣臣猥寄外藩不明大體加以性識愚戅干冒宸嚴不勝戰慄隕越之至二十年刑部尚書崔彧上䟽言時政十八事一曰開廣言路多選正人番直上前以司喉舌庶免黨附壅塞之患二曰當阿哈瑪特擅權臺臣莫敢糾其非迨其事敗然後接踵隨聲徒取譏笑宜别加選用其舊人除䝉古人取聖㫁外餘皆當問罪三曰樞宻院定奪軍官賞罰不當多聽阿哈瑪特風㫖宜擇有聲望者為長貳庶幾號令明而賞罰當四曰翰苑亦頌阿哈瑪特功徳宜博訪南北耆儒碩望以重此選五曰郝禎耿仁等雖在典型若是者尚多罪同罰異公論未伸合次第屏除六曰貴遊子弟用即顯官幼不講學何以從政得如左丞許衡教國子學則人才軰出矣七曰今起居注所書不過奏事撿目而已宜擇蒙古人之有聲望漢人之重厚者居其任分番上直帝王言動必書以垂法於無窮八曰憲曹無法可守是以奸人無所顧忌宜定律令以為一代之法九曰官冗若徒省一官員併一衙門亦非經久之筞宜叅衆議而立定成規十曰官僚無以養亷責其貪則苛乞將諸路大小官有俸者量増無俸者特給然不取之於官惟賦之於民盖官吏既有所養不致病民少増嵗賦亦將樂從十一曰内地百姓流移江南避賦役者已十五萬户去家就旅豈人之情賦重政繁驅之致此乞特降詔㫖招集復業免其後來五年科役其餘積欠並蠲事産即日給還民官滿替以戸口増耗為黜陟其徙江南不歸者與土著一例當役十二曰丞相安圖遷轉良臣悉為阿哈瑪特所擯黜或居散地或在逺方並令㧞擢十三曰簿録姦黨財物本國家之物不可視為横得遂致濫用宜以之實帑藏供嵗計十四曰大都非如上都止備廵幸不應立留守司此皆阿哈瑪特以此位置私黨今宜易置緫管府十五曰中書省右丞二而左丞缺宜改所増右丞置諸左十六曰在外行省不必置丞相平章止設左右丞以下庶幾内重不致勢均彼謂非隆其名不足鎮壓者姦臣欺罔之論也十七曰阿爾哈雅掌兵民之權子姪姻黨分列權要官吏出其門者十之七八其威權不在阿哈瑪特下宜罷職理筭其黨雖無汚染者亦當遷轉他所勿使久據湖廣十八曰銓選𩔖奏賢否莫知自今三品已上必引見而後授官䟽奏即日命中書行其数事餘命與御史大夫伊實特穆爾議行之至元中集賢學士程鉅夫上奏曰臣聞天子之職莫大於擇相宰相之職莫大於進賢茍不知以進賢為急而惟以殖貨為心非為上為徳為下為民之意也昔漢文帝以決獄錢榖問之丞相周勃不能對陳平對曰陛下問决獄責廷尉問錢榖責治粟内史宰相上佐天子理陰陽下遂萬物之宜外鎮撫四夷内親附百姓觀其所言可謂知宰相之職矣今權姦用事立尚書省以鈎考錢榖剥害生民為務所委任者率皆貪饕徼利之徒四方盜賊竊發良有以也臣竊以為清尚書之政損行省之權罷言利之官行恤民之典於國為便謹冒昧以聞伏取聖㫖世祖時劉秉忠上書數千百言其畧曰典章禮樂法度三綱五常之教備於堯舜三王因之五覇敗之漢興以来至于五代一千三百餘年由此道者漢文景光武唐太宗𤣥宗五君而𤣥宗不無疵也然治亂之道係乎天而由乎人天生青吉斯皇帝起一旅降諸國不數年而取天下勤勞憂苦遺大寳於子孫庶傳萬祀永保無疆之福愚聞之曰以馬上取天下不可以馬上治昔武王兄也周公弟也周公思天下善事夜以繼日每得一事坐以待旦以匡周室以保周天下八百餘年周公之力也君上兄也大王弟也思周公之故事而行之在乎今日千載一時不可失也君之所任在内莫大乎相相以領百官化萬民在外莫大乎將將以統三軍安四域内外相濟國之急務必先之也然天下之大非一人之可及萬事之細非一心之可察當擇開國功臣之子孫分為京府州郡監守督責舊官以遵王法仍差按察官守治者升否者黜天下不力而定也天下戸過百萬自呼圖克諾延斷事之後差徭甚大加以軍馬調發使臣煩擾官吏乞取民不能當是以逃竄宜比舊減半或三分去一就見在之民以定差稅招逃者復業再行定奪官無定次清潔者無以遷汙濫者無以降可比附古例定百官爵禄儀仗使家足身貴有犯於民設條定罪威福者君之權奉命者臣之職今百官自行威福進退生殺惟意之從宜從禁治天下之民未聞教化見在囚人宜從赦免明施教令使之知畏則犯者自少也教令既設則不宜繁因大朝舊例増益民間所宜設者十數條足矣教令既施罪不至死者皆提察然後决犯死刑者覆奏然後聽斷不致刑及無辜天子以天下為家兆民為子國不足取於民民不足取於國相須如魚水有國家者置府庫設倉廩亦為助民民有身者營産業闢田野亦為資國用也今宜打筭官民所欠債負若實為應當差發所借理宜依汗皇帝聖旨一本一利官司歸還凡陪償無名虛契所負及還過元本者並行赦免納粮就逺倉有一廢十者宜從近倉以輸為便當驛路州城飲食祗待偏重宜計所費以準差發闗市津梁正稅十五分取一宜從舊制禁横取減稅法以利百姓倉庫加耗甚重宜令權量度均為一法使錙銖圭撮尺寸皆平以存信去詐珍貝金銀之所出淘沙鍊石實不易為一旦以纏絲縷飾皮革塗木石粧器仗取一時之華麗廢為塵而無濟甚可惜也宜從禁治除帝胄功臣大官以下章服有制外無職之人不得僭越今地廣民微賦斂繁重民不聊生何力耕耨以厚産業宜差勸農官一員率天下百姓務農桑營産業實國之大益古者庠序學校未嘗廢今郡縣雖有學並非官置宜從舊制修建三學設教授開選擇才以經義為上詞賦論策次之兼科舉之設已奉過汗皇帝聖㫖因而言之易行也開設學校宜擇開國功臣子孫受教選達才任用之天下莫大於朝省親民莫近於縣宰雖朝省有法縣宰宜擇縣宰正民自安矣闗西河南地廣土沃以軍馬之所出入治而未豐宜設官招撫不數年民歸土闢以資軍馬之用實國之大事伊喇中丞拘𣙜鹽鐵諸産商賈酒醋貨殖諸事以定宣課雖使從實恢辦不足亦取於民施兊不辦已不為輕烏爾呼瑪勒奏請於舊額加倍𣙜之徃徃科取民間科𣙜並行民無所措手足宜從舊例辦𣙜更或減輕罷繁碎止科徴無從獻利之徒削民害國鰥寡孤獨廢疾者宜設孤老院給衣粮以為養使臣到州郡宜設舘不得於官衙民家安下孔子為百王師立萬世法今廟堂雖廢存者尚多宜令州郡祭祀釋奠如舊儀近代禮樂器具靡散宜令刷會徴太常舊人教引後學使器備人存漸以修之實太平之基王道之本今天下廣逺雖青吉斯皇帝威福之致亦天地神明隂所祐也宜訪名儒循舊禮尊祭上下神祗和天地之氣順時序之行使神享民依徳極於幽明天下賴一人之慶見行遼厯日月交食頗差聞司天臺改成新厯未見施行宜因新君即位頒歴改元令京府州郡置更漏使民知時國滅史存古之常道宜選修金史令一代君臣事業不墜於後世甚有勵也國家廣大如天萬中取一以養天下名士宿儒之無營運産業者使不致困窮或有營運産業者會前聖㫖種養應輸差稅其餘大小雜泛並行蠲免使自給養實國家養才勵人之大也明君用人如大匠用材隨其巨細長短以施規矩繩墨孔子曰君子不可小知而可大受小人不可大受而可小知盖君子所存者大不能盡小人之事或有一短小人所拘者狹不能同君子之量或有一長盡其才而用之成功之道也君子不以言廢人不以人廢言大開言路所以成天下安兆民也天地之大日月之明而或有所蔽且蔽天之明者雲霧也蔽人之明者私欲佞說也常人有之蔽一心也人君有之蔽天下也常選左右諫臣使諷諭於未形忖畫於至宻也君子之心一於理義懐於忠良小人之心一於利欲懐於讒佞君子得位有容於小人小人得勢必排於君子明君在上不可不辨也孔子曰逺佞人又曰惡利口之覆邦家者此之謂也今言利者衆非圖以利國害民實欲殘民而自利也宜將國中人民必用場冶付各路課稅所以定𣙜辦其餘言利者並行罷去古者明王不寶逺物所寶惟賢如使賢者在位能者在職此皆一人之睿知賢王之輔成也古者治世均民産業自廢井田為阡陌後世因之不能復今窮乏者益損富盛者増加宜禁行利之人勿恃官勢居官在位者勿侵民利商賈與民和好交易不生擅奪欺㒺之害真國家之利也笞箠之制宜㑹古酌今均為一法使無敢過越禁私置牢獄淫民無辜鞭背之刑宜禁治以彰愛生之徳立朝省以統百官分有司以御衆事以至京府州郡親民之職無不備紀綱正於上法度行於下是故天下不勞而治也今新君即位之後可立朝省以為政本其餘百司不在員多惟在得人焉耳世祖嘉納焉王惲上政事書曰臣近䝉禮部符承中書省劄該憲臺欽奉聖㫖召臣惲馳傳赴闕庭者臣惲伏自欽承明命夙夜祇懼不知所為意者憲臺過舉俾備顧問庶有所發明因自忖量國家之事日有萬㡬非愚所能識然臣自中元迄於今日乆叨仕進區區管窺不無一見輙敢以時務所宜先者數事昧死上聞臣聞自古創業垂統之君必定制畫法傳之子孫俾遵而守之以為長世不拔之本欽惟皇帝陛下聖文神武以有為之資膺大一統之運長策撫馭區宇民數逺邁漢唐其所渇者特治道而已然三十年間勵精為治因時制宜良法美意固已周悉今也有更張振勵講明畫一若懸象而昭布之使臣民曉然知其法之所以豈不便哉故臣以立法定制為論治之始一曰議憲章以一政體傳曰法者輔治之具一日闕則不可君操於上永作成憲吏承於下遵為定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年小大之法尚逺定議内而憲臺天子之執法外而㢘司州郡之法吏是具司理之官而無所守之法猶有毉而無藥也至平刑議斷旋旋為理未免有酌量准擬之差彼此輕重之異臣愚謂宜將已定律令頒為新法或有不通行未盡該者如累朝聖訓與中統迄今條格通行議擬參而用之與百姓更始如是則法無二門輕重適當吏安所守民知所避而難犯天下幸甚二曰定制度以抑奢僭夫制度者明尊卑别貴賤法天道而立人極也故古者衣服飲食輿馬屋廬皆有恒制至於庶人僕妾其禁尤嚴惟在君人者制節謹度率先化下為務何則上之動静為人勞逸之本上之奢儉為人富貧之源可不鑒哉欽惟皇帝陛下臨御以来躬先儉素思復淳風如輕紵衣而貴紬繒去金飾而朴鞍履至衣服等物銷織鍍砑之𩔖一切禁止以奉行漸逺不無弛緩今也臣民衣飲踰於公侯婦女衣着等於貴戚以致聘財過於卿相男女不能婚姻正以用之無制僭越暴殄有不能供億者故物價不得不踴而貴錢幣不得不虛而輕上下困弊日甚一日假若巨室之家親屬奴𨽻衣飲一切自有等差若例而一之寜不困乏臣愚以謂宜一切定奪大行禁止使民志定而不少僭越用既有度物自豐饒恐亦實楮幣殺物價之一端也三曰節浮費以豐財用夫一世之財足周一世之用不必專豐其財去其害財者可也今國家財賦方之中統初年歳入何啻倍蓰而每歳經費終不阜贍者豈以事勝於財過有所費故也為今之計正當量入為出以過有舉作為戒除饗宗廟供乗輿給邊備賞戰功捄荒歳外如冗兵妄求浮食冗費及不在常例者宜撿括一切省減以豐其財財豐事勝食足氣充以攻則取以戰則勝以柔則服將何為而不成何求而不獲古之善為國者君不必富富藏於民故用雖多而取不竭孔子曰百姓足君孰與不足此之謂也且財非天來皆自民出竭澤焚林其孰禦之但力屈財殫非所以養民而强國也昔亡金世宗諸王有以不給而請告者世宗曰汝軰何騃殊不知府庫之財乃百姓之財耳我但緫而主之安敢妄費迄今稱說以為君人至言可不鑒哉四曰重名爵以攬威權古人稱官爵謂之天秩王者代天爵人鼓舞一世使天下之人奔走為吾用者此也惟爵與禄不輕以付人曰賢曰材迺能得之所以為礪世磨鈍之具若得之輕則視之輕視之輕則人不重人不重將見君子逺小人至此必然理也惟其磨礪轡馭之權世主操於上不輕授人與當其材何患氣之不振力之不竭事之不成者哉今四海一家權宜假借之舉日漸希濶正國家収攬威權之時如近年委任稍重者罔考其素即授崇品激之建功立事固是駕馭英雄大權茍非其人不無叨竊不安之懼今中外無事朝廷宜重而惜之昔有唐使職或帶相銜然止行見職曽無分省實權五曰議㢘司以勵庶官臣聞古之善為國者不使人有怠惰不振之氣若作於心而害於政茍非以徳振起必須度時宜本人情齊之以法故得小大畢力上不勞而衆事舉今州郡之官品流淆雜既無選舉甄别止循常資紛紛藉藉聚散於吏部例得一官鮮不因循茍且以歳月養資考而已欲望承流宣化趨事赴功卓有惟新之政亦已難矣嘗觀漢唐之馭吏也能者増秩賜金公卿缺則補之以表其賢否者放田里而不事事唐則召七品以上官集於闕庭親與訪問究得失而進退之然二者不過爵禄為勸爵禄極則意滿足意滿足則怠心生亦有無如何者故持斧直指採訪黜陟等使歳相望於道而本朝之舉髙出前代比者㢘司之設初氣甚張中外之官悚然有改過自新之念大姦巨猾致畏懾而不自安庸人懦夫將卓爾而有所立行無㡬何法禁稍寛使監視者勁挺之氣不息而自斂聽從者奸弊之萌潛滋而復持恐徒易其名而不能革州縣之故習夫刑罰崇寬固是國家美政然分别善惡以示勸懲豈得專務寬恤昔亡金大定間尚書省奏順州軍判崔伯時受賍不枉法准制當削官停職世宗曰受財不至枉法以習知法律故也所為奸狡習與性成後復任用豈能自悛雖所犯止於追官非奉特㫖無復録用以致犯禁者鮮此先事之明驗也今風俗澆薄遇有所犯茍免無耻臣愚為法宜稍重以權一時其要在人法並任精擇官僚優加吏禄憲綱既立公道大行官有作新之氣吏無餬口之虞我之氣既伸彼安得不振我之政既肅彼安敢或私所謂上行下效源清流長將見風彩百倍有登攬澄清之望矣六曰議保舉以覈名實方今親民與參佐官莫縣令經歴為重縣令乃百姓師帥師帥賢則徳澤宣參署為一路紀綱紀綱振則政務舉今例出常流安取殊績臣愚以為若行品官保舉法庶得其人其法品量舉主與所保者資歴相應果皆兩可復精加磨勘無謬妄私意然後許令入狀相小大之才授繁簡之任限以歲月如唐制釐務出二百日者是也課其殿最升黜舉主得人者受知賢之賞不職者坐不當之罰舉官自然盡心受保者常恐相累如此庶立功而寡過矣其南選尤宜施用此法何則江南比至平定諒為不易凡所𨽻附秋毫無犯可為仁義之師只以前省調官賄而海放行省注擬尤為濫雜侵漁掊克慘於兵凶至盜賊竊發指此為名仰賴天恩幸其無事今宜委官分揀以行此法其停革人員不至罷黜者降之邉逺邉逺見職委有聲迹者使之内遷亦激勸一法兹盖自漢唐五代迄於亡金皆遵而行之當時號稱得人然必須内設審官考功等職專掌其事七曰設科舉以收人材方今洪儒碩徳既老且盡後生晚進既無進望例多不學州府鄉縣雖立教官講書㑹課秖皆虛名畧無實效以致非常之材未聞一士州郡政治若無可稱思得大儒碩徳難矣臣愚以謂不若開設選舉取騐之速也夫進士選歴代號取士正科將相之材皆從此出前代講之熟矣理有不可廢者若限以嵗月而考試之將見士爭力學人材輩出可計日而待也論者必曰今以員多闕少見行壅滯若復此舉是愈壅而滯之也臣謂不然盖科舉之設本以覈實學而收多士清仕途而息雜流庶得將相全材為國論治道備大用也豈不愈於學校徒設汗漫而無所成乎八曰試吏員以清政務前代取吏之法條目甚嚴如宰相子辟舉令取充省雜終塲舉人試補臺掾品官子孫吏員班秖閤門等人出身者試補六部令史夫令者明法令曰令史者通經史曰史今府州司縣應用一切胥吏多自帖書中来官無取材勢須及此所習既凡聞見或寡欲望明刑政識大體務清弊革難矣臣愚以謂為今之計莫若將合嵗貢吏人以吏員法試之中選者仍許上貢補充隨朝身役外州府郡見役者從㢘司以校法試騐庶幾激之積漸肯學其月請俸給亦合定奪能使得餬其口然後可責以亷何則今㢘司專抑吏權察非違少有貪鄙不計飬㢘即按而治之是縱之竊而責以何盜之為豈理也哉九曰恤軍民以固邦本近命新省整治以来一切事務盡從簡静可謂不嚴而治不肅而成者也中外熈熈翕然有拭目太平之望兹盖皇帝陛下屏去奸慝保合太和嘉靖邦本專任責成之效也然猶有當軫慮者夫為治之道政貴均一不少偏重否則必更而張之使至公均被國家且自攻圍襄陽以來簽取軍役盖四舉矣將着中物力等戸盡充軍站中間抛下上戸其能有幾皆貧難下戸而軍興百色所須皆仰供辦江南甫下遭值前省和顧和易急徴暴歛侵漁不法又將軍站閃下差税不問多寡止除四兩餘者分洒見户其逃亡差税又行每歳陪納數年之間編氓已是靠損其小戸困苦不較可知臣以時屬方殷其代輸差税宜令蠲免涵飬存恤小康若一旦别有征求易為責辦其軍站戸富者至有田畆連阡陌家資累巨萬丁對列什伍貧者日求生活有儲無甔石田無置錐者今也不分難易一體應役又至元十一年簽充列軍役者多是近下戸計當時起遣已是生受臣愚謂俱合分揀定奪庶不致困乏逃竄有悞臨時調遣不均之弊莫此為重十曰復常平以廣蓄積常平倉設自至元八年隨路收貯斛粟約八十餘萬今倉廩具存起運久空甚非朝廷捄荒恤民本意夫常平之法嵗豐増價以糴之則農重榖而敦本嵗荒則減價以糶之故民倚安而無菜色如徃年定時估以平物價竟不克行殊不若常平之有粟也盖低昻權在有司兼併利無專擅故也若復實常平倘遇凶歉出糶三二千石榖價自平楮幣亦復加重且免賑濟破用軍國正儲實為古今良法十一曰廣屯田以息逺餉臣聞邊儲逺餉自古未有良法如飛輓負載賣爵贖罪引種和糴未免弊困多不能行俱未若留兵屯田為古今之長䇿也臣試以唐振武事言之憲宗元和七年李絳言天徳振武今豐州等處左右良田約四千八百頃收粟四十萬斛歲省度支錢二十餘萬緡兹非明騐歟今振武豐州界河兩傍除營帳百姓耕占外其餘荒閒尚多若大治屯田自非水旱田功稍集國儲必有所濟唐陸贄所謂縁邊土沃而久荒所收必厚又近嵗山後流移戸多將見抛地土時暫借令營屯亦是一法富弼曽言此事及撿括冒占仍招募願户者聽外邊屯已置營屯去處亦宜差強果為國盡心有為能臣重與撿勘其間一切可行未舉已行不盡者極人為而盡地力仍將迤南一切置屯見閒戸數併徙邊防以捄一時此急於治外之意也十二曰息逺畧以撫已有臣常聞老子以恬淡為宗孔宣父戒及其在得二聖人垂教以天理當然為言非徒設也欽惟皇帝陛下聖神文武臨御天下三十餘年昭丕天之功接千嵗之統三五已来未有若斯之盛其於太祖聖武皇帝垂創之業可謂大集厥成然有其有者安務廣徳者強審今之勢譬猶蓄牧大家川量谷計數已殷富正在牧圉擇人芻豢得所而已如此則牛羊茁壯日蕃而無耗不然罔恤見有又務多得將見復求者未獲則已有者瘠而耗之可不惜哉伏願陛下息逺畧撫已有以恬淡為心以在得為戒頥養聖夀配天無極此宗廟神靈四海臣民之願也臣又嘗觀天地之氣四時行萬物生皆自然而然又其升降止三萬里之中其範圍不出三十萬里之内餘則混淪磅礴雖聖人有置而不論者伏惟陛下憲天體道財成輔相功已不能殫紀尚何言而何慮哉十三曰感和氣以消水旱夫兵者凶器戰者危事不得已而用之且以强勝為戒我國家以神武戡定海宇日月所出没霜露所霑墜莫不臣而主之然地廣物衆不無蘖芽其間故三十年之乆十有餘舉如征大理雲南渡鄂渚平内難討賊璮取江南破襄漢駕洋海下占城定髙麗問罪交州掃清遼甸皆除暴固存彼動此應不得已而用之之舉也然士卒愁苦死傷暴露邉郡困乏中外憂勞之氣不得不傷隂陽之和而致水旱之報是以聖人重之畏之故老子曰大軍之後必有凶年師之所處荆棘生焉故比年以來水旱無時霜災屢作山崩地震變出非常奸臣柄用盜賊竊發百姓嗸嗸日趨於困臣常讀中元已來國書詔條未嘗不以生靈為念棄捐細故講信修睦以用兵為重此堯舜好生之徳禹湯克寛不自滿假之仁也願陛下躬體𤣥黙頥養聖夀與天無極以初元之心為心以恬澹之慮為慮為民祈天請命災害不生禍亂不作使黎庶知其無好兵之心天地鬼神諒其不得已之意庶幾天回哀眷易乖戾而為和平變荒歉而為豐稔斂時五福敷錫庶民咸躋仁夀之域天下幸甚十四曰崇教化以厚風俗自昔風俗美好由禮義所生今也禮義既衰故日趨於薄一法出則百奸作一令下則百詐起何則民所欲而生者嵗不加益我過為之求者日有所増所謂救死而不贍奚暇治禮義哉有司釋此不念每以厚風俗為務如孝行復役節婦有旌議婚姻立學師表淑慝忠臣義士嵗有常秩之𩔖非不家至戸曉然終無分寸之效者徒文具虚名而已夫天下之事有本有末知所先後則教立而化行臣愚以為風化之行莫國家若先以四教為本曰仁以養之義以取之禮以安之信以行之何為仁父愛子育懐生樂業温飫以養其心何為義輕徭薄賦取斂合宜寛裕以暢其氣何為禮上下有分毋妄侵辱誅責以當其功罪何為信發號施令一出不易忱誠以明其約束是也而前政者謂僧格也曽不務此專以威虐肆心督責為令取辦一時流毒四海不知陵遲偏詖有不可救藥至於今為厲者如逋負差徭有已蠲未蠲者貧難軍人有已閒未閒者民出祇應不䝉撥降反覆償其不應民辦和買雖蒙官還曽何敷其元價杖刑重責不上大夫崇卑之品曽不少間悉被其戮辱夫如是將何以責民心之近厚風俗之淳粹者哉惟其四者本立而天下悚然有忠厚亷耻之心而後敦之以禮讓謹之以庠序觀之以鄉飲教之以冠婚喪祭民將目撃而心諭安行而有得二三大臣匡直輔翼於上時從而振徳之孰有子遺其親臣後其君者哉所謂父子有親君臣有義不曰風恬俗美將安歸乎十五曰减行院以一調遣伏見近者立行院四處盖欲養兵力分省權而免横役然不可多設多設則一旦遇有調遣號令不相統一至合而征茍進渉險難不肯併力一向以趨成功况江嶺阻隔動輙數百里賊去此而盜彼即欲加兵則曰我已降於彼比縁知㑹巳殺掠而去如向者鍾賊是也其在江西我逐而出境即睨而不視其在福建復逐而出境亦坐而不問已至朝廷專差重臣㑹三道之兵緫統於上才方勦絶臣故曰不可多立者縁此也若止設一院於江州地既酌中號令四出復命皇子震統於上使跨有江淮遙制兵勢將何衝而不折何令之不一哉誠為簡便十六曰絶交貢以示曠度夫邊方小國外示臣屬内實觀望我以誠徃彼輙譎來何則恃其險僻昧夫天理而懐茍且假息之念故也非修文以來易以計破難以兵碎也今交趾漢數郡之地耳數年之間雖奉貢伻來終未稽顙闕下欵輸誠赤今年羾一犀象明年獻翠貝若干是皆我物藉為己有調書詞延嵗月而已此最不可信者昔漢文帝却千里馬詔郡國母令來獻而越王尉佗曽未幾何怨艾自新去號北靣終其身内屬正以徳禮懐柔然爾臣愚以謂彼之交貢自今宜辭而無受則我之所得者有三不寳逺物示以曠度一也鱗介之屬叵測淺深不知我之虛實彼用自絶使私計内窮二也又使駭夫天子明見照萬里之外畏天事大之心庶有以自省其曲直所在三也刺竹藥弩緩則肆行奸詐急則曲盡服從伏乞下公卿集議以付有司臣之所言雖至淺近然當陛下無忌諱之時逺被寵召無一言補報緘黙旅退豈惟自棄大負朝廷虛求之心顧臣庸愚何足重輕萬一片言悞有可取使四方大賢大徳之士聞之曰如臣者且䝉採擇將訑訑而來皆為陛下用矣臣不勝俯伏待罪憂恐之至臣惲昧死再拜謹言趙天麟上䇿曰臣聞天由文而能生地因文而能成人以文而愈靈王者守文而為天下正日月有度星辰有躔鼓之以雷霆潤之以風雨千變萬化不失其常者天之文也積而山岳深而河海五土之髙下百榖之蕃滋允執厥中黄裳元吉者地之文也君臣父子禮樂詩書大理達乎聖賢英粹宣於翰墨粲然相接曲盡諸宜者人之文也經天緯地統制下民撫善政以勤行廓皇猷而博施無私無慾克長克君鼓之舞之以盡其神煥乎郁乎以昭其徳者王者之文也欽惟陛下方承景運燕處超然臣謂文者質之華也質者文之骨也存其質則既以成夫元化之鴻基修其文則可以耀我一家之偉績是以質文之理並道器而同歸文質之情充顯微而無間昔者窮新搆逆光武中興正火龍驤首之秋方炎祚回鋒之際猶且投戈講藝息馬論道況為四海治平之政者可不以文為務哉故夏之惡衣服而致美乎黻冕卑宫室而盡力乎溝洫下車泣罪設虞待賢者實惟文命周之徳顯於西土道被於南國興二老盍歸之念以庶邦惟正之供者實惟文王漢之天覆萬民子愛兆姓前半夜之席而訪寒士憐少女之意而除肉刑者實惟文帝唐之憂勤鑑古仁義致平廣學舍之千區委名臣之十在者實惟文皇惟此四君咸有一徳民庶荷當時之福史編傳後世之芳究而言之繄可法矣今國家省臺院部捴於内路府州縣分於外職無不具事有所司心安而肢體咸宜領挈而襟裾就整臨之以天威撫之以天慶宜乎道極三才功齊四代矣然而僅能致治未洽泰和炎荒之小國相持中土之獄囚常滿陳言納䟽者無救弊之方在位食禄者但用法而已豈官非其人而未能盡副聖意邪將賢材處職而有術未得盡行邪抑且民或下愚不移而不循堯舜之化須除惡務本然後息邪嘗竊思之良有以也九重深邃四海懸逺下情不得上通上意不得下達樞機既開責成羣下養民之道或未周用人之方或未至當事者以簿書期會為急務進言者以法令末節為大本此其所以僅能致治未洽泰和也伏望陛下軫聖心而慮之究至理以圖之細推今日之施為詳擇羣下之得失觀天文以法隂陽察地文以御柔剛来人文以化四海守聖文以照無疆同夏之文命比周之文王超漢之文帝越唐之文皇治效班班可得而議愚臣觀此蔑有難焉盖古天下今天下易地則皆然前聖人後聖人有為者亦若是故也天麟又上䇿曰臣聞人以倐然百嵗之夀位天地育萬物而獨崇人以𦕈然七尺之軀周事變具衆理而咸偹盡斯道者實惟心乎及乎青黄白黒之文間錯而眸子不能瞭矣滛哇正雅之聲交雜而耳官不能靈矣視聽不瞭不靈而心神蔽徹不瑩矣自中人以下豈有心神曠朗而無凝滯者哉是知無凝滯者惟聖人而已何以言之盖聖人之知既已特明而天下之事莫不有理以吾特明之知決彼有理之事雖萬務叢於前百為繼於後豈復有留心者哉今國家樹后王君公承以大夫師長尚恐内外官吏有審諦之所不及而累改迹者安可不立法以定之哉夫財有可以取可以無取而介乎兩間者為民父母之心但欲益下而已奈何闗要之地人共窺覘天下之達者常少不達者常多一日暴之十日寒之或姑取之而俟後議或卒取之而傷亷化可勝言哉夫事有可以行可以無行而介乎兩間者方其議之也以為不急而稽延嵗月莫之能定焉及其行之也有司應文而怠慢茍簡莫之能謹焉況事有至微而闗利害之至大言有至細而存風化之至深者豈宜輕哉夫刑有可以輕可以重而介乎兩間者此又方今弊之尤大者也伏見郡縣之間一夫繋獄九族銜悲産業以之而停田宅以之而鬻者衆矣國家未有律令有司恣行決罰竊恐貧者犯刑未嘗不重富者犯刑未嘗不輕且鞭笞之下何求不獲故有家資者行賂於當塗之人而委曲以成其輕紀之文矣彼寒素之族室如懸磬故所求不應激忿怒於無告之人而挾氣以溢其所扺之罪矣貧民習知如是雖無罪而與官吏有相干者或質什器以僦錢或立文約以假貸輸於官吏冀獲矜憐如此則不疑之獄欲輕則輕欲重則重皆成疑獄矣乃欲化洽政治豈可得哉若其果疑之者遷延無斷有就狴犴之中而死者有及十餘年而不決者犯罪之家苞苴私謁所費不貲犯罪之人乆拘囹圄所苦無極漢諺有之曰畫地為獄議不入非虚語也今雖未至於此亦宜立法防之伏望陛下溥班明詔爰示百司凡資財可以取可以無取者明開其義減半而取之凡資財可以與可以無與者明開其義減半而與之凡事可以行可以無行者明開其義以便民從事凡疑獄可以輕可以重者明開其義從輕而決之凡常獄易决而儻有賍汙弄法者幸從臣先所謂慎名器杜利門之法而行之則自當絶矣若夫愚昧不悛則有憲職在焉如是而清俗澤下之道自成因威示思之理無歉矣歴代名臣奏議卷六十六
