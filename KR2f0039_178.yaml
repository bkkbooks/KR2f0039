body:
  text: 歷代名臣奏議卷一百七十八明楊士竒等撰去邪宋哲宗時劉安世論曰右臣今月十二日與左司諫韓川於延和殿賜對進呈劄子畢遂論胡宗愈事伏䝉宣諭以謂進退大臣須存體貌有以見陛下優禮輔弼慎重舉措之意臣雖愚暗豈不體悉然宗愈匿宰相之姻嫌盜中司之要任蒙蔽人主之德墮廢祖宗之法隂結惇確之奸徼幸異日顯主軾轍之黨公肆詆欺未嘗振舉紀綱但聞多所朋附是以朞月之內致位丞弼公議駭愕罪狀日著豈可塵汚廊廟與聞機政臣忝在諌列目覩巨惡安敢自曠職事泯默不言臣聞賈誼之論以謂羣下至衆而主上至少所託財器職業者粹於羣下也俱亡恥俱茍安則主上最病所以體貌大臣而厲其節又曰上設亷恥禮義以遇其臣而臣不以節行報其上者則非人類也朝廷之進用宗愈臣等即時論列前後臺諫章疏不可勝計陛下一切抑而不出優容於此已踰半年則陛下之所以待遇大臣可謂隆厚矣宗愈明知諫官之交章目覩臺文之糾劾而偃然居位如不聞知則宗愈可謂不以節行報上而頑頓無恥之甚者也將何以副陛下體貌之意慰四海具瞻之望哉臣已於十三日奏疏極言宗愈之罪伏望聖慈以天下公議為念早出臣章付外施行安世又論曰右臣近嘗奏論胡宗愈係呂公著之姻家昨除御史中丞乃是公著秉政之日匿宰相之私親廢祖宗之舊制并其餘背公徇私毁滅廉恥共十二事皆有實狀可以按覆竊惟奏章已塵聖覽夙夕延頸以俟嚴誅逮今半月不聞威命則是陛下既恕之矣臣論斥執政之辜雖已䝉釋而宗愈欺君敗法之罪尚未公行枉直兩存邪正莫辨臣雖愚陋豈敢茍避忤旨之譴而不以天下之情逹於陛下乎昔之聖人深居九重以謂竭其聰明猶不足以盡天下之聞見遂以耳目之任付之臺諫之官而臺諫之論每以天下公議為主公議之所是臺諫必是之公議之所非臺諌必非之人君所以不出戶庭而四海九州之逺物無遁情者用此道也臣伏見陛下即政之初首召司馬光於閒退之中授以柄任天下臣民識與不識莫不鼓舞以慶朝廷之得人及宗愈初除尚書右丞惟其朋黨之外無一人以為可者臣與韓川於四月初八日延和殿首論其奸邪亡狀不足以辱輔弼之任其後孫覺為御史中丞與諌議大夫王覿繼言其事侍御史盛陶亦纍彈奏而監察御史楊康國趙挺之皆宗愈薦舉之人猶不免一言其罪陛下以此觀之亦可知公議之所惡矣今人言雖多而未聞朝廷施行者豈陛下以謂既用宗愈難以遽罷是以排言者之論而決欲主之乎若然者陛下眷待輔臣始終之意則美矣以聖人改過不吝去邪勿疑之道論之臣恐未能盡善也宗愈罪惡臣前疏言之已詳此不復論而臣竊有惓惓之誠以告陛下自四月後來臺諌官之言宗愈者章纍數十陛下一切留中無所可否日近孫覺以病免楊康國以執政瓜葛之戚移開封推官盛陶又乞與李常避親而韓川纍求去職趙挺之亦以親老兩乞外補蓋覺等見陛下力主宗愈不敢極言是以紛紛引避務為自全之計臣起於小官誤䝉擢任非不知隨時附會與衆浮沈茍祿容身足以無病何獨自苦力詆大奸上瀆聖聰下犯邪黨蓋臣內顧枵薄了無它長報國之心惟知直道為臣私計則拙為朝廷逺慮則忠仰冀睿明洞鍳誠懇所有臣今月十三日言胡宗愈疏伏乞早賜指揮付外施行安世又論曰右臣昨於十月十二日上殿奏陳胡宗愈匿宰相之私親盜中司之要任欺罔人主之聽墮廢祖宗之法加以徇私立黨毁滅廉恥誠不足以副陛下體貌之意慰四海具瞻之望自後繼進三疏極言其罪至今未䝉施行臣雖至愚不能窺測聖藴然竊嘗深慮陛下所以力遏衆論未賜施行者豈非謂宗愈進用方踰半年今若遽罷恐人譏議以謂自信不篤用人不終者乎若清衷所存萬一如此臣竊以為過矣祖宗以來登用大臣何嘗不考合僉言採察人望茍衆心未服公議不與寧使詔令有反汗之嫌不容小人乘君子之器著之信史可以稽考至於神宗皇帝時尚書左丞蒲宗孟止坐公宇擅有修完為御史中丞黃履所劾亟令罷免王安禮以閨門私故為侍御史張汝賢彈奏尋亦去位陛下踐阼之後優禮輔弼去年李清臣以不甚治事為御史中丞𫝊堯俞等一言亦使外補豈若宗愈上則欺君亂法下則背公成朋不恥不廉無禮無義置之廊廟實纍聖明臣聞自古及今未有任君子而不治用小人而不亂者蓋甘言美辭足以感移人意小節僞行足以欺惑世俗及其得志茍患失之隂引奸邪廣布心腹根深蒂固牢莫可破則其為國家之害將有不可勝言者矣故陸贄之論以為操兵以刃人天下不委罪於兵而委罪於所操之主蓄蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家此言雖小可以喻大伏望陛下曲回天聼詳覽衆言進有德以尊朝廷黜有罪以服天下早以臣等言宗愈事章疏付外施行不勝至願安世又論曰右臣昨於十月十三日曾具奏陳胡宗愈罪狀十二事自後復進三疏委曲論列今已踰月未蒙施行臣之所言非敢捃托皆有實狀可以按覆凡在廷之臣有一於此已可斥逐而宗愈積纍巨惡至於十數言者交攻半年不止偃然居位略無畏心陵蔑風憲毁棄廉恥豈不負朝廷體貌之意纍二聖知人之明臣伏見宗愈之除中丞在吕公著秉政之日雖是􅊚戚隱而不言外託用才之名中為立黨之實使宗愈貪權懷惠不復糾繆繩愆以此營私何所不可䝉蔽人主之聽墮廢祖宗之法人臣之罪莫大於此今公卿士民盡知二人之欺罔而臺諌官多出公著之門終無一語敢及此事陛下試取衆人言宗愈之疏一一省閲則知臣今日所奏為不妄矣公道陵替昔賢所憂豈謂聖朝目覩斯弊嵗月浸久恐非國家之福此臣所以夙夜憤悶痛心疾首而不能自已也伏望陛下審察衆情詳觀事理若原心定罪則公著宗愈均是欺君宜正典刑以示中外或聖意未欲以一眚遽廢老臣即宗愈它罪尚多伏乞特行罷免以慰人望安世又論曰右臣自四月已後凡十二次奏疏論列胡宗愈罪狀至今未䝉付外施行臣夙夜思念不遑寧處竊謂祖宗以來臺諌官之論執政者多矣若果中其罪則大臣無不罷免或所言失實則臺諫官亦須降黜蓋進退之義不可不正是非之理不可不明未有君子小人并容於朝廷者也宗愈以奸邪之才據綱紀之任欺君亂法背公成朋肆行貪婪毁棄廉恥臣等前後章奏至於數十陛下一切留中無所可否邪正並立枉直兩存上違纍聖之舊章下失萬邦之屬望臣於此際何以為心見惡不擊則非忠畏祻中輟則非義使邪黨漸登於要路大奸久處於廟堂寖生厲階祻及天下臣恐異時之公議追咎今日之言官雖伏重誅豈能塞責臣所以不避煩瀆之罪屢陳迫切之言伏望聖慈特垂省察若宗愈之罪惡既皆得實即乞早行罷免以慰中外之望若臣之所奏稍涉誣罔亦乞重行降黜以為妄言之戒惟冀早施睿斷明示天下不勝幸甚安世又論曰右臣自四月已後凡十三次論列胡宗愈罪惡乞行罷黜至今未䝉施行臣竊惟自昔臺諌官彈擊執政未見是非不決如此之久伏尋故事蓋嘗有留百官班廷諍及闔門待罪自求貶降之例臣所以包羞忍恥涉歷九月而不敢輕為去就者誠欲廣陛下納諌之盛德致賤臣愛君之孤忠與其速去以潔身不若盡言而報國是以剖析義理援引古今凡可以上助聰明之萬一者臣皆披瀝肝膽而盡言之矣陛下雖未加臣狂瞽之誅而公議已及臣失職之罪循省微陋實不足以勝天下之責恭惟祖宗以來體貌輔弼雖用捨之道主於至公而登拜罷免亦有時會今興龍之後正當進退大臣之機伏望特奮剛斷早去宗愈使中外知陛下聖德之日新而朝廷君子之道長非臣一人之幸實天下之幸也失今不圗飬虎遺患則臣所謂留班廷諍合門待罪之下䇿將不得已而為之矣惟冀聖慈審察公議出臣前後章疏付外施行安世又論曰右臣伏自四月已後凡十四次奏疏論列胡宗愈罪狀至今未䝉付外施行臣竊謂二聖臨御以來勵精求治遵守法度曾無過舉諍臣之職足以優為惟是君子小人消長之機實繫天下國家治亂之本要在分别真僞判白忠邪使上心明辨而無疑則羣小不攻而自破今之急務獨此為先臣伏見宗愈以奸回之資挾宰相之援欺君亂法盜取名器更相朋比無復畏憚中外之論皆謂宗愈之進非陛下之本意為大臣之所誤臣是以採托衆議稽參實迹歷指宗愈之罪凡十二事皆有按據昭如日星雖陛下意在兼容未加考驗而微臣官有言責豈敢遑寧伏望聖慈特垂省察若臣之所言稍涉誣罔則乞重行降黜以戒虛妄若宗愈罪惡如臣所奏亦乞速賜罷免以警奸慝臣及宗愈義難兩立惟冀早施睿斷以決是非使諫官職業不自臣廢豈勝幸甚安世又論曰右臣伏為纍具奏疏論列宗愈罪狀乞行罷免至今未奉指揮竊惟二聖臨御以來開廣言路天下之情幽逺必逹顧臣愚陋獲塵諫列實千載一時不可逄之嘉會豈不貪戀聖德願效萬一然而數月之間止以宗愈一事章十五上未䝉聽納夙夜憂懼若在塗炭豈臣精誠不至無以感動天心論議不切莫能開悟聖意何所言之久不效也自昔臺諫官論列執政未嘗有兩全之理今朝廷未加臣以妄言之誅則是陛下精以臣言為信而乃依違纍月未覩施行縉紳之間不知諌疏之留中往往指目譏誚臣等以謂容身懼祻墮廢職事遂使小人久汙廊廟公議若此安可不畏臣聞天下之理惟是與非為人君者固當正心誠意以審其是而已願陛下博考僉言詳為逺慮以臣所言宗愈十二事反覆紬繹若非誣罔即乞罷宗愈以從人望進有德以尊朝廷或宸衷以為不然亦乞出臣章疏明正其罪使臣上不負陛下之拔擢下不失諫官之職業惓惓之忠罄盡於此安世又論曰右臣自四月後來凡十六次奏疏論列胡宗愈罪狀乞行罷免至今未奉指揮臣迫於公議不敢中輟頻煩天聽宜被譴逐陛下曲示兼容未加竄斥臣若知難而止不復盡言則上以結執政之歡下以圗一身之利何獨自苦力犯大奸臣雖甚愚竊亦有說輒傾丹懇再冒聖聰仰冀睿慈留神聽納臣聞聖人之治天下有禮義廉恥之教有刑罰誅殛之威禮義廉恥所以待天下之君子刑罰誅殛所以待天下之小人非聖人有厚薄之私蓋禮義廉恥由賢者出則不得以治小人者待之也伏惟陛下恭已於巖廊之上而賦政於萬里之外所與朝夕圗議天下之事者執政數人而已若得當世之賢者而任之則朝廷尊嚴四方率服茍非其人則堂陛陵夷取輕中外不可不慎也今宗愈匿宰相之親嫌盜中司之要任欺罔人主之聽隳廢祖宗之法立朝有朋黨之實行已多貪濁之惡自叨大任臺諫官前後論列不知其數而宗愈偃然自若殊無愧心禮義廉恥固已掃地陛下猶以待君子之道待之而望宗愈之自引以全體貌臣竊以為過矣管仲有言曰禮義廉恥是謂四維四維不張國乃滅亡古之善觀人國者惟以此道而逆知其盛衰今宗愈犯義如此豈能為陛下設張四維以致天下之治乎臣聞十人之衆議無不公蓋以其好惡是非難蔽於一偏之說而衆心所服者惟理而已臣向者嘗言宗愈十二事皆縉紳士大夫之公言明有按據非特十人之聚也陛下一切留中不加考質則天下之公議將無所伸小人之奸謀蓋有所恃臣獨憂之陛下勿謂人言宗愈之奸邪而未嘗親見其實狀遂以宗愈為可用也唐李勉嘗對德宗曰天下皆知盧把之奸邪而獨陛下不知此所以為奸邪也蓋大奸之人行僞而堅言僞而辨順非而澤陽為可信熒惑世主之聰明故能盜竊名位終亂天下也若及其未用之前見其可疑之迹則不得謂之奸邪矣惟陛下虛心澄慮詳繹庶言以臣章疏付之有司特令推究如稍涉虛誕臣甘受罔上之戮或皆有實狀即乞早罷宗愈以慰天下之望臣無任局蹐俟命之至安世又論曰右臣伏自去年四月後來凡十七次奏疏論列胡宗愈罪狀乞行罷免至今未䝉施行臣聞齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也臣每讀至此未嘗不掩卷太息以謂鄙夫固陋燭理不明人之所非反以為是衆之所惡覆以為美此乃愚者偏暗之常態固不足論若夫能知天下之善惡如辨白黑而無疑惑之心蓋非智者有所不及然而郭君反以此而亡國其故何也夫郭君能知善之為善惡之為惡則不可謂之不智特以其見善而不能用使君子無以自立知惡而不能去使小人得以成朋因循積纍其害遂至於亡國然則有天下者可不視此以為戒乎臣竊惟宗愈欺君亂法毁滅廉恥其罪惡顯著為中外共知者十有二事臣固已極言之矣自後相繼奏章申執前論惓惓之懇必已盡關聖覽若臣言為妄則是熒惑天聽誣陷大臣宜正典刑以戒天下若宗愈之罪如臣所奏則是陛下知其惡矣知惡而不去此古人之所戒也臣官有言責實畏公議茍不能排斥奸慝振舉紀綱使羣小寖盛壞亂政事則臣雖受異日之戮亦無補國家之患惟陛下辨之以早斷之以獨出臣前後章疏付外施行不勝願望安世又論曰右臣伏自去年以後凡十八次奏疏論列胡宗愈罪狀乞行罷免至今未覩施行夙夕慚悸如負芒刺臣自領職以迄于今知無不言每䝉聽納獨是宗愈纍章未出竊惟聖慮所以兼容必謂日月已深艱於追褫是以特屈公議使之兩全萬一如此臣竊以為過矣臣嘗觀仁宗皇帝用陳升之為樞密副使是時吕誨方在言路指其私行極力彈劾仁宗皇帝初亦難之而誨論奏不已章至於十八上涉歷數月卒罷升之而後已宗愈自始進用不協物望與升之無異臣言宗愈之疏其煩多與誨略同而宗愈冒昧居位又與升之時月不甚相逺豈仁祖能受盡言於昔而陛下不能聽之於今吕誨能逐奸人於前而臣不能去之於後以微臣之譾薄猶見賢而思齊如陛下之聖明豈知惡而不去若謂進退執政必有迹狀則臣按宗愈不無顯罪初除御史中丞與見任宰相明是姻家隱而不言盜取要任當時幸人之不知而知者亦不以告陛下欺君亂法孰甚於此以至身任風憲不修廉莭負所居房緡不肯償還遂致開封爭訟御史彈糾朝廷一切置而不問玷辱國體墮廢臺綱宗愈坐此二罪自合明行貶黜而況其餘奸慝事狀尚多陛下何故優容如比之久臣又嘗考尋吕誨所論陳升之章疏不過以謂揚歷甚淺聞望素輕尹京無狀遽叨大用疑其隂有趨附由徑而進及升之妻有重表踈逺之妹嫁於中官嘗與往還不避嫌疑若此之類止於數事蓋未有奸邪貪猥如今日宗愈之甚者也臣忝備耳目之寄而使陛下股肱心膂之任容有此人叨據經年不能排斥尚何靣顔出入朝廷而以諫官自名乎臣若未至竄逐終不敢緘默以負陛下拔擢之意伏望聖慈早出臣前後章奏付外施行安世又論曰右臣輒瀝血誠仰瀆天聽事出迫切無復文飾惟冀聖慈留意省察臣自去年四月初八日延和殿與左司諫韓川同奏胡宗愈奸邪朋黨不堪大任自後十九次上疏條陳罪狀而五月中臺臣亦有彈劾遷延至此未䝉施行向者孫覺楊康國相繼辭職而去獨臣與川始終論列未嘗敢置自十一月後川見陛下未賜聽納堅乞外補臣本欲嵗前上殿更以公論開陳而川别有除命不復供職臣以左右省並無諌官拘礙文法不敢獨貟乞對同時言事之人去之殆盡臣若更顧身計不為陛下極辨邪正則臺諫之風日益衰替奸慝之勢日益盛强實於聖朝所損不細此臣所以憤悶感發而不能自已也臣歷觀祖宗以來言者彈擊執政未嘗有是非不決枉直兩存之理今御史中丞李常侍御史盛陶迫於衆議亦嘗以宗愈為言而依違觀望不敢深論臣竊料其意不過以謂陛下若逐宗愈則常輩將欺罔縉紳曰朝廷用我之言已罷執政矣若臣所論太過忤旨獲譴則常輩初無切直之言又可免責進退無患足以竊位陛下用此等人持綱紀耳目之任亦何補於聖德乎臣非特患宗愈之汚廟堂又憂常等之壞風憲也臣伏覩陛下即政之初首開言路擢用忠良使在臺諫如劉摯王巖叟等論蔡確章惇之罪則陛下為之罷確宰相罷惇知樞密院又論張璪奸邪則璪罷中書侍郎孫覺等論韓縝不協人望陛下用縝為右僕射才方數月遽令外補傅堯俞等論李清臣無狀則清臣罷尚書左丞自是四海之內莫不歌頌厭服以謂陛下用人納諫有祖宗之風故三數年間公議得行大臣知畏奸人斂迹君子道長豈非用此道歟今宗愈自進用以來惟其朋黨之外無一人以為可者其懷奸為利與璪輩何逺其昏謬無補則又甚於縝與清臣豈陛下前日去此數人之易而今日去一宗愈為難哉臣讀魏鄭公之諫唐太宗曰貞觀之初恐人不言導之使諫三年以後見人諫諍恱而從之一二年來不恱人諫雖勉聽受終有難色臣竊謂太宗之烈足以比迹湯武庶幾成康然責之以備則有愧於三代之隆者特在於不能慎終如始而已詩曰靡不有初鮮克有終易曰有始有卒者其惟聖人乎願陛下以詩易之言為法以唐太宗之事為戒無使後之視今猶今之視昔也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道臣之狂愚逆陛下之心多矣惟求諸道則或有萬一之補伏望陛下以宗廟社稷為計早罷宗愈斷之不疑更擇忠厚端正之人置於言路以代常等庶幾協力上裨聖治天下幸甚貼黃臣叨被上恩不次擢用未能報塞萬一豈敢輕為去就然自來論列執政是非固難並立臣之悃愊盡於此章若聖意確然不回則是臣言無補須至援引故事自求貶黜況宗愈固惜名位不知廉恥儻陛下務為優容俟其自請以理度之必無是事又慮聖慈不欲出臣之奏恐傷體貌臣已一靣申三省乞奏請前後章疏付外施行去訖伏乞早賜睿斷去邪勿疑以慰天下之望安世又論曰右臣伏為前後二十次論奏胡宗愈罪狀乞行罷免而聖德寬厚務全體貌章皆留中未䝉施行宗愈幸纍疏之不出盜據丞轄包羞朞年辱國已甚臣忝居言路職在繩糾遂舉彈文之大略以申三省宗愈並不避位視事自如中外指目近世輔弼毁滅廉恥未見如此之極也臣竊伏思念輿情之所以共惡者不過責其無恥之一節而臣之所以深疾者特誅宗愈之意爾臣聞國家設諫官御史之職本欲肅正綱紀防察奸邪故風采所繫貴賤震恐非一二小臣敢作威福蓋朝廷上下之體待此而後嚴也今宗愈既知臺諌之彈劾而力戰公議若無所睹惟其以言者為不足恤是乃陵蔑陛下之風憲為大臣而有輕視人主之心陛下縱欲赦之其如朝廷何其如天下何使宗愈實無它罪止此一事猶在譴訶之域而況欺君亂法奸邪貪猥罪狀顯著至於數十尚安足以預廟堂之論處具瞻之地乎伏望聖慈深加省察以臣前後章疏付之有司公行推究若宗愈之罪如臣所言即乞特賜睿斷早令罷黜若臣所論無實亦乞重行竄逐庶分邪正以服天下安世又論蔡確作詩譏訕事狀曰右臣伏見知漢陽軍朝散郎吳處厚繳進蔡確知安州日所製車蓋亭詩十篇多涉譏訕而二篇尤甚非所宜言犯大不敬者臣按確德性隂險立朝奸邪象恭滔天有共工之惡言辨行僞挾少卯之才遭遇幸會致位宰相不能正身率下宣明教化而縱其弟碩交結羣小公納賄賂盜用官物不知紀極閨門之內奉養豪侈飲食聲色衣服器玩肆為奢僭制踰公王是時碩為軍器少監俸入有限而用度如此確實同居豈不知其所來乎朝廷既不窮治又貸其弟之死止以失教為名黜守安陸天下公議謂罰不能當其罪固宜痛自懲艾圖報大恩而乃不自循省輒懷怨望借唐為喻謗訕君親至於滄海揚波之語其所包藏尤為悖逆蓋確自謂齒髮方盛足以有為意在它日時事變易徼幸復用攄泄祻心跋扈懷梁冀之奸睥睨蓄魏其之志此而可捨國法廢矣伏望陛下察其情理斷以至公出處厚之奏付之有司特行按治明示其罪以謝天下安世又論曰右臣近以知漢陽軍吳處厚繳進蔡確知安州日所製車蓋亭詩怨謗君親情理切害遂具論列乞正其罪未覩指揮施行臣聞確之朋黨大半在朝造播巧言多方救解且謂處厚事非干己輒爾剡奏近於刻薄此風浸長恐開告訐之路臣竊以為過矣西漢酈寄天下謂之賣友然而摧吕祿以安社稷前史謂誼存君親不以為貶確之罪惡固已貫盈不自省循肆為訕斥人神之所共怒覆載之所不容處厚外官雖無言責見確悖逆不道發於忠憤名則出位情實愛君取捨重輕未為無理惟陛下勿恤浮議早正典刑使大奸無幸免之門朝廷無異日之患天下幸甚安世又論曰右臣等早來臣燾臣安詩延和殿進對具陳蔡確怨謗君親情理切害因曾上禀言路更有何人論列伏䝉宣諭惟卿等及劉安世外它人别無章疏臣等竊伏思念國家設御史本欲肅正綱紀糾察百寮雖小犯朝廷之儀猶俾彈治今來蔡確悖逆不道指斥乘輿而御史臺職在按舉曾無一言挾邪不忠黨惡無憚未見如此之甚者臣等前章固嘗以確之朋黨大半在朝慮其造播巧言多方營救不謂御史當可言之地並不糾劾又慮奸黨變亂公議别有奏陳恐開告訐之路臣等竊謂古人見無禮於君者如鷹鸇之逐鳥雀豈有目覩奸豪陵蔑朝廷謗訕君上乃欲置而不問茍非今日確之事發則其黨與未易彰敗臣等尚慮御史臺知臣已有論奏備禮一言以塞外議若果如此則其包藏奸狀益更明白伏望陛下留臣等此奏候蔡確事畢明正其罪特行竄逐庶使邪正有辨不敗國事安世又論曰右臣近以蔡確指斥乘輿情理切害尋具論奏乞正其罪雖已聞降指揮下安州取索元本及令確開具因依至今未見回報臣聞上自執政下至堂吏確之黨與殆居其半百端營救齊奮死力若使邪說得行搖動正論則朝廷之事極有可憂此臣所以夙夜寒心而過為陛下之計臣竊觀二聖臨御以來日新聖政蔡確之徒不得逞其奸志隂懷怨望窺伺頗急然而深情厚貌未嘗形見今乃無故作為此詩臣恐祖宗神靈天地眷祐疾惡貫盈而以此機投陛下也臣伏見李常盛陶居風憲之地目覩蔡確無禮於君親而依違觀望曾不糾劾及朝廷已有行遣方始備禮一言而又是非交錯皆無定論翟思已下仍更不見章疏御史如此綱紀何賴焉彭汝礪在侍從論思之列不以疾惡為心反用開告訐之路為解其餘進說之人臣雖不能知其名氏然其所主之論計與汝礪不甚異也臣竊謂李常等居可言之地而不言雖言而隂持兩端彭汝礪等不任言責輒敢進疏宜有高逺之慮出於世俗之表而義存君親者反責其告訐悖逆不道者欲置而不問夫告訐之不可長則是矣至於睥睨兩宫包藏祻心者乃為可長乎朋邪罔上孰甚於此若非確之事發則羣小比周無由彰敗惟望聖心先定勿疑流言誅鋤奸慝決行威斷庶幾朝綱振舉邪正明辨天下幸甚安世又論曰右臣近以四具狀論列蔡確指斥乘輿情理切害乞付有司按冶其罪陛下聖德寬厚體貌大臣不欲輕信人言遽行竄殛遂降睿旨令確開具因依及下安州取索元本日近竊聞確及安州皆有回奏訕上之迹盡如臣章雖文過飾非妄意幸免而情狀明著可以無疑臣聞確昨移南陽既離安陸復遣親吏取去詩碑洗滌刮劘靡有存者使確詩意别無詆斥雖刻之金石固自可信惟其內懷觖望志在謗訕有慊於此懼復流播故令毁撤欲以滅口推此言之則確之罪惡何可掩也伏望陛下特徇公議毋恤浮言明正典刑以謝天下其御史臺官吏並不糾劾及伺候朝廷已行遣後雖有言者亦持兩端并自餘臣寮進說營救皆確朋黨不顧君親茍尚兼容必為後患伏乞聲言其罪重行貶黜庶分邪正以肅中外安世又論曰臣等近以蔡確怨望作詩無人臣敬順之禮纍曽奏論乞正典刑朝廷指揮下確開具仍令安州知州取索確詩元本竊聞安州取索與確開具皆已奏到確之開具本無所用徒為遷延行遣令確知其事因從容造說交通求救詞皆虛妄必不可信今安州根究得確詩元書在粉板後來削去墨跡其板見在書之其狀已著削去其罪轉明更使確巧詐辨給此亦不能文也詩版是明白已驗之跡便可為據開具乃委曲茍免之詞不足為慿罪在不赦合置誅竄恭以太皇太后以先帝遺詔用故事請權同聽政當日確備位次相親見本末豈不知此事不是太皇太后本意蓋為皇帝年在冲妙以保護聖躬為功事不得已乃從權宜竊以前日遭值先帝大變之際設或不依本朝典禮上尊兩宫則宗社大計將如何哉觀確之意以為不然蓋竊幸皇帝富於春秋欲以大臣専權自作威福包藏祻心深不可測此不可不誅也大臣之義當歸美報上喜以福祿夀考稱誦其君確不能庶幾於此乃引竭海變田之事肆為怨讟密懷大惡之志發為不祥之語此不可不誅也賞刑者人主之權也祖宗所以行威福而公天下服人心傳之子孫為萬世法也兩宫亦不得而私之矣如確之罪天下所共怒天下所共棄與天下共怒共棄之者在皇帝陛下與大臣也陛下崇飬聖德未専明斷所與議者在大臣如少欲寬確則天下疑而不服傷陛下之聖孝矣大臣者敢為開陳末減則是朋奸飬交靣謾不忠視確之罪無所重輕必不見容於天下矣臣等願盡行公議無屈祖宗之法以失威柄威柄一失則奸邪强驁無所忌憚後時有不可制之悔於此不得不慎以防微杜漸也伏望聖慈以其事下有司議正其罪為今日戒為後世訓安世又論曰准名例律十惡六曰大不恭注謂指斥乘輿情理切害者准職制律指斥乘輿情理切害者斬准名例律議請減贖章犯十惡者不用此律一宰相丁謂貶崖州司戶參軍一前樞密副使孫沔貶節度副使宿州安置一前參知政事吕惠卿貶節度副使建州安置右臣等早來延和殿伏䝉宣諭命具行遣比附條例密奏臣等略具合用律法及責降大臣故事備録如右臣等竊謂三人之間丁謂之責最重然其所犯亦非蔡確之比伏乞聖明更賜參酌安世又論曰右臣昨日延和殿進對嘗論彭汝礪營救蔡確事伏䝉宣諭以謂卿等錯會汝礪所言與卿等一般者臣雖已具汝礪朋附之實靣奏其略尚恐陛下未知羣邪交結之詳緣此事正繫是非邪正之機不可不察須至辨析上煩聖聽臣伏見彭汝礪與曽肇同為中書舍人公然結黨范純仁既是本省官長日得相見朝廷密命無不關預而又汝礪親弟娶李常之妷女廟堂之論悉使𫝊播故御史臺表裏通同殊無公道窺伺執政之意旋立議論純仁所欲雖違法害義無敢糾駮稍異己者則必承望風旨連章繩治皆有實跡未敢盡舉姑以蔡確之一事試為陛下陳之向者吳處厚繳進確詩其徒大懼巧言救解情態萬狀純仁備位宰相見確無禮於君親不以疾惡為心乃諭汝礪及曽肇以為告訐之風漸不可長汝礪等既聞其語即時𫝊報李常是以御史臺依違觀望不復按劾及見朝廷已有行遣方始備禮一言而汝礪輒奮强狠妄進邪說雖其大槩不敢主確然而深意全罪處厚臣竊謂以確詩為可罪邪則自有臺諫官論列若以確詩為不足治邪則臣等豈敢違犯公議輒行誣奏進退之間皆不預中書舍人之事今汝礪出位進疏惟以長告訐為說至令睥睨兩宫悖逆不道則欲置而不問是汝礪貪與蔡確為地而不顧君親之大倫僭亂之基漸此乃朋奸罔上徇私立黨而陛下謂之與臣言一般竊恐聖心未之察也臣聞汝礪與曽肇同授純仁之指而肇隂險奸賊不肯自發故使汝礪先次進言繼聞臣等極力攻擊陛下已賜聽納遂不復言然而交搆之迹縉紳無不知者獨其黨人為之諱耳願陛下以臣之論詳覽汝礪之疏則奸人之情狀必不能逃於聖明之鍳臣伺候斷遣蔡確了日當莭次具狀劾奏奸黨乞行竄逐惟陛下乘不可失之機特行英斷使邪正分别朝廷清明臣雖殞首亦無所恨安世又論曰右臣等竊聞蔡確已有責命舍人彭汝礪封還詞頭不肯草制者臣等竊謂確之罪惡本天下之所共疾不容更有異議汝礪居侍從論思之列不以君親為念沮格詔旨奮力營救臣等前日進對之際固已言其朋黨之狀觀今日之舉可驗有實伏望陛下誅其奸意重行貶黜庶分邪正以肅中外貼黃臣等伏見治平中命王疇為樞密副使是時錢公輔當制繳還詞頭朝廷以為不當遂責授滁州團練副使今來蔡確責命與王疇事理不同汝礪挾奸不肯草詞伏望詳酌重賜施行仍乞速降指揮免致惑亂衆聽安世又論曰臣竊聞朝廷以蔡確為光祿卿分司南京者臣按確嘗位宰相輔政亡狀弟碩贓汚罪惡貫盈確本同居衆謂預聞其事陛下既不窮治又貸碩死仍免決配惟令編管確以失教為名止從薄責朝廷之恩亦以極矣而確不知圗報猶懷怨望作為詩什輒敢謗訕罪狀顯著法所不赦陛下以天地父母之德不忍加誅俾全要領已出再生之賜謂宜投諸四裔以禦魑魅而尚玷卿列仍居善地中外之論皆謂失刑臣嘗謂賞罰者人君之大柄祖宗所以公天下而立之聖子神孫亦必以至公守之不可失也伏惟太皇太后陛下保佑聖躬恩德隆厚而確悖逆不道妄有詆斥人神之所共怒覆載之所不容今來責命太輕未厭輿議非惟失祖宗立法之意亦恐傷陛下孝治之風伏望聖明更加詳慮早行竄殛以慰人望安世又論曰右臣近以蔡確責命太輕嘗具論列今已纍日未奉指揮臣伏見確之朋黨大半在朝大臣之間亦有隂懷向背假託義理巧進邪說協力營救者雖聖心先定必不為流言之所惑而後命淹留未快公議再煩天聽仰冀採納臣聞自古亂臣賊子之為害皆非一朝一夕之故良由上下怠忽辨之不早日復一日飬成祻胎是以先王制禮雖齒路馬與蹙其芻者莫不有誅非芻為可貴而馬不可齒蓋君臣上下之分所當致嚴而將折天下奸雄桀驁之氣於未然之前也今確無禮於君親非可宥之過雖悖逆不道自取罪戾亦朝廷威令不行政尚姑息容飬確輩使至於此而輔弼大臣猶為救解欲望朝廷尊嚴朋邪斂迹何可得也願陛下深察奸黨慎無輕聽早行四凶之竄以慰天下之望安世又論曰右臣今月二十四日延和殿進對嘗論蔡確朋黨事雖粗陳大槩而臣內有誠懇未能盡逹天聽事體至重不可不憂惟陛下無憚煩而詳覽焉臣聞蔡確章惇黃履邢恕四人者在元豐之末相與交結號為死黨惇確執政倡於內履為中丞與其寮屬和之於外恕立其間往來傳送天下之事在其掌握公然朋比傍若無人以至先帝厭代聖上嗣統四人者以謂有定策之功眩惑中外無敢與辨及司馬光被用奸人懼其為己之害乃使惇於上前極口詆毁陛下以惇無人臣之禮逐之於外確又以弟碩贓汚事發亦罷宰相履恕坐事相繼外補既而惇在蘇州肆為不法强以賤價奪民之産確在安州不自循省作為詩什謗訕君親臣竊謂惇確所以桀驁很愎無所畏憚者蓋四人從來更相稱譽自謂社稷之臣心有所恃故敢如此若不早為辨正以解天下之惑臣恐異日必為朝廷之患臣迹雖踈逺不知先帝傳位之詳然縉紳士大夫間亦嘗講聞其略今試條析為陛下言之臣聞元豐七年秋宴之日今上皇帝出見羣臣都下喧傳以為盛事明年三月神考晏駕衆謂前日之出已示與子之意其事一也自先帝違豫岐嘉二王日詣寢殿候問起居及疾勢稍增太皇太后即時靣諭並令還宫非遇宣召不得輒入有以見聖心無私保祐慎重其事二也建儲之際大臣未嘗啓沃而太皇太后內出皇帝為神考祈福手書佛經宣示執政稱美仁孝發於天性遂令草詔誕告外庭蓋事已先定不假外助其事三也陛下聽政之初首建親賢之宅才告畢功二王即日遷就外第天下之人莫不服陛下之聖明深得逺嫌之理其事四也臣之所聞大略如此實太皇太后聖慮深遠為宗廟社稷無窮之計彼四人者乃敢貪天之功以為己力臣雖愚陋心常疾之近司馬康赴闕邢恕邀至河陽燕語之次稱贊確等不已顧其微意類皆捭闔蓋欲康來京師傳逹在位隂與確等謀為復用之計朋黨害正一至於此臣竊謂惇確用事十年小人黨與內外結固造作奸言欺惑愚衆臣恐嵗月浸久邪說得行離間兩宫有傷慈孝則確輩萬死何補於事伏望陛下起福於無形防患於未兆明詔執政及當時受遺之臣同以親見䇿立今上事迹作為金縢之書藏之禁中又以其事之本末著之實録然後明正四凶之罪布告天下除蔡確近以貶竄外所有章惇黃履邢恕欲乞並行廢斥屏之逺方終身不齒所貴奸豪弭息它日無患惟陛下取臣千慮之得少賜留聽不勝幸甚安世又論蔡確不合陳乞潁昌府狀曰右臣伏聞知鄧州蔡確上章陳乞潁昌府以便私計雖未知可否之報而縉紳之議率皆不平敢具僉言上逹天聽按確奸邪隂險盜據宰席不能正身率下宣明教化而縱其弟碩招權納賄贓汚狼藉有司論罪當以大辟陛下特加寬貸止送韶州編管確本同居衆謂預聞其事朝廷既不窮治惟以失教責之削其職名出臨偏郡僅能周嵗易守南陽當時議者已謂牽復太速碩至貶所亦止踰年確遽上言乞令內徙陛下屈天下之法移置黃州曾不旋踵自請近鎮臣竊謂確所以敢萌意外之望益肆無厭之求者蓋見近日政事多尚姑息是以先用其弟量移之請嘗試朝廷既不能沮止奸謀遽可其奏確知執政莫不畏已遂敢陵蔑公議輕侮朝綱雖屢䝉非常之恩猶不能滿確之意復託親老願移大藩蓋有以啓之也臣恐小人僥幸之心勢猶未已往往再乞放碩逐便或自求京師宫觀差遣以就醫為名然則陛下又將許之乎確之朋黨大半在朝夙夕引領以俟復用若使漸得親近廣為路岐異日盜權亂政無不由此而始况輔弼大臣既以罪黜雖領帥節未復職名考之典故猶是謫籍豈有不因詔除輒求自便此風寢長則陛下賞慶刑威之柄遂為虛名國家綱紀必至墮紊不可不慎也伏望聖慈明敕三省報罷確奏以正國體安世又論沈括吳居厚等牽復不當狀曰臣等伏見近日除沈括吳居厚賈青吕孝廉王子京差遣不合公議門下省已行封駮竊謂朝廷必以大禮之後過惡例隨湔滌臣等以謂不然括首議再興邉事喪師辱國為先帝遺恨罪不容誅而得全首領無復可以推恩居厚欺君害民誅求暴虐掠為己功歸怨於上罪當放斥而得列縉紳無復可以推恩矣青與孝廉子京苛刻聚斂流毒一方附會誕謾廢失使指重譴逺貶才當其罪如此數人者蹈犯凶桀出於文墨既不可以常法治之亦不可以常赦寬之也若使僥幸復起夤緣再用則羣小振奮躡踵求伸甚非朝廷之福生靈之幸也長奸之漸所宜杜絶伏望聖慈靣飭大臣諸不以法治而貶降者不得以赦議如天度兼容未忍盡棄即於為惡之間略加殊别特移青等一內地監當括與居厚且令依舊庶協大公以懲羣枉安世又論盧秉責命不當事狀曰右臣伏聞纍有臣寮論列盧秉昨在兩浙推行𣙜鹽之法務為慘刻殘虐一路比䝉朝廷下本道根究皆有實狀而害民之甚者自行法以來其所配流一萬二千餘人如聞寬恩止落學士猶以待制提舉宫觀中外之議皆謂未安伏惟聖朝愛飬元元不欲一物失所而秉出將使指捴按一道未聞宣布惠澤興利除害而専為身謀不顧義理罔上以虛課虐下以苛法愁苦之聲溢於道路議者皆謂誅剝掊克與吳居厚略同而峻刑害物則又過之雖降一官尚玷侍從恐無以戒戢奸暴慰塞民情伏望聖慈詳此事理比附吳居厚例重行黜責以答公議安世又論曰右臣近嘗奏論盧秉昨在兩浙專主鹽事殘民害物遺毒纍年乃者朝廷體量得實謂宜重貶而止落學士猶以待制提舉宫觀竊恐無以戒戢奸暴慰塞民情乞依吳居厚例特行竄黜伏聞續有指揮令展二年磨勘罰不當罪士論未平是敢罔避再三塵瀆天聽按秉𣙜賣鹽貨峻刑虐民無辜流死以數萬計老稚轉徙號呼盈路比屋憤怨思食其肉上賴纍聖德澤深厚是以人心卒無異志昔吳居厚之在京東掊克太甚斂怨於民陛下踐阼之初責授散官逺郡安置天下傳播莫不欣喜秉之刻剝無居厚而猛暴殺人實又過之不伏重誅已為寬典尚玷侍從何以示懲臣伏觀祖宗以來尤以失入為重彼執法之吏不明微意誤置一人入於深文大則追停小則降免今秉奉使故設苛法多殺平民非特失入一人之比也而朝廷責命太輕未厭公議非所以示陛下愛元元之意伏望聖慈檢會臣前奏重行貶竄以慰民望安世又論曰右臣近為體量到盧秉向在兩浙專主鹽事設法苛虐流毒一方而朝廷責命太輕未厭公議臣已兩具論列未聞指揮施行切緣盧秉奉將使指專為掊克使無辜之民流離轉死寃號之聲盈於道路蓋有甚於吳居厚者矣且兩浙京東皆陛下之民而秉與居厚酷暴之狀相若一則貶為散官安置逺郡一則尚列侍從提舉宫觀同罪異罰恐非至公之道伏望聖慈檢會臣前奏比附吳居厚例重行竄黜以慰逺民之望安世又論曰右臣近為盧秉責命太輕未厭輿議臣已三具論列未蒙朝廷施行如秉苛虐酷烈之實逺民怨苦寃憤之情前奏言之已詳不復條列而臣尚有未盡之意更為陛下陳之臣聞人君之柄莫大於賞罰而所以行之者必主於公平傳曰功同賞異則勞臣疑罪鈞刑殊則百姓惑蓋不能處之以至公則天下不得無疑惑之心也今秉之罪狀顯著非在重輕疑似之間考之近例又有吳居厚散官安置之比而諫官御史交章彈劾未見盡行其言朝廷何憚而不正典刑以謝東南之民乎臣之所論非茍欲奪秉寄祿官而已蓋秉之殘民害物甚於居厚而尚為待制提舉宫觀罪鈞刑殊臣恐無以解天下之惑也伏望陛下檢會臣纍奏事理削秉侍從之職以慰人望安世又論周穜不當乞王安石配享事狀曰右臣伏見鄆州教授周穜上書乞以故相王安石配享神宗皇帝廟廷中外喧傳頗駭羣聽臣聞天聖中錢惟演嘗請以莊獻明肅太后莊懿太后並配真宗廟室以希帝意是時御史中丞范諷劾惟演擅議遂落平章事罷歸本鎮臣竊謂惟演位兼將相言之未為太過而責之如此之重者所以嚴宗廟也今穜以踈逺微賤之臣懷奸邪觀望之志陵蔑公議妄論典禮使安石功德茂著實可從享在穜之分猶不當言而況輔政纍年曾無善狀殘民蠧國流弊至今安可侑食清廟傳之萬世如穜狂僭豈宜輕貸伏望陛下以春秋之法誅其始意重行竄殛以明好惡安世又乞罷李常盛陶中丞侍御史之職狀曰右臣伏自去年胡宗愈竊據丞轄不協人望臣忝言路纍具彈劾而聖德寬大務全體貌遷延經嵗未賜指揮臣以公議不平難於中輟乃者上章極言論奏并申三省乞請留中之疏付外廷明辨曲直雖發於忠憤不敢愛身而退循率易方俟誅譴今既半月威命不至繼聞宗愈已罷政事乃知陛下不特赦臣之罪又能聽臣之言恩出望外感極以泣陛下仁厚容諫如此而臣內懷區區未盡之意若不披瀝肝膽上逹天聽則於職事猶為有愧是以願終言之臣伏見御史中丞李常侍御史盛陶德性柔邪秉心不一昔蔡確用事之日隂相交結故常自太常少卿擢為禮部侍郎旋遷天官遂拜戶部尚書陶自瀛州得替用為太常博士尋權考功郎中皆由閒冗之中置諸要劇之任才能政事無足稱者為確主張人不敢論以至今日並居丞雜而又相與連親不使回避阿諛朋黨殊無公道臣不敢廣引細瑣上煩聽覽止以近事之尤顯著者試為陛下陳之臣聞蔡碩盜用官錢事發下獄罪當大辟陛下以天地父母之德赦而不誅又免真刑刺配止送韶州編管僅能周嵗確乞內徙朝廷曲法申恩移置黃州曾不旋踵確又陳乞潁昌緣國朝故事應左降官雖曽任宰臣而未復職名猶是謫籍既係有罪之人固無自便之理確之冒昧陳請御史即合糾彈而常陶身任臺綱隂借奸慝目覩亂法終無一言其事一也按謝景溫係王安禮之妻兄昨除刑部尚書衆議以為不可而常素與安石兄弟親善陶及安禮昔嘗同官於大名交契甚厚是以見景溫之誤恩並不論列其事二也章惇在蘇州公違條法强市田産使無辜之民被刑失業故朱迎等四人不逺數千里赴訴省部御史臺明知上件事實亦不繩治假借奸豪徼幸異日其事三也王安石輔政纍年曽無善狀害民蠧國未見其比向者病卒人皆相賀王汾雖無言責而能上書陳述義理乞賜惡諡以為後人之戒縉紳之論莫不多汾有憤世疾邪之意而常等惡傷王氏疾之若讐及汾除諫議大夫遂率全臺肆為醜詆然汾從來别無過惡止言其口吃滑稽之類一二小事乃令報罷中外之論至今不以為直臣日近方聞常等所以擊汾之由主於請安石之諡操心如此豈復至公其事四也陛下即政之初知免役出錢為民之患故復用祖宗差役之制常在戶部不能講究補完而協助邪說請復顧募及為中丞猶聞奏乞施行懷奸徇私大害聖政其事五也先帝已知經術取士久而有弊蓋欲復用詞律故昨者有司請於經義之外加以詩賦朝廷採納已為定制而安石之黨必欲沮撓常乃屢乞改用經義其徒翕然譽之賴陛下聖明主執不輕變易而常等言之不已背公死黨其事六也保甲之害衆所共知陛下變法以來農民方遂休息而陶乃倡言乞重編排朝廷若行其說天下豈不大駭率情妄作其事七也臣起於小官誤䝉擢用非不知雷同鉗默足以取容然而朞年之中歷犯權貴旁人為之憂恐而臣處之自如者實以陛下推至誠樂善之心有捨己從人之德是以不量力薄思效涓埃而況二聖臨御以來逮今五載遵守祖宗之法曽無毫髮之纍諫臣之職足以優為惟是君子小人消長之機實繫天下國家治亂之本故臣自拜命以迄於今獻納之間尤以人物為務蓋朝廷之有君子如人體之有元氣元氣盛實則膚革充盈血脉榮暢寒暑疫癘不能投間以干隂陽之和則為安强之人矣至於真守不固氣血將敗內無以飬根本外不能慎起居一旦遘疾雖和扁再生莫知所救天下之勢何以異此使君子衆多小人勿用然後綱紀振舉政教修明奸邪陰賊不能伺隙以亂聖人之治則成天下太平之功其或聽納之間不辨枉直任用之際不察忠邪黑白混淆是非雜揉日復一日寖生亂階雖堯舜復起亦不能治臣竊聞近者執政奏事之次親奉德音思與大臣共為廟社長久之計每患異日小人在側眩惑人主敗亂國政憂深慮逺固非愚臣所能跂及然臣夙夜寒心而不敢以為無事者正以風憲之地乃有常等皆王安石蔡確之黨人陰持兩端侵害正論使漸引其類並據要津則陛下纍年憂勤所立之政事必將復壞於羣小之手可不痛哉臣恐陛下之所憂不在異時而其兆已見於今日也況二人挾邪不忠之迹固已著明久而不去必有後悔惟陛下以臣所陳七事特賜詳覽若非誣罔皆有實狀即乞愼擇忠厚端正之人以代常等不勝幸甚安世又論時孝孫差除不當狀曰臣伏見朝廷除時孝孫充梓州路轉運判官按孝孫資禀傾邪巧於仕進昔王安石曽布鄧綰變法之際曲意附會遂薦充司農寺屬官推行新法於河北吏民苦之視若鷹犬其後蔡確用事傾心交結又得御史臺主簿及何正臣鞫瀘南之獄舉以自隨使正臣罔欺先朝肆行酷烈孝孫贊助其力居多獄決還朝擢使一道元祐之初罷諸路提舉官隨例得郡縉紳之議固已不平今正臣既行黜責而孝孫尚冒監司陟降頓殊公議未允伏望聖慈考其素履灼見奸狀追還新命以折羣枉安世又論曾肇知鄧州不當事狀曰臣竊聞朝廷除曾肇知鄧州兼西京南路安撫使按肇資禀奸回趣向頗僻昨來蔡確謗訕君親天下臣民所共疾怒而肇倡為邪說惑亂衆聽以至捭闔執政欺罔同列茍有可以救確者靡所不為上賴聖明得正刑典肇不自安遂乞外補陛下敦尚寬厚貸而不誅猶假從官出守近郡縉紳之論固已不平到潁半年遽易帥路非惟無以示好惡於天下亦恐氣焰凶暴小人寖長伏望聖慈審度事理收還新命以允公議歷代名臣奏議卷一百七十八
