body:
  text: 歷代名臣奏議卷二百八明楊士竒等撰法令周武王問於太公曰為國而數更法令者何也太公曰為國而數更法令者不法法以其所善為法者也故令出而亂亂則更為法是以其法令數更也魏文侯問李克曰刑罰之源安生李克曰生於奸邪淫佚之行凡奸邪之心飢寒而起淫佚者久飢之詭也雕文刻鏤害農事者也錦繡纂組傷女工者也農事害則飢之本也女工傷則寒之源也飢寒並至而能不為奸邪者未之有也男女飾美以相矜而能無淫佚者未嘗有也故上不禁技巧則國貧民侈國貧窮者為奸邪而富足者為淫佚則驅民而為邪也民以為邪因以法隨誅之不赦其罪則是為民設陷也刑罰之起有源人主不塞其本而替其末傷國之道乎文侯曰善以為法服也秦衛鞅欲變法秦人不恱鞅言於孝公曰夫民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆是以聖人茍可以彊國不法其故甘龍曰不然因民而教者不勞而成功緣法而治者吏習而民安之衛鞅曰常人安於故俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也智者作法愚者制焉賢者更禮不肖者拘焉公曰善乃以鞅為左庶長卒定變法之令令民為什伍而相收司連坐不告奸者要斬告奸者與斬敵首同賞匿奸者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率受爵為私鬬者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服有功者顯榮無功者雖富無所芬華令既具未布恐民之不信乃立三丈之木於國都南門募民能徙置北門者豫十金民怪之莫敢徙復曰能徙者子五十金有一人徙之輒豫五十金乃下令令行朞年民之國都言新令之不便者以千數於是太子犯法衛鞅曰法之不行自上犯之太子君嗣不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年道不拾遺山無盜賊民勇於公戰怯於私鬬鄉邑大治秦民初言令不便者有來言令便鞅曰此亂法之民也盡遷之於邊其後民莫敢議令秦始皇三十六年丞相李斯上言曰異時諸侯並爭厚招遊學今天下已定法令出一百姓當家則力農工士則學習法令今諸生不師今而學古以非當世惑亂黔首臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者皆詣守尉雜燒之令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若有欲學法令以吏為師制曰可漢文帝時張釋之為廷尉上行出中渭橋張晏曰在渭橋中路瓉曰中渭橋兩岸之中有人從橋下走出乘輿馬驚於是使騎捕屬之廷尉釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下久之以為行已過即出見乘輿車騎即走耳廷尉奏當一人犯蹕當罰金如淳曰已令蹕先至而犯者罰金四兩蹕止行人文帝怒曰此人親驚吾馬吾馬賴柔和令它馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如此而更重之是法不信於民也且方其時上使立誅之則已今既下廷尉廷尉天下之平也一傾而天下用法皆為輕重民安所錯其手足唯陛下察之良久上曰廷尉當是也其後有人盜髙廟前玉環捕得文帝怒下廷尉治釋之案律盜宗廟服御物者為奏當棄市上大怒曰人之無道乃盜先帝廟器吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也徐廣曰足一作止也且罪等如淳曰俱死罪也盜玉環不若盜長陵土之􅊇也然以逆順為差今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土張晏曰不欲指言故以取土譬也陛下何以加其法乎久之文帝與太后言之乃許廷尉景帝元年秋七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕廷尉與丞相更議著令廷尉信謹與丞相議曰吏及諸有秩受其官屬所監所治所行所將其與飲食計償費勿論它物若買故賤賣故貴皆坐贓為盜沒入贓縣官吏遷徙免罷受其故官屬所將監治送財物奪爵為士伍免之無爵罰金二斤令沒入所受有能捕告畀其所受贓宣帝時京兆尹張敞上書言國兵在外縣官穀度不足以振之願令諸有罪非盜受財殺人及犯法不得赦者皆得以差入穀務益致穀以豫備百姓之急事下有司蕭望之與少府李彊議以為民函隂陽之氣有仁義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅政教一傾雖有周召之佐恐不能復古者臧於民不足則取有餘則子詩曰爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下急上也今有西邊之役民失作業雖戶賦口斂以贍其困乏古之通義百姓莫以為非以死救生恐未可也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間漢但令罪人出財減罪以誅之其名賢於煩擾良民橫興賦斂也又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除今因此令贖其便明甚何化之所亂甫刑之罰小過赦薄罪贖有金選之品所從來久矣何賊之所生敞備皂衣二十餘年嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路況至來春將大困乎不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之彊對曰先帝聖德賢良在位作憲垂法為無窮之規永惟邊竟之不贍故金布令甲曰邊郡數被兵難飢寒夭絶天年父子相失令天下共給其費固為軍旅卒暴之事也聞天漢四年常使死罪人入五十萬錢減死罪一等豪强吏民請奪假貸至為盜賊以贖罪其後奸邪橫暴羣盜並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議時于定國為廷尉求明察寬恕黃霸等以為廷平季秋後請時上常幸宣室齊居而決事獄刑號為平矣涿郡太守鄭昌上疏曰聖王置諫諍之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避奸吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣東漢光武時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴參乘洛陽令董宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中與而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從强使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕强項令出賜錢三十萬宣悉以班諸吏由是搏擊豪强莫不震栗京師號為卧虎歌之曰枹鼓不鳴董少平大中大夫成儀侯梁統在朝廷數陳便宜以為法令既輕下奸不勝宜重刑罰以遵舊典乃上疏曰臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等自是以後著為常準故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以除殘為務政理以去亂為心刑罰在中無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之法故孔子稱仁者必有勇又曰理財正辭禁民為非曰義髙帝受命誅暴平蕩天下約令定律誠得其宜文帝寬惠柔克遭世平康唯除省肉刑相坐之法它皆率由無革舊章武帝致中國隆盛財力有餘征伐逺方軍役數興豪傑犯禁奸吏弄法故重首匿之科著知縱之律以破朋黨以徴隱匿宣帝聰明正直總御海內臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左伏惟陛下包元履德權時撥亂功踰文武德侔髙皇誠不宜因循季末衰微之軌回神明察考量得失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚事下三公廷尉議者以為隆刑峻法非明主急務施行日久豈一朝所釐統今所定不宜開可統復上言曰有司以臣所言不可施行尋臣之所奏非曰嚴刑竊謂髙帝以後至乎孝宣其所施行多合經傳宜比方今事驗之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰臣聞聖帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉又曰爰制百姓于刑之衷孔子曰刑罰不衷則人無所措手足衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂坐安衆庶豈無仁愛之恩貴絶殘賊之路也自髙祖之興至于孝宣君明臣忠謀謨深博猶因循舊章不輕改革海內稱理斷獄益少至初元建平所減刑罰百有餘條而盜賊浸多歲以萬數間者三輔從橫羣輩並起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵劫略吏人詔書討捕連年不獲是時以天下無難百姓安平而狂狡之藝猶至於此皆刑罰不衷愚人易犯之所致也由此觀之則刑輕之作反生大患惠加奸軌而害及良善也故臣統願陛下采擇賢臣孔光師丹等議成儀侯梁統及羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜增科禁以防其源詔下公卿議光祿勳杜林奏曰夫人情挫辱則義莭之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無耻導之以德齊之以禮有耻且格古之明王深識逺慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽得失故破矩為圓斫雕為朴蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成贓小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移帝從之章帝元和二年旱長水校尉賈宗等上言以為斷獄不盡三冬故隂氣微弱陽氣發泄招致灾旱事在於此帝以其言下公卿議尚書陳寵奏曰夫冬至之莭陽氣始萌故十一月有蘭射干藝荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周歲首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也又孟冬之月身欲寧事欲靜若以降威怒不可謂寧若以行大刑不可謂靜議者咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異往往為患由此言之灾害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正二王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之惠稽春秋之文當月令之意聖功美業不宜中疑書奏帝納之遂不復改章帝時太學生梁郁隂上書告太學生孫駰孔僖誹謗先帝刺譏當世下有司駰詣吏受訊僖以吏捕方至恐誅乃上書自訟曰臣之愚意以為凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直說書傳實事非虛謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也且陛下即位以來政教未過而德澤有加天下所見也臣等獨何譏刺哉假使所非實是則固應悛改儻宜不當亦宜含容又何罪焉陛下不推原大數深為自計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事窺陛下心自今以後茍見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何賴焉齊桓公親揚其先君之惡以唱管仲然後羣臣得盡其心今陛下乃欲以十世之武帝逺諱實事豈不與桓公異哉臣恐有司卒然見構銜恨䝉枉不得自叙使後世論者擅以陛下有所方比寧可復使子孫追掩之乎謹詣闕伏待重誅帝始亦無罪僖等意及書奏立詔勿問拜僖蘭臺令史建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比和帝時遂定其議以為輕侮法尚書張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設奸萌生長罪隙孔子曰民可使由之不可使知之春秋之義子不報讎非子也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義又輕侮之比寖以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故髙帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其敝議寢不省敏復上疏曰臣敏䝉恩特見拔擢愚心所不曉迷意所不解誠不敢茍隨衆議臣伏見孔子垂經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其奸枉議者或曰平法當先論生臣愚以為天地之性惟人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為災秋一物華即為異王者承天地順四時法聖人從經律願陛下留意下民考尋利害廣令平議天下幸甚和帝從之和帝永元六年陳寵代郭躬為廷尉復校律令刑法溢於甫刑者奏除之曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮即入刑相為表裏者也今律令犯罪應死刑者六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑千九百八十九其四百一十大辟千五百七耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家說各駁異刑法繁多宜令三公廷尉集平律令應經合義可施行者大辟二百耐罪贖罪二千八百合為三千與禮相應其餘千九百八十九事悉可詳除使百姓改易視聽以成大化致刑措之美傳之無窮未及施行㑹寵抵罪遂寢安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉時太山太守袁劭追駁之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若德不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科髙祖入關雖尚約法然殺人者死亦無寬降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵尸道路朝恩在寬幸至冬獄而初軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知朝氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感恱而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震耀殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為灾秋一草華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功賞勤賔豈有次玉當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追獻帝建安元年應劭刪定律令以為漢議表奏之曰夫國之大事莫尚載籍也載籍也者決嫌疑明是非賞刑之宜允獲厥中俾後之人永有鑒焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋折獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開闢以來莫或兹酷今大駕東邁巡省許都拔出險難其命惟新臣竊不自揆輒撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋折獄凡二百五十篇蠲去復重為之節文又集議駁三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪叙潤色以全本體其二十六博採古今瓌瑋之士德義可觀其二十七臣所創造左氏云雖有姬姜不弃憔悴雖有絲麻不弃菅蒯蓋所以代匱也是用敢露頑才廁于明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖德惟因萬機之餘暇逰意省覽獻帝善之於是舊事存焉魏文帝踐阼以髙柔為治書侍御史賜爵關內侯轉加治書執法時民間數有誹謗妖言帝疾之有妖言輒殺而賞告者柔上疏曰今妖言者必戮告之者輒賞既使過誤無反善之路又將開凶狡之羣相誣罔之漸誠非所以息奸省訟緝熙治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太祖亦除妖言誹謗之令臣愚以為宜除妖謗賞告之法以隆天父養物之仁帝不即從而時誣告者滋甚帝乃下詔敢以誹謗相告者以所告者罪罪之於是遂絶明帝即位閺鄉侯閺音聞衛覬奏曰九章之律自古所傳斷定刑罪其意微妙百里長吏皆宜知律刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所縣命而選用者之所卑下王政之弊未必不由此也請置律博士轉相教授事遂施行明帝時獵法甚峻宜陽典農劉龜竊獵於禁內財免其功曹張京詣較事言之帝匿京名收龜付獄廷尉髙柔表請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉廷尉便當考掠何復請告者主名吾豈妄收龜邪柔曰廷尉天下之平也安得以至尊喜怒而毁法乎重復為奏辭指深切帝意悟乃下京名即還訊各當其罪明帝以宫室盛興而期㑹迫急有稽限者帝親召問言猶在口身首已分王肅抗疏曰陛下之所行刑皆宜死之人也然衆庶不知將為倉卒願陛下下之於吏而暴其罪均其死也不汙宫掖不為縉紳驚惋不為逺近所疑人命至重難生易殺氣絶而不續者也是以聖王重之孟軻云殺一不辜而取天下者仁者不為也齊王正始中魏法犯大逆者誅及已出之女母丘儉之誅其子甸妻荀氏應坐死其族兄顗與景帝姻通表魏帝以丐其命詔聽離婚荀氏所生女芝為潁川太守劉子元妻亦坐死以懷妊繫獄荀氏辭詣司𨽻校尉何曾乞恩求沒為官婢以贖芝命曾哀之使主簿程咸上議曰夫司寇作典建三等之制甫侯修刑通輕重之法叔世多變秦立重辟漢又修之大魏承秦漢之弊未及革制所以追戮已出之女誠欲殄醜類之族也然則法貴得中刑慎過制臣以為女人有三從之義無自專之道出適它族還喪父母降其服紀所以明外成之節異在室之恩而父母有罪追刑已出之女夫黨見誅又有隨姓之戮一人之身內外受辟今女既嫁則為異姓之妻如或産育則為它族之母此為元惡之所忽戮無辜之所重於防則不足懲奸亂之源於情則傷孝子之心男不得罪於它族而女獨嬰戮於二門非所以哀矜女弱蠲明法制之本分也臣以為在室之女從父母之誅既醮之婦從夫家之罰宜改舊科以為永制於是有詔改定律令晋武帝即位鎮西長史杜預與車騎將軍賈充等定律令既成預為之注解乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁簡難犯易見則人知所避難犯則幾於刑厝刑之本在於簡直故必審名分審名分者必忍小理古之刑書銘之鐘鼎鑄之金石所以逺塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也詔班于天下泰始三年車騎將軍賈充等定議律令事畢表上四年正月大赦天下乃班新律其後明法掾張裴又注律表上之其要曰律始於刑名者所以定罪制也終於諸侯者所以畢其政也王政布於上諸侯奉於下禮樂撫於中故有三才之義焉其相須而成若一體焉刑名所以經略罪法之輕重正加減之等差明發衆篇之多義補其章條之不足較舉上下綱領其犯盜賊詐僞請賕者則求罪於此作役水火畜養守備之細事皆求之作本名告訊為之心舌捕繫為之手足斷獄為之定罪名例齊其制自始及終往而不窮變動無常周流四極上下無方不離于法律之中也其知而犯之謂之故意以為然謂之失違忠欺上謂之謾背信藏巧謂之詐虧禮廢節謂之不敬兩訟相趣謂之鬬兩和相害謂之戲無變斬擊謂之賊不意誤犯謂之過失逆節絶理謂之不道陵上僭貴謂之惡逆將害未發謂之戕唱首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之强攻惡謂之略三人謂之羣取非其物謂之盜貨財之利謂之贓凡二十者律義之較名也夫律者當慎其變審其理若不承用詔書無故失之刑當從贖謀反之同伍實不知情當從刑此故夫之變也卑與尊鬬皆為賊鬬之加兵刃水火中不得為戲戲之重也向人室廬道徑射不得為過失之禁也都城人衆中走馬殺人當為賊賊之似也過失似賊戲似鬬鬬而殺傷傍人又似誤盜傷縛守似强盜呵人取財似受賕囚辭所連似告劾諸勿聽理似故縱持質似恐猲如此之比皆為無常之格也五刑不簡正于五罰五罰不服正于五過意善功惡以金贖之故律制生罪不過十四等死刑不過三徒加不過六囚加不過五纍作不過十一歲纍笞不過千二百刑等不過一歲金等不過四兩月贖不計日日作不拘月歲數不疑閏不以加至死并死不復加不可纍者故有并數不可并數乃纍其加以加論者但得其加與加同者連得其本不在次者不以通論以人得罪與人同以法得罪與法同侵生害死不可齊其防親疏公私不可常其教禮樂崇於上故降其刑刑法間於下故全其法是故尊卑叙仁義明九族親王道平也律有事狀相似而罪名相涉者若加威勢下手取財為强盜不自知亡為縛守將中有惡言為恐猲不以罪名呵為呵人以罪名呵為受賕劫召其財為持質此八者以威勢得財而名殊者也即不求自與為受求所監求而後取為盜賊輸入呵受為留難斂人財物積藏於官為擅賦加毆擊之為戮辱諸如此類皆為以威勢得財而罪相似者也夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形於言暢於四支發於事業是故奸人心愧而面赤內怖而色奪論罪者務本其心審其情精其事近取諸身逺取諸物然後乃可以正刑仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自首攘臂似格鬬矜莊似威怡恱似福喜怒憂歡貌在聲色奸真猛弱候在視息出口有言當為告下手有禁當為賊喜子殺怒子當為戲怒子殺喜子當為賊諸如此類自非至精不能極其理也律之名例非正文而分明也若八十非殺傷人它皆勿論即誣告謀反者反坐十歲不得告言人即奴婢捍主主得謁殺之賊燔人廬舍積聚盜賊賘五匹以上弃市即燔官府積聚盜亦當與同毆人教令者與同罪即令人毆其父母不可與行者同得重也若得遺物强取强乞之類無還贓法隨例畀之文法律中諸不敬違儀失式及犯罪為公為私贓入身不入身皆隨事輕重取法以例求其名也夫理者精𤣥之妙不可以一方行也律者幽理之奧不可以一體守也或計過以配罪或化略不循常或隨事而盡情或趣舍以從時或推重以立防或引輕以就下公私廢避之宜除削重輕之變皆所以臨時觀釁者用法執詮者幽於未制之中采其根芽之微致之於機格之上稱輕重於毫銖考輩類於參伍然後乃可以理直刑正夫奉聖典者若操刀執繩刀妄加則傷物繩妄彈則侵直梟首者惡之長斬刑者罪之大弃市者死之下髠作者刑之威贖罰者誤之誡王者立此五刑所以寶君子而逼小人故為敕慎之經皆擬周易有變通之體焉欲令提綱而大道清舉略而王法齊其㫖逺其辭文其言曲而中其事肆而隱通天下之志唯忠也斷天下之疑唯文也切天下之情唯逺也彌天下之務唯大也變無常體唯理也非天下之賢聖孰能與於斯夫形而上者謂之道形而下者謂之器化而財之謂之格刑殺者是冬震曜之象髠罪者似秋雕落之變贖失者是春陽悔吝之疵也五刑成章輒相依准法律之義焉賈充等既定議律令表上四年正月大赦天下乃班新律時劉頌為廷尉頻表宜復肉刑不見省又上言曰臣昔上行肉刑從來積年遂寢不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過於此今死刑重故非命者衆生刑輕故罪不禁奸所以然者肉刑不用之所致也今為徒者類性元惡不軌之族也去家懸逺作役山谷飢寒切身志不聊生又有廉士介者茍慮不首死則皆為盜賊豈況本性奸凶無賴之徒乎又令徒富者輸財解日歸家乃無役之人也貧者起為奸盜又不制之虜也不刑則罪無所禁不制則羣惡橫肆為法若此近不盡善也是以徒亡日屬盜賊日煩亡之數者至有十數得輒加刑日益一歲此為終身之徒也自顧反善無期而災困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑今反於此諸重犯亡者髮過三寸輒重髠之此以刑生刑加作一歲此以徒生徒也亡者積多繫囚猥畜議者曰囚不可不赦復從而赦之此為刑不制罪法不勝奸下知法之不勝相聚而謀為不軌月異而歲不同故自頃年以來奸惡陵暴所在充斥議者不深思此故而曰肉刑於名忤聽忤聽孰與盜賊不禁聖王之制肉刑逺有深理其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫奸人無用復肆其志止奸絶本理之盡也亡者刖足無所用復亡盜者截手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此非徒然也此等已刑之後便各歸家父母妻子共相飬恤不流離於塗路有今之困創愈可役上准古制隨宜業作雖已刑殘不為虛弃而所患都塞又生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡淫盜悉以肉刑代之其三歲刑以下已自杖罰遣又宜制其罰數使有常限不得減此其有宜重者又任之官長應四五歲刑者皆髠笞笞至一百稍行使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體為戮終身作誡人見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具此為諸已刑者皆良士也豈與全其為奸之手足而蹴居必死之窮地同哉而猶曰肉刑不可用臣竊以為不識務之甚也臣昔常侍左右數聞明詔謂肉刑宜用事便於政願陛下信獨見之斷使夫能者得奉聖慮行之於今比填溝壑冀見太平周禮三赦三宥施於老幼悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之至於自非此族犯罪則必刑而無赦此政之理也暨至後世以時嶮多難因赦解結權以行之又不以寬罪人也至今恆以罪積獄繁赦以散之是以赦愈數而獄愈塞如此不已將至不勝原其所由肉刑不用之故也今行肉刑之徒不積且為惡無具則奸息去此二端獄不得繁故無取於數赦於政體勝矣疏上又不見省武帝時太廟初建詔普增位一等後以主者承詔失㫖改除之尚書郎摰虞上表曰臣聞昔之聖明不愛千乘之國而惜桐葉之信所以重至尊之命而達於萬國之誠也前乙巳赦書逺稱先帝遺惠餘澤普增位一等以酬四海欣戴之心驛書班下被于逺近莫不鳥騰魚躍喜䝉德澤今一旦更以主者思文不審收既往之詔奪已澍之施臣之愚心竊以為不可詔從之惠帝時齊王冏起義兵趙王倫收東萊王蕤及弟北海王實繫廷尉當誅倫太子中庶子祖納上疏諌曰罪不相及惡止其身此先哲之𢎞謀百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛無責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御衆設從罪以發奸其所由來蓋三代之弊法耳蕤實獻王之子明德之𦙍宜䝉特宥以全穆親之典㑹孫秀死蕤等悉得免時政出羣下每有疑獄各立私情刑法不定獄訟繁滋尚書裴頠表陳之曰夫天下之事多塗非一司之所管中才之情易擾賴恆制而後定先王知其所以然也是以辨方分職為之準局準局既立各掌其務刑賞相稱輕重無二故下聽有常羣吏安業也舊宫掖陵廟有水火毁傷之變然後尚書乃躬自奔赴其非此也皆止於郎令史而已刑罰所加各有常刑去元康四年大風之後廟闕屋瓦有數枚傾落免太常荀㝢于時以嚴詔所譴莫敢據正然內外之意僉謂事輕責重有違於常㑹五年二月有大風至者懲懼前事臣新拜尚書始三日本曹尚書有疾權令兼出按行蘭臺主者乃瞻望阿棟之間求牽瓦之不正者得棟上瓦小邪十五處或是始瓦時邪蓋不足言風起倉卒臺官更往太常按行不及得周文書未至之頃便競相禁止臣以權兼暫出出還便罷不復得窮其事而本曹據執却問無已臣時具加解遣而主者畏咎不從臣言禁止太常復興刑獄昔漢氏有盜廟玉環者文帝欲族誅釋之但處以死刑曰若侵長陵一抔土何以復加文帝從之大晋垂制深惟經逺山陵不封園邑不飭墓而不墳同乎山壤是以丘阪存其陳草使齊乎中原矣雖陵兆尊嚴唯毁發然後族之此古典也若登踐犯損失盡敬之道事止刑罪可也去八年奴聽教加誣周龍燒草廷尉遂奏族龍一門八口并命㑹龍獄翻然後得免考之情理準之前訓所處實重今年八月陵上荆一枝圍七寸二分者被斫司徒太常奔走道路雖知事小而案劾難測搔擾驅馳各競免負于今太常禁止未解近日太祝署失火燒屋三間半署在廟北隔道在重牆之內又即已滅頻為詔㫖所問主者以詔㫖使問頻繁便責尚書不即按行輒禁止尚書免皆在法外刑書之文有限而舛違之故無方故有臨時議處之制誠不能皆得循常也至於此輩皆為過當每相逼迫不復以理上替聖朝畫一之德下損崇禮大臣之望臣愚以為犯陵上草木不應乃用同産異刑之制按行奏劾應有定準相承務重體例遂虧或因餘事得容淺深頠雖有此表曲議猶不止三公尚書劉頌上疏曰自近世以來法漸多門令甚不一臣今備掌刑斷職思其憂謹具啓聞臣竊伏惟陛下為政每盡善故事求曲當則例不得直盡善故法不得全何則失法者固以盡理為法而上求盡善則諸下牽文就意以赴主之所許是以法不得全刑書徴文徴文必有乖於情聽之斷而上安於曲當故執平者因文可引則生二端是法多門令不一則吏不知所守下不知所避奸僞者因法之多門以售其情所欲淺深茍斷不一則居上者難以檢下於是事同議異獄犴不平有傷於法古人有言人主詳其政荒人主期其事理詳匪它盡善則法傷故其政荒也期者輕重之當雖不厭情茍入於文則很而行之故其事理也夫善用法者忍違情不厭聽之斷輕重雖不允人心經於凡覽若不可行法乃得直又君臣之分各有所司法欲必奉故令主者平文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫𢎞斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事自非斯格重為故不近似此類不得出以意妄議其餘皆以律令從事然後法信於下人聽不惑吏不容奸可以言政人主軌斯格以責羣下大臣小吏各守其局則法一矣古人有言善為政者看人設教看人設教制法之謂也又曰隨時之宜當務之謂也然則看人隨時在大量也而制其法法軌既定則行之行之信如四時執之堅如金石羣吏豈得在成制之內復稱隨時之宜傍引看人設教以亂政典哉何則始制之初固已看人而隨時矣今若設法未盡當則宜改之若謂已善不得盡以為制而使奉用之司公得出入以差輕重也夫人君所與天下共者法也已令四海不可以不信以為教方求天下之不慢不可繩以不信之法且先識有言人至愚而不可欺也不謂平時背法意斷不勝百姓願也上古議事以制不為刑辟夏殷及周書法象魏三代之君齊聖然咸弃曲當之妙鑒而任徴文之直準非聖有殊所遇異也今論時敦弊不及中古而執平者欲適情之所安自託於議事以制臣竊以為聽言則美論理則違然天下至大事務衆雜時有不得悉循文如令故臣謂宜立格為限使主者守文死生以之不敢錯思於成制之外以差輕重則法恆全事無正據名例不及大臣論當以釋不滯則事無閡至如非常之斷出法賞罰若漢祖戮楚臣之私已封趙氏之無功唯人主專之非奉職之臣所得擬議然後情求傍請之跡絶似是而非之奏塞此蓋齊法之大準也主者小吏處事無常何則無情則法徒克有情則撓法積克似無私然乃所以得其私又恆所岨以衛其身斷當恆克世謂盡公時一曲法乃所不疑故人君不善倚深似公之斷而責守文如令之奏然後足為有檢此又平法之一端也夫出法權制指施一事厭情合聽可適耳目誠有臨時當意之快勝於徴文不允人心也然起為經制終年施用恆得一而失十故小有所得者必大有所失近有所漏者必逺有所苞故諳事識體者善權輕重不以小害大不以近妨逺忍曲當之近適以全簡直之大準不牽於凡聽之所安必守徴文以正例每臨其事恆御此心以決斷此又法之大槩也又律法斷罪皆當以法律令正文若無正文依附名例斷之其正文名例所不及皆勿論法吏以上所執不同得為異議如律之文守法之官唯當奉用律令至於法律之內所見不同乃得為異議也今限法曹郎令史意有不同為駮唯得論釋法律以正所斷不得援求諸外論隨時之宜以明法官守局之分詔下其事侍中太宰汝南王亮奏以為夫禮以訓世而法以整俗理化之本事實由之若斷不斷常輕重隨意則王憲不一人無所錯矣故觀人設教在上之舉守文直法臣吏之節也臣以去太康八年隨事異議周懸象魏之書漢詠畫一之法誠以法與時共義不可二今法素定而法為議則有所開長以為宜如頌所啓為永久之制元帝為丞相時朝廷草創議斷不循法律人立異議髙下無狀主簿熊逺奏曰禮以崇善法以間非故禮有常典法有常防人知惡而無邪心是以周建象魏之制漢創畫一之法故能闡𢎞大道以至刑厝律令之作由來尚矣經賢智歷夷險隨時斟酌最為周備自軍興以來法度陵替至於處事不用律令競作屬命人立異議曲適物情虧傷大例府立節度復不奉用臨時改制朝作夕改至於主者不敢任法每輒關咨委之大官非為政之體若本曹處事不合法令監司當以法彈違不得動用開塞以壞成事按法蓋粗術非妙道也矯割物情以成法耳若每隨物情輒改法制此為以情壞法法之不一是謂多門開人事之路廣私請之端非先王立法之本意也凡為駮議者若違律令節度當合經傳及前比故事不得任情以破成法愚謂宜令録事更立條制諸立議者皆當引律令經傳不得直以情言無所依準以虧舊典也若開塞隨宜權道制物此是人君之所得行非臣子所宜專用主者唯當徴文據法以事為斷耳元帝即位河東衛展為廷尉上言曰古者肉刑事經前聖漢文除之增加大辟今人戶雕荒百不遺一而刑法峻重非句踐飬胎之義也臣謂宜復古施行以隆太平之化詔內外通議於是驃騎將軍王導太常賀循侍中紀瞻中書郎庾亮大將軍咨議恭軍梅陶散騎郎張嶷等議以肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改也豈是漢文常主所能易者乎時蕭曹已沒絳灌之徒不能正其義逮班固深論其事以為外有輕刑之名內實殺人又死刑太重生刑太輕生刑縱於上死刑怨於下輕重失當故刑政不中也且原先王之造刑也非以過怒也非以殘人也所以殺姦所以當罪今盜者竊人之財淫者好人之色亡者避叛之役皆無殺害也則加之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此歲以巨萬計此乃仁人君子所不忍聞而況行之於政乎若乃惑其名而不練其實惡其生而趣其死此畏水投舟避坎蹈井愚夫之不若何取於政哉今大晋中興遵復古典率由舊章起千載之滯義拯百殘之遺黎使皇典廢而復存黔首死而更生至義暢于三代之際遺風播乎百世之後生肉枯骨惠侔造化豈不休哉惑者乃曰死猶不懲而況於刑然人者𡨕也其至愚矣雖加斬戮忽於灰土死事日往生欲日存未以為改若刑諸市朝朝夕鑒戒刑者詠為惡之永痛惡者覩殘刖之長廢故足懼也然後知先王之輕刑以御物顯誠以懲愚其理逺矣尚書令刁協尚書薛兼等議以為聖上悼殘荒之遺黎傷犯死之繁衆欲行刖以代死刑使犯死之徒得存性命則率土䝉更生之澤兆庶必懷恩以反化也今中興祚隆大命惟新誠宜設寬法以育人然懼羣小愚蔽習玩所見而忽異聞或未能咸服臣謂行刑之時先明申法令樂刑者刖甘死者殺則心必服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退為允尚書周顗郎曹彥中書郎桓彛等議以為復肉刑以代死誠是聖王之至德哀矜之𢎞私然竊以為刑罰輕重隨時而作時人少罪而易威則宜從輕而寬之時人多罪而難威則宜化刑而濟之肉刑平世所應立非救弊之宜也方今聖化草創人有餘奸習惡之徒為非未已截頭絞頸尚不能禁而乃更斷足劓鼻輕其刑罰使欲為惡者輕犯寬刑蹈罪更衆是為輕其刑以誘人於罪殘其身以加楚酷也昔之畏死刑以為善人者今皆犯輕刑而殘其身畏重之常人反為犯輕而致囚此則何異斷刖常人以為恩仁邪受刑者轉廣而為非者日多踊貴屨賤有鼻者醜也徒有輕刑之名而實開長惡之源不如以殺止殺重以全輕權小停之須聖化漸著兆庶易威之日徐施行也議奏元帝猶欲從展所上大將軍王敦以為百姓習俗日久忽復肉刑必駭逺近且逆寇未殄不宜有慘酷之聲以聞天下於是乃止時淮南小中正王式繼母前夫終更適式父式父終喪服訖議還前夫家前夫家亦有繼子奉飬至終遂合葬於前夫式自云父臨終母求去父許諾於是制出母齊衰期御史中丞卞壼奏曰就如式父臨終許諾必也正名依禮為無所據若夫有命須顯七出之責當存時棄之無緣以絶義之妻留家制服若式父臨困謬亂使去留自由者此必為相要以非禮則存亡無所得從式宜正之以禮魏顆父命不從其亂陳乾昔欲以二婢子殉其子以非禮不從春秋禮記善之並以妾媵猶正以禮況其母乎式母於其夫生事奉終非為既絶之妻夫亡制服不為無義之婦自云守節非為更嫁離絶之斷在夫沒之後夫之既殁是其從子之日而式以為出母此母以子出也致使存無所容歸殁無所託地寄命於它人之門埋尸於無名之冡若式父亡後母尋殁於式家必不以為出母明矣許諾之命一耳以為母於同居之時至殁前子之門而不以為母此為制離絶於二居裁出否於意斷離絶之斷非式而誰假使二門之子皆此母之生母戀前子求去求絶非禮於後家還反又非禮於前門去不可去還不可還則為無寄之人也式必內盡匡諫外極防間不絶明矣何至守不移於至親略情禮於假繼乎繼母如母聖人之教式為國士閨門之內犯禮違義開闢未有於父則無追亡之善於母則無孝敬之道存則去留自由亡則合葬路人可謂生事不以禮死葬不以禮者也虧損世教不可以居人倫詮正之任案侍中司徒臨潁公組敷宣五教實在任人而含容違禮曽不貶黜揚州大中正侍中平望亭侯㒯淮南大中正散騎侍郎𢎞顯執邦論朝野取信曽不能率禮正違崇孝敬之教並為不勝其任請以見事免組㒯𢎞官大鴻臚削爵土廷尉結罪疏奏詔特原組等式付鄉邑清議廢棄終身壼遷吏部尚書成帝時召南陽樂謨為郡中正潁川庾怡為廷尉評謨怡各稱父命不就給事中尚書令卞壼奏曰人無非父而生職無非事而立有父必有命居職必有悔有家各私其子此為王者無人職不軌物官不立政如此則先聖之言廢五教之訓塞君臣之道散上下之化替矣樂廣以平夷稱庾珉以忠篤顯受寵聖世身非已有況及後嗣而可專哉所居之職若順夫人心則戰戍者之父母皆當以命子不以處也若順謨父之意則人皆不為郡中正人倫廢矣順怡父之意人皆不為獄官則刑辟息矣凡如是者其可聽歟若不可聽何以許謨怡之得稱父命乎此為謨以名父子可以虧法怡是親戚可以自專以此二塗服人示世臣所未悟也宜一切班下不得以私廢公絶其表疏以為永制朝議以為然謨怡不得已各居所職范堅遷尚書右丞時廷尉奏殿中帳吏卲廣盜官幔三張合布三十匹有司正刑棄市廣二子宗年十三雲年十一黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書朱映議以為天下之人父無子者少一事遂行便成永制懼死罪之刑於此而弛堅亦同映議時議者以廣為鉗徒二兒沒入既足以懲艾使百姓知父子之道聖朝有垂恩之仁可特聽減廣死罪為五歲刑宗等付奚官為奴而不為永制堅駁之曰自淳朴澆散刑辟乃作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典刑者也且既許宗等宥廣以死若復有宗比而不求贖父者豈不擯絶人倫同之禽獸邪按主者今奏云惟特聽宗等而不為永制臣以為王者之作動關盛衰嚬笑之間尚慎所加況於國典可以徒虧今之所以宥廣正以宗等耳人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩於今而開萬怨於後成帝從之正廣死刑安帝元興末桓𤣥輔政又議欲復肉刑斬左右趾之法以輕死刑命百官議蔡廓上議曰建邦立法𢎞政穆化必隨時置制德刑兼施長貞一以間其邪教禁以檢其慢灑湛露以流潤厲嚴霜以肅威雖復質文迭用而斯道莫革肉刑之設肇自哲王蓋由曩世風淳人多惇謹圖像既陳則機心直戢刑人在塗則不逞改操故能勝殘去殺化隆無為季末澆僞設綱彌密利巧之懷日滋耻畏之情轉寡終身劇役不足止其奸況乎黥劓豈能反於善徒有酸慘之聲而無濟俗之益至於棄市之條實非不赦之罪事非手殺考律同歸輕重約科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼贊道邈伊周誠宜明慎用刑愛人𢎞育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來而孔琳之議不同用王郎夏侯𤣥之㫖時論多與琳之同故遂不行義熙十四年大司馬府軍人朱興妻周坐息男道扶年三歲先得癎病周因其病發掘地生薶之為道扶姑女所告正周棄市刑尚書僕射徐羡之議曰自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故尚𢎞物之理母之即刑由子明法為子之道焉有自容之地雖伏法者當罪而在宥者靡容愚謂可特申之遐裔從之歷代名臣奏議卷二百八
