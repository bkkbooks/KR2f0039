body:
  text: 歷代名臣奏議卷一百五十八明楊士竒等撰知人宋理宗寶慶元年冬宗正寺簿梁成大轉對首言大佞似忠大辨似訥或好名以自鬻或立異以自詭或假髙尚之節以要君或飾矯偽之學以欺世言若忠鯁心實回邪一不察焉薰蕕同器涇渭雜流矣言不逹變謀不中機或巧辨以為能或詭訐以市直或設竒險之説以駴衆聽或肆妄誕之論以惑士心所行非所言所守非所學一不辨焉枘鑿不侔矛盾相激矣理宗時翰林學士知制誥真德秀伸雪葉莫誣枉乞加録用狀奏曰臣恭覩皇帝陛下躬親大政以來開衆正杜羣枉進君子退小人積年蒙蔽之餘一旦豁然天日澄霽至於迹逺小臣行治有聞者多預召擢誣枉斥廢者亦被洗湔公道昭明衆志用勸今有人焉嘗捐軀命委家族為一方翦除凶叛而扼於讒口困躓弗伸者殆將十年其事實關於臣臣而不言誰當言者臣嘉定之末俟罪湖湘所部武岡軍守臣司馬遵不善撫循致激戎伍之變臣以本軍簽書判官廳公事葉莫寬和得衆委以攝郡密授方略俾為之圖莫能外示函容而隂設規畫不數旬間誅斬凶渠闔郡底定臣即奏于朝蒙恩特進三秩就升通判以奬其忠勞既又改倅江陵欲付以事任而司馬遵者間廢頗久志圖復用撰造誣罔之辭以媒言路言者適其鄉曲不暇審詳遽行彈奏削秩免官其後辟倅汀州又以劾免今按其所論大要有三曰脅長吏而奪之印也曰諭賊黨以逐郡守也曰掩諸卒禽賊之功以為已有也臣身與其事謹為條析而辨明之司馬遵當叛卒囂譁之初皇恐失措以疾為辭牒送印記又以手帖懇囑叮嚀郡之官僚亦合辭致請時事變叵測人情憂危莫不獲已出任撫定之責而數申諸司求免攝郡臣為檄永州通判魏泌前往究實欲以代之泌至武岡而永守適以論罷有旨令交與次官泌既亟歸零陵臣遂復以付莫迄能顯立功效不負骫令然其本心蓋求免而不獲非欲攝以規利也文移具在一一可覆而謂莫迫而奪之印可乎其誣一也臣既劾遵于朝又慮其久留俟命萬一不測或生他虞則賊之凶焰又將愈熾一境生靈皆有魚肉之憂不獲已令遵先次離任而嚴督巡尉護出數程戒諭卒徒毋得凌犯遵於枕蛟藉虎之時得自拔以去盡室獲全莫之保護不為無力而謂諭賊黨以逐之可乎其誣二也臣聞變之後與莫書問往來輒為隱語使用以賊攻賊之策時諸營千餘人悉已從賊而莫能於中擇可仗者數人出臣所下賞榜文帖密以示之諭以禍福結以恩信然後陳喜李成等踴躍效命非莫發縱指示雖百陳喜安能成功其間當賞之人皆莫保明申上未幾命下補承信校尉者四人莫於諸卒亦無負矣而謂掩其功以為已有可乎其誣三也方是時叛卒恣橫求得欲從諸郡之兵爭相慕效有瞋目語難之態而邵州之勢尤急臣繆尸帥事日夕軫憂幸莫功成聞者惕息憂端頓弭軍律用張臣之薦辭謂其事雖止一方其利實及一路蓋以此也而遵不思由已以致變乃反嫁罪而誣人使莫以慈祥豈弟之資而被凶險傾邪之目詆誣至此可謂欺天言者未必有心遵實織成其罪莫既鐫斥遵遂得祠懲勸易施重為可歎臣平居念此每為拂膺今者天啓聖明宏開公道而臣猥以不肖受任全閩莫之本貫在臣治所祠廪之給又在本州議幕虛員委令承攝亦能多所裨益似此人材豈宜久棄且昔嘗賴之以免責今可不為之訟寃事之本末不敢悉塵天聽已偹録申尚書省外莫以儒科入仕治邑有稱兩任通判共歷二考八月有竒今以朝請大夫主管建昌軍仙都觀資歷已深治行無闕伏望聖慈念其捐身弭亂之功憫其遭誣家食之久優加録用使天下之士知能為國宣力者雖見枉於一時終獲伸於異日其於勸厲實非小補須至奏聞者得旨以莫知贛州淳祐十二年祕書少監兼侍立修注官髙斯得奏曰臣竊觀仁宗皇帝朝歐陽修為諫官因小人唱為朋黨之説以誣君子進朋黨論謂朋黨非所患在辨君子與小人而已其言深切著明可以一洗千古朋黨之論為人君者所當篤信而力行之也夫修謂周武之臣三千人共為一朋自古為朋之多且大莫如周而周用以興言善人不厭乎多也今善人方患其少而或者尚指以為黨欲排去之抑何與修異見乎臣竊見近者名臣去位係國安危臣謂舉朝之士皆將起而爭之矣然以事關諫臣畏威懼禍自宰執而下留行者不過八九人諫臣誣劾其人留之不可能與諫臣爭是非者又不過四五人可謂至寡而不能為朋矣諫臣反謂其要私黨以乞留又謂逐去其人則朋黨可消以激怒陛下嗚呼天下安有四五人而可以謂朋黨者哉夫虞周之朋不厭其多彼諫臣者固不足以知此矣若以漢唐之朋黨言之則漢之三君八俊八顧八及八厨唐之八關十六子與其徒充斥朝廷布滿天下如是而指為朋黨猶可也今蹈方據正之士迹稀牢落有如晨星方患其氣勢單弱不足以敵群小而主公議而猶欲以朋黨陷之不亦欺天誣人之甚乎且仁宗之諫臣持論如此而陛下之諫臣持論如彼公私邪正固不待辨然亦可以觀世道矣臣願陛下置修所著於坐隅朝夕省覽以虞周信用君子者自勉毋惑於小人誣陷之言庶幾善良獲安宗社有賴不然修所言漢唐末世鋤去朋黨之祻甚可懼也可不監哉淳祐間侍御史陳垓誣劾程公許右正言蔡榮誣劾黃之純二公罷出六館相顧失色太學生劉黻率諸生上書言黻等蒙被教養視國家休戚利害若已痛癢朝廷進一君子臺諫發一公論則彈冠相慶喜溢肺膺至若君子鬱而不獲用公論沮而不克伸則憂憤忡結寢食俱廢臣聞扶植宗社在君子扶植君子在公論陛下在位幾三十年端平間公正萃朝忠讜接武天下翕然曰此小元祐也淳祐初大姦屏迹善類在位天下又翕然曰此又一端平也奈何年來培養保護之初心不能不為之轉移祖宗建置臺諫本以伸君子而折小人昌公論而杜私説乃今老叨自肆姦種相仍以諂諛承風旨以傾險設機阱以淟涊盜官爵陛下非不識拔羣賢彼則忍於空君子之黨陛下非不容受直言彼則勇於倒公議之戈不知陛下何負此輩而彼乃負陛下至此耶當陛下詔起彚髦之秋而公許起自家食正君子覘之以為進退之機乃今坐席未溫彈章已上一公許去若未害也臣恐草野諸賢見幾深遁而君子之脈自此絶矣比年朋邪扇焰緘默成風奏事者不過襲陳言應故事而已幸而之純兩疏差強人意乃今軟媚者全身鯁直者去國一之純去若未害也臣恐道路以目欲言輒沮而公論之脈自此絶矣況今天下可言之事不為少可攻之惡不為不多術窮桑孔浸有逼上之嫌勢挾金張濫處牧民之職以乳臭騃子而躐登從槖以光範私人而纍典輔藩錢神通靈於旁徯公器反類於互市天下皆知之豈陛下獨不知之政惟為陛下紀綱者知為身謀不為陛下謀陛下明燭事幾詎可墮此輩蒙蔽術中何忍以祖宗三百年風憲之司而壞於一二小人之手耶臣汝騰陛下之劉向也則以忠鯁斥臣子才臣棟臣伯玉陛下之汲黯也則以切直罷遂使淳祐諸君子日消月磨至今幾為之一空彼誠何心哉髙宗紹興二十年之詔有謂臺諫風憲之地年來用人非據與大臣為支黨濟其喜怒甚非耳日之寄臣竊觀近事不獨臺諫為大臣支黨內簡相傳風旨相諭且甘為鷹犬而聽其指嗾焉宰相所不樂者外示優容而隂實頥指臺諫以去之臺諫所彈擊者外若不相為謀而隂實奉承宰相以行之方公許之召也天下皆知獨斷於宸衷及公許之來也天下亦知嘗得罪於時宰豈料陛下之恩終不足恃宰相之嗔竟不可逃耶陛下萬機之暇試以公許之純與垓滎等熟思而靜評之其言論孰正孰邪孰忠孰佞雖中智以下之主猶知判别是非況以陛下明聖而顧不察此近見公許奏疏嘗告陛下揭至公以示天下垓則以袐密之説惑上聽公許嘗告陛下以寵賂日章官邪無警欲塞幸門絶曲徑垓則縱狎客以兜攬關節持闊扁以脅取舉狀開賂門以簸弄按章至若之純之告陛下力伸邪正之辨明斥媚相之非謇謇諤諤流出肺肝滎身居言責聞其風聲自當愧死尚敢妄肆萋菲略無人心乎且陛下擢用臺諫若臣磊臣卿臣咨夔臣應起臣漢弼臣凱臣燧光明俊偉卓為天下稱首然甫入而遽遷或一鳴而輒斥獨垓滎輩貪叨頑忍久汙要津根據而不拔劉向所謂用賢轉石去佞拔山者乃今見之可不畏哉矧今國嗣未正事會方殷民生膏血朘削殆盡所賴以祈天命係人心惟君子與公論一脈耳小人以不恤之心為無忌憚之事其意不過欲爵祿日穹權勢日盛以富貴遺子孫耳豈暇為國家計哉自昔天下之患莫大於舉朝無公論空國無君子我朝本無大失德於天下而乃有宣靖之祻夫豈無其故哉始則邪正交攻更出迭入中則朋邪翼偽隂陷潛詆終則倒置是非變亂黑白不至於黨祻不止向使劉安世陳瓘諸賢尚無恙楊畏張商英周秩輩不久據臺綱其祻豈至此烈古語云前車覆後車戒今朝廷善類無幾心懷姦險者則以文藻飾佞舌志在依違者則以首鼠持圓機宗社大計孰肯明目張膽為陛下伸一喙者則其勢必終於空國無君子舉朝無公論無君子無公論脫有緩急彼一二憸人者陛下獨可倚仗之乎若垓之罪又浮於滎雖兩觀之誅四裔之投猶為輕典陛下留之一日則長一日之禍異時雖借尚方劒以斷其首尚何救於國事之萬一哉又曰自昔大姦巨孽投間散地惟覘朝廷意向以圖進用之機元祐間章惇吕惠卿皆在貶所自吕大防用楊畏為御史初意不過信用私人牢護局面不知小人得志搖脣鼓吻一時正人旋被斥逐繼而章惇復柄用雖大防亦不能安其身於朝廷之上今右轄久虛姦臣垂涎有日矣聞之道路餽遺不止於鞭鞾脈絡潛通於禁近正陛下明察事機之時若公論不明正人引去則遲回展轉鈞衡重寄必歸於章惇等乃止今日之天下乃祖宗艱難積纍之天下豈堪此輩再壞耶理宗時董重珍為祕書郎兼莊文府教授入對上五事且曰隱蔽君德昔咎故相故臣得以專詆權臣昭明君德今在陛下故臣得以責難君父乞召真德秀魏了翁用之帝謂之曰人主之職無他惟辨君子小人重珍對曰小人亦指君子為小人此為難辨人主當精擇人望處之要津正論日聞則必知君子姓名小人情狀矣吳昌裔論君子小人上奏曰臣蜀人也無荷殳之力以備戎行無卻兵之智以衛鄉國獨以文墨議論委質中朝孤立危言靡所禆益兹蒙陛下過聽擢臣於禮樂之司付臣以軍旅之事君命為義何敢辭難今當逺離蒙恩賜對深惟根本大計不勝臣子至情輒竭愚忠仰禆睿覽臣聞君子小人之間天地隂陽之大分也稟剛善者公明正大而無纎芥之可疑得隂柔者私暗回邪而有變態之難測君子如鳯麟如松柏髙翔特立無所依憑小人如蛇蚓如藤蘿非附他物不能自起蓋嘗以此博觀當世之士而忠邪善惡有如氷炭不同故守道據正靖共爾位者君子也希進競利茍志於得者小人也竭莭盡言中立不倚者君子也隱情惜已隨時上下者小人也有直質無流心所言常依於義者君子也有口才無實行其辨足以飾非者小人也端良忠實自結主知而不肯曲奉權要者君子也詭詐狡獪不安常分而專欲捷出他徑者小人也砥善首公力行好事護持氣類者君子也隂毁陽譽設為危機陷害善良者小人也寬平無我咨諏善道常與公論為主者君子也險愎自用媢嫉人言率與公論立敵者小人也樂行憂違難進易退道合則從不合則奉身以去者君子也尸祿素餐頑鈍無恥利合則交利盡則反目相扼者小人也廉不近名義不黷貨一介有所不取者君子也行汙寄治身私託公患失無所不至者小人也勤強夙夜盡瘁百為常以天下之重自任者君子也畏避形迹互觀顔靣不以至公之道事君者小人也鞠躬盡力忠於職分雖歷夷險不二其行者君子也恫疑虛喝敢為大言脫有緩急不可保信者小人也大抵君子為陽小人為隂陽明勝則治象盛其道浸登於明昌隂濁勝則亂機萌其勢漸趨於暗塞自古小人衆而君子孤亂世多而治世少無他亦視君德之強弱而已蓋人君始初清明中有所主不為物欲流轉則如正陽方升而羣隂退聽及其壯志消平主不勝客或為好惡移奪則如隂氣盛長而陽德日消消長分數之不同此正邪聚散之證候也故滯於所偏信則邇言入惑於不當疑則逺臣懼自聖而謂莫已若則拂士日逺有言而曰莫豫違則佞人日庸以讒慝為愛憎則是非雜揉以意見為厚薄則邪正倒植寄耳目於小臣則詭遇之徒獲進翦羽翼於忠諫則知幾之士不來其始機括之轉浸淫不知而其弊至於國空主勢孤立可不畏哉仰惟陛下天地其量日月其心虛已受人開道求諫凡人之彥聖言之切直實能容之其心非不休休然也而比年以來初意漸變好賢善念既衰於更化之初而從諫盛心寖移於親事之後始未嘗不信君子而卒無近效則不免猜疑初未嘗不容正人而數有危言則遂生厭薄於是有經術明大誼者指之為迂好議論有風節者目之為險犯顔敢諫者謂為好閙指佞觸邪者謂為近名昔之所進今不知其所亡前之乍賢後忽以為乍佞善人國之嘉禾而今以為無用之病樗忠言國之良劑而今以為難近之烏喙至於有言責者往往華以美遷而出之是豈陛下之本心哉蓋由讒人害正之謀利口傾善之計所以留根而為毒者至今尚深也大學之論心曰有所忿懥則不得其正有所好樂則不得其正洪範之建極曰無有作好遵王之道無有作惡遵王之路此言私喜怒之不可有而偏好惡之所當無也豈非萬世人君治心建極之準的哉臣願陛下虛心平聽燭理並觀察大學之所有謹洪範之所無茍有才誠合一者進之雖不快于心勿棄也有心迹自異者黜之雖順適已志勿取也有砥節礪行為世所豫者豫之雖意之所憎勿廢也有懷私誤國為衆所棄者棄之雖心之所愛勿徇也不以左右親眤而私聼斷不以外庭踈逺而生猜疑使自心腹以至耳目喉舌之地皆不容有毫髮邪氣留於其間則以之永天命而固以之收人心而凝若此則盜賊聞風亦有所憚矣臣奉命從軍不當復與國事然每見諸葛亮出師一疏拳拳以君子小人為言且三致意於宫中府中之事公誠懇惻最有王佐氣象蓋軍旅之事尚才能朝廷之士先名節外之得以奔奏禦侮而就功名者未有不由內之孝友忠純者有以養君心而斷國論也一有忌功嫉能之人雜之則其躬不閲而惎間至矣尚何暇議勝敗哉詩云憂心悄悄愠于羣小臣之愚慮惟陛下察之許應龍破朋黨進故事曰孝宗皇帝嘗曰朋黨不難去惟賢是進惟不肖是退弗問其他則黨論自消漢唐末世朋黨皆數十年不能解以至祻亂其患在人君聽納之不明耳若能公是公非惟理適從何朋黨之有當時大臣因奏曰用人惟論賢否則無朋黨如唐之牛李論者謂德裕之黨多君子宗閔之黨多小人然德裕之黨豈無白敏中之傾險宗閔之黨豈無周墀之正直但于兩黨中用賢者黜不肖者則其黨自破矣臣聞朋黨之患其來久矣不患是非之難知而患考察之不審自古欲空人之國而盡去君子者必進朋黨之論欲孤人主之勢而蔽其聰明者亦進朋黨之説此言一入則無分可否不辨真偽一槩而去之遂至朋家作仇兆釁無已茍能公心無我靜觀潛察不問其黨與之有無而惟論其人之賢否使其奉公守正協恭和衷雖更相稱譽豈為比周則信之任之何嫌其為黨使其同惡相濟假公濟私文飾姦言抵排善類則當斥之絶之以破其植黨如此則淑慝洞分疑似莫惑當使衆賢和於朝而小人無所容其迹矣尚何朋黨之足慮哉奈何世之人主意見或偏進一人焉則意其類之皆賢也並蓄兼收而不察其真與偽退一人焉則疑其徒之皆黨也斥逐無遺而不辨其是與非況進退之間或出一時之好惡未必合於天下之至公烏可併其類而為之升黜縱使為君子之黨其間豈無雜偽假真而巧於附麗者乎安可例以為賢而是信是使縱使為小人之所引其間豈無和而不同而介然有守者乎安可疑以為不賢而盡屏盡棄然則孝宗聖訓所謂若能公是公非惟理適從何朋黨之有真萬世之龜鑑也抑又聞髙宗皇帝嘗謂朝廷用人止論其才不才言者好以朋黨罪士大夫乃朝廷使之為黨非所以奬賢才而厚風俗也然則為人上者惟當任賢勿二去邪勿疑以至公為心而盡破朋黨之論則君子道長小人道消可以常為泰而不為否矣考功郎官趙景緯論監司守令其説曰知人之難自古已然人才乏使莫今為甚或觀望而撓於勢或阿私而徇於情或是非不公而以枉為直或毁譽失實而以汙為廉遂使舉刺不當不足以服天下之心與其糾劾於有罪之後而未必盡得其情孰若精擇於未用之先而使之各稱其職起居舍人牟子才上劄子曰臣竊惟陛下月正元日誕布宸奎以用人為第一義且曰古今治亂之原由正邪用舍之故臣拜手稽首作而歎曰大哉王言陛下之及此世道之福也夫自昔人主莫不好治而惡亂進君子而退小人然治日常少而亂日常多君子常退而小人常進者何哉由辨之不早辨也夫人主無他職在於辨君子小人而已今陛下濬發睿衷形之明詔必灼然有以見治亂之所關邪正之所在而知所以辨之矣此臣所以深為世道幸也詩曰豐水有芑武王豈不仕以言人才之盛於涵養也蒹葭蒼蒼白露為霜以言人才之成於患難也陛下圖任以來善類招旌四出凡光明碩大剛中端厚之士莫不並列於朝既足以為豐芑數世之儲矣而其流落不偶如積被摧抑者如新蒙湔沷者如持麾莭于逺外者甘於家食淹於倅二困於幕府之下僚者大抵皆蒼葭白露之餘老於憂患而堅實可用茍不及時收召臣恐其歲月侵尋而骨鯁消靡良可惜也此在陛下加之意而已然臣嘗深思靜慮以為陛下端平以來未嘗不用君子也其後疑君子為無功而喜小人之有材循至近嵗誤任大姦遂使空國無君子而用一副黨人凶慝參會怨憤流行卒召祻患使非鹿磯一捷則宗廟社稷可為寒心陛下亦豈知其祻之至於此哉覆車未逺所謂小人者定皆絶意勿用如人之飢終不食烏喙渴終不飲鴆漿可也今大姦既殞而餘毒遺烈入人者深惟陛下盡聚諸賢養元氣以敵外邪然如胡安國有云仁宗皇帝所養之君子既久且逺日以消亡而王安石所教之小人方蕃息未艾臣恐分數多少之間正所當慮也且小人無材何以動人主彼其治辦也似能其權譎也似智其奉上也似忠而不知鷙忍祻賊實國家之斧斤生民之乳虎蒼鷹而善類之鬼蜮蝮蝎也凶于而國害于而家其可再誤耶夫所謂一介臣斷斷猗無他技其心休休其如有容以保子孫黎民者固在此而不在彼也儻忽於幾微辨之不早臣恐汲黯不足以勝公孫𢎞張湯裴度不足以勝異鏄陸贄不足以勝延齡邪正反復而世道隨之矣易之坤曰履霜堅氷至泰曰無平不陂無往不復姤曰繫于金柅柔道牽也可不謹哉臣嘗觀元祐之時司馬光文彥博吕公著在朝位吕大防韓維劉摯范純仁在政府蘇轍孫覺梁燾鮮于侁朱光庭傅堯俞吕陶在臺諫蘇軾在翰苑范百祿曽肇劉蘇轍在詞掖范祖禹在給舍傅堯俞韓維范祖禹趙彥若程頥在經筵可謂盛矣一隙不謹而楊畏李清臣鄧伯溫之徒已議其後天下事蓋有不可勝言者不然雖百年元祐可也臣不勝惓惓子才輪對論君子小人聚散劄子曰臣待罪著庭凡七閲月一無補報比因水災冒羾愚慮荷陛下寬貸不賜誅夷在愚臣已深感幸兹當輪對洊瀆宸嚴臣聞國於天地所恃以立者人才耳然人才之在天下有賢有否有聚有散賢而聚邪則精神之運動心術之流行皆足以福天下不幸而散則世道之所關非國家之福也不賢而聚耶則妖孽之薰蒸刻薄之流注皆足以祻天下幸而散則人情之所喜亦國家之福也然則君子之聚乃所以為小人之散而君子之散又復為小人之聚一聚一散相為循環此正天運闔闢之樞世數屈伸之候國祚修短之端生民休戚之限世道隆汚之幾一息少有間焉則小往而大來陽消而隂長有天下者不可不鑒也我國家五星聚奎實主文治列聖相承惟以收攬人才為第一事雖棫朴之能官人卷阿之用吉士不是過也咸平景德之間渾然不見其際所謂人才之太極政事之太和也天聖以來王曽吕夷簡相君子嘗一聚矣未幾而散於景祐百官之一圖又散於慶歷聖德之一詩又散於王拱辰打就之一網是天聖以來之人才散於忠邪之相激然其害止於散而已神宗初年富弼復相至和嘉祐之君子未至於散也熙寧之邪説一進而先朝之大臣最先散未幾而議新法不合者盡散未幾而條例司之賢者亦散是熙豐之人才散於法令之變更也然其害止於散而已元祐初司馬光相吕公著文彥博相繼輔政君子又聚矣品流太分事故反覆濫觴於吏額之小爭浸淫于調停之初議滔天於策題之分辨而君子之黨盡散極而至於朝堂之榜黨碑之鐫躪藉忠賢曽草菅之不若是元祐之人才散於别白之太過其為祻蓋不止於散也建中靖國初起范純仁相韓忠彥君子又聚矣天下方以快活差除為喜而曽布溫益志在朋姦置政事局而輕元祐重元符進愛助圖而左軾轍右京卞意向一偏而君子遂盡去而元符上書人一皆以邪目之是建靖之人才散於中非中而靖非靖其為祻蓋不止於散也中興以來張浚趙鼎為相君子又聚矣未幾秦檜當國力主和議一時讜論如胡銓等三十二人不肯附麗如李綱等八十餘人率皆擯棄或死於囹圄或死於貶所或流落於魑魅之區纍赦不移或棲遲於林泉之下屏逐不出是紹興之人才散於多主戰而少主和其為祻又不止於散也慶元初趙汝愚相凡一時知名之士朝除暮拜略已無遺姦憸小人相與側目而戚怨恨之餘亟引非類布居臺評於是汝愚引用之人以次而去大者貶竄小者斥退而舉幡六士屏竄朋黨之禁愈嚴士大夫之祻愈酷是慶元之人才散於嫉専門而禁道學其為祻又不止於散也臣嘗通考國朝之人才大抵屢散有散之大者散之小者有散之緩者散之速者有散之遽者散之極者始而君子攻小人其變也君子攻君子甚至於君子而力引於小人始而小人攻君子其變也小人攻小人甚至於小人而陽附於君子推移不一僨起相尋然要其極亦不過散而聚聚而散耳閲汗青而慨歎撫往事以興嗟今日正當君子大聚散之秋其可不先幾微而逆致其防哉陛下即位幾三十年君子之類凡三聚而三散矣端平親政一聚散也甲辰改紀二聚散也丁未更化三聚散也今日二相並建公道復明加壁招旌翕若少聚矣然方剛忠鯁者淹之外服魁壘卓傑者屈之家食抱負耿介者多鬱沈操守端靖者罕拔擢或者猶以為未聚也來者不合而旋去居者靡固而易搖落如晨星索如霜葉則又幾於散矣夫聚之常覺其難散之常覺其易何也君子不為富貴所掀則去就輕去就輕則知醴酒不設楚人市箝之幾必先幾而去矣然不知其初費幾召莭也君子不為利欲所迷則出處定出處定則知刳胎毁卵鳳凰不來之意必以兆而行矣然不知其初費幾綸詔也此聚之所以難而散之所以易也君子敢言以抗小人之鋒雖有大艱難不復計其身之濟否也雖有大機穽不復計其身之利害也君子敢為以摧小人之鋭雖有大祻患不暇顧其身之死生也雖有大讒毁不暇顧其身之合否也此聚之所以難而散之所以易也然其聚也常以君相好賢之篤其散也常以黨人媢疾之深其聚也常以至誠樂與之實其散也常以疑惎不容之過其聚也常以氣類汲引之公其散也常以意向異同之别其聚也以尊敬之積其散也以厭薄之形其聚也以培植之加其散也以摧抑之遽其聚也以去邪逺佞其散也以崇讐醜正其聚也以戶庭坦夷其散也以城府深阻其聚也以朝廷清明其散也以流品淆雜其聚也以公其散也以私其聚也以義其散也以利聚散之權常寄於若有若無之中而聚散之機常決於且信且疑之際故羣凶窺觀時或小瞢弩羽疊至散之幾也徒中倒戈自相擊觸一彼一此散之幾也論事如爭意向小異釁隙漸生散之幾也表正曝邪鼓虛成實撼搖其居設局張穽柔聲宛舌射影中傷散之幾也寓意歌詩更相賢聖自取議譏散之幾也招納黨人平治舊怨兼用正邪散之幾也顯爭力抵激動忿心陡分利害散之幾也操舟共濟實左虛右輕重不倫散之幾也顧懷私恩妄談彼善潛疑人心散之幾也此十幾者其造端甚微其為祻實大月暈而風礎汗而雨事有其兆識者隱憂且小人失職在外搖毒含蠆其姦足以熒惑主聽其辨足以煽搖人心其機權智術足以怵中立之人其錢財氣力足以張異議之勢彼見朝廷舉動少有暌違即萌睥睨之心搢紳議論稍有係吝即開姍笑之口天時不順則幸災而樂祻國本未定即乘間而抵巇茍得一隙即伺隙以肆其姦茍得一機即緣機以逞其志今日謂某賢必當逐去明日謂某姦且將召用訛撼靡已朋類實繁又有君子之似者心懷卵翼之恩進則不能旅於君子退則恥為伍於小人於是立為狡獪閃鑠之論以洗其附麗之迹言雖若公意則有為若是者如言八關五鬼之類耳其操心用意雖鬼神莫窺其際使此説得行則為毒也忿戾而不可解亦有小人之靡者心懷汲引之恩進則不類於君子退則無間於小人於是立為誕荒卑諂之論以晦其茍合之迹言雖可玩意則難量若是者亦猶三變兩來之類耳其處心積慮雖公輸莫諭其巧使其説得售則為害也隂沈而不可藥邪氣日盛元氣日微此聚之所以不可常而其勢必至於散彼豈不知聚而為解散而為屯聚而為泰散而為否然不能不散者上無以保之下無以安之則散亦勢之常也臣愚欲乞陛下聖心豁然察君子體國之忠誠亮君子救時之實意勿以好名疑之勿以訐直惡之勿以迂迹棄之保全愛護使是非由此而定邪正由此而别公論由此而明私情由此而熄朋黨由此而消國是由此而凝天命由此而迓續主勢由此而不孤相業由此而光大則用儒之效礴際於兩間流行於四海昭彰於萬世豈不為邦家之榮生靈之福哉不然君子一散其祻殆未知所終也臣私憂過計懼君子之不能久安也歷數我朝聚散之故實參以今日聚散之危機為陛下獻詩曰豫其懲而毖後患惟陛下深念之臣不勝拳拳元世祖在潛邸聞李冶賢遣使召之且曰素聞仁卿學優才贍潛德不耀久欲一見其勿他辭既至問河南居官者孰賢對曰險夷一莭惟完顔仲德又問完顔哈達及頗幹何如對曰二人將略短少任之不疑此金所以亡也又問魏徴曹彬何如對曰徴忠言讜論知無不言以唐諍臣觀之徴為第一彬伐江南未嘗妄殺一人擬之方叔召虎可也漢之韓彭衛霍在所不論又問今之臣有如魏徴者乎對曰今以側媚成風欲求魏徴之賢實難其人又問今之人材賢否對曰天下未嘗乏材求則得之舍則失之理勢然耳今儒生有如魏璠王鶚李獻卿蘭光庭趙復郝經王博文輩皆有用之材又皆賢王所嘗聘問者舉而用之何所不可但恐用之不盡耳然四海之廣豈止此數子哉王誠能旁求於外將見集於明廷矣世祖時布衣趙天麟上太平金鏡策論考幽明曰臣聞一人在上握四海之權衡四海承風仰一人之造化功名之要地榮利之宏機廉士貪夫文儒武帥或欲呈其才德而冀其道之得行或欲肆其姦回而冀其情之獲恣故正人指邪人為邪而邪人亦指正人為邪忠者以佞者為佞而佞者亦以忠者為佞交攻不一雖曰難分立法取中亦為極易也唐朝以體貌豐偉為貴所謂市瓜喜大而或失其香晉室以清談虛曠為先所謂畫餅充飢而委無真用此唐之不能及三代而晉之不能及漢唐也今國家入仕之門太多考選之方太闕臣以為王者之左右攜僕亦貴乎正不正則如蝎蠧之內生天下之大官小吏並須乎賢不賢則如蝗螟之外起臣謹依經考史斷以愚意條陳聖人之九徴及當今所切二十六美之三十九類與夫三要惟陛下察之所謂九徴者一曰逺使之而觀其忠二曰近使之而觀其敬三曰煩使之而觀其能四曰卒然問焉而觀其智五曰急與之期而觀其信六曰委之以財而觀其仁七曰告之以危而觀其莭八曰醉之以酒而觀其則九曰雜之以處而觀其色所謂二十六美之三十九類者一曰文史之美三類草制飾詔諄悉詞情也校書正字可為定體也教誨後學德多成也二曰禮官之美三類補衮拾遺將順其美也朝會祭祀儀章丕舉也宣慰風俗雍熙聿致也三曰樂官之美一類金石宫商理協聲正也四曰知人之美一類善惡周覽洞曉于心也五曰敬賢之美一類推轂進士常若不及也六曰考校之美一類彰善疸惡照文無失也七曰糾察之美一類彈劾所至不避權豪也八曰廉訪之美二類廉察官吏警懼肅清也訪問風俗化成禮義也九曰宿衛之美一類小心周密京輦增威也十曰籌計之美二類帷幄畫計遐衝倒戈也排壘整陳臨時合權也十一曰督領之美三類器械精完士卒間習也號令嚴明部伍齊肅也臨敵耀威身先什伍也十二曰鎮防之美一類守堅持重寇盜難窺也十三曰屯田之美一類勸勵稼穡勤事多獲也十四曰芻養之美一類孳畜頭匹茁壯蕃滋也十五曰使臣之美二類喉舌宣納成美昭光也委幹事務辨濟平允也十六曰決斷之美三類勾檢考覆瑕隙無隱也要察圓明囚無間言也疑獄得情處置合律也十七曰農桑之美一類董督樹藝水旱有備也十八曰董役之美一類監役合宜丁夫恱事也十九曰關津之美一類姦詐不漏行旅不壅也二十曰營造之美一類練事分功捷于供奉也二十一曰明利之美一類出納有常簿籍易照也二十二曰算數之美一類多寡有方了然胸臆也二十三曰僧官之美一類𢎞宣釋教守戒精嚴也二十四曰道官之美一類𢎞宣道教守德精嚴也二十五曰醫官之美二類科品明分舉無不應也開發後學成材者衆也二十六曰隂陽之美二類厯法推步授時無舛也卜筮循經不為詭異也所謂三要者一曰公二曰廉三曰勤徑情服事不邀功利謂之公賄賂在前不以為念謂之廉服勞王室悉心竭力謂之勤九徴之徴盡矣二十六美之類偹矣三要之要具矣選法考校之源委終矣伏望陛下以九徴考左右攜僕僕臣正而厥后益以正矣更望陛下以二十六美之三十九類與夫三要之説明諭選曹及內外百官若三年當考之時凡一美三要者為上等凡一美二要者為中等凡一美一要者有要無美者有美無要者皆為下等凡美要並無而雖無大罪者亦停免之凡罪犯顯明則有憲職在焉始以三德八才用之終以二十六美三要考之則自中及外大小官吏將若玉壺之氷秋霄之月􅏮乎其清皎乎其明矣至元間言者訟丞相史天澤親黨布列中外威權日盛漸不可制詔罷天澤政事使待鞫問中書右丞廉希憲進曰天澤事陛下久知天澤深者無如陛下始自潛藩多經任使將兵牧民悉有治效陛下知其可付大事用為輔相小人一旦有言陛下當熟察其心迹果有肆橫不臣者乎今日信臣故臣得預此旨他日有訟臣者臣亦遭疑矣臣等備貟政府陛下之疑信若此何敢自保天澤既罷亦當罷臣帝良久曰卿且退朕思之明日帝召希憲諭曰昨思之天澤無對訟者事遂解歷代名臣奏議卷一百五十八
