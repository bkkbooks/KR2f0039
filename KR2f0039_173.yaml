body:
  text: 厯代名臣奏議卷一百七十三明楊士竒等撰去邪魯文公十八年莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏為名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤敳檮㪦大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟共子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖僭庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時敘無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎定公九年陽虎歸寶玉大弓公伐陽虎陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天災若之何取之陽虎𣣔勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之適趙氏仲尼曰趙氏其世有亂乎秦昭襄王以范睢為客卿睢日益親用事因説秦王曰臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王夫擅國之謂王能利害之謂王制生殺之謂王今太后擅行不顧穰侯出使不報華陽涇陽擊斷無諱髙陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也穰侯使者操王之重決制於諸侯剖符於天下征敵伐國莫敢不聼戰勝攻取則利歸於相戰敗則怨結於百姓而禍歸於社稷臣又聞之木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主淖齒管齊而弒湣王李兊管趙而囚主父今臣觀四貴之用事此亦齒兊之類也且三代之所以亡國者君專授政於臣縱酒弋獵其所授者妒賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者臣見王獨立於朝竊恐萬世之後有秦國者非王子孫也王以為然於是廢太后逐穰侯魏冉華陽君芊戎髙陵君市涇陽君悝於關外以雎為丞相封應侯秦二世時丞相李斯上書言趙髙之短曰臣聞之臣疑其君無不危國妾疑其夫無不危家今有大臣於陛下擅利擅害與陛下無異此甚不便昔者司城子罕相宋身行刑罰以威行之期年遂劫其君田常為簡公臣爵列無敵於國私家之富與公家均布惠施德下得百姓上得羣臣隂取齊國殺宰豫於庭即弒簡公於朝遂有齊國此天下所明知也今髙有邪佚之志危反之行如子罕相宋也私家之富若田氏之於齊也兼行田常子罕之逆道而劫陛下之威信其志若韓玘為韓安相也陛下不圗臣恐其為變也漢武帝時田千秋上言曰方士言神仙者甚衆而無顯功請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士候神人者是後上每對羣臣自歎嚮時愚惑為方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而已元帝時京房以孝亷為郎是時中書令石顯顓權房嘗宴見以間宴時入見天子問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之耶將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺悟而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙髙政治日亂盜賊滿山何不以幽厲卜之而覺悟乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以視萬世之君視讀曰示今陛下即位以來日月失明星辰逆行山崩泉涌地震石隕夏霜冬雷春凋秋榮隕霜不殺水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記災異甚備陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈愈與愈同愈猶勝也於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知之何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已諭諸葛豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下不量臣能否拜為司𨽻校尉未有以自效復秩臣為光祿大夫官尊責重非臣所當處也又迫年嵗衰暮常恐卒填溝渠無以報厚德使論議士譏臣無補長獲素餐之名故常願捐一旦之命不待時而斷姦臣之首縣於都市編書其罪使四方明知為惡之罰然後却就斧鉞之誅誠臣所甘心也夫以布衣之士尚猶有刎頸之交今以四海之大曽無伏節死義之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感于天是以災變數見百姓困乏此臣下不忠之效也臣誠耻之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容使尚書令堯賜臣豐書曰夫司𨽻者刺舉不法善善惡惡所得顓之也勉處中和順經術意恩深德厚臣豐頓首幸甚臣竊不勝憤悶願賜清宴唯陛下裁幸成帝建始元年丞相御史奏石顯舊惡免官徙歸故郡五鹿充宗左遷玄莬太守司𨽻校尉王尊劾奏丞相衡御史大夫談知顯等顓權擅藝大作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國無大臣輔政之義皆不道在赦令前赦後衡談舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相侯印綬成帝時定陵侯淳于長有罪遣就國長以金錢與紅陽侯王立為長求留丞相翟方進劾立懷邪亂政請下獄上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庶幾立與政事欲獲其利今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博巨鹿太守孫閎故光祿大夫陳咸與立交通厚善相與為腹心有背公死黨之信欲相攀援死而後已皆內有不仁之性而外有雋材過絶於人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纎介愛利之風天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也此三人皆內懷姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜沒身而爭也昔季孫行父有言曰見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也翅翼雖傷不避也貴戚強黨之衆誠難犯犯之衆敵並怨善惡相冒臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可後漢光武為大司馬時舍中兒犯法軍市令祭遵格殺之大司馬怒命收遵主簿陳副諌曰明公常念衆軍整齊今遵奉法不避是教令所行也乃以遵為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也和帝時諸竇雖誅而夏陽侯瓌猶尚在朝御史中丞周紆疾之乃上疏曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀案夏陽侯瓌本出輕薄志在邪僻學無經術而妄構講舍外招儒徒實會姦桀輕忽天威侮慢王室又造作巡守封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡寖成江河爝火雖微卒能燎野履霜有漸可不懲革宜尋吕産專竊之亂永惟王莾篡逆之禍上安社稷之計下解萬夫之惑會瓌歸國紆遷司𨽻校尉順帝時邵陵令任嘉在職貪穢因遷武威太守後有司奏嘉臧罪千萬徴考廷尉其所牽染將相大臣百有餘人侍中揚倫乃上書曰臣聞春秋誅惡及本本誅則惡消振裘提領領正則毛理今任嘉所坐狼藉未受辜戮猥以垢身改典大郡自非案坐舉者無以禁絶姦萌往者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢既章咸伏其誅而豺狼之吏至今不絶者豈非本舉之主不加之罪乎昔齊威之霸殺姦臣五人并及舉者以弭謗讟當斷不斷黃石所戒夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也惟陛下留神省察奏御有司以倫言切直辭不遜順下之尚書奏倫深知密事激以求直坐不敬結鬼薪詔書以倫數進忠言特原之免歸田里時選遣八使循行風俗皆耆儒知名多厯顯位唯御史張綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏曰大將軍梁冀河南尹梁不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼贊日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御注御謂進也京師震竦時冀妹為皇后內寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用桓帝時宦官方熾任人及子弟為官布滿天下競為貪淫朝野嗟怨太尉楊秉與司空周景上言曰內外吏職多非其人自頃所徴皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得位秉藝而今枝葉賓客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗請下司𨽻校尉中二千石城門五營校尉北軍中候各實核所部應當斥罷自以狀言三府亷察有遺漏續上帝從之於是秉條奏牧守以下胸奴中郎將燕瑗青州刺史羊亮遼東太守孫宣等五十餘人或死或免天下莫不肅然司空黃瓊上疏曰臣聞天者務剛其氣君者務強其政是以王者處髙自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖人升髙據上則以德義為首涉危蹈傾則以賢者為力唐堯以德化為冠冕以稷契為筋力髙而益崇動而愈據此先聖所以長守萬國保其社稷者也昔髙皇帝應天順民奮劒而王掃除秦項革命創制降德流祚至於哀平而帝道不綱秕政日亂遂使姦佞擅朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶滅絶漢祚天維陵弛民鬼慘愴賴皇乾眷命炎德復輝光武以聖武天挺繼統興業創基氷泮之上立足枳棘之林擢賢於衆愚之中畫功於無形之世崇禮義於交爭循道化於亂離是自厯髙而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封纍職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寶殷滿其室富擬王府藝回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言德以輔政念國亡身隕歿為報而坐陳國議遂見殘滅賢愚切痛海內傷懼又前白馬令李雲指言宦官罪穢且誅皆因衆人之心以救積薪之敝𢎞農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳯凰不翔刳牲夭胎則麒麟不臻誠物類相感理使其然尚書周永昔為沛令素事梁冀幸其威勢坐事當罪越拜令職見冀將衰乃陽毁示忠遂因姦計亦取封侯又黃門協邪羣輩相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清澄審别真偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂抵金玉於沙礫碎圭璧於泥塗四方聞之莫不憤歎昔曽子大孝慈母投杼伯竒至賢終於流放夫讒諛所舉無髙而不可升所抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉時詔三府掾屬舉謡言太尉掾范滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汚簡札哉間以會日迫促故先舉所急其未審者方更參實臣聞農夫去草嘉榖必茂忠臣除姦王道以清若臣言有二甘受顯戮吏不能詰靈帝中平元年朱俊護軍司馬傅燮上疏曰臣聞天下之禍不由於外皆興於內是故虞舜先除四凶然後用十六相明惡人不去則善人無由進也今張角起趙魏黃巾亂六州此皆釁發蕭墻而禍延四海者也臣奉辭伐罪戰無不克黃巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣誠使張角梟夷黃巾變服臣之所憂甫益深耳何者夫邪正不宜共國亦猶氷炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虛偽若不詳察忠臣將復有杜郵之戮矣陛下宜思四罪之舉速行讒佞之誅則善人思進姦凶自息常侍趙忠惡之獻帝時太尉公孫瓉奏論袁紹罪狀曰臣聞皇羲以來始有君臣上下之事張化以導民刑罰以禁暴今行車騎將軍袁紹託其先軌寇竊人爵既性暴亂厥行淫穢昔為司𨽻校尉會值國家喪禍之際太后承攝何氏輔政紹專為邪媚不能舉直至令丁原焚燒孟津招來董卓造為亂根紹罪一也卓既入洛而主見質紹不能權譎以濟君父而棄置節傳迸竄逃亡忝辱爵命背上不忠紹罪二也紹為渤海太守默選戎馬當攻董卓不告父兄至使太傅門户太僕母子一旦而斃不仁不孝紹罪三也紹既興兵涉厯二年不恤國難廣自封殖乃多以資糧專為不急割剝富室收考責錢百姓吁嗟莫不痛怨紹罪四也韓馥之追竊其虛位矯命詔恩刻金印玉璽每下文書皂囊施檢文曰詔書一封邟邟口浪反鄉侯印昔新室之亂漸以即真今紹所施擬而方之紹罪五也紹令崔巨業候視星日財貨賂遺與共飲食克期會合攻鈔郡縣此豈大臣所當宜為紹罪六也紹與故虎牙都尉劉勳首共造兵勳仍有效又降服張楊而以小忿枉害於勳信用讒慝殺害有功紹罪七也紹又上故上谷太守髙焉故甘陵相姚貢橫責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為婢使紹實微賤不可以為人後以義不宜乃據豐隆之重任忝汚王爵損辱袁宗紹罪九也又長沙太守孫堅前領豫州刺史驅走董卓掃除陵廟其功莫大紹令周昻盜居其位斷絶堅糧令不得入使卓不被誅紹罪十也臣又每得後將軍袁術書云紹非術類也紹之罪戾雖南山之竹不能載昔姬周政弱王道陵遲天子遷都諸侯背叛於是齊桓立柯亭之盟晉文為踐土之會伐荆楚以致菁茅誅曹衛以彰無禮臣雖闒茸名非先賢蒙被朝恩當此重任職在鈇鉞奉辭伐罪輒與諸將州郡兵討紹等若事克捷罪人斯得庶續桓文忠誠之效攻戰形狀前後續上遂舉兵與紹對戰紹不勝魏明帝即位時中書監令號為專任關內侯蔣濟上疏曰大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事內外扇動陛下卓然日覽萬機莫不祗肅夫大臣非不忠也然威權在下則衆心慢上勢之常也陛下既已察之於大臣願無忘於左右左右忠正逺慮未必賢於大臣至於便辟取舍或能工之今外所言輒云中書雖使恭慎不敢外交但有此名猶惑世俗況實握事要日前倘因疲倦之間有所割制衆臣見其能推移於事即亦因時而向之一有此端因當內設自完以此衆語私招所交為之內援若此臧否毁譽必有所興功負賞罰必有所易直道而上者或壅曲附左右者反達因微而入緣形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潛神默思公聽並觀若事有未盡於理而物有未周於用將改由易調逺與黃唐角功近昭武文之迹豈追思而已哉然人君猶不可悉天下事以適已明當有所付三官任一臣非周公旦之忠又非管夷吾之公則有弄機敗官之弊當今柱石之士雖少至於行稱一州智效一官忠信竭命各奉其職可並驅策不使聖明之朝有專吏之名也齊王嘉平間司馬宣王懿上疏劾曹爽曰臣從遼東還先帝詔陛下秦王及臣升御床把臣臂深以後事為念臣言二祖亦屬臣以後事為念此陛下所見無所憂苦萬一有不如意臣當以死奉明詔黃門令董箕等才人侍疾者皆所聞知今大將軍爽背棄顧命敗亂國典內則僭擬外專威權破壞諸營盡據禁兵羣官要職皆置所親殿中宿衛厯世舊人皆復斥出欲置所親以樹私計根據槃互縱恣日甚外既如此又以黃門張當為都監專共交關看察至尊伺候神器離間二宫傷害骨肉天下洶洶人懷危懼陛下但為寄坐豈得久安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘往言昔趙髙極意秦氏以滅吕霍早斷漢祚永世此乃陛下之大鑒臣受命之時也太尉臣濟尚書令臣孚等皆以爽為有無君之心兄弟不宜典兵宿衛奏永寧宫皇太后令敕臣如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵以侯就第不得逗遛以稽車駕敢有稽留便以軍法從事臣輒力疾將兵屯洛水浮橋伺察非常爽得宣王奏事不通迫窘不知所為晉元帝時祖約與陳留阮孚齊名後轉從事中郎典選舉約妻無男而性妒約亦不敢違忤嘗夜寢於外忽為人所傷疑其妻所為約求去職帝不聽約便從右司馬營東門私出司直劉隗劾之曰約幸荷殊寵顯宦選曹銓衡人物衆所具瞻當敬以直內義以方外杜漸防萌式遏寇害而乃變起蕭墻患生婢妾身被刑傷虧其膚髮羣小噂􅊱嚻聲逺被塵穢清化垢纍明時天恩含垢猶復慰喻而約違命輕出既無明智以保其身又孤恩廢命宜加貶黜以塞衆謗帝不之罪簡文帝時博平吳興聞人奭上疏曰驃騎咨議參軍茹千秋協附宰相起自微賤竊弄威權衒賣天官其子夀齡為樂安令贓私狼藉畏法奔逃竟無罪罰傲然還縣又尼姏屬類傾動亂時榖賤人飢流殣不絶由百姓單貧役調深刻又振武將軍庾恆鳴角京邑主簿戴良夫苦諫被囚殆至歿命而恆以醉酒見怒良夫以執忠廢棄又權寵之臣各開小府施置吏佐無益於官有損於國疏奏帝益不平孝武帝時范寧出補豫章太守寧在郡大設庠序遣人往交州採磬石以供學用改革舊制不拘常憲逺近至者千餘人資給衆費一出私祿並取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣江州刺史王凝之上言曰豫章郡居此州之半太守臣寧入參機省出守名郡而肆其奢濁所為狼籍郡城先有六門寧悉改作重樓復更開二門合前為八私立下舍七所臣伏尋宗廟之設各有品秩而寧自置家廟又下十五縣皆使左宗廟右社稷準之太廟皆資人力又奪人居宅工夫萬計寧若以古制宜崇自當列上而敢專輒惟在任心州既聞知即符從事制不復聽而寧嚴威屬縣惟令速立願出臣表下太常議之典禮於是寧以此抵罪宋髙祖初尚書僕射王𢎞奏彈謝靈運曰臣聞間厥有家垂訓大易作威專戮致誡周書斯典或違刑兹無赦世子左衛率康樂縣公謝靈運力人桂興淫其嬖妾殺興江涘棄尸洪流事發京畿播聞遐邇宜加重劾肅正朝風案世子左衛率康樂縣公謝靈運過蒙恩奬頻叨榮授聞禮知禁為日已久而不能防間閫闈致兹紛穢罔顧憲軌忿殺自由此而勿治典刑將替請以見事免靈運所居官上臺削爵土收付大理治罪御史中丞都亭侯王淮之顯居要任邦之司直風聲噂􅊱曽不彈舉若知而弗糾則情法斯撓如其不知則尸昧已甚豈可復預班清階式是國憲請免所居官以侯還散輩中內臺舊體不得用風聲舉彈此事彰赫暴之朝野執憲蔑聞羣司循舊國典既頽所虧者重臣𢎞忝承人乏位副朝端若復謹守常科則終莫之糾正所以不敢拱默自同秉彛違舊之愆伏須準裁髙祖令曰靈運免官而已餘如奏端右簡正風軌誠副所期豈拘常儀自今以為永制文帝時尚書吏部郎庾炳之為有司所奏上於炳之素厚將恕之召問尚書右僕射何尚之尚之具陳炳之得失密奏曰為國為家何嘗不謹用前典今茍欲通一人慮非哲王御世之長術炳之所行非曖昧而已臣所聞既非一旦又往往眼見事如邱山彰彰若此遂縱而不糾不知復何以為治晉武不曰明主斷鬲令事遂能奮發華廙見待不輕廢錮纍年後起止作城門校尉耳若言炳之有誠於國未知的是何事政當云與殷景仁不失其舊與劉湛亦復不踈且景仁當時事意豈復可蔑朝士兩邉相推亦復何限縱有微誠復何足掩其惡今賈充勳烈晉之重臣雖事業不勝不聞有大罪諸臣進説便逺出之陛下聖睿反更遲遲於此炳之身上之舋既自籍籍交結朋黨構扇是非實足亂俗傷風諸惡紛紜過於范曅所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦相侵傷顧問之日宜布嫌責之旨若不如此亦當不辨有所得失臣蠢既有所啓要欲盡其心如無可納伏願宥其觸忤之罪時炳之自理不諳臺制令史並言停外非嫌太祖以炳之信受失所小事不足傷大臣尚之又陳曰炳之呼二令史出宿令史咨都令史駱宰宰云不通吏部曹亦咸知不可令史具向炳之説不得停之意炳之了不聽納之非為不解直是茍相留耳由外悉知此而誣於信受羣情豈了陛下不假為之辭雖是令史出乃逺虧朝典又不得謂之小事謝晦望實非今者之儔一事錯誤免侍中官王珣時賢小失桓胤春搜之謬皆白衣領職況公犯憲制者邪不審可有同王桓白衣例不於任使無損兼可得以為肅戒孔萬祀居右丞之局不念相當語駱宰云炳之貴要異它尚書身政可得無言耳又云不癡不聾不成姑公敢作此言亦為異也太祖猶優遊之使尚之更陳其意尚之乃備言炳之愆過曰尚書舊有增置幹二十人以元凱丞郎幹之假疾病炳之常取十人私使詢處幹闕不得時補近得王師猶不遣還臣令人語之先取人使意常未安今既有手力不宜復留得臣此信方復遣耳大都為人好率懷行事有諸紜紜不悉可曉臣思張遼之言關公雖兄弟曹公父子豈得不言觀今人憂國實寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有爭競之迹追以悵悵臣與炳之周旋俱被恩接不宜復生厚薄太尉昨與臣言説炳之有諸不可非唯一條逺近相崇畏震動四海凡短人辦得致此更復可嘉虞秀之門生事之纍味珍肴未嘗有乏其外别貢豈可具詳炳之門中不問大小誅求張幼緒幼緒轉無以堪命炳之先與劉德願殊惡德願自持琵琶甚精麗遺之便復欵然市令盛馥進數百口材助營宅恐人知作虛買劵劉道錫驟有所輸傾南俸之半劉雍自謂得其力助事之如父夏中送甘蔗若新發於州國吏運載樵荻無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之選用不平不可一二太尉又云炳之都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黃門太不政若和故得停太尉近與炳之疏欲用德願兒作州西曹炳之乃啓用為主簿即語德願德願謝太尉前後漏泄賣恩亦復何極縱不加罪故宜出之士庶忿疾之非直項羽楚歌而已也自從裴劉刑罰以來諸將陳力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可間卧紫闥無復一事也太祖欲出炳之為丹陽又以問尚之尚之答曰臣既乏賈生應對之才又謝汲公犯顔之直至於侍坐仰酬每不能盡昨出伏復深思秪有愚滯今之事迹異口同音便是彰著政未測得物之數耳可為蹈罪負恩無所復少且居官失和未有此比陛下遲遲舊恩未忍窮法為惠之大莫復過此方復有尹京赫赫之授恐悉心奉國之人於此而息貪很恣意者歲月滋甚非但虧點王化乃治亂所由如臣所聞天下論議炳之常塵纍日月未見一豪增輝今曲阿在水南恩寵無異而協首郡之榮乃更成其形勢便是老王雅也古人云無賞罰雖堯舜不能為治也陛下豈可坐損皇家之重迷一凡人事若復在可否之間亦不敢苟陳穴管今之枉直明白灼然而睿王令王反更不悟令賈誼劉向重生豈不慷慨流涕於聖世邪臣昔啓范曅當時亦懼犯觸之尤苟是愚懷所挹政自不能舒達所謂雖九死而不悔者也謂炳之且出外若能修改在職著稱還亦不難而可得少明國典粗酬四海之誚今愆舋如山榮任不損炳之若復有彰大之罪誰復敢以聞述且自非殊勳異績亦何足塞今日之尤厯觀古今未有衆過藉藉受貨數百萬更得髙官厚祿如今者也臣每念聖化中有此事未嘗不痛心疾首設令臣等數人縱橫狼藉復如此不審當復云何處之近啓賈充逺鎮今亦何足分外出恐是策之良者臣知陛下不能採臣言故臣不能盡已之愚至耳今蒙恩榮者不少臣何為獨懇懇於斯實是尊主樂治之意伏願試更垂察孝武帝大明中王僧達被誅謂為刺史顔竣所讒構臨死陳竣前後忿懟每懷言不見從僧達所言頗有相符據御史中丞庾徽之奏竣罪狀曰臣聞人臣之奉主毁家光國竭情無私若乃無禮陵人怙富卑上是以王叔作戒子晳為戮未有背本塞源好利忘義而得自容盛世溷亂清流者也右將軍東揚州刺史建城縣開國侯顔竣因附風雲謬蒙翼長天地更造拔以非次聖朝親攬萬務一歸而窺覘國柄潛圖秉執受任選曹驅扇滋甚出尹京輦形勢彌放傳詔犯憲舊須啓聞而竣以通忤已輒加鞭辱罔顧威靈莫此為甚嚴詔屢發當官責效竣權恣不行怨懟彌起懷挾姦數苞藏隂慝預聞中旨罔不宣露罰則委上恩必歸已荷遇之門即加謗辱受譴之室曲相哀撫翻戾朝紀狡惑視聽脅懼上宰激動閭閻未上慮聞內懷猜懼偽請東牧以卜天旨既獲出蕃怨詈方肆反脣腹誹方之已輕且時有啓奏必協姦私宣示親朋動作羣小前冬母亡詔賜還葬事畢不去盤桓經時方構間勳貴造立同異又表示危懼深營身觀曲訪大臣慮不全立遂以已被斥外國道將顛釁積懷抱惡窮辭色兼行闕於家早負世議逮身居崇寵奉兼萬金榮以夸親祿不充養宿憾母弟恃貴輒戮天倫怨毒親交震駭凡所蒞任皆闕政刑輒開丹陽庫物貨借吏下多假資禮解為門生充朝滿野殆將千計驕放自下妨公害私取監解見錢以供帳下賔旅酣歌不異平日街談道説非復風聲竣代都文吏特荷天私棄瑕録用豫參要重勞無汗馬賞班河山出內寵靈踰越倫伍山川之性日月彌滋溪壑之心在盈彌奓虎寇狼貪未足為譬今皇明開耀品物咸亨傷俗點化實唯害焉宜加顯戮以彰盛化請以見事免竣所居官下太常削爵土須事御收付廷尉法獄罪上未欲便加大戮且止免官南齊髙帝建元四年太祖崩掌吏部江謐稱疾不入衆頗疑其怨不豫顧命也及世祖即位謐又不遷官以此怨望時世祖不豫謐詣豫章王嶷請間曰至尊非起疾東宫又非才公今欲作何計世祖知之出謐為征虜將軍鎮北長史南東海太守未發上使御史中丞沈沖奏謐前後罪狀曰謐少懷輕躁長習諂薄交無義合行必利動特以奕世更局見擢宋朝而阿諛內外貨賂公行咎盈憲簡戾彰朝聽輿金輦寶取容近習以沈攸之地勝兵強終當得志委心託身嵗暮相結以劉景素親屬望重物應樂推獻誠薦子窺窬非望時艱網漏得全首領太祖匡飭天地方知逺圖薄其艱洗之瑕許其革音之效加以非分之寵推以不次之榮列迹勳良比肩朝德以往者微勤刀筆小用賞廁河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重蒞湘部顯行斷盜及居銓衡肆意受納連席同乘皆詖黷舊侣密筵間宴必貨賄常客理合升進者以為己惠事宜貶退者並稱中旨謂販鬻威權姦自不露欺主罔上姦議可掩先帝寢疾彌留人神憂震謐病私舍曽無變容國諱經旬甫暫入殿參訪遺詔覘忖時旨以身列朝流宜蒙兼帶先顧不逮舊位無加遂崇飾惡言肆醜縱悖譏誹朝政訕毁皇猷遍嗤忠賢厯詆台相至於蕃嶽入授列代恆規勳戚出撫前王彛則而謐妄發樞機坐構嚻論復敢貶謗儲后不顧辭端毁折宗王每窮舌杪皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之迹既彰反噬之情已著請免官削爵土收送廷尉獄治罪詔賜死武帝疾篤暫絶竟陵王子良在殿內太孫未入丹陽令中書郎王融戎服絳衫於中書省閣口斷東宫仗不得進欲立子良上既蘇太孫入殿朝事委髙宗融知子良不得立乃釋服還省歎曰公誤我鬱林深忿疾融即位十餘日收下廷尉獄然後使中丞孔稚圭等為奏曰融姿性剛險立身浮競動即驚羣抗言異類近塞外微塵若求將領遂招納不逞扇誘荒傖狡弄聲勢專行權利反覆脣齒之間傾動頰舌之內威福自已無所忌憚誹謗朝政厯毁王公謂已才流無所推下事曝逺近使融依源據答詔賜死梁武帝天監四年宴於華光殿謂羣臣曰朕日昃聽政思聞得失卿幸可謂多士宜各盡獻替尚書左丞范縝起曰司徒謝朏本有虛名陛下擢之如此前尚書令王亮頗有治實陛下棄之如彼是愚臣所不知髙祖變色曰卿可更餘言縝固執不已髙祖不恱御史中丞任昉因奏曰臣聞息夫厯詆漢有正刑白褒一奏晉以明罰況乎附下訕上毁譽自口者哉風聞尚書左丞臣范縝自晉安還語人云我不詣餘人惟詣王亮不餉餘人惟餉王亮輒收縝白從左右萬休到臺辨問與風聞符同又今月十日御餞梁州刺史臣珍國宴私既洽羣臣並已謁退時詔留侍中臣昻等十人訪以政道縝不答所問而橫議沸騰遂貶裁司徒臣朏褒舉庶人王亮臣于時預奉恩留肩隨並立耳目所接差非風聞竊尋王有逰豫親御軒陛義深推轂情均湛露酒闌宴罷當扆正立記事在前記言在後軫早朝之念深求瘼之情而縝言不遜妄陳褒貶傷濟濟之風缺側席之望不有嚴裁憲準將頽縝即主臣謹案尚書左丞臣范縝衣冠緒餘言行舛駮誇諧里落喧詬周行曲學謏聞未知去代弄口鳴舌祗足飾非乃者義師近次縝丁罹艱棘曽不呼門墨縗景附頗同先覺實奉龍顔而今黨協亹餘翻為矛楯人而無恆成兹姦詖日者飲至策勳功微賞厚出守名邦入司管轄苞篚罔遺而假稱折轅衣裙所襒讒激失所許與疵廢廷辱民宗自居樞憲糾奏寂寞顧望縱容無至公之議惡直醜正有私訐之談宜置之徽纆肅正國典臣等參議請以見事免縝所居官輒勒外收付廷尉法獄治罪應諸連逮委之獄官以法制從事太清二年東魏慕容紹宗擊矦景景衆潰走襲據夀春梁以為南豫州牧光祿大夫蕭介諌曰臣聞凶人之性不移天下之惡一也矦景以凶狡之才荷髙歡卵翼之遇歡墳未乾即還反噬逆力不逮乃復逃死關西宇文不容故復投身於我陛下前者受之正欲比屬國降胡冀獲一戰之效耳今既亡師失地直是境上之匹夫陛下愛匹夫而失與國臣竊不取若猶待其嵗暮之效則彼棄鄉國如脫屣背君親如遺芥豈知逺慕聖德為江淮之純臣乎梁主不能用後魏宣武帝時侍中甄琛以朋黨被召詣尚書司徒公録尚書北海王詳等奏曰臣聞黨人為患自古所疾政之所忌雖寵必誅皆所以存天下之至公保靈基於永業者也伏惟陛下纂聖前暉淵鑒幽慝恩斷近習憲軌唯新大政蔚以增光鴻猷於焉永泰謹案侍中領御史中尉甄琛身居直法糾擲是司風邪響黷猶宜劾糾況趙修奢暴聲著內外侵公害私朝野切齒而琛嘗不陳奏方更往來綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之祿虧先皇之選典塵聖明之官人又與武衛將軍黃門郎李慿相為表裏憑兄叨封知而不言及修釁彰方加彈奏生則附其形死則就地排之竊天之功以為己力仰欺明廷俯罔百司其為鄙詐於兹甚矣不實不忠實合貶黜謹依律科徒請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李慿朋附趙修是親是仗交逰之道不依恆度或晨昏從就或吉凶往來至乃身拜其親妻見其子每有家事必先請託緇點皇風塵鄙正化此而不糾將何以肅整阿諛奬厲忠槩請免所居官以肅風軌奏可孝明帝正光四年蕭衍弟子西豐侯正德來降尚書左僕射蕭寶夤表曰伏見揚州表蕭正德自云避禍逺投宸掖背父叛君駭議衆口深心指趣厥情難測臣聞立身行道始於事親終於事君故君親盡之以恆敬嚴父兼之以博愛斯人倫之所先王教之盛典三千之罪莫大於不孝毁則藏姦常刑靡赦所以晉恭獲謗無所逃死衛汲受誣二子繼沒親命匪棄國孰無父況今封豕尚存長蛇未滅偷生江表自安毒鴆而正德居猶子之親竊通侯之貴父榮於國子爵於家履霜弗聞去就先結隔絶山淮溫凊永盡定省長違報復何日以此為心心可知矣皇朝綿基纍業恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛於邱園標忠孝以納賞築藁街于伊洛集華裔其歸心被髮鐻身之酋屈膝而請吏交趾文身之渠欵關而效質至如正德宜甄義以致貶昔越棲會稽賴宰嚭以獲立漢困彭宋實丁公而獲免吳項已平二臣即法豈不録其情哉欲明責以示後況遺君忽父狼子是心既不親親安能親人中間變詐或有萬等伏惟陛下聖敬自天欽光纂厯昭德塞違以臨羣后脫苞此凶醜置之列位百官是象其何誅焉臣釁結禍深痛纏肝髓日暮途遙復報何日豈區區於一豎哉但才雖庸近職居獻替愚衷寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相鼠攸刺遄死有歸無令申伋受笑於茍存曽閔淪名於盛世孝明帝時靈太后返政以元叉為尚書令解其領軍韓子熙與清河王懌中大夫劉定興學官令傅靈􅋆賔客張子慎伏闕上書曰竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇崩殂陛下沖幼負扆當朝義同分陜宋維反常小子性若青蠅汗白點黑讒佞是務以元叉皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆賴明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維遂無罪出為大郡刑賞僭差朝野怪愕若非宋維與叉為計豈得全其身命方撫千里王以權在寵家塵謗紜雜恭慎之心逾深逾厲去其本宅移住殿西闔門靜守親賔阻絶于時吏部咨稟劉騰奏其弟官郡戍兼補及經內呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宫栲掠胡定誣王行毒含齒戴髮莫不悲惋及會公卿議王之罪莫不俯眉飲氣唯咨是從僕射遊肇亢言厲氣發憤成疾為王致死王之忠誠欵篤節義純貞非但藴藏胸襟實乃形於文翰搜括史傳撰顯忠録區目十篇分卷二十既欲彰忠心於萬代豈可為逆亂於一朝乞追遺志足眀丹欵叉藉寵姻戚恃握兵馬無君之心實懷皂白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出於叉名藩重地皆其親黨京官要任必其心腹中山王熙本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國巨患奚康生國之猛將盡忠棄市其餘枉被屠戮者不可稱數緣此普天喪氣匝地憤傷致使朔隴猖狂厯歲為亂荆徐蠢動職此之由昔趙髙秉秦令關東鼎沸今元叉執權使四海雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之末良由騰矣而令凶徒姦黨迭相樹置髙官厚祿任情自取非但臣等痛恨終身抑為聖朝懷慙負愧以臣赤心慺慺之見宜梟諸兩觀汙其舍廬騰合斫棺斬骸沈其五族上謝天人幽隔之憤下報忠臣寃酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難除去之宜盡臣厯觀曠代緬追振古當斷不斷其禍更生況叉猜忍更居衡要臣中宵九歎竊以寒心實願宸鑒早為之所臣等潛伏閭閻於兹六載旦號白日夕泣星辰叩地寂寥呼天無響衛野納肝秦庭夜哭千古之痛何足相比今幸遇陛下睿聖親覽萬幾太后仁明更撫四海臣等敢詣闕披陳乞報寃毒書奏靈太后義之乃引子熙為中書舍人後遂剖騰棺賜叉死厯代名臣奏議卷一百七十三
