body:
  text: 歷代名臣奏議卷二百六十明楊士竒等撰屯田漢武帝時初通西域置校尉屯田渠犂是時軍旅連出師行三十三年海內虛耗征和中二師將軍李廣利以軍降胸奴上既悔逺征伐而搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黃金采繒可以易榖食宜給足不可乏臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分護各舉圖地形通利溝渠務使以時益種五榖張掖酒泉遣騎假司馬為斥候屬校尉事有便宜因騎置以聞田一歲有積榖募民壯健有纍重敢徙者詣田所就蓄積為本業益墾溉田稍築列亭連城而西以威西國輔烏孫為便臣謹遣徴事臣昌分部行邉嚴敇太守都尉明烽火選士馬謹斥候蓄茭草願陛下遣使使西國以安其意臣昧死請上乃下詔深陳既往之悔順帝永建四年尚書僕射虞詡上疏曰臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼殷積又有龜兹鹽池以為民利上郡龜兹縣有鹽官即雍州之域也水草豐美土宜産牧牛馬銜尾羣羊塞道北阻山河乘厄據險因渠以溉水舂河漕水春即水碓也用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之災衆羌內漬無妄者無所望也萬物無所望於天災異之大也郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸陵園也單外謂無守固而公卿遜懦容頭過身遜懦柔怯也張解設難但計所費不圗其安宜開聖德考行所長書奏帝乃復三郡使謁者郭璜督促從者各歸舊縣繕城郭置候驛既而激河浚渠為屯田省內郡費歲一億計吳大帝黃武五年陸遜以所在少榖表請諸將增廣農畝帝報曰甚善孤父子親田車中八牛以為四耦雖未及古人亦欲與衆均勞也南齊明皇帝時連年虜動軍國虛乏開府儀同三司徐孝嗣表立屯田曰有國急務兵食是同一夫輟耕於事彌切故井陌疆理長轂盛於周朝屯田廣置勝戈富於漢室降此以還詳略可見但求之自古為論則賖即以當今宜有要術竊尋緣淮諸鎮皆取給京師費引既殷漕運艱澀聚糧待敵每若不周利害之基莫此為急臣比訪之故老及經彼宰守淮南舊田觸處極目陂堨不修咸成茂草平原陸地彌望尤多今邉備既嚴戍卒增衆逺資餽運近廢良疇士多飢色可為嗟嘆愚欲使刺史二千石躬自履行隨地墾闢精尋灌溉之源善商肥確之異州郡縣戍主帥以下悉分番附農今水田雖晚方事菽麥菽麥二種益是北土所宜彼人便之不減粳稻開創之利宜在及時所啓允合請即使至徐兖青豫爰及荆雍各當境規度勿有所遺别立主曹専司其事田器耕牛臺詳所給嵗終言殿最明其刑賞此功克舉庶有𢎞益若緣邉足食則江南自豐權其所饒略不可計事御見納時帝已寢疾兵事未已竟不施行後魏孝文帝時州鎮戍兵資絹自隨不入公庫任其私用常苦飢寒徐州刺史荀虎子上表曰臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵以來莫不先積聚然後圖兼并者也今江左未賔鯨鯢待戮自不委粟彭城以強豐沛將何以拓定江關掃一衡霍竊惟在鎮之兵不滿數萬資糧之絹人十二匹即自隨身用度無凖未及代下不免飢寒論之於公無毫氂之潤語其利私則橫費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中良田十萬餘頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稻一嵗之中且給官食半兵種植餘兵尚衆且耕且守不妨捍邉一年之收過於十倍之絹暫時之耕足充數載之食於後兵資唯須內庫五稔之後榖帛俱溢匪直戍士有豐飽之資於國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以強漢臣雖識謝古人任當邊守庶竭塵露有增山海帝納之唐德宗建中元年楊炎欲發兩京關內丁夫浚豐州陵陽渠以興屯田上遣中使訪之涇源節度使段秀實秀實以為邉備尚虛未宜興事以召寇炎怒以為沮已徴秀實為司農卿使李懷光兼涇源京兆尹嚴郢奏按朔方五城舊屯沃饒之地自喪亂以來人功不及因致荒廢若力可懇闢不俟浚渠今發人浚渠得不補費是虛幾甸而無益軍儲也疏奏不報既而渠竟不成貞元三年募戍卒屯田京西上問李泌以復府兵之策對曰今嵗卒戍京西者十七萬人計嵗食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭飢亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然則亟減戍卒歸之如何對曰陛下誠用臣言可不減戍卒不擾百姓糧食皆足府兵亦成上曰果能如是何為不用對曰此須急為之過旬日則不及矣上問其計泌曰吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因黨項以市之計十八萬匹可致六萬餘頭命諸冶鑄農器糴麥種分賜緣邉軍鎮募戍卒耕荒田而種之約麥熟倍償其種其餘據時價五分增一官為糴之來春種禾亦如之沃土久荒所收必厚戍卒獲利耕者浸多糴價必賤名為增之而實比今嵗所減多矣且邉地官多闕請募人入粟以補之可足今嵗之糧上皆從之因問曰卿言府兵亦集如何對曰舊制戍卒五年而代今既因田致富必不思歸及其將滿下令有願留者即以所開田為永業家人願來者本貫續食遣之不過數畨則戍卒皆土著乃悉以府兵之法理之是變關中之疲弊為富強也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也宋太宗端拱元年淄州刺史何承矩上奏曰臣幼侍先臣關南征行熟知北邉道路川原之勢若於順安寨西開易河蒲口引水東注至海東西三百餘里南北五七十里滋其陂澤可以築隄貯水為屯田以助要害免蕃騎奔軼俟期嵗間塘注關南諸泊淀水播作稻田其緣邉州軍地臨塘水者止留北城軍士不煩發兵廣戍收水田以實邉設險固以防塞春夏課農秋冬備寇縱贍師旅不失耕耘不費國用不勞民力如此則敵弱我強彼勞我逸以強禦弱以逸待勞制胸奴之術也順安已西至西山道路百里以來無水田處亦望遣兵戍以練其精鋭擇將領以去其冗繆夫邉兵不患寡患驕慢不肅而不精邉將不患怯患偏見自賢而無謀邉備不患寇患慢防而未葺若禦得其力制得其要何慮乎邉塵不息邉患不除且有國有家以足兵足食為本水田之盛誠可以限戎馬而省轉粟之費實萬世之利也淳化二年知制誥柴成務奏曰臣近以河北緣邉州郡乞置屯田事宜具狀聞奏於今月二十六日長春殿召對靣奉聖旨令具營置屯田利害子細擘劃封進者切以戎人騷邉古今常事逐之則羣驚而星散守之則師老而費殫是知帝王歷代置之度外止於列亭障以遏奔衝之患營耕戰以圖經久之功果啓天心是恢逺略謹按古者井田之制以六尺為步步百為畝畝百為頃是一夫之田夫九為井井方一里井開四道而分八家鑿井於中八家共用是一井之法一井之法當計九頃之地室廬溝洫畢在其中先王所以定邦賦而足食也三代致理何莫由斯今之屯田取法於是大率地方四里置為一屯一屯之田開十六井闔井之戶當一百二十八家家立垣墻井分區域屯落之外界以長溝四四相從多多益辦是以地方四十里置屯一百區若東西展二百里之長南北止四十里之濶可以置屯五百列井八千居六萬四千之家侔一國三軍之衆以之耕則力均而功簡以之守則食足而心齊保衆備邉無易兹道稽古人之眀效立聖代之宏規事若果行敵則無患其有招納勞徠之戶維持佃守之方俟允施行别為條制真宗時太常博士王沿上書論漢唐之初兵革才定未暇治邉圉則屈意以講和承平之後我力有餘而外侮不已則以兵治之孝武之於胸奴太宗之於突厥頡利是也宋興七十年而契丹數侵深趙貝魏之間先朝患征調之不已也故屈己與之盟然彼以戈矛為耒耜以剽虜為商賈而我壘不堅兵不練而規規於盟歃之間豈久安之策哉夫善禦敵者必思所以務農實邊之計河北為天下根本其民儉嗇勤苦地方數千里古號豐實今其地十三為契丹所有餘出征賦者七分而已魏史起鑿十二渠引漳水溉斥鹵之田而河內饒足唐至德後渠廢而相魏磁洺之地並漳水者纍遭決溢今皆斥鹵不可耕故沿邉郡縣數蠲租稅而又牧監芻地占民田數百千頃是河北之地雖十有其七而得賦之實者四分而已以四分之力給十萬防秋之師生民不得不困也且牧監養馬數萬徒耗芻豢未嘗獲其用請擇壯者配軍衰者徙之河南孳息者養之民間罷諸坰牧以其地為屯田發役卒刑徒佃之嵗可獲數十萬斛夫漳水一石其泥數斗古人以為利今人以為害繫乎用與不用爾願募民復十二渠渠復則水分水分則無奔決之患以之灌溉可使數郡瘠鹵之田變為膏腴如是則民富十倍而帑廪有餘矣以此馭敵何求而不可仁宗慶歷五年知諌院歐陽修上奏曰臣昨奉使河東相度緣邉經久利害臣切見河東之患患在盡禁緣邉之地不許人耕而私糴北界斛斗以為邉儲其大害有四以臣相度今若募人耕植禁地則去四大害有四大利河東地形山險輦運不通邉地既禁則緣邉乏食每嵗傾河東一路稅賦和糴入中斛斗支往緣邉人戶既阻險逺不能輦運遂齎金銀絹銅錢等物就緣邉貴價私糴北界斛斗北界禁民以粟馬南入我境其法至死今邉民冒禁私相交易時引爭鬭輒相斫射萬一興訟遂搆事端其引惹之患一也今吾有地不自耕植而偷糴鄰界之物以仰給若敵常嵗豐及緩法不察而米過吾界則尚有可望萬一敵嵗不豐或其與我有隙頓嚴邉界禁約而閉糴不通則我軍遂至乏食是我師飢飽繫在敵人其患二也代州岢嵐寧化火山四州軍緣邉地既不耕荒無定主敵人得以侵占往時代州陽武寨為蘇直等爭界訟久未決卒侵却二三十里見今寧化軍天池之側杜思榮等又來爭侵經年未決岢嵐軍爭掘界濠賴米光濬多方力拒而定是自空其地引惹北人嵗嵗爭界其害三也禁膏腴之地不耕而困民之力以逺輸其害四也臣謂禁地若耕則一二嵗間北界斛斗可以不糴則邉民無爭糴引惹之害我軍無飢飽在敵之害緣邉地有定主無爭界之害邉州自有粟則內地之民無逺輸之害是謂去四大害有四大利今四州軍地可一二萬頃若盡耕之則其利嵗可得三五百萬石伏望聖慈特下兩府商議如可施行即召募耕種稅入之法各有事目容臣續具條陳七年知鄧州富弼上奏曰臣竊聞河朔軍儲每嵗不減六七百萬斛自來本路賦入外須更令客旅入中方得充足今水災之後農民大半流徙從來沃壤盡為間田又河朔所占地土至多無由耕稼臣切計見入之賦不過三分之一别路支撥增添亦不過十萬斛榖價踴貴必無入中之助則是河北每嵗軍儲頓虧一半已上雖朝廷極力救濟臣知無以出辦况别路所撥之物已是那輟應副若更減輟兩科則彼自虛竭必是難為支撥民力不得不困國用不得不窘臣兼體量得河朔流民東走登萊濰密南奔淮楚荆襄西至并代關陜北投幽燕及山後諸鎮暌離四散無所不之三二年間唯上等有力或可歸業自餘流浪忘反卒無還期河朔逃田盡成廢棄河朔軍須無以供億若不早為擘劃恐朝廷財用殫耗遂至不支甚非為國之計也臣嘗覽載籍歷代備邊守戍多用屯田趙充國守先零曹鳳守西城諸葛亮守魏羊祜守吳當時皆為戍邊頗多軍食不足盡取營田之利遂立破敵之功况今陜西河北緣邉甚有置屯田之處法制多在增修不難臣欲乞朝廷指揮河北州縣去年逃田隨所在撥為屯田諸處抽差廂軍給使如不足即募流民日得數千人不必比招軍人例勿支破衣糧但量給口食粗令飽足既免凍餒必樂服田况本是農家不勞教勸或更許收成後十分中少給與一二分以充贍養之資則應募者其孰能禦之兼自來經水田土十倍肥濃耕鑿之功不甚勞力但能布種在地便有厚獲之望至於農具牛畜亦易為經度或慮災傷之後難得牛畜只用人亦可應急若朝廷嚴切指揮速令興作必然今秋便有所入一二年後不可勝食才候流民復業逐旋據其元地給與則向時流徙不患其不歸也方今至急之務無出於此伏惟聖慈早賜裁擇仁宗時陜西經略安撫使范仲淹奏乞罷陜西近裏州軍屯田疏曰臣等竊見陜西昨來興置營田本欲助邉以寬民力除沿邉有空間膏腴地土處可以開墾外其近裏州縣官吏不能體朝廷之意將逺年瘠薄無人請佃逃田抑勒近鄰人戶分種或令送納租課又自來人戶租佃官莊地土每畝出課不過一二斗今亦勒令分種每畝須收數斗致貧户輸納不前州縣追擾無時暫暇緣人户自用兵以來科率勞弊至於己業尚多荒廢實無餘力更及營田其所出租課多是抱虛送納切覩編敕指揮不得將逃户田土抑勒親鄰佃蒔蓋恐害民况今嵗災旱尤甚理當優恤不可非理煩擾使之重困臣等欲乞特降指揮應陜西近裏州軍營田一切廢罷如元係租佃即令依舊額出課如元係逺年瘠薄逃田舊稅額重無人請佃者即與減定稅額召人請佃所貴疲民受賜歸感睿仁張方平上論曰臣聞古者師役不逾時無逺征久戍之勞宿軍轉餽之費故在三代無屯田之事降及秦漢務恢封略疲弊中夏外事蠻貊魏氏之後吳蜀鼎立永嘉東徙遂成南北天下割解更相鄙夷分疆占域各分戍守力穡之夫鮮被甲之士衆曠日持久兵勢未解而屯田之利興矣漢昭始調戰射士設屯於張掖充國後擊先零羌留佃於浩亹魏武之經略四方取濟許潁之積晉氏之南征吳會仰給江淮之儲唐太宗既定天下思欲散兵權省國用遂因隋制相要衝以設府計隙地而置屯三時務農一時講武居則有扞城之庸而廪食自足動則備調發之籍而戎事無廢及明皇恃海宇之泰寧承國力之全盛府兵耗散田萊不墾後又停折衝府立武士帳於是乎罷丁兵而有正兵矣寵將驕卒坐而蠧食帑庾虛竭財用不贍而商利侵刻之臣百方誅取生人困瘁漸至危亂范陽構禍日尋干戈代宗德宗專用姑息自諸方嶽之任徒兼營田之名荷戟之夫箕踞待哺至憲宗時有司上元和國計簿校天下兵農之數率以兩戶而資一卒人力凋弊可舉而知天下兵農之業遂離而不復焉今國家之務莫大於養兵四聖同仁恭儉慎德靡遊於逸於觀於畋念四方惟正之供憫小人作業之勞節愛惟微嗇用罔小然出納之吝在乎有司刻斂勾收錙毫圭撮天地所産山海之富動植之物悉管於官婦織不裳夫耕不食黎民力盡寒暑不息以供軍士衣稍匪頒之費汲汲乎其不能足也伏見議者有獻屯田之策雖未能該盡乎體要顯辨其利迹而或者猥為異説破其端緒臣輒為之揚榷以申其論或者曰蓋聚衆邉境戰守相持留則芻糧不足解則寇患未息故且耕且守而後有屯田之事未聞平時興屯於內地也臣應之曰昔棗祗建安之迹邇布都畿鄧艾正始之謀近緣陳項晉荀羡興石鱉之利分界東陽齊嵇曄置懷義之屯乃在河內唐氏府兵就田天下相望後上元中因洪澤芍陂之饒大資國用我朝自唐汝河朔之郡皆有田務此固不待邊境而後有屯田也今淮陽許昌汝南之域人稀土曠地力不盡密接京輔便於漕發雖內師禁旅更出就食往復浹日不廢衛護又東平巨野至於彭城率多間田民力不贍決河之所墳於皆為沃野嵗所收入東自濟汶漕而北洄可至河北東境西入廣利渠可至太倉曹南陶丘可為廪積置屯之地無便於此江淮之境人稠土狹田無休易何以布屯且國家嵗漕東南之粟度其運致費已兼倍此為謀之迂也或者曰唐氏之前兵民同業本調取於農板故可任於農事今之軍士皆市井桀猾去本惰遊之民至於無所容然後入於軍籍且其驕也久矣詬濡保息莫敢拂其心者是可使之寒耕暑耘者乎臣應之曰昔之為屯田者多在師旅之中解甲胄而執耒耜釋耒耜而執干戈出死入勞莫之憾也惟所御用之而已又況四方無事邊疆無役衣食足而起居時安室家而守妻子使趨南畝各食其力又何慊焉蓋智者謀始因勢推移使事濟而衆安在資權而成務臣雖不敏請試效愚蓋漢氏之屯田也發弛刑焉曹氏之屯田也募百姓焉晉氏之屯田也置營卒焉後魏之屯田也借民力焉唐氏之屯田也以府兵焉或兵或民惟所用者今天下浮户依強家而為佃客者取分末之利輸大半之率由無以自業也儻優制招來豔之以利寬其賦入復其它徭則願屯之夫襁負而至矣為置典農之官專司力穡之事事功勞報賞為法必信因使冬隙簡其強鋭教之角射賞其精力古者因農事而寄軍令蓋此之謂則是募屯田夫得屯田兵也居則稼穡之人用則戰騎之士不衣庫帛不食廩榖是驕卒可放省屯倉可待盈雖有凶荒水旱之變而軍不乏乎儲峙民不增乎橫賦建屯之利其亦溥矣謹論神宗熙寧七年詔委提點秦鳳路刑獄鄭民憲興營田許奏辟官屬以集事樞密使吳充上疏曰今之屯田誠未易行古者一夫百畝又受田十畝為公田莫若因弓箭手倣古助田法行之熙河四州田無慮萬五千頃十分取一以為公田大約中嵗畝一石則公田所得十五萬石官無營屯牛具廪給之費借用衆力而民不勞大荒不收而官無所損省轉輸平糴價如是者其便有六而提點刑獄鄭民憲言祖宗時屯營田皆置務屯田以兵營田以民固有異制然襄州營田既調夫矣又取鄰州之兵是營田不獨以民也邉州營屯不限兵民皆取給用是屯田不獨以兵也至於招弓箭手不盡之地復以募民則兵民參錯固無異也而前後施行或侵占民田或差借耨夫或諸郡括牛或兵民雜耕或諸州廂軍不習耕種不能水土頗致煩擾至於嵗之所入不償其費遂又報罷惟因弓箭手為助田法一夫受田百畝别以十畝為公田俾之自備種糧功力嵗畝收一石水旱三分除一官無廪給之費民有耕鑿之利若可以為便然弓箭手之招至未安其業而種糧無所仰給又責其借力於公田慮人心易搖乞候稍稔推行元豐五年詔提舉熙河等路弓箭手營田蕃部共為一司𨽻涇原路制置司提舉熙河營田康識言新復土地乞命官分劃經界選知田廂軍人給一頃耕之餘悉給弓箭手人加一頃有馬者又加五十畝每五十頃為一營四寨堡見缺農作廂軍許於秦鳯涇原熙河三路選募廂兵及馬遞鋪卒願行者人給裝錢二千詔皆從之髙宗時龍圖閣直學士知湖州汪藻上疏曰臣竊惟國家遭金人之禍於今五年無嵗無兵而去冬之役振古未聞乃者盤礴之師至江壖不渡此陛下憂勤上通於天而天贊我也然臣嘗觀古者兩敵相持所貴者幾會此勝負存亡之分也敵師既退國家非暫都金陵不可而都金陵非盡得淮南不可淮南之地敵人必不能守若為劉豫經營不過留簽軍數萬人而已耳蓋可驅而去也淮南洊罹兵戈蹂踐且羣盜繼之民去本業十室而九空其不耕之田千里相望流移之人心已棄決非朝夕可還也國家欲保淮南勢須屯田則此田皆可耕墾臣愚以為正二月間可便遣劉光世或吕頥浩率諸頭項招安人馬過江營建寨柵除見存人戶田産不可借外其餘流移未還者明降指揮各借五年使諸軍分地而耕候種食充盈規模已定然後徐步而圖中原既固行在藩籬且清東南羣盜此萬世一時也章誼上奏曰臣竊見朝廷纍年興置營田將以勸耕桑足兵食廣財賦寬民力誠敦本抑末務農重榖之政也然而行之纍年而土不加闢者何也急於見效而務於專利也夫急於見效則官吏搔抑之弊生務於專利則田野耕鑿之人少今京西湖北與夫淮南東西此四路者其被兵最甚其失業最多朝廷必欲家給牛種人給錢糧然後為勸耕財力所不能足必欲今年借貸眀年收租然後為見效則豐凶有不可必茍能捨此二事而捐其地於財力可辦之人使人自勸耕家自竭力而兵食兼足公私並濟見效於數年之後實大惠也今三大將各屯一路此皆昔時鎮撫使所有之地也人民懲於兵盜而不敢歸國家恃為藩籬而未能固如蒙聖慈各捐數縣之地使三大帥均給將士其願耕者則收其租賦之入明諭百姓使執契劵盡償其業於它部申飭有司使供給餉饋毋得少損於平日人情既孚地利既盡則可善償而收其餘以省轉輸之勞非小補也今不早圖日復一日困數路之力竭財用之源以供軍旅之費設有水早儲峙不繼悔將無及況自用兵十年以來言營田者幾人矣非無區區憂國愛民之意類皆計較毫末數日議功又欲兵民雜耕所以卒無成效惟聖主斷而行之早賜給授使將有定守兵有常産堡壁相望耕戰相因其堅守則有金城湯池之固其相援則有常山長蛇之勢聽其自設方略各為逺圖不必屑屑較其賦入之多寡彼將畢智竭慮以副聖主涵育之惠矣伏惟留神大幸給事中廖剛上奏曰臣嘗謂國不可一日無兵而兵不可一日無食今諸將之兵被於江淮不知幾萬數初無儲蓄之備日待哺於東南之民已不勝其困矣可不為之慮哉然救此患者莫若屯田朝廷亦嘗行之於淮南乃今閲數秋矣曾未聞其有補豈措劃之方勸相之誠有未至乎何其效之遲也臣願有説於此昔郭子儀以河中軍常乏食乃自耕一畝將校以是為差於是士卒皆不勸而耕是嵗河中野無曠土軍有餘糧史傳所載不可誣也以此知在主將加意而已夫子儀之事固不可以強大將然自偏禆而降獨不可勉之以身率乎陛下誠詔之曰將校有如郭子儀之躬耕者朝廷當加旌賞彼亦必以為榮而胥勸矣此一説也昔漢之盛時力田者與孝悌同科蓋務農重榖所以勸之者不得不爾臣觀比年行軍之賞以功遷資者動以萬計誠詔之曰每耕田一頃與轉一資彼以執耒之安方之操戈之危豈不特易此賞誠行萬頃不難得將無不耕之田矣此二説也臣又聞諸葛亮據武功與司馬懿對於渭南每患糧不繼乃分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵軍無私焉今江淮之民流離失業者甚衆顧未有以安集之耳誠詔之曰假爾種糧復爾賦租雖有士卒不汝侵優凡主將之可恃如此則彼有轉相勸率負耒耜而來者矣夫爭魚者濡逐獸者趨利之所在人樂赴之死且不避而況無死之懼乎此三説也三説者誠行則兵食足而民力舒矣豈徒如此種粟既多人保其有相與出力以禦外患而軍勢亦益張矣豈小補哉臣願陛下以是屬之諸將可乎是謂經逺之謀富強之術而中興之資也若夫貪尺寸之功為僥幸之舉與夫覘彼之所為而輒務勝之抑末也臣恐或為所欺反自取困弊耳非計之得也願陛下虛心而加擇焉天下幸甚剛又奏曰臣竊見朝廷講屯田之策久矣春耕又復失時日度一日略不見有所設施臣所未喻夫臨淵羡魚不如退而結網今欲戰苦無兵養兵苦無食此朝夕之所念慮而不能置者如謂古屯田法未易遽行獨不可參酌時宜姑取其簡易便於人情者試為之乎江淮之間蒿萊千里本皆膏腴之地臣願詔劉光世軍中將校有能部其卒伍就耕者優加爵賞嵗入悉分其衆自餘曠土益募民墾闢每能率三五百人或千人乃至數千人遞補以官三嵗勿賦則淮南江北懷歸之人與所在土豪自當有應募者事成皆許優與遷轉利之所在人所樂趨雖使之自戰自守可也此古實邉意也豈惟民力紓兵食足人保其有相與出力以禦外患而軍勢亦益張矣豈小補哉今嵗閏四月稻田或尚可種惟早圖之剛為御史中丞又奏曰臣聞聼納人君之盛德也然貴於能行聽納而不果於行亦何益哉昔子路有聞未之能行唯恐有聞蓋士之欲善其身如此君天下者行一善言則天下蒙其福廢一善言則天下受其弊其所係固非士人欲善其身者比也臣伏覩陛下求言之誠聼納之德古未有也豈惟在廷之臣莫不罄其所欲言四方萬里布韋草澤之士茍有所見咸得上聞臣意今日天下幾無隱情矣然考察而施行之臣竊以為未至且以一事言之屯田之為利三尺童子皆知之前後言者不知幾千百人而十年於兹訖未見效謂終不可行邪古人行之而獲其利者多矣豈今天下曠土之多不戰之兵張口待哺者如此之衆而獨不可行乎朝廷實緩其事雖行之而未得其術亦明矣東南餘民困弊極矣不以屯田代其供饋將何以蘇之臣願亟詔有司取前後講畫屯田章疏詳加討論務在必行若嵗復一嵗不加意焉欲兵食足而民不困窮臣敢以為無良策也此則今日事之最急者也臣復見日前關報臣寮所陳利害其間有切中時病決可施行者尚多且如言賞重罰輕民不知畏廢法用例吏並為姦翻異不已而姦賘卒免添差不已而州縣被害賦租失實而貧民苦於代納文移猥煩而庶事因以不治若此之類甚衆其弊顯然當革無可疑者朝廷大抵例送所屬看詳甚當而已是以因循遷延其説多不果行臣愚欲望聖慈特降處分委自宰屬檢舉日前看詳等指揮立限具上都省參酌取旨施行所貴求言不為虛文實天下幸甚虞允文上言曰臣聞國以兵強兵以糧聚此天下之通論也然兵之敝常戒於冗而不精糧之敝常憂於虛而無積二敝其今日之所甚急乎往嵗之春警報紛紛陛下嘗為之宵旰矣及此暇時四境之備當議持久之計而或者謂備邉者必增兵而增兵之害有二外則起敵國之疑內則憂月給之不足臣嘗竊思之以為無增兵之名而有屯田之實有藏兵之利而無養兵之費者營田是也國家營田有年矣蜀口之入嵗不過十二萬石武昌之入嵗不過八萬石荆淮之間所入益少而將相故家一嵗之儲有至數十萬石者豈天下之大乃不及之況今荒田曠濶未易以頃畝計昔諸葛亮之於漢中鄧艾之於兩淮羊祜之於荆襄顯然皆有成效亮雖不久而已寬全蜀之運艾以六七年間積三千萬斛祜之末嵗亦有十年之儲以今二三大將忠義智略自是不在亮祜艾下顧不能為陛下思長久便利之策乎臣聞古者一軍之中未必皆戰士也而有上中下之别上者可戰中下者可役而新募之兵可役者必倍焉而舊兵之老弱者舉不堪役也不堪役者聼其離軍資其鉏犂糧種之費授田以優其生而募新兵以復其額使凡可役者併寓於農而薄其嵗之所入率以一人耕而飬一兵若耕者萬人嵗可增一萬兵矣嵗增不已耕者益衆所藏之兵必全盛於今日豈惟國勢以強邉儲以豐而軍制可坐而定也臣願陛下與腹心大臣共議之微旨所嚮則下皆景從矣大抵使精於藝者習戰拙於用者力耕而老者得以自便莫不因其性而行之三軍其有不順陛下之令者乎一得之愚惟陛下幸擇孝宗隆興元年臣僚言州縣營田之實其説有十曰擇官必審募人必廣穿渠必深鄉亭必修器用必備田處必利食用必充耕具必足定稅必輕賞罰必行且欲立賞格以募人及住廣西馬綱二年以市牛會有訴襄陽屯田之優者上欲罷之工部尚書張闡言今日京襄屯田之害以其無耕田之民而課之遊民遊民不足而強之百姓於是百姓舍已熟田而耕官生田或逺數百里徴呼以來或名雙丁而役其強壯老稚無飬一方騷然罷之誠是也然自去歲以來置耕牛農器修長木二渠費已十餘萬一旦舉而棄之則荆襄之地終不可耕也比見兩淮歸正之民動以萬計官不能續食則老弱飢死強者轉而之它若使之就耕荆襄之田非惟可免流離抑使中原之民聞之知朝廷有以處我率皆襁負而至矣異時墾闢既廣取其餘以輸官實為兩便詔除現耕者依舊餘令虞允文同王珏措置二年江淮都督府參贊陳俊卿言欲以不披帶人擇官荒田標旗立寨多買牛犂縱耕其中官不收租人自樂從數年之後墾田必多榖必賤所在有屯則村落無盜賊之憂軍食既足則饋餉無轉運之勞此誠經久守淮之策詔從之國子司業劉爚接伴金使於盱眙軍還言兩淮之地藩蔽江南干戈盜賊之後宜加經理必於招集流散之中就為足食足兵之計臣觀淮東其地平博膏腴有陂澤水泉之利而荒蕪實多其民徑悍勇敢習邉鄙戰鬭之事而安集者少誠能經畫郊野招集散亡約頃畝以授田使母廣占拋荒之患列溝洫以儲水且備戎馬馳突之虞為之具田器貸種糧相其險易聚為室廬使相保護聫以什伍教以擊刺使相糾率或鄉為一團里為一隊建其長立其副平居則耕有警則守有餘力則戰帝嘉納之蔡戡上奏曰臣聞守城以兵養兵以食有城而無兵與無城同有兵而無食與無兵同三者不可闕一今襄陽樁積米不過三萬石借貸侵移陳腐之餘所存不多緩急何以為備況總領所嵗計支米十萬石自湖南諸州移運應副鄂州至襄陽泝流而上二千一百里灘淺水急非兩月不可到且有損失欠折之患水腳糜費蓋亦不資臣謂與其仰給於餽運不若取之於土産與其責辦於民力不若官自為之今襄陽間沃壤千里古人屯田遺迹具在羊祜墾田八百頃即此地也故臣先言水利之當修次言屯田之可廣況漢淮之俗淺種薄收殊不勞費一嵗之間用力不過三次春耕夏種秋收而已兵師得人於此留意每嵗春時差撥官兵廣行耕種事竟即歸收穫亦然及其登場以四分入官六分給耕種收穫之人無官軍兵請給甚微得此望外之物云胡不喜將見不待驅迫爭欲服田官兵既已樂為然後寓以教閲之法使之角射藝之精者得往比其反也復使之角射藝之不廢者再遣之且耕且教兵食俱足積以嵗月可省湖南餽運之勞而邉備有餘矣襄陽見今屯田官兵五百人嵗收榖麥幾三萬斛官取其半惜乎未廣也今既鑿水渠渠之左右無非良田以漸耕墾其利十倍伏望聖慈詳酌行下荆鄂都副統制司相度施行光宗時戡又上奏曰臣等凖淳熙十年八月十四日尚書省劄子節文福州觀察使建康諸軍都統制郭剛劄子奏六月三日凖遞到御前金字牌御寶封降下御筆朕聞屯田內有亡費之利外有守禦之備趙充國陳便宜十有二事其説曉然久欲推而行之患無其人闕而不講卿宿將虎臣通於兵事可以倚仗其計度田處與夫人數器用之屬凡所以施行之策詳悉條具聞奏副朕意焉付臣謹已仰體聖訓恭稟施行切惟屯田之法因田致榖以便軍食為利甚博陛下留神農務明問下及臣雖愚暗敢不罄竭萬一惟是經始之初不無少費既定之後可與圖成以守則堅以戰則克實為經久無窮之利臣區區愚見條具奏陳八月十四日三省同奉聖旨令總領與郭剛同共條具臣等恭稟前項聖旨指揮置條具下項須至奏聞者一臣等契勘淮西州軍邉靣闊逺若於沿淮處一槩措置屯田切慮優動邉民兼有不通水次去處難以轉輸惟是和州烏江含山歷陽縣無為軍巢縣廬江縣至東關焦湖一帶地瀕江湖可以通行舟楫昨來措置屯田之時軍旅方息人戶少有歸業亦止根括到和州三縣及無為軍巢縣荒田共五百頃及廬州三十六圍開墾自廢罷之後州縣據慿人戶契據識認其間不無侵耕嵗月既久遂同已業若欲泛行根括切慮州縣因而優民今相度欲乞從朝廷劄下淮西帥漕司先次行下諸縣取見人戶請佃舊管屯田數目然後於瀕江臨湖一帶近裏州縣根括可以開耕無主荒田開具坐落地段四至田畝數目供申朝廷候到降下以慿標撥措置開耕仍令逐司嚴切約束州縣不得因而優民一今來創開荒間田土全藉工力不比熟田用功省易須令人有餘力方可使之競勸臣等今相度欲每田一頃令四人分耕每人當二十五畝每六人為一甲於內差甲頭一名十甲為一保計六十人差使臣一員管押今且以五百頃為率共合用二千三十三人每一千人差將官一員部轄措置將司白直等人一十五人共用二千六十五人照得自乾道六年以後不曾差撥官兵前去沿淮出戍今來所差屯田官兵欲且於和州防城一千人內分撥前去候淮西師漕司根括田段見得多少或有不足人數即從都統制司照數貼差亦作防城名目將來田土成熟耕墾省力有可減人數從宜施行一合用耕牛農具寨屋種糧之屬若令淮西漕司應辦不免行下州縣科擾百姓若令軍中自行辦集又緣建康都統制司自廢罷回易之後止有逐月撥到酒息錢按月支給諸軍統制統領將佐供給又有打造戰船教閲犒賞百色支用别無寬剩切見淮西漕司所管錢物浩瀚欲乞朝廷指揮於淮西漕司見管錢內先撥十萬貫支付建康都統制司拘收據合用耕牛農具寨屋物料種子並依郭剛已奏請之數先且減半收買製造使用淮西漕司除根括田段之外其餘事件並無干預既免優民事亦易集一今來開墾之初所收子利未廣兼起荒勞苦合行優潤臣等今相度將欲第一年所收物斛除存留種子外盡行給與力耕官兵第二年除種子外以十分為率官收二分其餘八分給與力耕官兵第三年除種子外以十分為率官收三分其餘七分給與力耕官兵第四年所收物斛除種子外以十分為率官收四分其餘六分給與力耕官兵以後年分並止以四六分收給庶幾官兵樂於勸耕不致廢墮一部轄將官使臣合千人白直等人往來管幹亦合量行支犒緣官中所收不多臣等今相度欲於力耕官兵所得分數內斟量取撥從都統制司照等第徑自均給候支散畢具數供申朝廷照會一今來淮西漕司先撥到錢數及將來收成官中合拘收物斛臣等相度欲委都統制司收支候年終造帳開具奏聞一如有條具未盡事件續具奏聞戡又上奏曰臣昨任京西漕臣親見荆襄之間沃野千里古人屯田遺迹具在戍兵全仰縣官請給微薄餽運艱險誠因其所利耕墾可實邉儲亦因以寓教閲之法今春召還嘗具劄子靣奏特蒙玉音稱善近者伏凖尚書省劄子備奉聖旨令臣與都統郭剛同條具屯田事宜臣切揣聖意豈非採向者愚慮之一得不但可行於荆襄欲廣其策於被邉之地乎況臣所領職實兼措置屯田固當竭智殫慮以禆萬一已與郭剛同條具奏聞外然臣有愚見不敢隱默臣伏見漢淮事體大槩不同襄陽地廣人稀自城之外彌望皆黃茅白葦既疏水渠溉田數千頃無民田間斷兵耕其中聚而不散號令進退不失部伍淮西州軍去邉稍逺耕者日衆雖有荒間之田不免與民田接畛軍民雜耕豈能無擾屯兵散處廬舍隔逺亦難鈐束此事體不同者一也襄陽去邉不百里自修好以來五六十年流民未復曠土未闢見今可田去處皆是百姓棄而不耕之地軍民不相侵奪坐得良田故其為利也安淮西則不然富民大家及歸正人經官請佃廣作四至包占在戶嵗月既久遂為永業官司非不知之若一切根括則必大為邉民之擾若止收其所棄而為屯田則所得無幾此事體不同者二也襄陽屯田近者負郭逺者數十里主帥可以親臨朝出暮歸察其農事之勤惰閲其武藝之精粗而賞罰之戍兵往來耕者饁者相望於道營寨不逺可以更休故於事為便今大軍屯駐建康淮西異路近者猶有一江之隔主帥絶江而北人所創見委之偏禆未必盡力況事當一一咨稟主帥而後行遙度於數百里之外非身履目擊之豈能盡合事宜其於農事武藝亦不能盡察戍兵往來動是旬日營寨相逺必家屬偕行此事體不同三也自和戎以來兩淮未嘗宿重兵諸州防城不過千百人而已襄陽之兵雖號鄂渚分戍然自來留屯萬人以副帥臨之敵人習熟不以為疑今若一旦廣行屯田於淮西沿邉州郡必駭聼聞或啓釁隙要當以漸於近裏州郡為之此事體不同四也有是四者故屯田之法行之荆襄則易行之淮右則難然則屯田決不可行之淮西乎大抵事無難易在所以處之耳臣聞善立事者戒張皇而惡煩優夫興大衆開屯田於和好既定之後不無駭聼而不安者向來和州屯田五百餘頃廬州有三十六圍廢罷未久其間多是熟田見係人户請佃不若先遣官吏案行籍其舊數自來嵗措置開耕規模既成以漸增廣今和州防城者千人廬州亦有三百人春去秋還若根刷向來屯田官兵增益而併遣之則不至張皇矣所謂惡煩優者凡州縣之間興一役辦一事無非優民監司行下諸州諸州行下諸縣諸縣不免取辦於百姓官吏並緣為姦其擾數倍縱使量給價錢糜費減剋所餘無幾往往白著今也買耕牛造農具蓋寨屋一切委之漕司漕司靳費勢必科優未見屯田之利己為邉民之害臣謂不若令軍中辦其事漕司給其費要使屯田開而民不知則不致煩優矣軍獲其利民不知優人心既安地利亦盡屯田之法孰謂不可行之淮西乎臣識慮暗淺計策迂緩不敢避雷霆之誅惟冀天地日月容覆而照燭之臣不勝大願楊萬里上疏曰臣聞天下之事不可名之以無故之大也名之以無故之大則將待之以甚難之舉名之以大而待之以難則上之人倣徨睥睨而不敢決下之士畏懾沮喪而不敢議始乎不敢議卒乎廢其議始乎不敢決卒乎寢其決事之難行古之難復而天下之難治皆出乎此而今之所尤紛紛者屯田之議是也且事異職而職異力從其職而力之則力之為有功非其職而力之則力之為無用夫屯田者一有司之事耳何至於煩天子之宵旰而纍廟堂之講明哉臣聞禹之治水非躬於疏鑿周公之作洛非手於營築夫固有治之者孔子曰出納之吝謂之有司曾子曰籩豆之事則有司存是故先零之田充國不以纍宣帝許下之田棗祗不以纍曹公而漢宣曹公亦未嘗下取二臣屯田之事而代之憂今獨待區區之屯田以甚難之事則天下之事又有難者將何以待之此非名之以無故之大之過歟臣請得而小之且屯田之事其實甚小而其名甚大者執屯田之名也屯田之名不去則屯田之實終不可行田以屯名豈非以屯兵而名耶古者兵農一人漢之良家子唐之府兵猶有先王之典刑也自張説之募劉守光之刺而兵農始為二人矣故自唐以前鄉井無不能戰之農而營壘無不能耕之兵非農之可強以戰而兵之可教以耕也彼固世於耕而習於戰也以其習焉者而離鄉井故其戰不栗以其世焉者而居營壘故其耕不怍今則不然兵人者靡衣侈食蒱博而使酒傲岸踞肆視農民以奴𨽻而尚肻為農民之事哉今欲屯田而猶執其名以責其人是駕虎豹以耒耜而鞭之使墾田也其不可眀矣且又有不可者兩淮之屯田臣不得而知也臣獨見江西之屯田大抵其田多沃而荒其耕者常困其利則官與私皆不獲夫田之沃者耕之招也而何至於荒利不歸於上則歸於下而官與私何至於兩不獲租重故也租重故一年而負二年而困三年而逃不逃則囚於官不瘐死不破家則不止前之耕者去矣後之耕者復如是焉官之遺利可勝惜耶又有大不可者古之屯田皆有謂也行於內地則為濟飢許下之役是也行之邉地則或為備敵或為謀人李泌之議充國之議是也用兵之日則兩淮顯行之可也非用兵也而驟焉揚兵以屯田焉鷙鳥將擊必匿其形何至於彰彰如是哉是故莫若去屯田之名舉兩淮之屯田不授之兵而授之民田以口授業以世守如唐太宗之授田使兵與民分農以食兵故戰者逸兵以護農故耕者安農安而兵逸守則堅戰則強其利一也君子之舉事不言不可言之名不行不可行之言欲行屯田而憚於明言之則名之者非也今天子曷不詔兩淮之漕司與守臣以兵火之後招集流民其民存者以其田復之其亡者許它人承之其為田之在官者曰屯者曰營者曰沒入者舉而一之為世業以授民之無田者且不間於江湖閩浙之民則行可言言之可名矣夫吾自有田吾自有民以吾之田授吾之民此何驚於敵而何疑於逼哉其利二也其事既行則又詔於內地諸路之守臣有民稠地狹而願遷則遷之淮有水旱飢民之就食則就於淮使民得自言而聼其來官隨所過而為之給何患無能耕之人哉檢校經界之舊籍以為均稅之額盡鬻內地之屯田以為牛種之資其熟戶則蠲其幾年之租其新民則蠲其幾年之租何患無樂耕之人哉且使人必有道因其所利而利之之謂也今使兩淮之地民戶增而墾田多者必以韓重華之賞而賞漕臣以王臣之賞而賞守令則吏之所利也民之來者優而恤之如前之説則民之所利也是三人者各利其利各力其職而又糾之以諫官御史以察其優且偽則不出十年兩淮無餘田而有餘榖朝廷有兵食而無兵費邉上之粟如山而內地之餉漸可省矣其利三也辭屯田之名以享屯田之實不在此耶或曰田之在官者不賣之而直授焉官其費民其幸矣蓋為政者必視其所爭而為之制夫以民爭地則地重以地爭民則地輕地重者賣之可也地輕者授之可也今兩淮之地所謂地爭民者也授之猶未必來而况賣之耶役民以築而賣之木驅民以戰而賣之箭臣不知其説也惟朝廷擇其中寧宗嘉定十五年司封郎中魏了翁上疏曰臣曩蒙一再賜對嘗極陳三邉利害之實二敵強弱之勢雖蒙聖慈不以其狂瞽曲賜容貸而事會無窮隱憂莫識每念古人守邉備塞可以紓民力而老敵情惟務農積榖最為要道然而言之者爛熟聞之者訕玩何也以未嘗精講而力行之也臣生長於蜀雖幼習百氏長遊四方於國中之事粗所素講然身履目擊之久真知而實見則莫如父母之邦姑以蜀事為陛下陳之則三邉固可類推矣臣比者竊聞四川制置司遵奉聖旨措置利州路營屯田委監司分任其責見已置局經理朝廷明見萬里之外凡在邉鄙莫不踴躍思奮猶有説焉西邉自罹敵禍以來利東之大散黃牛利西之皂郊水關等處五六年間原堡多隳地利悉棄以故流人久不復業榖粟日貴兵民交弊今若遽行屯田則合葺邉堡合用兵耕而邉堡則諸將慮事謹審欲及冬時同乘機便乃可修築兵耕則自頃年纍減軍額以來以之坐守尚多闕數矧今久戍之餘難復再加役使是屯田之事卒未可舉而邉實之儲無時而可議也然則遂置之不復問則豈不甚可惜哉臣竊謂有屯田有墾田二者相近而不同墾田者何大兵之後田多荒萊如諸路有間田寺觀有常住皆當廣行招誘使人開墾因可復業則耕穫之實效往往多於屯田蓋並邉之地久荒不耕則榖貴貴則民散散則兵弱必地闢耕廣則榖賤賤則人聚聚則兵強此理所必然惟毋責屯田之虛名而先究墾田之實利則庶幾矣臣請試陳今日所當墾之田如利之西路則皂郊之內湫池諸谷水關之內崖石諸鎮利之東路則洋川之內青座華陽鳯集之內盤車諸嶺大率昔為膏腴今成荒棄至於金州近裏亦多有之其田去敵或百里或二三百里有髙山大陵之險可據有原堡兵戍之援可恃亦有敵騎從來所不曾至之處若更得土豪之助則指日可成今聞三路土豪之為忠義者有願自備費用自治農器自辦耕牛自用土人各隨便利趂時開墾及秋布種其間亦有願略資官司給助者亦自不多若聼其施工略計所耕可數千頃則明年此時便收地利縱官未立額或量行輸租其潛裕兵民使漸食賤粟比之頃嵗人苦斛貴官苦糴貴其利害豈不萬萬相絶何況耕田之民又皆可用之兵不數年間邉食既豐兵丁亦足萬一有警呼吸成聚家自為守人自為戰比於倉猝遣兵戍守亦萬不侔若是則雖無屯田之名而有屯田之實無養兵之費而又可潛制驕蹇之兵不惟不畏殘敵亦可不畏他盜積以嵗月則今之墾田又可為後之屯田今之耕夫可為後之精兵救蜀大弊為蜀永圗無出於此顧何憚何惜而久不為也或者之所慮不過寇抄耳然敵嘗蕩劫我梁洋及五州知無所得今方與西北相持未必遽議再入目前可以暫紓失今不為則後悔無及臣比得蜀中近聞興元金州兩戎司探報敵方科民牛具開耕鳳翔荒田又聞西和一帶邉民覘知敵亦厭兵願各耕種人自為守夫墾荒之利敵猶知為之而我不敢為原堡之固敵知葺之而我弗敢葺悠悠嵗月坐長寇讎臣不知所以為策矣比者關外連嵗荒歉今年蕎麥大熟邉民無裏外咸知耕播之利聞朝廷施行屯田指揮下日西和一帶願耕者雲合風偃動以千數人心若此何可失也臣愚欲望聖慈申命四川制置司據目今已行就令利路提轉司因人心欲為之機撫天時難失之運先切選用土豪漸漸耕墾細民所不能墾之田則一寸有一寸之功一日有一日之利皆實效也事半功倍惟此時為然若夫屯田則先督諸將修葺原堡候畢曰併將極邉荒田盡數耕播行之以漸要之以久不數年之間邉備隱然以戰則勝以守則固保蜀之策無大於此惟陛下財幸元世祖時東平布衣趙天麟上策曰臣聞神農之教曰有石城十仭湯池百步帶甲百萬而亡粟弗能守也由是觀之兵者城之守也食者兵之給也非兵無以守城非食無以給兵兵足而城安食足而兵壯兵食二者強國之計也謹案古者井田之法地方千里出兵車萬乘甲士三萬人步卒七十二萬人馬四萬匹牛十二萬頭且耕且守人無阻飢之厄有室有家下獲樂業之慶三代以後去古既逺阡陌制起舊法遂絶歷代尚患兵食不足至有令人入粟鬻爵而濫官者矣又有令人入粟免罪而敗法者矣亦有賦斂煩劇而失民心者矣亦有重刑極罰而徴民物者矣是皆見目前而忘後患得其一而失其百者也乃有卓然英乂思革其弊屯田之事由此而興若充國之於先零鄧艾之於夀春以至魏武屯於所在而倉廩靡不皆滿羊祜屯於襄陽而積粟可支十年其餘獲利者不可勝數然猶未逹於天下也唐置六百三十四府府各有兵無事之時乃耕於野永徽年間斗米三錢盜賊遂息旅行千里不持寸兵盛之至也今國家大業已定不忘武備江湖嶺海閩廣川蜀西北東北邉塞之地皆有軍兵以戍之坐食糧粟淮南北等處有屯田官府而屯田實未之廣也為今之計宜廣屯田况屬承平之秋非同征伐之日須立久長之妙法庶幾威德之並行使先偏後伍之流務南畝東臯之事一朝有事則厲戈擐甲而奮其戰勝攻取之能群寇消聲則力穡服田而求其千倉萬廂之積畋於農隙以講大事完其營壘以防不虞亦既免飛芻挽粟之勞而又有用寡生多之益也義歸一致功可雙成伏望陛下念兹在兹凡戍兵之處命戍卒為農開墾曠田每百人限幾頃凡所用之牛官為出直於南方西方市買而分給之凡所用之田器官為於諸冶鑄造而分給之凡力田及不力者明立賞罰以勸懲之可也雖一時勞費而實惟永逸之基借衆軍餘力而建此富強之業庶乎軍民皆以自贍而各得其所矣英宗時虞集拜翰林直學士俄兼國子祭酒嘗因講罷論京師恃東南運糧為實竭民力以航不測非所以寬逺人而因地利也與同列進曰亰師之東瀕海數千里北極遼海南濵青齊萑葦之場也海潮日至淤為沃壤用浙人之法築堤捍水為田聼富民欲得官者合其衆分授以地官定其畔以為限能以萬夫耕者授以萬夫之田為萬夫之長千夫百夫亦如之察其惰者而易之一年勿征也二年勿征也三年視其成以地之髙下定額於朝廷以次漸征之五年有積蓄命以官就所儲給以祿十年佩之符印得以傳子孫如軍官之法則東靣民兵數萬可以近衛京師外禦島夷逺寬東南海運以紓疲民遂富民得官之志而獲其用江海遊食盜賊之類皆有所歸歷代名臣奏議卷二百六十
