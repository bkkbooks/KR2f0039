body:
  text: 厯代名臣奏議卷二百八十一明楊士竒等撰諡號漢哀帝時郎中令冷襃黄門郎段猶等奏言定陶共皇太后共皇后皆不宜復引定陶蕃國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議有司皆以為宜如襃猶言師丹議獨曰聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而隂陽順其節人主與萬民俱䝉祐福尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊卑無二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國泰祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也東漢沖帝時有司奏言孝順皇帝𢎞秉聖哲龍興統業稽乾則古欽奉鴻烈寛裕宴宴宣恩以極躬自菲薄以崇𤣥黙遺詔貽約顧念萬國衣無製新玩好不飾塋陵損狭不起寢廟遵履前制敬勅慎終有始有卒孝經曰愛敬盡於事親而德教加於百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武德之舞如祖宗故事露布奏可靈帝熹平四年小黄門趙祐議郎卑整上言春秋之義母以子貴隆漢盛典尊崇母氏凡在外戚莫不加寵今沖帝母虞大家質帝母陳夫人皆誕生聖皇而未有稱號夫臣子雖賤尚有追贈之典况二母尚在不䝉崇顯之次無以述遵先世垂示後世也帝感其言乃拜虞大家為憲陵貴人陳夫人為渤海孝王妃蜀先主章武二年追諡皇思夫人遷葬於蜀未至而先主殂隕丞相諸葛亮上言皇思夫人履行脩仁淑慎其身大行皇帝昔在上將嬪配作合載育聖躬大命不融大行皇帝存時篤義垂恩念皇思夫人神柩在逺飄颻特遣使者奉迎㑹大行皇帝崩今皇思夫人神柩以到又梓宫在道園陵將成安厝有期臣輒與太常臣賴恭等議禮記曰立愛自親始教民孝也立敬自長始教民順也不忘其親所由生也春秋之義母以子貴昔高皇帝追尊太上昭靈夫人為昭靈皇后孝和皇帝改葬其母梁貴人尊號曰恭懐皇后孝愍皇帝亦改葬其母王夫人尊號曰靈懐皇后今皇思夫人宜有尊號以慰寒泉之思輒與恭等案諡法宜曰昭烈皇后詩曰榖則異室死則同穴禮云上古無合葬中古後因時方有故昭烈皇后宜與大行皇帝合葬臣請太尉告宗廟布露天下具禮儀别奏制曰可魏明帝即位詔曰尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武寔造商周詩書之義追尊稷契歌頌有娀姜嫄之事明盛德之源流受命所由興也自我魏室之承天序既發迹於高皇大皇帝而功隆於武皇文皇帝至於高皇之父處士君潛脩德讓行動神明斯乃乾坤所福饗光靈所從来也而精神幽逺號稱罔記非所謂崇孝重本也其令公卿已下㑹議號諡東亭侯劉曄議曰聖帝孝孫之欲襃崇先祖誠無量已然親踈之數逺近之降盖有禮紀所以割斷私情克成公法為萬世式也周王所以上祖后稷自以其佐唐有功名在祀典故也至於漢氏之初追諡之義不過其父上比周室則大魏發迹自髙皇始下論漢氏則追諡之禮不及其祖此誠往代之成法當今之明義也陛下孝思中發誠無已已然君舉必書所以慎於禮制也以為追尊之義宜齊髙皇而已尚書衛臻與曄議同事遂施行明帝悼后崩議書銘旌或欲去姓而書魏或欲兩書尚書令侍中司馬孚以為經典正義皆不應書凡帝王皆因本國之名以為天下之號而與往代相别耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所以同天地之大號流無二之尊名不待稱國號以自表不俟稱氏族以自彰是以春秋𨼆公三年經曰三月庚戌天王崩尊而稱天不曰周王者所以殊乎列國之君也八月庚辰宋公和卒書國稱名所以異乎天王也襄公十五年經曰劉夏逆王后于齊不云逆周王后姜氏者所以異乎列國之夫人也至乎列國則曰夫人姜氏至自齊又曰紀伯姬卒書國稱姓此所以異乎天王后也由此攷之尊稱皇帝赫赫無二何待於魏乎尊稱皇后彰以諡號何待於姓乎議者欲書魏者此以天皇之尊同於往古列國之君也或欲書姓者此以天皇之后同於往古之夫人也乖經典之大義異乎聖人之明制非所以垂訓將来為萬世不易之式者也遂從孚議明帝時有司奏請追諡文昭甄皇后使司空王朗持節奏䇿以太牢告祠于陵又别立寢廟三公奏曰盖孝敬之道篤乎其親乃四海所以承化天地所以明察是謂生則致其養歿則光其靈誦述以盡其美宣揚以顯其名者也今陛下以聖懿之德紹承洪業至孝烝烝通於神明遭離殷憂每勞謙讓先帝遷神山陵大禮既備正於先后未有顯諡伏惟先后恭讓著於幽微至行顯於不言化流邦國德侔二南故能膺神靈嘉祥為大魏世妃雖夙年登遐萬載之後永播融烈后妃之功莫得而尚也案諡法聖聞周達曰昭德明有功曰昭昭者光明之至盛久而不昧者也宜上尊諡曰文昭皇后明帝青龍中散騎常侍王肅上疏曰昔唐禪虞虞禪夏皆終三年之䘮然後踐天子之尊是以帝號無虧君禮猶存今山陽公承順天命允答民望進禪大魏退處賔位公之奉魏不敢不盡節魏之待公優崇而不臣既至其薨櫬斂之制輿徒之飾皆同之於王者是故逺近歸仁以為盛美且漢總帝皇之號號曰皇帝有别稱帝無别稱皇則皇是其差輕者也故當髙祖之時土無二王其父見在而使稱皇明非二王之嫌也况今以贈終可使稱皇以配其諡明帝不從東晉哀帝即位欲尊崇章皇太妃尚書江虨議曰虞舜體仁孝之性盡事親之禮貴為天王富有四海而瞽叟無立錐之地一級之爵蒸蒸之心昊天罔極寧當忍父卑賤不以徽號顯之豈不以子無爵父之道理窮義屈靡所厝情者哉春秋經曰紀季姜歸于京師傳曰父母之於子雖為天王后猶曰吾季姜言子尊不加父母也或以為子尊不加父母則武王何以追王太王王季文王乎周之三王德配天地王跡之興自此始也是以武王仰尋前緒遂奉天命追崇祖考明不以子尊加父母也按禮幼不誄長賤不誄貴幼賤猶不表彰長貴況敢錫之以榮命耶漢祖感家令之言而尊太公荀悦以為孝莫大於嚴父而以子貴加之父母家令之言過矣爰逮孝章不上賈貴人以尊號而厚其金寳幣帛非子道之不至也盖聖典不可踰也當春秋時庶子承國其母得為夫人不審直子命母邪故當告於宗祧以先君之命命之邪竊見詔書當臨軒拜授貴人為皇太妃今稱皇帝册命命貴人斯則子爵母也貴人北靣拜受斯則母臣子也天尊地卑名位定矣母貴子賤人倫序矣雖欲加崇貴人而實卑之雖顯明國典而實廢之且人主舉動史必書之如當載之方䇿以示後世無乃不順乎竊謂應告顯宗之廟稱貴人仁淑之至宜加殊禮以酬鞠育之惠奉先靈之命事不在己妃后雖是配君之名然自后以下有夫人九嬪無稱妃焉桓公謂宜進太夫人非不允也如以夫人為少可言皇太夫人皇君也君太夫人於名順矣武帝太元中欲追崇庶祖母宣太后議者或謂宜配食中宗時臧燾為明教議曰陽秋之義母以子貴故仲子成風咸稱夫人經云考仲子之宫若配食恵廟則宫無縁别築前漢孝文孝昭太后並繫子為號祭於寢園不配於髙祖孝武之廟後漢和帝之母曰恭懐皇后安帝祖母曰恭愍皇后雖不繫子為號亦祭於陵寢不配章安二帝此則二漢雖有太后皇后之異至於並不配食義同陽秋唯光武追廢吕后故以薄后配髙祖廟又衛后既廢霍光追尊李夫人為皇后配孝武廟此非母以子貴之例直以髙武二廟無配故耳夫漢立寢於陵自是晉制所異謂宜逺准陽秋考宫之義近摹二漢不配之典尊號既正則罔極之情申别建寢廟則嚴禰之義顯繫子為稱兼明母貴之所由一舉而允三義固哲王之髙致也南齊武帝時歩兵校尉王慈以朝堂諱榜非古舊制上表曰夫帝后之德綢繆天地君人之亮蟬聨日月至於名族不著昭自方篆號諡聿宣載伊篇籍所以魏臣據中以建議晉主依經以下詔朝堂榜誌諱字懸露義非綿古事殷中世空失資敬之情徒乖嚴配之道若乃式功鼎臣賛庸元吏或以勲崇或由姓表故孔悝見銘謂標叔舅子孟應圖稱題霍氏況以處一之重列尊名以止仁無二之貴夤沖文而止敬昔東平即世孝章廵宫而洒泣新野云終和熹見似而流涕感循舊𩔖尚或深心矧觀徽跡能無惻𨼆今扄禁嶔邃動延車盖若使鑾駕紆覽四時臨閲豈不重増聖慮用感宸衷愚謂空彪簡第無益於匪躬直日朝堂寧虧于夕惕伏惟陛下保合萬國齊聖羣生當删前基之弊軌啓皇齊之孝則詔付外詳議後魏孝明帝正光五年侍中甄琛卒太常議諡文穆吏部郎袁翻奏曰案禮諡者行之迹也號者功之表也車服者位之章也是以大行受大名細行受細名行生於已名生於人故闔棺然後定諡皆累其生時美惡所以為將来勸戒身雖死使名常存也凡薨亡者屬所即言大鴻臚移本郡大中正條其行迹功過承中正移言公府下太常部博士評議為諡列上諡不應法者博士坐如選舉不以實論若行狀失實中正坐如博士自古帝王莫不殷勤重慎以為褒貶之實也今之行狀皆出自其家任其臣子自言君父之行無復相是非之事臣子之欲光揚君父但苦迹之不髙行之不美是以極辭肆意無復限量觀其狀也則周孔聨鑣伊顔接袵論其諡也雖窮文盡武罔或加焉然今之博士與古不同唯知依其行狀又先問其家人之意臣子所求便為議上都不復斟酌與奪商量是非致號諡之加與汎階莫異専以極美為稱無復貶降之名禮官之失一至於此案甄司徒行狀至徳與聖人齊蹤鴻名共大賢比跡文穆之諡何足加焉但比来贈諡於例普重如甄琛之流無不複諡謂宜依諡法慈恵愛民曰孝宜諡曰孝穆公自今已後明勒太常司徒有行狀如此言辭流宕無復節限者悉請裁量不聼為受必準人立諡不得甚加優越復仍踵前来之失者付法司科罪從之莊帝追尊兄彭城王為孝宣皇帝尚書令拓䟦彧面諫曰陛下中興意欲憲章前古作而不法後世何觀歴尋書籍未有其事願割友于之情使名器無爽帝不從及神主入廟復𠡠百官悉陪從一依乗輿之式彧上表以為爰自中古迄於下葉崇尚君親褒明功懿乃有皇號終無帝名今若去帝直留皇名求之古義少有依凖唐太宗初即位謂侍臣曰准禮名終為諱之前古帝王亦不生諱其名故周文王名昌周詩云克昌厥後春秋時魯莊公名同十六年經云齊侯宋公同盟于幽惟近代諸帝皆妄為節制特令生避其諱理非通允宜有改張因詔曰依禮二名義不偏諱尼甫達聖非無前指近世以来曲為節制兩字兼避廢闕已多率意而行有違經誥今宜依據禮典務從簡約仰効先哲垂法將来其官號人名及公私文籍有世及民兩字不連讀並不須避睿宗時改葬故太子重俊有詔加諡又詔雪李多祚等罪議贈官太府少卿兼通事舎人韋凑上言王者發號出令必法天道善善著惡惡明也賞罰所不加則考行立諡以褒貶之臣議其君子議其父曰靈曰厲者不敢以私亂公也臣伏見故太子與多祚等擁北軍犯宸居破扉斬關兵指黄屋騎騰紫微和帝御𤣥武門親諭􅊇順太子據鞍自若督衆不止逆黨悔非回兵執賊多祚伏誅太子乃遁去明日帝見群臣涕數行下曰㡬不與公等相見其為危甚矣臣子之禮過位必趨蹙路馬芻有誅昔漢成帝為太子行不敢絶馳道秦師免胄過周北門王孫滿䇿其必敗推此則太子稱兵宫中為悖已甚以斬三思父子而嘉之乎則弄兵討逆以安君父可也因欲自立則是為逆又奚可褒此時韋氏逆未明義未絶於太子母也子無廢母之理非中宗命廢之則又刼父廢母且君或不君臣安可不臣父或不父子安可不子晉太子申生諡曰恭漢太子據諡曰戾今太子乃諡節閔臣所未諭願與議諡者執於御前使臣言非耶甘鼎鑊之誅申大義示天下臣言是耶咸䝉冰釋不復異議如曰未然奈何使後世亂臣賊子資以為辭宜易諡以合經禮多祚等罪云免而不云雪帝瞿然引内閤中勞曰誠如卿言業已爾奈何對曰太子實逆不可以褒請質行以諡時大臣亦重改唯罷多祚等贈官德宗即位禮儀使顔真卿請復七聖諡號狀曰謹按禮記曰先王諡以尊名節以一惠故行出於己而名生於人使夫善者勸而惡者懼也虞夏之質殷周之文至矣而禹湯文武之君咸以一字為諡言文則不稱武言武則不稱文豈聖德所不優乎盖羣臣稱其至者是以子不得議父臣不得議君天子崩則臣下制諡於南郊明受之於天也諸侯薨則太子赴告於天子明受之於君也至於周室卑大朴散諡始以兩字為重人或以虚美為榮漢承戰國餘烈叅而用之君臣易名事歸至當少不以為貶多不以為褒雖衆美所歸可一言而盡矣魏晉以降盖不足徴聖唐欽明憲章周漢爰初創業順考古道髙祖諡太武用漢制太宗諡曰文行周道也名正理順垂之無窮上元中政在宫壼亂名改作始建神堯文武大聖之號盖非髙宗之所獲已􅡄𤣥宗之末姦臣竊柄析言而亂舊法輕議以改鴻名遂廣累聖之諡有加至十一字者皇帝則悉有大聖之號皇后則皆有順聖之名使言之者惑於今行之者異於古非舊制也其後劒門下罪已之詔叙髙祖已下累聖悉用舊諡則𤣥宗悔既往之失亦以明矣寳應中二聖山陵有司議諡事不師古變而行權去古質而尚浮華捨舊名而廣新諡謂一名不足以節恵廼十倍於古焉而累聖諡名悉以字多者為定是廢髙祖太宗之令豈曰愛君今制諡非古人皆知之有司因循其事而無敢言者假使當今守之而不改後人議之以為非所失豈不大哉何者臣子之於君父莫不欲廣其美稱先王制禮不敢過也故至敬無文至文尚質質之數極於一堯舜之美足以彰矣文之數極於二孝文孝景之德亦以明矣質則近古文則近今此髙祖太宗所以更用其法後王所宜守之法也非天下之至聖其孰能定之此天皇所以興聖主而正鴻名太宗所以待孝孫而脩廢典微臣所以守經義而崇聖朝陛下宜奉天心繼先太宗之志使子孫䝉其法而萬代守之此天下之能事也臣愚以為髙祖已下累聖諡號悉宜取初諡為定謹案舊制宜上髙祖為太武皇帝太宗為文皇帝髙宗為天皇大帝中宗為孝和皇帝睿宗為真聖皇帝其二聖諡名字數太廣有逾古制臣愚請擇其美稱而正之謹按諡法秉德不回曰孝照臨四方曰明宜上𤣥宗為孝明皇帝又按諡法聖善周聞曰宣宜上肅宗為孝宣皇帝仍准漢魏及國朝故事於尚書省議定奏御夫文弊則救之以質至敬也名惑而反之於正至明也祖作之而孫述之至孝也三者備矣然後能立天下之大本正天下之大名建天下之大業能事畢矣伏惟陛下詳擇翰林學士陸贄上奏曰右冀寧奉宣聖㫖往年百官請上尊號曰聖神文武皇帝今緣經此宼難諸事並宜改變衆議欲得於朕舊號之中更加一兩字卿宜商量事體穏便得否者伏以睿德神功叅天配地巍巍蕩蕩無得而名臣子之心務崇美號雖或増累盈百猶恐稱述未周陛下既越常情俯稽至理愚衷未諭安敢不言竊以尊號之興本非古制行於安泰之日已累謙沖襲乎䘮亂之時尤傷事體今者鑾輿播越未復宫闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下誠宜深自懲勵以收攬羣心痛自貶損以荅謝靈譴豈可近從末議重益美名既虧追咎之誠必累中興之業以臣庸蔽未見其宜乞更詳思不為兇孽所幸此臣之至願也贄又上奏曰右冀寧奉宣聖㫖卿所商量加尊號事雖則理體甚切然時運必須小有改變亦不可執滯不信卿宜為朕更審思量應亦無妨者臣聞徳合天者謂之皇德合地者謂之帝德合人者謂之王父天母地以養人理物各有其宜者謂之天子是皆至尊之殊號極美之大名雖欲變更無踰於此故伏羲神農黄帝堯舜自生人已来君徳之最神聖者天下尊之美之亦已至矣而其指以為號者或曰皇或曰帝唯目一字且猶不兼禹湯繼興莫非大聖尚自菲薄降號為王嬴秦德衰於殷周而名竊於羲皥兼皇與帝始總稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱崇其號無補於徽猷損其名不傷於徳美然而損之有謙光稽古之善崇之獲矜能納諂之譏得失不侔居然可辨况今時遭屯否事屬艱難尤宜懼思以自貶抑必也俯稽術數須有變更與其増美稱而失人心不若黜舊號以祇天戒天時人事理必相扶人既好謙天亦助順陛下誠能斷自宸鑒渙發德音降引咎名深自尅責惟謙與順一舉而二美從之外可以收物情内可以應𤣥運上可以髙德於夐古下可以垂法於無窮興廢典矯舊失至明也損虚飾收美利大智也前聖之所以永保鴻名常為稱首者達於兹義而已矣陛下何恡而不革反欲加冗號以受實患哉𤣥元道徳經曰王侯自謂孤寡不榖以賤為本也周襄王遭亂出居于鄭告於諸侯曰不榖不德鄙在鄭地春秋禮之以其能降名也漢光武詔令上書者不得言聖史册稱之以其能損己也臣顧以微賤獲承訪議伊尹恥其君不如堯舜臣亦恥之是以誠發於中不復防慮忌諱赦其愚而鑒其理惟明主行焉憲宗時國子博士韓愈請上尊號表曰臣某言臣得所管國子太學廣文四門及書算律等七館學士沈周等二百人狀稱身雖微賤然皆以選擇得備學生讀六藝之文脩先王之道粗有知識皆由上恩天子整齊乾坤出入神聖經營乎無為之業游息乎混元之宫不謀於庭不戰於野坐收冀部旋定幽都析木天街星宿清潤北嶽醫閭鬼神受職地彌天區界軼海外舜之十有二州周之七百餘國章亥所歩禹契所書四面輻輳各脩貢職西戎之首北虜之渠沮威愧德失據狼狽收其種落逃遁逺去来獻羊馬千里不絶功既如此德又如彼爰初嗣位首去姦孽隨所顧指應時清寧哀天下之鰥寡釋四海之鬱結左右前後莫匪俊良小大之材咸盡其用無所誅詰一和以仁由是五榖嵗登百瑞時見六府三事惟序惟歌昔者媧皇殺黑龍以濟冀州堯誅九嬰以定下土血兵刻力僅就厥功以方吾君一何逺也堯之在位七十餘載戒飭咨嗟以致平治孔子之聖自云三年有成今自嗣位以来嵗有餘矣臻此功德何其捷哉置郵傳命未足以喻以非常之功襲尋常之號以冠古之美屈守文之名臣子之誠闕而不奏天號人稱不滿事實斯亦縉紳先生之過也謂臣官居師長不言謂何考其所陳中於義理天人合願不謀而同非臣之愚所敢隠蔽輒冒死以聞伏乞天恩特允誠志令公卿大夫得竭思慮取正於經以定大號有司備禮擇日以頒天下幸甚憲宗崩淮南李夷簡上言大行皇帝功髙宜稱祖穆宗下其議博士王彦威奏曰古者始封為太祖由太祖而降則又祖有功宗有德故夏人祖顓頊而宗禹商人祖契而宗湯周人祖文王而宗武王魏晉而下務欲推美自始祖外並建列祖之議叔世亂典不可以為訓唐本周禮以景皇帝為太祖祖神堯而宗太宗自髙宗後咸稱宗以為成法不然太宗致升平𤣥宗清内難肅宗收復兩都皆撥亂反正猶不稱祖今當本三代之制黜魏晉亂法大行廟號宜稱宗制可穆宗時白居易上疏曰臣某等言今月二十四日臣等已陳表章請上尊號愚誠雖懇聖鑒未迴蹐地跼天不勝大願臣等誠惶誠恐頓首頓首臣聞大道者無求於物物尊而不辭至公者非欲其名名生而不讓不讓故與天合德不辭故率土歸心斯所謂應乎天而順乎人者也伏惟皇帝陛下嗣興一德統牧萬方致時俗之和平納生靈於富夀金革已偃銷七十載之厲階玉燭方調啓一千年之聖運天人合應書軌混同而鴻名未加盛典猶缺華夷失望史䇿無光此誠君上之謙然亦臣下之罪也今臣所以上稽天意下酌人情再黷皇明重陳丹慊臣謹按書曰思作睿睿作聖又曰乃聖乃神乃武乃文經曰明王以孝治天下凡此五者厯觀列辟雖甚盛德莫能兼之伏以陛下自即大位及此二年無巾車汗馬之勞而坐平鎮冀無亡弓遺鏃之費而立定幽燕仁和一薰獷驁盡化可不謂睿文乎削平天下震耀八荒北敵求婚以禀命西戎乞盟而納欵威靈四及奔走来賔可不謂神武乎陛下以萬乗之尊四海之富供養長樂道光化成推而置之可塞天地可不謂孝德乎故臣等敢冒死稽首上尊號曰睿文神武孝德伏惟陛下略撝謙之小節𢎞祖宗之大猷惟十一聖在天豈忘繼其志以億兆人為子寧忍阻其心特迴宸衷俯受徽號在𤣥功不為主宰於盛德有所形容煥乎大哉垂裕無極此實天下之幸甚非獨臣之幸也臣等無任誠願懇禱之至宋太宗端拱二年翰林學士宋白上奏曰臣等奉宰臣傳聖㫖以近降御劄省去尊號今欲只稱帝字令臣等商量者乍聆睿㫖仰測天心見陛下謙尊之誠善下之意寅畏天命超越古先固無得而稱也然則皇帝二字典䇿昭然數千百年沿襲不改盖如天之有地日之有月二儀成象兩曜齊明不可斯須而去之也聖意以為非從上古起自嬴秦鄙其兼名欲歸一字然肇于前漢爰至近朝唯此尊名不能去者何哉盖天下行之已久人臣呼之已熟方今萬世一統四海為家士馬精研蠻夷率服民物豐阜前代無雙至於徽號之稱増加即可唯此至尊之字減損實難況夫今古異宜質文互變一定之制千載不刋與其改作而謀新曷若因俗而仍舊臣等職塵内禁上事明庭凡在討論未嘗請免如此大事不敢輕言誓竭微軀各以死請泰山可轉此志不移冒犯冕旒甘當鼎鑊直集賢院王皥上奏曰諡者行之表也善行有善諡惡行有惡諡盖聞諡知行以為勸戒六典太常博士掌王公以下擬諡皆跡其功德為之褒貶近者臣僚薨卒雖官該擬諡其家自知父子别無善政慮定諡之際斥其繆戾皆不請諡竊惟諡法自周公以来垂為不刋之典盖以彰善癉惡激濁揚清使其身沒之後是非較然用為勸懲今若任其遷避則為惡者肆志而不悛乞自今後不必候其請諡並令有司舉行如此則隠慝無行之人有所沮勸若須行狀申乞方行擬諡考諸方册别無明證惟衛公叔文子卒其子戌請諡臣謂春秋之時禮壊樂闕公叔之卒有司不能明舉舊典故至將葬始請諡於君且周制太史掌小䘮賜諡小史掌卿大夫之家賜諡請誄以此知有司之職自當舉行明矣詔下有司詳定如皥請焉仁宗寳元元年右司諫供諫職韓琦上奏曰臣竊以陛下至德合天地至仁越堯舜雖徽號累百亦無得而稱焉盖以三載一郊陛下報本之際臣子之心無以歸美君上故恭薦盛名以達惓惓之意緣近年以来天地之變比比而發陛下亦嘗虚懐以来讜言平刑以降罪戾今者圓丘展祀所宜責躬引咎仰荅天戒其所加尊號欲望不賜恩可如陛下已有聖意謙遜不從莫若直降御劄申諭宰庭具述宸衷使斷来表若候章表五上方示推拒此乃從来俞允之例似未協宜此事動干典䇿望聖明熟慮之慶歴四年翰林學士王堯臣等上奏曰章獻明肅盛烈丕功非一恵可舉諡告於廟册藏於陵無容追減章惠擁祐帝躬並均顧復故景祐中膺保慶之册義専繫子禮須别祠章穆升祔嵗月已深奉慈三室先後已定若再議升降則情有重輕請如舊制中書門下覆議成憲在前文考之意配食一體二慈之宜奉承無私陛下之孝請如禮官及學士議案祥符詔繫章聖特㫖位叙先後乞聖制定數昭示無窮詔依所議嘉祐四年知制誥劉敞上奏曰臣伏見宰臣率文武百官詣東上閣門拜表乞加上尊號今月十一日准批答不允此誠見陛下恭讓持滿惡盈好謙之意且陛下自寳元以来不復加徽號近二十餘年矣沖遜之德上通於天下信於民此上天所以保佑聖躬受福無疆萬民所以戴愛聖政日新一日者也今直不須稍増數字示人自滿臣願陛下固執雅意羣臣雖十上表堅讓勿受足以益明積年沖遜之實必大得天人之佑且陛下尊號既已云體天法道欽文聰武聖神孝德盡善極美矣復加大仁不足増光而曰至治則有若自矜今百姓多困倉廪不實風俗未清賢不肖混淆獄訟繁多盜賊羣輩水旱繼有四夷雖粗定然本以重賂厚利羈縻而服之非畏威慕義者也未可謂至治然則讓而不居於聖德彌髙矣今羣臣皆以加上徽號為請而臣獨望陛下固辭徽號為願其心則同欲尊君同欲愛君然望陛下裁之聖慮叅之美志斷而行之則有髙世之名與道同符豈數字可盡哉敞又上奏曰臣近上封事欲望陛下堅讓尊號今已兩奉批荅不允願陛下遂執此意斷在不疑且陛下不加尊號已二十年謙沖之德超絶前古簡在上帝人臣歸心夫已二十年行之一旦改之於義不可盖推善歸美以尊君父者臣子之常節也讓德惡盈以保天下者聖人之至道也臣謂陛下永執至道以當天心必有一謙四益之報増加數字未足發揚光輝實恐反累陛下二十年昭外之美又入今嵗已来頗有灾異日食地震雨雹大雪飛蝗涌水傷害廣逺以理論之陛下寅畏天命正當深自挹損豈可於此時加上尊號昔伊尹戒商王曰有言逆於汝心必求諸道有言遜于汝志必求諸非道今臣此言逆於心者也而羣臣之請遜于志者也誠望陛下求諸道而已敞又上奏曰臣兩貢愚忠欲望陛下辭不受所加尊號似未䝉采納臣豈敢沮衆人之意豈敢損主上之美實以謂崇陛下之稱號不如明陛下之謙讓徇臣子歸美報上之心不如廣君父克己畏天之道此事至重至大在陛下力能行之不當復詢左右之臣今羣臣已上五表聽之則頓失二十年謙遜之美不聼則合於嚴恭寅畏持盈克讓之義亦令四方無以窺聖德之淺深臣雖狂暗竊重慎此舉不敢不再三陳聞仁宗時知禮院韓維上奏曰司徒侍中杜公剛重不倚明果而斷秉事君之直節有保民之大德爰初服官以及謝政職無大小事無劇易必極其力不為茍然任提㸃刑獄屢決疑訟人以不寃治詮審官法明選公吏至謝賕不受開封號難治為尹者𩔖以擊斷無壅為聲至公居之又以其餘力惠綏民人畿甸歌之在二府引義獻納有大臣風采私謁幸恩法所不可者一切裁罷聞人少善稱道如不及至論國事有所曲直雖平生厚善不為毫髮假借故其進而相也天子恨其用之晚退而老也士大夫恨其去之速公雖家居上尊禮焉比薨三遷其官爵至封國為公賜予勞問之使嵗月不絶嗚呼可謂善始令終者矣謹案諡法清白守正曰正文賢有成曰獻迹公所以當大位享大名始終尊榮人無間言者亦其樹立所從来逺始諸父與公分財所得鉅萬悉推不受以予昆弟之貧者及富貴無聲樂妾御之好居處被服如始仕惟其治身報國之不足是以為憂故其德業所就章章如此謚曰正獻不亦宜哉維又上奏曰贈太師兼侍中陳執中幸得以公卿子遭世承平因緣一時之言遂至貴顯皇祐之末天子以後宫之喪問所以葬祭之禮執中位為上相不能總率羣司考正儀典以承答天問知治喪皇儀非嬪御之禮追册位於宫闈有嫌建廟用樂踰祖宗舊制執中白而行之曽不愧憚遂使聖朝大典著非禮之舉此不忠之大者閨門之内禮分不明夫人正室踈薄自絀庶妾賤人悍逸不制醜聲流布行路共知此又治家無足言者夫宰相所當秉道率禮以弼天子正身齊家以儀百官執中不務出此而方杜門深居謝絶賔客曰我無私也我不黨也豈不陋哉謹案諡法寵祿光大曰榮不勤成名曰靈執中出入將相以一品就第可謂寵祿光大矣得位行政不為不逢死之日賢士大夫無述焉可謂不勤成名矣請合二法諡曰榮靈維又上奏曰臣聞尊卑親踈賢不肖之辨所以立人倫也禮者所以維持人倫使不斁敗之具也朝廷之位廟寢之制車服之數金石俎豆之容皆有章也章不明則尊卑親疎賢不肖紛亂而人倫斁矣故有天下者不可不先禮也竊見國家受命百年而郊廟之位尚有未正朝廷之儀尚有未尊祭祀婚葬車服之等尚多不備所以然者患在棄禮而任人情也夫禮所以撙節人情使一於正今任人情而廢禮是以民俗無羞惡之風士大夫寡亷遜之節禮制雖繁而下不率法禁滋密而姦不勝盖有當先而後宜興而廢者矣伏惟宋至陛下比之於周成康之世也方當脩起廢墜興造禮樂以成一家之制典章之有失者此臣所以不得黙也臣聞温成之喪陛下疑所以處中夜令就宰相陳執中第問之明日遂發喪而下禮之大不可者有四夫皇儀殿者先帝先后之所嘗治喪也雖宫禁給使之人知其不當處之而處之矣大不可一也皇后者上配宸極天下之母也位號至重豈容僭瀆中宫在上而發册殿廷且以后禮送之大不可二也樂禁之内大祀用樂者備而不作大祀者非天地日月則宗廟社稷也而殺厭其禮大不可三也殿而不廟不備四時之享者奉孝恵皇后之禮也孝惠皇后者非太宗之正配也猶以為未足而立廟用樂遂與祖宗等大不可四也别廟四后章惠皇后不立忌日久矣緣此而立之事已施行賴陛下聖明采諫者之言而復止不然此又不可一也臣伏思温成皇后雖進册位號其實陛下之後宫也今以尊奉後宫而瀆臣主之分殺天地之祀僭祖宗之禮竊計此非陛下本意何以言之臣伏見陛下謙儉寅畏謹於事神篤於奉先祠享常禮之外過自抑損以極孝恭不宜有此盖當時臣下莫為陛下正言者陳執中位居師長曽無一言之補夫為國謀事而至於瀆臣主之分僭祖宗之禮可謂乖戾矣生既竊陛下之爵位以厭其欲若死又得美諡以成其志是執中終始獲幸而獨留非理之名使後世有以議陛下也臣不勝憤懣謹因其家請諡責其大節之失加以榮靈之諡言其寵祿則厚而令名不立也其義欲使天下知為臣當盡忠事君當以禮又使阿䛕竊位之臣知生雖茍一時之榮而死不免萬世之戮不然議虚名將朽之骨臣何獨為此區區也且諡者周公所作萬世之公法也臣之所言天下之公議也陛下寵待大臣亦以至矣而使有司得以萬世之公法天下之公議貶之亦天下之至公也伏惟陛下幸聽臣言以成天下至公之法豈不大哉臣備位禮官凡儀典之遺闕得以討論又大臣之薨卒者得秉筆為議以美惡諡之皆臣之職也義有所在不忍緘黙維又上奏曰臣近與孫抃等議故太師侍中陳執中之諡論有異同遂具狀申中書門下臣以謂朝廷且將復下有司使議執中所以得諡恭之狀然後決其是非遽聞降𠡠考功以恭字為定臣伏思之不勝惶惑臣以榮靈諡執中者正謂責其廢禮不恭失為臣之節而朝廷遂用恭法此臣不得不惑也臣聞孟子曰責難於君謂之恭謂以難行之道進於君而勉之也孔子曰恭近於禮逺恥辱也盖禮之意非恭不立而恭不近禮適足以招恥辱也書曰官師相規工執藝事以諫其或不恭邦有常刑此言治古之世自公卿大夫以至百工各以其職諫有不如此謂之不恭也執中備位宰相遭遇明主以仁恕臨下賦事行政惟大臣是咨惟古訓是式前代人君之所難陛下皆易之此誠人人自竭盡之秋而執中内懐阿倚茍援不正之説僭瀆大禮尚不能成明主之易可謂責難乎陛下中宫在上而妃嬪之没治喪發册近在殿中此雖宫省使令之人猶知其不可執中尚不能及使令之所知可謂近禮乎有司上孝惠祠殿之比不享不樂罷斥其議而遂僭祖宗之制執中表帥羣司縱不能逺復治古各以職諫而首自亂禮此又常刑之所不赦也且恭之法曰不懈于位夫位以宅才才以治事茍事之不治雖脩潔其衣冠莊嚴其色辭終日危坐無少懈之容何益哉執中犯不恭者三而顧以恭為諡如此則是諡法可廢而官守無用也夫設法而至于可廢命官而同於無用臣愚不識朝廷處此於義何當伏望陛下亟詔有司格𠡠未行復令禮官得盡諡恭之説然後并以臣議下尚書都省集百官叅定臣論有少屈退伏妄言之誅誠無所恨維又上奏曰臣近兩上章論故太師侍中陳執中不當諡恭事至今未䝉朝廷俞允竊聞勅在考功有司以不應常法未即奉行故臣敢復進其愚説臣聞聖人治天下所以得人而用之其大法有五士之處也則教育之其將進也則辨論之其已仕也則校其功罪而升黜之既没也又作史以紀其善惡制諡以著其賢不肖所以教育奨勸聳懼者如此故士之為善也固其逺惡也力在上者總其才而用之此天下之所以治也後世茍簡教育辨論之法既蕩然矣作史制諡止以備官而不責其實至於升黜則非有成可考或舉或廢各因其時在上者方患才之難得官之不脩不知所以教育奨勸聳懼之法不立也臣請以執中一事明之夫執中學問之不講義理之不達而遂至貴顯此教育辨論已廢之驗也既位宰相首亂國典瀆尊卑親踈之義而優游夀寵以一品自終此升黜不行之効也今臣區區欲加公議於已然之後而同僚不以為得朝廷不以為善徑黜其論不少加叅考此又備官而不責其實也所未知者但史官耳若史官又廢其守則是聖人之法都盡矣方今風俗頽靡百職隳惰謂宜力加振肅以消因循之弊而乃奪有司之職使不盡其法退至公之論使不極其理臣恐非朝廷之福也伏惟陛下觀聖人制法之意鑒後世茍簡之弊察當今之所宜急使有司不失其職公論得有所立非臣之幸實天下幸甚知太常禮院司馬光上奏曰臣等伏覩故贈太師中書令夏竦以舊在東宫特賜諡文正臣聞大戴禮曰諡者行之迹也行出於己名生於人所以勸善沮惡不可私也臣等叨預禮官諡有得失職有當言不敢隠嘿謹按令文諸諡王公及職事官三品以上皆錄行狀申省議定奏聞所以重名實示至公也陛下聖德涵容如天如地哀愍舊臣恩厚無已知竦平生不協衆望不欲委之有司槩以公議且將掩覆其短推見所長故定諡於中而後宣示于外臣等謂猶宜擇中流之諡使與行實粗相應者取以賜之亦非羣臣所敢議也今乃諡以文正二者諡之至美無以復加雖以周公之才不可兼取況如竦者豈易克當所謂名與實爽諡與行違傳之永久何以為法伏以陛下睿智聰眀燭見微逺如竦所為豈不素聞廼欲以恩澤之私强加美諡雖朝士大夫畏竦子孫居美仕不敢顯言四万之人耳目炳然豈可揜蔽必曰夏竦之為如是而諡文正非以諡為公器也盖出於天子之恩耳此其譏評國家之失豈云細哉臣等所以夙夜區區不敢避誅戮之辜報讎之禍狂僭妄言正為此耳伏乞陛下留神幸察改賜一諡庶協中外之論以為萬世之法光又上奏曰臣等近以故贈太師中書令夏竦賜諡文正輒有奏陳乞賜改更至今未奉俞㫖臣竊以凡為人臣受祿不必多受位不必髙茍當官不言則刑戮之人也是以夙夜惶懼不敢黙黙伏惟陛下不以鄙賤而忽其言臣等切迹諡法本意所謂道德博聞曰文者非聞見雜博之謂也盖以所行所學不離於道德也靖共其位曰正者非柔懦茍媮之謂也盖詩云靖共爾位好是正直也今竦奢侈無度聚斂無厭内則不能制義於閨門外則不能立效於邉鄙言不副行貌不應心語其道德則貪淫矣語其正直則回邪矣此皆天下所共聞非臣等所敢誣加也陛下乃以文正諡之臣等戇愚不達大體不知復以何諡待天下之正人良士哉且陛下所以念竦如此之厚者以竦嘗為東宫之臣故也向者東宫之臣死而得諡者非一陛下未嘗親有所定至於竦獨不然豈非知竦所為不合衆心邪陛下必以竦為正直無疑則何不委之有司付以公議然則陛下揜覆其短適所以彰之也陛下念竦不已則莫若厚撫其家至於諡者先王所以勸善沮惡非供恩澤之具也議者将以諡為虚名何害借人臣等請試言其害凡國家所以馭臣下者不過禍福榮辱而已為善者生享其福死受其榮為不善者生遇其禍死䝉其辱天下雖欲不治安何可得也如有不令之臣生則盜其祿位死則盜其榮名善者不知所勸惡者不知所懼臧否顛倒不可復振此其為害可勝道哉虞書曰兢兢業業一日二日萬㡬孔安國傳曰言當戒懼萬事之微夫事之方微治之易絶及其既著誰得治之況天下之人皆知竦為大邪陛下雖諡之以正此不足以揜竦之惡而適足以傷國家之至公耳且諡法所以信於後人者為其善善惡惡無私也今以一臣之故而敗之使忠良雋傑之士䝉美諡者後世皆疑之則諡法將安用哉臣等所以冒犯天顔區區不已與人父子為怨者誠惜國家勸沮大法不可因循虧廢也伏惟陛下憐察少加采擇特依前奏所陳改賜竦諡天下幸甚歴代名臣奏議卷二百八十一
