body:
  text: 歷代名臣奏議卷二明楊士竒等撰君德宋神宗即位初御史中丞司馬光上奏曰臣聞澄其源則流清固其本則末茂臣蒙陛下聖恩拔於衆臣之中委以風憲天下細小之事皆未足為陛下言之敢先以人君修心治國之要為言此誠太平之原本也臣聞修心之要有三一曰仁二曰眀三曰武仁者非嫗煦姑息之謂也修政治興教化育萬物養百姓此人君之仁也明者非煩苛伺察之謂也知道義識安危別賢愚辨是非此人君之明也武者非強亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苗之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治強闕一焉則衰闕二焉則危三者無一焉則亡自生民以來未之或改也治國之要亦有三一曰官人二曰信賞三曰必罰夫人之才性各有所長官之職業各有所守自古得人之盛莫若唐虞之際然稷契臯陶垂益伯夷夔龍各守一官終身不易茍使之更來迭去易地而居未必能盡善也故人主誠能收採天下之英俊隨其所長而用之有功者勸之以重賞有罪者威之以嚴刑譬如乘輕車駕駿馬總其六轡奮其鞭策何往而不可至哉昔仁宗皇帝之時臣初為諫官上殿首曽敷奏此語先皇帝時臣曽進歷年圗又以此語載之後序今幸遇陛下始初清眀之政虛心下問之際臣復以此語為先者誠以臣平生力學所得至精至要盡在於是願陛下勿以為迂濶試加審察若果無可取則臣無所用於聖世矣熙寧元年右正言孫覺上奏曰臣聞血者隂也氣者陽也二物合而成人雖合而成人而無心術之妙精神之運則亦下愚而巳矣昔者孔子深見此理而推言之曰血氣未定戒之在色以謂二物之交爭則人之欲心甚熾無妙道至神以勝之則至于違禮義而戕夀命矣又曰血氣方剛戒之在鬭二物既盛則令人喜鬭衆人之鬭則尚氣好勝取必於人以爭淺小而忘後患人主之鬭則強兵右武拓土開邊以爭利於夷狄凡鬭皆所以傷神明而悖性理矣又曰血氣既衰戒之在得凡人之老必嗇而貪血氣之衰自然及此故年彌髙而德卲者謂之孔子之徒此三者蓋論常人之情常人為隂陽所役故一人之身而少壯老三變聖賢則不然知禮義之可貴夀命之可寶潛心於妙道至神則少之時不惑於色知神眀之可尊性理之可樂橫逆禽獸不足以校勝負爭強弱則壯之時不悅於鬭少而寡欲長而盡性則血氣雖衰而不貪隂陽為之役而不得與之變故心間而神明體佚而夀考陛下以睿明之質鼎盛之年求治甚切而聽覽不倦真可謂有意天下者矣然臣之忠竊獨私憂而過計願陛下深鑒孔子之言而終始以三者為戒則宗廟幸甚天下幸甚富弼徙判汝州詔入覲許肩輿至殿門神宗御內東門小殿令其子掖以進且命毋拜坐語從容訪以治道弼知帝果於有為對曰人主好惡不可令人窺測可測則姦人得以傅會當如天之監人善惡皆所自取然後誅賞隨之則功罪無不得其實矣二年五月王安石遷參知政事上奏曰臣切以為陛下既終亮隂考之於經則羣臣進戒之時而臣待罪近司職當先事有言者也切聞孔子論為邦先曰放鄭聲後曰逺佞人仲虺稱湯之德先曰不邇聲色不殖貨利而後曰用人惟已蓋以謂不淫耳目於聲色玩好之物然後能精於用志能精於用志然後能明於見理能明於見理然後能知人能知人然後佞人可得而遠忠臣良士與有道之君子類進於時有以自竭則法度之行風俗之成甚易也若夫人主雖有過人之才而不能早自戒於耳目之欲至於過差以亂其心之所思則用志不精用志不精則見理不明見理不明則邪説詖行必窺間乘殆而作則其至於危亂也豈難哉伏惟陛下即位以來未有聲色玩好之過聞於外然孔子聖人之盛尚自以為七十而後敢縱心所欲也今陛下以鼎盛之春秋而享天下之大奉所以感移耳目者不為少矣則臣之所豫慮而陛下之所深戒宜在於此天之生聖人之材甚吝而人之值聖人之時甚難天既以聖人之材付陛下則人亦將望聖人之澤於此時伏惟陛下自愛以成德而自強以赴功使後世不失聖人之名而天下皆蒙陛下之澤則豈非可願之事哉臣愚不勝惓惓惟陛下恕其狂妄而幸賜省察三年右正言李常上奏曰臣聞孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章夫堯之為德至民莫能名功業髙大法度煥明如此其盛者配天故也所以配天者能則天也亦何獨堯為然王天下者莫不欲然也易曰天行健君子以自強不息則王者之事也中庸曰肫肫其仁淵淵其淵浩浩其天配天王者之德也夫立天下之正位行天下之大道不求則天而配其德可乎臣竊聞陛下即位已來聖德日新殆將天縱碩儒元老自愧不及追帝王之盛際將在今日臣所以樂為陛下言也昔者子思論為天下國家有九經所以行之者修身而巳誠能修身天下國家之治尚足道哉其修身之敘亦必始於至誠無息而極乎髙明上配天德然則志在於配天者何可息也詩曰於乎不顯文王之德之純孔子曰我學不厭皆言其不息也臣願陛下就天質之至明因聖術之已著法文王孔子之意勉之又勉極夫廣大而盡乎精微比德於唐堯之盛尚慮功業法度不輝耀乎萬世不垂譽於無窮乎非愚臣茍以責難之義事陛下誠以陛下睿智之資為此甚易故也知滄州曽鞏上言曰臣聞基厚者勢崇力大者任重故功德之殊垂光錫祚舄奕繁衍久而彌昌者蓋天人之理必至之符然生民以來能濟登茲者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至於文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服暨于幽厲陵夷盡矣及秦以纍世之智并天下然二世而亡漢定其亂而諸吕七國之禍相尋以起光武中興然沖質以後世故多矣魏之患天下為三晉宋之患天下為南北隋文始一海內然傳子而失唐之治在于貞觀開元之際而女禍世出天寶以還綱紀微矣至于五代蓋五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粵蜀吳楚五國之君生致闕下九州來同復禹之迹內輯師旅而齊以節制外卑藩服而納以繩墨所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸已悉莫貴於為天子莫富於有天下而舍子傳弟為萬世策造邦受命之勤為帝太祖功未有髙焉者也太宗皇帝遹求厥寧既定晉疆錢俶自歸作則垂憲克紹克類保世靖民丕丕之烈為帝太宗德未有髙焉者也真宗皇帝繼統遵業以涵煦生養蕃息齊民以并容遍覆擾服異類蓋自天寶之末宇內板蕩及真人出天下平而西北之虜猶間入窺邊至于景德二百五十餘年契丹始講和好德明亦受約束而天下銷鋒灌燧無雞鳴犬吠之驚以迄于今故于是時遂封泰山禪社首薦告功德以明示萬世不祧之廟所以為帝真宗仁宗皇帝寬仁慈恕虛心納諫慎注措謹規矩早朝晏退無一日之懈在位日久明于羣臣之賢不肖忠邪選用政事之臣委任責成然公聽並觀以周知其情偽其用舍之際一稽於衆故任事者亦皆警懼否輒罷免世以謂得馭臣之體春秋未髙援立有德傳付惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其豈弟之行足以附衆者非家施而人悅之也積之以誠心民皆有父之尊有母之親故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為宋仁宗英宗皇帝聰明睿智言動以禮上帝眷相大命所集而稱疾遜避至于纍月自踐東朝淵默恭慎無所言議施為而天下傳頌稱説德號彰聞及正南面勤勞庶政每延見三事省決萬機必咨詢舊章考求古義聞者愓然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大略足以克配前人之休故皇考之廟為宋英宗陛下神聖文武可謂有不世出之姿仁孝恭儉可謂有君人之大德憫自晚周秦漢以來世主不能獨見于衆人之表其政治所出大抵踵襲卑近因於世俗而巳于是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出於數千載之大志變易因循號令必信使海內觀聽莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革敝興壞制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣蓋前世或不能附其民者刑與賦役之政暴也宋興以來所用者鞭撲之刑然猶詳審反復至于緩固縱之誅重誤入之辟蓋未嘗用一暴刑也田或二十而稅一然嵗時省察數議寬減之宜下蠲除之令蓋未嘗加一暴賦也民或老死不知力政然猶憂憐惻怛常謹復除之科急擅興之禁蓋未嘗興一暴役也所以附民者如此前世或失其操柄者天下之勢或在於外戚或在于近習或在於大臣宋興以來戚里宦臣曰將曰相未嘗得以擅事也所以謹其操柄者如此而況輯師旅於內天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之勢如此至于畏天事神仁民愛物之際未嘗有須臾懈也其憂勞者又如此蓋不能附其民而至于失其操柄又怠且忽此前世之所以危且亂也民附於下操柄謹於上處勢甚便而加之以憂勞此今之所以治且安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走山巖窟穴之氓不待期會而時輸嵗送以供其職者惟恐在後航浮索引之國非有發召而籯齎槖負以致其贄者惟恐不及西北之戎投弓縱馬相與袨服而戲豫東南之夷正冠束衽相與挾册而吟誦至於六府順敘百嘉鬯遂凡在天地之內含氣之屬皆裕如也蓋逺莫懿于三代近莫盛於漢唐然或四三年或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至於荒陬海聚無變容動色之慮萌于其心無援枹擊柝之戒接于其耳目臣故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武王之所以繼伐而成王之興則美有假樂鳬鷖戒有公劉泂酌其所言者蓋農夫女工築室治田師旅祭祀飲尸受福委曲之常務至于兔罝之武夫行修於隱牛羊之牧人愛及微物無不稱紀所以論功德者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺悟黎庶而巳也書稱勸之以九歌俾勿壞蓋歌其善者所以起其嚮慕興起之意防其怠廢難久之情養之以德而成之於心其於勸帝者之功美昭法戒于將來聖人之所以列之於經垂為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以德猶武王成王而羣臣之於考次論撰列之簡册被之金石以通神明昭法式者闕而不圗此學士大夫之過也蓋周之德盛於文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待於陛下臣誠不自揆輒冒言其大體至于尋類取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁纍善至成王周公為最盛之時而泂酌言皇天親有德饗有道所以為成王之戒蓋履極盛之勢而動之以戒懼者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飭曰兢兢業業一日二日萬幾則處至治之極而保之以祇慎唐虞之所同也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有德饗有道之意而奉之以寅畏俯念一日二日萬幾之不可以不察而處之以兢兢使休光美實日新嵗益閎逺崇侈循之無窮至千萬世永有法則此陛下之素所畜積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇元豐七年資政殿學士知揚州吕公著上奏曰臣聞人君以至誠為道以至仁為德守此二言終身不易堯舜之主也何謂至誠上自大臣下至小民內自親戚外至四夷皆推赤心以待之不可以絲毫偽也如此則四海之內親之如父子信之如心腹未有父子相圗心腹相欺者如此而天下之不治未之有也絲毫之偽一萌於心如人有病先見於脈如人飲酒先見於色聲色動于幾微之間而猜阻行於千里之外強者為敵弱者為怨四海之內如盜賊之憎主人鳥獸之畏弋獵則人主孤立而危亡至矣何謂至仁親臣如手足視民如赤子戢兵省刑時使薄斂行此六事而巳矣禍莫逆於好用兵怨莫大於好起獄災莫深於興土功毒莫甚於奪民利此四者陷民之坑穽而伐國之斧鉞也去此四者行彼六者而仁不可勝用矣傳曰至誠如神又曰至仁無敵審能行之當獲四福以人事言之則主逸而國安以天道言之則享年永而卜世長此必然之理古今巳試之效也去聖益逺邪説滋熾厭常道而求異術文姦言以濟暴行為申商之學者則曰人主不可以不學術數人主天下之父也為人父而用術於子其可乎為莊老之學者則曰聖人不仁以百姓為芻狗欲窮兵黷武則曰吾以威四夷而安中國欲煩刑多殺則曰吾以禁姦慝而全善人欲虐使厚斂則曰吾以強兵革而誅暴亂雖若不仁而卒歸於仁此皆亡國之言也秦二世王莽嘗用之矣皆以經術附會其説書曰惟辟作福惟辟作威此言威福不可移於臣下也欲威福不移於臣下則莫若捨已而從衆衆之所是我則與之衆之所非我則去之夫衆未有不公而人君者天下公議之主也如此則威福將安歸乎今之説者則不然曰人主不可以不作威福於是違衆而用已巳之耳目終不能遍天下要必資之於人愛憎喜怒各行其私而浸潤膚受之説行矣然後從而賞罰之雖名為人主之威福而其實左右之私意也姦人竊吾威福而賣之於外則權與人主侔矣書曰威克厥愛允濟愛克厥威允罔功威者畏威之謂也愛者懷私之謂也管仲曰畏威如疾民之上也從懷如流民之下也畏威之心勝於懷私則事無不成今之説者則不然曰人君當使威刑勝於惠愛如是則豫不如奪生不如殺堯不如桀而幽厲威靈之君長有天下此不可不辨也哲宗即位監察御史王巖叟上奏曰臣聞孔子曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎臣竊以君道之大無所不難茍得其要而持之則所難者少矣臣請略舉其要陛下試垂聽幸甚言無所隱之謂忠心無所欺之謂信忠於主者不避嫌信其已者不思謗所以忠信或至于獲罪故人君以察忠信而主之為難巧於言之謂佞順於事之謂柔巧言則易得順事則易從所以佞柔常至於日親故人君以辨佞柔而遠之為難廣大業者存乎勤而人情常易於生倦以隳其業故人君以久而不倦為難成大謀者存乎斷而人情常牽于小不忍以亂其謀故人君以棄小不忍為難臣以謂為國之要能察忠信而主之使得盡言辨佞柔而逺之使不害政行之以勤而無廢弛之憂濟之以斷而無優遊之患則治道成矣陛下盛德日新四事之要曽無所難而皆自得益願陛下不以易心處之則德日新又日新矣巗叟為起居舍人又論洪範三德上奏曰臣伏以人主言而為天下法動而為天下則聖人思所以嚴百王之心而重其事故置右史以記言左史以記動伏惟陛下即位以來恭默思道敬畏不言五年于今臣幸得以右史入侍願聞德音而書之不啻飢渴者亦有時矣昨日臣預立邇英侍講臣司馬康講洪範九疇至乂用三德陛下忽啓聖問曰只此三德為更有德臣不覺心躍而神竦既以初聞堯言為喜又以陛下問德得其要為慶臣敬已書之於册以示萬世竊伏思念陛下既能審而問之必將體而行之三德者君人之大本得之則治失之則亂不可須臾而去者也臣請為陛下別白而言之夫明是非於朝廷之上判忠邪於多士之間不以順已而忘其惡不以逆已而遺其善私求不徇於所愛公議不遷於所憎竭誠盡節以先國家之急而忘其身者任之當勿二附下罔上以盜寵祿而不恤百姓之患者棄之當勿疑惜紀綱謹法度重典刑戒姑息此人主之正直也聲色人之所好也而逺之盤遊人之所樂也而絶之財利人之所貴也而賤之勇于救天下之弊果以斷天下之疑邪説所不能移非道所不能悅此人主之剛也居萬乘之尊而不驕饗四海之富而不侈聰明有餘而處之如不足俊傑並用而求之猶弗及虛心以訪道屈已以從諫懼若臨深淵怯若履薄氷此人主之柔也三者足以盡天下之要顧人主力行何如耳陛下誠能用洪範之三德以修已推臯陶之九德以用人則堯舜三王之盛可坐而致矣斯無難在陛下勉之而巳元祐元年御史中丞傅堯俞上宣仁皇后論治性之道疏曰臣聞之於書曰慎厥初惟其終又曰慎厥終惟其始始則念終不敢不慎也終則念始不敢不勉也臣愚伏念陛下考古御今修明法度恭儉以克已慈惠以愛人登崇老成開廣言路大義明著仁聲流聞總攬萬機得其綱要所以欽崇祖宗導世成俗為子孫百世之慮甚備非臣筆舌所能形象雖詩書所載丹青所傳殆非有以過也可謂有其始矣臣愚不勝拳拳謂陛下雖聖性得之猶當加聖心焉夫天地無全功聖人無全能此不可不思傳曰審好惡理情性而王道畢矣治性之道必審已之有餘而強其所不足有餘則養之不敢矜不足則勉之以為戒然後無間可窺而巧偽之徒不得比周而望進今陛下不出房闥而天下嚮風百僚奉職者無它以陛下通達平均而政出於大公云耳茍一有所偏則好惡之情露百邪羣枉必爭隙而入矣陛下前日積勞之所成就將中廢而不完矣豈可不兢兢業業日慎一日以圗厥終哉敬願陛下留神省察則天下幸甚天下幸甚陛下不遺臣愚屬以言責非臣衰拙所當蒙被仰貪盛明黽勉就職臣輒自惟忖蓋志有向背而材有能否事有大小任有重輕陛下使臣拾遺補過以輔盛德明善正失以平庶政舉直錯枉以正大臣方是之時臣極其力以死繼之若夫窺人之私摘其細故有聞必達遇事輒言則非臣之任又非臣之志也伏惟陛下責其大節寬其近功因臣所能俾效其力臣終不以狗馬之年為子孫計畏首顧尾以孤負恩奬惟始之之難陛下既蹈之矣顧不能善其終乎然不可不戒也伏望陛下察臣懇欵不廢其言特賜覽觀則永譽無悔臣不勝大願蔡確以作詩誹謗得罪堯俞又上奏曰臣覩蔡確狂悖陛下神斷不疑下合人情上明邦憲雖一以公議裁之固未嘗臨之以怒然豈陛下之所樂者哉况區斷之際亦須少勞睿思愚臣妄度竊恐陛下於海嶽之量不能無少忤而未能忘懷也外廷側聆日增驚惕臣聞之於易曰天下同歸而殊塗一致而百慮天下何思何慮夫事至以無心應之既往若未嘗經意此聖人所以養至誠而御遐福者也願陛下寬聖心省浮念遊情太清以固真粹陛下之氣和則上下之氣和上下之氣和則天地之氣和應矣唐桞公綽奏太醫針以諷憲宗謂之曰卿愛朕深者臣無公綽之才而有其誠臣以為今天下事莫重於此故惓惓而不能自已惟陛下無易臣言留神省察三年中書舍人曾肇論君道在立已知人上奏曰臣伏見陛下即位以來早朝晏罷負扆端莊淵默弗言雖在深宫之中不為佚豫之好可謂有克肖祖宗之聖質退朝燕處翰墨是親日御邇英虛心恭已以延講誦可謂有急於問學之誠心夫有克肖祖宗之聖質又有急於問學之誠心則引而達之廣而大之正今日之所務也蓋聖人之性與人同在謹其初而巳夫性之初若火之始然泉之始達火之始然一熒爝之微爾及其至也其明足以燭萬物其用足以爍金石其利博矣然設之不當則燎原野焚玉石而不勝其害也泉之始達一勺之多爾及其至也大而為江河細而為溝澮其利博矣然導之非理則暴怒悍突懷山襄陵而不勝其害也人之性何以異於是哉況夫有天下之大享四海之富靡曼之聲妖淫之色足以移其耳目宫室狗馬珠玉綺繡之玩足以移其心志與賢人處矣而不肖者參之與正士遊矣而邪人間之日漸月漬習與性成則明者或至於昏仁者反而為暴豈其天資之固然哉設之弗當導之非理故也故以舜之為君而禹告以無若丹朱傲以禹之為君而其戒見於五子之歌以武王之為君而太保作旅獒以訓至於成王而訓戒益詳周公作無逸又作七月之詩召康公作公劉以戒民事又作泂酌以言皇天親有德饗有道其誨可謂諄諄矣故以成王中材之主而能持盈守成卒為賢君者設之得其當導之適其理故也自古治世少而亂世多天下之柄或移於權臣或假於外戚或出於宦寺諸侯或強大而不可制夷狄或驕慢而不可屈兵或恣睢而不可使海內之賦入或專於強藩悍將而縣官不能有也百里之長或専殺而司寇不能治也有一於此人主雖有特起之資欲治之志而其勢不能以大有為此古今之通患也本朝承平百有餘年政出於一羣臣奉法遵職外戚奉朝請宦寺供掃灑而巳州縣之勢如臂使指夷狄引首待我衣食制兵與賦皆得其要刑罰清平又前世之所未有也六聖相傳以至陛下言其德則光大言其業則富有言其勢則便利陛下又有克肖祖宗之聖質有急於問學之誠心引而達之廣而大之欲王則王欲帝則帝惟陛下之所嚮而巳孔子曰為君難知為君之難固有時而易矣何以言之君道莫難於立已莫難於知人已非禮不立人非言不知也孔子曰不知禮無以立也不知言無以知人也臣請為陛下言之夫所謂禮非制度文為之事也姦聲亂色不留於聰明淫樂慝禮不接於心術非正勿視也非正勿聽也非正勿言也非正勿動也視聽言動由於禮則內之非僻之思無自而生外之非僻之習無自而入內有以正其心外有以正其行夫然故施於事親則孝施於兄弟則順施於族姻則睦施於郊廟則敬施於朝廷則莊施於治民則仁施於軍旅則威無所施而不當矣孔子曰一日克已復禮天下歸仁焉其守豈不約其效豈不博哉至於知言其事尤難蓋言亦多端矣有辨有納有華有質有是而非有迂而直不可不察也非獨如此人主必有好惡之心有是非之心所好者正所惡者邪以忠為是以佞為非則固善矣不幸反此則小人必將逢其所好避其所惡矜其所是諱其所非以售其姦言以行其私説故人主好髙逺則窽言入好卑近則邇言至好刑名則慘刻之説進好功利則興作之謀用上以此求於下下以此應於上同者謂之賢異者謂之愚而君子雜處小人之間方且逆其所順強其所劣君所謂可而有否焉必獻其否以成其可君所謂否而有可焉必獻其可以替其否如是而君不察焉則小人日親君子日踈小人日進君子日退君子道消小人道長此治亂安危之所以分也治亂安危所分在於聽言之際豈不可畏也哉故漢文帝聽張釋之而退嗇夫則風俗至於篤厚唐太宗聽魏鄭公而絀封倫則致治幾於太平齊威公不聽管仲而進易牙符堅不聽王猛而信慕容垂則旋踵而敗亡其效豈不深切著明哉伏惟陛下有克肖祖宗之聖質有急於問學之誠心宜其於行不勉而中於言不思而得然臣猶惓惓以是為獻者蓋天下之物接於我者無窮而不能以道觀物則為物所引而欲必至於敗度縱必至於敗禮尚何以立巳哉天下之言接於我者無窮而不能以道觀言則為言所蔽而浸潤之譛膚受之訴無所不行尚何以知人哉臣愚願陛下及此春秋方富血氣未定早為之制不邇聲色不殖貨利出入起居凡所以害德之事勿為也左右前後凡可以蕩心之物勿近也便僻側媚遠之而勿親直諒多聞親之而勿遠動容周旋唯禮之從則已無不立矣無作好惡無作聰明使人不能窺有言逆于心必求諸道有言遜于志必求諸非道使姦言不得入虛心廣覽以揆衆論辭寡者知其人之吉辭多者知其人之躁辭遊者知其誣善辭枝者知其心疑以至詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮則人無不知矣有以立已充而至於美風俗不難矣有以知人推之以修政事不難矣方今海內雖號治安然內則忠邪雜揉是非紛亂士節不厲奉公守義者寡而交私合黨者多外則爭訟盜􅐁法不勝姦嵗論大辟五千餘人祖宗以來未嘗如此風俗未可謂美也朝廷上下紀綱不肅百司庶務類多文具官不勝其冗而未有以革財不足於用而未有以制哀矜惻隱之書日下而百姓之力未裕也是故和風未洽而嵗之順成者常少恩信未孚而夷狄之侵侮者尚多以至寇賊姦究所在竊發政事未可謂修也陛下誠能早留意於此正已以先之得人而任之力行以久馴致以漸則豈惟卿士大夫相化以義哉芻牧之微禆販之陋可使忠厚而知恥矣豈惟朝廷之上百工得其職哉海隅障塞之遠抱關擊柝之賤亦皆嚮方而宿業矣如是風俗不美政事不修未之聞也捨是而不務則接物而不能無纍聽言而不能不惑接物而纍則雖有克肖祖宗之聖質而敗之者衆聽言而惑則雖有急於問學之誠心而蔽之者多如是則風俗愈入于薄惡政事愈入於弛壞貴者不能自克況其賤者哉近者且猶弗治況其遠者哉非獨如此人事不立而望天道之助順中國不尊而望夷貊之允懷抑又難矣臣愚故曰陛下有克肖祖宗之聖質有急於問學之誠心則引而逹之廣而大之正今日之所務也不然則用心雖勞而去道愈遠用力雖勤而為術愈踈雖日接多士日求讜言而于道無補也書曰惟聖罔念作狂惟狂克念作聖傳曰學而不思則罔思而不學則殆陛下欲至此非他學以求之思以精之而已惟陛下留意毋忽則天下幸甚四年右諫議大夫范祖禹上宣仁皇后乞先正君心疏曰臣蒙陛下擢受諫職才力淺薄懼不克勝受命以來夙夜不遑寧處深思天下之事自非大者遠者未之敢先恭惟祖宗受天命百三十年自三代以來未有承平如此之久纍聖基業付畀子孫成之至難壞之至易是以古之明王欲治天下先正其本其本在於人君一心而已天下治亂出於君心君心一正則萬事無不正孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣易曰正其本萬事理差之毫釐失之千里臣侍經筵因進講每及人君正心修身之要君子小人繫于治亂之際未嘗不反覆開陳伏計陛下聞之已熟今有言責不敢忘此竊惟天下之本在於君心臣愚伏望太皇太后陛下日以祖宗之艱難治天下之勤勞萬民之疾苦羣臣之邪正政事之得失説諭皇帝存之於心若皇帝陛下聖心曉然明於邪正是非他日衆説不能惑小人不能進則萬事定矣臣竊熟思莫大於此惟陛下深留聖意以幸天下七年端明殿學士兼翰林侍讀學士守禮部尚書蘇軾上奏曰臣聞始之學也以適用為本而耻空言故其仕也以及民為心而慙尸祿乃者屢請治郡兼乞守邉欲及殘年少施實效而有志莫遂負愧何言今乃以文字為官常語言為職業下無所見其能否上無所考其幽明循省初心有靦面目故於拜恩之日少陳有益之言孔子曰一言可以興邦而孟子曰一言正君而國定昔漢文帝悅張釋之長者之言則以德化民輔成刑措之功孝景入朝錯數術之語則以智馭物馴致七國之禍乃知為國安危之本只在聽言得失之間陛下即位以來學如不及問道八年寒暑不廢講讀之官談王而不談伯言義而不言利八年之間指陳文理何啻千萬雖所論不同然其要不出六事一曰慈二曰儉三曰勤四曰謹五曰誠六曰明慈者謂好生惡殺不喜兵刑儉者謂約已省費不傷民財勤者謂躬親庶政不邇聲色謹者謂畏天法祖不輕人言誠者謂推心待下不用智數明者謂專信君子不雜小人此六者皆先王之陳迹老生之常談言無新竒人所忽易譬之飲膳如服藥石則天人自應福祿難量而臣等所學先王之道亦不為無補於世若陛下聽而不受受而不信信而不行如聞春禽之聲秋蟲之鳴過耳而巳則臣等雖以三尺之喙日誦五車之書反不如醫卜執技之流簿書奔走之吏其為尸素死有餘誅伏願陛下一覽臣言少留聖意天下幸甚徽宗即位初哲宗將祔廟中旨索省中書畫甚急祕書丞韓宗武言先帝祔廟陛下哀慕方深而丹青之玩取索不巳播之于外懼損聖德陛下踐祚如日初升當講劘典訓開廣聖學好玩易志正古人所戒也殿中侍御史陳瓘乞觀無逸及漢唐事曰臣聞商之髙宗舊勞于外作其即位不敢荒寧享國久長為後王法無逸所陳是也漢之與唐四十餘君賢而可紀者三君而已漢之文宣唐之太宗是也文帝年二十有三來自代邸而有天下後世恭儉之主莫有及焉宣帝年十有八興於民間而有天下後世勵精之主莫有及焉太宗年十有八舉兵除亂又數年而有天下後世納諫之主莫有及焉此三君者方其在外之時斯民之利病朝政之臧否耳聞目見皆得其實後雖深處九重而考往驗今不忘鑑戒此其所以為賢也恭惟陛下久處潛藩充養聖德亦如髙宗舊勞于外春秋鼎盛歷數在躬亦如三君自外而入置無逸于座右採唐漢之所長則文宣太宗之事蓋有燦然可觀者矣神考所謂吾無間然者臣愚願有稽焉瓘又奏曰臣聞四時各守一節天道無節也有變而巳人君如天人臣如四時故臣宜守節不可變也君當制變不可守一節也坤之用六人臣之職一吐其言終身不變乾之用九人主之道變其往事無所不可如上天寒暑之變或霜或雨在我而巳運而無積嵗功乃成故曰王省惟嵗豈與四時同守一節而巳哉蓋以天言之則四時分守合而成嵗功以人言之則臣下執節變而為主道主道可變也臣道不可變也王安石守其節神考變之故人主之權不分于下紹聖大臣以不改安石為節而敢變神考之事其理乖倒可謂甚矣然則人臣之節人主之變不可不辨也徽宗時起居郎周常上言自古求治之主未嘗不以尚志為先然溺於富貴逸樂蔽於諂諛順適則志隨以喪不可不戒元祐法度互有得失人才各有所長不可偏棄遂昌令張根為帝言人言一日萬幾所恃者是心耳一纍於物則聰明智慮且耗賢不肖混淆綱紀不振矣願陛下清心省欲以窒禍亂之原遂請罷錢塘製造局帝改容嘉聽議禮武選編修官葉夢得召對言自古帝王為治廣狹大小規模各不同然必自以治其心者始今國勢有安危法度有利害人材有邪正民情有休戚四者治之本也若不先治其心或誘之以貨利或陷之以聲色則所謂安危利害邪正休戚者未嘗不顛倒易位而況求其功乎上異其言特遷祠部郎侍御史黃葆光上奏曰君尊如天臣卑如地剛健者君之德而其道不可屈柔順者臣之常而其分不可亢茍致屈以求合則是傷仁非所以馭下也茍矯亢以求伸則是犯分非所以尊君也帝感悟命近臣讀其奏於殿中左司諫江公望乞攬權斷上奏曰臣竊以一池四監未知其孰守十羊九牧莫知其孰從在朝之臣盈廷之議未知其孰是非仁不足與謀非智不足與明非勇不足與斷仁智勇天下達德操大物者其可忽諸不咨於嶽牧而有四罪之誅後世不以仁智為不足而以勇稱舜者以善斷故也捨已而從人可謂仁而謀矣不遍物而急先務可謂智而謀矣不資於仁智未有能勇者也非勇未有能斷者也非斷未有能成天下之務者也舜以是傳之湯故伐桀而斷之以今朕必往湯以是傳之周公故誅二叔而斷之以從十夫之哲周公以是傳之孔子其於少正卯疑若無顯過也斷之以七日之必誅書曰惟克果斷乃罔後艱信乎當斷不斷其蹈後艱也必矣先王知其然也故以衣服器用著以法象俾朝暮起居見而知之故天子之服十二章而黼居一焉王之四飲三酒凡巾皆黼焉天子諸侯於明堂其負必斧扆焉黼之為斧如以其有剛斷之才遇物必決遇理必斷取之以為法象其意亦深矣施之於服用之間雖不以言其丁寧告戒亦至矣此君天下所當蚤聞也昔髙宗舊勞于外故能知小人之情漢宣帝上下諸陵周遍三輔故能知閭閻姦邪吏治得失陛下在潛邸時天下利病民間疾苦以至于人臣之忠佞當熟聞而周知矣及臨御以來日見羣臣日聞輿議躬攬天下之事不為不衆矣以潛邸之所聞陳于前以臨御之所知操驗於後深籌靜計精閲詳講無一不宜故獨斷之權正在今日此臣所以汲汲為陛下道實機會之不可失也伏望陛下不牽於左右之論不膠於衆多之口不以先入已信之言宿于心不以未信遽告之言拒於耳從善有走阪之易去佞無拔山之難決事如析薪從理如破竹本在上末在下要在君詳在臣若以本付下無異持太阿而付人以鐏者也以要與臣是猶振千狐之裘而不得領以綱畀人而欲舉萬目之網者也不太踈哉箕子曰惟辟作福惟辟作威老聃曰魚不可脫於淵國之利器不以示人此言本必在上要必在君也伏望陛下攬威福持利器濟之以必行之斷龍見而雷聲風行而火馳不以芒刃嬰髖髀而取衄不以粱肉理疾而喪人之軀漢元帝不知出此以柔仁革法吏持刑太深之弊而牽制文藝優柔不斷天下機務浸弛矣伏望陛下以仁智勇行大舜成湯周孔之事以優柔牽制鑑漢元帝之失於衣服器用之間深思黼之為義朝夕起居未嘗怠忽雖萬機之叢湊日進于前不足治也黃帝曰日中必熭撡刀必割以言乘機會之不可緩如此伏望陛下少留神公望又進心説曰耳目口鼻之不相亂其所以能視能聽能味能臭有心為之官而管攝之也役使羣動鼓舞萬物莫知所以然而然者有心為之宰而制割之也能貴能賤能與能奪能生能死其所以貴賤與奪生死之者有心為之君而命令之也心之為心亦大矣世之論者莫得其旨以時求心而心非時之可求所謂出入無時者是也以處求心而心非一處之可得所謂潛天而天潛地而地者是也以體求心而心非一體之可見所謂不在內外中間者是也以用求心而心非用之獨得所謂無思無為寂然不動感而遂通者是也衆人放心賢人勿喪心聖人縱心至人無心惟無心故能忘天下能忘天下然後能得天下而若固有惟縱心故能不拘拘於天下能不拘拘於天下然後應天下而有餘裕前乎百千萬世之巳去後乎百千萬世之未來不離乎方今之一念此一念心直下研究不見倐起之端倪亦不得瞥去之蹤迹方生方滅之間亦了然無所倚薄惟狂克念作聖一念聖則全體是聖惟聖罔念作狂一念狂則全體是狂惟狂與聖只一念間爾一念瞥起之心與前乎百千萬世之已去後乎百千萬世之未來同一時爾蓋由念起念自心生心一心無二心故一時無二時也是以日新之德則念念故矣罔念之狂則心心新矣後之視今亦猶今之視昔故人君之運心動念其可不克謹耶四方萬里以為遠矣而不思四方萬里之外果何物耶以為虗空則虗空之外復何物耶空生於覺心之中如大海之一漚漚緣風激空自妄生妄本無妄虛亦非空空既非空則四方萬里亦非物也物亦非物空亦非空同一真境爾堯之光被四表格于上下禹之東漸于海西被于流沙朔南暨聲教文王之化自北而南其為感格則至矣而未免彼疆我界之有所也莊周曰六合之內聖人論而不議六合之外聖人存而不論論而不議猶在理也存而不論則心存而言絶矣言絶之處心境昭然心邇境亦邇攝萬法於一塵不為不足故會四海於一堂之上何足道也心逺境亦逺遍一塵於萬法而不為有餘故推恩足以保四海未足多也則人君置心之處其可自狹耶草木有理蟲魚有性有理而無知有性而無别無知則無好惡無別則無親疏自其異觀之肝膽甚逺矧無好惡親踈者乎自其同觀之天地為一矧有理有性者乎理不異性性不異心同一體爾一草一木一榮一謝吾心之理實在焉一蟲一魚一飛一潛吾心之性實具焉以為無知而夭之以斤斧可乎以為無別而困之以羅網可乎葉頭節尾毛端介末理無不具性無不存心無不在一蟲魚之身毛端介末之甚微一草木之體葉頭節尾之至細尚不忍傷其生況掩羣而畋竭澤而漁童山赭林暴殄不以時者哉豺獺祭天葵藿向陽蜂蟻之有君臣喬梓之有父子雖無知無別非此心實遍於其間者何因而然況又其類自有相賔相使相制相用之妙理人不得而知者為人君烏可不知此心之全體耶蜣之丸蟻之粒與夫承蜩貫虱者同一心之巧用也螳螂之斧莎雞之羽與夫扛鼎拔山者同一心之力用也工倕之削輪扁之斫庖丁之牛與夫堯舜禹湯之治天下者同一心之妙用也人君知此故能任六子之力而收天下之成功斡四時之樞而總一嵗之能事雷風疾驅而號令紛駃雨霜時至而刑政並行九重淵默龍見而雷聲四方赫怒氷凝而淵止用於大天地不能圍用於小毫毛不能位用之遠則四方上下莫能禦用之邇則瞬揚眉睫之不及其用如此其感亦然易曰咸速也唯無心故能感人心之速如此為人君者焉可不知此心之妙用也耶陛下踐阼以來為政取人無彼時此時之間損益惟時之宜用捨惟義所在可謂達用心之時矣陛下之心即神考之心神考之心即一祖五宗之心一祖五宗之心即堯舜三代之心心同則念同念同則時同時同則治同念是雖惡亦是念非雖善亦非桀紂幽厲之心未必皆惡也念非雖善亦惡矣齊宣王之心未必皆善也不忍一牛之觳􅑌孟子以為是心足以王矣念是雖惡亦善矣陛下以神考為念即當以一祖五宗為念以一祖五宗為念即當以堯舜三代之君為念以堯舜三代之君為念即當以桀紂幽厲為念以桀紂幽厲為念即當以齊宣王舉心動念處為念充此一念則仁不可勝用矣易曰通乎晝夜之道而知記曰大時不齊能知古今治亂之不齊然後能齊古今治亂不齊之理非通乎晝夜之為一者不知也能通乎晝夜之為一此所以為大時又奚必以今日之不齊而求合於昔之齊者哉陛下論心之時貴通此也守新邊之城堡陛下不以廣土為大棄湟鄯之屬部陛下不以􅕚國為小大小見於畛域陛下心無畛域則大小之勢平矣八荒之外無以異於仄足之下尺土寸天無以異於九夷八蠻之中陛下不以大小望於物則物亦不以大小望於陛下天下孰有爭者哉舜陶於河濵一年而成聚二年而成邑三年而成都無心於留而人不釋也太王居邠狄人侵之去之岐山之下而居焉無心於去而人不置也文王三分天下有其二猶服事商無心於大而人不矜也隨心而足陛下今不啻足矣心若不足無時而足故漢武甘心於大宛唐太宗鋭意於髙麗行不足守民力疲矣心不足之過也有民有土置君以安之也彼之土安於民矣彼之民安於君矣彼安則我安安而不去即我守也如是則豈獨守在四夷在在處處皆為陛下守矣蓋一心無二心故一處無二處也陛下論置心之處貴踐此也陛下於鰥寡孤獨常時有養疲癃老疾冬賜之粟一有凶荒水旱分遣使者賑貸賙恤無所不至垂死之囚刑可疑情可矜請必得生其仁於人之生者如此巳死之骨埋掩有祭其仁於死者如此燒田野有令不輕於植物矣殺牛馬有禁不賤於動物矣可謂知心之全體也禹見罪人而泣曰堯舜之人皆以堯舜之心為心今寡人為君百姓各自以其心為心是以痛之也詩曰他人有心豫忖度之他人之心可忖度者其體同也本同而自異此禹所以痛之也禹痛百姓之心異而臣痛有天下者以萬物之異鳯凰來儀百獸率舞堯之德也敦彼行葦牛羊勿踐履文王之仁也鳥獸草木何知而堯與文王何治而致然也若曰道化仁德此其大略也惟知心之同體然後能該能遍能感能格陛下以禹之心思百姓以堯文王之心及鳥獸草木則一人向隅陛下為之不樂也一草一木一蟲一魚取非其時陛下為之不忍也由一體無二體故一心無二心陛下論心之體當知此也陛下以旱乾為災夕祝而朝雨以日蝕為變晝祈而午晦天固高且遠矣其應陛下如響陛下以儉德率民故民日用而加富以侈心用民故民日勤而加匱以公心行賞賞不及者歡然若親被其澤以不忍之心行刑刑不當者愀然如身被其辱民固愚且下其應陛下也如神其故何也陛下心即天心天心即民心是以一言之出足以風四方一行之見足以表萬世蔀屋之下日月所不照而不敢為陛下隱幽囹之間天地所不聞而不敢為陛下寃陛下非親臨之也髙拱深嚴所以鼓舞天下者蓋有道也易曰神也者妙萬物而為言者也又曰鼓之舞之以盡神心之妙用其神如此可不素養耶心不可不虛不虛則不明不可不實不實則不誠不方則不足與守不正則不足與行擾擾萬緒靜有餘應紛紛羣言公無遺理陛下審是非以養公則言之逆遜無所逃也寡思慮以養靜則事之變態不足多也端好惡以養正則人知嚮矣致剛健以養方則事知制矣實以虛養故精誠外通虛以靜養故純白內含養之不匱擴之則彌滿天地掃之則不見蹤迹手提神器而萬夫不敢睥睨鐏持太阿而一介無敢覬望以之為政故日新而人不倦以之設教故神化而人不知陛下論心之用當契此也心之旨如此其廣且大彼梏於形骸之內見於肝膈之上昭昭然以為妙道之行曽無異於鼓井淖以議東海坐蚊睫而笑九萬之圗南也陛下紹述先烈可謂孝矣必欲豐功偉迹超然度越於百王之上當出自胸襟無膠於一偏之論無蹈于巳陳之迹故臣敢以心説獻願賜間宴一過睿目臣願畢矣莊周曰使道可獻子莫不獻於其父臣莫不獻於其君以道為果不可獻也周所言道也臣所知説本無説心亦非心道果在乎臣不敢知也公望又奏曰臣願君為堯舜莫不皆然未曾進以為堯舜之道者孟軻曰責難於君謂之恭又曰我非堯舜之道不敢陳於王前若軻者庶矣乎夫天無為而在上地無為而在下天地所以不息者乾坤默運之而已堯舜取諸乾垂衣在上故至尊之勢隆取諸坤垂裳在下故至卑之分別尊卑既位名分定矣然行乎名分之兩間蓋亦有道焉道者何虛與靜而巳致虛以應天下之務故天下之務雖沓至而常虛守靜以觀天下之動故天下之動雖萬變而常靜靜為動君虛為實主君主得於此天下皆吾役矣此所以垂衣裳而治也臣伏願陛下寡欲以養心故心常虛而疏通端意以寧神故神常靜而淵默道之所集理之所會雖一日二日萬幾若乾坤自然之運豈弊弊焉以事為哉堯之無名舜之無為用此道也有志乎二帝猶不能與三王並駕況區區下為文景之治乎自古未有不知道而能斡旋天下於掌握坐視夫民之阜者也臣有志於軻之為臣陛下勿以難為辭天下幸甚欽宗時起居郎胡安國上奏曰春秋大居正凡得正而居者天下莫不心悅誠服無所待於號令而歸焉者也自古人君多自旁支入繼大統則不得其正故魯僖公不書即位以少先長則不得其正故魯閔公不書即位未嘗受誓為世子則不得其正故魯莊公不書即位不承國於君親則不得其正故魯隱公不書即位夫即位人君之重事以不得其正而春秋削之端本正始之義微矣陛下聖躬誕降於靖和皇后母儀天下之初載此一正也上皇三十四王而陛下為之長此二正也建號東宫備物典策告于宗廟係天下之望十有餘年此三正也躬受內禪自道教一門之外殺生除拜軍國大事皆得自專此四正也履此四正而又有溫恭之德有儉約之行有憂勤願治之誠有好謀納諫之善故一日端拱當極而四方盜賊莫不鳥棲鼠伏解甲以聽朝廷之命而戴白父老相與扶杖傾耳拭目延跂嘉祐至和之治以終餘生冀得無憾此臣所謂天下莫不心悅誠服無所待於號令而歸焉之明效也惟昔有為之君不敢矜其所已能者以自驕必求進其所未至者以自益不召之臣不稱頌其君之所已能者以為佞必勉進其君之所未至者以為忠春秋大居正如鄭昭公亦正矣然失國出奔則直書其名得國復歸則又絶其位厲公入櫟遂與其爵而不貶何也已雖得正而無君德以居正或暗而不明或柔而不斷或疑忌而不寬則人得取而有之矣是故大居正者道之常春秋之正例也或與或奪者道之中春秋之變例也明莫先於知人斷莫勇於任賢而去佞寬莫大於藏疾而納度外之讐陛下具四美履四正而又進於三德則寰海可保夷狄可服祖宗之基業可以長守而勿墜矣髙宗立御史中丞許景衡乞修德劄子曰臣聞堯以天下為憂不以位為樂也今中國勢弱敵人暴橫二聖播遷而陛下纂臨大寶適當此時非止堯之所以為憂也思所以強中國思所以攘夷狄其説雖多然其大要則在陛下修德而巳記曰為人君止於仁為人子止於孝書曰孝乎惟孝友于兄弟此皆修德之要也而以至誠不息為本故在陛下一話一言念必在茲一號一令念必在茲一賞一罰念必在茲以至于出入起居雖斯須之念未嘗不在茲也孔子曰言忠信行篤敬雖蠻貊之邦行矣夫如是則中國之安強可冀而二聖之來歸有日矣不然則念不在茲而誠意怠矣是以位為樂也故在言動則未必慎在號令則未必信在賞罰則未必當盜賊未消而敵人未服如是則中國之安強未可冀而二聖之來歸未有期也天下之愚夫愚婦尚不忍聞此言而況於陛下乎然則今日中國之安危二聖歸期之淹速乃在陛下一念之間耳臣愚伏望陛下戒之慎之始終不倦則何為而不成何求而不獲耶自古帝王憂深責重未有甚於陛下者則為陛下計宜何如哉天下願望如此而臣愚不敢不盡言惟睿明采擇歷代名臣奏議卷二
