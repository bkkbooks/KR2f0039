body:
  text: 歷代名臣奏議卷三十九明楊士竒等撰治道宋神宗時樞密使文彥博赴河陽陛辭面奏曰陛下憂勤庶政切於致治乃堯舜用心更願陛下廣開言路兼採博納使下情上逹收攬權綱無使權臣賣弄爵人於朝須協公議與衆共之任官令久於其任候所職成敗明著而後賞罰用人當兼取群材同濟時務若專任一才即朋黨膠固者希時而並進孤忠自立者望風而斂退更望法天地簡易之道守祖宗盈成之業使上下安靜則不治而自治近侍新進纎佞之人多是妄有更張興作以為進身之術陛下今不采納臣愚忠異時必當自驗臣惟望聖明早悟即天下之福神宗與端明殿學士吕公著從容與論治道遂及釋老公著問曰堯舜知此道乎帝曰堯舜豈不知公著曰堯舜雖知此而惟以知人安民為難所以為堯舜也帝又言唐太宗能以權智御臣下對曰太宗之德以能屈己從諫爾帝善其言鄭俠上奏曰十一月初一日狀蓋為大臣誣罔至尊絶不近理彼皆有所憑恃而後敢為使人憤惋不能已是以入文字凡事皆畫一如一大臣對陛下皆云河東北陜輔之流移者南方有燕子田之說臣今勘㑹河東北陜輔之民自去冬今春流移至今不已何人是在南方有田者云云其一項言大臣對御多以天旱民流百物失所邊鄙背叛用兵不已為天數者臣乞問其人為學周公耶學孔子耶學孟子耶周公作無逸歷陳人君之享國三四十年或五六年皆由人君嚴恭寅畏天命自度治民祗懼不敢康寧則有永不知稼穯之艱難不聞小人之勞生則逸則有短又曰惟不欽厥德乃早墜厥命使周公相陛下而天旱民流百物失所四方兵革不息如此周公曰天數乎孔子告哀公曰存亡禍福皆己而已天灾地妖不能加也使孔子相陛下而天旱民流百物失所兵革不息如此孔子曰天數乎孟子曰殺人以刃與政有以異乎又曰始作俑者其無後乎如之何其使斯民饑而死也又曰王無罪嵗使孟子而相陛下而天旱民流百物失所兵革不息如此孟子曰天數乎然則群臣所為學者皆非周公孔子孟軻之為人而所以相陛下者皆非周公孔子孟軻之存心則陛下獨力何以為天下臣所謂陛下獨力者謂無臣也所謂陛下無臣者非無羣臣也無大臣也所謂大臣者非謂大佩髙蓋秉執大政日食萬錢以自肥腯者以道事君不可則止而已其髙爵重祿則日歸於己清資美職則分授子弟中使相望於道路黃金並聚於私室而天旱民流百物失所四方背侮兵革不息則曰天數此為大臣則屠沽僕𨽻誰不克為如被甲登殿等事臺諫如芻靈木偶之類皆所畫一右願陛下登宣德門召文武百官京城之民以臣狀宣示如衆說以臣之言是則望陛下稍稍懲戢左右近臣使無得公然肆誕以戕害百姓危阽社稷如衆以臣言為非即乞斬臣於衆人之前以塞京師流言洶洶之路强幾聖代轉對劄子曰伏覩朝堂曉示近降中書劄子節文奉聖旨臣僚已授差遣並令依例朝辭許當日實封轉對文字於閣門投進者臣身在冗列特心思有云補欲一進狂瞽之說而厥路無繇今乃承詔得自獻其愚兹實不可常之遇然不以二帝三王之道陳於前是不以堯舜文武望吾君也臣竊謂致治之本在用人用而不得其當如勿用徒明有所纍而無益於治也故其先論用人且廣睿德逹衆志宜莫如聽言聽不得其審而是非參用則纍於聰故其次論察言夫巧僞興則誠實廢天下之俗將相率而趨於詐故其次論所以矯士風之僞又聳士大夫之節者在遇之以厚儻進責其節備而退待其身薄則賊恩而無勸故其次論所以措老臣之宜今臣之所陳敢不以堯舜文武之道有望於陛下是故竊不自知輒冒不赦之誅著篇於左惟陛下垂聽而加擇焉一論用人臣伏觀陛下以聰明睿智之德臨有重器方鋭然垂意於大有為之際躬攬萬化乾剛震烈以權以斷凡事有以宜於人者朝思而夕行之即不可持循而固守雖前世已行之熟未嘗或憚改天下歡呼鼓舞拭目以觀聖人之作而跂踵以待極治之成謂按資計日不足延卓異之士而責非常之效或左右一言以為材或偉辭髙論自合於上意則超然置於平進之上而不復限常叙在聖君求才之心為得矣奈何未聞有竒功顯業所稱朝廷之所以寵異而聳動衆人之心使之歆羡者不唯不如是又人人有不自滿之色而憣憤其躐已且興勸之道未一得而奔競之風已四起矣借如某士以心計進既越千百人而處之金穀要劇之地矣經費一有不給於內民力一有屈竭於外方是時也宜倚辦斯人果籌畫有以應猝而財用繇其所自出雖日遷之職人不以為過其以文學政事進者類試之若是惡有不服者歟今則不然取其名不責其實始以此進而終不以此試又冒虛名而受實用者或其中無以異衆人欲人人自安其分難矣且不得知於左右則不能自逹於朝廷計資級纍日月則不能底富貴之速以是走公卿之門唯恐足跡之或後望廉恥之長而奔競之熄抑難矣持甚髙之論者未必無甚卑之行騁喋喋之辨者未必有犖犖之見言之不可必信也如此噫虞舜之智非不及其臣又命之以九職者皆當時易見之人猶咨俞曲折以盡羣臣之可否者知獨見不足以取人也矧一言以為材耶既奏以言矣而復試以功者知徒說未足以明其效也矧一論之偶合耶臣愚以謂取人以言則詭辭巧辨者出以希一時之合曽無益於實也進人與其失於速也寧緩進真才失之緩其德章而不可掩終為國家用若庸人誤速進也徒激不如己之憤而於誼無所勸然則若之何其可用人法虞舜斯可已一論察言臣竊以聖人體不降几席之上而聰明隱於旒纊之內凡天下臣民事物之情洞然若家至而日見者繇廣問以得之也問之者廣則言之來無窮君子小人有時而雜吾聽也用其言善則失之於跬步況其逺者乎得失之幾在用君子小人之言耳惟君子者其言初若厲已而終有以利於行故聽之者難也不必效於近或有驗於逺以為闊於用也小人則不然其言逢意而易入行於逺則泥措於近或通以為切於理也其有所愛必有所是其有所惡必有所非而是非未嘗牽於愛惡之私者君子之言也以愛惡而移是非其情僞卒莫可見者小人之言也於戲問之非艱受言之為艱受而察之又其艱也昔虞舜所以獨稱大智而後世弗可及者由好問而察邇言也既好問矣下情其有不通乎又察言矣是非其有不白乎故其智塞乎天地之間而莫與較其大也恭惟陛下逹萬化之變而不自以為神燭萬事之隱而不自以為聖舍己稽衆畢采群說由公卿以徹于百執事莫不人人爭竭其慮言路開而治道行矣然而惟君子與小人其言關乎得失方聽納之際臣願陛下用虞舜之察而辨之在早使大公至正之論行而不為巧辭邪說之所勝則其為智愈大矣一論矯士風之僞臣伏聞聖王在上莫不欲明化厚俗所以教化醇而習俗媺者由先正天下之風其風正顧有蹈非其道乎臣竊觀急賢願治未有如今日之切而作僞成俗亦未有如近世之盛方陛下寤寐咨訪思得惇實朴茂之士進以為風俗之倡有人焉曰仕者有某士處者有某士其為人也性恬而操約行淳而質茂固外物無所纍其內公卿以言諸朝而朝廷用之不待頃天下之士知上之所取者以是則有隂為沽激求聞之計而陽為靜退不競之行其心唯恐爵位之不髙而其言唯恐山林之不深至於矯情飾貌以譁衆動俗及名成而計得矣而意有所未滿且懼進之不加速也則又有蘄閒願退之請以邀乎上其請數者其寵益固小詐則小得志大詐則大得志後來者務勝於前人愈假不可及之言行以濟諸詐朝幸進而暮脫其所守浸淫誕漫天下日入於僞而不知止此風遂肆望俗化之厚其可得耶噫巧言令色不容於堯之朝今士僞其行豈聖世之所宜有夫欲矯之使正豈曰無術且衆人曰某賢矣其行淳又不茍乎進必考其實果非矯妄以疑世又有可進之勢而不進是賢也然後進則進不緣其僞又其欲退也聽其所自退則真退者出而士之言行進退皆誠道天下之俗其有不歸於正乎一論措老臣之宜臣伏聞惟聖王能養臣下之節其進而使之也既以禮及其退也又示之以不忍輕去之心然後人知自重而不失去就之正惟其去就之不失所以廉恥興而風節完矣古者大夫七十而致仕是老者必自告於其君也若不得謝則必賜之以几杖是臣雖告老而君或不聽其去也老而必以告者知耄將及矣就有萬鍾之享不可得而戀以安吾義也告之而不聽其去者彼誠老矣而力若可勉猶當强而祿之以終吾仁也近世俗薄廉恥不行於衣冠之間或靦然忘其齒髮之衰筋骸之憊貪進而不知止至有其身嘗用於國家矣一日老與疾相㑹怗怗然求蒞閒局以不得請為憂者有自蔽其狀告上以不疾至放之田里猶惓惓然有乞哀不欲去之色者噫仕而至於老且疾可去矣然猶不去以自辱彼固不足惜也且少盡其力而老無以容其身其在仁政抑恐有所纍爾今夫四海之廣百官之富若此等輩豈不容有耶茍疾賜之告以冀其萬一之安老置之散以養其不復久之嵗月免斥歸之名則疾者無所愧獲茍得之祿則老者無所恨然後全進退之體以示夫不可輕之去就顧老而疾者既愛之若是則少者勉力而無恤於其後矣風節其有不完者哉昔在三代之治唯周家所以號忠厚者獨養老之為備成周之養庶復行於今日臣不勝大願右謹具如前是四篇者粗竭臣愚區區之忠曽不足以仰輔盛德之萬一干冒宸嚴臣無任激切屏營之至哲宗即位初起居舍人邢恕上疏曰臣竊惟皇帝陛下纂紹大統太皇太后陛下躬親庶政于兹纍月政事之大者略已損益施設矣然自古以來政事出房闥其患常在大臣擅權同列暌乖互相傾軋群下各有附麗造為朋黨則不能同心協力王室卑弱而太皇太后聖情簡嚴其於政事無有適莫唯是之從務合僉諧不信偏入之言不惑背憎之說聽言必驗之以事疑似必究其情實故左右不得以誣欺相傾軋如是則群下固無所附麗不得造為朋黨矣前代母后臨制常患外戚僭驕盈溢交通請謁以紊刑賞而太皇太后爰自內輔英宗檢制外家內有禮法以致總覽政事族人謹畏加慎前日則外戚固無驕盈之漸矣漢唐諸后茍專聽斷者北司要人未嘗不鼎貴强盛而太皇太后端居凝然罕所降接雖至親近持法謹嚴不私假借泊然無欲自宫省老於事者率以為莫能窺測無不惴惴小心則北司固無貴盛之嫌矣自先皇帝寢疾外廷大臣曽未及建一言而太皇太后獨斷出於聖心儲二之建旬浹已前固已先定及先皇帝奄棄群臣而皇帝即大位太后以嫡祖母保抱攜持天性之親根於自然間諜之語不起慈愛之聲日聞至於拔用人材修舉政事自前世以來號為明王聖主殆無以過制政下令不出房户簾帷之間而惠澤流於八區仁聲動乎萬里誠能益虛聖心務受盡言克勤以繼之則巍巍乎赫赫乎書契以來未之有也然而太皇太后止於今日便謂天下無事可以髙枕而卧則固未也何則今邊兵未解外域方將窺伺中國動搖疆埸以修怨刷恥坐費厚賂而民力積困今幸年榖豐稔政事設張雖以先其急者而恩澤未浹惡吏尚繁命令之出或未能奉承而朝廷美意不得下究儻遇饑饉師旅天下未免猶有盜賊之憂此正聖心夙夜焦勞講求治本之時大臣忘身徇國背私向公同心合力之日臣請姑條五事以獻臣竊惟皇帝方育德思道未即親事太皇太后雖總覽大綱而不悉留神於細故則不得不倚辦責成於大臣所以布為朝廷耳目賴以互相檢察者不得不備設臺諫大臣誠能存心盡公處事必當則臺諫雖設而可以無言陽城為諫議大夫六年未嘗論事及德宗罷陸贄欲相裴延齡然後以死固爭若陽城則所謂逹大體也至於臺諫時論細故末節以摧折大臣為大臣者誠能體國則亦不宜以此嫌忌臺諫朝廷亦不當以細故末節而於大臣輕為厚薄進退如此則國威伸於上主恩行於下大臣得體而臺諫舉職矣唐德宗初即位代宗將藏山陵禁屠殺而郭子儀家奴殺羊裴諝以職事劾奏或曰小事不足以傷大臣諝曰尚父方貴盛天子新即位必謂黨附者衆故劾其細過以明不持權也吾上以尊王室下以安大臣不亦可乎若裴諝者可謂有逺慮矣今誠備設臺諫而大臣存心至公所失不過細故末節則不言者固為逹大體而言者未害其有逺慮也然則增廣臺諫之為有益明矣如是則朝廷耳目布於下而太皇太后可以雍容頥養保心固體萬夀於上仁宗末年大抵淵默罕復親事委政大臣大臣不敢懷姦挾私者用此道也而況太皇太后振提其綱領乎雖然設之不得其人猶不設也臣愚以謂莫若深詔大臣人各舉其所知而後合議於上前太皇太后考其素履有某事可稱有某節可尚然後舉而用之則所失者亦鮮矣一也古者天子一嵗或五嵗一出巡狩察吏善惡究知民間疾苦後世人主深居九重之中不能冒風雨犯霜雪為寒暑之所偃薄疲筋力於道路自秦以來始置御史監察郡縣而漢改為刺史乘傳行部嵗終得奏事京師唐之所謂採訪使今之所謂轉運使副判官提㸃刑獄常平倉官之類皆是也此即代天子巡狩者其任不輕也明矣國朝故事率先歷知州差遣然後擢為監司或自通判先擢權知州然後擢為監司自通判擢用者間亦有之而幾希矣唯自臺諫官出為監司乃有資序未深者然昔者官未升朝則不得舉臺官朝官往往曽歷知縣比為臺官又為監司而資序則率通判以上當是時監司髙者歷知州下者率歷知縣其更事老成可倚辦者多矣詩曰雖無老成人尚有典刑魏太祖曰吾非聖人也更事多矣然則老成人固重於典刑而更事多者至竊比於聖人則老成人更事之為益明也古之任人所以四十强而仕五十命為大夫者蓋此意也頃者方急人才以便事功初置提舉官率用京官為之有朝脫銓選暮為監司者此乃一時用人之意非持久經逺之法也故先帝末年選用尚書省官非知府不得為郎官非通判不得為員外郎則先帝固知資序之不可廢而老成更事之人有益也特以施設先後有不暇給故於監司未遑釐正耳今誠深計天下之利害郎中員外郎典領職事止於一曹而監司按察乃一道逺者綿地千里州縣百數官吏數百千而户口生齒以萬億計則其利害輕重不相準明矣然而資序之限特設於郎中而未及於監司者豈先帝開其端而資其終者有待於今日乎臣愚以為提舉以上非通判資序自今不宜除授即自臺諫除者不在此限庶得更事老成之人布為監司而天下之民浸被聖澤此今日之急務也且又可以息馳騁之弊而使官吏稍安職業于以收成材矯薄俗所謂一舉而包兩利二也周書曰惟天立后王君公承以大夫師長不惟逸豫惟以亂民古語曰天之生民非為君也天之立君以為民也周之太王為狄所侵以愛惜民命去邠遷岐寧棄其國不忍鬭其民詩人以為太王肇基王迹以得其民也此孟子所謂得乎丘民為天子者也夏書曰民為邦本本固邦寧然則民之急也如是三代而下西漢之文帝東漢之章帝號為仁德之主竊讀二帝本紀恤民惻怛見於詔令嵗嵗有之漢宣起於閭閻知民疾苦時之要務每歎息曰與我共治天下者其惟良二千石乎漢郡太守得自辟除進退縣令長太守得人則縣令長無不良故漢所選用者惟二千石耳隋唐以來州縣守宰率皆命於朝廷則郡縣最為親民之任治天下者以民為急而守令最為親民不可不選不可不激厲唐之開元號為盛際所以致之者有姚崇宋璟以為相也臣嘗讀元稹連昌宫辭稱姚宋之所致治之大略不過於燮理隂陽偃戢兵革遴揀守令皆出宰相而已比嵗守令善狀罕有聞焉詢諸往來或舉一路郡縣百數而良守令難以屈指一二計則生民受弊者為不少矣方朝廷用人如不及之時掄選才能比比出於踈賤而獨於守令以治績超擢者無幾也得無偶未之及耶今誠欲簡拔守令以勸循良使惠及吾民則先謹擇監司監司非其人則朝廷雖有甄别守令之意而監司䝉蔽朝廷不得其事實則所謂良者不良所謂能者不能矣臣愚以謂今日天下監司未足倚信則莫若先敕執政大臣聚議博采拔求守令治狀尤異者數人舉天下之廣宜不難得大抵宜以愛民惻怛為先奉公營職為後蓋後世之法茶鹽酒榷征管之利多岐雜出不若堯舜三代之法一出於愛民故唐陽城有撫字心勞催科政拙之語而德宗嘗令對策宰相欲第其髙下未知所出薛珏曰今取縣令不專文辭宜以意在愛民者為先也宰相從之既而所取莫不得人則守令宜以愛民惻怛為本亦可見矣以此求之誠得其人則其資任髙下優加進擢見於訓辭務從褒異且以厲天下所取不過數人而為守令者莫不慕效則四海之內億兆之衆人人被潤澤蒙厚德矣然後深詔御史臺舉劾監司尤無狀者稍加澄汰監司之選既清而付之以考察則守令之良能者必出矣三也孔子曰百姓足君孰與不足或問揚子曰桑𢎞羊榷利而國用足如何曰譬之為人父而榷其子縱利如子何未有子富而父貧者也禮記大學亦曰未有府庫財非其財者也故曰富有天下則天生地長舉天下之物莫非人君所有在民在君誠無以異前日陜西五路進兵百姓負糧入界和雇一夫率費百千初時民力尚全莫不相率竭其力以應命及後再三調發民力弗堪王師迄不能再舉然則民力弗堪國家固不能以舉事則富民者乃所以富國也漢武帝末年深悔既往之征伐下哀痛之詔罷輪臺之戍乃封丞相為富民侯此武帝所以為雄材大略者蓋能知悔又知所救弊也唐自中葉已後既經安史之亂王室微弱藩鎮盛强皆自擅其財賦故有常貢之外别進羡餘以希恩寵人主急於用度因而假借蓋以方鎮既擅財賦朝廷難於調發故耳今四方萬里內外一體詔令一出迅如雷霆屈伸自如勢若身之使臂臂之使指縣官之於百姓即有所取何求不獲不必令轉運使於平居無事日為倉猝征斂之計時以民財濫圖恩賞也昔仁祖時蘇順元為淮南轉運使嘗進羡餘有詔免劾所進錢止令留住本路以備灾傷臣愚以謂今日誠欲生民蘇息逺近䝉福宜下詔書明敕諸路轉運司不得獻進羡餘即嵗計有餘可但令留充本路次年支費抑非徒此而已也發斂之際又有抑配之弊支移折變之苛官出則以陳粟腐麥代見錢支俵如充青苖和買之類以率計之號為千錢者民間所得不過數百此所謂抑配之弊也賦入則法當近送者反令逺輸如南州所納則支移北州道理皆逺負輦滋費則并以腳乘課令出錢法當出粟乃折令出麥麥固加貴於粟既已出麥則又折令納錢錢固難得於麥矣於是有斗當三四十金而所納至於百錢者轉運使止以唾咳指揮坐獲倍利此所謂支移折變之苛也凡此皆法所當禁而轉運使比多公違詔條無所忌憚願敕所在安撫使都鈐轄提刑司覺察聞奏及許州縣守令吏民自陳如此則掊克之吏庶知畏職矣且青苖錢取息終嵗不過二分而向者議論紛紜纍年不定今轉運使公違詔條肆行抑配支移折變旬朔之間取民倍利豈不甚哉或曰轉運司財賦所仰給今束之太急將無以舉職是大不然使轉運使果才嵗計所須止於詔條之中自可應辦有餘矧復嵗計之外朝廷不求羡溢加以善政所感年榖必應租賦所入不緣水旱蠲減何患不足豈有公違詔條力脅州縣出則以片言估物而就髙價入則以尺紙粗色而取貴直以此論功無異戲弄此正不才者之所為又法所當禁何謂束之太急哉四也賈誼有言人主之尊如堂羣臣如陛衆庶如地陛九級上廉逺地則堂髙髙者難攀卑者易陵故人主之勢非能獨尊也自一命之吏纍而至公卿次第益尊而人主加焉然後為至尊耳國朝故事拜宰相樞密使官必除侍郎同知樞密院已上必除諫議大夫三司使必除給事中若侍郎權御史中丞必除諫議大夫以直龍圖閣權領邊帥官小猶除正言自天章閣待制已上則固準此四方大郡帶都鈐轄或大都督府為守者非帶館職則諸曹郎官吏民聳然知所尊奉以其異於他官也權同知樞密院已上皆政事之臣權御史中丞乃紀綱之任而三司使實主邦計故髙者則必處以侍郎其次則兩省官為之諫議大夫是也直龍圖閣為邊帥事任要重天章閣待制已上乃侍從官故必以小兩省為之正言是也假使不論職名而官直為正言則固已可貴矣當是之時官職清濁髙下錙銖方寸皆有分别不得淆亂踰越故朝廷尊榮人知嚮慕先皇帝獨患名實不正故改為官制以寄祿官寓品秩名實既正而推行之日淺其於甄别流品遷叙次第固未有暇向者官制雖行而有旨命兩省官修補其法則此固在所講也今以堂堂有宋盛明之朝自尚書已上率多試官豈不陋哉然為尚書者原其所自來則皆嘗歷學士職其品秩與尚書不甚相逺為侍郎者率多由天章閣待制除用與侍郎名品亦略相當然一為職事官則必除去職名故有承議郎試尚書者見者不知其職嘗為學士也第見承議郎與昔國子博士等耳乃為尚書豈不可輕哉名藩大郡或臨制一道或鎮一都㑹而既無三館貼職又無諸曹郎中員外捨直龍圖閣待制已上則皆朝奉朝散郎若大夫為之其下與通判簽判知縣監當官名無異也內外體勢浸以卑損上下陵遲吏士軍民率有慢輕之意陛廉太削非所以尊朝廷也加以官制之行於兹已逾三年率以滿任今諫議大夫中書舍人給事中侍郎遷比待制爾若遷尚書則為大峻即自諫議舍人給事遷侍郎則與自大卿太常少卿除侍郎者為一等反不為之遷矣是遷叙未得也今欲除用人物或資與官相對而其才不必稱或才與事適當而據資不相準譬猶户部侍郎闕為天章閣待制固可入其才不必稱為龍圖閣直學士才或稱任則資不可屈是除受未便也矧自直龍圖閣而上所存職名皆禁奧殿閣圖書之任今以寄祿官在外則有加焉而在京師則不可本末倒置體勢未順且朝廷職名本待賢俊今雖其人宜在朝廷而一除職名則必出補外如趙彥若可以留備臺諫而緣除龍圖閣待制故出知亳州孫甫年少任職可當省部繁劇而緣直龍圖閣故出知陕府授受之際已見其拘牽矣臣愚以謂今日官制之論不過秦漢漢之加官若諸吏左右曹散騎給事中之類即今之職名也官制祖述止於唐六典而三館貼職集賢院學士六典具載本職施於朝廷今自龍圖閣已上職名誠許令職事官兼帶則不害其為正名也而又有三利焉以待制學士職為尚書侍制則試官可去中外有所瞻仰吏民知所尊奉陛廉之勢益峻而可以尊王室隆主威遷授之際職雖學士可以下為侍郎待制可以兼領卿監直龍圖閣可以冠省寺之職為官擇人無所留礙殿閣圖書之任得兼內外本末不至顛倒體勢順序所謂三利也故事職名自校勘至龍圖粗而論之猶有四等其上又有集賢殿史館修撰集賢院視職事之髙下官品之大小而加焉亦有始加即為修撰直龍圖閣者必有差遣內則三司副使同提舉在京百司之類乃得為之外則帥臣三路轉運使江淮發運使久次為監司典大州若都鈐轄大都府之類乃得為之其他皆以嵗久次第纍遷而後至職雖為直龍圖閣修撰又必差遣事任要重然後得遷待制諫議大夫其法至詳密故朝廷用之有所勸激而士大夫由之以進不得僥幸今既盡削去三館貼職而獨存直龍圖閣凡須寵以職名者無有髙下一切為之故有府界提㸃而帶直龍圖閣者今日與之既失其太優而後日一遷則其上為天章閣待制將又失於太峻於此時不復早計前慮則他日用之必困者也今果職名為可去則當一切除之然而直龍圖閣之類尚存者果不可去也職名果不可去而待制以下獨存直龍圖閣何哉今既獨存直龍圖閣又必以寵帥臣資望之淺者欲以聳人觀聽也然而聳人觀聽者不獨至於帥臣而後然其餘典大州當方面據都㑹若江淮發運使三路轉運使之類皆當係人觀聽者也今寄祿官既以通為一等又無清曹郎官臺諫之屬則所以稍辨異者唯有職名耳而一以直龍圖閣待之其可乎臣愚以謂昔日館職為優幸者唯為校理一年即為通判資序三年理知州為太過爾今誠於此裁損率以二年成資為一任而盡復校勘已上至修撰等貼職此固於正名於官制可以並行救其所不及使髙下等級粲然有序朝廷用之而有所激勸士大夫由之而不得僥幸流品分别吏民尊信五也今誠行此五者皆國家之大體時之要務以太皇太后之聖智宜無所封即參之大臣訪之羣議恐無以易五者畢行私徇滅而德意彰民心固而主勢隆然後揆之以道將之以德以虛心為本以無我為用唯大公是存唯至正是守無有偏黨唯是之從所謂道也體道而不失不為好惡所奪不為喜怒所遷有得於身所謂德也道德立於上而公卿觀法於下上下相濟然後長忠義以尊吾君長廉恥以消羣枉用人必以信行為主而後論才能考績必以功實為先而後責文具謹擇能吏練習公家臺諫故事者裁省簿書行移務在先急闊略苛辟使人力足以勝事倣唐律令格式事有經常者著為定式不須上問官曹小事有所建請次第得專裁決不必一一奏覆小懲大戒付之省寺俾得警胥吏之違慢以防滯留如此則小大畢舉太皇太后可以優遊泮奐責成於上保護將就皇帝聖質至於成德則所為宗社之慶蒼生之福豈有極哉臣自惟太皇太后親政以來首䝉拔擢度越比倫則臣之所以圖報效亦不宜自同於衆人冒瀆宸嚴臣無任祈天俟命惶懼屏營之至監察御史王巖叟論治道貴清靜儉約奏曰臣觀歷代君臣講治道者多矣然莫如貴清靜而敦儉約蓋天下本無事因擾之而事多事多則民勞民勞則怨民怨則國家有緩急雖賞之而不為用此所以莫如貴清靜也天下之人所以養生送死者本自足由奪之而後困困而後為盜賊若不厚其本而徒嚴其末雖殺之而不禁此所以莫如儉約也臣竊傷比嵗以來好進之人紛紛建議天下勞於多事百姓困於不足故臣願陛下以清靜儉約養天下使百姓安且樂百姓安樂則自然隂陽和而風雨時海內將不勝其富矣人以為難臣以為易何則陛下自己有此心惟在守之而勿失爾不勞陛下費精神用智力臣故曰易如䝉採納乞以臣言詔輔臣使體聖意幸甚侍讀提舉中太一宫呂公著到闕上奏修德為治之要十事曰臣近准詔書令臣發來赴闕已於今月二十日朝見訖竊聞近日臣寮未有上殿班次臣雖忝先朝執政之臣亦未獲一親法座少奉德音然自忖纍世䝉被厚恩惓惓報國之誠不能自已輒具奏對陳其一二冒瀆聖聰臣無任惶懼之至臣伏覩皇帝陛下紹履尊極方逾數月臨朝穆穆有君人之度太皇太后陛下勤勞庶政保佑聖躬德澤流行已及天下臣逺從外服召至左右竊思人君即位之初宜講求修德為治之要以正其始然後日就月將學以緝熙於光明新而又新以至大治是用罄竭愚誠考論聖道槩舉十事仰贊聰明一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諫七曰薄斂八曰省刑九曰去奢十曰無逸皆隨事解釋粗成條貫不為繁辭以便觀覽伏望陛下留神幸察如言有可採即乞置之御座朝夕顧省庶於盛德少助萬一謹具如右一畏天書曰皇天無親惟德是輔又曰惟上帝不常作善降之百祥作不善降之百殃蓋天雖髙逺日監在下人君動息天必應之若修己以德待人以誠謙遜靜慤慈孝忠厚則天必降福享國永年災害不生禍亂不作若慢神虐民不畏天命則或遲或速殃咎必至自古禹湯文武以畏天而興桀紂幽厲以慢神而亡如影隨形罔有差忒然自兩漢以來言天道者多為曲說以附㑹世事間有天地變異日月災眚時君方恐懼修省欲側身修道而左右之臣乃據經傳或指外事為致災之由或陳虛文為消變之術使主意怠於應天此不忠之甚者也詩曰我其夙夜畏天之威于時保之然則有天下者固當飭己正事不敢戲豫使一言一行皆合天心然後社稷人民可得而保也天人之際焉可忽哉一愛民書曰撫我則后虐我則讐人君既即尊位則為民之父母萬方百姓皆為己子父固不可以不憂子若布德施恩從民所欲則民欣戴欣戴不已則天降之福若取民之財不憂其困用民之力不恤其勞好戰不休煩刑以逞則民必怨叛怨叛不已則國從而危故曰民為邦本本固邦寧然自古人君臨朝聽政皆以赤子為憂一旦用兵則不復以生靈為念此蓋獻策之臣設姦言以導上意以開邊拓境為大功以暫勞永逸為至計此世主所甘心而不悟也夫用兵不息少壯從軍旅老弱疲轉餉伏尸流血而勝負得失猶未可知也民勞則中國先敝夫何足以為功兵興則朝廷多事亦不得而安逸也故凡獻用兵之策者欲生事以希寵媚上而營私耳豈國家之利哉一修身天下之本在國國之本在家家之本在身夫欲家齊國治而天下化莫若修身修身之道以正心誠意為本其心正則小大臣庶罔敢不正其意誠則天地神明皆可感動不誠則民不信不正則令不行況人君一言一動史臣皆書若身有失德不惟民受其害載之史策將為萬代譏笑故當夙興夜寐以自修為念以義制事以禮制心雖小善不可不行雖小惡不可不去然人君進德修業實繫乎左右前後夫習與正人居不能無正猶生長於齊不能不齊言也習與不正人居不能無不正猶生長於楚不能不楚言也故曰僕臣正厥后克正僕臣諛厥后自聖一講學王者繼祖宗之業君億兆之上禮樂征伐之所自出四方萬里之所視效智足以窮天下之理則讒邪不能惑德足以服天下之心則政令無不行自非隆儒親學何以臻兹然天子之學與凡庶不同夫分文析字考治章句此世之儒者以希祿利取科級耳非人主所當學也人主之所當學者觀古聖人之所用心論歷代帝王所以興亡治亂之迹求立政立事之要講愛民利物之術自然日就月將德及天下書曰王人求多聞時惟建事又曰念終始典於學厥德修罔覺故傅說之告髙宗者修德立事而已至漢之眺錯以為人主不可不學術數錯之意欲人主用機權巧譎以參制羣下而景帝用之數年之間漢罹七國之禍而錯受東市之誅蓋其所主者不出於誠信而已由是觀之擇術不可不謹也一任賢昔成王初蒞政召康公作卷阿之詩以戒之言求賢用吉士蓋為治之要在乎任賢使能能者不必賢故可使賢者必有德故可尊小賢可任以長民大賢可與之謀國若夫言必顧國家之利而行足以服衆人之心夷險一節而終始可任者非大賢則不能也人君雖有好賢之心而賢猶或難進者蓋君子志在於道小人志在於利志在於道則不為茍合志在於利則唯求茍得夫忠言正論多咈於上意而佞辭邪說專媚於君心故君子常難進而小人常易入不可不察也自古雖無道之君莫不欲治而惡亂然而治君少而亂國多者其所謂忠者不忠而所謂賢者不賢也書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道人主誠存此心以觀臣下之情則賢不肖可得而知矣一納諫昔書稱成湯之德曰從諫弗咈改過不吝湯聖君也不曰無過而曰改過者言能捨己而從諫則不害其為聖也及紂為天子彊足以拒諫智足以飾非紂非無才智也然身滅國亡而天下之惡皆歸之者言愎諫自用則才智適足為害也前代帝王無不以納諫而興拒諫而亡者在史册一一可考蓋貴為天子富有四海貴則驕心易生富則侈心易動一日萬機則不能無失固當開道而求諫和顔色而受之其言可用則用其言而顯其身言不可用則恕其罪以來諫者夫忠直好諫之臣初若逆耳可惡然其意在於愛君憂國諂佞阿諛之士始若順意可喜然其情在於媚上而徼寵人君誠察此則事無過舉身享美名故曰木從繩則正后從諫則聖一薄斂古人有言曰百姓足君孰與不足百姓不足君孰與足人君恭儉節用取於民有制則民力寬裕衣食滋殖自然樂輸租賦以給公上若暴征峻斂侵奪民利物力己屈而驅以刑辟勢必流轉溝壑散為盜賊為人之上者將何利於此故善言治道者尤惡聚斂之臣曰與其有聚斂之臣寧有盜臣前代帝王或耽於聲色或盤於逰畋或好治宫室或快心攻戰於是小人乘間而肆其邪謀為之斂財以佐其橫費世主不悟以為有利於國而不知其終為害也賞其納忠於君而不知其大不忠也嘉其以身當怨而不知其怨歸於上也昔鹿臺之財巨橋之粟商紂聚之以喪國周武散之以得民由是觀之人主所當務者仁義而已何必曰利一省刑夫臨下以簡御衆以寬百王不易之道也昔漢髙祖去秦苛暴約法三章以順民心遂定王業孝文循之以清靜而幾致刑措然則為治之要果在於省刑而不在於繁刑也況人主之刑獄其勢不能親臨則必委之於臣下故峻推鞫則權在於獄吏廣覘伺則權在於小人肆刑戮則權在於彊臣通請謁則權在於近習自古姦臣將欲誅鋤善人自專威柄必數起大獄以搖人心何則其情難知煆鍊出入一繫於獄吏及夫奏成獄具則雖有寃抑人主亦何從而察哉然則欲姦雄不得肆其威善良有以安其性莫若省刑而已自三代以還有天下者數十姓惟宋受命逮今一百二十有六年中原無事不見兵革稽其德政所以特異前世者直以誅戮之刑內不施於骨肉外不及於士大夫至於下民之罪一決於廷尉之平而上自天子下至於有司不復措慮輕重於其間故能以好生之德感召和氣而致無窮之福祖宗所以消惡運遏亂原者嗚呼逺哉雖甚盛德蔑以加矣一去奢昔夏禹克勤于邦克儉于家而為三王祖漢文帝即位宫室苑囿車騎服御無所增益而天下斷獄四百幾致刑措然則節儉者固帝王之髙致也況以天子之尊富有天下凡有四方萬物所以奉養於上者蓋亦備矣然而饗國之日寖久耳目所御習以為常入無法家拂士出無敵國外患則不期於侈而侈心自生佞諛之臣又從而導之於是窮奢極侈無不為己是以先王制法作竒技淫巧以蕩上心者殺無赦夫竭天下百姓所以相生相養之具而以供人主無窮之欲致人主於喪德損夀之地而以邀己一時之榮雖誅戮而不赦固未足以當其罪也昔紂為象箸而箕子諫夫以天子而用象箸未為過侈也然箕子以為象箸不已必金為之金又不已必玉為之故箕子之言所以防微而杜漸也至漢公孫𢎞相武帝以為人主病不廣大人臣病不節儉當是時帝方外伐四夷內治宫室為千門萬户由是天下之户口減半盜賊蜂起而𢎞猶病其不廣大何其不忠之甚哉故人主誠能不以箕子之言為太過而察見公孫𢎞之太佞則夏禹漢文之德不難及己一無逸昔周公作無逸之篇以戒成王其略曰昔商王中宗治民祗懼饗國七十有五年其在髙宗不敢荒寧饗國五十有九年厥後立王生則逸不聞小人之勞惟耽樂之從自時厥後亦罔克夀或十年或七八年或五六年或四三年嗚呼非愛君憂國之深其言何以至此又曰繼自今嗣王無淫于觀于逸于逰于田無若商王受之迷亂酗于酒德哉小人怨汝詈汝則皇自敬德亂罰無罪殺無辜怨有同是叢于厥身蓋人君初務縱欲小人必怨而大臣必諫至于淫刑亂罰以杜言者之口然後流連忘反不聞其過而終至于滅亡故曰無逸之書後王之元龜也唐明皇初即位宋璟為相手寫無逸圖設於帝座明皇勤於政事遂致開元之治其後宋璟死所獻圖亦弊而徹去明皇遂怠於政親見天寶之亂由是觀之靡不有初鮮克有終人君誠能謹終如始不敢逸豫則德有堯舜之名體有喬松之夀豈不美哉右臣聞孟子曰我非堯舜之道不敢以陳於王前今朝廷始初清明臣雖術學淺陋惟是前代聖帝明王所以致治之迹可以為法與夫暴君暗主所以兆亂之道可以為戒者乃敢告於左右古人有言曰舜何人也豫何人也夙夜以思去其不如舜者就其如舜者是亦舜而已矣陛下加意無忽則社稷幸甚天下幸甚知陳州司馬光進修心治國之要劄子曰臣伏聞本固則末茂源濁則流渾昔仁宗皇帝擢臣知諫院臣初上殿即言人君之德三曰仁曰明曰武致治之道三曰任官曰信賞曰必罰英宗皇帝時臣曽進歷年圖其後序言人君之道一其德有三其志亦猶所以事仁宗也大行皇帝新即位擢臣為御史中丞臣初上殿言人君修心治國之要其志亦猶所以事英宗也今上天降灾大行皇帝奄棄天下皇帝陛下新承大統太皇太后同聽萬幾不知臣愚猥䝉訪落臣且愧且懼無以塞責謹復以人君修心治國之要為獻其志亦猶所以事大行皇帝也所以然者臣歷觀古今之行事竭盡平生之思慮質諸聖賢之格言治亂安危存亡之道舉在於是不可移易是以區區首為纍朝言之不知臣者以臣為進迂闊陳熟之語知臣者以臣為識天下之本源也夫治亂安危存亡之本源皆在人君之心仁明武所出於內者也用人賞功罰罪所施於外者也出於內者雖有厚有薄有多有寡禀之自天然好學則知所宜從力行則光美日新矣施於外者施之當則保其治保其安保其存不當則至於亂至於危至於亡行之由己者也所以能當在於至明所以能明在於至公是以明君善用人者博訪逺舉拔其殊尤德行髙人謂之賢智勇出衆謂之能賢不必能能不必賢各隨所長授以位任有功則賞有罪則罰其人茍賢能雖讎必用其人茍庸愚雖親必棄賞必有所勸罰必有所懲賞不以喜罰不以怒賞不厚於所愛罰不重於所憎必與一國之人同其好惡是以古者爵人於朝與士共之刑人於市與衆棄之如此安有不當者乎臣故曰所以能當在於至明所以能明在於至公也昔齊桓公置射鈎而使管仲相漢髙祖知人善任使茍為不才雖見喜亦棄之茍才矣雖負販酒徒亡將戍卒亦用之此所以能奮布衣取天下也館陶公主為子求郎明帝不許而賜錢千萬郎賤官也猶惜之況其貴者乎故永平之治至今稱之宋髙祖事蕭太后甚孝太后欲以子道憐為揚州刺史髙祖以其貪愚不許故功業之髙冠於南朝唐太宗殺建成元吉而用其官屬魏鄭公王圭等與房杜無異卒得其效宣宗事鄭太后甚謹問舅鄭光以政事不能對罷其方鎮故時人稱美謂之小太宗此用人之公明者也韓昭侯惜弊袴不以賜左右之無功者漢髙祖深怨雍齒而不忘其功魏太祖勳勞宜賞不吝千金無功望施分毫不與唐宣宗重惜服章故當時得緋紫者以為榮此賞功之公明者也僮牛殺孟丙仲壬立叔孫昭子昭子數其罪而殺之孔子善其不黨丁公脫漢髙祖於厄髙祖以為不忠而斬之武帝妹隆慮公主且死屬其子昭平君昭平君殺人武帝流涕而誅之唐明皇弄臣黃㼐掀捕盜官墜馬明皇杖殺之宣宗謂樂工汝惜羅程藝我惜髙祖太宗法此罰罪之公明者也臣略舉此數者以為明驗其餘在陛下博覽載籍以考之知臣所言不為謬妄臣以一夫之愚不能周知天下之務近曽上奏乞下詔書開言路伏望聖慈早賜施行今并治平四年五月三日上殿劄子具録進呈乞陛下留神幸察元祐元年光又上奏曰臣等聞王者設官分職居上者所總多故治其大要居下者所分少故治其詳細此理勢之自然紀綱所由立也是以周官小宰以官府之六屬舉邦治大事則從其長小事則專逹凡宰相上則啓沃人主論道經邦中則選用百官賞功罰罪下則阜安百姓興利除害乃其職也至於簿領之差失期會之稽違獄訟之曲直胥吏之遷補皆郎吏之任非宰相所宜親也故人有言察目睫者不能見百步見百步者亦不能見目睫言詳於近者必略於逺謹於細者必遺於大也今尚書省事無大小皆決於僕射自朝至暮省覽文書受接辭狀未嘗暫息精力疲弊於米鹽細故其於經國之大體安民之逺猷不暇復精思而熟慮恐非朝廷所以責宰相之事業也竊以六曹長官古之六卿事之小者豈可不令專逹臣等商量欲乞今後凡有詔令降付尚書省者僕射左右丞簽訖分付六曹謄印符下諸司及諸路諸州施行其臣民所上文字降付尚書省僕射左右丞簽訖亦分付六曹本曹尚書侍郎及本廳郎官次第簽訖委本廳郎官討尋公案㑹問事節相度理道檢詳條貫下筆判云今欲如何施行次第通呈侍郎尚書若郎官所判已得允當則侍郎簽過尚書判決應奏上者具奏上應行下者直行下即未見允當者委侍郎尚書改判事之可否皆決於本曹長官更不經由僕射左右丞即改更條法或奏乞特㫖或事體稍大或理有可疑非六曹所能専決者聽詣僕射左右丞咨白或具狀申都省委僕射左右丞商議或上殿取㫖或頭簽劄子奏聞或乞入熟狀或批判指揮其諸色人辭狀並只經本曹長官陳過尚書侍郎郎官次第簽押判決一如朝廷降下臣民所上文字次第施行若六曹不為收接及久不結絶或判斷不當即令經登聞鼓院進狀降下尚書省委僕射左右丞判付本省不干礙官員看詳定奪若本曹顯有不當即行糾劾所貴上下相承各有職分行遣簡徑事務易集御史中丞劉摯上疏曰上之所好下必有甚朝廷意在總核下必有刻薄之行朝廷務行寬大下必有茍簡之事習俗懷利迎意趨和所為迎似而非上之意本然也今因革之政本殊而觀望之俗故在昨差役初行監司已有迎合爭先不校利害一槩定差一路為之騷動者朝廷察其如此固已黜之矣以是觀之大約類此向來黜責數人者皆以非法掊克市進害民然非欲使之漫不省事昧者不逹矯枉過正顧可不為之禁哉請立監司考績之制拜尚書右丞摯又上言曰臣蓋聞傳曰朝廷正則百官理又曰衆賢和於朝則萬物和於野今夫上之人誠能同德一心徇公憂國則必有和善之政而下無朋比之士茍人有異意轉相非疑則必有僻違之政而下有向背之俗於是民被其害矣臣伏見昨者皇帝陛下太皇太后陛下聽治之初惠綏天下去民之所同患更法之所不安至於振淹滯絀貪刻發政施命無有虛日故近自畿甸至於海隅莫不鼓舞承風傾耳以聽太平而近者一兩月以來政事號令之見於施行者曠然希濶中外顒顒無所聞見深求其故皆以謂執政大臣情志不同議論不一之所致也有隂拱以坐觀者有陽合而內暌者有强橫以肆掣者有忍恥以懷咎者滯事積前相顧而不發故仁澤屯於上而不下庶事壅於朝而不行以至文書稽留人情隔塞聖人之化雖曰久於其道而後成然固有緩急之勢今事至輕小明有比例或止於一法令之增損一官吏之廢置猶不肯倡端而主論則方今邉鄙之大利害賦役之大是非天下百姓之困苦如在倒垂而望解者當誰任其責何時而議也幸遭聖明哀愍元元為廟朝大計而謀國之人方身是恤方私是圖坐玩嵗月亦可謂不仁矣況今皇帝陛下以盛年居諒暗太皇太后陛下以垂簾而稱制於此時也而輔弼不咸相抵相激非獨政事壅積而已誠恐疑二漸深分曹固黨使傾險之士煽於其間上下乖戾何事不生此又臣之所為深憂也伏望聖慈深察事變防微杜漸特詔輔臣當務同寅協恭相示以信去其二志以濟國家之事應今來政事之稽滯未決者趣令條上取旨則望聖明發自睿斷别白施行以幸天下監察御史上官均論寬猛二道上奏曰臣聞治天下有二道寬與猛而已寬過則緩而傷義事有廢弛之弊猛過則急而傷恩官吏有避法茍免之患術雖不同其蠧政害民一也自熙寧以來朝廷以法度整齊四方諸路監司不能深明朝廷之意往往務為慘核刻深之政郡縣望風畏栗大抵以趣辦為事類文具而無實不暇長計逺慮以便民為意而四方之民有憔悴愁歎之音此傷猛過急之弊也自陛下臨御數下德音務從寬大四方欣然仰戴德澤然比聞諸道監司又不能明陛下之美意妄意朝廷風旨一切以茍簡縱弛為事疲愞汙庸之吏視而不劾紛糾紊繆之政知而不察外求寬厚之名以要譽於一時此矯枉過寬士大夫守義不篤之患也方陛下講修百度以差役之法行於四方尤在郡縣夙夜悉心以推行朝廷愛民之政若怠墯不舉委成於胥吏太守玩而不察監司視而不糾養成偷墯茍簡之風天下之民必有受其弊者矣臣願詔四方以不加糾劾如朝廷遣使廉訪頗有其實或風聞於上當顯責以厲逺近庶幾按察之吏不敢寬縱郡縣之官不敢偷墯人人警懼修職宣布陛下之德澤以惠黎庶户部尚書李常上奏七事一崇廉恥曰臣聞子貢問何如斯可謂之士矣孔子曰行已有恥孟子曰人不可以無恥無恥之恥無恥矣而管子亦曰禮義廉恥是謂四維古之聖賢所以崇尚廉恥如此其切而後世或置而不察良可駭也昔董仲舒當漢武之時歎廉恥貿亂賢不肖混淆蓋廉恥不崇於世則名分不足以塞覬覦賞罰不足以正公罪公議不行人才日壞欲相與隆政治何可得也臣伏見熙寧已還急於事功易於揀拔超越倫等罕循資格謀利者計息以均賞讞獄者巧詆以拜官矯誣傾奪肆不顧忌今雖窒其所以致之之源而流風餘焰尚有存者既不修己而以干進為事不務率職而以請託為先每詔下薦士則自媒者盈卿士之門屬託者交車馬於道違公議者莫愧乖物理者不懲以得為心寧復愧畏此風寖長為弊甚大臣愚欲望聖慈深詔有司訓以治體簡求忠實廉退之士進之官師以厚薄俗其不懲艾仍委御史臺彈劾則人知修方而賢不肖别矣賢不肖别於朝則愚夫陋俗亦知化矣二存鄉舉曰臣聞周之取士也其書曰使民興賢出使長之使民興能入使治之未聞以文章選賢也後世法敝衆弊紛起下之人不復以誠事其上而上之人何復誠信而聽之哉此鄉舉所以終廢而試藝之法不可革也今天下三嵗一考士初試於鄉州再試於京師而官之曽莫原其修之於家行之於鄉黨朋友為何如也士知不考其素而唯文章之工寧復有自重自修之志哉設有自重自修之士資質粹美問學深博其忠足以事君其才足以治民而不幸不工於文章則終身不得齒士版立朝廷矣豈不可為之長太息也今有徑寸之璧弃置而不貢之朝莫不為之恨自重自修之士不貴於珠玉哉此臣所以為朝廷惜也臣愚欲乞詔天下州郡當貢士之嵗許於解額內弗試而貢一人擇鄉黨孝悌忠信通博之士俾其間閭里之善士以告守令守令伺察而告之監司監司核實果否而上之禮部萃而察之考其所學等差而上之朝廷朝廷隨其等差參諸貢士而官之仍命有司立為條約無則闕之有其人而不貢則治之舉非其人則坐之如此在天下之士各知修方以行己則以文章選士之弊有時而衰矣三别守宰曰臣伏以四海九州之大生齒之夥朝廷不得家治而人教之也為之衆建州縣張設官吏約以詔條使人循理而趨善安土而樂生雖然朝夕與民相親而致感者莫如縣令郡守次之監司又次之今吏部之格雖曰以舉官為縣令然則未必其真可以為縣令者也縣令雖以舉官而為知縣所舉者亦未必真善治民者也以未必真善治民者積三四任而為知州其才亦未必真能為州者也如此而欲望州縣皆治何可得也蓋其才不可以為縣令者常為掾丞可也不可以為知州者常為佐二可也臣愚欲乞别異守宰與掾丞佐二為二途使才不為守宰者終身為掾丞佐二才可以長民化下者雖久為守宰可也雖然於守宰以擇監司或進為朝廷之官如此則才否分而人品别矣今誠能於州掾縣佐選其人可為縣令者授之中下之縣縣治矣授之上縣上縣又治矣授之以難治之縣難治之縣至一再皆治也擢之為知州初則授之以中下之州中下之州既治矣使劇州劇州又治矣而其人不可為監司為省府卿士以備選擢者未之有也若才不可以為縣也雖積嵗益久而寡過也不害其進官而為幕職州佐也夫才不可長民而為幕職州佐以終其身蓋亦幸矣夫何恨哉四廢贓貪曰臣聞為國家者擇士而官之非以幸其身為民而圖治也制祿而頒之非以厚其家代耕而養廉也今稅民之粟帛損邦之貨泉隨其爵位而祿之矣貪汙之士以賕抵罪者嵗不可勝數非獨為士者上負邦家亦朝廷法制有以召致之然也今吏部四選附籍者幾三萬員而在選者常以數千員賢愚弗别廉汙雜處客食旅館或逾年而得一闕更兩嵗而及其期官冗員多莫如今日臣愚竊以謂仕於朝而食人祿矣公私過各或不得免而肆然犯法以贓獲罪其跡顯著尚足矜耶而使之因緣赦宥積纍期限而叙復之何也欲望詔有司凡以正贓抵罪者一切廢置示弗復用其或才能卓異不幸絓誤也命卿士以名上之付有司以議之或有可取也降等而官之終弗變也卿士同其罪則官澄而冗革矣五謹疑獄曰臣聞易曰君子以明慎用刑而不留獄書曰與其殺不辜寧失不經夫天下之大四海之廣獄訟至繁官吏至衆蓋獄訟繁則不得無可疑可愍之情官吏衆則不必皆明習法律之士前日愆雨之初臣不避誅戮嘗陳所以致旱之因矣我朝纍聖臨御欽慎庶獄上遵先王之戒方州之請多原情而䝉貸矣夫以先王之聖智猶曰寧失不經今方州所請將事深文而務殺之耶又因以罪其官吏官吏畏罪則取可疑可愍者遷情就法而殺之矣安事上請而取咎悔也哉況夫官吏之愚難以遍曉而務在免過希合臣愚伏望朝廷以前日所降詔旨特加修明廣示海宇俾可疑可愍之獄皆如平日以其實情上請付有司議之或失於妄情也亦如昔日特放其罪如此則疑情愍獄皆得以上聞而好生之德周四海矣六擇儒帥曰臣聞用師之所先財用積器械利城壘堅士卒練將帥擇五者具勝敵之能事畢矣先帝憂勤積嵗以儲兵備今粗㑹常平等積錢餘五萬貫榖帛匹斛亦復稱是財用不謂不積矣熙寧以來萃羽毛齒革之材講犀利之要巧者奏工殆餘十年械器不謂不利矣增城築堡擇當要處守禦之方無不詳盡城壁不謂不堅矣行陳坐作引弓蹶弩擊刺之法靡不講究士卒不謂不練矣虎貔之勇有功必賞賜官授節超逾倫等將帥不謂不擇矣雖然吳子曰凡人論將常觀於勇勇之為將萬分之一蓋言以勇擇將未盡其要勇敢之將迎敵以取勝可也若其制列城專一道撫百萬之衆馭暴武之佐失所能任孫子曰將者智信仁勇嚴也以是言之非通儒學士知國體者不足與知此臣不敢逺陳古事在仁祖時蓋非范仲淹韓琦龎籍之徒不用也然今者所當擇者臣竊冀朝廷加慮而深思也七修役法曰臣聞古者用民之力嵗不過三日而使之以時人不告病後世則不然極人力而疲之莫之愍也昔者疲民之力莫甚於差役差役之甚至有破民家産賣及妻孥以濵死者熙寧元豐之間以差役為病民也使一切輸錢於縣官官為賦閒民而役之方是時朝廷改法則意在息民議法之臣以寬剩為事平民輸之嵗覺不逮復思差科之為幸也今者既詔有司講明差法前日所謂破家産之弊悉已鐫除而是非猶興議論未一皆以謂上户特幸中户役併上户特幸則求所以抑兼并而均民力中户役併則其為病有過於輸錢臣愚以謂法無新陳便民者良法也論無彼已可久者確論也欲望朝廷命有司考二法之至要而裁取之參公論之可行而修定之使人便而久行百世無敝豈不善哉此不役法於四方而付其書於户部以臣之愚見其必可久也欲乞再承詔旨許自邦畿以及諸路先召畿令因版籍即新書而裁損之次召近畿數路監司如畿縣之法自近以逮逺因可以革非不踰嵗而天下之役書全矣夫為法之大及物之衆休戚所係治忽隨之為國家者可不慎哉臣所以不敢冒鈇鉞之誅而不能終默也歷代名臣奏議卷三十九
