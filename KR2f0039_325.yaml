body:
  text: 厯代名臣奏議卷三百二十五明楊士竒等撰禦邉宋仁宗慶厯初丁度入知制誥遷翰林學士糾察在京刑獄判太常禮院兼羣牧使劉平石元孫敗帝遣使問所以禦邉度奏曰今士氣傷沮若復追窮巢穴饋糧千里輕用人命以快一朝之意非計之得也唐都長安天寶後河湟覆沒涇州西門不開京師距寇境不及五百里屯重兵嚴𤇺火雖常有侵軼然卒無事太祖時疆埸之任不用節將但審擢材器豐其廪賜信其賞罰方陲輯寧幾二十年為今之䇿莫若謹亭障逺斥候控扼要害為制禦之全計四年度又論契丹請絶元昊進貢事上疏曰臣等竊謂契丹元昊相攻虛實未可知今來書大意且言以元昊不順朝廷之故遂成興兵恐深入討伐之後元昊理難拒絶則是不從北鄙之請堅納西人之盟得新附之小羌違久和之強敵如聞契丹屯兵甲近在邉陲萬一得書違情生忿回戈我境有以為名夫患有遲速事有重輕此朝廷不可不審度也若阻契丹而納元昊則未有素備之䇿絶元昊而從契丹又失綏懷之信莫若以大義而兩存之臣等謂宜降詔與元昊言昨許再盟蓋因契丹有書來言彼是甥舅之親朝廷久與契丹結和不欲傷鄰國之意遂議開納今却知國中招誘契丹邉戶甥舅事大之禮違朝廷納欵之本意當須復順契丹早除嫌隙則誓詔封册便可施行仍乞於契丹回書中言降詔與元昊若其悔過歸順貴國則本朝許其欵附若執迷不復則議絶未晚如此則於西人無食言之曲於北鄙無結怨之端從容得中不失大義惟陛下裁擇時趙元昊反右騏驥使忠州刺史知鄜州張亢上疏曰舊制諸路總管鈐轄都監各不過三兩員餘官雖髙止不過一路總管鈐轄不預本路事今每路多至十四五員少亦不減十員皆兼本路分事不相統制凡有論議互報不同按唐總管統軍都統處置制置使各有副貮國朝亦有經略排陳使請約故事别置使名每路軍馬事止以三兩員領之又涇原一路自總管鈐轄都監巡檢及城寨所部六十餘所兵多者數千人少者才千人兵勢既分不足以當大敵若敵以萬人為二十隊多張聲勢以綴我軍後以三五萬人大入奔突則何以支又比來主將與軍伍移易不定人馬強弱配屬未均今涇原正兵五萬弓箭手二萬鄜延正兵不減六七萬若能預為團結明定節制迭為應援以逸待勞則烏合飢餒之衆豈能窺我淺深乎請下韓琦范仲淹分按逐路以馬步軍八千已上至萬人擇才位兼髙者為總領其下分為三將一為前鋒一為䇿前鋒一為後陳每將以使臣忠佐三兩人分屯要害之地敵小入則一將出大入則大將出又量敵數多少使鄰路出兵應接此所謂常山蛇勢也今萬人以上為一大將一路又有主帥延州領三大將鄜州一大將保安軍及西路巡檢德靖寨共為一大將則鄜延路兵五萬人矣原渭州鎮戎軍各一大將渭州山外及瓦亭各一大將則涇原路五萬人矣弓箭手熟戶不在焉昨延州之敗蓋由諸將自守不相應援請令邉臣預定其法敵寇某所則某將為先鋒某將出某所為竒兵某將出某所為聲援某城寨相近出敢戰死士某所設覆都同巡檢則各扼要害又合鄰路取某路出應仍潛用旗幟為號昨劉平救延州前鋒陷賊者已二千騎平猶不知趙瑜部馬軍間道先進而趙振與王逵趨塞門至髙頭平踏白馬報敵張青蓋駐山東振麾兵掩襲乃瑜也臣在山外䇿應未嘗用本指揮旗號自以五行支干别為引旗若甲子日本軍相遇則先見者張青旗後見者以緋旗應之此是干相生其干相尅及支相生尅亦如之蓋兵馬出入晝則百步之外不能相知若不預為之號必誤軍事國家承平日久失於訓練今每指揮藝精者不過百餘人餘皆疲弱不可用且官軍所恃者步軍與強弩爾臣知渭州日見廣勇軍彍弩者三百五十人引一石二斗者僅百人餘僅及七八斗止欲閲習時易為力爾臣以跳鐙弩試皆不能張閲習十餘日裁得百餘人又教以小坐法亦十餘日又教以帶甲小坐法五十餘日始能服熟若安前弊以應新敵其有必勝之理乎又兵官務張邉事以媒進邀賞劉平之敗正繇貪功輕進鎮戎軍最近賊境每報賊騎至不問多寡凡主兵者皆出至邉壕則賊已去矣蓋權均勢埓各不相下若不出則恐得怯懦之罪且諸路騎兵不能馳險計其芻粟一馬之費可養步軍五人馬髙不及格宜悉還坊監止留十之二餘以步兵代之又比來禁衛隊長繇年勞換前班者或為諸司使副白丁試武伎亦命以官而諸路弓箭手生長邉陲父祖效命纍世捍賊乃無進擢之路何以激勸邉民竊聞大帥議五路進師且用兵以來屢出無功若一旦深入臣竊以為未可也山界諸州城寨距邉止二三百里夏兵器甲雖精利其鬪戰不及山界部族而財糧又盡出山界若十月後令諸將分畨出界使夏人不得耕牧然後出步兵負十日糧人日給米一升馬日給粟四升草五分賊界有草地以半資放牧亦可減挽運之半王師既行使唃廝囉及九姓回紇分制其後必蕩覆巢穴又言陜西民調發之苦數倍常嵗宜一切權罷令安撫司與逐州長吏減省它役顓應邉須及選殿侍軍將各三十人以駝騾各二百留其半河中以運鄜延保安軍軍須其半留乾州或永興軍以運環慶原渭鎮戎軍軍須分一轉運使專董其事又鄜州四路半當衝要嘗以閒慢路遞鋪兵卒之半貼衝要驛百人每三人挽小車載二百五十斤至三百斤若圑併輦運邉計亦未至失偹初亢請乘驛入對詔令手疏上之後多施用進西上閣門使改都轄屯延州又奏後疏慶厯元年七月亢知延州論邉機軍政所疑十事上疏曰臣伏以太平日久人不知兵元昊反逆以來民力凋弊而邉機軍政措置未得其宜今輒陳臣之所疑者十事臣竊謂王師每出不利豈非節制不立號令不明訓練不至器械不精或中賊之詭計或自我之貪功或左右前後自不相救或進退出入未知其便或兵多而不能用或兵少而不能避或為持權者之所逼或因懦將之所牽或人馬困飢而不能奮或山川阻險而不能通此皆將不知兵之弊也未聞深究致敗之由而處置之雖徒益兵馬亦未見必勝之理臣之所疑者一也去春賊至延州諸路發援兵而河東秦鳳各踰千里涇原環慶不下十程去秋賊出鎮戎又逺自鄜延發兵且千里逺鬪豈能施勇如賊已退乃是空勞師徒異時更寇别路必又如此不戰而自弊臣之所疑者二也今鄜延副總管許懷德兼環慶軍馬環慶副總管王仲寶復兼鄜延其涇原秦鳳總管等亦兼鄰路雖令互相䇿應然環州至延州十四五程直路亦不下十驛涇原至秦州又逺于此若一處有事自此發兵赴援而山路險惡人馬已困欲責其功何可得也臣所疑者三也四路軍馬各不下五六萬朝廷盡力供億而邉臣但言兵少每路欲更增十萬人亦不見成功之效且兵無節制一弊也無竒正二弊也無應援三弊也主將不一四弊也兵分勢弱五弊也有此五弊如驅市人而戰雖有百萬亦無益於事臣所疑者四也古之教習須三年然後功成今之用兵已三年將帥之中孰賢孰愚攻守之術孰得孰失纍年敗衄而居邉要者未知有何謀設更數年或未罷兵國用民力何以克堪若因之以飢饉加之以師旅安危之䇿未知何如臣所疑者五也今言邉事者甚衆朝廷或即奏可使定奪以聞或劄下逐處或不令下司前條方遂施行後令復即衝改胥吏有抄録之勞官員無看詳之暇邉方軍政一無定制臣所疑者六也夏竦陳執中皆朝廷大臣凡有邉事皆付之不疑今但主文書守詔令每有宣命則翻録行下如諸處申禀則令候朝廷指揮如此則何必以大臣主事臣所疑者七也前河北用兵減冗以省費今陜西日以增員且如制置青白鹽使副招撫蕃落使臣等十餘員所占兵士千餘人請給嵗約數萬緡復有都大提舉馬鋪器甲之類又諸州一例招到新兵克敵制勝保捷廣鋭宣毅等指揮久未教閲但費軍廪無益邉備臣所疑者八也國家竭財用以贍軍士有手藝者管兵之官每一指揮抽占三人一如延州諸將不出即有兵二萬餘五千守城之外其餘正兵萬五千若有事宜三日內不能團集況四十里外便是賊境一有奔衝緩急何以支梧臣所疑者九也陜西教習鄉兵共十餘萬人其中無賴之輩名挂天籍心薄田夫夫豈無姦盜雜於其中茍無措置他日為患不細臣所疑者十也乞暫許臣赴闕靣陳利害如臣狂率不可用即行降黜陜西經略安撫判官田況上兵䇿十四事疏一曰自昊賊弄兵侵噬西蕃開拓封境僭叛之迹固非朝夕始於漢界緣邉山險之地三百餘處修築堡寨欲以收集老弱併驅壯健為入寇之謀初貢嫚書亦未敢擾范雍在延州屢使王文恩輩先肆侵掠規貪小利賊遂激怒其衆執以為辭王師伐叛弔民之體自此失之劉謙髙繼嵩等破龐諸族任福襲青諸族任福襲白豹城皆指為大功無不殺戮老弱以為首級彼民皆訴寃於賊以求復讎吾民受制異類而又使無辜被戮毒貫人靈上下文移皆謂之打虜吁可愧也或謂國家久不用兵將卒未練欲使趨功騖利習於戰鬪爾然賊界諸處設備甚謹屢行打族俘獲無幾陷沒極多如郝仁禹打瓦娥族亡三百四人無所獲任政打閙訛堡亡一百九十三人秦鳳部管司打隴波族亡九十六人各獲首一級麟府軍馬司入賊界牽制亡三百八十人斬馘十人其餘大亡小獲無足言者以此計之實傷挫國威取賊輕侮自今宜且罷打族但嚴設備守以俟賊至然後别為之䇿以破奸謀二曰自昊賊寇邉王師屢戰不利非止人謀不善抑亦衆寡非敵近因好水川之敗士氣愈怯諸將既沒牙隊之兵罪皆當斬朝廷普示寬貸欲為招輯伸恩屈法事非獲已軍中相勸以退走自全為得計陜西雖有兵近二十萬防戍城寨二百餘處所留極少近又欲於鄜延環慶涇原三路各抽減防守戍兵鄜慶渭三州大為屯聚以備賊至然今鄜延路有兵六萬六千餘人環慶路四萬八千餘人涇原路六萬六千餘人除留諸城寨外若逐路盡數那減屯聚一處更㑹合都監巡撿手下兵併為一陳極不上三二萬人賊若分衆而來猶須力決勝負或昊賊自領十餘萬衆我以三二萬人當之其勢固難力制議者但欲以寡擊衆幸於偶勝非萬全䇿也夫能以寡擊衆徼一時之勝者或得地利或發竒䇿非可恃以為常今必敗之形洞可前照而恬然坐視莫知更為計也議者又謂賊若併兵而入則率他路援兵以禦之且賊每入寇既有所得飇馳霧卷一夕而去他路固無所及矣或謂收保邉民持重以觀其勢可擊則擊不可則已賊不過破毁民生因食野積而歸爾此苟一日之不敗則可也深慮後患有異於斯臣去冬在都下嘗聞士大夫相與言謂小羌不足憂何則叛命之初我無邉備若兵隨檄至則關中安危未可知此賊計之失也自劉平石元孫陷沒中外震駭賊若長驅而至誰能當之此二失也臣始聞此說亦誠謂此賊之易與也今觀其包藏變譎圖全擇利乃知所謂失䇿者實賊之得計也且賊之未敢長驅亦猶我之未可深入所以然者主客異勢進退懷疑邉防之兵並出其後險要之地或斷其歸是決成敗於一舉豈勝算哉自李彬被虜劉平等敗沒延州之境蕩然一空日者山外之民殺掠奔潰已亡大半是渭州之境又漸空矣料賊今秋或來春猶且驅劫而已必使我藩籬盡空表裏可見然後攻城破邑漸謀長驅則無後顧之患臣所以謂關中安危漸不可測願朝廷為勇斷之計也斷之勇者在乎發內帑之財募陜西河東強壯之民五七萬人分屯鄜延環慶涇原三路俯及防秋則以逐處弓手分畨戍守城寨而參以正兵每路及五六萬人以上精加訓練我軍既衆其氣自振也必曰募民兵則衆情不安增邉戍則大費不贍此循常拘近之論也且民兵之法祖宗所行迄今軍中餘老多在加之出錢選募非同㸃差其中必有樂於效用者且內帑之積祖宗本為用兵今乃其時也三曰用兵之法當先有部分部分進退權於大將旗鼓常在中軍自西陲用兵每戰必敗好水川之戰任福實為大將而不能指麾統制以為己任乃自率一隊前當劇鋒矢盡勢窮而後陷沒忠勇之節雖可嗟憫然論其材力止一卒之用夫部分不明多則不能辦少則不能勝進無所勸退無所止一有紛亂則其勢比矣欲矯此弊在乎先求大將之才峻其威權而尊寵之如葛懷敏為鄜延部管張亢為鈐轄當以偏稗之禮奔走麾下若犯令即當誅之乃平牒往來動皆鈞禮韓琦范仲淹為經略副使葛懷敏見之禮容極慢上下姑息三軍之士何所法耶夏竦陳執中不能身當行陳為士卒先至於選擇大將明定部分乃其職也乞朝廷降詔令更互巡邉采察邉臣中有材任大將者特與不次拔擢其驕怯之將每自顧重不為國家盡力者奏罷之則部分立而功可冀矣四曰自古用兵未有不由間諜而能破敵者也昊賊所用諜者皆厚加賞賂極其尊寵故規我機宜動必得實今邉臣所遣刺事人或臨以官勢或量與茶綵止於熟戶族帳內采道路之言便為事實賊臣變詐重成疑惑今請有入賊界而刺得實者以錢帛厚賞之賊將伊埓剛郎㖫裕勒且之徒皆元昊親信分廂主兵俯近漢界出入從者不過一人若能募死士陷胸辟首是去賊之手足王㳂嘗欲用此䇿但朝廷不惜美官重賂則功豈難圗五曰唐置都護府掌撫慰諸蕃征討斥堠及行賞罰叙録勳勞其屬有長史録事功食戶法諸曹得為開府之盛國朝承五代之後事歸邉防當西陲安輯時朝廷固無意及此今昊賊大肆殺掠㳂邉屬戶各顧家族心生向背又使奸人恣行誘脅以此賊勢轉盛而邉候無復扞蔽今新置招撫蕃落司所謂招撫者非飲食不足以得其歡非賞賂不足以回其意非術數不足以鼓其動非刑誅不足以制其驕曩者曹瑋在秦州誅賞並行戎落懾伏比涇原用韓質秦鳳用張僎皆韓琦隨行指揮使雖各有武勇至於招撫之術豈可倚耶環慶一路熟戶未嘗經賊殘破部族全整人堪戰鬪若綏御有術可得精兵數萬請令都管舉官與王懷端協力招撫仍只令韓琦王㳂龐籍張奎同領之事之大者關報都部管司其餘知州通判更不兼管以養正兵萬人一嵗之費為招撫之具則事無不濟自來熟戶販鬻青白鹽以來厚利今一切禁絶之欲以困賊然絶熟戶之利無以資其生太宗朝鄭文寶請禁青白鹽以困賊遷可不戰而屈人兵詔自陜以西市之者皆坐死其後犯法甚衆戎人乏食寇抄邉郡內屬萬餘帳歸繼遷命錢若水馳傳視之因詔盡復舊制戎人始漸歸附今日之勢若厚加招撫稍寬鹽禁則熟戶無不得用議者疑邉饋已窘而又興廢不訾非至計也且國家通使嘉勒斯賚欲誘以為用賜帛二萬以從其出師終無實報是捨熟戶近成之效而信西蕃逺妄之言豈至計耶自昊賊破犛牛城築瓦川㑹而嘉勒斯賚逺竄厯精城偷安茍息其子滿濟札卜轄戬自立皆為仇敵尚不能制矧能為昊賊輕重邪溫博竒乃嘉勒斯賚親信首領之豪其子伊實裕勒隆有衆萬餘最為強盛乃與昊結姻嘉勒斯賚日益危弱今欲以為國家用非臣之所能知也以是論之招撫熟戶不猶愈於彼乎六曰環慶路投來蕃部極多夏竦等懲延安之前失慮賊馬奔衝內應為患欲遷襄唐州界給曠土使就生業又皆不肻離往若驟加起遣則戎心動搖或致生事若招撫蕃落司得人令躬至族帳察其心之向漢者給㳂邉閒田編於熟戶或度其後必生變者徙之內地然恩威裁制其事百端茍非權謀未易集事也七曰蕃落廣鋭振武保捷皆是土兵材力伉健武藝精強戰鬪嘗為士卒先自昊賊擾邉以來惟土兵踴躍志在爭功其餘請給甚微不及東軍之下者振武料錢五百而二百五十為折支積數月一支又皆靡弊不堪之物如新添虎翼兵自南中選填材質綿弱而云不知戰鬪見賊恐死傳者皆以為笑朝廷但且以塞數為名而已若月添土兵請給事恐難行請遇特支比常優加其數或别定南郊賞例以激其心則其立功必不在東軍之後矣八曰㳂邉屯戍騎兵軍額髙者無如龍衛聞其間有不能被甲上馬者況驍勝雲武武騎之類馳走挽弓不過五六㪷每教皆望空發箭馬前一十二步即以墮地以賊甲之堅縱使能中亦不能入況未能中之請密料邉兵益步卒而減騎軍但五分得一足矣以一騎軍之費可贍步兵二人而又寬市馬之煩擾違害就利莫善於兹也九曰西賊每至諸城寨不料衆寡並須出戰稍有稽違皆以軍法從事使趙奢李牧周亞夫授任於今日獲罪必先於諸將矣邉臣甘死事猶獲子孫之福不敢持重伺隙自取嚴誅今若遇寇大至且堅壁以守須㑹合諸路兵馬可以取勝則令出戰若賊衆不多而畏懦不即追討並行誅之十曰主將用兵非素撫而威臨之則上下不相附指令不如意西賊首領各將種落之兵謂之一溜少長服習如臂之使指既成行列舉手掩口然後敢食虜酋長遙見疑其語言其整肅如此昨任福在慶州蕃漢各以信服士卒亦已諳練一旦驟移涇原值賊至麾下隊兵逐急差撥諸軍將校都不識面勢不得不陷覆今請諸路將佐非大故毋得輕換易庶可責其成功十一曰古之良將以燕犒士卒為先所以然者鋒刃之下死生俄頃固宜推盡恩意以慰其心李牧備胸奴市租皆入幕府為士卒費趙充國禦寇戎亦日饗軍士太祖用姚全斌董導誨抗西戎何繼筠李漢超當北敵人各得環慶齊杕一州征租農賦市牛酒犒軍中不問其出入故得寇戎併息不敢窺邉臣前通判江寧府因造紙甲得逺年帳籍見曹彬征江南日和州逐次起餉猪羊肉數千斤以給戰士近范仲淹在延州奏乞比永興軍泰州支米造酒有司之吝以為無例而罷今請渭延慶三州及諸路部管司並特支米造酒仍比都管司别給隨軍錢務令贍足除軍貟外其餘士卒每一季或因都閲或值出入並須量有霑及以慰勞苦古者命將出師閫外之事無不專制財糧用度豈有異司今主兵主財者皆力敵權均紛然相制豈國家任人責功之大體也十二曰功作器用中國之所長非外國可及今賊甲皆冷煆而成堅滑光瑩非徑弩不可入自京齎去衣甲皆軟脆不足當矢石以朝廷之事力中國之伎巧乃不如一小羌乎由彼專而精我慢而略故也今請下逐處悉令工匠冷砧打造純鋼甲鏃發赴緣邉先用八九㪷力弓試射以觀透箭深淺賞罰之聞太祖朝舊甲絶為精好但嵗久斷綻乞且穿貫三五萬聨均給四路亦足以禦敵也十三曰今春昊賊寇邉器械攻城之具極為拙鈍此特緩吾備也料賊年嵗間破盡緣邉蘺落必驅迫漢民熟戶使為先登以攻城邑邉城一有不守事故可憂今修築城寨雖漸完固其如軍民不知守城次第請下河北選守城卒三五十人諸處指教善治器用大為之備賊動必求全常顧後患若邉城堅守攻之不拔則亦未敢長驅而深入也十四曰昊賊蓄謀嵗深盡更漢法自作祅書非恩信可以縻文令所能動若非天威振赫大挫姦鋒其勢未已漢界與賊山界相接人民繁庶每來入寇則科率糧草多出其間山界之民引弓甚徑與賊為戰所謂步奚此皆去賊地遙向漢甚邇若承戰勝之勢賊若皆散承其不備分路進兵而攻取之抗禦者誅殛降順者招徠老弱無辜係之南徙其間險要可守之地則築堅壘以據之所得土田給與有功熟戶必不可守則縱兵破蕩以弱賊勢若請命歸欵則裁割縱捨制之在我弭患如此則邉陲可安矣四年況知制誥乞訪問執政專以敵患為急疏曰臣伏以朝廷豫契丹金帛嵗五十萬朘削生民輸轉道路疲弊之勢漸不可久而近者西羌通欵嵗又豫二十萬設或復肆貪瀆再有規求朝廷尚可從乎臣至愚不當大責每念至此則怨嘆不已矧兩府大臣皆宗廟社稷天下生民所望而繫安危者豈不為陛下思之哉每旦垂拱之對不過目前政事數條而已非陛下所以待輔臣非輔臣所以憂朝廷之意也有唐故事肅宗以天下未乂除正衙奏事外别開延英以詢訪宰相蓋旁無侍衛獻可替否曲盡討論今北敵桀慢而河朔將佐之良愚甲兵之善窳道路之夷險城壘之堅弊軍政之是否財糧之多少在兩府輔臣實未有知之者萬一變發所忽制由中出少有差跌則事不測矣如前嵗蕭英劉六符始來和議未決中外惶擾不知為計此臣所目覩也和議既定又復恬然若無事者豈得為安哉願因燕閒召執政大臣於便殿從容賜坐訪逮時政專以敵患為急則人人唯恐不知以誤應對事事唯恐不集以孤聖懷日夕憂思不敢少懈同心叶力必有所為之不此為務而日以委瑣之事更相辨對議者羞之臣備近列實同朝廷之休戚惟陛下不以人廢言也二年樞密副使韓琦論備禦七事上奏曰臣聞漢文帝襲髙惠承平之後躬行節儉國治民富刑措不用時賈誼上書言事尚以為可慟哭太息豈其過哉蓋憂深思逺圗長久之計欲大漢之業垂千萬世而無窮者今陛下紹三聖之休烈仁德逺被天下大定民樂其生者八十餘載矣而臣竊觀時事謂可晝夜泣血非直慟哭太息者何哉蓋以西北二敵禍舋已成而上下泰然不知朝廷之將危宗社之未安也臣今不暇廣有援引請粗陳其大槩切以契丹宅大漠跨遼東據全燕數十郡之雄東服髙麗西臣元昊自五代迄今垂百餘年與中原抗衡日益昌熾至於典章文物飲食服玩之盛盡習漢風故其氣愈驕自以為昔時元魏之不若也非如漢之胸奴唐之突厥本以外國自處與中國好尚之異也近者復幸朝廷西方用兵違約遣使求關南之地以啓爭端朝廷愛念生民為之隱忍嵗益金幣之數且固前盟而尚邀獻納之名以自尊大其輕視中國情可見矣又元昊父祖以來畜養姦謀招納亡命雖外示臣節而內全兵力至元昊則好亂逞志併甘涼諸蕃以拓境土自度種落強盛故僭號背恩北連契丹欲成鼎峙之勢非如繼遷昔年跳梁於銀夏之間爾元昊纍嵗盜邉官軍屢衄今乘定川全勝之氣遣人約和則知其計愈深而其事可虞也議者謂昨假契丹傳道之力必事無不合豈不思契丹既能使元昊罷兵豈不能使元昊舉兵乎比來辭禮驕慢殊未屈下北敵之言既已無驗亦恐有合從之䇿以困中原朝廷若軫西民之勞暫求休養元元且以金帛啖之待以不臣之禮臣恐契丹聞之謂朝廷事力已屈則又遣使移書過邀尊大之稱或求朝廷不可從之事隳其誓約然後驅部落之衆直趨大河復使元昊舉兵深寇關輔當是時未審朝廷以何術而禦之或西鄙稱蕃專事北部陛下親御六師臨澶淵以待之即未知今之將卒事力與環衛統帥比真宗北征時何如欲駐驆北京以張軍勢臣恐敵衆由德博度河直趨京師則朝廷根本之地宗廟宫寢府庫倉廪百官六軍室家所在而一無城守之略陛下可擁北京之衆却行而救之乎臣所以謂可晝夜泣血者誠憂及于此冀陛下一悟而急為拯救也朝廷若謂今之盟約尚可固結則前三十年之信誓朝廷何負二敵而一旦違之哉彼狼狽之心見利而動又可推誠以待之乎夫得於先見預為之防則功逸而事集若變生倉卒駭而圗之雖是良平復生為陛下計亦不能及矣臣是以夙夕思之朝廷若不大新紀律則必不能革時弊而弭大患臣輒畫當今所宜先行者七事條列以獻其大略一曰清政本樞密院本兵之地今所主多苛碎眇末之務中書樞密院事有例者著為法可擬進者無面奏其餘微瑣可悉歸有司使得從容謀議賜對之際專諭大事二曰念邉事今政府循故事才午即出欲稍留則恐礙衆退朝食罷匆遽簽書而去何暇及疆事哉謂宜須未正方出延此一時以專邉論三曰擢賢才自承平以來用人以叙遷之法故遺才甚多近中書樞密院求一武臣代郭承祐聚議纍日不能得謂宜效祖宗舊例於武臣中不次超擢以試其能四曰備河北自北敵通好三十餘年武備悉廢慢書之至騷然莫知所為宜選轉運使二貟密授經略責以嵗月使營守禦之備則我待之有素也五曰固河東前嵗昊賊陷豐州掠河外屬戶殆盡麟府勢孤絶宜責本道帥度險要建城堡省轉餉為持久之計六曰收民心祖宗置內藏庫蓋備水旱兵革之用非私畜財而充己欲也自用兵以來財用匱竭宜稍出金帛以佐邉用民力可寬而衆心安矣七曰營洛邑今帝都無城隍之固以備非常議興葺則為張皇勞民不若隂葺洛都以為游幸之所嵗運太倉羡餘之粟以實其廪庾則皇居壯矣五年琦又論西北議和有大憂者三大利者一上疏曰臣伏見朝廷已封册夏國又契丹以西征回來告當此之時若便為太平無事則後必有大憂者三若以前日之患慮及經逺則後必有大利者一請略言之自羌人盜邉以來于今七年小入大至未嘗銼其鋒今乘纍勝之氣而與朝廷講和者得非凡軍興之物悉取其國人而所獲不償所費又以絶在邉和市上下困乏暫就稱臣之虛名而嵗邀二十五萬之厚賂非為得計邪且契丹勢素強而夏人尚敢與之抗衡若使其嵗享金繒及和市之利國內充實一旦我之邉備稍弛則必有大窺圗關輔之心此臣所謂後必有大憂者一也契丹昨以羌人誘致邉民遽往討伐既不得志而還見朝廷封册曩霄其心必固不樂近諜者傳契丹國人語云往河西趨沙漠中所得者唯牛羊耳若議南牧則子女玉帛不勝其有臣恐契丹異日或更有邀求或請絶西人之和以隳盟誓且河北兵驕不練忽爾奔衝則必震動京師此臣所謂後必有大憂者二也又昔石晉假契丹力以得天下嵗遺繒帛三十萬今朝廷嵗遺契丹五十萬夏國二十五萬使二敵日以富強而國家取之於民日以朘削不幸數乘水旱之灾則患生腹心不獨在敵此臣所謂後必有大憂者三也昨契丹自恃強盛意欲并吞夏人倉卒興師反成敗衄北敵之性切於復讎必恐自此交兵未已且外國相攻者中國之利此誠朝廷養謀待舋之時也若能內葺紀綱外練將卒休息民力蓄斂財用以坐待二敵之弊則幽薊靈夏之地一舉而可圗振耀威靈彈壓中外豈不休哉此臣所謂後必有大利者一也臣願陛下深思去大憂而取大利則為天下之福今范仲淹富弼往河東河北經制邉事必有所陳然臣久在陜西敢復陳陜西措置事宜且鄜延環慶涇原秦鳳四路雖罷招討使而邉備不可弛請仍選有才望近臣為之主帥特降手詔委之久任使其經營一方以備羌人翻覆之變又四路所駐兵十分中宜留六分在邉二分令東還二分徙屯近裏州軍其鄜延路屯河中府環慶涇原路徙屯邠州永興軍秦鳳路屯鳳翔府逐路鈐轄一貟駐泊都監二貟與逐路知州同行訓練而本路仍領之非有事宜不得輒抽動其徙屯兵馬處知州才望輕者請選人代之又四路所抽就糧土兵請委逐路帥臣相度嵗分兩畨一畨在邉一畨放歸本處不唯減節邉上糧草兼使無久戍之勞又陜西州軍經南郊賞給之後官帑例皆空虛今范仲淹若過陜西宣撫則又有軍間特支徒益所費若臣䇿可行陜西亦别無處置不必仲淹更往也復見諸路昨招置宣毅兵近十一萬然朝廷物力未充何以贍給況閭里竊發自有巡檢縣尉可以捕擊若防羣盜只當益屯一路都㑹之地不必每州盡要防守其宣毅兵欲乞除河北河東外其京東京西淮南兩浙江南荆湖福建等路每指揮可減以三百人為額後有闕即招填之今天下兵冗不精輕蠧財用陜西河東河北京東州軍已曽差官揀選其餘路亦乞選近上內臣分往揀選所貴冗食可蠲而經費可給也仁宗時太子中允充館閣校勘歐陽修上書曰臣伏見國家自元昊叛逆關西用兵以來為國言事者衆矣臣初竊為三䇿以料賊情臣迂儒不識兵之大計始猶遲疑未敢自信今兵興既久賊形已露如臣素料頗不甚逺故竊自謂有可以助萬一而塵聽覽者謹條以聞惟陛下仁聖寬其狂妄之誅幸甚夫關西弛備而民不見兵者二三十年矣使賊萌亂之初藏形隱計卒然而來當是時吾之邉屯寡弱城堡未完民習久安而易驚將非素選而敗怯使其羊驅豕突可以奮然而深入然國威未挫兵力未疲彼得城而居不能久守虜掠而去可邀擊其歸此下䇿也故賊知而不為之異域侵邉自古為患其攻城掠野敗則走而勝則來蓋其常事此中䇿也故賊兼而用之若夫假僭名號以威其衆先擊吾之易取者一一以恱其心然後訓養精鋭為長久之謀故其來也雖勝而不前不敗而自退所以誘吾兵而勞之也或擊吾東或擊吾西乍出乍入所以使吾兵分備多而不得減息也吾欲速攻賊方新鋭坐而待戰彼則不來如此相持不三四嵗吾兵已老民力已疲不幸又遇水旱之災調斂不勝而盜賊羣起彼方奮其全鋭擊吾困弊可也使吾不堪其困忿而出攻決於一戰彼以逸而待吾勞亦可也幸吾苦兵計未知出遂求通聘以邀嵗時之賂度吾困急不得不從亦可也是吾力一困則賊謀無施而不可此兵法所謂不戰而疲人兵者上䇿也而賊今方用之今三十萬之兵食於西者二嵗矣又有十四五萬之鄉兵不耕而自食其民自古未有四五十萬之兵連年仰食而國力不困者也臣聞元昊之為賊威能畏其下恩能死其人自初僭亂嫚書已上逾年而不出一出則鋒不可當執劫蕃官獲吾將帥多禮而不殺此其凶謀所畜皆非倉卒者也奈何彼能以上䇿而疲吾吾不自知其已困彼為久計以撓我我無長䇿而制之哉夫訓兵養士伺隙乘便用間出竒此將帥之職也所謂閫外之事而君不御者可也至於外料賊謀之心內察國家之勢知彼知此因謀制敵此朝廷之大計也所謂廟算而勝者也不可以不思今賊謀可知以久而疲我耳吾勢可察而人已困也誠能豐財積粟以紓西人而完國壯兵則賊謀沮而廟算得矣夫兵攻守而已然皆以財用為彊弱也守非財用而不久此不待言請試言攻昔秦席六世之強資以事敵卒困天下而不得志漢因文景之富力三舉而才得河南隋唐突厥吐蕃常與中國相勝敗擊而勝之有矣未有舉而滅者秦漢尤強者其所攻今元昊之地是也況自劉平陷沒賊鋒熾鋭未嘗挫衄攻守之計非臣所知天威所加雖終期於掃盡然臨邉之將尚未聞得賊舋隙挫其凶鋒是攻守者未有休息之期而財用不為長久之計臣未見其可也四五十萬之人坐而仰食然關西之地物不加多關東所有莫能運致掊克細碎既以無益而罷之矣至於鬻官入粟下無應者改法權貨而商旅不行是四五十萬之人惟取足於西人而已西人何為而不困困而不起為盜者須水旱耳外為賊謀之所疲內遭水旱而多故天下之患可勝道哉夫關西之物不能加多而必通其漕運而致之漕運已通而關東之物不充則無得而西矣故臣以謂通漕運盡地利權商賈三術並施則財用足而西人紓國力完而兵可久以守以攻惟上所使夫小瑣目前之利既不足為長久之謀非旦夕而可效故為長久而計者初若迂愚而可笑在必而行之則其利博矣故臣區區不敢避迂愚之責請上便宜三事惟陛下裁擇其一曰通漕運臣聞今為西計者皆患漕運之不通臣以謂但未求之耳今京師在汴漕運不西而人之習見者遂以為不能西不知秦漢隋唐其都在雍則天下之物皆可致之西也山川地形非有變易於古其路皆在昔人可行今人胡為而不可漢初嵗漕山東粟數十萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百餘萬石隋文帝時沿水為倉轉相運置而關東汾晉之粟皆至渭南運物最多而遺倉之跡往往皆在然尚有三門之險自唐裴耀卿又尋隋迹於三門東西置倉開山十八里為陸運以避其險卒泝河而入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米嵗入于汴者六百萬石誠能分給關西得一二百萬石足矣今兵之食汴漕者出戍甚衆有司不惜百萬之粟分而及之其患者三門阻其中爾今宜浚治汴渠使嵗運不阻然後按求耀卿之迹不憚十許里陸運之勞則河漕通而物可致且紓關西之困使古無法今有可為尚當為之況昔人行之而未逺今人行之而豈難哉耀卿與晏初理漕時其得尚少至其末年所入十倍是可久行之法明矣此水運之利也臣聞漢髙祖之入秦不由東關而道南陽過酈析而入武關曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟又自長安出武關奔南陽則自古用兵往來之徑也臣嘗至南陽問其遺老云自鄧西北至永興六七百里今小商賈往往行之初漢髙入關其兵十萬夫豈能容十萬兵之路宜不甚狹而險也但自洛陽為都行者皆趨東關其路久而遂廢今能按求而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽自南陽為輕車人輦而遞之募置遞兵為十五六鋪則十餘州之物日日入關而不絶沿漢之地山多美木近漢之民仰足而有餘以造舟車甚不難也前日陛下深恤有司之勤內賜禁錢數十萬以供西用而道路艱逺輦運踰年不能畢至至於軍裝輸送多苦秋霖邉州已寒冬服尚滯於路其艱如此夫使州縣綱吏逺輸京師轉冒艱滯然後得西豈若較南陽之旁郡度其地里入于武關與至京師逺近等者與其尤近者皆使直輸于關西京師之用有不足則以禁帑出賜有司者代而充用其迂曲簡直利害較然矣此陸運之利也其二曰盡地利臣聞昔之畫財利者易為工今之言財利者難為術昔者之民賦稅而已故其不足則鑄山煮海𣙜酒與茶征關市而算舟車尚有可為之法以茍一時之用自漢魏迄今其法日增其取益細今取民之法盡矣昔者賦外之征以備有事之用今盡取民之法用於無事之時悉以冗費而縻之矣至卒然有事無法可增然獨猶有可為者民作而輸官者已勞而游手之人方逸地之産物者耕不得代而不墾之土尚多是民有遺力地有遺利此可為也況厯視前世用兵者未嘗不先營田漢武帝時兵興用乏趙過為畎田人犂之法以足用趙充國攻西羌議者爭欲出擊而趙充國深思全勝之䇿能忍而待其弊至違詔罷兵而治屯田田於極邉以逰兵而防鈔寇則其理田不為易也猶勉為之後漢之時曺操屯兵許下彊敵四面以今視之疑其旦夕戰爭而不暇然用棗祗韓浩之計建置田官募民而田近許之地嵗得榖百萬石其後郡國皆田積榖無數隋唐田制尤廣不可勝舉其勢艱而難田莫若充國迫急而不暇田莫如曺操然皆勉焉不以迂緩而不田者知地利之博而可以紓民勞也今天下之土不耕者多矣臣未能悉言謹舉其近者自京以西土之不闢者不知其數非土之瘠而棄也蓋人不勤農與夫役重而逃爾久廢之地其利數倍於勞田今若督之使勤與免其役則願耕者衆矣臣聞鄉兵之不便於民議者方論之矣充兵之人遂棄農業託云教習聚而飲博取資其家不顧無有官吏不加禁父兄不敢詰家家自以為患也河東河北關西之鄉兵此猶可用若京東西者平居不足以備盜而水旱適足以為盜其尤可患者京西素貧之地非有山澤之饒民惟力農是仰而今三夫之家一人五夫之家三人為游手凡十八九州以少言之尚可四五萬人不耕而食是自相縻耗而重困也今誠能盡驅之使耕于棄地官貸其種嵗田之入與中分之如民之法募吏之習田者為田官優其課最而誘之則民願田者衆矣太宗皇帝時嘗貸陳蔡民錢使市牛而耕真宗皇帝時亦用耿望之言買牛湖南而治屯田今湖南之牛嵗賈于北者皆出京西若官為買之不難得也且鄉兵本農也籍而為兵遂棄其業今幸其去農未久尚可復驅還之田畝使不得羣逰而飲博以為父兄之患此民所願也一夫之力以逸而言任耕縵田一頃四五萬人皆耕而久廢之田利又數倍則嵗榖不可勝數矣京西之分北有大河南至漢而西接關若又通其水陸之運所在積榖惟陛下詔有司而移用之矣其三曰權商賈臣聞秦廢王法啓兼并其上侵公利下刻細民為國之患久矣自漢以來嘗欲為法而抑奪之然未能也蓋為國者興利日繁兼并趨利日巧至其甚也商賈坐而權國利其故非他由興利廣也夫興利廣則上難專必與下而共之然後通流而不滯然為今議者方欲奪商之利一歸於公上而專之故奪商之謀益深而為國之利益損前日有司屢變其法法每一變則一嵗之間所損數百萬議者不知利不可專欲專而反損但云變法之未當變而不已其損愈多夫欲十分之利皆歸于公至其虧少十不得三不若與商共之常得其五也今為國之利多者茶與鹽而已茶自變法以來商賈不復一嵗之失數年莫補所在積朽棄而焚之前日議者屢言三稅之法為便有司既以詳之矣今誠能復之使商賈有利而通行則上下濟矣解池之鹽積若山阜今宜暫下其價誘羣商而散之先為令曰三年將復舊價則食利之商爭先而湊矣夫茶者生於山而無窮鹽者出於水而不竭賤而散之三年十未減其一二夫二物之所以貴者以能為國資錢幣爾今不散而積之是積朽壤也夫何用哉夫大商之能蕃其貨者豈其錙銖躬自鬻於市哉必有販夫小賈就而分之販夫小賈無利則不為故大商不妬販夫之分其利者恃其貨博雖取利少貨行流速則積少而為多也今為大國者有無窮不竭之貨反妬大商之分其利寧使無用而積為朽壤何哉故大商之善為術者不惜其利而誘販夫大國之善為術者不惜其利而誘大商此與商賈共利取少而致多之術也今必以術制商宜盡括其居積之物官為賣而還之使其貨盡而後變法夫大積之商以利為生一嵗不營利則有惶惶之憂彼必不能守積錢閒居得利雖薄猶將勉而來此變法制商之制也夫誘商而通貨莫若與之共利此術之上也制商使其不得不從則莫若痛裁之使無積貨此術之下也然此可制商茶耳若鹽者禁益密則犯愈多而刑繁若乃縣官自為鬻市之事此大商之不為臣謂行之而難久者也誠能不較錙銖而思逺大則積朽之物散而錢幣通可不勞而用足矣臣愚不足以知時事若夫堅守以捍賊利則出而擾之凡小便宜願且委之邉將至於積穀與錢通其漕運不二三嵗而國力漸豐邉兵漸習賊鋭漸挫而有隙可乘然後一舉而滅之此萬全之䇿也願陛下以其小者責將帥謀其大計而行之則天下幸甚修昧死再拜修又上奏曰臣伏見北敵近於界首添建城寨及拘囚定州巡兵湯則侵過銀坊冶谷地界等事竊聞朝廷至今未有分明嚴切指揮令邉臣以理爭辨竊料朝廷之意必謂爭之恐有引惹之虞此乃慮之過計之失也夫敵性無常最為難測欺弱畏強難示以怯今杜之於早而力為拒絶猶恐不能若縱之不爭而誘其來侵乃是引惹況西山道路有三十餘處皆可行兵其險要折扼在於軍城銀坊等路為彼奪據而不爭則北寨王栁等口漸更來侵豈能爭矣是則西山險要盡為彼奪一日使彼以大兵渡易水由威虜之西平陸而來以竒兵自飛狐出西山諸口而下則我腹背受敵之患不知何以禦之此蓋兵法必爭之地也且與人為鄰敵而自棄險要任彼奪據而不爭雖使我弱彼彊尚須勉強何況勢鈞力敵又違誓約而彼曲我直乎臣謂朝廷所以然者蓋由未察敵中強弱之形而不得其情僞之實也臣又見朝廷常有懼敵之色而無憂敵之心夫憂之與懼名近而意殊憂者深思極慮而不敢暫忘懼者臨事惶惑而莫知所措今邉防之事措置多失其機者懼慮之意過深也若能察其彊弱之形得其情僞之實則今日之事誠不足懼而將來之患深有可憂奈何不憂其深可憂而反懼其不足懼且戎人雖以戰射為國而邪律氏自幼承其父祖與中國通和之後未嘗躬戰陳遭勍敵謀臣舊將又皆老死今其臣下如固寧者無三兩人寧才不及中人已是彼之傑者所以君臣計事動多不臧當初對梁適遣使河西使與中國通好及議和垂就不能小忍以邀中國厚利乃與元昊爭夾山小族遂至交兵而纍戰纍敗亡失人馬國內瘡痍誅斂山前漢人怨怒往時彼殺漢人者罰漢人殺彼者死近聞反此二法欲悅漢人漢人未能收其心而北人亦已怒矣又聞今春女真渤海之類所在離叛攻劫近才稍定方且招輯敗亡修完器甲內恐國中之復叛外有西夏之為虞心自懷疑憂我乘虛而北襲故於界上勉強虛囚我巡兵侵我地界蓋其實弱而示強者用兵之詭計故臣謂茍能察其強弱知其情僞則無不爭之理何必懼其不足懼哉自國家困於西鄙用兵常慮北敵合謀乘隙而動及見二國相失而交攻議者皆云中國之福夫幸其相攻為我之福則不幸使其解仇而復合豈不為我禍乎臣謂北敵昨所以敗於元昊者亦其久不用兵驟戰而逢勍敵耳聞其自敗衄以來君臣恐懼日夜謀議通招丁口柬募甲兵處處開教閲之場家家括糧馬之數以其天姿驍徑之俗加以日夜訓練之勤則其強難敵矣今彼國雖未有人然大抵為國者久無事則人難見因用兵則將自出使其交戰既頻而謀臣猛將爭能並出則是夾山一敗警其四十年因循之弊變驕心而為憤志化惰卒而為徑兵因屢戰而得驍將此乃北敵之福非中國之福也此臣所謂將來之患者也然二國勢非久相攻者也一二年間不能相并則必復合使北敵驅新勵之強兵無西人之後害而南向以窺河北則又將來之患大者也臣雖不知朝廷顧河北為如何但於本路之事以今年較去年則亦可見去年已前河北官吏無大小皆得舉材而擇能急於用人如不及者惟恐一事之失計故也自今春以來差除漸循舊弊凡幹敏之吏熟於北方事者舉爾奏乞百不一從不惟使材臣能吏不勸而殆亦足見朝廷不憂河北之事辦否也至如廢緣邉久任之制而徙劉貽孫以王世文當冀州李中吉當廣信王中庸當保州劉忠順當邢州如此數人於閒漫州軍尚憂敗政況於邉要之任乎臣愚以朝廷不以北事為憂歷代名臣奏議卷三百二十五
