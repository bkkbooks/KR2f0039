body:
  text: 歷代名臣奏議卷二百二明楊士竒等撰聽言唐憲宗元和三年翰林學士白居易上奏曰臣伏見內外官近日除改人心甚驚逺近之情不無憂懼喧喧道路異口同音皆云制舉人牛僧孺等三人以直言時事恩奬登科被落第人怨謗加誣惑亂中外謂為誑妄斥而逐之故並出為關外官楊於陵以考策敢收直言者故出為廣府節度韋貫之同所坐故出為果州刺史裴垍以覆䇿又不退直言者故免內職除户部侍郎王涯同所坐出為虢州司馬盧坦以數舉事為人所惡因其彈奏小誤得以為名故黜為左庶子王播同之亦停知雜臣伏以裴垍王涯盧坦韋貫之等皆公忠正直內外咸知所宜授以要權致之近地故比來衆情私相謂曰此數人者皆人之望也若數人進則必君子之道長若數人退則必小人之道行故卜時事之否臧在數人之進退也則數人者自陛下嗣位以來並蒙奬用或任之耳目或委以腹心天下人情日望致理今忽一旦悉踈棄之或降於散班或斥於遠郡設令有過猶可優容況且無瑕豈宜黜退所以前月已來上自朝廷下至衢路衆心洶洶驚懼不安直道者疚心直言者杜口不審陛下得知之否凡此除改傳者紛然皆云裴垍等不能委曲順時或以正直忤物為人之所媒糵本非聖意罪之不審陛下得聞之否臣未知此說虛實但獻所聞所聞皆虛陛下得不明辨之乎所聞皆實陛下得不深慮之乎虛之與實皆恐陛下要知臣若不言誰當言者臣今言出身戮亦所甘心何者臣之命至輕朝廷之事至大故也臣又聞君聖則臣忠上明則下直故堯之聖也天下已太平矣尚求誹謗以廣聰明漢文之明也海內已理矣賈誼猶比之倒懸可為痛哭二君皆容納之所以得稱聖明也今陛下明下詔令徴求直言反以為罪此臣所以未諭也陛下視今日之理何如堯與漢文之時乎若以為及之則誹謗痛哭尚合容而納之況徴之直言索之極諫乎若以為未及則僧孺等之言固宜然也陛下縱未能推而行之又何忍罪而斥之乎此臣所以為陛下流涕而痛惜也德宗皇帝初即位年亦徴天下直言極諌之士親自臨試問以天旱穆質對以兩漢故事三公當免卜式著議𢎞羊可烹此皆指言當時在權位而有恩寵者德宗深嘉之自第四等拔為第三等自畿尉擢為左補闕書之國史以示子孫今僧孺等對䇿之中切直指陳之言亦未過於穆質而遽斥之臣恐非嗣祖宗承耿光之道也書諸史策後嗣何觀焉陛下得不再三省之乎臣昨在院與裴垍王涯等覆策之時日奉宣令臣等精意考覆臣上不敢負恩下不忍負心唯秉至公以為取捨雖有讎怨不敢棄之雖有親故不敢避之唯求直言以副聖意故皇甫湜雖是王涯外甥以其言直合取涯亦不敢以私嫌自避當時有狀具已陳奏不意群心構成禍端聖心以此察之則或可悟矣儻陛下察臣肝膽知臣精誠以臣此言可以聽採則乞俯回聖覽特示寬恩僧孺等准往例與官裴垍等依舊職奬用使內外人意歡然再安若以臣此言理非允當以臣覆䇿事涉乖宜則臣等見在四人亦宜各加黜責豈可六人同事唯罪兩人雖聖造優容且過朝夕在臣懼惕豈可苟安敢不自陳以待罪戾臣今職為學士官是拾遺日草詔書月請諌紙臣若默默惜身不言豈惟上辜聖恩實亦下負神道所以密緘手疏潜吐血誠苟合天心雖死無恨無任憂懼激切之至六年憲宗謂宰臣曰朕少年在德宗左右見貞元中天下不理何故如此李吉甫對曰德宗自用聖智不任宰臣奏請皆有疑慮别結他門私恩信納事傾宰府公道不行所以下情不得上達當時人情頗亦思亂帝曰不可盡歸怨於德宗朕以謂此是當時宰相之過德宗深在九重何由得盡知外事政之可否秖合是宰相執論一度不得至再三再三不得直至五六道理既當事實無私自然上意須回詳思至當豈有固守無理之事苟違重臣所請必不然也朕在當時不見宰相執論公事至於再三者卿等皆須勵志不得順朕之錯必須執奏且至五六度不得謂朕怒怪便止不論卿等當悉之吉甫嘗言人臣不當强諫使君悅臣安不亦美乎李絳曰人臣當犯顏苦口指陳得失若陷君於惡豈得為忠帝曰絳言是也絳或久不諌帝輒詰之曰豈朕不能容受邪將無事可諫也元和中左拾遺元稹上奏曰臣聞先王之制祿也居其位而不行其職者誅是以上無虛授下無隱情臣竊觀今之備位素餐不行其職者莫過於臣輩臣聞太宗文皇帝時王圭魏徴為諫官文皇雖宴遊寢食之間王魏實在其所用至於文皇發一言則王魏善之而後出舉一事則王魏慮之而後行以文皇之明合王魏之智是以舉無遺事言有典常文皇猶以為視聽之未廣也因命三品已上入議軍國大政必遣諫官一員隨入以參驗之當是之時司股肱耳目之任者有君臣之義焉有父子之恩焉有朋友之歡焉是以否無不替可無不行不四三年而天下大理蠻夷君長帶刀入侍者不可勝計豈干戈征伐之所致乎蓋擁蔽之患銷而幽逺之情達也若此然後可以稱天子之諍臣矣近之司諌諍者則不然大不得備召見次不得參時政排行就列纍纍而已且臣聞之諫官之職曰左右前後拾遺補闕大則廷議小則上封近年已來正衙不奏事庶官罷巡對若此則不見遺闕補拾何階不得敷陳廷議安設其所謂舉諫職者唯獨誥令有不便除授有不當則奏一封執一見而已以臣思之君臣之際論列是非諷諭於未形籌畫於至密尚不能回至尊之盛意備讒慝之巧言而况於既行之誥令已命之除授然後奏一封執一見思欲收絲綸之詔回日月之光信無裨於萬一矣至使凡今之人以上封進計為妄動拾遺補闕為冗員以此稱供奉官與王圭魏徴為等列臣雖至愚能不自愧且陛下若以為臣等無所裨補不足參侍從固不當假以名器立之於朝茍以為務廣聰明稍關理道又不當屏棄踈賤之使至於此伏願陛下許臣於延英候對召臣一見賜以溫顏使臣得盡愚懇之誠備陳諫官之職苟或言有可採得裨陛下萬分之一是臣千載之一時也如或言不諳理塵黷聖聰則臣自置刑書以謝謬官之罪亦臣之所以甘心也無任懇欵發憤效職忘軀之至稹又自以職諌諍不得數召見乃上奏曰臣聞理亂之始各有萌象二者無門在君上啓之而已所謂萌象豈有他哉容直言廣視聽躬勤庶務委信大臣使左右近習者不敢蔽踈逺之臣庶此理之象也此而不理萬無一焉大臣不親直言不進抵忌諱者殺犯左右者刑與一二近習者决事於深宫之中羣臣莫得參籌畫此亂之萌也此而不亂亦萬無一焉是以古者人君即位之始萌象未見之時必有狂直敢言之士抵忌諱獻危言在上者苟或宥而容之激而進之則天下之君子望風而悅曰彼之狂而猶容於上上之人其欲來天下之士乎吾之道可以行矣其小人竦利而言曰彼之直可以得幸於上吾將直言以徼利可也由是天下之賢不肖各以所志貢言於上上下之志霈然而通得失之情幽逺必達合天下之智理萬物之心人人樂得其所戴其上如赤子之親慈母也雖欲誘之為亂其可得乎臣故曰容直言廣視聽而不理者萬無一焉及夫進計者入而不出直言者戮而不容則天下之君子自謀於心曰與其言且不用而身為戮吾寧危行言遜以保其終乎其小人擇利而言曰君之所惡者拂心逆耳之言也吾將茍順是非以事之可也由是進見者革而不內言事者寢而不聞若此則十步之事不得見也朝廷之情不得聞也而況於天下之大四方之遠乎故曰聾瞽之君非無耳目也蓋左右前後者屏蔽之不使視聽爾此而不亂其可得哉昔太宗文皇帝初即位時天下之人莫有諌者唯孫伏伽嘗以小事特諫於上文皇帝大悅厚賜田宅以勉之自是言事者惟懼乎言不直諫不極不能激文皇之盛意曽不以觸龍鱗犯忌諱為不可矣於是房杜王魏之徒議可否於前天下四方之人言得失於外不四三年而天下大理豈文皇獨運聰明於上哉蓋亦羣下各盡其言以宣揚發暢於天下也且夫樂全安而惡戮辱古今之情一也豈獨貞觀之人輕犯忌諱而好戮辱哉蓋文皇激而進之之功也喜順從而怒謇犯亦古今之情一也豈獨文皇甘逆耳而怒從心哉蓋以順從之利輕而危亡之禍大無窮之業重而奉已之事微思為子孫垂不朽建永安之計也為後嗣者其可順一朝之意而輕用文皇之天下乎纍聖傳緒於今垂二百年矣莫不率由斯道致俗和平況陛下以上聖之姿紹復前統即位之日天下惟新罪叔文之徒而凶邪之黨散懸惠琳之首而悖亂之氣消發承光之詐而假威之孽除反焦陂之田而蒸庶之情感其餘滌瑕緩死薄賦恤人賜帛耆年旌閭孝弟修廢學建義倉莫不曲被殊私覃于有截斯皆陛下上法堯舜近法太宗致理之萌形見者數十豈臣庸劣一二能明然而下臣竊復孜孜咄咄有所未快者獨以陛下即位以來既周嵗矣百辟卿士至於天下四方之人曽未有獻一計進一言受陛下伏伽之賞者左右前後拾遺補闕亦未有奏一封執一諫受陛下激而進之之勸者設諫鼓置匭函曽未聞雪一寃决一事明陛下無幽不察之意者若臣等備位諫列名為供奉官曠日彌年不得召見每就列位屏氣鞠躬不敢仰視又安暇議得失獻可否哉供奉官尚爾又況於踈逺之臣庶雖有特達不群之智思欲自效其路何階遂使凡今之人以諫鼓匭函為虛器謂拾遺補闕為冗員臣竊思之以陛下之睿博宏深勵精求理豈或入而不出言而不用哉蓋羣下因循不能有所發明之罪也且臣思之今之備召承顧問者獨一二執政而已每一對揚不及俄頃問議天下之事臣竊料之恭承聖問仰謝寵光之不暇又安暇陳理亂議教化哉其餘瑣瑣有司或時一召見言簿書之出入計錢穀之登降不暇又安足置牙齒間臣竊惟陛下以景命惟新之初何如貞觀致理之後當貞觀致理之後以房杜王魏匡輔之智而猶上封進計者洊至獻可替否者日聞今陛下當致理之初在四方多虞之日然而言事進計者終嵗無一人豈非羣下因循竊位之罪乎若臣稹者禀性駑鈍昧然無識然以當陛下臨御之始首陛下䇿賢之科擢授諫司恩萬常品若復默默與在位者處則臣莫大之罪亦萬於常品矣輒敢冒昧殊死件奏十事於後一曰教太子以崇邦本二曰任諸王以固磐石三曰出宫人以消水旱四曰嫁諸女以遂人倫五曰無時召宰相以講庶政六曰序次對百辟以廣聰明七曰復正衙奏事以示躬親八曰許方幅糾彈以懾姦佞九曰禁非時貢獻以絶誅求十曰省出入畋逰以防銜橛凡此十者設使言之而是是而見用非臣之福也天下之福也苟或言之而非非而見罪乃臣之分也亦臣之願也憲宗時學士李絳浴堂論事畢帝曰近日聞諫官諫事頗有不實言事朋黨多是謗讟須逺貶三兩人甚者以勵其餘絳因對曰陛下此言似非聖意恐有邪佞之人以誤天心且自古聖王未嘗不納諌則昌拒諌則亡故夏禹拜昌言漢武延直諌所以光於史䇿也史傳備載歷代帝王置敢諫之鼓立司過之吏木鐸狥路以采風謡之詞商旅謗市以詳得失之政故成湯聖德格于皇天而稱改過不吝顏回希聖四科之首而美不二過則知雖至聖賢不免有過所貴能改不至順非若無諫諍何以知過故書云汝無面從又曰從諫如流昔太宗以聖武削平天下奄宅萬國而懼臣下不諫誘之使言至於李大亮孫伏伽之儔皆以上疏諫事並蒙褒奬魏徴王圭事大小皆獻直言諫諍切直用禆聖德故太宗振英聲於萬古王魏流芳名於千載未聞堯舜禹湯文武之君洎我太宗窒諌路以自壅蔽不聞其過唯失道之君惡聞已過夏桀殷紂周幽秦皇以拒諫諍飾非反道敗德直言者謂之誹謗正諌者謂之妖邪忠臣結舌端士養跡故不知已過遂至亡國向者四君招諫使言聞過輒改易覆車之轍啓忠臣之心則當政化益光宗社永固殷湯周武安得有鳴條牧野之戰戎人漢祖安得有驪山軹道之師且今補闕拾遺天后所置使在左右司察得失昔施之於女主今黜之於聖時國史之中何以示後微臣竊為陛下惜之夫臣下貢言於至尊如天臣卑如地加以日月之照雷霆之威小臣晝度夜思將有上諌本欲陳諫十事至時已除五六逮於緘封上進又削其半其得上達者十無二三何哉啓忤意之言干不測之禍顧身無利相時避禍者也自非聖主知直言有益於已正諫有裨於時溫言容納奬勵勸道忠臣抱義不顧其身懷忠不避其禍苟有致君濟時之益不識觸忌冒諱之誅何哉盡節之臣竭忠之士顧食君之祿推事君之道而致然也其君上納忠如是之急也臣下上諫如是之難也所以明主須宥其過恂恂納諫切言者賞之使必進極諌者褒之使必行然後聖德光明大化宣暢今黜責諫臣使直士杜口非社稷之利朝廷之禍也陛下詢於微臣不敢不陳愚欵帝曰非卿此言我安知諫諍之益也絳又於浴堂北廊奏對指切時弊有忤上㫖及論中官縱橫方鎮進獻事宜上怒甚頭面俱赤厲聲曰卿所論事何太過耶絳奏論不已曰所奏陳事理豈臣身之利是陛下之利陛下不以臣愚昧使處腹心之地豈可見事虧聖德致損清時而惜身不言仰屋竊嘆是臣負陛下也若不顧禍患盡誠奏論旁忤幸臣上犯聖㫖以此獲罪是陛下負臣也且臣與承璀素不相識又無嫌隙祗是威福太盛虧損聖明故不敢不言也使臣緘默非社稷之福也上見絳誠切不回怒色却散乃慰諭曰卿盡節竭誠於國人所不敢言卿悉言之朕聞所不聞知所不知真忠正誠節之臣也疾風知徑草卿之謂矣憲宗嘗召學士於三殿對奏論政事拾遺白居易言事抗直曰陛下錯帝色莊而罷乃謂李絳曰白居易小臣不遜須令出院絳因諫曰臣聞主聖臣直宥過莫大自陛下開納諫諍容受直言小臣然後敢極論得失從而怒之則是緘其口若從順陛下則安敢發言論況居易所言志在裨益言雖太直事涉不私伏恐衆議以為陛下惡聞直諫斥出正人非所以發揚聖德納諫諍也帝悅曰依卿所奏遂待之如初穆宗時栁公權為司封員外郎帝問公權用筆法對曰心正則筆正筆正乃可法矣帝改容悟其以筆諫也文宗泰和七年帝從容謂宰相曰殷侑經術頗似鄭覃李宗閔對曰覃侑經術甚可尚然議論不足聽李德裕曰覃侑議論他人不欲聞惟陛下欲聞之幸甚武宗嘗謂宰相曰文宗好聽外議諫官言事多不著名有如匿名書李德裕曰臣頃在中書文宗猶不爾此乃李訓鄭注教文宗以術御下遂成此風人主但當推誠任人有欺罔者威以明刑其誰敢欺上善之後漢隱帝乾祐中令常參官轉對給事陶榖上言曰五日上章曽非舊制百官叙對且異昌言徒浼天聽無益時政欲乞停轉對在朝羣臣有所聞見即許不時詣闕聞奏從之宋真宗景德三年直集賢院任隨乞以賞罰責諫臣舉職疏曰臣聞立國之本在乎得士得士之要在乎見情故仲尼以謂人情者聖王之田治道所由生也是則時之否泰事之損益萬化所繫必因人情人莫智於聖人資聖人之德者實由於良輔故漢書曰明主不惡切諫以博觀忠臣不避重誅以直諫諫也者蓋所以達下情而求治致君道於無窮故為臣有五諫之名前代有七人之列陛下祗嗣丕圖秉持金鑑可封之俗既阜成矣無疆之化亦馴致矣尚聞焦勞庶政待旦以視朝歷覽羣書乙夜而忘寐仍下賢良之詔旁求亮直之臣惟稽古之聖心軼前代之令典雖求諫之路已見於洞達而掌諫之臣未聞乎舉職今諫議大夫司諫正言數員但充位尸祿而已是致堯鼓之設寂寥而無聲杜觶縱陳謇諤而無效箱篋謾藏於陳紙搢紳競寢於正辭罕遵及霤之風莫覩引裾之直願陛下擇賢士黜具臣垂賞罰之文示懲勸之道其兩省諌官並准有唐故事定其員數優其俸給限以遷官之年月責以供職之否臧其或獻替推誠彌縫勵節言事有裨於時政抗章不避於天誅進思盡忠有犯無隱則請行甄擢以勵衆焉其或尸利無慙弼違有闕務引腹非之咎多致面從之諛不啓心而沃心罔危言而危行降黜以勵衆焉夫如是則賢者勸惰者激庸者奮懦者立俾朝廷之士咸願竭忠而報國矣四年帝謂王旦等曰朕以臣僚上殿者劄子不列姓名言者請留中不下是皆攻人之短發人隂私而不欲明行彈糾者若偏聽則事不可明若宣行則又違言者之意遂命杜鎬陳彭年檢討前代臣僚上封言事故事而降詔曰朕司牧生民講求政典言念代工之理實資著位之臣咸服官聫並勤夙夜固傾輸於誠節悉砥礪於亷隅恪奉教條共康理道而有因循未革習以為常馳競相緣免而無耻或攸司之曠廢或言事之詐欺宜頒申警之文用洽至公之化文武臣僚等各膺寵遇宜在竭誠凡所上章故當無隱儻思盡瘁奉國復何恤於人言豈必留中匿名俾有傷於公禮蓋有愛憎是狥善惡多誣但欲潛惑於聽聰不顧顯行於按覆頗彰欺罔深黷政經今後所上章疏並具姓名不得更乞留中如事干樞密朕即臨時相度自餘並付所司依理施行通判李邈上奏曰臣伏覩乙丑詔書文武官凡上章疏不得更乞留中並當付外施行者若帝王省決章疏不得留于禁中四方聞之以謂天子禁中留一紙書亦為敕文所束帝王必不盡知天下之事若升殿論奏不間小臣博訪得失可以輸盡忠懇苟機密之事不可示外者豈得頒令行下臣聞唐憲宗時李絳面請奬納規諌上曰卿所陳至公有裨於我今韋處厚路隋甚有諫疏言極忠益卿不知則當時諫書亦有留中之制且忠臣以欵誠結明主陛下亦欲盡審諸臣才器若悉付外則何人復敢獻言此詔若行恐非允當願令追寢以開言路仁宗天聖元年右正言劉隨上奏曰臣聞諌臣之廢置驗其隆替言路之開塞繫乎安危何則君為元首也大臣股肱也諫臣耳目也有人廢耳目而得聰明者未之有也故書稱明目達聰以防壅蔽也是以古之天子必置諫臣七人成湯至聖有好問則裕之言漢祖至明有從諫如流之美臣聞以古為鑑可以知興亡不敢逺稽前典且以近代言之唐太宗何如主也十八起義師二十四定天下二十九即帝位鑑情僞之理明治亂之由聖文神武髙于三代然猶每與大臣㑹議政事必令諫官憲臣史官預聞之苟詔令不便大臣不直刑賞不當邪正未分則諌官得諍之憲臣得彈之史官得書之是以上下無壅而君臣同德太平之風可謂至矣及髙宗御圖永徽已後忠良獲罪姦邪恣行諌諍之風于時掃地中睿之世固不足云以至動干戈於禁掖危社稷於綴旒明皇纘承盡革前弊虛心納諫朝聞夕行開兀之間可謂至治太平既久漸踈逆耳之言姦臣用事無復苦口之藥聽林甫之佞而卒相仙客不察子諒之忠致祿山之亂而越在草莽方憶九齡之語故曰諫臣之廢置驗其隆替言路之開塞繫乎安危厥後五代相仍亂離滋甚太祖皇帝乘時啓運拯救生靈太宗皇帝文德懷柔混一區夏真宗皇帝紹二聖之丕祚得萬國之歡心夷夏大同草木咸若猶廣開言路躬自採納縱有觸忤無不優容悲弓劒之上仙傳龜鼎於繼聖而賊臣丁謂包藏私志孤負國恩謂天髙而可欺謂地厚而可罔觀其用意鬼瞰何逃當先朝不豫之始使諌官絶班於冢宰擅權之時致無人論奏皇天眷命聖人道存特出宸衷逐其元惡正人之用天下咸寧所謂任賢勿二去邪勿疑者也乃詢逺御之䇿特建不拔之基雖股肱宣力致六合以為家而耳目未布慮一物之失所爰稽前事復致諫官臣最處庸愚獲預掄選凡關理體敢不盡心唐志云左右拾遺掌供奉諷議今之正言則拾遺也品秩雖卑責任甚重禮曰有犯無隱傳曰知無不為是以王者有過則犯顏而進諫大臣有罪則直指而不忌其或賞不以功罰不以罪詔令不便興作無時或除拜之間不以才進或公忠之士濫被中傷或流放之人天下未知其罪或進用之者天下未見其能凡關損益合具奏陳誘之以厚利而不動臨之以白刃而不懼此諫臣之職也然諫臣未必盡賢言事未必盡善用捨之際在聖君裁之而已臣又聞天下之治亂由時政之公私也至公則天下合而治至私則天下離而亂且夫至公則正正則綱條舉綱條舉則公卿大夫各當其任而州郡承風夷狄嚮化矣使天下之勢如身臂之使指欲其不治其可得乎且夫至私則濫濫則綱條不舉綱條不舉則公卿大夫不當其任而郡縣失守夷狄不信矣使天下之勢如理絲而棼之欲其不亂其可得乎至公者何用正人也其徒常少而易為搖動至私者何用姦人也其徒常多而動相交結自古姦佞似忠亦不好亂其道乖殊所以召亂也用捨之際豈容易哉臣又聞國之大患在於不得聞諫且王者操生殺之柄有雷霆之威虛心延納猶恐失之其或拒之孰敢扺罪是大臣顧位而不肯言小臣畏罪而不敢言上下偷安茍容竊位自古危亡常由此也且王者有甚愛之事有甚愛之人將行之將用之而物議未允必屈已而寢之此致治之本也若以甚愛不顧物議而行之大臣唯唯而不言小臣默默而不論則物議喧騰天下疑懼紀綱漸壞乃危亡之道故曰國之大患在於不得聞諌是國家舉一事發一令必自股肱大臣僉謀協同而後行之萬一不可則諌臣諍之于前御史糾之於後欲其敗事其可得乎今皇太后陛下聖智髙逺以至公治天下皇帝陛下聰明睿哲以至德臨域中左右前後無非正人蠻夷戎狄無不率化綱條整肅天下乂安可謂治矣然治不忘亂安不忘危蓋亂必生於治危必生於安既治且安而制之以公危亂之勢不得生矣唐憲宗嘗問侍臣時之所切侍臣對以納諫為切憲宗行之大復土宇臣亦謂之所切在於納諌其餘守常安靜而已臣受命已來思有所補雖名侍從之列其實踈逺之官夫以踈逺之官當諌諍之職進難言之事有觸鱗之虞孔子曰未信則以為謗已也今諌臣既置矣言路既開矣伏望思安危之大計念踈逺之難言使臣子得盡忠義之心九重得聞小大之事則天下幸甚八年隨又上奏曰臣聞好問則裕成湯所以為聰明從諫如流漢祖於焉成帝業歷代聖主必有諫臣然念言之甚難聽之不易以踈逺而指貴近以至賤而干至尊言之得無難乎在難言而言之身常危以至賤踈逺之人貢訐直逆耳之說聽之豈云易也在難聽而聽之意必倦且直者邪佞所惡自然之理也擊一邪則羣邪怒其身不得不危罪一正則羣邪進王者不得不謹是以先帝焦勞寤寐思得正人至于再三未獲讜直遂下此詔增置諌員月責諌疏明達耳目自後才得四人諌官二人魯宗道劉㠏御史二人劉平章頴其孜孜獻替者唯聞宗道而已皇帝御極追繼先志復置諌官又得四員以充其位諫官二人臣及孔道輔御史二人曹修古王碩其間道輔頴秀已在清途修古稱職亦為外任王碩以他事黜免微臣近歸諫省補報無狀出入八年復思先帝詔㫖云況朕親披封奏素靡漏言此乃極慮臣僚疑有漏泄而不敢盡言也周易云君不密則失臣臣不密則失身機事不密則害成正謂此也天聖五年臣嘗言某等事舉朝官員誦其言語羣邪側目增惡結讐甚可畏也若非兩宮聖明深辨忠直則臣已竄逐遐方矣自古奸臣皆以貨賂厚結左右及宫掖之內是以動靜先知迎合上意李林甫二十年專政明皇不疑上官昭容權傾天下唐祚顛殞前代似此蓋亦多矣國家傾敗常由此矣自兩宫御宇樂聞讜言然垂簾之日疑有潜聽封奏之人憂其漏泄是以人人懼禍而不敢盡言今則文武班列亦有議其得失諌官御史朝野譏其循默伏乞聖慈念先帝漏言之戒思周易失臣之文凡有奏章藏收祕密垂簾之日屏之左右則公忠之士得以盡言用廣聰明天下幸甚景祐二年監察御史裏行孫沔乞免上封事人罪疏曰臣聞主聖臣忠朝有直言之士下情上達外揚進善之旌前王思廣於聰明庶政莫能於壅塞尚慮諫臣顧祿竊位懷安故於觀闕之前專設匭函之制言之無罪誠不間於卑微來者可追庶獲聞於讜議時加激賞猶避深譏或致嚴科實為止善今竊見上封事人李安世輒因狂悖妄進瞽言不識朝廷之儀惟托市井之事毁欺日月干犯雷霆死有餘辜身不容責兼聞下吏審問支辭致詰飛聲推窮敗類然極索奸之理或傷招諫之仁雖曰狂愚猶勝諂佞況自道輔仲淹被黜之後龐籍范鎮致對已來凡在搢紳盡思緘默又慮千里之外四方之人不知安世訕上犯顏將謂安世獻忠獲罪豈有至聖猶忌危言自逺流傳為議非美覆巢之卵其類惡傷彈雀以珠所惜者大伏望皇帝陛下俯回造化貸以寬恩特免竄投以勵全節使彼偷安之士永懷內愧之心況臣與其人素匪交親未嘗識面縱干大典絶不相因惟恐史官直書於違愎可嗟言路重設於艱危伏乞少霽天威用存國體康定元年孫沔為右正言又乞行諫臣之言疏曰臣竊以諫諍之臣畏避是耻知無不言始為稱職大則庭議小則上封不顧忌諱以廣聰明有唐則名列中省班隨宰臣庶於萬機之際或伸一得之慮今給事不專封駮舍人惟行詔誥至於遺補分為虛秩政事不得聞乘輿不得從其或命令出入無以䆒論訪問隂求頗同姦伺得自傳聞十無二三再窮端實已復後時先事則有輕發之機遂事則曰已行之命徒盡貢於封章實委煩于省覽濶略之務或見頒行要切體宜罕聞報可是使臣僚之內但作疵瑕政教之中莫資補益臣自叨承乏已及五旬雖少陳於淺識終莫副於虛懷稍形詆刺遂復遲留至微尚有所難設若論朋黨於中外擊奸邪於左右議公卿之非據指官寺之作威則將何如哉臣若循默自容是辜君賜臣若忤觸受戾又貽親憂方寸交戰啓處不遑俯首懷慚趨走朝末所以知守道之難而為義不易也伏望陛下眀發無私斷在不疑凡有利於國有補於時在陛下思而必行之況今政綱未甚舉邉方未甚寧災變未甚息人民未甚康尚仍舊貫一切示暇此非臣所能知也若陛下擇善執中雷動風行則事有大于此者將以助一日二日之機矣臣本非博古妄進狂言上犯威顏甘俟竄逐景祐三年集賢校理余靖論范仲淹不當以言獲罪疏曰臣聞位踈而言深者罪也知淺而謀深者妄也臣故抵罪妄輒有開陳者懷忠事君不敢自愛萬一益國死無所恨伏聞今月十九日以吏部員外郎天章閣待制范仲淹落職守本官差知饒州者臣竊仲淹秉朴忠之心懷直諫之節不識忌諱有可矜憫觀其臨事不苟言必忤上竭忠奉國夫豈私其身哉去歲起自貶所召居顧問之職爾時正人端士酌酒相賀蓋喜陛下納善思治招來忠讜真聖帝哲王聰明之政也今兹遽聞以言獲罪左降僻逺事出不意驚駭耳目何其進之太暴而逐之太速乎然則仲淹若以官政闕失自取罪戾國有常典誰敢議之今以刺譏大臣指訐時政而不示含恕重加譴謫臣深為陛下不取也昔堯舜之帝商周之王嘗云諤諤以昌不聞誹謗為罪況仲淹前所言事在陛下母子夫婦之間犯顏逆耳最其大者以其言合典禮尚加優奬正人端士所以相賀者以陛下屈情狥道超越前古若是者也今因進對之際言大臣長短縱令謀論踈淺褒貶過當未必盡合聖慮此則斷在陛下聽與不聽耳安可與讒邪同罪乎至如汲黯在廷毁平津之多詐張昭論將以魯肅為粗踈漢帝吳王熟聞此議兩用無猜豈損令德臣今越職而言者非不知百官內外各有職分但以諫官御史畏罪而未言遂恐庶人之議不得上達故敢區區不避誅放臣之所言亦非營救仲淹何者仲淹自大理寺丞四五年間至吏部員外郎比於常流此乃踰涯之寵今雖落職於仲淹之身未有所損但所論者國家大體耳古者斥去直臣皆玷纍盛德故多含垢忍怒以示容納彼非不能快意行事蓋惜千古之名耳陛下自親政已來三逐言事者矣習以為常不甚重惜則恐書於史冊虧玷太平之政鉗天下之口塞陛下之聰在此舉矣不可不謹故臣披瀝肝膽冀陛下察之伏望陛下以舜察邇言為念以漢招直諌為謀常以壅塞而是憂不以誹謗而加罪追改前命無重過舉則天下幸甚慶厯三年知諌院歐陽修上奏曰臣竊聞近日為軍賊王倫事江淮州軍頻有奏報朝廷不欲人知召進奏官等于樞密院責狀不令漏泄指揮甚嚴不知此事出於聖㫖或只是兩府大臣意欲如此以臣料之為近日言賊事者多朝廷欲人不知以塞言路耳臣謂方今多事之際雖有獨見之明尚須博採善謀以求衆助豈可聾瞽群聽杜塞人口況朝廷處事未必盡能合宜臣下獻忠未必全無可採至如王倫驅殺士民攻劫州縣江淮之上千里驚搔事已若斯何由掩蓋當今列辟之士極有憂國之人欲為人主獻言常患聞事不的況臺諫之官尤是本職凡有論列貴在事初善則開端惡則杜漸言於未發庶易回改今事無大小常患後時或號令已行或事迹已布縱欲論救多不能及若更祕密不使聞知則言事之臣何由獻說臣今欲乞指揮進奏院凡有事非實封者不須祕密嘉祐元年修為翰林學士又上奏曰臣伏見陛下仁聖聰明優容諫諍雖有狂直之士犯顏色而觸忌諱者未嘗不終始保全往往亟加擢用此自古明君聖主之所難也然而用言既難獻言者亦以為不易論小事者既可鄙而不足為陳大計者又似迂而無速效欲微風則未能感動將直陳則先忤貴權而又旁有羣言奪於衆力所陳多未施設其人遽已改遷致陛下有聽言之勤而未見用言之效頓疑言事之職但為速進之階蓋緣臺諫之官資望已峻少加進擢便履清華而厭人言者因此亦得進說直云此輩務要官職所以多言使後來者其言益輕而人主無由取信辜陛下納諫之意違陛下賞諫之心臣以為欲救其失唯宜擇沈默端正守節難進之臣置之諫省則既無干進之疑庶或其言可信伏見殿中丞王安石德行文學為衆所推守道安貧剛而不屈司封員外郎吕公著是夷簡之子器識深逺沈靜寡言富貴不染其心利害不移其守安石久更吏事兼有美才曾召試館職固辭不就公著性樂閒退淡於世事然所謂夫人不言言必有中者也往年陛下上遵先帝之制增置諫官四員已而中廢復止兩員今諫官尚有虛位伏乞用此兩人補足四員之數必能規正朝廷之得失裨益陛下之聰明臣叨被榮恩未知報效苟有所見不敢不言六年修為樞密副使又上奏曰臣材識庸暗碌碌于衆人中䝉陛下不次拔擢置在樞府其于報效自宜如何而自居職以來已逾年嵗凡事關大體必須衆議之協同其餘日逐進呈皆是有司之常務至於謀猷啓沃蔑爾無聞上辜聖恩下愧清議人雖未責臣豈自安所以夙夜思惟願竭愚慮苟有可採冀裨萬一臣近見諫官唐介臺官范師道等因言陳升之事得罪或與小郡或竄逺方陛下自臨御以來擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聫翩被逐四出命下之日中外驚疑臣雖不知臺諫所言是非但見唐介范師道皆久在言職其人立朝各有本末前後補益甚多豈於此時頓然改莭故為欺罔上昧聖聰在於人情不宜有此臣竊以謂自古人臣之進諫于其君者有難有易各因其時而已若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足畏罪於下於此之時諌人主者難而言大臣者易若寬仁恭儉之主動遵禮法自聞其失則從諫如流聞臣下之過則務為優容以保全之而為大臣者外秉國權內有左右之助言事者未及見聽而怨仇已結於其身故于此時諫人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而已夫忠邪並進于前而公論與私言交入于耳此所以聽之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希㫖合意初聞若可喜者此邪臣之言也至於言事之官各舉其職或當朝正色顯言于廷或連章列書共論其事言一出則萬口爭傳衆目共覩雖欲為私其勢不可故凡眀言于外不畏人知者皆公言也若非其言職又不敢顯言或密奏乞留中或面言乞出自聖斷不欲人知言有主名者蓋其言涉傾邪懼遭彈劾故凡隂有奏而畏人知者皆挾私之說也自古人主能以此術知臣下之情則聽言之易也伏惟陛下仁聖寬慈容納直言於臣尤所優禮常欲保全終始思與臣下愛惜名節尤謹重于進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相吕夷簡貶知饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復吕景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼罷知蔡州今又唐介等五人言陳升之得罪自范仲淹貶饒州後至今凡二十年間逐臺諫者多矣未聞有規諫人主而得罪者臣故謂方今諫人主則易言大臣則難陛下若推此以察介等所言則可知其心矣昨所罷黜臺諫五人唯是從誨入臺未久其他四人出處本末迹狀甚明可以歷數也唐介前因言文彥博逺竄廣西煙瘴之地賴陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言忤劉沆罷臺職守外郡連延數年然後復用今三人者又以言樞臣罷黜然則介不以前蹈必死之地為懼師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節終始不變之士也至於王陶者本出孤寒只因韓絳薦舉始得臺官及絳為中丞陶不敢內顧私恩以義爭議絳終得罪牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂狥公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必無他議者或謂言事之臣好相朋黨動搖大臣以作威勢臣竊以謂不然至於去嵗韓絳言富弼之時介與師道以與絳為朋黨及與諸臺諫共論絳為非然則非相朋黨非欲動搖大臣可明矣臣固謂未可以此疑言事之臣也况介等比者雖為謫官幸䝉陛下寬恩各得為郡未至失所其可惜者斥逐諫臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未䝉憐察也伏望聖慈特賜召還介等置之朝廷以勸守節敢言之士則天下幸甚慶厯三年館閣校正蔡襄言增置諫官疏曰臣伏見朝廷選用王素余靖歐陽修等增備諌官是三人者皆特立之士昔以直言觸忤權臣擯斥且久今者一日並命人無賢愚萬口相慶皆謂陛下特發神斷擢任不疑蓋陛下深憂政教未舉賞罰未明群臣之邪正未分四方之利害未究故增耳目之官以廣言路此陛下為社稷生靈大計也臣竊思任諫非難惟聽諫之難聽諫非難惟用諫之難如素靖修等忠誠剛氣著信於人况䝉陛下奬拔之知必能針闕政獻明謨擲回邪擊權幸思所以報效也然邪人惡之必有禦之之說不過曰某人也好名也好進也彰君過也或進此說正是邪人欲蔽天聰不可不察臣請為陛下陳之一曰好名夫忠臣務盡其心事有必須切直者則極論之豈顧名哉若避好名之毁而無所陳施則土木之人皆可備數何煩陛下選揀如此之至况名者聖人以之勵世俗分善惡豈可廢乎借使為善近名陛下試思今之人逺權利敦潔行以近名者亦有幾人哉二曰好進前古諌臣之難者遭遇昏世上犯嚴威旁觸勢要鼎鑊居側斧鑕在前死亦不辭安得好進乎蓋近來諫官進用太速故世人必以謂之好進今諫官有盡忠補闕之效陛下但久任勿遷使其人果忠且義雖死于是官亦無恨矣三曰彰君過凡諫諍之臣蓋以司乎過舉也緩則密疏急則昌言期於必正若人主從而行之適以彰乎從諫之美安得謂之彰過乎然諌官亦有好名好進彰君過者異于此巧者之為諫臣事之難言者則喑而不言擇其無所忤者言之就令不行復再議退而曰某事我嘗言之矣此可謂之好名也容容默默無所耻愧踐歷資序以登貴仕此可謂之好進也凡人主之有過諌官最為近密或不盡言人主何從而知且變更乎傳之當世垂之于後終以為過此可謂彰君過臣向之所論乃忠臣巧者之分願賜省覽今陛下出于聖慮自擢諌官必自主之若有陳述于理適當即賜施行無使天下之人謂朝廷有好諫之名而無好諫之實使其言有訐切亦願優假無為奸邪搆間致有斥逐使天下之人指朝廷有拒諫之失也臣迹逺言近不任兢惶激切之至四年右正言錢明逸乞上殿三班外亦聽諫臣求對狀曰臣伏見閣門儀制每日上殿不得過三班緣三司開封府日有公事上殿外只有審刑院或大兩省班次即其餘並皆隔下且諌臣職在諌諍大抵言朝政得失詔令賞罰稍稽頃刻則事涉已行隨而更張國體非便欲乞今後諌臣有本職事求對雖已有三班外亦聽上殿敷奏八年同中書門下平章事集賢殿大學士文彥博乞繼上奏封細陳事理疏曰臣讀唐史見白居易為翰林學士因事進諫語甚切直憲宗不恱謂宰相李絳曰白居易小臣是朕拔擢致名位而無禮於朕朕極難奈絳對曰居易所以不避死亡之誅事無大小而必言者蓋酬陛下拔擢耳陛下欲開諫諍之路不宜阻居易之言憲宗曰卿言是也由是言多聽納臣以居易被憲宗拔擢才為學士能盡忠極諫以報恩遇而况臣菲才寒進孤立無黨獨䝉陛下誤聽特加拔擢位至宰相犬馬之誠堅於報主然自待罪兩府已逾二年略無謀獻上裨神聖雖則日奉天顏常親黼座所奏覆者率多冗細事務常程文書徒煩睿聽無益治體以此為宰相職業真所謂素飱尸祿齪齪小謹而已豈陳平所謂宰相者上佐天子理隂陽順四時外鎮撫四夷使卿大夫各得任其職之義乎房喬杜如晦唐之賢相太宗猶常責之曰公為宰相當須開耳目求訪賢哲有武藝謀略才堪撫衆者任以邉事有經明德修立性明悟者任以侍臣有明幹清慤處事公平者任以劇務有學通古今識達政術者任以治人此乃宰相之裨益也比聞聽受詞訟日不暇給安能助朕求賢哉斯言之責誠為至當臣每侍丹扆纍聞德音常以求賢致治為切務推誠納諌為至德臣愚不能上副聖意而陛下至仁未忍以大義責臣而臣獨不內愧於心乎臣復自念性本朴忠言多蹇拙幸得進對咫尺天威凡所敷陳或未詳盡臣嘗觀唐宰臣趙憬奏章欲上書論事其略曰稽顙丹陛仰對宸嚴蹇訥易窮遽數難辨理詳則塵瀆頗甚言略則利害不分切聞貞觀開元之際宰輔論事或多上言所冀獲盡情理時德宗嘉納之今臣之愚猶憬之志此後有面陳口奏頃刻之間或蹇訥有所未盡事理有所未周即欲繼上奏封細陳理道上裨睿聖訪納之勤下盡微臣區區之藴固不敢妄陳偏見亦不乞留中不出惟冀聖慈特賜詳擇皇祐元年知諫院錢彥逺論臺諫風聞言事疏曰臣伏覩天禧元年二月內增置諫官御史敕節文云或詔令不允官曹涉私措置失宜刑賞踰制征求無節寃濫未伸並仰諌官論奏憲臣彈舉每月須一員奏事或更有切務即許不依次入對雖言有過當必示曲全若事難顯行即令留內但不得潜為朋附故作中傷恭以真宗皇帝之時九穀順成三邉寧肅符瑞填委刑罰幾措尚或詢求闕政虛佇直言孜孜之心久而益厲三十年間斯制不易陛下纂紹丕圖虛心聽納寬容盡下言路大開未嘗一日少怠髙出前古逺矣天下方歌之舞之非假臣一二之陳而昨降敕命諫官御史不許風聞言人過失雖言而令中書樞密院不得施行誠敦厚風俗誡約苛細似與先帝敕意相逺先帝敕許論奏官曹涉私寃濫未伸是二者皆有司臣下之過也今皆不許風聞言之是涉私寃濫之疏無由上露今敕意謂過失自有人論訴及官司覺察其有恃怙威權結朋黨者人尚畏之豈敢訴也本末之間事未為允且諫官御史是陛下耳目譬如人之一身耳目聰明則聞見日博巨細洞察至於行止措置內斷於心豈可因耳目所見而必行苟自壅塞耳目則門庭之內或有不聞校於國家兹體尤大臣所以聞新敕之下久未上言者慮人情便之而今聞正士憤激謂起䝉蔽之端小人踴躍自得保全之計內外逺近公議頗同伏望聖慈體先帝元置諫官御史本意依天禧敕文內事節並許准故事風聞奏論彈舉所貴天聽及卑人情上達二年知太常禮院司馬光論張堯佐狀曰臣聞明主勞心力以求諫和顏色而受之士猶畏懦而不敢進又況震之以威壓之以重而望忠臣之至直言之入難矣臣之不忠言之不直而天下安萬事治者未之有也臣竊見臺諌官屢以張堯佐事上言而陛下執之益堅拒之益固前日臺諌官等守閣請對陛下却而不納中外之人莫不駭愕以為異事昔漢元帝欲用馮昭儀兄野王為御史大夫既而疑曰吾恐後世謂吾私于後宫遂不用今堯佐有野王之嫌而無其才陛下不次用之數年間自散郎至宣徽使雖彼實有可稱天下之人安可家至户曉使謂陛下不私後宫哉抑又聞之人有種瓜而甚愛之者盛夏日方中而灌之瓜不旋踵而烟敗其愛之非不勤也然灌之不以其時適所以敗之也今陛下貴用堯佐逺過其分天下已側目扼腕而疾之又復摧折忠諫以重其罪是正日中而灌瓜也臣竊為堯佐寒心而陛下獨不為之深思逺慮哉非獨如是而已前者臺諫官不得對之日隂霧冥冥跬步相失寒氷著木終日不解臣謹按洪範五行傳聽之不聰是謂不謀厥咎急厥罰常寒又按京房書謂之䝉氣此皆隂氣太盛壅蔽陽明上下否塞凝惑不决之象天意昭然有如教語行道之人皆知其異陛下性資純孝嚴恭天命容納直言深明得失此非臣之諛乃天下所共知也獨奈何以堯佐之故忽天戒而不顧棄人言而不從輕祖宗之爵祿違古今之明鑒書之簡䇿使天下之人有以議聖德之萬一或纍於光融髙大之美此臣所以日夜痛心疾首寢不能安食不能飽深為陛下重惜者也臣聞臣之事君猶子事父也豈有父獲大謗於外而子不以告且不諫哉惟陛下亟召諫臣使竭其所聞采納其言而慰安其意以厭上天之心解外廷之惑闢忠讜之路塞寵幸之門則天下歡然歌誦盛德豈有窮哉昔漢明帝作德陽殿鍾離意諫即時罷之後乃復作殿成謂羣臣曰鍾離尚書在此殿不成矣然則明帝非不欲為殿也所以屈意罷之者欲全諫臣之節而開直言之端也今臺諌官前後言堯佐者數矣陛下曽不留神省察少為末減以慰其心夫人主所欲為人臣豈能强變之哉顧自今以往事復有大於堯佐者在列之臣噤默拱手視之而已矣此非朝廷之福也不然羣臣猶朽木陛下猶雷霆安可以力校哉惟陛下察之而已矣三年翰林學士知制誥胡宿上奏曰臣聞聖主悅至言好崇諫所以廣治道防一切之未然也臣以螻蟻竊觀陛下特禀上睿之德能聽大度之言數賞諌臣以擢臺職推誠含垢美盡君人之量堯舜之用心也近日聞臺官言事事涉後宫之親出於風聞有㫖詰責臣愚以謂諫官御史朝廷紀綱所寄雖有過謬可且優容昔漢文賢主也袁盎直臣也帝所幸慎夫人盎掌諫諍言涉不遜初雖怒終不加罪後慎夫人聞之復賜盎金五百斤慎夫人所以能保榮寵者以能賞袁盎之直言也漢元帝馮野王昭儀之兄也德行髙妙推為第一時御史大夫缺公卿多薦野王為之帝曰吾若用野王為之天下必以我私後宫之親昔德宗謂李絳比諫官論奏不實欲黜其尤絳曰此非陛下意必憸人以此熒誤上心自古納諫昌拒諫亡君尊如天臣卑如地干不測之禍雖開納奬勵尚恐不至直士杜口非社稷福臣願陛下鑒觀前史開納至言臣不勝區區之情直集賢院劉敞上奏曰臣伏聞陛下以殿中侍御史裏行唐介言事狂狷責授春州别駕尋又聞陛下以春州險逺瘴癘之地憐其孤危將不生全改授英州此誠陛下聖德厚恩容忍臣子萬萬無窮也臣竊觀詩書所載帝王之君德莫盛於知過仁莫大於好生名莫榮於聽諫陛下皆踐之且唐介居下訕上至陷於戾而陛下察其本心以忠信為之故曰知過既責介身投之逺方而復憂其不全故曰好生當介初得罪之時中外震動以言為戒及聞徙還英州人人歡欣知陛下無意殺之忠義者更思竭盡故曰聽諌臣不勝幸甚臣聞伊尹戒商王曰有言逆於汝心必求諸道有言遜于汝志必求諸非道此商所以保乂四海格于皇天者也臣所謂介之所言雖逆耳求之于道亦當有合者陛下幸寬全不誅矣若復濶略其罪優遊其身使得省過追咎復齒朝列于以開廣言路勸來者則盛德無疆臣不勝犬馬之心至和元年敞又論不當排言者疏曰臣昨聞吳充黜官馮京落職將謂其人所行實有過當所言實有不可是以觸忤聖意不䝉矜恕及于延和殿奏事面奉宣諭充乃是振職京意亦無他中書惡其太直不與含容臣竊驚駭不覺憤咽前古以來唯有人主不能容受直言或致竄謫臣下今陛下慈仁好諌寬大如此不知中書何故不務將順聖意之美須要排逐言者今四方之人不知本末反謂陛下不能聽諌口謗腹誹所損不小且如此事陛下心所必恕中書却欲必行是蔽君之明止君之善侵君之權增君之過苟要作威驚動朝望陛下不可不深察也臣按六經舊史大臣蔽君之明止君之善侵君之權增君之過皆為不忠陷於刑誅况今時人情逺不如古若聞陛下欲為善而牽於大臣大臣欲作威而不憚陛下則必相率背公向私奔走權門矣此風一動此勢一失是為君與臣同國聖人之至戒也魯僖公時頻致天旱春秋謂由公子遂專權之應而洪範五行僭則常𤾉䝉則常風下侵上則山崩地震日月薄蝕如今者此事逆於倫理必恐感動隂陽或能遂致災旱風霧山崩地震日月之眚望陛下留神深察此言臣以淺近荷陛下厚恩不敢不報然竊恨此一事近世未有臣雖口陳未能詳盡謹手書具奏以聞御史馬遵上奏曰臣聞古者天子有諍臣七人蓋左右前後承弼之任故傳曰公卿比諫漢制國有過則三公得通議之故平津侯不肯面折廷爭汲黯數之且曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎唐太宗與房魏王圭輩議事十數往返歸當而後已故能成太平李絳欲論采擇一事同列李吉甫曰此嗜欲間事難言從他諫官上疏絳曰此難事豈可推與諫官且君為元首臣為股肱何事而不可得論也管仲曰大臣持祿而不敢諫小臣畏罪而不敢言此害霸也然則自古諫諍乃大臣之任不獲已而後至於言責之人蓋事有本末勢有先後若大臣不能正之于前而使小臣救之于已然之後其難易不侔也又況王言如絲出而漸大國令如汗下而不返乎以此見言責之難為也且為忠臣不若良臣用直諫不如諷諫若無益事實自取空名豈愛君憂國之人哉伏惟陛下容覆如天地照臨如日月言無不從事無不察然猶並列臺諫以廣耳目此堯舜禹湯之用心也其如事關近司禁防甚密先事而言或謂之輕發後時而議則謂之已行空言雖多成效甚少有臺諫之名無臺諫之實甚可惜也臣愚欲望陛下清閒之宴召對執政大臣以堯舜君臣相戒敕之義丁寧宣諭今後事有未便理有未安或踰祖宗之制度或失先王之典禮並須再三執奏不得一切奉行以歸當為限如此則諸妖不能勝德大和可以致祥萬事不隳太平可致臣以言事名官不以全責自歸而敢扳援大臣者豈為自安之計哉蓋古義如此時事當然臣言雖輕于事甚切惟陛下裁擇臣不勝惶恐待罪之至二年御史中丞孫抃論章疏多留中不降出狀曰臣伏見近日臣僚所上章奏多有留中不曽降出者臣愚竊謂此一事于朝廷之體至要至重陛下宜深思而逺慮之可也帝王尊居九重總覽萬幾防謹之先在於壅塞鋭心精力舉通其原尚或間有欺隱故作弛放弊將如何臣即不審是已經聖覽别有特㫖使之然耶將權勢僥幸妄生希合而致然耶萬一姦人緣此隂結巧僞公為稽祕果有警急事陛下不聞大臣不得知其如何吁可駭也且書稱明四目達四聰堯舜所以成大聖今自溫成皇后薨逝以來忽然生此節目臣恐四方聞之謂陛下不喜正論遂使讜臣端士噤口結舌默不敢吐非廟社朝廷之福非天下生靈之福欲望陛下敕中書申明自來條約指揮通進銀臺司及內中經歷處所應文字並須立便批鑿投進或降出不得稍違時刻仍一一與大臣商榷可行可止之狀以慰中外物議則陛下聖德不損于昔時陛下朝政愈新於今日臣不勝懇悃之至仁宗時天章閣待制知諫院包拯進魏鄭公三疏劄子曰臣聞唐太宗英明好諫之主也魏元成忠直無隱之臣也故君臣道合千載一時事無不言言無不納太宗嘗謂左右曰朕即位之初或言人主必須威權獨運不得委任臣下或欲耀兵振武懾服四夷惟有元成勸朕偃革興文布德施惠中國既安逺人自服朕從其語天下大寧絶域君長皆來朝貢此皆元成之力也是致貞觀之風與三代比盛垂三百年抑有繇矣所上諫疏具在史冊臣竊謂元成雖言于當日亦可行於方今謹條其三疏備録于左皆詞理切直可為龜鑑伏望陛下萬機之暇特賜觀覽傅說曰知之非艱行之惟艱惟陛下少留聖意天下幸甚拯又論臺官言事狀曰臣伏見近者臺官以朝政闕失上章論列或令分析或取戒勵中外傳聞于體不便且國家置御史府者蓋防臣僚不法時政失宜朝廷用之為紀綱人君委之如耳目所以先帝特降詔書添置侍御史已下六員並不兼領職當時詔令不允官曹涉私措置乖方刑賞踰制並許彈奏雖言有過當必示曲全若事難顯行即令留內蓋先帝切于求治如是之極也伏自陛下臨御以來將三十載遵守先訓廣開言路虛懷以待犯顏必容此皆陛下憂勤庶政之至深群臣仰望清光之不暇矣臣欲望今後御史等凡有彈奏事或過當更不令分析及取戒勵若乃阿意狥私即乞重行責降如此則上彰陛下好諌之德下免朝廷過舉之失英宗治平三年龍圖閣直學士司馬光上奏曰臣近曽上殿䝉聖恩宣諭以濮王稱親事云此親字官家亦本不欲稱假使只稱濮王與仙逰縣君有何不可臣乃知陛下至公本無過厚於私親之意直為政府所誤以致外議紛紜必謂旦夕下詔罷去親名其已出臺官當别有除改見在臺官亦優加撫諭使之就職昨日忽聞侍御史知雜事傳堯俞知和州侍御史趙鼎通判淄州趙瞻通判汾州中外之人無不驚愕此蓋政府欲閉塞來者使皆不敢言得專秉大權逞其胸臆臣切惟陛下春秋方壯聖德欽明而今日獨取拒諫之名受孤恩之謗違天下之望失人主之權正由遂政府數人狠心而已不知于陛下有何所利而為之臣不勝區區深為陛下痛惜伏望陛下勿復詢于政府特發宸斷召還堯俞等下詔更不稱親如此則可以立使天下憤悶之氣化為歡欣誹謗之語更為謳歌矣光又上奏曰臣聞人主患在不聞其過人臣患在不能盡忠是故忠直敢言之臣國家之至寶也夫以人主之尊下臨羣臣和顏色以求諌重爵賞以勸之羣臣猶畏懦而不敢進又況憚之以威懲之以刑則嘉言何從而至哉竊聞侍御史知雜事吕誨侍御史范純仁監察御史裏行吕大防因言濮王典禮事盡被責降中外聞之無不駭愕臣觀此三人忠亮剛正憂公忘家求諸羣臣罕見其比今一旦以言事太切盡從竄逐臣竊為朝廷惜之臣聞人君所以安榮者莫大於得人心今陛下狥政府一二人之情違舉朝公議尊崇濮王過於禮制天下之人已知陛下為仁宗後志意不專悵然失望今又取言事之臣羣輩逐之臣恐纍于聖德所損不細閭里之間腹非竊嘆者多矣況純仁大防皆陛下簡拔於衆人之中任以為耳目之臣蓋取其忠直非取其阿諛也純仁大防亦欲竭誠盡節以報陛下之知故敢不附政府侃然正論今更以此獲罪則陛下於羣臣之中尚誰親哉若使忠直日退阿諛日進則陛下何以復知臣下之善惡政事之得失如此殆非國家之福也伏望聖慈亟令誨等還臺供職則天下翕然皆歌陛下之聖明雖禹之樂聞善言湯之改過不吝不是過矣不則且為之别改近地一官亦可以少慰外人之心也知制誥韓維上奏曰臣竊聞御史知雜吕誨等以論濮安懿王事相得罪並行譴逐羣議喧然皆以謂誨等能審議守職國之忠臣而切歎朝廷典刑遂至于此臣伏以陛下自入繼大統士大夫莫不首論為人後之大義以謂陛下素好經術必能循用禮典以副先帝顧託之意自兩制之議上聞臣下更白交諫務欲上廣聰明以正此事而今者遂至斥逐憲官以失天下之望誠可痛也臺官之言臣雖不盡聞料其用心不過欲陛下盡如先王之法而止耳即如此者乃是愛君之至安所得罪而逐之也近年以來風俗頺敝士大夫類皆貪固寵利護惜人情姑息苟且為自容之計莫肯為國家悉心營職者陛下厚賞以勸之嚴罰以督之猶恐此風不變而復內牽邪說貶斥正人數以微過放逺善士臣恐自此姦佞得志忠良結舌陛下耳目益壅蔽緩急朝廷有事上無由知此時雖有悔恨亦無及矣方今法度隳廢百職不治國用匱乏民力凋困外無良將士卒驕惰强國窺間而有輕中國之心而天災數見地變復作疾疫流行饑饉洊至由此觀之臣恐陛下之憂不在濮王名號未崇臺官不畏威依命也伏望聖慈思社稷安危之計以人情去就為慮亟追昨日詔書還誨職事以救前失以安人情知諫院胡宿乞察言責實時有懲勸疏曰臣先有奏陳以力所不能願辭諫職不意朝命復除御史知雜臣久尸言職已試不效惟俟幽黜敢有覬覦天慈䝉覆豈不知幸圖報之心宜何如哉臣竊思歷代設耳目之官蓋輔人主之不逮不使九重之外無復聞見萬幾之事皆為壅蔽以是論之獻替之言不可一日無之凡事止宜辨論是非稍涉欺妄當行重責不當置其言而不用使之沮辱在賢者翻然以思動為身謀悠悠皆是借如朝廷之事臺官不得預聞及其政令行下方始得知比正其所為則曰已行之命難以追改是執政之臣常自取勝耳目之官固難與爭矣又聞近日臣僚建議以先帝臨政信任臺諫官所陳已行之事多有追奪欲陛下矯先帝之為凡事堅執不可移易行一繆令進一匪人倡言於外曰出自宸衷人必不敢動搖若果有之是欲窒塞聖聰將使拒諫遂事豈公忠愛君之人哉恐非廟社之福也且諫諍者非衮職之闕時政之失不應有所激發上則咈戾聖意下則違忤輔臣以至被糾劾者皆為仇敵豈不知害于身凶于家所利者國家所守者職分爾而又近年朝廷無懲勸之意諛佞者傾附權勢畏避者喑默自容坐纍嵗月例得遷轉言與不言孰為利哉臣嘗親奉德音指緘默者甚衆然終不聞有所誡勵斯無益之大弊也臣竊謂陛下好問之心過於虞舜但未嘗察其言爾求治之功有如漢宣但未嘗責其實爾臣既未得其去敢不以言責自任伏望陛下既問之當察其言既用之當責其實無俾左右蔽惑聰明言事之官宜時有懲勸則人無苟且職事皆舉有裨於朝政太平之基不難成矣矯先帝之為更宜沈慮已行之事果有不便更張何疑不然臣未知職事之所守終不安其分爾歷代名臣奏議卷二百二
