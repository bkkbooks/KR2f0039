body:
  text: 歷代名臣奏議卷一百三十五明楊士竒等撰用人宋英宗時張方平論進用臺諫官事體上言曰伏見天禧元年初復臺諌官詔敕云所置臺諫官三年內不得差出仍不兼領職務候及三年或屢有章疏實能裨益特越常例别與升遷若職業蔑聞言事無取移授散秩仍遣監臨比來朝廷命臺諫官甚異先朝本意蓋臺諫官之設所以切磨理體助為聰明非使其生事招權為仕宦捷徑也粵自近年增置貟數而又進擢殊速聼用過當頗開朋黨險危善良鼓動風波淪胥以敗比雖易轍尚存遺俗不有丕變曷扶國體乞今後應臺諫官宜如天禧詔敕俾之久於其職以觀其效倘於政令無所發明雖有奏論不適理道稍明黜陟用勵公忠庶明治方以風化下時言事者數與大臣異議樞密副使吕公弼諫曰諫官御史為陛下耳目執政為股肱股肱耳目必相為用然後身安而元首尊宜考言觀事視其所以而進退之治平元年殿中侍御史吕誨乞中外之臣出入更任上奏曰臣竊以漢宣時悉出諫官補郡吏諫大夫蕭望之為平原太守內不自得因上疏召還守少府未幾復為左馮翊憂畏移病上遣使諭意蓋知望之材任宰相欲詳試以政事故也唐陸贄亦言中外迭任誠為國求治之切務也臣伏覩臣寮有初任不曽歷外官後未常出國門致身高位者甚非公朝用賢詳試之道也而又比年二府用人除拜不出於京師重內輕外亦以明矣以此居內者安為倚附唯恐補外居外者久而不復自謂絶升進之望使盡賢於蕭望之亦未必䏻平於中也陛下即位之初馭臣之道宜使均平漢宣詳試之術思任賢共理俾中外之臣出入更任考其績效責以名實以是取人得之必多太平之治不難致矣惟聖神留念天下之福也二年誨乞親擇御史上奏曰臣伏覩御筆除授殿中侍御史范純仁監察御史裏行呂大防朝命既出公議皆允臣聞漢孝武即位之初田蚡為相薦人或起家至二千石權移主上帝乃曰君除吏盡未吾亦欲除吏非明哲之君智䏻燭理則威福之柄幾為田氏専矣臣見陛下始除二人者誠有㫖哉臣向來所陳請令中外兩制官每嵗各舉才䏻之人籍於禁中要堪任使即請宸衷自擇免臨時薦舉可以杜絶請求之路此至公之法願陛下久而行之被用之人莫不歸感上恩必盡死節以圗報效自昔興王之道未有不繇於是也唯聖慮以操柄之重謹始克終天下幸甚英宗時誨知諫院又上疏曰臣聞漢宣帝拜刺史守相必親見問觀其所繇退而察其行以質其言有名實不相副必知其所以然斯最切於治道也國朝故事親民官通判以上擬任先引見仍於中書呈身替還知州許上殿言利便三事乃察言觀行之體也比來引見呈身如故但未嘗親問中書不閲實言利便三事亦皆罷之天下郡守不得人者十五六豈聖朝求治之意哉疏逺之臣有終身不得近清光伸一言以紓素藴者欲君臣之道相屬上下之誠相接不亦難乎臣欲乞今後凡除擬知州人引見日令上殿親有所問審察其人仍俾中書閲其可否然後授之以任替還依舊許言利便三事因而總核必得其實誨又乞添置言事官上奏曰臣竊以臺諫官者人主之耳目中外之事皆得以風聞蓋輔益聰明以防壅蔽臣觀天聖景祐間三院御史常有二十員而後日益衰減蓋執政者不欲主上聞中外之闕失然亦不下數貟今御史闕中丞者纍月御史五貟差出者二人唯臣與范純仁吕大防供職封章十上報罷者八九諫官二貟司馬光遷領他職傅堯俞出使北廷諍臣僅同廢置矣自古言路壅塞未有如今日之甚也臣切為聖朝羞之下情何得以上通天聼何由而逺及臣伏乞聖衷鑒照斯弊特為振起添置言事官員數以廣聞見實求治道之大要也三年參知政事歐陽修上奏曰臣竊以治天下者用人非止一端故取士不以一路若夫知錢榖曉刑獄熟民事精吏幹勤勞夙夜以辦集為功者謂之材䏻之士明於仁義禮樂通於古今治亂其文章論議與之謀慮天下之事可以決疑定䇿論道經邦者謂之儒學之臣善用人者必使有材者竭其力有識者竭其謀故以材䏻之士布列中外分治百職使各辦其事以儒學之臣置之左右與之日夕謀議講求其要而行之而又於儒學之中擇其尤者置之廊廟而付以大政使總治羣材衆職進退而賞罰之此用人之大略也由是言之儒學之士可謂貴矣豈材臣之後也是以前世英主明君未有不以崇儒嚮學為先而名臣賢輔出於儒學者十常八九也臣竊見方今取士之失患在先材䏻而後儒學貴吏事而賤文章自近年以來朝廷患百職不修務奬材臣故錢穀刑獄之吏稍有寸長片善為人所稱者皆已擢用之矣夫材䏻之士固當擢用然専以材䏻為急而遂忽儒學為不足用使下有遺賢之嗟上有乏材之患此甚不可也臣謂方今材能之士不患有遺固不足上煩聖慮惟儒學之臣難進而多棄滯此不可不思也臣以庸謬過䝉任使俾陪宰輔之後然平日論議不䏻無異同雖日奉天威又不得從容曲盡拙訥今臣有館閣取士愚見具陳如别奏欲望聖慈因晏閒之餘一迂睿覽或有可采乞常賜留意修又疏曰臣竊以館閣之職號為育材之地今兩府闕人則必取於兩制兩制闕人則必取於館閣然則館閣輔相飬材之地也材既難得而又難知故當博采廣求而多畜之時冀一得於其間則傑然而出為名臣矣其餘中人以上優游養育以奬成之亦不失為佳士也自祖宗以來所用兩府大臣多矣其間名臣賢相出於館閣者十常八九也祖宗用人初若不精然所采既廣故所得亦多也是以有文章有學問有材有行或精於一藝或長於一事者莫不畜之館閣而奬養之其傑然而出者皆為賢輔相矣其間不至輔相而為一時之名臣者亦不可勝數也先朝循用祖宗舊制收拾飬育得人尤多自陛下即位以來所用兩府之臣一十三人而八人出館閣此其驗也只自近年議者患館閣之濫遂行釐革而改更之初矯失太過立法既峻取人遂艱使下多遺賢之嗟國有乏材之患今先朝收拾養育之人或已被遷擢或老病死亡見在館者無幾而新法艱阻近年全無選進臣今略具館閣取人舊制并新格則可見取人之法如何所得之人多少也一舊制館閣取人以三路進士髙科一路也大臣薦舉一路也嵗月酬勞一路也進士第三人以上及第者并制科及第者不問等第並只一任替回便試館職進士第四第五人經兩任亦得試此一路也兩府臣寮初拜命名舉三兩人即時召試此一路也其餘經歷煩難久次或寄任重處者特令帶職此一路也今三路塞其二矣自科場改為間嵗後第一人及第者須兩任回方得試自第二人至第五人更永不試制科入第三者亦須兩任回方得試其餘等第並永不試則進士髙科一路已塞矣兩府大臣所薦之人並只上簿候館職有闕則於簿內㸃名召試其如館閣本無員數無有闕時故自置簿來至今九年不曽㸃試一人則大臣薦舉一路又塞矣惟有酬勞帶職一路尚在爾一新制館閣共置編校八貟本為館中書籍久不齊整而館多别有差遣不䏻専一校正乃别置此八貟故選新進資淺人令久任而専一校讀所以先令作編校二年然後升為校勘為校勘四年後升為校理為校理又一年方罷編校别任差遣然自置編校後適值館閣取人之路漸廢今議者遂只以編校為取士新格往時直館直院直閣校理皆無定貟惟材是用不限人數今編校限以八員為定以此待天下之多士宜其遺材於下矣八貟之內仍每七年方遇一貟之闕而補一人以此知天下滯材者衆矣右以臣愚見編校八貟自可仍舊每有貟闕令中書擇人進擬陛下必欲牢籠天下英㑓之士則宜脫去常格而奬拔之今負文學懷器識磊落竒偉之士知名於世而未為時用者不少惟陛下博訪審察悉召而且置之館職養育三數年間徐察其實擇其尤者而擢用之知人自古聖王所難然不以其難而遂廢但拔十而得一二亦不為無益矣況中人上下養育奬成之不止十得一二也知制誥韓維繳蘇宷詞頭論同時斥六諫臣上奏曰臣今月七日中書送到詞頭一道除刑部郎中蘇宷守本官兼侍御史知雜令臣撰詞者臣竊以自濮安懿王稱親三御史得罪以來羣議洶涌人情不以為愜傅堯俞等復不肻就職論事愈急士大夫竊為朝廷憂之而天變遽作夷狄加慢忠義愛君之人往往切議庶幾陛下因此警懼刋前詔之失大還放逐赫然有為以新德政今忽除蘇宷為御史知雜則堯俞等豈復可留之望哉同時而斥六諫臣切恐祖宗以來未有此事內失人望外啓戎心虗災異先見之戒開禍敗不測之端臣驟蒙拔擢典司告命不敢阿諛隱諱以孤陛下任使其詞頭不敢奉行已具狀繳納中書訖臣緣此事兩違詔㫖自度罪惡深大必不得復見清光然區區愚忠猶願陛下深畏天戒謹察人情以為社稷之計治平間維知通進銀臺司論范鎮請郡劄子曰臣竊聞翰林學士范鎮上章求補郡外議藉藉皆以為陛下以鎮作宰相批答不稱㫖諭令解去不知此事虗實果如此者臣竊為陛下不取鎮誠有罪自可明正典刑若其所失止在文字之間茍非甚悖義理猶當涵容以全待近臣之體陛下前黜錢公輔中外莫不以為太重至或相𫝊謂公輔别有過慝主上不欲暴揚故行遣至此陛下連退二近臣而衆人皆不曉然知其所謂臣恐自此臣下各懷疑懼莫敢為陛下盡心者鎮今既從其自請例須換職領郡於鎮何損但可惜者陛下舉措朝廷賞罰耳臣近對延和嘗論人君好惡當明賞罰以示天下使人知所從避則風俗可移又以為雖聖賢思慮不䏻全無過差假如陛下設有處分改之則足章納善從諫之美此語甚近陛下亦應記得臣驟蒙拔擢不敢俯默自同衆人伏望聖慈察臣嚮者所言更於此事精加思慮及其未有成命速賜回革所冀不至上纍聖德維又繳納舉臺官敕第一劄子曰臣昨日閣門送到敕一道令臣舉官二人充御史臣伏以知人之道古今至難故聖王取士之法必有所試見其迹效可用然後升進乃不失人臣伏見吕誨等剛果强徑守義不回至于犯死亡之誅不顧忌諱以盡論議求之古今如此至少臣又聞陛下嚮者自出范純仁吕大防二人姓名除御史衆見純仁等能竭節言事皆謂陛下明哲選任得人純仁等不負陛下所知得事君報國之道今一旦斥逐逺去士大夫莫不竊歎痛惜陛下毁已成之美受可恥之名失當世之屬望貽後代之譏議今奉敕㫖令别舉御史臣伏自惟度臣之駑下何敢少望清光雖欲慎舉豈如聖主自擇又人未試用誠亦難知如誨等則有已試之效矣陛下必欲為官求人來羣言以興至治則臣願復二人者以佐陛下招賢納諫之美其舉臺官敕臣已具公文繳還閣門未敢祗受干冒天威臣無任惶懼隕越激切之至第二劄子曰臣今月十三日准中書劄子奉聖㫖令臣依敕舉官聞奏者聖量兼容不責奉詔之稽緩特諭恩㫖便合祗受然臣伏再惟念事君之道義當傾竭若內懷不盡之意外竊嘗言之名而無益於國事者臣不忍為也故敢不避鈇鉞之誅以申其說臣竊以自古聖王優待諫諍之臣雖甚狂直必加涵忍者非勢不能黜也以為黜此一人則傷衆多之心遂此一失則敗天下之事故不為也治平以來四方傾聼日望陛下開納羣言勸帥衆力以光祖宗之大業而返復為此此臣所以痗心疾首為陛下深憂也自吕誨等被黜至於市井之人皆知此事為非美而在朝之臣未聞有戮力竭忠為國家救此失者則陛下斥逐近臣貶臺官之效已可見矣聖慮偶失為此一事而上下雷同便即成就使如後日復有它事而人情如此臣恐非陛下之福也今聞傅堯俞等非久還朝萬一復如誨等强爭不已則又將黜此三人乎同時而黜六諫臣此危殆之道也陛下欲履之乎臣所以再不奉詔者實冀以區區懇迫之誠終寤聖意陛下察前後所言甚經思慮不是妄發特奮英斷回革此事以慰天下之心非臣之利陛下社稷之利也其舉臺官敕見在閣門未敢奉行劄子已繳納中書訖所有臣不即奉詔之罪惟朝廷處分干犯天威臣無任惶懼戰越懇切之至上遇疾慈聖光獻后同聼政天章閣待制兼侍講知諫院司馬光上疏曰昔章獻明肅有保佑先帝之功特以親用外戚小人負謗海內今攝政之際大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者當信用之猥鄙如馬季良讒諂如羅崇勳者當疏逺之則天下服光又論御藥院劉保信等與授外任不得暗理官資狀曰臣伏見祖宗以來擇內臣謹信者幹當御藥院以其職任最為親近恐名位寢崇嵗月稍久則權勢太重不可制御故常用供奉官以下為之轉至內殿崇班則出為外官此乃祖宗深思逺慮防微杜漸高出前古詒謀萬世者也近嵗以來頗隳舊法居此任者往往暗理官資請其俸給久而不法殊失祖宗之意深為不便今兹踐阼之初所宜革去積弊率由舊章竊聞幹當御藥院劉保信等四人亦曽自陳乞因覃恩别授外官伏望陛下各依逐人所請及應自來內臣暗理官資者竝除正官授以外任别擇供奉官以下素知心腹忠信謹慤之人使幹當御藥院仍自今後凡轉官至內殿崇班以上者竝須出外一遵祖宗之制不得暗理官資依舊留任內廷差遣詔録潁邸直省官四人為閣門祗候光為侍讀學士奏曰國初草創天步尚艱故御極之初必以左右舊人為腹心耳目謂之隨龍非平日法也閣門祗候在文臣為館職豈可使厮役為之知常州陳襄乞留陳經不對移任滿狀奏曰臣檢㑹當州昨據管下太子中舍知無錫縣事陳經狀稱為與本州推官邵竒是親妨礙尋備録本官狀申奏其陳經近蒙降敕移知婺州蘭溪縣却差知蘭溪縣屯田貟外郎鄭琰前來對移事須至奏聞者臣今訪聞得知常州無錫縣事太子中舍陳經自到任以來公勤幹敏練逹民政事無大小躬親聽斷無不曲盡人情緣本縣所管二十三鄉主客户口獄訟浩繁積年不決號難治之邑經至一年庶事修舉兼為當州修開運河從無錫縣界望亭堰至武進縣奔牛堰一帶工料共計一百三十餘里竝是差委本官都大管勾開河司公事諸般經畫以至畢工竝得濟集此方是開濬河身及除去望亭一堰疏導太湖水勢通入運河雖獲利濟緣近河兩岸民田到水溝瀆及合置堰閘去處竝未開修全藉經向去勸率人户下手興工大假開堀溝港數處通徹運河及創置堰閘若遇旱嵗即多引導太湖之水澆溉田土大水之後即時決放河水下江如此則四縣民田遂無水旱方為經久之利自經移敕到後舉縣皇皇如去父母不住經州告訴乞留滿任以此見陳經之為邑實有惠利使民不忍其去況先有朝㫖許職司體量部內守宰之官如有良吏特與保明再任縣令如經誠不易得臣實為百姓惜之欲望朝廷俯從民欲乞留本官終滿此任始末了當上件河事況推官邵竒考第頗多到官已及一年半欲望朝廷許令成資或於蘇潤湖秀對換一職官差遣并對移到無錫縣屯田貟外郎鄭琰未有替人却乞依舊赴蘭溪縣勾當並無妨礙如允所奏伏乞早降指揮謹具狀奏聞殿中侍御史范純仁奏乞於郊赦前復錢公輔官狀曰知制誥錢公輔因繳進詞頭責授滁州團練副使竊緣繳進詞頭亦是中書舍人故事其言雖有過當其情應亦無他不過欲補陛下聰明盡其愚直而已不應重蒙貶責遂同邪佞贓汙之人中外人心寧不疑懼因此言路頗壅實損惟新之政今聞陛下以水災之後深求直言然在數十近侍之臣亦未聞各上封章指陳時政闕失得非以公輔為戒各務保全其身是使受恩無言於陛下將何所賴伏望聖慈特於南郊赦前牽復公輔一官以明陛下容納直言之意庶使小大之臣各盡忠正上補聖猷則天下幸甚純仁再乞復錢公輔官狀曰臣近曽上殿奏陳乞於南郊赦前牽復錢公輔一官至今不蒙施行蓋以自公輔貶官之後朝廷除授寧無不當臣寮各以公輔為誡不復敢有言者使濫進者不畏公論茍容者足以偷安虧損聖明無甚於此況臣僚中能不以身計為心而以職事為恤者十無一二陛下容而納之尚恐不勸今又深加貶謫則誰不各求自安人或盡然國家何賴臣之區區實在於此伏望聖慈降臣前奏付中書門下施行使言路復開聖政無壅盡忠勤職者有所勸茍容偷祿者有所羞則天下幸甚起居舍人𫝊堯俞再論徐綬上奏曰臣近有狀乞追寢祠部郎中集賢校理徐綬三司判官之命未蒙施行臣雖甚愚竊所深惑不知朝廷之用徐綬以德行邪以文學政事邪以德行則虧缺如此以文學政事則行茍不修雖游夏冉季將有所不取焉況文學未絶人而政事無所聞者乎倘謂高科必於顯用是朝廷所以待之之意異於衆人矣待之審異則責之宜更深豈有為衆人之所不忍為者而自謂曰我高科也朝廷曰彼高科也授受之際皆以為當然此臣所以深惑者也況陛下踐阼以來天下傾耳拭目以觀望者久矣政事之初崇奬如此等人不獨不足以風勵天下實恐四方之人有以窺朝廷而妄議淺深也惟陛下留神省察神宗立判河陽富弼論採聼既多當辨君子小人上奏曰臣伏自陛下踐阼以來未對天表蒙差入內供奉官李從政傳宣撫問密㫖丁寧特荷非常之眷絶出流品仰戴恩德天地莫量方屬疾恙所纒步趨殊梗不得入奉冕旒略舒臣節輒以病中𫝊聞一二事不避斧鉞之譴附李從政上奏伏惟聖明一賜觀省不勝大幸臣竊聞陛下始臨御好博采兼聼務廣聰明此古聖王之所尚而君道之至美也四方鼓舞歌頌以謂臣下情僞時政得失必不䏻逃聖覽而太平可立致也然其間事體有萬類人品有百端自古人君採聼之際至難至謹得其人則必以正道而忠以告之所說固有益於時也不得其人則専務窺伺循情阿㫖變曲直者有之挾愛憎者有之以至陷害忠良援引邪僻張皇威福聳動觀聼大則規取官職小則希求貨財事至如此則人君採聼之至德翻成虧損之大弊也何哉蓋自古以來君子常寡小人常衆人君採聼之際故得人常少不得人常多得人少故好事常不足不得人多故惡事常有餘何謂也君子力行仁義尊主庇民為好事也君子則惟道是從不計身之進退用則進而行道不用則退而無悶也小人則不然惟利是嚮若為正道所抑其身不得進則蹙蹙不肯休千岐萬路不顧名節經營鑽刺得其進而後己也既以進身為急惟知富貴之可樂則何道之肯守何善之肯為哉又況君子常為小人所勝故從古以來治世少而亂世多者此也緣君子則可以致治小人只以致亂也若是君子小人並立於朝實所難辨蓋小人外則文飾其詞所說理道不減於君子而其心及其所為迹則如水火之異也書曰知人則哲惟帝其難之注云帝謂堯也夫堯為大聖人仲尼比之如天而尚未盡得知人之道況乎居堯之下者哉自三代以降諸侯失國天子失天下子孫散而為皂𨽻宗社廢而為丘墟者皆因用小人而致之也由此觀之小人豈當親而用之又豈當信而任之耶臣以謂帝王都無職事所以别君子小人乃帝王之職也然千官百職豈盡煩帝王辨之乎但精求任天下之事所謂大臣者不越十數人不使一小人參用於其間則千官百職委諸大臣分而選之而漸及天下州縣之吏無不得人矣顧雖欲亂不可得也恭惟陛下天賦睿明神受英略守祖宗之基業行堯舜之道德博取衆人之善欲盡萬物之情為君之難無甚於此然願陛下勿謂所采既廣便望所得必多其間須防姦詐小人惑亂聖聼姦謀似正詐辭似忠疑似之間不可不早辨也大抵人君生殺權在乎手不患人不諂奉而密附之也只患人不肯盡忠而有失即諫也諂奉則順情而喜人君喜則富貴可得也諫之則逆耳而怒人君怒則殃禍可致也順情而取富貴者小人也逆耳而受殃禍者君子也取富貴者百則百千則千其不避殃禍而欲致人主於無過之地者百千人中未有一二此惟在陛下審察之謹擇之既得其人則専信之力行之無容姦佞破壞則朝廷自理萬方無事陛下可高枕也又聞昔賢有英俊沉下僚之歎形於諷詠若英俊果沈滯於下誠宜急取進之以服士心其有內行不守素履非嘉績效無聞公論不與所以久而不用如此之輩必恐使其朋黨訴以寃抑妄陳危苦之狀以動淵衷亦願陛下深察究其所從來之迹直俟見其實而進退之可也又聞王者端拱垂衣以治天下然所以勸奬羣動而䏻役使之俾自奔走於職業者無他惟官與賞二柄而已捨此復有何道哉官謂爵位賞謂金帛茍德稱其官功協其賞雖官至高賞至厚不為過也先王所以重惜之而不妄與人者非吝之也蓋恐德不稱功不協人有不平之論則無以為勸也近日上殿臣僚頗蒙面賜緋紫者臣不知當賜與未當賜但聞多於往時耳爵位金帛固不可非次而與之其餘唯章服華顯人亦貴重亦可以為勸奬之物若賜之不以勞又不以年其有勞有年而得之者不以為貴而反恥之為不足勸也陛下凡所賜與本使人知感而勸令勤其職也若徒俾僥幸者喜而有勞有年者恥而不勸則是棄之也何勸勵之有焉書曰車服以庸𫝊曰惟名與器不可以假人唐有中書令衣緋宰相衣緑者以此知不可不稍貴之惜之以為勸奬之一端也臣少而康壯已不及人今既老且病志氣衰索固無所取而妄以狂瞽之說塵浼天聼者實恃陛下虗懷待物無所不容乃敢然也唯聖慈特賜詳覽恐亦有補弼判河陽除左僕射論除拜大臣當密上奏曰臣在河陽於七八月間東有人自京師來北有人自河朔來亦有南自蔡許西自陕洛來者皆云公以病求解使相章奏頻切上將許之却為上盡疑今之兩府大臣復欲用公入相公既未䏻步趨拜起則必召公作宫觀使且留都下以備訪聞時政得失臣輒每問來者此皆朝廷大機宜大除拜理當至密外人何由得知來者則云此固不可得而知也臣雖聞此說然終之不信以謂陛下必不如此既而𫝊聞韓琦文彥博陳升之郭逵相次皆求罷免又非備禮並有必去之意以至侍從及主兵之人各有去位之意其未求去者非欲不去蓋求去者已多未敢有求爾雖勉强且住誰復更肯盡心乎若後有許去者則必節次更有人求去上撓宸衷臣續聞此說略無虗日則臣向之不信亦成疑矣今又蒙差臣充集禧觀使盡如兩月前四方𫝊來之語都無小異如何使臣不信哉捧詔之日汗流驚駭豈有此等國機大事預令四方人皆知四方尚知則兩府大臣安有不知者邪陛下既如此疑二則執政者不得不求去也臣曉夕思惟必慮陛下微失防謹政事泄漏使人人不安各懷疑懼而盡欲解去此田文所謂主少國疑大臣未附百姓不信正如今日陛下之事然魏王時自然如此今此則或恐陛下聖慮偶有未周而致其疑也致其未附也致其不信也陛下必欲解其疑使之附而信莫若罷臣新命推誠以待諸人必若其間有難久留者則當徐圗去就所貴事體兩全況韓琦以下七人盡是兩朝顧命大臣各有忠義之心豈宜輕議出處以招天下云云之論哉臣若貪冒恩寵便為觀使優游輦下醫藥尤便亦無一郡之責於臣之幸天下無比然却有所大不便者何哉臣若遂居觀職陛下雖都不遣中使𫝊宣撫問京師四方之人亦疑日有使至也雖或遣使只是問疾而都不問及他事京師四方之人亦疑凡百朝政皆來問臣也雖或遣使時復問事臣都不敢答一語京師四方之人亦疑凡百朝政臣皆刺口議論其短長也陛下試思之此三節果能使人不疑乎臣知萬無不疑之理也若皆疑之則今兩府八人者還有不解體者乎臣亦知萬無不解體者也漢宋昌云公事公言之若言私王者不受私今乃使臣於閒宫觀中靜坐竊議朝廷之政致見任大臣一一解體是公耶是私耶臣亦知京師四方之人不論賢不肖必皆謂之私也臣徇從陛下私竊之恩而輒便當之則是臣何如人耶不惟取罪今世至於千古之下亦不能逃責矣臣獲罪責於今古之人固不足惜然於陛下為君之道治國之體還無所損乎臣亦知所損無大於此也伏緣天下治亂安危之際全繫天子任人當與不當若當則更繫信與不信爾齊晏子謂用賢而不信是大不信豈可目為常事而容易措置乎大凡罰一人衆皆懼而不敢犯則罰之賞一人衆皆悅而有所勸則賞之尋常賞罰尚須如此謹重況用舍大臣豈宜倉卒乎今陛下欲用臣一人反使衆大臣皆解體而不肯住則陛下豈宜遂其事而必行之哉夫人情亦不難回但請陛下如臣所乞速放令臣早還本任仍更臨朝分明宣諭大臣云朕欲一見富弼者無他只為是先朝舊人都無固必他既堅來辭免即却令歸河陽天下事豈在一富弼乎吾自有諸賢倚賴無所憂慮即衆心自安何必更敢求去乎陛下若決能用臣此說則前失尚可十救五六若終不用臣說則大臣與侍從兵輦官往往離心離德無術可救無事可回即陛下更與何人共謀國事哉惟願聖慈萬萬熟慮幸不一向堅用前意而不移用誤大事臣又聞陛下詢訪太多聼信太雜因而小人各有希望之心無所不說說者既衆是非溷淆此說己行他說又奪展轉相效無有紀極陛下所聞之事盈塞于心萬務日生何暇辨别則所行必有當否所用必有差失政無一定之論人無自保之心上下紛紜包藏禍患臣前附李從政所奏劄子正為此也更望聖慈并此文字時賜一覽非臣之幸乃社稷生靈之幸也元豐六年弼以司徒致仕上奏曰臣聞自古致天下治與亂者大綱不出用諛佞讜直之人二端而已諛佞者進則人主不聞有過惟惡是為所以致亂也讜直者進則人主日有開益惟善是從所以致治也此乃人主致治亂之大略焉臣自離朝廷退居林下時亦仰知朝廷所為大率諛佞者競進讜直者多處于外雖有在朝者蓋恐觸忤姦佞亦皆結舌不敢有所開陳又聞近日中外或有事緒上撓聖懷而忠義之士但仰屋竊嘆不見有聞于上者致陛下不得知而又更張之此實非朝廷之福也惟願陛下開衆正之路杜羣枉之門講求善政變禍為福俾天下受賜坐致太平此老臣有望於陛下其間事目甚多亦不敢妄有條列但舉其大要惟聖君留神而擇焉不爾即恐浸漬漸深禍亂將至則于時益煩宵旰之憂而亦無所濟矣老臣犬馬區區之志略陳其端伏望聖慈無少忽而深思之力行之乃天下之幸宗社之福也神宗即位初翰林學士吕公著論舉臺官不必校資序上奏曰臣近蒙恩充翰林學士伏見本院自來舉臺官竝須前行員外郎以下至太常博士歷通判一任已上者仍須衆學士同狀保舉切以御史之職所以上輔天子聰明下繩紏百職事無大小皆得奏論必須資性端方學識兼茂然後可以處憲寺任言責由是而求諸多士之中未易中選今乃限以資格而常欲得人必恐其難切見近嵗以來前行貟外郎以上知諫院者並得兼起居舍人朝廷之意務欲廣進人之路而御史兼官之制尚闕蓋有司未嘗講求臣又見比來保舉堪充御史裏行或以資淺報罷臣聞唐太宗雅好直言馬周以布衣為監察御史裏行裏行之名自馬周始其後官卑未得真御史者皆除裏行然則裏行之設本以待資淺之人今乃以資淺為不應選正失前代設官之意臣又覩天聖七年言事者以三院御史出為省府判官轉運使其間多是知縣充舉深為僥幸乃詔今後知州通判方得奏舉近日臺官其稱職者雖或次補諫列其不任職者雖真御史亦以舊資出補外任然則資序高下不必校量又聞孔子曰舉爾所知爾所不知人其舍諸夫以人才之難必待數人盡知固不可得茍一人知之衆人非出於實信但雷同繫書則又非為國求賢之意凡臣所言灼然易見若增成舊制於體無害伏惟陛下以聖明文武初即尊位左右之臣悉皆訪逮巖穴之士尚將旁求豈獨於御史耳目之官而不䏻廣開其路伏望聖慈裁許自今後每御史有闕即輪學士御史中雜一貟保舉自正郎前行貟外郎竝依諫官例除兼御史朝官以上不問資序竝除裏行太常博士通判及一年者竝依舊制如此則用人之法不致苛密而舉善之心各得自盡不勝大幸熙寧二年公著又論臧否人物宜謹密上奏曰臣聞易曰君不密則失臣臣不密則失身幾事不密則害成夫人主延見羣臣與講天下之事而論及人物之臧否此所宜謹密者也茍人主謹密而有所不至則人臣悼後害之及念失身之戒而不敢盡其所欲言此易之所謂不密則失臣者也況人君用人既用其所長固欲知其所短若知其所短而暴之則莫肯盡其心方將同舟而濟共輿而馳茍不能使人人盡其力則其勢未可知也惟留意幸甚十年公著提舉中太一宫乞廣收人才上奏曰臣伏覩近詔舉才行堪任升擢官竊觀陛下自臨御以來虗心屈己以待天下之士士之起草茅由小官而起至顯近者不可勝數然猶孜孜以求賢為急誠欲廣收人才無所遺棄臣伏思自昔有為之君不借賢於異代然唐虞之際亦稱才難則世固未常乏賢而人才亦不可多得今陛下降由中之詔非徒為虗文也中外所舉蓋百有餘人雖不盡當誠參考名實而試用之宜有可以塞厚望應明指者臣又竊詳今日詔意謂乏才然數年以來天下之士陛下素知其能嘗試以事而中就閒外者尚多恐其間亦有才實忠厚欲為國家宣力者未必盡出於迂濶繆戾而難用也漢武帝時公孫𢎞初舉于朝以不稱㫖罷後再以賢良舉帝以親擢為第一不數年間遂至宰相由是觀之人固未易知而士亦不可忽何則昔日所試或未能究其詳數年之間其才業亦各有進惟陛下更任之事以觀其能或豫之對以考其言兼收博納使各得自盡則盛明之世無滯才之嘆不勝幸甚公著為御史中丞論推擇太精羣材難進上奏曰臣竊惟陛下以聖哲之資將興致治其於臣下能否固所周知然臨朝而歎常苦乏人臣竊以為人之難知堯舜猶病然自昔有為之君亦不借才於異代況今之人才衆人之所共知而陛下之所熟講者蓋亦不少若用之既盡然後可以言乏才試之不效然後可以言難知今則不然左右之任尚多闕貟而大小之賢鮮得彚進陛下雖推擇至精可以無濫賞之過然羣才難進誰與致非常之功昔唐之德宗非不愛惜名器由其責人太密授任至難至於東省閉凡纍月南臺唯一御史故陸贄以為太精而失士臣竊觀之自昔用人之際所以常多疑二者患在君臣之間未免形迹居常謀事則多已睽異至於論議則尤難協同臣伏願陛下與執政之臣凡選任之際務存公坦忘去形迹則俊乂咸事天工不曠矣元豐元年公著為端明殿學士上疏曰臣聞濟濟多士文王以寧方周之興至於兔罝之人有可以當腹心干城之任者今三館祕閣之職乃朝廷之華選前世以來將相名臣多出其間得人之盛難以遽數臣在皇祐至和中偹貟館閣當時同輩後亦往往至通顯比來雖有簡拔其數不多其中或以勞進者又皆外補朝廷平日艱於收採緩急必乏使令以至近者遣使高麗頗煩聖擇古人有言士不素飬無以重國臨事倉卒乃求非所以尊朝廷也臣竊以謂天下未嘗乏才也求之而後至用之而後知耳臣愚願陛下考合庶言斷自聖見更得雋偉之士疏通之才稍增館閣之選平日足以優游飭厲緩急惟所用之以重朝廷不勝幸甚熙寧元年樞密使劒南西川節度使文彥博上奏曰先帝切於求治審於任人臣等因進擬差除官上曰朕向在藩邸每聞朝廷除官多是不厭衆論朕以為掄選未得其當及朕臨御以來精意求人不吝好爵今選於衆方知得人頗難然隨才任之使各稱其職可也臣等上奏曰帝王任人不藉才於已往不俟賢於將來隨才任之誠如聖㫖四年彥博又上奏曰臣屢被德音將來西事寧息更須精擇守邉之臣積粟訓兵為經久之制此乃陛下恭紹祖宗之丕基慎守盈成之大法將欲躋斯民於富夀致天下於太平臣退思之不勝欣抃又思以虗薄孱拙不能上副陛下孜孜求治之意更增悚惕今所擇邉臣雖未得周才及己試之效但思慮精審不輕舉妄動以求徼幸茍圗進身則已善矣復能訓兵積粟節用愛民恩威兼著將使夷狄懷附非但不敢侵侮而已兹所謂長城巨屏致朝廷髙枕無虞矣若一用輕險躁妄之人使之守邉為國生事以規身利則邉無寧謐之嵗兵無休偃之時中外騷然民不聊生矣臣謂有唐天寶建中之難可為龜鑑開元初明皇勵精求治任姚宋為相馴致太平當時不賞邉功以防生事及天寶之際林甫國忠作相引用匪人布在朝列時以承平既久財力富盛於是邀功之將務恢封略以甘上心欲蕩滅契丹翦除吐蕃喪師者失萬而言一勝敵者獲一而言萬寵錫之極驕矜遂增哥舒翰統西方二帥安祿山統東方三帥踐更之卒俱受官名郡縣之積罄為祿秩於是驕將鋭卒萃於二統邉陲勢强朝廷體弱祿山一唱中原蕩析元和中宰相李絳亦對憲宗云開元之末姦臣說以興利武夫說以開邉天下勞役以至大盜竊發兩都覆沒憲宗又嘗問侍臣建中之難朱泚盜據宫闕德宗播遷梁漢致亂之由宰臣李吉甫對曰德宗之初躬行節儉任崔祐甫作相動遵至道及祐甫殁繼其任者或非其人忠諫不聞小人乘間邀功便已茍媚當時以為河朔未賔宜用力取甘言先入主聼致惑是時國財不足趙贊司國計纖細刻急括率京師商賈富民又諫官陳京獻䇿稅屋間架立法峻急人情愁怨遂致涇師叛亂鑾輿播遷實由輕用兵信小人剝下之謀以致危亂是二臣者皆願憲宗追念前朝之失以為元龜臣今伏聞德音以西事寧息之後慎擇邉帥為經久之制實安邉息民之逺圗乃馴致太平之長䇿天下幸甚然尚慮有邀功生事之將希時取合之臣潜為甘言上惑睿聼伏望陛下鑒前古治亂之由更加詳察或付之外廷公議可否兼樞密院每進擬用人陛下纍云某人好作事可用某人不肯作事不可用臣愚以謂事有可作而不作誠為過矣未可作而作失其宜矣不可作而妄作非惟害事實害治道夫下之人不從上令而從上好上好是焉下有甚者且中人常情鮮克守道趨時希㫖從上所好則必勉强作為不計後之利害止圗一時僥幸者衆矣伏望陛下察其言觀其行原其始要其終可行而行可作而作庶無後害比者臣以劉邵人物志進說未審陛下以謂如何臣以邵之書主於詳察人物於任官擇材之法有可觀焉故其序云明王之宜玩宰相之宜覽又曰人之質量中和最貴中和之質必平淡無味故能調成五材變化應節是以觀人察質必先察其平淡而後求其聰明至於人主任材亦貴平淡若道不平淡與一才同好則一才處權衆才失任夫一才處權則憸邪之人枉道附離而希進朋此之風扇矣衆才失任則端方之士守分卷懷而思退忠正之路梗矣然則於任人求治之道必有所偏偏則必有所害𫝊曰逺佞人去鄭聲夫佞者才智之稱蓋邪佞之人必有小小才智以飾身而干進其事君也務納小忠興小利以自效夫小忠必為大忠之賊小利必為大利之害茍人主不早辨之終必致於禍亂如聖人之於去佞其戒尤為深切書曰在知人在安民知人則哲安民則惠能哲而惠何憂乎巧言孔壬伏願陛下貴平淡之道以用人使羣才不失其任推哲惠之心以去佞使羣邪不干於正堯舜所以致治而於變時雍者由斯道也臣偹位樞近內省尸素思竭區區上禆聖政干冒旒冕伏俟嚴誅元豐三年彥博除大尉開府儀同三司復判河南府過闕入覲上奏曰臣讀漢史鼂錯之策云五帝神聖其臣莫能及故自親事臣謂錯之言乖謬頗甚因試論之夫易之乾曰天道也君道也坤曰地道也臣道也天地既位君臣之象著矣君臣交濟邦家之治隆矣而錯乃云臣不及君故自親事然則古之聖帝明王安用輔相而致治乎所謂五帝者堯舜為聖之優故仲尼刪詩書則斷自唐虞為萬世法二典之載堯則有命羲和為天地四時之官允釐百工庶績咸熙舜則命禹平水土棄為稷官契作司徒臯陶作士垂為共工益為朕虞伯夷秩宗夔典樂龍納言皆選於衆而後用其人各任以職且云僉曰汝諧慎柬之至也所以百工允釐熙帝之載如此則堯舜果自親事乎仲尼曰舜何為哉端拱正南面而已錯所謂自親事豈非乖謬乎若後之人君謂錯言為是乃以一身一心兩耳兩目獨任自用以周天下之萬務豈不殆哉又將使厥后自聖無復察邇言好問之裕仲尼云一言幾於喪邦者謂人莫己若則錯之言亦幾於兹乎臣故著論深切以明之庶幾有所補益熙寧元年唐介拜參知政事先時宰相省閲所進文書於待漏舍同列不得聞介謂曽公亮曰身在政府而文書弗與知上或有所問何辭以對乃與同視後遂為常帝欲用王安石公亮因薦之介言其難大任帝曰文學不可任邪經術不可任邪吏事不可任邪對曰安石好學而泥古故議論迂濶若使為政必多所變更退謂公亮曰安石果用天下必困擾諸公當自知之中書嘗進除目數日不決帝曰當問王安石介曰陛下以安石可大用即用之豈可使中書政事決於翰林學士臣近每聞宣諭某事問安石可即行之不可不行如此則執政何所用恐非信任大臣之體也必以臣為不才願先罷免安石既執政奏言中書處分劄子皆稱聖㫖不中理者十八九宜止令中書出牒帝愕然介曰昔寇準用劄子遷馮拯官不當拯訴之太宗謂前代中書用堂牒乃權臣假此為威福太祖時以堂帖重於敕命遂削去之今復用劄子何異堂帖張洎因言廢劄子則中書行事别無公式太宗曰大事則降敕其當用劄子亦須奏裁此所以稱聖㫖也如安石言則是政不自天子出使輔臣皆忠賢猶為擅命茍非其人豈不害國帝以為然翰林學士司馬光論擇言事官當以三事為先上奏曰臣今日面奉聖㫖令臣採訪可為諫官者密具姓名聞奏臣辭不獲命退而惶恐默自思忖凡擇言事官當以三事為先第一不愛富貴次則重惜名節三則曉知治體具此三者誠亦難才臣愚何足以識别賢能竊謂已試之人差為可信伏見三司鹽鐵副使吕誨纍居言職不畏强禦再經謫降執節不回侍御史呂景外貌和厚內守堅正見得知恥臨義不疑於臣所知之中此兩人似堪其選更乞陛下博訪衆臣裁以聖意二年光再舉諫官劄子曰臣昨日面奉聖㫖令臣採訪可任諫官者密具姓名聞奏臣竊見龍圗閣直學士陳薦舊事陛下於藩邸其忠厚質直陛下必素知之直史館蘇軾制䇿入優等文學富贍曉逹時務徑直敢言職方員外郎王元規自少至長志操堅正所居之官皆著風迹集賢校理趙彥若師民之子强學懿行不減於父平居恂恂如不勝衣遇事剛徑人莫能奪此四人者臣所素知竊謂可偹諫職伏乞聖明更賜裁擇三年光又論不當復劄下舍人院須令草李定詞頭上奏曰臣竊見近者朝廷除秀州判官李定為監察御史裏行知制誥李大臨蘇頌等纍次封還詞頭數日來外間皆言朝廷已為之寢罷今日復聞劄下舍人院須令草詞臣竊意朝廷知大臨等既纍次封還詞頭今復草之則為反覆必難奉詔因欲以違命之罪罪之使今後凡朝廷所行政令羣下無敢立異者若果如此則百執事之人自非偷合茍容者皆不得立於朝政令或有得失陛下復何從知之晏嬰所謂以水濟水賈山引秦之季世以戒漢文帝者正患其如此耳臣前論逐臺諫官今又言大臨等非敢私此數人正為國家惜言路之絶耳伏望陛下審思而謹行之勿使聰明遂至壅蔽則天下幸甚貼黃國家不次用人固無常法然必使衆心厭服然後為美是以堯舜非不聰明也其命官皆先謀嶽牧既衆言僉同復明試以功而後用之故舉不失能而上下雍熙也臣素不識李定實不知其行能如何陛下果知其賢何不且試之以漸俟其功效顯著衆皆知之然後不次擢用則誰曰不可何必今日與臣下力較勝負殆非人君廣大之體也元豐七年光又薦范祖禹狀曰右臣伏以報國之忠莫如薦士負國之罪莫如蔽賢臣伏見奉議郎同編修資治通鑑范祖禹智識明敏而性行溫良如不能言好學能文而謙晦不伐如無所有操守堅正而圭角不露如不勝衣祖禹乃今正議大夫致仕范鎮兄孫自祖禹年未二十為舉人時臣已識之今年四十餘行義完固常如一日祖禹所為本末無如臣最熟知臣於熙寧三年奏祖禹自前知資州龍水縣事同修資治通鑑至今首尾一十五年由臣頑固編集此書久而不成致祖禹淹固沈淪不得早聞逹於朝廷而祖禹安恬靜默如可以終身下位曽無留滯之念臣誠孤陋所識至少於士大夫間罕遇其比况如臣者逺所不及凡臣所言莫非據實不敢溢美今所修書已畢祖禹應歸吏部别授差遣臣竊為朝廷惜此良寶委棄榛莽伏望皇帝陛下特賜采拔或使之供職祕省觀其述作或使之入侍經筵察其學行自餘進用繫自聖志如蒙朝廷擢用後有不如所舉臣甘與之同罪熙寧元年右正言供諫職孫覺論人主不宜有輕羣臣之心上奏曰臣風聞臣下之論陛下睿聖聰明之資不世出之才以臨羣臣羣臣未有以望清光佐下風者故陛下有輕羣臣之心雖未知信否而臣竊惑焉竊以帝王之興亦各用其一時之人耳終不借才於異世也方今人才雖為乏少陛下欲興太平宜且隨才試用將有真賢大儒可與成功者至矣若必臯夔稷契然後為相太公方召然後為將則臣恐難以待也昔者燕昭市骨終得樂毅齊威不拒九九之數以成伯功譬之創大廈者棟梁榱桷之材無所棄成大車者輪轅衡軏之用無所遺以其各有所施各適其用故也昔魏武侯謀事而當羣臣莫能逮退朝而有喜色吳起憂之楚莊王謀事而當羣臣莫能及退朝而有憂色申公巫臣與之魏武之驕其臣楚莊王之自以為憂其度量相去逺矣書曰能自得師者王謂人莫己若者亡夫王之與亡其為道不同甚矣然其所以至此者乃在乎驕士與求益之間夫求益而不已則天下之善歸之人主而兼天下之善不王何也驕士而不已則不聞其過日與讒諂面諛之人居如是雖謂之亡可也故古者天子聼政使公卿至于列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諫庶人𫝊語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉夫矇瞽庶人非有以賢於王者然且不廢況於朝廷之士哉詩曰詢于芻蕘書曰天下愚夫愚婦一能勝豫若芻蕘之賤夫婦之愚王者皆有所取則其兼覽廣聽而至於幽隱及於微物者此道素行也今者公卿侍從之官皆天子所與朝夕謀議以揆事圗䇿於堂上者今其見也近者不過數刻逺者無召問賜對之期其或乞至左右乃須待命數日然後得前以疏逺難見之人迫於須㬰倉卒之間則其言不能逹其情其論不能究其事必矣陛下又或易之而意不在焉則見其才愈下其論愈卑也陛下若能改用此道數見以盡其恩切問以觀其意使其所懷得伸而無遁情則下莫敢不盡雖其疏逺者亦且于于然而來矣陛下遍得天下之士而大小各當於用則太平不旋踵而興若以人才皆不足與有為而類忽之則臣恐其賢者容默茍簡以求去不肖者偷合諂諛以投陛下之隙若是則所失雖近而為禍甚逺也易曰言出乎身加乎民行發乎邇見乎逺可不謹哉陛下垂意聼察不勝大幸覺又論君臣相疑之弊上奏曰臣風聞羣臣竊論陛下聖質甚美每加於初而聖治未能有改於他日此由聖心所以待遇羣臣者未能曠然無疑羣臣之所以事陛下者亦往往自疑於未信也臣嘗以謂天下之患最大而尤切者莫甚於君臣相疑而相遇以僞夫以誠待物物之格者幾何若以疑焉則誰敢自盡陛下欲使羣臣人人自盡而比周朋黨之行不設讒誣譛謗之說不行則莫若事至而制之以義言至而窮之以理也夫臣下欲為比周朋黨讒誣譛謗以蔽惑人主之聰明者其大則欲擅主之權其小則欲干主之利陛下知權之所在而謹持之知利之所出而謹守之則二者之患息矣所謂持權者非以羣臣為不可任也陛下事至而不制之以義言至而不窮之以理一切惟大臣之聼則權在大臣必矣若將不任大臣而顧訪於他臣亦事至而不制之以義言至而不窮之以理一切惟他臣之聼則權又在他臣矣屑屑然徒取諸此以益彼未見持權之善也臣以謂陛下欲羣下之不為比周不為讒譛莫若察之以明而謹夫義理之所在欲羣下之不擅權利莫若進賢逺佞而賞當功罰當罪也臣觀陛下即位以來進擢羣臣其初未嘗不崇奬優異其後則或厭棄疏外僅不陵藉之耳禮曰進人若將加諸膝退人若將墜諸淵此人主之所尤宜戒者也臣竊以謂凡如此始信而終疑之者雖其才或下不足以偹訪逮堪任使類或為人所間釁端一開則不得為全人臣恐陛下持此道不變數年之後可以偹任使者少矣伏願察之以睿哲考之以理義進退升黜惟義所在則孰敢背公而徇私比下罔上以自近於誅戮哉覺又論任賢使能之異上奏曰臣前日崇政論事或未至切者反蒙陛下曲賜嘉納有事似至小推之所害極大臣雖反復言之未蒙省察臣性愚訥奏對之際未能悉盡事情退而追誦陛下之言未盡於理者臣請得偹論之臣歷觀書𫝊見人君用臣二道而已任賢使能之分既殊任使之方亦異有道德仁義忠言嘉謀可以任天下之重揆萬事之理治亂安危之機未能兆於四海而見之堂上詼詭譎怪若不可以用於時而收采捃托無不盡其所長此可謂役物而不役於物用人而不為人用者也王者得此人焉任之者與之同心同德猶元首股肱焉付之以天下而上心不疑託之以四海而人言不能間至於所知有限量所能有彼此譬之俎豆樽罍之為器輪轅棟宇之為木方圓大小短長曲直各適於用而止耳此功用役使之士可以處外而不可處內可以責之事功而不可責之言議謂之賢也則仁且有智德偹而才全不以富貴貧賤動其心不以用舍得喪違其操人主不與之同量合德則不可得而屈立其朝而道不行則去故道德之士常擇君而後起豈以人主之取舍輕重移其心哉故人主之得此士也大則師之其次友之則天下治矣謂之能也則奔走役使之人耳可貴可賤可榮可辱豫奪而進退之惟上所令猶恐恐然惟懼其君之厭已也然而世無是人則誰為君役誰為君使者故明主謹視其臣之賢能而馭之各以其道善馭臣者譬之善馭馬若夫鸞旗在前屬車在後行不數十里而舍則非稱德之驥倍至之馬不可以駕君之車及用之戰陳用之馳逐則非駿足疾驅超軼而絶塵者不可以獲多而取勝善馭馬者亦謹視其所用而已周禮以八柄馭羣臣漢書亦曰泛駕之馬跅弛之士亦在御之而已豈不信哉臣又聞詩曰文武吉甫萬邦為憲又曰侯誰在矣張仲孝友說詩者曰宣王與孝友之臣處內以文武之士征伐在人主左右而可處乎內者非孝友之臣不可也書曰其侍御僕從罔非正人以旦夕承弼厥辟出入起居罔有不欽然則備從官而不得正人無乃非先王之意乎臣所謂近侍之官不可輕以與人者以此故也陛下欲興太平以盡革天下之弊而即位以來所奬拔數人者多有口才而無實行務行險以徼幸而不循常理孔子曰逺佞人周公曰繼自今立政其惟克用常人蓋佞人者其言似忠信其行似方直然而規以售君之寵而肆其志焉為其甚似而非也非至明則莫之能察非至剛莫之能勝故雖若顔子者孔子猶使逺之常人者奉法循理忠信而篤實終不以亡為有以虗為盈隨其所用大小各以見效至於無常之人雖巫醫之賤不得為之為其變亂善惡顛倒是非足以害上之政也今陛下欲尊寵孔子之所逺而棄忽周公之所用無乃非政化之美歟陛下聖質高明絶出羣臣之上羣臣未有以望萬分者故陛下思得卓越不羈之士與之有為臣謂此輩獨可藉其精力收其智能駕馭而使之不可以為侍從親近之臣也臣恐日浸月長若此曹彚征墻進充滿於朝廷則賢人去正人逐其為患禍尚可以一二而言之哉伏願陛下觀詩書之所任使周公孔子之所用舍無速於近功小利則王道可成禮樂可興伏惟留神察之不勝大幸覺又論果於用善斷於去惡上奏曰臣聞易否泰之辭曰君子道長小人道消內陽而外隂內君子而外小人則為泰泰者通而治也小人道長君子道消內隂而外陽內小人而外君子則為否否者閉而亂也易之意謂天道不能無隂陽人道不能無小人君子若陽氣盛長萬彚通達則羣剛用事而隂伏於外矣聖人在上賢人道亨則君子用事於內小人在外矣君子小人迭相消長迭相勝負譬圎方之不相入氷炭之不同器然聖人在上則賢人出見於世將以有為此其氣類感通自然之應也易曰雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也臣又聞𫝊曰舜有大功二十舉十六相去四凶也舜之治天下功德多矣𫝊不言其他而以八元八凱之進於朝鯀共工歡兜之流於外以為功謂舜能辨羣臣之正邪處君子小人當於內外則朝廷清明天下大治萬務雖衆何以加於此哉臣又聞管子曰齊威公之郭問其父老郭何以亡父老曰以其善善而惡惡也威公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也然則人主有善善惡惡之心於用舍之際遲疑而不忍及其久邪臣進而正臣退小人得志而君子潔身以去則其不亡者希矣臣又聞書曰爾無昵于憸人充耳目之官迪上以非先王之典謂人主所任以為耳目者必皆正人吉士則其行篤實其言忠信所以道上者皆先王之法言也人主之患莫大於昵近小人小人之言人主不必盡用萬一見聽害政大矣古之人君亦有知其小人而用數以役之者初則愛其才藉其力謂可以駕馭而用之及其既久狎熟慣習先意承㫖卜射人主所好惡之事焉人主忽不自覺其說茍得行則正人相引去而亂敗隨之矣故曰與不善人居如入鮑魚之肆久而不知其臭也臣竊惟陛下以堯舜之質濬明不世出之才即位未幾進退大臣如數白黑四海九州莫不注心拭目以望太平而朝廷之上忠邪混淆君子齰舌而不敢言正人徊徨而欲去嵗且再朞而功緒落落未有治安之漸以陛下之明判此無難者然優游牽制有所不忍恐其有以得於陛下而陛下惑猶未解也若爾則臣知陛下之計誤矣陛下幸少垂意臣言法否泰之象使君子小人各得內外之常處以成虞舜進賢去佞之大功果於用善斷於去惡不為郭父老所憂一清耳目之路使先王之典日陳於前臣知天下不足治太平不難成也覺又論諫官貶秩不當再舉其職奏曰臣近准敕命降授前件官同知諫院臣已祗受訖於二十一日正衙二十三日門謝並畢臣竊以告臣之辭云薦引公卿措置職任此而輕肆宜有懲責臣受命已來夙夜惟思若以臣畎畝無狀學問零落不足以拾遺左右論大臣能否則已矣若以臣所論不當於理則臣所學於古者如此敢違臣所學以徇世乎然敕命已下不敢遽有論列既乞補外而三狀聞奏未蒙報可臣欲勉强就職則臣方以言忤㫖得罪奪官𫝊曰人臣不見察於君不敢立於朝臣雖暗愚敢忘斯義臣謹上考聖人旁稽傳記反覆一二為陛下言之非以避臣之罪也將以明君臣之義也陛下幸赦其罪使得畢陳臣聞孔子所謂諫臣七人者三公四輔也天子與此七人者處而繩愆糾繆格君心之非羣臣之賢不肖相與謀議而進退之泯然不見其辨爭之迹而治化已成於天下後世七人者不任其責始以小官與人主論辨天下之萬事故諫官雖微而與謀於王體與聞於國論宰相與人主進退賢不肖於廟堂之上諫官與人主别白賢不肖於造膝之間其所從來久矣孔子曰君子之仕行其義也又曰勿欺也而犯之故臣之事陛下也情不敢隱而每犯顔焉義之所在則言之不疑又聞孔子曰君子之事君也將順其美匡救其惡晏子曰君所謂可而有否焉臣獻其否而成其可君所謂否而有可焉臣獻其可而去其否若如告辭所謂則人臣之義有匡救而無將順有獻否而無成可始得事君之義而無隱情也或者乃謂諫臣小官不當與人主進退大臣之事又或云諫臣雖可以論大臣之賢不肖然不當云以某代某臣又以為不然衛大夫史鰌以蘧伯玉賢而不用彌子瑕不肖而任事數以諌而君不聼死且不懈至以尸諫衛公卒退彌子瑕而用蘧伯玉成帝時御史大夫缺谷永薦薛宣成帝用之鮑宣以諫大夫上言請黜汝昌侯傅商方陽侯孫寵宜淩侯息夫躬而召用故大司馬傅喜故大司空何武師丹故丞相孔光故左將軍彭宣明年上遂召孔光免孫寵息夫躬又召何武彭宣復為三公杜詩以南陽太守上疏稱伏湛柱石之臣宜居輔弼郎顗言黃瓊李固可任時政伊尹傅說不足為比此數人者皆位下言輕或勸人主進退大臣或欲以某代某當時或用或不用焉未嘗以為非也唐之盛在太宗之臣莫如魏徴時有言徴阿黨親戚者太宗使溫彥博按之又使彥博責徴不得不存形迹他日徴入奏曰臣聞君臣叶心義同一體未聞不存公道唯事形迹若君臣上下同遵此路則邦之興喪或未可知太宗改容曰吾已悔之若徴之言可謂深得治體矣使太宗以形迹待羣臣羣臣以形迹事太宗嫌疑猜阻上下之情不通則與秦之末世何異豈能成貞觀之治哉今使言者論羣臣之非而不言其是論羣臣之惡而不言其美稱其人不得言堪某職述其才不得言堪某任其為形迹豈不甚哉臣雖非魏徴之賢實欲陛下復太宗之治也故臣之事陛下也知盡臣之義而無隱情上不見三公之尊下不知九品之賤愚智忠邪茍知其詳者悉以獻於左右𫝊曰為人臣者無以有已明委質以事君則身非已有生殺豫奪唯上所令𫝊曰匹夫不可奪志豈謂可殺可生者身也可豫可奪而志不可以奪歟以臣賤微言論不合放廢竄逐何傷於治聖恩博大才奪兩官或周章震擾喪其所圗遂於陛下懷不盡之意則罪莫大焉況臣自供諫職才及兩月得對至于五六而章十餘上臣之本末計亦粗簡聖心然臣所言無一見效臣論樞密使邵允在位無狀而陛下疑之論御史中丞滕甫姦邪而陛下不信則是臣行猶可疑而言不足聼也陛下置左右耳目之臣而取言行無足采者不知將何補於治臣所以區區求去者非徒不得其言亦以深為陛下謀耳伏望聖慈特賜檢臣前後三狀罷臣言職除一外官臣見居家待罪所有實録院檢討同知諫院管幹國子監臣並不敢供職二年覺又論不必每事遣使狀奏曰臣聞朝廷務一切更制庶事將多遣官出諸路以集之臣竊以為過矣本朝承百年之弊事有偏而不舉溢而不救者不可勝數將欲變而新之則在張其綱紀正其法度擇羣材而付之若事事遣使凡皆出於朝廷則臣恐不盡事情而又生勞擾之弊也臣竊以諸路使者多是朝廷素所選擢久更任使幸以成法授之必能集事其間或有繆懦不才不勝任者自可換以才吏若又難得職任相當者則若近嵗權發遣及副使判官之類或召至京師或朝廷臨遣使其法度出於一而議論精詳則自集事矣或諸路使者不可多置不足以分幹庶事則聼其辟舉屬吏若近者發運使之於東南則人皆知朝廷所以付畀之意而務竭其力今不擇才否一切遣使代治其職則庸者得以偷安而才者不勸矣三年覺又論罷司馬光樞密范鎮封駮司不當上奏曰臣前日延和面奉聖㫖議改青苖法復常平舊制又患諸路提舉非其人有意更易臣竊喜嘆以為中外之論正欲如此而聖諭及之真臣等之所望四方之所幸也翹足企首以候德音昨日又聞罷司馬光樞密副使罷范鎮通進封駮司若以司馬光爭論青苖新法拒違詔除鎮從而和之駮正而不肯下則是青苖之議持之尚堅而延和宣諭或亦有不果者歟臣屢嘗奏聞青苖新法極為細事徒以大臣講求不詳議論不審而倉猝茍且擾動天下故人情不安論難鋒起當此時雖有善謀良法難以推行況考之於古而或差施之於今而未當措置舛錯如此其甚者哉奈何以難行之法惡人議之至罷一樞密副使絀一封駮司流聞四方所損不細𫝊載後世何以觀法昔成王剪桐葉以戲叔虞史佚從而封之曰天子無戲言西府之重何止有加司馬光之直諒豈但方於叔虞誥敕之嚴固不並於桐葉陛下有戲言之過則號令之所被眩人以空虗無用之文誥命之所加示人以玩弄可移之物書曰令出惟行不惟反易曰渙汗其大號令行而更收汗出而復反何以使人信而誅其或惰者乎朝廷張官分職固欲人守其官士稱其職也范鎮封駮識者莫不是之不能聼用其言奈何罷其職任𫝊曰守道不如守官鎮能守其官是封駁得人也遽然罷之豈將患其不順己耶不順陛下者多見容不順執政者輒見斥臣恐人主之權或移於下矣失職者固法之所誅守官者又朝廷之所棄不知陛下將取固祿保位茍容其身以偹貟充數乎不然何宜進者反聼其罷宜任者反從而黜耶臣以陛下致今日之紛紜而在朝羣臣往往求去者何耶徒以青苖新法人情不安所遣使者多非其人大臣建議而不從言者力爭而不聼至於罷免柄臣之新命黜責禁近之守官推劾諫臣之風聞內外騰沸駭動四方臣竊憂他變相緣而生治亂從此分矣伏望聖慈采羣論之所長奮乾剛之獨斷稍復常平之舊法悉罷提舉之庶官自然人情復安中外如故歷代名臣奏議卷一百三十五
