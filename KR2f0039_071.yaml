body:
  text: 歷代名臣奏議卷七十一明楊士竒等撰儲嗣晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事也師在制命而已禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退趙王立周紹為傅曰寡人始行縣過番吾當子為子之時踐石以上者皆道子之孝故寡人問子以璧遺子以酒食而求見子子謁病而辭人有言子者曰父之孝子君之忠臣也故寡人以子之智慮為辨足以道人危足以持難忠可以寫意信可以逺期詩云服難以勇治亂以智事之計也立傅以行教少以學義之經也循計之事失而不纍訪議之行窮而不憂故寡人欲子之胡服以傅王子周紹曰王失論矣非賤臣所敢任也王曰選子莫若父論臣莫若君君寡人也周紹曰立傅之道六王曰六者何也周紹曰智慮不躁達於變身行寬惠達於禮威嚴不足以易於位重利不足以變其心恭於教而不快和於下而不危六者傅之才臣無一焉隱中不竭臣之罪也傳命僕官以煩有司吏之耻也王請更論王曰知此六者所以使子周紹曰乃國未通於王之胡服雖然臣王之臣也而王重命之臣敢不聽命乎再拜賜胡服王曰寡人以王子為子任欲子之厚愛之無所見醜御道之以行義勿令溺苦於學事君者順其意不逆其志事先者明其髙不倍其孤故有臣可命其國之祿也子能行是以事寡人者畢矣書云去邪勿疑任賢勿二寡人與子不用人矣遂賜周紹胡服衣冠具帶黃金師比以傅王子楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一兔走於街萬人追之一人得之萬人不復走分未定則一兔走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兔走也恭王聞之立康王為太子漢髙祖十二年欲以趙王如意易太子太傅叔孫通諌上曰昔者晉獻公以驪姬之故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇令趙髙得以詐立胡亥自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食淡其可背哉陛下必欲廢嫡而立少臣願先伏誅以頸血汙地髙帝曰公罷矣吾且戲耳叔孫通曰太子天下本本一搖天下振蕩奈何以天下為戲髙帝曰吾聽公言及上置酒見留侯所招客從太子入見上乃遂無易太子志矣文帝二年正月有司言曰蚤建太子所以尊宗廟請立太子上曰朕既不德上帝神明未歆享天下人民未有嗛志今縱不能博求天下賢聖有德之人而禪天下焉而曰豫建太子是重吾不德也謂天下何其安之有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也春秋髙閲天下之義理多矣明於國家之大體吳王於朕兄也惠仁以好德淮南王弟也秉德以陪朕豈為不豫哉諸侯王宗室昆弟有功臣多賢及有德義者若舉有德以陪朕之不能終是社稷之靈天下之福也今不選舉焉而曰必子人其以朕為忘賢有德者而專於子非所以憂天下也朕甚不取也有司皆固請曰古者殷周有國治安皆千餘歲古之有天下者莫不長焉用此道也立嗣必子所從來逺矣髙帝親率士大夫始平天下建諸侯為帝者太祖諸侯王及列侯始受國者皆亦為其國祖子孫繼嗣世世弗絶天下之大義也故髙帝設之以撫海內今釋宜建而更選於諸侯及宗室非髙帝之志也更議不宜子某最長純厚慈仁請建以為太子上乃許之因賜天下民當代父後者爵各一級時鼂錯上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其衆則群臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或曰皇太子亡以知事為也臣之愚誠以為不然竊觀上世之君不能奉其宗廟而劫殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書說也夫多誦而不知其說所謂勞苦而不為功臣竊觀皇太子材智髙竒馭射伎藝過人絶逺然於術數未有所守者以陛下為心也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令武帝時壺關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安隂陽和調物乃茂成父慈母愛室家之中子乃孝順隂陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸昔者虞舜孝之至也而不中於瞽叟孝已被謗伯竒放流骨肉至親父子相疑何者積毁之所生也由是觀之子無不孝而父有不察今皇太子為漢嫡嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之𨽻臣耳陛下顯而用之銜至尊之命以迫蹴皇太子造飾姦詐群邪錯繆是以親戚之路隔絶而不通太子進不得上見退則困於亂臣獨寃結而亡告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩云營營青蠅止于藩愷悌君子無信讒言讒言罔極交亂四國往者江充讒殺趙太子天下莫不聞其罪固宜陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辨士不敢說臣竊痛之臣聞子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在匡君安社稷也詩云取彼譛人投畀豺虎唯陛下寬心慰意少察所親母患太子之非亟罷甲兵無令太子久亡臣不勝惓惓出一旦之命待罪建章闕下書奏天子感寤宣帝時太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問疏廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家視陋非所以廣太子德於天下也上善其言元帝竟寧元年上寢疾傅昭儀及定陶王常在左右而皇后太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衛尉侍中與皇后太子皆憂不知所出駙馬都尉侍中史丹以親密臣得侍疾候上間獨寢時丹直入卧內頓首伏青蒲上涕泣言曰皇太子立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣太子兩王幼少意中戀戀何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即却頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔導太子毋違我意丹噓唏而起太子由是遂為嗣矣哀帝時司𨽻解光奏言趙昭儀傾亂聖朝親滅繼嗣請事窮竟議即耿育上疏言臣聞繼嗣失統廢嫡立庶聖人法禁古今至戒然太伯見歷知適逡循固讓委身吳越權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道德最備是以尊號追及大王故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖未有皇子萬歲之後未能持國權柄之重制於女主女主驕盛則耆欲無極少主幼弱則大臣不使世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之德仁孝子愛之恩懷獨見之明內斷於身故廢後宫就館之漸絶微嗣禍亂之根乃欲致位陛下以安宗廟愚臣既不能深援安危定金匱之計又不知推演聖德述先帝之志乃反覆校省內暴露私燕誣汙先帝傾惑之過成結寵妾妒媚之誅甚失賢聖逺見之明逆負先帝憂國之意夫論大德不拘俗立大功不合衆此乃孝成皇帝至思所以萬萬於衆臣陛下聖德盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且褒廣將順君父之美匡救銷滅既往之過古今通議也事不當時固爭防禍於未然各隨指阿從以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世逺聞百蠻近布海內甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察哀帝為太子亦頗得趙太后力遂不竟其事東漢光武建武中東宫初建諸王國並開而官屬未備師保多闕司徒掾班彪上言曰孔子稱性相近習相逺也賈誼以為習與善人居不能無為善猶生長於齊不能無齊言也習與惡人居不能無惡猶生長於楚不能無楚言也是以聖人審所與居而戒慎所習昔成王之為孺子出則周公召公太史佚入則太顛閎夭南宫括散宜生左右前後禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納於邪驕奢淫佚所自邪也詩曰詒厥孫謀以燕翼子言武王之謀遺子孫也漢興太宗使鼂錯導太子以法術賈誼教梁王以詩書及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宫以下莫不崇簡其人就成德器今皇太子諸王雖結髮學問修習禮樂而傅相未值賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅東宫及諸王國備置官屬又舊制太子食湯沐十縣設周衛交㦸五日一朝因坐東箱省視膳食其非朝日使僕中允旦旦請問而已明不媟黷廣其敬也書奏帝納之二十八年大會百官詔問誰可傅太子者群臣承望上意皆言太子舅執金吾原鹿侯隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅而以榮為少傅賜以輜車乘馬魏明帝時司徒王朗上疏曰昔周文十五而有武王遂享十子之祚以廣諸姬之𦙍武王既老而生成王成王是以鮮於兄弟此二王者各樹聖德無以相過比其子孫之祚則不相如蓋生育有早晚所産有衆寡也陛下既德祚兼彼二聖春秋髙於姬文育武之時矣而子發未舉於椒蘭之奧房藩王未繁於掖庭之衆室以成王為喻雖未為晚取譬伯邑則不為夙周禮六宫內官百二十人而諸經常說咸以十二為限至於秦漢之末或以千百為數矣然雖彌猥而就時於吉館者或甚鮮明百斯男之本誠在於一意不但在於務廣也老臣慺慺願國家同祚於軒轅之五五而未及周文之二五用為伊邑且少小常苦被褥泰溫泰溫則不能便柔膚弱體是以難可防護而易用感慨若常令少小之緼袍不至於甚厚則必咸保金石之性而比夀於南山矣帝報曰夫忠至者辭篤愛重者言深君既勞思慮又手筆將順三復德音欣然無量朕繼嗣未立以為君憂欽納至言思聞良規吳大帝赤烏五年嘗寢疾和祠祭於廟和妃叔父張休居廟邀和過所居全公主使人覘視因言太子不在廟中專就妃家計議而和寵稍損後遂幽閒尚書僕射屈晃入口諌曰太子仁明顯聞四海今三方鼎峙實不宜搖動太子以生衆心願陛下少垂聖慮老臣雖死猶生之年叩頭流血辭氣不撓明帝子和為太子霸為魯王寵愛崇特與和無殊頃之和霸不睦之聲聞於權耳權禁斷往來假以精學督軍使者羊衜上疏曰臣聞古之有天下者皆先顯别適庶封建子弟所以尊重祖宗為國藩表也二宫拜授海內稱宜斯乃大吳興隆之基頃聞二宫並絶賔客逺近悚然大小失望竊從下風聽採衆論咸謂二宫智達英茂自正名建號於今三年德行內著美稱外昭西北二隅久所服聞謂陛下當副順遐邇所以歸德勤命二宫賔延四逺使異國聞聲思為臣妾今既未垂意於此而發明詔省奪備衛抑絶賔客使四方禮敬不復得通雖實陛下敦尚古義欲令二宫專志於學不復顧慮觀聽小宜期於溫故博物而已然非臣下傾企喁喁之至願也或謂二宫不遵典式此臣所以寢息不寧就如所嫌猶宜補察密加斟酌不使逺近得容異言臣懼積疑成謗久將宣流而西北二隅去國不逺異同之語易以聞達聞達之日聲論當興將謂二宫有不順之愆不審陛下何以解之若無以解異國則亦無以釋境內境內守疑異國興謗非所以育巍巍鎮社稷也願陛下早發優詔使二宫周旋禮命如初則天清地晏萬國幸甚矣七年太子有不安之議上大將軍右都護陸遜上疏陳太子正統宜有盤石之固魯王藩臣當使寵秩有差彼此得所上下獲安謹叩頭流血以聞書三四上及求詣都欲口論適庶之分以匡得失九年朱據遷驃騎將軍遭二宫搆爭據擁護太子爭曰臣聞太子國之根本雅性仁孝天下歸心今卒責之將有一朝之慮昔晉獻用驪姫而申生不存漢武信江充而戾太子寃死臣竊懼太子不堪其憂雖立思子之宫無所復及矣晉惠帝時江統轉太子洗馬在東宫纍年甚被親禮太子頗闕朝覲又奢費過度多諸禁忌統上書諌曰臣聞古之為臣者進思盡忠退思補過獻可替否拾遺補闕是以人主得以舉無失行言無口過德音發聞揚名後世臣等不逮無能云補思竭愚誠謹陳五事如左惟䝉一省再省少垂察納其一曰六行之義以孝為首虞舜之德以孝為稱故太子以朝夕視君膳為職左右就養無方文王之為世子可謂篤於事親者也故能擅三代之美為百王之宗自頃聖體屢有疾患數闕朝侍逺近觀聽者不能深知其故以致疑惑伏願殿下雖有微苦可堪扶輿則宜自力易曰君子終日乾乾蓋自勉強不息之謂也其二曰古之人君雖有聰明之姿睿哲之質必須輔弼之助相導之功故虞舜以五臣興周文以四友隆及成王之為太子也則周召為保傅史佚昭文章故能聞道早備登崇大業刑措不用流聲洋溢伏惟殿下天授逸才聰鑒特達臣謂猶宜時發聖令宣揚德音咨詢保傅訪逮侍臣覲見賔客得令接盡壅否之情沛然交泰殿下之美煥然光明如此則髙朗之風扇於前人𢎞範令軌永為後式其三曰古之聖王莫不以儉為德故堯稱采椽茅茨禹稱卑宫惡服漢文身衣弋綈足履革舄以身先物政致太平存為明主沒見宗祀及諸侯修之者魯僖以恭儉節用聲列雅頌蚡冒以篳簬藍縷用張楚國大夫修之者文子相魯妾不衣帛晏嬰相齊鹿裘不補亦能匡君濟俗興國隆家庶人修之者顔回以簞食瓢飲揚其仁聲原憲以蓬户繩樞邁其清德此皆聖主明君賢臣智士之所履行也故能懸名日月永世不朽蓋儉之福也及到末世以奢失之者帝王則有瑶臺瓊室玉杯象箸肴膳之珍則熊蹯豹胎酒池肉林諸侯為之者至於丹楹刻桷餼徴百牢大夫有瓊辨玉纓庶人有擊鐘鼎食亦罔不亡國喪宗破家失身醜名彰聞以為後戒竊聞後園鏤飾金銀刻磨犀象畫室之功課試日精臣等以為今四海之廣萬物之富以今方古不足為侈也然上之所好下必從之是故居上者必慎其所好也昔漢光武皇帝時有獻千里馬及寶劒者馬以駕鼓車劒以賜騎士世祖武皇帝有上雉頭裘者即詔有司焚之都街髙世之主不尚尤物故能正天下之俗刑四方之風臣等以為畫室之功且可減省後園雜作一皆罷遣肅然清靜優遊道德則日新之美光於四海矣其四曰以天下而供一人以百里而供諸侯故王侯食籍而衣稅公卿大夫受爵而資祿莫有不贍者也是以士農工商四業不雜交易而退以通有無者庶人之業也周禮三市旦則百族晝則商賈夕則販夫販婦買賤賣貴販鬻菜果收十百之盈以救旦夕之命故為庶人之貧賤者也樊遲匹夫請學為圃仲尼不答魯大夫臧文仲使妾織蒲又譏其不仁公儀子相魯則拔其園葵言食祿者不與貧賤之人爭利也秦漢以來風俗轉薄公侯之尊莫不殖園圃之田而收市井之利漸染相放莫以為耻乘以古道誠可愧也今西園賣葵菜藍子雞麵之屬虧敗國體貶損令問其五曰竊見禁土令不得繕修墻壁動正屋瓦臣以為此既違典彛舊義且以拘攣小忌而廢𢎞廓大道宜可蠲除於事為宜朝廷善之愍懷太子廢平樂鄉侯閻纘輿棺詣闕上書理太子之寃曰伏見赦文及榜下前太子遹手疏以為驚愕自古以來臣子悖逆未有如此之甚者也幸賴天慈全其首領臣伏念遹生於聖父而至此者由於長養深宫沈淪富貴受饒先帝父母驕之每見選師傅下至群吏率取膏粱擊鐘鼎食之家希有寒門儒素如衛綰周文石奮踈廣洗馬舍人亦無汲黯鄭莊之比遂使不見事父事君之道臣案古典太子居以士禮與國人齒以此明先王欲令知先賤然後乃貴自頃東宫亦微太盛所以致敗也非但東宫歷觀諸王師友文學皆豪族力能得者率非遂王陽能以道訓友無諒直三益之節官以文學為名實不讀書但共鮮衣好馬縱酒髙會嬉逰博奕豈有切磋能相長益臣常恐公族遲陵以此歎息今遹可以為戒恐其被斥棄逐逺郊始當悔過無所復及昔戾太子無狀稱兵拒命而壺關三老上書有田千秋之言猶曰子弄父兵罪應笞耳漢武感悟之築思子之臺今遹無狀言語悖逆受罪之日不敢失道猶為輕於戾太子尚可禁持重選保傅如司空張華道德深逺乃心忠誠以為之師光祿大夫劉實寒苦自立終始不衰年同吕望經籍不廢以為之保尚書僕射裴頠明允恭肅體道居正以為之友置遊談文學皆選寒門孤宦以學行自立者及取服勤更事涉履艱難事君事親名行素聞者使與共處使嚴御史監護其家絶貴戚子弟輕薄賔客如此左右前後莫非正人師傅文學可令十日一講使共論議於前敕使但道古今孝子事親忠臣事君及思愆改過之義皆聞善道庶幾可全昔太甲有罪放之三年思庸克復為殷明王又魏文帝懼於見廢夙夜自祗竟能自全及至明帝因母得罪廢為平原侯為置家臣庶子師友文學皆取正人共相匡矯兢兢慎罰事父以孝父沒事母以謹聞於天下於今稱之漢髙皇帝數置酒於庭欲廢太子後四皓為師子房為傅竟復成就前事不忘後事之戒孟軻有云孤臣孽子其操心也危慮患也深故多善功李斯云慈母多敗子嚴家無格虜由陛下驕遹使至於此庶其受罪以來足自思改方今天下多虞四夷未寧將伺國隙儲副大事不宜空虛宜為大計小復停留先加嚴誨依平原侯故事若不悛改棄之未晚也臣素寒門無力仕宦不經東宫情不私遹念昔楚國處女諫其王曰有龍無尾言年四十未有太子臣嘗備近職雖未得自結天日情同閽寺悾悾之誠皆為國計臣老母見臣為表乃為臣卜卦云書御即死妻子守臣涕泣見止臣獨以為頻見拔擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輒具棺絮伏須刑誅書御不省皇太孫立纘復上疏曰臣前上書訟太子之枉不見省覽昔壺關三老陳衛太子之寃而漢武築思子之臺髙廟令田千秋上書不敢正言託以鬼神之教而孝武大感月中三遷位至丞相乘車入殿號曰車氏恨臣精誠微薄不能有感竟使太子流離沒命許宫向令陛下即納臣言不致此禍天贊聖意三公獻謀庶人賜死罪人斯得太子以明臣恨其晚無所復及詔書慈悼迎喪反葬復其禮秩誠副衆望不意吕霍之變復生於今日伏見詔書建立太孫斯誠陛下上順先典以安社稷中慰慈悼寃魂之痛下令萬國心有所繫追惟庶人所為無狀幾傾宗廟賴相國太宰至忠憤發潛謀俱斷奉贊聖意以成神武雖周誅二叔漢掃諸吕未足以喻臣願陛下因此大更釐改以為永制禮置太子居以士禮與國人齒為置官屬皆如朋友不為純臣既使上厭至望以崇孝道又令不相嚴憚易相規正昔漢武既信姦讒危害太子復用望氣之言欲盡誅詔獄中囚邴吉以皇孫在焉閉門拒命後遂擁護皇孫督罰乳母卒至成人立為孝宣皇帝茍志於忠無往不可歷觀古人雖不避死亦由世教寬以成節吉雖拒詔書事在於忠故宥而不責自晉興已來用法大嚴遲速之間輒加誅斬一身伏法猶可彊為今世之誅動輒滅門昔吕后臨朝肆意無道周昌相趙三召其王而昌不遣先徴昌入乃後召王此由漢制本寬得使為快假令如今吕后必謂昌已反夷其三族則誰敢復為殺身成義者哉此法宜改可使經逺又漢初廢趙王張敖其臣貫髙謀弒髙祖髙祖不誅以明臣道田叔孟舒十人為奴髠鉗隨王隱親侍養故令平安向使晉法得容為義東宫之臣得如周昌固護太子得如邴吉距詔不坐伏死諫爭則聖意必變太子以安如田叔孟舒侍從不罪者則隱親左右姦凶毒藥無緣得設太子不夭也臣每責東宫臣故無侍從者後聞頗有於道路望車拜辭而有司收付洛陽獄奏科其罪然臣故莫從良有以也又本置三率盛其兵馬所以宿衛防虞而使者卒至莫有警嚴覆請審者此由恐畏滅族今皇孫冲幼去事多故若有不虞彊臣專制姦邪矯詐雖有相國保訓東宫擁佑之恩同於邴吉適可使玉體安全宜開來防可著於令自今已後諸有廢興倉卒群臣皆得輒嚴須録詣殿前面受口詔然後為信得同周昌不遣王節下聽臣子隱親得如田叔孟舒不加罪責則永固儲副以安後嗣之逺慮也來事難知往事可改臣前每見詹事裴權用心懇惻舍人秦戢數上書啓諫而爰倩贈以九列權有忠意獨不䝉賞謂宜依倩為比以寵其魂推尋表疏如秦戢輩及司𨽻所奏諸敢拜辭於道路者明詔稱揚使微異於衆以勸為善以奬將來也纘又陳今相國雖已保傅東宫保其安危至於旦夕訓誨輔導出入動靜劬勞宜選寒苦之士忠貞清正老而不衰如城門校尉梁柳白衣南安朱冲比者以為師傅其侍臣以下文武將吏且勿復取盛戚豪門子弟若吳大妃家室及賈郭之黨如此之輩生而富溢無念修已率多輕薄浮華相驅放縱皆非所補益於吾少主者也皆可擇寒門篤行學問素士更履險易節義足稱者以備群臣可輕其禮儀使與古同於相切磋為益昔魏文帝之在東宫徐幹劉楨為友文學相接之道並如氣類吳太子登顧談為友諸葛恪為賔卧同床帳行則參乘交如布衣相呼以字此則近代之朋比也天子之子不患不富貴不患人不敬畏患於驕盈不聞其過不知稼穡之艱難耳至於甚者乃不知名六畜可不勉哉昔周公親撻伯禽曹參笞窋二百聖考慈父皆不傷恩今不忍小相維持令至闕失頓相罪責不亦誤哉在禮太子朝夕視膳昏定晨省跪問安否於情得盡五日一朝於敬既簡於恩亦踈易致構間故曰一朝不朝其間容刀五日之制起漢髙祖身為天子父猶庶人萬機事多故闕私敬耳今主上臨朝太子無事專主孝養宜改此俗文王世子篇曰王季一飯亦一飯再飯亦再飯安有逸豫五日一覲哉纘又陳今迎太子神柩孤魂獨行太孫幼冲不可涉道謂可遣妃奉迎逺路令其父衍隨行衛護皇太子初見誣陷臣家門無祜三世假親具嘗辛苦以家觀國固知太子有變臣故求副監國欲依邴吉故事距違來使供養擁護身親飲食醫藥冀足救危主者以臣名資輕淺不肯見與世人見笑謂為此職進退難居有必死憂臣獨以為茍全儲君賈氏所誅甘心所願今監國御史直副皆當三族侍衛無狀實自宜然臣謂其小人不足具責故孔子曰可以託六尺之孤臨大節而不可奪是以聖王慎選故河南尹向雄昔能犯難葬故將鍾會文帝嘉之始拔顯用至於先帝以為右率如間之事若得向雄之比則豈可觸哉此二使者但為愚怯亦非與謀但可誅身自全三族如郭俶郭斌則於刑為當又東宫亦宜妙選忠直亮正如向雄比陛下千秋萬歲之後太孫冲幼選置兵衛宜得柱石之士如周昌者世俗淺薄士無廉節賈謐小兒恃寵恣睢而淺中弱植之徒更相翕習故世號魯公二十四友又謐前見臣表理太子曰閻兒作此為健然觀其意欲與諸司馬家同皆為臣寒心伏見詔書稱明滿奮樂廣侍郎賈𦙍與謐親理而亦疏逺往免父喪之後停家五年雖為小屈有識貴之潘嶽繆徽等皆謐父黨共相沈浮人士羞之聞其晏然莫不為怪今詔書暴揚其罪並皆遣出百姓咸云清當臣獨謂非但嶽徽二十四人宜皆齊黜以肅風教朝廷善其忠烈擢為漢中太守冲太孫薨齊王冏表曰東宫曠然冢嗣莫繼天下大業帝王神器必建儲副以固洪基今者後宫未有孕育不可庶幸將來而虛天緒非祖宗之遺志社稷之長計也禮兄弟之子猶子故漢成無嗣繼由定陶孝和之絶安以紹興此先王之令典往代之成式也清河王覃神姿岐嶷慧志早成康王正妃周氏所生先帝衆孫之中於今為嫡昔薄姬賢明文則承位覃外祖恢世載名德覃宜奉宗廟之重統無窮之祚以寧四海顒顒之望覃兄弟雖並出紹可簡令淑還為國𦙍不替其嗣輒咨大將軍頴及群公卿士咸同大願請具禮儀擇日迎拜遂立覃為太子成帝時庾氷兄弟以舅氏輔王室權侔人主慮易世之後戚屬轉踈將為外物所攻謀立康帝即帝母弟也每說帝以國有彊敵宜須長君帝從之中書令散騎常侍何充建議曰父子相傳先王舊典忽妄改易懼非長計故武不授聖弟即其義也昔漢景亦欲傳祚梁王朝臣咸以為虧亂典制拒而弗聽令琅邪踐祚如孺子何社稷宗廟將其危乎氷等不從既而康帝立帝臨軒氷充侍坐帝曰朕嗣洪業二君之力也充對曰陛下龍飛臣氷之力也若如臣議不覩升平之世帝有慙色宋文帝元嘉末帝頗以後事為念以侍中王僧綽年少方欲大相付託朝政小大皆與參焉從兄徽清介士也懼其太盛勸令損抑僧綽乃求吳郡及廣州上並不許會二凶巫蠱事泄上獨召僧綽具言之及將廢立使尋求前朝舊典劭於東宫夜饗將士僧綽密以啓聞上又令撰漢魏以來廢諸王故事撰畢送與江湛徐湛之湛之欲立隨王誕江湛欲立南平王鑠太祖欲立建平王宏議久不決誕妃即湛之女鑠妃即湛妹太祖謂僧綽曰諸人各為身計便無與國家同憂者僧綽曰建立之事仰由聖懷臣所謂惟宜速斷不可稽緩當斷不斷反受其亂願以義割恩略小不忍不爾便應坦懷如初無煩疑論淮南云以石投水吳越之人善沒取之事機雖密易致宣廣不可使難生慮表取笑千載上曰卿可謂能斷大事此事重不可不殷勤三思且庶人始亡人將謂我無復慈愛之道僧綽曰臣恐千載之後言陛下唯能裁弟不能裁兒上默然江湛同侍坐出閣謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直及劭弒逆江湛在尚書省聞變歎曰不用僧綽言以至於此後魏明元帝恆有微疾怪異屢見乃使中貴人密問於白馬公崔浩曰春秋星孛北斗七國之君皆將有咎今兹日蝕於胃昴盡光趙代之分野朕疾彌年療治無損恐一旦奄忽諸子並少將如之何其為我設圖後之計浩曰陛下春秋富盛聖業方融德以除災幸就平愈且天道縣逺或消或應昔宋景見災修德熒惑退舍願陛下遣諸憂虞恬神保和納御嘉福無以暗昧之說致損聖思必不得已請陳瞽言自聖化龍興不崇儲二是以永興之始社稷幾危今宜早建東宫選公卿忠賢陛下素所委仗者使為師傅左右信臣簡在聖心者以充賔友入總萬機出統戎政監國撫事六柄在手若此則陛下可以優遊無為頥神養夀進御醫藥萬歲之後國有成主民有所歸則姦宄息望旁無覬覦此乃萬世之令典塞禍之大備也今長皇子諱年漸周明睿溫和衆情所繫時登儲副則天下幸甚立子以長禮之大經若須並待成人而擇倒錯天倫則生履霜堅氷之禍自古以來載籍所記興衰存亡鮮不由此太宗納之於是使浩奉册告宗廟命世祖為國副主居正殿臨朝司徒長孫嵩山陽公奚斤北新公安同為左輔坐東廂西面浩與太尉穆觀散騎常侍丘推為右弼坐西廂東面百寮總已以聽焉太宗避居西宫時隱而窺之聽其決斷大悅謂左右侍臣曰長孫嵩宿德舊臣歷事四世功存社稷奚斤辨捷智謀名聞遐邇安同曉解俗情明練於事穆觀達於政要識吾旨趣崔浩博聞彊識精於天人之會丘推雖無大用然在公專謹以此六人輔相吾與汝曹遊行四境伐叛柔服可得志於天下矣群臣時奏所疑太宗曰此非我所知當決之汝曹國主矣孝文帝延興中顯祖集群寮欲禪位於京兆王子推王公卿士莫敢先言任城王雲進曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民父子相傳其來久矣皇魏之興未之有革皇儲正統聖德夙章陛下必欲割捐塵務頥神清曠者冢副之寄宜紹寶歷若欲捨儲輕移宸極恐非先聖之意駭動人情又天下是祖宗之天下而陛下輒改神器上乖七廟之靈下長姦亂之道此是禍福所由願深思慎之太尉源賀又進曰陛下今欲外選諸王而禪位於皇叔者臣恐春秋蒸嘗昭穆有亂脫萬世之後必有逆饗之譏深願思任城之言東陽公丕等進曰皇太子雖聖德夙彰然實冲幼陛下富於春秋始覽機政普天景仰率土徯心欲隆獨善不以萬物為心其若宗廟何其若億兆何宣武帝延昌三年于時肅宗在懷抱之中至於出入左右乳母而已不令宫寮聞知太學博士員外散騎侍郎帶詹事丞楊昱諫曰陛下不以臣等凡淺備位宫臣太子動止宜令翼從然自此以來輕爾出入進無二傅輔導之美退闕群寮住侍之式非所以示民軌儀著君臣之義陛下若召太子必降手敕令臣下咸知為後世法後周武帝建德之後皇太子稍長既無令德惟昵近小人左宫正宇文孝伯白高祖曰皇太子四海所屬而德聲未聞臣忝宫官實當其責且春秋尚少志業未成請妙選正人為其師友調護聖質猶望日就月將如或不然悔無及矣帝斂容曰卿世載鯁直竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難也深願陛下思之帝曰正人豈復過君於是以尉遲為右宫正孝伯仍為左宫正尋拜宗師中大夫唐髙祖武德初法曹孫伏伽上言三事其一曰臣聞性相近習相逺今皇太子諸王左右執事不可不擇大抵不義無賴及馳騁射獵歌舞聲色慢逰之人止可悅耳目備驅馳至於拾遺補闕決不能也泛觀前世子姓不克孝兄弟不克友莫不由左右亂之願選賢才澄僚友之選耳帝大悅太宗貞觀五年李百藥為太子右庶子時太子承乾頗留意典墳然閒燕之後嬉逰無度百藥作贊道賦以諷焉其詞曰下臣側聞先聖之格言嘗覽載籍之遺則伊天地之𤣥造洎皇王之建國曰人紀與人綱資立言與立德履之則率性成道違之則罔念作忒望興廢如從鈞視吉凶於糾纒至乃受圖膺籙握鏡君臨因萬物之恩化以百姓而為心傷大儀之潜運閲往古以來今盡為善於乙夜惜勤勞於寸隂故能釋層氷於渙汗變寒谷於蹛林總人靈以胥悅極穹壤而懷音赫矣盛唐大哉靈命時惟太始運鍾上聖天縱皇儲固本居正機悟宏逺神姿凝映顧三善而必𢎞祇四德而為行每趨庭而聞禮常問寢而資敬奉聖訓以周旋誕天文之明令邁觀喬而望梓即元龜與明鏡自大道云革禮教斯起以正君臣以篤父子君臣之禮父子之親盡情義以兼極諒𢎞道而在人豈夏啓而周成亦丹朱以商均既雕且琢溫故知新惟忠與敬曰孝與仁則可以下光四海上燭三辰昔二王之教子兼四時以齒學將交發於中外乃先之以禮樂樂以移風易俗禮以安上化人非有悅於鐘鼓將宣志以和神寧有懷於玉帛將克已而庇身生於深宫之中處於羣后之上未深思於王業不自珍於匕鬯謂富貴之自然恃崇髙以矜尚必恣驕狠動褰禮讓輕師傅而慢禮儀狎姦盜而縱淫放前星之耀遽隱少陽之道斯諒雖天下之為家蹈夷險之非一或以才而見升或見讒而受黜足可以自省厥休咎觀其得失請粗略而陳之覬披文以相質在宗周之積德乃執契而膺期賴父子而繼祚啓十百之鴻基逮扶蘇之副秦非有虧於聞望以長嫡之隆重監偏師於亭障始禍則金以寒離厥妖則火不炎上既樹置之違道見宗祀之遄喪伊漢氏之長世固明兩之遞作髙惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓景有慚於鄧子成從理之淫虐終生患於強吳由發怒於爭博武居儲兩時猶幼冲防衰年之絶議識亞夫之矜功故能恢𢎞祖業紹三代之遺風據開博望其名未融哀時命之竒舛遇讒賊於江充雖備兵以誅亂竟背義而凶終宣嗣好儒大猷行闡嗟被尤於德教美發言於忠謇始聞道於匡逺終獲戾於恭顯太孫雜藝雖異定陶馳道不絶抑惟小善猶見重於通人當傳芳於前典中興上嗣明章濟濟俱達時政咸通經禮極至情於愛敬惇友于於兄弟是以固東海之遺堂因西周之繼體五官在魏無聞德音或受譏於妲己且自悅於從禽雖才髙而學富竟取纍於荒淫暨貽厥於明皇搆崇基於三世得秦帝之奢侈亞漢武之才藝遂驅役於群臣亦無救於凋弊中撫寬愛相表多竒重桃符而致惑納巨鹿之明規竟能掃江表之氛穢舉要荒而見羈思惠處東朝察其遺跡在聖德其如初實御床之可惜悼愍懷之云廢遇烈風之吹沙盡性靈之狎藝亦自敗於凶邪安能奉其粢盛承此邦家惟聖上之慈愛訓義方於至道同論政於漢幄修政戒於京鄗鄙韓子之所賜重經術以為寶咨政理之美惡亦文身之斧藻庶有擇於愚夫慙乞言於遺老致庶績之咸寧先得人而為盛帝堯以則哲垂謨文王以多士興詠取之於正人鑒之於靈鏡量其器能審其檢行必宜度機而分職不可違方以從政若其惑於聽受暗於知人則有道者咸屈無用者必伸諂諛競進以求媚玩好不召而自臻直言正諫以忠信而獲罪賣官鬻獄以貨賄而見親於是虧我王度斁我彛倫九鼎遇奸回而逺逝萬姓望撫我而歸仁蓋造化之至育惟人靈之為貴獄訟不理有死生之異塗寃結不申感隂陽之和氣士之通塞屬之以深文命之修短懸之於酷吏是故帝堯畫像陳恤隱之言夏禹泣辜盡哀矜之志因取象於大壯乃峻宇而雕墻將瑶臺以瓊室豈畫棟以虹梁或淩雲以遐觀或通天而納涼極醉飽而刑人力命痿蹶而受身殃是故言惜十家之産漢帝以昭儉而垂裕雖成百里之囿周文以子來而克商彼嘉會而禮通重旨酒之為德至忘歸而受祉在齊聖而溫克若其酗醟以致昏沈湎以成忒痛殷受與灌夫亦亡家而喪國是以伊尹以酣室而作戒周公以亂邦而貽則咨幽閒之令淑實好逑於君子辭玉輦而割愛固班姬之所耻脫簮珥而思愆亦宣姜之為美乃有禍晋之驪姬喪周之褒姒盡娥妍於圖畫極凶悖於人理傾城傾國思昭示於後王麗質冶容宜永鑑於前史復有搜狩之禮馳射之場不節之以禮義必自致於禽荒匪外形之疲極亦中心而發狂夫髙深不懼胥靡之徒韝緤為娛小豎之事以宗社之崇重持先王之名器與鷹犬之並驅淩艱險而逸轡馬有銜橛之理獸駭不存之地猶有靦於獲多獨無情而內愧以小人之愚鄙忝不資之恩榮擢無庸於草澤齒陋質於簮纓遇大道行而兩儀泰喜元良盛而萬國貞以監府之多暇每講論而肅成仰惟神之敏速歎將聖之聰明自禮賢於秋實足歸道於春卿芳年淑景時和氣清華殿邃兮簾幃靜灌木森兮風雲輕花飄香兮動笑日驕鸚囀兮相哀鳴以物華之繁靡尚絶思於將迎猶蹈道而不倦極耽玩以研精命庸才以載筆謝摛藻於天庭異洞簫之娛侍殊飛蓋之緣情闕雅言以贊德異報恩以輕生敢下拜而稽首願永樹於風聲奉皇靈之遐夀冠振古於鴻名太宗見而遣使謂百藥曰朕於皇太子處見卿所作賦述古來儲二事戒太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜廄馬一匹綵物三百假七年太子監國詔杜正倫行左庶子兼崇賢館學士帝謂正倫吾兒幼未有就德我常物物戒之今當監國不得朝夕見故輟卿於朝以佐太子慎之朂之它日又言朕年十八猶在人間情僞無不嘗及即位處置有失必待諫乃釋然悟況太子生深宫不及知邪且人主不可自驕今若詔天下敢諫者死將無復發言矣故朕孜孜延進直言卿其以是曉太子冀裨益之擢中書侍郎封南陽縣侯仍兼太子左庶子出入兩宫典機密以辦治稱後太子稍失道帝語正倫太子數私小人卿可審喻之教而不從其語我來故正倫顯諫無所避太子不從輒道帝語督切太子即表聞帝責曰何漏泄我語對曰開示不入故以陛下語怖之冀當反善十年太宗謂侍臣曰太子保傅古難其選成王幼小以周召為保傅左右皆賢足以長仁致理太平稱為聖主及秦之胡亥始皇所愛趙髙作傅教以刑法及其篡也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠交逰惟柴紹竇誕等為人既非三益及朕居兹寶位經理天下雖不及堯舜之明庶免乎孫皓髙緯之暴以此而言復不由染何也魏徴曰中人可與為善可與為惡然上智之人自無所染陛下受命自天平定寇亂救萬民之命理致升平豈紹誕之徒能纍盛德但經云放鄭聲逺佞人近習之間尤宜深慎太宗曰善十三年太子右庶子張𤣥素以承乾頗以逰畋廢學上書諫曰臣聞皇天無親惟德是輔茍違天道人神共棄然三驅之禮非欲教殺將為百姓除害故湯羅一面天下歸仁今苑內娛獵雖名異遊畋若行之無恆終虧雅度且傳說曰學不師古匪說攸聞然則𢎞道在於學古學古必資師訓既奉恩詔令孔頴達侍講望數存顧問以補萬一仍博選有名行學士兼朝夕讀覽聖人之遺教察既行之往事日知其所不足月無忘其所不能此則盡善盡美夏啓周誦焉足言哉夫為人上者未有不求其善但以性不勝情耽惑成亂耽惑既甚忠言盡塞所以臣下茍順君道漸虧古人有言勿以小惡而不去小善而不為故知禍福之來皆起於漸殿下地居儲二當須廣樹嘉猷既有好畋之淫何以主斯匕鬯慎終如始猶恐漸衰始尚不慎終將安保承乾不納𤣥素又上書諫曰臣聞稱皇子入學而齒胄者欲令太子知君臣父子尊卑之序長幼之節用之方寸之內𢎞之四海之外者皆因行以逺聞假言以光被伏惟殿下睿質已隆尚須學文以飭其表竊見孔頴達趙𢎞智等非惟宿德鴻儒亦兼達政要望令數得侍講問釋物理覽古論今增輝睿德至如騎射畋逰酣歌妓玩茍悅耳目終穢心神漸染既久必移情性古人有言心為萬事主動而無節即亂恐殿下敗德之源在於此矣承乾覽書愈怒謂𤣥素曰庶子患風狂耶十四年太宗知𤣥素在東宫頗有進諫擢授銀青光祿大夫行太子左庶子時承乾嘗於宫中擊鼓聲聞於外𤣥素叩閣請見極言切諫乃出宫內鼓對𤣥素毁之遣戶奴伺𤣥素早朝隂以馬檛擊之殆至於死是時承乾好營造亭觀窮奢極侈費用日廣𤣥素上書諫曰臣以愚蔽竊位兩宫在臣有江海之潤於國無秋毫之益是用必竭愚誠思盡臣節者伏惟儲君之寄荷戴殊重如其積德不𢎞何以嗣守成業聖上以殿下親則父子事無家國所應用物不為節限恩旨未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下惟聚工匠望苑之內不覩賢良今言孝敬則闕侍膳問豎之禮語恭順則違君父慈訓之方求風聲則無學古好道之實觀舉措則有因緣誅戮之罪宫臣正士未嘗在側群邪淫巧日近深宫愛好者皆逰伎雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱密寧可勝計哉宣猷禁門不異闤闠朝入暮出惡聲漸逺右庶子趙𢎞智經明行修當今善士臣每請望數召進與之談論庶廣徽猷令旨反有嫌猜謂臣妄相推引從善如流尚恐不逮飾非拒諫必是招損古人云苦藥利病苦言利行伏望安居思危日慎一日書入承乾大怒遣刺客將加屠害俄屬宫廢十四年太子詹事于志寧以太子承乾廣造宫室奢侈過度耽好聲樂上書諫曰臣聞克儉節財實𢎞道之源崇侈恣情乃敗德之本是以陵雲槩日戎人於是致譏峻宇雕墻夏書以之作誡昔趙盾匡晉吕望師周或勸之以節用或諫之以厚斂莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聽咸著簡册用為美談且今所居東宫隋日營建覩之者尚譏甚侈見之者猶歎甚幸何庸於此中更有修造財帛日費土木不停役斤斧之工極磨礱之妙且丁匠官奴入內比者無復監此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿緣其身槌杵在其手千牛既自不見直長無由得知所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲昔朝歌之鄉回車者墨翟夾谷之會揮劍者孔丘先聖既以為非通賢將以為失頃間宫內往往取太樂伎兒入便不出聞之者股栗言之者心戰往年口敕伏請重尋聖旨殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宫闕已積歲時犬馬識恩木石知感臣所有管見敢不盡言但恱意取容臧孫方以疾疢犯顔逆耳春秋比之藥石伏願停工巧之作罷久役之人絶鄭衛之音棄群小之輩則三善允備萬國作貞矣承乾覽書不悅十五年承乾以務農之時召駕士等役不許分畨人懷怨苦又私引突厥群豎入宫志寧上書諫曰上天蓋髙日月光其德明君至聖輔佐贊其功是以周誦升儲見匡毛畢漢盈居震取資黃綺姬旦抗法於伯禽賈生諫爭於文帝咸殷勤於端士皆懇切於正人歷代賢君莫不丁寧於太子者良以地膺上嗣位處儲君善則率土沾其恩惡則海內罹其禍近聞僕寺習馭駕士獸醫始自春初迄兹夏晚恆居內役不放分畨或家有尊親闕於溫清或室有幼弱絶於撫養春既廢其耕墾夏又妨其播殖事乖存育恐致怨嗟儻聞天聽後悔何及又突厥哥友等咸是人面獸心近之有損於英聲昵之無益於盛德引之入閣人皆驚駭豈臣愚識獨用不安殿下必須上副至尊聖情下允黎元本望不可輕微惡而不避無容略小善而不為理敦杜漸之方須有防萌之術屏退不肖狎近賢良如此則善道日隆德音自逺承乾大怒遣刺客張師政紇干承基就舍殺之志寧是時丁母憂起復為詹事二人潜入其第見正寢處苫廬竟不忍而止及承乾敗太宗知其事深勉勞之貞觀中太子承乾數虧禮度侈縱日甚太子左庶子于志寧撰諫苑二十卷諷之是時太子右庶子孔頴達每犯顔進諫承乾乳母遂安夫人謂頴達曰太子長成何宜屢得面折對曰䝉國厚恩死無所恨諫爭愈切承乾令撰孝經義疏頴達又因文見意愈廣規諫之道太宗並嘉納之二人各賜帛五百匹黃金一斤以厲承乾之意歷代名臣奏議卷七十一
