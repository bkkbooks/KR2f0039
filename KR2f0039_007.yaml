body:
  text: 歴代名臣奏議巻七明楊士奇等撰聖學宋哲宗元祐二年平章軍國重事文彦博進尚書孝經觧奏曰臣伏以皇帝陛下間日御邇英閣令講官講尚書又閣之南壁張孝經圗出入觀覽有以見陛下祖述堯舜憲章文武以至徳要道孝治天下臣今輙於尚書諸篇中節録十篇及孝經諸章中節録六章進上以備禁中清閒之暇研究義味或時令講官節録䟽義進入上資聖徳稽古求治之意臣伏讀尚書序云孔子生於周末覩史籍之煩文懼覽之者不一遂乃討論墳典斷自唐虞以下訖于周舉其宏綱撮其機要典謨訓誥之文凡百篇所以恢宏至道示人主以軌範也帝王之制坦然明白以其上古之書謂之尚書然則後代聖帝明王莫不祖述寳為大訓恭以皇帝陛下聦明文思稽考古道日御邇英延訪經義方命講官講觧尚書孜孜不倦所以聖徳日新比隆堯舜臣以叨侍經筵輙於尚書三十二篇采其切於資益聖治宜於重複温故者凡十篇録進篇别有後序所以發明本篇之大㫖所冀便於乙夜之觀堯典堯之聖徳蕩蕩難名而此篇極簡要亦仲尼舉宏綱撮機要之理如篇之所載者克明俊徳以親九族平章百姓協和萬邦分命羲和典掌四時使民務農利用厚生允釐百工庶績咸熈斯皆後世聖帝明王所宜祖述而模範之臨文而三復之故摘其目以敘之舜典虞舜之徳重華協帝故列于二典後世作者雖三王之盛不可及矣篇之所載命禹作司空而下至於四岳十二牧官得其人庶績咸治流放共工驩兜竄三苖殛鯀四凶人而天下咸服故曰舜有大功二十兹所以重華協帝大禹謨禹稷臯陶共事舜帝君臣同寅咸有一徳故矢厥謨咸厥功曰俞曰都乃君唱臣和之美其謨則有后克艱厥后臣克艱厥臣罔遊于逸罔滛于樂任賢勿貳去邪勿疑罔咈百姓以從已欲斯皆上下交儆以成聖功舜禹之所以為聖帝明王以此臯陶謨臯陶曰允廸厥徳謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永禹拜昌言曰俞臯陶曰在知人在安民知人則哲能官人安民則惠黎民懐之臣以舜禹之時君臣謨議之協恭後王所宜為法益稷此篇所載禹戒舜曰慎乃在位帝曰俞然禹言受其戒禹曰安汝止惟㡬惟康帝曰吁臣哉鄰哉鄰哉臣哉禹曰帝庸作歌曰元首叢脞哉股肱惰哉萬事堕哉帝拜曰俞臣謂斯言可為深戒伊訓篇云嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠惟上帝不常作善降之百祥作不善降之百殃臣以尹之斯言愛其君忠於國可謂至矣有臣如此時君固當尊禮其人信受其訓洪範天地之大法其𩔖有九而敬用五事曰貌言視聽思兹乃人君尤當慎思之盖人君言動則左右史書之為法不可不慎也故臣以此篇五事為重無逸此篇周公以戒成王曰君子所其無逸先知稼穡之艱難文王不敢盤于遊田以庶邦惟正之供自今嗣王其無滛于觀于逸于遊于田故成王服其訓戒乃為令王至唐開元中作無逸圗置於禁中出入省覽以為龜鑑臣亦嘗録此篇為圗以進以助聖覽伏望曲留睿意立政周公告于成王曰王左右常伯常任準人自今立政其勿以憸人其惟吉士盖有天下國家所切者任人得賢則治非賢則亂周官王曰若昔大猷制治于未亂保邦于未危唐虞稽古建官惟百夏商官倍亦克用乂明王立政不惟其官惟其人又戒庶官欽乃攸司慎乃出令以公滅私民其允懐推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任成王稽古建官為治之本後之帝王所宜詳慎孝經圗臣以官忝師保得侍邇英伏覩閣中有仁祖命學士蔡襄所書孝經圗張於南壁以便觀覽有以見仁祖孝徳在躬推廣以及天下恭以皇帝陛下天資聖徳行在孝經嘗聞令講官備録經義進於禁中臣以伏望陛下日省而時思之彦博又進尚書二典儀劄子曰臣伏覩尚書序曰仲尼討論墳典斷自唐虞以下訖於周所以堯舜二典為書之首篇垂世立教示人主以軌範帝王之制坦然明白可舉而行堯舜二典並云曰若稽古帝堯帝舜以謂二帝並能順考古道而行之乃知人主之聖必由稽古恭惟皇帝陛下日御經筵集講官說尚書盖聦明文思稽考古道垂意於安天下之安天下之幸甚臣以衰殘忝位保傅得侍經閣為幸巳深又不自揆輙於二典之中采掇事義數條兼以訓傳或理有切近治體亦以愚短之議附之庶㡬粗有所補夫以齊之覇國而孟軻陳堯舜之道於齊王之前欲勉進之今臣遭堯舜之時陳堯舜之道固其宜矣臣愚不勝區區之誠謹録以上進堯典曰乃命羲和欽若昊天敬授人時分命羲仲宅隅夷曰暘谷平秩東作申命羲叔宅南交平秩南訛敬致分命和仲宅西曰昧谷平秩西成申命和叔宅朔方平在朔易臣按帝堯上以敬順天命下以恭授人時使此羲和氏之四人各居其方以布四時之令春序其農疇興作之功夏致其生物化育之事秋秩其百榖收成之宜冬察其一歳豐儉之實吏久於職官修其方民變時雍庶績咸治帝乃命舜歴試諸艱舜典曰欽哉欽哉惟刑之恤哉流共工于幽州放驩兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉帝曰棄黎民阻飢汝后稷播時百榖帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服帝曰疇若予工僉曰垂哉帝曰俞咨垂爾作共工帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞帝曰咨四岳有能典朕三禮僉曰伯夷帝曰咨伯汝作秩宗帝曰夔命汝典樂教胄子帝曰龍朕堲䜛說殄行震驚朕師汝作納言出納朕命惟允帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庶績咸熈臣按舜既紹堯熈帝之載以謂治天下者必先任人人有善惡必先審知故曰在知人在安民故曰知人則哲安民則惠黎民懐之茍不知人則賢愚善惡混淆不分盖善惡不可並用惡人道長則善人道消當須屏去姦惡可以登用善良故其始也先去四凶而天下服然後咨詢岳牧而用禹稷臯夔而下二十有二人天下大治又命龍作納言戒勅之曰朕堲䜛說殄行震驚朕師汝作納言夙夜出納朕命惟允䜛邪之人專在譛毁善良舜深疾之納言㗋舌之官出納王命必在忠信故舜受命而切戒之隋唐以来納言之名不改𨽻門下省至於本朝頗循唐制以侍中為門下省官長侍郎為貳並為執政官所選益重必協僉論又曰三載考績三考黜陟幽明古之任官必在於久久則有功可以考其績効故先朝之法省寺監官並以三年為任循古之美法也義當遵守如其藉才不次任用則難拘常制臣學術荒淺不足以發明但以狂言聖擇兾有少補彦博又進漢唐故事䟽曰臣近者竊聞聖㫖令講筵官間日進漢唐故事各一件以備御覽有以見聖徳稽古求理之切臣忝預經筵固當粗有裨補輙亦於漢唐史中節録得數事繕寫進呈伏望聖慈采覽漢文帝紀贊曰孝文皇帝宫室苑囿車騎服御無所増益有不便輙㢮以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為身衣弋綈弋黒色綈厚繒帷帳無文繡以示敦朴為天下先專務以徳化民是以海内豐富興於禮義斷獄數百㡬至刑措鳴呼仁哉漢武帝問東方朔曰吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歴數千載尚難言也臣不敢陳近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄師古曰革生皮也韋言儉率也以韋帶劒莞蒲為席師古曰莞今謂之葱蒲以莞蒲為席尚質也兵木為刃服䖍曰兵噐如木而無刃言不大治兵器也衣緼無丈師古曰緼亂如絮也言内有亂絮上無文采也集上書囊以為殿幃師古曰集謂令聚也以道徳為麗以仁義為準師古曰麗美也準平法也於是天下望風成俗昭然化也漢丞相王嘉上䟽言孝文帝時吏居官者或長子孫以官為倉氏庾氏則倉庾吏之後也其二千石長吏亦安官樂職然後上下無茍且之意其後稍稍變易公卿以下轉相促急又數以改更政事司𨽻部刺史察過悉劾發揚隂私悉盡也言大小盡皆舉劾過於所察之條吏或居數月而退送故迎新交錯道路中材茍容求全下材懐危内顧一切營私者多二千石益輕賤吏人慢易之或至上書章下依其所上之章而下令理之衆庶知其易危言易可傾危小失意則有離判之心漢宣帝謂太守吏民之本數變易則下不安民知其將乆不可欺罔乃從其教化故二千石有治效輙以璽書勉勵増秩賜金或爵至關内侯公卿缺則選諸所表以次用之師古曰所表謂増秩賜金爵也是故漢世良吏於是為盛稱中興焉臣近曽上言乞刺史縣令須滿三年一替及尚書吏戶刑三部郎官職務尤重須令乆任此皆治古之法兼先朝亦不令速遷漢賈誼云今民賣僮者如淳曰僮謂𨽻妾也為之繡衣絲履編諸縁服䖍曰如牙條以作履縁師古曰編諸若今之織成以為要襻及褾領者也古謂之車馬裠其上為乗車及騎從之象也内之閑中服䖍曰賣奴婢闌是古天子后服所以廟而不宴者也師古曰入廟則服之宴處則不著盖貴之也而庶人得以衣婢妾白縠之表薄紈之裏緁以編諸晋灼曰以編諸緁著衣也師古曰緁音妾謂以編諸緶音歩千反美者黼繡師古曰黼者織為斧形繡者刺為衆文是古天子之服今富人大賈嘉㑹召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后餙然而天下不屈者殆未有也師古曰屈謂財力盡也且帝之身自衣皁綈而富民牆屋被文繡天子之后以縁其領庶人㜸妾縁其履師古曰㜸謂庶賤者此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國巳屈矣盜賊直須時耳然而獻計者曰毋動師古曰言天下安不可動揺為大耳如淳曰好為大語者夫俗至大不敬也至亡等也師古曰無尊卑之等至冒上也師古曰冒犯也進計者猶曰毋為可為長太息者此也臣近曽上章以風俗僣侈乞檢舉制度使上下不僭侈務節儉盖富民之本在於節儉民富矣君孰與不足致太平之風無出此道雖聞巳有施行更望聖慈垂意唐太宗問褚遂良曰舜造漆器禹雕其俎當時諫舜禹者十餘人食器之間苦諫何也遂良對曰雕琢害農事纂組傷女工首創奢滛危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗以為然因言夫為人君不憂萬姓而事奢滛危亡之機可反掌而待也唐太宗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防巳過今魏徵殂逝遂亡一鏡矣唐史論魏徴與文皇討論政術往復應對凡數十萬言其救過弼違能近取譬其實根於道義發為律度身正而心勁上不負時主下不阿權倖中不私親族外不為朋黨不以逢時改節不以圗位賣忠所載章䟽四篇在徴本傳可為萬代王者法唐明皇先天元年大獵于渭川侍中魏知古獻詩一篇曰常聞夏太康五子訓禽荒我后来冬狩三驅盛禮張順時鷹隼撃講事武功揚奔走未及反飜飛豈暇翔非熊從渭水瑞翟想陳倉此欲誠難縱兹逰不可常子雲陳羽獵僖伯諫漁棠得失監齊楚仁恩念禹湯咸熈諒在宥亭毒匪多傷辛甲今為史虞箴遂孔彰明皇嘉之手制詔曰夫詩者志之所之以冩心懐實可諷諭人主是故揚雄陳羽獵馬卿賦上林爰自風雅率由兹道朕頃自温泉觀省風俗時因夏景掩渭而畋方開一面之羅或示三驅之禮躬親校獵聊以從禽卿遂有箴規正予不迨自非誠欵夙著孰能繼於此耶賜物五十段唐穆宗嘗謂侍臣曰國家貞觀中文皇帝躬行帝道治致昇平及神龍景龍之間繼有内難明皇平定而興復不易而聲名最盛歴年長乆何道而然宰相崔植對曰前代創業之君多起自人間知百姓疾苦初承丕業皆能厲精思理太宗文皇帝特禀上聖之姿同符堯舜之道是以貞觀一朝四海寜宴有房𤣥齡杜如晦魏徴王珪之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此明皇守文繼體嘗經天后朝艱危開元初得姚崇宋璟委之為政此二人者天生俊傑動必推公夙夜孜孜致君於道璟嘗手冩尚書無逸一篇為圗以獻明皇置之内殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圗朽壊始以山水圖代之自後既無座右箴規又信奸臣用事天寳之世稍倦於勤王道于斯缺矣建中初徳宗皇帝嘗問先臣祐甫開元天寳治亂之殊先臣具陳本末臣在童丱即聞其說信知古人以韋弦作戒其益宏多陛下既虚心履道亦望以無逸為元龜則天下幸甚穆宗善其對臣恭以仁宗皇帝聖徳勤儉因御前親試進士以無逸為元龜為賦題乃知聖意所存深逺盧懐慎景龍中上䟽其一曰臣聞孔子曰為邦百年可以勝殘去殺又曰茍有用我者朞月而已可三年有成尚書云三載考績校其功也昔子産相鄭更法令布刑書一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子産吾其與之三年而人又歌之曰我有子弟子産教之我有田疇子産植之子産而死誰其嗣之終有遺愛流芳史策子産賢者也其為政尚累年而化成況其常才乎臣竊見比来州牧上佐及兩畿縣令下車布政䍐終四考在任多者一二年少者三五月遽即遷除不論課最或有歴時未改便傾耳而聼企踵而望爭求冒進不顧亷耻亦何暇為陛下宣風布化求瘼恤人哉禮義未能興行風俗未能齊一戶口所以流散倉庫所以虚空百姓凋弊日更滋甚職為此也何則人知吏之不久則不從其教吏知遷之不遥又不盡其力偷安爵禄但養資望陛下雖勤勞之懐宵衣旰食然僥倖路啓上下相蒙共為茍且而巳寜盡至公乎此國之病也此賈誼所謂蹠盭之病乃小小者耳此弊久而不革臣恐為膏肓雖和緩不能療豈蹠盭而巳哉漢宣帝緫覈名實興理至化黄覇良二千石也就増秩賜金以旌其能而不遷於潁川前代之美又古之為吏長子孫倉氏庾氏即其後也書云事不師古以克永世匪說攸聞臣請諸州都督刺史上佐及兩畿縣令等在任未經四考以上許遷察其課効尤異者或錫以車裘或就加禄秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能其政績無聞及犯貪暴者免歸田里以明聖朝賞罰之信則萬方之人一變於道矣致此之美革彼之弊易於反掌陛下何惜而不行哉三年著作郎兼侍講范祖禹進經書要言奏曰臣近於邇英閣進講嘗指陳尚書要切之語望陛下因習筆札書之以置坐右臣退而伏思古之人君雖在閒燕之中出入起居必存儆戒左右前後動有箴䂓所以正心脩身自强於徳以舜之聖而益戒之曰罔失法度罔遊于逸罔滛于樂禹戒之曰無若丹朱傲湯有盤銘武王於席之四端為銘於几杖為銘於衣帶為銘於履屨為銘於觴豆為銘於戶牖為銘舜湯武王其自修如此而況於後世之君乎今陛下纂承累聖日勤問學若於翰墨之際不出聖人之經略舉要言以為明鑒置之左右朝夕觀省與夫舜禹之戒湯武之銘其揆一也臣職在勸講無補毫分茍有愚見不敢不盡謹節略尚書論語孝經要切之語訓戒之言得二百一十九事以備聖札所兾陛下手書之目視之心存之庶可以少助進徳之萬一臣不勝拳拳之愚干冒宸嚴臣無任惶懼之至祖禹又進古文孝經說奏曰臣伏覩國史章獻明肅太后嘗命侍讀宋綬擇前代文字可以資孝養補政治者以備仁宗觀覽臣職勸講雖不足以跂望前人髣髴然區區忠益敢不盡愚竊以聖人之行莫先於孝書先於孝經有古文有今文今文即唐明皇所注十八章古文凡二十二章由漢以来唯孔安國馬融為之傳自餘諸儒多疑之故學者䍐習仁宗朝司馬光在館閣為古文指觧一巻表上之臣竊考二書雖不同者無㡬然古文實得其正故嘗妄以所見又為之說非敢好異尚同庶因聖言少關省覽伏惟陛下方以孝治天下此乃羣經之首萬行之宗儻㽞聖心則天下幸甚其古文孝經說謹繕冩為一冊上進干冒宸嚴臣無任惶懼之至祖禹又進勸學䟽曰臣不侍經席已踰兩月陛下深居閒燕聖學日勤然臣等無由罄竭愚短補助萬一昔唐憲宗不對學士兩月李絳奏曰為臣等竊禄偷安之計則便矣其如陛下何今臣之愚竊欲陛下以學為急故敢略陳一二惟陛下㽞聽臣聞孔子曰學如不及猶恐失之揚雄曰學之為王者事其巳乆矣堯舜禹湯文武汲汲仲尼皇皇其巳乆矣夫學者所以學治天下王者之事也故自堯舜禹湯文武之君皆汲汲於學仲尼雖聖亦皇皇有所不暇此聖人所以不可及也後世繼體守文之君生而驕逸不能務學忘其祖宗之艱難累世之勤勞徒見天下無事以為禍亂無從而生或荒耽于酒或盤于遊畋或窮奢極侈或輕用民力諂諛日親忠正日踈人心離貳遂亡其國其所行之迹後世視以為戒自古以来治日常少亂日常多推原其本由人君不學故也天下治亂皆繋於人君之心君心正則朝廷萬事無不正故天地順而嘉應降隂陽和而風雨時古者三公太師太傅太保論道經邦燮理隂陽無他術焉惟正君心而已保保其身體傅傅其徳義師道之教訓皆所以正君心也如欲心正未有不由稽古好學而能致也臣竊考之前世揆之當今恭惟本朝累聖相承百有餘年四方無虞中外底寜動植之𩔖蒙被涵養徳澤深厚逺過前世皆由以道徳仁義文治天下人主無不好學故也太祖皇帝以神武定四方創業垂統日不暇給然而晚年尤好讀書嘗曰宰相須用讀書人陛下試思太祖此言宰相既用讀書人則自餘執政侍從之臣䑓諫之職必皆文學之士然後可用外至州縣亦必由進士出身乃可委以親民刑獄之任是朝廷之士皆不可以無學也然則天子豈可以獨不知學乎太宗嘗謂近臣曰人君當澹然無欲形見於外則姦佞無自而入朕年老無他欲但喜讀書用鑒古今成敗耳真宗之時益修太宗之業仁宗在位四十二年問學未嘗少廢今邇英講讀乃仁祖之成規也英宗神宗皆遵守仁宗之法稽古好學陛下所知不幸先帝早棄四海累聖巳成之業任大守重傳付陛下陛下嗣位于今四年幸賴太皇太后以至仁盛徳母臨天下陛下垂拱無為海内晏然當今之務莫如學問之為急也陛下今日學與不學繋天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子皆欣慕願立於朝以直道事陛下輔助徳業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴而專權利矣君子專於為義小人專於為利君子之得位欲行其所學也小人之得位將濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人進學莫不在於年少之時陛下聖質日長龍徳進升數年之後雖欲勤於學問恐不得如今日之專也臣竊為陛下惜此日月願以學為急則天下幸甚論語記聖人言行之要修身治國之道無不在焉尚書言帝王政事人君之規範也論語雖已講畢望陛下更加詳熟尚書未講者亦望陛下先熟其文臣等以次講觧及之則陛下聖意巳先有得矣臣不勝拳拳之愚祖禹又乞置無逸孝經圖奏曰臣竊以無逸者周公之至戒孝經者孔子之大訓陛下嗣守祖宗鴻業方以孝治天下二書所宜朝夕觀省以益聖徳昔仁宗皇帝初建邇英閣即書無逸於屏間其後歳久而弊又命知制誥蔡襄書之仁宗曰朕不欲背聖人之言乃置之左方又諭侍讀學士丁度取孝經之天子孝治聖治廣要道四章對為右圖命侍讀學士王洙書之又命學士承㫖王拱辰為二圖序亦令襄書之仁宗尊崇經訓如此陛下宜以為法今邇英閣止書圖序于屏間而無逸孝經二圗不復張列臣欲乞指揮所司檢尋如舊圖尚在乞置之左右如巳不存則乞特命侍臣善書者書之其蔡襄所書圖序從来置在御坐之後昨因脩展邇英閣方徹去却書于屏間此圗乃祖宗舊物臣竊惜之伏乞依舊張掛三圗並列如仁宗朝故事以彰陛下欽明稽古仰遵先烈之意祖禹又進尚書說命講義奏曰臣等近進講尚書說命竊以為君治天下國家欽天稽古修身務學任賢立政至言要道備在此書誠能法之可為堯舜昔太宗皇帝嘗曰尚書王言治世之道說命最備特詔孫奭講此三篇伏望陛下詳覽深思必有啓廸聖學之益臣等雖罄竭謏聞講觧于前謹輙記録所言編冩成冊以備尋繹或賜顧問庶㡬少助聦明之萬一其說命講義三冊謹具上進五年祖禹為右誎議大夫又乞常觀圗史上奏曰臣伏見仁宗皇帝慶歴元年七月出御製觀文覽古圖記以示輔臣皇祐元年十一月御崇政召近臣三館䑓諫官及宗室觀三朝訓鑒圖臣竊以古之帝王常觀圖史以自戒仁宗皇帝講學之外為圖鑒古不忘箴儆以養聖心又圖寫三朝事迹欲子孫知祖宗之功烈如目覩之二圖皆常頒賜臣僚禁中必有本臣願陛下以永日觀書之暇間覽此圖可以見前代帝王美惡之迹知祖宗創業之艱難不唯有所戒勸易於記省亦好學不倦之一端也元祐四年中書舍人彭汝礪上奏曰臣聞昔者周成王即位始謀於廟其言憂深思逺慄慄悼懼若方隕淵墜谷所以求其臣甚至而羣臣進戒乃反覆曲折獨以學問為先務其詩曰念兹皇祖陟降庭止於乎悠哉朕未有艾又詩曰維予小子不聦敬止學有緝熈于光明佛時仔肩示我顯徳行其君臣可謂知本矣是時周公畢公召公史佚實在左右前後伯禽唐叔實相與周旋而猶有管蔡之禍周之不亡者以此唐太宗取名儒為學士者十八人如房𤣥齡杜如晦之𩔖是也畨宿迭侍相與討論古今考前王之成敗雖閒燕飲食皆與於是在下之情無不達在上之失無不得二君卒為周唐賢君古今事不同體當使内外左右朝夕所以輔拂之者咸備其要則在擇人茍非其人猶不如不為之愈也汝礪又奏曰臣聞治亂之㡬在於好惡好惡之端在於謹其始其始正無所為而不為正其始不正雖有智力不能善其後是以人主必務學學莫大於近正人陛下盛徳至行得於天者甚厚見於行事者甚善此非臣下所能窺度深淺也近侍進讀儒臣勸講見聞可謂甚博耆艾在前忠良在後其輔翼可謂甚衆夫學者非徒出於口耳之謂也聞乎其言將見於其行得乎其心將見乎其外今臣下所誦說陛下能昭然不疑乎能沛然有所得乎使誠無疑也使誠有得也固甚善若猶未也是為名而已是為觀美而巳今延英之對邇英之講隔於内外見有不得而乆限於上下言有不得而盡雖太皇仁聖所以擁䕶啓佑者甚至然天性之愛不可以責善久矣然則陛下退而與處者其誰歟其使令者其誰乎其婦人乎輔拂之人寡順從之人衆學問之日少安閒之日多善或莫之告過或莫之諫臣甚懼所以輔成聖徳者或未備也記曰三王四代惟其師詩曰自天子至於庶人未有不須友以成者然則師友不可無乆矣然則如之何曰尊有道者擇有徳者不使柔邪權譎之士間廁於其間閒宴與俱言動使相接焉簡上下之分勢盡君臣之底裏問以所疑而無隠質之所欲而無間有善焉使必告告焉而必從有過焉使必諫諫焉而必改如是而不堯舜如者未之有也惟陛下㽞意無忽汝礪又論人主盡道在修身修身在正學奏曰臣聞之孟子曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而巳堯舜之治至矣上達日月星辰旁施草木蟲魚幽格鬼神外薄四海逺及于萬世其原則修身而巳書曰克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍其本末施設次序可謂彰明較著而自漢迄唐千數百年有為者衆而終不能窺其髣髴非聖人所為終不可及盖後世為之不至而巳以區區千里之齊其君盖不過中人孟子之為臣非其道不陳於前故其言曰不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孟子欺乎哉修身無他在乎學而巳大學之道始於誠意正心終於治天下盖古人以天下為不可勝治故所治者一國而巳以一國為不可勝治故所治者一家而已以一家為不可勝治故所治者一身而巳又以一身為不可勝治故所治者一心而巳心正故身正身正故無所不正此其守甚約而其施甚博其源甚近而其流甚逺其事甚難而其理甚易然心至微者也至危者也古人譬之槃水焉正錯勿動湛濁在下而清明在上則足以見須眉而察理矣微風過之湛濁動乎下清明亂乎上則不足以得夫形之正也心亦如是矣至虚而能受至神而甚察茍有蔽之則有不能别黒白矣蔽欺之言入則是非有不得其正私比之言入則喜怒有不得其正功利之言入則取與有不得其正便佞之言入則好惡有不得其正此學之大戒也恭惟陛下聖學所得固自㧞於世俗之表惟加之意而已敷求碩徳以侑勸講容納正言以聞過闕思之至于謹辨之至于明問之至于博積之以漸要之以乆持之以不倦行之至于不巳其本正矣事至而不惑物来而能名回環而觀惟陛下所欲為而巳二帝三王之盛盖不跂而至也詩云俾爾彌爾性似先公酋矣性人所有也盖有不能充而成之者又曰學有緝熈于光明光明性所有也緝之熈之在學而巳書曰學于古訓乃有獲盖學莫如師古又曰念終始典于學言學之不可一日巳也臣愚亡識惟陛下幸察右誎議大夫朱光庭乞召講官詢訪以進聖學奏曰臣聞孔子曰吾十有五而志于學周頌曰日就月將學有緝熈于光明由此言之聖人未有不學而至于道也恭惟皇帝陛下生知之性天縱之聖聦明睿智與日増新然而正當孔子志學之年成王緝熈之旦彊勉學問則可以大就堯舜之徳矣臣愚乞陛下每五日一次退朝之後清閒之燕召講官于便殿親發聖問詢訪人君之所先務古今之治亂可以為法可以為戒者三五事同召執政大臣坐而論道自来年正月為始如此則聖學日進君道日隆堯舜之徳不難至矣伏望太皇太后陛下日勸皇帝陛下專心聖道以致盛徳五年御史中丞梁燾論進學之時不可失上奏曰臣聞自天子至於庶人皆以修身為本本亂而末治者未之有也故曰身修而家齊家齊而國治國治而天下平古之聖人未有不以修身而為本者也書之稱堯曰克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍克明俊徳者自明其徳脩身之謂也九族既睦者家齊之謂也百姓昭明者國治之謂也協和萬邦黎民於變時雍者天下和平之謂也其始則正心誠意而不出方寸之間其終則徳業滂洋而遍滿天下是聖人之道所持者約而所致者廣也有天下者能知盡心致力於此而後可以奉天享國矣夫明徳者孰先而能焉必曰學而巳矣禮曰大學之道在明明徳謂人君有清明之徳必由學以發之然後能光被四表格于上下以此知雖天子之尊而能成聖者其必由學乎說命曰王人求多聞時惟建事學于古訓乃有獲盖事不稽古從政則迷是君人者不可以無學也又曰惟學遜志務時敏厥修乃来允懐于兹道積于厥躬盖學之在身非一日而致由積善以成之是學之時不可以失也恭惟皇帝陛下受天明命早有萬國日就月將學以成聖此其時也願擇吉日詔開經筵優接勸講進讀之臣使從容反復治亂之事究先王之藴辨歴代之蹟無惜聖問再三詢考使聖心曉然無疑日新一日可底大成願加聖意無忽臣又願陛下萬機之暇㽞思經筵講讀群臣所論之事以考政事之從違得失以裨皇帝陛下之聦明屏逺聲色造次不忘古訓博厚髙明與天地並徳臣不勝拳拳懇切之至燾又上宣仁皇后劄子曰臣恭惟陛下以大公至正之心保䕶皇帝周宻嚴謹委曲纎悉起居寢食之間無不㽞神而注意如天地久於其道無一日之或怠也誠有大功於宗社有大徳於天下矣陛下鍾愛皇帝如此其至然而特為其愛之小者非所謂大愛也所謂大愛者在成其聖徳爾成聖徳者其必由學也仰惟陛下之聦明非不知其大愛之以成徳而獨以為皇帝冲眇而未暇學乎今皇帝聖年十五齒亦已長矣自古人君逺則十五而冠冠者謂有成人之道在庶人則為童子在天子則為成人何也謂王教之本不可以童子之道理焉故必責善而進之以成人是以古之學者十五入大學謂七八之數隂陽備而志明可以學矣志巳明則當識其至善而逺其所不善故孔子曰吾十有五而志於學皇帝清明在躬天禀英異以聖人志學之時稽焉則不可以不學也以天子成人之道望焉則不可以多暇也伏願陛下當天春布徳之元王正授政之始面勉皇帝早開經筵召見儒臣談經讀史從容賜對熟復古今宫中遴選茂俊之人以誘掖講說審擇謹厚之人以輔視興寢服勤道義為聦明睿知之徳踈逺紛華為康寜壽考之資習之既久乃如自然至若誠意喜書正心樂道終副海内聖神之望不貽宸衷宵旰之憂協成靜治為太平之真主焉然則陛下他日退託深宫還辟自處保䕶之慈有始有卒佑我大宋萬世無疆之休而功徳於此足矣誠清衷素所屬念者臣敢妄論以發之亦惟陛下亟行而無疑非獨臣之願乃天下之願非獨臣之幸乃天下之幸臣不勝惓惓八年五月七日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾同呂希哲吴安詩豐稷趙彦若范祖禹顧臨等奏曰臣等猥以空踈備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若巳經效於世間不必皆從於已出伏見唐宰相陸贄才本王佐學為帝師論深切於事情言不離於道徳智如子房而文則過辨如賈誼而術不踈上以革君心之非下以通天下之志但其不幸仕不遇時徳宗以苛刻為能而贄諫之以忠厚徳宗以猜疑為術而贄勸之以推誠徳宗好用兵而贄以消兵為先徳宗好聚財而贄以散財為急至於用人聽言之法治邊馭將之方罪巳以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使徳宗盡用其言則貞觀可得而復臣等每退自西閣即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄面反復熟讀如與贄言必能發聖性之髙明成治功於歳月臣等不勝區區之意知河中府范百禄論黄帝堯舜飬生禔身之道上奏曰臣伏以陛下留心大學之道日就月將淵源精微積善成聖以至於髙明光大無所不通此乃宗廟社稷之休天地元元之福而太皇太后豐功盛徳也臣千載之遇實與四方生靈同兹慶幸然臣區區管窺猶願有所獻焉者誠以為聖主之學詩書禮樂之大道徳仁義之實與夫一祖五宗之典法謨訓英謀睿烈既日陳於前而飫聞於上然猶有不可一日而離者盖又有黄帝堯舜之道存焉人主欲尊其慕尚必行三聖人之道儻未知師三聖人之所以養生禔身以永保天下生民之福以長固國家無窮之休則何以致行三聖人之遺心餘積也哉凡三聖人所以養生禔身之要布在方冊詩書周易傳記百家燦然備載皆可參考臣願詔經筵講讀官討論採掇自古黄帝堯舜以来帝王養生禔身可法之言可行之事於䨇日所進故實内時以一二上資聖覽或意義有所未顯亦宜雍容敷繹以聞願陛下觀其所以致福夀康寜之術取法而行之覽其反此而致不善者規警而戒之孔子曰少之時血氣未定戒之在色易頤之象曰君子以謹言語莭飲食言語猶莭而況其餘乎臣戇愚匹夫之慮不足以為陛下至計方出守外郡逺去闕庭臣子之心不勝悃愊伏惟㽞神省察紹聖元年曾肇乞選端良博古之士以參諷議奏曰臣聞玉雖美追琢然後成珪璋金雖堅砥礪然後成利噐人主雖有自然之聖質必賴左右前後磨礱漸染所聞正言所見正行然後徳性内充道化外行以之知人則無不明以之舉事則無不當故周公之戒成王自常伯常任至於虎賁綴衣趣馬小尹左右攜僕百司庶府必皆得人以為立政之本穆王之命伯冏亦曰命汝正于羣僕侍御之臣懋乃后徳交修不逮遴簡乃僚無以巧言令色便僻側媚其惟吉士下至西漢猶詔郡國歳貢吏民之賢者以給宿衛則虎賁之任也出入起居執器物備顧問皆用士人如孔安國之掌唾壺嚴助朱買臣之專應對則左右攜僕之任也雖用人有媿于古亦一時之盛矣其後唐太宗平定四方有志治道則引虞世南等聚於禁中號十八學士退朝之暇從容宴見或論往古成敗或問民間事情每言及稼穡艱難則務遵勤儉言及閭閻疾苦則議息征徭以至諷誦詩書講求典禮咨詢忘倦或至夜分若夫軍國㡬微時務得失則責之輔相悉不相干其上下相與之際如此是以後世言治獨稱貞觀惜其一時之士不以堯舜三代之道啓廸其君故其成就止此夫以貞觀之治猶須招集賢能朝夕親近然後成功又況有志於其大者乎伏惟皇帝陛下聦明慈惠有君人之徳沉靜淵黙有天下之度方且躬親聽斷勵精為治其志大矣臣謂宜於此時遴選忠信端良博古多聞之士置諸左右前後以參諷議以備顧問陛下聽政之餘引之便坐講論經術諮詢治道不必限其日時煩其禮貌接以誠意假以温顔庶使人得盡情理無不燭於此增益聖學裨補聦明漸染磨礱日累月積循習既久化與心成自然於道不勉而中於事不思而得非僻之習異端之言無自而入矣如是而施之任人則邪佞者逺忠直者伸以之立事則言而為天下則動而為天下法其於盛徳豈曰小補之哉與夫深處法宫之中親近執御之徒其損益相去萬萬唯陛下㽞意毋忽哲宗時起居舍人王巖叟因侍講奏曰陛下退朝無事不知何以消日哲宗曰看文字對曰陛下以讀書為樂天下幸甚聖賢之學非造次可成須在積累積累之要在專與勤屏絕他好始可謂之專乆而不倦始可謂之勤願陛下特㽞聖意侍讀蘇頌請詔儒臣討論唐朝故事奏曰臣聞前事不忘後事之師也在昔聖帝明王莫不以稽考古道為有國之先務故能享御永世垂無疆之休然往古所行或文或質施之今日各有所宜臣竊觀國朝號令風采超邁百王原其典章文物刑名法制大抵沿襲唐舊其間或有損益亦不相逺然唐之事迹紛綸無統史官所記善惡咸俻善者可以為規彠惡者可以為商鑒往在慶歴之初仁宗皇帝因臣僚上言請㽞意近代典故遂詔儒臣檢討唐朝故事日進五條曾未朞歳省閱迨遍嘗聞徳音宣諭近輔以為有助聽斷臣伏見陛下祗紹先烈勤勞萬幾治理之間多用仁宗故事外則邇英講讀經史内則臣僚進獻封事古今得失之迹忠賢治安之策固以溢黈聦而積淵慮矣而臣愚管之見猶有所陳者誠見陛下稽古奉先之心孶孳不怠故敢復僭越而盡言也臣聞之荀卿之言曰道不過三代道過三代謂之蕩言其逺而難信也本朝去唐正同三代其事近而易考所宜宸扆之留聽也臣欲望聖慈特舉慶厯故事詔史官學士采録新舊唐書中列帝所行之事與夫羣臣獻替之言毎日上奏數事清燕之間特賜覽觀所冀螢燭末光増輝日月臣不勝惓惓之願李薦上論曰臣聞効一官可謂卑矣古之人必曰學而優則仕治一邑可謂微矣古之人必曰君子學道則愛人子使漆雕開仕曰吾斯之未能信盖以學之弗優不敢効官尹何為邑子産以為未聞政學盖以學而後從政乃可治邑彼子路使子羔宰費孔子以為賊夫人之子子路復曰有人民社稷焉何必讀書然後為學孔子惡其佞夫効官治邑必由學而後可況奄有四海為天下君乎一日二日萬機何以俾有條而不紊萬邦有衆何以俾樂推而不厭一言其㡬興䘮繋之好惡所示靡然成俗如之何俾百工熈哉庶事康哉鳴呼為君實難可不學歟乾之九二曰學以聚之問以辨之寛以居之仁以行之君徳也古之聖君任賢所以能不貳去邪所以能不疑作福所以能賞善作威所以能罰惡盖以聖人之道折衷之斷然晳矣所以能折衷聖人之道者由其中有學問以為之主也髙宗既舊學於甘盤復師資於傅說觀其好學之誠意則曰爾交修予罔予棄予惟克邁乃訓可謂勤矣此所以為商之髙宗成王席文王之大謨繼武王之大烈觀其好學之誠意則曰日就月將學有緝熈于光明佛時仔肩示我顯徳行可謂勤矣此所以為周之成王於皇有宋本支百世世有哲王故天縱陛下之聖徳温文日就天誘陛下之宸衷睿智夙成仁愛孝恭出於天性是皆生知天毓受道之質矣重念承平累聖之業御兹九有之師欲致乎治必先乎學學也者致治之道也古之聖賢不可得而見矣其言具載方冊要之皆王者事爾人臣學之期以致君人君學之自致其治故天地之情隂陽之理吉凶之變失得之故備在乎易而卦者時也一治一亂或美或惡初不可齊亂可使治惡可使美察理之變為時之主惟君乃能之臣願陛下學易則體乾御坤進陽退隂觀道設教運神合徳使天下之時常為泰而無至于否常為晉而無至于剝天子之學易固當如此一國之事繋諸侯之本天下之事形四方之風美盛徳告成功者皆在於詩四詩之名各辨其實不敢誣也臣願學詩則為政之大而無入於小雅為政以正而無淪於變雅無若東周降於國風必使功徳終美於頌天子之學詩固當如此夫尊王正法謹始善終詳天地之烖祥著君臣之美惡者無尚於春秋臣願陛下學春秋則師治而戒亂賞善而罰罪常為知孔子者無為罪孔子者夫堯舜禹湯文武成康之世其典謨訓誥誓命之文百王之心迹治亂之大畧者無尚于書臣願陛下學書則考稽古之得失操制今之法令皇歩帝驟王馳覇騖一皆得之陛下欲以正六職以治六官必也學夫周禮然後百工允釐庶績咸熈巍巍乎其有成功矣陛下欲以正其威儀詳其辭令必也學夫儀禮然後五禮之合制見於典章文物之間六儀之中節見於動容周旋之際焕乎其有文章矣陛下又當發揮孔孟之正道鋤薙百家之邪說在亹亹而巳乾之象曰天行徤君子以自强不息詩曰勉勉我王綱紀四方惟陛下不倦以終之則日進無疆聖益聖矣天下幸甚伏惟陛下有聖人之材而居聖人之位能進聖人之學以充聖人之道則功利天地澤及萬世可侔徳商宗周成矣雖然陛下有好學之誠而無進學之說陛下有望道之意而無明道之人則或博而寡要勞而無功故陪卿之列賔師之選不可不慎臣願不可與迂儒共學迂儒好為太髙不經之論將使陛下畏道之難行或自畫矣不可與佞儒共學佞儒好為茍合過情之譽將使陛下志滿假而輕道術或自聖矣願陛下妙選忠義正直博學守道之士以備顧問則用力少而見功多適道正而為利博天下幸甚歴代名臣奏議巻七
