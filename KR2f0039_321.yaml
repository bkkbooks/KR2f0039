body:
  text: 厯代名臣奏議卷三百二十一明楊士竒等撰禦邊後魏宣武帝正始間議選邊戍事豫州中正袁翻議曰臣聞兩漢警於西北魏晉備在東南是以鎮邊守塞必寄威重伐叛柔服實賴溫良故田叔魏尚聲高於沙漠當陽巨平績流於江漢紀籍用為美談今古以為盛德自皇上以睿眀纂御風凝化逺威厲秋霜惠霑春露故能使淮海輸誠華陽即序連城請面比屋歸仁懸車劒閣豈伊曩載鼓譟金陵復在兹日然荆揚之牧宜盡一時名望梁益之君尤須當今秀異自比緣邊州郡官至便銓疆場統戎階當即用或值穢德凡人或遇貪家惡子不識字民溫恤之方唯知重役殘忍之法廣開戍邏多置帥領或用其左右姻親或受人貨財請囑皆無防寇禦賊之心唯有通商聚斂之意其勇力之兵驅令抄掠若值彊敵即為奴虜如有執獲奪為已富其羸弱老小之輩微解金鐵之工少間草木之作無不搜營窮壘苦役百端自餘或伐木深山或耘草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬厯夏加之疾苦死於溝瀆者常十七八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乘擾故驅率部落屢犯疆埸頃年已來甲胄生蟣十萬在郊千金日費為弊之深一至於此皆由邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本既失之在始庸可止乎愚謂自今以後荆揚徐豫梁益諸藩及所統郡縣府佐統軍至于戍主皆令朝臣王公已下各舉所知必選其才不拘階級若能統御有方清高獨著威足臨戍信能懷逺撫循將士得其欣心不營私潤專修公利者則就加爵賞使久於其任以時褒賚厲其忠欵所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪婪日富經略無聞人不見德兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罰其僞薄如此則舉人不得挾其私受任不得孤其舉善惡既審沮勸亦明庶邊患永消譏議攸息矣宣武帝時蠕蠕入寇詔侍中源懷征之懷至雲中蠕蠕亡遁懷旋至恆代案視諸鎮左右要害之地可以築城置戍之處皆量其髙下揣其厚薄及儲糧積仗之宜犬牙相救之勢凡表五十八條表曰蠕蠕不羈自古而爾射獵為業水草為家中國患者皆斯類耳厯代驅逐莫之能制雖北拓榆中逺臨瀚海而智臣勇將力算俱竭邊人頗遁中國以疲于時賢哲思造化之至理推生民之習業量夫中夏粒食邑居之民蠶衣儒步之士邊外荒忽無常之類雲屯烏合之徒親校短長因宜防制知城郭之固暫勞永逸自皇魏統極都於平城威震天下德籠宇宙今定鼎成周去北遙逺代表諸蕃北固髙車外叛尋遭旱儉戎馬甲兵十分闕八去嵗復鎮陰山庶事蕩盡遣尚書郎中韓貞宋世量等檢行要險防遏形便謂準舊鎮東西相望今形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討如此則威形增廣兵勢亦盛且北方沙漠夏乏水草時有小泉不濟大衆脫有非意要待秋冬因雲而動若至冬日氷沙凝厲逰騎之寇終不敢攻城亦不敢越城南出如此北方無憂矣帝從之孝明帝神龜末袁翻遷冠軍將軍涼州刺史蠕蠕主阿那瓌後主婆羅門並以國亂來降朝廷問翻安置之所翻表曰臣以非才忝荷邊任猥垂訪逮安置蠕蠕主阿那瓌婆羅門等處所逺近利害之宜竊惟丐奴為患其來久矣雖隆周盛漢莫能障服衰弱則降富彊則叛是以方叔召虎不遑自息衛青去病勤亦勞止或修文德以來之或興干戈以伐之而一得一失利害相侔故呼韓來朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆埸自卜惟洛食定鼎伊瀍髙車蠕蠕迭相吞噬始則蠕蠕衰微髙車彊盛蠕蠕則自救靡暇高車則僻逺西北及蠕蠕復振反破髙車主喪民離不絶如線而高車今能終雪其耻復摧蠕蠕者正由種類繁多不可頓滅故也然鬭此兩敵即卞莊之算得使境上無塵數十年中者抑此之由也今蠕蠕為高車所討滅外慿大國之威靈兩主投身一朞而至百姓歸誠萬里相屬進希朝廷哀矜剋復宗社退望庇身有道保其妻兒雖乃逺夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絶列聖同規撫降恤附綿經共軌若棄而不受則虧我大德若納而禮待則損我資儲來者既多全徙內地非直其情不願迎送艱難而異俗難同殷鑒無逺覆車在於劉石毁轍固不可尋且蠕蠕尚存則高車猶有內顧之憂未暇窺窬上國若蠕蠕全滅則髙車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨實繁部落猶衆處處棊布以望令主耳高車亦未能一時并兼盡令率附又髙車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦强敵唯涼州敦煌而已涼州土廣民稀糧仗素闕燉煌酒泉空虛尤甚若蠕蠕無復堅立令高車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主皆宜存之居阿那瓌於東偏處婆羅門於西裔分其降民各有攸屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今去酒泉直北張掖西北千二百里去高車所住金山一千餘里正是北人往來之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戍鎮防西北宜遣一良將加以配衣糧仍令監護婆羅門凡諸州鎮應徙之兵隨宜割配且田且戍雖外為置蠕蠕之舉內實防高車之策一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外蕃高車勍敵西北之虞可無過慮如其姦回返覆孤恩背德者此不過為逋逃之寇於我何損今不早圖戎心一啓脫先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州敦煌及於西海躬行山谷要害之所親閲亭障逺近之宜商量士馬校練糧仗部分見定處置得所入春西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度微似小損嵗終大計其利實多髙車叵測之心何足以信假令稱臣致欵正可外加優納而復內􅊀彌深所謂先人有奪人之心者也時朝議是之孝明帝時尚書左僕射拓跋暉上疏曰安人寧邊觀時而動頃來邊將亡逺大之略貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為鋭於姦利之所致也平吳之計自有良圖不在於一城一戍也又河北數州國之基本飢荒多年戶口流散方今境上兵復徵發即如此日何易舉動愚謂數年以來唯宜靜邊以息占役安人勸農惠此中夏請嚴敕邊將自今有賊戍求內附者不聽輒遣援接皆須表聞違者雖有功請以違詔書論隋文帝以隴西頻被寇掠甚患之彼俗不設村塢敕大將軍賀婁子幹勒民為堡營田積榖以􅊀不虞子幹上書曰比者凶寇侵擾蕩滅之期匪朝伊夕伏願聖慮勿以為懷今臣在此觀機而作不得準詔行事且隴西河右土曠民稀邉境未寧不可廣為田種比先屯田之所獲少費多虛役人功卒逢踐暴屯田疏逺者請皆廢省但隴右之民以畜牧為事若更屯聚彌不獲安只可嚴謹斥候豈容集人聚畜請要路之所加其防守但使鎮戍連接烽候相望民雖散居必謂無慮帝從之唐高宗永淳中突厥圍豐州都督崔智辨戰死朝廷議棄豐保靈夏朔州長史唐休璟以為不可上疏曰豐州控河遏寇號為襟帶自秦漢以來常郡縣之土田良美宜耕牧隋季喪亂不能堅守乃遷就寧慶戎人得以乘利而交侵始以靈夏為邊唐初募人以實之西北一隅得以完固今而廢之則河傍地復為敵有而靈夏亦不足自安非國家利也高宗從其言武后永昌中詔右鷹揚衛將軍王孝傑為武威道行軍總管率西州都督唐休璟左武衛大將軍阿史那忠節擊吐蕃大破其衆復取四鎮更置安西都護府於龜兹以兵鎮守議者請廢四鎮勿有也右史崔融獻議曰戎人為中國患尚矣五帝三王所不臣漢以百萬衆困平城其後武帝赫然發憤甘心四裔張騫始通西域列四郡据玉關斷丐奴右臂稍稍度河湟築令居以絶南羌於是障候亭燧出長城數千里傾府庫殫士馬行人使者嵗月不絶至作皮幣算緡法稅舟車𣙜酒酤夫豈不懷為長久計然丐奴於是孤特逺竄遂開西域置使者領護光武中興皆復內屬至於延光三絶三通太宗文皇帝踐漢舊跡並南山抵葱嶺剖裂府鎮烟火相望吐蕃不敢內侮髙宗時有司無狀棄四鎮不能有而吐蕃遂張入焉耆之西長鼓右驅踰高昌厯車師鈔常樂絶莫賀延磧以臨燉煌今孝傑一舉而取四鎮還先帝舊封若又棄之是自毁成功而破完策也夫四鎮無守敵兵必臨西域西域震則威憺南羌南羌連衡河西必危且莫賀延磧袤二千里無水草若北接虜唐兵不可度而北則伊西北廷安西諸蕃悉亡議乃格永昌中嵗以兵五百戍姚州地險瘴到屯即死蜀州刺史張柬之論其弊曰姚州古者哀牢之舊國絶域荒外山髙水深自生人以來洎於後代不與中國交通前漢唐䝉開夜郎滇笮而哀牢不附至光武季年始請內屬漢置永昌郡以統理之乃收其鹽布氊罽之稅以利中土其國西通大秦南通交址竒珍異寶進貢嵗時不闕劉備據有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒勇兵以增武備故蜀志稱自亮南征而國以富饒甲兵充足由此言之則前代置郡其利頗深今鹽布之稅不供珍竒之貢不入戈㦸之用不實於戎行寶貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之漢以得利既多厯博南山涉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌曰厯博南越蘭津渡蘭倉為他人蓋譏漢貪珍竒鹽布之利而使蠻夷之所馳役也漢獲其利人且怨歌今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母幼子哀號望祭於千里之外於國家無絲髮之利在百姓受終身之酷臣竊為國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多粗設綱紀自然久定臣竊以亮之此策妙得羈縻蠻夷之術今姚府所置之官既無安邊靜寇之心又無葛亮且縱且擒之技唯知詭謀狡算恣情割剝貪叨劫略積以為常扇動酋渠遣成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慙耻提挈子弟嘯引凶愚聚㑹蒲博一擲纍萬劒南逋逃中原亡命有二千餘戶見散在彼州專以掠奪為業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義捴等往征郎將劉惠基在陳戰死其州遂廢臣竊以諸葛亮稱置官留兵有三不易其言乃驗至垂拱四年蠻郎將王善寶昆州刺史㸑乾福又請置州奏言所有課稅自出姚府管內更不勞擾蜀中及置州後録事參軍李陵為蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾于今不息且姚府捴管五十七州巨猾逰客不可勝數國家設官分職以化俗防姦無耻無厭狼籍至此今不問夷夏負罪並深見道路劫殺不能禁止臣恐一朝驚擾為禍轉大伏乞省罷姚州使𨽻巂府嵗時朝覲同之蕃國瀘南諸鎮亦皆廢於瀘北置關百姓自非奉使入蕃不許交通來往增巂府兵選擇清良宰牧以統理之臣愚將為穩便萬嵗通天中發兵戍疏勒四鎮同鳳閣鸞臺平章事狄仁傑諫曰臣聞天生四裔皆在先王封域之外故東距滄海西隔流沙北橫大漠南阻五嶺此天所以限四隅而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣此則今日之四境已逾於夏殷者也詩人矜薄伐於太原美化行於江漢是則前代之逺裔而國家之域中至前漢時丐奴無嵗不犯邊殺略吏人後漢則西羌侵軼漢中東寇三輔入河東上黨幾至洛陽由此言之則陛下今日之土宇過於漢朝逺矣若其用武荒外邀功絶域竭府庫之實以爭磽確不毛之地得其人不足以增賦獲其土不可以耕織苟求冠帶逺夷之稱不務固本安人之術此秦皇漢武之所行非五帝三王之事業也若使越荒外以為限竭資財以騁欲非但不愛人力亦所以失天心也昔始皇窮兵極武以求廣地男子不得耕於野女子不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追髙文之宿憤藉四帝之儲實於是定朝鮮討西域平南越擊丐奴府庫空虛盜賊蜂起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富民侯故能為天所祐也昔人有言曰與覆車同軌者未嘗安此言雖小可以喻大近者國家頻嵗出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊開守西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠亦多昔詩人云王事靡盬不能藝稷黍豈不懷歸畏此罪罟念彼共人涕零如雨此則前代怨思之辭也上不是恤則政不行而邪氣作邪氣作蟲螟生而水旱起若此雖禱祀百神不能調陰陽矣方今關東饑饉蜀漢逃亡江淮已南徵求不息人不復業則相率為盜本根一搖憂患不淺其所以然者皆為逺戍方外以竭中國爭蠻貊不毛之地乖子肓蒼生之道也昔漢元納賈捐之之謀而罷朱崖郡宣帝用魏相之策而棄車師之田豈不欲慕尚虛名蓋憚勞人力也近貞觀年中剋平九姓冊李思摩為可汗使統諸部者蓋以逺人叛則伐之降則撫之得推亡固存之義無逺戍勞人之役此則近日之令典綏邊之故事竊見阿史那斛瑟羅陰山貴種代雄沙漠若委之四鎮使統諸蕃封為可汗遣禦寇患則國家有繼絶之美荒外無轉輸之役如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於逺方并甲兵於塞上則恆代之鎮重而邊州之備實矣況綏撫四裔蓋防其越逸苟無侵侮之患則可矣何必窮兵黷武與荒服計校長短哉且王者外寧必有內憂蓋為不勤修政故也伏惟陛下棄之度外無以絶域未平為念但當敕邉兵謹守備蓄鋭以待敵待其自致然後擊之此李牧所以制丐奴也當今所要者莫若令邊城警守􅊀逺斥候聚軍實蓄威武以逸代勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得使邊人深入必有顛躓之慮淺入必無獲虜之益如此數年可使二部不擊而服矣𤣥宗開元六年張說上書曰臣頓首死罪皇帝陛下先帝以臣踐履忠孝使臣啓發聖眀故得侍讀春宫風承天眷景雲中嵗兼掌樞密內當沸騰之口外禦傾奪之勢陛下監撫既安自天所祐臣協贊之意明神啓之開元之始首典鈞軸智小任大福過災生出守三州違離六載曲直非已升降由人惟君知臣事不待說今改秩邉鎮委重戎麾竊以兩蕃近和能無同異九姓逺附未聞撫納欲賊殺無侵擾之慮保寧兩蕃受徵發之盟臣愚料之恐未然矣何者賊殺新立必逞兵威賊兵所加必收九姓九姓若去兩蕃搖矣九姓雖屬并州節度然共幽州密邇脫有風塵何事不至臣孰問幽州兵馬寡弱卒欲排比未可即戎城中倉糧全無貯積設若來迫臣實憂之伏乞聖慈深以垂意博詢舊將預為籌畫若早圖之必無後悔且孤臣總衆易起猜嫌寬大失濟事之宜嚴整招怨黷之謗逺辭天聽臨路倣徨如有論告臣身奏劾軍事者乞追臣面問對定真虛則日月無可蔽之期幽逺有自通之望伏願留書在內時加矜察𤣥宗時張九齡論東北軍未可輕動狀奏曰右髙力士宣奉敕張守圭所進送突厥生口具問知委曲故令劉思賢去者臣等伏以北敵凶狡誠似難保其心然陛下以恩澤懷柔嵗月已久使彼輸誠頓改頑暴以事觀察信然不虛何者昨李佺使回敵亦具云東下中間或言難信至今果如所說即是輸誠於國未有他詐且契丹等翻覆或往或來今其東討雖未禀命在於逺人亦不可責於常理若因而屠之亦便除患陛下先有聖料以為如此臣等常竊志之固非所及今其來也若契丹等偶勝北部勢衰因而乘之滅其大半審料必取始可決行事若不然而軍將妄動復結大隙亦以不信為國生患莫甚於此臣伏以在邊諸將苟利一軍便即行之以邀榮賞不思逺計誠是大失今劉思賢往望將降書處分守圭必為逺圖無得妄動切約諸將使知聖心縱北廷聞之尤彰天澤未審可否謹録狀奏聞代宗大厯八年元載上言曰四鎮北庭既治涇州無險要可守隴山髙峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水美平凉在其東獨耕一縣可給軍食故壘尚存吐蕃棄而不居每嵗夏吐蕃畜牧青海去塞甚逺若乘間築之二旬可畢移京西軍戍原州移郭子儀軍戍涇州為之根本分兵守石門木峽漸開隴右進達安西據吐蕃腹心則朝廷可高枕矣九年郭子儀入朝對延英帝與語吐蕃方彊慷慨至流涕退上書曰朔方國北門西禦戎人北虞獫狁五城相去三千里開元天寶中戰士十萬馬三萬匹僅支一隅自先帝受命靈武戰士從陛下征討無寧嵗頃以懷恩亂痍傷雕耗亡三分之二比天寶中止十之一今吐蕃兼吞河隴雜羌渾之衆嵗深入畿郊勢踰十倍與之角勝豈易得邪屬者敵來稱四節度將别萬人人兼數馬臣所統士不當敵四之二馬不當敵百之二外畏內懼將何以安臣惟陛下制勝力非不足但簡練不至進退未一時淹師老地廣勢分願於諸道料精卒滿五萬者列屯北邊則制勝可必竊惟河南河北江淮大鎮數萬小者數千殫屈禀給未始搜擇臣請追赴關中勒步隊示金鼓則攻必破守必全長久之策也中書侍郎同中書門下平章事陸贄論緣邊守備事宜狀奏曰右臣厯覽前代史書皆謂鎮撫四夷宰相之任不揆暗劣屢敢上言誠以備邊禦戎國家之重事理兵足食備禦之大經兵不理則無可用之師食不足則無可固之地理兵在制置得所足食在斂導有方陛下幸聼愚言先務積榖人無加賦官不費財坐致邊儲數逾百萬諸鎮收糴今已向終分貯軍城用防艱急縱有寇戎之患必無乏絶之憂守此成規以為永制恆收冗費益贍邊農則更經二年可積十萬人三嵗之糧矣足食之原粗立理兵之術未精敢試籌量庶備採擇伏以戎狄為患自古有之其於制禦之方得失之理備存史籍可得而言大抵尊即序者則曰非德無以化要荒曽莫知威不立則德不能馴也樂武威者則曰非兵無以服凶獷曾莫知德不修則兵不可恃也務和親者則曰要結可以睦鄰好曾莫知我結之而彼復解之也美長城者則曰設險可以固邦國而扞寇讎曽莫知力不足而人不堪則險之不能恃城之不能有也尚薄伐者則曰驅遏可以禁侵暴而省征徭曽莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駁聽一家之說則理例可徵考厯代所行則成敗異效是由執常理以御其不常之勢徇所見而昧於所遇之時夫中夏有盛衰四裔有强弱事機有利害措置有安危故無必定之規亦無長勝之法夏后以序戎而聖化茂古公以避狄而王業興周城朔方而玁狁攘秦築臨洮而宗社覆漢武討丐奴而貽悔太宗征突厥而致安文景約和親而不能弭患於當年宣元𢎞撫納而足以保寧於纍葉蓋以中夏之盛衰異勢四裔之强弱異時事機之利害異情措置之安危異便知其事而不度其時則敗附其時而不失其稱則成形變不同胡可專一夫以中國强盛四裔衰微而能屈膝稱臣歸心受制拒之則阻其嚮化滅之則類於殺降安得不存而撫之即而序之也又如中國强盛四裔衰微而尚棄信扞盟蔑恩肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亂之弊當四裔強盛之時圖之則彼釁未萌禦之則我力不足安得不卑詞降禮約好通和啖之以利以引其歡心結之以親以紓其交禍縱不必信且無大侵雖非御戎之善經蓋時事亦有不得已而然也儻或夷夏之勢强弱適同撫之不寧威之不靖力足以自保勢不足以出攻安得不設險以固軍訓師以待寇來則薄伐以遏其深入去則攘斥而戒於逺追雖非安邊之令圖蓋勢力亦有不得已而然也故夏之即序周之扞攘太宗之翦亂皆乘其時而善用其勢者也古公之避狄文景之和親神堯之降禮皆順其時而不失其稱者也秦皇之長城漢武之窮討皆知其事而不度其時者也向若遇孔熾之勢行即序之方則見侮而不從矣乘可取之資懷畏避之志則失機而養寇矣有攘却之力用和親之謀則示弱而勞費矣當降屈之時務翦伐之略則召祻而危殆矣故曰知其事而不度其時則敗附其時而不失其稱則成是無必定之規亦無長勝之法得失著效不其然歟至於察安危之大情計成敗之大數百代之不變易者蓋有之矣其要在於失人肆欲則必蹶任人從衆則必全此乃古今所同而物理之所一也國家自祿山搆亂肅宗中興撤邊修以靖中邦借外威以寧內難於是吐蕃乘釁吞噬無厭回紇矜功馮淩亦甚中國不遑振旅四十餘年使傷耗遺氓竭力蠺織西輸賄幣北償馬資尚不足塞其煩言滿其驕志復又逺徵士馬列戍疆陲猶不能遏其奔衝止其侵侮小入則驅略黎庶深入則震驚邦畿時有議安邊之䇿者多務於所難而忽於所易勉於所短而略於所長遂使所易所長者行之而其要不精所難所短者圖之而其功靡就憂患未弭職斯之由夫制敵行師必量事勢勢有難易事有後先力大而敵脆則先其所難是謂奪人之心暫勞而久逸者也力寡而敵堅則先其所易是謂固國之本觀釁而後動者也頃屬多故人勞未瘳而欲廣發師徒深踐寇境復其侵地攻其堅城前有勝負未必之虞後有餽運不繼之患儻或撓敗適所以啓戎心而挫國威以此為安邊之謀可謂不量事勢而務於所難矣天之授者有分事無全功地之産者有物宜無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而校其所長必殆用所長而乘其所短必安强者乃以水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不計敗亡此外裔之所長也外裔之所長乃中國之所短而欲益兵搜乘角力爭驅交鋒原野之間決命尋常之內以此為禦寇之術可謂勉所短而校其所長矣務所難勉所短勞費百倍終於無成雖果成之不挫則廢豈不以越天授而違地産虧時勢以反物宜者哉將欲去危就安息費從省在其慎守所易精用所長而已若乃擇將吏以撫寧衆庶修紀律以訓齊師徒耀德以佐威能邇以柔逺禁侵掠之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為寇則嚴備而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封疆守要害塹蹊隧壘軍營謹禁防明斥候務農以足食練卒以蓄威非萬全不謀非百剋不鬪寇小至則張聲勢以遏其入寇大至則謀其大以邀其歸據險以乘之多方以誤之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乘其弊不戰而屈人之兵此中國之所長也我之所長乃外裔之所短我之所易乃外裔之所難以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乘斯謂倒持戈矛以鐏授寇者也今則皆務之矣然猶守封未固寇戎未懲者何也其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者未必行故令措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制臣請為陛下粗陳六者之失惟明主慎聽而熟察之臣聞工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則緩以應機故事有便宜而不拘常制謀有竒詭而不徇衆情進退死生唯將所命此所謂攻討之兵也用之於屯戍則事資可久勢異從權非物理所愜不寧非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦外裔非一朝一夕之事固當選鎮守之兵以置焉古之善選置者必量其性習辨其土宜察其技能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奮其氣勢結其恩情撫之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用弛禁防而衆自不㩦故出則足兵居則足食守則固戰則强其術無他便於人情而已矣今者散徵士卒分戍邊陲更代往來以為守􅊀是則不量性習不辨土宜邀其所不能强其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益於􅊀禦之實也何者窮邊之地千里蕭條寒風裂膚驚沙慘目以水草為居邑以戰鬬為嬉逰晝則荷戈而耕夜則倚烽而覘日有剽害之慮永無休暇之虞地惡人勤於斯為甚自非生於其域習於其風幼而覩焉長而安焉不見樂土而不遷焉則罕能寧其居而狎其敵也關東之壤百物阜殷從軍之徒尤被優養慣於溫飽狎於歡康比諸邊隅若異天地聞絶塞荒陬之苦則辛酸動容聆强蕃徑敵之名則懾駭奪氣而乃使之去親族捨園廬甘其所辛酸抗其所懾駭將冀為用不亦踈乎矧又有休代之期無統帥之馭資奉若驕子姑息如倩人進不邀之以成功退不處之以嚴憲其來也咸負得色其止也莫有固心屈指計歸張頥待飼僥幸者猶患還期之賖緩恆念戎醜之充斥王師挫傷則將乘其亂離布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則投棄城鎮以搖逺近之心其弊豈唯無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲增戶實邊兼令展效自贖既是無良之類且加懷土之情思亂幸災又甚戍卒適足煩於防衛諒無望於功庸雖前代時或行之固非良算之可遵者也復有擁旄之帥身不臨邉但分偏師俾守疆埸大抵軍中壯鋭元戎例選自隨委其疲羸乃配諸鎮節將既居內地精兵祗備紀綱遂令守要禦衝恆在寡弱之卒寇戎每至力勢不支入壘者才足閉關在野者悉遭劫執資其芟蹂盡其搜驅比及都府聞知敵已剋獲旋返且安邊之本所切在兵理兵若斯可謂措置乖方矣夫賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之揣重輕輗軏之所以行車銜勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠實擯抑夫如是若聰明可衒律度無章則用與不用其弊一也自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典常又不能施之於將務相遵養茍度嵗時欲賞一有功翻慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能褒貶既闕而不行稱毁復紛然相亂人雖欲善誰為言之況又公忠者直已而不求於人反罹困厄敗撓者行私而茍媚於衆例獲優崇此義士所以痛心勇夫所以解體也又有遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為詞有司復以供給無闕為解既相執證理合辨明朝廷每為含糊未嘗窮究曲直措理者含聲而靡訴誣善者罔上而不慙馭將若斯可謂課責虧度矣課責虧度措置乖方將不得竭其才卒不得盡其力屯集雖衆戰陳莫前敵每越境橫行若涉無人之地遞相推倚無敢誰何虛張聲勢上聞則曰兵少不敵朝廷莫之省察唯務徵發益師無裨􅊀禦之功重增供億之弊閭井日耗徵求日繁以編戶傾家破産之資兼有司榷鹽稅酒之利總其所入半以事邊制用若斯可謂財匱於兵衆矣今四夷之最强盛為中國甚患者莫大於吐蕃舉國勝兵之徒才當中國十數大郡而已其於內虞外備亦與中國不殊所能寇邉數則蓋寡且又器非犀利甲不堅完識迷韜鈴藝乏趫敏動則中國懼其衆而不敢抗靜則中國憚其强而不敢侵厥理何哉良以中國之節制多門蕃部之統帥專一故也夫統帥專一則人心不分人心不分則號令不二號令不二則進退可齊進退可齊則疾徐如意疾徐如意則機㑹靡愆機㑹靡愆則氣勢自壯斯乃以少為衆以弱為强變化翕闢在於反掌之內是由臂之使指心之制形若所任得人則何敵之有夫節制多門則人心不一人心不一則號令不行號令不行則進退難必進退難必則疾徐失宜疾徐失宜則機㑹不及機㑹不及則氣勢自衰斯乃勇廢為尫衆散為弱逗撓離析兆乎戰陳之前是由一國三公十羊九牧欲令齊肅其可得乎開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度而巳猶慮權分勢散或使兼而領之中興已來未遑外討僑頴四鎮於安定權附隴右於扶風所當西北兩蕃亦朔方涇原隴右河東四節度而已關東戍卒至則屬焉雖委任未盡得人而措置尚存典制自頃逆泚誘涇原之衆叛懷光汙朔方之軍割裂誅鋤所餘無幾而又分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相禀屬每候邊書告急方令計會用兵既無軍法下臨唯以客禮相待是乃從容拯溺揖讓救焚冀無阽危固亦難矣夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消建軍若斯可謂力分於將多矣理戎之要最在均齊故軍法無貴賤之差軍實無多少之異是將所以同其志而盡其力也如有誘其志意勉其藝能則當閲其才程其勇校其勞逸度其安危明申練核優劣之科以為衣食等級之制使能者企及否者息心雖有厚薄之殊而無觖望之釁蓋所謂日省月試餼廪稱事如權量之無情於萬物人莫不安其分而服其平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒嵗月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒厚踰數等繼於茶藥之饋益以蔬醬之資豐約相形縣絶斯甚又有素非禁旅本是邊軍將校詭為媚詞因請遙𨽻神策不離舊所唯改虛名其於廪賜之饒遂有三倍之益此則儔類所以忿恨忠良所以憂嗟疲人所以流亡經費所以褊匱夫事業未異而給養有殊人情不能甘也況乎矯佞行而廪賜厚績藝劣而衣食優茍未忘懷孰能無愠不為戎首則巳可嘉而欲使其協力同心以攘寇難雖有韓白孫吳之將臣知其必不能焉養士若斯可謂怨生於不均矣凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵藉某人參佐要若干士馬用若干資糧某處置營某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選才端拱於委任既委其事既足其求然後可以核其否臧行其賞罰受其賞者不以為濫當其罰者無得而辭付授之柄既專苟且之心自息是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之又賜鈇鉞示令專斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以逺決號令不可以兩從未有委任不專而望其剋敵成功者也自頃邊軍去就裁斷多出宸衷選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥必取於承順無違則如斯可矣若有意乎平凶靖難則不可也夫兩疆相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已疏矣況乎千里之逺九重之深陳述之難明聽覽之不一欲其事無遺䇿雖聖者亦有所不能焉設使謀慮能周其如權變無及强敵馳突迅如風飈馹書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肻出師逗留之間寇已奔逼託於救援未至各且閉壘自全牧馬屯牛鞠為椎剽嗇夫樵婦罄作俘囚雖詔諸鎮發兵唯以虛聲應援互相瞻顧莫敢遮邀敵既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千將帥既幸於總制在朝不憂罪纍陛下又以為大權由己不究事情用師若斯可謂機失於遙制矣理兵而措置乖方馭將而賞罰虧度制用而財匱建軍而力分養士而怨生用師而機失此六者疆埸之蟊賊軍旅之膏肓也蟊賊不除而但滋之以糞溉膏肓不療而苟啖之以滑甘適足以飬其害速其災欲求稼穡豐登膚革充美固不可得也臣愚謂宜罷諸道將士畨替防秋之制率因舊數而三分之其一分委本道節度使募少壯願住邊城者以徙焉其一分則本道但供衣糧委關內河東諸軍州募蕃漢子弟願傅邊事者以給焉又一分亦令本道但出衣糧加給應募之人以資新徙之業又令度支散於諸道和市耕牛雇召工人就諸軍城繕造器具募人至者每家給耕牛一頭又給田農水火之器皆令充􅊀初到之嵗與家口二人糧并賜種子勸之播植待經一稔俾自給家若有餘糧官為收糴各酬倍價務奬營田既息踐更徵發之煩且無幸災苟免之弊寇至則人自為戰時至則家自力農是乃兵不得不强食不得不足與夫倐來忽往豈可同等而論哉臣又謂宜擇文武能臣一人為隴右元帥應涇隴鳯翔長武城山南西道等節度管內兵馬悉以屬焉又擇一人為朔方元帥應鄜坊邠寧靈夏等節度管內兵馬悉以屬焉又擇一人為河東元帥河東振武等節度管內兵馬悉以屬焉三帥各選臨邊要㑹之州以為理所見置節度有非要者隨所便近而併之唯元帥得置統軍餘並停罷其三帥部內太原鳯翔等府及諸郡户口稍多者慎柬良吏以為尹守外奉師律內課農桑俾為軍糧以壯戎府理兵之宜既得選帥之道既明然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆𢎞委任之道以宣其用縣賞罰之典以考其成而又慎守中國之所長謹行當今之所易則八利可致六失可除如是而戎狄不威懷疆埸不寧謐者未之有也諸侯軌道庶類服從如是而教令不行天下不理者亦未之有也以陛下之英聖人心之思安四方之小休兩寇之方靜加以頻年豐稔所在積糧此皆天贊國家可以立制垂統之時也時不久居事不常兼已過而追雖悔無及明主者不以言為罪不以人廢言罄陳狂愚惟所省擇謹奏贄又請邊城貯􅊀米粟等狀奏曰右兵之所屯食最為急若無儲蓄是棄封疆自昔敗亂之由多因餽餉不足臣以任當體國職合分憂奏減河運腳錢用充軍鎮和糴幸䝉聖恩允許又屬頻嵗順成二年之間緣邊諸軍共計收糴米粟一百八十餘萬石準元敕各委當道節度及監軍中使度支知巡院官同勾當檢納仍以貯備軍糧為名非緣城守乏絶及不承别敕處分並不得輒有費用若能堅守此制有用隨即却填則是邊城當貯十五萬人一嵗之糧以為急難之􅊀永無縣絶足固軍情去嵗版築五原大興師旅所司素無偹擬臨事支計缺然齎送悉貸此糧乃得軍行辦集過事之後准敕合填逮今二年竟不支遣加以諸鎮軍食例皆缺供及其告急工聞宣㫖下迫則又請貸貯粟以充將士月糧既務廢隳且無愧畏所未匱竭其能幾何夫栽植至難毁拔至易古人以樹楊為喻能不為之歎惜哉況水旱流行固宜有備戎狄為患可不為虞將欲安邊先宜積榖今當嵗稔合益軍儲反罄聚蓄之資用供朝夕之費倘遇灾難則如之何惟陛下詳思後圖不貽他日所悔臣之願也疆埸之幸也不勝區區慮患之意謹冒昧以聞贄又請邊鎮儲糧狀奏曰臣伏見陛下每垂睿心經略邊境增築城壘加置戍兵至於春秋衣裝嵗時宴犒先後遲速悉由宸衷其為憂勤可謂至矣其為資費亦以多矣蓋以安人固國不憚煩勞此誠慎慮之深者也然於儲蓄大計則未降意良圖但任有司隨月供應近嵗蕃戎小息年榖屢登所支軍糧猶有匱乏邉書告闕相繼于朝儻遇水旱為災粟糴翔貴凶醜匪茹寇擾淹時負挽力殫或饋餉路絶則戍兵雖衆不足恃城壘雖固不足居是使積年完聚之勞適資一夕潰敗之辱此乃理有必至而事無幸濟者也臣竊為陛下惜之軍志曰雖有石城十仞湯池百步無粟不能守也故朝錯論安邉之策要在積榖充國建破羌之議先務屯田厯代制禦四夷常為國之大事勇者奮其力智者貢其謀攻守異宜盛衰殊勢柔服而不勞師旅者則常聞之矣屯師而不務農食者未嘗有焉今陛下廣徴甲兵分守城鎮除所在營田稅畝自供之外仰給於度支者尚八九萬人千里饋糧涉履艱險運米一斛達于邉軍逺或費錢五六千近者猶過其半犯雪霜皸瘃之苦冒盜賊剽掠之虞四時之間無日休息傾財用而竭物力猶苦日給之不充其於儲蓄以備非常固亦絶意而不暇思也夫屯兵守土以備寇戎至而無糧守必不固矣遇寇不守則如勿屯平居有殘人耗國之煩臨難有啓敵納侮之禍所養非所用所失非所虞以為制􅊀之規臣竊謂疏矣貞元十三年上以方渠合道木波皆吐蕃要路欲城之使問邠寧節度使楊朝晟須幾何兵對曰邠寧兵足以城之上曰嚮城鹽州用兵七萬今三城尤逼敵境如此何也對曰今發本鎮兵不旬日至出其不意而城之敵謂吾衆不減七萬不敢輕來不過三旬吾城已畢敵雖至城旁草盡不能久留敵退則運芻糧以實之此萬全之策也若大集諸道兵踰月始至敵亦集衆而來與我爭戰勝負未可知何暇築城哉上從之朝晟分軍為三各築一城三日三城成朝晟軍還至馬嶺吐蕃始出追之相距數日而去朝晟遂城馬嶺而還德宗時兩河罷兵轉運使韓滉上言吐蕃盜河湟久近嵗濅弱而西迫大食北抗回鶻東抗南詔分軍外戰兵在河隴者不過五六萬若朝廷命將以十萬衆城涼鄯洮渭各置兵二萬為守禦臣請以本道財賦饋軍給三年費然後營田積粟且耕且戰則河隴之地可翹足而復帝善其言憲宗元和八年振武河溢毁受降城節度使李光進奏請修城兼理河防李吉甫請徙於天德故城以避河患李絳盧坦以為受降城張仁願所築當磧口據虜要衝美水草守邊之利地欲避河患退二三里可矣天德故城僻處確瘠烽候不相應接虜忽唐突勢無由知是無故而蹙國二百里也城使周懷義奏利害與坦絳同上卒用吉甫策以受降城騎士𨽻天德軍李絳言於上曰邊兵徒有其數而無其實將帥但緣私役使聚其貨財以結權幸而已未嘗訓練以備不虞此不可不於無事之時豫留聖意也受降兵籍舊四百人及天德交兵才五十人器械一弓而已故絳言及之元和九年李吉甫奏開元中置宥州以領降户寶應以來因循遂廢今請復之以備回紇撫黨項上從之先是回紇屢請昏朝廷以費廣未許李絳言回紇凶强不可無􅊀淮西窮蹙事要經營萬一北方有警則非步騎數萬不足抗禦而淮西遺黨復延嵗月之命為國家費豈特降主之比上不聼憲宗時宰臣李絳嘗因延英論及邊事上言曰自古及今邊人與中國並雖代有衰盛强弱然常須邊境備擬烽候精明雖繫頸屈膝而亭障未嘗一日弛其備也何邉人强橫負力怙氣不懷恩義不踐誓盟故强則寇掠弱則卑伏此其天性也是以聖王以荒忽無常待之其至也則驅除之其去也則嚴備之今北敵蕃臣復多厯年載雖實有功於國家報之以厚施者已倦求者未厭滿其意則曰事當宜爾悍氣益驕酌其中則曰效之難圖怨辭立至故印馬益廣望價轉多無厭之心實難為足若不如此異日必有不顧恩德為患封疆寇至而謀事則不及矣今西北兩都皆無備擬兵但虛數坐盜衣糧將無成效嵗邀官爵衣甲器械之類破官錢空有其名部伍訓練之方務酒樂都亡其制古者兵無二事志在殺敵將無異望專在誅寇器用犀利斥候精明若有煙塵務為力戰若無警急即營生業今則不然戰士採拾以供上命惟責程課不恤饑寒主將刻削以結內寵不輯戎事惟濟己身今戎狄繼來婚嫁於國情實巨細必知邊塞空虛有無咸悉至於山川要害道途險易已皆探知熟習委曲諳識脫或見利忘義因便乘間風塵暴至羽檄交馳急詔徵兵無及係纍之苦閉壁逃禍寧救驅掠之災使邉人仰天而呼望國而泣蓄甲不足以衛疆埸命將不足以扼寇讎此聖主所宜圖之不可忘於終食之間也伏望詔敕邊鎮節度俾其虛實有無少闕事宜分析聞奏仍請於八座丞郎兩省中選擇公忠清幹不撓之臣奉使各與大鎮節度使各與㸃閲軍中訪問事理一時上聞然後申明制度增緝募兵謹其殿最行其賞罰罪在不捨刑罰必加功有可褒爵賞必及如此則陛下高枕邊人永寧古人曰備豫不虞有􅊀無患此經國之常制也上驚曰今邊上豈如此空虛也卿等便令㸃撿切為殿最時天德軍中城舊屬振武有鎮兵四百人其時却割屬天德軍交割惟有十人并軍將在此其器械惟有弓一張餘可知也數月後李絳罷相遂因循舊弊元和中左拾遺元稹論西戎表奏曰臣䝉恩顧問竊見陛下患戎之意深矣自貞元以來國家所以甘億兆之費於塞下蓋以犬戎有侵軼之患而邊人思守禦之利也然而河湟之地日削田萊之業日空塞下之人日亡戎狄之心日熾若此非他不得備之之術也且臣聞之君之命帥帥之命將將之使卒猶心之使臂臂之使指然後敵可擒而軍可制也今之屯戍者則不然衆其城堡異其師長獲一馬則圖功虜一戎則告捷至於屠縣道掠萬人則曰力弱不足以應敵援寡不足以摧凶茍謹閉繕完不失其守者則朝廷議賞之不給又孰肯摧鋒刃冒殊死而出入於係虜哉此又非他衆分力散而責師之刑無所加也而又加之以為農者不教戰屯聚者不兼農寇至則卒伍被甲而乘城野人空拳以應敵此又耕戰之術不修而屯聚之方太逸也今夫邠岐汧隴之地皆后稷公劉之所理也土宜植物人務稼穡陛下誠能使本道節制廣於荒隙大建屯田塞下諸軍除使令守防之外一切出之於野限人名田復其租入然後因其阡陌制之閭井因其卒伍樹之師長固其塍塹以􅊀不虞戎人適至則有連阡接畛之兵戎騎才歸則復耰鋤穫耨之事若此則曩時之聚食者盡歸之於服勤之農矣前此之係虜者盡化為守禦之兵矣三五年間塞下有相因之粟邊人無侵軼之虞陛下又董之以良帥威之以必刑則彼瑣瑣之戎陛下將署其君長征其牛羊振威以擒之可也布德以懷之可也又何必詢王恢使蘇武用朝錯訪婁敬而後復河湟稱即叙哉此備戎之大略也方今猶有急於此者臣敢冒昧殊死而言之臣聞善奕棊者將劫其棊必固其羸是以敵可殺而地不危今庸蜀有犬吠之驚南蠻絶貢誠之路陛下又輟邉將以統問罪之師脫或部落瓦全稽天討兵連不解綿夏涉秋則戎人乘釁啓心之日也陛下其圖之臣無任懇款憂邊之至杜佑拜司徒封岐國公黨項陰導吐蕃為亂諸將邀功請討之佑以為無良邊臣有為而叛即上疏曰昔周宣中興獫狁為害追之太原及境而止不欲弊中國怒逺夷也秦恃兵力北拒丐奴西逐諸羌結怨階亂實生謫戍蓋聖王之治天下惟欲綏靜生人西至於流沙東漸于海在北與南止存聲教豈疲內而事外耶昔馮奉世矯詔斬莎車王傳首京師威震西域宣帝議加爵土蕭望之獨謂矯制違命雖有功不可為法恐後奉使者為國家生事異域北突厥默啜寇害中國開元初郝靈伶捕斬之自謂功莫與二宋璟慮邉臣由此邀功但授郎將而已由是訖開元之盛不復議邊中國遂安此成敗鑒戒之不逺也黨項小蕃與中國雜處間者邊將侵刻利其善馬子女斂求繇役遂致叛亡與西北二陲相誘盜邊傳曰逺人不服則修文德以來之管仲有言國家無使勇猛者為邊境此誠聖哲識微知著之略也今戎部方彊邊􅊀未實誠宜慎擇良將使之完輯禁絶誅求示以信誠來則懲禦去則謹備彼當懷柔革其姦謀何必亟興師役坐取勞費哉帝嘉納之穆宗立時吐蕃寇邉西北騷然又略雅州劒南節度使王涯調兵拒之上言蜀有兩道直搗敵腹一繇龍川清川以抵松州一繇綿州威蕃柵抵棲雞城皆敵險要地臣願不愛金帛使信臣持節與北敵約曰能發兵深入者殺某人取某地受其賞開懷以示之所以要約諄熟異它日者則丐奴之鋭可出西戎之力衰矣帝不報敵長慶四年上命李德裕修塞清溪關以斷南詔入寇之路德裕上言通蠻細路至多不可塞惟重兵鎮守可保無虞時北兵皆歸本道惟河中陳許三千人在成都有詔來年亦歸蜀人忷懼德裕奏乞鄭滑五百人陳許千人以鎮蜀且言蜀兵脆弱新為蠻寇所困皆破膽不堪征戍若北兵盡歸則與杜元頴時無異朝廷建言罷兵蓋由禍不在身望人責一狀留入堂案他日敗事不可令臣獨當國憲朝廷皆從其請厯代名臣奏議卷三百二十一
