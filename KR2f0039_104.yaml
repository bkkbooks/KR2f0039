body:
  text: 歴代名臣奏議卷一百四明楊士竒等撰封建秦始皇初并天下丞相王綰等言諸侯初破燕齊荆地逺不為置王毋以填之請立諸子唯上幸許始皇下其議於羣臣羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然後屬踈逺相攻擊如仇讎諸侯更相誅伐周天子弗能禁止今海内賴陛下神靈一統皆為郡縣諸子功臣以公賦税重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下以為三十六郡始皇置酒咸陽宫僕射周青臣進頌曰陛下神聖平定海内以諸侯爲郡縣無戰争之患上古所不及始皇悦博士淳于越曰殷周之王千餘嵗封子弟功臣自為枝輔今陛下有四海而子弟為匹夫卒有田常六卿之臣何以相救事不師古而能長乆非所聞也漢文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則粱王矣後又徙代王武為淮陽王而太原王參為代王盡得故地居數年梁王勝死亡子時賈誼為粱懐王太傅上疏曰陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大强植立也漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邉匈奴與强敵為隣能自完則足矣而淮陽之比大諸侯廑如黒子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小亷以自託於鄉黨人主唯天下安社稷固不耳髙皇帝瓜分天下以王功臣反者如蝟毛而起以為不可故蔪去不義諸侯而虚其國擇良日立諸子雒陽上東門之外諸侯國皆在關東故於東門外立之也畢以為王而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯越過也兩諸侯梁及淮陽而縣屬於漢其吏民繇役徃來長安者自悉而補中道衣敝自悉其家資財補縫作衣錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其勢不可乆臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邉二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南楗之江楗謂立封界則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁呉楚陛下高枕終無山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之旤今陛下力制天下頥指如意髙拱以成六國之旤難以言智茍身無事畜亂宿旤孰視而不定萬年之後傳之老母弱子将使不寧不可謂仁臣聞聖主言問其臣而不自造事故使人臣得畢其愚忠唯陛下財幸八年夏又封淮南厲王四子皆為列侯誼知上必将復王之也上䟽諫曰竊恐陛下接王淮南諸子曽不與如臣者孰計之也淮南王之悖逆無道天下孰不知罪陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壮豈能忘其父哉白公勝所為父報仇者大父與伯父叔父也師古曰白公太子建之子也大父即祖謂平王也伯父叔父平王諸子也白公為亂非欲取國代主也發忿快志剡手以衝仇人之胷固為俱靡而已淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於策不便雖割而為四四子一心也予之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之間所謂假賊兵為虎翼者也願陛下少留計武帝時大司馬霍去病上䟽曰陛下過聽使臣去病待罪行間宜專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子賴天能勝衣趨拜至今無位號師傳官陛下恭讓不卹羣臣私望不敢越職而言臣竊不勝犬馬心昧死願陛下詔有司因盛夏吉時定皇子位唯願陛下幸察制曰下御史丞相臣青翟謹與御史大夫臣湯中二千石二千石臣賀等議古者裂地立國並建諸侯以承天子所以尊宗廟重社稷也今臣去病上疏不忘其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有位號臣等宜奉義遵職愚憧而不逮事方今盛夏吉時臣等昧死請立皇子臣閎臣旦臣胥為諸侯王昧死請所立國名制曰盖聞周封八百姬姓並列或子男附庸禮支子不祭云並建諸侯所以重社稷朕無聞焉且天非爲君生民也朕之不徳海内未洽乃以未敎成者强君連城即股肱何勸其更議以列侯家之青翟等議曰臣伏聞周封八百姬姓並列奉承天子康叔以祖考顯而伯禽以周公立成為建國諸侯以相傳為輔百官奉憲各遵其職而國統備矣竊以為並建諸侯所以重社稷者四海諸侯各以其職奉貢祭支子不得奉祭宗祖禮也封建使守藩國帝王所以扶徳施化陛下奉承大統明開聖緒尊賢顯功興滅繼絶續蕭文終之後于鄼褒厲盛臣平津侯等昭六親之序明天施之屬使諸侯王封君得推私恩分子弟户邑錫號尊建百有餘國而家皇子為列侯則尊卑相踰列位失序不可以垂統於萬世臣請立臣閎臣旦臣胥為諸侯王制曰康叔親屬有十而獨尊者褒有徳也周公祭天命郊故魯有白牡騂剛之牲羣公不毛賢不肖差也高山仰之景行嚮之朕甚慕焉所以抑未成家以列侯可青翟等議曰臣伏聞康叔親屬有十武王繼體周公輔成王其八人皆以祖考之尊建為大國康叔之年幼周公在三公之位而伯禽據國於魯盖爵命之時未至成人康叔後扞禄父之難伯禽殄淮夷之亂昔五帝異制周爵五等春秋三等皆因時而序尊卑髙皇帝撥亂世反諸正昭至徳定海内封建諸侯爵位二等皇子或在襁褓而立為諸侯王奉承天子為萬世法則不可易陛下躬親仁義體行聖徳表裏文武顯慈孝之行廣賢能之路内褒有徳外討强暴極臨北海西湊月氐匈奴西域舉國奉師輿械之費不賦於民虚御府之藏以賞元戎開禁倉以賑貧窮減戍卒之半百蠻之君靡不鄉風承流稱意逺方殊俗重譯而朝澤及方外故珍禽至嘉榖興天應甚彰今諸侯支子封至諸侯王而家皇子為列侯臣等竊伏熟計之皆以為尊卑失序使天下失望不可臣請立臣閎臣旦臣胥為諸侯王四月癸未奏未央宫留中不下青翟等復言曰臣等前奏大司馬臣去病上疏言皇子未有號位臣謹與御史大夫臣湯中二千石二千石諫大夫博士臣慶等昧死請立皇子臣閎等為諸侯王陛下讓文武躬自切及皇子未教羣臣之議儒者稱其術或誖其心陛下固辭弗許家皇子為列侯臣等竊與列侯臣壽成等二十七人議皆曰以為尊卑失序髙皇帝建天下為漢太祖王子孫廣支輔先帝法則弗改所以宣至尊也臣請令史官擇吉日具禮儀上御史奏輿地圖他皆如前故事制曰可元光中主父偃説上曰古者諸侯不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其彊而合従以逆京師今以法割削之則逆節萌起前日晁錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺寸地封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國不削而稍弱矣上従其計東漢光武即位初大司馬呉漢請封皇子不許重奏連嵗建武十五年三月乃詔羣臣議大司空竇融固始侯李通膠東侯賈復髙宻侯鄧禹等奏議曰古者封建諸侯以藩屏京師周封八百同姓諸姬並為建國夾輔王室尊事天子享國永長為後世法故詩云大啓爾宇為周室輔髙祖聖徳光有天下亦務親封立兄弟諸子不違舊章陛下徳横天地興復宗統褒徳賞勲親睦九族功臣宗室咸䝉封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克遜抑而未議羣臣百姓莫大失望宜因盛夏吉時定號位以廣藩輔明親親尊宗廟重社稷應古合舊厭衆心臣請大司空上輿地圖太常擇吉日具禮儀制曰可夏四月戊申以太牢告祠宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荆為山陽公衡為臨淮公焉為左翊公京為琅邪公光武封功臣皆為列侯大國四縣餘各有差博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷强榦弱枝所以為治也今封諸侯四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬魏齊王時宗室曹冏上書曰臣聞古之王者必建同姓以明親親必樹異姓以明賢賢故傳曰庸勲親親昵近尊賢書曰克明俊徳以親九族詩云懐徳維寧宗子維城由是觀之非賢無與興功非親無與輔治夫親親之道專用則其漸也微弱賢賢之道偏任則其弊也刼奪先聖知其然也故博求親疎而並用之近則有宗盟藩衛之固逺則有仁賢輔弼之助盛則有與共其治衰則有與守其土安則有與享其福危則有與同其禍夫然故能有其國家保其社稷歴紀長久本支百世也今魏尊尊之法雖明而親親之道未備詩不云乎鶺鴒在原兄弟急難以斯言之明兄弟相救於喪亂之際同心於憂禍之間雖有䦧牆之忿不忘禦侮之事何則憂禍同也今則不然或任而不重或釋而不任一旦疆埸稱警關門反拒股肱不扶胷心無衛臣竊惟此寝不安席思獻丹誠貢䇿朱闕謹撰合所聞叙論成敗論曰昔夏殷周歴世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救夫與民共其樂者人必憂其憂與民同其安者人必拯其危先王知獨治之不能久也故與人共治之知獨守之不能固也故與人共守之兼親疎而兩用參同異而並建是以輕重足以相鎭親疎足以相衛兼并路塞逆節不生及其衰也桓文帥禮包茅不貢齊師伐楚宋不城周晉戮其宰王綱弛而復張諸侯傲而復肅二覇之後浸以陵遟呉楚憑江負固方城雖心希九鼎而畏迫宗姬姦情散於胷懷逆謀消於脣吻斯豈非信重親戚任用賢能枝葉碩茂本根賴之歟自此之後轉相攻伐呉并於越晉分為三魯滅於楚鄭兼於韓暨於戰國諸姬微矣惟燕衛獨存然皆弱小西迫强秦南畏齊楚憂懼滅亡匪遑相恤至於王赧降為庶人猶枝榦相持得居虛位海内無王四十餘年秦據勢勝之地騁譎詐之術征伐關東蠶食九國至於始皇乃定天位曠日若彼用力若此豈非深固根帶不拔之道乎易曰其亡其亡繫于苞桑周徳其可謂當之矣秦觀周之弊以為小弱見奪於是廢三等之爵立郡縣之官棄禮樂之教任苛刻之政子弟無尺寸之封功臣無立錐之地内無宗子以自毗輔外無諸侯以為藩衛仁心不加於親戚惠澤不流於枝葉譬猶芟刈股肱獨任胷腹浮舟江海捐棄楫櫂觀者為之寒心而始皇晏然自以為關中之固金城千里子孫帝王萬世之業也豈不悖哉是時淳于越諫曰臣聞殷周之王封子弟功臣千有餘城今陛下君有海内而子弟為匹夫卒有田常六卿之臣而無輔弼何以相救事不師古而能長乆者非所聞也始皇聽李斯偏説而絀其議至於身死之日無所寄付委天下之重於凡夫之手托廢立之命於奸臣之口至令趙髙之徒誅鉏宗室胡亥少習刻薄之教長遵凶父之業不能改制易法寵任兄弟而乃師譚申商咨謀趙髙自幽深宫委政䜛賊身殘望夷求為黔首豈可得哉遂乃郡國離心衆庶潰叛勝廣倡之於前劉項弊之於後向使始皇納淳于之䇿抑李斯之論割裂州國分王子弟封三代之後報功臣之勞士有常君民有定主枝葉相扶首尾為用雖使子孫有失道之行時人無湯武之賢奸謀未發而身已屠戮何區區之陳項而復得措其手足哉故漢祖奮三尺之劔驅烏集之衆五年之中遂成帝業自開闢以來其興立功勲未有若漢祖之易也夫伐深根者難為功摧枯朽者易為力理勢然也漢監秦之失封殖子弟及諸吕擅權圖危劉氏而天下所以不傾動百姓所以不易心者徒以諸侯强大磐石膠固東牟朱虚受命於内齊代呉楚作衛於外故也向使髙祖踵亡秦之法忽先王之制則天下已傳非劉氏有也然髙祖封建地過古制大者跨州兼郡小者連城數十上下無别權侔京室故有呉楚七國之患賈誼曰諸侯强盛長亂起奸夫欲天下之治安莫若衆建諸侯而少其力令海内之勢若身之使臂臂之使指則下無背叛之心上無誅伐之事文帝不從至於孝景猥用晁錯之計削黜諸侯親者怨恨疎者震恐呉楚倡謀五國従風兆發髙帝釁鍾文景由寛之過甚急之不漸也所謂末大必折尾大難掉尾同於體猶或不従況乎非體之尾其可掉哉武帝従主父之䇿下推恩之令自是之後齊分為七趙分為六淮南三割梁代五分遂以陵遟子孫微弱衣食租税不預政事或以酎金免削或以無後國除至於成帝王氏擅朝劉向疏曰臣聞公族者國之枝葉枝葉落則本根無所芘䕃方今同姓䟽外要黨專政排擯宗室孤弱公族非所以保守社稷安固國嗣也其言深切多所稱引成帝雖悲傷嘆息而不能用至於哀平異姓秉權以周公之事而為田常之亂髙拱而竊天位一朝而臣四海漢之宗室王侯解印釋綬貢奉社稷猶懼不得為臣妾或乃為之符命頌莽恩徳豈不哀哉由斯言之非宗子獨忠孝於惠文之間而叛逆於哀平之際也徒權輕勢弱不能有定耳賴光武皇帝挺不世之資禽王莽於己成紹漢嗣於既絶斯豈非宗子之力也而曽不監秦之失䇿襲周之舊制踵王國之法而僥倖無疆之期至於桓靈閹豎執衡朝無死難之臣外無同憂之國君孤立於上臣弄權於下本末不能相御身首不能相使由是天下鼎沸奸凶並争宫廟焚爲灰燼宫室變為榛藪居九州之地而身無所安處悲夫魏太祖武皇帝躬聖明之資兼神武之畧耻王綱之廢絶愍漢室之傾覆龍飛譙沛鳳翔兖豫掃除凶逆剪滅鯨鯢還帝西京定都潁沛徳動天地義感人神漢氏奉天禪位大魏大魏之興于今二十有四年矣觀五代之存亡而不用其長䇿觀前車之傾覆而不改於轍迹子弟王空虚之地君不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶内無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍民之任或比國數人或兄弟並據而宗室子弟曽無一人間廁其間與相維持非所以强榦弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限小縣之宰有武者必置百人之上使夫亷髙之士畢志於衡軛之内才能之人耻與非𩔖為伍非所以勸進賢能褒異宗室之禮也夫泉竭則流涸根朽則葉枯枝繁者䕃根條落者本孤故語曰百足之蟲至死不僵以扶之者衆也此言雖小可以譬大且墉基不可倉卒而成威名不可一朝而立皆為之有漸建之有素譬之種樹乆則深固其本根茂盛其枝葉若造次徙於山林之中植扵宫闕之下雖壅之以黑墳煖之以春日猶不救於枯槁而何暇繁育哉夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將若之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧拔之憂天下有變而無傾危之患矣呉大帝黄武七年孫慮封建昌侯後二年丞相顧雍等奏慮性聦體逹所尚日新北方近漢宜進爵稱王帝未許乆之尚書僕射缺存上䟽曰帝王之興莫不褒崇至親以光羣后故魯衛於周寵冠諸侯髙帝五王封列于漢所以藩屏本朝為國鎮衛建昌侯慮禀性聰敏才兼文武於古典制宜正名號陛下謙光未肯如舊羣寮大小咸用於邑方今奸寇恣睢金鼓未弭腹心爪牙惟親與賢輙與丞相雍等議咸以慮宜為鎮軍大將軍授任偏方以光大業黄武中南魯二宫初立尚書僕射是儀以本職領魯王傅儀嫌二宫相近切乃上疏曰臣竊以魯王天挺懿徳兼資文武當今之宜宜鎮四方為國藩輔宣揚徳美廣耀威靈乃國家之良規海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫宜有降殺正上下之序明教化之本晉武帝時議郎段灼陳時宜曰臣聞天時不如地利地利不如人和三里之城五里之郭圜圍而攻之有不剋者此天時不如地利城非不髙池非不深榖非不多兵非不利委而去之此地利不如人和然古之王者非不先推恩徳結固人心人心茍和雖三里之城五里之郭不可攻也人心不和雖金城湯池不能守也臣推此以廣其義舜彈五弦之琴詠南風之詩而天下自理由堯人可比屋而封也曩者多難姦雄屢起攪亂衆心刀鋸相乗流死之孤哀聲未絶故臣以為陛下當深思逺念杜漸防萌彈琴詠詩垂拱而已其要莫若推恩以協和黎庶故推恩足以保四海不推恩不足以保妻子是故唐堯以親睦九族為先周文以刑于寡妻為急明王聖主莫不先親後疎自近及逺臣以為太宰司徒衛將軍三王宜留洛中鎮守其餘諸王自州征足任者年十五以上悉遣之國為選中郎傅相才兼文武以輔佐之聽於其國繕脩兵馬廣布恩信必撫下猶子愛國如家君臣分定百世不遷連城開地為晉魯衛所謂磐石之宗天下服其彊矣雖云割地譬猶嚢漏貯中亦一家之有耳若慮後世强大自可豫為制度使得推恩以分子弟如此則枝分葉布稍自削小漸使轉至萬國亦後世之利非所患也昔在漢世諸吕自疑内有朱虚東牟之親外有諸侯九國之彊故不敢動搖於今之宜諸侯彊大是為太山之固非我族𩔖其心必異而魏法禁錮諸王親戚隔絶不祥莫大焉間者無故又𤓰分天下立五等諸侯上不象賢下不議功而是非雜揉例受茅土似權時之宜非經乆之制将遂不改此亦煩擾之人漸亂之階也夫國之興也由於九族親睦黎庶協和其衰在於骨肉䟽絶百姓離心故夏邦不安伊尹歸殷殷邦不和吕氏入周殷監在於夏后去事之誡誠来事之鑒也咸寧三年衛將軍楊珧等建議以為古者封建諸侯所以藩衛王室今諸王公皆在京師非扞城之義又異姓諸将居邉宜參以親戚帝乃詔諸王各以户邑多少為三等大國置三軍五千人次國置二軍三千人小國一軍一千一百人諸王為都督者各徙其國使相近東晉元帝時後軍将軍應詹上疏陳便宜曰先王設官使君有常尊臣有定卑上無茍且之志下無覬覦之心下至亡秦罷侯置守本替末陵綱紀廢絶漢興雖未能興復舊典猶雜建侯守故能享年享世殆參古迹今大荒之後制度改創宜因斯㑹釐正憲則先舉盛徳元功以為封首則聖世之化比隆唐虞矣後魏大武帝時方士祁纎奏立四王以日東西南北為名欲以致禎吉除災異詔司徒崔浩與學士議之浩對曰先王建國以作藩屏不應假名以為其福夫日月運轉周歴四方京都所居在於其内四王之居實奄邦畿名之則逆不可承用孝明帝時詔訪寃屈光禄大夫右丞張普惠上疏曰詩稱文王孫子本支百世易曰大君有命開國承家皆所以明徳睦親維城作翰漢祖封爵之誓曰使黄河如帶太山如礪國以永存爰及苖裔又申之以丹書之信重之以白馬之盟其以彊大分王罪犯蹙邑者盖有之矣未聞父基子構世載忠賢一死一削用為恒典者也故尚書令臣肇未能逺稽古義近究成㫖以初封之詔有親王二千户始蕃一千户二蕃五百户三蕃三百户謂是親疎世減之法又以開國五等有所減之言以為世減之趣遂立格奏奪稱是髙祖本意仍被㫖可差謬之来亦已甚矣遂使勲親懐屈幽顯同寃紛訟彌年莫之能息臣輙逺研㫖格深窮其事世變減奪今古無據又尋詔書稱昔未可采今始列璧疑豈得混一内分天地也故樂良樂安同蕃異封廣陽安豐屬别户等安定之嫡邑齊親王河間戚近更従蕃食是乃太和降㫖初封之倫級勲親兼樹非世減之大驗者也博陵襲爵亦在泰和之年時不世減以父嘗全食足户充本同之始封減從今式如此則減者減其所足之外足者足其所減之内減足之㫖乃為所貢所食耳欲使諸王開國弗專其民賦役之差貴賤有等盖準擬周禮公侯伯子男貢税之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減户故始封承襲俱稱所減減謂減之以貢食謂食之於國斯實髙祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差㫖又判之以開訓所減之㫖可以不疑於世減矣而臣肇弗稽徃事曰五等有所減之格用為世減之法以王封有親疎之等謂是代削之條妄解成㫖雷同世奪以此毒天下民其従乎故太傅任城文宣王臣澄樞弼累朝識洞今古為尚書之日殷勤執請孜孜於重議被㫖不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曽𤣥不治未恤嫡封則爵禄無窮支庶則属内貶絶儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫並訟其切陳訴之按盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣猥忝今任於兹五年推尋㫖格謂無世減之理請近遵髙祖減食之謨逺循百代象賢之誥退由九伐進從九儀則刑罰有倫封不虚黜斯乃文王所以克慎不敢侮於鰥寡而況於公侯伯子男乎今㫖訪寃滯愚以此為大者求尋光錫之詔并諸條格所奪所請事事窮審諸王開國非犯罪削奪者並求還復其昔嘗全食足户充本減従令式者従前則力多於親懿全奪則減足之格不行愚謂禄力並應依所封之食而食之若是則力少蕃王粟帛仍本户邑雖盈之減兩秦既有全食足户之異故不得同於新封之力耳親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民可不慎乎親親以睦族其可棄乎如脱蒙允求以㫖判為始其前来吏秩悉年久不追隋髙祖踐阼命奉車都尉于宣敏撫慰巴蜀及還上疏曰臣聞開磐石之宗漢室於是惟永建維城之固周祚所以靈長昔秦皇置牧守而罷諸侯魏后暱諂邪而疎骨肉遂使宗社移於他族神器傳於異姓此事之明甚於觀火然山川設險非親勿居且蜀土沃饒人物殷阜西通卭僰南屬荆巫周徳之衰兹土遂成戎首炎政失御此物便為禍先是以明者防於無形治者制其未亂方可慶隆萬世年踰七百伏惟陛下日角龍顔膺樂推之運參天貳地居揖讓之期億兆宅心百神受職理須樹建蕃屏封植子孫繼周漢之宏圖改秦魏之覆軌抑近習之權勢崇公族之本支但三蜀三齊古稱天險分王戚屬今正其時若使利建合宜封樹得所巨猾息其非望姦臣杜其邪謀盛業鴻基同天地之長乆英聲茂實齊日月之照臨臣雖學謝多聞然情深體國輙申管見戰灼惟深帝嘉納之唐太宗即位初上皇欲彊宗室以鎮天下自三従昆弟以上雖童孺皆為王上問羣臣徧封宗子於天下利乎封徳彛以為令封爵太廣恐非所以示天下至公上曰然朕為天子所以養百姓也豈有勞百姓以養已之宗族乎降封宗室郡王皆為縣公貞觀十一年太宗以周封子弟八百餘年秦罷諸侯二世而滅吕后欲危劉氏終賴宗室獲安封建親賢當是子孫長久之道乃定制以子弟荆州都督荆王元景安州都督呉王恪等二十一人又以功臣司空趙州刺史長孫無忌尚書左僕射宋州刺史房𤣥齡等一十四人並為世襲刺史禮部侍郎李百藥奏論以駮世封事曰臣聞經國庇民王者之常制尊主安上人情之大方思聞理定之規以𢎞長世之業萬古不易百慮同歸然命厯有賖促之殊邦家有理亂之異遐觀載籍論之詳矣咸云周過其數秦不及期存亡之理在於郡國周氏以鑒夏殷之長久遵皇王之並建維城磐石深根固本雖王綱弛廢而枝榦相持故使逆節不生宗祀不絶秦氏背師古之訓棄先王之道翦華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號呼而七廟隳圯臣以為自古皇王君臨宇内莫不受命上𤣥册名帝籙締搆遇興王之運殷憂屬啓聖之期雖魏武攜養之資漢髙徒役之賤非止意有覬覦推之亦不能去也若其獄訟不歸菁華已竭雖帝堯之光被四表大舜之上齊七政非止情存揖讓守之亦不可焉以放勲重華之徳尚不能克昌厥後是知祚之長短必在於天時政或興衰有關人事隆周卜世三十卜年七百雖淪胥之道斯極而文武之器尚存斯龜鼎之祚已懸定於杳㝠也至使南征不反東遷避逼禋祀闕如郊畿不守此乃陵夷之漸有累於封建焉暴秦運距閏餘數終百六受命之主徳異禹湯繼世之君才非啓誦借使李斯王綰之輩咸開四履將閭子嬰之徒俱啓千乘豈能逆弟子之勃興抗龍顔之基命者也然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯王畿千里之間俱為采地是則結繩之化行虞夏之朝用象刑之典治劉曹之末紀綱弛紊斷可知焉鍥船求劔未見其可膠柱成文彌多所惑徒知問鼎請隧有懼勤王之師白馬素車無復藩維之援不悟望夷之釁未堪羿浞之灾髙貴之殃寧異申胥之酷此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸微始自藩屏化為仇敵家殊俗國異政强陵弱衆暴寡疆場彼此干戈侵伐狐駘之役女子盡髽卲陵之師隻輪不反斯盖畧舉一隅其餘不可勝數陸士衡方規規然云嗣王要其九鼎凶族據其天邑天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循良之才膺共治之寄刺舉分竹何世無人至使地或呈祥天不愛寶民稱父母政比神明曹元首區區然稱與人共其樂者必急其憂與人同其安者必拯其危豈容以為侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國籍其門資忘其先業之艱難輕其自然之崇貴莫不世増淫虐代益驕侈離宫别館切漢凌雲或形人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徴舒衛宣則父子聚麀終誅壽朔乃云為己思治豈若是乎内外羣官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸禄不入私門妻子不之官舎班條之貴食不舉火剖符之重衣惟補葛南陽太守敝布囊身莱蕪縣長凝塵生甑專知為利圖物何其爽歟總而言之爵非世及用賢之路斯廣民無定王附下之情不固此乃愚智所辨安可惑哉至如滅國弑君亂常干紀春秋二百年間畧無寧嵗次睢上音雌下音疽咸秩遂用玉帛之君魯道有蕩每等衣裳之㑹從使西漢哀平之際東洛桓靈之時下吏淫暴必不至此為政之理可以一言蔽焉伏惟陛下握紀御天應期啓聖救億兆之焚溺掃氛祲於寰區創業垂統配二儀以立徳發號施令妙萬物而為言獨照宸𠂻永懐前古将復五等而脩舊制建萬國以親諸侯竊以漢魏已還餘風之弊未盡勲華既徃至公之道斯革況晉氏失御㝢縣崩離後魏乗時華夷雜處重以關河分阻呉楚懸隔習文者學長短縦横之術習武者盡干戈戰争之心畢為狙詐之階彌長澆浮之俗開皇在運因藉外家驅御羣英任雄猜之數坐移明運非克定之功年踰二紀人不見徳及大業嗣立世道交喪一人一物掃地将盡雖天縦神武削平寇虐兵威不息勞心未康自陛下頃順聖慈嗣膺寶歴情深致理綜覈前王雖至道無名言象所絶畧陳梗槩實所庶幾愛敬蒸蒸勞而不倦大舜之孝也訪安内䜿親嘗御膳文王之徳也毎憲司讞罪尚書奏獄大小必察枉直咸舉以斷趾之法易大辟之刑仁心隠惻貫徹幽顯大禹之泣辜也正色直言虚心受納不簡鄙訥無棄芻蕘帝堯之求諫也𢎞奨名教勸勵學徒既擢明經於青紫将升碩儒於卿相聖人之善誘也羣臣以宫中暑濕寢膳或乖請移御髙明營一小閣遂惜家人之産竟抑子来之願不吝隂陽之感以安卑陋之居頃嵗霜儉普天飢饉喪亂甫爾倉廪空虚聖情矜愍勸加賑恤竟無一人流離道路猶且食惟藜藿樂徹簨虡言必悽動貎成癯瘦公旦喜於重譯文命矜其即序陛下毎見四夷欵附萬里歸仁必退思進省凝神動慮恐妄勞中國以求逺方不籍萬古之英聲以存一時之茂實心切憂勞跡絶逰幸毎旦視朝聽受無倦智周於萬物道濟於天下罷朝之後引進名臣討論是非備盡肝膈惟及政事更無異詞纔日昃必命才學之士賜以清閒髙談典籍雜以文詠間以𤣥言乙夜忘疲中宵不寐此之四道獨邁徃初斯實生民以来一人而已𢎞兹風化昭示四方信可以期月之間彌綸天壤而淳粹尚阻浮詭未移此由習之永久難以卒變請待雕琢成器以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉易稱天地盈虚與時消息況於人乎美哉斯言也中書舎人馬周又上疏曰伏見詔書令宗室勲賢作鎮藩部貽厥子孫嗣守其政非有大故無或黜免臣竊惟陛下封植之者誠愛之重欲其𦙍裔承守為國無疆可使世官也何則以堯舜之父猶有朱均之子況下此已還而欲以父取子恐失之逺矣儻有孩童嗣職萬一驕逸則兆庶被其殃而國家受其敗政欲絶之也則子文之理猶在政欲留之也而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於己亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有材行隨器方授則翰翮非强亦可以獲免尤累昔漢光武不任功臣以吏事所以終全其世者良由得其術也願陛下深思其宜使夫得奉天恩而子孫終福禄也太宗並嘉納其言於是竟罷子弟及功臣世襲刺史也太宗問左僕射蕭瑀朕欲長保社稷柰何瑀曰三代有天下所以能長乆者𩔖封建諸侯以為藩屏秦置守令二世而絶漢分王子弟享國四百年魏晉廢之亡不旋跬此封建之有明效也帝納之始議封建太宗令羣臣議封建魏徴議曰若封建諸侯則卿大夫咸資俸禄必致厚歛又京畿賦税不多所資畿外若盡以封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵地内難以犇赴宋神宗時蘇頌上論王公封爵故事䟽曰唐令王正一品嗣王郡王國公從一品正元二年五月勅御史中丞竇參等奏文武官辭見宴集請依天寳三年禮部詳定勅親王嗣王任卑官職事仍依王品郡王任三品以下職事者在同階品上自外無文武官者嗣王在太子太保下郡王次之國公在正三品下郡公在從三品下縣公在正四品下正元四年五月勅御史中丞竇參等奏文武官辭見爵雖髙官或下列於上官之上非制也自今已後宜列於本官班之上正元二十一年五月勅御史臺奏准公式令諸文武官朝叅行立各依本職事官品為叙縁有檢校官髙職事卑及嗣王郡王任職事官髙卑不等今請應檢校僕射及尚書以上及嗣王郡王任職事官者一切在職事本品之上已上書見禮閣新儀國朝故事惟親王恩禮優異外餘郡王嗣王國公郡公縣公皆無異禮惟立班在本官之上又唐諸侯王薨子得襲封為嗣王永徽元年濮王泰薨立其子欣為嗣濮王垂拱初章懐太子賢薨授其子守禮太子洗馬為嗣雍王嗣王薨子皆襲封嗣韓王納官至員外祭酒卒以其子璩為韓王國于員外司業有不襲封者嗣曹王臯薨子道古為朝官不襲封有降爵為公侯者荆王元景坐法貶死追封沈黎王以渤海王子長沙嗣仍降為侯嗣楚王靈䕫薨子福嗣降爵為公有初但為嗣後數年乃封嗣王者嗣舒王津天寳二年卒子藻嗣至天寳九載封嗣舒王有由嗣王而遷郡王者其帶職事官有為國子員外祭酒司業者韓王納并子璩之𩔖有加銀青階者景龍四年嗣鄭王希言等一十四人並加銀青光禄大夫有為諸衛將軍者嗣霍王暉開元中左千牛員外将軍有為員外洗馬者嗣徐王茷卒子延年除員外洗馬為嗣徐王有為宗正卿及州郡上佐官者皆出朝廷一時之命即無定制其恩禮厚薄以封户多少為限中葉以後封户皆為虚名今所不用本朝未有嗣王之號若欲封拜謂宜先委禮官及兩省參詳定制然後行之哲宗時宣徳郎華鎮上言曰世或有謂周以封建而天下强其弊也陵奪秦以郡縣而天下弱其弊也土崩漢封同姓矯枉過正數十年間七國内向孝武分析侯國削弱已甚强臣無憚坐移龜鼎唐重方鎮浸以强大久而不變至於滅亡因謂法有必弊國有定勢法弊而勢偏不知矯革數十年之後則患不可支矣是果然乎抑亦未然乎夫漢初列國過制孝文盛時賈生已患之矣厥後諸侯微弱不與政事武宣之間已與哀平時𩔖矣唐世方鎮強大天寳末年范陽干紀不在數世之後彼制置之失者也禍亂之幾其初皆已暴見第未有強者發之爾茍有强者則如范陽之起於天寳此賈傅所謂火未及燃者也是豈百年之形勢哉不足引以為論至於周室封建秦人郡邑亦非所以制國勢之强弱定脩短之期數者也試粗言之周建萬國親賢並任列爵惟五分土惟三大者無不掉之勢小者有自全之力維之以法統之以道率職有功則慶賞必至犯分陵制則刑誅隨之方其盛時如指臂之附支體莫見陵奪之漸也後世浸强不可制役者由天子失道王法不行征法自專并吞無禁縦之使大也使穆王無耄荒之政夷王無下堂之失厲王無板蕩之風幽王無淫昏之行守文武之成法無所失墜雖萬世如成康之隆可矣何陵奪之有哉若曰封建之勢必至於强不可制厲王之時諸侯已强大矣宣王将不能復㑹於東都因其力以南征北伐復文武之業矣秦置郡邑守令分治漢家因之與侯國並建文景而上諸侯强大僭亂不軌無屏翰之益孝武而下列國㣲弱等於郡邑無磐石之勢東京郡國輕重相若不足以維持然而兩漢用之四百餘年天下安寧不見土崩之弊秦人所以二世而亡者頻征逺戍厚賦重役人不見徳而惟繁苛慘切之痛以失天下之心也由始皇二世之道而為政雖建萬國親諸侯殆無救於亂亡若曰郡縣之勢必至於孤弱而土崩文景武宣世祖明章之時将不能康民阜物講道息刑比隆成周之盛矣由是言之天下有道封建郡邑皆足以底平治而保無患天下無道封建則陵奪郡邑則土崩制國之勢果在封建乎在郡縣乎人主務隆道而已主道世隆則天下世治俯而師二漢文景明章之主也仰而遵商周湯武成康之君也尚何土崩陵奪之有哉湯之法非不善也傳之五世至小甲而商道衰文武之法非不善也傳之四世至昭王而王室弱西漢之法不美於三代也傳之七世至宣帝而愈盛東漢之法不劣於西京也傳之四世至和帝而浸㣲唐之法亦二漢之比也傳之四世至中宗而䘮其寳聖賢不世主道弗隆則禹湯文武之法不過一再傳而衰㣲中智之君繼世有為振隆主道則髙祖孝文之法行六七世而愈盛盖安其位而忘危者天下雖甚安而危常及之保其存而忘亡者天下雖甚固而亡常及之有其治而忘亂者天下雖甚治而亂常及之夏商之君保有成業而不知懼輕為逸豫而重為興造輕為逸豫則多過失重為興造則鮮功徳功徳不見而過失日加危亂䘮亡之所由至也西漢之主不忘危亂而知自勉輕為興造而重為逸豫輕為興造則有功徳重為逸豫則無過失過失不作而功徳日增治安存固之所由至也國家藝祖以成湯之勇智周武之聖徳受天休命戡定大業身及太平紀綱法度經制施設之方所以埀裕貽謀者固已跨絶漢唐簡雜之術兼該四代久大之美矣太宗平晉征燕王業大定敦崇教化光濟丕烈真宗緫文武之兩端合威徳以並用震疊殊俗協和中夏禮樂既備然後告成岱宗祈榖后土垂拱乎法宫之中明堂之上味廣成之訓師黄帝之治以清静無為涵養天下仁宗檢身以儉撫民以慈敬賞慎罰視之如赤子生而不傷厚而不困扶而不危節而不盡舉三王之善政以寵天下四十餘年生靈熈熈如在春臺之上英宗挺睿哲之資知人間之利病即位之日振權綱修法度慨然有興造之意雖享國未久而規模宏逺矣神宗繼文考之志述文考之事宵衣旰食厲精庶政發明道術講修武備制作日新典章咸舉表飾治具奮揚聲采炳炳然三代之文物澟澟然中夏之威稜帝王事業益可觀矣今慈母與陛下復以仁恕忠厚之徳濟之神聖相承兢兢業業視已治如未治視已安如未安克艱克勤世有興作故百三十餘嵗而主道益隆天下益治三代之盛未之有矣考之以古準之以今國之强弱盛衰本無形勢之可定顧人主之徳何如爾人主務明徳以隆道隆道而盛大之業固矣區區形勢之論何足道哉知太常禮院劉攽上奏曰臣等伏見周禮封爵諸侯皆有命書典䇿又有約劑書於宗彛及漢封功臣亦有丹書鐵契藏之宗廟誠以封爵之事傳世無窮不可不慎重其禮且以防後世之争辨也本朝慶歴中始為諸王置後傳襲其時上恩雖厚而有司典䇿不備約束不明昨因邢國公世永亡殁冀王越王兩宫争訟尋求故事以斷是非自中書宗正寺禮院史院皆無文書可以討論然亦非有司有所墜失也臣等以謂諸宫傳襲封國者甚多今不為造作約束恐後日常有紛競不已宗室争辨薄義傷化甚非美事本朝制度雖不盡用三代自當因宜立憲著為律令使可遵守藏之大宗副在中書太史禮官貳之合於周禮之宗彛約劑漢氏之丹書鐵契傳示無窮於體甚便欲望朝廷特賜詳酌下禮官等叅議施行畢仲㳺上言曰聖人治天下其經制不啻萬事而萬事之中其經制有大且重者二焉曰封建曰郡縣也由商周以上知封建之利而不知郡縣之為利也由秦漢而下知郡縣之利而不知封建之為利也好古者喜封建而趨時者脩郡縣是以王通稱郡縣之治不知其用子厚謂封建非聖人之意而湯武不得已是好古趨時之説不同也然世更數十或治或亂或强或弱或久或促未有能出此二者之經制也故封建則為諸侯郡縣則為牧守諸侯則其勢重牧守則其勢輕今知勢輕之易御而不知勢重之易治此子厚所以惑封建不如郡縣者也夫三代之上諸侯之勢非不重也三代而下牧守之勢非不輕也然至於末世晚路則皆歸於亂亡是故不繫於勢輕勢重而繫於為上者善惡得失也為上者事善而得則勢雖重不敢怙重而逆也為上者事惡而失則勢雖輕不肯守輕而順也二者之路其弊如一然其治則郡縣之勢不若封建而乆且完也以久完之勢而終亦有弊者是皆失封建之本意也昔唐虞之封建世傳萬國不知有封建之弊也商之封建世傳千七百有餘國亦不知有封建之弊也周之封建世傳八百國而後卒有封建之弊非封建之罪也為上者不善而封建之意已失也故其始則國裂八百益衰則併為數十又併而為十二又併而為九又併而為六遂皆併於秦而周始亡矣使周無甚愚之主而不失封建之本意制八百國之衆而不使相併始有相併則代而更封之國衆而易治力小而易御則封建安有不善哉不然則秦取李斯之議去天下諸侯分為三十六郡置郡守與尉監二世而易姓者郡縣不如封建一也漢以同姓異姓雜建為諸侯郡守因主父之説又以計弱同姓故社稷奪於王氏郡縣不如封建二也自魏而下盡剗封建之迹一以郡縣為治郡縣之力不足計其强弱故未有不奪於强臣者是郡縣不如封建三也豈惟郡縣之勢不如封建哉唐自天寳以後常變郡縣為藩鎮而大借其權矣及正元之間藩鎮節度勢强而力驕故無朝貢之禮無生殺之情天子為賜鐵劵尚宗室而無益也以詔削以兵征而無功也無封建之益而有封建之禍是方鎮亦不如封建之效也且外强者封建也外弱者郡縣也外强則患生於外外弱則患生於内患生於外者内可以制而禍遟患生於内者外不可制而禍速然則封建可以制外患而郡縣不可以制内禍也何以知封建之可以制外患也封建者為諸侯諸侯者為國國則有君也有臣也有士民也有鄰國也有上下相維左右相持畏義而不敢易動也易動則臣或不従也士民或不信也鄰國或不聽也不従則深諫不信則上告不聽則力禦如封建不失其本意國衆而勢小有易動者以天子之師因其深諌上告力禦之一端則易制矣是故知封建之可以制外患也何以知郡縣之不可以制内禍也郡縣者為牧守牧守者為外臣外臣則無大勢也無專兵也無擅制也内有强臣之變變而不知知而不敢擅動强臣以牧守之權不足忌於外於内則日月劘削朝夕用力而已矣是故知郡縣之不可以制内禍也不徒有可制不可制之形且又有可治不可治之實焉故封建則經界易均税賦易平榖禄易分官吏易擇兵民易立郡縣則經界不能均税賦不能平榖禄不能分官吏不能擇兵民不能立是又可治不可治之實也是以二者之勢始則同歸於無事而封建歸可治也末則同歸於亂亡而封建歸可久也如上得其本意而善守則可久之患亦無有也故可久之患生於上失其本意而不善守如不善守則雖郡縣亂愈速也是郡縣不如封建之明説也今夫常人之家必鑿其井矣是井者家家不可無而有不可益者也使或有狂子蹈之而死則井非徒無益亦有損矣然不以狂子之蹈而廢井者知非井罪也今以諸侯之不順不責上不能守其本意而責封建是由并溺狂子不責狂子之蹈而廢井也豈不過哉若夫方鎮則最無説也小其權則與郡縣無異而不足以蔽難大其權則徒有封建之勢而無君臣民庶鄰國之畏此唐亡之計而五代求禍之途也今國家上鑒三代之封國二漢之雜建秦魏晉周隋之郡縣唐五代之方鎮而方鎮患又切而近故痛絶方鎮節度無益之勢而使京官朝吏皆得出長郡縣至於百年無事矣信得其道也然今或意州縣之權輕而東南不可不慮者非徒事未然也前日貝州之役智髙之軍是權輕之害東南之禍已效者也今必欲變更則莫若封建必欲因循則莫若郡縣方鎮之患則已去矣然封建之勢非四夷無慮畜積豐富兵力盛强臣有異姓之良同姓之賢則不可暴去郡縣之久制而卒為也若守郡縣之常法則弊不生於今日必成於後世不可不改也為今之䇿若以貴臣之賢者然後出為守以宗屬之賢者然後封為侯如皇漢之雜建而大不使至七國之强小不使如長沙之弱京官朝吏更為令丞而佐治之是變更而不暴因循而有改者也及乎四夷益服積儲益富兵力益衆良臣賢戚益衆然後大割而衆建以天下為千國上立其法而守其全恩結兵御不使有能相并者是萬世之計而得其本意也歴代名臣奏議卷一百四
