body:
  text: 歷代名臣奏議卷二十七明楊士奇等撰治道唐髙祖時國制草具多仍隋舊太史令傅奕謂承亂世之後當有變更乃上言龍紀火官黃帝廢之咸池六英堯不相沿禹弗行舜政周弗襲湯禮易稱已日乃孚革而信也故曰革之時大矣哉有隋之季違天害民專峻刑法殺􅓍賢俊天下兆庶同心叛之陛下撥亂反正而官名律令一用隋舊且懲沸羮者吹冷韲傷弓之鳥驚曲木況天下久苦隋暴安得不新其耳目哉改正朔易服色變律令革官名功極作樂治終制禮使民知盛德之隆此其時也然官貴簡約夏后官百不如虞氏五十周三百不如商之百又曰夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑衛鞅為秦制法增鑿顛抽脅鑊烹等六篇始皇為挾書律此失於煩不可不監太宗即位張玄素為録事參軍問以政對曰自古未有如隋亂者得非君自專法日亂乎且萬乘之尊身決庶務日斷十事五不中中者信善有如不中者何一日萬機積其失不亡何待若上賢右能使百司善職則髙居深拱疇敢犯之隋末盜起爭天下者不十數餘皆保城邑以須有道聽命是欲背上怙亂者果鮮特人君不能安之而挻之亂也以陛下聖神迹所以危鑒所以亡日慎一日雖堯舜何以加帝曰善貞觀初太宗從容謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右僕射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而會周室雖微六國無罪秦氏專任智力蠶食諸侯平定雖同人情則異太宗曰不然周既克殷務𢎞仁義秦既得志專行詐力非但取之有異抑亦守之不同祚之修短意在兹乎上又謂蕭瑀曰朕少好弓矢自謂能盡其妙近得良弓十數以示弓工乃曰非良材也朕問其故工曰木心不正則脈理多斜弓雖剛徑而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓矢多矣而猶不得其理况朕有天下之日淺得為理之意固未及弓弓猶失之而況於理乎自是詔京官五品以上更宿中書內省每召見皆賜坐與語詢訪外事務知百姓利害政教得失焉二年太宗問王圭曰近代君臣理國多劣於前古何也對曰古之帝王為政皆志尚清淨以百姓心為心近代則惟損百姓以適其欲所以任用大臣復非經術之士漢家宰相無不精通一經朝廷若有疑事皆引經史決定由是人識禮教理致太平近代重武輕儒或參以法律儒行既虧淳風大壞太宗深然其言自此百官中有學業優長兼識政體者多進其階品纍加遷擢焉上又謂侍臣曰朕謂離亂之後風俗難移比觀百姓漸知廉恥官人奉法盜賊日稀故知人無常俗但政有治亂耳是以為國之道必須撫之以仁義示之以威信因人之心去其苛刻不作異端自然安靜公等宜共行斯事也太宗謂房玄齡曰朕所居殿隋文帝造已經四十餘年損壞處少唯承乾殿是煬帝造工多覔新奇斗拱至小年月雖近破壞巳多今為政更欲别作意見亦恐似此屋耳徵對曰昔魏文侯時租賦歲倍有人致賀文侯曰今戶口不加租賦歲倍此由課斂多譬如皮熟之令大則薄令小則厚理人當亦如此由是魏國大化臣今量之陛下為政百夷賓服天下巳安但須守今日化道亦歸之於厚此即是已足也太宗謂侍臣曰傳稱去食存信孔子曰人無信不立昔項羽既入咸陽已制天下向使能行漢髙之仁信誰奪耶房玄齡對曰仁義禮智信謂之五常廢一不可能勤行之甚有禆益殷紂狎侮五常而武王伐之項氏以無仁信為漢祖所奪皆誠如聖旨上謂房玄齡等曰朕比見隋代遺老咸稱髙熲善為相者遂觀其本傳可謂公平正直尤識治體隋室安危繫其存沒煬帝無道枉見誅夷何嘗不想見其人廢書歔歎又漢魏以來諸葛亮為丞相亦甚平直亮嘗表廢廖立李嚴於南中立聞亮卒泣曰吾其左袵矣嚴聞亮卒發病而死故陳夀稱亮之為政開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者若如是則榮名髙位可以長守玄齡對曰臣聞理國要道實在公平正直故尚書云無偏無黨王道蕩蕩無黨無偏王道平平又孔子稱舉直錯諸枉則民服今聖慮所尚誠足以極政教之源盡至公之要囊括區宇化成天下太宗曰此直朕之所懷豈有與卿等言之而不行也四年房玄齡奏言今閲武庫甲仗勝隋日逺矣太宗曰飭兵備寇雖是要事然朕惟欲得卿等存心治道務盡忠貞使百姓安樂便是朕之甲仗隋煬帝豈無甲仗適足以致滅亡正由仁義不修而羣下怨叛故也宜識此心常以德義相輔時上謂公卿曰朕端拱無為四夷咸服豈朕一人之所致實賴諸公之力耳當思善始令終永固鴻業子子孫孫遞相輔翼使豐功厚利令數百年後讀我國史鴻勳茂業粲然可觀豈唯稱隆周盛漢及建武永平故事而已哉房玄齡進曰陛下撝挹之志推功羣下致理升平本關聖德臣下何力之有唯願陛下有始有卒則天下永賴太宗又曰朕觀古先撥亂之主皆年餘四十唯光武年三十三但朕年十八便舉兵年二十四遂平天下年二十九升為天子此則武勝於古也少從戎旅不暇讀書貞觀以來手不釋卷知風化之本見政理之源行之數年天下大理風移俗變子孝臣忠此又文過於古也昔周秦以降戎狄內侵今戎狄稽顙皆為臣妾此又懷遠勝古也此三者朕何德以堪之既有此功業何得不善始慎終邪五年上謂侍臣曰自古帝王亦不能常化假令內安必有外擾當今逺夷率服百榖豐稔賊盜不作內外寧靜此非朕一人之力實由公等共相匡輔然安不忘危理不忘亂雖知今日無事亦須思其終始常得如此始是可貴魏徵對曰自古已來元首股肱不能備具或時君稱聖臣即不賢或遇賢臣即無聖主今陛下聖明所以致理向若真有賢臣而君不思化亦無所益天下今雖太平臣等猶恐未以為喜惟願陛下居安思危孜孜不怠耳六年上謂侍臣曰看古之帝王有興有衰猶朝之有暮皆為蔽其耳目不知時政得失忠正者不言邪諂者日進既不見過所以至於滅亡朕既在九重不能盡見天下事故布之卿等以為朕之耳目莫以天下無事四海安寧便不存意書云可愛非君可畏非民天子有道則人推而為主無道則人棄而不用誠可畏也魏徵對曰自古失國之主皆為居安而忘危處理而忘亂所以不能長久今陛下富有天下內外清晏能留心治道常臨深履薄國家歷數自然靈長臣又聞古語云君舟也人水也水能載舟亦能覆舟陛下以為可畏誠如聖旨時上謂長孫無忌等曰朕躬即位之初有上書者非一或言人主必須威權獨運不得委任羣下或耀兵振武威攝四夷唯有魏徵勸朕偃革興文布德施惠中國既安逺人自服朕從其語天下安寧絶域君長皆來朝貢九夷重譯相望於道凡以此等事皆魏徵之力也朕之任用豈不得人徴拜謝曰陛下聖德自天留心政術臣以庸短承受不暇豈有所益七年上與祕書監魏徵從容論自古治政得失因曰當今大亂之後造次不可致治徵曰不然凡人在危困則憂死亡憂死亡則思治思治則易教然則亂後易教猶飢人易食也太宗曰善人為邦百年然後勝殘去殺大亂之後將求致治寧可造次而望乎徵曰此據常人不在聖哲若聖哲施化上下同心人應如響不疾而速期月而可理信不為難三年成功猶謂其晚太宗以為然左僕射封德彛等對曰三代之後人漸澆訛故秦任法律漢雜霸道皆欲理而不能豈能理而不欲若信魏徵所説恐敗亂國家徵曰五帝三王不易人而治行帝道則帝行王道則王在於當時所理化之而已考之載籍可得而知昔黃帝與蚩尤七十餘戰其亂甚矣既勝殘之後便致太平九黎亂德顓頊征之既克之後不失其理桀為亂虐而湯放之在湯之代即致太平紂為無道武王伐之成王之代亦致太平若言人漸澆訛不及純朴至今應悉為鬼魅寧可復得而教化耶德彞等無以難之然咸以為不可矣太宗每力行不倦數年間海內康寧突厥破滅謂羣臣曰貞觀初人皆異論云當今必不可行帝道王道惟魏徴勸我既從其言不過數載遂得華夏安寧逺戎賔服突厥自古以來常為中國勍敵今酋長並帶刀宿衛部落皆襲衣冠使我遂至於此皆魏徵之力顧謂徵曰玉雖有美質在於石間不值良工琢磨與瓦礫不别若遇良工即為萬代之寶朕雖無美質為公所切磋勞公約朕以仁義𢎞朕以道德使朕功業至此公亦足為良工爾九年北蕃歸朝人奏稱突厥內大雪人飢羊馬並死中國人在彼者皆入山作賊人情大惡太宗謂侍臣曰觀古人君行仁義任賢良則理行暴虐任小人則亂突厥所信任者並共公等見之略無忠正可取者頡利復不憂百姓恣情所為朕以人事觀之亦何可久矣魏徵進曰昔魏文侯問李克諸侯誰先亡克曰吳先亡文侯曰何故克曰數戰數勝數勝則主驕數戰則民疲主驕民疲不亡何待頡利逢隋末中國喪亂遂恃衆內侵今尚不息此其必亡之道太宗深然之十一年特進魏徴上疏曰臣聞書曰明德慎罰惟刑恤哉禮云為上易事為下易知則刑不煩矣上多疑則百姓惑下難知則君長勞矣夫上易事則下易知君長不勞百姓不惑故君有一德則臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯起當今道被華戎功髙宇宙無思不服無逺不臻然言尚於簡文志在於明察刑賞之用有所未盡夫刑賞之本在於勸善而懲惡帝王之所以與天下為畫一不以親疏貴賤而輕重者也今之刑賞未必盡然或屈伸在乎好惡或輕重由乎喜怒遇喜則矜其情於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢痕可求則刑斯濫矣毛羽可出則賞固謬矣刑濫則小人之道長賞謬則君子之道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老威怒所至則取法於申韓直道而行非無三黜危人自安蓋亦多矣故道德之音未𢎞刻薄之風已扇夫刻薄既扇則下生百端人競趨時則憲章不一稽之王度實虧君道昔州犂上下其手楚國之法遂差張湯輕重其心漢朝之刑已弊以人臣之頗僻猶莫能伸其欺罔況人君之髙下將何以措其手足乎以睿聖之聰明無幽微之不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂遂忘先笑之變禍福相倚吉凶同域唯人所召安可不思頃者責罰稍多威怒微厲或以供張不贍或以營作差違或以物不稱心或以人不從命皆非致治之所急實恐驕奢之攸漸是知貴不與驕期而驕自至富不與侈期而侈自來非徒語也且我之所代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府藏譬今日之資儲以隋氏之甲兵況當今之士馬以隋氏之戶口校今日之百姓度長比大曾何等級然隋氏以富強而喪敗動之也我以貧寡而安寧靜之也靜之則安動之則亂人皆知之非隱而難見也非微而難察也然鮮蹈平易之塗多遵覆車之轍何哉在於安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至於將受􅓍辱竟未悟其滅亡之所由也可不哀哉鑒形之美惡必就於止水鑒國之安危必取於亡國故詩曰殷鑒不逺在夏后之世又曰伐柯伐柯其則不逺臣願當今之動靜必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜欲以從人省遊畋之娛息靡麗之作罷不急之務慎偏聽之怒近忠厚逺便佞杜恱耳之邪説甘苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪已惜十家之産順百姓之心近取諸身恕以待物思勞謙以受益不自滿以招損有動則庶類以和出言而千里斯應超上德於前載樹風聲於後昆此聖哲之宏規帝王之大業能事斯畢在乎慎守而已夫守之則易取之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢淫溢動之也慎終如始可不勉歟易曰君子安不忘危治不忘亂存不忘亡是以身安而國家可保誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若能以當今之無事行疇昔之恭儉則盡善盡美固以無得而稱焉太宗深嘉而納用之十三年上謂侍臣曰林深則鳥棲水廣則魚遊仁義積則物自歸之人皆知畏避災害不知行仁義則災害不生夫仁義之道當思之在心常令相繼若斯須懈怠去之巳逺猶如飲食資身恆令腹飽乃可存其性命王圭頓首曰陛下能如此言天下幸甚十四年以髙昌平召侍臣賜宴於兩儀殿上謂房玄齡等曰髙昌若不失臣禮豈至滅亡朕平此一國甚懷危懼惟當戒驕逸以自防納忠謇以自正黜邪佞用賢良不以小人之言而議君子以此慎守庶幾於獲安也魏徵進曰臣觀古來帝王撥亂創業必自戒慎採芻蕘之議從忠讜之言天下既安則恣情肆欲甘樂諂諛惡聞正議張子房漢王畫計之臣及髙祖為天子將廢嫡立庶子房曰今日之事非口舌所能爭也終不敢復有開説況陛下功德之盛以漢祖方之彼不足準即位十有五年聖德光被今又平殄髙昌屢以安危繫意方欲納用忠良開直言之路天下幸甚昔齊桓公與管仲鮑叔牙寧戚四人飲桓公謂叔牙曰盍起為寡人夀乎叔牙捧觴而起曰願公無忘出在莒時使管仲無忘束縛於魯時使寧戚無忘飯牛車下時桓公避席而謝曰寡人與二大夫能無忘夫子之言則社稷不危矣太宗謂徵曰朕必不敢忘布衣時公不得忘叔牙之為人也十六年上謂侍臣曰或君亂於上臣理於下臣亂於下君理於上二者茍違何者為甚特進魏徵對曰君心向理則照見下非誅一勸百誰敢不畏威盡功若昏暴於上忠諫不從雖百里奚伍子胥之在虞吳不救其禍敗亡亦繼太宗曰必如此齊文昏暴揚遵彥以正道扶之得理何也徵曰遵彥彌縫暴主救理蒼生才得免亂亦甚危苦與人主嚴明臣下畏法直言正諫皆見信用不可同年而語也時魏徵陳得失疏曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其德義源不深而望流之逺根不固而求木之長德不厚而思國之理臣雖下愚知其不可而況於明哲乎人君當神器之重居域中之大將崇極天之峻永保無疆之休不念居安思危戒奢以儉德不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長也凡百元首承天景命莫不殷憂而道著功成而德厚有善始者實繁能克終者蓋寡豈取之易守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖董之以嚴刑振之以威怒終茍免而不懷仁貌恭而心不服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒將有作則思止以安人念髙危則思謙沖以自牧懼滿盈則思江海而下百川樂盤遊則思三驅以為度憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以􅍝賞罰所及則思無以怒而濫刑總此十思𢎞兹九德簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武爭馳在君無事可以盡豫遊之樂可以養松喬之夀鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉太宗手詔答曰省頻抗表誠極忠欵言窮切至披覽忘倦每達宵分非公體國情深啓沃義重豈能示以良圗匡其不及朕聞晉武帝平吳已後務在驕奢不復留心治政何曽退朝謂其子劭曰吾每見主上不論經國逺圗但説平生常語此非貽厥子孫者也爾身猶可以免指諸孫曰此等必遇亂死及孫綏果為淫刑所􅓍前史美之以為明於先見朕意不然謂曽之不忠其罪大矣夫為人臣當進思竭誠退思補過將順其美匡救其惡所以共為治也曽位極台司名器崇重當直詞正諫論道佐時今乃退有後言進無廷諍以為明智不亦謬乎顛而不扶安用彼相公之所陳也朕聞過矣當置之几案事等韋絃必望收彼桑榆期之歲暮不使康哉良哉獨盛於往日若魚若水遂爽於當今遲復嘉謀犯而無隱朕將虛襟靜志敬佇德音時上封人多請太宗親納表奏以防壅塞太宗以問魏徵徵對曰觀此人意見殊乖大體若請陛下下任百司親庶事豈唯朝堂一所則州縣之務亦須陛下親斷上曰周孔儒教非亂代之所行商韓刑法實清平之粃政道既不同固不可一槩也魏徵對曰商鞅韓非申不害等以戰國縱橫間諜交錯禍亂易起譎詐難防務深法峻刑以遏其患所以權救於當時固非致化之通軌上與貴臣宴於丹霄殿謂羣官曰為政之要務全其本若中國不靜逺夷雖至亦何所益朕與公輩共理天下令中夏乂安四方靜肅並由公等咸盡忠誠共康庶績之所致耳朕實喜之然安不忘危亦兼以懼朕見隋煬帝纂祚之初天下強盛棄德窮兵以取顛覆頡利近者足為強大意既盈滿禍亂斯及喪其大業為臣於朕葉護可汗亦大強盛自恃富貴通使求婚失道怙亂奄至破滅其子既立便肆猜忌衆叛親離覆基絶嗣朕雖不能逺慕堯舜禹湯之德目覩此輩何得不誡懼乎公等輔朕功績已成唯當慎以守之自致長保並宜勉力事有不可則須明言君臣同心何得不理魏徵對曰陛下𢎞至化安天下可謂功巳成矣然每覩非常之慶彌切慮危之心自古至慎無以加此臣聞鮑叔牙飲桓公祝曰願君無忘在莒管仲無忘在魯寧戚無忘飯牛陛下居安思危在治思亂無忘之念過叔牙之願矣臣聞上之所好下必從之明詔奬勵足使懦夫立節上謂侍臣曰計朕平定四方憂矜百姓雖不及前代哲王比煬帝故應萬倍但君臣相須事同魚水然魚不得水則不立水無魚則廢世有理亂移風易俗終自如舊固知國家唯藉臣佐及百姓共相翊戴方得保其尊榮魏徵對曰昔楚王召詹何為相何曰唯解修身不解理國王又遣使重請何曰未有身正而國不理者今逺方慕化並由陛下克已自修所以夷狄咸知效命時魏微疾太宗手詔曰不見數日憂憤甚深自顧過已多矣言巳失矣行已虧矣古人云無鏡無以鑑鬚眉可謂實也比欲自往恐勞卿所以使人來去若有聞知此後可以信來具報徵奏曰堯舜率天下以仁而人從之桀紂率天下以暴而人從之下之所行皆從上之所好今大臣進一人則疑其意故拜一人則疑其奪權欲遣其人若為展力所以契濶艱辛同其生死聞一人之言即謂可信新來言者何以明其無私又奏曰古者雖犯重罪君上每言寬宥必不獲巳方始加刑且人君之威甚於雷霆今欲加其罪則理外誣造將宥其過則法內曲辭欲求刑必寬平吏不嚴酷不可得也又奏曰帝王所重在乎定君臣明父子正夫婦三者不亂然後內外安寧比見弟子陵師奴婢忽主下多輕上皆有為而來漸不可長又奏曰君子有諸巳然後求諸人無諸巳然後非諸人所藏於身不恕而能喻諸人者未之有也今臨朝堂以至公為言退而行之乃未免私僻之事或恐有所不便聞於在下即橫加威怒以掩塞之欲人不知莫若勿為欲蓋彌彰掩之何益帝王大如天地信如四時諸葛亮小國之臣猶能開誠心布公道今之為政未能平心亦虧公道心所愛則雖僻不以為非心所嫌則雖正不見其是居人上者其身正不令而行其身不正雖令不從今每發言常疾私相請託或至小事自所未免上為下效理必然也雖加之以罪必不心服太宗稱善太宗時大理丞謝偃獻惟皇誡德賦其序大略言治忘亂安忘危逸忘勞得忘失四者人主莫不然夏桀以瑶臺為麗而不悟南巢之禍殷辛以象箸為華而不知牧野之敗是以聖人處宫室則思前王所以亡朝萬國則思已所以尊巡府庫則思今所以得視功臣則思其輔佐之始見名將則思用力之初如此則人無易心天下何患乎不化哉旦行之堯舜暮失之桀紂豈異人哉其賦蓋規帝成功而自處至難云時馬周為侍御史上奏曰臣歷觀夏商周漢之有天下傳祚相繼多者八百餘年少者猶四五百年皆積德纍業恩結於人豈無僻王賴先哲以免自魏晉逮周隋多者五六十年少者三二十年而亡良由創業之君不務仁化當時僅能自守後無遺德可思故傳嗣之主其政少衰一夫大呼天下土崩矣今陛下雖以大功定天下而積德日淺固當隆禹湯文武之道使恩有餘地為子孫立萬世之基豈特恃當年而已然自古明王聖主雖因人設教而大要節儉於身恩加於人故其下愛之如父母仰之如日月畏之如雷霆卜祚遐長而禍亂不作也今百姓承喪亂之後比於隋時才十分而一徭役相望兄去弟還往來逺者五六千里春秋冬夏略無休時陛下雖詔減省而有司不得廢作徒行文書役之如故四五年來百姓頗嗟怨以為陛下不存養之堯之茅茨土階禹之惡衣菲食臣知不可復行於今漢文帝惜百金之費而罷露臺集上書囊以為殿帷所幸慎夫人衣不曳地景帝亦以錦繡纂組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈承文景遺德故人心不搖向使髙祖之後即值武帝天下必不能全此時代差近事迹可見今京師及益州諸處營造供奉器物并諸王妃主服飾皆過靡麗臣聞昧旦丕顯後世猶怠作法於治其弊猶亂陛下少處人間知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宫不更外事即萬歲後聖慮之所當憂也臣竊尋自古黎庶怨叛聚為盜賊其國無不即滅人主雖悔未有重能安全者几修政教當修之於可修之時若事變一起而後悔之無益也故人主每見前代之亡則知其政教之所由喪而不知其身之失故紂笑桀之亡幽厲笑紂之亡隋煬帝又笑齊魏之失國也今之視煬帝猶煬帝之視齊魏也往貞觀初率土荒儉一匹絹才易斗米而天下帖然者百姓知陛下憂憐之故人人自安無謗讟也五六年來頻歲豐稔一匹絹易粟十餘斛而百姓咸怨以為陛下不憂憐之何則今營為者多不急之務故也自古以來國之興亡不由積蓄多少在百姓苦樂也且以近事驗之隋貯洛口倉而李密因之積布帛東都而王世充據之西京府庫亦為國家之用向使洛口東都無粟帛王世充李密未能必聚大衆但貯積者固有國之常要當人有餘力而後收之豈人勞而強斂之以資寇邪夫儉以息人貞觀初陛下巳躬為之今行之不難也為之一日則天下知之式歌且舞矣若人既勞而用之不息萬一中國水旱而邊方有風塵之警狂狡竊發非徒旰食晏寢而已古語云動人以行不以言應天以實不以文以陛下之明誠欲厲精為政不煩逺采上古但及貞觀初則天下幸甚昔賈誼謂漢文帝云可痛哭及長歎息者言當韓信王楚彭越王梁英布王淮南之時使文帝即天子位必不能安又言賴諸王年少傅相制之長大之後必生禍亂後世皆以誼言為是臣竊觀今諸將功臣陛下所與定天下無威略振主如韓彭者之徒難駕御者而諸王年並幼少縱其長大當陛下之日必無他心然則萬代之後不可不慮自漢晉以來亂天下者何嘗不在諸王皆由樹置失宜不豫為節制以至滅亡人主豈不知其然溺於私愛爾故前車既覆而後車不改轍也今天下百姓尚少而諸王已多其寵遇過厚者臣愚慮之非特恃恩驕矜也昔魏武帝寵陳思王文帝即位防守禁閉同獄囚焉何則先帝加恩太多故嗣主疑而畏之也此武帝寵陳思王適所以苦之也且帝子身食大國何患不富而歲别優賜曽無限極里語曰貧不學儉富不學奢言自然也今大聖創業豈唯處置見子弟而已當制長久之法使萬代奉行臣聞天下者以人為本必也使百姓安樂在刺史縣令爾縣令既衆不能皆賢但州得良刺史可矣天下刺史得人陛下端拱岩廊之上夫復何為古者郡守縣令皆選賢德欲有所用必先試以臨人或由二千石髙第入為宰相今獨重內官縣令刺史頗輕其選又刺史多武夫勳人或京官不稱職始出補外折衝果毅身力強者入為中郎將其次乃補邊州而以德行才術擢者十不能一所以百姓未安殆在于此疏奏帝稱善中書舍人髙馮列上五事以為今天下大定而刑未措何哉蓋謀猷之臣臺閣之吏不崇簡易而昧經逺故執憲者以深刻為奉公當官者以侵下為益國如尚書八坐人主所責成者也宜擇溫厚修潔者任之敦朴素革浮偽使家識慈孝人知廉恥過行者被嗤於鄉不昵者蒙擯於親自然禮節興矣陛下身帥節儉而營繕未息丁匠不能給驅使又和顧以重勞費人主所欲何求而不得願愛其財毋使殫惜其力毋使弊畿內數州京師之本土狹人庶儲畜少而科役多宜蒙優貸令得休息強本弱枝之義也至江南河北人頗舒間宜為差等均量勞逸公侯勳戚之家邑入俸稍足以奉養而貸息出舉爭求什一下民化之競為錐刀宜加懲革今外官卑品皆未得祿故飢寒之切夷惠不能全其行為政之道期於易從不恤其匱而須其廉正恐巡察歲出輶軒繼軌而侵漁不息也宜及戶口之繁倉庾且實稍加稟賜使得養父母畜妻子然後督責其效則官人畢力矣密王元曉等皆陛下懿親當正其禮比見帝子拜諸叔諸叔答拜爵封既同當明昭穆願垂訓正以為彝法書奏太宗稱善髙宗永徽初令狐德棻為太常卿髙宗嘗召宰相及𢎞文學士坐中華殿問何修而王若而霸又當孰先德棻曰王任德霸任刑夏殷周純用德而王秦專刑而霸至漢雜用之魏晉以降王霸兩失若用之王為先而莫難焉帝曰今兹何為而要對曰古者為政清心簡事為本今天下無虞年榖豐衍惟薄賦斂省征役為要又問禹湯桀紂所以興亡對曰傳稱禹湯罪已其興也勃焉桀紂罪人其亡也忽焉然二主惑嬖色戮諫者造炮烙之刑此所以亡也帝恱厚賜以答其言時髙宗嘗從容問馭下所宜中書令來濟曰昔齊桓公出遊見老人命之食曰請遺天下食遺之衣曰請遺天下衣公曰吾府庫有限安得而給老人曰春不奪農時即有食夏不奪蠶工即有衣由是言之省徭役馭下之宜也武后時梓州射洪縣草莽愚臣陳子昂謹冒死稽首再拜諫政理書曰臣子昻西蜀草茅賤臣也以事親餘暇得讀書竊少好三皇五帝王霸之經歷觀丘墳旁覽代史原其政理察其興亡自伏羲神農之初至於周隋之際馳騁數百年雖未得其詳而可略知也莫不先本人情而後化之過此以往亦無神異獨軒轅氏之代欲問廣成子至道之精理於天下臣雖奇之然其説不經未得信也至殷髙宗亦延問傅説然才救弊未能宏逺自此之後殆不足稱臣每在山谷有願朝廷常恐沒代而不得見也豈知霑沐聖化未夭天年幸得遊京師覩皇化親逢大聖之詔布於天下問於賢士大夫曰何道可以調元氣賤臣孤陋誠未足知然臣竊觀自古帝王問政之原備矣未有能深思逺慮獨絶今古如陛下者也故賤臣不勝區區願竭固陋以聞見言之雖未足對揚天休然或萬有可觀者敢冒昧闕庭奏書以聞伏惟皇太后陛下少加察焉臣聞之於師曰元氣者天地之始萬物之祖王政之大端也天地之道莫大乎陰陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和隂陽和則天地平天地平則元氣正矣是以古先帝王見人之通於天也天之應乎人也天人相感隂陽相和災害之所以不生嘉祥之所以遂作則觀象於天察法於地財成天地之道輔相天地之宜以左右人於是養成羣生奉順天德故人得安其俗樂其業甘其食美其服隂陽大和元氣以正天瑞降地符升風雨以時草木不落龜龍麟鳳在郊藪矣洎顓頊唐虞之間不敢荒寧亦克用理故書曰百姓昭明叶和萬邦黎民於變時雍乃命羲和欽若昊天歷象日月星辰敬授人時亦能和也至夏德衰亡殷政微喪桀紂昏暴亂于天道殺戮無罪放棄忠良遂竭天下之力殫天下之貨作為瑶臺起乎瓊室極荒淫之樂窮耳目之玩傾宫之女至數千人奇伎淫巧以億萬計信巫鬼聽讒邪遂為糟丘酒池炮烙之刑一朝牛飲者三千人龍逄不勝其憂諫而死箕子不堪其憤囚為奴於是隂陽大乖天地震怒山川鬼神發見災異疾疫大興妖孽並作而桀紂不悔卒以滅亡和之失也逮周文武創業順天應人誠信忠厚加于百姓德澤休泰興乎頌聲成康之時刑措三十餘年天人之道始和矣幽厲之末復亂厥常苛慝暴虐詬黷天地百川沸騰山冢崒崩人以愁怨疾癘為作故其詩曰昊天不傭降此鞠凶昊天不惠降此大厲不先不後為瘥為瘵天地生人之理復悖於兹矣嗚呼豈不哀哉豈不哀哉近有隋氏亦不克厥終初隋髙帝之有天下也以六合為家方將對越天人傳之萬代至煬帝承平自以貴為天子富有四海欲窮宇宙之觀極遊宴之樂以為人主之急務也於是乃鑿御溝決黃河自伊洛之間而屬之揚州生人之力既弊天地之藏又泄煬帝方欣然以為得計將後宫綵女數百千人遂泛龍舟遊三江五湖之間當其得意也視天下猶脫屣耳其後百姓騷弊災變數興吏人貪暴其政日亂隂陽感怒彗孛以出煬帝不悟自以為天下安於泰山方率百萬之師而以事遼東當時山東父子不得相保也天厭暴政人懷亂亡故遼東之役未歸而中國之難巳起身死逆手宗廟已隳其故何哉逆天人之理也是以臣每察天人之際觀禍亂之由迹帝王之事念先師之説昭然著明信不欺耳不意陛下以大聖之慮見天人之心將欲調元氣之綱返淳和之始自非陛下含天地之德有日月之明誰能眇然逺思欲求泰和於元氣哉昔者伏羲氏之所以本天人而為三皇首也愚臣暗昧不勝大願願陛下為大唐建萬世之策恢王聖之功傳乎子孫永作鴻業千百年間使繼文之主有所守也非甚無道不失厥嗣陛下可不務之哉臣伏見天皇大帝得天地之統封於泰山功德大業與天比崇矣然尚未見建明堂之宫遂朝上帝使萬代鴻業今猶闕然臣愚意者豈非天皇大帝知陛下聖明必能起中興之化留此盛德以發揮陛下哉不然何所與讓而未作也今陛下欲調元氣睦人倫躋俗仁夀興風禮讓捨此道也於何理哉固臣不勝區區螻蟻之誠思願陛下念先帝之休意恢大唐之鴻業於國南郊建立明堂使宇宙黎元遐荒夷貊昆蟲草木天地鬼神粲然知陛下方興三皇五帝之事與天下更始不其盛哉昔者黃帝合宫有虞總期唐堯衢室夏后代室羣聖之所以調元氣理隂陽於此教也臣雖末學竊嘗聞明堂之制也有天地之則焉有隂陽之統焉二十四氣八風十二月四時五行二十八宿莫不備率故順其時月而為政也則風雨時寒暑平萬物茂暢五榖登稔元氣不錯隂陽以和逆其時之為政也則水旱興疾疫起蟲螟為害霜雹成災隂陽不和元氣以錯故昔者聖人所以為政教之大業也是以臣願陛下為大唐建萬代之䇿者意在兹乎陛下若不以臣微而廢其言乞以臣此章與三公九卿賢士大夫議之於庭儻事便於今道不逺古即請陛下徴天下鴻生巨儒賢良豪傑之士博通古今皇王政理之術者與之按周禮月令而建之臣必知天下庶人子來不日而成也乃正月孟春陛下乘鑾輅駕蒼龍載青旗佩蒼玉從三公九卿賢士大夫鴻儒碩老衣冠之倫朝于青陽左個負斧扆憑玉几南面以聽天下之政於是遂發大號宣布四方各順十二月之舍無敢有逆乃命太史守典奉法司天日月星辰之行無失經紀以初為常陛下遂躬籍田親蠶以勸天下之農桑養三老五更以教天下之孝弟明訟恤獄以息天下之淫刑除殘去暴以正天下之仁夀修文尚德以止天下之干戈察孝興廉以除天下之貪吏矜寡孤獨疲癃羸老不能自存者賑恤之後宫美女非三妃九嬪八十一御女之數者出嫁之珠玉錦繡雕琢技巧之飾非益於理者悉去之巫鬼淫祀誑惑良人者禁殺之陛下務以至誠躬服質素以為天下先愚臣以為不出數年之間將見太平之化也天人之際既洽鬼神之望允塞然後作雅樂潔粢盛宗祀天皇於明堂以配上帝使萬國各以其職來祭豈不休哉臣伏惟非陛下至德明聖未有能越行此道者也固臣竊以為此化一成則人倫之道自睦刑罰之原自塞兵革之事不興還淳之徒可見仁夀禮讓稼穡農桑不言而自致也是以賤臣未得為陛下一二論之何者聖人之教在於可大可久者固臣欲陛下振領提綱使天下自理也然臣竊獨有私恨者陛下方欲興崇大化而不知國家太學之廢積歲月矣堂宇蕪穢殆無人蹤詩書禮樂罕聞習者陛下明詔尚未及之愚臣所以有私恨也臣聞天子立太學以聚天下英賢為政教之首故君臣上下之禮於是興焉揖讓尊俎之師於此生焉是以天子得賢臣由此道也今則荒廢委而不論而欲睦人倫興禮讓失之於本而求之於末豈可得哉況君子三年不為禮禮必壞三年不為樂樂必崩奈何天子之政而輕禮樂哉臣所以獨竊有私恨者也陛下何不詔天下胄子使歸太學而習業乎斯亦國家之大務也臣愚蒙所言事猶未盡者恐煩聖覽必陛下恕臣昏昧請賜他日别具奏聞時召麟臺正字陳子昻條上利害子昂對三事其一言九道出大使巡按天下申黜陟求人瘼臣謂計有未盡也且陛下發使必欲使百姓知天子夙夜憂勤之意也羣臣知考績而任之也姦暴不逞知將除之也則莫如擇仁可以恤孤明可以振滯剛不避強禦智足以照姦者然後以為使故輶軒未動而天下翹然待之矣今使且未出道路之人皆已指笑欲望進賢下不肖豈可得耶宰相奉詔書有遣使之名無任使之實使愈出天下愈弊徒令百姓治道路送往迎來不見其意也臣願陛下更選有威重風槩為衆推者因御前殿以使者之禮禮之諄諄戒敕所以出使之意乃授以節自京師及州縣登拔才良求人瘼宣布上意令若家見而户曉昔堯舜不下席而化天下蓋黜陟幽明能折衷者陛下知難得人則不如少出使彼煩數而無益於化是烹小鮮而數撓之矣其二言刺史縣令政教之首陛下布德澤下詔書必待刺史縣令謹宣而奉行之不得其人則委棄有司挂墻屋耳百姓安得知之一州得才刺史十萬户賴其福得不才刺史十萬户受其困國家興衰在此職也今吏部調縣令如補一尉但計資考不求賢良有如不次用人則天下囂然相謗矣狃于常而不變也故庸人皆任縣令教化之陵遲顧不甚哉其三言天下有危機禍福因之而生機靜則有福動則有禍百姓安則樂生不安則輕生是也今軍旅之弊夫妻不得安父子不相養五六年矣自劍南盡河隴山東田青徐曹汴河北舉滄瀛趙鄭或困水旱或頓兵疫死亡流離略盡尚賴陛下憫其失職凡兵戍調發一切罷之使人得妻子相見父兄相保可謂能靜其機也然臣恐將相有貪夷狄利以廣地強武説陛下者欲動其機機動則禍構宜修文德去刑罰勸農桑以息疲民蠻夷知中國有聖王必纍譯至矣陳子昻又答制問事八條疏曰臣今月十九日蒙敕恩召見令臣論當今政要行何道可以適時不須逺引上古具狀進者微臣智識淺短實昧政源然嘗洗心精意靜觀人理竊見國之政要興廢在人能知人機順而知化趨時適變靜而勿動政要之績可得而行今陛下以應天命而受寶圖建立明堂施布大化勤恤人隱存問髙年報功樹德順時興務至公至仁垂訓天下可謂典章大備制度宏逺五帝三王所不及也愚臣何敢有知政要然天恩降問貴採芻蕘謹竭愚直悉心以奏凡用賢之道未廣仰成之化尚勞然則取士之方任賢之事故陛下素所深知應亦倦談亦倦聽不待臣更一二煩説也請措刑科臣聞言有順君意而害天下者有逆君意而利天下者唯忠臣能逆意惟聖君能從利恩敕不以臣愚微降問當今政要臣伏惟當今之政大體已備矣但刑獄尚急法網未寬恐非當今聖政之要者臣觀聖人用刑貴適時變有用有捨不專任之且聖人初制天下必有凶亂之賊叛逆之臣而為驅除以顯聖德聖人誅凶殄逆濟人寧亂必資刑殺以清天下故所以務用刑也凶亂既滅聖道既昌則必順人施化赦過宥罪所以致刑措也然則聖人用刑本以禁亂亂靜刑息不為升平所設何者太平之人恱樂於德不恱樂於刑以刑窮於人人必慘怛故聖人貴措刑不貴煩刑今神皇應運受圖臨御天下逆臣賊子頓伏嚴誅所以虺貞羣黨同惡就􅓍此蓋天意將顯神皇威靈豈此凶徒所能自亂今魁首已滅朋黨已屠聖政惟昌天下威服神皇又降文昌鴻恩滌蕩羣罪天下昭慶企望日新措刑崇德正在今日實聖政之至要者也伏見近來詔獄推窮稍復滋長追捕支黨頗及逺方天下士庶未敢安止臣伏惟神皇聖意務在措刑安恤天下不務察法以損升平然今刑獄未息者應是獄吏未識天意所以至於此也伏願神皇垂豈弟之德務仁夀之恩敕法慎罰以省刑典臣伏見當今天下士庶思願安寧途謡巷歌皆稱萬歲此其懷樂聖化願保永年欲與子孫同此仁夀今神皇不以此時崇德務仁使刑措不用乃任有司明察專務威刑臣竊恐非神皇措刑之道且臣聞殺一人則千人恐濫一罪則百夫愁人情大端以畏懼如此今天下至廣萬國至繁神皇雖妙察獄囚不可門告户説令一一知者若使有一不知以神皇好任刑罰則非太平安人之務當今聖政之要者也此是臣赤心至誠敢言其實冒死犯奏所冀天鑒務求刑措察臣所言非敢茍順重任刑科臣伏惟刑措之政在能官人官人惟賢政所以理此故神皇深知倦問不假臣一二煩説今臣所更重説者實以天下之政非賢不理天下之業非賢不成固願神皇務在任賢誠得衆賢而任之則天下之務自化理也然則賢人既任須信既信須終既終須賞夫任而不信其才無由展信而不終其業無由成終而不賞其功無由勤必神皇如此任賢則天下之賢雲集矣何以知其然君子小人各尚其類者也若神皇徒務好賢而不能任能能任而不能信能信而不能終能終而不能賞雖有賢人終不能用矣神皇降問小臣當今政理之要者臣竊以此為政之至極何以言之神皇大業已成天下已平尊名巳顯大禮已備所未足者在於忠賢若得忠賢相與而守之太平之功可於此而就斯實天地神靈贊助神皇而致此時也當此時不成千載之業立萬代之規小臣誠愚竊為神皇所惜明必得賢科臣伏惟刑措之道政在任賢議者皆云賢不可知人不可識臣獨以為賢固可知人固可識得是職者不精思之耳夫尚德行者必無凶險之類務公正者必無邪佞之朋保廉節者必憎貪冒之黨有信義者必疵茍且之徒智者不為愚者謀勇者不為怯者死猶梟鸞不接翼薰猶不同器此天地之性物類之情其理自然不可改易何者以德事凶兩不相入以政攻佞兩不相利以信質偽兩不相從以廉説貪兩不相和智者尚謀愚者不聽勇者徇死怯者貪生此皆事業不同趣向各反賢人之道固可預知誠能尚賢賢可至矣然則賢人之業須賢人達之賢人之才須賢人用之公正廉節信義勇謀皆待其人然後獲展茍非其類道不虛行凡賢人君子未嘗不思效用但無其類獲進所以湮沒於時今神皇誠能信任賢良旌納忠正知左右之人灼然有賢行者賜之尊爵厚祿以榮寵之使其以類相舉責成其政合度者進失度者貶神皇但垂拱明堂保神和志天下之事臣必見日就無為不言而理也今神皇憂恤萬機日不暇給昧旦丕顯中夜以思誠是羣臣未稱聖任伏願神皇審察賢能垂恩信任夫忠賢事君必諫君失姦佞事主必順主情直道曲事聖鑒所察賢不可疑科臣伏惟神皇聖明具知得賢須任既任須信既信須終既終須賞悉備知也然今未多信任者應以經信任無效所以致疑如裴炎劉禕之騫味道周思茂固蒙神皇信任之矣然竟背德孤恩神皇以此有疑於信任賢也以臣愚識則謂不然何者聖必藉賢以明國必待賢以昌人必待賢以理物必待賢以寧若神皇疑於信賢欲以聖謨自斷臣恐勤勞聖躬而天下不可獨理況聖躬不可勞弊神心不可細用此最須任賢者也臣聞鄙人云有人以食噎而得病者欲絶食以去病乃不知食絶而身斃此言近小可以喻逺臣竊謂賢人於國亦猶食之在人固不可以一噎而絶喉糧亦不可以謬賢而逺正士此實神皇聖鑒可明知也不待愚臣一二言之伏願任賢無疑求士不倦以此為務天下誠不足理也若外有信賢之名而內實有疑賢之心臣竊謂神皇雖日得百賢終是無益適足以損賢傷政也伏惟熟察可信者信之招諫科臣伏惟聖人制天下貴能至公能至公者當務直道臣伏見神皇至公應物直道容賢而朝廷尚未見敢諫之臣骨鯁之士天下直道未得公行臣聞聖人大德在能聽諫古典所説蓋不足陳臣伏見太宗文武聖皇帝德冠三王名超五帝實由能容魏徵愚直獲盡忠誠國史書之明若日月直言之路啓從諫之道開貞觀以來此實為美今神皇坐明堂布大政神功聖業能事備矣夫骨鯁之士能美聖功伏惟神皇廣延直臣旌賞諫士使大聖之德𢎞納日新書之金板萬代有述作非神皇卓犖仁聖臣不敢獻此言也勸賞科臣聞勞臣不賞不可勸功死士不賞不可勵勇當今或有勤勞之臣死難之卒策功命賞未蒙優異臣伏惟人臣徇節在爵與名死節勤功名爵不及偷榮尸祿寵秩有加故不可以進賢顯能旌功勵行伏願神皇廣求此色勸勵百寮以及將士此最當今聖政之所宜先也古人云賞一人而千萬人恱者蓋言其功當也夫賞而不知賢者不務也伏願神皇陛下特垂省察請息兵科臣伏以當今國家事最大者在兵甲歲興賦役不省神皇欲安人思化理不可得何者兵之所聚必有所資千里運糧萬里應敵十萬兵在境則百萬家不得安業以此徭役人何取安臣伏見國家自事北狄於今十有餘年兵甲歲興竟不聞其利豈中國無制勝之策朝廷無奇畫之臣哉臣竊謂不然是未計之廟算耳臣伏惟神皇聖武天威若神突厥小醜何足誅滅然今未滅者臣恐庸將無智未審廟算之機故使兵甲日多徭役日廣今國家又命將出師臣願神皇審圖廟算量其損益計其利害若事必不可請兵不虛行若兵不虛行賦役自省以此安人得賢可理若失之於此而救之於彼臣恐人日以疲勞不得安息伏願神皇熟察臣言審圖廟算則夷狄不足滅中國可永寧安宗子科臣伏惟陛下以至仁為政以至公應物天下士庶莫不咸知虺貞等干紀亂常自取屠滅陛下唯罪其搆逆者更無他坐宗室于弟獲以安寧自非陛下恩念慈仁敦睦九族豈得宗室蒙此寧慶實大聖之德崇重宗枝然臣更願陛下務安慰之惠以恩信使顯然明知陛下慈念之至上感聖真下得自安臣聞人情不能自明則必疑慮疑慮則必不安不安則必危懼危懼則愆過生伏惟陛下明恩賜垂豈弟之德使天下居無過之地萬姓知陛下必信任賢實是天下有慶然賢人之業皆務直道則姦邪不利必有讒譖此賢人之災厄於是也一人之行十人謗之未有不遭禍患者自古忠良賢達罹此患者不可勝言臣子昂言臣本草茅微陋才無可取陛下乃越次假以恩光將同近臣延問政要臣之愚昧何堪此寵頓首死罪頓首死罪然臣之誠直實自愚衷與君子言猶且不妄況蒙天子之問敢不悉螻蟻之誠實罄實盡然臣所奏前件狀者固是陛下所悉見所悉知然臣復重言者貴以微誠披露肝膽不知忌諱實戰實惶時天下頗流言遂開告密羅織之路興大獄誅將相大臣至是巳革命事益寧右補闕朱敬則諫曰臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜日愛功亟戰疾耕既庶而富遂屠諸侯此救弊之術也故曰刻薄可施於進趨變詐可陳於攻戰天下已平故可易之以寬簡潤之以淳和秦乃不然淫虐滋甚往而不反卒至土崩此不知變之禍也陸賈叔孫通事漢祖當滎陽成臯間糧餉窮智勇困未嘗敢開一説效一奇惟進豪猾貪暴之人及區宇適定乃陳詩書説禮樂開王道髙帝忿然曰吾以馬上得之安事詩書對曰馬上得之可馬上治之乎帝默然於是賈著新語通定禮儀此知變之善也向若髙帝斥二子置詩書重攻戰尊首級則復道爭功拔劍擊柱晷漏不保何十二帝二百年乎故曰仁義者聖人之蘧廬禮者先王之陳迹祠祝畢芻狗捐淳精流糟粕棄仁義尚爾況其輕乎國家自文明以來天地草昧內則流言外則搆難故不設鉤距無以順人不切刑罰無以息暴於是置神器開告端故能不出房闈而天下晏然易主矣臣聞急趨者無善迹促柱者無和聲拯溺不規行療飢不鼎食即向時祕策今之芻狗也願鑒秦漢之失考時事之宜毁蘧廬遺糟粕下寬大之令流曠蕩之澤去萋斐之角牙頓姦險之芒刃塞羅織之妄源掃朋黨之險迹曠然使天下更始豈不樂哉后善其言中宗神龍初清源尉吕元泰上書言時政曰國家者至公之神器一正則難傾一傾則難正今中興政化之始幾微之際可不慎哉自頃營寺塔度僧尼施與不絶非所謂急務也林胡數叛獯虜內侵帑藏虛竭户口亡散天下之失業不謂太平邊兵未解不謂無事水旱為災不謂年登倉廪未實不謂國富而乃驅役飢凍雕鐫木石營搆不急勞費日深恐非陛下中興之要也比見坊邑相率為渾脫隊駿馬胡服名曰蘇莫遮旗鼓相當軍陳勢也騰逐喧噪戰爭象也錦繡夸競害女工也督斂貧弱傷政體也胡服相歡非雅樂也渾脫為號非美名也安可以禮義之朝法逺方之俗詩云京邑翼翼四方是則非先王之禮樂而示則於四方臣所未諭二年中書令李嶠上書曰元首之尊居有重門擊柝之衛出有清警戒道之禁所以備非常息異望誠不可易舉動慢防間也陛下厭崇邃輕尊嚴微服潛遊閲廛過市行路私議朝廷驚懼如禍産意外縱不自惜奈宗廟蒼生何又分職建官不可以濫傳曰官不必備惟其人自帝室中興以不慎爵賞為惠冒級躐階朝升夕改正闕不給加以員外內則府庫為殫外則黎庶蒙害非求賢助治之道也願愛吝班榮息匪服之議今文武六十以上而天造含容皆矜恤之老病者已解還授員外者既遣復留恐非所以消敝救時也請敕有司料其可用進不可用退又逺方夷人不堪治事國家向務撫納而官之非立功酋長類糜俸祿願商度非要者一切放還又易稱何以守位曰仁何以聚人曰財今百姓乏窶不安居處不可以守位倉儲蕩耗財力傾殫不足以聚人山東病水潦江左困輸轉國匱於上人窮於下如令邊場少竦恐逋亡遂多盜賊羣行何財召募何衆間遏乎又崇作寺觀功費浩廣今山東歲飢糟粳不厭而投艱厄之會收庸調之半用吁嗟之物以營土木恐怨結三靈謗蒙四海又比緣征戍巧詐百情破役隱身規脫租賦今道人私度者幾數十萬其中髙戶多丁黠商大賈詭作臺符羼名偽度且國計軍防並仰丁口今丁皆出家兵悉入道征行租賦何以備之又重賂貴近補府若史移沒籍産以州縣甲等更為下戶當道城鎮至無捉驛者役逮小弱即破其家願許十道使訪察括取使姦猾不得而隱又太常樂戶已多復求訪散樂獨持大鼓者已二萬員願量留之餘勒還籍以杜妄費睿宗景雲初監察御史韓琬上言國安危在於政政以法暫安焉必危以德始不便焉終治夫法者智也德者道也智權宜也道可以久大也故以智治國國之賊不以智治國國之福貞觀永徽之間農不勸而耕者衆法施而犯者寡俗不偷薄器不汙窳吏貪者士恥同列忠正清白者比肩而立罰雖輕而不犯賞雖薄而勸位尊不倨家富不奢學校不厲而勤道佛不懲而戒土木質厚稗販弗蚩其故奈何雜以皇道也自兹以來任巧智斥謇諤趨勢者進守道者退諧附者無黜剝之憂正直者有後時之歎人趨家競風俗淪替其故奈何行以霸道也貞觀永徽之天下亦今日天下淳薄相反由治則然夫巧者知忠孝為立身之階仁義為百行之本託以求進口是而心非言同而意乖陛下安能盡察哉貪冒者謂能清貞者謂孤浮沉者謂黠剛正者為愚位下而驕家貧而奢歲月漸漬不救其弊何由變浮之淳哉不務省事而務捉搦夫捉搦者法也法設而滋章滋章則盜賊多矣法而益國設之可也比法令數改或行未見益止未知損譬奕者一棋為善而復之者愈善故曰設法不如息事事息則巧不生聖人防亂未然天下何由不治哉永淳時雍丘令尹元貞坐婦女治道免官今婦夫女役常不知怪調露時河內尉劉憲父喪人有請其員者有司以為名教不取今謂為見機太宗朝司農以市木橦倍價抵罪大理孫伏伽言官木橦貴故百姓者賤臣見司農識大體未聞其過太宗曰善今和市顓刻剝名為和而實奪之往者學生佐史里正每一員闕擬者十人今當選者亡匿以免往選司從容有禮今如仇敵賈販往官將代儲什物俟其至今交罷執符紛競校存亡往商賈出入萬里今市井至失業往家藏鏹積粟相夸今匿資示羸以相尚往夷狄欵關今軍屯積年往召募人賈其勇今差勒闔宗逃亡往倉儲盈衍今所在空虛夫流亡之人非愛羈旅忘桑梓也斂重役亟家産已空鄰伍牽連遂為遊人窮詐而犯禁救死而抵刑夫亂繩已結急引之則不可解今刻薄吏能結者也舉劾吏能引者也則解者不見其人願取竒材卓行者量能授官又言仕路太廣故棄農桑而趨之一夫耕一婦蠶衣食百人欲儲蓄有餘安可得乎書入不報時有詔言事右率府鎧曹參軍柳澤上書曰頃者因韋氏險詖姦臣同惡賞罰紊弛綱紀紛綸政以賄成官以寵進言正者獲戾行殊者見疑海內寒心實將莫救賴神祇祐德宗廟降靈天討有罪人用不保陛下睿謀神聖勇智聰明安宗社于巳危振黎庶於將溺今龐眉鮐背歡欣踊躍望聖朝之撫輯聽聖朝之德音今陛下蠲煩省徭法明德舉萬邦愷樂室家胥歡臣又聞危者安其位者也亂者有其理者也伏惟陛下安不忘危理不忘亂存不忘亡則克享天心國家長保也詩有云靡不有初鮮克有終惟陛下慎厥終惟其初非禮勿視非禮勿聽非禮勿言非禮勿動書曰惟德罔小萬邦惟慶惟不德罔大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵幸願陛下禁之於親貴則天下風隨矣制之於寵幸則天下法明矣詩曰刑于寡妻至于兄弟以御于家邦若親貴為之而不禁寵幸撓之而見從是政之不恆令之不一則姦詐斯起暴亂生焉雖嚴刑制􅓍而法不行矣縱陛下親之愛之莫若安之福之夫寵祿之過罪之階也非安之也驕奢之淫危之梯也非福之也前事不忘後之師也陛下敷求俊哲使朝夕納誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木朴忌諱恕之以直用開諫諍之路也或有順于耳便于身者無急之以賞當求諸非道稽之典訓其不叶于德必置之以法用杜側媚之行也有羞淫巧于陛下者遽黜之則淫巧息矣有進忠讜于陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲書曰罔淫于逸罔遊于樂穆王有命曰實賴前後左右有位之士繩愆糾􅓎格其非心今諸宫肇建王府初啓至於寮友必惟妙擇今驕奢之後流遁未變慢遊之樂餘風或存夫小人㺯臣易合於意奇伎淫巧多適於心狎於非德兹為奢怠書曰慎簡乃僚無以巧言令色其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願採溫良博聞之士恭儉忠鯁之人任以東宫及諸王府仍請東宫量署拾遺補闕之職朝夕講論出入侍從授以訓誥交修不逮臣又聞馳騁田獵令人發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊鼓比周伎術或飛鷹奔犬盤遊藪澤此其為不道非進德修業之本也書曰內作色荒外作禽荒又曰無若丹朱傲惟慢遊是好朋淫于家用殄厥世伏惟陛下誕降謀訓勸以學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福祿長享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信矣斯語明哉至誠頃者韋庶人樂安公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅德神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為凶變福為禍千人所指無病自死不期然歟書曰殷監不逺在彼夏王今陛下何勸其皇祖講訓之則乎陛下何徵其孝和寵任之失乎禮曰愛而知其惡憎而知其善可不慎哉夫寵愛之心則不能免去其太甚間之以禮節適則可矣今諸王公主駙馬亦陛下之所親愛也驕狂之道在於厥初監戒之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿修厥德經曰在上不驕髙而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑謹于有位敢有恆舞于宫酣歌于室時謂巫風敢有徇于好色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢驕僭怠者削其祿封朴素修業者錫以車服以朂其心使奉其命無使久而忽之無使逺而墜之臣聞知之非艱行之惟艱又曰常厥德保厥位厥德靡常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之誡可以終吉若陛下奉伊尹之訓崇傅説之命不作無益不啓私門刑不差賞不濫其惟德是輔惟人之懷天祿有終景福是集矣儻陛下忽精一之德開恩幸之門爵賞有差刑罰無當則忠臣正士亦當復談矣睿宗善之玄宗先天二年姚崇知帝大度鋭于治乃先設事以堅帝意即陽不謝帝怪之崇因跪奏臣願以十事聞陛下度不可行臣敢辭帝曰試為朕言之崇曰垂拱以來以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有牽復之悔臣願不幸邊功可乎比來壬佞冒觸憲網皆得以寵自解臣願法行自近可乎后氏臨朝喉舌之任出閹人之口臣願宦豎不與政可乎戚里貢獻以自媚于上公卿方鎮寖亦為之臣願租賦外一絶之可乎外戚貴主更相用事班序荒雜臣請戚屬不任臺省可乎先朝褻狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融韋月將以忠被罪自是諍臣沮折臣願羣臣皆得批逆鱗犯忌諱可乎武后造福先寺上皇造金仙玉真二觀費巨百萬臣請絶道佛營造可乎漢以祿莽閻梁亂于下國家為甚臣願推此鑒戒為萬代法可乎帝曰朕能行之崇乃頓首謝歷代名臣奏議卷二十七
