body:
  text: 歷代名臣奏議卷三十八明楊士竒等撰治道宋神宗熙寧六年祕書省著作佐郎充利州路轉運司管勾文字臣馮山上封事曰臣伏覩今年四月四日詔書自冬迄春旱暵為虐四海之內被災者廣應中外文武臣僚並許實封直言朝廷闕失臣伏念聖明憂勤消復之詔不形於天下殆將十年矣一日天下驟聞詔旨盡堯舜禹湯所以求治之意非若漢唐舉故事求空言而已天衷一發物情易感四海內外莫不稱慶恭惟皇帝陛下以盛年聰明之資承纍世太平之會固宜優逰安逸縱心所為以享帝王奉養之樂乃躬自菲薄而勤於聽斷考名實振統紀羣臣之邪正勤怠萬機之得失本末一出照臨靡有欺隱且纍嵗豐稔生民休息求比聖德希闊無有然去秋以來四方亢旱遍走羣望靡有休應雖天人之際隱於茫昧而報應之速有若影響自陛下避正殿減常膳而諸道雨澤間有得者詔書之下未數日間京師輔郡稍稍沾足臣乃知三才之位雖不同然其本皆一氣也故其神明精誠舉動感應莫不參會聖人推端於天而求盡於人要之通三極之道而已矣易有象書有驗詩有戒禮有制春秋有法大抵以修政教順隂陽為本今陛下以一旱之故即推之於天而求盡者豈間於踈逺卑賤之言哉臣所以不避誅戮輒進狂瞽思有補於聖朝萬分之一也臣竊以變異之起天之所以警戒人君也與夫人臣諄諄而規諫者無異故每至而屢甚焉近年四方郡國地動水溢非大變故固可末殺繼而太華之前僨裂顛倒殊可驚駭而陛下恬然不以為慮大臣傲然不以為憂但即山致祭而已臣竊觀自古荒旱之及止有方所未若今遍諸路歷三時為害之逺也意者國家方講富強之術而財用之本莫不出於民非極旱大歉不足以動陛下之心耶陛下釋然開悟惕然修省斥常數之諛論謹靈承之淵懿足以慰民望當天心臣夙夜嘗為朝廷憂而所望於陛下者不過如此而已復何言哉然臣竊恐事有習熟而以為當然政有更矯而失於過正者臣下方贊揚推稱不肯與陛下慮其逺極其微而道之也臣謹略細故為陛下班班取大體可言者數事以獻願陛下留神而省察焉一曰平罪戾以安人情臣伏見新法之始故老大臣猶以為言況州縣之吏與凡在官者或期會差於頃刻或意旨異於見聞蓋不切推究而本非沮難一皆罷黜以警其餘或中以他事遂成痼廢或纍經霈澤而未復職任一夫吁嗟王道為虧況犯時之忌遽纍重法銜寃靡訴若將終身者非特一人而已又況其下因循差誤雖重得罪不知其由流離道途將轉溝壑者不可遽數度之人情有足悲者始設權以濟事今已事而猶權無乃為陛下至仁之纍乎二曰重名器以成治道臣伏見陛下即位以來新法制以舉庶事耀神武以威四夷思皇豪俊共就勳業拘於職任則越次以超擢阻於過纍則棄瑕而録用或止於少年而未可逺略或徒有虛譽而本無長才或藝窮於弧矢而付以將領之權或智辦於斗筲而寄以錢榖之任是由圖欲速之效開易進之門側肩爭趨奮臂無恥諂諛阿附以訓子弟欺隱諼詐遂成風俗雖照臨之下間或不容而進任之間猶有存者書曰治亂在庶官未有邪正雜處選任失當而能致治者也今僥幸紛起品序淆亂豈不為陛下天官之纍乎三曰正學校以厚風化臣伏見京師廣學舍增生員置經義所修撰官屬以養天下之士訓導資育無所不至世謂三代文物之盛不過於此獨臣以為沿虛而失實竊以周制教賢能而賔興之皆屬地官卿大夫之職雖國有學止以教遊倅胄子而已至漢以六經殘缺始置博士弟子員於京師然士亦多起畎畝及其末也太學生員至有三千餘人於治亂何有古之養士也未正養其心既正養其材既成養其用未聞於數千里之逺招致而飲食之使之日夜相與綴煩鑿虛汙漫迂闊雜然如釋老之聚其徒而為養也昔陽城為司業而太學諸生辭歸養親者過半今四方之士捨父母去鄉里裹糧糊口坌集於都下不啻五六千人矣日馳騖求丐於公卿之門紛紜周章不本一鄉之法不知三物之教不窮六藝之原本不見歷代之興廢惟誦新義習莊老雖增至萬員廣成十舍道不足以通逹治體教不足以化成人文徒賊糧食害風教損人才而已臣又以為仲尼不生六經之義未定也苐使學者求之而無倦發之而曰新茍不出於仁義之大方則其庶乎道也何必譊譊推尊立為定説以分限人之情性使之必歸於我哉臣恐沿虛而失實它日必為陛下養賢之纍也四曰復臺諫以廣言路臣伏見數年以來臺官以言新法等事而責降者近數十人若將遂廢而不用朝廷設此職以待言者欲其敢言爾今反讐其言故天下不能無疑也且士大夫至精之選莫若臺諫博贍通敏厚重方正始可居此職是數十人者雖未必盡然然其來也以公議其去也無大過當其遇事輒言豈憚嫌怨一日失勢使奔走俯伏於衆人之下若故摧恥以快讐敵聖朝人物之盛如數子者九牛一毛無所多損然所惜者朝廷之舉動爾昔唐髙宗時長孫無忌褚遂良等以徑切得罪天下不聞直言者二十餘年今當言責者顧望畏縮而不敢言者數年矣前日或聞御史裏行黃履言市易事搢紳之士以為鳳鳴朝陽尋即報罷且市易果便耶果不便耶履之言果是耶非耶市易果便履之言果非尚當嘉其守正敦奬優借以廣言路況其便與不便是與非特未定也然則循默茍容勇於進取而樂觀時變者乃為稱職豈不為陛下聽納之纍乎五曰復常平以簡法令臣竊以青苖之法本以抑兼并賙窮困朝廷惠民之意何所不可而喧譁齟齬者數年今法制已定論議已息臣猶冒萬死以言者雖不知變苐恐無益於振貸徒煩督責所重者國家之大體爾或謂請者既衆則無不便之理然未嘗知浮浪之人與夫不能自業者持片紙獲見緡茍且於目前姦欺於限外今皆指新以填舊額取私債以償公息自此之後官有常得民有常負不幸而少歉則負者至於流亡而得者并失之矣此非所謂賙窮困者也今質貸之家不減前日何則蓋青苖之法與期雖逺然過限有罪貧乏之民無所資仰不免寄性命於富商大賈之門其取之尤急則償利愈多此非所謂抑兼并者也又郡縣之治主風教平獄訟禁盜賊均賦徭今皆置而不問日夜惶駭從事於青苖出納簿書細故之間然猶少差毫釐而立見停罷者相繼雖朝廷遣使風厲州縣亦不過議斂散校圭撮促期會而已非國家大政非天下急務強起而力行之此古人所謂直服人之口者爾豈不為陛下宜民之纍乎六曰罷兵戍以厚邦本臣伏見湖南隴右用兵以來建議開邊之士亹亹相繼而起其講究利害有以當聖心者不過以夷狄喣撫之過侵噬猖獗邊民無聊且當為中國之故雖糞土邦計草芥人命爵賞貿亂君臣宵旰而不知悔也且天下之至難處者兵也今以易言之臣恐兵之禍自此始矣王者之師以仁義動末世以功名舉昆吾之禦玁狁之逐蓋起而應之其義在於禁暴安民而已建武開元之君鋭於功名奮兵以逐夷狄邊機一發而入物補官出貸除罪轉漕假貸鹽鐵榷酤請算占緡均輸平準和糴率貸度僧進奉宣索增稅青苖間架竹木茶鹽銅錫之名百出卒不能佐用度雖悔痛於末年終不免流為後世子孫患也然度當時所得不過數幅空地圖而已臣嘗計熙河溪洞之獲在漢唐百分之一而費已不資況將盡而有之哉當陜西無事川峽上供物帛無慮數百萬悉歸於中帑以供天子用度慶歷寶元用兵之後皆為河東關右截留猶靳靳未足常仰給於度支矣況今重有熙河一路軍興之費哉近日洮西之警互有得失正如鬭博之酣方瞋目盛氣以決勝負雖親信在傍勢不可解臣竊恐囊虛足跌為陛下太平之纍也臣愚不曉世務復久官逺方不習國家之典故不知廟堂之謀議但私於士論而求之物情是非不疑利害可見如此為陛下所纍者六雖年榖豐稔嘉瑞荐臻猶可以止其流絶其源以銷未然之患況天變昭昭於上人言籍籍於下寧能捨此而不為之慮哉今若以罪戾為慮則臣伏願陛下詔今日以前以新法事得罪者許自陳述為興置一司看詳不問重輕一切除放如此則人情可安也以名器為慮則臣伏願陛下慎重爵賞澄汰偷墯奔趨之勤不足以臨事捷給之對不足以議政曲存老成以共大事稍抑文華以求實效按察之任必考其素侍從之列必觀其守以至領一將事加一職名非其人無以服衆失其實無以勸善更相薦引先察於時論精别除授必歸於宸斷如此則治道可成也以學校為慮則臣伏願陛下詔限太學生員以五百人為額本貫非開封府輔郡與命官子弟不得入學數外舉人遣還鄉里罷修經義官屬減省直講員數又詔天下解發各以進士之所自得大義優長文辭厚重者為合格不得以向背新義而去取之也至於武之極則暴法之弊則姦所益者小所損者大宜廢二學以塞原本如此則風俗可厚也以臺諫為慮則臣伏願陛下斷浮議發明詔録侍從臺諫以言而得罪與無名而隂廢者度其才而用之以勵公卿之莭以厭朝野之望觀其既去而無憾愈窮而有守若起而助陛下為治當有過人者何必紛紛求攀緣附託易進之人於外哉如此則言路可廣也以青苖為慮則臣伏願陛下詔有司取常平舊制而稍增損之其餘煩碎條約一皆罷去如此則法令可省也以兵戍為慮則臣伏願陛下趨罷出塞之師常為備邉之策少休士馬隂計財用以十年為期俟勇者奮而謀者決然後一舉而復幽燕之地彼户口之衆租賦之厚厭敵已久日夜思漢我朝得而暮資之視西南區區汗僕馬斃鷹犬與豺狼校性命於荆棘間以求一肉之快者逺甚如此則邦本可厚也至於既有其名未知其實可行於今而不計其後與夫緣陛下所問者五緣臣所言者六而記念無以宜於世者臣愚未能盡其説必有慷慨之士為陛下言之矣臣愚不知五行之説嘗謂劉向以降諸儒妄指意人事以傅會天變而失於洪範皇極之義故臣不敢即旱所起臆而不經以欺罔陛下然臣嘗讀易至否泰之際治亂安危其極必返聖朝升平百餘年蓋古未有至陛下處泰而益亨履豐而愈光更革懲創將期於盡雖然裁成輔相之道貴於適中其過也等歸於否而已矣臣願陛下慎始而慮終使平而不陂往而不復則天下之幸亦萬世之福也昔漢文帝唐太宗忠恕仁明主也賈誼劉洎辨論切直往往責君之難二主者雖明譽其直道而隂銜其訐逆其卒也賈誼以他事廢劉洎以無罪誅嗚呼言之難也如此臣才微而言拙位下而迹孤徒有劉賈愛君憂國之心獨意妄議以干天聽不顧犯陛下之威觸大臣之權伏惟陛下裁察若棄其身而用其言則雖死無恨臣不任拳拳激切之至九年司徒富弼上疏曰臣近者因拜謝章輒敢略具南事附奏伏計愚懇尋逹天聽蠻寇大擾即已竄歸然王師遂行必謀弔伐水陸並進威德兼施若夫討禦之方得失之際則非臣庸之所預知也伏望陛下密詔郭逵等俟至二廣熟計攻守利害速具奏聞可往則往如不可往則令别圗去就以全王師之重海嶠阻逺恐難責其固必也臣又竊聞秦隴之外數年用兵尅取熙河等五州别立一路闢地進境開拓故疆誠為國朝美事足光史册也然而逺近共傳當時殺戮人命不可勝計費耗財用莫知紀極是皆主事者公為欺罔不以實數上奏致陛下無由得聞而進止也今既成立部分建置官屬屯兵守禦各有定制即須所得之地所出之物以供贍一路自能取足不假外求然後可為長逺之利遂成開拓之益則向者人命不為枉殺財用不為虛費也奈何罷兵後唯聞朝廷自京師輦運金帛監司從內支撥糧草增添轉遽遞鋪奔走不絶於道滔滔而去尚云不足一二年來又云彼中米麥每斗計錢四五百文賤亦不減三百以上公私皇皇汲汲日憂不逮若常如此則不唯枉殺虛費而又自此國家府庫如何供億民間物力如何出辦遂使官司俱困得之何用況陜西乏用即今上下窮窘已甚事茍得實臣竊憂之伏望陛下親選無所畏憚公忠臣寮不與其時用事人為黨者往彼案視土地可耕否所收物財足用否人情可安否久逺可守否俟得其實然後委二府會議方見經久利害如何若不審行考校但務竭力勞費臣謂末等之家有十金之産者且猶未肯如是況乎為天下之計哉惟陛下深切留意也唐宣宗時北方亦曽自舉十數州內附未嘗少加攻取既而供饋闕乏終却叛去唐亦不復顧藉更乞略賜檢詳亦可以為證矣臣又竊聞代北之地敵人妄有爭占意在先發殊無義理朝廷以其倔疆難制遂欲盡與此説傳播甚盛然終未知虛的萬一是的則聞者莫不憂駭何哉蓋異域貪婪後患彌大彼曲我直事甚明白且宜以理辨析未易可許昔趙王欲賂強秦六城而虞卿不從東胡欲求胸奴甌脫而冒頓弗與觀其簡册足為龜鑑願陛下取此二説以今疆事反覆參校始末輕重與二府議定決然利害奏稟而後行此須特出宸斷也臣又竊聞纍年新法所行之事條目甚多陛下近已深見為害但虛懷隱忍未即更張此誠大得為君之道從容優裕而不欲迫急也然所謂為害者皆害及天下之人被害既久則豈尚容舒緩哉度今事勢正如解倒垂之急唯恐解之不速也亦如人之感疾疾深則難愈木之受蠧蠧深則難補惟陛下所見害事既明芽蘖已著宜早圖之必無太早之失更或稍緩則遂成疾蠧深患朝廷益難奠枕矣況天下不以賢愚共知陛下始欲講求大治比迹唐虞前代帝王用心非所能及而不意為人所誤至此事皆成弊究其端由實非陛下之失唯是衆口共責為謀者恨不食其肉焉今聖情既已開悟稔知其非而猶隱忍護惜不速更張却恐遂玷聖德也臣更願陛下於左右臣寮中不以職位髙下常視其反覆狡獪者疏之純良方正者與之反覆狡獪者雖有姦才強辨可惑人其如自取名位及援引親舊結成朋黨互相保庇表裏膠固牢不可破如此之類者豈可置之左右而任之以事乎蓋本無一定之志不恥不仁不畏不義不見利不勸必無忠藎慤實安肯乃心於國家也純良方正者才辨誠有不及狡獪之人然其心不二持守堅篤中立不倚傍無朋比用之則直道而進捨之則奉身而退不為利回不為義疚忠亮之節至死不移不肯欺昧朝廷自求多福如此等人終無妄誤必能為國家立事假有未能立事者亦不為害也陛下臨御既久當盡照見固難上逃聖鑑此尤宜常挂宸念恐非須臾可忽也緣誤用一二姦人則展轉援致連茹而進分布中外大為朝廷之患卒難救整唐文宗所謂破河北賊易破朝廷黨難者正謂此也天子無職事唯辨别大臣邪正而進退之此其職也切乞謹之臣狂瞽之説有愛君憂國之心固無他志伏乞俯賜聽納早賜裁處不勝宗社生靈之幸元豐六年富弼薨手封遺奏使其子紹庭上之其大略云陛下即位之初邪臣納説圖任之際聽受失宜上誤聰明浸成禍患今上自輔臣下及多士畏禍圖利習成敝風忠詞讜論無復上逹臣老病將死尚何顧求特以不忍上負聖明輒傾肝膽冀哀憐愚忠曲垂採納去年徐禧之敗兵民死亡者數十萬今久戍未解百姓困窮豈諱過恥敗不思救禍之時乎天地至仁豈與羌夷校曲直勝負願歸其侵地休兵息民使關陜之間稍遂生理兼陜西再團保甲又葺教場州縣奉行勢侔星火人情惶駭難以復用不若寖罷以綏懷之臣之所陳急於濟事若夫要道則在聖人所存與所用之人君子小人之辨耳陛下觀天下之勢豈以為無足慮耶神宗時知諫院范純仁奏乞任羣臣疏曰臣伏見陛下即位以來孜孜求治親決庶政日煩聖謨萬乘增宵旰之勤羣下負尸素之責君勞臣逸顛倒衣裳異天德不言而成虧聖人無為之治又況人主詔令當務簡而必行萬機之多寧免一失先有司則不容差謬當職者得以糾繩出上意則事關綸言為臣者難於輕議行之寖久益少損多蓋夫尊者當領其要卑者當任其詳尊卑之殊其職亦異盡心謹職督察細事者有司之職也經國阜民選賢任官者宰相之職也容載如天地廣大如江河巍巍蕩蕩無得而名者王者之德也以卑僭尊則不恭而失職以上逼下則大察而勞神故易稱黃帝堯舜曰垂衣裳而天下治又孔子稱堯曰惟天為大惟堯則之詩稱文王曰不識不知順帝之則是皆簡易博大無為之明效也惟聖心稽而行之易若反掌伏惟陛下察虞舜叢脞之戒取老氏清淨之言潛晦聰明頥養聖意擇宰司而委以萬務慎庶長而責其成功廣聽納以導群情察邇言而安庶政大臣無不以之怨多士懷得職之喜愚智效力上下盡心自然端拱垂衣太平可致純仁又奏乞清心簡事尊德委賢狀曰臣伏見陛下即位已來切於求治思欲革去舊弊速致太平此固聖明之君盛德之舉也然而道逺者理當馴致事大者不可速成人才不可以急求積弊不可以頓革道不馴致則有揠苗之患事欲速成則有不逹之憂人急求則才佞進而巧偽生弊頓革則人情擾而怨憤作所以景帝削七國而眺錯受戮東漢疾橫議而黨錮大興宋襄公急於求霸以致喪師唐文宗切於除姦而訓注禍作此皆前世之明效而後王之龜鑑也故帝王之圖治必在顯仁藏用自下升髙人材以長育而成功德以積纍而大通其變而使民不倦神其化而使民不知無象無為而天下自安矣故傳稱堯之德曰蕩蕩乎民無能名焉稱舜曰夫何為哉恭已正南靣而已矣稱文王則曰不識不知順帝之則是皆聖人之治以無為而成也又稱孔子曰毋固毋必毋意毋我又曰無適也無莫也義之與比洪範曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道􅊭平此則聖人之心毋固毋必無適無莫不作偏黨好惡而邪正自辨萬事無惑也故水止則方能鑑物心清則可以理事自古人君有以才略自任果於興作欲其事功速就必為憸佞所乘迎合之人則以才能被寵忠直之論皆以沮誹見疑以沮誹被疑則不暇察其忠以合意為才則無以覺其佞自然善惡無辨賞罰不明人情怨怒而不知禍亂已成而莫見以至國家顛危者多矣此果於興作之害也孔子曰豫無樂乎為君惟其言而莫豫違也不幾乎一言而喪邦乎此有以見小人承順之言可懼也陛下聰明仁孝修已篤恭自有堯舜之資可以垂衣而治不須急務於近效乃雜五霸之為豈唯徒勞睿思實恐以小妨大伏望陛下清心簡事尊德委賢以知人安民為大方以富國強兵為末務覆之如天容之如地四海被不言之化生民躋仁夀之域與三王並美唐虞比隆使後世歌頌無窮在陛下留神而已時王安石用事參知政事趙抃屢斥其不便韓琦上疏極論青苗法帝語執政令罷之時安石家居求去抃曰新法皆安石所建不若俟其出既出安石持之愈堅抃大悔恨即上言制置條例司建使者四十輩騷動天下安石強辨自用詆天下公論以為流俗違衆罔民順非文過近者臺諫侍從多以言不聽而去司馬光除樞密不肯拜且事有輕重體有大小財利於事為輕而民心得失為重青苖使者於體為小而禁近耳目之臣用捨為大今去重而取輕失大而得小懼非宗廟社稷之福也翰林學士張方平上言曰陛下即阼以來顧諟天之明命慮而後言議而後動欲以身先而率天下以正可謂盛德矣然始初清明中外觀聽朝廷風體顧當先其大者逺者若夫厚風俗美教化修典刑正紀律以通天下之志以成天下之務此今之所當先者也而近日政令未見有可以慰天下之心者而但聞利害相傾愛惡相攻議論紛紜斥免繼踵臣恐四方有以窺時政者矣國家設官分職置臺諌官臺官以糾邪慝繩愆違肅朝倫諫官以拾遺補闕規君過歷代具員各揚其職仁宗虛懷盡下容納無擇先帝英明健粹令出惟行陛下祗遹成憲以端治本王道正直在執厥中所言是耶事固當無大而必從所言非也事亦當無小而必察取其至當何所依違天無私覆日月無私照帝王之心如是而已矣又方今朝廷之大弊政事所以因循人情所以不盡止為避煩言恤形迹事小嫌廢大體名曰公道其實徇私名曰慎重其實茍且以此為適治之路是猶北轅而之楚也伏願陛下廓大明恢逺度有以率勵群下革此敝風俾協恭和衷共成雅俗如此則君體以尊人倫以穆紀律可得而正風俗庶幾乎厚陛下以此圖於執政推是而廣之觸類而長之治路由此而適顧為近爾蔣之竒轉殿中侍御史上謹始五事一曰進忠賢二曰退姦邪三曰納諫諍四曰逺近習五曰閉女謁神宗顧之曰斜封墨敇必無有至於近習之戒孟子所謂觀逺臣以其所主者也之竒對曰陛下之言及此天下何憂不治監察御史裏行彭汝礪奏曰陛下懲茍簡之敝悼事功之廢教農夫興水利開邊境造出法度付之有司使車絡繹出求遺策其始求深而其欲速纎人附託急功趨利貪功盜賞誤陛下事多矣水監言為陛下興水利者也如異時開南京白溝河所役工數百萬而為之死者數千百人一州府庫皆至空竭終以無可成罷之如京師開丁字河其言利者必以為無窮者也以其利無窮故國家亦輕厚費而成之堰成今二年矣陛下試使人察之其利何在也如濬川司所役日三千人日給錢三十以嵗計之工積至百十萬以月計之金積至三千緡其他物至廪祿衣賜一未論也其利害則陛下固自試之久矣司農言為陛下養民者也如為方田手實海內為之騷然稅終不能均如異時以布衣為使教種稻田置農器立農舍紛紛幾年旋以罷廢矣如兩安撫司募人歸京東教蠶者數十户而道路流離凍餒以死者幾盡焉而學士大夫猖狂妄言爭提空名以盜實利故上有不資之費而下無經久之計民有無窮之害而官取甚優之賞古今豈有此理凡臣所陳皆陛下耳目所及也而為誕謾如此推至於所不及蓋有不勝言者矣以此知事之不可易也方舜禹之盛相與有為於上固無遺策矣而所以相戒亦曰率作興事慎乃憲欽哉則興事之難非獨今也蓋聖人吉凶與民同患則不能無事而其動隨而不先故與四時相先後而不遺其法應而不倡故與萬物相酬酢而不匱其功緩而不迫故與萬物相終始而無盡夫豈嘗有意哉子曰因所利而利之不亦惠而不費乎擇可勞而勞之不亦勞而不怨乎今之事雖勞之不能無怨而所費不足為惠矣惟陛下加察焉汝礪又奏曰臣聞天下之法非制之難而變之亦難非變之難而當於理之為難蓋有為者嘗始於勤而卒於怠方其乘可為之勢而內有至誠惻怛之心在彼惟無所言有所言皆行之在我惟無所行有所行皆至焉及其久也或已為而無狀或已行而有弊而浸潤之言入危疑之説進而心怵然為戒為之回顧為之躊躇不進而昔之至誠之心解矣惟其所養育之人材與所感動之風俗已如是念所以焦勞而成之者又如是欲棄之則嘆息已著之前功欲革之則遲疑未然之來效此改變之所難也夫理有是非故容有取捨事有利害故容有損益然知其為是非利害而不知其所以為是非利害則雖以為是而非固已勝之雖以為利而害固已隨之陛下造事議法多古人之深意而小人不能奉承明詔急於功利故改為幾十年而事功未至成就而使陛下有疑焉如罷河防司歸都水監罷帳司委提舉司未幾皆復焉人於此有以窺陛下矣臣願陛下加詳焉無忽慮不可以不前定不前定則搖令不可以數易數易之則輕蓋今天下之勢如大廈之已構矣其為門闌堂室之體其為髙下廣狹之制其方員象天地其內外法隂陽其晦明象日月蓋已成矣而材未備勢未完疾風淩雨並至而乘之而居者不安焉為匠氏計易棟楹榱桷之傾邪橈折者補堂塗蓋瓦之破闕者飾丹雘之未至者於已壞者修於已完者加固如此則益善矣使不顧其已善而欲以一日之力盡革出而鼎新之臣恐且成者復壞欲為者未集邦家之基危矣臣願陛下加慎焉然臣所論興事非為事卒於不可興也欲加詳而已所論變法非為法卒於不可變也欲加慎而已始以一人之言而興之而不計其為害終以一人之言而廢之而不存其為利物必有受其弊者矣左右皆曰可為未可也諸大夫皆曰可為未可也國人皆曰可為然後察之見可為焉然後為之左右皆曰可廢未可也諸大夫皆曰可廢未可也國人皆曰可廢然後察之見可廢焉然後廢之夫所廢興者與衆共之雖更萬世之久盡天下議論不可奪矣何則其理固同也蓋天下之是非為其理而已茍循其理何所為而不得邪惟陛下裁幸汝礪又奏曰昔先王之為國也其所以總領而維持之者可謂備矣九州四海之逺所君者一人而已以為不足也則分天下之土為公侯伯子男凡五等猶以為不足也則列天下之國為屬長連帥卒正者凡七等猶以為不足也則并諸侯之國而為之伯者二人上下相維若網之在綱而天下總萬國之逺制於一堂之上諸侯蹶角稽首又聽號令循法度若指之應臂其有不率則其長得而治之然又以為未足也於是有巡守焉至於其邦問百年者就見之命太師陳詩以觀民風命市納賈以觀民之好惡命典禮考時月定日同律度量衡禮樂制度衣服正之而有刑有流有討有賞此諸侯所以謹度而民莫不安也自侯國之廢學士之言不及此矣今天下縣有令郡有守列郡有提刑有轉運有發運所治者財榖而已於民事有不與也有安撫鈐轄有總管經略所制者兵而已而民事或不與也夫古之侯國其德之所以相長者如此之衆而今之郡縣所以總領者如此之約而任之未必當責之未必久此無怪乎天下之未治也臣欲乞因今之所謂安撫鈐轄而以重臣任之稍并衆任使職司皆得以統攝而一道之利害黜責皆得以安撫領使如古之州伯也三嵗遣近臣出使以盡民間之禍福利害而察百官之賢智愚不肖使如古之巡守也如此則逺近內外無有不安者矣金君卿奏曰臣竊嘗考古之道觀今之宜切於治要者莫若節冗費使國用充足而民力有餘謹法令使下必奉行而無姑息茍且之弊敦風教勵名節使人知廉恥而無澆競之俗朝廷固當留意於斯而言事之人未能别白指陳使可施行殆亦垂之空言而已伏惟皇帝陛下天資仁智宵旰勵精詢謀臣工以圖極治故有大廷轉對之訪雖甚狂狷皆優容之微臣故敢吐忠獻愚條上三策願陛下賜臣須臾之暇使得口陳以展盡其意然後乞賜財擇覬其必行臣不勝幸甚仰黷宸旒臣無任激切屏營之至一事臣前所謂節冗費使國用充足而民有餘力者臣且粗陳其一每嵗可減冗費數百萬貫竊聞天下州軍招置廂軍人數多少不等每嵗增耗無有定額治平間總五十一萬人臣嘗籌之以廂軍諸處則例參以軍分上下約度除招軍例物賞給外所支錢糧衣賜等物每一名約嵗費緡錢三十七貫已來且以五十一萬人約之嵗費錢一千八百八十七萬貫自明道已來數十年間每嵗之數亦有止於四十三萬人已來嘉祐中只有四十五萬人向時天下漕運占役之處亦無闕事今其數既多嵗月縻耗庫廪不得不空以至諸州支領綱運火兒工錢之費亦無所減制詔謂賦入日增而國用日虧者豈不由此也臣又聞皇祐中置司減省冗費治平間宣勑亦以兵冗之故戒敕官司不得妄有占役朝廷節費省民之意不為不至矣臣今愚見欲乞在京特置官司及遣使與諸州軍例合占役要用廂軍人數立定常額且以州府軍監大小或通江河或居僻左以綱運多少縣鎮倉場及官司占役等處裁定人數然後以多補少移於闕人州軍選不任役使虛食廪稍者減放旋關申在京減省官司更將諸州人數參詳損益大率以仁宗朝已來四十餘年廂軍人數約度取其中數裁定逐州常額今後須是額數闕人方得招填臣愚試約度且以四十四萬人為額可減放七萬人每嵗且減費緡錢二百五十九萬貫其所減招軍例物又不下六十餘萬貫臣試以向來西北餌胡之費較之可減其數三倍朝廷方欲富國息民宜無遺此策臣昨守任澶州雄州日竊見逐州半糧兵士不下五七百人諸州類多如此皆占間慢去處甚可裁減臣守任池州日本州所管過犯軍七百餘人況僻逺山郡此類衆多或因飢饉亦不可不虞臣欲乞今後諸州有過犯配軍滿百人即仰聞奏乞權住配朝廷亦嘗有指揮委監司體量配軍罪犯輕者聞奏經年嵗間得減放還鄉者百無一二臣欲乞指揮雖因罪犯本非巨蠧自配充軍二十年而年六十五已上者可盡行減放其逃亡及因差役久不歸營不曽開閣請受冒請錢糧其弊極多乞因此根磨仍令都監司及糧料官司常切關防免虛破廪食更乞嚴行條禁諸州有招小弱疲羸之人充數今後亦乞重行約束令諸路監司常切點檢比來向南州軍抽差軍人往諸處工役未幾放還其死亡已過半臣竊計疲弱軍人嵗月間縻耗廪食以丁壯一時之役較之所費既少而用力倍多欲乞今後有得朝旨興修河防之類令優與工直雇召丁夫充役如必要抽差廂軍亦須揀選堪役之人相兼丁夫役使又西北沿邊州軍設有不堪征役之人尤難餽給候諸處減定然後相度量與裁損其禁軍亦乞特賜裁酌臣未敢悉條其事恐煩聖覽如朝廷以臣言為然乞命大臣置司行遣令臣得參預其議然後别開陳條件奏請施行必收此策冗費自銷庫廪封實民有餘財可翹足而待也二事臣前所謂謹法令使下必奉行而無茍且姑息之弊者臣竊聞朝廷命令之出非不丁寧戒敕然州縣之吏或多因循其名雖曰行下鮮能收其實者向來朝廷須降條貫州縣亦甚有因循去處臣不敢悉數又如赦敕內合頒行條件往往經歷官司逾年不能結絶使上之德澤塞而不流此蓋官吏奉法不謹之故也制詔謂州縣之官課空文而尸素者良謂此也臣欲乞申敕有司今後宣敕指揮州縣施行除程限外經半年不奏報及赦敕內合行條件一年內不盡遵行結絶者委監司按舉或言事之官彈劾以聞當職官吏重行黜責不在去官原赦之限又軍中教閲之法朝廷之所留意臣昨守任邊州見諸處武臣全不以此為意皆云督促教閲便致生事姑息之弊以至於此而欲精兵鋭卒緩急應用不可得也臣愚欲乞更賜約束令監司點檢武臣課績别以一項明述教閲精否為殿最而黜陟之如此則州縣之吏軍旅之政皆知奉法舉職而無姑息茍且之弊也三事臣前所謂敦風教礪名節使人知廉恥而無澆競之俗者臣竊見比來士人往往有不顧名節澆薄日甚設以如此等人為州縣長吏而欲民知廉恥息爭心不可得也此蓋士人學無本原又取士之法難求行實之故古者取士先以鄉里孝悌之行今貢士既多其間得無浮濫雖有縣令保明之法然不過取質於村耆坊正之言又不逞之徒自相為保而縣令且非久任難以盡責其保臣今欲乞每遇科場發解後令知州通判更察其行迹其得解舉人中不以解名髙下有經術履行為鄉里所共推髙者特與旌别保眀聞奏如擢科第乞與升甲名或守選者與免選除注其間却有不行止及有虧孝悌不為鄉里所齒者許明其事迹彈舉其人雖已及第亦未得理選限後來却能改過自勵候有本貫知州通判縣令職事官一員同罪保奏方與理選限差注如此行之每次科場稍警策其一二自然相率皆修行檢也又國庠賢士之關風教所自出欲乞置五經博士傳以小經令學者各授一經諸州學者亦皆倣此各專經術每遇科試三策中將一策問其所學經義所貴學有本原而經明行修之士出矣臣又聞朝廷開薦舉之路惟務得人不專閥閲今後臣僚每嵗保薦人數有全不及孤寒者許言事之官彈劾以聞臣又聞詔百官轉對本求民間利病其間有專以愛憎攻訐者頗傷刻薄朝廷近行黜責聳伏群聽欲乞更明降詔書戒敕百僚使知寬大之意制詔謂變風俗之澆訛臣敢以此為獻臣之淺聞姑陳其一二庶幾士重名節民知廉恥而成美治之俗也右謹具如前臣人賤言鄙不足以上副詔書丁寧詢訪之意惟陛下赦臣淺陋浼瀆天聽之罪臣不勝幸甚右司諫蘇轍上奏曰臣謹按青苖免役保甲市易四事得失最為易見上自中外臣僚下至田夫野老無有一不知者但以朝廷所行言其是則有功言其非則有罪是以畏避鉗默不敢正言今謹採衆議人所共知灼然可見者畫一開坐如後一議者皆謂富民假貸貧民坐收倍稱之息是以富者日富貧者日貧今官散青苖取息二分收富人兼并之權而濟貧人緩急之求貸不異於民間而息不至於倍稱公私皆利莫便於此然公家之貸其實與私家之貸不同私家雖取利或多然人情相通别無候法今嵗不取而取償於來嵗米粟不給而繼之以芻稿雞豚狗彘皆可以還債也無嵗月之期無給納之費出入閭里不廢農作欲取即取願還即還非如公家動有違礙故雖或取息過倍而民恬不知今官貸青苖責以見錢催隨二稅鄰里相保結狀請錢一家不至九家坐待奔赴城市糜費百端一有逋竄均及同保貧富相逮要以皆斃而後已朝廷雖設法度以救其失而其實無益也一議者又謂平時差役破壞民家一夫為役舉家失業故使逐户出錢官為雇人謂之免役出錢雖多而民免於破家之患以此為説行之不疑然不知三代之民以力事上不專以錢近世因其有無各聽其便有力而無財者使效其力有財而無力者皆得雇人人各致其所有是以不勞而具今也棄其自有之力而一取於錢民雖有餘力不得效也於是賣田宅伐桑柘鬻牛馬以供免役而天下始大病矣且夫錢者官之所為米粟布帛者民之所生也古者上出錢以權天下之貨下出米粟布帛以補上之闕上下交易故無不利今青苖免役皆責民出錢是以百物皆賤而惟錢最貴欲民之無貧不可得也至如京師百司郡縣刑法之吏無祿而役為日久矣周制庶人在官雖曰有祿而事簡吏少勢或易供非如今日員數猥多不可供億況三代兵出於民而今世之兵坐而仰給若又兼舉大費為力實難然議者以為給之以祿然後可責之以廉蓋朝廷選吏之精必不如擇官之慎祿吏之厚必不如祿官之多今慎擇多祿之官猶不免於貪而況於吏人乎且昔之為法也計贓得罪無祿者減等今用倉法則吏之得罪反重於官顛倒失宜尤為未可若朝廷誠患吏貪但使官得其人則吏之受賕自有分限若猶未也則雖重祿深法不能禁矣一議者又謂三代之盛兵出於農故團結伍保以寓軍今朝廷喜其近古亦謂可行然而三代之民受田於官官之所以養之者厚故出身為兵而無怨今民買田以耕而後得食官之所以養之者薄而欲責其為兵其勢不可得矣蓋自唐以來民以租庸調與官而免於為兵今租庸調變而為兩稅則兩稅之中兵費具矣且又有甚者民之納錢免役也以為終身不復為役矣今也既已免役而於捕盜則用為耆長壯丁於催稅則用為户長里正於巡防則用為巡兵弓手一人三役具焉民將何以堪之且其為巡兵弓手也一保甲之中丁壯既出老弱守舍盜賊乘間如入無人之境而其上畨之期又不過旬日坐作進退未能知也代者既至相率而反往來道路勞弊何益至使盜賊縱橫官吏蒙責嘯聚群黨攻剽州縣未必不由此也古之循吏使民賣劒買牛今也使之棄其農具而置兵器小民無知緣以為惡良民之畏事者一入而終身不得脫姦民之好權者一補而終身不得免其為患害有不可勝言者矣一議者常患百貨輕重制在富民少則貴賣以取贏多則賤買以要利利有所壅商賈難通於是置市易之官以平貴賤有司誠守此議不更别有所營則雖繁碎難行然亦未有深害今自置市易無物不買無利不籠命官遣人販賣南北放債取利公行不疑杜絶利源不與民共觀其指趣非復制其有無權其輕重而已也徒使小民失業商旅不行空取專利之名實失商稅之利國體卑辱海內離心巍巍盛朝何若於此況復小民好利類無逺見爭取官債以救目前欺謾父兄妄引抵當期限既迫逃竄無所婦子離散行路咨嗟奈何為此陷穽誘而納之也至於姦民巨賈窺伺間隙取利或多或輸滯積不售之貨以易見錢或指殘破無用之屋以賖實貨巧智百出難以盡言有司蒙蔽指以為利泉幣一散汗漫難收官之所藏徒文具而已竊聞朝廷近日將議窮究然而既弊之法施行未已買賣百物猶且如故譬如含茹毒藥喉舌破敗胸腹脹滿知其非矣然且閉口不吐安坐切脈廣求方書其於速愈之術疏矣右臣所陳畫一事件皆是耳目所接衆庶共知朝廷清明豈有不察若誠有意改易非復難行但朝出一紙詔書四弊夕去非如前代積弊或在列國或在四夷欲議改更恐其動搖海內故且維持含養茍自便安今事在朝廷出命則已衆所係望勢難久留而私自顧戀遲遲不決以失天下之心臣竊不取也愚蠢之人志在憂國言詞激切干犯典刑區區寸誠甘俟誅戮吕元鈞對策曰臣聞大智者聖人之德而虞舜察邇言蓋萬事之統顧省不遺而慮之深也中行者君子之能而仲尼與狂狷蓋匹夫之志固守難奪而不可棄也此二者施諸君臣之際而要其歸則上有求善之美而下不失為盡節不欺之士各崇所尚義何虧焉今陛下席太平之基運獨化之術元臣良輔講磨原本於內庶官群吏奔走職業於外經制立而可以庇萬嗣號令出而可以肅四方治定功成信有日矣然猶詔舉賢良方正之士親策於庭退託不明延訪得失者豈非虛已好問求盡天下之情歟臣愚不肖不足以備當今之下執事雖竭盡傾寫安能補陛下萬分之一乎然不敢以荒略無取為解而逆探朝廷之意願獻於前者蓋以為賢良之義貴犯而不貴隱惡斯義之廢自臣始也且人各有異能而所以取之者必主於一求將帥主於勇求守令主於廉求法吏主於文而求賢良主於直捨是則雖有異能而亦不取矣今將帥不言其勇而言其仁守令不言其廉而言其通法吏不言其文而言其朴則陛下取之歟臣雖不肖而所以進者賢良也敢不一於所主而求伸其志哉恭惟聖策有曰昔明王之治仁風翔洽德澤汪濊四時調萬物和兵革不試刑辟不用雋賢居位戎夷嚮風建皇極以承天斂時福以錫民日星雨露鳥獸草木效祥薦祉陛下甚慕之而訪臣以致之之術者此陛下深思治體而究其所由欲均大利於四海也臣愚何足以知之然臣聞人事有本末物理有始終王道之施設固有先後端本所以治末慎始所以圗終施之宜先則不可後於一日乃治體之所起也昔春秋以五始明王法謂一為元者視大始而欲正本深探其本而所貴者始也然則人君之即位者天下之大本而王道之始乎兆民億姓延頸企踵而覬其撫養也則必有以慰其望公卿輔佐致忠竭節而副其任使也則必有以結其心外藩邉衆悚意懾慮而仰其懷徠也則必有以悅其情古之賢王深知端本慎始之義而施設之具無先於此藴之而為盛德發之而為大政如日月之照臨雨露之潤澤使人人聞之率皆聳動鼓舞以為吾君之有某善則吾之幸也吾君之舉某事則吾將享其利焉是故散而為仁風霈而為德澤幽可以調四序明可以和萬物兵不試而威立刑不用而政成俊傑在位而百職舉邉人欵塞而九貢集大中之道建而上順乎天五韙之福應而下休乎民日星雨露鳥獸草木諸福之物可致之祥莫不畢至而王道終矣書稱髙宗之德曰作其即位嘉靖商邦至於小大無時或怨詩稱成王之嗣政則以小毖慎微恭敬進戒為先務豈非端本慎始之意乎及其明驗大效之見於後則德業昭著教化深厚措世乂安傳祚永久得不盛哉今陛下承五聖之統講求治具而以任大守重為之憂故臣敢以端本慎始為獻願陛下不惑理財之説以慰生民不間老成之謀以結公卿不興疆埸之事以懷外國惟陛下深思而切究之則堯舜之治可以積久而致何在昔明王之足慕哉聖策曰人君即位必求端於天而正諸己惟五事得其常則庶徴協其應享國以來靡敢自肆而和氣猶鬱大異數見乃元年日食三朝洎仲秋地震數路而冀方之廣為災最甚者此陛下畏天命而求所以順也臣聞天人之際精祲有以相感洪範之陳五事春秋之書災異眘其微也然世之説者有兩端焉一曰彼穹然居上者何預於人事乎日月星辰之淩錯隂陽水旱之愆亢皆大數使之然未必發於政事是天之與人離為二而言非嚴恭寅畏之道也一曰災變之來率以類應某政之失則召某祥某事之非則召某異蓋自兩漢諸儒若劉向董仲舒郎顗襄楷之徒皆指時事一二以明之牽連遷合務必其驗是不能推明天人之端以啓導世主而徒溺於禨祥也臣則謂之不然夫天之降命於君而付以大器者必有扶持全安之心警懼告戒之意矣示以災沴諭以變怪者欲其飭躬而務德慎事而圖寧也非無預於人事也非指其一二之失而致也天人之際如是而已陛下即位以來勵精庶政蟲魚草木率被煦飬而改元之嵗日食三朝者天心之憂陛下而告以始終之義也改元者陛下踰年須政之始更新萬事之時日者至明之物不可輒晦天意若曰陛下宜慎之於始輝光盛德而不可少虧也仲秋之後九州之地大半震動大至裂陷小亦覆壓京師亦震冀方最甚者天心之佑陛下而示以安危之端也地者至靜之物常處其安者也一失其常動而不已天意若曰靜而有常則安動而失道則危願陛下居安慮危也祖宗由河朔起則冀方如本封陛下以四海為家則京師如堂室震動之變形於斯者非獨外憂可虞抑亦內患可慮也疆圉之憂生於綏御之失術軍旅之憂生於威愛之偏任環衛之患生於防遏踈略近習之患生於任使之過重此四者世嘗有之非臣之私憂過計也至於虹貫日地生毛太白經天熒惑失度此又警戒之深也教化有未備乎德澤有未至乎賦稅過重乎刑罰失濫乎干戈可虞乎盜賊不戢乎大槩有以感之故天意諄諄而不已也易曰其亡其亡繫於包桑言泰通之世深念其危則悔吝不生矣詩曰肇允彼桃蟲拚飛惟鳥言蒞政之初慎其小則禍敗不至矣願陛下思天人之交窮詩易之戒則大異弭去而和氣感召如影響焉聖䇿曰圖講政務則日至中昃而猶多茍簡之習蒸進人材則官無虛假而頗乏績用之美者臣聞古之聖人未嘗不勤文王之治日至中昃而不遑暇食然至於庶言庶獄庶慎則罔攸兼之惟有司牧夫之是任蓋勞于求才逸於用賢故也且帝王之道與天地參天地之化分任四時以生成萬物而不專於一草一木之長育蓋元氣統於上而萬物無不遂者矣帝王之道慎擇群賢以翊輔萬政而不偏於一物一事之修飾蓋至權歸於中而萬政無不舉矣恭惟陛下體乾之剛以運動法離之明以照逺既得群賢以任之又舉綱要以濟之則文王勤治之德偕美於古而虞舜無為之功復見於今也茍簡之習何慮不革哉若夫蒸進人材而乏績用則臣略究其端矣夫唐虞之盛九年而黜陟姬周之隆三嵗而大計蓋磨以嵗月而觀其能否然後進退之深慎名器而不敢妄與也今之自選部而升京秩者為考六七為舉主五六人而後得自京秩而至郎官者凡四嵗一遷焉其於名器不輕而重也信矣陛下至誠待物急於得人拔擢俊良於微賤之中而置在髙位者數矣此皆賢能不次而用非若向之碌碌者限以嵗月也然賢能不次而用王政之一端耳人之能否可不察哉孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之蓋小人之性役於利祿而好為趨時希世之事揣知人主之意而務求其合茍可以取寵於上則不暇量已之材能與否也陛下急賢而用不次進之則其心何負於天下之士哉然天下之士則有負陛下者此衆心之所惑也蓋嘗以邊幾進者而將帥辨其構怨於外羌也又嘗有可任御史者而言者謂其薄於孝也始而聽其言中而試以事終而驗其能否則天下之士不能負陛下而績用不乏矣聖策曰種羌非不懷徠也而邊候或時繹騷以至臨遣輔臣憺明威武者臣聞中國之於四夷若天地之於萬物遍覆包函而使之自遂耳安用較其力之勇怯責其心之去留哉厥或侮慢不庭則征伐亦不得已而自用也朝廷之於西羌可謂厚矣加之王爵而襲其土賜之金繒而未嘗缺然自近嵗以來逆心日甚多遣介使以伸難塞之請起犯邊吏以求克捷之效此固宜俘擒而殄戮之矣是以陛下臨遣輔臣而將伸九伐之令也然臣愚以為中國之力有盈虛外域之勢有強弱則必量而後動度而後行焉至道中天下之全盛也兵之強民之富將之豪傑足以威制四夷而無憚矣然猶五路之入卒無成功此長驅深入得失之驗也康定間比於至道則三者皆不及矣是以邊聲一動而逺近騷然以四海之力事一方而猶為汲汲饋運之勞纍嵗不息而朝廷深有厭兵之心卒用間謀與之和解而生民始知休息之漸則兵不易動亦明矣以今之兵今之將擬於康定則未必過之而民又不及矣向者陛下即政之嵗乘諒祚殘忍之極旱飢相仍部族怨二是以王師一舉而輒復綏城之地然人之戰沒者蓋已萬計財之耗壞者凡幾百萬耶近者秦慶二路寇入輒勝臣竊疑其勢力非復向時旱飢之餘矣金湯之固非粟不守而塞下之積多者止再嵗少者不數月也藩籬之户倚以為援而強者逋逃而無幾弱者不足恃也寬文法而豪縱之將可以致死而細過多從於吏議也飽金帛則覘候之士可以知微而薄惠不足以使人也廣屯田則可以豐軍食而有司曠廢其事也恤土兵則可以助戍而平居未嘗少寬也此皆我之未備矣以我之未備乘彼未易量則莫若講求守禦之具而徐為之謀也朝廷必有以制之臣愚不能處也陛下謂威而必服邪則威亦有未服謂戰而必勝邪則戰亦有未勝就使必服必勝則生民供餽亦已勞矣若猶未也則兵連禍結何時而息乎關陕一擾則寇盜必乘而起種羌之患未解則西宜備蜀北亦慮胡矣夫逺夷之不討與元元之重困孰為輕重起一方之事而召三隅之憂孰為得失願陛下權量其宜而行之昔漢宣帝欲擊胸奴而魏相以為不可報怨逺夷是以享三世稱藩之效唐太宗欲征突厥而長孫無忌願且戢兵是以終正觀太平之績臣故曰願陛下權量其宜而行之也聖策曰蒸民非不愛養也而生業或未寬富以至外馳使者宣布惠教臣聞陛下愛民之心均於赤子矣而生業或未完者其大弊有三焉一曰郡吏之不足役及上農而使之破産竭財而斃於凍餒此天下之深不平也今夫細民之家牛羊耒耜糇糧裘葛苟有數十金之直則舉而籍之於公以備役之之費矣方其役之將至而知其必及於死也則其心如避重誅其力如捍巨寇焚滅屋廬戕伐桑柘以求其不及甚者乃服浮圖𨽻兵籍以一身自陷於非類而覬幸於斯世又其甚者子嫁其母而昆弟得以離居父子謀為自經而求省其丁口此暴役之弊也二曰天災間作穡事不登則有除賦之令以恤其流亡而有司以掊刻為勞而務足功利霜雹旱蝗五種之入無分毫矣而輸入之數十猶五六此重賦之弊也三曰負於公而情不欺者赦宥為之蠲釋以寬其貧窮而主者網羅疑似索求罅缺幸其少戾於法而督之益嚴及其委棄溝壑而勢不可得則猶能鞭笞其子孫縲械其鄰里而有望於下此積逋之弊也臣願陛下慎擇忠厚之吏以為守宰而使之不妄舉立為寬通之制以便衆庶而使之不重困則休養生息皆陛下之實惠矣雖使者冠蓋不交於道而惠教安有不宣者乎捨是則雖朝遣一使暮置一官又何益於治乎陛下不先責此徒刻薄更張之為臣愚之所未諭也聖策曰國用雖節而尚煩於調度兵籍雖衆而未精於簡稽者臣亦粗聞其説矣天下之財有常而國家有餘不足之無常者蓋取財與用財之道異也善取則財雖多而常不足善用則財雖寡而常有餘今天下之所謂利凡四總二十八品之餘百物有禁蓋盡之矣而出無餘者未明節之之要也未慎用之之道也節其可已而備其不可已用其不可費而可以足費則善矣國之大費六宗枝之祿也萬官之養也冗兵之食也二邊之賜也郊祀之錫也河防之備也皆不可一日而節若乃賜與有橫濫服用有侈靡掖庭燕私廪給之盛百工技巧冗食之多此皆可節之矣臣願量時制宜一切減損以蕃貨財以備六費之大此之謂節其可已備其不可已若夫興利者功易見省事者功難知易見則取信於人難知則置疑於衆惟其易見難知而信疑之兩出此財之所以日匱也今天下之利有博於解池者乎嵗入百餘萬耳有百萬之利獻陛下儻從而𣙜之則其人之功豈不易見哉然綏城之兵一用而費六百萬是四嵗解池之利去矣有以綏州之不足城告陛下者儻從而棄之則是能置四嵗之解池矣然其言主於省事而不主於興利則其功豈不難知哉究其歸則興利之利不如省事之為利願陛下反求其端而慮焉是之謂用其不費而可以足費知此二者而不競於錐刀之末則調度將不煩而民力寬矣臣又聞國家患兵之冗而講求其術已久矣向者容其癃老今則黥其壯子弟向者簡閲之不密今則毫毛不敢欺向者慢於訓習今則朝夕從事以金鼓此三術者方今以為練兵之要臣復何言哉然臣之言繼於三術之後而究其情狀耳夫四方凶悍之徒群聚而安間驕惰而不足用蓋有年矣今一旦遽責之以去留立辨之以強弱則其心豈免於怨乎孰謂怨不損於王治而不恤也詩曰悅以使民民忘其死豈有驅人於死而先啖之以怨乎施諸用兵尤非全勝之道也三路者用兵之地也今未老者多黜而失其歸壯者則憂其將老而見黜臣恐有以動其徒類之心乘而生變不足禦寇而足以為寇甚非朝廷之利也聖策曰損器玩之巧而工弗戒者臣謂非獨法禁之不密亦教化未之至也夫民之於上從其好不從其令髙髻大袖其説舊矣今陛下雖行純儉以風天下而百工之肆日夜謀工巧求利於時是必有以導之也且法之行自近始教之至自上率願澄其源以潔其流則天下之工無不戒者也聖策曰風俗浮薄根於取士之無本教導之不明臺閣之論所執不一豈無救弊之道者臣謂非土著而不任鄉議取浮文而不根經術較工拙而不考素行今日取士之大弊矣比者朝廷講求群議而思有以救之雖論有異同而所以為弊者不過此也夫待人以薄者不可責其厚今養之取之之制大異於古則安怪其廉恥衰息哉臣願量時而立法貴其可以適用則莫若大均薦選之目而使衆寡適其平無幸與不幸則土著莫能遷矣限以一藝之習而試之家法髙説上第義參於文而取之則經術孰敢廢矣孝弟之科詔監司郡守時加詢察秩滿而薦之一二則素行可得而知矣本庠序之教而繼以三者則取士之道庶幾無失又何必變常動衆而求紛紛歟聖策曰刑罰煩重出於設法之多門沿襲之不革將加仁恩之政使死少緩必有可行之術者臣謂治而有刑非養威務刻而求勝斯民蓋欲使之畏罪而遷善也後世忘其本源而峻文密法以籠四海民之手足殆無所措此世主所以裁量揆敘而損益其間也陛下患刑之密而重報者衆將少緩焉此堯舜好生之德也然臣愚猶有獻焉夫所謂緩之之術者得非以他罪抵死則斬其左趾歟得非欲復古之肉刑歟夫他罪抵而斬其左趾則仁矣孰若出於權斷而貸其一死之快彼幸而不死而又為完人則豈不天地陛下之賜哉安俟施諸刀鋸以為罪次此景興之論愈於鍾繇也夫三代既衰而養民教民之具不可復見民之觸罪者蓋亦有不幸矣此肉刑難施於後世也養之薄而責之厚也教之迹而禁之密也昔漢之去周未逺一罷肉刑而笞有至死者民猶不以為怒是知肉刑之重而笞刑之輕也今笞不至死而去漢又千餘年一日復之民豈以為宜乎此衛度之論不及孔融也願陛下詳其折衷而已聖策曰欲興七教兼乎三至以底聖人之道者臣謂七教者生民之先務陛下舉為治本而濟以三至之用力行於上則聖人之道盡矣何愧於曽參之言乎若乃欲民眀六親盡乎五法以極天下之治者臣謂六親者人倫之大原陛下奉為政體而奉以五法之具周施於下則天下之治畢矣何違於管氏之説乎聖策曰仲舒之言班固謂切於當世可施於今日者何策臣謂仲舒之對本於春秋以陳王道故班氏美之就求其説而有曰任德而不任刑損文而用忠則亦可施於今也聖策曰崔實之論范曄謂明於政體有益於時者何事臣謂崔實之論極於理要不泥一隅故范曄稱之就求其説而有曰補綻決壞枝柱傾邪則亦有益於時也聖策曰無以古人之陳迹既久而不可舉無以本朝之成法已定而不可改者臣謂先王之政久必有弊不革而救之非所謂知變也然革之當否安可不慎乎易曰窮則變變則通此救弊之説也書曰各守爾典以承天休言法之不可易也使革而當耶則雖古人之迹有可舉而用矣使革不當邪則本朝之成法有不可改者矣謂古人之迹皆可舉則周之井地可行於漢夏之九州可復於魏矣謂本朝之法皆可改則成王不必憲文武之舊章孝景不必遵文帝之業矣聖策曰言之非艱臣是以不敢侈言而誇説凡天下之利病所謂可行與否者臣既略陳於前皆其迹之粗者易曰神而明之存乎人故臣於終也願陛下思所以神明之孔子曰足食足兵民信之矣既而曰去兵又曰去食而民之信之也卒不可去是以古之聖人縱橫反覆無所往而不遂者豈有他哉惟民之信而已是故湯為匹夫報仇而民不以為暴文王以民力為臺沼而民不以為為己及其不信則行仁義作禮樂而民始疑矣今陛下行假貸之政孟子所謂耕斂也豈有舉息之心哉復租庸之制周禮所謂大均也豈有困鰥寡之心哉拔士於貧賤之中漢帝唐太宗之用人也豈有尚功利之心哉增宫廟之員優致仕之祿此三代之養老也豈有退耆耇之心哉損律定令臯陶之明刑也豈有廢法行意之心哉併軍搜卒五霸之制兵也豈有輕士重祿之心哉其措意立法則皆幾於堯舜可謂盛矣陛下之心如此而天下之論乃如彼陛下見其紛紛而以咎天下之議者臣愚以為未安也盍亦反而思之豈未有以深信之歟先之以至廉則雖取之而不疑其貪況與之乎首之以至仁則雖殺之而不疑其暴況生之乎二者皆陛下之先務而未之深信則常平之議肉刑之法宜乎元元無知而懼之也詩曰左之左之君子宜之右之右之君子有之記曰至誠如神夫君子之於物左右而無不宜者惟誠而已矣臣敢以此獻監察御史裏行劉摯上疏曰陛下起居言動躬蹈德禮夙夜厲精以親庶政天下未至於安且治者誰致之耶陛下注意以望太平而自以太平為己任得君専政者是也二三年間開闔動搖舉天下無一物得安其所者蓋自青苖之議起而天下始有聚斂之疑青苖之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未艾而助役之事興至於求水利行淤田併州縣興事起新難以遍舉其議財則市井屠販之人皆召至政事堂其征利則下至歷日而官自鬻之推此而往不可究言輕用名器淆混賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之流俗敗常害民者謂之通變凡政府謀議經畫除用進退獨與一掾屬決之然後落筆同列預聞反在其後故奔走乞丐之人其門如市今西夏之欵未入反側之兵未安三邊瘡痍流漬未定河北大旱諸路大水民勞財乏縣官減耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也歷代名臣奏議卷三十八
