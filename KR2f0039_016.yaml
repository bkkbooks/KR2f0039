body:
  text: 歴代名臣奏議巻十六明楊士竒等撰郊廟陳文皇帝天嘉中大中大夫太常卿許亨奏曰昔梁武帝云天數五地數五五行之氣天地俱有故南北郊内並祭五祀臣按周禮以血祭社稷五祀鄭𤣥云隂祀自血起貴氣臭也五祀五官之神也五神主五行𨽻扵地故與埋沈疈辜同為隂祀既非煙柴無闗陽祭故何休云周爵五等者法地有五行也五神位在北郊圎丘不宜重設制曰可亨又奏曰梁武帝議箕畢自是二十八宿之名風師雨師自是箕畢下𨽻非即星也故郊雩之所皆兩祭之臣按周禮大宗伯之職云槱燎祀司中司命風師雨師鄭衆云風師箕也雨師畢也詩云月離于畢俾滂沱矣如此則風伯雨師即箕畢星矣而今南郊祀箕畢二星復祭風伯雨師恐乖祀典制曰若郊設星位任即除之亨又奏曰梁儀注曰一獻為質三獻為文事天之事故不三獻臣按周禮司尊所言三獻施扵宗祧而鄭注一獻施扵羣小祀今用小祀之禮施扵天神大帝梁武此義為不通矣且尊俎之物依扵質文拜獻之禮主扵䖍敬今請凡郊丘祀事準扵宗祧三獻為允制曰依議隋文帝時禮部尚書牛𢎞請依古制修立明堂上議曰竊謂明堂者所以通神靈感天地出教化崇有徳孝經曰宗祀文王扵明堂以配上帝祭義云祀于明堂教諸侯孝也黄帝曰合宫堯曰五府舜曰總章布政興治由来尚矣周官考工記曰夏后氏世室堂脩二七廣四脩一鄭𤣥注云脩十四歩其廣益以四分脩之一則堂廣十七歩半也殷人重屋堂脩七尋四阿重屋鄭云其脩七尋廣九尋也周人明堂度九尺之筵南北七筵五室凡室二筵鄭云此三者或舉宗廟或舉王寢或舉明堂互言之明其同制也馬融王肅干寳所注與鄭亦異今不具出漢司徒馬宫議云夏后氏世室室顯扵堂故命以室殷人重屋屋顯扵堂故命以屋周人明堂堂大扵夏室故命以堂夏后氏益其堂之廣百四十四尺周人明堂以為兩序間大夏后氏七十二尺若據鄭𤣥之說則夏室大扵周堂如依馬宫之言則周堂大扵夏室後王轉文周大為是但宫之所言未詳其義此皆去聖久逺禮文殘缺先儒解說家異人殊鄭注玉藻亦云宗廟路寝與明堂同制王制曰寝不踰廟明大小是同今依鄭𤣥注每室及堂止有一丈八尺四壁之外四尺有餘若以宗廟論之祫享之時周人旅酬六尸并后稷為七先公昭穆二尸先王昭穆二尸合十一尸三十六王及君北靣行事扵二丈之堂愚不及此若以正寢論之便須朝宴據燕禮諸侯宴則賔及卿大夫脱屨升坐是知天子宴則三公九卿並須升堂燕義又云席小卿次上卿言皆侍席止扵二筵之間豈得行禮若以明堂論之總享之時五帝各扵其室設青帝之位須扵太室之内少北西靣大昊従食坐扵其西近南北靣祖宗配享者又扵青帝之南稍退西靣丈八之室神位有三加以簠簋籩豆牛羊之爼四海九州美物咸設復須席工升歌出罇反坫揖譲升降亦以隘矣據茲而說近是不然按劉向别錄及馬宫蔡邕䓁所見當時有古文明堂禮王居明堂禮明堂圗明堂大圗明堂隂陽太山通義魏文侯孝經傳䓁並說古明堂之事其書皆亡莫得而正今明堂月令者鄭𤣥云是呂不韋著春秋十二紀之首章禮家鈔合為記蔡邕王肅云周公所作周書内有月令苐五十三即此也各有證明文多不載束晳以為夏時之書劉瓛云不韋鳩集儒者尋扵聖王月令之事而記之不韋安然獨為此記今案不得全稱周書亦未可即為秦典其内雜有虞夏殷周之法皆聖王仁恕之政也蔡邕具為章句又論之曰明堂者所以宗祀其祖以配上帝也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰𤣥堂内曰太室聖人南面而聴向明而治人君之位莫不正焉故雖有五名而主以明堂也制度之數各有所依堂方一百四十四尺坤之策也屋圎楣径二百一十六尺乾之策也太廟明堂方六丈通天屋径九丈隂陽六九之變且圎盖方覆九六之道也八闥以象卦九室以象州十二宫以應日辰三十六户七十二牖以四户八牖乘九宫之數也戸皆外設而不閉示天下以不蔵也通天屋髙八十一尺黄鍾九九之實也二十八柱布四方四方七宿之象也髙三尺以應三統四向五色各象其行水濶二十四丈象二十四氣扵外以象四海王者之大禮也觀其模範天地則象隂陽必據古文義不虚出今若直取考工不叅月令青陽總章之號不得而稱九月享帝之禮不得而用漢代二京所建與此說悉同建安之後海内大亂京邑焚燒憲章泯絶魏氏三方未平無聞興造晉則侍中裴頠議曰尊祖配天其義明著而廟宇之制理據未分宜可直為一殿以崇嚴父之祀其餘雜碎一皆除之宋齊已還咸率茲禮此乃世乏通儒時無思術前王盛事扵是不行後魏代都所造出自李沖三三相重合為九室簷不覆基房間通街穿鑿處多迄無可取及遷宅洛陽更加營構五鬼紛競遂至不成宗配之事扵焉靡託今皇猷遐闡化覃海外方建大禮垂之無窮𢎞䓁不以庸虚謬當議限今檢明堂必須五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黄曰神斗白曰顯紀黒曰𤣥矩蒼曰靈府鄭𤣥注曰五府與周之明堂同矣且三代相沿多有損益至扵五室確然不變夫室以祭天天實有五若立九室四無所用布政視朔自依其辰鄭司農云十二月分在青陽䓁左右之位不云居室鄭𤣥亦云每月扵其時之堂而聴政焉禮圗畫个皆在堂偏是以須為五室明堂必須上圎下方者何孝經援神契曰明堂者上圎下方八窓四逹布政之宫禮記盛徳篇曰明堂四戸八牖上圎下方五經異義稱講學大夫淳于登亦云上圎下方鄭𤣥同之是以須為圎方明堂必須重屋者何案考工記夏言九階四旁兩夾窓門堂三之二室三之一殷周不言者眀一同夏制殷言四阿重屋周承其後不言屋制亦盡同可知也其殷人重屋之下本無五室之文鄭注云五室者亦據夏以知之明周不云重屋因殷則有灼然可見禮記明堂位曰太廟天子明堂言魯為周公之故得用天子禮樂魯之太廟與周之明堂同又曰複廟重檐刮楹逹嚮天子之廟飾鄭注複廟重屋也據廟既重屋明堂亦不疑矣春秋文公十三年太室屋壊五行志曰前堂曰太廟中央曰太室屋其上重者也服虔亦云太室太廟太室之上屋也周書作洛篇曰乃立太廟宗宫路寝明堂咸有四阿反坫重亢重廊孔晁注曰重亢累棟重廊累屋也依黄圗所載漢之宗廟皆為重屋此去古猶近遺法尚在是以須為重屋明堂必須為辟廱者何禮記盛徳篇云明堂者明諸侯尊卑也外水曰辟廱明堂隂陽錄曰明堂之制周圜行水左旋以象天内有分室以象紫宫此明堂有水之明文也然馬宫王肅以為明堂辟廱太學同處蔡邕盧植亦以為明堂靈臺辟廱太學同實異名邕云明堂者取其宗祀之清貌則謂之清廟取其正室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧廱其實一也其言别者五經通義曰靈臺以望氣明堂以布政辟廱以養老教學三者不同袁準鄭𤣥亦以為别歴代所疑豈能輒定今據郊祀志云欲治明堂未曉其制濟南人公玉帶上黄帝時明堂圗一殿無壁盖之以茅水圜宫垣天子従之以此而言其来則久漢中元二年起明堂璧廱靈臺扵洛陽並别䖏然明堂亦有璧水李尤明堂銘云流水洋洋是也以此須有辟廱夫帝王作事必師古昔今造明堂須以禮經為本形制依扵周法度數取扵月令遺闕之處㕘以餘書庶使該詳沿革之理其五室九階上圎下方四阿重屋四旁兩門依考工記孝經説堂方一百四十四尺屋圓楣径二百一十六尺太室方六丈通天屋径九丈八闥二十八柱堂髙三尺四向五色依周書月令論殿垣方在内水周如外水内径三百歩依太山盛徳記覲禮經仰觀俯察皆有則象足以盡誠上帝祗配祖宗𢎞風布教作範扵後矣𢎞等學不稽古輒申所見可否之宜伏聴裁擇煬帝大業元年帝欲遵周法營立七廟詔有司詳定其禮禮部侍郎攝太常少卿許善心與博士褚亮等議曰謹案禮記天子七廟三昭三穆與太祖之廟而七鄭𤣥注云此周制曰七者太祖及文王武王之祧與親廟四也殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已𤣥又據王者禘其祖之所自出而立四廟案鄭𤣥義天子惟立四親廟并始祖而為五周以文武為受命之祖特立二祧是為七廟王肅注禮記尊者尊統上卑者尊統下故天子七廟諸侯五廟其有殊功異徳非太祖而不毁不在七廟之數案王肅以為天子七廟是通百代之言又據王制之文天子七廟諸侯五廟大夫三廟降二為差是則天子立四親廟又立髙祖之父髙祖之祖并太祖而為七周有文武姜嫄合為十廟漢諸帝之廟各立為迭毁之義至元帝時貢禹匡衡之徒始建其禮以高帝為太祖而立四親廟是為五廟惟劉歆以為天子七廟諸侯五廟降殺以兩之義七者其正法可常數也宗不在數内有功徳則宗之不可預毁為數也是以班固稱考論諸儒之議劉𣣔博而篤焉光武即位建髙廟扵洛陽乃立南頓君以上四國就祖宗而為七至魏初髙堂隆為鄭學議立親廟四太祖武帝簡在四親之内乃虚置太祖及二祧以待従代至景初乃依王肅更立五世六世祖就四親而為六廟晉武帝禪博議宗祀自文帝以上六世祖西府君而宣帝亦序扵昭穆未升太祖故祭止六也江左中興賀循知禮至扵寝廟之儀皆依魏晉舊事宋武帝初受晉命為王依諸侯立親廟四即位之後増祀五世祖相國掾府君六世祖右北平府君止扵六廟逮身沒主升従昭穆猶太祖之位也降及齊梁守而弗革加崇迭毁禮無違舊臣等又案姬周自太祖以下皆别立廟至扵禘祫俱令食扵太祖是以炎漢之初諸廟各立嵗時嘗享亦随處而祭所用廟樂皆象功徳而歌儛焉至光武乃總立一堂而羣主共室斯則新承寇亂欲従約省自此以来因循不變伏惟髙祖文皇帝睿哲元覽神武應期受命開基垂統聖嗣當文明之運定祖宗之禮且損益不同沿襲異趣時王所制可以垂法自歴代以来雜用王鄭立二義若尋其指歸校以優劣康成止論周代非謂通經子雍總貫皇王事兼長逺今請依據古典崇建七廟受命之祖宜别立廟祧百代之後為不毁之法至扵鑾駕親奉申孝享扵髙廟有司行事竭誠敬扵羣主俾夫規模可則嚴祀易遵表有功而彰明徳大復古而貴能變臣又案周全立廟亦無處置之文據冢人䖏隔而言之先王居中以昭穆為左右阮忱撰禮圗亦従此議漢京諸廟既逺又不序禘祫今若依周制理有未安雜用漢儀事難合採謹詳立廟圗附之議末其圗太祖髙祖各一殿準周文武二祧與始祖而三餘並分室而祭始祖及二祧之外従迭毁之法詔可煬帝時工部尚書宇文愷上言曰自永嘉之亂眀堂廢絶隋有天下将復古制議者紛然皆不能決博考羣籍奏明堂議表曰臣聞在天成象房心為布政之宫在地成形景午居正陽之位觀雲告月順生殺之序五室九宫統人神之際金口木舌發令兆民玉瓉黄琮式嚴宗祀何嘗不矜荘扆宁盡妙思扵規摹凝晬冕旒致子来扵矩矱伏惟皇帝陛下提衡握契御極乘乾咸五登三復上皇之化流凶去暴丕下武之緒用百姓之異心驅一代以同域康哉康㦲民無能而名矣故使天符地寳吐醴飛甘造物資生澄源反朴九圍清謐四表削平􅊞我衣冠齊其文軌茫茫上𤣥陳珪璧之敬肅肅清廟感霜露之誠正金奏九韶六莖之樂定石渠五官三雍之禮乃卜瀍西爰謀洛食辨方靣勢仰禀神謀敷土濬川為民立極兼聿遵先言表置明堂爰詔下臣占星揆日扵是採崧山之秘簡披汶水之靈圗訪通議扵殘亡購冬官扵散逸總集衆論勒成一家昔張衡渾象以三分為一度裴秀輿地以二寸為千里臣之此圗用一分為一尺推而演之冀輪奐有序而經搆之旨議者殊途或以綺井為重屋或以圎楣為隆棟各以臆說事不經見今錄其疑難為之通釋皆出證據以相發明議曰臣愷謹按淮南子曰昔者神農之治天下也甘雨以時五榖著植春生夏長秋収冬蔵月省時考終嵗獻貢以時嘗榖祀于明堂明堂之制有盖而無四方風雨不能􅊞燥濕不能傷遷延而入之臣愷以為上古朴畧剏立典刑尚書帝命驗曰帝者承天立五府以尊天重象赤曰文祖黄曰神斗白曰顯紀黑曰𤣥矩蒼曰靈府注云唐虞之天府夏之世室殷之重屋周之明堂皆同矣尸子曰有虞氏曰總章周官考工記曰夏后氏世室堂脩二七博四脩一注云脩南北之深也夏度以歩今堂脩十四歩其博益以四分脩之一則明堂博十七歩半也臣愷按三王之世夏最為古従質尚文理應漸就寛大何因夏室乃大殷室相形為論理恐不爾記云堂脩七博四脩若夏度以歩則應脩七歩注云今堂脩十四歩乃是增益記文殷周二堂獨無加字便是其義𩔖例不同山東禮本輙加二七之字何得殷無加尋之文周闕增筵之義硏覈其趣或是不然讐校古書並無二字此乃桑間俗儒信情加減黄圗議云夏后氏益其堂之大一百四十四尺周人明堂以為兩杼間馬宫之言止論堂之一靣據此為準則三代堂基並方得為上圎之制諸書所說並云下方鄭注周官獨為此義非直與古違異亦乃乖背禮文尋文求理深恐未惬尸子曰殷人陽館考工記曰殷人重屋堂脩七尋堂崇三尺四阿重屋注云其脩七尋五丈六尺放夏周則其博九尋七丈二尺又曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡二筵禮記明堂位曰天子之廟複廟重檐鄭注云複廟重屋也注玉藻云天子廟及露寝皆如明堂制禮圗云扵内室之上起通天之觀觀八十一尺得宫之數其聲濁君之象也大戴禮曰明堂者古有之凡九室一室有四戸八牖以茅盖上圎下方外水曰辟廱赤綴戸白綴牖堂髙三尺東西九仭南北七筵其宫方三百歩凡人民疾六畜疫五榖災生扵天道不順天道不順生扵明堂不飾故有天災則飾明堂周書明堂曰堂方百一十二尺髙四尺階博六尺三寸室居内方百尺室内方六十尺戸髙八尺博四尺作洛曰明堂太廟露寢咸有四阿重亢重廊孔氏注云重亢累棟重廊累屋也禮圗曰秦明堂九室十二階各有所居吕氏春秋曰有十二堂與月令同並不論尺丈臣愷案十二階雖不與禮合一月一階非無理思黄圗曰堂方百四十四尺法坤之策也方象地屋圎楣径二百一十六尺法乾之策也圎象天室九宫法九州太室方六丈法隂之變數十二堂法十二月三十六戸法極隂之變數七十二牖法五行所行日數八逹象八風法八卦通天臺径九尺法乾以九覆六髙八十一尺法黄鍾九九之數二十八柱象二十八宿堂髙三尺土階三䓁法三統堂四向五色法四時五行殿門去殿七十二歩法五行所行門堂長四丈取太室三之二垣髙無蔽目之照牖六尺其外倍之殿垣方在水内法地隂也水四周扵外象四海圎法陽也水闊二十四丈象二十四氣水内径三丈應覲禮經武帝元封二年立明堂汶上無室其外畧依此制泰山通議今亡不可得而辨也元始四年八月起明堂辟雍長安城南門制度如儀一殿垣四靣門八觀水外周堤壤髙四尺和㑹築作三旬五年正月六日辛未始郊太祖髙皇帝以配天二十二日丁亥宗祀孝文皇帝扵明堂以配上帝及先賢百辟卿士有益者扵是秩而祭之親扶三老五更袒而割牲跪而進之因班時令宣恩澤諸侯王宗室四夷君長匃奴西國侍子悉奉貢助祭禮圗曰建武三十年作明堂明堂上圓下方上圎法天下方法地十二堂法日辰九室法九州室八牕八九七十二法一時之王室有二戸二九十八戸法土王十八日内堂正壇髙三尺土階三䓁胡伯始注漢官云古清廟盖以茅今盖以瓦瓦下藉茅以存古制東京賦曰乃營三宫布政頒常複廟重屋八逹九房造舟清池惟水泱泱薛綜注云複重廇覆謂屋平覆重棟也續漢書祭祀志云明帝永平二年祀五帝扵明堂五帝坐各䖏其方黄帝在未皆如南郊之位光武位在青帝之南少退西靣各一犢奏樂如南郊臣愷按詩云我將祀文王扵明堂我将我享維牛維羊據此則備太牢之祭今云一犢恐與古殊自晉以前未有鵄尾其圎牆辟水一依本圗晉起居注裴頠議曰尊祖配天其義明著廟宇之制理據未分直可為一殿以崇嚴祀其餘雜碎一皆除之臣愷按天垂象聖人則之辟雍之星既有圗状晉堂方構不合天文既闕重樓又無辟水空堂乖五室之義直殿違九階之文非古欺天一何過甚後魏扵北臺城南造圎牆在辟水外門在水内迥立不與牆相連其堂上九室三三相重不依古制室間通巷違舛處多其室皆用墼累極成褊陋後魏樂志曰孝昌二年立明堂議者或言九室或言五室詔斷従五室後元义執政復改為九室遭亂不成宋起居注曰孝武帝大明五年立明堂其牆宇規範擬則太廟唯十二間以應朞數依漢汶上圗儀設五帝位太祖文皇帝對饗鼎爼簠簋一依廟禮梁武即位之後移宋時太極殿以為明堂無室十二間禮疑議云祭用純漆爼瓦樽文扵郊質扵廟止一獻用清酒平陳之後臣得目觀遂量歩數記其尺丈猶見基内有焚燒殘柱毁斫之餘入地一丈儼然如舊柱下以樟木為跗長丈餘闊四尺許兩兩相並瓦安數重宫城處所乃在郭内雖湫隘卑陋未合規摹祖宗之靈得崇嚴祀周齊二代闕而不修大饗之典扵焉靡託自古明堂圗惟有二本一是宗周劉熈阮諶劉昌宗䓁作三圗畧同一是後漢建武三十年作禮圗有夲不詳撰人臣逺尋經傳傍求子史硏究衆説總撰今圗其様以木為之下為方堂堂有五室上為圎觀觀有四門帝可其奏唐太宗貞觀中朱子奢上立廟議曰臣謹按漢丞相韋𤣥成奏立五廟諸侯同五劉子駿議開七祖邦君降二鄭司農踵𤣥成之轍王子雍揚國師之波分塗並驅各相師祖咸翫其所習好同惡異遂令歴代廟祀多少參差優劣去取曽無畫一傳稱名位不同禮亦異數易云卑髙以陳貴賤位矣豈非别嫌疑慎微逺防陵僣尊君卑佐升降無舛所貴禮者義在茲乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名器無准冠屨同歸禮亦異數義将安設戴記又稱禮有以多為貴者天子七廟諸侯五廟纔與子男相侔以多為貴何所表乎愚以為諸侯立髙祖以下并太祖五廟一國之貴也天子立髙祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂徳厚者流光徳薄者流卑此其義也伏惟聖祖在天山陵有日祔祖嚴配大事在斯宜依七廟用崇大禮若親盡之外有王業者如殷之𤣥王周之后稷尊為始祖儻無其例請三昭三穆各置神主太祖一室考而虚位将待七百之祚逓遷方處庶上依晉宋傍惬人情扵是八座奏曰臣聞揖讓受終之后革命創制之君何嘗不崇親親之義篤尊尊之道䖍奉祖宗致敬郊廟自義乖闕里學滅秦庭儒雅既䘮經籍湮殄雖兩漢纂修絶業魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏說是所見而起異端自昔迄茲多歴年代語其大畧兩家而已祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至徳自然孝思罔極孺慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬古之􅉓則臣䓁奉述睿旨討論徃載紀七廟者實多稱四祖者盖寡校其得失昭然可見春秋榖梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書曰七代之廟可以觀徳至扵孫卿孔安國劉歆班彪父子孔晁虞喜干寳之徒或學推碩儒或才稱博物商較今古咸以為宜其文曰天子三昭三穆與太祖之廟而七晉宋齊梁皆依斯義立親廟六豈非國之茂典不刋之休烈乎若使違羣經之明文從累代之疑議背子雍之篤論尊康成之舊學則天子之禮下偪扵人臣諸侯之制上僣扵王者非所謂尊卑有序名位不同者焉况復禮由人情自非天墜大孝莫重扵尊親厚本莫先扵嚴配數盡四廟非貴多之道祀及七代得加崇之心是知徳厚者流光乃可久之髙義徳薄者流卑實不易之令範臣等參議請依晉宋故事立親廟六其祖宗之制式遵舊典庶承宗之道興扵理定之辰尊祖之義成扵孝理之日孔頴逹上明堂議曰臣伏尋前勅依禮部尚書劉伯莊等議以為従崐崘道上層祭天又尋後勅云為左右閣道登樓設祭臣檢六藝羣書百家諸史皆未聞臺觀重樓之上而有堂名孝經云宗祀文王扵明堂不云明樓明觀其宜一也又明堂法天聖人示儉㦯有剪蒿為柱菁茅作盖雖復古今興制不可恒然猶依大典徴扵朴素是以席惟藳秸器尚陶匏用蠒栗以貴誠服大裘以訓儉今若飛樓架迥綺閣淩雲考古之文實堪疑慮按郊祀志漢武明堂之制四靣無壁上覆以茅祀五帝扵上座祀后土扵下防臣以上座正謂臺上下防惟是臺下即云無四壁未審伯荘如何上層祭神下有五室且漢武所為多用方士之說違經背正不可師祖又盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似以朝覲祭祀皆在廟堂豈有樓上祭祖樓下視朝閣道昇樓路便窄隘乘輦相儀接神不敬歩往則勞曵聖躬侍衛在傍百司供奉求之典誥全無此理臣非敢固執愚見以求已長伏以國之大典不可不慎乞以臣言下羣臣詳議魏徴上明堂議曰稽諸訓詁參以舊圗其上圎下方複廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端蠭起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未宏夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故飾宫以廣其敬宣尼美意其在茲乎臣等親奉徳音令參大議思竭塵露微增山海凡聖人有作義重随時萬物斯覩事資通變若據蔡邕之說則至理失扵文繁若依裴頠所為則又傷扵質畧求之情理未允厥中今之所議非無用捨請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其髙下廣袤之規几筵丈尺之制則並随時立法因事制宜自我而作何必師古廓千載之疑議為百王之懿範不使泰山之下惟聞黄帝之法汶水之上獨稱漢武之圗則通乎神明庶㡬可俟子来經始成之不日顔師古上明堂議曰明堂之制爰自古昔求之簡牘全文莫覩肇起黄帝降及有虞彌歴夏殷迄扵周代各立名號别創規模衆說舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實布政之宫也徒以戰國縦横典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜說用為准的實亦蕪昧然周書之叙明堂紀其四靣則有應門雉門據此一塗固是王者之常居耳其青陽總章𤣥堂太廟及左个右个與四時之次相用則路寝之義足為明證文王居明堂篇帶以弓韣禮于髙禖九門磔攘以禦疾疫置梁隂道以利農夫令國有酒以合三族凡推其事皆合月令之文觀其所為皆在路寝者也戴禮昔周公朝諸侯于明堂之位天子負斧扆南嚮而立明堂者明諸侯之尊也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寝也亦曰黄帝曰合宫有虞氏曰總章殷曰陽館周曰明堂斯皆路寝之徴知非别處大戴所說初有近郊之言復稱文王之廟進退無據自為矛盾原夫負扆受朝常居出入既在臯庫之内亦何云扵郊野哉孝經傳云在國之陽又無里數漢武有懐創造詢扵搢紳言論紛然終無定據乃立扵汶水之上而宗祀焉明其不拘逺近亦無方靣孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營創孔牢等乃以為明堂辟雍太學其實一也而有三名金裒䓁又稱經傳無文不能分別同異中興之後蔡邕作論復云明堂太廟一物二名鄭𤣥則在國之陽三里之外七里之内丙已之地頴客釋例亦云明堂太廟凡有八名其體一也茍立同異竟為巧說並出自胷懐曽無師祖審夫功成作樂治定制禮草創従宜質文逓變旌旗冠冕今古不同律度權衡前後不一随時之義斷可知矣假如周公舊章猶當擇其可否宣尼􅉓則尚或補漏況鄭氏臆說淳于謏聞匪異守株何殊膠柱愚謂不出墉雉邇接宫闥實允事宜諒無所惑但當上遵天旨祗奉徳音作皇代之明堂永貽範扵来葉區區極議皆畧而不論髙宗永徽二年太尉長孫無忌上太宗皇帝配天議曰臣謹尋方册歴考前規宗祀眀堂必配天帝而伏羲五代本配五郊所入眀堂自緣従祀今以太宗作配理有未安伏見永徽二年七月詔建眀堂伏惟陛下天縦孝徳追奉太宗已遵嚴配當時髙祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗文皇帝降配五帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹按孝經云孝莫大扵嚴父嚴父莫大扵配天昔者周公宗祀文王扵明堂以配上帝伏尋詔意義在扵斯今所司行令殊為失旨又尋漢魏晉宋歴代禮儀並無父子同配明堂之義惟祭法云周人禘嚳而郊稷祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食也禘謂祭昊天扵圎丘郊謂祭上帝扵南郊祖宗謂祭五帝百神扵明堂也尋鄭此注乃以祖宗合為一祭又以文武共在明堂連衽配祠良為􅍝矣故王肅駮曰古者祖有功而宗有徳祖宗自是不毁之名非謂配食扵明堂者也審如鄭義則孝經當言祖祀文王扵明堂不得言宗祀也凡宗者尊也周人既祖其廟又尊其祀孰謂祖扵明堂者乎鄭引孝經以解祭法而不曉周公夲意殊非仲尼之義旨也又解宗武王云配勾芒之𩔖是謂五神位在堂下武王降位失君叙矣又按六韜曰武王伐紂雪深文餘有五車二馬行無轍迹詣營求謁武王怪而問焉太公對曰此必五方之神来受事耳遂以其名召入各以其職令焉既而克殷風調雨順豈有生来受職歿則配之降尊敵卑理不然矣故春秋外傳曰禘郊祖宗報五者國之典祀也傳言五者故知各是一事非謂祖宗合祀扵明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配扵明堂惟南齊蕭氏以武明昆季並扵明堂配食事乃不經未足援據又撿武徳時令以元皇帝配扵明堂兼配感帝至貞觀初縁情革禮奉祀髙祖配扵明堂奉遷代祖專配感帝此即聖朝故事已有逓遷之典取法崇廟古之制焉伏惟太祖景皇帝締搆有周建絶代之丕業啓祖汾晉創歴聖之洪緒徳邁發生道符立極又代祖元皇帝潛鱗韞慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟髙祖太武皇帝躬受天命奄有神州創改舊物體元居正為國始祖抑有舊章昔冇炎漢髙帝當塗太祖皆以受命例並配天請遵故實奉祀髙祖扵圎丘以配昊天上帝伏惟太宗文皇帝道格上𤣥功清下瀆拯率土之塗炭而大造扵生靈請准詔書宗祀扵明堂以配上帝又請依武徳故事兼配感帝作主斯乃二祖徳業永不遷廟兩聖功大各得配天逺協孝經近申詔意上元三年将祫享議者以禮緯三年祫五年禘公羊家五年再殷祭二家舛互諸儒莫能決太學博士史元璨曰春秋僖公三十三年十二月薨文公之二年八月丁夘大享公羊曰祫也則三年喪畢新君之二年當祫明年當禘羣廟又宣公八年禘僖公宣公八年皆有禘則後禘距前禘五年此則新君之二年祫三年禘爾後五年再殷祭則六年當祫八年禘昭公十年齊歸薨十三年喪畢當祫為平丘之㑹冬公如晉至十四年祫十五年禘傳曰有事扵武宫是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事扵襄宮是也則禘後三年而祫又二年而禘合扵禮議遂定髙宗時蕭子儒為奉常博士初太尉長孫無忌等議祠令及禮用鄭𤣥六天說圎丘祀昊天上帝南郊太微感帝明堂太㣲五帝直據緯為說不指蒼旻為天而以昊天帝當北辰耀魄寳郊明堂當太微五帝唐家祀圎丘太史所上圗昊天上帝外自有北辰令李淳風曰昊天上帝位于壇北辰斗列第二垓與緯書駮異司馬遷天官書太㣲宫五精之神五星所奉冇人主象故名曰帝猶房心有天王象安得盡為天乎日月麗于天草木麗于地以日月為天草木為地昧者不信也周官兆五帝四郊又有祀五帝皆不言天知太㣲之神非天也經稱郊祀后稷王肅以郊圜丘為一𤣥析而二之曰圜丘曰郊非聖人意今祠令固守𤣥說與著式相違宜有刋正且經嚴父莫大扵配天宗祀文王扵明堂以配上帝明堂之祀天也星不足配之矣月令孟春祈榖上帝春秋啓蟄而郊郊而後耕故郊后稷以祈農詩春夏祈榖于上帝皆祭天也著之感帝尤為不稽請四郊迎氣祀太微五帝郊明堂罷六天說止祀昊天方丘既祭地又祭神州北郊皆不載經請止一祠詔曰可乾封初帝已封禪復詔祀感帝神州以正月祭北郊司禮少常伯郝處俊等奏言顯慶定禮廢感帝祀而祈榖昊天以髙祖配舊祀感帝神州以元皇帝配今改祈榖為祀感帝又祀神州還以髙祖配何升降紛紛焉虞氏禘黄帝郊嚳夏禘黄帝郊鯀殷禘嚳郊㝠周禘嚳郊稷𤣥謂禘者祭天圓丘郊者祭上帝南郊崔靈恩說夏正郊天王者各祭所出帝所謂王者禘祖之所自出以其祖配之則禘逺祖郊始祖也今禘郊同祖禮無所歸神州夲祭十月以方隂用事也𤣥說三王之郊一用夏正靈恩謂祭神州北郊以正月諸儒所言猥互不明臣願㑹奉常司成博士普議扵是子儒與博士陸遵楷張統師權無二等共白北郊月不經見漢光武正月建北郊咸和中議北郊以正月武徳以来用十月請循武徳詔書明年詔圎方二丘明堂感帝神州宜奉髙祖太宗配仍祭昊天上帝及五天帝扵明堂武后載初元年邢文偉為内史后御明堂詔文偉發孝經后問天與帝異稱云何文偉曰天帝一也制曰郊后稷以配天祀文王于明堂以配上帝奈何而一對曰先儒執論不同昊天及五方捴六天帝后曰帝有六則天不同稱固矣文偉不得對聖歴初張齊賢為太常奉禮郎武后詔百官議告朔于明堂讀時令布政事京官九品以上四方朝集使皆列扵廷太常博士辟閭仁諝曰經無天子月告朔惟玉藻天子聴朔南門之外周太宰正月之吉布政扵邦國都鄙干寳曰建子月告朔日也此玉藻聴朔同誼今元日讀時令合古聴朔事獨鄭𤣥以秦制月令有五帝五官因言聴朔必以特牲告時帝及神以文王武王配其言非是月令曰其帝太昊其神句芒謂宣令告人使奉時務業月皆有令故云非天子月朔以配帝祭也告朔者諸侯禮也春秋既視朔遂登臺𤣥又說人君月告朔扵廟其祭為朝享魯自文公始不視朔明非天子所行𤣥謂告帝即人帝神即重黎五官不言天子拜祭臣請罷告朔月祭以應古禮齊賢不韙其說質曰榖梁氏稱閏月天子不告朔它月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣周太史頒朔于邦國玉藻閏月王居門是天子雖閏亦告朔二家去聖不逺載天子諸侯告朔事顯顯弗謬今議者乃以太宰正月之吉布治邦國而言天子元日一告朔殊失其旨一嵗之元六官自布所職之典干寳謂吉為朔故世人􅍝以吉為告據繆失經不得為法議者又引左氏說專在諸侯不知玉藻與左說正同而獨扵天子言嵗首一告何去取之恣也又謂時帝五人帝也𤣥扵時帝包天人故以文武作配是並告兩五帝為不疑諸侯受朔天子蔵扵廟天子受朔扵天宜在明堂故告時帝配祖考議者曰天子月告祭頒朔則諸侯安得蔵之故太宰嵗首布一嵗事太史頒之也是不然周太史頒朔邦國是總頒十二朔扵諸侯天子猶月告者頒官府都鄙也内外異言之也禮不可罷鳳閣侍郎王方慶又推言明堂布政之宫所以明天氣統萬物也漢儒以明堂太廟為一宗祀其祖而配上帝取宗祀曰清廟正室為太室向陽為明堂建學為太學圜水為辟雍異名同事古之制也天子以正月上辛總受十二月政扵南郊還蔵扵祖廟月取一政班之明堂諸侯則受扵天子蔵之祖廟月取一政行之扵國王者以其禮告廟謂之告朔視月之政謂之視朔玉藻𤣥冕而朝日東門之外聴朔南門之外鄭𤣥說明堂在國陽就其時之堂而聴朔焉卒事宿路寢今元日通天宫受朝有司遂讀時令布政古之禮也舊說天子嵗入明堂者十八大享一月告朔十二四時迎氣四巡狩之嵗一今議者唯許嵗首一入不以隘乎陛下幸建明堂遵用告朔事若月一聴則近扵煩每孟月視朔惟制定其禮臣下不敢專成均博士吳楊吾等共言秦滅學告朔廢今用四孟月季夏至明堂告五時帝堂上請兼如齊賢方慶議不數嵗禮亦廢乆之齊賢遷博士武后時沈伯儀為太子右諭徳初太常少卿韋萬石議明堂大享事上言鄭𤣥說祀五天帝王肅謂祀五行帝貞觀禮從𤣥至顯慶禮祀昊天上帝乾封詔書祀五天帝兼祀昊天上帝詔書従貞觀禮儀鳳初詔祀事一用周制今應何樂髙宗乃詔尚書省集諸儒議未能定扵是大享參用貞觀顯慶二禮垂拱元年成均助教孔元義奏嚴父莫大配天天扵萬物為最大推父偶天孝之大尊之極也易稱先王作樂崇徳殷薦之上帝以配祖考上帝天也昊天之祭宜祖考並配請以太宗髙宗配上帝扵圓丘神堯皇帝配感帝南郊祭法祖文王宗武王祖始也宗尊也一名而有二義經稱宗祀文王文王當祖而云宗包武王以言也知明堂以祖考配與二經合伯儀曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥曰禘郊祖宗皆配食也祭昊天圓丘曰禘祭上帝南郊曰郊祭五帝五神明堂曰祖宗此為最詳虞夏退顓頊郊嚳殷捨契郊㝠去取違舛惟周得禮之序至明堂始兩配焉文王上配五帝武王下配五神别父子也經曰嚴父莫大扵配天又曰宗祀文王扵明堂以配上帝不言嚴武王以配天則武王雖在明堂未齊扵配雖同祭而終為一主也緯曰后稷為天地主文王為五帝宗若一神而兩祭之則薦獻數凟此神無二主也貞觀永徽禮實專配由顯慶後始兼尊焉今請以髙祖配圓丘方澤太宗配南北郊髙宗配五天帝鳳閣舎人元萬頃范履氷等議今禮昊天上帝等五祀咸奉髙祖太宗兼配以申孝也詩昊天章二后受之易薦上帝配祖考有兼配義髙祖太宗既先配五祀當如舊請奉髙宗歴配焉自是郊丘三帝並配云中宗神龍元年已復京太廟又立太廟于東都議立始祖為七廟而議者欲以涼武昭王為始祖太常博士張齊賢議以為不可因曰古者有天下者事七世而始封之君謂之太祖太祖之廟百世不遷至祫祭則毁廟皆以昭穆合食于太祖商祖𤣥王周祖后稷其世數逺而遷廟之主皆出太祖後故合食之序尊卑不差漢以髙皇帝為太祖而太上皇不在合食之列為其尊扵太祖故也魏以武帝為太祖晉以宣帝為太祖武宣而上廟室皆不合食于祫至隋亦然唐受天命景皇帝始封之君太祖也以其世近而在三昭三穆之内而光皇帝以上皆以屬尊不列合食今宜以景皇帝為太祖復祔宣皇帝為七室而太祖以上四室皆不合食于祫博士劉承慶尹知章議曰三昭三穆與太祖為七廟者禮也而王迹有淺深太祖有逺近太祖以功建昭穆以親崇有功者不遷親盡者則毁今以太祖近而廟數不備乃欲扵昭穆之外逺立當遷之主以足七廟而乖迭毁之議不可天子下其議大臣禮部尚書祝欽明兩用其言扵是以景皇帝為始祖而不祔宣皇帝已而以孝敬皇帝為義宗祔于廟由是為七室而京太廟亦七室中宗時馮宗上大享議曰臣等竊聞明堂之建其所従来逺矣天垂象聖人則之蒿柱茅檐之規上圓下方之制考之大數不踰三七之間定之方中必居丙巳之地豈非得房心布政之所當太微上帝之宫乎故仰協俯従正名定位人神不雜各司其叙則嘉應響至保合太和焉漢氏承秦經籍道息旁求湮墜詳據難明孝武初議立明堂扵長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立扵城南議其制度莫之能决至孝平元始四年始創造扵南郊以申嚴配光武中興元年立扵國城之南自魏晉迄扵梁朝雖規制或殊而所居之地恒取丙已者斯盖百王不易之道也髙祖天皇大帝纂承平之運崇朴素之風四夷來賔九有咸又永徽三年詔禮官學士議明堂制度羣儒紛競各執異端久之不决因而遂止何也非謂財不足力不堪也将以周孔既遥禮經且紊事不師古或爽天心難用作程神不孚佑者也則天太后總禁闈之政籍軒臺之威属皇室中圮之期躡和喜従權之制以為乾元大殿承慶小寝當正陽亭午之地實先聖聴斷之宫表順端闈儲精營室爰従朝享未始臨御乃起工徒挽令摧覆既毁之後雷聲隠然衆庶聞之或以為神靈感動之象也扵是增土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺趾興重閣層樓之業煙焰蔽日梁柱排雲人斯告勞天實貽誡煨燼甫邇遽加脩復况乎地殊丙巳未答靈心跡匪膺期乃申嚴配事昧彛典神不昭格此其不可者一也又明堂之制木不鏤土不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也髙明爽塏事資䖍敬密迹宫掖何以祈天人神雜擾不可放物此其不可者三也況兩京上都萬方取則而天子闕當陽之位聴政居便殿之中職司其憂豈容沉黙當須審巧歴之計擇繁省之宜不便者量事改修可因者随宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣太常博士唐紹請以正冬至日祀圓丘議曰臣聞禮以冬至祀圓丘扵南郊夏至祀方澤扵北郊者以其日行躔次極扵南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一嵗之内吉莫大焉甲子但為六旬之首一年之内隔月常遇既非大㑹晷運未周惟總六甲之辰助四時而成嵗今欲避環周以取甲子是背大吉而就小吉也太史令傅孝忠進奏曰准漏經南陸北陸並日校一分若用十二日甲子即分一分未南極即不得為至太常博士彭景直上疏曰禮無日祭陵惟宗廟月有祭故王者設廟祧壇墠為親疎多少之數立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟皆月祭之逺廟為祧享嘗乃止去祧為壇去壇為墠有禱焉祭之無禱乃止又譙周祭志天子始祖髙祖曽祖祖考之廟皆月朔加薦以象平生朔食謂之月祭二祧之廟無月祭則古皆無日祭者今諸陵朔望食則近扵古之殷事諸節日食近扵古之薦新鄭注禮記殷事月朔半薦新之奠也又既大祥即四時焉此其祭皆在廟近代始以朔望諸節祭陵寝唯四時及臘五享廟考經據禮固無日祭扵陵唯漢七廟議京師自髙祖下至宣帝與太上皇悼皇考陵旁立廟園各有寝便殿故日祭扵寢月祭扵便殿元帝時貢禹以禮節煩數碩罷郡國廟丞相韋元成等又議七廟外寝園皆無復議者亦以祭不欲數宜復古四時祭扵廟後劉㰴引春秋傳日祭月祀時享嵗貢祖禰則日祭曾髙則月祀二祧則時享壇墠則嵗貢後漢陵寢之祭無傳焉魏晉以降皆不祭墓國家諸陵日祭請停如禮疏奏天子以語侍臣曰禮官言諸陵不當日進食夫禮以人情沿革何專古為乾陵宜朝晡進奠如故王方慶上明堂告朔議曰明堂天子布政之宫也謹按榖梁傳云閏者附月之餘日天子不以告朔非禮也閏以正時時以作事事以厚生生人之道扵是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣以此寜有他月而廢其禮乎先儒舊說天子行事一年十八度入明堂矣大享不問卜一入也每月告朔十二入也四時迎氣四入也廵狩之年一入也今禮官議惟嵗首一入耳與先儒既異在宫臣不敢同宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而已隋煬帝命學士撰江都集禮秪抄撮舊禮更無異文貞觀顯慶禮及祠令不言告朔者盖為歴代不傳所次其文乃闕各有緣由不足依據今禮官引為明證在臣誠實有疑睿宗時賈曾為諫議大夫知制誥上表曰臣詳據典禮謂宜天地合祭謹按禮記祭法曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀傳曰大合禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合扵太祖之廟禘郊則地祗羣望俱合扵圓丘以始祖配享皆有事而大祭異扵常祀之義禮大傳曰不王不禘故知王者受命必行禘禮虞書曰正月元日舜格于文祖肆𩔖于上帝禋于六宗望秩于山川徧于羣神此則受命而行禘禮者也言格于文祖則餘廟之享可知矣言𩔖于上帝則地祗之合可知矣且山川之祀皆属扵地羣望尚徧况地祗乎周官以六律六吕五聲大合樂以致神祗以和邦國以諧萬人又云凡六樂者六變而致象物及天神此則禘郊合天神地祇人鬼祭之樂也三輔故事漢祭圓丘儀上帝位正南靣后土位亦南面而少東又東觀漢記云光武即位為壇扵鄗之陽祭告天地採用元始故事二年正月扵洛陽城南依鄗為圎壇天地位其上南向西上按兩漢時自有后土及北郊祀而已此扵圓丘設地位明是禘祭之儀又春秋說云王者一嵗七祭天地合食扵四孟别扵分至此復天地之常有同祭之義王肅曰孔子云兆圓丘扵南郊又云祭天而地配此亦郊祀合祭之明說惟鄭康成不論禘當合祭而分昊天上帝為二神專憑緯文事匪經見又其注大傳不王不禘義則云正嵗之正祭感帝之精以其祖配注周官大司樂圓丘義則引大傳五禘以為冬至祭逓相矛盾未足可依伏惟陛下膺籙居尊繼文在歴自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神答受命之符彰致敬之道豈可不崇盛禮同彼常郊使地祇無位未従禘享合請備設皇地祇并従祀等座則禮得稽古義合緣情然郊丘之祀國之大事或失其宜精禋將闕臣術不通經識慙博古徒以昔謬禮職今忝諌曹正議是司敢不陳上儻事有可採惟斷之聖慮也𤣥宗即位未郊見左拾遺張九齡建言天百神之君王者所由授命者也自古繼統之主必有郊配盖敬天命報所受也不以徳澤未洽年榖未登而闕其禮昔周公郊祀后稷以配天謂成王㓜冲周公居攝猶用其禮明不可廢也漢丞相匡衡曰帝王之事莫重乎郊祀董仲舒亦言不郊而祭山川失祭之序逆扵禮故春秋非之臣謂衡仲舒古之知禮皆以郊之祭所宜先也陛下紹休聖緒于今五載而未行大報考之于經義或未通今百榖嘉生鳥獸咸若夷狄内附兵革用弭乃怠扵事天恐不可以訓碩以迎日之至升紫壇陳采席定天位則聖典無遺矣開元初陳貞節為右拾遺初隠章懐懿徳節愍四太子並建陵廟分八署置官列吏卒四時祠官進饗貞節以為非是上言王者制祀以功徳者猶親盡而毁四太子廟皆别祖無功扵人而圜祠時薦有司守衛與列帝侔金奏登歌所以頌功徳詩曰鐘鼔既設一朝饗之使無功而頌不曰舞詠非度邪周制始祖乃稱小廟未知四廟欲何名乎請罷卒吏詔祠官無領属以應禮典古者别子為祖故有大小宗若謂祀未可絶宜許所後子孫奉之詔有司博議駕部員外郎裴子餘曰四太子皆先帝冢嗣列聖念懿属而為之享春秋書晉世子曰將以晉畀秦秦将祀予此不祀也又言神不歆非𩔖君祀無乃戾乎此有廟也魯定公元年立煬宫煬伯禽子季氏逺祖尚不為限况天子篤親親以及旁朞誰曰不然太常博士段同曰四陵廟皆天子睦親繼絶也逝者錫蘋蘩猶生者之開茅土古封建子弟詎皆有功生無所議死乃援禮停祠人其謂何隠扵上伯祖也服緦章懐伯父也服朞懿徳節愍堂昆弟也服大功親未盡廟不可廢禮部尚書鄭惟忠等二十七人亦附其言扵是四陵廟惟減卒半它如舊歴代名臣奏議巻十六
