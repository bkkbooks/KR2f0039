body:
  text: 歷代名臣奏議卷一百七十四明楊士竒等撰去邪唐太宗貞觀初上謂侍臣曰朕觀前代讒佞之徒皆國之蟊賊也或巧言令色朋黨比周若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃故叢蘭欲茂秋風敗之王者欲明讒人蔽之此事著於史籍不能具道至如齊隋間讒譛事耳目所接者略與公等言之斛律明月齊朝良將威震敵國周家每嵗斫汾河氷慮齊兵之西渡及明月被祖孝徵讒構伏誅周人始有吞齊之心髙熲有經國大才為隋文帝贊成霸業知國政者二十餘載天下賴以康寧文帝唯婦言是聽特令擯斥及為煬帝所殺刑政由是衰壞又隋太子勇撫軍監國凡二十年國亦早有定分楊素欺主罔上賊害良善使父子之道一朝滅於天性逆亂之源自此開矣隋文既淆混嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防萌杜漸用絶讒構之端猶恐心力所不至或不能覺悟前史云猛獸處山林藜藿為之不採直臣立朝廷姦邪為之寢謀此實朕所望於羣公也魏徵曰禮云戒慎乎其所不睹恐懼乎其所不聞詩云愷悌君子無信讒言讒言罔極交亂四國又孔子惡利口之覆邦家蓋為此也臣嘗觀自古有國有家者若曲受讒譛妄害忠良必宗廟丘墟市朝霜露矣願陛下深慎之貞觀五年治書侍御史權萬紀侍御史李仁發俱以告訐譛毁蒙引見遂任心彈射肆其欺罔令在上震怒臣下無以自安外知其不可而莫能論爭給事中魏徵正色而奏之曰權萬紀李仁發並是小人不識大體以譛毁為是告訐為直凡所彈射皆非有罪陛下掩其所短收其一切乃騁其姦計附下罔上多行無禮以取強直之名誣房玄齡斥退張亮無所肅厲徒損聖明道路之人皆興謗議臣伏度聖心必不以為謀慮深長可委以棟梁之任將以言無所避忌欲以警厲羣臣若信狎回邪猶不可以小謀大羣臣素無矯偽空使臣下離心以其齡亮之徒猶不可得伸其枉直其餘踈淺孰能免其欺罔伏願陛下留意再思自驅使二人以來有一𢎞益臣即甘心斧鉞受不忠之罪陛下縱未能舉善以崇德豈可進姦而自由乎太宗欣然納之賜徵絹五百匹其萬紀姦狀漸露仁發亦解出萬紀貶連州司馬朝廷咸相慶賀焉太宗時僕州刺史龎相夀貪濁有聞追還解任自陳幕府之舊太宗深矜之使人謂之曰爾是我舊左右今取他物祗應為貧賜爾絹百匹即還向任更莫作罪過魏徵進諫曰相夀猥濫逺近所知今以故舊私情赦其貪濁更加以厚賞還令復任然相夀性識未知愧恥幕府左右其數甚多人皆恃恩私足使為善者懼太宗欣然納之引相夀於前謂之曰我昔為王與一府作主今為天子為四海作主既為四海作主不可偏與一府恩澤向欲令爾重任侍臣云爾若任必使為善者皆不用心侍臣所執既是便不得申我私意乃賜物而遣之相夀默然流涕而去時傅奕為大史令有僧自西域來能呪人使立死復呪即蘇上試之驗以告奕奕曰此邪術也臣聞邪不干正請使呪臣必不能行上命僧呪奕奕初無所覺須臾僧復僵仆遂不復蘇髙宗顯慶元年王義方擢侍御史不再旬會李義府縱大理囚婦淳于迫其丞畢正義縊死無敢白其姦義方自以興縣屬不三時拜御史且疾當世附離匪人以欺朝廷內決劾奏意必得罪即問計於母母曰昔王母伏劒成陵之誼汝能盡忠吾願之死不恨義方即上言天子置公卿大夫士欲水火相濟鹽梅相成不得獨是獨非也昔堯失之四凶漢髙祖失之陳豨光武失之逄萌魏武失之張邈彼聖傑之主然皆失於前而得於後今陛下撫萬邦而有之蠻區夷落罪無逃罰况輦轂下姦臣肆虐乎殺人滅口此生殺之柄不自主出而下移佞臣履霜堅氷彌不可長請下有司雜治正義死狀即具法冠對伏叱義府下跪讀所言帝方安義府狡佞恨義方以孤士觸宰相貶萊州司戶參軍調露元年上幸東都司農卿韋元機作上陽宫制度𢎞壯侍御史狄仁傑劾奏元機導上為奢泰免其官左司即中王本立恃恩用事朝廷畏之仁傑奏其姦上特原之仁傑曰陛下何惜罪人以虧王法必欲曲赦本立請棄臣於無人之境為忠貞之戒本立竟得罪由是朝廷肅然武后神功元年來俊臣倚勢貪淫前後羅織誅人不可勝計諸武共發其事繫獄有司處以極刑奏上三日不出王及善上言曰俊臣國之元惡不去之必動搖朝廷吉頊曰俊臣結聚不逞誣搆良善贓賄如山寃魂塞路國之賊也太后下其奏俊臣棄市仇家爭噉其肉聖厯二年太后幸三陽宫有胡僧邀車駕觀葬舍利太后許之仁傑跪於馬前曰佛者戎狄之神不足以屈天下之主彼胡僧詭譎直欲招致萬乘以惑遠近之人耳太后中道而還曰以成吾直臣之氣久視元年以張易之為奉宸令每內殿曲宴輒引易之昌宗飲博嘲戲昌宗衣羽衣吹笙乘木鶴于庭中太后選美少年為奉宸內供奉右補闕朱敬則諫曰陛下內寵易之昌宗足矣而侯祥等明自媒衒求入供奉醜慢無恥臣職諫爭不敢不奏太后勞之武后時魏元忠為洛中長史張易之暴奴亂都市元忠杖殺之及為相嘗面奏臣承之宰相不能盡忠死節使小人在側臣之罪也太后不恱由是諸張深怨之乃譛元忠嘗言太后年老不若挾太子為久長太后怒元忠謀反下元忠獄竟坐貶元忠髙要尉元忠入辭上言曰臣老向嶺南十死一生但陛下必思臣言因指易之昌宗曰此二小兒終為亂階時桓彥範為司刑少卿張昌宗引妖人迎占言計不軌宋璟請窮治其姦武后以昌宗嘗自歸不許彥範諫曰昌宗謬橫思苞禍心億測天命皇神降怒自擲其咎推原厥情蓋防事暴之日得引首以免未敗則候時為逆此凶詭之臣熒惑聖心既自歸露而尚與妖人祈福禳解則果於必成初無悔意今而宥之誠恐昌宗自謂應運天下浩然從之父在子稱尊為逆子君在臣圖位為逆臣逆而不誅社稷懼亡請付三司考治時來俊臣侯思止舞文法數誅陷大臣人皆懾懼李昭德每奏其誣罔不道狀卒搒殺思止其黨稍摧沮然昭德頗怙權為衆指目魯王府功曹參軍丘愔上疏曰臣聞魏冉誅庶族以安秦忠也弱諸侯以強國功也然出入自專擊斷無忌威震人主不聞有王張祿一言而卒用憂死向使昭王不即覺悟則秦之霸業或不傳子孫陛下天授以前萬機獨斷公卿百執具職而已自長夀以來厭怠細政擢委昭德秉總權綱而才小任重負氣強愎聾盲下民芻狗同列刻薄慶賞多所矯虔聲威翕習天下杜口臣伏見南臺敕目羣臣奏請陛下制已曰可而昭德建言不可制又從之且人臣參奉機密獻可替否事或便利不豫咨謀而畫可已行方興駮異是陽露擅命以示於人歸美引咎誼不類此一切奏讞皆承風指隂相傅會臣觀其膽乃大於身鼻息所衝上拂雲漢夫小家治生千百之資將以託人尚憂失授況天下之重可輕委寄乎履霜堅氷須防其漸大權一去收之良難願陛下察臣之言時李嶠為內史與監察御史張廷圭薦李雍文髙氣方直才任諌諍乃召拜左拾遺御史中丞宋璟劾張昌宗等反狀武后不應雍立階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏雍出或讓曰子位卑一忤旨禍不測雍曰不如是名亦不傳中宗立鄭普思以方技幸擢祕書監雍諫曰陛下躬政日淺有九重之嚴未聞道路橫議今籍籍皆言普思馮詭惑説妖祥陛下不知猥見驅使孔子曰詩三百一言以蔽之曰思無邪陛下誠以普思術可致長生則爽鳩氏且因之永有天下非陛下乃今可得能致神人邪秦漢且因之永有天下非陛下乃今可得能致佛法邪梁武帝且因之永有天下非陛下乃今可得能鬼道邪墨翟干寶且各獻其主永有天下非陛下乃今可得自古堯舜稱聖者臣觀所以行皆在人事敦睦九族平章百姓不聞以鬼神道治天下惟陛下省察中宗復位時侍中桓彥範上書誡帝曰道路籍籍皆云胡僧慧範託浮屠法詭惑后妃出入禁奧瀆撓朝政陛下嘗輕騎微服數幸其居上下汙慢君臣虧替臣謂興化致治以康乂國家者繇進善而棄惡孔子曰執左道以亂政者殺假鬼神以危人者殺今慧範亂政危人者也不急誅且有變除惡務本願早裁之帝孱昏狃左右不能有所省納神龍元年鄭普思聚黨于雍岐二州謀作亂事覺西京留守蘇瓌收繫窮治之上抑瓌而佑普思待御史范獻忠進曰請斬蘇瓌上曰何故對曰瓌為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣且普思反狀明白而陛下曲為申理王者不死殆謂是乎魏元忠奏曰蘇瓌長者用刑不枉普思法當死上流普思於儋州餘黨伏誅景龍元年僧慧範為銀青光祿大夫上庸公於東都作大像府庫為之虛耗上及韋后皆重之無敢指目者侍御史魏傳弓奏曰刑賞國之大事陛下賞己妄加豈宜刑所不及上乃削黜慧範放於家四年以鍾紹京為中書令典朝政紹京縱情賞罰衆皆惡之太常少卿薛稷言於上曰紹京雖有勳勞素無才德出自胥徒超居元宰恐失聖朝具瞻之美出為蜀州刺史中宗時崔日用與薛稷爭於上前稷曰日用傾側附武三思非忠臣賣友邀功非義士日用曰稷附張易之宗楚客非傾側而何上兩罷之睿帝即位時宰相多太平公主之黨劉幽求與羽林將軍張暐謀使中書侍郎王琚言於上曰竇懷貞崔湜岑曦皆因公主得進日夜為謀不軌若不早圖一旦事起太上皇何以得安請速誅之上以為然暐泄其謀上流幽求於封州玄宗開元元年詔周利貞及滑州刺史裴談等皆酷吏宜終身勿齒後利貞復授珍州司馬明年授夷州刺史黃門侍郎張廷圭執奏曰陛下英斷聖明四海心服所謂英斷殄凶逆正朝廷是也所謂聖明辨忠邪信賞罰是也利貞宗武舊黨鉏僇桓敬自陛下登宸極布新政奪其班級遷之遐荒以允天下之望義士猶以罰輕為望今錫以朱紱委以藩維是絀姦不必行也疏入遂寢四年京兆尹崔日知貪暴不法李傑將糾之日知反搆傑罪侍御史楊瑒廷奏曰若糾彈之司使姦人得而恐喝則御史臺可廢矣上遽命傑視事貶日知歙縣丞二十四年張守圭使平盧討擊使安祿山討奚契丹敗績守圭奏請斬之祿山臨刑呼曰大丈夫欲滅奚契丹奈何殺祿山乃更執送京師上惜其才赦之張九齡固爭曰失律喪師不可不誅且其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之德宗時起盧把為饒州刺史給事中袁髙當草詔見宰相盧翰劉從一曰杞當國矯誣隂賊斥忠誼傲明德反易天常使宗祏失守天下疣痏朝廷不置以法才示貶黜今還授大州天下其謂何翰等不恱命舍人作詔詔出髙執不下奏曰陛下用杞為相出入三年附下罔上使陛下越在草莽羣臣願食其肉且不厭漢法三光不明雨旱不時皆宰相請罪小者免大者戮杞罪萬誅陛下赦不誅止貶新州俄又內移今復拜刺史誠失天下望帝曰杞不逮是朕之過朕已再赦答曰杞天資詭險非不逮彼固所餘赦者止赦其罪不宜授刺史願問外廷并敕中人聽於民若億兆異臣之言臣請前死諫官亦力爭帝前帝曰與上佐可乎羣臣奉詔翌日遣使慰髙曰朕惟卿言切至已如奏太子少保韋倫曰髙言徑挺自是陛下一良臣宜加優禮時判度支班宏卒官中書侍郎同中書門下平章事陸贄薦李巽帝漫許之而自用裴延齡贄奏曰臣聞君子小人用舍不並國家否泰恆必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人于蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠹也眯離婁之目則天地四方之位不分矣充子野之耳則雷霆蠅黽之聲莫辨矣雖后稷之穡禾易長畝而蟊傷其本則零瘁而不植矣雖公輸之巧臺成九層而蠹空其中則圮折而不支矣是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而沮之哉誠以其蔽主之明害時之理致禍之源博傷善之舋深所以有國有家者不得不去耳其在周易則曰大君有命開國承家小人勿用必亂邦也在尚書則曰除惡務本去邪勿疑在毛詩則曰無縱詭隨以謹無良曽是掊克斂怨以為德盜言孔甘亂是用餤讒人罔極交亂四國在論語則曰惡利口之覆邦家者在春秋則曰聚斂積實不知紀極毁信廢忠崇飾惡言靖譛庸回服讒搜慝天下之人謂之四凶在禮記則曰小人行險以僥幸長國家而務財用者必自小人矣小人使為國家而災害並至雖有善人無如之何臣頃因讀書常憤此類不圖聖代目覩斯人戶部侍郎裴延齡者其性邪其行險其口利其志凶其矯妄不疑其敗亂無恥以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譛服讒為盡節總典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下協放勛文思之德而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽則天討斯得聖化允孚小往大來孰不欣幸迹其姦蠹日長月滋隂祕者固未盡彰敗露者猶難悉數今請粗舉數事用明欺罔大端悉非隱微皆可覆驗陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩願擇左右親信兼與舉朝公卿據臣所言閲實其事倘延齡罪惡無狀即臣之奏議是誣宜申典刑以制虛妄俾四海法朝廷之理兆人戴陛下之明得失之間其體甚大不當復有疑慮使辨之不早以竟失天下之望也前嵗秋首班宏喪亡特詔延齡繼司邦賦數月之內遽衒功能奏稱勾獲隱欺計錢二十萬貫請貯别庫以為羡財供御所須永無匱乏陛下欣然信納因謂委任得人既賴贏餘之資稍𢎞心意之欲興作寖廣宣索漸多延齡務實前言且希睿旨不敢告闕不敢辭難勾獲既是虛言無以應命供辦皆承嚴約茍在及期遂乃搜求市鄽豪奪入獻追捕夫匠迫脅就功以敕索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連羣遮訴盈路持綱者莫敢致詰巡察者莫敢為言時有致詰為言翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心於上斂怨於人欺天陷君逺邇危懼此其罪之大者也捴制邦用度支是司出納貨財太府攸職凡是太府出納皆稟度支文符太府依符以奉行度支憑按以勘覆互相關鍵用絶姦欺其出納之數則每旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監令旬旬相承月月相繼明若指掌端如貫珠財貨少多無容隱漏延齡務行邪諂公肆誣欺遂奏云左藏庫司多有失落近因檢閲使置簿書乃於糞土之中收得銀十三萬兩其匹段雜貨百萬有餘皆是文帳脫遺並同己棄之物今所收獲即是羡餘悉合移入雜庫以供别敕支用者其時特宣進止悉依所奏施行太府少卿韋少華抗表上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗姦計兩司既相論執理須辨鞫是非臣等具以奏聞請定三司詳覆若左藏庫遺漏不謬隱匿固合抵刑如度支舉奏是虛誣誑亦宜得罪陛下既不詳差三司按問又不令檢奏辨明度支言太府隱漏至多而少華所任如舊太府論度支姦欺頗甚而延齡見信不渝枉直兩存法度都弛以在庫之物為收獲之功以常賦之財為羡餘之費罔上無畏示人不慚此又罪之大者也國之府庫用置貨財物合入官則納於其內事合給用則出乎其中所納無非法之財所出無不道之用坦然明白何曲何私而延齡險猾售姦詭譎求媚遂於左藏之內分建六庫之名意在别貯贏餘以奉人主私欲曽不知王者之體天下為家國不足則取之於人人不足乃資之於國在國為官物在人為私財何謂贏餘復須别貯是必巧詐以變移官物暴法以刻斂私財捨此二途其將焉取陛下方務崇信不加檢裁延齡既怙寵私益復放肆遂録積久逋欠妄云察獲姦贓總計緡錢八百餘萬聼其言則利益雖大考其事則虛誕自彰或是水火漂焚或緣旱潦傷敗或因兵亂散失或遭寇賊敓􅔯或準法免徵或經恩合放或人戶逃迸無處追尋或綱典拘囚不免填納或沒入店宅嵗久摧殘或收獲舟船年深破壞類皆如此難以殫論在人者並無可科徵屬官者悉不任貨賣但存名額虛挂簿書大抵錢榖之司皆恥財物減少所以相承積纍不肯滌除每當計奏之時常充應在之數延齡茍稱察獲遂請徵收恢張利門誘動天聽貽誚侮於方嶽賈愁怨於蒸黎於兹纍年一無所得其為踈妄亦曰殆哉陛下姑欲保持曽無詰問延齡謂能蔽惑不復懼思姦威既沮於四方檢態復行於內府由是蹂􅏳官屬傾倒貨財移東就西便為課績取此適彼遂號羡餘愚弄朝廷有同兒戲諸州輸送布帛度支不務準平抑制市人賤通估價計其所折即便下徵重困疲氓展轉流弊既彰忍害且示不誠及其支送邊州用充和糴則於本價之外例增一倍有餘布帛不殊貴賤有異剝徵罔下既以折估為名抑配傷人又以出估為利事多矛盾交駭物情窮邊穡夫痛憤切於骨髓下土編戶寃叫徹於蒼旻而延齡以冒取折估為公忠茍得出估為賸利所謂失人心而聚財賄亦何異割支體以徇口腹哉殊不寤支體分披口安能食人心離析財豈能存此又罪之大者也平原逺鎮扼制蕃戎五原要衝控帶靈夏芟夷榛薉翦逐豺狼﨑嶇繕完功力才畢地猶敻絶勢頗孤危新集之兵志猶未固尤資贍恤俾漸安居頻敕度支令貯軍糧常使平原有一年之蓄鹽州積半年之儲循環轉輸不得缺數近者三鎮告急俱稱絶糧陛下召延齡令赴中書遣希顏宣旨質問延齡確言饋餉不絶儲蓄殊多嵗內以來必無缺乏希顏懼其推互邀令草狀自陳狀亦如言略無疑畏陛下鑒其所奏翻謂軍吏不誠遂遣中書馳往檢覆道路無轉運之迹軍城無旬日之儲將卒嗷嗷幾將不守有如是之顛沛有如是之欺謾按驗既明恩榮靡替其為蠱媚曠代罕聞此又罪之大者也國之憲度會府是司位列諸郎猶應辰象任居六事實代天工內總轄於庶官外敷化於列郡舉錯係生靈之命得失關理亂之源為人軌儀安可容易未有大官弛縱而能使羣吏服從朝典陵遲而欲禁天下暴慢是以天寶將季楊國忠為吏部尚書亟於私庭詮集選士果令逆豎得以為詞史䇿書之足為國恥而延齡放情亂紀又甚國忠懈於夙興多缺會朝之禮徇其鄙次大隳省署之儀徙郎曹於里閭視公事於私第盡室飲宫廚之膳填街持簿領之書復有諸部參辭四方申請決遣資其判署去就俟其指撝延齡或聚客大誇不令白事或縱酒憑怒莫敢入言至有迫切而來逾旬未省輸納之後纍月不歸資糧罄於滯淹筋力困於朝集晨趨夕散十百為羣里中喧闐常若闤闠衢巷列屠沽之肆邑居成逆旅之津離次慢官虐人斁法求之今古鮮有其倫此又罪之大者也總領財賦號為殷繁自非識究變通智權輕重大不失體細能析微濟之以均平蒞之以勤肅近無滯事逺無壅情綱條之下無亂繩鑒照之下無隱匿然後人不困而公用足威不厲而姦吏懲茍或未然則非稱職況延齡以素所僻戾之質而加之狂躁滿盈既懵且驕事何由理遂以國家大計委於胥吏末流當給者無賄而不支應徵者受賕而縱免紀綱大壞貨賂公行茍操利權實竊邦柄近者度支小吏屢為府縣所繩鞫其姦贓無不狼藉通結動連於節將交私匪止於苞苴威福潛移乃至於是職司失序固亦可知此又罪之大者也風教之大禮讓為先禮讓之行朝廷為首朝廷者萬方之所宗仰羣士之所楷模觀而效焉必有甚者是以朝廷好禮則俗尚敬恭朝廷尊讓則時恥貪競朝廷有失容之慢則凌暴之弊播於人朝廷有動色之爭則攻鬭之禍流於下聖主知其然也故選建賢德以為公卿使人具瞻不諭而化昔周之方盛多士盈朝時靡有爭用能俾乂故其詩曰慎爾出話敬爾威儀無不柔嘉又曰有來雍雍至止肅肅相維辟公天子穆穆言羣臣相與事上敬而能和言語動作靡有不善也周德既衰小人在位務相侵侮以至危亡故其詩曰方茂爾惡相爾矛矣又曰既之隂汝反豫來赫又曰涼曰不可覆背善詈言小人得志惡怒是憑肆其褊心以相詬病也陛下勤修儀式以靖四方慎選庶官以貞百度內選則股肱耳目外選則垣翰藩維濟濟師師咸欽至化庶相感率馴致太和而度支憑寵作威恃權縱暴侵刻軍鎮匱缺糧資將帥每使申論延齡率皆毁訾或指誣隱盜或謗訐隂私或數其出處賤微或憶其心志邪悖詞皆醜媟事悉加諸匹夫見淩猶或生患況將帥素加委遇多著勳庸縱有踰分取求但宜執理裁處茍當其所孰敢不從豈可對彼偏裨恣行侵辱使其慚靦於麾下憤恥於朝廷惟口起羞諒非細故為國聚釁實由斯人而又虐害羣司幸其缺敗蔑彼彛典逞於凶懷氣吞等夷𨽻蓄郎吏時有履道而不為屈撓守官而莫肯由從遭其詆訶事則尤劇或辱兼祖父或毁及家門皆名教所不忍聞敘述所不堪紀其為構陷抑復多端故示凶威使人懾憚人之狂險乃至於斯上虧大猷下扇流俗炮烋禮義之府衊汚清明之朝此又罪之大者也度支舊管牛驢三千餘頭車八百餘乘循環載負供饋邊軍既有畨遞之倫永無科配之擾延齡茍逞近效不務逺圖廢其葺修減其芻秣車破畜耗略無孑遺每須載運軍資則令府縣差雇或有卒承别旨須赴促期遂於街市之間虜奪公私雜畜披猖頗甚費損尤多吏因生姦人不堪命所減者則奏以為利所費者則隱而不論破實徇虛多如此類度支應給宫內及諸司使芻藁薪炭等除稅草之外餘並市供所用既多恆須貯備舊例每至秋穫之後冬收之時散開諸場逐便和市免費髙價復資貧人公私之間頗謂兼濟延齡悉隳舊制但飾姦情旋計芻薪價錢以為節減剩利及乎春夏之際藁秸已殫霜潦之中樵蘇不繼軍廄輟莝官廚待然告闕頻煩於聖聰徵催絡繹於省署﨑嶇求買何假計量糜捐官錢不啻纍倍聮蹇狼狽率以為常此則睿鑒之所明知物情之所深駭事之舛繆觸緒皆然臣愚以謂若斯之流不過嵗費國家百萬緡錢及事體非宜耳其為罪惡未足傾危事之可憂不在於此是以不復詳舉以煩聼覽也至如矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為自非狀迹尤彰足致其禍者又難以備陳也延齡有詐偽亂邦之罪七而重之以耗斁闕遺愚智共知士庶同憤以陛下英明鑒照物無遁情固非延齡所能蔽虧而莫之辨也或者聖旨以其甚招嫉怨而謂之孤貞可託腹心以其好進讒諛而謂之盡誠可寄耳目以其縱暴無畏而謂之強直可肅姦欺以其大言不疑而謂之智能可富財用將欲排衆議而收其獨行假殊寵而冀其大成倘陛下誠有意乎在兹臣竊以為過矣夫君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無謬好者不邪安在私託腹心以售其側媚也以天下之耳目為耳目則天下之聰明皆我之聰明也是以明無不鑒聰無不聞安在偏寄耳目以招其蔽惑也夫布腹心而用耳目舜與紂俱用之矣舜之意務求己之過以與天下同欲而無所偏私由是天下臣庶莫不歸心忠讜既聞玄德逾邁故虞書云臣作朕股肱耳目又云明四目達四聰言廣大也紂之意務求人之過以與天下違欲而溺於偏私由是天下臣庶莫不離心險詖既行昏德彌熾故商書云崇信姦回大雅云流言以對寇攘式內言邪僻也與天下同欲者謂之聖帝與天下違欲者謂之獨夫其所以布腹心而任耳目之意不殊然於美惡成敗若此相逺豈不求過之情有異任人之道不同哉太宗嘗問侍臣何者為明君何者為暗主魏徵對曰君之所以明者兼聼也其所以暗者偏信也又曰秦之胡亥偏信趙髙肆其姦欺卒至顛覆徵之此説理致甚明簡册備書足為鑒戒趙髙指鹿為馬愚弄厥君歷代流傳莫不痛憤陛下每覽前史詳考興亡固亦切齒於斯人傷心於其主臣謂鹿之與馬物類猶同豈若延齡掩有而為無指無而為有陛下若不以時省察得無使後代嗟誚又甚趙髙者乎斯愚臣所以焦慮疚懷以陛下為過者良有所以也夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今德義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有德必有人有人必有土有土必有財百姓足君孰與不足蓋謂此也自古及今德義不立而利用克宣人庶不安而財貨可保因以興邦固位者亦未之有焉故曰財散則民聚財聚則民散與其有聚斂之臣寧有盜臣無令侵削兆庶以為天子取怨於下其有若此者行罰無赦蓋為此也殷紂以貪冒失人而亡周武以散發得人而昌則紂之多藏適所以為害己者之資耳尚何賴於財賂哉太宗亦云務蓄積而不恤人甚非國家之計隋氏不道聚斂無厭所實洛口諸倉卒為李密所利此則前代已行之明效聖祖垂裕之格言是而不懲何以為理陛下初膺寶歷志翦羣凶師旅繁興徵求寖廣𣙜算侵剝下無聊生是以涇原叛徒乘人怨咨白晝犯闕都邑氓庶恬然不驚反與賊衆相從比肩而入宫殿雖蚩蚩之性靡所不為然亦由德澤未浹於人而暴令驅迫以至於是也於時內府之積尚如丘山竟資凶渠以餌貪卒此時陛下躬覩之矣而乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之內萬衆所屯窘如涸流庶物空匱嘗欲發一健步出視賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覓不致竟憫默而遣之又嘗宫壼之中服用有缺聖旨方以戎事之急不忍重煩於人乃剝親王飾帶之金賣以給直是時行從將吏赴難師徒倉皇奔馳咸未冬服漸屬凝沍且無薪蒸飢凍內攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飇冒霜霰踰旬而衆無擕二卒能走強賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其資與衆庶同其憂患與士伍共其有無乃能使捐軀命而扞寇讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既解諸道稍通賦稅漸臻貢獻繼至乃於行宫外廡之下復列瓊林大盈之司未賞功勞遽私賄玩甚沮惟新之望頗擕死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然歟旋屬蟊賊內攻翠華南狩奉天所積財貨悉復殱於亂軍既遷岷梁日不暇給獨憑大順遂復皇都是知天子者以得人為資以蓄義為富人茍歸附何患蔑資義茍修崇何憂不富豈在貯之內府方為己有哉故藏於天下者天子之富也藏於境內者諸侯之富也藏於囷倉篋櫝者農夫商賈之富也奈何以天子之貴海內之富而猥行諸侯之棄德蹙守農商之鄙業哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為己有則建中之積又不在矣若謂徇欲不足傷理化則建中之失傷已甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪已悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祗嘉陛下之誠臣庶感陛下之意釋憾回慮化危為安陛下亦當為宗廟社稷建不傾不拔之永圖為子孫黎元垂可久可大之休業懲前事徇欲之失復日新盛德之言豈宜更縱憸邪復行刻暴事之追悔其可再乎臣又竊慮陛下納彼盜言墮其姦計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大綴所宜慎思夫人主昏明係於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而災禍不及邦國者乎譬猶操兵以刃人天下不委罪於兵而委罪於所操之主畜蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家理有必然不可不察臣竊慮陛下以延齡之進獨出聖衷延齡之言多順宸旨今若以罪置辟則似為衆所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其於改過不吝去邪勿疑之道或未盡善焉夫人之難知著自淳古試可乃已載於典謨陛下意其賢而任之知其惡而棄之此理之常於何不可倘陛下猶未知惡但疑見擠固有象恭挾詐之人亦有黨邪害直之士所資考核兩絶欺誣陛下以延齡為能愚臣以延齡為罪能必有迹罪必有端陛下胡不指明其所效之能以表忠賢按驗其所論之罪以考虗實與衆同辨示人不私若能迹可稱而罪端無據則是黨邪害直之驗也陛下當繩其傷善以勵事君罪端有徵而能迹無實則是象恭挾詐之驗也陛下當糾其包禍以戒亂邦如此則上之於下釋嫌構之疑下之於上絶偏惑之議何必忠邪無辨枉直莫分薰蕕同藏其臭終勝此則小人道長之象也實時運否泰安危之所係豈但有虧聖德不利善人而已乎陛下若以必與己同者為忠良自我作者無改變如此則上之所欲莫不諂上之所失莫不從水火相濟不為非金礪相須不為是恥過作非不足戒捨已從人不足稱惟意是行則匡輔或幾乎息矣匡輔息則理不可致仲尼所謂一言喪邦者在於豫之言而莫豫違也事關興亡固不可忽希旨順默寖已成風奬之使言猶懼不既若又阻抑誰當貢誠伏恐未亮斯言請以一事為證只如延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品喧喧談議億萬為徒能以上言其人有幾陛下誠令親信博採輿詞參校比來所聞足鑒人間情偽臣以卑鄙任當台衡既極崇髙又承渥澤豈不知觀時附會足保舊恩隨衆沈浮免貽厚責謝病黜退獲知幾之名黨姦茍容無見嫉之患何急自苦獨當豺狼上違歡情下餌讒口良由內顧庸昧一無所堪夙蒙眷知唯在誠直綢繆帳扆一紀于兹聖慈既以此見容愚臣亦以此自負從陛下歷播遷之臲卼覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭懼慮燬室而悲鳴蓋情激於衷雖欲罷而不能自默也因事陳執雖已頻繁天聼尚髙未垂諒察輒申悃欵以極愚誠憂深故語煩懇迫故詞切以微臣自固之謀則過為陛下慮患之計則忠糜軀奉君非所敢避沽名衒直亦不忍為願回睿聼為國熟慮社稷是賴豈唯微臣不勝荷恩報德之誠謹昧死奉書以聞臣誠惶誠恐頓首再拜時裴延齡誣逐陸贄張滂李充等帝怒甚無敢言右諌議大夫陽城聞曰吾諌官不可令天子殺無罪大臣乃約拾遺王仲舒守延英閣上疏極論延齡罪慷慨引誼申直贄等纍日不止聞者寒懼城愈勵帝大怒召宰相抵城罪順宗方為皇太子為開救良久得免敕宰相諭遣然帝意不已欲遂相延齡城顯語曰延齡為相吾當取白麻壞之哭於廷帝不相延齡城力也憲宗時左神䇿軍吏李昱貸長安富人錢不償亰兆尹許孟容收捕械繫立期使償曰期滿不足當死中尉訴於上上遣中使宣旨送本軍孟容曰臣不奉詔當死然臣為陛下尹亰畿非抑制豪強何以肅清輦下錢未償李昱不可得上嘉其剛直而許之京城震栗時以栁公綽為京兆尹公綽初赴府有神䇿小將躍馬衝其前導公綽駐馬杖殺之明日入對上怒詰之對曰京兆為輦轂師表今視事之初而小將敢爾唐突乃輕陛下詔命非獨慢臣也臣知杖無禮之人不知其為神䇿軍將也上曰何不奏對曰臣職當杖之不當奏上退謂左右曰汝曹須作意此人朕亦畏之時五坊使楊朝汶妄捕繫人責其息錢轉相誣引近千人中丞肅俯劾之裴度以為言上曰姑與卿論兵事此小事朕自處之度曰用兵事小所憂不過山東耳五坊使暴橫恐亂京輦上召朝汶責之曰以汝故令吾羞見宰相遂賜之死盡釋繫者時翰林學士元稹與知樞密魏𢎞簡深相結求為宰相稹以裴度先達重望恐其復有功大用妨已進取故度所奏軍事多與𢎞簡從中沮之度上表曰逆堅構亂震驚山東姦臣作用撓敗軍政陛下欲掃蕩幽鎮先宜肅清朝廷河朔逆賊秪亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦滅大者非陛下覺悟斷制無以驅除臣蒙陛下委付之意不輕遭姦臣抑損之事不少但欲令臣失所而於天下理亂山東勝負悉不之顧若朝中姦臣盡去則河朔逆賊不討自平若姦臣尚存則逆賊縱平無益上不得已罷𢎞簡樞密稹解翰林而恩遇如故時昭義軍監軍劉承偕太后養子恃恩陵轢節度使劉悟悟執承偕囚之上詔悟送承偕悟不奉詔會裴度入朝上問度宜何如處置對曰承偕驕縱不法臣盡知之陛下必欲收天下心止應下半紙詔書具陳其罪令悟集將士斬之則藩鎮之臣孰不思為陛下效死非獨悟也上不得已流承偕於逺州文宗暴感風害語言鄭注始因王守澄以藥進帝少間又薦李訓使待詔帝欲授諫官中書侍郎李德裕曰昔諸葛亮有言親賢臣逺小人先漢所以興隆也親小人遠賢士後漢所以傾頺也今訓小人頃咎惡暴天下不宜引致左右帝曰人誰無過當容其改且逢吉嘗言之對曰聖賢則有改過若訓天資姦邪尚何能改逢吉位宰相而顧愛凶回以纍陛下亦罪人也帝語王涯别與官德裕搖手止涯帝適見不懌訓注皆怨即復召宗閔輔政拜德裕為興元節度使武宗會昌四年以趙歸真為道門教授先生得幸李德裕諌曰歸真敬宗朝罪人不宜親近上曰朕宫中無事時與之談道滌煩耳至於政事朕必問卿等與次對官雖百歸真不能惑也德裕曰小人見勢所在則奔趨之旬日以來歸真之門車馬輻湊願陛下深戒之時邢洺磁三州既降郭誼懼謀斬劉稹以降宰相入賀上曰郭誼宜如何處之李德裕對曰劉稹年少懦弱騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃斬之宣宗時京兆尹韋澳既視事豪貴斂手鄭光莊吏恣橫積年租稅不入澳執而械之具奏其狀欲置於法上曰鄭光甚愛之如何對曰如此則是陛下之法獨行於貧户耳臣不敢奉詔上曰然則痛杖而貸其死可乎澳歸即杖之督租數百斛足乃釋後晉髙祖天福間楊昭儉為翰林學士時驕將張彥澤鎮涇原暴殺從事張式朝廷不加罪昭儉與刑部郎中李濤諫議大夫鄭受益抗疏論列請置之法疏奏不報會有詔令朝臣轉對或有封事亦許以不時條奏昭儉復上疏曰天子君臨四海日有萬機懋建諍臣彌縫其闕今則諍臣雖設言路不通藥石之論不達於聖聰而邪佞之徒取容於左右御史臺紀綱之府彈糾之司銜寃者固當昭雪為蠧者難免放流陛下臨御以來寬仁太甚徒置兩司殆如虛器遂令節使慢侮朝章屠害幕吏始訴寃於丹闕反執送於本蕃茍安跋扈之心莫恤寃抑之苦願回睿斷誅彥澤以謝軍吏由是權臣忌之宋仁宗天聖五年祀南郊中外以為丁謂復還殿中侍御史陳琰上疏曰亂常肆逆將而必誅左道懷姦有殺無赦丁謂因緣險佞據竊公台賄賂包苴盈於私室威權請謁行彼公朝引巫師妖術厭魅宫闈易神寢龍岡冀消王氣今禋柴展禮渙汗推恩必慮謂潛輸琛貨私結要權假息遐荒冀移善地李德裕止因用黨不獲生還盧多遜曲事王藩卒無牽復請不原赦帝然之景祐元年監察御史裏行孫沔奏論許申妄薦狂人疏曰臣聞左道亂政大姦不可逃刑間邪存誠明哲故能早辨言偽既誅於兩觀德凶必屏於四方俾諸諂佞之臣以絶僥求之路竊見三司判官工部郎中許申久塵寵祿莫著功名昔居刑獄之司劾無狀而寢命後列尹京之幕起公議以歸班既已黜而復升見多岐而挾詐近者風聞罷官漕運入覲闕庭旋列計司纍膺殊用不思展效唯急趨時乃妄薦於狂人妄言精氣俾先容於內寺上瀆威顔而況氣行無間隙不在大毫芒之失為害必深呼吸之中其慮安測古人謂服藥有害微臣謂行氣亦然豈可肆行幻惑栁泌以合煉丹藥終不免誅杜景之求訪異人盡為怪誕茍久習於左右必貽患於君親衆實有言罪當無赦又聞錫以白金五百兩無名受寵亦駭聽聞忝為人臣不知忠孝接引詭道狂冒天聽盜竊厚恩益長姦弊將巧圖於進用必有玷於觀瞻大紊國綱宜除君側伏望追還所賜免標濫賞之名黜去匪人以杜傾邪之漸景祐中宰相呂夷簡求罷仁宗優詔弗許孫沔為陕西轉運使上書言自夷簡當國黜忠言廢直道及以使相出鎮許昌乃薦王隨陳堯叟代己才庸負重謀議不協忿爭中堂取笑多士政事寢廢又以張士遜冠台席士遜本乏逺識致隳國事蓋夷簡不進賢為社稷逺圖但引不若己者為自固之計欲使陛下知輔相之位非己不可冀復思已而召用也陛下果召夷簡還自大名入秉朝政於兹三年不更一事以姑息為安以避謗為智西州將帥纍以敗聞契丹無厭乘此求賂兵殱貨悖天下空竭刺史牧守十不得一法令變易士民怨咨隆盛之基忽至於此今夷簡以病求退陛下手和御藥親寫德音乃謂恨不移卿之疾在于朕躬四方義士傳聞詔語有泣下者夷簡在中書二十年三冠輔相所言無不聽所請無不行有宋得君一人而已未知何以為陛下報天下皆稱賢而陛下不用者左右毁之也皆謂憸邪而陛下不知者朋黨蔽之也比契丹復盟西夏欵塞公卿欣欣日望和平若因此振紀綱修廢墜選賢任能節用飬兵則景德祥符之風復見於今矣若恬然不顧遂以為安臣恐土崩瓦解不可復救而夷簡意謂四方已寧百度已正欲因病默默而去無一言啓沃上心别白賢不肖雖盡南山之竹不足書其罪也書聞帝不之罪慶歷三年侍讀學士歐陽修上奏曰臣昨日因奏事於延和殿已曽面論李淑嚮在開封府猶為踈外今拜學士是禁中親近之職竊緣此人不宜在侍從之列其姦邪隂險之迹陛下素已知之今外邊臣寮骨肉同坐者不敢道李淑姓名蓋其穢惡醜不可當據外人如此惡之豈合却在人主左右淑自來朋附夷簡在三尸五鬼之數蓋夷簡要為肘腋所以援引至此不知今日朝廷如此清明更要此人何用若欲藉其詞業則臣謂才行者人臣之本文章者乃其外飾耳況今文章之士為學士者得一兩人足矣假如全無文士朝廷詔敕之詞直書王言以示天下尤足以敦復古朴之美不必雕刻之華自古有文無行之人多為明主所棄只如徐鉉胡旦皆是先朝以文章著名於天下二人皆以過惡廢棄終身不齒當時朝廷亦不至乏人淑居開封過失極多然止是一府之害今在朝廷若有所為少肆其志則害及忠良沮壞政治是為天下之害故臣不可不言今雖陛下主張正人不信讒巧然淑之為惡出於天性恐不能悛改竊慮依舊譛毁好人伏望聖慈一切不納早與一外任差遣使正人端士安心作事無讒毁之避修又奏曰臣近日竊聞李淑已有聖旨令與夀州却知中書不肯便行須得淑自上奏求出方敢差除臣謂李淑姦邪之迹陛下既已盡知若得斷自宸衷則使天下之人皆知陛下聰明神聖辨别忠邪黜去小人自出聖斷如此則今後姦邪險惡之人可使知懼而不敢為害今若如中書之意須待其自求退則是賞罰之柄不由人主自行去住之謀一任臣下取便如此則今後小人皆知雖為姦邪險惡天子欲力去而中書必未肯行若不自退則無人敢差臣恐自此小人轉為得計不肯悛心進賢退不肖者宰相之職也今大臣既自避怨不肯為陛下除去姦邪賴陛下聖明洞分邪正又不能便依聖旨直與差除更須曲收人情優假羣小三四日來外邊聞陛下欲除李淑夀州人人鼓舞皆賀聖德蓋淑二三十年出入朝廷姦險傾邪害人不少一旦見人主斥去左右莫不欣抃却聞中書如此迂廽自相顧避可惜聖明之斷不盡施行臣欲望更不須候其請郡因兩府奏事之時特出聖旨處分直除一外郡使天下皆知此姦邪穢惡之人是人主力自除去以彰聖明之德修知諫院又上奏曰臣竊見去年五月詔敕節文諸路轉運並兼按察使或貪殘老昧委是不治者逐處具狀聞奏若因循不切按察致官吏貪殘刑獄枉濫民庶無告朝廷察訪得知並當勘罪重行黜降竊見近日賊人張海等入金州劫却軍資甲仗庫蓋為知州王茂先年老昏昧所以放賊入城及張海等到鄧州順陽縣令李正己用鼓樂迎賊入縣飲宴留賊宿於縣廳恣其劫掠其李正己亦是年老昏昧之人京西按察使陳洎張升自五月受却朝廷詔書後半年內並不按察一人如王茂先李正己並顯然容庇不早移換致得一旦賊至不能捍禦及光化軍韓綱在彼殘酷致兵士作亂亦不能早行覺察其陳洎等故違詔書致興盜賊並合依元降詔敕重行黜降中書又不舉行使國家號令棄作空文天下禍亂貽憂君父蓋由上下互相蒙庇之罪也其陳洎張升伏乞依詔敕施行重與黜降若明降詔敕顯有違者並不舉行則今後朝廷號令徒煩虛出伏望出於聖斷以警後來修又上奏曰臣近曽上言為京西轉運使陳洎張升違廢詔書並不按察部下官吏致使盜賊縱橫貽憂君父其陳洎等合坐此罪名重行黜降此事非是臣自生狂見敢有妄言乃是朝廷元降詔書內指揮自合行遣今諸路轉運使不按察官吏者甚衆然别不至大段生事及部內官吏不甚昏老者亦可且示優容如陳洎等部內顯然官吏昏老貪殘並不舉劾致得盜賊並起事勢可憂此若不行則國家詔敕乃是空文今後號令有誰肯聽臣伏見近日頓易諸路轉運方思改作欲除舊弊朝廷此後政令須要必行今若自廢詔書示人無信則新轉運見朝廷先自弛廢言不足聽則更無稟畏必效因循虛煩更張必不濟事古人于作事之初尚或借人行法況洎等首自違犯理合舉行宜於革弊之初先行勵衆之事或謂洎等於少人之際且要任使即乞各與降官依舊差遣以責後效徐議復資亦使過之術也尚慮議者謂淮南王倫賊後不曽行遣轉運蓋淮南新授詔書未及按察而賊已卒至又部內官吏如朝仲約等本非昏老不比京西慢賊經年不能剪滅直至飬成凶勢又其部內官吏顯是昏老誤事之人授詔半年故違不舉較其事體與淮南不同今若以淮南不曽行遣便捨洎等不問則今後犯者又指洎等以為例是則朝廷命令永廢不行伏惟陛下聰明睿斷惟是則從尚恐大臣務收私恩不顧國體若能不惜暫降洎等一兩資官存取朝廷綱紀以勵中外則庶幾國威復振患難可平慶歷四年修又上奏曰臣伏覩朝廷近為王堯臣吳育等爭陳留橋事互説是非陛下欲盡至公特差臺官定奪而王礪小人不能上副聖意挾公徇私妄將小事張皇稱王堯臣與豪民有情弊誣奏慎鉞令凶吏濳行殺害及妄稱真宗皇帝朝移橋不便致民切齒等事及勘出事狀王堯臣元不曽受豪民請囑慎鉞亦不曽令小吏濳行殺害及據先朝日歷內真宗皇帝親諭王旦為陳留損害舟船特令修換證驗得王礪所言悉是虗妄上惑聖聽賴陛下聖明慎於聽斷不便輕信其言别令呂覺根勘今既勘出事狀方明王礪不公伏以臺憲之職本要糾正紀綱而礪但務挾私欺罔天聽合行黜責其罪有四一曰謗黷先朝聖政謹按日歷書真宗皇帝親諭王旦移橋一事乃是先帝知民間利病移得此橋為便故史官書之以彰聖政為後世法今王礪却稱是真宗朝權臣受豪民獻賂移得此橋不便民間至今切齒若如王礪所説即是真宗誤信權臣移橋致民怨怒乃是當時闕政今國史書橋便利彰先帝聖政王礪言移橋不便是先朝闕政臣不知國朝舊史可信為復王礪之言可憑其虛妄謗黷之罪可誅一也二曰中傷平人使今後勞臣不勸臣見向前三司使不能擘畫錢穀至有強借豪民錢二十萬貫買天下官私物貨至稅果菜之類細碎刻剝自堯臣在三司不聞過外誅求而即今財用不至大闕亦聞南郊漸近諸事亦稍有偹當此窘迫乏用之時而能使民不加賦而國用粗足亦可謂勞能之臣方當責其辦事今因移一橋小事而王礪誣其與豪民有情致興大獄及至勘出並無情弊是王礪不恤朝廷事體當此乏用之際將能幹事之臣因小事妄加傷害其罪二也三曰誣奏平人為殺人賊凡臺官言事許風聞者謂耳目不及之事即許風聞今王礪目見慎鉞所遣小吏别無武勇又無器仗而稱其有殺害之心及至勘出並無迹狀其罪三也四曰挾私希旨初朝廷本為省府互爭别選不干礙官定奪王礪既知吳育是舉主即合自陳乞别差官豈可謗黷先朝希合舉主且礪言慎鉞是堯臣所舉感惠必深今礪是吳育舉豈不懷感且吳育與王堯臣本無怨恨各為論列本司公事所見異同乃是常事但王礪小人妄思迎合張皇欺誑其罪四也且王礪謗黷先朝聖政之罪若不重責則無以彰陛下孝治之明中傷堯臣若不重責則使勞能之臣不能安心展效其誣奏慎鉞遣吏殺害及挾私迎合舉主之罪若不重責則今後小人恣情妄作獄訟必多事繫朝廷之體臣忝諫諍不可不言其王礪伏乞重行貶黜修又上奏曰臣近有劄子并曽面奏為臺官王礪特被差委輒敢徇私妄言王堯臣因移橋别有情弊等事欺誑朝廷上賴陛下聖明再令推究勘得堯臣並無私曲已蒙聖恩釋放自王礪妄行彈奏羅織無事之人欲借國威以報私忿立朝之列人各自危及聞堯臣不陷枉刑更蒙陛下恩釋中外之士稍復安心然小人在朝非國之利如礪善惡未辨尚可含容今既試之以事見其傾險之迹則豈可更令濫處臺憲中傷善人伏望聖慈早行黜責以戒在位傾邪之輩兼亦使今後選用之人不敢尚辜委任别造過愆若礪不黜竊慮今後被差委者動皆作過則陛下無由使人此事所繫不細修又上奏曰臣近日伏覩差郭承祐知邢州臣自蒙朝廷差充轉運按察使已來前後纍準密降不下司宣頭劄子令常用心體量轄下官吏臣細詳朝旨本為河北於天下諸路最為用武之地曩因北人通和之後弛備多年一旦恐有事宜百事隳廢朝廷悔鑒前弊故先慎擇官吏務欲修整頺綱昨準宣頭節文一十九州軍擇人久任外其餘州軍長吏令中書門下樞密院選差并下轉運司體量大小文武官不堪其任者不得容庇不才因循不切糾舉却致臨事闕誤朝廷留意河北丁寧切至如此加以近自保州兵亂之後至今民尚虛驚軍情未帖相州順安軍瀛州安肅軍衛州通利軍等諸處不住驕兵扇搖結構當此之際臣實不意選差郭承祐為河北長吏承祐頃知澶州引惹修城兵士幾至作閙去年差來河北將兵臣在諫院曽極論列尋罷知相州貪穢之狀狼藉多端又為按察使張昷之奏論罷為北京部署今者移陜西遷延不去又以邢臺委之當河朔多事朝廷丁寧留意之時承祐纍任不離河北不審其人果以何能當此慎選承祐庸劣貪穢奴廝之材若以曾效僕使之勞不忍廢棄豈無間處可畜養之況邢州北連鎮定控扼西山軍馬所屯人民繁富禦戎鎮俗尤須擇吏萬一乏人選差止得中常之材尚勝承祐伏望朝廷顧惜河朔名藩重地不使庸劣小人壞之其郭承祐伏乞特賜指揮罷去邢州别選差人厯代名臣奏議卷一百七十四
