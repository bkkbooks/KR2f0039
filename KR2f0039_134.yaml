body:
  text: 歴代名臣奏議卷一百三十四明楊士竒等撰用人宋仁宗慶厯三年起居舍人陜西轉運使孫沔過闕論宰相不進賢者為将来之資上奏曰臣竊以直言指佞忠臣之亮誠革弊救時聖人之能事古之士有負鈇鑕趨鼎鑊不避死亡之罪以回主上之心非不知愛身命保富貴自為安逸之計而奚取摧折之苦盖不敢以所損之小以忘所補之大也自祖宗有天下垂八十餘載其間正人直士未嘗以言廢者雖時犯顔獲罪要不過黜一官使居於外不踰年而已遷豈有若古之伏法流竄而殞絶其身者歟景祐已前綱紀未嘗廢猶有感激進説之士觀今日之政以驗今日之事幾何不慟哭長歎息而後無人為陛下言者臣實恥之亦不敢遠引高論唯以時之要務而陳之願少留宸聼夫州郡承風者吏也皆猥懦老耄縣邑禀令者牧守也皆昏戇罷軟制敕方下人咸以為不足信未踰月而數更奏請已行人咸以為不能乆又随時而改易利權反覆民力殫竭邉鄙乆師而自敝戎狄伺隙以争長事至危而陛下以為安人皆憂而臣下唯相目者何也由宰相多忌不能進賢者朝廷失䇿不䏻任正人之所致也先聖所以能致太平者求端方之士用諒直之人故臣之姦佞無不知民之疾苦無不聞知則随而去之聞則擇而行之書諸史䇿不可備舉臣但見荘獻總政之年陛下恭黙之日有王曽張知白魯宗道李廸蔡齊薛奎以正直迭居兩府曹修古李紘劉随鞠詠孔道輔以亮節更任諫垣參用才智十年之間中外無大故然猶姦纎僥倖閽寺威福未能悉去亦不為害景祐以後丞相呂夷簡進當國政以承平可恃以功業可久連黜忠言幾廢直道洎為使相出鎮許昌以王隨陳堯佐代其任才庸負重謀議不協忿争中堂取笑多士政事寖廢即嵗罷免又引張士遜冠台席本非逺識致敗乃事戎狄始起於邉陲卒伍竊發於輦轂合轡徒行滅燭逃遁損威失體殊無慚愧尚得三師居第自奉盖執政不得人之效也豈不由丞相不進賢者為将来之資但用不如己者為自固之計故陛下思當今之才無若丞相之賢復召自大名再秉鈞衡于兹三年不更一事以姑息為安以避謗為智西州将帥連敗北朝脅取無厭兵殲貨悖天下空竭刺史守宰十不得一法令變易士民怨嗟隆盛之基忽至于此是由不能進賢退不肖為社稷大計也今夷簡以病求退陛下手和御藥親寫徳音恨不移卿之疾在于朕躬四方義士一聞詔書有泣下者丞相在中書二十年三冠輔弼所言陛下無不從所請陛下無不行終始顧遇而未嘗少衰可謂宋朝得君一人而己未知以何道報聖人至深至厚推誠篤信之恩也噫庸常滿前誰階於此智慮未有居丞相之右者使陛下祗有夷簡而天下無其人也設遂請老何人自代今天下士大夫皆稱賢才而陛下不用者左右毁之也天下士大夫皆謂纎邪而陛下不知者朋黨庇之也天下士大夫皆謂不才而陛下任之謂丞相不知未之有也嗚呼天下重柄累聖相授豈可輕易哉夫貨殖之家有至寳之物猶當謹重扄鑰非博識者不得一觀豈可付之愚童騃吏終日戲玩不委諸地而毁之則盗斯奪之矣昔太祖以一旅興王業太宗以五路定天下真宗承經營之䇿數十年間遂至泰寧何嘗不選用宰相與平章大政為萬世業若屋之柱石身之手足手足委墜心體未有得安者柱石摧朽宫室未有得乆者宰相非才天下豈有得致治者也方今北戎伺患以致壓境而取財西賊數勝以使結鄰而請和二方之情偽難知中國之興衰所繫加之民人疲敝政事隳雜此實朝廷非常之時非更張革變則不能至于治平也臣觀在位之意無已然之見事急則錯置失宜既往則怡懌自若去嵗北戎有割地之請未及境而百役暴起晝夜不息遣将帥進官秩推轂輟衣委數十萬兵而遣之一日邀結舊好兵分勢觧去無後慮将帥處於閑地不得一瞻天日之表示不復用兵何憂樂進退之易也如此今又聞西賊欵塞公卿忻忻日望和平此乃緩兵息民之一事耳若因此振綱紀修廢墜任賢使䏻節用飬兵則景徳祥符之風當見於今日矣若恬然不顧遂以為安臣恐土崩瓦觧不可復救也而丞相便為四方已寧百度已正欲因病黙黙而去無一言啓沃上心别白賢不肖雖盡南山之竹不足書其罪也若薦用賢才合天下公議俾士大夫䏻服其心是失之於始而得之於終猶可寛天下萬世之責茍遂容身不救前過不合己者舍之不順己者退之以柔而易制者升為腹心以奸而可使者任為羽翼以諂佞取人者為君子以愚懦無識者為長者使之在廊廟布臺閣上惑聖明下害生靈為祖宗計則必危為子孫計亦未可保於終若是張禹不獨生於漢林甫復見敗於唐可不謹哉可不懼哉臣官為侍從班近清列緘黙度日榮名可期何必多言自貽狂率上忤聖意苦論宰輔盖不忍陛下受隐晦之名丞相書奸邪之迹為後世所賤也臣又聞天子擇宰相必觀立朝之本末採多士之僉論臨大事而有守秉諒節而不回居外則有撫民之譽在内則有諍臣之風一日登庸萬方受賜落落然有大臣之器此庶幾得矣若循資次補亦丞相素為之地安肻拔賢才於不次哉在陛下察之謹之況國家安危之勢在此一舉亦恐未有人為陛下如此言之也臣見數年前有論西北事者有談兵略者諂佞之輩必羣聚而非笑之觀方今之患非言者之過也竊恐臣今日之言亦前日之事也故非擺闔之辭離間之説悉士大夫有識之論也可以質於天地可以逹於君親不愧於人不畏於後臣區區之心幸觀咫尺恥有見聞不盡愚忠雖異日為傾邪所害貶竄誅戮臣亦無悔伏望陛下念祖宗之基業奉社稷之威靈開日月之眀奮雷霆之斷永信任忠良而去敗亂之敝事克復昇平在於此日則天下幸甚慶厯中吏部尚書夏竦進䇿曰伏以國家安危本乎蒼生蒼生治亂繫乎宰字之官於民甚親古者子男之國今為令佐之任故漢詔郎官出宰百里百里之任非材不居國家之制若何輕之春秋之義用賢治不肖用貴治賤方今令佐弊居叢脞或醫師畫工之訴貧窶京百司吏之論乆次貴游子弟之序資䕃京朝職官之遭削奪者皆得調授州縣之間吏道益雜率多不善文法罕諳政事下有妻孥以牽其心上無清華以誘其望樂於因循甘於賄賂皆曰過且罰不失為同類罪且棄不失為豪民以是而觀非用賢治不肖者也況州縣之儀苦於庸賤稽首階墀厮役公府民之疾苦不䏻抗行州之蠺食不敢力禦或牧守非材好自尊大輕視王之命臣不若己之僕御賢者忍恥懶圗政事愚者徇財不顧輕辱以是而觀非用貴治賤者也夫用不肖治不肖則政弊用賤治賤則民不伏以水濟水誰䏻食之嗚呼縣境相壓令長肩比一清九濁尚為多賢比屋空虗百里瘡痏傷天之和致時之災不在斯人誰當其咎伏念陛下軫念元元垂意令佐擇其材能除其不肖貴其爵服去其庸賤合仲尼春秋之義流先王愛民之惠則太平之化可階而至也五年翰林學士張方平乞令中書樞密院依舊聚㕔議事上奏曰臣伏見宰相賈昌朝陳執中等乞觧兼樞密使已降詔允所請自古已来歴代之前三公之職無所不總國初中書樞密院兩相兼領臣竊詳其時盖是後周世宗意欲合二府以復唐舊及范質等罷其職遂致事體兩分謀議不一總於主斷實煩柄馭比以戎冦為患邉防多警始命宰弼闗決機務國論粗合習方為常今疆場雖即漸寧戌守未䏻觧備畜北戎如畜虎饑則噬人飬鷹飽且颺去兩相既罷去此職退朝必更不聚㕔便如路人往来杜絶今雖有處分凡干軍國機要及邉陲事宜令依舊同共商量施行又縁朝廷舉動惜體中外人情易揺三邉忽有小虞兩地即須聚議便是非常之事逺動四方之疑合固易離離則難合今聖恩已聼昌朝等觧罷使名即密院文書自不通僉諸房事務亦罷呈禀臣愚以為其邉防奏報軍馬機宜依舊常且聚㕔每事竝皆同議於後或有警急庶幾得以周知儻值有事商量亦免動人視聼若或聖心採納乞特宣諭施行七年方平論請通中書樞密院事上奏曰臣竊以朝廷政令之所出萬事之本原一統於中書若樞密院則古無有也起於後唐權宜之制因循相承兵權寖重乃與中書對秉衡軸至於分軍民為二體别文武為兩途宣勅竝行議論難一事無任責更相顧望自古為理患在多門況今二府之中豈盡材猷之士朝綱内弛邉事日生西戎北狄有憑陵中夏之志財用殫窘百職曠廢此時廟堂之上豈容非材夫欲朝廷尊邉事寧其要在乎揀别大臣才不才而已矣陛下若去不才之人又復誰當進用若使宴安朝列容身飬望者優游偹位則勞臣益觧體武士益離心兹事體大實在詳察謂宜講求利害稽復古制省樞密院歸於中書若又重於改為則莫若通樞密院之職事於中書見任樞密使副才者留之不才者去之其諸房吏史且皆如舊措置施舍徐更圗議是足以一政事之本重賞罰之權汰宂濫之貟塞僥倖之望改而張之不傷體裁而成之不動衆陛下幸與一二宗臣舊老深圗此議有益於國願斷自聖心行之特降制以宰臣兼樞密使八年詔近臣論時政方平言祖宗之時文武官不立磨勘年嵗不為遷升次序有才實者從下位立見超擢無才實者守一官十餘年不轉其任監當或知縣通判知州至數任不遷當時人皆自勉非有勞効知不得進祥符之後朝廷益循寛大自監當入知縣知縣入通判通判入知州皆以兩任為限守官及三年例得磨勘先朝始行未見有弊及今年深習以為常皆謂分所宜得無賢不肖莫知所勸願陛下稍革此制其應磨勘叙選必有勞績或特勅擇官保任者即與轉遷如無勞績又不因保任者更増展年其保任之法須選擇清望有才識之人命之舉官如此則是執政之臣舉清望官委清望官舉親民官凡官有闕惟随員數舉之庶見急才愛民之意仁宗時方平請令二府各舉将帥上疏曰臣竊思遼夏通謀邊隅設備外則民力漸困内則府藏寖虗將帥既少才謀兵士又非精勁安邉攘宼未見長筞天下之勢深索維持惟是用人尤為急要直須不次選擇才䏻伏乞陛下特降宸㫖令兩地大臣人皆舉其所知或有智勇堪任将率勤幹可治錢榖但其才用明有所長者各舉三數人俟其舉上陛下以暇時御便殿將所舉奏面質舉者其前来已試用之迹及将来堪任使之状使據事實陳其行能衆以為然即與進用不惟拔擢得人亦可以見大臣知識之深淺但用得其才人思陳力即可以下集衆務上分憂勞也方平又上官人論曰臣聞股肱元首一體而後成人隂陽沖氣三合乃能生物君臣之義相須猶然故理亂在庶官安危繫所任良臣惟聖后徳惟臣按歴代之典刑觀先王之治道莫不柬賢授任論才賦政勞於圗擇佚於任使堯之克明俊徳舜之時亮天工分職用人猶咨四岳故堯曰疇咨若予采湯湯洪水方割有䏻俾乂舜曰有能奮庸熙帝之載疇若予工疇若予上下草木鳥獸則是播種必稷擊拊必夔各用所長故善其事爰及三代官有世守業精䏻勵百務用舉在漢武宣之朝亦稱多士之羙内則有儒雅質直運籌定令文章應對之臣外則有将帥奉使宣風理民之良咸稱諸用各濟其志以故西漢號為近古凡魏晉而下創圗之主致治之君未有不䏻駕馭英髦賞㧞俊彦而能建大功業立大制度貽謀長世垂裕載籍者也然官紀之制世増其弊原本要末請試槩論盖天子惟君萬邦圗任三事搃百揆者則謀建庶官之長列庶長者則博選衆職之任卑治其目尊領其綱各有典司不相侵紊故人有所守而各安其事為法也簡而責效也詳人君可以垂拱而仰成百度所以條貫而有序及乎隋氏悉擥下權一命之微咸自王命三銓汨混諸流繁錯臯陶九徳不足以盡官才之方周官六計不足以為弊吏之法毛玠之執衡鑑不足以振頺俗山公之善題目不足以發清議矣唐氏雜用隋制皇朝多脩唐舊今吏部之職分而為五仕塗煩廣賢愚不能周知資格有常能否固難悉辨然王者設官分職以立民極知人則哲能官人安民則惠大臣舉賢援能分治邦政在乎旁招俊乂列于庶位夫百司羣吏既非専達各有其長其旦夕承弼出入起居發號施令左右前後之士固宜周識其善惡各盡其器䏻孰有致君成務輔相之道可以居廟堂孰有折衝決勝将帥之略可以安邉域孰有沈謀深識可以斷大事孰有純誠朴忠可以臨大節孰明通塞之術可以主邦計孰有方重之望可以執邦憲孰有詳練故實稽古之學可以偹對問孰有不畏彊禦敢言之氣可以司諫諍此皆帝室儀表當世衡石朝家輕重之所頼生民休戚之所憑夫不深詳乎僉議夙存乎簡注一職不舉固有闕政矣至于専使之才如終軍陸賈者牧民之術如延夀黄霸者澄清風俗淩厲名節如張綱范滂者明慎刑獄哀矜平恕如釋之定國者此皆内與之為政外委之宣風揚主之恩威為民之舒惨者又可不素察其䏻否而克收其功用乎臣嘗讀漢書見元嘉中丞相王嘉上疏曰前山陽亡徒蘇令發為盜欲遣使問状時無可使者盩厔令尹逢拜諫議大夫遣之今諸大夫有材能者甚少宜先畜飬使之成就臨事倉卒乃求非所以明朝廷也臣毎讀至此輙廢卷長息以夫孝哀之世其天下之廣職位之衆猶武宣也而朝廷虗空邦國殄瘁至無一使人之才得非由上失素偹之道者歟故臣深願陛下廣知臣之明為立政之本采拔㒺親疎之間信任存始終之禮使端良之士夙夜乎左右才徳之臣表率乎臺閣㢘能之吏刺守乎州郡則陛下固可以高拱乎太紫凝神乎穆清不出户牖之前而天下固已理矣臣才駑識近不通理要相時官人之道稍近乎政之損益者論著于後掇所遺焉謹論方平又上用人體要論曰臣伏以皇朝兩府前代三司所以平章庶政之經摠覽萬事之紀下賦羣吏之職恢成天下之務故高宗以傅説作相而説旁招俊乂列于庶位周官太宰以八柄詔王馭羣臣西漢丞相東西曹或起為中二千石東漢三府察㢘秀高第出補刺守入居卿校南朝晉宋以来五品已上執政與吏部參掌以至于唐宰臣猶得以不次進用官吏代宗時元載當國而公道隘塞常袞預政而人材凝滯及崔祐甫作相日除十數人未逾年凡除吏八百員上曰或謗卿所除官多渉親故何也祐甫曰進擬庶官必量䏻補任臣若與其相識方可粗諳人才若素不知聞何由察其言行上以為然識者是之憲宗時李吉甫自承㫖作相謂學士裴垍曰吉甫自尚書郎流落逺地十餘年後進人物罕所接識宰相之職宜選擢英俊君多精鑒幸聞今之才傑垍取筆䟽其名氏得三十餘人數月之内選用略盡當時翕然稱重吉甫有得人之稱自文宗之世宗閔徳裕之輩挟私後公結援相傾而朋黨之議興焉故文宗曰去河北賊至易去此朋黨實難由是進用一官遷除一吏各相顧瞩恐渉譏議豈至公宰物之道歟伏惟我太祖太宗之朝擢賢任䏻使人以器才略竒傑或數年而至公相猥昧無庸或逾紀而不改官或卑品而處要重或高秩而居冗散升沈取捨惟才是視故䏻興造功業妥綏四表制度遺文貽厥永代夫功名所立必由駕馭後世因循成弊盖自承平之乆在今致理之本莫先官人之事助陛下官人者豈非宰相乎官至卿監職參臺省遷用之命故在政府郎官以下属乎審官㫖授之職綂乎選曹是二有司者宰司實掄之且今外任之重國權所寄不在㢘刺之職分而為二轉運使提㸃刑獄者也天下諸道不登百人是百人者誠才則天下之政舉矣此陛下所當柬注宰司所宜慎選者也臣比見詔書更委兩省兩制薦舉此固朝廷不欲私用人之柄與天下公共之意然凡被舉者又果盡賢乎若類其資歴第其秩位貫魚受寵無復區選定馬於乾不知適變是猶按伯樂之圗而求驥騄於市也臣愚謂宜斷自宸明遠遵往制以用人之柄責於宰司凡滯淹之才俊傑之器名行磊落衆實共聞自可越次甄升急收其效必依階躡級豈曰用人雖大吏而不能厥職居刺守而不聞治状大者宜罷歸田里小者宜退從冗散漢官儀曰三公聼採長吏臧否人所疾苦條奏之是為舉謡言又漢舊制州牧奏二千石不任位者事皆下三公遣椽吏按騐而黜免之此前代中外羣吏升善退惡咸自宰司之故事也既付之以柄推之以誠則一夫不獲一官不舉陛下有所問之矣或曰經綸屯昧之時則有不次急用之擢持盈守成之時自宜遵常守故而已臣以為此乃腐儒之謬説豈英主之逺謀且陛下向者躬覽萬幾再新區極獨斷不謀拔才振滯彼一二臣上膺奨擢咸自卑仄驟升清要又豈資任之云乎況此三司實掌衆職動而引例何謂掄才能者一日而在下則失一日之益不能者一日而在上則有一日之損故升拔善良斥遠邪惡以一日為晚何遵常守故之謂乎夫然故上下盡心庶官修舉天下之士可得而官使也上無焦勞之憂旰昃之慮而百職理矣謹論七年詔羣臣陳左右朋邪中外險詐而無所行殿中侍御史何郯請閱實其是否因論誠與疑乃治亂興亡之本上奏曰臣聞興邦國之治在通上下之情通上下之情在體天地之道故天地交而萬物生由至和被焉君臣交而衆情逹縁至誠感焉在易有之上下相交而志同則為泰盖人情亨通而至也上下不交而志乖則為否由物情乖阻而然也斯道得失繫時興亡𫝊曰商以兆人離周以十人同離則自疑生同則由誠至唯誠與疑乃治亂興亡之本人君可不鑒哉㳟惟陛下以寛大之資紹宅丕緒以博厚之度信待羣后純用一徳懐来衆心然而歴選大臣其間豈無一持詐之輩博求多士其間豈無一懐欺之人然不可以一臣詐而疑衆臣一士欺而疑衆士嚮以陛下懲艾所任疑阻微生羣臣承風殊少開悟獻計議者迎陛下之意多有嫌避明約束者窺陛下之㫖動設猜防日増月加寖成其弊於國體有損於人情靡安今略舉疑貳之大端足以明其害而監其失夫擇官者宰輔之職今補一吏則疑其渉私故常務頗勞於親決矣分閫者将帥之任今専一事則疑其異圗故多方而加其覊制矣博訪者大臣之體今見一士則疑其請託故賔客有時而不許接矣相先後者士人之常今進一善類則疑其朋黨故推薦不得而行矣分邪正者言官之職今斥一邪人則疑其愛憎故忠憤不得而伸矣凡兹任事者皆公卿士大夫之職周旋忠力乃其責也彼之觸法皆胥吏小人之事乾沒奸利乃其分也今待周旋忠力之人防如乾沒奸利之類欲其㢘恥興行人物忠厚不可得矣一生此風遂致弊俗非但君疑於下抑亦臣疑於上焉故大臣疑用之不専則不敢任事矣小臣疑待之不厚則不敢輸忠矣偹顧問者疑言之不從則不敢抗論矣懐忠讜者疑誠之不達則不敢盡規矣慕功名者疑任之不固則不敢専行矣若循此不返是朝廷無必可信之士無必自保之人君臣上下交相疑而欲天下無否塞之患猶却行而求及前人也此非陛下素志之然皆臣下避忌順成之過也夫不忌不克周文所以基王迹也豁逹大度漢高所以成帝圗也雄猜多忌魏武所以失君徳也唐太宗於君臣去形迹而致貞觀之治徳宗待宰輔多疑貳而召奉天之亂此數君者皆非常主也然而無忌克能豁逹則興邦致治之如此持䧺猜懐疑貳則失徳召亂之如彼是皆往世明驗顯效不得不戒之爾伏望陛下體天地所以交泰而推誠於君臣之際監周文漢高唐太宗所以興邦致治而圗其安戒魏武徳宗所以失徳召亂而防其危分國政以授之相委戎事以歸之将至於羣司多士各付所職使尊者執其要卑者治其詳陛下髙拱而綂臨之唯威福政令則必自已出其他盡付之有司孰敢不為陛下悉力也𫝊曰疑則不任任則不疑斯理之然也以陛下今求治之心其事在一易慮之間爾何憚而不為但慮及之則風俗可丕變天下可亨㑹治平之風夫何逺之有臣以愚淺素懵治體然病今日之賢士大夫以疑阻相承以成陛下之失故敢覼縷而陳之夫志忠則語切而辭多伏惟聖明不以狂愚而遺其言則死幸甚皇祐二年郯知雜事論宰相擇賢材而久其任上奏曰臣竊以唐虞三代成天下之治為日曠久不敗者非其時之易治由其君在位久歴年多爾然不唯其君在位歴年之乆抑亦由任其臣専且乆也虞之賢臣臯陶為冠夏之賢臣伯益為首舜禹任之與之始終故能成至治湯得天下以伊尹為輔不唯其身任之及其子孫亦任之太戊之在位其相伊陟而已高宗之中興其相傅説而已皆終其世而未嘗聞一易人焉所以能享其名周武創王業唯周召之用不唯其身用之及其後王亦用之所以能成其功漢高之取天下也以蕭何其治天下也亦以蕭何何之終繼以曹參亦不唯其身任之至於後嗣亦任之所以能大其業劉備之得蜀中晉元之得江左顧其業亦甚㣲矣然而能抗衡中夏延及數世者以任諸葛亮王導専久之致也唐太宗成貞觀之治非他也由其信房杜王魏長孫之篤而致也明皇致開元之治亦非他也委姚崇宋璟之固而致也東漢李固杜喬陳蕃時君亦知其賢而用之然用之不能終為邪險害之所以速衰危之患隋高祖平天下由其任高熲之功任之不能終以楊素承之所以無宏逺之業憲宗之平夏州破淮蜀由任杜黄裳裴度崔羣而致也任之不能終以皇甫鎛程异間之所以復有叛渙之患凡兹歴代任人之效任之不厭其乆未始不致治任之不保其終未始不致亂為人君者必以是為監則庶幾凛凛三代之際矣後漢治郡縣司倉庾皆官之輕者然而當善其吏久而至子孫者為羙況其任天下之事而欲朝受命夕成功未之有也伏惟陛下勵精致理擇賢為輔自始即位及今所命二府之臣已數十人以三朝所任人較之皆不若今之多也然而亟用亟罷不能持乆其逺者五七年次者二三年下者又不及之唯呂夷簡在相位十數年中間兩罷而復用之李迪兩被進拜始任之數月其再也才逾年杜衍之拜甫及百日雖進退用捨聖慮所決必皆有為然而人情見陛下始用之不聞其盡賢既退之不知其有過其謂諸臣出入二府皆其常也但官重則可以補矣故近来仕至兩省官者人莫不皆有大用之望其望無他不過冀厚祿以溫家族假官勢以榮子孫甚者謂一歴二府得書黄紙則以為榮此尤可怪也用二府之臣計非陛下茍用之必以其有稱天下之望者矣天下之人亦有望於諸臣焉自進用及今不累月而星變為異以前世之事為騐多謂於大臣不利天道幽逺灾異之發固不虗應然不必在於一端也竊恐傾危之士縁以為言或以遇有災異則固當罷免或以避禍患則退自安全陛下或所持不堅一為浮言所移諸臣又将不安其位也今之任者既不能自固後之来者亦未必能安也若是二府無一定之任矣二府無一定之任而欲議天下之治其無日矣人君有聖明之資可樂也尚孳孳勞於求賢者亦與之圗致治之具使功業成於當年名號榮於後世爾以陛下聰明神聖之資於堯舜逺甚然在位近三十年而政理文采未暇浸滛於漢唐之間由任大臣不乆而人為茍且之計也夫國家之弊莫大於人臣茍且況大臣乎今日任大臣者可謂弊矣伏望陛下懲既往之失而圗将来之得其於二府大臣也必知其賢然後用之既用之必使久於職焉既乆矣必待之以勿疑焉審此數端曠日歴年而責其成功人雖中材荷陛下信任之固必将勉强為陛下宣力而講長世之謀況任得賢材而又乆則堯舜之治無難及矣仁宗時直龍圗閣知潞州尹洙上奏曰臣聞至治之本在於務大體不在乎任察也漢明帝察察唐徳宗以察為明皆著譏前史非盛徳之論然則衆之好惡必察之臣下忠邪必察之非謂究發隐㣲作為聰明者也近聞詔獄所治類多善士因醉飽之失發曖昧之罪臣竊以為過矣大抵士君子少長脩飭始終如一者皆純固介特之士舉朝論之百不一二至於年位尚輕頗或踈縱及寄責稍重始自矯厲而䏻建事功於世立名節之效者不可勝紀此殆常人之情明主所深亮也兹事雖往臣所慮者上下相伺動輒得咎刻薄之風寖以成俗於盛明之治所損不細非特為二三子言也又比年以来既行之恩尚或中寝既用之法罕蒙開釋豈摶擊之言易以進寛厚之論難為陳哉伏惟陛下采漢臣窺私之誡鑒吴主校事之弊因慶澤之後發寛大之詔明諭有司凡臣下纎芥之惡非虧損教誼侵害民物者勿復以聞至若暴亂之萌驕僣之原誣㒺朋比徇私滅公此王誅之所先願陛下留神聼察無志其細而遺其大則善者聳而惡者戒矣狂瞽之言惟聖明裁擇翰林學士王珪舉王安國状奏曰右臣竊觀漢之取士非一路毎詔郡國舉茂材孝㢘與夫文學之高第又令丞相御史采質樸敦厚謙遜有行者而舉之間有災異又博求賢良方正直言極諫之人漢所以同風三代者無異術特以得人為盛爾伏見應茂材異等科王安國翰林學士安石之弟行義純茂而學足以明先王之道其少己自高恥與天下士出入場屋間況肯晚同門䕃子弟以茍一時之進哉今年将四十身不得廁皁衣之列行與陛下之民老于太平而無所為士大夫咸為惜之夫三嵗一詔貢舉而實學者未必盡得制科所得又不過一二人豈若漢博取而廣收之若安國者儻得間有所收不亦為明朝得人之助乎伏望特許如王回孫侔黄君俞等例除一恩命且令於國子監講説以試其長或不如所舉臣當坐冒聞朝廷之罪珪又薦孫侔林希劄子曰臣伏觀前代之治逸於享國者未始不勞於求賢也夫以九宸之邃非可以博覽天下也固必考薦者之言而後試用之臣伏見試秘書省校書郎孫侔行義純正好學不倦少嘗遊于場屋其後遂退居江湖然其所為詞章非下於諸生也知永興軍劉敞奏掌本道機宜亦辭不就辟夫士於困窮之中秉節自高顧今豈多得邪又新杭州於潜縣尉林希材學逸羣衆所共聞之昨罷官閩中略至京師不擇祿而去未常一渉權勢之門彼誠安於中而不怵于外與夫煦煦然茍營於人者不亦逺哉伏望朝廷並擢為國子監直講庶使闓劘道藝於勸學之路豈云無補之珪又薦丘與權劄子曰臣伏以求治之朝而翰墨之臣無以愈於薦士之補也伏見福州閩縣主簿丘與權景祐中有聲科場自爾二十餘年困于州縣然孤潔自逺不能茍合於當途之人觀其藝文優深議論純正竊謂遭時右文宜見收采臣今保舉堪充國子監直講如經擢用犯正入己賍臣甘同罪珪又薦李徽之劄子曰臣伏見諫議大夫李徽之相門之彦蚤探經術前後累更寄任而其治不與俗吏同務昨差知鳯翔府先帝知其名特召對而遣之近以疾求領南京留司御史臺今聞疾已平尚在陳留未赴任方朝廷急於用人若徽之者可惜置之閑廢之地望特出宸𠂻試許入見觀其議論可取却與一要劇差遣則徽之既蒙省録當益盡補報之心珪又薦李庠劄子曰臣伏見太子中舍李庠故諫議大夫繹之子少有才縕見推鄉閭歴官以来累有大臣薦辟以美茂之器飾以文雅舉有可觀昨因被病退居闋中渉今累年如聞所恙已平但安恬自守不欲一来京師兼庠未分司以前久不下磨勘文字舊有召試指揮亦辭而不就其風節誠可嘉尚欲望朝廷特與就除陜西一合入差遣庶廣惇勸之路知制誥劉敞乞叙用吕溱状奏曰右臣伏見南京分司呂溱降官責廢已来聞諸道路皆謂坐費公使錢罪當奪官嘗見吕溱歴典蘇楚杭徐數州所至皆有風稱絶無貪名況其壮年已在近侍豈肯自棄如此然其為人資性疎濶脱略細務誠恐檢防不至故陷深法臣竊見頃年蘇舜欽監進奏院日賣官故紙為伶人之費坐監主自盜除名為民遂卒貶所事出仇人情輕法重至今天下寃之臣恐呂溱所犯多或類此兼溱素貧奪禄閑居便至失所伏望朝廷矜憫特賜牽復使溱少加檢防不忽鄙碎盡心臨事其於補報陛下未可量也干浼聖慈臣無任戰懼之至謹具状奏聞吴育知陜州進資政殿大學士召還判尚書都省一日侍讀禁中帝因語及臣下毁譽多出愛憎卿所當慎也育曰知而形之言不若察而行之事聖主之行如日月之明進一人使人皆知其善出一人使人皆曉其惡則隂邪不能構害公正可以自立王之要道也皇祐初王舉正拜御史中丞乃奏張堯佐庸人縁妃家一日領四使使賢士大夫無所勸不報舉正因留班廷諍乃奪宣徽景靈二使又言先朝用人雖守邉累年者官止遥郡刺史今所用未盡得人而尅期待遷使後有功者何所勸耶且轉運使察官吏䏻否生民休戚頼焉命甫下而數更不終嵗而再易恩澤所以未宣民疾所以未瘳者職此故也皇祐中孫抃以右諫議大夫權御史中丞制下諫官韓絳論奏抃非糾䋲才不可任風憲抃即手疏曰臣觀方今士人趨進者多㢘退者少以善求事為精神以䏻訐人為風采㨗給若嗇夫者謂之有議論刻深若酷吏者謂之有政事諫官所謂才者無乃謂是乎若然臣誠不䏻也仁宗察其言趣視事監察御史傅堯俞彈孫抃上奏曰三公之官歴世攸重盖所以鎮撫夷夏統和天人茍非其材闕而不偹必使俊傑不待乎次進常品不可以幸至則天下想風靡然皆勸陛下天度廣納恩過乎威在位者或未更勤勞而寵光已溢往往迭相觀望計校其淹速薄厚不知自省以圗報塞稍復遷延未登大用輙内懐怨懟不平之色見於顔面者何哉以衡弼之地幸至者時有而不任責之罰常輕耳此當世大敝陛下所宜深察臣竊見參知政事孫抃齪齪自守望實俱輕徒以高科乆居清列承㫖翰苑無歉於抃乃使洊更二府積有嵗時常萬機之繁無一毫之助居其位而不預其事甘其寵而不知其愧昏塞之語日以流聞𫝊笑士民取輕夷狄每進趨軒陛百僚具瞻勤勞之臣為之觧體上累日月之照将為方冊所譏且郡縣小官稍不稱職謂為尸素無益誅譴免逐者多矣豈有賦禄萬鍾偹貟三事懵然無知可以乆處其任者乎伏望陛下不以臣言為妄不以臣状留中付外施行俾抃罷免少抑貪幸且礪忠勤不獨臣愚謂然實中外顒顒之望臣不勝懇激之至堯俞又乞停薛向新命上奏曰伏以二府之地大政所出各有分職共熙天朝無相奪倫乃可言治倘或躬操綱紀而自紛之欲使百司安所取法此源一啓其流將大風聞陜西轉運副使薛向到闕參議馬政纔粗有條貫是否皆未可知朝廷推恩頗異常等既落權字又候二年除轉運使轉運使自𨽻中書門下而樞密院一切専行臣雖淺愚不練國家故事若果如是者實紊綱紀誠非細故豈可因循伏望陛下斷自宸衷停薛向新命況向資歴尚淺寵任己優俟其績用有成進擢未晚不獨審慎名器塞僥倖之路且使中書樞密院名分各正臣非區區為薛向言盖以朝廷事體不容虧損茍有所闕當窒其源惟陛下必賜施行臣不勝懇激之至知制誥胡宿乞留三御史上奏曰臣竊以御史者天子耳目之官所以上廣聪明下防威福若有畏懦無状緘黙不言即是尸禄素餐負陛下之任使罪之可也若其不畏強禦糾發姦違可謂䏻言是其本職旌之可也近聞臺官彈奏事連宰相陛下不置詔獄按門止令開封府訊状憑劉宗孟一面單辭黜三人御史於朝政有損於人情未服昨日聞御史差勅留中未下外議皆謂必是聖心覺悟不黜臺官人情莫不喜悦剛猛御史自古難得今若逐去須别舉人所舉之人未必䏻勝此也近日謫見未息姦宄須防古人有言猛虎在深山藜藿為之不採猶言直臣在朝姦臣逺避也臣欲乞降㫖留三御史在朝以警姦邪臣昨晚蒙宣召已曽面論此事欲乞聖慈更賜詳度至和元年言事御史馬遵論安危之機在於命相上奏曰臣每讀唐書見宰相崔羣對憲宗論開元天寳中事未嘗不廢卷而嘆以為知言其略曰安危存亡繫所任明皇用姚崇宋璟張九齡則理用李林甫楊國忠則亂人皆以天寳十五年禄山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡専任姦臣李林甫理亂自此已分矣其切至明白如此豈不謂之知言乎盖人之用舍存乎前國之安危係乎後譬猶飬身常須畏疾不可以覺痛之日始為受病之辰當審之厥初也竊聞弼臣累懇求退或慮聖慈重違其請則别須求之以付大柄今山摧别都之鎮日食正陽之朔大異仍見多事可虞伏望陛下深惟三聖基業之大四海生靈之廣采中外之公議斥左右之私言鑒開元天寳之理亂戒林甫九齡之用舍安危之機在此一舉間不容髪雖悔何追陛下擢臣冗職之中任之以言事之責日夜惟念無以補報若煩碎迂濶之論不敢上煩天聼惟中書政本命相用人最為急務與其後時而悔不若先事而言在職所宜雖死無恨惟陛下留神省察則天下幸甚嘉祐元年遵又論宰相逐諫官乞與辨明疏曰臣聞御史中丞張昇累上殿論列為趙抃等昨乞外任奏章雖入朝㫖未從及宰相劉沆獨入文字指言抃等朋黨及罪惡條件因此除出則是成命雖自朝廷本意實由宰相所以外議喧譁皆謂宰相逐諫官非厚誣也切觀自古帝王皆以聼忠為賢拒諫為醜今頻年出臺官非朝廷美政損陛下聖徳若因張昇論列特與辨明四方聞之皆知臺官之出非陛下本意正朝廷之體全陛下之名在此一舉臣以當職須合力言為朝廷惜體為陛下惜名非特為諸臣而發之也臣無任區區納忠之至遵又䟽曰臣聞御史中丞張昇累上殿言宰相獨入文字除出臺官趙抃等不當若謂抃等素非善人不當除為臺官既為臺官而後有過亦當即時屏黜不可乆令在朝俟其求出而後言之即當行降責以正典刑不宜尚帶舊官猶専民政如其無過豈敢以空言止除小郡本末而言皆為未允若謂奉行條貫當出則中書條貫甚多未必盡能執守只如宣徽使明有定制不得過兩員今除四員矣如此之類不可條陳未聞别入文字特有條陳以此而言乃是意欲舉行即引為詞耳宜張昇再三辨明而不能已也自来臺官多不為人所喜而權臣尤甚非權臣天性惡之勢使之然也若非聖君主張盡令權臣處置則諫垣憲省之中求過避禍之不暇豈復䏻為朝廷計哉陛下聖明必照此事伏乞英斷至和二年侍御史趙抃乞勿令歐陽脩等去職上言曰臣伏以天子南面之尊左右前後須得正人賢士為之羽翼朝廷有大賞罰可以詢訪有大闕失可以裨益有大急難可以謀議有大禮法可以質正竊見近日以来所謂正人賢士者紛紛引去朝廷柰何自剪除羽翼臣未見其能致逺也憂國之人莫不為之寒心如吕溱知徐州蔡襄知泉州吴奎被出知夀州韓絳知河陽府此皆衆所共惜其去又聞歐陽脩乞知蔡州賈黯乞知荆南府侍從之賢如脩輩無㡬今堅欲請郡者非他盖傑然正色立朝既不能曲奉權要而乃日虞中傷皆欲扳溱襄奎絳而去耳今陛下又從其請而外補之臣恐非朝廷之福朝廷萬一有緩急事則陛下何從而詢訪也何從而裨益也何從而謀議也何從而質正也所失既多雖悔何及詩不云乎濟濟多士文王以寧此謂文王雖大聖人得居尊安寧者盖在朝多賢哲之士而致之然也臣愚伏望陛下鑑古於今勿使脩等去職留為羽翼以自輔助則中外幸甚臣無任懇切納忠之至歴代名臣奏議卷一百三十四
