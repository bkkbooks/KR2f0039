body:
  text: 歴代名臣奏議卷一百九明楊士竒等撰仁民宋光宗時吏部員外郎陳傅良初對劄子曰臣恭惟藝祖受命平定海内凡所以創業垂統莫非可𫝊之法而深仁厚澤垂裕後人則專以愛惜民力為本臣案故牘自建隆至景徳四十五年南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州郡不會古所謂富藏天下何以尚此當其時諸道上供隨所輸送初無定額留州錢物雖盡曰係省而非取之也盖至大中祥符元年三司始奏立諸道上供嵗額以此承平百年家給人足傳序九帝天下常多故矣而民心不離迄用中興則以祖宗之澤在人深厚故也臣常惟念藝祖以得民心受天命比隆三代矣然而以天下遜不私諸子纔一再傳而萬世不祧之宗僅同支庶則是在天之靈未享其報髙宗遭變深探其本由是推正統之自納至公之說而大命復集於夀皇聖帝爰暨陛下豈非天哉且天之報藝祖者如此而陛下以睿聖之資寬仁之徳誕膺天眷方當繼體之始伏惟夤念髙宗推本之意欽承夀皇付託之訓以推行藝祖在人未泯之澤為萬世無疆之休今其時也臣不勝至願蔡勘論州縣科擾之弊䟽曰臣聞民為邦本本固邦寧自古為國者欲固邦本先結人心欲結人心先寬民力欲寬民力先擇守令非其人則主澤不能下流人情無由上逹民力困則人心離人心離則邦本危矣臣少歴州縣洊䝉朝廷任使六持使節再総軍儲足跡所歴幾遍東南求守令之循良者不可多得能者以一切之政趣辦目前賢者不得行其志救過逃戾而已推原厥自盖由版曹督責漕司漕司督責州郡州郡不恤縣道縣道不恤百姓上下相迫前後相仍習以為常恬不為怪民力之困至此極矣可不改弦易轍而拯救之耶臣請詳言其故且二稅古也今二稅之内有所謂暗耗有所謂漕計有所謂州用有所謂斛面二稅之外有所謂和買有所謂折帛有所謂義倉有所謂役錢有所謂身丁布子錢此上下之通知也於二者之中又有折變又有水脚又有糜費有隔年而預借者有重價而折錢者其賦斂煩重可謂數倍於古矣然猶未也有所謂月樁有所謂鹽産有所謂茶租有所謂上供銀有所謂乾酒錢有所謂醋息錢又有所謂科罰錢其色不一其名不同各随所在有之不能盡舉為保正者科買土産科買竹木廵尉下鄉則預備酒食居民被盜則先納賞錢應期限則有繳引錢違限期則有罰醋錢以至脩造公廨廵鋪橋梁驛舎一切取辦故中人之家無不剔屋破産以充役為稅長者逃絶稅則令代納坍江稅則令代納産去稅存無所從出者又令代納異縣它鄉不能追逹者又令代納已納在官者不可復得見欠人戸則不為理還故單産之民無不典妻賣子以免罪如此民力安得不重困乎又有催科之擾州差典級下縣甚則州差州官縣差縣官下鄉甚則知縣親往吏卒所至需索百出鞭笞纍繫動輙数十人所欠多係升合尺寸之餘未納者不免於倍輸已納者又從而再納往往無有獲免為守令者但知以催科為急無復一分愛民之心所以堯舜在上而恩澤不得以下流者正以此爾恭惟陛下嗣守大寳遵奉慈訓凡發政施仁無非以愛民為先真堯舜之用心也陛下裁損經総制錢而所損者無額耳毎嵗常数則未嘗虧少陛下蠲放身丁錢而所放者見欠耳先納在官者無由理折陛下裁減和買恩至渥也而鄉胥作弊減免不均陛下倚閣逋負徳至普也而豪戸恃強催索自若陛下愛民之心不能盡布陛下卹民之政不得盡行此無它守令非其人耳縣令既不可盡擇當擇郡守郡守不能盡得人毎路當擇一賢監司而委任之陛下臨遣諭以徳意使之徧行郡邑親見守令講求民間休戚可罷者罷之可行者行之計州縣一嵗之出入可蠲者蠲之可減者減之使上下相通内外相應無為文具以復命庶幾實恵可以及民民力可以少蘇矣民力既蘇邦本自固天下幸甚寧宗時江西提舉袁燮上便民劄子曰臣竊惟民力之困至于今極矣多方存恤凡有便於民者知無不為庶乎其少蘇也今州縣間皆有行戸官司之所欲買行戸不敢不供賤於市價謂之官買夫張官置吏本以為民民不被恵而强買其物官則利矣民将若何此不顧㢘耻者所以深為可罪而遭其漁獵者所以深為可憫也昔公儀休見其家織帛而怒因茹葵而又怒曰吾已食祿又奪園夫紅女利乎董仲舒美之曰古之賢人君子在列位者皆如是故下髙其行而從其教民化其廉而不貪鄙今日士大夫所食之祿民力為之也既食其力無補於民又賤價以買其物習以成風恬不知愧是之不戢吾民愈困矣臣愚欲望聖慈軫念民瘼詔諭四方應官司買物並同時價敢稍減者並許越訴計贓定罪此亦恵民之一端也中書舍人陳傅良上奏曰臣竊謂今天下亦多故矣臣未暇縷數獨念民力之困於此為極而莫與陛下救之者耳賢士大夫不為不多曾莫與陛下救斯民者何也勢不行也何謂勢不行欲救民窮必為帥為漕為総領而後可而三數官者雖賢士大夫不樂為之故也既曰賢士大夫而不樂為帥漕総領何也外權太輕雖欲有所設施而不得騁故也是故不為法令之所束縛則為浮言之所動揺不為時政之所諱惡則為宦㳺於其處而不得志者之所中傷有是四患雖賢者亦忍事茍嵗月耳而況其餘人乎且夫人情誰不喜遷而惡滯誰不好伸而耻屈誰不趨利而避害今也立朝自郎察不一二年可至卿監又不一二年鮮不得為從官若夫帥漕則有奔走徧天下而無一日朝蹟者其間僥倖或得貼職自直閣積而至脩撰極矣而所謂脩撰者又必嘗為卿監而後得之是終身無復從官之望臣所謂喜遷而惡滯人情之不樂一也今夫立朝茍有親故欲入辟闕則可以移書帥漕若総領而坐取之無不如意者至為帥漕連銜剡牘奏辟一属官若准備差遣之𩔖輙不可得若平平也則不過送部勘當訖於陸沈若稍有過差之請往往省部詰難回復甚者至被論列臣所謂好伸而耻屈人情之不樂二也今夫立朝自釐務職事官皆得以親族子弟牒國子監補解試及監司帥臣茍非在川廣二千里外即子弟無收試之所毎遇大比無所附著稍知謹畏者大率無故而殿一舉不然則為謬巧遷就以避貢舉條制斯可矣臣所謂趨利而避害人情之不樂三也如前四患則是事權太輕雖賢者猶不樂為之如後三說則是恩數太薄而人人不樂也夫可與救斯民者必帥也漕也総領也而人不樂為之至此奈何憚改乎臣竊以為今日之勢莫若稍稍重外重外之術必使帥漕総領皆可馴致於從官可以馴致於從官而後可久任可久任而後可責事功如此則帥漕総領始曉然知朝廷委寄不輕矣則夫前四患者次第自去而有為陛下出力救斯民者矣朱熹上奏曰臣前任備員潭州兼管荆湖南路安撫司事竊見本路土瘠民貧無它生理而州縣嵗計入少出多往往例於常賦之外多收加耗重折價錢尚且入不支出公私俱困昨来諸司察見其弊累嘗蠲減務寬民力連年所放盖已不貲而州縣起發上供支遣俸給諸色費用尚仍舊額畧無所損㳂此官司已是狼狽不可支吾或有非泛賞給調發支賜若更差到諸班換授歸正雜流補官之人復有增加則愈見逼迫無以為計臣近者嘗與漕臣何異備奏全州守臣韓邈所申乞減添差貟數可見一端至於其它州縣大畧往往𩔖此不唯官吏茍逭目前多方趣辦不暇為國家赤子計而按察之官知其甚不得已以至於此亦不忍盡法按治無由發覺竊念本路東望朝廷逺在二千餘里之外而北㨿重湖南撫諸峒形勢所闗亦非它道之比萬一民貧不堪誅剥一旦屯結自為擾亂而盜賊蠻猺相挻而起則不知議者何以處之臣自到任以至去官僅及三月雖未及詳宻究其曲折然其大勢如此亦不待智者而後知矣故嘗深以為憂欲為料理但以召還之遽未暇子細詢考畫一奏聞今者既䝉賜對又不敢不為陛下一言欲望聖慈深察一視同仁特詔本路帥臣監司更以前日全州所申事理通之諸郡並行均節将大段闕乏去處特與痛加裁減指定奏聞取㫖行下庶幾州得以恤其縣縣得以寬其民而其間或有不奉詔者亦且無詞以逃其罪則遐逺之民均被實恵而寬大之恩不但為掛墻壁之具而已臣奉使亡状不早上聞以至今日死有餘罪伏惟矜赦而亟圖之則一路幸甚衛涇論淮民當恤䟽曰臣仰惟國家中興以来培埴基業以固立國之計恃淮民為根本自髙宗皇帝生養保聚幾三十年户口豐衍中更瘡痍孝宗皇帝極意撫摩謹擇邊守蠲損常賦察視水旱惟恐民力之有傷所以垂念加恵者甚於中州内甸盖自是又三十餘年且其土地饒沃糓粟登成是以淮民富實家多盖藏閩粤江浙之民往往有徙而附之者故邊垂有泰山之安其為聖慮至深逺也比嵗間值饑儉民多困匱已非昔日寬裕之比而州縣之間凢百調度並縁煩擾事力寖㣲公私前熬平居無事猶或不安其生一旦緩急何所倚以為固臣不勝惓惓私憂過計竊謂國之根本在是朝廷不可不察也去嵗淮之東西積潦敗稼民頗告病今春淫雨傷麥無以續食飢民流離有所未免捄荒之政甚不宜緩不知州縣官吏目覩民瘼備具蓄積施行次第有足以寬陛下宵旰之憂者乎日者襄漢阻饑為擾至勤朝廷區畫推原所繇是亦州縣勞来安集講之不素鑒彼察此烏可忽諸矧長淮為江之藩籬藩籬弗葺則閫閾奚頼其在今日闗係尤重豈得不蚤計而預圖之臣愚欲望陛下深念根本之所恃仰法二祖之逺謀明詔兩淮帥臣沿邉郡守於民情休戚必加之意凡日前科擾之害一切禁止仍亟行下本路漕臣及常平司應有飢荒州縣疾速措置賑恤務要實恵及民以固安易揺之心以消弭未然之慮其於累朝愛養淮民之計誠非小補涇又論歉嵗伏熟及舊逋䟽曰臣聞聖王在上必汲汲於民瘼之廣求民隠之勤卹盖以斯民疾苦無由自逹於上而其隠憂或不能盡白也恭惟陛下仁覆天下視民如傷踐阼之初嵗適告歉陛下哀矜慘怛形於玉色為之薄征為之已責如古荒政靡一不舉徳至渥也以臣觀之故嵗田疇損於水旱不為不廣民之流移餓莩亦不為不衆然其間固有豐熟去處州縣例以災傷為之減其田租而一時寬卹之令且使主家輕其租入田賦減矣租入輕矣又得賑糶賑濟之粟以為左餐右粥之地則斯民雖在歉嵗而自無歉嵗之憂廼若今嵗雖號豐稔方秋西成多稼雲布田夫野老喜見顔色逮至登塲所收反薄相顧觖望欲赴愬於州縣則田畆既無遺穂以自表欲乞憐於主家則主家以無官放而不從此猶可也積潦之田民以貧病不暇播種今官司或迫其伏熟累年之逋民既窮空無所從出今豪强併至於責償是以人情煎熬田里愁歎反有甚於故嵗此正唐趙光竒所謂時和嵗豐百姓不樂而本朝蘇軾亦有豐年不如凶年之說也豈非聖明之所欲急聞乎臣以為日者陛下俞諫臣之請五等丁錢悉從蠲免則是朝廷於經常之賦曽不靳惜安有田疇積潦迺容州縣迫其伏熟乎又嘗從臣寮之奏民間所貸糧本取息無過五分則是官府於借貸一事已加裁制安有負逋累年廼縱豪民併至責償乎臣愚欲望聖慈明詔州縣其有積潦之田曽經檢視悉與除放毋令伏熟如有違戾許監司按劾聞奏累年之逋嚴禁豪民姑與倚閣或尚監理許州縣即時縱釋庶幾斯民熈熈于于粗知有豐年之慶以仰稱陛下軫念元元求瘼卹隠之意伏惟陛下財幸彭龜年乞權住湖北和糴䟽曰臣輙有愚見仰干淵聽臣照對去年朝廷以淮浙並饑江湖小熟遂下和糴之令嚴遏糴之禁恵甚渥也然州縣亟欲集事未免敷糴於民商賈競起趨利又復争糴於下而江淮両浙帥倉以至総司戎帥皆散遣官吏多齎錢物四處收糴其所差人争先趨辦迭増價值以相傾奪米價既長害及細民細民日要添錢糴米富家愈見閉糴自豐遂使江湖小熟之地反有饑餓不給之民臣自江西以入湖南所到去處皆病於此及入湖北愈覺益甚去嵗江陵雖止䝉朝廷抛降和糴米拾萬石縁湖北地廣人稀耕種滅裂種而不蒔俗名漫撤縦使收成亦甚微薄每到豐稔之年僅足贍其境内萬一發泄出外必至價值翔踴常年米價每石若及兩貫已為極貴今米直至斗添數百長猶未已方此耕布之時使百姓困於貴糴無以自給甚可憐也況本府既有補糴又有和糴數目既多深恐置塲不能頓足不免均之諸邑諸邑復不免敷之百姓上下相乗其勢有甚不得已者其初定價正當秋成米賤之際只據一時市直毎石作一貫五百具申及到後来諸處官司商販競来争糴米直陡貴官司但以事干朝廷只執元價不敢增添馴至今日輸猶未足乃是百姓受錢於米賤之初而輸米於増價之後甚者家無見儲不免轉糴以償於官焦熬如此可不速為之計哉臣至愚極陋䝉陛下寄以牧養之責臣既親見小民無牧養之具豈可不仰告陛下臣照對江陵府己申朝廷乞将和糴未足之數候到秋成糴足未準行下臣契勘本府合糴米十萬據諸處申到已糴及㭍萬尚有三萬未糴而見在之米已承朝廷指揮未令起發以此見得淮浙亦不待此米之来所有未糴三萬若得少緩收糴却得蘇此一方之民縁今来已是五月若俟朝廷行下然後住糴恐不及事臣已令本府将見糴未足米數且權住糴以待回降庶使青黄不接之交留得此米接濟百姓以了農事不勝幸甚貼黄臣訪聞諸路監司帥臣在湖北糴米甚多其糴米之價比之本府和糴毎石率多一貫已上故其交易比和糴尤易臣計本府和糴之數已及十分之七即外路諸司所糴米數必是過之設使目即住糴亦不闕事臣已行下本路諸州令勸諭有米之家當此艱食之時先将米糓糶與百姓如本州縣食米已足即許将所餘之米糶與外路般販之人臣為見本路百姓委是闕食不得不權宜措置以救目前之急若是去年十二月今年正月之交臣亦不敢如此施行但恐自此或有遏糴之謗尚兾陛下為此一方之民曲加睿照臣罪萬死所不敢逃知徽州事袁甫奏便民五事状曰臣一介庸虗寸長蔑有濫膺臨遣承之新安良由聖朝選拔之公但愧微臣叨逾之過欲求報塞罔憚勤勞倐更一朞合條五事學不足以窺體統識不足以逹事宜惟以便民為心斯乃守臣之職臣昨塵班列獲覲清光思欲少裨聖聡嘗獻仁之一說即䝉俞允且賜褒嘉況今圖為保障深戒繭絲施行於本州者既以仁為先奏陳於陛下者宜以仁為急條目雖異綱領則同惟欲實恵於民而已伏乞睿慈特加開納豈特愚臣之幸實一州百姓之幸一臣仰惟陛下軫民疾苦切於體膚拯民塗炭急於焚溺所以迓續民命䕶飬國脉為億萬年無窮之基可謂至深且長矣臣竊見近者朝廷行下本州及監司元申休寧縣體究賦稅事亟頌俞音多所蠲減皇乎休哉湛恩汪濊罔間遐邇臣濫綰郡符日與撃壌之民歡欣感戴臣伏覩户部看詳之辭洞見州縣情状破其私意示以大公其言曰閱繹所申則惟供上窠名裁削不靳若乃留州送使項目責辦如初是特為私已逭責之謀似非有體國恤民之念今準看詳之㫖盍䟽均一之恩於是不特将上供數目量行減放併将州郡所得自用者亦行蠲除臣捧誦至此竦然歎服以為聖朝主張公道勤恤民隠如此蕞爾小郡雖甚迫蹙何敢不宣明息音推廣仁聞已即備坐聖㫖張榜通衢令深山窮谷之民皆户知之甚盛舉也抑臣又思之徽有六邑俱號鑊湯婺源休寧最當沸處今休寧則被恵矣其獨遺婺源乎況婺源介乎萬山五嶺之間邑最壯民最獷而財計最耗較之休寧殆又甚焉吏部出闕畏卻莫前縣佐攝官茍求免過指正稅以觧别色那新錢以掩舊逋措置既無它䇿預借是為良謀纔一二年不知幾萬豪家富室憑氣勢而不輸官租下户貧民畏追呼而重納産稅加以連嵗非值豐登兼又屡遭回祿學舎庫務幾無孑遺井里市廛莽為瓦礫挈此蕭條之邑畀諸新辟之官補綻支傾忘寝廢食極疲勞而不憚如醉夢之方醒則夫蠲減之恩豈可斯須少緩雖然蠲減誠是也祈哀於公上屯膏於本州則是猶未能克己私也己私未克自立藩籬是先以婺源休寧為二也而欲朝廷視為一體其可得乎臣今所謂一以休寧為準於本州雖有損於朝廷則不易從茍可利民臣何愛焉尋常州郡得用之錢往往從来視為己物但知厭足其所欲誰肯瘠已以肥人弊俗既成痼疾難療在州之可蠲者既不忍決舎在上之當除者亦不敢申明由其封閉吝嗇之私執而不通致使周流􅗈霈之澤隔而不下臣之愚陋它無寸長獨於公私義利之間粗知從違取舎之決矧州縣事同一體財賦自合通融今欲稍寬縣道豈可專撓朝廷須先從本州除靳惜之私又乞朝廷減無名之斂然後凋瘵之邑始獲少蘇臣已将十六年婺源拖下紬絹一萬七千餘匹茶租折帛錢一萬五千餘貫月樁板式錢六千餘貫應是婺源積逋一切權行住催本州樽節浮費代為收簇起綱惟是鑿空白撰之賦皆係上供及総所色目額錢大重虐害細民既非本州所可自專必欲朝廷特與減放向使無例可攀尚欲力行陳乞況有休寧近例婺源事體一般俱從朝廷明降指揮並係監司差官講究休寧既先減放亦合例及婺源庶幾可以觧倒垂之急矣所以條具婺源減放事件臣今已申監司公共保明同銜申取指揮懐不能已預此控陳伏望聖慈采納施行一臣竊證本州起發上供絹綱屢年以来左帑却回數多臣到官之始積下前政數目動踰萬計督促諸邑晝夜不停追逮搒笞紛然四出又縁向来官吏巧行改移雖有人户姓名往往皆非元物今却而歸之縣縣果何䇿乎惟有重虐吾民耳臣毎執筆行移甚有慙色上下壅塞無由䟽通左帑嚴為限期急如星火本州懼無可觧凛若淵氷臣區區愚慮深恐今嵗萬匹来嵗倍之不三五年積至數萬百姓受害無有巳時於是與民圖新多方曉諭皆令加意織造可保全綱盡收臣粗取信於民民亦遵從其約臣又攷究自来攬户之弊其受於稅户也則昻其價及買諸機户也則損其直以紕踈難售之絹乗綱運正急之時官雖明知其奸毎毎隂墮其術又專揀等軰相為表裏弊倖多端民户不堪誅求耗用何所從出不過減絲縷之費移以塞無厭之需由是真偽混淆輻湊交集名虧稅户實則虧官無恠乎左帑之見卻也臣痛懲此弊而一洗之凡攬户盡行罷去專揀悉皆改差所收人户入納之錢僅及則例應干市利縻費之用不取分毫常時所以多取者盖縁無以飽衆人漁獵之欲耳臣今既剔其蠧復澄其源𨽻役官場之人並支日食之費在官之所耗者少在民之所利者多又人户嵗輸全憑朱鈔即時給付畧無淹留微臣不敢憚勞官吏亦知宣力稍有欺弊㫁在不容民皆曰向也官場邀阻乞覓之弊今皆無此患矣絹雖有加於前人自争先而納未嘗輕用一箠亦不妄追一人諸縣間有過苛本州力行禁約徧散手牓具述臣心萬目觀瞻豈容欺紿雖然察州民之意亦有隠忍而不敢言者夫使民至於不敢言臣獨不愧於心乎何則本州素不産絹大非昇宣之比攷諸新安志國初歙絹止重數兩其後不能盡遵此制然令甲所載江東一路稅絹共重十二兩獨歙州以咸平二年特㫖只以十兩為定併下庫務不得退剥毎匹折七百三十一錢至紹興十八年户部符毎匹估價二貫足乾道三年詔以守臣納絹擾民鐫秩罷之謫辭曰不念繭絲之闕靡思杼軸之空大哉王言為萬世法其後議者又奏以為户部退剥徽絹屢行禁戢深惟列聖之至意顧豈愚臣之能知然觀其加意於徽民乃見夫周道之如砥盖田稅既重則物帛當輕立法公平所宜世守豈虞傳流之既乆反謂寛大為不然漸欲求詳浸非初意今来所納稅絹精好委勝常年雖圖逭責於目前安知可保於它日竊慮向後繼之者未必盡革兩場乞取之弊亦未必貼陪專揀日食之費又未必按時給鈔無頃刻停留之患而徒使徽民入納精好之物則作俑乃自臣始臣之所謂百姓隠忍而不敢言者此也臣因今嵗夏旱禱祈上天有曰咎實在臣民則何罪臣對天而發此言今又對朝廷而啓此奏則夫軫恤徽民其容可緩伏望朝廷證咸平紹興乾道節次寬恤指揮毎匹只以十兩為定仍證舊例行下庫藏如及上項兩數特免退剥退剥既免則全綱盡納異時既無却回之患徽民遂有蘇醒之期袓宗舊風今日復見顧不休哉且臣之所請者十兩之則退剥之禁皆聖㫖也㫖由朝廷而頒顧可由朝廷而廢乎況臣非為己計乃為後圖若今年所起絹綱多是臣手自揀委可堪充入納斷無退剥之虞萬一有之皆係佳物民将樂受又何患焉欲望聖慈察臣出於公心徑下所属檢舉非但使徽民受無窮之賜亦見聖朝取法祖宗愛養基本之厚意若朝廷更欲審訂即乞行下本路監司令取索新安志及節次指揮保明申奏施行一臣聞常平義倉之儲所以備凶荒也平居為有用之備則臨事無缺用之憂今乃不然有儲蓄之名無儲蓄之實臣嵗在己夘贅貳霅川本州常平義倉正𨽻本㕔掌管閱視簿籍米纔數百斛錢纔數百緡而已臣為之大駭一州倉儲民命所係空竭如此緩急奈何及夷攷其故乃知本州秋苖歳入止盈五萬正苖既已甚少義倉自應不多其常平坊場等錢率以敗闕為說艱於催促所入微矣而支用何其夥也若胥吏若軍兵若散從直月廩之數取諸常平使其盡出於公固未甚害其間托名差使輙敢旁縁兊支倅㕔自開倖門州郡亦復援例其餘官属皆有干求由是紛然不勝其衆蓄積本無幾也濫費其可堪乎臣既知其弊遂絶其根率之以身一毫無妄上而州郡下而同官盡裁以公靡容私請日積月累所蓄漸豐始焉僅四百緡今也乃踰萬數幾三十倍於前矣秩滿之日上之倉司故案可覆也臣因此思之使天下諸郡遲之一兩嵗之乆皆有三十倍之多何積貯之足憂何水旱之足慮但今之居官者茍求塞責不務恤民常平使者嵗嵗差官州縣寮属時時覆覈或以虗為實或指東為西上下交欺莫此為甚安在其為儲蓄之實乎臣試郡来此首以是為先但本州土瘠民貧賦煩役重毎遇冬春之際或逢霖雨之餘榖價稍増民食稍缺則官開倉廪亟濟貧民盖不待凶年饑嵗流離餓莩然後為濟糶之舉也故民之所以望於官者甚重而官之所以塞其望者甚難萬口嗸嗸日冀發廩猶賴常平之外又有平糴一倉主於漕臺𨽻於本郡毎欲告急即行飛申臣到任以来請之屢矣今嵗夏無梅潦民户多以旱聞其所望於官司尤非平日之比也畧計六邑之内婺源祁門黟縣雨頗霑足民皆歡呼若歙若休寧若績溪仲秋以後始獲甘雨早禾已不及時中晚庶幾可望臣之愚衷謂除得熟縣分外其旱歉諸鄉若不急拯困窮将見立填溝壑為民父母當若之何所合将常平義倉儲蓄之米多行賑糶民方倒垂庶可寬釋本州痛節浮費䟎促贏餘選委官寮置局收掌於浙間豐稔之邦收糴以償元數官無所耗而民得所利直至来春可以接食且散且補循環不窮信乎兩全之策矣若目撃民饑積而不散豈不大失置倉之本意若輕於捐廩知散而不知補又何以為國家異時之永圖臣粗知以體國之心行愛民之政既申給散之請必為可補之圖非敢徒事空言而已也若夫輕闗市之征寬租賦之入權勸分之宜凡可以救荒者臣皆勉而為之惟夫常平一事非臣之所得專所乞從朝廷行下轉運常平兩司勿拘常程多令濟糶下可以副一州徯望之意上可以廣聖朝矜恤之仁伏惟睿慈果斷而亟行之不勝大幸一臣證對本州僻處萬山之間最畏水旱晴稍乆則農田已憂枯槁雨稍多則山水便見横流里諺云三日天晴来報旱一聲雷雨便撑船言其易盈易涸之甚也故此州農田多藉水利因溪堰水者謂之堨鑿田蓄水者謂之塘興工雖艱為利則廣脩治不輟灌溉甚多彌望數百頃之禾惟資一塘堨之澤臣嘗詢之長老一一具能言之奈何記近而忘久者乃人之常情趨省而憚費者亦民之通患本州地少下濕滿目皆是髙田訪聞舊年嘗憂夏旱偶值數載之内率多霖潦之時小民玩習目前以為嵗嵗如此不思及時瀦水專望雨降自天彼豈不知天時之難必哉盖脩築塘堨為費不貲徽民素貧惜錢如命茍可僥倖得省遽謂卒嵗無憂其愚亦甚矣臣因今年季夏雨澤愆期日夜禱祠靡所不至痛心疾首無地自容因思水利有儲何至煎熬若是雖然水利之廢罪不專在民也向来官司施行以塘堨為大事上而常平使者提其要下而州縣佐令任其詳毎遇農隙之時舉行檢視之令縣具圖籍来上於州州命官寮躬走阡陌建土埄牌以為標識集大小保以定户名某堨興脩某塘湮塞衆目共見不可厚誣然後因其廢興稍加懲勸官既以是為急民亦孰敢弗勤數年以来恬不加察問其主名則含糊難攷按其故籍則散漫罕存茍且如斯可為太息然而墜典未久舊比可尋欲乞朝廷下之倉司倉司下之郡佐時時督促處處舉行若縣道視為常程保甲不加檢舉别委官属察探以聞慢令之人必罰無赦如此則水利常足農田無虞抑臣又嘗以所聞質之鄉俗皆言堨不可增塘尚可益但開塘費重難以責民莫若刷在官之田或買民家之産多興陂塘之利用濟無力之家官吏為之防閑嵗時加之濬治或遇旱涸放令流通誠大恵也臣偶閱故牘見曩年績溪知縣王柟買田一百五十餘畆開塘六十八所夫縣尚能為何以州反不能為乎伏望朝廷采臣所奏行下本路常平司盡刷沒官田産以充開塘之用臣亦當節縮浮費以助興脩之工後人繼之有志民事又将陸續必可有成於朝廷無分毫費用之憂於民間有世世無窮之利顧不韙歟惟聖慈開納幸甚一臣竊證本州從来多有火災雖間出於意慮之所不及然由人事有所未盡臣自到官以来首以是為急務嚴保甲圖籍則擇防虞官正副八人皆鄉之所推重者総之脩四隅火備則官多置噐用且令各自為備而日命兵隅官察之置潜火軍卒則籍定姓名毎旬畨上且給官錢犒之凡此特瑣瑣常行者耳惟是依山為郡號為産木之鄉未聞邃宇髙堂盡是竹籬茅舎融風一扇煨燼無餘雖屢挻災莫知改轍臣曲加曉譬幸其樂從然慮貧弱之徒不堪營造之費官給錢本鳩集陶工開其借貸之門寛其責償之限今則棟甍相接氣象一新似可弭患於未形豈徒救災於已著雖然猶未也有所謂至大至急之務衆人皆以為不可緩者惟魚梁乎此梁面挹紫陽山隂陽家曰山之在前者既有崔嵬崒嵂之勢則水之映山者當有淵渟演迤之形清輝相含則欝攸退避雖一家之學不足深泥然五行之理亦信有之向来草創之初未遑經久之慮捍以柵木壅以囊沙偶值久晴猶云可也霖雨暴漲聲吼如雷溪流激湍勢疾如箭則蕩然一空矣臣去嵗捐金錢因舊址重加脩葺頗勝曩時緑波接天澄然無際使常如此寧非大利但隄防不固水勢易陵終非永永之計臣愚以為若欲久而勿壊莫若以石為之夫石之勝於木也人人共曉特不肯為耳一二年来有官守者率多茍且卷官帑以資私藏累巨萬而未厭為公家而作好事拔一毛亦不為豈但石梁一事哉臣鄙陋不善生財粗知節用今来痛減浮費䟎到錢一萬五千緡見今計度工役鑿山取石俟冬間水落之後方可漸次舉行難者曰嵗非豐稔小民嗸嗸冬春之交正宜賑恤奈何興此役以困民臣應之曰是乃所以救民也獨不觀范仲淹之治杭乎皇祐間吳中大饑殍殣枕路仲淹以為歉嵗工價至賤乃令佛廬興土木之役又新倉廒吏舎民之仰食於公私者日數萬人監司劾之仲淹自陳興造之由正欲發有餘之財以恵貧者荒政之施莫此為大是嵗兩浙惟杭民無一流徙前軰講之熟矣今及小歉之時興石梁之役既可以濟貧民於目前又可以貽利澤於悠久誠一舉而兩得也又何憚而不為乎伏乞聖慈允臣所奏施行理宗淳祐八年監察御史兼崇政殿說書陳求魯奏曰本朝仁政有餘而王制未備今之兩稅本大歴之弊法也常賦之入尚為病況預借乎預借一嵗未已也至於再至於三預借三嵗未已也至於四至於五竊聞今之州縣有借淳祐十四年者矣以百畆之家計之罄其永業豈足支數年之借乎操縱出於權宜官吏得以簸弄上下為奸公私俱困臣愚謂今日救弊之策其大端有四焉宜採夏侯泰初併省州郡之議俾縣令得以直逹於朝廷用宋元嘉六年為斷之法俾縣得以究心於撫字法藝祖出朝紳為令之典以重其權遵光武擢卓茂為三公之意以激其氣然後為之正其經界明其版籍約其妄費裁其横斂則預借可革民瘼有瘳矣洪舜俞進故事曰漢髙詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費武帝置初郡十七且以其故俗治毋賦税南陽漢中以徃各以其地比給初郡時時殺吏漢發南方吏卒往誅之費皆仰給大農以均輸調鹽鐵助賦故能贍之然兵所過縣為以訾給毋乏而已不敢言擅賦法矣臣聞人君有愛民之實意而後有及民之實恵漢世詔書出於人主之筆精神心術之微悉於詔見之觀髙帝欲省賦甚之詔簡嚴明白繼之文帝振貸減租之語勤勤懇懇其愛民實意皆可以對越天地安有不被其澤者漢賦有三口賦以食天子算賦以治庫兵車馬更賦以給戌邉此詔所欲省當是之時又有獻賦郡國假獻為名重賦以為民害故亟欲省之方楚漢之争未決則初為算賦及天下既定則欲省獻賦以此見傷財害民無如兵費之重兵費百出而欲行愛民之政盖難然愛民之意不可以兵而間斷也武帝元狩之詔謂君者心也民猶支體支體傷則心􅉃怛非無愛民之意而好大喜功移之臣嘗考司馬遷平準書其論常取財贍兵本末凡十餘節一節害深於一節曰江淮之間蕭然矣曰廢格沮誹窮治之獄用矣曰三人言利析秋毫矣曰吏道益雜而多賈人矣曰稍稍置均輸通貨物矣曰無慮皆鑄金錢矣曰公卿大夫多諂䛕取容矣曰楊可告緍令縱矣曰縣官有鹽鐵緍錢之故用益饒矣曰株送徒入財得補郎郎選衰矣而終至於曰不敢言擅賦法矣而極髙帝欲為民省賦帝乃聽吏擅取非經常之賦夫豈不知有民哉置郡方新顒顒待哺恐廢前功惟求趣辦雖欲禁吏之不擅賦不可得也益口賦三十輪臺悔之猶幸此意不絶如綫而仁義之澤未至於遽斬此所以夀四百年之脉歟牟濴上奏曰臣既以正人心之說為陛下告矣螻蟻微忱有不能自己者竊謂今天下根本在東南東南根本在百姓根本所在不可不加之意也臣伏見天禧初王旦為相薛奎為江淮發運旦告之曰東南民力竭矣張士遜為江西轉運旦又告之曰朝廷𣙜利至矣方是時天下全盛斯民日在海涵春育中民力必不至於甚也而旦之言讀之使人凛凛以今視昔為何如時而可不深長思乎盖自西北有變而事事仰給於東南以江淮之兵移戌天下之半而兵力分以東南之財供給西北調度而民力困往時謂主兵者不恤民今之牧民者亦且不留意於民矣貪暴之臣苛取横斂以飽其欲而民生無一日蘇聚斂之臣剥膚瀝體以媒其身而利源無一孔遺矣虎豹窟於麑場豺狼乳於春囿而陛下之赤子始無所告訴矣民根本也民貧矣雖欲藏富於國不可得也故馬周奏䟽貞觀間謂有天下者不在積蓄之多少惟百姓之苦樂今嵗事不至甚歉而田里不免愁歎之聲賦入自有定額而郡縣率多急迫之態聖主以視民如傷為心大臣以思斯民為念而澤不下流情不上逹非有司之責耶民不畏死不可懼以禍民不樂生不可勸以善臣恐數年之間或有水旱凶荒之變壮者不散而之四方則聚而為盜賊矣雖有田疇無人耕種國賦安所從出軍粮安所仰給耶天下事未至豫言固嘗為虗及其已至又無所及臣願陛下亟詔二三大臣講求裕民之策務力行於實政不但付之空言官吏之害民者去之政令之不便於民者改之有能為國家牧飬小民愛䕶邦本者則璽書褒嘉之擢用之庶幾寬一分則民受一分之賜平居無事民知有生之樂日有尊君親上之心可殺可辱而不可與為不善則何畏乎夷狄何憂乎盜賊哉書曰民惟邦本本固邦寧惟陛下留神李鳴復上奏曰臣竊見會稽為郡賦重而民貧以和買一色言之其為額當一路之半雖淳熈特與之蠲減紹熈併與之均科而民之困於供輸仍在也此無它其為額太重故也袓宗時貨輕而錢重錢之在官者先期而給絹之在民者易嵗而輸官既與民相資民亦樂為官市是之謂和買時異事變名存實亡價值弗償鑿空科取無復有所謂買矣送輸少緩鞭捶即加無復有所謂和矣重以物價翔踴視昔何啻數倍官但督迫民惟怨咨嘉定庚辰朝廷将累嵗實催之數按為定額一半理估行之十四載民力稍寛端平初元復催正色二年仍行理估三年又催正色今以侍郎趙與懽申請将列郡和買一體施行難乎其為辭矣然尚有可得而言者朝廷之待會稽不當與諸郡等也永安陵寝弓劒藏焉嵗時之祭饗程度有常使命往来項背相望它郡有之乎其不同一也南陽帝鄉近属居焉田連阡陌有司不敢問勢傾閭里庶民不敢較它郡有之乎其不同二也會稽有它郡所無之盛美宜得它郡所無之䕃覆今乃有它郡所無之搔擾而又負它郡所無之供輸為民父母獨不當為之動心乎臣自到官以来士夫之論議民庶之陳請莫不皆以和買重困為言臣伏而思之置而弗問則傷民行而太寬則傷國今不敢乞如淳熈之減額得如嘉定之一半理估足矣或曰放行一郡則援例而起者将何以拒之是不然會稽之特加優恤以其為額太重也以其有陵寝在也以其為毓聖之地也無是三者而輙以例言何例之可援乎淳熈十六年詔於紹興府和買絹内特減四萬四千二百八十四匹不聞它郡援例也鑑湖古未有租今變為湖田輸於大農者六萬此會稽額外之産也朝廷獨知取而不知予乎欲望陛下特出睿斷将紹興府和買絹一項仍照嘉定十三年體例一半理估施行使怨咨之氣消歌頌之聲作如是則祖宗在天之靈亦必懽忻恱懌矣此實祈天永命之一非但為一郡設也貼黄臣伏見紹興府和買為額既重故人之避重就輕其弊有三稅户為詭名寺觀徼倖請免鹽亭戸廣行包占詭名之弊理當歸併但此名一出則利未見而害先焉為守令者只當於割受之際争訟之頃随事討究不為歸併之名而俾有歸併之實此最為得也若寺觀之請免自有正條鹽亭户之包占各有元額倘䝉朝廷特賜行下使之按條施行依額考覈則此重彼輕之患庶乎其革矣上有一半理估之令下無偏重不均之勢民其少瘳乎伏乞睿照度宗咸淳八年起居舎人髙斯得進故事曰漢文帝十二年詔曰道民之路在於務本今嵗一不登民有饑色是從事焉尚寡而吏未加務也吾農民甚苦而吏莫之省何以勸焉其賜今年租稅之半臣聞為國之本在於厚民厚民之本在於擇吏吏不得人則惟務肥已以瘠民而國之根本蹷矣成周盛時自鄉大夫以至比閭族黨之長皆良吏也故其民生而不傷厚而不困八百年之基業鞏固而長久不亦宜乎三代而下惟漢文帝最為有志於民然無他道惟擇吏焉而已班固傳循吏以文帝時河南守吴公蜀守文翁為稱首謂其亷平而民從化則吏道固以亷為本也盖亷吏寡欲易足必無苛征暴斂槌膚剥髄之事然以文帝之留意若此吏猶有怠忽而不承命者故十二年之詔責其不加務於民又謂農民甚苦而吏莫之省是必竭民膏血以自豐殖者故賜租稅之半以振贍之其意可見臣觀漢唐而後孳孳民事以擇吏為先者莫如我朝孝宗皇帝無日不申飭大臣使之遴選郡守郡守姓名皆掲之御屏朝夕覽閱其有貪刻害民者往往不待内外憲臣劾治徑以御筆罷去而於水旱凶荒之嵗尤加意焉其有於災傷之際不恤民瘼賦斂刻暴者率皆不貸重者至於追停是以乾淳之際民物殷阜田里熈和而無歎息愁恨之心可謂盛矣臣竊見今嵗穡人成功之時淫雨彌旬妨於農收二浙水潦瀰漫為害尤深陛下哀閔元元申嚴受納斛面之禁而於公田民田之租皆有蠲除聖恩所被孰不感戴然吏多不良苛取故態曽不悛改而浙右輔藩尤甚平江倪普盖自八九月間禾方冒沒於水腐爛於泥百姓嗸嗸無所告訴之時固已下令督趣稅租急於星火且市斛之大倍於文思往往市斛之三乃可納文思之一是五倍取於民也往往以資賂遺以規進取如民命何臣願陛下嚴敕監司使之督察其有朘民以自肥者必罰無赦毋使肆其貪暴賊吾赤子精選慈恵豈弟之人以一洗其汚憔悴虐政之民庶其有瘳乎金宣宗貞祐四年尚書左丞胥鼎上言曰河東兵革之餘疲民稍復然丁壯既少莫能耕稼重以亢旱蝗螟而餽餉所須横斜頗急貧無依者俱已乏食富戸宿藏亦為盜發盖絶無而僅有焉其憔悴亦已甚矣有司宜奉朝廷徳意以謀安集而路州帥府遣官於遼沁諸郡搜括餘粟懸重賞誘人告訐州縣憚帥府鞭箠械繋所在騷然甚可憐憫今大兵既去惟宜汰冗兵省浮費招集流亡勸督農事彼不是務而使瘡痍之民重罹兹苦是兵未来而先自弊也願朝廷亟止之如經費果缺以恩例勸民入粟不猶愈於强括乎又言霍州囬牛鳳棲嶺諸阸戌卒幾四千今兵既去而農事方興臣乞量㽞偵候餘悉遣歸有警復徵既休民力且省縣官萬一兵来亦足禦遏舉一事而獲二利臣敢以是為請詔趨行之又言河東兩路農民寖少而兵戌益多是以毎嵗粮儲常苦不繼臣竊見潞州元帥府雖設鬻爵恩例然條目至少未盡勸誘之術故進獻者無幾宜増益其條如中都時仍許各路宣撫司俱得發賣庶幾多獲貯儲以濟不給貞祐中朝廷徙河北軍戸河南宰職議給以田太常丞石抹世勣上言曰荒閒之田及牧馬地其始耕墾費刀當倍一嵗斷不能熟若奪民素蒔者與之則民将失所且啓不和之端況軍戸率無耕牛雖或有之而廪給未敢遽減彼既南来所捐田宅為人所有一旦北歸能無争奪切謂宜令軍戸分人歸守本業收其晚禾至春復還為固守計會侍御史劉元規亦言給田不便上大悟乃罷之興定二年二月資徳大夫兼三司使尚書右丞侯摯上言山東河北數罹兵亂遺民嗸嗸實可哀卹近朝廷遣官分往撫輯其恵大矣然臣忝預執政敢請繼行以宣布國家徳信使疲瘵者得以少蘇是亦圖報之一也宰臣難之無何詔遣摯行省於河北兼行三司安撫事既行又上言曰臣近歴黄陵崗南岸多有貧乏老㓜自陳本河北農民因敵驚擾故南遷以避今欲復歸本土及春耕種而河禁邀阻臣謂河禁本以防閑自北来者耳此乃由南而往安所容奸乞令有司驗實放渡元世祖在潜邸時召真定府經歴官張徳輝問農家作勞何衣食之不贍徳輝對曰農桑天下之本衣食之所從出者也男耕女織終嵗勤苦擇其精者輸之官餘麄惡者将以仰事俯育而親民之吏復横斂以盡之則民鮮有不凍餒者矣又問典兵與宰民者為害孰甚對曰軍無紀律縱使殘暴害固非輕若宰民者頭會箕斂以毒天下使祖宗之民如蹈水火為害尤甚世祖黙然曰然則奈何對曰莫若更遣族人之賢如琨布哈者使掌兵權勲舊則如歡托和者使主民政若此則天下均受賜矣世祖時趙天麟上策曰臣聞南風之君揮五弦以宣阜財之意征伐之主封丞相以為富民之侯一則體道而居常一則知非而悔過故得黎庶若趂羶之蟻往往謳歌子孫如在天之龍昻昻振聳此盖愛民之效也夫常人之𩔖曲盡施仁況於少而無父之孤老而無子之獨老而無妻之鰥老而無夫之寡此四者天民之窮而無告者王制垂文皆有常餼禮也勾踐之給食小白之遺衣帝堯之不虐孝文之收恤覇王之道何莫由斯國家甲子年間詔條内一欵節該鰥寡孤獨不自存者給降贍濟口粮有疾病命官醫調治其藥物恵民局支給今又詔加米絹盖博施之仁濟衆之聖其揆一也臣竊以聖人之心甚重而在下者不能承宣故猶或未之盡也下民之困情理多端今略具民之無告者四條惟陛下察之乃有譙樓戌壘邉塞它鄉俯一介之微軀趂諸軍之大役雲蒸霧湧殺氣森森月冷霜淒憂心悄悄或遭疫癘或值傷亡感白日以沈光掩黄沙而抱痛此其困者一也又有家寒刀弱徭役煩多官吏督責於前債主追徴於後跼天蹐地無計安身愁氣上騰灾異屢降或自甘於縊刺或轉死於它方望桑梓以長辭恨終天之不再此其困者二也又有瘖聾跛躃斷者侏儒六親無依倚之人元后所以矜憐之者倘遇正官亷吏尚承優恤之文如其暴吏濫官孰啓眼青之顧已辜丹詔還謁朱門或輾轉之弗能向溝渠而委命此其困者三也又有梟獍其心性馬牛而襟裾或當家窘之時或值年饑之際曳鶉衣之簌簌啖藜藿以孜孜恒産既無良心盡滅東西南北輕遺父母以逋逃冬夏晨昏但見老羸之啼泣霜風易至日月難延罔極之恩恍然猶夢加之以王事靡寧戸籍常存将如何哉維其瘁矣此其困者四也其餘冗事難以具陳若此之𩔖皆國家之當憂者也伏望陛下寬父母之慈心拯生靈之困苦凡軍戎之病者命有司随處以醫士治之凡軍役之後亡卒遺骸聚於一所命大将軍以下具三牲之禮以祭之庶幾下民知恩意之深抑亦在上盡當行之理也凡廢疾而無依倚者在不得自存之例所在官司不承化周贍者以違制論凡民之父母年及六十以上及年雖未至六十而有疾者子孫弟姪不許逺離離者以不孝弟之罪罪之如已有人飬育不得已而逺離者聽然後慎名器以建官考幽明以核實均賦役以立法務農桑以敦本課義倉以賑灾先文化以易俗禁奢侈以壯財薄差税以優民若然則無告者十可絶其九矣其餘遵前詔而行之雖欲見困窮之人亦不可得也英宗至治中幸五臺右丞相拜珠奏曰自古帝王得天下以得民心為本失其心則失天下錢榖民之膏血多取則民困而國危薄斂則民足而國安帝曰卿言甚善朕思之民為重君為輕國非民将何以為君今理民之事卿等當熟慮而慎行之歴代名臣奏議卷一百九
