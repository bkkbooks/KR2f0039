body:
  text: 歷代名臣奏議卷二百二十五明楊士竒等撰宿衛唐太宗時有請秦府舊兵入宿衛上曰朕以天下為家不能私於一物唯有才行是任豈以新舊為差兵猶火也弗戢將自焚此意非益理髙宗嘗曰王者無外何為守禦而重門擊析庸待不虞邪我嘗疑秦法為寬荆軻匹夫耳七首竊發羣臣皆荷㦸侍莫敢拒豈非習慢使然郝處俊對曰此乃法急耳秦法輒升殿者夷三族人皆懼族安有敢拒邪魏曹撡著令曰京城有變九卿各守其府後嚴才亂與徒數十人攻左掖門操登銅爵臺望之無敢救者時王修為奉常聞變召車騎未至領官屬步至宫門操曰彼來者必王修乎此由修察變識幾故冒法赴難向若拘常則遂成祻矣故王者設法不可急亦不可慢詩曰不懈于位人之攸塈仁也式遏寇虐無俾作慝刑也書曰髙明柔克沉潛剛克中道也帝曰善德宗立段秀實上言曰臣聞天子曰萬乘諸侯曰千乘大夫曰百乘蓋以大制小以十制一也尊君卑臣强幹弱枝之義在於此矣今外有不廷之虜內有梗命之臣竊觀禁兵不精其數全少卒有患難將何以待之且猛虎所以百獸畏者為爪牙也若去其爪牙則犬彘馬牛皆能為敵伏願少用聖慮冀禆萬一帝不用及涇卒亂召神䇿六軍無一人至者世多其謀宋仁宗慶歷元年知諫院張方平論京師衛兵單寡上疏曰臣伏以京師本古之陳留郡天下四衝八達之地自唐室以前嘗為重藩五代朱溫始封梁王後因其宫府定而為都五姓相承共十一帝四十九年亂亡之速自古無有抑由都城四向無險阻之形藩籬之固逼近戎狄方鎮握强兵于外乘禁衛之虛弱本末倒置也國朝太祖皇帝深慮安危之計始削諸節度之權屯兵于內連營畿甸又修治西京宫室蓋有建都之意然利於汴渠漕挽之便因循重遷先帝通好北戎即叙西戎爾時可以減戌消兵致生民於富厚矣太平三十年使軍士坐費倉庫以困天下非不深思逺謀也知祖宗本意依重兵而為國勢不可去也近昊賊犯邉漸發禁兵西屯四路在京軍旅所留無幾今又北敵事釁已萌兩敵合從人心搖動外有武帥分總兵而宿衛之師日益單寡尾大不掉根虛必搖勢之當然不可忽也願留聖慮為社稷計京都宜常宿重兵以封殖根本且乞勘㑹見在指揮人數若果缺少請從內出金帛召募材力訓齊教練必須精鋭以充禁衛無更外屯夫猛虎所以百獸伏者以其爪牙利也若虎而去其爪牙則犬豕鹿麋皆可以相狎兵衛者國之爪牙也足兵足食乃可以威服四方彈壓姦亂也四年方平奏乞擇人分總禁衛狀曰臣伏見昨差出許懷德後馬步軍皆闕都帥遂自環慶路抽回殿前都虞候王元令權幹當步軍司公事其王元又已年老衰病至于總司軍政亦恐精力不逮竊以殿前馬步軍逐司公事不少非唯率宿衛務要齊整亦須諳熟軍制稍通吏用太宗朝侍衛都虞候以上常置十員職位相亞易於遷改且使軍伍素相服習邉藩緩急亦得選用先朝時馬步軍嘗闕帥殿前都指揮使髙瓊頗知軍中舊事上言及此先帝甚然之今內則禁兵寖驕極須彈壓外則邉患不測常資防備李昭亮王元恐未任專幹心膂除郭承祐好進多事纍被彈奏不堪入典禁軍外乞於以次管軍將校中擇取一兩人赴闕分總禁衛左右扈翼於體為便八年侍御史知雜事何郯奏曰臣伏聞禁中自盜發以來逐月分布內臣坐甲宿直以至伐木坼屋繕修垣墻增置關鍵其於備豫之方固亦甚至然臣以事體酌之恐為陛下計者誤也夫體有尊卑事有小大尊者繫於君卑者繫於臣君而尸小事則失所稱臣而專大名則非所宜以人君之舉所務必博大所謀必經逺崇位號以習民之奉修政刑以防民之踰不廢禮以杜僭逼之萌必行法以除暴亂之本使邇莫敢犯逺莫敢陵如此則等威辨而上下無邪心然後知天子之所以尊也今夫衛士生變事出非意皆由朝廷恩過而不知感官司令寬而不能禁也為今之宜其在一震威怒以示誅罰正大法以絶其慢舉大刑以討其姦斥邪僞附下之類先絶其萌芽究賊亂犯上之徒務去其根本不恕無良而與衆棄不漏有罪而示之公法令既行紀綱既正以此御下孰敢不䖍雖不增宫闈之警而其備修不加省户之衛而其守固與夫區區從細末之事者不同年而語矣臣況聞陛下從頃年來過自警戒中宫之樂工已盡罷後苑之獵具已盡除其於謹天戒以飭聖躬雖詩書所稱遇灾修德之君逺不能逮然於禁防之設所舉者近而所忽者逺所謹者小而所遺者大臣竊惑焉伏乞聖慈以臣愚言命公卿大夫當廷公議一舉法令威刑之柄以除邪僞賊亂之階庶主威益尊國命益振內患既弭外虞自除則天下幸甚郯又論衛士之變乞黜責皇城司及當直臣寮疏曰臣等伏聞今月十八日夜崇政殿前宿直皇城司親事官四人毆打人員至死并劫取庫兵緣上殿屋驚動御寢其罪人除捉獲及傷死外餘黨二人二十日捕獲之時稱被衆人爭奪致死捉獲一名雖勘斷訖所有當職臣寮或聞已傳宣釋放傳之中外頗駭羣聽伏緣殿廷所置宿衛本為人主預備非常今衛士自生變故所為凶悖意不可測兼後來所獲餘黨走人最為要害仍聞纍傳聖㫖令未得殺死而全不依禀蓋是本管臣寮見捕獲之後勘鞫得情理深切所以容縱手下衆人毆死以圖滅口欲輕失職之罪情狀如此理無可恕太祖皇帝朝酒坊火發本處兵士因便作過太祖皇帝以本坊使副田處巖等不能部轄並處極法令乘輿咫尺賊亂竊發凶惡之狀無大於此而居職者既不能察舉當宿者又不即擒捕未正典刑何塞公議深恐朝廷威令從此寬弛伏乞斷自聖意特降指揮將應係幹當皇城司及當夜宿直臣寮並等第重行黜降用振威罰所貴禁近之司不敢曠慢郯又論衛士之變乞責降楊懷敏疏曰臣等兩次上殿面奏及具劄子奏狀論列乞重行黜降幹當皇城司并前月十八日夜內直宿臣寮已施行外惟楊懷敏獨䝉寬宥尋奉中書召臣等傳諭聖㫖兼不以臣等所言煩黷曲加詔諭足以見聖明開納之量寬臣下進越之罪固宜退伏以聽命安可更頻干聰明自取罪戾然臣等以國體人情酌之不可便已須當復陳夫人主所以享有天下之重蓋由法令等級明辨使人不敢陵犯然後極其尊爾故法令行則朝廷以之强法令偏則紀綱以之紊自昔治亂雖殊莫不由此階也至於宫闈之變下人輒敢謀亂者前代間或有之皆由人君失德所致且陛下仁厚之德撫恤禁旅未嘗以喜怒妄行刑誅雖甚無識寧不愛戴今衛士持刃直入禁庭欲陵犯乘輿是匹夫而有窺伺之意皆由有司不舉職法令寬縱所生也為大臣之計宜為陛下深責有司失舉之罪用行法令如楊景宗等並當誅戮以謝天下若以其過非自取止可貸其正坐並宜流竄以戒不職今楊景宗等既以輕罰楊懷敏獨又聊行降黜蓋兩府大臣以陛下左右之人不能堅執祖宗之法以避怨怒若當賊發之際懷敏能指揮衆人於後殿即時捕獲以此論功乃可贖罪今賊已入禁庭兩夕之間陛下被此震懼固亦甚矣懷敏縱有先報之效其可贖失察之罪乎且以人主之尊一寬懷敏罪固亦細事茍於事體無傷臣等何必苦更論列所惜者朝廷典法無逺近無親踈當一而行之乃允衆望況有司失察之罪無大於此其可貸乎太祖皇帝朝元舅杜審肇知澶淵只坐界內河決免官歸私第太宗皇帝朝楚王宫火災廢楚王元佐為庶人以懷敏職在近侍孰與元舅諸王之親以懷敏失察賊亂孰與誤河決火焚之備利害大小較然可知而審肇元佐重責如彼懷敏之寬假如此伏望陛下舉祖宗之法以塞公議正左右之罰以示無私不惜一懷敏慰中外臣子之望則天下幸甚臣等論列此事今已數四在於言責固亦無負然喋喋未已者蓋忠義之心不勝感憤兹事體大若遂不言恐於聖德無益由臣等之罪也兼臣今日上殿再有奏陳已䝉聖㫖開允伏乞速賜施行吳奎為監京東排岸司論衛士之變乞責降楊懷敏疏曰臣竊見自行春令以來連隂不解此洪範傳所謂皇之不極時則下人有伐上者令衛士之變起於肘腋賴宗廟神靈陛下仁聖即時擒獲然流聞四方驚駭羣聽不祥之甚也傳稱主憂臣辱陛下此日可謂憂矣未知任其辱者果何人邪臣聞幹當皇城司六人其五已被謫獨懷敏尚留外人咸謂陛下私近幸而屈公法臣竊為陛下痛惜之况中外傳聞獲賊之際陛下宣令勿殺而左右輒殺之裂其肢體此必有同謀者恐事露泄而殺之以滅口不然何以不奉詔也皇祐元年知諫院錢彥逺論步直兵士作過上奏曰臣風聞嘉慶院見制勘軍頭司步直兵士等擬欲作過及於皇城內搜獲先埋藏器仗者竊以軍頭司在崇政殿橫門之南與軍器庫相連最為近密其兵士日逐隨本司臣寮出入甚熟而敢興意外幸賴宗廟威靈先事敗露今已下獄推劾臣慮其人等凶黨結連人數衆多或自來通行飲食之人心內自疑别生他變所繫極大伏望聖慈特降指揮令制勘院先且疾速根䆒枝黨如有姓名畫時追捕入院并器仗所埋藏經歷地分人員節級數目立具奏聞使中外聞之所貴禁衛安貼凶黨盡去貼黃臣近曽以連隂奏密狀伏乞嚴賜指揮宿衛謹選左右䙝御小人以深遏惡原今來兵卒等果有連結欲乞更賜指揮宿衛禁門倍加嚴整彥逺又奏第三狀曰臣等風聞制勘院見勘軍頭司步直兵士擬欲作過事雖一時狂妄之謀然迹其造惡本心為人臣者所共切齒況兵刃之屬已藏在皇城門幸賴祖宗威靈上天豫垂變戒故先事敗露倘因循未彰驚屬車之清塵臣謂雖赤其族不可塞責今既下獄推劾緣所繫至大頗搖人心傳聞四方震駭物聽姦豪小人從而扇惑故根究枝黨必須盡具案行罰不可緩不盡則他變生少緩則妄意起且昨來殿中親事官作過之時法稍寬捨推索凶黨不盡故此輩忲習乃復有此結連益大于前今若復用輕典臣慮後來之虞寒心疾首伏望聖慈以祖宗社稷自重不用一時恩貸特降指揮令制勘院疾速推䆒元謀頭首及枝黨等急行圓結公案申奏其應作過人並乞族誅於都市以示四方庶小人少戒建威消萌在此舉矣兹事尤不可緩望特留聖意貼黃其兵刃經歷門户埋藏地分親事官長行人員及監門內臣乞早令制勘院先具當日人數姓名申奏乞更不令宿衛免别生他事其人據唐漢之法皆合誅戮今來乞並行決配逺惡州軍庶中外整肅願以昨來親事官法寬為戒彥逺又奏第四狀曰臣伏以王者任宗廟社稷之尊身繫天下安危故必嚴宿衛盛宫室重門復道以謹他虞是以法至重禁至密蓋將遏絶亂源防微杜漸深計逺慮而為祖宗社稷之本也故唐太尉長孫無忌誤帶刀至上閣而監門校尉不覺察有司處以死刑我太祖皇帝嘗以內酒坊在厚載門外逼近宫掖而中夜遺火凡自監官至工匠斬五十餘人訖太祖一朝內中無遺火者此法行刑重而人畏古今之成效今風聞制勘院勘得懷器刃入皇城人姓名應門户地分干繫親事官人員節級將欲斷遣初緣所懷器刃已入皇城雖其人結連虛實未辨而門衛地分晏然不知則國家以重糧溫衣養之何用本以禦捍意外而耳目之前上下公然畏避權勢輕弛法禁不行幾察況昨來內中親事官作過之時由斷遣稍輕是致小人慣習復有此事不輕上繫宗廟社稷豈得復惜此數十兵卒而不思後患伏望聖慈察安危本末應制勘院所勘到不覺察懷刃入皇城把門及地分親事官人員兵級等乞不以常法斷遣其本處正管門户地分兵級並乞刺配沙門島其餘干繫人員兵級並乞刺配廣南逺惡州軍所貴臣子益勵忠孝之心使小人自此戒懼彥逺又奏第七狀曰臣等今月二日准宰執請赴中書奉傳聖意以皇城軍頭司臣寮行遣並依法者伏以法者緣人情而生較其大㫖止欲防微杜漸禁民為非尊君卑臣歸于至正然有情重法輕情輕法重者故酌重輕而處刑柄在人君專之非所司可得而議是以兩漢有決事比若今之用例本朝斷罪有敕㫖所以壓天下公議戒小人妄意而今來宿衛下卒挾刃直入禁門雖其謀别有所在緣去便殿內閣才百十步藏之纍日上下一無覺察此為人臣者所當共怒安可本司官屬過止罰金而云法當然爾甚失天下之望且昨來親事官作過之時由用法太寬牽於權幸人情不塞羣小人無所戒懼遂致小人復思遂其狂計交㦸之衛行若坦途事既暴露方貸以寬典誠陛下至仁至聖欲全羣臣奈宗廟社稷之重天下臣子之心何謹案尚書云威克厥愛允濟愛克厥威允罔功說者謂威刑能克勝所愛近則人懼而事可濟辦若威刑而為愛近所惑則人怠而事無成功此聖人明訓治國家大要是豈樂用嚴酷哉蓋所慮者逺今若以近臣而輕其罰恐非威克之道臣慮今之議論謂此事與親事官作過時不同言彼則挾刃踰屋此唯埋藏意在誣告他人不當為例甚不然也且王者設門禁列宿衛重其刑嚴其制者先慮其事也必若俟挾刃踰屋而後罰無所濟也且刃已入門則蕭墻之內其憂不細安得忽略後患而徇一時之談臣等忠義憤發外採公議咸以為未當故不避再三上瀆天聽人臣之節死而後已伏望陛下覽尚書威克之義思祖宗社稷之重以親事官作過時罰輕為戒其皇城軍頭司臣寮並依臣等前後纍狀重行黜責所貴厭快人情允協公議貼黃宿衛之制唯門禁最重蓋以出入所自今刃已入而云未曽作過故用輕典且門禁之失唯論入與未入豈繫作過與不作過者乎且國朝自祖宗以來凡用法皆有司鋪條臨時敕㫖裁輕重而斷遣故有特勒停者衝替者未得與差遣者就移監當者此皆法外行罰豈可有如此事而本司臣寮並止依輕法也至和元年殿中侍御史馬遵論皇門禁上奏曰臣聞古者常刑宥過無大至臣子之於君父則義有所不容故舟船飲食之類有不如法皆不稱誤所以許世子止躬不嘗藥春秋加大惡之名唐長孫無忌入不解刀校尉被誅死之議所責者重所慮者深杜慢隙而消禍萌理當然也嘗聞太祖朝內酒坊火監官守卒並從極斷豈徒峻法蓋欲防患竊見朝廷法令素具皇城門禁尤為謹嚴而挾刀闌入頻年有之雖常行遣終不戒懼今麥昭吉被入直中有劒器歷諸門抵便殿曽無撿察略不覺悟若姦盜包藏而為之何由而露哉公謾憲禁無甚於此今昭吉雖已具獄而諸門監官守卒未聞處置伏乞陛下察詳事理特出聖斷常法之外更賜重行用謹大防庶弭來患遵又論內東門使臣藏挾女口闌入禁庭狀奏曰臣聞內東門使臣於車子內藏挾女口闌入禁庭事已彰露未聞行遣竊緣東門密近御所最是要切隄防之地著籍出入素有條憲用親近使臣監掌務在謹嚴至敢公然自犯輒入外人若置而不問則啓釁容奸必兆於今日伏乞聖斷指揮付外所司根勘重行朝典所貴戒厲後人杜絶來患遵又奏曰臣近曽彈奏內東門使臣輒以女口闌入禁庭至今數日未聞處分竊緣宫門出入條約具存峻為之防猶懼不肅而監掌之人公然自犯法之不容自近者始而天下之所公也陛下聖明必不私於小臣而屈天下之法或慮所司未禀宸斷使中外之議日益喧然所損不細伏乞聖㫖早賜施行嘉祐五年殿中侍御史吕誨論公主非時入宫上奏曰臣聞近日兖國公主深夜出入宫禁內外驚駭罔知其繇竊以宫鑰謹嚴以時啓閉蓋備非常況公主起居覲省既非其時守閽之吏輒敢通奏此而不禁後將為常一有竊發何以備禦斯不可不為之深慮也所有公主宅秖應使臣及皇城司應經歷門户管幹人伏乞朝廷取勘重行責降以肅禁衛之事左正言王陶論公主非時入宫上奏曰臣伏以周禮閽人掌宫門之禁時其啓閉寺人掌女宫之令糾其出入以謹嚴周衛杜絶非常故漢光武出獵夜還上東門候郅惲拒關不納光武從中東門入明日賞郅惲而貶中東門候魏武之子臨淄侯植開司馬門晝出魏武怒公車令坐死然則公主夜歸未辨真僞輒便通奏開門納之直徹禁中略無譏防其所歷皇城宫殿內外監門使臣請並送開封府勘劾神宗立以胡宗愈同知諫院內卒盜皇城器物宗愈言唐長孫無忌不解佩刀入東上閣門校尉論當死今禁卒為盜而入內都知不能覺察願正其罪殿帥直廬在長慶門內久而自置𨽻圉宗愈曰嚴禁旅所以杜姦宄也奈何令私人得為之萬一凶黠者竄名其間將不可悔請易募老卒神宗時宫邸教授吕大鈞論選小臣宿衛奏曰古者人主左右前後使令執事之小臣乃所以朝夕起居出入不可須臾離者也其用之迹雖主於給宿衛備頥指以共綴衣虎賁執射執馭之職其用之意則亦使之獻可替否拾遺補闕以贊疑丞保傅之事主於給宿衛備使令則非恪勤謹重者不可以當其任使之獻可替否拾遺補闕則非開爽敏茂者不足以充其位此言猶未之盡古之人君不獨有師有友又有受教於我者焉故疾醫小藝者也黃帝師岐伯而教雷公費國小邦也惠公友顔般而役長息然則使令執事之小臣雖在擇恪勤謹重開爽敏茂之資人主又當教誨養育使成就其材以補異時公卿大夫之闕如此則朝廷常不乏材而人主求之且不勞也以漢唐之茍簡其名臣猶多出於宿衛供奉之官豈非常在宫省日侍帷幄既已接聞廟堂之議以廣其知識間復親被德音誨其所未至則益知善惡向背之理薰炙漸漬久而不已安有不化者哉不徒其效如此又可以自廣其聰明之德記曰教學相長也又曰教然後知困彼既知向背則必盡其心力以承學於上上之人既樂其自勉亦不盡以教之或因其善問有以起吾志或因其難進有以勉吾業傳曰教不倦仁也又曰有教無類則不徒可以益吾之志業又可以廣吾之德性也記曰善教者知至學之難易又知其美惡則不徒廣吾之德性又可以廣吾知人之明也為人君而乘政事之間以教育執事之小臣乃有志業德性知人之益豈小補哉今朝廷雖有中書門下兩省官以備侍從又有翰林舍人院及諸館閣之臣以備顧問非乏人也充其選者又皆美材敏行非不賢也既以待之不為綴衣虎賁射馭之冗亦難復使從使令執事之賤似宜略依漢制郡國貢士給宿衛之法詔公卿牧守如孔門四科之目各使保任三二人不以仕與未仕限年二十以上三十以下其人則分𨽻中書門下省學士舍人院及館閣諸司其職則參諸殿侍諸班之列其祿秩則視三班使臣州縣掾屬而已其閒暇則各受學於其官長退而以所學開諭其同列仍不立遷擢廢置之格其有功罪善惡一聽明主裁決而已如此則素無行能者必不得舉不安其分者必不願為自非朴茂有志之士不可得而與焉試或行之不過五七年不徒得髙才美行可備器使亦將資助盛德大業必將日新而無窮凡在位執事之小臣亦當漸摩義理之益相觀而善可不務乎髙宗時張浚議撫恤侍衛之人上言曰臣嘗謂人君髙拱于一堂之上其於天下百姓內外士卒安能遍撫而盡恤之哉則亦推至誠之心自近以及逺而已今有人於此無故而陵侮毁辱其類則天下識與不識莫不深惡之者此無他人情本於一故也是故推至誠之道以待遇左右爪牙之士則孰不恱服而歸心一人傳之十十人傳之百以千以萬莫不皆然臣願陛下稽祖宗之法撫恤衛士問其疾苦知其嫁娶時其飲食教其事藝使適其中不必拘以常制則天下之凡為將士者莫不知所自勉而樂為陛下用矣胡安國論親兵專掌宿衛上奏曰臣聞自古盛王雖用文德必有親兵專掌宿衛周公指虎賁與常伯同戒于成王欲其知恤虎賁者猶今侍衛親軍也康王初立太保俾齊侯吕伋以虎賁百人迎于南門吕伋者太公望子自諸侯入典親軍猶今殿前馬步軍都帥也勳德世臣總司禁旅虎賁鋭士宿衛王宫其為國家慮深逺矣本朝監觀前代命三衙分掌親軍雖崇寧間舊規猶在及至髙俅以恩得用軍政廢施遂以陵夷陛下嗣承寶位謀國者不思復古親軍寡弱不充宿衛此豈尊君强本消患防微之計也伏望深考藝祖選擇禁旅之法斷自聖裁以修明軍政威服四方上嚴宸極右正言陳淵論衛兵上奏曰臣聞兵以强弱多寡為輕重常使內重而外輕則王室尊而諸夏安矣昔楚漢相距於滎陽京索之間天下之勢如提衡然未知所軒輊也髙帝始得蕭何張良又得陳平猶以為未足又得韓信屬之以數十萬之兵戰勝攻取無不如意然後天下之勢其重在漢項氏已衰漢業未成昔之躡足而封者已據千里之地漢雖滅楚而輕重之勢又變矣故信之王髙帝之所深憂也方髙帝築壇以拜信既委之以諸將之兵矣而髙帝所將之兵猶衆也其分兵多于信所以使之東向以爭天下而於己未能去兵者亦所以制信是以雲夢之㑹信不得遁故嘗謂髙帝曰陛下不善將兵而善將將此信所以為陛下禽也嗚呼此髙帝所以能并一天下而終於無患也歟今自人主不復將兵而諸將在外人提數十萬之師朝廷所資以禦夷狄除寇盜者而進退去就唯其所欲此豈非可慮之事乎而樞密三衙尚仍舊法自相牽制而所蓄之兵益損於舊使其力足以制之猶患所以使之者非其人況强弱多寡相什百耶故臣愚願增其數使與外兵略相當而又去資格私昵之弊搜求傑特取其才智之優於諸將者命以為帥無事則歸宿衛有事則統之以出戰力飽而氣不挫有所不出出則宜無不勝矣如是則人主雖不將兵其與親御六軍何異既以增重朝廷之勢而又使諸將望風知懼艱難之際有所招麾不敢首鼠自營為一身計此亦今日之急務也李彌遜再乞增禁衛上奏曰臣比者屢被聖恩賜對便殿臣嘗一具奏陳兩具劄子乞增禁衛以尊朝廷雖䝉睿眷俞允以臣劄子付樞密院未見如何施行臣聞近日淮南稍有警報若旋行措置恐不及事伏望聖慈先以見有人兵早與增添分定禁衛人數使人心各有所歸或存留楊沂中一軍專充護衛以備緩急不可臨時一例差發出入致令乘輿所臨兵衛單弱别致悮事蓋今日之勢不獨外患可備腹心之間亦當預防利害顯然不敢縷奏昔袁盎有言聖主不乘危不徼幸陛下不可以前日纍冒艱險幸而無虞習為尋常衆人所忽猶不可不慮使其過有關防固亦何害伏乞陛下長慮却顧深察臣言斷自宸衷早賜施行臣冒犯天威至于再三死有餘罪犬馬之誠不勝憂懼激切之至理宗時權禮部尚書魏了翁奏曰臣聞賞以勸善罰以懲惡此古今之通誼也然世固有賞行而人不知勸罰用而人不知懲者且後魏羽林之變胡后不能討而大赦以安之李唐涇卒之變德宗不能討而播遷以避之人孰不咎兩朝之失政而使髙歡結客李懷光襲迹以基危亂豈知國勢積弱人情久玩而欲一旦以法繩之急則生變緩則啓寇蓋無一而可也乃者禁衛之變幾為後魏李唐之失政幸而收之桑榆猶可以暫弭目前之憂然而乘輿所在卒遇震擾環視四顧逺郊近甸無一可恃而徒恃區區賞罰以長保其無他臣恐賞罰有時而窮若不及今追惟舊制思所以相維相制之道固未可恃以為安也臣竊考三衙之制蓋自髙宗皇帝首值苖傅之變繼罹張寶之亂每病禁衛單弱命三衙增修軍政其後又以諸將步騎分𨽻三衙至孝宗皇帝修明稱娖又為護聖一軍以寓隂相維制之意馬步之數通一萬四千七百有竒俾蜀帥選西兵之驍鋭者發至在所以充其數其慮蓋甚逺也馬司暫移建康識者已謂不然其殿步二司之卒時遣戌淮以勞苦之然不過維揚天長六合而已及時而往及時而代不欲久虛宿衛以事邉垂此正周人鄉遂之卒惟以衛王室不以逺屯戍而詩人所謂為王爪牙胡轉于恤凡以强本也至韓托胄開邉始用殿帥郭倪馬帥李汝翼發三衙禁旅與江淮之師有事于宿泗四十餘年驕惰之卒乍罹暑潦怨嗟載道故僅至苻離退保蘄縣縛田俊邁以遺敵而全軍宵遁雖將庸卒懦本無可用然以守衛王居之人而使之長征逺戍則自此始乃至近世習為故常戰者不得返戌者不得更凡邉頭雜役雖殿步二司不得免甚至奪騎司之馬以授北人而驅騎卒以事之執鞭刈草晝夜勞苦夫三衙所以扈衛乘輿也今或荷戈於境外或執役於降虜揆諸事體誠為倒置不寧惟是凡江上諸軍皆非阜陵分𨽻之舊騎司之軍昔戌於滁濠定逺也今移之浮光建康戎司昔戌於安豐廬和也今移之泗水京口戎司昔戍於真揚楚泰髙郵盱眙瓜洲鹽城諸處也今置之新復諸郡池州戎司昔戍於舒蘄巢縣也今置之淮東許浦諸處水軍昔處之近輔所以拱衛行都也今徙之東海自餘荆鄂四川軍分大抵皆非舊戌且將不知士士不識將舍所素習之山川而投之未諳之水土此固兵家之所忌況於舍王居而事疆埸舍舊戌而事新疆此於體統之輕重雖三尺童子皆知其不然矣而士大夫恬不以為怪聞禁衛之亂則第能追咎揀汰之激變復譏賞罰之不明聞徐邳宿亳之敗則第能追咎諸帥之輕舉復譏和好之難恃然以臣愚見咎者譏者皆是也而未得弭變之說臣嘗妄謂苖傅劉正彥之變恃有劉光世韓世忠諸屯列于上流故二凶雖狂愚卒於自遁張寶之變恃有吕頥浩親軍及辛永宗部曲密接旁近故雖以艱難之餘戮十七人而廢其班彼不敢譁今以京師之重獨有殿步二軍而近郡諸屯皆戍極邉殆非防微杜漸之意臣愚謂宜亟循舊制凡沿江沿海之卒置之舊屯而以時戌邉庶幾連營列柵聲勢連亘可以擬緩急之須可以銷姦慝之萌不猶愈於舍近謀逺以生覬覦之心乎王黼童貫既得幽之空城即移舊邉之戌以守新邉一旦女真長驅新邉既弃舊境亦失越關渡河如踐無人之境往監明甚而今之新進少年獨未知懲創乎此新復之郡既未可保而江上之備已為之一空臣愚謂宜亟循阜陵分𨽻之舊宿師於江南而分戌於淮漢庶幾根本先固人心不搖既可以厚重門之守又可以省分劵之費不猶愈於虛內事外以貽一旦倉卒之憂者乎或曰如此則是棄外而事內也藩籬不固如堂奧何曰不然也臣之所言惟欲守阜陵之成規宿師於內郡而移戍於邉城所以固近而懷逺先內而後外非直棄逺而遺外也譬如人之一身腹心潰裂雖四體皆具將安用之況祖宗守邉之規模如淮漢蜀口皆有民兵義旅可以倚仗不專仰三衙江上移戍之軍也臣先事而有言則誠為過計不幸而言中則事已無及惟陛下曲留聖慮與二三大臣謀之如臣言可采即令速見施行歷代名臣奏議卷二百二十五
