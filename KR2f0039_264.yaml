body:
  text: 歷代名臣奏議卷二百六十四眀楊士竒等撰理財宋仁宗時張方平上食貨論曰臣聞食者生民之命貨者百用之權興自古初世所最急神農氏始辨五種為耒耨之利以教天下而民知粒食日中為市致天下之民聚天下之貨立交易之法而世之財用不足黃帝堯舜經土設井授時布政通其變使民不倦而天下之美利備焉禹辨三壤定九賦懋遷有無萬邦作乂周文王在岐制司馬之法建平土之政均土地連什伍以稽其人衆而井牧其田野以物地事授地職而令貢賦稅斂之事蓋古之王者所以制財用之道惟田及山澤為正其百工商賈衡虞之賦以其浮食去本之民猶罰而抑之也自周之衰庶民失職經界隳壞繇役橫作秦知順人心改之可以獲大利故滅廬井而置阡陌急耕戰之賞尊奬兼并猾詐之人棄削王制務為一切深害偷苛之政至始皇二世收大半之賦征戍輸發並起勦絶蒸民之生天下愁怨遂用潰叛漢氏接秦之敝務安百姓約法省禁輕田租十五而稅一量吏祿度官用以賦於民文景躬修儉德節用而愛人四方和平家給人足都鄙廪庾盡滿府庫皆餘財人知自愛而重犯法先行義而愧黜辱及武帝外事四夷內興功作七十年之積未幾而竭盡征戍交起天下共其勞行者齎居者送中外騷擾百姓玩敝以巧法財賂衰耗而不贍入物者補官出貨者除罪而言利商功之臣析毫分銖之士紛然而進矣於是設平糴立均輸起漕運興鹽鐡置爵級制𣙜酤算舟車占貯積又下告緡之令更造皮璧之幣天下蕭然無聊矣以一人侈心之故為生民萬世之患是故聖人尊仁貴義稱嘆儉德以利為賊其意逺哉自兹已還捃摘逾甚損下益上日剝月朘侵刻小民以為忠功南北披攘王澤竭矣在唐初世薄賦寬徭天寶季年國用寖廣邊有立功之將朝有專柄之臣戚里相驕女謁競進故崇禮慎矜韋堅王鉷以聚斂而進實煩有徒為上聚怨為民瘡痏是時承平既久民不願亂而此數人進邪䇿以侵擾之終為厲階以至喪敗逮至德之後兵戈不息調發轉餉百役並作人户凋耗版圖空虛賦斂多門殊科異調計司不能覆諸使諸使不能覆諸州猾吏權臣因緣為市津渡有率堰埭有征廬舍有稅苖稼有斂乃至平率豪姓配取僮馬夫人之常情與則喜奪則怒故先王見其與之形而不見其奪之理然後民可得而有也橫斂雖復利在侵剝猶以抑末遏强為辭唐氏之賦也異哉直取無名曽何異乎劫剽掠奪之也歟昔者眀王之保國也其經費制用夫豈天降地出亦自民而已矣然其所以御輕重調盈虛出入之節備儲之過必有術焉爾大約唐制租庸之令定於武德兩稅之法起乎建中牢盆之利大於第五琦而成於劉晏𣙜茶之禁萌於趙贊而成於張滂進奉之名起乎興元於後則有日貢月進之臣方鎮羡餘之目瀝民膏髓結上恩澤不領於縣官之經費而入人君之私藏焉此唐氏制財用之大經也我國家撫有萬邦富全四海太平安樂且五十年邊塞無聚徒宿師餽運賞功之費州郡灾沴足以饑穰相補民無急征雜調朝令暮具之急是宜綽然舒泰而乃公私之積不足兼年不幸仍饑民力困屈所在倉廪無以振救其由何哉非以天下之民趨末而背本者衆生之寡而糜之多外則戎兵為耗而供億無厭內則兵旅夙驕而匪頒亡度法制不立故編氓僭王侯之服羞教化有虧故齊民入釋老之邪道倚市萃乎游手命卿鮮乎誠士是故耕桑之民漸鮮衣食之路益狹而資以奢侈用無紀極夫如是安取乎富且庶者哉是以聖人制民别其四業自天子公侯卿大夫已下至於抱關擊柝其爵祿奉養死生之制各有差品小不得僭大賤不得逾貴故上下有序而民志定矣在易履卦象曰履以辨上下定民志其在節卦象曰節以制數度議德行又曰不節若則嗟若故先王制禮立法要在使人循於軌道裁其淫過使之欲寡而事節財足而不爭爾管子曰使民知分王道之本也若乃上不能節用嗇費使人以時國之制度不立民之游蠧不去則雖夷吾之權術李悝之能盡地力鼂賈之善議論諸葛亮之理國用亦不足以有成也謹列往代濟國利民之得策危邦害物之亂謀可戒可法宜於今者舉其要焉謹論方平又上食貨輕重論曰臣聞聖人以仁守位以財聚人故財者帝王之所以平理萬物養成羣生保邦御世安民制治之本也夫生人之用莫重於榖帛然聖人立成器以為天下利作為貨幣以通有無而後養生送死之物備貴賤之倫别萬物流布而不竭貨遷而無窮自燧人氏至於三王未有不以輕重之法為政者也通其變使民不倦眀其天時辨其地利察其人力審其物理執權衡以御天下而操事於其不平之間然後天地百物之情可得而見而輕重消息制於君上矣夫至動而不齊者莫甚乎人心衆趨而起爭者莫急乎財利故齊動在乎令息爭在乎均人君者出令而主均者也長則縈之短則伸之虛則益之實則損之裒多益寡稱物必平示之以豫之形而不見其奪之理使民由之而不知其故而後可以制天下之變成天下之務也今國家奄四海以為富籠山澤之所産毛附之土有稅橫目之民有籍東南之美者大貝美珠羽毛齒革也西北之美者皮罽名馬也中國之産三品之金錦綺織文泉刀之利也夫鹽食殽之將鐡田農之本酒百禮之㑹茶衆飲之長皆管於縣官矣歷代所增橫率雜調相循具在貨物殫竭生人困瘁然而儲廪不為之實帑藏不為之積其故何哉蓋物有貯滯利有稽伏開塞無術斂散不時有司徒能張其空簿多設科禁勾剝竒贏纍年無捨勘詰毫杪萬里待報以至令下而詐起法出而姦生蓋由不知輕重之權不逹盈虛之道故略大而規小忘逺以圖近者矣或曰司㑹之府實掌國財賦與有經出納有程遵常循故謹守其度若之何輕重之為也臣應之曰今夫民有數金之業者猶知坐廛行販準時趨利持其緩急取雄井邑况於為國乎况於天下乎故夫以輕重治食貨者民足而國贍弱國可以强其不知輕重之道者民困而國乏强國必弱請試觀於唐氏開元天寶時丕冒出日海寰平寧國本厚矣及明皇季年頗事侈費而崇禮慎矜韋堅王鉷希意圖寵剝刻百端不能開通利塗而專取於民倚法以弄權斂怨以搆禍四方搔動遂用傾危寶應永泰中承大兵之後民庶凋殘仍嵗凶荒中外艱食宫厨無兼時之積禁軍絶餉畿甸百姓挼穗以供之方嶽驕將旅拒傲命違慢法度征賦不入郡縣益減而得劉晏掌租庸以羡餘相補人不加賦自諸道巡院距京師置遞相望四方物價之上下水旱豐穰之地不浹日畢知故食貨之輕重權於掌握而能通其壅滯致天下無甚貴甚賤之物朝廷獲美利國用周濟下無橫斂民不知勞故唐世識者以為自榷管之興通其術者惟晏一人故開元得聚斂之臣不知阜財之術直取無名若奪攘剽略故下困上虛以强盛而至喪敗寶應得計數之臣能明輕重之法以理財通用民賴其利以衰陵而獲安泰是知輕重平準理國阜民之本也今國家賢材良佐濟濟在廷夷吾劉晏之比豈曰無人意者或任之而不盡其材歟遷歷之速不暇經久之謀以集功利歟是何山之麓海之濵積貨滯利之多而不知通泄東有遺秉西有餓莩而不知聚散冗游蟊蠧之害而不知去也乎意者任之而不盡其材遷歷之遽不暇經久之謀以集功利而然爾誠朝廷圖任賢能屬以大計使得自選郎官已下至於黃綬無限卑吏惟材是用為之官屬得以輕重用事而以成效責之必有管葛之材出焉自然和鈞齊物關市不乏貨用足而國力贍賦斂寬而民生安矣謹論方平又論國用疏曰厥今天下生民之蕃四海山澤之富過三代逺矣賦斂所入財貨所聚加厚於漢唐內外無事無師旅戰守餽糧賞功之費無應聲卒具之征然民力益虧國用不贍中家以下衣食亡餘其弊何由蓋國有三蠧而莫之恤也三蠧而不恤雖太公之經權管仲之計數雅不能措國於安拯民之急也何謂三蠧一曰兼并夫兼并之人害農敗法上爭王者之利下固齊民之業擅斡山海之貨管林藪之饒役利細人以致富羡規時輕重坐取百倍不知服田力穡之勤而菽粟餘於犬馬不知織絍紡績之勞而緹繡被乎土木馳車騰騎侔於貴戚藻井采題過於府寺因其富厚交通在勢爵可以鬻刑可以回一悅所酬當中人幾家之産一享所費任上農終嵗之功夫如是小民何以自存農人安得不流亡農人勤苦而不能免乎寒饑故捨南畝而趨市井市井之人利奪於富强故窮而為姦盜姦盜日多誠農愈困是故民業益蹙國用益虛其蠧由乎兼并也夫富人所以能占市井之利侵農民之業者以國家不為權財貨之輕重眀貴賤之制度爾誠能計本末之道審緩急之令平榖物之髙下視凶穰而斂發隘其利途使出一孔均其損益調其盈虛使强賈蓄家無所牟大利則權在君上惠在細人矣古者四民各食其力執藝作業以奉一君故其役易供其求易足今邑有君長之尊里有公侯之富豪華單弱踰冒王禁是民寡而君乏者衆也先王制典其國家宫室車旗樂舞衣服飲食賔客祭祀之度乃至冠婚喪紀之式自天子至於大夫士秩位尊卑莫不異數所以厚其别也至於制庶人之産使之仰足以事父母俯足以畜妻子衣食足而止矣故使雖富不異服無故不食珍入幣不過緇帛五兩合親不踰一肉衣食之餘皆踰分者也蓋撓枉者過直救文者以質禮義本於朝廷風俗始乎京師上行下效其應如響今雖未能取諸古謂宜平四民之業無使富人專財盡物自其室宇車馬器服奴婢宜益為制度撙節之夫分定則易足欲寡則不爭雖積貨財無所張用則其貪聚之心知所止矣上以厚國本下以勸農事使民有讓而刑罰以省天下由乎軌道無不足之患其惟去兼并之蠧乎方平又論校㑹邦計事疏曰伏見西事已來應副邊備天下被其勞凡百賦率至增數倍當時朝㫖蓋為用兵之際權冝應急豈可承以為常今邊防雖已漸寧而緣邊戍守未能撤備四方添置兵馬數亦甚多向之所增賦斂必難復舊何以慰天下百姓之望朝廷所以綏懷二邊者正謂寬財用紓民力以厚為之備也今乘邊事之間豈可優游虛度嵗月不切講求經久之計若遂恬然憚於有為臣恐民力日困財用日匱難以善於後矣今內自三司外至發運轉運使凡掌財用之官簿書期㑹猶不暇給豈暇為國家生民逺慮者哉臣欲乞於兩省已上官選差才敏之士三兩員就三司與使副據國用嵗計之數量入以為出平貨物之輕重通天下之有無校其利害之原以革因循之弊旋具事節先到中書樞密院開陳商量必久逺可行者奏上取裁若細碎之事無大損益徒成煩擾不須施行所冀助財用紓民力當今之切務也方平再奏請劄子曰方今天下切務無先貨食貨食之原在於三司而計臣事務煩綜簿書期㑹之不暇給豈暇及於國家根本之慮哉故於去年曽上言乞於兩省已上官選差三兩員就三司與使副據嵗計之所入約中外之所費移用之法則權其輕重率斂之物則通其有無參究利害之原剗革因循之弊所冀寬財用紓民力助三司均節之體者也自後未䝉朝廷施行不測所以難之之意今不乘邊事之間急講久逺之策臣恐民力日困財用日匱恐朝廷重於生事欲乞且令三司將天聖中一年天下賦入之數及中外支費之籍與昨一年比並條上則國家之大計可校而知矣如是而可以經久則善如其不可則豈得恬然不深慮哉前所上劄子伏乞更賜詳擇方平乞弛茶禁疏曰臣等伏見茶課緡錢嵗當二百四十四萬八千嘉祐二年才及一百二十八萬有竒是為本錢才又募人入錢皆有虛數實為八十六萬而二十九萬有竒是為本錢才得子錢四十六萬九千而已其輦運縻費喪失與官吏兵夫廪給雜費又不與焉至於園户輸納侵擾日甚小民趨利犯法刑辟益蕃獲利至少為弊甚大宜約至和之後一嵗之數以所得息錢均賦茶民恣其買賣所在收算請差官詢察利害以聞慶厯四年知諫院蔡襄論財用劄子曰臣伏覩陛下賜三司紬絹詔書曰使斂無暴橫而公須足民無愁痛而國用登又聞詔㫖以利觸罪者與議輕刑臣伏惟陛下視赤子有父母之慈臨萬物有天地之施不緣嗜愛而率斂於下每因乏匱而資助於中有以見陛下克已恭勤憂民切至德音屢降聖慮彌深庶官所宜奉行百姓固當少息然而殘苛之吏未已供應之家轉勞陛下恤黎庶之心翻無實事海內仰朝廷之令悉是空言首尾乖違弊病安在臣以貧賤之跡叨耳目之官細民疾苦之心天子未聞之事俱合陳論伏自羌賊負恩天兵致討備禦之處數千里更戍之役五六年飛挽芻糧繕修器械於是不時之斂作焉無名之賦興焉言利之臣出焉緣姦之吏起焉配取相仍蠧傷滋甚供軍之物制作多門任土之求有無不一金榖之職轉遷靡常管庫之司給納是利前符未至後條已行郡縣承風急於星火虐者先期集事曲施酷毒之威貪者與吏通謀力恣誅求之害以欺罔窮愚為智有作者茍得而必行以攘奪豪富為公當權者避嫌而不主破家流離之苦十室九空呼天苦欣之詞萬人一口原其本末皆有因緣挾私讎者有之為身計者有之只如陜西𣙜鹽江南議鐡增深酒課採取銅苖移東就西指無為有或賜章服或改職名或與遷官或承奬詔所以爭求目下錙銖之利不為日後久逺之謀臣切謂朝廷推賞不責其實之所致也倍添屋稅鬻賣官田刷江淮見鏹上供缺商旅便錢不給配物於不産之所嚴程於可緩之期如此之類三司之過也借買銀絹豫折田苖逼抑納錢名為勸誘髙下物估官取贏餘如此之類轉運司之過也貧富不均貪婪不禁妄為退剝故作滯留殺牛納皮仍科徒罪償官竭産更虐親鄰如此之類郡縣之過也觸類滋長不可殫論陶陶生民若在風濤之上嗷嗷四海偷為旦暮之安逺近之情若斯國家之患未已臣聞民為邦本本固邦寧又聞財聚則人散財散則人聚是知民不可不恤財不可不通若專奉公家不究民病所得則寡其失則多臣非不知吏員軍旅之繁郊廟宴賜之廣北有餌敵之費西有禦冦之須常賦既不足充遺利必當悉取臣又非敢故興恤民之論務黜言利之人執髙古之虛文道當世之切務所冀言利者上能資於國下不害於民饒益既多孰云不賞所可痛心者眀知無利冒怨必行幸可寬期力為督迫自古剝下無厭而民不亂誅財無已而國不危者未之有也昔漢武帝逺事征伐算及舟車四方凋殘大業幾廢以至下哀痛詔封富民侯雖僅安全而劉氏之不亡者如線唐德宗朝盧杞輩專為刻剝稅椽僦匱别斂促追掊虐干名都下尤甚涇兵乘怨徑入長安驅呼市人用此藉口臣切思今日之事兵不得已而用財不得已而求然漢唐致危亂之因種種略施行矣故復冦盜未平干戈未息或百姓之心揔動顧天下之計如何伏望陛下踐詔書之言推實惠於下民不勝困在精擇郡縣撫養之人利不可遺在博求錢榖通流之術所入之賦有常而所費之數無極則去太冗而節煩費所得至薄而斂怨至深則去小利而存大惠上下相濟公私兩行伏惟祖宗不拔之基全付陛下朝廷更張之事更待何時願陛下申戒大臣力求衆弊以幹家之術而憂國以恕已之善而及人使百姓之心不撓則天下之計大定言先於事多為迂闊之謀事至而言無救阽危之祻臣憂深語切意拙文繁陛下倘賜詳觀於時實有禆補臣所言民間疾苦及處事乖方者形之於左臣所聞所見民間疾苦不敢備載粗舉一二條所冀上逹宸覽知天下有如此事其間起請者乞賜施行慶厯間陜西經略安撫使范仲淹奏陜西入中糧草等事疏曰臣切見陜西四路各屯重兵所入中糧草又無定數并支却京師錢帛久而行之府庫須竭又支移關輔二稅往邊上送納道路嶮岨百姓勞費亦已凋弊至於轉運司經畫財利應副邊上每年亦無定額縱使元昊納款未能頓解邊兵悠久何以支濟自來朝廷已差逐路經略兼計置糧草即未責事任伏望聖慈指揮更選差朝臣四人充陜西四路經略計置判官專管本路稅賦課利及圖回營田等事仍令三司將逐路軍馬并見在糧草數目約度今後每年各計入中若干石於京師支給見錢比舊日十分中減下三分各令陜西轉運司約度逐路稅賦課利數目外每年各令支助錢帛若干既糧草錢帛皆是定額自然各務省節須揀精鋭養贍及將蕃部弓箭手相兼使用不更占冗兵既㳂邊入中有數必自那移軍馬入次邉及近裏州軍駐劄其四路經略計置判官便當知州差遣與本路經略使及知州軍等如能依此減省入中萬數及圖回財用不至虧誤即優加奬擢此軍國大計乞聖慈留意仲淹又奏乞許陜西四路經略司回易錢帛疏曰臣等切以西垂用兵以來㳂邊所費錢帛萬數浩瀚官司屈乏未能充用其鄜延等四路帥臣雖有管本路糧草之名然轉運司終是本職故不敢專行計置若不委之經度即邊計常是不足臣等欲乞特降指揮下鄜延環慶涇原秦鳯路經略使司應本路州軍所管錢帛並許選差除廉幹使臣公人等任便回易其收到利錢眀入省帳收附所有勾當人等如能大段回易得利息委本司具數保眀聞奏特與相度酬賞所貴有助軍費少紓民力仲淹又請將先減省諸州公用錢却令依舊奏曰臣切見朝㫖下陜西省罷同解乾曜等九州軍公使錢共一千八百貫文切以國家逐處置公使錢者蓋為士大夫出入及使命往還有行役之勞故令郡國饋以酒食或加宴勞蓋養賢之禮不可廢也謹按周禮官有遺人掌郊里之委積以待賔客野鄙之委積以待羈旅凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事巡而比之以時頒之此則三王之世已有厨傳之禮何獨聖朝顧小利而亡大體且今贍民兵一名嵗不下百貫今減省得公用錢一千八百貫只養得兵士一十八人以上一十八人之資廢十餘郡之禮是朝廷未思之甚也况今來逐州使命之外各有軍營每年春後邊兵歇泊動經半年軍中人員並無宴犒之具雖條貫有旬設之名逐州每月一次舉行軍員各給錢一百文已來官務薄酒二升既無公用更不赴筵亦不張樂豈朝廷宴享將校之意州郡削弱道路咨嗟當全盛之朝豈宜如此或謂有公使錢處收買食物搔擾民户殊不知郡守得人自能約束如非其人更出已俸買物虧民愈甚是見其小而不思其大也伏望聖慈速降指揮下陜西河北河東路轉運司昨來經減廢公用錢並令依舊庶協典禮稍息物論况朝廷用武之時於此一事尤宜照管臣等久在邊任深知此事近二樞庭豈當緘默知諫院范鎮奏乞二府通主兵民財利劄子曰伏見周制冢宰制國用唐宰相兼鹽鐡轉運使或判戶部或判度支然則宰相制國用從古然也今中書主民樞密院主兵三司主財各不相知故財已匱而樞密院益兵不已民已困而三司取財不已中書視民之困而不知使樞密院減兵三司寬財以救民困者制國用之職不在中書也而欲隂陽和風雨時家給人足天下安治不可得也欲乞使中書樞密院通知兵民財利大計與三司量其出入制為國用則天下民力庶幾少寬以副陛下憂勞之心此非使中書樞密大臣躬親繁務如三司使之比直欲令知一嵗之計以制國用爾知諌院包拯請選內外計臣疏曰臣切見天下財用積年窘乏近自眀堂禮畢賞賚才罷又行特給支費浩瀚帑藏虛竭且朝廷所仰給者江淮兩浙逐路旱潦相繼兼又茶法隳壞商算不行東南州軍錢帛糧斛自不足用則四方嵗入之數所得幾何今之總邦計者內則三司使外則轉運使當此財用窘乏之際居職者尤宜僉求才傑之士俾之興利除害庶幾可濟若乃上下循默恬然以為無事不務更張措置必恐日甚一日有不可救之患矣伏望聖慈申命有司以今之一嵗出入較近年用度耗登之數則斷可知矣所有內外總計之臣欲乞特出宸斷精加推擇選任能者責以實效庶免將來敗事惟陛下留神省察拯又言陜西鹽法疏曰臣奉𠡠差往陜西與轉運使并范祥靣議鹽法利害緣臣前任本路轉運使備知前來鹽法自慶厯二年因范宗傑擘畫禁𣙜之後差役兵士車牛及逐州衙前等般運鹽席往諸州官自置場出賣以致兵士逃亡死損公人破蕩家業比比皆是所不忍聞其衙前估計家業每直一貫者即管認般鹽兩席雖家業已竭而鹽數未足嗟怨之聲盈於道路前後臣寮纍言不便乞復舊法通商以救關中凋弊有司執議終不施行昨因范祥再有起請兼葉清臣曽知永寧軍見其為患之甚因乞依范祥擘畫用通商舊法令客人於㳂邊入納見錢收糴軍糧免虛擡貴價入中斛斗於𣙜貨務大支官錢兼寬得諸般差役勞擾此乃於國有利於民無害理甚灼然但以變法之初豪商猾吏悉所不樂而議者㳂其嵗入課利稍虧於前而橫有沮議乞復舊法若舊法誠善復之無疑但恐為害浸深耳且法有先利而後害者有先害而後利者若復舊日禁𣙜之法雖暴得數萬緡而民力日困久而不勝其弊未免隨而更張是先有小利而終為大害也若許其通商雖一二年間課額少虧漸而行之必復其舊又免民力日困則久而不勝其利是先有小損而終成大利也且國家富有天下當以恤民為本今雖財用微窘亦當持經久之計豈忍爭嵗入數十萬緡不能更延一二年以責成效輕信橫議不惟命令數有改易無信於下而又欲復從前弊法俾關中生靈何以措其手足臣細詳范祥前後所奏事理頗甚朗白但於轉運司微有所損以致異同耳臣固非憚其往來之勞妄有臆說實亦為國家惜其事體不欲徇一時之小利而致將來大患臣欲乞候到陜西相度如㳂邊近裏州軍糧儲有備錢物可以那容得行新法公私未至大害其間或有未便之事即與逐司將通商舊法與今來新法公共從長商量損益且令通行如㳂邊糧儲闕乏公私為大不便即具畫一事狀乞朝廷詳酌指揮至和二年殿中侍御史趙抃論奉宸庫估賣物色疏曰臣切聞已降指揮奉宸庫估計珠犀玉帛珍寶等物差官置場出賣伏緣奉宸庫並係朝廷寶祕之物今一旦即行估賣深損國體兼又市井張皇道路𫝊播萬一逺夷聞之將謂我朝何故窘急如此况國家內有省庭庫藏外有四方貢賦若能節損浮費則用度自可取足何必輕信淺議搜刷禁庭寶祕之物虛耗內帑動搖人心所得甚微所失甚大臣愚伏望聖慈為國惜體所有奉宸庫見行估賣物色特賜指揮寢罷嘉祐三年度支判官王安石上書曰今天下之財力日以困窮風俗日以衰壞患在不知法度不法先王之政故也法先王之政者法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合先王之政矣因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以財不足為公患也患在治財無其道爾在位之人才既不足而閭巷草野之間亦少可用之才社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎願監苟且因循之弊眀詔大臣為之以漸期合於當世之變臣之所稱流俗之所不講而議者以為迂闊而熟爛者也七年同知諌院司馬光論財利疏曰臣聞昔楚莊王以無灾為懼曰天豈棄不榖乎范文子曰唯聖人能外內無患然則嵗小不登邊鄙有警未必非國家之福也伏見今春天久不雨陛下憂勞於內公卿惶恐於外豈不以公私之積素不充實若遇饑饉將無以相恤乎一朝京師得雨逺方未遍則君臣釋然相慶不復以民食為念陛下安知來嵗之旱不甚於今嵗乎蓋天降灾沴蠻夷猾夏冦賊姦宄此堯舜所不能免也即不幸有大水大旱方二三千里敵人乘間而窺邊細民窮困而為盜軍旅數起久未有功府庫之蓄積已竭百姓之生業已盡陛下當此之時將以何道救之乎臣不知陛下與公卿大臣以此為必無而不足憂乎將以為有之而不為之備俟事至然後憂之也若俟事至然後憂之雖以陛下之聖眀得益稷太公以為輔佐臣以為不及矣何則聖賢之治皆積以嵗月然後有功欲天下之家給人足固不可一日具也周易既濟之象曰君子以思患而豫防之思患而豫防之此其時矣失之愈逺救之愈難奈何日復一日取過目前而已乎晉武帝時何曽謂其子孫曰吾每見主上所說皆平生常語未嘗及經逺大計吾子孫其及於亂乎其後劉石紛爭中州覆沒生民塗炭幾三百年由是觀之上下偷安不為逺謀此最國家之大患也詩曰哀哉為猷匪先民是程匪大猷是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成方今之政何以異此此臣之所為夙夜痛心疾首者也古之王者藏之於民降而不能乃藏於倉廪府庫故上不足則取之於下下不足則資之於上此上下所以相保也今民既困矣而倉廪府庫又虛陛下倘不深以為憂而早為之謀臣恐國家異日之患不在於它在於財力屈竭而已矣今朝廷不循其本而救其末特置寬恤民力之官分命使者旁午四出爭言便宜以變更舊制米鹽靡密之事皆非朝廷所當預者張設科條不可勝紀或不知其舊益為民患或朝三暮四移左於右其間果能利民者不過放散縣官之物以豫民耳是誠損上益下王者之仁政也然臣聞古之聖王養之有道用之有節上有餘財然後推以豫民是以上下交足而頌聲作矣今入者日寡出者日滋是所謂厭其原開其瀆其竭可立而待也公家既竭不取諸民將焉取之是徒有利民之名而無利民之實果何益哉夫寬恤民力在於擇人不在立法若守令得人則民力雖欲毋寬其可得乎守令非其人而徒立竒法適所以擾民耳自置此官以來於今纍年臣訪之民間未聞其困弊小瘳於前也然則為今之術奈何曰在隨材用人而久任之在養其本原而徐取之在減損浮冗而省用之何謂隨材用人而久任之夫人之材用各有所宜雖周孔之材不能遍為人之所為况其下乎固當就其所長而用之今朝廷用人則不然顧其出身資叙何如耳不復問其材之所堪也故在兩禁則欲其為嚴助司馬相如任將帥則欲其為衛青霍去病典州郡則欲其為龔遂黃霸尹京邑則欲其為張敞趙廣漢司財利則欲其為孔僅桑𢎞羊世豈有如此人哉故財用之所以匱乏者由朝廷不擇專曉錢榖之人為之故也國初三司使或以諸衛將軍諸司使為之判官則朝士曉錢榖者皆得為之不必用文辭之士也先朝以數路用人文辭之士置之館閣曉錢榖者為三司判官曉刑獄者為開封府推判官三者職業不同趣舍各異莫相涉也然後人主以時引對訪問以察之使令以試之積久以觀之核其真僞辨其臧否考其功效然後進之退之未必歷其職者皆須進用不可復退也故羣臣各宣其用而萬事交舉矣夫官久於其業而後明功久於其事而後成是以古者世官相承以為氏姓先朝陳恕領三司十餘年至今稱能治財賦者以恕為首豈恕之材智獨異于人哉蓋得久從事于其職故也至于副使判官堪其事者亦未數易也是以先帝屢行大禮東封西祀廣修宫觀而財用有餘者用人專而任之久故也近嵗三司使副使判官大率多用文辭之士為之以為進用之資塗不復問其習與不習於錢榖也彼文辭之士習錢榖者固有之矣然不能專也於是乎有以簿書為煩而不省以錢榖為鄙而不問者矣又居官者出入遷徙有如郵舍或未能盡識吏人之靣知職業之所主已捨去矣臣頃者判度支句院甫二年耳上自三司使下至檢法官改易皆遍甚者或更歷數人雖有恪勤之人夙夜盡心以治其職人情稍通綱紀粗立則捨之而去後來者意見各殊則嚮之所為一皆廢壞況怠惰之人因循茍且惟私便身不顧公家者乎如此而望太倉有紅腐之粟水衡有貫朽之錢臣未知其期也凡百官莫不欲久於其任而食貨為甚何則二十七年耕然後有九年之食今居官者不滿三嵗安得有二十七年之效乎臣愚以為朝廷宜精選朝士之曉練錢榖者不問其始所以進或進士或諸科或門䕃先使之治錢榖小事有功則使之權發遣三司判官事及三年而察之實效顯著然後得權三司判官事又三年更有實效然後得為正三司判官其無實效者退歸常調勿復收用其諸路轉運使不復以路分相壓使之久於其任有實效者或自權為正自轉運副使為轉運使無實效者亦退歸常調不復收用每三司副使闕則選三司判官及諸路轉運使功效尤著者以補之三司使闕亦選於副使以補之三司使久於其任能使用度豐衍公私富實者增其秩使與兩府同而勿改其職如此則異日財用之豐耗不離於已不得諉之他人必務為永久之規矣其文辭之士則自有資塗不必使為錢榖之吏以輕之也何謂養其本原而徐取之善治財者養其所自來而收其所有餘故用之不竭而上下交足也不善治財者反此夫農工商賈者財之所自來也農盡力則田善收而榖有餘矣工盡巧則器斯堅而用有餘矣商賈流通則有無交而貨有餘矣彼有餘而我取之雖多不病矣今之有司自謂能治財者臣見之矣凍餒其民而豐積聚者出掃土以市祿位而不恤後人者也捃拾麻麥而喪丘山者也保惜一錢而費萬金者也不操白刃而為冦攘者也姦巧簿書而罔君上者也必曰養其所自來而收其所自餘則聞者以為笑矣夫使稼穡者饒樂而惰游者困苦則農盡力矣堅好便用者獲利浮僞侈靡者不售則工盡巧矣公家之利捨其細而取其大散諸近而收諸逺則商賈流通矣農工商賈皆樂其業而安其富則公家何求而不獲乎夫農天下之首務也古之人所重而今之人所輕非獨輕之又困苦莫先焉何以言之彼農者苦身勞力衣粗食糲官之百賦出焉百役歸焉嵗豐則賤貿其榖以應官私之求嵗凶則流離凍餒先衆人填溝壑如此而望浮食之民轉而緣南畝難矣彼直生而不知市井之樂耳茍或知之則去而不返矣故以今天下之民度之農者不過二三而浮食者常七八矣欲倉廪之實其可得乎臣愚以為凡農民租稅之外宜無有所預衙前當募人為之以優重相補不足則以坊郭上户為之彼坊郭之民部送綱運典領倉庫不費二三而農民常費八九何則儇利戇愚之性不同故也其餘輕役則以農民為之嵗豐則官為平糴使榖有所歸嵗凶則先案籍賙贍農民而後及浮食者民有能自耕種積榖多者不籍以為家資之數如此則榖重而農勸矣彼百工者以時俗為心者也時俗貴用物而賤浮僞則百工變而從之矣時俗者以在上之人為心者也在上好朴素而惡淫侈則時俗變而從之矣其百工在官者亦當擇人而監之以工致為上華靡為下物勒工名謹考其良苦而誅賞之取其用不取其數則器用無不精矣彼商賈者志於利而已矣今縣官數以一切之計變法更令棄信而奪之彼無利則棄業而從它縣官安能止之哉是以茶鹽棄捐征稅耗損凡以此也然則縣官之利果何得哉善治財者不然將取之必豫之將斂之必散之故日計之不足而嵗計之有餘此乃白圭猗頓之所知豈國家選賢擇能以治財其用智顧不如白圭猗頓邪患在國家任之不久責近效而遺逺謀故也夫伐薪者刈其條枚養其本根則薪不絶矣若并本根而伐之其得薪豈不多哉後無繼矣是非難知之道也然有司不為者彼其心曰吾居官不日而遷不立效於目前以自顯顧養財以貽後之人使為功吾何賴焉是非特有司之罪也亦朝廷用人之法驅之使然也何謂減損浮冗而省用之昔太祖初得天下之時止有一百一十一州耳江南兩浙西川富饒之土皆為異域又承五代荒亂之餘府庫空竭豪傑棊布於海內契丹窺覦於邊境戎車嵗駕四方多虞當是之時內給百官外奉軍旅誅除僭僞賞賜巨萬未嘗聞財用不足如今日之汲汲也陛下承祖宗之業奄有四百餘州天下一統異域𣢾塞富饒之土貢賦相屬承平積久百姓阜安是宜財用羡溢百倍於前奈何竭府庫之所蓄罄率土之所有當天下無事之時遑遑焉専救經費而不足萬一有不可期之灾患將何以待之乎夫以國初之狹隘艱難財用宜不足而有餘今日之廣大安寧財用宜有餘而不足陛下亦嘗熟思其所以然之理乎得非太祖所養者皆有功有用之人陛下所養者未必盡有功用乎臣切見陛下天性恭儉不好侈靡宫室苑囿皆因祖宗之舊無所更造或隳頓荒蘙不加修治飲膳衣食器皿帷帳適足供用不極精華或苦惡弊綻亦不更易雖唐虞之土階三尺茅茨不翦殆無以過然左右侍御之人宗戚貴臣之家第宅園圃服食器用往往窮天下之珍怪極一時之鮮眀惟意所欲無復分限以豪華相尚以儉陋相訾愈厭而好新月異而嵗殊是以費用不足則請求無厭丐貸不耻甚者或依慿詔令以發府庫之財假托供奉以糜縣官之物真僞莫辨多少不㑹陛下聖度寬仁不欲拒塞惡聞人過不加案詰至於頒賜外廷之臣亦皆踰溢常數不循舊規如嚮者皇女初生所散包子之類費用不可勝紀臣嘗聞耆舊之人言先朝公主在宫中俸錢不過月五千其餘後宫月給大抵倣此非時未嘗輕有賜豫雖有賜豫亦不甚豐切聞近日俸給賜豫比于先朝何啻數十倍矣漢眀帝曰我子豈宜與先帝子等乎夫等猶不可況又過之是以祖宗之積窮于賜豫困于浮費臣不能知其詳以外望度之什耗七八矣內藏已虛而浸淫于左藏矣夫府庫者聚天下之財以為民也非以奉一人之私也祖宗所為置內藏者以備饑饉兵革非常之費非以供陛下奉養賜豫之具也今內藏庫専以內臣掌之不領于三司其出納之多少積蓄之虛實簿書之是非有司莫得而知也若皆以奉養賜豫而盡之一旦有饑饉兵革之事三司經費自不能周內藏又無所仰斂之于民則民已困竭得無狼狽而不支乎此臣夙夜所凛凛也今陛下所以有唐虞之德而無唐虞之治者其失在於不忍而好豫不忍則不誅有罪好豫則不待有功不誅有罪則姦邪欺罔而不忌不待有功則貪佞徼幸而無厭治道之所以不格于上下者凡以此也昔韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞眀主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者彼小國諸侯猶能慎賞如是而國以富彊況以四海之主不行無功徼幸之賞杜塞甘言悲辭之請則唐虞之治何逺之有哉夫府庫金帛皆生民之膏血州縣之吏鞭撻其丁壯凍餒其老弱銖銖寸寸而聚之今以富大之州終嵗之積輸之京師適足以供陛下一朝恩澤之賜貴臣一日飲宴之費陛下何獨不忍于目前之羣臣而忍之于天下之百姓乎夫以陛下恭儉之德擬乎唐虞而百姓困窮之弊鈞於秦漢秦漢竭天下之力以奉一身陛下竭天下之力以資衆人其用心雖殊其病民一也此臣之所以尤戚戚者也又宫掖者風俗之原也貴近者衆庶之法也故宫掖之所尚則外必為之貴近之所好則下必效之自然之勢也是以內自京師士大夫外及逺方之人下及軍中士伍草野農民其服食器用比於數十年之前皆華靡而不實矣嚮之所有今人見之皆以為鄙陋而笑之矣夫天地之産有常而人類日繁耕者濅寡而游手日衆嗜欲無極而風俗日奢欲財力之無屈得乎哉又府史胥徒之屬居無廪祿進無榮望皆以啖民為生者也上自公府省寺諸路監司州縣鄉村倉場庫務之吏詞訟追呼租稅徭役出納㑹計凡有毫釐之事關其手者非賂遺則不行是以百姓破家壞産者非縣官賦役獨能使之然也太半盡於吏家矣此民之所以重困者也又國家比來政令寬弛百職隳廢在上者簡倨而不加省察在下者侵盜而恣為姦利是以毋有營造貿買其所費財物十倍于前而所收功利曽不一二此國用之所以尤不足者也又自古百官皆有常員而國家用磨勘之法滿嵗則遷日滋月益無復限極是以一官至數百人則俸祿有增而無損矣又近嵗養兵務多不務精夫兵多而不精則力用寡而衣糧費衣糧費則府庫耗府庫耗則賜賚稀是以不足者豈惟民哉兵亦貧矣䇿之失者無甚于此也凡此數者皆所以竭民財者也陛下安得熟視而無所變更邪臣愚伏願陛下觀今日之弊思將來之患深自抑損先由近始凡宗室外戚後宫內臣以至外廷之臣俸給賜豫皆循祖宗舊規勿復得援用近嵗僥幸之例其踰越常分妄有干求者一皆塞絶分毫勿許若祈請不已者宜嚴加懲譴以警其餘凡文思院後苑作所為竒巧珍玩之物不急而無用者一皆罷省內自妃嬪外及宗戚下至臣庶之家敢以奢麗之物夸眩相髙及貢獻賂遺以求悅媚者亦眀治其罪而焚毁其物於四逹之衢専用朴素以率先天下矯正風俗然後登用廉良誅退貪殘保佑公直消除姦蠧澄清庶官選練戰士不祿無功不食無用如此行之久而不懈臣見御府之財將朽蠧而無所容貯太倉之粟將彌漫而不可蓋藏農夫棄糧於􅎌畝商賈讓財于道路矣孰與今日汲汲以應目前之求凛凛以憂將來之困乎夫食貨者天下之急務今窮之如是而宰相不以為憂意者以為非已之職故也臣願陛下復置總計使之官使宰相領之凡天下金帛錢榖𨽻於三司及不𨽻三司如內藏庫奉宸庫之類總計使皆統之小事則官長專逹大事則謀于總計使而後行之嵗終則上其出入之數於總計使總計使量入以為出若入寡而出多則總計使察其所以然之理求其費用之可省者以奏而省之必使嵗餘百分之一以為儲蓄備禦不虞凡三司使副使判官轉運使及掌內藏奉宸等庫之官皆委總計使察其能否考其功狀以奏而誅賞之若總計使久試無效則乞陛下罷退其人更置之議者必以為宰相論道經邦燮理隂陽不當領錢榖之職是皆愚人不知治體者之言昔舜舉八愷使主后土奏庶艱食貿遷有無地平天成九功惟叙周禮冢宰以九職九賦九式九貢之法治財用唐制以宰相領鹽鐡度支戶部國初亦以宰相都提舉三司水陸發運等使是則錢榖自古及今皆宰相之職也今譯經潤文猶以宰相領之豈有食貨國之大政而謂之非宰相之事乎必若府庫空竭閭閻愁困四方之民流轉死亡而曰我能論道經邦燮理隂陽非愚臣之所知也臣不勝狂愚冒犯忌諱惟陛下裁察臣光昧死再拜上疏仁宗時劉敞論茶法奏曰臣伏以古人有言利不百不變法蓋言立事之難也曩者朝廷變更茶法誠欲便百姓阜國用而已自變法以來繇東南來者更言其不便徒以元敕不欲人立異故一切緘默莫敢正言其大要以謂先時百姓之摘山者授錢於官而今也顧使之納錢于官受納之間利害百倍先時百姓冒法販茶者被罰耳今悉均賦于民賦不時入刑亦及之是良民代冒法者受罪子子孫孫未見其已先時大商富賈為國貿遷而州郡收其稅今大商富賈不行則稅額不登且乏國用此三者最其害也或以謂法遂不變則中家必困小家必流若因緣驅逼起為盜賊甚非國家之利臣愚欲乞申敕有司益采輿議且收格前詔極論可否若朝廷能粲然復三代之遺風捐山澤之末禁則乞一弛茶利恣民勿問設以為國用尚繁利源未可悉除猶當擇其利害變而通之使公私兩濟若求益反損求利反害臣恐東南六路數十州之民由此而困則非所謂利不百而變法者也未知其可臣暗於時事不足商功利然耳之所聞心之所疑不敢不陳望朝廷因臣言以求便國惠民之策而已至於細意委曲臣亦不能盡也葉清臣請商州置監鑄大錢以一當十承㫖丁度奏曰漢之五銖唐之開元及國朝錢法輕重大小最為折中歷代改更法雖精密不能朞年即復改鑄議者欲純以峻法革其盜鑄昔漢變錢幣盜鑄死者數十萬唐鑄乾元及重輪乾元錢錢輕幣重嚴刑不能禁止今禁旅戍邊月給百錢得大錢裁十不可畸用舊錢不出新錢愈輕則糧芻增價臣嘗知湖州民有抵茶禁者受千錢立契代鞭背在京西有强盜殺人取其弊衣直不過數百錢盜鑄之利不啻數倍復有湖山絶處凶魁嘯聚爐冶日滋居則鑄錢急則為盜民間銅鉛之器悉為大錢何以禁止英宗治平中王安石得政行新法翰林侍讀學士司馬光逆疏其利害邇英進讀至曹參代蕭何事帝曰漢常守蕭何之法不變可乎對曰寧獨漢也使三代之君常守禹湯文武之法雖至今存可也漢武帝取髙帝約束紛更盜賊半天下元帝改孝宣之政漢業遂衰由此言之祖宗之法不可變也吕惠卿言先王之法有一年一變者正月始和布法象魏是也有五年一變者巡守考制度是也有三十年一變者刑罰世輕世重是也光言非是其意以風朝廷耳帝問光光曰布法象魏布舊法也諸侯變禮易樂者王巡守則誅之不自變也刑新國用輕典亂國用重典是為世輕世重非變也且治天下譬如居室敝則修之非大壞不更造也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜可也不可使執政侵其事今為制置三司條例司何也宰相以道佐人主安用例茍用例則胥吏矣今為看詳中書條例司何也惠卿不能對則以他語詆光帝曰相與論是非耳何至是光曰平民舉錢出息尚能蠶食下戶况縣官督責之威乎惠卿曰青苖法願取則與之不願不强也光曰愚民知取債之利不知還債之害非獨縣官不强富民亦不强也昔太宗平河東立糴法時斗米十錢民樂與官為市其後物貴而和糴不解遂為河東世世患臣恐異日之青苖亦猶是也帝曰坐倉糴米何如坐者皆起光曰不便惠卿曰糴米百萬斛則省東南之漕以其錢供京師光曰東南錢荒而粒米狼戾今不糴米而漕錢棄其有餘取其所無農末皆病矣侍講吳申起曰光言至論也英宗時執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議司馬光與王圭王安石同見光曰救灾莭用宜自貴近始可聼也安石曰常衮辭堂饌時以為衮自知不能當辭位不當辭祿且國用不足非當世急務所以不足者以未得善理財者故也光曰善理財者不過頭㑹箕斂爾安石曰不然善理財者不加賦而國用足光曰天下安有此理天地所生財貨百物不在民則在官彼設法奪民其害乃甚於加賦此蓋桑羊欺武帝之言太史公書之以見其不眀爾爭議不已帝曰朕意與光同然姑以不允答之時帝拜司馬光樞密副使光辭之曰陛下所以用臣蓋察其狂直庶有補於國家若徒以祿位榮之而不取其言是以天官私非其人也臣徒以祿位自榮而不能救生民之患是盜竊名器以私其身也陛下誠能罷制置條例司追還提舉官不行青苖助役等法雖不用臣臣受賜多矣今言青苖之害者不過謂使者騷動州縣為今日之患耳而臣之所憂乃在十年之外非今日也夫民之貧富由勤惰不同惰者常乏故必資於人今出錢貸民而斂其息富者不願取使者以多散為功一切抑配恐其逋負必令貧富相保貧者無可償則散而之四方富者不能去必責使代償數家之負春算秋計展轉日滋貧者既盡富者亦貧十年之外百姓無復存者矣又盡散常平錢榖専行青苖它日若思復之將何所取富室既盡常平已廢加之以師旅因之以饑饉民之羸者必委死溝壑壯者必聚而為盜賊此事之必至者也右司諫傅堯俞上奏曰臣伏聞陛下自親攬政事留神財用屢因訪對講求利害有以見聖度憂勤之深也方今嵗入不充所出天下共慮者久矣固待陛下以救之宜乎以為首務而垂意于其間也雖然為病已深未可猝改誠恐環首觀望言利者爭進未有纎芥之益而為擾更多何則臣自省事以來日聞更弊變故公私缺乏蓋自如也豈非救之或未得其當乎臣雖無智術為國家陳力亦有愚見庶裨萬一惟陛下詳擇如臣意者獨願陛下痛自儉刻身先天下信賞必罰以馭羣臣其能濟務而不害民者寵擢之以勸勤瘁其好興事而訖無補者痛繩之以杜紛更姑從靜安休養黎庶然後澄經費之源敦厚生之本掌金榖者不以資序入有績效者不以日月遷知橫賜之無紀極也雖近親不可妄與慮積小至于成大也雖一毫不可虛用不作無益以害農時必固與之以通商販嚴管庫之禁俾愛惜見物重郡縣之誅無失陷常賦切責司計共為逺圖庶幾其可也至于規規勞心非帝王事苟無驗于目前為姦佞窺伺使言利者寵而聚斂之臣進則天下殆矣臣所陳者初似常談倘垂省録必有深益江東轉運判官范純仁乞減江淮諸路鹽價疏曰臣伏見江淮諸路鹽價太髙致私販之人獲利轉厚及所立刑名亦重過于盜賊而又不分强竊利厚則誘民犯法而刑不可禁刑重則民思茍免而竭力拒捕不分强竊則民知等罰而務結羣黨是致販鹽之人千百為羣州縣之力無由禁止若非朝廷别立法制則恐更相扇誘羣黨轉盛凶年飢嵗遂為盜賊伏望聖慈指揮將江淮南荆湖福建等路官賣鹽價並比附兩浙體例逐斤減價出賣及令三司將私鹽條貫重行刪定分為兩等如持仗及不持仗十人已上即依舊條施行如不持仗不滿十人者並依空手竊盜法計贓定罪其贓各以逐處鹽價估定如此則法制平一民漸知禁歷代名臣奏議卷二百六十四
