body:
  text: 歴代名臣奏議卷三百三十明楊士竒等撰禦邊宋神宗熈寧三年十一月司馬光乞留諸州屯兵劄子曰臣奉勅充永興軍一路兵馬都總管安撫使臣竊聞本路十州所管屯駐禁軍至少大率皆是緣邉就糧兵士常時分為上下番有一半在逐州或遇邉上稍有警急則盡皆抽去逐州並無守把兵士臣竊惟天下事不可忽必須思患豫防敵人犯邉雖當竭力捍禦然腹内州軍豈可全無武偹況逐州皆有軍資甲仗市邑民居萬一戎馬奔突間諜内應或盗賊乘虚姦人竊發其本州官吏手下無兵雖有智勇將安所施臣愚以為逐州宜各添一指揮禁軍屯駐内永興軍為闗中根本宜添兩指揮若朝廷别無兵士可以差撥只乞於縁邉就糧兵士内依此數目撥留在逐州屯駐邉上更不得勾抽所貴緩急不至失偹取進止四年樞宻使文彦博論進築河州奏曰臣竊聞議論欲至來春進築河州漸恢逺略臣竊思之以為未可葢熈州初成猶未全固西蕃内附尚要撫綏積粟未豐屯兵雖衆未宜多事恐累成功臣以謂且須增固熈州使有保民之利安存蕃部彌堅向漢之心倉廪豐盈士馬壯健以守則固以戰則强根本既堅枝葉自茂然後洮河之役以指顧而就今欲務速臣切深憂古人謂欲速則不達見小利則大事不成又云勞於服逺不若修近斯言可鑒在理必然夫趣時希㫖人之甚利犯顔違意人之甚害中人之情鮮不為利多是顧身謀而諂説豈肻為國而危言臣待罪之所地兼將相若括囊無言仰屋竊歎辜祖宗之奬擢負陛下之倚任是敢因事極論違衆立議庶幾萬一有補涓毫陛下以臣為納忠報國幸賜採擇以臣為害成沮事甘俟誅夷臣無任惶恐隕越之至元豐五年彦博判河南上奏曰臣去嵗冬輙率愚瞽累奏陳陜西邉事今春䝉差臣男貽慶特賜臣二月二十五日手詔撫諭後䝉聖慈矜寛不責狂易恭讀詔㫖曰六軍還塞將士已殫勞黎民已告病今日之勢豈復可逺舉深入哉惟固境自完而已近命涇原制置城數亭障制敵衝軼非有前日圖也臣仰味聖言伏增欣忭有以見陛下推堯舜之心卹生靈之困罄兹溥率廣被涵育幸甚幸甚然自今秋已來復有遣戍開疆運糧深入此必是邊臣希功規為僥倖開陳端緒誑惑朝廷料敵不精致有撓敗進此計者陛下必知其人乞行顯誅以戒今後干賞蹈利之輩免致向去更誤朝廷大事望以今年二月二十五日詔書大㫖宻諭邊臣嚴設偹預固境自完來則禦之去勿遠逐更年嵗間士氣復振民力復完足食足兵何求不可醜羌聞之自當屈服臣又聞謀攻料敵老將所難不當與新進白靣書生惟務髙談虚論容易而計畫之今以天下之大士人之衆豈無深識逺慮懐忠守正更事歴試之人願陛下詳求而審用之如祖宗朝所用捍邉守塞宿將名臣見於國史者多矣乞詳察之臣之此言非不知觸犯時怒葢耄耋之年被三朝重任䝉陛下眷奬尤深乃心本朝義均休戚豈當隨例緘黙上負聖明伏望天慈亮其區區竭盡之誠熈寧八年四月樞宻副使富弼答詔問非邊事宜上疏曰臣素乏才業忝塵二府昔在壯時精力尚不及人今老且病氣志衰耗何足偹大政之問然臣實非已見今但舉衆人所得聞者録以上奏惟聖明裁擇臣五六年來切聞綏州囉亢熈河辰錦戎瀘交趾咸議用兵唯交趾中寢其餘諸路皆有攻討或剋獲或䘮失即傳播天下而綏州囉亢熈河始初興舉便傳聞云朝廷必復靈夏平賀蘭既又大傳有人上平燕之䇿此說尤盛北敵必已探知相繼彼復聞朝廷修整器甲簡練兵伍增築城壘積聚芻粮加之招致髙麗為牽制之援近又分置河北三十六將按閲愈急喧布漸久事機參合此敵人所以先期啓釁以發代北侵境之端而不肻已也其平賀蘭平燕之䇿虚實固不可知然傳者既多且久萬口一詞誰敢辯白設有辯者逺裔何以取信今釁端已成代北各屯兵馬境上争議逾年未決横使再至事歸朝廷此邊臣之職而朝廷自當之則恐理難欵緩便要可否違之則兵立起而患速順之則河東斥堠窄狹為患雖遲而久逺不便臣謂不若一委邊臣令其堅持久來圖籍疆界為據使其盡力交相詰難然北敵非不自知理曲葢故欲生事遂興干戈以氣呑我以勢陵我是欲奪我累年所作之事彼非敢無故驟興此端實有以致其來也惟陛下深省熟慮不可獨謂敵人結釁背盟也彼若萬一入寇事不得已我持嚴兵以待之來則禦戰去則偹守此自古中國防邊之要也若朝廷乘忿便欲深入討撃臣實慮萬一差跌其害非細更或與西夏爲掎角之勢則朝廷宵旰矣事既至此邉奏警急兵糧皆缺窘於應用須防四方凶徒必有觀望者謂國家方事外虞其力不能制我遂相嘯聚蜂蝟而起事將奈何臣願陛下以宗社為憂生民為念納汙含垢且求安静更俟嵗時豐稔窮困稍蘇流亡漸歸民粗安業稅賦不失倉廪不虚恩信宣布人心固結然後别圖萬全之舉貴免一跌之失此天下之願也亦臣之志也向又喧傳陛下決為親征之謀中外益更憂懼心殞膽落陛下雖英睿天縱必有成算然太平天子與創業之君事體絶異尤不可概然輕舉又恐朝廷且作聲勢固無實心事若如此乃是我以虚聲而邀彼實來也張虚聲者必有踈畧之虞作實來者必有周宻之慮以踈畧之虞而當周宻之計其成敗豈不灼然耶假令入討得志而還此契丹一種事力自大況又夏國唃廝囉髙麗黑水女真達靼等諸蕃為之黨援其勢必難殄滅使無噍類即此結成邊患卒無巳時大非長轡逺馭之道也臣切謂因横使之來且可選人以其疑我者數事開懐喻之云朝廷凡所為武偹乃中國常事非願外興征伐向者用武之地皆小蕃有過者朝廷須合問罪若吾二大邦通好已是七十餘年無故安肻輙欲破壊恐是奸人造作妄興鬬諜或是彼聞我整肅邊事即疑我有所興作我既知之豈免大為準擬葢因此互相疑惑養成釁隙遂有今日争理朝廷更有可說諸事但盡說之須令釋然無惑乃一助也横使始不納即遣報聘者於戎主前具道此意庶幾一聼必有所益縁彼大藉朝廷嵗與方成國計既有顧藉之心豈無安静之欲只以疑情未釋遂成倔强若與開解明白必肻回心向化凡百芥蔕盡可脫畧茍互相疑忌兩情不通禍患日深必成後悔臣歴觀春秋洎戰國時諸侯遞相征伐兩兵已合飛矢在上行人在下辯說解釋遂各交締而退却復盟好者比比皆是況今釁端漸啓兵尚未合且可多方以理解釋或能有濟與其用征戰而決勝負萬萬不侔也彼此致疑及禦戎二事臣並得之羣論非出胸臆是皆目前衆所共知所共見必然之理非事外别生竒異之䇿也臣更望陛下兼求博訪不宜專聽一偏之説恐有迎合聖意及畏避用事之人不敢盡以實事上奏有誤國家大計臣今所以及此者切聞去春以久旱陛下特降手詔許人極陳朝政得失中外歡忭咸謂聖情已大開悟尋聞上章論列者甚多隨而或遭貶降陛下殊不以手詔召人極諫為意而優容之反令得罪士大夫自此皆務鉗結忠藎之語不敢復出於口臣謂下情不能上達者廼朝政莫大之患也願陛下深思極慮之早令天下受賜及朝廷無事不勝大幸此奏出於怱遽又且欲事理明白不敢加飾及援據古事但直書利害而已昔楚相子反謂區區之宋尚有不欺人之臣況中原大國已與北敵結隙今若更不推誠以待之則恐不能解疑釋惑也伏乞聖造特加裁恕九年六月弼又論蠻獠侵犯乞召諸道以寛民爲務疏曰臣退伏草茅不預人事近者切聞蠢爾蠻獠犯我疆封二廣致災五嶺嚴偹雖為手足之患諒煩宵旰之憂然而命將得人出師有日上禀宸算必成武功臣又切聞淮南累嵗尤為荒䭑流亡餓殍賑濟難周今驟起數萬之徒間由諸路而徃兵馬所到粮草須辦監提守宰唯務供軍府庫倉箱殆難足用既各求於集事恐必至於擾民又有按察之官繼行督責之令上下逼廹公私煎熬人心不寧實可矜惻臣又切聞南方鄉村城郭重疊逋欠官司錢物其數浩瀚若監司州縣又相廹催理仍與此時贍軍所費一併取足則民不堪命無以為生嘯聚驚騷或難禁戢陛下天賦仁聖累降寛卹之詔其如所在闕用出於無可奈何須至侵漁方能濟集而又官吏各思一時茍免罪責不暇為國家憂及後患而為長久之計也臣又切聞諸處興修水利之類役人甚衆多或至於一二十萬此傷耗民財事亦不細伏願陛下深詔有司並下諸道以寛民為務凡所逋欠可蠲者與蠲放理難蠲放者多分料次且令迤邐輸納及權罷諸般興作令養民力一意專以破賊為急俟嶺南寧息嵗時稍豐然後别上圖議以稱朝廷有為之心固亦未晚也臣杜門謝事秪如聾瞽但時得於四方之人傳聞者今録以上奏茍有妄説惟陛下恕其愚而憐其心以來衆正之路八年四月判相州韓琦答詔問北邉事宜上疏曰臣伏䝉聖慈特差入内内侍省東頭供奉官幹當内東門司裵昱齎賜臣手詔以朝廷通好北敵八十年近嵗以來生事彌甚代北之地素有定封而輙開釁端妄來訴理比敕官吏同加按行雖圖籍甚明而詭辤不伏今横使復至意在必得朕以祖宗盟好之重固將優容敵情無厭勢恐未巳萬一不測何以待之古人大政必詢故老卿夙懐忠義歴相三朝雖爾身在外乃心罔不在王室其所以待遇之要禦偹之方宻具以聞臣晚年多病心力耗殫日欲再乞殘骸保此頹暮不意陛下以北敵生事深思預防記及孤愚曲為詢逮敢不勉竭以塞聖問臣切以契丹與中國抗者葢一百七十餘年矣自石晉割地并有漢疆外兼諸戎益自驕大在祖宗朝屢嘗南牧極肆凶暴當是時豈不欲悉天下之力必與敵角哉終以愛惜生靈屈就和好疆場有所興作深以張皇引惹為戒以是七十年間二邉之民各安生業至於老死不知兵革戰鬬之事至仁大惠不可加也臣觀近年以來朝廷舉事則似不以大敵為恤敵人素以久强之勢於我未嘗少下一旦見形生疑必謂我有圖復燕南之意雖彼主孱而佞佛豈無强梁宗屬與夫謀臣䇿士引先發制人之説造此釁端故屢遣使以争理地界為名觀我應之之實如何耳所以致敵之疑者臣試陳其大畧髙麗臣屬契丹於朝廷久絶朝貢向浙路遣人招諭而來且髙麗小邦豈能當契丹之盛來與不來國家無所損益而契丹知之謂朝廷將以圖我此契丹之疑也秦州古渭之西吐蕃部族散居山野不相君長耕牧自足未嘗為邉鄙之患向聞强取其地建熈河一路殺其老少以數萬計所費不貲而河州或云地屬董氊即契丹壻也既恐闢地未已豈不徃訴而契丹聞之當謂行將及我此又契丹之疑也北邉地近西山勢漸髙仰不可為塘泊之處向聞羌官領兵徧植榆栁冀其成長以制敵騎然興於界首無不知者昔慶厯嫚書所謂剏立隄防障塞要路無以異矣然此豈足恃以為固哉但使契丹之疑也河朔義勇民兵置之嵗久耳目已熟將校甚整教習亦精而忽團保甲一道紛然義勇舊人十去其七或撥入保甲或放而歸農得增數之虚名破可用之成法此又徒使契丹之疑也自敵人辨理疆界河朔沿邉與近裏州郡一例差官檢計修築城壘開淘壕塹冀北京役者尤衆敵樓戰棚之類悉加換葺增置防城之具率令偹足逐處兵甲器械累次差官檢視排垜張盤前後非一又諸處剏都作院頒降新様營謀造作澶州等處剏為戰車此皆衆目所覩諜者易窺且敵人未一動作彼無秋毫之損而我已費財殫力先自困弊此又徒使契丹之疑也近復置立河北三十七將各專軍政縣不得闗防雄州地控兩邊亦設將屯兵其隨軍衣物有令兵士自辦者有令本營增置者有令官造給付者以至預籍上户車馬騾驢准偹隨行明作出征次第不可葢掩此又深使契丹之疑也夫契丹素為敵國設如此則積疑生事不得不然亦其善自為謀者也今横使再至初示偃蹇以探朝廷況代北與雄州素有定界若優容而與之恐敵情無厭浸淫不已誠如聖詔所諭固不可與或因其不許敵遂持此以為已直縱未大與勢必漸擾諸邉卒隳盟好盖有因縁而致此者乃煩明詔訪以待遇偹禦之要自顧老朽夙夜思之其將何䇿上助聖算臣聞言未及而言謂之躁言及之而不言謂之隱臣昔曾言散青苖錢不便事而言者輙肆厚誣非陛下之明幾及大戮自此新法之下雖其間有未協人情者實避嫌疑不敢更有論列今親被詔問事繫國家安危言及而隱是大不忠罪不容誅矣臣嘗切計始為陛下謀者必曰自祖宗以來紀綱法度率多因循茍簡非變之不可也治國之本當先有富强之術聚財積糓寓兵於民則可以鞭笞四夷盡復唐之故疆然後制作禮樂以文太平故始散青苖錢使民出利所得之利復以為本但務多取嵗增本錢無有定數又爲免役之法自上等以至下戸皆令次第出錢募人應役從來上戸輪當衙前重難故其間時有破敗者今上户一嵗出錢不過三十餘緡安然無事而令下戸素無役者嵗嵗出錢此則損下户而益上戸雖百端補救終無善法又役錢之内每嵗更納寛剩錢以偹他用此謂富國之術也且農民送納夏秋税賦一年兩次納不前者始有科校之刑今納青苖與役錢已是加賦有過限者亦依二税法科校則是一户一嵗之中常負六次科校民不勝駭矣稍遇水旱則逋負官錢流移失業是已著現孰敢言者又内外置市易務盡籠天下商旅之貨官自取利主以得利為功圭刀必取小商細民遂無所措手加以新制日下更改無常州縣官吏茫然不能詳記稍有違者坐以徒刑雖經赦降去官不得原免監司督責以刻為明薄法之苛過於告緡故州縣之間官吏惴惴然日茍一日皆以得罪為幸夫農者國之本也商者能為國致財者也官吏者助朝廷之教化者也今農者則怨於畎畆商者則嘆於道路官吏則所在不安其職恐陛下不能盡知也夫欲攘捍四夷以興太平而先使邦本困摇衆心離怨振古以來未聞能就此功者也此則陛下始謀者之大誤也陛下有堯舜之聰明知其所誤能改不吝聖人之大徳也又今好進之人不顧國家之利害但謂邉事將作富貴可圖獻䇿以干陛下者必云敵勢已衰特外示驕慢耳以陛下神聖文武若擇將臣領大兵深入敵境則幽薊之地一舉可復此又未之思也今河朔累嵗灾傷民力大乏㳂邉次邊州郡芻粮不充新選將官例皆麤勇保甲新㸃未經訓練若驅重兵頓於堅城之下粮道不給敵人四向來援腹背受敵欲退不可其將奈何太宗時雖曹彬米信名德宿將猶以致岐溝之敗也臣愚今為陛下計謂宜遣使來報優致禮幣開示大信逹以至誠具言朝廷向來興作乃修偹之常與北朝通好之久自古所無豈有他意恐為諜者所誤耳且疆土素定當如舊界請命邉吏退近者侵占之地不可持此造端欲隳祖宗累世之好永篤信約兩絶嫌疑望陛下將契丹所疑之事如將官之類因而罷去以釋敵疑萬一聼伏則可遷延嵗月陛下益養民愛力選賢任能踈逺奸諛進用忠鯁使天下悦服邉偹日修塞下有餘粟帑中有羡財俟敵果有衰亂之形然後一振威武恢復舊疆快忠義不平之心雪祖宗累朝之憤陛下功徳赫然如日照耀無窮矣如其不伏決欲背約則河北諸州深溝髙壘足以自守敵人果來入寇所在之兵可以伺便驅逐大將持重以全取勝自此彼來我徃一勝一負兵家之常不可前料即未知何時復遂休息也至於清野之法則難盡行倉卒之際不可率一境之民比户將牛馬餱粮盡入城郭盖至時或有徃保生寨者或有挈家渡河者或有留人看守莊舍者或有就近入居城郭者當使人得自便方保安全固不可按圖先定必令城郭而居雖有嚴令必不從也在祖宗朝屢經北敵之擾鄉民避寇率亦如此願朝廷不須一一處置臣歴事三朝十年輔相宦已極品歸榮故鄉萬事無不足者年將七十宿疹在身每思告老而去庶全始終此縁聖問之及因敢一貢藎言非嫉善也非求進也用是只以自信今天下之人漸不敢以直言為獻臣實不忍負累朝眷遇之恩猶覬愚瞽一悟聖心為社稷之盛福惟陛下加察賜以不疑非獨老臣幸甚天下幸甚十年監察御史裏行蔡承禧論再征交趾上疏曰臣聞漢儒之言曰聖人以天下為度傳曰川澤納汙國君含垢則知天下之治亂無窮若錙銖以較之則道有所不及故聖人限要荒之俗以不治治之而天下無不治也伏自交寇之弗率一隅之間兵死於道者相屬丁男之轉輸而弊於行者相繼糜都内之財以億萬二嵗之久可謂勞矣而所得者廣源數州之地而已夫瘴海窮山蛟虺霧毒之淵藪飛鳶墮於上温風泊其間殆非人境雖盡得之顧何補於天下今若討安南之罪則已伏罪矣雖三苖弗率而七旬班師義亦何以加此然而郭逵趙卨尚未罷歸邉兵未還營伍外議喧傳以為李乾德之降疑不深自引慝朝廷再欲興師不識有此否乎夫蠻蜑之俗介居荒服之外通譯而能書亦已多矣臣知朝廷必不計其意之厚薄而與之較也夫所謂限之以荒服者三代之治葢詳宻矣亦以為不足治何也不欲以逺而勞近以夷而困夏若朝廷以為蠻夷以讎刼為事既已收取其境土而殪其元惡俘其黨類慮其復為異日之患聊用逵卨之徒以守之使其怯於攻討之勢而不來可也萬一有再舉之䇿臣願更且詳思熟講假湖廣之人安息數年俟瘡痍平殄然後留意未可輕議以恢陛下納汙含垢之量臣誠識淺言輕干冒天威元豐八年朝奉郎前知登州軍州事蘇軾登州召還議水軍狀奏曰右臣竊見登州地近北敵號為極邉敵中山川隱約可見便風一帆奄至城下自國朝以來常屯重兵教習水戰旦暮傳𤇺以通警急每嵗四月遣兵戍駞基島至八月方還以偹不虞自景徳以後屯兵常不下四五千人除本州諸軍外更於京師南京濟鄆兗單等州差撥兵馬屯駐至慶厯二年知州郭志髙為諸處差來兵馬頭項不一軍政不肅擘畫奏乞創置澄海水軍拏手兩指揮并舊有平海兩指揮並用教習水戰以備北敵為京東一路捍屏敵知有備故未嘗有警議者見其久安便謂無事近嵗始差平海六十人分屯宻州信陽板橋濤洛三處去年本路安撫司又更差澄海二百人徃莱州一百人徃宻州屯駐檢會景徳三年五月十二日聖㫖指揮今後宣命抽差本城兵士徃諸處只於威邉等指揮内差撥即不得抽差平海兵士其澄海兵士雖無不許差出指揮葢縁元初創置本為抵替諸州莱州兵馬豈有却許差諸處之理顯是不合差撥不惟兵勢分弱以啟戎心而此四指揮更番差出無處學習水戰武藝惰廢有誤緩急伏乞朝廷詳酌明降指揮今後登州平海澄海四指揮兵士並不得差徃别州屯駐謹録奏聞伏候敕㫖神宗時御史中丞蘇轍論渠陽邉事劄子曰臣近論唐義問處置邊事乖方致渠陽蠻寇賊殺將吏乞早黜義問以正邦憲更選練事老將付以疆場經今多日不䝉施行訪聞執政止以臨敵易將兵家所忌為説雖知義問處置顛錯至覆軍殺將而猶復隱忍不即遣代比雖遣衡規徃視然規凡人未曾經練戎事何益於筭徒引嵗月坐眎邊人肝腦塗地臣甚惑之謹按義問所為葢全不曉事留在邊上一日即有一日之害昔趙任亷頗以趙括代之則敗秦任王齕以白起代之則勝葢臨敵易將顧代者何人耳今執政乃以虚文藉口終欲庇之逺人何辜日被塗炭若非陛下哀矜四方亟命賢將徃代則臣恐陷害生靈未有已也兼臣訪聞渠陽諸夷蟠踞山洞道路險絶中國之兵入踐其地雖跬歩不得其便昔郭逵知邵州困於陽光僭李浩從章惇自沅州入過界即敗逵浩皆西北戰將然並有敗無成者地形不便也今聞朝廷已指揮諸道發兵數目不少然將非其人臣恐既不知戰又不知守老兵費財漸致腹心之患深可慮也今朝廷欲棄渠陽然其中屯戍兵民不下數千義無棄之虜中俾為魚肉要須畧行討定使之畏憚肻出渠陽兵民然後為可臣訪聞湖南北士大夫皆言羣蠻難以力争可以智伏欲遣間諜招誘必用土人欲行窺伺攻討必用土兵捨此而欲以中國强兵敵之雖多無益然此可使智者臨事制置難以遥度也臣前者嘗以衆人言謝麟屢經蠻事頗有勞效乞行委任朝廷置而不用葢必有賢於麟者惟乞速遣以紓邊鄙之患至於義問決無可望幸陛下無疑也臣又聞渠陽諸夷與宜州羣蠻相接宜蠻部族衆多若與渠陽諸夷合謀作過勢益昌熾猝難剪滅亦乞指揮廣西預行招撫雖不得其用但勿與協力亦不為無益矣取進止轍又論渠陽邊事劄子曰臣以唐義問處置渠陽蠻事前後乖方致東南第七將王安入界陣亡恐邉患滋長乞速差諳知用兵之人徃代其任又聞義問兵敗之後奏乞棄捐城寨與夷人講和其為暗弱謬妄取笑敵人如此然其事已著伏計朝廷必不復用然外人竊見召還彭孫妄意朝廷欲付湖北邉事兼孫亦以此自任羣議洶洶皆所不曉謹案孫刼竊之餘賊性不改前後委任欺罔貪盜靡所不為今若委以兵柄深恐塗炭湖北非州郡所能禁止葢蠻人背叛不過侵撓邊城若使彭孫作過腹心郡縣並受其毒前者誤用義問止於敗事今者若用彭孫凶嶮多端事有不可知者以臣愚見雖知朝廷必不肻輕用此人然衆所共知不敢黙已若待既用而後獻言實恐於事有損伏乞聖慈早賜施行起居舍人范純仁乞戒飭邊臣勿弛偹狀曰臣近聞夏國累次遣使赴闕禮意恭順外議皆謂漸可罷兵竊知西人頓買漢物數目過多似不為頻來之計臣愚慮或恐分畫地界之際復欲阻兵脅盟臣已指揮沿邊諸將寨柵常為意外之偹更望朝廷戒敕邉臣不得小有懈慢其向來所增軍馬及創添吏員且與存留候將來畫定地界納到誓書抽減未晚盖朝廷舉動中外所瞻固宜慎重及臣所奏請邊防利害并舉辟官屬亦望不付有司特降聖㫖施行免用常格沮礙臨時闕事萬一落賊姦便上貽宵旰之憂則臣不早陳述之罪萬死難贖伏望聖慈留神聽納則天下幸甚純仁同知諫院條列陜西利害疏曰臣前次上殿親奉德音以臣曾任陜西令臣具陜西利害聞奏臣才識淺拙慚無長䇿上裨聖猷謹具管見條列如左一唐以涇原帥府在涇州為四鎭北庭邠寧帥府在邠州為静難軍本朝置逐路總管亦多只在涇邠二州自康定慶厯後來方於慶州置環慶帥府渭州置涇原帥府盖以邉事之際便於照管然事平之後饋運增逺民力倍費所以陜西之民久不完復臣今乞移兩路經畧使只於涇州邠州置府或遇邊事警急可令行營就近照管庶減供饋之勞實於邊事無闕一邉帥多以粮草責不在己務擁重兵於無事之時坐耗軍食及妄興軍旅誘致寇讎或縱熟戸邊人刼掠西界殺害平民為國生事皆非朝廷愛人柔逺之意臣今乞選擇慶渭延秦四州通判令各兼本路經畧判官專主本路粮草及覺察城寨使臣邉人不得誘致寇讎希功生事如能愛惜邉用比常嵗不增供億及將到任至罷任一路糧草比較如有增羨及本路並無生事之人即委監司保明其判官並帥臣並與旌賞或枉費供億粮草虧耗及縱邊人生事者並行責降如此則不惟邊計可實亦使敵人懐我恩信一陜西有沙苑等處監牧草地七八千頃自來養馬别無增息虚占良田今來陜西四塞之地不通漕運若得彼中自出榖食則屯聚大兵易為供贍今乞罷陜西監牧將上件地開為營田募民耕種一頃嵗收公私無慮二百碩則嵗可得一百五十餘萬石以助闗右兵民之食為利不細其所得芻稈自可秣馬以助軍計一方今陜西苦於城寨太多及冗兵冗官為害又朝廷時有試中武藝等人並與班行殿侍送沿邊指使城寨多則分却兵粮冗官多則坐耗邉用及班行等各懼替歸本班難得差遣故人人皆思僥倖以為身謀交構邊事無所不至今乞將閒慢城寨冗官冗兵檢會臣前來劄子委帥臣監司減省其試中武藝等人即乞且送陜西内地易得粮草處差使緩急旋行勾抽不惟惜得軍儲兼免妄生邊事一邊地瘠薄公私難得米糓又山險艱於般運而逐處場務醖酒耗蠧無度每遇邊上兵馬屯聚難得粮草之際裏外賣酒愈多轉致榖米耗竭和糴不行兼一遇凶嵗民即無食官中却輟軍粮救濟今乞將沿邊次邉鄉村酒店課利每月不滿二貫文者並行停閉其州縣城寨酒務亦不得於常年課額外務為增羨庶使不奪民食饑凶之年可減賑貸兼免添起和糴米價大費官錢一解塩之法是為邊偹根本近因法壊朝廷雖曾遣張靖體量亦不能深究利病朝廷以未見弊源重於更制臣恐三二年間粮草亦更虧少今乞檢㑹臣前來劄子令轉運司通管公共講求長久之法庻幾范祥時粮草之數漸可補復一今之商賈富人車馬器服皆無制度役屬良民豪奪自奉盖前世聖王法所先禁今不惟恣其奢僭耗蠧民用而又於朝廷急難之際一有率斂則羣聚興怨今既不可暴行禁止可以因其所欲而為之節文又得財利以資公家之用今乞如秦漢武功爵之類立為散官及衙校名品使富人入粟於邉然後授之即以其名品髙下定為車馬器服僕使屋室之制仍聽贖輕罪如此則國不失權而民皆樂輸不惟可實邊儲亦可漸行内地此亦漢之遺法在聖朝舉行之爾一邉人好食西界青塩雖嚴禁所不能止販者多是邉上强人事敗悉遭逺配邉上强人漸少甚非中國之利今乞於沿邊置𣙜場以茶并雜貨博易青塩盡收入官與解塩同賣仍通入解塩課額其合用茶乞自朝廷賜與其他雜貨即令解塩司管認如此則不惟省刑愛人亦可以固戎心息邉患一陜府虢解等州與絳州每年差夫共約二萬人至西京等處採黄河梢木令人夫於山中尋逐採斫多為本處居民於人夫未到之前收採已盡却致人夫貴價於居人處買納及納處邀難所費至厚每一夫計七八貫文貧民有賣産以供夫者今乞並破官錢收買如官中少錢即許合着夫人戸情願出錢免夫每夫納錢二貫文與官中合破夫粮相兼買梢其監買官仍與别立賞格如此則河防無闕大省民力監察御史裏行劉摯論邉事上言曰臣竊以北敵之為中國患自詩書已來世常有之方今之勢雖效順惇睦服威徳而利金幣然其驕貪之情常能觀伺中國動静一見間隙則造端産謀起事以撼我昔者寶元康定間國家問西夏之罪而遣使肆嫚有非理之求中外憂恐至倍增嵗賂而後已臣愚不足以論事勢然竊有私憂過計以謂今日之故有可以動驕貪之觀伺者臣謹言之昨者綏州用師連兵三嵗皆繇議臣失計理曲而無名北敵之於西夏自以為甥舅之國此一事也今髙麗遣使朝貢將至闕下髙麗自天聖中甞以事請干朝廷朝廷不從遂附庸北敵自是方貢不入王府者數十年矣既已臣屬於彼而一旦面内中國則恐為彼不能無疑此二事也臣以謂此二者彼皆足以藉口而為請於朝廷者也伏況大河之北自戊申以來地大震水大溢民大失職離鄉内徙空虚塞下至於今三年而地震未已此何祥也今歳漳河春役財力並竭中路夏旱二麥不登災變因仍人不寧處夫彼既有以爲藉口又乘民心皇皇公私疲匱禦偹百廢朝廷厭聞邊患之時臣恐敵國見利投隙而區區之信誓豈足以保其心而恃以為安乎彼固不至敢有狂謀假令遣一使持尺書援二事以請於朝廷其用何辤以杜其問一言入境臣恐勞人以繕城械倍估以儲庾廪更易將帥輕用名器張皇擾攘大勞大費而已爾康定寶元之事盖可以鑒也又議者籍籍皆謂髙麗之至有徼幸希功之人誘而召之者使無此理也不過臣為妄言使誠如議者之論則釁自我始西兵之祻覆車未逺安得不先事而言哉伏乞陛下宻詔二府大臣使日夜謀畫以求防微杜變之理而伐其心且河北重地據天下安危之勢願陛下寢食以為念而無忘北顧常務勞來其人民安輯其田里薄征斂之數省煩急之令恤其凋憊足其衣食使樂守生涯而維持其心凡所謂邊備軍政調度之數皆宜因事稍稍經畫藏其用而隱其跡兵法所謂恃吾有以待之者惟陛下留神無忽以消連年地震之異夫無事而言其言若狂而人皆易之有事而言其言雖足以取信而事已無補臣寧以狂得罪不敢後事而為無益之言以負陛下耳目之任翰林學士楊繪論李憲討交趾上疏曰臣伏聞交趾猖狂上負聖化方議討伐雖神謀睿筭已決勝於千里之外而臣不度愚昧敢陳芻蕘出於愛君之切然也伏乞採其狂言臣聞軍志有之善攻者攻其所不守善守者守其所不攻今側聞潭廣易帥修飭守備而南閩泉福之守未聞議焉雖越廣然後抵閩然慮泛海使便風或有出其不意亦未宜忽於守其所不攻也交蠻擾於南方其於出師命將及偏禆之選皆西邉北邉之官素號能者在行然臣亦慮國家鋭意南討而忽於西邉北邊之備設萬一有乘虚掩不備之寇則其憂又大矣則亦非所謂守其所不攻之義也臣所謂西北之備者非謂增兵嚴警張皇其事但隂留驍勇諳練謀慮之將不盡遣行於南討庶乎有以備西北緩急之用也切見癰疽之醫未甞不先用托裏之藥盖治病於皮膚者先必固䕶於心腹此雖醫工之智亦不可謂不知所先後也唯願陛下察其先後而慮乎皮膚心腹之害焉臣又覩招討副使李憲年三十五六官已為防禦使職已為押班況聞有才今仗宗廟之威靈禀陛下之聖䇿功其必成臣願陛下儲思於他日成功之後也成功之後賞爵必崇年又未髙權又益盛乞陛下處之得其當而已伏惟陛下聰聞明覽其於古今安危之機歴代興亡之轍中貴任權之成敗不假臣縷細而述謹按唐憲宗命吐突承璀為行營招討使於時白居易為翰林學士上疏切諫在其集中臣非不知陛下聖徳神功過憲宗逺甚今李憲又止是副使非如承璀之比然臣遭逄聖恩忝在白居易之位而又翰林學士三員鄧綰入試院陳繹出知府本院宿直唯臣一人則臣之榮幸又過於居易臣不欲使唐憲宗朝獨有翰林學士白居易敢言事而陛下聖徳神功過唐憲宗逺甚乃無翰林學士白居易者是敢進其區區伏望陛下赦其狂僭之罪而賜之深思逺慮神宗詔近臣舉士孫固以施州通判李周聞神宗詔對謂曰知卿不游權門識今執政乎對曰不識也識司馬光乎對曰不識也訪禦邉之術曰四邊手足耳若疲中國以勤逺畧致百姓窮困聚為賊盜懼成腹心之憂神宗頷之哲宗即位知慶州范純仁繳進後漢光武詔書狀曰後漢光武報臧宫等詔曰黄石公記曰柔能制剛弱能制强柔者徳也剛者賊也弱者仁之助也强者怨之歸也故曰有徳之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣徳者强有其有者安貪人有者殘殘滅之政雖成必敗今國家無善政災變不息百姓驚惶人不自保而復欲逺事邉外乎孔子曰吾恐季孫之憂不在顓臾北敵尚强而屯田警備傳聞常多失實誠能舉天下之半以滅大寇豈非至願茍非其時不如息人臣伏見夏國差人詣闕多日未見放囬近日探到賊中事宜漸却添屯兵馬必是發情疑阻却欲别生邊患伏望聖慈以陜西生靈之故稍從其欲使復常貢庶幾可以罷兵俾華夏復見太平則陛下好生之徳洽於生靈祖宗社稷享萬世之安皆在陛下一言之賜爾臣常讀後漢光武報臧宫馬武詔書良有深戒臣恐陛下欲聞謹録繳進惟聖心採擇純仁條對手詔所問邉計狀曰勘㑹夏國自神宗皇帝升遐後來遣使吊慰祭奠繼以告國母䘮進遺物今者又復遣使入朝謝恩使人比來外示恭順稍可見矣然戎情狡獪未測其誠心何如耳如向者所得邉地雖建立城寨亦慮孤僻不易應援弃之則弱國威守之則終恐戎人在念卿久在西塞深曉邉情當此宜罄嘉謀輔予憂勞可條具邉計合如何措置向去如何守禦親書實封聞奏無拘以文者臣奉命皇恐不知所措葢臣智識迂昧計慮不長何足以仰承聖問上副天心雖然臣䝉被大恩未有補報敢不竭心悉慮强勉以對以成陛下詢於芻蕘之善臣竊見夏國自朝廷用兵以來近漢之民頗失生業並塞二百餘里不敢耕種其國上下之人皆欲講和又自陛下臨御之初聖政鼎新凡有不便於民者皆為蠲除每詔令一下民間讙呼鼔舞以至印賣傳播謂之快活條貫此事即時聞於敵國又邉上臣寮亦多體朝廷之意不縱侵擾以此夏國必謂朝廷待之異於前時所以遣使入慰探朝廷之意朝廷待其初來之意禮意既厚是以接續肻來以至累次不失恭順而終未敢復言請地者其意應為前來朝廷拒之太峻却慮啟口之後更失朝廷之意則和好愈難今聞夏人又將到闕願選擇押伴臣僚使與推誠語論因而談美聖政及陛下好生惡殺舍已從人之徳彼必有所對答則敵人之情亦可測見若有願和之意則可令作押伴臣寮意度説與自用兵以來甚有陷蕃官吏軍民見在西界宜若夏國盡底納與朝廷聞朝廷待將虜到生口賜還夏國如有邊上未便之事亦可因而陳請朝廷必應量度應副彼若云前來已曾請地入貢䝉朝廷不允則可答云前來請地乞貢是梁氏之意宜其朝廷不允今梁氏已死朝廷於國主必無所難彼若無對答則乞委延州趙卨宣布此意其肻還生靈及來請地則可曠然降詔許之亦不須疑其狡獪難測彼將陷蕃官吏民押在界上即却將向來所得邉地及城寨内外有居漢人屬戸先次漸令移入近裏並勾集前後虜到夏國生口亦在界上先且立定誓表預約日數兩相交還如此措置則取舍有名於國威無損其有向來所得邉地雖是建立城寨其間實有孤僻不易應援供餉之處留之則戎人必須在今之計若以地却換得陷蕃生靈不惟無損國體兼和氣充塞天地陛下聖徳超越古今為中國無窮之利矣若趙卨諭意不肻換易及換易之後尚較計别有邀索則朝廷自可絶之嚴戒邊臣堅壁静守任其所為如此則我直彼曲我逸彼勞我直彼曲則人神共怒滅亡可待我逸彼勞則雖久不來庭於王道無損所有交地之際及宣布之時其間合有意度節次更委趙卨條上不得落賊姦計臣倉卒略具大概仰答聖問未能詳盡如䝉召對尚有口奏事件得以粗陳更在陛下擇而行之天下幸甚臣所知邊事只熟知環慶及粗知鄜延其他路分非臣所知臣今所陳乃王體當然為萬世之法非一時之利害也又其宣布意度及換易事節先須只作押伴臣寮及帥臣意度者竊恐戎人萬一於應對之間失禮不遜則於朝廷無損又將來夏人囬日必有答詔便可奬諭其累次遣使恭順及喻以解仇釋怨罷兵息民之意純仁拜諫議大夫畫夏國疆界三䇿曰以臣竊見前日簾前文彦博等諸執政論疆界事宜其時以諸臣奏對已多臣雖有管見不敢久煩聖聽欲於别日奏陳而臣今病假在家未能如心竊慮夏人在庭議論日逼謹先具條列聞奏若以所得夏國地土換易陷蕃生口如此則便可罷兵息民陛下仁惠之化得以久行堯舜之治可以速成此上䇿也又蘭州定西城聞元是西蕃境土後來方屬夏國已有景徳中誓表更不虜掠西蕃彼雖堅意欲之我亦留之有名徐委邉帥婉順商量雖便未可罷兵彼應難便猖獗此中䇿也又若留塞門吳堡義合而止棄逺處難守二三城寨則朝廷與之不足以示大恩彼雖得之不足以副其欲如此則兵必不解中外難安陛下仁惠之政何由復施勝負安危之機邈未可料所得之地不及秦漢萬分之一廼妨陛下堯舜之政而且有後憂此下䇿也右臣謹條此三䇿上進伏望陛下深賜採擇以為天下國家無疆之福臣稍可勉强更當面具奏陳臣未曾見夏人表章如其過有邀求則雖與地不能息兵非臣今來所料俟臣别具陳奏乞且嚴戒邊臣過作守備凡有所闕盡令陳請朝廷當一一應副庶令責有所歸不至悞事惟中䇿安燾頗與臣合近曾將擬下詔意示臣内有不與中國舊寨一節臣曾簽帖欲其除去然安燾未曾修改應待聖意裁度純仁為武安軍節度副使乞棄廢寨地與西夏疏曰臣伏見陛下臨御以來懐柔西戎恩德備至至於冊封賜地皆出宸斷遂使累年之間戎馬不能犯塞蕃漢生靈全活無數好生之徳格於皇天故使百糓屢登四海豐樂此帝王之盛事太平之大本也近日傳聞熈河邉臣分畫地界各惜向來久廢寨地以為要害未欲給賜致其偃蹇不從以至未能罷兵邊事難了竊恐蓄疑敗謀事久生變萬一姦人間諜復致猖狂容之則虧損國威討之則前車未遠連兵不解勞費無期若或饑饉相因兵民乏食則雖有智謀之臣未易爲計如此則功虧一簣併棄前恩伏望陛下深留聖念特務遠圖不舍易而爲難不以小而妨大檢會元約朝㫖特賜允從遵孟子樂天之言稽虞舜舞干之德則天下幸甚臣受恩至重職與邊臣過計深憂不能緘黙惟陛下矜憐曲加采納又奏司馬光爲陛下陳棄寨之䇿及後來換易生口并降賜封冊臣實皆與其議昧者尚多不以爲然至朝廷力行浮議方息今與西夏君臣體分已定惟有分畫地界所較不多若是去城寨二十里内雖敵人無厭亦可以理開諭必肻依從以臣愚慮但恐邊將貪功生事不樂罷兵將去城寨二十里外聖恩已許給賜或向來用兵之時不曾保據之地指爲要害却欲築城占守則虧朝廷大信悞國家前謀不可不察議者或謂夷狄無厭與之必將更有邀求竊以祖宗朝兵勢國力尚因徳明歸順賜以數州元昊稱臣加國主之號葢欲安民息戰不以小利玩兵後來彼國果自服從亦何甞更有干犯而況今日所損利害絶小惟聖明深慮昔樊噲欲以十萬行匈奴中季布指爲面謾武夫邊將之言多若此類上誤先朝不少今可爲鑒純仁又乞早分畫西夏地界疏曰臣近入劄子爲夏國分畫地界未定恐邊將靳地失信復致用兵所陳利害頗明必已上達天聽近日伏覩樞密院指揮及諸路闗報西人頻有㸃兵侵犯漢境或聞邊將多亦乘此希功先動恐至秋涼再爲邊患臣是以夙夜過計不敢緘黙臣伏見陛下始與司馬光等議定大計今乃爲邊將貪鄙之論沮害遠圖前捨四處已成之寨換易生口以示輕地愛人之德今乃傳聞復留兩堡從來不守之地再起事端以招纒兵致寇之患昧聖君舞干之化進市道茍得之謀則其是非輕重不待詳陳葢今日靳地之邊臣多昔年生事之黨類朝廷若不早悟必恐復繼前車將致聖恩無由下通天威不以義動生靈受弊後害難量臣之區區實在於此日近坤成節夏人進貢在庭若有所請不至乖悖伏望聖慈特賜寛納或令押伴宣諭所有地界早令分畫或邊臣未能宣達朝廷詔旨有所不盡特許奏陳候朝廷相度指揮然後嚴戒邊臣分畫地界並依已行詔㫖不得虧失大信别起事端雖云敵人貪婪必亦難生怨叛息民偃革指日可期則天下幸甚臣前來所上劄子更乞檢會看詳特垂收采純仁又乞戒邊將不得生事䟽曰真廟朝與契丹講和懐撫有道兩國情通小人不敢生事間諜今將百年生靈安帖自古和戎所未曾有今來西夏雖是小國亦未可輕況自興兵已來恩信未孚動生疑阻加以邊將慣得厚賞樂於生事邀功多是先自引惹却稱西人侵犯構起邊患朝廷不知致使敵人之情無由通達此風不除難得安静伏望朝廷常加審察歴代名臣奏議巻三百三十
