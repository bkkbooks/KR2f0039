body:
  text: 歴代名臣奏議卷二百四十二明楊士竒等撰馬政宋太宗端拱元年國子博士李覺上奏曰臣聞冀北燕代馬之所生敵國之所恃也故制敵之用實資騎兵為急議者以為欲國之多馬在啗敵以利使重譯而至焉然市馬之費歳益而廐牧之數不加者盖失其生息之理也且敵人畜牧轉徙馳逐水草騰駒㳺牝順其物理由是浸以蕃滋也暨乎市易之馬至於中國則縶之維之飼以枯槁離析牝牡制其生性𤣥黄豗隤因而減耗宜然矣又不同中國之馬服習成性食枯芻處華廐率以為常故多生息日無耗失古者用賦之法六十四井出戎馬四疋車一乗牛十二頭天子畿方千里提封百萬井除山川城池邑居苑囿三十六萬井不輸賦外六十四萬井出戎馬四萬疋兵車萬乗此賦馬之數也諸侯大者馬四千疋車千乘故稱千乘之國卿大夫者馬四百疋兵車百乗故稱百乗之家則天下之廣諸侯之衆戎馬之賦多矣是以唐堯暨晉皆處河北而北敵不能為患由馬之多後世戎馬悉從官給是以匈奴歴年為患由馬之少也故晁錯說文帝勸農功令民有車騎馬一疋者復卒三人謂免三人甲卒之賦也至武帝七十年間衆庶街巷有馬千百成羣乘牝者擯而不得㑹聚此則馬皆生於中國不聞市之西北也今軍伍中牡馬乘多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠養馬之卒有罪無利是以駒子生乃令飲灰而死其後官司知有此蠧於是議及養駒之卒量給賞緡其如所賜無幾而尚習前弊今切揣量國家所市戎馬直之少者疋不下二十千徃來資給賜予復在數外是貴市於外國而賤棄於中國非理之得也國家縱未暇别擇牝馬以分蓄牧宜且減市馬之半直賜畜駒之將卒増為月給俟其後納馬即止焉則是貨不出國而馬有滋也大率牝馬二萬而駒收其半亦可歳獲萬疋況復牝又生駒十數年間馬必倍矣昔猗頓窮士也陶朱公教以畜五牸乃適西河大畜牛羊于猗氏之南十年間其息無筭況以天下之馬而生息乎仁宗慶厯四年知諫院余靖上奏曰臣伏覩國家自來於河東陜西沿邉等處估買蕃馬近自西賊不庭以來買馬數少不足國用此盖中國乆隳馬政不能蕃息至于專仰西蕃之馬以成此弊臣謹按詩書已來中國養馬蕃息故事乃知不獨出於西蕃也秦之先曰非子居犬丘好馬及畜善養息之周孝王召使主馬於汧渭之間馬大蕃息犬丘今之興平汧渭今之秦隴州界也周官校人之職春執駒以養血氣夏攻以防蹄齧衞文公居河之湄以建其國而詩人歌之曰騋牝三千不言牡而言牝則牝為蓄息之本也衞則今之衞州也詩人又頌魯僖公能遵伯禽之業亦云駉駉牡馬魯今屬兖州左氏云冀之北土馬之所生即今鎮定并代皆其地也月令季春之月乃合累牛騰馬遊牝于牧仲夏之月遊牝别羣則縶騰駒亦秦人之馬政也漢之太原有家馬廐一廐萬匹又樓煩北地皆出名馬即今之并嵐石隰界也武帝出攻匃奴官私馬十四萬匹於漢之馬最為多矣唐以沙苑監最為宜馬即今之同州也又案唐自貞觀至麟德中國馬四十萬匹開元中置七坊四十八監半在秦隴綏銀則知古來牧馬之政修之由人不在於地臣竊見今之同州及太原已東相衞邢洺皆有馬監其餘州軍牧地七百餘所伏乞特降敕㫖於羣牧使所都監判官等内差一員往監牧舊地相度水草豐茂去處揀擇孳生堪牧養馬專差人員牧于四逺牧放一依周官月令之法務令蕃息别立賞罰以明勸沮庻㡬數年之後馬蓄蕃盛嘉祐五年羣牧使宋祁上劄子曰河北孳生監馬母數少逐年有妨孳配勘㑹麟府州馬最宜孳生准先降條貫其馬作五等收買第一等一十八疋端至第五等各減一疋後來宣命於逐等上例各減絹二疋第一等馬見今只有十六疋端蕃漢興販人戸别無利潤致騍馬轉少竊恐諸監毎年漸見孳茂闕額有誤將來支配諸軍本司今相度其麟府州所買五等騍馬欲乞權於舊條未經減絹牧馬五等價内將第三等以上各特添絹二疋第四第五等各特添一疋仍令逐場買馬及三五十疋旋計綱上京赴估馬司交割從本司再行揀選埒為好馬雜馬兩等轉送孳生諸監添助蕃息臣等又見漢武帝時為將軍騎馬少乃令天下諸亭養馬歳課孳息即知權宜立法古今一體如將來諸監母馬數足即却依元降條貫施行一則招來興敗人户將好馬中官二則三數年内孳生駒口漸多準備緩急支填戰馬無闕取進止宋祁又上奏曰臣頃年為羣牧使其時曽擘畫欲於諸監市母馬合見馬共成五七萬疋一歳大約得駒五萬不出五年得二十五萬就中破死損十分之二得駒二十萬於二十萬中選出負䭾馬十分之五得戰馬十萬疋以為中國有此馬可與敵國相馳逐使聞風畏威不敢有闚邉境意是時西事已定朝廷求安便忽略此事有司指擿臣奏以為迂闊但言放牧之地侵損民間膏腴田疇有損無益於是寢廢且馬者兵之本倉卒求之不可得若無事時歳月孳養臨事乃無闕乏臣欲乞選左右名臣議羣牧養馬法收還牧放舊地多列廐庌檢詳新舊條約擇取便宜如臣所請具為新制及罷河東陜西馬禁許民間與蕃落自相貨買及許天下民養馬敕州縣不得計在貨財之限其牧馬臣且以十年為期若歳歳孳養當得二十萬疋而天下百姓所養馬亦益多假令西北二邉敢為風塵則我兵足馬健與之角戰誠不足畏今天下馬軍大率十人無一二人有馬而所習伎藝與歩兵不同緩急不堪移充歩人使喚今軍人無馬是國家虚養此兵有名無實臣舊知牧馬數不多於中選取戰馬即又數目益少此事最為用兵切務伏乞朝廷深以為意宋祁又上奏曰西北二邊所以能抗中國者惟以多馬而人習騎此二邊之長也中國馬少又人不習騎此中國之短也每至敵來作過則朝廷常以所短敵所長是以十戰十負罕有勝理今議者但欲益兵破敵不知無馬且不能為兵也用兵七年終不聞講牧馬之制此寧朝議未之思乎今羣牧司管河北凡十監其五監畜孳生馬五監畜大馬然未嘗有數登十萬疋者何其弱也今河北洺衞相北京五監之地皆水草甘凉可以蕃息但官非其人不能盡法牧養何者馬數雖増未之賞馬數雖耗未之罰急則括買民馬茍以充數既不可用徒有芻秣之費驅之邉境未戰而凍死者十八九矣又聞河北洺州廣平舊有三監今惟一監存焉欲望朝廷差有智識近臣按求舊地復為三監澶州舊有東平監水草地氣與洺相一體亦可興復此二監合河北六監通為十監每監以一萬疋為定額如國家牧養得人則五年之間可以自養及額餘數則可以分入河南鄭許西京三監及在京騏驥院天駟天廐諸監坊矣同州沙苑一監地尤宜馬今却只畜大馬不令孳育殊乖所宜欲望朝廷許將父草馬五千就沙苑分左右兩監委官益占官地謹加牧放五年之間亦可得數萬七年之後可支陜西縁邉諸州戰馬之闕矣歐陽脩上奏曰臣所領羣牧司近準宣差吴中復王安石王陶等同共相度監牧利害事竊以國馬之制置自祖宗嵗月既深官司失守積習成弊匪止一時前後因循重於改作今者幸䝉朝廷因言事之官有所陳述選差臣寮相度更改臣以謂監牧之設法制具存條目既繁弊病亦衆若祇坐案文籍就加増損恐不足以深革弊源如欲大為更張剏立制度則凡於利害難以遥度必須目見心曉熟於其事然後可以審詳裁制果決不疑盖謀於始也不精則行於後也難乆況此是臣本職豈敢辭勞欲乞權暫差臣仍於呉中復等三人内更差一人與臣同詣左右廂監牧地頭躬親桉視至於土地廣狹水草善惡歳時孳牧吏卒勤惰以至牝牡種類各隨所宜棚井温凉亦有便否嚮何以致馬之耗減今何以得馬之蕃滋既詳究其根源兼旁采於衆議如此不三數月間可以周遍然後更將前後臣寮起請與衆官參詳審處與其坐而遥度倉卒改更其為得失不可同日而論也臣又竊思今之馬政皆因唐制而今馬多少與唐不同者其利病甚多不可悉舉至於唐世牧地皆與馬性相宜西起隴右金城平涼天水外暨河曲之野内則岐豳涇寧東接銀夏又東至於樓煩皆唐養馬之地也以今考之或陷没邉裔或已為民田皆不可復得惟聞今河東嵐石之間山荒甚多及汾河之側草地亦廣其間草軟水甘最宜牧養往時河東軍馬常在此處牧放今馬數全少閒地極多此乃唐樓煩監牧地也可以興置一監臣以謂推迹而求之則天池三監之地尚冀可得又臣徃年因奉使河東嘗行威勝以東及遼州平定東見其不畊之地甚多而河東一路山川深峻水草甚佳其地髙寒必宜馬性及京西唐汝之間乆荒之地其數甚廣欲乞更下河東京西轉運司差官就近於轄下訪求草地有可以興置監牧處如稍見次第即乞朝廷差官與羣牧司官員同共往彼踏行擘畫若可以興置新監則河北諸監内有地不宜馬處却可議行廢罷惟估馬一司利害最為易見若國家稍捐金帛則劵馬利厚來者必多於其多中時得好馬若有司惜費則蕃部利薄馬來漸少兼亦好馬不來然而招誘之方事非一體亦須知其委曲欲乞特差羣牧司或禮賔院官一員直至秦州以來體問蕃部劵馬利害凡此三者雖暫差官比及呉中復檢閲本司文字講來商議未就之間已各來復可以參酌相度庶不倉卒輕為改更如允臣所請乞賜施行六年歐陽修為樞宻副使又上奏曰臣為學士日兼充羣牧使朝廷以馬政乆弊差呉中復等與臣共議利害欲有改為未見得牧地善惡多少難為廢置欲乞差官先且打量牧馬草地次臣遽蒙恩擢在樞府所有牧馬利害商量未了事件臣有愚見方欲條陳今聞諸監所差官各將前去竊縁監牧帳舊管地甚多自來界至不明官私作弊積乆為民間侵占耕種年歳已深昨已差髙訪等根括打量人戸多稱父祖世業失却契書無憑照驗但追呼搔擾而已今若更行根究必亦難明徒為追擾未見其利民先被害臣欲乞令差去官只據見在草地逐段先打量的實頃畒明立封標界至因便相度其地肥瘠宜與不宜牧馬其廢置更改候逐官回日令相度牧馬所據利害擘畫申奏其已為民間侵耕地土更不根究盖以本議欲以見在牧地給與民耕豈可却根究已耕之地重為搔擾至於民間養馬等事利害甚多臣當續具奏聞其不根究侵耕地土一事伏乞先賜指揮仁宗時中書舍人丁度言祥符天聖間牧馬至十餘萬其後言者以天下無事不可虚費遂廢八監然猶秦渭環階麟府文州火山保德岢嵐軍歳市馬二萬二百匹補京畿塞下之闕自西鄙用兵四年所收三萬而已馬少地閒坊監誠可罷若敵平馬歸則不可闕今河北河東京東西淮南皆籍丁壯為兵請令民畜一戰馬者得免二丁仍不計資産以升户等則緩急有備而國馬蕃矣神宗熈寧五年樞宻使文彦博論監牧上奏曰臣聞國之大事在祀與戎戎事之中馬政為重馬之有牧其來尚矣禹貢之萊夷作牧周官之牧田任逺郊之地宣王中興之主則有考牧之詩僖公遵伯禽之法則有在坰之頌盖日中而出所以遂物性而生息也漢唐之盛苑監實繁祖宗以來修舉甚至七八十年蒐補取用源源不絶熈寧元年陛下特降詔㫖剏置南北監牧使設官振職其制益嚴若有未至自當増修而近時議者多不深究本末熟詳利害乃欲賦牧地與農民斂其租課散國馬於編戸責其孳息即不知所賦之地肥瘠皆可畊乎所斂租課豐凶皆可得乎復不知戸配一馬縶之維之皆可蕃息乎既不蕃息則後將可繼乎或謂監牧之馬率多少弱既非齊力難勝具裝且馬既蕃庶必有駑良量材用之所得不少張萬歳典牧最為盛多以至馬直一縑若計所直豈皆良馬又謂縁牧所費殆將不貲歳月計之有損無益臣嘗謂計河北監戸歳入牧地之租可充吏兵之費所不足者亦無幾焉唯河南諸監所入尚少漸増地利亦可自充如此則仰給度支者不多所收馬課亦不少大率草馬二萬歳收六課為駒一萬二千三歳之中若失其半猶得六千疋駑良相參匹直十五千是歳獲九萬貫此就小計之所得不少矣今若取一時浮淺之議則廢之甚易他時却欲復祖宗之制則興之甚難坊監廐庫棚庌井泉官廨營房七八十年經營成就若廢罷之後蕩然一空却欲復之功費愈大如向時廢罷茶法自後議欲復故而園戸彫殘場務破壊言者雖衆竟不能復必若采廢置之言即乞委詳練典故奉行馬政臣寮博求利害而審處之利百則變乃無後悔臣總領國馬于今八年雖未及蕃息而頗究利病伏望聖慈裁察六年文彦博又論保馬曰諸州郡坊郭第四等户縣郭第三等鄉村第二等以上户生計從容皆須養馬以代徒歩之勞其物力髙則養馬愈多此皆不待官中勸率召募固已家有而户畜矣若先時更使等第畜馬定以匹數須壯嫩及格尺者居常任民騎出入歳時亦不得勾㸃煩撓一旦官中須要給以元契之直可旦暮而集人自樂輸比之急暴而科買利害不侔矣今四等以上人戸𩔖出役錢所出役錢之多悉在上等人戸今若蠲減上等租稅則下等戸所出不充顧役之用必見闕事民既知緩急必取馬於民安得不家牧戸畜以應一日之督責哉丁産簿法以三歳一造今非其時又頻歳灾傷民流徙者衆今若非時重造徒成搔擾若伺候至豐年行之未晩哲宗時陳次升奏曰臣伏覩近降朝㫖給牧地召人戸情願養馬事條約雖已詳備然元初只縁知邢州張赴同任縣堯山縣知縣等起請指揮河北東西京東西京西北河東路提刑司府界提舉司遂有此施行更不令轉運提刑司相度及只是因邢州以謂置監養馬不便其餘路並依此施行馬為國用所繫甚大措置之始宜在詳審今赴之所見只是一州利害其他路分或有不同今朝廷不令提轉立定條制令河北河東西五路依此施行臣切慮諸路各有利害為是朝廷不令監司相度又是已行之命不敢申禀兼赴既有申奏以人戸請佃牧地為官養馬人戸或有不願赴以州郡之勢須令投狀則法行之始或有不便必為民害臣聞輿議以謂牧地鄰近人戸若得膏腴之地必有願者若去牧地稍逺雖得其地難以往彼耕種必非所願兼一頃之地所直不多馬或倒死其馬及官格尺者不下四五十緡此恐人又非所願兼牧地先是已有人承佃今不願養馬遽然奪去必致失所臣欲望朝廷明降指揮令諸路若有利害不同許令申禀州縣若抑令人戸作情願投狀養馬者令監司按劾施行法行之後永乆無弊髙宗建炎元年尚書右僕射李綱上言曰臣竊以馬之於軍旅其用大矣而馬政之不修未有如近年者自監牧之法廢而為給地牧馬州縣行文具以塞責民間養羸瘠以充數而茶馬司惟以博易珠玉為事無良馬焉燕山陷沒北邉之馬又皆為敵國所得夫金人專以鐵騎取勝而中國之馬耗亡如此何以禦之臣頃在宻院嘗獻言請括買天下之馬及許客人結攬陜西綱馬赴京師其說謂凡養馬者必是上戸及吏人醫官僧道之流立三等價下州縣括買之未為厲民而旬月之間數萬之馬可具凡以濟一時之乏又陜西綱馬管押至京餽養不時死損過半令客人結攬則逹者必多又請復監牧之制而朝廷許令相視監牧結攬綱馬如所言獨不行括買之令靖康末金人既破京城首下令取馬違者誅族凡得馬萬餘疋而京師之馬為之一空是吾所有者不能用之而反以資敵得不為失計乎今行在之馬不滿五千可以披帯者無㡬權時之宜以奮張軍容非括買不可宜先下令非品官將校不許乘馬然後詔州縣籍有馬者以三等價取之嚴隠寄之法重騷擾之禁奉行有緒稍激勸之則數萬之馬尚可得也又命陜西四川茶馬司益市馬而廣西鄰特磨道亦有可市者募客人結攬送納以給諸軍及分給沿河江淮間帥府要郡然後舉行祖宗監牧之制擇官委之待以歳月則馬不患乎不蕃庶可以足軍旅之用紹興六年翰林學士朱震上言乞諭廣西帥臣凡市馬當擇謹厚者任之毋遣好功喜事之人以啓邉釁異時南北路通則漸減廣西市馬之數庶㡬消患於未然詔從之髙宗時吕頥浩奏曰臣世為北人聞諸宿將皆曰平原淺草可前可卻乃用騎之地騎兵之一可禦歩兵之十山林川澤出入險阻乃用歩之地歩兵之一可禦騎兵之十自金人南牧以來中原之兵與金人相持未交鋒而輙奔潰者以平原曠野金人騎兵衆而中國騎兵少故也昔馬伏波於交趾得駱越銅鼓乃鑄為馬式因表曰行天莫如龍行地莫如馬遂鑄銅馬式於魯班門外號曰金馬門又西漢元狩年以後不復擊匈奴者以漢馬少故也恭惟陛下臨御以來留意馬政然關陜諸州半陷北敵四川道路通塞不常戰馬難到行在惟廣西一路與西南諸蕃接連宻邇黎雅等州日近綱馬節次到來諸軍頗以謂堪備出入行陣欲望明詔有司於邕州置買馬司差有風力臣僚一員充提舉官收買綱馬契勘四川秦鳯路祖宗以來以茶易馬故川路各有茶馬司竊聞西南諸蕃貴重中國絹帛毎歳不惜十萬縑可以買馬數千匹今欲禦捍彊敵經理中原較量輕重十萬縑或可輟那所有起發綱馬事乞命有司採訪秦鳯路茶馬條法叅酌施行中書舍人洪遵論買馬博易劄子曰臣攝承宻㫖竊見川路西和階文州買馬以歳計之凡七十五綱為馬三千七百五十疋十數年來茶馬司以茶絹博易珠犀等物以致歳計匱乏不免低價買馬不擇駑驥惟務足額發綱之時已有病者況於陸行萬里經渉歳月比其至此大半瘦瘠曽不旋踵即有損斃不惟押綱吏卒空靡俸賜徒有買馬之名而無實効雖近降指揮住罷博買他物竊慮循襲未革臣愚欲望聖慈戒飭茶馬司今後專一收市駔駿臨當發時常切察視無令胥史並縁為姦以病馬充數庶㡬上駟沓來可備廐圉不致耗費官錢虚増道路供億之煩所有黎叙長寕南平等州及廣西邕州應干買馬去處徑撥赴諸軍者亦乞一例施行洪遵繳羅殿蕃進馬指揮又上言曰臣竊見比年以來川廣收市駔駿以給内外諸軍未嘗有闕今來羅殿蕃剏乞貢馬於祖宗故事元未之有此固陛下聖德休明逺人慕化樂輸方物以示懐德書之史䇿誠為太平盛事然臣悾悾愚見竊有所疑敢摭其五事為陛下言之邕州舊與交人為市毎歳得馬分給江上諸軍雖於諸道頗為煩費然循習既乆民以為常今若剏於宜州受羅殿馬又須於邕馬不經由處合置新驛州縣受弊其事一也臣詢之知馬者云馬出夏國者為上部落者次之茶馬司所買熈河馬又次之川産杜生馬為下至於南蕃所産雖外貌權竒其實昻首而不能俯毎行三數十里輙已喘乏徒為觀美則可以之戰陣則又逺出川馬之下其事二也邕州所市交馬積有歳年金帛酬之不為不至然蠻人無厭小不如意則愆期邀價多以物貨濫惡為辭今羅殿蕃自云逐年亦賣馬於横山近與毗那國為仇道路梗塞遂由宜州此一偏之說固不可信安知其非交趾屬部或與之有隙借重中國以自救觧或交人欲生釁詭為此計異日得以歸曲於我其事三也吕愿忠帥廣西貪功生事招誘南丹州莫氏使之納土當時朝廷醲賞過於軍功而種𩔖未補官者尚百餘峒至今紛紜不已今羅殿蕃欲入貢乃因南丹遣山子效用曉報則獻馬之計豈其素心將來恃恩望報恐非莫氏之比其事四也邕州守臣例於銜内帶安撫都監及提㸃買馬公事置司設屬每歳買馬帥司又遣幹官同蒞其事所費不貲宜州守光盛志在幸賞若遂此請將來必乞與邕為比又増逺方之害其事五也且羅殿所稱曽於咸平二年元祐二年以來自南平軍入貢臣恭考國朝㑹要及實録是二年間只有張羅二蕃入貢初無羅殿之事臣竊詳今來指揮令廣西帥憲司共議如於邉界不致生事及宜州置場委有利便方許保明可謂洞究利病然臣竊恐邉隅之臣不務逺慮乘朝廷指揮頗嚮其說必遣人深入蕃界啗以厚利今日以徃馬必踵至將來雖欲為之限約固不可得宜州多事必自此始正使歳得千馬何足以為天廐重輕而令南方乆安之地遂貽無窮之弊此臣所以私憂過計不能自己伏望聖慈特軫宸抱行下宜州只依廣西經畧司所陳今後遇羅殿蕃馬入界如願中賣則令就邕州横山塞貿易或係進貢則須令齎祖宗以來所獲告勅牌印之𩔖辯驗即許照舊例從南平軍路入貢所有前件録黄臣未敢書名行下謹録奏聞孝宗時四川宣撫節度使虞允文上言曰臣聞用兵不可以無馬市馬不可以非其地有百萬之兵無馬以壯軍勢而用其勝力於追犇逐北之際與無兵同有十數萬之馬不生其水土而馴知其人心服習其道里與無馬同臣嘗考古驗今而得其明效者如漢任尚之討西羌屯兵二十萬曠日無功虞詡以為兵法走不逐飛而虜皆用騎來如風雨去如發弦我以歩追之勢不相及若市馬萬騎則追尾截疾而大功可立尚用其計以有丁奚城之勝如晉侯用鄭小駟慶鄭以為乘異産以從戎事及懼而變將與人易晉侯弗聽以有韓原之敗況今日之事敵以多馬為強我以無馬為弱強弱之所以異三尺之童皆知之馬政其可以不議哉國家盛時陜西買馬歳以四萬匹為額自失熈秦之地始措置於文黎二郡盖用不得已之䇿也以二十年計之銀幣茶錦之費亡慮數千萬而馬之出蜀不死者有幾至分𨽻諸軍而存者今又有幾自去年夏秋盡得熈秦故地而蕃戸之馬可誘而致殆天相陛下恢復之機也若歳得一二萬匹以佐軍用其視文黎所得孰優孰劣馬綱之所歴道路孰逺孰近而馬之死於半途者又孰少孰多也臣愚以為若損文黎州馬額之半而藉其金幣之費而盡力於西邉之馬則文黎之責輕而可以揀擇熈秦之得多而可以為百戰百勝之實用昔唐魏元忠謂西蕃恃馬力以為強若増價市之乃是損彼之強為中國之利王忠嗣為河西隴右節度髙估馬價而西蕃争賣馬由是戎馬少而唐兵益強如二臣者可謂知重輕矣臣比聞敵載銀二十萬買馬於西邉伏望聖慈特出睿斷早賜施行不獨本朝兵勢賴以盛強而亦潛消西北二邊之患也荆湖北路安撫使張孝祥上奏曰臣竊惟中興以來馬政不修歳歳博買其費巨億而諸軍之馬愈更乏少此則牧養之道未得其宜故也今朝廷方議置監欲還祖宗之舊若措置得宜則省國用振軍威制敵國於是乎在盖政事之大者不可茍且嘗試而為之也今若諸軍分養則與前日之撥綱馬略同諸軍茍於得馬不復為經乆之計一二年後稍有折閱則又將以辭自解謂荆襄非宜馬之地如此則東南長無牧養之利必資諸蠻而後可耳臣愚欲望聖慈特出聦斷於近臣中不問文武擇知馬者一二人令行荆襄淮南境中與諸軍帥守臣寮深圖地土水草之宜國朝以來所置監牧已行故事叅酌去取具以上聞取自聖裁專置一司付以事權嚴為黜陟之科責其成功如此則宣撫司所買四千匹不為虚費假以歳月朝廷真得牧馬之用須至奏聞者敷文閣待制四川置制使范成大奏曰臣勘㑹趙楙劄子乞緩黎州一年馬額令臣相度以聞臣自到官以來蜀人言黎州買馬利害者甚多大抵與趙楙今來所陳相𩔖事理明白衆論如一委是可行但慮議者必謂祖宗時西北馬多不賴西南夷馬為用故止以為羈縻蠻夷之術與今日事勢不可臣稽之蜀人之論則以為權免立額示以不急使蠻人不得挾以為重反邀中國而蠻人所須茶綵之𩔖皆是朝夕急須其所産馬不賣之中國將安所用故不患其馬之不來正如趙楙之說臣竊謂衆論既皆如此不若且用其說宻諭提舉買馬官權與不拘歳額若蠻馬自如常年而至有司既不怵於殿最可以揀擇良駿其價亦可少平恐亦未必不及額也年歳之外果見成効則遂可乆行邉州稍重外侮漸消於制御彈壓蠻夷之術至為利便萬一縁此馬不時至别議改法亦不為晩更合取自睿斷施行知夔州王十朋奏狀曰准樞宻院劄子樞宻院奏知夔州張震申所有四川宣撫司措置川蜀馬綱改移水路事件委有未便去處申乞詳酌施行奉聖㫖除打造舟船外其餘事件並令呉璘管辦其舟船令王某疾速應副臣契勘馬綱利害前知夔州張震及諸司論列已詳其中利害之大者莫過於財與力二者皆出於民臣自入境以來切見夔峽之間土狹民貧面皆菜色衣不蔽體非江浙荆湖諸路之比為監司守令者儻能皆勞心撫字無一毫之擾猶恐不能活之況今馬綱之害極重財力必當大困臣濫居牧民之任不敢不以實聞今來茶馬司及宣撫司所買馬每歳計一萬八百餘匹約計二百一十六綱本州若循環起發合用船三十餘隻毎隻打造約費八百餘千馬船易壊勢須一年一易計一歳之費為錢三萬六千緡自夔至歸水路二百四十里毎綱梢工水手約九十人較一歳之終為工一萬八千人毎人口食顧錢約五百文上下水約一十五日通一歳計之當費錢十二萬貫草料批劵亦不下二萬餘緡較一歳之間費於馬綱者盖十五六萬貫矣本州三縣所管梢工水手不滿四五百人若循環不替所少猶半必當役農民而為之而夔之民力既困如此若又從而役之必有流離轉徙之患本州毎年財賦之入不滿二十萬合起上供折估經總制及官兵請給皆在其内今馬綱之費侔於所入之賦雖曰令呉璘管辦豈能賞所費十之一二財非天降地出又必取之於民而夔之民貧如此財何自而出耶以一州推之則一路諸路之困又可知矣況水路正行瞿塘灧澦之險又有惡灘二十餘節水勢湍急濆漩頗多馬性善驚聞灘聲洶湧必致跳躍不可控馭撼動舟船必有覆溺之患臣昨在饒州親見馬綱經過渉咫尺之渡中流遇風十死八九況千里之至險耶若舍舟用陸則自夔至峽皆重崗複嶺上倚絶壁下臨斷崖行人攀縁鼓慄汗下遇雨泥滑尤不可行非特有害於人兼亦非馬之利若欲削平險阻便馬之行非惟重困民力又恐有害控扼之險非所以保䕶全蜀也臣所論利害皆是目見茍坐視一路生靈之困不以奏聞則上孤陛下任使之意將負不忠之罪矣伏乞聖慈特降睿㫖令馬綱復行舊路以安逺人不勝大幸十朋又上䟽曰臣伏䝉聖恩頒賜御劄謂軍機之務馬政為先臣仰見陛下居安慮危不忘武事修車馬而備器械盖欲如周宣復古之時又謂撁駕之役並用廂禁軍貼以呉璘正兵皆不科擾於民臣又仰見陛下仁心愛民如武王之不忘逺也又謂回船泝流頗費程限須多作畨次免致稽滯又令臣身率以先共圖成効又足以見陛下雖居九重之深洞見四方萬里之逺閭閻疾苦無不備知不以臣為愚不肖不足以備使令戒敕丁寧俾輸犬馬之効況臣蒙誤恩擢居帥閫固當身先卒伍不憚勤勞然臣螻蟻之誠不敢隠黙馬綱改行水路為巴蜀之病臣前已具奏及監司帥臣皆已力言之不敢再瀆天聽若夫撁駕之役易民以兵道路皆知陛下之仁心以臣愚見參以輿議則亦有未便者蜀江號天下之至險與其他水路大不相侔瞿塘灧澦及諸惡灘宻如竹節巴峽之民生長於水者以舟楫為家梢濆撇旋攲桅側柂於波濤洶湧之間習知水道之曲折操舟若神猶不免時有覆溺之患彼卒伍軰自少長黥涅坐食軍門與水性素不相諳一旦強以牽挽必至觸石破碎人馬俱斃無疑矣又三峽束江斷崖絶壁挽舟者無所寘足攀縁而過如猿猱然兵卒豈能為之況宣司正兵皆西人尤不善操舟雖貼無益馬綱之來急若星火州縣既無可以牽駕之卒官吏以獲罪為懼其篙工水手必不免役民以充之雖聖㫖不欲科擾於民其勢不得不至於科擾又夔峽為四川門戸長江上㳺正賴此曹守禦控扼以壯天險之勢然土狹人稀廂禁軍類多缺額諸州毎以招填不足為憂重以出戍於夷陵防秋於諸處者非一所存無幾若又役以撁駕疲於徃來以無幾之卒伍應無窮之馬綱非惟耗費錢粮妨廢教閱正恐州郡空虚因致意外之患非細事也況茶馬司歳發馬一百六十綱而宣司不與焉除自五月至八月江流泛溢瞿塘不可上下舟航當戒謂之住夏一歳之間可發歳額之馬者凡八月毎月計二十綱毎綱用三船毎船用十五人十綱為一畨則用四百五十人上下二畨則倍之為三畨更替則又倍之臣所論者一州乃馬綱已經過而目所親覩者爾馬綱過夔府一路者凡六州通而計之則毎畨計二千七百人上下畨計五千四百人三畨更替計八千一百人若更欲多作畨次非惟兵不足用而舟艦亦無臣所治者夔州也夔為帥府係屯兵之地而數猶不足其他如涪忠萬等州廂禁軍多者不過四五百人少者二三百人歸州所管止百餘人其間又有剩員半分癃老疾病者居其半若盡駈而為梢工水手為一畨且猶不足況欲多作畨次耶臣愚以為不若且行舊路舍危就安或以山險馬瘏為慮宜於鄂渚漢陽諸處置監以休息之壯者發至行在病者留以牧養水草既便馬必蕃育亦可以為江淮荆襄警急之備固亦無害其為馬政之修也臣非不欲率先奉行以荅知遇實以馬綱行水利少害多他日或致生事上貽陛下西顧之憂則臣誤國欺君之罪不容誅矣況此事干數路所繫非輕伏望聖慈出臣此奏令兩府大臣議之參酌施行不勝大幸員興宗議國馬曰臣聞固國之方在於置衛置衛之實在於市馬使四邉得才幹之吏有司有責實之政馬何由而不至衛何由而不備雖因古之法時増損之臣亦以為有餘矣盖五代之末監牧多廢官市多闕國馬遂不蕃庻自我國家之興遂大葺治每歳遣使多方命官太宗皇帝興國之初詔市一十七萬咸平已後其政大修諸坊諸軍積至二十餘萬飼馬兵校多至萬有六千遍至芻藁亦近七十餘萬標占坊監亦總四萬餘頃撿示牧事纎悉至此可謂備矣雖周之初設養校之官多牧庾之職亦不敢望吾祖宗之世也恭惟陛下豐德大業隨弊指顧應時寧一只如川秦牧事尤切加意務選清強之吏逺以蒞之此乃國政總核之實也臣固蜀人曽吏牧司市馬西方躬見其事敢為陛下言之盖川秦所分市馬之地陜西則階文西和等州四川則黎叙南平等處毎處置務毎務置官内陜西只就宕昌博易至要至便然臣觀川秦博馬之物不過數四有錦有茶又有紬絹陜西則多用茶而少用錦四川則多用錦而少用茶隨其所需有無相濟是宜良駟來者接踵然招誘無方間不得人蕃客不至馬額漸闕何也市馬者數病未去也陜西買馬之物惟仰茶貨蕃部既已中馬一旦得茶或乏旅費依舊以茶當緡前此監吏漸與收茶支錢時時稱提自重其貨邇來不能矣茶貨一輕何從致馬此一病也茶自蜀中出關經興利等州然後漸至宕昌盖近二千餘里鋪兵㳂路摘葉代茶雖有明禁無由遏止以至博馬之際蕃部多方退難此二病也市馬必置門戸之人盖猶中國之牙儈也假如良馬一駟直一百五十餘千則必中賣二百以上貫門戸之人及本務吏胥之徒四分取一官失其貨私取其利此三病也馬司下賣引所市絲織錦分支機戸及其市錦分科三等馬司出上等之錦價多得中等之錦色盖胥吏與錦户有無相通暗相資取錦物既惡折博艱難此四病也市馬之初雖曰羈縻逺人見馬支物然而不至如近時監買不職以病為壯以短為長以齒多為齒弱如黎雅等州至馬司未滿千里毎遇送綱不乘不騎道死相望況更萬里綱運其可保乎此五病也臣愚伏望陛下孚炤上項川秦市馬五病嚴諭牧司自今四川胥吏牙儈鋪兵之𩔖一復犯此乞罪不貸使折博之物無不良監買之吏無不職則蕃部之馬無不至矣臣又聞議者且欲更張從夔路水運小臣未知信否也其大利害小臣固所難窺然天行莫如龍地行莫如馬今欲水行似違其性也昔歐陽修嘗言蜀中珍貨貢物多不出三峽盖峽水春夏湍悍有仆溺之憂惟麄惡之物則輕從三峽人亦多視為棄物也馬政國家之本官吏其敢視為棄物乎或者謂國家近時輕齎綱運尚從此路不知綱運或擔或囊盤灘避險臨時般出措置非一經從鳥道亦似無害羣馬之來其積如山固不可由犖埆之徑灘險又終可保乎又夔路深山最為窮薄錢糧藁草未易常足驛廐皂棧未易創置兵人牧卒遇小州縣未免搔瀆恐約束未定慮在歳月之後也臣不知其說矣小臣無知竊以為荆襄之路未有大害未易更易臣願朝廷紬繹而察之臣愚知貢誠天闕因言川秦市馬五病其終敢輙及此惟陛下裁赦理宗時守漢陽黄幹奏曰臣竊見馬政國之大事也騋牝三千衛國以興思馬思徂魯人頌之則其關繫誠為不輕國家所用之馬西取於蜀南取於廣皆在數千里之外博易之費道里之費一馬之入動數百千其所得甚艱所費甚巨一有緩急無馬可用開禧年間敵騎壓境旋行收買駕駘下乘亦以備數平居暇日可不思所以處之乎竊見漢陽管内有馬監一所馬之自蜀來者憇息於此五日而後行守臣亦預㸃檢之責臣嘗親至其地見馬監之前有所謂孳生監者乃鄂州大軍昔日所創方其盛時馬之蕃息可以足軍中之用今監皆頽敗不復有馬矣漢陽為郡土壤甚廣風氣甚勁水草甚饒若委之守臣使之興復舊監以為牧馬之地給降本錢收買江北所産之馬而蕃息之差撥兵卒使任牧養之責數年之間生息蕃盛猝有緩急即可為用與夫求之於至逺之地買之於倉卒之際其利害相去逺矣如臣之愚未必深曉世務更乞行下總領所同鄂州都統司相度施行金宣宗時張行信為涇州管内觀察使上嘗諭宰臣曰自張行信降黜卿等遂緘黙自今宜各盡言毋復畏忌行信始至涇即上書曰馬者甲兵之本方軍旅未息馬政不可緩也臣自到涇聞陜右豪民多市於河州轉入内地利盖百倍及見省差買馬官平涼府判官烏庫哩桓端市于洮州以銀百鋌幾得馬千疋云生羌未波諸部蕃族人户蓄牧甚廣盖前所遣官或抑其直或以勢陵奪遂失其和且常患銀少所以不能多得也又聞蕃地今秋薄收鬻馬得銀輙以易粟冬春之交必艱食馬價甚低乞令所司輦銀粟于洮河等州選委知蕃情達時變如桓端者貿易之若捐銀萬兩可得良馬千疋機㑹不可失惟朝廷亟圖之元世祖時趙天麟上䇿曰臣聞昔者聖人之開天也去其害人者而已驅猛獸而逺之服畜獸而役之故角者能觸而拘之以福衡蹄者能踶而馭之以紲絆以盡天下之力以全天下之才夫中人之産未踰十金於是恐所用之有闕旁思而周慮之懼臨時之或歉設備而預防之豈有過哉皆其宜也況乎應千年之河水居巍然之神噐立萬世子孫之業詎宜無備云乎哉臣竊以名鷹俊犬異毛鳥獸國家之所宜棄也反以收之駞羊牛馬其用甚重此皆國家之所宜廣也反不廣之豈愛駞羊牛馬之不及鷹犬哉亦由於襲太平之世而因循弗慮故也武王勝殷放牛於桃林之野歸馬於華山之陽然與方今其勢有不同也方今四征不息粮餉未停就使櫜弓矢而不用戢干戈而不起則安知他日無罰罪之事哉則牛馬之不可暫闕也明矣至元癸巳括士民之馬而拘之郡出榜文稱上司之語而謂官酬其直也馬既頒軍直又不酬士民失望臣非但以國家之棄信而傷之抑亦由國家之不修馬政臨急取士民之御者故傷之也謹按唐太宗時有馬千匹太僕少卿張萬歳掌之自貞觀至麟德四十年間馬七十萬六千匹以致八坊之田千二百三十頃募民耕之以給芻秣八坊之馬分為五十六監及明皇時國馬益耗乃以空名告身市馬於逺方纔復二十餘萬匹命王毛仲領内外閑廐至開元十三年乃有四十二萬匹牛羊稱是由此觀之畜牧之多寡但以留意故也伏望陛下精思緩急之務灼明備用之源凡鷹犬之類可縱者縱之凡鷹坊等職可罷者罷之凡駞羊馬牛宜以御府繒帛及空名告身於四逺之地及中華之境市而收之凡所市之馬諒宜倣古制立天駟監以孳育之凡牛羊駞等諒宜立羣牧所以蕃殖之凡芻秣之具諒宜擇良地募民耕以給之若然則可以富國可以强兵可以俯宣王考牧之詩而小之可以思漢武伐宛之事而笑之矣順帝至順二年監察御史陳思謙上言軍站消乏僉補則無殷實之户接濟則無羨餘之財倘有征行必括民間之馬茍能修馬政亦其一助也方今西越流沙北際沙漠東及遼海地勢髙寒水甘草美無非牧養之地宜設置羣牧使司統領十監専治馬政并畜牛羊數年之後馬寔蕃盛或給軍以收兵威或給站以優民力牛羊之富又足以給國用非小補也歴代名臣奏議卷二百四十二
