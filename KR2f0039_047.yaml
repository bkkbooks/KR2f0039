body:
  text: 歷代名臣奏議卷四十七明楊士竒等撰治道宋髙宗時中書舍人胡安國上時政論曰臣聞保國必先定計定計必先建都建都擇地必先設險設險分土必先遵制制國以守必先恤民夫國之有斯民猶人之有元氣不可以不恤也除亂賊選縣令輕賦斂更弊法省官吏皆恤民之事也而行此有道必先立政立政有經必先核實核實者是非毀譽各不亂真此致理之大要也是非核而後賞罰當賞罰當而後號令行人心順從惟上所命以守則固以戰則勝以攻則服天下定矣然致此者顧人主志尚何如耳尚志所以立本也正心所以決事也養氣所以制敵也宏度所以用人也寬隱所以明德也具此五者帝王之能事備矣其定計曰臣聞自昔撥亂興衰者必有前定不移之計而後有舉必成大功可就修內政張四維率師不遣上卿伐國不動大衆教民懷生示信討二此齊侯晉文前定之計也取關中據河內大封同姓以懲孤立減省官吏以息百姓抑制將帥保全功臣此髙帝光武前定之計也斬髙德儒叱宇文士及以逺佞人賞孫伏伽禮王魏以開言路宣示好惡使民嚮方薄賦輕徭選用廉吏此唐太宗前定之計也其成霸王之業宜矣陛下總師履極于今六年而謀議紛紜計畫未定以建國都則未有一定必守不移之居以討亂賊則未有一定必操不變之術以立政事則未有一定必行不反之令以任官吏則未有一定必信不疑之臣奕者舉棋不定不勝其耦況立國而不定乎難乎者事也易失者時也捨今不圗悔後何及惟人主廣覽兼聽而不可以自專惟宰相擇材使能而不可以自用伏望特命大臣條具方今撥亂興衰之䇿各盡底蘊畫一進呈先示臺諫從臣許令疏駮仍集凡百執事議于朝堂詢謀僉同靡有異論然後斷自宸衷定為國是頒諸中外以次施行申飭攸司各嚴遵奉堅如金石勿復變移庶幾觀聽有孚一新耳目可見中興之兆矣其建都曰臣聞有家者必作室立國者必建都必據形勢握輕重之權必居要津觀方來之會如北辰在天而衆星拱如滄海在地而百谷朝安于其所不可動也陛下昨自應天初登寶位維揚駐蹕倉卒渡江考卜相攸莫如鍾阜矧以舊邸號稱建康已降詔書傳播天下為受命之符此可都者一也自劉先主吳孫氏諸葛武侯一代英雄周游吳楚皆稱建康龍蟠虎踞王者之居此可都者二也北據大江之險外有長淮之衛隔絶奔衝難于超越此可都三也有三吳以為東門有荆蜀以為西户有七閩二廣風帆海舶之饒以為南府此可都者四也諸路朝覲郡縣貢輸水舟陸車道里適等此可都者五也凡都北者必闢境于南周世宗取江北是也都南者必略地于北吳孫氏爭淮南是也昨者鑾輿時邁狩于吳越則王導所謂望實俱喪而晉不果遷之地也三省百司寓于南昌則李煜避周徙自秦淮卒不能振之所也國勢一統不可以數分國都一定不可以數動與胸奴居穹廬逐水草無城郭宫室市朝之禮者異矣今敵國慿陵叛臣僭竊瀕海諸郡僻在東隅宜還都建康比關中河內為興復之基環諸路而中持衡焉則人心不搖大事可定矣其設險曰凡立國建都必設險以守而後國可保按春秋書晉師伐虢滅下陽邑不言滅而此獨書滅者下陽虞虢之塞邑也塞邑既舉則虢己亡矣聖人特書示後世設險守邦之法故三國時魏人都許不以方城為險而守襄陽蜀人都益不以劒門為險而守漢中吳人都秣陵不以大江為險而守荆渚夫荆渚江左上流也北據漢沔西通巴蜀東連吳會真用武之國故楚子初自秭歸徙都荆渚因其地利日以富强近并榖鄧次及漢東下收江黃橫行淮泗遂兼吳越之地傳六七百年而後止此雖人謀亦地勢使然也後逮東漢之衰劉表牧之坐談而伯先主假之三分天下關侯用之威震中華孫氏有之抗衡曹魏晉宋齊梁倚為重鎮財賦甲兵當南朝之半其為江東屏蔽猶虞虢之有下陽也昨降詔令定都建康而六飛巡狩暫駐杭越乃以湖北為分鎮恐失古人設險守邦之意矣近日雖復荆湖南北而分鎮地分仍舊未改即與不復亦等耳按湖北十有四州其要會在荆峽故劉表時則軍資寓江陵先主時則重兵屯油口關侯孫權則并力爭南郡陸抗父子則協規守宜都晉大司馬溫及其弟沖則保據渚宮與上明此皆荆峽之封境也以荆南言則諸邑在江北者三在江南者四以峽州言則大都險要皆在南岸今以二州為分鎮跨據長江下臨吳會猶居髙屋建瓴水也獨無虞虢下陽之慮乎又朝廷近棄湖北逺留川陕者固謂秦甲可以强兵蜀貨可以富國取其資力以自助也而使荆峽分鎮于其間假令萬分一有桀黠者得之守峽江之口則蜀貨不得東阻長林之道則秦甲不得南譬猶一身束其腰膂而首尾不相衛則非計之得也臣竊以謂欲保江左必都建康欲守建康必有荆峽不以為分鎮然後全據上流地形險固北可出秦中之甲西可下蜀江之貨血氣周流首尾相應矣又曰昔人謂大江之險天所以限南北而陸抗以為長江峻山限帶封域此乃守國末務非智者之所先何也杜預嘗襲樂鄉矣胡奮嘗入夏口矣賀若弼嘗濟廣陵矣曹彬嘗度采石矣則其險信未足恃也雖未足恃然魏武困于居巢而不得渡曹丕困于濡須而不得渡拓跋困於瓜洲苻堅困于淝水而不得渡則其險亦未可棄也蓋設險以得人為本保險以智計為先人勝險為上險勝人為下人與險均乃得中策方今所患在于徒險而人謀有未善耳地有常險則守亦有常勢欲固上流者必先保漢沔欲固下流者必先守淮泗欲固中流者必以重兵鎮安陸此守江常勢雖有小變而大槩不可易者也當孫氏時上流欲爭襄陽而不得故以良將守南郡與夷陵下流欲爭淮南而不得故以大衆築東興與皖口中流欲爭安陸而不得故以三萬徑卒戍邾城邾城今之黃岡是也凡此三者皆要害必爭之地故孫氏保有江東而魏人不能犯今強敵侵河朔叛臣擾山東淮北京畿諸鎮處危疑之地大江設險未可輕棄上流在荆峽其利害臣既言矣中流在安陸而守臣陳規長于帥衆慿城短於勸民耕種宜遣一軍興置屯田為規外護以蔽武昌而下流則命江浙帥司各選官吏漸往江北經營淮泗若委任得人其上者使人勝于險其次者使人與險均俟以嵗時無輕改易而孫氏欲爭而不得者皆自治焉不特可保江左而恢復之勢亦在目中矣其制國曰凡制國者不能周知山川道里形勢險易與夫土地之宜足食足兵之具則不可與謀以貽後患荆州在沮漳江漢之間地兼水陸土力沃衍平時利入猶未盡也與江湖之南磽瘠之土倍百不侔矣募民力耕可以積粟此一利也自畿西河朔諸郡每嵗必資耕牛于川峽軍興已來道路艱阻不過漢沔六年矣耒耜之設服牛引重聖人所作以利天下若出峽牛至于荆渚則門墻之內耳此二利也而又中握上流舟楫往來之柄西通秦蜀之路乃足食足兵富强要地江左六朝所以必爭而不肯失也棄為分鎮其害甚明然改之則為詔令反復無以示信遂之則形勢危削無以自守苟有幾會未害于信何憚而不改乎凡分鎮者節制境中則法得自立専征閫外則兵得自用轉移物貨則財得自理廢置屬寮則官得自命合此四事與戰國諸侯無異即非上世封建之法而京西淮甸多使暴客錯雜居之獨湖北一路安陸命陳規則左選之文吏也荆南歸峽差解潛則右選之武臣也若降指揮以湖北一路與諸鎮事體不同宜有更張獨仍舊制即此二人考其績效因任改移陳規宜因任解潛宜改移無不可者但通荆湖漕憲二司治盜理財而以襄陽𨽻湖北扼漢沔之道以嶽陽𨽻湖南通三江之口以鄂渚𨽻江西接洪撫之境則地里連屬形利勢便合于魏武置都督不欲相逺之意亦于今日事宜頗為相協若襄陽已令分鎮時方用兵幾會之來何有窮已乘便分割亦無不可然後上流之勢全矣又曰夫變更舊制不稽今古肆其胸臆則事不可行況挾姦計乎近嵗湖北變更舊制多矣初用唐慤為安撫統十有四州參詳官髙衛者建言乞以鼎州守臣帶鼎澧制置使辰沅靖並聽節制不𨽻湖北是削其五郡也又乞以荆南公安縣升為軍額兼帶石首松滋巡檢使應軍兵器械並不許荆南那移是又削其所治三邑也是嵗敵人聲言數路入寇正當經畫防秋之際而一旦削其五郡與三邑其間多兵賦重地所存者殘破之餘耳或以衛與慤有怨故特獻此䇿以傾之審如所言大不忠也不然畫此謬計不智亦甚矣又前日改湖南為東西路于朝廷形勢利害初無加損徒困全邵武岡三郡之民耳今既復荆湖南北兩路宜罷荆峽分鎮仍舊置帥司于荆南一便也公安軍自係內地宜仍舊廢為屬邑二便也靖州置郡在崇寧元年自鼎澧應副錢糧嵗費二十七萬今此二州既皆殘毀宜仍舊廢為渠陽寨三便也武岡置軍在崇寧四年自邵衡永州應副費亦不資今此三州既皆空乏宜仍舊廢為武岡縣四便也凡此四者悉仍舊貫州縣官吏省併什八創添窠闕悉從除削裁損文書俾歸簡便有所謂刀弩手有所謂博易務有所謂營田司事皆欺罔殃及百姓驅之轉為盜賊者也宜依往年禁止保馬茶鹽法施行以戒誤國害民之賊然後國制定民心安矣又曰制國宜于仍舊貫乃欲以襄陽𨽻湖北嶽陽𨽻湖南鄂渚𨽻江西者昔祖宗宅都于汴其勢當自內而制外是故置京西路而襄州在漢水之南則以制湖北也置湖北路而嶽鄂在荆水之南則以制湖南與江西也今建都江左未能恢復中原則當自南而制北與祖宗宅都于汴自內而制外其事雖殊其意則一耳置于江西者治南昌而分兵屯鄂置于湖南者治長沙而分兵屯嶽置于湖北者治荆南而分兵屯襄皆自南制北恢復中原之勢也古者有屬長有連帥有卒正有州伯今安撫大使則州伯之比而形勢必相屬而後能相援有無必相資而後能相成五嶺之外財賦盛于東禺兵馬出于西桂宜置大帥一員兼統二廣帥司以殿南服荆湖並經殘破而北路尤甚若置大帥必兼領夔府出峽中資力使之經畫庶能興復蓋峽中有鹽米耕牛而無曠土荆渚有沃衍桑田而無餘民若弛瞿塘之禁懋遷有無商旅自西而入物貨㳂江而下不越數年荆州富盛形勢可成古者大國三卿命于天子則朝廷所自命者也小國二卿命于其君則奏辟而命之者也控制大邦優假小國之意深矣今置大使乃古州伯而參謀議者皆自奏辟則非古意繼今以往宜自堂選每路二人其大使和厚者輔之以健決之佐剛果者與之以審詳之屬其餘許自辟置則事可久行乃輕重相權之義也其恤民曰保國以得民為本固本以恤民為務恤民以除暴為先蠻夷猾夏自外為暴者也寇賊姦宄自內為暴者也近嵗已來外阻內訌除外暴者多主通和之議竟為金人所誤不敢用兵而金人用兵毒遍中國常自若也除內暴者多用招安之䇿又為盜賊所誤不敢用兵而盜賊用兵毒遍天下常自若也夫春秋之法荆舒亂華則是膺是禦不與結盟亂賊肆惡則是誅是討不列于會以此見聖人之情矣葛伯殺一饋餉童子湯往征之天下信服而寇賊所至殺人盈野為民父母安得若是恝況以重賞招之又覬其弭也李成馬進侵犯江西陛下斷自宸衷命將出師要令殄滅自是江西一路商旅夜行范汝為弄兵閩嶠肆其殘毒三載于兹又遣輔臣副以上將罙入其阻盡掃除之而後遺種餘民復還農業可謂得恤民之道矣然其餘類尚稽天誅暴橫湖湘之間百姓引領王師如大旱之望雨也今諸將既西而師行安重陸運糧餉民力疲勞夫恤民者不自病民除暴者不自為暴曹成反覆直犯帥司劉忠殘虐塗炭數郡固無可赦之理宜専委嶽飛掩捕曹成及早進師勿令越逸亟命大軍直趨潭州合于春秋救兵欲速之義事得便宜無更申禀以致遷延重失幾會仍以先聲促令馬友揀汰老弱及元係耕種之民各從其欲并力一心水陸俱進追擊劉忠勿留後患招收楊華餘黨肅清江湖之盜然後精擇良吏悉意撫綏則善政可行膏澤可下百姓安堵邦本固矣又曰保國以得民為本固本以恤民為務恤民以擇縣令為先縣令親民百里之主宰也且據應副軍期一事言之凡糧餉轉輸器械百物應干軍旅之用莫不資民力而後足也主軍期者取足于縣為縣令者責辦于民得人則科斂必當多寡必均數目必實有無必通期約必信須索必辦民不怨咨公無乏事茍非其人因公循私恣為侵擾剝民膏血甚于寇賊公家所急往往闕供緩急之間又無預備民情怵迫無所控訴乃有轉而為盜矣而縣令其可以不擇乎近嵗此官冗濫已極宜以五說稍革其弊漢世郎官出宰百里自崇寧掃除資格收擢天下之士不歷縣邑徑躋臺省及其補外不為監司必為郡守事不諳歷權歸胥吏此大弊也宜籍中外曽為臺省寺監官依倣漢制分宰百里試以民事俟有聲績不次超擢此一說也古者建侯分土不過一同今親民之官比古侯壤而軍興巳來日見陵辱師徒所至非特將校至于走卒賤人皆得肆行無禮以百里令長而有不免捶楚之憂此潔廉自重者皆欲逺引頑頓忍辱者猶安其職而不顧也宜增重事權優假其禮許借服色厚給廪餼凡軍馬屯駐本縣者並聽節制其經由悉從階級此二說也據今八路諸縣户口賦入多寡重輕分為三等上縣自朝廷選差中縣吏部注擬下縣許帥臣監司通共奏辟立為定格不許交互此三說也依宋元嘉法定以六期為斷革去三年為任兩考成資與堂選數易之弊使吏無茍免民有所係此四說也凡三等縣皆以四條糾正稅籍團結民兵勸課農桑敦勉孝悌俟及三年考其績效已就緒者就加旌賞未有倫者嚴行程督此五說也而命侍從官各舉二人之能任縣令亦各刺二人之姦贓不法者皆書于籍俟核其真以次施行宣示好惡使知勸沮舉刺不實者必罰無赦庶幾百里得人百姓安堵邦本固矣又曰保國以得民為本固本以恤民為務恤民以輕賦為先魯哀公時遭值凶年國用空乏什二而稅猶患不足而謀於有若則請行什一之法夫二猶不足又損其半疑若戲言也至謂百姓不足君孰與足乃知其識微慮逺雖聖人不能易矣夫焚林而田非不得獸而明年無獸竭澤而漁非不得魚而明年無魚厚賦重斂困乏不足轉而之他則無百姓誰與供常稅乎且以近事驗之如京東西路嵗入二稅約七百萬課利雜收約三百萬其餘山澤之利在祖宗時捐以豫民不盡取也百姓歸戴無有二心及李彥等取之凡西城課利及乾濼為田窮竭民力斂積無算其時若有言罷此掊剋然後國用充足則必指為謬說也然百姓愁苦轉而為盜今此四路常賦所入不歸於王府五年矣乃知百姓不足君孰與足信不誣也又如荆湖南北嵗入二稅約四百萬課利雜收約一百萬自二稅外豈無餘利在祖宗時捐以豫民不盡取也百姓歸戴無有二心及部使者取之折變則有一折兩折三折收糴則有均糴敷糴補糴散引則有麴引茶引鹽引受納則有一加再加倍加而猶以為未足其時若有言罷此諸色然後國用充足亦必指為謬說也然百姓愁苦轉而為盜今此兩路常賦所入不歸于王府三年矣乃知百姓不足君孰與足信不誣也今朝廷所自治者封境益蹙賦斂益重百姓益貧田萊益荒謀國之臣不為陛下深思逺慮更欲擾之何不以京東西湖南北為覆轍之鑒也夫為川驅魚者獺也為叢驅雀者鸇也為敵國驅民者今日之貪吏與弊法也伏願明詔計臣速講輕賦恤民之事為生財足用之原而以京東西湖南北為至戒庶幾百姓安堵邦本固矣又曰保國以得民為本固本以恤民為務恤民以革弊為先凡為國以利不及義者皆自小人始謂其所見者小不知大體法所以弊也祖宗時以義為利盜賊不作坐享九州四海之奉其所利者大矣且如鹽法行于西者與商賈共其利行于北者與居民共其利行于東南者與漕司共其利大計所資均及中外所謂以義為利也崇寧初謀國之臣以利為利首變鹽法利出自然者禁而不得行則解池是也利在居民者皆入于官府則河朔是也利通外計者悉歸于朝廷則六路是也諸路空乏乃至橫斂誅求百種猶不能給民窮而為盜遂失嵗入常賦以榖千萬計則鹽法實致之也靖康改元用事大臣昧于逺見其弊不革陛下紹興宜鑒前失亟議改更久而未及何也略以湖南一路言之舊日嵗課一百萬緡本路得自用者五十萬故斂不及民而嵗計充足變法已來鹽利悉歸朝廷矣本路諸色支費已皆出于橫斂至如上供舊資鹽息者猶不蠲除民所以益困也略以道州一郡言之嵗認上供錢二萬貫往時本州嵗賣鹽錢四萬餘貫以此鹽息樁充故斂不及民而自足今上供錢依舊而無鹽息至以麴引均科人户民所以益困也又略以耒陽一邑言之有未變法之前官所自運鹽有既變法之後客所拘納鹽封樁日久既緣軍期支給矣而鹽香司再欲追索朝㫖亦令撥還不知此當自何而出急則不免取于人户民所以益困也比聞𣙜貨務所入未滿一年至六百餘萬其利非不厚何不遍下諸路並令檢會若此類悉行蠲免以活百姓使稍安業不致為盜長納二稅存國家大利之源也又如𣙜酤法己極弊尚仍舊貫不亟改更何也略以道州言之課額既髙嵗有虧缺即抑勒專知牙校令兼管州倉俾因受納取足稅民弊可見也又以邵陽言之酒課約二萬餘貫而嵗折稅米為糯凡六千石每㪷中價約五百足只此一色已幾倍費其他未論也比雖行下諸處會計而州縣往往利此為造弊之端不以實聞何不斷在必行令逐路應係官監酒務許百姓衆共買撲入納淨利收官務遞年所費米麥等撥歸朝廷專充贍軍費用還所得淨利與轉運司及本州縣支使利濟公私以活百姓使稍安業不至為盜長納二稅存國家大利之源也夫琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也惟陛下早更弊法以幸天下則百姓安堵邦本固矣又曰保國以得民為本固本以恤民為務恤民以省官吏為先光武中興併廢吏員裁減文書什存一二天下遂平蓋有民然後有事有事然後有官今遺民既寡事亦少矣官吏日增而不減此何理也自崇寧以來中外創添貟局重以濫賞不勝其冗蠧國病民遂至于亂渡江之後北地衣冠接袂而南矧值軍旅之興賞典超越濫冒滋衆江左吳楚例經殘破而諸司州縣添差不已兵官舊係兩貟者或至于七員八貟而未止也監當舊係一員者或至于四貟五貟而未止也倚仗推委不任其責請給人從互相攘占此弊不革雖有恤民之心而民豈被其澤乎又如江北荒餘郡縣皆膏腴之地虜騎不來盜賊已去而民無歸業城市不建者緣所遣經理鎮撫之官略無存恤興復之意未有百姓先置官司諸州縣鎮舊時貟闕一一差填又所用之人全不選擇貪殘暴虐甚于寇盜墾闢一畝者即抄一畝之地布種一碩者即收一碩之入民不聊生無緣復業此弊不革雖有恤民之心而民豈被其澤乎夫為民有官不設官以病民為事有官不因官以廢事今添差所在依勢倚法侵漁須索耗蠧無窮民所以病也一羊而羣牧其委不專一職而衆官其任不一事所以廢也考于春秋以民為重而大夫次之考于孟子以民為貴而社稷次之故堯舜禹以天下相受而其言曰衆非元后何戴后非衆罔與守邦言君與民一體也而可以不恤乎今朝廷添置官吏盡出于恩寵諸路所自差委多及其親故不虞廢事而病民也大失先王之意矣望陛下特降指揮併省官吏以建武為法稍捐祿廪養之使居閒地無執事權則百姓安堵邦本固矣其立政曰立政者人主宰臣之事而必先明其所職然後政可立也選擇忠賢以為輔相委任不疑者人主之職薦進人材布列中外賞罰不私者宰臣之職唐太宗既黜封德彞邪說任房喬杜如晦為宰相矣又敕尚書細務並屬左右丞而責二公以廣求賢人隨才任使此委相臣以其職者也陳平既不答文帝決獄之問自謂所主佐天子理隂陽矣而召河南守吳公為廷尉吳公治平為天下第一其能致民無寃可知此使九卿各得其職者也而政有不立乎陛下即位于今六年念宰相不可數非其人也而特有選任置諸左右可謂得人主之職矣然而政事未立者竊恐責宰相以其職異于太宗之不以吏事勞之也宰相之所以自任未若陳獻侯之能使九卿各得其職也昨者雖并東西二省而宰臣依舊受接詞訴判決獄訟終日營營弊精力于簿書之末而進退人材布列中外賞功罰罪或有未加察焉則失其職矣政何由立乎夫審于音者聾于官明于小者暗于大天地之有四時百官之有六職天下萬事盡備于此願陛下特降指揮自今以往宜令庶事並決于六曹仍命六曹官長皆得專達並如元祐大臣所請自非事關大體更不咨白則宰相之事簡矣然專責以慎柬六部長官及其二以舉中臺之職則又專責以慎柬諸路帥臣及部使者以舉外臺之職則又專責以慎柬諸郡守臣及上縣令宰以舉郡邑之職此乃周公立政有司牧夫之大意也昔者冉有退朝而晏以為有政仲尼曰其事也如有政雖不吾以吾其與聞之夫諸侯之國大夫與政而陪臣與事為天下者其可不使宰臣與政而侍從治事乎惟陛下明詔宰臣各行其職則政之大經立矣又曰三綱軍國政事之本人道所由立也三綱正則基于治以興三綱淪則習于亂以亡按春秋華督有不赦之惡魯鄭齊陳同會于稷以成其亂受賂而歸而天子不討方伯不征咸自以為利也不知百官象之有大不利焉未幾陳有五父之亂齊有無知之亂鄭有祭仲子突亹儀之亂魯有叔牙慶父般閔之亂數十年間四國舛逆幾至喪亡則以昧于履霜堅氷之戒不能辨之于早也春秋備書于䇿明三綱之重為後世鑒深切著明矣昨者邉塵犯闕邀請二聖而立張邦昌僭竊名號援引契丹立晉事迹用為證例分遣使人宣諭諸路直下赦令倍行恩賞原其用心與華督動於惡無異陛下嗣膺寶歷特施寬典未正其罪奉行天討與衆棄之置在逺郡賜死于隱而不尸諸市朝已失刑矣及敵騎南騖鑾輿渡江黃潛善及其黨悉皆震恐事窮計迫無所從出乃指邦昌為金人所立而迫之至死遂以致寇欲解其迷國誤朝之罪至其宗族皆命以官是訓誘亂臣賊子之心使利于為惡此臧哀伯所謂百官象之其又何誅焉者也故不踰旬月苗傳劉正彥敢有無將之心陛下既正典刑順承天意而近臣乃有抗章乞行湔滌者敢肆姦言無所忌憚故比日諸方羣盜所在焚劫至有官吏入其隊中肯為之用末流至此可不戒乎伏望特降指揮昨在圍城有職當守禦視城垂破而端坐不救忘廟社之危者有草表章上及君父取媚敵人受其婦女者有起自閒散特仕僞朝長其諫省者有于苖劉自肆並建節旄所除制命極意稱美者及昨來乞用邦昌苖傳正彥之黨者審其輕重不過此數人依法施之以正人心息邪說則三綱不淪而軍國政事得以時立矣其核實曰政事紀綱莫大于賞罰賞罰福威必當于功罪功罪善惡必審于毀譽毀譽是非必要于真僞故直言不聞毀譽亂真康澄以為可畏甚于三辰失行水旱蟲蝗之變也可不核實乎陛下昨降赦書推尊仁宗盛德大業應舉行法度並欲上遵嘉祐德意甚美臣嘗考其大要特在于直言數聞毀譽核實而己丁謂以姦邪為宰相矣雷允恭傳達外議擅權矣黃德和以監軍誣奏邊將矣或斥或誅或投諸四裔而獄情審克卒無寃濫是毀譽不得亂真而邪說息也寇準以忠正遭逺貶矣范仲淹以危言屢獲罪矣歐陽修以譏斥佞人招難明之謗矣或辨明誣枉或擢升侍從或遂遷執政是毀譽不得亂真而直道行也邪說息直道行則惡人有所憚而不為善類有所恃而不恐其致至和嘉祐之治以此陛下自初即位思建中興而將相大臣黃潛善汪伯彥等不䏻奉令承教乃廣引廢忠毀信靖譖庸回服讒搜慝之黨變亂名實顛倒是非以上惑朝聽貶馬伸于關市出許翰楊時于閒散如孫覿劉觀鄭㲄輩流並居邇列維揚奔潰無所歸咎恐陛下討其誤國之罪也復指結余堵殺邦昌為致寇之由特下赦音元惡大憝皆得原滌而李綱獨不與焉此雖假借朝廷詔令行之安能掩天下之公論乎顛倒是非變亂名實莫斯為甚矣及范宗尹當軸又欲汲引失節鄙夫如李擢等以蓋其北面僞楚之惡是非邪正出于人心如辨白黑焉可誣也其為計不忠亦甚矣陛下好惡無私克遵王道上追仁宗審核之政毀譽必要其真賞罰必當其實使邪說不作直道得行其繼嘉祐至和之治亦何逺之有夫邪正是非莫易辨于今日惟陛下斷在必行以扶正論實天下之幸又曰凡核實者必自大臣與臺諫始大臣定功罪施賞罰于上臺諫論功罪主毀譽于下不可不先核也仁宗即位信王曾之正任呂夷簡之才終以富弼韓琦為宰相而余靖蔡襄賈黯呂誨等迭居臺諫此真僞所由核也陛下嗣承寶歷渡江以前所用三相而言者攻李綱以六不可貸之罪謂人臣有一于此必伏斧鑕而逺竄之于鯨波南海之表人皆以為鄭㲄蓋綱以建炎二年冬十有一月朔日逺貶而㲄以是日峻遷故知為此言者必㲄也然謂綱大興誣謗干譽庸俗言已去朝暴亂斯起欲平定之捨我其誰傳呼宰相響震山谷諷諭羣小令上封章翺翔道途以俟詔命凡此等語驗于奏議則無據按于施為則無迹特以撰造文致之語傾陷大臣為不可貸之罪而當時遂信行之又以美官激勵之是賞勸讒諂之人欲其毀譽亂真而不核也若言潛善伯彥措置乖方人皆以為馬伸蓋伸自言官黜為監當而其言則有狀矣不慎命令則以下還都之詔也廣布私恩則以復祠宮教官之闕也黜陟不公則以罷衛膚敏而用孫覿不祥之人也杜塞言路則以貶吳給張誾邵成章也妨功害䏻則以沮宗澤與許景衡也私收軍情則以各置親兵千人請給獨優厚也同惡相濟則以力庇罪人王安中也凡舉一事必立一證皆衆所共知亦衆所共見不敢以無為有亦不敢以是為非而當時不信其言而罷之反以為言事不實而重責之是罰沮忠讜捐軀為國之人惡其毀譽之核實而不亂也邪說何由息公道何由行乎今㲄雖已死恤典哀榮禮意隆厚公論不允伸既逺貶雖有詔命不聞來期君子閔焉比雖賁以龍閣未盡褒勸之禮按春秋之法治姦惡者不以存沒必施其身所以懲惡奬忠善者及其子孫逺而不泯所以勸善伏望聖慈特留聰聽按此二人情狀追正刑賞奉承天意使天下知懲勸之方以息邪說開公道則三代之所以直道而行將復見于今日矣其尚志曰臣聞自昔帝王應時而作者必以立志為先在草昧時必立志而後能創業垂統在衰微時必立志而後䏻興衰撥亂時者事之幾志者事之本欲定大事而志不先立則無本矣焉䏻有成漢髙帝西入咸陽見秦宮室帷帳狗馬重寶婦女之盛意欲留居樊噲一言即還霸上范增由此畏之說其主曰沛公入關財物無所取婦女無所幸此其志不在小故䏻滅秦取項以成帝業光武破尋邑之師舉雒南之地取河北定山東既得隴復望蜀顧謂耿弇曰建此大䇿雖落落難合然有志者事竟成也故䏻祀漢配天不失舊物靖康改元胡塵犯闕用事臣僚不效責難之節首以立志為本而即安屈辱至使親王出質城下結盟此齊國佐宋華元請合餘燼背城借一誓死力爭有以國斃而不肯從者也當時國勢何異措火積薪寢卧其上而宰相徐處仁遽進諛言以為金人出境社稷再安由聖德儉勤致有天人之助遂陳八說謂如今日可比唐虞之盛而臣主俱榮抑何所志之卑陋也故廟堂聚訟顛沛末流未及朞年卒招失國之禍夫立志者本也行事者用也本則不立而急于行事雖有逺猷宏議必格而不得施矣陛下天資神武自初即位慨然發憤志殄寇讎而當時親信近臣又不䏻助成大美乃至因循坐消嵗月國日益削六載于今然上天之所以啓悟聖情日躋盛德陛下之所以深懲既往剋勵將來可謂卓然有立于萬物之表矣伏望堅持此志斷以不移仍飭群臣各致法家拂士之義必志于恢復中原祇奉陵寢必志于掃平邉境迎復兩宮必志于得四海之歡心以格宗廟必志于致九州之美味以養父兄然後告功皇天明示德意則文武百僚六軍萬姓丕應徯志亦皆震懾奔走各修厥職奚為而不成奚欲而不遂矣其正心曰治天下者法也制法者道也存道者心也心者身之本也身者家之本也家者國之本也國者天下之本也曰家曰國曰天下者皆心之所體也曰道曰法者皆心之所運也能正其心則朝廷百官下至萬民莫不一于正安與治所由興也不正其心則朝廷百官下至萬民莫不習于不正危與亂所由致也故有虞氏以天下授禹其所傳付者首曰人心惟危道心惟微而周公作立政稱述乃考文王亦不過克厥宅心而已然心有所忿怒而弗䏻忍則不得其正有所貪欲而弗䏻窒則不得其正有所蔽惑而弗䏻斷則不得其正有所畏怯而弗能自强則不得其正故欲正其心者必本于誠意致知而人主所以不可不學也昔光武中興息馬投戈必先講藝蜀先主從事行陳之間而樂聞儒生鄭康成等啓告治亂之道吳王孫權分命諸將總兵禦敵戒以當途掌事不可不學而自謂讀書大有所益者蓋戡定禍亂雖急于戎旅之務而裁決戎務必本于方寸之間不學以致知則方寸亂矣何以成霸王之業乎今陛下日親典䇿博考古今往行前言固以畜德又經變故備嘗險阻慮患益深必無邪念至誠所發通貫幽明固有人不及知而天獨知之者矣伏望更選正臣多聞識有智慮敢直言者置諸左右日夕討論以克厥宅心逺繼周文之美則朝廷百官下至萬民莫不一歸于正而無回邪欲亂之心奚危之不安奚亂之不息矣其養氣曰凡用兵勝負係于軍旅之强弱軍旅强弱係于將帥之勇怯將帥勇怯係于人君所養之氣曲直何如耳接戰者兵也主兵者將也將將者君也人君以直養氣自反而縮則曾子之所謂約也狐偃之所謂壯也壯則强以曲喪氣自反而不縮則孟子之所謂餒也狐偃之所謂老也老則弱紂師如林陳于牧野武王數其不事宗廟賊虐諫輔之罪則商曲而周直矣故周勝項羽兵震天下威服諸侯漢祖數其九罪與殺義帝之負則楚曲而漢直矣故漢勝凡曲直者兵家之大要制勝之先幾也金人詐邀二聖遷徙六宮殘殺老幼劫掠貨財立臣代君悖逆天理肆行無道曲亦甚矣陛下以上皇之子孝慈之弟自大元帥入踐宸極檄書初下而僞楚歸班赦令一行而四方響應又自比來克勤聽政追賞直士優恤其家登用讜言置諸要列令聞四達聖德日躋可謂直矣以直對曲勝負已分中國士氣宜不待鼓而自强强敵暴橫宜不待挫而自弱然敵兵每動四方震懾奔走逃遁莫與抗衡者以兵家之略制勝之幾未有以明之也今欲强中國之兵鼓將士之勇使人人知我直彼曲以作其衰敗不振之氣更在陛下强于為善益新厥德近而信于諸夏者無曲可議外而聞于夷狄者無曲可指則守為剛氣可塞于兩間震為怒氣可以安天下何憂于羣盜何懾于敵人將帥必聽命而不敢驕軍伍必畏威而不敢惰不待兩兵接刃而百勝之算已坐決于九重之上矣其宏度曰人主以天下為度明當並日月不可私照臨德當配天地不可私覆載所好當遵王道不可以私勞行賞所惡當遵王路不可以私怨用刑其喜怒則當發必中節和氣絪緼而萬物育也故能理其情而君道備矣然人情易發而難制者惟怒為甚克已然後可以治怒順理然後可以忘怒書曰必有忍乃其有濟此治怒不遷之法也忍者隱忍不發之稱遷者自此遷彼之謂䏻隱忍而不遷則事必濟矣齊侯忍于射鉤而相管仲九合諸侯晉文忍于斬袪而見寺人披免于內難楚昭忍于私怨而賞鬭辛終以復國漢髙帝忍于有故怨者而封雍齒忍于數窘辱者而赦季布忍于比己為桀紂者而用周昌至如丁公短兵相接而免己于厄可謂有再生之恩矣及其即位丁公來謁乃斬以殉其不賞私勞如此故䏻五載而成帝業凡此數君于道槩乎其有聞者矣如袁紹不忍于田豐許攸而棄策士卒無所成德宗不忍于蕭復姜公輔而疏賢相終以衰削蓋亦未之思耳陛下聖度虛明仁心廣大固當不以私喜親佞諂之士亦當不以私怒逺正直之臣中外百執其有迷國誤朝罪惡昭著衆所指目不可掩者雖有私勞願陛下與衆棄之不使幸而得免以致天下之疑也至如抱忠守正犯顔逆耳公論所歸不可掩者雖遭讒謗願陛下與士共之不使退而窮處以失天下之心也然後賞而必當是謂天命罰而必當是謂天討可以撥亂反正建中興之業矣其寬𨼆曰自昔創業興衰與增光洪業之君待遇臣下恩禮雖一而崇髙嚴恪常行于爪牙介胄之夫以折其悍驕難使之氣柔遜謙屈必施於林壑退藏之士以礪其廉靖無求之節故䏻駕馭人材表正風俗漢髙帝立䏻召齊王田橫於海島中而自恨終身不䏻致四皓世宗踞見大將軍衛青至汲黯奏事或時不冠則走避帳中使人可其請光武制御功臣不相假借而招延處士如會稽嚴光足加帝腹辭其爵位山陽王成使者再聘不肯就車太原周黨陛見帝廷伏而不謁雖范升有誇上求髙之奏不以為然各從其志夫此三君者內平四海外讋百蠻可謂英雄之主矣然髙祖之威䏻行于暴秦强楚而不行于四皓世宗之威䏻行于胸奴西域兩越東夷而不行于汲黯光武之威䏻行于尋邑王郎赤眉銅馬隴蜀之君而不行于嚴光周黨惟公孫述獨行之述招聘蜀人李業之流或劫以兵或迫以鴆或械其妻子業等皆死疑若最䏻行其威令矣然述之威䏻行于李業等而不䏻行于吳漢何也威有所當加勢有所當屈加于所當加以立威則强屈于所可屈以忘勢則昌反是道者難乎免于亂亡之禍矣陛下尊德樂道如古賢王屢下詔書詳延遺逸而羣臣有不䏻欽承美意以增盛德之光者凡所宣召或有未至不原情實略見寬假即肆讒謗以謂違于君命召不俟駕之義被之以偃蹇之名而欲加之以不恭之罪雖陛下大度并包不從其說而造此謗者亦云甚矣夫召而不至者其本心豈樂貧賤惡富貴哉其必有以也或其齒早衰而不䏻至或其身負疾而不䏻至或其志氣已經沮傷而不䏻至或其才力不足以當任使而不䏻至或其所見與時不同而不䏻至若聽順所守寢息恩命下全𨼆居之操上有好善之美兩得之矣乃欲施雷霆之威于一介之士何也渡江以來四月八日所下赦書首欲上遵仁宗法度謹按康定間嘗以詞館招張俞矣辭而不受至于四五其後又以修起居注用王安石矣辭而不受至于八九皆從其欲又優奬之以勵風俗未嘗加以雷霆之威而權綱不緣此而不立命令不緣此而不行威加于西則臣服元昊威加于北則削平王則威加于南則掃蕩智髙柔巽屈于𨼆士而德愈隆剛克伸于四夷而威愈震可謂知所用矣此其所宜遵者也侍從近臣不有忠言竒䇿上動聖聽奮揚天威殱滅讎敵顧請施于疾病退藏之臣其意安在伏望特降詔書申明此㫖凡被召有不䏻赴者悉從其欲不强致之獨以威刑外施暴橫之戎內掃貪殘之賊與悍驕不可使之將讒說殄行之臣則天下歸心而治道成矣祕書正字張孝祥上奏曰臣恭惟陛下天縱神聖身濟興運兢兢行道餘三十年以陛下之心行陛下之政唐虞三代宜不足進而懷忠之士以今揆古容欲有議者何哉羣臣負陛下使令也自建炎以來朝廷之治蓋嘗一再更張方陛下厲精于中興之初則執事者立異相髙隆虛名而略實用逮陛下于恭已修好之後則專國者怙權植黨廢公議以竊主威夫君天也父也事天事父若此尚何暇望其他哉今陛下收還威柄人才用舍蔽自聖志先時二者之弊固已革去然臣之愚猶欲冒昧自竭者誠願陛下清閒之燕密諭邇臣使之無茍目前益務逺略而已夫事有可為當各進所聞豈必拘形迹之疑政或偏敝當勿憚改作不宜習見聞之舊玩嵗月則將失投機之會飾文具則必盩責實之㫖使群臣精白以承休德則陛下髙拱而昭成功永輯隆平無有紀極惟陛下留神財幸殿中侍御史章誼應詔上言曰右臣伏讀今月二十六日聖訓閔國難之日深念政治之未洽臣有以見陛下慮患之切而求治之勞也仰惟陛下懷宵旰惕厲之心思祖宗基業之重眷禮臣工敷求切務使悉意有為之時降虛已力行之詔德音下逮朝野欣歡如臣謏聞誠不足以仰酬清問然幸以狂愚得備言責不敢以學識凡陋為辭臣以為欲國難之弭則莫若以謀為先欲政治之洽則莫若以人為急孟子曰堯舜之智而不遍物急先務也堯舜之仁不遍愛人急親賢也陛下詔臣以寇敵充斥汙瀦于齊魯宋衛之郊而盜賊跳梁株連于江鄂洪撫之地閩中屢擾淮上多虞此四者臣知國難之深有在于此也陛下又詔臣何道而可以保民何術而可以弭盜何䇿而可以遏强敵何行而可以生國財此四者臣知政治之洽有在于此也陛下用謀以濟四者之難則所謂堯舜之智也用人以行四者之政則所謂堯舜之仁也臣請得别白而詳言之聖詔曰敵兵充斥汙瀦于齊魯宋衛之郊此陛下念宗廟社稷之所在而憤劉豫之未擒也陛下謂劉豫之僭竊在敵人願為之乎兩者皆出于不得已也敵人窮兵深入去國萬里攻劫焚蕩固知中原之空虛而不䏻有也故不得已而用劉豫若劉豫者失身兵革之間貪戀朝夕之命彼雖屈膝于北庭實可屏衛于中國蓋亦不得已而為之也誠遣辨士動其心徐遣間諜密賜詔㫖許之為外藩貸之以不死則兵革可以暫息邊境可以少寧然後専委重臣經營北伐異時王師繼進由清河者入京東由汴路者入京畿由襄漢者入陳蔡與李齊要結于登萊之境與張浚翟興會兵于河洛之上陛下用謀誠出于此則齊魯宋衛之郊可得而復矣聖詔曰盜賊跳梁株連于江鄂洪撫之地此陛下念江左生靈之塗炭而憤李成馬進之未討也陛下固嘗遣周虎臣往諭李成使之歸鎮李成既聽命矣其後撫諭之使不繼丐糧之請不答外之將臣大敗則匿而不言小捷則矜而自功至于今日猖狂四出江鄂洪撫兵拏不解臣固嘗乞江東之池饒信撫江西之洪州荆湖之鄂州三路分兵以守矣又嘗乞令呂頥浩朱勝非兼荆湖江南四路之地盡護諸將兩師統兵以戰矣陛下試用此謀則兵將之心力必果臣旅之號令必一財用則無所分爭士卒則無所竄伏江鄂洪撫之地可全而有也聖詔曰閩中屢擾淮上多虞此陛下念守帥之非才而思鎮撫之未效也閩中之擾始于范汝為結集之初福建帥守監司任非其人不䏻擒捕朝廷遣謝嚮招安之後慮有譴訶于是共為飛語聲言劉時舉死非其罪冀以中傷謝嚮而搖動汝為陛下誠䏻灼知情狀盡行罷黜别選䏻臣則閩中屢擾非所患也淮南諸鎮初皆得人合勢併力以扞殘敵大江之南藉為藩籬自趙立被圍朝廷不䏻遣兵應援以致陷沒于是薛慶李彥先相繼喪亡嶽飛郭仲威迤邐失守今日固當統以重帥給以芻糧使之四面攻襲殄滅餘寇促其歸鎮務耕稼之業養疲瘵之民招徠流亡繕備守禦則淮上多虞非所患也凡此四者臣以為尚謀而不尚力則國難可得而弭矣聖詔曰何道而可以保民臣謂保民無他道也去姦貪殘虐之吏則可以保民矣今夫勸農桑懲游惰薄稅斂省刑罰鰥寡孤獨遂其生饑凶疾病得其養保民之道不過如此而陛下矜恤之意滲漉之仁形于詔音見于赦令非不諄復也然而民不獲安者姦貪殘虐之吏未盡去也聖詔曰何術而可以弭盜臣謂弭盜無他術也得循良廉平之吏則可以弭盜矣今夫遣繡衣直指之使用柱後惠文之吏施虎穴屠伯之酷任射聲跡步之士重孥戮之科連保伍之坐弭盜賊之術不過如此而陛下警察有巡尉之官懲艾有刀鋸之辟大則陳諸原野小則肆諸市朝然而盜不可息者循良廉平之吏不進也聖詔曰何䇿而可以遏强敵臣謂甲堅兵利城髙池深形勢便利山川險阻得利則戰不利則守此强敵之所以可遏也國家兼而用之矣然而猶復憑陵者以陛下未得折衝禦侮之臣也聖詔曰何行而可以富國財臣謂布帛芻粟之征關市𣙜酤之利度僧鬻爵之牒摘山煮海之饒此國財之所由以生也國家兼而用之矣然而經費不足者陛下未得長財心計之臣也凡此四者任人而不任法則政治可得而洽矣夫尚謀智也任人仁也陛下持仁智之大端優遊法宮之中天下才智之士為陛下奔走陳力以濟艱難之業則祖宗丕基為不墜矣陛下縷數政治之目固可槩見其得失然不若詔執政侍從之臣各舉俊傑之士使至行在審其智謀考其議論共佐中興以康庶事臣得為陛下察其忠邪而警勵之臣聞舜之紹堯寇賊姦宄蠻夷猾夏洪水橫流民不粒食舜舉十六相去四凶舞干羽而有苗格于是地平天成萬邦作乂此誠急務親賢仁智之效也當陛下憂勤圖治之時臣敢終始以堯舜之事為言陛下力行是道其于堯舜夫何逺之有臣不勝區區之誠誼又上奏曰臣聞人主之職在論一相夫宰相之任既專則得以持危扶顛為己任今天下之勢可謂顛且危矣正賴宰相總率百官扶持大業若政事之因革官吏之廢置刑賞之重䡖軍師之進退悉斷于宸衷而取決于宰相使宿將功臣戚里近習不得夤緣干請而一切退聽然後朝廷之勢尊而治功成矣伏望陛下安行此道責成宰相茍一物不應許諫官御史論列繩察而百執事之人各守其職以盡規于上庶幾政無多門朝無幸位保護安全共成中興之美不勝天下之幸誼又上奏曰臣伏見朝廷全盛之時尚書為外省受四方之訟牒都堂在禁中議天下之政事士大夫之以職任往來于四方與夫省臺寺監以職任建白于宰執者並晨詣都堂朝服謁見于是宰執受其事目察其人材可否僉諧乃為進退自旦及午閲天下之務不少置也巡幸以來三省都堂不復異處賔從絡繹僅䏻應酬文書紛紜無暇省決又復分廳對客日晏未罷左右司有所禀議逡巡而不得前堂吏抱案牘趑趄户外而退雖有經濟之才彌綸之志何暇措意哉唐制丞郎見宰相須少間乃敢通郎官非公事不敢謁異時宰相往往通賔客至有所善載酒集閣酣醉而去及李德裕為相則喻御史有以事見宰相者必先白臺乃聽自是罷朝百官由龍尾道趨出無輒至閣者觀今日之事以考德裕之所為蓋有謂而為之也伏望睿慈明賜戒諭都堂議事稍遵舊制庶幾多事之時經綸之地不為賔客清談燕坐之所仰副聖主責成仰治之意不勝幸甚右正言陳淵上奏曰治天下有萬世不易之道有一時解紛之計不易之道猶饑渴之于飲食不可一日而無解紛之計若病之用藥已則去之戰國之世諸侯以詐力相吞所患者國之不富兵之不强耳是以當時謀臣䇿士非富國强兵之說不進于其君而孟子則鄙之曰仲尼之徒無道齊晉之事者是以後世無傳焉故雖如管仲之于桓公九合諸侯一匡天下其功可謂盛矣而孟子猶不為也豈以管仲之所成就者可以濟一時之急而不可行之萬世乎方梁惠王以天下莫强之國東敗于齊西喪地于秦南辱于楚欲以一灑其耻問于孟子宜其有甚髙絶異之謀轉禍于立談之頃而成功于反掌之易者而孟子則對之以施仁政于民省刑薄斂深耕易耨修其孝悌忠信而已又何其不切歟蓋濟一時之急者不過富國而强兵行萬世而無弊者非仁政不可也夫仁政得民之術也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣彼所謂富國者困民之本也所謂强兵者毒民之資也以是而欲得民之心不亦難乎雖然不言富國非委貨財而不取也不言强兵非消甲兵而不用也治其本而末從之矣本之如何得民心是己民心既得以之足食則君孰與不足以之治兵則效死而民弗去此湯武之王所以無敵于天下也今為兵而理財取財而虐民民不堪命將轉而為盜賊姦宄莫禁饑饉乘之其患有不可勝言者矣願思孟子之言修仁政以固民心毋以祖宗之德澤未替為言而忽于恤民則天下幸甚左司員外郎王信轉對論士大夫趨向之弊居官者逃一時之責而後有所不恤獻言者求一時之合而行之可否有所不計集事者以趣辦為䏻而不為根本之慮謀利者以羡餘為事而不究源流之實持論尚刻薄而寖失祖宗忠厚之意革弊務煩碎而不明國家寬大之體因循玩習恬不為怪願酌古之道當時之宜示好惡于取舍之間使天下靡然知鄉而無復為目前茍且之狥又論朝廷有恤民之政而州縣不䏻行恤民之實近嵗不登陛下軫念元元凡水旱州郡租賦或蠲放或倚閣住催然倚閣住催之名可以並緣為擾願明與減放上皆納其說歷代名臣奏議卷四十七
