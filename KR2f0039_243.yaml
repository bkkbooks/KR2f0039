body:
  text: 歴代名臣奏議卷二百四十三明楊士竒等撰撰荒政殷王成湯為天子大旱七年太史占之曰當以人禱湯曰吾所為請者民也若必以人禱吾請自當遂齋戒剪爪斷髪素車白馬身嬰白茅以身為犧牲禱于桑林之野以六事自責曰政不節歟民失職歟宫室崇歟女謁盛歟苞苴行歟讒夫昌歟言未巳大雨方數千里漢武帝即位汲黯為謁者東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗然不足以辱天子之使河内失火延燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪上賢而釋之宣帝時丞相魏相數條漢興以來國家便宜行事及賢臣賈誼晁錯董仲舒等所言請施行之奏曰臣聞明主在上賢輔在下則君安虞而民和睦臣相幸得備位不能奉明法廣教化理四方以宣聖德民多背本趨末或有饑寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇竊伏觀先帝聖德仁恩之厚勤勞天下垂意黎庶憂水旱之災為民貧窮發倉廩振乏餧遣諫大夫博士廵行天下察風俗舉賢良平寃獄冠蓋交道省諸用寛租賦弛山澤陂池禁秣馬酤酒貯積所以賙急繼困慰安元元便利百姓之道甚備臣相不能悉陳昩死奏故事詔書凡二十三事臣謹按王法必謹於農而務積聚量入制用以備㓙災亡六年之畜尚謂之急元鼎二年平原渤海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此賴明詔振救乃得䝉更生今歳不登榖暴騰踴臨秋收斂猶有乏者至春恐甚亡以相䘏西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備惟陛下留神元元率由先帝盛德以撫海内上施行其策後漢明帝時王望遷青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見饑者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廩糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談今望懐義忘罪當仁不讓若繩之以法忽其本情將乖聖朝養育之㫖帝嘉意議赦而不罪魏文帝欲徙冀州士家十萬户實河南時連蝗民饑羣司以為不可而帝意甚盛侍中辛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下不以臣不肖置之左右廁之謀議之官安得不與臣議耶臣所言非私也乃社稷之慮也安得怒臣帝不答起入内毗隨而引其裾帝遂奮衣不還良乆乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半晉武帝咸寧三年詔曰今年霖雨過差又有蟲災潁川襄城自春以來畧不下種深以為慮王者何以為百姓計促處當之鎮南將軍杜預上疏曰臣輙思惟今者水災東南特劇非但五稼不收居業并損下田所在停汙髙地皆多磽塉此即百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益盖薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官榖以為生命此乃一方之大事不可不豫為思慮者也臣愚謂既以水為困當恃魚菜螺蜯而洪波汎濫貧弱者終不能得今者宜大壊兖豫州東界諸陂隨其所歸而宣導之交令饑者盡得水産之饒百姓不出境界之内旦暮野食此目下日給之益也水去之後填淤之田畆收數鍾至春大種五榖五榖必豐此又明年益也臣前啟典牧種牛不供耕駕至於老不穿鼻者無益於用而徒有吏士榖草之費歳送任駕者甚少尚復不調習宜大出賣以易榖及為賞直詔曰孳育之物不宜減散事遂停寢後魏明元帝神瑞二年秋榖不登太史令王亮因華隂公主等言䜟書國家當治鄴應大樂三十年勸太宗遷都博士祭酒崔浩與特進周澹言於太宗曰今國家遷都於鄴可救今年之饑非長久之策也東州之人常謂國家居廣漢之地民畜無算號稱牛毛之衆今留守舊都分家南徙恐不滿諸州之地參居郡縣處榛林之間不便水土疾疫死傷情見事露則百姓意沮四方聞之有輕侮之意屈丐蠕蠕必提挈而來雲中平城則有危殆之慮阻隔恒代千里之險雖欲救援赴之甚難如此則聲實俱損矣今居北方假令山東有變輕騎南出燿威桑梓之中誰知多少百姓見之望塵震服此是國家威制諸夏之長策也至春草生乳酪將出兼有菜果足接來秋若得中熟事則濟矣太宗深然之曰唯此二人與朕意同復使中貴人問浩澹曰今既餬口無以至來秋來秋或復不熟將如之何浩等對曰可簡窮下之户諸州就榖若來秋熟年願更圖也但不可遷都太宗從之於是分民詣山東三州食出倉榖以廩之來年遂大熟孝文帝太和十一年京都大饑韓麒麟表陳時務曰古先哲王經邦立治積儲九稔謂之太平故躬籍千畆以勵百姓用能衣食滋茂禮教興行逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝弟同賞實百王之常軌為治之所先今京師民庶不田者多遊食之口三分居二蓋一夫不耕或受其饑況於今者動以萬計故頃年山東遭水而民有餒終今秋京都遇旱榖價踊貴實由農人不勸素無儲積故也伏惟陛下天縱欽明道髙三五昩旦憂勤思恤民弊雖虞帝一日萬幾周文日昃不暇食蔑以為喻上垂覆載之澤下有凍餒之人皆由有司不為明制長吏不恤其本自承平日久豐穰積年競相矜夸遂成侈俗車服第宅奢僭無限喪葬婚娶為費實多貴富之家童妾侈服工商之族玉食錦衣農夫餔糟糠蠶婦乏短褐故令耕者日少田有荒蕪榖帛罄於府庫寳貨盈於市里衣食匱於室麗服溢於路饑寒之本實在於斯愚謂凡珍玩之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸朴素制天下男女計口受田宰司四時廵行臺使歳一按撿勤相勸課嚴加賞賜數年之中必有盈贍雖遇灾凶免於流亡矣往年較比户貫租賦輕少臣所統齊州租粟纔可給俸略無入倉雖於民為利而不可長久脱有戎役或遭天灾恐供給之方無所取濟可減絹布増益榖租年豐多積歳儉出賑所謂私民之榖寄積於官官有宿積則民無荒年矣十四年秋七月尚書中書監髙閭上表曰奉癸未詔書以春夏少雨憂饑饉之方臻愍黎元之傷瘁同禹湯罪已之誠齊堯舜引咎之德虞災致懼詢及卿士令各上書極陳損益深恩被於蒼生厚惠流於后土伏惟陛下天啓聖姿利見纂極欽若昊天光格宇宙太皇太后以叡哲賛世稽合三才髙明柔克道被無外七政昭宣於上九功咸序於下君人之量逾髙謙光之㫖彌篤脩復祭儀宗廟所以致敬飾正器服禮樂所以宣和増儒官以重文德簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置隣黨以穆之究庶官之勤劇班俸禄以優之知勞逸難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鑒在下休咎之徴咸由人召故帝道昌則九疇叙君德衰而彛倫斁休瑞並應享以五福則康于其邦咎徴屢臻罰以六極則害於其國斯乃洪範之實徴神祇之明驗及其厄運所纒世鍾陽九數乖於天理事違於人謀時則有之矣故堯湯逢歴年之災周漢遭水旱之患然立功修行終能弭息今考治則有如此之風計運未有如彼之害而陛下殷勤引過事邁前王從星澍雨之徴指辰可必消災滅禍之符灼然自見雖王畿之内頗為少雨關外諸方禾稼仍茂茍動之以禮綏之以和一歳不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寛其往來頗使欣慰開雲中馬城之倉以賑恤之足以感德致力邊境矣明察畿甸之民饑甚者出靈丘下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以溢其處開關弛禁薄賦賤糴以消其費清道路恣其東西隨豐逐食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜於未然之前申敇外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚於都曹使明折庶獄者重加究察輕者即可決遣重者定狀以聞罷非急之作放無用之獸此乃救荒之常法且以見憂於百姓論語曰不患貧而患不安茍安而樂生雖遭凶年何傷於民庶也愚臣所見如此而已孝文帝時祕書丞李彪上封事曰記云國無三年之儲謂國非其國光武以一畆不實罪及牧守聖人之憂世重榖殷勤如彼明君之恤人勸農而相切若此頃年山東饑去歳京師儉内外人庶出入就豐既廢營産疲困乃加又於國體實有虚損若先多積榖安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京都度支歳用之餘各立官司年豐糴於倉時儉則加私之二糶之於人如此人必事田以買官絹又務貯財以取官粟年登則常積歳凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃田之數以贓贖雜物餘財市牛給科令其肆力一夫之田歳責三十斛甄其正課并征戍雜役行此二事數年之中則榖積而人足雖灾不害隋文帝開皇三年度支尚書長孫平見天下州縣多罹水旱百姓不給奏令民間毎秋家出粟麥一石已下貧富差等儲之閭巷以備凶年名曰義倉因上書曰臣聞國以民為本民以食為命勸農重榖先王令軌古者三年耕而餘一年之積九年作而有三年之儲雖水旱為灾而人無菜色皆由勸導有方蓄積先備故也去年亢陽關内不熟陛下哀愍黎元甚於赤子運山東之粟置常平之官開發倉廩普加振賜少食之人莫不豐足鴻恩大德前古未比其強宗富室家道有餘者皆競出私財逓相賙贍此乃風行草偃從化而然但經國之理須存定式於是奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥於當社造倉窖貯之即委社司執帳檢校毎年收積勿使損敗若時或不熟當社有饑饉者即以此榖振給自是諸州儲峙委積唐太宗貞觀初上入苑中見蝗掇數枚祝之曰民以榖為命而汝食之寧食吾之肝腸欲吞之左右諫曰惡物或成疾上曰朕為民受灾何疾之避遂吞之是歳蝗不為灾後關中大饑上謂侍臣曰水旱不調皆朕失德朕之不修天當責朕百姓何罪而多遭困窮聞有鬻男女者朕甚愍之焉乃遣御史大夫杜淹廵檢出御府金寳贖之還其父母髙宗儀鳯二年夏四月江南旱遣御史中丞崔謐等分道賑給侍御史劉思立上疏曰麥秀蠶老農事方殷聚集㕘迎妨廢不少既縁賑給須立薄書本欲安存更成煩擾伏望且委州縣賑給疏奏謐等遂不行中宗時兵部尚書韋嗣立建言曰臣聞國無九年之儲家無三年之蓄家非其家國非其國也故知立國立家皆資於儲蓄矣夫水旱之災關之隂陽運數非人智力所能及也堯遭大水湯遭大旱則知仁聖之君亦所不免當此時百姓不至於困弊者有積也今陛下倉庫之内比稍空竭尋常用度不支一年儻有水旱人須賑給徴發時動兵要資裝則將何以備之其縁倉庫不實妨於政化者觸𩔖而是臣竊見食封之家其數甚衆昨畧問户部云用六十餘萬丁一丁兩匹即是一百二十萬已上匹臣頃在太府知毎年庸調絹數多不過百萬少則七八十萬以來比諸封家所入全少儻有蟲霜旱潦曽不半在國家支供何以取給臣聞自封茅土裂山河皆須業著經綸功白草昩然後配宗廟之享承帶礪之恩皇運之初功臣共定天下當時食封纔只三二十家今以尋常特恩遂至百家已上國家租賦太半私門則資用有餘國家則支計不足有餘則或致奢僭不足則坐致憂危制國之方豈謂為得封户之物諸家自徴或是官典或是奴僕多挾勢逞威陵突州縣凡是封户不勝侵漁或輸物多索裹頭或相知要取中物百姓怨歎逺近共知復有因將貨易轉更生舉徴打紛紛曽下寧息貧乏百姓何以克堪若必限丁物送太府封家但於左藏請受不得輙自徴催則必免侵漁人冀蘇息代宗時關輔旱河東租庸鹽鐵使裴諝入計帝召至便殿問㩁酤利嵗出内幾何諝久不對帝復問曰臣有所思帝曰何邪諝曰臣自河東來渉三百里而農人愁嘆榖菽未種誠謂陛下軫念元元先訪疾苦而乃責臣以利孟子曰治國者仁義而已何以利為故未敢即對帝曰㣲公言朕不聞此拜左司郎中德宗時中書侍郎同中書門下平章事陸贄請遣使臣宣撫諸道遭水州縣狀曰右頻得鹽鐵轉運及州縣申報霖雨為災彌月不止或川瀆泛漲或溪谷奔流淹没田苗損壊廬舍又有漂溺不救轉徙乏糧喪亡流離數亦非少臣等任處台輔職調隂陽一物失宜尸曠斯在五行愆度黜責何逃陛下德邁禹湯恕人咎己臣等毎奉詞㫖倍益慙惶所以僶俛在公不敢頻煩請罪前者面陳事體須遣使撫綏陛下尚謂詢問來人所損殊少即議優恤恐長姦欺臣等旬日已來更審借訪𩔖㑹行旅所説悉與申報符同但恐所聞聖聰或未盡陳事實夫流俗之弊多徇諂諛揣所悦意者則侈其言度所惡聞者則小其事制備失所恒病於斯初聞諸道水災臣等屢訪朝列多云無害於物以為不足致懐退省其私言則頓異霖潦非可諱之事搢紳皆有識之人與臣比肩尚且相媚況乎事或曖昧人或瑣㣲以利己之心希至尊之㫖其於情實固不易知如斯之流足誤視聴所願事皆覆驗則冀言無詐欺大明照臨天下之幸也昔子夏問於孔子曰何如斯可謂人之父母孔子對曰四方有敗必先知之斯可謂人之父母矣蓋以君人之道子育為心雖深居九重而慮周四表雖恒處安樂而憂及困窮近取諸身如一體之於四支其疾病無不恤也逺取諸物如兩曜之於萬𩔖其鑒照無不均也故時有凶害而人無流亡恃天聴之必聞知上澤之必至是以有母之愛有父之尊古之聖王能以天下為一家中國為一人用此術也今水潦為敗綿數十州奔告於朝日月相繼若哀其疾苦固宜降㫖優矜儻疑其詐欺亦當遣使臣廵視安可徇往來之浮説忘惠卹之大猷失人得財是將焉用況災害已甚申奏亦頻縱不䝉恩復除自當准式蠲免徒失事體無資國儲恐須速降德音深示憂憫分道命使明勅弔災寛息征徭省察寃濫應家有溺死及漂没居産都盡父子不存濟者各量賜粟帛便委使臣與州府以當處官物給付其損壊廬舍田苗者亦委使任與州府據所損作分數等第聞奏量與蠲減租税如此則没者䝉瘞酹之惠存者霑煦嫗之恩霈澤下施孰不欣戴所費者財用所收者人心若不失人何憂乏用臣等已約支計所費亦不甚多倘䝉聖恩允從即具條件續進臣又聞聖人作則皆以天地為本隂陽為端慶賞者順陽之功故行於春夏刑罰者法隂之氣故用之秋冬事或愆時人必罹咎是以月令所載夏行秋令則苦雨數來丘隰水潦夏行冬令則後乃大水敗其城郭典籍垂誡言固不誣天人同符理當必應既有繫於舒慘是能致於災祥頃自夏初大臣得罪親黨坐累其徒實繁邦憲已行宸嚴未解畏天之怒中外竦然若以月令推之水潦或是其應雖天所降沴不在郊畿然海内為家無論遐邇伏願滌瑕以德消沴以和威惠之相濟合宜隂陽之運行自序臣等不勝覩災慙負之至謹奉狀陳請以聞贄又論淮西管内水損處請同諸道遣宣慰使狀曰右奉進止淮西管内貢賦既闕所縁水損簡擇宣慰使此道亦不要遣去者臣聞聖王之於天下也人有不得其所者若己納之於隍故夏禹泣辜殷湯引罪蓋以率土之内莫非王臣或有昏迷不恭是由教化未至常以善救則無棄人自希烈亂常汙染淮甸職貢廢闕責當有歸在於編甿豈任其咎陛下息師含垢宥彼渠魁惟兹下人久罹脇制想其翹望聖化誠亦有足哀傷倘𢎞善救之心當軫納隍之慮今者遣使宣命本縁卹患弔災諸道災患既同朝廷弔卹或異是使慕聲教者絶望懐反側者得詞棄人而固其寇讎恐非所以為計也昔晉饑乞糴于秦大夫百里奚曰天災流行國家代有救災卹鄰道也行道有福丕豹則請因而伐之穆公用百里奚之言拒丕豹之請且曰其君是惡其人何罪遂輸粟以救之其後秦饑乞糴於晉晉大夫虢射曰無損於怨而益於寇不如勿與慶鄭曰幸災不仁貪愛不祥怒隣不義不如與之惠公信虢射之謀違慶鄭之義遂閉糴以絶焉是歳晉國復饑秦伯又饋之粟曰吾怨其君而卹其人終於秦穆霸強晉惠擒辱是知棄怨而施惠者可以懐敵計利而忘義者罔不失人此乃列國諸侯猶務卹鄰救灾矧君臨天下而可使德澤不均被者乎議者多謂淮右洊饑國家之利臣等愚見以為不然必若興有征之師問不庭之罪因災幸濟已爽德政倘又難於用兵望其艱窘自弊利害之勢或未可知夫悍獸之情窮則攫搏暴人之態急則猖狂當其迫阨之時尤資撫馭茍得招攜以禮便可底寧備慮乖方亦足生患竊以帝王之道頗與敵國不同懐柔萬邦唯德與義寧人負我我無負人故能使億兆歸心逺邇從化猶有凶迷不復必當人鬼同誅此其自取覆亡尚亦不足含怒今因供税有闕遂令施惠不均責帥及人恐未為允伏惟聖鑒更審細裁量其所擇諸道使並未敢宣行伏候進止贄又請依京兆所請折納事狀曰京兆府先奏當管蟲食豌豆全然不收請據數折納大豆奉勅宜依度支續奏稱時估豌豆毎斗七十價已上大豆毎斗三十價已下京兆府所請將大豆替豌豆望令據估計錢數折納則冀免損官司者求瘼救灾國之令典求瘼在知其所患救灾在卹其所無只如螟􅈮為殃豌豆全損撿覆若非虚謬地税固合免徵直道而行大體斯在府司折納充數已為剋下從權度支準估計錢乃是幸灾窺利所得無幾其傷實多傷風得財非謂理道且豌豆為物入用甚㣲舊例所支唯充畜料準數迴給大豆諸司誰曰不然計價剰徴義將安在理無所據事不可從望依前勅處分未審可否監察御史韓愈上論天旱人饑狀曰右臣伏以今年以來京畿諸縣夏逢亢旱秋又早霜田種所收十不存一陛下恩踰慈母仁過春陽祖賦之間例皆蠲免所徴至少所放至多上恩雖宏下困猶甚至聞有棄子逐妻以求口食拆屋伐樹以納税錢寒餒道塗斃踣溝壑有者皆已輸納無者徒被追徴臣愚以為此皆羣臣之所未言陛下之所未知者也臣竊見陛下憐念黎元同於赤子至或犯法當戮猶且寛而宥之況此無辜之人豈有知而不救又京師者四方之腹心國家之根本其百姓實宜倍加優卹今瑞雪頻降來年必豐急之則得少而人傷緩之則事存而利逺伏乞特勅京兆府應今年税錢及草粟等在百姓腹内徴未得者並且停徴容至來年蠶麥庶得少有存立臣至陋至愚無所知識受恩思效有見輙言無任懇欵慙懼之至謹録奏聞憲宗時翰林學士白居易上奏曰右伏以聖心憂軫重降德音欲令實惠及人無如減放租税昨正月中所降德音量放去年錢米伏聞所放數内已有納者縱未納者多是逃亡假令不放亦徴不得而旱損州縣至多所放錢米至少百姓未經豐熟又納今年税租疲乏之中重此徴迫人力困苦莫甚於斯却是今年伏望聖恩更與宰臣及有司商量江淮旱損州縣分數更量放今年租税當疲困之際降惻隱之恩感動人情無出於此敢竭愚見以副聖心僖宗乾符元年關東旱饑翰林學士盧攜上書曰國家之有百姓如草木之有根柢若秋冬培溉則春夏滋榮今關東旱灾所至皆饑人無依投待盡溝壑其蠲免餘税實無可徴而州縣督趣甚急動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費未得至於府庫也朝廷倘不撫存百姓實無生計乞勅州縣一切停徴仍發義倉亟加賑給敇從其言而有司竟不能行宋太宗端拱二年冬京城旱左諫議知制誥王禹偁上疏云臣聞一榖不收謂之饉五榖不收謂之饑饉則大夫以下皆損其禄饑則盡無禄廩食而已今旱雲未霑宿麥未茁既無積蓄民饑可憂望下詔直云君臣之間政教有闕自乗輿服御下至百官奉料非宿衛軍士邊庭將帥悉第減之上答天譴下厭人心俟雨足復故臣朝行中家最貧奉最薄亦願首減奉以贖耗蠧之咎外則停歳市之物内則罷工巧之伎近城掘土侵塚墓者瘞之外州配𨽻之衆非贓盜者釋之然後以古者猛虎渡河飛蝗越境之事戒敇州縣官吏其餘軍民刑政之弊非臣所知者望委宰臣裁議頒行但感人心必召和氣真宗時楊億上奏曰臣本州自去年已來秋稼薄熟時物雖至騰踴人户免於流離爰自今春雨水調適粟麥倍稔蠶績頗登餱糧漸充菜色稍減然以山越之俗陸種甚㣲所仰者水田所食者秔稻矧又地勢斗絶塗潦不停仍歳亢旱泉源罄竭儻旬浹不雨即溝瀆揚塵稻畦焦枯善苗立死非三數日一降膏澤無以望於秋成伏日夏至後絶少時雨烈日流爍炎風數興髙仰之田殆至枯槁卑溼之地如沸如羮比户嗷嗷大命近止臣遂率軍州僚吏精意祈求闔境之名山及大川近郭之𤣥宫梵刹廟貎之列祀典者罔不徧走湫潭之庇水族者亦用致祠造龍於壇聿遵古法徙市於野克體前經而雲漢昭回藴隆彌甚尋於前月十六日相次降雨不及寸餘清塵有餘沃焦無益臣夙夜憂慄罔敢遑寧編列之民殆於殞穫比至今月將半旱氣益加一郡之中靡神不禱精誠備盡靈貺蔑然臣忽記憶往年在院供職日適值嵗旱學士承㫖宋白為臣言今御史中丞魏庠三十年前嘗薄遊關輔寓居佛舍㑹天久不雨村民數十輩詣寺祈禱僧有善胡法者捕蜥蜴十數枚置一瓮中漬之以水䝉之以雜樹葉取童男數人衣青衣青塗面及手足人持栁枝沾水散灑且祝曰蜥蜴蜥蜴興雲吐霧雨今霶沲汝今歸去如是者無晝夜嬰繞而言明日大雨逺近告足臣潛疏於牘背至是檢閲得焉即以十二日初旭與知麗水縣事殿中丞甄旦詣城北集福院如其法請禱少頃臣與甄旦出自北門各遵歸路忽有㣲雲自東北起良久彌漫至午未間暴雨及寸餘由是隂結未解至十三日大雨連晝夜約及三四尺溪谷漲滿溝塍流溢禾黍之藁然者芃芃而發秀草樹之瘁然者欣欣而向榮村民荷臺笠以謳耕夫奮襏襫而舞萬室之安堵如故百姓之邪心不生民之幸也陛下之賜也臣忝備守土獲遇有年慶抃之誠萬萬常品臣又念鳴吠之伎前哲不遺芻蕘之言上聖斯採所陳祈請之術親獲感應之徴理近怪神事不經見頗為猥鄙有黷髙明蓋小道之可觀表事君之無隱昔東方朔有言曰謂之為龍又無角謂之蛇又有足跂跂脈脈善縁壁是非守宫即蜥蜴雄亦云執蝘蜒而嘲龜龍又故刑部侍郎張洎嘗謂臣言昔使髙麗汎海忽隂曀舟人譁言龍見洎亟起視之見垂尾於雲間正如蝘蜒之狀良久雨大作即知蜥蜴者亦龍之𩔖也臣既獲嘉應敢不上言干冒宸嚴伏増戰越翰林學士李迪嘗歸沐忽傳詔對内東門真宗出三司使馬元方所上歳出入財用數以示迪時頻歳蝗旱問何以濟迪請發内藏庫以佐國用則賦斂寛民不勞矣帝曰朕欲用李士衡代元方俟其至當出金帛數百萬借三司迪曰天子於財無内外願下詔賜三司以示恩德何必曰借帝悦集賢院權管幹通進銀臺司田錫上奏曰臣今月二十五日所進實封為霸州乾寧軍死傷人户等自二十六日至今又據莫州奏饑死一十六口滄州奏全家饑死一十七户雖有指揮下轉運司相度及減斗斛價賑糶即未見别行指揮若有司只如此行遣實未稱陛下憂勞之心也陛下為民父母使百姓饑死乃是陛下孤負百姓也宰相調燮隂陽啓導聖德而惠澤不下流王道未融明是宰相孤負陛下也今陛下何不引咎如禹湯罪已畧降德音下饑餓殺人處州府民心知陛下憂恤然後振廩給貸以救其死若倉廩虚而饋運邊備未足即日無可給貸則是執政素不用心所致昔伊尹作相恥一夫不獲今餓殺人如此所謂焉用彼相今陛下可將此事以理道畧面責宰臣以下觀其何辭以對視其有無怍色有無憂色待三日而後或旬浹以來不上表待罪不拜章求退是忍人也何良相之為乎既非良相而猶用之則是陛下不以百姓心為心也若不别進用賢臣恐危亂之萌將來滋蔓難圖也語曰十室之邑必有忠信況今皇家富有萬國豈無人焉可於常參官自來五日一轉對中觀其所上之言有逺大謀畧經綸才業者可非次擢用若有其言而無其實退之以禮亦合理體不然則臣恐國家未能早致太平也豈唯太平之未能致其憂患不獨在邊防而叛亂在内地也此是陛下纉嗣先帝萬世基業之急務也所急之務莫先於此惟聖聰睿鑒詳㣲臣之言陸贄云貪因循者終有大患今若因循不早為謀則慮大患至矣今臣所奏且可先降德音以禹湯責躬之意以謝天以堯舜至仁之心以待下使饑餓地分知陛下憂恤之心也臣職在深嚴日有見聞不敢不奏仁宗明道二年詔議復義倉不果景祐中集賢校理王琪請復置令五等已上户隨夏秋二税二斗别輸一升水旱減税則免輸州縣擇便地置倉貯之領於轉運使計以一中郡正税歳入十萬石則義倉可得五千石推而廣之則利博矣明道中饑歉國家欲盡貸饑民則軍食不足故民有流轉之患是時兼并之家出粟數千石即補吏是豈以官爵為輕歟特愛民濟物不獲己為之爾且兼并之家占田常廣則義倉所入常多中下之家占田常狹則義倉所入常少及水旱振濟則兼并之家未必待此而濟中下之民實先受其賜矣事下有司㑹議議者異同而止景祐二年御史中丞杜衍乞詳定常平制度疏曰臣聞農者國之本不可不勸其業榖者民之命不可不為之儲盖歳有豐凶榖有貴賤計本量委欲及其時散滯取贏宜究其術前志曰欲人務農人有所利粟有所歸謂官以法收之也今豪民富家乗時賤收拙業之人旋致罄竭及穡事不興小有水旱則稽貨不出須其翔踴以謀厚利農民貴糴纔充口腹往復受弊無復窮己雖勸課之官家至日見亦奚益於事哉管子曰令有緩急物有輕重人君不治則蓄賈游市乗人不給百倍其利矣又曰萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬由此言之則平糴常平之制其來久矣非始於漢宣之世也國家列郡置常平倉所以利農民備饑歳也然而有名無實者制度不立耳臣以謂立制度在乎量州郡之逺邇計户口之衆寡取賤出貴差别其饑熟信賞必罰責課於官吏出納無壅増減有制本息之數勿假以供軍斂導之時禁其爭利六斛四㪷曰鍾萬室之邑萬鍾則今萬戸郡常平倉可收六萬四千斛已上也俟本息増贏即加其元額歳有大中小饑亦有大中小熟常謹察以出入之節今欲立制度而無賞罰則法不得行以其外計諸州縣官吏宜立功過之差以示必行每趨時收糴應急出糶無令所司壅遏則利可及人也歳豐則増市價而糴所増錢毎㪷不得過一十文饑則减市價而糶到數三分支一分與告首人糴畢則不禁至於蜀漢狭境交廣寛鄉或通川易地之殊或邊郡巖邑之異各立條教以節盈虚限囘易之歳時虞其損敗制立典之侵刻督以嚴科則瘠瘦可充饑饉有備也今則不然九榖散於穰歳而不能儲峙兆民困於凶年而無以振業饒贍之道固若斯乎誠嚴敕州郡據本處有無見管常平倉錢斛今後漸令隨户口趂額收糴轉運司等不得以運軍須為名奏乞假借其逐處合備貫石數目若有缺少令多方計度供給倘有全然少本無可圓融之處伏乞霈然下詔出府庫乳香犀象真珠之𩔖相度隨處減價出賣添備倉本凡此珍異之物饑不可食寒不可衣常時則曠日可以漸次出賣速賣則雖减價數倍人亦不可取也宜及平歳鬻之以為豐國惠下之本上以章去奢崇儉之仁下以成敦本惠民之道俟州郡有本息増羨之處令外計逺近均融各足其額除邊逺之郡及山險之地糴貯不得過定額外沿路州府亦許就賤多糴仍先乞指揮有司將見行常平倉條貫并臣此劄子重别詳定具為條件務令精宻經久為例并立定逐州軍合糴額數畫一開坐聞奏朝廷更為裁酌頒行此法之設蓋以抑兼并惠貧弱茍行之必信守之必堅本息漸増則公私獲利矣比夫義社之制别生賦斂官吏侵削急速假借害大利小創於隋時而唐戴胄者猶請復之頗得其利矧兼惠農末振塞利孔之術可忽其名而不務乎議者若云聖朝不當以出息為名此又不稽其實者也周公制民貸者以國服為之息又貸萬泉者入息五百亦取之以其道耳必也倉儲充羨國用富強雖有凶荒不至捐瘠則仁聖域民之道莫大於此也臣以狂瞽輙効涓埃冒瀆威顔伏深殞越慶歴二年右正言歐陽修論乞賑救饑民劄子曰臣伏見近降大雪雖是將來豐熟之兆然即日陜西饑民流亡者衆同華河中尤甚往往道路遺棄小兒亦乞早降指揮令長吏收卹仍聞京西東大雪不止毁折桒柘不少切慮向去絲蚕税賦無所出致貧民起為盜賊亦乞特降指揮體量臣切見國史書祖宗朝毎奏一兩州軍小有灾傷亦隨多少賑卹或蠲免税租盖以所放者少不損國用又察民疾苦㣲細不遺所以國恩流布民不怨嗟不必須待灾傷廣闊方行賑救也方今人貧下怨之際不厭頻推恩惠伏望聖慈特賜矜憫修又論救賑雪後饑民劄子曰臣風聞京城大雪之後民間饑寒之人甚多至有子母數口一時凍死者雖豪貴之家往往亦無薪炭則貧弱之人可知矣盖京師小民例無蓄積只是朝夕旋營口食一日不營求則頓至乏絶今大雪已及十日使市井之民十日不營求雖中人亦乏絶矣況小民哉雪於農民雖為利澤然農畆之利逺及春夏細民所苦急在目前日夕已來民之凍死者漸多未聞官司有所賑救欲乞特降聖㫖下開封府或分遣使臣遍録民間貧凍不能自存者量散口食并各於有官塲柴炭草處就近支散救其將死之命至於諸營出軍家口亦宜量加存卹以示聖恩所散不多所利者衆仍令兩府條件應有軍士在外辛苦及民人支移税賦殘零輸送艱辛等處並與擘畫早加存卹若使戍兵愁苦道路怨嗟饑凍之尸列於京邑則大雪之澤其利未見而數事之失所損已多伏乞聖慈特賜留意修又論救賑江淮饑民劄子曰臣伏見近出内庫金帛賜陜西以救饑民風聞江淮以南今春大旱至有井泉枯竭牛畜瘴死雞犬不存之處九農失業民庶嗷嗷然未聞朝廷有所存卹陛下至仁至聖憂民愛物之心無所不至但患逺方疾苦未逹天聰茍有所聞必須留意下民疾苦臣職當言昨江淮之間去年王倫蹂踐之後人户不安生業倫賊纔滅瘡痍未復而繼以飛蝗自秋至春三時亢旱今東作已動而雨澤未霑此月不雨則終年無望加又近年已來省司屢於南方斂率錢貨而轉運使等多方刻剥以貢羨餘江淮之民上被天灾下苦賊盜内應省司之重斂外遭運使之誅求比於它方被苦尤甚今若不加存卹將來繼以凶荒則饑民之與疲怨者相呼而起其患不比王倫等偶然狂叛之賊也臣以為民怨已久民疲可哀因其甚困宜速賜惠不惟消弭盜賊之患兼可以悦其疲怨之心伏望聖慈特遣一二使臣分詣江淮名山祈禱雨澤仍下轉運并州縣各令具逐處亢旱次第奏聞及一面多方擘畫賑濟窮民無至失時以生後患右正言余靖論借支常平本錢疏曰臣聞天下無常安之勢無常勝之兵無常足之民無常豐之嵗由是古先聖王守之有道制之有術倘有緩急不可無備伏覩真宗皇帝景德中詔天下以逐州户口多少量留上供錢起置常平倉付司農寺係帳三司不問出入毎年夏秋兩熟準市價加錢收糴其出息本利錢只委司農寺主掌三司轉運司不得支撥自後毎遇灾傷賑貸使國有儲蓄民免流散者用此術也前三司使姚仲孫今春以來於京東等處借支司農常平倉以給和買雖然借支官錢以充官用循常視之似無妨碍若於經逺之謀深所未便臣切惟真宗皇帝聖慮深逺臣敢梗槩言之當今天下金榖之數諸路州軍年支之外悉充上供及别路經費見在倉庫更無餘羨所留常平本錢及斛㪷等若以賑濟饑荒此固常所及矣萬一不幸方隅小有緩急賞給資糧倉卒可備豈非先皇暗以數百萬之資蓄於四方者乎今若先為三司所支則天下儲蓄盡矣伏乞特降指揮三司先借支常平本錢去處並仰疾速撥還今後不得更支撥並依景德元降敇命施行三年靖又乞寛租賦防盜賊疏曰臣伏覩春夏以來旱勢至廣陛下憂勞勤恤躬行祈禱雖獲佳應而夏田先已損矣臣以古者三年耕必有一年之蓄九年耕必有三年之蓄無三年之蓄曰國非其國故雖堯水湯旱民無菜色者有備灾之術也方今官多冗費民無私蓄一歳不登逃亡滿道盖上下皆無儲積故也臣切謂當今備灾之術最急者寛租賦防盜賊而已誠知國家邊甲未解經費日廣不宜更減民賦自窘財用其如農收有限當量民力而取之雖或差減尚有數分之入今若同取一旦不堪其求必致流亡之患則永失常賦矣今天府之民九重不逺其訴旱者尚或半得申明半遭抑退況逺方之人其無告必矣陜關已西尤須撫之伏望朝廷特降詔命應遭旱州軍委清強官體量實旱損夏苗去處特與量減夏税分數不得容有僥倖此乃惠民之實效也若待有逃亡然後賑救將無及矣臣又聞衣食不足雖堯舜在上不能使民不為盜賊若水旱之後盜賊滋長勢之常也近聞解州鄧州羣賊入城劫掠人户此乃都監押廵檢不得其人之所致也似此階漸不宜滋蔓伏乞朝廷申明捕捉之科嚴賞罰之典其不獲強盜賊人不得將竊盜比折特行勒停替降之法庶幾戮力同心以折盜賊之勢慶歴中陜西經畧安撫使范仲淹奏乞差官陜西祈雨疏曰臣今月五日至華州華隂縣入西嶽廟燒香切見本廟有老醫官一員監當其廟廷闊逺舍屋甚多只有剰員一十四人盡是老年病患供應洒掃不前在國家崇奉五嶽之意似非嚴謹今來關中大旱永興同華陜虢以來無二三分秋苗粟米毎㪷一百五十文足兼鄉村無可收糴人心嗷嗷賊盜不少欲乞聖慈選精謹使命至西嶽廟專行祭告并於陜西靈湫等處祈雨澤以救生民仍乞委轉運使一員赴西嶽廟㸃檢廟貌祭器法物并添差兵士洒掃防䕶所貴崇奉之禮不致廢墜皇祐四年集賢殿修撰知梓州何郯上奏曰臣伏聞近日累差内臣往諸路監督州郡官吏捕蝗縁内臣是出入宫掖親信之人以事勢量之州縣必過有迎奉往來行李亦須要人州郡猶有兵士給使至於縣邑即須差貧下人户蟲蝗未能除去人民被此勞役已先起一害矣如去歳遣内臣入蜀祈雨所至差百姓五七十人擔擎行李盖外方不知朝廷恤民本意茍見貴近之臣即嚮風承迎不顧勞擾非必使人自要如此也況捕蝗除害本繫民事乃郡縣守宰之職今捨守宰不任而朝廷為之遣人監捕即是容官司之慢而不責其職業也伏乞特降敕命應有蝗蟲生長處專責知州通判督促屬縣官吏速行打捕委本路轉運司嚴切提舉部内州郡候屏除盡日具實以聞如經奏報後却致滋長為害其知州通判知縣主簿並行停殿轉運使黜降差遣如此嚴行督責官司必自能究心除害聖意如何即乞速降指揮其見在逐處内臣仍乞抽回五年右司諫賈黯乞立民社義倉疏曰臣伏以天下無事年榖豐熟則人民安樂父子相保一遇水旱則流離死亡捐棄道路發倉廩以賑之則糴不給課粟富人則力不贍轉輸千里則不及事移民就榖則逺近交困朝廷之臣郡縣之吏倉卒不知所出則民饑而死者已過半矣夫水旱之灾雖堯湯所不能免今不思所以備灾之術而歳幸年榖之熟則是求出於堯湯之所不可必者也臣嘗讀隋史見所謂立民社義倉者取之以時而藏之於民下足以備凶灾而上實無利焉願倣隋制詔天下州軍遇年榖豐熟立法勸課蓄積以備灾此孟子所謂樂歳粒米狼戾多取之而不為虐者也況取之以為民邪疏既上上下其説司農寺且命李充與黯合議以聞乃下諸路度可否而以為可行者纔四路餘或謂税賦之外兩重供輸或謂恐招盜賊或謂已有常平以贍給或謂置倉煩擾於是黯復上奏曰臣嘗判尚書刑部見天下歳斷死刑多至四千餘人其間盜賊率十六七盖愚民迫於饑寒因之水旱枉陷重辟故臣請復民社義倉以備凶歳今諸路所陳𩔖皆妄議若謂賦税之外兩重供輸則義倉之意乃教民儲積以備水旱官為立法非以自利行之既久民必樂輸若謂恐招盜賊盜賊利在輕貨不在粟麥今鄉村富室有貯粟數萬石者不聞有劫掠之虞且盜賊之起本由貧困臣建此議欲使民有貯積雖遇水旱不憂乏食則人人自愛而重犯法此正消除盜賊之原也若謂有常平足以振給則常平之設盖以準平榖價使無甚貴甚賤之傷或遇凶饑發以振捄既已失其本意而費又出公帑今國用頗乏所蓄不厚近歳非無常平小有水旱輙流離餓莩起為盜賊則是常平果不足仰以振給也若謂置倉廩斂材木恐為煩擾則今州縣修治郵𫝊驛舍皆歛於民豈於義倉獨畏煩擾人情可與樂成不可與謀始願自朝廷斷而行之然當時牽於衆論終不果行仁宗時秘閣校理呉及言春秋有告糴陛下恩施動植視人如傷然州郡官司各專其民擅造閉糴之令一路饑則鄰路為之閉糴一郡饑則隣郡為之閉糴夫二千石以上所宜同國休戚而坐視流離豈聖朝子兆民之意哉遂詔鄰路鄰州灾傷而輙閉糴論如違制律監察御史包拯請救濟江淮饑民疏曰臣聞天以五星為府人以九榖為命五星紊於上則灾異起於下九榖絶於野則盜賊興於外天之於人上下相應故天變於其上則人亂於其下是天人相與之際甚可畏也若變異上著則恐懼脩省以謝於下年榖不登則振貸己責而恤其困盖不使天有大變而民有飢色則人獲富壽而國享安寧矣方今灾異之變尤甚臣近已論列詳矣惟江淮六路連歳亢旱民食艱阻流亡者比比皆是朝廷昨遣使命安撫振貸以救其弊而東南歳運上供米六百萬石近雖減一百萬石縁逐路租税盡已蠲復則糧斛從何而出未免州縣配糴以充其數由是民間所出悉輸入官民儲已竭配者未巳縱有米價率無可糴父子皇皇相顧不捄老弱者死於溝洫少壯者聚為盜賊不幸姦雄乗間而起則不可制矣當以何道而卒安之哉且國家之患未有不縁此而致可不熟慮乎欲望聖慈特降指揮應江淛六路灾傷州縣凡是配糴及諸般科率一切止絶如敢故犯並坐違制庶幾少釋疲民倒垂之急其上供米數若不敷元額即候向去豐熟補填仍令州縣官吏多方擘畫捄濟饑民不得失所兼委逐路提轉專切提舉如不用心捄濟以致流亡及結成羣黨即乞一例重行降黜拯又請支義倉米賑給百姓疏曰臣訪聞江浙荆湖等路自去秋亢旱田苗一例灾傷即日米價甚髙民食不足若不速令捄濟必致流亡強壯者起為盜賊老弱者轉死溝洫因此生事為患不細縁逐州除軍糧常平倉外别無大段斛斗准備切知王琪見起義倉所在現管米數稍多州縣未必敢專輙支用若一取候朝廷指揮往復數月當此艱食之際恐無所及欲望特降指揮逐路轉運司勘㑹轄下元係灾傷州縣如委實人户闕食即令畫時將義倉米速行賑給以濟貧民如允臣所奏即乞早賜指揮拯權三司使請免江淮兩淛折變疏曰臣切見淮南江浙荆湖等州軍數年以來例皆薄熟去秋亢旱尤甚可熟三二分當年夏税見錢一例科折内第一等折納小綾毎匹一貫六百六十文省官絁毎匹二貫八百五十文省其第二等已下至客户並折納小麥毎斗三十四文省續據發運司准中書劄子據三司奏乞將慶歴三年上供額斛六百萬石内將小麥一百萬石大豆十五萬石折納見錢發運司遂相度小麥毎斗并耗添估九十四文省大豆毎斗并耗八十八文省比逐處見糶價例兩倍已上應該小麥一石納見錢九百四十文省尋又准五月九日中書劄子據發運司奏切慮豆麥價髙人户難得見錢奉聖㫖宜令本司疾速指揮逐路州軍據合折夏税豆麥令人户如願納見錢者即仰逐處依起納日在市價例錢數送納如只願納本色斛斗亦聴從便雖有前件聖㫖指揮本處官吏並不遵禀但一面抑令人户納元估價錢不許納本色斛斗以致豆麥益賤錢貨難得下等人户尤更不易發運司但務歳計充盈不慮民力困竭上下相䝉無所訴告為國斂怨莫甚於此且民者國之本財用所出安危所繫而横賦暴取不知紀極若因此流亡相應而起塗炭郡邑則將何道可以卒安之況已萌之兆不可不深慮耳兼自淮以南又兩浙荆湖從去秋至今春並未得雨二麥不秀耕種失時民心熬熬日懐憂懼欲望聖慈特降詔勅委逐路轉運提刑不住廵歴體量應是諸雜科率權且停罷若向去蠶麥稍熟今年夏税諸色錢等除第一第二等户各令依舊折納外其第三等已下并客户特與免諸般支移折變只令各納本色庶使重困之民稍獲蘇息拯為三司户部副使請差灾傷路分安撫疏曰臣切聞江淮兩浙荆湖南北路近歳旱澇相繼粒食踴貴淮南西路蘄黄等州尤甚去秋霖雨隕霜損害苗稼今夏大水飄流居人兼又官中配糴民間之蓄盡輸入官官糴既多迨今五月不雨秋苗悉已枯槁米價斗二百文縱江淮稔時米雖賤而民有饑者況遇凶年亦何卒歳為其無備故也今則民間之蓄盡為軍儲矣民失其賴流亡日衆故賊盜充斥聚集成羣大者近百人小亦不下數十人所在剽虜官司不能禁自光壽以南距江亦皆如是州縣上下逓相䝉蔽不以上聞使朝廷無繇知之況今秋苗稼既槁則望在來夏而凋殘之民朝不謀夕豈能及來夏子且天之降咎必在於凶年者盖年凶則民饑饑則盜起盜起則姦雄出姦雄出則不可制矣豈可不深懼而豫防之哉伏望聖慈申明執政大臣應江淮兩浙荆湖等州軍自去夏至今秋灾傷甚處選差臣寮遍令體量安撫從便宜而振貸之夫捄灾卹患國之常也若忽而不顧寖成大患得不為朝廷之深憂乎歴代名臣奏議卷二百四十三
