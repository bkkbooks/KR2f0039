body:
  text: 歴代名臣奏議卷二百二十八明楊士竒等撰征伐吳大帝初以張紘爲長史從征合肥大帝率輕騎將往突敵紘諫曰夫兵者凶器戰者危事也今麾下恃盛壯之氣忽强暴之虜三軍之衆莫不寒心雖斬將搴旗威震敵場此乃偏將之任非主將之宜也願抑賁育之勇懐霸王之計權納紘言而止旣還明年將復出軍紘又諫曰自古帝王受命之君雖有皇靈佐於上文德播於下亦賴武功以昭其勲然而貴於時動乃後爲威耳今麾下值四百之厄有扶危之功宜且隱息師徒廣開播殖任賢使能務崇寛惠順天命以行誅可不勞而定也於是遂止時魏曹操遣廬江太守朱光屯皖大開稻田吕䝉言於大帝曰皖田肥美若一收熟彼衆必増宜早除之權乃親攻皖城諸將欲作土山添攻具吕䝉曰治攻具及土山必歴日乃成城備旣脩外救亦至不可圖也且吾乘雨水以入若留經日水必向盡還道艱難䝉竊危之今觀此城不能甚固以三軍勢氣四面並攻不移時可拔及水以歸全勝之道也從之黄龍元年欲遣偏師取夷州及珠崖皆以諮上大將軍右都護陸遜遜上疏曰臣愚以爲四海未定當須民力以濟時務今兵興歴年見衆損減陛下憂勞聖慮忘寢與食將逺規夷州以定大事臣反覆思惟未見其利萬里襲取風波難測民易水土必致疾疫今驅見衆經涉不毛欲益更損欲利反害又珠崖絶險民猶禽獸得其民不足濟事無其兵不足虧衆今江東見衆自足圖事但當畜力而後動耳昔桓王創基兵不一旅而開大業陛下承運拓定江表臣聞治亂討逆須兵爲威農桑衣食民之本業而干戈未戢民有饑寒臣愚以爲宜育養士民寛其租賦衆克在和義以勸勇則河渭可平克有一統矣公孫淵背盟大帝欲往征之上大將軍右都護陸遜又上疏曰淵憑險恃固拘留大使名馬不獻實可讎忿蠻夷猾夏未染王化鳥竄荒裔拒逆王師至令陛下爰赫斯怒欲勞萬乘汎輕越海不慮其危而涉不測方今天下雲擾羣雄虎爭英豪踴躍張聲大視陛下以神武之姿誕膺期運破操烏林敗備西陵禽羽荆州斯三虜者當世雄桀皆摧其鋒聖化所綏萬里草偃方蕩平華夏總一大猷今不忍小忿而發雷霆之怒違垂堂之戒輕萬乘之重此臣之所惑也臣聞志行萬里者不中道而輟足圖四海者匪懐細以害大彊宼在境荒服未庭陛下乘桴逺征必致闚𨵦慼至而憂悔之無及若使大事時㨗則淵不討自服今乃逺惜遼東衆之與馬奈何獨欲捐江東萬安之本業而不惜乎乞息六師以威大虜早定中夏垂曜將來帝用納焉三年薛綜爲尚書僕射時公孫淵降而復叛大帝盛怒欲自親征綜上疏諫曰夫帝王者萬國之元首天下之所繫命也是以居則重門擊柝以戒不虞行則清道案節以養威嚴盖所以存萬安之福鎮四海之心昔孔子疾時託乘桴浮海之語季由斯喜拒以無所取才漢元帝欲御樓船薛廣德請刎頸以血染車何則水火之險至危非帝王所宜涉也諺曰千金之子坐不垂堂況萬乘之尊乎今遼東疎逺小國無城池之固備禦之術器械銖鈍荒亂無政往必禽克誠如明詔然其方土寒埆榖稼不殖民習鞌馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪流滉瀁有成山之難海行無常風波難免倐忽之間人船異勢雖有堯舜之德智無所施賁育之勇力不得設此不可二也加以鬰霧冥其上鹹水蒸其下善生流腫轉相洿染凡行海者稀無所患此不可三也天生神聖顯以符瑞當乘平喪亂康比民物嘉祥日集海内垂定逆虜凶虐滅亡在近中國一平遼東自斃但當拱手以待耳今乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以來所未嘗有斯誠羣僚所以傾身側息食不甘味寢不安席者也惟陛下抑雷霆之威忍赫斯之怒遵乘橋之安逺履冰之險則臣子賴祉天下幸甚時羣臣多諫帝遂不行嘉禾元年公車徴陸瑁拜議即選曹尚書大帝忿公孫淵之巧詐反覆欲親征之瑁上疏諫曰臣聞聖王之御逺夷羈縻而已不常保有故古者制地謂之荒服言慌惚無常不可保也今淵東夷逺服屏在海隅雖託内面與梗化無異國家所爲不愛貨寳遠以加之者非嘉其德義也誠欲誘納愚弄以規其馬耳淵之驕黠恃遠負命此乃荒貊常態豈足深怪昔漢諸帝亦嘗銳意以事外夷馳使散貨充滿西域雖有恭從然其使人見害財貨并没不可勝數今陛下不忍悁悁之忿欲越巨海身踐其土羣臣愚議竊謂不安何者北部與國壤地連接茍有間隙應機而至夫所以越海求馬曲意於淵者爲赴目前之急除腹心之疾也而更棄本追末捐近治遠忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也又兵家之術以功役相疲勞逸相待得失之間所覺輒多且沓渚去淵道里尚遠今到其岸兵勢三分使彊者進取次當守船又次運糧行人雖多難得悉用加以單步負糧經遠深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日脣齒相濟若實孑然無所憑賴其畏怖遠迸或難卒滅使天誅稽於朔野山虜承間而起恐非萬安之長慮也帝未許瑁重上疏曰夫兵革者固前代所以誅暴亂威四夷也然其役皆在奸雄已除天下無事從容廟堂之上以餘議議之耳至於中夏鼎沸九域槃互之時率須深根固本愛力惜費務自將養以待鄰敵之闕未有正於此時舎近治遠以疲軍旅者也昔尉佗叛逆僭號稱帝于時天下乂安百姓殷阜帶甲之數糧食之積可謂多矣然漢文猶以遠征不易重興師旅告喻而已今凶桀未殄彊埸猶警雖蚩尤鬼方之亂故當以緩急差之未宜以淵爲先願陛下抑威住計暫寧六師潛神嘿規以爲後圖天下幸甚帝再覽瑁書嘉其辭理端切遂不行赤烏四年零陵太守殷札言於大帝曰今天棄曹氏喪誅累見虎爭之際而幼童蒞事陛下身自御戎取亂侮亡宜滌荆揚之地舉彊羸之數使彊者執㦸羸者轉運西命益州軍於隴右授諸葛瑾朱然大衆指事襄陽陸遜朱桓别征壽春大駕入淮陽歴青徐襄陽壽春困於受敵長安以西務對蜀軍許洛之衆勢必分離掎角瓦解民必内應將帥對向或失便宜一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乘勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退民疲威消時往力竭非出兵之䇿也時弗能用之烏程侯皓寳鼎元年五官中郎將丁忠使晉還說曰北方守戰之具不設弋陽可襲而取皓訪羣臣鎮西大將軍陸凱曰夫兵不得已而用之耳且三國鼎立以來更相侵伐無嵗寧居今強敵新并巴蜀有兼土之實而遣使求親欲息兵役不可謂其求援於我今敵形勢方強而欲徼幸求勝未見其利也車騎將軍劉纂曰天生五才誰能去兵譎詐相雄有自來矣若其有闕庸可棄乎宜遣間諜以觀其勢皓隂納纂言且以蜀新平故不行然遂自絶時師旅仍動鎮軍大將軍陸抗上疏曰臣聞易貴隨時傳美觀釁故有夏多罪而殷湯用師紂作淫虐而周武授鉞苟無其時玊䑓有憂傷之慮孟津有反斾之軍今不務富國強兵力農畜榖使文武之才效展其用百揆之署無曠厥職明黜陟以厲庶尹審刑罰以示勸沮訓諸司以德而撫百姓以仁然後順天承運席卷宇内而聽諸將徇名窮兵黷武動費萬計士卒彫瘁宼不爲衰而我已大病矣今爭帝王之資而昧十百之利此人臣之姦便非國家之良䇿也昔齊魯三戰魯人再克而亡不旋踵何則大小之勢異也況今師所克獲不補所喪哉且險兵無衆古之明鑒誠宜暫息進取小規以畜士民之力觀釁伺隙庶無悔吝晉武帝咸寧五年王濬上疏曰吳孫皓荒淫凶逆宜速征伐若皓死更立賢主則強敵也臣作船七年日有朽敗臣年七十死亡無日三者一乖則難圖矣願陛下無失事機帝於是決意伐吳武帝宻有滅吳之計而朝議多違惟度支尚書杜預及羊祜張華與帝意合祜病舉預自代及祜卒拜預爲鎮南大將軍都督荆州諸軍事預啓請伐吳之期帝報待明年方欲大舉預表陳至計曰自閏月以來賊但勅嚴下無兵上以理勢推之賊之窮計力不兩完必先認上流勤保夏口以東以延視息無縁多兵西上空其國都而陛下過聽便用委棄大計縱敵患生此誠國之遠圖使舉而有敗勿舉可也事爲之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也陛下宿議分命臣等隨界分進其所禁持東西同符萬安之舉未有傾敗之患臣心實了不敢以曖昧之見自取後累惟陛下察之預旬月之中又上表曰羊祜與朝臣多不同不先博畫而宻與陛下共施此計故益令多異凡事當以利害相較今此舉十有八九利其一二止於無功耳其言破敗之形亦不可得直是計不出己功不在身各恥其前言故守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後難故輕相同異也昔漢宣帝議趙充國所上事效之後詰責諸議者皆叩頭而謝以塞異端也自秋以來討賊之形頗露若今中止孫皓怖而生計或徙都武昌更完修江南諸城遠其居人城不可攻野無所掠積大船於夏口則明年之計或無所及時帝與中書令張華圍棊而預表適至華推枰斂手曰陛下聖明神武朝野清晏國富兵強號令如一吳主荒淫驕虐誅殺賢能當今討之可不勞而定帝乃許之愍帝時琅邪國侍即王鑒勸元帝親征杜弢丞相叅軍熊遠上疏曰皇綱失綂中夏多故聖主肇祚遠奉西都梓宫外次未反園陵逆寇遊魂國賊未夷明公憂勞乃心王室伏讀聖教人懐慷慨杜弢小豎寇抄湘川比年征討經載不夷昔高宗伐鬼方三年乃剋用兵之難非獨在今伏以古今之霸王遭時艱難亦有親征以隆大勲亦有遣將以平小寇今公親征文武將吏度支籌量舟輿器械所出若足用者然後可征愚謂宜如前遣五千人徑與水軍進征既可得速必不後時昔齊用穰苴燕晉退軍秦用王翦剋平南荆必使督護得才即賊不足慮也東晉元帝初杜弢作逆江湘流弊王敦不能制朝廷深以爲憂琅邪國侍郎王鑒上疏勸帝征之曰天禍晉室四海顛覆喪亂之極開闢未有明公遭歷運之厄當陽九之㑹聖躬負伊周之重朝廷延匡合之望方將振長轡而御八荒掃河漢而清天塗所藉之資江南之地盖九州之隅角垂盡之餘人耳而百越鴟視於五嶺蠻蜀狼顧於湘漢江州蕭條白骨塗地豫章一郡十殘其八繼以荒年公私虚匱倉庫無旬月之儲三軍有絶乏之色賦斂搜奪周而復始卒散人流相望於道殘弱之源日深全勝之勢未舉鑒懼雲旗反斾元戎凱入未在旦夕也昔齊旅未朞而申侯懼其老況暴甲三年介胄生蟣蝨而可不深慮者哉江掦本六郡之地一州封域耳若兵不時戢人不堪命三江受敵彭蠡振揺是賊踰我垣墻之内闚我室家之好黷武之衆易動驚弓之鳥難安鑒之所甚懼也去年已來累喪偏將軍師屢失送死之寇兵厭奔命賊量我力矣雖繼遣偏裨懼未足成功也愚謂尊駕宜親幸江州然後方召之臣其力可得而宣熊羆之士其銳可得而奮進左軍於武昌爲陶侃之重建名將於安成連甘卓之壘南望交廣西撫蠻夷要害之地勒勁卒以保之深溝堅壁按精甲而守之六軍旣贍戰士思奮爾乃乘隙騁竒擾其窟穴顯示大信開以生塗杜弢之頸固已鎖於麾下矣成帝咸康五年庾亮欲開復中原表遣諸軍羅布江沔以爲伐趙之規帝下其議太常蔡謨上議曰時有否泰道有屈伸茍不計彊弱而輕動則亡不終日何功之有爲今之計莫若養威以俟時時之可否繫朔之彊弱朔之彊弱繫虎之能否自石勒舉事虎常爲爪牙百戰百勝遂定中原勒死之後虎挾嗣君誅將相内難旣平翦削外寇不失尺土以是觀之虎爲能乎將不能也今征西將自將大軍席卷河南虎必親率其衆來決勝負欲與之戰何如石生若欲城守何如金墉欲阻沔水何如大江欲拒石虎何如蘇峻石生猛將關中精兵征西之戰殆不能勝也金墉險固劉曜十萬衆不能拔又當是時洛陽關中皆舉兵擊虎今此三鎮反爲其用方之於前倍半之勇也石生不能敵其半而征西欲當其倍愚所疑也蘇峻之彊不及石虎沔水之彊不及大江大江不能禦蘇峻而欲以沔水禦石虎又所疑也昔袓士稚在譙佃於城北界豫置軍屯以禦其外榖熟敵至丁夫戰於外老弱穫於内多持炬火急則燒糓而走如此數年竟不獲利當其時敵唯據河北方之於今四分之一耳士稚不能捍其一而征西欲以禦其四又所疑也然此但論征西旣至之後耳尚未論道路之慮也自沔以西水急岸髙魚貫泝流首尾百里若敵無宋襄之義及我未陣而擊之將如之何今王土與敵水陸異勢便習不同彼若送死則敵之有餘若棄江遠進以我所短擊彼所長懼非廟勝之筭也朝議多與謨同乃詔亮不聽移鎮成帝時左衞將軍陳光上疏請北伐詔令攻壽陽征西將軍都督徐兗諸軍事領徐州刺史假節蔡謨又上疏曰今壽陽城小而固自壽陽至琅邪城壁相望其間遠者裁百餘里一城見攻衆城必救且王師在路五十餘日劉仕一軍早已入淮又遣數部北取生壁大軍未至聲息乆聞而賊之郵驛一日千里河北之騎足以來赴非唯隣城相救而已夫以白起韓信項籍之勇猶𤼵梁焚舟背水而陣今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所誡也若進攻未拔北騎卒至懼桓子不知所爲而舟中之指可掬今征軍五千皆王都精銳之衆又光爲左衞遠近聞之名爲殿中之軍宜令所向有征無戰而頓之堅城之下勝之不武不勝爲笑今以國之上駟擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非䇿之長者臣愚以爲聞寇而致討賊退而振旅於事無失不勝管見謹冒陳聞時蘇峻反庾翼將悉郢漢之衆以事中原軍次安陸尋轉襄陽中書侍即范汪上疏曰臣伏思安西將軍翼今至襄陽倉卒致討凡百草創安陸之調不復爲襄陽之用而𤣥冬之月沔漢乾涸皆當魚貫而行排推而進設一處有急勢不相救臣所至慮一也又旣至之後桓宣當出宣往剪豺狼之林招攜貳之衆待之以至寛御之以無法田疇墾闢生産始立而當移之必有嗷然悔吝難測臣所至慮二也襄陽頓益數萬口奉師之費皆當出於江南漕運之難船人之力不可不熟計臣之所至慮三也且申伯之尊而與邊將並驅又東軍不進殊爲孤懸兵書云知彼知此百戰不殆知彼不知此一勝一負賊誠衰弊然得臣猶在我雖方隆今實未暇而連兵不解患難將起臣之所至慮四也翼豈不知兵家所患常在於此顧以門户事任憂責莫大晏安終年非心情所安是以抗表輒行畢命原野以翼宏規經略文武用命忽遇釁㑹大事便濟然國家之慮常以萬全非至安至審王者不舉臣謂宜嚴詔諭翼還鎮養銳以爲後圖若少合聖意乞宻出臣表與車騎臣氷等詳共集議武帝寧康間苻堅寇涼州車騎將軍桓沖遣宣城内史朱序豫州刺史桓伊率衆向壽陽淮南太守劉波汎舟淮泗乘虚致討以救涼州乃表曰氐賊自并東部醜𩔖實繁而蜀漢寡弱西涼無備斯誠暴與疾顛祗速其亡然而天未勦絶屢爲國患臣聞勝於無形功立事表伐謀之道兵之上略況此賊陸梁終必越逸北狄陵縱常在秋冬今日月迅邁髙風行起臣輒較量畿甸守衞重複又淮泗通流長江如海荆楚偏遠宻邇寇讎方城漢水無天險之實而邉備之重勢在西門臣雖凡庸識乏武略然猥荷重任思在投袂請率所統徑進南郡與征西將軍臣豁參同謀猷賊若果驅犬羊送死沔漢庶仰慿正順因致人利一舉乘風掃清氛穢不復重勞王師有事三秦則先帝盛業永隆於聖世宣武遺志無恨於在昔如其懾惮皇威闚𨵦計屈則觀兵伺釁更議進取振旅旋斾遲速唯宜伏願陛下覽臣所陳特垂聽許宋武帝復欲北討行意甚盛奉常鄭鮮之上表諫曰伏思聖略深遠臣之愚管無所措其意然臣愚見竊有所懷敵凶狡情狀可見自關中再敗皆是帥師違律非是内有事故致外有敗傷敵聞殿下親御六軍必謂見伐當重兵潼關其勢然也若陵威長驅臣實見其未易若輿駕頓洛則不足上勞聖躬如此則進退之機宜在熟慮敵不敢乘勝過陜遠攝天威故也今盡用兵之筭事從屈申遣師撲討而南夏清晏敵方懼將來永不敢動若輿駕造洛而反凶醜更生揣量之心必啓邊戎之患此旣必然江南顒顒傾注輿駕忽聞遠伐不測師之深淺必以殿下大申威靈未還人情恐懼事又可推往年西征劉鍾危殆前年刼盜破廣州人士都盡三吳心腹之内諸縣屢敗皆由勞役所致又聞處處大水加遠師民敝敗散自然之理殿下在彭城刼盜破諸縣事非偶爾皆是無賴凶慝凡順而撫之則百姓思安違其所願必爲亂矣古人所以救其煩穢正在於斯漢高身困平城吕后受匃奴之辱魏武軍敗赤壁宣武喪師枋頭神武之功一無所損況偏師失律無虧於廟堂之上者耶即之事實非敗之謂唯齡石等可念耳若行也或速其禍反覆思惟愚謂不煩殿下親征小刼西虜或為河洛之患今正宜通好朔部則河南安河南安則濟泗靜伏願聖鑒察臣愚懷文帝元嘉二十七年帝將北討步兵校尉沈慶之諫曰馬步不敵爲日已乆矣請舍遠事且以檀到言之道濟再行無功彦之失利而返今料王𤣥謩等未踰兩將六軍之盛不過往時將恐重辱王師難以得志上曰小醜竊據河南脩復王師再屈自别有以亦由道濟養寇自資彦之中塗疾動敵所恃唯馬夏水浩汗河水流通泛舟北指則碻磝必走滑臺小戍易可覆拔克此二戍館榖弔民虎牢洛陽自然不固比及冬間城守相接敵馬過河便成禽也慶之又固陳不可丹陽尹徐湛之吏部尚書江湛竝在坐上使湛之等難慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟元嘉二十九年帝欲更北伐訪之羣臣中庶子何偃議曰内幹胡法宗宣詔逮問北伐伏計敵審有殘福烏合易亂殱殄非難誠如天㫖今雖廟筭無遺而士未精習縁鎮戍充實者寡邊民流散多未附業控引所資取給根本虧根本以殉邊患宜動必萬尅無虞往歳挫傷續以内釁侮亡取亂誠爲沛然然淮泗數州實亦彫耗流傭未歸創痍未起且攻守不等客主形異薄之則勢艱圍之則曠日進退之間姦虞互起竊謂當今之弊易衂方來之寇不深宜含垢藏疾以齊天道文帝聞魏世祖殂更謀北伐青州刺史劉興祖上言以爲河南阻飢野無所掠脫諸城固守非旬月可拔稽留大衆轉輸方勞應機乘勢事存急速今僞帥始死兼逼暑時國内猜擾不暇遠赴愚謂宜長驅中山據其關要冀州以北民人向豐兼麥已尚熟因資爲易若中州震動黄河以南自當消潰臣請發青冀兵入其心腹若前驅克勝則衆軍宜一時濟河並建司牧撫柔初附西拒太行北塞軍都因事指麾隨宜加授若能成功清壹可待若不克㨗不爲大傷宋主意止存河南亦不從時祕書監謝靈運上表陳疾上賜假東歸將行上書勸伐河北曰自中原喪亂百有餘年流離寇戎湮沒殊𩔖先帝聦明神武哀濟羣生將欲盪定趙魏大同文軌使乆凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡況陵塋未㡬强敵伺隙預在有識誰不憤歎而景平執事竝非其才且遘紛京師豈慮託付遂使孤城窮陷莫肯極忠烈囚朔漠緜河三千翻爲寇有晩遣鎮戍皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染逆虜窮苦備罹徴調賦斂靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所爲傷心者也咸云西虜舎末遠師隴外東虜乘虚呼可掩襲西軍旣反得據關中長圍咸陽還路已絶雖遣救援停住河東遂乃遠討大城欲爲首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虚於内時來之㑹莫復過此觀兵燿威實在兹日若相持未已或生事變忽值新起之衆則異於今苟乖其時難爲經略雖兵食倍多則萬全無必矣又歴觀前代𩔖以兼弱爲本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云旣見天殃又見人災乃可以謀昔魏氏之彊平定荆冀乃乘袁劉之弱晉世之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史䇿者也自羌平之後天下亦謂敵當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼關失守用緩天誅假延歲月日來至今十有二載是謂一紀曩有前言況五部代數齊世敵期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若渇飢注心南雲爲日已乆來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵彊不必乘㑹於我爲易貴在得時器械旣充衆力粗足方於前後乃當有優常議損益乆證冀州口數百萬有餘田賦之沃著自貢典先才經創基址猶存澄流引源桑麻蔽野彊富之實昭然可知爲國長乆之計孰若一往之費邪或懲關西之敗而謂河北難守二境形勢表裏不同關西雜居種𩔖不一昔在前漢屯軍霸上通火甘泉況乃遠戍之軍值新故交代之際者乎河北悉是舊户差無雜人連嶺判阻三關作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言匈奴慢侮賈誼憤歎方於今日皆爲賒矣晉武中主耳值孫皓虐亂天祚其德亦由鉅平奉䇿荀賈折謀故能業崇當年區宇一綂況今陛下聰明聖哲天下歸仁文德與武功竝震霜威共素風俱舉恊以宰輔賢明諸王美令岳牧宣烈虎臣盈朝而天或遠命亦何敵不滅矧伊頑梗假日而已哉伏惟深機志務乆定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣乆欲上陳懼在觸置䝉賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞南齊武帝永明末欲北伐使毛惠秀畫漢武北伐圖使丹陽令中書郎王融掌其事融好功名因此上疏曰臣聞情慉自中事符則感象構於始機動斯彰莊敬之道可宗㑹揖讓其彌肅勇烈之士足貴應鼙鐸以増思肇植生民厥祥旣緬降及興運維道有徴莫不有所因循而升皇業者也若夫膏腴旣稱天乙知五方之富皮幣已列帝劉測四海之尊異封禪之文則升中之典攸鬯嘆輿地之圖乃席卷之庸是立伏惟陛下窮神盡聖緫極居中偶化兩儀均明二耀拯𤣥綱於頺絶反至道於澆淳可謂區㝢儀刑齊民先覺者也臣亦遭逢生此嘉運鑿飲耕食自幸唐年而識用昏霾經術疎淺將薖且軸豈蕨與薇皇鑒燭幽天高聽下賞片言之或善矜一物之失時湔拂塵䝉霑飾光價拔足草廬廁身朝序復得拜賀歳時瞻望日月於臣心願曽已畢矣但千祀一逢休明難再思䇿鈆駑樂陳㳙壒竊習戰陣攻守之術農桑牧藝之書申商韓墨之權伊周孔孟之道常願待詔朱闕俯對青蒲請閒宴之私談當世之務位賤人㣲徒深傾𣢾方今九服清怡三靈和晏木有附枝輪無異轍東鞮獻舞南辮傳歌羌僰踰山秦屠越海舌象翫委體之懃輶譯厭瞻巡之數固將開桂林於鳳山創金城於西守而蠢爾獯狄敢讎大邦假息關河竊命函谷淪故京之爽塏變舊邑而荒涼息反坫之儒衣乆伊川之被髪北地殘氓東都遺老莫不茹泣吞悲傾耳戴目翹心仁政延首王風若試馳咫尺之書具甄戎旅之卒徇其墮城納其降徒可弗勞弦鏃無待干戈真皇王之兵征而不戰者也臣乞以執殳先邁式道中原澄瀚渚之恒流掃狼山之積霧係單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之巡幸然後天移雲動勒封岱宗咸五登三追蹤七十百神肅警萬國具僚璯弁星離玊帛雲聚集三燭於蘭席聆萬歳之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后存心去漢德祖究其深言臣愚昧忖誠不足以知㣲然伏揆聖心規模𢎞遠旣圖載其事必克就其功臣不勝歡喜圖成上置琅邪城射堂壁上遊幸輒觀視焉時朝廷討雍州刺史王奐丹陽令中書郎王融又上疏曰臣每覽史傳見憂國忘家捐生報德者未曽不撫卷嘆息以爲今古共情也然或以片言㣲感一湌小惠參國士之眄同布素之遊耳豈有如臣獨拔無聞之伍過超非分之位名器雙假榮禄兩升而宴安昃罷之晨優游旰食之日所以敢布丹愚仰聞宸聽今議者或以西夏爲念臣竊謂之不爾其故何哉陛下聖明羣臣悉力從以制逆上而御下指開賞黜之言㣲示生死之路方域之人皆相爲敵旣兵威遠臨人不自保雖窮鳥必啄固等命於梁鶉困獸斯驚終並懸於厨鹿凱師勞飲固不待晨臣之寸心獨有㣲願自獫狁洊食荒侮伊瀍天道祸淫危亡日至母后内難粮力外虚謡言物情屬當今㑹若籍巫漢之歸師騁士卒之餘憤取函谷如反掌陵關塞若摧枯但士非素蓄無以即用不敎民戰是實棄之特希私集部曲豫加習校若䝉垂許乞𨽻監省拘食人身權備石頭防衛之數臣少重名節早習軍旅若試而無績伏受面欺之誅用且有功仰詶知人之哲陳宣帝時謀取彭汴以問五兵尚書毛喜對曰淮左新平邊民未輯周氏始吞齊國難與爭鋒且棄舟楫用車騎去長就短非我所便不若安民保境寢兵結好斯乆長之術也趙主劉曜勅内外戒嚴將親討渠知光祿大夫游子遠進曰陛下誠能納愚臣之計者不勞大駕親動一月之中可使清定曜曰卿試言之子遠曰彼匪有大志希竊非望也但逼於陛下峻網耳今死者不可追莫若赦諸逆人之家老弱没奚官者使迭相撫育聽其復業大赦與之更始彼生路旣開不降何待若渠知自以罪重不即下者願假臣弱兵五千以爲陛下梟之不敢勞陛下之將帥也不爾者今賊黨旣衆彌川被谷雖以天威臨之恐非年歳可除曜大悅秦主苻堅妾張氏明辯有才識堅將入宼江左羣臣切諫不從張氏進曰妾聞天地之生萬物聖王之馭天下莫不順其性而暢之故黄帝服牛乘馬因其性也禹鑿龍門決洪河因水之勢也后稷之播殖百榖因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗今朝臣上下皆言不可陛下復何所因也書曰天聰明自我民聰明天猶若此況於人主乎妾聞人君有伐國之志者必上觀乾象下採衆祥天道崇遠非妾所知以人事言之未見其可諺言雞夜鳴不利行師犬羣嘷者宫室必空兵動馬驚軍敗不歸秋冬已來毎夜羣犬大嘷衆雞夜鳴伏聞廏馬驚逸武庫兵器有聲吉凶之理誠非㣲妾所論願陛下詳而思之堅曰軍旅之事非婦人所豫也遂興兵張氏請從堅果大敗於壽春張氏乃自殺後魏道武帝討姚興問定州大中正李先曰興屯天渡平據柴壁相爲表裏今欲殄之計將安出先對曰臣聞兵以正合戰以竒勝如聞姚興欲屯兵天渡利其粮道及其未到之前遣竒兵先邀天渡柴壁左右嚴設伏兵備其表裏以陛下神䇿觀時而動興欲進不得退又乏粮夫高者爲敵所棲深者爲敵所囚兵法所忌而興居之可不戰而取太祖從其計興果敗歸明元帝聞劉裕死欲取洛陽虎牢滑臺白馬公崔浩曰陛下不以劉裕欻起納其使貢裕亦敬事陛下不幸今死乘喪伐之雖得之不令春秋晉士丐率師侵齊聞齊侯卒乃還君子大其不伐喪以爲恩足以感孝子義足以動諸侯今國家亦未能一舉而定江南宜遣人弔祭存其孤弱恤其凶災布義風於天下令德之事也如此則化被荆揚南金象齒羽毛之珍可不求而自至裕新死黨與未離兵臨其境必相率拒戰功不可必不如緩之待其惡稔如其彊臣爭權變難必起然後命將揚威可不勞士卒而収淮北之地太宗銳意南伐詰浩曰劉裕因姚興死而滅其國裕死我伐之何爲不可浩固執曰興死二子交争裕乃伐之太宗大怒不從浩言遂遣奚斤南伐議於監國之前曰先攻城也先畧地也斤曰宜先攻城浩曰南人長於守城苻氏攻襄陽經年不拔今以大國之力攻其小城若不時剋挫損軍勢敵得徐嚴而來我怠彼銳危道也不如分軍畧地至淮爲限列置守宰収斂租榖滑臺虎牢反在軍北絶望南救必沿河東走若或不然即是囿中之物公孫表請先圖其城斤等濟河先攻滑臺經時不拔表請濟師太宗大怒乃親南巡太武帝神䴥三年治兵將伐夏羣臣咸曰劉義隆兵猶在河中捨之西行前寇未可必克而義隆乘虚濟河則失山東矣崔浩曰義隆與赫連定遥相招引以虚聲唱和莫敢先入譬如連雞不得俱飛無能爲害臣始謂義隆軍來當屯止河中兩道北上東道向冀西道衝鄴如此則陛下當自討之不得徐行今則不然東西列兵徑二千里一處不過數十形分勢弱此不過欲固河自守無北度意也赫連定殘根易摧擬之必仆克定之後東出潼關席卷而前則威震南極江淮以北無立草矣上從之太武帝時河西王沮渠牧犍内有貳意世祖將討焉先問於司徒崔浩浩對曰牧犍惡心已露不可不誅官軍往年北伐雖不剋獲實無所損于時行者内外軍馬三十萬匹計在道死傷不滿八千歳常羸死恒不減萬乃不少於此而遠方承虛便謂大損不能復振今出其不意不圖大軍卒至必驚駭騷擾不知所出擒之必矣且牧犍劣弱諸弟驕恣爭權從横民心離解加比年以來天災地變都在秦涼成滅之國也世祖曰善吾意亦以爲然命公卿議之𢎞農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父職貢朝廷接以蕃禮又王姬釐降罪未甚彰謂宜羈縻而已今士馬勞止宜可小息又其地鹵斥略無水草大軍旣到不得乆停彼聞軍來必完聚城守攻則難拔野無所掠於是尚書古弼李順之徒皆曰自温圉河以西至於姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以灌漑彼聞軍至決此渠口水不通流則致渴乏去城百里之内赤地無草又不住乆停軍馬斤等議是也世祖乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地理志稱涼州之蓄爲天下饒若無水草何以畜牧又漢人爲居終不於無水草之地築城郭立郡縣也又雪之消液纔不斂塵何得通渠引漕灌漑數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辨浩曰汝曹受人金錢欲爲之辭謂我目不見便可欺也世祖隱聽聞之乃出親見斤等辭㫖嚴厲形於神色羣臣乃不敢復言唯唯而已於是遂討涼州而平之多饒水草如浩所言帝西巡至東雍親臨汾曲觀薛永宗壘進軍圍之永宗出兵欲戰帝問司徒崔浩曰今日可擊不浩曰永宗未知陛下自來人心安閒北風迅疾宜急擊之須臾必破若待明日恐其見官軍盛大必夜遁走帝從之永宗潰滅車駕濟河前驅告賊在渭北帝至洛水橋賊已夜遁詔問浩曰盖吳在長安北九十里渭北地空榖草不備欲渡渭南西行何如浩對曰盖吳營去此六十里賊魁所在擊蛇之法當須破頭頭破則尾豈能復動宜乘勢先擊吳今軍往一日便到平吳之後回向長安亦一日而至一日之内未便損傷愚謂宜從北道若從南道則盖吳徐入北山卒未可平帝不從乃渡渭南吳聞帝至盡散入北山果如浩言軍無所克時宋劉義隆侵邊遣安南大將軍司馬楚之距之楚之上疏曰臣奉命南伐受任一方而智力淺短誠節未効所以夙夜憂惶忘寢與食臣屢遣人至荆揚所在陳說具論天朝盛化之美莫不忻承聖德傾首北望而義隆兄弟知人情揺動遣臣私讎順爲司州刺史統淮北七郡代垣苗守懸瓠自鞏洛滑䑓敗散已來義隆恥其敗北多加罪罰到彦之削位退同卒伍殺姚聳夫於壽春斬竺靈秀於彭城王休元託疾檀道濟斥放凡在腹心悉懷疑阻民怨臣猜可謂今日臣聞平殄寇逆必乘戰勝之威建立功勲亦因離貳之勢伏惟陛下聖德膺符道光四海神旌所指莫不摧服其未賔者義隆而已今天網遐舉殊方仰德固宜掃清東南齊一區宇使濟濟之風被於江漢世祖以兵乆勞不從太武帝末年蕭衍遣將康絢遏淮將灌揚徐左僕射郭祚表曰蕭衍狂悖擅㫁川瀆役苦民勞危亡已兆然古諺有之敵不可縱夫以一酌之水或爲不測之淵如不時滅恐同原草宜命一重將率統軍三十人領羽林一萬五千人并科京東七州虎旅九萬長驅電邁遄令撲討擒斬之勲一如常制賊資雜物悉入軍人如此則鯨鯢之首可不日而懸誠知農桑之時非發衆之日茍事理宜然亦不得不爾昔韋顧跋扈殷后起昆吾之師玁狁孔熾周王興六月之伐臣職忝樞衡獻納是主心之所懷寧敢自嘿并宜勅揚州選一猛將遣當州之兵令赴浮山表裏夾攻朝議從之文成帝時定陽侯曹安表曰拾寅今保白蘭多有金銀牛馬若擊之可以大獲議者咸以先帝忿拾寅兄弟不穆使晉王伏羅高涼王那再征之竟不能剋拾寅雖復遠遁軍亦疲勞今在白蘭不犯王塞不爲人患非國家之所急也若遣使招慰必求爲臣妾可不勞而定也王者之於四荒羈縻而已何必屠其國有其地安曰臣昔爲澆河戍將與之相近明其意勢若分軍出其左右拾寅必走保南山不過十日牛馬草盡人無所食衆必潰叛可一舉而定也詔從之獻文帝時蠕蠕犯塞帝引見羣臣議之尚書僕射元目辰進曰若車駕親行恐京師危懼不如持重固守自安虜懸軍深入粮無繼運以臣量之自退不乆遣將軍追擊破之必矣中曹給事中張白澤曰陛下欽明則天比蹤前聖而蠢爾荒愚輕犯王略寇乃顛沛於遠圖我將宴安於近毒仰惟神略則不然矣今若鑾輿親動賊必望麾崩散寧容仰挫神兵坐而縱敵萬乘之尊嬰城自守進失可乘之機退非無前之義惟陛下留神帝從之遂大破虜衆孝文帝曰長驅之謀廟筭已定今大軍將進公等更欲何云輔國大將軍李沖進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠實臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自離都淫雨士馬困弊前路尚遥水潦方甚且伊洛境内小水猶尚致難況長江浩汗越在南境若營舟檝必須停滯師老粮乏進退爲難矜喪反斾於義爲允帝曰一同之意前已具論卿等正以水雨爲難然天時頗亦可知何者夏旣炎旱秋故雨多𤣥冬之初必當開爽比後月中間若雨猶不已此乃天也脫於此而晴行則無害古不伐喪謂諸侯同軌之國非王者綂一之文已至於此何容停駕沖又進曰今者之舉天下所不願唯陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請帝大怒曰方欲經營宇宙一同區域而卿等儒生屢疑大計斧鉞有常卿勿復言帝攻鍾離未剋將於淮南脩故城而置鎮戍以撫新附之民賜相州刺史髙閭璽書具論其狀閭表曰南土亂亡僣主屢易陛下命將親征威陵江左望風慕化剋拔數城施恩布德攜民襁負可謂澤流邊方威惠普著矣然元非大舉軍興後時本爲迎降戎卒實少兵法十則圍之倍則攻之所率旣寡東西懸闊難以並稱伏承欲留戍淮南招撫新附昔世祖以回山倒海之威兵騎數十萬南臨𤓰歩諸郡盡降而盱眙小城攻而弗剋班師之日兵不戍一郡土不闢一廛夫豈無人以大鎮未平不可守小故也堰水先塞其源伐木必拔其本源不塞本不拔雖剪枝竭流終不可絶矣壽陽盱眙淮隂淮南之源本也三鎮不剋其一而留兵守郡不可自全明矣旣逼敵之大鎮隔深淮之險少置兵不足以自固多留衆粮運難可充又欲脩渠通漕路必由于泗口泝淮而上須經角城淮隂大鎮舟船素蓄敵因先積之資以拒始行之路若元戎旋斾兵士挫怯夏雨水長救援實難忠勇雖奪事不可濟淮隂東接山陽南過江表兼近江都海西之資西有盱眙壽陽之鎮且安土樂本人之常情若必留戍軍還之後恐爲敵擒何者鎮戍新立懸在異境以勞禦逸以新擊舊而能自固者未之有也昔彭城之役旣剋其城戍鎮已定而思叛外向者猶過數萬角城蕞爾處在淮北去淮陽十八里五固之役攻圍歴時卒不能剋以今比昔事兼數倍今以向熱水雨方降兵刄旣交難以恩恤降附之民及諸守令其可徙置淮北如其不然進兵臨淮速度士卒班師還京踵太武之成規營皇居於伊洛畜力以待敵釁布德以懷遠人使中國清穆化被遐裔淮南之鎮自効可期天安之㨗指辰不遠髙閭爲給事中又上表曰伏見廟筭有事淮海雖成事不說猶可思量臣以愚劣本非武用至於軍旅尤所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反覆思量未見其利疑二也縱使如心於國無用發兵遠入費損轉多若不置城是謂空爭疑三也脫不如意當延日月屯衆聚費于何不有疑四也伏願思此四疑時速返斾文明太后令曰六軍電發有若摧朽何慮四難也遷尚書中書監侍中趙郡公陳建與侍中晉陽侯元仙德殿中尚書長樂王穆亮比部尚書平原王陸叡宻表曰皇天輔德命集大魏臣等父祖翼賛初興勤過蜀漢誓固山河享兹景福寵辱休戚與國均焉臣以凡近識無逺達階藉先寵遂荷今任彼已之譏播於羣口仰感生成俯自䇿厲顧省駑鈍終於無益然飲水驚寐實懷慚負至於願天髙地厚何日忘之自永嘉之末封豕横噬馬叡南據奄有荆楚及桓劉跋扈祸難相繼岱宗隔望秩之敬青徐限見德之風獻文皇帝髫齔龍飛道光率土干戚暫武淮海從風車書旣同華裔將一昊天不弔奄背萬邦竊聞劉昱天亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡逺同孫氏茍歴運響從則吳㑹可定脫事有難成則振旅而返進可以揚義聲於四海退可以通德信於遐裔宜乘之㑹運鍾今日如合聖聽乞速施行脫悟天心願存臣表徐觀後驗賞罰隨焉髙祖嘉之時議伐蕭賾黄門侍即盧淵表曰臣誠識不周覽頗尋典籍自魏晉以前承平之世未有皇輿親御六軍決勝行陣之間者勝不足爲武不勝有虧威德明千鈞之弩不爲鼷鼠發機故也昔魏武以弊卒一萬而袁紹土崩謝𤣥以步兵三千而苻堅瓦解勝負不由衆寡成敗在於須臾若用田豐之謀則生制孟德矣魏既并蜀迄于晉世吳介有江水居其上流大小勢殊德政理絶然猶君臣恊謀垂數十載逮孫皓暴戾上下攜爽水陸俱進一舉始克今蕭氏以簒殺之燼政虐役繁又支屬相圖人神同棄吳㑹之民延踵皇澤正是齊軌之期一同之㑹若大駕南巡必左袵革面閩越倒戈其猶運山壓卵有征無戰然愚謂萬乘親戎轉漕難繼千里饋粮士有飢色大軍之後必有凶年不若命將簡銳盪滌江右然後鳴鑾巡省告成東岳則天下幸甚率土戴賴歴代名臣奏議卷二百二十八
