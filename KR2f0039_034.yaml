body:
  text: 歴代名臣奏議巻三十四明楊士竒等撰治道宋仁宗時通判涇州尹源作唐説及叙兵十篇上之其唐説曰世言唐所以亡由諸侯之彊此未極于理夫弱唐者諸侯也唐既弱矣而乆不亡者諸侯維之也燕趙魏首亂唐制專地而治若古之建國此諸侯之雄者然皆恃唐為輕重何則假王命以相制則易而順唐雖病之亦不得而外焉故河北順而聴命則天下為亂者不能遂其亂河北不順而變則姦雄或附而起徳宗世朱泚李希烈始遂其僭而終敗亡者田悦叛于前武俊順于後也憲宗討蜀平夏誅蔡夷鄆兵連四方而亂不生卒成中興之功者田氏禀命王承宗歸國也武宗将討劉稹之叛先正三鎮絶其連衡之計而王誅以成如是二百年姦臣逆子専國命者有之夷将相者有之而不敢窺神器非力不足畏諸侯之勢也及廣明之後闗東無復唐有方鎮相侵伐者猶以王室為名及梁祖舉河南劉仁恭輕戰而敗羅氏内附王鎔請盟于時河北之事去矣梁人一舉而代唐有國諸侯莫能與之爭其勢然也向使以僖昭之弱乗巢蔡之亂而田承嗣守魏王武俊朱滔據燕趙彊相均地相屬其勢宜莫敢先動況非義舉乎如此雖梁祖之暴不過取霸于一方耳安能彊禪天下故唐之弱者以河北之彊也唐之亡者以河北之弱也或曰諸侯彊則分天子之勢子何議之過乎曰秦隋之勢無分于諸侯而亡速于唐何如哉或曰唐之亡其由君失道乎曰君非失道而才不至焉爾其亡也臣實主之請極其説唐太宗起艱難有天下其用臣也聽其言而盡其才故君臣相親而至治安以及後世視太宗由兹而興雖其聖不及而任臣納諫之心一也君有太宗之心臣非太宗之臣上聽其下或不能辨其奸下惑其上無所不至所以敗也何哉夫君一而臣衆大聖之君不相繼而出大奸之臣則世有之大聖在上則姦無所容其臣莫不賢茍君之才不能勝臣之姦則雖有賢者不能進矣如是雖未至於失道猶失道也明皇非不欲天下如貞觀之治而馭臣之才不能勝林甫之奸於是有禄山之禍徳宗非不欲平暴亂安四方而君人之術不能勝盧杞之邪於是有朱泚之變以至于僖昭其心皆欲去亂而即治也而才不逮於明皇徳宗輔臣之姦邪或過於林甫盧杞求國不亡安可得已然迹其事君豈不有失道乎于時天下非無賢由君不能主聽也故至賢之主與失道之主其興其亡皆自取之此係乎君者也中才之主其臣正勝邪則治而安邪勝正則亂而亡此係乎臣者也然則唐之亡非君之為臣之為也其叙兵曰唐杜牧當會昌中河朔用兵嘗為文數篇上論歴代軍事利害繼以本朝制兵用將之得失下參以當時事機牧儒者位不顯其術未嘗試然識者謂牧知兵雖古名將不能過今觀牧所著大要究極當世之務不專狃古法使時君可行而易為功此其善也今兵之利鈍所以與唐世異者唐自中世以來諸侯皆自募兵訓練出攻入守上下一志故討淮西青冀滄徳澤潞之叛以至四征夷狄大率假外兵以集事朝廷所出神策禁軍不過為聲援而已故所至多有功今則不然國家患前世藩鎮之強凡天下所募驍勇一萃於京師雖濵塞諸郡大者籍兵不踰數千每嵗防秋則戍以禁兵將帥任輕而勢分軍事往往中御愚謂此可以施於無事時鎮中國服豪傑心茍戎夷侵軼未必能取勝也何則兵主於外則勇主於内則驕勇生於勞驕生於逸夫外兵所習尚皆疆場戰鬭勞苦之事死生之命制之於將故勇勇而使之戰則多利内兵居京都日享安逸加之以賞賚未嘗服甲胄荷戈㦸不知將帥號令之嚴故驕驕而勞之則怨以之戰則多鈍若唐之失失於諸侯之不制非失於外兵之彊故有驕將罕聞有驕兵今之失失於將太輕而外兵至於不足以應敵内兵鮮得其用故有驕兵不聞有驕將且唐之所失者勢也今之所失者制也勢也者不得已也制也者可為而不為者也然則為今之計當如何曰稍革舊制大募豪勇益外兵之籍俾足以戰敵以内兵為聲勢重邉將之任使專一軍之事而不得連州郡之勢斯可以獲近利而亡後害也文彦博進無為而治論曰臣頃因奏事親聞徳音謂古稱無為而治者必當先有為而致無為臣雖即時仰對曰虞舜垂衣而治者亦皆先有為而後無為誠如聖意臣退而伏思曰陛下有堯舜求治之心而臣愚無臯夔致君之術夙夜慚懼啓處不遑又以奏對之際蹇訥未周謹尋前典所述虞舜之徳著於簡牘仰塵鑒觀庶幾愚忠上禆聖政仲尼曰無為而治者其舜也歟夫何為哉恭己正南面而已先儒之解以謂任官得其人故無為而治考於虞書則舜之始也流共工於幽州以其心狠貎恭足以惑世也放驩兠於崇山以其掩義隱賊黨於共工也竄三苗於三危以其貪冒食貨崇侈不才也殛鯀於羽山以其頑嚚傲狠治水無功也四罪而天下咸服兹所謂去邪不疑而罰當其罪也於是詢四岳以謀政治闢四門以求衆賢明四目逹四聦以廣視聽於天下命禹作司空以平水土棄為后稷以播百穀契作司徒以敷五教臯陶作士以典五刑垂作共工益作朕虞伯夷作秩宗以典三禮夔典樂以教胄子龍作納言出納朕命惟允既命以官因戒勅之曰各恭其職乃能立天下之功然後三載考績三考黜陟幽明庶績咸熈兹所謂任賢勿貳而官得其人也夫明四目達四聦去四凶命庶官其勤至矣得不謂之先有為乎及夫庶績熈天下服垂衣裳正南面而已得不謂之後無為乎臣究觀經史之載舜之至德也有大功二十舉十六相去四凶也十六相謂八元八凱稷契臯夔之倫去四凶則朝廷無姦邪之黨舉十六相則左右皆賢哲之輔如是而天下不治者未之有也故后世聖帝明王莫不勞於求賢而逸於致治勞於求賢則先有為也逸於致治則後無為也恭以陛下紹祖宗之丕基行堯舜之至化黜邪逺佞去四凶之志也求賢審官舉十六相之意也然而一日萬務尚勞宵旰兹乃臣愚不稱職之効也臣以為方今之務正在謹守祖宗之成法使爵賞刑罰不失其當耳爵賞當則姦邪無功者不敢僥倖而希進刑罰當則貴近有罪者不敢請求而茍免紀綱正而朝廷尊號令行而天下服如此則陛下髙拱穆清之中無為而與虞舜比隆而下視三代之盛矣天章閣待制知諫院包拯上疏曰臣非材備位諫職思所以為補報者惟言責而已然言不激切則不足開宸慮而補聖政謹條上七事皆當今之要務詞理鄙直惟陛下留神省察一事臣伏以陛下天縦寛仁海納謀議是者取而施用非者存而掩覆羣下見聖度閎博不以是非皆能容受故姦邪敢肆矯妄持難明不然之事巧飾厚誣使人無由自辨而黙受排斥之禍致陛下明有所蔽疑貳忠良率以此也夫忠良見疑則忠義之臣欲竭節盡忠補報陛下者皆懼讒畏禍不敢挺然當國家之事矣由是隂姦得計滋長敝病不惟有虧聖徳致害時政一旦緩急乏才賢以使陛下持大任將誰付之臣願陛下聽納羣下謀議之際留神深察如有持難明不然之事巧飾厚誣於人者請付有司責其明辨使真偽不雜是非較然則忠邪自分天下庶幾於理矣二事臣伏聞近嵗以來多有指名臣下為朋黨者其間奮不顧身孜孜於國奬善嫉惡激濁揚清之人尤被奸巧誣罔例見排斥故進一賢士必曰朋黨相助退一庸才亦曰朋黨相嫉遂使正人結舌忠直息心不敢公言是非明示勸戒此最為國之大患也夫聖明在上未嘗聞有朋黨朋黨之來大抵起於衰闇故漢之黨錮始安帝而極於桓靈唐之朋黨由穆宗而甚於文武是皆衰闇之際以陛下用心圖治功同堯舜詎可如漢唐衰闇之際而致有朋黨乎斯乃臣下務相傾軋自快其志加諸人不顧破壊陛下事業者也在昔劉向進諫於漢元帝曰孔子與顔淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠於為國無邪心也又曰賢人在上位則引其𩔖而聚之於朝在下位則思與其𩔖俱進臣謂劉向之言垂千餘年談者以為至當臣誠學向者也不忍以熈洽之朝有朋黨之説虧損至徳蔽塞大明臣實痛傷不能已也臣願陛下端慮以臨下推誠以格物循名以核其實因迹以照其心使忠者邪者情偽畢見勿以朋黨為意則君子小人區以別矣三事臣伏聞頃嵗大臣顓政頗惡才能之士有所開建則譏其近名或云沽激欲求進達遂使才能之士莫敢自効縦能不顧忌諱指陳事理固亦困於沮撓無得而施用矣且名者聖賢之所貴也孔子曰君子疾沒世而名不稱焉賈子曰烈士徇名人不顧名何以趨善聖人所以貴也夫羣下雖衆然士有志於國家之急者甚少其能處心積慮圖報於上又困於近名之說是則志士仁人終無以奬進矣豈陛下之心哉此誠頃嵗大臣之罪也臣願陛下但顧其所否臧而亟行之勿以近名沽激求進為念則人得以盡其心矣四事臣聞議者云陛下頗主先入之說臣以陛下通照於事務得情偽理必無之萬一或有臣止可過慮而議不可聞之而不言也臣謂帝王行事但顧理道之如何爾固不計於先入後陳也必若主先入者以為是耶則姦罔之人逞其敏捷或巧中人或隂圗事惟恐居其後矣得不惑亂於耳目哉臣願陛下采納羣議之際但顧其事之是非裁之以當則先入之患息矣五事臣伏見近日以來科禁多有疑下之意如舉御史須薦二員上自㸃定仍有在京與外任之拘及見任二府曽舉奏之人亦不詳論至於中書樞宻院止許旬假見客及不許百官廵廳臺諫官不得私謁并與刑法官接見雪罪叙勞之人等事皆非帝王推誠盡下之美致也以陛下至徳難名待物無間方將擬迹堯舜固非漢武雄猜多忌之比也斯盖不識大體之臣過防謬論上誤陛下臣恐書之史册取譏萬古願陛下速革近制推大信於羣下以景祐初年之政為法則盡美矣六事臣伏見近嵗以來灾異備至天象謫見地理傾震蟲蝗為孽水旱作沴連綿三數年未已而河北最甚其次利州京東西兩浙河東路循環皆備大患矣以陛下焦勞求理恐一物失其所持此寅畏寧不感召和氣格上天之福祿乎然而致如此者盖大臣不能同寅協恭知無不為切救時弊而陛下志慮亦或有疑沮未能委任忠賢以成垂拱之美也方今諸路饑饉萬姓流離府庫空虛財力匱乏官有數倍之濫廪無二年之蓄兵率驕惰敵國盛強即不幸繼以㓙年加之小寇則何人可以倚仗而枝梧哉臣所以夙夜怵惕思進苦言冀開悟陛下而不能已已也臣願陛下切留宸慮宻以事詔今之執政誰能盡心敢救天下之弊敢當天下之責者果得其人願陛下主張而委任之其隂拱循黙持禄取容妬嫉賢能以一己為計者宜速罷免毋俾乆塞要路則化危為安變艱為易如反掌矣陛下固不可失此時而不為倘失此時而不為禍變一發則雖欲為而不可為矣惟陛下深存念之七事臣伏見近嵗以來多有竄逐之臣或以無辠或因小禍或為隂邪排陷或由權要憎嫉吹毛求其疵㸃洗垢出其瘢㾗罪罟是繁刑網大宻甚傷清議大鬰輿情昔匹夫含怨三年亢陽匹婦懐憤六月飛霜近嵗竄逐之人詎止匹夫匹婦之倫也得不逆和氣召災沴乎陛下固宜矜體而深惟之傳曰使功不如使過盖負責之人自分廢絶不能振起一旦為明主棄瑕錄用則其自奮圗報倍萬常人願陛下詔近嵗竄逐之臣有才行効實而本無過累洎坐累獲罪之輕者或加牽復或加寵擢如此則聖造洪覆同天之仁使排陷憎嫉之風不復為矣開封府推官三司鹽鐵判官蘇紳陳便宜八事一曰重爵賞先王爵以褒徳祿以賞功名以定流品位以居才實未有無徳而據髙爵無功而食厚祿非其人而受美名非其才而在顯位者不妄與人官非惜寵也盖官非其人則不肖者逞不妄賞人非愛財也盖賞非其人則徼幸者衆非特如此而已則又敗國傷政納侮詒患上干天氣下戾人心災異既興妖孽乃見故漢世五侯同日封天氣赤黄及丁傅封而其變亦然楊宣以為爵土過制傷亂土氣之祥也二曰慎選擇今内外之臣序年遷改以為官濫而復有論述㣲効援此希進者朝臣則有升監司使臣則有授横行不問人材物望可與不可並甄錄之不三數年坐致清顯如此不止則異日必以將相為賞矣三曰明薦舉今有位多援親舊或廹於權貴甚非薦賢助國為官擇人之道若要官闕人宜如祖宗故事取班簿親擇五品以上清望官各令舉一二人述其才能徳業陛下與執政大臣叅驗而擢之試而有効則先賞舉者否則黜責之如此則人人得以自勸又選人條約太嚴舊制三人保者得遷京官今則五人舊轉運使提㸃刑獄率當三人今止當一人舊大兩省官嵗舉五人今才舉三人升朝官舉三人今則舉一人舊不以在任及所統屬皆得奏舉今則須在任及統屬方許論薦驅馳下僚未免有賢愚同滯之歎也四曰異章服朝班中執技之人與丞郎清望同佩金魚内侍班行與學士同服金帶豈朝廷待賢才加禮遇之意宜加裁定使采章有别則人品定而朝儀正矣五曰適才宜古者自黄散而下及隋之六品唐之五品皆吏部得專去留今審官院流内銓則古之吏部三班院古之兵部不問官職之閒劇才能之長短惟以資歴深淺為先後有司但主簿籍而已欲賢不肖有别不可得也太宗皇帝始用趙普議置考課院以分中書之權今審官是也其職任豈輕也哉宜擇主判官付之以事權責成其選事若以為格例之設久不可遽更或有異才髙行許别論奏如寇準判銓薦選人錢若水等三人並遷朝官為直館其非才亦許奏殿如唐盧従愿為吏部非才實者並令罷選十不取一是也六曰擇將帥漢制邉防有警左右之臣皆將帥也唐室文臣自員外郎中以上為刺史團練防禦觀察節度等使皆是養將帥之道豈嘗限以文武比年設武舉所得人不過授以三班官使之監臨欲圗其建功立事何可得也臣僚舉換右職者必人才弓馬兼書筭策畧亦責之太備宜使有才武者居統領之任有謀畫者任邉防之寄士若素養之不慮不為用也七曰辨忠邪夫忠賢之嫉奸邪謂之去惡惡不去則害政而傷國姦邪陷忠良謂之蔽明明不蔽則無以稔其慝而肆其毒矣忠邪之端惟人主深辨之自古稱帝之聖者莫若唐堯然而四㓙在朝圮毁善𩔖好賢之甚者莫若漢文然而絳灌在列不容賢臣願監此而不使毁譽之說得行愛憎之徒逞志則忠賢進而邪慝消矣八曰修預備國家承平天下無事將八十載民食宜足而不足國用宜豐而未豐甚可怪也往者明道初蟲螟水旱幾徧天下始之以饑饉繼之以疾疫民之轉流死亡不可勝數幸而比年稍稔流亡稍復而在位未嘗留意於備預之道莫若安民而厚利富國而足食欲民之安則為擇守宰明教化欲民之利則為之去兼并禁游末恤其疾苦寛其徭役則民安而利矣欲國之富則必崇節儉敦質素蠲浮費欲食之足則省官吏之冗去兵糧之蠧絶奢靡之弊塞刁偽之原則國食足矣民足於下國富於上雖有災沴不足憂也書奏帝嘉納之英宗即位初殿中侍御史司馬光上奏曰臣聞王言惟作命不言臣下罔攸禀令陛下以明徳令望龍飛受命四海之内延頸傾耳渇聞聖政自踐祚以來於今五月而陛下深執謙遜端拱淵黙百司奏事一無可否中外之情深為鬰邑曏者猶謂聖躬未安今御殿聽政已遵舊式出入起居皆復常度而獨於萬幾未加裁決臣竊惑之詩曰弗躬弗親庶民弗信弗問弗仕勿罔君子臣愚伏望陛下凡兩府及羣臣奏事稍留神省察詢訪利害議論是非可則行之否則却之使四方翕然瞻仰聖徳億兆羣生不勝幸甚光又上皇太后疏曰羣生無福大行皇帝奄弃天下皇帝繼統哀毁成疾未能親政恭請殿下同決庶務臣愚伏計殿下念宗廟社稷之重為四海黎元之計不得已而臨之非中心所欲也若皇帝聖體不日康寧殿下必推而不居若藥石未效則殿下方且緫覽萬幾未暇自安故凡舉措動靜不可不戒慎留心焉方今天下之勢危於累卵小大戰戰憂慮百端若非君臣同心内外協力夙夜勤勞以徇國家之急則禍難之生豈可勝諱哉夫安危之本在於任人治亂之機在於賞罰二者不可不察也若中外百官各得其人賢能者進不肖者退忠直者親讒佞者疎則天下何得不安任職之臣多非其人賢能者退不肖者進忠直者疎讒佞者親則天下何得不危賞不因喜罰不因怒賞必有所勸罰必有所懲則天下何得不治喜則濫賞怒則妄罰賞加於無功罰加於無罪則天下何得不亂然則天下安危治亂不在於它在於人主方寸之地而已矣凡御下之道恩過則驕驕則不可不戢之以威威過則怨怨則不可不施之以恩恩威之道聖人所以制世御俗猶天地之有隂陽損之益之不失中和以生成萬物者也夫恩者欲物之親己也有時而生怨威者欲物之畏己也有時而生慢小人之性恩過則驕驕而裁之則怨矣爵祿賞賜妄加於人則其同𩔖皆曰我與彼才相若也功相敵也彼得之我獨不得何哉是出一恩而召羣怨也故曰恩有時而生怨也威嚴太盛則人無所容刑罰煩苛則濫及無辜則其同類皆曰是過也人誰無之彼既不免行將及我於是乎窮廹思亂為其上者乃更畏恐而求姑息是始於嚴而終於慢也如是則為人上者豈不至難哉盖善為人上者不然恩必施於有功而罰必加於有罪恩雖至厚而人不敢妬者何也衆人之所與也罰雖至重而人無所怨者何也衆人之所惡也大行皇帝天性至仁羣臣之功或未足言而賞之以厚罪或不可容而罰之至輕善則善矣而小人不識大恩者或幾乎驕慢矣臣竊意殿下今兹繼而為政必將糾之以嚴糾之以嚴誠是也然天下之人涵濡大行皇帝聖澤日乆一旦暴加繩檢恐駭而離心伏願殿下徐以義理教之戒之有不聽從而尤無良者然後加刑罰焉則誰敢不肅此善之善者也往者大行皇帝嗣位之初章獻明肅皇太后保䕶聖躬綱紀四方進賢退奸鎮撫中外於趙氏實為有功但以自奉之禮或崇重太過外親鄙猥之人或忝汚官職左右讒謟之人或竊弄權柄此所以負謗於天下也今殿下初攝大政四方之人莫不觀聽以占盛徳臣以為凡名體禮數所以自奉者皆當深自抑損不可盡依章獻明肅皇太后故事以成謙順之美副四海之望大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者殿下當信之用之與共謀天下之事鄙猥如馬季良讒諂如羅崇勲者殿下當疎之逺之不可寵以祿位聽采其言也臣聞婦人内夫家而外父母家況后妃與國同體休戚如一若趙氏安則百姓皆安況於曹氏必世世長享富貴明矣趙氏不安則百姓塗地曹氏雖欲獨安其可得乎是故政者正也為政之道莫若至公臣願殿下熟察羣臣之中有賢才則舉之有功則賞之雖賤如廝役憎如仇讎逺在千里之外皆不可棄遺如此則人誰不勸矣羣臣之中職事不修則廢之有罪則刑之雖貴為公卿親為兄弟近在耳目之前皆不可寛假如此則人誰不懼矣夫為善者勸為惡者懼百官稱職萬民樂業天下之安猶倚泰山而坐平原也尚何憂哉然後俟皇帝聖體平寧授以治安之業自居長樂之宫坐享天下之養則殿下聖善之徳冠絶前古光暎後來雖周之文母漢之明徳不足比也臣備員侍從之臣以諫諍為職不勝區區之誠妄冒以聞伏惟殿下置之几席少加聽察治平元年光知諫院又上奏曰臣聞舜與臯陶賡歌相戒以明良為美以叢脞為非盖以王者奄有四海君臨億兆若事無巨細皆以身親之則所得至寡所失至多矣古語有之曰察目睫者不能見百步察百步者亦不能見目睫非不欲兼之勢不可也是以明主緫其大體執其樞要精選賢能任以百職有功者賞有罪者誅故處躬不勞而收㓛甚大用此道也臣伏見陛下自親政以來勵精求治孳孳不倦未明求衣日昃不食雖大禹之勤勞文王之懿恭無以過此然而政有本末事有細大舉其綱則百目張挈其領則衆毛理臣願陛下先其本後其末急其大緩其細擇人而任之此政之本也賞善而罰惡此事之大也陛下當先察羣臣之邪正與其材能之所堪然後思天下有某事不治者當使某人治之其公忠勤恪功效顯著者勸之以厚賞姦回惰慢無功敗事者威之以嚴刑如是則萬事無不舉兆民無不安陛下可以髙拱無為而名配堯舜矣至於簿書之煩碎文法之㣲宻錢榖之出納體例之有無此乃羣臣百吏之所守非陛下所當留意也陛下知捨彼而取此則臣恐徒有大禹之勤勞而不獲其功文王之懿恭而不見其治也臣以獻替為職遇陛下勤政之初虛心求諫此乃千載一時誠不敢以細末之事煩汙聦明伏望陛下深思此道乃自古及今致治之大本勿以為迂闊陳熟之言而忽之則天下幸甚光又上疏曰臣伏覩皇太后手書已罷聽政陛下欽承慈㫖獨斷萬幾臣聞易曰君子以作事謀始又曰正其始萬事理差之毫釐謬以千里陛下雖踐阼期年於國家大政猶多所謙抑雖時有處分皆常式小事非天下所以望於陛下者也曏時外間議者皆曰陛下聖體未安倦於聽覽及知聖體已安又曰陛下上畏皇太后之嚴欲盡人子之禮避專命之嫌韜藴聦明未敢施設今皇太后舉國家大柄盡付之陛下則議者無復可言唯拭目傾耳以瞻望聖政而已矣陛下當此之際治身治國舉措云為不可不謹昔楊朱見岐塗而泣謂其可以左可以右所差甚㣲所失甚大也人主即政之初亦榮辱安危之岐塗也臣故願陛下留聖心焉臣聞治身莫先於孝治國莫先於公孔子曰孝徳之本也又曰不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮未有根絶而葉茂源涸而流長者也仁宗皇帝以四海大業授之陛下其恩徳之大天地不足以為比今登遐之後骨肉至親獨有皇太后與公主數人陛下所當日夜盡心竭力供承撫養以副仁宗皇帝之意曏者皇太后聽政之時左右侍衛之人不敢不恪求須之物無敢不備既委去政柄臣竊慮有無識小人隨勢傾移侍奉懈慢供給有闕則天下之責皆歸陛下此不可不留意朝夕省察者也又若有不逞之人於兩宫之間刺探動靜拾掇語言外如效忠内實求媚以相間鬭者臣願陛下逆拒其辭執付有司加之顯戮誅一人則羣邪自退納一言則百讒俱進此乃禍亂之機不可不深察也臣聞國事聽於君家事聽於親臣愚以為陛下在外朝之時刑賞黜陟之政當自以聖心決之至於禁庭之内取捨賜予事無大小不若皆禀於皇太后而後行陛下與中宫勿有所專如此則内外之體正尊卑之序明慈母歡欣於上臣民頌詠於下矣不然皇太后歸政之後若侍衛之人稍有怠惰求須之物小失供擬加以讒邪妄興離間萬一有私毫闕失流聞於外或皇太后憂思不樂内生疾疢則陛下何以勝此名於天下哉雖百善不能掩矣臣故曰治身莫先於孝也洪範於好惡偏黨之際六反言之重之至也周任曰為政者不賞私勞不罰私怨大學曰欲明明徳於天下者必先正其心有所忿懥則不得其正有所好樂則不得其正陛下奮發宫邸入纂皇極爰自潜躍至於天飛舊恩宿怨豈能盡無然今日即政之初皆不可置於聖慮以害至正也凡人君之要道在於進賢退不肖賞善罰惡而已爵祿者天下之爵祿非以厚人君之所喜也刑罰者天下之刑罰非以快人君之所怒也是故古者爵人於朝與士共之刑人於市與衆棄之明不敢以己之私心盖天下之公議也今以四海之廣百官之衆有賢有愚有善有惡比肩接迹雜遝並進臣願陛下少留聦明詳擇其間茍有才徳髙茂合於人望者進之雖宿昔怨讎勿棄也有器識庸下無補於時者退之雖親暱姻婭勿取也有勵行立功為世所推者賞之雖意之所憎勿廢也有懐姦犯禁為衆所疾者罰之雖意之所愛勿赦也如此則野無遺賢朝無曠官為善者勸為惡者懼上下悦服朝廷大治百姓䝉福社稷永安不然陛下若專居深宫自暇自逸威福之柄盡委大臣取適目前不為逺慮賢愚不分善惡失實則所進者皆平生所親愛所退者皆平生所不快所賞者皆諂諛而無功所罰者皆忠諒而無罪如此則中外解體紀綱隳紊羣生失所天下可憂矣臣故曰治國莫先於公也此二者榮辱之大本安危之至要臣願陛下審思而力行之詩云亹亹文王令聞不已陛下誠能行此二者則盛徳美譽滂沛洋溢近者傳誦逺者褒歎不過旬月之間徧於天下達於四夷後日之政如順風吹毛乗髙決水可以不勞而成功矣御史知雜事龔鼎臣上慈聖皇后奏曰臣伏以先帝以萬世根本之計擇主上立為子實殿下相之自宫車晏駕殿下銜哀隱苦定策於須㬰立主上為天子主上纏憂遇疾大臣無所取決請殿下共聽庶政從容輔養數月自中都至於夷夏奠枕如昔者皆所賜也今主上聖躬既豫車駕兩立宜於此時詔罷兩府簾前奏事以終始天地之功則太姒太任之事何足道哉鼎臣又上奏曰臣聞之於傳曰未信而諫則以為謗己臣今進説于殿下者其幾是與然臣備位外庭才㣲身賤俟見信而後言盖無期矣此臣所以犯賢哲之誡冒謗讟之嫌惓惓而不能自已者也惟殿下留神裁察臣於正月十九日嘗奏疏乞還政事訖未䝉施行臣之所言固朝廷之大議殿下之深益夫何未之思也今物議喧然疑有讒間交進故兩宫之情似有未甚通者夫以天下與人猶或疑之則何以信於人哉審如是臣竊以為過矣且一飯之恩匹夫未之敢忘況皇帝以明睿之資貫通古今而受人天下者乎臣謂殿下今日黜逺讒間使不得前則慈孝之聲明日並隆於天下矣至於忠讒之辨古今以為難臣獨謂之不然何則從容和解掩所不及欲殿下母子安康者忠言也掲一為十似是而非使殿下心志熒惑者讒也此豈可謂之難辨哉臣前疏謂殿下積行累功於數十年間一旦定策援長君以安宗廟乃復猶豫不㫁將損盛徳者非茍云也顧察之未熟爾今天象差忒旱虐為變臣恐元元艱食盗賊浸起四方寧謐或不可常朝廷能中外一心思消彌之術為制御之策則庶幾其憂不大惟人事動于下則天譴形于上殿下當斷之於心復辟于皇帝則朝廷之事體正事體正則天下之疑憂解疑憂解則和氣應和氣應則緯象之忒旱虐之變可消而制馭之策可為殿下退就安榮挹萬世無窮之福不知念此而玩信諛詞忘忽至計懐萬萬必無可慮之疑豈不累睿哲先見之明乎今皇帝康復已乆仁宗祥練踰四十日億兆延頸以聽明詔事若早定可視於今古議不時決且貽誚於當世殿下顧利害如何哉況事不出於遺制非殿下之本意竊為殿下惜之臣恐縉紳之士章疏交上言涉譏詆而後圗之美名大業虧缺已多實不知先事之善也殿下勿以臣言輕所陳者肺腑之素藴勿謂臣職卑所持者人臣之公論惟殿下取臣兩章極精而慮之則臣之言不為謗讟而可以取信矣此疏不敢露於人謹於外題狀奏以聞趙瞻自都官貟外郎除侍御史上疏曰英斷獨化人主至權也審至權者當主以天下之公心揆之以天下之正論如是而後權可一也若夫積乆之弊陛下其思焉刑賞施設之失可革則革號令言動之過可止則止輔相賴其用宜責其効臺諫知其才宜信其説兵柄宜削諸宦官邉議宜付諸宿將盖權不可矯而為也以從天下之望耳英宗稱善知制誥鄭獬上奏曰伏見陛下初即位四方傳聞以謂陛下聦明英斷同符太祖也有志之士莫不投袂歎息傾望陛下之風采然自授政以來號令所發蹈常習故不聞赫然有以鼓動天下者始以聖躬㣲疾猶足以為辭玉膳既復尚恭黙而不言者實未知所諭將以隂拱自晦徐觀天下之動而后出而制之耶則於此殆將周嵗萬機之變槩可見矣將以慕商宗之節思得聖人而后用以為政耶傳説何可數有哉果無之則遂一世而不言耶將以左右牽制動有畏憚而不敢明為之耶則二府大臣與禁庭侍従皆足以寄腹心又何疑而不與之謀耶是三者皆非所以為術也非帝王南面聽㫁之大權也先皇帝時純用仁徳以涵育萬物及其乆也盖有偏而不舉者矣夫仁主愛義主斷猶春之為生而秋之為殺也生而不殺則萬物潰爛而不成其如嵗功何陛下承先皇之仁愛宜用義斷以整齊天下所謂義斷者主柄也今夫唯唯而不斷可否決於輔臣則主柄屈而不尊如輔臣朴忠不敢亂大法而為陛下奉行條例止可閲日月而已一旦有卼臲誰可横身為陛下當大事者乎萬一奸人朋比參廁於其間則天下之大勢去矣陛下眡今日為治耶亂耶必以為亂則邉兵不試境内無䟦扈強臣孰謂之亂必以為治則威令寖削大綱解而不緝孰謂之治是治與亂正在陛下留意之秋也右顧則為治左視則為亂盖陛下一舉首而天下治亂之勢分矣陛下何不日求賢者與之圗議今所與共大政者不過七八輔臣則所聞所見盡於此而已矣烏能窮天下之聦明哉古者謀及卿士清問下民詢于芻蕘於是羣言集而治道成乃欲以七八輔臣之言而望大治豈不為闊略哉臣願陛下特詔天下許盡所言有可采者與之召對至於臣下進見少賜數刻之景訪以得失虛意以來之精察以審之明斷以行之庶幾天下之勢將亂而復治矣如其優游泯黙日復一日有志之士解體而去士望去則民従而去陛下尚欲恃四海之衆而保萬世之安乎臣實不勝愚者之慮吕大防為監察御史裏行首言紀綱賞罰未厭四方之望者有五進用大臣而權不歸上大臣疲老而不得時退外國驕蹇而不擇將帥議論之臣禆益闕失而大臣沮之疆場左右之臣有敗事而被賞舉職而獲罪者同知諫院吕誨上慈聖皇后奏曰臣恭以殿下保佑聖子積三十年輔翊邦政又逾期月寰區泰定廟社安固慈恩至矣功徳大矣然而成全聖徳是惟艱哉以萬機浩繁殿下勞心焦思曽未少休非所以燕怡福壽之本也況皇帝躬親治事勤勵如此在於聖慮可以慰安臣愚以謂東殿簾帷宜五七日一御諮詢大臣無俾曠事庶少均暇逸於翊政之道亦無所損當在沈機奮於獨斷豫宣教命誕告明庭外形謙遜之宜中遂優游之樂上順天道下厭羣情享是全美豈不休哉仰祈聦悟天下幸甚誨又上奏慈聖皇后曰臣伏覩殿下近降手書以皇帝既安堅罷同政聖子恭孝遂成母志雖前世有還明辟之事亦未聞期月而成輔翊之功廼形謙遜之㫖休聲茂實當垂光於萬世矣然聞外議以符寳未歸於上前臣有以知非殿下之意焉何則國政猶不欲其乆而復眷留符寳哉萬一所司行遣之間稍有稽緩涉此議論甚非有益於聖躬亦恐前降書㫖或未孚於中外則有累全徳始終之際不可不謹爾臣所以瀝懇而言萬死無避唯祈監照天下幸甚三司使蔡襄上國論要目十二事曰明禮二帝三王相因作禮樂以正民性革其非心使之寡罪而逺刑通萬世之法也秦任兵刑而棄禮樂漢魏至晉日用干戈禮典殘缺至于亡隋盡矣唐興四方治定欲有所為制作雖具朝廷之禮時亦修舉而風教習尚各隨其俗五代禍亂日不遑暇專以刑治之宋興百五十餘年太祖太宗平天下皆以兵威助治真宗皇帝與契丹結好之後遂至無事朝廷禮文罔不修舉仁宗皇帝好生恤刑澤及禽獸然四方之俗未聞由禮尚專用法法者網羅過咎而施刑耳臣請以一二事言之冠昏喪塟禮之大者冠禮今不復議婚禮無復有古之遺文而喪塟之禮盡用釋氏獨三年月日則類古矣臣請集大儒鴻博之士約古制而立今禮使百官萬民皆有等夷便而易行逺罪省刑之一途也曰擇官聖人能無為而治天下天下之事至衆也何以無為而能治之百官無不為也百官修職則萬務舉矣何以致百官之職畢舉在擇官也擇官在於取士今之取士所謂制科者博學強記者也進士者能詩賦有文詞者也明經者誦經文而對題義者也是三者得善官至宰輔皆由此也資䕃以恩不問能否下至軍職以戰功流外吏胥以嵗月三班所入鞭朴刑戮之人無所不至取士之法淆雜至此一旦使之入官小者治一務大者治兵民欲其各得其理猶驅車而水行也然行之已乆不可畢革當漸節所取之路又於歴任察其材能稍旌奬之庶幾可勸其為人害者去之而已曰安民古之治世百姓各安其所士農工商各得其分量取其力以供公上上使之以時而民不倦是故百姓上以奉天子下以養父母蓄妻子其力有餘故安其所也不妄作為故得其分也然而學者不原其本不考其實以謂民饑則哺之寒則衣之天下之衆雖堯舜不得濟也是有憂世之意而民愈不安也臣謂今之民至無禁也太平日乆民有智能者乗時趨利為農則兼并為商則髙下取天時人力之大者遂以富彊奢靡冒法出於王公之上此古所謂亂俗之民可誅者也而法莫之禁雖有禁者亦莫之信民相趨效不知紀極不貪不已此民妄為而不安其分者也天時水旱堯湯不能免之然而民有備故不害也今天下郡縣水旱爭發倉廪以濟之又曰振貸以假於民隨而倚閣經赦除放謂之恤民其意善矣其策疎矣古之治世役民不過三日其不役者出三日之庸此百姓所以奉公上也今百姓有幸有不幸其居瀕河嵗以丁役過重此不幸也天下生齒脱漏亦有不輸一錢以助官者至於水旱流移又出倉廪以濟之賦入有程散施無極國何得而不貧國既貧矣民又不安其所豈所謂安民哉臣故謂學者不原其本不考其實者以此必曰安民禁奸豪均民力使民各得其分而安其所是謂安民曰正陵慢賈誼之説曰人主之尊如堂人臣如陛陛髙則堂髙矣盖人主之於天下其勢漸髙至於極尊民不可得而慢者由其羣臣等級之差漸而至也先皇帝仁愛如天包容萬物雖有觸冒譏斥者多亦矜恕至有侮慢朝廷自以為直臣以謂人主開受直言盖盛徳之事若肆譏斥而無人臣之禮此不可恕也天子可得而慢其下宰臣百官復可等級之差借如兩府大臣陛下所尊禮而優待之也日於漏舎或雪罪之人或求恩賞所求不得如意詆訐譏刺務以為能大臣難與較是非也但隱忍容之以為常事京師寮屬能侵長官天下州軍佐官能拒長吏皆以材名之風俗如此所謂下陵上者也又有甚於此者士大夫之有怨憎黨以相朋造作謗毁或為歌詩傳於都下或移書啓於言事之門隂幽暗昧被毁之人無由辨明甚者摇動公卿以希貨賂古之所謂清議公論豈如此耶此在可嫉者也陛下省留聖聽因事正之易如反掌曰辨邪佞知人則哲帝堯猶以為難堯聖人也曷難於知人曰人之難知雖聖人必審謹也進説之臣萬端人主以要道得之附隨人主之意而不論理道之是非此佞臣也附託權要之勢因事自媒其身此邪臣也多引前事之美專為髙論不顧今世難行此迂闊之臣也多取衆人之譽捨違公道不為國家乆計此奸詐之臣也其言忠其事實此鯁直之臣也無所附依進退自守此公直之臣也陛下進一忠直退一邪佞則天下莫不慕忠正而醜邪佞矣惟陛下博訪問則天下幸甚曰廢貪贓傳曰廉吏民之表今夫食祿而治官材與不材出於天性不材者不可強之使材雖廢職可恕也至於慿恃官威因縁為姦求取贓賄以曲為直上負朝廷之用下為百姓之害是其心豈復所畏哉古之聖明之主所深患之也近年之俗以容貪贓為長者視其虐民害物若無有也何則凡贓吏皆狡惡之人雖欲發摘其過惡必須下獄然後置之於法既斷之後彼贓吏必須稱寃理雪朝廷必於近郡别令鞫勘當時一獄之人盡須追呼或經月時禁繫對詞百姓已不勝其苦矣若只依前案彼贓吏者必又再雪朝廷又須别推劾一獄之人又須追擾如此百姓何以當贓吏之辨而受此苦毒例皆引虛自認或經赦宥纔得免脱是以百姓被害不死不休贓吏雪贓不盡不已監司之官以是莫敢輕發貪贓之吏自以為得意嗟乎百姓何罪惟陛下憐之貪吏何人惟陛下察之又有不敢贓求自為營利者臣自少入仕于今三十年矣當時仕宦之人粗有節行者皆以營利為耻雖有逐錐刀之資者莫不避人而為之猶知耻也今乃不然紆朱懐金專為商旅之業者有之興販禁物茶鹽香草之類動以舟車懋遷往來日取富足夫貪人日富而居有田宅嵗時有豐厚之享而清廉刻苦之妻孥饑寒自非堅節之士莫不慕之貪人非獨不知羞耻而又自號才能世人耳目既熟不以為怪管子曰禮義廉耻國之四維今風俗之壊是四維不舉伏惟陛下察貪贓者廢之清廉者奬之則亷耻興矣曰強兵今天下大患者在兵禁軍七十萬廂軍約五十萬積兵之多仰天子衣食五代而上至秦漢無有也祖宗以來無有也真宗與北方通和以後近六十年河北禁軍至今十五萬陜西自元昊叛増兵最多至今十九萬天下諸路置兵不少臣約一嵗緫計天下之入不過緡錢六千餘萬而養兵之費緫五千萬是天下六分之物五分養兵一分給郊廟之奉國家之費國何得不窮民何得不困然今之兵不可暴減固當有術以消之又當有術以精練之其説至多難以遽言陛下敕兩府大臣博求其弊漸講其術以為長乆之策今之為政此第一事曰富國或曰何以富國今天下之廣四維萬里可謂大矣農田商賈茶鹽酒稅銀銅金鐵之類莫不推之可謂察矣籠天下之利至纎至悉宜乎府庫充牣不可勝計然後為得今則每有支費常遣使諸路僅能自給者此何故耶曰養兵一百二十萬自古無有也嵗入日少而嵗出益多或曰何謂也曰兵日益多官日益冗財物有限而支費無涯此所以貧也然則富國有術乎必先用意於兵然後可言富國之術臣故曰今之為政強兵為第一事富國為第二事或曰為政止於此乎曰非也自此而始曰去冗治天下者如治家凡民之家隨其富貧視其族屬幾何一嵗之費幾何賔客之資公上之須復用幾何度其家之所入然後量力而出之如是乃可以為家計也不如是其家無以自給則族屬不得其安矣今治天下乃不如是宰相不知兵樞府不知財用三司使守藏也嵗了一嵗便為辦事不幸有邉境之急必取於民譬之家計是不度所入不量所出國不富實陛下未得髙枕而優游臣故謂兵冗為大其次又有官冗今且以轉官一事言之太祖太宗朝任官者或有功勞或有譽望則㧞任其人人莫不勸然以孤逺守常之人湮沈不遷者有之真宗設三年磨勘之法然後孤逺守常之人與夫權要圗進之士無異也日月既乆漸以成俗雖有長材異能出衆人者有小過累未可遷也但能飲食言語於人無忤者數日必遷此三年一遷之法今為大弊也祖宗時卿監郎中無數十人觀今班簿姓名可見也天下州軍三百餘處合入知州軍凡幾何人局少貟多每至差除待闕須一二年通判知縣之類率如此真宗時選人磨勘有遷京官者有不遷者仁宗時但無過咎無不轉官官冗如此豈有不思變更之術也哉去冗百端此二者最大願陛下熟思之漸求消冗之説曰原賞古之所謂賞者有大功則賞之臨兵戎者前死有榮退生有辱雖小功必賞以其履死地也今之臣一切務賞何謂賞所謂酬奬者是也守土之臣刺史縣令招徠逃户磨勘税賦皆其職所當為也不修其職罪當罰也今有為之者必自陳而求賞不立賞格則不為也天子斂生民之財以祿之分職位以寵之借威權以使之可謂至矣而於常事動則求賞天子豈與羣臣為市道哉至於茶鹽酒税之局物物皆有賞格下至吏人百姓莫不皆然此為政之弊也戰功必賞也捕賊之法必賞也功異於常者可賞也其餘無名酬奬可漸罷之以正官守之法也曰任材凡人之材各有所能不一等也一人之智兼治數局時有不能也有文詞之職有吏治之職有兵戎之職有財利之職夫有吏治之材使之臨兵戎之事則時有不能也有財利之術使之論朝廷之事則時有不能也今世用人大率以文詞進大臣文士也近侍之臣文士也錢榖之司文士也邉防大帥文士也天下轉運使文士也知州郡文士也雖有武臣盖僅有也故於文士觀其所長隨而用之使其所能則不能者止其術莫善於還詞令之職還於文士講説之職還於文學典禮之職還於博士兵戎之職還於武士吏文之職還於法吏金榖之職還於財利臣所謂還者與其能者不以一人之智兼責之也若夫宰輔大臣必兼衆能文學之士皆其出身忠義之節皆其素立故不論也不明法律不可也不知軍旅之情不可也不知邉疆險易之數不可也不知金榖利病不可也不知禮典之舊不可也是故其人陛下知其難也得人則愛重之又於羣臣詢諮而擇之臣故謂任材者明天子之事也曰正刑聖人可謂愛民矣可謂謹刑矣殺人者可殺矣疑或貸其生者州郡有一誤殺人者一獄所干官吏停廢竄逐無有貸者古先帝王謹刑不過是矣原其所因好生之徳及於下也重刑誠審矣而刑之輕者罰及無罪天下之官皆得施杖笞於其部通判職官於州之吏民皆可笞朴由是觀之民無全膚可謂濫刑矣天下州縣有長吏京師百司有長官有罪之人可歸於長吏長官則不敢妄刑也律有監臨主司不合行罰敇許執衣白直得施小杖臣竊謂天下州縣官司京師百司唯執衣白直令依敇科罰其餘公事各隨所屬長吏長官行之一嵗計之可減妄行千萬人矣臣願陛下明敇法官議之理當如何若律敕可行則行之必重其罰則不敢違也英宗時王安石為著作郎兼國史實錄院檢討編修官嘗上疏言古今之治本亂階更為倚伏以治易亂則反掌而可治以亂易亂則亂去而復生人主公聴則治偏信則亂故事歸於朝則治歸内廷則亂問百辟士大夫則治問左右近習則亂大臣公心無黨則治植黨行私則亂大臣正小臣廉則治大臣汚小臣貪則亂歴代名臣奏議巻三十四
