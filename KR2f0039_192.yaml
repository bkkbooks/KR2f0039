body:
  text: 歷代名臣奏議卷一百九十二明楊士奇等撰節儉宋神宗熙寧元年翰林學士司馬光上奏曰臣伏覩宰臣曽公亮等奏以河朔葘沴調用繁冗欲望將來大禮畢兩府臣僚更不賜銀絹奉聖旨送學士院取旨議者或以為兩府所賜無多納之不足以富國而於待遇大臣之禮太薄頗為傷體臣愚竊以為不然古者冢宰制國用視年之豐耗量入以為出固不可於飢饉之時守豐登之法也是故歲凶年穀不登君膳不祭肺大夫不食粱士飲酒不樂君臣上下皆當深自貶損以救民急也臣竊惟國家帑藏素已空虛重以今歲河北之地災害特甚鄉者慶厯之末河決商胡民田雖傷官倉無損而河北父子相食餓殍蔽野今河北之外加以地震官府民居蕩為糞壤繼以霖雨倉粟腐朽軍食宜乏何暇及民冬春之交民必大困甚於慶厯之時國家豈坐而視之不加賑救乎況復城櫓須修河防應塞百役並興所費不資當此之時朝廷上下安得不同心協力痛加裁損以徇一方之急凡宣布惠澤則宜以在下為先撙節用度則宜以在上為始今欲裁損諸費不先於貴者近者則踈逺之人安肯甘心而無怨乎必若為臣有大勳於天下雖錫之山川土田附庸何為不可若止因郊禮陪位而受數百萬之賞臣竊有所不安矣臣前所謂賞賜不節者此亦其一也雖臣下不辭猶應裁減況其自辭減又何損乎儻若但務因循姑息度日欲裁損乘輿供奉之物則曰減於制度太為削弱非所以華國欲裁損大臣無功之賞則曰所減無多虧傷大體非所以養賢欲裁損羣下浮冗之費則曰人情不恱恐致生事非所以安衆如此則國用永無可省之日下民永無蘇息之期必至於涸竭窮極然後已也且君子之所尚者義也小人之所徇者利也為國者當以義褒君子以利恱小人今大臣以災害之故辭錫賚以佐百姓之急義之可褒者也陛下從而聽之乃所以為厚非所以為薄也雖然兩府銀絹止於二萬匹兩不足以救今日之災又國家舊制每遇郊禋大賚四海下逮行伍無不霑洽不可於公卿大夫全無賜豫臣愚以為文臣自兩省以上武臣及宗室自正任刺史以上內臣自押班以上將來大禮畢所賜並宜減半俟他年豐稔自依舊制其文武朝臣以下一切更不減似為酌中臣亦知此物未能富國誠冀國家因此漸思減損其餘浮費自今日為始耳臣素愚戇識慮膚淺所言者皆目前之實狀非竒偉之髙論也伏望陛下更賜裁察若果有可取乞斷自聖志勿為衆言所移實天下幸甚殿中侍御史錢顗上奏曰臣伏以邊境未寧軍須至急朝廷經費百倍於祖宗之時帑藏空虛間或兼水旱之患從今不務省減向去何以枝梧然而事有權宜理難固執豈可目前只圖僥幸之利不能力為陛下久逺之謀臣雖至愚言思有補臣謂今冬郊祀之禮陛下在亮隂恭默之中遵先朝三年之舊制是亦不得已而行之內外供費豈當用平時之例而況覃霈之恩未逺特支之賞亦頻天下之財取之盡毫末數年之內用之無孑遺民力既極困窮國用正宜裁損臣聞在真宗全盛之世尚詔三司減郊祀應奉之物十餘萬載於國史足以為法陛下誠思咸平中府庫之所積孰與今日為比耶所有將來南郊伏乞陛下特降睿旨除三軍賞給外應內外文武臣僚舊例賜豫一切權且寢罷至於應奉不急之費亦乞減削如此則內足以省國用外足以寬民力豈曰小補之哉唯陛下斷在宸衷而力行之天下不勝幸甚神宗時起居舍人韓維上言曰臣竊聞故事大行皇帝當有遺留物分賜臣下臣伏思承平日久用度無節以致公私財利匱乏又國家不幸四年之內兩遭大故營造山陵及支士卒優賞所費不可勝計今之府庫比於仁宗晚年又益朘削若用嘉祐之例厚行賜賚臣恐為損不小陛下若以為奉承先帝之志加惠羣臣不可罷止則望閲諸府庫取服用玩好之物以充用才足將意便可不須過為豐侈所有金帛諸物可以贍兵恤民者願賜愛惜以救當世之急弊哲宗元祐二年著作郎兼侍講范祖禹上宣仁皇太后疏曰臣濫備勸講夙夜思職愚慮所及不敢不言伏以自先帝厭代諒暗三年今祥禫將終即吉方始服御器用內外一新奢儉之端皆自此始臣愚以為珠璣金玉之飾錦繡纂組之工凡可以蕩心恱目者不宜有加於舊增多於前也皇帝方嚮儒術親學問睿質日長聖性未定覩儉則儉覩奢則奢陛下所以訓導聖德者宜動皆有法不可不慎也古之聖帝明王莫不以儉為美德侈為大惡帝堯所居之室土階三尺茅茨不翦舜稱禹曰克儉于家孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕黻冕祭服也伊尹曰慎乃儉德惟懷永圖言儉之可以長久也文王卑服即康功田功周公戒成王以先知稼穡之艱難凡此皆陛下所宜日以啓迪皇帝之志者也東漢明德馬皇后常服大練左右但衣布帛無香薰之飾欲以身率下前史以為美談臣竊惟陛下聖政度越前古必不使明德馬后専美漢朝若崇儉敦朴飭正後宫以輔養皇帝之德使目不視靡曼之色耳不聽淫哇之音非禮不言非禮不動則學問日益聖德日隆此宗社無疆之福也孔子曰少成若天性習慣如自然老子曰不見可欲使心不亂古語有之曰貴不與驕期而驕自生富不與奢期而奢自至夫少習儉約長猶侈靡少習侈靡長將若何今天下之大生民之衆繫在陛下陛下儉於上則百姓富於下陛下奢於上則百姓貧於下比年以來天災流行年穀不熟國用虛乏百姓困弊幸賴陛下勤恤民隱存養休息視之如子有所不便輒弛禁以利民民方有樂生之意小康之望當今之務宜痛為莭約昭示儉朴以率天下自古為國未有不先儉而能致四海富實者也漢文帝身衣弋綈慎夫人衣不曵地帷帳不得文繡以示敦朴為天下先景帝遵業務農訓儉以雕文刻鏤傷農事錦繡纂組害女工下詔戒之故太倉之粟陳陳相因紅腐而不可食都內之錢貫朽而不可校稱賢君必曰文景以比周之成康及其衰微民心思漢而不能忘以文景恭儉德澤及民者深也臣願陛下上觀帝堯舜禹文王之法考伊尹周公孔子之言下視文景之效則皇帝少而習之長而安之唯知儉約不知侈靡他日海內富庶自今日儉德為之始生民之類受陛下之賜豈有窮極哉臣竊聞奉宸庫已取珠子至六十斤户部已用金至三千六百兩不為不多矣臣所以先事而言者恐增加無已滋長侈心也唐太宗問褚遂良曰舜造漆器禹雕其爼諫者十餘人何也遂良對曰奢靡之始危亡之漸也漆器不已必金為之金器不已必玉為之古之爭臣必諫其漸若事已橫流則無所諫矣是以紂為象筯箕子歎曰為象筯必為玉杯復思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可振也古之人見微而防患如此唐明皇開元之初悉取珠玉錦繡服玩之物焚之於庭以示儉德及其末年猶以窮極奢侈天下敗亂今臣區區之愚竊以皇帝即吉之始若一開侈靡之端恐後日奢費之無已也故願豫為之防止於未然臣愚不識忌諱惟陛下裁赦時平章軍國重事文彥博上奏曰臣竊以數十年來風俗僭侈車服器玩多踰制度以致士民之家率多貧乏不守廉莭夫為國之要在乎富民富民之要在於節儉民既富矣君孰與不足臣欲乞選差官檢詳唐室至於朝廷令式參定制度隨時制宜務令簡當可久遵行庶幾上下有分不敢僭侈風俗自當淳儉太平可以馴致紹聖四年殿中侍御史陳次升上奏曰臣伏聞金明池所造龍船費用萬貫不少肆為侈靡窮極工巧必非陛下之意也臣觀書之稱禹曰克勤于邦克儉于家以禹之德非無可稱也而所稱者勤儉而已蓋以有天下非不足於財也而必嗇於用者欲示敦朴以先天下故也恭惟陛下躬不世之資席祖宗之慶勤儉過於夏禹天下所共仰有司不能宣明陛下德意所造不乘之舟其費不資遊幸之日天乃大風豈非愛佑陛下而使覺悟有司之過乎兹事已往雖不可救亦足以為來者之戒伏望聖慈今後如有興造乞敕有司無令過度庶免虧損陛下儉素之德不勝幸甚户部侍郎蘇轍上奏曰臣等竊見本部近編成元祐會計録大扺一歲天下所收錢穀金銀幣帛等物未足以支一歲之出今左藏庫見錢費用已盡去年借朝廷封樁末鹽錢一百萬貫以助月給舉此一事則其餘可以類推矣臣等聞古者制國之用必量入為出使三年耕必有一年之食故三十年之間而九年之畜可得而備也今者文武百官宗室之蕃一倍皇祐四倍景德班行選人吏胥之衆率皆增廣而兩稅征商𣙜酒山澤之利比舊無以大相過也昔祖宗之世所入既廣所出既微則用度饒衍理當然爾今時異事變而奉行舊例有加無損今日天下已困弊矣若更數年加之以飢饉因之以師旅其為憂患必有不可勝言者臣等備位地官與聞朝廷大計而喑默不言異日雖被誅戮何補於事故臣等願及今日明敕本部取見今朝廷政事應干費用錢物者隨事看詳量加裁損使多不至於傷財少不至於害事二聖以身率之大臣以身行之使天下曉然皆知事之當然而非朝廷有所靳惜則誰不信伏昔治平熙寧之間因時立政凡改官者自三歲而為四歲任子者自一歲一人而為二歲一人自三歲一人而為六歲一人宗室自袒免以上漸殺恩禮天下晏然莫以為言此則今日之成法也臣等伏乞檢會寶元慶厯嘉祐故事於本部置司選擇近臣共議其事嚴立近限責以實效法度一成數歲之後費用有節府庫漸充傳之無窮久而不弊則其於聖德實非小補也臣等愚拙不能修明職業以廣財賦冒昧獻言罪當萬死轍又上奏曰臣等近奉敕裁減冗費上自宗室貴近下至官曹胥史旁及宫室械器凡無益過多之用皆得量事裁減唯獨宮掖浮費名件不少有司不得盡見未敢輒議竊見近降詔書以方將裁損入流以清取士之路遂命今後每遇聖節大禮生辰太皇太后皇太后皇太妃所得恩澤並四分減一欲以身先天下詔書既出中外臣庶皆知聖明以私徇公至有感激流涕者臣等仰測聖意克己為人無所不可其欲裁損宫掖浮費與裁損私門恩澤何異然而至今未見施行者蓋有司失於建明則臣等之罪也謹案寶元二年嘗命近臣詳定裁損冗費時諫官韓琦建言請令三司取入內內侍省并御藥院內東門司先朝及今來賜豫支費之目比附酌中減省其無名者一切罷去時有詔禁中支費只令入內內侍省御藥院內東門司相度減省報詳定所其臣僚支賜即許會問入內內侍省等處施行及慶厯元年又詔入內內侍省等處取先帝時帳籍比較近年內中用度之數以聞是時所損浮費數目極多為益不細臣等欲乞陛下推廣前日減省恩澤已行之心仰法寶元慶厯祖宗已試之效使天下明知陛下節用裕民自宫禁始則凡有裁損誰不心服臣等不勝區區干犯鈇鉞徽宗政和七年命户部參稽熙豐及今財用有餘不足之數又立旁通格令諸路漕司各條元豐紹聖崇寧政和一歲財用出入多寡來上淮南漕臣張根言天下之費莫大於土木之功其次如人臣賜第一第無慮數十萬緡稍增雄麗非百萬不可佐命如趙普定䇿如韓琦不聞峻宇雕墻僭擬宫省奈何剝民膚髓為斯役之奉乎其次如田産房廊雖不若賜第之多然日削月朘所在無幾又如金帛以供一時之賜有不可已者而亦不可不節至如錫帶其直雖不過數百緡然天下金寶糜費日久夫豈易得今乃賚及僕𨽻使混淆公卿間貴賤賢不肖莫之辨也如以為左右趨走之人不欲其墨綬當别為制度以示等威疏奏不省宣和六年尚書右丞宇文粹中言近歲南伐蠻獠北贍幽燕關陜綿茂邊事日起山東河北寇盜竊發賦斂歲入有限枝梧繁夥一切取足於民陜西上户多棄産而居京師河東富人多棄産而入川蜀河北衣被天下而蠶織皆廢山東頻遭大水而耕稼失時他路取辦目前不務存恤榖麥未登已先俵糴歲賦已納復理欠負託應奉而買珍異竒寶欠民債者一路至數十萬計假上供而織文繡錦綺役工女者一郡至百餘人陛下勤恤民隱詔令數下悉為虛文民不聊生不惟寇盜繁滋竊恐災異數起祖宗之時國計所仰皆有實數有額上供四百萬無額上供二百萬京師商稅店宅務扺當所諸處雜收錢一百餘萬三司以七百萬之入供一年之費而儲其餘以待不測之用又有解池鹽鈔晉礬市舶遺利內贍京師外實邊鄙間遇水旱隨以振濟蓋量入為出沛然有餘近年諸局務應奉等司截撥上供而繁富路分一歲所入亦不敷額然創置書局者比職事官之數為多檢計修造者比實用之物增倍其他妄耗百出不可勝數若非痛行裁損慮智者無以善其後久之乃詔蔡攸等就尚書省置講議財利司除茶法已有定制餘並講究上攸請內侍職掌事干宫禁應裁省者委童貫取旨時貫以廣陽郡王領右府故也於是不急之務無名之費悉議裁省髙宗紹興九年右正言陳淵上奏曰臣聞儉非聖人之中制而孔子對林放之問則曰禮與其奢也寧儉豈以儉為禮之本故歟蓋常人之情由儉入奢易由奢入儉難故當用儉之時不可不省不省而無以約之則末流之弊將至於不可勝救矣臣觀自昔創業之主皆有儉德蓋其興於閭閻熟知民間之疾苦稼穡之艱難故愛惜天物有不期然而然者禹之治水八年於外三過其門而不入逮地平天成之後乃作禹貢既第田以制賦又因民之所願而取其有餘其微及於漆枲絺紵羽毛齒革與夫魚鹽橘柚之可於口菁茅簵楛之適於用皆在所取蓋亦莫非民力之所得者方禹櫛風沐雨手胼足胝之時親見百姓之勞苦已而安享其奉固宜有所不忍也故禹菲飲食惡衣服卑宫室孔子美之以為無間豈非所謂愛惜天物有不期然而然者歟至於守成之君往往不然輕費妄用卒以召亂求如漢之孝文蓋亦千一耳今陛下所乘之勢如孝文而天性似之所歷之艱險如禹又不待學而後至其於儉德天下户知之矣而臣強聒猶欲有所獻者書之稱禹曰克勤于邦克儉于家或曰儉可以施於家而已是大不然國之本在家而儉固將施之於國也孝文惜百金之費而制度不立終愧前古使其儉於一己又能推而廣之如彼其質雖二帝三王之功可跂而及矣可勝惜哉比年以來陛下恩惠太泛賞給太厚匪頒賜豫之費幾於無節此固陛下甚盛德事然府庫空虛而發之不已財賦匱竭而取之益詳陵寢未成郊祀不逺內有諸將之饋外有鄰境之好所用既衆而所入實寡此臣所甚懼也周官唯王及后世子不會説者曰不得以有司之法治之誠然是周公作法開後世人主侈用之端也而可乎臣謂周之冡宰以九式均節財用有司雖不會冡宰得以式而論之矣若事事如式雖不會猶會也故臣願陛下自今凡有錫賚法之所無而於例有疑者或輕重非倫或多寡不類事下三省則三省得以共議事下户部則户部得以執奏出納之吝有司得以獻其疑可否之宜臺諫得以論其失凡所經由不許承誤陛下聞其言又從而嘉納之一有失當即行改正則前日之弊庶幾可息矣上以省費用之煩下以絶僥幸之求無善于此臣不勝過計唯陛下財幸髙宗時張浚上言曰天生民而立之君俾司牧之非特使之奉養其私而已也自昔聖賢之君莫不恭儉節用損己益人凡以順天意享天心耳且農夫終歲勤動計其十畝之耕輸公上而有餘者所得不過一金耳我乃捐之以市不急之用棄之以徇無名之費豈不重違物理乎乃若排去大難勸賞有功宗廟之供官吏之俸將士之養此則宜從優厚而不容但己者也臣仰惟陛下至誠恭儉追古聖賢而臣竊聞文書刀劔之求尚容有賜豫過制者焉夫多難之時人情易怨力戰效命者所得如此而伺間投好者顧亦如彼即解體矣衛懿公好鶴鶴有乘軒者將戰而國人皆曰使鶴臣謂非獨名器為然也錫賚之間亦所當謹也起居舍人洪遵經筵進故事曰按通鑑韓昭侯有敝袴命藏之侍者曰吾君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者臣聞天子享四海之富生殺自我豫奪自我於起居動作之間其流易入於侈雖古先盛王號為善治天下恭儉愛民如漢文帝惜百金而罷露臺念農力而除田稅可謂至矣然以新垣平之詐賞賜至一日千金鄧通之嬖幸至豫之蜀道銅山使自鼓鑄文帝尚爾況其下者乎而韓昭侯以千乘之君當戰國之際干戈相尋日不暇給雖使橫豫妄賜竭民之力以為待士惠下之道其誰能止之然昭侯內修政教外應諸侯務正其本而已一敝袴之微中人之家所不惜而千乘之君能藏之以待有功然則金玉幣帛之重或相什伯或相千萬其肯以奉談笑逰宴豫無功之人哉推是心以往帝王之道為不足進矣臣謂強本節用責實富民其要無出於此遵又進故事曰按漢書文帝欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為臣聞儉固帝王之德惟能出於誠心見諸躬行日用之間然後為盛德之至堯舜禹湯文武以來則漢文帝其人也當漢初定海內乂安疑若可以自暇自逸方且兢兢業業心乎斯民故一銖一縷弗敢妄費以示敦朴為天下先踐阼二十三年宫室苑囿車騎服御無所增益弋綈緼衣革舄韋帶其衣服之儉如此所幸慎夫人衣不曵地其嬪御之儉又如此殿帷無文繡集上書囊為之其供張之儉又如此露臺之費不過百金猶恐傷財蠧民罷役不作究其行事莫不一本於恭儉中外化之風俗遂以醇厚功業隆盛為漢太宗雖髙皇帝創業垂統然詒謀籌後傳祀四百實文帝有以致之逮於元帝罷三服官減穀食馬而不能起優遊不斷之弊晉武帝焚雉頭裘而不能杜宫女萬數之失區區矯激一事一為非出於誠心何足以揆方萬一至如漢文帝真可為萬世法御史中丞廖剛上奏曰臣竊謂近因費用日廣上下憂歲入之不支為陛下陳節用之説者多矣如遣使河南誠不可已之事諸臣反命亦皆言徒御之冗民病供億聖慈深以為然自今一切用度漸當從省節矣然臣竊見士大夫多務便私鮮有能為國家愛惜財用者且如一帥臣到罷供張借請率費數萬緡小郡亦不下數千緡雖曰有例獨不可稍裁損乎況有數易之弊民力殆不可能堪也又有守帥將官託討捕之名差駐劄官軍迎送者各是千百人隨逐所過州縣既批口劵又索犒設如此之類獨不可嚴禁止乎凡是無理之費州縣時時有之徒竭吾民之脂膏無補公家之毫髮主計者往往屈於權勢莫敢致詰是以朝廷不得而知也臣謂罷無名不急之務不獨在朝廷當然州縣妄費亦復不少如接送之類願各為之限制稍從簡約若違法差借兵卒或因緣為姦者並痛治之庶幾所謂節用裕民者得矣太常博士王居正上疏論省費曰宋興百七十三年矣所行多彌文之事今陛下所至曰行在於一日二日少駐蹕之頃欲盡為向者百七十三年之事非所謂知變也夫不知隨時以省事而乃隨事以省費故今日例有減半之説究其實未始不重費願詔大臣計百事之實而論定之茍非禦寇備敵任賢使能振恤百姓一切姑置則費省而國裕孝宗乾道六年端明殿學士汪應辰上奏曰臣聞書曰不作無益害有益功乃成夫人君以一人之身不作無益固為善矣然又須推而廣之凡天下之事足以害有益者一切杜絶無使滋長然後為盡善也恭惟陛下仁儉之德清淨之政不尚浮華專治實務如銷金服飾此所謂無益而害有益者也然內而宫掖既已不用而又申嚴禁約無敢不聽其為益也蓋不可勝計矣至於流俗習尚有如銷金服飾之類者臣請陳之竊見所在道宫佛寺造作經藏裝飾像貌所用金箔動以萬計雖法所不許而令未必行公然扺冒視為常事日甚一日歲甚一歲浸浸不已豈特銷金服飾之糜費而已哉地寶有限斯民勞筋苦骨捐軀委命晝夜搜采毫釐積纍之所得乃以供無益之用如棄之然甚可惜也昔唐武宗盡毁天下僧寺及宣宗即位雖務改會昌之政僧寺皆復其舊然猶下詔修飾佛像但用土木足以致敬不得用金銀銅鐵等夫銀與銅鐵猶禁不用況於金乎伏望聖慈特降明詔嚴行告戒其或循習不悛違犯如故重置典憲期以必行且復責之郡守縣令常切覺察庶幾人有所畏舊弊盡革孝宗時知池州袁説友上言曰臣聞恭儉節約聖王之盛德也無事之日儉約固所當尚多事之後儉約尤在所先仰惟皇上恭儉出於天資節儉見於身履臨御以來乘輿服御無所崇侈宫室苑囿無所增益雖舜之慈儉禹之菲食文王之卑服殆不過此固何待於在庭之臣進言獻議以贊聖德哉然臣拳拳之愚切惟今日適當多事之時要其後必濟以裕之之䇿然所以為之䇿者不過曰儉約而已且今天下何如哉自去歲旱暵浙東赤地千里而公與私積幾若垂磬浙西蘇秀旱勢為甚官苖私秬什亡五六江淮諸郡亦非樂歲皇上勤恤民隱州郡凡所申請蠲放官物一一盡可其奏所蠲之數殆數十萬大農所仰與州縣上供皆無復優裕矣茲者復有山陵重事皇上終身之慕竭天下之力以寓孝思損內帑之儲出宫闈之積惟慮毫髮弗至而其用益大矣又有使命往來旁午於道其間酬費詎可縷舉切意內而軍國之須外而州郡之蓄恐又非曩者比也臣所謂多事之後豈不在今日哉儻於其後不知所以節浮費戒侈用則浸浸不已後將何繼臣欲望特賜敷奏曲軫宸念自今以始賜毋輕豫雖有功者亦當節約況其無功者哉役毋輕舉雖甚急者亦當節約況不急者哉罷無名之費如興土木如講繁文省州縣之官如增釐務如創添闕惜內帑之金以培基本住度牒之貨以備緩急戒州郡以節用毋事侈費戒邊城以儲偫毋竭民力庶幾多事之後可以因數者之節約以事休養將不歲月公私得以寬裕毋復後患矣侍御史王十朋上疏曰臣聞生財莫若節財省用斯能足用今陛下方圖恢復而板曹以財用不足為言常賦既不能供所須民財又不可遽而取惟有痛加節省可以薄助軍興然節省一事尤在聖躬親率昔漢文帝身衣弋綈以致富庶唐憲宗躬服浣濯以致中興藝祖皇帝幕用青布而僭偽以平仁宗皇帝被用黃絁而風俗歸厚此乃前代帝王之盛德我宋祖宗之家法尤不可不遵也陛下比從諫臣之請裁減外廷官吏度一月所省亦不下十萬緡以歲計之不無少補又竊見內侍都知李綽具到宫掖用度之數有云此項全支者有云減半支者有云住支者內庭節約如此亦可以風化天下矣然臣愚區區猶望陛下躬率之者蓋欲陛下於乘輿服御玉食之間有可更加節損者親出御批斥賜外府以助軍須以為中外節省之訓如內侍所具之數除德壽宫不可減損外亦有全支而或可減半者亦有已減半而更可以分數減者陛下既躬率之為下者亦何敢不從耶俟邊事稍寧自當復舊今日權宜行之正聖訓所謂今日當如創業時也臣不勝拳拳之至十朋又代越帥王尚書上疏曰臣聞財用不足最為今日之患議者歸咎生財無術思得管蕭劉晏之徒用之臣以謂財有限而用無窮生財不如節財省用斯能足用昔漢文帝時有玉帛和親之費然而貫朽粟陳海內富庶者由文帝以敦朴先之宫室苑囿車騎服御無所增益故也我仁宗皇帝慶厯間西方用兵北敵增幣天下亦多事矣而斂不及民用度不乏者亦由仁宗以儉德化下故於多事之間內不失治民到于今稱之朝廷自和議以來權臣務為茍安之計凡百用度悉如太平全盛之日中外化之競為侈靡府庫匱乏實此之由往歲陛下焚金翠近又以損名齋親為之記帥下以躬蓋無愧於文帝仁宗矣然財用猶不足臣妄意竊謂奢侈之風或未痛革無益之作無名之費或未盡除至若內降之恩未能盡絶名器之假未能無濫宫禁近習使令之數不無過多軍容教坊伶倫俳優之徒不能無非時之橫賜凡此之類可省者省之可罷者罷之最節財之要術當今之急務臣又聞唐德宗納裴延齡之姦謀有天子私藏之財號瓊林大盈二庫陸贄諫之甚力謂宜散其小儲而成其大儲損其小寶而成其大寶臣願陛下以文帝仁宗之儉德為法以德宗之私心為戒凡天下財賦之入悉歸之户部仍擇知取豫之臣以司出納之柄如是則將見粟腐大倉錢流地上上下皆足公私並濟矣司農卿兼尹京李椿上奏曰臣伏見比年以來庾廪不豐庫藏窘闕軍須國用日覺難支州縣之間財賦尤匱農民士卒罕獲溫飽至於樁管經常撥還借兊每煩聖躬上勞處分有司但知憂懼莫究本原日復一日坐視不講於國家久長之計豈所宜然臣嘗讀易之節曰節以制度不傷財不害民六三曰不節若則嗟若旡咎象曰不節之嗟又誰咎也此豈非今日大小之臣但知憂懼不能自責而歸咎於時而已哉蓋傷其財則害於民皆出於不知節以制度違聖人之明戒也然則制度謂何凡居處飲食衣服受用皆是也仰惟陛下躬行節儉凡百受用悉從省減而奈何臣民奢侈縱恣不知限極居室則危樓大厦華麗相髙衣服則綺繡鮮潔巧異爭先飲食則水陸畢陳厭飫奴婢營利則攘奪占爭以強淩弱以至下民貧困者多無力以供其上此其所以財益傷而民益害也臣愚願陛下詔有司凡居室之髙下雅飾衣服之顔色等降奴婢之多少器用之品式皆立制度務從朴質違犯者必加之罪自貴近始使上下皆知節儉之為德侈麗之可戒賜豫之際亦望陛下以制度節之財不傷而民無害矣天下幸甚知福州趙汝愚奏便民事宜曰臣檢國朝會要諸州軍歲賜公用錢皆有定數且如福州國初歲賜錢僅五百貫熙寧五年始增定為二千貫至紹興九年本州守臣有請以升改帥府增置官屬歲用不足有旨每歲更給錢一千貫通計每歲不過三千貫而已臣略計本州近年支費每歲率用錢七萬餘貫過於歲額二十餘倍多是於係省錢內取撥全無限制詢之諸郡事體略同惟視守臣之賢否用度之豐約以為多寡之數而祖宗法制皆蕩然無復存矣臣仰惟國家開創之初懲五代藩鎮之亂諸路置轉運使總制一路財賦務收諸鎮之權故公用錢至為薄少纍世承平文物繁富居官者頗以為病故熙寧中神宗皇帝為取會諸州軍例册及三年出納之數付司農寺詳定而稍增其數今會要所録是也然當時法度森嚴官吏畏竦不敢有分毫踰越制度臣觀蘇軾在徐州日嘗論京東盜賊其奏略曰欲責捕盜賊法外求一錢以使人且不可得又曰臣願自青鄆以降如徐沂齊曺之類皆遴選守臣聽法外處置強盜頗賜緡錢使得以布設耳目蓄養爪牙然緡錢多賜則難常少又不足於用臣以為每郡可歲别給一二百千使以釀酒凡使人緝捕盜賊得以酒豫之敢以為他用者坐贓論臣竊惟京東素多盜賊號重法地分當時守臣不敢法外求一錢以捕賊至無酒以使人孰有取之盡錙銖用之如泥沙如今者哉臣伏思祖宗之時重熙纍洽民間兩稅之外絶無科斂而州郡又儉約守法度如此百姓安得不富今自渡江以後養兵既多費用浸廣民間兩稅之外科斂不一如經制錢總制錢折帛錢大軍月樁錢糴本錢添收頭子錢增收勘合錢若此之類未易殫舉而州縣又有隨時科折之數民力可謂困矣而州郡費用之廣至二十倍過於往時然則百姓安得不貧臣嘗念此至熟而不敢輕易以為言者蓋以官吏供給錢一項紹興之初已著為令所在添員甚衆所費益多較之歲額已自過數又軍兵犒賜之類亦有久年成例不可頓革者是以官吏並緣無復法守臣愚伏望聖慈特降指揮依倣熙寧已行體例逐路選委監司一員取會諸州祖來例册及比年出納之數除供給錢一項别作施行外其餘公用之數參酌舊制增定其數有違法禁過數支用者許有司彈奏依法施行如此則居官者自然愛惜錢物不敢妄費又慿藉法守亦可以杜絶干請而苞苴貨賂亦不禁而自絶矣汝愚又上奏曰臣伏讀六月己丑勸農詔書仰惟陛下聰明仁聖保惠元元訓誥懇惻為民而下者殆無虛月謹擇監司郡守延見訪問考察能否而進退之所以求諸己者可謂勤矣然而十數年來未有治效卓卓如古循吏者豈非地狹國貧取於民者過制故慈惠之師溺於職而不舉強敏辨給之吏始多為術以病民而莫知恤也臣嘗讀漢書循吏傳班固以為孝惠以來民務稼穡至于文景遂移風易俗故蜀守文翁之屬皆謹身帥先不至於嚴而民從化孝武外攘四夷內改法度民用雕敝姦軌不禁時少能以化治稱者由是觀之在此不在彼明矣臣愚伏願陛下清心省事一以節用愛人為本依倣元祐以來故事選委官吏講求今日內外財用之出某事可均某事可節某事可罷斟酌次第而行之歲必有所儲也又取兵興以來財賦名色自創置以及後來增損之數究見本末擇其間可省者漸賜以豫民庶幾民俗富厚而政化可行然後久任而責其成雖使郡為龔黃縣為卓魯可也區區狂瞽惟陛下幸赦其愚光宗紹熙間權户部侍郎袁説友上疏曰臣竊惟京邑富盛風俗易於侈靡其間儻有侈靡過度銷毁金寶上下慣習殊無限制久而不戢深為財寶之害臣伏見銷金衣飾頃歲有司屢行禁止往往法令稍寬隨即縱弛自纍歲以來其侈日盛行都豪貴之家故習於此而下至齊民稍稍有力者無不競以銷金為飾蓋不止於倡優被服之僭也今都人以銷金為業者不下數十家貨賣充塞相望於道積日纍月毁壞金寶何可數計豈特上下僭度侈靡成風有干風化之美而國家金寶日銷月削不復可以收拾誠非細害仰惟陛下躬行儉約以先天下豈容民庶習成侈靡毁棄珍寶以至於此臣恭聞祥符四年詔後苑銷金者並刺配祥符八年詔內外庭並不得衣銷金貼金縷金間金戭金圈金剔金陷金明金泥金楞金背金影金盤金織金金線等但係裝著衣服並不得以金為飾犯人及工匠干連人並行重斷紹興七年髙宗皇帝宣諭曰銷金之法甚嚴禁中有衣銷金者罰俸三月淳熙十一年嘗劄下本府嚴行禁止本朝法制之密蓋如此今此風日盛禁止已是後時臣愚欲望睿斷劄下本府舉行祥符淳熙之制明列項目嚴行禁戢仍乞陛下仰體紹興之旨自宫禁始以先民庶幾法制必行愛惜金寶以抑僭侈以厚風俗不勝幸甚醴泉觀使周必大上奏曰臣聞論語首篇載孔子之言曰節用而愛人易曰節以制度不傷財不害民詩頌魯僖公能修伯禽之法先及儉以足用次之寬以愛民夫聖人方論愛民乃首言節儉者蓋不儉則用度不足用度不足則必重斂於民雖有仁心仁言無所施矣臣恭聞陛下儉約出於天性今發政之初必將如漢文帝示淳朴為天下先而臣尚以為言者蓋自南渡以來疆土未及承平之半悉中外之貢輸奉三宫之營養自當有增而無損至於既養州郡之兵又聚屯戍之兵又厚添差不釐務之祿視祖宗時所入彌寡所用彌多東南民力安得不困往者京官選人憚於作邑正為財賦難辦爾邇來州郡亦以不辦為憂嚴於催科巧於措畫僅乃有濟陛下雖懷愛民之意何自而行臣願因聖性之節儉凡賜豫支費損之又損如召南之國化文王之政在位皆節儉然後上行下俲其效可睹至於民力之盈虛州用之貧富殆不可一槩而舉惟監司守令乃能詳知欲望申詔諸路各陳所部凡可省費而裕民者指事申明限以半年上之朝省隨宜斟酌特降處分庶使實惠遍及於天下不為虛文捨是則雖詔旨諄諄不過宣讀之後徒挂牆壁而已寧宗即位校書郎項安世上奏曰管夷吾治齊諸葛亮治蜀立國之本不過曰量地以制賦量賦以制用而已陛下試披輿地圖今郡縣之數比祖宗時孰為多少比秦漢隋唐時孰為多少陛下必自知其狹且少矣試命版曹具一歲賦入之數祖宗盛時東南之賦入幾何建炎紹興以來至乾道淳熙其所增取幾何陛下試命內外羣臣有司具一歲之用人主供奉好賜之費幾何御前工役器械之費幾何嬪嬙宦寺廪給之費幾何户部四總領養兵之費幾何州縣公使迎送請給之費幾何陛下必自知其為侈且濫矣用不量賦而至於侈且濫內外上下之積不得而不空天地山川之藏不得而不竭非忍痛耐謗一舉而更張之未知其所以給也今天下之費最重而當省者兵也能用土兵則兵可省能用屯田則兵可省其次莫如宮掖兵以待敵國常畏而不敢省故省兵難宮掖以私一身常愛而不忍省故省宫掖難不敢省者事在他人不忍省者在陛下宮中嬙嬪宦寺陛下事也宫中之器械工役陛下事也陛下肯省則省之宫中既省則外廷之官吏四方之州縣從風而省奔走不暇簡朴成風民志堅定民生日厚雖有水旱蟲蝗之災可活也國力日壯雖有邊隅盜賊之變可為也復祖宗之業雪人神之憤惟吾所為無不可者理宗淳祐間徐元杰進故事曰前漢揚雄將作大匠針曰開閉將作經治宫室牆以禦風宇以蔽日寒暑攸除鳥鼠攸去主有宫殿民有宅居昔在帝王茅茨土階夏卑宮室在彼溝池臣聞工誦針諫肇於古者謗木之求工執藝諫蓋垂鞀聽規之世所不棄也臣以司匠退循朴拙他無技能敢竭心工極陳儉寶惟陛下垂聽焉夫宫室牆宇茍足以禦風蔽日古之聖人不越是以求侈也夏后氏處卑宮而不厭其陋且手胼足胝盡力於溝洫之利凡可以約己而裕人者無不為之況敢以是自逸其身哉不然峻宇雕牆華則華矣視采椽不斫為孰久瑶臺瓊室珍則珍矣視土階三尺為孰安蓋聖人以大學潔矩之道正天下念民力之有限計邦費之無窮知天下之傷財孰有如工役之費故清心省事所以為靜養君德之基節用愛人所以為深固邦本之計其意若曰宮室既侈麗矣凡皆稱是可也窮奢極欲極天下之膏血將不足以供之此聖人所不忍為宜乎其長守冨貴也昔魏之楊阜當明帝建宫室之初抗疏請省宫人問之吏則以為禁密非所當與阜怒而杖其吏帝於是愈敬憚之竇璡修洛陽宫昧過侈之當戒崇飾雕麗謂可逢上之欲豈知太宗能為工費計怒而毁之曽不容緩然則二臣之正否雖不同而二君之好惡則俱正矣臣於是益有感於揚雄氏之針焉雖然雄既託匠以為針而校獵長楊一賦又有感於文帝躬服節儉之化大厦則取其不居木器則取其無文後宫則取其賤玳瑁而踈珠璣他如却翡翠除雕鏤惡靡麗斥芬芳與夫抑止鄭衛絲竹之聲樂極其效則上足以格天而有玉衡正泰階平之應然則揚雄有愛君之忠欲規其過而繩其愆者以針諫之為未足故又述賦以諷諫也臣嘗謂揚雄之針獻之於西都中微之季時之不偶而言弗獲用漢亦殆矣臣述其言以補工藝之諫敢謂遭際陛下盛明之君納約自牖信而後諫臣能言之陛下能行之臣百生慶幸與國同休矣惜不令揚雄見之度宗咸淳十年侍御史陳堅等上奏曰今東南之民力竭矣西北之邊患棘矣諸葛亮所謂危急存亡之時也而邸第戚畹御前寺觀田連阡陌亡慮數千萬計皆巧立名色盡蠲二稅州縣乏興鞭撻黎庶鬻妻賣子而鍾鳴鼎食之家蒼頭廬兒漿酒藿肉琳宫梵宇之流安居暇食優遊生死安平無事之時猶且不可而況艱難多事之際乎今欲寬邊患當紓民力欲紓民力當紓州縣則邸第寺觀之常賦不可姑息而不加釐正也望與二三大臣亟議行之詔可元世祖時趙天麟上䇿曰臣聞上古洪荒敷天朴略摽枝野鹿燔黍捭豚衣鳥獸之皮食鳥獸之肉汗尊而抔飲蕢桴而土鼓冬則居窟夏則居巢其卧徐徐其覺于于當此之時淳風未散民皆自以為足也及乎伏羲作而書契之法興神農作而耕織之功立軒后作而器用之資漸備自兹以降澆漓益生是以堯居茅屋禹戒雕墻周王之卑服漢帝之弋綈非徒盡質素之本心亦以杜人民之奢汰也至元年間都堂議得民間喪葬紙房金銀人馬并綵帛衣服帳幕等物欽依聖旨事意截日盡行禁斷又準中書省奏定到官民嫁娶聘財筵會等事此皆先帝慎儉德以懷永圖推其餘以化下民也夫天下之人或有見衣服鮮明騶從翹楚者從而羡之見衡門安志樂業循常者從而笑之乃溥民之淺昧世態之恆情然而權利濫官豪富子弟知其如是大放厥心以驕淫相夸以奢靡相尚以節約為恥以貞廉為愚既不副於上心又重傷於家業延及士庶轉相倣效習以成風非一旦之能改也殊不知衣敝緼袍不恥狐貉者子路之何用不臧也食前方丈後車千乘者鄒軻之得志不為也桓宮丹楹刻桷而御孫諫之晏子一狐裘三十年而紫陽稱之夫衣足蔽體食足充飢外之皆非吾人之所有也彼錦繡綺組之衣以之禦寒與繒練奚以異哉彼熊掌膾炙之食以之糊口與魚棗奚以異哉慶贈宴會禮足而已又奚用越名干分傾資破産以為之哉故古人之言曰儉德之共也侈惡之大也又曰山林不能給野火江海不能實漏巵言生一破百而易無孑遺也又曰城中好髙髻四方髙一尺城中好寬袖四方全匹帛言京師者天下之仰從也且聞譽施於身不願人之文繡理義恱我心如芻豢之恱口今之王公大人宜去奢從約以增美其名乎宜務華違儉以徒飾其身乎伏望陛下體先帝之意禁京師內王公大人之奢侈則天下之官民不令自從矣蓋見在上者先儉而知儉之為美故不得不然明宗時監察御史博迪約蘇言朝廷自去秋命將出師戡定禍亂其供給軍需賞賚將士所費不可勝紀若以歲入經賦較之則其所出已過數倍况今諸王朝會舊制一切供億俱尚未給而陜西等處飢饉洊臻餓殍枕藉加以冬春之交雪雨愆期麥苖稿死秋田未種民庶遑遑流移者衆臣伏思之此正國家節用之時也如果有功必當賞賚者宜視其官之崇卑而輕重之不惟省費亦可示勸其近侍諸臣奏請恩賜宜悉停罷以紓民力臺臣以聞帝嘉納之歷代名臣奏議卷一百九十二
