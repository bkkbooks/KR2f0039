body:
  text: 歴代名臣奏議卷二百九十一明楊士竒等撰近習齊桓公問於管仲曰國何患管仲對曰患夫社鼠桓公曰何謂也管仲對曰夫社束木而塗之鼠因徃託焉燻之則恐燒其木灌之則恐敗其塗此鼠所以不可得殺者以社故也夫國亦有社鼠人主左右是也内則蔽善惡於君上外則賣權重於百姓不誅之則為亂誅之則為人主所察據腹而有之此亦國之社鼠也人有酤酒者為器甚潔清置表甚長而酒酸不售問之里人其故里人云公之狗猛人挈器而入且酤公酒狗迎而噬之此酒所以酸不售之故也夫國亦有猛狗用事者也有道術之士欲眀萬乗之主而用事者迎而齕之此亦國之猛狗也左右為社鼠用事者為猛狗則道術之士不得用矣此治國之所患也漢文帝出宦者趙談參乗中郎袁盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸餘人共載於是上笑下談元帝初元中以石顯為中書令委以政事前將軍蕭望之及光禄大夫周堪宗正劉更生皆給事中望之領尚書事知顯專權邪辟建白以為尚書百官之本國家樞機宜以通明公正䖏之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人東漢順帝委縱宦官有識危心御史張網常感激慨然嘆曰穢惡滿朝不能奮身出命掃國家之難雖生吾不願也退而上書曰詩曰不愆不忘率由舊章㝷大漢初隆及中興之世文明二帝德化尤盛觀其理為易循易見但恭儉守莭約身尚德而已中官常侍不過両人近倖賞賜纔滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非重人重器承天順道者也伏願陛下少㽞聖思割損左右以奉天心時中常侍張防特用權勢每請託受取司𨽻校尉虞詡輙案之而屢寢不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豊遂交亂嫡統㡬亡社稷今者張防復弄威柄國家之祻將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之跡書奏防流涕訴帝詡坐論輸左校宦者孫程張賢等知詡以忠獲罪乃相率奏乞見程曰陛下始與臣等造事之時常疾姦臣知其傾國今者即位而復自為何以非先帝乎司𨽻校尉虞詡為陛下盡忠而更被拘繫常侍張防贓罪明正反搆忠良今客星守羽林其占宫中有姦臣宜急収防送獄以塞天變下詔出詡還假印綬朱穆為冀州刺史宦者趙忠䘮父歸葬安平僭為璵璠玉匣偶人穆聞之下郡案驗吏畏其嚴明遂發墓剖棺陳尸出之而収其家属帝聞大怒徴穆詣廷尉輸作左校太學書生劉陶等數千人詣闕上書訟穆曰伏見施刑徒朱穆䖏公憂國拜州之日志清姦惡誠以常侍貴寵父子兄弟布在州郡競為虎狼噬食小人故穆張理天綱補綴漏目羅取殘祻以塞天意由是内官咸共恚疾謗讟煩興讒隙仍作極其刑謫輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運掌則使餓𨽻富於季孫呼翕則令伊顏化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之乆失故竭心懐憂為上深計臣願黥首繫趾代穆校作帝覽其奏乃赦之桓帝延熹六年尚書朱穆上䟽曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾䖏常伯之任天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃勢怙寵之軰漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海内清淳之士明逹國體者以補其䖏即陛下可為堯舜之君衆僚皆為稷契之臣庶黎甿蒙被聖化矣穆後復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黄門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命两宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應八年以李膺為司𨽻校尉時小黄門張譲弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺率吏卒破柱取朔付獄受辭畢即殺之譲訴寃帝召膺詰之對曰昔仲尼為魯司宼七日而誅少正夘今臣到官已積一旬私懼以稽㽞為愆不意獲速戾之罪自知釁責死不旋踵乞㽞五日剋殄元惡退就鼎鑊始生之願也帝顧譲曰汝弟之罪司𨽻何愆自此諸宦官皆鞠躬屏氣休沐不敢出宫省帝問其故並扣頭泣曰畏李校尉太尉楊秉上奏曰臣案舊典宦官本任給使省闥司昏守夜而今猥受過寵執政操權中常侍侯覽弟參貪殘元惡自取祻滅覽知釁重必有自疑之意臣愚以為覽宜急屏斥送歸本郡桓帝時國政多失内官專寵李膺杜宻等為黨事考逮城門校尉竇武上䟽諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不䘏諌争之患以暢萬端之事是以君臣並熈名奮百世臣幸得遭盛明之世逢文武之化豈敢懐禄逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以來未聞善政梁孫宼鄧雖或誅滅而常侍黄門續為祻虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日彊伏㝷西京放恣王氏佞臣執政終䘮天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢脩造設黨議遂収前司𨽻校尉李膺太僕杜宻御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無效驗臣惟膺等建忠抗節志經王室此誠陛下稷契伊吕之佐而虛為姦臣賊子之所誣枉天下寒心海内失望惟陛下㽞神澄省時見理出以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱㝢荀緄劉祐魏朗劉矩尹勲等皆國之貞士朝之良佐尚書郎張陵嬀皓苑康楊喬邊韶戴恢等文質彬彬明逹國典内外之職羣才並列而陛下委任近習專樹饕餮外典州郡内幹心膂宜以次貶黜案罪糾罰抑奪宦官欺國之封案其無状誣㒺之罪信任忠良平決臧否使邪正毁譽各得其所寳愛天官唯善是授如此咎徴可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶時小黄門趙津南陽大猾張汜等奉事中官乗埶犯法太原太守劉瓆南陽太守成瑨考案其罪雖經赦令而並竟考殺之宦官怨恚有司承㫖遂奏瓆瑨罪當棄市又山陽太守翟超没入中常侍侯覽財産東海相黄浮誅殺下邳令徐宣超浮並坐髠鉗輸作左校太尉陳蕃上䟽曰臣聞齊桓修覇務為内政春秋於魯小惡必書宜先自整勅後以及人今宼賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以踈内患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業況乃産兼天下受之先帝而欲懈怠以自輕心乎誠不愛已不當念先帝得之勤苦耶前梁氏五侯毒徧海内天啟聖意收而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黄門趙津大滑張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁而小人道長熒惑聖聼遂使天威為之發怒如加刑謫已為過甚況乃重罰令伏歐刀乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讐超没侯覽財物浮誅徐宣之罪至蒙刑坐不逢赦恕覽之從横没財已幸宣犯釁過死有餘辜昔丞相申屠嘉負責鄧通洛陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而令左右羣豎惡傷黨𩔖妄相交搆致此刑譴聞臣是言當復號訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大臣五日一朝簡練清髙斥黜佞邪如是天和於上地洽於下休徴符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉强敢以死陳靈帝建寧元年竇太后臨朝竇武白太后曰故事黄門常侍但當給事省内門户主近署財物耳今乃使與政事任重權子弟布列專為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰故事世有宦官但當誅其有罪者豈可盡廢耶時陳蕃為太傅志誅宦官㑹竇武亦有謀蕃自以旣從人望而德於太后必謂其志可申乃先上䟽曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目祻不旋踵鈞此二者臣寧得祻不敢欺天也今京師囂囂道路諠譁言侯覽曹莭公乗昕王甫鄭䬃等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳汎汎東西耽禄畏害陛下前始攝位順天行誅蘇康管覇並伏其辜是時天地清明人鬼歡喜奈何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其祻難量願出臣章宣示左右並令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐光和元年封中常侍吕强為都鄉侯不受因上䟽曰宦官品卑人賤妄授茅土開國承家小人是用隂陽乖剌㒺不由兹采女數千衣食之費日數百金終年積聚豈無憂怨蔡邕對問毁剌貴臣譏呵宦官陛下不宻其言令羣邪咀嚼致邕刑罪今羣臣皆以邕為戒臣知朝廷不復得聞忠言矣段熲武勇冠世勲烈獨昭一身旣斃而妻子逺播天下惆悵功臣失望宜徴邕授任反熲家属則忠貞路開衆怨弭矣帝知其忠而不能用中平元年郎中張鈞上書曰張角所以能興兵作亂萬民所以樂附之者其源皆由十常侍宗親賔客典據州郡辜𣙜財利侵掠百姓百姓寃無所訴故聚為盗賊宜斬十常侍縣頭南郊以謝百姓遣使者布告天下可不須師旅而大㓂自消帝怒鈞曰此真狂子也十常侍固當有一人善者不御史遂誣奏鈞學黄巾道収掠死獄中靈帝時傅燮為䕶軍司馬素疾中官因上䟽曰臣聞天下之祻不由於外皆興於内是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁德寛容多所不忍故閹豎弄權忠臣不進何者夫邪正之人不宜共國亦猶氷炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虛偽夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行䜛佞放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父焉得不盡其情使臣身備鈇鉞之戮陛下少用其言國之福也魏齊王正始八年尚書何晏奏曰善為國者必先治其身治其身者慎其所習所習正則其身正其身正則不令而行所習不正則其身不正其身不正則雖令不從是故為人君者所與游必擇正人所觀覽必察正象旅鄭聲而弗聼逺佞人而弗近然後邪心不生而正道可𢎞也季末闇主不知損益斥逺君子引近小人忠良䟽逺便辟䙝狎亂生近暱譬之社䑕考其昏明所積以然故聖賢諄諄以為至慮舜戒禹曰鄰哉鄰哉言慎所近也周公戒成王曰其朋其朋言慎所與也詩云一人有慶兆民賴之可自今以後御幸式乾殿及游豫後園皆大臣侍從因從容戲宴兼省文書詢謀政事講論經義為萬世法呉烏程侯時何定弄權閹官預政大將軍陸抗上䟽曰臣聞開國承家小人勿用靖譛庸回唐書攸箴是以雅人所以怨刺仲尼所以歎息也春秋已來爰及秦漢傾覆之釁未有不由斯者也小人不明理道所見旣淺雖使竭盡情莭猶不足任況其姦心素篤而憎愛移易哉茍患失之無所不至今委以聦明之任假以專制之威而冀雍熈之聲作肅清之化立不可得也方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資通足用自可随才授職抑黜羣小然後俗化可清庶政無穢也漢主劉聦時羣閹用事殺尚書王琰等太宰劉易大將軍劉敷御史大夫陳元逹金紫光禄大夫王延等詣闕諫曰臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟王化之蟊賊也故文王以多士基周桓靈以羣閹亡漢國之興亡未有不由此也自古明王之世未嘗有宦者與政武元安順豈足為故事乎今王沈等乃䖏常伯之位握生死予奪於中勢傾海内愛憎任之矯弄詔㫖欺誣日月内諂陛下外佞相國威權之重侔於人主矣王公見之駭目卿宰望塵下車銓衡廹之選舉不復以實士以属舉政以賄成多樹姦徒殘毒忠善知王琰等忠臣必盡莭於陛下懼其姦萌發露陷之極刑陛下不垂三察猥加誅戮怨感穹蒼痛入九泉四海悲惋賢愚傷懼沈等皆刀鋸之餘背恩忘義之𩔖豈能如士人君子感恩展效以答乾澤也陛下何故親近之何故貴任之昔齊桓公任易牙而亂孝懐委黄皓而滅此皆覆車於前殷鑒不逺比年地震日蝕雨血火災皆沈等之由願陛下割翦凶醜與政之流引尚書御史朝省萬機相國與公卿五日一入㑹議政事使大臣得極其言忠臣得逞其意則衆災自弭和氣呈祥今遺晉未殄巴蜀未賔石勒潜有跨趙魏之志曹嶷宻有王全齊之心而復以沈等助亂大政陛下心腹四支何䖏無患復誅巫咸戮扁鵲臣恐遂成桓侯膏肓之疾後雖欲療之其如病何請免沈等官付有司定罪唐太宗貞觀十年謂侍臣曰太子師保古難其選成王幼小以周召為保傅左右皆賢足以長仁致化稱為聖主及秦之胡亥始皇所愛趙高作傅教以刑法及其簒也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠交游唯柴紹竇誕然則誕等為人旣非三益及朕居寳位經理天下雖不及堯禹之明庶免乎孫皓高緯之暴以此言之復不由染何也魏徴對曰中人可與為善亦可與為惡然上智之人自無所染陛下受命自天平定宼亂救兆人之命旋致昇平豈紹誕之徒能累聖德但傳云放鄭聲逺佞人近習之間尤宜深慎太宗稱善太宗時閹豎使還妄有所奏發太宗甚怒魏徴進諫曰閹豎雖㣲狎近左右時有言語輕而易信浸潤之譛為患特深以今日之明必無所慮為子孫教不可不杜絶其原太宗笑曰非公朕安得聞此言德宗時蕭復上言曰宦官為監軍恃恩縱横此属但應掌宫掖之事不宜委以兵權國政上不悦憲宗元和五年河南尹房式有不法事東臺監察御史元稹奏攝之擅令停務朝廷以為不可罰俸召還至敷水驛有内侍後至破驛門入擊稹傷靣上復引稹前過貶之李絳崔群言稹無罪白居易言中使陵辱朝士中使不問而稹先貶恐自今中使出外益暴横人無敢言者又稹為御史多所舉奏不避權勢切齒者衆恐自今無人肯為陛下當官執法有大姦猾陛下無從得知上不聼六年出知内侍省事吐突承璀為淮南監軍上問李絳曰朕出承璀何如對曰外人不意陛下遽能如是上曰此家奴耳曏以其驅使之乆故假以恩私若有違犯朕去之輕如一毛耳憲宗時任宦人為館驛使恃恩倨傲宰相李吉甫奏罷之㑹伐蔡復以中人領使左補闕裴潾諫曰凡驛有官專尸之畿内以京兆尹道有觀察使刺史相監臨臺又御史為之使以察過闕猶有不職則宜明科條督責之誰不惕懼若復以宫闈臣領之則内人而及外事職分亂矣夫事不善誡於初體有非不必大方開太平澄本正末宜塞侵官之原出位之漸翰林學士李絳極論宦官權倖侵害政事構毁忠政誷惑聖聦上曰此軰從古而有非朕特置已其何敢誷惑構毁朕豈用其言哉絳對曰陛下不信試取聖意素所美之事假以上㫖為惡問之即為不顧事實好惡便随順聖心而言此豈忠信所為實傾邪也中人本性唯在財利若趨邪行賄者雖事𩔖蹻跖智如豺狼而因便陳啟悉謂賢才若守正不通者雖行同顏閔理等龔黄因事中傷謂為貪冐不知仁義不分邪正此其天性也臣不敢言聖意知其如此遂其喜怒盖以常在左右積於狎習能用傾巧之智搆成疑似之端上聞而怒之因而信之却謂之為公也如此事状備載史言巧拙為真今古同病上曰此等是朕奴豈有信其毁譛如有此事卿等一一奏論朕當䖏置勿希朕㫖宣宗大中八年有敕使過陜右怒餅黒鞭驛吏見血高少逸以聞上責敕使謫配恭陵其後上召翰林學士韋澳屏左右問之曰近日内侍權勢如何對曰陛下威㫁非前朝之比上閉目揺首曰全未全未尚畏之在䇿將安出對曰若與外廷議之恐有太和之變不若就其中擇有才識者與之謀上曰此乃末䇿朕已試之矣自衣緋已下皆感恩纔衣紫則相與為一矣上又與令狐綯謀盡誅宦官綯恐濫及無辜宻奏曰但有罪勿捨有闕勿補自然漸耗至於盡矣僖宗時黄頭將郭琪夜燒營剽城邑帝與田令孜保東城自守羣臣不得見左拾遺孟昭圖請對不召因上䟽極陳君與臣一體相成安則同寧危則共難昔日西幸不告南司故宰相御史中丞京兆尹悉碎于賊唯兩軍中尉以扈乗輿得全今百官之在者率冐重險出百死者也昨昔黄頭亂火照前殿陛下唯與令孜閉城自守不召宰相不謀羣臣欲入不得求對不許且天下者高祖太宗之天下非北司之天下陛下固九州天子非北司之天子北司豈悉忠於南司廷臣豈無用於敕使文宗時宫中災左右廵使不到皆被顯責安有天子播越而宰相無所豫羣司百官棄若路人已事誠不足諫而來者冀可追也䟽入令孜匿不奏昭宗龍紀元年宦者楊復恭常乗肩輿至太極殿是日上與宰相言及四方反者孔緯曰陛下左右有將反者況四方乎上矍然問之緯指復恭曰復恭陛下家奴乃肩輿造前殿多飬壯士為假子使典禁兵或為方鎭非反而何復恭曰子壮士欲以收士心衛國家豈反耶上曰然則何不使姓李而姓楊乎復恭無以對天復元年上悉以軍國事委崔𦙍宦官側目𦙍欲盡除之韓偓曰事禁太甚此軰亦不可全無恐其黨廹切更生他變𦙍不從上獨召偓問之對曰東内之難敕使誰非同惡䖏之當在正旦今已失其時矣上曰當是時卿何不為崔𦙍言之對曰陛下詔書云四家之外餘無所問夫人主所重莫大於信旣下此詔則守之宜堅若復戮一人則人人懼死矣然後來所去已為不少此其所以恟恟不安也今不若擇其尤無良者數人明示其罪寘之於法然後撫諭其餘擇其忠厚者使為之長有善則奬有罪則懲則咸自安矣此曹在公私者以萬數豈可盡誅耶夫帝王之道當以重厚鎮之公正御之至於瑣細機巧此機生則彼機應矣終不能成大功所謂理絲而棼之者也況今朝廷之權散在四方茍能先収此權則事無不可為者矣上深以為然宋仁宗慶厯元年右正言孫沔上奏曰臣竊聞内侍别立主司中官自通禁省有唐四品不過於典制五局兼置於令丞所以分中閫之政不使挾外庭之議如此檢莭尚至侵陵故聖宋以來明制斯在太宗著令式之文真皇述箴規之訓能詔近習各守行藏豈令輕干國柄竊弄天機一言成於毁譽三事出於吹嘘所繫安危尤加約束是以先朝秦翰等數人履行端謹莭義深厚心皆好善意不害人出則揔邊方之寄歸則守内庭之職俾之兼領亦不侵官止守使名終無殊命今聞欲以都知押班之資外干閤門引進之上隳國家之舊典起宦寺之威權況内殿起居則别班外朝集㑹則不預安用異數竊據横行盖因幹當局務之間多與文武官員同事争列名銜自尊位號遂欲改革品秩僥冀寵榮誰啟厲階輙敗經制今邊陲用武賞罰是先遴揀官資尚難激勸豈宜閽寺之人更居侯伯之上竊恐將帥之臣耻居其下䇿勲之際不重此官大紊紀綱事亦非細伏望陛下守祖宗之規式戒左右之權倖則朝廷之福天下之幸也所有先降劄子下閤門重定都知押班立次乞更不施行知諫院張方平上奏曰臣昨聞重定二省都知押班等着在閤門使之上物議雜起深以為非當時有司無人論執茍從其請旣已失之今又聞二省陳乞奏授子孫恩澤於常秩上更加一等此事若行不唯違越祖宗法度隳紊朝廷典章必致陛下有私近習之名大臣有阿親倖之醜内侍有恣横之議諫官御史有隐黙之尤且都知押班地䖏親近宜為朝廷愛惜事體動循軌度孜孜徇公如此僥求何以示外易曰履霜堅氷至言當戒其漸也漢之事臣嘗為陛下言之矣伏望聖㫁深賜察納其都知押班奏䕃恩例伏乞一仍舊制方平又上宦者論曰臣聞三代之制凡在君側皆卿大夫士夏商之世未聞有宦者周官雖有閽人之職止乎掌王宫中門之禁幾出入時啟閉掃門庭而已非所以預政令摠權務者也周道衰㣲官紀紊亂而寺人巷伯稍見乎詩傳至於秦漢列為近職然帷幄親宻之地省闥左右之任宣受詔命陪從輿輦自諸常侍謁者之職多為士人儒者之選自武帝臨御長乆留連盤娯數燕逰乎後庭頗踈隔乎朝士故請奏機事多由宦者而始得政矣遂為兩京䘮敗之基焉東漢自孝安之後繼以女主臨朝隂勢相乗中官遂大專㫁國命掌握衡軸賢才死於鈎黨黎民弊於塗炭三綱錯亂四海飜離害徧生靈毒滿區夏而桓帝乃始比超悺於伊旦靈帝方更指讓忠為翁母書傳所載覆亡之迹未若桓靈之際也唐太宗定制内省官階不得逾四品而其數不及百員但分掌五局及在閤門守禦黄衣廪食而已後明皇纉御崇重宫臣乃至爵為國公門施棨㦸中官之數遂及三千則有銜命四方監軍諸道宣傳宻㫖主當要務詣一郡至一軍誅索貨賕必千萬計揺動天下紊亂朝經内則思藝為林甫之腹心外則璆琳為禄山之耳目以至養成祻變傾覆基祚于後肅宗有輔國之逼而不得全父子孝慈之性代宗為元振所制而不能庇將相股肱之臣德宗自山南䝉塵而還不欲武臣典親兵乃置兩中尉分掌左右神䇿天威等軍而委宦者主之由是禁衛兵權之重悉歸於中官矣蘭錡將臣藩嶽戎帥自其蓄育由之遣置威福之柄非復天子所執元和神武之功猶不書葬昭愍童昏之亂宜難自全士良虎視於太和之朝令孜鴞張於乾符之後逮其季世王室如燬南北朋比中外乖疑内則隂邪惡𩔖秉樞機外則險賊姦人居相位争權交噬刺骨相復故崔昌遐軰連結强帥鄉導全忠本為自援之謀遂成移國之祻是非一朝一夕之故所由來者漸矣或曰三代而下一統承平之治國惟漢唐焉而其顚覆䘮敗之祻同由此迹歴世則不然何歟臣對曰是惟一統承平之治國而後同此祻也何歟曰夫為國者不在外難必有内憂自非聖人孰能戒慎乎無患憂愓於旣安當其一統為大無艱虞之急承平乆治有驕汰之志匪勤惟懈逸欲是㝷幾務宻猷委之近習大臣從容而議存大體而畧細故憸人窺伺其隙乗機㑹而竊事權故弊積於甚㣲慝生乎所忽此漢唐之所以亂也夫魏氏至於江左疆事外擾朝廷多虞雖有暴慢之君荒殘滛辟危窘斃滅勢不得長嬖佞奸孽旋亦夷殛故上權之墜于下也無滋蔓深固之勢抑時有緩急其間不足容乎因循之暇爾臣故曰是惟一統承平之治國乃同此祻也噫弊之來也旣乆矣其亦奈何姑可取戒乎漢桓靈之事勿使預乎刑獄以免其誣染善良之虐乎姑可取戒乎唐明皇之事勿使銜命出使以省其怖動郡縣之威乎姑可取戒乎肅代德之事勿使侵盗軍旅以収其把握天下之柄乎是三者不失則人君之所以據圖御世士大夫之所以輸忠事主烝民之所以宅生託命可以保全而不陷于非道矣三年知諫院歐陽脩上䟽曰臣伏見内官馮承用近因過失為臣寮論奏陛下親發睿斷不私小人聼納羣言逐去左右中外之士莫不相慶然初聞朝議將與外任至今多日未見指揮近日外靣虗傳云却得教坊勾當㽞在京師竊以方今内外臣寮若有罪犯便須勘劾依法行遣今承用本因有過超轉官資只與外任尚為優幸若更遲㽞不遣則使今後伏事陛下左右者恣為過惡無以戒勸承用從來過犯甚衆人皆畏懼不敢明言自其罷却入内已來舊跡漸多彰露内庭之事臣不細知外邊作過頗有實状今若未行逺黜則言事臣寮不免再有論奏勾連獄訟生事轉多其馮承用伏乞早與一外任閒慢差遣便令出京可以戒勵後人外弭物論皇祐元年侍御史何郯上奏曰臣伏聞近日入内内侍省都知職次有闕例當逓遷縁此職任日夕在陛下左右最為親近所宜遴選擇循謹無過之人充選其有罪累降出之流不可復議除授況朝廷近日申明内臣條約曽經落職更不許充入内内侍省都知等職次自再立此條約今方第一次遷改切宜遵行以明命令之信其或自弃定制除授失當竊恐命行之後羣情不允必致人言煩黷聖聼臣所以先事論列者欲冀朝廷採擇凡一爵賞無有過差以厭人心伏望聖慈特賜宣諭中書樞宻院大臣今來逓年入内内侍省都知等職次並令依近日申明條貫施行其過犯曽經落職内臣不在進擬之限所貴遴擇親侍預選必䖍歴代名臣奏議卷二百九十一
