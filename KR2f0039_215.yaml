body:
  text: 歴代名臣奏議卷二百十五明楊士竒等撰慎刑漢文帝元年十二月上曰法者治之正也所以禁暴而率善人也今犯法已論而使亡罪之父母妻子同産坐之及為收孥朕甚不取其議之有司皆曰民不能自治故為法以禁之相坐坐收所以累其心使重犯法所從来逺矣如故便上曰朕聞法正則民慤罪當則民從且夫牧民而導之善者吏也其既不能導又以不正之法罪之是反害於民為暴者也何以禁之朕未見其便其熟計之有司皆曰陛下加大恵徳甚盛非臣等所及也請奉詔書除收孥諸相坐律令十三年齊太倉令淳于意有罪當刑詔獄逮繫長安意無男有五女當行會逮罵其女曰生女不生男緩急非有益也其少女緹縈自傷悲泣迺随其父至長安上書曰妾父為吏齊中皆稱其㢘平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止肉刑三謂黥劓左右趾其咎安在非乃朕徳之薄而教不明與吾甚自愧故夫訓道不純而愚民陷焉詩曰愷弟君子民之父母今人有過教未施而刑已加焉或欲改行為善而道亡繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不徳也豈稱為民父母之意哉其除肉刑有以易之宣帝初即位守廷尉吏路温舒上書言宜尚徳緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有孋姬之難而文公用伯近世趙王不終諸吕作亂而孝文為太宗繇是觀之禍亂之作將以開聖人也故桓文扶㣲興壊尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至惪以承天心崇仁義省刑罰通闗梁一逺近敬賢如大賔愛民如赤子内恕情之所安而施之於海内是以囹圄空虚天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故迺皇天所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有徳輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受之統滌煩文除民疾存亡繼絶以應天意天下幸甚臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆欝於胷譽䛕之聲日滿於耳虚羙薰心實禍蔽塞此乃秦之所以亡天下也方今海内賴陛下恩厚亡金革之危飢寒之患父子夫婦戮力安家然太平之未洽者獄亂之也夫獄者天下之命死者不可生斷者不可屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公名平者多後患故治獄吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬數此聖人所以傷太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾誣詞以示之吏治者利其然則指道以明之上奏畏却則鍜鍊而周内之蓋奏當之成雖臯陶聽之猶以為死有餘辜何則成鍊之者衆文致之罪明也是以獄吏專為深刻殘賊而無極偷為一切不顧國患此世之大賊也故俗語云畫地作獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂政離親塞道莫甚乎治獄之吏此臣所謂一尚存者也臣聞烏鳶之卵不毁而後鳯凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汚國君含垢唯陛下除誹謗以招切言開天下之口廣箴諫之路改亡秦之失遵文武之徳省法制寛刑罰以廢治獄則太平之風可興於世永履和樂與天無極天下幸甚上善其言東漢明帝永平中有人單辭告武陽侯朱浮事者帝大怒賜浮死長水校尉樊儵上奏曰唐堯大聖兆人獲所尚優㳺四凶之獄厭服海内之心使天下咸知然後殛罰浮事雖昭明而未逹人聽宜下廷尉章著其事帝亦悔之章帝時陳寵為尚書是時承永平故事吏政尚嚴切尚書決事率近於重寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫故唐堯著典眚灾肆赦周公作戒勿誤庶獄伯夷之典惟敬五刑以成三徳由此言之聖賢之政以刑罰為首往者斷獄嚴明所以威懲姦慝既平必宜濟之以寛陛下即位率由此義數詔羣僚𢎞崇晏晏晏晏溢和也而有司執事未悉奉承典刑用法猶尚深刻斷獄者急於篣格酷烈之痛篣即榜也執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大絃急者小絃絶故子貢非臧孫之猛法而美鄭僑之仁政臧孫魯大夫行猛政子貢非之曰夫政猶張琴瑟也大絃急則小絃絶矣故曰罰得則姦邪止賞得則下歡恱子之賊心見矣獨不聞子産之相鄭乎推賢舉能抑惡揚善有大畧者不問其短有厚徳者不非小疵家給人足囹圄空虚子産卒國人皆叩心流涕三月不聞竽琴之音其生也見愛死也可悲故曰徳莫大於仁禍莫大於刻今子病而人賀子愈而人相懼曰嗟乎何命之不善子又不死臧孫慙而避位終身不出詩云不剛不柔布政優優方今聖徳充塞假于上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至徳以奉天心帝敬納寵言毎事務於寛厚其後遂詔有司絶鉆鑚諸惨酷之科鉆鐡鋷也其炎反鋷音陟葉反鑚臏刑謂鑚去其臏骨也鑚音作唤反解妖惡之禁除文致之請讞五十餘事定著于令文致謂前人無罪文飾致於法中也是後人俗和平屢有嘉瑞安帝時舊令麥秋得案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄永初元年魯恭為司徒上疏諫曰臣伏見詔書敬若天時若順也憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令言順月令以行事也所以助仁徳順昊天致和氣利黎民者也舊制至立秋乃行薄刑自永元十五年以来改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏徴召農人拘對考驗連滯無已司𨽻典司京師四方是則而近於春月分行諸部託言勞来貧人而無隠惻之實煩擾郡縣㢘考非急逮捕一人罪延十數逮及也辭所連及即追捕之上逆時氣下傷農業案易五月姤用事東觀記曰五月姤卦巽下乾上初六一陰爻生五月之卦也本多作后古字通經曰后以施令誥四方誥理也易姤卦象曰天下有風姤后以施令誥四方乾為天君之象也巽為風號令之象也后君也故以喻人君施令也言君以夏至之日施命令止四方行者所以助㣲隂也易復卦曰先王以至日閉闗商旅不行故夏至宜止行也五月隂氣始生故曰㣲隂行者尚止之況於逮召考掠奪其時哉比年水旱傷稼人飢流宂宂散也今始夏百榖權輿陽氣胎養之時爾雅曰權輿始也萬物皆含胎長養之時自三月以来隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦雨數来五榖不熟鄭𤣥注禮記云申之氣乗之也苦雨白露之𩔖也時物得而傷也又曰仲夏挺重囚益其食挺猶寛也行秋令則草木零落酉之氣乗之也八月宿直昴為獄主殺人傷於疫大陵之氣為害也大陵星名春秋合誠圗曰大陵主死䘮也夫斷薄刑者謂其輕罪已正不欲令乆繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下㑹議恭議奏曰夫隂陽之氣相扶而行發動用事各有時節若不當其時則物随而傷王者雖質文不同而茲道無變四時之政行之若一月令周世所造而所據皆夏之時也謂氣候及星辰昬旦皆夏時也其變者唯正朔服色犧牲徽號器械而已夏以建寅為正服色犧牲徽號器械皆尚黑殷以建丑為正尚白周以建子為正尚赤周以夜半為朔殷以鷄鳴為朔夏以平旦為朔祭天地宗廟曰犧卜得吉曰牲徽號旌旗之名也器械禮樂之噐及以甲兵也故曰殷因於夏禮周因於殷禮所損益可知也易曰潜龍勿用龍以喻陽氣言十一月十二月陽氣潜藏未得用事雖煦嘘萬物養其根荄荄草根也荄音該而猶盛隂在上地凍水氷陽氣否隔閉而成冬故曰履霜堅氷隂始凝也馴致其道至堅氷也馴順也言隂以卑順為道漸至顯著猶自履霜而至堅氷言五月㣲隂始起至十一月堅氷至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之㣲定律著令三正三㣲也前書音義曰言陽氣始施萬物㣲而未著故曰㣲一曰天統謂周十一月建子為正天始施之端也二曰地統謂殷十二月建丑為正地始化之端也三曰人統謂夏十三月建寅為正人始成之端也冀承天心順物性命以致時雍然從變改以来年嵗不熟榖價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧況於衆乎易十一月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事報囚謂奏請報决也後卒施行順帝永和四年中常侍張逵矯詔收縛騰賁於省中帝聞震怒勅宦者李歙急呼騰賁釋之收逵等悉伏誅辭所連染及在位大臣梁商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僭溢刑不淫濫五帝三王所以致康乂也竊聞考中常待張逵等辭語多所牽及大獄一起無辜者衆死囚乆繫纎㣲成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩帝乃納之罪止坐者獻帝時論者多欲復肉刑少府孔融建議曰古者敦龎善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其人故曰上失其道民散乆矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝渉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死𩔖多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷達如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊無所施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政也朝廷善之卒不改焉魏武帝時髙柔為尚書郎轉拜丞相理曹掾令曰夫治定之化以禮為首撥亂之政以刑為先是以舜流四凶族臯陶作士漢祖除秦苛法蕭何定律掾清識平當明于憲典勉恤之哉鼓吹宋金等在合肥亡逃舊法軍征士亡者竟其妻子武帝患猶不息更重其刑金有母妻及二弟皆給官主者奏盡殺之柔啟曰士卒亡軍誠在可疾然竊聞其中時有悔者愚謂乃宜貸其妻子一可使賊中不信二可使誘其還心正如前科固已絶其意望而猥復重之柔恐自今在軍之士見一人亡逃誅將及已亦且相随而走不可復得殺也此重刑非所以止亡乃所以益走耳武帝曰善即止不殺金母弟魏國既建陳羣遷為御史中丞時武帝議復肉刑令曰安得通理君子達於古今者使平斯事乎昔陳鴻臚以為死刑有可加於仁恩者正謂此也御史中丞能申其父之論乎羣對曰臣父紀以為漢除肉刑而增加笞本興仁惻而死者更衆所謂名輕而實重者也名輕則易犯實重則傷民書曰惟敬五刑以成三徳易著劓刖滅趾之法所以輔政助教懲惡息殺也且殺人償死合於古制至於傷人或殘毁其體而裁翦毛髪非其理也若用古刑使淫者下蠶室盜者刖其足則永無淫放穿踰之姦矣夫三千之屬雖未可悉復若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可以刑殺如此則所刑之與所生足以相貿矣今以笞死之法易不殺之刑是重人支體而輕人軀命也和洽為侍中後有白毛玠謗毁武帝武帝見近臣怒甚洽陳玠素行有本求案實其事罷朝武帝令曰今言事者白玠不但謗吾也乃復為崔琰觖望此損君臣恩義妄為死友怨嘆殆不可忍也昔蕭曹與髙祖並起㣲賤致功立勲髙祖毎在屈笮二相恭順臣道益彰所以祚及後世也和侍中比求實之所以不聽欲重恭之耳洽對曰如言事者言玠罪過深重非天地所覆載臣非敢曲理玠以枉大倫也以玠出羣吏之中特見㧞擢顯在首職歴年荷寵剛直忠公為衆所憚不宜有此然人情難保要宜考覈兩驗其實今聖恩垂含垢之仁不忍致之于理更使曲直之分不明疑自近始武帝曰所以不考欲兩全玠及言事者耳洽對曰玠信有謗主之言當肆之市朝若玠無此言事者加誣大臣以誤主聽二者不加檢覈臣竊不安武帝曰方有軍事安可受人言便考之邪狐射姑刺陽處父於朝此為君之誠也文帝為五官將召盧毓署門下賊曹崔琰舉為冀州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日未與夫相見大理奏棄市毓駮之曰夫女子之情以接見而恩生成婦而義重故詩云未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸𦵏女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟則若同牢合卺之後罪何所加且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寧失不經恐過重也茍以白等皆受禮聘已入門庭刑之為可殺之為重武帝曰毓執之是也明帝初公孫淵兄晃為叔父恭任内侍先淵未反數陳其變及淵謀逆帝不忍市斬欲就獄殺之廷尉髙柔上疏曰書稱用罪伐厥死用徳彰厥善此王制之明典也晃及妻子叛逆之𩔖誠應梟縣勿使遺育而臣竊聞晃先數自歸且陳淵禍萌雖為凶族原心可恕夫仲尼亮司馬牛之憂祁奚明叔向之過在昔之美義也臣以為晃信有言宜貸其死茍自無言便當市斬今進不赦其命退不彰其罪閉著囹圄使自引分四方觀國或疑此舉也帝不聽太和中太子太傅鍾繇上疏曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖徳固天所縱墳典之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下逺追二祖遺意惜斬趾可以禁惡恨入死之無辜使明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭于苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宫刑者自如孝文易以髠笞能有姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復肉刑嵗生三千人子貢問能濟民不謂仁乎孔子曰何事於仁必也聖乎堯舜其猶病諸又曰仁逺乎哉我欲仁斯仁至矣若誠行之斯民永濟書奏詔曰太傅學優才髙留心政事又於刑理深逺此大事公卿羣察善共平議司徒王朗議以為繇欲輕減大辟之條以增益刖刑之數此即起偃為豎化屍為人矣然臣之愚猶有未合㣲異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減施行已乆不待逺假斧鑿於彼肉刑然後有罪次也前世仁者不忍肉刑之惨酷是以廢而不用不用已来歴年數百今復行之恐所減之文未彰於萬民之目而肉刑之問已宣於冦讎之耳非所以来逺人也今可按繇所欲輕之死罪使減死之髠刖嫌其輕者可倍其居作之嵗數内有以生易死不訾之恩外無以刖易􅎂駭耳之聲議者百餘人與朗同者多帝以吳蜀未平旦寢吳大帝時中書吕壹典校文書多所糾舉步隲上疏曰伏聞諸典校摘抉細㣲吹毛求疵重案深誣趨欲陷人以成威福無罪無辜横受大刑是以使民跼天蹐地誰不戰慄昔之獄官惟賢是任故臯陶作士吕侯贖刑張于廷尉民無寃枉休泰之祚實由此興今之小臣動與古異獄以賄成輕忽人命歸咎于上為國速怨夫一人吁嗟王道為虧甚可仇疾明徳慎罰哲人惟刑書傳所美自今蔽獄都下則宜諮顧雍武昌則陸遜潘濬平心專意務在得情隲黨神明受罪何恨烏程侯建衡二年陸抗加拜都䕶聞武昌左都督薛瑩徴下獄抗上疏曰夫俊乂者國家之良寳社稷之貴資庶政所以倫敘四門所以穆清也故大司農樓𤣥散騎中常侍王蕃少府李勗皆當世秀頴一時顯器既䝉初寵從容列位而並旋受誅殛或圯族替祀或投棄荒裔蓋周禮有赦賢之辟春秋有宥善之義書曰與其殺不辜寧失不經而蕃等罪名未定大辟以加心經忠義身被極刑豈不痛哉且已死之刑固無所識至乃焚爍流漂棄之水濵懼非先王之正典或甫侯之所戒也是以百姓哀聳士民同感蕃勗永已悔亦靡及誠望陛下赦召𤣥出而頃聞薛瑩卒見逮録瑩父綜納言先帝傅弼文皇及瑩承基内厲名行今之所坐罪在可宥臣懼有司未詳其事如復誅戮益失民望乞垂天恩原赦瑩罪哀矜庶獄清澄刑網則天下幸甚西晉愍帝建興中丞相府斬督運令史淳于伯而血逆流丞相司直劉隗奏曰古之為獄必察五聽三槐九棘以求民情雖明庶政不敢折獄死者不可復生刑者不可復續是以明王哀矜用刑曹參去齊以市獄為寄自頃蒸荒殺戮無度罪同斷異刑罰失宜謹按行督運令史淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復下流四尺五寸百姓諠譁士女縱觀咸曰其寃伯息忠訴辭稱枉云伯督運訖去二月事畢代還無有稽乏受賕使役罪不及死軍是戍軍非為征軍以乏軍興論於理為枉四年之中供給運漕凡諸徴發租調百役皆有稽停而不以軍興論至於伯也何獨明之捶楚之下無求不得囚人畏痛飾辭應之理曹國之典刑而使忠等稱寃明時謹按從事中郎周筵法曹叅軍劉𦙍屬李匡幸荷殊寵並登列曹當思敦奉政道詳法慎役使兆庶無枉人不稱訴而令伯枉同周青寃魂哭於幽都訴靈恨於黄泉嗟歎甚於杞梁血妖過於崩城故有隕霜之人夜哭之鬼伯有晝見彭生為豕刑殺失中妖眚並見以古況今其揆一也皆由筵等不勝其任請皆免官於是右將軍王導等上疏引咎請解職帝曰政刑失中皆吾闇塞所由尋示愧懼思聞忠告以補其闕而引過求退豈所望也宋孝武帝時丞相南郡王義宣車騎將軍臧質反義宣司馬竺超民臧質長史陸展兄弟並應從誅尚書令何尚之上言曰刑罰得失治亂所由聖賢留心不可不慎竺超民為賊既遁走一夫可禽若反覆昧利即當取之非唯免愆亦可要不義之賞而超民曽無此意微足觀過知仁且為官保全城府謹守庫藏端坐待縛今戮及兄弟與向始末無論者復成何異陸展盡質復灼然便同之巨逆於事為重臣豫䝉顧待自殊凡𨽻茍有所懐不敢自黙超民坐者由此得原齊髙帝建元二年王僧䖍授左光禄大夫兼丹陽尹時郡縣獄相承有上湯殺囚僧䖍上疏言之曰湯本以救疾而實行冤暴或以肆忿若罪必入重自有正刑若去惡宜疾則應先啟豈有死生大命而潜制下邑愚謂治下囚病必先刺郡求職司與醫對共診驗逺縣家人省視然後處理可使死者不恨生者無怨上納其言後魏文成帝時斷獄多濫給事中源賀上書曰案律謀反之家其子孫雖養他族追還就戮所以絶罪人之𩔖彰大逆之辜其為刼賊應誅者兄弟子姪在逺道隔關津皆不坐竊惟先朝制律之意以不同謀非絶𩔖之罪故特垂不死之詔若年十三已下家人首惡計謀所不及愚以為可原其命沒入縣官帝納之賀為征南將軍冀州刺史復上書曰臣聞人之所寳莫寳於生全徳之厚者莫厚於宥死然犯死之罪難以盡恕權其輕重有可矜恤今勍冦逰魂於北狡賊負險於南其在疆埸猶須防戍臣愚以為自非大逆赤手殺人之罪其坐贓及盜與過誤之愆應入死者皆可原命謫守邉境是則已斷之體更受全生之恩徭役之家漸䝉休息之恵刑措之化庶幾在兹虞書曰流宥五刑此其義也臣受恩深重無以仰答將違闕庭豫増係戀敢上瞽言唯加裁察帝從其言已後入死者皆恕死徙邉久之帝乃謂羣臣曰源賀勸朕宥諸死刑徙充北畨諸戍自爾至今一嵗所活殊為不少生濟之理既多邉戍之兵有益卿等事朕致何善意也茍人人如賀朕治天下復何憂哉顧憶誠言利實廣矣羣臣咸曰非忠臣不能進此計非聖明不能納此言孝文帝太和初懐州民伊祁荀初三十餘人謀反將殺刺史文明太后欲盡誅一城之民雍州刺史張白澤諫曰臣聞上天愛物之生明王重民之命故殺一人而取天下仁者不為且周書父子兄弟罪不相及今羣凶肆虐轘裂誅盡合城無辜奈何極辟不誣十室而況一州或有忠焉或有仁者若淫刑濫及殺忠與仁斯乃西伯所以歎息於九侯孔子所以回輪於河上伏惟聖徳昭明殷鑒水鏡前禮止迅烈之怒抑雷霆之威則溥天知幸矣昔厲防民口卒滅宗姬文聽輿頌終摧彊楚願不以人廢言留神省察太后從之孝明帝時靈太后臨朝任城王澄奏曰臣聞賞必以道用防淫人之姦罰不濫及以戒良士之困刑者侀也毎垂三宥秉律執請不得已而用之是故小大之獄察之以情一人吁嗟或虧王道刑罰得失乃興廢之所由也竊聞司州牧髙陽王臣雍拷殺奉朝請韓元昭前門下録事姚敬賢雖因公事理實未盡何者太平之世草不横伐行葦之感事驗隆周若昭等狀彰死罪以定應刑於都市與衆棄之如其疑似不分情理未究不宣以三清九流之官杖下便死輕絶民命傷理敗法徃年司州於大市鞭殺五人及檢贓狀全無寸尺今復酷害一至於此朝野云云咸懐驚愕若殺生在下虐專於臣人君之權安所復用自開古以来明明之世未聞斯比也武王曰吾不以一人之命而易天下蓋重民命也請以見事付廷尉推究驗其為刼之狀察其栲殺之理使是非分明幽魂獲雪詔從之宣武帝永平元年秋七月詔尚書檢枷杖大小違制之由科其罪失尚書令髙肇尚書僕射清河王懌尚書邢巒尚書李平尚書江陽王繼等奏曰臣等聞王者繼天子物為民父母導之以徳化齊之以刑法小大必以情哀矜而勿喜務於三訊五聽不以木石定獄伏惟陛下子愛蒼生恩侔天地疏網改祝仁過商后以枷杖之非度愍民命之或傷爰降慈㫖廣垂昭恤雖有虞慎獄之深漢文惻隠之至亦未可共日而言矣謹案獄官令諸察獄先備五聽之理盡求情之意又驗諸證信事多疑似猶不首實者然後加以拷掠諸犯年刑已上枷鎖流徙已上增以杻械迭用不俱非大逆外叛之罪皆不大枷髙杻重械又無用石之文而法官州郡因縁增加遂為恒法進乖五聽退違令文誠宜案劾依㫖科處但踵行已久計不推坐檢杖之小大鞭之長短令有定式但枷之輕重先無成制臣等參量造大枷長一丈三尺喉下長一丈通頰木各方五寸以擬大逆外叛杻械以掌流刑已上諸臺寺州郡大枷請悉焚之枷本掌囚非拷訊所用從今斷獄皆依令盡聽訊之理量人彊弱加之拷掠不聽非法拷人兼以拷石自是枷杖之制頗有定準時將刑元愉妾李氏羣官無敢言者勅中書令崔光為詔光逡廵不作奏曰伏聞當刑元愉妾李加之屠割妖惑扇亂誠合此罪但外人竊云李今懐姙例待分産且臣尋諸舊典兼推近事戮至刳胎謂之虐刑桀紂之主乃行斯事君舉必書義無隠昧酷而乖法何以示後陛下春秋已長未有儲體皇子襁褓至有天失臣之愚識知無不言乞停李獄以俟育孕宣武納之孝荘帝時御史中尉兼給事黄門侍郎髙道穆上疏曰臣聞舜命臯陶姦宄是託禹泣辜人堯必為念所以舉直錯枉事切曩賢明徳慎罰議存先典髙祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相㳂襲者矣臣以無庸忝當今任所思報效未忘寢興但識謝知今業慙稽古未能進一言以利國說一䇿以興邦索米長安豈不知愧至於職司其憂猶望僶俛竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令為政容有愛憎姦猾之徒恒思報惡多有妄造無名共相誣謗御史一經檢究恥於不成杖木之下以虚為實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指冀以清肅若仍踵前失或傷善人則尸禄之責無所逃罪所以夙夜為憂思有悛革如臣鄙見請依太和故事還置司直十人名𨽻廷尉秩以五品選歴官有稱心平性正者為之御史若出糾劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居别館御史檢了移付司直覆問事訖與御史俱還中尉彈聞廷尉科按一如舊式庶使獄成罪定無復稽寛為惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聽以所檢迭相糾發如二使阿曲有不盡理聽罪家詣門下通訴别加按檢如此則肺石之傍怨訟可息叢棘之下受罪吞聲者矣詔從之唐太宗即位詔長孫無忌房𤣥齡等復定舊令議絞刑之屬五十皆免死而斷右趾既而又哀其斷毁支體謂侍臣曰肉刑前代除之久矣今復斷人趾吾不忍也王珪蕭瑀陳叔達對曰受刑者當死而獲生豈但去一趾去趾所以使見者知懼今以死刑為斷趾蓋寛之也帝曰公等更思之其後蜀王法曹叅軍裴𢎞獻駮律令四十餘事乃詔房𤣥齡與𢎞獻等重加刪定𤣥齡等以謂古者五刑刖居其一及肉刑既廢今以笞杖徒流死為五刑而又刖足是六刑也於是除斷趾法為加役流三千里居作貞觀元年太宗謂侍臣曰死者不可再生用法須務存寛簡古人云鬻棺者欲嵗之疫非疾於人利於棺售故耳今法司覈理一獄必求深劾欲成其考課今作何法得使平允諫議大夫王珪曰但選公良直善人斷獄允當者增秩賜金即奸偽自息詔從之河内人李好徳坐妖言下獄大理丞張藴古以為好徳病狂瞀法不當坐太宗許将寛宥藴古密報其㫖仍引與博戯治書侍御史權萬紀劾奏之太宗大怒令斬於東市既而悔之謂房𤣥齡曰公等食君之禄須憂人之憂事無巨細咸當留意今不問則不言見事都不諫争何所輔弼如藴古身為法官與囚博戲漏洩朕言此亦罪狀甚重若據常律未至極刑朕當時盛怒即令處置公等竟無一言所司又不覆奏遂即決之豈是道理因詔曰凡有死刑雖令即決皆須五覆五奏自藴古始也久之復謂羣臣曰死者不可復生昔王世充殺鄭頲猶能悔近有府史取賕不多朕殺之是思之不審也決囚雖云五覆一日即了都未暇思審五奏何益縱有追悔又無所及自今在京諸司奏決死囚宜三日中五覆奏決日尚食勿進酒肉教坊太常輟教習天下諸州三覆奏其日亦蔬食務合禮減膳撤樂之意又手詔勅曰比来有司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有寃自今門下省復有據法合死而情在可矜者宜録狀上奏羣臣皆賀曰陛下欽恤刑獄非前代可及也太宗時劉徳威為大理卿太宗問曰比刑網寖密咎安在徳威曰在君不在臣下之寛猛視主之好律失入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深文為自營計非有教使然也帝然其言太宗論隋日禁囚魏徴對曰臣昔在隋時聞有盜發煬帝令士澄捕之但有疑即苦加拷掠枉承賊者二千餘人並令同日斬決大理丞張元濟怪之試尋其状乃有六七人盜發之日先禁他所纔被放出亦遭推劾不勝苦痛虚以自誣元濟因此更事尋究二千人内唯有九人不明又按驗九人四人非賊有司不敢執奏遂並殺之太宗曰非唯煬帝無道之君臣下亦不盡忠須相匡諫不避誅戮豈得茍行諂佞求恱譽乎君臣如此何能不敗賴公等共相輔弼遂得囹圄空虚欲公等善始令終常如今日戴州刺史賈崇以所部有犯十惡者被御史劾奏太宗謂侍臣曰昔陶唐大聖栁下恵大賢其子丹朱甚不肖其弟盜跖為巨惡夫以聖人之訓父子兄弟之親尚不能使陶染變革去惡從善今刺史化被下人咸歸善道豈可得也若令縁此皆被貶責或恐逓相掩蔽罪刑斯失今後諸州有犯十惡者刺史不須坐罪明加糾訪科罪庶使刑罰適中肅清奸惡乃謂大理卿孫伏伽曰夫作甲者欲其堅恐人之傷作箭者欲其銳恐人不傷何則各有司存利在稱職故也朕問法官刑罰輕重每稱法網寛於徃代仍恐主獄之司利在殺人危人自達以釣聲價今之所憂正在此耳深宜禁止務在寛平伏伽對曰此陛下之至仁也安敢不從太宗又嘗曰古者斷獄必訊於三槐九棘之官今三公九卿即其職也自令以後大辟罪皆令中書門下四品以上及尚書九卿議之如此庶免冤濫羣臣皆稱善由是至四年斷死刑天下二十九人幾致刑措時有告刑部尚書張亮謀反帝命百官議其獄皆言亮反當誅獨将作少監李道裕上言亮反形未具不當誅帝不聽斬之後悔之謂曰往者李道裕議張亮獄朕不從而殺之至今悔恨乃命為刑部侍郎太宗以英武定天下然其天資仁恕初即位有勸以威刑肅天下者魏徴以為不可因為上言王政本於仁恩所以愛民厚俗之意太宗欣然納之遂以寛仁治天下而於刑法尤慎太宗有一駿馬特愛之恒於宫中養飼無病而暴死帝怒養馬宫人将殺之皇后諫曰昔齊景公以馬死殺人晏子請數其罪云爾養馬而死爾罪一也使公以馬殺人百姓聞之必怨吾君爾罪二也諸侯聞之必輕吾國爾罪三也公乃釋罪陛下嘗讀書見此事豈忘之耶太宗意乃解又謂房𤣥齡曰皇后庶事相啟沃極有利益爾池陽令崔文康坐事櫟陽尉魏禮臣劾治獄成御史言其枉禮臣訴御史阿黨乞下有司雜訊不如所言請死鞠報禮臣不實太宗詔如請諫議大夫𢎞文館學士朱子奢諫曰在律上書不實有定罪今抵以死死者不可復生雖欲自新弗可得且天下惟知上書獲罪欲自言者皆懼而不敢申矣詔可髙宗時左威衛大将軍權善才右監門中郎将范懐義坐誤斧昭陵栢罪當死髙宗詔誅之大理丞狄仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜髙廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一抔土何以加其法於是罪止棄市陛下之法在象魏固有差等犯不至死而致之死何哉今誤伐一栢殺二臣後世謂陛下為何如主帝意解遂免死廣州都督蕭齡之受賕當死詔羣臣議請論如法詔戮于朝堂御史大夫唐臨建言羣臣不知天子所以議之之意在律有八王族戮于隠議親也刑不上大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異於他囚故議之有司又令入死非堯舜所以用刑者不可為後世法帝然之齡之齊髙帝五世孫由是免死武后時后稱制懼天下不服欲制以威乃修後周告密之法詔官司受訊有言密事者馳驛奏之自徐敬業越王貞瑯琊王沖等起兵討亂武氏益恐乃引酷吏周興来俊臣輩典大獄與侯思止王𢎞義郭𢎞霸李敬仁康暐衛遂忠等集告事數百人共為羅織構陷無辜自唐之宗室與朝廷之士日被告捕不可勝數天下之人為之仄足如狄仁傑魏元忠等皆幾不免左臺御史周矩上疏曰比姦憸告許習以為常推劾之吏以深劾為功鑿空争能相矜以虐泥耳囊頭摺脅籖爪縣髪燻耳卧隣穢溺刻害支體糜爛獄中號曰獄持閉絶食飲晝夜使不得眠號曰宿囚殘賊威暴取快目前被誣者茍求得死何所不至為國者以仁為宗以刑為助周用仁而昌秦用刑而亡願陛下緩刑天下幸甚武后不納崔仁師請不改反逆縁坐刑名疏曰自昔羲農以降爰及唐虞或設言而人不犯或畫像而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其叔代亂獄滋煩周之季年不勝其弊烈火原於子産峭澗起於安于韓季申商争持急刻叅夷相坐始於此也秦用其法遂至土崩漢髙之務寛大未為盡善文帝之存仁厚仍多涼徳遂使新垣族滅信越葅醢見嗤良史謂之過刑晉魏至隋雖有損益凝脂猶密秋荼尚煩皇上爰發至仁念兹刑憲酌先王之令典採往昔之嘉猷革弊蠲苛可大可久仍降綸綍頒之九區故得斷獄數簡手足有措刑清化洽未有不安忽以暴秦酷法為隆周中典乖惻隠之情反惟行之令進退恭詳未見其可且父子天屬昆季同氣誅其父子足累其心此而不顧何愛兄弟既欲改法請更審量守右衛胄曹叅軍陳子昻上奏曰臣聞昔者聖人理天下者美在太平太平之美者在於刑措臣伏見陛下務太平之理而未美太平之功賤臣頑微竊惑下列臣前䝉天恩召見恩制賜臣曰既遇非常之主何不進非常之䇿臣草木微品天恩降休伏刻肌骨不敢忘捨今陛下創三皇之業務三皇之理大統已集神化光明雖伏羲神農昔有天下誠未足比臣敢不竭節以効愚忠臣聞自古聖王謂之大聖者皆云尚徳崇禮貴仁賤刑刑措不用謂之聖徳不稱嚴刑猛制用獄為理者也故周有天下八百餘嵗而唯頌成康漢有天下四百餘嵗而獨稱文景皆由幾致刑措者也何者刑者政之末節非太平之資臣竊考之於天天貴生成驗之於人人愛生育旁稽於聖聖務勝殘皆不云以刑為徳者然則聖王養天下者固當上務順天下務順人不天不人不可謂理故曰唯天為大唯堯則之又曰天地萬物父母唯人萬物之靈亶聰朙作元后元后作人父母然則為人父母固當貴於徳養不可務於刑殺臣伏惟陛下聖徳至大矣應天受命有三皇之功順人正位有三皇之業拜圗廵洛有三皇之符尊名顯號有三皇之冊明堂神構萬象寅威風雨順時百榖昌熟可謂足為萬代之規也今天下百姓抱孫弄子鼓腹以望太平之政矣陛下為天地父母固將務徳以順養之登于太和以協皇極今陛下之政雖盡善矣然太平之理猶屈於獄官何以言之太平之朝務上下樂化不宜亂臣賊子日犯天誅比者大獄增多逆徒滋廣愚臣頑昧切謂皆實乃去月十五日陛下特察詔囚李珎等無罪明魏真宰有功又召見髙正臣又重推元萬頃百寮慶恱皆荷聖明臣乃知亦有無罪之人挂於疎網者陛下務在寛典獄官務在急刑以傷陛下之仁以誣太平之政臣竊私恨之賴陛下獨決天斷寛蕩羣刑死囚張楚金郭正一王彭祖王令基等以凶惡之罪特䝉全活朽骨更肉萬死再生天地神祗實用同慶何以知之臣伏見去年八月已来天苦霖雨自陛下赦李珎等罪天朗氣清又九月十八日明堂享㑹慶雲抱日五彩紛郁龍章竟天萬品咸觀宇宙同慶又其月廿一日恩勅免楚金等死初有風雨變為景雲司刑官屬皆所共見臣聞隂慘者刑也陽舒者徳也慶雲者佳氣也臣伏考之洪範驗之六經聖人法天天亦助聖休咎之應必不虚来陛下法天垂仁天助陛下仁化獄吏急法則慘而隂雨陛下赦罪則舒而陽和君臣歡娛則喜而見慶雲天意如此陛下豈可不承順之夫刑者怒也不可以承嘉氣今又隂雨臣恐過在獄官況陛下明堂之理本以崇徳配天之業不以務刑今垂拱法宫且猶議殺布政衢室而未措刑賤臣頑愚尚疑未可況巍巍大聖光宅天下哉今者繫獄囚徒多極法者道路之議或是或非陛下何不悉見召之自詰其罪罪真實者顯示明刑罪有濫者嚴誅獄吏使天下咸服人知政刑以清太平之階用登仁夀之域豈非至徳克明哉昔鄧太后以天降旱親決洛陽囚徒良史書之而以為徳況陛下大聖億萬超於鄧后者矣夫獄吏不可信多弄國權自古敗之聖王所誡陛下萬代之業千載之名故不可使竹帛書之有虧於此也伏願熟察以美太平之風賤臣不勝愚懇忠憤之至輙投諫匭昧死上聞子昻為守麟臺正字又上諫刑書曰臣本蜀之匹夫宦不望達陛下過意擢臣草莽之下昇在麟臺之閣光寵自天卓若日月㣲臣固陋将何克負然臣聞忠臣事君有死無二懐佞不諫罪莫大焉況在明聖之朝不諱之日方復鉗口下列俛仰偷榮非臣之始願也不勝愚惑輙奏狂昧之說伏惟陛下少加察焉臣聞古之御天下者其政有三王者化之用仁義也霸者威之任權智也强國脅之務刑罰也是以化之不足然後威之威之不變然後刑之故至於刑則非王者之所貴矣況欲光宅天下追功上皇専任刑殺以為威斷可謂䇿之失者也伏觀陛下聖徳聰明逰心太古將制静宇宙保乂黎人發號施令出於誠慊天下蒼生莫不想望聖風冀見神化道徳為政將特待於陛下矣且臣聞之聖人出治必有驅除蓋天人之符應休命也日者東南㣲孽敢謀亂常陛下順天行誅罪惡咸伏豈非天意欲彰陛下神武之功哉而執事者不察天心以為人意惡其首亂唱禍法令誅屠將息姦源窮其黨與遂使陛下大開詔獄重設嚴刑冀以懲創勸于天下逆黨親屬及其交逰有跡渉嫌疑亂相逮引莫不窮捕考劾枝葉蟠挐大或流血小禦魑魅至有姦人熒惑乗險相誣糺告疑似冀圗爵賞叫于闕下者日有數矣于時朝廷惶惶莫有自固海内傾聽以相驚恐賴陛下仁慈憫斯危懼賜以恩詔許其大功已上一切勿論時人獲泰謂生再造愚臣竊亦欣然賀陛下聖明得天下之機也不謂議者異見又執前圗比者刑獄紛紛復起陛下不深思天意以順休期尚以督察為理威刑為務使前者之詔不信於人愚臣昧焉竊恐非三皇五帝伐罪弔人之意也臣竊觀當今天下百姓思安久矣曩屬北人侵塞西戎寇邉兵革相圗向歴十載闗河自北轉輸幽燕秦蜀之西馳騖湟海當時天下疲極矣重以大兵之後屢遭凶年流離飢餓死䘮略半幸願陛下以至聖之徳撫寧兆人邉境獲安中國無事隂陽大順年榖累登天下父子始得相養矣故揚州構禍殆有五旬而海内晏然纎塵不動豈非天下蒸庶厭亂哉臣以此卜之知百姓思安久矣今陛下不務𤣥黙以救疲人而專任威刑以失其望欲察察為政肅理寰區愚臣暗昧竊有大惑且臣聞刑者政之末節也先王以禁暴整亂不得已而用之今天下幸安萬物思泰陛下乃以末節之法察理平人臣愚以為非適變随時之義也頃年已来伏見諸方告密囚累百千輩大抵所告皆以揚州為名及其窮竟百無一實陛下仁恕又屈法容之傍訴他事亦為推劾遂使姦惡之黨快意相讎睚眦之嫌即稱有宻一人被訟百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下喁喁莫知寧所臣聞自古聖人不有外患必有内憂物理之然也臣不敢以逺古言之請借隋而說臣聞長老言隋之末代天下猶平煬帝不龔窮毒威武厭居皇極自緫元戎以百萬之師觀兵遼海天下始騷然矣遂使楊𤣥感挟不臣之勢有犬盜之心欲因人謀以竊皇業乃稱兵中夏將據洛陽哮闞之勢傾宇宙矣然亂未踰月而首足異處何者天下之弊未有土崩蒸人之心猶望樂業煬帝不寤暗忽人機自以為元惡既誅天下無巨猾也皇極之任可以刑罰理之遂使兵部尚書樊子蓋專行屠戮大窮黨與海内豪士無不罹殃遂至殺人如麻流血成澤天下靡然始思為亂矣於是蕭銑朱粲起於荆南李密竇建徳亂於河北四海雲揺遂並起而隋族亡矣豈不哀哉長老至今談之委曲如是臣竊以此上觀三代夏殷周興亡下及秦漢魏晉理亂莫不皆以毒刑致敗壊也夫大獄一起不能無濫何者刀筆之吏罕識大方斷獄能者名在急劾文深網宻則共稱至公爰及人主亦謂其奉法於是利在殺人罕能平恕故獄吏相誡以殺為詞非憎於人也而利在已故上希人主之㫖以圖榮身之利徇利既多則不能無濫濫及良善則淫刑逞矣夫人情莫不自愛其身陛下以此察之豈能無濫也寃人吁嗟感傷和氣和氣悖亂羣生厲疫水旱随之則有凶年人既失業則禍亂之心怵然而生矣頃来亢陽愆候雲而不雨農夫釋耒瞻望嗷嗷豈不由陛下之有聖徳而不降澤於天下人也儻旱遂過春廢於時種今年稼穡必有損矣陛下何不敬承天意以澤恤人臣聞古者明王重慎刑罰蓋懼此也書不云乎與其殺不辜寧失不經陛下柰何以堂堂之聖猶務强霸之威哉愚臣竊為陛下不取也且愚人安則樂生危則思變故事有招禍而法有起姦儻大獄未休支黨日廣天下疑惑相恐無辜人情之變不可不察昔漢武帝時巫蠱獄起江充行詐惑亂京師致使太子奔走兵交宫闕無辜被害者以千萬數當此之時劉氏宗廟幾傾覆矣賴武帝得壺闗三老上書廓然感悟夷江充三族餘獄不論天下以安耳臣每讀漢書至此未嘗不為戾太子流涕也古人云前事之不忘後事之師伏願陛下念之今臣不避湯鑊之罪以螻蟻之命輕觸宸嚴臣非不惡死而貪生也誠恐負陛下恩愚臣不敢以微命蔽塞聦明亦非敢欲陛下頓息刑罰望在恤刑耳乞與三事大夫圖其可否徃者不可諫来者猶可追無以臣微而忽其奏天下幸甚鳳閣舎人韋嗣立上疏曰臣竊嘗聞之在堯舜之日畫其衣冠當文景之時幾致刑措歴兹千載以為美談臣伏惟陛下睿哲飲明窮神知化自軒昊以降莫之與京獨有往之論法或未盡善皆由主司姦兇惑亂視聽尋而陛下聖察具詳之矣然竟未能明其本源察其前事令天下萬姓識陛下本心尚使四海多銜寃之人九泉有抱痛之鬼臣誠愚暗不識大綱請為陛下始末而言其事楊豫之後刑獄漸興用法之伍務於窮竟連坐相牽數年不絶遂使巨姦大猾伺隙乗閒内包豺狼之心外示鷹鸇之跡隂圗潜結共相影㑹搆似是之言成不赦之罪皆深為巧誣恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路籍籍雖知非辜而鍜鍊已成辨占皆合縱臯陶為理于公定刑則謂汚棺毁柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭状便已周密皆謂勘鞫得情是其實犯雖欲寛捨其如法何於是小乃身誅大則族滅相縁共坐者不可勝言此豈宿構讎嫌將申報復皆圗茍成公効自求官賞當時稱傳謂為羅織其中䧟刑得罪者雖有敏識通才被告言者便遭枉抑心徒痛其寃酷口莫能以自明或受誅夷或遭殛竄並甘心引分赴之如歸故知弄法侮文傷人實甚賴陛下特廻聖察昭然詳究周興丘勣之𩔖𢎞義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再覩陽和且如仁傑元忠俱罹枉陷被勘鞫之際亦皆自誣向非陛下至明垂以省察則葅醢之戮已及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟幹稱此二人何乃前非而後是哉誠由枉陷與甄明耳臣但恐往之得罪者多並皆此流則向時之冤其數甚衆昔殺一孝婦尚或降災而濫者蓋多寧無怨氣怨氣上達則水旱所興欲望嵗登不可得也陛下儻𢎞天地之大徳施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱已来大辟罪已下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵縁累之徒普霑恩造如此則天下皆知比所陷罪元非陛下之意咸是虐吏之辜幽明歡欣則感通和氣和氣下降則風雨以時風雨以時則五榖豐稔嵗既稔矣人亦安矣太平之美亦何逺哉伏願陛下深察萬年主簿徐堅上言曰書有五聽令有三覆慮失情也比犯大逆詔使者勘當得實輙決人命至重萬有一不實欲訴無由以就赤族豈不痛哉此不足撿下之姦亂適長使人威福耳臣請如令覆奏則死者無恨又古者罰不逮嗣故郤芮亂國而缺升諸朝嵇康䝉戮而紹死于難則於他親不復致疑今選部廣責逆人親屬至無服者尚數十條且詔書與逆同堂親不任京畿緦麻親不得侍衛臣請如詔書外一切不禁以申曠蕩時有告勝州都督王安仁謀反太后敕殿中侍御史王𢎞義按其事𢎞義素酷無行安仁不服𢎞義即枷上刎其首朝士人人自危每朝輙與家人訣曰未知復相見否御史中丞李嗣真乃上疏曰古者獄成公卿參聽王必三宥然後行刑比日獄官單車奉使臨時專決不復聞奏倘有寃濫何由可知況以九品之官專命推覆操殺生之柄竊人主之威案覆既不在秋官省審復不由門下國之利器輕以假人恐為社稷之禍太后不聽姚崇拜侍郎后嘗語左右曰往周興来俊臣等數治詔獄朝臣相逮引一切承反朕意其枉更畀近臣臨問皆得其手牒不冤朕無所疑即可其奏自俊臣等誅遂無反者然則向論死得無冤邪崇對曰自垂拱後被告者𩔖自誣當是時以告言為功故天下號曰羅織甚於漢之鉤黨雖陛下使近臣覆訊彼尚不自保敢一揺手以悖酷吏意哉且被問不承則重罹其慘如張䖍勗李安静等皆是也今賴天之靈發寤陛下凶豎殱夷朝廷乂安臣以一門百口保内外官無復反者陛下以告牒置弗推後若反有端臣請坐知而不告后恱曰前宰相務順可陷我為淫刑主聞公之言乃得朕心賜銀千兩𤣥宗時夷州刺史楊濬以贓抵死有詔杖六十流古州尚書左丞相裴耀卿上言曰刺史縣令異諸吏為人父母風化所瞻今使裸躬受笞事太逼辱法至死則天下共之然一朝下吏屈挫牽頓民且哀憐是忘免死之恩而有傷心之痛恐非崇守長勸風俗意又雜犯抵死無杖刑必三覆後決今非時不覆或天其命非所以寛宥之也凡大暑決囚多死秋冬乃有全者請今貸死決杖㑹盛夏生長時並停則有再生之實陳州刺史李邕素輕張說與相惡㑹仇人告邕贓貸枉法下獄當死許昌孔璋上書曰明主舉能而舎過取才而棄行烈士抗節勇者不避死故晉用林父不以過漢任陳平不以行禽息隕身不祈生北郭碎首不受死向若林父誅陳平死百里不用晏嬰見逐是晉無赤狄之土漢無天子之尊秦不彊齊不霸矣伏見陳州刺史邕剛毅忠烈難不茍免往者折二張之角挫韋氏之鋒雖身受謫屈而姦謀沮解即邕有功於國且邕所能者拯孤恤窮救乏賙恵家無私聚今聞坐贓下吏死在旦夕臣聞生無益於國書不若殺身以明賢臣願以六尺之軀膏鈇鉞以代邕死臣與邕生平不款曲臣知有邕邕不知有臣臣不逮邕明矣夫知賢而舉仁也任人之患義也獲二善以死臣又何求伏惟陛下寛邕之死使率徳改行興林父曲逆之功臣得瞑目附禽息北郭之迹大願畢矣若以陽和方始重行大戮則臣請伏劒不敢煩有司皇天后土實聞臣言昔吳楚反漢得劇孟則不憂天以一賢而敵七國之衆伏惟敷含垢之道棄瑕之義逺思劇孟近取於邕況告成岱宗天地更新赦而復論人誰無罪惟明主圗之臣聞士為知己者死臣不為死者所知而甘之死者非特惜邕賢亦以成陛下矜能之慈疏奏邕得減死代宗時東京平陳希烈等數百人待罪議者將悉抵死帝意亦欲懲天下故崔器等附致深文李峴時為三司獨上奏曰法有首有從情有重有輕若一切論死非陛下與天下惟新意且逆臣亂常誰不凌汙衣冠奔亡各顧其生可盡責耶陛下之親戚勲舊子若孫一日皆血鈇砧尚為仁恕哉書稱殱厥渠魁脅從罔治況河北殘孽刼服官吏其人尚多今不開自新之路而盡誅之是堅叛者使為賊致死困獸猶鬬況數萬人乎於時器與吕諲皆齪齪文吏操常議不及大體尚騰頬固争數日乃見聽衣冠䝉更生賊亦不能使人歸怨天子峴之力也徳宗時中書侍郎同中書門下平章事陸贄奏商量處置竇参状曰右希顔奉宣進止朝来共卿等商量竇参事卿等所奏雖於大體甚好然此人交結中外意在不測朕試根尋灼然審知情狀所以有此商量又聞竇參在彼處亦共諸處交通不絶社稷事重卿等只合與朕同憂宜即作文書進来此事非小不可更遲者臣面承深㫖又奉密宣皆以社稷為言又知根尋已審敢不上同憂憤内絶狐疑豈願遲廻更貽念慮但以嘗經重任斯謂大臣進退之間猶宜有禮誅戮之際不可無名劉晏乆掌貨財當時亦招怨讟及加罪責事不分明叛者既得以為辭衆人為之懐愍用刑曖昧損累不輕事例未遥所宜重慎竇參頃司鈞軸頗怙恩私貪饕貨財引縱親黨此則朝廷同議天下共傳至於僣懐異圗將起大惡跡既未露人皆莫知臣等親奉威顔議加刑辟但聞凶險之意尚昧結構之由況在衆流何由察悉忽行峻罰必謂冤誣羣情震驚事亦非細若不付外推鞫則恐難定罪名乞留睿聦更少詳度竇参於臣素分陛下固所明知有何顧懐輙欲營救良以事闗國體義絶私嫌所冀典刑不濫於清時君道免虧於聖徳特希天鑒俯亮愚誠贄又上奏曰右希顔奉宣進止竇參結朕左右兼有隂謀皆有憑據事不曖昧只縁連及處多不可推按卿等宜更商量若絶恐事體不穏即且流貶向絶逺惡處竇申竇榮李則之首末同惡無所不至又並細微不比竇参宜便商量處置其竇參等所有朋黨親密並不可容在側近宜便條疏盡發遣向僻逺無兵馬處先雖已經流貶更移向逺惡處者伏以竇参罪犯誠合誅夷聖徳含𢎞務全事體特寛嚴憲俯貸餘生始終之恩實足感於庶品仁育之恵不獨幸於斯人所議貶官謹具别状且竇榮竇申李則之等既皆同惡固亦難容然以得罪相因法有首從首當居重從合差輕参既䝉恩矜全申等亦宜減降又於黨與之内亦有淑慝之殊稍示區分足彰勸勵竇榮與参雖是近屬亦甚相親然於欵宻之中都無邪僻之事仍聞激憤屢有直言因此漸構猜嫌晚年頗見疏忌若論今者隂事則尚未究端由如據比来所行必應不至凶險恐須差異以表詳明臣等商量竇榮更貶逺官竇申則之並除名配流謹具别状進擬庶允從輕之典以洽好生之恩夫趨勢附權時俗常態茍無髙節出衆何能特立不羣竇參乆秉鈞衡特承寵渥君之所任孰敢不從或逰於門庭或結以申外或偏被接引或驟與薦延如此之徒十恒七八若聽流議皆謂黨私自非甚與交親安可悉從貶累況竇参罷黜迨欲周星應是私黨近親當時並以連坐人心久定不可復揺今者再責竇参特縁别有結構陛下親自尋究審得事情所與連謀固知定數今若普加譴斥則恐飜𩔖淪胥罪無指名誰不疑懼中外汹汹殊非令猷臣等商量除同謀隂邪事状分明者其餘一切更無所問將為稳便未審可否贄又上奏曰右希顔奉宣進止凡是官吏貪濁取受錢物猶並徴贓竇参負朕至深廣納賄貨又更交結謀行惡事其荘宅錢物奴婢之𩔖豈不合收納入官竇参身既逺貶亦恐被人破除隠沒今欲使人勾當收拾卿等商量可否者謹按國家典法沒入官産唯有兩科一謂姦贓一謂叛逆皆須先鞫犯状審得實情憲司察寃法寺論罪㑹府覆奏掖垣参詳如是悉無異詞然後謂之獄成而聞於天子其有抵于深辟者制可既下所司猶三五覆奏庶或宥之聖王愛人恤刑乃至如此精慎罪法既定方合徴收叛逆則盡沒其家姦贓則止徴所犯蓋示懲戒匪貪貨財何嘗有罪未斷有法未詳而可以納其資産者也伏惟聖徳廣大如天包含懲忿於彛憲之中念終於常情之外已存恵貸不寘嚴刑今若簿録其家竊恐以財傷義猥䝉下問實荷皇明輙罄愚誠所祈天鑒謹奏憲宗嘗問政之寛猛孰先禮部侍郎同中書門下平章事權徳輿對曰唐家承隋苛虐以仁厚為先太宗皇帝見明堂圗始禁鞭背列聖所循皆尚徳教故天寳大盜竊發俄而夷滅蓋本朝之化感人心之深也帝曰誠如公言昭宗時韓全誨誅宫人多坐死帝欲盡去餘黨學士韓偓曰禮人臣無將將必誅宫婢負恩不可赦然不三十年不能成人盡誅則傷仁願去尤者自内安外以静羣心帝善之後晉出帝開運中諸鎮恣用酷刑左拾遺竇儼上疏曰案名例律死刑二絞斬之謂也絞者筋骨相連斬者頭頸異處大辟之目不出兩端淫刑之興近聞數等蓋縁外地不守通規或以長釘貫人手足或以短刀臠人肌膚遷延信宿不令就死冤聲上達和氣有傷望加禁止帝從之歴代名臣奏議卷二百十五
