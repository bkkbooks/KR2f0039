body:
  text: 歷代名臣奏議卷三百四十明楊士竒等撰四裔周靈王三年無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎人無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀于我我德則睦否則攜二勞師于戎而楚伐陳必弗能救是棄陳也諸華必叛獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄洊居貴貨易土土可賈焉一也邉鄙不聳民狎其野穡人成功二也戎人事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后羿而用德度逺至邇安五也君其圖之漢髙帝罷平城歸韓王信亡入邊當是時冒頓為單于兵強控弦三十萬數苦北邉上患之問建信侯劉敬劉敬曰天下初定士卒罷于兵未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義說也獨可以計久逺子孫為臣耳然恐陛下不能為上曰誠可何為不能顧為奈何劉敬對曰陛下誠能以適長公主妻之厚奉遺之彼知漢適女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以嵗時漢所餘彼所鮮數問遺因使辨士風諭以禮節冒頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮者哉兵可無戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼亦知不肯貴近無益也髙帝曰善欲遣長公主吕后日夜泣曰妾太子一女奈何棄之胸奴上竟不能遣長公主而取家人子名為長公主妻單于使劉敬往結和親約孝惠帝時單于嘗為書嫚吕后不遜吕后大怒召諸將議之上將軍樊噲曰臣願得十萬衆橫行胸奴中諸將皆阿吕后意曰然中郎將季布曰樊噲可斬也夫髙帝將兵四十餘萬衆困于平城今噲奈何以十萬衆橫行胸奴中面欺且秦以事于邊陳勝等起于今創痍未瘳噲又面諛欲搖動天下是時殿上皆恐太后罷朝遂不復議擊胸奴事武帝元光元年主父偃西入關見衛將軍衛將軍數言上上不省資用乏留久諸侯賔客多厭之偃乃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺䇿而功流萬世今臣不敢隱忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天子大愷春搜秋獮諸侯春振旅秋治兵所以不忘戰也且怒者逆德也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海內為一功齊三代務勝不休欲攻胸奴李斯諫曰不可夫胸奴無城郭之居委積之守遷徙靡常難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也勝必棄之非民父母靡敝中國甘心胸奴非完計也秦皇帝不聽遂使䝉恬將兵而禦邊卻地千里以河為境地固澤鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其勢不可也又使天下飛芻挽粟起于黃腄琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足于糧餉女子紡績不足于帷幕百姓靡敝孤寡老弱不能相養道死者相望蓋天下始叛也及至髙皇帝定天下略地于邉聞胸奴聚代谷之外而欲擊之御史成諫曰不可夫胸奴烏合而星散從之如搏景今以陛下盛德攻胸奴臣竊危之髙帝不聽遂至代谷果有平城之圍髙帝悔之乃使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺將係虜單于適足以結怨深讎不足以償天下之費夫胸奴行盜侵驅所以為業天性固然上自虞夏殷周固不程督度外置之不比華人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所以疾苦也且夫兵久則變生事苦則慮易使邉境之民靡敝愁苦將吏相疑而外市故尉他章邯得成其私而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用願陛下熟計之而加察焉書奏上乃拜偃為郎中五年番陽令唐䝉風曉南越南越食䝉以蒟醬問所從來曰道西北牂柯江牂柯江廣數里出番禺城下䝉歸問蜀賈人賈人曰獨蜀出蒟醬多持蒟出市夜郎夜郎臨牂柯江江廣百餘步南越以財物役屬之然亦不能臣使也蒙乃上書曰南越王名為外臣實一州主也今以長沙豫章往水道多絶竊聞夜郎精兵可十餘萬浮船牂柯出其不意此制越一竒也請通夜郎道為置吏上乃拜蒙為中郎將元狩元年博望侯張騫自月氐還具為天子言西域諸國風俗大宛在漢正西可萬里其俗土著耕田多善馬有城郭室屋其東北則烏孫東則于填于填之西則水皆西流注西海其東水東流注鹽澤鹽澤潜行地下其南則河源出焉鹽澤去長安可五千里胸奴右方居鹽澤以東至隴西長城南接羌隔漢道焉烏孫康居奄蔡大月氐皆行國隨畜牧與胸奴同俗大夏在大宛西南與大宛同俗臣在大夏時見卭竹杖蜀布問安得此曰市之身毒身毒在大夏東南可數千里其俗土著與大夏同度大夏去漢萬二千里居漢西南今身毒又居大夏東南從羌中險少北則為丐奴所得從蜀宜徑又無寇天子既聞諸國多竒物而兵弱貴漢財物誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海帝欣然以騫言為然乃令騫因蜀犍為發間使四道並出求身毒國各行一二千里其北閉氐筰南閉巂昆明殺略漢使終莫得通於是始通滇國乃復事西南夷元鼎二年騫又建言烏孫王昆莫本為胸奴臣後兵稍疆不肯復朝事胸奴胸奴攻不勝而逺之今以厚幣招以益東居故渾邪之地則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣上以為然拜騫為中郎將齎金幣帛直數千巨萬至烏孫久之不能得其要領因分遣副使使大宛康居大月氐大夏安息身毒于滇及諸旁國烏孫送騫還使數十人馬數十匹隨騫報謝是嵗騫還到後所遣使通大夏之屬皆頗與其人俱來於是西域始通於漢矣元狩中胸奴渾邪王率衆來降漢發車二萬乘縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令汲黯曰長安令無罪獨斬黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷弊中國而以事異域之人乎上默然及渾邪至賈人與市者坐當死者五百餘人黯請間見髙門曰夫胸奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百數臣愚以為陛下得邊人皆以為奴婢以賜從軍死事者家所鹵獲因豫之以謝天下之苦塞百姓之心今縱不能渾邪率數萬之衆來降虛府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邉關乎陛下縱不能得胸奴之資以謝天下又以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也上默然不許曰吾久不聞汲黯之言今又復妄發矣武帝時胸奴求和親羣臣議前博士狄山曰和親便上問其便山曰兵凶器未易數動髙帝欲伐胸奴大困平城乃遂結和親孝惠髙后時天下安樂及文帝欲事胸奴北邉蕭然苦兵孝景時吳楚七國反景帝往來東宫間天下寒心數月吳楚已破竟景帝不言兵天下富實今自陛下興兵擊胸奴中國已空虛邉大困貧由是觀之不如和親宣帝五鳯元年胸奴亂五單于爭立漢議者多曰胸奴為害日久可因其壞亂舉兵滅之御史大夫蕭望之曰春秋晉士丐帥師侵齊間齊侯卒引師而還君子大其不代喪以其恩足以服孝子誼足以動諸侯前單于慕化嚮善請求和親未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也不以義動兵恐勞而無功宜遣使弔問輔其微弱救其災患四裔聞之咸貴中國之仁義如遂䝉恩復其位必稱臣服從此德之盛也上從其議甘露二年初胸奴呼韓邪單于來朝詔公卿議其儀丞相黃霸御史大夫于定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後逺人詩云率履不越遂視既發相土烈烈海外有截陛下聖德充塞天地光被四表胸奴單于鄉風慕化奉珍朝賀自古未之有也其禮儀宜如諸侯王位次在下望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外裔稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也書曰戎狄荒服言其來荒忽亡常如使胸奴後嗣卒有流離竄伏闕于朝享不為畔臣信讓行乎蠻貉福祚流于亡窮萬世之長䇿也天子采之元帝建昭三年郅支單于叛逆未服甘延夀陳湯上疏曰臣聞天下之大義當混為一昔有唐虞今有強漢胸奴呼韓邪單于已稱北藩唯郅支單于叛逆未服其辜大夏之西以為強漢不能臣也郅支單于慘毒行於民大惡通於天臣延夀臣湯將義兵行天誅賴陛下神靈陰陽並應天氣精明陷陳克敵斬郅支首及名王以下宜縣頭槀街蠻夷邸間以示萬里明犯強漢者雖逺必誅事下有司丞相匡衡御史大夫繁延夀以為郅支及名王首更歷諸國蠻夷莫不聞知月令春掩骼埋胔之時宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之万盛夏首足異門而出宜縣十日乃埋之有詔將軍議是成帝元延二年康居遣子侍漢貢獻然自以絶逺獨驕嫚不肯與諸國相望都護郭舜數上言本胸奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國內相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與胸奴俱稱臣義不可拒而康居驕黠訖不肯拜使者都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啖都護吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也胸奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絶勿復使以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者往來人馬驢槖駝食皆苦之空罷耗所過送迎驕黠絶逺之國非至計也河平元年單于遣右臯林王伊邪莫演等奉獻朝正月伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為漢興胸奴數為邊害故設金爵之賞以待降者今單于詘禮稱臣列為北藩遣使朝賀無有二心漢家接之宜異于往時今既享單于聘貢之質而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邉吏或者設為反間欲因而生隙受之適合其䇿使得歸曲而直責歸曲于漢而以直義來責也此誠邊境安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使哀帝建平四年單于上書願朝五年時哀帝被疾或言胸奴從上遊來厭人自黃龍竟寧時單于朝中國輒有大故上由是難之以問公卿亦以為虛費府帑可且勿許單于使辭去未發黃門郎揚雄上書諫曰臣聞六經之治貴于未亂兵家之勝貴于未戰二者皆微然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與胸奴從此隙矣胸奴本北地之主五帝之所不能臣三王之所不能制其不可使隙甚明臣不敢逺稱請引秦以來明之以秦始皇之彊䝉恬之威帶甲四十餘萬然不敢窺西河乃築長城以界之㑹漢初興以髙祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石畫之臣甚衆石言堅固如石也畫計䇿也卒其所以脫者世莫得而言也卒終也莫得而言謂自免之計其事醜惡故不傳又髙皇后嘗忿胸奴羣臣庭議樊噲請以十萬衆橫行胸奴中季布曰噲可斬也妄阿順指于是大臣權書遺之然後胸奴之結解中國之憂平及孝文時胸奴侵暴北邉候騎至雍甘泉京師大駭發三將軍屯細桞棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴使韓安國將三十萬衆徼于便墬徼要也墬古地字胸奴覺之而去徒費財勞師一人不可得見況單于之面乎其後深惟社稷之計規恢萬載之䇿乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破置顔襲王庭窮極其地追奔逐北封狼居胥山禪于姑衍以臨瀚海虜名王貴人以百數自是之後胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心于狼望之北哉以為不一勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎獵其南而長羅侯以烏孫五萬騎震其西皆至質而還質信也謂所期處時鮮有所獲徒奮揚威武明漢兵若風雷耳雖空行空反尚誅兩將軍故北敵不服中國未得髙枕安寢也逮至元康神爵之間大化神明鴻恩博洽而胸奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏稱臣伏蒲北反然尚羈縻之計不顓制顓與專同專制謂以為臣妾也自此之後欲朝者不距不欲者不彊何者外國天性忿鷙形容魁健負力怙氣難化以善易𨽻以惡其彊難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城蹈烏桓之壘探姑繒之壁姑繒謂西南夷種也藉蕩姐之場羌屬也藉猶蹈也姐音紫艾朝鮮之旃拔兩越之旗艾讀曰刈絶也近不過旬月之役逺不離二時之勞離歷也三月為一時固已犂其庭掃其閭犂耕也郡縣而置之雲徹席卷後無餘菑惟北敵為不然真中國之堅敵也三垂比之懸矣前世重之兹甚未易可輕也今單于歸義懷欵誠之心欲離其庭陳見于前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙夫欵而隙之使有恨心負前言緣往辭言單于因緣往昔和好之辭以怨漢也歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視于無形聰者聽于無聲誠先于未然即䝉恬樊噲不復施棘門細桞不復備馬邑之䇿安所設衛霍之功何得用五將之威安所震不然一有隙之後雖智者勞心于內辨者轂擊于外轂擊言使車交馳其轂相擊也猶不若未然之時也且往者圗西域制車師置城都護三十六國費嵗以大萬計也者豈為康居烏孫能踰白龍堆而寇西邉哉乃以制胸奴也夫百年勞之一日失之費十而愛一臣竊為國不安也惟陛下少留意于未亂未戰以遏邉萌之禍書奏天子寤焉召還胸奴使者更報單于書而許之新莽建國四年烏孫大小昆彌遣使入貢莽以烏孫國人多親附小昆彌欲得烏孫心乃遣使者引小昆彌使坐大昆彌使上師友祭酒滿昌劾奏使者曰外國以中國有禮義故屈而服從大昆彌君也今序臣使于君使之上非所以有外國也奉使大不敬莽怒貶昌官漢光武皇帝建武十一年先零諸羌數萬人屯聚寇鈔距浩亹隘馬成與馬援深入討擊大破之徙降羌致天水隴西扶風是時朝臣以金城破羌之西塗逺多寇議欲棄之馬援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如今羌在湟中則為害不休不可棄也帝從之民歸者三千餘口援為長吏繕城郭起塢候開溝洫勸以耕牧郡中樂業又招撫塞外氐羌皆來降附援奏復其侯王君長帝悉從之乃罷馬成軍十七年莎車王賢復遣使奉獻請都護帝賜賢西域都護印綬及車旗黃金錦繡敦煌太守裴遵上言異域不可假以大權又令諸國失望詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都護移書諸國悉服屬焉二十四年胸奴南邉八部立日逐王比為南單于欵五原塞內附願永為籓蔽扞禦北邊事下公卿議者皆以為天下初定中國空虛不可許五官中郎將耿國獨以為如孝宣故事受之令東扞鮮卑北拒胸奴率屬四夷完復邉郡帝從之于是分為南北單于二十七年北單于遣使詣武威求和親天子召公卿廷議不決皇太子言曰南單于新附北部懼于見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北部臣恐南單于將有志北部降者且不復來矣帝然之告武威太守勿受其使二十八年北單于復遣使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國使客與俱獻見帝下三府議酬答之宜司徒掾班彪奏曰臣聞孝宣皇帝敕邉守尉曰胸奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北胸奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報答之辭令必有適今立藁草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚髙為單于嘉之往者胸奴數有乖亂呼韓邪郅支自相讎隙䝉孝宣皇帝垂恩救護故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于攜衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸掃北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疏服順者褒賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬胸奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韇丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劒各一單于前言先帝時所賜呼韓邪竽瑟箜篌皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物于單于便宜所欲遣驛以聞帝悉納從之明帝永平中益州刺史梁國朱輔好立功名慷慨有大略在州數嵗宣示漢德威懷逺裔自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云彼徂矣岐有夷之行傳曰岐道雖僻而人不逺詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭來大山零髙坂峭危峻險百倍岐道繈負老幼若歸慈母逺裔之語辭意難正歸順之念誠懇可嘉有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四裔之樂今之所上庶備其一帝嘉之事下史官録其歌焉逺裔樂德歌詩曰大漢是治與天合意吏譯平端不從我來聞風向化所見竒異多賜贈布甘美酒食昌樂肉飛屈申悉備蠻夷貧薄無所報嗣願主長夀子孫昌熾逺裔慕德歌詩曰蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不逺萬里去俗歸德心歸慈母逺裔懷德歌曰荒服之外土地墝埆食肉衣皮不見鹽榖吏譯傳風大漢安樂攜負歸仁觸冒險厄髙山岐峻緣崖磻石木薄發家百宿到洛父子同賜懷抱匹帛傳告種人長願臣僕八年帝遣鄭衆持節使胸奴衆至北庭敵欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師朝議復欲遣使報之衆上疏諌曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又嘗揚漢和親誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使既到便偃蹇自信若復遣之敵必自謂得謀其羣臣駮議者不敢復言如是南庭動搖烏桓有離心矣南單于久居漢地具知形勢萬分離析旋為邉害今幸有度遼之衆揚威北垂雖勿報答不敢為患帝不從復遣衆衆因上言臣前奉使不為胸奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣誠不忍持大漢節對敵人獨拜如令胸奴遂能服臣將有損大漢之彊帝不聽衆不得已既行在路連上書固爭之詔切責衆追還繫廷尉㑹赦歸家其後帝見胸奴來者問衆與單于爭禮之狀皆言胸奴中傳衆意氣壯勇雖蘇武不過乃復召衆為軍司馬章帝建初五年軍司馬班超率疏勒康居于置拘彌兵一萬人攻姑墨石城破之斬首七百級超欲因此叵平諸國乃上疏請兵曰臣竊見先帝欲開西域故北擊胸奴西使外國鄯善于置即時向化今拘彌莎車疏勒月氐烏孫康居復願歸附欲共并力破滅龜兹平通漢道若得龜兹則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶幾張騫棄身曠野昔魏絳列國大夫尚能和輯諸戎況臣奉大漢之威而無鉛刀一割之用乎前世議者皆曰取三十六國號為斷胸奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶唯焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱厄自孤守疏勒于今五載異域情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則䓗嶺可通䓗嶺通則龜兹可伐今宜拜龜兹侍子白霸為其國王以步騎數百送之與諸國連兵嵗月之間龜兹可禽以外國攻外國計之善者也臣見莎車疏勒田地肥廣草木饒衍不比敦煌鄯善問也兵可不費中國而糧食自足且姑墨溫宿二王特為龜兹所置既非其種更相厭苦其執必有降反若二國來降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特䝉神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勳祖廟布大喜于天下書奏帝知其功可成議欲給兵平陵人徐幹素與超同至上疏願奮身佐超五年遂以幹為假司馬將弛刑及義從千人就超先是莎車以為漢兵不出遂降于龜兹而疏勒都尉畨辰亦復反叛㑹徐幹適至超遂與幹擊畨辰大破之斬首千餘級多獲生口超既破畨辰欲進攻龜兹以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主至孝宣皇帝卒得其用今可遣使招慰與共合力帝納之章帝時北單于遣使貢獻求欲和親詔問羣僚議者或以為胸奴變詐之國無內向之心徒以畏漢威靈逼憚南部故希望報命以安其離叛今若遣使恐失南部親附之歡而成北敵猜詐之計不可𤣥武司馬班固議曰竊自惟思漢興已來曠世歷年兵纏邊境尤事胸奴綏御之方其塗不一或倄文以和之或用武以征之或卑下以就之或臣服而致之雖屈申無常所因時異然未有拒絶棄放不與交接者也故自建武之世復修舊典數出重使前後相繼至于其末始乃暫絶永平八年復議通之而廷爭連日異同紛回多執其難少言其易先帝聖德逺覽瞻前顧後遂復出使事同前世以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氐自逺而至胸奴離析名王來降三方歸服不以兵威此誠國家通于神明自然之徴也臣愚以為宜依故事復遣使者上可繼五鳳甘露致逺人之㑹下不失建武永平羈縻之義敵再來然後一往既明中國主在忠信且知聖朝禮義有常豈同逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北敵稍彊能為風塵方復求為交通將何所及不若因今施惠為䇿近長元和二年武威太守孟雲上書北敵既已和親而南部復往抄掠北單于謂漢欺之謀欲犯邊宜還其生口以安慰之詔百官議朝堂公卿皆言敵人譎詐求欲無厭既得生口當復妄自誇大不可開許太僕袁安獨曰北敵遣使奉獻和親有得邉生口者輒以歸漢此眀其畏威而非先違約也雲以大臣典邉不宜負信于敵人還之足示中國優貸而使邉人得安誠便司徒桓虞改議從安太尉鄭𢎞司空第五倫皆恨之𢎞因大言激勵虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司𨽻校尉舉奏安等皆上印綬謝帝詔報曰久議沈滯各有所志蓋事以議從䇿由衆定誾誾衎衎得禮之容寢默抑心更非朝廷之福君何尤而深謝其各冠履帝竟從安議許之乃下詔曰昔獫狁獯粥之敵中國其所由來尚矣往者雖有和親之名終無絲髮之效墝埆之人屢嬰塗炭父戰于前子死于後弱女乘於亭障孤兒號于道路老母寡妻設虛祭飲泣淚想望歸魂于沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病況今與胸奴君臣分定辭順約明貢獻纍至豈宜違信自受其曲其敕度遼及領中郎將龎奮倍雇南部所得生口以還北敵其南部斬首獲生計功受賞如常科章和二年鮮卑擊破北胸奴而南單于乘此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之尚書宋意上疏曰夫北敵之隔逺中國幽處北極界以沙漠簡賤禮樂無有上下彊者為雄弱即屈服自漢興以來征伐數矣其所剋獲曽不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜飬邉人得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者敵自相攻無損漢兵者也臣察鮮卑侵伐胸奴正是利其抄掠及歸功聖朝實由貪得重賞今若聽南部還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願內無功勞之賞懷忿思逞必為邉患今北敵西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南部則坐失上略去安即危矣誠不可許㑹南單于竟不北徙遷司𨽻校尉漢和帝永元四年北單于既亡其弟于除鞬自立遣使欵塞竇憲請立為單于置中郎將領護如南單于故事事下公卿議袁安任隗以為光武招懷南部非謂可永安內地止以權時之算可得扞禦北敵故也今宜令南單于反北庭領降衆無緣復更立於除鞬以增國費安又獨上封事曰臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之䇿也恩德甚備故胸奴遂分邉境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至乎章和之初降者十餘萬人議者欲置之濵塞東至遼東太尉宋由光祿勳耿秉皆以為失南單于心不可先帝從之陛下奉承洪業大開疆宇大將軍逺師討伐席卷北庭此誠宣明祖宗崇立𢎞勳者也宜審其終以成厥初伏念南單于屯先父舉衆歸德自䝉恩以來四十餘年三帝積纍以遺陛下陛下深宜遵述先志成就其業況屯首唱大謀空盡北敵輟而弗圖更立新降以一朝之計違三世之規失信於所養建立于無功由秉實知奮議而欲背棄先恩夫言行君子之樞機賞罰理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信于一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讎今立其弟則二國懷怨兵食可廢信不可去且漢故事供給南單于費直嵗一億九十餘萬西域嵗七千四百八十萬今北庭弥逺其費過倍是乃空盡天下而非建䇿之要也詔下其議安又與憲更相難折憲險急負藝言辭驕訐至詆毁安稱光武誅韓歆戴涉故事安終不移憲竟立胸奴降者右鹿蠡王于除鞬為單于後遂反叛卒如安䇿永元六年時南單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章無由自聞而崇因與行度遼將軍朱徽上言南單于安國踈逺故部親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之警備帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚㑹必未敢動搖今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無他變可令崇等就安國㑹其左右大臣責其部衆橫暴為邉害者共平罪誅若不從命令為權時方略事畢之後裁行客賜亦足以威示百蠻帝從之安帝永寧元年北胸奴率車師後王軍就共殺索班擊走前王略有北道曹宗請出兵擊胸奴以報之因復取西域公卿皆以為宜閉玉門關太后聞軍司馬班勇有父風召問之勇上議曰昔孝武皇帝開通西域論者以為奪單于府藏斷其右臂光武中興未遑外事故胸奴驅率諸國河西城門晝閉孝明皇帝深惟廟䇿命將出征然後胸奴逺遁邉境得安間者羌亂西域復絶北敵遂遣責諸國逋租髙其價直嚴以期㑹鄯善車師皆懷憤怨思樂事漢其路無從今曹宗徒欲報雪胸奴而不尋出兵故事要功荒外萬無一成兵連禍結悔無所及況今府庫未充師無後繼臣愚以為不可許也宜于敦煌復置營兵三百人及護西域副校尉遣長吏將五百人屯樓蘭西當焉耆龜兹徑路南彊鄯善于置心膽北扞胸奴東近敦煌既為諸部節度又禁漢人侵擾如此誠便公卿難曰前所以棄西域者以其無益而難供也今欲通之班將能保北敵不為邉害乎勇對曰今置州牧以禁盜賊若州牧能保盜賊不起者臣亦願要斬保胸奴之不為邉害也今通西域則敵勢必弱為患微矣孰與歸其府藏續其右臂哉若棄而不立則西域望絶屈就北敵恐河西城門必須復有晝閉之警矣今不廓開朝廷之德而拘屯戍之費豈安邉久長之䇿哉難者又曰西域遣使求索無厭一旦為胸奴所迫當復求救則為役大矣勇對曰今設以西域歸胸奴而使其恩德大漢不為鈔盜則可矣如其不然則是富仇讎之財增强敵之勢且西域來者不過廩食今若拒絶勢歸北屬敵國并力以寇并涼則中國之費不止十億置之誠便于是從勇議復營兵置副校尉居敦煌雖以羈縻西域然亦未能出屯其後胸奴果數與車師入寇河西大被其害順帝永建四年虞詡言安定北地上郡山川險厄沃野千里土宜畜牧水可溉漕頃遭羌亂郡縣兵荒一十餘年矣棄沃壤之饒捐自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外而公卿巽懦計費不圖其安宜開聖聽考行所長從之使謁者督徙者各歸本縣繕城郭置候驛又浚渠屯田省費嵗一億許遂令諸郡儲粟周數年永和元年武陵蠻反初太守上書以蠻夷率服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加知其天性貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則弃而不追先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻果爭貢布非舊約舉種反叛晉惠帝時關隴屢為氐羌所擾山隂令江統深惟四裔侵亂宜杜其萌乃作徙戎論其辭曰夫東西南北謂之四海九服之制地在要荒春秋之義內諸夏而外四裔以其言語不通贄幣不同别有法俗各為種類或居絶域之外山河之表﨑嶇川谷阻險之地與中國壤斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷禹平九土而西戎即叙其風氣剛徑習俗强悍四裔之中西北為甚弱則畏服彊則侵叛雖有聖賢之世大德之君咸未能以通化率導而以恩德柔懷也當其彊也以殷之髙宗而憊于鬼方有周文王而患昆夷獫狁髙祖困於白登孝文軍于霸上及其弱也周公來九譯之貢中宗納單于之朝以元成之微而猶四裔賔服此其已然之效也故胸奴求守邉塞而侯應陳其不可卑于屈膝未央望之議以不臣是以有道之君牧四裔也惟以待之有備禦之有常雖稽顙執贄而邉城不弛固守為寇賊彊暴而兵甲不加逺征期令境內獲安疆埸不侵而已及至周室失統諸侯專征以大兼小轉相殘滅封疆不固而利害異心外域乘間得入中國或招誘安撫以為已用故申繒之禍顛覆宗周襄公要秦遽興姜戎當春秋時義渠大荔居秦晉之域陸渾陰戎處伊洛之間鄋瞞之屬害及濟東侵入齊宋陵虐邢衛南北二陲交侵中國不絶若線齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力加左衽之功逮至春秋之末戰國方盛楚吞蠻氐晉剪陸渾趙武龎服開榆中之地秦雄咸陽滅義渠之等始皇之并天下也南兼百越北走胸奴五嶺長城戎卒億計雖師役煩殷寇賊橫暴然一世之功戎人奔却當時中國無復四裔也漢興而都長安關中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莽之敗赤眉因之西都荒毁百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種于關中居馮翊河東空地而與華人雜處數嵗之後族類蕃息既恃其肥彊且苦漢人侵之永初之元騎都尉王𢎞使西域發調羌氐以為行衛于是羣羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑鄧騭之征棄甲委兵輿尸喪師前後相繼諸戎遂熾至于南入蜀漢東掠趙魏唐突軹關侵及河內及遣北軍中侯朱寵將五營士于孟津距羌十年之中中外俱斃任尚馬賢僅得克之此所以為害深重纍年不定者雖由禦者之無方將非其才亦豈不以寇發心腹害起肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際㑹輒復侵叛馬賢狃忕終于覆敗段熲臨衝自西徂東雍州之戎常為國患中世之寇惟此為大漢末之亂關中殘滅魏興之初與蜀分隔疆埸之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因拔棄漢中遂徙武都之種于秦川欲以弱寇疆國扞禦蜀虜此蓋權宜之計一時之勢非所以為萬世之利也今者當之已受其弊矣夫關中土沃物豐厥土上上加以涇渭之流溉其舄鹵鄭國白渠灌浸相通黍稷之饒畝號一鍾百姓謡詠其殷實帝王之都每以為居未聞戎人宜在此土也非我族類其心必異猜疑靡定不與我同而因其衰弊遷之畿服士庶玩習侮其輕弱使其怨恨之氣毒于骨髓至于蕃育衆盛則坐生其心以貪悍之性挾憤怒之情候隙乘便輒為橫逆而居封域之內無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界內諸羌著先零罕开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界廪其道路之糧令足自致各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所上合往古即叙之義下為盛世永久之規縱有叛亂之心風塵之警則絶逺中國隔閡山河雖為寇暴所害不廣是以充國子明能以數萬之衆制羣羌之命有征無戰全軍獨剋雖有謀謨深計廟勝逺圗豈不以中外異處戎夏區别要塞易守之故得成其功也哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害洊饑纍荒疫癘之災札瘥夭昏凶逆既戮悔惡初附且款且畏咸懷危懼百姓愁苦異人同慮望寧息之有期若枯旱之思雨露誠宜鎮之以安豫而子方欲作役起徒興功造事使疲悴之衆徙自猜之寇以無榖之人遷乏食之徒恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復橫出矣答曰羌戎狡猾擅相號署攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老幼繫虜丁壯降散流離衰弊不能相一子以此等尚挾餘資悔惡反善懷我德惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至于此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也逮其死亡散流離蕩未鳩與關中之人户皆為讎故可遐遷逺處令其心不懷土也夫聖賢之謀事也為之于未有理之于未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之人百餘萬口率其少多異族居半處之與遷必須口實若有窮乏糝粒不繼者故當傾關中之榖以全其生生之計必無擠于溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半榖此為濟行者以廪糧遺居者以積倉寬關中之逼去盜賊之原除旦夕之損建終年之益若憚暫舉之小勞而忘永逸之𢎞䇿惜日月之煩苦而遺纍世之寇敵非所謂能開物成務創業垂統崇基拓跡謀及子孫者也并州諸部本實胸奴桀惡之寇也漢宣之世凍餒殘破國內五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復求降附遂令入塞居于漠南數世之後亦輒叛戾故何熙梁覲戎車屢征中平中以黃巾賊起發調其兵部衆不從而殺羌渠由是于弥扶羅求助于漢以討其賊仍值世喪亂遂乘釁而作鹵掠趙魏寇至河南建安中又使右賢王去卑誘質呼厨泉聽其部落散居六郡咸熙之際以一部大彊分為三率泰始之初又增為四于是劉猛內叛連結外冦近者郝散之變發于榖逺今五部之衆户至數萬人口之盛過于西戎然其天性驍勇弓馬便利倍于氐羌若有不虞風塵之慮則并州之域可為寒心滎陽句驪本居遼東塞外正始中幽州刺史毋丘儉伐其叛者徙其餘種始徙之時户落百數子孫孳息今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況于邊鄙能不為變但顧其微弱勢力不陳耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之富豈須逺人在內然後取足哉此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我華夏纎介之憂惠此中國以綏四方德施永世于計為長帝不能用未及十年而劉石搆難時服其深識宋明帝太始七年單于猛叛屯孔邪城武帝遣婁侯何楨持節討之楨素有志略以猛衆悍非少兵所至乃潜誘猛左部督李恪殺猛于是胸奴震服積年不敢復反其後稍因忿恨殺害長吏漸為邉患侍御史西河郭欽上疏曰戎人彊獷歷古為患魏初人寡西北諸郡皆為戎居今雖服從若百年之後有風塵之警敵騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為敵庭矣宜及平吳之威謀臣猛將之略出北地西河安定復上郡實馮翊于平陽已北諸縣募取死罪徙三河三魏見士四萬家以充之不致雜處漸徙平陽𢎞農魏郡京兆上黨諸部峻四裔出入之防眀先王荒服之制萬世之長䇿也齊髙皇帝建元元年王奐進號左將軍眀年遷太常領鄱陽王師仍轉侍中祕書監領驍騎將軍又遷征虜將軍臨川王鎮西長史領南蠻校尉南郡內史奐一嵗三遷上表固讓南蠻曰今天地初闢萬物載新荆蠻來威巴濮不擾但使邉民樂業有司修務本府舊州日就殷阜臣昔逰西土較見盈虛兼日者戎燼之後痍毁難復雖復緝以善政未及來蘇今復割撤大府制置偏校崇望不足以助強語實安能以相弊且資力既分職司增廣衆勞務倍文案滋煩非獨臣見其難竊以為國計非允見許齊武帝永明中敵遣使求書朝議欲不與丹陽令中書郎王融上疏曰臣側聞僉議疑給敵書如臣愚情切有未喻夫敵包藏禍心匪伊朝夕凶猛難制遷徙靡常逋竄燭幽去來豳朔綿周漢而不悛歷晉宋其踰梗豈有愛敬仁智恭讓廉修異臣僕之馴心同仇讐之反目設槀秣有儲筋竿足用必以草竊關燧寇擾邉疆寧容款塞卑辭承衣請朔陛下務存遵養不時侮亡許其膜拜之誠納裘之賮況復願同文軌儻見款遺思奉聲教方致猜拒將使舊邑遺逸未知所置衰敵餘噍或能自推一令蔓草難鉏㳙流泛酌豈直疥癢輕痾容為心腹重患抑孫武之言也困則數罰窘則多賞先暴而後畏其衆者敵之謂乎前中原士庶雖淪懾殊俗至于婚葬之晨猶巾褠為禮而禁令苛刻動加誅轘于時獯粥初遷徒衆尚結即心徒怨困懼成逃自其將卒奔離資待銷闕北畏勍蠕西逼南部民背如崩勢絶防斷于是曲從物情僞竊章服歷年將絶隱蔽無聞既南向而泣者日夜以覬北顧而辭者江淮相屬凶謀嵗窘淺慮無方于是稽顙郊門問禮求樂若來之以文德賜之以副書漢家軌儀重臨畿輔司𨽻傳節復入關河無待八百之師不期十萬之衆故其提漿佇俟揮戈願倒三秦大同六漢一統又敵前後奉使不專漢人必介以胸奴備諸覘獲且設官分職彌見其情抑退舊苖扶任種戚師保則后族馮晉國揔録則邽姓直勒渴矦台鼎則邱頽茍仁端執政則目淩鉗耳至于東都羽儀西京簮帶崔孝伯程虞蚪久在著作李元和郭季祐止于中書李思沖飾虜清官遊明根泛居顯職今經典逺被詩史北流馮李之徒必欲遵尚直勒等類居致乖阻何則胸奴以氈騎為帷牀馳射為糇糧冠方帽則犯沙陵雪服左衽則風驤鳥逝若革其故常强所不習去其所樂豫以所苦必同艱桎梏等懼氷淵婆娑􅩚躃困而不能前矣及夫春草水生阻散馬之適秋風木落絶驅禽之歡息沸脣于桑墟别醍乳于冀俗聽韶雅如䏊聵臨方丈若爰居馮李之徒固得志矣敵之為敵其如病何于是風土之思深愎戾之情動拂衣者連裾抽鋒者比鏃部落爭于下酋渠危于上我一舉而兼吞卞莊之勢必也且棘寶薦虞晉彊弥盛大鍾出智宿氏以亡帝略逺孚無思不服鑾光幸岱匪暮思朝臣請收籍伊瀍兹書復掌猶取之內府藏之外籯于理有愜即事何損若狂言足採請決敕施行世祖答曰吾意不異卿今所啓比相見更委悉事竟不行齊明皇帝建武初南郡太守孔稚圭以敵連嵗南侵征役不息百姓死傷乃上表曰胸奴為患自古而然雖三代智勇兩漢權竒算略之要二塗而已一則鐡馬風馳奮威沙漠二則輕車出使通驛敵庭推而言之優劣可覩今之議者咸以丈夫之氣耻居物下況我天威寧可先屈吳楚徑猛帶甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為敵人異域不與我同得其疆宇不足為利得其徒衆不足為臣唯宜勝之以深權制之以逺笇𢎞之以大度懷之以逺人豈足肆天下之忿捐蒼生之命發雷電之怒爭蜉蝣之生百戰百勝不足稱雄橫尸千里無益上國而兵連禍結莫或遑息居深負險難與競逐漢髙橫威海表窘迫長圍孝文國富刑清事屈陵辱宣帝撫納安靜朔馬不驚光武卑辭厚禮寒山無靄是兩京四主英濟中區輸寶貨以結和遣宗女以通好長轡逺馭子孫是賴豈不欲戰息民命也唯漢武藉五世之資承六合之富驕心奢志大事胸奴遂連兵積嵗轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走敵騎而漢之棄甲十亡其九故衛霍出關千隊不反二師入漢百旅頓降李廣敗于前鋒李陵沒于後陳其餘奔北不可勝數遂使國儲空懸户口減半好戰之功其利安在戰不及和相去何若自西朝不綱東晉遷鼎羣么沸亂異族交橫荆棘攢于陵廟貔虎咆于宫闈山淵反覆黔首塗地逼迫崩騰開闢未有是時得失略不稍陳近至元嘉多年無事末路不量復挑彊敵遂乃連城覆徙敵馬飲江青徐州之際草木為人耳建元之初沙塵犯塞永眀之始復結通和十餘年間邉候且息陛下張天造歷駕日登皇聲雷㝢宙勢壓河嶽而逺僥殘魂未屠劒首微么餘喘偷窺外甸烽亭不靜五載于斯昔嵗蠧侵瘻食樊漢今兹虎視浸淫未已興師十萬日費千金百嵗之費寧可資計陛下何惜匹馬之驛百金之賂數行之詔誘此凶頑使河塞息肩關境全命蓄甲養民以觀彼弊我䇿若行則為不世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細耻以四海為任者寧顧小節一城之沒尚不足惜一使不反曽何取慙且我以權取貴得我略行何嫌其耻所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有可勝之機耳今宜早發大軍廣張兵勢徴犀甲于岷峨命樓船于浦海使自青徂豫候騎星羅㳂江入漢雲陳萬里據險要以奪其魂斷糧道以折其膽多設疑兵使精悉而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辨辭重幣陳列吉凶北敵天性愛竒欲則不剛畏我之威喜我之賂畏威喜賂願和必矣陛下用臣之啓行臣之計何憂玉門之下而無欵塞之人哉彼之言戰既殷勤臣之言和亦慊闊伏願察兩塗之利害檢二事之多少聖照𤣥省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐矦嶽敢肆瞽直伏奏千里帝不納後魏世祖搜于河西詔崔浩詣行在所議軍事浩表曰昔漢武帝患胸奴彊盛故開涼州五郡通西域勸農積榖為滅賊之資東西迭擊故漢未疲而胸奴已弊後遂入朝平涼州臣愚以為北敵未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虛雖有鎮戍適可禦邉而已至于大舉軍資必乏陛下知此事濶逺竟不施用如臣愚意猶如前議募徙豪彊大家充實涼土軍舉之日東西齊勢此計之得者氐羌慕璝奉表歸國尋討禽赫連定送之京師世祖嘉之遣使者䇿拜慕璝為大將軍西秦王慕璝表曰臣誠庸弱敢竭情欵俘禽僣逆獻捷王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察亮其單欵臣頃接寇逆疆境之人為賊所抄流轉東下今皇化混一求還鄉土乞拂白連窟略寒張華等三人家弱在此分乖可愍願并敕遣使恩洽遐荒存亡感戴世祖詔公卿朝㑹議答施行太尉長孫嵩及議郎博士二百七十九人議曰前者有司處以為秦王荒外之君本非政教所及來則受之去則不禁皇威逺被西秦王慕義畏威稱臣納貢求受爵號議者以為古者要荒之君雖人土衆廣而爵不擬華夏陛下加寵王官乃越常分容飾車旗班同上國至于繒絮多少舊典所無皆當臨時以制豐寡自漢魏以來撫接荒遐頗有故事吕后遺單于御車二乘馬二駟單于答馬千匹其後胸奴和親敵國遺繒絮不過數百呼韓邪稱臣身自入朝始至方伯今西秦王若以土無桑蠺便當上請不得言財不周賞昔周室衰微齊侯小白一匡天下有賜胙之命無益土之賞晉侯重耳破楚城濮唯受南陽之田為朝宿之邑西秦所致唯定而已塞外之人因時乘便侵入秦涼未有經略拓境之勳爵登上國統秦涼河沙四州之地而云土不增廓比聖朝於弱周而自同於五霸無厭之情其可極乎西秦王忠欵于朝廷原其本情必不至此或左右不敏因致斯纍檢西秦流人賊時所抄悉在蒲坂今既稱藩四海咸泰天下一家可𠡠秦州送詣京師隨後遣還所請乞拂三人昔為賔國之使來在王庭國破家遷即為臣妾可勿聽許髙祖時楊椿為太僕卿加安東將軍初顯祖世有蠕蠕萬餘户降附居于髙平薄骨律二鎮太和之末叛走略盡唯有一千餘家太中大夫王通髙平鎮將郎育等求徙置淮北防其叛走詔許之慮不從命乃使椿持節往徙焉椿以為徙之無益上書曰臣以古人有言天子有道守在四夷荒忽之人羈縻而已是以先朝居之于荒服之間者正欲恱近來逺招附殊俗亦以别華戎異內外也今新附者罷若舊者見徙新者必不安不安必思土思土則走叛狐死首邱其害方甚又此族類生長邊隅樂冬便寒南土溼熱往必將盡進失歸伏之心退非藩衛之益徙在中夏而生後患愚心所見謂為不可時八座議不從遂徙于濟州緣河居之冀州元愈之難果悉浮河赴賊所在鈔掠如椿所䇿孝明帝熙平二年蠕蠕主醜奴遣使來朝抗敵國之書不修臣敬朝議將依漢答胸奴故事遣使報之司農少卿燕州大中正張倫表曰臣聞古之聖王疆理物土辨章要甸荒遐之俗政所不及故禮有一見之文書著羈縻之事太祖以神武之姿聖明之略經略帝圖日有不暇遂令豎子逰魂一方亦由中國多虞急諸華而緩外裔也髙祖光宅土中業隆卜世赫雷霆之威震熊羆之旅方役南轅未遑北伐昔舊京烽起敵使在郊主上按劒璽書不出世宗運籌帷幄開境揚旌衣裳所及舟車萬里于時敵人欵關上亦述遵遺志今大明臨朝澤及行葦國富兵彊能言率職何憚而為之何求而行此往日蕭衍通敬求和以誠肅未純抑而不許先帝棄戎于前陛下交敵于後無乃上乖髙祖之心下違世宗之意且彼雖慕德亦來觀我懼之以彊儻即歸附示之以弱窺覦或起春秋所謂以我卜也又小人難近荒服無親踈之則怨狎之則侮其所由來久矣是以髙祖世宗知其若此來既莫逆去又不追不一之義于是乎在必其委質玉帛之辰屈膝蕃方之禮則可豐其勞賄籍以珍物至於王人逺役銜命敵庭優以匹敵之尊加之相望之寵恐徒生侮慢無益聖朝假令選衆而舉使乎稱職資酈生之辨騁終軍之辭憑軾下齊長纓繫越茍異曩時猶為不願而況極之以隆崇申之以宴好臣雖下愚輒敢固執若事不獲已應頒制詔示其上下之儀宰臣致書諷以歸順之道若聽受忠誨明我話言則萬乘之盛不失位於域中天子之聲必籠罩于無外脫或未從焉能損益徐舞干戚以招之敷文德而懷逺如迷心不已或肆憑陵則當命辛李之將勒衛霍之師蕩定雲沙掃清逋孽飲馬瀚海之濵鏤石燕然之上開都護置戊己斯亦陛下之髙功百世之盛事如思按甲養民務農安邉之術經國之防豈可以異族兼并而遽虧典制將取笑于當時貽醜于來葉昔文公請隧襄后有言荆莊問鼎王孫是抑以古方今竊為陛下不取又陛下方欲禮神岷瀆致禮衡山登稽嶺窺蒼梧而反與荒服之君荒服之長結昆弟之欣抗分庭之義將何以瞰文命之遐景迹重華之髙風者哉臣以為報使甚失如彼不報甚得如此願留須臾之聽察愚臣之言正光二年詔遣楊鈞送蠕蠕主阿那瓌還國諫議大夫張普惠謂遣之將貽後患上疏曰臣聞乾元以利貞為大非義則不動皇王以博施為功非類則不從故能始萬物而化天下者也伏惟陛下睿哲欽明道光虞舜八表宅心九服清晏蠕蠕相害于朔垂妖師扇亂于江外此乃異域之人不識王度天將悔其罪所以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以悅其志恭已以懷其心而先自勞擾艱難下民興師郊甸之內逺投荒塞之外救纍世之勍敵可謂無名之師諺曰唯亂門之無過愚情未見其可當是邉將窺竊一時之功不思兵為凶器不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆橫行胸奴中季布以為不可請斬之千載以為美況今旱酷異常聖慈降膳乃以萬五千人使楊鈞為將而欲定蠕蠕忤時而動其可濟乎阿那瓌投命皇朝撫之可也豈容困疲我兆民以資天喪之徒昔莊公納子糾以致乾時之敗魯僖以邾國而有懸胄之耻今蠕蠕時亂後主繼立雖云散亡內自虞難抑脫有井陘之慮楊鈞之肉其可食乎髙車蠕蠕連兵積年饑饉相仍須其自斃小亡大傷然後一舉而并之此卞氏之髙略所以獲兩虎不可不圖之今土山告難簡書相續蓋亦無能為也正與今舉相㑹天其或者欲以告戒人不欲使南北兩疆並興大衆脫狂狡構間于其間而復事連中國何以寧之今宰輔専欲好小名不圖安危大計此微臣所以寒心者也那瓌之不還負何信義此機之微際北師宜停臣言不及義文書所經過不敢不陳兵猶火也不戢將自焚也彼焚滅之形可以為殷鑒伏願輯和萬國以靜四疆混一之期坐而自至矣臣愚昧多違必無可採匹夫之志願以呈獻表奏答曰夫窮獸歸人尚或興惻況那瓌嬰禍流離逺來依庇在情在國何容勿矜且納亡興喪有國大義皇魏堂堂寧庇斯德後主亂亡似當非謬此送彼迎想無拒戰國義宜表朝算已決卿深誠厚意朕用嘉戢俾此段機略不獲相從脫後不逮勿憚匡言莊帝時蠕蠕主阿那瓌返國其人大饑相率入塞上表請臺賑給詔尚書左丞拓跋孚為北道行臺詣彼賑恤孚陳便宜表曰荒服之人未嘗粒食宜從俗因利拯其所無昔漢建武中單于欵塞時轉河東米糒二萬五千斛牛羊三萬六千頭以給之斯即前代和戎撫新柔逺之長䇿也乞以㹀牛産羊糊其口命且畜牧繁息是其所便毛血之利惠兼衣食又尚書奏云如其仍住七州隨寬置之臣謂人情戀本寧肯徙內若依臣請給賑雜畜愛本重鄉必還舊土如其不然禁留益損假令逼徙事非久計何者靡常之性去留難測既易水草痾恙將多憂愁致困死亡必甚兼其餘類尚在沙磧脫出狂勃翻歸舊巢必殘掠邑里遺毒百姓亂而方塞未若杜其未萌又貿遷起于上古交易行于中世漢與邊通亦立關市今北人阻饑命懸溝壑公給之外必求市易彼若願求宜見聽許又云營大者不計小名圗逺者弗拘近利雖邊鄙衰盛歷代不同叛服之情略可論討周之北伐僅獲中規漢氏外攘裁收下䇿昔在代京恆為重備將帥勞止甲士疲力前世苦之計未能致今天祚大魏亂亡在彼朝廷垂天覆之恩廓大造之德鳩其散亡禮送令返宜因此時善思逺䇿竊以理雖萬變可以一觀來事雖懸易以往卜昔漢宣之世呼韓欵塞漢遣董忠韓昌領邉郡士馬送出朔方因留衛助又光武時亦令中郎將假彬置安集掾史隨單于所在參察動靜斯皆守吉之元龜安邉之勝䇿計今朝廷成功不減曩時蠕蠕國弊亦同疇日宜準昔成謨略依舊事借其所間地聽使田牧粗置官屬示相慰撫嚴戒邉兵以見保衛馭以寬仁縻以久䇿使親不至矯詐踈不容叛反今北鎮諸將舊常云一人代外邏因令防察所謂天子有道守在四夷者也又云先人有奪人之心待降如受強敵武非專外亦以防內若從處分割配諸州鎮遼逺非轉輸可到悔叛之情變起難測又居人畜業布在原野戎人性貪見則思盜防彼肅此少兵不堪渾流之際易相干犯驅之還本未必樂去配州內徙復不肯從既其如此其費必大朝廷不許隋文帝開皇元年突厥攝圖曰我周家親也今隋公自立而不能制復何面目見可賀敦乎因與髙寶寧攻陷臨渝鎮約諸面部落謀共南侵帝新立由是大懼修築長城發兵屯北境命隂夀鎮幽州虞慶則鎮并州屯兵數萬人以為之備奉車都尉長孫晟先使突厥知攝圖玷厥阿波突利等叔姪兄弟各統強兵俱號可汗分居四面內懷猜忌外示和同難以力征易可離間因上書曰臣聞喪亂之極必致升平是故上天啓其機聖人成其務伏惟皇帝陛下當百王之末膺千載之期諸夏雖安戎場尚梗興師致討未是其時棄于度外又復侵擾故宜密運籌䇿漸以攘之計失則百姓不寧計得則萬代之福吉凶所係伏願詳思臣于周末忝充外使胸奴倚伏實所具知玷厥之于攝圖兵強而位下外名相屬內隙已彰鼓動其情必將自戰又處羅侯者攝圗之弟姦多而勢弱曲取于衆心國人愛之因為攝圗所忌其心殊不自安迹示弥縫實懷疑懼又阿波首鼠介在其間頗畏攝圗受其牽率唯強是與未有定心今宜逺交而近攻離強而合弱通使玷厥說合阿波則攝圗廽兵自防右地又引處羅遣連奚霫則攝圖分衆還備左方首尾猜嫌腹心離阻十數年後承釁討之必可一舉而空其國矣上省表大恱因召與語晟復口陳形勢手畫山川寫其虛實皆如指掌上深嗟異皆納用焉七年突厥攝圗死遣長孫晟持節拜其弟處羅侯為莫何可汗以其子雍閭為葉護可汗處羅侯因晟奏曰阿波為天所滅與五六千騎在山谷間伏聽詔㫖當取之以獻乃召文武議焉樂安公元諧曰請就彼梟首以懲其惡武陽公李充曰請生將入朝顯僇以示百姓上謂晟曰于卿何如晟對曰若突厥背誕須齊之以刑今其昆弟自相夷滅阿波之惡非負國家因其困窮取而為戮恐非招逺之道不如兩存之上曰善二十年都藍大亂為其部下所殺晟為驃騎將軍因奏請曰今王師臨境戰數有功賊內攜離其主被殺乘此招誘必並來降請遣染干部下分頭招慰上許之果盡來附達頭恐怖又大集兵詔晟部領降人為秦川行軍總管取晉王諱節度出討達頭與王相抗晟進䇿曰突厥飲泉易可行毒因取諸藥毒水上流達頭人畜飲之多死于是大驚曰天兩惡水其亡我乎因夜遁晟追之斬首千餘級俘百餘口六畜數千頭上大喜開皇中容納突厥啓民居于塞內光祿大夫假文振恐為國患上表曰臣聞古者帝王御宇內外有防周宣薄伐玁狁秦帝築城萬里蓋逺圗良算弗可忘也竊見國家容受啓民資其兵食假以地利如臣愚計竊又未安何則敵人之性無親而貪弱則歸投強則反噬蓋其本心也臣學非博覽不能逺見且聞晉朝劉曜梁代侯景近事之驗衆所共知以臣量之必為國患如臣之計以時喻遣令出塞外然後明設烽候緣邉鎮防務令嚴重此乃萬嵗之長䇿也文帝征髙麗文振為左候衛大將軍出南蘇道道病上表曰陛下以遼東未服親降六師敵人多詐深須防擬口陳降欵毋宜遽受水潦方降不可淹遲惟願嚴勒諸軍星馳速發水陸俱前出其不意則平壤孤城勢必可拔如不時定脫遇秋霖兵糧必竭彊敵在前靺鞨出後遲疑不決非上䇿也及卒帝甚惜之煬帝大業三年幸榆林欲出塞外陳兵耀武經突厥中指于涿郡仍恐染干驚懼先遣長孫晟往喻㫖稱述帝意染干聽之因召所部諸國奚霫室韋等種落數十酋長咸萃晟以牙中草穢欲令染干親自除之示諸部落以明威重乃指帳前草曰此根大香染干遽嗅之曰殊不香也晟曰天子行幸所在諸侯躬親灑掃耘除御路以表至敬之心今牙中蕪穢謂是留香草耳染干乃悟曰奴罪過奴之骨肉皆天子賜也得效筋力豈敢有辭特以邉人不知法耳賴將軍恩澤而教導之將軍之惠奴之幸也遂拔所佩刀親自芟草其貴人及諸部爭倣效之乃發榆林北境至于其牙又東達于薊長三千里廣百步舉國就役而開御道帝聞晟䇿乃益嘉焉西域諸蕃多至張掖與中國交市帝令尚書左丞裴矩掌其事矩知帝方勤逺略諸逺啇至者矩誘令言其國俗山川險易撰西域圖記三卷入朝奏之其序曰臣聞禹定九州導河不踰積石秦兼六國設防止及臨洮故知西域諸部僻居遐裔禮教之所不及書典之所罕傳自漢氏興基開拓河右始稱名號者有三十六國其後分立乃五十五王仍置校尉都護以存招撫然叛服不恆屢經征戰後漢之世頻廢此官雖大宛以來略知户數而諸國山川未有名目至如姓氏風土服章物産全無纂録世所弗聞復以春秋遞謝年代久逺兼并誅討互有興亡或地是故邦改從今號或人非舊類因襲昔名兼復部民交錯封疆移改異域音殊事難窮驗于闐之北葱嶺以東考于前史三十餘國其後更相屠滅僅有十存自餘淪沒掃地俱盡空有邱墟不可記識皇上膺天育物無隔中外率土黔黎莫不慕化風行所及日入以來職貢皆通無逺不至臣既因撫納監知關市尋討書傳訪採邊人或有所疑即譯衆口依其本國服飾儀形王及庶人各顯容止即丹青模寫為西域圖記共成三卷合四十四國仍别造地圖窮其要害從西頃以去北海之南縱橫所亙將二萬里諒由富商大賈周逰經涉故諸國之事罔不遍知復有幽荒逺地卒訪難曉不可憑虛是以致闕而二漢相踵西域為傳户民數十即稱國王徒有名號乃乖其實今者所編皆餘千户利盡西海多産珍異其山居之屬非有國名及部落小者多亦不載發自敦煌至于西海凡為三道各有襟帶北道從伊吾經蒲類海鐡勒部突厥可汗庭度北流河水至拂菻國達于西海其中道從髙昌焉耆龜兹疏勒度葱嶺又經鏺汗蘇對沙那國康國曹國何國大小安國穆國至波斯達于西海其南道從鄯善于闐朱俱波唱槃陀度葱嶺又經護密吐火羅挹怛忛延漕國至北婆羅門達于西海其三道諸國亦各自有路南北交通其東女國南婆羅門國等並隨其所往諸處得達故知伊吾髙昌鄯善並西域之門户也總凑敦煌是其咽喉之地以國家威德將士驍雄泛濛汜而揚旌越昆崘而躍馬易如反掌何往不至但突厥吐渾分領氐羌之國為其擁遏故朝貢不通今並因商人密送誠款引領翹首願為臣妾聖情含養澤及普天服而撫之務存安輯故皇華遣使弗動兵車諸蕃既從渾厥可滅混一戎夏其在兹乎不有所記無以表威化之逺也帝大恱帝巡于塞北幸啓民帳時髙麗遣使先通于突厥啓民不敢隱引之見帝矩為銀青光祿大夫因奏狀曰髙麗之地本孤竹國也周代以之封于箕子漢世分為三郡晉氏亦統遼東今乃不臣别為外域故先帝疾焉欲征之久矣但以楊諒不肖師出無功當陛下之時安得不事使此冠帶之境仍為蠻貊之鄉乎今其使者朝于突厥親見啓民合國從化必懼皇靈之逺暢慮後伏之先亡脅令入朝當可致也帝曰如何矩曰請面詔其使放還本國遣語其王令速朝覲不然者當率突厥即日誅之帝納焉歷代名臣奏議卷三百四十
