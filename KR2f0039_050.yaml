body:
  text: 歷代名臣奏議卷五十明楊士竒等撰治道宋孝宗時知南劒州羅願上奏曰臣聞自昔大有為之君必先務富其民民有蓄積是乃國之所以為安富尊强也陛下仁聖天縱憂勞萬民臨御之久未嘗一日不博謀群臣講求治道監司郡守除拜必引見以觀其䏻雨暘豐歉動關宸慮形于詔㫖視四方有賦役偏重若民所疾苦不以久近必下不世之詔此誠天地父母之用心也然逺方之民蓄積猶未實者意者吏不稱也臣請略陳民所以貧富者數端惟陛下赦其愚少留聽覽臣竊見比年官兵既冗而歸正養老之人發下州郡者又多州郡係省錢大率不足以自供上司每創有行下事件不言于何取費間有申審猶只言于係省錢內支而獻言者又不深惟州郡之缺各出所見務以稱明時立武之意添招增繕其說不一亦有初不詳審旋知無益而公私勞費已廣臣願省部監司與州郡為一體通其有無愛惜民力凡獻言欲于一路一州有所興造者下有司斟量緩急不輕舉事此富民之一端也今之為吏者相勉以辦財賦謂民事為不甚急民知吏之厭事則武斷者得以并兼于下其外方縣道去朝廷逺處遇有民訟又往往因而科罰如爭田則以沃瘠認錢爭婚則以妍醜定價甚者得理之人亦使納錢而去號為賀喜錢如此逺民安得有餘臣願戒部使者長吏加意民訟而嚴戢科罰此亦富民之一端也今大郡迎一帥守飾官舍戒舟乘庤器用及吏卒借請費或萬緡送還亦如之卒有遷改又當别行營辦以一郡而失萬緡幾如是財不困至于嗜進之吏耗公帑以事交結又不在數中臣願精選其人使得滿任而無數易此亦富民之一端也籍沒之法古用以懲大姦慝後世蓋輕用之吏或專仰此為術日夜察民有財産者傅致以罪而沒入之以供無藝之費世亦因指以為䏻吏一夫陷罪盡室流散甚不稱天子惠庶民之意臣願且懲其尤者强盜􅌪藏及受財故出入死罪之吏與盜官物罪至死者實為巨蠧自餘可且計贓責償毋一槩籍沒此亦富民之一端也田畝所輸歲有定數則民易知今外郡或將布帛丈尺綿麥多寡使吏胥得逐嵗改更號為科撥大率嵗有增而無損至于受納米斛或選任峻刻之吏又以薦牘及錢物誘其多取皆不應法臣願察州郡有將稅數逐嵗更改者酌數嵗之中立為定數務要便民益申嚴加耗之禁此亦富民之一端也臣愚不習為吏惟陛下洞見民𨼆益選愛國恤民不欺之吏使以類求之務廣上恩陛下方將襲堯舜之隆名享天人之祐助亦何為而不成何欲而不得哉願又上奏曰臣伏覩近降指揮申嚴舊制守臣到任半年以上具民間利病五件聞奏臣一介庸陋蒙恩易守謹條具五事如後一臣所領鄂州地勢要重實荆襄之肘腋吳楚之腰膂淮南江西為其腹背四通五達古來用武之地而本州城壁因循未立職在守土深以為憂夫鄂州比之沿邊州軍雖稍近裏有大江之蔽然自州向東數十里江之下流有地名陽羅洑者去光州才三百九十里皆平坦之地輕騎可一二日而至臣以為此非內郡也而舊城徒有堆阜蹊隧交于其上說者但見禁旅所屯便謂直當以兵為險不知禁旅之屯不專為此昨來邊境有事鄂州御前諸軍例皆起發唯留水軍數千人其後復抽差以往當此之時但使湖南江西或有通寇可為寒心臣聞古之守禦者不間內外惟其户口兵財所在乃當保聚若有城而無民有民而無財有財而無兵徒捐功費何補于事今鄂州在城內外生齒繁盛六道財計之所總七萃營屯之所聚誠得而城之不唯保此户口兵財四面亦可恃以為固然勞人費財論事者之所憚臣之愚以為向來每難于興役者緣多先為期限興功倉卒官吏進則希賞退則懼罪故功不堅緻虛費民力若稍賜其費嵗築若干要以數年可以集事異時禁旅或有進發前有專意之功退無反顧之慮人心齊功力自倍臣聞諸侯設險以蕃王室魯憂旱備先在修城臣非好勞而惡逸顧親見利害非他郡比受恩深厚冒而言之惟明主裁擇一臣聞導民之務莫如重榖在朝廷表而出之則人情益勸竊見民間昨因缺食以田産從人質易頗得榖米以濟饑歉後來歲事既復多訴稱元典賣非見錢有司拘文往往便用准折之律奪田還之臣以為在法有利債負准折價錢者謂纍積虛利折彼良田故為立禁若有實錢相貼猶應准數還之其榖米雖非見錢然當歲之艱或持錢不得榖錢榖相權未知孰重稍值豐嵗一槩奪還臣恐從今以往魯不復贖人矣願下有司酌立中制其因歉嵗以産業貨易口食者得比見錢書其直于契約而有司察其估之過甚者雖非經常之制庶幾緩急有無相通濟人窘闕一臣竊惟鄂州當走集之地兵民錯居商旅輻湊以臣愚見惟在鎮撫安靖而時發擲其尤無良者天威所臨境內安帖惟是諸州配隸强盜凶惡貸命之人來者猥多所宜留意契勘本州牢城指揮舊以四百人為額臣到官之初已有六百餘人見今諸州配來源源不已又舊來遇有逃死上下相蒙更不開落四方逋逃隨頂名字以此致得其來滋長姦僞臣今逐時開落少損外來頂名之弊惟是井邑浩穰既多有歸正又時發下過淮盜馬之人前來拘管皆州郡所宜幾察臣欲乞下有司令且戒敕諸郡住配前來候將來開落及元額四百人之數從本州申明漸次配隸前來此亦稍省姦宄綏靜邊鄙之一端也一臣竊以重湖之外舊多曠土非謂來者不願開耕只緣舊請佃人包占過多既不䏻遍耕遇有剗請輒稱已耕熟田不容請佃檢視定奪紛然不已又當官者各據所見或欲招徠新民或欲存恤舊户自非稍見地段難得整齊臣欲令民間因時之隙各于自己田土標立界至嵗晚遣官檢視連嵗不耕即許剗請又所納官物皆仰于鈔書上明聲說係納所佃某處稅物以相幾檢又在法有酬價交佃之文其或因事到官者有司覺所占猥多斟量價數減與來者磨以嵗月不擾而定庶使斯民共盡地利一臣竊以古稱良賤灼然不同良者即是良民賤者率皆罪𨽻今世所云奴婢一槩本出良家或迫飢寒或遭誘略因此終身為賤誠可矜憐臣昨來被㫖權贑州日捕治土人往廣南盜牛者其間往往併掠其小兒以來臣今假守鄂州又見民間所須僮奴多藉江西販到其小者或才十嵗左右既離地頭無復稽察官吏不肖或乃計口收其稅錢嵗時竊來亹亹不已臣嘗窮正其罪選謹信人給與路費牒元來州縣送還其家竊慮諸處似此者多謂宜使民間有遭誘略者皆因都保自言于官官為籍記立賞追捕可使還齒平民復見父母在法雇人為婢限止十年其限內轉雇者年限價錢各應通計目今遞相循習皆𨼆落元雇之由徑作牙家自賣别起年限多取價錢曠閒年深豈無愁歎謂宜自今轉雇者皆明書來歷于約庶年限價錢可以通計有不如令牙人及買主坐之價錢沒官受雇者逐便庶使脫賤還良稍有期日及時婚嫁不失人道于以廣上恩致和氣亦聖世所不宜忽也觀文殿大學士兼侍讀史浩上奏曰臣恭惟皇帝陛下仁義之治幾于二帝孝儉之德冠于百王而臨蒞天下垂二十載恢復之圖尚未如欲臣身為老臣豈不同此一念竊伏思之周宣中興復古之詩謂內修政事外伐玁狁說者分為二事臣獨謂修政事所以伐玁狁使吾政事修明彼且望風知畏六月之師所以䏻成功也此意漢宣帝得之果見單于慕義稽首稱藩臣願陛下精思熟慮于政事益加修焉則四方懷德畏威罔不率俾周宣之克復境土漢宣之功光祖宗不難至矣臣今去國歸田追念輔佐之日淺政事中有欲為未盡八事敢為陛下言之伏望聖慈察臣愛君之心特賜采擇而力行之臣茍未先朝露尚得見陛下光明烜赫以成恢復之功髙壓周漢二君矣不勝天下幸甚陸九淵上奏曰臣讀典謨大訓見其君臣之間都俞吁咈相與論辨各極其意了無忌諱嫌疑于是知事君之義當無所不用其情唐太宗即位之初魏徵為尚書右丞或毀徴以阿黨親戚者太宗使溫彥博按訊非是彥博言徵為人臣不能著形迹逺嫌疑心雖無私亦有可責太宗使溫彥博責徵且曰自今宜存形迹徵入見曰臣聞君臣同德是謂一體宜相與盡誠若上下但存形迹則邦之興喪未可知也太宗瞿然曰吾已悔之數年之後蠻夷君長帶刀宿衛外户不閉商旅野宿非偶然也唐太宗固未足為陛下道然其君臣之間一能如此即著成效陛下天錫智勇隆寬盡下逺追堯舜誠不為難而臨御二十餘年未有太宗數年之效版圖未歸讎耻未復生聚教訓之實可為寒心執事者方雍雍于于以文書期會之隙與造請乞憐之人俯仰酬酢而不倦道雨暘時若有詠頌太平之意臣竊惑之臣誠恐因循玩習之久薰蒸浸漬之深雖陛下之剛健亦不能不消蝕也鸞鳳之所以能髙飛者在六翮臣願陛下毋以今日所進為如是足矣而博求天下之俊傑相與舉論道經邦之職將見無愧于唐虞之朝而唐之太宗誠不足為陛下道矣九淵又上奏曰臣少讀漢武帝䇿賢良詔至所謂任大而守重嘗竊歎曰漢武亦安知所謂任大而守重者自秦而降言治者稱漢唐漢唐之治雖其賢君亦不過因陋就簡無卓然志于道者因陋就簡何大何重之有今陛下獨卓然有志于道真所謂任大而守重道在天下固不可磨滅然人能𢎞道非道𢎞人今陛下羽翼未成則臣恐陛下此志亦不能以自遂陛下此志不遂則宜其治功之不立日月逾邁而駸駸然反出漢唐賢君之下也神龍棄滄海釋風雲而與鯢鰍校技于尺澤理必不如臣願陛下益致尊德樂道之誠以遂初志則豈惟今天下之幸千古有光矣九淵又上奏曰臣嘗謂天下之事有可立至者有當馴致者㫖趣之差議論之失是惟不悟悟則可以立改故定趨向立規模不待悠久此則所謂可立至者至如救宿弊之風俗正久隳之法度雖大舜周公復生亦不能一旦盡如其意惟其趨嚮既定規模既立徐圖漸治磨以嵗月乃可望其丕變此則所謂當馴致者日至之時日氣即應此立至之驗也大冬不能一日而為大夏此馴致之驗也凡事不合天理不當人心者必害天下效見之著無愚知皆知其非然㦯者明不燭理量不容物一旦不勝其忿驟為變更其禍敗往往甚于前日後人懲之乃謂無可變更之理真所謂懲羮吹虀因噎廢食者也自秦漢以來治道厖雜而甘心懷愧于前古者病正坐此嵗在壬辰臣省試對䇿首篇大抵言古事是非初不難論但論于今日多類空言事體遼絶形勢隔塞無可施行末章有云然則三代之政其終不復矣乎合抱之木萌蘖之生長也大夏之暑大冬之推移也三代之政豈終不可復哉顧當為之以漸而不可驟耳有包荒之量有馮河之勇有不遐遺之明有朋亡之公于復三代乎何有臣乃今日請復為陛下誦之九淵又上奏曰臣聞人主不親細事故臯陶賡歌致叢脞之戒周公作立政稱文王罔攸兼于庶言庶獄庶事唐德宗親擇吏宰畿邑栁渾曰陛下當擇臣輩以輔聖德臣當選京兆尹以承大化尹當求令長以親細事代尹擇令非陛下所宜此言誠得臯陶周公之旨今天下米鹽靡密之務往往皆上纍宸聽臣謂陛下雖得臯陶周公亦何暇與之論道經邦哉荀卿子曰主好要則百事詳主好詳則百事荒臣觀今日之事有宜責之令者令則曰我不得自行其事有宜責之守者守亦曰我不得自行其事推而上之莫不皆然文移回復互相牽制其說曰所以防私而行私者方藉是以藏姦伏慝使人不可致詰惟盡忠竭力之人欲舉其職則苦于隔絶而不得以遂志以陛下之英明焦勞于上而事實之在天下者皆不䏻如陛下之志則豈非好詳之過耶此臣所謂㫖趣之差議論之失而可以立變者也臣謂必深懲此失然後䏻遂求道之志致知人之明陛下雖垂拱無為而百事詳矣臣不勝拳拳衛涇對䇿曰臣恭惟陛下聰明天縱並隆五三不自神聖謙沖退託親屈帝尊廷策多士訪以古今之治道當世之急務陛下豈以草茅之言為可用歟然自陛下即位以來六策多士所以與之講論治道亦不一矣亦嘗採其所言見之施行而有補于治者乎抑草茅之士華文少實不當于理而不足以措之事業乎抑亦臨軒賜問姑循祖宗之故實而不要之于用也夫科目之興始自西漢而賢良之策亦有時而措之用者載諸史册爛然可觀況陛下捨己從人如大舜不矜不伐如大禹廣覽兼聽以極羣下之幽隱開心見誠以來天下之讜言將與海內共臻至治夫豈崇尚虛文不究實用徒應故事而已哉雖然君聽存乎廣大臣言貴于切近以陛下好問之勤碩治之切而徒泛為之辭以娛觀聽非臣之所學也臣聞成天下之治者固憚于改作革極弊之政者尤患于因循改作之患至于擾擾作事而因循之弊將有委靡不振之憂二者皆非所以為治而因時制宜則治道之所不廢也昔漢武帝以雄材大略之資即位之初侈然不滿漢家之意嘉唐虞樂商周之言屢形詔策董仲舒待問廣廷乃勸帝以更化善治卒之武帝紛更制度日不暇給而一時之治駸駸愈不如古豈仲舒之言有以誤之耶終日變易法令而不出于簿書期會之間正非仲舒所以拳拳于帝之意也知仲舒之更化不在簿書期會之末則知仲舒有救弊之名無變道之實誠古今不易之常理從是而加之意焉則以之振起治功掃除積弊躋一世于唐虞三代之隆如聖䇿之所問誠無難者又豈在于變法易令而以多事自纍哉詩曰周雖舊邦其命維新陛下亦悟于斯而已矣謹昧死上對臣伏讀聖䇿曰蓋聞道者適治之路𫝊萬世而無弊者也仁義禮樂皆其具也紀綱法度所以維持治具者也堯舜之所以帝禹湯文武之所以王者用此道也臣有以見陛下探治道之本原而知帝王之為同條共貫也臣聞道無精粗治有詳略本末不可以偏廢而闔闢變化之用則固有所主宰也是故本原之所自則不外乎一心之微而治具之在天下亦不可一日廢此堯舜之所以帝禹湯文武之所以王固不外乎此道者然精一執中之妙密相授受于心𫝊之際而皇極之編九疇之㫖君臣上下所以孜孜講切者豈惟繁文末節之是務而庶績之熙九功之叙水土之平禮樂庶事之備固其形見之末效而斯道之本原固當求之于精微之運誠不外乎中之一辭而已不然堯舜禹湯文武之君不䏻捨仁義禮樂紀綱法度以治天下而繁文末節後世固欲持此以治天下不可勝窮之變則亦無具甚矣然則帝王之治固不難致亦惟探其本而不廢其末舉其全而不溺于偏求其所以致治之實用而不惟繁文末節之是徇則古今一天下也而豈有異道哉臣伏請聖策曰朕膺光堯之命承祖宗之緒思所以闡文謨而揚武烈者二十有三年矣志勤道逺治不加進夙夜祇懼莫敢遑寧故博延豪英訪以當世之務子大夫造廷待問必有藴而欲陳者臣有以見陛下念付託之至重思宵旰之愈勤疑治道之愈邈虛已以問承學之臣將以講明濟時之術也顧臣微陋何以塞明詔臣聞天下非治效不進之可憂而人情安于茍且因循之可畏以陛下勤政願治之誠邁越前古唐虞三代之治疑若盥手可致而二十三年于兹計算見效曽未之聞者是安可不求其故耶毋亦願治之心雖切濟時之術實踈士大夫安于茍且以為成習而天下萬事有不得其序耶臣竊觀陛下即位之始鋭于為治念版圗之未復憤强敵之未殄慨然奮發將一掃而清之一旦起故老于廢棄之中擢將相于儔常之列畀之大任責以成功而徒肆大言習為誕謾玩嵗愒日無補事功比比負責而去而陛下大有為之志亦自是少弛矣故夫前日之治傷于太急而今日之治又失之太緩惟其責效之速故誕謾之徒得以肆其欺罔竊取陛下爵祿而去惟其習于縱緩故庸常瑣瑣之流得以偷安固位自為保持之計上下茍且莫肯任責而治效之不進風俗日以壞士氣日以弱民生日以困刑罰日以峻徒為九重之𨼆憂而不思所以救弊之術者循是而不之反則天下之患殆將有出于意慮之外而何治功之可成臣願陛下思所以濟治之術革人情于極弊之餘正紀綱明賞罰毋徒徇于虛名而必責之實用則今日茍且之俗將易而為趨事赴功之臣則天下之治有所不為為無不成惟陛下所志耳臣伏讀聖策曰且唐虞之盛固未易議至若夏之尚忠商之尚質周之尚文皆綿世歷年不能無弊豈道有升降政有損益而然歟抑為治之具有未至歟臣有以見陛下想唐虞至治之極考三代治尚之偏圖惟厥中以為救弊之術也臣聞三代之治本于一道道之所在初無毫釐之差而救偏補弊特其濟治之術由于時變之推移而生于人情不可已者也唐虞之盛忠質文之名未立也而忠質文未始不為用忠之變而入于質質之變而入于文此其世變之使然有不容禦則周人之處此若其極弊不可為之世矣自常情觀之必將厭委曲而務濶疏棄文采而尚朴素以求還上古之無事也然周之君方且務為繁縟之典凡可以管攝人心而隄防風俗者纎悉備具是豈好為多事而繁文末節如後世之紛紛也哉彼其損益之相因無非因人情之所繫而維持設施之術固有出于法度紀綱之外此泰和之效所以並稱于唐虞而彌文縟典皆足以起當世之治使周之子孫世守而勿變則千萬世長在可也而何弊之可言陛下蓋亦即其所以救弊之術原其所以為人情之慮者略其異而反其同則唐虞三代之治亦在陛下運用而已矣奚必拘于形迹之末哉臣伏讀聖策曰今朕正心誠意體道之用將以格物而士風猶未一也敦本抑末崇尚禮教將以範民而俗化猶未醇也夫士風之不美以其無所化也今陛下以正心誠意之學將以致格物平天下之效而士風之未一得毋以承末流之弊而源或未之正乎夫俗化之不善以其不知教也今陛下敦本業而抑末作崇禮教而設防範而俗化之未醇得毋以流俗之漸漬者深而制度之不嚴乎臣聞古之士也上下相待以成其美後之士也上下相勝以敗其事夫仁義道德之本孝悌忠信之實古人之所以修于鄉黨處于庠序以為吾之所當為初無所覬于上而官爵祿位之設車馬衣服之奉古人所以用于朝廷之上者亦以為待天下士而非有德于下故士知修于家以待上之求上取夫士以為天下之用上之所待其士者愈厚故士之所以自待者愈不敢輕上下交相待而人才日以盛固其宜也後世則不然上設其爵祿以待士之求而士亦茍且修飾以有所要于上士懼其無以自達則巧取貪進不顧禮義而上亦懼其進之濫則多為之防以繩其來此後世之通患而按之今日則尤甚矣冒進之習滋廉耻之道喪茍僥幸于一得則抵法禁而不知畏天下固未始無卓然特立之士也而以一眚之過而絶其終身之善以一人之失而疑及天下之士則亦日流于薄惡而已矣而何怪于士風之不美歟臣故曰承末流之弊而源未之正也臣聞古之治天下者將以定民志後之治天下者將以便民情古者上自天子而達之于民尊卑貴賤之不相侔則服食器用之間截然等級之有辨古人非固為是無益之文也防間之不至則情僞之相滋樂好之不厭而弊將有不可勝言深為之節嚴為之限故民志一定而分守自明彼其趨向之一而風俗之厚亦其理也後世則不然舉聖人所以檢押人心者一切惟人情之便而偷風薄俗亦復蕩然于法制之外富商大賈得以交通王侯而鄉曲豪右無别于貴近自後世有所由來而較之今日則殆將不止于是者車服上僭宮闈家室略擬都邑輦轂之下四方之所觀瞻而此風益熾上下恬然相視不以為怪則亦曰流于無節而已矣而何怪于俗化之未醇歟臣故曰俗之漸漬者深而制度之不嚴也臣伏讀聖䇿曰義不勝利何以厚民之生刑不勝奸何以防民之僞夫率民以義則義之所在而利固存于其中則民心之知禮義若可以厚其生也而義或不勝乎利得毋以義利之不能兩立而趨于利則或違其義乎夫防民以刑則刑章之立可以不試而民畏也而刑或不勝乎奸得毋以刑所以防民而求以勝民則奸軌益不勝其多乎臣聞古者先養民又教民然後治民後世不知養民不知教民一于治之而已耳夫日用飲食之須冠婚喪祭之具聖人初非舉手以豫民也為之立其官師制其田里又教之以君臣上下之大分民既知教而民生益厚故民樂出其力以供上之用亦不以為勞我而且厲我也後世教養斯民之事曾弗之講民生之用皆民之所自為而上之人又從而征斂困苦之今日之民其無聊賴甚矣而何義之䏻知山澤之饒舟車之算香鹽茶酒之𣙜凡桑孔輩所以籠天下之利者無不悉為常賦有限復令先期常數既殫復令别配凡陸贄所以進諌于唐德宗者無不盡用陛下加惠元元勤恤民𨼆形于詔㫖無非以寬民力厚民生為言而守令之不奉行徒亦文具而已水旱有減放之令而督促如初嵗久有蠲除之科而追催猶故所謂禾稼如雲問之父老皆有憂色曰豐年不如凶年而況水旱相仍曽無虛嵗上下迫蹙如此欲民生之厚其可得耶臣聞古之制刑也所以厚民俗後之制刑者所以罔民利而已耳夫古之聖人不得已而制刑蓋為夫不孝不友不姻不睦者是禁而山澤之利無不弛以豫民而或為之限節蓋亦禁其末作之為害而非奪民利以自殖也後世不明聖人制刑之意而禁網之密條章之具無非與民爭利而茶鹽之商販酒𣙜之私酤毫髮之不貸纖悉之必計刑禁之既加而科罰又從而重困之今日之刑其寃濫亦甚矣而奚僞之䏻防故刑不足以勝姦則姦宄之習滋熾聚于山澤者為盜賊之區而刑餘之衆不得與齊民齒者亦將流而為盜陛下廣覆宇內逺近如一通商販之禁寬酒𣙜之征雖見于比年之詔而有司諉曰國用之所須無得以辭其責故上有仁心而下不被其澤有寬恤之美名而無寬恤之實惠所謂罔民以為利誘民以為姦不反其本而徒治其末欲姦宄之消其可得耶臣伏讀聖策曰意者仁義禮樂之用與夫紀綱法度所以維持治具者非耶何視古之有愧也誠如陛下所言則信知後世之治所以不如古矣陛下以古問臣臣不敢徒以古對陛下果有意于古也蓋亦稽唐虞至治之原參三代救弊之政一政令之未純乎古一設施之不合乎古者振起而更張之以作天下茍且因循之習以起天下趨事赴功之心則以之美士風善俗化厚民生去民僞亦惟磨以嵗月無不可矣不然陛下徒有慕古之名而無師古之實則今日之策臣者徒為故事而臣之所以告陛下者亦虛文而已是將奚益臣伏讀聖策曰伊欲道與世興風移俗易士相與談仁義蹈名節而不矜靡曼之虛文民相與興禮遜趨本業而不溺奢侈之末習八政修而食貨足七教明而獄訟息臣愚以為世有先後道無異同由本原之所自出而觀之越千載猶一日唐虞三代即斯道以為治既有以措天下于無為之盛況陛下心𫝊之妙得于授受之懿則施之事業移風易俗誠無難者若夫士相與談仁義蹈名節而不矜靡曼之虛文臣以為莫若有以正人心民相與敦本業興禮遜而不溺奢侈之末習臣以為莫若有以定經制夫禮義者人心之所同惟其利害得失之心日勝是以忠純篤實之意日亡是固科舉之法有以壞天下之心術也今陛下徒曰嚴法禁謹隄防足以革士風之習臣以為無以善人之心則未見徒法之可以自行也夫科舉之法後世既以取之天下之人材而天下之人材亦輻輳于科舉之內既取之于未用之初盍亦擇之于既用之後廣之以教化本原而示之以趨向之所在貪濁者黜之廉介者用之奔競者抑之靖退者進之旌直言以來諫諍伸士氣以通下情若是而曰士風之不美臣未之信也夫禮制固有一定之經人惟防範之既虧故至于蕩然而莫知限節是故民心之無常亦上之人無以撙節之過也今陛下徒曰躬節儉務朴素足以先天下之俗臣以為躬行之雖至而禮制不明未見徒善之足以有為也夫經制之不立古人以為正風俗之本則人心之無厭者茍于目前之便也今為之定其經制上而乘輿之服御固有其度降而公卿又降而士庶冠昏喪祭之節宮室器用之制嚴為限量設為科條踰者有禁斷于必行貪溺者無所歆艷而豪右兼并粟腐貫朽無所用之則民志定而爭端息無甚富之民則亦無甚貧之民無甚侈之家則亦無甚弊之家人心有常風俗歸厚若是而曰俗之未醇臣未之信也厚民之生則莫若講節用之策省民之刑則莫若謹按察之使今日之利源竭矣不可復興矣無已則有節用之說乎節用固多術也曩者固嘗限宮觀之員而宮觀之除濫豫猶故也固嘗省添差之數而添差之恩妄授猶昔也佞幸之賜得無有過度者乎虛籍老弱之兵得無有坐縻廩食者乎節之於彼而又節之于此則民生之厚庶乎其有自矣今日之刑濫矣不可以復峻矣盍亦謹按察之官而使之加意乎命官非不謹也州縣之間責成案于胥吏而長吏不以為意付箠楚于獄卒而獄官慢不知情郡刺史足跡嘗一至于圜土之門乎監司之按行又䏻盡得于一見之頃乎謹之于彼而復謹之于此則好生之德庶乎其洽民矣捨是而曰八政修而食貨自足七教明而獄訟自息臣恐未免于揖遜救焚之舉也臣不佞陛下召至闕廷賜之清問臣首以更化為陛下獻次願陛下正人心以美士風定經制以善民俗次願陛下節財用以厚民生謹按察以省刑罰以為更化之說請復為陛下終始言之臣觀藝祖皇帝為天下除大殘致更生兵不血刃而天下歸戴征伐既下諸國必先己逋斂蠲繁苛一以仁厚為本大抵兵以不殺為武刑以不用為威財以不費為饒人以不作聰明為賢此其立國之本意而列聖守之以為家法者也仁宗慶歷間承平既久一時事類少弛仁宗一旦振起之不過于增諫員減任子展磨勘雖一二節目之或殊而大體卒不改易故嘉祐之治振古無及社稷長逺終必賴之由此道也臣以更化為獻亦豈勸陛下以變更祖宗之法度哉士大夫之偷隋者從而振作之王業之偏安者思有以規恢而廣大之萬事之積廢者思有以作新而奮厲之而不失祖宗立國之本意則士風之日美民俗之日醇民生之厚而刑罰之清固有不期而致則聖䇿所謂措國如唐虞巍乎跨三五之隆而無忠質文偏勝之弊其策捨此將安在耶陛下復策之于終曰熟之復之詳著于篇朕將親覽臣有以見陛下咨訪之意益勤而使臣等得以竭其愚衷也臣不度愚賤切有拳拳憂國愛君之忠一旦得奉清光條當世之事陛下所以問臣者固已略陳于前若天下大體之所繫而國家安危理亂之所從出者雖聖策之所不及而臣安敢有懷不吐上負陛下詳延之意敢為陛下畢言之臣聞宰相者朝廷之股肱也臺諫者朝廷之耳目也非有知人之明不足以進賢退不肖非有碩德重望不足以鎮撫夷狄非有不窮之才不足以贊萬機之務擇相而任之者不可以不謹也非有公忠之操不足以排擊姦回非有剛强之守不足以肅清班列非有髙明之見不足以裨益冕旒擢臺諫而付之者不可以不審也茍曰以其久位而姑以遷之幸其無過而因以任之則何以稱其具瞻之望起非常之功専求州縣之下吏搜索錢榖之細務姑以應故事而朝廷之闕失國家之大議有不敢言則何以通幽隱之情輔聖明之德臣願陛下委任擢用之際詳擇而審處之疑之當勿復用用之當勿復疑必有以盡其才然後可也陛下愛惜名器必無濫豫之爵然技術藝䏻之賤或充斥于朝路而宮掖非泛之恩或不厭于公言可不有以節之乎陛下親近儒臣必無偏信之失然是非毀譽之說或間出于細微而士大夫結托之私或競趨于權要可不有以抑之乎陛下誠于是而留聽焉任宰相而重其股肱之寄用臺諫以謹其耳目之司惜名器以勵天下戒偏信以示至公則所以䇿臣四者之弊特不過于事為之末非聖明之所慮也臣是以終篇之末論次其大者以為陛下獻若乃䌟績故實以為有學雕繪言語以為清新臣不惟不敢亦不暇惟陛下赦其狂僭而録其區區臣無任昧死臣謹對袁說友上言曰臣仰惟陛下踐阼以來虛心受人廣覽兼聽如堯之清問下民舜之舍己從人禹之拜善言湯之從諫弗咈殆無以過此者委任大臣深得垂拱仰成之體咨謀臣下無愧詢于芻蕘之風仁心仁聞出于天資好善好賢根于至性本朝蘇軾嘗曰有君如此其肯負之今臣下委質盛時際遇明主真千載一時之遇倘不䏻以忠言嘉謨確論至策仰副陛下虛心願治之意則是有負陛下豈特天地鬼神得以誅之而己臣竊惟今日之事外若不足憂而內實可憂者其最大者有二曰兵與民是已民力日困凡士農工商無一而不貧乏者民為邦本本固邦寧今百姓外困于征輸內困于衣食仰事俯育一無可恃時平無事未見其害或有水旱之灾兵革之困民力單弱國無慿藉變故百出不可縷舉豈不少思于閒暇之時哉軍政日隳凡伍符尺籍其可用者十無一二故家宿將零落已盡紀律弊壞人無鬬心軍士飢寒十户九怨上下相蒙恬不逺慮將帥驕懦語戰縮首一有緩急兵窮無藉將弱無策安危之機非意可料豈不少思于無事之日哉陛下虛己任人有言必聽臣下不于此時為陛下殫智盡慮畢精竭神思其為策能令可行者以急先于兵民之務使民力寬裕邦本得以植立軍政修明緩急可以憑恃矣此時而不為是無時而可為也臣愚欲望陛下先以民力軍政為重下臣所奏命侍從臺諫卿監郎官帥漕二司各以聞見凡寬民力修軍政害所當革利所當興者悉意畢陳求其確然可行之策毋為甚髙難行之論度今必可施行而必有補于二者不計項目多寡詳悉奏陳其修軍政一項併令三衙帥臣條具並各限一月奏聞然後下之宰執大臣掇其必可行有補于二者于清閒之燕次第敷奏而施行之毋責近效毋憚小勞毋怯浮言使民力以寬軍政以修時平無事則外內無患或有緩急有民可恃有兵可役相與維持憑藉無一而不可為也臣冒犯天威無任激切屏營惶懼之至說友又上言曰臣聞復古有道得天斯復古矣得天有道得民斯得天矣仰惟陛下憂勤萬機規恢廣大宸衷宵旰思集大勳而算計見效殆未什一是豈終不可為哉臣嘗觀自古立大事者必先于得民民心既得天意自順天之所與雖弱必彊天之所違雖順必逆天不可以智得而所以得天者實自斯民始三代之得天下漢唐之創大業載在方冊其道可考又豈待臣一一而縷舉哉是故民力裕則民心自得民心得則天意自悅天意悅則年榖自成年榖成則上下自足上下足則富國彊兵惟所欲為無不如志此自然之理必至之效如形聲之相應枹鼓之相隨確乎其不䏻易也陛下臨御以來焦勞愛民弗替朝夕隂陽一有愆伏則踈釋囚繫如拯飢渴臣寮一有奏陳則旋即施行常若不及遇凶荒而賑給因水旱以蠲租陛下之于民可謂無負矣然州縣之間多有視詔令為虛文指生財為政事縱掊克為舉職矜羡餘為己功習熟見聞恬不知革所以上負陛下德意者日以滋甚臣請得而粗言之夫聚人以財固所當務也然陛下豈欲使之朘民膏血以媚公上哉上供之外朝廷初未嘗一毫有取也凡今為州郡者多立名色巧為征取屬邑之苖命官量覆必欲使之出剩本州受納不問多寡必倍數而可充又有胥吏無窮之須呈樣沒官之費終嵗勤動僅足官輸反顧所儲已如垂磬而又廣為稅目征取百端雖民間日用之物僅及數金悉皆收稅間有科稅典貼敷納收金叉鬟有征蔬菜有稅民間昏姻驅令市酒錙銖不遺無異丐取剝膚椎髓民心嗷然外以為苞苴權貴之資不一而足內以供溪壑亡厭之欲以遂已私若民間之詞訴官吏之䏻否一切漫不加問蓋有越月而不一聽訟者彼謂府庫之積方盛可以媒陛下之爵祿曾不知百姓不足君孰與足是豈為朝廷之福哉此州郡之害民未能盡免也郡欲生財也則取之縣縣欲生財也則取之民上下相迫勢必至此凡今為邑者懼州郡之欲出剩也則納苖之耗一嵗一增今固有小户一嵗而兩輸苖稅者矣懼州郡之欲折絹折綿也則增益匹兩以為耗數今固有和買稅絹綿耗視米耗者矣懼州郡之欲和糴也則不以多寡科抑人户今固有納三石而得一石之直者矣懼州郡之欲催缺也則合零就整增益數目今固有以零合為零斗以零分為零尺者矣又有無名之求興修之役科罰里正抑勒鄉民其名苛細詎可槩舉官吏侈然為得計百姓赴訴而無繇此縣道之害民未能盡免也部刺史澄按一道尤陛下之所寄耳目而導德意者今也不然凡遇到任必首遣屬官遍行諸郡剗刷錢物過為數目責令供認所至苛取一問名色悉歸本司州郡不堪其須旋即取之縣道上令下應殃及于民已放之缺復征未辦之輸預納私行科折以取贏餘譬之心腹病于內而手足耳目欲其自佚于外不可得此監司之害民未能盡免也商賈之稅各有定制諸司分隸亦皆有則若取之以道商賈復何病哉今州縣間謂之稅場者苛取細征私立稅額固有負千金之直而稅五百金者有僅及百金而過取其半者有士夫經由而發其箱篚者有不五十里而兩為攔稅者絲粟必取如被寇攘村落之間强弱相勝或瀕于死朝廷豈得而盡知哉此徒以負販為生非此無以自活而官司重稅進退不容舟車怨咨溢于行路此稅務之害民未能盡免也向者陛下軫念都邑加惠小民命臨安出公帑以償諸行之直至今小民及此手必加額然臨安非它郡比雖一日之間所須固已百出稍積嵗月其擾諸肆又甚于昔時況年來土木之役接踵而起朝廷典禮相繼舉行凡所須求莫非臨安辦集其間所用百物悉科鋪户皆千百計往往什未酬一小民僅有儲偫一旦官司直取略不敢以伸氣生理零落權輿在此夫京邑四方之根本也今無故使諸行日迫窮困浸以寒餓恐非陛下加惠京邑之意此臨安之擾民未能盡免也凡此五條亦姑舉其大略臣亦安得而備言哉竊惟陛下方以大有為之志慨念中原力圗復古而臣乃以愛民迃緩之說以獻者蓋民心恱則天意得天意得則雖少康之一旅光武之八千天將畀之以機會矣臣伏讀太上皇帝聖政嘗欲罷月樁錢諭輔臣曰朕欲養兵全藉民力若百姓失業則流為盜賊矣大哉王言真陛下之家法也臣願陛下洞照古昔興衰之理仰則光堯愛民之訓深憤州縣害民之久力行仁政以得人心務寬民力以悅天意今州縣之間己皆安于掊斂矣非陛下曠然大變有以號召而勸沮之則又不過為虛文耳臣愚欲望陛下亟發德音備及年來州縣害民之意如臣前所陳者播告天下監司守令丁寧懇惻詳復而申戒之具言自今一以愛民為功以言羡餘為罪庶幾州縣少變舊習亦使中外百姓知陛下本不敢少忘如此仍乞即賜詔㫖令侍從臺諫兩省官各以當今何事為及民何事為害民條具可行者奏上陛下與大臣詳觀其說言有可取不以異議而見廢茍有非便不為己行而憚改如此則民心得于下天意悅于上未有得乎民不得乎天得乎天不能復古者也孔子論顓臾之伐而先之以和無寡安無傾孟子論戰必勝而首歸于人和孔孟之言陛下所敬本朝蘇軾作思治論謂能從衆可以北取契丹呂公著上朝政疏百姓安定然後可以足兵食禦外侮惟陛下不以臣言為緩不切實天下幸甚楊萬里上奏曰臣聞聖人之伸于天下也有神而其屈天下也有威威藏于神故其威不測神行于威故其神不狎蓋天子以一身立天下之上其力為至孤立而不失其立則治而興否則亂而亡其勢為至危然以至孤之力而天下附焉以至危之勢而天下憚焉附焉則不離憚焉則不抗不離故孤者强不抗故危者安孤轉為强而危反為安則神與威在焉故也神去則天下離之矣威脫則天下抗之矣天下離與抗而後孤危之形始見聖人之神與威獨可頃刻脫而去之而不執而留之哉然則其孰為神孰為威聞之曰表無當于裏而裏非表則不存右無當于左而左非右則不全物固有睽而合殊而同二而一者是故淵非龍也而龍之神在于淵山非虎也而虎之威在于山何也龍不淵而陸虎不山而柙則龍虎之神與威不在龍虎而在童子之尺箠矣故龍不可離于淵虎不可離于山而人主不可離于柄柄也者人主之山淵也歟上執其柄則神與威不在于下下竊其柄則神與威不在于上觀柄之所在而治亂見矣執柄以明用明以公而害明者偏也進退人才罷行政事號令之出納賞罰之可否此非人主之柄歟是柄一去則所謂人主者人主之名存而人主之實亡惟天下之至明者能使是柄在己而不去夫何故天下之至明者其初天下未測其明也未測其明則其下必有以嘗之否則欺之取天下之所是而雜之以非取天下之所非而亂之以是以探其上而幸其惑是謂嘗嘗而不動也嘗而動則易其真是者而誣之以為非蔽其真非者而文之以為是是謂欺故古之明君居明以晦以俟其所嘗而出晦以明以破其所欺彼狎吾之晦而嘗者至矣嘗則繼之以欺然後吾之明一發焉則然出于其所嘗之外而卓然不墮于其所欺之中夫安得不服則其柄宜誰歸故曰執柄以明齊威王有焉一人之明以合天下之明合天下之明以為一人之明者天下之公明也以一人之明廢天下之明者一人之私明也古之君有百發而天下不服有一發而天下大服則公與私之異也然則其曷為公不罰天下之所同賞而不賞天下之所同罰顯詢而隂求衆問而獨決顯詢而不隂求則姦不召矣衆問而獨決則同者不欺而欺者不行矣于是擇天下之善惡大且顯者而賞誅之則明一用而天下不以為察故曰用明以公舜有焉古之君失其柄者皆暗者也暗則失其柄固也而愈明者愈失之何哉明者多恃而善疑此偏之所從生也明則偏矣偏則不明矣蓋恃者以明出于己為矜而以明出于人為愧疑者以親昵為可信而以公卿大臣為可防以明出于人為愧則舉朝不敢有言非不言也言而莫之入也以公卿大臣為可防則舉朝不敢有為非不為也為而莫之行也當是時天下之柄亦可謂不移于臣下而天子之勢可謂尊矣而君子未敢賀也何則收于前而移于後防其一而不防其一也公卿大臣不得以議之于公則親昵小人得以侵之于私天下之人但見今日行某事也明日用某人也而不知其所從來也非謀之于左右也非謀之于諸大夫也非謀之于國人也豈天子遍察天下之事而盡識天下之人歟或曰此宦者之力也或曰此外戚之力也或曰此宿昔幸臣之力也夫是三人者天子以為親昵而可信也不知其乘吾信而逞其姦也以為隂可以助己之明而外不知也不知其蔽己之明以盜其柄也其初不疑其姦其終禍其國故曰害明者偏也漢之元成唐之德順有焉春秋傳曰捨大臣而與小臣謀楚莊王曰無以嬖御士嫉莊士偏聽生姦獨任成亂鄒陽所以言于梁兼聽則下情通偏聽則下情壅魏徵所以言于唐少師亂隋子翬殺隱祿産危漢朱异亡蕭奈之何漢唐數主之不悟也今以主上之聖明而躬攬天下之柄豈容有漢唐季世之事雖然漢成帝知惡石顯而不知王鳳即顯也唐憲宗知惡王叔文而不知皇甫鎛即叔文也非不知也明于人而暗于己也臣願聖天子以古而察于今蓋當石顯王鳳裴元齡王叔文用事之日元老大臣之廢退蓋有出其意者矣姦邪小人與夫戚里佞幸蓋有介其援而至宰相侍從固結而不解者矣蓋有忠臣義士排之不勝而反被其禍者矣此天子之柄所自移而天下之亂亡所自出者也陛下聖學髙明洞視萬古讀之至此以為是耶非耶盍于燕閒之餘思漢唐羣小之禍而以此數事默觀而深省焉今日其無是事乎可以自慶而塞其未至之門其有是事乎可以大懼而拔其已植之根察之察之又重察之逺邪枉而親正士則自宰執至于侍從經筵臺諫館閣之臣孰非聖天子之腹心耳目哉政事也人才也號令也賞罰也疑焉則以問之是焉則以行之非焉則以詰之欺焉則以罪之不一從不衆違則堯舜之聖一武而至矣豈若漢唐四君盡疏千萬人而獨信一二親昵小人也哉為虺必蛇履霜必冰臣不勝忠憤萬里又奏曰臣聞為國者其患在于有敵而無暇有敵而無暇則其立也不固而其應也不詳非立之不固而應之不詳也欲固而無暇于固欲詳而無暇于詳也何也有敵而無暇則休息之日常不加多而戰鬬之日常不加少戰鬬之日多故居者負擔以立田者操兵以耕而守者被介胄以臥休息之日少故有心不及運有口不及議而有智有勇不及施夫如是立安得而固應安得而詳哉天之生萬物者春也而生春者非春也日之明萬物者晝也而生明者非晝也春不䏻生春則生春者冬也晝不能生晝則生晝者夜也何也冬者天之暇而夜者日之暇然則和也者戰之暇也歟雖然為國者患無其暇亦患有其暇有其暇而用其暇者暇也有其暇而安其暇者偷也是故暇䏻福人之國亦䏻禍人之國孟子曰國家閒暇及是時明其政刑雖大國必畏之此用其暇者也又曰國家閒暇及是時盤樂怠傲是自求禍此安其暇者也越王會稽之役請成于吳吳以為真請也不知夫越之將求其暇而用之也是故王女女王大夫女女于大夫士女女于士勾踐不耻也輸以寶器玩以女樂勾踐不愛也惟不耻故有以復其所大耻惟不愛故有以保其所甚愛會稽之栖耻之大也社稷之存愛之甚也夫惟其小者無所耻無所愛故國中之民疾者吾得以問死者吾得以葬富者吾得以安貧者吾得以與賞罰物備吾得以審車馬兵甲吾得以具夫是數者得以盡而吳固在其股掌矣彼夫差者方且疲于伐齊之行驕于黃池之會而不知越人固已制其死命蓋越得其暇而吳不得其暇越用其暇而吳無暇之可用此之謂暇䏻福人之國北齊與周不兩立也非齊併周則周併齊爾而齊主恃周寇之小息君臣謂一日取快可暇千年至有無愁天子之號周師之克晉州也猶曰小小交兵乃是常事故齊亡陳之與隋不並存也非陳併隋則隋併陳爾而陳主恃隋人之交聘君臣謂王氣在此敵何䏻為至于縱酒賦詩而不輟隋師之濟江也陳主尚醉守江者亦醉故陳亡此之謂暇亦䏻禍人之國今天子即位五年于此矣頃者天子之所以宵衣旰食公卿大夫之所以竭心盡慮者惟支持强寇一事而已至于法度紀綱教化刑政之具所以開中興而起太平者皆未及也非不及也無暇于及也今者講解既成邊候不驚是猶謂之無暇歟有暇矣而廟堂之議所謂法度紀綱教化刑政之具又不及焉臣不知天子之所以宵衣旰食公卿大夫之所以竭心盡慮者何等事耶將以講解而偷朝夕之安耶將未忘中興之計而猶有意于堯舜三代之治也若曰偷朝夕之安則齊陳之禍可以懼矣孟子之言可以警矣若曰未忘中興而有意于太平之治也則臣不知其未忘者何䇿而有意者何議也臣但見今日出令曰申明條法而已明日出令曰士民不得服凉衫而已不知天下之事猶有大于此等否耶抑亦深謀密議天下不可得而見耶臣甚懼焉昔晉武帝臨朝惟談平生常事而不及于國家逺略何曾知其必亂王導辟王述為掾既見首問米價君子是以知江東之不振也今日之施得無與談常事問米價者類耶夫無暇則憂有暇則休天下之事百變如雲萬轉如輪一旦敵人又動則又曰無暇臣不知紀綱法度教化刑政之具所以開中興起太平者何時而可議哉詩曰淇則有岸隰則有畔今欲治而茫無畔岸臣欲不懼得乎萬里又奏曰臣聞天下之不治非起于莫之舉常起于舉而莫之隨舉而莫之隨則上之人自舉而自廢一政之出一令之行十人聽而一人不聽宜未害政令之流行也而政令之不行未始不自一人不聽始夫何故十人聽一人不聽則十人者必觀夫一人者觀之者試之也試淵以綆試刃以堅而試十以一一者不聽而上不問則十者之聽亦將反而為不聽古之聖人必有以杜天下之觀以弭天下之試以齊乎天下之聽夫天下且相與觀而莫之見試之而莫之測則天下之聽安得而不齊天下之聽齊則吾欲前而前欲却而却欲左而左欲右而右惟吾之為無不隨者當此之時天子患不舉爾舉而大有為焉夫誰我禦今天子非無神聖英武之資非無開中興起太平之志然五年之間殊未有以大慰天下之望求强而得弱求治而不得治此其病安在哉公卿大臣後國而先家先身而後君莫肯橫身以當天下之大難搢紳士大夫甲可乙否各求其說之勝而上之人不知所定三軍之士天下之民玩習于偷惰雖作之而不起令之而不從是故天子有其資而無其扶有其志而無其應一舉而天下不隨則自罷而已矣此豈非中天下之觀墮天下之試而未有以致天下之齊故歟然則何以致天下之齊將有以齊天下必有以聳天下將有以聳天下必有以變天下小變則小聳大變則大聳小聳則小齊大聳則大齊方嵗之新乾坤之晏溫動植之寧止豈不可樂哉而一坐笑談未竟之間或失色于迅雷之驟驚慢者肅伏者興勾者達天地造化之政令發于頃刻而遍于四海莫敢或玩而違之者變而聳聳而齊也玩而不變堯舜禹湯文武不䏻以為治湯繼夏則變夏夏之政禹之遺也武繼商則變商商之政湯之遺也後之言治者必曰不復三代則不可而湯也不復禹而變禹武也不復湯而變湯是二聖人者豈捨彼之成從我之矜者耶變之者復之也湯變夏之政而湯之治復乎禹武變商之政而武之治復乎湯非復而何期于治不期于政要其是不恤其異故湯武一變而天下聳然而更新陛下蓋繼光堯者也繼光堯而變光堯可乎非變光堯也自變其變也且光堯曷嘗不變異時治極而弊亦極紹興之初一變而純用元祐之政以作天下之偷故風采􅏮然至今使人興起其後權臣柄朝恭已既久一旦赫然黜姦黨收威令以還朝廷之尊故破强敵授聖子出于一日之獨斷而天下不知其所自來陛下即位五年而未大治則光堯之所以變之之方獨得而緩也哉變必有要要必有先今之變其孰為要孰為先聞之曰法不必行不如無法人不任責不如無人今天下之大患不在于法之不備而在于法之太詳不在于賢人君子之不衆而在于人才之太多何者法備而不必行人多而不任責故也然則今日之事欲一舉而變之盍欲刊其法之繁以必天下之從一其人之責以閉天下之遁而後天下可為也昔者唐虞象刑而夏后肉辟三千漢髙祖約法三章而武帝增至三百五十九夫以法之繁簡而較其功夏之治宜過乎虞而髙祖之治宜不及乎武帝而乃不然則法果在于備乎晉范文子有功而歸則曰郤克之教也臣何力之有至庾亮敗于張曜而商融言于陶侃曰將軍為此非融所裁周公曰惟王有成績而梁武侯景之禍蓋生于朱异也异不職其咎而使武帝歸之時運夫古之君子歸功于主將而後之君子歸過于主將古之君子歸功于其君而後之君子不任其過而使其君自任其過人之不肯任其責也如此今也兼歷代之憲承烈聖之制法不可謂不備法備而不治則非不備之罪也備而不必行之罪也科舉任子之所取軍功之所奏動以千計才不可謂不多才多而不治則非不多之罪也多而不任責之罪也臣何以知法備而不必行法之說曰茗之私鬻者其罪流民之不飲酒不茹葷而習妖教者其罪死夫罪至于流與死不為不重矣而鬻私茗不肉食者不止也何也有重法無重刑有重刑無重罪也非無重罪也不勝其重也非不勝其重也不勝其衆也衆則難于重重則難于必且夫以銖兩之茗易錐刀之利則執而流之至于小民以貧不䏻自存則絶肉味以求一糲之飽則又執而殺之以情而言君子亦有所必不忍者矣必不忍之心生則必不行之法見民見其法而不見其心則曰上之法皆然也法者驅天下之具也其具廢則其驅弛有急而求其從其誰從之臣何以知人多而不任責人之情固有所欣有所憚宅清顯而享豐腴此其欣也應紛擾而當危難此其憚也天子者執天下之所欣以招天下豈以茍恱天下之私哉捐之以所欣蓋將屬之以所憚而今之士大夫自許以勇于所憚以邀其所欣既得其所欣則避其所憚無事之時服章焜煌步武虛徐天子出而臨之雖虞之野無遺賢周之濟濟多士未足喻也然寺監者曰吾曷不臺省也郎曹者曰吾曷不侍從也侍從者曰吾曷不宰執也宰執者曰吾曷不二十四考中書也階嬖幸以進名曰捷徑挾諂曲以進名曰稱㫖植黨以進則名曰客聚斂以進則名曰才朝攘夕爭患失而憂不得一何勇也至朝廷卒然有一意外之事天子呼某人而問之則曰臣何足以知之又呼某人而委之則曰臣何足以奉明詔貪者求免事而不求免官畏者求免官以逺避其事又何怯也惟其勇于彼是以怯于此而朝廷不悟也且豈有身為上宰而天子使之將兵禦敵則以親病辭者天下有緩急而宰相尚不可使則他人安得而使之使之則曰彼實為宰相子焉䏻戰臣愚欲深詔有司刪法令之細而不急者大而不可行者重復而可以弄者如太祖皇帝時法度簡而要明而信設者必用存者必行不與天下為戲庶幾天下之可驅天下雖無事也不測而擇一事大而且難者詢之衆而遣一所厚之大吏為之避而不為則誅如唐太宗之斬盧祖尚為而敗事則誅如舜之殛鯀則天下之怯可以一變而為勇夫天下之人可驅而天下之怯皆勇則國可强而敵可取開中興起太平臣心了然見其易易爾歷代名臣奏議卷五十
