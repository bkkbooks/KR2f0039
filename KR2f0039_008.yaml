body:
  text: 歷代名臣奏議卷八明楊士竒等撰聖學宋徽宗即位初右正言鄒浩上奏曰臣竊觀自昔才智之君固有務學以為先者然而學非其本失所以學終不足以成帝王之髙致記曰欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物此學之本也又曰物格而後知至知至而後意誠意誠而後心正心正而後身修身修而後家齊家齊而後國治國治而後天下平此所學之效也揚子曰學之為王者事其已久矣堯舜禹湯文武汲汲夫堯舜禹湯文武皆萬世所仰以為帝王之師者也尚汲汲於學而不敢怠為人君者其可以忽此乎恭惟陛下天資聖神羣臣莫及方且延納名儒入侍講讀招來讜論用廣聰明固已卓然知所務矣所以為學之本更望深賜察焉雖處宫闈之間常若對乎天地則知人安民自如帝堯能察邇言自如帝舜身為法度自如大禹不邇聲色自如成湯卑服即康功田功自如文王垂拱而天下治自如武王其事豈不至約而其功豈不博乎陛下不以臣愚而廢其言不勝幸甚翰林學士兼侍讀曽鞏上奏曰臣竊觀近世帝王善為治者莫如唐太宗人臣善言治者莫如唐陸贄太宗貞觀之治論者以謂庶幾成康自漢以下莫及焉雖聰明英武出自天資然其要乃在於廣延賢智博考古今容受直言從諫不倦故唐史官掇其大者别為一書謂之貞觀政要陸贄事唐德宗自為學士至宰相知無不言言無不盡蓋其議論反復條暢切於事情周於世用而要其歸必本於帝王之道必稽於六藝之文雖賈誼董仲舒不能逺過焉今其言見於世者有奏議數十篇此二書雖一代之文章實百王之龜鑑卷帙不繁詞理明白臣愚伏願陛下退朝之暇紬繹經史之餘取二書置之座右留神省覽如御珍羞必有以開廣聰明上當聖意發言行事以此為準庶於盛德有補萬一殿中侍御史陳師錫上奏曰臣伏聞今月八日有聖㫖宣取祕書省畫圖進覽格入神妙可以閲目非有補於盛德六經載道諸子談理歷代史籍祖宗圖書天人之藴性命之妙治亂安危之機善惡邪正之迹在焉以此為圖天地在心流出萬物以此為圖日月在目光宅四海伏望聖慈觀心於此則天地沖氣生焉注目於此則日月祥光麗焉唐以山水圖代無逸左右前後無所警戒動靜語默無所龜鑑社稷至於陵替不可支持臣聞心以道觀則正目以德觀則明國壽可以不損天下可以不亂愚夫之言智者擇焉願留聖懷無忽右正言陳瓘上奏曰臣竊惟人君稽古之學一經一史經則守之而治身史則考之而應變天下之事其變無窮故往古可監之迹不可以不詳知也仁宗嘗謂輔臣曰朕聽政之暇於舊史無所不觀思考歷代治亂事迹以為監戒也英宗命儒臣論次歷代君臣事迹可以為監戒者既上通志八卷又命置局續修書成取㫖賜名神考繼志述事賜其名曰資治通鑑又親製序文炳若雲漢為章于天自然之功變化出焉臣嘗三復明訓掩卷歎息以謂諸史所載數千年事文字繁多不可勝覽窶儒寒生業專習一窮年皓首猶或昧陋仰窺聖作區判事類數語之間盡史之要翕受以畜德敷施而日新堯舜之所謂稽古何以加此而況不忘謙抑俯比漢唐自謂於文宣太宗無間然矣自餘治世盛王得聖賢之一體者皆有取焉至于荒墜顛危之主亂賊姦宄之臣可觀可監無不悉論以著聖志蓋自祖宗以來聖聖相繼稽古之學同乎一心以後述先非一日之積也至于神考然後典刑之總㑹策牘之淵林底于成就繼而張之正在今日恭惟皇帝陛下道隆業大極本該末揆萬事而復乎一制羣節而適於變六經妙義既自得於心術之微而於前古已陳之迹又盡心焉今經筵將開而進讀之官當循舊例泛讀諸史文字繁復事實支離不得其要未周于事伏望聖慈特降睿㫖候經筵開日令侍讀官讀資治通鑑以承神考所以繼述英廟緝熙聖學垂訓後嗣之意瓘又奏曰臣聞周官司徒之教有六德有六行有六藝禮樂射御書數所謂六藝也教亦多術矣而藝居其末藝亦多術矣而書居其末元豐中王安石進字說表云先王立官以教之者謂司徒六藝之教也又曰蓋將以合乎神㫖者布之海內神考讀其說而好之玩味不忘可謂合乎神㫖矣然不以布之海內者何也以教化之本不在文字故也神考之所以教天下者可謂知本矣紹聖中用事之臣必以字說頒之海內違神考之心矣又況咀嚼莊老之言而不由其道斥絶稽古之學而求利於已普之王衍嘗用此術倡為虗無鼓舞天下朝野翕然謂之一世龍門後進之士莫不景慕倣效選舉登朝必由於衍矜髙浮誕遂成風俗於是人心支離天下分為南北者三百餘年當時識者以謂王衍之罪過於桀紂言其以荒唐之學偏私之說蒙蔽人主而養成天下之亂也景德元年王欽若請幸金陵當是之時若無寇準則天下分裂久矣既往之事今可監也天佑我宋今日以前幸無不虞之變故欽若之計未及施行南北之士復得同心以向陛下然而王衍之言入於骨髓滌除㾗垢非一朝一夕之所能也唯願一經一史緝熙堯舜稽古之學則天下之士皆當觀上而化矣建中靖國元年給事中上官均論治天下在好學廣問上奏曰臣聞人主之治天下一日萬機不可勝察也而明君操術蓋有至要可以不勞而治蓋好學則知天人之道通古今之變好問則察羣臣之情達天下之政通古今而達事情物理豈有不燭注措豈有不善哉說命曰念終始典于學揚雄曰學之為王者事其已久矣此言人主之不可不好學也仲尼稱舜曰舜好問而好察邇言孟軻稱舜曰大舜善與人同樂取諸人以為善仲虺之告湯曰好問則裕自用則小此言人主之不可不廣問也然而人主之學異乎人臣之學何則人臣之學或以文詞為工或以博記為能以文詞為工則有不適用之患以博記為能則有不燭理之蔽非所謂善學也人主之學在乎簡而知要達而適用知要在乎明道明道在乎味五經之微言適用在乎逺觀前世治亂盛衰之迹而近稽祖宗聖明相繼治天下之意因已然之迹而考其理亂因理亂而鑒其所以得失可以知要而適用矣此人主之好學所以為先務也天下之政有利有害百官之衆有邪有正非廣問而參稽之則利害未易見邪正未易明利害未盡見則事或過舉邪正未盡明則姦佞之徒或乘間而害正此人主之好問所以為政之要也臣竊觀陛下寬仁而有斷中正而不偏清淨而寡欲溫恭而盡下可謂有上聖之資矣臣願陛下退朝燕閒觀經閲史以明理義之大致達治亂之大體因進對之臣虗心下問以考政事之得失觀羣臣之志趣如此則天下之義理臣下之邪正判如白黑之辨矣臯陶之告舜曰在知人在安民禹曰知人則哲能官人安民則惠黎民懷之燭義理而辨邪正則能官人能安民矣堯舜之治天下不過如此矣徽宗時左司諫江公望上言曰義理者有心之所同得芻豢者有口之所同嗜口之悅芻豢以得味也心之悅義理亦必得義味而已矣學不得義味淡薄而難向勤苦而不入髙宗有聖人之資傅說告以念終始典于學成王有中才之質羣臣戒以學有緝熙于光明有聖人之資而輔之以學則愈明有中才之質而不忘于學不失其為太平守文之主學之為益也如此然日誦月閲不過於章句誦數之言陳腐入心祇益昧爾奚補於髙明哉以神考明智聖學出於天性兩漢而下曠千百年異代一君而已王安石發明義訓貫穿六經軻雄而下一人而已君臣際㑹日就月將聖德日躋羣臣莫可企及陛下有志於繼述願以聖學為先講讀之臣陛下親邇以求多聞者也詳延精義之學切磋琢磨疏㵸心源斟酌義味王功帝績自此流出法度政事乃土苴爾今淺夫佻士以雕組之末技誦名數之曲學更相唱引使一日得志必指聖學為迂闊而不切治務此理一變天下復愚矣改為自此紛紛法度掃地陛下此時悔將何及蓋義理之學上以窮性命之微下以達先王制作之美意故不可不學學不可不知所先後知所先後則得主矣攬持要妙卓然獨立曠然遐覽仰因天時俯察人事斟酌損益要之不悖義乖理以成治世之通法真得所謂繼述者也夫瑟不鳴而二十五絃各以聲應要在柱也膠柱而求之則不能善矣惟陛下財擇欽宗靖康元年起居郎胡安國上奏曰臣聞明君以務學為急聖學以正心為要心者事物之宗正心者揆事宰物之權也自王迹既熄微㫖載于六經時君雖或誦說得其傳者寡矣陛下心源澄靜聖度虗明蓋天祐大宋篤生真主使撥亂反正建中興之業也臣竊意陛下昔在東宫潛德韜晦其於六經所載帝王制世御俗之大略必有所避而不欲問官屬之司勸講者必有所隱而不及陳今正位宸極日月益已久矣而成效未見其於古訓不可以不考若夫分章析句牽制文義無益於心術者非帝王之學也伏願陛下慎擇名儒博通經術明於治國平天下之本者虗懷訪問以深發獨智繼文王克厥宅心之道以馭四海實天下大幸臣愚智識膚淺等於芻蕘惟陛下裁察朝說之上奏曰臣聞春秋尊一王之法以正天下之本與禮之尊無二上其㫖實同蓋國之於君家之於父學者之於孔子皆當一而不可二者也是以明王罷黜百家表章六經大儒推明孔氏抑黜百家今國家五十年來於孔子之道二而不一矣其義說既歸之於老莊而設科以孟子配六經其視古之黜百家而專明孔氏六經者不亦異乎前者學官罷黜孔子春秋而表章僞雜之周禮以孟子配孔子而學者發言折中於孟子而略乎論語固可歎矣今皇太子初就外傅之時命宫寮講孝經而讀孟子蓋孟子不當先諸論語者也如以孟子先諸論語豈所以輔導皇太子天資邁世之令質而視之以一德哉臣愚竊以謂宜講孝經而讀論語恭俟講說孝經畢日復講其已讀之論語則其入德亦以易矣或間日讀爾雅以視文字訓詁之本源而明天地百物之名實先儒謂爾雅本是周公訓成王之書信不誣也臣愚流落衰暮之餘荷聖君一日非常之眷自太子左諭德授以詹事茍有所志不敢無犯而有隱臣愚自度此言一出必遭世俗侮謗不淺矣其所恃以安者陛下聖度旁燭萬化之微而不為世俗所惑也重惟太子天下之本而一本於孔子之經則宗廟社稷之流光不亦偉乎臣以狂瞽獨見之言干冒黼扆不勝惶懼屏營待罪之至髙宗建炎中御史中丞許景衡進唐鑑十事奏曰臣歷觀前世繼三代者莫若漢繼兩漢者莫若唐惟我宋之受命革五季之衰陋典章法度多取諸唐俗習人情視唐為近故范祖禹托其行事著而為書推治亂興衰之本原辨君子小人之疑似其文約其理明誠治國之楷模而百世之龜鑑也臣向緣賜對乞塵睿覽伏奉聖訓以為方讀資治通鑑姑俟他日臣聞王人雖求多聞而詳說將以反約聖學稽古宜領其要臣謹採祖禹所著唐鑑內十事繕寫進呈伏望清閒之宴特賜觀覽其善者可以為法其不善者可以為戒於以輔成日躋之聖而光大中興之業天下幸甚景衡又上疏曰臣竊覩三代之王所以治天下國家者必本於正心誠意其次莫如多聞故傅說之告髙宗曰王人求多聞時惟建事事不師古以克永世匪說攸聞然則學問稽古者實帝王之先務也恭惟陛下紹隆祖宗之業屬兹艱難所以施於天下國家者尤在聖學蓋至誠以格物據古以鑒今使盛德日新聰明日廣則事至能應物來敢名以圖天下之治而成中興之業舉在於此矣祖宗舊制講筵多在便殿故官稱有崇政殿說書伏見已除講讀官欲望明詔涓日開筵俾之勸講髙宗時中書舍人孫覿上奏曰臣聞人主無職事惟辨君子小人而進退之則人主之職也然君子小人不可以並進於朝譬之冰炭同處一器必至交爭君子不勝則奉身而退樂道無悶小人不勝則含怒忍恥千岐萬轍窺伺便利以求必勝一日得志遂肆毒於善良三隂在內其卦為否禍亂之原不可不察也邇英進讀資治通鑑上起戰國下終五代千三百餘年聖主賢臣暴君汙吏是非得失之迹治亂興壞之端蓋數十萬言而文辭浩繁進讀有時一日萬幾終不能遍臣竊見故翰林學士范祖禹撰唐鑑一書專論唐三百年君子小人善惡之辨唐之所以興以君子其所以廢以小人著之簡編炳然在目其言曰我不可不監于有夏亦不可不監于有殷故周之王以夏商為監今所宜監莫近於唐凡三百六十篇離為十二卷元勳盛德亂臣賊子忠邪賢佞如指東西如分黑白開卷了然陛下即政之初博延儒學之臣日侍帷幄朝夕納誨以輔聖質之髙明與其論事於未然孰若按已然之狀與其考言於未試孰若視已試之迹臣愚欲望聖慈每遇邇英詔左右之臣進讀唐鑑一二篇不出嵗年可見唐室廢興之由盡出於君子小人用舍之際善為可法惡為可戒必能補聖政之萬一起居郎周必大奏曰右臣今月六日伏見中書門下省録黃奉聖㫖開講用三月十一日者恭惟陛下聖質天成道學日就固不待分章摘句乃能多聞而有獲也然學之為王者事其已久矣國朝開講之制春以二月上旬今乃逺用三月十一日非獨距住講之期至近其間復有休假及詣德壽宫日分則是半嵗之間講讀不過十餘日而已以陛下勤於治道咨詢無倦而又收召豪傑並置經幄彼皆日夜望賜清閒之燕致緝熙之助若緩其所當急而使講藝論道之風稍缺於初政甚不可也臣更不敢繳奏已行之命欲乞睿慈依去年秋講例直降聖㫖特就近於二月中旬擇日庶幾中外曉然知陛下汲汲皇皇如古之聖人且於祖宗開講之制不悖臣不勝惓惓惟聖明裁幸起居舍人廖剛奏曰臣聞昔趙簡子之臣有周舍者謂簡子曰臣願墨筆操牘隨君之後司君之過而書之日有記也月有效也嵗有得也簡子恱之以語諸大夫曰衆人之唯唯不如周舍之諤諤臣竊意自古仁聖之君必有忠正直亮之臣拾遺補闕於其左右蓋不必名之以諫諍之官然後乃敢進說周舍是已故劉向嘗序其事以為鉗默者之戒夫太僕正非諫臣也而穆王責之以繩愆紏繆格其非心散騎常侍非以諫名官而實居諫垣之長豈常侍之官便當以諫諍為職有不待表之以名而太僕亦以其常在左右故其忠告當如此耶臣上荷聖恩備員殿陛間于兹纍月矣日惟旅諸僕御瞻仰清光而已豈所見聞曾無一語可羞於陛下乎臣雖不肖極知愧恥輒貢愚忠仰干天聽臣聞揚雄有言學之為王者事其已久矣雖堯舜禹湯文武未有不以學為先者伏見陛下詳延儒臣講貫六藝又使採托故實為說以進而清閒之燕游意翰墨博覽羣書亦可謂好學也已然臣聞之道不欲多多則擾帝王之學蓋非儒生文士所學之謂也堯舜禹湯文武汲汲仲尼皇皇是其所用心亦必有在矣孟軻曰天下之本在國國之本在家家之本在身戴記大學之道則曰古之欲明明德於天下者先治其國欲治其國先齊其家欲齊其家先修其身欲修其身先正其心欲正其心先誠其意夫正心誠意其幾帝王之所謂學乎正心者間邪之謂也誠意者存其誠之謂也所以進德修業也意誠而心正心正而身修則家齊國治而天下平矣此所謂能盡已之性以至盡人盡物之性於是可以贊天地之化育以與天地參矣非本於大學能若是乎恭惟聖德之躋如日方升伏願去末學之無益坐進此道以福羣生天下幸甚右諫議大夫兼侍講謝諤講尚書言於上曰書治道之本故觀經者當以書為本上曰朕最喜伊尹傅說所學得事君之道諤曰伊傅固然非成湯武丁信用之亦安能致治右正言陳淵上奏曰子入太廟每事問或曰孰謂鄒人之子知禮乎入太廟每事問子聞之曰是禮也昔之稱聖人者必曰生知夫生而知之者知其理而已至於儀章器數具在事物之間者蓋有不能盡知也故孔子問禮於老聃學琴於師襄問官名於郯子嘗曰吾十有五而志於學又曰十室之邑必有忠信如丘者焉不如丘之好學也又曰以思無益不如學也又曰我非生而知之者好古敏以求之者也又曰聖則吾不能我學不厭而教不倦也故孟子曰夫聖孔子不居夫居其聖則終至於不能聖唯不居其聖是以無所不學而聖益聖也提舉萬壽宫兼侍讀張守奏曰臣聞自古帝王未嘗不學傅說曰學於古訓乃有獲故堯舜皆若稽古孔子以天縱大聖猶學而不厭也光武藉髙祖之餘業屬意經術視朝猶至於日昃講論復至於夜分而不以為疲蓋義理之悅心猶芻豢之恱口何厭之有世祖掃除羣盜中興漢室其本諸此乎大學之道欲治其國特在於致知誠意始於致知誠意其效可至於明明德於天下蓋得其要則餘不足學矣仰惟陛下躬履艱虞之時不倦緝熙之學聖德日躋而猶博延儒生紬繹古義比聞躬御翰墨書典謨訓誥誓命之文以賜近弼德意所向每在二帝三王之上也是知中興之主異世同符更願陛下掇取要義講明施設之宜以幸天下而略其簡札之煩則不至於勞聖躬而治道舉矣中興之功視光武未足道也陳長方上奏曰生民之巨福宗社之長計莫若人主知帝王之學三代而上堯舜禹湯得之故功髙萬古當世被其賜三代而下孔孟得之故澤不旁流徒私淑於後人有志之士未嘗不欲以獻於其君或在下而無由自通或聞而不果信或信而不克用是以寥寥千百年間黔首不被聖人之澤雖人主有堯舜禹湯之姿無學以充之目奪於聲色心蕩於嗜好而又憸人讒夫以邪說逢迎遜順薰漬陶染於其前後日復一日及其惑於先入善言無間而可乘則下民唯君之怨是豈知愛君之義哉是豈欲澤及黎庶哉臣幼讀故相司馬光遺藁見其歷事三宗自為諫官為中執法進歷年圖每以三語為獻曰仁曰明曰武又言平生艱勤所得盡在於此光之心不愧於孟軻之愛君矣臣私自意人主心術之要無出光之三語及長得師乃知禮記大學一篇為帝王問學之宗雖秦火之餘簡編紊錯先後之次多失其舊然聖人之㫖昭昭可尋也大抵人主之學不在於博貫古今知書之多不在於錯綜辭藻文字照人不在於煆鍊佳句思侔鬼神不在於筆札竒麗虎卧龍跳如普簡文非不知書桓溫之逼則書無補於大計陳叔寶非不能文賀若弼之來則文不足以却敵隋煬帝非不能詩海內紛如則詩何益於敗宋明帝非不能書王僧虔之事則貽譏於後世是以人主知帝王之學功德巍巍而兼有是數者則為多材多藝不知帝王之學徒挾數事以為長則既無益於國事而適足以纍德大學之言古之欲明明德於天下者在於修身修身之要在於正心誠意欲心正意誠必先於格天下之物理使渙然氷釋以極致其所知所知既明則心自正意自誠心正意誠則非僻之心無自而生非僻之言無自而入方寸之地昭昭然若鑑之明若水之澄由是而不已內之於進修則堯之所以欽明文思舜之所以濬哲文明溫恭允塞禹之所以祇承于帝敷于四海湯伊尹之咸有一德特名數不同爾皆此道也外之於應萬事則燭見機㑹外之於攬人材則洞見邪正外之於辨疑似則此為權量其要特在致極其所知爾然而所謂知者非聰明才智之知非多能多藝之知在於熟察此心之正故大學又曰心有所恐懼則不得其正有所好樂則不得其正有所忿懥則不得其正有所憂患則不得其正去是四者而察此心之本體果為如何於此了然無疑則大學所謂致知也即莊生所謂七聖皆迷之地也自古聖人之德未有不由此而進修也人主萬機之暇能取大學之書參之以中庸澄神靜慮不使非僻之念萌於胸中日一覽之以其疑義博訪真儒則堯舜禹湯孔子孟子數聖人神交於千載之外天下將沐唐虞夏商之澤豈細事哉特患人王不為爾周麟之上奏曰臣聞曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於它在乎加之意而已斯言初止為學者設也至董仲舒舉此以告漢武帝然後知帝王之學亦當如是仰惟皇帝陛下聖質天粹自誠而明敏修之功純亦不已至於博覽經史固已識其大者舉而錯之天下國家日臻於嘉靖矣而猶不忘講學之益退朝清燕躬御邇英博延儒流敷繹古藝方且以西漢一代之史命官進讀是將以因事立教鑒往知今參求化源恢張國紀固不在於考文義辨音訓為書生章句之習也然臣竊謂三代而下惟西漢為近古諸史之作惟班固為名家讀之者考文義而後見紀事之本原辨音訓而後知立言之法則然文義或有難見非注解無以發明音訓或有難知非翻切無以辨證多聞之助或有取於此也臣不佞叨以讀誦為職茍不能盡心於此或迷金根之義或誤雌霓之呼以上昧天聽臣則有罪敢陳一二願從聖訓而訂正之夫服應曩說疏紊既多蘇普衆家剖斷亦鮮蔡氏纂集尤為抵牾顔師古激揚鬱滯釐正暌違援據精詳有補學者然則注解不同臣欲以師古之說為正漢書舊文多用古字間從假借其類實繁古今異言方俗殊語本音它切互見其中顔師古備著科條剖析無滯字涉稍異隨即翻音字協音諧舉當乎理然則音訓不一臣欲以師古所立為定仍乞於進讀本內間注音切臣非不知帝王之學志於治道初不問此區區之言可謂矜小節而暗大體矣然而列職禁近獻納論思事無巨細皆欲詳審而不可茍況執經史以備顧問乎今兹所陳庶幾下以見愚臣盡心率職之誠上以副陛下加意典學之美張浚上奏曰臣聞帝王之學以治心修性為主心本至靜因欲而動欲不必邪欲凡有外慕皆欲也性本至善因習以成欺僞既生遂拂天理是知治亂在已德成于上化行于下凡所施設莫不感格天人大治之效其應必矣帝王以天為宗以禮為門以敬為輔心敬則畏天如天之常在左右上下誠自此立治自此出卓乎後世不可及也翰林學士知制誥劉珙言於上曰世儒多病漢髙帝不恱學輕儒生臣以為髙帝所不恱特腐儒俗學耳使當時有以二帝三王之學告之知其必敬信功烈不止此因陳聖王之學所以明理正心為萬事之綱上亟稱善拜中大夫同知樞密事孝宗隆興元年朱熹監潭州南嶽廟上奏曰臣聞大學之道自天子以至於庶人一是皆以修身為本而家之所以齊國之所以治天下之所以平莫不由是出焉然身不可徒修也深探其本則在乎格物以致其知而已夫格物者窮理之謂也蓋有是物必有是理然理無形而難知物有迹而易睹故因是物以求之使是理瞭然心目之間而無毫髮之差則應乎事者自無毫髮之謬是以意誠心正而身修至於家之齊國之治天下之平亦舉而措之耳此所謂大學之道雖古之大聖人生而知之亦未有不學乎此者堯舜相授所謂惟精惟一允執厥中者此也自是以來纍聖相傳以有天下至於孔子不得其位而筆之於書以示後世之為天下國家者其門人弟子又相與傳述而推明之其亦可謂詳矣而自秦漢以來此學絶講儒者以詞章記誦為功而事業日淪於卑近亦有意其不止於此而又不過轉而求之老子釋氏之門內外異觀本末殊歸道術隱晦悠悠千載雖明君良臣間或一值而卒無以復於三代之盛由不知此故也恭惟皇帝陛下聖德純茂爰自於潛以至為帝仁孝恭儉之德信於天下紛華盛麗一無所入於其心此其身可謂修矣而臨御天下朞年於此平治之效未有所聞臣竊疑之意者前日勸講之臣限於程式所以聞於陛下者不過詞章記誦之習而陛下求所以進乎此者又不過取之老子釋氏之書是以雖有生知之性髙世之行而未嘗隨事以觀理故天下之理多所未察未嘗即理以應事故天下之事多所未明是以舉措之間動涉疑二聽納之際未免蔽欺平治之效所以未著由不講乎大學之道而溺心於淺近虗無之過也臣戅愚抵冒罪當萬死然願陛下清閒之燕博訪真儒知此道者講而明之考之於經驗之於史而㑹之於心以應當世無窮之變則今日之務所當為者不得不為所不當為者不得不止以至於臣下之忠邪計慮之得失不待燭照數計而可否黑白判然矣若是則意不得不誠心不得不正於以修身齊家平治天下亦豈有二道哉臣之所聞於師者如此自常人觀之疑若迂闊陳腐而不切於用然臣竊以為正其本萬事理差之毫釐繆以千里天下之事無急於此伏惟陛下擴天日之照俯賜開納則非獨微臣之幸實天下萬世之幸乾道五年十一月汪應辰上言曰臣伏見近日以來講讀之官進見稀闊蓋自昔人君有所佚豫或不留意經典有所私昵或不親近儒臣今陛下省覽庶政不捨晝夜非有所佚豫也延接臣下不間疏賤非有所私昵也特以勤勞政事故不遑暇於此耳然臣竊謂六經之典籍祖宗之謨訓此乃政事之本也因其有所勸戒而省之於已則可以致日新之益因其有所損益而驗之於今則可以得時措之宜漢光武唐太宗皆自戰以取天下而與其臣下講論經理往往夜分乃寐蓋必不虗費日力而為無益之舉也仁宗皇帝詔雙日御經筵而隻日亦召侍臣講讀足以為萬世法伏望陛下特留聖念天下幸甚淳熙三年兵部侍郎周必大上奏曰臣仰惟陛下以天縱之聖輔日新之德六籍奧義歷代史編凡儒生學士窮年汲世所不能究者一經睿覽皆洞見底藴所謂講讀之臣安能窺聖學之萬一然且不矜不伐勤於訪問此甚盛德臣何敢贊惟是今嵗適當郊祀兼之冊后竊計秋講不過此月下旬三四次而已其間又有開啓并習儀日分止是二十一日可御經筵欲望聖慈預留宸念或百司臨時别有相妨事節即乞宣諭令且候講畢施行庶幾少副陛下孜孜古訓不忘舊章之意淳熙間袁說友上言曰臣恭聞聖㫖已於今月十三日開經筵所臣仰惟陛下聖學髙逺緝熙光明稽古憲章宏濟極治臣愚戅亡識敢陳管見仰禆邇英之末議惟陛下財擇臣仰惟太上皇帝身濟大業紹開中興三十六年之間仁文德功聖神明武發而見諸立政用人愛民馭軍之際皆一代宏模萬世丕式陛下嗣位之初即命儒臣纂輯作宋一書揭名聖政親製序文藏諸金匱臣以不學誤䝉聖恩㑭承中祕遂獲仰窺大政拱誦奎文臣不勝至榮極幸陛下方循堯道本於授受施之政事動協訓謨儻於聖政之書日以繼日研覃不懈則於治體尤非小補臣愚欲望陛下恭發詔㫖自今嵗為始以太上皇帝聖政同三朝寶訓命經筵官日以講讀永為定制俾之紬繹大典啓沃聖𠂻陛下進而定省得之面命退而講論得之方冊益以彰率由舊章之意行堯之道與天無極帝王之學莫大於此臣何幸得親見之臣謹昧死以請孝宗時貟興宗乞精講議奏曰臣嘗謂論道三公之職分也不得其人則虗其職是以三公無官後世備論思之學稽論道之意獨講筵之官似之傅說戒髙宗曰王人求多聞事不師古以克永世匪說攸聞說欲勉其君執古義以御今世其人雖商之大臣其詞則講筵之體也恭惟我祖宗神后式嚴是選自從臣而擇有望自初見而至畢講既命之坐又賜之宴其意以為尊經樂誼不如是則善敗之鑒細大之事將有壅於上聞矣則是可急也以九重之深上司萬事之柄衆職之微有不敢行有不敢言獨宰相可以輔行臺諫可以輔言不幸而言之未至行之未及其從容暇豫之際意旨畢陳幽隱畢達天下不於講讀者望之將誰望乎昔李淑侍讀仁宗嘗言曰觀唐室召見近侍講經本欲因事立訓鑒往知今人君多借是名與近臣談議政事耳在我真宗時則有若馮元賜坐已竟亦多詢問蓋宸居祕邃深防聞聽之壅也淑之言非惟識祖宗意亦得數開講筵之意真知侍臣體哉厥後歷聖相紹風流相形美政美事多自講筵發之而司馬光呂公著蘇軾之流以此名一時而耀後世則又講筵德誼之老也可無念哉陛下天資睿智動法祖宗前後建置勸讀之官誼至篤也然臣尚恐侍臣循循一本舊習正先儒所謂案旁講經數行而退如此彌嵗所益幾何是不可以不宿戒也況今天下大務可達甚衆陛下所恃者民也今談利之士巧飾百端指無為有是顧身而不顧民陛下所扞國者軍也今將領之人大率肆欺是顧家而不顧士陛下所恃為俗者士也今衣冠雜襲避礙一律是好諛而不好直至使上薄隂陽乖戾之積連雨併晦陛下振發威厲既流賊墨之將旋竄袐賂之子海內且稱快矣夫以聖主抉微察蠧其動類此執經入侍者其忍默默負之然臣聞近已得㫖自今月乙亥開局除隻日休暇旦望之外前界大禮講日無幾臣願後殿說書之日權在諸司引對小事如景祐之詔可乎仍諭講官須得一經之中擇帝王欲知之事明今日鑒戒之體如咸平景德之際可乎凡求經意之先後在權政體之緩急臣願如先儒康定之疏既讀寶訓先解邊防要務之類可乎若其它又量令展日畨令直宿情愈通則義愈至不拘忌諱用表憂勤此又希世之竒事也賤臣其敢必哉或謂臣言國家張講讀之席止應故事耳彼儒者之言使人拘而多畏礙而不通漢髙帝所謂為天下安用腐儒者也臣謂不然天下之所謂腐儒者非特聖主惡之雖臣等亦惡之也今郡文學州博士項背纍纍沈議惑疏秉筆相輝者是已國家念與為治陛下豈少此等哉若夫更擇通儒一二鋪張仁義之治統臣謂雖百世不可易也孰與左右便嬖之言出於愚誣者乎昔魏徵勸太宗行仁義封倫笑曰徴儒生也言安足用其後徴言以次施行唐是以有貞觀之治太宗曰此徵勸朕行仁義也惜乎不令封倫見之然則通儒之譏誚仁義竟何尤乎陛下百舉念欲步武太宗臣願稽參以此則聖益聖明益明矣況六經決非虗器文武決非異道廣問決非否隔帝學決非小用敷求聖治於此在矣臣言狂僭不勝懇懇納忠之至直煥章閣王師愈奏曰臣聞商髙宗起傅說於傅巖之野命之訓于朕志說未嘗為髙論以駭髙宗之聽始則告之曰惟學遜志務時敏次則告之曰念終始典于學當是時也六經未備所謂學者果何事耶蓋自天地奠位道德已存乎其中不以六經未備而晦人君備道德於一身推以治人見於政事其極致在乎平天下傅說所以告髙宗者學此而已故又繼之曰道積于厥躬厥德修罔覺若傅說可謂善納誨者歟恭惟陛下以天縱之能生知之聖粵自潛邸垂情學問博極經籍不唯灼見歷代治忽之迹其於道德之奧已深造而逢原即位以來厲精圖治不自滿假萬幾餘暇延見諸儒講論治道孳孳不倦商髙宗所不逮者皆優為之矣猗歟休哉疏逺小臣誤被簡知濫陪經幄自惟淺陋何以仰贊緝熙光明之盛然而區區之忠不敢自默竊嘗讀易之乾言九二之君德始於學以聚之終於仁以行之中庸記聖人誠之之道亦始於博學之終於篤行之又曰有弗學學之弗能弗措也有弗行行之弗篤弗措也以是知好學雖帝王之盛美唯躬行之為貴學而弗行求治效之成難矣哉又況人君之學與夫人臣之學皆本於正心修身其效皆見於治國平天下人臣抱其所學必逢時得君然後能有行焉上以佐其君斯足以致治國平天下之效儻不遇合不過獨善其身而已又不過齊家而已治國平天下之事業何自而可成哉故人臣行其所學難為力特在乎人君用之耳若夫人君之所學不欲有行則已如欲行之罔不由已孰能禦焉治國平天下之效可拱而俟也陛下聖學之妙關百聖而不慙臣之謏聞何敢妄陳臆說伏願陛下鑒歷代之君所以為聖為賢所以致治安者力行而不怠日引月長悠久而不息將見內而修明庶政外而讋服四夷巍巍乎治功之隆與二帝三代同符矣惟陛下留神幸甚衛博上奏曰臣聞聖人以天縱之能輔以日就之學固非羣臣所敢望清光而窺道奧然講求多聞咨訪治要則必有論議之臣儒學之士通古今明治亂者侍清燕之閒而承顧問之缺以舜文王之盛而有九官四友朝夕都俞於一堂之上下至於秦之穆公魏之文侯亦有樂正裘牧仲與夫段干木田子方之流相與周旋圖回以起治功斯道尚矣仰惟陛下睿智之髙明典學之緝熙超出百王之上然猶分命講讀之官畨宿殿廬以待清問其於屬意承學尚論古人講道細氈之上甚盛舉矣然臣竊嘗究觀漢之侍臣於長楊五柞之游未央宣室之燕未嘗不在而唐之十八學士日昃夜艾訪求政事商確前載無常禮之問此固不宜專責職守之臣耆艾之士也臣愚欲望聖慈命有司討論倣唐開元六品以上待制於衙內建中九品以上待詔於兩省立為定格日使館閣之臣得侍左右以補遺忘庶幾泰山之一塵滄海之衆流或有補於萬分之一光宗紹熙三年御史臺主簿彭龜年上疏曰臣聞講讀之官責任最重故程頥謂天下重任惟宰相與經筵天下治亂繫宰相君德成就在經筵以臣觀之君德不修雖治難保要知經筵之重尤在宰相之先是以祖宗增重此官具有成憲未得之則求之惟恐其不廣既得之則親之惟恐其或疏揆之近時頗非其舊臣敢為陛下條列陳之臣觀祖宗精擇經筵不限資任或以布衣而就職或解政柄而復為蓋以勸講之臣當用明經之士經須素業人各有長儻平時未嘗留意於斯則雖賢何以克堪其任今不問所學類以序遷此非其舊者一也臣觀祖宗引對臣僚莫如經筵親密在太祖朝非時召王昭素講說經書在太宗朝命吕文仲為侍讀多以日晚召見及真宗嗣位首置侍讀侍講學士命邢昺楊徽之夏侯嶠為之常令昺宿祕閣訪問或至中夕自此遂為故事夜直率置常員不特與之究義理之微亦欲籍之杜逸豫之隙蓋聞古今之治亂則警懼易動聞閭閻之艱苦則憂念自生退即宴閒必無過當聖謨深逺人未易知竊見近日宣召經筵多用晝接臣不知遊息深宫之際何以為保養夜氣之方此非其舊者二也臣仰惟陛下留心問學不愧古先嘗於郊禋之時豫展講讀之日厥修時敏何待人言而臣之區區猶及此者臣嘗見范祖禹所編帝學上下數千年未有若祖宗好學之篤者陛下欲法祖宗捨此宜無大者也臣愚欲望陛下柬拔名儒置之講席但問經學之深淺不校官資之崇卑官大則加之學士之名官小則任以說書之職日與之講論義理夜與之商略古今自此聖性日益髙明聖德日益盛大既有義理之可樂自然物欲之難移保國寧家莫先於是惟陛下留神寧宗即位初龜年為吏部侍郎上奏曰臣聞君道尚實君道實則天下安矣君道不實則天下危矣恭惟陛下纂承大統以來凡有訓辭人皆傳誦而質直之性又出天禀向在潛邸嘗親書司馬光務實之論日夕披玩聖心所存蓋可見矣唐虞三代之治人以其言而遡其心知其必可以至無疑也然臣今日猶有務實之言者亦有說爾臣觀近日求賢之詔既下士大夫所上封章並付後省看詳令擇其可行者上之三省不為虗文則陛下求言固欲實也然今已一月所得於臣僚封章者果何事臣近日嘗乞再令後省擇其有益於聖德者逐旋編類以備采覽亦不䝉施行則求言之實似不足矣講筵久開當講之日早晚兩上不講則日輪二員以備訪問則陛下問學固欲實也然自開講之後直日之官未聞宣召則問學之實似不足矣故臣區區欲望陛下自兹以往出一言必求其信行一事必責其效毋使人謂徒事虗文以欺天下不勝宗社之幸寧宗嘗謂退朝無事恐自怠惰非多讀書不可龜年又奏曰人君之學與書生異惟能虗心受諫遷善改過乃聖學中第一事豈在多哉慶元元年三月大府寺丞吕祖儉奏曰臣聞自王者迹熄時君世主之為天下國家者鮮有知講學之為急間有崇尚經術者矣非優游文義則務為觀美未必知帝王所謂學者果為何事也恭惟陛下踐阼之始凛乎有蹈淵冰之懼亟下詔書舉邇英之典延舊學之臣首詔儒宗增重經幄多為書史之目倍增講讀之員而訓辭丁寧復在於救正闕違務圖實政德意志慮極其休美此固有以見聖心務實學而守家法知夫為天下國家之本務誠有在此而不在彼者也然臣竊有深疑而未解者陛下初念初政既已知講學之要是宜聖學有加無已今未數月所謂儒宗者曽不淹時中㫖徑下俾之亟去惟恐或後雖深閔耆艾之意形於親翰將以昭示厚恩然天下之心不能無疑也臣區區之言夫豈以一二人之去留一二事之當否過有所論蓋以講學重事也執經之臣精選也昔也何為尊嚮受信之如彼今也何為棄置忽忘之如此深恐於初政詔㫖嵗推月移名存實亡徒為觀美而果謂問學真無補於成敗之數矣矧今國勢甫定人情猶暌親心未怡天意弗順嵗事有饑饉之慮夷狄有窺伺之形陛下與學士大夫講論經理政是救正闕違務圖實政之時尤不可使初意浸違徒為觀美伏望陛下每御講筵必求諸已觀夫事親如事天之說則夔夔齊栗猶懼不至而號泣旻天之心誠難自已觀夫得民在得其心之說則栗栗危懼猶恐難保而朽索馭馬之喻誠非我欺六事自責固陛下所已講也若恐懼修省之念稍衰豈以此意為實然十愆示戒固陛下所已講也若燕遊逸豫之念稍縱豈以斯言為可信嵗事有饑饉之慮要當深思夫方懋厥德之要夷狄有窺伺之形要當躬行無怠無荒之實若夫親學士儒生以廣聞見逺宦官女子以戒驕奢雖明詔之所已言然有言逆于吾心而求諸道則忠直始能親有言遜于吾志而求諸非道則讒諂始能逺誠能如是則朝夕之所講習者始為實學朝夕之所履踐者始為實用聖德罔愆民心胥恱而初政詔㫖可以信諸萬世矣寧宗時朱熹奏曰臣竊惟皇帝陛下祗膺駿命恭御寶圖正位之初未遑它事而首以博延儒臣討論經藝為急先之務蓋將求多聞以建事學古訓而有獲非若記問愚儒詞章小技誇多以為博鬭靡以為工而已也如是則勸講之官所宜遴選顧乃不擇誤及妄庸則臣竊以為過矣蓋臣天姿至愚極陋雖嘗挾策讀書妄以求聖賢之遺㫖而行之不力老矣無聞況於帝王之學則固未之講也其何以當擢任之寵而辱顧問之勤乎是以聞命驚惶不敢奉詔然嘗聞之人之有是生也天固與之以仁義禮智之性而敘其君臣父子之倫制其事物當然之則矣以其氣質之有偏物欲之有蔽也是以或昧其性以亂其倫敗其則而不知反必其學以開之然後有以正心修身而為齊家治國之本此人之所以不可不學而其所以學者初非記問詞章之謂而亦非有聖愚貴賤之殊也以是而言則臣之所嘗用力固有可為陛下言者請遂陳之蓋為學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下事莫不有理為君臣者有君臣之理為父子者有父子之理為夫婦為兄弟為朋友以至於出入起居應事接物之際亦莫不各有理焉有以窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髮之纍此為學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易唯古之聖人為能盡之而其所行所言無不可為天下後世不易之大法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其粲然之跡必然之效蓋莫不具於經訓史冊之中欲窮天下之理而不即是而求之則是正墻面而立爾此窮理所以必在乎讀書也若夫讀書則其不好之者固怠忽間斷而無所成矣其好之者又不免乎貪多而務廣往往未啓其端而遽已欲探其終未究乎此而忽已志在乎彼是以雖復終日勤勞不得休息而意緒匆匆常若有所奔趨迫逐而無從容㴠泳之樂是又安能深信自得常久不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不達孟子所謂進鋭者退速正謂此也誠能鑒此而有以反之則心潛於一久而不移而所讀之書文意接連血脉通貫自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虗至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殼之外則一身無主萬事無綱雖其俯仰顧盼之間蓋已不自覺其身之所在而況能反覆聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣者正謂此也誠能嚴恭寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理將無所往而不通以之應事以之接物將無所處而不當矣此居敬持志所以為讀書之本也此數語者皆愚臣平生為學艱難辛苦已試之效竊意聖賢復生所以教人不過如此不獨布衣韋帶之士所當從事蓋雖帝王之學殆亦無以易之特以近年以來風俗薄陋士大夫間聞此等語例皆指為道學必排去之而後已是以食芹之美無路自通每抱遺經徒竊慨歎今者乃遇皇帝陛下始初清明無他嗜好獨於問學孜孜不倦而臣當此之時特䝉引對故敢忘其固陋而輒以為獻伏惟聖明深賜省覽試以其說驗之於身蚤寤晨興無忘今日之志而自彊不息以緝熙于光明使異時嘉靖邦國如商髙宗興衰撥亂如周宣王以著明人主講學之效卓然為萬世帝王之標準則臣雖退伏田野與世長辭與有榮矣何必使之勉彊盲聾扶曵跛躄以汙近侍之列而為盛世之羞哉干冒宸嚴不勝戰栗惟陛下留神財幸熹又奏曰臣竊聞周武王之言曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母而孟子又曰堯舜性之湯武反之蓋嘗因此二說而深思之天地之大無不生育固為萬物之父母矣人於其間又獨得其氣之正而能保其性之全故為萬物之靈若元后者則於人類之中又獨得其正氣之盛而能保其全性之尤者是以能極天下之聰明而出乎人類之上以覆冒而子畜之是則所謂作民父母者也然以自古聖賢觀之惟帝堯大舜生而知之安而行之為能履此位當此責而無愧若成湯武王則其聰明之質固已不能如堯舜之全矣惟其能學而知能利而行能擇善而固執能克已而復禮是以有以復其德性聰明之全體而卒亦造夫堯舜之域以為億兆之父母蓋其生質雖若不及而其反之之至則未嘗不同孔子所謂及其成功一也正此之謂也恭惟皇帝陛下聰明之質性之於天固非常情所能窺度然而生長深宫春秋方富臣恐稼穡艱難容有未盡知人之情僞容有未盡察國家憲度容有未盡習至於學道修身立志揆事之本制世御俗發號施令之要亦容有未能無待於講而後明者故竊以為陛下誠能於此深留聖意日用之間語默動靜必求放心以為之本而於玩經觀史親近儒學已用力處益用力焉數召大臣切劘治道俾陳今日要急之務略如仁祖開天章閣故事至於羣臣進對亦賜溫顔反復詢訪以求政事之得失民情之休戚而又因以察其人材之邪正短長庶於天下之事各得其理經歷詳盡浹洽貫通聰明日開志氣日彊德聲日聞治效日著四海之內瞻仰畏愛如親父母則是反之之至而堯舜湯武之盛不過如此不宜妄自菲薄因循茍且而不復以古之賢聖自期也臣本迂儒加以老病自知無用分甘窮寂今者徒以趣召之峻冒昧而來耳目筋骸皆難勉彊然而未敢遽以告歸為請者誠感眷遇之厚猶欲少忍須㬰以俟陛下聖志之立聖學之成決知異日姦言邪說不能侵亂果如前所期者然後乞身以去則為上不負天子下不負所學而臣主俱榮矣顧以此事在臣但能言之而其用力則在陛下萬一莫景迫人不容宿留則抱此耿耿私恨無窮伏望聖慈憐臣此志察臣此言策厲身心勉進德業使臣蚤得遂其所願則雖夕死瞑目無憾矣冒瀆宸聽臣無任悃欵激切之至貼黃臣聞中庸有言人一能之已百之人十能之已千之果能此道雖愚必明雖柔必彊而元祐館職吕大臨為之說曰君子所以學者為能變化氣質而已德勝氣質則愚者可進於明柔者可進於彊不能勝之則雖有志於學亦愚不能明柔不能彊而已矣蓋均善而無惡者性也人所同也昏明彊弱之禀不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣臣少時讀書偶於此語深有省焉奮厲感慨不能自已自此為學方有寸進食芹而美敢以為獻伏乞聖察熹又奏曰臣伏見近制每遇隻日蚤晚進講及至當日或值假故即行權罷又按故事將來大寒大暑亦繫罷講月分恭聞陛下天性好學晨夕孜孜雖處深宫必不暇逸但臣誤䝉選擇以經入侍固當日有獻納以輔聖志今乃淹旬纍月不得修其職業素餐之刺實不自安故嘗面奏假日無事正宜進講已䝉聖慈俯賜嘉納今已兩日未見施行因省昨來所陳似亦未至詳悉今别具奏欲乞聖明特降睿㫖今後除朔望旬休及過宫日外不以寒暑雙隻月日諸色假故並令逐日蚤晚進講內有朝殿日分伏恐聖躬久坐不無少勞却乞權住當日蚤講一次庶幾藏修遊息無非典學之時聖德日躋天下幸甚歷代名臣奏議卷八
