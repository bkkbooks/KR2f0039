body:
  text: 歴代名臣奏議巻三十三明楊士竒等撰治道宋仁宗時度支判官王安石上疏曰臣愚不肖蒙恩備使一路今又蒙恩召還闕廷有所任属而當以使事歸報陛下又不自知其無以稱職而敢縁使事之所及冐言天下之事伏惟陛下詳思而擇其中幸甚臣切觀陛下有恭儉之徳有聦明睿智之才夙興夜寐無一日之懈聲色狗馬觀㳺玩好之事無纎介之蔽而仁民愛物之意孚於天下而又公選天下之所願以為輔相者属之以事而不貳於讒邪傾巧之臣此雖二帝三王之用心不過如此而已宜其家給人足天下大治而効不至於此顧内則不能無以社稷為憂外則不能無懼於夷狄天下之財力日以困窮而風俗日以衰壊四方有志之士諰諰然常恐天下之久不安此其故何也患在不知法度故也今朝廷法嚴令具無所不有而臣以謂無法度者何哉方今之法度多不合乎先王之政故也孟子曰有仁心仁聞而澤不加於百姓者為政不法於先王之道故也以孟子之說觀方今之失正在於此而已夫以今之世去先王之世逺所遭之變所遇之勢不一而欲一二脩先王之政雖甚愚者猶知其難也然臣以謂今之失患在不法先王之政者以謂當法其意而已夫二帝三王相去盖千有餘載一治一亂其盛衰之時具矣其所遭之變所遇之勢亦各不同其施設之方亦皆殊而其為天下國家之意本末先後未甞不同也臣故曰當法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合乎先王之政矣雖然以方今之勢揆之陛下雖欲改易更革天下之事合於先王之意其勢必不能也陛下有恭儉之徳有聦眀睿知之才有仁民愛物之意誠加之意則何為而不成何欲而不得然而臣顧以謂陛下雖欲改易更革天下之事合於先王之意其勢必不能者何也以方今天下之才不足故也臣甞試竊觀天下在位之人未有乏於此時者也夫人才乏於上則有沈廢伏匿在下而不為當時所知者矣臣又求之於閭巷草野之間而亦未見其多焉豈非陶冶而成之者非其道而然乎臣以謂方今在位之人才不足者以臣使事之所及則可知矣今以一路數千里之間能推行朝廷之法令知其所緩急而一切能使民以脩其職事者甚少而不才茍簡貪鄙之人至不可勝數其能講先王之意以合當時之變者盖闔郡之間往往而絶也朝廷毎一令下其意雖善在位者猶不能推行使膏澤加於民而吏輙縁之為姦以擾百姓臣故曰在位之人才不足而草野閭巷之間亦未見其多也夫人才不足則陛下雖欲改易更革天下之事以合先王之意大臣雖有能當陛下之意而欲領此者九州之大四海之逺孰能稱陛下之指以一二推行此而人人蒙其施者乎臣故曰其勢必未能也孟子曰徒法不能以自行非此之謂乎然則方今之急在於人才而巳誠能使天下人才衆多然後在位之才可以擇其人而取足焉在位者得其才矣然後稍視時勢之可否而因人情之患若變更天下之弊法以趨先王之意甚易也今之天下亦先王之天下先王之時人才甞衆矣何至於今而獨不足乎故曰陶冶而成之者非其道故也商之時天下甞大亂矣在位貪毒禍敗皆非其人及文王之起而天下之才甞少矣當是時文王能陶冶天下之士而使之皆有士君子之才然而随其才之所有而官使之詩曰豈弟君子遐不作人此之謂也及其成也微賤兔罝之人猶莫不好徳兔罝之詩是也又況於在位之人乎夫文王惟能如此故以征則服以守則治詩曰奉璋峨峨髦士攸宜又曰周王于邁六師及之言文王所用文武各得其才而無廢事也及至夷厲之亂天下之才又甞少矣至宣王之起所與圖天下之事者仲山甫而巳故詩人嘆之曰徳輶如毛維仲山甫舉之愛莫助之盖閔人才之少而山甫之無助也宣王能用仲山甫推其𩔖以新美天下之士而後人才復衆於是内脩政事外討不庭而復有文武之境土故詩人美之曰薄言采芑于彼新田于此菑畆言宣王能新美天下之士使之有可用之才如農夫新美其田而使之有可采之芑也由此觀之人之才未甞不自人主陶冶而成之者也所謂陶冶而成之者何也亦教之養之取之任之有其道而已所謂教之之道何也古者天子諸侯自國至于鄉黨皆有學博置教道之官而嚴其選朝廷禮樂刑政之事皆在於學學士所觀而習者皆先王之法言徳行治天下之意其材亦可以為天下國家之用茍不可以為天下國家之用則不教也茍可以為天下國家之用者則無不在於學此教之之道也所謂養之之道何也饒之以財約之以禮裁之以法也何謂饒之以財人之情不足於財則貪鄙茍得無所不至先王知其如此故其制禄自庶人之在官者其禄已足以代其耕矣由此等而上之毎有加焉使其足以養㢘恥而離於貪鄙之行猶以為未也又推其禄以及其子孫謂之世禄使其生也既於父子兄弟妻子之養㛰姻朋友之接皆無憾矣其死也又於子孫無不足之憂焉何謂約之以禮人情足於財而無禮以莭之則又放僻邪侈無所不至先王知其如此故為之制度婚喪祭養燕享之事服食器用之物皆以命數為之莭而齊之以律度量衡之法其命可以為之而財不足以具則弗具也其財可以具而命不能為之者不使有銖兩分寸之加焉何謂裁之以法先王於天下之士教之以道藝矣不帥教而待之以屏棄逺方終身不齒之法約之以禮也不循禮則待之以流殺之法王制曰變衣服者其君流酒誥曰厥或誥曰群飲汝勿佚盡執拘以歸于周予其殺夫群飲變衣服小罪也流殺大刑也加小罪以大刑先王所以忍而不疑者以為不如是不足以一天下之俗而成吾治夫約之以禮裁之以法天下所以服從無抵冒者又非獨其禁嚴而治察之所能致也盖亦以吾至誠懇惻之心力行而為之倡凡在左右通貴之人皆順上之欲而服行之有一不帥者法之加必自此始夫上以至誠行之而貴者知避上之所惡矣則天下之不罰而止者衆矣故曰此養之之道也所謂取之之道者何也先王之取人也必於鄉黨必於庠序使衆人推其所謂賢能出之以告於上而察之誠賢能也然後随其徳之大小才之髙下而官使之所謂察之者非專用耳目之聦眀而私聽於一人之口也欲審知其徳問以行欲審知其才問以言得其言行則試之以事所謂察之者試之以事是也雖堯之用舜亦不過如此而已況其下乎若夫九州之大四海之逺百億醜之賤所須士大夫之才則衆矣有天下者又不可以一二自察之也又不可偏属於一人而使之於一日二日之間考試其行能而進退之也盖吾已能察其才行之大者以為大官矣因使之取其𩔖以持久試之而考其能者以告於上而後以爵命禄秩予之而已此取之之道也所謂任之之道者何也人之才徳髙下厚薄不同其所任有宜有不宜先王知其如此故知農者以為后稷知工者以為共工其徳厚而才髙者以為之長徳薄而才下者以為之佐属又以久於其職則上狃習而知其事下服馴而安其教賢者則其功可以至于成不肖者則其罪可以至於着故久其任而待之以考績之法夫如此故智能才力之士則得盡其智以赴功而不患其事之不終其功之不就也偷惰茍且之人雖欲取容於一時而顧僇辱在其後安敢不勉乎若夫無能之人固知辭避而去矣居職任事之日久不勝任之罪不可以幸而免故也彼且不敢冒而知辭避矣尚何有比周讒諂争進之人乎取之既已詳用之既已當䖏之既巳久至其任之也又專焉而不一二以法束縛之而使之得行其意堯舜之所以理百官而熈衆工者以此而已書曰三載考績三考黜陟幽眀此之謂也然堯舜之時其所黜者則聞之矣盖四凶是也其所陟者則臯陶稷契皆終身一官而不徙盖其所謂陟者特加之爵命禄賜而已耳此任之之道也夫教之養之取之任之之道如此而當時人君又能與其大臣悉其耳目心力至誠惻怛思念而行之此其人臣之所以無疑而於天下國家之事無所欲為而不得也方今州縣雖有學取墻壁具而已非有教導之官長育人才之事也唯太學有教導之官而亦未甞嚴其選朝廷禮樂刑政之事未甞在於學學者亦漠然自以禮樂刑政為有司之事而非已所當知也學者之所教講說章句而已講說章句固在古者教人之道也而近嵗乃始教之以課試之文章夫課試之文章非博誦強學窮日之力則不能及其能工也大則不足以用天下國家小則不足以為天下國家之用故雖白首於庠序窮日之力以師上之教及使之從政則茫然不知其方者皆是也盖今之教者非特不能成人之材而已又從而困若毀壊之使不得成才者何也夫人之才成於專而毀於雜故先王之䖏民才䖏工於官府䖏農於畎畆䖏商賈於肆而䖏士於序庠使各專其業而不見異物懼異物之足以害其業也所謂此者又非特使之不得見異物而已一示之以先王之道而百家諸子之異說皆屏之而莫敢習者焉今士之所宜學者天下國家之用也今悉使置之不教而教之以課試之文章使其耗精疲神窮日之力以従事於此及其任之以官也則又悉使置之而責之以天下國家之事夫古之人以朝夕專其業於天下國家之事而猶才有能有不能今乃移其精神奪其日力以朝夕從事於無補之學及其任之以事然後卒然責之以為天下國家之用宜其才之足以有為者少矣臣故曰非特不能成人之才又從而困苦毀壊之使不得成材也又有甚害者先王之時士之所學者文武之道也士之才有可以為公卿大夫有可以為士其才之大小宜不宜則有矣至於武事則随其才之大小未有不學者也故其大者居則為六官之卿出則為六軍之将也其次則比周鄉黨之師亦皆卒兩師旅之帥故邊疆宿衛皆得士大夫為之而小人不得干其任今之學者以為文武異事吾知治文事而已至於邊疆宿衛之任則推而属之於卒伍往往天下姦悍無賴之人茍其才行足以自託於鄉里者未有肯去親戚而從召募者也邊疆宿衛此乃天下之重任而人主之所當慎重者也故古教士以射御為急其他技能則視其人才之所宜而後教之其才之所不能則不疆也至於射則男子之事茍人之生有疾則已茍無疾未有去射而不學者也在庠序之間固甞從事於射也有賔客之事則以射有祭祀之事則以射别士之行能偶則以射於禮樂之事未甞不寓以射而射亦未甞不在於禮樂祭祀之間也易曰弧矢之利以威天下先王豈以射為可以習揖讓之儀而已乎固以為射者武事之尤大而威天下守國家之具也居則以是習禮樂出則以是從戰伐士既朝夕從事於此而能者衆則邊疆宿衛之任皆可以擇而取也夫士甞學先王之道其行義甞見推於鄉黨矣然後因其才而託之以邊疆宿衛之任此古之人君所以推干戈以属之人而無内外之虞也今乃以夫天下之重任人主所當至慎之選推而属之姦悍無頼才行不足自託於鄉里之人此方今所以愢愢然常抱邊疆之憂而虞宿衛之不足恃以為安也今孰不知邊疆宿衛之士不足恃以為安哉顧以為天下學士以執兵為恥而亦未有能騎射行陣之事者則非召募之卒伍孰能任其事者乎夫不嚴其教髙其選則士之以執兵為耻而未甞有能騎射行陣之事固其理也凡此皆教之非其道也方今制禄大抵皆薄自非朝廷侍從之列食口稍衆未有不兼農商之利而能充其養者也其下州縣之吏一月所得多者錢八九千少者四五千以守選待除守闕通之盖六七年而後得三年之禄計一月所得乃實不能四五千少者乃實不能及三四千而已雖廝養之給不窘於此矣而其養生喪死昏姻塟送之事皆當出於此夫出中人之上者雖窮而不失為君子出中人之下者雖泰而不失為小人唯中人不然窮則為小人泰則為君子計天下之士出中人之上下者千百而無十一窮而為小人泰而為君子者則天下皆是也先王以為衆不可以力勝也故制行不以已而以中人為制所以因其欲而利道之以為中人之所能守則其志可以行乎天下而推之後世以今之制禄而欲士之無毀㢘耻盖中人所不能也故今官大者徃徃交賂遺營貲産以負貪汙之毀官小者販鬻乞丐無所不為夫士已甞毀㢘耻以負累於世矣則其偷惰取容之意起而矜奮自強之心息則職業安得而不弛治道何從而興乎又況委法受賂侵牟百姓者徃徃而是也此所謂不能饒之以財也昏喪奉養服食器用之物皆無制度以為之莭而天下以奢為榮以儉為耻茍其財之可以具則無所為而不得有司既不禁而人又以此為榮茍其財不足而不能自稱於流俗則其昏喪之際徃徃得罪於族人昏姻而人以為耻矣故富者貪而不知止貧者則強勉其不足以追之此士之所以重困而㢘耻之心毀也凡此所謂不能約之以禮也方今陛下躬行儉約以率天下此左右通貴之臣所親見然而其閨門之内奢靡無莭犯上之所惡以傷天下之教者有已甚者矣未聞朝廷有所放絀以示天下昔周之人拘群飲而被之以殺刑者以為酒之末流生害有至於死者衆矣故重禁其禍之所自生重禁禍之所自生故其施刑極省而人之抵於禍敗者少矣今朝廷之法所尤重者獨貪吏耳重禁貪吏而輕奢靡之法此所謂禁其末而弛其本然而世之識者以為方今官冗而縣官財用已不足以供之其亦蔽於理矣今之入官誠冗矣然而前世置貟盖甚少而賦禄又如此之薄則財用之所不足盖亦有說矣吏禄豈足計哉臣於財利固未甞學然切觀前世治財之大略矣盖因天下之力以生天下之財取天下之財以供天下之費自古治世未甞以不足為天下之公患也患在治財無其道耳今天下不見兵革之具而元元安土樂業人致其力以生天下之財然而公私常以困窮為患者殆亦理財未得其道而有司不能度世之宜而通其變耳誠能理財以其道而通其變臣雖愚固知増吏禄不足以傷經費也方今法嚴令具所以羅天下之士可謂宻矣然而亦甞教之以道藝而有不帥教之刑以待之乎亦甞約之以制度而有不循理之刑以待之乎亦甞任之以職事而有不任事之刑以待之乎夫不先教之以道藝誠不可以誅其不帥教不先約之以制度誠不可以誅其不循理不先任之以職事誠不可以誅其不任事此三者先王之法所先急也今皆不可得誅而薄物細故非害治之急者為之法禁月異而嵗不同為吏者至於不可勝記又況能一二避之而無犯者乎此法令所以滋而不行小人有幸而兔者君子有不幸而及者焉此所謂不能裁之以刑也凡此皆治之非其道也方今取士強記博誦而略通於文辭謂之茂才異等賢良方正茂才異等賢良方正者公卿之選也記不必強誦不必博略通於文辭而又甞學詩賦則謂之進士進士之髙者亦公卿之選也夫此二科所得之技能不足以為公卿不待論而後可知而世之議者乃以為吾甞以此取天下之士而才之可以為公卿者甞出於此不必法古之取人然後得士也其亦蔽於理矣先王之時盡所以取人之道猶懼賢者之難進而不肖者之雜於其間也今悉廢先王所以取士之道而敺天下之才士悉使為賢良進士則士之才可以為公卿者固宜為賢良進士而賢良進士亦固宜有時而得才之可以為公卿者也然而不肖者茍能雕蟲篆刻之學以此進至乎公卿才之可以為公卿者困於無補之學而以此絀死於嵓野盖十八九矣夫古之人有天下者其所慎擇者公卿而已公卿既得其人因使推其𩔖以聚於朝廷則百司庶府無不得其人也今使不肖之人幸而至乎公卿因得推其𩔖聚之朝廷此朝廷所以多不肖之人而雖有賢智徃徃困於無助不得行其意也且公卿之不肖既推其𩔖以聚於朝廷朝廷之不肖又推其𩔖以備四方之任使四方之任使者又各推其不肖以布於州郡則雖有同罪舉官之科豈足恃哉適足以為不肖者之資而巳其次九經五經學究眀法之科朝廷固已甞患其無用於世而稍責之以大義矣然大義之所得未有以賢於故也今朝廷又開明經之選以進經術之士然明經之所取亦記誦而略通於文辭者則得之矣彼通先王之意而可以施天下國家之用者顧未必得與於此選也其次則恩澤子弟庠序不教之以道藝官司不考問其才能父兄不保任其行義而朝廷輒以官予之而任之以事武王數紂之罪則曰官人以世夫官人以世而不計其才行此乃紂之所以亂亡之道而治古之所無也又其次曰流外朝廷固已擠之於㢘耻之外而限其進取路矣顧属之以州縣之事使之臨士民之上豈所謂以賢治不肖者乎以臣使事之所及一路數千里之間州縣之吏出於流外者徃徃而有可属任以事者殆無二三而當防閑其奸者皆是也盖古者有賢不肖之分而無流品之别故孔子之聖而甞為季氏吏盖雖為吏而亦不害其為公卿及後世有流品之别則凡在流外者其所成立固甞自置於㢘恥之外而無髙人之意矣夫以近世風俗之流靡雖自士大夫之才勢足以進取而朝廷甞奨之以禮義者晚莭末路徃徃怵而為奸況又其素所成立無髙人之意而朝廷固巳擠之於廉恥之外限其進取者乎其臨人親職放僻邪侈固其理也至於邊疆宿衛之選則臣固已言其失矣凡此皆取之非其道也方今取之既不以其道至於任人又不問其徳之所宜而問其出身之後先不論其才之稱否而論其歴任之多少以文學進者且使之治財巳使之治財矣又轉而使之典獄已使之典獄矣又轉而使之治禮是則一人之身而責之以百官之所能備宜其人才之難為也夫責人以其所難為則人之能為者少矣人之能為者少則相率而不為故使之典禮未甞以不知禮為憂以今之典禮皆未甞學禮故也使之典獄未甞以不知獄為恥以今典獄者未甞學獄故也天下之人亦已漸漬於失教被服於成俗見朝廷有所任使非其資序則相議而訕之至於任使之不當其才未甞有非之者也且在位者數徙則不得久於其官故上不能狃習而知其事下不肯服馴而安其教賢者則其功不可以及於成不肖者則其罪不可以至於着若夫迎新将故之勞縁絶簿書之弊固其害之小者不足悉數也設官大抵皆當久於其任而至於所部者逺所任者重則尤宜久於其官而后可以責其有為而方今尤不得久於其官徃徃數日輒遷之矣取之既已不詳使之既已不當䖏之既已不久至於任之則又不專而又一二以法約束縛之使不得行其意臣固知當今在位多非其人稍假借之權而不一二以法束縛之則放恣而無不為雖然在位非其人而恃法以為治自古及今未有能治者也即使在位皆得其人矣而一二以法束縛之不使之得行其意亦自古及今未有能治者也夫取之既已不詳使之既已不當䖏之既已不久任之又不專而一二以法束縛之故雖賢者在位能者在職與不肖而無能者殆無以異夫如此故朝廷明知其賢能足以任事茍非其資序則不以任事而輒進之雖進之士猶不服也明知其無能而不肖茍非有罪為在上者所劾不敢以其不勝任而輒退之雖退之士猶不服也彼誠不肖而無能然而士不服者何也以所謂賢能者任其事與不肖而無能者亦無以異故也臣前以謂不能任人以職事而無不任事之刑以待之者盖謂此也夫教之養之取之任之有一非其道則足以敗亂天下之人才又况兼此四者而有之則在位不才茍簡貪鄙之人至於不可勝數而草野閭巷之間亦少可任之才固不足怪詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗此之謂也夫在位之人才不足矣而閭巷草野之間亦少可用之才則豈特行先王之政而不得也社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎盖漢之張角三十六萬同日而起而所在郡國莫能發其謀唐之黄巢横行天下而所至将吏無敢與之抗者漢唐之所以亡禍自此始唐既亡矣陵夷以至五代而武夫用事賢者伏匿消沮而不見在位無復有知君臣之義上下之禮者也當是之時變置社稷盖甚於奕碁之易而元元肝腦塗地幸而不轉死於溝壑者無㡬耳夫人才不足患盖如此而方今公卿大夫莫肯為陛下長慮後顧為宗廟萬世計臣切惑之昔晉武帝趣過目前而不為子孫長逺之謀當時在位亦皆偷合茍容而風俗蕩然弃禮義捐法制上下同失莫以為非有識固知其将必亂矣而其後果至於海内大擾中國列於夷狄者二百餘年伏惟三廟祖宗神靈所以付属陛下固将為萬世血食而大庇元元於無窮也臣願陛下鑒漢唐五代之所以亂亡懲晉武茍且因循之禍明詔大臣思所以陶成天下之才慮之以謀計之以數為之以漸期為合於當世之變而無負於先王之意則天下之人才不勝用矣人才不勝用則陛下何求而不得何欲而不成哉夫慮之以謀計之以數為之以漸則成天下之才甚易也臣始讀孟子見孟子言王政之易行心則以為誠然及見與慎子論齊魯之地以為先王之制國大抵不過百里者以為今有王者起則凡諸侯之地或千里或五百里皆将損之至於數十百里而後止於是疑孟子雖賢其仁智足以一天下亦安能毋刼之以兵革而使數百千里之強國一旦肻損其地之十八九而比先王之諸侯至其後觀漢武帝用主父偃之策令諸侯王地悉得推恩分其子弟而漢親臨定其號名輒别属漢於是諸侯王之子弟各有分土而勢強地大者率以分析弱小然後知慮之以謀計之以數為之以漸則大者固可使小強者固可使弱而不至乎傾駭變亂敗傷之釁孟子之言不為過又況今欲改易更革其勢非若孟子所為之難也臣故曰慮之以謀計之以數為之以漸則其為甚易也然先王之為天下不患人之不為而患人之不能不患人之不能而患已之不勉何謂不患人之不為而患人之不能人之情所願得者善行美名尊爵厚利也而先王能操之以臨天下之士天下之士有能遵之以治者則悉以其所願得者以與之士不能則已矣茍能則孰肯舍其所願得而不自勉以為才故曰不患人之不為患人之不能何謂不患人之不能而患已之不勉先王之法所以待人者盡矣自非下愚不可移之才未有不能赴者也然而不謀之以至誠惻怛之心亦未有能力行而應之者故曰不患人之不能而患已之不勉陛下誠有意乎成天下之才則臣願陛下勉之而巳臣又觀朝廷異時欲有所施為變革其始計利害未甞熟也顧一有流俗僥倖之人不恱而非之則遂止而不敢為夫法度立則人無獨蒙其幸者故先王之政雖足以利天下而當其承敝壊之後僥倖之時其創法之制未甞不艱難也以其剏法立制而天下僥倖之人亦順恱以趨之無有齟齬則先王之法至今存而不廢矣惟其剏法立制之艱難而僥倖之人不肯順恱而趨之故古之人欲有所為未甞不先之以征誅而後得其意詩曰是伐是肆是絶是忽四方以無拂此言文王先征誅而後得意於天下也先王欲立法度以變衰壊之俗而成人之才雖有征誅之難猶忍而為之以為不若是不可以有為也及至孔子以匹夫逰諸侯所至則使其君臣捐所習逆所順強所劣憧憧如也卒困於排逐然孔子亦終不為之變以為不如是不可以有為此其所守盖與文王同意夫在上之聖人莫如文王在下之聖人莫如孔子而欲有所施為變革則其事盖如此矣今有天下勢居先王之位剏立法制非其征誅之難也雖有僥倖之人不恱而非之固不勝天下順恱之人衆也然而一有流俗僥倖不恱之言則遂止而不敢為者惑也陛下誠有意乎成天下之才則臣又願㫁之而巳夫慮之以謀計之以數為之以漸而又勉之以成㫁之以果然而猶不能成天下之才則以臣所聞盖未有也然臣之所稱流俗之所不講而今之議者以謂迂闊而熟爛者也切觀近世士大夫所欲悉心力耳目以補助朝廷者有矣彼其意非一切利害則以為當世所不能行士大夫既以此希世而朝廷所取於天下之士亦不過如此至於大倫大法禮義之際先王之所力學而守者盖不及也一有及此則群聚而笑之以為迂闊今朝廷悉心於一切利害有司法令刀筆之間非一日也然其効可觀矣則夫所謂迂闊而熟爛者惟陛下亦可少留神而察之矣昔唐太宗貞觀之初人人異論如封徳彛之徒皆以為非雜用秦漢之政不足以為天下能使先王之事開太宗者魏鄭公一人爾其所設雖未能盡當先王之意抑其大略可謂合矣故能以數年之間而天下幾致刑措中國安寧夷蠻順服自三王以来未有盛於此時也唐太宗之初天下之俗猶今之世也魏鄭公之言固當時所謂迂闊而熟爛者也然其効如此賈誼曰今或言徳教之不如法令胡不引商周秦漢以觀之然則唐太宗事亦足以觀矣臣幸以職事歸報陛下不自知其駑下無以稱職而敢及國家之大體者誠以臣蒙陛下任使而當歸報竊謂在位之人才不足而無以稱朝廷任使之意而朝廷所以任使天下之士者或非其理而士不得盡其才此亦臣使事之所及而陛下之所宜先聞者也釋此一言而毛舉利害之一二以汙陛下之聦明而終無補於世則非臣所以事陛下惓惓之義也伏惟陛下詳思而擇其中天下幸甚時王安石知制誥又上時政疏曰臣竊觀自古人主享國日久無至誠惻怛憂天下之心雖無暴政虐刑加於百姓而天下未甞不亂自秦已下享國日久有晉之武帝梁之武帝唐之明皇此三帝者皆聦明智略有功之主也享國日久内外無患因循茍且無至誠惻怛憂天下之心趨過目前而不為久逺之計自以禍災可以無及其身徃徃身遇禍災而悔無所及雖或僅得身免而宗廟固已毀辱而妻子固以困窮天下之民固以膏血塗草野而生者不能自脫於困餓刼束之患矣夫為人子孫使其宗廟毀辱為人父母使其比屋死亡此豈仁孝之主所宜忍者乎然而晉梁唐之三帝以晏然致此者自以為其禍災可以不至於此而自不知忽然已至也盖夫天下至大器也非大眀法度不足以維持非衆建賢才不足以保守茍無至誠惻怛憂天下之心則不能詢考賢才講求法度賢才不用法度不脩偷假嵗月則幸或可以無他曠日持久則未甞不終於大亂伏惟皇帝陛下有恭儉之徳有聦明睿知之才有仁民愛物之意然享國日久矣此誠當惻怛憂天下而以晉梁唐三帝為戒之時以臣所見方今朝廷之位未可為能得賢才政事所施未可謂能合法度官亂於上民貧於下風俗日以薄才力日以困窮而陛下髙居深拱未甞有詢考講求之意此臣所以竊為陛下計而不能無慨然者也夫因循茍且逸豫而無為可以徼倖一時而不可以曠日持久晉梁唐三帝者不知慮此故災稔禍變生於一時則雖欲復詢考講求以自救而已無所及矣以古準今則天下安危治亂尚可以有為有為之時莫急於今日過今日則臣恐亦有無所及之悔矣然則至誠詢考而衆建賢才以至誠講求而大明法度陛下今日其可以不汲汲乎書曰若藥不瞑眩厥疾弗瘳臣願陛下以終身之狼疾為憂而不以一日之瞑眩為苦臣既蒙陛下採擢使備從官朝廷治亂安危臣實預其榮辱此臣所以不敢避進越之罪而忘盡規之義伏惟陛下深思臣言以自警戒則天下幸甚安石又上奏曰臣等准今月八日中書劄子奉聖㫖今後舍人院不得申請除改文字切以為舍人者陛下近臣以典掌誥命為職除改乃其職事所當叅審若詞頭所批事情不盡而不得申請則是舍人不得復行其職事而事無可否一聽執政所為自非執政大臣欲傾側而為私則立法不當如此前日具論其故冀蒙陛下省察而至今未奉指揮臣等不知陛下以為是而不改乎将不必以為是而特以出於執政大臣所建而不改乎将陛下視臣等所奏未甞有所可否而執政大臣自持其議而不肯改乎為是而不改則臣等考尋載籍以來未有欲治之世而設法蔽塞近臣議論之端如此者也不必以為是而特以出於執政大臣所建而不改則是陛下不復考問義理之是非一切茍順執政大臣所為而已也若陛下視臣等所奏未甞有所可否而執政大臣自持其議而不肯改則是政已不自人主出而天下之公議廢矣此所以臣等惓惓之義不能自巳者也臣等竊觀陛下自近嵗以來舉天下之事属之七八大臣天下之人初亦翕然幸其有為能救一切之弊然而方今大臣之弱者則不敢為陛下守法以忤諫官御史而專為持禄保位之謀大臣之強者則挟聖㫖造法令恣己所欲不擇義理之是非而諌官御史亦不敢忤其意㫖陛下方且深拱淵黙兩聽其所為而無所問安有朝廷如此而能曠日持久而無亂者乎自古亂之所生不必君臣皆為大惡但無至誠惻怛求治之心擇利害不審辨是非不早以小失為無傷而不改以小善無所補而不為以阿諛順己為恱而其說用以諒直逆己為諱而其言廢積事之不當而失人心者衆矣乃所以為亂也陛下以臣等所言為是則宜以至誠惻怛欲治念亂之心考核大臣改脩政事誠欲改脩政事則今月八日指揮為當先改矣若以臣等所言為非則臣等狂瞽不知治體而誣謗朝廷政事當明加貶斥以懲妄言之罪而别選才能通達之士以補従官臣等受陛下之寵禄典領朝廷職事不得其守則義不得不言而朝廷以為非也則義不敢辭貶斥伏乞詳酌早賜指揮時通判秦州事加直集賢院尹洙上奏曰漢文帝盛徳之主賈誼論當時事勢猶云可為慟哭孝武帝外制四夷以彊主威徐樂嚴安尚以陳勝亡秦六卿簒晉為戒二帝不以危亂滅亡為諱故子孫保有天下者十餘世秦二世時闗東盜起或以反者聞二世怒下吏或曰逐捕今盡不足憂乃恱隋煬帝時四方兵起左右近臣皆隠賊數不以實聞或言賊多者輙被詰二帝以危亂滅亡為諱故秦隋宗社數年為丘墟陛下視今日天下之治孰與漢文威制四夷孰與漢武國家基本仁徳陛下慈孝愛民誠萬萬於秦隋矣至於西有不臣之虜北有彊大之隣非特閭巷盜賊之勢也自西夏叛命四年並塞苦數擾内地疲逺輸兵久於外而休息無期卒有乗弊而起兵法所謂雖有智者不能善其後當此之時陛下宜夙夜憂懼所以慮事變而塞禍源也陛下延訪邊事容納直言前世人主勤勞寛大未有能逺過者然未聞以宗廟為憂危亡為懼此賤臣所以感憤欝悒而不已也何者今命令數更恩寵過濫賜與不莭此三者戒之慎之在陛下所行爾非有難動之勢也而因循不革弊壊日甚臣謂陛下不以宗廟為憂危亡為懼者以此夫命令者人主所以取信於下也異時民間朝廷降一命令皆竦視之今則不然相與竊語以為不久當更既而信然此命令日輕於下也命令輕則朝廷不尊矣又聞群臣有獻忠謀者陛下始甚聴之後復一人沮之則意移矣忠言者以信之不能終頗自詘其謀以為無益此命令數更之弊也夫爵賞陛下所持之柄也近時外戚内臣以及士人或因縁以求恩澤從中而下謂之内降臣聞唐氏政衰或母后專制或妃主擅朝樹恩私黨名為斜封今陛下威柄自出外戚内臣賢而才者當與大臣公議而進之何必襲斜封之弊哉且使大臣從之則壊陛下綱紀不從則沮陛下德音壊紀綱忠臣所不忍為沮徳音則威柄輕於上且盡公不阿朝廷所以責大臣今乃自以私昵撓之而欲責大臣之不私難矣此恩寵過濫之弊也夫賜予者國家所以勸功也比年以來嬪御及伶官太醫之属賜予過厚民間傳言内帑金帛皆祖宗累朝積聚陛下用之不甚愛惜今之所存無㡬疎逺之人誠不能知内府豐匱之數但見取於民者日煩即知畜於公帑者不厚臣亦知國家自西方宿兵用度寖廣帑藏之積未必悉為賜予所費然下民之衆固不可家至而戸曉獨見陛下行事感動爾徃嵗聞邊将王珪以力戰賜金則無不恱服或見優人所得過厚則徃徃憤歎人情不可不察此賜予不莭之弊也臣所論三事皆人人所共知近臣從諛而不言以至今日方今非獨四夷之為患朝政日弊而陛下不寤人心日危而陛下不知故臣願先正於内以正於外然後忠謀漸進紀綱漸舉國用漸足士心漸奮邊境之患庶乎息矣惟深察秦隋惡聞忠言所以亡逺法漢主不諱危亂所以存日新盛徳與民更始則天下幸甚仁宗嘉納之翰林侍讀學士宋綬上言帝王御天下在緫攬威柄而一紀以來令出簾帷自陛下躬親萬務内外延首思見聖政宜懲違革弊以新百姓之耳目而賞罰號令未能有過於前日豈非三事大臣不能推心悉力以輔陛下之治耶頃太后朝多吝除拜而邪幸或徑取升擢議者謂恩出太后今恩賞雖行又謂自大臣出非大臣朋黨罔上何以得此朋黨之為朝廷患古今同之或窺測帝㫖宻令陳奏或附會巳意以進退人大官示恩以招權小人趨利以售進此風寖長有蠧邦政太宗甞曰國家無外憂必有内患外憂不過邊事皆可預防奸邪共濟為内患深可懼也真宗亦曰唐朋黨尤盛王室遂卑願陛下思祖宗之訓念王業艱難整齊綱紀正在今日同知禮院宋祁上疏曰臣伏讀戊寅詔書陛下祗悼變異不忘元元受愆引咎端自克責延問有位廣謀于衆推變所自前事立防将欲還威譴於天極荅震眚於坤順雖姒王罪已商宗念徳蔑以加之群臣莫不延頚企踵恭聽允令誠使有鹵莽之慮窽啓之詞咸樂自效納于聦聽益潤渾渾附輝煌煌以成日新之美臣愚不肖職在史氏位為臺郎𩔖非無知不容自弃輙敢條刺近事上對沖㫖詔曰朕躬之闕遺臣伏惟陛下即位以來十有六年孜孜翼翼動守先訓不侈宫室不飾游畋偃兵緩罰愛重人命無它過失聞于天下雖自謂闕遺遇臣昧死不敢奉詔然有将來可慮者臣願一二陳其崖略陛下試㕘之聖慮揆之人事測之天災質之古義有可行者不以人賤而廢其言則臣生死幸甚臣聞賞罰操決天子之權也奏請可否大臣之事也下陳可否以佐之操決則百度乂寧一人尊強竊見陛下臨視庶政深執謙徳不自先㫁專委大臣使大臣人人如臯陶家家為后稷尚且不可況有託國威而肆忿寄公爵以樹恩者哉臣請粗陳其要且如陛下自欲有所㧞擢大臣以為不可陛下從而罷之又如自欲有所黜去大臣以為不可陛下從而任之如此則權常在臣政不在君昭然可見矣陛下何所忌憚而不略加裁詰遂使中材之人料時之如此欲自結於朝者還附於權黨欲自徇於公者反入於私門威柄寖移人心可繋此将來可慮一也伏望陛下自今以徃審察臣下果有盡忠守正可器用者進擢於朝但論其材勿限資叙陛下以萬機餘景引入便殿賜以清宴普詢闕漏又以所得㕘校時政質其是非俾之中外相應更相維糾則彼之投身納報惟陛下之歸不在他矣臣聞邪之於正譬猶白黒可以立辨今陛下既以此事為正俄而有以為邪者因復中止更為猶豫此最不可之大者夫謀之雖衆決之欲獨劉向曰持不㫁之慮者開群枉之門盖指此也臣願陛下臨事即㫁勿復持疑無令浮議熒惑敗亂美政臣聞忠臣之事君造膝而言跪辭而出所以啟心防患也陛下亦宜隠秘其語保全其人倘漏露主名則為所譏刺者皆切齒而思報矣興誹造謗不退不止一旦罹患而後來者傳以為戒皆茍容偷合背公入黨則陛下雖有盈庭之士朱紫雜襲誰肯與權貴立敵進言而取禍哉此無異挈仇以授奸人自閉其耳目萬事之安危天下不得復聞之矣臣比見茲事巳騐於前伏望陛下考大易失臣之義無襲春秋陽䖏父之枉此将來可慮二也臣伏惟陛下春秋鼎盛皇嗣未立後宫所御當貫魚序進廣求螽斯子孫之福伏望豫示敕誡昭判貴賤使上下有制不相踰越讒謁毁間明垂防禁數詔后妃習知謙退和柔之懿無令僭妬得萌其中此将來可慮三也詔曰執事之阿枉臣不足以慮之然所經怪諫官御史本以選進鯁亮震肅權綱為天子之耳目也今則不然有勢者其奸如山結舌而不問無援者索疵吹毛飛文而歴詆未及滿嵗巳干宰司希兼職而求進秩矣如此則宰司有失諫官御史肯為陛下盡言乎使言者捨當用而取不急陛下果可聽之乎臣故曰諫官御史出宰司之進㧞者非陛下之利也夫輕授重責難以得人但賞不罰難以肅下今若令居是官者終歳不言及言而不當坐不任職退挾持私意有所回慝坐縱誅不畏強禦議劾嚴正者陛下自意擢之無令有司得與此亦救阿枉之一也詔曰政教未臻于理刑罰靡協于中在位有壅蔽之人效官有貪墨之吏臣聞傳曰正其本萬事理又曰人存則政舉人亡則政息茍使天子持柄于上群臣率職於下如臣前所陳者大猷㡬務将交脩畢舉矣安有政未臻理刑靡協中乎至於海縣浩繁官不悉善或察㢘無状或貪冒公行或民窮無訴或事紛未治大且抵死小則免官案章一下交手受械事輕人求曷足應天變而闗國體乎要之災異之發政教之本在朝廷君臣之間耳詔曰擇善而行固非虚飾此誠陛下勤恁悃愊紬繹下情申啟言路必收治效也臣聞徒善不足為政徒法不足自行天之感物不為偽動今陛下偉然日昃已降徳音群臣将畢精極慮随事納說必有可采伏望朝廷開許施行此則順民心承天意轉禍為福聖人銷伏之實也然臣尚有所慮者今臣下準詔例得獻言言不深切則事不明白或恐有昧儀矩罔識禁忌論安危則便云泰山累卵指宴飲則直曰酒池肉林伏望陛下納汙含垢一切裁赦兼容博聽以取其長勿令有坐狂言而得罪者則聖徳光大感無還日矣言髙位下自知不韙臣無任省循狂瞽惶恐待罪之至程頥上疏曰臣伏觀前古聖明之主無不好聞直諫博采芻蕘故視益明而聽益聦紀綱正而天下治昏亂之主無不惡聞過失忽棄正言故視益蔽而聽益塞紀綱廢而天下亂治亂之因未有不由是也伏惟陛下徳侔天地明並日月寛慈仁聖自古無比曷甞害一忠臣􅓍一正士群臣雖有以言事得罪者旋復㧞擢過其分際此千載一遇言事之秋也桀紂暴亂殘賊忠良然而義士不顧死以盡其莭明聖在上其仁如天布衣之士雖非當言責也茍有可以裨聖治何忍黙黙而不言哉今臣竭其愚忠非有斧鉞之虞也所慮進言者至衆豈盡可取狂愚必多而陛下因謂賤士之言無適用者臣雖披心腹瀝肝膽不見省覽秪成徒為此臣之所懼也儻或陛下少留聖慮則非臣之幸實天下之幸臣請自陳所學然後以臣之學議天下之事臣所學者天下大中之道也聖人性之為聖人賢者由之為賢者堯舜用之為堯舜仲尼述之為仲尼其為道也至大其行之也至易三代以上莫不由之自秦而下衰而不振魏晉之属去之逺甚漢唐小康行之不醇自古學之者衆矣而考其得者盖寡焉道必充於已而後施以及人是故道非大成不茍於用然亦有不私其身應時而作者也出䖏無常惟義所在所謂道非大成不茍於用顏回曾參之徒是也天之大命在夫子矣故彼得自善其身非至聖人則不出也在於平世無所用者亦然所謂不私其身應時而作者諸葛亮及臣是也亮感先主三顧之義閔生民塗炭之苦思致天下於三代義不得自安而作也如臣者生逢聖明之主而天下有危亂之虞義豈可茍善其身而不以一言悟陛下哉故曰出䖏無常惟義所在臣請議天下之事不識陛下以今天下為安乎危乎治乎亂乎烏可知危亂而不思救之之道如曰安且治矣則臣請明其未然方今之勢誠何異於抱火厝之積薪之下而寝其上火未及然因謂之安者乎書曰民惟邦本本固邦寧竊惟固本之道在於安民安民之道在於足衣食今天下民刀匱竭衣食不足春耕而播延息以待一嵗失望便須流亡以此而言本未得為固也臣科陛下仁慈愛民如子必不忍使之困苦一至於是臣竊疑左右前後壅蔽陛下聦明使陛下不得而知今國家財用常多不足不足則責於三司三司責諸路轉運轉運何所出誅剥於民爾或四方有事則多非時配率毒害尤深急令誅求竭民膏血徃徃破産亡業骨肉離散衆人觀之猶可傷痛陛下為民父母豈不閔哉民無儲備官廪復空臣觀京師縁邊以至天下率無二年之備卒有連嵗凶災如明道中不知國家何以待之坐食之卒計踰百萬既無以供費将重斂於民而民已散矣強敵乗隙於外奸雄生心於内則土崩瓦解之勢深可虞也太寧之世聖人猶不忘為備必有九年之蓄以待凶嵗況今百姓困苦愁怨之氣上衝于天災沴凶荒是所召也陛下能保其必無乎中民之家有十金之産子孫不能守則人皆謂之不孝陛下承祖宗基業而前有土崩瓦解之勢可不懼哉契丹強盛自古無比幸而目前尚守盟誓果能以金帛厭其欲乎能必料其常為今日之計乎則夫沿邊豈宜無備益以兵則用不足省其戍則力弗支皆非長乆之䇿也前者昊賊叛逆西垂用兵數年之間天下大困盖内外經制多失其宜陜西之民苦毒尤甚及多逃散重以軍法禁之以至人心大怨皆有思寇之言悖逆之心不敢以聞聖聽顧恐陛下亦頗知之故曰無常產而有常心者惟士為能彼庶民者飢寒既切於内父子不相保尚能顧忠義哉非民無良政使然也當時秦中寇盜屢起儻稽樸滅必多響應幸而旬時盡能誅翦尚頼社稷之福西敵亦疲彼如未可遽圖遂且詭辭稱順向若更相牽制未得休兵内釁将生言之可駭今天下勞弊不比景祐以前復有如曩時之役臣愚切恐不能堪矣況為患者豈止西戎臣毎思之神魂飛越不知朝廷議者以為如何亦甞置之慮乎其謂制之無術乎臣竊謂今天下猶無事人命未甚危陛下宜早警惕于𠂻思行王道不然臣恐嵗月易失因循不思事勢觀之理無常爾雖我太祖之有天下救五代之亂不戮一人自古無之非漢唐可比固知趙氏之祀安於泰山然而損陛下之聖明陷斯民於荼毒深可痛也臣料群臣必未甞有為陛下陳王道者以陛下聖明豈有言而不行者乎竊惟王道之本仁也臣觀陛下之仁堯舜之仁也然而天下未治者誠由有仁心而無仁政爾故孟子曰今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也陛下精心庶政常懼一夫不獲其所未甞以一喜怒殺一無辜官吏有犯入人罪者則終身棄之是陛下愛人之深也然而凶年飢嵗老弱轉死於溝壑壮者散而之四方為盜賊犯刑戮者㡬千萬人矣豈陛下愛人之心哉必謂嵗使之然非政之罪歟則何異於刺人而殺之曰非我也兵也三代之民無是病也豈三代之政不可行於今邪州縣之吏有陷人於辟者陛下必深惡之然而民不知義復迫困窮放僻邪侈而入於罪者非陛下陷之乎必謂其自然則教化聖人之妄言耶天下之治由得賢也天下不治由失賢也世不乏賢顧求之之道如何爾今夫求賢本為治也治天下之道莫非五帝三王周公孔子治天下之道也求乎明於五帝三王周公孔子治天下之道者各以其所得大小而用之有宰相事業者使為宰相有卿大夫事業者使為卿大夫有為郡之術者使為刺史有治縣之政者使為縣令各得其任則無職不舉然而天下弗治者未之有也國家取士雖以數科然而賢良方正嵗止一二人而已又所得不過博文強記之士爾明經之属唯專念誦不曉義理尤無用者也最貴盛者惟進士科以詞賦聲律為工詞賦之中非有治天下之道也人學之以取科第積日累久至於卿相帝王之道教化之本豈嘗知之居其位責其事業則未甞學之譬如胡人操舟越客為御求其善也不亦難乎徃者丁度建言祖宗以來得人不少愚瞽之甚議者至今切齒使墨論墨固以墨為善矣今天下未治誠由有君而無臣也豈世無人求之失其道爾茍欲取士必得豈無術哉王道不醇行二千年矣後之愚者皆云時異事變不可復反此則無知之深也然而人主徃徃惑於其言今有人得物於道示玉工曰玉也示衆人曰石也則将以玉工為是乎以衆人為然乎必以玉工為是矣何者識與不識也聖人垂教思以治後世而愚者謂不可行於今則将守聖人之道乎從衆人之言乎謂衆人以王道可行其猶詰瞽者以五色之鮮詢聾者以八音之美其曰不然宜也彼非憎五色而惡八音聞見限也臣觀陛下之心非不憂慮天下也以陛下憂慮天下之心行王道豈難乎哉孟子曰以齊王猶反手也又曰師文王大國五年小國七年必為政於天下矣以諸侯之位一國之地五年可以王天下況陛下居天子之尊令行四海如風之動茍行王政奚啻反手之易哉昔者大禹治水八年於外三過其門而不入思以利天下雖勞苦不避也今陛下行王政非有苦身體勞思慮之難也何憚而不為哉孝經曰立身行道揚名於後世以顯父母孝之終也匹夫猶當行道以顯父母況陛下貴為天子豈不能發憤求治思齊堯舜納民仁夀上光祖考垂休無窮凢所謂孝無大於此者也臣以謂治今天下猶理亂絲非持其端條而舉之不可得而治也故臣前所陳不及歴指政治之闕但明有危亂之虞救之當以王道也然而行王之道非可一二而言願得一面天顔罄陳所學如或有取陛下其置之左右使盡其誠茍實可用陛下其大用之若行而不効當服罔上之誅亦不虚受陛下爵禄也陛下問群臣群臣必謂寒賤之士未可使近上側自臣思之以為不然臣髙祖羽太祖朝年六十餘為縣令一言遭遇聖祖特加㧞擢攀附太宗終於兵部侍郎顧遇之厚群臣無比備存家牒不敢繁述臣曽祖希振既以父任後祖遹復被推恩國家録先世之勲臣父珦又蒙延賞今為國子博士非有横草之功食君禄四世一百年矣臣料天下受國恩之厚無如臣家者臣自識事以來思為國家盡死恨未得其路爾則臣進見宜無疑也或者更為強詞言其不可此乃自負隂私懼防詆訐者也伏望陛下出於聖斷勿徇衆言以王道為心以生民為念黜世俗之論期非常之功昔漢武笑齊宣王不行孟子之說自致不王而不用仲舒之䇿隋文笑漢武不用仲舒之䇿不至於道而不聽王通之言二主之昏料陛下亦甞笑之矣臣雖不敢望三子之賢然臣之所學三子之道也陛下勿使後之視今猶今之視昔則天下不勝幸甚望陛下特留意焉臣愚無任踰越狂狷恐懼之極臣頥昧死頓首謹言歴代名臣奏議巻三十三
