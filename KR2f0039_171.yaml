body:
  text: 歴代名臣奏議卷一百七十一明楊士竒等撰考課漢元帝建昭中亰房以精於用易天子恱之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致灾異宜令百官各試其功灾害可息詔使房作其事房奏考功課吏法上令公卿議於温室咸病其煩碎且令上下相司不可行然上意嚮之東漢順帝時尚書令左䧺上䟽曰臣聞柔逺能邇莫大寜人寧人之務莫重用賢用賢之道必存考黜是以臯陶對禹貴在知人安民則惠黎民懐之分伯建侯代位親民民用和睦禮讓以興故詩云有渰淒淒興雨祁祁雨我公田遂及我私及幽厲昏亂不自為政襃豔用權七子黨進賢愚錯緒山谷為陵故其為詩云四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也宗周既滅六國并秦阬儒泯典剗革五等更立郡縣縣設令長郡置守尉什伍相司封豕其民大漢受命雖未復古然克慎庻官蠲苛捄敝恱以濟難撫而循之至於文景天下康乂誠由𤣥靖寛柔克慎官人故也降及宣帝興於仄陋綜練名實知時所病刺史守相輙親引見考察言行信賞必罰帝乃嘆曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業乆於其事則民服教化其有政理者輙以璽書勉勵増秩賜金或爵至關内侯公卿闕則以次用之是以吏稱其職人安其業漢世良吏於兹為盛故能降來儀之瑞建中興之功漢初至今三百餘載俗寖彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懐一切莫慮長乆謂殺害不辜為威風聚歛整辦為賢能以理已安民為劣弱以奉法循理為不化髠鉗之戮生於睚皆覆尸之禍成於喜怒視民如寇讐稅之如豺虎監司項背相望與同疾疢見非不舉聞惡不察觀政於亭傳責成於朞月言善不稱徳論功不據實虚誕者獲譽拘檢者離毁或因罪而引髙或色斯以求仁州宰不覆競共辟召踴躍升騰超等踰匹或考奏捕案而亡不受罪㑹赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流闕動百數鄉官部吏職斯賤也禄薄車馬衣服一出於民亷者取足貪者充家特選横調紛紛不絶送迎煩費損政傷民和氣未洽灾眚不消咎皆在此今之墨綬猶古之諸侯拜爵王庭輿服有庸而齊於匹䜿叛命避負非所以崇憲明理恵育元元也臣愚以為守相長吏恵和有顯效者可就増秩勿使移徙非父毋喪不得去官其不從法禁不式王命錮之終身雖㑹赦令不得齒列若被劾奏亡不就法者徙家邉郡以懲其後鄉部親民之吏皆用儒生清白任從政者寛其負筭増其禄秩吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所追配文宣中興之軌流光垂祚永世不刋魏武帝初署倉曹属劉廙上表曰昔周有亂臣十人有婦人焉九人而已孔子稱才難不其然乎明賢者難得也況亂弊之後百姓凋盡士之存者盖亦無㡬股肱大職及州郡督司邉方重任雖備其官亦未得人也此非選者之不用意盖才匱使之然耳况於長吏以下羣職小任能皆簡練備得其人也其計莫如督之以法不爾而數轉易往來不已送迎之煩不可勝計轉易之間輙有姦巧既於其事不省而為政者亦以其不得乆安之故知恵益不得成於己而苟且之可免於患皆將不念盡心於䘏民而夢想於聲譽此非所以為政之本意也今之所以為黜陟者近頗以州郡之毁譽聽往來之浮言耳亦皆得其事實而課其能否乎長吏之所以為佳者奉法也憂公也卹民也此三事者或州郡有所不便往來者有所不安而長吏執之不已於治雖得計其聲譽未有美闕而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以為長吏皆宜使小人足使自展嵗課之能三年總計乃加黜陟課之皆當以事不得依名事者皆以戸口率其墾田之多少及盜賊𤼵興民之亡叛者為得負之計如此行之則不能之吏脩名無益有能之人無名無損法之一行雖無部司之監姦譽妄毁可得而盡事上太祖甚善之明帝太和中大議考課之制以考内外衆官散騎黄門侍郎杜恕以為用不盡其人雖才且無益所存非所務所務非世要上䟽曰書稱明試以功三考黜陟誠帝王之盛制使有能者當其官有功者受其禄譬猶烏獲之舉千鈞良樂之選驥足也雖歴六代而考績之法不著關七聖而課試之文不垂臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可専任則唐虞可不須稷契之佐殷周無貴伊吕之輔矣今奏考功者陳周漢之法為綴京房之本㫖可謂明考課之要矣於以崇揖譲之風興濟濟之治世以為未盡善也其欲使州郡考士必由四科皆有事效然後察舉試辟公府為親民長吏專以功次補郡守者或就増秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之法法具施行立必信之賞施必行之罰至於公卿及内職大臣亦當俱以其職考課之也古之三公坐而論道内職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能徧照故君為元首臣為股肱明其一體相須而成也是以古人稱廊廟之材非一木之枝帝王之業非一士之畧由是言之焉有大臣守職辦課可以致雍熈者哉且布衣之交猶有務信誓而蹈水火感知己而披肝膽狥聲名而立節義者況於束帶立朝致位卿相所務者非特匹夫之信所感者非徒知己之恵所狥者豈聲名而已乎諸䝉寵禄受重任者不徒欲舉明主於唐虞之上而己身亦欲廁稷契之列是以古人不患於念治之心不盡患於自任之意不足此誠人主使之然也唐虞之君委任稷契夔龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓貴勢執平不阿所私危言危行以處朝廷者自明主所察也若尸禄以為髙拱嘿以為智當官茍在於免負立朝不忘於容身潔行遜言以處朝廷者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不脩而私議成俗雖仲尼為謀猶不能盡一才又況於世俗之人乎今之學者師商韓而上法術競以儒家為迂闊不周世用此最風俗之流弊創業者之所致慎也景初中詔劉劭作都官考課劭上䟽曰百官考課王政之大較然而歴代弗務是以治典闕而未補能否混而相蒙陛下以上聖之宏略愍王綱之弛頽神慮内鑒明詔外發臣奉恩曠然得以啓矇輙作都官考七十二條司𨽻校尉崔林議曰案周官考課其文備矣自康王以下遂以陵遲此即考課之法存乎其人也及漢之季其失豈在乎佐吏之職不宻哉方今軍旅或猥或卒備之以科條申之以内外増減無常固難一矣且萬目不張舉其綱衆毛不整振其領臯陶仕虞伊尹臣殷不仁者逺五帝三王未必如一而各以治亂易曰易簡而天下之理得矣太祖隨宜設辟以遺來今不患不法古也以為今之制度不為䟽闊惟在守一勿失而已若朝臣能任仲山甫之重式是百辟則孰敢不肅於是𫝊嘏難劭曰盖聞帝制宏深聖道奥逺茍非其才則道不虚行神而明之存乎其人暨乎王略虧頺而曠載罔綴㣲言既没六籍泯玷何則道𢎞致逺而衆才莫睎也案劭考課論雖欲尋前代黜陟之文然其制度略以闕亡禮之存者惟有周典外建侯伯藩屏九服内立列司筦齊六職土有恒貢官有定則百揆均任四民殊業故考績可理而黜陟易通也大魏繼百王之末承秦漢之烈制度之流靡所脩采自建安以來至于青龍神武撥亂肇基皇祚埽除凶逆芟夷遺宼旌旗卷舒日不暇給及經邦治戎權法並用百官羣司軍國通任隨時之宜以應政機以古施今事雜義殊難得而通也所以然者制宜經逺或不切近法應時務不足垂後夫建官均職清理民物所以立本也循名考實糾勵成規所以治末也本綱未舉而造制未呈國略不崇而考課是先懼不足以料賢愚之分精幽明之理也昔先王之擇才必本行於州閭講道於庠序行具而謂之賢道脩則謂之能鄉老獻賢能于王王拜受之舉其賢者出使長之科其能者入使治之此先王收才之義也方今九州之民爰及京城未有六鄉之舉其選才之職專任吏部案品状則實才未必當任薄伐則徳行未為叙如此則殿最之課未盡人才述綜王度敷賛國式體深義廣難得而詳也晉武帝泰始中河南尹杜預受詔為黜陟之課其略曰臣聞上古之政因循自然虚已委誠而信順之道應神感心通而天下之理得逮至淳樸漸散彰美顯惡設官分職以頒爵禄𢎞宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博詢敷納以言及至末世不能紀逺而求於宻微疑諸心而信耳目疑耳目而信簡書簡書愈繁官乃愈偽法令滋章巧飾彌多昔漢之刺史亦嵗終奏事不制筭課而清濁粗舉魏氏考課即亰房之遺意其文可謂至宻然由於累細以違其體故歴代不能通也豈若申唐堯之舊去宻就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任達官各考所統在官一年以後毎嵗言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採案其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之今考課之品所對不鈞誠有難易若以難取優以易而否主者固當準量輕重㣲加降殺不足復曲以法盡也己丑以詔書考課難成聽通薦例薦例之理即亦取於風聲六年頓薦黜陟無漸又非古者三考之意也今每嵗一考則積優以成陟累劣以取黜以士君子之心相處未有官故六年六黜清能六進否劣者也監司將亦隨而彈之若令上下公相容過此為清議大頽亦無取於黜陟也穆帝時衆官漸多而遷徙毎速廷尉王彪之上議曰為政之道以得賢為急非謂雍容廊廟標的而已固將蒞任賛時職思其憂也得賢之道在於蒞任蒞任之道在於能乆乆於其道而天下化成是以三載考績三考黜陟不收一切之功不採速成之譽故勲格辰極道融四海風流遐邈聲冠百代凡庸之族衆賢能之才寡才寡於世而官多於朝焉得不賢鄙共貫清濁同官官衆則闕多闕多則遷速前後去來更相代補非為故然理固然耳所以職事未脩朝風未澄者也職事之脩在於省官朝風之澄在於并職官省則選清而得乆職并則吏簡而俗静選清則勝人乆於其事事乆則中才猶足有成今内外百官較而計之固應有并省者矣六卿之任太常望雅而職重然其所司義髙務約宗正所統盖尠可以并太常宿衞之重二衞任之其次驍騎左軍各有所領無兵軍校皆應罷廢四軍皆罷則左軍之名不宜獨立宜改㳺擊以對驍騎内官自侍中以下舊員皆四中興之初二人而已二人對直或有不周愚謂三人於事則無闕也凡餘諸官無綜事實者可令大官隨才位所帖而領之若未能頓廢自可因闕而省之委之以職分責之以有成能否因考績而著清濁隨黜陟而彰雖緝熈之隆康哉之歌未能猝致可使庶官之選差清蒞職之日差乆無俸禄之虚費簡吏寺之煩役矣後魏宣武帝行考陟之法髙陽王雍表曰竊惟三載考績百王通典今任事上中者三年昇一階散官上第者四載登一級閒冗之官本非虚置或以賢能而進或因累勤而舉如其無能不應忝兹髙選既以其能進之朝伍或任官外戍逺使絶域催督逋懸察檢州鎮皆是散官以充劇使及於考陟排同閒伍散官之人非才皆劣稱事之軰未必悉賢而考閑以多年課煩以少嵗上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明參差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手渉議科勤絶於散官之筆遂使在事者得展自勤之能散軰者獨絶披衿之所抑以上下之閑限以㫖格之判致使近侍禁職抱槃屈之辭禁衞武夫懐不申之恨欲剋平四海何以獲諸又散官在直一玷成尤銜使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以禄㣲加賞罪殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啓處又曰豈不懐歸畏此簡書依依楊栁以叙治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢杖杜之歌罷又任事之官吉凶請假定省掃拜動歴十旬或因患重請動輙經嵗征役在途勤勞百倍苦樂之勢非任事之倫在家私閒非理務之日論優語劇先宜折之武人本挽上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不渉或帯甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彦或歴嶮千餘或履危萬里登有死亡之憂咸懐不返之慼魂骨奉忠以尸將命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奬勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年升一階檢無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上陟上第之士由汎而退臣又見部尉資品本居流外刋諸明令行之已乆然近為里巷多盜以其威輕不肅欲進品清流以壓姦宄甄深啓云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭覽更髙宰尉之秩今考格始宣懐怨者衆臣竊觀之亦謂不可有光國典改之何難延昌二年將大考百寮郎中崔鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以噐黜陟幽明揚清激濁故績效能官才必稱位者朝昇夕進年嵗數遷豈拘一階半級閡以官寮等位者哉二漢以降太和已前茍必官須此人人稱此職或超騰昇陟數嵗而至公卿或長兼試守稱允而遷進者披卷則人人而是舉目則朝貴皆然故能時收多士之譽國號豐賢之美竊見景明以來考格三年成一考一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如黄龔儒學如王鄭史才如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一槩不曽甄别琴瑟不調改而更張雖明㫖已行猶宜消息世宗不從孝明帝時尚書左僕射攝吏部選事拓跋暉上䟽曰臣聞治人之本寔委牧守之官得其才則政平物理失其人則訟興怨結自非察訪善惡明加貶賞將何以黜彼貪怠陟此清勤也竊以大使廵省必廣迎送之費御史馳糾頗回威濫之刑且蹔爾往還理不委悉縱有簡舉良未平當愚謂宜令三司八座侍中黄門各布耳目外訪州鎮牧將治人守令能否若徳教有方清白獨著宜以名聞即加襃陟若治績無效貪暴逺聞亦便示牒登加貶退如此則不出庭户坐知四方端委垂拱明賞審罰矣正光四年尚書左僕射蕭寳夤上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可知矣大較在于官人用才審於所蒞練迹校名驗於虚實豈不以臧否得之餘論優劣著於歴試者乎既聲窮於月旦品定於黄紙用效於名軰事彰於臺閣則賞罰之途差有商準用捨之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第慎其與奪噐分定於下爵位懸於上不可妄叨故也今竊見考功之典所懐未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地徳行之稱為生之最首忠貞之美立朝之譽仁義之號處身之端自非職惟九官任當四岳授曰汝諧譲稱俞往將何以克厭大名允兹令問自比已來官㒺髙卑人無貴賤皆飾辭假說用相保舉涇渭同波薰蕕共噐求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身名廢絶或具寮離索或同事凋零雖當時文簿記其殿最日乆月深駮落都盡人有去留誰復掌其勤惰或停休積稔或分隔數千累年之後方求追訪聲迹立其考第無不茍相恱附共為脣齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢達君子未免斯患中庸已降夫復何論官以求成身以請立上下相䝉莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程既而限滿代還復經六年而叙是則嵗周十二始得一階於東西兩省文武閒職公府散佐無事冗官或數旬方應一直或朔望止於蹔朝及其考日更得四年為限是則一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虚名而升陟之方甚易何内外之相懸令厚薄之如是又聞之聖人大寳曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古人先修其天爵而人爵從之故雖文質異時汚隆殊世莫不寳兹名噐不以假人是以賞罰之柄恒自持也至乃周之藹藹五叔無官漢之察察館陶徒請豈不重骨肉私親親誠以賞罰一差則無以懲勸至公蹔替則覬覦相欺放至慎至惜殷勤若此況乎親非肺腑才乖秀逸或夾單介之使始無汗馬之勞或說興利之規終慙十一之潤皆虚張無實妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辯鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其苦斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者既不可追來者猶或宜改按周官太宰之職嵗終則令官府各正所司受其㑹計聽其致事而詔於王三嵗則大計羣吏之治而誅賞之愚謂今可粗依其準見居官者每嵗終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕說一無取焉列上尚書覆其合否如有紕謬即正而罰之不得方復推詰委否容其進退既定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞縂而奏之經奏之後考功曹别書於黄紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黄門印署掌在尚書嚴加緘宻不得開視考績之日然後對共裁量如此則少存實録薄止姦回其内外考格裁非庸管乞求博議以為畫一若殊謀異䇿事關廢興遐邇所談物無異議者自可臨時斟酌匪拘恒例至如援流引比之訴貪榮求級之請如不限以關鍵肆其傍通則蔓草難除㳙流遂積穢我彛章撓兹大典謂宜明加禁斷以全至治開返本之路杜澆弊之門如斯則吉士盈朝薪槱載煥矣詔付外博議以為永式唐太宗貞觀三年僕射房𤣥齡與侍中王珪掌内外官考侍御史權萬紀奏其不平守祕書監魏徴諫曰二人素以忠直被委任所考既多其間能無一二不當然察其情終非阿私且萬紀比在考堂曽無駁正及身不得考乃始陳論此非竭誠狥國也今推之未足禆益朝廷徒失委任大臣之意臣所愛者治體非敢私二臣也上乃釋不問太宗考三品已上令魏徴省其當否有所疑者輙於狀傍注帖西行諸將並不得考徴乃諫曰臣聞採赤璧者棄其㣲瑕録大功者不論細過西行諸將雖無大功君集萬均克平寇亂不辱國命跋渉艱阻來往二年考其勤勞與在家者不異若使人無怨讟亦不可勸勉將來臣愚以謂西行諸將君集萬均以外五品以上有功勲無罪殿者其考請更斟酌匪唯一事得所足以勸後人太宗從之武后時初置右御史臺察州縣吏善惡風俗得失鳯閣舍人李嶠上䟽曰禁網尚䟽法象宜簡簡則法易行而不煩雜䟽則所羅廣而不苛碎伏見垂拱時諸道廵察使科條四十有四至别勅令又三十而使以三月出盡十一月奏事每道所察吏多者二千少亦千計要在品覈才行而褒貶之今期㑹廹促奔逐不暇欲望詳究所能不亦艱哉此非隳於職才有限力不逮耳臣願量其功程以為節制使噐周於用力濟於時然後得失可以精覈矣又言今之所察按準漢六條而推廣之則無不包矣烏在多張事目也且朝廷萬機非無事而機事之動常在四方故出使者冠盖相望今已置使則外州之事悉得專之傳驛減矣請率十州置一御史以朞嵗為之限容其身到屬縣過閭里督察姦訛采訪風俗然後可課其成功且御史出入天禁勵己自脩比他吏相百也按劾回庸糾擿隱欺比他吏相十也陛下誠用臣言妙擇賢能委之心膂假温言以制之陳賞罰以勸之則莫不盡力而効死矣何政事之不理何禁令之不行何妖孽之敢興哉中宗時右御史臺中丞盧懐慎上䟽陳時政曰臣聞善人為邦百年可以勝殘去殺孔子稱茍有用我者朞月而已可三年有成故書三載考績三考黜陟幽明昔子産相鄭更法令布刑書一年人怨思殺之三年人徳而歌之子産賢者也其為政尚累年而後成況常材乎比州牧上佐兩畿令或一二嵗或三五月即遷曽不論以課最使未遷者傾耳以聽企踵以望冐進亡亷亦何暇為陛下宣風恤人哉禮義不能興戸口益以流倉庫愈匱百姓日敝職為此耳人知吏之不乆不率其教吏知遷之不遥不究其力媮處爵位以飬資望雖明主有勤勞天下之志然僥倖路啓上下相䝉寧盡至公乎此國病也賈誼所謂蹠盭乃小小者耳此而不革雖和緩將不能為漢宣帝綜覈名實興治致化黄霸良二千石也加秩賜金就旌其能終不肯遷故古之為吏至長子孫臣請都督刺史上佐畿令任未四考不得遷若治有尤異或加賜車裘禄秩降使臨問璽書慰勉須公卿闕則擢之以勵能者其不職或貪暴免歸田里以明賞罰之信昔唐虞稽古建官惟百夏商官倍亦克用乂此省官也故曰官不必備惟其才無曠庶官天工人其代之此擇人也今京諸司員外官數十倍近古未有謂不必備則為有餘求其代工乃多不釐務而奉禀之費嵗巨億萬徒竭府藏豈致治意哉今民力敝極河渭廣漕不給京師公私耗損邉隅未静儻炎暵成沴租稅減入疆埸有警賑救無年何以濟之毋輕人事惟艱毋安厥位惟危此慎㣲也原員外之官皆一時良幹擢以才不申其用尊以名不任其力自昔用人豈其然歟臣請才堪牧宰上佐並以遷授使宣力四方責以治狀有老病若不任職者一廢省之使賢不肖確然殊貫此切務也夫冒于寵賂侮于鰥寡為政之蠧也竊見内外官有賕餉狼籍劓剥蒸人雖坐流黜俄而遷復還為牧宰任以江淮嶺磧粗示懲貶内懐自棄狥貨掊貲訖無悛心明主之於萬物平分而無偏施以罪吏牧遐方是謂恵姦而遺逺逺州陬邑何負聖化而獨受其惡政乎邉儌之地夷夏雜處憑險恃逺誠易擾而難安官非其才則黎庶流亡起為盜賊由此言之不可用凡才況猾吏乎臣請以贓論廢者削迹不數十年不賜收齒書曰旌别淑慝即其誼也䟽奏不報宋太祖乾徳二年門下侍郎平章事趙普上奏曰臣近者叨承聖造備位台司任重才輕以榮為懼臣伏聞宰相者上符乾象下代天工調六氣則品物咸亨舉百職則彛倫式叙佐君垂拱致時太平茍非此才焉用彼相臣自膺寵命如履薄冰䖍思援古施今少裨廣視逺聽伏自陛下天命攸屬人情有歸西伐壺關東平淮甸馳驅虎旅霜露翠華開創之初實艱難于王業平定之後思整頓于皇綱六十年驕倨荆湖咸歸至化五千里混同書軌盡革澆風是知惟徳動天惟天佑徳惟至公而超百代念不驕而為永圖可以肩拍唐虞篲驅晉魏立太平之基已固致雍熈之化方隆臣幸遇昌期尋當重委尸禄徒乆立事無聞固無宰相之才謬居宰相之位寵澤斯厚循省何安所願夜思晝行獻可替否精求古道上副天心臣以謂治國莫如用賢用賢莫如歴試歴試莫如責功責功莫如較考況三考之典出自唐虞四善之科垂于令式當治世之激勸不間公卿由近代以因循止及州縣遂使居官食禄賢愚無分别之因冒寵挾私陞黜有泛濫之弊厥官徒設其噐若虚凡庭揖以庭趨但旅進而旅退由是職皆不舉人盡偷安若不法于舊章恐轉隳于庶務臣欲起請今後除節察防禦團練刺史及武臣等盖必戰伐立效禄位酬勲凡公事仰委官吏振舉外伏請先自宰相次百執事至于賔客寮佐等皆請逐嵗書考所冀事皆師古理得從長退不肖而進賢才更無疑慮勸奉公而修職業各盡器能倘書考之請遂行則太平之期可待應有合關考課事件伏請下考功按令式詳定條奏太宗淳化三年祕書丞直史館陳靖上奏曰臣今日内殿起居次當轉對自量荒昧莫識變通當求理之期唯思進說顧犯顔之罪不敢避誅庻同千慮之愚少助萬機之智伏以皇帝陛下應乾御宇十六七年拓土開疆萬數千里尊師問道期庶績以咸熈審官求賢欲百揆而時序每日臨軒决政隨事制宜小大之權悉干進止以至中夜忘寐未明求衣惕厲恭勤何甞暫捨臣誠不佞以臣所觀由堯舜已還君天下者未有若陛下之焦勞也然則焦思勞神陛下之所已至守官供職羣臣之所未專頽壊紀綱虧損政教者誠以考課之法尚闕升降之資不常得之者未必賢才失之者未盡不肖舜典曰三載考績三考黜陟幽明夫子曰茍有用我者三年有成盖聖人因其國而設其官乆其官以行其政官不乆何以明其術政不行何以觀其化明術則美惡難逃觀化則治亂可審然後考課之法不得不精黜陟之方不得不當既精且當雖元凱在下致之於股肱四凶居髙投之於荒服乃其分也夫何怨焉語云舜有天下舉臯陶不仁者逺矣湯有天下舉伊尹不仁者逺矣静而思之由此道也伏見前制有考課官人之法先在有司定其優劣六品而下尚書覆問五品已上天子與公卿評其善惡上上者遷之下下者黜之中中者常調之能否各當賞罰大行方今幕職州縣官雖流内銓考其資歴京朝監司之任審官院較彼幽明然且寮屬至繁寰宇至廣不可逺視遐聽究極是非徒能按式准文聊為隆殺往往假聲竊譽驟越階資課實責虚不拘殿最且人心猶水法制猶防或禦得其宜則澄徹之姿至矣茍限非其要則懐㐮之勢起焉又況州縣之官乃京朝之基本京朝之任亦卿相之椎輪必須先正其初然後不撓其末今考功之職雖有其名綿歴嵗時莫聞振舉是致有自州縣幕職遽升京秩賛洗三丞者纔及京官秩賛洗三丞便望正言司諫郎中御史者洎至正言司諫郎中御史又圖給舍丞郎既得給舍丞郎即希公卿宰輔者爭馳互競厚援廣交接聲勢以相毁稱伺釁隙而相攻擊貪名冒進棄禮譲以如遺揣已循涯豈滿盈而知戒如此則下位者唯用心而圖上在上者誠自固而不遑雖有臯夔稷契之能龔黄魯宓之術亦何暇卹民憂國而成功著業者哉臣按于傳品士之科一曰徳行以立道本二曰理才以詳事機三曰政才以經國體四曰學才以綜典文五曰武才以禦軍旅六曰農才以教耕稼七曰工才以作器用八曰商才以興利源九曰雜才以長諷諫凡此九等委在百司合而論之則邦國之政斯備分而考之則小大之職各揚又李唐考課有徳義清謹公平廉恪之科由近侍至于鎮防並據職事目之為最各有等級元屬考功以臣所觀自古黜陟之制其逺者逮至九載其近者六年四年擬之於今不可猝用臣欲乞天下諸色官屬依舊三年替移仍一年一考是非三考然後升降有績者賞無勞者罰善最特異者錫以殊勞累任無狀者置之散地不能致功雖有善名者不與之陟不廢其職雖有惡名者不録其尤黜陟審於實不信於虚幽明察於直不慿於詐其在京百司及䑓省巳上官逐年乞選任公直御史一人採察能否虛實之狀職事者以功勤為效散官者以才行為程必在周詳無許濶略其外地長吏使臣寮屬已下乞委逐路轉運使副亦如御史所行並至年終具逐人功過事狀開拆申奏乞下考功從考功依准格條比附優劣一如往制先定考辭量等級而褒懲體幽明而黜陟必取允當無渉黨偏然後申入中書及關報流内銓并審官院再加詳酌的是公平即具等第奏聞取候聖㫖除授其中或有竒才異略藴蓄經綸碩學䧺文服勤筆硯可以整齊綱紀羽翼朝廷師傅帝王扶持社稷者不在此限并内外官屬或有過惡之跡不預品較之文别致昭穆㑹得確實若採訪有漏即罪採訪之官如考課不明即罪考課之職按其輕重斷在必行庶使各勵恭勤無敢弛慢如此則官有常序事有彛倫姦宄不能任其邪忠良不可奪其正名噐各有分賢愚各有途狗不續貂石不參玉欲使職事不治政教不行民不康俗不阜爭訟不息㢘遜不興者未之有也臣誠以能致民康俗阜訟息遜興其要者不出牧宰之任也而使牧宰得其人則郡邑政行僚吏事肅編民不殆外姦不生又以能致郡邑政行寮吏事肅者莫出於轉運使副也由是而言則國家任官擇吏其謹重者在於此焉且方今天下知州軍僅及四百縣不減數千若令一一選於朝廷人人欲其稱職深恐濶略未得精專臣愚以謂擇縣令知縣莫若於知州知軍取知州知軍莫若於轉運使副制轉運使副乃繫於朝廷又且轉運使副不過三十來員況當文物盛明士之衆庶倘或推公遴選何憂不得其材既朝廷選任至公則轉運使副安得不公轉運使副既公則知州知軍孰敢不公知州知軍既公則掾佐之吏盡公而況縣令知縣敢有不公者乎夫如是則赤子有歸蒼生受賜遐邇之俗小大攸同古所謂形直影端上行下法其理要而其效速其功倍而其教神者此其略也但臣忝居通籍無補聖朝次當上言不敢避罪所有加減考課之制詳酌今古之宜尚有科條難盡披述設或陛下賜之睿鑒朝廷許其必行則臣願竭狂愚乞與有司評議淳化中知吉州梁鼎上言曰書云三載考績三考黜陟幽明此乃堯舜氏所以得賢人治天下也三代而下典章尚存兩漢以還沿革可見至於唐室此道尤精有考功之司明考課之今卞自簿尉上至宰臣皆嵗計功過較定優劣故人思激厲績效著聞五代兵革相繼禮法陵夷顧惟考課之文秖拘州縣之軰黜陟既異名存實亡且夫今之知州即古之刺史治狀顯著者朝廷不知方略蔑聞者任用如故大失勸懲之理寖成茍且之風是致水旱洊臻獄訟填溢欲望天下承平豈可得也伏惟陛下繼二聖之丕圖為億兆之司牧念百官之未乂思四海之未康特詔有司申明考績之法庶㡬官得其人民受其賜矣仁宗慶厯三年知諫院歐陽修上奏曰臣伏見天下官吏員數極多朝廷無由徧知其賢愚善惡審官三班二部等處又只具差除月日其人能否都不可知諸路轉運使等除有贓吏自敗者臨時舉行外亦别無按察官吏之術致使年老病患者或懦弱不才者或貪殘害物者此等之人布在州縣並無黜陟因循積敝官濫者多使天下州縣不治者十有八九今兵戎未息賦役方煩百姓嗸嗸瘡痍未復救其疾苦擇吏為先臣今欲乞特立按察之法於内外朝官自三丞以上至郎官中選強幹㢘明者為諸路按察使請令進奏官各録一州官吏姓名為空行簿以授之使至州縣徧見官吏其公㢘勤幹明著實狀及老病不才顯有不治之迹皆以朱書之又有中材之人别無竒效亦不至曠敗者以墨書之又有雖是常材能專長於一事亦以朱書别之使還具奏則朝廷可以坐見官吏賢愚善惡不遺一人後别議黜陟之法如此足以澄清天下半嵗之間可望致治只勞朝廷精選二十許人充使别無難行之事侍讀學士宋祁上奏曰臣伏見比來知州轉運使未曽在任得滿三年民間利害及簿書文移未知次第已却遷換迎新送故上下告勞臣不知朝廷設官欲為理邪如不為理臣故無可言者若欲為理安得用此敝法守而不改今審官院差遣不行便奏請京朝官情願二年一替且差遣得行一司之暫利也遷換不定天下之大害也故敗國家大計使吏奸得行生民無告無出於長吏數易也臣愚以為方用兵時財用調度多出於民知州轉運使不得人不能集事伏望普令䑓省近臣舉知州轉運使五人轉運使知州三人有材幹者已上或已在任亦詐就舉充數理三周年為一任不得只理三十個月每嵗轉運使索取知州功過并自具功過申尚書考功考功逐旋聞奏請别差近臣為考課使精加考較若三考俱優改一官知州升大州轉運使升上路三考俱劣黜一官知州降小州轉運使降下路二優一劣改一官二劣一優奪半年俸大約以此為率已上賞罰并舉主同坐減一等舉主得以數人賞罰相除其提㸃刑獄使者通判並比類比年考只令中書門下及審官院揀選充職取進止厯代名臣奏議卷一百七十一
