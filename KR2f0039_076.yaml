body:
  text: 歴代名臣奏議卷七十六明楊士竒等撰宗室周襄王將以狄伐鄭富辰諫曰不可臣聞之太上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周徳之不𩔖故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟䦧于墻外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢徳之大者也即聾徔昧與頑為嚚奸之大者也棄徳崇奸禍之大者也鄭有平恵之勲又有厲宣之親棄嬖寵而用三良於諸姬為近四徳具矣耳不聽五聲之和為聾目不别五色之章為昧心不則徳義之經為頑口不道忠信之言為嚚狄皆則之四奸具矣周之有懿徳也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周徳既衰扵是乎又渝周召以徔諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉避害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圗也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙貳於已公子吕曰國不堪貳君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收貳以為己邑至于廩延子封曰可矣厚將得衆公曰不義不暱厚將崩衛莊公娶于齊東宫得臣之妹曰莊姜美而無子衛人所為賦碩人也又娶于陳曰厲媯生孝伯早死其姊戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方弗納于邪驕奢淫佚所自邪也四者之来寵禄過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁逰禁之不可桓公立乃老漢文帝時御史大夫晁錯數言呉過可削帝不忍錯曰髙帝封三庶孽分天下半今呉王不朝於古法當誅帝猶不忍徳至厚王當改過自新反益驕誘天下亡人謀作亂今削之亦反不削亦反削之反亟禍小不削反遲禍大上令列侯公卿宗室雜議莫敢難獨竇嬰爭之淮南厲王朝殺辟陽侯居䖏驕甚袁盎諫曰諸侯大驕必生患可適削地上弗用淮南王益横及棘蒲侯柴武太子謀反事覺治連淮南王淮南王徴上因遷之蜀轞車傳送袁盎時為中郎將乃諫曰陛下素驕淮南王弗稍禁以至此今又暴摧折之淮南王為人剛如有遇霧露行道死陛下竟為以天下之大弗能容有殺弟之名奈何上弗聽遂行之淮南王至雍病死聞上輟食哭甚哀盎入頓首請罪上曰以不用公言至此盎曰上自寛此徃事豈可悔㢤且陛下有髙世之行者三此不足以毁名上曰吾髙世行三者何事盎曰陛下居代時太后嘗病二年陛下不交睫不觧衣湯藥非陛下口所嘗弗進夫曽參以布衣猶難之今陛下親以王者修之過曽參孝逺矣夫諸吕用事大臣專制然陛下從代乘六乘傳馳不測之淵雖賁育之勇不及陛下陛下至代邸西向讓天子位者再南面讓天子位者三夫許由一讓而陛下五以天下讓過許由四矣且陛下遷淮南王欲以苦其志使改過有司衛不謹故病死於是上乃觧曰將奈何盎曰淮南王有三子唯在陛下耳扵是文帝立其三子皆為王景帝時梁王使人殺故呉相袁盎景帝召田叔案梁具得其事還報景帝曰梁有之乎叔對曰死罪有之上曰其事安在叔曰上毋以梁事為也上曰何也曰今梁王不伏誅是漢法不行也如其伏法而太后食不甘味臥不安席此憂在陛下也景帝大賢之以為魯相成帝時梁王立淫亂大中大夫谷永上疏曰臣聞禮天子外屏不欲見外也是故帝王之意不窺人閨門之私聽聞中冓之言春秋為親者諱詩云戚戚兄弟莫逺具爾今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥强劾力傳致難明之事獨以偏辭成辠斷獄亡益扵治道汙衊宗室以内亂之惡披布宣揚於天下非所以為公族隠諱増朝廷之榮華昭聖徳之風化臣愚以為王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有耻辱之心案事者廼驗問惡言何故猥自發舒以三者揆之殆非人情疑有所廹切過誤失言文吏躡尋不得轉移萌芽之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上徳通理之吏更審考清問著不然之效定失誤之法而反命扵下吏以廣公族附䟽之徳為宗室刷汙亂之恥甚得治親之誼天子由是寢而不治劉向遷光禄大夫每召見數言公族者國之枝葉枝葉落則本根無所庇廕方今同姓䟽逺母黨專政禄去公室權在外家非所以強漢宗卑私門保守社稷安固後嗣也東漢明帝時廣陵王荆有罪帝以至親悼傷之詔樊鯈與羽林監南陽任隗雜理其獄事竟奏請誅荆引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈仰而對曰天下髙帝天下非陛下之天下也春秋之義君親無將將而誅焉是以周公誅弟季友鴆兄經傳大之臣等以荆属託母弟陛下㽞聖心加惻隠故敢請耳如令陛下子臣等專誅而已帝歎息良久鯈益以此知名章帝建初六年冬東平憲王蒼上疏求朝明年正月帝許之蒼既至升殿乃拜天子親荅之其後諸王入宫輙以輦迎至省閣乃下蒼以受恩過禮情不自寧上疏辭曰臣聞貴有常尊賤有等威卑髙列序上下以理陛下至徳廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輙興席改容中宫親拜事過典故臣惶怖戰慄誠不自安每會見踧踖無所措置此非所以章示羣下安臣子也帝省奏歎息愈褒貴焉章帝性寛仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟並㽞京師不遣就國尚書宋意以為人臣有節不宜踰禮過恩乃上疏諫曰陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特䝉禮寵聖情戀戀不忍逺離比年朝見久㽞京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懐聖人之徳有致太平之功然後王曰叔父加以賜幣今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食他縣男女少長並受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑強幹弱枝者也陛下徳業隆盛常為萬世典法不宜以私恩損上下之序失君臣之正又西平王羡等六王皆妻子成家官属備具當早就蕃國為子孫基阯而室第相望乆槃京邑婚姻之盛過於本朝僕馬之衆充塞城郭驕侈僭擬寵禄隆過今諸國之封並皆膏腴風氣平調道路夷近朝聘有期行来不難宜割情不忍以義斷恩發遣康焉各歸蕃國令羡等速就便時以塞衆望帝納之章帝時劉愷以當襲父般爵讓與弟憲遁逃避封乆之章和中有司奏請絶愷國肅宗美其義特優假之愷猶不出積十餘嵗至和帝永元十年有司復奏之侍中賈逵因上書曰孔子稱能以禮讓為國於從政乎何有竊見居巢侯劉般嗣子愷表行孝友謙遜絜清讓封弟憲潛身逺迹有司不原樂善之心而繩以循常之法懼非長克讓之風成含𢎞之化前世扶陽侯韋𤣥成近有陵陽侯丁鴻鄳侯鄧彪並以髙行絜身辭爵未聞貶削而皆登三事今愷景仰前脩有伯夷之節宜䝉矜宥全其先功以増聖朝尚徳之美和帝納之桓帝弟渤海王悝素行險辟僭傲多不法北軍中候史弼懼其驕悖為亂乃上封事曰臣聞帝王之扵親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王而二弟階寵終用悖慢卒周有播蕩之禍漢有袁盎之變竊聞渤海王悝憑至親之属恃偏私之愛失奉上之節有僭慢之心外聚剽輕不逞之徒内荒酒樂出入無常所與羣居皆有口無行或家之棄子或朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不䏻匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚使臣得扵清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之議渤海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冒死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王獻帝時劉備上表曰臣以具臣之才荷上將之任董督三軍奉辭于外不能掃除寇難靖匡王室久使陛下聖教陵遲六合之内否而未泰惟憂反側疢如疾首曩者董卓造為亂階自是之後羣兇縱横殘剥海内賴陛下聖徳威靈人臣同應或忠義奮討或上天降罰暴逆並殪以漸冰消惟獨曹操乆未梟除侵擅國權恣心極亂臣昔與車騎將軍董承圗謀討操機事不宻承見陷害臣播越失據忠義不果遂得使操窮凶極逆主后戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歴年未效常恐殞沒孤負國恩寤寐永歎夕惕若厲今臣羣寮以為在昔虞書敦叙九族庶明勵翼五帝損益此道不廢周監二代並建諸姬實賴晋鄭夾輔之福髙祖龍興尊王子弟大啓九國卒斬諸呂以安太宗今操惡直醜正實繁有徒包藏禍心簒盜已顯既宗室微弱帝族無位斟酌古式依假權宜上臣大司馬漢中王臣伏自三省受國厚恩荷任一方陳力未效所獲已過不宜復忝髙位以重罪謗羣僚見逼廹臣以義臣退惟寇賊不梟國難未已宗廟傾危社稷將墜誠臣憂責碎首之負若應權通變以寧靖聖朝雖赴水火所不得辭敢慮常宜以防後悔輙順衆議拜受印璽以崇國威仰惟爵號位髙寵厚俯思報效憂深責重驚怖累息如臨于谷盡力輸誠奨厲六師率齊羣義應天順時撲討凶逆以寧社稷以報萬分謹拜章因驛上還所假左將軍宜城亭侯印綬魏文帝黄初四年陳思王曹植徙封雍丘王其年朝京都上疏曰臣自抱釁歸藩刻肌刻骨追思罪戾晝分而食夜分而寢誠以天罔不可重罹聖恩難可再恃竊感相鼠之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍活茍全則犯詩人胡顔之譏伏惟陛下徳象天地恩隆父母施暢春風澤如時雨是以不别荆棘者慶雲之惠也七子均養者鳲鳩之仁也舎罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不能自棄者也前奉詔書臣等絶朝心離志絶自分黄耇無復執圭之望不圗聖詔猥垂齒召至止之日馳心輦轂僻䖏西館未奉闕廷踴躍之懐瞻望反仄謹拜表獻詩二篇其辭曰於穆顯考時惟武皇受命于天寧濟四方朱旗所拂九土披攘𤣥化滂流荒服来王超商越周與唐比蹤篤生我皇奕世再聦武則肅烈文則時雍受禪炎漢臨君萬邦萬邦既化率由舊則廣命懿親以藩王國帝曰爾侯君兹青土奄有海濵方周于魯車服有輝旗章有叙濟濟雋乂我弼我輔伊予小子恃寵驕盈舉挂時網動亂國經作藩作屏先軌是堕傲我皇使犯我朝儀國有典刑我削我絀將寘于理元兇是率明明天子時篤同𩔖不忍我刑暴之朝肆違彼執憲哀予小子改封兖邑于河之濵股肱弗置有君無臣荒淫之闕誰弼予身煢煢僕夫于彼冀方嗟予小子乃罹斯殃赫赫天子恩不遺物冠我𤣥冕要我朱紱朱紱光大使我榮華剖符授王王爵是加仰齒金璽俯執聖䇿皇恩過隆祇承怵惕咨我小子頑凶是嬰逝慙陵墓存愧闕廷匪敢傲徳實恩是恃威靈改加足以沒齒昊天㒺極性命不圗常懼顛沛抱罪黄壚願䝉矢石建旗東嶽庶立豪釐微功自贖危軀授命知足免戾甘赴江湘奮戈呉越天啓其衷得會京畿遲奉聖顔如渇如饑心之云慕愴矣其悲天髙聽卑皇肯照微又曰肅承明詔應㑹皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重隂匪息雖有糇糧饑不遑食望城不過面邑匪㳺僕夫警䇿平路是由𤣥駟藹藹揚鑣􅞎沫流風翼衡輕雲承蓋涉澗之濵縁山之隈遵彼河滸黄阪是階西濟關谷或降或升騑驂倦路再寢再興將朝聖皇匪敢晏寧弭節長騖指日遄征前驅舉燧後乗抗旌輪不輟運鸞無廢聲爰暨帝室稅此西墉嘉詔未賜朝覲莫徔仰瞻城閾俯惟闕廷長懐永慕憂心如酲帝嘉其辭義優詔荅勉之文帝大發士息及取諸國士植以近前諸國士已見發其遺孤稚弱在者無㡬而復被取又上書曰臣聞古者聖君與日月齊其明四時等其信是以戮凶無重賞善無輕怒若輕電喜如時雨恩不中絶教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以授官必以之所投命雖有構㑹之徒泊然不以為懼者盖君臣相信之明效也昔章子為齊將人有告之反者威王曰不然左右曰何以明之王曰聞章子改葬死母彼尚不欺死父頋當叛生君乎此君之信臣也昔管仲親射桓公後幽囚從魯檻車載使少年挽而送齊管仲知桓公之必用已懼魯之悔謂少年曰吾為汝唱汝為和聲和聲宜走扵是管仲唱之少年走而和之日行數百里宿昔而至至則相齊此臣之信君也臣初受封䇿書曰植受茲青社封于東土以屏翰皇家為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人正復不老皆使年壯備有不虞檢校乘城頋不足以自救況皆復耄耋罷曵乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復賴此方外不定必當須辨者臣碩将部曲倍道奔赴夫妻負襁子弟懐糧蹈鋒履刃以狥國難何但習業小兒㢤愚誠以揮涕増河鼷鼠飲海扵朝萬無損益扵臣家計甚有廢損又臣士息前後三送兼人已竭惟尚有小兒七八嵗已上十六七已還三十餘人今部曲皆年耆卧在床席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾聵者二十三人惟正須此小兒大者可備宿衛雖不足以禦寇粗可以警小盜小者未堪大使惟可使耘鉏穢草驅護鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而已陛下聖仁恩許三至士子給國長不復發明詔之下有若皦日保金石之恩必明神之信畫然自固如天如地定習業者並復見送晻若晝晦悵然失圗伏以為陛下既爵臣百寮之右居藩國之任為置卿士屋名為宫塜名為陵不使其危居獨立無異扵凡庶若柏成欣於野耕子仲樂於灌園蓬户茅牖原憲之宅也陋巷簞瓢顔子之居也臣生不見效用常慨然執斯志焉若陛下聽臣悉還部曲罷官屬省監官使觧璽釋紱追柏成子仲之業營顔淵原憲之事居子臧之廬宅延陵之室如此雖進無成功退有可守身死之日猶松喬也然伏度國朝終未肯聽臣之若是固當羈紲於世繩維繋扵禄位懐屑屑之小慮執無已之百念安得蕩然肆志逍遙扵宇宙之外㢤此願未徔陛下必欲崇親親篤骨肉潤白骨而榮枯木者惟遂仁徳以副前恩詔皆遂還之明帝大和五年植又求通親親上表曰臣聞天稱其髙者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容故孔子曰大㢤堯之為君惟天為大惟堯則之夫天徳之扵萬物可謂𢎞廣矣盖堯之為教先親後疏自近及逺其傳曰克明俊徳以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以蕃屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義實在敦固未有義而後其君仁而遺其親者也伏惟陛下咨帝唐欽明之徳體文王翼翼之仁惠浹椒房恩昭九親羣臣百寮番休遞上執政不廢扵公朝下情得展扵私室親理之路通慶弔之情展誠可謂恕已治人推惠施恩者矣至扵臣者人道絶緒禁固明時臣竊自傷也不敢乃望交氣𩔖脩人事叙人倫近且婚媾不通兄弟永絶吉凶之問塞慶弔之禮廢恩紀之違甚扵路人隔閡之異殊扵胡越今臣以一切之制永無朝覲之望至扵注心皇極結情紫闥神明知之矣然天實為之謂之何㢤退省諸王常有戚戚具爾之心碩陛下沛然垂詔使諸國慶問四節得展以叙骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺嵗得再通齊義扵貴宗等惠扵百司如此則古人之所歎風雅之所詠復存扵聖世矣臣伏自惟省無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後扵朝士矣若得辭逺㳺戴武弁觧朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出徔華盖入侍輦轂承荅聖問拾遺左右乃臣丹情之至願不離扵夢想者也逺慕鹿鳴君臣之宴中詠常棣匪他之誡下思伐木友生之義終懐蓼莪罔極之哀每四節之會塊然獨處左右唯僕𨽻所對唯妻子髙談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虚語爾若葵藿之傾葉太陽雖不為之廻光終向之者誠也臣竊自比葵藿若降天地之施垂三光之明者寔在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨唱言者何也竊不碩扵聖代使有不蒙施之物必有慘毒之懐故栢舟有天只之怨谷風有棄予之歎伊尹耻其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至扵欲使陛下崇光被時雍之美宣緝熈章明之徳者是臣慺慺之誠竊所獨守寔懐鶴立企佇之心敢復陳聞者冀陛下儻發天聦而垂神聽也呉大帝赤烏中顧譚拜太常是時魯王覇有盛寵與太子和齊衡譚上䟽曰臣聞有國有家者必明嫡庶之端異尊卑之禮使髙下有差階級踰邈如此則骨肉之恩生覬覦之望絶昔賈誼陳治安之計論諸侯之勢以為勢重雖親必有逆節之累勢輕雖踈必有保全之祚故淮南親弟不終饗國失之扵勢重也呉芮踈臣傳祚長沙得之扵勢輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之座帝有怒色及盎辨上下之儀陳人彘之戒帝既恱懌夫人亦悟今臣所陳非有所偏誠欲以安太子而便魯王也晉惠帝時齊王冏拜大司馬加九錫之命冏沈于酒色不入朝見坐拜百官符勅三臺扵是朝廷側目海内失望矣翊軍校尉李含奔于長安詐云受宻詔使河間王顒誅冏因導以利謀顒徔之上表曰王室多故禍難㒺已大司馬冏雖唱義有興復皇位之功而定都邑克寧社稷實成都王之勲力也而冏不能固守臣節實協異望在許昌營有東西掖門官置治書侍御史長史司馬直立左右如侍臣之儀京城大清簒逆誅夷而率百萬之衆来繞洛城阻兵經年不一朝覲百官拜伏晏然南面壊樂官市署用自増廣輙取武庫祕杖嚴列不觧故東莱王蕤知其逆節表陳事狀而見誣陷加罪黜徙以拊私黨僭立官屬幸妻嬖妾名號比之中宫沈湎酒色不恤羣黎董艾放縱無所畏忌中丞按奏而取退免張偉愡恫擁停詔可葛旗小豎維持國命操弄王爵貨賂公行羣姦聚黨擅斷殺生宻署腹心實為貨謀斥罪忠良伺窺神器臣受任蕃衛方岳見冏所行實懐激憤即日翊軍校尉李含乗馹宻至宣騰詔㫖臣伏讀感切五情若灼春秋之義君親無將冏擁強兵樹私黨權官要職莫非腹心雖復重責之誅恐不義服今輒勒兵精卒十萬與州征並協忠義共會洛陽驃騎將軍長沙王乂同奮忠誠廢冏還第有不順命軍法徔事成都王頴明徳茂親功髙勲重往嵗去就允合衆望宜為宰輔代冏阿衡之任顒表既至冏大懼武帝時齊王攸之就國也下禮官議崇錫之物博士庾旉與博士太叔廣劉暾繆蔚郭頥秦秀傅珍等上表諫曰書稱帝堯克明俊徳以親九族武王光有天下兄弟之國十有六人同姓之國四十人元勲睦親顯以殊禮而魯衛齊晉大啓土宇並受分器所謂惟善所在親䟽一也大晉龍興隆唐周之逺跡王室親屬佐命功臣咸受爵土而四海乂安今呉會已平詔大司馬齊王出統方岳當遂撫其國家將準古典以垂永制昔周之選建明徳以左右王室也則周公為太宰康叔為司冦聃季為司空及召芮畢毛諸國皆入居公卿大夫之位明股肱之任重守地之位輕也未聞古典以三事之重出之國者漢氏諸侯王位尊勢重在丞相三公上其入讃朝政若乃有兼官其出之國亦不復假台司虚名為隆寵也昔申無宇曰五大不在邉先儒以為貴寵公子公孫累世正卿也又曰五細不在庭先儒以為賤妨貴少陵長逺間親新間舊小加大也不在庭不在朝庭為政也又曰親不在外羈不在内今棄疾在外鄭丹在内君其少戒之叔向有言公室將卑其枝葉先落公族公室之本而去之諺所謂芘焉而縱尋斧焉者也今使齊王賢邪則不宜以母弟之親尊居魯衛之常職不賢邪不宜大啓土宇表建東海也古禮三公無職坐而論道不聞以方任嬰之惟周室大壊宣王中興四夷交侵救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸宰相不得乆在外也今天下已定六合為家將數延三事與論太平之基而更出之去王城二千里違舊章矣散騎常侍國子祭酒曹志議曰伏聞大司馬齊王當出藩東夏備物盡禮同之二伯今陛下為聖君稷契為賢臣内有魯衛之親外有齊晉之輔坐而守安此萬世之基也古之夾輔王室同姓則周公其人也異姓則太公其人也皆身在内五世反葬後雖有五覇代興桓文譎主下有請隧之僭上有九錫之禮終扵譎而不正驗扵尾大不掉豈與召公之歌常棣周詩之詠鴟鴞同日論㢤今聖朝創業之始始之不諒後事難工榦植不強枝葉不茂骨鯁不存皮膚不充自羲皇以来豈是一姓之獨有欲結其心者當有磐石之固夫欲享萬世之利者當與天下議之故天之聦明自我人之聦明秦魏欲獨擅其威而財得沒其身周漢能分其利而親䟽為之用此自聖主之深慮日月之所照事雖淺當深謀之言雖輕當重思之志備位儒官若言不及禮是志寇竊知忠不言議所不敢志以為當如博士等議東晉簡文帝時會稽文孝王道子委任王緒由是朋黨競扇友愛道盡太妃每和觧之而道子不能改中書郎徐邈以國之至親惟道子而已宜在敦睦徔容言扵帝曰昔漢文明主猶悔淮南世祖聦達負愧齊王兄弟之際實宜深慎帝納之宋少帝時都督徐羨之等以廬陵王義真輕訬不任主社稷因其與少帝不協乃宻謀廢之奏曰臣聞二叔不咸難結隆周淮南悖縱禍興盛漢莫不義以斷恩情為法屈二代之事殷鑒無逺仁厚之主行之不疑故共叔不斷㡬傾鄭國劉英容養釁廣難深前事之不㤀後王之成鑒也按車騎將軍義真凶忍之性爰自稚弱咸陽之酷醜聲逺播先朝猶以年在紈綺冀能改厲天屬之愛想聞革心自聖體不豫以及大漸臣庶憂惶内外屏氣而縱博酣酒日夜無輟肆口縦言多行無禮先帝貽厥之謀圗慮經固親勅陛下面詔臣等若遂不悛必加放黜至言苦厲猶在紙翰而自茲迄今日月増甚至乃委棄藩屏志還京邑潛懐異圗希幸非冀轉聚甲卒徴召車馬陵墳未乾情事猶昨遂蔑棄遺㫖顯違成規整棹浮舟以示歸志肆心恣已無復諮承聖恩低徊深垂隠忍屢遣中使苦相敦釋而親對散騎侍郎邢安泰廣武將軍茅仲思縦其悖罵訕主謗朝播于逺近暴於人聽臣聞原火不撲蔓草難除青青不伐終致尋斧況憂深患著社稷慮切請一遵晉朝武陵舊典使顧懐之㫖不墜扵武廟全宥之徳獲申扵昵親仰尋感慟臨啓悲咽乃廢義真為庶人徙新安郡前吉陽令堂邑張約之上疏諫曰臣聞仁義之在天下若中原之有菽理感之被萬物故不繫於貴賤是以考叔反悔誓扵及泉壺關復寃魂於湖邑當斯之時豈無尊卿賢輔或以事廹心違或以道壅謀屈何嘗不碩聞善於輿𨽻藥石阿氏㢤臣雖草芥備充黔首少不量力頗髙殉義之風謂蹈善於朝聞愈徒生扵白首用敢干禁忘戮披叙丹愚伏惟髙祖武皇帝誕兹神武撫運龍興仰清天步則齊徳有虞俯廓九州則侔功大夏故虔順天人享有萬國雖靈祚脩長聖躬弗永陛下繼明紹統遐邇一心藩王哲茂四維寧謐傾耳康㢤之咏企踵升平之風竊念廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩故在心必言所懐必亮容犯臣子之道致招驕恣之愆至扵天姿夙成實有卓然之美宜在容養録善奄瑕訓盡義方進退以漸今猥加剥辱幽徙逺郡上傷陛下常棣之篤下令逺近恇然失圗士庶杜口人爲身計臣伏思大宋之興雖協應符緯而開基造次根條未繁宜廣樹藩戚敦睦以道使兄弟之美比煇魯衛龜䇿告同胙均七百豈不善㢤陛下富扵春秋慮未重複忽安危之逺筭肆不忍扵一朝特碩㽞神九思重加詢采上考前代興亡之由中存武皇締搆之業下顧蒼生顒顒之望時開乞宥反王都邑選保傅扵舊老求四友扵髦俊引誘情性導達聦明凡人在苦皆能自厲況王質朗心聦易加訓範且中賢之人未能無過過貴自改罪碩自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪棄㢤謹昧死詣闕伏地以聞惟願丹誠一經天聽退就斧钁無愧地下矣文帝元嘉六年衛將軍開府儀同三司王𢎞上表曰臣聞異姓為後宗周之明義親不在外有國之所先故魯長滕君春秋所美楚出棄疾前史垂誡矧乃茂親明徳道光一時述職侯甸朝政弗及而以庶族庸陋浮華之臣超踰先典居中賛契豈所以憲章古式緝熈治道驃騎將軍臣義康徽猷淵邈明徳彌劭敷政江漢化被荆南搢紳屬情想樂當務周旦之寄不謀同詞分陜雖重比此為輕臣實空闇階恩踰越俯積素餐仰玷盛化公私二三無一而可昔孫叔未進優孟見矤展季在下臧文貽譏況道隆地昵義兼前禮臣於古人無能為役負乗竊位萬物謂何雖曰厚顔胡寧以處斯亡之懼寔疚其心乞觧州録以允民望伏願陛下逺存至公近鑑丹欵俯順朝野改授親賢豈唯下臣獲免大戾凡厥衆𨽻孰不慶幸若天眷㒺已脫復遲回請出臣表逮聞外内朝議輿誦或有可擇元嘉中彭城王義康未敗龍驤參軍巴東扶令育詣闕上表曰盖聞哲王不逆切㫖之諫以博聞為道人臣不忌殱夷之罰以盡言為忠是故周昌極諫馮唐面折孝恵所以克固儲嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顔違色者㢤又袁盎之諫孝文曰淮南王若道遇死則陛下有殺弟之名奈何文帝不用追悔無及臣草莽微臣竊不自揆敢抱葵藿傾陽之心仰慕周易匪躬之志故不逺六千里願言命侣謹貢丹愚希垂察納伏惟陛下躬執大象首出萬物王化咸通三才必理闢大人之路開大道之門捜殊逸于巖穴招竒英于側陋窮谷無白駒之倡喬岳無遺寳之嗟豈特羅飛翮于埀天網沈鱗扵溟海況扵彭城王義康先朝之愛子陛下之次弟㢤一旦黜削逺送南垂恩絶于内形隔於逺躬離明主身放聖世草莱黔首皆為陛下痛之臣追惟景平元嘉之釁㡬扵危殆三公託以興廢之宜宻懐不臣之計台輔伺隙扵京甸強楚窺窬於上流或顯逆而陵主有生之所惴恐神祗之所忿忌也賴宗社靈長廟筭流逺灑滌塵埃殱馘醜𩔖氛霧時靖四門載清當爾之時義康豈不預參皇謀均此休否㢤且陛下舊楚形勝非親勿居遂以驃騎之號任以藩夏之重撫政南郢綏民遏寇播皇宋之澤以洽幽荒陛下之潤被九有豈直南荆之民沾渥而已焉遂召之以宰輔又寄之以和味既居三事又牧徐揚所以幽顯齊歡人神同抃莫不言陛下授之為得義康受之為是也今如何信疑貎之似闕兄弟之恩乎若有迷謬之愆可責之罪正可數之以善惡導之以義方且廬陵王往事足以知今此乃陛下前車之殷鑒後乗之靈龜也夫曽子之不殺忠臣之篤譬二告而猶織仁王之令範故詩云無信人之言人實不信又云兄弟雖䦧不廢親也尚書曰克明俊徳以親九族九族既睦可以親百姓兄弟安可棄乎臣伏願陛下上尋往代黜廢之禍下惟近者讒言之舋廬陵王既申寃魂於后土彭城王亦弭疑愆扵宋京豈徒皇代當今之計盖乃良史萬代之美也且諂謏難辨見非易黷福始禍先古人所畏故愛身之士自為已計莫不結舌杜口孰肯冒忌干主哉臣以頑昧獨獻微管所以勤勤懇懇必訴丹誠者實恐義康年窮命盡奄忽于南遂令陛下有棄弟之責臣雖微賤竊為陛下羞之況書言記事史豈能屈典謨而諱㢤脫如臣慮陛下恨之何益揚子雲曰獲福之大莫先扵和穆遘禍之深莫過扵内難每服斯言以為警戒矧今覩王室大事豈得韜筆黙爾而已㢤臣將恐天下風靡離間是懼遂令宇内遷觀民庶革心欲致康㢤實為難也陛下徒云惡枝之宜伐豈悟伐柯之傷樹乃往古之所悲當今所宜改也陛下若蕩以平聽屏此猜情垂訊芻蕘之謀曲察狂瞽之計一發非意之詔逮訪博古之士速召義康返于京甸兄弟協和君臣緝穆息宇内之譏絶多言之路如是則四海之望塞讒說之道消矣何必司徒公揚州牧然後可以安彭城王㢤若臣啓違憲扵國為非請即伏誅以謝陛下雖復分形赴鑊煑體烹屍始願所甘豈不幸甚太子詹事范曅等謀反事逮義康有司上曰義康昔擅國權恣心淩上結朋樹黨苞納凶邪重舋彰著事合明罰特遭陛下仁愛深至敦惜周親封社不削爵寵無貶四海之心朝野之議咸謂皇徳雖厚實撓典刑而義康曽不思此大造之徳自出南服詭飾情貌外示知懼内實不悛窮好極欲干請無度聖慈含𢎞每不折舊矜釋屢加恩疇已往而隂敦行李方啓交通之謀潜資左右以要死士之命﨑嶇伺隟不忘窺窬時猶隐忍罰止僕侍狂疾之性永不懲革兇心遂成悖謀仍構逺投群醜千里相結再議宗社重闚鼎祚賴陛下至誠感神宋厯方永故姦事昭露罪人斯得周公上聖不辭同氣之刑漢文仁明無隐從兄之惡況義康舋深二叔謀過淮南背親反道自棄天地臣等參議請下有司削義康王爵收付廷尉法獄治罪詔特宥大辟豫章胡誕世前呉平令袁惲等謀反欲奉戴義康太尉録尚書江夏王義恭等奏曰投畀之言義著雅篇流殛之教事在書典庶人義康負舋深重罪不容戮聖仁不忍屢加遲回宥其大辟賜遷近甸斯乃至愛發天超邈終古曽不遇愆甘引而讒言同衆很悖徼幸每形辭色内宣家人外動民聽不逞之族因以生心胡誕世假竊名號搆成凶逆杜漸除微古今所務況禍機驟發庸可忽乎臣等參議宜徙廣州逺郡放之邉表庶有防絶孝武帝時南郡王義宣反帝以義宣亂逆由於彊盛至是欲削弱王候江夏王義恭希㫖乃上表省録尚書曰臣聞天地設位三極同序皇王化則九官咸事時亮之績昭扵虞典論道之風宣扵周載台輔之設坐調隂陽元凱之置起釐百揆所以欒鍼矢言侵官是誡陳平抗辭匪職㒺荅漢承秦後庶僚稍改爵因時變任與世移緫録之制本非舊體列代相㳂兹仍未革今皇家中造事遵前文宜憲章先代證文古則停省條録以依昔典使物競思存人懐勤壹則名實靡愆庸節必紀臣謬典國重虚荷崇位興替宜知敢不輸盡上從其議江夏王義恭常慮為武帝所疑及海陵王休茂扵襄陽為亂乃上表曰古先哲王莫不廣植周親以屏帝宇諸侯受爵亦願永固邦家至有管蔡梁燕致禍周漢上乖顯授之恩下亡血食之業夫善積慶深宜享長久而歴代侯王甚乎匹庶豈異姓皆賢宗室悉不賢由生於深宫不覩稼穡左右近習未值田蘇富貴驕奢自往而至聚毛折軸遂乃危禍漢之諸王並置傅相猶不得禁逆七國連謀實由彊盛晉氏列封正足成永嘉之禍尾大不掉終古同疾不有更張則其源莫救日者庶人恃親殆傾王業去嵗西寇藉龍㡬敗皇基不圗襄楚復生今釁良以地勝兵勇奨成凶惡前事之不㤀後事之明兆陛下大明紹祚垂法萬葉臣年衰意塞無所知觧忝皇族耆長慙慨内深思表管見裨崇萬一竊謂諸王貴重不應居邉至扵華州優地時可蹔出既以有州不須置府若位登三事止乎長史掾屬若宜鎮御别差扞城大將若情樂沖虚不宜逼以戎事若捨文好武尤宜禁塞僚佐文學足充話言逰梁之徒一皆勿許文武徔鎮以時休止妻子室累不煩自随百僚脩詣宜遵晉令悉須宣令齊到備列賔主之則衡泌之士亦無煩干候貴王噐甲扵私為用盖寡自金銀裝刀劔戰具之服皆應輸送還本曲突徙薪防之有素庶善者無懼惡者止姦後魏孝明帝時右光禄大夫元遥上表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去兹以往猶繫之以姓而弗别綴之以食而弗殊又律云議親者非唯當世之屬親歴謂先帝之五世諱尋斯㫖將以廣帝宗重磐石先皇所以變兹事條為此别制者太和之季方有意扵呉蜀經始之費慮深在初割減之起蹔出當時也且臨淮王提分屬籍之始髙祖賜帛三千匹所以重分離樂良王長命亦賜縑二千匹所以存慈睠此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔已者衆臣誠不欲妄親太階茍求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢諸王之子不限多少皆列土而封謂之曰侯至于魏晉莫不廣胙河山稱之曰公者盖惡其大宗之不固骨肉之恩踈矣臣去皇上雖是五世之逺扵先帝便是天子之孫髙祖所以國秩禄賦復給衣食后族惟給其賦不與衣食者欲以别外内限同異也今諸廟之感在心未忘行道之悲儵然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏宻之中便議此事實用未安後周武帝時冢宰宇文護既誅帝召柱國于翼往河東取䕶子中山公訓翼曰冢宰無君陵上自取誅夷元惡既除餘孽宜殄然皆陛下骨肉猶謂踈不間親陛下不使諸王而使臣異姓非直物有横議愚臣亦所未安帝然之乃遣越王盛代翼宣帝即位忌齊王憲意欲除之謂司衛上大夫宇文孝伯曰公能為朕圗齊王當以其官位相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下之叔父戚近功髙社稷重臣棟梁所寄陛下若妄加刑戮微臣又順㫖曲徔則臣為不忠之臣陛下為不孝之子也齊王既誅帝誚孝伯曰公知齊王謀反何以不言孝伯對曰臣知齊王忠扵社稷為羣小媒糵加之以罪臣以言必不用所以不言且先帝付嘱微臣唯令輔導陛下今諫而不徔實負顧託以此為罪是所甘心帝大慙俛首不語乃命將出賜死于家唐太宗即位霍王元軌為夀州刺史属髙祖崩去職毁瘠過禮自後常服布衣示有終身之戚太宗常問侍臣曰朕子弟孰賢魏徴對曰臣愚暗不䏻盡知其能唯呉王數與臣言臣未嘗不自失上曰卿以為前代誰比徴曰經學文雅亦漢之河間乎至如孝行乃古之曽閔也由是寵遇彌厚因令徴女聘焉太子承乾多不修法度魏王泰尤以才能為太宗所重特詔泰移居武徳殿魏徴上疏諫曰魏王既是陛下愛子陛下須使知定分常保安全每事抑其驕奢不䖏嫌疑之地也今移居此殿使在東宫之西海陵昔居時人以為不可雖時移事異猶恐人之多言又王之本心亦不寧息既䏻以寵為懼伏願成人之美太宗曰㡬不思量朕甚大錯悮遂遣泰歸于本第太宗謂侍中魏徴曰自古侯王能自保全者甚少皆由生長富貴好尚驕逸多不觧親君子逺小人故爾朕所有子弟欲使見前言往行冀其以為規範因命徴錄古来帝王子弟成敗事名為自古諸侯王善惡録以賜諸王其序曰觀其膺期受命握圗御宇咸建懿親藩屏王室布在方䇿可得而言自軒分二十五子舜舉十六族爰歴周漢以逮陳隋分裂山河大啓磐石者衆矣保乂王家與時升降或失其土宇不祀忽諸然考其盛衰察其興滅功成名立咸資始封之君國喪身亡多因繼體之后其故何㢤始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴以求賢或吐飡而接士故甘忠言之逆耳得百姓之歡心樹至徳扵生前流遺愛扵身後暨乎子孫繼體多属隆平生自深宫之中長居婦人之手不以髙危為憂懼豈知稼穡之艱難昵近小人踈逺君子綢繆哲婦傲很明徳犯義悖禮淫荒無度不遵典憲僭差越等恃一顧之權寵便懐匹嫡之心矜一事之微勞遂有無厭之望棄忠貞之正路蹈奸宄之迷途愎諌違卜往而不返雖梁孝齊冏之勲庸淮南河東之才俊摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功就梁董之顯戮垂為明戒可不惜乎皇帝以聖哲之姿拯傾危之運耀七徳以清六合緫萬國而朝百靈懐柔四荒親睦九族念華蕚扵常棣寄維城扵宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑒鏡貽厥孫謀臣輙竭愚淺稽諸前訓凡為藩為翰有國有家者其興也必由於積善其亡也皆在扵積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已惟人所召豈徒然㢤今録自古諸王行事得失分其善惡各為一篇名曰諸王善惡録欲使見善思齊足以揚名不朽聞惡能改得免乎大過徔善則有譽改過則無咎興亡是係可不勉與太宗覽而稱善謂諸王曰此宜置于坐右用為立身之本越王長孫后所生太子介弟聦敏絶倫太宗特所寵異或言三品已上皆輕蔑王者意在譖侍中魏徴等以激上怒上御齊政殿引三品已上入坐定大怒作色而言曰我有一言向公等道往前天子即是天子今時天子非天子耶往年天子兒是天子兒今日天子兒非天子兒耶我見隋家諸王達官以下皆不免被其躓頓我之兒子自不許其縦横公等所容易過豈得共相輕蔑我若縱之豈不能躓頓公等𤣥齡等戰慄皆拜謝徴正色諫曰當今羣臣必無輕越王者然在禮臣子一例傳稱王人雖微列於諸侯之上諸侯用之為公即是公用之為卿即是卿若下為公卿即下士於諸侯也今三品已上列為公卿並天子大臣陛下所加敬異縦其小有不是越王何得輒加折辱若國家紀綱廢壊臣所不知以當今聖明之時越王豈得如此且隋髙祖不知禮義寵樹諸王使行無禮尋以罪黜不可為法亦何足道太宗聞其言喜形扵色謂羣臣曰凡人言語理到不可不伏朕之所言當身私愛魏徴所道國家大法朕向者忿怒自謂理在不疑及見魏徴所論始覺大非道理為人君言何容易召𤣥齡等而切責之賜徴絹一千匹以旌其直言魏王師王珪奏准令三品以上遇親王於道不下馬今皆失於儀准太宗怒曰爾等並自尊貴卑下我子此為非法我不能行魏徴諫曰自古迄今親王在京師者班次三公吏部尚書侍中中書令並三品也若此等為王下馬王又不可安然訪諸故事則無可准行之於今自隳國法太宗曰國家所以立太子者擬朕百年之後以為君也然則人之存亡不在老幼設無太子則立嫡孫若無嫡孫即立諸子以此而言亦須崇敬比孫扵我不亦近乎徴曰殷家有兄終弟及之義自周以降立嫡必長所以絶庶㜸之覬覦塞禍亂之源本為國家者所宜深慎陛下向責王珪乃忿怒肆情不可以聞於臣庶太宗怒乃觧呉王恪奉見太宗謂房𤣥齡等曰朕扵兒子常欲一䖏但家國事義實亦不同欲令其子孫代代相繼且又絶其覬覦朕今供養太上皇與私亦異以鎮撫四海不貽太上皇憂為孝則天子之孝也魏徴對曰臣聞孝行有三大孝尊親其次不辱其下能養今陛下立身揚名富有天下華夷安泰此實大孝豈同進饘粥侍左右之孝也且以四海之主豈比庶人若與子孫同在一處非所以保根固本之䇿貞觀十一年侍御史馬周上疏曰漢晉以来諸王皆為樹置失宜不預立㝎分以至於滅亡人主熟知其然但溺於私愛故前車既覆而後車不改轍也今諸王承寵遇之恩有過厚者臣之愚慮不惟慮其恃恩驕矜也昔魏武帝寵樹陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王徔而畏之也此則武帝之寵陳思適所以苦之也且帝子何患不富貴身食大國封户不少好衣美食外更何所須而每年别加優賜曽無紀極俚語曰貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已當須制長久之法使萬代遵行䟽奏太宗甚嘉之賜物百段十三年諫議大夫褚遂良以每日特給魏王泰府料物有逾於皇太子上疏諫曰昔聖人制禮尊嫡卑庶謂之儲君道亞霄極甚尚崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除祻亂之源而先王必本人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正禮特須尊崇如不能明立㝎分遂使當親者踈當尊者卑則佞巧之徒承機而動私恩害公或至亂國伏惟陛下功超萬古道冠百王發號施令為世作法一日萬機或未盡美臣職諫諍無容靜黙伏見儲君料物翻少魏王朝野見聞不以為是臣聞傳曰愛子教以義方忠孝恭儉義方之謂昔漢竇太后及景帝並不識義方之理遂驕恣梁孝王封四十餘城苑方三百里大營宫室複道彌望積財鏹巨萬計入警出蹕小不得意發病而死宣帝亦驕恣淮陽王㡬至於敗賴其輔以退讓之臣僅乃獲免且魏王既新出閤伏願恒存禮訓妙擇師傅示其成敗既敦之以節儉又勸之以文學惟忠惟孝因而奨之道徳齊禮乃為良器此所謂聖人之教不肅而成者也太宗深納其言十六年太宗謂侍臣曰當今國家何事最急各為我言之尚書右僕射髙士㢘曰養百姓最急黄門侍郎劉洎曰撫四夷急中書侍郎岑文本曰傳稱道之以徳齊之以禮義為急遂良又奏曰即日四方仰徳不敢為非但太子諸王須有㝎分陛下宜為萬代法以遺子孫此最當今日之急太宗曰此言是也朕年將五十已覺衰怠既以長子守器東宫諸弟及庶子數將四十心常憂慮在此耳但自古嫡庶無良何嘗不傾敗國家公等為朕捜訪賢徳以輔儲宫爰及諸王咸求正士且官人事王不宜嵗久嵗久則分義情深非意闚𨵦多由此作其府官僚勿令過四考貞觀中皇子年小者多授以都督刺史遂良又上䟽諫曰昔兩漢以郡國理人除以外分立諸子割土分疆雜用周制皇唐郡縣粗依秦法皇子幼年或授刺史陛下豈不以王之骨肉鎮扞四方聖人造制道髙前列臣愚見有小未盡何者刺史師帥人仰以安得一善人部内蘇息遇一不善人合州勞弊是以人君愛恤百姓常為擇賢或稱河潤九里京師䝉福或以人興詠生為立祠漢宣帝云與我共理者惟良二千石乎如臣愚見陛下子内年齒尚幼未堪臨人者請且㽞京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出臣謹按漢明章和三年䏻友愛子弟自兹以降以為準的封立諸王雖各有土年尚幼小者各㽞京師訓以禮法垂以恩恵訖三帝世諸王數一百人惟二王稍惡自餘皆沖和深粹惟陛下詳審太宗嘉納其言帝又嘗謂荆王元景呉王恪魏王泰等曰自漢以来帝弟帝子受茅土居榮貴者甚衆惟東平及河間王最有令名得保其禄位如楚王之徒覆亡非一並為生長富貴好自驕逸所致汝鑒戒宜熟思之簡擇賢才為汝師友須受其諫爭勿得自專我聞以徳服物信非虚説比嘗夢中見一人云虞舜我不覺竦然敬異豈不為仰其徳也向若夢見桀紂必應斫之桀紂雖是天子今若相喚作桀紂人必大怒顔回閔子騫郭林宗黄叔度雖是布衣今若相稱賛道𩔖此四賢必當大喜故知人之立身所貴者惟在徳行何必要論榮貴汝等位列藩王家食實封更能克脩徳行豈不具美也且君子小人本無常行善事則為君子行惡事則為小人當須自尅勵使善事日聞勿縱欲肆情自陷刑戮又謂房𤣥齡曰朕歴觀前代撥亂創業之主生長人間皆識達情偽罕至於敗亡逮乎繼世守成之君生而富貴不知疾苦動至夷滅朕少小以来經營多難備知天下之事猶恐有所不逮至扵荆王諸弟生自深宫識不及逺能念此㢤朕每一食便念稼穡之艱難每一衣則思紡績之辛苦諸弟何能學朕乎選良佐以為藩弼庶其習近善人得免於愆過爾又謂呉王恪曰父之愛子人之常情非待教訓而知也子能忠孝則善矣若不遵誨誘忘棄禮法必自致刑戮父雖愛之將如之何昔漢武既崩昭帝嗣位燕王旦素驕縦譸張不服霍光遣一折簡誅之則身死國除夫為臣子不得不慎太宗又謂尚書左僕射房𤣥齡曰古来帝子生扵深宫及至成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲皆得全王珪我久驅使甚知剛直志存忠孝選為子師卿宜語泰每對王珪如見我面宜加尊敬不得懈怠珪亦以師道自處時議善之也太宗嘗以光禄大夫陳叔達為禮部尚書因謂曰武徳中公曽進直言扵太上皇明朕有克㝎之功不可黜退云朕性本剛烈若有抑挫恐不勝憂憤以致疾斃之危今賞公忠謇有此遷授叔達對曰臣以隋氏父子自相誅戮以至滅亡豈容目覩覆車不改前轍臣所以竭誠進諫太宗曰朕知公非獨為朕一人實為社稷之計蕭瑀為尚書左僕射甞因宴集太宗謂房𤣥齡曰武徳六年已後太上皇有廢立之心我當此日不為兄弟所容實有功髙不賞之懼蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也乃賜瑀詩曰疾風知勁草版蕩識誠臣瑀拜謝曰臣特䝉誡訓許臣以忠諒雖死之日猶生之年中宗神龍中呉兢改右補闕節閔太子難姦臣誣搆安國相王與謀朝廷大恐兢上言文明後皇運不殊如帯陛下龍興恩被骨肉相王與陛下同氣親莫加焉今賊臣日夜隂謀必欲寘之極法相王仁孝遭荼毒哀毁以陛下為命而自託扵手足若信邪佞委之於法傷陛下之恩失天下望芟刈股肱獨任胷臆可為寒心自昔翦伐宗支委任異姓未有不亡者秦任趙髙漢任王莽晉家自相魚肉隋室猜忌子弟海内麋沸驗之覆車安可重跡且根朽者葉枯源涸者㳺竭子弟國之根源可使枯竭㢤皇家枝榦夷芟略盡陛下即位四年一子弄兵被誅一子以罪謫去惟相王朝夕左右斗粟之刺蒼蠅之詩不可不察伏碩陛下全常棣之恩慰㒺極之心天下幸甚肅宗上元初帝觀酺翔鸞閣時赤縣與太常音技分東西朋帝詔雍王賢主東周王顯主西因以角勝中書侍郎郝䖏俊曰禮所以示童子無誑者恐其欺詐之心生也二王春秋少意操未定乃分朋造黨使相誇彼俳兒優子言辭無度争負勝相譏誚非所以導仁義示雍和也帝遽止歎曰處俊逺識非衆臣所逮遷中書令蒹太子賔客檢校兵部尚書宋仁宗天聖五年右司諫劉隨上奏曰臣聞宗子維城用期磐石之固異姓為後適茂本支之榮宗周則並建懿親炎漢乃分王善地有唐開國彌重親賢嗣王郡王推恩甚衆皆所以強大宗室為䇿久長豈比夫秦懐封建之疑卒無子弟之援也伏自皇家御極但推至公尊禮勲臣謙抑宗族親王之子不封郡王親王既沒不立嗣王闕典未行属在繼聖今者臣僚遷擢多至尊官皇族絲聮未登顯位雖天地之道義在無私而東平之賢宜推異數臣伏覩每遇聖節宴扵錫慶院見皇親數人坐於駙馬都尉之下進退俯仰同於庶僚北使在筵顧揖不及非所以壯觀洪業威示逺人之道也方今兩宫明聖四海㑹同北朝歡盟人使交午爵秩班序恐須商量庶使銀潢分派將溝洫以異流天枝擢秀與樗櫟而殊等臣職當言事難避僭踰親睦之恩允資聖斷慶厯四年樞宻使富弼奏議曰臣觀三代已後興王者今日得天下明日封建宗室至于襁褓之子亦皆為侯為王分割土地自成邦國所以分布枝葉庇䕃根本張大王室壯觀天下使英豪無間辭無異意謂四海之内盡是一姓雖有凶謀變計不敢妄動此前代帝王制御天下長久之䇿也布在簡牘驗之可信今則埋没抑壓僅同豢養縦其非僻殊不教訓雖有說書之官又實虚設是盡欲愚之而不令知善道為善人甚非帝王養宗室之義也至於臣庶之家有子孫弟姪者無不孜孜誨誘使之成器盖持門户主祭祀若子孫不肖則家道淪沒又有擔負之夫微乎微者日求升合之粟以活妻兒尚每日那一二錢令厥子入市學謂之學課亦欲厥子讀書識字有所進益而嗣其家國家富有天下基業全盛實祖宗艱難而致所宜子子孫孫相承不絶為萬世之計豈可宗室滿宫而陛下都不教導任為過惡俾外夷輕笑是陛下自去枝葉而取孤根易揺之患臣竊憂之臣又伏思陛下任李用和為殿前副指揮使任曹琮為馬軍副都指揮使是任親也用和與琮誠親矣然皆異姓異姓者尚可信之則宗室同姓與陛下是骨肉之親反不可信之㢤陛下不過謂宗室無人臣謂今則誠未見其人教之試之當自有人矣今唯朝會時群行旅進青盖滿道士大夫見者方知有宗室但出得都城四門之外已不知宗室之有無況天下乎況四夷乎上古直至周世宗其間所歴何啻萬代而宗室不教不試不用微弱乏人未有如本朝之甚之極者也宜乎為識者之所憂而敵人之所輕也且如敵人有南大王蕭孝穆北大王蕭孝恵魯王特里衮楚王伊勒希巴是其近親者甚衆臣前嵗奉使盡與之接又詢其國人未必實皆才武而中原聞之莫不疑其人人皆良將也其故何㢤盖聞其名而疑其有實爾今朝廷若能崇植宗室使聲名漸著聞扵敵人亦謂南朝宗室有人根本牢矣藩屏固矣欲謀則息欲動則止古者有以實效濟務者亦有虚聲懾敵者兵尤重先聲而後實況臣之所說必然聲實相副願陛下行之無疑弼又上奏曰臣近上河北事宜以匈奴强盛朝廷為藩屏之固慮為敵人所輕乞陛下親擇宗室中堪任外䖏差遣者充近京千里内知州鈐轄及畿甸知州縣以壯觀王宗議下兩府至今未上必謂體大無例難以施行此議事干皇親必涉議論然茍利扵國安可避免臣前奏或未決行欲望且令幹當在京諸司如皇城司軍頭引見在京百司省中衙司羣牧司儀鑾司翰林司御厨庫院府界提㸃之𩔖使之稍接人事亦教育之階也俟其間見得才效有可外補者然後用臣前議漸次差出至和元年知諫院范鎮上奏曰臣伏見方今宗子衆多睦親廣親二宅狭隘居處不便又皆賦以重禄别無職業使展其效祖宗後裔豈無賢才而一槩廢而不用深可惜也臣欲乞族属稍疎者以次補外使無廢才以副陛下睦親之意如允臣所乞其入官資序及諸約束乞委大臣裁酌施行二年侍御史趙抃論宗室濫賞疏曰臣等伏覩近日皇親非次建節移鎮遷官増禄㡬二十人道途喧傳不測恩命之所自出臣愚欲望陛下稽考祖宗故事杜絶僥倖之路特賜聖㫖裁損無令外議有宗室濫賞之名亦詩所謂至于兄弟以御于家邦之議也殿中侍御史馬遵上奏曰臣伏覩近日宗室中屢有除授已是頻煩復聞更有扳援體例希望恩澤者上干宸聽相繼未已國家秩叙親族至扵爵秩禄廩皆因祖宗舊制循守施行垂之經久不宜過有優假以隳後法伏乞聖斷詳察特賜指揮嘉祐七年知諫院司馬光乞召皇姪就職奏曰臣伏見陛下以皇姪宗實知宗正寺宗實辭譲多日不肯就職陛下兩次遣使者召令受勅中外之人無不欣恱以為非陛下睿智聦明深謀逺慮斷自聖志確然不惑何以及此夫王者以大庇生民為仁安固基業為孝仁孝之道莫大於此今陛下一舉而兩有之天下聞之安得不喜又爵禄者人之所貪往往校量絲毫干求爭訟不顧㢘耻今宗實特受陛下簡拔恩寵殊異而以榮為懼辭讓懇切首尾十月尚未受詔其智識操行必賢扵人益足彰陛下知人之明此天下所以尤喜也然陛下之於宗實属則父也尊則君也在禮父召無諾唯而起君命召不俟駕今陛下兩遣使者召之宗實雖不受恩命亦當入見面自陳述豈可在家堅卧不起臣愚伏願陛下更遣近上内臣往傳聖意責以禮法彼宜不敢不来来則陛下面加敦諭使知聖心懇惻發扵至誠彼宜不敢不受如此則陛下仁孝之徳純粹光大本末如一無以復加此皆陛下即今所行而臣復區區進言者誠欲陛下守之益堅行之不倦故也歴代名臣奏議卷七十六
