body:
  text: 歴代名臣奏議卷八十三眀楊士竒等撰經國宋欽宗靖康初歐陽徹上書曰臣聞唐太宗時中書舎人髙季輔上封事言得失辭㫖切至上善之賜鍾乳一劑曰卿進藥石之言故以藥石相報臣以是知太宗除隋之亂致治之美貞觀之風髙邁唐室者以其能聴藥石之言故也臣伏讀聖詔曰惟藥石是求竊知陛下盛徳函容廣求諫諍直欲明四目達四聰與虞舜異世而同軌天下忠臣義士能以骨鯁之言上干天聴必䝉其藥石之報矣臣以是狂妄昩死忘其㣲賤於聖詔起兵之日條陳安邉禦戎十䇿撰成萬言書一封陳乞所部為奏朝廷臣之本意非有他望實欲奮身報國願效馬革裹尸以立忠誼之名於天下庶使保位持禄軰聞風而慙汗適丁遞角不通州府未許發奏臣於是退處逆旅棲遲無憀自恨胷中雖有忠誼之氣抑鬱而不達一旦餓死溝壑而名不聞則與草木俱腐與其飲恨而死於蓬蒿之間孰若抗直節而死於斧鉞之下臣於是復採朝廷之闕失政令之乖違可以為保邦御俗之方可以去蠧國殘民之賊者共十事再撰一書乞併為奏達臣言狂直然皆當世切要仍得於輿議非恃一己之私見伏願陛下眀斷而必行則天下風俗尚可追復祖宗之時儻或以臣為無補於世則臣甘心就誅戮第恐天下衰敗而不復振矣惟陛下留神省察則生民之幸也臣聞為天子者貴乎聰眀神武決於聴斷見善眀用心剛不牽制於權臣則天下雖大四海雖逺可運用於股掌之上矣臣伏覩陛下不崇飾恩倖不聽任姦臣不輕爵禄不濫賜予不奪民居以營燕逰之地不竭民力以廣無用之費罷不急之務擢忠義之臣杜悦耳之邪説聴苦口之忠言去易進之人賤難得之貨則聖徳髙妙自有生民以来未有倫擬觀其初即位慨然睿斷選用忠良志平僭叛悉誅六賊以謝天下則太平之治似可指日而待豈意金人復爾猖獗使黎元被害國本動揺辱莫甚於今日臣竊知其所自矣臣聞陛下自誅六賊之後英斷不及前日既而朝臣擅權言路復塞忠言嘉謨不聞于上故朔方初寜恬不為備既失信於敵人知其必為患於中國而不能為防禦之術宜乎兵端四起茫然失措始募天下之兵以禦之則後時矣陛下若欲大有為於天下以成中興之業則當效漢武帝以雄才大畧自任疇咨海内舉其俊茂共圖治功又當效漢宣帝信賞必罰綜核名實使吏稱其職民安其生則功業顯著帝祚無窮矣今也徒能為文景之恭儉雖可以為天下先然服三浣之衣不能却百萬之衆可為持盈守成之君非興衰撥亂之主臣願陛下以古為鑑乾剛果斷興天下之大利除天下之大害庶使祖宗社稷不危於敵人之手則萬世之幸也此臣所欲言者一也臣又聞王者用人非難盡其材之為難觀唐太宗責任大臣謀斯從言斯聴才斯奮洞然不疑故人未始遺力天子髙拱操成功致太平矣下逮開元之間眀皇勵精求治元老魁舊動所尊憚故姚崇宋璟亦言聴計行力不難而功已成則将大有為之君必委任股肱之臣然後能圖回天下之治臣竊見陛下擢用大臣任之雖重而委之不專故腹心之寄耳目之託易於動揺難以成功讒言一投其隙雖社稷之臣亦忘大功而擿小過則天下失望而國威不立矣臣愚欲乞陛下選用近侍必精鑑而博採之知其可大用則任之勿貳若成湯之於伊尹委之阿衡而無疑若髙宗之於傳説擢之版築而無間言必從諫必聴都俞賡歌於一堂之上使風化行乎萬里之逺則臣将見帝堯在上夔龍為相炳然與三代同風矣此臣所欲言者二也臣又聞諸葛亮之為相也開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰善無微而不取惡無纎而不貶則天下平矣臣竊見朝廷大臣薦黜人材皆不取天下之公議用之不過酬私恩謫之不過快私忿非所謂爵人於朝與士共之刑人於市與衆棄之也如是則賞不以徳罰不以罪殆有甚於上皇之時将何以厭民望㢤臣愚欲乞陛下嚴降詔㫖革絶此弊凡大臣有所升黜必詢于臺諫之臣決其可否宰相曰可䑓諫曰不可宰相曰是臺諫曰非則召館閣之臣而問之僉曰可然後用僉曰否然後去庶㡬用舎合天下之公議則忠言日聞于朝民情不屈於下矣昔天寳之季嬖倖傾國爵以情受賞以寵加綱紀於是大壊可不戒㢤此臣所欲言者三也臣又聞黄霸之材長於治郡及其為丞相則總綱紀號令風采不及丙魏于定國功名損於治郡裴頠拙於用長荀朂工於用短則人之才能各有所宜古之用人者論徳而定位量能而授職甚若籧篨蒙璆戚施直鎛聾者司視瞽者司聴雖小有所用尚且不違其所長矧夫欲任之以經營天下者耶臣竊聞耿南仲特能作章句儒貫綜墳典為書癡經醉而已至於臨機應變則智不足與有眀識不足與有斷其道徳雖可尊而謀猷不足採必不能度長慮逺以立大功其於謀王體斷國論決非所長臣聞其妒賢嫉能懼人之軋己則已非社稷之臣者也陛下不忘其師傅之恩則富貴之可也眷予之可也使之擅天下之權而與國家之大計則不可也臣愚欲乞陛下處之以講讀之職使論道經邦迪王耳目而已無以儲宫之私恩而壊祖宗之社稷臣甞觀蕭望之堂堂折而不撓身為儒宗真社稷臣也藉師傅之恩而歴位将相親昵無間及其謀泄隙開讒邪遇之尚為石顯所譛竟飲鴆自殺況南仲智謀不及望之逺甚徒以文墨而位羣臣之上臣恐陛下夲以報之反所以害之也此臣所欲言者四也臣又聞忠者社稷之衛故魯以季友治亂楚以子玉輕重魏以無忌折衝項以范増存亡汲黯在朝而淮南寝謀干木處魏而諸侯息兵則一士而止百萬之師一賢而制千里之難在古固有之方今朝廷之上亦不乏其人陛下尤不可輕用慮失生民之望也觀夫秦行千金以間㢘頗漢散萬金以疏亞父則輕用大臣是中其反間也是速我後患也臣竊聞李綱首建征伐之議聶昌多秉帷幄之權則二人者元勲碩徳文武兼備使常𠫭廟堂之機必能使逺人畏威而銷伏然則社稷安危實在二人之掌握金人視之不啻讐敵觀其用心亦不過欲與民共休戚與國同榮辱而已其去就豈不係天下之輕重哉今也綱以小過而謫之散籍昌以奉使而寘之北庭是快金人私忿也是堕金人計中也臣恐鄰國得以此窺陛下矣臣聞之偏聴生姦獨任成亂昔魯聴季孫之説而退孔子宋任冉子之計而囚墨翟夫以孔墨之辯不能自免於讒䛕而二國以危則衆口爍金積毁銷骨信有是理臣以是知李綱之黜朝廷大臣必有陰為之譛者不然何遽至於是耶陛下宜熟察之臣前書固甞縷陳其詳於此又申言之誠為國家惜此人故也臣願陛下過此以往無輕用大臣方今濟濟多士百僚師師豈無一人徳望之重智謀之多堪任遣使者何苦以聶昌為此行㢤尤為陛下惜也昔裴度逢時艱危而能奮命決䇿横身討賊為中興宗臣當元和長慶間亂臣賊子蓄縮䘮氣憚度之威稜時有使絶域者四夷君長必問度之年齡㡬何状貌孰似天子用否其威名播於逺俗為華夷畏服也如是岀入中外以身繫國之安危為國之輕重者二十年凡将相無賢不肖皆推度為首臣謂若昌者正今日之裴度也其岀處繫國之安危則敵人聞風而慴服陛下當引置帷幄使諷議左右震威華夷以定中國可也豈宜遣之於外哉此臣所欲言者五也臣又聞昔蕭銑據江陵李靖為行軍總管軍政委焉武徳四年八月大閲兵夔州時秋潦濤漲惡銑以靖未能下不設備諸将亦請江平乃進靖曰兵機事以速為神今士始集銑不及知若乗水傅壘是震霆不及掩耳豈能倉卒召兵無以禦我此必擒也臣以是三軍之岀能掩其不備則萬全之䇿臣聞金人懼暖必退師而請和臣願於此時乗其有怠心借朝廷一介之使遣臣奉咫尺之書往見彼主而議和親臣必能口伐敵人使之弛廢而不為偹伏願朝廷簡卒練兵遣良将統制乗其隙而復滅之必得所欲無謂肅王為質張邦昌未還遂猶豫而不行小不忍則必致大亂無謂臣布韋之賤不能立此功昔毛遂以三寸之舌强扵百萬之師定從扵楚而使趙重於九鼎當其未用亦若囊中之錐及其既用則頴脱而岀矣萬一用臣狂計必能却外侮而安中國則臣與邦昌固不惜一死以報國恩雖肅王亦何足惜㢤大義滅親其是之謂歟此臣所欲言者六也臣又聞古語有之曰㗲㗲者易慮黙黙者可防故㳙㳙不塞将成江河一葉不伐将尋斧柯千丈之堤以螻蟻之穴潰百尺之室以突隙之煙焚白圭之行堤也塞其穴則無水難丈人之謹火也塗其隙則無火患皆貴其防之微而杜之漸也古語又曰欲斷不斷反受其亂盖功者難成而易敗時者難值而易失隨厮養之役者失萬乗之權守儋石之儲者無卿相之位則計誠知之而弗敢決行者百事之禍也臣竊觀六賊既誅其子孫雖以罪譴而羈留四方然實為大患也臣聞比者金人入寇童貫麾下當時勝㨗兵及乗勢作亂者數矣此亦将帥非人不能撫御使之懐畏故至此禍然亦貫之黨𩔖尚未夷滅而為亂之招也盖六賊門人碁布星列於天下者皆强藩悍将懐私恩而視國為仇敵者有之幸災樂禍而欲快私忿者有之反為内應而與敵同謀者有之甚者陰懐叛逆欲與子孫運衡而起以刷乃祖乃父之恥者有之嗚呼當時六賊黨與之爵禄者皆國家之賜予今日反歸恩於私室而忘君父之大義臣子之心果安在㢤未有仁而遺其親者也未有義而後其君者也不仁不智無禮無義則殺之猶雀鼠可也尚何所惜若不正典刑以行誅戮則國勢存亡未可保也臣愚欲乞陛下睿斷應六賊子孫悉與殱滅仍乞籍記其當時死黨如鄧珣范致虚薛昻之流不許典名藩掌兵權庶㡬變不生也其暴惡已章如前日蔡州之倅帶畨人入城者即與斬首以謝天下仍乞滅族以絶後患臣觀頃者張懐素與吴儲等謀反為范寥所告開封府制勘懐素等供言蔡京亦甞與謀是時開封府尹林攄并御史中丞余深實主其事二人乃京死黨力為掩覆凡文欵及京者必盡焚毁京遂幸免其後京擢攄深於宰執者皆報其恩也臣謂若攄深之流亦國之賊懐私恩而背君父其罪莫大焉况不發京之惡則是與之同謀也今日亦當眀告其惡梟首于市庶使姦臣賊子望風畏憚潜銷於冥冥之中也臣又聞崇寜間蔡京專權跋扈壊亂綱紀而人莫敢誰何于時臺諌乏官如陳瓘任伯雨何昌言江公望等乃能抗章數十論列其罪惡瓘等即被罪讁飲恨而死者多矣所存者惟何昌言一人也今日陛下雖能用之不過處之工部而已非所以旌忠直之言而為䑓諌之表也臣愚欲乞陛下擢之近侍以賞其直庶使朝廷忠誼之臣肯抗章鯁切指摘權臣之失也今夫聖人有先見之眀故見㡬而作不俟終日皆能圖患於未然臺諫之章有議權臣之失者彼必熟思審察然後敢聞天聴其言必有益於國家非為身謀也臣願陛下毎覧奏章曲加省察無以臺諫之言為輕也臣竊聞聶昌頃時亦甞疏蔡京之失知其必致大亂上皇不加睿斷便行竄謫及御制鳴鑾堂記反指昌為小人意其離間君臣之義既而京罪惡暴露窺伺神器動揺國本上皇悔寤擢昌於謫籍者豈非思其言之當耶借使上皇英斷早從昌言竄謫京於散地委昌以樞要之職使振領綱紀勵精威訓嚴敕邉備廣募熊羆之士以振虎賁之旅則國必不辱於敵人矣臣言輕不足以取信於陛下然臣所乞殱夷六賊之後及乞誅蔡氏死黨林攄余深軰者盖臣竊意梁師成王黼李彦蔡京童貫朱勔當時勢傾天下陰結黨與誓生死不相背負不滅其子孫則死黨尚有異謀死黨既有異謀則朝廷不能無患陛下為社稷計為生民憂則螻蟻軰何足惜若不速於誅戮則朝臣萬一掣肘誰肯為陛下奮身者耶誰肯赤心以圖國家之大事耶臣所謂黙黙者可防正指此也又所謂欲斷不斷反受其亂亦指此也臣願陛下大眀誅賞以示天下無猶豫而不决無濡滯而不行禍如已廹悔之何及然臣書既達天聴必有大臣為六賊子孫鑚皮出羽而為之掩覆者棄短取長而為之引援者陛下亦必狐疑猶豫以臣之言為狂妄以大臣之計為可信臣知此而必欲獻其説者忠誼之氣不可遏也陛下能用臣計悉與殱滅則祖宗有靈而社稷有福為大臣誤不用臣言則臣恐他日禍起陛下思臣之言又復若思种師道勸滅金人餘黨而不従其計矣機不可失願陛下裁之觀夫蝮之螫人也螫指則㫁指螫臂則斷臂所以去小而全大也陛下若欲長有天下宜取法於此此臣所欲言者七也臣又聞諸路監司本以澄清天下之吏而為天子耳目之官其實欲革貪暴而進明良去姦雄而取忠義奈何擢用非人比年以来姦贓狼籍自不廉潔者每每有之凡所按臨因縁為姦賄賂公行以曲為直徒有舉察之名適滋擾攘之患甚至其所舉京削關陞之職朝廷法意本欲選用賢能分職率屬聨事合治良法美意非不善也奈何積弊既久習以成風或以賂進或以勢取挟親姻者有之㳂恩倖者有之故其所舉多不稱職真賢實能反沉没下僚不與収録臣愚欲乞應選諸路監司宰相不得自專䑓諫之臣許辯論其當否必得剛眀果斷之士以膺此職則天下無患乎不平也應監司受職之日願陛下召而面遣丁寜告戒使無曠爾官則人人思效死以報國矣仍乞立法禁絶其岀按州縣無以頃時受官吏裒聚金銀岀界迎接先次交與謂之常例所有嵗舉之官亦乞嚴行賞罰令審實其才能因其所長而舉之一不稱職則貶其繆舉之罪而不恕如是則内舉不避親外舉不避讐以公議取人而鬻舉状者無有也臣聞之書曰三載考績三考黜陟幽眀詩曰念兹皇祖陟降庭止古之賢君其用人也升降有法功罪各得其真故為人所保為人所保故帝祚綿逺也今陛下選舉之法非不善臣輙以為不公奉行者非其人也陛下若能大眀賞罰以懲斯弊則天下幸甚今監司徒知舉官而已未聞某人因某罪而黜之縦有因而發擿者不過交結權貴致一言之助則又復遷緩而不行故使州縣之官不遵箴誡肆意貪暴恬不知恥者為其無黜責之罪故也臣愚欲乞陛下嚴勅諸路監司嵗限發擿部下姦贓者㡬貟仍要事跡暴白僉議允當然後許奏若因讐隙而擠䧟者反坐其罪仍乞遴選䑓諌公直之官埋輪如張綱者毎路以一人為觀察使嵗令兩行廵察監司守令有受賄挟私而舉官者有姦贓㒺民而枉法者有濫濁而不修身檢者有怠惰而不勤王事者悉令宻奏朝廷嚴行竄謫應民有大屈抑許實封投状於觀察使附逓以聞仍禁約使臣所歴州縣除飲食之外不許受燕不許買物不許私謁如違禁令反挟勢而殘民若頃時廉訪之岀非徒無益而又害之則許監司糾察申奏亦當黜謫仍乞諸路嵗換一人慮其久則姦生詐起有功而無過者别與旌賞如是則有官君子莫不砥節礪行蘄自標榜以拔流俗矣此臣所欲言者八也臣竊觀守令非人民受荼苦比年以来此風尤甚孱懦少斷無幹局之譽貪饕不亷賊民之脂膏者易地皆然甚者注調京闕即尋部下富商巨賈預貸金以為費俟到任而償者有之養侠客於門以訓義方為名陰令捜求賄賂於外者有之故或下車未逾數月収拾金帛製造器皿已擬豪右酣酒嗜音夜以繼日惟恨腹隘而不能恣口於飲力憊而不能肆情於色至於聴訟理民則偃蹇而不暇故民有屈抑無所従訴或本欲訴寃反受罪責者多矣良民士子周身術淺不幸罹於憲網仇敵者又從而賄賂有司下石傾擠或陰殺于獄或以枉為直者比比皆是東南之民痛入骨髄造怨無窮者良由守令不得其人也嗚呼聲和則氣和氣和則形和形和則天地之和應矣今日邉圉之禍未必不原於此以臣觀之守令雖多求其能盡忠竭節宣布詔令求民之瘼以聞於上推君之澤以被于下者千百無一焉如是而欲郡縣之治不亦難乎陛下久處東宫知民事之艱難守令之弊必稔聞而熟講之自即位之日天下欣戴自謂前弊可以頓革夫何日甚一日守令姦贓殆有過於頃時此亦陛下不能眀於聴斷以發擿伏姦故也臣愚欲乞陛下勵精為治躬覧萬幾專委監司發擿諸路州縣之官有姦贓汚辱之甚者考覈其實誅戮數人以激貪懦所謂懲一以戒百者此也又乞戒勅吏部注差縣令不以資格必審實其才能長於作邑者然後授之痛懲銓選受賂之弊盖比年吏部注差無非賄賂其原既不清則其流必濁矣仍許䑓閣之臣嵗舉堪試縣令者㡬人則令尹無患乎乏人矣應拜刺史則許䑓閣連章薦擢亦不論資格第欲得亷潔眀斷公直無私者以表率一州而已仍乞陛下每授千里之寄必召見試問觀其所由退而考察所行以質其言有名實不相副者罷之則太守可以得人矣昔漢宣帝甞稱曰庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎則太守之職尤不可輕臣愚又欲乞陛下審察應太守功勤既著治聲卓偉者宜加旌賞或以璽書勉勵増秩賜金或爵以封侯公卿有闕則擢而用之古者刺史入為三公郎官出宰百里則行之固有素矣觀夫第五倫擢自蜀郡而為司空虞延自南陽太守入而為太尉劉寵自會稽太守罷歸八居九列四登三事則郡守入而為三公者有之朱邑守北海以治行第一入而為大司農召信臣守河南數増秩賜金召為少府列於九卿韓稜守南陽政號嚴平入而為太僕則郡守入而為九卿者有之陛下舉而用之其䇿豈不良㢤縣既得人則貳邑之佐無患乎不公也太守既得人則貳郡之倅無患乎不眀也郡縣之治可跬而待矣此臣所欲言者九也臣竊觀入仕之源太濁故天下冗官散職紛紛籍籍蠧國賊民莫此為甚陛下若欲立太平之基以復祖宗之治則當惜名器而清品流如任子則世禄以賞有功鬻爵則輸財以濟國用二者皆欲罷而不能至於流外奏名權局三者皆非國家長久之䇿何苦而不罷耶今夫姦胥猾吏舞文玩法竊弄威權欺逼良民當其平居運謀籌筭不過欲枉尋直尺以窺財利而已及其晚節反授之以職使涖官臨民則貪暴殘賊有過於平時矣豈能為民之利哉流外胡為而不罷也布韋之士當妙年取髙第則欲致君澤民立功名扵當世故能自重其威權然一有所溺尚且不惜名節而肆為不檢矧夫桑榆晚景得薄禄小官其志豈有逺大之望㢤不過問舍求田規規為子孫計而已志不岀乎此則苟可以趣利者無不為也故凡奏名之官歴任未久遽能致富者不可勝數臣愚欲乞應奏名者例與文學之職以報稽古之勤不許涖官以去其蠧民之害見在任者並放罷及諸路官司有闕監司得授權局此尤不利於國家盖一官纔闕紛然交争或鬻爵而未補官者或授差而未交代者或世禄而閒居者延頸舉踵窺伺有闕則掃門未見望塵雅拜而乞憐者有之持金以賂監司而求者有之市書於權門而求者有之如是則所責已不貲矣設心措意宜如何哉非有志於為國而理民其實欲借勢而殘賊耳臣愚欲乞陛下嚴行止絶諸路權局應有官闕即急申部注差以補之如補官未到則許同僚兼管應見權局者並放罷則冗官可去仕路可清姦贓之風亦於焉熄矣此臣所欲言者十也臣又覩比者屢頒詔音停罷諸般科需此足見陛下矜憫編氓日淪凋瘵恩至渥也然近自軍興而安撫經制司每責辦於州縣勢亦不得不然故或以金銀或紬絹或錢米或夫馬或起發應副或存留凖備不一端而足竊見諸州縣多以五等簿籍按之又𩔖責辦於上三等人户胥吏追呼動以軍期急速為言甚者半夜打門左手示引右手索物曽不肯旋踵也借使上三等中皆富足温裕之家則猶云可也其間困於供輸昔富而今貧不得脱去等第者無慮三之一故方是時雖欲賣妻鬻子以應之而廹於晷限不遑也况科目既繁且源源而不絶計無所岀遂至棄去屋廬逃亡離散可為流涕如東南土薄視他路為多貧去金人為甚逺敵兵初不能撓而民已不克安堵古語有云天下本無事庸人擾之耳此𩔖是也臣深究其弊皆縁産去而稅存者多故也或居城邑則有産業售盡户括税錢随以除矣其所以不得脫去於等第者三嵗推排營運錢之法行之者非其人故也且推排本法每三嵗會人戸于州俾共指證之曰今某家富某家貧計其升降而増損之各不許過分焉奈何比年奉行之官徒懼減失和買課額扵是欲増可也欲損不可也觀夫甲實貧而無所營運矣猶未從銷退必待乙之富者樂與之承替而後可然法意初不爾今一州萬一可増者百人而可損者或倍之則半是虚存之人矣其或窶乏之軰直指一豪民而訟之則彼恃賄賂公行請託勢要不可與為敵過此以往又遲三嵗矣三嵗之間其科需不知其㡬端而三嵗之後又安保其不復如是耶以是雖均謂之上三等而無其實者多矣至於四等五等有蓄財𨼆實素無差役科細者乃恬不知憂使親見者不平之氣為之拂膺臣伏願陛下速降詔㫖俾見今凡差役科需不得拘守舊籍可先勾集逐鄉坊五等人戸于縣使衆議供析本界有實富實貧者而籍之以備差科不限見存等次庶㡬得其當而屈抑流遁之民将鳩𩔖集族還土著矣待其推排之年有果可銷退者即與降等不必須有承替之人雖減少舊額過分官吏無罪夫惟銷退無難則承受者亦不憚矣臣伏聞天下之事利害常相半竊見曩者議臣言事多以利國為主而有害民者則畧而不卹臣獨以為非是大抵無利於國亦必未有害至於有害於民則非徒無利焉書曰民惟邦本本固邦寜又曰衆非元后何戴后非衆㒺與守邦今横目黔首乃膏流節離號呼騰蹈矣為邦國何臣謂與其失人心孰若失和買之為少也此臣所欲言者十一也臣聞之孔子曰法語之言能無從乎改之為貴臣今日所論之事其言雖荒唐繆悠不足以取重於世然捜羅天下利病㡬過半矣可以箴朝廷之膏肓去國家之殘蠧以全活生靈也陛下若不從而不改則臣徒勞辭説耳徒費紙札耳孰若鉗口結舌以全身逺害哉臣非不知忠言苦鯁必犯天威罪不容誅然臣所以甘心而為此者誠恐朝廷之官持禄保位畏憚權臣而不敢言耳陛下若能用臣狂計以安天下則臣雖䝉市朝誅戮亦所願也干瀆宸聰惶恐無地伏惟陛下矜憐之徹又上書曰臣聞事君之義有言責者當盡其忠有官守者當修其職臣布韋之賤身在畎畆無言責之辜無官守之責然惓惓不忘君父之義願盡忠竭節以報國恩者臣竊見金人肆毒害及天下陛下北顧垂涕頒詔起兵詞㫖懇切讀之者莫不寒心正宜忠臣義士感激自奮捐軀報國之時而州縣之官尚且酣暢自適殊不以國家為念臣以是知有言責者未必肯輸忠而陳謀有官守者未必能修職而效事布衣者若復緘黙則民之困苦無由聞於天聴矣臣於是忘其上干鈇鉞之誅摘當世之利害撰成萬言書兩封條陳二十餘事實可以保邦御俗安邊禦戎一以投州府而適丁道塗之艱一欲投經制而慮有浮沉之失臣思陛下深居九重之中而臣身寄萬里之外雖有忠義之氣鯁諤之莭可以扶翼委靡之國勢可以撫綏愁歎之黎元然姦䛕者忌其進權貴者嫉其直則臣言何由聞於上㢤孰若拂衣而别故鄉擔簦而干帝里併携二書投于闕下則朝進而莫達矣何苦規規求人之保奏㢤臣扵是贏糧重趼而来願以所陳干瀆天聴臣思其間皆國家急務不可後時遂先投于安撫司乞為速達朝廷伏願陛下俯加容察則天下幸甚然臣聞之昔者齊萬年反朝臣畏恐周處强直乃使西征孫秀知其将死謂之曰卿有老母可以此辭處曰忠孝之道安得兩立臣以是知王陽欲為孝子則不能全扵忠王尊欲為忠臣則必不終扵孝臣幼失所怙老母垂白今既割慈忍愛齧臂而與母永訣則孝道毋復全矣臣若復忌憚權臣而不敢言人之所難則是釣虚名耳是猶畏死耳非推赤心以報國也不若披肝瀝膽思盡底藴敷奏利害而無𨼆情使陛下讀之感動則生民受賜不淺臣所以妄冒自前復敢以十事撰成此書上瀆宸聰臣前後所進三書言雖訐直似失臣子之理然法度可行而未行紀綱可罷而未罷者臣悉陳之矣陛下若恕其狂直而少加睿斷則社稷可以復存生民可以全活古語有之曰忠言逆耳而利於行良藥苦口而利扵病者其斯之謂歟臣聞之書曰終始惟一時乃日新詩曰靡不有初鮮克有終故唐有天下傳世二十所可稱者三君𤣥宗憲宗皆不克其終惟太宗以文武之才髙出前古驅䇿英雄網羅俊彦故能除隋之亂比迹湯武致治之美庶㡬成康由漢以来未之有也𤣥宗以功成治定無有後艱侈心一動窮天下之欲不足為其樂溺所愛而忘可戒至於竄身失國而不悔憲宗晚節信用非人怠於防㣲不終其身而變生肘腋悲夫臣甞即是而知人君之憂勤恭儉未足以為難惟終始不變所守至於持盈守成及兢兢業業日慎一日者為尤難臣竊聞陛下即位之初減乗輿服御放宫女罷苑囿焚玩好務以恭儉為天下先以至減冗官澄濫賞汰貪吏除民害脩舉法度䟽剔衆弊雖古先哲王未易過此臣固知去年春金人悔過而效順者實以天人之心歸于陛下故感格如此既而金人復爾深入踐蹂侵侮無所不至扵是天下惶恐莫知所自無乃積弊既久邊隙創開而難於支持歟抑亦将帥非人不能預為之防歟不然則天意以此警陛下使不變其初心歟三者必居一於此矣臣覩陛下流涕而祈于皇天哀詔而告于衆庶夜分不寐日惟蔬食則非不憂勤也非不恭儉也非不以生靈為念也金人尚爾者何耶臣逺方賤士妄意國家法度紀綱必有未當天意者政事號令必有未厭民望者百姓困苦必有未聞于上者官吏貪暴必有愈甚扵前者故皇天以此警陛下使眀鑑而熟察之不然何遽至扵是耶臣願陛下奮乹剛果睿斷欽脩眀聖之徳曲盡憂勤之心飲食起居顛沛造次悉以天下為念法度廢而未修者舉之使宜扵民政事久而已弊者革之使便扵俗捜百姓之困苦而速降之鑑官吏之貪暴而亟誅之如天之運無所牽制庶使上當天意下合民情則勍敵無足慮而天下可從安矣臣覩陛下即位以来立法頒詔非不善也奈何州縣之吏尚襲前弊不克奉行者多矣可不哀㢤且古之為臣者視儀而動聴唱而應文王勤勞則在位相率而為勤勞文王節儉則在位相率而為節儉是則是傚皆得扵觀感之間而已况其詔令頒告安得而不奉行耶且如陛下節儉之至誠可為天下先矣宜乎百官士庶莫不仰法於此今乃上自朝臣下及衆庶侈靡之風過扵前日故州縣之官有請三月之俸不足以償一會之費者庶人之家有鬻二頃之田不足以充一女之聘者胥吏之衣僭於公卿倡優之飾擬於妃后騶従與士子無間伶人與良民混殽夫百人作之不能衣一人一人耕之聚而食者不啻十人如是而欲天下不饑不寒可得乎饑寒既切於肌膚欲其不為姦邪可得乎亡等僭上之風凌弱暴寡之孽莫不基於此賈誼所謂帝之身自衣皂綈而富民墻屋被文繡天子之后以縁其領而庶人㜸妾以縁其履者復見於今日亦為陛下長太息者屢矣昔楊綰素性儉約未甞問生事禄廪分姻族造之者清譚終日而略不及名利欲干以私者必内愧止其始輔政御史中丞崔寛城南别墅觀堂第一即遣人毁之京兆尹黎幹出入騶馭百數省損留十餘騎中書令郭子儀在邠州行營方大會除書至音樂散五之四它聞靡然自化者不可勝紀嗚呼綰特為唐名臣躬行儉約一旦輔政尚能風化扵當時而使之畏憚莫敢僭侈矧夫植一人之本形於天下之風者實在於陛下今也恭儉如此天下臣子反僭侈而不從其化則是欲使我宋天子不及唐一名臣耳臣以是知為君者能盡君道如堯之所以治民為臣者反不能盡臣道若舜之所以事堯矣陛下萬一不然臣言試察在朝之臣有儉約守節如楊綰者耶朝廷既難其人則州縣之官不足道矣臣愚願陛下憂勤日加而無已恭儉有隆而無替庶使四方萬里日以變化而不見其迹則風俗無患乎不革也臣又乞邉塵掃蕩之後眀詔頒告天下宜以儉約為尚應有官之家及士庶胥吏倡優服飾費用乞委所司立為㝎制各有差等不容僭侈有不遵令者並依違制論無似上皇時徒為虚文而不能必行則貴賤有别而混殽僭上者無有也盖今日風俗委靡之甚若非䋲之以法則不能丕變天下之奢侈此臣所願陳者一也臣又聞唐有天下絶而復續者屢矣徳宗憤積世之弊憫王室之卑南面之初赫然有撥亂之志而識度闇淺資性猜忌親信多非其人舉措不由其道故關外之寇未平而京城之盗先起扵是幽辱扵奉天播遷於山南公卿拜于賊廷鋒鏑集于黄屋尚賴陸贄盡心扵内李晟渾瑊輸力於外故能誅夷元兇還奉宗社不失蒨物至於昭宗為人眀雋初亦有志於興復而外患已成内無賢佐甞亦慨然思得非常之材而用非其人徒以益亂故唐之宗社遂不復振臣以是知國家顛危之際若得将相以為内外之助則社稷尚可復保若将相乏人則雖有欲治之君而無輔翼之臣寖成其亂遂至於不可支持矣方念邊寇遽起欲危社稷殆有過於奉天之難乗輿雖未播遷然生民塗地禍患頓作㡬不可救陛下憂勤軫念元元可謂至矣然臣竊意朝廷大臣未必人人文足以附衆武足以勝敵而可使之出将入相也臣何以知其然耶臣竊聞金人退師之時朝廷大臣有許其割三關租税之約以秋半為期當時可從従之不可則知其至期無報必為我患盍預起天下精兵以機而覆滅之不爾亦盍預為之防也反怡怡自如恬不為慮朝夕敷奏講論不過互相詆毁争權怙勢辯詩賦經義之得失較王氏元祐之學術設春秋之科崇講讀之職此皆太平之事非國家之急務當時孰若思患預防運籌决䇿掃蕩邉塵以振國威則無今日之禍矣逮其秋髙馬肥金人復入乃始為備則不若用智於未奔沉之先臣即此知朝廷将相智不足以决疑眀不足以燭理徒能脂韋茍簡旅進旅退以保爵位可以為太平之臣不知當務之為急也洎其變起不識所謂絺章繪句者可施於此耶髙談虚無者能畫安邊之䇿耶學春秋侍讀者肯奮身而死國家之難耶臣知其必無有也臣願陛下以徳宗得人為戒以昭宗失人為鑑知其所以亂則我斯治矣知其所以危則我斯安矣知其所以亡則我斯存矣陛下過此以往若能常以勵兵討賊為念無忘今日之恥無蹈覆車之轍捜羅俊彦延納虎臣兢兢業業無敢荒寜則天下豪傑皆為我用将相豈難其人哉十歩之内必有茂草十室之邑必有忠信舉之不以次将相之才岀矣故伊尹耕于有莘商湯聘之以為友太公釣扵渭水文王立之以為師漢用韓信而舉軍驚笑蜀用魏延而羣臣觖望陛下特求之未切爾禮之未厚耳無謂天下無其人也脱或今日朝廷之上有曹參蕭何陳平周勃王陵軰圖治扵内有韓信張良周亞夫樊噲陸賈軰振威扵外則敵人聞風而逺遁朝廷安枕而無虞陛下可無北顧之憂矣雖然萬一得人如漢之盛臣又恐陛下未能若髙祖之用三傑也臣觀謫李綱於散籍遣聶昌扵北庭則知陛下知求将相而不知所以用之之術矣此臣願陳者二也臣又聞得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣所謂道者何孫武謂人和謂道是也孟子亦曰天時不如地利地利不如人和黄石公亦曰得道者昌失道者亡臣觀湯以亳武王以鄗皆百里為一諸侯為臣通達之屬莫不服從者得道故也况方今天下之大四海之逺生齒之衆反為金人踐蹂侵侮不能頓刼者臣原其所自来矣盖失夫人和之道無多助之至故也何以驗之臣聞王師之岀三軍多不同心而敵人反能死敵先鋒一挫則後殿解散而不前故所戰多不克所攻多不破使其同心協力犯難忘身悉效敵人之死敵則彼未必敢深入也雖然三軍之不同心者失人和也人和所以失者不能眀賞罰也臣願陛下王師凱旋之日有功當封者亟封之有勞當賞者厚賞之仍扵将帥之中摘其尤㧞其穎者倣唐之制為凌煙閣命畫史圖形扵其上第其功之髙下而次之又命詞臣賛美之仍乞陛下親灑宸翰重加襃美恩澤其子弟旌表其門閭使光耀於世以為榮觀如是則羣臣皆知陛下眀斷有功者見知而説而又不吝爵賞以酬勲績異時或有驅䇿則人人思竭節以報矣臣愚又欲乞陛下専委監司郡守多方計會金榖於所部州縣出厚賞廣募强勇果敢之人以足軍數預備不虞緝脩屯營以安其居處出給衣糧以禦其饑寒修車馬偹器械訓練於無事之時以防倉卒之變盖諸路屯軍名存實亡較之祖宗之朝十無四五今又起而禦戎州縣為之一空使宇内廓清遣歸所属則死亡散徙又不知數矣臣故願陛下以招軍為先務況所有禁軍原係保護王室為敵所敗其數亦差減若不速募精兵以補所闕則臣恐鄰國得以窺其隙矣臣愚又欲乞陛下掃蕩之後遣良将於西北之鄙控扼敵人喉衿倣唐舊制開軍府以捍衝要因隙地而置營田或易民田而為之復募其土着之民强勇有力者使之屯聚携子孫而家焉析其田而耕之每屯募兵百人與田五十頃又給粟食以為耕種之資所収之粟悉令與之仍不輟其每月度支錢毎屯以一右職掌之因農隙而使之講武則人無不奮力矣與其蹈蹂於敵人之足孰若與吾民為耕食之地敵人知其為農而不知其為兵知其能耕而不知其能戰則茍有變起屯田之兵必能家自為戰人自為敵以䕶其營田而力加强悍矣又乞依法屯兵以為邊備則敵人必不能入寇也此臣所願陳者三也臣又聞馬者兵之强而國之富監牧所以蕃馬也唐之初起得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右初用太僕少卿張萬嵗領羣牧自貞觀至麟徳四十年間馬七十萬六千置八坊八坊之田千二百三十頃募民耕之以給芻秣時天下以一縑易一馬議者謂漢唐以来唐馬最盛天子又鋭志武事遂弱北蕃臣聞祖宗之朝亦扵秦鳳諸處置坊以市馬其蓄養之法撫御之方亦盡善矣其後蔡京柄政玩弄綱紀徒崇尚安濟居養之虚名而罷廢招軍買馬之急務蠧耗國用慮不能給反以市馬之貨而易珍寳玩好之物故承平既久士不知戰馬不堪用一旦邊隙創開無以支梧中國素號甲兵之盛反不能及敵人鐡騎之勇其禍實原扵蔡京三尺孺子知京之名者亦切齒怨之雖梟首暴骨以謝天下滅族削跡以快人意猶恐其不足也臣愚欲乞廓清宇内安撫黎元即下詔委河北河東監司選擇近西北鄙田野平夷可以興作牧養之地遵唐舊制創為八坊每坊以右職兩貟為監牧於鄰近運漕茶貨収歛鹽酒課利以充市馬之資仰監牧官多方捜買西北良馬以多為貴盖馬生其地則習山川之險阻而可用仍乞重立賞罰不許受人私託買馬應馬纔入境即委守邊吏具數申樞宻院又令諸坊季終申奏所買到馬數復以邊吏所申之數驗之則知其馬不耗散於人間矣或監牧受權貴之私以駑駘之馬而易之則許人陳首又於其坊左右前後以官田易民田二百頃為芻秣之地又依府兵之制寓兵於農而募民耕之如是則馬盛而兵不乏矣或民苦官田逺而不願售者給時價償之無奪民田也仍乞以此意諭於民曰國家以所廢田而養馬非奪民食也特欲捍侵侮之虞安社稷之計使汝等全生樂業無擾攘之患耳則民心忻然而從無復嗟怨矣監牧官嵗令一換使無怠心賞遇之禮優於他職功勤既著蕃蓄有加則别議旌酬如是則臣将見馬盛於唐西北之勢無患乎不弱也此臣所願陳者四也臣又聞唐太宗斬張藴古既而大悔因詔死刑雖令即決皆三覆奏久之謂羣臣曰死者不可復生決囚雖三覆奏而頃刻之間何暇思慮自今宜二日五覆奏決日尚食勿進酒肉教坊太常輟教習諸州死罪三覆奏其日亦蔬食務合禮徹樂减膳之意臣以是知司獄者生民性命之所係常刑雖不可廢恐弛民之禁而致亂然刑期于無刑則用刑者亦冝以寛平為尚涖獄者亦當以鑑察為先雖罪至扵死尚當重審覆奏而慮其有失矧夫搆䧟非辜而必寘之死則天氣不和地氣欝結眀為人非幽致神怒毒流天下貽禍邦家矣臣竊見比年涖獄之官贓汚不廉受人之私而誣殺良民者不可勝數姦胥猾吏従而挟勢肆為蠆毒者又紛如也或受賂而欲脱死囚則嚴拷連累之人而承之洎其奏成飲以毒藥者有之或犯强盜偽印之𩔖獄吏即解衣衣之推食食之教其牽執富民固有訟一事而羅織數百人入獄者有之或挟仇讐而遭鞭笞者有之或恃酒肆狠而暴虐者有之或為人䧟穽吏復賂而擠之者有之故一富人入獄則獄吏所得多者數百千少者亦不下四五十千富者重囚反輕貧者輕囚反重其或詞人才士身在貧羸不幸罹於憲網藉手無金難以求活則雖挟伊管之術懐儀秦之辯亦無以伸其喙不過坐待其斃而已嗚呼天下司獄易地皆然聴訟者本以理民之寃為人搆禍反受困辱抽腸擺舌於呻吟之間不至於死者幸免而已昔漢文帝専務以徳化民海内豐富興扵禮義斷獄數百㡬致刑措史稱其仁唐太宗以寛仁治天下而於刑法尤慎四年天下斷死罪二十九人六年親録囚徒閔死罪三百九十人縱之還家期以眀年秋即刑及期囚皆詣朝堂無後者太宗嘉其誠信悉原之臣以是知王政本於仁恩所以愛民厚俗而使徳澤流於無窮也今之獄吏暴虐太甚一月之間死者十數而未止比年以来東南獄死者不知其㡬千人也父子兄弟生致離散悉歸怨於國家以謂不能選賢涖官故罹此禍夫天視自我民視天聴自我民聴今日之難豈不原於怨氣所致歟臣愚欲乞陛下嚴降詔㫖革絶此弊專委憲使痛懲獄吏應州縣涖獄之官有受贓枉法而陷殺良民者並乞處斬應獄吏挟私而陰殺人或受贓一錢以上者亦乞處斬民受其屈而憲使不為按察者許實封投状于觀察使仰附遞以聞盖自古致治之君以徳化而誘民以刑法而䋲吏然後能収威柄而立治功况今衰亂之後姦生詐起其風滋甚若非嚴刑峻法以懲獄吏則其弊未易頓革臣觀陛下詔㫖則視民如傷惟恐其失所獄吏之弊想未知耳伏願陛下俯察臣言惻然矜憫大加恵愛速與革絶庶使無辜之民不死扵獄卒之手則天下幸甚臣觀唐𤣥宗即位勵精政事常自選太守縣令告戒以言而良吏布州縣民獲安樂二十年間號稱治平衣食富足人罕犯法是嵗刑部所斷天下死罪五十八人臣以此知獄吏所以誣殺良民者守令姦贓不能奉行君上之詔令也守令所以然者吏部受賂多以庸猥之人而為之故也然則欲革其害實在陛下若能效𤣥宗親選守令以布州縣則民不罹此苦矣故曰百姓有過在予一人一人有慶兆民賴之此臣所願陳者五也臣又聞唐太宗覧眀堂針灸圖見人之五臓近背針灸失所則其害致死歎曰夫箠者五刑之輕死者人之所重安得犯至輕之刑而或致死遂詔罪人無得鞭背臣以是知眀君賢主以仁化天下作為刑書者俾民知所避而已不幸而犯扵此則無可奈何又豈切切然擠民於死地㢤今天下有犯至輕之刑而不免於死者多矣試舉其一二陛下當以生靈為念因𩔖而推則天下之幸也臣竊見天下租税不均富者以兼并而致豪横貧者以匱乏而受困苦皆縁蔡京在朝科率無度而州縣之官又復因此而斂財扵已故庶民傾囊倒廪不足以充官府之斂乂復减價而鬻産甚至歛穫纔畢執契行貸富者掉臂而不顧逮其為人督債又復減租稅而求售固有買一頃之田不能承二十畝之稅者以是富者愈富貧者愈貧故産去稅存者官租無由而贍有訴于官乞為退割則吏復受賂不為施行縦或退割未㡬又為富民計議暗退還之洎其二稅不輸官吏催捕私為囚獄刼其衣食茍不如欲則羈係縲紲艱苦萬状或時丁溽暑囚被腥孽寖以成疾扵是死者相枕不可以數計皆臣目擊之也有司雖知而恬不憫察憲曺雖或行空文覺察而終不能去其害嗚呼此乃産去稅存而致然也初未甞有犯扵國憲也臣愚欲乞陛下選差臺諌之臣毎路遣一人廵歴州縣暫借僧寺為均稅司許百姓陳訴産去稅存者悉為均攤得産戸或有薄産而税多者亦有量坐外餘者均之及天下富民多寄稅於有官之家以免差役亦乞立限許自陳歸正限外不自陳而為人告首者除充賞外並沒入官應有官之家以品數量坐外餘者並同編户法又臣前書所論營運錢亦乞委均稅司召集人戸依實指證重為推排如後有科需仰自推排籍日為始庶㡬民無怨苦之聲或吏受賂而均稅不當者亦許人陳訴仍均稅之後有過割税租者要到官親入認状庶免暗坐之弊如是則租稅均而輸納易無辜而被囚者無有矣臣又甞忿天下之民為螻蟻之寇鼠竊狗盜即妄訴于官以為强刼或失火而焫其廬舍則挟仇敵而訟人以為放火有司不復體察即行根捉廵捕官希覬爵賞不究虚實擒捕無辜囚于狴犴又委獄吏痛加鞭笞勒其必承㳂是而死于獄者多矣或以案成慮有後言貪其賞而飲毒以殺者有之或不與之食而餓死者有之故州縣廵捕之官殺良民而取爵禄者恬不知恥至有監司郡守因民陳訴而發摘者又受廵捕官賄賂而罷議此亦臣親覩之也臣愚欲乞陛下督責憲使常切覺察廵捕官復循前軌殺良民妄冐功賞者即與先斬後奏盖今日之弊當以嚴致平而不可以寛守之也臣所論二事皆民間屈抑之大者雖斬妄冒之人首領未足以償天下之憤安有仁君在上而肯殺無辜之民耶堯舜禹湯忍為此耶羣臣知此而不告則不識待陛下作何主耶此臣所願陳者六也臣又聞漢髙祖初定天下躬神武之材行寛仁之政總攬英雄以誅秦項任蕭曹之文用良平之謀聘陸酈之辯眀叔孫通之儀文武相配兼収並蓄所以長有社稷也臣竊聞比者朝廷得爪牙之将領熊羆之士掃蕩邊塵㨗音屢報于天閽臣於是喜而不寐然臣伏願陛下眀鍳髙祖之用人使文武相配共圖治功則萬世永頼臣愚欲乞國家優扵武學廣収虎臣其法與太學等無似上皇時徒為文備不求實效伏乞陛下眀詔諸路有知兵書習武藝善謀斷籌畫通達古今縱横辯論者並許自陳所屬發遣詣武學補試仍乞立法各因其長而収之無拘一律也又乞依三舍之法而升黜之月書季考擢其才能者而官之臣将見號飛将軍而稱智囊者多多益辦矣臣又聞以蝸蚓之餌而垂海者不足以得吞舟之魚則道足以挺儒林徳足以拔流俗廣聞强記而恥為章句儒雄材大畧而不就科目選者有之臣愚又欲乞國家設徳望科仰諸路有鄉閭孝友信義廉恥通經史有智謀者許縣薦之州州試其所通之學而薦于省毎三年令一州舉一人仍乞重立法禁絶權貴交結私舉之弊無以頃時舉八行之人有廬墓而生子者亦有不従父母之命者如是則徒以徳望之科為仕路㨗徑而人材無益扵國家其有州縣所薦至之人伏乞陛下親䇿于庭問以古今考以時務試以才斷有卓然不羣者抜而用之則有徳有行多聞廣見者藹然出矣臣又竊觀豪傑之士亦多結髪僧俗忍饑讀書若九經庫若五總龜十吏泚筆而待千言占口而成者有之然不羈之才髙世之俊非以大科不足以搜羅天下英賢臣又欲乞依祖宗舊法設賢良方正科許有官君子及布衣之士同試其黜陟自有成法陛下但舉而行之臣将見豪傑之士于于然而来矣臣又甞議詩賦經義二者皆有弊彫相夸組繪相侈茍以誇世而取寵不適扵實用者詩賦之弊也幼童而守一經白首而後能言説堯典二字而有十餘萬言荒唐虚無不務根本者經義之弊也以臣觀今日文章之弊而不足以得人則孰若去經義而取詩賦盖自舍法之行學者専守一經而不該古今務為黄老之虚詞不究經史之實録至於歴世興亡治亂例以為祭終之芻狗雨後之土龍而畧不經意其所以釣爵位而取榮耀者不過盗竊古人緒餘置齒牙間操數寸之管書盈尺之紙較一日之長以歆艷有司耳目而已故平昔無經笥之譽一日有瓦注之巧者紛如也問之以前世興亡則茫然失措而面頸發赤甚至身處班列而朝廷舊章不能知者盖彼其所藴既不厚則發為文章必不汪博所識既不廣則處之事變必無持操故自革科以来朝廷大臣抗節不回忠言謇謇赫然與秋霜烈日争嚴者㡬希詞學兼茂使後進仰之猶泰山北斗者㡬希奮不顧身肯死國難者㡬希沾沾小人奴顔婢膝炙手權門以求速達者滿眼皆是自去年春金人入寇朝廷之上肯奮身而與國同難者惟李綱聶昌兩人而已其次范訥軰而已至扵耿南仲吴敏李邦彦之流徒能敗我國事智謀何足取㢤比者金兵再起聖詔懇切捜求忠義臣以布韋之賤不食國家寸禄尚能懐忠感憤欲効柏耆乞天子一節持入北庭掉舌下之願殺身以安社稷惜㢤州府未能發奏故使臣忠義之氣無由一吐至於以經義取髙第而享爵禄者反視國家之難如越人視秦人肥瘠而不加喜戚於其中甚者差以運漕尚且畏憚而不前規規為全身計況肯當鋒鏑以立忠誼耶臣以是知敵騎縦横而未能風驅電掃者雖本於脂韋軰不足以立大事抑亦經義科非所以得豪傑之才故也臣觀祖宗朝以詩賦而取士則士無一經之専貫綜墳典諸子百家之言靡不周覧往古之存亡用兵之得失行事之成敗雖夢寐亦能記録況其醖藉瑰偉則英風鋭氣無施不可故鎮撫國家則有司馬光寇準丁謂韓琦軰肅清邊境則有王韶鍾傳舒亶种諤軰決䇿運謀則范仲淹章惇富弼吕恵卿之流是也抗章直諌則唐介包拯董敦逸鄒浩之流是也歐陽修及宋郊兄弟則功業之外職扵修史者也楊億王安石父子則政事之餘長於經術者也石曼卿梅堯臣之徒則詩髙于天下黄庭堅蘇軾則文冠于古今得人之盛未易縷數然其間文足以拔英躔而驚翰苑武足以奉王命而挫敵威持鯁諤之節而敢言奮忠直之志而犯難章章不可掩者亦不下數百軰求其所以致之者特詩賦之科而已盖學詩賦者可以兼經義而得之至其専於經義則其所學必不廣矣今之學者必曰我能窮理盡性觀祖宗時文章理何甞而不窮性何甞而不盡況此特可為畫餅之虚名而不可以為經邦之實用則二者優劣較然眀矣臣竊聞朝臣有好為虚無之言者曰唐以詩賦取士而眀皇幸蜀者何也臣以是知其特欲眀一己之私見而外天下之公議不過争權怙勢互相詆毁不為社稷計也殊不知眀皇再清内難開元之初㡬致太平海内富庶四夷咸賓浸滛貞觀之風者盖以詩賦而得人耳迨其志欲既滿侈心乃生忠臣浸踈讒䛕並進溺扵逰燕耽於酒色以李林甫楊國忠為輔佐以安禄山哥舒翰為爪牙病生扵心腹而不知禍起於蕭墻而㒺覺一旦豺狼為患尚且心醉宜乎有播遷之難然則眀皇幸蜀者乃以其不能用剛正之人而近讒䛕之賊故罹此禍豈詩賦之罪㢤臣知為此語者特腐儒不通變耳特背公而營私耳臣愚欲乞陛下速降詔㫖革經義科許天下之士習詩賦以應選仍所問之䇿禁絶虚無惟求古今成敗可以為後世鑑者及通扵時務而有謀斷者則臣将見得人之盛又復如祖宗之朝而致治之美髙邁於熈寜之初矣陛下若能奮發睿斷用臣之䇿則武學足以得虎臣徳望足以捜遺逸制科設而不世之才出矣經義革而博學之士至矣朝廷乏人臣未之信也陛下今日縱為權臣詆毁而不用其䇿然他時經義不足以得偉才亦未免用臣計也與其追用於己事孰若决行於未然幸願陛下裁之然科舉之法又有大不公者臣亦為陛下縷陳之盖比年科舉多為富兒貴族扵詔㫖未下之日預以金帛交結出身之官又復賂監司必差此官以赴本州考試固有得問目宗㫖以歸募文士而預為之者有得成篇以歸俟入塲而寫之者有得一古字三塲通用為㸃記者有與主文故舊以平昔所講之題而問之者有主文受其賂自蘄決得復賂才能之人而成其文庶使不辱於選者甚至考官之来有求見於道周旅邸者有受燕于舉子之家者有携侠客而来陰求賄賂者其所差封彌謄録之人又多受豪强之賂預録才能之士姓名與之慮其軋已於封彌處陰為之記或復尋而焫者有之或投於井者有之或節其文詞使讀之無叙者有之封彌謄録官又徒備貟而不覺察故空號禮闈之嚴有司以歌酒自適殊不以考較為慮洎其及期則除私取之外不過収拾文理合己意者足其額而已故前期十日而其名已達扵外者有之臣甞求中程試之文而讀之其間未必皆無病也或昧於古今而以漢為唐者或不通經㫖而誤引證者或全録前軰時文者或使故事而誤其姓名者或以神祖而為祖考者綴緝不根之語而不荅所問者色色有之致有士人指考官受賂之汚擿舉子謬中之失而訟于有司則上下互相掩覆不為體究故與其選者人不以為榮或素不知經而識字有數者有之或能誦時文而不知經史者有之或塵垢齷齪而言語無味者有之或屠沽博奕軰而誤墨成蠅者有之此皆縁賄賂不公考較無術故也嗚呼祖宗科舉之法本欲網羅俊彦其弊至此不識得若軰可與圖治耶至於孤寒之士棲遲乎道藝之域休息乎編籍之囿博覧强記好古有素談經可以重席下筆㡬扵有神者反以空囊敗槖無為先容遂爾擯斥者紛紛藉藉甚至有知其必不與選不能與羣軰較短量長扵是遁職髙卧而不就試者有之此非科舉之法不公也有司受賂之弊也亦以經義多荒唐之語而能為空文者一人而兼數人故也故凡士人将就試則預採時文膾炙人口者以經意分排門𩔖毎一門撰義數道俟其入塲即以所問之題而參合辭意相𩔖者依本謄録謂之迎題或預料有司所問之題而撰成全篇至有五篇皆偹畧不措意者況此革科以来每一義題兩學前後傳寫不啻數十篇者有之其辭意不岀乎此有識之士不欲襲蹈其迹或穿鑿而為曲説後進無識者或全録而不更一字有司亦不能悉究至於糊名一判則濫進者悉皆與榜信乎經義不足以得人也若選以詩賦則前弊皆可革盖詩賦不可預成縦可料題而為之亦不過得其事實而已其聲律逆順非敢茍也如是則彼方為已猶且不贍何暇及他人㢤臣愚欲乞陛下察臣所陳垂憫孤寒之士無負其稽古之勤嚴降詔㫖痛懲此弊應今後科舉有考試官受賂挟勢而私取人者許士人陳訴監司考覈得實者悉同受枉法贓坐罪仍禮闈取士一切法度乞行嚴察無襲前弊如是則孤寒者得以進身矣此臣所願陳者七也臣竊觀天下所以入於衰亂者皆縁冗食之民衆而無補之費多故國用乏而軍儲不給也臣愚欲乞陛下眀斷一切冗食而無補者悉行罷廢以充軍餽則養兵有糧而無餽乏之患矣臣竊見上皇為姦臣誤國壊亂綱紀漸次陵遲欲去前非尚賴陛下振而起之革而新之則功業昭著而規模宏逺矣若規規於仍舊貫而不能因革損益則天下何望於陛下上皇何急於禪位也盖上皇所以下罪己之詔而禪大寳於陛下者亦知其為姦臣誤謀法度隳廢無以支持誠欲陛下為振其頺綱而已或謂三年無改於父之道然後為孝者此乃儒臣不知權變之言也臣謂方今法度有不便於民不利於國者當一切更張之正孟子所謂如知其非義斯速已矣何待来年是也臣所謂冗食而無補者何也臣觀天下神霄宫實國之大蠧此亦蔡京王黼誘致姦黨共以妖術欺君㒺上故創此宫脩飾華麗所費不貲四時祭醮又蠧國用謂之知宫者不過挟勢欺民規財養婦飲酒茹葷不修身檢恃崇道之勢而動與士大夫為等伍肆為姦賍䧟於憲網者有之求其精䖍祝夀者蔑如也謂之冗食而無補信其然乎况天無二日民無二王天下之歸者本一也今立兩君於宫中者其意安在㢤此蔡京欲為王莽之篡故陰令林靈素以妖言化上皇而為之其意欲為分天下之䜟也又况天子所都者大梁四海九州莫不賓貢于此今遍滿中外州縣皆立王宫是亦蔡京欲兆各據有一方之䜟也祖宗之朝肯為此乎祖宗之臣肯勸勉君父而為此乎然則今日所以亂者未必不兆於此也臣願陛下速降詔㫖悉與罷去所有知宫道衆各令還原觀仍給還其宫與原住僧改正寺額所有儀像乞移扵玉皇殿配享此亦臣慮陛下不欲毁去恐傷父子之仁故也然上皇英斷能以理推今日之難如此欲安我二百年之社稷則豈冝以一己而妨天下之大計㢤此特土偶人耳毁之無傷乎上皇之盛徳而足以成陛下之大功則毁之亦無害也所有神霄宫田多者五十頃少者不下十頃所養之衆不過十數人而已況不能與國家之緩急徒使之斂財於己以為私計臣愚欲乞陛下悉委守令拘守其田立課召民承佃所納稅租及宫中見存養之糧悉充兵儲又籍没天下宫中供器亦可以為養軍之用實良䇿也臣又觀天下應僧寺多田者或至百頃而養僧不逾百貟者有之故凡諸路大禪刹多者為姦猾之僧賄賂監司郡守而求住持酣酒嗜肉而不為焚脩者有之營私剋財而不養僧衆者有之狂殢優倡而不脩戒行者有之故每住一刹則斂國家之常住以為親戚之私藏者比比皆是臣愚欲乞陛下詔諸路専委守令應律寺則契勘見存僧行數目禪刹則契勘逐年所養僧行數目並與量數支給口食田外餘者並没入官所有稅租即量坐之其田亦募民耕以所納租為軍儲與其為猾僧計會之餘則孰若為養兵供餽之費所有道觀亦乞依此法仍天下諸州國忌齋錢欲乞罷之國忌日令禪刹自偹齋食則計天下一嵗之所省亦不輕矣願陛下無猶豫也臣又聞禄者所以代其耕也方今有官君子養之既有常禄其所任之處又或有職田之俸君人者一視而同仁則均有之可也今又或有或無而不均或多或寡而不一臣為陛下今日計莫若下詔應有職田䖏悉皆罷支所納租米乞充軍儲陛下能用臣三計則倉廩實府庫充招軍雖衆無患乎乏糧矣此臣所願陳者八也臣又聞君以兼聴博照為徳臣以獻可替否為忠専己者孤拒諫者塞孤塞之政亡國之風是故立敢諌之鼓置誹謗之木開言者之路来天下之䇿此堯舜禹湯所以昌也比干剖心箕子為奴折直士之節結諌臣之舌此桀紂幽厲所以亡也臺諌雖卑實可與宰相等何則風霜之任彈糾不法發擿有過百僚震恐莫敢為非義者實有頼扵此盖御史䑓為朝廷之紀綱臺綱正則朝廷理朝廷理則天下理矣臣聞頃者蔡京専權懼人議己之失欲掩上皇之聴於是所舉擢而進者多其死黨阿䛕順㫖共成姦惡以茍容曲従為賢以拱黙尸禄為智諌官久虚而不除臺官取庸以充位故苛吏繇役民失農桑之時獄官深刻民受誣殺之辜守令奸賍殘民害民滋甚而朝廷大臣方且愚弄綱紀有同兒戯陰懐叛逆欲分天下而有之無肯為上皇言者浸滛日久遂致大亂幸賴祖宗之靈六賊奸計屢敗未至篡國而已嗚呼臣聞去年春金兵初起邉臣告急奏章累至蔡京父子匿而不達乃収拾金寳宻自為備在朝大臣亦皆作去計略無一分捍禦之意直至金兵漸逼乃始奏聞此臣得之扵陳東書也臣始讀之不覺掩卷浩歎國家何負於大臣乃爾耶疾風知勁草版蕩識誠臣豈虚言㢤既而忿氣拂膺恨不能仗劍悉剖諸大臣肝膽而食之未足以快臣心也臣亦知其所自来矣盖本於不能擢臺諌之臣使常言天下之得失故至此耳尋後竊聞陛下優選忠誼之士以任臺諌之職臣知黎民赤子之幸也扵是洗心傾耳以俟其言天下之大利害試以觀國家之得人想望風采為日久矣今得其言不過紛紜細碎未有大過人者又豈太平而全無可言耶抑亦持禄保位而不肯言耶畏罪謫而不敢言為權臣抑塞而不得言耶以謂太平而無可言則干戈正此紛揉蠻夷尚未賓従政事風俗浸已不振祖宗法度廢而未舉四海俱無歡聲萬民悉有變色天子未必皆善大臣豈能無過非可謂之太平也若欲保位持禄而不肯言則未得位者當修其辭既居其位者當死其官如其為身謀盍亦辭尊而居卑辭富而居貧乎豈可為一己之私而廢天下之大計耶若謂畏罪謫而不敢言則眀主不惡切直以博觀忠臣不避重誅以直諌折檻而呼願得從龍逄比干於地下逰者果何人哉身在諌職則白刄交扵前視死若生矣豈宜畏罪謫而緘口耶若謂權臣抑塞而不得言則有官守者不得其職則去有言責者不得其言則去置笏于地而求退者䏻使上斂容而謝者其誰歟言路既塞則髙飛逺舉為赤松逰可也不然則嬰逆鱗而干斧鉞之誅可也何苦畏權臣不敢直諌㢤臺諌之臣知此而不言則是負陛下也不識今日之所謂諫臣者果有面折廷諍如王陵者乎有守節死義如汲黯者乎有刎血汙車輪者歟有出行避驄馬者歟臣知其必無有也盖天下之士多能載於空言不能見於行事往往在布衣時則能忠言直諌雖犯主之顔色而不辭及其處之以諌諍之職則保位持禄殆有過於阿諛者矣嗚呼此軰何足算哉使臣見之當唾其面而大辱之臣願陛下優選直臣以任此職今朝廷之上謫籍之中布衣之列豈無其人耶陛下第眀鑑而博採之又乞立法應擢臺諫官雖宰相遴選陛下必親䇿于庭試以十事五事評往古之成敗于以觀其所學五事問權臣之得失于以審其敢言如是則可以得人矣若復以柔顔軟語妾婦相者為比則臣将見大臣擅權綱紀大壊又甚扵前日矣臣聞吕元膺出為同州刺史及中謝徳宗問其得失元膺論奏詞氣激切上嘉之謂宰相曰元膺有讜言直氣宜留在左右使言得失卿等以謂如何李藩裴垍賀曰陛下納諌超越百王乃宗社無疆之休請留元膺給事左右臣以是知徳宗所以䏻懲艾奉天之難而復治者盖能廣求諌諍之臣而已雖一人之直尚不遺棄必置之左右而不使外任臣愚欲乞陛下每用諌臣悉以古為法大臣朝見議政事臺諌官得随進與聞仍許臺官退而辯論可否以陳之或三月而不進諌者罷之又乞陛下親灑宸翰榜于朝堂昭告臺諌各宜以忠誼自立應天下之利害朝臣之善惡政令之僻違紀綱之當否敷陳彈奏不宜𨼆情庶使嵌巖遺逸之士知朝廷有従諌如流之美扵是戚戚然動其心峩峩然纓其冠而来㳺于闕下願進其謀謨以致君於堯舜納俗於成康矣此臣所願陳者九也臣又聞上言之以為命下禀之以為令故君命召不俟駕而行者皆欲其盡臣子之禮而無敢怠慢也嗚呼古之委身而為臣者雖遣之赴湯火冒矢石亦犯難而竭節況夫宣布詔令以告于民用心不勞而用力不多者其忍違上之命耶臣竊見比年以来州縣之官施為不法以受賂營私為良圖以奉詔䘏民為餘事朝夕所以念念不過燕逰而已酒色而已財帛而已為子孫計而已曷甞以理民為務㢤至扵國家頒詔本欲使天下士庶悉體聖意以布徳化奈何守令非人略不奉行者有之甚至其言微有被及扵州縣之官則匿而不示遂使天子徳意無由下達故人心携貳事罹艱苦又歸怨扵上盖頑民悍俗不知天子本有恤民之深意而守令不能奉行徒為殘賊耳欺君㒺上莫此為甚臣觀陛下即位以来寛大之詔屢下然州縣官吏前弊未革亦不過掛之屋壁徒為文具而已初未甞見其遵行也今夫周官正嵗帥治官之屬而觀治象之法狥于木鐸盖将以禁人則宜使之皆知不使之皆知及犯令而刑之則是㒺民矣然則先王號令必使家至而户曉之故曰鼔舞萬物者雷風乎鼓舞萬民者號令乎臣竊觀方今詔㫖之下則所知者惟官吏而已或詔下逾年而民未及見者何其風俗衰薄不足以望古耶此非國家之罪郡縣無良吏致然也臣又觀之抗勅命者多矣特上下相蔽而無肯發擿耳臣愚欲乞陛下痛責守令應詔書到日即頒于庭以示百姓仍存問緩急悉令於要閙之地書壁曉諭庶使有目有趾者皆得以仰觀聖詔之懇切而知天子有軫念之勤則人人思奮忠誼矣仍乞督責守令應朝廷有改常憲禁絶民害即令施行無致稽緩或尚循襲舊風有違御筆者即與除名勒停如是則詔㫖無患乎不宣布民情無由而不説服矣此臣所願陳者十也臣所進三書條陳當世利害三十餘事實為切要然其間觸權臣者有之忤天聴者有之或結怨扵富貴之門或貽怒于臺諌之官臣非不知李雲以草茅之士露布上書遂至誅死臣區區不避於此而敢抗直言者實願以身而安天下也臣初則欲乞朝廷以一介之使遣臣奉咫尺之書説金主而使之内附臣當時若有此行亦必烹扵鼎鑊既而此志不遂而猶敢以三書干瀆宸聰者臣知天下大利害皆備載于此而無少遺使其言得達于陛下而萬民受賜則臣雖死于朝不辭也臣願陛下眀斷必用臣計則非徒朝廷安天下之民舉安萬一權臣嫉怨指臣為狂生則乞陛下集朝臣而問之或臨御樓呼行道之人問之召京城耆老而問之必謂臣之計為可行而大臣之言為忌進也昔蘇世長進諌至切唐髙祖色變既而笑曰狂態發耶世長曰為臣私計則狂為國計則忠臣今日亦請以此語為陛下獻陛下用臣之計而賜臣以死則臣死有光輝含笑入地無恨也若不用臣之計而免其罪則臣非所願盖臣以寡援之身必死於他人之手矣史有之曰千人之諾諾不如一士之諤諤臣雖微賤能鯁峭而敢言朝廷有直臣則天下太平矣果辱陛下恕其狂妄則臣尚有骨鯁之言當進天聰豈不䏻裨補國家萬一惟陛下裁之歴代名臣奏議卷八十三
