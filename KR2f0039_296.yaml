body:
  text: 歴代名臣奏議卷二百九十六明楊士竒等撰灾祥東漢光武以二千石長吏多不勝任有纎微之過者必見斥罷交易紛擾百姓不寧六年有日食之異父城侯朱浮上䟽曰臣聞日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者五典紀國家之政鴻範别災異之文皆宣明天道以徵來事者也陛下哀愍海内新離禍毒保育生人使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黒白分明哉然以堯舜之盛猶加三考大漢之興亦累功効吏皆積乆養老於官至名子孫因為氏姓當時吏職何能悉理論議之徒豈不諠譁蓋以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相頋望無自安之心有司或因睚眦以騁私怨茍求長短求媚上意二千石及長吏廹於舉劾懼於譏刺故争飾詐偽以希虚譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壊如摧長乆之業而造速成之功非陛下之福也天下非一時之用也海内非一旦之功也願陛下逰意於經年之外望化於一世之後天下幸甚建武六年徴鄭興為太中大夫明年三月晦日食興因上䟽曰春秋以天反時為災地反物為妖人反德為亂亂則妖災生徃年以來讁咎連見意者執事頗有缺焉按春秋昭公十七年夏六月甲戍朔日有食之傳曰日過分而未至三辰有災於是百官降物君不舉避移時樂用鼔祝用幣史用辭今孟夏純乾用事隂氣未作其災尤重夫國無善政則讁見日月變咎之來不可不慎其要在因人之心擇人處位也堯知鯀不可用而用之者屈已之明因人之心也齊桓反政而相管仲晉文歸國而任郄縠者是不私其私擇人處位也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷欲用功臣功臣用則人位謬矣願陛下上思唐虞下覽齊晉以成屈已從衆之德以濟羣臣讓善之功夫日月交㑹數應在朔而次年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促迫故行疾也今年正月繁霜自爾以來率多寒日此亦急咎之罰天於賢聖之君猶慈父之於教子也丁寧申戒欲其反政故災變仍見此乃國之福也今陛下髙明而羣臣惶促宜留思柔剋之政垂意洪範之法博採廣謀納羣下之策書奏多有所納八年郡國大水杜林上䟽曰臣聞先王無曰道明聖用而治見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖畏其易也古今通道傳其法於有根狼子野心奔馬善驚成王深知其終卒之患故以殷氏六族分伯禽七族分康叔懐姓九宗分唐叔撿押其姦宄又遷其餘於成周舊地雜俗旦夕拘録所以挫其强御之力詘其驕恣之節也及漢初興上稽舊章合符重規徙齊諸田楚昭屈景燕趙韓魏之後以稍弱六國强宗邑里無管利之家野澤無兼并之民萬里之統海内賴安後輒因衰麤之痛脅以送終之義故遂相牽而陪園陵無反顧之心追即徃法政皆神道設教强幹弱枝本支百世之要也是皆以永享康寧之福無怵惕之憂繼嗣承業恭已而治蓋此助也其被災害民輕薄無累重者兩府遣吏䕶送饒穀之郡或懼死亡卒為傭賃亦所以消散其口救贍全其性命也昔魯隱有賢行將致國於桓公乃留連貪位不能早退況草創兵長卒無德能直以擾亂乘時檀權作威玊食狃猱之意徼幸之望曼延無足張歩之計是也小民負縣官不過身死負兵家滅門殄世陛下昭然獨見成敗之端或屬諸侯官府元元少得舉首仰視而尚遺脱二千石失制御之道合得復昌熾從横比年大雨水潦暴長涌泉盈溢災壤城郭官寺吏民廬舍潰從離處潰成坑坎臣聞水隂𩔖也易卦地上有水比言性不用害故曰樂也而猥相毁墊淪失常敗百姓安居殆隂下相為蠹賊有小大勝負不齊均不得其所侵陵之象也詩云畏天之威于時保之唯陛下留神明察徃來懼思天下幸甚明帝性褊察好以耳目隱發為明朝廷莫不悚慄爭為嚴切以避誅責㑹連有變異尚書僕射鍾離意上䟽曰伏惟陛下躬行孝道修明經術郊祀天地畏敬鬼神憂恤黎元勞心不怠而天氣未和日月不明水泉湧溢寒暑違節者咎在羣臣不能宣化理職而以苛刻為俗吏殺良人繼踵不絶百官無相親之心吏人無雍雍之志至於骨肉相殘毒害彌深感逆和氣以致天災百姓可以德勝難以力服先王要道民用和睦故能致天下和平災害不生禍亂不作鹿鳴之詩必言宴樂者以人神之心洽然後天氣和也願陛下垂聖德揆萬機詔有司慎人命緩刑罰順時氣以調隂陽垂之無極帝雖不能用然知其至誠亦以此故不得乆留出為魯相章帝即位徵馬嚴拜御史中丞其冬有日蝕之災嚴上封事曰臣聞日者衆陽之長食者隂侵之徴書曰無曠庶官天工人其代之言王者代天官人也故考績黜陟以明襃貶無功不黜則隂盛陵陽臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法不即垂頭塞耳採求財賂今益州刺史朱酺揚州刺史倪説涼州刺史尹業等毎行考事輙有物故又選舉不實曽無貶坐是使臣下得作威福也故事州部所舉上奏司直察能否以徵虚實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優㳺不案吏罪於是宰相習為常俗更共罔養以崇虚名或未曉其職便復遷徙誠非建官賦禄之意宜勅正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上德以寛服民其次莫如猛故火烈則人望而畏之水懦則人狎而翫之為政者寛以濟猛猛以濟寛如此綏御有體災眚消矣建初元年大旱榖貴帝召鮑昱問曰旱既太甚將何以消復災眚對曰臣聞聖人理國三年有成今陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事繫者千餘人恐未能盡當其罪先帝詔言大獄一起寃者過半又諸徙者骨肉離分孤䰟不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言時校書郎楊終亦上䟽曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違牾天心一人有罪延及三族髙祖平亂約法三章太宗至仁除去收孥萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明德被四表今以比年乆旱災疫未息躬自菲薄廣訪失得三代之隆無以加焉臣竊按春秋水旱之變皆應暴急恵不下流自永平以來仍連大獄有司窮考轉相牽引掠考寃濫家屬徙邉加以北征匈奴西開三十六國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懐土思怨結邉域傳曰安土重居謂之衆庶昔殷民近遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎且南方暑溼瘴毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元和帝永元四年丁鴻代袁安為司徒是時竇太后臨政竇憲兄弟各擅威權鴻因日食上封事曰臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乘君隂陵陽月滿不虧下驕盈也昔周室衰季皇甫之屬專權於外黨𩔖强盛侵奪主勢則日月薄食故詩曰十月之交朔日辛卯日有食之亦孔之醜春秋日食三十六弑君三十二變不空生各以𩔖應夫威柄不以放下利器不以假人覽觀徃古近察漢興傾危之禍靡不由之是以三桓專魯田氏擅齊六卿分晉諸呂握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其德不得行其埶也今大將軍雖欲勅身自約不敢僭差而天下逺近惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺勅不敢便去乆者至十數日背王室向私門此乃上威損下權盛也人道悖於下効驗見於天雖有隠謀神昭其情垂象見戒以告人君間者月滿先節過望不虧此臣驕溢背君專功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若勅政責躬杜漸防萌則凶妖銷滅害除福湊矣夫壊崖破巖之水源自㳙㳙干雲蔽日之木起於葱青禁微則易救末者難人莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依托權門傾覆諂䛕以求容媚者宜行一切之誅間者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海内貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧縱横宜因大變改政匡失以塞天意六年旱乆祈雨不應司空張奮上表曰比年不登人用飢匱今復乆旱秋稼未立陽氣垂盡歲月廹促夫國以民為本以穀為命政之急務憂之重者也臣䝉恩尤深受職過任夙夜憂懼章奏不能叙心願對中常侍䟽奏即時引見復口陳時政之宜明日帝召太尉司徒幸洛陽獄録囚徒收洛陽令陳歆即大雨三日和帝時策問隂陽不和或水或旱方正鬰林養奮對曰天有隂陽隂陽有四時四時有政令春夏則予恵布施寛仁秋冬則剛猛盛威行刑賞罰殺生各應其時則隂陽和四時調風雨時五穀升今則不然長吏多不奉行時令為政舉事干逆天氣上不卹下下不忠上百姓困乏而不卹哀衆怨鬱積故隂陽不和風雨不時災害縁𩔖水者隂盛小人居位依公營私䜛言誦上雨漫溢者五穀有不升而賦税不為減百姓虚竭家有愁心也安帝永初初連年水旱災異郡國多被飢困尚書郎樊準上䟽曰臣聞傳曰飢而不損兹曰泰厥災水春秋穀梁傳曰五穀不登謂之大侵大侵之禮備而不製羣臣禱而不祠由是言之調和隂陽實在節儉朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則今可先令太官尚方考功上林池籞諸官實減無事之物五府調省中都官吏京師作者如此則化及四方人勞省息伏見被災之郡百姓凋殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事遣使持節慰安尤困乏者徙置荆揚熟郡既省轉運之費且令百姓各安其所今雖有西屯之役冝先東州之急如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也願以臣言下公卿平議元初六年司空李郃上書曰陛下祇畏天威懼天變克已責躬博訪羣下咎皆在臣力小任重招致咎徵去二月京師地震今月戊午日蝕夫至尊莫過乎天天之變莫大乎日蝕地之戒莫重乎震動今一歲之中大異兩見日蝕之變既為尤深地動之戒揺宫最醜日者陽精君之象也戊者土主任在中宫午者火德漢之所承地道安静法當順陽今乃專恣揺動宫闕禍在蕭牆之内臣恐宫中必有隂謀其陽下圖其上造為逆也災變終不虚生推原二異日辰行度甚為較明譬猶指掌宜察宫闕之内如有所疑急摧破其謀無令得成修政恐懼以荅天意十月辛卯日有蝕之周家所忌乃為亡徵是時妃后用事七子朝令戊午之災近相似𩔖宜貶退諸后兄弟羣從内外之寵求賢良徵逸士下德令施恩恵澤及山海上深納其言延光元年河西大雨雹大者如斗詔有道術之士極陳變眚帝召孔季彦親問其故對曰此皆隂乘陽之徴也今貴臣擅權母后黨盛陛下宜修聖德慮此二者帝黙然左右皆惡之四年馬融上書曰伏讀詔書陛下深惟禹湯罪已之義歸咎自責寅畏天戒詳延百僚博問公卿知變所自審得厥故修復徃術以荅天命臣子逺近莫不延頸企踵茍有隙空一介之知事願自效貢納聖聽臣伏見日蝕之占自昔典籍十月之交春秋傳記漢注所載史官占候羣臣密對陛下所觀覽左右所諷誦可謂詳悉備矣雖復廣問限在前志無以復加乃者茀氣干參臣前得敦朴之人後三年二月對策北宫端門以為參者西方之位其於分野并州是也殆謂西戎北狄其後種羌叛戾鳥桓犯上郡并涼動兵驗略效今復見大異申誡重諱於此二城海内莫見三月一日合辰在婁婁又西方之宿衆占顯明者羌及烏桓有悔過之辭將吏策勲之名臣恐受任典牧者茍脱目前皆粗圖身一時之權不顧為國百世之利論者美近功忽其逺則各相不大疢病伏惟天象不虚老子曰圖難於其易也為大於其細也消災復異宜在於今日詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰安民三曰從時臣融伏惟方今有道之世漢典設張侯甸采衛司民之吏案繩循墨雖有殿㝡所差無㡬其陷罪辟身自取禍百姓未被其大傷至邉郡牧御失和吉之與凶敗之與成優劣相懸不誡不可審擇其人上以應天變下以安民𨽻竊見列將子孫生長京師食仰租奉不知稼穡之艱又希遭阨困故能果毅輕財施與不弱以獲死生之用此其所長也不拘法禁奢泰無度功勞足以宣威踰濫足以傷化此其所短也州郡之士出自貧苦長於檢押雖專賞罰不敢越溢此其所長也拘文守法遭遇非常狐疑無斷畏首畏尾威恩纎薄外内離心士卒不附此其所短也必得將兼有二長之才無二短之累參以吏事任以兵法有此數姿然後能折衝厭難致其功實轉災為福孔子曰十室之邑必有忠信如丘者焉以天下之大四海之衆云無若人臣以為誣矣宜特選詳譽審得其真鎮守二方以應用良擇人之義以塞大異也安帝嘗數遣黄門常侍及中使伯榮徃來甘陵伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動尚書僕射陳忠上䟽曰臣聞位非其人則庶事不叙庶事不叙則政有得失政有得失則感動隂陽妖變為應陛下毎引災自厚不責臣司臣司狃恩莫以為負故天心未得隔并屢臻青冀之域滛雨漏河徐岱之濵海水盆溢兖豫蝗蝝滋生荆揚稻收儉薄并涼二州羌戎叛戾加以百姓不足府帑虚匱自西徂東杼柚將空臣聞洪範五事一曰貌貌以㳟㳟作肅貌傷則狂而致常雨春秋大水皆以君上威儀不穆臨蒞不嚴臣下輕慢貴倖擅權隂氣盛彊陽不能禁故為滛雨陛下以不得親奉孝德皇園廟比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下儀體上僭侔於人主長吏惶怖譴責或邪諂自媚發人修道繕理亭傳多設儲峙徵役無度老弱相隨動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河間託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下不問必以陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水灾之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌譛崇之詐公卿大臣得無朱博阿傅之援外屬近戚得無王鳯害商之謀若國政一由帝命王事每决於已則下不得偪上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省中常侍樊豐侍中謝惲等詐作詔書調發司農錢穀大匠見徒材木各起家舍園池廬觀役費無數太尉楊震因地震上䟽曰臣䝉恩備台輔不能奉宣政化調和隂陽去年十一月京師地動臣聞師言地者隂精當安静承陽而今動揺者隂道盛也其日戊辰三者皆土位在中宫此中臣近官盛於持權用事之象也臣伏惟陛下以邉境未寧躬自菲薄宫殿垣屋傾倚支柱而已無所興造欲令逺近咸知政化之清流商邑之翼翼也而親近倖臣未崇斷金驕溢踰法多請徒士盛修第舎賣弄威福道路諠譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徵也書曰僭恒暘若臣無作威作福玊食惟陛下奮乾剛之德棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福乆移於下延光四年冬京都大疫明年太史令張衡上封事曰臣竊見京師為害兼所及民多病死死有滅户人人恐懼朝廷燋心以為至憂臣官在於考變禳灾思任防救未知所由夙夜征營臣聞國之大事在祀祀莫大於郊天奉祖方今道路流言僉曰孝安皇帝南廵路崩從駕左右行慝之臣欲徵諸國王子故不發䘮衣車還宫偽遣大臣並禱請命臣處外官不知其審然尊靈見罔豈能無怨且凡來私小有不蠲猶為譴謫況以大穢用禮郊廟孔子曰曽謂泰山不如林放乎天地明察降禍見灾乃其理也又問者有司正以冬至之後奏開恭陵神道陛下至孝不忍距逆或發塚移尸月令仲冬土事無作慎無發蓋及起大衆以固而閉地氣上泄是謂發天地之房諸蟄則死民必疾疫又隨以䘮厲氣未息恐其殆此二年欲使知過改悔五行傳曰六疹作見若時共禦帝用不差神則不怒萬福乃降用章于下臣愚以為可使公卿處議所以陳術改過取媚神祇自求多福也順帝陽嘉二年冇地動山崩火灾之異公卿舉李固對策詔又特問當世之敝為政所宜固對曰臣聞王者父天母地寶有山川王道得則隂陽和穆政化乖則崩震為灾斯皆關之天心效於成事者也夫化以職成官由能理古之進者有德有命今之進者唯財與力伏聞詔書務求寛博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寛和無黨援者輒見斥逐是以淳厚之風不宣彫薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母因造妖㜸使樊豐之徒乘權放恣侵奪主威改亂嫡嗣至今聖躬狼狽親遇其艱既㧞自困殆龍興即位天下喁喁屬望風政積敝之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏從山草痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘貴爵之寵然上畏天威俯案經典知義不可故不封也今之阿母雖有大功勤謹之德但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虚必有遜讓陛下宜許其辭國之髙使成萬安之福夫后妃之家所以少完全者豈天性當然但以爵位尊顯專總權柄天道惡盈不知自損故至㒹仆先帝寵遇閻氏位號太疾故其受禍曽不旋時老子曰其進鋭者其退速也今梁氏戚為椒房禮所不臣尊以髙爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝㢘者以其秉威權容請託故也而中常侍在日月之側聲埶振天下子弟禄任曽無限極雖外託謙黙不干州郡而諂偽之徒望風振舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門侯羊廸等無他功德初拜便真此雖小失而漸壊舊章先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也今陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海權尊埶重責之所歸若不平心灾眚必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊此言動之於内應之於外者也由此言之本朝號令豈可蹉跌間隙一開則邪人動心利競暫啓則仁義道塞刑罰不能復禁化導以之寖壊此天下之紀綱當今之急務陛下宜開石室陳圖書招㑹羣儒引問失得指擿變象以求天意其言有中理即時施行顯㧞其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冒昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死順帝以災異公車徵郎顗顗乃詣闕拜章曰臣聞天垂妖象地見災符所以譴告人主責躬修德使正機平衡流化興政也易内傳曰凡災異所生各以其政變之則除消之亦除伏惟陛下躬日昃之聽温三省之勤思過念咎務消祇悔方今時俗奢佚淺恩薄義夫救奢必於儉約拯薄無若敦厚安上理人莫善於禮修禮遵約蓋惟上興革文變薄事不在下故周南之德關雎政本本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼓籥以虚為德自近及逺者也伏見徃年以來園陵數灾炎光熾猛驚動神靈易天人應曰君子不思遵利兹謂無澤厥災孽火燒其宫又曰君髙臺府犯隂侵陽厥災火又曰上不儉下不節炎火並作燒君室自頃繕理西苑修復太學宮殿官府多所搆飾昔盤庚遷殷去奢即儉夏后卑室盡力致美又魯人為長府閔子曰仍舊貫何必改作臣愚以為諸所繕修事可省減禀卹貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉土者地祗隂性沈静宜以施化之時敬而勿擾竊見正月以來隂闇連日易内傅曰乆隂不雨亂氣也䝉之比也䝉者君臣上下相冒亂也又曰欲德不用厥異常隂夫賢者化之本雲者雨之具也得賢而不用猶乆隂而不雨也又頃前數日寒過其節冰既解釋還復凝合夫寒徃則暑來暑徃則寒來此言日月相推寒暑相避以成物也今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛侯參察衆政以為立夏之後當有震裂涌水之害又比熒惑失度盈縮徃來渉歴輿鬼環繞軒轅火精南方夏之政也政有失禮不從夏令則熒惑失行正月三日至乎九日三公卦三公上應台階下同元首政失其道則寒隂反節節彼南山詠自周詩股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂棲遲偃仰寝疾自逸被策文得賜錢即復起矣何疾之易而愈之速以此消伏災眚興致升平其可得乎今選舉牧守委任三府長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網䟽小網數三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平非不能面譽也臣生長草野不曉禁忌披露肝膽書不擇言伏鑕鼎鑊死不敢恨謹詣闕奉章伏待重誅書奏帝復使對尚書顗對曰臣聞明王聖主好聞其過忠臣孝子言無隠情臣備生人倫視聽之𩔖而禀性愚慤不識忌諱故出忘命懇懇重言誠欲陛下修乾坤之德開日月之明披圖籍案經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道攘災延慶號令天下此誠臣顗區區之願夙夜夢寤盡心所計謹條序前章暢其㫖趣條便宜七事且如状對其一曰陵園至重聖神攸馮而災火炎赫廹近寝殿魂而有靈猶將驚動尋宫殿官府近始永平歲時未即便更修造又西苑之設禽畜是處離房别觀本不常居而皆當務精土木營建無已消功單賄巨億為計易内傳曰人君者奢侈多飾宫室其時旱其災火是故魯僖遭旱修政自勅下鍾鼓之縣休繕治之官雖則不寧而時雨自降由此言之天之應人敏於景響今月十七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官減彫文之飾損庖廚之饌退宴私之樂易中孚傳曰陽感天不旋日如是則景雲降集眚沴息矣其二曰去年已來兊卦用事𩔖多不効易傳曰有貌無實佞人也有實無貌道人也寒温為實清濁為貌今三公皆令色足恭外厲内荏以虚事上無佐國之實故清濁效而寒温不效也是以隂寒侵犯消息占曰日乘則有妖風日䝉則有地裂如是三年則致日食隂侵其陽漸積所致立春前後温氣應節者詔令寛也其後復寒者無寛之實也夫十室之邑必有忠信率土之人豈無真賢未聞朝廷有所賞㧞非所以求善贊務𢎞濟元元宜採納良臣以助聖化其三曰臣聞天道不逺三五復反今年少陽之嵗法當乘起恐後年已徃將遂驚動渉歴天門災成戊巳今春當旱夏必有水臣以六日七分侯之可知夫災眚之來縁𩔖而應行有玷缺則氣逆于天精感變出以戒人君王者之義時有不登則損樂徹膳數年以來穀收稍減家貧户饉嵗不如昔百姓不足君誰與足水旱之災雖尚未至然君子逺覽防微慮萌老子曰人之飢也以其上食税之多也故孝文皇帝綈袍革舄木器無文約身薄賦時致升平今陛下聖德中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故髙宗以享福宋景以延年其四曰臣竊見皇子未立儲宫無主仰觀天文太子不明熒惑以去年春分後十六日在婁五度推歩三統熒惑今當在翼九度今反在柳三度則不及五十餘度去年八月二十四日戊辰熒惑歴輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宫也熒惑者至陽之精也天之使也而出入軒轅繞還徃來易曰天垂象見吉凶其意昭然可見矣禮天子一娶九女嫡媵畢具今宫人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宫之女表商容之閭以理人倫以表賢德故天授以聖子成王是也今陛下多積宫人以違天意故皇𦙍多天嗣體莫寄詩云敬天之怒不敢戲豫方今之福莫若廣嗣廣嗣之術可不深思宜簡出宫女恣其姻嫁則天自降福子孫千億惟陛下丁寧再三留神於此左右貴倖亦宜惟臣之言以悟陛下蓋善言古者合於今善言天者合於人願訪問百僚有違臣言者臣當受茍言之罪其五曰臣竊見去年閏十月十七日己丑夜有白氣從西方天苑趨左足入玊井數日乃滅春秋曰有星孛于大辰大辰者何大火也大火為大辰罰又為大辰北極亦為大辰所以孛一宿而連三宿者言北辰王者之宫也凡中宫無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏變見西方亦應三輔凡金氣為變發在秋節臣恐立秋以後趙魏關西將有羌寇畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦斂勿妄繕起堅倉獄備守衛囘選賢能以鎮撫之金精之變責歸上司宜以五月丙午遣太尉服干戚建井旟書玊板之策引白氣之異於西郊責躬求愆謝咎皇天消滅妖氣蓋以火勝金轉禍為福也其六曰臣竊見今月十四日乙卯巳時白虹貫日凡日傍氣色白而純者名為虹貫日中者侵太陽也見於春者政變常也方今中官外司各各考事其所考者或非急務又恭陵火災主名未立多所收捕備經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭已内省以備後災凡諸考案并須立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台自司徒居位隂陽多謬乆無虚已進賢之策天下興議異人同咨且立春以來金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早攘之將負臣言遺患百姓其七曰臣伏惟漢興以來三百三十九歲於詩三基髙祖起亥仲二年今在戍仲十年詩汜歴樞曰卯酉為革政午亥為革命神在天門出入侯聽言神在戍亥伺侯帝王興衰得失厥善則昌厥惡則亡於易雄雌祕歴今值困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎唯獨賢聖之君遭困遇險能致命遂志不去其道陛下乃者潜龍養德幽隠屈戹即位之元紫宫驚動歴運之㑹時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戍仲已竟來年入季文帝改法除肉刑之罪至今適三百載宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招來幽隠舉方正徴有道博採異謀開不諱之路臣陳引際㑹恐犯忌諱書不盡言未敢究暢臺詰顗曰對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致災或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對顗對曰方春東作布德之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇温柔遵其行令而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乘陽則虹蜺在日皆臣下執事刻急所致殆非朝廷優寛之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重每有選用輒參之掾屬公府門巷賔客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章也尚書職在機衡宮禁嚴密私曲之意羌不得通偏黨之恩或無所用選舉之任不如還在機密臣誠愚戇不知折中斯固逺近之論當今之宜又孔氏曰漢三百載計歴改憲三百四歲為一德五德千五百二十歲五行更用王者隨天譬猶自春徂夏改青服絳者也自文帝省刑適三百年而輕微之禁漸已殷積王者之法譬猶江河當使易避而難犯也故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號隨事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除災變常而惡必致於異今年仲竟來年入季仲終季始歴運變改故可改元所以順天道也臣顗愚蔽不足以荅聖問顗又上書薦黄瓊李固并陳消災之術曰臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰征營惶怖靡知厝身臣聞刳舟剡楫將欲濟江海也聘賢選佐將以安天下也昔唐堯在上羣龍為用文武創德周召作輔是以能建天地之功増日月之耀者也詩云赫赫王命仲仙甫將之邦國若否仲山甫明之宣王是賴以致雍熈陛下踐祚以來勤心衆政而三九之位未見其人是以灾害屢臻四國未寧臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集爵以德進則其情不茍然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨則皆懐歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天統違人望逆天統則灾眚降違人望則化不行灾眚降則下呼嗟化不行則君道虧四始之缺五際之戹其咎如此豈可不剛健篤實矜矜慄慄以守天功盛德大業乎臣見光禄大夫江夏黄瓊耽道樂術清亮自然被褐懐寶含味經籍又果於從正明達變復朝廷前加優寵賔于上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音希聲大器晩成善人為國三年乃立天下莫不嘉朝廷有此良人而復恠其不時還任陛下宜隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通㳺夏之藝履顔閔之仁絜白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜䝉特徵以示四方夫有出倫之才不應限以官次昔顔子十八天下歸仁子竒稺齒化阿有聲若還瓊徵固任以時政伊尹傅説不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言百姓所歸臧否共歎願汎問百僚覈其名行有一不合則臣為欺國惟留聖神不以人廢言謹復條便宜四事附奏於左其一曰孔子作春秋書正月者敬歲之始也王者則天之象因時之序宜開發德號爵賢命士流寛大之澤垂仁厚之德順助元氣含養庶𩔖如此則天文昭爛星辰顯列五緯循軌四時和睦不則大陽不光天地溷濁時氣錯逆霾霧蔽日自立春以來累經旬朔未見仁德有所施布但聞罪罰考掠之聲夫天之應人疾於景響而自從入歳常有䝉氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占隨政抑揚天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲斷金之利臣之所陳輒以太陽為先者明其不可乆闇急當改正其異雖微其事甚重臣言雖約其㫖甚廣惟陛下乃眷臣章深留明思其二曰孔子曰靁之始發大壮始君弱臣彊從觧起今月九日至十四日大壯用事消息之卦也於此六日之中靁當發聲發聲則歲氣和王道興也易曰靁出地奮豫先王以作樂崇德殷薦之上帝靁者所以開發萌芽辟隂除害萬物須靁而解資雨而潤故經曰靁以動之雨以潤之王者崇寛大順春令則靁應節不則發動於冬當震反潜故易傅曰當靁不靁大陽弱也今䝉氣不除日月變色則其效也天網恢恢䟽而不失隨時進退應政得失大人者與天地合其德與日月合其明琁機動作與天相應靁者號令其德生養號令殆廢當生而殺則靁反作其時無歲陛下若欲除災昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則大皓悦和靁聲乃發其三曰去年十月二十日癸亥太白與歲星合於房心太白在北歲星在南相離數寸光芒交接房心者天帝明堂布政之宫孝經鉤命決曰歲星守心年穀豐尚書洪範記曰月行中道移節應期德厚受福重華留之重華者謂歲星在心也今太白從之交合明堂金水相賊而反同合此以隂陵陽臣下專權之異也房心東方其國主宋石氏經曰歲星出左有年出右無年今金木俱東歲星在南是為出右恐年穀不成宋人飢也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣其四曰易傳曰陽無德則旱隂僭陽亦旱陽無德者人君恩澤不施於人也隂僭陽者禄去公室臣下專權也自冬渉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市臣聞皇天感物不為偽動災變應人要在責已若令雨可請降水可禳止則歲無隔并太平可待然而災害不息者患不在此也立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光曜明此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨將害粟麥若一穀不登則飢者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十年之蓄者簡税防災為其方也願陛下早宣德澤以應天功若臣言不用朝政不改立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎鑊書奏特詔拜郎中辭病不就陽嘉三年河南三輔大旱五穀災傷天子親自露坐請雨又禱祀名山大澤以尚書周舉才學優深特下策問曰朕以不德仰承三統夙興夜寐思協大中頃年以來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流羣司素餐據非其位審所貶黜變復之徵厥効何由分别具對勿有所諱舉對曰臣聞天尊地卑乾坤以定易稱二儀交構乃生萬物萬物之中以人為貴故聖人養之以君成之以化順四時之宜適隂陽之和使男女婚娶不過其時包之以仁恩導之以德教示之以災異訓之以嘉祥此先聖承乾養物之始也夫隂陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫今皇嗣不興東宮未立傷和逆理斷絶人倫之所致也非但陛下行此而已豎宦之人亦復虚以形埶威侮良家取女閉之至有白首殁無配偶逆於天心昔武王入殷出傾宫之女成湯遭災以六事剋已魯僖遇旱而自責祈雨皆以精誠轉禍為福自枯旱以來彌歴年歲未聞陛下改過之效徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰不可夫河伯以水為城國魚鼈為民庶水盡魚枯豈不欲雨自是不能致也陛下所行但務其華不尋其實猶縁木求魚却行求前誠宜推信革政崇道變惑出後宫不御之女理天下寃枉之獄除大官重膳之費夫五品不訓責在司徒有非其位宜急黜斥臣自藩外擢典納言學薄智淺不足以對易傳曰陽感天不旋日惟陛下留神裁察因召見舉及尚書令成翊世僕射黄瓊問以得失舉等並對以為宜慎官人去斥貪汙離逺佞邪循文帝之儉尊孝明之教則時雨必應帝曰百官貪汙佞邪者為誰乎舉獨對曰臣從下州超備機宻不足以别羣臣然公卿大臣數有直言者忠貞也阿䛕茍容者佞邪也司徒視事六年未聞有忠言異謀愚心在此其後以事免司徒劉﨑遷舉司𨽻校尉舉為諫議大夫時帝召於顯親殿問以變眚舉對曰陛下初立遵修舊典興化致政逺近肅然頃年以來稍違於前朝多寵倖禄不序德觀天察人準今方古誠可危懼書曰僭恒暘若夫僭差無度則言不從而下不正陽無制則上擾下竭宜密嚴勅州郡察彊宗大姦以時禽討順帝時大旱尚書僕射黄瓊上䟽曰昔魯僖遇旱以六事自讓躬節儉閉女謁放䜛佞者十三人誅税民受貨者九人退舍南郊天立大雨今亦宜顧省政事有所損闕務存質儉以易民聽尚方御府息除煩費明勅近臣使遵法度如有不移示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降災旱若改敝從善擇用嘉謀則災消福至矣太史令張衡以政事漸損權移於下因上䟽陳事曰伏惟陛下宣哲克明繼體承天中遭傾覆龍德泥蟠今乘雲髙躋磐桓天位誠所謂將隆大位必先倥偬之也親履艱難者知下情備經險易者逹物偽故能一貫萬機靡所疑惑百揆允當庶績咸熈宜獲福祉神祇受譽黎庶而隂陽未和災眚屢見神明幽逺㝠鑒在兹福仁禍淫景響而應因德降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必䝉祉祚奢淫謟慢鮮不夷戮前事不忘後事之師也夫情勝其性流遯忘反豈唯不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有愆尤上下知之襃美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恒暘若者也懼羣臣奢侈昏踰典式自下逼上用速咎徵又前年京師地震土裂裂者威分震者人擾也君以静唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專已恩不忍割與衆共威威不可分德不可共洪範曰臣有作威作福玊食害于而家凶于而國天鑒孔明雖踈不失災異示人前後數矣而未見所革以復徃悔自非聖人不能無過願陛下思惟所以稽古率舊勿令刑德八柄不由天子若恩從上下事依禮制禮制修則奢僭息事合宜則無凶咎然後神望充塞災消不至矣桓帝延熹間火災陳蕃劉智茂上䟽諫曰古之火皆君弱臣强極隂之變也前始春而獄刑慘故火不炎上前入春節連寒木冰暴風折樹又八九州郡並言隕霜殺菽春秋晉執季孫行父木為之冰夫氣𢎞則景星見化錯則五星開日月蝕災為已然異為方來恐卒有變必於三朝唯善政可以已之願察臣前言不棄愚忠則元元幸甚書奏不省太史令上言客星經帝坐帝宻以問侍中爰延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動静以禮則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潜之舊封為通侯恩重公卿恵豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政德也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與彊臣共博列婦人於側積此無禮以致大災武帝與幸臣李延年韓嫣同卧起尊爵重賜情欲無厭遂生驕淫之心行不義之事卒延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故主者賞人必酬其功爵人以甄其德善人同處則日聞嘉訓惡人從㳺則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則悦於耳以非所行則翫於目故令人君不能逺之仲尼曰唯女子與小人為難養近之則不遜逺之則怨蓋聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之髙賢君臣合道尚降此變豈況陛下今所親幸以賤為貴以卑為尊哉惟陛下逺讒䛕之人納謇謇之士除左右之權寤宦官之敝使積善日熈佞惡消殄則乾災可除帝省其奏時宦官專朝政刑暴濫又比失皇子災異尤數延熹九年襄楷自家詣闕上䟽曰臣聞皇天不言以文象設教堯舜雖聖必歴象日月星辰察五緯所在故能享百年之夀為萬世之法臣切見去歳五月熒惑入太微犯帝座出端門不軌常道其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還切執法嵗為木精好生惡殺而淹留不去者咎在仁德不修誅罰太酷前七年十二月熒惑與歲星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鼈城傍竹柏之葉有傷枯者臣聞於師曰柏傷竹枯不出三年天子當之今洛陽城中人夜無故叫呼云有火光人聲正諠於占亦與竹柏枯同自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望而陛下受閹豎之譛乃逺加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世自陛下即位以來頻行誅罰梁寇孫鄧並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曽無赦宥而并被殘戮天下之人咸知其寃漢興以來未有拒諫誅賢用刑太深如今者也永平舊典諸當重論皆須冬獄先請後刑所以重人命也頃數十歲以來州郡翫習又欲避請讞之煩輒託疾病多死牢獄長吏殺生自己死者多非其罪魂神寃結無所歸訴淫厲疾疫自此而起昔文王一妻誕致十子今宫女數千未聞慶育宜修德省刑以廣螽斯之祚又七年六月十三日河内野王山上有龍死長可數十丈扶風有星隕為石聲聞三郡夫龍形狀不一小大無常故周易況之大人帝王以為符瑞或聞河内龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死始皇逃之死於沙丘王莽天鳯二年訛言黄山宫有死龍之異後漢誅莽光武復興虚言猶然況於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安𩔖墜者失埶春秋五石隕宋其後襄公為楚所執秦之亡也石隕東郡今隕扶風與先帝園陵相近不有大喪必有畔逆案春秋以來及古帝王未有河清及學門自壊者也臣以河者諸侯位也清者屬陽濁者屬隂河當濁而反清者隂欲為陽諸侯欲為帝也太學天子教化之宫其門無故自壊者言文德將喪教化廢也京房易傳曰河水清天下平今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也臣前上琅邪宫崇受于吉神書不合明聽臣聞布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠臣雖至賤誠願賜清問極盡所言書奏不省十餘日復上書曰臣伏見太白北入數日復出東方其占當有大兵中國弱四夷彊臣又推歩熒惑今當出而潛必有隂謀皆由獄多寃結忠臣被戮德星所以乆守執法亦為此也陛下宜承天意理察寃獄為劉躓成瑨虧除罪辟追録李雲杜衆等子孫夫天子事天不孝則日食星鬬比年日食於正朔三光不明五緯錯戾前者宫崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國𦙍不興孝沖孝質頻世短祚臣又聞之得主所好自非正道神為生虐故周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時殷紂好色妲己是出葉公好龍真龍游廷今黄門常侍天刑之人陛下愛待兼倍常寵係嗣未兆豈不為此天宫宦者星不在紫宫而在天市明當給使主市里也今乃反處常伯之位實非天意又聞宫中立黄老浮屠之祠此道清虚貴尚無為好生惡殺省慾去奢今陛下嗜欲不去殺罰過理既乖其道豈獲其祚哉或言老子入西域為浮屠浮屠不三宿桑下不欲乆生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下婬女豔婦極天下之麗甘肥飲美殫天下之味柰何欲如黄老乎書上即召詔尚書問状楷曰臣聞古者本無宦臣武帝末春秋髙數㳺後宫始置之耳後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書上其對詔下有司處正楊秉為侍中尚書帝時微行私過幸河南尹梁𦙍府舍是日大風㧞樹晝昏秉因上䟽諌曰臣聞瑞由德至災應事生傳曰禍福無門唯人所召天不言語以災異譴告是以孔子迅雷風烈必有變動詩云敬天之威不敢驅馳王者至尊出入有常警蹕而行静室而止自非郊廟之事則鑾旗不駕故詩稱自郊徂宫易曰王假有廟致孝享也諸侯如臣之家春秋尚列其誡況以先王法服而私出槃㳺降亂尊卑等威無序侍衛守空宫紱璽委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在講勸特䝉哀識見照日月恩重命輕義使士死敢憚摧折略陳其愚時連歲饑荒災異數見劉陶時㳺太學上䟽曰臣聞人非天地無以生天地非人無以為靈是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也伏惟陛下年隆德茂中天稱號襲常存之慶循不易之制目不視鳴條之事耳不聞檀車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念髙祖之起始自布衣拾暴秦之敝追亡周之鹿合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能増明烈考之軌而忽髙祖之勤妄假利器委授國柄使羣醜刑𨽻芟刈小民彫敝諸夏虐流逺近故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令牧守長吏上下交竸封豕長蛇吞食天下貨殖者為窮寃之魂貧餒者為飢寒之鬼髙門獲東觀之辜豐室羅妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口擅閻樂於咸陽授趙髙以車府權去已而不知威離身而不顧古今一揆成敗同埶願陛下逺覽强秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救故武丁得傅説以消鼎雉之災周宣用申甫以濟夷厲之荒竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞髙絶俗穆前在冀州奉憲撡平摧破奸黨掃清萬里膺歴典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挾輔王室上齊七曜下鎮萬國臣敢吐不時之義於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也永康元年徵皇甫規為尚書其夏日食詔公卿舉賢良方正下問得失規對曰天之於王者如君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄一除内嬖再誅外臣而災猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩忠謀髙世廢在里巷劉祐馮緄趙典尹勲正直多怨流放家門李膺王暢孔翊絜身守禮終無宰相之階至於鈎黨之釁事起無端虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鑒畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降對奏不省歴代名臣奏議卷二百九十六
