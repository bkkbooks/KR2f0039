body:
  text: 歴代名臣奏議卷二百四十四明楊士竒等撰荒政宋仁宗時起居舍人同知諫院司馬光論荒政劄子曰臣竊惟淮南兩浙今歳水灾民多乏食往往羣輩相聚操執兵仗販鬻私鹽以救朝夕至有與官軍拒鬭相殺傷者若浸淫不止將成大盗朝廷不可不深以為憂蓋由所司𣙜之太急故抵冒為奸臣聞周禮以荒政十有二聚民近者朝廷畧以施行惟舍禁除盜賊二者似未留意今赤子凍餒濵於溝壑奈何尚與之爭錙銖之利豈為民父母之意哉臣謂陛下宜戒諭職司使明體朝意稍弛鹽禁而嚴督盜賊緩課利不充之罰急羣行剽劫之誅廢告捕私鹽之賞旌討擒強暴之功棄聚斂之小得保安全之大福除惡於纎介弭亂於未形最策之得者也張方平上倉廩論曰臣聞古者民三年耕則餘一年之食九年耕則有三年之畜通三十年而有九年之積豐年補敗雖累凶年民弗之病然後德化流洽禮樂興焉此三代之盛平土分民富庶而教之本也周衰經界失叙生業不平則有權謀之臣通變之士調盈虚之數修輕重之術以制國用均民財若夷吾之準平李悝之平糴漢桑𢎞羊之均輸耿壽昌之常平下至隋氏義租唐人社倉之制是皆便物利民濟時合道安人之仁政為國之善經也孟子曰犬彘食人之食而不知檢野有餓殍而不知發人死則曰非我也歳也是何異於刺人而殺之曰非我也兵也是知蓄委者國之大本斂發者政之大平饑穰者天之常行備預者人之所及者也故萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏而人君御之以準然後民有所恃也國家之承平六十年矣漕引東南之粟以輸太倉卷地無餘常若不逮而僅充兵食邊塞之積鮮及兼年強家之藏舊不接新貧人之餉朝不繼暮不幸而有凶旱水溢之災民立匱竭國無以振救老弱轉死相枕溝壑方駭而圖之強發私廩千里轉餽重為勞費官民皆擾不亦謀之末乎比者赦書有諭州縣使立義倉之言徒有空文而無畫一之制于兹三年天下皆無立者凡今之俗茍且因循嚴令堅約猶復違慢為民興利豈易其人有位者無心有心者無位在上可行者務暇逸而從茍且在下樂行者或牽束而不得專以故民間利不克時興害不得時去積成弊蠧以及喪敗又凡事體興立實艱隳壊孔易或謀以為利而轉以為害彼義租社倉者齊隋唐氏既嘗為之矣始為百姓儲備之道終為僻君淫侈之費是於籍外更生一調也誠國家規前代之善策為齊人之大計明立條式權其斂出令天下之縣各於逐鄉築為囷廩於中户已上為之等級課入糓麥其輸入之數視歳薄厚為之三品縣掌其籍鄉吏守之遇歳之饑發以振給小饑則約小熟之所斂中饑則約中熟之所斂大饑則約大熟之所斂專自縣鄉檢校之無使州郡計司侵取雜用焉此則收自優户穰歳之有餘散於貧人凶年之不足不使兼并賈人挾輕資藴重積筦其利以豪奪於吾人此其協於大易裒多益寡稱物平施之義符於周官黨使相救州使相賙之法契詩人京坻之頌應時令振乏之理使民足而知順讓益歸於本業誠為國之大事也謹論起居舍人知諫院范鎮論民力困敝劄子曰臣竊聞陛下毎遇水旱或時變灾必露立向天痛自刻責盡精竭慮無所不至堯舜用心亦不過是然願陛下稍推廣之推廣之術在於使官吏稱職民力優裕而已今民力困甚而朝廷取之不已是官吏不稱職使陛下憂勤於上而人民愁苦於下也伏見國家用調責之三司三司責之轉運使轉運使責之州州責之縣縣責之民至民而止民竭其力以佐公上而自用不得足則怨嗟之氣干戾天地此水旱變灾所以作也願陛下推前憂勤之心明詔中書樞宻大臣使考求祖宗朝及天聖中兵數與官吏之數與天下賦入之數斟酌損益立為條章上下遵守則國用有常國用有常則民力有餘陛下雖高拱深居無所事而天地之和至矣又何憂水旱灾變之患而躬自刻責如此其勞乎臣居嘗念此至熟今䝉陛下選任不敢不自竭盡然亦不敢逺引前古難行之事所陳惟祖宗時及天聖中陛下躬親之政伏惟留神采擇鎮又奏流民乞立經制狀曰臣伏見今歳無麥苗朝廷為放税免役及以常平倉軍儲倉拯貸存恤之恩不為不至矣然而人民流離父母妻子不能相保者平居無事時不少寛其力役輕其租賦歳雖大熟使民不得終歳之飽及一小歉故雖加重施固已不及事矣此無它重斂之政在前也今特一榖不熟爾而流民如此就使九榖皆不熟朝廷將如之何臣竊以水旱之作由民之不足而怨民之不足而怨由有司之重斂有司之重斂由官冗兵多與土木之費廣而經制不立也又聞許汝鄭等蝗蝻復生蝗蝻之生亦由貪政之所感也天意以為貪政之取民猶蝗蝻之食苗故頻年生蝗蝻以覺悟陛下也春秋魯宣公十五年秋初履畆冬蝝生説者以為縁履畆而生此所謂貪政之感也國家自陜西用兵増兵以來賦役煩重及近年不惜髙爵重禄假借匪人轉運使復於常賦外進羡錢以助南郊其餘無名斂率不可勝計此皆貪政也貪政之發發於掊克暴虐此民所以怨也所以干天地之和也水旱之所以作也臣前此言官冗兵多民困者屢矣未䝉報下伏乞陛下勅大臣檢臣前所上章考今官數兵數與賦入之數立為經制又罷土木之費使民得足食而少休息則天地之和至矣古人言太平者止於民之足食也今誠能立經制省官與兵節土木之費使民足食陛下髙拱深居而太平可坐致顧陛下責任大臣何如耳知制誥劉敞上奏曰臣伏見城中近日流民衆皆扶老攜幼無復生意問其所從來或云久旱耕種失業或云河溢田廬蕩盡竊聞聖慈憫其如此多方救濟此誠陛下為民父母之意足以感動羣心臣猶謂但可寛眼前之急而已非救本之術也譬如良醫療病必先審其病病源不除強食無益今百姓之病已可見矣父子兄弟不能相保鰥寡孤獨不能自存強者流轉弱者死亡所以致此者其源在水旱也所以致水旱者其本在隂陽不和也所以致隂陽不和者其端在人事不修也然則三公之職主和隂陽而議臣之任主明天人陛下何不責三公以其職使之陳隂陽不和之理詢議臣以其學使述天人相與之際參之聖心以觀今日政事若陛下所委任皆已得人所施為皆已應天則水旱者蓋無妄之灾不足憂矣若天人之際少有不合豈得安然坐視其病心知其源不思救之哉臣言似迂其理實切今羣臣為陛下謀者不過煮粥糶米名為救濟其實亦欲欺聰明自解免而已非謀國之體也又今天氣當暑反寒率多常風雨澤愆候秋成不可必願陛下速思所以救其本者召致和氣無令聖心重増焦勞則天下幸甚敞知永興軍又奏曰臣奉勅知永興兼一路安撫使竊聞關中今歳頗旱百姓艱食已有流移入汝鄧諸州者若不多方賑恤恐成凋瘵欲乞契㑹諸州倉廩量留三年軍儲外貸與貧下百姓令逐縣結保等第支借候歳熟日准數還官一則接濟困乏免令逃散二則以新换陳不乏軍儲三則流布恩惠固結民心又聞同華諸州向來雖旱近稍得雨所種宿麥皆已在地但比至麥熟日月尚逺恐百姓闕之不能待之所以急須賑濟救其性命伏乞斷自聖衷行之不疑其已流散入汝鄧諸州者亦乞下所屬州縣特加存卹或簡别䕶送令各還鄉里則貧下無失業之恨縁臣赴任在近若䝉開允乞降指揮付臣施行宋祁上奏曰竊聞山東關中京西河北去冬無雪宿麥稀種居者愁困去者流離緜春跨夏搏手無望朝廷雖切勅長吏漕運糴粟然而財用久屈倉廩半空僅能濟軍何暇及物今州縣惟中户以上尚且懐土以待有秋而繇役百端科率千計必不可損須出於人以臣料之私蓄有涯官用無際歳既未足民胡得安陛下若不曠然垂恩有以大慰其意則蚩蚩之衆饑弱者就死強惡者為盜盜賊既廣討捕必嚴兵盜相拏邦國深患臣愚以為方今艱食之際其灾傷州縣且詔豫減今年秋夏二税安集居民無令力農更失生業推主上之惠慰黎人之心羣心茍和不逞自息權救時急深適事宜祁又上奏曰去年江淮二浙稻收七八而淮南饑疫之後户口寖衰縣無完村村無全户纔足自贍罔能及它惟有江浙二方天下仰給臣以為京師禁旅近數十萬三年之蓄不可不備去年國家垂憫南土遘兹洊饑減漕粟之常科軫斯人之艱食上恩雖美邦計未充且足食足兵乃可治國我倉我庾所以為人夫江淮漕運之司輸米上供已有定數若更多取則官司不供故臣願陛下明下詔書募民能入米京師者倍價而糴三分其價一分給錢二分則以方𣙜茶準其直而與之商旅利於化居吏卒緩於程督如此則倉廩實京師盛郡國安矣如允所請乞付外詳議英宗治平元年知諫院司馬光又言蓄積劄子曰臣聞國以民為本民以食為天國家近歳以來官中及民間皆不務蓄積官中倉廩大率無三年之儲鄉村農民少有半年之食是以少有水旱則公私窮匱無以相救流移轉徙盜賊並興當是之時朝廷非不以為憂及年榖稍豐則上下之人皆忘之矣此最當今之深弊也先帝時臣曽上言乞將諸路轉運使及諸州軍長吏官滿之日倉廩之實比於始至増減多少以為黜陟又令民能力田積榖者皆不以為家貲之數欲為國家力救此弊自後不聞朝廷施行今歳開封府界南京宿亳陳蔡曹濮濟單等州霖雨為災稼穡之田悉為洪荒百姓羸弱者流轉它方餓死溝壑強壯者起為盜賊吏不能禁朝廷欲開倉賑貸則軍儲尚猶不足何以賑民欲括取於蓄積之家則貧者未能賑濟富者亦將乏食又使今後民間不敢蓄積不幸復有凶年則國家更於何處取之此所以朝廷雖寒心銷志亦坐而視之無如之何者也臣竊思之蓋非今日有司之罪乃曏時有司之罪也往者不可及來者猶可追陛下不於今日特留聖心速救此弊豐凶之期不可豫保若向去復有水旱螟蝗之灾饑饉相仍甚於今年則國家之憂何所不至乎臣又聞平糴之法必謹視年之上下故大熟則上糴三而舍一中熟則糴二下熟則糴一使民適足價平則止少饑則發小熟之所斂中饑則發中熟之所斂大饑則發大熟之所斂而糶之所以取有餘而補不足也今開封府及京東京西水灾之處放税多及十分是大饑之歳也官吏往往更行收糴所給官錢既少百姓不肯自來中糶則遣人編攔搜括無以異於寇盜之鈔刼是使有榖之家愈更閉塞不敢入市榖價益貴人不聊生如此非獨天灾亦由吏治顛錯之所致也臣愚欲望朝廷檢㑹臣前次及今來所奏事理更加詳酌擇其可者少賜施行指揮開封府界及京東京西災傷州軍見今官中收糴者一切止住其有常平廣惠倉斛斗之處按籍置歴出糶賑貸先救農民告諭蓄積之家許行出利借貸與人候豐熟之日官中特為理索不令逋欠其河北陜西河東及諸路應豐稔之處委轉運司相度榖價賤者廣謀收糴價平即止如本路闕少錢物即委三司於它處擘畫那移應副仍自今以後乞朝廷毎年謹察諸路豐凶之處依此施行臣竊料有司必言官無閒錢可以趂時收糴臣伏見國家毎遇凶荒之歳縁邊屯軍多處常用數百錢糴米一斗若用此於豐稔之歳可糴一碩不知有司何故於凶荒之歳則有錢供億至豐稔之歳則無錢也此無它故患在有司偷安目前以俟遷移進用不為國家思久逺之計而已故臣惟願陛下深留意二年光又言錢糧劄子曰臣近䝉恩給假至陜州焚黄竊見縁路諸州倉庫錢糧例皆闕絶其官吏軍人料錢月糧並須逐旋收拾方能支給竊料其餘諸州臣不到處亦多如此臣聞國無三年之蓄曰國非國今窘竭如此而朝廷曽不以為憂若不幸有水旱蝗蝻方數千里如明道康定之時加之邊鄙有急興兵動衆不知朝廷何以待之臣伏見陳許潁亳等州止因去秋一次水灾遂致骨肉相食積尸滿野此非今日官吏之罪乃曏時官吏之罪也何則曏時豐稔之歳其人但務偷安不為逺慮粟麥至賤不能儲蓄及至凶荒之際官私俱竭上下狼狽何由相救雖使桑羊劉晏復生亦無如之何也今春幸而得雨麥田有望朝廷已置饑饉之事於度外不復以儲蓄為意矣萬一天下州縣復有灾傷則何以異於陳許潁亳之民也若饑饉相繼盜賊必興此豈可不早為之深慮乎臣愚伏望陛下於天下錢榖常留聖心特降詔書明諭中外應文武臣寮有熟知天下錢榖利害能使倉庫充實又不殘民害物者並許上書自言陛下勿以其人官職之疎賤文辭之鄙惡一一畧加省覽擇其理道稍長者皆賜召對從容訪問以方今食貨俱乏公私皆困何故而然如何擘畫可使上下豐足若其言無可取者則罷遣而已有可取者即為之施行仍記録其姓名置於左右然後選其材幹出羣者以為轉運使副判官及三司使副判官仍毎至年終令三司撮計在京府界及十八路錢帛糧草見在都數聞奏以之比較去年終見在都數若増羨稍多即令勘㑹如别無奸巧欺謾及非理賦斂而致増羨其當職之人宜量行褒賞累經褒賞者即别加進用若減耗稍多即令詰問如别無大故災傷及添屯軍馬而致減耗其當職之人宜量行責罰累經責罰者即永從黜廢誠能如此行之不懈數年之後可使天下倉皆有餘粟庫皆有餘財雖有水旱蝗蝻之灾及邊鄙有急皆不足憂也英宗時起居注韓維論救濟饑民劄子曰臣竊聞今春畿甸及京西州郡百姓饑死者甚衆訪聞蓋是州縣官不早為體察存養致百姓流去本土轉更失所所至州縣既無儲蓄之備比至勸誘人户及奏聞朝廷得物救濟流民已是饑困又處置散給飯粥或失所宜便致枉害人命近聞河北京東兩浙諸郡被水灾者不少若止因循舊體必定百姓復罹此禍伏望聖慈特降詔書丁寧戒勅諸路轉運提刑及州縣官吏上下公共詢問饑困之人早為振贍毋令流散不幸轉徙者轉運提刑為差官引導令就州軍多方救養仍具施行次第聞奏朝廷至時遣使察視其當職官吏有善設術畧使居者不至於流徙流者不至於殍亡仍議以户口人數量立賞格不如詔者議罰亦准之所冀勸督官吏宣力為民拯其艱危以副陛下好生之意維又乞親諭使人救濟饑民狀曰臣竊聞去年開封府界并陳蔡許潁等州例各不熟入春以來民困尤甚朝廷雖發倉廩轉米榖以加振贍而死者不可勝數其甚者至於遺棄幼穉號哭道路骨肉之間自相噉食殭尸暴骸所在狼籍聞之可為傷痛臣日夜思念蓋振救之道有所未盡以及於此州縣米榖之不積一也官吏無恤民之心二也飼養失處置之宜三也朝廷雖發倉廩而陛下未嘗親諭惻怛之意遣使臨視四也羣議籍籍竊怪陛下勤政愛民日昃不倦至於細務莫不曲加處分而於此事未聞德音有所矜卹意者陛下未知其詳歟臣聞羣議且久毎欲上聞以越職為懼而止今前去二麥尚有數月而死者日廣臣誠不忍陛下赤子遭遇仁聖之君不得䝉被其澤而無告以死臣雖越職得罪猶不敢避也伏望聖慈特詔執政擇愛民幹事之吏十數輩召見便坐喻以憂勞愍傷之意令分使州縣察視流民先具見存及死亡之數與即今救濟之狀以聞然後與轉運提刑知州通判等同共疾速商量如何處置救養可以全活民命比至麥熟合用米糧幾何如何營救不至絶乏不幸死者所在官為掩瘞毋得暴露凡此諸事皆許入馬鋪馳奏陛下與二府大臣朝夕圖議茍國家之力可及之者無不為也如此則庻幾斯民漸有生路不然三四十萬之衆至四五月之間皆填溝壑矣臣聞天之所以祐命人君者將以牧民也君之所以享尊極者以有民為之下也民之所以欣戴其上者以能保安己也陛下即位之初宜有以固結天下之心而副天之所以祐命者無急於此也臣願陛下力行之干冒天威臣無任涕泗激切之至知河陽縣陳襄乞抛降和糴小麥價錢狀曰臣伏為本縣民田瘠薄屢經灾旱今年夏秋闕雨五榖不收雖已依條檢覆減放税租然中産之民已闕歳計待糴而食十有八九例以小麥青苖生舉錢物一㪷之直只得二十餘文兼并之家已獲倍利尚被艱難舉貸不得深慮來年起發春夫之際榖價騰湧貧窘之民轉見不易臣竊見本州毎歳抛降和糴小麥萬數多是過時收糴毎一㪷官支價錢不下九十文以上至一百二十文比之民間麥熟之時所直市價常多三四十文且以一州言之毎歳所糴小麥一萬餘石即大支價錢三千餘貫若京西一路枉費官錢亦為不少率無拯救之利秖益商販之民臣今擘畫欲乞轉運司先於隔年抛降和糴小麥價錢數目下本州縣依諸路放買紬絹條例於來年正月半已前預支與五等人户毎小麥一㪷依麥熟時民間價例放六十文仍令十户結為一保各以上等人户充作保頭連名具狀逓相保委請領官錢至時只令户長依夏税期限催納如此則不惟拯濟貧匱之民兼亦省得和糴官錢不少臣所起請委是官民兩利别無妨礙如允臣所奏乞下本路州軍合係和糴斛㪷去處一例施行謹具狀奏聞神宗即位初御史中丞司馬光乞訪四方雨水疏曰臣竊見陛下近以久旱為灾分命使者徧祈嶽瀆靡神不舉精誠感通甘雨降集誠中外之大慶然暑月暴雨多不廣逺臣竊慮四方州縣尚有未霑足之處王者以天下為家無有逺邇當視之如一不可使惻隱之心止於目前而已今者京城雖已得雨伏望陛下不可遽以為秋成可望怠於憂民凡内外臣寮有新自四方來者進對之際皆乞訪以彼中雨水多少苗稼如何榖價貴賤閭閻憂樂互相參考以驗虚實即可以開益陛下聰明日新盛德又使逺方百姓皆知陛下燭見幽逺無所遺忽銜戴上恩傾心歸附又使州縣之吏皆知陛下憫恤黎元留心稼穡不敢自恃僻逺殘民害物陛下一發德音而收此三善非獨可以行之今日亦願陛下永久行之誠天下幸甚光又乞選河北監司賑濟饑民疏曰臣竊見朝廷差官支撥粳米於永泰等門遇有河北路流民逐熟經過即大人毎人支與米一斗小人支與米五升仰子細告諭在京難以住泊令速往近便豐熟州軍存活者臣切思之如此處置欲以為恤民之名掩人耳目則僅可矣其實恐有損無益何以言之曏者或聞河北有人訛傳京師散米者民遂襁負南來今若實差官散米恐河北饑民聞之未流移者因兹誘引皆來入京京師之米有限而河北流民無窮既而無米可給則不免聚而餓死如前年許潁二州是也今來苗既傷於旱蝗日益滋生秋田豐歉殊未可知一斗五升之米止可延數日之命豈能濟饑饉之厄哉凡民之情見利則趨之見害則避之若京師可以住泊雖驅之亦不肯去若外州不可以存活雖留之亦不肯止固非數人口舌所能告諭故臣以為有損無益也臣聞民之本性懐土重遷豈樂去鄉里捨其親戚棄其丘壠流離道路乞丐於人哉但以豐稔之歳粒食狼戾公家既不肯收糴私家又不敢積蓄所收之榖隨手糜散春指夏熟夏望秋成上下偷安姑為茍計是以稍遇水旱螽螟則餱糧已絶公私索然無以相救仰食縣官既不能周假貸富室又無所得此乃失在於無事之時不在於凶荒之年也加之監司守宰多不得人視民之窮曽無矜憫増無名之賦興不急之役吏縁為奸蠧弊百出民摶手計窮無以為生則不免有四方之志大意謂它處必有饒樂之鄉仁惠之政可以安居遂伐其桑棗撤其廬舍殺其耕牛委其良田累世之業一朝破之相攜就道若所詣之處復無所依使之進退失望彼老弱不轉死溝壑壯者不起為盜賊將安歸乎是以聖王之政使民安其土樂其業自生至死莫有離散之心為此之要在於得人以臣愚見莫若謹擇公正之人為河北監司使之察災傷州縣守宰不勝任者易之然後多方那融斛㪷合使賑濟本州縣之民若斛㪷數少不能周徧者且須救土著農民各據版籍先從下等次第賑濟則所給有限可以預約矣若富室有蓄積者官給印歴聴其舉貸候豐熟日官為收索示以必信不可誑誘則將來百姓爭務蓄積夫如此饑民知有可生之路自然不棄舊業浮遊外鄉居者既安則行者思返若縣縣皆然豈得復有流民哉臣曽上言王者以天下為家不可使惻隱之心止於目前而已此特河北流民路過京師者耳切聞其它災傷之處流民亦為不少若臣言可采伏望聖慈依此行之熈寧元年殿中侍御史裏行錢顗上奏曰臣聞國之所以為國者以有民也民之所以為民者以有榖也國無九年之儲不謂之有備家無三年之蓄必謂之不給有國有家者未始不先於儲蓄也故管子曰倉廩實知禮節衣食足知榮辱此之謂矣臣竊見諸處農民雖力田疇不務蓄積一有水旱遂至狼狽深可惻憫臣謹按隋文帝開皇中曽令天下之人節儉輸粟名為社倉行於當時民無饑饉此實濟衆之良策也以臣愚欲乞於天下州縣逐鄉村各命依舊置社倉當豐年秋成之時只於上三等有田人户量出斛㪷以備賑濟第一等不過三石第二等不過二石第三等不過一石或以鄉或以村為額仍令衆人選擇有物力一户充社倉甲頭一年一替以所聚斛㪷藏置其家即具衆戸實數申報所屬官司判押為據或有損失亦仰甲頭陪填貴免侵欺之弊若遇荒歉即盡數俵借於下等貧民聴將來歳稔日官為索還依前入社倉收貯候聚及三年或無水旱即具存留所貴常有三年之備可免水旱一方之民且榖有貴賤嵗有凶豐所斂至輕所濟至博嵗月稍久蓄積亦多縱值水旱之災免致流亡之患伏乞指揮下諸路轉運詳酌施行二年判汝州富弼論河北流民到京西乞分給田土劄子曰臣昨在汝州切聞河北流民來許汝唐鄧州界逐熟者甚多臣以朝廷前許請射係官田土後却不令請射盡須發遣歸還本貫臣訪知流民必難發遣得回既已流移至此又却不得田土徒令狼狽道路轉見失所遂專牒本州通判張恂立便往州界諸縣流民聚處一一相度口數給與田土或自令樵漁採捕或計口支散官粟諸般捄濟庶幾稍可存活内只有給田一項違著朝廷後來指揮比欲奏候朝㫖及為流民來者日益多深恐救卹稍遲轉有死損遂且用上項條件施行去後方具奏聞尋准中書劄子奉聖㫖一依奏陳事理其後來者即教不得給田候春暖勸諭令歸上路後方知其餘州軍所到流民不拘新舊並只用原降朝㫖盡不許給與田土臣其時以急於赴召不及再有奏陳自襄城縣至南薫門共六程臣見沿路流民大小車乗及驢馬駞載以至擔仗等相繼不絶臣毎逢見逐隊老小一一問當及令逐旋抄劄只路上所逢者約共六百餘户四千餘口其逐州逐縣鎮以至道店中已安下臣不見者并臣於許州驛中住却一日路上之人臣亦不見者比臣曽見之數恐又不下一二百戸三二千口都約及八九百户七八千口其前後已過并今未來及有住唐鄧蔡州等處臣所不見者又不知其數多少扶老攜幼纍纍滿道寒饑之色所不忍見亦有病而死者隨即埋於道傍骨肉相聚號泣而去臣親見而問得者多是鎮趙邢洺磁相等州下等人户以十分為率約四五分並是鎮人其餘五六分即共是趙州與邢洺磁相之人又十中約六七分是第五等人三四分是第四等人及不濟户與無土浮客即絶無第三等已上之家臣逐隊徧問因甚如此離鄉土逺來它州其間甚有垂泣告者曰本不忍抛離墳墓骨肉及破壊家産只為災傷物貴存濟不得憂慮餓殺老小所以須至趂斛㪷賤處逃命又問得其全家起離來更不歸者亦有減人口暫來逐熟後彼中無災傷斛㪷稍賤即却歸者亦有去年先令人來請射或買置田土亦有無准備望空來者大約稍有准備無一二餘皆茫然並未有所歸只是路上逐旋問人斛㪷賤處便去臣切聞有人聞朝廷頃令發遣却歸本貫此説盖是其人只以傳聞為詞不曽親見親問但只聞有車乗行李次第頗多便稱是上等之人臣毎親見有七八兩大車者約及四五十家二百餘口四五兩大車者約及三四十家一百餘口一兩兩大車者約及五七家五七十人其小車子及驢馬擔仗之𩔖大抵皆似大車並是彼中鄉村相近隣里或出車乗或出驢牛或出繩索或出搭盖之物逓相併合各作一隊起來所以行李次第如上等人户也今既是貧窘之家決意離去鄉土逃命逐熟而朝廷頃令發遣却回必恐有傷和氣臣亦子細説諭云朝廷恐你抛離鄉井欲擬發遣却歸河北不知如何其丈夫婦人皆向前對曰便是死在此處必更難歸兼一路盤纒已有次第如何歸得除是將來彼中有可看望方有歸者也此已上事並是臣親見親問所得最為詳悉與夫外面所差體量之人簿尉幕職官畏懼州府州府畏懼提轉提轉畏懼朝省而不敢盡理而陳述或心存諂妄不肯説盡災患之事或不切用心自作鹵莽申不實者萬不侔也伏望聖慈早賜指揮京西一路如流民到處且將係官荒閒田土及見佃人剰占無税地土差有心力徇公官員四散分俵各令往佃更不得逼逐發遣却歸河北其餘或與人家作客或自能樵漁採捕或支官粟計口養之之𩔖更令中書撿詳前後條約疾速嚴行指揮約束所貴趂此日月尚淺未有大段死損之人可救䘏得及七年監京師安上門鄭俠進流民圖狀曰臣伏覩去年大蝗秋冬亢旱迄今不雨麥苗焦枯黍粟麻豆皆不及種旬日以來米價暴貴羣情憂惶十九懼死方春斬伐竭澤而漁大營官錢小求升米草木魚鼈亦莫生遂蠻夷輕肆敢侮君國皆由中外之臣輔相陛下不以道以至於此臣竊惟災患有可致之道無可試之形其致之有漸而其來也如疾風暴雨不可復禦流血藉尸方知喪敗此愚夫庸人之見古今有之所貴於聖神者為其能圖患於未然而轉禍為福也當今之勢猶可救願陛下開倉廩賑貧乏諸有司斂掠不道之政一切罷去庶幾早召和氣上應天心調隂陽降雨露以延萬姓垂死之命而固宗社億萬年無疆之祉夫君臣際遇貴乎知心以臣之愚深知陛下愛養黎庶甚於赤子故自即位以來一有利民便物之政靡不毅然主張而行陛下之心亦欲人人壽富而躋之堯舜三代之盛耳夫豈區區充滿府庫盈溢倉廩終以富衍強大誇天下哉而中外之臣畧不推明陛下此心而乃肆其叨懫劓割生民侵肌及骨使大困苦而不聊生坐視其死而不恤夫陛下所存如彼羣臣所為如此不知君臣際遇欲作何事徒只日超百資意指氣使而已乎臣又惟何世而無忠義何代而無賢德亦在乎人君所以駕馭之如何耳古之人在山林畎畆不忘其君芻蕘負販匹夫匹婦咸欲自盡以贊其上今陛下之朝臺諫黙黙具位而不敢言事至有規避百為不肯居是職者而左右輔弼之臣又皆貪猥近利使夫抱道懐識之士皆不欲與之言不知時然耶陛下有以使之然耶以為時然則堯舜在上便有夔稷湯文在上便有伊吕以至漢唐之明君我祖宗之聖朝皆有忠義賢德之臣布在中外君臣之際若腹心手足然君倡於上臣和於下主發於内臣應於外而休嘉之悳下浸于昆蟲草木千百世之下莫不慕之獨陛下以仁聖當御撫養為心而羣臣所以和之者如此夫非時然抑陛下所以駕馭之道未審爾陛下以爵禄名器駕馭天下忠良而使之如此甚非宗廟社稷之福也夫得一飯於道傍則遑遑圖報而終身饜飽於其父則不知悳此庸人之常情也今之食禄往往如此若臣所聞則不然君臣之義父子之道也故食其禄則憂其事凡以移事父之孝而從事於此也若乃思慮不出其位尸祝不代庖人各以其職不相侵越至於邦國善否知而不言豈有君憂國危羣臣乃飽食厭觀若視路人之事而不救曰吾各有守天下之事非我憂哉故知朝廷設官位有髙下臣子事君忠無兩心與其得罪於有司孰與不忠於君父與其茍容於當世孰與得罪於皇天臣所以不避萬死深冒天閽以告訴于陛下者凡以上畏天命中憂君國而下念生民耳若臣之身使其粉碎如一螻蟻無足顧愛臣切聞南征西伐者皆以其勝捷之勢山川之形為圖而來獻料無一人以天下之民質妻賣兒流離逃散斬桑伐棗拆壊廬舍而賣於城市輸官假粟遑遑不給之狀為圖而獻前者臣不敢以所聞謹以安上門逐日所見繪成一圖百不及一但經聖明眼目已可嗟咨涕泣而況數千里之外有甚於此者哉如陛下觀圖行臣之言十日不雨即乞斬臣宣德門外以正欺君謾天之罪如稍有所濟亦乞正臣越分言事之刑是時俠監京師安上門以疏及圖詣閤門投進不納遂於本門勾馬逓於銀臺通進司奏為宻急事疏入上覽畢反復觀圖長嘘者數四初韓維對延和殿上曰久不雨朕夙夜焦勞柰何維曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事願陛下痛自責己下詔廣求直言以開壅蔽大發恩令有所蠲放以知人情至是維又言近日畿内諸縣督率青苗者甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹屯苦夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚鋭至於蠲除租税寛格逋負以救愁苦之良民則遲遲而不肯發望陛下自奮英斷行之過而養之猶愈於過而殺人也上感悟即令維草詔二十八日詔出人情大悦三日大雨自俠上疏至雨纔及浹辰四月初七日早朝羣臣既賀雨上出俠所進圖宣示宰執且責之曰卿等毎言法度脩明禮樂興行民物康阜雖唐虞三代無以過今以外事如此丞相以下各謝罪是日有㫖放俠擅發馬逓之罪安石因遷定力寺求出其黨不樂爭言於上或以為心狂以為非毁良法或以為擅發馬逓驚御乞追逮所司勘罪御史臺直請以俠付臺推劾遂有㫖下開封取勘熈寧中龍圖閣直學士韓維乞省末事憂饑民劄子曰臣伏見累月以來氣令舛逆寒暄不常暴風數興雨不得下傳聞諸道州軍頗多旱暵螟蝗滋生寖難撲滅百姓艱食至有啖木皮者流離轉徙未有自生之路言之可為流涕陛下嗣位之初羣下翕然稱頌聖明人情既悦天道隨應日光清濶嘉澤屢降今者天道人情頓與始初不𩔖意者竊恐陛下言思視聴之間有所未當惟陛下端靜誠一思惟天戒專以百姓困窮為念君臣協心講圖惠政以救此急至於繁文浮議無益天下者且可一切罷置上以申陛下恭黙思道之志下以撫安元元仰答天意元豐元年河北路轉運使呉大忠上奏曰臣伏見朝廷比修常平之法將以抑兼并振乏絶可使民富而無離散失所之憂然行之累年雖䝉貸助之惠猶粒米狼戾而無歳月之儲一有凶災散亡道路臣嘗究其然矣時平日久文法濶疎小民不知謹身節用之道以惰為樂以侈相驕膳飲必精有一人而兼數人之食服御必華有一日而用數日之費況飲酒般樂游蕩無度畧無法禁安得不貧臣聞古者大夫無故不殺犬豕七十者始食鷄豚狗彘之肉今則庶人日以宰羊豕為食不縁賔祭不為養老安得芻豢而共之古者庶人五十可以衣帛黼黻綉繪以章有德今則朱紫之飾不問府史美錦文綺逮于臧獲安得女工而共之至於宫室輿馬器皿之奉率皆稱是而又釋老之徒齋薦㙮廟神祠巫祝鼓舞祈賽所費益以不貲故田野之民不安其業滅裂鹵莽從事於農所獲既以不足則不免貸於私家私貨不足又以貸於公府常平之息誠薄民貸於公者誠願然一入其手侈費者十有六七若博奕飲酒又不止此此殆法禁有所未具也臣愚伏願陛下深詔有司申明法令畧立制度禁侈費以為用財之法民間無職者皆書于籍任之以九職之事不能任則轉移執事又不能則給以常餼以共公上之役如是則游手有歸財不妄費富足之道足以馴致助成良法其防禁條目已具别奏伏望詔下有司詳擇立法推行天下神宗時監察御史裏行彭汝礪上奏曰臣聞天地萬物之數皆麗於五行故旱荒凶札饑饉疾疫雖盛世或有焉而人君者仰有以相之俯有以安之故民雖不幸猶亦不至於捐瘠也古者有鄉里之委積以恤民之艱厄門關之委積以養老孤縣都之委積以待凶荒夫能食之已足矣又各有所積焉盖如此所以為仁政之周也今雖有常平廣惠之制而所有不能供歳月之不足平時未嘗為計至於己迫而後為之其計不過強富人出粟而已富人之粟未集而饑饉之氣已聚而為疾疫怨呼疾痛之聲已復感而為旱氣矣人皆曰堯有水湯有旱此不足為陛下憂也為此言者非忠臣也堯湯蓄積先具故水旱雖久而民不散今一方不稔而民之骨肉至於相殘而強者白晝殺人於市以食今曰此無害此所謂罪歳也以臣所聞比年東南疫病浙東西旱荒為甚蘇州又其甚者也陛下以張諤安撫以陳愷賑濟以沈紳知州諤乖謬取笑於人多矣愷以違法不㢘聞紳以疲軟罷以一事推之則知陛下雖有不忍人之心安能及民也夫人勞苦倦極未嘗不呼天疾痛慘怛未嘗不呼父母今天下之民戴陛下如天愛陛下如親及不得則亦望於陛下而已臣聞大兵之後必有凶年盖其殺傷愁怨有以感之也今江淮雖薄稔然久饑已困之民種藝不及者衆瀕江之田又苦水潦米價益貴矣秋不雨冬少雪以此料之春夏之交將復有饑疫之憂願陛下申飭有司使早為之計也今官賣户絶田産所得者至薄而所失者甚厚以數百石之田而所得不過千緡冀再嵗之收則已足以當千緡矣此非有難見也臣欲乞罷賣官田盡收以待賑濟以户絶田産振民之老孤凶札亦理之所宜也隋唐之制雖不足語如義倉法非可廢也臣願取廣惠米散畜於里社而民助之其所斂以户之上中下與歳之豐耗為差大饑則發大熟之所斂小饑則發小熟之所斂而賑之取於彼散於彼於我無與也民亦無辭矣比之於己迫而後圖之者其利豈止於倍蓰哉惟陛下裁幸貼黄臣訪聞江南逐處科富民出粟有至千餘石民間有不能應副及至送納亦不及時矣臣觀民家治生雖有闕乏亦不肯出賣物産盖田利久長非止歳月之計今官中出賣實為失策義倉法本於民社立之頗如周官鄉里門關之制民有饑餓在處即獲口食不至流徙今立於民社切恐費人守䕶如秪於逐處僧寺及驛舍置倉則於事省徑亦不至勞於民矣鄭獬論河北流民劄子曰臣切見河北之民自去秋以來相攜老幼皆徙於南方纍纍道途迄今不絶不知幾萬户兹非細事也臣詢得其繇或云以嵗饑無食或云地震不得寧居或云河決失耕業或云以避塞河之役臣參考以計之若以歳饑則百十年来豐凶常事何昔之凶年猶得安居而今遽為去計乎若以地震則震有時而必止雖暫有不寧猶宜未至棄本土而去若以河決則恩冀德博罹害者宜遷而鎮定邢趙非河所界則又何為而輙去若以河役則朝廷已有詔罷而遷者至今不已由是言之盖其原起於唐州之開曠土而成於河北之譌言何者唐州官吏冒賞貪功遣牙校齎牓於三邊招誘户民十有餘年於是三邊始有遷民及去秋地震其父老皆言真廟時地震遂有澶淵之役今地復震北敵又將擾邊矣如何不為引避加以歳凶河決於是相牽連而大去之夫民故愚而無知一人揺之百人酬之一鄉之間但見南徙者衆故相隨而亦遷即詢究其所以遷之理則不出前之所言是彼亦未能熟較利害但云南方榖賤有曠土可為生耳若然者豈得縱其流亡而不為禁止乎河朔去歳雖被灾而諸郡亦有秋穫處民間未至横衢路而餓死易嬰兒以食借使今之有寒餓不能自活者雖縱而之南無害也至於中户以上乃連車牛負囊篋驅僕躍馬其資足以為養者又何為而不禁止端使流離而南徙乎屬者朝廷雖屢敕本道安集而至今去者如故此盖刺史縣令有不能者無方畧以安之耳朝廷誠能深責刺史縣令俾之從便宜務令安集勿令中户以上隨衆而遷刺史縣令有不能者則亟令監司舉劾别選有能者代之刺史縣令知懼則庶乎有為可以禁止矣或云遷者不可止止則餓死或急而為盜為患浸深臣以為寒餓者聴之去可以自資者留之今河北亦有常平粟未曽賑發宜舉以貸民今冬宿麥得雪向去收成則民復安堵矣兼聞河北便糴官價殊髙豪民亦有藏粟邀價者及官配糴甚急而粟價愈貴若便糴配糴宜一切罷之如又貸以常平粟則民間得賤粟可以自存矣或者又謂河北之民久離兵戰生息既繁遂不能相養譬之舊為家十口有田二頃今田不加多而増口為二十還值凶年故析其食口就粟南方適得其宜矣此又非通論二十口之息豈能一日而具何前日猶能相養而今日遂不能乎夫民者重遷如刺史縣令有安集之術則孰肯棄墳墓去親戚鄉井而輕為流民乎以此又知刺史縣令不為朝廷養民也北方之人乍入南地不習水土向春必生癘疾伏願陛下嚴立科罪下提刑轉運司責在刺史縣令隨宜處畫必令存留無得縱令流移庶幾河朔不為墟矣幸冀陛下留神特賜裁察獬又請駕出祈雨劄子曰臣竊以首冬已來久愆雨澤旱氣相薄屢發火災乗此春温恐生癘氣雖陛下焦心引咎夙夜祇懼天地四方靡神不禱霈發德音解釋纍囚肸蠁無應未見嘉澤下民狼顧實亦不寧臣欲望陛下暫飭鑾駕近幸神祠躬自䖍祈以表誠至必有美證期於旦夕況陛下宅憂踰年不出禁闥京都士民想望天表俾之一聞清蹕瞻見威顔民心感悦天意自解甘霈之來或可符應臣不勝拳拳右司諫蘇轍論久旱乞放民間積欠狀曰右臣伏見陛下以久旱憂勞禱請勤至自冬歴春天意未答宿麥枯瘁灾害廣逺民自近歳皆苦於重斂儲積空匱若此月不雨饑饉必至盜賊必起保甲之餘民習武事猖狂嘯聚為患必甚而陛下所以應天動民未有其實臣竊見去年赦書蠲免積欠止於殘零兩税至於官本債負出限役錢皆不得除放民有破蕩家産父子流離衣食不繼求死而不可得者買撲酒坊先因實封投狀爭氣務勝競設髙價既得之後利入㣲細不能出辦違限不納加以罰錢至於籍没家産杻械生蟣虱而不得脱者臣願陛下降哀痛之書應今日以前民間官本債負出限役錢及酒坊元額罰錢見今資産耗竭實不能出者令州縣監司保明除放使民得再生以養父母妻子朝廷棄捐必不可得之債以收民心民心悦附甘澤可致雖使天道幽逺雨不時應而仁澤流溢亦可以化服強暴消止盜賊臣謹按漢書文景宣元之間憂民之疲病毎歳輙弛租税減筭賦自損以厚下民戴其澤中遭王莽之變皆謳吟思漢漢已絶而復續夫漢世平安之日猶蠲必得之常賦以惠民而況當今旱勢未止災害方作前件欠負皆勢不可得奈何靳而不與哉伏願陛下斷自聖心特賜手詔無使有司吝於出納以廢格聖澤則天人不逺宜有善應謹録奏聞轍又乞賑救淮南饑民狀曰臣訪聞淮南久旱雨全未足二麥並已枯死浙中米價雖賤而運河無水客旅不至米斗直一百七十以來民間闕食甚覺不易而所在官吏並未見賑濟及奏請别作處置臣竊見頃立義倉至今已將十年所聚糧斛數目甚多毎遇災傷未嘗支散一粒民情深所不悦臣欲乞指揮淮南官司先將所管義倉米數隨處支與闕食人户兼將常平米減價出賣及取問監司州縣因何並不曽申請擘劃兼乞體訪諸路如有似此闕食去處一例施行謹録奏聞轍又言淮南水潦狀曰臣竊見淮南春夏大旱民間乏食流徙道路朝廷哀愍饑饉發常平義倉及上供米以濟其急淮南之民上賴聖澤不至饑殍然自六月大雨淮水汎溢泗宿亳三州大水夏田既已不收秋田亦復蕩盡前望來年夏麥日月尚逺勢不相接深可憂慮訪聞見今官賣米猶有未盡然必不能支持久逺臣欲乞朝廷及今未至闕絶之際速行取問本路提轉發運司令具諸州灾傷輕重次第見今逐州各有多少糧食可以賑濟得多少月日如將來乏絶合如何擘劃施行立限供報所貴朝廷得以預先處置小民不至失所謹録奏聞淮南轉運使蘇頌奏乞糶官米濟民疏曰臣竊聞日近甚有近北灾傷人民流移往隣路州軍逐熟尋有朝㫖下諸路令州縣常切存恤恭惟聖恩溥施靡所不逮然恐州縣拘文不能上副仁憫之意何則其流民所之惟是歳豐物賤便為安居之地今並淮諸郡雖稍登稔若食口既多必是物價騰踴萬一將來秋成失望漂泊之民未有歸業之期坐食貴榖便見失所彼時須煩縣官賑救為惠差遲則其敝益甚矣臣以謂存恤之法莫若先平物價欲物貨之平則莫若官為糶給使之常食賤價之物則不覺轉移流徙之為患也臣欲望特降朝㫖應有流民所聚州縣權將上供或軍糧米斛比見今在市實直量減分數估定價例將來更不得添長專差強幹官一員置場出糶直候流民歸業日即罷其約束事件並依昨來在京糶塲施行收到價錢却委轉運司和糴斛斗充數如此擘畫比之出粟賑濟所費寡而所惠博惟朝廷垂意幸甚知諫院陳襄乞振恤大名等州被水灾之民劄子曰臣訪聞黄河近因許家港決潰東流經歴大名恩永靜滄德博數州軍之地水勢瀰漫五百餘里居民田廬縣鎮淹没蕩盡自滄而北灾害尤甚死者不知其數而存者已無生業伏望聖慈特降指揮下本路轉運使副及提㸃刑獄司分頭詣水災州軍多方存恤被灾之民放免租税及振貸糧食庶不致失所仍乞先次計度修復自河以南一帶堤岸防備來年夏秋漲溢為德博之患歴代名臣奏議卷二百四十四
