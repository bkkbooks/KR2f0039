body:
  text: 歷代名臣奏議卷七十三明楊士竒等撰儲嗣宋仁宗嘉祐元年知制誥吳奎上奏曰臣聞王者以社稷為本宗廟為重社稷必有奉宗廟必有主今陛下在位三十四年而嗣續未立天地祖宗開發聖意不然何故陛下無大過朝廷無甚失輒降如此之災異乎在禮大宗無嗣則擇支子之賢者漢成之於哀帝孝和之於安帝皆兄弟之子也若以昭穆言之則太祖太宗曽孫以近親言之則太宗之曽孫陛下所宜建立用繫四海之心者也陛下春秋猶盛嗣有皇子則退所為後者頗優其禮於宗室臣子之心誰曰不然陛下勿聽隂邪巧計以誤大事假如倉卒之際柄有所歸致社稷宗廟不血食書之史册為萬世憤臣不願陛下以聖明之資當危亡之比也此事不宜優遊願速裁定定之不速必有姦人隂賊其間然亦不獨陛下之過輔弼之臣未聞力爭致宗祀無本鬱結羣望感召沴氣毒流天下所宜深罪推之咎罰無大于此祕閣校理李大臨上奏曰臣竊以比來大雨入都門壞廬舍溺人民祖宗以來未之有也謹按漢書五行志曰簡宗祀不禱祠則水不潤下今朝廷祭祀非不恭時享非不至而反謂簡慢者何皇嗣未立主鬯有闕故也夫水萬物之本太子天下之本今天下之根本未立上天深示災變伏望陛下鑒天之戒早擇儲嗣以前定天下之心古者天子即位必有儲副以受宗廟易曰主器者長子又曰明兩作離大人以繼明照四方是天子必有儲副而天下獲安今儲副未定祭祀幾廢故天之變示深切著明也伏乞陛下無逆天時為社稷蒼生留意焉臣之朴忠憂國大計昧死以聞觀文殿學士昭德軍節度使知并州龐籍上奏曰臣伏以中外之任各有分局職外陳事皆為出位在臣則不然早自寒儒偶升朝序荷陛下千世之遇置于侍從付之權任遂登樞府逮冠台司臣之椎愚進無他路凡在恩擢莫非帝力今身已頽憊猶居一方上將之位則國家大事敢以守屏自外忍默不言上負大恩慚責重矣恭惟陛下至聖臨御三紀日謹一日德全業大憂勤機務焦勞夙夜今春之初偶嬰微疹萬方臣庶心如焚灼祈禱穹昊冀集福聖躬天地降休廟社垂慶藥劑有喜亟臻平復夀康之永人神有賴然臣今昧萬死而思有所陳者蓋以陛下儲嗣未立宫坊虛位誠願陛下深思祖宗統緒之重下察臣民系望之懇發日之明親加精慮歷選宗室宜為嗣者速決聖斷制命一出四海歡忭天序既定羣心大安如此則陛下增基業之固奉宗廟之孝無大於此也至如天禧之時先帝違豫溥率之誠雖懷憂戚而中外帖然安心者以陛下在東宫故也此理昭昭于耳目矣伏見唐世方鎮之臣上儲宫者數人當時不以為非而並蒙采用遂得福歸王室況臣感主之深愛君之切茍以益國而死愈于負恩而生所以冒重禍而不疑不悔也且臣年垂七十逼于休退固無他希冀惟陛下保萬世之業蒙無窮之幸乃臣之大願矣瀝血上控祈賜裁擇不勝輸誠待罪之至起居舍人知諫院范鎮奏曰伏惟陛下置諫官者為宗廟社稷計也諫官而不以宗廟社稷計事陛下者是不知諫官之任也陛下不以臣愚任之諫官臣敢不以宗廟社稷計獻于陛下乎二月中臣使契丹還過河北河北之人藉藉紛紛皆謂陛下方不豫時有言曰我為宗廟社稷計以廣孝道憂勞而成此疾陛下所謂宗廟社稷計而憂且勞者得非皇嗣未立乎是時中外皇皇莫知所為而陛下方以宗廟社稷為念是陛下之計慮至深且明也今陛下既已平復御殿聽政願推向者之言而終行之行之之術非明則不審非果則不決惟審與決而宗廟社稷之計定矣方今祖宗後裔蕃衍盛大信厚篤實伏惟陛下擇其尤賢者優其禮數試之以政與圖天下之事以系天下之心異時誕育皇嗣復遣還邸則真宗皇帝時故事是也初周王既薨真宗皇帝取宗室子飬之宫中此天下之大慮也太祖皇帝捨其子而立太宗皇帝者天下之大公也宗廟社稷之至計也伏惟陛下觀太祖皇帝之公心考真宗皇帝時故事斷于聖心以幸天下臣不勝至願稽之於昔參之於今謀之於心書之於疏疏成而纍月不上者大懼無益於事死今之世以纍陛下之明伏惟赦臣萬死之罪審之決之以定宗廟社稷之至計非獨臣蒙更生之賜乃天下之人之心也不勝區區之愚鎮又奏曰臣聞傳曰決者智之君需者事之賊蓋言有所需待而不決則害智而賊於事也季文子三思而後行孔子曰再斯可矣何則再思則是非定至于三則惑況過於三者乎然則是非已定而復思之者惑也孔子之所不與也臣近奏參考祖宗故事選宗室子優其禮數以係天下人心俟有聖嗣復遣還邸此是非之至辨而無可惑者及今月餘不決故天雨而不止雲隂而不解此其應也陛下方不豫時尚不忘宗廟社稷之計而形於言今已平復其肯忘宗廟社稷之計而不行之邪必不然也臣恐大臣不為陛下將明之爾陛下恭事宗廟仁覆海內上天之報必生聖嗣臣今所請乃祖宗時故事以權係天下人心者何惑而不為之乎伏惟上觀天意久雨之變速加處定以示中外臣不勝大願鎮又奏曰臣伏見天下以水災奏者日有十數都城大水天雨不止所謂水不潤下也傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下陛下恭事天地神祇肅祇祖宗山川之祀罔不秩舉至於號令必順天時非逆天時也非廢祭祀也非不禱祠也然而上天出此變者曉諭陛下以簡宗廟乎陛下即位以來虛副二之位三十五年矣臣近奏擇宗子賢者優其禮數試之以政以繫天下人心俟有聖嗣復遣還邸及今兩月餘日不行正謂簡宗廟也此天變所以發也伏惟陛下深念宗廟之重必有副二以臣前所上章降付執政大臣速為裁定以塞天變鎮又奏曰臣前後六奏宗廟社稷大計四奏進入兩奏奉聖旨送中書陛下不以臣章留中而令送中書者是欲使中書大臣奉行也臣兩至中書而中書大臣迭相設辭以拒臣以此觀之是陛下欲為宗廟社稷計而大臣不欲為也為大臣而不欲為宗廟社稷計非所謂為大臣也臣竊原大臣之意恐行之而事有中變故畏避而為容身之計也今星變主急兵萬一兵起大臣家族首領顧不保其為身計亦已踈矣就使事有中變而死陛下之職與其死於亂兵不猶愈乎乞陛下以臣此章示大臣使其自擇死所鎮又奏曰臣伏見天禧三年六月彗星見未幾而册陛下為皇太子方是時真宗皇帝只有陛下一人天下人心已有所係然真宗皇帝遽立陛下為皇太子者欲預正名分以塞覬覦之路也非私於陛下也為宗廟社稷之計與應天譴之變皆當然也今陛下未有皇嗣天下人心無有所係故天初見流星繼以大水告陛下以簡宗廟之罰陛下君臣不知覺悟故天又出彗以告陛下而陛下君臣晏然復如前時此臣當言之責所以恐懼而待罪也初流星示變時大臣豈意必有大水乎及大水入都城大臣親領徒役以捍水患今大水已定而不知致大水之本本由簡宗廟而不為宗廟計故天又出彗也彗之變主急兵大臣又不知先定大計以備兵變及兵如水之至而後親捍之雖勤勞如捍水之時亦無益矣陛下為民父母已視民有壓溺之患又忍使遭戮辱之禍而不為宗廟社稷計以答天譴乎鎮又奏曰近除臣侍御史知雜事本臺見闕官奉聖旨令受敕告速赴臺供職者臣近以都城大水及彗星適見為變非常故乞速定大計以答天譴闔門待罪祈以死請臣人微言輕固不足以動聖聼然所陳者乃天之戒陛下縱不用臣之言可不畏天之戒乎彗星尚在朝廷不知警懼彗星既滅則天不復有所告戒後雖欲言亦無以為辭此臣所以懼恐而必以死請也今除臣侍御史知雜事則臣之言責益重於前所有告敕未敢祇受鎮又奏曰臣伏見古之人有以死諫忘其身之計唯宗廟之是憂者蓋有官守與忠義之所發也臣今日之為亦猶古之人也有官守也忠義之所發也肯愛其身而忘宗廟之憂以自愧古人乎所以前後奏議者凡十一上矣是皆陳天地之大變與述天下之人之心也伏乞陛下以臣前所奏議盡付執政大臣速加處決以應天變以慰人心以為宗廟社稷之計臣之區區不勝大願鎮又奏曰臣前後三準中書劄子聖旨指揮令臣疾速赴臺供職臣未敢從命者非慢陛下之命也欲陛下行臣之言而為宗廟社稷計也夫君命有固不可違者亦有固可違者君命是而臣執之非者固不可違者也違之誅之可也君命非而臣執之是者固可違者也違之寬之可也伏乞陛下問大臣臣言是邪非邪如以臣言為是伏乞寬臣之罪因此大禮擇定副二誕告中外以為宗廟社稷計以臣言為非伏乞誅臣以為妄言之戒所有知雜御史之職臣未敢輒受鎮又奏曰臣前後三準中書劄子聖旨指揮令臣疾速赴臺供職有以見陛下愛臣之深也初臣待罪陛下不加以罪而又遷擢之臣未即赴職而陛下又三降聖旨敦趣之是陛下之恩意於臣篤且至也而臣終不敢輒輕就者自陛下擢臣為諫官臣已將身許陛下也今日之事乃是臣致命之秋陛下不用臣之言賜臣之死則臣一身之輕何足恤也陛下感悟臣言而為宗廟社稷計則臣之言甚可重也不以一身之輕而廢甚可重之言者臣之職也臣之身一人之私也臣之言衆人之公也宗廟社稷之計也陛下與其恤一人之私孰若行衆人之公以為宗廟社稷計誠能因大禮定大議決然大告於庭則陛下收納諫之名以慰天下之心豈不美哉如是而臣就死無所憾也生而進之可也退之亦可也於陛下職事無所負也於臣之初心亦無所負也鎮又上奏曰臣待罪中蒙除知雜御史七降聖旨臣雖甚愚知陛下必以臣言為是然久而不知決者竊恐左右近習以為陛下已安不用為此以惑陛下是皆佞邪無識之人不可不察古人所謂小人愛人以姑息者正謂此輩臣愚謂陛下既安尤當為之以答天意天意報貺必蒙子孫無疆之慶此天人相與之際必然之理願陛下黜小人姑息之淺見察臣之至言則大臣不敢畏避必能盡力輔佐陛下以為宗廟之計臣前後上章凡十九次竊恐留中大臣不盡得見今具録進呈乞付中書樞密大臣同共參議有異議者乞與臣廷辨謂臣不然即乞明加臣罪解臣言責臣之至情盡在於此二年翰林學士歐陽修上奏曰臣聞言天下之難言者不敢冀必然之聽未必聽而不可不言者所以盡為忠之心況臣遭遇聖明容納諫諍言之未必不聼其可默而不言臣伏見自去嵗以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而愚誠懇至天聼未回臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近已出降臣因竊思人之常道莫親於父子之親人之常情亦莫樂於父子之樂雖在聖哲異於凡倫其為天性於理則一陛下嚮雖未有皇嗣而有公主之愛上慰聖顔今既出降漸疏左右則陛下萬幾之暇處深宫之中誰可承顔色臣愚以謂宜因此時出自聖意於宗室之中選材賢可喜者録以為皇子使其出入左右問安侍膳亦足以慰恱聖情臣考於書史竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公卿奏事而已必有儒臣學士講論於間宴又有左右侍從顧問語言其入而居內也不止宦官宫妾在於左右而已其平居燕寢也則有太子問安侍膳於朝夕其優遊宴樂也多與宗室子弟歡然相接如家人計其一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者往往仰瞻天顔而退其甚幸者得承一二言之德音君臣之情不通上下之意不接其餘在庭之臣儒學侍從之列未聞一人從容親近於左右入而居內則至於問安侍膳亦闕於朝夕則陛下富有四海之廣躬享萬乘之尊居外則無一人可親居內則無一人得親此臣所以區區而欲言也伏惟陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛群臣屢言大議未決臣前所奏陳以謂未必立為儲二而且飬為子既可以徐察其賢否亦可以待皇子之降生於今為之亦其時也臣言狂計愚伏俟斧鉞仁宗春秋髙未有嗣集賢校理韓宗彥上書曰漢章帝詔諸懷妊者賜胎養榖人三斗復其夫勿算一嵗著為令臣考尋世次帝八子長則和帝而質安以下諸帝皆其係胄請修胎飬之令且曰人君務繁育其民則天亦昌衍其孫子矣三年吳及改右正言上疏曰帝王之治必敦骨肉之愛而以至親夾輔王室詩曰懷德惟寧宗子惟城故同姓者國家之屏翰儲副者天下之根本陛下以海宇之廣宗廟之重而根本未立四方無所係心上下之憂無大於此謂宜發自聖斷擇宗室子以備儲副以服屬議之則莫如親以人望言之則莫如賢既兼親賢然後優封爵以寵異之選重厚朴茂之臣以教導之聽入侍禁中示欲為後使中外之人悚然瞻望曰宫中有子矣陛下他日有嫡嗣則異其恩禮復令歸邸於禮無嫌於義為順弭覬覦之心屬天下之望宗廟長久之䇿也既而又言開寶詔書內侍臣年三十無飬父者聽飬一子為嗣并以名上宣徽院違者扺死比年此禁益弛天地之理隂纍聖嗣願詔大臣明示舊制上順天意以綏福佑四年右諫議大夫權御史中丞包拯上疏曰臣伏讀前史見聖王之御天下也初纂大業即建儲二蓋所以安億兆危疑之心絶中外覬覦之望乃有國之常典而歷代所遵守者也伏自陛下紹隆丕搆已逾三紀仁孝恭儉之德格于上下孜孜求治未嘗一日少怠兹固群臣仰望清光之不暇但以東宫虛位日久天下之心憂危至切雖前後臣僚論列者多矣卒不聞有所處置未審聖意持久不決者何也夫萬物皆有根本而太子天下之根本也根本不立禍孰大焉今既皇嗣未降亦當采詩人盤維之義固天下根本之地不可忽也臣願陛下特出宸斷密與執政大臣協議精擇宗室中親而有德望衆所推重者優以封爵置在左右日加訓朂仍與增補僚屬選用厚重方正之士令就禁邸諭以善道益其聞見如此則不惟表異親賢抑亦鞏固王室可以挫姦雄觀望之意也俟皇嗣誕育則以優禮而進退之此亦古今之通義陛下何憚而不為哉伏況藝祖以艱難得天下以聖繼聖傳於陛下垂及百年陛下豈可不念祖宗之業當傳之無窮若乃徇目前之適忽經久之䇿必稔禍於將來恐非社稷之福也陛下得不留神而熟慮乎臣以踈外之迹纍當言責之任今陛下以臣愚直擢在憲府若畏罪不言是上孤陛下委用之意臣不忍為惟陛下審其當否斷而行之則天下幸甚拯嘗奏曰東宫虛位日久天下以為憂陛下持久不決何也仁宗曰卿欲誰立拯曰臣不才備位乞豫建太子者為宗廟萬世計也陛下問臣欲誰立是疑臣也臣年七十且無子非邀福者帝喜曰徐當議之時群牧使宋祁卒上遺奏曰陛下享國四十年東宫虛位天下係望人心未安為社稷深計莫若擇宗室賢才進爵親王為匕鬯之主若六宫有就館之慶聖嗣蕃衍則宗子降封郡王以避正嫡此定人心防禍患之大計也六年翰林學士胡宿上奏曰臣被旨令為青詞禱諸陵山川以求儲嗣臣聞漢文帝二年有司請豫建太子是時文帝已有元子猶對有司稱楚王吳王淮南王皆秉德以陪朕何為不豫哉太祖皇帝感昭憲太后遺言捨魏王而立太宗自開闢以來神武英斷未有如太祖皇帝陛下必待聖嫡然後擬議非居安思危之道願察宗室敦厚慈仁可以為副君者立之則儲二之分定天下之心安矣欲望聖慈特賜睿斷臣不勝區區之情首相韓琦上奏曰臣竊見近嵗以來內外忠孝之臣以陛下臨御四海已四十年而皇嗣未育天下無所係心不避重誅繼有論奏乞於宗室中擇幼而可教者權為嗣陛下慈仁崇儉冠絶今古天監至明非晚必生聖子以為廟社無疆之慶至時宗室中權為嗣者優加職秩使之退就宫邸誠善議也臣愚竊怪陛下何疑而不行之然兹事至大當獨斷於聖心雖至親至近之人不可預議如陛下素有所屬已得其人則望宣示中書樞密院使奉而行之以慰中外之意若謂賢愚難審選擇當謹則臣曽乞於內中建學取宗室中幼而謹厚勤於為學者置於內學陛下每於聼斷之暇或休假之日親幸學舍觀其道業進退應對長短不年嵗間陛下必盡知其能否然後聖慮取其可屬者權而命之則無不當矣臣蒙陛下非次拔擢使待罪宰相思有以報上而事無重於此者故昧死盡言惟聖度寬納則天下幸甚琦遷昭文館大學士監修國史時帝既連失三王自至和中得疾不能御殿中外惴恐臣下爭以立嗣固根本為言包拯范鎮尤激切積五六嵗依違未之行言者亦稍怠至是琦乘間進曰皇嗣者天下安危之所係自昔禍亂之起皆由䇿不早定陛下春秋髙未有建立何不擇宗室之賢者以為宗廟社稷計帝曰後宫將有就館者姑待之已又生女一日琦懷漢孔光傳以進曰成帝無嗣立弟之子彼中材之主猶能如是況陛下乎願以太祖之心為心則無不可者又與曽公亮張升歐陽修極言之會司馬光吕誨皆有請琦進讀二疏未及有所啓帝遽曰朕有意久矣誰可者琦皇恐對曰此非臣輩所可議當出自聖擇帝曰宫中嘗養二子小者甚純近不慧大者可也琦請其名帝以宗實告宗實英宗舊名也琦等遂力贊之議乃定英宗居濮王喪議起知宗正琦曰事若行不可中止陛下斷自不疑乞內中批出帝意不欲宫人知曰只中書行足矣命下英宗固辭帝復問琦琦對曰陛下既知其賢而選之今不敢遽當蓋器識逺大所以為賢也願固起之英宗既終喪猶堅卧不起琦言宗正之命初出外人皆知必為皇子不若遂正其名乃下詔立為皇子吕誨上奏曰臣竊聞中外臣僚屢有密疏以聖嗣未立精擇旁繼指斥祖宗分别裔緒臣子之心詎當如是蓋憂懼隕穫發於忠誠而深虞機會之失也雖然宗室有親踈天資有賢愚委付親賢當出聖慮人臣安得陳露事機以萌非冀惟陛下思忠言奮剛斷遏未然之亂無使後時此防微之深慮也又聞近日奏彗星躔心宿請備西北謹按天文志三星天王之正位中曰明堂前為太子後為庶子星直則失勢明則見祥質之知星者以謂既直且暗而妖星所犯變見之驗恐不在西北臣又聞自夏秋京師淫雨諸路水潦數州地震江河泛溢民户墊溺斯隂盛之沴固有冥符唐神龍初洛水暴盛宋務光曰自登皇極未建元良非所以守器承祧飬德贊美姻戚之間謗議所集積疑成災厥罰斯至乃已然之明驗有以知皇天愛陛下之深數以災異感動若尚不加警悟殆非畏天保國之深慮也臣又聞近宗室中訛言事露流傳四方人心驚疑是亦隂沴之應窺覦之心不可不知其漸伏望陛下念根本之重為宗廟之計檢會前後臣僚奏議延對大臣周爰忠讜審擇宫邸以親賢稽合天意況宗枝蕃茂豈無賢德上副聖念脫或宸謀已定當使天下共知以安久系萬一姦臣隂有附會陽為忠實以緩上心此最為患之大者不可不察也漢成帝惑王根邪説捨中山而立定陶及孝安之際梁冀姦謀貪樂安沖幼而畏清河嚴明卒至於亂茍有正人讜論則東西二京基祚可量哉惟陛下念祖宗造宋之艱難鑒成安隳漢之基祚窒姦臣附會之漸絶後世窺覦之患早為定斷慰安人心天下大幸同知諌院吕誨又上奏曰臣伏覩淮陽郡王宫置翊善侍講等官又聞翊善王陶等請郡王當拜禮者臣竊思之蓋名有不正禮固失宜敢不論列上裨宸聼今王出閣儀非開府當且設師友未宜建置僚屬國朝至道元年中書奏案唐文宗朝李石言太子有侍讀諸王亦有侍讀無隆殺之禮請改為奉諸王講讀皇姪皇孫是環衛之職請以教授為名從之先帝為夀春郡王命張士遜崔遵度為友至天禧中士遜為諫議大夫兼太子庶子詣資善堂參見猶令升階列拜自是始有跪受之禮事體甚明臣欲乞朝廷先正陶等職任名位既正禮分自安又況郡王年已長立當早出閣以奉朝請如此開府建官翊善侍講自為寮屬於禮宜矣殿中侍御史裏行陳洙上奏曰臣聞孟子之言曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義可也臣官為御史身有言責當世之事繫安危興亡之本原者計身而不言則失事君之大義切言而不避則蹈死亡之顯誅臣敢捨生取義攄瀝肝膽仰聞於陛下誅之容之惟君父命伏以陛下仁侔帝堯孝同周武體元居正已四十年惠滂澤流浹民肌骨陛下視億兆之人如赤子億兆之人視陛下如慈父未有為人之子而不憂其父之憂者也天下之本未立吾君之子未育此天下所以皇皇而同慮也臣輒探天下之心採天下之論而開陳之方今皇嗣未降人心未安公府大臣無敢言者朝廷安危莫大於是歷代治亂之迹甚明臣不復條舉姑借東漢之事言之順沖質之際漢祚幾絶清河王蒜最親賢而不得立姦臣梁冀立蠡吾侯志是為威帝忠臣杜喬李固雖力爭就死曽何益於漢哉威帝既立政移五幸刑淫三獄而宗社自此危矣迹其所以然蓋辨之不早計之後時也嚮使李杜之䇿行於前梁冀之謀不得用則炎厯長久其可量乎思東漢之事則知姦邪之臣幸時失制廢明立昏棄長扶幼以危亡其邦家皆可見也然則可不預為久安之䇿哉臣愚伏願陛下決自清衷發於聖斷擇宗室之賢者立為皇子置之左右使日聞陛下之訓言日觀陛下之德政則天下之憂去而姦臣之謀戢矣皇天輔德其應如響陛下至仁至義至慈至孝行將天錫聖嗣繼照四海復俾宗室退還舊藩九州四海之人孰曰不然夫先機而謀則事克濟失時而慮則禍已萌臣失今不言而異時倉猝言之不過能效李杜之死耳曽何益於朝廷哉陛下如不亮臣愚忠以臣為懷異日之圖莫若先殺臣之身而用臣之言臣雖死之日猶生之年也伏望聖慈宣示臣章付執政大臣而行之天下大幸七年右正言王陶上奏曰臣伏覩自至和中聖躬不豫之後天下之人顒顒惴惴無所寄命日望上穹眷命降生聖嗣內承九廟祀享之重外安四海億兆之心天貺莫期未如民志朝廷百執事州郡之吏下至韋布草萊之士抗疏交章引古今陳災異請擇宗室親賢早建儲嗣危言切語感動天聽者以數百夫為是議者豈皆懷不忠不孝為姦利託附之人哉蓋發於至誠為宗廟社稷無窮大計他日四海生靈死亡之命豫求安全深思逺慮而已陛下納諫從善博通古今治亂之要知聖人先天而天不違後天而奉天時之道在乎順民欲而安衆心也故嵗親發德音稽唐故事擇宗子使知宗正寺上以先後天心導迎景貺而俟與子之祥次以尊崇宗廟欽重祭享而修主鬯之職下以順恱人情表的聖意而示強宗之勢中外聞之咸謂此舉設施安穩不驚人耳目而天下搖搖之心一旦而㝎他日聖嗣降育則稍遷其秩使歸本邸進退之命無傷國體莫不稱慶陛下有堯之至仁舜之大孝漢文之恭遜而睿謀英斷非近代中庸之主所可跂及厥後寖聞稽緩四方觀聽豈免憂疑或罪宗實以為自唐以來判宗正寺者皆用宗子求之典故乃一尋常差遣何必過為辭避或者流言云事白宫中嬪御宦臣姑息之言聖恩因而微惑且婦人近幸不識國家大計茍務一時慰恱陛下而不知返沮壞美政暌隔英斷為害甚大也風聞宗實自有此命而來夙夜恐懼閉門不敢見人昨自二月服除今半年有餘矣臣恐天下之人謂陛下始者順天心人欲而命之今者聽左右姑息之言而疑之不獨百世之後使人歎息聖政始卒之不一亦恐自今逺近中外姦雄之人得以窺伺間隙矣自古天下禍亂之始未有不由繼嗣不立付屬之心不豫定而遂致後世爭奪危亡使天下赤子糜爛塗地而受弊者也況數嵗以來災異頻數不可勝紀今春徐陳許蔡逮京畿之民訛言相傳掘土而食近又龍鬪於南京之舊驛盛夏火王金當消又太白芒角盛大陵犯熒惑又太白經天與嵗星晝見天地人事皆見變異其占為兵為凶為人心不安為甚可懼太史必有以其術為陛下言之者陛下於此時豈可尚復優遊不斷恐懼修省急答天戒哉夫天下者聖祖神宗之天下傳至陛下使陛下永置生民於安全之地陛下當思先帝付託之重使宗廟社稷生民有所依賴天下忠臣節士有所取正無令漢成帝獨有美名也前日未命宗實人人言早建儲嗣今日乃無一人敢言者非今日之人不忠蓋前日未有主名泛為公言而陛下不疑也今日補一宗正官雖非繼嗣似有主名又陛下猶豫遲疑自冬徂秋十月矣中外之人無貴賤賢愚人人自顧私計懼陛下見疑獲罪不敢出一言但日聽朝廷所為以卜治亂而已臣職為諫官倘又不言則誰為陛下言者故臣區區憂國之心顛沛倣徨而不能自已也仁宗春秋髙皇嗣未立監察御史傅堯俞請建宗室之賢以慰天下望及英宗為皇子有司闕供餽仁宗未知堯俞言陛下既以宗社之重建皇嗣宜以家人禮使皇子朝夕侍膳左右以通慈孝之誠今禮遇有闕非所以隆親親重國本也於是詔有司供具甚厚英宗初即位同知諫院吕誨上奏曰臣竊以事之遽者步寧思於中矩心之切者言何假於文為況任居言責世有憂危焉敢恝然自持為全身之計哉臣以謂王者所以尊髙於人上慘舒於天下以賞罰之柄專其有也故威福不可移於下謹重操守而已恭惟陛下踐祚以來聖體違豫雖天光臨下而德音鮮聞萬機之事未嘗可否悉付中書密院然皇太后關決於中自匪輔臣雖承旨兩制近侍亦不得造簾箔之下況疏逺之臣耶如是爵賞刑威一歸於政府盡公則已脫或差謬何繇取正下情不無於蔽壅所以中外慊然未安者此也尚賴忠良一意上下無間萬一姦邪得進盜弄威福勢不可不防其漸也為陛下謀者莫若早建元良自輔號令威福自中而出人知所歸則下無異心此當今之速效也漢文帝即位之初有司請豫建太子文帝英睿之君景帝賢明之嗣尚以不豫為憂誠有謂也況淮陽王天資敏悟位當冢嫡速宜建立以固本根旁絶窺覬慰安人心斯萬世之慮也伏望陛下大開聰聽俯納愚忠審操柄不可移於下思機會不可失於時法漢文豫建之䇿為廟社長久之計上有聖后之翊輔下有元良之倚賴陛下髙拱巖廊仰成庶政臣私謂雖泰山之安莫安於此也清靜不言而化人神胥恱天意昭輔勿藥之喜計日可期天下幸甚誨又上慈聖皇后乞調治聖躬建立儲副奏曰臣竊以兩漢而後諸侯王入繼聖統者甚衆或以功或以賢或以親或以黨四者之繼隆替之所係以功與親賢者何嘗不興隆於寶緒繇黨附而至者未有不基乎禍亂哀平威靈之類是也千百載之下為之監戒今上生而敏睿天資英哲先帝知其厯數在躬又當近屬實以親而賢授之寶器及誕告于外歡聲翕然殿下以積勳之後配德仁宗主宣隂教天下蒙福上自潛德之初殿下鞠育保護者三十年矣先皇厭代宣導遺旨掌握機柄佐佑聖嗣克安天下永我帝業丕功茂實固不待愚臣一二而談矣上違豫而來重煩聽斷庶務允輯中外賴焉比聞流議宣傳上疾未間言或荒忽承顔之禮時有所闕殿下幾至不能容覆外臣罔測謂之然矣臣竊慮小人乘間幸兩宫如是隂為交鬪以生他事殿下察其素履知其有疾故當責忠臣之輔助擇太醫之調理又聞上意自倦服藥以致醫工久無效驗然病者苦其瞑眩斯亦常情誠恐奉御之人但能備禮不敢強以服餌積日之深其誤不細惟殿下廣乎容納之度忘其惰慢之禮親閲湯劑力為調治強之以嚴威撫之以恩愛如此人神和悅得不降祐上之起居必遂安適不然恩禮中闕慈孝兩失人言不已其如天下何其如宗廟何其如先帝何三十年保育之功一朝而棄臣竊為殿下惜之臣重思療治之法即如是言萬世之計敢不為殿下陳論漢馬皇后畢明帝世克全美德以至鞠飬章帝勞悴過於所生母子慈愛始終無纎介之隙章帝終為賢聖之主其保助亦已明矣史册書美世逺益光臣伏願殿下循修以為法度念先帝之顧體聖躬之憂危宫中間言不可不察方四海顒顒日期振治萬幾取決不可持疑雖神宇暫勞而宋祚安矣俟上躬平和還居清淨愈怡夀考豈不休哉況淮陽王及諸孫天資淳篤宜均撫育以盡愛慈繼繼承承本根為重儲副之位安可暫虛殿下宜上承天意下順人心謀乃輔臣助成君德早議建立旁絶窺覦則廟社之福天下之幸知諌院司馬光上劄子曰臣伏見陛下差直史館王陶充皇子伴讀祕閣校理孫思恭充本位説書此誠國家之首務聖哲之逺圖然臣聞三代令王置師傅保以教其子又置三少與之燕居至於左右前後侍御僕從之人皆選孝悌端良之士逐去邪人毋得在側使之日見正事聞正言然後道明而德盛心愈而體安福被兆民功流萬世此教之所以為益也今陶等雖為皇子官屬若不日日得見或見而遽退語言不洽志意不通未嘗與之論經術之精微辨人情之邪正究義理之是非考行已之得失教者止於供職學者止於備禮而左右前後侍御僕從或有佞邪讒巧之人雜處其間出入起居朝夕相近誘之以非禮導之以不義納之以諂諛濟之以詐偽雖皇子資性聰明端慤難移然親近易習積久易遷諂諛易入詐偽易惑如此則雖有碩儒端士為之師傅終無益也臣聞孟子曰雖有天下易生之物一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣又曰一齊人傅之衆楚人咻之雖日撻而求其齊言不可得也臣愚伏望陛下多置皇子官屬博選天下有學行之士以充之使每日在皇子側與皇子居處燕遊講論道義聳善抑惡輔成懿德其左右前後侍御僕從亦皆選小心端恪之人使所屬官司結罪保明然後得入仍專委伴讀官提舉覺察若有佞邪讒巧之人誘導皇子為非禮之事者委伴讀官糾舉施行即時斥逐不令在側若皇子自有過失再三規誨不從者亦聽以聞如此則必進德修業日就月將善人益親邪人益踈誠天下之幸也大理評事趙彥若孝友溫良謹潔正固博聞強記難進易退國子監直講李實好學有文修身慎行祕閣校理孟恂清純愷悌始終如一此臣之所知也伏望陛下擇此三人及廣求其尤以備皇子官屬臣推心盡忠不敢形迹僭越妄言伏俟譴謫殿中侍御史傅堯俞上奏曰臣竊嘗讀傳記採國家之要務見聖人之教其子也未有不思所以護其闕而養其全是以事作軌儀物為防檢蓋夫恩惟父子義則君臣必恩義之兩行實古今之通道天下之本庸可易乎故滯愛生愆具存規誡異宫而處用别嫌疑臣雖至愚輒有深慮竊見淮陽郡王爵分茅社位列鼎司體何但於勝衣年已踰於志學雖即外傅尚居中禁臣謂非所以養其德望而廣其嚴恭者也伏願陛下稍抑私情務存大體俾之出外居别館稍親諸務問安內寢著為定規然后飲食起居必有常度左右前後皆用正人上以隆父子之恩下以著君臣之義養全教本此其始乎治平二年監察御史裏行吕大防上奏曰臣伏覩皇子頴王以元子之重幼年盛德出閣開府二年于兹雖陛下聖心謙遜未遑正位東宫而社稷之本天下之望實有繫焉至于師友寮寀宜用道德英俊一時之賢或以方嚴見憚或以行義可法庶可以行輔導之職發揮皇子聰明仁義之姿屢觀前古未嘗不謹於此故在虞則有夔周有周召史佚太顛散宜生閎夭漢則有留候四皓二疏石奮丙吉韋玄成鄧禹桓榮晉則有山濤張華王導賀循皆以元臣巨儒輔正儲二故宣廣言於宣帝曰太子國儲副君師友必天下英俊張佚言于光武曰為天下立太子則宜用天下賢才此可見其遴選之意所以重國本而尊宗廟也竊見近除頴王府記室陳薦侍講孫固道義無聞學問至淺初薦之被選已為時論所非而固之獲進重取識者之笑皆以為諂事公卿致身於此又安能儀刑藩邸輔翼元良也哉臣愚以為宜飭輔臣更選經行修明可為師範者以備王府官屬薦固之才量其所堪改授别職及乞依舊令置王傅友官擇兩制之臣有道德學問者充其任則朝廷尊榮天下幸甚三年翰林學士張方平上奏曰臣竊惟頴王地居嫡長春秋鼎盛方當稽古向學修誠進德若其左右前後有位之士所以朝夕納誨咨告法度出入起居罔有不欽一人元良萬國以貞社稷之本也今遴選官寮進用時俊嵗年之間即復遷易於此假途以升要近乃令縉紳之列指為仕宦捷徑非所以資王之重也願留聖慮申諭執政王府記室顧當兼用詞翰之選至于翊善保傅之業亦宜於兩省以上推擇老誠舊望行安而節和者得以久處其職俾典領宫中之政至于侍御僕從便僻側媚以非正之事云為者察而聞於王小者懲戒大者上聞而斥之無有憸人得在王門以著王之令聞兹國家無疆之休惟陛下留神幸察英宗不豫儲嗣未正劉庠拜疏謂太子天下本漢文帝於初元即為無窮計頴王長且賢宜亟立使日侍禁中閲四方章奏帝皆行之神宗熙寧九年宣徽使張方平上言曰臣聞王者大居正謂王者君國當先正其統本也三代逺矣漢唐之盛君即位太后太子多同時建立立太子不以長幼其緩者不過二三年不然則必有故史䇿具存矣本朝太祖開國知天命屬有太宗故不與子然以儲位寓於京尹太宗自京尹踐祚真宗自京尹登儲位仁宗未嘗出閣即登儲位先帝入纂大統尋登尊位尹京故事蓋未有陛下即位及今九年受天之祜早有前星之慶正統大本謂宜時定上以尊宗廟下以係天下之心國之大事僭議罪也然陛下特以恩意留臣在朝愚慮所及敢有不盡故不避嚴憲輒陳忠悃神宗數失皇子太史言民墓多迫京城故不利國嗣詔悉改卜無慮數十萬計衆洶懼知開封府王安禮諌曰文王卜世三十其政先於掩骼埋胔未聞遷人之冡以利其嗣者帝惻然而罷元豐六年禮部尚書黃履上奏曰臣聞古之至治之時太子雖在孩提有識之間必選天下孝悌博聞之士以衛翊之蓋欲其見正事聞正言行正道也恭聞皇太子妙齡寖加保傅未立雖其神靈徇齊得於天縱而樂以修內禮以修外至於其成也懌而恭敬溫文深知父子君臣之道則亦有所教也伏惟皇帝陛下動容周旋莫不中禮使之觀之固有默然而喻者聖學髙逺肆口所言皆可為法使之聞之固有曉然而循者然而主之以恩不責以善必立傅以養之審道以示之觀德以喻之蓋二帝三王之盛亦莫不然也臣愚不肖不足以明當世要務與夫先王立治之本徒守愚學輒傅經以言臣不勝惓惓犬馬之情徽宗時劉元承論謹擇皇子官屬疏曰臣聞天下之本有三法度人材皇子是也而法度人材又以皇子為之本皇帝陛下詳延俊良列于庶位恢張綱目細大畢舉實社稷無疆之業乃者皇子就傅選置官屬為之輔導獨出宸鑒之所識擢可謂急所本矣臣聞賈誼言曰天下之本繫之太子太子之善在於早設諭教與選左右夫翊善侍講記室之職實掌教諭前日慎柬既已精矣而左右者亦不可不慎蓋教諭之官趨見有時左右之臣朝夕于側所以服習積貫者為賴已多必得其人乃克有補方今近侍之臣其賢與否固已不逃陛下之熟察矣臣願慎擇莊恪純厚而博學者以充左右之選左右罔非正人則所聞皆正言所見皆正行元良正而天下定矣茍群枉雜進則治忽以分可不畏哉可不慎哉欽宗時御史胡舜陟奏向者朝説之乞皇太子講孝經讀論語間日讀爾雅而廢孟子夫孔子之後深知聖人之道者孟子而已願詔東宫官遵舊制先讀論語次讀孟子又奏涪陵譙定受易於郭雍究極象數逆知人事洞曉諸葛亮八陳法宜厚禮招之髙宗時知漳州廖剛奏曰準尚書禮部符偹奉手詔節文太陽有異氛氣四合中外侍從之臣其遵前後詔書各舉能直言極諫之士一人將詳延于廷諏以過失次第施行用承天意者右臣奉詔旨歷思平生所知識之士覬有以仰承休德雖學問文采不無其人求所謂賢良方正真能直言極諌而文詞敏贍足以應科目者迄未有得久稽裁奏臣誠惶誠懼不知所處除不住更搜訪外竊復思念侍從之臣以論思獻納為職艱厄未濟變異仍彰陛下側身咨訪亟圖銷弭之方此臣等所當披露心腹竭所見聞庶幾仰補聖政之萬一亦何暇轉索之於疏逺草萊之士而望其能言者哉臣誠不自揆姑欲以區區愚見仰塞明詔伏望陛下廓天地之度霽雷霆之威少垂聰聽使狂言獲經聖慮雖就鼎鑊臣所無憾恭惟陛下謙恭責已勤儉冝民聲色不邇問學是好嘗膽父兄之耻仄席仁賢之求臣實未見聖德之或缺然則變見之異曷為其然臣聞應天以實不以文自靖康已來天之譴怒甚矣不必日蝕地震之為異也陛下嘗試隱之於心應天之誠其亦有未至耶臣願有説於此陛下昨者慨然念往轍之或非懼天譴之有在於是有建國公之封蓋將以承天意而示公於天下後世者也然而不遂正名為子者豈尚有所待邪有所待則是應天之誠未至也人君之舉事惟上有以當天心下有以合天下之公議而幽無負於神明則在誠以行之而已倘非發於誠心而曰姑若是云耳則有始而無卒者有矣曽不足以服匹夫匹婦之心而況可以動天乎臣願陛下昭告藝祖在天之靈正建國儲君之位布告中外不匿厥指使四方萬里乃至九夷八蠻皆知陛下此舉出於誠心而志先定矣異時雖有百斯男不復變易此於聖德豈不光哉豈不大哉是誠足以答天意而轉禍為福感人心而變逆為順彼逺裔聞之亦將慕義而率服者矣此所謂行小變而初不失其大常陛下亦何吝而不為乎臣竊以為陛下之得失獨在於此置此之大而欲飾小善行小惠以銷天變非臣所敢知也且作善降祥天鑒靡忒自古命以義者後世子孫往往復受天命如仲雍避季而夀夢有吳宣公立和而與夷有宋之類是也臣非敢以此為説辭欲陛下知天理之昭昭如此孟軻曰責難於君謂之恭謂吾君不能謂之賊陛下方求直言極諌臣故敢以堯舜之所為望陛下伏幸聖慈未賜狂瞽之誅而加采納焉實宗社生靈無窮之福臣不勝惶恐戰越待罪之至建炎四年至越上虞丞婁寅亮上疏曰先正有言太祖舍其子而立弟此天下之大公周王薨章聖取宗室育之宫中此天下之大慮也仁宗感悟其説詔英祖入繼大統文子文孫宜君宜王遭罹變故不斷如帶今有天下者獨陛下一人而已屬者椒寢未繁前星不耀孤立無助有識寒心天其或者深戒陛下追念祖宗公心長慮之所及乎崇寧以來諛臣進説獨推濮王子孫以為近屬餘皆謂之同姓遂使昌陵之後寂寥無聞奔迸藍縷僅同民庶恐祀豐于昵仰違天監太祖在天莫肯顧歆是以二聖未有回鑾之期金人未有悔禍之意中原未有息肩之日臣愚不識忌諱欲乞陛下于子行中遴選太祖諸孫有賢德者視秩親王俾牧九州以待皇嗣之生退處藩服并選宣祖太宗之裔材武可稱之人升為南班以備環衛庶幾上慰在天之靈下係人心之望紹興元年召赴行在復上疏曰陛下轍迹所環六年于外險阻艱難備嘗之矣然而二聖未還金人未滅四方未靖者何哉天意若曰天祚宋德太祖不私其子而保之不幸姦邪悮國而壞之將使嗣聖念祖思危而後獲之乃所以申其永命也臣誠狂妄去嵗上章請陛下取太祖諸孫之賢者視秩親王使牧九州誤蒙采聽赦而不誅兹蓋在天之靈發悟聖心為社稷計非愚臣之所及也伏望宣告大臣行之他日皇子之生使之退處清暇不過增一節度使爾陛下以太祖之心行章聖之慮自然孝弟感通兩宫回蹕澤流萬世紹興元年張浚上言曰臣荷陛下恩德之厚有踰等倫顧事有干於宗社大計臣知而不言誰為陛下言者惟陛下察其用心貸其萬死臣恭惟陛下自即位以來念兩宫倚託之重夙夜憂勤不近聲色不事玩好雖古賢王之用心持身無以加此是宜天地感格祖宗垂祐受福無窮決致中興臣之區區亦冀依日月之末光獲保終年少效補報臣竊見西漢之制人君即位首建儲嗣所以固基本屬人心臣願陛下特詔大臣講明故事仍乞多擇宗室之賢者優禮厚飬以為藩屏臣無任懇禱激切之至孝宗時張浚上言曰臣竊惟人君即位必蚤建太子所以承祖宗廣孝愛固根本懷萬方也漢髙帝初定關中付蕭何以居守之任首建太子文帝自代邸繼大統即位未數月有司請蚤建太子以尊宗廟其為天下國家之計甚厚也仰惟太上皇帝以帝堯之心付受陛下光照萬古邈不可及為陛下計所當立萬世之基拯生民之難揚祖宗之烈用以仰副太上皇帝之心西漢故事其在今日不可不舉伏望陛下蚤賜睿斷不勝幸甚信州守王師愈奏曰臣恭惟陛下長慮逺識早建儲宫立天下大本以為社稷宗廟永永無疆之休甚盛舉也至乃參用至道故事命皇太子領臨安府尹外間未能深諭竊惟皇太子副二宸極繫四海之望以紹承統業當居春宫日親師傅講論治道尋繹經義臨安府尹一州長吏耳非所以浼皇太子之尊而示天下廣大也雖有至道故事臣猶以為不然何者藝祖太宗同起軍旅素習勞辱煩劇事故藝祖既登極命太宗尹京以彈壓鎮撫當時太宗亦藩臣耳於領天府事體為順三代時諸侯入為王官者固多若已正儲二則與列國諸侯州郡長吏不同矣況自藝祖以來天府多用藩王兼領遂為故事建隆初太宗皇帝以使相尹京進封晉王太宗即位則秦王尹京秦王得罪則許王尹京許王既卒真宗皇帝乃以襄王尹京進封夀王尹京八年始升儲升儲之後自合解府事入處東宫以全儲二之尊當時因循不暇釐正止稍加崇重已是大臣失於討論雖有故事豈可復舉真宗既即位即藩王不復尹京矣蓋親王尹京所以繫人望將以正儲未聞已升儲乃始尹京者惟欽宗皇帝以皇太子出牧開封二日而即位事出倉卒非可為法真宗皇帝以至道元年九月升儲至三年三月即位自升儲至即位止一年半府僚郡政相仍未久故未見有不便今陛下春秋鼎盛方宵衣旰食以濟大業未至倦勤若以皇太子監國撫軍無所不可若浼以一州吏事誠非所宜也真宗皇帝在東宫講讀勸諭之官汨沒州郡吏事勢必不能專心致志以輔導啓迪從容議論唯日困於簿書期會無乃失職乎恭惟皇太子英稟異常天性夙成他日不患不能臨決民事在涵養睿德日新又新以躋堯舜之盛而已恐領臨安府尹非所以浼儲二也且太上南渡以來臨安止暫為駐蹕之地所以不為建都立邑之制者誠以繫中原之望兼今日臨安府事與舊日京尹大段不同今陛下方以恢復神京自任建儲之際乃首舉尹京故事於臨安四方安知聖意所在皆曰臨安已作京師無恢復意矣豈不絶中原之望疑四海之心臣踈逺愚昧不知朝廷故事僭越狂妄罪死不赦伏惟陛下少加思慮寬假誅殛則天下幸甚天下幸甚太子詹事王十朋上疏曰臣恭聞陛下斷自宸衷首建國本天下相賀以為社稷無疆之福臣初至闕下聞太子有尹京之議臣竊以為未然臣聞三王之教世子也不過教之以禮樂樂以治內禮以治外俾知父子君臣之義而已成王之為太子也召公為保周公為傅太公為師保保其身體傅傅之德義師導之教訓未聞其尹京也國朝雖有真宗故事至仁宗為太子則不然當時左右前後罔匪正人養成仁厚之性四十二年之治雖堯舜亡以加初不由尹京然也況今天府事繫其所委任之臣未必有如畢士安者使太子裁決事事皆善亦不足以為太子之聰明增太子之盛德萬一少有過差十手所指小人易得浮議傳聞四方所損非細非所以愛太子也大抵太子之職在於問安視膳而已至於撫軍監國皆非得已事也陛下但與之遴擇師友僚屬俾日與端人正士遊養成德性相與講論古今治亂之理他日民情吏事不患不知臣願陛下與一二大臣議之寢尹京之議以安國本社稷之福天下之幸也孝宗嘗有旨令皇子慶王非時招延講讀官相與議論時政期盡規益屯田貟外郎兼直講林栗以為不可乃疏言漢武帝為戾太子開博望苑卒敗太子唐太宗為魏王泰立文學館卒敗魏王古者教世子與吾祖宗之所以輔導太子諸王惟以講經讀史為事他無預焉若使議論時政則是對子議父古人謂之無禮不可不留聖意光宗時嘉王感疾左丞相留正言陛下只有一子隔在宫墻外非便乃今蚤正元良之位入居東宫則朝夕相見甚順又奏太子天下本傳曰豫建太子所以重宗廟社稷漢文帝即位即建太子本朝皇子居冢嫡有未出閣而正儲位者皇子嘉王既居冢嫡出閣已久宜早正儲位以定天下本再月不報檢漢文帝紀及本朝真宗立仁宗典故并吕誨張方平兩奏節其要語繳奏寧宗時衛涇奏曰臣等蚤上奏事間恭奉玉音皇太子參決事朕有此意甚久昨日趙彥逾經筵求去奏及此此事斷自朕意不欲因人言批出卿等可商量教穩當欲待批出臣等仰見陛下聖明獨斷為宗社大計不繇臣下奏請不勝慶抃臣象祖奏陛下欲得皇太子習知朝廷政事此宗社大計非臣下所敢奏陳出自英斷尤見陛下聖明臣彌逺奏此事當出自陛下宸斷臣涇奏陛下適所宣諭誠出獨斷然今日與真宗天禧間故事不同亦與夀皇淳熙末年故事不同天禧間真宗聖體不豫所以有此淳熙間夀皇已有倦勤之意今陛下春秋鼎盛正當躬親聼斷之時聖意不過以皇太子年齒長楙欲得習知政事今與宰執聚議庶幾習熟天下事體他時付托得人日逐于侍膳問安初無相妨臣所慮者恐外人不知妄有傳播撰造語言陛下聖明必能洞照臣象祖等惟朝殿奏事得侍清光退後凡有事件多是繳入非時無緣可得通逹內外之意所以向來韓托胄因此得以竊弄威福稔成姦惡幾危國家今得皇太子會議臣等奏事既退或陛下有所宣諭或臣等有敷陳未盡之意皇太子于侍膳問安之際皆可以從容奏稟內外不至扞格不通且更不容外間别有人出入禁闥干預朝政豈非宗社大幸奏事畢臣等又奏適來所聞玉音聖意已定容臣等退而商議以聖意擬定御筆進入今謹用别幅擬進更乞睿覽如合聖意即乞御筆批降施行理宗時恭知政事李鳴復奏曰臣嘗讀國史見真宗皇帝以緑車旄節迎養濮王于禁中至仁宗生用簫韶部樂送還邸其後授防禦使纍拜節度使封汝南郡王兩典大宗正寺人人莫不畏愛而心服當時美之後世頌之皆禁中教養之力也皇嗣未定而養之于內皇嗣既生而送之于邸先朝典禮具在可行伏乞睿照金世宗太定二十五年皇太子薨司徒兼樞密使徒克坦克寧表請立金源郡王為皇太孫以係天下之望其略曰今宣孝皇太子陵寢已畢東宫虗位此社稷安危之事陛下明聖超越前古寧不察此事貴果斷不可緩也緩之則起覬覦之心來讒佞之言讒佞之言起雖欲無疑得乎兹事深可畏大可慎而不畏不慎豈惟儲位久虗而骨肉之禍自此始矣臣愚不避危身之罪伏願亟立嫡孫金源郡王為皇太孫以釋天下之惑塞覬覦之端絶搆禍之萌則宗廟獲安臣民蒙福臣備位宰相不敢不盡言惟陛下裁察宣宗即位改元貞祐左諌議大夫張行信以皇嗣未立無以係天下之望上疏曰自古人君即位必立太子以為儲副必下詔以告中外竊見皇長子每遇趨朝用東宫儀衛及至丹墀還列諸王班況已除侍臣而今未定其禮可謂名不正言不順矣昔漢文帝元年首立子啓為太子者所以尊祖廟重社稷也願與大臣詳議酌前代故事蚤下明詔以定其位慎選宫僚輔成德器則天下幸甚上嘉納之四年哀宗為皇太子春宫所設師保贊諭之官多非其人於是監察御史完顔蘇蘭上章言臣聞太子者天下之本也欲治天下先正其本正本之要無他在選人輔翼之耳夫生於齊者能齊言而不能楚語未習之故也人之性亦在夫習之而已昔成王在襁褓中即命周召以為師保戒其逸豫之心告以持守之道終之功光文武垂休無窮欽惟陛下順天人之心預建春宫皇太子仁孝聰明出於天資總制樞務固已綽然有餘倘更選賢如周召之儔者使之夾輔則成周之治不足侔矣知大原府事烏庫哩德升上言皇太子聰明仁孝保訓之官已備更宜選德望素著之士朝夕左右之日聞正言見正行此社稷之洪休生民之大慶也元世祖至元十五年會立詹事院中書省掾劉容上言曰太子天下本茍不得端人正士左右輔翼之使傾邪側媚之徒進必有損令德聞者是之俄命為太子司議時東平趙天麟上䇿曰臣聞未宜輕舉者四海之宗不可常空者三台之位是以貞臣守道虞人違析羽之招明主防微漢帝拒郎官之請斯皆小節尚貫大經矧此國基係乎太子方其幼也但可齒學而振風及其長也但可安心而行孝奚暇乎他事哉今國家鋪張治具整頓條綱內焉三公九卿外焉而庶疆諸尹例皆舉賢推德使宅髙下之員揆務分司嚴糾傾邪之類蓋欲有生皆樂無物不安旁推惻隱之心迓續文明之治至於中書一令樞密一使嘗使東宫領之連旬纍月望儲闈銅輦之來臨虛榭空帷設銀棨金墀之太坐事專歸於副相政並決於同僚臣以為中書者機務之關津天門之鎖鑰挈四海蒼生之命掌萬眷皇闕之家任之而當則奠枕磐石任之未當則瘝官病政此實國家股肱心膂之臣也樞密者疆場之守衛熊虎之維綱武臣效力而有所歸依強寇寒心而潛消變故良才司令則坐撫塵清昧者持衡則多生僻事此實國家爪牙統領之臣也由此觀之軍民二柄治亂所關具其貟而非其才尚恐難行設其位而曠其貟云何可治且太子正名之後雖諸王莫得而同有三師三少之徒立詹事屬官之院凡在臣民而咸仰但惟父母之常尊君行則守有守則從從曰撫軍守曰監國為天子之元子其貴無以尚矣任天下之副君其盛蔑以加矣又何須銀章玉帶耀一品之華階宥府都堂占大臣之上位名為重之適所以輕之也東宫之領此職非臣之所獲知若謂藉其重以鎮之邪則朝臣政事無不奏聞是天威已鎮之矣何煩太子鎮之哉若謂他人不可為此職邪則太師太保國王暨劉公為之矣太傅司徒亦有為之者矣觀彼四職不下於此皆令異姓為之何獨人不敢為此職哉況耶律公已嘗作中書令乎太子之道春誦夏絃秋習禮冬讀書研磨往古之攸行爰證當今之可務龍樓問寢殷勤於內豎之前甲觀尊師懇惻於春官之側以徽柔為本以仁孝為先及其既冠則有記過之史徹膳之宰進善之旌敢諫之鼓習與智長故切而不愧化與心成故中道若性三代之胤祚長久者輔翼太子有此具也太子之善在於早諭教教得而左右正左右正則太子正矣太子正而天下定矣此所以周公示法於成王賈子忠告於漢文也以陛下之聖猶立保傅在太子以奚疑伏望陛下慎選碩人輔導太子無令降居臣職以輕其身當使益增其明以成其孝如此則乾符永握黔黎知大本之安震德惟新天地有長男之美更望陛下近擇宗室旁及岩穴舉大賢充令使之官即聖主錫軍民之福也愚臣妄議實係亂言但以詔文許陳朝廷得失故冒死以言之爾世祖問處士羅英誰可大用者對曰張雄飛真公輔器帝然之命驛召雄飛至問以方今所急對曰太子天下本願早定以繫人心閭閻小人有升斗之儲尚知付託天下至大社稷至重不早建儲二非至計也向使先帝知此陛下能有今日乎帝方卧矍然起稱善者久之歷代名臣奏議卷七十三
