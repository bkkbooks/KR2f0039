body:
  text: 歴代名臣奏議卷三百九明楊士竒等撰灾祥宋寧宗嘉㤗中著作佐郎知徽州事袁甫上奏曰臣將指外服不當出位言朝廷事傳聞今月三日京城火災延及宗廟三省臺部百司庻府以至民居大半灰燼奔避而死者數亦不少此殆皇天震怒之極國家殊常之災四方聞者莫不駭懼臣子茍懐愛君之念正當度越拘攣披瀝肝膽感悟上心挽回天意今朝廷若止將失火之人梟首示衆而陛下又不過避殿減膳僅舉一二典故止作常事施行乃欲轉災為福此必無之理也且乖氣致異盖有積漸敬天之怒當謹幾微陛下胡不思連年荒歉民窮無告流離餓莩塡委溝壑天意怒矣而陛下未悟星行示變莫匪兵象今夏水溢三月不退天意怒矣而陛下又未悟閩中江右宼暴相挻章貢盱江叛卒繼擾敵兵犯蜀揺我襄漢草宼起衢廹我畿甸天意怒矣而陛下又未悟董仲舒有言天出災害以譴告之又出怪異以警懼之尚不知變而傷敗乃至陛下歴觀數年以來災害譴告有之矣怪異警懼有之矣天之於陛下其仁愛切至如此而陛下猶未之悟今京城火災可謂傷敗之證天意震怒至此已極陛下不於此時深念致災之繇亟思銷變之道飜然悔悟痛自克責臣恐天怒益烈甚可憂也甚可畏也臣聞變不虗生縁事乃起臣請言其所由起者宫壼既正嬪御復増耽樂是從虧損聖徳果天意耶臨御以來羣心顒望未聞總攬惟事仰成果天意耶國有忠賢實為元氣摧敗困沮生意㡬絶果天意耶上下不交以言為諱鉗口結舌相習成風果天意耶其他如姦贓之吏充斥州縣椎剥膏血苞苴肆行私室之積過於公家怨讟交興災變遂作天意人心實同一機産禍之胎端在於此昨者禁扈之火中外固已驚異今乃災及太廟陛下念到祖宗寧不哀痛況廹近君門是欲使陛下反躬修徳也延及三省是欲使大臣戒懼悔過也又及御史臺諫院是欲使風憲之地昭明公論也又次及六部寺監庫務是欲使舉朝之士洗心滌慮也上天震怒如是猶未忍遽忘仁愛之意故令陛下目擊心解改絃易轍儻尚謂鎮静可以應變毋乃愈重天怒乎今日下詔罪已陛下必所不憚但應天當有實事空言何足動人却恐詔令之出稍渉泛常施行之間無所聳動四方百姓必謂陛下當如是之災而實未嘗知懼上天之仁愛陛下者於是有大觖望矣事㡬所在間不容髮上闗宗社臣實寒心是用不量疎逺罄竭愚衷臣願陛下下哀痛之詔盡革往愆清心寡慾躬親庶政減嬪御以肅宫壼進忠賢以重朝廷排斥憸諛奬扶讜直誅鋤貪虐之吏丕變苞苴之風日與二三大臣開示大公屏絶私意如此而天怒不回災變復見則雖碎臣之首以懲繆妄臣不悔也國家安危之機正在今日惟陛下亟圗之甫又上奏曰臣仰惟陛下肆頒手札繼發徳音以回禄挻災近在京邑側身引咎博求直言深見陛下祗畏天威悔過修徳之心臣未奉詔之前嘗於九月十九日首騰奏疏上徹天閽謂答謝明譴莫若下詔罪已今求言之詔果下矣臣茍愛身忘國不復盡吐肝膈少効懇欵忠愛之義以仰裨聖明之萬一是臣大負陛下也陛下縱不誅臣天亦將誅臣矣謹上封事惟陛下垂聽焉臣捧讀明詔至所謂痛哭流涕何以贖愆不覺仰天泣下知陛下真有此心是以真有此言決非縁飾於辭令者所能為也且夫菑起都城天意何在盖欲陛下因其所可見察其所不可見耳陛下深居蠖濩之宫四方雖有危急之事君門萬里烏得盡知左右之臣雖知而不言踈逖之臣欲言而無路所賴以丁寧告戒一悟聖心者惟天而已矣天謂宼盜縱横民罹殘虐室廬丘墓往往為墟大傷孝子慈孫之心此陛下所不見故使陛下親見延燎太室驚動神靈俄頃之間化為灰燼雖欲不痛哭流涕不可得也天謂所在州縣水溢為災江湖城市莽為巨浸生生之具漂沒幾盡此陛下所不見故使陛下親見公宇焚蕩居民荒燬衆大之區變為瓦礫雖欲不痛哭流涕不可得也天又謂頻年以來干戈滿眼老稚轉徙溝壑壯者流散四方亦陛下所不見故使陛下親見都人避逃號呼道路上及朝士廨舎為灰骨肉犇迸雖欲不痛哭流涕不可得也天又謂嵗屢不登餓殍盈野公私之力耗於賑荒迄今饑民氣息尚存状如鬼質此陛下所不見故使陛下親見都城被焚之家悉仰贍給錢粟易竭民飢無窮其間死傷之人卒致衘寃於地下雖欲不痛哭流涕不可得也夫内之形證即外之形證外之氣象即内之氣象姦邪導諛之人競欲以甘言佞辭蔽陛下之耳目而天心仁愛特以氣象形證之彰彰者開陛下之聰明使陛下雖不日接四方萬里之事而天威赫然曽不越乎咫尺之間嗚呼何其眷陛下之深而愛陛下之切也然則陛下思所以悔已過答天心者可無以踐痛哭流涕之言乎且臣聞之憤切之言激於事變脩省之實決於力行凡人一語之發尚當表裏相符大哉王言誕告萬方不特人聞之天亦聞之而可不求所以實其言耶陛下所謂痛哭流涕者盖一時憤激之辭已而怠久而忘之矣今日求言之本㫖正欲以昭示修省之實共圗銷弭之道陛下對越上蒼而發斯言臣亦對越上蒼而為陛下盡吐之且陛下為宗廟社稷生靈之主必當以宗廟社稷生靈為心自臨御以迄于今凡八禩矣陛下所恃以乂安海内者盖曰宰臣輔翼於下真魚水相得之歡也而宰臣所恃以鎮服人心者盖亦曰陛下照臨於上真風雲際㑹之辰也然而中外多事國歩孔艱宰臣之勤勞亦已至矣三數年來積勞成疾猶不避事陛下正當深加體恤以全君臣之誼可也何為髙拱無營自暇自逸而獨使宰輔以有限之筋力當無窮之憂責歟夫君相之間其合也甚難而其全也尤難書曰自周有終相亦惟終釋者曰忠信為周忠信云者不事形迹純全無偽之謂也陛下以忠信待宰臣宰臣以忠信事陛下向也謙冲退托而未遑親政今也國事眀習而總攬萬幾在我初無私意而天下信其當然是之謂忠信是之謂全君臣之交若夫臣有所願而不得以自遂君有所為而不果於自奮君臣茍避嫌疑不用其情而舉天下國家安危存亡之故泛泛焉付之無可柰何固已不能上當天心矣及其患生於所忽災起於非常僅欲以區區之空言掩天下之觀聽吾誰欺欺天乎且陛下先以習安玩常之見入乎胷中而或者從而附和之曰今日之災乃天數非人事也又曰直言不得不求非必盡聽也又曰他事不必改更惟汲汲於營繕可也暨乎土木畢興輪奐復舊陛下晏然處之不思改絃易轍今日素服避殿之心復轉而為平日荒眈酒色之心今日減膳徹樂之心復轉而為平日般樂怠傲之心今日求言修政之心復轉而為平日不親庻務之心陛下既自處於無為乃朝夕督責大臣以有為而又適遭乎搶攘多故之秋宼賊之未息羽書之旁午東淮尚煩區畫西蜀更費隄防殘敵求和意猶叵測使命輕遣或貽後悔叢此責任憂慮萬端陛下盡欲以委宰輔耶臣恐非元首起股肱喜之義也天下之命寄於陛下陛下之明資於宰輔宰輔又資於執政臺諫侍從百執事之人等級相承血脉相貫必也陛下以奮厲興起之意率先於上然後精神之所運用風采之所振發機括一轉羣聽咸新雷動風行㨗若影響又何患人心之不說天意之不解乎陛下若徒謂一時憤切之言形於紙上者足以回天心不知修省之實關於政事者乃所以消天譴則所謂痛哭流涕亦空言而已虞書曰后克艱厥后孔子曰為君難盖謂夫尊居九五事繁責鉅非可以易心處也若如陛下盡諉其事於人而憂懼不切於己則為君者何其甚易而不難耶臣願陛下澄心定志深思痛省今日之天下乃祖宗之天下立政當以天下而立用人當以天下而用行至公無私之大道全保䕶宰相之大體率厲羣工大眀黜陟變委靡衰弱之陋習為滌蕩振刷之宏規斷自聖意洒然與天下更新如此則宗廟社稷可使乆安天下人心可使咸恱而皇天威怒庻其可回矣不然乾剛不振政事不親國勢朝綱日就萎薾天意謂陛下為如何謂宰臣為如何日監在兹􅏮􅏮乎甚可懼也陛下以直言求臣臣發於忠愛不容緘黙位卑言髙罪當誅殛惟陛下財幸嘉定中甫為秘書省正字上奏曰臣猥以庸虗誤䝉親擢今兹召對獲覲清光臣竊惟陛下聖徳淵静黙與天契念慮純一上與天通自臨御以至于今凡幾更變故矣而随即消弭轉危為安人以為天數之適然而不知皆聖徳格天之功近者殘敵首開兵端我師既出敵兵旋退人以為羣臣禦侮之力而不知皆天佑皇家之驗夫以陛下積平日畏天之誠而天心又有啟佑陛下之實固宜休祥畢至災異盡除而今乃隂陽未調旱魃為虐不亦深可懼歟甚矣君天下者不可一日而無懼心也懼心常存則妖不勝徳懼心或亡則徳不勝妖陛下如欲因天戒而回天心變亢陽而致甘澤其道非他惟當即陛下畏天之素心愈加警懼而已天理流行隨寓著見善格天者要必事事知懼可也賢才之用舎關天心之向背今也端良者斥諂諛者用盡言者罰蒙蔽者賞邪正易位白黒不分杜忠臣敢諫之門孤上天生賢之意是可懼也民生之安危判天命之去留今也兵戈既興暴露日久餽餉不繼斂將及民根本一虚則岌岌焉有蕭墻之憂國祚脩短實決於此是可懼也廣謀從衆乃合天心今也陛下深居髙拱未盡下情羣臣奉行簿書罕接輿議獨運宻謀之意勝而虚心諮訪之意微將恐天下迫切之情無由上聞是可懼也君臣一徳克享天心今也一人憂勤於上而羣臣逸豫於下外患未弭内患方深而熈熈焉無異平時自謂雅量足以鎮浮而不知宴安乃為鴆毒是可懼也法天行健是謂君徳今也陛下恭儉有餘而剛斷不足庸夫憸人茍求富貴而未聞大眀黜陟以警動衆心將帥交結而軍旅之政壊州郡賄賂而節亷之風衰此皆自貴近者化之不改其原流弊愈熾是可懼也夫此五可懼者特舉其大端耳其他禍㡬亂萌不可悉數其將何以答天譴召和氣哉臣故曰惟當積陛下畏天之素心愈加戒懼而已且臣聞之上有戒懼之君則下無可懼之事懼心不存於我則彼之大可懼者始見此必然之理也陛下誠能繼今以始惕然内省知畏天一念乃我之所固有初無俟乎外求自方寸之清明而推之於朝廷之清明由宫闈之謹肅而達於政令之謹肅昭公道以破私意之扄鐍擢正人以鍼邪說之膏肓陛下以是率先於上而股肱大臣又能公聽並觀畢志竭忠以體君上之心耳目之官喉舌之司亦皆博采公論盡吐忠赤以掃積年之弊下至羣工百執事無不精白一心公爾忘私以赴國家之急將見天意回於上災變弭於下豈徒自治吾國而已雖坐制四方可也何足懼哉不然精神移為怠昏剛強銷為柔懦君臣上下一不知懼而可懼之事衆矣治亂存亡之勢其本在此惟陛下留神省察駕部貟外郎李鳴復上奏曰臣恭覩詔書以丙戍之夕回禄挻災信宿之間上及太室延燔民廬皇天動威孰大於此應内外臣僚暨于士庻咸許直言指陳過失臣至愚極陋濫玷郎曹當天心赫然震怒之時陛下惕然修省之日立君之朝食君之禄不能竭千慮之愚以少禆聖聽不惟負陛下亦負所學臣觀今之進說者二獻䛕扵陛下者必歸其災扵天數獻忠於陛下者必推其失於人事此其操心如冰炭之遼絶不待論也而推之人事者則又有緩急焉有小大焉因災及宗廟也而謂廟制之失禮因災及官府也而謂羣有司之失職非不正也所以召是變者尤有急於此也憤將帥之不用命也而欲戮於社憤尹漕之不撫摩也而欲褫其職非不當也所以弭是變者尤有大扵此也臣嘗讀書見其有曰惟天聰明惟聖時憲又曰惟天惠民惟辟奉天又曰惟尹躬暨湯咸有一徳克享天心又曰昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧耻若撻于市一夫不獲則曰時予之辜祐我烈祖格于皇天又曰我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝自昔有天下國家所以誕膺天命罔有天災未始不本於人君之脩徳大臣之輔徳也徳惟一動罔不吉徳二三動罔不凶論災祥而不原之人主不原之宰相尚得為知本哉臣不識忌諱竊伏妄謂今日所以致天變者在君相則今日所以回天意者亦當在君相陛下即位今八年矣裁成天地之道輔相天地之宜非陛下事乎舊勞于外陛下固已知稼穡之艱難留意講學陛下又已熟古今之理亂治國平天下之實所欠闕者特致知而未能力行得之扵心而未能達之扵政耳天下望陛下充其所未至陛下乃復壊其所已成聞諸道路外朝聽政之暇即嬉㳺宴飲之時經筵勸講之餘皆狎近嬪侍之日民死扵飢不暇問死扵水不暇問死扵宼賊不暇問死於邉警亦不暇問惟東淮之禍近在肘腋剥床及膚頗關聖慮未幾而元兇授首不謂外懼已去内蠧復生矣自夏四月雨至于秋七月輪遣百官日謁羣祀此何時也天怒未霽而人妖已進所以恐懼者安在外事祈禱而内懐耽樂所以修省者何若宫禁邃嚴之地人所不睹而天實睹之暗室隠微之間人所不聞而天實聞之陛下父天子民者也念慮若此何以當天心明詔謂朕徳不修信乎其不修也宰相執持國柄二十餘載矣論道經邦燮理隂陽非宰相職乎先皇帝更化以來内撫外寧天下有泰和之風陛下臨御以來内阻外訌天下多急迫之態此非獨陛下不逮先帝宰相自視前日亦少減矣内殿不時引啓心沃心之至情安得相孚都堂不日至貳公𢎞化之實意安能盡達列庶位者未必皆㑓乂愛焉而莫知其惡也投散地者未必無真賢憎焉而莫知其善也私徑日闢公道日消逄迎􅏥進之士每趨形附影於親要之門寡亷鮮耻之徒又索響求聲於廝役之賤除授以賄取不待領事已有責償之心薦舉以賄成未嘗脫選已動攫拏之志天下之財聚於請囑聚於苞苴聚於囊橐而陛下之赤子皆不聊生矣天命天討不聞國典之舉行天視天聽但覺人心之胥怨宰相代天理物者也民俗如此何以召和氣眀詔謂朝政多闕信乎其多闕也故曰所以致天變者在君相欲修君徳當正其本欲肅朝政當清其源本之不正而欲齊其末源之不清而欲潔其流天下無是理也何謂本人君之心是也唐明皇一人耳心乎厲精則開元以治心乎縱逸則天寳以亂人君一心其係乎天下治忽如此陛下始初清明志氣恬淡視古帝王事業若不難致茍能思前之所以得操之而欲其存戒今之所以失去之而欲其盡無安厥位若將隕于深淵之危無輕民事常若澟乎朽索之馭罔㳺于逸罔淫于樂此念無時而不嚴莫見乎隠莫顯乎微此心無地而不謹立扵無過之地而常勵其有為之志以之正朝廷以之正百官又以之正萬民推而至於四方逺近將莫不一於正矣是之謂修君徳何謂源朝廷表儀之地是也楊綰以儉素用制下之日聲樂之多者以減騶從之盛者以省第屋之華者以撤一相之好尚其足以轉移風俗如此今之大臣世司台鼎身佩安危如漢之韋平不足多進茍能思乾淳之所以致理而按為成法思嘉定之所以更化而不替初心杜羣枉之門使無一隙之可投開衆正之路使無一方之或壅公論所予從而予之不以其踈而遂弃公論所奪從而奪之不以其親而遂止廉以勵俗貪者可使之廉正以率人邪者可使之正天下共由扵大公至正之途氣和則形和形和則聲和聲和則天地之和亦從而應矣是之謂肅朝政君徳修扵内朝政肅扵外嘆息愁恨之聲既息隂陽乖異之變不消臣未之信也故曰所以回天意者亦當在君相雖然臣猶有言焉有一時之慮有萬世之慮慮及一時者事之已然而指陳其迹慮及萬世者事之未然而逆探其理者也盖惟辟作威惟辟作福正也權在天子而宰相輔賛彌縫焉正之正也二帝之所以帝三王之所以王是也百官緫已以聽冡宰權也權在宰相而天子垂拱仰成焉正之變也伊尹之扵商姬旦之扵周霍光之扵漢是也權不在天子不在宰相而或流於女寵或流於宦寺變之變也漢唐之季世是也陛下春秋鼎盛正親攬萬機之時大臣功業光眀皆乃心王室之日聖賢相逢固無他慮而婦有長舌為厲之階識者殆軫憂焉懼其進而不已則並后匹嫡之事見矣又進而不已則斜封墨敕之害形矣又進而不已則柔佞回邪之小人倚勢作威盤根錯節而天下之患不可勝窮矣坤之初六一隂始生之卦也而曰履霜堅冰至事雖未然而理有必然聖人之憂夫辨之不早辨如此陛下以直求言臣不敢不以直對對以直言臣之職也罪以直言亦臣之分也惟陛下與大臣熟圗之臣不勝惓惓鎮江府通判蔣重珎以火災應詔上言曰臣頃進本心外物界限之說盖欲陛下親攬大柄不退託於人盡破恩私求無愧於己儻以富貴之私視之一言一動不忘其私則是以天下生靈社稷宗廟之事為輕而以一身富貴之所從來為重不惟上負天命以先帝聖母至于公卿百執事之所以望陛下者亦不如此也昔周勃今日握璽授文帝是夜即以宋昌領南北軍霍光今年定䇿立宣帝而明年稽首歸政今臨御八年未聞有所作為進退人才興廢政事天下皆曰此丞相意一時恩怨雖歸廟堂異日治亂實在陛下焉有為天之子為人之王而自朝廷逹於天下皆言相而不言君哉天之所以火宗廟火都城者殆以此臣所以痛心者九廟至重事如生存而徹小塗大不防於火之未至宰相之居華屋廣袤而焦頭爛額獨全於火之未然亦足以見人心陷溺知有權勢不知有君父矣他有變故何所倚仗陛下自視不亦孤乎昔史浩兩入相才五月或九月即罷孝宗之報功寧有窮已顧如此其亟何哉保全功臣之道可厚以富貴不可久以權也著作郎吳泳上奏曰京城之災京城之所見也四方有敗陛下亦得而見之乎夫慘莫慘於兵也而連年不戢則甚於火矣酷莫酷於吏也而頻嵗横征則猛於火矣閩之民困於盜浙之民困於水蜀之民困於兵横歛之原既不澄於上苞苴之根又不絶於下譬彼壊木疾用無枝而内涸之形見矣衛涇論火災䟽曰臣仰惟陛下寅畏天命夙夜祗懼曩者火失其性京邑屢菑聖徳消弭洊嵗寧謐都民奠居上下相慶廼者濫炎復變上驚東朝陛下責躬避殿減膳撤樂不遑寧處即日恭請太皇太后歸奉内庭昏晨定省日便娛飬不惟見陛下遇菑修省之意又因事以昭明陛下篤孝之誠益固太皇康寧之福真足以上當天心下慰人望恭惟國家以火徳王天下火得其性則不為災謹按春秋傳曰凡火人火曰火天火曰災故春秋書火者一書災者十有一皆紀異以書變也竊見癸丑火作之夕先有震電咎起不測豈非災變之大乎夫菑異者上天所以仁愛人君而警戒之也昔楚莊王以天不見妖為懼古人不以遇災而有諱常以因變而知戒臣愚欲望陛下睹天變之不虚益思修省恐懼之未至者以答上天仁愛之意勿以目前随宜區處為足以應變勿以旬日貶損儀度為足以盡誠方今四陽用事愆隂苦寒霖潦為沴飛電屢作繁霜未止無非天戒之可警可懼者也惟聖心每以弭菑銷變為念於一身之起居必致其肅於官闈之奉益思其未備於宗廟之禮益盡其當敬謹察政令之偏廣訪水旱之病清獄訟淹枉之失戒郡邑掊尅之害凡可以致災咎者無一而不加戒懼如此則天變可銷而乖沴可轉為和平之福矣臣不勝惓惓之忠涇又進故事曰天聖五年秋七月趙州言蝗自邢州南來纔二頃餘不食苖上謂輔臣曰但慮州郡所奏不實爾其遣官按視速捕瘞以聞臣聞天災流行國家代有或因災修政而轉為天下之福或諱災玩變而遂貽斯民之害盖寅畏警懼不以災孽為諱而每以民瘼為憂則上下勤恤而民被其仁矣宴安縱弛君姑務於掩覆臣相從於諛恱則有變莫省而民無所愬矣此休咎之異治亂之所從分也是故唐太宗貞觀初年旱蝗逾嵗米斗三錢以其不諱災而勤於恤民也漢武帝元光五年秋蝗太初元年夏蝗而卒致海内虚耗以其遇災不懼而不知愛民也仰惟仁宗皇帝畏天出於誠心愛民形於實政方旱蝗之變不以不害苖稼為幸而深以州郡所奏不實為憂大哉王言恐懼修省憂勤惻怛可謂兩盡矣夫人君之患莫大乎惡災異而不欲聞人臣之患莫大乎蔽災異而不以聞飛蝗之沴害民之尤者也寧言傷稼而思銷變之道豈可謂不食苖而忘憂民之心乎然人之常情恐懼於一時者或怠忽於悠久自古賢主猶不免惟我仁宗畏天愛民終始如一異日因飛蝗為孽責躬引過祈于天地宗廟不令殃及萬方而蔡襄為諫官極論旱蝗之變以謂邉陲守禦戰爭之苦兵冗財竭賦歛暴興生民膏血掠取無極是致災異頻數夫君臣上下恐懼􅏮􅏮如此此其上銷天變内結人心外弭邉患所以基四十二年之治歟側聞孝宗皇帝乾道元年淮南漕臣姚岳言蝗自淮北飛渡皆抱草木自死仍封死蝗以進詔鐫秩罷斥以為佞邪之戒仰見祖宗寅畏天變杜絶諛論前後若合符節家法相承垂裕萬世臣又觀隆興初蝗蟲為災孝宗謂史臣胡銓曰朕逐日禱天蝗蟲遂滅安可不至誠銓奏曰陛下行之不息豈特滅蝗敵亦不足慮嗚呼銷變格天之道端在乎此銓又能推廣聖意及於敵國外患昔益言於禹曰惟徳動天無逺弗届銓之言近於是矣臣愚惓惓願今日常以斯言為警則弭災致祥寧内服外皆自一念推之耳涇又應詔上奏曰臣一介踈逺去嵗十月嘗因輪對獲望清光三劄所陳竊謂陛下踐阼以來天意順從雨暘時若邊陲不聳年榖豐登天之所以愛陛下者既至則所以望陛下者亦至茍玩其所愛不自省循則天心之愛或有時不可恃而譴咎傷敗之來未必不基於此願陛下以無災為懼飭躬厲行増修聖徳垂神政事以答天貺陛下過聽首肯再三及堯舜文王皆大聖人猶兢兢業業小心翼翼至論仁皇敬天著洪範政鑒則陛下又曰此書參人事而言朕常置之座右退而誦歎陛下此心實堯舜文王之用心是宜休祥之應日臻災異無繇而至今者建寅之月震雷非時雨雹交作繼以大雪災變甚鉅咎證非虚由古及今罕所聞見春秋隠公九年三月癸酉大雨震電庚辰大雨雪晉愍帝建興元年十一月己巳大雨雹震電庚午大雪然自庚辰至癸酉相距八日之逺而雪作於仲冬毋足深怪曽未有當此之時雷電雹雪繼作於一夕之頃者也雖災異之出足見天心愛君之仁而天人之際必有感召相因之理陛下睹變思懼亟降明㫖訪求時政之闕失臣雖愚陋固嘗先事而言矧咨詢下逮安敢知而不言言而不盡上負陛下虚懐納忠之意乎臣聞應天以實不以文動民以行不以言成湯禱旱以六事自責宣王遇災側身而脩行古之聖王必先引咎於己不欲歸過於人盖將應乎天而動乎民固當求其實而篤其行也今陛下嚴恭寅畏克謹天戒恐懼修省不遑康寧視成湯宣王無間然矣臣誠不自揆請得一二條陳之幸陛下不以臣之愚而廢其言臣聞自古人主患不容受陛下每於臣僚奏對言雖訐直必務優容可謂有容受之量然受言之名甚美用言之效蔑聞毋乃聽納雖廣誠意不加始説而終違面從而心拒軒陛之前應和酬酢宻若有契於淵宸進對之臣亦自以為得上意退朝之暇寂不見於施行盖有宣泄於小人而遂羅中傷者矣潜沮士氣隂長諛習莫甚於此言路尚壅此闕政一也臣聞自古人主患好自用陛下從善如流改過不吝可謂無自用之失然鯁亮之士難合諂諛之徒易親豈非信任未明好惡易惑鯁亮者未必非忠也而終惡其忤已諂諛者無非為佞也而終喜其順己於是特立獨行則浸見踈斥而偷合茍容則次第進用矣沮壞忠善傷敗風俗端在乎是人材未振此闕政二也臣聞帝王以勤儉為徳而不可以位為樂以聲色娛其耳目使日新月盛無暇更及他事盖仇士良蠱其君之至計也臣進言及此陛下無不灼知竊聞萬機之餘宫中燕飲太頻聲樂競進六宫之奉非不偹也而優伶靡曼之容市井詼諧之戲間被宣召雜陳于前道路所傳未足深信然所以致謗必有由也至於近屬之親婣戚之貴尤宜進見以時交接以禮然後恩義兩盡名分素嚴儻若數陪宴侍深入禁掖臣恐歡洽之餘浮費必廣眷寵之盛請謁必行可不防其漸乎燕飲未節此闕政三也臣聞府庫金帛皆生民之膏血州縣之吏鞭撻其丁壯凍餒其老弱銖銖寸寸而誅之㡬無聊生之民矣陛下勤恤幽隠每以民貧為念竊聞上方賜予太多用度浸廣緡錢之予遍於貴近金帶之賜逮於微賤優伶之徒鮮衣靡服徜徉于道見者駭目假以犒軍之名移用封椿之積臣僚執奏僅存虚劵聞者不能無疑也至於嗣邸后家土木競興蠧耗無藝官府厭誅求之苦閭巷有愁歎之聲臣恐軍怨民窮其來已久緩急之際卒成禍階可不慮其微乎賜予無度此闕政四也臣聞國以紀綱為本臺諫給舎所以寄紀綱之地命令之頒爵賞之施雖出於人主行於朝廷而給舎得以駮正臺諫得以論列是非可否一言而定夫是以姦邪知所􅏮畏而國體由此尊嚴今也侍從擢非其人節鉞畀非其功給舎駮正臺諫論列固其職也而連章累疏則沮格不行備禮請去則眷留甚力夫以其宣勞而陞之侍從未為甚過憫其降虜而寵之節鉞猶可諉也然祖宗愛䕶綱紀曲示聽從寧屈於所當與而必伸言者之氣盖國體所繫而於勢未順也然則紀綱浸壞國體漸輕而姦邪生心矣紀綱不立此闕政五也臣聞爵禄人主之操柄而名器不可以假人必愛惜謹重不輕於所予然後足以厲世而磨鈍興事而勸功今也正任之留務去節鉞一等戚里縁恩而授遥領之刺州在武列為寵毉工冒法而得一留務一遥刺若非所甚惜也然成憲既紊倖門方開羣小爭趨扳援伺隙不能塞其源而何以遏其流乎平居罔功髙爵厚禄一旦有事能效尺寸將何官以賞之乎唐以官爵賞功將軍告身纔易一醉其極必至於是名器浸輕此闕政六也臣聞人君即位必有攀附之舊一時遭遇無不萌覬寵希榮之心然其識見至卑才品至下待之恩厚可也禄之優閒可也至於議政事論人物則當與天下之材共之陛下初政有二三左右恃恩妄作自以為參陪宻論薦進人材寡廉鮮耻之徒趨而附之頼陛下威斷即從罷斥其尚存者宣對頻數出入無時採訪寧免於讒邪議論豈無於憎愛近日踪跡頗已彰聞夫外廷之臣皆陛下所選擢豈盡不可親信奚必寄腹心於此曹乎豈其幸陛下之未覺寤而為此䑕竊之計乎誠恐潛弄威福飬成姦蠧佞倖漸肆此闕政七也臣聞古之人君待臣下以禮而責臣下亦重惟其待以禮而後可以責之重傳所謂上設禮義亷耻以遇其臣而臣以節行報其上也國朝體貌大臣尤為優厚不以其有罪而廢禮也間者大臣去位一章而罷如棄土梗借曰臺諫之言不得不從則前日之抗言極論列名奏䟽何迫之以宣諭而果於拒人也從臣之丐去姑曰不允而與祠之命忽從中下雖寵以峻職而恩意則甚薄矣何以厲臣節而示衆庶乎近者一二職事官之補外悉以御筆莫測其故夫出處士大夫之所重也賢者曖昧而莫辨不肖者徼倖而茍免又何以飬廉耻而示懲勸乎遇臣不以禮而黜陟未明此闕政八也臣聞國家之讎在所必復疆埸之事終於不免顧有遲有速耳事不素備何以應猝陛下與二三大臣再嵗于兹從容論道亦嘗講明之乎守禦之方孰緩孰急攻取之路孰先孰後亦有成謨定算矣乎至於將帥之臣尤當儲蓄雖武事非嘗試而後見而才否亦安可以不知何者有文武綏懷之道何者有沈雄攘郤之畧亦可拔擇而収致之乎微有一警而起之閒散之中者非貪殘無行即誕謾不實之流其人果孰可倚仗乎安有行義不信於平時而臨事能以使人者荆襄維揚皆號重鎮戚屬庸才素無望實居是任者果能當一面乎邊防之無備而將帥乏材此闕政九也凡此九者臣固已條陳於前雖致災不專在是而皆今日之所當慮也抑臣猶有疑焉陛下降㫖求言止於館職路誠未廣意者陛下急聞闕失故必自近始而人之欲進言者固無擇於踈賤也側聞近有布衣言事不實初令編置已而聽讀臣實踈逺不知其人何如所言何事此命之出誠為未安使其有求於我欲加之罪猶有辭也一介草茅奮不顧身言渉過當原其用心亦欲效誠於君上耳設居無事之時尚可置而不問適茲災異之見正宜博通下情今求言之㫖方行罪言之命繼出衆聽駭愕物情謂何竊議陛下以是警言者而非以勸言者也夫罪一狂士本不足深惜因一士而虧損求言之美意狂士反以得名乃為陛下惜耳若曰已從輕典則均為加罪又將焉擇儻陛下翻然悔悟卒從寛赦則疑謗不辨而自解矣何憚而不亟行之哉此理曉然尤聖明之所易察者也臣是以始終為陛下詳言之若夫五行之說臣雖未嘗深究然據經義而論則雷陽也雪隂也陽氣方升而隂制之此雪所以降也以象類而求則君也夫也君子也中國也皆陽也臣也婦也小人也四裔也皆隂也臣迫於君婦陵於夫小人害君子四裔謀中國皆隂勝陽之證也有一于此臣願陛下熟之復之止之絶之制治於未亂防患於未然如前所陳其切於聖躬者臣願陛下省之於心反之於身勿恡其失必易其度其關於臣下者臣願陛下詢之僉謀斷之國人務協于中同歸于治凡所建置凡所施行必上當於天意下合於人心人心恱而天意解豈惟消弭災咎亦將轉禍為祥可以保和平之福可以興太平之業可以永祖宗無疆之慶矣臣不勝拳拳憂國愛君之誠冒犯天威無所逃罪惟陛下財擇嘉定二年校書郎眞徳秀上奏曰臣寒逺書生至愚極陋去夏四月嘗因面對冒貢瞽言陛下不以為狂俯賜嘉納今者又獲進瞻天光不以此時罄竭愚忠禆萬分一臣實有辠臣聞董仲舒有言曰國家將有失道之敗天廼先出災害以譴告之不自知省又出恠異以警懼之尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也竊惟漢儒之言天未有深切著明如仲舒者臣濫綴館職獲觀太史所申邇日以來災眚洊至兩旬之間暴風再起三月丙申都城雨雹越八日癸卯熒惑失次行入太微干犯執法己酉之夕留守掖門譴告丁寧可謂至矣而蝗蝻餘孽寖寖復生陛下恭儉慈仁對越無愧而和氣未應咎證遄臻臣愚無知未測其故意者上天仁愛昭示戒儆欲使陛下君臣之間思先格王所以正厥事者乎臣敢條上四說惟陛下財幸一曰親正人臣謹按漢初元二年正月暴風從西南來翼奉以為左右邪臣之驗延光二年三月大風拔木史臣以為親讒曲直不分之應今陛下登崇耆哲褒顯忠良所謂讒邪萬無此理然臣竊聼衆論或謂正人雖進用而委任未盡專小人雖退斥而僥倖未盡塞名雖好忠而實則喜佞故諫爭之塗尚狹忠鯁之氣未伸此災異所縁而起也臣願陛下親近端良優容切直知賢而任之則勿貳知邪而去之則勿疑然後政治可興而天心可假矣二曰抑近倖臣聞之傳曰隂氣之精凝而為雹故劉向以為隂脅陽之證孔季彥以為隂乗陽之證考諸前代凡妾婦乘其夫臣子倍君父政權在臣下四裔侵中國皆其事也求之今日固亡此患然臣竊觀近者一二詔㫖或從中出廷尉之官不得守法環列之職驟畀非人更化之朝詎所宜有意者左右近習之私甘言悲辭之請未能以盡絶之乎夫隂邪之類長則陽剛之道缺致異之原其或在是臣願陛下遵仁祖之規責大臣以杜衍之事深遏私情大融公道以潛消隂盛之譴則升平可致矣三曰除壅蔽臣謹按漢天文志熒惑南方為禮為視禮虧視失則罰見之又太微天廷熒惑守之為亂臣在廷之象陛下恭畏自將動循典法固無一不合乎禮矣意者萬事幾㣲或未盡察羣情邪正或未盡知故上天因之以示戒乎夫視之不眀是謂不哲洪範五事之證昭然可攷臣願陛下體重離之照炳獨斷之眀察事㡬於兆朕之先燭物情於隠伏之際使姦邪不能壅蔽則火得其性而災害熄矣四曰去貪殘臣觀春秋桓公五年秋螽說者謂貪虐取民之所致漢光和元年蝗蔡邕謂貪虐之所致曩者權姦當國寵賂日章州郡監司掊克取媚愁苦之氣干盭隂陽餘毒遺殃迨今未歇比者固嘗遴監司之選重贓吏之罰而守令貪殘者尚多苞苴餽遺者未戢臣願陛下明詔大臣推行臧否之令申嚴賄賂之禁庻㡬民瘼可瘳而天變可弭也昔者成王悔過天雨反風景公一言熒惑退舎宣帝因雨雹而躬親萬機太宗因旱蝗而益施仁政致治之效于今可覩陛下誠能側身脩省於其上大臣誠能同心燮理於其下則轉異而祥反掌間耳抑臣猶有獻焉夫天人一理感通無間民氣舒慘則天心應之三數年來生靈窮困可謂極矣淮民流離死者什九僅存者饘粥弗給既斃者無所蓋藏陛下軫恤之仁無往不至而有司奉行未得其術江淮之間以人為糧者猶自若也欲望災沴之銷其可得乎側聞兩淮蹂躪之餘種麥亡幾誠恐風傳遇實或誤宸聽謂麥熟為可待而不復廣為振捄之䇿又聞廣南數州粒米狼戾臣願斥内帑封樁之儲及今収糴以濟其飢是亦振救之一端也方今元元之命寄於陛下倒垂之急近在目前幸哀憐而亟救之庶幾人心可回則天意自解不然則愁歎日滋變異日熾臣未知其所終也意切言狂罪當萬死三年徳秀因輪對上奏曰臣恭惟陛下天資髙明克自抑畏檢身約已敬天愛民有前代帝王所不及者固宜至和之蟠塞穹壤而嵗比旱蝗民以病告喁喁之望日徯有秋乃仲夏以來常隂為沴淫雨連亘閱月彌旬間嘗開霽旋復霶霔湖水暴漲溢入都城細民失業粒米翔貴近畿州縣被災者廣或頽城郭沒官寺毁廬舎溺人民決壞堤防渰浸田畆平疇沃壤浩如濤波是非小變也陛下亦嘗察其故乎盖自柄臣擅政導諛成風更化以還餘習未殄旱暵酷矣或謂其不傷農螟蝗熾矣或謂其不傷稼元元愁苦之狀有閭巷知之而士大夫不知者士大夫知之而廟堂不知者况陛下深居九重其能盡知之乎下情不通民隠莫訴故作淫雨京畿尤甚將以感悟宸衷亟圖惟新之政天心仁愛盖可見矣陛下惕然祗懼禱祠賑䘏細大畢舉休徵潛格雲隂洞開臣愚竊慮陛下狃於目前之應不復推原致異之繇天意靡常尤足深懼臣謹按春秋莊公十一年宋大水董仲舒以為隂盛之所致嘉祐水災歐陽修上䟽曰水隂也兵亦隂也修之言盖為當時發若推其類言之則宫庭嚴密之地左右褻近之私隂也内而姦邪小人外而四裔盜賊亦隂也人君秉至陽之徳以御衆隂故主道宣明則陽暢隂伏各由其序而弗為災否則隂盛而忤陽咎徵之來未有不縁類而著見者天人相與之際甚可畏也陛下聖性澹然固無便嬖女謁之累然除授命令間煩特㫖夤縁請託侵紊成憲尚或有之倖門既開奔湊日衆豈所以杜幾微而窒萌漸乎此隂沴所為而作也更化之初分别淑慝國論嘗一定矣衆正在廷元氣充實姦邪之黨尚肆窺覦一二年來俊賢耆艾引去相踵甚而二三近臣之進退倉猝遑遽或不知所從來於是善良之士寖不自安而窺伺者益衆矣朝廷紀綱寄於給舎維持法守政所當然聞諸道途顧猶有不得職者紀綱一廢何事不生臣恐憸人非類洋洋乎動心矣此隂沴所為而作也戎翟更成既難遽恃弄兵之徒日益披猖彼其嘯聚之始非有跳梁不可制之勢也使陛下帥守得人監司得人撲其焰於未張一廵尉力耳柰何擁兵之帥或萌玩宼之心分土之臣各啓倖功之念飬成癰疽馴致決潰乃始草薙而禽獮之世豈有斃千萬人於干戈而天不為之變者或者幸其納降曲意招誘不知損威䘮重適啓姦心二者盖胥失矣宼虐肆行流毒甚慘嗸嗸之衆籲辜于天此又隂沴所為而作也抑臣聞之澇於夏者其秋必旱隂盛之極陽必生焉漢儒之言厥有深指今庫下之田既厄於水設不幸七八月之間雨弗時至髙田之稼復壞于成飢饉相仍愁歎滋甚豈獨峒丁逋卒能為患哉比者三衢之事盖可鑒已陛下誠能念災變之可畏思君道之當修秉持乾剛法象天徳開公正之路窒邪枉之蹊使裏謁不干于朝外言不納諸梱以絶近倖侵權之端尊信仁賢容受忠讜使正人端士得以行其志而憸邪巧佞不得售其私以抑小人道長之漸淮甸創殘之餘遴柬良牧寄以赤子之命招輯流民咸俾奠居収瘞遺骸勿令暴露江湖之間宼孽方煽申敕帥守戮力同心仍遣王人銜命督䕶整齊師律激勵士心以挫羣盜方張之銳則積隂之沴庻乎其可銷方來之患庶乎其可弭也易之初六曰履霜堅氷至古之聖人於隂之將盛不忘戒謹如此今災異頻仍證應甚著陛下可不亟加聖心乎臣以踈庸備數文館睿恩拔擢俾攝禁林惓惓愚忠冀吐露久矣幸因進對敢竭毣毣之思意切言狂惟陛下裁赦四年徳秀為著作佐郎上奏曰臣聞知父母之心者可以知天心知人君之道者可以知天道盖父母之於子也鞠育而遂字之仁也鞭扑而教戒之亦仁也君之於臣也爵賞以褒勸之仁也刑罰以聳厲之亦仁也天佑民而作之君其愛之深望之切無異親之於子君之於臣也故君徳無媿則天為之喜祥瑞生焉君徳有闕則天示之譴而災異形焉災祥雖殊所以勉其為善一也天之愛君如此為人君者其可不以天之心為心乎臣伏觀近嵗以來旱蝗頻仍饑饉相踵陛下嚴恭寅畏不敢荒寧憂閔元元形於玉色上天降康遂以有年亦足以觀感格之效矣而比者乾度告愆星文示異廼叠見於清䑓之奏謂陛下躬行之未至與則豐穰之應若何而致之謂陛下躬行之已至與則象緯之災又何為而數見也天道幽逺人所難知臣竊思之意者皇天佑宋之心欲陛下不以積年之憂為易忘而以目前之喜為僅足其愛之深望之切為阿如耶夫宫庭屋漏之邃起居動作之㣲一念方萌天已洞見陛下誠能守兢業之志防慢易之私孳孳服行屢省毋怠則將不待善言之三而有退舎之感矣况今年雖告稔民食僅充然洊饑之餘公私赤立如人久疾甫獲瘳而血氣未平筋力猶􅉵藥敗扶傷正須加意朝廷之上未可遽忘矜卹之念也恭聞間者内庭屢蕆醮事固足以見陛下畏天之誠然而修徳行政者本也禬禳祈請者末也舉其末而遺其本恐終不足以格天矧今冬令已深將雪復止和氣尚鬱嘉應未臻此漢人所謂天有憂結未解民有怨望未塞者也臣愚不佞伏望陛下體昊穹仁愛之意思星文變動之繇延訪近臣勤求闕失推行惠政以活斯民則愁歎銷於下而休證格於上矣詩曰敬之敬之天維顯思命不易哉惟陛下留神毋忽五年徳秀為軍器少監上奏曰臣比者恭覩御筆以太廟因雷雨之後鴟吻損動明詔有司避殿減膳有以見陛下寅畏祗懼之心然臣博觀六經載籍之傳下及秦漢以來史傳所志自非甚無道之世未聞震霆之警及於宗廟者魯之展氏人臣耳己卯之異春秋猶謹書之盖雷霆者上天至怒之威宗廟者國家至嚴之地以至怒之威而加諸至嚴之地其為可畏也明矣古先哲王遇非常之變異則必應之以非常之徳政未嘗僅舉故事而已今自避正朝損常膳之外咸亡聞焉或者固已妄議陛下務為應天之文而不究其實矣况禮文所在又有可議者乎且震霆之作孟秋之癸丑也越旬有四日而恐懼修省之詔始頒避殿減膳之舉孟秋之丁卯也甫二日羣臣祈請之章已上夫以蹈故循常之文非甚難舉者然猶歴旬浹而後行甫信宿而遽已何其自責之約而自恕之多乎陛下節儉之誠出於天性其在平日尚不以卑宫菲食為難況於畏威省咎之餘少舒徐之何所不可而匆匆若是借曰禮文之末非所以格天然文之不存實於何有今也誠意弗加動皆勉强茍塞已責徒揜外觀以此動人猶且不可而況於天乎廼者孟秋之朔流星示異其占為兵憂而上下恬然若不之聞故相距才九日而震霆之變作夫示之以星象之飛流亦云切矣而陛下不知戒於是警之以震霆又加切焉天於我國家欲扶持而全安之其心至惓惓也書曰惟先格王正厥事臣願陛下内揆之一身外察諸庻政勉進君徳毋以豢安飬逸為心博通下情深求致異召和之本庶㡬善祥日應咎徴日銷惟天惟祖宗所以望陛下者寔在此臣不勝愛君勤拳之心八年知潼川府劉光祖上奏曰臣伏覩手詔指揮以閔雨久而未應聖心焦勞凡是寛恩徧及中外至於責躬省過避殿減膳御筆諄切敷求讜言悉許臣民指陳闕失主憂如此臣子何敢自安臣自去國以來偶因語言文字之間自貽罪戾其後䝉恩起廢漸加擢用以至付之藩閫列之侍從日思報稱凡諸在外職事不敢不竭愚忠其所建明悉荷開納獨不敢妄論朝廷政事不惟年衰昏塞聞事不審出位而言且有沽譽干進之嫌伏覩今日之詔至切至深為人臣者豈當避此而隠嘿臣竊意天久不雨陛下之所以求雨者無不至矣特未思所以獲譴之由耳陛下之所以獲譴於天者女真乃吾痛心疾首之讎天亡此敵送死汴京而陛下為天之子略不思所以圗之是之謂天與不取天與不取是之謂棄天未有為天之子棄天而天不我怒者也臣非勸陛下輕舉而妄動也臣之區區不過欲陛下因其來徙汴京謝絶和好謹守邊備而已山東山西有相結集欲共起而滅之者陛下胡不因而用之乎乃聞青齊蘭㑹求通不納陛下何惜尺一之札就以付之藉令事成疆土為彼之有其號名猶戴宋也不猶愈於使敵人乘勢獵取而有之耶臣初得諸傳聞未敢輕信而臣寮文字依奏報行有所謂勍敵垂亡中原雲擾豪傑求附視吾國勢之强弱以為進退邊事方殷義士鱗集日夕思奮視吾上意之激昂以為盛衰觀此言也則是所傳聞者皆有之矣而朝廷方且遲疑畏縮沮豪傑之心抑義士之氣坐視赤子塗炭而不之救且陛下為中國衣冠之主人歸我而我絶之是之謂弃人未有為中國衣冠之主弃人而人不怨者也天怒人怨灾咎之生也固宜而又有理之必然而事之易見者列聖在天之靈豈不眷其故都二帝蒙塵之耻豈不懐其曩憤今也敵捨其巢穴而汙我汴京思之而切齒可也痛之而嘗膽可也因其危而圗焉可也尚復與之通使使吾使人拜敵于祖宗昔日朝㑹之庭可乎獨不念汴京者二后執辱之地乃百世不可忘之深仇今而忍忘之乎人非木石身履其處能不為之寒心乎彼其居之無一日寧而我猶講好如昔祖宗之所望於陛下者必不如此也陛下為人子孫而忘祖宗之憤貽怒獲譴職此之由不然以陛下在御日乆未嘗失徳畏天愛民而敬祖宗莫如陛下平時無禱不獲今乃不然何哉陛下試思今日之闕失盖無大於遣使也今日之責躬宜無先於遣使也臣故不敢以他事應詔而直吐其狂愚陛下不可以未雨而懼既雨而忽也天人祖宗當畏而不畏敗亡殘敵不當畏而畏之臣不知其說也抑臣又有一事懐之七八年而不獲陳請併言之憲聖慈烈皇后之大忌十一月三日也權臣侂胄專君無上蔽不以聞徒云郊祀國之大事迷誤陛下不得過宫問疾安否無自而知其時禮部侍郎楊輔討論典故入劄子於廟堂乞改卜郊而宰臣京堂阿附權臣只欲茍遂其事從臣中又有恐喝羣臣使不得言者已而郊壇示警暴風異常猥曰禮成乃赴慈福宫聽遺誥至今以初六日為大忌也且憲聖慈烈乃陛下之曽祖母克相髙宗艱關再造天報之以遐齡而侂胄乃敢以陛下之曽祖母有大勲烈有穹夀考視之如卑䘮而遷就可不憤乎可不痛乎夀成陛下之祖母也其時猶且敢涕而不敢言此事天人共憤獨陛下不知之耳後十年尸賊臣於玉津園門夾道者三日其事尤異太皇太后上仙以慶元五年十一月三日賊臣之誅則開禧三年亦以十一月三日而玉津園者慈福園子也園門乃南郊大路之側豈非天誅之憲聖慈烈誅之赫然而可驗者乎臣在逺方聞賊臣就戮以為改正大忌乃更化第一事不知何所疑憚而七八年間無人及此伏料陛下深居淵黙左右不以告無縁知之臣因陛下使人指陳闕失因遂僭言及焉乃臣素所鬱蓄于中者陛下不聞則已既聞之當即日諭大臣付禮官告謝宗廟改從本日特一反掌耳又何難乎日月之食人皆見之及其更也人皆仰之臣將草奏筮之於易得風雷益君子以見善則遷有過則改夫是以輙陳大義告陛下而不疑伏惟聖慈財幸著作郎趙崇鼎因閔雨上奏曰今日有更化之名無更化之實人才國之元氣而忠鯁擯廢之士死者未盡省録存者未悉褒揚言論國之風采其間輸忠亡隠有所規益者豈惟奬激弗加盖亦罕見施用媮安取容無所建明者豈惟黜罰弗及或乃遂階通顯至若勉聖學以廣聰明教儲貳以固根本戒宰輔大臣同寅盡瘁以濟艱難責侍從䑓諫思職盡規以宣壅蔽防左右近習竊弄之漸察姦憸餘黨窺伺之萌皆懇懇為上言之歴代名臣奏議卷三百九
