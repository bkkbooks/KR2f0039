body:
  text: 歴代名臣奏議卷八十二明楊士竒等撰經國宋徽宗宣和七年太常少卿李綱上言曰臣伏覩陛下以金國敗盟陷没燕山重兵壓境邀求必不可從之事欲窺中原而取河北淵𠂻震悼深悔前非下哀痛之詔罷不急之務蠲繁苛之令除掊克之法招徠忠讜之言討論捍禦之䇿命皇太子作牧開封以係天下之望誠意惻怛感動天地慰安人心雖堯舜修己以安百姓禹湯罪己以撫萬方無以過也然臣以謂事勢迫矣結釁已深遣使講和必無可和之理長蛇封豕蓄銳深謀待時而發其意不淺而自河以北守禦蕭然無藩籬之固不知何以禦之今日之䇿所謀得則宗社安所謀失則宗社危安危之幾間不容髪臣願陛下審料事勢度以聖心之所能行者深計利害而明白行之無為茍且僥倖覆藏𨼆諱以趣禍亂庶幾可以轉危而為安則天下蒼生無肝腦塗地之患宗廟社稷無淪陷敵國之虞皆在決於陛下方寸間耳臣愚以謂今日之䇿有三上䇿莫如親征講求真廟幸澶淵故事選將勵兵躬臨訓練降詔問罪㳙日啓行以慴戎心以鼔士氣驅逐外敵保完舊疆此上䇿也中䇿莫如堅守夫京師天下之根本也宗廟社稷朝廷宫室之所在百官之所聚宻邇陵寢中四海而臨萬邦髙城深池有金湯之險聮營環衛有虎貔之師運漕東南以足財用控制西北以靖邉陲天下無二舎此安歸定堅守之計勵士民之心效死為期無毫髪欲去之意既務鎮静又施權謀遣帥出師分屯旁近要害之地翼衛帝室設使金國之衆敢肆慿陵當如周亞夫禦七國之䇿堅壁勿戰以挫其鋒待其糧竭氣衰邀其歸路多設方略一鼓破之此中䇿也下䇿為避狄之計如太王去邠而居岐臣有所不忍言然道塗閭巷之人户知之臣又疑聖意或出於此何哉比者不議河北守臣而先議東南守臣一也遣使分起諸路兵而不起淮浙兵二也捜欄㳂汴舟船三也建牧四也為此䇿者雖足以紓一時之急然知其利而不知其害也臣竊痛曽不深計而熟念之也委陵寢宗廟社稷朝廷宫室百官萬民而去之遠邇必潰是以中原畀之他人也事勢一去不可復振臣恐京師朝行而夕亂其禍故可勝言哉陛下雖命皇太子建牧以監之何補於事是不若偕行之愈也必不得已臣有愚計顧恐陛下不能行之臣今日言之儻不契聖意必死於斧鉞不言之異日禍敗必死於亂兵與其死於亂不若死於國臣敢冒萬死為陛下試陳其說陛下欲行避狄之計而命皇太子留守以係人心以捍大敵以保陵寢宗廟社稷是也而建以為牧非也本朝及唐故事皇帝行幸郡國則皇太子監國此特國家閒暇之時典禮如此今大敵入寇天下震動安危存亡在呼吸間而用平時典禮可乎名分不正而當大權禀命則不威專命則不孝何以號召天下率勵豪傑與之以死抗敵期成功於萬分之一哉唐明皇避安禄山之難而入蜀父老擁馬乞留太子以討賊而肅宗有靈武之立勢不得不然當時之議曽不早定後世惜之陛下度今日人心已揺可以與之共患難而堅守則守而勿去可也度不能守則胡不假皇太子以位號使為陛下保守宗社收將士心以死捍賊臣竊觀皇太子仁孝夙成㳟儉好學四海属心如臣之計天下可保在此一舉夫父子之間人所難言況今日之事寜復有大於此者乎臣素愚直感戴大恩所以不避重誅為陛下言此者欲陛下深思而定之於早也交遜之際燦然明白而使宗廟社稷有所依歸四海蒼生有所係属陛下如釋重負享安逸於無窮而以死宗廟社稷之事責皇太子與天下之士大夫豈不美哉敵情難測卒然有急然後議之則無及矣易曰知進退存亡而不失其正者其惟聖人乎伏惟陛下聖徳髙妙臣固知黄屋不足以纓紼帝堯之心所以敢言者正恃陛下體道而輕外物也昔田千秋以一言而悟武帝而巫蠱之禍息臣頃以論水去國七年今日之事適在朝列以上封事朝奏暮召以螻蟻之微敢言大計豈非祖宗神靈啓悟臣心使之如此其敢愛死不自比於田千秋哉謹刺血親書干冐天威無任戰越俟死之至徽宗東幸宰執議請上暫避敵鋒兵部侍即李綱曰道君皇帝挈宗社以授陛下陛下委而去之可乎上黙然太宰白時中謂都城不可守綱曰天下城池豈有如都城者且宗廟社稷百官萬民所在捨此欲何之上顧宰執曰䇿將安出綱進曰今日之計當整飭軍馬固結民心相與堅守以待勤王之師上問誰可將者綱曰朝廷以髙爵厚禄崇養大臣盖將用之於有事之日白時中李邦彦等雖未必知兵然藉其位號撫將士以抗敵鋒乃其職也時中忿曰李綱莫能將兵出戰否綱曰陛下不以臣庸懦儻使治兵願以死報乃以綱為尚書右丞宰執猶守避敵之議有㫖以綱為東京留守綱為上力陳所以不可去之意且言明皇聞潼關失守即時幸蜀宗廟朝廷毁于賊手范祖禹以為其失在於不能堅守以待援今四方之兵不日雲集陛下奈何輕舉以蹈明皇之覆轍乎上意頗悟會内侍奏中宫已行上色變倉卒降御榻曰朕不能留矣綱泣拜以死邀之上顧綱曰朕今為卿留治兵禦敵之事專責之卿勿令有踈虞綱皇恐受命未幾復決意南狩欽宗時既與金和金人需求不已尚書右丞李綱奏言金人貪婪無厭憑陵已甚其勢非用師不可且敵兵號六萬而吾勤王之師集城下者已二十餘萬彼以孤軍入重地猶虎豹自投檻穽中當以計取之不必與角一旦之力若扼河津絶饟道分兵復畿北諸邑而以重兵臨敵營堅壁勿戰如周亞夫所以困七國者俟其食盡力疲然後以一檄取誓書復三鎮縱其北歸半渡而擊之此必勝之計也時晁說之上書陳論重地曰春秋重地何也曰王者得民而安斯民得地而安有人焉雖微矣以地而重也邾庶其莒牟夷邾黑肱皆賤不當書者邾庶其以漆閭丘之地而重也莒牟夷以防兹之地而重也邾黑肱以濫之地而重也下國小邑之微人以地叛而何能為重所以重其誅也茍不以地叛則一身之罪一時之禍也其以地叛則不特一身之罪貽百世之禍也春秋之重地者所以愛民也正天下國家之本也邾莒之君孰與天下之君大漆閭丘之地孰與中國形勢之地重屬者黄頭女真猖狂京師城下執政大臣遽以髙陽中山太原三鎮賜之竊恐非春秋之㫖也两國構兵如火不戢者焚而其戢者亦焚火不焚則不已也兵之為禍甚大如此而不得不用者豈不為疆場之野尺寸之地哉疆埸之野尺寸之地殺人流血非王者之本心干天地之和氣而必争之乃以中國數千里形勢之重鎮未嘗接戰而棄之乎言之及此孰不寒心論失中國之形勝則禍福之幾有不可勝言者中國以此控制逺人者也乃委此地於敵人使以控制中國乎契丹因石晉而盜據一飛狐嶺之隂議者每不勝其憤為之切齒扼腕今乃以十百飛狐嶺使彼據之乎其禍不特有吐蕃回紇之侵唐將有劉聦石勒之繼晉乎請以三國之事著明者借論之漢室不綱有曹操孫權劉備雖皆天生之英雄也使其終無分地而浪戰於中原則必有吞併滅亡不支者若前日劉項是也曹公身與袁紹之興亡是也而以一天下分裂而三者實自乎荆州之所𨽻也嗚呼荆州實能分裂天下而三者也曹公不急於得關中而急於得荆州盖以韓遂馬超必不能保關中而關中非我有而誰有哉荆州雖蹔為劉琮之物而亦未必不為我物也陸攻則遠水攻則險彼孫權劉備其遂得之乎無幾何孫權雖可以得荆州自以居京口而遠有所不給則以資劉備備得荆州則得巴蜀孫權以劉備禦曹操於荆州而保江東三分之勢定於此一州矣曹操於宇宙間有鞭撻之威尚何所懼者及聞劉備得荆州則大懼矣方作書不覺墜筆於地也唯曹操能懼其可懼者也昔之一荆州今之瀛定并門三荆州也又可不大懼乎曹操其後回軍濡須恐江濵郡縣為權所掠乃詔其民内徙彼乆業南方而不安一旦北土之民相與驚惶渡江而逝廬江九江蘄春廣陵諸郡皆無民矣北人乃得居其室廬耕其田野江濵之郡於是乎有民為魏死守矣如曹公之志則未易以吾三鎮之重地齊民悉棄之也古今識者皆恨唐不能有河北而委之於三叛不知唐失河北於叛臣之後繼失秦隴河湟於吐蕃自鳳翔西門之外即為吐蕃之境顧無自而遠制大河之北也今京師視瀛定并門猶唐長安之視秦隴河湟其利害不亦逼乎嗟夫唐失隴右而不能制河北今失河北而寜無西師之憂乎又將何以制之乎言及此則三鎮之利害又急於漢之荆州也且唐之失河北為害也緩唐之長安視河北而遠也今之失河北為害也急今之京師視河北而近也邇遠之間緩急之勢不得而同也亦以明矣今之京師是謂大梁與古昔帝王之都自亦不同何則西漢之都雍因秦之舊保山河而制諸侯婁敬建言於前賈誼重陳於後實因一國而為都也東漢之都洛謂先朝之未盡善乃遠奉周公之志以洛陽者天下之湊也因天下而為都也隋則初盛而都雍其後衰而都洛唐則以雍為京都以洛為别都皆未有及今都大梁因天下而為都又平坦顯著於洛陽之都也其諸帝王之舊則夏都陽翟商都景亳我介於二者之間也其引湖海舳艫於枕席之上而走山岳騠駃於俎豆之際役夷狄萬國琛幣於郊坻之邇者實以冀趙魏晉之重為天下四方之楗也今冀趙分而魏晉毁則其憂不在河北而在京師顧執事可不念之乎中山之地則保深祁廣信安肅順安永寜八州軍兵則五十八指揮三萬八千三百四十八人髙陽則莫雄覇恩兾滄永静保寜乾寜信安十一州軍兵則七十七指揮四萬二千五百八十人太原則忻代二寜化岢嵐二軍控契丹之朔雲麟府二州守河外嵐石隰三州火山保徳一軍阻河扞夏國之綏州凡十有二州軍兵則一百六十六指揮七萬二千九百人嗚呼可謂重矣故曰瀛州者有瀛海之富富於天下也定州者可以大定天下也并州者可以并兼天下也名不虚得亦未可忽也若不得保此之重鎮而棄之竊恐江介之民魚蝦之俗先叛而後服者足揺而心生矣且曰非我敢棄朝廷而必行恐朝廷之我棄也故曰所憂不在河北而在京師也今日陛下赫然下明詔俾三鎮無棄其守如故且命四擊敵軍實天下幸甚古兵法有之示弱者剛勝示怯者勇勝示緩者速勝彼深入者我以主勝彼兵老者我以壮勝甘言厚幣以餌之者我以逸勝縱敵於歸路者我可以大得志而無不勝今黄頭女真皆干此七者之誅也願詔急擊之無怠且今日敵人之逋逃與契丹澶淵之逝事體不同章聖皇帝不以殺為武者也今皇帝陛下必行天誅則武矣歐陽徹上書曰臣聞履大寳之尊位而能從諫如流樂取於人以為善者人君之徳也當國家危急之際而能奮不顧身敢為人所難者人臣之義也忘布衣之賤而盡忠竭節以干斧鉞之誅者知死有輕於鴻毛也臣伏覩太上皇禪位之初金人渝盟犯我京城太學諸生忠義奮發伏闕上書首建誅六賊之議姦臣怙勢妒賢嫉能欲塞言路以寘之死諸生惶惶股慄性命垂於虎口賴陛下剛明果斷速降詔㫖嚴行止絶遣中使宣諭脫諸生於死地尋後諸生敷奏朝廷得失兼上用賢之請伏闕上書于再于三陛下俯加容察斷知外侮怨陵元元被害王師敗績國勢不振者皆縁六賊姦謀誤我上皇於是悉正典刑以謝天下黜白時中等而不用復李綱而相之臣以是知陛下非特能聽又能行正所謂從諌如流樂取於人以為善而備人君之徳者也臣伏讀正月一日聖詔許士庶實封直言得失臣又知陛下卓然能以堯舜為己任欲開言者之路以來天下之䇿欲却外來之侮以安中國之勢正忠臣義士赤心事上之秋凡紀綱法度有不利於時不便於民者恨不知耳知而不言豈不負明天子勤求之意哉臣比者恭讀聖詔曰敵勢未已動起兵端必欲割我土地殘我人民覆我宗社忠臣孝子自當體國念家人自為戰臣讀至此不覺涕泗交頥重念我宋隆興四方無虞人物滋富自古未有倫擬一旦為金人侵侮攻䧟井邑蠧害良民凡厥士庶豈不寒心臣恨無傑出之勇鼓行而前唱天下慕義之徒使或願持一㦸或願操一戈覆其巢穴復其河北措京城於奠枕之安也臣曉夜以思䝉被國家教育為日滋乆雖不能奮股肱之力而從事於鋒鏑之下然謀猷籌畫或有可採未必不能立尺寸功以報國家平昔之恩於是博採于古叅酌方今利害之大者條陳十䇿以獻朝廷皆保邦御俗之方安邊禦戎之術愚者千慮必有一得狂夫之言聖人擇焉臣雖狂斐然上以應天子求言之詔下以攄寒士報國之誠非敢自謂其䇿之可用亦庶㡬所謂當國家危急之際能奮不顧身敢為人所難者也臣生三十年矣㓜失所怙猥紹箕裘之業願以忠孝自立而臣有子可繼先人嗣故臣毎覽前史見忠臣義士奮身報國者未嘗不掩卷浩歎恨不能睎其蹤臣今日適丁國家多難敢以草茅書生妄議朝廷得失臣故知干犯天威罪必無赦然臣所以甘心於此者實願以一身而安天下也臣故曰知死有輕於鴻毛者此也臣以芻蕘之言上凟冕旒之聽伏願陛下留神省察無以萬乗之尊而驕之無以一介之微而忽之則天下幸甚臣聞三代而下帝祚綿遠莫如漢唐然當其内外之患未夷蜂屯蟻聚攻城破邑兵端四起師出無功則為之君者曷嘗坐視其困哉盖亦躬行之矣天錫勇智絶𩔖離倫神戈一揮無不從順蠻夷猾夏寇賊姦宄固將褫魂破膽望風慴服若漢髙祖伐陳豨於邯鄲唐太宗敗建徳于虎牢以至髙麗賊亂親駕六師一舉而遼東平凡此之𩔖皆欲出於塗炭故決䇿親征奮張天威遐耀神武遣將出師仗義問罪所至克㨗而後戎心沮䘮恐懼遠遁也契丹自晉天福以來踐蹂幽薊北鄙之境殆無寜嵗至景徳元年舉國來寇遂陷徳清以犯天雄當是時京師之地危於累卵真宗皇帝憂勤日加夜分不寐畫計無所從判朝廷大臣持禄保位動為身謀居于江南者勸上幸金陵居于西蜀者勸上幸成都曽無為社稷計者惟宰相寇準鯁峭不回奮忠義心以破羣議獨以親征為獻天子可其奏於是銳然親征既次澶淵諸道兵大會敵既震動殺其驍將順國王達蘭敵懼遂請和于時萬一非天子乾剛決斷用寇準計必不能成其功古語有之曰狐疑猶豫後必有悔斷而敢行鬼神懼之正此之謂也臣為陛下今日計莫若以虎符起天下之兵而決䇿親征追奔逐北絶其根本使無遺𩔖則國威復振而後患不作矣臣竊觀陛下即位之初金人犯順侮慢中國其勢可謂廹矣當時大臣亦有勸上他幸者然賴陛下聦明不惑羣議斷自聖志下詔親征彼軍聞風而心破兵戈未接敵已退師深自悔過此雖宗廟之靈社稷之福然親征之詔不下未必爾也澶淵之役既驗之於前而此尤可以為近證臣區區所以不避罪責敢以親征為獻伏願陛下奮獨見之明授決勝之略命將帥遣戍役而必行之天下幸甚然慮善以動動惟厥時奠而後發發必中矣萬一陛下聽臣之計則親征未可輕動必也以富國為先而選將練兵次之盖兵家之䇿當先為不可勝以俟其必勝要之得人為用則何施不可借使富國强兵内無動揺民安如故有如大夫種之能轉輸供餽外無勞民擾攘之役有如范蠡之知臨機果斷折衝千里有如周瑜之勇度長慮遠收功於必成有如趙充國之守嚴細桞之軍有如周亞夫者奔項羽之營有如樊噲者孜孜奉國知無不為有如房元齡者兼資文武出將入相有如李靖者則雖愚夫愚婦亦知其可以必勝矣方今朝廷之上士庶之間不無其人在陛下擢而用之夫以中國全盛之富甲兵之衆加之得人以任將帥之職親征以挫蠻夷之威則掃蕩絶滅可指日而待也此臣願獻陛下一䇿也臣又聞禦戎之術以戰勝為上割地講和皆其下䇿臣聞朝廷為金人所廹有議割地講和者臣深為陛下不取也以臣管見為今日計莫若遣詞命之使陽與之講和虛為之割地俟其有怠心乃掩其不備會諸道精兵以殱滅之此萬全之䇿昔田横據千里之齊田間將二十萬之衆軍於歴城若非酈生先說齊王使為漢而稱藩乃罷歴下兵守戰備日與之縱酒則韓信雖有百萬之師未能以歳月破也頡利走保鐵山遣使者謝罪請舉國内附太宗遣唐儉慰撫之李靖謂副將張公謹曰詔使到虜必自安若以萬騎齎糧而襲之必得所欲公謹謂上已約降行人在彼奈何靖曰機不可失韓信所以破齊也唐儉軰何足惜哉督兵疾進於是擒之當時使韓信李靖惜酈生之烹憐唐儉之死小有所不忍則必不能成大功也臣今日之計正合於此伏願陛下無為猶豫而不決也臣復為陳祖宗守土之艱難使陛下讀之寒心則尺寸之地不可與人羣臣以割地為請陛下必不輕許也臣聞昔者趙元昊叛西方轉戰連年兵乆不決契丹之臣貪而喜功者以我為怯且厭兵遂教其主設詞以動我欲得晉髙祖所與關南十縣慶厯中聚重兵壓境遣其臣蕭英等來聘仁宗皇帝命宰相擇報聘者時敵情不可測羣臣莫敢行宰相舉右正言富弼即入對便殿叩頭曰主憂臣辱臣不敢愛其死上為動色乃以弼為接伴英等入境弼開懐與語不以鄙夷待之英等亦不復𨼆情遂去左右宻以其主所欲得者告弼且曰可從從之不可從便以一事塞之弼具以聞上命御史中丞賈昌朝館伴不許割地而許嵗増幣且命弼報聘徃反十數皆論割地必不可狀及見彼主抗辭不屈既陳利害而說之復宣皇帝之命以威之敵人感悟遂欲求婚然亦終為弼善詞以却之不過増幣二十萬而契丹平復其後累年契丹君臣守其約而不敢敗者雖本於祖宗徳化之所感然亦富弼之功也嗚呼使地而可割則祖宗之朝已割之矣如其不可割而羣臣勸陛下為此計者得無愧於富弼歟又況朝廷之根本正在於河北河北之要害又在於三關四鎮割三關四鎮而與之則自河以北皆非我有河北之地陛下既不得而有之其能乆都大梁乎本朝懲五季之弊舉天下之兵宿於京師名掛於籍者號八百萬而衣食之給一毫皆取足於官又非若府兵之制一寓於農非都四通五逹之郊則不足以養天下之兵此其所以都大梁以據天下之衝要嵗漕東南六百萬斛以給軍食猶且不贍今若割河北之地則陛下不免遷都長安之地左殽函右隴蜀襟慿終南太華之山縈帶涇渭洪河之水其地利守而不利於運漕將何以給天下之兵哉矧夫太原一郡控扼西北之嚥喉今棄太原則下瞰長安纔數百里陛下其能乆都長安乎大梁長安既不可都又將遷之金陵則自北而南非帝者所居而又邊患未寜國本動揺安知無姦雄窺伺金陵者哉臣以是知割地之請特可紓目前之患非萬世長乆之䇿陛下當如介石之不變也臣又聞昔之所是今或為非前之所用後或棄之乃所以趨時而應變故孟子亦曰執中無權猶執一也在漢文帝之時固嘗與單于結兄弟之義以全天下之民而議和親矣至我國家澶淵之戰敵人請和諸將皆欲以精兵會界河上而殱之敵懼求哀既切真宗皇帝詔諸將按兵勿伐縱契丹歸敵自是通好守約不復盜邉者累年則講和之術非不善臣輙敢以為不可者時不同故也何則逺裔服叛無常乍臣乍驕徒視中國之勢强弱如何而已在祖宗之朝國威素震逺人慴服而不敢猖獗故與之講和則守約而不違前日國勢委靡邊隙創開武乆不講士氣墮怯敵人所以深入既而與之講和徒費金帛億萬適以資敵師退未踰數月兵端又復蜂起臣以是知講和反墮敵計中也且如前日金人敗北种師道請以精兵臨河滅其餘黨儒臣介僻堅執祖宗故事而不許殱戮故有今日之禍宜乎种師道飲恨而死也國家若實與之講和則外示怯弱内費金資盟血未乾臣必知敵人又乗勢而攻矣孰若用臣之策使敵反墮我計中也伏願陛下採孟子用權之深㫖破金人反間之機謀下令召四方之兵使奉詞伐罪揚威絶漠盡殺而後已傳曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖者此也若謂用臣之計則失大國之信者又未足以語權變也昔者孔子許陽貨仕而終不仕與蒲人盟不適衛而終適衛則大人者言不必信行不必果惟變所適彼既渝盟而犯我京闕邊屯吏士攘袂切齒皆欲犁其庭而掃其閭我以機而滅之固其宜也況以小事大畏天者也以大事小樂天者也彼不能畏天而事我反貪暴殘滅而自干罪戾則天亦討其有罪矣夫復何疑此臣願獻陛下二䇿也臣又聞西戎之患大於金人祖宗之朝羌人入寇固嘗彌年而不能解方今金人入寇殘害滋甚西戎雖安堵未動然敵人剽悍之性敢肆陵侮茍有以挫其威則垂頭掉尾去不復顧徒有譊譊之聲終無咥人之凶倘無以挫之則羣起而為人害矣臣以是知西戎雖未動亦當預為之防無使西北合併為患則難於支梧也且如今年春賴天之靈俾敵悔過而效順朔方無虞天下同慶其後朝廷若能會兵要地控扼邊陲奮張國威以震軍勢則禍不萌於今日矣揚雄曰大寒而後索衣裘不亦晚乎此言雖小可以喻大今夫宅於山者必設窞穽以防猛獸之為害宅於都者必峻墻仞以防穿窬之為盜此鄙夫野人之所共知也況西戎自熈寜犯境以來雖絶夏人賜予熈河蘭會轉輸飛輓之費一嵗至四百餘萬則其費可謂厚矣帶甲荷戈者不可以數計朝夕引頸舉踵伺中國之便以恣其殘暴肆其姦雄者殆有甚於猛獸穿窬也太平之時尚當為之備況金人已為患於中國安可不早為之計無使滋蔓蔓難圖也蔓草猶不可圖況於勍敵乎賁育之不戒童子之不抗魯雞之不期蜀雞之不支彼怯勇小大之勢不同非蚤正以待之猶且不能勝況二敵動欲與中國抗衡耶為今之計者莫若明詔守土之臣使嚴為之備而又專委兵馬司使修車馬俻器械以圖患於未然則西戎不能入寇矣此臣願獻陛下三䇿也臣又聞天下之大猶人身域外者股肱也中國者腹心也股肱之疾既作於外腹心之疾復攻於内則不問人之肥瘠其亡也可跬歩而待昔秦始皇奮六世之餘烈振長䇿而御宇内吞二周而亡諸侯卻匈奴七百餘里胡人不敢南下於是遣將軍䝉恬築萬里長城以防胡自謂關中之固子孫帝王萬世之業而不知禍起於蕭墻之内一旦陳渉以甕牖繩樞之子無萬乗之尊無疆土之大身非王公大臣名族之後才能不及中人非有仲尼墨翟之智陶朱猗頓之富躡足行伍之間振起阡陌之内奮臂一呼天下響應山東豪傑於是並起而亡秦矣臣以是知心腹之疾尤甚於股肱也國家治平日乆冗食㳺手之民觸處有之敗軍亡卒流離散徙者紛如也日則博奕飲酒于市夜則結而為盜賊椎牛發塜於虛落之間非禮非義無不為也萬一有豪傑者為之倡嘯聚山林刼掠閭里驅虜良民以至擅名號攻城邑取庫兵釋死罪縱横自肆而不可制則為腹心之患亦不淺矣頃者方寇竊發血流通衢江浙井邑多為煨燼兵拏不觧所費巨萬始能致其頭於闕下誠可為後來鑑也況今兵戈四起安知無方寇之流欲乗隙而作亂者耶以臣觀之守令得人此無足慮盖州得一賢刺史則千里䝉其庇縣得一賢令尹則百里受其賜徳化足以格人心威風足以挫强寇鉏姦鏟猾號霹靂手則頑民悍俗亦且惶懼恐伏逡廵銷縮而莫敢動矣臣聞王嘉曰國家有急取辦於二千石二千石尊重難危乃能使下今縣令既衆不能皆賢但州得二千石能自重其威權以使下則雖有黄巾赤眉無足畏也故尹賞之治長安使吏民雜舉輕薄少年惡子鮮衣凶服持兵刄者悉籍記之一旦收捕納之虎穴中由是盜賊頓止張敞之治膠東明設購賞開羣盜令相斬捕除罪吏追捕有功而上名尚書調補縣令者數十人由是盜賊觧散趙廣漢之治京兆精於吏職尤善為鈎鉅以得事情郡中盜賊閭里輕俠其根株窟穴所在銖兩之姦皆不能逃朱博之治琅琊嘗令属縣各用豪傑為大吏一旦竊發縣則移書詭責取辦其人盡力有效必加厚賞以是豪强慹服韓延夀之治潁川置正五長相率以孝悌閭里阡陌有非常吏輙聞姦人莫敢入界而吏無追捕之苦龔遂之治渤海移書勅属縣罷捕逐之吏單車獨行務以徳化於是盜賊悉平此數子者可謂善治羣盜者矣然方今之時其術亦有可用亦有可去者盖彼時此時故也臣為陛下今日計莫若明詔督責監司郡守使勤於王事常行舉察無以酒色昏其精神無以賄賂易其心志夙興夜寐當蘄伏節死義盡忠犯難以報國恩仍乞明詔郡縣有驕兵惰卒窮困亡命者有累負重罪常赦不原者有閭巷惡少不齒於人者有困迫飢寒剽奪衣食者並許自陳革過鼎新不念舊惡仍仰州縣給賞召募有願奮力勤王捍寇立功者集官詣射圃試閲擇有股肱勇力之人收録麾下常行禁約應副軍期差使夫如是則舊染汚俗咸與維新人人自奮願以身報國況以此籠絡天下之豪傑皆為我用則嘯聚為盜者無有也臣竊見聖詔盡起天下之兵臣知州縣之兵本不足以禦寇今又起而之他則其勢愈殺矣若不早用臣計一旦有豪傑奮發而起為之應者贏糧影從鱗集瓦合攻城犯邑則守令不過提攜妻孥遁戢草莽為自全計而已誰肯為陛下守土者不若用臣之計則盜賊不作而國兵不乏守土者又得以安其身而盡忠竭節矣此臣願獻陛下四䇿也臣又聞當一方之重寄百里之命所以保守土地全活生靈邦之治亂民之存亡實有賴焉當其平居無事無枹鼓之虞無征伐之役享髙爵厚禄處則華廈衣則錦繡躍駿馬而羅紅顔坐重茵而食列鼎髙談闊視手揮指顧號令吏民則庸人懦夫亦可勝其任洎其遽有變故回惶失措不過嬰城拱手坐待其斃甚者望風而竄伏矣曽不聞有髙城深池堅甲利兵與之勍敵効死而不去者夫如是則生民何賴焉然則忠義之士卓然名節與秋霜烈日争嚴使之當公家之任而能提孤軍守偏城臨大難而不奪其守者信難其人臣觀唐明皇勵精政事開元之際㡬致太平得人不為不盛一旦禄山叛逆哮噬無前河北二十四州之吏為賊誘引委靡從順者㡬半逆為之計不陷於賊者獨顔真卿一人而已故𤣥宗喜謂左右曰朕不識真卿何如人所為乃若此使王師有進征之援者平原之守也繼而張廵許遠與城父令姚誾以數年疲薾之兵而抗百萬難制之虜孤寄一隅日戰數十挫賊之鋒鯁其喉牙使不得進而搏食江淮之地轉輸不絶其民不為塗炭者良以睢陽未下也此在當時亦未至於揚芳飛英角立傑出然一旦遇變乃能忠義奮發激昂天下之吏雖赴湯火冒矢石而有不可屈之大節載在方册章章不可掩使後世姦臣賊子尸禄素餐者聞其風莫不慙汗脫或太守縣令人人皆顔真卿張廵許遠姚誾軰則國勢何患乎不振也夫以方今人材之盛而臣乃敢昌言謂難其人者臣竊見曩者清溪寇起郡縣之吏懐印綬挈妻子而先去者比比皆是當時士庶咸謂不能守土之臣必遭誅戮以激貪懦既而交結權貴第相汲引巧為詞説文過飾非非特不正典刑又且悉與敘復故忠義之風不震而臣子無所矜式遂使勍敵交侵㡬危社稷而河北守令罕與為敵者循前弊而已假使當時方寇既擒不能守土者悉與誅戮則頑夫亷懦夫有立志金人未必能深入若蹈無人之境也臣為今日計莫若明詔丁寕誥戒天下郡縣宜思患而預防之過此以徃或有内陵外侮攻犯城邑而能捍寇自全者許擢用於朝而推恩於子孫如或不能保守復循舊風即與斬首以戒後來仍流竄其子孫於遠惡之地縱累經赦不許原罪則人人思効死而莫肯為迯逋自安之計矣此臣願獻陛下五䇿也臣又聞有常産者有常心無常産者無常心無常産而有常心者惟士為能若民則無常産因無常心茍無常心放僻邪侈無不為矣臣伏覩聖詔許餘路忠義之士率衆勤王甚盛舉也然天下之民不能保其常心以臣觀之河北河東京畿不幸為敵人侵陵自當體國念家人自為戰聖詔許其聚徒結衆捍寇立功可也若施之於餘路則不可也何則民無常情約之以法刼之以威則規規然不敢自肆無以制之則若置猿於木投魚於淵安能保其不恣哉臣觀今日應募而起者多豪横之民浮家泛宅而無所歸一旦雲集則號令貴乎有威統御貴乎有法左右前後不紊其常旌旗行伍不汨其序然後擊之無敵㪚之不亂而可以立武功也如使擒縱不得其人則變心生而禍患作本以治亂反以致亂本以禦寇反以助寇安知無姦雄投隙假勤王之名為叛逆之賊哉此無他餘路安堵如故人物繁富倉廪實而府庫充豪横之人制之不得其術則見所可欲而争端起矣臣近觀福建路發募兵經由臨川統御無術遂爾作亂强刼婦女虜奪衣物破人家産而人莫敢誰何不過吞聲飲恨無所從訴臣始聞之不勝太息竊慮炎炎不已則遂為大患也幸而州府訪聞即嚴行禁約使後來者少挫其氣而不復肆侮臣為陛下今日計莫若速降詔止絶餘路不許聚徒結衆所有已應募者仰同心協力共立邊功當有厚賞如復欲召募勇敢之人即仰州縣給賞自募閱試擇其堪用者録之仍即繩之以軍法無使復襲前弊臣觀孫武一斬隊長之首而左右前後跪起皆中規矩繩墨無患約束之不明申令之不熟也若以為天子已下之令而不可中輟則又非所以安邦也臣觀兩漢英斷之主無出髙祖酈生謀撓楚權欲復立六國髙祖曰善趣刻印及聞留侯之言吐哺而罵曰趣銷印夫稱善未㡬繼之以罵刻印銷印有同兒戲然其計足以安社稷無傷乎髙祖知人之明也此臣願獻陛下六䇿也臣又聞天下安注意相天下危注意將然以臣觀之則天下安危將相皆在所注意況將相和則士豫附士豫附則天下雖有變而權不分權不分乃所以為社稷計也是以宣王承周衰之後四夷交侵中國微矣當時北有玁狁之難伐之不可後時必有嚴翼之人以供武服然後能勝雖有嚴翼之人無將以率之則勝亦未可必也故必有文武吉甫以為之將然後勝可必也詩曰文武吉甫萬邦為憲是也吉甫為將於外而内無忠順之臣與之同志者輔王耳目而迪其心志則妨功害能之人至矣妨功害能之人至則若吉甫者其身之不保何暇議勝敵哉故必有張仲孝友者在内然後吉甫得以致力於外以有功然則宣王所恃以收功者張仲孝友而已詩曰侯誰在矣張仲孝友是也萬缺今日金人之患殆有過於宣王之時陛下欲成中興之大業則伐之尤不可後時朝廷大臣如張仲孝友者想不乏人然未識宣威沙漠以統王師者有文武之吉甫耶借使有之則為宰相不識同心同徳以輔王耳目而迪其心志有如宣王之時耶臣觀吕太后時諸吕擅權欲刼少主危劉氏丞相陳平患之陸賈為平畫計曰社稷安危在两君掌握之間爾君何不交驩太尉陳平於是與絳侯深相交結卒誅諸吕而漢祚不絶者陳平能用陸賈之計故也臣為陛下今日計尤在於選將擇相無輕付此柄而使之内外相和以濟國難則勍敵無足慮以臣觀之如李綱者初無大過惡不宜置之閒㪚之地況綱之功業卓偉忠義奮發真社稷之臣天下之所樂從海内之所推稱者也聞其譴謫雖閭里庸夫野老莫不咨嗟感憤以謂國家不能用人也夫處之以將相之任則當取其大功而略其小過臣聞綱在上皇朝京師暴水泛漲文武百寮皆備船筏為避水計獨綱奮然為上皇敷陳災異忠言苦鯁雖旋被譴責而甘心無怨既而後患果符其語陛下明斷擢綱於卿監之中而處之以樞要之職天下知朝廷得人矣既而金兵勢迫羣臣有他幸之請獨綱毅然斷其不可于時朝廷大臣姻属皆㪚而之四方甚若蔡京父子䝉被渥恩莫與比隆一旦變起舉族逃遁無毫髪為社稷計者惟綱全室不動仍肯以身當戰之先故天下皆知此時微綱為之宰制則京師已為丘墟生民皆為魚肉矣其功豈小補哉今日豈可以用軍之小過而黜之於外是失天下之望也臣聞漢髙祖奮布衣提三尺劒起於豐沛六年而成帝業者盖以其能知人而善用爾故嘗告于羣臣曰吾所以有天下者以其能用三傑運籌帷幄決勝千里吾不如子房鎮國家撫百姓吾不如蕭何戰必勝攻必取吾不如韓信項羽有一范増而不能用此其所以為我擒也臣以是知人各有所長用人者當量能授職使蕭何而為戰勝攻取之事必不能矣昔房琯自負天下為己任然一舉䘮師遂不復振原琯以忠義自奮片言悟主以取宰相必有大過人者用違所長卒無成功後世所以惜之臣謂若綱者可鎮國家撫百姓安四夷者也至于用兵恐非所長然則今日之失非綱之罪也用綱者之罪也陛下謫之於㪚籍是棄蕭何房琯也是有一范増而不能用也得無為金人快其私忿耶臣又慮朝廷之上六賊死黨尚有存者不然則白時中李邦彦之姻属尚有大用者故隂為之陷穽吹毛求疵洗垢索瘢中含沙之射影而陛下未之察也使無是軰則幸甚脫或有之尤今日之所急去也臣聞王珪進見唐太宗有美人在側本廬江王姬帝指之曰廬江不道賊其夫而納其室何有不亡者乎珪因以郭公善善惡惡之事而諷之曰知廬江之亡而姬尚在正所謂知惡而不能去也臣即此以見陛下知綱而不能用是亦郭公之善善也知六賊之朋黨而不能去是亦太宗納廬江王姬也朝廷進見之臣不識有能如王珪之諷諫者耶臣為今日計莫若速降詔音復綱舊職則朝野同歡矣此臣願獻陛下七策也臣又聞安邊禦戎之術在於擇良將選精兵求辯士尊謀主四者並用而不偏廢然後可以興大事也穰苴斬荘賈而晉師罷去燕師渡水而解韓信背水一戰而擒趙王歇斬成安君泜水上者得良將也孫臏伏萬弩於馬陵之下魏軍至而伏發龐涓死焉李靖將輕兵至丹陽而輔公祏擒者得精兵也陸賈使南越尉佗箕踞能使之去黄屋而稱臣韓愈入鎮州而牛元翼潰圍而去王廷湊不追者得辯士也釋李左車之縛而師之遂收燕齊用侯君集之䇿而攻之遂降智盛者得謀主也臣常患世之論兵者徒知重將帥之選急士卒之練修器械觀形勢推風角鳥占雲祲孤虚之法而已至於辯士謀主則略而不論正所謂知用兵而未知所以用之之術也臣伏覩臣寮上言謂今日邊患方滋殊乏虎臣天下之大未必無其人欲乞明詔州縣有拳勇股肱之力傑出於衆者及有兵謀武藝才堪為將者俾以名聞擢而用之甚盛舉也然以臣觀之未甚盡善何則自將而言之固不以一槩論有一軍之將有一國之將有天下之將又豈特有拳勇股肱之力兵謀之人然後可以為將哉斬蛟長橋刺虎南山走有追風之逸射有貫蝨之妙被堅執銳所向無前攻城破陣所至先服者特可以將一軍而已千變萬化神出鬼没或縱之而後擒或以負而為勝測之而益深運之而無方若金在鎔惟冶者之所鑄若泥處埏惟陶者之所埴所攻輙破所擊輙取無徃而不利者一國之將也以仁伐不仁以義伐不義拯民於水火之中躋民於仁夀之域致壺漿以迎王師而人惟恐居後者天下之將也又豈特恃其股肱之力武藝之精而然哉古人固有不持尺刄不操寸戈而能却百萬之師以至談笑而折衝偃息而銷釁者在於臨機果料敵明運以籌䇿而已又況用人以安天下不專以文辭取不可以家世論當考其行實究其才能如何耳故季布遭髠鉗而有名將之稱婁敬脫輓輅而建金城之固蕭曹起於刀筆之吏英衛起於罪亡之餘酈食其乃監門狂生樊噲特鼓刀僕御班超一腐儒耳薛仁貴特田家子耳一旦依日月之末光皆能勒功帝籍振名後世借使漢唐之君不能用之則數子者亦堙没於無聞矣軍法曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者要趣其利愚者不計其死使人能收其長而弃其短則將帥何患乎乏人也以臣觀今日募兵之衆則精兵不患乏人然臣竊疑良將辯士謀主未必多多益辦也且如仁宗皇帝時富弼却契丹割地之請是亦辯士之功也臣竊意金人雖暴悍如此然為之王者又豈木偶人哉亦必知世道之安危識人理之盛衰萬一得一辯士如儀秦之流圓機不礙能掉寸舌縱横議論俾獨馳一介之使喻之以禍福之機陳之以利害之大講隣國之好而啓之援信史之證而誘之使之動心駭聽彼未必不一言悔悟復守舊約而不敢侵我疆土也臣為陛下計莫若廣詔京畿諸路士庶有學足以該古今識足以造天人才足以供倚馬之求辯足以破傾河之論壓之以威而益振恐之以死而愈新一人而兼得斯數者仰州縣審實保明解發赴闕又乞詔天下有雄材大略能畫安邊之䇿能知用兵之權守邊可以賢於長城戰勝可謂國士無雙者並仰州縣審實解發陛下親䇿於庭量才授職試其所長則良將辯士謀主一舉而兼得之何憂乎虎臣之乏也方今邊患日滋正廣收人物以備驅䇿之時無以臣言為狂妄也此臣願獻陛下八䇿也臣又聞孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾矣臣以是知民惟邦本本固邦寜國之所以廢興存亡特在於得民與不得民之間耳傳所以言桀紂以不仁失天下湯武以積徳有天下者是也臣竊觀天下之民似有離心盖自太上皇臨御之日姦臣擅權蠧賊滋甚假奉上之名而割民之脂膏託崇道之勢而奪民之産業因花石之微而驅民於困厄之地縁名字之諱而擠民於罪亡之餘天下士庶隂懐怨恨之氣抑欝而不敢吐上違天心下乖民和故頃者方寇竊發民樂其禍而有何獨後我之嘆則民心之離也乆矣非一朝一夕之故其所由來者漸矣幸賴祖宗遺徳餘烈尚有存者故紀綱未至於大壊去年春金人入寇國勢㡬危若非上皇明斷禪位陛下使人心懐則天下已非國家有矣何則黎元赤子皆知陛下在儲宫時恭儉仁孝之名聞于遠邇故即位之初閭里相賀知天下可指日安也既而悉誅六賊天下又復相慶謂陛下能除民之害真安邦定國之主是知民心固樂從也比者聖詔起兵國家太平日乆頒白之老不聞金鼓之聲一旦干戈擾攘黎元固已動心而駭目加之無識兇徒簧鼓不根之語謂國家敗兵既數將下詔民間三丁選一以為用智者知其流言陛下必不為此奈流俗易於揺惑雖家置長喙人為說鈴亦未能決其疑臣恐此語一煽民心又復揺動甚者預為生離之憂則求其安堵不動不可得矣此盖流言者之罪然亦國家募兵有以致其疑也臣愚欲乞陛下速降詔㫖安撫天下明斷此意使解其惑以結民心廣施徳化使恩有餘地為子孫萬世無疆之休仍乞天下所發遣募民見在京畿諸路屯聚捍寇者俟金人掃蕩之日命將帥出厚賞以募有願住者乞留守京畿以防後患仍約以歸期其不願留者悉遣之若抑而留之又致變矣陛下如其吝賞給惜供餽不招軍以控扼邊陲則臣心知邊境搔擾無時而已異時復下詔募兵則東南之民其力疲矣其財耗矣豈能保其必勝哉夫天下所發之募兵所以忘身而犯難者不過希賞賜而已借使邉圉已寜而遣之歸有功者固當厚賞無功者亦乞給賞以勞其來一則懐之使無異心二則誘之可以再用實良䇿也茲數者皆欲陛下結民心以長有天下而已此臣願獻陛下九䇿也臣又聞先王之理財也若持衡然不使之偏歸於公家亦不使之偏入於私室惟其適平而已省賦斂輕徭役者雖先王之善政然國家有金革之難將欲養兵而禦戎則其實不過以安百姓而已雖斂財於民為募兵之賞下亦無怨言也第不可以取傷亷而已臣近覩詔下募兵諸路多科兵於民使百姓所費不貲而烏合之衆又不足以立事至於忠義之士能率强勇之人以徇國家之急則官府無錢以給餽餉聚而復散者有之以臣愚計竊謂萬一邊患未寜欲募兵則不若以稅額量情均科錢以助國用應有官之家並不蠲免則所斂薄而均百姓皆樂而從之取之雖微而聚之即多州縣預貸官錢募勇敢之人以勤王事則武足以禦寇矣所斂之錢存其三之一以募兵而守城餘者悉為起兵之費甚盡善也臣嘗以是徧詢於鄉老皆善其計以是知民情之樂從也臣又慮兵餽不給則臣有䇿於此可使不損於民不害於公令下之日諸路軍儲霈然有餘矣所謂䇿者何也臣謂天下所納米以造酒者不過欲市利而已為今日計者莫若速降詔音罷賣官酒許州縣之民投状召保均分酒課任自造賣仍委局務者日計其利無使虧折應諸路所入米悉以充兵餽則𣙜酤不勞而軍儲可給矣其䇿豈不良哉此臣願獻陛下十䇿也臣於十䇿之外又有三事亦今日之不可緩者試昧死為陛下陳之臣聞之曰左不攻於左汝不共命右不攻於右汝不共命御非其馬之正汝不共命用命賞於祖不用命戮于社予則孥戮汝臣以是知古者王師之出有不用命而勝敵必戮而不赦況望風降伏者其罪冝如何哉臣竊聞比者三軍臨陣將士或不用命遂爾降敵臣愚欲乞陛下明詔撫懐軍情使各奮其勇仍有降敵者悉戮之則軍勢振矣此其一說也臣又聞明君賢相所以動而勝人成功於衆者多用間術故兵家之䇿用間有五有因間有内間有反間有死間有生間五間俱起莫知其道是謂神紀人君之寳也故三軍之事情莫親於間賞莫厚於間事莫宻於間非聖智不能用間非仁義不能使間非微妙不能得間之實微哉微哉無所不用間也臣竊意金人强悍儻或未可以力勝則不若用死間之術而滅之臣身雖不長六尺而智雄萬夫辯雖未足以方儀秦亦不可謂圓機而不礙者也臣以忠義自奮何惜一死為陛下用此術以掃蕩塵氛而安我社稷耶方今將帥如其已有良䇿滅之則生民之幸也萬一未有計則伏願朝廷借臣一介之使遣臣見彼主而說之臣自有䇿能使金兵倒戈卷甲不復侵侮陛下如欲絶其種𩔖則臣亦願以死間伏望朝廷俟其有弛心而無備則遣良將領精兵而殱之臣雖遭鼎鑊能以一身破强悍之敵而安我宋二百年之社稷使萬世之下姦臣賊子誦臣之名莫不掩卷而慙嘆則臣雖死猶生也伏願陛下明斷而決行之無謂臣布韋之賤不能立此功也古語有之曰猛虎之猶豫不如蠭蠆之致蠚孟賁之狐疑不如童子之必至取其能必行之臣前所謂使韓信李靖惜酈生之烹憐唐儉之死小有所不忍則不能成大功者正謂此也此臣所欲言者二也臣又聞隂陽家流有三竒八門之術天子庶人之式足以自利足以厭人揚兵九天之上尸敵千里之遠天神地示皆為我用則取勝之大要也今何苦而不用哉精此術者每有其人陛下求之未切爾臣願下明詔如求賢之急必得此軰以濟大事天下幸甚此臣所欲言者三也臣聞馬周以草茅一介之士為唐條陳二十餘事皆當世所切太宗愛而擢用以明佐聖不膠漆而固恨相得之晚王佐材疇能及此蕭銑據江陵屢戰不克李靖遂陳圖銑十䇿有詔拜靖行軍緫管軍政委焉師叩夷陵蕭銑遂降臣以鯫生恭誦聖詔曰每聞邊報痛切朕心臣於是感激自奮願以身報國故昧死獻十䇿臣無王佐之材非敢望若馬周之擢用特願用臣狂計以擒金國之渠魁掃蕩邊塵復祖宗之境土庶㡬不媿李靖獻䇿以圖蕭銑則臣雖以直言犯逆鱗自取誅戮亦没齒無怨言臣所陳特今日之急務至於朝廷之闕失政令之僻遺甚有可言者臣以陛下方今有北顧之憂故且置而勿論臣又竊聞學古入官挾䇿登第者平居貪位慕禄惟恐居後切切然常有不滿意一旦國家有變雖捐軀以報尚何所惜奈何風俗衰薄忠義陵遲故有官君子方且酣暢自適恬不以社稷為念甚至赴闕注調者纔聞變起不叅部而歸者有之及京畿而反者有之其間有能奮身為國者㡬何人哉間或有之則羣聚而笑指以為狂生臣聞其語忿氣拂膺恨無上方斬馬劒以斷其腰領臣恐此風一扇天下靡靡入於衰敗故願以死間之術為陛下安天下之民庶幾少立忠義以振頽風仍不避斧鉞之誅敢獻此書于朝廷也伏願陛下函容之徳天髙地厚憐臣愚忠恕臣狂斐以來忠直之言以激衰敗之俗則萬世之幸也儻或以臣言為無足採而又以草茅之賤上玷聖聦下觸權臣必欲置之死則臣亦甘心焉厯代名臣奏議卷八十二
