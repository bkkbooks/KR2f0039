body:
  text: 歷代名臣奏議卷八十明楊士竒等撰經國後魏道武帝時劉顯地廣兵强跨有朔裔會其兄弟乖離五官掾張衮上言曰顯志大意髙希冀非望乃有參天二地籠罩宇宙之規吳不并越將為後患今因其內釁宜速乘之若輕師獨進或恐越逸可遣使告慕容垂共相聲援東西俱舉勢必擒之然後總括英雄撫懷遐邇此千載一時不可失也明元帝永興二年衮又上疏曰臣既庸人志無殊操值太祖誕膺期運天地始開參戎氛霧之初馳驅革命之會託翼鄧林寄鱗溟海遂荷恩寵榮兼出內陛下龍飛九五仍參顧問曽無微誠塵山露海今舊疾彌留氣力虛頓天罰有罪將填溝壑然犬馬戀主敢不盡言方今中夏雖平九域未一西有不賔之羌南有逆命之虜岷蜀殊風遼海異教雖天挺明聖撥亂乘時而因機撫會實須經略介焉易失功在人謀伏願恢崇睿道克廣德心使揖讓與干戈並陳文德與武功俱運則太平之化康哉之美復隆於今不獨前世昔子囊將終寄言城郢荀偃辭唅遺恨在齊臣雖䦣劣敢忘前志魂而有靈結草泉壤泰常元年晉劉裕伐姚泓舟師自淮入河欲泝河西上假道於魏魏羣臣咸以寇不可縱宜先發軍斷河上流勿令西過明元將從之博士祭酒崔浩曰此非上䇿司馬休之之徒擾其荆州劉裕切齒已久今興死子劣乘其危亡而伐之臣觀其意必欲入關徑躁之人不顧後患今若塞其西路裕必上岸北侵如此則姚無事而我受敵今蠕蠕內寇民食又乏不可發軍發軍赴南則北寇進擊若其救北則東州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞莊刺虎兩得之勢也使裕勝也必德我假道之惠令姚氏勝也亦不失救鄰之名縱使裕得關中縣逺難守彼不能守終為我物今不勞兵馬坐觀成敗鬬兩虎而收長久之利上䇿也夫為國之計擇利而為之豈顧婚姻酬一女子之惠哉假令國家棄恆山以南裕必不能發吳越之兵與官軍爭守河北居然可知也二年晋齊郡太守王懿降魏上書陳計稱劉裕在洛勸魏以軍絶其後路則裕軍可不戰而克書奏帝善之問博士祭酒崔浩曰劉裕西伐前軍已至潼關其事如何以卿觀之事得濟否浩對曰昔姚興好養虛名而無實用子泓又病衆叛親離裕乘其危兵精將勇以臣觀之克之必矣帝曰劉裕武能何如慕容垂浩曰裕勝帝曰試言其狀浩曰慕容垂乘父祖世君之資生便尊貴同類歸之若夜蛾之赴火少加倚伏便足立功劉裕挺出寒微不階尺土之資不因一卒之用奮臂大呼夷滅桓元北擒慕容超南摧盧循等僭晋淩遲遂執國命裕若平姚而還必篡其主其勢然也秦地戎夷混并虎狼之國裕亦不能守之風俗不同人情難變欲行荆揚之化於三秦之地辟無翼而欲飛無足而欲走不可得也若留衆守之必資於寇孔子曰善人為邦百年可以勝殘去殺今以秦之難制一二年間豈裕所能哉且可治戎束甲息民備境以待其歸秦地亦當終為國有可坐而守也帝曰裕已入關不能進退我遣精騎南襲彭城壽春裕亦何能自立浩曰今西北一寇未殄陛下不可親御六師兵衆雖盛而將無韓白長孫嵩有治國之用無進取之能非劉裕敵也臣謂待之不晚帝笑曰卿量之審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容𤣥恭之輔少主慕容暐之霍光也劉裕之平逆亂司馬德宗之曹操也世祖神䴥二年議擊蠕蠕朝臣內外盡不欲行保太后固止帝帝皆不聽唯大常卿崔浩讚成䇿略尚書令劉潔左僕射安原等乃使黃門侍郎仇齊推赫連昌太史張淵徐辨說世祖曰今年己巳三隂之嵗嵗星襲月太白在西方不可舉兵北伐必敗雖剋不利於上又羣臣共讚和淵等云淵少時嘗諫苻堅不可南征堅不從而敗今天時人事都不和協何可舉動帝意不決乃召浩令與淵等辨之浩難淵曰陽者德也隂者刑也故日蝕修德月蝕修刑夫王者之用刑大則陳諸原野小則肆之市朝戰伐者用刑之大者也以此言之三隂用兵蓋得其類修刑之義也嵗星襲月年饑民流應在他國逺期十二年太白行蒼龍宿於天文為東不妨北伐淵等俗生志意淺近牽於小數不逹大體難與逺圖臣觀天文比年以來月行奄昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也夫聖明御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慙而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊說常談施之於今不合事宜也何以言之夫蠕蠕者舊是國家北邊叛𨽻今誅其元惡收其善民令復舊役非無用也漠北髙涼不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者將軍大夫居滿朝列又髙車號為名騎非不可臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能逺逐與之進退非難制也且蠕蠕往數入國民吏震驚今夏不乘虛掩進破滅其國至秋復來不得安卧自太宗之世迄於今日無歲不驚豈不汲汲乎哉世人皆謂淵辨通解數術明決成敗臣請試之問其西國未滅之前有何亡徴知而不言是其不忠若實不知是其無術時赫連昌在座淵等自以無先言慙赧而不能對世祖大悅謂公卿曰吾意決矣亡國之帥不可與謀信矣哉而保太后猶難之復令羣臣於保太后前評議世祖謂浩曰此等意猶不服卿曉之令悟既罷朝或有尤浩者曰今吳賊南寇而舍之北伐行師千里其誰不知若蠕蠕逺遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國以來南人恐懼揚聲動衆以衛淮北彼北我南彼勞我息其勢然矣比破蠕蠕往還之間故不見其至也何以言之劉裕得關中留其愛子精兵數萬良將徑卒猶不能固守舉軍盡決號哭之聲至今未已如何正當國家休明之世士馬彊盛之時而欲以駒犢齒虎口也設令國家與之河南彼必不能守之自量不能守是以必不來若或有衆備邊之軍耳夫見瓶水之凍知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絶逺謂國家力不能至自寬來久故夏則散衆放畜秋肥乃聚背寒向溫南來寇抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬護羣牝馬戀駒驅馳難制不得水草未過數日則散而困敝可一舉而滅暫勞永逸長久之利時不可失也唯患上無此意今聖慮已決發曠世之謀如何止之陋矣哉公卿也諸軍遂行時南藩諸將表宋大嚴欲犯河南請兵三萬先其未發逆擊之因誅河北流民在界上者絶其嚮道足以挫其鋭氣使不敢深入詔公卿議之咸言宜許左光祿大夫崔浩曰此不可從也往年國家大破蠕蠕馬力有餘南賊震懼常恐輕兵奄至卧不安席故先聲動衆以備不虞非敢先發又南土下溼夏月蒸暑水潦方多草木深邃疾疫必起非行師之時且彼先嚴有備必堅城固守屯軍攻之則糧食不給分兵肆討則無以應敵未見其利就使能來待其勞倦秋涼馬肥因敵取食徐往擊之萬全之計勝必可克在朝羣臣及西北守將從陛下征討西滅赫連北破蠕蠕多獲美女珍寶馬畜成羣南鎮諸將聞而生喜亦欲南抄以取資財是以披毛求玼妄張賊勢冀得肆心既不獲聽故數稱賊動以恐朝廷背公存私為國生事非忠臣也世祖從浩議南鎮諸將復表賊至而自陳兵少簡幽州以南戌兵佐守就漳水造船嚴以為備公卿議者僉然欲遣騎五千并假署司馬楚之魯軌韓延之等令誘引邊民浩曰非上策也彼聞幽州已南精兵悉發大造舟船輕騎在後欲存立司馬誅除劉族必舉國駭擾懼於滅亡當悉發精鋭來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乘間深入虞我國虛生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虛聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晚也且楚之之徒是彼所忌將奪其國彼安得端坐視之故楚之往則彼來止則彼息其勢然也且楚之等瑣才能招合輕薄無賴而不能成就大功為國生事使兵連禍結必此之羣矣臣嘗聞魯軌說姚興求入荆州至則散敗乃不免南賊掠賣為奴使祻及姚泓已然之效浩復陳天時不利於彼曰今兹害氣在揚州不宜先舉兵一也午年自刑先發者傷二也日蝕滅光晝昏星見飛鳥墮落宿值斗牛憂在危亡三也熒惑伏匿於翼軫戒亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉而萬全國安而身盛今義隆新國是人事未周也災變屢見是天時不協也舟行水涸是地利不盡也三事無一成自守猶或不安何得先發而攻人哉彼必聽我虛聲而嚴我亦承彼嚴而動兩推其咎皆自以為應敵兵法當分災迎受害氣未可舉動也世祖不能違衆乃從公卿議浩復固爭不從遂遣陽平王杜超鎮鄴琅琊王司馬楚之等屯潁川於是賊來遂疾到彥之自清河入河泝流西行分兵列守南岸西至潼關世祖聞赫連定與宋懸分河北乃治兵欲先討赫連羣臣曰劉義隆猶在河中舍之西行前寇未可必剋而義隆乘虛則失東州矣世祖疑焉問計於浩浩曰義隆與赫連定同惡相招連結馮跋牽引蠕蠕規肆逆心虛相唱和義隆望定進定待義隆前皆莫敢先入以臣觀之有侣連雞不得俱飛無能為害也臣始謂義隆軍來當屯住河中兩道北上東道向冀州西道衝鄴如此則陛下當自致計不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此觀之儜兒情見止望固河自守免死為幸無北度意也赫連定殘根易摧擬之必仆剋定之後東出潼關席卷而前則威震南極江淮以北無立草矣聖䇿獨發非愚近所及願陛下西行勿疑平涼既平其日宴㑹太武執浩手以示䝉遜使曰所云崔公此是也才略之美當今無比朕行止必問成敗決焉若合符契初無失矣孝明帝時靈太后臨朝司徒侍中尚書令任城王澄表曰伏惟世宗宣武皇帝命將授旗隨陸啓顙運籌制勝淮漢自賔節用勞心志清六合是故纘武修文仍世彌盛陛下當周康靖治之時豈得晏安於𤣥默然取外之理要由內彊圖人之本先在自備蕭衍雖虐使其民而窺覦不已若遇我虛疲士民凋窘賊衍年老志張思播虺毒此之弗圖恐受其病伏惟陛下妙齡在位聖德方升皇太后總御天機乾乾夕愓若留意於負荷忿車書之未一進賢拔能重官人之舉標賞忠清旌養人之器修干戈之用畜熊虎之士愛時鄙財輕寶重榖七八年間陛下聖略方剛親王德幹壯茂將相膂力未衰愚臣猶堪戎伍荷戈帶甲之衆蓄鋭於今燕弧冀馬之盛充牣在昔又賊衍惡積祻盈勢不能久子弟暗悖釁逆已彰亂亡之兆灼然可見兼弱有徴天與不逺大同之機宜須蓄備昔漢帝力疾討滅英布髙皇病卧親除顯逹夫以萬乘之主豈忘宴安實以侵名亂正計不得已今宜慕二帝之逺圖以肅寧為大任然頃年以來東西難寇艱虞之興首尾連接雖尋得翦除亦大損財力且饑饉之氓散亡莫保收入之賦不增出用之費彌衆不愛力以悅民無豐資以待敵此臣所以夙夜懷憂悚息不寧者也易曰何以守位曰仁何以聚人曰財故曰財者非天不生非地不長非時不成非人不聚生聚之由如此其難集人守位若此之重興替之道焉可不慮又古者使民嵗不過三日食壯者之糧任老者之事此雖太平之法難卒而因然妨民害財不亦宜戒今墉雉素修廄庫崇列雖府寺膠孰少有未周大抵省府粗得庇憩理務諸寺靈塔俱足致䖍講道唯明堂辟雍國禮之大來冬司徒兵至請籌量減徹專力經營務令早就其廣濟數施之財酬商互市之弊凡所營造自非供御切須戎伏急要亦宜微減以務阜積庶府無橫損民有全力夫食土簋而媯德昭卑寢室而禹功盛章臺麗而楚力衰阿宫壯而秦財竭存亡之由灼然可覩願思前王一同之功畜力聚財以待時會後周武帝時將圖東討詔邊城鎮並益儲偫加戌卒齊陳二國聞之亦增修守禦柱國于翼諫曰宇文護專制之日興兵至洛不戰而敗所喪實多數十年委積一朝糜散雖為護無制勝之策亦由敵人之有備也且疆埸相侵互有勝敗徒損兵儲非䇿之上者不若解邊嚴減戌防繼好息民敬待來者彼必善於通和懈而少備然後出其不意一舉而山東可圖若猶習前蹤恐非蕩定之計帝納之唐髙祖武德二年欲棄大河以東謹守關西秦王世民請曰太原王業所基國之根本河東殷實京邑所資若舉而棄之臣竊憤恨願假臣精兵三萬必平殄武周克復汾晋唐主於是發關中兵以益世民使擊武周武后時麟臺正字陳子昻上軍國機要疏曰臣竊聞宗懷昌等軍失律者乃被逆賊詐造官軍文牒誣召懷昌昌等專愚無備陷沒今諸軍敗失東蕃固知然恐安東阻隔未審此詐國家若無私契與安東往來臣恐凶賊多端詐僞復設萬一被其矯命更失其圖乃是資長賊權沒陷府城此固宜天恩已應先有處分然臣愚見不敢不言又賊初勝不即西侵者深恐圍略安東以自全計若安東被圍略則遼東以來非國所制伏乞天恩早為圖之臣聞天子義兵不可以怒發怒則衆懼急則人搖則賊得其勢故昔者聖人守靜以制亂持重以服姦大義常存人無疑懼臣伏見恩制免天下罪人及募諸色奴充兵討擊者是捷急之計非天子之兵且比來刑獄久清罪人全少奴多怯弱非慣征行縱其募集未足可用況當今天下忠臣勇士萬分未用其一契丹小孽假命待誅何勞免罪贖奴損國大義且陛下富有四海一戰未勝遂即免罪募奴若更有他虞復何徵發臣恐此不可威示天下臣聞聖人制事必理未萌所以姦不敢謀賊不得起臣聞吐蕃近日將兵圍瓜州數日即退或云此賊通使墨啜恐瓜沙止遏故以此兵送之臣雖未信然惟國家比來勍敵者在此兩蕃至於契丹小醜未足比類今國家為契丹大發河東道及六胡州綏延丹隰等州稽胡精兵悉赴營州而緣塞空虛靈夏獨立今水生河合草秋馬肥秦中北據隴右亦關東鄰黨凶羯姦謀覘知此隙驅其醜類大盜秦關隴右馬群是國所寶防備逺䇿良宜預圖不可竭塞上之兵使凶虜得計伏願詳審臣聞所養非所用所用非所養理家必弊在國必危故明君不畜無用之臣慈父不畜無益之子今朝廷五品三品受國寵榮天恩賞賜府庫虛耗食人之祿死人之事恩養聖朝甚矣厚矣及邊有小賊則云無人驅使又勞聖恩逺訪外人外人先無寵祿臨難又不肯殉節然則國之所養者總無用之臣朝之所遺者乃有用之士今不收有用厚養無用欲令忠賢效力凶賊滅亡以臣愚見理不可得近者遼軍張元遇等喪律實由內外不同心宰相或賣國樹恩近臣或附勢私謁祿重者以拱默為智任權者以傾巧為賢羣居雷同以殉私為能媚妻保子以奉國為愚陛下又寬刑漏網不循名實遂令綱紀日廢姦宄滋多今國家第一要者在稍寬兵期山南淮南去幽州四千里所司使十月上旬到計日行百里四十日方到即今水雨如此又徴符到彼未久當日辦發猶不及期況未辦發月日行不可百里違限者死國有常刑到不及期懼罪逃散為賊此更生一患縱倍程趂期亦恐不及若違不誅則軍不可統若違必誅則全衆皆怨況兵疲不堪用吳廣陳勝為盜由此切急切急即日江南淮南諸州租船數千艘已至鞏洛計有百餘萬斛所司便勒往幽州納充軍糧其船夫多是客户逰手墮業無賴雜色人發家來時唯作入都資料今已到京又勒往幽州幽州去此二千餘里還又二千餘里方寒氷凍一無資糧國家更無優恤但切勒赴限比聞丁夫皆甚愁歎又諸州行綱承前多僦勾至都糴納今儻有此類而向滄瀛糴納則山東來米必二百已上百姓必搔動今國家不優恤又無識事明了人檢㸃勾當知租米見在虛實又未宣恩㫖慰勞兵夫唯切勒赴限儻在道逃亡此糧有萬一非意損失則東軍二十萬衆坐自取敗為賊所圖切急切急楊元感以此為亂實軍國大命山東百姓國家比以供軍矜不㸃募近聞東軍失利山東人驕慢乃謂國家怕其粗豪不敢徴發今街談巷議多有茍且之心伺國瑕隙頗搖風俗國家大政須人無二心若縱懷二姦亂必漸臣伏思即日山東愚人有亡命不事産業者有逰俠姦盜者有姦豪强宗者有交通州縣造罪過者如此等色皆是姦雄國家又不以法制役之臣恐無賴子弟暴橫日廣上不為國法所制下不為州縣所羈又不從軍又不守業坐觀成敗養其姦心在於國家甚非長計以臣愚見望降敕使臣與州縣相知子細採訪有粗豪遊俠亡命姦盜失業漂食富族强宗者並稍優與賜物悉募從軍仍宣恩㫖慰勞以禮發遣若如此則山東浮人安於太山一者以懾姦豪異心二者得精兵討賊不煩寃怨稽胡等又身既在軍則父兄子弟自不敢為過昔漢祖征山東使蕭何鎮關中漢軍數敗蕭何每發關中子弟以助漢軍三秦無盜亂之患漢軍有强雄之勢蓋以此道也夫亂羣敗衆者唯在姦雄姦雄既羈亂弊自息伏乞聖恩早圖之詩云無縱詭隨式遏寇虐紫袍緋袍緑袍金帶牙笏告身金銀器物等即日軍衆已集入賊有期臣欲募死士三萬人長驅賊庭一戰掃定軍中未有髙爵重賞無以勵勇使貪伏望天恩賜給前件袍帶告身器物二千事庶以勸勵士衆未敢虛用比來將軍不明賞罰所以兵不齊心今聚十五萬衆戈甲糧餉日費萬金不早剋定恐所費彌廣山東百姓貧弊不可再役特乞天恩允臣所請肅宗為太子安祿山亂建寧王倓典親兵扈車駕度渭百姓遮道留太子太子使喻曰至尊播遷吾可以違左右乎倓進說曰逆胡亂常四海崩分不因人情圖興復雖欲從上入蜀而散關以東非國家有夫大孝莫若安社稷殿下當募豪傑趣河西收牧馬今防邊屯士不下十萬而光弼子儀全軍在河朔與謀興復䇿之上者廣平王亦贊之於是議定德宗時翰林學士陸贄論關中事宜奏曰臣頃覽載籍每至理亂廢興之際必反覆參考究其端由與理同道罔不興與亂同趣罔不廢此理之常也其或措置不異安危則殊此時之變也至於君人有大柄立國有大權得之必强失之必弱是則歷代不易百王所同夫君人之柄在明其德威立國之權在審其輕重德與威不可偏廢也輕與重不可倒持也蓄威以昭德偏廢則危居重以馭輕倒持則悖恃威則德喪於身取敗之道也失重則輕移諸已啓祻之門也陛下天錫勇智志期削平忿兹昏迷整旅奮伐海內震疊莫敢寧居此誠英主撥亂拯物不得已而用之然威武四加非謂蓄矣所可兢兢保惜慎守而不失者唯居重馭輕之權耳陛下又果於成務急於應機竭國以奉軍傾中以資外倒持之勢今又似焉臣是以疚心如狂不覺妄發輒踰顧問之㫖深測憂危之端此臣之愚於自量而忠於事主之分也古人所謂愚夫言之而明主擇之惟陛下幸留聽焉臣聞國家之立也本大而末小是以能固又聞理天下者若身之使臂臂之使指則小大適稱而不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指故用即不悖處則不危斯乃居重馭輕天子之大權也非獨為御諸夏而已抑又有鎮撫戎狄之術焉是以前代之制轉天下租稅委之京師徙郡縣豪傑處之陵邑選四方壯勇實之邊城其賦役則輕近而重逺也其惠化則悅近以來逺也太宗文皇帝既定大業萬方底乂猶務戎備不忘慮危列置府兵分𨽻禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸久武備浸微雖府衛具存而卒乘罕習故祿山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴經制頗存典刑彊本之意則亡緣邊之備猶在加以諸牧有馬每州有糧故肅宗得以為資中復興運乾元之後大憝初夷繼有外虞悉師東討邊備既㢮禁戌亦空吐蕃乘虛深入為寇故先皇帝莫與為禦避之東逰是皆失居重馭輕之權忘深根固柢之慮內寇則崤函失險外侵則汧渭為戎於斯之時朝市離析事變可慮須臾萬端雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉尚賴宗社威靈先皇仁聖攘却醜類再安宸居城邑具全宫廟無霣此又非常之幸振古所未聞焉足以見天意之於皇家保佑深矣故示大警將𢎞永圖陛下誠宜上副𤣥心下察時變逺考前代成敗近鑒國朝盛衰垂無疆之休建不拔之業今則勢可危慮又甚於前伏惟聖謀已有成算愚臣未逹敢獻所憂先皇帝還自陜郛懲艾往事稍益禁衛漸修邊防是時關中有朔方涇原隴右三帥以扞西戎河東有太原全軍以控北虜此四軍者皆聲勢雄盛士馬精彊又徵諸道戍兵每嵗乘秋備塞尚不能保固封守遏其奔衝京師戒嚴比比而有陛下嗣膺寶位威懾殊鄰蠢兹昆夷猶肆毒蠚舉國來寇志吞岷梁貪冒既深覆亡幾盡遂求通好少息交侵蓋緣馬喪兵疲務以計謀相緩固非畏威懷德必欲守信結和所以歷年優柔竟未堅定要約息兵稍久育馬漸蕃必假小事忿爭因復大肆侵掠張光晟又於振武誘殺羣胡自爾已來絶無虜使其為嫌怨足可明徴借如吐蕃實和回紇無憾戎狄貪詐乃其常情茍有便利可窺豈肯端然自守今朔方太原之衆逺在山東神䇿六軍之兵繼出關外儻有賊臣啖寇黠虜窺邊伺隙乘虛微犯亭障此愚臣所竊為憂者也未審陛下其何禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曽不料兵連祻拿變故難測日引月長漸乖始圖故前志以兵為凶器戰為危事至戒至慎不敢輕用之者蓋為此也當勝而反敗當安而倒危變亡而為存化小而成大在覆掌之間耳何可不畏而重之乎近事甚明足以為鑒往嵗為天下所患咸謂除之則可致升平者李正已李寶臣梁崇義田悅是也往嵗為國家所信咸謂任之則可除祻亂者朱滔李希烈是也既而正已死李納繼之寶臣死惟嶽繼之崇義卒希烈叛惟嶽戮朱滔攜然則往嵗之所患者四去其三矣而患竟不衰往嵗之所信者今則自叛矣而又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圖循偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無已之求望難必之效其於為人除害之意則已至矣其為宗社自重之計恐未至焉自頃將帥徂征久未盡敵茍以藉口則請濟師陛下乃為之輟邊軍缺環衛虛內廄之馬竭武庫之兵占將家之子以益師賦私養之畜以增騎猶且未戰則曰乏財陛下又為之算室廬貸商賈傾司府之幣設請𣙜之科關輔之間徴發已甚宫苑之內備衛不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之以陛下聖德君臨率土欣戴非常之慮豈所宜言然居安備危哲王是務以言為諱中主不行若備之已嚴則言亦何害儻忽而未備又安可勿言臣是以罄陳狂愚無所諱避罔敢以中主不行之事有虞於聖朝也惟陛下熟察之過防之且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則內保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭德也豪勇之在關中者與籍於營衛不殊車乘之在關中者與列於廄牧不殊財用之在關中者與貯於帑藏不殊有急而須一朝可聚今執事者先拔其本棄重取輕所謂倒持太阿授人以柄議制置則彊幹弱枝之術反語綏懷則悅近來逺之道乖求諸通方無適而可顧臣庸懦竊為陛下惜之往者不可追來者猶可補臣不勝懇懇憂國之至輒敢效其狂鄙以備採擇之一端陛下儻俯照微誠過聽愚計使李芃援東洛懷光救襄城希烈凶徒勢必退衄則所遣神䇿六軍士馬及㸃召節將子弟東行應援者悉可追還河北既有馬燧抱真固亦無藉李晟亦令旋斾完復禁軍明敕涇隴邠寧但令嚴備封守仍云更不徴發使知各保安居又降德音勞徠畿甸具言京輦之下百役殷繁且又萬方會同諸道朝奏恤勤懷逺理合優容其京城及畿縣所稅間架𣙜酒抽貫貸商㸃召等諸如此類一切停罷則冀已輸者弭怨見處者獲寧人心不搖邦本自固祻亂無從而作朝廷由是益尊然後可以度時宜施教令弛張自我何有不從端本整棼無易於此贄又請撫循李楚琳疏曰右件官比緣性行無良多為時議所惡頻被封章論奏言其心挾兩端若不隄防恐妄生窺伺謂宜斥絶用杜姦邪近者鳳翔使來絶不䝉恩召見滯留數輩並未放還伏恐陛下不忍忿心頗從輿議以臣蠢戇竊謂非宜李楚琳乘時艱危俶擾岐下賊殺戎帥欵結凶渠奉天之圍頗亦有助其於叛亂海內彰聞論者今始紛紜一何知見之晚耶但以乘輿未復大憝猶存勤王之師悉在畿內急宣速告晷刻是爭商嶺則道迂且遙雒谷復為盜所扼僅通王命唯在褒斜此路若又阻艱南北遂將敻絶以諸鎮危疑之勢居二逆誘脅之中洶洶羣情各懷向背彼勝則往我勝則來其間事機不容蹉跌儻或楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不甚病哉且楚琳本懷唯惡是務今能兩端顧望乃是天誘其𠂻故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其持疑使足集事儻能遷善亦可濟師今若徇褊狹之談露猜阻之跡懼者甚衆豈唯一夫自昔能建竒功或拯危厄未必皆是潔矩之士溫良之徒驅駕擾馴唯在所馭朝稱凶悖夕謂忠純始為寇讎終作卿相知陳平無行而不棄忿韓信自王而遂封蒯通以析理獲全雍齒以積恨先賞此漢祖所以恢帝業也置射鈎之賊而任其才釋斬袪之怨以免於難此桓文所以𢎞霸功也然則當事之要雖罪惡不得不容適時之宜雖仇讎不得不用陛下必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又況阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖孔子曰人而不仁疾之已甚亂也又曰小不忍則亂大謀君陳曰無忿疾于頑又曰必有忍其乃有濟伏願陛下必以英主大略聖人格言為元龜固不可納豎儒小忠以虧撓興復之業也臣不勝憂國至計謹啓事以聞贄又論從賊中赴行在官狀曰欽溆奉宣聖㫖近日往往有卑官從山北來皆稱自京城偷路奔赴行在大都此輩多非良善有一邢建論說賊中體勢語最張皇察其事情頗是窺覘今且令留在一處安置如此之類更有數人若不根尋恐有姦計卿宜商量如何穩便者臣伏以任總百揆者與一職之守不同富有萬國者與百揆之體復異蓋尊領其要卑主其詳尊尚恢𢎞卑務近細是以練核小事糾察微姦此有司之守也維御萬樞選建庶長總綱而衆目咸舉明邇而羣方自通此大臣之任也愚智兼納洪纎靡遺蓋之如天容之如地垂旒黈纊而黜其聰察匿瑕藏疾而務於包含不示威而人畏之如雷霆不用明而人仰之如日月此天子之德也以卑而僭用尊道則職廢於下以尊而降代卑職則德喪於上職廢則事不舉德喪則人不歸事不舉者弊雖切而患輕人不歸者釁似微而祻重兹道得失所關興亡聖王知宇宙之大不可以耳目周故清其無為之心而觀物之自為也知億兆之多不可以智力勝故一其至誠之意而感人之不誠也異於是者乃以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺故宣尼述陶唐之盛曰惟天為大惟堯則之周詩美文王之德曰不識不知順帝之則是皆覆育萬物渾然大同無好無惡不忌不克之謂也項籍納秦降卒二十萬慮其懷詐復叛一舉而盡坑之其於防虞亦已甚矣漢髙豁逹大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴衛雄猜而荆軻奮其隂計光武寬容博厚而馬援輸其欵誠豈不以虛懷待人人亦思附任數御物物終不親情思附則感而悅之雖寇讎化為心膂有矣意不親則懼而阻之雖骨肉結為仇慝有矣臣故曰兹道得失所關興亡伏惟陛下睿哲文思光被四表孝友勤儉行髙百王然猶化未大同俗未至理者良以智出庶物有輕待人臣之心思周萬機有獨馭區㝢之意謀吞衆略有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勳業者懼於不容懷反側者迫於攻討馴致離叛構成祻災兵連於外變起於內嵗律未半乘輿再遷國家艱屯古未嘗有以陛下至聖之德而遘兹殷憂之期天其或者欲大啓睿心警小失而崇丕業耳臣謂陛下當奉若天意追咎已然凡所致寇之由悉已詳知其故將革前弊以消羣疑今承德音尚襲流誤若未悔禍何由弭災臣獲蒙過知又辱下問若務順㫖是為欺天庸敢指陳庶禆闕漏往嵗初奮師旅四征不庭義烈之徒人思自效捨逆歸欵者繼獻於闕下陳謀諫失者爭詣於禁門陛下能於此時乘軍氣之方雄因人心之願盡輟沐吐哺虛襟坦懷海納風行不疑不滯功者報之義者旌之直者奬之才者任之其或有志而無補於時敢言而不當其理亦必恕其妄作録其善心率皆優容以禮進退如此則海內風靡翕然歸心賢愚咸懷小大畢力蕞爾凶醜曽何足平臣固知久已理安必無奉天之幸矣其所以孕禍胎而索義氣者在乎獨斷宸慮專任睿明降附者意其窺覦輸誠者謂其逰說論官軍撓敗者猜其挾姦毁沮陳凶黨强狡者疑其為賊張皇獻計者防其漏言進諫者憚其宣謗凡此之類悉貽聖憂咸使拘留謂之安置或詰責而置於客省或勞慰而延於紫庭雖呵奬頗異其辭然於圈閉一也既杜出入勢同狴牢解釋無期死生莫測守護且峻家私不通一遭縶維動歷年嵗想其痛憤何可勝言由是歸化漸稀而上封殆絶矣徇義之心既阻脅從之黨彌堅而貴近之臣往來之使希望風㫖詭辭取容唯揣樂聞不憂失實咸言聖謀深逺䇿略如神小寇孤危滅亡無日陛下急於誅惡皆謂其事信然窮兵竭財坐待平一人心轉潰寇亂愈滋遂至轂下生戎宫闈不守儻陛下能於此際遽敷大號謝過萬方叙忠良見忌之寃而舉其尤鯁亮者加之厚秩糾阿諛不實之罪而數其極姦妄者處之大刑賞罰既明忠邪畢辨以此臨下誰敢不誠以此懷人何有不服過而能改亂亦遄安臣固知尋復京師必無梁岷之逰矣陛下既闕慎於始又失圖於中收之西隅唯在兹日豈可復使一事紕繆一言過差哉今賊泚未平懷光繼叛都邑城闕猰㺄迭居關輔郊畿豺狼雜處朝廷僻介於逺郡道路緣歷於連山杖䇿從君其能有幾推心降接猶恐未多稍不禮焉固不來矣若又就加猜劾且復囚拘使反者得辭來者懷懼則天下有心之士安敢復言忠義哉卵胎不傷麟鳯方至魚鱉咸若龜龍乃逰蓋悅近者來逺之資懷小者致大之術也竊料邢建等輩必非助逆之徒假如過有張皇跡涉疑似亦望矜愚惜體屈法裕人並量器能隨事甄貸武者措之於戎伍文者付之於宰司大則授以職員次但優其選序必有須離行在難處親軍則或除諸道一官或委諸使録用就其常分各稍加恩古人有言撫我則后虐我則讎惠澤所及謳歌乃歸流聞四方孰不欣戴昔趙殺鳴犢聖人輟行燕尊郭隗賢士繼往況乎天子所作天下式瞻一言阻物則天下莫不自疑一事恤人則天下莫不同悅固不可以小失為無損而不悔亦不可以小善為無益而不行小猶慎之矧又非小願陛下惟事無大小皆以覆車之轍為戒實宗社無疆之休贄又論叙遷幸之由狀曰臣前日蒙恩召見陛下叙說涇原叛卒驚犯宫闕及初行幸之事因自剋責辭㫖過深臣奏云陛下引咎在躬誠堯舜至德之意臣竊有所見以為致今日之患者羣臣之罪也陛下又曰卿以君臣之禮不忍歸過於朕故有此言然自古國家興衰皆有天命今遇此厄運雖則是朕失德亦應事不由人未及對詔之間陛下遂言及宗祧涕泗交集主憂臣憤人理之常情激於𠂻不覺嗚咽旋屬遊環請對臣言未獲畢辭今輒上煩以盡愚懇臣所謂致今日之患是羣臣之罪者非敢徒飾浮說茍寬聖懷事皆有由言庶可復自胡羯稱亂遺患未除朝廷因循久務容養事多僭越禮闕會朝陛下神武統天將一區宇乃命將帥四征不庭凶渠稽誅逆將繼亂兵連禍結行及三年徴師四方無逺不暨父子訣别夫妻分離一人征行十室資奉居者有餽送之苦行者有鋒刃之憂去留騷然而閭里不寧矣聚兵日衆供費日多常賦不充乃令促限促限才畢復命加徴加徴既殫又使别配别配不足於是𣙜算之科設率貸之法興禁防滋章條目纎碎吏不堪命人無聊生農桑廢於徴呼膏血竭於笞捶市井愁苦室家怨咨兆庶嗷然而郡邑不寧矣邊陲之戌用保封疆禁衛之師以備巡警二者或闕則生戎心國之大防莫重於此陛下急於靖難纍遣東征邊備空虛親軍寡弱尋又搜閲私牧以取馬薄責將家以出兵凡有私牧者例元勳貴戚之門所謂將家者皆統帥嶽牧之後是乃嘗蒙親委或著忠勞復除征徭固有常典今忽奪其畜牧事其子孫有乞假以給資裝有破産以營卒乘道路悽憫部曲感傷貴位崇勳孰不解體加以聚斂之法轂下尤嚴邸第侯王咸輸屋稅裨販夫婦畢算緡錢貴而不見優近而不見異其為憤戚又甚諸方誅求轉繁庶類恐懼興發無已羣情動搖朝野嚻然而京邑關畿不寧矣陛下又以百度弛廢志期肅清持義以掩恩任法以成理神斷失於太速睿察傷於太精斷速則寡恕於人而疑似之間不容辨也察精則多猜於物而臆度之際未必然也寡恕則重臣懼祻反側之釁易生多猜則羣下防嫌茍且之風漸扇是以叛亂繼起怨讟並興非常之虞億兆同慮惟陛下穆然凝邃獨不得聞至使凶卒鼓行白晝犯闕重門無結草之禦環衛無誰何之人自古禍變之興未有若斯之易豈不以乘我間隙因人攜離哉陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死所謂致今日之患是羣臣之罪者豈徒言歟聖㫖又以家國興衰皆有天命今遇此厄運應不由人者臣志性介劣學識庸淺凡是占算祕術都不涉其源流至於興衰大端則嘗聞諸典籍書曰天視自我民視天聽自我民聽又曰德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德又曰天難忱命靡常常厥德保厥位厥德靡常九有以亡此則天所視聽皆因於人天降災祥皆考其德非於人事之外别有天命也故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰吾有民有命罔懲其侮此又舍人事而推天命必不可之理也易曰自天祐之吉無不利仲尼以為祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢是以自天祐之吉無不利又曰危者安其位者也亡者保其存者也亂者有其治者也故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保又曰視履考祥又曰吉凶者得失之象也夫易之為書窮變知化其於性命可謂研精及乎論天人祐助之由辨安危理亂之故必本於履行得失而吉凶之報象焉此乃天命由人其義明矣春秋傳曰禍福無門唯人所召又曰人受天地之中以生所謂命也是以有動作威儀禮義之則以定命也能者養之以福不能者敗以取禍禮記引詩而釋之曰大雅云殷之未喪師克配上帝宜監于殷駿命不易言得衆則得國失衆則失國也又引書而釋之曰康誥云惟命不于常言善則得之不善則失之此則聖哲之意六經會通皆為禍福由人不言盛衰有命蓋人事著於下而天命降於上是以事有得失而命有吉凶天人之間影響相准詩書已後史傳相承理亂廢興大略可記人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也六經之教既如彼歷代明驗又如此尚恐其中有可疑者臣請復以近事證之自頃征討頗頻刑網稍密物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下逹蒸黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非悉知算術皆曉占書則明致寇之由未必盡關天命伏惟陛下鑒既往之深失建將來之令圖拯宗社阽危刷億兆憤耻在於審察時變博詢人謀王化聿修天祐自至恐不宜推引厄運謂為當然撓追咎之誠沮惟新之望臣聞理或生亂亂或資理有以無難而失守有因多難而興邦理或生亂者恃理而不修也亂或資理者遭亂而能懼也無難失守者忽萬機之重而忘憂畏也多難興邦者涉庶事之艱而知敕慎也今生亂失守之事則既往不可復追矣其資理興邦之業在陛下刻勵而謹修之當至危至難之機得其道則興失其道則廢其間不容復有所悔也惟陛下勤思焉熟計焉捨已以從衆焉違欲以遵道焉逺憸佞而親忠直焉推至誠而去逆詐焉杜讒沮之路廣諫諍之門焉掃求利之法務息人之術焉録片善片能以盡羣材焉忘小瑕小怨俾無棄物焉斯道甚易知甚易行不勞神不苦力但在約之於心耳又陛下天資睿哲有必致之具安得捨而不為哉斯道夕誓之於心則可以感神明動天地朝施之於事則可以服庶類懷萬方何憂乎亂人何畏乎厄運何患乎天下不寧昔太公以避狄而興周文王以百里而王是乃因危難而恢盛業由僻小而闡丕圖況陛下禀英姿承實歷四海之利權由己列聖之德澤在人茍能增修蔑有不濟至如東北羣孽荏苒逋誅涇原亂兵倉卒犯禁蓋上𤣥保祐陛下恐陛下神武果斷有輕天下之心使知艱難將永福祚耳伏願悔前祻以答天戒新聖化以承天休勿謂時鍾厄運而自疑勿謂事不由人而自解勤勵不息足致升平豈止蕩滌祅氛旋復宫闕而已愚臣不勝區區憂國奉君之至誠有所切辭不覺煩伏惟陛下不以人廢言不以言廢直千慮一得或有取焉贄又論收河中後請罷兵狀曰昨日欽溆奉宣聖㫖示臣馬燧渾瑊等奏平懷光收河東狀兼令臣商量須作何處置令欽溆奏來者凶梗殱蕩關畿廓清實聖謀廣運之功亦宗社無疆之祚應須處置大略已附欽溆口陳展轉傳言恐未盡意謹復薦其固陋願陛下少留察焉臣聞禍或生福福亦生祻喪者得之理得者喪之端故晋勝鄢陵范燮祈死吳克徑越夫差啓殃是知福不可以屢徼幸得不可以常覬覦居福而慮祻則其福可保見得而忘喪則其喪必臻臣竊懼諂諛希㫖之徒險躁生事之輩幸凶醜覆亡之會揣英主削平之心必將競效甘言誘開利欲謂王師所向莫敵謂餘孽指顧可平請回蒲坂之戈復起淮沂之役斯議一啓必有亂階故微臣姑以生祻為憂而未敢以獲福為賀也何則建中之難其事可徵始以蓄憾而隘於含容或以亟勝而輕於戰伐故文喜之討涇上之瘡痛未平崇義之征漢南之芟夷繼甚阻命之帥非不誅也伐叛之師非不克也介焉之斷非不堅也赫斯之怒非不逞也然以人不見恤惟戮是聞有辜無辜不敢自保是以抱釁反側者懼鈇鉞之次加畏祻危疑者慮猜譖之災及遂乃螽結以拒討狼顧以背恩彌兩河而亘淮夷蕩三輔而盜京邑鑾輅為之再駕行宫至於合圍於時海內大搖物情幾去天命莫保於寸晷王威不出於一城邦國之杌隉艱屯綿綿聨聨若包桑綴旒幸而不殊者屢矣勢之危窘實足寒心非有曩時熊羆翕習之師雷霆奮發之勢武庫劔㦸之利帑藏財賦之殷其所以施令率人取威定亂比於建中之始豈不至微至殺哉然而陛下懷悔過之深誠降非常之大號知黷武窮兵之長亂知急征重斂之勦財知殘人肆欲之取危知違衆率心之稔慝知蒸庶困極之興怨知上下鬱堙之失情德音渙然以之更始所在宣敡之際聞者莫不涕流雖或凶獷匪人亦必為之歔欷誠之動物乃至於斯懷梟鴟以好音消祲沴以和氣由是姦回易慮黎獻歸心假王叛渙之夫削僞號以請罪觀釁首鼠之將一純誠以效勤流亡凍餒者希保於室家屯戌戰爭者冀全其性命德澤將竭而重濡君臣已絶而更交天下之情翕然一變曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任德而不任兵明矣羣帥之悖臣禮拒天誅圖活而不圖亡又明矣尚恐陛下以臣言之略而未喻也請復循其本而申備之往以河朔青齊同惡相扇擁戎據土易代不庭陛下耻王化之未同忿姦慝之靡格於是發六軍神䇿河陽河東澤潞朔方之騎士以徂征於北命永平汴宋幽隴江淮閩嶺之將卒以奮伐於南罄國家廪帑以贍軍悉公私廄牧以張武算斂周於萬類徴徭被於八荒勞已甚矣威亦盛矣既而曠日綿嵗老師費財兩河之寇患有加無瘳而邦本已始覆矣洎涇卒唱亂泚戎搆災豺狼整居於禁闈猰㺄擇肉於馳道河朔問罪之衆布路而歸宋郊仗順之師守壘不暇於斯之亂海內沸騰儻有問鼎之雄圖㴞天之巨猾幸災乘間何所不為既而悅納之儔咸自斂縮內無非望之議外無軼境之侵及聞天澤滌瑕制書復爵曽不蒂芥望風款降爭馳表章唯恐居後跡其素志於此可知是皆假兵救怨之流戀土偷安之輩懷生畏死蠢動之大情慮危求安品物之常性有天下而子百姓者以天下之欲為欲以百姓之心為心固當遂其所懷去其所畏給其所求使家家自寧人人自遂家茍寧矣國亦同焉人茍遂矣君亦泰焉是則好生以及物者乃自生之方施安以及物者乃自安之術濟彼於死地而求此之久生也從古及今未之有焉措彼於危地而求此之久安也從古及今亦未之有焉是以昔之聖王知生者人之所樂而已亦樂之故與人同其生則上下之樂兼得矣聖王知安者人之所利而已亦利之故與人共其安則公私之利兩全矣其有反易常理昏迷不恭則當外察其倔强之由內省於撫馭之失修近以來逺檢身而率人故書曰惟干戈省厥躬又曰舞干羽于兩階七旬有苖格孔子曰逺人不服則修文德以來之既來之則安之此其證也如或昧於懷柔務在攻取不徴教化之未至不疵誠感之未孚惟峻威是臨惟忿心是肆視人如禽獸而曝之原野輕人如草芥而勦之銛鋒叛者不賔則命致討討者不克則將議刑是使負釁者懼必死之誅奉辭者慮無功之責編氓以囚於杼柚而思變士卒以憚於死喪而念歸萬情相攻亂豈有定一夫不率闔境罹殃一境不寧普天致擾兵拏祻結變起百端故孔子曰逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭墻之內矣此蓋必然之常理至當之格言足以為明鑑元龜貫百王而不易者也事乃反覆得無懼乎夫理有必然則殊途歸於同轍言有至當則異代應如合符頃以東北孽徒職貢廢闕陛下忿其違命大舉甲兵至令逆泚誘姦乘釁而動所備之寇猶逺介於河山不虞之戎已竊發於都輦蕭牆之戒不其信歟前典垂訓既如彼近事明驗又如此所以德音叙哀痛之情悔征伐之事引衆慝以咎已布明信以示人既往之失畢懲莫大之辜咸宥約之以省賦誓之以息兵由是億兆汙人四三叛帥感陛下自新之㫖悅陛下盛德之言革面易辭具修臣禮其於深言密議固亦未盡坦然必當聚黨而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興自京邑底寧乘輿旋返屬懷光繼亂天討又行息兵之言我則未復山東羣帥所以未敢生辭者蓋為河中之地密近王城迫於朝夕之虞不得不翦除之爾今若改轅移斾復指淮西則淮西元凶必將誑脅其同惡之徒間說於新附之帥謂之曰奉天息兵之㫖乃因窘急而言朝廷稍安必復誅伐是以朱泚滅而懷光戮懷光戮而希烈征希烈儻平祻將次及則彼之蓄素疑而懷宿負者能不為之動心哉心既動則盈其喪身覆族之憂憂既盈則慮以脣亡齒寒之病夫病同者雖胡越而相愍憂同者不邀結而自親河朔青齊固當響應建中之禍勢必重興以國家再造之初當羣孽息肩之後迭來鳴吠或肆奔衝討之則我力未遑縱之乃寇患斯甚臣愚竊以為祻非細未審陛下何方以待之若有其方侮之可也如其未有願陛下勿輕易焉凡將圖終必在慎始祻機一發難可復追臣請粗陳當今維馭之所宜唯聖主省擇萬一夫君之大柄在惠與威二者兼行廢一不可惠而罔威則不畏威而罔惠則不懷茍知夫惠之可懷而廢其取威之具則所敷之惠適足以示弱也其何懷之有焉茍知夫威之可畏而遺其施惠之德則所作之威適足以召敵也其何畏之有焉故善為國者宣惠以養威蓄威以尊惠威而能養則不挫惠而見尊則有恩是以惠與威交相畜也威與惠互相行也人主之欲柔逺人而服强暴不明斯術之要莫之得焉今皇運中興天祻將悔以逆泚之偷居上國以懷光之竊保中畿嵗未再周相次梟殄實衆慝驚心之日羣生改觀之時威則已行惠猶未洽誠宜上副天眷下收物情布恤人之惠以濟威乘滅賊之威以行惠宥河中染汚之黨悉無所問赦淮右僭逆之罪咸與惟新蠲貸疲氓休罷戰士符往嵗息兵之令以彰信丕大君含垢之德以布仁俾萬姓皆曰大哉王言又曰一哉王心如是則威不用而畏如神明惠不費而懷如父母凡在危疑懼討者必將曰淮右僭逆之罪且赦矣吾屬何患焉凡在脅從同惡者必將曰河中染汚之黨且宥矣吾屬何疚焉凡在倦苦思安者必將曰吾君有戰勝之師抑而不騁信乎其罷征矣凡在凋殘望理者必將曰吾君有嫉亂之憤忍而不攄信乎其恤隱矣天下之心若此而禍亂不息理道不行者無之臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其潛慮非不追悔也但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自靦於天地之間耳縱未順命斯為獨夫內則無辭以起兵外則無類以求助其計不過厚撫部曲偷容嵗時心雖陸梁勢必不敢陛下但敕諸鎮各守封疆彼既氣奪算窮是乃狴犴之虜不有人禍則當鬼誅朝廷務崇德以待之臣固知其必不逃於所揣矣古所謂不戰而屈人之兵者斯之謂歟今若不顧幾宜復興戎役瀆威而蔑惠捨易而即難是棄明信而務忿心假敵辭而資寇援窮者不暇恤勞者不得居國之安危或未可保此乃成敗理亂之所係願陛下難之慎之區區上干憂惜在此儻䝉過納狂瞽不疑所行謹當草具招諭之辭詳陳備禦之畫伏俟宣許方敢以聞淄青李正已畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答中書侍郎同中書門下平章事崔祐甫曰正已誠詐陛下不如因遣使勞其軍以所獻就賜將士若正已奉承詔書是陛下恩洽士心若不用彼自斂怨軍且亂又使諸藩不以朝廷為重賄帝曰善正已慚服憲宗元和七年秋魏博節度使田季安卒其子懷諫年十二軍中扶豎處其位李吉甫上言須事討伐以懲宿弊李絳上言罪誠宜誅翦時既不可勢亦不同臣愚度之不必動衆吉甫遽進用兵之䇿具圖畫入兵道路攻討利病并載河北土田平易沃壤桑柘物産繁富之狀若不討伐必無變動後延英日上又問魏博之事如何卿兩人所見各異何者為長吉甫言須興師攻取以示國威上曰此勢恐須如此不討伐無復有得理絳奏曰以臣愚慮酌量事勢必不勞興師動衆魏博當須歸國上曰何以明之絳曰凡河南河北叛渙之地事體大同懼部下諸將有權恐得便圖已各令均管兵馬不令偏在一人使力敵權均為變不得若廣與諸將計會則必謀泄不同若一將為變自然兵少不濟以此相制先動不得此是賊中之制置於事為便加以酷誅重購故無敢發意者今懷諫乳臭童子領事不得事須假人權柄託人性命即所託者其權必重所任者其言必行如此厚薄不同怨怒必起向者權均力敵適足生患搆其祻也何者以兵力齊等不相伏從自然之勢也若軍中不相伏從主帥不能制斷即必歸一寬厚簡易軍中素所愛者兵權既有所歸懷諫自須受禍若不被處置即須送入朝廷部將忽領一方之權即與兩河事勢大異賊中所惡唯此是已懼其部下效之以受國家之利魏博將若有此變既懼諸鄰攻伐必須懇歸朝廷若不倚朝廷即存立不得此必然之理也伏望陛下按甲蓄威以俟其變不兩三月必有上聞所要在應接速疾赴其機會而今但要且嚴敕諸將簡練排兵蓋為此也上曰卿所陳賊中事宜深盡機要詳此事勢亦不用兵他日延英吉甫又盛陳用兵之計言糧草匹帛皆有次第上又顧李絳何如絳所奏如前曰此事理分明不合疑惑且兵不可輕易而動者且討伐鎮州之時四面興師近二十萬衆并發兩神䇿逺赴河北道路騷擾糜費七百餘萬貫訖無成功取笑天下失䇿之耻傳之至今瘡痍未平休息未定立功者未録戰死者未收傷殘之人懼於戰鬪若敕命徵發驅之使戰臣恐不樂之患不止無功散亂之兵别有所慮況魏博事勢不要用兵伏惟陛下斷於聖心不惑浮論上奮身按手曰朕不用兵定矣絳因激上意曰雖聖斷不用兵臣恐退朝後更有人上惑聖聽者上色莊厲聲曰朕言不用兵定何人惑得卿不用慮李絳遂起拜賀曰聖恩為萬姓屈已抑威誠社稷之大計也後十餘日果魏博使至軍中已歸部將田興奏取朝廷處分使至非時召宰相對上曰卿所揣魏博事勢若合符契吉甫請且使宣慰以觀其事絳言不可敕使到彼萬一妄邀朝廷事有一蹉跌即難處置疑誤之間機宜已失即追不及矣今田興為衆所歸坐俟朝命不於此際便有寵授他日敕使把三軍表來請與田興節制在彼在此既不得已須與恩澤不出聖心是依軍中所請感荷與特拜豈曰且示推誠不疑足以應機合變撫納其勢總攬其心平蕩兩河在此一舉不可失也吉甫素與知樞密梁守謙交結潛為援助亦舊例令中使宣勞不可此鎮獨無上遂令中使張忠順往宣慰待回處置絳又奏今因田興投誠歸國三軍顒俟聖㫖不當時處置赴其機宜待敕使將三軍表來請授田興則威柄不由於朝廷恩澤不出於聖意此機可惜今復失之後雖追悔亦何及也今計張忠順行程才回過陜州伏望明日便降白麻授田興節度使即恩澤出於君上而威柄歸於朝廷利害得失明若日月伏乞聖慈不疑敕使獲宣日且與留後何如待其别成效即與正授絳曰若與留後亦恐不得且度朝廷氣力坐制魏博得否因機會奬其誠節恩出不次感亦殊常若與留後忽不受命即却成凶悖又須姑息與舊日何殊也伏望決於聖斷特賜處分明日遂出白麻除田興為撿校工部尚書魏博節度使張忠順制已到田興感涕三軍受宣鼓舞李絳又奏魏博自十餘年不知朝化賞罰法令都不及之一朝以六州之地歸於朝廷刳河朔之腹心傾悖亂之巢穴不大賞賜出其所望軍心不感事勢難知請特賜一百五十萬錢帛制書上以內庫為名充三軍賞給中人有沮其所請者上言曰所賜太多那得及此後若更有即又如何絳奏曰昔竇融當光武削平天下河西是未討之間懷後代之誅為避禍之計尚此崇奬福留子孫田興習舊無即日之憂不順得鄰道之助而天生忠義志懷霜雪舉六州之地兩河之贍惜一百五十萬貫錢物不收此一道人心錢帛用了更來機會一失難復假如舉十五萬衆攻取六州一年而剋豈不稱賀而計費三百萬貫事畢當賞賚又在此外今度所賜未及一半而顧兹小費失於大計深可惜也上懸覽事情欣然曰朕所以身服浣濯之衣每事節約不用者秖為大段要切時用不然內藏收貯何為遂允所奏及詔書到魏博錢帛隨路而至軍中踴躍向闕拜泣時田興初受節旄諸道專使數十人在魏州成德兖鄆使各十餘輩見制書錢帛到皆垂手失色驚歎曰自艱難已來未曽聞此處置恩澤如此之厚反叛有何益河朔人心大變至今稱之僖宗乾符六年鄭畋遷門下侍即時黃巢勢寖盛據安南騰書求天平節度使帝令羣臣議咸請假節以紓難畋欲因授嶺南節度使而盧攜方倚髙駢使立功乃曰駢才略無雙淮南天下徑兵又諸道之師方至蕞爾賊奈何捨之令四方解體邪畋曰不然巢之亂本於饑其衆以利合故能興江淮根蔓天下國家久平士忘戰所在閉壘不敢出如以恩釋罪使及嵗豐其下思歸衆一離巢即機上肉耳法謂不戰而屈人兵也今不伐以謀而怖以兵恐天下憂未艾也昭宗時張濬拜同中書門下平章事時朱全忠威振關東而安居受殺李克恭以潞州歸全忠全忠乃與幽州李匡威雲州赫連鐸上言先帝幸梁繇李克用與朱玫連和請舉兵誅之願帥兵為掎角帝詔文武四品以上議皆言王室未寧雖得太原猶非所有濬固爭先帝時身播屯亂蓋克用全忠不相下也請因其弱討之斷兩雄勢帝曰平巢克用功第一今乘危伐之天下其謂我何久不決孔緯曰濬言萬世之利陛下所顧一時事爾臣見師度河賊必破今軍中費尚足支數年幸聽勿疑歷代名臣奏議卷八十
