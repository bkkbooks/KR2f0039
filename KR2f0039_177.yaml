body:
  text: 歴代名臣奏議卷一百七十七明楊士竒等撰去邪宋神宗時劉述兼判刑部王安石争謀殺刑名述不以為是及勅下述封還中書奏執不已安石白帝詔開封府推官王克臣劾述罪於是述率御史劉琦錢顗共上疏曰安石執政以來未踰數月中外人情囂然胥動盖以専肆胷臆輕易憲度無忌惮之心故也陛下任賢求治常若飢渴故置安石政府必欲致時如唐虞而反操管商權詐之術規以取媚遂與陳升之合謀侵三司利柄取為己功開局設官用八人者分行天下驚駭物聼動揺人心去年因許遵文過飾非妄議自首按問之法安石任一偏之見改立新議以害天下大公章辟光獻岐邸遷外之説踈間骨肉罪不容誅呂誨等連章論奏乞加竄逐陛下雖許其請安石獨進瞽言熒惑聖聼陛下以為愛己隠忍不行先朝所立制度自宜世世子孫守而勿失乃欲事事更張廢而不用安石自應舉歴官尊尚堯舜之道以倡率學者故士人之心靡不歸向謂之為賢陛下亦聞而知之遂正位公府遭時得君如此之專首建財利之議務為容悦言行乖戾一至於此剛狠自任則又甚焉奸詐専權之人豈宜處之廟堂以亂國紀願早罷逐以慰安天下元元之心曽公亮位居承弼不能竭忠許國反有畏避之意隂自結援以固寵久妨賢路亦宜斥免趙抃則括囊拱手但務依違大臣事君豈當如是疏上安石奏先貶琦顗監處衢州鹽務公亮疑太重安石曰蒋之竒亦降監當從之司馬光乃上疏曰臣聞孔子曰守道不如守官孟子曰有言責者不得其言則去此古今通議人臣之大節也彼謀殺已傷自首刑名天下皆知其非朝廷既違衆議而行之又以守官之臣而罪之臣恐失天下之心也夫食鷹鸇者求其鷙也鷙而烹之将焉用哉今琦顗所坐不過疏直乃以迕犯大臣猥加譴謫恐臣下自此以言為諱乞還其本資以靖羣聼監察御史裏行劉摯劾趙子幾疏曰臣伏見五月中有開封府東明縣人戸就宰臣私第或隨馬披告助法不便并升起户等及詣御史臺陳訴臣尋曽具状及上殿劄子奏陳利害陛下令府界提㸃司體量升降等第因依今竊見趙子幾别舉發到知縣賈蕃在任日貸借官錢與手力因同天節沽市村酒創買部夫席屋等事朝廷以其状下本司取勘者臣竊以為過矣朝廷變更役法意欲均民民茍以為有利害也安可禁其所欲言者且畿甸人戸幸以居近輦轂故可以自陳以近推逺以一求萬則天下之情可知也然四方之人限在遐逺上雖有州縣而安敢主之又有監司提舉司之隔閡其欲赴愬勢固難矣今又因畿民有訴而汙刻之人反怒縣官意謂不能禁遏故攟摭它事期寘於法不意朝廷不辨付之施行臣恐四逺人情必疑朝廷以謂欲鈐天下之口而職在主民者必皆視蕃以為戒争務拘民而杜其言然則天下休戚陛下無時而知矣臣伏覩編勅節文按察之司所部官屬有犯不得於官屬離任後始行發擿雖實不復受理若犯贓私雖離任有人論告或因事彰露即依法施行方子幾之體量於其縣也蕃已得替離任矣子㡬初求其事於寮佐乂誘而鉤之於吏史借令蕃有贓私邪則亦不得謂之論告與因事明矣法之所不當理而子幾肆志敢為者子幾方以諂偽怙寵用事務在力行司農新政而不復顧陛下之法與陛下之民但驅使就令冀自以收功恐因民不服撓動其事是故作威以警衆違法以按吏欲使畿内它邑與天下官吏畏罪避祻閉遏其人民使不得有言以聞於朝廷爾如蕃以司農牓内椿定人戸數目使出助錢遂将縣籍下等次第升起者凡一千戸以就足牓内之數此其為罪固不可赦是以前日聖㫖指令體量此事臣願陛下治蕃此罪而已自餘替後所按乞依條不問盖借蕃今日所以解四方人情之疑使知陛下不禁民言之意臣所以區區論之兾少補治體非為蕃計也如子㡬領按察之任已久當平日不聞舉摘蕃事乃今挾情違戾勅禁原心考察可見險薄伏請付吏施行摯又劾韓縝疏曰臣竊以聖人之於天下有一物不安其性命之分則䀌然傷之以謂已使然也一物失所猶引以自任况夫民命之重哉是故先之以仁後之以政彼其有罪而入吾法猶哀矜惻怛不得已而刑用之夫以君人之勢其重愛天下猶若此況人臣分憂共治而敢有専殺者哉祖宗仁愛萬方官吏之入人罪者皆有法以故入者特深夫意雖有故然猶假文法而致之也而已為祖宗之所不容又況専殺無辜者哉臣謹按前知秦州韓縝因飲宴至中夜而罷指使𫝊勍持燭侍縝入於門縝見之怒明日杖勍背一百三日而死其家持血衣以訴於朝廷始者下本路按劾而縝輙自有論述然其大要雖過為詞説亦不能文殺人之罪其後但聞朝廷數數有體量之㫖至於今數月臣竊以縝之與勍雖貴賤有間要之分職共事皆陛下之臣也勍有罪耶則有陛下之法在當寘有司閲實而斃之今乃肆一時忿怒捽首鞭背非理踰法杖至一百而死之方太平之世内外莫不畏法令蹈繩檢而縝以帥守快私乗恚蔑侮典憲暴殺官吏意輕朝廷不識朝廷尚何所疑而體量委曲如此徐徐耶議者以縝家世其親戚交㳺多在勢貴根株表裏誰不為力使孤孑單平無援助者敢殺一無罪必不優㳺遲久至於如此将使延及明堂之宥也臣又聞王韶之來頗聲縝寃韶昨以邉地欺朝廷坐降一官而縝乃保蔽以實其事故韶極力㳺説以惑朝廷奸利相市意在報縝若朝廷萬有一信則恐死寃不伸國法不正非陛下為人父母之意況縝所至暴戾肆為不法殘人害物前後非一今邉隅未靖不重縝責不伸勍枉恐無以感士心而得其死力伏望速賜施行知諌院陳襄彈秀州軍事判官李㝎状曰臣竊以任人之術莫大於分别邪正而知君子小人之道也君子之道好義而不顧其利故其言也忠小人之道好利而不顧其義故其言也佞此君人者不可不察也伏見秀州軍事判官李定近為右正言孫覺所薦被召赴闕定知天下之人盡以青苗之法為非而獨王安石之徒主以為是每㳺安石之門及與士大夫言莫不盛稱青苗之法以為仁政欲以迎合安石之意前日竊聞已被召對定之口才辨佞必能為甘言以悦陛下之心仍慮制置司臣寮喜其附已隂相引薦置之要路以亂大政如聞定與人言陛下已曽面許臺諫任使事雖未然或慮陛下知之未深誤有進用似此䛕佞之人非朝廷之福也孔子曰逺佞人荀卿曰諂䛕我者吾賊斯至論也所有臣近嘗弹奏太常博士李南公資序至淺小才善佞乞追還轉運判官之命又言監察御史王子韶囬邪反覆難與議事及定阿䛕不正並望别與外任合人差遣庶絶佞人儌倖之路而不誤陛下任使之明也襄乂弹監察御史裏行王子韶状曰臣伏見監察御史裏行王子韶素非端士濫處法官隂附大臣宻通簡札訪聞其兄子琦預宮官之薦子淵被提舉之辟盡由子韶私謁得之臣以大臣之責専以保任賢能御史之職在於糾繩非法而乃賣恩請謁同於市道上下若兹公義安在欲乞取問制置司臣寮子淵既是御史之兄不知何人引薦特宜推劾以正㒺上之刑使令後進臣不敢妄有奏辟所有子韶囬邪反覆臺中難與議事伏望出自宸衷别與差遣庻清臺憲以塞人言襄又弹劉攽王介状曰臣竊以劉攽王介在試院忿争為臺官張戩等弹奏已奉聖㫖免勘贖金朝廷雖示寛恩物論未以為允攽介皆以文學被選置之館閣不思修蘊噐業以為名臣攽惟尚氣陵人動為嘲侮介特褊心好競所至喧悖率行若此人何以觀増長澆浮損壊風教無甚於兹欲乞深示戒懲特行貶斥俾居于外改過自新不惟攽介之福亦朝廷忠厚之舉也襄又彈歩軍副都指揮使宋守約状曰臣訪聞侍衛親軍歩軍副都指揮使威武軍節度觀察留後管勾都指揮使公事宋守約為性貪暴違越不公陵虐軍人非理鞭配前後私役兵士修盖第宅物業日不減一二百人及分布東西窰竈變造塼甓津般土木以至脱撃打草之𩔖莫非軍人道塗怨嗟無敢言者居陛下手足下而敢恣横如此其可容乎伏望陛下以臣之言取責諸軍人員即見逐件事實禠職詔獄以正典刑庶使今後管軍臣寮不敢違越哲宗元祐元年朝奉郎試中書舎人蘇軾状奏曰今月二十二日准刑房送到詞頭一道三省同奉聖㫖沈起與叙朝散郎監嶽廟者右臣伏見熈寕以來王安石用事始求邉功搆隙四夷王韶以熈河進章惇以五溪用熊本以瀘夷奮沈起劉彛聞而效之結怨交蠻兵連祻結死者數十萬人蘇緘一家坐受塗炭至今二廣創痍未復先帝始欲戮此二人以謝天下而王安石等曲加庇䕶得全首領已為至幸元豐六年三月二十四日聖㫖沈起所犯深重永不叙用天下傳誦以為至當此乃先帝不刋之語非今日以即位之恩所得赦也沈起與彛各負天下生靈數十萬性命雖廢錮終身猶未塞責近者只因稍用劉彜起不自量輙敢披訴妄以罪釁併歸於彜攀援把持期於必得臣謂安南之役起實造端而彜繼之法有首從而彜吏幹學術猶有可取而起人材猥下素行憸嶮慶州兵叛起守永興流言始聞被甲乗城驚動三輔㡬至大變所至治状人以為笑知杭州日措置尤為乖方致灾傷之民死倍它郡與張靚等違法燕飲交私靡所不至朝廷用彜既不允公議而況於起萬無可赦之理今以一朝散郎監嶽廟誠不足計較竊哀先帝至明至當不刋之語輕就改易誠不忍下筆草詞遂使四方羣小隂相慶幸呂恵卿沈括之流亦有可起之漸為害不細伏望聖明深念先帝永不叙用之詔未可改易而數十萬人性命之寃亦未可忽忘明詔有司今後有敢為起等輩乞叙用者坐之所有告詞臣未敢撰謹録奏聞軾又同朝請大夫試中書舎人范百禄状奏曰今月二十三日准吏房送到詞頭内知建昌軍陳繹奉聖㫖差知兖州者右臣等勘㑹陳繹知廣州日私自取索燒用市舶庫乳香斤兩至多本犯極重以元勘不盡至薄其罪外買生羊寄屠行令供肉計虧價錢三十七貫有餘州宅元供養檀木觀音一尊繹别造杉木胎者貿易入已計虧官錢二貫文係自盜贓一疋二丈合准例除名縱男役将下禁軍織造坐褥不令赴教縱男與道士何徳順㳺從繹曲庇何徳順弟何迪偷税金四百兩事不斷抽罰不覺察公使庫破男并随行助教供給食錢以公使榖養白鷴係竊盜自首不盡贓罪杖其餘罪犯難以悉陳奉勅陳繹落職降官知建昌軍其詞畧曰蔽罪至於除名論贓至於自盜臣等謹按繹資性傾憸士行鄙惡當時所犯自合除名建昌之命已犯公議豈宜收録復典大邦非唯必致人言亦恐奸邪復用其漸可畏所有告命不敢依例撰詞軾同范百祿状奏今月十八日准本省刑房送到詞頭一道奉聖㫖張誠一邪險害政有虧孝行追觀察使遥郡防禦團練使刺史依舊客省使提舉江州太平觀𤼵赴本任者右臣等看詳張誠一無故多年不𦵏親母既非身在逺官又非事力不及冒寵忘親清議所棄猶獲題舉宫觀已駭物聴況諫官本言誠一開父棺槨掠取財物使誠有之雖肆諸市朝猶不為過使誠無之亦當為誠一辨明縁事係惡逆不道非同尋常罪犯可以不盡根究今既體量未見歸著即合置司推鞫盡理施行所有告命臣等未敢撰詞軾又同范百祿状奏今月十八日准本省刑房送到詞頭一道奉聖㫖李定備位侍從終不言母為誰氏强顔匿志冒榮自欺落龍圖閣直學士守本官分司南京許於揚州居住者右臣等看詳李定所犯若初無人言即止是身負大惡今既言者如此朝廷勘㑹得實而使無母不孝之人猶得以通議大夫分司南京即亦朝廷亦許如此等𩔖得據髙位傷敗風教為害不淺兼勘㑹定乞侍養時父年八十九嵗於禮自不當從定若不乞必致人言獲罪不輕豈可便将侍養折當心喪考之禮法須合勒令追服所有告命臣等未敢撰詞軾又状奏今月二十八日准中書吏房送到詞頭一道正議大夫充天章閣待制致仕楚建中可户部侍郎者右臣竊惟七十致仕古今通義非獨人臣有始終進退之分亦在朝廷為禮義㢘恥之風若起之於既謝之年待之以不次之任即須國家有非常之政而其人有絶俗之資才望既隆中外自服近者起文彦博天下属目四夷革心豈有凡材之流亦塵盛悳之舉如建中輩決非其人竊料除目一傳必致羣言交上幸其未布可以追囬所有前件告詞臣未敢撰謹録奏聞軾又論呂恵卿疏曰臣聞漢武帝世御史大夫張湯挾持巧詐以迎合上意變亂貨幣崇長犴獄使天下重足而立幾至於亂武帝覺悟誅湯而後天下安唐悳宗世宰相盧把妒賢嫉能戕害善𩔖力勸征伐助成暴斂使天下相率叛上至於流播悳宗覺悟逐把而後社稷復存盖小人天賦傾邪安於不義性本隂賊尤喜害人若不死亡終必為患臣伏見前參知政事呂恵卿懐張湯之辨詐兼盧把之奸凶詭變多端敢行非度見利忘義黷貨無厭王安石初任執政用之為腹心安石山野之人强很傲誕其於吏事宜無所知恵卿指擿教導以濟其惡青苗助役議出其手韓琦始言青苗之害先帝知琦朴忠翻然感悟欲退安石而行琦言當時執政皆聞徳音安石惶遽自失亦累表乞退天下欣然有息肩之望矣恵卿方為小官自知失勢上章乞對力進邪説熒惑聖聼巧囬天意身為舘殿攝行内侍之職親任傳宣以起安石肆為偽辨以難琦説仍為安石畫刧持上下之䇿大率多用刑獄以震動天下自是諍臣吞聲有識喪氣而天下靡然矣至於排擊忠良引用邪黨恵卿之力十居八九其後又建手實簿法尺椽寸土檢括無遺雞豚狗彘抄劄殆遍専用告訐推析毫毛鞭箠交下紙筆翔貴小民怨苦甚於苗役又因保甲正長給散青苗結甲赴官不遺一戸上下騷動不安其生遂致河北人戸流移雖上等富家有驅領車牛懐挾金銀流入襄鄧者旋又興起大獄以恐脅士人如鄭俠王安國之徒僅保首領而去原其害心本欲株連蔓引塗汚公卿不止如此獨頼先帝天資仁聖每事裁抑故恵卿不得窮極其惡不然安常守道之士無噍𩔖矣既而恵卿自以贓罪被黜於是力陳邉事以中上心其在延安始變軍制雜用蕃漢上與馮京異論下與蔡延慶等力争惟黨人徐禧助之遂行其說違背物情壊亂邉政至今為患西戎無變妄奏警急擅領大衆渉入邊境竟不見敵遷延而歸糜費資糧棄捐戈甲以巨萬計恣行欺㒺坦若無人立石紀功使西戎曉然知朝廷有吞滅靈夏之意自是戎人怨畔邉鄙騷動河隴困竭海内疲勞永洛之敗大将徐禧本恵卿自布衣中保薦擢任始終協議遂付邉政敗聲始聞震動宸極循致不豫初實由此邉釁一生至今為梗及其移領河東大發人牛耕葭蘆呉堡兩寨生地托以重兵方敢布種投種而歸不敢復視及至秋成復以重兵防托收刈所得率皆秕稗雨中收穫即時腐爛恵卿張皇其數牒轉運司交割妄言可罷饋運其實所費不貲而無絲毫之利邉臣畏惮皆不敢言此則恵卿立朝事迹一二雖復肆諸市朝不為過矣若其私行嶮薄非人所為閭閻下賤有不食其餘者安石之於恵卿有翼卵之恩有父師之義方其求進則膠固為一更相汲引以欺朝廷及其權位既均勢力相軋反眼相噬化為讎敵始安石罷相以執政薦恵卿既已得位恐安石復用遂起王安國李士寧之獄以柅其歸安石覺之被召即起迭相攻擊期致死地安石之黨言恵卿使華亭知縣張若濟借豪民朱華等錢買田産使舅鄭膺請奪民田使僧文㨗請奪天竺僧舍朝廷遣蹇周輔推鞫其事獄将具而安石罷去故事不復究案在御史可覆視也恵卿言安石相與為奸發其私書其一曰無使齊年知齊年者為馮京也京安石皆生於辛酉故謂之齊年先帝猶薄其罪恵卿復發其一曰無使上知安石由是得罪夫恵卿與安石出肺肝託妻子平居相結惟恐不深故雖欺君之言見於尺牘不復疑間恵卿方具無事已一一收録以備緩急之用一旦争利遂相抉摘不遺餘力必致之死此犬彘之所不為而恵卿為之曽不愧恥天下之士見其在位側目畏之夫人君用人欲其忠信於已必取仁於父兄信於師友然後付之以事故放麋違命也而推其仁則可以託國食子徇君也而推其忍則至於弑君欒布惟不廢彭城之命故高祖知其賢李勣惟不利李宻之地故太宗許其義二人終事二主俱為名臣者仁心所存無施不可雖公私有異而忠厚不殊至於呂布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反元顯背逆人理世所共疑故呂布見誅於曹公而牢之見殺於桓氏皆以平生反覆勢不可存夫曹桓古之奸雄駕御英豪何所不有然推究利害終畏此人今朝廷選用忠信惟恐不及而置恵卿於其間譬如薰蕕雜處梟鸞並棲不惟勢不兩立兼亦惡者必勝況自去嵗以來朝廷廢呉居厚呂嘉問蹇周輔宋用臣李憲王中正等或以牟利或以黷兵一事害民皆不得迯譴今恵卿身兼衆惡自知罪大而欲以閒地自免天下公議未肯赦之然近日言事之官論奏奸邪至於鄧綰李㝎之徒微細必舉而不及恵卿者盖其凶悍猜忍如蝮蝎萬一復用睚眦必報是以言者未肯輕發臣愚惷寡慮以為備位言責與元惡同時而畏避隠忍辜負朝廷是以不惮死亡献此愚直伏乞陛下斷自聖意畧正典刑縱未以汚斧鑕猶當追削官職投畀四裔以禦魑魅殿中侍御史呂陶論蔡確等觀望不肯協心改法疏曰臣聞君子小人之分辨則王道有成邪正雜處於朝則政體不能純一此天下安危治亂所繫甚大世主當審其取捨也恭惟太皇太后陛下臨御以來念祖宗積累之難思先帝付託之重保佑聖嗣安養生民剗除弊事覃布悳恵召用一二舊老與之裁正法度緝全紀綱以傳萬世欲皇帝陛下佗日循而守之則宗社乂安如泰山之四維聖心所存豈不善哉豈不逺哉然大臣之異議者則不能盡誠竭力以稱太皇太后之意尚且依違偷惰務習故態觀望反覆互持兩端推原其情盖有三説一曰先帝之法豈可遽改它日嗣皇親決萬機則吾属皆有罪二曰國家用度至廣非取於民何以能足今一切蠲除餘利則遂見闕乏三曰司馬光老且病将不能終其事萌此心者蔡確韓縝章子厚張璪是也安夀李清臣則依阿其間俯仰徘徊以伺勢之所在而歸之爾謂先帝之法不可遽改乎三王之政不免有敝為其有敝而改之所以宜民利物而全其治體臣甞觀去年正月詔書乃曰嘉與四海洗心自新則先帝彼時已知法之為敝有欲改之意矣今太皇太后以母道臨制天下順元元之所欲而與時損益盖以成先帝之志也且君子愛人以悳小人愛人以姑息責難於君謂之恭謂吾君不能謂之賊今之大臣欲改法者使天下無憾於先帝是待其君甚厚而愛之以悳也於先帝為忠也其不欲改法者使天下憾於先帝是待其君甚薄而愛以姑息也恭惟皇帝陛下端重仁孝出自天縱它時親臨萬機而見天下有太平之實追觀今日之事是非得失洞鑒其端則必以厚於先帝而愛之以徳者為是薄於先帝而愛之以姑息者為非忠於其君者為得賊於其君者為失矣然則欲改法者它日将至於無罪不欲改者它日将至於有罪不當私憂而過計也謂國家用度非取於民不能足乎則今日之議法非不取也唯患小人倚法削民而取之多故參酌中道而除去煩苛乃百姓足君孰與不足之義也伏惟太皇太后皇帝陛下慈愛恭儉徳與性成内無土木逰玩華靡之費外無干戈攻戰過濫之賞節用裕民既得其道何俟過取而後給哉謂司馬光老且病将不能終其事乎則修講法度本於宗社萬世之計不問光之存亡假使光雖物故則朝廷圗治之意豈肯中輟哉亦何必望望然幸光之死也謀人之國而措意如此是昔日負先帝今日負陛下也當熈寧元豐之際小人之黨棊布於天下急利者争取財急功者争用兵結民怨起邉禍日甚一日嵗甚一嵗彼數人者當此之時或領大農或處近侍或總計省或居二府然而未嘗獻告一言建明一事唯持禄固位茍度嵗月以民事驗之其極也則有市易之意有堆垜之求有江湖之鹽法有京師之茶禁以軍政驗之其極也則有乞弟之役有蘭州之取有靈武之復有永洛之陷凡此數者結民怨則深起邉禍則大然皆非先帝之本意乃大臣無所補報而有以成之臣故曰昔日負先帝也今太皇太后惻然念生民之困窮思有以安固邦本乃講求治道舉偏補敝改正法度以付嗣君為萬世之福天下之人傾耳側目日望太平數人者當此之時不能引咎改過猶懐向之三説觀望而不欲為或為之而不欲盡其事是以罷市易則尚存抵當放保甲則須俟嵗首黜江淮鹽運之臣則遷延累月而後乃行遣川蜀按茶之使則巧為之嗣而不欲發至於邉鄙之大患存舎之長䇿皆置而不議及司馬光一獻差役之法則昌言其踈竊笑其速其徒從而和之妄傳章子厚有五利七難之説喧播於外士民聞者莫不駭嘆臣故曰今日負陛下也此數人者其處心積慮大畧如此當此之時決不可鎮社稷矣若乃居家之隠慝在朝之細過聞望之素輕踐歴之太幸則言者陳之已詳陛下知之已久臣近領臺職不敢復道今蔡確章子厚已罷免人皆快之縝璪軰猶備位實未厭天下公論也伏望陛下特出聖斷以辨君子小人之分無使邪正雜處於朝罷黜縝等以謝天下則王道之成政體之純一易如反掌耳陶又奏為乞早賜聖斷罷免韓縝張璪事疏曰臣嘗論奏執政大臣昔日負先帝今日負陛下乞行罷黜以謝天下臣位卑言輕不能感動聖聼尚賴陛下恕其狂妄未加鈇鉞之誅臣仰戴恩遇不敢自已願竭愚慮為陛下喋喋陳之盖以今日之事實繫朝廷之輕重政教之純駮天下之安危伏望太皇太后以祖宗積累為憂以先帝顧託為念以嗣君冲幼為計博采公議斷自聖心而力行之則天下幸甚夫所謂執政大臣者輔人主以道庇生民以徳格天地以誠和隂陽以政鎮四夷遂萬物乃其職也得其人舉其職則朝廷重政令純天下安非其人廢其職則朝廷輕政令駮天下危自古至今莫不如此臣不敢逺迹曠世輙舉唐室之事以證其一二在明皇時任姚崇宋璟則致開元之治用李林甫楊國忠則有天寳之亂裴度在位則宿奸巨盗為之喪氣名聞外夷元稹入輔則詔下之日朝野莫不輕笑崔祐甫除吏人稱允當李義府賣官則其門如市進楊綰則人心自化拜程异則物情深駭其它邪正之情治亂之由載在簡䇿燦然不可悉數聖宋臨御百有餘年元勲重徳高才偉望為天下賴多以居之在太祖時則有趙普王溥呂餘慶劉熈古在太宗時則有呂端呂䝉正李昉李至李沆寇準在真宗時則有王旦李迪向敏中張知白王曾王曉在仁宗時則有呂夷簡晏殊杜衍韓琦富弼蔡齊薛奎范仲淹呉育歐陽修明鎬呉奎張昪王舉正包拯姜遵魯宗道田況如此等人或以經綸成務或以獻告極忠或陳臺諫之規模或知風化之原本或通古今之變或盡出處之致或可潤色皇猷或能裁決大事是故三朝之治號為太平卓冠前古盖輔相得人而朝廷重政令純生民安故也今日之執政大異於此無元勲厚徳不足以服人無髙才偉望不足以謀國在先朝則括囊茍禄未嘗有分毫補助惟與小人表裏固結為賊民害物之政使神宗皇帝徳澤不能下流愁嘆之聲聞于四海在今日則隂懐顧望面從竊議招權立黨為異時家族子孫之計使陛下法度未能完正而安養元元之具有未盡善然則社稷何頼焉生民何望焉陛下不於此時擇其尤無状者而去之臣恐始則欺終則慢終則干犯撓權而不可制矣臣雖踈賤早夜為陛下憂之盖謂陛下富有春秋方在諒闇豈可使大臣强梗而不早黜之伏見韓縝自備位宰府以來内外文武百執事至於閭閻聚落之人無不竊議交毁以為非據盖其人自為小官以至大吏行檢乖僻譽望衰輕有所欲為則任其很愎而繼之以無恥任秦州路經畧使日酣醉歸室誤謂因指使使臣窺其私而箠殺之奉使河東日肆為醜行形於翰墨為邉臣燕復所把持乃至呼復為兄而求庇其過在樞宻院則諂事張誠一待以家人禮毎劇飲大笑欵宻無間欲因誠一以結宦官此最為士論所深疾者也其使河東日實與北使梁允同定地界不能援引誓書剖析曲直大為梁允同所屈遂割吾境土形勝之地數百里以啗敵人使吾沿邉弓箭手熟戸等去墳墓桑棗之日哀號怨憤所不忍聞乃奪官貟職田并五臺寺家田以處之其襟要控扼去處多為彼有辱命蹙國罪當萬死先帝志在收復幽燕不欲聖機漏露一切包忍既而梁允同以拓土之功歸其國為兩府吾亦用韓縝以示不疑耳其實非以縝之才器可以大用也自陛下即位以來乃敢竊弄威福廣植親黨差除一人行遣一事多不協於至公郭茂恂王欽臣在陜西為監司皆有醜迹惡聲喧聞一道其事連及縝姪宗儒今為縝主張差茂恂庫部郎中欽臣工部郎中玷辱清選莫此為甚王説前知徐州附㑹吴居厚極力掊斂得替到部縁縝之舊忽除省郎言者彈劾遂罷其職仍差知宻州頴昌人辛雝係知縣資序與縝同鄉遂於吏部取知州通判合得之闕差雝為光禄寺丞宣義郎李振者素無長才異效未嘗歴繁要任使秖縁其父評曾與縝同定地界遂用振可治繁劇去處作取旨選差之闕差振知雍丘縣是以一邑之民棄於孺子之手此皆徇私壊法無復畏避也翟思所以降知南康軍者盖思為御史日曾言縝受燕復馬不償其價故也黄履所以落侍講知越州者盖履為中丞日言縝之姪宗道宗古避親遷換不當奉聖旨今後差除三省同進呈故也此皆報怨復仇無所忌惮也張璪之為人柔邪畏佞善能窺人主之意随勢所在而依附之往往以危機中人熈寜初擢在條例司講議役法遂置儒舘預諫列唯諾備位無所發明常持兩端先帝聖慮髙逺察見反覆斥逐于外後為王珪出力援引試知制誥兼知諫院珪實欲使之在言路以杜塞内外耳目天下有志之士無不扼腕憤疾後為翰林學士同舒亶判國子監深交於亶以至株連大獄璪有力焉尋判司農寺詳定官制遂忝執政及先帝升遐陛下即位太母垂簾保佑而璪貪天之功自謂顧託之重立黨布恩為持寵固禄之計每差一官除一局則以簡札諭人掠美收慝而後降其命有成都路𣙜茶司勾當公事張同者乃随州簽判王經臣之甥也同之姊常嫁故益王向經而璪之姊乃嫁經臣璪之與張同固非近親今乃與同書問往還甚於骨肉交通問遺財賄公行原其所以結張同之心則奸邪可知矣璪事先帝不為不久謂天下利害不知耶則兩次在言路矣謂土木之役不知邪則常判将作監矣謂苗役之法不干預邪則甞判司農寺矣謂官制迂滯不見本末邪則甞充詳定官矣謂刑獄羅織非其責邪則甞以蘇軾事欲置於死連張方平韓維范鎮司馬光矣此二人者其操行則如彼其政事則如此誠不足鎮四夷安宗社伏望陛下博詢衆議俯聼臣言早腸罷免天下幸甚陶又奏乞罷國子司業黄隠職任疏曰臣竊以士之大患在於随時俯仰而好惡不公近則隳喪㢘恥逺則敗壊風俗此禮義之罪人治世之所不容也太學者教化之淵源所以風勸四方而示之表則一有不令何以誨人臣伏見國子司業黄隠素寡問學薄於操行久任言責殊無獻告惟附㑹當時執政茍安其位及遷庠序則又無以訓導諸生注措語言皆逐勢利且經義之說盖無古今新舊惟貴其當先儒之傳注既未全是王氏之解亦未必盡非善學者審擇而已何必是古非今賤彼貴我務求合於世哉方安石之用事其書立於學官布於天下則膚淺之士莫不推尊信嚮以為介於孔孟及其去位而死則遂從而詆毁之以為無足可考盖未甞聞道而燭理不明故也隠亦能誦記安石新義推尊而信嚮之久矣一旦聞朝廷欲議科舉以救學者浮薄不根之弊則諷諭太學諸生凡程試文字不可復從王氏新説或引用者𩔖多黜降何取捨之不一哉諸生有聞安石之死而欲設齋致奠以伸師資之報者隠輙形忿怒将繩以率斂之法此尤可鄙也夫所謂師弟子者於禮有心喪古人或為其師解官行服與負土成墳者前史書以為美後世仰以為髙此固不論其學之是非而特貴其風誼爾昔彭越以大惡夷三族詔捕收視者欒布一勇士敢祠而哭之漢祖猶恕而不殺班固亦以為能知所處盖氣節之可尚也今安石之罪雖暴於天下惟其師弟子之分則亦不可輒廢而諸生為之設齋致奠又非彭越欒布之比隠何必忿怒而遽欲繩之以法乎抑可見其不知義也向者有司欲復聲律朝廷方下其事集羣臣而議之隠乃不詳本末奉為定令揭牓學舎謂朝廷已復詩賦使學者知悉傳播四方人皆疑惑此又見其躁妄趨時之甚也夫道惪所出之地長育多士而庶㡬成材乃以斯人為之貳則何以養亷恥厚風俗哉伏請早行罷黜以示勸戒無使邪險之士久累教化之職貼黄大率隠好自任凡考校生員文字多不與祭酒博士共議意欲徇私向者違條差補經諭不當鄭穆自舉覺申禮部近日定王適程試髙下異論隠輙有申請上煩朝廷與奪益見其取與不協公論不能稱職也陶又奏乞察小人邪妄之言疏曰臣竊謂人君深居九重尊髙如天雖有聖智亦未能周知天下之事必以納諫為先既能納諫則臣子可盡下情以陳治亂之要今陛下聼政之初臣備位侍從朝廷之事得以論思敢竭愚鄙少報萬分之一願陛下特加省覽臣伏以太皇太后保佑聖躬于今九年垂簾聼政天下安治一旦弃四海之養凡在臣庶痛心泣血無所迨及方其得疾之初陛下憂形玉色躬持藥食衣不解帯告於天地社稷禱于宗廟山川薄形赦罪釋逋輕賦凡可以祈福禳灾之事講求備至及其疾勢大漸則召髙族子弟入于禁中丁寜撫慰有安心免憂之言既已大殮内侍有需索酒食者禮部臣寮謂方當哀毁不可為閭閻鄙俚之事恐累聖惪陛下即從批奏遂罷其請繼有手詔稱揚太皇太后臨朝累年抑損外戚未甞假借無以報稱盛惪議與髙族子弟推恩又慮諸處應奉山陵過有勞費遂令降詔有司並須遵依遺詔指揮逺近臣子聞此等事無不感嘆皆謂太皇太后於陛下有天地之功於社稷有萬世之力陛下深知本末尊而報之一言一事不敢違戾太皇太后之意上合天心足以享萬夀下副人望足以保四海宗社幸甚天下幸甚然臣於此時以無可疑而為疑以不必言而為言則其罪不勝誅矣所恃者陛下仁而好諫明而察物必能赦臣私憂過計之罪爾盖自太皇太后垂簾以來屏黜兇邪裁抑儌倖横恩濫賞一切革去小人之心不無怨憾萬一或有奸邪不正之言上惑聖聼謂太皇太后斥逐舊臣更改政事今日陛下既親萬㡬則某人宜復用某事宜復行此乃治亂之端安危之機君子小人消長之兆在陛下察與不察也辨與不辨也陛下察其是非辨其邪正使非不敢勝是邪不能害正則君子進小人退天下治而安矣昔元祐之初臣任臺官甞因奏事簾前恭聞徳音宣諭云朝廷政事若果與民有害即當更改其它不繫利害者亦不須改每改一事必説與太后恐外人不知臣深思此語則太皇太后凡有改更固非出於私意盖不得已而後改也至如章惇悖慢無禮呂惠卿奸囬害物蔡確謗毁大不敬李定不持母喪張誠一盜父墓中物宋用臣掊歛過當李憲王中正邀功生邉事皆是積惡已久罪不容誅若敗露於先帝之朝必須不免竄逐若暴揚於陛下之手亦合正以典刑以此而言則太皇太后所改之事皆欲生民之便所逐之臣盡是天下之惡豈可以為非乎恭惟陛下聪明聖智出於天縱是非邪正進退可否必已了然於心豈待人言而後辨臣乃不避斧鉞之譴喋喋以告陛下者亦婺不恤緯而憂宗周之意也夫婺婦以組織為事惟經緯是恤今乃不恤其緯而以周亡為憂固可怪矣愚者千慮亦有一得狂夫言之明主擇焉臣又聞昔者明肅太后稱制之日多以私恩偏及親黨聼斷庶務或至過差及至仁宗皇帝親政之初臣下遂有希合上意言其闕失仁宗察見情偽降詔止絶其畧曰明肅太后夙承先顧保佑冲人勤約之風化流四海或號令之所出或聼斷之從宜盖機務之實繁雖旰昃之無暇賞善罰惡惟命令之已行革故鼎新非孝思之所至易月方臨於庶政虚懐覬納於讜言其有㒺識逺圗靡循理體逹於聞聼姑務寛容多形瑣碎之言復有迎合之意宜申誡勵以警奸囬應明肅太后垂簾日所行詔命已經施行過諸般公事更不得輙有上言於是天下之人皆謂仁宗深念社稷之功能全子母之愛聖惪廣大超越今古載在史冊垂範後世陛下所宜法而行之臣愚竊謂明肅太后之政時有過闕仁宗念其保䕶尚降詔書不容小人輙有議論而況太皇太后垂簾九年所行之政皆以便民所逐之臣各已當罪而無可擬議萬一有小人狂妄獻言豈可容哉豈可信哉願陛下明示黜罰杜塞其端以副天下之望以隆宗社之福八年翰林學士兼侍講范祖禹論邪正劄子曰臣伏見熈寕之初王安石呂恵卿等造立新法先言天不足畏衆不足從祖宗不足法使朝廷不懼灾異不恤衆言悉變更祖宗舊政多引小人以誤先帝勲舊之臣屏棄不用中正之士相繼引去又啟導先帝用兵開邉結怨敵人至熈寜七八年間天下愁苦百姓流離幸賴先帝聖明覺悟再罷安石兩逐恵卿終元豐之世不復召用而所引小人已布滿中外不可復去如蔡確連起大獄王韶開邉熈河章惇開邉湖南沈起引慝交賊冦䧟三州朝廷討伐前後死傷二十萬呂恵卿沈括俞充李稷种諤等興造西事死傷者又二十萬先帝悔悼親諭輔臣曰安南西師死傷皆不下二十萬朝廷不得不任其咎又言呂恵卿可誅元豐之末吳居厚行鉄冶之法於京東王子京行茶法於福建蹇周輔行鹽法於江西李稷陸師閔李元輔行茶法市易於西川劉定教保甲於河北此諸路之民皆愁苦嗟怨比屋思亂當此之時人心懔懔朝夕不保幸賴陛下與先太皇太后蚤從衆言悉罷新法脩復舊政天下之民如解倒垂九年之中海内晏安事理無疑明如日月逺至邊陲無不咸賴唯是向來所逐小人日夜伺候今日事變妄意陛下不以修改法度為是如使小人得至朝廷必進奸言上以惑悞陛下次以傾害善人下以脅持羣臣萬一陛下過聼而小人復用豈唯正人不敢立朝臣恐宋室自此陵遲不復振矣臣毎思元豐之末人心已離不意朝廷復有今日所以不避萬死為陛下明言之伏望陛下常以社稷為念深懲小人傾危國家明諭執政大臣凡向來所逐除已死亡外存者屏廢永不復用則海内無不安枕矣祖禹又論召内臣劄子曰臣近聞陛下召内臣十人而李憲之子亦在其中又召數人而王中正之子亦預其數中外之人以至民庶無不籍籍私議深以為憂皆言執政大臣不能固執置陛下於有過之地自今更有大於此者驟加召用必駭衆聼若大臣又不能固執則是朝廷全無綱紀公議遂廢其於聖徳為損不細何者陛下初親庶政今方踰月四海之人傾耳属目未甞聞行一美政訪一賢臣先進用内臣如此衆多必謂陛下私於近習人心一失不可復收雖家至户説無以自解臣竊為陛下惜之伏望聖慈更加審慮特賜追改以安中外之心祖禹又奏曰漢唐之亡皆由宦官自熈寜元豐間李憲王中正宋用臣輩用事縂兵權勢震灼中正兼幹四路口勅募兵州郡不敢違師徒凍餒死亡最多憲陳再舉之䇿致永洛摧䧟用臣興土木之工無時休息㒺市井之微利為國斂怨此三人者雖加誅戮未足以謝百姓憲雖已亡而中正用臣尚在今召内臣十人而憲中正之子皆在其中二人既入則中正用臣必将復用願陛下念之宣仁太后崩中外議論洶洶人懐顧望在位者畏懼莫敢發言祖禹慮小人乗間害政又上奏曰陛下方攬庶政延見羣臣此國家隆替之本社稷安危之機生民休戚之端君子小人進退消長之際天命人心去就離合之時也可不畏哉先后有大功於宗社有大徳於生靈九年之中始終如一然羣小怨恨亦為不少必将以改先帝之政逐先帝之臣為言以事離間不可不察也先后因天下人心變而更化既改其法則作法之人有罪當退亦順衆言而逐之是皆上負先帝下負萬民天下之所讎疾而欲去之者也豈有憎惡於其間哉惟辨析是非深拒邪説有以奸言惑聼者付之典刑痛懲一人以警羣慝則帖然無事矣此䓁既誤先帝又欲誤陛下天下之事豈堪小人再破壊耶柤禹又論李之純蔡京劄子曰臣伏聞知成都府李之純除戸部侍郎知瀛州蔡京除寳文閣直學士知成都府臣竊以成都兼兩路鈐轄方面之任最為要重柤宗以來尤慎付與聞之純寛厚簡静蜀人安之宜且令終任或增秩再任今戸部雖欲得人而逺方數千里休戚安危所繫亦不為輕蔡京素附㑹奸臣蔡確衆所共知雖有才能而年少輕鋭非端厚之士又故事自成都囬者多為執政其次亦為三司使知開封府朝廷方當分别邪正如京者在所裁抑不當崇長今進職逺帥則資任愈隆為它日大用之漸實未允愜伏望且令依舊如必欲召用之純乞别擇人付以逺方哲宗時右司諫蘇轍論責降官不當帯觀察團練状曰臣伏以朝廷典章百世所守因事變法為患嘗多祖宗之世使相莭度不領京師官局其奉朝請必改它官或為東宫三師或為諸衛将軍太平興國中以趙普之勲自河陽還朝止為太子少保以向拱張永惪之舊並為環衛至今諸道鈐轄總管以防團老歸者亦以諸衛處之盖其遺法也至明道中錢惟演以章獻皇后親嫌罷樞宻使始以保大莭度為景靈宮使治平中李端愿以長公主子亦以武康節度為醴泉觀使恩倖一啟自是戚里以節察居京邑不治事者肩相摩也然猶未見以罪降黜而以觀察團練享厚禄居謫籍者近日李憲以宣州觀察使提舉明道宫王中正以嘉州團練使提舉太極觀二人貪墨驕横敗軍失律罪惡山積雖死有餘責聖恩寛貸皆寘之善地而又首亂國憲假以使名臣恐後世推壊法之始歸咎今日謂宜考修制度追還誤恩以存舊典且使罪人知有懲艾轍為御史中丞再乞責降李偉劄子曰臣近奏乞罷修河司并責降李偉等尋准九月二十六日聖㫖李偉權發遣北外監丞提舉東流又准十月二日聖㫖罷提舉修河司以為河司雖罷而李偉不去與不行臣言無異謹按李偉屢以奸言動揺朝廷興起大役於去年八月中獨銜奏稱大河見今已為二股分行然湏當於第四舖地分更行開廣河漕只得兵夫二萬於九月興功至十月寒凍時畢功因而引導河勢豈止二股通行而已亦将遂為囬奪大河之計凡偉所言大率狂妄不疑如此由此朝廷信以為實為之發兵調夫差官吏聚梢茭騷擾河北京東西三路吏民為之不聊生者半年朝廷中覺其妄遽罷其役是時中外公議皆望朝廷立行誅竄明其欺㒺以謝天下而因循不决任偉如故既而給事中范祖禹封還制書乞罷偉差遣朝廷猶復隠忍於四月五日降聖旨李偉差遣候過漲水取旨今漲水已過中外又謂陛下必責降偉以信前命而反擢授監丞仍提舉東流曽未數日復罷修河司盖朝廷之所以罷修河司者謂回河不可復行故也回河既不可復行則偉㒺上誤國之罪審矣今乃以初任知縣權發遣都水監丞則是有罪之人更得違法進擢此公議所以不服也且修河司雖罷而李偉不去奸言時至河事變更不定河朔生靈無時得安此又公議之所深憂也且朝廷號令貴在必信四月五日聖㫖指揮著在有司今棄而不用使天下皆得竊議以謂朝廷虚説此言如使給事中奉行制命及制命已行則棄為虚語曾不顧恤大臣何惜一偉而輕犯此謗哉臣不勝區區伏乞檢㑹前奏速賜流竄偉若不黜公議終不止也右正言劉安世論御藥李倬不合用内降請地乞付有司根治状曰臣伏聞勾當内東門李倬得内降指揮欲置啟聖院常住白地以為墳塋朝廷既下所司施行而寺僧遍詣執政臺省次苐陳訴以謂倬之所請乃是竹木園圃栽植有年數踰萬本其中房舎僅三十間而敢欺㒺天聰指為白地誕謾暴横一至於此臣伏觀陛下即政以來崇尚公道凡百内降一切禁止四海之内拭目改觀倬以小臣給事宮掖乃敢挾私㒺上干紊綱紀此而不懲将亂政事伏望陛下深賜詳察斷以至公付之有司明正倬罪庶能杜漸不累聖惪安世又論曰右臣近以勾當内東門李倬得内降指揮欲置啟聖下院常住白地以為墳塋而衆僧列状陳訴以為倬之所請皆非白地事属欺㒺不可滋長遂具論奏乞行案劾比聞已有朝㫖前降指揮更不施行而倬挾私㒺上之罪未覩推治竊縁賞罰之柄實繫國體欲使信於天下要在行以至公義有未安固難緘黙再黷宸聼必冀開納臣竊謂倬陳請之日若使陛下知其竹林園木萬數浩瀚生者有居室死者有墳墓必不至徇其私謁輕降玉音良由倬志在茍得熒惑天聼致朝廷命下之日違咈人情存者不得寜其居𦵏者不得安其地玷累盛惪咎皆自倬書曰宥過無大刑故無小盖偶然詿誤情在可矜雖曰大過亦可全宥其或心無忌憚故犯典刑事雖㣲細必寘於法此乃三代堯舜以來不易之道也今倬妄干中㫖飾詐欺君罪實故為情無足恕萬一聖度赦而不誅臣恐異時更有甚於此者然則何以詰之伏望陛下心存去惡事戒履霜無牽近習之私不惑衆多之口罷倬近職付之有司劾其誕謾重行降黜庶使綱紀修舉奸邪知畏安世又論曰右臣近嘗論奏李倬挾私㒺上僥求中旨矣乞有司按治其罪今已累日未覩施行檢准元祐編敕莭文傳宣或内降若湏索及官司奏請雖得旨係原無條制者並隨事申中書省樞宻院覆奏取旨臣竊謂倬之所請出於一時處分固非常法若執政承受上件聖㫖自合依條覆奏或再得㫖揮許令施行亦合子細契勘有無違礙今倬志在茍得罪實欺君三省奉行初不勘當使國家命令之下違咈人情生者不得寜其居𦵏者不得安其地原倬之犯雖無足赦亦大臣奉法不謹之過也臣聞祖宗以來亦有内降之事茍人情有所未便公議有所未安當時輔弼往往執而不下著之信史皆可稽考臣竊謂人主之徳多尚仁恩或有請求難於面折但以其奏付之外廷若大臣守法而不囬則私謁雖多而無患盖不違其請足以示主上之仁斷之於公足以嚴朝廷之政如此則恩歸於上而法行於下矣臣愚欲望陛下威克厥愛治逺自近先正倬罪以示無私然後明敕三省樞宻院今後内降㫖揮並令勘當若於法無違於民無害乃湏覆奏方得施行所貴紀綱完宻杜絶僥倖安世又論胡宗愈除右丞不當劄子曰右臣今月初八日延和殿嘗奏胡宗愈新除尚書右丞不協公議陛下仁惪天覆重廢已行之命尚欲遷延徐觀所為仰承聖諭固當遵奉退而熟慮終有未安是以不避嚴誅再瀆天聼伏惟陛下留神省覽臣聞執政之任天下極選惟是當世之賢傑乃可不次而登用至於徳行不足以出羣臣之右才智不足以服多士之心則必假之以嵗月進之以階漸非唯養其聞望亦所以抑僥倖而止奔競也臣伏見宗愈頃在先朝粗能修飾陛下踐阼之始首加任使再朞之内致位中司然而性本奸囬才識暗陋自居風憲尤務迎合既不聞有所啟沃進賢退奸亦未嘗有所建明興利除害朋邪㒺上中外側目忽聞制命擢居丞轄輿議喧然莫不驚駭臣竊謂人君命令雖在必行茍處之得其理則執之不可變惟其不合衆望違咈人情闗天下之盛衰繫朝廷之輕重所宜擇善何惮改為而況輔弼之臣與國同體豈容憸佞雜處其間臣於宗愈固無一日之雅亦無纎芥之怨惟是公論有所未安是以前日賜對罄盡悃愊而拳拳之忠不能自已故復論列以報陛下用臣之意伏望聖慈更加詢考若臣言不謬則乞收還宗愈新命授以外官庶使邪正有辨不失天下忠賢之望安世又論曰右臣前月中嘗具奏陳胡宗愈除尚書右丞不協公議伏乞更加考察特行罷免今已踰月未覩施行臣雖甚愚豈不知違咈聖意弹擊大臣力薄言輕難免罪戾然陛下不以臣不肖使備言路今識者喧然以為奸邪而臣鉗黙依違不告陛下雖茍免一時忤㫖之誅而天下将責臣以失職之罪臣亦何敢為自安之計而負陛下圗任之意哉臣聞自昔臺諌之論常以天下公議為主因公議之所是而後與之因公議之所非而後撃之人君所以垂衣髙拱不出户庭而周知天下之情可否與奪必合義理以辨邪正以决疑似如權衡之不可欺以重輕規矩之不可誣以方圎者用此道也臣考之輿論皆謂宗愈才識淺近趨向反覆貪得患失背公徇私不敢悉數其詳以瀆天聼猶可粗陳其畧兾寤宸衷一言渉欺不敢逃死按宗愈起於貴閥偶中高科數年之間漸階顯列昔事先帝頗有可稱及陛下即政之初首加進用再朞之内遂至中司未聞深慮逺圗報朝廷之厚徳唯以巧言邪説為進身之私謀如永興軍路提刑馮如晦欲令舊不充役貧下之人出錢以助合役之上戸不量緩急閑劇色役一例雇募㳺手充代其議論乖謬最害役法如聞蘇轍頗主其言亟為公移欲頒諸路戸部尚書李常曾不講究遽令施行而員外郎劉昱乃能力辨是非不為押檢議既難合事亦中輟縉紳傳播莫不嘉昱能守其職而宗愈因上雇募衙前之論遂詆劉昱以謂户部郎官有近來參詳立法之人護短遂非不肯公心捨已從長以救鄉户之患意在附㑹不顧義理其罪一也按宗愈實娶丁氏今禮部貟外郎丁騭乃其妻族宗愈既備從官未見引天下之賢而首薦私親乞不次擢用古之人固有内舉者矣然必以誠告其君曰臣之子也今宗愈特薦丁騭而不以實奏幸朝廷之不察以盜寵禄而惠歸於已其罪二也方陛下嗣位太皇太后同覧庶政而蘇軾撰試館職䇿題乃引王莽依附元后取漢室之事以為問目士大夫皆謂非所宜言臺諫官數嘗論奏而宗愈不惟無所弹劾反又勸止同列不令上疏其罪三也李慎由乃文彦博之孫壻方營在京差遣而宗愈遽薦為本臺主簿偶以礙格遂聞報罷茍徇權貴不恤人言其罪四也昔熈寜中嘗知諫院神宗皇帝深知其奸乃手詔中書曰宗愈自領言職未嘗存心朝廷治道凡進對論事必潜伏奸意含其事情旁引邪説以私託公坐是落職與通判差遣御批具在天下共知臣竊謂熈寜政事與今雖異而宗愈觀望迎合之迹固同陛下用此數者平心正慮而察其本末則奸囬㒺上徇私趨利之實灼然可見誠不足以當大臣之任重朝廷之勢伏望聖慈察臣惓惓之忠審為天下之計萬㡬之暇詳覽瞽言若臣所論皆有按據不至謬盭即乞特出聖斷付外施行安世又論曰右臣近以胡宗愈除尚書右丞不協公議臣於延和殿賜對之日已嘗面奏繼又兩具奸慝條例以聞臣之所言莫非實狀累瀆天聼渉歴兩月竊惟宗愈之罪惡固不能逃於聖鑒而陛下體貎大臣務全進退之禮是以特降荅詔俾安厥位宗愈承命遽出無復遜避縉紳傳播莫不駭笑臣伏覩自昔執政之臣或為言者所擊率皆歸第闔門待罪雖朝廷遣使宣召往往遵奉君命暫至官省不敢治事急復歸家原其處心固非畏縮實以輔弼之任與國同體舉措出處天下具瞻茍有過尤挂于清議自當上還印綬退避賢路豈俟斥逐方為去計盖待之之禮既厚則責之之意愈深此所以君臣之間禮體兩得而㢘恥之風足以矯厲天下者也賈誼有言曰上設亷恥禮義以遇其臣而臣不以莭行報其上者則非人𩔖也臣竊觀陛下之所以待宗愈可謂盡㢘恥禮義之道矣按宗愈之所以報陛下則非惟不以節行而又貪墨急進違棄義理明知臺諫皆有弹劾而尚起視事一如平日近世以來公卿大臣操行汚下毁滅亷恥未有若此之甚也孔子曰鄙夫可與事君也哉其未得之也患得之既得之患失之茍患失之無所不至矣陛下察宗愈之行義如此茍充其無恥之心則奸邪趨利何所不為尚安足以輔佐人主參斷國論委之以綱轄寘之於廟堂乎又聞御史中丞孫覺乃宗愈之故舊見其改莭今已弹奏監察御史趙挺之楊康國皆宗愈之所薦二人者雖顧惜小莭未見明言其罪而風聞各有章疏申救王覿臣竊謂是非之理固不兩立茍知此之為直則曲之在彼不辨而自見今上則朝廷士大夫之論莫不鄙惡宗愈下至閭閻一介之賤茍或詢之無有心悦而誠服者盖天下之民别而聼之則愚合而聼之則神以此卜之可知公論之不與矣伏望陛下考合僉言明辨邪正罷免宗愈斷之不疑實天下之至幸安世又論曰右臣昨自四月後來三次論奏胡宗愈操行汚下毁滅亷恥貪得患失背公徇私誠不足以輔佐人主參預國論欲乞出自聖斷特行罷免今已兩月未䝉指揮臣風聞宗愈任御史中丞税周氏之第以居毎月僦直一十八千自去年七月二十一日後至今年二月終止償兩月之直其業主三班奉職周知哲累次令人乞請餘緡而宗愈毎加詈辱並不支給遂於三月一日經官申訴乞差人追索及發遣起離開封官吏畏避權勢不為依公施行而遽寝其事中外傳播實駭耳目臣聞中丞之任紀綱所繫檢察非違糾正百辟官之雄峻莫與為比宗愈既長憲臺不能正身以率下而恃權貪利㒺顧義理僦人之居不給其直行已無恥辱國已甚況宗愈更踐華要月俸至優近嘗奉使大遼又經押賜親王禮物所獲甚厚加之鄉里有髙貲之名固非不足於財乃敢挾風憲之威肆貪鄙之行輦轂之下暴横自若将何以表率在位風化四方此而可捨國法廢矣伏望陛下特降睿㫖以周知哲所陳文状付法司推究明正典刑其開封官吏挾情違法之罪亦乞特賜指揮施行安世又論曰右臣近聞胡宗愈任御史中丞日税周氏之第以居自去年七月後來至今年二月終止償兩月之直其業主屢請餘緡而宗愈毎加詈辱並不支給以致周知哲經官論訟臣竊謂中丞之任紀綱所繫今宗愈恃風憲之威肆貪鄙之行輦轂之下暴横自若将何以表率在位風化四方遂具論奏乞以周知哲所陳文状付所司推究其開封府官吏受知哲之訴而畏避權勢不治其事挾情違法之罪亦乞施行今已累日未聞指揮臣䝉陛下拔於稠人之中而付以耳目之任夙夕思念未能上報聖恩之萬一而輔弼之間乃有貪濁暴戾毁滅亷恥之人黷犯朝綱玷辱國體臣雖愚陋實深恥之所以不避忤旨之誅而累煩天聼也且宗愈起於冗散不三年而至執政陛下之所以待宗愈可謂厚矣然自為中司風莭掃地貪得患失背公徇私朋邪㒺上中外側目今又僦人之居不給其直乃致三班使臣投牒起遣操行汚下為人鄙厭一至於此陛下雖務包容未加按治其如朝廷何其如天下何臣忝列諫垣茍不能以公議上逹聖聰則雖萬死猶不足以塞責深慮同列大臣惡傷其𩔖巧為邪説隂欲援救則長奸養惡異日将有滋蔓難圖之悔伏望陛下斷自宸衷早出臣章付外施行不勝至願安世又論曰右臣伏自四月後來累曽論奏胡宗愈罪惡之状誠不足以當輔弼之任乞行罷免前月中又聞宗愈為御史中丞日税人之居不給其直以致三班使臣經官論訴乞令起遣而開封官吏畏避權勢不為依公施行臣兩嘗奏請乞治其罪尋御史臺亦已彈劾逮今多日未䝉指揮中間伏遇荆王奄忽薨謝仰慮聖慈方深哀念是以不敢繼進章疏重煩天聼徬徨跼蹐今復半月竊惟陛下聖明之性洞照物理必能抑割無益之悲上為宗社長久之計臣是敢再申前論以兾開允惟陛下察焉臣聞天下之治亂在朝廷朝廷輕重在執政論執政才否而進退之者人主之職也使朝廷之上皆得當時之賢而都俞戒敕以圖天下之治則善日進而君子道長此易卦之所以為泰也使公卿輔相非其其人而奸邪朋黨更相比周以蔽人主之聪明則惡日滋而小人道長此易之卦所以為否也自古雖至聖之君不能無惡人立朝堯之四凶是已雖甚衰之世未嘗無君子在位商之三仁是已聖人之興賢者衆則惡人不能勝其善故雖有四凶而或竄或殛卒無幸免暴君在上讒謟並進則善不能勝其惡故雖有三仁而或去或死終莫能用此乃治亂盛衰之機不可不察也今皇帝陛下富於春秋太皇太后陛下不出房闈政事之柄方在大臣所宜推擇天下之賢以重天下之勢而忽聞誤恩擢用宗愈除目初傳中外駭異議者以謂陛下臨御之初首能用司馬光於閒退之中而授以柄任天下欣然咸若更生者以其合四海之素望也今宗愈自為侍從旋長憲臺不能進賢退奸興利除害而怙勢作威貪黷徇私公犯義分毁滅亷恥固當竄黜以儆官邪而遽此升遷使備丞轄忠臣義士無不失望臣所以屢冒嚴誅力陳公議而章皆留中累月不下邪正並立枉直兩存雖陛下務全大體欲保初終其於改過不吝去邪勿疑臣恐未能至於盡善也故事執政被劾例須居家待罪今御史臺以宗愈不償房緡公事方申三省而宗愈氣象軒驁若無所睹陵蔑風憲不畏人言近世大臣貪冒無恥未見如此之甚者臣聞閭閻鄙夫臺省老吏見其舉措猶能竊笑況天下有識之士哉臣恐奸邪得志忠賢解體隳紊綱紀汚辱朝廷累陛下知人之明犯大雅鮮終之戒臣愚暗不勝憤懣伏望聖慈特垂省察早以臣前後章奏付外施行安世又論曰右臣伏見御史臺彈奏尚書右丞胡宗愈任中丞日不償房緡及開封官吏受周知哲之訴而挾情違法不治其事臣亦嘗與左司諫韓川累具論列乞正其罪而章皆留中未䝉付外中間御史臺又申三省催促前奏比聞已得指揮更不施行臣竊謂陛下優容執政務全大體則可矣要之以天下公議而為朝廷之逺慮則非也臣職在諫列義難緘黙輙冒誅譴再申前論惟陛下察焉臣聞御史之任紀綱所繫而中丞者又為肅政之長固宜正身率下以厲風俗而宗愈貪冒不法以至興訟奸邪之人方為之㳺說曰此非大惡何足以罷執政是乃朋黨之論不可不察也今上自公卿下至匹夫粗能以亷恥自好者豈肯税人之居不給其直況宗愈身備從官職任憲長而貪鄙之行過於閭巷之人玷辱國體無大於此錢勰之在開封常以不畏强禦為己任及周知哲陳訴則抑而不行茍非憚宗愈之權勢忽知哲之柔弱豈容滅裂如此之甚臣竊謂以常人觀之則未至大惡以禮義亷恥而責大臣則宗愈之貪濁錢勰之徇私何可迯於吏議臣既在言路目覩大臣之不法而不加彈劾則是曠職以負陛下今宗愈所犯事状明著臺諫交章置而不問若臣等所言出於誣捃則宜竄黜以明宗愈之無罪茍臣等所論既有實迹朝廷安可曲為容貸以沮天下之公議乎國家設置御史六察本以彈劾有罪今御史舉職事而不得行臣等合論列而不䝉聼如此則諫官御史遂可廢矣諫官御史廢則祖宗之法度朝廷之綱紀復何望哉臣固知論斥大臣非全身保禄之計然自念孤逺小官䝉陛下不次擢用毎思自竭圖報萬分豈謂廟堂之間乃有如宗愈者其奸佞無恥朋邪㒺上臣前後章疏言之已詳非特此不亷之一莭而已也况宗愈竊位以來渉歴半載苐聞昏謬無所建明誠不足以當輔弼之任重朝廷之勢今則邪正並立枉直兩存臣恐忠良解體天下失望惟陛下留神省察為宗社之大計罷免宗愈按劾開封官吏使法之所行自貴者始豈惟臣區區之望寔天下之幸也安世又論曰右臣伏自四月初胡宗愈除尚書右丞臣尋與左司諌韓川於延和殿賜對之日陛下詢問近日差除何如臣與韓川同共奏陳朝廷用人皆協輿望惟是胡宗愈公論以為不當臣又條陳宗愈前後罪状固已詳悉䝉陛下宣諭令且試其所為臣尋復奏以謂朝廷設官從微至著自有等級要須歴試灼見其賢然後舉而加於衆人之上則人無異論宗愈頃在先朝實有可取但自為中丞以後風譽頓減一向奸佞以希大用忽聞除目衆皆驚愕盖執政之官陛下所與朝夕圖議天下之事若謀謨獻替動皆中理固為盡善有一差失天下猶将有受其弊者以此論之執政豈是試人之地陛下雖以臣言為然重廢已行之命未賜俞允自後臣等累進章疏皆未覩指揮施行臣非不知進退大臣務全禮體而宗愈自登用以來醜迹日著人言沸騰不可弭塞皆謂徳性傾邪為行險薄利口足以飾詐無恥足以為惡臣請畧舉其近事之顯著者而極論之惟陛下留神而詳覽焉臣聞御史之職號為雄峻上自宰相下及百僚茍有非違皆得糾劾是以祖宗之制凡現任執政曾經薦舉之人皆不許用為臺官盖欲其彈撃之際無所顧避而得盡公議也且被舉之人猶不得任以御史況於姻戚而可為之乎臣聞宗愈之姪女適呂公著之親孫昨除御史中丞乃是公著秉政之日自合援據故事以祈引避而宗愈茍悦權勢而無一語自陳㒺上貪榮堕廢祖宗之法其事一也宗愈向縁蔡確引用為都司郎官曾未席暖驟遷要近確與章惇後以罪黜今春遽用常例復其職名臺諫交章疏其巨惡遂得進寝而宗愈備位憲長坐無一言隂結奸豪徼幸異日操心不忠阿私下比其事二也宗愈既備從官未嘗進賢以報國而首薦其妻族丁騭乞充臺省之選臣在諫垣騭相接觀其議論庸淺無可稱者而宗愈匿其私親輙形公薦幸朝廷之不察以盜寵禄而自為恩恵挾詐欺君無所畏憚其事三也宗愈嘗薦布衣方坰可應制科臣聞坰素無士行而進卷文理荒踈最為亡状宗愈權翰林學士日適當詳定曲欲成就不復避嫌妄以坰文置在第二中書舎人劉攽等不敢異論但聞退有後言輕忽同寮徇私自任其事四也李慎由乃文彦博之孫壻方謁權貴欲求在京差遣而宗愈遽薦為御史臺主簿奏章再上偶以礙格報罷自來本臺辟舉未有敢私執政之親者而宗愈意在附會堕紊臺綱其事五也陛下踐阼之初太皇太后陛下同朝聼政而蘇軾撰試館職䇿題乃引王莽依附元后傾覆漢室之事以為問目議者莫不罪軾非所宜言臺諫官亦嘗論奏而宗愈不惟無所彈劾又止同列使勿上疏背公死黨其事六也宗愈税周知哲之第毎月僦直一十八千自去年七月後至今年二月終止償兩月之直遂至本主經官陳訴乞差人追索及發遣起離宗愈居風憲之長素稱高貲固非不足於財而税人之居不給其直其挾勢貪黷不修亷莭其事七也永興軍路提刑馮如晦欲令舊不充役貧下之家出錢以助合役之上戸不量緩急閒劇色役一例雇募㳺手充代其論議乖謬最害役法而蘇轍頗主其説亟為公移欲頒諸路户部尚書李常曾不講究遽欲行下而員外郎劉昱乃能力辨是非不為押檢議既不合事遂中輟縉紳之間莫不嘉昱能守其職而宗愈因上雇募衙前之議遂詆劉昱以謂户部郎官有近來參詳立法之人䕶短遂非不肯公心捨已從長以救鄉户之患意在阿黨不顧義理其事八也臣伏覩治平以前執政子弟未嘗敢授在京華要之職雖有合得陳乞差遣亦止是數處閑慢監當局務惟自近嵗以來大臣營私害公子弟親戚布滿要津與孤寒之士馳騖争進而宗愈久為執法既不能糾核開陳及䝉大用首擢其弟宗炎為開封推官貪權赴勢不恤人言其事九也宗愈姊妹三人並適富民皆以孀婦宗愈數令析夫之産既而誘説厥妹隂取貲貨遂作己户廣置田業欺誑孤幼終不償還因致髙貲雄視閭里殖利無親其事十也仁宗朝宰相富弼方正謹厚能守法度而御史中丞韓絳言弼與張茂實皆有異謀韓琦當國兩膺顧命忠義亮直聞於天下而王陶奏其䟦扈士無賢愚皆知決無是事而二人者不復自辨即日歸第抗章待罪盖事之虚實自有公議而大臣之體不得不然也今宗愈以不償房緡事為御史臺所劾皆有實迹而意氣軒驁若無所睹陵蔑風憲不畏國法近世公卿大臣毁滅亷恥不知禮義無甚於此其事十一也熈寜中方變法令宗愈時為諫垣不能别白是非開悟明主而觀望迎合多持兩可之論神宗皇帝深照其奸乃手詔中書曰宗愈自領言職未嘗存心禆補朝廷治道凡進對論事必潜伏奸意含其事情旁為邪説以私託公坐是落職與外任差遣臣竊謂先帝察見宗愈之本心是以詔辭盡其情状乃今觀之無不切中其事十二也臣之所陳皆可覆騐伏乞陛下出臣此章宣示百官若宗愈委無如此罪惡則臣之所奏是為欺天宜伏重誅以戒誣㒺臣自齰舌不敢有辭若宗愈所為如臣之論則是奸邪朋黨貪鄙庸淺豈可塵汙廊廟與聞機政臣竊計陛下所以依違不決者得非謂人言其奸邪而未嘗親見其實状乎夫小人之事君豈肯自謂奸邪者哉言必假公忠行必託亷潔多為可信以惑人主之聰明及其嵗月滋深權勢在已上下膠固羽翼已成於是肆志窮奸靡所不至方此之時雖欲除之亦無及矣唐惪宗嘗曰衆人皆知盧把奸邪朕何不知李勉對曰盧把奸邪天下皆知獨陛下不知此所以為奸邪也今之宗愈何以異此臣聞知人之道自古為難方堯之時四凶與諸賢雜處於朝而終無累於堯之明者盖聞其才則用之不敢遺見其罪則去之不敢庇進退用舍一本於至公而無私於其間此堯所以享無窮之名而後世為不可及也願陛下以帝堯之去四凶為法以惪宗之信盧把為戒改過不吝去邪勿疑罷免宗愈以慰天下忠臣義士之望臣言雖拙直義在愛君惟陛下恕其狂愚察其誠懇早賜睿斷不勝幸甚歴代名臣奏議卷一百七十七
