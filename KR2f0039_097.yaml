body:
  text: 歴代名臣奏議卷九十七明楊士竒等撰經國宋光宗紹熈四年司農寺主簿吕祖儉奏曰臣聞天下之勢未有乆安而不動之理而治忽安危之幾每伏於暇豫無事之時此繇昔及今事理之必然人主不可不加察者恭惟藝祖皇帝肇造區夏以來累聖相承嚴恭寅畏不敢自暇自逸有以極夫祈天永命之功故天下晏然百年無事自王安石用事變亂祖宗法度天下㡬於動揺元祐諸臣戮力扶持而天命人心始復安固章惇蔡京又傅會安石之說窮極姦慝蠧國害民稔成靖康莫大之禍陽九所遭至是蓋百有六十年矣髙宗皇帝一馬渡江中興大業雖易動難安之勢於是乎復平然勢有所屈而大義未伸舉是憂責以畀付夀皇聖帝夀皇憤讐耻之未報宵旰圖治思欲昭荅天人之心而倦於憂勤復以是憂責屬之陛下此正昔人所謂憂責在身不暇盡樂之時然臣究觀當今之世上下耽於逸豫以晏安江沱為當然而謂敵人聘問往來我得多筭浸忘事理之真實曽不思夫六飛駐蹕行都將七十載我之於敵終難兩立而王業恐終難偏安執政任事之臣玩嵗愒日習矣不察浮論日勝而實理不明彌文日増而實事不治國勢弗壮人心易揺近者如瀘南之報士卒賊殺帥臣幾成禍變四方傳聞殊駭觀聽陵夷之漸可為寒心陛下日視昕朝詳延兼聽豈不加察乎此然事理真實則為乆安之勢所推移虚美熏心易忘儆懼至於憂責所在反以為迂緩不切而安於不為臣恐天下之勢未必能常然儻或事變稍加於前則陛下之焦勞將有不容釋者矣此臣所以夙夜憂歎願陛下逺覽獨觀思有以持其勢而毋有所易也夫靖康之事人神之憤未解葢當今憂責之大者也臣嘗竊因父兄耆舊之所傳說以推斯時之變故葢憯於西晉永嘉之時二聖北狩之禍誠臣子所不忍言乃若宗室貴戚六宫嬪御死亡係纍其寃憤之氣則未易遽弭中原赤子肝腦塗地而存者復陷於敵人輿地之圖不登職方之籍者又三分而有其二雖我髙宗再造丕基然航海避敵于越于明于台于温險阻難難莫不備嘗則葢曠古之所未有也陛下聖性髙明靜而思之是果可以一朝居乎是果可以逺而忘之乎茍聖念真及乎此積其精誠罔有所間自強不息與天同功則志向定而大義明所謂憂患在身若緩而不切者誠吾家事豈容安於不為明詔二三大臣同其憂責必灼知屈已交敵之為權計蹔駐東南之非永圗益求忠實明智之士列于庶位以圖維内修外攘之實事共致祈天永命之極功俾内外上下革心易慮皆知不共戴天之義捨夫頽惰舊習為所當為而無暇乎其他則百志皆熈事業自著而更化善治之規模惟陛下所以詔之儻為不然嵗推月移大義昏蔽彌文浮論浸失夲真祇見其可喜而不慮其可憂廼欲以江左一偏之地與敵持乆則區區之深憂葢未易知其所終矣臣世受國恩莫能補報發言狂瞽罪當萬死惟陛下裁赦寧宗時張浚楚州回奏曰臣伏奉今月十八日午時親筆處分臣已恭禀聖訓王之望等言泗州利害所當講明今欲且令謹守俟至秋初專責主事者俾權歸於一聖諭切當事機臣見遵依施行向北斥堠縁馬軍極少差使不敷泗上地勢平坦恐歩卒當彼馬騎不能遽還近陳敏等建議欲於臨淮縣築堡屯歩兵三百人為斥堠庶幾緩急可以相應臣見審度措置又舟檝尚少誠如聖慮臣見委劉寳打造一百隻委運使黄仁榮應副材料工匠臣望陛下因宰執奏事宣諭令仁榮一到鎭江躬親應副臣見别具奏聞次他日舟船既辦分差忠勇軍駕放自不闕人毎舟以強弓弩手二十人載其上施放火箭足可禦敵伏乞睿照臣伏䝉聖訓諸將見和議成與不成之間語言反覆此正中其病臣即以宣示劉寳呉超劉光時范榮等莫不悚懼知愧然而以臣觀之將帥難得英偉之才況人情之常不免觀望以此語言不一理當戒敕惟陛下示以好惡明正表儀俾各悉心奉公不求偷合茍容以報國家夫死者人之所難陛下以天下為念不肯自求一已之安表而率之猶恐習成舊態各不盡力矧夫朝廷上下導之以和孰不捨難就易以幸一日安全也此是社稷大計在陛下為重在羣臣為輕自非陛下毅然獨斷與天同心申之以號令齊之以賞罰舉天下之大制命在我誰為陛下出力者至於挺身任事盡節向前一有差跌則衆口交攻禍患不測而以貲結託平生畏避碌碌度日者例獲大官且無後悔茲望陛下深察必使賞罰之間上當天心下合人情即後來諸將易於遣使伏望陛下更致聖思幸甚臣又伏䝉聖諭敵人八九月之間必竭力而來在陛下以社稷宗廟之重理宜過為之備臣聞太公佐周以伐紂伊尹相湯以伐桀彼皆深通天人之際審桀紂之無道知其民之思治有所不動動無不成又況湯武之君徳修于己而二臣用心上達於天計䇿圖謀若有神相葢非偶然也臣學識駑下揆事度變安足以望前賢萬一臣竊觀金政不綱内亂再世中外騷然禍患必起而臣所憂有大焉者今風俗習成上下相蒙惟知富貴不知有他上違天理下虧臣節此風不改借使金人已亡内患外變且將相仍而起矣而其責實在陛下臣願陛下正心修已急收人才以應天心以活萬姓必使事事誠實感格天人聖徳日新兵革自息理之決然更無可疑詩曰鼔鐘于宫聲聞于外惟陛下敬之謹之天下幸甚葉適上奏曰臣聞欲明大義當求公心欲圖大事當立定論自獻者追忿自安者忘讎非公心也勇者惟欲進怯者惟欲止非定論也善為國者務實而不務虚擇福而不擇禍條目先定而始末不差斯所謂公心矣措已於安而制敵之危斯所謂定論矣臣恭惟陛下將明大義以報國仇此其所圖葢不為小臣實至愚不敢自謂有公心定論者然受恩深厚中夕數起故欲輒陳前語庶幾仰賛聖志之萬一言踈計拙無所取材臣罪大矣雖然條目先定非空談也措已於安非姑息也今或謂業既已爾儻試一決或謂且可收拾但循舊貫二論相持臣恐坐糜嵗月古人愛日豈應如此臣願陛下先定條目之所當出者而髙拱於至安之地然後責任羣力課功計效一事一物皆歸大原藩墻固疆圉實我既樂奮彼將倒戈戰勝而無後憂地得而可長守此天地之心祖宗之靈所以望陛下也適又上奏曰臣聞甘弱而幸安者衰改弱以就強者興陛下申命大臣先慮預筭思報積耻規恢祖業葢欲改弱以就強臣宿有志願中夜感發竊謂必先審知今日強弱之勢而定其論論定而後脩實政行實徳如此則弱果可變而為強非有難也臣將博陳極論而事濶語長誠恐乆留天聽臣每念契丹累世大國也女真乃以數千人挺闘而天祚無戰不北遂至於亡以勢而言當是時我疑若可以分功者然終不得一逞而蘆溝之役累世軍實皆殱焉何至此哉又況西兵我之勁卒也方臘猝叛聲揺汴都諸將提偏師俘臘無遺種矣渡江以後扈衛艱難誅剪盜賊大扺西兵西將之餘也夫契丹以燕遼全盛之力而滅於女真崛起之兵我以闗陜驍悍之師而敗於契丹垂盡之將然則宣和強弱之勢斯可識矣自是以來京師則陷中原則失維揚則渡江會稽則航海十年之間未有能與女真抗者也其後敵與逆臣劉豫迫我不已激而思應於是我始能勝於大儀又勝於李家灣又勝於順昌柘臯而敵始與我定和矣金亮敗於采石而我始能以敵國自立矣夫敵以敗殞而後和雖和而猶不失為雄我以應乆而後勝雖勝而猶不敢盡用然則紹興隆興強弱之勢又可驗矣今欲改弱以就強移迫動應乆之兵而為問罪驟興之舉作東南幸安之氣而摧女真素銳之鋒此至大至重事也誠宜深謀誠宜熟慮宜百前而不慴不宜一卻而不收故必備成而後動守定而後戰今或謂敵已衰弱敵有天變敵有外患怵輕勇試進之計用麤武直上之策姑開先釁不懼後艱求宣和之所不能為紹興隆興之所不敢此至險至危事也臣願陛下先定其論論定而後修實政行實徳變弱為強誠無難者在所施設如何爾適又上奏曰臣所謂備成而後動守定而後戰者臣伏覩建炎紹興渡江之後非不欲固守兩淮襄漢而金人衝突無常勢不暇及既議和好則收兵撤戍已有定約又不敢謀故淮漢千餘里常蕩然不自保也今雖分兵就邉稍圖外向然我既能徃彼必能來是時淮漢守偹不全倉猝不過移治而專倚大軍迎敵勝負不可知要必扼江而後止如此則徃者未足以係西北之望而來者已足以揺東南之心矣本期外攘豈願内擾萬一揺動將何頼焉故臣欲經營瀕海㳂漢諸郡各做家計牢實自守敵雖擁衆而至阻於堅城彼此策應首尾相接藩墻禦扞堂奥不動然後進取之計可言矣此臣所謂改弱就強實政之一也四處御前大兵國家倚以為命嵗費緡錢數千萬米斛數百萬東南財力盡矣譬如亭子所賴四楹一楹有闕累及三陲無獨全者臣慮其間統副將校人馬器甲營伍隊陣進戰退守必然未能一一皆是若今所委付果已得人尤宜曉夕用心事事警䇿件件理會若其未當則利害甚多伏乞陛下審之重之此兵幾三十萬未可便望一可當十十可當百但一人真有一人之用淮漢能守此兵能戰數年之内制敵有餘此臣所謂改弱就強實政之二也圖此大事莫先人材陛下比年首以大義倡率而在廷之臣和者極寡此未必皆怯懦首䑕不肯任責也亦由積安之乆素所不習耳聞目見茫然生踈昔宇文粹中論京城守具白時中自謂事非經歴則不知而況兩陣決機有大於此乎今天下亦非無智意材力願得自効若淮漢千里果當固守四處大軍果當精練四方之才隨其大小宜付一職使之觀事揆䇿以身嘗試習熟漸乆方能捨燕安而樂麤澁易脆腐而為堅強勁敵在前行者思奮此臣所謂改弱就強實政之三也至於朝廷之上封域之内綱紀法度號令賞罰黜虚從實條目至煩然茍先是三者則其餘可次第舉矣適又上奏曰臣所謂行實徳者臣竊觀仁宗英宗號極盛之世而不能得志於西北二方葢以増兵既多經費困乏寧自屈已不敢病民也王安石大挈利柄封樁之錢所在充滿紹聖元符間拓地進築而斂不及民熈豐舊人矜伐其美然陳瓘譏切曽布以為轉天下之積耗之西邉邦本自此撥矣於是蔡京變茶鹽法括地寳走商賈所得五千萬内窮奢侈外熾兵革宣和之後方臘甫平理傷殘之地則七色始立燕雲乍復急新邉之用而免夫又興自是以來羽檄交警増取之目大者十數而東南之賦遂以八千萬緡為額焉多財本以富國財既多而國愈貧加賦本以就事賦既加而事愈散然則英主身濟非常之業豈以貨財多少為拘近者國用置司偶當警飭武偹之際外人但見立式太細鈎校甚詳不能無疑謂將復取臣獨以為不然何者名實不欺用度有紀式寛民力永底阜康此詔書也兩浙鹽丁既盡免矣方以寛民而何至於復取乎參考内外財賦所入經費所出一切會計而総覈之其理固當然臣謂國家之體當先論其所入所入或悖足以殃民則所出非經其為蠧國審矣今經縂制月樁青草折估等錢雖稍已減損猶患太重趂辦甚難而和買折帛之𩔖民間至有用田租一半以上輸納者貪官暴吏展轉科折民既窮極而州縣亦不可為矣以此自保懼無善後之計況欲規恢宜有大賚之澤伏乞陛下特詔大臣使國用司詳議審度何名之賦害民最甚何等横費裁節宜先減所入之額定所出之費不須對補便可蠲除小民蒙自活之利疲俗有寛息之費陛下修實政於上而又行實徳於下和氣融浹善頌流聞此其所以能屢戰而不屈必勝而無敗者也改弱以就強孰大於此凡此皆其大要而已陛下不以臣為愚且迂敢不自竭而詳陳焉起居舎人真徳秀奏曰臣不佞蒙陛下擢司記注日侍天光在庶僚中最為親近每惟報國之誼無若效忠而緘黙不言臣實有辠今將以便親求郡行去闕庭敢不亟陳其愚冀補萬一臣竊聞女真以達靼侵陵徙都于汴此吾國之至憂也盖達靼之圖滅女真猶獵師之志在得鹿鹿之所走獵必從之既能越三闗之阻以攻燕豈不能絶黄河一帶之水以趨汴臣恐秋風一生梁宋之郊已為戰場矣使達靼遂能如劉聦石勒之盜有中原則疆埸相望便為鄰國固非我之利也或如耶律徳光之不能即安中土則姦雄必將投隙而取之尤非我之福也今當乗敵之將亡而亟圖自立之策乎抑幸敵之未亡而姑為自安之計乎夫用忠賢修政事屈羣䇿收衆心者自立之本也訓兵戎擇將帥繕城池飭戍守者自立之具也以忍耻和戎為福以息兵忘戰為常積安邊之金繒飾行人之玉帛女真尚存則用之於女真強敵更生則施之於強敵此茍安之計也陛下以自立為規模則國埶日張人心日奮雖強敵驟興不能為我患陛下以茍安為志向則國埶日削人心日媮雖金人僅存不能無外憂昔者孔子誦鴟鴞之詩以為知道聞滄浪之歌則使小子聽之盖安危存亡皆所自取若夫當事變方興之日而示人以可侮之形是堂上召兵而户内延敵也㣲臣區區竊所深慮敢僭為陛下陳之古者一士止百萬之師一賢制千里之難季梁在而隨不可伐宫竒存而虞不可欺今濟濟周行號為多士然漢儒所謂骨鯁耆艾論議動衆心憂國如飢渴者既難其人間有意見小異則已成枘鑿論議小激則目以譸張豈以朝廷之上所少者非此耶夫平居工文墨便刀筆名儒宿望或所不能至於正色而沮姦萌立談而斷大事不以利害為遷就不以招麾為去來則又非小有才者所能辦惟陛下以尊君重朝為心合天下正人以自助毋間同異毋徇愛憎則鼎足之埶成金城之守固折衝厭難孰大於斯臣故曰用忠賢為自立之本也昔勾踐之棲于會稽也飲食不致味聽樂不盡聲内則脩令寛刑振貧弔死折節下士而厚禮賔客外則具車馬兵甲而與三軍共饑勞之疲凡可以報呉者無不為而非可以報呉者不暇為也國家南渡駐蹕海隅何異越棲會稽之日宗廟宫室本不應過飾禮樂文物本不應告備惟當養民撫士一意復讐而秦檜乃以議和移奪上心粉飾太平沮鑠士氣今日行某典禮明日賀某祥瑞士馬銷亡而不問干戈頓敝而不修士大夫豢於錢塘湖山歌舞之娯無復故都黍離麥秀之嘆此檜之罪所為上通於天而不可贖也今豺虎鬬於中原狐狸嘷於境上危機交急不同常時臣願削去虚文顓行實政百司庶府輪奐一新矣繼自今繕營不急之役姑輟焉可也簿書期會之事整理有緒矣繼自今常程瑣細之務付之有司可也陛下日旰眂朝惟大政是議輔臣夙宵盡瘁惟大計是圖則勾踐之功可尋而中興之烈可冀矣臣故曰修政事為自立之本也昔漢有邉鄙大疑必使羣臣雜議季布得以中郎將而折列侯噲狄山得以博士而詰御史大夫湯北匈奴來求和親光武既從皇太子言卻其使矣而班彪乃以不宜絶北為言是一司徒掾而敢與太子異議也豈非國家大事臣子皆當盡言故耶我朝熈寧中契丹來議地界時王安石當國神宗乃以問韓琦富弼元祐初夏人遣使納欵時司馬光為相哲宗乃以問大防純仁髙宗中興内外尤為倥偬然無一事不采人言建炎四年嘗議防秋矣紹興初元嘗議便民弭盜矣五年則令前宰執各陳禦寇之策矣八年則令侍從臺諫各上講和利害矣夫祖宗之明非不知獨運專斷為神顧以廣謀從衆為得者凡以盡天下之心而建乆長之䇿也今事會之來日新未已臣願誕頒明詔以敵徙而南浸廹吾圉凡厥有位其各盡言然後博米衆長按為定論書曰好問則裕自用則小命諸大夫各以情告無阿孤者勾踐之所以覇諸有忠慮於國但勤攻已之闕者諸葛亮之所以賢惟陛下以勾踐為心大臣以武侯為法則事無不集矣臣故曰屈羣䇿為自立之本也國之元氣在於人心元氣充則外邪卻人心固則外患銷天地常經斷斷不易陛下亦嘗察近日人心之舒戚乎向者弊法新改令出加嚴雖大為防禁以示民非欲峻刑名而繩下而刺舉之官承迎過當奏劾來上𩔖多中以深文使追褫者未聞牽復之期貶竄者尚隔維新之望薦紳之論疇不咨嗟臣願明勅有司原情差次稍從釋免以收士大夫之心厥今州郡監司莫非材選然平易中和之政少而操切擊斷之意多以理財自詭則征利宻於秋毫以行令自媒則用刑深於刺骨夫我朝立國本尚寛仁以此毒民懼者衆矣臣願選用循良退斥貪暴布宣徳意洗滌瘡痍以收百姓之心君人之柄惟器與名當靳而予則僥倖者生心宜予而靳則勞能者觖望頃縁軍賞多濫一切難以㣲文雖懲偽所以别真而矯枉亦虞過直今邉候孔棘正牢籠武勇之秋臣謂荆襄兩淮之人嘗以功績著見為衆所推者宜命帥守監司搜揚來上擇其尤異者數人不次擢用自餘悉下銓曹審其來歴茍非妄冒者悉與隨資注擬以收豪傑之心徃者兩淮募兵雖數萬計有如諸軍闕額自可撥𨽻分填而議者以廪給為憂急於汰遣方其例與緡錢資之使去小人寡慮媮快一時貲用既空束手無策強者遁藏山澤伺時而為姦懦者丐乞道塗偷生而就盡夫急則望其效死緩則委棄弗圖後復使人疇肯用命今宜擇其伉健收寘戎行非惟增壮軍容潛弭姦慝亦以收忠義之心自丙寅之役淮民流離有司振卹失時死亡畧盡雖展上供貸常賦而凋殘未復生聚絶稀比聞州縣科役頗繁田賦雖蠲撮課仍重民兵團結衣装弓弩責其自備教閱資糧令其自齎呻吟之餘何以堪此臣願朝廷深念保障之重多方優卹俾獲蘇醒以收邊甿之心北境遺黎本吾赤子日夕南望如慕慈親彼既襁負而來焉有可拒之理竊聞疆吏便文塞責至以鋒鏑驅之既絶其向生之途是激其等死之忿又聞秦隴之間有相率内附者自湼其面示無還心視昔八字之軍何異而入南不受歸北不可獸窮則搏勢有必然臣恐欲以靖邊祇以擾邊將以無事適為多事也臣聞古之有國者患民之不附而不患民之加多孟子曰為湯武敺民者桀與紂也今天下之君有好仁者諸侯皆為之敺矣今中華之民窮而歸我是女真為吾之鸇獺也其忍不為茂林深淵以受之耶羊祜祖逖之事淺矣然能務脩徳信撫納新附故呉人恱服晉土復歸況堂堂鉅宋豈無能任二子之事者誠能謹擇其人分鎮三邊務以恩信懐柔而使逺人忻慕民既我附土將焉歸恢拓之基實在於此臣願朝廷亟加之意以收中原赤子之心夫得天下有道得其民斯得天下矣得其民有道得其心斯得民矣陛下誠能内有以保吾國之民則外有以懷鄰國之民以守則固以戰則克矣臣故曰收衆心為自立之本也抑臣又聞有自立之本有自立之具今連營列戍虚籍不填老弱溷淆教閱弛廢衣廪朘削憔悴無聊荆淮所恃者義勇民丁而團結什伍反成繹騷無以作其超距翹闗之勇東南所長者舟師戰櫂而繪畫圖册徒事美觀而未嘗習以淩波破浪之技倘非痛掃弊端一新戎政則緩急將無可用之兵掊斂成風而士卒之怨弗卹忌克成習而偏裨之長莫伸或抜於奔北而威望不足服人或相為水火而用心莫能協一公朝苞苴之路絶而别通交結之途田宅子女之欲盈而外竊㢘潔之譽倘非博采衆言精加蒐擇則緩急必無可用之將昔李綱建議以為欲保江南當葺理淮襄以為家計夫荆襄形勝臣固習聞而兩淮利病則尤所深悉葢軍國所資莫如鹽茶而淮有鬻海之饒兵食所仰莫如屯田而淮有沃壄之利其齊民則天性健鬭每易視敵兵其豪民則氣槩相先能鳩集壮勇使范蠡諸葛亮輩得而用之力本以務農教民以習戰雖方行天下可也其肯委之為不足守之地哉中興之初志在進取故不暇脩營講和之後束於要盟又不克經理然孝宗皇帝所以設扞防闢空曠者未嘗不留聖心竊惟今日實南渡以來所未有之時政當乘機自立繼孝宗所欲為之志夫髙城深池勁兵重戍邊之大命也今淮東要害在清河之口敵之糧道實出於兹而淮隂無尋丈之城無尺寸之兵徒以山陽可恃而已然山陽雖大前無淮隂之蔽後無寳應之援若敵以重兵遮前而竒兵斷後則髙郵維揚之路絶而山陽之形孤山陽不守則通泰危而江淛震矣淮西要害在渦潁之口敵之糧道亦自此出而濠梁安豐城則庳薄池則堙狹兵則單虚徒以廬和可恃而已然有安豐之屏扞則敵始不得以犯合肥有濠梁之遮蔽則敵始不得以走歴陽藉有它徑可由而吾之廬和當前而濠壽斷後則彼有腹背之虞我有掎角之助其能長驅深入蕩無所畏乎故欲固兩淮先防三口此非臣之臆說也昔孫氏之保江左邾城雖小猶屯三萬人今維揚合肥兩淮之根本而兵數單弱不及孫氏一邾城故李綱嘗謂大將擁重兵於江南官吏守空城於江北以為非䇿臣謂今日當議徙江上之屯以壮淮甸之勢或謂果爾如江靣何夫兩淮藩籬也大江門户也藩籬壮則盜賊無闖門之慮兩淮固則戎馬無飲江之憂第當精閱舟師布列津要則表裏相應屹如金湯其與區區坐守江壖而使賀若弼之徒得以經營飛渡者利害何翅什伯哉雖然此不足煩聖慮也古之為國者必有重臣以當閫外之寄故蜀以孔明駐漢中呉以陸遜守荆渚皆付以事權不從中御故二人者得以乘機制變而收成功今江陵建業雖有制閫之名而實處内地邉陲機事多不即知至於小有措置必皆聽命于朝有請輒從尚云可也請而弗獲抑又多焉藉有異材何由展布因循誤事可為深憂臣願於近臣中擇其更事任熟軍情威望素孚文武兼偹者二人一於襄漢一於兩淮之中建立幙府財許移用官許辟置其他悉如呉蜀任二臣故事則荆淮之家計可成而朝廷之憂顧可釋此陛下所當亟圖而不可忽也或曰彼方紛拏我幸無事但求鎮静焉用張皇臣竊以為不然夫自古未嘗無外患惟有以待之則不敢窺未嘗無姦雄惟有以折之則不敢肆今不於斯時大有所振立萬一更生虎狼之敵知吾易與潛啟桀心當是時也不知安邊金繒行人玉帛可以窒其無饜之欲乎夫古今之患非一而蔽䝉為甚昔范仲淹嘗謂時方用兵不當諱言邊事今朝廷若以張皇為戒臣下希指雖有警急不敢上聞本惡張皇廼成蒙蔽昔雲南䘮師反以㨗告原其積漸不過如斯盛明之朝可不鑑此臣本迂踈豈應妄論大事然惟臣子之誼有懐弗盡不足為忠是以冒昧決於一言區區愛君之心惟聖明裁察貼黄臣竊惟汴都者我祖宗開基建國立郊社宗廟正南靣朝羣臣而八蠻六狄奉琛臣妾之地也今偏方逺域之人廼得竊而居之伏惟陛下赫然發憤思列聖所以得之守之之繇考宣和靖康所以失之之故臣竊謂其得之守之也莫不由於用君子其失之也莫不由於用小人臣願深惟否泰之象致察於君子小人消長之間則王業之隆有日矣臣竊惟敵既以移都來告索幣之報必將踵來其在朝廷尤宜審處以臣愚慮茍能顯行止絶以其貨幣頒犒諸軍繕脩戎偹于以激士心而褫敵氣此上䇿也命疆吏移文與議削比年増添之數還隆興裁減之舊此中䇿也彼求我與一切如初非特下䇿幾無䇿矣蓋今逺裔羣盜交馳中土安知無善謀者覘吾舉措必將曰女真彼之深仇亡在旦暮且奉之唯謹它日乗戰勝之威為虚辭以恐動將何求而弗獲耶此召侮之端致寇之本也惟陛下超然逺覽而銷患於未形宗社幸甚徳秀為江東轉運副使上奏曰臣愚不肖蒙恩備使一路遂將逺穆穆之光竊伏惟念人臣之義雖在窮約猶不忘君況嘗以載筆之史乆直禁廬今雖將指有行而憂國念君之忠其敢以既去遂已謹復深惟當世之故而願獻其區區惟陛下幸察其一曰宗社之耻不可忘臣嘗觀古之人主於仇讎怨敵之國有勢未能報而姑事之者有勢雖不敵而不事之者有勢可以勝而遂報之者有勢可以報而反助之者昔太王之於狄也事之以皮幣事之以犬馬事之以珠玉凡其所欲悉以畀之盖是時狄強而周弱畏天保國其道當然故孟子曰唯智者為能以小事大然狄之於周特一時之怨非百世之讎含垢包荒義未為失此所謂勢未能報而姑事之者也西晉懐愍二帝俱沒於劉聦元帝間闗南渡立國日淺外宼方熾内難復興故終其身未遑北討然一介行李未嘗聘虜廷成帝時石勒來脩好詔焚其幣此所謂勢雖不敵而不事之者也勾踐會稽之辱舉國以臣妾於呉而能苦身焦思折節下士與百姓共其勞人事既修天應亦至呉之稻蟹不遺種矣而夫差方觀兵中土與晉會于黄池勾踐得以乘間舉兵遂墟其國此所謂勢可以勝而遂報之者也晉孝武時苻堅聚百萬之師志吞呉會賴謝𤣥等大破之淮淝堅既狼狽西歸其子丕復與慕容垂相持於鄴使晉之君臣有志經略乘機席卷殆不其難而謝𤣥方且從丕之請遣兵以救其窮餽米以濟其饑舍苻氏之深讎與慕容而為敵未幾劉牢之等為垂所敗秦既不祀晉亦以衰此所謂勢可以報而反助之者也臣竊惟國家之於金人葢萬世必報之讎髙宗孝宗值其方彊不得已以太王自處而以勾踐之事望後人今天亡此敵近在期夕旱蝗頻年赤地千里甚於夫差之時韃靼羣盜四靣交攻無異苻秦之季天其或者付陛下以有為之會乎臣嘗熟思待敵之䇿其别有三練兵選將直𢷬敵巢若勾踐襲呉之師此上䇿也按兵堅壘内固吾圉止使留幣外絶邦交若晉氏之不與敵和而鑒其宴安江沱之失此中䇿也以救災卹鄰之常禮施之於茹肝渉血之深仇若謝𤣥之助苻丕此下䇿也用上䇿則大義明混一之機也用中䇿則大計立安強之兆也用下䇿則大勢去阽危之漸也臣不知今日之廟謨其將安出乎顧更化以來生聚教訓未有勾踐十年之功固未可遽圖一戰之勝於傳有之攻不足者守有餘夫以堂堂大邦地方萬里誠能以待敵之禮而遇天下之豪傑以遺敵之費而厲天下之甲兵人心奮張士氣自倍何憚於此敵而猶事之哉若乃輕信邊臣迎合之言援敵人於將亡置世讎而不念非惟忠臣義士沮氣解體而方興之敵亦將有輕中國心萬一貽書誚侮我將何詞以應之夫重於絶敵者畏召怨而啓釁也然能不召怨於金人而不能不啟釁於新敵權其利害孰重孰輕故臣願陛下勉勾踐之良圖懲謝𤣥之失䇿則王業興隆可冀矣其二曰比鄰之盜不可輕今之論韃靼者𩔖曰逺裔小姓非有囊括并吞之志其論山東之盜者亦曰蕞爾姦孽不過䑕竊狗偷之謀抑不思劉石苻姚之興大抵皆出荒裔全齊十二之險昔人用之嘗以覇強況今中原士民倀倀無主使盜亦有道則衆將從之茍得志而鄰於吾莫大之憂也迺者偽使之來輕舟浮海不十日而抵邊城舍舟登岸人無知者安知不以是覘吾之虚實乎臣願朝廷毋輕二方日夜講求攻守之䇿以逆杜窺覬之心自治之方無急於此其三曰幸安之謀不可恃今之議者大抵以敵存亡為我欣戚聞危蹙之報則冀其非實得安静之耗則幸其必然重以邊臣喜為迎合或曰韃靼許和矣或曰羣盜聽命矣或曰金人還北有日矣誠使敵命少延吾得以因時修偹豈非至願政恐奔竄敗亡之餘勢必不乆皇皇鉅宋初非小弱顧乃藉彼以為安是猶以朽壤為垣而望其能障盜賊也臣願陛下勵自強之志恢立武之經毋以敵存為喜毋以敵亡為畏則大埶舉矣其四曰導䛕之言不可聽臣聞天難諶命靡常者伊尹所以訓太甲惟不敬厥徳乃早墜厥命者召公所以戒成王聖賢言天不過如此未聞曰某星躔某舎則其業昌某神居某地則其福應也自嘉定更化以來兵偃嵗豐民稍蘇息此誠聖徳格天之效而溺於數術者猥曰五福太一實臨呉分審如其言則治亂興衰皆有天數無闗君徳豈不悖哉今邊事方殷正君臣戒懼之日而薦紳大夫工為䛕恱或以五福足恃為言夫漢之肇造以寛仁得民而不在五星之聚井晉之郤敵以將相有人而不在嵗星之臨呉矧乾象告愆邇日尤甚其可恃䜟緯不經之說而忽昭昭之儆戒乎惟陛下鑒天人之相因察䛕佞之有害益修其本以格天休宗社之慶也其五曰至公之論不可忽臣聞公論國之元氣也元氣痞隔不可以為人公論堙欝不可以為國祖宗盛時用人立政一揆之衆論而行之以至公故人心恱服天下順治熈寧之世以新法為不可行者公論也王安石違而咈之終以誤國紹興之際以和議為不可恃者公論也秦檜讎而嫉之遺患至今夫朝廷之舉措是而衆亦是之者治世也朝廷之舉措非而衆亦非之者亦治世也朝廷舉措自以為是而衆莫敢議其非此子思所以憂衛之君臣也徃者侂胄弄權以威罰箝天下之口浸滛既乆附和成風北伐一事中外共知其非而莫敢言其效盖可睹矣使侂胄能虚心平聽不以先入為主而惟公論是從則國無加兵之禍已無僇辱之殃豈不美哉間者加命之出外議譁然從臣争之館學争之庠序之士又争之或者未必不以為紛紛多事臣獨曰此十數年來所無之氣象聖君賢相優容涵飬致此盛事豈易得哉夫天下之大本同一家人主者父也大臣者宗子也大夫士者家之衆子弟也至於庶人之賤亦家之陪𨽻也父兄有過子弟争之子弟有過陪𨽻言之葢一家之事休戚實同凡其次第相規政欲共成門户之美耳君臣之義何以異此而自昔惡聞正論者徃徃加以歸過賣直之名夫欲使士大夫畏避此名務為緘黙直易易耳不知臣子至情本為國計何負於君父而顧嫉之耶深惟今日實公論伸屈之機朝廷之上若以言者為愛君為報國無猜忌之意而有聽用之誠則公論自今而愈伸若以言者為沮事為徼名無聽用之誠而有猜忌之意則公論自今而復屈夫公論伸屈乃治亂存亡之所繇分故臣於奏篇之終反復極言忘其重煩天聽之辠詩曰心乎愛矣遐不謂矣惟陛下諒臣愚忠徳秀知隆興府上便民奏曰臣檢准慶元令諸監司守臣到任半年以上各具便民五事聞奏臣猥以駑劣䝉恩擢守豫章實兼江右帥事竊嘗伏念朝廷列置帥臣於諸道以緫統兵戎為職時平無事則欲其建威銷萌震讋姦宄使盜賊不敢竊發壹有警急則整齊一道之衆惟上所使若臂指然非如列郡守臣獨以蔽獄訟治財賦為稱職也臣觀大江之西緜地數千里其北則江州興國控扼江靣實當光黄之衝其南則贑吉南安林峒邃宻跨越三路姦人亡命之所出没自餘郡邑小民亦皆輕悍好鬭殺人于貨之盜在在有之臣嘗妄諭凡任帥職者皆當以治兵為先而帥江右者尤當以治兵為急故自到任以來凡事闗軍政率不敢後然人情蹈常襲故徃徃視為内地語及武偹則哂其不切慮及江靣則指為過憂繕治城堞則曰不必徒費督責將佐則曰毋庸多事獨不思朝廷建牧之意將假以爵秩姑崇帥臣之虚名耶抑將整軍修戎屏翰王室責以帥臣之實職也昔唐曹王臯觀察江西裒兵大選羣能著職遂能挫李希烈之銳使不敢南窺江淮紹興初李綱為本道安撫制置大使整治城郭團結軍伍威聲隠然羣盜相繼敗降如臯如綱始可謂無負朝廷之委寄矣臣雖不材無能為役顧區區平時願忠朝廷盡瘁職業則於二臣之事竊有志焉故今所陳一以治兵選將繕城弭盜為請其間有因本道利害而因及他道者事勢相闗不容不爾伏惟聖朝采擇而施行之一臣聞自昔外有敵國之虞則内必有盜賊之警故諸葛亮與魏相持而孟獲畔瀘南劉裕舉兵北伐而盧循犯建業二者之患常相因而起一於禦外則盜賊得以乘吾之虛而為根本之害一於蔽内則敵國得以伺吾之隙而為疆埸之憂其為患均也然敵國在外所攻者吾之頭目其來也可知盜賊在内所攻者吾之腹脅其發也不可測故亮必先平南方然後經營北討裕能滅燕入秦而幾無以制徐道覆之謀然則盜賊其可忽哉國家南渡以來州郡之兵日以削弱一方有警必移大軍然後剋之往者李金之亂與近嵗贑吉南安之擾皆取辦於此然使疆場無虞則舉備外之兵以平内寇其誰曰不可今邊事方興撤備無日沿江諸軍列戍淮漢以之禦敵猶懼弗給設不幸一妄男子竊弄耰鋤於田畆間沿邉之戍既未可抽回州郡之兵又不足深恃此臣所為朝夕凛凛者也竊嘗思之與其養兵而待以無用孰若教之而責其可用臣所領十一郡有所謂團結禁軍者蓋諸道所不及其法選諸指揮禁軍之彊壯者年若干以下試弓若干斗力弩若干斗力聚為一營命曰團結月增料錢一千合諸郡祖額凡若干人隆興府一千人諸州軍各具實數臣欲稍增其額合一路為一萬二千人隆興府増五百人通為一千五百人諸州軍均添足數日教旬閱責之兵官月按季考責之守貳春秋二校則於團結中擇其年貎浸衰年四十五以上事藝減退者仍還元來軍分而於諸指揮中選少壮人等事藝精熟者補其額及委帥臣不時㸃摘按試以攷兵將官之勤惰其揀選不精教練不熟者案劾以聞守貳不覺察併行責罰如此則一二年間州郡之兵漸趨精勇此弭姦銷萌之要術也然臣愚慮不獨江西一道為然凡在内地皆當思所以為不虞之備如臣言可采乞下諸路一體施行一臣竊考建炎三年金人自黄州渡江由武昌趨興國取間道以犯洪州守臣王子獻遁去遂屠州城尋破撫袁諸郡遍蹂湖之南北然後北歸所至殘暴㡬無噍𩔖言之可為痛心今之議者大抵以江西為内地殊不思九江興國二郡前臨大江北望淮堧纔一水爾中興初江西安撫大使實兼節制蘄黄盖以是也去嵗之春敵犯黄州諸闗江右震動本司承制檄調兵守江倉卒間僅能發諸州禁卒千人以往夫以歩卒守江猶䇿馬使耕驅羊使載其不勝任也必矣臣謂與其緩急調無用之兵以誤事孰若平時養有用之兵以待事江鄂二司各有水軍竊聞邊事既興多作歩人起發今江州在寨僅有見管若干具實數而戰艦可用者尤為無幾鄂司所管計亦類此借曰敵人之勢已非昔比然衰極復振其可忽諸況於外敵方興羣雄交騖先事之防尤當加意臣願明詔江州都統司及本州守臣同任江靣之責其人船闕少之數日下招塡打造以什之三分屯興國管下富池等處庶幾風寒之備不至空闕江右一道恃以無虞所有鄂司水軍併乞一體行下措置亦以什之三分戍武昌縣葢興國江靣元𨽻江司武昌江靣元𨽻鄂司分兵防守正其宜也如臣言可采乞賜詳酌施行一臣竊見江西統郡十一而隆興實為帥府諸郡所倚以為重城郭甲兵之備皆當整飭如法然後足以壮觀瞻而弭窺伺而臣到任之初按視城堞則其緜亙甚濶而傾圮最多尋加訪問有寓居士夫語臣謂五代以前郡城廣狹中度南唐李氏謀遷豫章乃始大其郭堞郡之東湖本在郭外至是遂包入焉紹興初故相李綱為帥盖嘗縮其北靣然其廣袤猶若干里若干歩更契勘見今實若干里歩按守城法當用兵若干人茲豈易為力者今誠能按唐之舊瞰湖為城則城之四靣西北有江其東有湖天設之險殆無以過此豫章百世利也臣竊詳其說可謂至當然縮城重事未敢輕言而圮壞已極則有不容坐視者方李綱繕城之時其工費仰於公朝其役兵調於屬郡時異事殊不敢扳援有請而本府年來調度百出帑庾枵然儻必竢有餘然後興役則夏潦秋霖之餘頽圮益甚㳂江一帶居民岌岌常有渰浸之憂而城脚被齧去處多已摧陷更遭一水其損愈多近委江州鈐轄楊熹相視條具頗為詳悉如砌城靣以防滲漏作荷葉溝以通水道用夜义木以壮城骨皆舊所未有臣今一用其說第工費浩汗未知所出稽諸舊牘前帥臣沈作賔在任日從本府撥到銀若干萬兩付安撫司樁管充犒賞費今不獲已欲於上項銀内權兊借若干千兩收買磚石竹木等物及雇募夫工日下修築却從本府於收到諸色窠名錢内痛加撙節旋次撥還庶幾城堞得以一新少重帥府之體伏乞劄下遵守施行一臣竊惟聖朝計安元元思慮深逺其在諸道既有兵以備戰守又有将以主其兵復置帥以䕶諸将號令素孚紀律素定一旦有警将惟帥之所令兵惟将之所使以之戰禦無不可者自視事以來講求軍政本末乃知州郡禁卒多以供工匠備廝役事藝未嘗練習教閱秪為具文則兵不足以為兵矣有副緫管有路鈐有路分又有州鈐有将副下至都監監押皆以主兵為職而未嘗知兵問其得官之由或宗戚或閤門或國信所或堂部吏其間豈無可用之材要於将畧鮮曾閑習或飾文墨以自喜或矜富貴以自娯甚者闒茸廢放無所不有則将不足以為將矣兵不足以為兵将不足以為將則帥之為帥是亦具貟而已矣望其藩維王室如古之牧伯顧不難哉然兵猶可以閱習而精將不可以强勉而學竊見近嵗指揮緫管路鈐例赴臺參将副以下亦必從帥司銓量乃許之任臣謂此僅可以察其年齒之壮老與精力之強否而已必欲得知兵之人則臣願朝廷嚴其選擇緫管號為副帥間嘗以節度使為之其次路鈐路分亦武臣髙選今之環衛盖将帥之儲及諸軍統制統領等官亦多習熟軍務者臣謂緫管路鈐宜於環衛及統制中選其嘗歴戰陣者為之州鈐将副則取諸統領將副之諳知兵事者都監監押員多不可悉擇姑從舊制差注年未六十之人而責帥臣以從實銓量毋使疾病眊昏者尸其任庶幾州郡主兵之官漸得其人平居精於教閱緩急有所倚仗非小補也或謂審爾則閤門國信之屬何以處之臣曰為官擇人則治為人擇官則亂朝廷儻憂此屬之失職固當置諸寛閒無事之地至於軍政安危所係則不可以不擇如臣言非謬乞賜詳酌施行一欲乞通廣塩於贑州南安軍以弭汀贑塩之害袁燮論蜀奏曰臣不佞去嵗六月八日獲對清光極陳蜀中利害親聆玉音有忠直可見之褒足以仰窺聖心垂意於坤維者如此盖此一方去天萬里安危休戚艱於上達形勢何以聯屬警急何以赴援非其他諸路比也故聖心深慮之敵人敢戰時有侵犯今春大入歴興元至金洋遂至大安我師勦之殆無遺類威聲既震疊矣然敵人之性巧於窺覘萬一乗我少懈奪我江源順流而下聲揺東南将若之何不可不慮也夫藩籬嚴宻彼安得以窺我根本堅壮彼安得以揺我昔孝宗皇帝光臨萬㝢中外敉寧矣而猶切切焉惟蜀是憂輟執政大臣繼踵宣威者至于三四又詔制置司同諸帥臣銓擇兵将庸懦不堪倚仗者而易置之夫宣威之設不於他路而獨於蜀兵将之易置不施之他路而獨施之蜀聖哲之心深知天下安危實繫乎此重此一方所以重國勢也陛下可不繩其祖武而加重於此哉盖今日蜀之急務有六臣請為陛下略陳之夫階成和鳯蜀之垣墉也其地險絶為吾障蔽則闗内諸郡雖不立城壁自然安固焚蕩以來外無垣墉之可恃内無城壁之可依表裏俱虚敵寧不肆其毒乎人情岌岌避難而逃者無復歸志非小故也毋憚大費亟為之圖度僧鬻爵費廣不靳而責成於郡邑視其多寡以為殿最磨以嵗月庶可漸復此其急務一也自古巴蜀號稱多士諸葛亮奮於隆中豪傑歸之如水赴壑勲名煜然先後相望可以今日而無其人乎屬者沔帥察見姦欺立談之間斷此大事此固蜀中之儒英也如此人物搜揚簡㧞推誠而任用之何向不濟此其急務二也自古立國賞必以信況捐軀犯難尤為可念者乎故曰軍賞不踰時欲民速得為善之利也而議者或曰是不宜厚厚則貪功而生事以宋璟不賞邊功為說而不知其時之不同多難之秋正藉其力庸可抑乎大安之戰其功甚偉醲賞以厲其餘誠不為過此其急務三也巴蜀天險民生其間類多勁武勇於戰鬭其天性也然聚而不教與無兵同教而無别與不教同擇其傑異者豐其犒賜養其力精其藝而厲以忠義之節則有勇而知方矣推之田野之間因農隙以習戰若雄邊子弟所以著稱於唐者則民兵亦精矣此其急務四也蜀之境土與羣蠻鄰非我族類未易調伏今金人敢爾慿陵安知蠻之不吾窺乎昔李徳裕之節度劍南也建籌邊樓而圖其形勢復卭峽闗以奪其險阻威望隠然數年之内犬吠不驚其所施設必有深服其心者矣已然之效足以為法此其急務五也蜀本富饒之地自折估之法嚴財益匱民益貧重以金人之擾窮悴無聊何所赴愬所宜選擇良吏撫摩愛養如保赤子如烹小鮮仁民之政務在必行逋負之物蠲以惠下以紓民力以結人心以為手足扞衛頭目之備不亦善乎此其急務六也兼此六者推而廣之則今日之蜀猶往時之蜀也如其不然潰裂四出不可復救矣昔我藝祖肇造區夏先取荆南以通入蜀之路繼取全蜀以圖混一之功宵衣旰食勤苦至矣陛下嗣守丕基可不念當時取蜀之難而思今日保蜀之䇿哉是故國事之可憂者莫如蜀外障之難防者亦莫如蜀何者其地至逺也有才而無識者不足以為蜀帥有勇而無謀者亦不足以為蜀帥何者其任至重也先朝遴選於衆必以張詠之徒為之中興以後呉玠呉璘兄弟實任其責其才氣之雄智略之偉立乎千萬人之上折衝禦侮談笑間爾然則今日之典方靣鎮全蜀者其可不以前修自厲哉付之以衆人所不敢當之事期之以衆人所不能成之功兼緫四路專其委寄則威望日益隆優選寮佐為之强助則謀慮日益廣此方之疾庶其有瘳乎西陲既安則東南恃以無恐臣所以披肝瀝膽控告君父者非獨為蜀計為天下計為宗社計也嫠不恤緯憂在宗周惓惓之忠惟陛下察之歴代名臣奏議卷九十七
