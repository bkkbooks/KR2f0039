body:
  text: 歷代名臣奏議卷三百三十八眀楊士竒等撰禦邊宋理宗時寶章閣學士曹彥約上奏曰臣聞敵國盜賊之患自古所不能無惟在處置得宜然後不能為害所謂處置得宜其略有五一曰守道二曰固本三曰通財四曰稽衆五曰愛民至於擇將練兵事之重者也臣猶以為次也所謂守道者用兵之道必須先論曲直當丙子丁丑間飢民闖邊者動以萬數朝廷恐惹邊釁抑之不納其後邊臣貪功慕簞食壺漿之名延納入境致使重兵在戍十年不撤蠧國害民莫甚於此已往之事不復歸咎矣今當眀正好惡定攻守之議廣立規橅為長久之計不冒昧而進不蓄縮而退不以一勝而舉手相慶不以一敗而唶舌相視然後可以言道也所謂固本者營壘布列莫先重內古人處置固自有體重兵皆在江內而三衙尤多勝兵中興百年恃此以不恐其後馬司徙置江上而建康鎮江諸軍皆在江北人心易搖姦宄易生設有緩急不能自立為今之計莫若使殿步之兵重於江上江上之兵重於真揚真揚之兵重於楚海聚兵於內守以大將有時應敵可以調發應敵之後復歸本營外雖有警中實安堵此所以為本彊也所謂通財者臣固知治國之道不可以無財有用之財不可以妄用若必以吝財為政則軍事淪於淺陋矣當開禧未用兵以前諸軍皆有回易以至邸店酒息皆有寬剩其不肖者固掩為已有而其賢者猶得以激賞其軍也及乎出戍數多調發不時諸軍在寨所餘無幾營運日削無所取辦而獨於互送之禮買工之弊不肯少損盛寒出戰無望牛酒衣不蔽體日食尚闕望敵驚奔勢實使然士大夫但見乾道淳熙間諸軍富足將謂今日事體尚未改舊不知開禧以後大相遼絶今若改絃更張必須選擇朝臣體訪諸軍利害供其乏困削其煩苛若軍用不足則又捐金帛以與之一時區處未免浪費比之喪師辱國孰大孰小此所謂通財也所謂稽衆者用兵之道臨機雖貴密謀而起事要須兼聽漢髙祖欲復六國則酈食其張良各獻其計武帝誘致胸奴則王恢韓安國各逞其辨用張良之䇿而漢彊用王恢之䇿而漢敗此其驗也比嵗邊事不常而廟論過於嚴密道路妄傳易以惑衆浮言胥動固不足恤其實意向不決未易舉事咨諏不廣難以至當洪範稽疑謀及卿士大雅先民詢于芻蕘今若采之衆論使之各盡其長朝廷選而用之不問卑賤千慮之愚容有一得異時選擇邊帥亦將於此而得之此所謂稽衆也所謂愛民者自古未有不愛民而可以立國也今陛下每對羣臣日以愛民為念大臣圜座日以愛民為政御史諫官奏疏論事日以愛民為說而州縣田里之間實未有愛民之效有仁心仁聞而民不被其澤則貪吏之害未去也朝廷立交承錢物之數本至公也彼則以增羡為名而掩入私室朝廷付守臣節制之權本良䇿也彼則以私役為常而脅以威令籍義兵以備緩急本善計也彼則拘之城郭而失其生業耕營田以實儲蓄本古道也彼則彊之鄉夫而奪其農事邊陲之民怨憝盈耳卒有緩急將何所恃必須懲其一二眀示播告使之改行率德庶幾百姓安業此所謂愛民也有此五者而後可以為國如其不然臣竊憂之至於擇將臣不敢易言之也以今之將為皆不可用耶則將以何人而易之以今之將為必可用耶則又不敢以為然也夫使守道之䇿行固本之議定通財之說眀則識事者必應時而起稽衆之計廣愛民之政傳則好事者必舉賢而進可以類求可以意使矣若夫練兵則又為將之事非朝廷之所憂也臣受國厚恩無所補報傾倒所學不過如此惟陛下留神戴栩奏禦邊劄子曰臣請言天下之大慮今殘敵不足慮矣近而可慮者淮孽也逺而可慮者䝉古也淮甸之孽雖逆名未彰而逆節已露我之耕牛則倩客以致之我之戰馬則昻價以誘之我之材木則資以為舟筏之具朝廷方計糧而為之餔廣糴以應其需稍拂其意則起而殺官吏焚城郭暴骨草莽積聚為之蕩然一得其善言則置而不問夫朝廷不先事以激變誠大體也而臣揆之事宜自可並行而不相悖陛下與大臣務為恩言以存其終始申敕制閫常為之備俟其有變而誅之彼之未動則有所忌憚動而欲為不善則天人共憤而曲不在我矣䝉古之擾我邊陲西起巴蜀中經襄漢東並淮泗橫亘數千里度其勢未能如是汗漫意其羣盜潰卒假托名字遊魂竊息不然則所過郡縣驅其丁壯老弱以為前鋒耳若是者當精間諜以伺之不可聽其自為去來也然臣謂二者實所當慮而先為不可勝以待彼之可勝則必有措慮之地矣陛下所恃為攻戰者將非吾兵乎所恃為保障者將非吾民乎今自三衙達于屯駐將帥掊刻日甚借貸之責償差使之納賂征行戍守反利其死而名糧口劵動占虛籍甚者家資豐餘與夫材力之出衆者往往貪忌百計以害之而陛下之兵怨矣自內郡達于沿邊州縣朘剝尤為苛峻稅賦之重輸贓罰之過倍楮幣貼入自為折閲而茗鹽酒麯動致破家甚者和糴城築之類科抑百端朝廷雖給本費以巨萬計反席卷而藏之而陛下之民怨矣兵怨民怨陛下不得而知所恃以為耳目者風憲之職而已間有背公徇私竊弄威柄尺牘所馳轅門鈴閣無日無之其營求囑托如裨校之補升椽屬之辟薦主將州郡能順適其意則過雖山積且曲為之地尚奚肯為陛下告哉唐文宗有言去河北賊易去朝中朋黨難是雖有激而云亦末俗之通患也臣不識忌諱位卑言髙何所逃罪惟陛下留意自治之䇿使可慮者不至於可慮則天下幸甚湖南安撫大使兼知潭州兼節制廣南李曽伯上禦邊五事奏曰臣一介踈庸誤䝉聖恩抆拭畀以閫寄冒昧領事倐又閲月于此竊伏念職守所在任一道之寄則當思一道之憂邊防所關得一日之暇則當為一日之備臣所部廣右逺在天南地雖介於蠻猺民不知於兵革十數年以來始傳敵有假道斡腹之計見於中外奏疏前後凡幾其為隱憂豈待敷述苐以抵戍之始莫急守邊之宜雖近諜之未有所傳以前聞而詳考其故參之管見敢以條陳謹開具如後一邊防所急間諜為先本路與淮蜀不同蓋由為蠻猺所隔種類不一語言不通一介欲前寸步有礙稽之前牘類以為難前者數年以來屢下雍宜諸郡選差體探雍州嘗遣周超往羅殿唐良臣潘住往自把宜州嘗遣吳世聰等往特磨道其去大理路程尚賖而况蜀羌以西又在遙邈其所刺探或傳冦犯烏母國冦攻赤里國往往得之諸蠻所傳敵之進退實不得而知也中間僅有淳祐五年因遣屬官謝圖南出邊得於招馬官所報始知大理告急自把有破三城殺三節度之報直至謝濟自大理回經涉兩年又得一信始知敵與大理九和之戰公子和之死此外俱無聞焉以此見得自廣遣間探敵實非易事今臣到任不敢以此自沮見與邊州守臣及諳歷南事之人多方商確重賞招募有能識蠻路曉蠻語之人令其結約諸蠻深入逺探以伺動息端的但參之衆論皆謂敵若自沈黎以西之諸羌透漏南詔則蜀閫當先知敵若自思播一帶之諸蠻透漏沅靖則荆閫當先知其與本司欲自雍宜以探大理自融州以探思播其去敵境地里委相遼絶欲望睿慈劄下荆蜀兩閫應有探到敵人動息以時關牒本司庶幾本司得以隨機應接極力備禦一敵人謀人之國多出間道嶺蜀相去雖逺道路可通實在我者之所當備其數年以前諸處探報不暇一一泛考但觀淳祐五年以來節次備録所報或傳謀入思播以窺沅靖或聞取道蕃部徑趨南詔或謂吐蕃已得敵人旗號為鄉道入廣此等之報不一而足敵之姦謀委是不淺及至近嵗事勢雖若少寬然丁未冬所傳敵南闖連為蕃蠻所沮至戊申冬復傳敵人向吐蕃境內相近南詔以此觀之則是敵之進退邈在諸蠻之外正自叵測本司連月以來未見續報意者去冬沈黎奏巖州之捷敵既北遁遂寬南侵由是諸羌據險以自防若使敵兵無間之可入則廣中賴以無事豈不甚幸苐因閲蜀中去年一報謂敵若行吐蕃界中初不經四川地分且舉甲辰直至大理之九和鎮丁未則捨九和熟路而取青羌丁未失利於西莫先諸蕃又安知不捨諸蕃之熟路而繞出雍宜臣以此推之則戊申既失利於巖州又安知不捨巖州之熟路而取他道有如蜀帥久在西邊識戎情於萬里外其為廣右深慮如此夫豈可玩臣近得雍守王雄畫到地圖及以謝濟行程互相參考大槩廣自雍州入大理界凡四十程又二十程至其國蜀自沈黎至大理之姚府二十八程又五程至其國以地理計之則是自黎雅諸羌由南詔趨廣界殆無一百程之隔必南詔之藩籬常固則廣右之門户無虞一罅稍踈無厭將及本司遣間既難豈容坐視臣妄謂大理諸臣知慕中國雖謝濟之已去有特磨之可通向後西邊若無警報本司固不敢外交萬一敵再窺南則恐大理之信未可與絶向來謝濟之往前帥遣之實奉朝命今臣若不預行申請臨期豈敢自專伏望聖慈付有司行下以憑遵守一竊考本司自傳聞斡腹之計講眀備邊之宜其逺者不暇考姑舉淳祐甲辰以來五六年間朝廷之所施行司存之所經畫大槩以廣右之兵備單弱雍宜融三郡兵屯不滿千經司靜江所管亦不過二千人以上於是有增招新軍之請以廣右之糧餉匱乏設有邊警非漕計所能支吾於是有科降和糴之請以廣右之城池卑淺覆之以屋尚不可禦雨豈能禦寇於是宜雍二州有修築城池之役此三者為備邊之要此外則輯約溪峒團結民丁備器械練士卒前後樞府經司條陳規畫委曲詳盡蓋已屢申于公朝矣臣誤膺委寄此來要亦不過遵前人之已行盡愚力之所至事事而備旦旦以思以期保固封守然以廣右事力僅可隨宜而措畫豈敢過有於作為臣之所憂其他姑置惟以兵力太弱不能自彊非但為敵寇窺闖之防亦欲為諸蠻控制之計蓋馭輕必先於居重非彊本不可以折衝城池雖修非兵莫守器械雖備非兵莫持如溪峒民丁之類非有兵不足以制其命此理甚易見也今一路二十五郡扼諸蠻備海道制盜賊防溪峒皆仰本司二千餘人調用之中常茍安無事則可或小有寇擾則可若遇稍稍猖獗則亡具甚矣何以運掉臨期請師于朝如近歲乞備九江之兵乞調五羊之戍秖付之文移報應而巳必無救於事也本司昨請招安邊軍三千人迫於錢糧僅招及八百止今三百人屯雍宜融五百人屯靜江若䝉朝廷更令增招一二千人併與科舉一項錢米以給劵食庶幾廣右聲勢稍壯可以消弭外寇一廣右之藩籬在雍雍之藩籬又在兩江習南方形勢者素有此論蓋以右江通大理來路左江與安南接境兩江羈縻州峒險隘不一先朝疆以周索賴此以控制之故也考之雍州圖經兩江如橫山永平等處皆是慶厯景祐間祖宗盛時朝㫖措置城築見得以其地為重如此至於諸峒丁壯則先朝團結訓練建炎初年再行抄㸃結成保隊兩江總計二百八十一指揮共計一十九萬餘人比之熙豐舊數為增其封境之廣闊子民之蕃庶又於此可見所置提舉都巡檢使四員分𨽻兩江左江則永平太平兩寨各一貟右江則橫山寨有東西二員平居則與之平讎殺禁掠賣有寇則調兵於諸峒協力以合戰其次知寨以下官屬共不啻十餘貟中間至差文臣朝請郎為提舉其請給並依提舉市舶官條例其官名之重又如此臣竊謂祖宗當承平時其為區區嶺表一隅措置若是周密無非為藩籬計況止備蠻非備敵也近年以來上下狃於循習事勢日以陵夷諸寨兵戍既廢舊屯提舉四員祇存虛闕蓋有以身而犯難未聞有功而見知既無俸可以養亷且終滿艱於得代遂致無人願注類畀攝官貪婪小人損失大體取輕納侮習久成風以此永平之被焚往見於交人橫山之奪印復見於溪峒向也輸納稅米及錢以供提舉官請俸今皆失陷無復有之向也首領至寨廷參今率相抗禮甚者反加慢罵矣臣思祖宗成規百年羈縻以相安比嵗廢壞之若此積輕之勢有自來矣嘉定年間經漕兩司商議漕司嵗撥鹽四百籮以支兩江半年俸給亦嘗有意經理近嵗守臣謝子彊王雄條具邊防事宜申眀經司湖南憲宋慈條畫團結峒丁等事申樞密行府與夫本司前帥皆嘗講畫欲得措置修復固已辟廖一飛者充左江提舉矣今兩江仍前未有正官諸峒未免仍習前態南邊一層藩籬何止一二千里幾自毁撤置弗葺理深為惜之以臣愚見今欲復四提舉官未易有此事力盍若且復其二左江則駐永平右江則駐橫山蓋此二處人皆知為今日控扼􅟱理防備斡腹之要地略倣祖宗之制稍重提舉之權許令經司踏逐武臣優其資格假以添差本路兵馬副都監以居其官其餘諸寨皆分聽兩提舉總轄許及二年不候替離任照例推行到任任滿酬賞任滿與本路州壘差遣亦猶瓊州將領任滿就除海外軍壘之例併從經漕司措置任責以多寡分認各官俸給經司儻無此力請之於朝且未得催索諸峒苗稅除見管兵外經司各假以戍兵數十人隨往各處俾令行之以漸徐就經理未可為之太驟以啓猜疑如是而得人任之加以數年蠻心稍知漸復舊觀必能隱然為吾國保障但患行之不力耳經司去雍十八程自雍至兩江又復數程此則全在雍守之任其責有扶持無沮撓臂指相應痛癢相關顧何事之不濟哉否則亦徒言耳欲望朝廷裁酌如其說可行且乞下雍州守臣條畫始末取朝廷指揮施行此乃南中備邊第一事消尾大之慮釋齒寒之憂莫切於此一言備邊於廣右者數年以來講眀條畫一則曰輯約溪峒二曰團結民丁監司帥守之建眀樞密行府之經畫與夫遊談奏議率以此為先務今臣檢照前牘所謂輯約溪峒則類是損濡沫之禮物給借補之資帖取名作帳狀曰已令措置關險糾集保守其實相與羈縻而已稍有實作區畫即生猜疑如融之大步嶺宜之隴柵寨屋屢立蠻猺即焚前帥董槐侍郎固嘗見於申請亦以惹事端為慮今官司輯約使之不為我梗諭令自保鄉井姑為籬落則可非可恃之固吾圉也所謂團結民丁則沿邊民丁之在省地者有限居溪峒者為多先儒所謂養兵數百而獲十萬民兵之用皆峒丁也往時邊州紀綱修眀號令信服乃得以疆理之雖其說如此蓋亦未嘗用之也況今時異而事不同乎前帥蔡範侍郎嘗申陳民兵利害亦慮邊民鄰境易致疑愕論述甚詳今官司團結其間散在猺峒號召之既難使之自備器糧資費之豈易必盡得其首領之心然後可賴其丁壯之力此姑用之以壯聲勢則可亦未可全恃之為吾用也臣非材被命此來所部尺籍既虛於此三者亟討論措置乃職分所當先豈敢不加之意近略檢照雍宜融三州二三年間案牘之所載溪峒之在雍州則樞密行府嘗差雍倅黃夢應者團結右江唐興歸樂等州一十八隘又新置古細首領黃賢能等一十九隘宜州則守臣曹暕亦嘗結約天地蘭那等州峒首領羅光具等一十二處融州則差曽有開結約所部諸欵以路萬里為諸欵首或遺以銀牌鹽錦或假以資帖名目或與之結立盟誓諭以無事則守險隘有警則協力勦逐此近年溪峒之見於已行者也民丁之在雍州則已具之前項左右江之所陳不暇逺考近自淳祐八年經司嘗行下團結兩江諸州峒丁壯右江則黃夢應具到名帳共計一萬九百六十二人左江則廖一飛具到名帳共計二萬二千六百人其本州民丁在外如宜融兩州則淳祐五年亦有團結舊籍在宜州則有土丁民丁保丁義丁義效撞丁共九千餘人其猗撞一項可用在融州則有土丁峒丁大欵丁保丁共九千餘人其欵丁一項可用淳祐八年本司亦嘗行下團結却未見申到大率出於省地者以家業充丁或老弱或冗雜未免備數出於溪峒者多習於戰鬬如藥箭如標槍皆其所長此近年民丁見於已行者也臣抵此雖未久朝夕考求始末即欲申嚴行下屬以雍宜兩郡守皆將更易難以責之措置融守謝圖南近却申本司欲乘此農隙教練民丁巳即從其所請勉之究意矣苐臣私竊過計近自蜀西少緩窺闖之報便覺嶺右浸寬備禦之憂前項結溪峒團民丁才一有所施為未免即生疑愕前者朝廷行下閫臣奉命經理上下知所遵承今臣雖為此來元未準朝廷指揮邊防戒飭一字臣若安于循習則失於先事而慮之防若亟於講行則恐有無事自擾之誚蠻猺環境動生猜疑舉動稍輕大係觀聽兹不容不謹如此臣欲且行下三郡各照已申經司之舊籍若溪峒則諭令首領遵守成規布恩信以示撫綏葺險隘以作隄備民丁則因其名帳常加核實以彊壯而補老弱因閒暇以加訓練庶幾近年之所已行不至既久而付文具俟其逐州申到或有合作更革措置又當隨時區處若州郡事力不及經漕兩司却當與之通融助給施行欲望朝廷劄下雍宜融三郡守臣遵守貼黃臣前項開畫之陳雖為斡腹之慮載念自古兵家有出間道以謀人之國者類以偏師濟如深入險阻重兵所難今者敵戎窺闖之計固難隃度所當預防然以臣涉厯淮事覘之每嵗敵當隆寒草枯盛夏虻出不容不去今自西羌越南詔欲以窺我馬力所及容或有之然謂大勢逺來其謀恐未至此但當申嚴邊備常若敵至區區所陳蓋又慮慢藏誨盜如舊嵗南丹它寇之驚交人假道之報有不得不防者非止為備敵計也曽伯荆閫回奏四事劄子曰臣猥以庸繆本無他長遭逢聖時叨被煩使戍淮罔績曲荷保全入嶺無何曽蔑補效自天申命易地上流任重恩隆犬馬難報恪共賤次亦已兩旬事雖多端未易縷數竊伏恭念乃者季春三日奎畫誕頒預授閫規其條有四曰推廣屯田勸督耕種可以代和糴建置𣙜場南北互市可以省科降修復城池可以壯藩屏撫輯流徒可以固人心大哉聖謨此真守邊之良䇿當世之急務也臣不武何足以上副隆委然自服膺訓飭願竭㳙塵朝斯夕斯念此至熟今者既臨疆埸親訪軍民聿昭聖主萬里之眀可無愚臣一得之獻臣謹不避天威為陛下條陳之臣竊見京湖自江北諸城往罹敵難閒田曠土彌望荆榛皆二十年前禾麥膏壤也然而不患無可闢之地所患無可耕之人在我固無出因田之謀在敵則當防因糧之患比連政制臣所以艱於經畫未易廣於開拓也本司所管江南江北屯田人謂孟珙嘗云尚餘九百萬畝以臣愚料珙亦誇言儻計夫而授田以何人而充募稽其舊籍汗漫難考珙存日嵗耕今已莫得其實但聞其末年嵗上朝廷物斛不過二十餘萬石賈似道以盛年精力極意經理田萊加闢穡人成功視珙時固巳推廣倍半矣然嵗租之上僅能及三十餘萬石計諸頃畝所收固不止此然軍民雜耕官吏程督牛種器具嵗時賑貸工本於此乎仰而又司存生劵貼支無藝頭目添給月廩浩繁南北之應酬緩急之樁備舉是數者皆取給焉譬諸常産之家仰為卒嵗之計似道非不欲具以成數來上蓋以此也臣今驅馳入境已是六月初旬勸督耕種已非其時方幸諸屯將遂一稔積雨成潦江湖泛溢田禾類傷於巨浸嵗事已乏於全功而況本司今春優恤佃户又以每畝減租二分有差今年所收其視似道連年之數決是不及逺矣若曰欲以收數而代和糴則恐其間秋收雜斛豈足以充軍餉嵗科經費必至於誤邦儲糴時一失糴價倍踴將徒咎無及也昔羊祜屯田襄陽始至軍無百日之糧季年乃有十年之積此亦須遲之嵗月功效乃見固未可責之旦暮也臣愚欲望陛下念邊寄之匪輕期田功之經久堅持定畫委任責成容臣自今以往廣招農佃墾闢荒閒親率勸課思廣積貯他時稍增塞下之耕或可少寬湟中之糴此推廣屯田之說也臣竊惟南北互市所以懋遷有無通惠商賈往年與金為鄰沿邊置場之利公私共之近嵗敵與中國交兵嚴貿易之禁始於邊州守將博易馬匹繼之藥物錢貨私相交關臣在淮時已親其事然其交猶有場其來猶有限未至如近日淮邊之皆可自為也財計所入固宜歸之公家豈邊臣可私但臣竊觀京湖之互市與淮間之互市異蓋淮去北境止隔一河北客率是齎已貨越吾土以求鬻於我京湖則置場所在此襄彼樊惟此一處可通自江陵齎貨而往何啻千里載以舟楫衛以軍兵泝流而上尤費月日所厯無異生界以此淮之互市不拘冬夏之候荆之互市惟在夏潦之時秋水一枯舟不敢踰郢矣昨自孟珙至賈似道任內每夏僅止一兩次貿易似道視珙時固已有加然聞之舊嵗不過得銅錢數萬餘則如當歸甘草雜藥之類皆滯貨也計其息若贏羡之可數視其本或變轉之尚難所得幾何厥費尤甚司存徒以置場則可以覘敵情可以得敵馬可以通襄陽一線之脉志不盡在利也邊臣能為公計苟籍此有餘積亦猶國之外府然若曰目前欲指擬以省科降則恐藥物之類便未得錢軍劵等需何所取辦此場必至於廢而不敢為矣又況北方頭目大扺多貪可以利誘昔良平以金啖秦楚之將髙祖聼其用而未嘗計卒能成大功其可不略假之乎臣愚欲望陛下寬邊臣以責大體通北貨以疑敵情異時閫計之可支斯亦國費之自省臣聞目今樊城略有北客正欲遣舟辦貨而往初為交易宜示優容若欲定其成規當俟嗣嵗此建置互市之說也至於修復城池則臣竊惟方城漢水自昔用武之國向也壁壘相望蔽護風寒今惟南郡一城巋然江北與夫下而漢陽耳漢陽距鄂一葦敵不易窺如南郡城池則近嵗賈似道一新規模從事畚築亦既浚淺而培薄轉瑕而為堅矣此外諸城多在寓治鑿斯築斯固未有及是者臣伏讀修復之訓睿謨宏逺蠡管莫窺悚然未知所措竊計陛下披輿地圖指示郡國不忍墮甑之視將復金甌之全聖意蓋有為而發也臣自抵戍所訪諸故老諸校皆謂敵自十數年來沿邊無可疽食稍逺區脫人非城是山河不殊曩時擊柝之地往往嘷狐狸而長荆棘矣有志之士豈不感歎況以睿訓之丁寧如此臣子之責任當然敵人之骨肉方爭中國之機㑹難得陛下念慮及此真宗社之福也然前此閫臣志在王室亦皆有經略之意或者養威伺釁未見可為度力揆時將有所待歷年雖久抑亦教訓生聚根本之未立陛下不以臣無狀今欲付之以此捐軀效力固不敢辭但今兩路城之未復者曰襄郢隨棗安信鄼復武當荆門凡十郡房元無城未暇一一枚舉而襄陽天下之脊國之西門古郢荆岑通襄脉絡將大為經理之計抑姑為徐進之規私慮我必守者彼所必爭其進鋭者其退易速昔趙普論幽燕之伐曰以翰取以翰守以至於孰可為代規圖天下大事反覆深慮如此猶恐成敗利鈍不可以逆睹不然則徒為禇裒商浩祗貽笑方册也今將為修復某城計則當度有司量功日兵用幾人從何而調不可盡撤見屯兵力當防其乘虛糧支某嵗從何而取須是令外辦此一項糧食不妨常券器械從何而辦財用從何而給城未成而敵已至則將何而應凡是軍實所需物物預圖事事經慮一毫不可以缺闕當如孫叔敖城沂之舉使封人先慮而授之庶可不愆於素無虛役而有成績更惟聖慈與大臣熟圖而指授之至於撫輯流徙則臣竊惟兩淮頻年受兵而民之避冦江南者猶頗衆京湖連嵗稍暇而民之復業江北者已漸多且聞去嵗以及今春邊民之攜老幼驅牛畜歸返其舊土者鱗鱗不絶于道逺而隨棗襄光之郊亦有人矣其尚寓近裏者則又公家給之牛種處之耕佃聽其酤販弛其色役其視往時哀鳴嗷嗷大不侔矣此固衆人視之以為喜有識思之猶以為憂也蓋由近日以來邊人相傳敵哨不入將謂疆埸自此無事泰然散居郊野不復隄防深恐虎視非仁鷙擊必匿慢藏唘侮將厚盜資臣夙夜思之方此申諭諸郡俾相告戒類為保伍無事則耕以自給有急則收之入保所行雖若遲鈍不可人意實切於為邦本計也伏讀撫輯之訓敢不益加勞徠安集以稱眀天子德意然臣仰窺聖慮俾固人心意者為蕃漢之撫摩不專為吾民之流徙興言及此臣罪不勝所恃眀主可為忠言愚臣豈敢有隱蓋自孟珙招納太廣不為居重馭輕之思似道恩結雖優浸成外彊中乾之勢今則諸屯典旅多是其徒有持阿授柄之憂南岸列營撫如驕子有積薪厝火之慮幸而不發苟以無虞蠶食安居果將焉用臣觀京湖之所處者其視東淮不及逺矣臣今雖恭奉宸㫖撫輯兩字銘著諸心待之南北之一家俾無爾汝之形迹然以前人養虎常飽猶恐拂之所謂詐狙作使未易御者臣嘗觀東漢末年處降人於近塞異時劉石輩多出其中苻堅不聽王猛之言亦受鮮卑之患皆可鑒也此證養成要已非一嵗於此往者則幾藉以脅繼者則惟幸其弭若不及今商確預作圖維如療病於未病而使醫如治水勿與水而爭勢涵洪優裕勿露機括思所以處之之地用之之方隂消而潜革之臣恐異時不能不勤宵旰之憂也光武推赤心置人腹裴度待蔡人即吾人眀良一堂恩深義結固無是慮臣之此言似過然亦出於拳拳嫠緯之心爾伏望聖慈密與大臣而圖全之以上四事皆恭因聖眀之訓用輒進狂瞽之言嬰瀆霆威謹局蹐以俟鈇鉞此外猶有祈控於陛下者臣自頻年灾患百念雕零思慮不及於前時材力豈堪於重任封疆盡瘁所不敢辭餽餉攸司實難共二蓋人品智愚之既異而物理盈縮之相因人知為閫費匱乏賴以相通臣則懼總計支吾久將不逮陛下且謂日用如故嵗入頓虧其可以有立乎譬如中年之人氣血豈能與盛年比病證方異而醫者謂其充盈取而朘削之使盛年處此亦不可同前日語況衰竭者乎强曰藉榮以養衛正恐不日榮衛之俱虛也臣愚欲望聖慈早賜别選計臣俾臣專意兵事若或委令兼任亦須少存舊規使得永肩一心展布四體誓當九殞以報乾坤之大德乃若胸臆所藴筆舌難窮併乞睿照曽伯為淮東制置使奉詔言邊事上奏曰臣所準御筆指揮仰見陛下申飭三邊廣延羣䇿將以圖回實政豫伐敵謀臣恭體神謨勉罄愚慮伏讀密札所載自兵備而下條目有七臣之所部兩道十有四州所在皆當風寒戎馬一入無所限障凡而隄防備禦之具千條萬緒未易枚舉大要一城之兵當使可自為一城之守臨急望援決是誤事其有戍卒不及急當先期分布臣竊計諸州守帥仰承上命必能殫智畢慮見之敷奏矣臣竊謂沿淮城壁連年修浚粗周惟夀泗暨漣越在淮北雖葺理不廢而踈略尚多沿淮糧食諸處運發無闕惟豐濠及夀逺在淮西雖向後儘可支而所憂在難繼此二者未免尚厪廟堂之問乃若敵情所在則羅哈諸酋睥睨於我者已非一朝于此春秋更哨蓋將以嵗月弊我兩年以前河南宿亳應永間敵猶棄弗守去嵗以來廢壘城矣閒田耕矣而且積粟於境治舟於河此其姦謀自有所圖而河北據招泗濠梁報到敵中事宜今秋之入又欲早於去嵗臣已申之密院矣彼之謀我若是其至我之待彼然則又其可忽乃舟楫之當戒險阻之當治臣熟觀已事逺慮未然晝夜以思今日邊頭之事淮面湖面為急博采衆論亹亹然非不可聽然不要其利害之實甲可乙否徒費空言臣請别白而言之臣竊見長淮諸隘如安豐之上則潁河口濠梁之上則渦河口招泗之上則五河口潼河口淮安之上則大小清河口皆是敵舟可以出淮之路往年下流謹舟師之備而上流無隘口之防賊亦未習於舟不敢輕突近年以來安豐則防潁口濠梁則防渦五二口淮安則防大小清河口如潼河等處招信亦往防托規模布置似若嚴密非不欲遏截此敵使不得渡然觀遞年與敵應接止是壬寅之秋劉虎始以舟師在伍僅收一捷然不能遏敵舟之不出敵馬之不渡也是年主將幾陷敵矢逮至去春敵之圍夀由潁出舟豐夀兩郡差調謝天祐石閏等諸郡舟師防遏隘口兵力不為不多敵船一出蕩不可禦去秋五河措置趙文亮連月整葺堡圃備竭心力臨期益以劉虎湯孝信舟師何啻萬兵與敵相持纍日弗能遏敵兵張濟吕文德雖以捷告然僅收之桑榆耳至于今春以文德文亮聚重兵於此堡南北之鋭在焉轉戰幾晝夜敵勢四集圃堡亦遂弗支若非文德見幾急急收斂入濠固守豈不中敵毒手即是數節反復以觀前項諸隘今殆未知備禦之䇿蓋舟師本我長技敵乃習而用之由諸隘出淮皆順流建瓴之勢而此敵又於南北兩岸夾以馬步翼以炮弩每每我以一靣而受敵三靣之鋒而又衆寡相絶勢所難禦非我師之不盡用命也今來秋防在即方欲再責諸將措置堡圃則觀諸已然之事深恐緩急徒損威力無補關防置而弗備則敵舟上下往來蕩無限禁長淮千里與我共之我之咽喉脉絡為彼所斷諸州糧援豈不可憂今只得思變通之䇿姑捨諸隘之備而於沿淮諸州擇要害去處各置舟師大屯依城擺泊臨流控扼以虎視諸隘往來隨宜防托自五河而上舟用輕捷招泗而下則用巨艘使敵有所顧忌縱或侵犯我得以臨機制之猶有取勝之道此淮面舟師之當戒者也至若淮東射陽一湖地跨三州自上口以至廟灣上下三百餘里所謂湖者初無澎湃瀰漫之勢秋冬之間不過一衣帶水投鞭可涉往時山東紅襖之兵皆能習知湖澳地里敵之垂涎洊食非一朝夕連年出沒湖西雖抄掠之患猶淺而敵之來路已熟血入于牙殆浸淫未巳兩淮自十餘年來生齒蕩析半成荆榛根本之地得此湖在良田沃壤稻梁所生民食兵儲嵗所取辦其中資貨人畜聚落實繁中間所謂水鄉可恃不過如德勝湖博支湖一二水靣稍闊敵騎難侵其餘雖名湖濼非有巨浸至於海岸又皆平川我之能往敵亦可到果何恃而不恐臣往在京湖嘗聞復州諸湖非不恃水卒亦不能禦此寇之入繼在淮西親見和州麻湖乃丙寅間居人避敵之地亦為敵以計取卒用其衆轉而他攻此皆往事之鑒臣嘗慮及此事將來為淮東之患者必自射湖始壬寅之秋敵分兩路侵犯一從平河過湖西一從泰州沿海溝而入是年湖中全無兵備其不至滋蔓者幸也次年臣嘗委官白事廟堂乞令項昭湖兵五千置一總管駐之興化專令為湖中之備此䇿弗售徒能言耳後來朝廷命髙郵守臣節制諸湖不過行團結之政分委水寨頭目各相保聚自為防托寇至則淮郵泰揚各調少舟師以防遏之然亦僅可分布控扼使此敵不敢徑涉慮吾之襲其後耳若曰可以遏此敵之不渡未敢以為然也而況湖中舟備如自平河過湖西一路則猶或可遏萬一敵用故智復由海溝斡腹透漏則我之舟楫反在敵背豈可不慮近自敵退後訪之各郡守將及士夫父老有謂團結恐誤民不若聽其遷避者有謂守射湖不若守運河者有謂宜復寶應舊壘者有謂宜築堡于平河黃浦者詳玩數說見各不同深思其宜各有得失若曰盡令遷避則一湖數十萬之生靈何地容之若曰欲守運河則自維揚至淮安三百餘里除水濼隔絶外其可入湖者不止一路又安得有此一項兵力以分守此河若曰再復寶應則又添此一城之守踞坐寶應亦不能遏此敵之不過若曰築平河黃浦責之髙沙淮安則髙城大池猶懼敵犯臨河小堡何以抵當臣憂心如灼實未得其長䇿近見委官再往郵淮兩郡謀之守將臣意欲得團結遷避兩說並行水鄉之深闊可恃敵所不可到者從其團結以避寇其他令淮安泰州髙郵各從其境預行告報委責頭目遇到秋防寇至入城遷避惟有此䇿尚或可行此外寶應及湖濵亦量用舟師往來耀敵以防敵由平河入之路泰州堡城一帶亦用官民船張耀以防敵由海溝入之路然亦止可以為敵勢小入之備儻其大至則地勢綿亘之廣兵力敷布之難可不深憂此湖靣險阻之當治者也凡此二者切于目前臣憂此熟矣今雖待罪將去敢不力疾以聞伏望睿慈速下有司更加商確如臣言可採早乞處分行下秋風不逺願軫淵衷江淮相為表裏藩籬堅密門户自安惟陛下亟圖之貼黃臣有少管見言之若涉於臣之利害然實切於國之利害淮西安撫使王鑑與淮西招撫使吕文德近來名位相埓意嚮不同其守廬守濠事績自不待辨然臣觀鑑久不樂制司之居其上文德則不甘鑑之居其傍同舟遇風豈宜自為秦越臣得近日左相緘示廟堂條具奏請亦已眀知維揚兼制淮西地逺勢均運掉不行而招司自謂贅員常懷觖望非更張不可是說也已在神謨廟算中矣此聲已出恐難置之不問兼臣今日據文德所申既欲辭新除之命且欲免招司之權眀有贅貟觖望之言所遺臣書其言頗激若只仍此局靣決貽顧憂他時設有踈失無謂臣不具奏臣雖將罷去敢不盡言以臣愚慮莫若罷淮西制置司或併歸王鑑權管却分吕文德過淮東卑以沿流一大郡分淮東安撫一司以畀之仍畀兼節制沿淮諸州䇿應軍馬如揚州則只以淮東制置使兼知庶幾東西兩道得兩大將臨其前各有責任無相推托如淮面湖面俱有可恃權時制宜無易此䇿伏乞睿斷李鳴復上奏曰臣蜀人也三仕劍外蜀之安危成敗嘗身履而目擊之今蜀民困於科擾之煩蜀兵壞於驕縱之久蜀財竭於費用之夥其可慮者多矣而關外五州所以蔽捍全蜀利害尤重謹摘其切于邊防者二事以進陛下幸垂聽焉一曰復家計寨之舊二曰增忠勇軍之額寨之有家計向者吳玠實創之岷曰仇池鳯曰秋防原階曰楊家崖成曰董家山是四者皆有險可恃有泉可飲又為之糧以食為之屋以居無事則寓于州有事則歸于寨其為慮蓋甚悉也自紹興至開僖敵嘗侵犯矣視之而不敢攻以有險在前也遏之而不敢越懼吾之襲其後也古人設險守國殆不過此曦變以後一時邊帥欲築城以為守而家計寨之實遂廢曩時蜀帥又欲列柵以為固而山寨之役遂興夫謂之山寨與前所謂家計寨若類矣而實非也蓋家計寨凡四擇地利之絶險者為之而山寨則為數七十無其險也家計之設乃官與民相保聚其力足以捍敵而山寨則家自為活無其力也彩畫成圖但詫觀美多張虛勢無補實用是驅之使就死地也以山寨之受禍也而併與其足以避禍者廢而不葺亦未之思耳臣故謂家計寨當復其舊者此也軍之有忠勇初以陜西弓箭手法為之興洋曰義士金州曰保勝京西曰保捷而關陜則謂之忠勇是兵也可以攻可以戰而尤利於守蓋有墳墓屋廬以繫其志有妻子骨肉以堅其心其勢當效死弗去也關外之賦總不過四十萬若盡蠲以為軍一人執役數人荷戈隨之籍一萬人可得數萬人用古者寓兵於農何以異此敵寇之入制司懼其勢之難以支也遍給旗榜以招忠義事定之後又知忠義之不容散遣也創置軍籍以行屯田夫謂之忠義與前所謂忠勇若一矣而實殊也蓋忠勇軍自給衣糧器械而忠義則給之於官者也忠勇軍有常産故有常心而忠義則皆烏合者也責以屯田未必果能執耒核其實數未必果皆按籍此蓋不能無弊也創增官劵以養忠義而其不費官劵者乃寢而不行亦幾倒置矣臣故謂忠勇軍當增其額者此也家計寨復則保聚有要地而人心安忠勇軍增則備禦有徑兵而人心固臣之所論非特為五州計為四蜀計也陛下如以臣言為可采乞下四川制置司恭酌施行鳴復為侍御史論今日當議備邊之實上奏曰臣竊聞敵使之來朝廷議所以待之今之議和猶昔之議戰也臣以為和戰皆不必多議所當議者邊備之實爾臣嘗觀班固論漢一代禦戎之䇿至其終則曰來則懲而禦之去則備而守之其慕義而貢獻則接之以禮遜羈縻不絶此聖人制禦蠻夷之常道也夫懲而禦備而守此最邊防急務不容一日闕者而今焉上下皆忽之問之朝廷則曰已行下戒約行下隄備矣問之邊帥則曰某處差某防遏某處差某屯戍矣驗之以事實未見其實也何以知其無是實往者汴京之得捷報飛來謂全子才陳兵以護闕庭趙葵諭衆以宣德意又申諭諸將益整六軍渡河隂之師奪孟津之險朝廷亦信其言第功行賞矣小戰才衄望風皆潰守禦之實安在已而趙范至浮光齎書告廟堂曰淮北之守已遣五千人屯息二千人屯蔡矣又遣李寬孫軍勝守鈞守許厚犒而往斷可得其死力矣雖使敵國有韓信復生亦恐未能勝范也其詞甚壯若無復可慮矣而哨馬一至數州俱陷守禦之實何有前日無其實而徒欲僥幸乎戰之捷今日無其實而又欲僥幸乎和之成謀國若此豈不大有可憂也哉臣謂敵使之來隨宜區處視其貢獻之物隆其賜豫之禮寧過乎厚毋傷乎薄使一二敵使弭耳而退足矣若曰仗一王楫可堅兩國之新好憑一鄒伸之可復中原之故境恐無是理也金昔以和誤我敵復以和誤金商鑒不逺而猶欲蹈其覆轍乎為今之計當移所以議敵使者議邊備舉所以講虛文者講實政財必欲其豐糧必欲其足器械必欲其備人心必欲其固士馬必欲其壯健而又擇良將以任之使吾邊陲之間屹然長城隱若敵國則有所不和和無不成有所不戰戰無不勝矣此上策莫如自治朝廷所宜加意者在此不在彼也惟陛下垂察貼黃臣既謂敵使當隨宜區處不必多議矣似聞朝紳有以借吉服一日為言者此隨時俯仰不知大體者之說關係甚重有不容默夫中國所以異于四敵者以有禮義也國家大典禮豈宜為外方一小使輕易陛下方以孝治天下行之三年而遽壞之一日可乎併乞睿照鳴復又論和議不足恃當以守備為急上奏曰臣竊見敵使之來引見已畢此既待之以有常之禮彼亦不肆其無厭之求由中及外咸謂自今可以變干戈為玉帛矣而臣愚不識事勢獨有憂焉臣之憂非于今日而後發也往嵗之秋適當輪對是時朝廷委襄陽遣使銜命而往猶未出疆也臣妄謂敵之情有不可測者二有深可憂者一既踰一年而敵使再至其狀猶前日也臣之憂亦猶未釋也臣之所謂不可測者人皆見之不敢贅述所謂深可慮者人未必皆知之其可不申言以冀中外之警悟乎往者寶慶丁亥敵嘗遣兩金牌至蜀大書僞號于牌之上自謂為天所錫附以幅紙幾百有餘言狂僭異常悖嫚無禮大槩只欲吾投拜否則厮殺耳彼所謂投拜即吾之所謂和也吾以講好為和彼則以投拜為和金非不通好也通好而不投拜其禍卒不可解于他國亦然此豈可不深致其慮哉王楫之來以宣撫為使名只此一端便覺可怪臣閲邊報敵人蹂踐關隴占據河南有所謂宣差矣有所謂元帥矣名曰宣撫獨于王楫見之雖往時密院劄下襄陽亦曰䝉國僞宣撫此名何為而至吾國也臣觀楫之為人外雖恭順內實姦詐意其涉吾境也固例曰通好也曰議和也其反命敵酋也未必不曰吾使事畢矣由鄰境至國都皆聽吾之宣撫不吾拒矣異日見之國書萬一有如金牌之僭嫚我其何以待之將却之乎抑受之乎却之則貽禍目前受之則貽羞萬世利害既迫吐吞不能臣恐紹興故事將復再見宰相不免為秦檜執政不免為孫近在朝忠憤之士將有如胡銓者出寧欲赴東海而死矣陛下試觀鄒伸之等輩果能如富弼肯與敵酋爭獻納二字乎肯辭官不拜謂敵或敗盟死且有罪乎一意詭隨百端揑合是亦王倫耳慮事當察之于始防患當謹之於微先事而為言則亦當先事而為備然則䇿將安出乎自昔待異域之說有三曰和曰戰曰守而已和戰蓋相反而守則行乎二者之間不容以一日闕不戰則和不和則戰此所謂相反也能守則可以和可以無和能守則可以戰可以無戰此所謂不容一日闕也為今之計嚴吾守備以待其勢之自定斯得之矣天險不可升也地險山川丘陵也王公設險以守其國此以勢為守者也鑿斯池也築斯城也與民守之效死弗去此以人為守者也固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助此以道為守者也得其道則人為我用得其人則勢為我有其說雖三其理則一而已矣且所謂道何道也其要為三綱五常其序為君臣上下其用為禮樂刑政修之身者此道也達之天下者亦此道也使綱紀森嚴法度峻整衆賢聚于內羣邪屏于外六典治邦國而見之政事者無不舉八柄馭羣臣而施之賞罰者無不當則此道行乎朝廷役簡刑清政平訟理循良者必用貪暴者必黜布中和之化而嘆息愁恨之聲以消行寬大之書而安靜和平之福以集則此道行乎郡國峙乃糗糧備乃器械有功則賞雖小校必旌其勞有罪則誅雖大將必正其法使皆有仗節守義之志而無畏死貪生之心則此道行乎邊鄙言必忠信行必篤敬彼以暴吾則以仁彼以力吾則以德自治以定其立國之本權時以施其應變之宜則此道行乎蠻貊果能此道矣人心愛戴國勢安彊因斯民歸往之情符上天助順之意雖以混一區宇掃清中原蓋將有自然而然者豈必待惴惴而為戰汲汲而為和而後足以固吾圉哉邇者恭承陛下頒示宰相鄭清之章疏臣以濫陪經幄例獲諦觀篇末奏陳理盡而詞切諒陛下亦犂然有當於聖心矣雖然宰相事無不統非但發于言而止也乃言底可績然後相之職為無負漢申公曰為治不在多言顧力行何如耳此人主事亦宰相事也惟陛下與大臣益加之意貼黃臣近見四川制置趙彥呐備申敵寇犯蜀直至武階調遣諸處軍馬併力鏖戰敵遂敗績然則使地利在我人和在我敵未嘗不可勝也韃方遣使議和而亦遣兵入寇和果足恃乎和不足恃則守備之實尤不容一日不講行也併乞睿照鳴復乞宣引兩督視使各陳已見上奏曰臣竊謂今日之邊患皆邊臣有以致之致敵使之來者嵩之也致敵騎之來者范葵焴也蔡息不共事則韃使未必徑造闕庭河洛不出師則敵騎未必指為仇敵和戰雜用處置失宜唘釁召戎實基于此今范守襄峴葵守維揚焴守合肥皆曩時之主戰者也敵若抉我藩籬入我門户為三帥者其戰乎其守乎兵凶器戰危事戰或不捷䇿將安施茍嬰城固守而長江之險敵遂與我共之計又安出陛下並建督視蓋謂朝廷去邊面遼邈就遣二重臣假以便宜從急應接耳五大帥不得為之事兩督視當為之朝廷不及行之事兩督視當行之抑不知為督視者將調遣淮襄以掃除寇亂邪或欲捍禦江靣以固護根本也若止于捍禦則沿江兩制帥足矣奚必督府而後能辦如志在掃除而且聽敵之自為去來諸帥之自為戰守諸軍之自為叛服則今日之患正坐此爾局靣既新而積弊如故奚以督視為哉和戰守之孰是孰非兵將帥之孰勇孰怯沿邊之地利孰險孰易沿江之津渡孰緩孰急大帥或不職誰可授任大將或不利誰可御衆此皆大節目所當講貫胸次者夫有此規模然後有此措置有此措置然後有此成就凡事豫則立不豫則廢安危利害之機決在俄頃恐非徒事繁文務為觀美可以虛聲了辦也髙帝一築壇而漢楚勝負已決于韓信之數言先主三顧草廬而魏吳蜀形勢已定于諸葛亮之數語陛下曷不宣引二臣使各陳巳見聽其有何等籌畫乎伏乞睿照貼黃臣竊聞趙范有樊城之報敵衝我軍不動退走數里亦足振起士氣未可言捷也儻朝廷因此玩弛二督視因此懈怠悠悠其出坐失事機警報忽來倉皇無措矣陛下限之以五日君命顧可違乎陛下之令不行於督視督視之令顧可行于將帥乎無以事上恐無以使下併乞睿照鳴復知福州乞嚴為廣西之備上奏曰臣七年去國放浪江湖未許乞身猶縻廩粟事有關于國家之大利害者不容不以奏聞臣近得四川茶馬司準遣牟申之十一月書謂今嵗敵兵分兩道入寇一由利閬一由巴山利閬之寇至磑子溪我軍發伏頗捷餘衆却轉入巴山合而為一未知向後如何制帥迤邐拽回已抵合陽觀敵所向而圖之最是交廣之憂不可不慮前此入蜀之兵本三十萬忽抽二十萬入雲南見茂州所申自曲納族節節透入已至渭節村風節村十八族多已投拜若得此蠻長驅而往則大理危矣雍宜其可不警臣向者己亥之嵗僑寄毗陵曽聞蜀帥陳隆之具申朝廷謂敵人欲由大渡河攻破大理等國斡腹入寇密院劄下廣西經略徐清叟嚴行體探預作隄防後來清叟到大理自把等國回報繳申今可覆視也近又從邸報見樞密都承㫖蔡節奏章專坐廣西經略蔡範申到事宜謂雍宜深為可慮與今來牟申之所言及向來陳隆之所申大槩一同臣竊惟敵人向與金為讐掃穴犂巢自燕徙汴盤旋積嵗竟不能過黃河以遂其不奪不厭之志或教之曰河之尾有路可以轉入于是破西夏踰積石踐蜀境竟求以快其欲而後已今其與我為鄰也䖍劉我兩淮洊食我西蜀所幸天限南北長江洶湧不容輕涉然數年以來嘗驀過萬州以下之胡灘透漏黎州以後之大渡河彼其姦謀詭計未必不曰河之尾有路可以蹙金則江之尾亦必有路可以窺我天道好仁而惡暴不義而彊其斃必速彼其貪婪無厭其亡可立而待然在聖賢每思患而預防之必于無事之時先為有事之備亦曰無恃其不來恃吾有以待之可也臣心於憂國不能自已惟陛下與二三大臣深慮而亟圖之天下幸甚宗社幸甚伏乞睿照歷代名臣奏議卷三百三十八
