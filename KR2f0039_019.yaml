body:
  text: 歷代名臣奏議卷十九明楊士竒等撰郊廟宋仁宗皇祐二年宋祁上奏曰臣聞王者建廟祏之嚴合昭穆之綴祖一而已始受命也宗無豫數待有德也由宗而下等胄之疏戚以為迭毁之制使後嗣雖有顯揚褒大猶不得與祖宗並列所以一統乎尊尊古之道也皇帝陛下躬孝治發德音永惟三后之盛烈際天接地而推奉之禮有所未稱明發悼懼圗惟厥衷使攸司得稽舊章開羣議攄懿鑠闡孫謀將以吻合靈心垂榮無極非臣等孤陋所能及巳竊以太祖皇帝誕受寶命付畀四海鋪敦燮伐潛黜不端夷澤潞之畔兼淮海之昧東焚吳輿右困蜀壘湘楚閩禺請吏入朝當此之時天下之人去大殘䝉更生卜年長世丕闡洪業太宗皇帝敦受具璽席運下武龔天之討底平太原由是慎九刑之辟藝四方之貢信賞類能重食勸分官無煩苛人無恫怨又引搢紳諸儒講道興學炳然右文與三代同風真宗皇帝乾粹日昭執競維烈重威撫和休寧北方順斗布度先天作聖遂考夏諺法虞巡祕牒岱宗育榖冀壤翕受瑞福普浸黎元肖翹跂行罔有不寧百度巳備眷授明辟洪惟一祖二宗之烈歷選墳誥未有髙焉者也昔成湯為商之祖太甲太戊武丁實號三宗后稷為周之祖文王武王庸建二祧髙帝為漢之祖孝文孝武特崇兩廟皆子孫世世奉承不輟我皇伯祖經綸草昧遂有天下功宜為帝者之祖皇祖勤勞制作皇考財成治定德宜為帝者之宗三廟並萬世不遷宣布天下以示後世臣等請如聖詔至于升侑上帝裒對先謨本之周道克厭典禮昔太宗親郊奉宣祖太祖配焉真宗肇祀奉太祖太宗配焉自爾有司不敢輕議今二宗同躋不祧之位則禮無異等伏請自今以往太祖為定配二宗為迭配稱情適事理實無嫌其將來皇帝親祠伏請以三聖偕侑上顯對越之盛次申遹追之感聖人之能事羣臣之大願此後迭配還如前議昔唐髙宗之上封也太武皇帝文皇帝配昊天明堂之封也以髙祖配天睿宗配地開元之著禮也髙祖配方丘太宗配神州此二宗迭配之前比垂拱開元之間髙祖太宗髙宗同配昊天真宗登介丘降社首並以太祖太宗崇配天地此三聖皆侑之明準其嵗時常祀到至日圜丘仲夏皇地祇配以太祖孟春祈榖夏雩祀冬祭神州配以太宗孟春感帝配以宣祖季秋大饗配以真宗伏請皆如禮便陛下重宗祧之事鑒照前載抑畏䖍鞏讓而不専故令臣等得申愚管謹用敷罄惟聖心財鑒謹具議狀奏聞嘉祐元年集賢校理丁諷言按春文耀勾為五帝之名始下太常去之其祀儀皇帝服衮冕祀黑帝則服裘被衮配位登歌作承安之樂餘並如祈榖禮立春祀青帝以帝太昊氏配勾芒氏嵗星三辰七宿從祀立夏祀赤帝以帝神農氏配祝融氏熒惑三辰七宿從祀季夏祀黃帝以黃帝氏配后土鎮星從祀立秋祀白帝以帝少昊氏配蓐收太白三辰七宿從祀立冬祀黑帝以帝髙陽氏配𤣥冥辰星三辰七宿從祀四年平章事富弼乞親行祫饗大禮奏曰臣謹按天地宗廟社稷皆為大祀自古天子親祠之其間尊與親兼之者惟廟焉國朝崇奉祭祀嚴而不瀆每三嵗天子必親行南郊之祀其於事天之道可謂得禮獨於宗廟祗遣大臣攝行時享而巳親祀未講誠為闕典檢㑹今年冬至當有事于南郊又孟冬亦當合饗於太廟禮曰三年一祫祫為大祭所以合羣廟之主于祖宗而祭之自來亦祗遣近臣攝行今欲望詔有司講求祫祭大禮將來聖駕有事于太廟庶乎國家事天事親之道兩得其宜所有降赦推恩並用南郊故事同判太常寺吕公著議四后廟饗奏曰臣聞宗廟父昭子穆皆有配坐茍非正嫡雖以子貴立廟即無配祔之禮案周大司樂之職歌中吕舞大濩以享先妣者姜嫄也姜嫄即帝嚳之妃后稷之母既無所配故特立廟而祭謂之閟宫晉簡文宣太后既不配食亦築宫於外唐開元四年以昭成皇后升祔睿宗廟遂為失禮之首先朝自元德皇太后追尊之後纍有臣寮請行升祔之禮先皇敬重禮典皆不允從別廟薦享凡十有七年其後宰臣等不深詳典據繼上封奏請從升祔中㫖勉俞至明道中議章獻皇太后章懿皇太后廟饗有司參酌儀典請立新廟二后同殿異室每嵗五享及禘祫並就本廟及特撰樂章以崇世享是為奉慈廟載之甲令蓋合經據其後卒用錢惟演之議祔于真宗廟室臣等今參議若以懿德皇后祔于后廟元德章獻章懿三后祔於奉慈廟同殿異室每嵗五享四時薦新朔望上食一同太廟庶合典禮七年公著論三聖並侑奏曰臣謹按孝經郊祀后稷以配天宗祀文王於明堂以配上帝春秋傳曰自外至者無主不止然則天地之祭必有所配者皆侑神作主之意也且祖一而巳始受命也宗無豫數待有德也由宗而下功德顯者自可崇廟祏之制百世不遷垂之無窮至於對越天地則神無二主所以奉上帝之尊示不敢瀆至唐垂拱中始以三祖同配開元十一年明皇親享遂罷同配之禮伏見皇祐五年詔書今來南郊三聖並侑後次却依舊禮布告中外未幾復有每遇南郊三聖並侑之詔雖出孝思頗違經禮臣等謂自今宜以太祖定配為得禮之正嘉祜四年劉敞與胡宿同上奏曰臣伏聞禮官倡議欲祔郭后於廟臣竊惑之昔春秋之義夫人不薨于寢不赴于同不反哭于廟則不言夫人不稱小君徒以禮不足故名號闕然然則名號與禮非同物也名號存而禮不足固不敢正其稱況敢正其儀乎郭后之廢雖云無大罪然亦既廢矣及其追復也許其號而不許其禮且二十餘年今一旦欲治以嫡后之儀致之於廟然則郭后之殂也為薨于寢乎赴于同乎反哭于廟乎羣臣百姓亦嘗以服母之義為之齊衰乎恐其未安於春秋也春秋之夫人于彼三者一不備則不正其稱而郭后于三者無一焉而欲正其禮恐未安於義也且傳曰不有廢也君何以興廢興之間固必有正與不正之理存焉今欲扶所廢以為正必將抑所興以為不正古者不二嫡則萬世之後宗廟之禮豈臣子所當擅輕重哉謹按景祐詔書本不許郭氏祔廟議巳決矣無為復紛紛以亂大禮議者或謂郭后之追命也詔書薄其過既復其號不得不異其禮譬猶大臣坐非辜而貶者茍眀其非辜則復用之豈得不遂使為大臣乎臣謂物有殊類異勢未可以相準臣之與妻其義雖均然逐臣可以復歸放妻不可復合臣衆而妻一也故春秋公孫嬰齊卒于貍脤君曰吾固許之反為大夫此逐臣可以復歸也杞伯來逆叔姬之喪以歸夫無逆出妻之喪而為之者此放妻不可復合也今追祔郭后得無近於此乎乞令諸儒博議極其論難以求折衷于體為允敞宿又奏曰臣近上言郭后追祔非禮之正乞更詳議今月七日學士院以張洞奏狀示臣準中書批狀令兩制同議臣以所據與洞不合更不連署然臣觀洞之言曼詞飾說似茍蔽前之失而非忠信之道也前世人君廢斥妃后者皆溺于私愛或嬖妾上僭或讒訴妄及此則羣臣當引大體伏節死爭如陛下之於郭后固未嘗有此蓋于時聖慮在宗廟社稷之際不得不然耳昔漢光武起於布衣紹復天位郭氏其后也正位十有六年子彊為太子輔為中山王可謂盛矣然自見年長寵衰數懷怨懟光武由此廢之為中山王太后其後太子彊亦自貶引為東海王然當時文武之臣元功俊德布於朝廷不以光武為情有厚薄亦不以郭氏為過不當廢者其意識深逺知事有不得巳者也今陛下之慮豈不然乎光武雖廢郭后然顧待其家初不衰減亦眀退人以義不緣于私故也此又詔書所以追復郭后之意矣用平生之愛故尊以虛名顧禮義之正故絶其祔廟是范曄所謂使後世不見隆薄進退之隙者也至公至平可謂折中今洞之意以追復郭后則出於天子以停止廟諡則出於大臣共一詔書也而論之異同未知洞何從見之若不幸而此言傳於後且歸過君父虧損聖德此其一也且臣前奏最要者以為廢興不兩立而人君無二嫡備萬世之後而禮分不眀也洞既不以此為辨若不幸朝廷過聽之是雖自以能訐上起廢為功而猶且隂逼母后妄瀆禮正此其二也故臣以謂非臣子之義忠信之道矣伏乞并下臣章令兩制詳議臣誠愚竊耻聖朝無光武之臣是以莫能推眀上德而反崇飾誹謗營為非禮也不勝區區宿又上奏曰臣竊以國家乘火而王火于五行其神屬禮漢書天文志曰火禮也以此而言國家常須恭依典禮以順火性伏覩京師自秋不雨綿歷三時聖心焦勞臣下隕越思所以消救之道未知所出伏惟陛下眀德恤祀䖍共郊廟宜䝉福應乃遘災旱古者祭天神無二主禮専一配所以奉天帝之尊眀不敢瀆三代兩漢之盛莫之敢易唐初始有兼配之事垂拱中禮官希㫖郊丘諸祠遂有三祖同配之禮開元十一年明皇親享圜丘禮官建議遂罷三祖同配之事除此之外未有一代三帝同配昊天之禮國家至道三年詔書親郊圜丘以太祖太宗並配陛下即位景祐二年詔禮官詳案典禮辨崇配之序詔書節文自今以往太祖定配二宗迭侑去年八月八日詔書今次南郊三聖並侑後次却依舊禮布告中外咸體至懷未踰旬日復有今後每遇南郊三聖並侑之詔竊尋詔㫖先後不同此誠陛下至孝蒸蒸虞舜之用心也然有違典禮未合天衷致旱之由恐在於此臣愚欲望聖慈今後南郊乞且依去年八月八日詔書及景祐二年禮官所定太祖定配之典追寢去年八月二十四日今後每次南郊三聖並侑之詔告謝天地以順火性必䝉福祉之降足消災旱之異臣若心知不可口不敢言即是長負陛下奬育之恩沒有餘責劉敞與孫抃胡宿上奏曰臣等謹案春秋傳曰大祫者何祭也未毁廟之主皆升合食于太祖是以國朝事宗廟且百有餘年至祫之日別廟后主皆升合食遵用以為典制非無據也此皆更聖祖神宗盡心極慮制節垂法以貽子孫者也未易輕改且宋家宗廟之禮參用歷代因時施宜不専取于周唐何以言之如太宗真宗二帝並配三后孝章嘗母儀天下而享於別宫淑德以元妃正嫡亦享于別宫原其憲章沿革之始似出聖意自有所在若規以一家之學則紛然皆亂于上矣且行之巳久祝嘏宗史既守以為常若一旦輕議損益恐神靈不安亦未必當先帝意也議者乃謂四后之主于合食則貴有所屈于別享則尊得以伸然則且不疑于黜逺四后而獨豐于昵乎他年有司攝事四后皆預合食也今陛下昉欲躬齊戒奉祖禰而四后見黜不亦疑于以此禮之煩而不能事其先妣乎受命之君以創禮革典為急繼體之君以承志遵法為美先帝創之革之陛下承之遵之臣曰可矣宗廟之祭至尊至重茍未能盡祖宗之意則莫若守其舊禮疑文偏說未可盡據傳曰祭從先祖又曰有其舉之莫敢廢也此之謂也臣愚以謂如其故便敞又上奏曰臣近與孫抃胡宿等議后廟四主皆升合食宜依舊制不可輕改其說猶未詳盡不敢不陳臣伏以九經所載祫祭制度最明最備者莫如春秋公羊傳自漢以下凡議此禮皆引為證其文曰未毁廟之主皆升合食于太祖所謂未毁廟者豈有帝后之限哉此乃國朝所以依緣循守行之且百年者也聖祖神宗好禮稽古洞洞屬屬於宗廟之祭至重至慎知必不茍于追孝之禮也太祖臨御天下孝惠后主雖在別廟至禘祫之日巳自合食於太廟而祔祖姑之下矣祥符五年因禮官之奏又加考據酌中著為常典事更先帝皎若日月今羣臣不務推原春秋之法而獨引後儒疑近之說不務講求本朝之故而専倡異代難通之制不務將順聖上廣孝之心而輕議宗廟久行之儀欲擯隔四后使億萬斯年永不得合食于先帝臣竊恨之且四后陛下之妣也如孝惠在開寶之世尚合食于祖姑之次今陛下親享反不得望清廟之室於人情安乎昔貢禹議罷園廟羣臣和之者非一聽其言殆以謂雖周公復生不可得變元帝信之然而通人未以為當既而悔之則無及矣方衡議遷郊兆羣臣和之者亦非一聽其言殆以謂雖孔子復作不可得奪成帝信之然而通人未以為當田既而悔之則亦無及矣夫宗廟之禮神靈之位豈可使舉措不當數有後悔哉此自陛下當所留聖思也西漢衰敝之悔可以為戒且三代異物沿革異宜固未嘗相同今欲捨本朝而慕前代變先帝而述後儒隔絶祖妣排斥先后輕動宗廟之體易遷神靈之叙臣不知此中何禮也唯陛下裁慎知太常寺張洞等議四后廟饗奏曰臣等伏見國家每遇禘祫奉別廟四后之主合食太廟據唐郊祀志載禘祫祀文自獻祖至肅宗凡十一帝所配皆一后其間惟睿宗二后蓋昭成明皇之母也又續曲臺禮有別廟皇后合食之文蓋未有本室遇祫享即祔于祖姑之下所以大順中以三太后配列禘祭博士商盈孫以謂誤認曲臺禮意當時不能改正議者譏其非禮臣等伏思每室既有定配則餘后於禮不當升祔遂從別廟之祭而禘祫之日復來參列與郊祀志曲臺禮相戾今親行盛禮義當革正其皇后廟伏請依奉慈廟例遣官致祭仁宗親詣太廟行祫饗禮同判宗正寺趙良規請正太祖東向位禮官不敢決觀文殿學士王舉正等議曰大祫之禮所以合昭穆辨尊卑必以受命之祖居東向之位本朝以太祖為受命之君然僖祖以降四廟在上故每遇大祫止列昭穆而虛東向魏晉以來亦用此禮今親饗之盛宜如舊便學士歐陽修等曰古者宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則有别廟之祭本朝禘祫乃以別廟之后列于配后之下非惟于古無文于今又四不可淑德太宗之元配列于元德之下章懷真宗之元配列于章懿之下一也升祔之后統以帝樂別廟之后則以本室樂章自隨二也升祔之后同牢而祭牲器祝冊亦統于帝别廟諸后乃從専享三也升祔之后聨席而坐別廟之后位乃相絶四也章憲章懿在奉慈廟每遇禘祫本廟致享最為得禮若四后各祭于廟則其尊自申而于禮無失以為行之巳久重于改作則是失禮之舉無復是正也請從禮官八年修為參知政事又上奏曰臣近準敕差祭神州地祗于北郊竊見有司行事不合典禮據開寶通禮當先引行事官於東壝門外道南北向立次引入壝門就壇東南位西向行事蓋即事有漸自外而入於禮為宜今却先引行事官於壇邜階之側北向立次引東行向外就行事位由內而外乖背禮文臣遂于本院檢詳蓋是往年撰祀儀之時誤此一節今據祀儀四時及三王五帝上辛祈榖春分祀九宫朝日髙禖孟夏雩秋分夕月仲秋祀九宫貴神秋季大享明堂冬至祀昊天臘蠟夏至祀皇地祇及孟冬祀神州地祇凡一十七祭並係大祀一例錯誤並合改正依開寶通禮兼禮生贊唱生踈多不依禮文臣伏見朝廷近年新製祭祀器服修飭壇壝務極精嚴而有司失傳行事之際於禮繆誤伏乞下禮院詳定依開寶通禮改正祀儀及教習禮生使依典禮以上副聖朝精嚴祀事之意嘉祐六年諫官楊畋論水災繇郊廟未順禮院亦言對越天地神無二主唐始用三祖同配後遂罷之皇祐初詔三聖並侑後復迭配未幾復並侑以為定制雖出孝思然頗違經典當時有司失于講求下兩制儀翰林學士王圭等曰推尊以享帝義之至也然尊尊不可以瀆故郊無二主今三后並侑欲以致孝也而適所以瀆乎享帝非所以寧神也請如禮官議七月正月詔南郊以太祖定配七年知諫院司馬光論夀星觀御容狀曰臣等前者伏覩陛下幸夀星觀奉安真宗御容當是時臣等不知事之本末未敢進言自後方知本觀舊日止有先帝時所畫夀星近因本觀管幹內臣吳知章妄有奏陳稱是先帝御容意欲張大事體廣有興修自為勞效別圗恩賞陛下天性仁孝以為崇奉祖宗重違其請遂便畫先帝御容以易夀星之像改為崇先觀知章既得御容倚以為名奸詐之心不知紀極乃更求開展觀地別建更衣殿及諸屋宇將近百間制度宏侈計其所費踰數千萬向去增益未有窮期臣等竊以祖宗神靈之所憑依在于太廟木主而巳自古帝王之孝莫若虞舜商之髙宗周之文武未聞宗廟之外更有象設然後得盡至誠也唯髙宗祭祀親廟微為豐數故傳說曰黷于祭祀時謂弗欽禮煩則亂事神則難祖巳曰典祀無豐于昵蓋規之也後至漢氏始為原廟當時醇儒達禮靡不譏之況畫御容于道宫佛寺而又為夀星之服其為黷也甚矣且又太祖太宗御容在京師者止於興國寺啓聖院而巳真宗御容巳有數處今又益以崇先觀是亦豐于昵也無乃失尊尊之義乎原其所自來止因知章妄希恩澤乃敢恣為誣罔興造事端致陷朝廷於非禮今既奉安御容難以變更若只就本觀舊來已修屋宇固足崇奉所有創添屋宇伏乞一切停寢止令有司以時侍奉所有知章誣罔聖聰依託御容妄有干請廣興力役乞下所司取勘窮治奸狀明正其罪仁宗時同知太常禮院韓維上言曰臣等竊以宗廟之尊太祖者所以叙親眀統褒顯功德也叙親眀統則必正其本褒顯功德則不可私其人此聖人以義斷恩立禮而為之極也由禰巳上皆祖也皆則孰主而尊之曰始封曰受命曰有功非是三者雖屬之尊且親不得當也是天下之公法也子不敢豐於其父臣不敢厚於其君故尊太祖之道禮之大者有三於廟則百代不遷於天地之祭則為配主於祫享則位東向商以契周以后稷其毁廟之主皆出太祖之後故其禮順後世太祖之上復有追崇之廟故其禮疑所以諸儒論議不一然大抵不過三義一則直推見廟最尊之祖即唐顔真卿韓愈欲以獻祖居東向之位是也一則以追崇之祖别廟而祭全太祖之尊即漢之太上皇魏之處士晉之府君唐之獻懿是也一則以太祖尚在昭穆虛位以待自魏晉巳下訖於隋唐及本朝故事是也推最尊之祖者既非始封有功之君親盡則毁于聖人制禮之意殆恐不然別廟而祭者雖為變禮未可遽行于今其間惟虛東向之位于禮似近何也在禮父為士子為天子葬以士祭以天子葬且不敢厚其父況敢以天下之公法易其祖之位乎周禮黨正飲酒一命齒于鄉再命齒于父三命不齒且人臣尊父族尚不敢與之齒況在天子乎乃欲以追崇必毁之主加于萬世不祧之祖乎臣等再詳三者之論考於聖人之禮俱未合也直以最尊之主居東向之位是欲求禮之情虛東向之位以待太祖是欲守禮之文者也然而禮之情難見情一失則禮從而喪矣禮之文易守文在而聖人之意或可存也夫惟達禮之情文者然後能作此魏晉宋齊隋唐之君及我藝祖祖宗所以謙讓而不敢決也臣等以謂宜如祖宗故事虗東向之位便維又論溫成皇后不當立廟疏曰臣聞忠臣不為甽畝之逺而輟其圗報之心聖主不以芻蕘之賤而易其納善之慮故下靡不盡之情上無或遺之䇿臣位雖微賤然以討論載籍參議典禮為職竊不自薄有愛君之言惟陛下少加聽覽臣伏見國家為溫成皇后立廟備三獻官設五時之祭金石牢具一侔宗廟臣上求禮經下尋本朝故事皆所未有不知當時誰為陛下為此謀者臣聞孝惠皇后太祖皇帝之正配也其沒也即陵構殿嵗時所祀不過常饌而巳其後方得列於皇后别廟元德皇后真宗皇帝之母也其沒也別廟而祭自爾羣臣請升祔相繼先帝慎重其事不敢即從至于十年而後許之今陛下一旦奉嬪御之主廟而樂之與祖宗等稽於先王之禮則不合求之本朝之事則非故搢紳之士無所誦說下民觀之不知所化甚非太祖真宗慎重典禮之深㫖也伏惟陛下即位以來凡所興造必問于遺訓而咨於故實稀闊盛事靡不畢講今又將以孟冬吉時親祼宗廟修大祫之禮蓋祫者序昭穆正尊卑之祭也所宜罷黜不端昭示大順以成祀典之美而陛下以奉祖宗者巳之臣妾亦得享之非所以致隆極廣孝恭也臣愚以為宜因此時發德音詔有司使議溫成皇后之廟有不如禮者一皆裁去以明陛下不私後宫専奉祖宗之意使聖朝典制幽昧復光宗廟神靈歡欣顧享此盛德之舉也陛下不可不加聖意焉昔漢文帝幸上林袁盎引却慎夫人之坐以明妾主之義前史書之爛然不忘今崇建廟祏甚於上林之坐僭擬祖宗非特妾主之別陛下聖德過於漢文毋使愚臣不得申袁盎之志貼黃陛下若以溫成皇后久在左右不忘軫悼則嵗時遣宫監內侍厚加祭奠亦足致其恩意何必僭用禮典取譏後代此于溫成皇后非有所益而於聖德為損不細自陛下即位以來動循禮典未嘗有此過舉臣願陛下特奮神斷使有司得從改正以全盛德之美臣父子受國厚恩實欲以此少申補報幸不以臣位下而棄其言也英宗即位初以仁宗神主祔廟禮院請以太祖太宗為一世而增一室以備天子事七世之禮詔兩制與禮官考議孫抃等欲如之知審刑院通進銀臺司盧士宗以為在禮太祖之廟萬世不毁其餘昭穆親盡即毁示有終也自漢以來天子受命之初太祖尚在三昭三穆之數次祀四世或六世其以上之主屬雖尊於太祖親盡則遷故漢元帝之世瘞太上廟主於園魏眀帝遷處士主於園邑晉武惠祔廟遷征西豫州府君大抵過六世則遷其主蓋太祖已正東嚮之位則并三昭三穆為七世矣唐髙祖初祀四世太宗增祀六世太宗祔廟則遷𢎞農府君髙宗祔廟又遷宣宗皆前世成法惟明皇九廟祀八世於是為不經今大行祔廟僖祖親盡當遷於典禮為合不當添展一室詔抃等再議卒從八室之說議者咎之治平元年觀文殿學士孫抃等論明堂配侑奏曰臣等謹按孝經出於聖述其談聖治之極則謂人之行莫大於嚴父而配天仲尼美周公以居攝而能行天子之禮尊隆於父故曰周公其人不可謂之安在乎必嚴其父也又若止於太祖比后稷太宗比文王則宣祖真宗向者皆不當在配天之序推而上之則謂眀堂之祭真宗不當以太宗配先帝不當以真宗配今日不當以仁宗配也臣等按易豫之說曰先王作樂崇德薦之上帝以配祖考蓋若祖若考並可配天者也兹又符於孝經之說亦不可謂安在乎必嚴其父也祖考皆可配帝郊與明堂不可同位亦不可謂嚴祖嚴父其義一也雖周家不聞廢文配而移于武廢武配而移于成然則易之配考經之嚴父歷代循守固亦不為無說魏明帝宗祀文帝於明堂以配上帝史官謂是時二漢郊祀之制具存魏所損益可知則亦不可謂東漢章安之後配祭無傳遂以為未嘗嚴父也自唐至本朝其間賢哲講求誠不為少所不敢異者捨周孔之道無本統也今以為我將之詩祀文王於眀堂而歌者也亦安知非仲尼刪詩存周人全盛之頌被于管絃者獨取之也仁宗繼體保成置天下于大安者四十三年功德於人可謂極矣今祔廟之始遂抑而不得配上帝之享甚非所以宣章陛下為後嚴父之大孝臣等參稽典禮博考公論敢以前定議為便知制誥錢公輔等論明堂配侑奏曰臣謹按三代之法郊以祭天而明堂以祭五帝郊之祭以始之祖有聖人之功者配焉明堂之祭以創業繼體之君有聖人之德者配焉故孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝又曰孝莫大于嚴父嚴父莫大於配天則周公其人也以周公言之則嚴父也以成王言之則嚴祖也方是之時政則周公祭則成王亦安在乎必嚴父哉我將之詩是也後世失禮不足考據請一以周事言之臣竊謂聖宋崛起非有始封之祖也則創業之君是為太祖矣太祖則周之后稷配祭于郊者也太宗則周之文王配祭于明堂者也此二配至重萬世不遷之法也真宗則周之武王宗乎廟而不祧者也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移於武王也仁宗則周之成王也雖有配天之功而無配天之祭亦未聞康王以嚴父之故廢武王配天之祭而移於成王也以孔子之心推周公之志則嚴父也以周公之心攝成王之祭則嚴祖也嚴祖嚴父其義一也下至于兩漢去聖甚逺而明堂配祭東漢為得在西漢時則孝武始營明堂而以髙帝配之其後又以景帝配之孝武之後無聞焉在東漢時則孝明始建明堂而以光武配其後孝章孝安又以光武配孝安之後無聞焉當始配之代適符嚴父之說及時異事遷而章安二帝亦弗之變此最為近古而合乎禮者也有唐始在孝和時則以髙宗配之在明皇時則以睿宗配之在永泰時則以肅宗配之禮官杜鴻漸王涇輩皆不能推明經訓務合古初反雷同其論以惑時主延及于今牢不可破當仁宗嗣位之初儻有建是論者配天之祭當在乎太宗矣當時無一人言者故使宗周之典禮不明於聖代而有唐之曲學流敝乎後人願陛下深詔有司博謀羣賢使配天之祭不膠于嚴父而嚴父之道不専乎配天循宗周之典禮替有唐之曲學知諫院司馬光論明堂配侑疏曰臣等竊以孝子之心誰不欲尊其父也聖人制禮以為之極不敢踰也故祖巳訓髙宗曰祀無豐于昵孔子與孟懿子論孝亦曰祭之以禮然則事親者不以數祭為孝者貴于得禮而巳先儒謂禘郊祖宗皆祭祀以配食也禘謂祭昊天于圜丘也祭上帝于南郊曰郊祭五帝五神于明堂曰祖宗故詩曰思文后稷克配彼天又我將祀文王於眀堂此其證也下此皆不見於經矣前漢以髙祖配天後漢以光武配眀堂以是觀古之帝王自非建邦啓土及造有區夏者皆無配天之文故雖周之成康漢之文景眀章其德業非不美也然而子孫不敢推以配天者避祖宗也孝經曰嚴父莫大於配天則周公其人也孔子以周公有上聖之德成太平之業制禮作樂而文王適其父也故引之以證聖人之德莫大於孝答曽子之問而巳非謂凡有天下者皆當以父配天然後為孝也近世祀眀堂者皆以其父配五帝此乃誤識孝經之意而違先王之禮不可以為法也景佑二年仁宗詔禮院官稽按禮典辨崇配之序定二祧之位乃以太祖為帝者之祖比周之后稷太宗真宗為帝者之宗比周之文武然則祀真宗于眀堂以配五帝亦未失古禮今仁宗雖豐功美德洽于四海而不在二祧之位議者乃欲捨真宗而以仁宗配享眀堂恐於祭法不合又以人情言之是絀祖而進父也夏父弗忌躋僖公先兄而後弟孔子猶以為逆祀書於春秋況絀祖而進父乎必若此行之不獨乖違典禮恐亦非仁宗意也臣等竊謂宜遵舊禮以真宗配五帝于眀堂為便光又乞改郊禮劄子曰臣聞古者天子親祀上帝一嵗有九國朝之制天子三嵗一郊仍于其間改用他禮者甚衆豈奉天之意有所倦略哉蓋事有不得巳者也臣竊見國家帑藏素空重以暴雨為災圜丘之側流潦尚深青城之材頗多散失儀仗法物損敗非一今若悉加完葺恐難猝備加以冬寒將近諸營漂沒失其生業屋宇敗壞衣褐俱盡陛下儻欲別加振救亦恐力所不支昔太宗太平興國元年下詔東封尋以火災而止更用郊禮又淳化三年下詔祀圜丘亦以事故更用眀年祈榖今災變至大國用不足臣謂不可不小有變更若因兹天譴隨時損益以九月十月之間于大慶殿恭謝天地亦足以展純潔之誠昭寅畏之志減省大費安慰衆心事無便於此者陛下儻以為可願決意早行之知太常禮院李育上奏曰郊廟之祭本尚純質衮冕之飾皆存法象非事繁侈重竒玩也冕則以周官為本凡十二旒間以采玉加以紘綖笄瑱之飾衮則以虞書為始凡十二章首以辰象别以衣裳繪繡之采東漢至唐史官名儒紀迹前制皆無珠翠犀寶之飾何則鷸羽蚌胎非法服所用琥珀靈犀非至尊所冠龍錦七星巳列采章之內紫雲白鶴近出道家之語豈被衮戴璪象天則數之義哉自大裘之廢顓用衮冕古朴稍去而法度尚存夫眀水大羮不可以衆味和雲門咸池不可以新聲間衮冕之服不宜以珍怪異也若魏明之用珊瑚江右之用翡翠侈靡衰播之餘豈足為聖朝道哉且太祖建隆元年少府監所造冕服及二年博士聶從義所進三禮圗嘗詔尹拙竇儀參校之皆倣虞周漢唐之舊至四年冬服之合祭天地於圜丘用此制也太宗亦嘗命少府製于禁中不聞改作及真宗封太山禮官請服衮冕帝曰前王服羔裘尚質也今則無羔裘而有衮冕可從舊制是豈有意於繁飾哉蓋後之有司率意妄增未嘗榷議遂相循而用故仁宗嘗詔禮官章得象等詳議之其所減過半然不經之飾重者多去輕者尚存不能盡如詔書之意故至和三年王洙復議去繁飾禮官畫圗以獻漸還古禮而有司所造復如景祐之前又案開寶通禮及衣服令冕服皆有定法悉無寶錦之飾夫太祖太宗位有四海豈乏寶玩顧不可施之郊廟也臣竊謂陛下肇祀天地躬饗祖禰服周之冕觀古之象願復先王之制祖宗之法其衮冕之服及韠綏佩舄之類與通禮衣服令三禮圗制度不同者宜悉改正詔太常禮院少府參定遂合奏曰古者冕服之用郊廟殊制唐典天子之服有二等而大裘尚存顯慶初長生無忌等采郊特牲之說獻議廢大裘自是郊廟之祭一用衮冕然旒章之數止以十二為節亦未聞有餘飾也國朝冕服雖倣古制然增以珍異巧縟前世所未嘗有夫古之大事莫大於祀而祭服違經非以肅祀容尊神眀也臣等以謂宜如育言參酌通禮衣服令三禮圗及景祐三年減定之制一切改造之孔子曰麻冕禮也今也純儉吾從衆純者絲也變麻用絲蓋巳久矣則冕服之制宜依舊以羅為之冕廣一尺二寸長二尺二寸約以景表尺前圎後方黝上朱下以金飾版則以白玉珠為旒貫之以五綵絲繩前後各十二旒旒各十二珠相去一寸長二尺朱絲組為纓黈纊充耳金飾玉簮導青衣纁裳十二章八章繪之于衣日月星辰山龍華蟲火宗彛也四章繡之於裳藻粉米黼黻也錦龍標領織為升龍山龍而下一章為一行重以為等行十二別製大帶素表朱裏緑終辟韠紱舄大小綬亦去珠玉鈿窠琥珀玻瓈之飾其中單革帶玉具劒玉佩朱襪之制巳中禮令無復改為則法服有稽祭禮增重從之育又上言南郊太廟二舞郎總六十四文舞罷舍羽籥執干戚就為武舞臣謹按舊典文武二舞各用八佾凡祀圜丘祀宗廟太樂令率工人以入就位文舞入陳於架北武舞立於架南又文舞出武舞入有送迎之曲名曰舒和亦曰同和凡三十一章止用一曲是進退同時行綴先定步武容體各應樂節夫至德升聞之舞象揖讓天下大定之舞象征伐柔毅舒急不侔而所法所習亦異不當中易也竊惟天神皆降地祇皆出八音克諧祖考來格天子親執圭幣相維辟公嚴恭寅畏可謂極矣而舞者紛然縱橫於下進退取舍蹙迫如是豈眀有德象有功之誼哉國家三年而舉一郊同殿而享八室而舞者闕如名曰二舞實一舞也且如大朝㑹所以宴臣下而舞者備其數郊廟所以事天地祖考而舞者減其半殊未為稱事有近而不可述禮有繁而不可省所繫者大而有司之職不敢廢也伏請南郊太廟文武二舞各用六十四人以備帝王之禮樂以明祖宗之功德奏可侍御史知雜事吕誨乞罷郊宫無益工作奏曰臣竊以國家之大事莫重於郊祭罄明察之心尚質崇簡所以稱天子之德也天神之祐答以靈貺享是精誠而巳陛下纂紹之初方修大禮自詔下中外災祥屢至霖雨之後積隂不解繼之以雪民之困窮飢凍迫切咨怨之聲喧于衢路且人心恱則天意順今民憂結不解和氣從何而生乎殆陛下奉天之意有所未至佐佑之臣或慢其事未盡䖍恭之誠爾況冬至俯邇乘輿臨幸之處經雨摧壞未修者尚多期限既促督役愈急在有司不得不然也豈唯冒寒工作滅裂枉費物料罷癃之卒不僵仆則自經而死可勝其數傷和氣之尤甚臣以為陛下一意崇祀經歷之處雖有頽垣壞居何害于行禮宜尚質崇簡以副天心如臨祭之處土木興作丹雘雕飾青城浮華之設工作無益者權令停罷少寬人力以塞怨望至若災沴之際禱祈之事固亦有之惟當遣輔臣詣宫觀齊潔求晴然人臣未足以動天釋老何德以庇民所切者陛下之誠宣布於外聊以慰都人之望此二事唯聖慈留念早降指揮祀事更在䖍修以召和氣臣不勝惓惓之至治平中西亰㑹聖宫將創仁宗神御殿馬默上言曰事不師古前典所戒漢以諸帝所幸郡國立廟知禮者非之況先帝未嘗幸洛而創建廟祀實乖典則願以禮為之節義為之制亟止此役以章清靜奉先之意英宗時殿中侍御史趙鼎奏請遞遷真宗配孟夏雩祭以太宗専配上辛祈榖孟冬祀神州地祇循用有唐故事翰林學士王圭等議曰天地大祭有七皆用歷代故事以始封受命創業之君配神作主至於眀堂用古嚴父之道配以近考故朝廷在真宗時以太宗配在仁宗時以真宗配今則以仁宗配方仁宗始罷太宗眀堂之配太宗先巳配雩祈榖及神州之祭本非遞遷今眀堂既用嚴父之道則真宗配天之祭於禮當罷不當復分雩祭之配臣等謹議圭等又奏准詔下兩制定議仁宗祔廟當以何人配享臣等伏以仁宗享國長久勵精致治以知人之眀得馭臣之體是以豪英材傑樂為之用外宣威靈內經廟略臣主感㑹馴致太平輔相則有故尚書左僕射贈尚書令諡文正王曽忠允清亮履德經哲致位上宰燮和大政乾興之初輔翊兩宫仗正持重中外以安所謂以道事君無愧前哲故太尉贈尚書令諡文靖吕夷簡聰明亮達規模宏逺服在大僚歷登三事左右皇極勤勞王家二十餘年厥功茂焉將帥則有故彰武軍節度使檢校太傅侍中諡武穆曺瑋敦詩閲禮秉義經武參謀帷幄折衝萬里鎮綏方面隱如長城加以恂恂循道有古名將之風焉皆有功迹見稱於世伏請並配饗臣等謹議圭又言准中書批送下太常禮院狀太常博士祕閣校理裴煜奏大祠天地日月社稷其行禮日與國忌同者自慶歷至嘉祐凡八祠皆援太常新禮天禧二年六月十七日立秋祀白帝以文懿皇后忌同樂備而不作伏緣忌日必哀志有所至其不有樂宜也然樂所以降格神祗非以適一巳之私也在禮固不可闕謹案開元中禮部建言忌日享廟應用樂裴寬自以情立議廟尊忌卑則作樂廟卑忌尊則樂備而不奏中書令張說以寬議為是宗廟如此其天地日月社稷用樂明矣臣愚以為凡大祠天地日月社稷與忌同者伏請用樂其在廟如寬之議所冀略輕存重不失其稱又五方及感生帝皆大祠其從祀牲用羊一豕一蠟祭正位從祀一百九十有三牲用羊二豕二釋奠雖曰中祠至聖文宣王配位從祀九十有三昭烈武成王配位從祀七十有五牲用羊一豕一刲割殆不遍足臣謂宜度大祠中祠從祀之位其以差加之又立夏祀赤帝竊見祝版御所自署其恭且嚴如是諸祠而太府寺所供香殊為鮮不稱崇祀之意本院據禮云君子有終身之憂而無一日之患謂忌日也忌日不樂謂不舉吉事也然而禮令即無忌日饗廟廢樂之文至唐始有祭與忌日同則縣而不樂裴寬建議廟尊忌卑則作樂廟卑忌尊則樂備而不奏當時雖從寬議亦無典據臣等按禮家之說祭天以煙為歆神之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始宗廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為致神之始故曰大祭有三始謂此也天地之間虛豁而不見其形狀者陽也鬼神居天地之間不可以人通接也聲屬於陽故樂之音聲號呼召於天地之間庶幾神眀聞之因而來格故祭必求諸陽商人之祭先奏樂以求神先求於陽也次灌地求神於隂達于淵泉也周人尚臭四時之祭灌地以求神先求諸隂也然則天神地祇人鬼之祀不可去樂明矣今七廟連室每遇薦饗作樂難分廟忌之尊卑欲依唐舊制及國朝故事廟祭與忌同日並縣而不作其與別廟諸后忌同者作之若祠天地日月九宫太一及䄍百神並請作樂社稷以下諸祠既卑於廟則樂不可為如此則雖不能純用三代之禮亦可廣孝思之至祀五方感生帝䄍百神釋奠文宣武成從祀者衆其用牲既少爼實幾不能充今宜加五感生帝羊二豕二百神羊五豕五文宣武成羊三豕三中祠小祠太府寺所供香大祠宜視中祠之半中祠宜視小祠之半諸大祠降御封香並請如祀昊天上帝之禮臣某等議社稷國之所尊其祠日若與別廟諸后忌同請不去樂餘並如禮官所議臣某等謹議英宗詔近臣議仁宗配祭故事冬夏至祀昊天上帝皇地祇以太祖配正月上辛祈榖孟夏雩祀孟冬祀神州地祇以太宗配正月上辛祀感生帝以宣祖配季秋大饗明堂祀昊天上帝以真宗配而學士王圭等與禮官上議以謂季秋大饗宜以仁宗配為嚴父之道知制誥錢公輔獨謂仁宗不當配祭給事中王疇以謂圭等議遺真宗不得配公輔議遺宣祖真宗仁宗俱不得配於禮意未安乃獻議曰請依王圭等議奉仁宗配饗明堂以符大易配考之說孝經嚴父之禮奉遷真宗配孟夏雩祀以倣唐貞觀顯慶故事太宗依舊配正月上辛祈榖孟冬祀神州地祇餘依本朝故事如此則列聖並侑對越昊穹厚澤流光垂裕萬祀必如公輔之議則陷四聖為失禮𨗳陛下為不孝違經戾古莫此為甚而朝廷以疇論事有補帝與執政大臣皆器異之殿中侍御史范純仁奏乞夀聖節上夀不用樂狀曰臣伏聞將來夀聖節在上辛祀天致齊之內於禮不合用樂而太常禮院議稱用樂無妨伏緣祀天致齊行自古昔誕辰上夀起於近朝以禮較之祀天為重昨來郊祀小次黃褥皆是有司於禮合陳而陛下虛次徹褥以示至恭臣民歡然歌頌聖德若今來致齊之內却許用樂則恐前後之禮不侔伏望聖慈指揮將來上夀以致齊之內權不用樂則不惟合於典禮亦使中國四夷知陛下克巳奉天尊禮化民之意知諫院傅堯俞乞減節南郊費用疏曰臣伏見郊祀日迫而大雨為災壞儀仗法物及衢道垣屋極多恐百司供億不易辦集然陛下始見上帝大禮或不可中止即乞百事一從減節既以省國費愛人力又可以致恐懼修省之誠昔真廟咸平五年當天下完富之日尚以郊祀費重減應奉雜物十萬六千計況今災沴如此者乎夫器用陶匏掃地而祭蓋天下之物無可以稱其德者故達誠而巳今彌文萬變皆無益於事以典禮裁之可省者非一惟陛下留意早賜施行知制誥劉敞上奏曰臣伏見中書劄子下太常雜議奉慈廟廢置事臣以有司之職唯當據經巳與范鎮等參按經傳舊文奏陳然臣之愚意猶有未盡何者國家承歷代之後去聖久逺禮文殘缺宗廟之禮常因時施宜不盡滯古務沿人情也伏惟章惠太后之於仁宗皇帝雖非真廟命以為母然仁宗皇帝一以如母之禮事之生則安養號比長樂歿則大葬諡配真廟祭稱皇妣祝云嗣子其誠禮如此之重也今議者疑於毁其廟瘞其主如此豈唯震駭士大夫之情亦甚違先帝之意春秋毁泉臺猶曰先祖為之巳毁之不如勿居周廟姜嫄閟而無事梁之小廟享祫有數臣謂奉慈一室當於此二者之間制定其儀上稱先帝褒崇之意下成泉臺折衷之義又以眀聖主無改父道之美伏乞參之聖心令兩制臺諫重加詳定神宗即位初英宗當祔廟司馬光上議祧遷狀曰臣准學士院告報以大行皇帝神主祔廟僖祖神主當遷夾室准朝㫖令待制以上同議者臣先于嘉祐八年仁宗祔廟之時巳曽與龍圗閣直學士盧士宗上言僖祖當遷夾室當時議臣皆不以為然朝廷遂從衆議臣謹按王制稱天子七廟三昭三穆與太祖之廟而七明太祖之外止有三昭三穆而巳是以前代帝王於太祖未正東嚮之時大率所祀不過六世若僖祖於今日方議祧遷則是太祖之外更有四昭三穆與太祖之廟而八不合先王典禮難以施於後世臣愚以為仁宗祔廟之時僖祖巳當遷於夾室今大行皇帝祔廟順祖亦當遷於夾室臣既承詔㫖命得與議不得不盡所見以對伏乞朝廷更賜詳擇御史知雜事劉述乞罷英廟神御殿奏曰臣聞治天下者禮義而已耳禮義之於人猶繩墨之於曲直鹽梅之於和羮適於正與和而巳舍正與和君子弗由也先王之道能垂法於後世而治天下不及於亂者其禮義行於其間乎禮義之大原莫先乎宗廟宗廟之制自天子至于士皆有隆殺之辨故有天下者事七世此萬世不易之道而唐虞三代之所隆也書曰七世之廟可以觀德易觀之辭曰觀盥而不薦有孚顒若下觀而化也說者曰王道可觀莫盛于宗廟其可觀者廟貌云乎哉以其尊祖奉親之道備于此則人將觀而化之矣詩曰於穆清廟肅雍顯相傳曰清廟茅屋昭其儉也是皆不貴乎廟貌之隆而在乎恭莊清潔之至也故春秋書立武宫丹楹刻桷之類孔子惡其僣奢瀆亂之甚非所以交神明也奈何兩漢而下事不師古孝惠惑叔孫通之言而遂立原廟宣帝之廟各於郡國陵旁立之是時天下之廟合一百七十餘所逮及東漢則每帝即位而各立一廟繇漢而下何其臆說之紛紛而制度之不一也原其所以亂禮之由蓋叔孫通率一時之意以售其諂遂置孝惠于有過之地而通亦不免為萬世之罪人噫宗廟之設將以致孝思而風天下今乃以不經之制紊亂先王之禮義以瀆祖宗之神靈襲而行之何不思之甚邪今國家有天下百餘年太平之日可謂久矣歷代沿襲之弊固宜革矣宗廟之祭固當求合於堯舜三代之禮然其間尚有因循未革之弊而使尊祖奉親之義未盡合於古者臣伏見祖宗以來宗廟之外皆別立神御殿于國中又于陵旁置會聖宫稽諸堯舜三代之禮則無聞焉迹其所起蓋由當時佞諛之臣及宦官女子之輩援漢唐侈謬之說贊成其事耳今國家崇奉宗廟非不嚴而四時之薦享非不備又何必區區徇漢之遺敝務竭府庫有限之財以成不經之事乎以至窮奢極侈錯以金璧類如浮屠氏之所居嵗時車駕朝謁用僧道威儀教坊鼓吹雜陳於其間朝廷之意蓋欲罄尊奉之禮而極追慕之心然而觀其所以奉先追逺之道有戾于古適足以瀆慢祖宗之神靈紊亂先王之禮法何所益哉漢儒嘗奏罷郡國廟引清廟之詩言交神眀之禮無不清靜今衣冠出逰有車騎之衆風雨之氣非所以為清淨也祭不欲數數則瀆瀆則不恭宜復古禮四時祭於廟可謂確論矣祥符初國家夷夏謐寧公私贍給可謂全盛矣不能于此時講求闕典追復堯舜三代之盛以遺子孫萬世之謀而乃右尚釋老營造宫觀窮天下之力而不能厭其夸大之心曽未三二十年化為煨燼而僅有存者天意之所警戒顧弗明著耶蓋當時姦邪得君忠鯁結舌遂致人主有此過舉之事耳可不惜哉孔子在齊聞周先王廟災曰此必釐王之廟齊侯曰何以知之曰夫釐王變文王之制而作煩黃華麗之飾宫室崇峻故天殃所宜加其廟焉皆是古今巳事之驗也嘉祐癸邜仁廟棄天下今兹不幸先皇厭世喪禮山陵之費為不少矣雖陛下哀閔元元率遵遺制而務從儉約然五年之間兩經大禍國帑匱乏民力凋困祖宗以來未有甚於今日也臣今竊慮朝廷將循祖宗故事復立先皇神御之殿此議一舉費以億計今天下財賦耗削公私疲病加以水旱蟲蝗之災仍嵗不絶兩河流民相屬於道朝廷尚患無粟以振恤之不過賣祠部牒誘民鬻爵以賙之耳戎狄倔彊邉不弛備盜賊嘯聚所在為患萬一饑饉之災綿地數千里不識將何以濟之乎言之可為寒心鄉者仁廟一殿之費無慮八十萬緡今若為之當不減是奈何違聖王之禮循不經之說以瀆先帝之神靈以竭縣官之財用乎有難臣者謂祖宗以來皆有此制而于先皇獨不然為人子為人臣者忍遽廢之乎此前所謂佞諛之臣宦官女子輩之所見耳盍以先聖王之道天下至公之議為陛下開陳之臣竊觀陛下天姿英睿懋昭大德始議修奉厚陵則面戒執政以奉承先志節省浮費天下必不以我為不孝大哉聖人之孝德可謂善繼人之志善述人之事者也陛下能以大孝之心欽若先帝之志臣敢不以大忠之言為陛下開陳之乎孟子謂景公曰我非堯舜之道不敢以陳於王前故齊人莫如我敬王也非臣愚戅不識忌諱不敢為陛下建此謀非陛下聖德天縱超邁今古不能行此事欲乞以臣此狀下兩制臺諫禮官同共詳定如有可采伏乞斷自聖心以復堯舜三代之典以為子孫萬世之法則臣雖死之日猶生之年天下幸甚歷代名臣奏議卷十九
