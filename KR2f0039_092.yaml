body:
  text: 歷代名臣奏議卷九十二明楊士竒等撰經國宋孝宗時著作郎王十朋上疏曰臣聞國猶身也強國與身者氣也醫者觀身之氣而知其人之夀夭識者觀國之氣而知其世之興衰自古帝王圖維天下雖謀之以智辦之以才必以氣為之主然後大業以濟劉項之爭雄也項自謂力拔山氣蓋世非也要之項之失天下也蓋以力而劉之得天下也蓋以氣夫百戰百勝一不勝而自謂天亡者氣何在哉屢戰屢敗而不為之屈卒之易敗為勝轉弱為強者氣也蜀先主英姿大度有髙帝風兵雖屢挫而終不為曹操屈吳孫權聞周瑜之言拔刀斫案遂成赤壁之雋功吳蜀之勢非魏敵也然而能霸有一方鼎足而立者氣使之然也臣來自草茅得之道路謂廟堂之上謀議之臣和戰守之議閧然未決茲理固洞然易曉議者何不思之耶臣謂養今日之氣莫如守伸今日之氣莫如戰挫今日之氣莫如和今我兵寡力弱國威未振固未能與之決雌雄於一戰以伸天下之氣也正須養之使壯俟時而動宜於荆襄江淮要害之地如人身之可以禦風寒者數處命大將屯重兵以固守之縱未能得志於中原亦足以據長江之險都帝王之宅保吳蜀萬里之故疆何故屈己買和蹈前日之覆轍耶大抵天下之勢強弱均而和則彼此受其利晉與諸戎和我與契丹和是也強弱不均而和則強者得其利弱者被其害六國與秦和契丹與女真和是也敵以和議譎契丹而滅契丹矣又以和議譎中國而困中國矣耿南仲主和議而致靖康之禍秦檜主和議而弱國家之勢太上皇知敵之無厭而和之不可保也去嵗下親征之詔而天下二十年湮鬱之氣亦少舒矣雖淮上之師不利而敵之被毒亦甚矣陛下應天受禪天下罔不歡欣鼓舞咸謂真主既出恢復指日可期也陛下宜親御鞍馬如漢文帝慨然發憤如唐憲宗撫循六師以作將士之氣以圖進取之計況陛下之聖德可以動天陛下之節儉可以豐財陛下之英武可以定亂江淮有重臣以為長城川陕有良將以為爪牙亦何患事之不濟耶不然宜因天設之險以為城池與民守之可也茍或復用和議則軍民解體雖茍一時之安而氣已為之索矣百萬之嵗幣固有所不惜也至尊之名分其可自貶損於嗣登大寶之初乎諸將用命血戰新復數路其可復捐而與之乎西北之民襁負來歸者不知其幾又可復委之敵人而使之甘心乎況講和之後舉天下唯敵之命是聽無厭之求難塞之請當不止此陛下將何以應之乎臣謂今日之計戰固未可輕和決不可議守以養氣俟時而伸乘機而投而已十朋為侍御史上疏曰臣聞聖人之德無以加孝天子之孝莫大乎光祖宗而安社稷因前王盈成之業而守之者孝也周之成康漢之文景是也承前世衰微之緒而興之者孝也商之髙宗周之宣王是也國有恥而雪之者孝也漢宣帝臣單于以雪髙帝平城之恥唐太宗俘頡利以雪髙祖稱臣之恥是也先君有讎而復之孝也夏少康滅澆以復后相之讎漢光武誅王莽以復劉氏中絶之讎是也歷代帝王雖守成中興雪耻復讎之迹不同其功光祖宗孝安社稷則一而已我藝祖皇帝應天受命肇造大業親平僭偽一統萬方聖子神孫繼繼承承可謂盛矣不幸運厄陽九勍敵侵陵靖康之禍有不忍言者國讎世恥自古無之記曰君父之讎不共戴天春秋譏不討賊以謂國無臣子齊襄復九世之讎仲尼賢之楚以六千里之國事讎荀卿罪之聖賢立言垂訓責後世之為君臣為子孫者可謂至矣恭惟太上皇帝躬堯舜至聖之德有禹文知子之眀斷自宸衷以社稷付之陛下聖意端有在焉陛下天資英武慨然以興復為念竊聞每對羣臣論天下事則曰當如創業時又曰當以馬上治之又曰某事當俟恢復後為之臣比因宣召語及祖宗陵寢聖容惻然曰四十年矣臣仰知陛下之心真夏少康商髙宗周宣王漢光武之心也奈何在位之臣不知忠孝大節不能仰副聖心之萬一復欲蹈昔日姦臣之覆轍屈己以和仇讎之人且指祖宗中原之境土為金人之土謂不當取指祖宗中原之人民為金之人民謂不當納又取秦隴已復之故地無故而棄之以資冦讎以絶生靈歸附之望聞有説進取者則羣嘲而聚笑之大臣唱之於上小臣和之於下并為一談牢不可破自非陛下剛眀果斷不惑羣議則社稷大計其誰與謀有君無臣真可以長太息也臣願陛下推誠盡孝終始如一言動之間不忘社稷食息之頃必念祖宗側身修行上以承天意興衰撥亂下以慰民心任賢勿二去邪勿疑以革前日圖任之失有善必賞有惡必罰以振今日紀綱之敝乃下詔音戒飭有位無小無大咸懷忠良去和附之私心贊國家之大計陛下既率之以孝羣臣咸應之以忠如是則可以動天地通神眀慰祖宗在天之靈無負太上皇付託之意矣中原何患乎不復中興何待乎以日月冀耶十朋又上疏曰臣恭惟陛下以英武之姿奮剛眀之斷不惑羣議任用忠謀遣二將臣出征淮甸首平靈壁敗敵將蕭琦而降之又平虹縣降富察及穆大周仁歸附者以萬計又敗敵人于宿而得其州可謂日百里以闢國月三捷以奏功矣投機而進勢如破竹恢復有期神人交慶正勇者效力智者獻謀時也況臣誤蒙親擢為耳目之官可無愚者一得之慮以裨廟謨雄斷之萬一乎臣竊謂王者仁義之兵為弔伐而舉況中原本吾土地人民本吾赤子正宜諭之以恩信先之以招納不得已而戰伐隨之臣慮諸將或不知此臨陳之際未必無過有殺傷捷獲之後又未必無秋毫之犯恐傷陛下好生之德失中原來蘇之望欲乞陛下密詔張浚深戒敕之昔李晟平長安李訴入蔡國朝曹彬平金陵皆得王師弔伐之意宜諭諸將以此為法庶幾富貴可以及子孫功名可以垂竹帛也又此三將既降宜速加封爵以勸來者昔沛公入關留圍宛城陳恢説以莫若約降封其守因使止守諸城未下者必聞聲爭開門而待之沛公從其言南陽守齮降封為商侯封陳恢千戶引兵西無不下者今中原列城為敵守者聞皆有離心非不欲降但未知吾所以待之者何如耳彼聞蕭琦富察之徒降而受賞亦何憚而不來不然則其心愈疑而其守愈堅矣今日之事正宜若沛公用陳恢䇿則可以不戰而屈人兵也臣又聞汪徹被召已至中途未知誰攝其任臣謂宜令張浚并節制荆襄庶得令出于一輕重不偏將士協心逺近同體緩急可以相聞勝負可以相援况荆襄將士素懷浚恩德皇甫倜之徒尤服浚威名若使浚兼制之則人必樂於用命矣又吳璘退師保蜀陛下亦宜以進取事詔之且明諭以前日退保由建議者之失不惜為悔過語以慰將士及三路人心令璘觀時度勢以圖進取如秦隴可復得宜即進兵以相犄角以牽制敵人南牧之患如是則敵數處受敵救覆亡之不暇縱未必來臣附亦將自歸故國矣此數者皆今日之所甚急臣願陛下與一二大臣速議如臣言可採乞賜施行今正是天以機會受陛下時不可失也十朋論用兵事宜劄子曰臣竊以今日之事有不可輕改者曰用人有不可不決策者曰進蹕有不可不深慮者曰荆襄有不可不急治者曰兵賦自古人君相與圖進取之計必有一定不易之規模知一勝一負為兵家常勢故小勝不為之喜小敗不為之沮秦穆用孟明三敗而後霸西戎漢髙爭天下屢敗而後擒項羽諸葛亮才兼文武而有馬謖街亭之敗至於上表自劾蜀主不廢之卒能與吳魏抗衡而功蓋三分之國國朝范仲淹韓琦皆一代名臣俱有材略其經略西夏也而亦有任福三川之敗仁祖不廢之卒能臣元昊而安中國此皆規模素定於胸次故能收異日之大功臣聞前日淮甸之師一月三捷宿州不利蓋亦兵家勝負常勢也異議者遂從而搖撼將帥之臣且謂大將不還以貽聖慮今李顯忠邵宏淵及諸統制軍馬已回濠泗矣亦足見小人幸災樂禍扇為浮言務在中傷不可不察也恭聞陛下遣中使給御札慰安張浚撫勞將士仍放顯忠等罪憫其血戰之勞而赦其一眚之愆真得前古帝王御將之道矣然外議洶洶謂陛下宣召楊存中欲用為主帥臣竊料聖意必不然然當人情紛擾之際不能無市虎之惑既而聞之初欲除荆襄宣撫又改御營使及聞邉報稍寧其議遂寢疑者雖稍息而不能無慮焉存中為將罔功天下皆知之黷貨無厭交結中外爵位已極而求進不已彼其心但幸國家之有禍遂欲投隙而進亦何求而不得耶御營使不已必將有大於此者命令一出必失軍民之心使江淮荆襄隴蜀將士聞之必致解體且謂朝廷因王師小衄而遽欲變易大帥非所以安人情威域外也臣所謂不能無患者在此建炎紹興間太上皇巡幸止用宰相樞密為御營使李綱朱勝非等嘗為之陛下將為視師之舉宜遵用故事以兩府大臣兼之足矣朝廷雖乏才其可以此輕處存中輩耶此事尤在聖心素定不可變易於倉卒之間此臣所謂不可輕改者曰用人也臣聞天下之勢不在國之強弱而在氣之如何氣振則轉弱而為強氣沮則變強而為弱股至強而懼則栗氣餒之也髮至弱而怒則衝氣激之也景德間契丹舉國南冦王欽若請幸金陵陳堯叟請幸蜀以避其鋭真宗以問冦準準曰誰為陛下畫此䇿者罪可斬也今敵騎近迫四方危心當勵衆禦敵以衛社稷惟當進尺不可退寸奈何欲委棄宗廟逺之楚蜀鑾輿回轉一步則萬衆雲散四方瓦解楚蜀尚可至耶真宗善其計乃幸澶淵將士鼓勇射殺敵將其衆遂退此作氣以破敵轉弱而為強之尤大者也前年太上皇下親征之詔為建康之幸作士氣以走敵騎蓋得策矣惜乎議者不建逺大之計而遽回臨安也陛下前日下詔視師中外鼓舞秋涼進發或者猶以為遲今王師退保濠泗督府逺在盱眙陛下宜速進蹕以幸建康居六朝帝王之宅據東南形勢之勝可以援吳蜀可以控四方可以逺海道之虞可以壯淮甸之勢四方聞之孰不增氣至若百司之衆在今宜省犒勞之費比舊宜節庶幾萬騎易動如聖訓所謂當如創業時此臣所謂不可不決䇿者曰進蹕也臣聞荆襄居天下形勢之中乃古今必爭之地萬一敵人乘虛而入使川陕隔絶則東南之勢孤矣近聞朝廷既罷汪徹命張浚兼都督之使令出於一固已得䇿又用王彥知襄陽議者以為得人又聞以彥節制趙撙則或以為不可撙久在荆襄得士卒心彥自外來遽令受其節制恐武臣氣不相下或生釁端兼張浚在淮去荆襄逺甚或有機會恐關報失期臣謂宜於前兩府侍從中擇一重臣威名稍著者以為宣撫既以浚督之又以重臣制之使彥與撙輩各當一面則荆襄可以無虞矣今朝廷知備淮甸而逺荆襄此臣所謂不可不深慮者此也今國家大則為進取之圖次則為守禦之計然議論及兵則其言必怯者以其所乏者兵與財也則兵不可以不招財不可以不理竊聞西北歸附之民其有可以為兵者衆督府及諸將不敢多募之者懼國家有飬之之費也然今日之勢有不得不招宜命張浚諭江淮荆襄諸將招其可用者而籍之汰其無用者而民之縱未至多亦可補填折傷之額又東南之民亦有可用者如江西福建及台之仙居婺之東陽諸處其人皆健而善鬪往往曹聚於茶商鹽賈間可令守帥之臣重其直以招之必有應募者廣海諸冦有就招安者可從而籍之州縣有犯茶鹽禁者貸其罪而兵之亦可以少補軍籍也至如財者臣以為生之不如節之今國家比天下全盛太平無事時非不節約比祖宗創業艱難時則可省非一也乾德開寶間宫人不滿二百猶以為多左右內臣止有五十餘員止令掌宫掖未嘗干預政事宫殿內帷挂青布緣簾緋絹帳紫紬褥今宫人之數內臣之員豈能盡如藝祖時乎臣前日曽奏欲聖躬親率之者蓋欲以藝祖為法也近日臺諫所議裁減雖日計不足而嵗計有餘亦不為無補然奏已上而未行者豈以衆怨所在而朝廷不敢當耶今疆埸未靜上下同憂權宜裁減以紓國用臺諫既以身任怨大臣何避之有至如理財之術莫如遴選板曹臣前日與諌臣共留趙子潚者誠恐今日理財之臣未必賢於子潚也似聞海冦稍息不若别擇代者而還子潚不唯可以理財如旦夕車駕進發輦轂之下謀議之寄議者謂非子潚不可也此臣所謂不可不急治者此也臣所陳四事願陛下付大臣議之如有可採乞賜施行陳亮上五論曰臣聞治國有大體謀敵有大略立大體而後紀綱正定大略而後機變行此不易之道也仰惟陛下以睿聖神武之資充碩大光眀之學留神政事屬志恢復罔敢自暇自逸而大欲未遂大業未濟意者大體之未立而大略之未定歟臣嘗為陛下有憂於此矣常欲輸肝膽效情素上書於北闕之下又念世俗道薄獻言之人動必有覬心雖不然迹或近似相師成風誰能不疑既已疑矣安能察其言而眀其心此臣之所大懼而卒以自沮也今年春隨試禮部僥幸一中庶幾俯伏殿陛畢寫區區之忠以徹天聽有司以為不肖竟從黜落不得進望清光以遂昔願束手東歸杜門求志因以為功名之在人猶在已也懷愚負計而不以裨上之萬一是忿世也有君如此而忠言之不進是匿情也已無他心而防人之疑是自信不篤也故書其中興論一千八百餘言大體大略於斯見矣并論開誠執要勵臣正體之道合五篇上干天聽惟陛下寬其萬死不以為草茅之言而留神裁察是天下社稷之福也于臣何有其一論中興曰臣竊惟海內塗炭四十餘載矣赤子嗸嗸無告不可以不拯國家憑陵之恥不可以不雪陵寢不可以不還輿地不可以不復此三尺童子之所共知曩獨畏其強耳韓信有言能反其道其強易弱況今敵人微弱政令日弛捨其俗鞍馬之長而從事中州浮靡之習君臣之間日趨怠惰自古逺裔之強未有四五十年而無變者稽之天時揆之人事當不逺矣不於此時早為之圖縱有他變何以乘之萬一敵人懲創更立令主不然豪傑並起業歸他姓則南北之患方始又況南渡已久中原父老日以殂謝生長於敵豈知有我昔宋文帝欲取河南故地魏大武以為我自生髮未燥即知河南是我境土安得為南朝故地故文帝既得而復失之河北諸鎮終唐之世以奉賊為忠義狃于其習而時被其恩力與上國為敵而不自知其為逆過此以往而不能恢復則中原之民烏知我之為誰縱有倍力功未必半以俚俗諭之父祖質産於人子孫不能繼贖更數十年時事一變皆自陳於官認為故産吾安得言質而復取之則今日之事可得而更緩乎陛下以神武之資憂勤側席慨然有平一天下之志固已不惑於羣議矣然猶患人心之不同天時之未順賢者私憂而姦者竊笑是何也不思所以反其道故也誠反其道則政化行政化行則人心同人心同則天時順天不逺人人不自反耳今宜清中書之務以立大計重六卿之權以總大綱任賢使能以清官曹尊老慈幼以厚風俗減進士以列選能之科革任子以重薦舉之實多置臺諫以肅朝綱精擇監司以清郡邑簡法重令以澄其源崇禮立制以齊其習立綱目以節浮費示先務以斥虛文嚴政條以核名實懲吏姦以眀賞罰時簡外郡之卒以充禁旅之數調度總司之贏以佐軍旅之儲擇守令以滋戶口戶口繁而財自阜柬將佐以立軍政軍政眀而兵自強置大帥以總邊陲委之專而邊陲之利自興任文武以分邊郡付之久而邊郡之守自固右武事以振國家之勢來敢言以作天下之氣精間諜以得敵人之情據形勢以動中原之心不出數月紀綱自定比及兩稔內外自實人心自同天時自順有所不往一往而民自歸何者耳同聽而心同服有所不動一動而敵自鬪何者形同趨而勢同利中興之功可翹足而須也夫攻守之道必有竒變形之而敵必從衝之而敵莫救禁之而敵不敢動乖之而敵不知所往故我常專而敵常分敵有窮而我常無窮也夫竒變之道雖本乎人謀而常因乎地形一縱一橫或長或短緩急之相形盈虛之相傾此人謀之所措而竒變之所寓也今東西彌亙綿數千里如長蛇之橫道地形適等無所參錯攻守之道無他竒變今朝廷鑒守江之弊大城兩淮慮非不深也能保吾城之卒守乎故不若為術以乖其所之至論進取之道必先東舉齊西舉秦則大河之南長淮以北固吾腹中物齊秦誠天下之兩臂也奈敵人以為天設之險而固守之乎故必有批亢搗虛形格勢禁之道竊嘗觀天下之大勢矣襄漢者敵人之所緩今日之所當有事也控引京洛側睨淮蔡包括荆楚襟帶吳蜀沃野千里可耕可守地形四通可左可右今誠命一重臣德望素著謀謨眀審者鎮撫荆襄輯和軍民開布大信不爭小利謹擇守宰省刑薄斂進城要險大建屯田荆楚竒才劔客自昔稱雄徐行召募以實軍籍民俗剽悍聽於農隙時講武藝襄陽既為重鎮而均隨信陽及光一切用藝祖委任邊將之法給以州兵而更使自募與以州賦而縱其自用使之養士足以得死力用間足以得敵情兵雖少而衆建其助官雖輕而重假其權列城相援比鄰相和養鋭以伺觸機而發一旦敵人玩故習常來犯江淮則荆襄之帥率諸軍進討襲有唐鄧諸州見兵於潁蔡之間示必截其後因命諸州轉城進築如三受降城法依吳軍故城為蔡州使唐鄧相距各二百里並桐柏山以為固揚兵搗壘增陂深塹招集土豪千家一堡興雜耕之利為久駐之基敵來則嬰城固守出竒制變敵去則列城相應首尾如一精間探明斥堠諸軍進屯光黃安隨襄郢之間前為諸州之援後依屯田之利朝廷徙都建業築行宫於武昌大駕時一巡幸敵知吾意在京洛則京洛陳許汝鄭之偹當日增而東西之勢分矣東西之勢分則齊秦之間可乘矣四川之帥親率大軍以持鳳翔之敵别命驍將出祁山以截隴右偏將由子午以窺長安金房開建之師入武關以鎮三輔則秦地可謀矣命山東之歸正者往説豪傑隂為內應舟師由海道以搗其脊彼方支吾奔走而大軍兩道並進以戡其胸則齊地可謀矣吾雖示形於唐鄧上蔡而不再謀進坐為東西形援勢如猿臂彼將愈疑吾之有意京洛特持重以示不進則京洛之備愈專而吾必得志于齊秦矣撫定齊秦則京洛將安往哉此所謂批亢搗虛形格勢禁之道也就使吾未為東西之舉彼必不敢離京洛而輕犯江淮亦可謂乖其所之也又使其合力以壓唐蔡則淮西之師起而禁其東金房開達之師起而禁其西變化形敵多方牽制而權始在我矣然荆襄之師必得純意於國家而無貪功生事之心者而後付之平居無事則欲開布誠信以攻敵心一旦進取則欲見便擇利而止以禁敵勢東西之師有功則欲制馭諸將持重不進以分敵形此非陸抗羊祜之徒孰能為之夫伐國大事也昔人以為譬拔小兒之齒必以漸搖撼之一拔得齒必且損兒今欲竭東南之力成大舉之勢臣恐進取未必得志得地未必能守邂逅不如意則吾之根本撼矣此豈謀國萬全之道臣故曰攻守之間必有竒變臣謏人也何足以眀天下之大計姑疏愚慮之崖略曰中興論惟陛下裁察其二論開誠曰臣嘗觀自古大有為之君慷慨果敢而示之以必為之意眀白洞達而開之以無隱之誠故天下雄偉英豪之士聲從響應雲蒸霧集爭以其所長自效而不敢萌欺罔之心截然各職其職而不敢生不滿之念故所欲而獲所為而成而卓乎其不可及也仰惟陛下英睿神武出於天縱嗣承大統于今八年天下咸知其為真英主矣而所欲未獲所為未成雖臣亦為陛下疑之也夫慷慨果敢陛下固示之以必為之意矣而天下之氣索然而不吾應或者眀白洞達開之以無隱之誠者容有未至乎夫任人之道非必每事疑之而後非無隱之誠也心知其不足任而姑使之以充吾位使之既久而姑遷之以慰其心身尊位大而大責或不必任職親地密而密議或不得聞聽其言與之以位而不責其實責其實迫之以目前而不待其成陛下自度任人之際頗亦有近于此者乎如或近之則非所謂眀白洞達開之以無隱之誠也故天下懦庸委瑣之人得以自容而無嫌而狂斐妄誕之流得以肆言而無忌中實無能而外為欺罔位實非稱而意輒不滿平居則何官不可為緩急則何人不退縮是宜陛下當寧而嘆天下人才無一之可用而謂書生誠不足以有為則非陛下之過也天下之士有以致之耳雖然何世不生才何才不資世天下雄偉英豪之士未嘗不延頸待用而每視人主之心為如何使人主虛心以待之推誠以用之雖不必髙爵重祿而可使之死況於其中之計謀乎人主而有矜天下之心則雖髙爵重祿日陳于前而雄偉英豪之士有窮餓而死爾義有所不屑於此也夫天下之可以爵位誘者皆非所謂雄偉英豪之士也陛下勿以其可以爵位誘奴使而婢呼之天下固有雄偉英豪之士懼陛下誠心之不至而未來也臣願陛下虛懷易慮開心見誠疑則勿用用則勿疑與其位勿奪其職任以事勿間以言大臣必使之當大責邇臣必使之與密議才不堪此不以其易制而姑留才止於此不以其久次而姑遷言必責其實實必要其成君臣之間相與如一體眀白洞達豁然無隱而猶不得雄偉英豪之士以共濟大業則陛下可以斥天下之士而不與之共斯世矣不然臣恐孤陛下必為之心沮天下願為之志兩相求而不相值也以陛下英睿神武之資視古之賢主無所不及而有過之者而其效乃爾此臣所以區區愛君之心不能自已而輒獻其愚忠惟陛下裁察其三論執要曰臣竊惟陛下自踐阼以來親事法宫之中眀見萬里之外發一政用一人無非出於獨斷下至朝廷之小臣郡縣之瑣政一切上勞聖慮雖陛下聰眀天縱不憚勞苦而臣竊以為人主之職本在於辨邪正專委任眀政之大體總權之大綱而屑屑焉一事之必親臣恐天下有以妄議陛下之好詳也自祖宗以來軍國大事三省議定面奏獲旨差除即以熟狀進入獲可始下中書造命門下審讀有未當者在中書則舍人封繳之在門下則給事封駮之始過尚書奉行有未當者侍從論思之臺諫劾舉之此所以立政之大體總權之大綱端拱於上而天下自治用此道也今朝廷有一政事而多出於御批有一委任而多出於特旨使政事而皆善委任而皆當固足以彰陛下之聖德而猶不免好詳之名萬一不然而徒使宰輔之避事者得用以藉口此臣憂君之心所不能以自已也臣願陛下操其要於上而分其詳於下凡一政事一委任必使三省審議取旨不降御批不出特旨一切用祖宗上下相維之法使權固在我不蹈曩日專權之患而怨有所歸無代大臣受怨之失此臣所以為陛下願之也臣聞之故老言仁宗朝有勸仁宗以收攬權柄凡事皆從中出勿令人臣弄威福仁宗曰卿言固善然措置天下事正不欲專從朕出若自朕出皆是則可有一不然難以遽改不若付之公議令宰相行之行之而天下不以為便則臺諫公言其失改之為易大哉王言此百世人主之所當法而況於聖子神孫乎史之稱光武曰眀謹政體總攬權綱政體者政之大體也權綱者權之大綱也臣願陛下立政之大體總權之大綱辨邪正專委任以宰天下得操要之實而鑒好詳之弊則天下雄偉英豪之士必有能奮然出力以辦今日之事者矣臣不勝大願其四論勵臣曰臣聞上下同心君臣戮力者事無不濟上下相蒙君臣異志者功無不隳春秋之時晉伐楚深入不止大夫請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是寡人之過也如何其辱諸大夫也大夫曰先君之時晉不伐楚及臣之身而晉伐楚是臣之罪也請擊之莊王俯泣而起拜晉師聞而夜還越王求成於吳而歸抱柱而哭承之以嘯羣臣聞之曰君王何愁心之甚也夫復讎謀敵非君王之獨憂乃臣下之急務也其後越父兄請報恥越王曰昔者我辱也非二三子之罪也寡人何敢勞國人以塞吾讎父兄曰四封之內盡吾君子子報父仇誰敢不力越王卒用以滅吳區區楚越有臣如此而謂堂堂大國反無君憂臣辱君辱臣死之義乎今陛下慨念國家之恥勵復讎之志夙夜為謀相時伺隙而羣臣邈焉不知所急毛舉細事以亂大謀甚者僥幸茍且習以成風陛下數降詔以切責之厲天威以臨之而養安如故無復趨事赴功念讎報恥之心豈羣臣樂於負陛下哉亦玩故習常勢流於此而不自知也臣願陛下慨然興懷不御正殿減膳徹樂夕惕若厲立羣臣而語之曰朕承太上皇帝付託之重念國家之深恥志在復讎八年于兹若涉淵水未知攸濟而羣臣玩故養安無肯戮力是朕不眀不德不足以承大寶圖大業其何顔以臨於王公士民之上況敢即安以自取辱羣臣震懼頓首請罪然後徐諭之曰朕固未敢即安羣臣猶以朕可與有為其各共厥職勉趨厥事上率其下下勉其上自度其力之不逮者無尸厥官朕將眀賞罰以厲其後由今以往羣臣咸為朕思所以畏天愛民求賢發政富國強兵復讎謀敵之道無以小事塞責無以小謀亂大相與熟講惟新之政使內外有序則朕即安之日陛下惕然側席圖濟大業而羣臣不能惕然承意竭力以報其上是人而禽獸者也誅之殺之何所不可誠使上下同心君臣戮力則何事之不濟哉其五論正體曰臣聞君以仁為體臣以忠為體遍覆包含如天地之大仁也公家之事知無不為忠也故君行恩而臣行令慶厯間杜衍輔政遇有內降輒封還之仁宗以杜衍不可告之而止者又多於所封還治平初任守忠離間兩宫韓琦乘間開悟上心斥之逺方仍放謝辭即日押出國門君當其善臣當其怨君臣之體也澶淵之役自冦準而下均欲追戰章聖皇帝獨惻然許和及其議嵗幣也章聖不欲深較而準戒曹利用以不得過三十萬天聖初契丹借兵伐髙麗眀肅太后微許其使吕夷簡堅以為不可而塞之其後劉六符來求割地夷簡召至殿廬以言折之君任其美臣任其責君臣之體也今則不然陛下鋭意於有為不顧浮議而羣臣持祿固位多務收恩陛下慨然立計不屈于敵而羣臣動欲隨順圖塞溪壑使陛下孤立以主大計羣臣安坐而竊美名是尚為得君臣之體乎臣願陛下總攬大柄端已責成畏天愛民以德自護明詔大臣使當大任不憚小怨不辭大艱使天下戴陛下之恩而嚴大臣之執守敵人服陛下之德而憚大臣之忠果則何事之不濟何功之不成此祖宗養人心以行德義正君臣之體而為百世不易之家法也故願陛下仰法祖宗而大臣以冦準吕夷簡杜衍韓琦為法天下有不足為者矣亮又上書曰臣竊惟中國天地之正氣也天命之所鍾也人心之所會也衣冠禮樂之所萃也百代帝王之所以相承也豈天地之外更有邪氣之所可姦哉不幸而能姦之至於挈中國衣冠禮樂而寓之偏方雖天命人心猶有所繫然豈以是為可久安而無事也使其君臣上下茍一朝之安而息心於一隅凡其志慮之所經營一切置中國於度外如元氣偏注一肢其他肢體往往萎枯而不自覺矣則其所謂一肢者又何恃而能久存哉天地之正氣鬱遏於偏方而久不得騁必將有所發泄而天命人心固非偏方之所可久繫也東晉自元帝息心於一隅而胡羯鮮卑氐羌迭起中國中國無嵗不尋干戈而江左卒亦不得一日寧然淵勒遂無遺種而愍懷之痛猶有所諉以自安也晉之植根本無可言者而江左諸臣若祖逖周訪陶侃庾翼之徒皆有虎視河洛之意而桓溫之師西至灞上東至枋頭又於其間修陵寢於洛陽蓋猶未盡置中國於度外也故劉裕竟能一平河洛而後晉亡百年之間其事既已如此而天地之正氣固將有所發泄矣元魏起而承之孝文遂定都洛陽以修中國之衣冠禮樂而江左衣冠禮樂之舊非復天命人心之所繫矣是以一天下者卒在西北而不在東南天人之際豈不甚可畏哉一日之茍安數百年之大禍也恭惟我國家二百年太平之基三代之所無也二聖北狩之痛漢唐之所未有也金甌無缺而致令敵人安坐而據之以二帝三王之所都而五十年為敵人之所據國家之恥不得雪臣子之憤不得伸天地之正氣不得而發泄也方南渡之初君臣上下痛心疾首誓不與敵俱生卒能以奔敗之餘而勝百戰之敵及秦檜倡邪議以沮之忠臣義士斥死南方而天下之氣惰矣三十年之餘雖西北流寓皆抱孫長息於東南而君父之大讎一切不復關念自非敵人震動淮南亦不知兵戈之為何事也況望其憤中國之陸沈而相率北向以發一矢哉丙午丁未之變距今尚以為逺而靖康皇帝之禍蓋陛下即位之前一年也獨陛下奮不自顧志在復讎而天下之人安然如無事時方口議腹非以陛下為喜功名而不恤後患雖陛下亦不能以崇髙之勢而獨勝之隱忍以至于今又十有七年矣昔者春秋之時君臣父子相戕殺之禍舉一世皆安之而孔子獨以為三綱既絶則人道遂為禽獸夷狄皇皇奔走義不能以一朝安然卒於無所遇而發其志於春秋之書猶能以懼亂臣賊子今者舉一世而忘君父之大讎此豈人道之所可安乎使學者知學孔子當迫陛下以有為決不沮陛下以茍安也南師之不出於今幾年矣河洛沈淪而天地之正氣抑鬱而不得泄豈以堂堂中國而五十年之間無一豪傑之能自奮哉其勢必有時而發泄矣茍國家不能起而承之必將有承之者矣不可恃衣冠禮樂之舊祖宗積纍之深以為天命人心可以安坐而久繫也皇天無親惟德是輔民心無常惟惠之懷自三代聖人皆知其為甚可畏也春秋之末齊晉秦楚皆衰諸侯往往困於陪臣而不自振當此之時雖如魯衛之邦茍能舉大義以正諸侯則天下可以一指麾而定也孔子惓惓斯世而卒莫能用吳越起於蠻夷之小邦而舉兵以臨齊晉如履無人之地遂伯諸侯黃池之會孔子之所甚痛也天地之氣發泄於蠻夷之小邦可以眀中國之無人矣王通有言夷狄之德黎民懷之三才其捨諸此今世儒者之所未講也今金人之植根既久不可以一舉而遂滅國家之大勢未張不可以一朝而大舉而人情皆便於通和者勸陛下積財養兵以待時也臣以為通和者所以成上下之茍安而為忘庸兩售之地宜其為人情之所甚便也自和好之成十有餘年凡今日之指畫方略者他日將用之以坐籌也今日之擊毬射雕者他日將用之以決勝也府庫充滿無非財也介胄鮮眀無非兵也使兵端一開則其迹敗矣何者人才以用而見其能否安坐而能者不足恃也兵食以用而見其盈虛安坐而盈者不足恃也而朝廷方幸一旦之無事庸愚齷齪之人皆得以守格令行文書以奉陛下之使令而陛下亦幸其易制而無他也徒使度外之士擯棄而不得騁日月蹉跎而老將至矣臣故曰通和者所以成上下之茍安而為妄庸兩售之地也東晉百年之間未嘗與虜通和也故其臣東西馳騁而多可用之才今和好一不通而朝野之論常如敵兵之在境惟恐其不得和也雖陛下亦不得不和矣昔者敵人草居野處往來無常能使人不知所備而兵無日不可出也今也城郭宫室政教號令一切不異於中國點兵聚糧文移往返動涉嵗月一方有警三邊騷動此豈能嵗出師以擾我乎是固不知勢者之論也然使朝野常如敵兵之在境乃國家之福而英雄所用以爭天下之機也執事者胡為速和以惰其心乎晉楚之戰於邲也欒書以為楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之于勝之不可保紂之百克而卒無後晉楚之弭兵於宋也子罕以為兵所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏眀之術皆兵之由也而求去之是以誣道蔽諸侯也夫人心之不可惰兵之不可廢故雖成康之太平猶有所謂四征不庭張皇六師者此李沆之所以深不願真宗皇帝之與敵和親也況南北角立之時而廢兵以惰人心使之安於忘君父之大讎而置中國於度外徒以便妄庸之人則執事者之失策亦甚矣陛下何不眀大義而慨然與敵絶也貶損乘輿却御正殿痛自克責誓必復讎以勵羣臣以振天下之氣以動中原之心雖未出兵而人心不敢惰矣東西馳騁而人才出矣盈虛相補而兵食見矣狂妄之辭不攻而自息懦庸之夫不却而自退縮矣當有度外之士起而惟陛下之所欲用矣是雲合響應之勢而非可安坐而致也臣請為陛下陳國家立國之本末而開今日大有為之略論天下形勢之消長而決今日大有為之機伏惟陛下試幸聽之唐自肅代以後上失其柄而藩鎮自相雄長擅其土地人民用其甲兵財賦官爵惟其所命而人才亦各盡心於其所事卒以成君弱臣強正統數易之禍藝祖皇帝一興而四方次第而平藩鎮拱手以趨約束使列郡各得自達於京師以京官權知三年一易財歸於漕司而兵各歸於郡朝廷以一紙下郡國如臂之使指無有留難自管庫微職必命於朝廷而天下之勢一矣故京師常宿重兵以為固而郡國亦各有禁軍無非天子所以自守其地也兵皆天子之兵財皆天子之財官皆天子之官民皆天子之民綱紀總攝法令眀備郡縣不得以一事自專也士以尺度而取官以資格而進不求度外之竒才不慕絶世之雋功天子蚤夜憂勤於其上以禮義廉恥勵士大夫之心以仁義公恕厚斯民之生舉天下皆由於規矩凖繩之中而二百年太平之基從此而立然逺裔遂得以猖狂恣睢與中國抗衡儼然為南北兩朝而頭目手足混然無别微澶淵一戰則中國之勢浸微根本雖厚而不可立矣故慶厯增幣之事富弼以為朝廷之大恥而終身不敢自論其勞蓋外域征令是主上之操也天子供貢是臣下之禮也外域之所以卒勝中國者其積有漸也立國之初其勢固必至此故我祖宗常嚴廟堂而尊大臣寬郡縣而重守令於文法之內未嘗折困天下之富商臣室於格律之外有以容奬天下之英偉竒傑皆所以助立國之勢而為不虞之備也慶厯諸臣亦嘗憤中國之勢不振矣而其大要則使羣臣爭進其説更法易令而廟堂輕矣嚴按察之權邀功生事而郡縣又輕矣豈惟於立國之勢無所助又從而朘削之雖微章得象陳執中以排沮其事亦安得而不自沮哉獨其破去舊例以不次用人而勸農桑務寬大為有合於因革之宜而其大要已非矣此所以不能洗逺裔平視中國之恥而卒發神宗皇帝之大憤也王安石以正法度之説首合聖意而其實則欲籍天下之兵盡歸於朝廷别行教閲以為強也括郡縣之利盡入於朝廷别行封樁以為富也青苗之政惟恐富民之不困也均輸之法惟恐商賈之不折也罪無大小動輒興獄而士大夫緘口畏事矣西北兩邊至使內臣經畫而豪傑恥於為役矣徒使神宗皇帝見兵財之數既多鋭然南征北伐卒乖聖意而天下之勢實未嘗振也彼蓋不知朝廷立國之勢正患文為之太密事權之太分郡縣太輕而委瑣不足恃兵財太關於上而重遲不易舉祖宗惟用前四者以助其勢而安石竭之不遺餘力不知立國之本末者真不足以謀國也元祐紹聖一反一覆而卒為敵人侵侮之資尚何望其振中國以威敵人哉南渡以來大抵遵祖宗之舊雖微有因革增損不足為輕重有無如趙鼎諸臣固已不究變通之理而況秦檜盡取而沮毁之忍恥事讎飾太平於一隅以為欺其罪可勝誅哉陛下憤王業之屈於一隅勵志復讎而不免籍天下之兵以為強括郡縣之利以為富加惠百姓而富人無五年之積不重征稅而大商無巨萬之藏國勢日以困竭臣恐尺籍之兵府庫之財不足以支一旦之用也陛下早朝晏罷以冀中興日月之功而以繩墨取人以文法蒞事聖斷裁制中外而大臣充位胥吏坐行條令而百司逃責人才日以闒茸臣恐程文之士資格之官不足以當度外之用也藝祖皇帝經畫天下之大略太宗皇帝已不能盡用臣不敢盡具之紙墨今其遺意豈無望於陛下也陛下茍推原其意而行之可以開社稷數百年之基而況於復故物乎不然維持之具既窮臣恐祖宗之積纍亦不足恃也陛下試幸令臣畢陳於前則今日大有為之略必知所處矣夫吳蜀天地之偏氣也錢塘又吳之一隅也當唐之衰而錢鏐以閭巷之雄起王其地自以不能獨立常朝事中國以為重及我宋受命俶以其家入京師而自獻其土故錢塘終始五代被兵最少而二百年之間人物日以繁盛遂甲於東南及建炎紹興之間為六飛所駐之地當時論者固已疑其不足以張形勢而事恢復矣秦檜又從而備百司庶府以講禮樂於其中其風俗固已華靡士大夫又從而治園囿臺榭以樂其生於干戈之餘上下晏安而錢塘為樂國矣一隙之地本不足以容萬乘而鎮壓且五十年山川之氣蓋亦發泄而無餘矣故穀粟桑麻絲枲之利嵗耗於一嵗禽獸魚鱉草木之生日微於一日而上下不以為異也公卿將相大抵多江浙閩蜀之人而人才亦日以凡下場屋之士以十萬數而文墨小異已足以稱雄於其間矣陛下據錢塘已耗之氣用閩浙日衰之士而欲鼓東南習安脆弱之衆北向以爭中原臣是以知其難也荆襄之地在春秋時楚用以虎視齊晉而齊晉不能屈也及戰國之際獨能與秦爭帝其後三百餘年而光武起於南陽同時共事往往多南陽故人又二百餘年遂為三國交據之地諸葛亮由此起輔先主荆楚之士從之如雲而漢氏賴以復存于蜀周瑜魯肅吕蒙陸遜陸抗鄧艾羊祜皆以其地顯名又百餘年而晉氏南渡荆雍常雄於東南而東南往往倚以為強梁竟以此代齊及其氣發泄無餘而隋唐以來遂為偏方下州五代之際髙氏獨常臣事諸國本朝二百年之間降為荒落之邦北連許汝民居稀少土産庳薄人才之能通姓名於上國者如辰星之相望況至於建炎紹興之際羣盜出沒於其間而被禍尤極以迄于今雖南北分畫交據往往又置於不足用民食無所從出而兵不可由此而進議者或以為憂而不知其勢之足用也其地雖要為偏方然未有偏方之氣五六百年而不發泄者況其東通吳會西連巴蜀南極湖湘北控關洛左右伸縮皆足為進取之機今誠能開墾其地洗濯其人以發泄其氣而用之使足以接關洛之氣則可以爭衡於中國矣是亦形勢消長之常數也陛下慨然移都建業百司庶府皆從草創軍國之儀皆從簡略又作行宫於武昌以示不敢寧居之意常以江淮之師為敵人侵軼之備而精擇一人之沈鷙有謀開豁無他者委以荆襄之任寬其文法聼其廢置撫摩振厲於三數年之間則國家之勢成矣至於相時弛張以就形勢者又非書之所能盡載也石晉失盧龍一道以成開運之禍蓋丙午丁未嵗也眀年藝祖皇帝始從郭太祖征伐卒以平定天下其後契丹以甲辰敗於澶淵而丁未戊申之間真宗皇帝東封西祀以告太平蓋本朝極盛之時也又六十年而神宗皇帝實以丁未嵗即位國家之事於是一變矣又六十年而丙午丁未遂為靖康之禍天獨啓陛下於是年而又啓陛下以北向復讎之志今者去丙午丁未近在十年間爾天道六十年一變陛下可不有以應其變乎此誠今日大有為之機不可茍安以玩嵗月也臣不佞自少有驅馳四方之志常欲求天下豪傑之士而與之論今日之大計蓋嘗數至行都而人物如林其論皆不足以起人意臣是以知陛下大有為之志孤矣辛卯壬辰之間始退而窮天地造化之初考古今沿革之變以推極皇帝王伯之道而得漢魏晉唐長短之由天人之際昭昭然可察而知也始悟今世之儒士自以為得正心誠意之學者皆風痺不知痛癢之人也舉一世安於君父之讎而方低頭拱手以談性命不知何者謂之性命乎陛下接之而不任以事臣於是服陛下之仁又悟今世之才臣自以為得富國強兵之術者皆狂惑以肆叫呼之人也不以暇時講究立國之本末而方揚眉伸氣以論富強不知何者謂之富強乎陛下察之而不敢盡用臣於是服陛下之明陛下厲志復讎足以對天命篤於仁愛足以結民心而又仁明足以臨照羣臣一偏之論此百代之英主也今乃驅委庸人籠絡小儒以遷延大有為之嵗月臣不勝憤悱是以忘其賤而獻其愚陛下誠令臣畢陳於前豈惟臣區區之願將天地之神祖宗之靈實與聞之干冒天威罪當萬死亮又上書曰臣嘗嘆西周之末犬戎之禍蓋天地之大變國家之深恥臣子之至痛也平王東遷以來使其痛內切於心必將因臣子之憤藉晉鄭之勢以告哀於天下之諸侯以大義責其興師以奬王室其不至者天下共誅之則可以掃蕩犬戎洗國家之恥而舒臣子之憤矣然後正紀綱修法度親魯衛以和柔中國命齊晉為方伯以糾合天下之諸侯文武之迹可尋東周之業可興也今乃即安於洛邑雖周民賴以粗安宗祀賴以不絶然使其臣子忘君父之大讎而置天下之諸侯於度外周之名號雖存而其實則眇然一列國耳當平王在位之時世之君子尚意其猶有待也及待之四十九年而士君子之望亦衰矣天子之命令不足以制諸侯則其互相吞滅蓋其勢之所必至也天下不明於復讎之義則其君臣父子相賊殺習以為常而不之怪也孔子傷宗周之無主痛人道之將絶而作春秋其書天王之義嚴矣書其出入之地者示天王不可置中國於度外也書其有所求者明天王之不可失其柄也其書討賊之義嚴矣賊不討不書葬者明一國之無臣子也一人討賊而以衆書者示夫人之皆可得而討也天子既不能以保天下之民而一國各自有其民其君之有志於民而閔雨者必書無志於民而不閔雨者必書土功必書飢饉必書孔子之心未嘗不庶幾天下之民一日之獲瘳也是君道之大端而聖人望天下與來世者可謂深切著明矣臣恭惟皇帝陛下厲志復讎不肯即安於一隅是有大功於社稷也而天下之經生學士講先王之道者反不足以眀陛下之心陛下篤意恤民每遇水旱憂見顔色是有大德於天下也而天下之才臣智士趨當世之務者又不足以眀陛下之義論恢復則曰修德待時論富強則曰節用愛人論治則曰正心論事則曰守法君以從諫務學為美臣以識心見性為賢論安言計動引聖人舉一世謂之正論而經生學士合為一辭以摩切陛下者也夫豈知安一隅之地則不足以承天命忘君父之讎則不足以立人道民窮兵疲而事不可已者不可以常理論消息盈虛而與時偕行者不可以常法拘為天下之正論而不足以眀天下之大義宜其取輕于陛下也論恢復則曰精間諜結豪望論富強則曰廣召募括隱漏論治則曰立志論事則曰從權君以駕馭籠絡為明臣以奮勵驅馳為最察事見情自許豪傑舉一世謂之竒論而才臣智士合為一辭以撼動陛下者也夫豈知坐錢塘浮侈之隅以圖中原則非其地用東南習安之衆以行進取則非其人財止於府庫則不足以通天下之有無兵止於尺籍則不足以兼天下之勇怯為天下之竒論而無取於辦天下之大計此所以取疑於陛下者也三光五嶽之氣分而人才之髙者止於如此經生學士既揆之以大義而取輕才臣智士又權之以大計而取疑陛下始不知所仗而有獨運四海之意矣故左右親信之臣又得以窺意嚮而效忠欵陛下喜其頥指如意而士大夫亦喜其有言之易達也是以附會之風浸長而陛下之大權移矣尋常無過之人安然坐廟堂而奉使令陛下幸其易制無他而天下之人亦幸其茍安而無事也是以遷延之計遂行而陛下大有為之志乖矣陛下勵志復讎有大功於社稷篤意恤民有大德於天下而卒不免籠絡小儒驅委庸人以遷延大有為之嵗月此臣之所以不勝忠憤而齋沐裁書擇今者丁已而獻之闕下願得望見顔色陳國家立國之本末而開大有為之略論天下形勢之消長而決大有為之機務合於藝祖皇帝經畫天下之本旨然八日待命而未有聞焉夫匹夫匹婦不獲自盡民主罔與成厥功使天下之言者越月踰時而後得報在安平無事之時猶且不可今者當陛下大有為之際陳天下之大義獻天下之大計而八日不得命焉臣恐天下之豪傑得以測陛下之意向而雲合響應之勢不得而成矣陛下積財養兵志在復讎而不免與之通和以俟時固已不足以動天下之心矣故既和而聚財人反以為厲民既和而練兵人反以為動衆舉足造事皆足以致人之疑議者惟其不眀大義以示之而後大計不可得而立也茍又無意於臣之言則天下愈不知所向矣張浚始終任事竟無一功可論而天下之童兒婦女不謀同辭皆以為社稷之臣彼其誓不與敵俱生百敗而不折者誠有以合於天人之心也秦檜專權二十餘年東南賴以無事而天下之童兒婦女不謀同辭皆以為國之賊彼其忘君父之讎而置中國於度外者其違天人之心亦甚矣陛下將以辦天下之大計而大義未足以震動天下亦執事者之所當蚤正而預計也臣區區之心皆已具之前書惟陛下裁察亮又上書曰臣竊惟藝祖皇帝經畫天下之大略蓋將上承周漢之治太宗皇帝一切律之於規矩準繩之內以立百五六十年太平之基至於今日而不思所以變而通之則維持之具窮矣舉江浙閩廣之士無慮十四五萬數蜀不與焉而齷齪拘攣日甚於一日選人之在銓者殆以萬計而僥幸之源未有窮已財用之入倍於承平之時而費於養兵者十之九兵不足用而民日以困非必道微俗薄而至此也蓋本朝維持之具二百年之餘其勢固必至此藝祖皇帝固已逆知之矣使天下安平無事猶將望陛下變而通之而況版輿之地半入於金人國家之恥未雪臣子之痛未伸天錫陛下以非常之智勇而又啓陛下以北向復讎之志乃欲因今之勢而有為焉此所以十又七年之間聖慮愈勞而取效愈逺也羣臣既不足以望清光而草茅賤士不勝憂國之心私以為陛下春秋五十有二經天下之事變為己多閲天下之義理為己熟舉足造事必不傷國家之大體扣囊底之智猶足以辦此事若六十以往顧將望一日之安而亦何忍遺患於後人乎臣以為拘攣齷齪之中其勢當有卓然自奮於草茅而開悟聖聰者臣不自量其力之不足而竊有志焉是以具國家社稷之大計質之天地鬼神而獻之闕下陛下亦卓然拔之羣言之中特命大臣察其所欲言之意臣妄意國家維持之具至今日而窮而藝祖皇帝經畫天下之大指猶可恃以長久茍推原其意而變通之則恢復不足為矣然而變通之道有三有可以遷延數十年之䇿有可以為百五六十年之計有可以復開數百年之基事勢昭然而效驗殊絶非陛下聰明度越百代決不能一二以聽之臣不敢泄之大臣之前而大臣拱手稱旨以問臣亦姑取其大體之可言者三事以答之而草茅亦不自知其開口觸諱也其一曰二聖北狩之痛蓋國家之大恥而天下之公憤也五十年之餘雖天下之氣銷鑠頽惰不復知讎恥之當念正在主上與二三大臣振作其義以泄其憤使人人如報私讎此春秋書衛人殺州吁之意也若祇與一二臣為密謀是以天下之公憤而私自為計恐不足以感動天人之心恢復之事亦恐茫然未知攸濟耳其二曰國家之規模使天下奉規矩準繩以從事羣臣救過之不給而何暇展布四體以求濟度外之功哉故其勢必至於委靡而不振五代之際兵財之柄倒持於下藝祖皇帝束之於上以定禍亂後世不原其意束之不已故郡縣空虛而本末俱弱今不變其勢而求恢復雖一旦得精兵數十萬得財數萬萬計而恢復之期愈逺就使敵人盡舉河南之地以還我亦恐不能守耳其三曰藝祖皇帝用天下之士人以易武臣之任事者而五代之亂不崇朝而定故本朝以儒立國而儒道之振獨優於前代今天下之士爛熟委靡誠可厭惡正在主上與二三大臣反其道以教之作其氣以養之使臨事不至乏才隨才皆足有用則立國之規模不至戾藝祖皇帝之本旨而東西馳騁以定禍亂不必專在武臣也前漢以軍吏立國而用儒輒敗人事要之人各有家法未易輕動惟在變而通之耳天下大勢之所趨非人力之所能移也臣之所以為大臣論者其大略如此而所謂數十年之策百五六十年之計數百年之基與夫恢復之形勢事大體重茍未決之聖心則不可泄之大臣之前也故止陳其大略之可言者三事以答之二三大臣已相顧駭然而臣亦皇恐而退踈逺草茅寧復有路以望清光乎馬周一時瑣瑣之才也太宗喜其為常何陳事召使面對未至之間使者連數輩趣之使有能為太宗開禮樂法度者其召之當不容喘矣陛下聰明邁越太宗而拔臣於羣言混殽之中孤立以行一意卒不免泯默而止其罪在臣之蹤迹不明有以誤陛下也臣本太學諸生自憂制以來退而讀書者六七年矣雖早夜以窮皇帝王伯之略而科舉之文不合於程度不止也去年一發其狂論於小試之間滿學之士口語紛然至騰謗以動朝路數月而未已而為之學官者迄今進退未有據也臣自是始棄學校而決歸耕之計矣旋復自念數年之間所學云何而陛下之心臣又獨知之茍徒恤一世之謗而不為陛下一陳國家社稷之大計將得罪於天地之神與藝祖皇帝在天之靈而不可解是故昧於一來舊名已在學校之籍於法不得以上書言事使臣有一毫攫取爵祿之心以臣所習科舉之文更一二試而考官又平心以考之則亦隨例得之矣何忍假數百年社稷之大計以為一日之僥幸而徒以纍陛下哉世固有卻萬鍾之祿而不受者亦有爭一錢以至於相殺者人情相去之逺何啻於十百千萬也而臣欲持空言以自明亦淺矣審察十日而不得自便之命臣將無以自見於山林之士徒以傷陛下招致天下豪傑之道臣今更待罪三日而後渡江誓將終老田畝以弭羣論以報陛下拔臣言於衆中之恩故昧死拜書以辭於闕下臣闔門數十口去行都無四百里當席藁私室以聽雷霆之誅干冒天威罪當萬死亮又上書曰臣聞有非常之人然後可以建非常之功求非常之功而用常才出常計舉常事以應之者不待智者而後知其不濟也前史有言非常之原黎民懼焉古之英豪豈樂於驚世駭俗哉蓋不有以新天下之耳目易斯民之志慮則吾之所求亦泛泛焉而已耳皇天全付豫有家而半沒於敵人此君天下者之所當恥也春秋許九世復讎而再世則不問此為人後嗣者之所當憤也中國聖賢之所建置而悉淪於金人此英雄豪傑之所當同以為病也秦檜以和誤國二十餘年而天下之氣索然而無餘矣陛下慨然有削平宇內之志又二十餘年而天下之士始知所向其有功德於宗廟社稷者非臣區區之所能誦説其萬一也髙宗皇帝春秋既髙陛下不欲大舉以驚動慈顔抑心俯首以致色養聖孝之盛書册之所未有也今者髙宗皇帝既已祔廟天下之英雄豪傑皆仰首以觀陛下之舉動陛下其忍使二十年間所以作天下之氣者一旦而復索然乎天下不可以坐取也兵不可以常勝也驅馳運動又非年髙德尊者之所宜也東宫居曰監國行曰撫軍陛下近者以宅憂之故特命東宫以監國天下之論皆以為事有是非可否而父子之際至難言也東宫聰明睿智而四十之年不必試以事也故東宫不敢安而陛下亦知其難矣陛下何不於此時命東宫為撫軍大將軍嵗巡建業使之兼統諸司盡護諸將置長史司馬以專其勞而陛下於宅憂之餘運用人才均調天下以應無窮之變此肅宗所以命廣平王之故事也兵雖未出而聖意振動天下之英雄豪傑靡然知所向矣天下知所向則吾之馳驅運動亦有所憑藉矣臣請為陛下論天下之形勢而後知江南之不必憂和議之不必守敵人之不足畏而書生之論不足憑也臣聞吳會者晉人以為不可都而錢鏐據之以抗四鄰蓋自毗陵而外不能有也其地南有浙江西有崇山峻嶺東北則有重湖沮洳而松江震澤橫亙其前雖有戎馬百萬何所用之此錢鏐所恃以為安而國家六十年都之而無外憂者也獨海道可以徑達吳會而海道之險吳兒習舟楫者之所畏敵人能以輕師而徑至乎破人家國而止可用其輕師乎書生以為江南不易保者是真兒女子之論也臣嘗疑書册不足憑故嘗一到京口建業登髙四望深識天地設險之意而古今之論為未盡也京口連岡三面而大江橫陳岸傍極目千里其勢大略如虎之出穴而非若穴之藏虎也昔人以為京口酒可飲兵可用而北府之兵為天下雄蓋其地勢當然而人善用之耳臣雖不到采石其地與京口股肱建業必有據險臨前之勢而非止於靳靳自守者也天豈使南方自限於一江之表而不使與中國通而為一哉江傍極目千里固將使謀夫勇士得以展布四體以與中國爭衡者也韓世忠頓兵八萬於山陽如老羆之當道而淮東賴以安寢此守淮東之要法也天下有變則長驅而用之耳若一一欲塹而守之分兵而據之出竒設險如兔之護窟勢分力弱反以成戎馬長驅之勢耳是以二十年間紛紛獻策以勞聖慮而卒無一成雖成亦不足恃者不知所以用淮東之勢者也而書生便以為長淮不易守者是亦問道於盲之類耳自晉之永嘉以迄于隋之開皇其在南則定建業為都更六姓而天下分裂者三百餘年南師之謀北者不知其幾北師之謀南者蓋亦甚有數而南北通和之時則絶無而僅有未聞有如今日之岌岌然以北方為可畏以南方為可憂一日不和則君臣上下朝不能以謀夕也罪在於書生之不識形勢併與夫逆順曲直而忘之耳髙宗皇帝於敵有父兄之仇生不能以報之則死必有望於子孫何忍以升遐之哀告諸仇哉遺留報謝三使繼遣金帛寶貨千兩連發而敵人僅以一使如臨小邦聞諸道路哀祭之辭寂寥簡慢義士仁人痛切心骨豈以陛下之聖明智勇而能忍之乎意者執事之臣憂畏萬端有以誤陛下也南方之紅女積尺寸之功於機杼嵗以輸敵人固已不勝其痛矣金寶之出於山澤者有限而輸諸敵人者無窮十數年後豈不遂就盡哉陛下何不翻然思首足之倒置尋即位之初心大泄而一用之以與天下更始乎未聞以數千里之地而畏人者也劉淵石勒石虎苻堅皆逺裔之雄曽不能以終其世而阿固達之興於金近八十年中原塗炭又六十年矣上下衰敝之漸具在眼中而方畏其為南方之患豈不誤哉陛下儻以大義為當正撫軍之言為可行則當先經理建業而後使臨之今之建業非昔之建業也臣嘗登石頭鍾阜而望今城直在沙觜之傍耳鍾阜之支隴隱隱而下今行宫據其平處以臨城市城之前則逼山而斗絶焉此必後世之讀山經而相宅者之所定江南李氏之所為非有據髙臨下以乘王氣而用之之意也本朝以至仁平天下不恃險以為固而與天下共守之故因而不廢耳臣嘗問之鍾阜之僧亦能言臺城在鍾阜之側大司馬門適當在今馬軍新營之傍耳其地據髙臨下東環平岡以為固西城石頭以為重帶玄武湖以為險擁秦淮清溪以為阻是以王氣可乘而運動如意若如今城則費侯景數日之力耳曹彬之登長干烏珠之上雨花臺皆俯瞰城市雖一飛鳥不能逃也臣又嘗問之守臣以為今城不必改作若上有北方之志則此直寄路焉耳臣疑其言雖大而實未切也據其地而命將出師以謀中國不使之乘王氣而有為雖省目前經營之勞烏知其異日不乘得而復失哉縱今嵗未為北舉之謀而為經理建康之計以震動天下而與敵絶陛下即位之初志亦庶幾於少伸矣第非常之事非可以常人謀也陛下即位之初喜怒哀樂是非好惡皎然如日月之在天雷動風行天下方如草之偃惟其或失之太快故書生得拘文執法以議其後而其真有志者私自奮勵以求稱聖意之所在則陛下或未之知也陛下見天下之士皆不足以望清光而書生拘文執法之説往往有驗而聖意亦少衰矣故大事必集議除授必資格才者以跅弛而棄不才以平穩而用正言以迂濶而廢巽言以軟美而入竒論指為橫議庸論謂有典則陛下以雄心英略委曲上下於其間機會在前而不敢為翻然之喜隱忍事讎而不敢奮赫斯之怒朝得一才士而暮以當路不便而逐心知為庸人而外以人言不至而留泯其喜怒哀樂雜其是非好惡而用依違以為仁戒喻以為義牢籠以為禮關防以為智陛下聰明自天英武蓋世而何事出此哉天下非有豪猾不可制之姦敵人非有方興未艾之勢而何必用此哉夫喜怒哀樂愛惡人主之所以鼓動天下而用之之具也而皇極之所謂無作者不使加私意於其間耳豈欲如老莊所謂稿木死灰與天下為嬰兒而後為至治之極哉陛下二十七年之間遵養時晦示天下以樂其有親而天下歸其孝行三年之喪一成不變示天下以哀而從禮而天下服其義陛下以一身之哀樂而鼓天下以從之其驗如影響矣乙巳丙午之間敵人非無變故而陛下不獨不形諸喜而亦不泄諸機密之臣近者非常之變敵人略於奉慰而陛下不獨不形諸怒而亦不密其簡慢之文陛下不以喜示天下而天下惡知機會之可乘陛下不以怒示天下而天下惡知讎敵之不可安棄其喜怒以動天下之機而欲事功之自成是閉目而欲行也小臣之得對陛下有卓然知其才者外臣之奉公陛下有隱然念其忠者而已用者旋去既去者無路以自進是陛下不得而示天下以愛也大臣之弄權陛下既知其有塞路者議臣之多私陛下既知其有罔我者而去之惟恐傷其意發之惟恐其悵恨而不滿是陛下不得而示天下以惡也陛下翻然思即位之初心豈知其今日至此乎臣猶為陛下悵念於既往而天生英雄豈使其終老於不濟乎長江大河一㵼千里茍得非常之人以共之則電掃六合非難致之事也本朝以儒道治天下以格律守天下而天下之人知經義之為常程科舉之為正路法不得自議其私人不得自用其智而二百年之太平由此其出也至於艱難變故之際書生之智知議論之當正而不知事功之為何物知節義之當守而不知形勢之為何用宛轉於文法之中而無一人能自拔者陛下雖欲得非常之人以共斯世而天下其誰肯信乎臣於戊戌之春正月丁巳嘗極論宗廟社稷大計陛下亦慨然有感於其言而卒不得一望清光以布露其區區之誠非廷臣之盡皆見惡亦其勢然耳臣今者非以其言之小驗而再冒萬死以自陳實以宗廟社稷之大計不得不決於斯時也陛下用其喜怒哀樂愛惡之權以鼓動天下使如臣者得借方寸之地以終前書之所言而附寸名於竹帛之間不使鄧禹笑人寂寂而陛下得以發其雄心英略以與四海才臣智士共之天生英雄殆不偶然而帝王自有真非區區小智所可附會也干冒天威罪當萬死厯代名臣奏議卷九十二
