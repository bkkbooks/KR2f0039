body:
  text: 歷代名臣奏議卷一百六明楊士竒等撰仁民宋英宗時知諫院傅堯俞論河北差夫狀曰臣奉敕差送伴北朝人使過北京竊聞朝㫖令恩冀深瀛洺州乾寧永靜軍等處修河夫役於寒食後下手輿議紛然以為非便臣獨念自古借力於民必在農隙河上差夫亦積有年未嘗不於寒食前放罷者惟緩急救護堤岸即不拘時候豈有每年常事故害農時且二三月間正是農忙之際若雇人充役必有數倍之費況又春晚或多雨水則人夫費力亦數倍尋常兼自來民間得預買紬絹錢以了春夫今直至寒食後㸃集則紬絹錢使費已盡又須生利取債數州之民轉見不易況元初擘畫别無利病只以天寒地凍為言今天幸不寒地已不凍伏望朝廷體察實無事生害苟不以臣為狂妄乞早賜施行神宗熙寧三年御史中丞吕公著上奏曰臣竊惟祖宗承五季之亂撫有天下其間法度草創固亦未盡及古至於臨下以簡御衆以寬好生之德洽於民心則漢唐之盛無以加也是以有國百年民心欣戴雖凶年飢嵗流離至死而無有背叛之心者良以仁心厚德深足以固結其心唯是月日既久事或有弊此陛下所以臨朝奮然思欲懲革然而施設措置未得其術才及一二末事頗已咈戾衆心是以內外乖離人人危懼竊以祖宗以來所以深得人心者艱難積纍固非一日今豈可以一二末事輕失其人心人心一搖未易復收後雖有善政亦難行矣況上下危疑之際難安易動此臣所以為寒心也伏望陛下仰思先烈俯察物情凡所施為務在仁厚無致近薄以斂衆怨則人心悅而天意從矣右司諫蘇轍再乞放積缺狀曰竊見三省同進呈臣前奏乞將民間官本債負出限役錢及酒坊元額罰錢見今資産耗竭實不能出者令州縣監司保明除放事奉聖㫖節文令户部勘㑹應係諸色缺負科名數目仍契勘缺户見今各有無抵當物力開具保明聞奏臣竊謂朝廷將施舍已責救民於溝壑之中其施行節次當如救焚不可少緩前件指揮令户部開具缺户見今抵當物力此事不在户部惟州縣可見若令户部取之州縣文字往來動經嵗月反覆問難何時了絶救民之急不當如此此乃有司出納之常度而非朝廷救灾之體如陛下將布德施仁以收民心答天意但使惠澤滂流雖民間小有僥幸何損於德況此積缺經涉久逺凶嵗疲民空煩鞭箠必無所得縱獲毫末無補國計乞特降朝㫖直下諸路監司與州縣一面依下項除放結罪保明聞奏所貴小民早被聖恩不致失所别致生事彭汝礪上奏曰臣聞天下之理茍惟無心則雖匹夫之愚可以與知苟惟有蔽則雖聰明之士不能無惑焉言民則必欲愛之不能愛之則為不仁言利則必欲逺之不能逺之則為非義此其為說非有可攻也而今之言理財朘削刻剝及民之肌膚而民至於無以事父母育妻子然猶曰未也理固當如此臣以為陛下動心改為之否也夫改為之始事或有過與不及今真損益以適厥中之時也惟陛下裁幸之韓維乞罷保馬保甲劄子曰臣比因進對曽具奏陳乞陛下深察盜賊所起之原罷非業之令寬訓練之程蓋為保馬保甲發也何則農民以稼穡為生使之出錢市馬已非其願又守護灌飼素昧其方萬一死損復更償買昔時一馬直三二十千者今至百千矣農民如此未有已時愁歎之聲聞於道路近嵗保甲築垣為場號為團教一丁在官訓習又須一丁供送飯食家闕耕作身受勞苦不無怨懟夫使失業怨懟之人操持兵器習為擊刺之事豈不可慮近者又聞京西保馬頗為羣盜掠取换易乘騎如其外廄河北保甲漸亦作過侵暴良民州縣不能禁此患在耳目之前則更易措置誠不可緩也且臣非謂國馬遂不可養但官置監牧可矣臣非謂民兵遂不可教但於農隙一時訓練可矣孟子曰天時不如地利地利不如人和人和可以勝天地可不務乎伏望留神聖慮詳酌施行維出提舉嵩山崇福宫帝崩赴臨闕庭宣仁后手詔勞問維對曰人情貧則思富苦則思樂困則思息爵則思通誠能常以利民為本則民富常以憂民為心則民樂賦役非人力所堪者去之則勞困息法禁非人情所便者蠲之則鬱塞通推此而廣之盡誠而行之則子孫觀陛下之德不待教而成矣石介上言曰善為天下者不視其治亂視民而已矣民者國之根本也天下雖亂民心未離不足憂也天下雖治民心離可憂也人皆曰天下國家孰為天下孰為國家民而已有民則有天下有國家無民則天下空虛矣國家名號矣空虛不可居名號不足守然則民其與天下存亡乎其與國家衰盛乎自古四夷不能亡國大臣不能亡國惟民能亡國民國之根本也未有根本亡而枝葉存者故桀之亡以民也紂之亡亦以民也秦之亡亦以民也漢有平城之危諸吕之難七國之反王莽之奪漢終不亡民心未去也唐有武氏之變祿山之祻思明朱泚宗權希烈諸侯之叛唐終不亡民心未去也夫四夷大臣非不能亡國民心尚在也觀漢髙祖文景唐太宗其有以結民心之固王莽奪取漢已亡矣而民尚思漢恩未已故光武乘之中興武氏祿山朱泚思明宗權希烈諸侯之亂唐已亡矣而民尚思唐德未已故終至於三百年民之未叛也雖四夷之强諸侯之位大臣之勢足以移國足傾天下而終不能亡也莽等不能亡漢武氏祿山諸侯不能亡唐是也民之叛也雖以百里雖以匹夫猶能亡國湯以七十里亡夏文王以百里亡商陳勝以匹夫亡秦是也噫民之未叛也雖四夷諸侯大臣不臣不能亡國況匹夫乎民之叛也雖匹夫猶能亡國況四夷乎矧諸侯乎矧大臣乎噫為天下國家者可不務民乎書曰可畏非民孟子曰民為貴社稷次之君為輕故古之天子重民也不敢侮於鰥寡民雖匹夫也有奸雄有義勇伊尹吕望義勇也陳勝豪傑也黃巢奸雄也伊尹吕望不忍桀紂之民塗炭奮於耕釣起佐湯武放桀係紂義勇矣夫陳勝不堪秦之民役苦憤然舉兵以誅秦豪傑矣夫黃巢伺唐之隙因民之飢聚兵以擾天下奸雄矣夫書曰可畏非民有奸雄有豪傑有義勇可不畏乎是以聖人不敢侮於鰥寡蓋不可以匹夫待民也孟子謂民為貴社稷次君輕蓋不敢以萬乘驕民也吁昏君庸主不知民為天下國家之根本以草莽視民以鹿豕視民故民離叛天下國家傾喪嗚呼民可忽哉元豐七年知滄州趙瞻請自大名府澶恩信安雄霸瀛莫冀等州盡𣙜賣以增其利才半嵗獲息錢十有六萬七千緡哲宗即位監察御史王岩叟言河北二年以來新行鹽法所在價增一倍既奪商賈之利又增居民之價以為息聞貧家至以鹽比藥伏惟河朔天下根本祖宗推此為惠願陛下不以損民為利而以益民為利復鹽法如故以為河北數百萬生靈無窮之賜㑹河北轉運使范子竒奏鹽稅欲收以十分遣范鍔商度岩叟復言臣在河北亦知商賈有自請於官乞罷𣙜買願輸倍稅主計者但知於商賈倍得稅緡以為利不知商賈將為民間復增賣價以為害也岩叟任右司諫又乞安集保甲破産人户狀曰臣䝉聖恩許就寒食假中展墳於河隂道過官城縣之孫張村有耆老為臣言本村鄉七十餘户今所存者二十八家而已皆自保甲起教後來銷減至此當時人人急於逃避其家薄産或委而不顧聽任官收或賤以與人自甘客作今雖荷至恩得免冬教而業已破蕩無田可歸不知朝廷知百姓此等事否臣既聞之不可不以告陛下且恐府界三路若此類者甚多伏望詔諭執政大臣令講畫所以安集之方使離散之民早得其所以稱陛下惠愛之心哲宗元祐初知户部三司使張方平見上問曰河北再𣙜鹽何也上曰始議立法非再𣙜方平曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅而弛其禁許之今兩稅鹽錢是也豈非再𣙜乎且今未𣙜而契丹盜販不已若𣙜則鹽貴契丹之鹽益售是為我斂怨而使契丹獲福也契丹鹽入益多非用兵莫能禁邉隙一開所得鹽利能補用兵之費乎上大悟曰其語宰相立罷之方平曰法雖未下民已户知之當直以手詔罷不可自下出也上喜命方平密撰手詔下之河朔父老相率拜迎於澶州為佛老㑹七日以報上恩且刻詔北京時司馬光乞罷散青苖錢白劄子曰昨於四月二十六日降指揮令於正月二月支散常平倉錢榖竊慮州縣多不曉朝廷之意將謂却欲廣散青苖錢多收利息嚴行督責一如未能提舉官時勘㑹青苖錢利民甚少害民極多臣民上言前後非一今欲遍行指揮下諸路提㸃刑獄司自今後其常平倉錢榖只令州縣依舊法趂時糴糶其青苗錢更不支俵所有舊缺二分之息盡皆除放只令提㸃刑獄契勘逐州縣元支本錢隨見缺多少分作料次令隨稅送納右司諫蘇轍言近嵗京城外創置水磨因此汴水淺澀阻隔官私舟船其東門外水磨下流汗漫無歸浸損民田一二百里幾敗漢髙祖墳賴陛下仁聖惻怛親發德音令執政共議營救尋詔畿縣於黃河春夫外更調夫四萬開自盟河以疏泄水患計一月畢功然以水磨供給京城內外食茶等其水止得五日閉斷以此功役重大民間每夫日雇二百錢一月之費計二百四十萬貫而汴水渾濁易至填淤明年又須開淘民間嵗嵗不免此費聞水磨嵗不過四十萬貫前户部侍郎李定以此課利惑誤朝聽依舊存留且水磨興置未久自前未有此錢國計何闕而小人淺陋妄有靳惜傷民辱國不以為愧況今水患近在國門而恬不為怪甚非陛下勤恤民物之意而又減耗汴水行船不便乞廢罷官磨任民磨茶三月轍又乞令汴口以東州縣各具水匱所占頃畝每嵗有無除放二稅仍具水匱可與不可廢罷如決不可廢當如何給還民田以免怨望八月辛亥轍又言昨朝㫖令都水監差官具括中牟管城等縣水匱元浸壓者幾何見今積水所占幾何退出頃畝幾何凡退出之地皆還本主水占者以官地還之無田可還即給元直聖恩深厚棄利與民所存甚逺然臣聞水所占地至今無可對還而退出之田亦以迫近水匱為雨水浸淫未得耕鑿知鄭州岑象求近奏稱自宋用臣興置水匱以來元未曽取以灌注清汴水流自足不廢漕運乞盡廢水匱以便失業之民十月遂罷水匱三年二月翰林學士朝奉郎知制誥兼侍讀蘇軾論差役不便劄子曰臣伏見陛下發德音下明詔以大雪過常暖氣不效農夫失業商旅不行引咎在躬渙汗之澤覃及方外而詔下之夕雪作不已臣備位近侍誠竊感憤廢食而歎退伏思念陛下即位以來發政施仁無一不合人心順天意者當獲豐年刑措之報鳯凰景星之瑞而水旱作沴常寒為罰殆無虛日此豈理之當然者哉臣誠愚蠢不識忌諱試論其近似者而陛下擇焉臣聞差役之法天下以為未便獨臺諫官數人者主其議以為不可改磨礪四顧以待言者故人畏之而不敢發耳近聞踈逺小臣張行者力言其弊而諫官韓川深詆之至欲重行編竄此等亦無它意方司馬光在時則欲希合光意及其既沒則妄意陛下以為主光之言殊不知光至誠盡公本不求人希合而陛下虛心無我亦豈有所主哉使光無恙至今見其法稍弊則更之久矣臣每見吕公著安燾吕大防范純仁皆言差役不便但為已行之令不欲輕變兼恐臺諫紛爭卒難調和願陛下問公著等令指陳差雇二法各有若干利害昔日雇役中等人户嵗出錢幾何今者差役嵗費錢幾何及幾年一次差役皆可以折長補短約見其數以此計算利害灼然而況農民在官貪吏狡胥百端蠶食比之雇人苦樂十倍又五路百姓例皆朴拙差手分須至轉雇慣習人尤為患苦其費不資民窮無告監司守令觀望不言若非此一事則何以感傷隂陽之和至於如此雖責躬肆眚徹膳禱祠而此事不變終恐無益今侍從之中受恩至深無如小臣臣而不言誰當言者然臣前嵗因誤定役法與臺諫異論遂為其徒所疾屢遭口語今來所言若不合聖意即乞便行責降以戒妄言若萬一少有可采即乞留中只作聖意行下庶幾上答天戒下全小臣不勝恐栗待罪之至五年二月軾以龍圖閣學士左朝奉郎知杭州上奏曰臣近者伏覩邸報以諸路旱災內出手詔兩道其略曰豈政治失當事之害物者尚多上下厄塞情之不通者非一刑或不稱其罪用或不當其人又曰意者政令寬弛吏或為害而莫知賦役失當民病於事而莫察忠言有壅而未達賢才有抑而未用臣伏讀至此感憤涕泣而言曰嗚呼陛下即位改元于今五年三出此言矣雖禹湯之聖不惜罪已而臣子之心誠不忍聞思有以少補聖政助成應天之實使堯舜之仁名言皆行心迹相應庶幾天人感通災沴不作免使君父數出此言不勝拳拳孤忠而智慮短淺又以出守外服不能盡知朝廷得失獨以目所親見民之疾苦州縣官吏日夜奉行殘傷其肌體散離其父子破壞其生業為國斂怨而了無絲毫上助國用者四事昧死獻言謹具條件如左一伏見元祐四年八月十九日敕節文應見缺市易人户籍納拘收産業自來所收課利及估賣到諸般物色錢已及官本别無失陷除已有人承買交業外並特給還未足者許貼納收贖仍不限年四方聞之莫不鼓舞歌詠以謂聖恩深厚燭知民隱誠三王推本人情之政也尋契勘杭州共有一百一十二户合該上項敕條方且次第施行次忽准尚書户部符據蘇州申明如何謂之折納如何謂之籍納本部已依條估覆供認伏定入官折還缺錢謂之折納已經估覆三估不伏定即以所估髙價籍定者謂之籍納惟籍納産業方許給還用此契勘遂無一戶可以應得指揮至有已給再追者於是百姓歡然出訴于庭以謂某等自失業已來父母妻子離散轉在溝壑久無所歸伏幸仁聖在上昭恤如此命下之初如䝉更生今者有司㳂文生意又復壅隔雖有惠澤蓋與無同臣即看詳元初立法本為興置市易已來凡異時民間生財自養之道一切收之公上小民既無它業不免與官中首尾膠固以至供通物産召保立限增價出息賖貸轉變以苟趨目前之急及至限滿不能填償又理一重息罰嵗月益久逋缺愈多科決監錮以逮妻孥市易官吏方且計較功賞巧為文詞致許人户願以屋業及田土折納還官各以差官檢估取伏定文狀了日理作季限放免息罰召入添價收買方人户在係纍之時州縣督責嚴急如有産業田土豈復自能為主檢估伏認勢須在官雖名情願實只空文唯是頑狡之人或能抵拒以至三估未肯供狀及其既納皆是折還缺錢並籍在官有何不同聖恩寬大特為立法以救前日之弊所稱籍納只是臨時立文出於偶爾而有司執閡妄意分别若果如申明即是善良畏事之人不䝉憂恤元初恃頑狡獪與官為競之民却被惠澤事理如此豈不倒置不惟元條無此明文實恐非朝廷綏養窮困之意及檢㑹元祐四年三月二十六日敕人户缺市易官錢將樓店屋産折納在官並將所收房課充折别無少缺亦許給還亦不曽分别折納籍納以此相明顯無可疑自是蘇州官吏巧薄以刻為忠曲有申明而户部吝於出納以害仁政伏乞特加詳察不以折納籍納並依元條施行所貴失業之人均被聖恩一伏見元祐元年九月八日敕尚書户部狀據提㸃兩浙刑獄公事喬執中奏熙寧四年後來至元豐三年以前新法積缺鹽錢及有均攤等人陪填見今貧乏無可送納已纍經赦恩比類市易等錢只令送納産鹽場監官本價錢其餘並乞除放等事本部勘當欲並依喬執中所奏前項事理施行仍連狀奉聖㫖依及準提刑司備坐元奏積缺鹽錢前後官司催納僅及六年催到貫萬不少今來所缺並是下等貧困之人無可送納已纍經赦恩及逐節事理遂具狀申奏今準省符前項指揮請詳朝㫖施行本州契勘上件年分計有四百四十五戶自承朝㫖已來追今首尾五年才放得二十三户臣竊怪之以謂東南鹽法久為民患原其造端蓋自兩浙流衍散漫遂及江南福建流弊之末人不堪命故詔令之下如救水火今者五年之久民之疾苦依然尚在朝廷德澤十不行一何也推考其故蓋提舉鹽事司執文害意謂非貧乏不在此數而州縣吏人因緣為奸以市賄賂故缺而不決竊詳元奏之意本謂積缺嵗久前後官司催納到貫萬不少今來所缺並是貧困之人既以纍經赦恩比類市易只乞與納官本價錢本部勘當以此並乞依奏仍連狀奉聖㫖施行即是執中所奏缺户自是貧困之人皆當釋放矣省部行下務從文省止是節略元奏為其已涉六年見今貧乏無可送納非為更行勘㑹須得委是貧乏方可施行至元祐二年本州再以元豐四年已後至八年登極大赦以前積缺鹽户奏乞除放省部看詳方始立文如委是貧乏即依元祐元年九月十八日已降朝㫖施行以顯執中當時所奏並謂見今貧乏無可送納合行一例除放及節次本州與轉運司各曽申明省符與元奏詞語不同省部亦已開析緣元係連狀並依前項所奏施行事理甚明而主司堅執至今疑惑至使州縣吏人户户行遣一一較量計搆官司買囑鄰里尚復多方指摘以肆規求待其充欲然後保明遂致其間一百四十九户已放而復行勘㑹一百五十六户申省見勘㑹而未圓二十五戶已圓而申禀監司及有一戶二戶旋申省部如此反覆多方留難即五年之久未足為怪也伏惟仁聖在上憂民疾苦寤寐不忘惠澤之下宜如置郵𫝊命今乃中道廢格以開奸吏乞取之路反使朝廷之恩獨與奪於州縣庸人之手省部既不鉤察官吏亦恬不為慮甚非所以仰稱仁聖焦勞愛民之意也伏乞昭示德音申飭有司更不勘㑹是與不是貧乏無俾奸吏執文害意以壅隔朝廷大惠不然或斷以第三等以下並依上件朝㫖施行則法令簡易一言自足矣蓋等第素定貧富較然朝行夕至奸吏無措意也所有元豐四年以後及至八年大赦以前所缺鹽戶亦乞依此施行一伏見熙寧中天下以新法從事凡利源所在皆歸之常平使者而轉運司嵗入之計惟田賦與酒稅而已方是時民財窘亟酒稅例皆減耗諸路既已經費不足上下督責益急故酒務官吏至有與庸保雜作州縣受官視事去處亦或為小民喧譁羣飲之肆又不能售往往茍逃罪戾巧為文致誘導無知之民以陷缺負破蕩之禍如許人供通自已或借它人産業當酒是也臣近契勘杭州自承上件指揮以來以産當酒者計一千四百三十三戶計錢一十四萬二千九百餘貫前後官司催督監錮繼以鞭笞拘當在官遣之離業又自收其租利中間以至係纍犴獄公與私皆擾人與産俱亡十餘年間除已催到一十二萬九千四百餘貫計千二十九户外尚有餘缺一萬三千四百餘貫計四百四戶嵗月既久終不能填償豈非並是困窮無有之人乎尋檢㑹元豐四年五月二十一日敕酒務留當産業依鹽錢例拘收以其鹽與酒事同一體故也今者鹽錢缺户已准元祐元年九月十六日及二年九月十八日朝㫖許納場監地頭官本價錢餘並除放獨酒缺至今未䝉如此施行豈容事同一體拘收則同而除放則異此無它蓋有司不能推廣朝廷德意故也臣愚欲乞將元豐八年登極大赦以前酒缺人户並依所缺鹽錢已得朝㫖并今來前項申明更不勘㑹貧乏或斷自第三等以下事理施行不惟海隅細民並䝉休澤實亦無偏無黨皇極之道也一伏見元豐四年杭州合發和買絹二十三萬一千匹准朝㫖撥轉運司錢於餘杭等縣委官置場一十一處收買尋以數內揀下不堪上供五萬七千八百九十匹計錢五萬五千餘貫却勒逐場變轉是時錢重物輕一日併出既聲言行濫不受於官又須元價以冀償足捐之市中莫有顧者於是官吏惶駭莫知所為不免一切賖貸及假借官勢抑配在民往往其間浮浪小人與無賴子弟詭冒姓名朋欺上下元買官吏苟得虛數還之有司以緩目前之禍其後督責嚴急必於取償奏立近期專委强吏十餘年間如捕寇盜除催到四萬六千餘貫外餘缺八千二百餘貫共二百八十二户並是貧民下户無所從出與詭冒逃移不知頭主及干繫均納之人連延至今終不能足惟有簿書以資奸吏追擾遺害未已今者伏准元祐五年四月初九日敕諸處見缺蠶鹽和預買青苗錢物元是冒名無可催理或全家逃移鄰里包認或元無頭主均及干繫人以此積年未能了絶雖係元請官本況內有已該元豐八年登極大赦者依聖㫖並特除放歡聲播傳和氣充塞臣於此時仰知聖德廣大正使堯湯水旱亦不足慮也然政有體事有數體雖備而數不能悉言雖不及而意在是者蓋非俗吏所能知也臣輒不避僭妄竊詳和買之法以錢與民而收絹猶是補助耕斂之意公私兩有之利也元豐官吏以絹與民而收錢又皆行濫弃捐之餘取償倍稱不實之直賖貸抑配以苟免一時失陷之責即是利專自為害專在民也事理人情輕重可見聖恩矜恤宜在所先臣愚以謂元豐四年退賣物帛既同是和買之名又有非法病民之實自合依今年四月九日朝㫖施行外伏望朝廷深念前項弊害止是出於一時官吏私意非如蠶鹽和預買青苗天下公共之法更賜加察告示矜寬不以有無頭主是與不是冒名及鄰里包認與均及干繫人並特與除放是亦稱物平施天之道也右所有四事伏望聖慈特察臣孤忠志在愛君别無情弊更賜清問左右大臣如無異論便乞出敕施行若後稍有一事一件不如所言臣甘伏罔上誤朝之罪若復行下有司反復勘當必是巧為駮難無由施行臣緣此得罪萬死無悔但恨仁聖之心本不如此如天降甘雨為物所隔終不到地可為痛惜而況前件四事錢物數目雖多皆是空文必難催索徒使胥吏小人緣而為奸威福平民故臣敢謂放之則損虛名而收實惠不放則存虛數而受實禍利害較然伏望聖明特出宸斷天下幸甚臣愚蠢少慮言語粗踈干犯天威伏俟斧鑕七年二月軾為龍圖閣學士知揚州狀奏曰臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年于兹仁孝慈儉可謂至矣而帑廪日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士隂求其所以皆曰方今民荷寬政無它疾苦但為積缺所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比户者皆為市易所破十無一二矣其餘自小民以上大率皆有積缺監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為蓽門圭竇矣自祖宗已來每有赦令必曰凡缺官物無侵欺盜用雖有侵盜而本家及五保人無家業者竝與除放祖宗非不知官物失陷奸民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為奸吏之所蠶食急之則為盜賊之所慿藉故舉而放之則天下悅服雖有水旱盜賊民不思亂此為捐虛名而收實利也自二聖臨御以來每以施舍已責為先務登極赦令每次郊赦或隨事指揮皆從寬厚凡今所催缺負十有六七皆聖恩所貸矣而官吏刻薄與聖意異舞文巧詆使不該放監司以催缺為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請求誰肯舉行恩貸而積缺之人皆鄰於寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令通指平人或云衷私擅買抵當物業或雖非衷私而云買不當價似此之類蔓延追擾自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虛日俗謂此等為縣胥食邑户嗟乎聖人在上使民不得為陛下赤子而皆為奸吏食邑户此何道也商賈販賣例無見錢若用見錢則無利息須今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富户先已殘破中民又有積缺誰敢賖賣物貨則商賈自然不行此酒稅課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放稅縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖缺兩稅較其所缺與依實檢放無異於官了無所益而民有追擾鞭撻之苦近者詔㫖凡積缺皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有㫖倚閣者方得依十料指揮餘皆併催縱使盡依十料吏卒乞覓必不肯分料少取人戶既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積缺所壓日就窮蹙死亡過半而缺籍不除以此虧缺兩稅走陷課利農末皆病公私並困以此推知天下大率皆然矣臣自潁移揚州過濠夀楚泗等州所至麻麥如雲臣每屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天灾流行民雖乏食縮衣節口猶可以生若豐年舉催積缺胥徒在門枷棒在身則人戶求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積缺故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔常不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催缺乃甚於水旱臣竊度之每州催缺吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積缺為事內已有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其於理合放於條未有明文者即且令本州權住催理聽候指揮其於理合放而於條有礙者臣亦未敢住催各具利害奏取聖㫖元祐五年四月給事中范祖禹乞車駕所過不毁民屋劄子曰臣伏見祖宗時執政大臣第宅散居諸處或遇亡歿車駕臨奠儀衛簡省雖入隘巷亦不拆毁民屋自熙寧初置東西八位大臣所居近在闕門雖有臨奠更不經歷街巷昨來曹佾之喪二聖臨幸有司毁拆屋舍經過居民不無失所雖百姓多侵街蓋屋毁之不敢有怨然因車駕經過比之它處獨被煩擾恐非陛下仁聖子育萬民之意也今孫固亡歿已在外第街道甚逺竊慮車駕臨奠有司毁拆更多臣愚欲乞先降指揮除大段窄隘處量加撤去外無令過當拆屋庶使聖駕所過小民知恩哲宗時右僕射范純仁奏陳青苗等法疏曰臣今月初五日上殿奏事䝉聖慈面賜詢問臣有奏對未盡事理今合再具敷陳䝉聖問先朝青苖等法臣對以先朝愛民之意本如父母愛子而立法付之乳媪若乳媪苟欲應法而無愛心則赤子必生它患更為王安石立法非是激以賞罰所以官吏急功尤為民害尋聞德音謂當時不須立賞臣以奏陳它事未暇詳對今合子細敷陳大凡朝廷立愛民之法不若示愛民之意法行則拘文徇迹苟且應命意通則隨事便民宣布實惠今陛下愛民正如父母念逺處嬰兒若不教乳媪愛子之心而特為立乳哺燥溼藥餌之節而使行則乳媪將不問兒之大小肥瘦虛實之異及臨時飢渴疾病好惡之情一切執用其法則嬰兒必不自適徒益生其疾苦至有不能言而夭橫者多矣此豈父母之本心哉不若選擇乳媪而委之使各盡其愛兒之心飢渴燥溼隨事得宜而字養之則嬰兒皆自便適而康壯矣今朝廷愛天下之民為立徭役補助之法付之監司守令而行彼將不問俗之同異民之好惡利病及施行先後一切守法强民而行則民將失耕田鑿井之樂增加疾苦無告而流亡者多矣此豈朝廷之本意哉蓋拘以文法之害也況天下親民之官能知民疾苦利害者十中無一復能以朝廷立法之意推而行之合於民心者又加少焉能合於民而不顧身之得失上官之喜怒肯盡已心而行者百無一矣如何使朝廷德澤下究而民不受其弊哉臣願朝廷如臣乳媪之喻而選舉監司守令教之以愛民之意則將有實惠及民不煩朝廷立法而天下安矣其青苗等法若當時雖不立賞不免擾民故元祐初朝廷聞而更之至今人以為便元祐八年十二月右僕射范純仁丐外上面諭吕大防曰純仁有時望不宜去卿其為朕留之亦遣中使趣純仁歸府又遣中使趣純仁入見純仁既入見上此奏先是大防欲用侍御史楊畏為諫議大夫要純仁同書名奏擬純仁曰上新聽政諫官當求正人畏傾邪不可除因不敢與聞遂故爭避位大防不寤竟超遷畏為禮部侍郎畏尋上疏乞講求神宗法制以成繼述之道上即召畏登對自是悉召用熙豐舊人實畏發之焉時殿中侍御史吕陶上奏曰聖人以一身之尊而立乎萬民之上能固結其心而使之欣戴悅服𫝊至數百年而猶不忘者其道果安在哉德澤之流行如天地之無不覆載如日月之無不照臨如雨露之無不潤澤窮幽極逺盡其纎微皆得以綏安煦育而莫之遺被賜懷惠之人淪浹於肌膚而著藏於骨髓故也德澤者順從所欲而拂去其所不欲焉耳彼惡於貧而吾濟之以富彼畏於死而吾援之以生彼困於勞而吾休之以逸彼苦於虐而吾撫之以寬此其所以結乎民心而使之不忘之具也然而能極盡幽微而莫之遺者是必詳衆人之所略重衆人之所輕而後能焉若曰略其所略而輕其所輕則天下烏有不遺者哉鰥寡孤獨者衆人之所略也而文王發政則必先之豈非天民之窮猶䝉其惠則六州之俗皆歸其仁歟匹夫匹婦者衆人之所輕也而有不被堯舜之澤則伊尹以為已推而納之溝豈非一夫猶被其澤則比屋之衆皆享其利歟詩曰哿矣富人哀此惸獨書曰先王子惠困窮皆所以不遺幽逺而能極盡之也陛下寬惠慈恕愛人恤物無愧堯舜之用心而天下之民或濫於刑或斃於不粒或困於重賦或窮於積逋使憂愁怨嗟之聲未息而和氣無以感召者蓋德澤有所遺而未能盡故也非國家德澤之不廣大蓋羣臣失職而不能宣導之也羣臣之不能宣導者詳其顯而略其隱也重所後而輕所先也上仁之則下賊也上通之則下塞也上厚之則下刻也知斷刑之可以懲奸而不察圜牢之寃也知實廪可以足食而不恤餓夫之殍也知取民之有制而不思凶荒之所宜救也知豐財之為富而不哀逋負之所當釋也法律明著如權衡之不可欺郡縣之獄使者將命而按核已論之罪則考正於理官詳覆於刑部而又審於從臣詔書數下申飭留繫罪罰有疑詳從奏蓋防民之寃負也而獄吏不能盡曲直則文致其罪以求合於法法吏不復辨真僞則從而處之罪成於文而刑麗於罪雖按核詳審之勤亦無及矣此天下之民或死於濫刑也按夀昌之舊謹觀諸嵗乘有餘而斂俟不足而散以便農民而常持其平民田不幸而歸于公者嵗取其租以備水旱而廣朝廷之惠蓋慮民之捐瘠也而有司懵於逺慮吝如已積指下熟之年為上嵗以遏郡之聞白舉昔日之糴計今日之估責以毋損於公利餓殍滿野而倉廪不知發道殣相望而饘粥不謀救此天下之民有斃於不粒也天災間作穡事不登凡以告者為除其賦且著之令甲示不可慢蓋憂民之流亡也而郡縣之吏憚於興事惡聞凶年壅下情而不上達租庸之臣以掊刻為勞而務足嵗課霜雹大隕旱蝗相仍五榖之收無毫毛矣而輸入之數十猶七八此天下之民有困於重賦也赦令布告凡逋負之不欺者一切蠲去蓋寬民之貧窶也而郡縣以聞則有司網羅疑似索求罅缺幸其少與法戾而復峻督責之令及乎委弃溝壑而勢不可得乃鞭笞子孫縲械鄰里而猶有望焉此天下之民有窮於積逋也嗟夫天子仁聖如此而生民之受弊乃如此九重高拱安得而知乎為人父母固不忍默視其然也雖然臣竊謂亦有警勸之術以坐制萬里之外而使之皆被其賜焉時察其端而加之懲責則警矣利得以專而事為之倡則勸矣祖宗之德深可憲也疑龍士元之奸而終辨其罪則天下之寃獄孰敢不察乎劾登州吏不以飢饉聞而命發粟以貸則凶嵗之餓夫孰敢不恤乎臣故曰時察其端而加之懲責則警矣淳化之詔民田旱甚者蠲租不俟報則除賦之令孰敢不舉乎咸平之政閲逋籍脫繫囚而以內帑金錢償其家則釋負之赦孰敢不行乎臣故曰利得以專而事為之倡則勸矣用祖宗警勸之術而施國家之德澤於天下則生民無有不懷者此陛下嗣政之先務而天下未之見也陶又奏曰凡國家之財用與民之衣食一出於農農者天下之大本王治之所貴不可使之失職也古者方天下之田而授之民一夫一婦所得百畝自六鄉六遂以及諸侯之國人皆有田以耕故無富貧之異溝洫以導水泉之利廬舍以安田野之居雞豚狗彘桑茹瓜果凡可養生之具莫不備至故耕者不闕其用春耕夏耨不失其時田畯之官出入畎畝以勸勉慰勞其勤故無曠土宅不毛田不墾則又為屋粟里布之罰以懲其怠惰故無游民用之不過三日故不困於役取之不過什一故不傷於財三年耕有一年之蓄以備水旱故無流亡此先王制土處民之大略王道之基始也自阡陌之興法度大壞其流散漫於千載之後而不可復收舉今天下生民之困而唯農為甚世之議者深探本原而力欲救之故其說有二焉或曰古之有田者自耕而食皆為天子之農今天下之田大半歸於兼并而貧人不能占以為業天下之自耕而食為天子之農者十無二三耕而食於富人而為之農者蓋七八矣耕富人之田而食之則嵗時勞苦之所得見奪於兼并而無憾雖自耕其田而為生之具又多仰給於富人則亦不免其見奪是以貧者常罹不足之害富者常享有餘之利夫欲人人皆有可耕之地而貧窮得以自養則莫若限吏民名田無過若干要以十年使歸吾法向之多占者必有少損之漸今之富彊者無復多占之理則貧人可取其餘以自耕不分其利於富人而遂為已有庶幾農之可富也或曰守宰之職在導民務本而安其生者也今乃略於農事而以為末故田疇不闢而未加勸導之意水利久廢而未究修講之術賦役煩重而不能均一民人流徙而無以招懷此農夫之所以重困也莫若以耕桑為守宰勸課之法責之以勉勵田作之功興廣灌溉之利平均征役而撫集逋逃則為稱職庶幾農之可安也臣愚以為此二說者皆利於農而施設之先後則必始於限名田而終於責守宰何者今農人之弊蓋貧者無田以耕與其有田而寡少者皆不足以自養而仰給於人是以富强獨專其利而已受其病雖得賢守宰以臨郡縣又安能使利不專於富强而不足自養者無患於貧哉故臣謂必先限田而後責守宰也然臣又聞立法以救弊法之不行則如不立任官以撫民官之不擇則如不任此二者朝廷之宜深究也夫所謂吏民占田者乾興中嘗採議臣之言而限之今復舉而載於法令示天下不可輒犯也然以四海之廣而未聞過制被坐者豈人皆畏法而不敢過歟蓋吏不奉法而未之懲吏不奉法而不懲民之過制而不坐則天下之田安得而限哉夫所謂耕桑勸課者乃前世循吏之能事國家亦嘗求之羣臣矣名官以勸農殿最以户口賜之日歷以書其功過而率多農田之說是也然而仕路紛濁郡邑之政輒輕付授使妄人得容其間而為民之蟊賊則勸課之職何以舉哉苟非申必行之法任必擇之官則天下之農未見少䝉其利也陶又奏曰甚矣斯民之不聊也生長治安之時可以舒遲閒暇樂其生矣而萬事窘遽常若逢兵寇之難荷戴仁惠之主可以休養生息遂其宜矣而衆心惶惶常若罹暴戾之政無水旱凶荒之災衣食可足矣而不免流亡捐棄於溝壑無疫癘薦瘥之患和聲可應矣而怨歎悲嗟不絶於口此其故非它取之過制力竭財匱而天下多困窮也耕夫織婦日夜勤勞於農桑之事田疇加闢杼車不停而粒米未嘗充飢衣褐無以卒嵗者歸之賦稅也賦稅之總有四曰榖曰帛曰金鐵曰物産而榖之品有七帛之品有十金鐵之品有五物産之品有六以四總二十八品之别括四海之地宜詔邦國之求索則一土之毛未有不督其租也一物之生未有不輸其利也而況舍其所有取其所無變而掊之以就贏餘之功也按籍命數輕賤其估以聚榖帛實乃橫斂而名曰市之不可以稽負也奈何斯民之不窮困非獨乎此而已也舉天下之寶貨發於山澤皆有禁蔽民不得而取盡其銖兩而入於公矣舉天下之鹺荈急於民用而皆鬻於官恃之以為大利矣舉天下之關市商販之所通百物之所易皆有征算爭計毫釐而繩之以刑矣舉天下之酒𣙜科憲峻密嵗課羡長而不知止矣斂求掊聚之術遍滿四海不遺巨細如大網之張萬目觸而過者皆投其中奈何斯民之不困窮也國家之及乎此亦非好利矣經用太廣而調度常不足也斂求掊聚如此其急而一嵗之入出無餘焉茍少緩之則何以濟矣夫嵗非常善也邉境非常安也平居無事罄入以為出惕惕然猶懼其不能濟萬一不幸有水旱兵戈之虞則又何以取給哉明主不過出內帑金幣以助計臣使之贍足而不忍重困斯民也夫內帑之盈虛較於祖宗之時臣不知其如何矣然以地産有限國費無窮而議之亦可逺思長慮而少為裁約也臣愚以為今之急務莫若節經費然後可以戒聚斂能戒聚斂然後可以寬民力民力寬則王治可望其成也國之經費有不可已者豈一日而能節之哉蓋亦節其可已者以備其不可已者而徐為之計耳養兵百萬成軍以居而饋餉不可闕也萬官之冗賢愚之並而祿廪不可省也郊見上穹慶賚至廣而故事不可廢也河防屢溢千里䝉患而積備不可蠲也勍敵狂慢戒在好戰而嵗賂不可絶也此五者國家之大費天下皆知其不可已固未能一日而節之必循襲含忍而徐為之計也至于內外不急之費不㑹之用若掖庭廪賜燕私之盛若百工技巧冗食之衆若大臣有進爵之賞有易地之賜而又有密賚此皆可一日而節無所憚也臣願量時制宜一切損減以蕃貨財以備五不可已之事勿競錐刀勿竭膏血以取於民勿視之如塵滓而橫賜過豫勿鬻爵度僧以救凶旱則民力無重困而國體有常尊矣臣又聞向者嘉祐之末癸酉赦令既出郡縣無以賞兵皆貸錢於民至威之以刀劒區之以笞箠為國結怨而僅有得者陜洛之郊皆狼顧而不寧既而賜與之厚或及千萬議者有云罷賜一大臣可以不貸於數郡則用之之易可不思其取之之難乎陶又奏曰天下方困於力役之煩而不得息肩力役之甚困者莫大於驅上農為郡吏而役之破産竭財以斃於凍餒此生民之積憾治世之深蠧公卿大夫之共閔而朝廷之熟聞也昔者嘗採議臣之言而著之憲令按郡邑之籍循環而役之惟先後之别而不復計其盈虛是强者或幸而弱者或不幸又從而變之為限年之制使富者不久逸而貧者不數勞天下郡縣奉以為通法而不敢輒議豈朝廷寬假之惠止於此而撫救之道無以加乎臣愚竊謂其未也今細民之家苟有數十金之産則牛羊耒耜餱糧裘褐皆可籍之於公以備役之之費矣方其役之將至而知其費之必及於凍餒也則其心如避重誅其勢如捍巨寇奸薄巧僞悖義害教以求其不及是故母子之道絶而昆弟之情離者往往而是其甚者乃至服浮圖𨽻兵籍以一身自陷於非類而覬幸於斯世焉昔秦人之制家有兩男而不分異者倍其賦故其民富而子壯則出分貧而子壯則出贅語今之法有數十金之産而役之至於凍餒則安怪其母子昆弟不相親而身陷於非類哉朝廷方將講太平之䇿以厚風俗而法有類近於秦明主愛民過於赤子欲驅之富夀而反為力役之大困亦足惜也而議者以為寬假之惠撫救之道不過如前之所謂無乃略乎夫人之疾病而衆皆惜之者為其有所苦也得良醫而治之必能察其為疾之端而務欲去焉耳痞則調其腹心痱則强其手足然後可以就愈有衆人恤病之心無良醫去疾之術則何救於所苦哉知役之困民而欲少寬之者其心固能恤病矣而不革其所以困之之具則終不可少寬其力是去疾之術誠有未至也且役之能困於民者其具有三而已一曰饋挽之勞也二曰公帑之盛也三曰計㑹之煩也是三者為弊雖一而有公私緩急之異安可不察其原而議所以救歟所謂饋挽之勞者蓋有無之相通經費之不可闕傳置所不給羡卒所不勝以義言之則不為私以用推之則不為緩雖欲愛重民力復可得哉至於公帑之盛計㑹之煩則舉非公家之所宜急而亦不重民力以耗於此尚何憚而不革哉舉天下之郡國官多而兵衆者嘗已厚賜緡錢以備燕犒而又享貿易之息可取濟矣然妄人假之則不知紀極舉圖回之事付諸鄉吏而責其豐贍以媚悅權貴以要掠浮譽以過自奉養是安知力役之重困乎臣願申飭法禁以杜絶不仁之態則其弊之革蓋三四矣舉天下之課入經用盈縮耗登重輕衆寡大有及於萬億小不滿於釐杪貯積蓋藏最為謹密自縣而至郡自郡而至漕計而至三司上下相繩綱目相貫決不可少欺矣然而旬月嵗時必上其籍而較於有司役焉而已者至於子孫而較之未已使疲民以不資之費而供猾吏無厭之求亦何益於事哉臣願簡其條目而罷去數上之籍凡金榖貨幣之局苟不至於趨走役任者可如近嵗亭驛之職止以武吏司其出納以代上農之勞使猾吏無所覬望則其弊之革又四五矣夫二弊既革而重困之具止於一端亦庶幾去疾之漸歟陶又奏曰昔者聖人慮民之深而恤民之至俯而視之如父母之於赤子是故保息休養之道巨細備盡而不闕其一處之於安而又能防其危驅之於樂又能拯其憂不屋則不足以居故為之棟宇以庇風雨之患不耕則不足以食故作之耒耨以興田疇之利羽皮之不可久衣故教之組織以具裘褐毛血之不可久茹故修火之利以供烹飪此皆為生之具亙乎萬世而不能輒易者也而立為天下國家之文理法度以嚴君臣以篤父子以正夫婦以隆禮義以申刑法使之循習畏信而底乎大定此為治之道放乎四海而不可少亂也聖人之至於此亦可已矣而又哀其疾苦之無告而死亡之不可以考終也於是辨其金石草木之品性氣味而制其隂陽甘苦之用以治其疾恙而使之不陷於凶短載之以為書習之以為術𫝊之千萬年而人亦賴之與夫向之不能輒易而少亂者其利均而其功一也降及三代之盛而保息休養之道莫詳於周周之制分設六卿各率屬以舉天下之治禮樂刑政條目雜然足以致隆平而遂萬物則又有醫師之官掌醫之政令有疾醫之職掌萬民之病分而治之書其所以而至其祿食豈非慮民之深恤民之至欲躋之夀域而無使一夫不獲哉深惟洪範九疇言天人相與之際為人君治世之大法而以五福六極列於終者蓋明政教得失之驗生民幸不幸之實也五福之條有夀考康寧而六極之别有疾病短折者言格王之治可納民於福而不可歸之於極也然則生民不幸而疾病短折豈非皇極之纍哉是以古稱堯舜至治者蓋無喪子哭弟之民也嗟夫天下之民不幸而不得其死者非一也質之洪範之五福則未能敷錫驗之堯舜之至治則猶有少愧安得不講修闕政而為驅躋之具哉蓋民之不幸而死者有四寇盜竊發疆埸未寧有亡於干戈也寃枉不伸深文抵罪有亡於刑戮也水旱間作田疇汙萊有亡於飢饉也此三者國家常察知其端而逆為之備矣誅鋤奸凶完固封略所以息干戈之役也精核真僞寬貸疑典所以防刑戮之濫也富積倉廪時而散發所以禦饑饉之災也其愛民之命可謂至矣若夫協氣未效雨𤾉不時而有亡於疾癘者則未嘗有以為備豈不惜哉今千里之郡萬室之邑而醫無良焉愚夫道聽塗說而為民之司命以執其存亡之權民之被病者或拱手而俟死誤治而亡之者比比是也以一郡言之日誤一人焉舉天下之大而計以嵗月不可勝數矣此聖人之美利有所不至而天下之和或未應也臣伏思祖宗之時嘗詔天下置博士頒方書者誠愛民之深德矣今乃略而不以為急使陛下之元元不能趨於夀考而未為之備竊為朝廷惜之也如臣之䇿宜博選良醫以教天下之專其術者詔天下之民有能習之則課試藝學而寬其賦役使其鄰里鄉閭之人可以治病而有前古相扶持之俗則生民隂受朝廷之賜而免不幸之死非王道之一端而太和之本歟全民之生莫切於此臣是以不敢侈言而夸說也慕容彥逢奏曰臣伏見陛下若稽古訓自京師至州縣各置居養所以聚鰥寡孤獨之人詔㫖丁寧臣下遵奉道無莩瘠咸有所歸發政施仁孰大於此臣竊以為鰥寡孤獨雖日困窮而至於被服禮義之化均太平之民臣居田野間江東溧陽縣以居養所見管屋宇隔截為八室用發政施仁必先四者為號使男女異處不相雜擾一方之民莫不悅服臣愚欲望聖慈特詔有司應州縣居養所並依前項體式隔截異室分處男女不惟子惠之澤洋溢中外而禮義之化不廢於困窮之民以副陛下愛民誠意尚書右丞相梁燾上奏曰陛下必欲百姓無困窮之憂莫若賦斂寬平徭役輕簡豐稔和平則安養富庶之使常有餘力凶荒勞敝則救恤休息之使不至失所臣下有寬恤百姓之請者擇而行之臣下有掊斂百姓之說者一切罷之郡縣之吏别立舉法以隔私恩如知州通判知縣縣令皆用公舉而不得以恩例為請則多得實材可以分憂矣書曰德惟善政政在養民又曰知人則哲能官人安民則惠黎民懷之謂政事必本於愛民官得人則善政行民悅而歸心矣歷代名臣奏議卷一百六
