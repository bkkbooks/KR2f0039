body:
  text: 歷代名臣奏議卷二百十四明楊士竒等撰法令宋孝宗時趙汝愚繳論張時中獄事狀曰臣竊謂朝廷之法畫而不變者也法當輕則從輕法當重則從重有司惟知奉法而已法之外非所敢議也至於情法不能相當故有情重法輕情輕法重有司不敢專決者則具事因以請于上亦惟上之所命如何耳臣伏覩臨安府所勘將仕郎張時中為不合因弟居中在禁用錢行賂于獄吏徐造等法司定法合徒二年私罪追將仕郎綾紙當徒一年餘徒一年贖銅二十斤其法不為不重矣誠使時中之罪猶不止此本府惟當開具情法申取朝廷㫖揮不應輒用己意既乞依條斷罪又乞某人特配五百里某人特配鄰州某人特送三百里外州軍編管如此則輕重豫奪之權皆在有司而朝廷之法不幾於廢矣夫京師者諸夏之本也使有司任情廢法一至于此四方何觀臣愚伏望聖慈特降睿㫖行下本府將張時中止依條定斷外仍令今後不得妄於法外擅自擬法庶幾君臣之分嚴朝廷之體尊虞允文論金州之弊乞加威令於諸將狀曰臣閏七月二十九日到金州宣布陛下德意不敢不盡而臣以非才乃使之理軍市修民政去大奸蠧以革四十年不可勝言之弊大懼不足以奉明詔稱崇委也臣自纍日來以所聞見考質文簿則隨一事有一弊條目至多不可殫紀臣嘗行江淮荆襄歷遍諸軍較之金州實所未有也大抵視民之財即已之財視官之物即已之物公取竊取見於一事輒以十數萬計貪墨自肆上下一律略無忌憚至軍民日用食飲之物一毫不恤也原其端由起於王友直而成於今日愁怨之聲載於道路臣既摘其大者榜於通衢劄下諸軍明以實事丁寧約束庶其懲改或可少副陛下顧懷逺方軍民之意然榜與劄子姑先示告戒而已如欲羣貪斂戢根株脫壞大洗堅久之惡習非一振朝廷威令則小人之聽未必具孚小人之心無緣盡革也數十年來士夫之說以循習守常者謂之靜重以革敝盡治者謂之生事自生事之說行於上而巧詆深謗之人四出以應之流言一行非者輒信是者輒疑敝未必能盡革治未必能盡立而身已危故寧為因循茍且以竊靜重之名而享安榮逸樂之福此臣之所甚憤也然臣倚陛下聖明不敢自愛雖其人方主兵未敢明有所究治而官庫之錢前後欺隱與顯然分取者一面拘收已及五十餘萬緍至以諸軍折估等錢自利州捴領所關請徑為回易隱落乾沒之數未敢問也日者伏聞陛下以鎮江主將之貪亟罷黜之赫然一怒以慰安三軍之士而擢用王友直郭剛近者莫不恱逺者莫不畏甚盛舉也論者獨曰一將在軍指顧笑談之間掊斂剋剝之事無不如意財既巨萬矣富可百世矣一旦得罷去以就祠庭之逸而月食厚祿是其所大欲也如使諸將始效其貪中極其富而終覬其逸則知懲艾者鮮矣如未欲正其罪籍其財姑禠其崇資而徙之逺方猶足以伸威令示方來也臣伏望陛下剛明果斷作新治功竊意必有以處此特萬里外未知之爾臣所出榜約束事件謹録具别劄進呈伏乞睿照衛涇上奏曰臣聞養子之法所以重繼嗣之道又以年之長幼為定則人情法意蓋曲盡矣臣照得吕念一彭一皆吕細三阿陳養子初乞養時彭一才二嵗吕念一方生十四箇月按令節文異姓三嵗以下聽收養依親子孫法吕細三與彭一吕念一為親父子則吕念一彭一為親兄弟無可疑者據案稱吕細三夫婦以前後生男女不成恐有相剋其彭一自七嵗以來止呼其姓其吕念一彭一自來作兄弟稱呼如此則所呼彭一乃世俗厭禳之意初不害為親兄弟也今吕念一止因其兄彭一取去房門手板各以酒後紛爭本無利害彭一先用柴棒打吕念一吕念一就奪柴棒打彭一致死則是弟打兄甚明其間下手先後雖有情理然名分所在則是非曲直有不容以輜銖較者按律十惡四曰惡逆注謂殺兄大赦所不原免今徒以稱謂避忌之小嫌遽謂之異姓與凡人同科則三嵗收養為親子孫之法可廢不用而養子之悖理傷道者雖父子相陵犯亦可以異姓而薄其罰矣況人情不甚相逺凡養子者固望其相視如至親乃所以為繼嗣之誼若雖三嵗以下收養如法而以異姓之故既不可以為親兄弟則亦不可以為親父子則凡世之養子於父子兄弟間無有定分同居共處一室之內不可恃以為親輕於暌異而不相保矣寧失不經雖聖人好生之德然天倫人紀之所繫風教名分之所關乃治道之大經尤不可一日而或紊也豈以一夫之死為足惜哉然臣區區之愚猶非敢以吕念一為必當殺苐見法寺刑部兩嘗堅執而朝廷以特㫖行之似於有司之職為未能盡欲望聖慈特降指揮將吕念一案再送法寺刑部及敕令所從公詳議庶各盡心職守如情法相當所斷允當則從其元斷在朝廷不失為好生在有司不失為守法義斯兩得若吕念一所犯果為可憫人情法意可以通行或已有似此斷過體例俟其申上貸之未晚亦可以久行而無弊誠非小補所有録黃臣未敢書行謹録奏聞涇􅌳榮傅辰改正上奏曰臣聞朝廷行法非難守法為難法之所在行之果而守之堅則人有所畏而不敢犯若能行之一時而不能守於異日則將啓人之玩心而不知懲創矣諸事已經斷而理訴者一年內聽乞别勘三年聽别定其經敕斷者詣闕進狀此法也今榮傅辰嘗任蕭山知縣在任以不法取勘曾經伏辨准敕比加役流贓罪追毁出身以來文字除名勒停則是法已行矣𫝊辰既而申訴亦嘗詣闕進狀臣取索到刑部文案法寺則以為應得别定條法合具申朝廷行下無干礙監司照應别定條法施行刑部則以傅辰所訴未應條法乞朝廷批狀告示據此二說則𫝊辰所訴未可遽從甚明今置有司之言不問而輒與改正則於守法之吏毋乃或未安乎臣竊惟陛下比來與二三大臣修明紀綱嚴贓吏之禁恐為民害犯者不貫若已經勘結敕斷如傅辰輩容易與之改正則凡不曾勘結伏辨而以贓罪廢罷者豈得無辭以自解乎兼傅辰狀自稱元勘寃屈臣未暇詳究其事或萬一有如所訴何惜不與從條别定然後斟酌施行庶足以昭示至公在朝廷不失為守法在傅辰容有可諉者臣職守所在既有愚見難以緘默所有録黃臣未敢書行謹録奏聞薛季宣上奏曰臣聞牧馬者在鞭其後驅羊者去其亂羣施之於民其則不逺先王制徒流之法所以懲惡緩死也𨽻於赤籍所以繩其悍戾困之居作所以折服其心用示戒懲于以納民于善而除俗之蠧也近自軍法之壞非復紀律之存配流之徒知不得與善人齒於是留則肆其頑惡逃者流為奸盜椎埋屠販習以為常鄉之所以繩其悍戾折服其心者曾不復見為民之害未有甚於此屬者非細患也􅋀見大軍招刺强壯絶為艱得給賞例物其費不資强刺良民不勝其擾每念小人罪至徒流以上非勇悍則奸賊也收之於軍則使貪使愚之法可得而用漢世募弛刑徒徙塞下周世宗收天下奸人亡命以備禁旅治以軍法皆有成效臣謂先王加役之流𨽻于赤籍者此其意也有軍律以繩其悍戾有師役以折服其心使皆遷善嚮功不復混于民伍而為善人之蠧鞭其後去亂羣者不幾是乎願詔天下州軍凡罪至配流年五十五嵗以下非尫羸無疾患者並送大軍收管情理輕者特免刺面其徒罪以上願從軍者許從原收仍免重役如此一嵗之內大軍所得將不啻數千人無非悍戾之夫比之招刺而來居然異矣軍收其用民去其頑善有所遷人除其害而法出寬厚亦當今善計也觀文殿大學士兼侍讀史浩上奏曰臣聞罔以辨言亂舊政伊尹進戒於商王無作聰明亂舊章成王申命於蔡仲伊尹傳堯舜之道成王重文武之光立一時金石之言為萬世蓍龜之訓蓋以祖宗創業垂統有望後人故其君臣疊矩重規無非成法實不刋之令典為可繼之詒謀難得者聖賢之相逢所貴者子孫之長守若思輕改決匪良圖方陛下即阼之初正微臣輔治之日上封事者纍百輩言弊政者僅千條必欲取而紛更罔有贊其紹述固嘗大書方䇿不辜其來及夫聚議廟堂頗難其用陛下挺拔俗之見深垂裕之原一遵列聖之宏模已輩中興之哲后此其明效大驗所當謹守弗渝比年以來獻言頗雜一劄可喜即日與之施行衆志未孚當時已自窒礙徒為紛擾無益施為始雖易若轉圜旋未免乎反汗間有深知時病灼究弊端雖惓惓以盡忠亦悠悠而未效薰蕕既溷玉石奚分良由稽考無官審訂無局行之既無所據罷之不究其因幸賴四逹之聖聰終亦一歸於舊貫為今之計當謹其初遴選從班一二人就取敕局三數吏盡裒彛憲立為司存凡以改作而獻陳必使看詳而指定稽之典禮而不悖揆之律令以無愆有補於時必著於籍前鋪條貫後列姓名庶於指掌之間若見肺肝之易一以供上方之觀覽一以備中書之舉行或有兵機則關密院儻久行而有利益必加賞以示恩私務使三尺之金科不撓一夫之臆說其或姑欲藉手以求美官無復究心更防後患率然而作出於不思意有在於身謀事無裨於國計蓋言之者無罪當置之而勿聞苐欲公朝發號出令之間不失聖主繼志述事之美臣輒殫一己之見未盡天下之公欲望聖慈更諏衆議參樞邇列侍從近班烏臺洎兩省之英樞府及百司之屬盡從公道罔有異詞則此芻蕘之言或有毫髮之益知長沙王師愈乞禁止師巫疏曰臣竊聞荆楚之俗自古信師巫然而近世為尤甚其最為害者有所謂把門師是也言一家之事皆由其掌握也有嫁娶不暇問媒妁專信其勘婚稍奉之不至則離間兩家致嫁娶失時者多矣有疾病不敢求醫藥專信其下禁稍奉之不至則恐動其親屬不令侍奉至有飢渴而死者多矣比其死亡則專掌其擇地選日稍奉之不至則托以山川之不吉年月之未利動經數嵗不獲葬埋鈐制其家嫁娶者又多矣愚民無知信其邪說甘受此害而不悟惟恐奉之不厚以是師巫家無非溫户甚可切齒在律法事邪神言禍福自有常刑奈何州縣欲賣乳香或貪其微利返給公據縱而不問甚可駭也欲望聖慈申敕州縣嚴行禁止如或不悛重作斷遣無貸庶幾其害可革時省符下知平江府王佐決陳長年輒私賣田其從子訴有司十有八年母魚氏年七十坐獄廷辨按法追正令候母死服闋日理為已分令天下郡縣視此為法知進賢縣程回議曰天下之人孰無母慈子若孫宜定省溫凊不宜有私財也在律别籍者有禁異財者有禁當報牒之初縣令杖而遣之使聽命于其母可矣何稽滯遍訴有司而達于登聞院乎春秋榖梁𫝊注曰臣無訟君之道為衛侯鄭與元咺發論也夫諸侯之於命大夫猶若此子孫之於母乃使坐獄以對吏愛其親者聞之不覺泣涕之橫集也按令文分財産謂祖父母父母服闋巳前所有者然則母在子孫不得有私財借使其母一朝盡費其子孫亦不得違教令也既使歸于其母其日前所費乃卑幼輒用尊長物法須五年尊長告乃為理何至豫期母死又開它日爭訟之端也抑亦安知不令之子孫不死于母之前乎守令者民之師帥政教之所由出誠宜正守令不職之愆與子孫不孝之罪以敬天下之為人母者蔡戡議治贓吏法狀曰臣聞法貴於行不貴於重太重則不可常行法重而必行非先王之法也王者之政蓋有不忍之心存焉一有不忍之心則法雖重而未必常行不過救一時之弊而已今夫蠧國害民莫甚贓吏雖肆諸市朝有不足恤伏自陛下初政以來舉行決配之法所以嚴戢此徒而惠愛斯民者可謂至矣然十五六年之間抵觸重憲者數人耳豈州縣之吏人人精白謹廉或畏法逺罪而不犯有司乎然贓吏固自若也國家忠厚與周匹休風俗習為醇美監司守臣務行寬大坐視笞辱黥涅與徒𨽻等惡傷士類故不忍為甚則持釋氏因果之說寧鐫秩罷官不肯劾吏必不得已使之尋醫而去贓汚狼藉所不可掩姑求一二微罪應課塞責或經年參選或遇赦敘用復使臨民其害滋甚臣愚欲望聖慈特賜詳酌凡贓吏罪至決配者姑免其罪編置海外州軍雖遇大赦永不量移或情理巨蠧非常法所可治者取自聖裁時一用之仍乞睿㫖嚴飭監司守臣悉以刺舉部內有犯失於覺察或它司按劾或朝廷訪聞考驗得實者併坐之庶得贓吏必達不至漏網重為民害崔敦禮代江東帥論法制不可輕立疏曰臣竊惟立國之權惟法度政令而已祖宗之法度要使天下遵之而不敢議人主之政令要使天下信之而不敢疑若夫因一事而立一法因一人而創一令則天下竊議而人心益疑矣仰惟陛下剛健出於天縱宏規逺略冠古未有甚盛德也然比年以來祖宗舊法或變於小臣之獻言而朝廷出令或徇於一夫之私意為之特降指揮如此等類不勝其多臣姑以到江東州郡所見一二言之夫巡轄遞鋪自有司存若其稽違行法可也今乃因有闕誤特令守倅入銜夫州郡之事孰非𨽻守倅者可盡入銜乎此亦未免為文具也豈非因一事而立一法乎路分鈐轄與轉運判官提舉常平茶鹽官序官著在乾道新書所至未嘗不遵守今忽特降指揮申明如此則乾道一書每事皆當降指揮然後遵守何其繁也豈非因一人而下一令乎此特其小者猶未至於害政也至於兵戎之職各有臨制階級自都捴管而下又有副捴管乃有路鈐鈐轄路分都監亦猶諸軍之有都統制副都統統制統領之屬今乃許路鈐因訓練得以專奏則諸路副捴管路分都監及諸軍統制統領茍有為之地者皆當援例而降指揮矣平居無事未計利害緩急之際軍政不一豈不乖亂況其間挾勢妄作之人必至率意生事帥臣不敢號令監司不敢誰何紊亂常制莫甚於此此令一下輿議歡然知必有謂良由結交植黨茍相崇重欺罔聖聰變亂法制充其類而長之將何所不至外議以為權要近習有主其人者臣在逺方不得而知但觀近數年凡權要近習所主之人所立之事號令一出無敢執奏論駮者而士大夫顧望如此豈不負國昔趙充國有言吾年老矣不以餘命為國家言之誰當言者況臣䝉恩最厚非充國比年將七十方欲乞骸以歸若隱默不言徒與天下竊議實負陛下伏望斷自宸衷自今以往凡小臣獻說必察其所由來詳之重之毋輕立法凡朝廷出命必合天下之公心毋徇一夫之私意俾天下咸知王言之大王心之一則綏先王之祿底蒸民之生端自此也臣無任惓惓敦禮又代陳丞相乞住白劄施行事疏曰臣待罪帥藩職事之外年老識昏每恨無以仰裨聖德敢因近事輒效愚忠竊聞號令出於人主行於朝廷布於中外古今天下之所同也間有軍國機密之事或慮行遣稽緩則自御前批降指揮用寶行下此所以令天下信而不容僞也未聞有內臣或都承㫖司數百里外以白劄傳㫖處分事者臣自到任以來一年又半矣凡三次被受指揮皆是白劄其一發北來人王濟等送都統司支破請受其一催勘楊百寧侵用官綱其一今次天申節斷屠事臣各已遵依施行矣此三事者非甚機密之事若付省部行下何所不可夫省部行移則有印御前批降則有寶其文書可驗其經由可考天下無得而疑者舍此而用白劄雖是小事無甚利害臣之愚慮竊慮白劄既言於天下則它時緩急有支降錢物調發軍馬處置邉僥干國家大利害等事既是地逺其勢不得覆奏又所取遵依狀止令付差來人回或申元承受去處其間詐僞豈可盡防若嚴重知體之人必至奏審則往來之間遂失事機若繆懦無識之人耳目習熟以為當然即便施行豈不誤事又文字或不附遞差使臣虞候齎送所至妄自張皇頗有驚動官吏奉之如奉敕使犒勞僕馬饋遺酒食之費有至二三百千者州郡如此其它可知兼又訪聞諸軍將佐或總領諸司及兩淮州郡時時有之如此實於朝廷事體非便亦有外方施行之事而朝廷不預知者萬一詐僞決至誤事悔無所及大率奸民巧詐如度牒交子茶鹽鈔引之類猶能僞況此白批幅紙豈難撰造使其奸細容心於其間當不止於脫漏饋遺而已也臣愚欲望聖慈自今以後在外有合處分之事乞從御前批降或從省部行下庶幾號令信確人不致疑而於事體甚正異時緩急不至誤事天下幸甚端明殿學士汪應辰上奏曰臣聞兵所以衛民也民所以養兵也相須而成其實一體然茍惟御之不以其道則或更相為愈而不得其所矣夫以三代盛時兵出於農而其告戒之詞猶曰無敢冦攘踰垣墻竊馬牛誘臣妾況後世兵農之分而政治又不及三代乎唐劉蕡謂足蹈軍門視農夫如草芥可以見其弊矣雖然此唐末之政也若夫聖人有作雖兵農已分雖三代已逺所以因時制宜者固自有道矣恭惟陛下明察政體總攬權綱駕馭將帥惟所進退訓飭堅明賞罰必信是以軍旅所在雖雜耕錯處而部伍整肅無敢譁囂兵民相安帥守協濟凡昔人所云云者今皆可以無慮矣乾道二年因三省樞密院有請戒敕諸將禁約人兵不得侵擾百姓如有陳訴聽守臣一面追捕依條斷治如有本將不即發遣仍聽守臣具因依聞奏所以防微杜漸可謂至矣將帥固已擇人士卒固已用命而詔令之下又如此其明白其消患於冥冥之中蓋不可勝數伏見乾道新書偶不該載竊恐或者以為一時指揮未必常用非所以申嚴約束傳示永久之意伏望聖慈更詔有司以前此詔㫖載之著令使帥守皆得遵奉兵民皆得通曉人有所畏則法雖設而不犯矣臣䝉恩假守實當兵馬屯駐之地憑藉朝廷威令之重所謂兵民相安帥守協濟竊庶幾於萬一焉是以敢冒昧言之臣不勝戰栗之至光宗紹熙三年陳傅良上奏曰准中書門下省送到録黃一道節文為刑部大理寺狀吉州奏勘到百姓鄢大為說合已斷人李一討合遊六等各持杖行劫朱三家榖物贓滿按法寺稱其鄢大為准條於絞刑上定斷合決重杖處死二月十四日三省同奉聖㫖鄢大為依斷令臣書行緣事干人命須至奏聞者臣竊詳上件斷案止以鄢大為所帶劫榖木檐堪以害人定為持仗强盜贓滿五貫合決重杖處死設若不以木檐為仗即計贓須滿十貫方得死罪死生之分在於木檐稱仗不稱仗毫釐之間此不可不謹也臣嘗習此矣在律杖謂兵器杵棒之屬餘不稱仗准此恭惟本朝列聖繼作刑日益輕以為杵棒立文該載未明則犯法者易陷刑者衆於是重立兩條案嘉祐編敕賊盜門其一云應持竹鎗竹杖磚石之類為盜堪以害人者並同持仗之法此謂茍持竹鎗竹杖磚石堪以害人之物而為盜者即為持仗以明但持所須之物為盜不得稱仗矣其一云將鎌檐刀斧之屬於人園林陂野內偷割禾榖蔬果盜斫柴薪之類元非積聚者并將篙楫盜取空船或持鞭杖偷趂孶畜雖變主知覺但不曽施威力抵拒者依不持仗竊盜法此謂茍持鎌檐刀斧所須之物而為盜即不為持仗以明必是持仗堪以害人之物為盜始得稱仗矣上件兩仗合為一編載在敕文則有司承用可以參照不至抵牾至於元豐刪修舊敕一時不深求嘉祐以前立法美意輒將上件兩條離為兩門其一條在名例門云諸稱仗者持竹木磚石之類堪以害人者同其一條在賊盜門云諸於城外竊盜無人防守特持所須之具者並為不持仗注云謂採斫須金刀船筏須篙楫負須檐畜須鞭之類蓋自將兩條離為二處即凡用持仗之法只據名例門立文凡用不持仗之法只據賊盜門立文而兩文始不相參照無所斟酌矣兼詳元豐剛定嘉祐敕顛倒本文已失初意謂並同持仗之法改作諸稱仗者節略數字便成深文謂剛去鎗杖但稱竹木自元豐迄今有司遵用蓋不知重報者幾千人矣今來鄢大為之獄只是布袋并檐即不曽施威力若用嘉祐舊敕即非持堪以害人之物為盜明矣且夫前朝立法本持所須之物為盜其意非是欲以害人雖斧刃不謂為仗本持堪害人之物為盜其意是欲以害人雖磚石得謂為仗但論其盜有無欲害人之心不計所持是不是堪害人之物原情定罪此春秋之義也又云持仗在外空手入室罪至死者減一等即雖持仗若其時不以入室可以減等又云變主知覺但不曽施威力抵拒者並同不持仗即雖持所須之物若其時施威力抵拒可以加等可謂深切著明矣而元豐改作離析敕文今來有司尚循謬誤臣愚欲望睿慈特將鄢大為之罪從未滿十貫條特貸命斷遣仍乞以刑部大理寺擬斷官吏並見免坐失入之罪仍乞將見行條法送刪定所據嘉祐舊敕將兩條刪潤併入賊盜一門以憑遵守臣聞中興之初重修紹興敕令已有指揮用嘉祐舊法故元豐敕多在釐改之科數內持仗一條當時有司偶失參考尚未追正今來若行刪潤初非創新衝改而聖主好生之德公朝從恕之風自今以始益深益厚愚民無知雖似幸免而天聽甚卑宜享其報此臣所以拳拳也所有録黃臣未敢書行寧宗即位國子録王介上疏曰陛下即位未三月策免宰相遷易臺諫悉出內批非治世事也崇寧大觀間事出御批遂成北狩之禍杜衍為相常積內降十數封還今宰相不敢封納臺諫不敢彈奏此豈可久之道嘉定四年著作佐郎真德秀上奏曰臣伏見朝廷以楮幣過多折閲日甚舉積年之弊而一新之其為利至博也然臣竊聽道塗之論尚慮四方郡國之間未能悉體公朝之意奉行頒布一或不䖍其為民患蓋亦非一臣嘗官于州縣每觀詔令之下本為利民而吏於其間並緣苛擾民未拜賜而害已隨之承流宣化之臣有未嘗過而問者雖詔㫖丁寧毋得抑配而抑配自如毋得搔動而搔動自若許民庶以越訴矣所能赴訴者幾人命監司以糾察矣果能舉按者何事此臣疇昔所親見者是以下情鬱於上達上澤壅於下流積習相㳂非一日矣今新令之行以舊劵之二而易新劵之一儻郡縣推行惟謹則實惠豈不周流然慮其間未能亡弊或頒降有限僅充官吏之橐而弗及齊民或胥吏要求秖給豪富之家而弗及下户或創局亡幾惠止城邑而田里未免見遺或爭奪紛拏難於禁止而公私反致多事自非守宰得人區處有術則其為害殆不止斯怨嗟之聲所在必衆且神臯輦轂近在闕庭舉行之初尚多惶惑然隨病隨藥易於察知外而四方去天既逺設有弊幸何由上聞羣情嗸嗸感動和氣非細故也況欲新令之行必先民信其上若使逺近之人齎持舊劵倣徨四顧無所用之棄擲燔燒不復愛惜豈不逆料它時之必至此乎臣愚伏望申攽明指戒飭監司守臣一意講求多為區畫俾實惠及人而無換易不行之歎庶幾詔令之下不為空言實天下幸甚嘉定六年德秀為起居舍人又上奏曰臣伏覩陛下以郊禋慶成天地報汛思與元元同其祉福酌議臣從厚之請凡厥恩霈加隆於舊德澤洋溢延及羣生物情熙然蓋庶幾呼升平氣象矣抑臣聞之滿堂飲酒有一人向隅而泣則滿堂為之不樂四海之廣匹夫弗獲聖人以為己憂頃者朝廷以楮幣日輕改行新令慮士大夫奉行之不恪於是威之以禠奪竄斥之刑慮民之虧減牟利於是警之以沒入家資之罰蓋亦大為之防而欲其無犯焉耳中外有司茍能體認朝廷之意擇其甚者而加懲焉則人孰不畏亦孰不服而臣得諸所聞乃有未嘗玩令而以玩令言未嘗誤國而以誤國劾者或因寮屬之讒而不究其實或因豪强之謗而輒徇其私是豈朝廷立法之本意耶至若籍沒之行尤多濫及蓋有胥吏利其多資而因以傾奪者矣有閭巷平時睚眦而因以中傷者矣夫估籍之禍甚於刑誅刑誅雖酷痛止其身資財一空盡室溝壑今乃不量其輕重而驟施之亦豈朝廷立法之本意耶夫當德洋恩普之時顧未免有向隅之泣者此亦聖朝所宜矜惻也臣愚伏望深詔輔臣稽參衆論凡州縣官有因奉行新劵為監司守臣按劾追削居住其倚法漁利重為公私之蠧者自無足議其間咎犯稍輕及止緣材術短拙情在可矜者當此郊霈之餘量行牽復許之自便至於估籍一節雖令申審然展轉經營縱幸獲免已亡其半謂宜明敕監司守令自今民間有違犯約束諭告弗悛者止當嚴置典憲不許更籍其家亦足以廣聖朝惟新之澤或者必謂如此則法禁既弛令愈不行臣竊以為不然今四方郡國蓋有未嘗劾一吏籍一民而流通無滯者亦有操切太甚物情愈駭而終不可禁者此在有司推行之工拙耳況臣所請止欲罰當其罪而開釋無辜非欲蕩然撤去禁防而後已也儻臣言可采惟陛下留神德秀又上奏曰臣既勸陛下以容受忠言今願以忠言為陛下獻竊惟今日關國脉盛衰繫民生休戚其惟楮幣一事乎惟我祖宗有國以來所以保天命結人心者其道非它曰不施重刑不事厚斂不行苛政不用酷吏而已列聖相承世守弗易是以德澤深長與天無極太平之久逺過漢唐陛下聖性寬仁率由祖訓更化之後偃兵息民天下䝉福不可勝計而自楮幣之更州縣奉行失當於是估籍徒流所在相踵而重刑始用矣科敷抑配逺近騷然而厚斂始及民矣告訐公行根連株逮而苛政始肆出矣假稱提之說逞朘削之私者唾掌四起而酷吏始得志矣夫是數者豈朝廷本指哉方其弊壞既極不得已而變通之出御府之金捐祠曹之牒展期以收換多方以優恤唯恐其病民也法行之初雖有情重估籍之文未幾又為之令曰當估籍者毋得專行必聞於朝以俟報可忠厚謹審之意寓於不言又若是其至也而臣觀今之州縣間務為新竒創立科調乃多出於朝廷約束之外故有一夫坐罪而昆弟之財併遭沒入者矣有虧陌四錢而百萬之資悉從沒入者矣謂之奉法可乎至於科富室之錢朝廷之令所無也拘鹽商之舟朝廷之令所無也以産稅多寡為差令民藏劵此又朝廷之令所無也昔者熙寧新法之行可謂嚴矣識者猶曰寬之一分則民受一分之賜況今朝廷之意本以便民而奉行者乃背戾如此謂之體國可乎雖然四方利病臣不能遍知臣閩人也所謂家産滿千錢藏劵五十者閩中之新令也夫産滿千錢大約田幾百畝養生送死之費縣官征稅之輸皆取具焉非常之須又不在是安有餘資可市劵而藏楮乎況閩之為俗土瘠人貧號為甚富者視江浙不能伯一故此令既行鬻田宅以收劵者雖大家不能免豈便民之策耶或者徒見楮價驟增遂指以為新令之效臣竊謂不然乃者朝廷蓋自有良畫矣曰福建上供純許用劵以一嵗計之為數幾二百萬官之用劵既多則民之視劵亦重蓋將不强之貴而自貴不迫之藏而自藏矣況民之輸官者錢楮各半是朝廷輟見緡豫州郡者亡慮百萬稱提之助沛然有餘尚何待它為科配乎厥今四方之民病此極矣使前數端果出於公朝之令陛下與二三大臣聞其為害至此亦必惻然更張不俟終日況特出於州縣旁緣之私何憚何疑而弗救之乎臣願陛下渙發德音明敕諸道監司守臣體認國家更幣便民之本意凡於詔令之外創意妄為託名奉法實則壞法者悉從蠲罷其尚有嚴刑厚斂肆苛嬈而恣貪酷者令臺諫糾察以聞重置之罰庶幾安元元之生以壽宗社之脉實天下幸甚寧宗時籍田令徐清叟疏言邇者江右閩嶠盜賊竊發監司帥守未免少立威名專行誅謬此特以權濟事而已而偏州僻壘習熟見聞轉相倣效亦皆不俟論報輒行專殺欲望明行禁止一變臣下嗜殺希進之心以無墜祖宗立國仁厚之意太學博士許應龍上奏曰臣聞有法之弊有例之弊法之弊易見例之弊難革舍法而用例此今日之大患也夫著而為律疏而為令編次成書各有條目蓋截然而不可易也是雖有旁照有通用舞文弄法者固未免輕重出入於其間然使有司之精明詳考而熟究之其奸莫能逃也豈不曰法之弊易見乎乃若例者或出於一時之特恩或出於一時之權宜有徇親故而開是例者有迫於勢要而創是例者揆之於法大相抵牾而後來者扳援不已案牘在胥吏之手有司不可得而知也求者執已行之比有司不可得而拒也豈不曰例之弊難革乎今日之弊百司庶府凡所施行固未嘗無一定之法然未免循積習之弊舍法而用例焉非不知三尺之背違也執而不行恐至於咈人情非不知冒濫之滋甚也抑而不豫慮至於召衆怨遂使胥吏得以執其柄而容其私厚賂以賈之則以為有例之可行請求之未至則匿其例而不用長吏知之而不能禁天下交病之而不敢言昔富弼有言曰近年綱紀甚紊隨事變更便為成例至使民力單竭國用匱乏所以然者法制不立而習為例者淪胥至此也是則用例者豈非壞法之尤者乎今日之弊亦已極矣一切禁戢而惟法是用固為拔本塞源之論然循習之久遽爾盡革恐事勢有扞格而難行者若聽其冗濫而不為之救止則轉相因仍必至於蕩然而無法矣昔韓琦每事用例吏持例在手惟視金錢之多寡以為去取琦目擊其弊取其可用者而刪其冗謬者是以吏無所容其奸事以職舉今莫若明詔有司搜求前後已用之例公共參酌可行者留之不可行者去之使之輕重得宜於法意不相違戾編為成書藏之有司凡有陳乞據此施行若是書之所不載者皆抑而不豫庶幾權不在吏而奔競妄求者無所容其巧矣此亦因時施宜之一策也惟陛下與大臣熟議而行之青田縣主簿陳耆卿上奏曰臣聞民俗之不媺非一端也而健訟之禍為大夫州縣所以平天下之不平者也民有不得其平而求於州縣州縣不能平之則於臺于省蓋其勢之不獲誰得而忿疾之哉然觀今日州縣之訟未必皆不得其平者也良民以訟為耻頑民以訟為喜夫以訟為恥藉有不得其平非至慘烈有茹苦不言者矣不幸而至於訟有未幾而中輟者矣頑民幸其然也故常以强籠弱以富撼貧既侵奪之懼其直於官也則先粉澤其辭以自媒於訟故今天下之不直者多為詞主而直者起應之爾夫其樂競好爭如嗜飲食而又能髙資以啖胥吏强辭以瞽官曹未及書判則已欲預持其長短而曰不勝不止矣所較者不數緡而其求勝之心雖竭産不靳稍不如意則鑿空越訴不遺餘力故官吏聞風畏之往往含容黑白而天下多不決之訟由是喜訟日熾矣喜訟者日熾則天下之不得其平者日廣矣夫告訐者有法自刑者有法不干己者有法告上而不以實者亦有法今未必盡行也是以奸民勇無所忌而風俗益偷臣愚乞降睿㫖申諭省部臺郡凡民訟小大其已經剖斷得實而輒枝蔓誣訴者各以其罪罪之毋俾幸免彼知喜訟之為無益也則相率而歸於無訟惡草去則良苗殖此自然之理臣不勝惓惓理宗時許應龍奏曰臣聞歐陽修曰今出令之初不加詳審行之未久尋又更改以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之論官吏或相謂曰且未要行不久改或曰備禮行下略與應破指揮符牒縱橫上下莫能遵守劉安世曰命令變更逺不過三嵗近或朞月甚者朝行夕改使民疑惑欲乞出令必使大臣協謀門下審覆臣謂言多變則不信命頻改則難從此昔人之格言也夫君者出令者也臣者行君之令而致之民者也必相與講明以求其是若順乎人心合於事宜然後布之天下其信則如四時之不移其行則如汗出而弗反若此則規模一定上下相孚為無不成政罔不舉而治效可以立致茍思之不精講之不詳聞斯行諸既不察其當否人或有言則又從而中輟前後抵牾莫知適從文移雖繁徒挂墻壁歐陽修謂出令不加詳審尋又更易上下莫能遵守劉安世謂朝行暮改使民疑惑欲乞出令必使大臣協謀門下審覆其意正為此爾今宵旰非不勤施行非不多然悠悠嵗月莫覩成緒豈積弊難遽革治功難驟成耶無亦數更數易而無一定規耶履畝恐為民之擾則復令給還混試恐人物之繁而復分諸路雖曰更變靡定猶不失乎厚下以立本因時而施宜至若竄謫者當以漸移乃驟還其舊秩不與親民者未經赦宥乃遽與之注授邉功者既使之從軍而復與之參選居官者當俾之終秩而隨即改除稱提之令洊更鹽鈔之法屢變遂使人心皇惑雖令不從幸門一開扳援無已欲轉而移之亦無甚難惟當致謹於出令之初則不輕變於己行之後賢果可任則任而勿二邪若宜去則去而勿疑利所當興則不動搖於浮言弊所當革則不遷易於羣議如是則奉行之必䖍事功之必立理內御外殆將無不如意然而人心不難孚國是不難定惟在乎公與斷耳公則心無私主或用或舍悉參輿論必不至於以一人譽而召以一人毁而棄斷則不惑羣議或罷或行莫不當理何至輕於嘗試而遽為小不如意而輒沮為人上者茍能守之以至公行之以獨斷則發號施令罔有不臧人莫得以容其議則尚何變更之有此又要終原始之道惟陛下與大臣亟圗之則天下幸甚禮部尚書魏了翁進故事曰唐陸贄入翰林嘗居中參裁可否時號內相嘗為帝言今盜遍天下宜痛自咎悔以感人心昔成湯罪己以興楚昭王出奔以一言善復國陛下誠不吝改過以言謝天下使臣持筆亡所忌庶叛者革心帝從之故奉天所下制書雖武人悍卒無不感動流涕後李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力蓋贄有助焉奉天改元詔曰致理興化必在推誠忘己濟人不吝改過朕嗣守丕緒君臨萬方失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明證厥初以示天下惟我烈祖邁德庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤垂于後肆豫小子獲纘鴻業懼德不嗣罔敢怠荒然以長于深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察征戍之勞苦澤靡下究情不上通事既壅隔人懷疑阻猶昧省已遂用興戎召師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依生死流離怨氣凝結力役不息田萊多荒暴命峻於誅求疲氓空於杼軸轉死溝壑離去鄉閭邑里丘虛人烟斷絶天譴於上而朕不悟人怨於下而朕不知循致亂階變興都邑賊臣乘舋肆逆淹天曽莫愧畏敢行淩逼萬品失叙九廟震驚上辱于祖宗下負於黎庶痛心靦貌罪實在豫永宛愧悼若墜深谷賴天地降祐神人叶謀將相竭誠爪牙宣力屛逐大盜載張皇維將𢎞永圗必布新令臣聞感民之事非一而詔令莫先焉臣嘗觀三代而下惟漢文為最篤實而近古其日蝕之詔曰朕下不能治育羣生上以纍三光之明其悉思朕之過失以告其祠官之詔曰以不敏不明而久撫臨天下朕甚自愧其和親之詔又曰四荒之外不安其生封圻之外勤勞不處皆朕之德薄而不能達逺也嗚呼何其責已之重以周乎蓋人君以孤立之身臨億兆民之上而欲率天下惟一己之從此非可以空言聳動也漢以後惟唐德宗能識此義聽用陸贄之言以實德誠意用之於詔誥命令之間如云長於深宫之中暗于經世之務積習易溺居安忘危又云天譴於上而朕不悟人怨于下而朕不知循至亂階變興都邑此等語言雖以德宗强明自任耻屈正論而猶能痛自咎責以格頑悍此外制書詔書凡二十有八去其小事四篇之外凡二十四篇亦無一而非罪己之語蓋不獨奉天制書為然也今自權臣專國以來內患外禍無嵗無之而每詔令下未嘗有一言稍自咎責詞臣習成諛佞不知其非雖有水旱盜賊例曰年榖屢登四方無虞扶杖聽詔之民無不愁怨以為朝廷之不恤人窮也今幸陛下親攬萬機而是弊也相承而莫之改臣自入都以來親睹士大夫之論似謂禁旅之變自誅戮以後皆已退聽可保無它京口之變自遁入茅山之後漸已窮蹙可保平安雖以廟社威靈凡可怖可愕之事往往幸而銷弭然喜諛佞而惡訐直樂䝉蔽而咎張皇上下相徇習以為常臣恐一旦事有大於此則無以為陛下告此不可不過為之慮也淳祐間徐元杰進故事曰仁宗皇帝皇祐二年詔內降指揮許執奏敢因緣干請者臺諫察舉先是上諭輔臣可於明堂赦文中禁止內降庶澄宿弊輔臣等奏曰載之赦未盡聖意乃别下此詔臣聞人主之命令至不可輕也輕則主威䙝而民聽惑始之所忽者若甚微而末流之患有不可勝禦者是不可不察也至哉仁祖之用心其申嚴內降執奏之法必欲見之於宗祀之德音所以對越祖宗而示其無愧於詒謀之初意在是爾然觀輔臣之逺慮尤欲盡述聖人之德意志慮而專布於詔㫖之丁寧者若恐視之以為赦宥之故常而遂已也在易之夬以剛決柔者也聖人取其孚號之義而必曰揚于王庭蓋王庭者出命之地明白洞達所以公天下而信萬世也祖宗成憲載在國史行之至今不翅如桑麻榖粟不可一日廢而三省體統先後綱維凡建明之惟允者必審於覆奏覆奏之已行者必嚴於封駁故外庭之事非內庭之所得與公道元氣之繫命非私意小不忍之所能轉移此聖宋宗社靈長之本未有不自防微杜漸之始得之也臣觀成周盛時八柄之誅賞廢置固王之所得專而必惟大宰之所詔告使大廷廣衆之所共知也今考王宫之職掌自小宰而下曰宫正曰宫伯凡宫之政令糾禁各有司存而𨽻王宫之役者又皆士庶子為之是以當時居虎門以司王朝者必嚴以師氏之職凡可以護養人主之德性保固其心術謹之於未萌制之於未動者無非太宰以下羣臣之責豈若後世耳目之輕有所寄而偏受私昵之易啓卒無以禁斜封墨敕之弊所以蹙唐祚於亂亡其所由來者漸矣由辨之不早辨也臣又觀諸葛亮出師一表方當益州罷敝則以為危急存亡之秋深懼其塞忠諫之路而無以光先帝之遺德故直其辭曰宫中府中俱為一體若有作奸犯科及為忠善者宜付有司論其刑賞至於親賢臣逺小人而必深述乎先漢之興隆者在是若夫親小人逺賢士而後漢之所以傾頽者又必重致其丁寧之戒吁此亮之一表所以與伊訓說命相為表裏也歟然則有天下者其必考周之盛而監唐之衰重周典宫禁之制而參之以宫府一體之言則賢臣必親小人必逺外廷此心必不為內廷之所移如是則仁祖之宏規懿範只在陛下一心術持敬之頃而已臣不勝拳拳金世宗時有司言民間收藏制文恐因而滋訟乞禁之平章政事張汝霖謂王者之法譬猶江河欲使易避而難犯本朝法制坦然明白今已著為不刋之典天下之人無不聞誦若令私家收之則人皆曉然不敢為非亦助治之一端也不禁為便詔從之梁肅為濟南尹上疏曰刑罰世輕世重自漢文除肉刑罪至徒者帶鐐居役嵗滿釋之家無兼丁者加杖準徒今取遼季之法徒一年者杖一百是一罪二刑也刑罰之重於斯為甚今太平日久當用中典有司猶用重法臣實痛之自今徒罪之人止居作更不決杖章宗承安四年户部尚書孫鐸因轉對奏曰比年號令或已行而中輟或既改而復行更張太煩百姓不信乞自今凡將下令再三講究如有益於治則必行無恤小民之言國子司業赫舍哩善才亦言頒行法令絲綸既出尤當固守上然之元世祖時有二道士爭長互立黨與其一誣其仇之黨二人為逃軍結中貴及通事楊惟忠執而虐殺之中書耶律楚材按收惟忠中貴復訴楚材違制帝怒繫楚材既而自悔命釋之楚材不肯解縳進曰臣備位公輔國政所屬陛下初令繫臣以有罪也當明示百官罪在不赦今釋臣是無罪也豈宜輕易反覆如戲小兒國有大事何以行焉衆皆失色帝曰朕雖為帝寧無過舉耶乃溫言以慰之趙天麟上太平金鏡策曰臣聞意由言而後彰言須書而克備故雷風既動造化可以施功王者不言臣下罔攸禀令興戎出好有信無私際天下而咸指薄四海而皆視豈輕也哉湯后告殷人以不食史佚戒成王之無戲所係大矣能無慎乎今國家聖祖神宗遺規樹典至于陛下益廣德音八十餘年一家天地宣於民書於史成於禮歌于樂者固非一也然而中外之臣民或得其一而不得其二或見其後而不見其前互相照依未遑明辨循如是之風而望治寧之至臣竊謂似乎未之能盡也伏見至元壬申年間聖㫖節該不用泰和律令將以損其餘而益其闕舍其舊而新是圗也越至於今二十餘年猶未有示民之明文守令自專宰相無據臣已於先所獻萬言䇿內備陳之矣又伏見乙丑年間聖㫖宣諭出征人須要正身當役無令頂替雇覔其後復降聖㫖條畫內一欵該諸正軍若有雇覔慣熟好人出征者聽欽奉如此此蓋前後不相同之類也若以後㫖為宜遵依則方今萬夫千夫百夫之長多有申達上司行移各處勾取正身以相搔擾今若以前㫖為宜遵依則後㫖何為而復出哉如張湯輕重其心州犂上下其手之官吏多有因此以啓之也又伏見國典時有和同不拘此例之文臣竊以禮有一源義無二本法綱未定大化何行且鑄器用者在於防範成方圗者由於規矩如已立制而仍使和同不拘此例則是設防範而恣器用之不遵置規矩而任方圎之自用也欲其合準不亦難乎又伏見國典時有䝉古人不在此限之文而無所定之例也臣竊以九州四海一札十行大仁覃於邃逺而不之遺也大義及於滅親而不敢私也天子者天之子也民者天之所陰隲也彼羣方庶類形異音殊在天子視之雖有親疏而天溥視之則無彼此之殊也人君代天理物當合天意以行之若獨愛䝉古人則既非公道之坦夷又異皇天之溥視也且凡明詔之文其究歸于豐化節財壯本衛生之理爾若獨以䝉古人不在例則愛之適所以使之不豐不節不壯不衛以害之也又伏見詔令每下逺近震驚欣恱以為太平之可冀也開讀于京師降示於外路流布于司縣張掛于市井如揭日月可仰而不可測也如望江河可近而不可犯也及乎三日之後甫收掛壁之文而已半知半不知矣逮於逾年而知者百無一二焉小民之愚騃者欲其不犯何以能哉今之人有恆言曰新條不可犯也臣之所痛傷者尤在於斯焉小民意以舊條攸逺雖宿吏猶有遺忘庶可犯之以茍免故獨不敢犯新條也新條雖新不久而又成舊矣不更此化雖復曹參百輩亦難興畫一之歌而成清靜寧一之治也伏望陛下新天下之視聽定天下之權衡頓五葉之綱維立一朝之典式逺求告制近采家法上承天意下訪輿言乘除常理勒成一書頒於四海垂諸萬姓咸曰大哉王言又曰一哉王心下民昭知而憚犯官吏守之而不疑宰相賴之而清化陛下因之而垂拱矣愚臣妄議仰冀矜之文宗天歷二年六月陕西行臺御史孔思迪言人倫之中夫婦為重比見內外大臣得罪就刑者其妻妾即斷付它人似與國朝旌表貞節之㫖不侔夫亡終制之令相反況以失節之婦配有功之人又似與前賢所謂娶失節者以配身是已失節之意不同今後凡負國之臣籍沒奴婢財産不必罪其妻子當典刑者則孥戮之不必斷付它人庶使婦人均得守節請著為令順帝時蘇天爵上奏曰蓋聞國之重者莫先乎刑刑之重者莫大乎殺且立法在于可守用刑貴于適中夫法不可守則徒法不能以自行刑不適中則民無所措手足是以古昔之用刑必也隨世而輕重故殺人者死雖有定名然鬭殺之情至為不一若皆置之死地或情有可恕欲悉為斷放則死者何辜照得大德十年八月刑部郎中趙奉政牒鬬毆殺人輕重似少詳論本部議得鬬毆殺人所犯不一原情議罪事各有異若許一例斷放被死之人寃何由雪又恐官吏乘此弄法漸生奸弊甚於刑政不便如准所言但犯鬬毆殺人追勘完備依例結案詳斷庶免差池都省准擬又照得至正五年五月中書奏准節該鬬毆以手足毆人及頭撞擊或用它物於人非要害處毆損致命者或因鬬擊非虛怯處痛氣攻心邂逅致命者並為本無殺心擬合杖斷一百以下並流三千里其因鬬用刃及它物於人虛怯要害處毆擊登時而死或非因鬬爭無事而殺并被毆者元無忿爭止辨已事因而致命若鬬毆罷散聲不相接去而又來毆人致命身死者以其即有害心並從故殺之法依例結案待報欽此夫以法制平允則永逺可以奉行如或執一則刑獄必至淹滯近因欽奉詔書巡行畿甸詢民疾苦疏滌寃滯所歷州縣等處或有鬬殺之囚原情比附新例往往不克斷遣蓋禁奸止暴固宜嚴肅慎獄恤刑尤當慎重且今村野人民素無教養誤犯刑憲者多而郡縣官吏貪汚茍且通知法律者少夫既不能詳情審問又復不肯追勘結解致使囚徒淹延一切死于囹圄豈惟玩舞刑政亦實為感傷中和書曰罪疑惟輕易曰君子以明慎用刑而不留獄宜從都省詳定其法務使允平庶幾天下在獄之囚幸得以生全國家好生之德普洽于逺邇天爵又上奏曰法者天下之公所以輔乎治也律者歷代之典所以行乎法也故自昔國家為治者必立一代之法立法者必制一定之律蓋禮樂教化固為治之本而法制禁令實輔治之具故設律學以教人置律科以試吏其所以輔乎治者豈不詳且密歟我國家自太祖皇帝戡定中夏法尚寬簡世祖皇帝混一海宇肇立制度列聖相承日圗政治雖法令之未行皆因事以立法嵗月既久條例滋多英宗皇帝始命中書定為通制頒行多方官吏遵守然自延祐至今又幾二十年矣夫人情有萬狀豈一例之能拘加以一時官曹材識有髙下之異以致諸人罪狀議擬有輕重之殊是以煩條碎目與日俱增每罰一辜或斷一事有司引用不能遍舉若不類編頒示中外誠恐逺方之民或不識而誤犯奸貪之吏獨習知而舞文事至于斯深為未便宜從都省早為奏聞精選文臣學通經術明於治體練達民政者圜坐聽讀定擬去取續為通制刻板頒行中間或有與先行通制參差抵牾本末不應悉當㑹同講若畫一要在詳書情犯顯言法意通融不滯于一偏明白可行于久逺庶幾列聖之制度合為一代之憲章民知所避吏有所守刑政肅清治化熙洽矣歷代名臣奏議卷二百十四
