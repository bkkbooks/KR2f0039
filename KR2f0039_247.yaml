body:
  text: 歷代名臣奏議卷二百四十七明楊士竒等撰荒政宋孝宗時集英殿修撰帥福建趙汝愚上奏曰臣契勘本路八州今嵗早稻多旱惟泉州為甚汀漳興化次之福州南劒又次之建寧邵武不至甚損臣所治福州自六月十六日䝉恩降香祈禱之後相繼得雨至二十七日大雨達旦連接至七月初四日方止其時雨勢濶逺詢之傍郡亦皆得雨霑足晚稻尚可望七分豐熟秪緣本路地狹人稠雖上熟之年猶仰客舟興販二廣及浙西米前來出糶今歲適值二廣更旱米價比常年增及一倍以上州縣閉糴客舟至彼者皆空載而還緣此雖是秋成之際本州米價全不甚減泉州興化其價尤貴臣方欲措置差人于二浙豐熟去處博糴又聞得浙西日來米價亦自頓長見今疑惑未敢發遣竊恐將來本路必至大段闕食臨時倉卒無由措辦臣愚欲望聖慈特賜指揮于沿海平江鎮江等處朝廷封樁米內支撥和糴米十萬石付泉福興化三州賑糶內泉福州各四萬石興化軍二萬石令逐州自備舟船前去般取依元和糴本錢價認還朝廷臣詢訪得今歲江東西大熟米價甚賤却有傷農之憂朝廷若降指揮就彼和糴必不至虧損元數委實利便汝愚又乞選江北監司守臣接納流民耕種疏曰臣伏覩往牒見古之人善能因事為功多致轉災為福其理非有他術亦惟所以處之之道如何耳臣比聞江浙州縣自夏秋以來水旱相繼細民逐食漸多移徙往往去向江北諸郡蓋緣其處地廣人稀尚多曠土若有土著人户因而接納使之耕種猶不至大段失所或者日後流徙者衆而富室之力不能盡給其勢必有狼狽道路之憂陛下深軫皇慈每令所在賑給若乘此際就選本路監司守臣中有忠實堪倚信者委令踏逐係官閒屋及寺觀屋宇權令安住外别踏逐荒閒田土及人户請佃限滿未墾之田選擇利便去處措置興蓋屋宇候至來春給賜牛具種食計口授田使之耕種其人父母妻子皆是乍離南畝之人既感戴朝廷撫養之恩又深思一家溫飽之計必能盡力耕鑿俾無遺利其視向來屯田之兵老于行伍者其為勤惰蓋不侔矣待其三數年後家業漸成人有固志徐于農隙之際教之戰陳之法此即古井田唐府衛之遺制臣所患者惟患朝廷責其速效而所付之人不能久安於彼耳誠御之以長䇿誘之以重賞毋憚少勞毋吝小費則事無不濟矣昔張全義為河南尹時經黃巢秦宗權之亂荆棘彌望居民不滿百户全義麾下才百餘人四野俱無耕者全義乃于麾下選十八人材器可任者人給一旗一榜謂之屯將使詣十八縣墟落中植旗張榜招懷流落勸之種藝惟殺人者死餘但笞杖而已無嚴刑無租稅民歸之者如市又選壯者教之戰陳以禦寇盜數年之後户口歸復桑麻蔚然野無曠土其勝兵者大縣至七千人小縣不減二千人比户皆有蓄積遂成富庶夫全義一刺史屯將皆匹夫當唐室大亂之餘集一時流散之衆猶能有所植立今以朝廷之力官吏之衆當國家無事之際而用畎畝習勞之人誠付之得其人處之盡其道而事有不濟者臣未之信也汝愚又乞蠲放旱傷州郡夏稅身丁錢疏曰臣昨䝉聖恩令臣相度欲蠲減月樁錢或折帛錢如何得實惠及民事臣不量淺陋已具述管見當日實封進呈訖竊聞聖意深以折帛錢秖及上户月樁錢亦未必盡及細民以故遲遲多日未賜處分臣仰惟陛下至仁如天地恭儉如禹湯菲食卑宫薄于自奉而寬租減賦之令為民而下者殆無虛歲凡前後蠲減之數臣竊計之蓋不知其幾千萬矣方此連歲旱傷所在流徙未定誠不可不厚有施惠以慰人情若聖意終以月樁折帛為疑則莫若將今歲旱傷州郡人户來年身丁錢絹并第四等第五等稅户來年諸色夏稅錢物盡數蠲放彼亡聊之民䝉被德澤預知嗣歲青黃未接之際免有征催自然人情稍安天意昭格臣區區愚慮如䝉聖明采納即乞斷自宸𠂻指揮施行汝愚知信州又乞置社倉濟鄉民疏曰臣伏見州縣之間每遇水旱合行賑濟賑糶去處往往施惠止及城郭不及鄉村鄉村之人為生最苦有終日役役而不能致一錢者使幸而得錢則又一鄉之中富室無幾近者數里逺者一二十里奔走告糴則已居後于是老稚愁嘆始有避荒就熟輕去鄉井之意其間彊有力者又不肯坐受其弊攘摽竊無所不至以陷于非辜城郭之人率不致此故臣嘗謂城郭之患輕而易見鄉村之害重而難知然而求所以施行之䇿則亦不過勸諭上户廣行出糶轉移常平義倉之米以賑之而已夫勸諭上户殆成虛文轉移米斛復多欺弊臣愚欲望聖慈逺采隋唐社倉之制而去其損耗乏絶之弊明詔有司將逐州每年合納義倉米斛除五分依見行條法隨正稅就州縣送納外將五分于逐鄉置廒每歲輪差上户兩名充社司掌管受納委本縣丞檢察其欺弊不如法者正治之使幸得連歲豐稔所在稍有儲蓄則鄉里晏然若有所恃雖遇歉歲姦軌之心無自生矣如以臣言可採即乞指揮行下本司及本路常平司同共措置先次施行汝愚又陳荒政五事疏曰臣伏覩今歲夏秋以來雨澤不繼傳聞近自淮浙逺及江湖皆有旱傷去處陛下夙宵軫念當寧懷憂惻怛之情屢形于溫詔焦勞之意備見于玉容始則齊戒潔誠祈禱備至繼又緩刑舍禁寬縱為多至于務穡薄征勸分發廪凡所以敬天保民弭災救患之術無不盡舉臣智識短拙何補㳙埃獨念䝉被深恩備貟列位義當殫竭思慮少報聖聰是以不揆狂愚輒陳管見五事其一欲盡取見諸路豐歉次第其二審知所在人材其三條具諸路事宜其四酌量事體輕重其五申嚴義倉之法其間雖有朝廷已行而未盡者臣亦不避煩瀆輒申述奏陳惟陛下裁擇幸甚其一欲盡取見諸路豐歉次第者臣伏見已降指揮令浙西諸州軍守臣各將所管諸縣疾速委官撿踏目今旱傷并得熟分數逐鄉從實開具申尚書省甚大惠也然猶未及浙東江東西湖南北及兩淮州郡者蓋緣所在監司守臣人人各懷意見未必能盡實申奏致誤朝廷行遣陛下觀此意趣豈能克已為人誠恐撿踏之官又皆觀望鹵莽兼慮遷延日月致失朝廷事宜欲望特降指揮委逐路監司各具諸州大約豐歉分數諸州守臣各具諸縣大約豐歉分數並限三日申尚書省朝廷便可互相參考冀得其真若身為監司而不知諸州為守臣而不知諸縣致所申或有大段不同去處亦可委官體訪别議責罰庶幾人人務實緩急不致誤事其二審知所在人材者大抵講行荒政全在得人茍任得其人則必能仰體朝廷之意每事隨宜措畫表裏相應不至乖踈茍任非其人則朝廷雖有良法美意勤勤而督訓之然或心志不同或才力有限亦鮮有不敗事者矣臣伏觀近制已委諸路監司體察守令之不堪倚仗者至于監司一路之責所係尤重今賑發常平義倉正𨽻提舉司計度財賦正𨽻轉運司盜賊刑獄事皆屬帥憲二司在于今日尤須謹擇若旱傷有分數稍重路分欲乞朝廷選委帥臣監司中有才望者專一措置施行其三條具諸路事宜者蓋緣所在山川風土各自不同若是州縣瀕水去處便可招接商旅措置舟船隨逺近糶糴猶易為力至有州縣鎮寨僻在一隅舟船不通商旅不至即須令本州措置及今未納秋苗之際先次約度合用賑濟賑糶米數從便兊撥苗米就本處委官送納準備將來賑濟賑糶却以本州常平米數撥還方為利便其次諸州或可用㑹子或可用金銀或可用度牒或可用鹽引如此等類其事多端在于朝廷實難隃度乞令監司守二各具逐州事宜朝廷斟酌重輕即可次第酬報非惟畢竭羣慮周盡事情亦可詢事考言觀其能否其四酌量事體輕重者蓋謂朝廷德意誠厚特不可以泛而行之謂如撿㑹乾道七年立定賞格富室上户如有賑濟饑民之人許給降付身補授名目緣所在豐歉各異米價貴賤不同若使泛然補官却恐益至冗濫欲候取到諸州豐歉分數須旱傷及五分以上方許依格補官其次者欲斟量重輕廣與支降㑹子令本州縣作糴本賑濟如格目內獻米四千石補承信郎米每石以㑹子二貫準之計價錢八千貫若支降㑹子八十萬貫可省承信郎百貟夫製造㑹子在朝廷初無甚難若吏貟猥多于國家重有利害又所在樁積米斛有久年陳腐者若常歲豐登人無所用值茲歉歲猶可充饑並當裁損舊資及時變糶此皆化無用為有用以虛劵易冗貟在于聖明必能洞曉其五申明義倉之法者蓋義倉之法本起民間止緣人心不齊送納艱阻遂致歷代權制悉令收斂在官其實取之于民特為聚之倉廪耳此不可與常賦等也故本朝常平免役令諸義倉計夏秋正稅每一斗别納五合應豐熟計一縣九分以上即納一升今州縣之間不問豐歉每正稅一斗並納一升又令即本户放稅二分以上及孤貧不濟者免納謂如本户正稅額管十石若放稅及二石以上即其餘八石並合免納今州縣之間雖有減放猶計餘數催取實非立法本意方此百姓饑儉猶欲仰食縣官豈可違法征催置之虗廪欲望申明法禁咸使聞知庶能感召至和允答天意臣所言踈淺心實勤拳仰祈聖聰俯垂采納臣無任惶懼隕越之至汝愚又奏綿竹什邡二縣饑民賑濟疏曰臣契勘去年成都潼川利州三路緣秋雨過多間有損傷去處然亦不至甚害臣不住行下逐路監司隨宜措置賑糶已于正月十六日附遞奏聞去訖臣近詢訪得成都潼川兩路諸州日來米價不至踴貴但與常年相似積蓄之家尚患有米無處發泄亦非是無米出糶只緣是數年以來民力窮困米價雖賤亦無錢可糴故所在細民皆有饑窘之色若官司一例普行賑濟非惟州縣力有不及兼蜀中風俗易動難安一聞某處賑濟便至千百為羣輕棄家業將口就食或官司奉行無法往往所利不償所害若欲只令減價賑糶又恐如前所云米價雖賤細民無錢可以得食故臣不敢立為定說只今逐州逐縣各看事體如何隨宜措置近聞得漢州綿竹縣自正月末間先行賑濟本縣初不曽抄劄户數出給牌歷但就一僧寺中同衆鄉官造飯給散緣此四逺之人扶老攜幼皆來就食旬日之間至萬餘人本縣却憂無米可繼遂乞于附近州縣同行賑濟貴得稍分其衆旬日之間什邡一縣所聚又二萬人臣恐其聚集不已别致生事已選委成都通判馮興祖漢州通判郭德祖逐急權借本府常平錢一萬貫分詣兩縣措置各逐鄉分差官置場務要分散其衆勿令羣聚生事并再行下諸州委自知州通判多方措置賑濟賑糶去訖臣伏念西蜀細民貧困已甚去秋禾稼微有傷損便至羣起紛紛如此萬一有方數百里水旱其事勢復當如何臣聞戊子年數郡饑民同日俱起不約而同蓋其困窮非一日也臣愚私心不勝憂懼謂不可不使朝廷知之謹具奏聞知建康府洪遵上奏曰臣竊見今歲淫雨為災江東西多被其害聖心焦勞哀矜惻怛之意溢於詔㫖以至賑濟米斛給借種本甚大惠也臣兩䝉宣問已節次具奏訖臣體訪太平州官私墟垾三數百所淹浸十之七八比之諸州受患最酷故雖未雨之前蠶麥收成今茲室廬資産蕩然一空扶老攜幼轉而之淮上者比比皆是州郡存恤甚至而緡粒有限催科及時其人不惟糊口之迫且無以輸官自非急行蠲放稅賦未易安集欲望聖慈特降睿㫖檢照隆興二年乾道四年體例行下轉運司委清强官前去被水縣分撿視衝破墟岸全行損壞去處若干頃畝將第三等人户夏稅和買倚閣一半第四第五等人户全行倚閣候豐歲帶納庶幾流民聞之不致它徙自餘州縣被水尤甚者令逐州守臣核實申奏特與蠲減施行臣備數一路不敢不以聞惟陛下裁幸遵又上奏曰臣今月十日恭准御前金字牌降下宸翰本路旱傷民有棄擲童幼于道令逐州守臣措置收養支過錢米當從御前給降惻怛之辭亡慮百數仰見陛下視民如傷如是切至臣遵依聖訓即已施行訖臣濫膺閫寄屢以管下旱災塵瀆天聽恭惟陛下軫念民瘼朝奏夕行支撥米斛兩郡所得踰二十萬甚大惠也惟是亢旱非常二稻掃地土堅于石間有微雨僅可灑塵不能滋潤來牟又復可慮千里赤地十室九空七十之老以謂平生所未嘗見上户粗支目前無以善後中下之家甚者或易子而食或赴井而死誠可矜憫臣竊見建康寧國太平廣德去歲水潦䝉朝廷將三等以上夏稅倚閣一半第四第五等全行倚閣自非陛下博施實惠則四郡之民已填溝壑矣臣契勘饒州南康之旱被害尤酷殆非四郡水災之比今降指揮第五等人户夏稅倚閣五分所謂第五等流離餓莩之餘存者亡幾臣愚欲望睿慈特降處分撿乾道六年十月十二日倚閣四郡夏稅指揮行下庶幾兩郡數十萬生靈䝉被大賜不勝幸甚臣疊冒冕旒無任惶懼激切之至遵又乞倚閣饒州南康軍夏稅劄子曰臣等伏見建康府寧國府太平州廣德軍去年水潦陛下惻怛愛民將上三等夏稅權行倚閣一半四等五等全與倚閣四郡之民賴以存活甚大惠也契勘本路管下饒州南康軍今年旱暵最甚民間合納夏稅物帛并折帛錢今春雖稍得蠶未織造間遇旱乏食往往將絲逐急變賣州縣催科由此費力然上供之數不敢稽違不免嚴督上户今來上限所催猶且未足其下限一半並係下户合納目今闕食全賴官中賑給豈復更有輸官況旱暵水潦事體一同欲望聖慈特降睿㫖令饒州南康軍將今年夏稅物帛并折帛錢起發上限一半其下限合起一半權行倚閣候將來豐熟作兩年帶納庶幾貧下之户不至重困遵又奏饒州南康軍旱災劄子曰臣契勘管下饒州南康軍今歲旱災非常早種不入土晚禾枯槁自六月中村民已食野菜草木目今米價雖未騰踴兩郡饑民或有相聚為盜臣已于八月四日十日具奏訖竊見江西湖南間有旱傷去處已䝉朝廷指揮審量守令并委帥司監司勸誘米斛等第推恩今來本路未䝉行下欲望聖慈特降睿㫖檢照江西湖南已行體例以憑遵依施行遵又上奏曰臣仰惟陛下近以甘雨愆期側躬損膳憂勤形於玉色精誠上通霈澤響應臣因奏饒州南康軍大旱面奉聖訓以謂比來亢旱夜不安寢仰見陛下拳拳愛民如是切至今歲江東大稔惟此兩郡接連江西旱災尤甚人民流離或相聚剽掠州郡不即奏聞臣竊見去歲江西旱潦自非陛下軫念民瘼移粟他邦則兩路之民已填溝壑矣臣已别具奏乞將本路見管常平米寬數撥下兩州接續賑糶并乞檢照江西湖南審量守令勸誘米斛指揮行下欲望聖慈早賜處分遵又奏張運助饒州賑濟劄子曰臣近准尚書省劄子奉聖㫖撿坐湖南江西路勸誘上户出米賑濟賑糶賞格劄下本司照㑹遵守施行臣仰體聖意即行印榜四百道曉諭及下饒州南康軍督責守令務在實惠及民今據知饒州何伯謹申承左通議大夫敷文閣待制提舉江州太平興國宫張運劄子情願自備人船裝載米二千碩赴州倉送納以助賑濟本州見行措置分撥諸縣訖臣竊詳張運以侍從之舊獨能為國敦尚義風為諸路倡誠可旌賞況積粟之家所在不乏使人人如運所為則饑民不至轉于溝壑臣愚欲望聖慈特降睿㫖量與推恩庶幾有以激厲實荒政之一助也遵又奏收養童幼劄子曰臣近准御前金字牌遞到御寶封降下御筆聞本路旱傷民多艱食有棄擲童幼于道路者深為惻然可令逐州守臣措置于穩便處收養無使凍餒候至來歲食新以歸其父母自十月為始奉行將收養過人數及支用過錢米逐月從實奏聞當從御前給降本路監司常切按行覺察無得滅裂徒為文具付江東帥臣監司臣已即時恭依聖訓關牒本路監司并旱傷州軍守臣奉行外臣謹具已行事件如後一收養童幼專委知縣及巡尉蓋知縣之職于民尤親巡尉日以警捕為事道路村野之間無所不歷或有棄擲童幼皆耳目之所聞見庶幾收養無遺一童幼中有自能飲食者責付寺觀收養官給錢米住持知事旬具養過人數及有無病患申官遇有疾患官給之藥遇有死亡官給材木埋瘞一小兒尚在乳哺者在城委都監城外委巡尉體探弓手及軍伍有乳之家責令收養官給錢米都監巡尉旬具養過人數及有無疾病申所屬病者從官給藥死者官給材木埋瘞遵又奏乞借樁管錢收糴浙西米劄子曰臣照㑹建康府管下常歲上江米船蔽江而下本路之所仰給今緣江西荒旱商旅止就建康府興販加之轉運司照年例和糴必致踴貴臣竊聞浙西大稔官司又不曽拋降和糴萬一失時富家射利儲蓄米斛將來雖欲收糴亦不可得臣區區愚見欲就十月初委官往浙西以來收糴一二十萬斛以為來春之備庶幾可以少抑米價兼接濟饒州南康軍賑糶欲望睿慈許臣樁積錢內時暫借撥三五十萬貫應副收糴春初照數依舊樁管不敢分文虧少遵知太平州奏乞借江西米劄子曰臣契勘本州今歲災傷甚于旁郡臣自到任講求荒政惟恐不至比以官墟興工兩縣所役二萬夫日給錢米民賴以濟今來修墟已畢緣河流日涸舟船艱阻商人覬望增價本州賑糶常平米今已數月加以修墟之費所餘至少臣雖差官前去江西告糴未到竊慮來年艱食設或一日住糶愈見翔踊兼鄰近寧國池徽州廣德軍皆係旱潦去處欲望聖慈特降睿㫖于江西樁積米逐州量撥三二萬斛接濟出糶令項樁管價錢候秋成收糴填還于國無損于民有利官米雖未即來庶幾商人聞知以為朝廷支撥米斛不致深藏固惜以須重價實為數郡之幸冒犯天聽不勝激切俟命之至知長沙王師愈論和糴之弊疏曰臣竊見和糴之法本欲利民而足用湖南行之乃大不然其名則美其實則重為民害始也無見錢以為糴本或給官告度牒或給三合同關子或給乳香茶引令州縣變轉現錢不免强敷之于民甚者撥有名不可催之積缺從而追擾其為害一也次則以本錢不足或低估價直或多量升斗出納之際加以官吏欺弊其為害二也終則裝發綱運雇船水腳之費無所支破又從而取之于民若運至荆襄間泝流而上江路遼逺水淺難多動經年嵗所費又倍之其為害三也是故民之所憂者水旱所喜者豐年今則豐年之憂乃甚于水旱以三害若此耳臣又聞每歲諸路漕運自可足一歲之用只陷折至百餘萬石遂和糴以補其缺誠能措置漕運不致陷折雖免和糴可也縱不能全免或不得已而為之明撥本錢及支破起綱之費庶幾事舉而民不被害惟陛下留神幸甚師愈為江東轉運使借米賑濟劄子曰昨奉御筆令預講救荒之政已恭依具奏仰惟宸心憂民切至臣等敢不上體聖訓蚤夜講求如薄刑緩征已責勸分凡寬恤之事各已次第施行外竊謂救荒之政雖有珠玉金銀不能療饑其所急者莫急于食遂多出文榜招誘客旅于有米之地廣行興販前來出糶嚴戒場務不許作名目收稅苛留緣地里遙逺米未可卒至其價日增不得不慮抑嘗詢究往年一州旱則取給于鄰州一路旱則取給于鄰路故易以辦集竊聞今年之旱稍廣大江東西至於荆襄淮甸亦多不熟雖招誘客販遣官收糴政恐米亦艱得未可指準臣等竊見從來饑儉之歲人情易得皇皇若所在縣鎮鄉村有米可糴人心自安若無告糴之處往往便扶攜妻子就食他鄉此不可不預有以安之臣等相度若候諸處興販收糴到來亦須是一兩月之外況有無未可知流民一散收之則難臣等切見朝廷見樁積在建康府太平饒信州等處米斛無慮百七八十餘萬碩榖五十餘萬碩而常平義倉不在此數其間亦有七八年前所積之米恐易得腐壞纍䝉朝廷指揮令以新易陳臣等今來欲乞存留見米一百萬碩榖二十萬碩以備總領所逐月支遣兩司官兵可准一年之數餘外有米榖欲望聖慈許臣等兊借米三十萬碩榖二十萬碩通融就便分散諸州縣量旱傷輕重隨多寡賑糶先次散榜曉示令人户通知又從而發常平米以賑濟之如此則民心可安不至流移而鄉村豪富有米之家見官司賑糶賑濟遍及逺近決不至閉糶又客販之米或來則亦不敢乘時要索髙價如此庶幾民不艱食全活者必衆此誠莫大之實惠所糶到價錢臣等自當認數收簇寄納樁積庫才候來年稍熟便行收糴補還以陳易新公私兩濟何以加此今來控陳似若太早正恐往返待報動經旬月儻至急闕臨期有請緩不及事是用冒犯天威詳悉奏聞伏望聖慈早賜施行中書舍人崔敦詩經筵附進救災五事狀曰臣備數經筵輪當供進故事臣謹録太宗皇帝所以速于救災之事上進臣竊謂天久不雨今雖未見災傷的實臣先事而言有當早正而亟行者五事條列如后一救災恤患全賴監司守臣若監司守臣不得其人責以賑救洎至施行失序民有流殍雖行黜責已為無益臣愚欲乞睿慈明諭宰執深詔臺諫先次謹察災傷路分監司癃老庸懦及循常無才不足倚仗者奏聞令三省選擇易置却令諸漕臣常平官一面開具管下缺雨州郡守臣有無癃老庸懦及循常無才之人限一月各具保明聞奏取自聖裁施行向使監司郡守皆得其人則朝廷無所慮矣一臣聞周禮荒政十有二除盜居一臣竊見諸州禁軍自來紀律廢弛往往不著營房不成行伍倉卒難集切恐一夫奮臂于市人無當者防備鎮壓慮所當先臣欲乞睿㫖旱傷路分安撫司申嚴條制令諸郡盡刷禁軍自九月始逐日㸃集教閲至來年四月止其巡尉弓兵亦令諸州嚴行戒束不得名色占破盡數根刷各就本處逐日教閲施行一臣竊見近者朝廷第去歲救荒之賞監司守臣皆有等差臣竊聞去歲災傷州縣官吏宣力者多今賞不及無以為勸臣欲乞睿㫖行下諸路漕臣常平官及州郡將來救荒各先具逐州逐縣所差官吏職位姓名聞奏俟至結局並議第賞如有曠敗亦行責罰庶幾上下協濟保無誤事臣伏見在法災傷檢放及七分以上賑濟貸給具有成法臣竊見州郡檢放自來統以逐縣災傷紐算分數然一縣壤土髙下不齊此熟彼凶有至懸絶且如一鄉災傷有及十分若使統計一縣不及七分則十分被災之鄉例與輕災鄉分一同不被厚恤今來檢放月分在近臣欲望睿㫖今後紐算災傷分數各以逐鄉為率凡及七分已上並令依條施行一臣伏見諸路州縣有早禾得水成熟正當刈穫及有下田乘旱已施布種去處可望微稔今來車澳尤急訪聞官司驅催夏稅不知體恤輸綾則拘留暴㬠納絹則揉汚退換緣此農民淹留廢業不得趂時了辦接濟口食臣欲望睿㫖令諸路監司嚴行覺察按劾聞奏其四等以下零缺亦當酌量權行倚閣施行參知政事周必大論和糴疏曰臣昨聞見商量和糴行在約三十萬石既是地近不妨臨時降㫖今偶聞米價日減恐目下便合施行但近緣印㑹子稍多止可作七百七十一文行用若更捐一二分見錢則所費不過一二十萬貫而輕重相權其利極博此事臣思之甚審蓋將來有所調發不患見錢不出故也又臣每聞陛下預念年歲之豐歉雖隂陽家說亦行採訪臣未嘗不歎仰聖德孜孜民事頃刻不置非如羣臣止茍目前而忘逺慮也臣數日前因五更視月見歲星粲然于其傍考之占書亦主歲饑嘗問太史局官或云是犯或云近爾以臣觀之有德可禳聖主固已優為有備無患人事自當預計但令儲米稍廣則所謂錢物自可力致吏部侍郎李椿奏常平義倉疏曰臣竊見義倉法自隋唐以來行之以備凶年賑給災傷下户其利甚博其常平倉數十年來無糴本收糴徒有常平之名而無其實惟有義倉米在焉蓋本聚米于鄉村里正之家過凶歲則給散不致農民流徙建議者因里正間有侵盜遂移貯于縣倉固自難以及于鄉村人户頃年州郡又皆令人户赴州倉輸納苖米隨苖帶納義米遂不復及于縣民所以每遇歉歲民必流徙雖無里正侵盜之患而官司移兊侵借陳腐化為塵土災傷則惠不及民可謂因噎廢食蓋失義倉本意逺矣仰惟陛下矜恤元元一遇歲歉則勞宸慮數下詔㫖勸諭賑糶存拊之意備至而州縣之間不過于州城縣郭出糶官米略能薄濟市井之人而農田之家不預況農家聚米而不得食實為未允其或煮粥給散始則稍稍贍給饑民輻輳則聚民餓死者不知其數是不得其術反致殺之尤非賑給之法今來連歲豐稔粒米狼戾不可恃以為常而不為之備臣愚欲乞今後將隨苖義倉米止令就逐都保置倉輸納保正副掌管依界交割仍止令納榖庶可存留縣尉封廒逐季點檢遇凶歉則縣佐官量事給散申提舉司照㑹檢察設有保正副侵盜亦自可以陪償比之在州倉陳腐兊換艱難專㪷侵移而農家不得食無以救凶歲事體大段不同仍免官司般運賑糶作弊農家流移誠為實惠今具畫一如後一逐都保除沿邉州縣外于有人煙去處約榖之多少以五年之數為倉廒保正副掌管聽為團倉逐年旋增置一縣給受納隨苗義倉榖團印赤歷付逐都保正收掌受納每旬具數縣尉躬親盤量封廒一縣别置義倉簿銷注驅催隨稅簿赴州用印一義倉鈔二紙一鈔給人户一鈔縣照銷簿即不得官賣鈔紙一人户先就本都納義倉榖請鈔連粘于苖米鈔前送納苗米未納義倉不得交苖米一義倉團印用至省限滿日繳申縣毁以防作弊其殘缺却令赴縣倉交納用縣印印鈔以别省限外輸納之人一每都聽募㪷子一名同保正副掌管倉榖于受納時聽收量榖利潤錢每㪷不過三文足保正副聽量收利潤以為修倉費用每石不得過二十文足一官貟季點義倉隨行公人輒有搔擾並行重録其縣給團印歷有取受者準此聽人户越訴官貟罰俸甚者委按察官奏劾一逐都貧富不等遇歉歲鄰近都分有無賑給不出三十里之外一逐都置板榜于倉前約束備坐朝廷置義倉所以備災傷憂民之意勸諭人户依時輸納乾好米榖保正副在意掌管毋或侵耗遇有災傷從實申官乞行量散免有流移之患務得實惠一有未盡事理令提舉常平司條具申請施行一義倉既有榖在鄉村所有諸州縣見在義倉米並撥充常平倉遇水旱災傷則減時價賑糶收本錢以充豐歲糴本既有糴米則常平之法不為虛文一舉而兩得之仍申嚴常平借兊之法守而勿失誠為久逺之利唐仲友台州入奏劄子曰臣伏覩近歲屢稔而户口日衆官用寖廣公私蓄積未至充衍年一不登民已艱食陛下軫念元元力講仁政所以周急繼困慰安小民便利百姓之道甚備臣雖至愚願效管見竊覩近降指揮私下債負守令勸諭富室上户更加接濟容令寬限了還如是貧乏委無從出不得因此轉利為本及非理準折亦須蠶麥成熟方可旋行理索臣謂勸諭借貸最為救荒之急此令既行為利甚博臣愚尚慮舊新債負併在蠶麥細民必困理索富民慮借者不能併還未樂借貸更宜明為期約示之必信臣聞本朝司馬光以河北災傷條賑贍之䇿曰富室有蓄積者官給印歷聽其舉貸量出利息候豐熟日官為收索示以必信不可誑誘臣謂光言于今可行欲望陛下采光之䇿明降睿㫖下諸路轉運司應災傷州縣並令守令勸諭富民自陳蓄積之數除存留其家歲計之外實餘若干以十分為率七分出糶三分借貸願多以分數借貸者聽本縣印給簿歷開坐指揮約自日下至麥熟以前節次借貸簿歷合用同印記簿在富民歷付借者每月取息不得過三分其鄉例不得將舊債作新借之數其舊缺自從已降指揮蠶麥成熟旋行理索其新借至秋成日却據印給簿歷理索此後應成熟處不許富民陳乞再給簿歷自如常年鄉例借貸惟有災傷方可從州縣陳請舉行免于習常乃為良法此令惟出朝廷民無不信如䝉聖慈采納乞下户部勘當疾速行下庶幾逺方之民蚤霑實惠不勝幸甚蔡戡乞平糴上奏曰臣聞榖貴傷民榖賤傷農古今通患也是故有平糴之法李悝行之于魏耿夀昌行之于漢彭果行之于唐皆因榖賤增其價而糴榖貴損其價而糶亦古今良法也粵自去歲江浙大稔斗米之直百五六十錢今浙西雨𤾉時若髙下之田皆有豐登之望新榖既升其直愈賤老農咸謂數十年來所未嘗有古者榖賤傷農今者農末俱傷公私皆病之田家作苦十得一稔欲以輸租償債今也負擔適市人莫之顧不得已而委之僅得千錢而去一歲所入不足以紓目前之急何暇為後日計所以粒米狼戾而不免于凍餓也米價既賤錢幣益重人所艱得何敢輕費所在客旅稀少市井蕭條工商遊手之徒莫不坐困民間錢既艱得冬租縻費夏稅物帛無所從出州縣催科所以勞擾倍于常年此皆榖賤之患也夫欲利農民不若行平糴之法今秋成在即臣愚欲望睿㫖行下户部委官于蘇常湖秀四川踏逐空閒寺宇置場收糴隨市價低昻而少增之吏胥乞覓者坐以重罰米價既增又無它費利之所在不憚逺近自當連檣而至所糴既多可以代江湖上供之數却截留綱運于沿江州軍樁管以為邉備不唯民力裕邉備足它日萬一有歉歲損價而糶亦可以濟饑民補國用也光宗時蔡戡乞賑濟上奏曰臣竊見八月十日以後連夕大雨本府管下天目諸山洪水暴發餘杭臨安新城被害最酷富陽於潜錢塘次之餘波及于鹽官仁和小則淹浸田畝大則漂蕩廬舍甚則喪失軀命且以六縣言之溺死者千人被害者五萬餘家旬日之後水勢方退禾稻淹沒根株腐爛秋成既已失望饑民無所得食雖䝉聖慈特遣使者捐金發廪遍行賑濟恩澤至渥然但可紓目前之急耳此去夏熟尚有七月若人人而給則廪粟有限饑民無窮臣竊計五萬餘家約三十萬人大人小兒各居其半大人日給一升小兒日給半升日支米二千二百五十石月支米六萬七千五百石半年為期約用米四十萬五千石以臨安六邑費粟已四十萬石今歲淮浙諸郡悉以旱告朝廷恐難遍給臣區區管見不若行賑糶之法計口給歷減價與之庶幾所費不多所利甚博可以接續不至中輟反誤饑民臣伏見朝廷樁管米見在一百七十萬石每歲收糴正欲為水旱凶荒之備其間亦有積年陳粟自當易之以新臣妄意擬于樁管米內且借三十萬石減價賑糶照得元價每石二貫叄百文省量減叄百每升只作二十文省出糶庶使饑民易于收糴以三十萬石計之縣官所損不過九萬貫而所活饑民至三十萬其利豈勝言哉欲望聖慈特賜詳酌行下省倉下界或豐儲西倉水次近便處支撥所有水腳縻費本府自行出備官吏添給本府自行措置賑糶之後收到錢數逐旋解還司農寺一面收糴新米補足元數公私實為兩便寧宗即位初接伴使彭龜年論蘇秀等州水災疏曰臣伏自初九日陛辭初十日出國門十一日至秀州十二日夜至平江府從此蹉程前去不敢住滯迓客一事自有故常不足重廑聖慮唯是自離國門見㳂塗積潦淹浸民田目即未收之稼已不可救已收刈者多用竹木架閣在田連日積隂不解雨勢未已亦必損爛猶有向去繫利害之深者百姓乏食全望牟麥以相接續而田水不去天霽未期設使麥不入土民無所恃流移餓莩斷不可逃陛下罪已求言倒廪賑給固足以上感天意而災變未消實有可懼臣愚欲望陛下明詔大臣講求親切及民之事共致懇切事天之誠每事求實不為虛文登進忠讜以壯陽德斥逺邪佞以消隂沴庶幾聖德又新天心昭格臣逺去闕廷輒因目所親睹之事郵置以聞仰助陛下寅畏干冒天威無任戰栗貼黃臣竊見漢元帝時日青無光𢎞恭石顯等皆指以為周堪張猛用事之咎及斥堪猛復有日變元帝乃召昔言咎在堪猛者切責之陛下遇災而懼不愧宣王然臣深恐小人别有指陳上惑天聽施行或謬恐未免為元帝之悔臣願陛下聽言之際更加精察擇是而從不勝幸甚龜年又論淮浙旱潦乞通米商仍免總領司糴買疏曰臣聞遏糴霸者之所戒閉糴諸侯之所羞而况人主君臨天下一視同仁豈可使有彼疆此界之分如秦人視越人之肥瘠而不恤哉竊見今嵗淮東兩浙多被旱潦如常潤揚楚盱眙等處當此收成之時斗米至為錢四百上下無下三百足陌者近日行都米價頓增至煩朝廷輟軍儲給糶以紓目前而米價依舊不減異時春冬之交必大翔踴實為可慮訪聞江西湖南北州軍間有豐稔去處設使就彼和糴又恐官司交易易得成擾收糴津運倍有所費據臣愚見不若通商最為上䇿欲望聖慈行下三路漕司俾之約束沿流州縣不得遏糴如商旅米船特免力勝稅錢至歲終而止不得妄以它貨阻滯客旅如果有它貨令所至州軍勒客人别用舟裝載依法收稅仍關報前路官司從漕司多出文榜曉諭商旅聞此必須方舟而下不特移粟之惠可以救民而鹽課必增亦以利國事莫便于此者嘉泰二年葉適上奏曰臣病苦餘日聖恩垂憐使轉漕湖外守符泉南今又特䝉收召入奏之初有兩處職事不敢不陳愚慮臣採湖南士民之論以為二十年來歲雖熟而小歉輒不耐地之所産未最盛而中家無儲糧臣嘗細察其故矣江湖連接無地不通一舟出門萬里惟意靡有礙隔民計每歲種食之外餘米盡以貿易大商則聚小家之所有小舟亦附大艦而同營展轉賑糶以規厚利父子相襲老于風波以為常俗其不耐小歉而無餘蓄勢使之也故每遇小歉閭里不能自相給惟仰州縣賑救城市之民青黃未接食于常平者十家而九此事諸司當任責而漕司為一路通融有無之處其責尤重然湖南漕司歲計所入甚少比江西才十之三四比湖北才十之五六曽不足以支本司一年之經用向者團簇大軍錢數多總司所取不盡可以通借故不自覺而反冒富厚之名自大軍錢屢減舊額總司按籍盡取積以歲月坐致漏底今漕司索然窮匱者五六年矣除湊足交頭之外每遇新舊交易使者與屬官聚議搏手無以具接送之費臣比承乏諸郡小歉雖先事講求荒政終不能有所捐貸為諸司之倡去歲祁陽蔣圈十借糧作過守令張皇一時駭動幸而就擒欲出少米以哺之力不能及竟閔默而止臣以為一司事力殫乏至此平居不足以自存萬一水旱急難辜負任使利害不細臣每念漕司所得屬郡財賦久有定規不可復取本司當自擇其間利源與州縣百姓不相干涉及他司有例可以參酌施行者以漸經理庶稍有餘積為萬一水旱急難百姓指準之地此誠一路之急政不可忽也臣頃雖熟計不敢奏陳蓋創始既難而臣方病昏不能勝任今有通練敏達之士授以意指俾之講求許其自行無使貽害足以為一路之預備寬九重之顧憂豈不幸甚嘉定元年祕書省著作佐郎楊簡上奏曰臣不勝痛心疾首以告陛下亦知近在都城之內外民有餓而奪市食者乎又知有父子俱餓知必不能俱生遂沈其子女于江者乎臣所聞已不一而況于所不聞乎都城之東有其婦憫舅姑之餓曰婦當鬻身助給舅姑聞其言自經死舅知姑死舅又自經死子歸知父母死又自經死婦以舅姑及夫俱死又經死又有取小兒烹食之者嗚呼痛哉近在輦轂之下而餓死者至于此極而況于逺者乎又況于淮民相食妻食其夫尸弟食其兄尸至于父子相食其尸陛下為民父母而有此羣臣之罪也孟冬之月臣聞朝廷有所忘浙西樁積米僅二十萬斛臣亟請于前左丞相錢象祖乞盡以給助淮民象祖吝不與今聞淮民嘯聚得非前者吝米所致雖二十萬斛未足以盡活淮民而淮民知朝廷賑恤誠意所及或不至大亂近雖未有急報然朝廷豈可不亟為之圖望陛下急詔大臣痛切為民為國集羣臣詳議先根刷諸路常平及凡樁積米數復别議利害或命百司各竭謀慮詢訪以聞今徒聚百官於行都擾擾焉往來泛泛焉從事循循焉度日而已不使之出其胸中所藏道其所嘗見聞共議共計內外多少財用陷沒于贓吏之手郡縣多少財用徒費于迎新送舊而不思擇賢久任內外多少財賦費壞于三年之科舉取浮薄昏妄背理傷道之時文驅士子為不肖使害民壞國家諸軍虛籍不知其幾以虛籍之數濟饑民何為乎不可又聞淮民之饑者欲渡江江上郡守有遏之者結怨饑民是激之使為亂又聞有賑濟官以淮上饑民嘯聚申上司至於纍纍而上司杳不報為上司者昏繆至此而朝廷未聞黜陟臣大懼養寇危社稷也臣思執政大臣必患乏才乏才因于拘資格臣稽古昔未嘗用資格人才難得幸得一人而又以資格廢則何以濟民何以弭寇何以安社稷望陛下力諭執政唯擇賢才毋限資格務循古道以濟民弭寇安社稷臣不勝惓惓歷代名臣奏議卷二百四十七
