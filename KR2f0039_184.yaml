body:
  text: 歷代名臣奏議卷一百八十四明楊士竒等撰去邪宋孝宗時右司諫王居安論韓托胄以預聞內禪之功竊取大權童奴濫授以節鉞嬖妾竄籍於宫庭創造亭館震驚大廟之山燕樂語笑徹聞神御之所忽慢宗廟罪宜萬死托以大臣之薦盡取軍國之權臺諌侍從惟意是用不恤公議親黨姻婭躐取美官不問流品名器僭濫動違成法竊弄威柄妄開邊隙自兵端一啓南北生靈壯者死鋒刃弱者填溝壑荆襄兩淮之地暴尸盈野號哭震天軍需百費科擾州縣海內騷然迹其罪狀人怨神怒衆情洶洶物議沸騰而托胄箝制中外罔使陛下聞之宦官宫妾皆其私人莫肯為陛下言者西蜀吳氏世掌重兵頃緣吳挺之死朝廷取其兵柄改畀它將其䇿至善托胄與吳曦結為死黨假之節鉞復授以全蜀兵權曦之叛逆罪將誰歸使曦不死托胄未可知也托胄數年之間位極三公列爵為五外則專制東西二府之權內則窺伺宫禁之嚴姦心逆節具有顯狀縱使托胄身膏斧鉞猶有餘罪況兵釁未解朝廷儻不明正典刑何以昭國法何以示敵人何以謝天下今誠取托胄肆諸市朝是戮一人而千萬人獲安其生也托胄既有非常之罪當伏非常之誅詎可以常典論哉右丞相陳自強素行汙濁老益貪鄙徒以貧賤私交自一縣丞超遷徑至宰輔姦憸附麗黷亂國經較其罪惡與托胄相去無幾乞追責逺竄以為為臣不忠朋邪誤國者之戒又劾曦外姻郭倪郭僎竄嶺表天下快之監察御史杜範奏曰曩者權臣所用臺諫必其私人約言已堅而後出命其所彈擊悉承風㫖是以紀綱蕩然風俗大壞陛下親政首用洪咨夔王遂痛矯宿弊斥去姦邪然廟堂之上奉制尚多言及貴近或委曲回護而先行丐祠之請事有掣肘或彼此調停而卒收論罪之章亦有彈墨尚新而已頒除目沙汰未幾而旋得美官自是臺諫風采昔之振揚者日以鑠朝廷紀綱昔之漸起者日以壞理宗深然之侍御史王十朋上疏論史浩曰臣聞人臣之罪莫大於懷姦誤國植黨盜權忌言蔽賢欺君訕上有一於此罪不容誅衆惡備焉其何可赦臣謹按尚書右僕射史浩人品凡下天姿險姦昔為士人以𣙜酤犯罪身幾不免及試吏州縣姦贓狼藉惡聲播聞浩能以諂佞取容致身朝列夤緣遭際事陛下于潜藩龍飛在天躐居政府浩不知盡臣子之大節報非常之恩機巧百端得罪公議臣請條其罪惡之著者有八焉往嵗太上皇帝聞欽宗之訃痛切宸衷下詔親征思雪國耻知陛下春秋鼎盛智勇天錫斷然以社稷付之深望陛下之大有為也浩為心腹之臣不能以忠自效乃於義不共戴天之日首進寢兵之言專主和議以沮大計蓋欲踵秦檜之故態為固寵之身謀此懷姦之大罪一也太上皇憤金主之渝盟悟和戎之失䇿以疆埸之事付爪牙之臣大將吳璘等奮身血戰復秦隴故土屯兵固守俟時投機縱未能長驅以定中原亦可以牽制敵人南牧之患浩既主和懼吳璘進取隂使其黨鼓扇浮議妄謂敵與西夏協力攻璘遙從中制令不退者斬遂取十三州之地而盡棄之將士喪氣中原離心誤彼生靈盡遭魚肉不獨棄地是乃棄民不獨棄民是乃棄信皆由浩欲售一己之私而不顧國家之大計此誤國之大罪二也浩履歷既淺德望素輕驟居要塗天下竊笑於是取國家名器為一己私恩躁進之徒翕然合為一黨門䦨可以炙手士論為之沸騰至有嫡子嫡孫之號親姪過房之稱有號密傳心印者有號正法眼藏者名居宗派布在朝列者紛如也昔王叔文竊柄有八司馬之黨李逢吉用事有八關十六子之徒浩得時遇主如此乃欲效叔文逢吉之為人此植黨之大罪三也浩自參朝政即盜大權視宰相若無人待同僚為不物人皆畏其凶焰莫敢誰何官爵科第輕以與人進退百官悉自已出自為右揆益肆其奸方欲排擊所憎驅除異己㑹其腹心內潰黨與相攻陛下察其姦邪知其朋比收攬權柄出自宸衷不然朝廷之禍可既耶此盜權之大罪四也陛下嗣位之初首下求言之詔忠臣義士上封言事者非一浩抑讜直之言不使上達有佞己者則以免解啖之春闈省試知舉三人上體聖心䇿問時事浩疑其斥己遂令黨人林安宅追捕雕匠勒令毁板三知舉嘗面奏其事有㫖令刋行安宅憸人也知有浩而不知有陛下不遵聖㫖而惟浩是從卒不許刋陛下取士之始而浩首禁程文何以彰清朝不諱耶此忌言之大罪五也太上皇用天下人望起舊相張浚知建康陛下因付以江淮重任擢為樞府委任之專不啻若憲宗之待裴度浩與浚氷炭不同且懼其成功凡有奏請必多端沮之初遣史正志往建康欲沮浚進取之計及其既還遂酬以郎官又因詔百官言事遂令正志等密加詆毁指為許靖房琯有識為之不平此蔽賢之大罪六也浩凡與同列奏事未嘗不留身退則妄稱聖㫖以誑之浩嘗有辭免參政劄子未嘗稱祖宗及太上皇之德退則增加數語以報行浩之欺君大率類此昔王欽若為相每奏事必袖數奏但出其一餘則詐稱已得聖㫖馬知節嘗面折其姦浩挾欽若之姦以罔衆朝廷無知節之直者以折之此欺君之大罪七也陛下即位之初以太學生經太上皇教養之久並與免解浩乃收為己恩務在籠絡已而聞諸生議已遂深疾之復加沮抑嘗於稠人中言太學有風波臣對以子産不毁鄉校浩曰某固無他但上怒之爾浩近赴景靈宫行香道由貢院㑹太學補試士子填壅鄧王回車避之聞者欽歎浩乃作威以逞為士子所嘲既而語人曰上怒補試喧譁欲令不考某以誤其逺來救之浩善則稱已過則稱君皆此類也此訕上之大罪八也浩無宰相才而居具瞻之位遇堯舜主而懷共鯀之凶陛下方當任賢使能圗回大業如使浩輩久在廟堂其可以望中興之治耶臣願陛下正其罪惡竄之逺方以快天下之心以為羣臣之戒十朋又論史浩劄子曰臣聞人主之職莫大乎任賢去邪任賢去邪莫先乎信賞必罰任賢而不知賞與不任同去邪而不能罰與不去同古之帝王能任賢去邪者莫如舜舉八元八凱而相之取四凶而流之可謂能賞罰矣未聞以十二牧之任而處四凶于外也臣昨日面對論列尚書右僕射史浩之罪乞加竄殛陛下謂今日已罷之臣知陛下能去邪勿疑可謂無愧於舜矣及宣麻于庭乃以觀文殿大學士知紹興府輿論咸以為疑謂陛下雖能去邪而未能如舜之正名定罪也人臣得時遇主未有如浩不忠於主亦未有如浩浩不忠之罪不可以一二數臣姑論其大而著者有八已見前章效秦檜而主和議可謂懷姦棄德順而資寇讐可謂誤國名在宗派者不止八司馬可謂植黨竊天下之柄不止如王叔文可謂盜權陛下導人使諫而浩鉗人之口可謂忌言陛下委任忠臣而浩百端譛毁可謂蔽賢留身奏事妄稱聖㫖可謂欺君善則自稱過則歸主可謂訕上八罪有一且不容誅浩備有之其何可赦縱不投之四裔以禦魑魅其可以巨藩大職而賞姦耶臣恐天下未必咸服如虞舜時也況紹興密邇王都最為大府浩昔嘗為屬吏姦贓著聞亦何面目見其吏民耶臣願陛下出臣前章正其罪惡褫職名罷差遣竄之三危之地與天下共棄之庶使大功不專於舜也十朋又論史正志劄子曰臣聞姦人多謀能觀時而為進退當權臣植黨則必附合以求進以竊美官及朝廷清明則又用姦計而茍免以逃天憲熙寧初王安石為執政用小人吕惠卿之謀變祖宗法度逐朝廷正人天下莫不切齒及元豐末司馬光為相惠卿自知罪大為正論所不容遂丐祠于外冀脫典刑時蘇轍為諫官遂首論其惡安置建州天下快之由是見祖宗時為臺諌者排擊姦邪未嘗因其求去而容其幸免也臣謹按吏部郎官史正志操心傾險賦性姦邪自為士人時常出入貴人之門專事交結及初登科遂欲求為秦熺之壻託平日素所交結者賂熺乳媪使之譽已秦氏聞而薄之遂不見納既而干求時相而得監倉善觀時以求進聞樞密葉義問欲議進取遂竊吳若江淮表裏論而增損之自號恢復要覽以投義問遂繇管庫而得密院編修為士論所嗤及史浩執政欲主和議正志復變前說以投浩浩喜其佞已遂遣之建康以為說客欲以口舌沮進取大計常談兵於張浚之前為浚所不禮正志乃妄撰語録設為已與浚答問辨難之語歸以佞浩浩大喜之除為户部郎官浩與正志姓同而族異乃拜浩而父事之在浩之門最為用事故士論有親姪之嘲正志既不見禮於浚遂極口諷之嘗應詔上書比浚為許靖房琯聞陛下召浚懼其不利於浩唱為浮議以沮其來時人比之張又新今陛下知浩之姦斷然罷之知浚之忠破羣議而任之正志自知朋比讒慝得罪於清議遂力求去朝廷乃以福建運判與之正志能用姦以自免大類惠卿求去於元豐之末臣濫職風憲茍不論而擊之寧不自愧於蘇轍乎欲乞陛下特發英斷名正志讒慝朋比之罪以正典刑縱未能行兩觀之誅亦當薄示三危之竄庶使元祐清明之政復見於今日矣天下幸甚十朋又論史正志劄子曰臣昨嘗論列吏部郎官史正志朋比讒慝自知罪大欲逃典刑力求外補朝廷以運判與之是用外臺重任以賞姦也欲乞睿斷正其罪而竄殛之至今未見施行臣深所未諭臣聞唐王叔文以沾沾小人竊天下柄號召一時有名之士欲僥幸而躁進者並以郎官清要之職處之相與結為死黨至譽叔文為伊周管葛憲宗監國之始首逐叔文而殺之其徒皆終身竄殛號八司馬元和之治比迹貞觀淮西功業冠出李唐蓋繇憲宗必於用罰鋭於去邪也臣竊謂前宰相史浩之惡不減王叔文其黨與之盛不止八司馬雖非天下竒才至於撓節以附匪人懷姦以害公議則一而已如正志者在浩黨中尤為親密出入門䦨蹤跡詭祕人皆呼之曰繼拜公又榜之曰親姪遂自樞屬驟遷户部郎又遷天官郎使浩不去則正志必躐處侍從矣正志去冬歸自建康不獨搖撼張浚尤媒孽李顯忠之短必欲朝廷罷浚而誅李顯忠以沮恢復大計非陛下保全而委任之則忠臣良將身首且不可保豈復有今日淮甸之捷耶今國家方欲恢復中原所賴以激勸者賞罰而已前日二將奏功賞不踰時輿論咸以為當讒慝之人亦宜薄正其罪今不獨逃司寇之刑而又以外臺耳目之寄處之何以慰天下之公議乎郎曹運判至么麼也而臣喋喋言之者非以其玷列宿汙外臺而已而朝廷之刑賞公議之是非實繫焉伏乞陛下出臣兩章斷然逐之以示去邪勿疑亦足以懲一而勸百也光宗時監察御史虞儔輪對劄子曰臣至愚極陋䝉陛下特逹之知擢自周行置之臺察常懼失職以速罪戾伏覩本臺彈奏格應諸路監司守倅不按舉部中貪汚不法之吏者覺察臣昨嘗按奏為知縣而貪暴不法者三人區區之意蓋將欲以警厲其餘䝉陛下即賜罷黜矣訪聞似此等輩實繁有徒臣以為蟣虱小臣不足以頻汙白簡縷瀆天聽竊惟國家置監司守臣委之以刺舉之權果為何事哉今也坐視貪暴之吏布列州縣恬然不顧其偶為臺臣所按者百無一二其僥幸漏網者固已多矣其為不舉職不奉法豈不負明天子委任之意哉此無他不蔽於外戚則奪於權要不懷其納賂則喜其辦事曽不思斯民受苦何所赴訴天聽益髙有怨而已臣愚欲望陛下特降睿㫖戒敕諸路監司守臣今後州縣貪暴之吏姦贓狼藉蹤跡顯露有經臺臣按奏者並以不覺察之罪隨輕重罪之庶乎其能以公滅私奉法舉職俾貪暴之吏知所忌憚不致重貽斯民之害天下幸甚寧宗即位初吏部侍郎彭龜年上論韓托胄干預政事疏曰臣聞侍從為論思獻納之臣於天下事無不得言故歐陽修為翰林學士論狄青不當在樞密府包拯不當為三司使而不為侵越彭汝礪為吏部侍郎論曽肇不當黜降韓維為知制誥論范鎮不當補郡而不為朋比蓋知無不言事無不可論侍從之體當然也反是則阿容茍合沈默自全不足為天子近臣矣臣素無所長荷陛下擢之庶僚之中置之法從之列三數月間恩寵狎至諸臣進用未有若臣之驟者也使臣只貪榮遇則箝口結舌最為上䇿使臣粗求補報則犯顔觸諱必蹈危機然營已忘君臣實不忍輒敢冒昧陳獻其愚惟陛下財幸臣伏見祖宗待外戚之法逺監前轍最為周密不令預政不令管軍不許通宫禁不許接賓客不惟防禁之使不害吾治亦所以保全之使全吾之恩也近者交通內外之禁固已隳矣然預政管軍之制猶未改也已隳者固未敢望復之而未改者其可壞之乎臣伏見知閣門事韓托胄乃太皇太后之懿親而中宫視之亦尊行也其人本是世家慷慨喜事陛下入踐大寶托胄嘗效微勞士大夫以此頗多之然日來籍籍皆云數入禁近干預政事臣固知陛下英睿明斷於天下事無不習練何資此徒然陛下進退大臣更易言路皆初政最關大體者其所以進退之由更易之故大臣或不能知而托胄能知之大臣或不能言而托胄能言之不知托胄何以得此彼其假託聲勢竊弄威福顧其術則然然而天下治亂君子小人之消長只在人材進退之間人君所以審操而自執之者一旦外戚乃得隂乘其機簧鼓於外則陛下總攬之權恐為此人所盜矣臣聞元符間向宗良兄弟止緣交通賓客漏泄機密陳瓘抗章劾之謂自古戚里侵權便為衰世之象外家干政即是亡國之本亦如州縣之政只要權出于一若使守令之家子弟親戚交通賓客關節無禁則姦人鼓舞良民怨嗟如瓘此言陛下安可不察臣觀托胄近日所為不特如向宗良而已竊惜朝無陳瓘不能為陛下出力排之在太上皇朝始用姜特立大臣尚能逐之使去後用袁佐諫官尚能論之使懼不謂陛下始初清明有臣如此而乃無一人出一語及之則其聲勢可知矣臣官為侍從職侍講讀目擊此人纍陛下初政乃緘默不言則臣負陛下昔范祖禹嘗告哲宗曰臣侍經筵八年日望一日嵗望一嵗期陛下為令德之主唯恐有纎毫之失臣之事君實慕斯義况辨邪正明是非乃講讀官之職臣欲於此定陛下取舍之意決君子小人消長之機故不敢不為陛下一言若陛下以臣言為是則乞黜托胄以解天下之疑黜臣以當其怨若以臣言為非則臣與托胄不能兩立退當屏處以俟威命按日記其日因論韓托胄姦狀甚悉上諭云只為是朕親戚用之不知如此奏云政恐陛下不知所以言之遂進劄子時上亦無怒容讀劄子訖因奏云臣欲論此人久矣到今方發政緣陛下近日逐得朱熹太暴故欲得陛下亦亟去此小人毋使天下人謂陛下去君子如此之易去小人如此之難所謂用賢如轉石去佞如拔山乃劉向論漢元帝語陛下豈可效之哉因極論君子小人不可不辨其言甚悉奏事訖復奏云臣既論托胄仰犯威嚴自此當居家以俟威命上諭云不須如此欲退閒上賜之坐又欵曲問及飢民北使從容久之乃賜茶而退到家申三省及以劄子白廟堂次日聞早上宰執開陳之略上云韓托胄是朕親戚彭龜年是朕舊學誠是難處集賢進兩留之說欲以韓托胄奉內祠彭龜年依舊供職上云甚好丞相繼請云龜年性剛若陛下留之不如宣引一畨面諭曲折上云此人質直兼是隨龍舊僚五人一人死一人丁憂兩人論罷只有彭龜年在有事肯來說只如此區處甚好嘉定元年四月太學博士真德秀奏曰臣伏觀慶元以來柄臣顓制立為名字以沮天下之善者有二曰好異曰好名士大夫志於爵祿靡然從之者有年矣吁是豈非蠧壞人心之大原乎是豈非更新聖化之首務乎臣嘗敬觀國史竊見祖宗盛時以寬閎博大養士氣以亷耻節禮淑人心國有大政事大議論天子曰可大臣曰否宰相曰是臺諌曰非而不以為嫌布衣陳時政草茅議廊廟而不以為僭蓋惟恐人之不盡忠而未嘗惡其立異也士之自修於鄉黨者見尊於朝廷自勵於州縣者見褒於君上過人之節不以為矯異俗之行不以為狂蓋惟恐人之不鄉善而未嘗疑其近名也夫是以忠讜之氣伸而佞諛者不見容亷節之俗成而貪鄙者知自愧其所以扶持國脉於久安長治之地者其源蓋出諸此自王安石蔡京之徒相繼用事樂趨和同已之論用險膚亡行之人士有不為利疚不為勢怵者則目之以好異目之以好名摧折沮挫不遺餘力波流橫潰至于崇宣遺親後君之習成伏節死義之風泯其禍可勝道哉中興以還深監前轍培養作成風俗一變不幸十數年間復壞於柄臣之手蓋其竊弄威權之始一時諸賢出力與抗彼自知為清議所不貸也保固庸回以為心腹擯抑賢雋甚於仇讐有如至誠憂國以為忠犯顔切諫以為直臣子常分也柄臣則以好異詆之設為防禁以杜天下欲言之口於是忠良之士斥而正論不聞矣正心誠意以為學修身潔已以為行士大夫常事也柄臣則以好名嫉之立為標榜以遏天下趨善之門於是僞學之論興而正道不行矣相煽成風惟利是視以慷慨敢言為賣直以循默謹畏為當然以清修自好為不情以頑鈍亡耻為得䇿北伐之舉宗社安危所繫也雷同相從如出一口而爭之者不數人胥史皂𨽻稍握寸權則輻湊其門名義有不暇顧流弊之極一至于此今日改絃更張之初臣謂當先破尚同之習廣不諱之塗朝政得失俾臣下各盡所懷而不以立異為可厭褒崇名檢明示好尚俾人人有士君子之行而不以沽譽為可疑則士氣伸而人心正風俗美而治道成更化之務疇先於此惟陛下與二三大臣亟圗之臣不勝至願八年德秀為江東轉運副使奏乞將新知徽州林琰寢罷新任狀曰臣以非材誤䝉超除將漕江左一道休戚責實在臣視事以來日夕兢惕常恐玷澄清之選孤臨遣之恩竊見所部徽州地瘠民貧曩經回祿之災舊觀未能盡復春夏以來亢陽為虐雨澤未浹人情憂危正賴賢二千石悉心撫摩庶無流離饑莩之患今見任守臣趙師端除丞太府下政霍權得請奉祠日望朝廷遴柬良牧以幸一方比覩進奏院報已差下林琰琰平生素履臣不熟知苐聞昔為臺諫之時頗有交通關節之跡若子與壻請囑紛紜至今都人以為嗤笑夫身在王朝至近也職居言路至嚴也以至近至嚴之地猶徇私弗顧如此若付之專城之任寄以千里之權必將政以賄成刑放于寵新安之人其何賴乎況今旱菑之餘正以講求荒政為急琰嘗兩守偏郡治聲蔑然必不能推飢溺由己之心解百姓倒垂之厄臣欲俟其到任然後考察以聞重惟琰嘗歷從班州郡將迎費耗必倍用敢先其未至冒昧有陳欲望聖慈將琰差知徽州㫖揮特賜收寢别選循良之吏惠此凋瘵之民臣不勝大願德秀又奏乞將太平州通判韓楚卿罷免狀曰臣竊惟通守之職所以關決郡條茍非其人必至貽害千里臣近據太平州申通判時子懋任滿新通判韓楚卿已到任交割職事臣竊見楚卿依憑城社旁若無人㳂檄之日居多在官之日絶少由此縣道敗壞貽患後人推其源流蓋自楚卿始當塗名郡地望素髙加以旱菑之餘講求荒政正賴倅二得人相為協濟如楚卿者實不堪任伏望聖慈將楚卿罷免或與祠祿别差作邑有聲績人通判本州實一郡之幸德秀又奏乞將知太平州當塗縣謝湯中罷斥主簿王長民鐫降狀曰臣猥以駑庸將漕江左屬旱蝗相仍民物告病朝夕憂懼寢食靡遑仰賴仁聖盛明之朝哀矜元元蠲租發廩無所愛惜飢疲之氓賴以少蘇然臣博采衆言皆謂艱食之日尚長迓續民命唯仰二麥故於八月間鏤板勸民種殖且控請于朝乞撥降錢楮貸民糴種復慮報可之命尚遲亟以本司樁管錢一萬貫發下太平廣德兩郡委自令佐措置給借第四等以下耕農之家文移丁寧非不切至意謂近民之官必能恪意遵行未幾當塗之民乃有以給散不公詣臣陳訴者及臣以巡察荒政躬至當塗而來訴者愈衆蓋保正縣胥相為表裏賄賂茍行則有以一户而獲數十千者囑託不至則有候伺纍日而財得百餘金者推原其故皆由知縣謝湯中者身為邑長略無惻怛愛民之心視監司行移漫為文具始則泛然付之吏手繼則一切諉之佐官致使吏姦恣行無所忌憚侵移詭冒色色有之臣以民訟至多不容但已遂將典押陳杞等械送州獄尋据勘到本縣元承州帖發下官㑹二千貫除節次給借人户外餘錢四百二十三貫有竒皆係陳把等擅行侵用或以入己或以供官甚而知縣料理考任主簿修造廨宇亦科縣吏出錢吏無從出則取辦于此臣竊考樁管錢物非准指揮不許支用臣以憂民之切不暇便文自營方自劾于朝乞正專輒之罪而官吏乃奉行滅裂如此今當舉行荒政之際若使官吏人人如當塗縣事事如麥種錢則凡陛下所捐以豫民者皆將化為烏有矣嗸嗸生靈何所依賴臣除一面將勘到公吏照條施行外所有通直郎知太平州當塗縣謝湯中不職之罪實難幸免況料理考任乃其私事輒行科配吏人致使將官錢侵用其平時律已抑又可知伏望聖慈將湯中特賜罷斥使州縣之吏咸知究心荒政不敢茍簡庶幾實惠得以及民實一道大幸德秀又奏乞將知寧國府南陵縣丞李仁任罷黜廣德軍廣德縣丞馮兟送部與嶽祠狀曰臣竊惟邑之有丞所以協贊其長治一同之政若乃很傲而陵上昏眊而失職有一于此是謂負丞臣以亷察為官豈容置而不問伏見宣教郎知寧國府南陵縣丞李仁任故參政彥頴之孫而澄之子也淳厚端良有忝祖烈輕儇浮薄厥有父風本縣去嵗菑傷為一郡最振飢檢旱若救頭然惟令與丞均當任責而仁任乃以被檄為名委其職而去臥家數月恬若不聞畔官離次已為可罪近以州郡文移督促始不獲已還任遷怒邑宰百端侵陵自典吏而下不時捽至其庭斷以大杖訊決動至數百械繫或至通宵且以知縣妄用官錢遍申臺府及守臣張忠恕索歷驅磨縣家所用皆有去著仁任之言莫非詆誣臣考諸公論皆以仁任為不直遂對移蕪湖縣主簿冀其少戢而仁任更無一字遵禀徑翩然以歸非惟不有邑長且不有監司矣臣所謂很傲而陵上者仁任是也迪功郎廣德軍廣德縣丞馬兟年迫桑榆志氣衰落間嘗攝邑頗乏亷聲近以本軍檄往平江般運制置司對撥米斛羣情喁喁日望船粟之至而兟乃以黠胥自隨縱其侵漁船户錢物遂使船户公為欺弊盜糶官米凡七十餘石當飢民仰哺之際一勺一合皆為可惜兟為監臨官不能檢察以致散失米斛其多如此豈容逃責臣所謂昏眊而失職者兟是也二人者一則少而狂一則老而繆俱難存留在任伏望聖慈將仁任罷黜兟送部與嶽廟俾凡為吏者知所警飭實一道幸甚德秀又奏乞將知寧國府張忠恕亟賜罷黜狀曰臣竊惟天災流行雖盛世不能免惟上而朝廷下而守令至誠以憂之盡力以救之則民雖不幸而遇凶嵗可使骨肉相保而無流離全其天年而不至殍踣以死昔人有云剪爪宜及膚割髮宜及體仁人之於救菑雖髮膚有所不愛況其他乎富弼之在青州存恤流民如其家之子弟趙抃之在越振饑藥病多出私錢蓋為君上牧元元為國家固根本法當如此臣以駑劣將漕江東屬嵗旱蝗民物告病仰賴陛下仁聖哀恫無告之民散財發粟以巨萬計真可謂堯湯之用心而臣遍察州縣間求其至誠惻怛恪意奉行者則何其甚寡未嘗不仰歎朝廷之至仁而咎官吏之不仁也間者蓋嘗以給貸麥種錢縱吏盜用而劾一令矣又嘗以般運米斛縱吏為姦而劾一丞矣若乃身為二千石而志不在民將朝廷振濟之米掯留破用其罪有甚於二人者乃獨置而不問則是纎悉於小官而鹵莽於大吏也臣謹按朝散郎權發遣寧國府張忠恕以輕儇浮薄之資濟之以隂狡誕謾之術曩守霅川汙穢無檢為憲臣所劾僥幸獲免自以為能及來宛陵貪恣益甚開告訐之門以隂求人過一詞罥罣牽連入獄有罪犯甚微而遭編竄者崇聚斂之政以傾奪民財極意捶剝一孔不遺有逋缺無幾而遭估籍者邦人畏之甚於豺虎去夏亢陽種不入土臣以手書與諸郡豫講振荒事宜獨忠恕條畫燦然本末甚備臣大喜過望亟下其所申於諸州俾視以為式居無何有自宛陵來者乃言其境內飛蝗塞路粟直翔貴州郡恬若不聞臣竊怪之何其言之工而實不副也近者循行太平廣德二郡其地與宣犬牙相入薦紳父老多為臣言宣境之民憔悴尤甚振恤之事殊未有倫傳聞鄰境散錢給米已至一再有恨不得為旁郡民者臣亟馳書提舉常平李道傳問其故道傳復書以為宣之六縣地最大旱最甚前後所申最詳而事最不舉臣謂道傳此言實深中其病而忠恕方且裒類成帙一一記載若已訖事之為者臣得而讀之則虛詞多而實事少略於給散而詳於勸分其間有月濟二日糶四日者濟米出於官司糶米取於上户官司所惠既微而上户之米又盡充官糶不知自餘日分細民何所仰食未幾承常平司牒稱寧國府昨䝉朝廷撥賜轉般倉并義倉米凡十一萬七千三百六十二石而本府撥下諸縣為振濟用者止五萬六千二百四十六石其餘六萬一千餘石未見去著遂行疏問忠恕雖巧為分擘回申而氣餒詞窮不可掩覆姑托數項言之如諸縣合糶人户已將勸分米充數矣而忠恕復於振濟米內重疊支破在城安濟坊孤老并諸縣乞丐人已將常平米給散矣而忠恕復於振濟米內重疊銷豁兩獄罪囚土牢編管等人并家纍重大官兵月糧口食州郡自當措辦而忠恕亦於振濟米內拘留其他虛支大破色目非一猶且攤布不行復將二千三百七十餘石指為灰蛀缺折之數不思上供綱米係嘉定七年新收而義倉米亦近常平司委官覆實灰蛀缺折何至若是之多公為誕妄一至於此原忠恕本意自謂文移眩惑可以欺人冀將官米暗行乾沒不虞道傳單車入境盡索文歷鉤校條析具得其情倉猝報應姦狀畢露蓋其平時習氣以此為常當晝攫金無所忌憚獨不念一郡數十萬生靈嗸嗸如在溝壑陛下不惜太倉之積救之於垂絶之中為守臣者縱不能有所附益其忍為侵漁之計乎且朝廷蓋嘗因忠恕之請頒祠牒截綱米以贍州用矣借令經費猶或不足夫豈他無撙節之方何至紾飢民之臂而奪之食其亦可謂不仁之尤者矣況荒政之行當以振濟為主勸分為輔蓋有司不惜官廩以惠民然後可責富室不私藏以惠鄉里今忠恕於朝廷所賜則妄行破用於民問所有則根括無餘形迫勢驅一切不恤考諸民詞有家産僅千錢而勒令認米四百石者有因公事至庭而罰米數百石者民間畏其虐焰止得俯首聽從据忠恕所申六縣人户認米凡十二萬八千九百餘石茍非以無道行之其能致多若是乎如涇縣土瘠民貧所科亦一萬一千四百餘石忠恕尚怒其少形之批判必欲其急作措置否則縣官按奏黜責典吏刺配嶺海是趣迫官吏使之毒民也以忠恕之政無善狀士大夫皆謂豺狼不問責實在臣而臣獨容忍久而未發者尚欲責以救荒之效故也今察其所為決無可望之理而春夏之交青黃未接正是民飢之時必待其餓莩纍纍死亡枕藉然後舉劾其亦晚矣臣與憲倉二司雖分州措置荒政然於官吏臧否則自當通察用敢不避仇怨疏其罪狀以聞伏望聖慈將忠恕亟賜罷黜令提舉司將元撥賜米斛一一驅磨實數申尚書省仍乞下臣此章戒勵本路州縣凡奉行荒政之吏各當仰體朝廷之至仁毋效忠恕之不仁其有沮格上恩俾澤不下流坐視民飢而拯救不力者並許監司按奏重置之罰庶幾民命可全而和氣可召實一道大幸貼黃臣竊見忠恕以峻急苛暴之政斂怨於民去嵗之秋宛陵之士有條民怨十事以示臣者蓋謂租賦之法自正數外一毫不當多取所以編之版籍給以牌由依數輸納以為一定不易之制而本府則不然牌由內明書紬一寸則科納一尺明書紬一尺一寸則科納二尺明書綿一錢則科納一兩至於和買紬絹亦將零寸責令盡納整數其怨一也本府受納夏稅秋苖不用文思斗斛而私製寬大斗斛兩嵗以來加增收耗尤甚於前總而計之不啻多量一倍以上受納官隨即申府乞委官般量將加增收到之數為出剩以獻開場未幾所收出剩已可補足正數便行出榜責令人户重價輸錢以歸府用其怨二也人户輸納去年折苖錢以一石為率如納秈米通用米二石二㪷了納如納粳米通用米二石了納今年六月十一日以前秈米每石八百文足粳米每石一貫文足更有官收水腳等錢共五百文足只合通計錢二貫五百文足而官司估價每石納成三貫四百五文足則是每石多取民錢一貫文足其多收折麥錢大略亦同其怨三也他如公庫既造酒宅堂又造酒責令官吏沽賣以攙奪贍軍正庫之課額一有虧缺官貟動遭責罰公吏例行決配而官吏怨坊場河渡之敗闕者不任興開虛負官錢無可償納家既籍沒身復監留餒瘠如鬼猶不釋放而坊户怨宗子降生陳乞公據者逾年而不行陳乞起支者經年而不豫近又創例坐倉回糴孤遺米并以酸淡官醖折支料錢而宗室怨軍人預借春衣錢每名掗支官酒七升虧折甚多噤不敢言而軍士怨中産之家有因科配賑糶破壞家業而怨者有為户長以逼催逃閣稅賦鬻産代輸而怨者有無辜遭罹刑辟編竄他州骨肉離析而怨者臣始聞之猶疑其言之過尋采衆論皆謂信然方陛下宵旰勤民惟恐一夫不獲其所而忠恕身在近藩敢為殘忍以結怨于下一至於此臣以按察一道為職倘不亟加論奏使忠恕僥幸善罷或反叨升擢外臺耳目其將焉用此臣所以不敢默也德秀又按奏寧國府司户錢象求狀曰臣竊惟方今仁聖在上愛養元元若保赤子凡百有位皆當恪意奉承使德澤下流鰥寡得所然後無負朝廷為民置官之意而臣所察州乃有顓恣妄為貪虐相濟大吏以虎狼之威搏噬於其上小吏以狐鼠之姦跳踉於其下輕蔑國憲荼毒民生者臣儻不以聞則為失職昨據宣城縣百姓施良陳訴知寧國府張忠恕妄行抄籍家財本府司户錢象求乘勢收虜錢物等事臣亟索府案并追推吏張翼司户廳吏汪澄送上元縣根勘見得施良與兄施恭各居嵗久至嘉定三年施恭與男施耕同充本府軍資庫子侵盜官錢事發配籍其在獄之日即無一詞連及施良其後施耕自配所逃歸匿於宗子趙通夫舍屢干施良丐貸錢物不能一一盡從自此浸成嫌隙又緣本府追捕逃軍嚴急遂生狡計以知府張忠恕見揭榜召人實封告訐於是撰造虛詞詣府陳告稱父施恭曽有官㑹七百餘貫并金叉銀盞等物寄施良之家忠恕欣然視為竒貨不待究實徑差司法前去封籍其家仍就追施良送獄當盛暑中百端鍛鍊勒令招認隱寄情罪盡將財産估賣填償計其所直凡數千緡忠恕猶以為未足復將其壻田産併行沒官展轉推求尚且未已又謂其女不應輒妻宗室婚嫁數年且嘗有子必欲一旦仳離其為不仁孰甚於此臣竊考國家立法唯胥吏犯枉法自盜贓罪至流以上者乃許籍沒施良家本編氓初無過犯雖其兄姪嘗遭黥𨽻然異居析産罪不相及借使真曽受寄錢物揆之三尺不過斷罪監償亦無籍沒之理況施耕所告元無實跡又涉纍載已被赦恩忠恕志在得錢遂併國家之法令朝廷之赦恩一切不顧且自古及今未聞有止憑告訐之詞遽將人户封籍者亦未聞有先封籍而後追人者蓋忠恕之心沈溺貨利民間訟訴稍涉錢之一字便欲攫而取之何暇更考虛實姦猾之徒窺見此指凡其所欲陷害必曰某人罪當罰錢某人罪當籍産忠恕一一施行被誣之民無能自脫者如保正王椿以受船户繳引錢四貫八百為人所訐而籍其數萬之資竹木牙人劉剛等以多收商旅牙錢為人所訐而罰令納錢三千貫諸如此類非止一端案牘具存可以覆視江東去嵗旱蝗宛陵為甚羣情洶洶幾不聊生為郡守者方且大開告訐之門數興羅織之獄奪斯民仰事俯育之具而供其侈費妄用之資臣所謂大吏以虎狼之威搏噬於其上者忠恕是也當施良被籍之時司户錢象求實受府檄估賣其財産因得挾城社之勢以行其穿窬之謀雞鵝孶畜則烹之以饗從人縑帛軟細則卷之以歸私室據廳吏汪澄供稱有未上帳之物係象求般去者拾餘件如糯榖燭炭綿錢紙札之屬是也有物重估輕象求以詭名買去者數拾件如縑假衣物髹器之屬是也以至館客婢僕亦皆紛然收買名雖酬直無異白取獨不念無辜被籍之家寃痛方甚乘時攘竊豈所忍為臣所謂小吏以狐鼠之姦跳踉於其下者象求是也忠恕前已豫祠臣不敢更乞行遣但其違法毒民之狀臣既考驗得實不敢不告于朝廷象求以資入官人品猥下而敢為貪墨如此儻令僥幸漏網則繼此塵㸃仕路必將益肆其姦伏望聖慈特賜重行鐫罷永不得與親民并職曹官差遣使州縣小吏少知所懲實斯民幸甚德秀又奏乞將新知寧國府陳廣夀寢罷新命狀曰臣伏覩進奏院報陳廣夀差知寧國府尋復有㫖趣令之任臣竊惟江東一道自晉宋以來號為重鎮者金陵宣城而已有唐之世以宣為觀察府而屬郡𨽻焉肆我孝宗龍飛升揭府號蓋其疆埸之廣袤生齒之蕃庶地望之雄重大抵亞於金陵故為親王執政偃藩均佚之地而自十數年間乃有凋郡之目臣嘗博訪士大夫皆言此邦本自富實頃緣郡守不盡得人或亷隅不立而封殖其私或用度亡節而靡於浮費故其事體浸不逮昔今誠得一潔已奉公之守行節用愛人之政源流本末以漸講求則財計不患其不充公私不患其不裕今者郡守闕人臣意陛下必將妙選循良以幸此州而改命再三乃得廣夀貪殘之迹人所共知其在臨川尤為暴橫清修之譽蔑聞纎毫白奪之名交播衆口近因漕臣之言斥使去郡天下莫不共歎朝廷從善之速而或者猶恨議罰之輕今曽幾時遽有此命夫撫之與宣雖均為名郡然其大小輕重要自不同使廣夀在撫以善最聞其褒遷不過如此夫既嘗敗績於撫矣其可復使守宣乎既不能以善治撫矣其能以善治宣乎故自除目之傳公論籍籍如出一口況是邦新罹前守之虐民之被禍蓋匪一端至於開告訐之門興羅織之獄無罪而籍資産非辜而罰贓錢善良之家沿此破蕩者甚衆自李道傳被命承攝乃始以次蠲除斯民浸有生意側聞廣夀在撫之日如前數事色色有之而其凶暴尤出忠恕之上今忠恕甫去而廣夀實來所謂逐虎逢狼害將愈甚抑何宣人之重不幸也臣非不知國家用人務在含垢過而能改聖賢許之然大體可稱則一眚難廢不幸有過則自新可期若廣夀平生屢遭彈劾起家為郡當知聖朝抆拭之恩而貪暴亡狀乃更甚於疇昔其不可望其改過也明矣臣若顧避不言坐視千里之民再被塗炭豈惟下愧百姓實亦上負朝廷況今明良㑹聚之時進退人材率采公議刻印銷印曽無留難何所疑畏而不亟論奏伏望聖慈將廣夀差知寧國府指揮特賜收寢别選賢牧以惠一方庶幾凋瘵之氓獲遂蘇息臣不勝至願寧宗時王十朋論林安宅劄子曰臣聞口道先王語行如市人名曰盜儒此聖人之所必誅王法之所不赦也臣謹按前知臨安府林安宅者其盜儒之雄乎初令越之新昌納官妓為妾則以濫聞及倅漳州盜郡將之權貪墨自恣則以贓聞及作廣漕起羅織之獄誣陷善良則以酷虐聞諂事鄉人朱倬倬令何溥薦之而得浙漕倬雖小人然於安宅有卵翼之恩及臺官張震欲論倬安宅乃手疏倬之隱惡數十事以示震倬之罪人皆可得而言也而安宅納之其與吕布事董卓而殺董卓何以異乎安宅出入史浩龍大淵之門其在都司也進則見浩退則見大淵天府之除不由正道物議咸鄙薄之有從何處來之語浩與大淵結為死黨及二人反目浩託安宅和之安宅既欲效勤於浩又欲獻佞於大淵遂造其室為奴顔婢膝之態士夫傳以為笑陛下比於經筵嘗語臣曰近臺諫論龍大淵事朕不私之已罷其職矣臣言陛下屈已從諫以天下為公不私潜邸之臣社稷之福也陛下稱不私者至于再三今安宅乃自託於大淵之門以盜威福陛下且不私大淵其肯私其門下士乎安宅自知罪惡為清議所不容乃詐病以求致仕朝廷既以宫觀與之矣又用計以復留臣近嘗面奏其姦陛下即諭宰相令丐祠而去矣今又必欲朝辭冀僥幸復留之計動用姦謀以要君父不顧亷耻不知進退真小人之雄者也或謂安宅之才可以治劇然自知臨安以來初不見其所長事無大小皆委於吏獄訟繁興而不能決盜竊公行而不能治議者謂不逮前政逺甚是豈可居彈壓之任乎陛下斷然罷之可謂能去惡矣為安宅者固宜皇懼朝聞命而夕即塗也乃復徘徊不去不知何所恃而敢爾耶臣欲乞斷自宸衷正安宅之罪而竄逐之以為不知亷耻者之戒臣與安宅素無睚眦比因安宅奉史浩意㫖毁省試䇿題及程文之板臣以公議責之即非私怨安宅聞陛下用臣為御史即欲求去蓋用姦計以鉗臣口臣前日面奏其姦即䝉陛下罷而去之臣已不論列今聞安宅復求朝辭物議沸騰咸謂安宅倚恃奧援不顧公議故臣不得不論之願出臣章示至公於天下十朋再論林安宅劄子曰臣誤䝉親擢濫司風憲比嘗面奏前知臨安府林安宅姦邪交結等事陛下即諭宰相令安宅罷職丐祠而去臣仰窺聖意既俯聽臣言得從諫如流之美又欲保全安宅使不繇彈劾而罷為安宅者固宜聞命即行又復乞朝辭冀姦計得施欲求再用臣昨條列其罪謂即賜施行今乃聞有㫖令安宅內殿引見臣不勝皇懼之至切聞仁宗之時任用臺諫言及乘輿則天子改容事關廊廟則宰相待罪臣今論一小人而不能使其知畏尚何面目居風憲之地耶安宅前日聞陛下用臣為臺官即詐為風疾以求致仕既已得祠命下復止罔上要君尤足以見其姦詐今宜即去而復乞朝辭未有班次而遽得內引是前日之姦計復行也臣切見近日執政臺諫以疾求去者皆放朝辭安宅何人而得此隆眷異禮耶欲乞陛下深察安宅姦邪交結之罪亟賜竄逐以慰公議衛涇奏乞籍沒陳自強家財狀曰臣恭惟本朝以仁厚為家法以體貌待大臣三代而下所莫能及然其至於朋附以罔上貪黷以為姦則竄殛隨之曽不容貸豈固為是少恩哉所以振紀綱厲風俗不得不然耳傳曰國家之敗由官邪也官之失德寵賂章也賈誼亦曰上設亷耻禮義以待其臣而臣不以節行報其上者則非人類也夫為士大夫而至於以寵賂幾敗國事至不以人類自處則亦何所不至哉臣謹按韶州安置陳自強起自書生晚叨一第方為士之時固已不善處約丐貸亡節素乏鄉曲之譽繇州縣得改秩年踰六旬自知遲暮志在茍得當姦臣弄權之始夤緣假館之舊躐登朝列致身宰輔專事諛佞持祿固寵知有權臣而不知有陛下武臣之平章軍國祖宗無此故事自強寧不知之乃率同列諷臺諫上章飾說力請陛下畀托胄以吕公著文彥博之任自強位處其次庇身得所托胄既專國柄自強肆為姦利舉朝側目莫敢誰何傳聞四方無不鄙誚都城頻年火災變異不小一夕延燬私第頃刻而盡天意可見自強曽不引避反以被火乞憐於人餽遺接迹所獲不資人謂回祿祝融之相之也陛下念薦舉之不公寒畯陸沈纍降御札戒敕中外法行自近宜以身率乃首犯訓㫖遍移私書多取空頭舉削旋議價直隨其人之貧富與其勢之緩急有增至三千緡而后售者有先受賄賂而后為之發書者自強三子俱非令器士頥士履貪穢尤甚交通關節專事狎逰人謂將帥蘇師旦賣其大者而近下軍職及升差之類自強偕二子交互為市內而職事官外而監司郡守亦以賄得有求學官者獻泥金酒器十具不厭所欲則郤之以為髙實怒其薄也使自強素有亷稱此物奚宜至哉有自瓊管以七千緡而得廣漕者有自倅二以六千緡而連得兩郡者有以珠翠飾婢妾而遺其子者有以五千緡而得潮陽者其它殆難以遍舉繇是金帛充盈每盈百篋則諭天府運以海舶不知其幾有幹僕陳宗皓者本封樁庫吏自強倚為心腹冒受福州水軍統領徇私廢法大抵類此近者太皇上仙臣子摧慕自強領使總護初無勞錫賚不薄二子列屬復叨醲賞自強宜知止矣自二子外其餘辟置非錢不行皆有定價下至輿夫力士亦必刻削其募直犒賜之半此而可忍夫復何言逮其因山之回自知階官已至特進意在欲得亞保詞臣有言兼有謝深甫舊比自是始不敢受尋常辭免制綍或令回授或與加恩謂之貼麻自強既觖初望公形怨忿必欲盡辭峻拒廷揚之命不恭孰甚焉自強本無能為敢行不義徒以憑藉權臣自謂若倚太山蓋托胄樂其順從非自強難以專擅自強徇于貨利非托胄不能優容是以蒂結株連牢不可拔兵大事也托胄欲圗兵柄以久權任始猶遲疑未決自強不能禁止反從㬰成之諸將敗衄糧械喪亡當荆襄兩淮危急之時人情忷懼幾至不測朝士從臣有叩自強者但俯首唯唯或云太師自有措置人知其無益亦不復問蓋自強苐知徇私黷貨不以國事為念夫子曰危而不持顛而不扶則將焉用彼相自強之謂矣幸而敵以糧乏自遁自強喜動容色對托胄言某自覺心安知其無慮夫三邉兵民死於鋒鏑殆踰百萬自強所當怛然興念曽是以為安乎自強自知通國之人皆所弗豫乃與托胄密謀引用林行可躐長諫省倚為爪牙令縱其搏噬善類使人無敢議已者其意殆不可量二人者為惡不同同於誤國原情定罪厥罰宜均臣歷觀本朝宰輔或以庸常尸位或以姦邪被斥或以朋比獲罪雖不一端曽未有貪婪汚濁嗜利無厭寡亷鮮耻如自強之甚者則又烏可以常理論哉矧舊比有可考者昔丁謂為相坐與雷允恭交通罪狀顯露初止分司再貶崖州司户諸子並勒停籍其家得四方賂遺不可勝紀謂雖小人猶有才術自強視謂無能為役而罪浮于謂止從竄斥人謂佚罰況托胄家財既盡行拘籍而自強不損其錙銖反令稇載而歸何以厭服天下臣愚欲望睿斷將自強家財照丁謂例籍沒二子姑從鐫降勒令隨侍自強前赴貶所以為鄙夫患失貪人敗類附下罔上誤國蠧民者之戒庶幾少快公論俯慰人心於維新之政不為小補涇又論太師平章軍國事韓托胄右丞相兼樞密使陳自強乞賜貶竄疏曰臣聞書曰惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食害于而家凶于而國人用側頗僻民用僭忒釋之者曰君臣之分貴賤有常政當一統權不可分作福作威謂秉國之權勇略震主者也人用側頗僻謂在位小臣見彼大臣威福由己由此之故皆附下罔上民亦因此而僭差夫箕子告武王以洪範陳天地之大法而獨於此諄諄其嚴凜乎其不可犯真足以垂戒萬世且以作福作威而害家凶國禍己如彼而況征伐自天子出聖有明訓人臣而可專之以貽患於天下哉臣仰惟陛下天資仁孝身履恭儉率禮守法畏天愛民未嘗有一過舉以韓托胄獲聨肺腑久事禁密見其平時小心畏謹故每事詢訪覬有裨補托胄所宜銜戴恩遇勉自抑畏密勿彌縫圗報萬分而習氣膏粱不學無術任重力小輕躁自用陛下少加假借侈然驕肆竊弄威福恐人有議己者乃首借臺諫以鈐制上下除授之際名為密啓實出己私而姦險之徒亦多樂為之鷹犬夫臺諫之官使誠出於天下之公選人主之親擢論議章奏允叶人心聽之可也今專植私黨任用匪人凡有所言無不隂授風指而每告陛下槩謂臺諫公論不可不聽自是威福日盛無復忌憚稍有異己必加擯斥以人臣而專權擅朝干分敗常自知其無所容乃巧圗兵柄以為固位之䇿不量事實徒徇虛名外則締交軍帥分布邉面以張其聲勢內則位置羣小於給舍臺諫以主其言論招納亡命撰造間諜輕絶和好遽啓兵端逆曦之任殿巖托胄交通蹤跡詭祕人已切議當孝宗在宥之日以吳氏世掌兵權聖慮髙逺吳挺亡恙時逆曦年甫弱冠因其來覲留之禁衛以繫其心及挺之死至易以它將逆曦在光宗朝亦不過假守邉郡托胄既薦為殿巖又納賂以便其歸復任西帥付以全蜀識者蓋已寒心果挾強敵以叛人尤不能無疑於托胄而托胄亦何辭以自解藉曰無他而虎兕出柙咎將誰歸以至皇甫斌之敗於唐州李汝翼之敗於符離商榮之敗於東海郭僎之敗於儀真郭倪之奉頭鼠竄僅以身免將不素擇兵不素練輕舉妄動自取困衄殆理勢之必然而所以致此抑又有由也蘇師旦起於筆吏之賤托胄以奔走之舊薦進寵用不三四年驟躐通顯凡武臣之建節非近屬懿戚元勳宿將不以輕畀舉而授之奴𨽻昔秦檜居相位垂二十載不為不專假寵使令如賈璵丁祀官不過武功大夫未嘗處以朝廷職任而師旦為御帶為知閣為樞密都丞㫖至秉旄鉞此秦檜所不敢為而托胄敢為之師旦何知嗜利亡耻固其常態既為托胄所親信遂招權納賄其門如市自三衙以至江上諸帥皆立定價多至數十萬少亦不下十萬暨諸將撓敗托胄不得已稍從黜責諸將往往退有後言謂吾債帥而責以戰將道路籍籍傳笑境外遂益有輕視中國之心師旦旋以敗露削籍投荒雖加之罪而心實不服揚言於人謂諸將貨賂非所獨得蓋指托胄而言然則師旦之竄非專於伸國憲亦托胄藉之以自文耳抑托胄之專擅尤有大可罪者自古國家有大政事大興作謀及卿士謀及庶人禮曰天子將出征類乎上帝宜乎社造乎禰禡於所征之地受命於祖受成於學豈非兵凶器戰危事故謹重如此今托胄之舉事上不取裁於君父下不詢謀於縉紳至於為陛下侍從近臣有不得與聞同列有不能盡知者甚至密諭諸將出師之日僭假御筆以行之外廷曽不及見已破泗州之後曲為之說以罔聖聽始諭詞臣降詔逮㳂邉連以敗報皆䝉蔽而諭諸將苐以捷聞人情忷懼幾不自保幸祖宗德澤在人逆曦授首敵亦以糧乏自遁然而三邉兵民斃於鋒鏑困於轉徙淪於飢餓死於癘疫室廬焚蕩田萊荒蕪遺骸蔽地哭聲震野斯民何辜而至此強敵頻年僉刷皆吾中原赤子彼唯重其族類而虐用吾民光化之戰至驅僉軍及俘係老弱幾數千人填塞濠慙以渡軍馬河南之地十室九空而兩淮四十餘年生聚遂成丘墟是南北數百萬生靈之命皆托胄一人殺之也皇天后土能鑒陛下之心雖敵人亦知其非出於陛下之意是以督府每遣小使敵帥書問往復必以首謀姦臣為言使托胄本無邪謀祇以輕信誤國至此亦當審察事勢束身請罪退就貶削猶有辭於天下仍偃蹇居位靡聞懼容遇邉報稍希輒為大言每執己見則曰有以國斃聞者縮首夫國太祖太宗髙宗夀皇之國而從托胄斃之可乎方倚腹心以為臺諫文飾姦言謂之一人心定國論以禁異議怙終不悛殆將罔測夫以托胄本以庸暗無知養成姦惡得罪天地得罪祖宗得罪舉國兵民納侮夷狄孩提孺子口皆能言心無不怨而劫於積威曽無一人敢為陛下言者賴陛下覺寤出自英斷特降御筆處分且䝉聖恩不以臣孤逺亡似擢長憲府臣雖見具控免而已入供職敢亟舉其專權誤國罪之大者言之其他罪惡擢髮不足以數未暇枚舉如陳自強者昏老庸繆本無寸長可取徒以嘗假館於托胄繇州縣小官數年間汲引拔擢致陛下過聽用為次相阿附充位不恤國事不遵聖訓中書機務唯唯聽命一無可否托胄曰兵當用自強亦曰當用托胄曰事可行自強亦曰可行每對客言自強受恩之深只得從順然則從之者歟自強之罪亦不可勝誅矣若其貪黷無藝政以賄成鄙猥之狀言之幾汙口舌臣亦未暇悉論伏望陛下詳覽臣奏將托胄自強重賜貶竄以答天人之願以釋兵民之忿以彰有國之典以慰死者之寃使敵國聞之必諒陛下本心將士聞之必為陛下戮力一戰忠義聞之必為陛下奮發而起宗社幸甚天下幸甚涇又論韓托胄鑿太廟山及婢妾僕𨽻封叙官爵及分盜太皇殿金帛狀曰臣昨日奏疏論列韓托胄專權誤國等事恭想已䝉睿㫖施行方陛下奮發英斷之初萬姓呼舞咸以手加額喜於復見天日之清明足見人心無不聳快其它罪惡人言尚且籍籍今條列一二如后一稽之禮律宗廟至重太廟者祖宗神靈之所御雖車駕經從猶為卻蓋所以盡恭敬也托胄人臣寧不知此廟後山林號稱禁地自來不許樵採掘鑿托胄惑於術士之說謂其地形勝每遇興造必獲福利自是窮極土木終嵗不休創造亭館種藝花卉日事遊燕三二年前臣雖在田野每有人自都來輒言每遇宴集望太廟之山燭炬熒煌簫鼓喧閧歌呼之聲逹于通衢觀者莫不嗟息凡居民起造樓屋臨視鄰家法猶不許而托胄乃以亭館下瞰太廟於禮安乎欲乞聖㫖行下臨安府日下先將山上亭館盡數毁拆花卉盡行除去補植松杉仍申嚴樵採掘鑿之禁一貴有常尊禮亦異數夫人嬪御天子而後有之今托胄處人臣之極位合避嫌疑乃敢以婢妾之賤邀求封號至郡國夫人僭擬宫闈月有常廩倡優后飾賈誼見於痛哭流涕之言而托胄以倡優僭受封號干請宣押俾與內宴至與妃嬪雜坐人臣而有此禮乎臣欲乞睿斷將托胄四婢追毁告命其服用金玉珍寶等皆宫禁所得者並與拘收放令逐便其羣婢凡有安人恭人等封號者悉行追奪一衣章之寵以勸有功均號名器武臣任至將領或賜金帶皆為榮寵今托胄盜竊威福多以名器私其親屬或有可言者乃至其家僮僕及內侍私名幹人有官至大夫職為將領及御酒庫等差遣如黎懷義鄭中錢錡吕頥田邦直杜文質等及李奭家奴嚴監門者或曽賜帶或經兩賜名器僭濫莫此為甚臣欲乞睿㫖令所司追究逐人元補名目因依除元係父祖奏䕃及實有軍功補授人許給還元官外其餘官資差遣雖作御前及親屬名色並與追毁其衣帶悉行追納入官仍各將家業抄估聽候施行一臣昨所奏分盜太皇殿金帛玉瑢等今聞有內侍吳回者尤為巨蠧凡夀慈殿事務皆所專輒分盜金帛悉出其手自盜特多臣切惟太皇太后帑藏所儲皆兩朝奉親之禮太皇方寢疾之際不忘國家念及軍旅之費以助支遣吳回身為巨璫受國厚恩職居禁密獨不仰體聖意方騩馭上仙臣子摧慕之時忍為盜竊之計豈復人理欲乞睿㫖將吳回李奭等送所司削奪官職分竄嶺海仍籍沒家財以充犒軍之用使三邉將士聞之必知激勸右上件四事雖未足以盡托胄之罪然公論未厭不容緘默冒昧煩瀆天聽伏乞睿斷速賜處分涇又論姦民猾吏狀曰臣竊惟國家法令非不詳盡州縣奉行弗䖍猾吏姦民相輔為虐善良受弊無所赴訴此蠧害治之大者也臣伏見孝宗皇帝即位甫閲三月內出寬恤十八事條畫纎悉燦然備具洞燭幽隱曲當事情欺僞不容姦猾知懼一時頒行中外呼舞二十八載之間所以結人心固邦本抑有助焉惟是比年以來因循玩習視為虛文臣嘗考求大略實多切於今日之務未暇遍舉姑以治私販鞫盜賊姦民挾詐以汚善良猾吏並緣以徼賄賂二者之弊尤切於民者為陛下陳之蓋私販盜賊無非鄉村之惡少亡賴必有大姦巨猾為之囊槖常時既與固結緩急相為表裏一旦敗露縱加窮治迄莫肯言方藉其營救於外以為異日之地而善良之民粗安衣食素無交涉徒以平日彊賣不售假貸無時圗復私讐隂受指教或謂資給停著或謂同黨分贓官非其人付之吏手惟意所欲妄行供稱獄吏利於請求不究虛實株連枝蔓追呼煩擾肆其溪壑既厭所欲卒從末減有司或不加察無辜反抵深文間有一二僅能自明而誅剝之餘家已破矣姦民復出為患益無悛心獄訟繁滋所在皆是箠楚之下何求不獲寃枉之聲聞於道路此豈聖世之所宜有耶臣恭惟陛下嗣服以來發政施仁率繩祖武每聞民間利病罷行恐後顧州縣吏不奉法敢為民害有如前所陳者安可不加禁戢乎臣伏願陛下特降睿㫖檢坐紹興三十二年寬恤詔條申嚴約束俾州縣各務遵守內委御史外委諸路監司糾其不如令者必罰無赦庶幾姦猾革心善良安業刑得其平獄無寃濫亦足以感召和氣災沴不生其於仁政豈為小補惟陛下留神幸甚歷代名臣奏議卷一百八十四
