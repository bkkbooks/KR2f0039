body:
  text: 歴代名臣奏議卷八十一明楊士竒等撰經國宋太宗太平興國八年左拾遺田錫論軍國要機朝廷大體䟽曰臣伏念自忝諫垣今已周歳無一言可裨時政無一善上荅君恩盖以陛下文明無事可諫朝廷公共無事可言然尸禄曠官憂慙益切盡忠補過夙夜寜忘今輙以軍國要機朝廷大體布在一䟽上逹四聦伏乞陛下察而恕之容而用之臣所言軍國要機者一朝廷大體者四今為陛下引諭而言之臣聞古先聖人牢籠天下弛張睿略舒卷人心使萬人之心如一心四海之意如一意有若馭馬又如鑄金善馭者使之馳則馳使之止則止善鑄者使之圓則圓使之方則方茍失其機又失其時則萬人不一心四海不一意亦猶不善馭馬不善鑄金使之馳而不馳使之止而不止使之圓而不圓使之方而不方若是則危與亂雖未萌而不得不憂機與時雖未失而不得不懼故古人云居安思危又曰理不忘亂臣每念有唐之末天下分離中原土疆不過千里自先帝恢張皇業開闢天下平吴取蜀易如破竹唯河東遺孽終不能平洎陛下一舉取之功名光大世宗先帝所不及也然自河東破後聖駕回旋諸軍之心皆望賞賜四海之内亦俟霈恩豈謂陛下未覃賞㨗之恩未行䇿勲之禮經今二載所謂踰時今北方之戎不來朝貢幽州孤壘未復封疆臣以國家兵甲之强朝廷物力之盛滅戎人甚易取幽州不難然自古制御蕃戎但在示之以威徳示之以威者不窮兵黷武不勞人費財示之以徳者比之如草菅容之若天地或來朝貢亦不阻其歸懐或背驩盟亦不怒其侵叛臣伏慮陛下以幽州未取外患未平一旦又來擾邊萬乗復思再駕欲快聖意欲展睿謀雖舉必成功動無遺筭然臣請陛下或展郊禋之禮或行封禪之儀因此賞河東之功因此示䇿勲之信人心懈怠者復恱軍功勞苦者終酬帝澤滂沱物情通泰所謂陛下駕馭其意鎔鑄其心使之馳則馳使之止則止使之圓則圓使之方則方茍不以威信鑄其心恩恵馭其意臣恐使之馳則止使之圓則方當是時陛下必念臣今日之言陛下必思臣今日之諫也此謂軍國之要機一也又念交州未下戰士無功春秋謂師老費財兵書曰頓兵挫銳臣聞聖人不務廣於邊鄙唯務廣於徳業武有七徳陛下何不廣之天生四夷陛下何須收之必若聖徳日新皇風日遠遠夷自然入貢外域自然來降茍不來降又不入貢彼國自有災癘彼人自罹凶荒尚書曰惟徳動天又曰四夷來王周易曰聖人先天而天弗違天且弗違況四夷乎臣嘗讀韓詩外傳言成王之時越裳來貢九譯而至周公問其所以來其人曰天無迅風疾雨海不揚波三年矣意者中國殆有聖人盍徃朝之昔太宗征遼魏徴苦諫及貞觀太平之後天下州郡三百有六十羈縻之州有八百屯田置戍悉在外荒豈是一一加兵然後方來内附今陛下取交州何速況大國取交州謂之瘴海去者不習風土兵在彼中留滯頗乆願陛下且罷斯役暫息南征交州未平不足損陛下功業交州既得不足光陛下威聲臣但以師老費財為可慮頓兵挫銳為可惜盖征討之役費用非輕皆生民苦力之財悉諸國所供之賦乞陛下惜經費之用望陛下念征戍之勞此謂朝廷之大體一也臣嘗讀六典左右拾遺補闕掌供奉諷諫凢發令舉事有不便於時不合於道者小則上封大則廷諫臣又讀唐書見給事中得以封駮詔書封謂封還詔書而不行駮謂駮正詔書之所失又起居郎起居舎人得在天階之下備書王者之言今來諫官寂無聲影設使詔書有所失審制敕有不可行給事中不敢封還而不行不敢駮正其所失給諫既不敢違上㫖遺補又不敢貢直言其次起居即起居舎人人得立軒陛之間不得紀言動之事使聖朝好事或有所遺而不聞致陛下徳音或有不知而不録加之御史不敢彈奏左右丞今尚闕員又中書舎人是陛下近臣司陛下誥命臣每於起居日但見其隨班而進拜舞而回未嘗見陛下召之與言未嘗聞陛下訪之以事臣慮其各有所見欲待問而方言各有所陳欲因便而方奏伏乞陛下或詢訪以事或宣召與言冀各盡其誠心求得觀其器業又今三館之中雖有集賢院書籍而無集賢院職官雖有祕書省職官而無祕書省圖籍臣伏讀去年九月十一日所降制敕條貫百官仍於朝堂習儀又委憲司申舉此則陛下思復古道大振朝綱臣唯見所習者儀未見所舉者職如職業各舉則威儀自嚴君有君之威儀臣有臣之禮法何患百官不整肅何患庶政不允釐臣乞今後給事中得以封駮詔書起居即起居舎人得以紀録言動御史得以彈奏諫官得以抗言左右丞得以糾轄臺司中書舎人得以祗膺顧問中書舎人得備問則皇猷日新左右丞得轄臺司則風憲益整諫官抗言則陛下聞所未聞知所未知御史彈奏則百僚震悚一人尊嚴起居即起居舎人得在左右則盛事無遺國史大備給事中得以封駮則詔敕無誤出政事無錯行此朝廷之大體二也今天下一家海内萬里四方所凑輦下駢闐萬貨所歸京師富盛軍營馬監無不髙嚴佛寺道宫悉皆壮麗陛下又新西苑復廣御池池若漢之昆明囿若周之靈囿足以為陛下宴遊之所足以為聖朝宏大之規唯尚書省是前代所營公宇低隘南宫二十四司不在其間六尚書無本廳諸即官無廨宇至於九寺三監寄在内前廊下加以禮部無貢院試處非省垣每年試舉人權就武成王廟非太平職司之制度非清朝文物之規儀乞陛下俟西苑畢功御池罷役重新省寺用列職官此則朝廷之大體三也臣又每於行路之次見有羈錮之囚荷以鐵枷不覺自駭不知其人所犯何罪又不知其囚復是何人臣謹按刑統准獄官令枷杻各有短長鉗鍊各有輕重制度尺寸並有刑書未見以鐵為枷者也凡今州縣欲笞一小罪縶一輕囚必詳格文盡依典法奉國家所頒之律遵法寺所定之科以鐵為枷事出法外伏乞陛下釐革此法免傷皇風昔唐太宗因看明堂圖見人五臓皆系於背聖慈惻隠免人笞背況太平之時將刑措而不用至仁之主宜欽恤以居先此則朝廷之大體四也臣所言者要機乞陛下審而察之所舉者大體乞陛下採而用之真宗至道二年知揚州王禹偁論軍國大政䟽曰臣伏覩陛下即位赦書云所宜開諫諍之路㧞茂異之材又奉御史臺告報准詔命内外文武臣寮並許直言極諫此實陛下誕彰聖徳廣逹民情速致時雍追用古道之深㫖抑亦宗社無疆之休軍民莫大之幸也臣雖無聞諫則有素先皇帝時初拜右正言直史館即日進端拱箴一篇又上禦戎十事䝉先朝採納擢陞綸閣判大理寺時抗䟽論道安之罪執法雪徐鉉之寃貶官商山咎實因此尋復召用叨塵諫垣又上李繼遷便宜寢而不報俄忝内庭兼駮正亦嘗改更宣命封還敕書雖無報於朝廷盖粗申於職業伏遇陛下欽奉顧命惟懷永圖嗣位之初赦書既如彼聽政之後詔命又如此臣茍有所見隠而不言上負先帝用人之心下孤明主求諫之意也伏以聖朝享國四十餘年矣邊鄙未甚寜人心未甚泰求利不已設官太多今陛下治之惟新救之在速臣伏慮書生執言有奏於陛下以為三年無改於父之道可謂孝矣此不知古今異制家國殊途者也假如帝堯既殂帝舜在位堯時有八元未進四凶未除舜乃流放舉用善惡兩分未聞後之人曰堯不及于舜也舜不孝于堯也伏惟陛下遏老生之常談奮英主之獨斷則天下幸甚謹録軍國大政奏事五條儻稍動於聖心庶大開於言路其一曰謹邊防通盟好使輦運之民有所休息方今北有勍敵西有繼遷敵人雖不犯邊戍兵豈能減削繼遷既未歸命餽餉固難寢停關輔之民倒垂尤甚臣愚以為陛下即位之初當順人心宜敕疆吏致書敵臣使逹彼主請尋舊好下詔赦繼遷之罪復與夏臺臣頃在翰林見繼遷上表云乞取殘破夏州以奉拓㧞氏祭祀先帝雖有批荅只與鄜州節度縁繼遷本是反側之人豈肯束身歸國所以詔令不行今陛下嗣統大振皇威亦恐繼遷令人進奉因舉前事彼必感恩此亦不戰而屈人之師也如其不從則備禦誅擒皆有方略且使天下百姓知陛下屈己而為人也或曰富國强兵不可示人以弱此乃誇虚名而忽大計者也其二曰減冗兵併冗吏使山澤之饒稍流於下伏以乾徳開寳以來國家之事臣所目覩當時東未得浙江漳泉南未得荆湖交廣朝廷財賦可謂未豐然而擊江東備北境國用亦足兵威亦彊其義安在所蓄之兵銳而不衆所用之將專而不疑故也自後盡取東南數國又平河東土地財賦可謂廣矣而兵威不振國用轉急其義安在所蓄之兵冗而不盡銳所用之將衆而不自專故也今誠能簡銳卒去冗兵而委之以將帥用恩威法令以駕馭之資以天下財賦而曰兵不振用不豐未之有也臣愚以為陛下宜經制兵賦如開寳中則可以髙枕而治矣至于引唐虞比三代者皆為空言臣所不敢臣又見開寳中設官至少何以驗之臣本魯人占籍濟上未及第時常記只有刺史一人李謙溥是也司戸一員今司門員外即孫賁是也近及一年朝廷别不除吏當時未嘗闕事自後始有團練推官一員今樞宻直學士畢士安是也太平興國中臣及第歸鄉有刺史陳延山通判閻暐副使閻彦逺判官李廷推官柳宣兵馬監押沈繼明監酒稅等又増四員曹官之外更益司理問其租稅減于曩日也問其人民逃于昔時也一州既爾天下可知冗吏耗於上冗兵耗於下此所以盡取山澤之利而不能足也夫山澤之利與民共之自漢以來取為國用不可棄也然亦不可盡也今可謂盡矣何以知之只如茶法從古無稅唐元和中以用兵齊蔡宰相王涯始建稅茶之法唐史稱是嵗得錢四十萬緡東師以濟今則錢數百萬矣民何以堪臣故曰減冗兵併冗吏使山澤之饒稍流於下者也其三曰艱難選舉使入官不濫古者鄉舉里選為擇人士君子行修于家學推于衆然後薦用登之于朝故從政而政和臨民而民泰自三代渉两漢雖有㳂革未嘗有遠去此道者也隋唐以來始有科試得人之盛與古為侔然自唐初終太祖之世科舉未嘗不難矣每嵗進士不過三十人經學不過五十人重以周髙祖之後外諸侯不得奏辟士大夫罕有資䕃故有終身不獲一第沒齒不獲一官者先皇帝毓徳王藩覩其如此臨御之後不求備以取人捨短從長㧞十得五在位將逾二紀登第亦近萬人不無俊秀之才亦有容易而得如臣者容易中一人爾臣愚以為數百年之艱難故先帝濟之以泛取二十載之霈澤陛下宜糾之以舊章伏望以舉塲還有司如故事至于吏部銓擇官材亦非帝王躬親之事比來五品已下謂之㫖授官今則幕職州縣而已京官雖有選限多不施行太祖已來便殿引見用為常例以至先朝調選之徒多求僥倖或以哀鳴泣涕便獲超資或以㨗給山呼便陞京秩吏部官只若備員既無耻格之風漸多闒茸之吏臣愚以為宜以吏部還有司依格注擬其四曰沙汰僧尼使疲民無耗夫古者唯有四民治民者士也故受養於農工以造器用商以通貨財皆不可闕也而兵不在其數盖周井田之法農即兵也有事則戰無事則耕自秦以來以强兵定天下故戰士不復農業矣是四民之外又生一民而為五也所以農益困然而執干戈衛社稷理不可去也但使帝王之道不得與三代同風漢明之後佛法流入中國度人修寺歴代増加不蠶而衣不耕而食是五民之外又益一民而為六也故魏晉而下治道不及于兩漢有唐大儒韓愈諫憲宗迎佛骨表云昔黄帝在位百年年一百十嵗少昊在位八十年年二百嵗顓帝在位七十九年年九十八嵗帝嚳在位七十年年百五十嵗堯在位九十八年年百一十嵗舜禹皆夀百餘嵗當時未有佛也是知古聖人不事佛以求福古聖人必排佛以救民假使天下有僧萬人每日食米一升嵗用絹一疋是至儉也而月有三千斛之費嵗有一萬縑之耗何況五七萬軰哉而又富僧鉅髠窮極口腹一齋之食一襲之衣貧民百家未能供給此軰既不能治民又不能力戰不造器用不通貨財而髙堂邃宇豐衣飽食而已不曰民蠧而可得乎臣愚以為國家度人衆矣造寺多矣計其費耗何啻億萬先朝不豫捨施又多佛若有靈豈不䝉福事佛無效斷可知矣陛下深鑑前王精求理本亟宜沙汰以厚生民若以嗣位之初未欲驚駭此軰且可一二十載不令度人不許修寺使自銷缺漸而去之亦救弊之一端也其五曰親大臣遠小人使忠良謇諤之士知進而不疑姦憸傾巧之徒知退而有懼夫君為元首臣為股肱言同體也得其人則勿疑非其人則不用凡今天下言帝王之盛者豈不曰堯舜之道具在方册堯之時百姓不親五品不遜契作司徒敷五教蠻夷猾夏寇賊姦宄咎繇作士明五刑伯夷典禮后夔典樂禹平水土益作虞官大哉堯之為君可謂委任責成而無疑矣或曰誠如是堯有何功徳耶臣曰有知人任賢之徳爾雖然堯之道去世遼逺恐不可復臣以近事言之唯有唐之政可以損益而行焉臣讀元和賢相裴垍傳憲宗嘗命垍銓品庶官垍奏曰天子擇宰相宰相擇諸司長官諸司長官自擇僚属則上下不疑而政成矣以陛下之明擇宰相數人猶時有非其人者況臣之不佞擇數十人諸司長官常恐不逮若更令臣擇庶官恐非致治之要當時識者以垍為知言伏望陛下遠取帝堯近鑑唐室既得宰相用而不疑使宰相擇諸司長官自取寮属則垂衣而治矣所謂忠良謇諤之士知進者也臣又聞古者刑人不在君側語曰放鄭聲遠佞人又曰浸潤之譛膚受之愬不行焉可謂明也已矣是以周文王左右無可結襪者言皆賢也夫小人之徒巧言令色先意承㫖事必害正心惟忌賢非聖帝明王不能深察臣又按舊制南班三品尚書方得登殿三班奉職卑賤可知或因遣使亦得陞殿惑亂天聽䙝凟至尊無甚于此伏望陛下振舉紀綱尊嚴視聽在此時矣不可不思所謂姦憸傾巧之徒知退者也臣愚以為今日之所急在先議兵使衆寡得其宜措置得其道然後議吏使清濁殊塗品流不雜然後難選舉以塞其原禁僧尼以去其耗自然國用足而王道行矣今若不去冗兵併冗吏不難選舉不禁僧尼縱欲減人民之賦寛山澤之利其可得乎伏惟陛下承二聖之貽謀鑑千古之治道明比日月機先鬼神聖智所周不遺一物英斷所及出于百王而又三事大臣受遺輔政豈容即吏輙議國經盖以臣素被寵光常思報効有所貯蓄不敢緘藏臣又念詔書云言之而不用罪在朕躬求之而不言咎將誰執不勝大願所以輙進狂瞽上干冕旒伏惟陛下踐詔書之言則天下幸甚仁宗時歐陽修上奏曰臣近準詔書許臣上書言事臣學識愚淺不能廣引深遠以明治亂之原謹採當今急務條為三弊五事以應詔書所求伏惟陛下裁擇臣聞自古王者之治天下雖有憂勤之心而不知致治之要則心愈勞而事愈乖雖有納諫之明而無力行之果斷則言愈多而聽愈惑故為人君者以細務而責人專大事而獨斷此致治之要術也納一言而可用雖衆說不得以沮之此力行之果斷也知此二者則天下無難治矣伏見國家自大兵一動中外騷然陛下思社稷之安危念兵民之疲弊四五年來聖心憂勞可謂至矣然而兵日益老賊日益强併九州之力討一西戎小者尚無一人敢前今又北戎大者違盟而動其將何以禦之從來所患者夷狄今夷狄叛矣所惡者盜賊今盜賊起矣所憂者水旱今水旱作矣所賴者民力今民力困矣所須者財用今財用乏矣陛下之心日憂於一日天下之勢嵗危於一嵗此臣所謂用心雖勞不知求致治之要者也近年朝廷開發言路獻計之士不下數千然而事緒轉多枝梧不暇從前所採衆議紛紜至於臨事誰䇿可用此臣所謂聽言雖多不如力行之果斷者也伏思聖心所甚憂而當今所甚闕者不過曰無兵也無將也無財用也無禦戎之䇿也無可任之臣也此五者陛下憂其未有而臣謂今皆有之然陛下未得而用者未思其術也國家創業之初四方割據中國地狹兵民不多然尚能南取荆楚收偽唐定閩嶺西平兩蜀東下并潞北窺幽燕當時所用兵財將吏其數幾何惟善用之故不覺其少何況今日承百年祖宗之業盡有天下之富强人衆物盛十倍國初故臣敢言有兵有將有財用有禦戎之䇿有可任之臣然陛下皆不得而用者其故何哉由朝廷有三大弊故也何謂三弊一曰不慎號令二曰不明賞罰三曰不責功實此三弊因循於上則萬事弛慢廢壊於下臣聞號令者天子之威也賞罰者天子之權也若號令不信賞罰不當則天下不服故又須責臣下以功實然後號令不虚出賞罰不濫行是以慎號令明賞罰責功實此三者帝王之竒術也自古人君英雄如漢武帝聦明如唐太宗皆知用此三術而自執威權之柄故所求無不得所欲皆如意漢武好用兵則誅滅四夷立功萬里以快其心欲求將則有衛霍之材以供其指使欲得賢士則有公孫董汲之徒以稱其意唐太宗好用兵則誅突厥服遼東威振夷狄以逞其志欲求將則有李靖李勣之徒入其駕馭欲得賢士則有房杜之徒在其左右此二帝者可謂所求無不得所欲皆如意無他術也惟能自執威權之柄耳伏惟陛下以聖明之姿超越二帝又盡有漢唐之天下然而欲禦邊則常患無兵欲破賊則常患無將欲贍軍則常患無財用欲威服四夷則常患無䇿欲任賢使材則常患無人是所求皆不得所欲皆不如意其故無他由不用威權之術也自古帝王或為强臣所制或為小人所惑則威權不得出於己今朝無强臣之患旁無小人偏任之溺内外臣庶尊陛下如天愛陛下如父傾耳延首願陛下之所為然何所憚而不為乎若一日赫然執威權以臨之則萬事皆辦何患五者之無奈何為三弊之因循一事之不集臣請言三弊夫言多變則不信令頻改則難從今出令之初不加詳審行之未乆尋又更張以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之命則官吏或相謂曰且未要行不乆必須更改或曰備禮行下畧與應破指揮旦夕之間果然又變至於將吏更易道路疲於送迎符牒縱横上下莫能遵守中外臣庶或聞而歎息或聞而竊笑歎息者有憂天下之心竊笑者有輕朝廷之意號令如此欲威天下其可得乎此不慎號令之弊也用人之術不過賞罰然賞及無功則恩不足勸罰失有罪則威無所懼雖有人不可用矣太祖時王全斌破蜀而歸功不細矣犯法一貶十年不問是時方討江南故黜全斌與諸將立法太祖神武英斷所以能平定天下者其賞罰之法皆如此也昨關西用兵四五年矣大將以無功罷者依舊居官軍中見無功者不妨得好官則諸將誰肯立功矣裨將畏懦逗留者皆當斬罪或暫貶而尋遷或不貶而依舊軍中見有罪者不誅則諸將誰肯用命矣所謂賞不足勸威無所懼賞罰如此而欲用人其可得乎此不明賞罰之弊也自兵動以來處置之事不少然多有名而無實臣請畧言其一二則其他可知數年以來㸃兵不絶諸路之民半為兵矣其間老弱病患短小怯懦者不可勝數也新集之兵所在教習追呼上下民不安居主教者非將領之材所教者無旗鼓之節徃來州縣愁嘆嗷嗷既多是老病小怯之人又無訓齊精練之法此有教兵之虛名而無訓兵之實藝也諸路州軍分造器械工作之際已勞民力輦運般送又苦道塗然而鐵刄不剛筋膠不固長短大小多不中度造作之所但務充數而速了不計所用之不堪經厯官司又無檢責此有器械之虚名而無器械之實用也以草草之法教老怯之兵執鈍折不堪之器械百戰百敗理在不疑臨事而悮何可及乎故事無大小悉皆鹵莾則不責功實之弊也臣故曰三弊因循於上則萬事弛慢廢壊於下萬事不可盡言臣請言大者五事其一曰兵臣聞攻人以謀不以力用兵闘智不闘多前代用兵之人多者常敗少者常勝漢王尋等以百萬之兵遇光武九千人而敗是多者敗而少者勝也苻堅以百萬之兵遇東晉二三萬人而敗是多者敗而少者勝也曹操以三十萬青州兵大敗於吕布退而歸許復以二萬人破袁紹十四五萬是用兵多則敗少則勝之明騐也況於夷狄尤難以力争只可以計取李靖破突厥於定襄只用三千人其後破頡利於隂山亦不過一萬盖兵不在多能以計取爾故善用兵者以少為多不善用者雖多而愈少也為今計者添兵則耗國减兵則破賊今沿邊之兵不下七八十萬可謂多矣然訓練不精又有老弱虚數則十人不當一人是七八十萬之兵不當七八萬人之用加又軍無統制分散支離分多為寡兵法所忌此所謂不善用兵者雖多而愈少故常戰而常敗也臣願陛下赫然奮威勅勵諸將精加訓練去其老弱七八十萬中可得五十萬數古人用兵以一當百今既未能但得以一當十則五十萬精兵可當五百萬兵之用此所謂善用兵者以少而為多古人所以少而常勝者以此也今不思實效但務添多耗國耗民積以年嵗賊雖不至天下已困矣此一事也其二曰將臣又聞古語曰將相無種故或出於奴僕或出於軍卒或出於盜賊惟能不次而用之乃為名將耳國家求將之意雖勞選將之路太狹今詔近臣舉將而限以資品則英豪之士在下位者不可得矣試將材者限以弓馬一夫之勇則智畧萬人之敵皆遺之矣山林竒傑之士召而至者以其貧賤而薄之不過與一主簿借職使其怏怏而去則古之屠釣飯牛之傑皆激怒而失之矣至於無人可用則寜用龍鍾跛躄庸懦暗劣之徒皆授之兵柄天下三尺童子皆為朝廷危之前日澶淵之卒幾為國家生事此可見也議者不知取將之無術但云當今之無將臣願陛下革去舊弊奮然精求有賢豪之士不須限以下位有智畧之人不必試以弓馬有山林之傑不可薄其貧賤惟陛下能以非常之禮待人人臣亦將以非常之効報國此二事也其三曰財用臣又聞善治病者必醫其受病之處善救弊者必尋其起弊之源今天下財用困乏其弊安在起於用兵而費大故也漢武好窮兵用盡累世之財當時勒兵單于臺不過十八萬尚能困其國力未若今日七八十萬連四五年而不罷所以罄天地之所生竭萬民之膏血而用不足也今雖有智者物不能増而計無所出矣惟有減冗卒之虚費練精兵而速戰功成兵罷自然足矣今兵有可減之理無人敢當其事賊有速擊之便無將敢奮其勇後時敗事徒耗國而耗民此三事也其四曰禦戎之䇿臣又聞兵法曰上兵伐謀其次伐交北人與朝廷通好僅四十年不敢妄動今一旦發其狂謀者其意何在盖見中國頻為元昊所敗故敢啓其貪心伺隙而動爾今若勅勵諸將選兵秣馬疾入西界但能痛敗昊賊一陣則吾軍大振而敵計沮矣此所謂上兵伐謀者也今詗事者皆知北人與西戎通謀欲併二國之力窺我河北陜西今若我能先擊敗其一國則敵勢減半不能獨舉此兵法所謂伐交者也元昊地狹賊兵不多向來攻我傳聞北人常有助兵今若敵人自有㸃集之謀而元昊驟然被擊必求助於北人北人分兵助昊則可牽其南寇之力若不助昊則二國有隙自相疑貳此亦伐交之䇿也假令二國剋期分路來寇我能先期大舉則元昊倉皇自救不暇豈能與北人相為表裏是破其素定之約乖其剋日之期此兵法所謂親而離之者亦伐交之䇿也元昊叛逆以來幸而屢勝常有輕視諸將之心今又見朝廷北憂勍敵方經營於河朔必謂我師不能西出今乗其驕怠正是疾驅急擊之時此兵法所謂出其不意者此取勝之上䇿也前年西將有請出攻者當時賊氣力方盛我兵未練朝廷尚許其出師況今元昊有可攻之勢此不可失之時彼方幸吾憂河北而不虞我能西征出其不意此可攻之勢也自四路分帥今已半年訓練恩信兵已可用故近日屢奏小㨗是我師漸振賊氣漸衂此可攻之勢也茍失其時而使二敵先來則吾無䇿矣臣願陛下詔執事之臣熟議而行之此四事也其五曰可任之臣臣又聞仲尼曰十室之邑必有忠信況今文武列職徧於天下其間豈無材智之臣而陛下緫治萬機之大既不暇盡識其人故不能躬自進賢而退不肖審官吏部三班之職但掌文簿差除而已又不敢越次進賢而退不肖是上自天子下至有司無一人得進賢而退不肖者所以賢愚混雜僥倖相容三載一遷更無旌别平居無事惟患太多而差遣不行一旦臨事要人常患乏人使用自古任官之法無如今日之繆也今議者或謂舉主轉官為進賢犯罪黜責為退不肖此不知其弊之深也大凡善惡之人各以𩔖聚故守亷慎者各舉清幹之人有贓汙者各舉貪濁之人好徇私者各舉請求之人性庸暗者各舉不才之人朝廷不問是非但見舉主數足便與改官則清幹者進矣貪濁者亦進矣請求者亦進矣不才者亦進矣混淆如此便可為進賢之法乎方今黜責官吏豈有澄清糾舉之術哉惟犯贓之人因民論訴者乃能黜之耳夫能舞弄文法而求財賄者亦彊黠之吏政事必由己出故雖誅剥豪民尚或不及貧弱至於不材之人不能主事衆胥羣吏共為姦欺則民無貧富一時受弊以此而言則贓吏與不材之人為害等耳今贓吏因自敗者乃加黜責十不去其一二至於不材之人上下共知而不問寛緩容姦其弊如此便可為退不肖之法乎賢不肖既無别則宜乎設官雖多而無人可用也臣願陛下明賞罰貴功實則材皆列於陛下之前矣臣故曰五者皆有然陛下不得而用者為有弊也三弊五事臣既已詳言之矣惟陛下擇之天下之務不過此也方今天文變於上地理逆於下人心怨於内四夷攻於外事勢如此矣非是陛下遲疑寛緩之時惟願為社稷生民留意寳元元年天章閣待制龐籍論先正内而後正外䟽曰臣伏自元昊背恩僭竊兇謀已露陛下憂恤邊事博採羣議選將遣師動挂宸慮復聞減息宴樂專精思慮此乃宗廟之福天下之幸也陛下憂勞不已則羌戎小醜不足平也誠不可輕之易之耳當平静無事之時言事之臣尚賴陛下戒謹修省況逆虜已畔兵戎方興此臣下尤當竭謀慮忘忌諱之秋也況臣孤蹇之跡上賴陛下明照奨擢獲升近侍恨無才略仰報大恩茍有管穴之見敢不陳露夫欲建事功者在先正其内而後制其外也先正其内者在陛下專意而力行之臣願陛下執恭儉嚴紀綱也荀子曰恭儉者備五兵又曰彊本而節用則天下不能貧故當今之急無先於恭儉也陛下試令有司計財賦之入必曰耗於先朝之時也計費用之數必曰廣於先朝之時也財賦日耗而費用日廣則安能使府庫豐積兵備足用也故願陛下節之又節以備用兵之乏應不急之務一皆止息專以備邊為念則功可立矣至於綱紀者其要在賞罰恩賞貴乎審當法令貴乎齊一伏見近年恩及僥倖而典憲稍縱夫賞所以勸功也僥倖無功之人坐獲殊寵後有臨敵効命立勲行陣者將何賞以足其望乎願陛下愛惜爵禄無及僥倖以待立功之臣申嚴憲法無使縱弛以威不恪之臣此又最切務也茍國富兵强綱紀嚴肅則四夷畏服之不暇又何僭亂之敢為實在陛下正之於上大臣持之於下則誰敢不從矣所謂後制其外者方今邊要與元昊接境者廣矣昨遣二帥臣以分制之固當以防備為急若不得其要則費廣而功未可期自元昊僭逆以來調發兵馬已衆多矣輦運器物紛紜道路諸所營繕率及民力兵戍既集芻粮所費不知幾倍於常時矣兵乆不散支用無極臣恐羌戎未至而公私先困矣安知非黠羌狡謀而困我哉前代時及平定則休兵罷戍養民審備以防不虞故事至而其用有餘國家自和戎之後邊戍未嘗休息支用未嘗減節一日兵興則其力易困夫兵冗而不精雖衆不可用也竊聞所發之兵皆不選練而遣之疲弱預行者亦多此徒有其數而可用者殊少臣謂兵卒壮勇者一可勝疲弱者五況餽運邊儲常為艱苦此尤宜重惜也欲望令漕運之臣與邊將選擇壮勇可用者留之於邊疲弱者或令還本營或置於近内多粮之地則邊郡兵精而費少矣晁錯有言曰器械不利以其卒予敵也卒不可用以其將予敵也是知兵戰者利器械訓士卒最先急也臣聞在京造兵甲之所近年以來多不擇監掌之官率皆勢要之人為之以自便其私也亦聞向來所造器甲多不精堅欲望朝廷擇勤幹之官諳知製作兵甲利鈍巧拙者令監轄工匠精心製造必令精堅可用仍加覆驗明示賞罰則兵甲堅利矣其外方造作兵甲亦乞嚴戒國家休兵乆士卒漸惰加之都將威輕軍衆難制若一旦臨敵深可豫憂欲望宻詔二帥臣令經畫訓練之法統馭之術使將校知感愛之道士卒有禀畏之意然後時加訓告各使知主恩而勵臣節則臨事可用而功可期也右正言直集賢院吳育論建立基本以銷未萌之患䟽曰臣竊謂朝廷緫制天下必建立基本以銷患於未萌若政令修綱紀肅財用富恩信洽賞罰明士卒精將帥練則四夷望風自無異志一有未備則黠虜乗間而生心方今天下少安人情玩習而多務因循居常有議及政令綱紀邊防機要則謂之生事或有警急則必至怱遽而莫知所為若稍且安静又無人敢輙言且夏州乆有人徃來中國熟見朝廷因循之勢遂敢内蓄姦謀若以一時之事茍且支持或至爛額救焚揚湯止沸覆視前古厥鑑甚明伏望陛下從容延對左右大臣討論闕政博訪羣議修節用愛民之經求訓兵練將之䇿則一方小警不足慮也慶厯三年尚書禮部即中知制誥宋祁上䟽曰臣聞病者療之於未危火者防之於未燃若已危已燃雖有嘉醫力士猶不能振殂爛之苦是以思患豫防所趣一焉臣伏見河北河東陜西比年騷困契丹怙恃犬羊規掠塞下求索賂遺辭悖意驕陛下以天下為心屈己忍忿與之通好以紆倉卒之急是以河朔生靈晏然暫寕此陛下權時之宜也夏賊逆命驅率雜種襲金明殘麟府破任福敗壊多殺吏卒數十萬轉食屯兵于今五年士氣䘮沮每聞金鼓之音皆股戰膽銷有百走退生之心無一前闘死之志部署鈐轄位均勢侔不相統一賞濫而不實罰弛而不行上下相䝉徼一切之幸臣計二陲之憂比病與火可謂將危而且燃也中外有識無不寒心臣愚以謂不速興而救之事一差跌悔無及已伏見中書門下樞宻院日入奏事遵奉常體但以官吏差遣使臣遷轉比例髙下計較錙銖下至百司冗屑申請無不關白聖聦及宣勅行下一署曰聖㫖至於邊境措置安危大計反不暇及之臣愚無知竊以為過矣不當行而行是為徒行當憂而不憂是為必憂今耶律君臣包禍就毒放馬隂山之下待隙而動彼其旋玩河朔如股掌之上責貨不已又將責地禍根釁萌章章如此朝廷忽而不防未知何謂邪方今河北河東不澄濫官不閲冗兵帥之才不才未嘗擇械之可用不可用未嘗選自戎使繼至便為信誓可慿謀臣髙枕了不為備可謂發篋啓笥以待寇攘今陛下盛徳清明大臣方正叶力獻可弼違朝無間言不於此時側席嘗膽思所以禦之之術急除弊政圖刷大耻乃欲優游自暇日安一日待病之危待火之燃救不晚乎夫碎目雜務非宰司職事假令此等一皆不問委之有司尚無繫於治亂若二敵挺變更相影嘯一出於北一擾於西國疲於轉輸一夫餓豎興為盜賊慿髙呼叫環數百里則天下安危決於一日之間推是而言臣所謂不當行而行當憂而不憂果何信也劉平石元孫輕脫寡謀徑與賊闘師敗身死損辱國威今之為帥不鑒前失尚守舊體終無改更其出師也無鼓旗無鼓旗則號令不行矣其戰也無行陣無行陣則敗走不救矣其止無營塹自守其行無輜重自隨烽候不明間諜不設不量人事不察地形將不撫士士不識將遷代紛紛未始暫寜而有司據例换移習不為怪是以賊小入則小勝大入則大勝亦未嘗聞朝廷求所以敗所以勝之由彼所長我所短之要何者有勇何者有謀而可以相輔若何則守若何則戰而授之成筭兵若乆而不解何䇿以支食若有時而乏何術以濟今陛下未以為念大臣未以為言天下安危誰任其責臣聞見隘陋不足與權大事竊謂當今之急者有七一曰講軍陣二曰廣牧馬三曰精器械四曰力耕桑五曰擇官人六曰重賊法七曰籍游冗臣既愚昧知其大而不得其詳又不敢掩衆謀申獨見伏願陛下試以閑日詔一二近臣出此七事令共力探討使引古驗今執處其要陛下與大臣擇而行之既行又執而不遷浮議撼揠皆且勿聽然須近者三年有成遠者五七年十數年而成功陛下安心緩慮緫其衘勒夫治國若種樹非謂朝種而暮可庇也假以日月則根柢深固坐獲茂隂昔孟明再敗秦師歸修國政晉避其徳遂覇西戎今若力農繕兵日夜申儆張吾百度振吾六師其居有備其行有法彼二敵聞之必且狡謀潰於狄胷隂計爛於羌脇矣臣又願陛下詔中書樞宻院自今以徃取百司申請不干大事者許依唐時堂帖之比直令堂判院付之有司雜務已有定例便行不奏其可以蠲除歸有司者定為永制俾之奉行若其大事非臣下可得專者然後奏請自然綱提領攝事亦希簡使大臣得專邊境盡慮金革矣諸路部署以下出兵之日臣願依軍法以一階一級交相統制令一則易行官專則有威無令貴臣監軍牽制其内將之與士既相習熟則不可數為替改使得恩結其心威統其違緩急與之生死乃可為用此其畧也昔楚荘王區區之諸侯据卑溼之地無日不討軍實而數之其戒於國中曰人生之不易禍至之無日用能服鄭宋抗强晉威震中原況陛下擁四海之富攬天下俊人與之圖事邪然時哉時哉不可緩已臣愚戇不識禁忌惟陛下哀憐省納四年知諫院余靖上奏曰臣竊聞大臣建議内有修京城置府兵二事者伏以廟堂謀議天下具瞻帝王言動萬世為法安危所繫舉措非輕事之幾微不可不謹難與慮始人之常情臣願陛下深思遠圖以安民為本臣請縷陳一事望陛下擇其可否臣聞西賊僭號之初宋庠請修函谷此時關中動揺謂朝廷弃關西而自守今無故而修京城乃是捨天下之大而為嬰城自守之計四方聞之豈不動揺强弱之勢正在此矣無戎而城春秋所譏守在四夷義不如此又前嵗以邊鄙之警而河北諸路揀㸃鄉兵之利未集而先致其害也況今北方之賂既厚西戎之好既講雖知信誓不可卒保嗷嗷蒼生咸望帖泰而都畿之下先自擾之根本不寜四方何望哉昔魏侯恃險呉起以為失詞宣王料民山甫譚其害政惟是二者皆古今之所重而安危之所起乞陛下捨此二䇿别議遠圖之術嘉祐間蘇洵上審勢䇿曰治天下者定所尚所尚一定至於千萬年而不變使民之耳目純於一而子孫有所守易以為治故三代聖人其後世遠者至七八百年夫豈惟其民之不忘其功以至於是盖其子子孫孫得其祖宗之法而為據依可以永乆夏之尚忠商之尚質周之尚文視天下之所宜尚而固執之以此而始以此而終不朝文而暮質以自潰亂故聖人者出必先定一代之所尚周之世盖有周公為之制禮而天下遂尚文後世有賈誼者說漢文帝亦欲先定制度而其說不果用今者天下幸方治安子孫萬世帝王之計不可不預定於此時然萬世帝王之家常先定所尚使其子孫可以安坐而守舊至於政弊然後變其小節而其大體卒不可革易故享世長遠而民不茍簡今也考之於朝野之間以觀國家之所尚者而愚猶有惑也何則天下之勢有强弱聖人審其勢而應之以權勢强矣强甚而不已則折勢弱矣弱甚而不已則屈聖人權之而使其甚不至於折與屈者威與恵也夫强甚者威竭而不振弱甚者恵䙝而下不以為徳故處弱者利用威而處强者利用恵乗强之威以行恵則恵尊乗弱之恵以養威則威發而天下震慄故威與恵者所以裁節天下强弱之勢也然而不知强弱之勢者有殺人之威而下不懼有生人之恵而下不喜何者威竭而恵䙝故也故有天下者必先審知天下之勢而後可與言用威恵不先審知其勢而徒曰我能用威我能用恵者末也故有强而益之以威弱而益之以恵以至於折與屈者是可悼也譬之人身將欲飲藥餌石以養其生必先審觀其性之為隂其性之為陽而投之以藥石藥石之陽而投之隂藥石之隂而投之陽故隂不至於涸而陽不至於亢茍不能先審觀己之為隂與己之為陽而以隂攻隂以陽攻陽則隂者固死於隂而陽者固死於陽不可救也是以善養身者先審其隂陽而善制天下者先審其强弱以為之謀昔者周有天下諸侯大盛當其盛時大者已有地五百里而畿内反不過千里其勢為弱秦有天下散為郡縣聚為京師守令無大權柄伸縮進退無不在我其勢為强然方其成康在上諸侯無小大莫不臣服勢之弱未見於外及其後世失徳而諸侯禽奔獸遁各固其國以相侵攘而其上之人卒不悟區區守姑息之道而望其能以制服强國是謂以弱政濟弱勢故周之天下卒斃於弱秦自孝公其勢固已駸駸焉日趨於强大及其子孫已并天下而亦不悟專任法制以斬撻平民是謂以强政濟强勢故秦之天下卒斃於强周拘於恵而不知權秦勇於威而不知本二者皆不審天下之勢也吾宋制治有縣令有郡守有轉運使以大系小絲牽繩聮緫合於上雖其地在萬里外方數千里擁兵百萬而天子一呼於殿陛間三尺豎子馳傳捧詔召而歸之京師則解印趨走唯恐不及如此之勢秦之所恃以强之勢也勢强矣然天下之病常病於弱噫有可强之勢如秦而反䧟於弱者何也習於恵而怯於威也恵太甚而威不勝也夫其所以習於恵而恵太甚者賞數而加於無功也怯於威而威不勝者刑弛而兵不振也由賞與刑與兵之不得其道是以有弱之實著於外焉何謂弱之實曰官吏曠惰職廢不舉而敗官之罰不加嚴也多贖數赦不問有罪而典刑之禁不能行也冗兵驕狂負力幸賞而維持姑息之恩不敢節也將帥覆軍匹馬不返而敗軍之責不加重也逺裔强盛陵壓中國而邀金繒增幣帛之耻不為怒也若此𩔖者大弱之實也乆而不治又將有大於此而遂寖微寝消釋然而潰以至於不可救止者乗之矣然愚以弱在於政不在於勢是謂以弱政敗强勢今一輿薪之火衆人之所憚而不敢犯也舉而投之河則何熱之能為是以負强秦之勢而溺於弱周之弊而天下不知其强焉者以此也雖然政之弱非若勢弱之難治也借如弱周之勢必變易其諸侯而後强可能也天下之諸侯固未易變易此又非一日之故也若夫弱政則用威而已矣可以朝改而夕定也夫齊古之强國也而威王又齊之賢王也當其即位委政不治諸侯並侵而人不知其國之為强國也一旦發怒裂萬家封即墨大夫召烹阿大夫與常譽阿大夫者而發兵擊趙魏趙魏盡走請和而齊國人人震懼不敢飾非者彼誠知其政之弱而能用其威以濟其弱也況今以天子之尊藉郡縣之勢言脫於口而響應其所以用威之資固已完具且有天下者患不為焉有欲為焉無不可者今誠能一留意焉於用威一賞罰一號令一舉動無不一切出於威嚴用刑法而不赦有罪力行果斷而不牽衆人之是非用不測之刑用不測之賞而使天下之人視之如風雨雷電遽然而至截然而下不知其所從發而不可逃遁朝廷如此然後平民益務檢慎而姦民猾吏亦常恐恐然懼刑法之及其身而斂其手足不敢輙犯法此之謂强政政强矣為之數年而天下之勢可以復强臣故曰乗弱之恵以養威則威發而天下震慄然則以當今之勢求所以萬世為帝王而其大體卒不可革易者其尚威而已矣或曰當今之勢事誠無便於尚威者然熟知夫萬世之間其政之不變而必曰威耶愚應之曰威者君之所恃以為君也一日而無威是無君也乆而政弊變其小節而參之以恵使不至若秦之甚可也舉而棄之過矣或者又曰王者任徳不任刑任刑則覇者之事非所宜言此又非所謂知理者也夫湯武皆王也桓文皆覇也武王乗紂之暴出民於炮烙斬刖之地茍又遂多殺人多刑人以為治則民之心去矣故其治一出於禮義彼湯則不然桀之徳固無以異紂然其刑不若紂暴之甚也而天下之民化其風淫惰不事法度書曰有衆率怠弗恊而又諸侯昆吾氏首為亂於是誅鋤其强梗怠惰不法之人以定紛亂故記曰商人先罰而後賞至於桓文之事則又非皆任刑也桓公用管仲管仲之書好言刑故桓公之治常任刑文公長者其佐狐趙先魏皆不說以刑法其治亦未嘗以刑為本而號亦為覇而謂湯非王而文非覇也得乎故用刑不必覇而用徳不必王各觀其勢之何所宜用而已然則今之勢何為不可用刑用刑何為不曰王道彼不先審天下之勢而欲應天下之務難矣叅知政事范仲淹等荅手詔五事䟽曰臣等各䝉奬用待罪二府不能燮理彌縫致化天下過煩聖慮特降徳音上以宗廟為憂下以生靈為念臣等不任慙恐戰汗死罪詔㫖謂合用何人鎮彼西方臣等思之今元昊遣人到闕名體稍順其如戎人難信止可權宜如翻覆未寜則當擇節制之帥若和好且合亦須藉鎮撫之才經度邊陲以防來患見選人具名聞奏次詔㫖謂民之困弊財賦未强臣等議之國家革五代諸侯之暴奪其威權以度支財用自贍天下之兵嵗月既深賦斂日重邊事一聳調率百端民力愈窮農功愈削水旱無備稅賦不登減放之數動踰百萬今方選舉良吏務本安民修水旱之防收天地之利而更嚴著勉農之令使天下官吏專於勸課百姓勤於稼穡數年之間大利可見又山海之貨本無窮竭但國家輕變其法深取於人商賈不通財用自困今須朝廷集議從長改革使天下之財通濟無滯又減省冗兵量入以出則富强之期庶有望矣詔㫖謂軍馬尚多何得精當近韓琦范仲淹所上備邊文字内有河北五大事陜西七事精擇兵馬及攻守之䇿已在其中臣等見商量施行次詔㫖謂將臣不和如何處制樞宻院先因許懐徳張亢不恊曾指揮戒勵然將佐之中性情不𩔖愛惡相攻全在主帥别白撫遏隨才任用使各得其所則怨惡不生故長帥之才不敢輕易選用詔㫖謂躁進之徒宜塞奔競臣等謂躁進懷貪之人何代無之由朝廷辨明而進退之如責人實效旌人静節貪冐者廢之趨附者抑之如此則多士知勸各生亷讓之心矣張方平論藩鎮䟽曰臣聞議者曰唐失御於藩帥至於一道百城跨制千里列郡長吏出其所署戮二千石而不請專地繼世僅如戰國自安史起釁河北非王土徳順姑息河南皆寇壤章武勤勞夙夜㧞材練謀極力十年粗夷險阻懿僖之後寖微益削朱氏兼領十鎮遂行窺逼而受終矣五代圯壊顛危相逐皆由强諸侯擁重兵而奪取焉及我太祖之受命也天謀神機風雷變動創更前弊講見長䇿於是不愛乎節鉞多命乎帥臣權分而勢自輕外與而内實取于後諸侯入覲漸留不遣方靣都府牧伯之位更除士大夫而僚吏掾佐悉天官選補塞覬望之蹊隧覆姧亂之巢穴故四聖累盛六紀于茲寰海乂寜不震不擾門無關鍵豈煩擊柝之虞蓄無扃鐍安容胠篋之變可謂藏身之固置器於安規摹之深遠也乎臣聞而論之曰唐自天寳之亂天下剖裂至我朝太平興國擒劉繼元静并汾而天下始大一統生民離鋒鏑之禍伏惟祖宗之大功盛徳無與較焉然三王之善制不能無敝百世之長軌難以遐御故自古無亂國而有亂君有治人而無治法利害倚伏勢數之常幽厲享文武之國桓靈繼髙光之法棄彛敗典昵邪遠正周漢宫廟鞠成蓁藪夫歴世始王創基垂裕莫不鑒前之敗深思經乆其為秦謀者盖見三代之亡皆由諸侯於是有廢五等之畫為漢計者盖見秦無盤維之固孤而易危於是有郡國雜建之䇿魏晉之議者盖見陳項之事黄巾之擾乗州邑之無備遂潰漫而不制於是有都督持節之命皆所以誡覆轍遏亂略堅鑿契以抵敧壞平衡石而均重輕然其負舟而趨遷鼎奄有者則又不常在承藉世家撫宅疆宇者矣故閭左戍卒攘臂以亡秦族泗水亭長提劒而啓漢祚光武以書生起宛曹公以孝亷去譙司馬氏無淩儉之衆宋髙祖乏敦温之勢歡泰出偏裨之微隋文因戚里之重及其乗隙定業勢歸事濟備物九錫建國立臺比夫西伯以二分而事紂小白奉四履以勤王體迹殊矣是故鞅斯罷侯置守之算徒見其輻轂運動之勢誼錯强榦弱枝之論盖昧於皮毛附麗之本至於天乙之後王室數衰每及賢王九琛復會周厲之削宣王中興秦天下一家二世遽滅惡在乎郡縣而安也且唐之受厯幾三百年内難四興外寇三作大帝孝和禍稔帷薄憲宗昭愍毒由宫臣其范陽之亂奉天之逼雖安泚為之戎首而甫把實其禍胎恭恵不君紀律虧替私昵執鈞衡之柄閽寺專帷幄之謀於是患結安南兵連徐土發卭蜀之役搆雲代之釁恭定繼立王綱已觧半天之下巢讓之所塗炭自陜以東權儒之所踐食禁旅為蒲人所殱邠帥以襄王僭命原其禍孽都由令孜是故唐之傾危不自藩鎮皆自蕭墻之内也向使明皇勤恤無怠開元之初神武勵精常若建中之始懿皇紹構克守大中之政則范陽涇師乗何釁而犯順嶺表彭門因何隙而嘯聚譬之瘣木蠧由中生譬之累棊勢從上墜故知治亂本乎法度興亡繫乎時君御得諸道遠可以賓絶俗撫乖乎方近不能保宫室彼方州者關柅動静臂指伸縮制不在外而在中矣且夫我太祖之以睿武拯天下則有經綸恢定之略駕馭威懷之術我太宗之以英文繼大業則有緝熈撫寜之道裁節畫一之制我真宗之以至仁纉丕圖則有寛沖恭睦之徳持盈保成之方維其撥亂守文理政小異然皆主威獨運國命自制政不容於姑息恩不假於近習此所以髙拱南靣子孫無疆之法也主上爍震耀之精體乾剛之徳攬威福二柄以照臨四表專制無牽忍之愛采㧞罔卑遠之隔廣謀以明聽受獨斷而絶浸潤此其上所以建皇極下所以綏天下者彼郡縣之制茍曰不虞豈朝廷之所恃者乎謹論厯代名臣奏議卷八十一
