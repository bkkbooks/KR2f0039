body:
  text: 歷代名臣奏議卷二百七十八明楊士奇等撰律厯東漢和帝永元十四年待詔大史霍融上言曰官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏厯密詔書下太常令史官與融以儀校天課度逺近太史令舒承梵等對案官所施漏法令甲第六常符漏品孝宣皇帝三年十二月乙酉下建武十年二月壬午詔書施行漏刻以日長短為數率日南北二度四分而增減一刻一氣俱十五日日去極各有多少今官漏率九日移一刻不隨日進退夏厯漏隨日南北為長短密近於官漏分明可施行安帝延光二年中謁者亶誦上言曰當用甲寅元河南梁豐言當復用太初尚書郎張衡周興皆能厯數難誦豐或不對或言失誤衡興參案儀注者考往較今以為九道法最密詔書下公卿詳議大尉愷等上侍中施延等議太初過天日一度弦望失正月以晦見西方食不與天相應元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖䜟可施行博士黃廣大行令任僉議如九道河南尹祉太子舍人李泓等四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四嵗推閏月六直其日或朔晦弦望二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏逺元和變厯以應保乾圖三百嵗斗厯改憲之文四分厯本起圖䜟最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏諸從太初者皆無效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分灾異卒甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在嵗後不稽先代違於帝典太宗遵修三階以平黃龍以至刑犴以錯五者以備哀平之際同承太初而妖孽纍仍痾禍非一議者不以成數相參考真求實而泛采妄說歸福太初致咎四分太初厯衆賢所立是非已定永平不審復革其弦望四分有謬不可施行元和鳳鳥不當應厯而翔集逺嘉前造則喪其休近譏後改則隱其福陋見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及劉向子歆欲以合春秋橫斷年數損夏益周考之表紀差謬數百兩厯相課六千一百五十六嵗而太初多一日冬至日直斗而云在牽牛迂闊不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多遺失皆未可取正昔仲尼順假馬之名以崇君之義況天之厯數不可任疑從虛以非易是上納其言遂改厯事順帝漢安二年尚書侍郎邊韶上言曰世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治厯鄧平等更建太初改元易朔行夏之正乾鑿度八十分之四十三為日法設清臺之候驗六異課效粗密太初為最其後劉歆研幾極深驗之春秋參以易道以河圖帝覽嬉雒書甄曜度推廣九道百七十一嵗進退六十三分百四十四嵗一超次與天相應少有闕謬從太初至永平十一年百七十嵗進退餘分六十三治厯者不知處之推得十二度弦望不效挾廢術者得竄其說至永和二年小終之數寖過餘分稍增月不用晦朔而光見孝章皇帝以保乾圖三百年斗厯改憲既用四分以太白復樞甲子為癸亥引天從算耦之目前更以庚申為元既無明文托之於獲麟之嵗又不與感精符單閼之嵗同史官相代因成習疑少能鈎深致逺案弦望足以知之詔書下三公百官雜議太史令虞恭治厯宗欣等議建厯之本必先立元元正然後定日法法定然後度周天以定分至三者有程則厯可成也四分厯仲紀之元起於孝文皇帝後元三年嵗在庚辰上四十五嵗嵗在乙未則漢興元年也又上二百七十五嵗嵗在庚申則孔子獲麟二百七十六萬嵗尋之上行復得庚申嵗嵗相承承下尋上其執不誤此四分厯元明文圖䜟所著也太初元年嵗在丁丑上極其元當在庚戌而曰丙子言百四十四嵗超一辰凡九百九十三超嵗有空行八十二周有奇乃得丙子案嵗所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一匝名曰嵗嵗從一辰日不得空周天則嵗無由起辰案百七十嵗二蔀一章小餘六十三自然之數也夫數出於抄曶以成毫釐毫釐積纍以成分寸兩儀既定日月始離初行生分積分成度日行一度一嵗而周故為術者各生度法或以九百四十或以八十一法有細粗以生兩科其歸一也日法者日之所行分也日垂令明行有常莭日法所該通逺無已損益毫釐差以千里自此言之數無緣得有虧棄之意也今欲飾平之失斷法垂分恐傷大道以步日月行度終數不同四章更不得朔餘一雖言九道去課進退恐不足以補其闕且課厯之法晦朔變弦以月食天驗昭著莫大焉今以去六十三分之法為歷驗章和元年以來日變二十事月食二十八事與四分厯更失定課相除四分尚得多而又便近孝章皇帝厯度審正圖儀晷漏與天相應不可復尚文曜鈎曰髙辛受命重黎說文唐堯即位羲和立禪夏后制德昆吾列神成周改號萇𢎞分官運斗樞曰常占有經世史所明洪範五紀論曰民間亦有黃帝諸厯不如史官紀之明也自古及今聖帝明王莫不取言於羲和常占之官定精微於晷儀正衆疑於祕藏中書改行四分之原及光武皇帝數下詔書草創其端孝明皇帝課校其實孝章皇帝宣行其法君更三聖年厯數十信而徴之舉而行之其元則上統開闢其數則復古四分宜如甲寅詔書故事奏可靈帝熹平四年五官郎中馮光沛相上計掾陳晃上言厯元不正故妖民叛寇益州盜賊相續為厯周甲寅為元而用庚申圖緯無以庚為元者近秦所用代周之元太史治厯郎中郭香劉固意造妄說乞與本庚申元經緯有明受虛欺重誅乙卯詔書下三府與儒林明道者詳議務得道真以羣臣㑹司徒府議議郎蔡雍議以為厯數精微去聖久逺得失更迭術術無常是以承秦厯用顓頊元用乙卯百有二嵗孝武皇帝始改正朔厯用太初元用丁丑行之百八十九嵗孝章皇帝改從四分元用庚申今光晃各以庚申為非甲寅為是案厯法黃帝顓頊夏殷周魯凡六家各自有元光晃所據則殷厯元也他元雖不明於圖䜟各家術皆當有效於其當時黃帝始用太初丁丑之元有六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢厯雜候清臺課在下第卒以疏闊連見劾奏太初效驗無所漏失是則雖非圖䜟之元而有效於前者也及用四分以來考之行度密於太初是又新元效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命厯序甲寅元公卿百寮參議正處竟不施行且三光之行遲速進退不必若一術家以算追而求之取合於當時而已故有古今之術今之不能上通於古亦猶古術之不能下通於今也元命苞乾鑿度皆以為開闢至獲麟二百七十六萬嵗及命厯序積獲麟至漢起庚子蔀之二十三嵗竟己酉戊子及丁卯蔀六十九嵗合為二百七十五嵗漢元年嵗在乙未上至獲麟則嵗在庚申推此以上上極開闢則不在庚申䜟雖無文其數見存而光晃以為開闢至獲麟二百七十五萬九千八百八十六嵗獲麟至漢百六十二嵗轉差少一百十四嵗云當滿足則上違乾鑿度元命苞中使獲麟不得在哀公十四年下不及命厯序獲麟漢相去四蔀年數與奏記譜注不相應當今厯正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒欵識可與衆共别者須以弦望晦朔光魄虧滿可得而見者考其符驗而光晃厯以考靈曜二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖䜟所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已忤用望平和蓋亦逺矣今改行四分以遵於堯以順孔聖奉天之文是始用四分厯庚申元之詔也深引河雒圖䜟以為符驗非史官私意獨所興構而光晃以為固意造妄說違反經文謬之甚者昔堯命羲和厯象日月星辰舜協時月正日湯武革命治厯明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏寇賊姦宄而光晃以為隂陽不和姦臣盜賊皆元之咎誠非其理元和二年乃用庚申至今九十二嵗而光晃言秦所用代周之元不知從秦來漢三易元不常庚申光晃區區信用所學亦妄虛無造欺語之愆至於改朔易元往者壽王之術已課不效亶誦之議不用元和詔書文備義著非羣臣議者所能變易太尉耽司徒隗司空訓以雍議劾光晃不敬正鬼薪法詔書勿治靈帝時議郎蔡雍於朔方上書曰論天體者三家宣夜之學絶無師法周髀術數具存考驗天狀多所違失惟渾天僅得其情今史官所用候臺銅儀則其法也立八尺圓體而具天地之形以正黃道占察發斂以行日月以步五緯精微深妙百世不易之道也官有器而無本書前志亦闕而不論本欲寢伏儀下思惟微意按度成數以著篇章罪惡無狀投畀有北灰滅雨絶勢路無由宜問羣臣下及巖穴知渾天之意者使述其義時閹官用事雍議不行魏明帝景初間尚書郎楊偉上表曰臣覽載籍斷考厯數時以紀農月以紀事其所由來遐而尚矣乃自少昊則𤣥鳥司分顓頊帝嚳則重黎司天唐帝虞舜則羲和掌日三代因之則世有日官日官司厯則頒之諸侯諸侯受之則頒于境內夏后之世羲和湎淫廢時亂日則書載𦙍征由此觀之審農時而重人事歷代然之也逮至周室既衰戰國橫騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流而怪蟄蟲之不藏也是時也天子不協時司歷不協日諸侯不受職日御不分朔人事不恤廢棄農時仲尼之撥亂於春秋說褒貶糾黜司歷失閏則譏而書之登臺頒朔則謂之有禮自此以降暨于秦漢乃復以孟冬為嵗首閏為後九月中莭乖錯時月紕繆加時後天蝕不在朔纍載相襲久而不革也至武帝元封七年始乃悟其繆焉於是改正朔更厯數使天才通人更造太初厯校中朔所差以正閏分課中星得度以考踈密以建寅之月為正朔以黃鍾之月為律厯初其厯斗分太多後遂疏闊至元和二年復用四分厯施而行之至于今日考察日蝕率常在晦是則斗分太多故先密後踈而不可用也是以臣前以制典餘日推考天路稽之前典驗之以蝕朔詳而精之更建密厯則不先不後古今中天以昔在唐帝協日正時允釐百工咸熙庶績也欲使當今國之典禮凡百制度皆韜合往古郁然備足乃改正朔更厯數以大吕之月為嵗首以建子之月為厯初臣以為昔在往代則法日顓頊曩自軒轅則厯日黃帝暨至漢之孝武革正朔更厯數改元曰太初因名太初厯今改元為景初宜曰景初厯臣之所建景初厯法數則約要施用則近密治之則省功學之則易知雖復使研桑心算𨽻首運籌重黎司晷羲和察景以考天路步驗日月究極精微盡術數之極者皆未能並臣如此之妙也晉武帝時將作大匠陳協掘地得古尺尚書奏曰今尺長於古尺宜以古為正潘嶽以為習用已久不宜復改尚書郎摯虞駮曰昔聖人有以見天下之賾而擬其形容象物制器以存時用故參天兩地以正算數之紀依律計分以定短長之度其作之也有則故用之也有徴考步兩儀則天地無所隱其情準正三辰則懸象無所容其謬施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律吕不合史官用之厯象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徴皆絓閡而不得通故宜改今而從古也唐虞之際同律度量衡仲尼之計謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改有少而難變亦有改而致煩有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物季末茍合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏宋文帝頗好厯數太子率更令何承天私撰新法元嘉二十年上表曰臣受性頑惰少所開解自昔幼年頗好厯數耽情注意迄于白首臣亡舅故祕書監徐廣素善其事有既往七曜厯每記其得失自太和至泰元之末四十許年臣因比嵗考校至今又四十載故其踈密差㑹皆可知也夫圓極常動七曜運行離合去來雖有定勢以新故相涉自然有毫末之差連日纍嵗積微成著是以虞書著欽若之典周易明治厯之訓言當訓天以求合非為合以驗天也漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉捨易而不為役心於難事此臣所不解也堯典云日永星火以正仲夏今季夏則火中又宵中星虛以殷仲秋今季秋則虛中爾來二千七百餘年以中星檢之所差二十七八度則堯冬令至日在須女十度左右也漢之太初厯冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕檢之則景初今之冬至應在斗十七又史官受詔以土圭測景考校二至差三日有餘從來積嵗及交州所上檢其增減亦相符驗然則今之二至非天之二至也天之南日在斗十三四矣此則十九年七閏數微多差復改法易章則用算滋繁宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之間而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上厯表云自古及今凡諸厯數皆未能並已之妙何此不曉亦何以云是故臣更建元嘉厯以六百八為一紀半之為度法七十五為室分以建寅之月為嵗首雨水為氣初以諸法閏餘一之嵗為章首冬至從上三日五時日之所在移舊四度又月有遲疾合朔月蝕不在朔望亦非厯意也故元嘉皆以盈縮定其小餘以正朔望之日伏惟陛下允迪聖哲先天不違劬勞庶政寅亮鴻業究淵思於往籍探妙㫖於未聞窮神知化罔不該覽是以愚臣欣遇盛明效其管穴伏願以臣所上元嘉法下史官考其踈密若謬有可採庶或補正闕謬以備萬分詔曰何承天所陳殊有理據可付外詳之太史令錢樂之兼丞嚴粲奏曰太子率更令領國子博士何承天表更改元嘉厯法以月蝕檢今冬至日在斗十七以土圭測影知冬至已差三日詔使付外檢署以元嘉十一年被敕使考月蝕土圭測影檢署由來用偉景初法冬至之日日在斗二十一度少檢十一年七月十六日望月蝕加時在卯到十五日四更二唱丑初始蝕到四唱蝕既在營室十五度末景初其日日在軫三度以月蝕所衝考之其日日應在翼十五度半又到十三年十二月十六日望月蝕加時在酉到亥初始食到一更三唱蝕既在鬼四度景初其日日在女三以衝考之其日日應在牛六度半又到十四年十二月十六日望月蝕加時在戌之半到二更四唱亥末始蝕到三更一唱食既在井三十八度景初其日日在斗二十五以衝考之其日日應在斗二十二度半到十五年五月十五日望月蝕加時在戌其日月始生而已蝕光已生四分之一格在斗十六度許景初其日日在井二十四考取其衝其日日應在井二十又到十七年九月十六日望月蝕加時在子之少到十五日未二更一唱始蝕到三唱蝕十五分之十二格在卯一度半景初其日在房二以衝考之則其日日在氐十三度半凡在五蝕以月衝一百八十二度半考之各至之日日並不在斗二十一度少並在斗十七度半間悉如承天所上又去十一年起以土圭測景其年景初法十一月七日冬至前後隂不見影到十二年十一月十八日冬至其十五日影極長到十三年十一月二十九日冬至其二十六日影極長到十四年十一月十一日冬至其前後並隂不見到十五年十一月二十一日冬至十八日影極長到十六年十一月二日冬至其十月二十九日影極長到十七年十一月十三日冬至其十日影極長到十八年十一月二十五日冬至二十一日影極長到十九年十一月六日冬至其三日影極長到二十年十一月十六日冬至其前後並隂不見影尋校前後以影極長為冬至並差三日以月蝕檢日所在已差四度土圭測影冬至又差三日今之冬至乃在斗十四間又如承天所上又承天法每月朔望及絃皆定大小餘於推交會時刻雖審皆用盈縮則月有頻三大頻二小比舊法殊為異舊日蝕不唯在朔亦有在晦及二日公羊傳所謂或失之前或失之後愚謂此一條自宜仍舊員外散騎郎皮延宗又難承天若晦朔定大小餘紀首值盈則退一日便應以故嵗之晦為新紀之首承天乃改新法依舊術不復每月定大小餘如延宗所難太史所上有司奏治厯改憲經國盛典爰及漢魏屢有變革良由術無常是取協常時方今皇猷載暉舊域光被誠應綜核晷度以播維新承天厯術合可施用宋二十二年普用元嘉厯詔可孝武帝大明六年南徐州從事史祖沖之上表曰古厯踈舛頗不精密羣氏糾紛莫審其要何承天所奏意存改革而置法簡略今已乖逺以臣校之三覩厥謬日月所在差覺三度二至晷影幾失一日五星見伏至差四旬留逆進退或移兩宿分至乖失則莭閏非正宿度違天則伺察無準臣生屬聖辰逮在昌運敢率愚瞽更創新厯謹立改易之意有二設法之情有三改者其一以舊法一章十九嵗有七閏閏數為多經二百年輒差一日莭閏既移則應改法厯紀屢遷實由此條今改章法三百九十一年有一百四十四閏令卻合周漢則將來永用無復差動其二以堯典云日短星昴以正仲冬以此推之唐代冬至日今宿之左五十許度漢代之初即用秦厯冬至日在牽牛六度漢武改立太初厯冬至日在牛初後漢四分法冬至日在斗二十二晉時姜岌以月蝕檢日知冬至在斗十七今參以中星課以蝕望冬至之日在斗十一通而計之未盈百載所差二度舊法並令冬至日有定處天數既差則七曜宿度漸與厯舛乖謬既著輒應改制僅合一時莫能通逺遷革不已又由此條今令冬至所在嵗嵗微差卻檢漢注並皆審密將來久用無煩屢改又設法者其一以子為辰首位在正北爻應初九斗氣之端虛為北方列宿之中元氣肇初宜在此次前儒虞喜備論其義今厯上元日度發自虛一其二以日辰之號甲子為先厯法設元應在此嵗而黃帝以來世代所用凡十一厯上元之嵗莫值此名今厯上元嵗在甲子其三以上元之嵗厯中衆條並應以此為始而景初厯交㑹遲疾亦置紀差裁合朔氣而已條序紛互不及古意今設法日月五緯交㑹遲疾悉以上元嵗首為始則合璧之曜信而有徴連珠之暉於是乎在羣流共源實精古法若夫測以定形據以實效縣象著明尺表之驗可推動氣幽微寸管之候不忒今臣所立易以取信但深練始終大存整密革新變舊有約有繁用約之條理不自懼用繁之意顧非謬然何者夫紀閏參差數各有分分之為體非細不密臣是用深析毫釐以全求妙之準不辭積纍以成永定之制非為思而莫悟知而不改也竊恐讚有然否每崇逺而隨近論有是非或貴耳而遺目所以竭其管穴俯洗同異之嫌披心日月仰希葵藿之照若臣所上萬一可采伏願頒宣羣司賜垂詳究庶陳錙銖少增盛典世祖下之有司使內外博議時人少解厯數竟無異同之辨唯太子旅賁中郎將戴法興議以為三精數微五緯㑹始自非深推測窮識晷變豈能刋古革今轉正圭宿案祖沖之所議每有違舛竊以愚見隨事辨問案沖之新推厯術今冬至所在嵗嵗微差臣法興議夫二至發斂南北之極日有恆度而宿無改位古厯冬至皆在建星戰國橫騖史官喪紀爰及漢初格候莫審後雜覘知在南斗二十二度元和所用即與古厯相符也逮至景初而終無毫忒書云日短星昴以正仲冬直以月維四仲則中宿常在衛陽羲和所以正時取其萬世不易也沖之以為唐代冬至日在今宿之左五十許度遂虛加度分空撤天路其置法所在近違半次則四十五年九月率移一度在詩七月流火此夏正建申之時也定之方中又小雪之節也若冬至審差則豳公火流晷長一尺五寸楚宫之作晝漏五十三刻此詭之甚也仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也就如沖之所誤則星無定次卦有差方名號之正古今必殊典誥之音代不通軌堯之開閉今成建除今之壽星乃周之鶉尾即時東壁已非𤣥武軫星頓屬蒼龍誣天背經乃至於此沖之又改章法三百九十一年有一百四十四閏臣法興議夫日有緩急故斗有闊狹古人制章立為中格年積十九常有七閏晷或虛盈此不可革沖之削閏壞章倍減餘數則一百三十九年二月於四分之料頓少一日七千四百二十九年輒失一閏夫日少則先時閏失則事悖竊聞時以作事事以厚生以此乃生人之大本厯數之所先愚恐非沖之淺慮妄可穿鑿沖之又命上元日度發自虛一云虛為北方列宿之中臣法興議沖之既云冬至嵗差又謂虛為北中舍形責影未足為迷何者凡在天非日不明居地以斗而辨借令冬至在虛則黃道彌逺東北當為黃鍾之宫室壁應屬𤣥枵之位虛宿豈得復為北中乎曲使分至屢遷而星次不改招搖易繩而律吕仍往則七政不以璣衡致齊建時亦非攝提所紀不知五行何居六屬安託沖之又令上元年在甲子臣法興議夫置元設紀各有所尚或據文於圖䜟或取效於當時沖之云羣氏糾紛莫審其㑹昔黃帝辛卯日月不過顓頊乙卯四時不忒景初壬辰晦無差光元嘉庚辰朔無錯景豈非承天者乎沖之茍存甲子可謂為合以求天也沖之又令日月五緯交㑹遲疾悉以上元為始臣法興議夫交㑹之元則食既可求遲疾之際非凡夫所測昔賈逵略見其差劉洪粗著其術至於踈密之數莫究其極且五緯所居有時盈縮即如嵗星在軫見超七辰術家既追算以㑹今則往之與來斷可知矣景初所以紀首置差元嘉兼又各設後元者其並省功於實用不虛推以為煩也沖之既違天於改易又設法以遂情愚謂此治厯之大過也臣法興議日有八行各成一道月有一道離為九行左交右疾倍半相違其一終之理日數宜同沖之通同與㑹相覺九千四十其隂陽七十九周有奇遲疾不及二匝此則當縮反盈應損更益沖之隨法興所難辨折之曰臣少鈍愚尚專功數術搜練古今博采沈奧唐篇夏典莫不揆量周正漢朔咸加該驗罄䇿籌之思究疏密之辨至若立貟舊誤張衡述而弗改漢時解銘劉歆詭謬其數此則算氏之劇疵也乾象之弦望定數景初之交度周日匪謂測候不精遂乃乘除翻謬斯又厯家之甚失也及鄭𤣥闞澤王蕃劉徽並綜數藝而每多疏舛臣昔以暇日撰正衆謬理據炳然易可詳密此臣以俯信偏識不虛推古人者也按何承天厯二至先天閏移一月五星見伏或違四旬列差妄設當益反損皆前術之乖逺臣厯所改定也既㳂波以討其源刪滯以暢其要能使躔次上通晷管下合反以譏詆不其惜乎尋法興所議六條並不造理難之關楗謹陳其目其一日度嵗差前法所略臣據經史辨正此數而法興設難徵引詩書三事皆謬其二臣校晷景改舊章法法興立難不能有詰直云恐非淺慮所可穿鑿其三次改方移臣無此法求術意誤橫生嫌貶其四厯上元年甲子術體明整則茍合可疑其五臣其厯七曜咸始上元無隙可乘復云非凡所測其六遲疾隂陽法興所未解誤謂兩率日數宜同凡此衆條或援謬自譏或空加抑絶未聞折正之談厭心之論也謹隨詰洗釋依源徴對仰照天暉敢罄管穴法興議曰夫二至發斂南北之極日有恆度而宿無改位故古厯冬至皆在建星沖之曰周漢之際疇人喪業曲技競設圖緯實繁或借號帝王以崇其大或假名聖賢以神其說是以䜟記多虛桓談知其矯妄古厯舛雜杜預疑其非真按五紀論黃帝厯有四法顓頊夏周並有二術詭異紛然則孰識其正此古厯可疑之據一也夏厯七曜西行特違衆法劉向以為後人所造此可疑之據二也殷厯日法九百四十而乾鑿度云殷厯以八十一為日法若易緯非差殷厯必妄此可疑之據三也顓頊厯元嵗在乙卯而命厯序云此術設元嵗在甲寅此可疑之據四也春秋書食有日朔者凡二十六其所據厯非周則魯以周厯考之檢其朔日失二十五魯厯校之又失十三二厯並乖則必有一僞此可疑之據五也古之六術並同四分四分之法久則後天以食檢之經三百年輒差一日古厯課今其甚踈者朔後天過二日有餘以此推之古術之作皆在漢初周末理不得逺且却校春秋朔並先天此則非三代以前之明徴矣此可疑之據六也尋律厯志前漢冬至日在斗牛之際度在建星其勢相鄰自非帝者有造則儀漏或闕豈能窮密盡微纎毫不失建星之說未足證矣法興議曰戰國橫騖史官喪紀爰及漢初格候莫審後雜覘知在南斗二十二度元和所用即與古厯相符也逮在景初終無毫忒沖之曰古術訛雜其詳闕聞乙卯之厯秦代所用必有效於當時故其言可徴也漢武改創檢課詳備正儀審漏事在前史測星辨度理無乖逺今議者所是不實見所非徒為虛妄辨彼駭此既非通談違今背古所誣誠多偏據一說未若兼今之為長也景初之法實錯五緯今則在衝口至曩已移日蓋略治朔望無事檢候是以晷漏昏明並即元和二分異景尚不知革日度微差宜其謬矣法興議曰書云日短星昴以正仲冬直以月推四仲則中宿常在衛陽羲和所以正時取其萬代不易也沖之以為唐代冬至日在今宿之左五十許度遂虛加度分空撤天路沖之曰書以四星昏中審分至者據人君南面而言也且南北之正其詳易准流見之勢中天為極先儒注述其義僉同而法興以為書說四星皆在衛陽之位自在已地進失向方退非始見迂回經文以就所執違訓詭情此則甚矣捨午稱已午上非無星也必據中宿餘宿豈復不足以正時若謂舉中語兼七列者觜參尚隱則不得言見昴星雖見當云伏矣奎婁已見復不得言伏見伏皆不得以為辭則名將何附若中宿之通非允當實謹檢經㫖直云星昴不自衛陽衛陽無自顯之義此談何因而立茍理無所依則可愚辭成說曽泉桑野皆為明證分至之辨竟在何日循復再三竊深歎息法興議曰其置法所在近違半次則四十五年九月率移一度沖之曰元和日度法興所是唯徴古厯在建星以今考之臣法冬至亦在此宿斗二十二了無顯證而虛貶臣厯乖差半次此愚情之所駭也又年數之餘有十一月而議云九月涉數每乖皆此類也月盈則食必在日衝以檢日則宿度可辨請據效以課疏密按太史注記元嘉十三年十二月十六日中夜月蝕盡在鬼四度以衝計之日當在牛六依法興議曰在女七又十四年五月十五日丁夜月蝕盡在斗二十六度以衡計之日當在井三十依法興議曰日在栁二又二十八年八月十五日丁夜月蝕在奎十一度以衝計之日當在角二依法興議曰日在角十二又大明三年九月十五日乙夜月蝕盡在胃宿之末以衝計之日當在氐十二依法興議曰日在心二凡此四蝕皆與臣法符同纎毫不爽而法興所據頓差十度違衝移宿顯然易覩故知天數漸差則當式遵以為典事驗昭晳豈得信古而疑今法興議曰在詩七月流火此夏正建申之時也定之方中又小雪之節也若冬至審差則豳公火流晷長一尺五寸楚宫之作晝漏五十三刻此詭之甚也沖之曰臣按此議三條皆謬詩稱流火蓋略舉西移之中以為驚寒之候流之為言非始動之辭也就如始說冬至日度在斗二十二則火星之中當在大暑之前豈鄰建申之限此專自攻糾非謂矯失夏小正五月昏大火中此復在衛陽之地乎又謂臣所立法楚宫之作在九月初按詩傳箋皆謂定之方中者室壁昏中形四方也然則中天之正當在室之八度臣厯推之元年立冬後四日此度昏中乃自十月之初又非寒露之日也議者之意蓋誤以周世為堯時度差五十故致此謬小雪之節自信之談非有明文可據也法興議曰仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也就如沖之所誤則星無定次卦有差方名號之正古今必殊典誥之音時不通軌堯之開閉今成建除今之壽星乃周之鶉尾也即時東壁已非𤣥武軫星頓屬蒼龍誣天背經乃至於此沖之曰臣以為辰極居中而列曜貞觀羣像殊體而隂陽區别故羽介咸陳則水火有位蒼素齊設則東西可準非以日之所在定其名號也何以明之夫陽爻初九氣始正北𤣥武七列虛當子位若圓儀辨方以日為主冬至所舍當在𤣥枵而今之南極乃處東維違體失中其義何附若南北以冬夏禀稱則卯酉以生殺定號豈得春躔義方秋麗仁域名舛理乖若此之反哉因兹以言固知天以列宿分方而不在於四時景緯環序日不獨守故轍矣至於中星見伏記籍每以審時者蓋以厯數難詳而天驗易顯各據一代所合以為簡易之政也亦猶夏禮未通商典濩容豈襲韶節誠天人之道同差則藝之興因代而推移矣月位稱建諒以氣之所本名隨實著非謂斗杓所指近校漢時已差半次審斗莭時其效安在或義非經訓依以成說將緯候多詭僞辭間設乎次隨方名義合宿體分至雖遷而厥位不改豈謂龍火貿處金水亂列名號乖殊之譏抑未詳究至如壁非𤣥武軫屬蒼龍瞻度察晷實效咸然元嘉厯法壽星之初亦在翼限參校晉注顯驗甚衆天數差移百有餘載議者誠能馳辭騁辨令南極非冬至望不在衝則此談乃可守耳若使日遷次留則無事屢嫌乃臣厯之良證非難者所宜列也尋臣所執必據經史逺考唐典近徴漢籍䜟記碎言不敢依述竊謂循經之論也月蝕檢日度事驗昭著史注詳論文存禁閣斯又稽天之說也堯典四星並在衛陽今之日度逺準元和誣背之誚實此之謂法興議曰夫日有緩急故斗有闊狹古人制章立為中格年積十九常有七閏晷或盈虛此不可革沖之削閏壞章倍減餘數則一百三十九年二月於四分之料頓少一日七千四百二十九年輒失一閏夫日少則先時閏失則事悖竊聞時以作事事以厚生此乃生民之所本厯數之所先愚恐非沖之淺慮妄可穿鑿沖之曰按後漢書及乾象說四分厯法雖分章設蔀創自元和而晷儀衆數定於嘉平三年四分志立冬中影長一丈立春中影九尺六寸尋冬至南極日晷最長二氣去至日數既同則中影應等而前長後短頓差四寸此厯景冬至後天之驗也二氣中影日差九分半弱進退均調略無盈縮以率計之二氣各退一日十二刻則晷影之數立冬更短立春更長並差二寸二氣中影俱長九尺八寸矣即立冬立春之正日也以此推之厯置冬至後天亦二日十二刻也嘉平三年時厯丁丑冬至加時正在日中以二日十二刻減之天定以乙亥冬至加時在夜半後三十八刻又臣測景歷紀躬辨分寸銅表堅剛暴潤不動光晷明潔纎毫􅖓然據大明五年十月十日影一丈七寸七分半十一月二十五日一丈八寸一分太二十六日一丈七寸五分彊折取其中則中天冬至應在十一月三日求其蚤晚令後二日影相減則一日差率也倍之為法前二日減以百刻乘之為實以法除實得冬至加時在夜半後三十一刻在元嘉厯後一日天數之正也量檢竟年則數減均同異嵗相課則逺近應率臣因此驗考正章法今以臣厯推之刻如前竊謂至密永為定式尋古厯法並同四分四分之數久則後天經三百年朔差一日是以漢載四百食率在晦魏代已來遂革斯法世莫之非者誠有效於天也章嵗十九其疏尤甚同出前術非見經典而議云此法自古數不可移若古法雖疏永當循用謬論誠立則法興復欲施四分於當今矣理容然乎臣所未譬也若謂今所革創違舛失衷者未聞顯據有以矯奪臣法也元嘉厯術減閏餘二直以襲舊分粗故進退未合至於棄盈求正非為乖理就如議意率不可易則分無增損承天置法復為違謬節氣蚤晚當循景初二至差三日曽不覺其非橫謂臣厯為失知日少之先時未悟增月之甚惑也誠未覩天驗豈測厯數之要生民之本諒非率意所斷矣又法興始云窮識晷變可以刋舊今復謂晷數盈虛不可為準互自違伐罔識所依若推步不得准天功絶於心目未詳歷紀何因而立案春秋以來千有餘載以食檢朔曽無差失此則日行有恆之明徴也且臣考影彌年窮察毫微課驗以前合若符契孟子以為千嵗之日至可坐而致斯言實矣日有緩急未見其證浮辭虛貶竊非所懼法興議曰沖之既云冬至嵗急又謂虛為北中捨形責影未足為迷何者凡在天非日不明居地以斗而辨借令冬至在虛則黃道彌逺東北當為黃鍾之宫室壁應屬𤣥枵之位虛宿豈得復為北中乎曲使分至屢遷而星次不改招搖易繩而律吕仍往則七政不以璣衡致齊建時亦非攝提所紀不知五行何居六屬安託沖之曰此條所嫌前牒已詳次改方移虛非中位繁辭廣證自搆紛惑皆議者所謬誤非臣法之違設也七政致齊實謂天儀鄭王唱述厥訓明允雖有異說蓋非實義法興議曰夫置元設紀各有所尚或據文於圖䜟或取效於當時沖之云羣氏糾紛莫審其㑹昔黃帝辛卯日月不過顓頊乙卯四時不忒景初壬辰晦無差光元嘉庚辰朔無錯景豈非承天者乎沖之茍存甲子可謂為合以求天也沖之曰夫厯存效密不容殊尚合䜟乖說訓義非所取雖驗當時不能通逺又臣所未安也元值始名體明理正未詳辛卯之說何依古術詭謬事在前牒溺名喪實殆非索隱之謂也若以厯合一時理無久用元在所㑹非有定嵗者今以效明之夏殷以前載籍淪逸春秋漢史咸書月蝕正朔詳審顯然可徴以臣歷檢之數皆協同誠無虛設循密而至千載無殊則雖逺可知矣備閲曩法踈越實多或朔差三日氣移七晨未聞可以下通於今者也元在乙丑前說以為非正今值甲子議者復疑其茍合無名之嵗自昔無之則推先者將何從乎歷紀之作幾於息矣夫為合必有不合願聞顯據以核理實法興曰夫交㑹之元則蝕既可求遲疾之際非凡夫所測昔賈逵略見其差劉洪粗著其術至於踈密之數莫究其極且五緯所居有時盈縮即如嵗星在軫見超七辰術家既追算以㑹今則往之與來斷可知矣景初所以紀首置差元嘉兼又各設後元者其並省功於實用不虛推以為煩也沖之既違天於改易又設法以遂情愚謂此治厯之大過也沖之曰遲疾之率非出神怪有形可檢有數可推劉賈能述則可纍功以求密矣議又云五緯所居有時盈縮嵗星在軫見超七辰謂應年移一辰也案嵗星之運年恆過次行天七匝輒超一位代以求之厯凡十法並合一時此數咸同史注所記天驗又符此則盈次之行自其定准非為衍度濫徙頓過其衝也若審由盈縮豈得常疾無遲夫甄耀測象者必料分析度考往驗來准以實見據以經史曲辨碎說類多浮詭甘石之書互為矛楯今以一句之經誣一字之謬堅執偏論以罔正理此愚情之所未厭也算自近始衆法可同但景初之二差承天之元實以奇偶不協故數無同盡為遺前設後以從省易夫建言倡論豈尚矯異蓋今實以文顯言勢可極也稽元曩嵗羣數咸始斯誠術體理不可容譏而譏者以為過謬之大者然則元嘉置元雖七率舛陳而猶紀協甲子氣朔俱終此又過謬之小者也必當虛立上元假稱厯始嵗違名初日避辰首閏餘朔分月緯七率並不得有盡乃為允衷之製乎設法情實謂意之所安改易違天未覩理之譏者也法興曰日有八行合成一道月有一道離為九行左交右疾倍半相違其一終之理日數宜同沖之通同與㑹周相覺九千四十其隂陽七十九周有奇遲疾不及一匝此則當縮反盈應損更益沖之曰此議雖遊漫無據然言迹可檢按以日八行譬月九道此為月行之軌當循一轍環匝於天理無差動也然則交㑹之際當有定所豈容或斗或牛同麗一度去極應等安得南北無常若日月非例則八行之說是衍文邪左交右疾語甚未分為交與疾對為舍交即疾若舍交即疾即交在平率入厯七日及二十一日是也值交蝕既當在盈縮之極豈得損益或多或少若交與疾對則在交之衝當為遲疾之始豈得入厯或深或淺倍半相違新故所同復摽此句欲以何明臣覽厯書古今略備至如此說所未前聞逺乖舊準近背天數求之愚情竊所深惑尋遲疾隂陽不相生故交㑹加時進退無常昔術著之久矣前儒言之詳矣而法興云日數同竊謂議者未曉此意乖謬自著無假驟辨既云盈縮失衷復不備記其數或自嫌所執故泛略其說乎又以全為率當互因其分法興所列二數皆誤或以八十為七十九當縮反盈應損更益此條之謂矣總檢其議豈但臣厯不密又謂何承天法乖謬彌甚若臣厯宜棄則承天術益不可用法興所見既審則應革創至非景極望非日衝凡諸新說必有妙辨乎時法興為世祖所寵天下畏其權既立異議論者皆附之後魏太武帝時崔浩上五寅元厯表曰太宗詔臣學天文星厯易式九宫無不盡看至今三十九年晝夜無廢臣禀性弱劣力不及健婦人更無餘能是以專心思書忘寢與食至乃夢共鬼爭義得周公孔子之要術始知古人有虛有實妄語者多真正者少自秦始皇燒書之後經典絶滅漢髙祖以來世人妄造厯術者有十餘家皆不得天道之正大誤四千小誤甚多不可言盡臣愍其如此今遭陛下太平之世除僞從真宜改誤厯以從天道是以臣前奏造厯今始成訖謹以奏呈唯恩省察以臣厯術宣示中書博士然後施用非但時人天地鬼神知臣得正可以益國家萬世之名過於三皇五帝矣後周宣帝時達奚震及牛𢎞等上議曰竊惟權衡度量經邦懋軌誠須詳求故實考校得衷謹尋今之鐵尺是太祖遣尚書故蘇綽所造當時檢勘用為前周之尺驗其長短與宋尺符同即以調鍾律并用均田度地今以上黨羊頭山黍依漢書律厯志度之若以大者稠纍依數滿尺實於黃鍾之律須撼乃容若以中者纍尺雖復小稀實於黃鍾之律不動而滿計此二事之殊良由消息未善其於鐵尺終有一會且上黨之黍有異他鄉其色至烏其形圓重用之為量定不徒然正以時有水旱之差地有肥瘠之異取黍大小未必得中案許慎解秬黍體大本異於常疑今之大者正是其中纍百滿尺即是㑹古實籥之外才剩十餘此恐圍徑或差造律未妙就如撼動取滿論理亦通今勘周漢古錢大小有合宋氏渾儀尺度無舛文依淮南纍粟十二成寸明先王制法索隱鈎深以律計分義無差異漢書食貨志云黃金方寸其重一斤今鑄金校驗鐵尺為近依文據理符㑹處多且平齊之始已用宣布今因而為定彌合時宜至於玉尺纍黍以廣為長纍既有剩實復不滿尋訪古今恐不可用其晉梁尺量過為短小以黍實管彌復不容據律調聲必致髙急且八音克諧明王盛軌同律度量哲后通規臣等詳校前經斟量時事謂用鐵尺於理為便歷代名臣奏議卷二百七十八
