body:
  text: 歷代名臣奏議卷一百三十三明楊士竒等撰用人宋仁宗時歐陽修舉米光濬狀曰右臣伏自準敕計置河東沿邉糧草所過州軍遍見文武官吏不少其間臨民治軍可稱邉任者絶難得人伏見西頭供奉官閣門祗候岢嵐軍使米光濬年四十餘世家代州熟知本路邊事出於將種練習兵機兼有膽勇會弓馬自到岢嵐二年處置皆合事宜昨代州寧化各為守將非才引惹北人爭侵疆界惟岢嵐草城川正當北界要害之地去年北人來侵疆界光濬應機拒守故獨岢嵐得不侵却土地亦不張皇臣自過本軍體問軍民備得其實伏覩近降宣命指揮差李偉替令赴闕切以邉鄙常患難材茍得其人豈宜屢易兼自有移替宣命軍民並各衆狀舉留其米光濬臣今同罪保舉再任岢嵐如再任後犯入已贓及邊防軍政但有一事敗悮並甘連坐具狀奏聞伏候敕旨又狀曰右臣近曽同罪奉舉西頭供奉官閣門祗候米光濬再任岢嵐軍使竊知朝廷為光濬病患曽加體量臣昨任岢嵐親見光濬絶無病狀體問得去年偶因飲酒暫曽不安竊緣本人有心力會弓馬諳熟邉事善撫軍民況岢嵐當草城川一路地形平坦與北冦止隔界壕不比代州尚有險固捍禦控扼尤藉得人臣嘗見朝廷選擇邉將比及於武臣中求得一人常患難得而任使俟其知次第亦須年嵗之間其米光濬於武臣中不易多得在岢嵐既久又已知次第其人既不病患又無過犯料其替去别得差遣必與今任輕重一般與其移易往來不若責之久任況知光濬亦纍曽乞替臣今所舉非徇光濬之私蓋為邉防之計其米光濬伏望聖慈特加奬擢與優轉一官且令再任以防緩急可以使喚如朝廷遷官及再任後犯入已贓及邉事有所敗悮臣並甘同罪慶厯三年修又論王舉正范仲淹等劄子曰臣伏見朝廷擢用韓琦范仲淹為樞密副使萬口歡呼皆謂陛下得人矣然韓琦稟性忠鯁遇事不避若在樞府必能舉職不須更藉仲淹如仲淹者素有大材天下之人皆許其有宰輔之業外議皆謂在朝之臣忌仲淹材名者甚衆陛下既能不惑衆説出於獨斷而用之是深知其用矣可惜不令大用蓋樞府只掌兵戎中書乃是天下根本萬事無不總治伏望陛下且令韓琦佐樞府移仲淹於中書使得參預大政況今參知政事王舉正最號不才久居柄用柔懦不能曉事緘默無所建明且可罷之以避賢路或未欲罷亦可且令與仲淹對換當今四方多事二虜交侵正是急於用人之際凡不堪大用者去之乃叶天下公論不必待其作過亦不須俟其自退也況若令與仲淹對換則於舉正不離兩府全無所損伏望陛下思國家安危大計不必顧惜不材之人使妨占賢路如允臣所請即乞留中特出聖斷指揮或尚未欲施行即乞降付中書令舉正自量材業優劣何如仲淹若實不如即須自求引避以副中外公議修乞力拒浮議終責任范仲淹等上奏曰臣伏聞范仲淹富弼等自被手詔之後己有條陳事件必須裁擇施行臣聞自古帝王致治須待同心叶力之人相與維持而君臣相得之難謂之千載一遇今仲淹等遇陛下聖明可謂難逢之會陛下有仲淹等亦可謂難得之臣陛下既已傾心待之仲淹等亦又各盡心思報上下如此臣謂事無不濟但顧行之如何爾況仲淹富弼是陛下特出聖意自選之人初用之時天下已皆相賀然猶竊謂陛下既能選之未知用之如何爾及見近日特開天章從容訪問親寫手詔督責丁寧然後中外喧然既驚且喜此二盛事固以朝報京師暮傳四海皆謂自來未曽如此責任大臣天下之人延首拭目以看陛下用此二人欲作何事此二人所報陛下果有何能是陛下得失在此一舉生民休戚繫此一時以此而言則仲淹等不可不盡心展效陛下不宜不力主而行使上不玷知人之明下不失四海之望臣非不知陛下専心鋭志必不自怠而中外大臣且憂國同心不必相忌而沮難然臣所慮者仲淹等所言必須先絶僥幸因循姑息之事方能救數世之積弊如此等事皆外招小人之怨怒不免浮議之紛紜而姦邪未去之人亦須時有讒沮若稍聼之則事不成矣臣謂當此事初尤須上下叶力凡小人怨怒仲淹等自以身當浮議姦讒陛下亦須力拒待其久而漸定自可日見成功伏望聖慈留意終成之則社稷之福天下之幸也四年修又論鄭戩不可為四路招討上奏曰臣伏覩敕除鄭戩知永興軍兼陜西都部管自聞此命外之議論皆以為非在臣思之實亦未便竊以兵之勝負全由處置如何臣見用兵以來纍次更改或四路置都部管或分而各領一方乍合乍離各有利害唯夏竦往年所任鄭戩今日之權失䇿最多請試條列臣聞古之善用將者先問能將幾何今而不復問戩能將幾何直以關中數十州之廣蕃漢數十萬之兵沿邊二三千里之事盡以委之此其失者一也或曰戩雖名都部管而諸將自各有將又其大事不令専制而必稟朝廷假如邉將有大事先稟於戩又稟於朝廷朝廷議定下戩戩始下於沿邉只此一端自可敗事其失二也今大事戩既不専若小事一一問戩則四路去永興皆數百里其寨柵逺者千餘里使戩一一處分合宜尚有遲緩之失萬一耳目不及處置失宜則為害不細其失三也若大小事都不由戩而但使帶其權豈有數十州之廣數十萬之兵二三千里之邉事作一虗名使為無權之大將若知戩可用則推心用之若知不可用則善罷之豈可盡關中之大設為虗名而以不誠待人其失四也今都部管名統四路而諸將事無大小不稟可行則四路偏裨各見其將不由都帥則上下相效皆欲自専其失五也今都部管是大將反不得節制四路而逐路是都帥部將却得專制一方則委任之意大小乖殊軍法難行名體不順其失六也若知戩果不可大用但不敢直罷其職則是大臣顧人情避已怨如此作事何以弭息人言其失七也料朝廷忽有此命必因韓琦等近自西來有此擘畫琦等身在邉陲曽為將帥豈可如此失計臣今欲乞令兩府之臣明議四路不當置都部管利害其鄭戩既不可內居永興而遙制四路則乞落其虗名只令坐鎮長安撫民臨政以為關中之重其任所繫亦大而使四路各責其將則事體皆順處置合宜修又論三司判官擇人之利劄子曰臣伏見近差薛紳為轉運使紳是三司判官資例合作轉運使然外人議論未允者若以昔日差人更有不如紳者亦不足惟蓋見朝廷近更新制不次用人凡舊轉運使稍不材者悉令換易忽見却用薛紳所以人言未允昨來京東用沈邈替却朝宗簡今用薛紳又更不及宗簡此臣之所以未喻也平時無事公私上下從容吏無大小奉法守常而已所以齪齪廉謹不為大過雖庸暗繆懦者皆可茍祿偷安而朝廷可以不擇賢愚一例差撥官雖漸濫猶未敗悮今天下事勢豈比嚮時盜賊縱橫而州郡無僃公私困乏而用度轉多賦役繁興而人户凋耗雖有出人之方尚恐不能了事豈可尚循舊例依次用人然臣竊思方今中外差除未肯脫去舊例如紳之輩謂其已作省判須令作轉運則弊在差省判之時不早慎擇也夫前已濫者不能驟去後來者又不擇之永無澄清之時矣臣今欲乞詳定差省判之法每遇闕人或令本省使副自舉或朝廷先擇舉主令舉主擇人但重其保任同罪之法而不必限其資序如此則省判得人省判得人則將來有好轉運使有好轉運使則逐路澄清民紓用足以此而言擇得一省判為數十州民之福其利甚大夫得人為利甚大則失人為害亦大矣伏望聖慈留意裁擇修改右正言論轉運所按吏不必更令提刑體量上疏曰臣近見淮南按察使邵飾奏為體量知潤州席平為政不治及不教閲兵士等朝廷以飾為未足信又下提刑司再行體量臣竊以轉運提刑俱領按察然朝廷寄任重者為轉運其次乃提刑爾今寄任重者言事反不信又質於其次者而決疑臣不知邵飾果是才與不才可信與不可信如不才不可信則又何疑然又不知為提刑者其才與飾優劣如何若才過於飾尚可取萬一不才於飾見事相背却言席平為才邵飾合得罔上之罪矣若反以罪飾臣料朝廷必不肯行若捨飾與席平俱不問則善惡不辨是非不分況席平曽作臺官立朝無狀只令制勘亦不能了尋御史中丞以不才奏罷朝廷兩府而誰不識乎其才與不才人人盡知何必更令提刑體量然後為定今外議皆言執政大臣託以審謹為名其實不肯生事而當怨須待言事者再三陳狀使被黜者知大臣迫於言者不得已而行只圗怨不歸已茍誠如此豈有念民疾苦澄清官吏之意哉若無此意是好疑不決則尤是朝廷任人之失自去年以為轉運使不察官吏特出詔書加以使名責其按察今按察使依稟詔書舉其本職又却疑而不聼今後朝廷命令誰肯信之凡任人之道要在不疑寧可艱難於擇人不可輕任而不信若無賢不肖一例疑之則人各心闌誰肯辦事今邵飾言一不才顯者所貴朝廷肯行然後部下振竦官吏畏服今反為朝廷不信却委别人則飾之使威誰肯信服飾亦慙見其下今後見事不若不為不獨邵飾一人臣竊聞諸處多有按察官吏皆為朝廷不行人各嗟慙以謂任以事權反加沮惑朝廷之意不可諭也伏望聖慈特敕其邵飾所奏特與施行今後按察使奏人如不才老病灼然不疑者不必更委别官示以不信所貴不失任人之道而令臣下盡心嘉祐元年修為翰林學士論用人之要在先察毁譽之人奏曰臣伏覩近降制書除賈昌朝為樞密使旬日以來中外人情莫不疑懼搢紳公議漸以沸騰蓋緣昌朝稟性回邪執心傾險頗知經術能文飾姦言善為隂謀以陷害良士小人朋附者衆皆樂為其用前在相位屢害善人所以聞其再來望風畏恐陛下聰明仁聖勤儉憂勞每於用人尤所審謹然而自古毁譽之言未嘗不並進於前而聼察之際人主之所難也臣以謂能知聼察之要則不失之矣何謂其要在先察毁譽之人若所譽者君子所毁者小人則不害其為進用矣若君子非之小人譽之則可知其人不可用矣今有毅然立乎朝危言讜論不附人主不附權臣其直節忠誠素為中外所稱信者君子也如此等人皆以昌朝為非矣宦官宫女左右使令之人往往小人也如此等人皆以昌朝為是矣陛下察此則昌朝為人可知矣今陛下之用昌朝與執政大臣謀而用之乎與立朝忠正之士謀而用之乎與左右近習之人謀而用之乎或不謀於臣下斷自聖心而用之乎昨聞昌朝隂結宦官創造事端謀動大臣以圗進用若陛下與執政大臣謀之則大臣勢在嫌疑必難啓口若與立朝忠正之士謀之則無不以為非矣其稱譽昌朝以為可用者不過宦官左右之人爾陛下用昌朝為天下而用之乎為左右之人而用之乎臣伏料陛下必不為左右之人而用之也然左右之人謂之近習朝夕出入進見無時其所讒諛能使人主不覺其漸昌朝善結宦官人人喜為稱譽朝一人進一言暮一人進一説無不稱昌朝之善者陛下視聼漸熟遂簡在于聖心及將用之時則不必與謀也蓋稱薦有漸久已熟於聖聰矣是則陛下雖斷自聖心不謀臣下而用之亦左右之人積漸稱譽之力也陛下常患近嵗以來大臣體輕連為言事者彈擊蓋由用非其人不叶物議而然也今昌朝身為大臣見事不能公論乃交結中貴因內降以起獄訟以此規圗進用竊聞臺諫方欲論列其過惡而忽有此命是以中外疑懼物論喧騰也今昌朝未來議論已如此則使在其位必不免言事者上煩聖聼若不爾則昌朝得遂其志傾害善人壞亂朝政必為國家生事臣愚欲望聖慈抑左右隂薦之言採縉紳公正之説早罷昌朝還其舊任則天下幸甚臣官為學士職號論思見聖心求治甚勞而一旦用人偶失外庭物議如此既有見聞合思裨補修又舉胡瑗奏曰臣伏見新除國子監直講胡瑗充天章閣侍講有以見聖恩奬崇儒學褒勸經術之臣也然臣等竊見國家自置太學十數年間生徒日盛常至三四百人自瑗管勾太學以來諸生服其德行遵守規矩日聞講誦進德修業昨來國學開封府并鎖廳進士得解人中三百餘人是瑗所教然則學業有成非止生徒之幸庠序之盛亦自是朝廷美事今瑗既升講筵遂去太學竊恐生徒無依漸以分散竊以學校之制自昔難興惟唐太宗時生徒最多史册書之以為盛美其後庠序廢壞至于今日始復興起若一旦分散誠為可惜也臣等欲望聖慈特令胡瑗同勾當國子監或専管勾太學所貴生徒不至分散修又舉梅堯臣狀奏曰臣等忝列通班無裨聖治知士不薦咎在蔽賢伏見太常博士梅堯臣性純行方樂道守節辭學優贍經術通明長於歌詩得風雅之正雖知名當時而不能自逹竊見國家直講見闕二員堯臣年資皆應選格欲望依孫復例以補直講之員必能論述經言教導學者使與國子諸生歌詠聖化于庠序以副朝廷育材之美如後不如舉狀臣等並甘同罪修舉處士陳烈狀曰臣伏見國家崇建學校近年以來太學生徒常至三四百人此朝廷盛美之事數百年來未嘗有也然而教導之方必慎其選其進德修業必有篤行君子可以不言而化者使居其間以為學者師法庶幾內修其實不止聚徒之多為虗名之美也伏見福州處士陳烈清節茂行著自少時晚而益勤久而愈信非惟一方學者之所師蓋天下之士皆推尊其道德謂宜以禮致之朝廷必有裨補近聞命以官秩使教學於鄉里其禮甚薄未足以稱勵賢旌德之舉臣今乞以博士之職召致太學雖未能盡其材亦足以副天下學者之所欲而成朝廷崇賢勸學之實再舉陳烈狀曰臣嘗奏舉福州處士陳烈有道德可為博士處之太學竊聞朝廷命以官秩俾之講説而烈辭讓不起臣亦嘗知烈之為人其學行高古然非矯激之士其所藴蓄亦欲有所施為況聖恩優異褒賁所及足以勸天下之為善者在烈不宜辭避然其進退之際亦有所難蓋朝廷前命以本州教授彼方辭讓而遽有國學之召義不得不辭然自古國家樂賢好士未始不如此在下者逡巡而避讓在上者勤勤而不已以勵難進之節而天下靡然識上有好賢不倦之心上下相成以勸風俗臣謂朝廷宜再加優命致烈必來則於其進退之際已足以勉勵偷薄臣今欲乞未命以官但且召至京師彼必無名辭避俟其既至徐可推恩況今胡瑗疾病方乞致仕學校之職不可闕人能繼瑗者非烈不可欲乞早賜指揮修又舉進士張立之狀奏曰臣伏見朝廷之議常患方今士人名節不立民俗禮義不修所以取士多濫而浮偽難明愚民無知而冒犯者衆蓋由設教不篤而奬善無方也伏見徐州進士同三禮出身見守選人張立之能事父母有至孝之行著聞鄉里本州百姓僧道列狀稱薦前後長吏纍次保明安撫臣僚亦曽論奏至今未蒙朝廷甄擢其人母年八十無祿以養銓司近制於選人秪許入邉逺官立之家居則患祿不逮親欲就逺官則難於扶侍有至孝之行而進退失所有纍薦之美而褒勸不及於立之飬親之志所希至少於朝廷奬善之道所施至多伏望聖慈特下銓司採問本人行止及前後論薦迹狀與一本州合入官所貴旌一士之行勸一鄉之人伏以古今致理先於孝子勸賞最勤今孝悌之科久廢不舉旌表之禮久闕不行欲乞今後應有孝行著聞纍被薦舉者與一本州官令自化其鄉里仍乞著為永式其張立之如允臣所奏乞送銓司施行四年修又論包拯不當代宋祁為三司使狀奏曰臣聞治天下者在知用人之先後而已用人之法各有所宜軍旅之士先材能朝廷之士先名節軍旅主成功惟恐其不趨賞而爭利其先材能而後名節者亦勢使之然也朝廷主教化風俗之薄厚治道之汙隆在乎用人而教化之行於下也不能家至而諄諄諭之故常務尊名節之士以風動天下而聳勵其偷薄夫所謂名節之士者知廉恥修禮遜不利於茍得不牽於茍隨而惟義之所處白刃之威有所不避折枝之易有所不為而惟義之所守其立於朝廷進退舉止皆可以為天下法也其人至難得也至可重也故為士者常貴名節以自重其身而君人者亦常全名節以飬成善士伏見陛下近除前御史中丞包拯為三司使命下之日中外喧然以謂朝廷貪拯之材而不為拯惜名節然猶冀拯能執節守義堅遜以避嫌疑而為朝廷惜事體數日之間遽聞拯已受命是可惜也亦可嗟也拯性好剛天姿峭直然素少學問朝廷事體或有不思至如逐其人而代其位雖初無是心然見得不能思義此皆不足怪若乃嫌疑之迹常人皆知可避而拯豈獨不思哉昨聞拯在臺日常自至中書詰責宰相指陳前三司使張方平過失怒宰相不早罷之既而臺中僚屬相繼論列方平由此罷去而以宋祁代之又聞拯亦嘗彈奏宋祁過失自其命出臺中僚屬又交章力言而祁亦因此而罷而拯遂代其任此所謂蹊田奪牛豈得無過而整冠納履當避可疑者也如拯材能姿望雖别加進用人豈為嫌其不可為者惟三司使爾非惟自涉嫌疑其於朝廷所損不細臣請原其本末而言之國家自數十年來士君子務以恭謹靜重為賢及其弊也循默茍且頽墮寬弛習成風俗不以為非至於百職不修紀綱廢壞時方無事固未覺其害也一旦黠虜犯邉兵出無功而財用空虛公私困弊盜賊並起天下騷然陛下奮然感悟思革其弊進用三數大臣鋭意於更張矣於此之時始增置諫官之員以寵用言事之臣俾之舉職由是修紀綱而繩廢壞遂欲分别賢不肖進退才不才而久弊之俗驟見而駭因共指言事者而非之或以為好訐隂私或以為公相傾陷或謂沽邀名譽或謂自圗進取羣言百端幾惑上聼尚賴陛下至聖至明察見諸臣本以忘身徇國非為己利讒間不入遂荷保全而中外之人久而漸信自是以來二十年間臺諫之選屢得讜言之士中間斥去姦邪屏絶權幸拾遺救失不可勝數是則納諫之善從古所難自陛下臨御以來實為甚盛於朝廷補助之效不為無功今中外皆安上下已信纎邪之人凡所舉動每畏言事之臣而事無巨細亦惟言事是聼原其自始開發言路至今日之成效豈易致哉可不惜哉夫言人之過似於激訐逐人之位似於傾陷而言事之臣得以自明者惟無所利於其間爾而天下之人所以為信者亦以其無所利焉今拯併逐二臣自居其位使將來姦佞之人得以為説而惑亂主聼今後言事者不為人信而無以自明是則聖明用諫之功一旦由拯而壞夫有所不取之謂廉有所不為之謂恥近臣舉動人所儀法使拯於此時有所不取而不為可以風天下以廉耻之節而拯取其所不宜取為其所不宜為豈自薄其身亦所以開誘他時言事之臣傾人以覬得相習成風此之為患豈謂小哉然拯所恃者惟以本無心爾夫心者藏於中而人所不見迹者示於外而天下所瞻今拯欲自信其不見之心而外掩天下之迹是猶手探其物口為不欲雖欲自信人誰信之此臣所謂嫌疑之不可不避也況如拯者少有孝行聞於鄉里晚彰直節著在朝廷但其學問不深思慮不熟而處之乖當其人亦可惜也伏望陛下别選材臣為三司使而處拯他職置之京師使拯得避嫌疑之迹以解天下之惑而全拯之名節不勝幸甚臣叨塵侍從職號論思昔嘗親見朝廷致諫之初甚難今又獲見陛下用諫之效已著實不欲因拯而壞之者為朝廷惜也臣言狂計愚伏俟誅戮五年修舉布衣蘇洵奏曰臣猥以庸虛叨塵侍從無所裨補常愧心顔竊慕古人薦賢推善之意以謂為時得士亦報國之一端往時自國家下詔書戒時文風勵學者以近古蓋自天聖迄今二十餘年通經學古履中守道之士所得不可勝數而四海之廣不能無山巖草野之遺其自重者既伏而不出故朝廷亦莫得而聞此乃如臣等輩所宜求而上逹也伏見眉州布衣蘇洵履行淳固性識明達亦嘗一舉有司不中遂退而力學其論議精於物理而善識變權文章不為空言而期於有用其所撰權書衡論機䇿二十篇辭辨閎偉博於古而宜於今實有用之言非特能文之士也其人文行久為鄉閭所稱而守道安貧不營仕進茍無薦引則遂棄於聖時其所撰書二十篇臣謹隨狀上進伏望聖慈下兩制看詳如有可採乞賜甄録謹具狀奏聞慶歷三年監察御史裏行包拯論縣令輕授疏曰臣聞古之所重為民父母者縣令耳今之所賤而不能振起風教者亦縣令耳蓋擢用之際未精其選凡其清流素望或稍挾權勢之人即茍謀他官恥為縣道但庸人下品甘於其職雖郡𨽻吏卒皆能訶制茍免罪戾之不暇欲振起風教為民父母其可得乎且今朝廷仕進清選大臣子弟偶緣文墨或希辟命即自下僚擢升館職不然才出外任例為簽判不繇為縣便作通判知州洎為長吏昧於民情懵然其間不知治道之出況四方多務令長尤在得人欲乞今後貼職并簽判及京朝官凡歷任中不曽任縣令及知縣者不得便為長吏按察之官且令知縣方得入通判知州如此則宰邑得其人長吏亦不能僥求而至四年拯請不用苛虐之人充監司第一劄子曰臣竊見諸道轉運司自兼按察及置判官以來并提點刑獄等體量部下官吏章疏相繼頗傷煩碎兼聞審刑院大理寺日近奏案尤多倍於往年況無大段罪名並是掎托微纍不辨虗實一例論奏孤弱無援者則按以深文權勢豪猾者則縱而不顧內則徇一身之利以殖其私外則竊振職之名以圗其進效尤無恥惟恐不及至有公清守節之人或不曲事左右為衆所嫉者即被加誣搆成其罪遂使守已之士或負終身之玷可不痛惜哉且治平之世明盛之君必務德澤罕用刑法故董仲舒曰陽為德為春夏當和煦發生之時隂為刑為秋冬在虗空不用之處以此見天任德不任刑也王者亦當上體天道下為民極故不宜過用重典以傷德化昔暴世法網凝密動罹酷凶下不堪命卒致潰亂老子曰其政察察其民缺缺其政悶悶其民淳淳臣願聖明鑒於此言而無忽焉方今民力凋殘國用窘迫若乃専用刻薄好進之吏則民不聊生竊恐非國家之福也雖朝廷纍降詔命約束罕或遵稟此弊不去為患寖深欲望聖慈宣諭執政大臣應轉運提刑等並令精選廉幹中正之人以充其職苛細矯激之輩屏而不用則天下幸甚拯又進第二劄子曰臣先曽上言以諸道轉運使自兼按察及置判官以來并提點刑獄等體量部下官吏頗傷煩碎兼審刑院大理寺奏案尤多倍於往年況無大段罪名並是掎托微纍不辨虛實一例論奏此蓋茍圗振舉之名以希進用之速爾遂使天下官吏各懷危懼其廉慎自守者則以為不才酷暴非法者則以為幹事人人相效惟恐不逮民罹其患無所訴告殆非陛下委任之本意也其被體量之事或智慮所不及或人情偶不免若非切害亦可矜憫雖欲改過其路亡繇豈不痛惜哉兼訪間天下茶鹽酒稅逐處長吏曲徇轉運使之意以求課額羡溢民則例遭配買商旅則倍行誅剝為國斂怨無甚於此且朝廷設按察提刑之職蓋欲去貪殘之吏撫疲瘵之俗今乃務為苛網人不聊生竊恐未為國家之福也比者幸屬郊禋盛禮大霈慶澤欲乞於赦書特行約束凡官吏先被體量者情非重犯咸許自新後或不悛必置於法庶使悔過之人免負終身之纍其諸處茶鹽酒稅亦乞除元額外不得擅增課利騷擾人户應係自來諸般調率且乞權罷以安海內生靈之心伏望聖慈少賜省察仁宗時拯引王旦等故事論奏曰臣讀先朝實録大中祥符中并益二州嵗滿當代先帝遍閲侍從官姓名謂輔臣曰此等各有所長然求其文雅適用可委方面者鮮矣每念有唐名賢比肩而出何當時得人之多也王旦等曰方今下位豈無才俊或恐拔擢未至爾然觀前代求賢不求其偹不以小疵掩其大德今兹立朝之士誰為無過陛下每務保庇之然流言稍多則亦梗於任使大都迭相稱譽近乎黨糾過訐非近乎公鑒其愛憎唯託上聖誠哉是言至切至當緣近世之患正在於此以四海之廣不患無賢而患在信用之不至爾且頃嵗以來凡有才名之士必遭險薄之輩假以他事中傷逮乎屏棄卒不得用議者迄今痛惜之欲望聖慈申命宰執應臣僚素有才行先以非辜被譴如楊紘王鼎王綽等雖曽敘用未復職任者並乞復與甄擢或委之繁劇必有成效如是則風化日益美賢傑日益聳積之以久和氣洽乎上下矣拯知諫院請復封駁疏曰臣伏見朝廷近日凡有除改制命已行或物論未允者則臣僚上疏論駁因而追改者有之然未若精擇而後用之之審也故外議喧然謂進退可否之柄不専於上流聞四方大損國體且兩漢而下並以左曹給事中顯駁正之任李唐尤重其選若擢用未當則論列于內不顯揚于外蓋不欲明君之過沽己之直也近代則不然但建一䇿議一官則必揚言于朝以為己功噫為臣之選豈當如是乎竊覩國家循舊例置門下封駁司以近臣兼領未嘗見封一敕駁一事但有封駁之名而無封駁之實因循不振豈不惜哉且歷代典故淪廢多矣此局幸而未墜祇在舉而行之臣請特正封駁之職選兩制以上慎重介直不撓者主之或命諫官兼掌應有除授之制並先由門下其不可者得以辨别是非封還詔敕如此則差易改正兼免漏泄少裨聖政拯又請先用舉到官疏曰臣伏覩近日降敕節文委中書樞密院選舉主二十人令舉堪充知州通判知縣各一員者蓋國家精擇良吏之深旨也所有內外被舉之人至今未見擢任兼訪聞逐路轉運使纍有體量到州縣長吏等其間不才貪猥之尤甚者欲乞所舉人內先次進用令往彼衝替若候人數足日方議差除則疲乏之民受害深矣況幅貟至廣官吏至衆黷貨暴政十有六七若不急於用人以革其弊亦朝廷之深憂不可不察拯又論委任大臣疏曰臣嘗讀漢書谷永傳曰帝王之德莫大知人誠哉是言也夫王者端居巖廊之上垂拱而仰成者以能知人能官人使之然爾或異於是則雖堯舜之焦勞癯瘠亦不能成無為之化也伏惟陛下以明睿之姿勵精求治之切中外臣僚才與不才固無有能逃聖鑒者矣且丞弼之重最為今之極選而治亂繫焉若乃挺然盡心敢任天下之責者即當委而付之設或拱默取容以徇一身之利者亦當罷而去之惟在陛下神機洞照甄别而信任之爾若任而不擇擇而不精非止不能為治抑所以為害矣夫近臣中素有公望實才衆所謂賢者陛下既得而知之亦宜亟擢而用之若知而不能用用而不能盡其才何以致理哉不可以邉陲不聳恬然便謂無事況諸路飢饉相繼財用不足府庫虗竭士卒驕惰振舉紀律杜絶萌漸正是可為之時固宜參用賢者助成治體此尤不可緩也大抵今之居位者挾姦佞則蔽善而背公溺愛憎則賣直而嫁禍言翕言翕然但以勢利相軋茍得無恥豈有援賢進能之意乎倘令如是輩比肩並進而望風俗日益美教化日益成其可得哉論者皆曰今若以廉直退讓有才之士擇焉而用置諸左右則向日之失立可矯正而邪諂茍且忌刻姦險之徒當不令而去矣陛下何憚而不為哉臣以孤賤之迹叨預言責之任圗所以為報者惟思傾竭愚慮庶可上裨聖政萬分之一碩陛下少留神明則天下蒙幸拯又論大臣形迹事疏曰臣伏見朝廷纍年以來凡進用庶官裁處大事必避形迹以為公道上下相蔽習以為常有才者以形迹而不敢用不才者以形迹而不敢去事有可為者以形迹而不為事有不可行者以形迹而或行此蓋茍避中傷以防後患爾為身謀則可為國謀則不當如是此最時政之大害也且天子擇宰相宰相擇諸司官長諸司官長參舉僚屬俾公卿大夫而下各稱其職然後推誠委任坦無疑二則中外協濟政務修舉如此而不臻治平者臣所未諭也臣伏讀唐書太宗朝或言魏徴阿黨者帝使溫彥博驗之無狀因令彥博讓之且曰今後不得不存形迹他日徴入奏曰臣聞君臣協契義同一體豈可不存公道惟事形迹若君臣上下同遵此路則邦之興喪或未可知帝瞿然改容曰吾已悔之矣又高宗嘗責侍臣不進賢才李安期對曰聖帝明王莫不勞於求賢逸於任使設使堯舜苦已癯瘠不能用賢亦王化不行況天下至廣非無英彥但比近公卿薦引即遭囂謗以為朋黨況沈滯者未伸而在位者已損所以人思茍免競為緘默若人主虗已招納廣務搜訪不忌恩讎惟能是用讒既不入誰敢不竭忠誠此皆事由君上非臣下所能致也高宗深納其言所以貞觀永徽之代最號太平者蓋由廣延納之道推至公之心使之然矣宜乎載在史册煥為美談伏自陛下嗣守神器已逾二紀日御便殿孜孜求治雖古先格王未有如是之焦勞也而時多疵癘民未富庶國廪罕蓄邦計益削者何也蓋知人用人之道恐有所未盡爾昔齊桓公問管仲曰何者害霸曰不能知人害霸也知而不能用害霸也用而不能信害霸也信而又使小人參之害霸也夫管仲一諸侯佐爾猶慎於信用小人況巍巍盛德復將有所間然乎伏望陛下奮乾剛之威確然英斷申命宰執進用賢雋斥去形迹之弊以廣公正之路判忠佞抑僥幸察左右愛憎之説延中外讜直之議慎重名器振舉綱目則可使教惇于上民悅于下召天地之和氣致邦國於永寧惟在陛下日慎一日力行而已拯又彈宋庠疏曰臣等今日中書傳諭奉聖旨宣示宋庠自辨及求退等事臣等蒙陛下擢任處之諫垣惟采取天下公議别白賢不肖敷聞于上冀陛下倚任常得其人以熙大政不使貪冒非才者得以膠固其位害敗于事乃臣等之職分陛下所責任者也固不敢緣私詆欺變白為黑惑亂陛下耳目動搖大臣爵位以取竒譽巧資身計斯亦臣等所自信陛下所明照者也臣等昨於二月二十二日具劄子論列宋庠自再秉衡軸首尾七年殊無建明略效補報而但隂拱持祿竊位素餐安處洋洋以為得䇿且復求解之際陛下降詔未及斷章庠乃從容遂止其請足見其固位無恥之甚也今乃自辨謂臣等議論暗合己意臣等亦謂宋庠本意暗合天下之議論斯不近於欺乎陛下所深察矣且云無過則又不然臣等竊以前代至于祖宗之朝罷免執政大臣莫不以其謨明無效取羣議而行也何則執政大臣與國同體不能盡心竭節灼然樹立是謂之過宜乎當黜非如羣有司小官之類必有犯狀挂于刑書乃為過也唐憲宗朝權德輿為宰相不能有所發明時人譏之俄以循默而罷復守本官憲宗聰明仁愛之主也德輿文學德行之臣也當時罷免只緣循默不必指瑕末致罪名而然也至如祖宗朝罷免范質宋琪李昉張齊賢亦只以不稱職均勞逸為辭未嘗明其過也近嵗方乃托拾細故託以為名揚于外廷斯乃不識大體之臣上惑聖聼有乖舉措非所以責大臣之義也宋庠豈無細過臣等不言之者蓋為陛下惜此事體臣等所陳惟陛下聖度詳處若以為是則乞依前來劄子早賜施行儻以臣等為謗讟時宰敢肆狂妄亦乞治正其罪重行降黜臣等無任激切俟命之至拯請選諫議大夫疏曰臣謹按唐六典隋氏門下省置諫議大夫從四品下龍朔中改為正諫大夫開元初復舊凡置四人掌侍從規諫仗下後言朝政得失故其秩峻其任重歷代以至祖宗未嘗輕授近嵗殊不選擇但以任敘遷如眘鏞等輩昏瞶不才而皆踐此職是以朝廷名器容易假人紊黷典常莫斯之甚臣欲乞今後應少卿少監等該磨勘改官如曽經職司委是素有才望為衆所推者方得轉諫議大夫其餘不得徇入止授以大卿監所貴官無濫進流品益清拯請選用提轉長吏官上疏曰臣聞王者之總治天下也內則宰臣百執事外則按察之官刺史縣令而已若中外各得其人協心以濟則陛下垂拱仰成無為無事矣夫轉運使提點刑獄在乎察官吏之能否辨訟獄之寃濫以至生民利病財賦出入莫不蒞焉事權至重責任尤劇設非其人則一路受敝如州縣之職不舉按察之吏又不以聞則朝廷無繇而知是一方之民有終無告者矣昔漢宣帝曰與我共理天下者其惟良二千石乎蓋刺史縣令耳目接於民事政令所出慘舒攸繫今朝廷既以輕授又數數更易其才者雖有育民濟治之具亦烏所施設或又況庸庸者乎今粗舉一二條陳如左竊見近日除授轉運使但理資序不甚選擇若江西路劉緯利州路李熙輔皆知識庸昧衆所共知其提點刑獄亦未甚得人若廣西潘師旦江東令狐挺京西張士安河北席平皆素非幹敏之才或無廉潔之譽猥當是選宜乎不任其職雖近例並委兩制奏舉然所舉之人或才者又格以微文不用故不才者往往進焉乃是訶其細而忽其大恐非任才之意也欲乞今後應除轉運使先望實而後資考則所得精矣凡舉提刑若保薦之人不協公議即乞責其謬舉别委他官如此則可絶徇私之請矣刺史縣令前後條約非不丁寧其中濫進者亦衆如曹琰自通判便授潤州大郡果非理決人致死又聞韓松知鼎州緣本州控接蠻界居嘗屯治軍馬舊係武臣知州後乞選差文資況韓松纍任以不治聞豈可當此邉任乎欲乞今後應差知州並令有司精核治狀審驗人才以州郡繁簡要僻差而授之庶幾不至敗事所有奏舉縣令即令流內銓選注繁劇不治之邑是則民瘼少而和氣可召矣伏望聖慈申命宰府奉而行之則天下幸甚拯請選河北知州疏曰臣近伴北使往回竊見河北當路州軍各係近邉控扼之地所有知州等並是朝廷一一精選蓋欲謹邉防訓士卒以為急務今則不然但能增飾厨傳迎送使人及曲奉過客便為稱職則美譽日聞若稍異於此則謗議紛然往往因此降黜者有之緣每年兩次人使往來動經七八個月逐處豫為準偹不敢少懈況去嵗兩度非次人使乃是一年之內迎送絶無虗日又何暇略謀訓練哉兼訪聞北朝日夕點集兵馬添創營寨但以西討為名然戎狄之心殊不可測議者雖云盟誓堅固萬無負德且安不忘危利或生害又況已然之兆不可不預為之備也臣觀一路武臣未甚得人但售進市恩結挾弭謗爾一旦急用必無成功加以邉偹未完邉廪未實茍有騷動將何取濟此朝廷所宜深慮也臣欲乞今後應緣邉及當路知州部署鈐轄駐泊等並武臣中不以官位高下但選擢有武藝將材可用者任之専責以守偹撫馭之術如有實效不可以浮議數有移替俾軍民安其政令緩急不至敗事如允臣所奏即乞特賜指揮拯請選廣南知州疏曰臣竊見廣南應係知州例差奏蔭京朝官初任知縣及一考者伏惟世祿之胄鮮惇義教童孺之嵗便忝仕籍未嘗學政即使司民甫越期年又移典郡且一邑之事尚未練悉六條之重安可責成地雖逺僻不可輕授方國家多務調率旁午逺民困重尤在得人臣前任瑞州日具知其事或無職官處只是知州獨貟管勾其猥冗恣橫之輩則惟誅求庸懦懵昧者又全不曉事民罹其害無所訴告提刑轉運使憚其逺惡復不能巡歷按劾但上下相蒙耳臣欲乞今後奏蔭京朝官合該廣南知州者並令於次任知縣內選有治績及舉主者方得差移併乞勘會元無職官處各選置一貟仍令轉運提刑司非時不得差出所貴關掌郡事輯寧異俗拯請選利州轉運使疏曰臣伏見中書劄子知巴州楊佐奏昨體量得巡檢䪺士寧為事過當非理打罵兵士州司取勘及提刑轉運使巡歷到州問䪺士寧有何不協只一向盤問所劾官況頓士寧與李熙輔有舊慮作本司採訪施行若頓士寧指論臣詔法何以遵守又見本路提刑司奏巴州見禁巡檢頓士寧并兵士等及轉運使李熙輔到彼審問據頓士寧口稱屈抑及分析知州不公事一面行遣差官往彼推勘及差利州通判史世隆往巴州權交替知州楊佐赴置院照勘奉聖旨令提刑司選清強官盡理取勘施行竊緣楊佐見為長吏部下官屬既有不公理合體量按問今李熙輔乃憑信頓士寧分析一面差官往彼交替楊佐赴推院照勘顯是熙輔與士寧有舊挾私任性不遵詔敕若令舉劾之妄被誣者便下所司與人對勘則今後部下官屬有過長吏顧避不敢按問乃是廢格詔敕而容長姦惡此尤事體不可之甚也兼熙輔不才庸謬衆所共知臣先曽論列未賜施行況利州一路纍經災傷人民凋敝全藉按察之官綏撫鎮靖其熙輔所為如此豈宜久居是職必恐别生事端欲望朝廷選差廉敏才識之士充本路轉運以安逺民如楊佐顯有贓私罪犯即令本路提刑司體量確實事狀聞奏依條施行拯再請選轉運提刑疏曰臣伏見諸路轉運使并提點刑獄自來朝廷凡有差除皆以資序敘遷或用臣僚薦舉間容濫進未甚得人致一方之民必受其害如李熙輔張經等居按察之任當一路之重不能遵守詔敕振舉職業而挾私逞憾無所畏憚妄搆刑獄恣行追攝雖已衝替未足懲戒各乞重行黜降以警將來所有宣州廖詢秀州邉瑀不公事迹中外傳聞昨因安撫奏劾方此彰露而本路提轉殊失按舉居職不稱合正朝典臣欲望聖慈應今後差轉運使提點刑獄臣僚並請選素有才能公直廉明之人充職不以資序深淺為限則逐路得人而官吏有所稟畏矣拯請置發運判官疏曰臣竊以京師大衆之都屯兵數十萬財用儲廪皆仰給於東南主是任者制置發運使最為今之劇職固不可輕以授人況朝廷參用兩制假以事權委任之重不謂不至伏見發運使許元先自判官凡蒞職八年東南利害無不周悉所以嵗運不乏者蓋久任得人之明效也緣施昌言許元績用頗著切慮别有進擢則後來雖有才者必恐未能究財用出入之敝則無由辦集臣欲乞依許元例令置判官一員於朝臣內選差素有公望幹才者充如前久任所貴稔熟其事嗣守成規或昌言等緩急替移免致敗事拯請復韓贄等臺官疏曰臣竊見祠部員外郎韓贄屯田貟外郎孫抗太常博士閻詢等才識明茂資質純正先任御史各以微纍黜免多歷年所屢經恩宥勘會前來所坐原情且非大故棄瑕亦合録用況御史臺闕官甚衆奏舉罕得其人如贄等求之方今實為精選臣以謂可復舊職必允清議伏望聖慈特召還臺或不如所舉臣甘當同罪拯論河北帥臣疏曰臣伏見河北自商胡決溢之後連嵗水旱倉廪匱乏可不深思逺慮而忽天戒也臣近上書以河朔連嵗災傷公私匱乏帥臣長吏尤在得人其有不碩久任者乞於中外臣僚中推擇諳知彼中事宜敢任大責者専委付之俾綏拊疲民經畫遠圗庶幾後患可弭且河朔之於京畿猶心腹之典背膂義同一體休戚均之今災異如是豈可坐視其敝恬然以為無事但欲因循憚於更張措置可乎臣實懼焉惟陛下留神省察以河北事體至大帥臣等可用可罷速賜神斷天下幸甚歷代名臣奏議卷一百三十三
