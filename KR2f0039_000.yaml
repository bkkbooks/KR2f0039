body:
  text: 厯代名臣奏議詔令奏議類二奏議之屬提要臣等謹案厯代名臣奏議三百五十卷明永樂十四年楊士竒黃淮等奉敕編自商周迄金元分六十四門名目既繁區分往往失當又如文王周公太公孔子管仲晏嬰鮑叔慶鄭宫之竒師曠麥邱邑人諸言皆一時答問之語悉目之為奏議則尚書揚言何一不可採入亦殊踳駁失倫然自漢以後收羅大備凡歷代典制沿革之由政治得失之故實可與通鑑三通互相考證當時書成刋印僅數百本頒諸學宫而藏版禁中世頗稀有天崇間太倉張溥號稱淹洽而自言生長三十年未嘗一見其書最後乃得太原藏本為刪節重刻卷目均依其舊所不同者此本有慎刑一門張本無之張本有漕運此本無之蓋溥意為改移至唐宋以後之文盡遭割裂幾於續鳬斷鶴失其本來矣此本為永樂時頒行原書猶稱完善固亦古今奏議之淵海也乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a93f6583ee63705a5cce9e39d78a60dd20ff782a8051c02d735444abca830e61
