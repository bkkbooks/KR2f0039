body:
  text: 歷代名臣奏議卷二百八十九明楊士竒等撰外戚宋仁宗天聖七年羣牧判官龎籍上奏曰帝王行法必從近始使左右貴戚畏而不犯犯而不捨則天下孰敢輕重哉夫左右之臣貴密之戚出入禁闥綢繆寵遇凡常之見所望惟恩望恩不已驕怨漸積諸葛亮所謂寵之以位位極則賤順之以恩恩極則慢夫有賤位之心繼以慢恩之意未有不猖獗踰檢縱肆無憚者矣過惡既盈然後置之文法此前代之亡身覆族者皆由驕之太過制之不早故也所謂將欲福之適足禍之不若以義而斷其恩以法而制其漸知有過不捨則大過不生矣知無故不賞則僥望自息矣諸葛亮所謂威之以法法行則知恩限之以爵爵加則知榮是也使其操履自守常有懼禍之心寵渥所被必懷感恩之意永保元吉與國同休豈非王者待左右親戚之至仁乎孰若養成癰疽使至決潰也臣頃為開封府兵曹參軍伏見王世融因毆本府客司軍將仇保法當贖銅特敕勒任且仇保京府一走吏耳世融貴戚之子也陛下責其橫恣越法停官此實國家用法之至當而保全戚里之深心也若陛下制馭左右貴戚皆如世融則何患法不行而人不畏乎況此數年事耳固未忘于聖心近聞作坊料物庫監官連宫掖之戚侵盜官物事發而逃三司案捕之次降旨不令窮究此非臣本職得自風傳萬一有之未為美事陛下何不使推窮其事付之於法俟其知過後或因赦文稍加收敘或以衣食豢養不使任職若因而悛改是陛下再造其身也此乃公法不屈私恩亦隆臣切惑聖斷異于曩時也計過則此重而彼輕也論屬則彼親而此迹也議罪則彼加法而此貸刑也臣恐中外有或效之者繩之以法是同罪異罰矣因而寬之是法憲廢矣昔漢武時隆憲公主病因以金千斤錢千萬為子昭平君豫贖死罪上許之隆慮公主卒昭平君驕醉殺人廷尉請論武帝曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙廟乎又下負萬民乃可其奏哀不能自止且隆慮帝妹也昭平帝壻也復已許其贖死而終不貸貰者蓋食言之愧小而廢法之失大也故臣願陛下謹法制以齊中外也景祐三年右司諫供諫職韓琦上奏曰臣歷觀方牘槩見后黨率從憑藉罕務檢修是故抑其勢則獲安縱其欲則招禍矧屬聖神御宇慈愛及親既務全恩誠宜杜漸臣竊以新授成州防禦使楊景宗起于寒悴本無勳績特緣戚里遂冒貴階洊警盜於列城復總戎於要地肆情犯法所在奏論矜貸實多豪暴無改近者莊惠皇太后上仙乘驛歸闕所宜哀號夙夜以極追懷而乃未及解裝遽思廣第丁謂故宅晉已賜給制度宏壯宇室延袤都畿之下鮮克倫比況乎左右民舍己從安處一旦驟令移徙不容尋卜所居遂至毁擊閭閻驚驅老幼悉令暴露咸使怨嗟復近于殿廷恣其忿誚輒成喧厲必達上聰恭惟密禁至嚴清光甚邇臣下所履局蹐為常在于宫掖之間猶無畏忌使之州郡之內孰遏侵陵茍不舉劾其非誡勉于後是使無知之性居職任寖為小過謂親寵而不問稔成巨慝豈憲律之當捨是則有漸而故滋其蔓推恩而不保其終徒惻上仁足傷醲化臣欲乞詔下有司明按其罪或屈法以俾之嚮善或申罰以懲其不恭盡繫宸衷少塞輿議臣猥參諫職但罄所聞固不敢乘隙以傾人相時而言事蓋欲陛下全外族而隆孝治存國體也慶歷四年右司諫供諫職余靖上奏曰臣竊聞已降敕命差職方貟外郎張堯佐提點府界諸縣鎮公事外議皆言堯佐識見淺近依託後宫嬪嬙之勢已得內降指揮改賜章服又從內批與省府差遣大臣依違不能堅執遂與府界提點伏惟陛下損節浮費放減後宫絶斜封之官無私謁之寵此皆日來親行至美之事安得更使人言籍籍如此臣深為陛下惜之大凡嬪御親姻但多與財帛足表恩意至如堯佐進士出身自當隨其才望與之差遣何必躐等待之以騰物議府界提點比省府判官固是降等其如吕公弼亦是辭三司判官就此差遣未及半年早已遷陟議者不論其才但言是故相之子所以進用太速將來堯佐若循此例升進外議亦只謂是斜封私謁之類竊恐上纍聖德若陛下必欲愛之不若與有職田一近郡正以表陛下屈己從人之德于堯佐資序亦無所損也八年殿中侍御史何郯上奏曰臣伏覩近日后族戚里非次改官稍多朝廷爵賞本以寵待勞臣非素有勳績即須循年考今橫恩過寵輕授無度竊恐近戚之家迭相攀援人懷異望若各從所求即是名器髙下皆以恩授陛下至公在御凡一爵賞皆循典制推此恩澤必是近嵗戚姻入內有所干求聖心念親親之故不欲拒絶所以致冒賞貪進之人衆而煩黷聖聽況舊有條約皇親命婦不許因入內投進文字求內批指揮差遣及非次改轉恩澤如有內批指揮即令樞密院進呈具此條貫執奏不得輒便施行朝廷著令如此明白臣下尚不遵此若從而遂之即是啓僥幸之門塞公平之路此風寖行為害不細伏望聖慈以義斷恩特賜指揮其近戚干求非次改轉恩澤一切止絶所貴重惜爵秩以允公議皇祐元年郯又奏曰臣伏聞祖宗典故宗室姻戚未嘗委之典禁兵及任要官近年因李昭亮授管幹殿前馬步軍都指揮使公事郭承祐相繼被用遂成此例緣自先朝至今宗室諸院尚未有預領民事者今以兵權付之近戚竊恐競相扳援漸干國政至公任使雖無親迹然于防微杜漸之道固為逺慮伏望詔中書門下樞密院稽求列聖故事自今與宗室連姻臣僚更不得除授典掌侍衛及樞要之任仍立為永制以絶後來非冀之人三年郯出知漢州又奏曰臣伏見三司使禮部侍郎張堯佐慶歷三年冬從開州來是時猶作南宫散郎自頃至今不五六年間遂歷盡要近乃尹京邑乃司計籍緣堯佐雖由進士登第歷官無他過然驟被寵用人情皆以止緣後宫之親非復以才能許之況三司使位望任使為二府之亞跂步便至今堯佐充三司使已踰年若大饗訖事衆議謂陛下以酬勞為名必當進用堯佐在兩府果如衆議命行之日言事之臣必以死爭當是之時陛下欲決用堯佐則當黜言者聽用言者即須罷堯佐酌之兩塗必難並立然用堯佐而黜言者則纍德聽言者而罷堯佐則傷恩纍德則損歸聖躬傷恩則怨起近戚欲聖躬無所損外戚無所怨莫如富貴堯佐而不假之以權如李用和處之正得宜也前古近戚成敗之間其鑒不逺崇寵過當則不免禍咎抑損得所則必能安全禍咎安全不唯其家繫之抑亦國隨而興衰也此書傳所載不可悉數陛下聰明固宜監觀往事以為社稷之計前嵗陛下備禮册命貴妃外廷紛紜已有物議然臣當時未嘗論列者蓋以天子列嬪妃之位明有典章若不干預政事置亦無害今用堯佐至三司使已是預政事況于進處二府則天下之議當以為如何堯佐進用與否固亦未測陛下之意然而已進用而後言縱能追罷其人臣頗獲直名于陛下已損盛德固莫若先事而言冀陛下審處其事使無過差則君臣上下之道兩得之矣臣以言責在陛下左右周旋四五年但事干朝廷大體及大姦大蠧無不論列蒙陛下多賜采納今以親老方將外補唯于堯佐一事心知不可而遂不建一言則異時臣負懷情不盡之責故于將行不敢默默而復布腹心焉伏望陛下幸採臣章俯從公議不徇一時之愛以全千古之名則雖盡南山之竹不足載德美之盛與夫寵一人而失天下之心者不可同日而語也皇祐間知諫院錢彥達上奏曰臣風聞閣門使李璋欲除軍中職名竊以李璋本由戚屬恩澤入官三五年間坐躋顯仕未補邉防經歷事任加以人才懦弱别無勳勞委之師旅未協公議安危之本所繫非輕且諸將有久戍沙漠早立勳績者及外戚貴屬在李璋上者引李璋為比乞軍中職名則朝廷何以却之與之則恩賞失宜不與之則中心觖望可否之際措置頗難且李璋既主兵馬即須出屯疆埸素無韜略之藴訓練之嚴萬一胡人小出斯人何以捍禦本謂愛之實害之也或朝廷以李璋戚屬宜加恩禮不若俟其少有勳勞擢進官資則事體兩全名實相副欲乞出自聖意特賜寖罷李璋管軍指揮庶合中外公議知諫院包拯上奏曰臣伏覩陛下即位僅三十年奉承祖宗謨訓未有反道敗德之事陛下固知之乃五六年超擢張堯佐羣臣皆切議于下然而迹其過不在陛下在女謁近習及執政大臣也何以言之蓋女謁近習動伺陛下之所為知陛下繼嗣未立而有所私莫不潛有趨向而附結之執政大臣不思規陛下以大義乃從諛順指髙官要職惟恐堯佐不滿其意使陛下有私昵後宫之過也此豈愛君之心哉且以本朝故事言之昭憲皇太后誕生祖宗有基命之烈其諸弟杜審肇輩窮老才有得一節度使者雷有終以工部侍郎討平西川得宣徽使李至于先朝有東宫之舊自工部尚書參知政事才用為武勝軍節度使錢若水任樞密副使李士衡以尚書左丞為三司使以及陛下之朝李維為翰林學士承旨刑部尚書陳堯咨為翰林學士知開封府並止換觀察使夏竦立兩府自三司使户部尚書止得散節度使後二年方加宣徽使鄭戬亦曽任樞密副使以資政殿大學士知并州後方加宣徽使又一年乃除節度使今堯佐謂之親則孰若杜審肇兄弟乎謂之賢而功孰若雷有終李至錢若水乎而宣徽節度使并以與之若非內外協應蒙惑攘竊寧至此哉堯佐叨據如此慙羞不知真清朝之穢汚白晝之魑魅也況下制之日陽精暗塞氛霧繼起天道固于人事不逺伏望陛下斷以大義稍割愛情追寢堯佐過越之恩必不得已宣徽節度使擇與其一仍罷羣牧制置使之命俾之外郡以安全之如此則仰合天意俯順人情而重新盛德矣拯又奏曰臣等伏見張堯佐除授宣徽南院使制命復下物議騰沸況臣等以言為職豈敢私自顧慮各為身謀哉直以誕告再行若固守前議復乞追奪于朝廷事體亦似未安所以進退惶惑不即論列雖然事體有必須裁制者不可不深察臣等不得不極陳也張堯佐怙恩寵之厚僥求覬望不知紀極始欲得宣徽使今訖行前命付與之矣雖出領外鎮將來必求入覲即圖本院供職以至使相重任名器之大者盡可皆緣恩私無求而不獲必快己欲以熏灼天下此不可不深察也伏望思已然之失為杜漸之制特降詔旨申敕中書門下諭以堯佐比緣恩私不次超擢享此名位已為過越將來更不令處使相之任及不許本院供職仍趣赴河陽任所庶幾壓塞人情防杜間隙臣等不勝為國納忠激切之至拯又奏曰臣等伏以陛下凡事克己鮮有過舉止于堯佐厚甚不無衆口交非若厭物情理須裁抑然自去冬力爭此事幸賜開納天下皆仰聖度能虛懷而徇諫也今來重申前命所以不即論列乞行追奪者蓋為朝廷曲全事體耳其如大恩不可頻假羣心不可固違假之頻則損威違之固則兆亂伏望以國家至計為念檢會臣等前後劄子必賜施行不勝懇激之極御史中丞王舉正上奏曰臣伏覩張堯佐優異之恩無有其比竊以堯佐素乏材能徒以夤緣後宫僥幸驟進國家計府須材以辦經費堯佐猥尸其職中外咸謂非據近者臺諫繼有論列陛下雖罷其任使而復加崇寵轉踰于前併授四使又賜二子科名賢愚一詞無不嗟駭夫爵賞名數天下之公器不當以後宫迹戚庸常之材過授寵渥使忠臣義士無所激勸且堯佐居職物論紛紜固當引分辭避而晏然恃賴曽無一言自陳叨竊居位日覬大用及異恩既出復託以假告未祇受其意尚若不足繼有邀求不虔君命莫甚于此者昔漢元帝時馮野王以昭儀之兄在位多舉其行能帝曰吾用野王後世必謂我私後宫親戚本朝太宗皇帝孫妃之父止授南班散秩蓋保全後宫戚屬不令事勢僭盛以取顛覆伏望陛下逺鑒前古美事近守太宗皇帝聖範追取堯佐新命除與一郡以熄中外之議伏以陛下自臨馭以來孜孜勤政無有失德今忽行此事有損聖明若濫賞必行則朝綱威柄由此隳紊四方駭任人之失二鄙萌輕國之心臣方叨司憲適覩除命事干國體不敢緘默望聖慈開納速降指揮或臣言之不行即乞罷臣憲司出補逺郡舉正又奏曰臣近以張堯佐再除宣徽使三嘗論奏且人君御天下惟爵賞為大公受授非當則天下竊議堯佐本常才但以夤緣後宫叨據非分自去年冬罷三司使除宣徽使制命方出中外莫不駭聽其時臣與諫官御史至留班欲廷議而爭之尋罷宣徽使尚忝節度名品今四方多虞災異數見若非奬擢有功任用賢直則何以上答天戒下慰民望哉堯佐自罷宣徽使方逾半年端坐京師以尸厚祿今復授之蓋增鄙誚此乃執政不念祖宗基業之重順顔固寵不能執奏制命既行有損聖德若陛下不納臣盡忠愛君之請必行堯佐濫賞竊位之典即乞黜臣以誡不識忌諱愚直之人殿中丞同知禮院司馬光上奏曰臣聞明主勞心力以求諫和顔色而受之士猶畏懦而不敢進又況震之以威壓之以重而望忠臣之至直言之入難矣臣之不忠言之不直而天下安萬事治者未之有也臣竊見臺諌官屢以張堯佐事上言而陛下執之益堅拒之益固前日臺諫官等守閣請對陛下却而不納中外之人莫不駭愕以為異事昔漢元帝欲用馮昭儀兄野王為御史大夫既而疑曰吾恐後世謂吾私于後宫遂不用今堯佐有野王之嫌而無其才陛下不次用之數年間自散郎至宣徽使彼雖實有可稱天下之人安可家至户曉使謂陛下不私後宫哉抑又聞之人有種瓜而甚愛之者盛夏日方中而灌之瓜不旋踵而萎種而愛之非不勤也然灌之不以其時適所以敗之也今陛下貴用堯佐逺過其分天下已側目扼腕而疾之又復摧折忠諫以重其罪是正日中而灌瓜也臣竊為堯佐寒心而陛下獨不為之深思逺慮哉非獨如是而已前者臺諫官不得對之日隂霧冥𡨕跬步相失寒冰著木終日不解臣謹按洪範五行傳聽之不聰是謂不謀厥咎急厥罰常寒又按京房書謂之蒙氣此皆隂氣太盛壅蔽陽明上下否塞疑惑不決之象天意昭然有如教語行道之人皆知其異陛下純孝嚴恭天命容納直言深明得失此非臣之諛乃天下所共知也獨奈何以堯佐之故忽天戒而不顧棄人言而不從輕祖宗之爵祿違古今之明鑒書之簡策使天下之人有以議聖德之萬一或纍于光融髙大之美此臣所以日夜痛心疾首寢不能安食不能飽深為陛下重惜者也臣聞臣之事君猶子事父也豈有父獲大謗于外而子不以告且不諫哉惟陛下亟召諌臣使竭其所聞采納其言而慰安其意以厭上天之心解外廷之惑闢忠讜之路塞寵幸之門則天下歡然歌頌盛德豈有窮哉昔漢明帝作德陽殿鍾離意諫即時罷之後乃復作殿成謂羣臣曰鍾離尚書在此殿不成矣然明帝非不欲為殿也所以屈意罷之者欲全諫臣之節而開直言之端也今臺諫官前後言堯佐者數矣陛下曽不留神省察少為裁減以慰其心夫人主所欲為人臣豈能強變之哉顧自今以往事復有大于堯佐者在列之臣噤默拱手視之而已矣此非朝廷之福也不然羣臣猶朽木陛下猶雷電安可以力校哉惟陛下察之而已矣光又論李瑋知衛州狀曰右臣竊聞駙馬都尉李瑋出知衛州兖國公主入居禁中瑋所生母楊氏歸瑋兄璋之宅其公主宅祇應人等悉令散遣外議籍籍無不怪愕伏以陛下始者追念章懿太后選瑋使之尚主欲以申固姻戚富貴其家今以公主之故使李氏母子離析家事流落大小憂讋殆不聊生豈始所以結婚之意哉近者章懿太后忌日陛下閲奩中之故物思平生之居處獨能無雨露之感悽愴之心乎臣愚以為陛下宜且留李瑋在京師其公主宅祇應人等除作過者逺加竄逐出外其餘並令如舊儲偫什物皆垵堵不移以俟嵗月之間徐以義理曉諭公主庶幾回意易慮率德遵禮復歸本宅則中外之情無不釋然不然公主必無復歸李氏之志者則今日致此衆議紛紜煩瀆聖聽皆由公主縱恣胸臆無所畏憚數違君父之命陵蔑夫家豈可使李瑋獨蒙斥逐出外而公主爵邑請受全無貶損非所以示天下至公之道也嘉祐元年知諫院范鎮上奏曰臣伏見駙馬都尉李瑋家指使小底已及四五十人至今不住傳宣差送又門下出入舉人皆豪室子弟僥幸無賴者又修建主第功役過甚伏以陛下只有公主一人其駙馬所宜愛之納之于善不可陷之于不善今李瑋年少正當向學而多使僥幸無賴之人在其左右修建居室復大僭侈非所謂納之于善也欲乞指揮約定指使小底人數量留外其餘人放令逐便所有出入舉人亦宜慎選免致將來僥求恩澤别招人言仍定居室之制以防僭侈之萌此皆愛惜李瑋之事伏惟必賜施行四年江休復上奏曰臣伏見陛下躬親大夾之禮祇見祖宗之靈所以崇祖妣之恩識昭穆之敘凡在宗屬莫不助祭至于配祔之坐母后之家年祀浸深子孫替墜薦奠之際其何以慰神靈之想哉臣竊見漢章帝詔曰四時陵廟無人助祭先后者朕甚傷之此肅宗所以發德音也今駿奔在廟者不過一二近戚至于杜賀之家宋符之族興微紹絶未有聞焉唐開元初除昭成皇后四從叔太子洗馬仍令檢校本宗子弟此亦前代之令典也昭憲皇太后誕育二聖為一代薑任今子弟失序宅宇蕩析唐旌直言尚猶贖第還付其家矧先后之近屬乎臣謂宜因祫享大慶應先后之家子孫替墜者糾合資贍隨材擢敘量其厚薄遞加恩恤臣茍有所見不敢緘默五年知制誥楊畋上奏曰臣竊觀祖宗故事郭進戍西山董遵晦姚內斌守環慶與強冦對壘十餘年未嘗有轉官之寵蓋謹重名器必須平寇難靜邉隅然後俾之遷授今李珣等無尺寸裨補之功特以外戚故除之臣恐天下謂陛下忽祖宗謹重名器之訓開親戚僥幸之門曲緣私恩輕用王爵後有扞寇立功者復以何官而賞之是以不敢命詞七年御史中丞王疇上奏曰臣聞為國之要號令必信賞罰必當而後治若號令雖具而不行爵賞雖行而不中欲求貴幸斂縮紀綱振舉不可得已近制武臣刺史以上非有功不得遷此實陛下謹守祖宗故事欲使爵賞之柄不濫而不私也今劉永年特以章獻太后故過推恩澤使餘人不得援例抑以條例為不足守而朝廷可以自作而自廢耶法令因公于一人而作之又私于一人而廢之何以取信于天下茍謂永年久次而當遷則刺史以上豈更無一人嵗月稍深于永年者今日指揮但使孤寒之人隔在恩外不得與永年為比豈至公之意乎英宗治平元年知諫院司馬光上奏曰臣竊聞陛下欲加曹佾使相皇太后再三不許又聞有聖旨令皇后本家分析親的骨肉聞奏亦與推恩臣愚以為皇太后既深執謙遜抑損外親則后族亦恐未宜褒進伏望陛下宣諭兩府后族恩澤並未可施行且俟他時徐議其事一則示人子恭孝之心不敢使后族先于母黨二則示人君即政之初不可以爵祿待賢之具獨私椒房之親其于聖德益有光榮神宗時知諫院楊繪上奏曰臣竊以人主之于恩命不可不謹其源其源一開攀援其例者數十年猶泛濫而不可止矣向氏之宗于陛下為后族也髙氏之宗于陛下為母族也曹氏之宗于陛下為祖母族也伏覩差防禦使向傳範知澶州未行間外皆傳向傳範營亷車之命干東平之守臣獨不信之未幾果有改差雖不轉觀察使果知鄆州兼一路安撫使之任臣誠不諳國朝典故然耳目所接近制未省有防禦使知鄆州者亦罕記有防禦使兼一路安撫使者如果無之則是為不次之恩矣陛下始即位一年而后族中已有不次為雄職者若更五七年不惟向氏之宗而已矣設髙氏之宗有至防禦使者攀今日之例而乞之陛下其得不從乎或不從之是厚于后族而不厚于母族矣曹氏之宗有至防禦使者攀今日之例而乞之則陛下又不可以不從也如此則天下如鄆州者凡幾郡兼安撫使凡幾州而可以為外戚之地乎外戚之任皆據要藩于理得為便乎若曰傳範之用自以才者則他人何肯自謂不才乎臣忝諫職其敢畏避而不言也伏乞陛下謹其源塞其例勿徇一時之易而難于五七載之後幸甚哲宗元祐四年中書舍人曽肇上奏曰臣伏覩內降指揮皇太妃親屬滑州韋城縣百姓侯稱昨因斷撲酒務少欠下官中課利并本息錢等認納前界少欠錢可與均作七年送納所有已拘收抵當契書子利等並特先次給于本人餘人不得援例仍與免差人監催臣竊伏思皇帝陛下太皇太后陛下以百姓侯稱是皇太妃親屬之故特為寬展納錢年限給還契書子利等在于縣官事至為末然此令既行竊恐因緣戚屬轉相扳援日月積纍寖紊朝政長干請之風開僥幸之路故先王立事必慮其敝忠臣事君常諫其漸蓋以此也況皇太妃位號隆重海內承仰必不肯以私親小故侵隳紀綱塵玷德美蓋是迫于人情有不得已者然臣竊謂皇太妃儻哀彼困窮豫之金帛可也恐不足以上煩詔令啓此幸門使天下聞之有以窺測此臣尤為皇太妃愛惜事體也伏望聖慈詳思臣言如萬有一得宜及指揮未出猶可追還庶使道路之人無所竊議增廣宫闈盛德所補不細傳曰君子之愛人也以德細人之愛人也以姑息臣心無他竊抱惓惓愛君之忠不敢為姑息而已唯聖明照察幸甚諫議大夫范祖禹上奏曰臣竊聞韓嘉彥已選尚公主此先帝遺意而陛下成之韓琦勳在王室其子尚主天下之人誰曰不宜此于太皇太后陛下為至慈在皇帝陛下為至孝然臣伏見國朝以來祖宗諸公主婚姻之家皆無預政事者今嘉彥己選定宣繫而忠彥執政此非祖宗故事不可為子孫法使後世姻戚預政自陛下始臣竊惜之陛下一言一動當以祖宗為法況執政繫安危治亂最為大事一開此例後不可止陛下自聽政以來于親戚無毫髮之私天下之人無不服陛下之至公今獨于韓琦如此非以報功也陛下念琦之功富貴其家可也至于執政必選天下之望不可專以勳舊如是趙普曹彬子孫何嘗執政豈是祖宗不念功乎自用忠彥以來外議籍籍至今未已今國家既與之為婚罷之有名陛下欲富貴之但使曽歷執政與之前執政官無所不可若必待其有過然後黜之則已傷恩是欲厚韓琦之家反薄之也不若保全忠彥無使至于滿盈顛覆臣今已蒙除新職罷言職不當更論執政然臣前上殿已嘗面論今又變祖宗故事所繫甚大雖欲去職不敢不為陛下一言臣與忠彥是親素無嫌隙但不忍上負陛下任使不欲陛下有所不知耳今在朝廷之人多出于韓琦之門雖忠彥不協人望以琦之故皆莫肯言亦乞陛下知察祖宗以來無強族根據朝廷今忠彥執政弟尚公主恐權戚大甚宜防其漸紹聖元年吏部侍郎彭汝礪上奏曰臣聞治國者自家始治家者自夫婦始夫夫婦婦天地之道也隂陽之義也夫婦之分不正欲其家治家之政不行欲其國治未之有也周之王姬下嫁于諸侯車服不係其夫猶執婦道以成肅雍之德詩人美之曰曷不肅雍王姬之車言王姬車服之盛宜以貴驕人而猶執婦道乃所以為美也其事在下然本乃在乎上故其詩曰平王之孫齊侯之子惟有平德故其人化之而有所不能踰惟有齊德故其人畏之而有所不敢違周之盛蓋始乎此夫夫婦婦父子君臣其義一也今嘉彥以不能下長公主而廢是婦得以勝夫矣婦得以勝夫是子可以勝父臣可以勝君其源一開其流有至于不可塞此不可不慎比聞朝廷無故而除三團練今又以私事而竄一都尉人皆以為政在房闥矣賞罰天之命也故雖朝廷之大人君之尊有不得而専之者天命何在至公而已詩曰無曰髙髙在上陟降厥士日監在兹事至微者天猶監之況其大者乎此不可不畏或曰皇帝陛下仁孝深至出于天性內思所以致皇太妃之敬外思所以致長公主之愛故有此行遣臣聞以其道事其親之謂孝以其義而愛其骨肉之謂仁今使婦得以蒙其夫則人倫悖于上風俗壞于下必非皇太妃所欲為者也今雖能逐一嘉彥然使謗議歸于朝廷譏誚行于後世所謂愛之適所以傷之也夫婦之情貴賤一也故雖有朝夕之小隙實未傷終身之大愛此惟陛下有以矜而察之而已夫天下至大一安一危指顧之間而已今陛下欲拂于親而安行之大臣不敢拂陛下而順承之如此而欲安天下國家未之有也惟陛下慎之母忽元符三年御史中丞豐稷上欽聖皇后疏曰臣竊觀自古母后臨朝危社稷亂天下載在史册可考而知手書還政未有如聖母退抑謙遜之盛德可為萬世法諫官陳瓘何從而知尚與政事臣嘗具奏非宫省親近之臣即外戚招權者妄傳於外臣今外則唯聞向宗回宗良藉勢妄作欺惑于人內則唯聞張琳裴彥臣等凶諂熖熾翰林學士承旨蔡京交通其間宫禁預政之言中外喧傳人誰不知諫官陳瓘不勝哀憤獨先抗章冀開寤二聖之心臣愚欲乞戒飭外家竄逐琳等黜京于外聖母燕處宫闈清心養性小大之事不關睿慮安享聖子晨昏之奉四海之養恬淡無為以永萬夀兩宫和樂朝廷清明非特援立功德輝映古今抑亦合易之謙卦天道虧盈益謙鬼神害盈福謙之義坐致五福流令聞于無窮豈不至善至美乎臣自踈逺伏遇垂簾拔擢至此不敢緘默孤負明恩惓惓愚誠伏乞俯垂聽察哲宗時陳次升上奏曰臣竊聞以堆垜場賜孟在為宅者恭惟皇后配儷宸極母儀天下賜父之第誰曰不宜然堆垜場密通宫禁其方在東其卦屬震東方青龍之宅也震長子位也常人之家猶忌侵犯況國家社稷之重乎兼聖嗣未立長子之位臣庶居之尤非所宜熙寧間欲就彼建東西府日者言其不便先帝罷之今若賜在為宅則在之宅居其東禁城居其西以尊卑言之則未順以隂陽言之則失宜況祖宗以來所賜戚里第未有如此近者亦防微杜漸之意也伏望聖慈别賜在宅先來所賜堆垜場指揮乞行追寢徽宗即位初右正言陳瓘上奏曰臣聞知幾而預戒則君無過舉先事而早諫則臣無智名君明臣良上下兩得治道所以隆也臣以駑散之材冒處言職適遭明聖之主竊慕良臣之義事有臨機不當默者安可有待不早言乎宋有天下一百四十一年矣太平之久堯舜三代乃至漢唐皆不及也譬如安樂之人年過百嵗猶當兢兢畏慎護養元氣無使疾恙乘間而入則愈老愈健永保康寧之福矣祖宗以聖繼聖古無有也母后繼有聖德亦古無有也天覆地載一健一順萬物生成各遂其性至神考而治道益隆至皇太后而家道蓋光可謂盛之極矣盛必有衰安可不預戒乎漢之衰也以外家太盛人不敢言以至亡國陛下守祖宗之成法監衰漢之覆轍宋德方隆內外無患然以臣所聞宜預戒者有一事焉恐陛下未知也恐皇太后未知也向宗良兄弟交通賔客漏泄機密陛下知乎皇太后知乎皇太后功隆德備格于皇天陛下極天下養未足以報維使我宋固萬年不拔之基外家享與國無窮之福然後足以為報漢唐母后稱制有至終身或欲威福之柄久出于己或因左右之請貪戀權勢惟我皇太后恬寂足以外威福嚴明足以戢左右不待袝廟果于還政事光前古名垂後世陛下所以報皇太后者宜如何哉臣恐假借外家不足以為報也乃者還政以前陛下欲除向宗良等開府儀同三司將鎖學士院矣而皇太后詔寢此命中外傳聞咨嗟歎仰知皇太后以撝謙為德而陛下以養志為孝也漢章帝欲加恩三舅馬后曰吾觀富貴之家祿位重疊猶再實之木其根必傷何必營外家之封違慈母之拳拳至孝之行安親為主此吾家之事故得専之吾當含飴弄孫不能復關政矣于是章帝不封其舅今皇太后盛德全備與天同功非馬后之比臣之所言但欲有補于外家而已想亦皇太后之所樂聞也若不達聖母之心而自為猜嫌之慮當言不言臣所不忍臣謂馬后之所以詔其子章帝之所以順其親內慈外孝兩得之矣陛下及皇太后前日之事撝謙養志正與此同天下之所以服也漢哀帝之初急封諸舅孔光諫曰天下者陛下之家也肺腑何患不富貴不宜倉猝若是其不久長矣帝以逼于傅太后不能從也今皇太后詔寢成命不待孔光之言陛下恭稟慈訓遂無倉猝之舉此乃前古難行之事于今見之皇太后之聖德可勝言乎陛下所以報皇太后者宜如何哉臣恐假借外家不足以為報也陛下雖受天眷命歷數在躬然而力摧異議獨定大策者皇太后也蓋有功于陛下者天及皇太后而已天道公而不私陛下之所以報天者宜如何哉皇太后為而不恃功成不居陛下之所以報皇太后者宜如何哉陛下以道制情無一毫之私則可以服人之心服人之心則可以得天之心得天之心則可以合皇太后之意矣神考之所以報慈聖者用此道也治平之未韓琦為相中外協心定策為易前日之事章惇秉政首唱異議定策為難然則皇太后之功比之慈聖又為光矣陛下之所以報皇太后者宜如何哉唐之衰也天以定策之功付于矜伐之臣于是責報不已而有負心門生之語主道之強弱可見于此矣今者功出聖母國本既正唯陛下永思所以圖報而已大公之報報之上也假借外家豈足以為報乎宗良兄弟依倚國恩憑藉慈蔭夸有目前之榮盛不念倚伏之可畏所與遊者連及侍從希寵之士願出其門裴彥臣無甚幹才但能交通內外漏泄機密遂使物議籍籍或者以謂萬幾之事黜陟差除皇太后至今與也良由中外關通未有禁戒故好事之人得以溢傳耳若非皇太后明諭聖意嚴加約束則籍籍之口未易塞也仁宗篤于舅家尤以李瑋為賢詔瑋舉官為將領瑋言家有賔客之禁無以知士人之賢否仁宗特許瑋見賔客而命日抄所見賔客名氏以聞蓋仁宗之所以保全外家者委曲周旋至于如此神宗敬厚曹佾加以王爵然而佾口不敢薦一人佾門不敢接一士日飲醇酒以自娛樂而已神考所以厚佾而無厭者以其得外戚之體也宣仁聖烈皇后戒訓外家尤為切至紹聖時利口之禍幾及門户然而髙氏之族終獲免者則亦宣仁訓戒之明效也皇太后功德之大光于前人念保持之艱為無疆之慮事戒其漸正在今日老子曰為之其未有也治之其未亂也凡未有之事今雖無之後或漸有既有而後圖不如未有而先戒也漢之馬廖章帝之舅也傾身交結冠蓋之士爭趨赴之遂至于私贍三輔第五倫之所言者是也今雖未有此事安可以不戒其漸乎王氏依東宫之尊假甥舅之親以為威重內外要官皆出其門推譽者登進忤恨者誅傷劉向之所言者是也今雖未有此事安可以不戒其漸乎杜欽谷永自託于外戚專攻人主之身而無一言敢及王鳳遇有災變則返推天異歸之他人以為外戚之地懷二心之士如欽永者何代無之今雖未有此事安可以不戒其漸乎成帝之時外家子弟據勢滿朝成帝欲以劉歆為中常侍臨欲拜官而左右奏曰未白大將軍不肯奉詔帝雖堅執終不能奪由是朝廷之事只由外家不由成帝今雖未有此事安可以不戒其漸乎王音王根奢僭不法天子怒之于是兄弟欲自黥劓以謝太后封侯之日黃霧四塞諫大夫楊興等以王氏為言于是大將軍惶懼乞骸辭職然而外家強盛故人主之威終不得行今雖未有此事安可以不戒其漸乎神考有言曰荒墜顛危可見前車之失亂賊姦宄厥有履霜之漸臣愚以謂欲見前車之失則往古之事不可以不考欲辨履霜之漸則方今之事不可以不戒老子曰合抱之木生于毫末九層之臺起于纍土事之有漸者無不然也漢之王商王章皆當時之賢臣因為王鳳所惡一則死于暗昧之過一則死于縲紲之中當此之時外家之勢已如合抱之木九層之臺豈一手之所能拔豈一鍤之所能平哉商等區區可憐而諫諍後時戒之不早何益于事今臣所論乃在于纍土毫末之初遏萌杜漸何難之有在陛下從容之請皇太后一言之詔而已自古戚里侵權便為衰世之象外家干政即是亡國之本亦如州縣之政只要權出于一若使守令之家子弟親戚交通賔客關節無禁如此則姦人鼓舞良民咨嗟此亦陛下及皇太后之所不取也以小諭大有以異乎臣願陛下採芻蕘之言念老子之説遵神考之訓合太母之心以臣此疏達于慈闈若蒙皇太后察臣愚直以慈衛之則自今日以往憂國亡身之士皆欲竭忠自效而無所畏矣臣下盡樂告之忠朝廷有不諱之美善祭如虞舜不吝如成湯聖德日躋治道日隆我宋固萬年不拔之基外家享與國無疆之福豈特賤臣一身之幸乎如其不然則臣有僭易妄言之罪罷黜投竄理不可逃在陛下命之而已臣以孤逺寒賤之迹誤蒙陛下過有拔擢責臣不輕眷臣方厚臣是以及時而言先事而諫豈敢以身之不肖而自廢其所當言乎孔子曰君子不以言舉人不以人廢言臣雖不肖而區區之言有益于朝廷有補于外家若不以臣之不肖而取臣之言則忠言由此而並進若以臣之不肖而廢臣之言則諂言由此而交入聽言治之基也信諂亂之本也國家治亂之機在此一舉臣一身螻蟻之命安危生死豈足道哉臣不勝惶懼待罪之至右正言鄒浩上奏曰臣伏見陛下即位之初皇太后權同聼政所以協濟艱難為宗廟社稷無窮之計本朝故事惟慈聖光獻皇后垂簾之日與章獻明肅皇后宣仁聖烈皇后事體稍異然猶久之方始復辟今皇太后乃深自退託不敢引三后為比初降手書期以祔廟禮畢不復與政既又不候祔廟亟踐初言自古以來方册所載母后之美未有如皇太后功德如此之盛者也易曰進退不失其正者其唯聖人乎皇太后可謂不失其正矣普天之下雖三尺童子尚知歌舞稱頌況忠義有識之士哉陛下天性仁孝思所以報功德者甚切是以向宗回等以次超擢莫不曲盡其厚雖非陛下以此為私而宫禁之間所以奉皇太后之歡心者無所不至蓋可推此而知也今士大夫或不深惟陛下厚待母族之意往往奔走其門務相交結甚者隂使腹心密致誠欵似欲因緣勢力以為進身固位之地一時公議頗亦疑之然臣聞舊來向族子弟所為稍有不善皇太后必遣使切責以此人人畏懼唯務寡過而向宗回等又素以修飾見稱于時縱使士大夫切于自謀決不為之改操但恐向族子弟至多其間豈無思慮不審之人萬一為士大夫所誤不能逺嫌以動公議臣寮有以聞者不知陛下何以處之若不行則無以正祖宗之法度若行之則無以慰慈闈之至念不唯陛下難處在皇太后處之亦甚難也且陛下之立也大臣固有異議者賴皇太后以宗廟社稷為心斷然不搖大計以定而陛下既立之後天地協應人心自歸六合之間盡為和氣故雖蠻夷戎狄逺在聲教之外亦莫不稽首面內幸不世出之遭遇是則皇太后之功德又孰得而形容之邪功德如此皇太后乃委而弗居深自退託雖帝堯之克讓大禹之不伐何以復加方且含飴弄孫尊享太平之福與陛下同之如天長地久安可使難處之事輒有聞于天下乎臣愚伏願陛下于從容省侍之際密以此事稟皇太后乞自皇太后密加覺察若外議無實則已果有其實乞自皇太后密加訓敕以杜其漸庶幾外則不廢祖宗之法度內則不動慈闈之至念使天下咸仰陛下奉親之聖孝咸仰皇太后立子之功德永永萬年無有窮已而向族子弟保其令名亦有無窮之顯豈不美歟臣昨以罪逺竄分死瘴鄉蒙恩生還復以舊職實在陛下即位之初皇太后垂簾之日今身體髮膚皆陛下皇太后之所再造所以圖報大恩尤非其餘臣寮之比若于此時有所見聞噤不啓口至它日臣寮有奮不顧身而言者然後亦從而言之則臣之罪大矣敢不豫以奏陳伏望聖慈赦其狂妄而納其愚忠不勝幸甚不勝幸甚大觀二年御史中丞吳執中上疏曰臣竊惟祖宗垂訓百有餘年戚里宗屬不以與政非待之薄遇之不厚也其憂深慮逺可謂至矣養之以豐祿髙爵而不使之招權擅事從容進退以永保其安榮誠所以厚之不薄也乃者陛下降德音下明詔追述成憲戒前世禍亂之失俾自今勿復援韓忠彥例以戚里宗屬為三省執政官世世守之著為甲令布之天下孰不以為至當繼嘗以鄭居中同知樞密院事而後宫恐懼知詔旨之不可違也懇請罷免陛下以其陳義堅慤終不可奪即以居中為中太一宫使詔書傳播聞者欣欣有以見陛下正家以治天下之效也曽未半嵗乃復以前命擢用居中自此中外未免疑矣臣竊為陛下惜之陛下手詔當與典謨並傳示萬世而遽自改易以開他日外戚任事之端非所宜也後宫承陛下道化乃能推逺權勢以祖宗典則屢陳義懇請居中儒者也不知出此偃然居位曽莫之避獨不愧于心乎祖宗遺訓著之金石陛下明詔爛如日星衆目所視不可掩也為居中計者宜深自警懼以逺嫌疑優遊祠宫涵泳聖世坐享寵祿長無憂虞世豈復有居中比者伏願陛下勉徇公論申明丁亥二月詔旨罷居中政事俾復以宫使奉朝請信示萬世以釋羣疑臣不勝幸甚髙宗時后父邢煥除徽猷閣待制太后兄子孟忠厚顯謨閣直學士侍讀衛膚敏言非祖宗法煥尋換武職忠厚自若俄遷膚敏中書舍人膚敏懇奏曰昔司馬光論張方平不當參知政事自御史中丞遷翰林學士光言以臣為是則方平當罷以臣為非則臣當貶今兩無所問而遷臣臣所未諭臣雖不肖願附于司馬光又言事母后莫若孝待戚屬莫若恩勸臣下莫若賞今陛下順太母以非法非所謂孝處忠厚以非分非所謂恩不用臣言而遷其官非所謂賞一舉而三失矣帝命宰相諭膚敏曰朝廷以次遷官非因論事也膚敏猶不拜翰林學士汪藻上奏曰臣近準中書省送到録黃一道三省同奉聖旨邢煥係朕之后父即令換武職忠厚係隆祐太后之親兼前朝非后父亦有任文臣者宜體朕優奉太后之意書讀行下者右臣聞人主之政公與私不並行恩與法不兩立以公滅私以法奪恩者治以私害公以恩撓法者亂兹古今不易之道也陛下以邢煥為中宫之父易文資從武中外之人莫不以為當而稱贊聖德不已者以其出于公法也至以孟忠厚為係隆祐太后之親今依舊文資中外之人閧然不息致臣寮交章論奏雖煩聖訓諄諄誨諭終莫能弭者以其出于私恩也昔漢明帝馬后為章帝之母帝欲封其家太后屢辭不許帝重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎其言可謂切至而后終不從至數年僅許封關內侯而已彼外戚封侯漢法也而明德拳拳如此豈不以婦人內夫家外父母家宗族太寵非已之福耶故自古欲觀母后之賢否者無他在於能逺外家之寵與不能耳隆祐太后盛德著聞天下三十年于兹矣今一旦以忠厚之故使陛下屈公法而隆私恩臣恐海內之人非特得以議陛下而于隆祐亦不能無疑非所以成隆祐逺嫌之德而全陛下孝養之誠也此事所係非輕臣不敢緘默伏乞睿慈撿會以前臣僚章疏詳加省覽早賜施行所有邢煥孟忠厚書讀行下指揮臣未敢施行謹録奏聞御史中丞廖剛上奏曰臣聞王制曰爵人于朝與士共之傅説曰監于先王成憲其永無愆夫爵人于朝而稽之于士夫或非公論稽之于先王或非舊制則議者必以為過舉可不謹哉臣伏見近日戚里除授每加優異往往不用祖宗故事豈以比年以來外族凋踈于是深軫聖慈務極恩意而然歟此固陛下睦姻之厚德也然而德陛下之賜者甚寡而不以為然者天下皆是此不可不知也前日孟忠厚以郡王出守鎮江今潘正夫又以駙馬都尉除開府儀同三司是己歷考祖宗朝駙馬都尉惟石保吉以履歷外任嘗著成效于行營乃于晚年才得使相自餘皆無此除如以郡王出守則未之有也忠厚正夫儻于艱難時嘗有勳勞在人耳目則越常制而寵異之其誰曰不然今徒以存撫之故而廢祖宗之法以啓僥幸于後人無怪乎輿議之未孚也然開府者既已敷告大庭日傳千里矣分符者又已就郡臣亦嘗以為請蒙陛下為臣道其所以矣臣之區區固知其無及于事然執法臣之職也陛下嘗謂臣祖宗之法不可輒改臣以謂上行法則下知所從上廢法則下亦莫之守矣臣願陛下特降處分孟忠厚潘正夫差除係一時特恩後人不得援例仍自今除授有非祖宗舊制並許給舍臺諫論駮當不憚改如此庶幾幸門杜絶而天下皆知陛下如天之無心也武義大夫曹勛上書曰臣竊以聖王御極總覽人群股肱之政固賴英賢其左右任使必援姻戚以居肺腑使之親踈相錯杜塞姦邪周漢之法雖不可全用而加恩戚屬俾典宿衛似猶勝四海之人且子母之性天道至親母以子貴自古皆爾陛下即位以來至親分離外戚杜隔使恩禮不得兼宣非所以安宗廟重社稷宣德澤尊至親也今母后之族久廢不録散在遐逺不得日望清光誠非慈愛承上之意況離亂日久人肆異謀威令不行叛逆僭號至或訛言憸行驚懼宿衛此誠可慮儻追召一二姻戚任以散官使奉朝請防未然之事察羣下之端為陛下肘腋之親豈不恩禮兩全聖孝俱至哉伏望斷自聖心幸甚孝宗時左司諫陳良祐言陛下躬行節儉弗殖貨利或者託肺腑之親為市井之行以公侯之貴牟商賈之利占田疇擅山澤甚者發舶舟招蕃賈貿易寶貨糜費金錢或假德夀或託椒房犯法冒禁專利無厭非所以維持紀綱保全戚畹願嚴戒飭茍能改過富貴可保如其不悛以義斷恩理宗時劉克莊進故事曰乾德四年上宴紫雲樓謂趙普等曰下愚之民不分菽麥若藩侯不為撫養務行苛虐朕斷不容之紹興二十五年御批孟忠厚宫觀奉朝請魏良臣奏忠厚戚里中最賢上曰朕深不欲以外戚任朝廷之事萬一有過治之則傷恩釋之則廢法但可加以爵祿奉祠臣恭惟藝祖皇帝以神武削平僭偽六合一家乃漢祖思猛士守四方之日而乾德之宴顧以藩侯不能撫養愚民為憂識者謂本朝國祚靈長民心固結皆紫雲樓數語有以基之陛下視邦選侯尤不輕畀偏州小壘亦必朝辭豈不欲得良二千石與之共理乎朝家調守不過兩塗一曰才望二曰資格如其當得孰不謂宜茍二者之俱無忽一朝而濫豫遊談聚議寧免紛紛曰某戚畹家也曰某貴介子也才齒仕版即登鵷序甫踰弱冠己佩虎符至有大踰格者昔人以四十専城為榮今不待四十矣雖重侯纍將之家固多英妙然牧人御衆之任必屬老成臣嘗為郎銓部見年未三十人不許注三萬貫場務郡寄重于場務多矣奈何以千里之赤子付之四姓之小侯乎士大夫除在朝清望官外必三考宰邑兩任佐州嵗月推移蒼顔白髮乃敢請麾幸而得之率三數人共守一闕遙指瓜熟如俟河清凡江浙近裏稍可屈指之郡昔以待近臣之均佚名流之補外庶僚之賢勞者今多以處左戚勳閥世胄爭趨便安寒門素族甘就遐逺風憲紀綱之地間有論執除擢臨遣之際中難斡回臣謂乾德四年之詔萬世人主擇藩侯之法也紹興二十五年之詔萬世人主待外戚之法也陛下各書一通置之座右則嶽牧之選不及私昵勛戚之恩有所限止矣臣謂陛下天性至仁已豫者不可奪繼是勿豫可也已遣者不可返繼是勿遣可也許大臣爭執有司論駁可也昔者棸蹶番楀並列膴仕而周衰許史丁傅稍有聲聞而漢微獨本朝戚畹謙下損挹異于前代蓋祖宗但賦以祿而不任以事乃所以深愛之也豈必使之與寒士爭進哉惟陛下垂聽歷代名臣奏議卷二百八十九
