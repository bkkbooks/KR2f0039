body:
  text: 歷代名臣奏議卷一百九十五明楊士竒等撰戒逸欲宋髙宗建炎三年張浚上言曰臣輒有愚懇干冒聖聰區區愛君之誠不能自已惟陛下赦宥臣近自京西按歷陜右風聞道路之言謂陛下近遣使臣二名於种師中處收買寶劒二口仍優支價直臣仰惟陛下聖姿英武志在靖難居常於田獵之遊聲色之奉無所嗜好惟是弓劒鞍馬每切留意於其間蓋聖心之所以眷眷而不須臾忘者志固有在也但人君舉措不可以不謹陛下居萬乘之尊臨四海之廣若大小文武之列用得其人則盜賊當自息邊僥當自平以是知陛下所宜寶者在人而不在劒今千萬里之逺不聞陛下有求賢之命而徒聞有買劒之名臣恐有識之士猶得以竊窺而私議也況臣之所聞又謂王􅊅嘗以師中藏劒之事奏知陛下小人無知不識陛下右武之意便欲以此邀求寵幸原其用心罪不容誅臣願陛下以此寶劒分賜立功將士仍乞自今有如王􅊅之徒或欲以弓劒鞍馬進至御前者一切屏去庶幾絶小人觀望之意浚又上言曰孟子曰入則無法家拂士出則無敵國外患者國常亡然後知生於憂患而死於安樂也又曰今國家間暇及是時般樂怠傲是自求禍也禍福無不自己求之者故善謀國者常以修德立政為本而切切於戰守之備使人主知戰守之不可一日忘則有恐懼為善之心則德以修政以立國家庶幾可興焉不然驕怠肆意忽於為善則國家萬無安全之理矣若夫姦邪之臣貪藉利祿遂以既和為已治已安莫顧後患彼徒知為身謀為子孫謀事勢既極不過賣國偷生於異日耳況夫導君於過舉而隂懷包藏之志者哉此不可不辨也浚又上言曰臣仰惟神聖出震御乾之辰天下孰不歡欣鼓舞祝吾君夀臣竊謂人臣事君猶子事父要當略去禮文思求實報臣嘗潛心聖人之經有可以取必於天膺大福獲大夀決然無疑者輒輸丹誠為陛下獻臣伏考周公無逸篇商王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧髙宗嘉靖商邦至於小大無時或怨周文王自朝至于日中昃不遑暇食用咸和萬民不敢盤于遊田以庶邦惟正之供三君者非徒身享安榮而有國長久後世莫加焉自祖甲之後立王生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從是以罔或克夀或十年或七八年或五六年或四三年夫天道昭昭其報如響仰惟聖德日新大孝之誠昭格天地夀福無疆宜過商宗周王逺甚臣不勝臣子祝頌之情願陛下兢兢業業勉之又勉永堅此心以奉天道則天之所以報吾君者宜如何哉右正言鄧肅上疏曰臣嘗觀德宗之在奉天有唐社稷不斷如線一旦稍定遂訪裹頭宫人陸贄切諫猶不能止此唐室所以衰也恭惟陛下臨御以來惟知修德前日宫嬪來赴行在猶有卻之者方之德宗固已相萬其不邇聲色蓋出於天性自成湯以後一人而已宋德亦安得而不興乎然陛下出命嘗本乎恭儉之德而奉命以出者或變而為奢侈之事切恐傳之四海人或不知反以德宗議陛下而不知陛下實成湯也臣職在諫省敢不盡言前日御藥院奉聖旨下開封府買拆洗女童不計數且拆洗云者豈必姝麗耶竊知聖意將服浣濯之衣矣不計數云者豈必多求耶竊知聖意以謂有人則置無人則已初不以定數為限也此盛德之事卓絶今古豈易擬議哉然奉行之臣不體睿意日差人吏遍走京城凡見女童舉封其臂間有脫者其行賂已不資矣搜求之甚過於攘奪愁怨之聲比屋相聞嗚呼尹開封府者與領御藥院者亦何纍吾聖天子如是之甚哉今日外有方熾之敵伺吾之間以肆寇攘內有偽楚之黨幸吾之失以快私忿陛下安可纎毫疑似之迹墮彼計中乎臣愚欲乞速下三省取開封府御藥院官吏重置之法仍降明詔以榜東京具言陛下所以買拆洗之意不為姝麗有不計數之語不為多求凡女童之封臂者悉縱之則陛下恭儉之德上追成湯豈特左右臣僚得以獨聞乎當使京師之人無不知者仍乞亦榜行在以弭自京師來者紛紛之謗且京師天下之本也京師之人安則天下之人舉安天下之人舉安則社稷宗廟豈有不安者乎惟陛下早圖之李彌遜上奏曰臣聞千金之子不垂堂百金之子不騎衡聖主不乘危不徼幸臣伏覩六飛連日履涉長道陛下叱去執御駷躍疾馳千乘萬騎追奔不及然山路髙下曲折不比苑囿間平夷寬曠可以回旋萬一銜勒有失左右不能致力將如之何臣不勝寒心恐懼憂惶之至竊惟陛下聖意不過欲以神武勇智激昂士氣數日以來已可聳動羣聽臣願陛下念宗廟社稷至重深加兢慎保衛聖躬思乘危之戒以防不虞天下幸甚臣又聞已降聖旨沿路皇帝乘馬宰相以下並免從駕臣契勘自來乘輿所至扈從官以下皆合從行雖聖德優容寬假臣下如此豈有陛下不以馳驅為勞而臣子反雍容舟楫之間兼馬行至疾舟船不可追逐舉足便有數十里之隔而陛下左右大臣無一人之侍今居何等時乃可以如此伏望睿慈更垂聖慮毋忽臣言特降指揮令有司預行相度可以乘馬去處前期戒備許宰臣以下依例扈從以安衆情起居舍人洪遵經筵進故事曰按唐書太宗曰嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾耶褚遂良曰雕琢害力農纂繡傷女工奢靡之始危亡之漸也漆器不止必金為之金不止必玉為之故諌者救其源使不得開及夫橫流則無復事矣帝咨美之臣聞貴為天子富有天下外物之來茍無以禦之則如水之浸物如膏之受塵初若甚微然涓涓不止將成江河綿綿不絶將用斧柯故慮之不可不深辨之不可不早為臣者當防之於未然不應救之於已然使至於橫流沈著始呫呫然動其喙尚何益於國哉舜造漆器禹雕其俎以大聖人而為至微之事尚何復議然為之臣者猶以為不可況德不若舜禹而其事有大於漆器雕俎安得不絶其萌芽者哉遂良之對太宗真得大人格君心之道遵又進故事曰按唐書崔植傳玄宗即位宋璟手寫尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖臣聞四海至廣萬機至繁王者負斧扆以臨之不恃其天縱之聖足以蓋天下而恃其自治之勤足以應天下夫正心誠意進德修業立政造事皆聖人自治之序也四海之廣常若見於一室萬機之繁常若叢於一身思所以應之則汲汲而自治者誠有所不遑暇食焉昔之人君未嘗不知此卒不能皆至於善治者幸天下之無事不待功業之成而自治者已懈故樂未厭而憂及之矣無逸之書成王嗣文武之法也文武之事可得而考不過曰天保以上治內采薇以下治外始於憂勤終於逸樂而已所謂天保以上者如君臣相豫之間賔親交際之節雖一飲一食之微皆有其法則大於此者可知夫惟自治其內者如此然後命將率遣戍役經營四方凡采薇以下治外之具皆粲然而畢陳然必以憂勤行之逮其久也不期於逸樂而晏然自享其成矣成王嗣守文武丕緒亦以無逸繼之遂為周之顯王其道蓋本諸此唐玄宗蓋嘗知之矣録其書以為圖置諸左右出入觀省以為矜式未幾而圖已屏去則其所謂無逸之實亦必類此宜其成就有愧於古無足怪也嗚呼能自治矣而繼以無逸根之於誠而守之以不變舉而措之何行而不至何為而不立故知之非艱行之惟艱行之非艱久而不變之惟艱易曰日月得天而能久照四時變化而能久成聖人久於其道而天下化成臣請以此終無逸之説武義大夫曹勛上奏曰臣叨竊祠祿略無裨補非仰資聖造何以安迹復恃舊物輒有所陳冀達天聰曲照愚悃冒瀆之罪謹俟誅殛臣竊審聖駕欲詣洞霄等處燒香有見上聖既端拱凝命不以萬幾縈心猶寅畏天命為國為民祈福於上下但適此春晚政農務蠶麥之時而自北關至洞霄驅民治道實妨農事又從衛及巡護兵馬諸司執役無慮萬人方春晚多雨少得晴明道路泥濘儀衛狼籍觀望不美鑾駕一出有此數嫌況從來上聖以仁德及物於此不能不惻然若候收刈了擇晴和日分作數日從容一行得宿食之備無雨水之患豈不兵民優遊仰稱聖情祈福之意孝宗時薛季宣上奏曰臣聞位卑而言髙罪也人臣之義有犯無隱可以言而不言則負師學況臣踈賤無階以瞻天日之表蒙賜之對寧敢隱情而不言乎臣昨官逺方伏遇陛下踐阼之始省服膳之御卻嬪妾之進其自奉為甚薄躬細務以先羣吏親鞍馬以勵軍旅其奮志為甚大臣居數千里外觀仁聲之所及垂白之老莫不欣欣相告咸謂聖人有作規模宏大真將復藝祖之業武夫悍卒至拔刃呼躍曰不報吾君以死而安死臣愚不識察人心之所向咸謂太平之世可以期月見也歷年寖久而陛下未享其效臣切惑焉臣嘗謂治有本末政有先後先所施者後或可置本既舉矣末亦可捐夫清心寡欲恭儉節用堯舜三代之所以治天下陛下既已身之矣自宜固守而勿失至於躬細務親鞍馬蓋聖人之權施之首政以警一時偷惰之習乃其宜矣循以為常則天下不能無疑是故衮職任輕無以仰承德意動煩宸慮而國論靡有定止事出九重百官莫肯任職政令施設下人得以輕議寄耳目於左右權或移於近密躬細務以先羣吏而羣吏未必勵此不可不察也叢脞之歌賡於虞氏自除郎吏明皇無取祖宗專以用人布德懷柔天下蓋為之有道矣毬馬之事陛下所以習勞苦而振威武者至於衛生之害積於細微銜橛之危起於所忽降臣侍從豈得絶無關防行之有年議者遂謂嗜好之僻親鞍馬以勵軍旅而軍旅未必勸此不可不察也太祖皇帝猶謂擊毬非將相事韓愈尚為其長危之仇士良既去以毬獵固寵之術授其輩流民臣之心所以咸願陛下為宗社計也陛下雖有天縱之聖將大有為而精神疲於聽斷玉體勞於驅馳縱有清間之燕講萬微之務臣竊意其有所分矣金人我之世讎固不與共天下陛下所為焦心勞思不憚寒暑若此者正為恢復進取之計爾然先後非序本末倒施勤於小而緩於大圖其近而遺其逺昔之所以鼓舞羣動者人情久且玩習七年于此而治效未著寧不以是乎方今國威未振民力未支而敵人之情傳聞常多失實陛下再造之心雖不可暫忘而進取之事其實未容輕議臣願陛下深思逺覽以靜養恬略其小者近者而圖其逺者大者遴三公之選責以進人才張綱紀延端直之士與之講問學評治道歸有司之常務屏馳騁之細娛本末先後咸得其序則朝廷尊而衆務自舉威權振而軍氣自張養以沈潛待時而動則天聲所臨焉往而不濟哉臣不勝拳拳之忠惟陛下財赦羅願上奏曰臣聞古者大有為之君必務愛惜日力以圖庶務夫繁而難周者事也迅而易失者幾也往而不反者時也陛下在位十七年于此矣歷時不為不久加之有志足以大有為而功業未究於天下者是日力多有所棄也竊見御史臺月以坐朝及百司入局告于有位號為月報一月之中休暇多者殆居其半少者亦十餘日夫國之大事如四時孟享侍從以上有扈從之勞則為之休務可也至如雙忌者不過行香一時之頃退而入局蓋未害也若夫立節之名自唐貞元以來始創有之國家全盛之時上下燕安亦有天祺天貺之屬以文太平歷世承平循而不敢廢自艱難以來臣民日思淬勵何暇相從於娛樂之事而獨為休告於官府失其實矣又國家法度在有司者關報截會比前代為密休暇既多則逺方之人常困於守待而事亦因循失時有不振之弊而近者又明詔天下增中秋之節臣竊惑之或者以為李德裕在會昌中休沐輒以令沛然如無事時此不當復有所議臣以為不然德裕之賢不能過絶於古古者聖君賢臣有為於天下未嘗不自愛日始蓋堯兢兢日行其道舜一日二日萬幾禹重寸隂文王自朝至于日中昃不遑暇食周公思事之不合者夜以繼日誠恐失事幾也天下幸安陛下有志於治正是君臣同心叶力之秋非有大故特狃於太平之文飾取日力而棄之豈不惜哉願詔有司取承平以來一時以慶事名節者存其名勿廢而使百司得治事如常日姑務恢崇祖宗之功業其與奉虛名而妨實事者有間矣事功既建天下復平然後復舉舊令為休暇如承平時此所謂始於憂勤終於逸樂明示得意而無後患若李德裕衒能於末世又安足法哉陸遊上奏曰臣聞詩曰上天之載無聲無臭人君與天同德惟當清心省事淡然虛靜損之又損至於無為大臣不得而窺所好則希合茍容之害息小臣不得而窺所好則諂諛側媚之風止不以從其所好而加賞則憸人服不以逆其所好而加罪則端士進玩好無益之物不好則不接於目詼諧敗度之言不好則不聞於耳大抵危亂之根本讒巧之機芽姦邪之罅隙皆緣所好而生臣下雖有所偏好而或未至大害者無奉之者也人君則不然絲毫之念形於中心雖未嘗以告人而九州四海已悉向之矣況發於命令見於事為乎且嗜好之為害不獨聲色狗馬宫室寶玉之類也好儒生而不得真則張禹之徒足以為亂階好文士而不責實則韋渠牟之徒足以敗君德其他可推而知矣昔者漢文帝及我仁宗皇帝所以為萬世帝王之師者惟無所嗜好而已恭惟陛下龍飛御極之初天下傾耳拭目之時所當戒者惟嗜好而已無有作好遵王之道天之所以為神禹錫也伏惟陛下留神省察天下幸甚左相陳俊卿上疏曰陛下經月不御外朝口語籍籍皆輔相無狀不能先事開陳虧損聖德陛下憂勤恭儉清靜寡欲前代英主所不能免者皆屏絶顧於騎射之末猶未能忘臣知非樂此志圖恢復故俯而從事以閲武備激士氣耳願陛下任智謀明賞罰恢信義則英聲義烈不越尊俎固已震懾敵人於萬里之逺豈特區區騎射於百步間哉陛下一身宗社生靈之休戚繫焉願以今日之事永為後戒光宗紹熙元年彭龜年上疏曰臣聞古今害治之事非一而逸豫為尤甚是以易之豫卦繼之以隨又繼之以蠱説卦曰以喜隨人者必有事未有上下相隨於豫而不蠱敗者也唐穆宗嘗謂丁公著曰聞外人多宴樂此乃時和人安公著曰此非佳事自天寶以來公卿大夫競為遊宴沈酣晝夜擾雜女子如此不已百職皆廢陛下能無憂勞乎公著之言真識理道恭惟國家渡江以來大讎未復大恥未雪此政人主卧薪嘗膽之時人臣枕戈待旦之日而六十餘年內外宴安有若至治由宫庭達于天下百官至于庶民服食器用屋宇園池大率猶襲宣和之舊家蓄聲妓人事遊宴上下一律習成淫侈消靡精鋭隳曠職業至今日極矣自夀皇聖帝躬行勤儉風聲感動稍稍斂戢竊見近日已開樂禁深懼士民故習復張此非法制之能移全在陛下之躬率夫西漢淳厚之俗皆自文帝一身發之今日國家所以困乏軍民所以窮悴士大夫所以驕墮皆由一侈侈生於逸逸生於豫日益滋長恐致蠱敗事機所繫政在斯時陛下豈可不自任其責陛下儻使宫禁崇尚勤儉外庭未必率從其或不忘宴豫天下必將益甚臣觀天下宴遊之俗皆自士大夫傳之士大夫宴豫又自近習傳之近習宴豫陛下抑嘗察其所從來乎唐楊綰一宰相爾尚能使貴重大臣減損聲樂況陛下據天下利勢感動之力萬倍於此孟軻曰是不為也非不能也惟陛下留意紹熙中翊善黃裳上言曰人主憂勤則臣下協心人主偷安則臣下解體今道塗之言皆謂陛下每旦視朝勉強聽斷意不在事宰執奏陳備禮應答侍從庶僚備禮登對而宫中燕遊之樂錫賚奢侈之費已騰於衆口強敵對境此聲豈可出哉右相趙汝愚上奏曰臣嘗讀書觀舜命禹之辭曰克勤于邦克儉于家不自滿假惟汝賢臣竊惟禹之神聖其功德豈易量哉然舜授受之際獨以勤儉為稱者何哉蓋儉以約己勤以為人為聖為賢實本諸此故舜之命禹必以其勤儉為首也天祐我宋三世揖遜如堯授舜如舜授禹克勤克儉陛下固已親傳而密受之矣臣請論其目則朝廷之政事不可以不厲精幾微不可以不深慮人才不可以不博訪邉備不可以不預修夜之所思旦之所行不忘乎是則勤之至矣陛下之飲食嗜好不可以不節嵗時用度不可以不省民不可以不惜賜豫不可以不吝夜之所思旦之所行不異乎是則儉之至矣上以副重華付托之重下以為子孫萬世之法豈不休哉惟陛下留神理宗端平二年工部侍郎兼給事中李宗勉上疏其略曰陛下憂勤於路朝之頃而入為宴安所移切劘於廣廈之間而退為便僻所惑不聞減退宫女而嬪嬙已溢於昔時不聞褒録功臣而節鉞先加於外戚不聞出內貯以犒戰士而金帛多靡於浮費陛下之舉動人心所視以為卷舒者也陛下既不以為憂則誰復為陛下憂哉又言求諫非難而受諫為難受諫非難而從諫為難茍聞之不以為戒玩之不以為信卒使危言鯁論無益於世用無救於時危其與拒諫者相去特一間耳理宗時中書舍人兼經筵説書袁甫上疏曰臣聞唐太宗時魏徴每犯顔苦諫或逢上怒甚神色不移上亦為霽威上嘗得佳鷂自臂之望見徴來匿懷中徴奏事故久不已鷂竟死懷中又嘗與王圭語有美人侍側上指示圭曰此廬江王瑗之姬也瑗殺其夫而納之圭避席曰陛下以廬江納之為是耶非耶上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異於郭公今此美人尚在左右臣以為聖心是之也上恱即出之還其親族唐太宗非不談仁義親君子然而緣飾之意多真實之誠寡觀其鷂死懷中也若有畏憚之心及其論廬江王妃也初無忸怩之色一聞王圭之諫乃能翻然而改太宗所以興唐者賴有此耳然而未足以語謹獨之學也陛下天稟精粹上嫓堯舜所謂過言過行固已一毫無有而臣區區愚慮竊以為誠之一字猶有所未盡夫無矯飾之謂誠無間斷之謂誠臨朝則莊退朝則肆肆出於真而莊由乎強此矯飾也可謂誠乎親賢人儒士則難親宦官女子則易難者親之時少而易者親之時多此間斷也可謂誠乎臣在經筵嘗對陛下啓問退朝入宫之後果何所為陛下語臣曰或觀書或作字或覽四方章奏臣不勝欣喜以為陛下果無暇日也而聞之道路則謂陛下猶未免溺于酒色之娛夫剛制于酒未見好德如好色聖經明訓皎然不誣陛下何不堅忍力行勿以無益害有益乃若左右暬近之人假公徇私者尤不可不戒履霜堅氷至為可畏防微杜漸所當致謹陛下語臣皆正大之論而退考其所行乃有未盡然其與唐太宗雖有畏憚之心而初無忸怩之色者何以大相過哉願陛下以堯舜湯為法兢業戒懼無時怠荒則德日進而治日隆矣有唐之事又何足云翰林學士知制誥真德秀上奏曰臣聞自昔人臣之愛君莫大乎願其君之夀天保之詩歸美以報上也一則曰俾爾單厚何福不除二則曰受天百祿降爾遐福而終之曰如南山之夀此惓惓之至也今臣忝備禁密且以執經勸講為職伏遇陛下誕彌之節近在朝夕歸美報上尤劇此心然徒知與海內臣民頌吾君之夀而不以聖賢論致夀之道為陛下言則亦不過如華封之愛君而已亦奚益哉謹齋宿再拜條其説以獻一曰無逸則夀昔周之成王盛年嗣位周公恐其不知稼穡之艱難而乃逸也則為書以戒王其言殷王中宗享國之久本於嚴恭寅畏天命自度治民祗懼不敢荒寧至論髙宗祖甲及周文王所以享國者大抵亦然蓋百聖相傳同此一敬曰嚴恭曰寅畏曰祗懼無非敬也敬與逸豫相為消長三宗文王之所以能無逸者以其敬也周公欲王視以為法而日勉焉上敬天下敬民則遊田不敢盤酒德不敢飫培養厚而根本強持守嚴而心志定是固輯福之源曼夀之基也然則陛下於無逸之戒其可不念乎二曰親賢則夀召公卷阿之詩亦為戒王而作其三章曰爾受命長矣茀祿爾康矣而繼之曰有馮有翼有孝有德以引以翼謂必有如是之人日侍左右然後迪其君於道而受天之福也夫人君饗四海之奉易動者物欲而難保者德性近妃嬪褻御之時多而親學士大夫之時少則迎逄煽惑無非物欲豈惟敗德抑且傷生惟有孝有德者引之於前而翼之於後俾日聞正言見正行杜嗜欲於將萌弭過失於未形則其心恬淡而和平優遊而晏寧是乃保身長世之道也然則陛下於親賢之意其可不篤乎三曰以孝奉先則夀周頌之雍為禘祭而作也而曰假哉皇考綏豫孝子又申以眉夀繁祉之言蓋王者以孝事其先而祖宗亦以夀祉遺其後人也陛下嗣先皇之服而為宗廟主嵗時饗祀固所當嚴而一祖十二宗之傳序其責尤重夫必勤勤於繼述兢兢於保守然後神祗祖考咸安樂之而錫之以無疆之休此陛下所宜深勉者也四曰仁則夀孔子論知仁之别而曰仁者靜又曰仁者夀惟靜故夀也仁者之心純乎天理而無私欲之擾故其體安定而正固其效悠久而綿長然靜非兀然枯稿之謂也動以理雖動而未嘗不靜不仁之人則動於欲矣欲勝而無節則躁動而難安世未有凝然安固而不夀亦未有紛然躁擾而克夀者此陛下所宜深體也五曰有德則夀中庸稱舜之孝以為大德者必得其夀且謂天之生物因材而篤栽培傾覆惟所取焉蓋皇天無親惟德是輔舜之所為有自夀之道故天亦夀之此所謂栽者培之也祖已之訓髙宗則曰降年有永有不永非天夭民民有自夭之道故天亦夭之此所謂傾者覆之也以大舜之德為師而以祖已之言自鑑此又陛下所當深用其力也凡此五條皆聖經之格言萬世人主之藥石參而味之則周孔之大訓為足以該之蓋能敬與仁則餘皆在其中矣秦漢以來異説橫騖人君不知聖賢致夀之道而溺於神仙方士之術故漢有文成少君唐有栁泌趙歸真輩皆以荒忽誕幻蠱其君至於餌藥以長年未有不反為所誤者唐之穆敬不足道憲武皆英明雄斷之主亦以自賊焉豈非世之大戒乎臣嘗竊謂仙經萬卷不若誦無逸之一篇道家千言豈如玩靜夀之兩語陛下方日近儒生遊心經術未有漢武唐憲之惑微臣愛君不敢不豫陳其愚惟聖明裁察吏部尚書魏了翁上奏曰臣比者伏聞陛下嘗於經筵對羣臣論及漢元帝委用儒生牽制文義優遊不斷陛下慨然有感於元帝不得真儒而用之聖學髙明足以破千載不用儒生之陋然臣嘗讀漢史每於元成二君而有感焉因為陛下試陳之且人主心術之隱嗜好之偏獨居乎深宫之中誰得而知之史册雖書人亦不盡信也而班固於此二贊獨異乎他贊其言曰臣外祖兄弟為元帝侍中語臣曰元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極幼眇少而好儒及即位召用儒生委之以政牽制文義優遊不斷孝宣之業衰焉其於成帝贊曰臣之姑充後宫為媫妤父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂有穆穆天子之容矣博覽古今容受直辭公卿稱職奏議可述然湛乎酒色趙氏亂內外家擅朝言之可為於邑臣嘗以為此二贊蓋班固直以為漢業之衰始此故詳著其致衰之因乃在於宫庭屋漏之間故以侍中媫妤帷幄近習之言證之方二君之親近儒生容受直辭也人必謂多材多藝而又能用儒有威有儀而又能受言有君若此太平可以立致不知其退而居乎深宫之中則聲樂之溺心酒色之惑志所以交攻於內者乃爾是時非無真儒如蕭望之劉向諸賢也然外戚如許史宦官如恭顯皆得以害之至於連坐繫獄向不見用而望之死此無他儒生與戚宦不兩立而用儒受言與聲音酒色亦異塗此重則彼輕勢使然也雖然方二君之耽樂也亦謂曲房隱間誰得而知之不知左右前後之臣亦有以此而告諸史臣者後世之史臣知之則漢庭羣臣與當時之庶民固無不知之故班固於此二贊特出所聞之自以著亡漢之端其可畏蓋若此臣久蓄此意特以元成二君漢之庸主不足為盛時道且著之表奏人所忌諱無自而發今幸因陛下所以語羣臣者若此敢盡以奏陳惟陛下深念而力監焉度宗咸淳八年起居舍人髙斯得上奏曰臣聞人君一身天地社稷宗廟山川之主四海九州百萬生靈之所係命不可以不謹也古先帝王知其然故保身之道至嚴極重起居動作悉有檢防出則史官書其言動御瞽幾其聲音入則女御敘其燕寢女史記其御法惰慢之氣不設於身躬宴私之意不形乎動靜凡以制威儀之節養夀命之源而為齊家治國平天下之本也秦漢以後古制不存人主御朝之時觀聽攸屬猶或勉於自飭至於適寢釋服婦寺後先其能不為居養所移者鮮矣故成帝臨朝淵默尊嚴若神有天子穆穆之容而一入內庭則聲色並進女德不厭趙李爭寵傷年損德此杜欽之言所為發也陛下春秋鼎盛行義未過退朝之暇遊神典籍恬泊沖虛固中外之所共知也然日者薄愆和豫少曠視朝聞者不能無惑臣謂陛下聖性髙明受祖宗之所付託不輕而重其於保身之道造次克念戰兢自持必不若漢季之君所為然臣毣毣愚忠猶願陛下於樂喜之餘益思謹疾之道凡紛華柔曼可以傾意而遷神者一皆屏去玩無逸之所以克夀思恬淡之可以永年澄心清魂葆醇練粹雖於昭陽柘館臨宦官女子之際常若露門虎觀對學士大夫之時則微疴薄恙安得以匽薄清明之躬而夀基福本豈不億萬年而有永乎臣未得登文石之階陳當世之務因上故實獨以是為羣言之首惟陛下赦其狂愚不識忌諱而察納焉宗正少卿趙景緯言損德害身之大莫過於嗜欲而窒嗜欲之要莫切於思居處則思敬動作則思禮祭祀則思誠事親則思孝每御一食則思天下之飢者每御一衣則思天下之寒者嬪嬙在列必思夏桀以嬖色亡其國飲燕方歡必思商紂以沈湎喪其身念起而思隨之則念必息欲萌而思制之則欲必消志氣日以剛健德性日以充實豈不盛哉遼景宗時郭龍為南院樞密使尋加兼政事令以帝數遊獵上書諫曰昔唐髙祖好獵蘇世長言不滿十旬未足為樂髙祖即日罷史稱其美伏念聖祖創業艱難修德布政宵旰不懈穆宗逞無厭之欲不恤國事天下愁怨陛下繼統海內翕然望中興之治十餘年間征伐未已而寇賊未弭年榖雖登而瘡痍未復正宜戒懼修省以懷永圖側聞恣意遊獵甚於往日萬一有銜橛之變搏噬之虞悔將何及況南有強敵伺隙而動聞之得無生心乎伏望陛下節從禽酣飲之樂為生靈社稷計則有無疆之休上覽而稱善聖宗好擊鞠無度諫議大夫知宣徽院事馬得臣上書諫曰臣竊觀房玄齡杜如晦隋季書生向不遇太宗安能為一代名相臣雖不才陛下在東宫幸列侍從今又得侍聖讀未有裨補聖明陛下嘗問臣以貞觀開元之事臣請略陳之臣聞唐太宗侍太上皇宴罷則挽輦至內殿玄宗與兄弟歡飲盡家人禮陛下嗣祖考之祚躬侍太后可謂至孝臣更望定省之餘睦六親加愛敬則陛下親親之道比隆二帝矣臣又聞二帝耽玩經史數引公卿講學至于日昃故當時天下翕然嚮風以隆文治今陛下遊心典籍分解章句臣願研究經理深造而篤行之二帝之治不難致矣臣又聞太宗射豕唐儉諫之玄宗臂鷹韓休言之二帝莫不樂從伏見陛下聽朝之暇以擊毬為樂臣思此事有三不宜上下分朋君臣爭勝君得臣奪君輸臣喜一不宜也往來交錯前後遮約爭心競起禮容全廢若貪月杖誤拂天衣臣既失儀君又難責二不宜也輕萬乘之貴逐廣場之娛地雖平至為堅確馬雖良亦有驚蹶或因奔擊失其控御聖體寧無虧損太后豈不驚懼三不宜也臣望陛下念繼承之重止危險之戲天下之福羣臣之願也金熙宗時翰林待制兼右諫議大夫程宷上疏言事其略曰殿前點檢司古殿巖環衛之任所以肅禁籞尊天子備不虞也臣幸得近清光從天子觀時畋之禮比見陛下校畋凡羽衛從臣無貴賤皆得執弓矢馳逐而聖駕﨑嶇沙礫之地加之林木叢鬱易以迷失是日自卯及申百官始出沙漠獨不知車駕何在瞻望久之始有騎來報皇帝從數騎已至行在竊惟古天子出入警蹕清道而行至於楚畋雲夢漢獵長楊皆大陳兵衛以備非常陛下膺祖宗付託之重奈何獨與數騎出入林麓沙漠之中前無斥候後無羽衛甚非肅禁籞之意也臣願陛下熟計之後若復獵當預戒有司圖上獵地具其可否然後下令清道而行擇衝要稍平之地為駐蹕之所簡忠義爪牙之士統以親信腹心之臣警衛左右俟其麋鹿既來然後馳射仍先遣搜閲林藪明立幖幟為出入之馳道不然後恐貽宗廟社稷之憂元太祖嘗置酒內廷鈕祜祿重山侍因諫曰天子以天下為憂憂之未有不治忘憂未有能治者也置酒為樂此忘憂之術也帝深加納之太宗素嗜酒日與大臣酣飲耶律楚材屢諫不聽乃持酒槽鐡口進曰麴蘖能腐物鐡尚如此況五臟乎帝悟語近臣曰汝曹愛君憂國之心豈有如吾托斯哈爾者耶賞以金帛敕近臣日進酒三鍾而止世祖時趙天麟上䇿曰臣聞飲食者日用之常也或一旦不節之而傷生衣服者天常之用也或三冬太厚之而致疾存心於有益之具猶且如斯留意於無益之端害將甚矣欽惟天子卓冠寰中何令不行何求不得然服食常用之外將安用哉今國家廣祖宗之基業濟遐邇之生靈伐叛柔服進賢戮不肖有三代之隆而庶幾於上古之治矣乃存心於尤物豈不纍聖德之齊天哉伏見方今纂組綾錦金珠璧貝未嘗忘之殊方異物禽鳥犀象未嘗卻之至於珍羞異饌自山海而來者多矣俳優賤物充一笑之資者衆矣其間為害不一試略陳之夫貧人富戶相去懸殊富者見在上之奢麗雖曰承示儉之詔而不從焉蓋從行不從言也以致風俗大變貧者益貧能無為濫之民乎極寒之後風雪飛揚漁樵之流乞丐之人龜手粟肌鶉衣襤褸內皆飢餒外罹寒凍原其所失由富民之奢故也貧民之心非獨不欲奢也但其勢不得然耳幸獲微利則又徇習俗而用之此所以貧者益貧也夫金珠璧貝等於塵沙使膏雨不降條風不來五榖不生桑麻不育則坐視金珠璧貝亦無益矣若欲通有無之交易便商旅之資給則有中統至元交鈔在耳安用金珠璧貝哉夫牛馬雞犬之類中國之所常有上下之所共育畜之無失其時則所謂得實利而壯吾國之基彼斑斕之獸粲錯之鳥有之不足以增光無之不足以為歉者盡力而求之則所謂受虛名而招外方之議也近年以來有司之秣馬厲兵民庶之糜資破産以征殊域者數矣及其勝也或得咫尺降書之奉或得無益怪物之獻則是用千萬征軍之命而易其無益之怪物也於是悍將據之而為功百官因之而表慶殊不知千萬征軍之親族號泣昊天而哀達九泉矣天地之氣不和水旱之災又至如此而雖盡獲彼國之怪物何以贖中國士卒之痛哉夫中國常獻足供王用矣彼山海之珍異豈須嗜乎夫育材安衆和樂且耽矣彼俳優之笑具豈須用乎晉武焚雉頭裘宋武碎琥珀枕隋君同土價於黃金唐太宗悲苦寒之鸚鵡食前方丈孟子弗為鄭聲之淫顔淵欲放斯中主之雄匹夫之聖猶能卓然特立而國家乃使纂組綾錦浼其聖身金珠璧貝浼其聖心禽鳥犀象浼其視俳優鄭聲浼其耳珍羞異饌浼其口腹臣竊為國家惜之也伏望陛下明探治本杜絶奢風凡纂組綾錦金珠璧貝之用不關禮經者一皆絶之凡犀象鳥獸珍羞異味之獻不在貢典者一皆郤之凡上方及外路無益之局署一皆罷之凡俳優之流不宜使之履禁墀而肆淫戲一皆放之幸從臣言則源清而流清上行而下效不及十年風俗移易矣天麟又上䇿曰臣聞式九圍奄八方據寶位以尊臨布至仁以統下者帝王之常事也執壤奠效土貢身居五服之外心在京畿之內者人臣之常職也故上之臨下如皇穹之覆燾后土之持載蕩蕩然以生成為心非期於自暇自逸而為奉養之資也下之事上如嬰兒之慕父母葵藿之傾太陽非宜於自驕自恃而速不庭之愆也商書曰民罔常懷懷于有仁周書曰敦信明義崇德報功由是觀之上施仁而在下不歸懷者未之有也下竭忠而明主不見知者亦未之有也今國家天降百祥天開景運臣竊見逺方玩異繦屬不絶殊域竒珍駢羅而至梯山航海輦贐輿金或重譯而來呈或望風而並湊府無虛月史不絶書若以冠帶百蠻車書萬里而論之則不世之嘉致莫大之神功若以帝王大體古今通義而言之則受之而不卻啓之而不杜亦所以未盡聖明之本心也且中國九州地逾萬里名山大川之所出日異月新而以億計謹按夏禹任土作貢之物冀州堯都有供無貢兖州之域厥貢漆絲厥篚織文青州之域厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石厥篚檿絲徐州之域厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠及魚厥篚玄織縞揚州之域厥貢惟金三品瑶琨篠蕩齒革羽毛之類厥篚織貝厥包橘柚錫貢荆州之域厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟􅙪簵楛包匭箐茅厥篚玄纁璣組九江納錫大龜豫州之域漆枲絺紵厥篚纎纊錫貢磬錯梁州之域厥貢璆鐡銀鏤砮磬熊羆狐狸織皮雍州之域厥貢惟球琳琅玕織皮也此九州之力亦足以盡國家之所用矣夫古天下今天下一也豈以古之中國有其物而今獨無之須待求諸他國而後可以充其用哉故召公戒其主曰不作無益害有益功乃成不貴異物賤用物民乃足珍禽竒獸不育于國不寶逺物則逺人格真知言者也東周之際楚子不臣包茅不至無以縮酒齊桓仗義而問其罪春秋大之西漢之時大宛未服天馬未來怒激中國武帝恃力而侵其城當代病之此二者足以審中國之貢乃所當然而逺人之物未宜取之也豈惟逺人之物未宜取之哉至於中國無益之物亦不可取之也是以孝文還千里馬元帝罷齊三服官仁儉之名如揭日月雖欲下民之不感豈可得哉且異物蕩心其害一也使外國聞之而以國家為有嗜好其害二也水陸轉運役人非細其害三也有三害而無一利亦何尚之哉伏望陛下昭播徽聲俾揚遐境凡四逺之納欵者聽書檄奏聞而不求其獻物聽子弟入朝而不求其納賂若然則化天下以德示天下以無欲將見西蕃東徼之主君毳幕靈洲之酋長承恩而來享慕道以來王矣武宗時太尉阿實克布哈嘗侍帝御五花殿見帝容色日悴乃進曰八珍之味不知御萬金之身不知愛此古人所戒也陛下不思祖宗付託之重天下仰望之切而惟麯蘖是沈姬嬪是好是猶兩斧代孤樹未有不顛仆者也且陛下之天下祖宗之天下也陛下之位祖宗之位也陛下縱不自愛如宗社何帝大恱曰非卿孰為朕言繼自今母愛於言朕不忘也因命進酒布哈頓首謝曰臣方欲陛下節飲而反勸之是臣之言不信於陛下也臣不敢奉詔英宗即位參議中書省事張養浩上疏其略曰世祖臨御三十餘年每值元夕閭閻之間燈火亦禁況闕庭之嚴宫掖之邃尤當戒慎今燈山之構臣以為所玩者小所繫者大所樂者淺所患者深伏願以崇儉慮逺為法以喜奢樂近為戒帝大怒既覽而喜曰非張希孟不敢言即罷之順帝時蘇天爵上奏曰天下安危繫乎人君之一身人君身安則天下安矣是以古之王者慎起居以節嗜欲親忠良以稽古訓蓋所以調護身體安定黎民實惟宗社之至計也欽惟皇帝陛下纘承正統端拱淵默開設經筵怡神圖史而祖宗基業之隆天下安危之計不可不深慮也昔者太祖皇帝龍奮朔方肇基王迹身屬櫜鞬櫛風沐雨削平諸國以立子孫萬世之基世祖皇帝既臣宋人遂大一統選士求材作新百度深仁厚澤普洽羣生列聖相繼保守治平至我明宗皇帝文宗皇帝遭時多難播越南北撥亂反正中興帝業臨御未久傳之嗣聖洪惟陛下春秋鼎盛聖質日長當祗畏以事天地誠孝以奉宗廟思祖宗之勤勞念基業之艱難四方之人亦皆延頸企踵注目傾耳觀聽陛下德業之光想望太平治化之盛近聞起居稍違安適旋即和平聖躬萬福然而不可不慎也夫以陛下承天地宗廟社稷之重守祖宗百年之業為億兆之人父母固當夙夜寅畏調護聖體以慰臣民之望今聞鑾輿將出北幸上都廬帳服御供奉惟謹而道路之間寒暑霧露尤宜調攝蓋人君所愛莫切於身忠臣事君亦莫切於愛君之身嘗聞殷書曰惟王不邇聲色夫成湯清淨寡欲純乎天德故能享國長久為殷盛王孔子亦曰少之時血氣未定戒之在色言人少時血氣未定而傷伐本根或損夀考之福故君子戒之伏惟陛下思天下安危之本監殷書孔子之言節嗜欲以調養聖躬親忠良以日新德業則宗社奠安生靈幸甚歷代名臣奏議卷一百九十五
