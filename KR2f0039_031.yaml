body:
  text: 歷代名臣奏議卷三十一明楊士竒等撰治道宋仁宗慶歷五年張方平上論曰臣聞天下之事政無小大繫在廟堂有圗議而後有得失有得失而後有治亂有治亂而後有安危有安危而後有存亡善議政者不使有失善正失者不成於亂善救亂者不及於危善圗危者不至於亡誠使廟堂之上協忠將救敷求俊哲列于庶位惟事事乃有其備戒慎出令無從匪彛善始慮終惟正之念又惡乎危之至哉是故人謀誠得不牽乎天時國法既修不推乎歷數當其治法有猷庶邦嘉靖王道正直民用平康則收功在人推美乎政及乎危而弗扶顛而弗持典廢於上民亂於下則歸非於數貽咎於天是不亦近乎善則稱人過則稱天者乎古之君子善則稱天過則稱人禹稷之贊堯舜則引天之命湯武之誅辛癸則斥人之罪蓋天降災祥在德而吉凶不僭在人已則作孽何天之怨前世逺矣略弗復論近取諸唐則天寶幽陵之叛興元奉天之逼廣明卭蜀之幸乾符豳岐之遷是皆釁起廟堂禍歸邦國者矣夫廟堂之上有得失有治亂有安危存亡有爵有賞有顯榮寵利有兵有刑有毀家覆族且主德成於弼直國體正於臣鄰不有英睿之君聰明之德安能照姦而顯忠不有仁義之臣忠亮之志安能協恭而底乂是故帝王之道莫大乎平心而御物輔相之德莫先乎圖大而致主有平心之度故能通天下之志而不專偏聽之惑有圗大之慮故能以天下為心而不急樹私之計蓋人君偏聽則啓讒慝之門人臣樹私則開朋比之路俾夫姦諛進身之賊構於人主之側遊說規利之士諜于大臣之門君有蔽忌之心臣行傾奪之計如是國安得而治政安得而和是天下之大禍也故君以臣為體臣以君為心道充乎神宇則美暢乎四支患結乎膚革則憂及乎諸慮是以臣各獻其忠則君受其效國先泰於上則家䝉其福由是言之故知偏聽者召亂之本樹私者理末之術使君行此道臣知此說天下其有不治者乎謹論方平又上疏曰臣聞今中外之議者莫不以羌戎之警兵賦之急為當世要務臣竊以為凡歷代治亂安危之所起不在邉僥之外蓋嘗在戶牖之間爾故臣所獻愚言先陳近事伏惟陛下少留神慮臣聞禮曰古之聖人欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身何謂先修其身昔商中宗嚴恭寅畏治民祗懼不敢荒寧文王卑服以念稼穡之艱難文王不敢酗于酒德樂于逸豫自朝至于日中昃不遑暇食用咸和萬民彼聖人者不惟躬自菲薄兢兢治道亦惟聲味逸欲非養真之益故務為勤儉退從淡素且示愛民之意其實有自愛之道焉恭惟陛下春秋鼎盛臨御日長雖三靈保祐而國嗣未立臣碩陛下上思宗廟社稷付授之重下念中外士民繫矚之心保愛聖躬配天悠久省諸無益之樂移為居安之慮神怡於穆清之外福及於照臨之表此謂正身之道何謂先齊其家使夫宫闈有禮之謂也自景祐以來嬪御之列行非婉順輒斥逺之天下之人皆知陛下廟社之為重而不愛其所私蓋患防未然悔生所忽斥逺之事非宜數也不若節之以禮制之以義叙進良淑無昵微賤詩曰文王刑于寡妻以御于家邦易曰正家而天下定此所謂齊家之道何謂先治其國大臣百職之謂也伏以近嵗邉陲用師指蹤受成實在二府凡所除拜宜使將帥心服物議稱愜然後朝廷尊重成功可期如其不然則堂陛不崇中外失所瞻望矣成命遂事臣不復論至于才與不才固亦何逃聖鑒又自景祐之末綱維潜弛上下茍且人素姑息怙權相比愛憎相奪立朋黨者有之漏泄機事隳撓朝政專己見者有之陛下知臣之明既照見其情狀稍去其弊矣倘更振厲紀律審詳邪正則憲章修舉百度用正此所謂治國之道臣以庸昧擢從踈逺今日乃始陟文陛望清光指事剖誠不識忌諱萬分有補百死無悔方平又上疏曰臣嘗讀前史率以臣下敢諫為美蓋斥時之忌犯主之顔色人臣最難事臣不佞待罪諫曹涉赤墀歷文陛以望清光者無虛月矣論事無指切無踈謬無不䝉收威容受竊自惟遭時之幸而齪齪淺致暗于大道不能激昻風義有所感發愧不任職為公朝羞夙宵以慮紓過責者略條三事以聞惟陛下留神省察伏以今日之事最切者在乎明賞罰辨欺誣通謀議審兹三者則內可以正軌度外可以遏寇虐致治之本致效為速何謂明賞罰臣聞善為國者必先正賞罰之分賞罰必行則人以生為辱以死為榮人不畏死舉天下易於反掌況以討賊乎及駕馭失所紀律不正則以僥幸為賞姑息為罰雖賞而士不知恩雖罰而下不畏威上習因循下懷顧慮則人將援其手而不前況使之赴患難乎自西邉騷動事之三年矣賊昊雖驍猾一鬭將之材爾非有逺圗大志英雄之略其幸者資適逢時而已時久乂寧戎備不戒廟堂無受成之算疆圉乏制勝之䇿自延州之圍好水定川之敗覆軍殺將沮喪威靈皆由自驅師徒投之死地當總帥之重無待罪者朝廷專用姑息莫正其罰且自賊始叛授夏竦旄鉞韓琦等副之統制四路并護諸將凡大舉竒輪不返使封豕長蛇肆踐食之暴邉亭千里蕭然一空賦輸興發天下被其勞交黨株連公議不立至于不得巳但解其總帥以所居官內徙便郡而巳又如并州比緣賊入麟府朝廷以方面之重難於謀帥遂以名使楊偕寄任方面而處事踈略陳請謬悠駭于人聽夫麟府輔車相依而為河東之蔽無麟州則府州孤危國家備河東重戍正當在麟府使麟府不能制賊後則大河以東孰可守者故麟府之於并代猶手臂之捍頭目也而其上議欲棄其地既知才之不足用也顧猶以近職領河北重藩如是而欲收功是北轅而適楚也及乎鋒鏑之下矢石之前奮命小臣論功行賞一資一級分毫析銖惟恐比例之過臣觀歷代英主良臣用賞罰之理蓋威罰之行當自貴者始恩賞所被當由賤者先故罰一貴臣當其罪則天下懼賞一賤士當其勤則天下勸臣不敢煩引往事我朝祖宗之所以駕馭臣下操威恩之用其事耳目所接也往往能言之陛下萬機暇時試廣訪逮必有得也凡夫賞罰人主之事非聖心自出臣下不敢任之以故僥幸姑息生於依違即欲杜僥幸之門革姑息之弊惟在陛下於議賞罰之際少垂主斷爾罪罰所當加勿以貴要而隱忍恩賞所宜及勿以微賤而輕廢擬議一立勿容奸讒巧言熒惑變亂即恩威明矣何謂辨欺誣方今之弊人以僥幸為心政以姑息為用正謂欺誣得行也夫欺誣得行則大臣懼方且營救於讒毀之間而不保又何暇旌别淑慝修明憲度者哉今俗大率宿貴之臣輒以身下後輩矯情飾貌習僞成風損美化敗善俗朋比以彚下陵上替比者亦有以善誣結天心冀用事矣陛下竟不登于大用士大夫之有識者是以知陛下之淵衷大智無不通照其情狀信姦慝之不可為也然其風猶未之盡革者蓋左右舊臣猶有以疑毀廢者舜曰朕嫉讒說殄行蓋讒人在朝舜所不免孔子曰逺佞人陛下既推讒佞而逺之惟復起用以讒廢者則天下無賢不肖舉知浸潤邪說之果不行且以安臣下之心使厲志竭精有心效報者無悼後害事有不令而從兹之謂己何謂通謀議國家承五代之弊有不能革者軍國文武之事分領於中書樞密院唐代宗時兵興軍事繁多故於禁中專遣內臣典中外文奏謂之掌機密事梁氏始置使名五代時樞密院與中書或合或離入國朝遂分總天下之務對為二府由是軍民異政文武殊用命令乖戾更為彼我夫天下之事何嘗不以同而成異而敗乎平日無事茍可因循有為之時斯害也巳昔之祖宗三聖威靈獨運各延圖議斷主乎一陛下沖執謙德推委仰成柄用既分事必暌隔陛下誠能矯往弊稽舊典合二府一政事真大公之盛舉也即若重前規難改作臣謂應樞密院事宜與中書合議使理道相通惟事事乃其有備有備無患故臣曰通謀議意在此也凡此三事今日切務恩威明則邉臣奮欺誣辨則朝廷清謀議通則政事平而命令一皆治道之急者臣猥以孤微當得言之地所恨智不足以造微材不足以成務敢進一得冀禆萬分慶厯八年制䇿曰朕承祖宗大業賴文武藎臣夙夜兢兢期底於治間者西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗于兹公私匱乏加以承平浸久仕進多門人浮政濫貟多闕少滋長奔競糜費廪祿又牧守之職以惠綏吾民而罕聞奏最將帥之任以威服四夷而艱於稱職豈制度未立不能變通於時耶豈簡擢靡臻不能勸勵於下耶西北多故變態難常獻竒譎空言者多陳悠久實效者少預備不虞理當先物朕思濟此急務罔知所從以卿碩望故兹訪逮側身旰食躬佇條畫張方平為翰林學士對曰臣今日䝉召對資政殿賜手詔一道逮朝廷急務俾之條畫以聞臣以庸昧謬居近列論思獻納乃侍從之職不能孜孜夙夜拾遺補闕聖心焦勞躬垂清問闊宥循默之罪開導淺陋之見敢不悉情極慮粗陳大體上冒衡石少補塵露臣子之分不勝至幸伏覩手詔云西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗于兹公私匱乏此足以見陛下社稷之長慮憂民之深意也當康定之末慶歷之初朝廷議刺民兵增添軍籍之時臣忝諫官屢上章疏極言其害至于今日事勢果然臣昨在三司計㑹天下財用出入之籍及建隆巳來國家畜養兵數乞朝廷速加圗議蓋太祖朝取荆潭收蜀平廣南備河東禦西戎北敵畜兵不及十五萬人太宗朝平河東備遷賊禦北敵料兵閲馬志在收取燕薊然畜兵不過四十萬人章聖朝備遷賊禦契丹搜募戰士及契丹請和祥符巳後稍稍消汰常語宰臣曰今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐待衣食國家經費至廣不可不慎於選練故住招募斥疲老以減冗食至于寶元幾四十年天下可謂乂安矣向因夏戎阻命宰相非其人慮害不深事失幾先遂致大擾始籍民兵俄然黥以補軍籍升諸州廂軍以充其旅增虛名以受實弊至于陜西河北京東京西增置保捷一百八十五指揮武衛七十四指揮宣毅一百六十四指揮慶歷三年因王倫張海等狂賊數十人更於江湖淮浙福建諸路又添宣毅一百二十四指揮凡內外增置禁軍約四十二萬餘人通三朝舊兵且八九十萬人其鄉軍義勇州郡廂軍諸軍小分半分剩貟等不在此數軍人日多農民日少頃來七年之間天下大困生民之膏澤竭盡國家之倉庫空虛三邉稅賦支贍不足募客人入中糧草三司於在京給還錢帛加擡則例價率三倍以此度支大計日窘外則剗刷諸道之物中則侵用內帑之財厚賞聚斂之人賤立鬻官之令茍徇目前之急莫為經久之慮天下之事可憂者無大於此也凡此冗兵非惟困天下之財用方且成天下之禍階若不早圖後無及矣且景祐巳前兵不及四十萬人三司嵗計不聞有餘今而八九十萬人則何以得足此雖愚者亦可見矣若更加之以橫費因之以飢饉國家安危之計臣愚竊甚寒心臣兩曽具此事體敷奏而中書樞密院未聞有所改為即今便有改為猶須效在纍年之後如救焚溺緩則益不及矣然兹事體實大非君臣同心而上下協濟則事必難成伏望陛下先具將臣此言詳問兩府若别有長䇿豐財足食則非臣淺智之所及若量入以為出必無術以善於後則乞嚴令天下禁止招募軍人令逐路轉運使提㸃刑獄更出分按所部州郡揀選疲老便與放停嵗須三兩次更互巡歷只依常程旋旋揀放無得宣露朝廷密㫖若雖係禁軍其間羸弱憚於教閲碩退就廂軍者亦聽從便委樞密院㸃勘軍籍其人數少者即令團併以省軍貟其馬軍無馬者即與召募如碩補填步人者稍與補充近上衣糧優處軍分其有馬者即與團併足成指揮令堪教習準備使用仍詔諸路經略部署司使體知朝廷深意有專愎自任無體國之心者亦在陛下斷自聖心懲一足以警衆矣此其省兵之大略至于嘉謀密議權術幾微則有宥密之司又非臣所得詳知者也手詔云承平寖久仕進多門人浮政濫貟多闕少滋長奔競糜費廪祿此又以見陛下深思官濫欲清化源之大㫖也臣不敢逺言前代及祖宗朝事請即以景祐年未有邉事之時較之即可知其浮且濫矣臣曽勾當三班院約計在院使臣景祐中四千餘貟今六千五百餘貟臣勘㑹學士院兩省巳上官具貟景祐中四十餘貟今六十餘貟臣任御史中丞將本臺班簿㸃算景祐中京朝不及二千貟今二千八百貟臣判流內銓取責在銓選人畢竟不知數目大約三貟守一闕略計萬餘人十年之間所增官貟之數如此若更五七年後其將奈何貟數既多賢愚同滯才不才又難分别勸罰不立士鮮全行此則天下之所以日不理也今略數入仕之門禮部貢院所放進士明經外近例率以舉數編排别試名恩澤人每榜不下三數百人文臣兩制兩省少卿監以上每嵗奏廕子弟諸路轉運使提㸃刑獄正郎及帶職貟外郎遇郊恩例得奏廕子弟武臣自諸司副使軍職大校以上至于宫掖嬪御內臣近職每嵗或遇郊恩奏廕皆有常例又文武官因職任或致仕遺奏及諸色特恩録用者又諸班殿侍三司軍大將內外胥史牙校出職如此計㑹每嵗入官之路徼幸攀援日生新例不可勝數糜費廪祿煩擾吏民經營闕次因緣請託各為身計衣食之所迫逼奔競滋長勢使之然澄源培本在陛下命令而巳乞令中書樞密院各具逐年入仕名目及人數取其徼幸弊濫尤甚者逐色别立條約稍加裁損其屬三司殿前司羣牧司等處酬奬條貫亦乞各委明敏練事近上官貟重行詳定臣聞先朝以前雖將相大臣之家子孫猶多白衣未仕者今自少卿監以上輒每嵗任一人不亦過乎如此之類可謂徼幸弊濫尤甚者稍加裁損未為傷事也若只因循今日之例人浮政濫轉恐甚矣手詔云牧守之職以惠綏吾民而罕聞奏最將帥之任以威服四夷而艱於稱職豈制度未立不能變通於時耶豈簡擢靡臻不能勸勵於下耶此又以見陛下愛恤蒸民不忘邉患之意也臣請只以祖宗時事言之祖宗之時文武官不立磨勘年嵗不為升遷資序有才用名實之人或從下位便見超擢無才用名實之人有守一官至十餘年不改轉者其任監當或知縣通判知州有至數任不得遷者故當時人皆自勉非有勞效知不得進故在所職次率多修舉以其用人無定格惟才是用自祥符之後天下治平朝廷之議益循廣大故今自監當入知縣知縣入通判通判入知州皆以兩任為限又令守官及三年者與考課改轉後又不限在外在京在任不在任但纍及三年即例得磨勘先朝行之人始知恩未見有弊及今嵗年深久習以為常皆謂如此升遷本分合得無賢不肖莫知所勸故牧守之職罕聞奏最此實制度不能變通於時者也陛下如欲變而通之合稍釐革此制其應磨勘叙遷者必有勞績可褒或朝廷特敕擇官保任者即與轉遷如無勞績又不因保任例更增展年考庶乎人稍知勸勉於自致其保任之法不當一例應須選擇清望有才識之人即命舉之如此則是委執政之臣舉清望官委清望官舉親民官也有闕貟隨貟數令舉又足以見聖恩急才愛民之意此亦小變今弊矣至于將帥之任尤在駕馭得術仍宜久於其職李漢超自太祖時任濟州防禦使兼關南兵馬都監至太宗朝擢授應州觀察使仍守關南通十七年胡人畏服不敢窺邉止得一改官而巳太宗任郭進西山巡檢二十年賀惟忠守易州十餘年李謙溥守隰州十年姚丙斌守慶州十餘年董遵誨守通逺軍十四年侯贇守靈州十餘年真宗任楊延昭守髙陽關亦九年假之事任闊略其細故不為間言輕有移易責其成效而巳又不與髙官常令其志有所未滿不怠於為用也今則不然武臣指邉郡謂之邉任假之為發身之地歷邉任者曽無寸勞薄效不數年徑至橫行刺史防團廉察能飾厨傳熟於人事者即以為才而又移換改易地形山川未及知軍貟士伍未及識吏民土俗未及諳巳復去矣將何以服四夷而得稱職是由揀擢未得於理故下不知所以勸勵者矣碩陛下鑒祖宗之故事重爵賞以待功勞責久仕以勸能效亦馭將帥之一節也手詔云西北多故變態難常獻竒譎空言者多陳悠久實效者少預備不虞理當先物此可以見陛下安不忘危思患預防之逺慮也國家自祖宗以來不急於四方之功以愛民安人為上務而巳昔太祖但以豐財練兵保邉為事嘗積帛內府謂左右曰北敵若敢似昔時犯邉我以二十匹絹購一敵人首料其精兵不過十萬我用絹二百萬匹此敵盡矣壯哉聖人之謀兵法所謂先為不可勝以待敵之可勝者也臣前所陳國家畜養冗兵竭天下之力而且成禍胎矣今每嵗天下賦稅之外只東南和買紬絹自是三百萬匹而衣賜諸用度猶不能給則公私安得不匱乏哉此乃不待敵人之患而我固巳先困矣備預不虞理豈如此臣碩陛下試詳臣前言減兵節用擇吏選將重慎賞罰以明勸寵以春夏之月稍移邉兵就食內州稍減邉騎就牧內地邉費省則國計足民力寬然後外謹信誓內完守備悠久實效無先於此竒譎空言又何足聽此亦先物之理也伏惟陛下至仁盛德髙明博大勞謙寅畏以求理要斯帝堯之詢于衆大禹之不自矜先格王之懿蹟陛下裕然而有之臣愧於頑踈不達治道據詔問所及謹以近事上對其詔㫖所不及者亦不敢僭易有陳也干冒天聰臣不任隕越待罪之至方平又對曰臣奉十七日御劄所有手詔該說不盡如卿更有所見令子細陳述具實封聞奏者天㫖訪逮承命惶栗學識淺陋愧不能副聖明求理勤切之心臣竊惟士大夫之遭時事主雖有長才逺慮欲一自致而莫之得也今臣何者而遇陛下深懷抑畏虛心聽採不有天下之樂而以天下為憂臣敢隱情悼害有所不盡者歟伏詳前詔所問冗兵措置之宜國計盈虛之本仕進多門之濫牧守乏人之由將帥簡擢之體西北預備之術此皆當今切時要務聖意慮之固巳深矣今被旨俾得更陳所見敢推愚心嘗所念慮之事擇取其尤急者以獻焉今兹聖心因昨保州恩州之變得無常以河北為意者乎臣嘗歎國家竭天下之力以養冗兵而且成禍階然河北比天下又為甚何也河北自唐天寶安史叛亂之後繼以五代後唐後周皆因魏以為業故河北兵素以驕悍自處又北接戎境朝廷亦嘗姑息之承平雖久而驕氣不除在於事體亦難處置欲選擇軍校以嚴整之耶則河北軍貟盡是本營選補不比在京及諸道可以轉貟移易也欲揀選上京别補軍分耶則河北軍盡是本營子弟姻婭蔓連根固樂土重遷不比在京及諸道可以選募轉徙也欲升遷軍分以利動之耶則河北軍衣糧素厚難以更行增給以此處置為難臣曽勘㑹河北廂禁軍僅二十萬人禁軍五之四然嘗體問其中疲老不任征役者甚多若朝廷密諭安撫部署司及轉運提刑官貟此後一切且住招填令依常例旋行揀放頻作畨次揀選少作人數放停使由之而不知無得漏露朝旨嵗年之後稍稍團併據所闕指揮發自京禁兵就逐州駐劄夫自古巳來置兵之法漢則有南北軍七校唐則兩軍十二衛必須離析其勢使相持制然後平也河北兵自唐巳來驕悍跋扈但以土兵相黨爾今若漸消土兵稍置禁旅則主客之形可以相制若統之以能將撫之以能吏折其孽牙去其害羣者庶乎置器於安也今兹聖心因昨衛士震驚宫省得無以親衛為意者乎臣按周官虎賁氏掌守王宫皆士也趙左師觸龍託其子於太后碩補黑衣之闕以衛王宫蓋王官之衛兼用卿大夫之子弟也秦漢官儀郎中令掌宫殿掖門戶三署郎皆執㦸侍衛期門此郎無貟多至千人後更名虎賁郎羽林次期門取六郡良家子弟充之又取從軍死事者之子孫養羽林教五兵號曰羽林孤兒歷代以來宿衛之士不惟選材武必取馴慤莊願之人以其近尊者不可不慎也國初循周朝軍制置諸班直備爪牙士屬殿前司又置親從官屬皇城司掌啓閉掃除之役守衛扈從之嚴其宿衛之法殿外則相間設廬更為防制殿內則專用親從最為親兵也然募置之法則異於古皆墯遊無根蒂莫容其身而後應募者矣前此變故卒生意外臣恐當有以懲創之臣職在詞禁軍旅之事未之預聞輒約古制粗陳其要惟陛下擇焉若於諸班直中選其年勞久次者至於東西下班殿侍有門閥家業者及諸軍中死事者之孤稍有材力勝兵者嚴立保委之法選取千人以充殿內之衛仍領屬皇城司令樞密院殿前司立定選補格式嵗月更代之法嵗滿則優遣之碩留者令皇城司保任委是莊願謹良則聽留蓋取之以年勞久次則人以為出身之地取之以門閥家業則有家族之顧取之以死者之孤則忠義之人知勸立年更代則人知勞逸得均遷補有式則人知自重若其功過之準教習之法居處之制頒給之例即請自朝廷裁議今兹聖心思冗兵之為患憫國用之不給得無念其所以致然者乎臣聞太祖皇帝訓齊諸軍法制甚嚴軍人不得衣皂但許衣褐其制不得過膝豈有紅紫之服䓗韭不得入營門豈知魚肉之味每請月糧時營在城西者即於城東支營在城東者即於城西給不許雇車乘須令自負以勞役之嘗問左右後唐莊宗何以致亂或對曰莊宗不能御下嘗出獵軍士至攏馬首自言兒郎寂寞望接借太祖拊髀歎曰莊宗得天下大艱難所為乃如此我於三軍亦不惜財敢犯我惟有劒耳故是時令行禁止軍士亦以足用今則異矣臣嘗入朝見諸軍帥從卒一例新𬗋羅衫紅羅抱肚白綾袴絲鞋戴青紗帽長帶紳鮮華爛然其服裝少敝固己耻于衆也一青紗帽市估千錢至于衫袴蓋一卒之服不啻萬錢今之上四軍請給比諸軍為至厚然月受千錢正可買得一帽爾度所戴帽嵗須二枚補染服裝須要鮮潔則於諸事略稱此也計其所受廪給不足一身之費若有妻子曽得不飢凍妻子既不免飢凍小人之情豈能不歸怨于上此軍情所以易動也至于常程特支例只對料錢勘請朝廷一次特支在京約用錢三十萬貫及入軍人之手何足為用是朝廷不勝其困軍中殊未有濟所以致此者由乎習為侈汰之弊也碩陛下因清問之餘試召軍帥如此問之便可密令條陳以何術可以革今日之奢靡以何道可以復昔時之朴素如帥臣能自節約以身率下則軍人庶乎可以存濟矣今兹聖心以近日諸道州郡軍民填造妖事往往起大獄得無欲以深刑峻法懲止之者乎臣竊惟陛下御極于今且三十年其甚盛德之事所以感格天地結洽人心之深者以其至仁慈厚好生惡殺急深故之罪寬縱出之罰哀矜庶獄惟刑之恤也近因貝賊挾妖為亂朝廷又追劾李談之獄張存等例䝉重罰州郡承風覺發妖事所在成大獄至於誦經供佛符呪禁術盡遭捕繫蔓延平民豈無姦人乘便填造疑似以干賞利或挾讐怨更相攀引搒掠之下何求不獲今臣見判審刑院本院奏案七十餘道內二十餘道係是妖事雖近降朝㫖嚴加止絶但恐今後官吏斷獄指李談為鑒戒無復更用平恕之心文致鍛鍊慮成後悔臣聞賞罰猶風也人情猶草也草上之風必偃人情隨賞罰而遷矣臣惜陛下三十年之甚盛德功虧於一簣寶元之後國家多故邉郵繹騷人事紛紜災異屢見中外屬任之官鮮著事效推諸人事勢可憂己聖心焦勞寅畏祇厲日慎一日迄此乂寧獨賴陛下至仁慈厚之德所以感格天地結洽人心之深者也奈何輕用刑獄以危天下招致沴氣以速民怨者乎此月十六日立夏可以挺重囚出輕繫碩陛下先期臨軒疏決在京罪人因遣使四出應州郡見禁妖事今依近降聖旨除情涉不順者具案聽裁外餘並釋免仍切敕逐路提㸃刑獄司覺察部下刑禁枉濫及有枝蔓良民務在清平不失有罪而巳仍告諭官吏無得以張存之故因用深文從事上全聖德下安人情斯社稷之長慮也凡臣所陳實時要務然皆事之一節爾至於天下大勢臣請為陛下言之臣觀古今治亂之變不在其他只在上下之勢離合而巳上下之勢合事無大不成上下之勢離事無小不敗比年以來朝廷頗引輕險之人布之言路違道干譽利口為賢天下承風靡然一變又外人議論展轉緣飾沽激倣效惟恐不及敗壞雅俗遂成險薄內則言事官外則按察官多發人閨門曖昧年嵗深逺纍經赦宥之事而又諸色小人下至吏胥僮奴觀時得逞敢犯於上填造辭說朝廷便行濟以愛憎何所不至故自將相而下至于卿大夫士惴惴危恐莫有泰然而自安者一動一為輒曰恐致人言也料此以至陛下宫省左右前後下逮閭巷庶人亦莫不然更相姑息專避嫌疑茍且因循求免謗咎何暇展布心體為國立事者哉臣竊詳聖意豈欲人情風俗之如此歟但以其所由來者漸矣自上及下無不知此者但莫肯為陛下深切開陳之也理道之壅無大於此上下之勢離阻若是則誰與陛下同心一德而深謀逺慮者哉既無同心一德之人深謀逺慮之士則天下之務何以致治碩陛下深為留神務在通上下之情欲上下之情合在審於聽受而巳臣自參侍從陟降十年對法座聞德音多矣觀陛下之寬仁矜惻如天之無不容也英睿明智如日之無不照也彼浮淺狙詐之人亦何有遁形於天日之下者然臣聞聖人作罰宥過無大刑故無小欺罔險譎是為真姦偶虧檢防是為小疵若陛下察其真姦必正國典寬其小疵以全人用副有臣億萬自當一心隨才大小孰不傾盡此所謂合上下之勢誠君人之大體為國之大方也碩陛下於此特加省納焉臣識慮迂踈不達理要本末柬擢盡出聖恩浮沉著位愧無補報矧被咨訪敢不盡愚上瀆宸聰不任戰汗惶栗之至謹對慶厯二年知諫院歐陽修論乞令百官議事劄子曰臣伏見祖宗時猶用漢唐之法凡有軍國大事及大刑獄皆集百官參議蓋聖人慎於臨事不敢專任獨見欲採天下公論擇其所長以助不逮之意也方今朝廷議事之體與祖宗之意相背每有大事祕不使人知之惟小事可以自決者却送兩制定議兩制知非急務故忽略拖延動經年嵗其中時有一兩事體大者亦與小事一例忽之至於大者祕而不宣此尤不便當處事之始雖侍從之列皆不與聞巳行之後事須彰布縱有乖誤却欲論列則追之不及况外廷百官踈逺者雖欲有言陛下豈得而用哉所以兵興數年西北二方纍有事宜處置多謬者皆由大臣自無謀慮而杜塞衆見也臣今欲乞凡有軍國大事度外廷須知而不可祕密者如北方去年有請合從與不合從西戎今嵗求和當許與不當許凡如此事之類皆下百官廷議隨其所見同異各令署狀而陛下擇其長者而行之不惟慎重大事廣採衆見兼又於庶官寒賤踈逺人中時因議論可見其髙材敏識者國家得以用之若百官都無所長則自用廟堂之議至於小事並乞只令兩府自定其錢榖合要見本末則召三司官吏至兩府討尋供析而使大臣自擇至於禮法亦可召禮官法官詢問如此則事之大小各得其體如允臣所請且乞將西戎請和一事先集百官廷議修又上疏曰臣伏覩方今邊患日亟公私內困盜賊並起蝗旱相仍陛下軫念生民深思禍患憂勤之意夙夜焦勞而中外臣寮未能為國家逺慮謀建長策少濟時事以寬聖懷近日以來風俗尤薄搢紳之列不務和同或徇私意以相傾或因小事而肆忿紛然毀譽傳布道塗飾巳短以遂非各期必勝進偏辭而互說上惑聖聰當陛下思念逺圗之時致陛下自厭紛紜之議至於朝廷得失邦國安危熟視恬然各思緘默陛下仁慈睿聖務存大體未欲明行賞罰以戒澆浮伏望聖慈特降詔書戒勵中外革兹時弊各使同心憂國捨小謀大然後陛下不以小事紛紜煩於聽覽則可以坐運宸算以康時艱四年修又上疏曰臣伏聞近出手詔條六事以賜兩府大臣有以見陛下憂勤責任之意然而天下紀綱隳壞皆由上下因循一旦陛下奮然雖有責成之心而大臣尚習因循之弊不能力行改作以副聖懷自去年范仲淹韓琦等特被選擢陛下尋開天章閣召見而大臣遞互相推並不建明一事以救天下之弊洎至內出手詔范仲淹富弼等方始各條數事至今半年有餘或寢而不行或行而不盡或雖行而未有明效今陛下又以六事責之臣恐兩府大臣依前無以上副憂勤之意下救當今之急臣碩陛下不因常例奏事之時特御便殿召兩府大臣賜坐先戒以不得推避緘默後以當今大務問之須令有所陳述所問之急不過三四大事而巳二敵交侵一也三路禦備之術何者可以易行而速效二也百姓困匱國用不足何以使公私俱濟三也若兩府大臣於此三事能其一者便委其專管示以責成可也若其不然臣恐手詔屢出聖意雖勞而大臣相推終未濟事陛下必欲速救時弊非專任而切責之不可也八年御史中丞魚周詢答詔條畫時務上疏曰臣伏以陛下患西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給臣以謂唐季及五代彊臣專地中國所制疆域非廣及祖宗有天下俘吳蜀楚晉北捍獯鬻西服羌戎所用甲兵所入租稅比之于今其數尚寡然而摧堅震敵府庫無空乏之弊縣官無煩費之勞蓋賞信罰必將選兵精之效也近元昊背恩西邉宿師朝廷用空踈闒茸者為偏禆募遊惰怯懦者備行伍故大舉則大敗小戰輒小奔徒日費千金度支不給賣官鬻爵淆雜仕流以鐵為錢隳壞圜法而又官立鹽禁驅民齎輦蕩析恆産怨咨盈路去秋水旱繼作今春飢饉相屬生靈重困於兹為劇今元昊幼子新立乃朝廷寬財用惜民力之時也速宜經制以紓匱乏碩委安撫使與本路守邉掌計臣寮同議裁減冗兵節抑浮費禁止橫斂廪假貧民去武臣之庸懦及守宰之貪殘仍冀特發宸斷出內帑錢助關陜經費使通鹽商之利改錢幣之法宣布德澤與民休息然後勸勉農桑隱括稅籍收遺利抑兼并則公有羡財私有餘力矣陛下患承平寖久仕進多門人浮政濫貟多闕少滋長奔競糜費廪祿臣以謂國家於制舉進士明經之外嵗有任子流外之補負瑕釁服輿臺者又置於班列歷年既久紛然塞路周行之內太半非才求人之際鮮堪適用而亟更數易交錯道塗貟數有定詔除無限凡守一闕動踰再嵗預閨籍服武辨者坐費水衡之給虛計嵗考之期赴銓調守選格者居有困窮之歎多隳廉耻之行官冗之弊一至於此碩陛下特詔進士先取䇿論諸科兼通經義中第釋褐無令過多其文武班奏薦并流外出官者權停五七年自然名器無濫奔競衰息矣陛下患牧守之職罕聞奏最臣聞漢宣帝勉勵二千石有治效者增秩賜金或爵至關內侯公卿缺則以次用之故良吏為盛國家鑒諸侯專地之患一切用郡守治之而朝班寖冗序遷者衆乃有地處蕃宣秩為卿監而未歷省府提轉內重外輕何以求治改絃易轍正在此時碩詔兩府大臣選委兩制臺諫官參舉如兩任通判可充知州軍依次除補若治狀尤異即升省府提舉轉其常例入知州及敕舉提刑並一切停罷則進擢得人牧守重矣陛下患將帥之任難於稱職臣聞晏子薦司馬穰苴曰文能附衆武能威敵是知將帥之材非備文武則不可為也我朝自二敵欵附久不用兵近嵗有西北之警補授帥臣出於遽猝非自卒伍即恩澤侯無信義以結士心無莊嚴以正師律退則奔北進則被擒虧損威靈取侮夷狄命將之失未有若今之甚也謂宜擇名臣選舉深博有謀知兵練武之士不限資級試以邉任臨軒敦遣假以威權如祖宗起復邉臣李漢超輩閫外之事俾得專之無以謗讒輕有遷徙使其足以取重則安有不稱職之憂乎陛下患西北多故敵態難常獻竒譎空言者多陳悠久實效者少備預不虞理當先物臣聞國家和約北戎爵命西夏偃甲止戈踰四十年而守邉多任庸人不講武備因循姑息唯冀升平羌戎野心窺見表裏故景祐之末元昊猖狂慶歷之初耶律悖慢覆軍殺將以疲關陜之民厚幣卑辭暫解幽薊之敵皆用茍安之謀殊無經逺之䇿此班固所謂不選武略之臣恃吾所以待寇而行貨賂割剝百姓以奉寇讐者也碩陛下特議於三路減兵馬之駑冗者以紓經費以息科斂然後選將帥擇偏裨使戢肅驕兵飭利戎器識山川形勝用兵法竒正河朔曠平可施軍陳亦宜講求其法雖二敵有變異時侵軼將有所恃庶幾無患周詢又答詔條畫時務疏曰臣巳奉詔條畫時務而陛下復躬親詢逮蓋以諸臣所對未究根本故求可行之䇿臣不敢為文辭輒布愚直切冀有所補焉所謂今之闕失者陛下聰睿髙出前古然聖慮所未至臣下所難言者唯責任不專用人猜忌為大也自昔年二府大臣及臺諫官有互為表裏者聖聰覺悟巳行黜典遂以謂人皆朋比無復忠信今中外之臣每進對于前但敢攻過失即為公論若及忠良材能云可任用則慮聖意疑為朋黨故忠邪未盡分善惡未盡聞也所謂責任不專者今執政大臣心知某事可行某法可罷但拱默自安不肯為朝廷當之致文武大政因循弛廢此又闕失之大者臣碩陛下聽政之外選材識之臣獨對便殿詢諸臣能否曰某人疑可用某人不足用然後廣訪博採參驗異同俟其得實則行進對或上承聖問而情有詐欺憎惡則屏之逺方終身不齒何人更敢朋黨又任用之際責其成效果敢當事者則優與進擢因循形迹者則黜居散地何人敢不盡其心乎詔又患文武姦回中外險詐者臣聞易曰拔茅連茹以其彚征吉言君子小人道同性合相羽翼而進也今朝廷根本陛下股肱者二府大臣也安危治亂繫此數人在祖宗時用吕端李沆王旦馬知節及陛下即位之初用張知白王曽魯宗道輩持重處正深博有謀當時引薦擢任不聞有朋邪險詐者今陛下知二府或非其人不能奮然黜之使彚征之勢來者未已自古天子擇宰相宰相擇百官欲矯率此風不先正大臣則所謂形未端而求影之直原未澄而欲流之清也詔患州縣暴虐法令更張者祖宗積德陛下好生失出者不為深罪失入者終身負責宜長人之吏上體寬仁愛育黎庶而或有暴虐者蓋公家急於賦斂以嚴集事貪吏因緣生姦以威動衆使之然也夫法令者治世之銜勒宜守而勿失若祖宗法令可以經久者不宜更易近樞密院改內省條令似與曩者負罪之人預為復進之地中外喧然以為不可況內省者左右之近密朝廷者四方之根本儻不能堅守法令則天下何以取信乎碩遴選刺史縣令諭以愛民之意則州縣無暴虐之患矣裁抑權貴無使輕易條憲則法令無更張之失矣知制誥曽公亮答詔條畫時務面奉御劄曰朕承祖宗大業賴文武良臣夙夜兢兢期底於治間者西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗于兹公私匱乏加以承平寖久仕進多門人浮政濫貟多闕少滋長奔競糜費廪祿又牧守之職以惠綏吾民而罕聞奏最將帥之任以威服四夷而艱於稱職豈制度未立不能變通於時邪豈簡擢靡臻不能勸勵於下邪西北多故虜態難常獻竒譎空言者多陳悠久實效者少備豫不虞理當先物朕思濟此急務罔知所從以卿碩望故兹訪逮躬佇條畫臣才識淺陋仰應聖問謹昧死條對上進一伏覩詔書謂間者西陲禦備天下繹騷趣募冗兵急調軍食雖常賦有增而經用不給纍嵗于兹公私匱乏此實方今之先務也臣切謂國家經用不給者非有他焉由冗兵之所耗食也朝廷所以未能斥減者豈不為沿邉三路尚須屯戍疆塞廣袤用之尤且不足乎臣計今疆塞未多於建隆開寶之年是時外捍邊陲內有河東西蜀江南嶺南之戍而所蓄禁兵止十二萬而巳至乾德中兩川江嶺巳平則又減二萬太宗盡有天下所添之兵才三十餘萬真宗初年亦止三十八萬至乾興中始及八十餘萬以此知兵少則訓習齊一所向無敵兵多則冗雜難齊所施寡效其理甚明也今乃自慶歷巳來既廣招募又升廂軍為禁軍凡總一百餘萬然而用之罕聞成功者非獨將佐之不武由所用之卒不精爾不精之由無他在乎多而不得齊一也而況廣費廪給竭天下之財力可不深慮乎臣以謂事巳久定非可旦暮措置須用數年圖之可籍見兵之數專委信臣精加選擇取力伉健軼群超等一夫可以敵二三者别為部伍俾如太宗及真宗初年三十八萬之數改立名額練為精卒付於善將後有亡逸亦用此格招填使之捍邉是用精良之少而代疲冗之多安得不足也而況二宗之制未逺哉其餘疲軟老耄則散屯東南闕兵之郡就食賤榖有亡逸者更不招補數年之內十必減四十年之內必可消弭不唯減天下之蠧耗實亦得精兵以為用也方今二敵衰弱兵械休息朝廷不速圖之則臣恐小有水旱糧餉微梗則陛下焦心旰食於上矣圖之實宜早焉若舍此為計是皆迂論臣又切聞宣毅兵久為東南之弊料上封者言之多矣況南方小郡有舉城無二三千戶者乃置禁兵數百坐食膏血官不得人往往為患自昔祖宗之制東南諸州唯迭遣廂軍屯駐至于藩鎮則量加禁兵駐泊以為旁郡式遏行之甚久頗適事要止從慶歷之初創置此兵今諸路轉運供億艱苦逺郡官吏憚於統制臣以謂除京東西路外其餘諸路悉可罷廢揀入别軍其老弱者令入本城役作唯一路藩鎮許揀留千人依舊教閲以鎮遏旁郡此又減費弭患之一端也臣仍碩自今置廢興作須樞臣熟議毋得不問財賦而專有添創如慶厯之失臣伏聞祖宗舊制三司每季供糧草文帳一本赴樞密院夫樞密不主財賦而使供帳者是欲置廢兵馬常使與芻糧照對也往嵗樞臣不練事體稱糧草本屬中書密院供帳久為閒冗乞自今罷之則知樞密總兵自來罕問糧草之有無如此謀國豈天下取安之計也今聖慮軫及中外大幸碩陛下畢舉而行之使太平可致也一伏覩詔書謂承平寖久仕進多門人浮政濫貟多闕少滋長奔競糜費廪祿此誠方今之大患也臣不敢逺引前代請以唐制明之正觀中太宗平定天下創立法度是時文武定貟唯六百四十三貟天下不為不治法度不聞不立也至永徽神龍中方內巳寧朝綱巳備髙宗不能遵太宗之業遂容濫官於貟之外既置貟外貟外之上又置同正及武后亂政又增置貟外官二千餘貟是時朝廷益多事綱紀益隳壞官之繁簡蓋利害明矣臣且聞景祐中審官三班流內銓吏貟之數巳多於祥符景德之日今則比方景祐中又多一倍臣嘗原之蓋由寶元以來陜西用兵或獻方略或陳武伎或因邉臣薦引自經略部管巳下每出並奏命有司胥吏諸班人擢授管部或以微勞録用擢軍班之材勇開進納之恩限所以三班餘曹官倍景祐之數也又如崇班巳上謂之內朝臣祖宗所置本無數年磨勘之制多因功績乃與遷轉止因朝廷宰相寡謀啓此僥幸諸司使額遂為殽雜也故官之冗基自京官按真宗朝銓司磨勘選人每甲止見一貟一月不過三四甲亦無逐甲皆轉是一月之內轉是官者一二而巳率皆考任巳多績狀可取始被此選近嵗每間日見磨勘選人一貟二年巳來改為數日一見每見五貟盡得改轉甫及三嵗又升朝序故審官貟闕漸見不足差擬此審官三班銓曹之蠧根也夫古之職官則今之差遣職任是也皆居有曹局局有貟數固不可得而多也陛下若欲鑑纍世之失大有改為臣請自二省官及橫行諸使巳下並按舊典議定貟數如御史臺官是也於舊貟之外量數加置以備出使貟額之外一不許置有勞當擢者但容遇闕先補唯軍功重任始得越此遷轉立制既定雖有近僥幸踰亦無由進也陛下若重於改作但薄欲懲創則臣請自今應進納人直除七品上佐官不令蒞事廢方略之舉臣寮保薦弟姪者他日犯罪始同罪舉官之例諸司禁補額外正名大臣不得奏任門客常從限邉臣之薦引汰賞功之泛濫每嵗經學之選素未精核不通義理止誦空文施於政事實非有益請用慶歷四年張方平等重定貢舉條約則濫進者少矣諸司人吏在他司司農糧料兵部之類本無異勞而例得遷資減選請一切罷之則選限有常矣如此則入流之路稍隘也至若銓司引見之式樞密三班磨勘之例祖宗舊制可以復行如此則朝行之內亦不數年貟闕可以相當矣其或普加澄汰廣欲去留奪其見官恐未可亟行於兹日也唯此末議庶幾無損一伏覩詔㫖謂牧守之職以惠綏吾民而罕聞奏最臣伏思之由選之不精遇之不重勸之不至而使然也何以言之今審官差擇知州無問賢拙但考深資至則授焉故弛慢者有之耄老者有之病廢者有之姦贓者有之此選之不精者也又如朝廷重內輕外寖成風體遂使縉紳之流稀肯以州任為貴夫州郡古二千石之職也今雖自京府推官而往亦視為左遷凡臺閣不勝其任則授郡以遣去故能臣幹吏多在錢榖刑獄之任以仕不脫知州為耻此遇之不重者也及其居官為政茍有善狀上不過提刑轉運一發薦啓幸朝廷用之則止於付審官記姓名而巳卒未聞政有善譽而朝廷一加遷拜此勸之不至者也古者天子擇宰相宰相擇群吏臣請自今審官擇知州皆引詣中書詢察然後擬奏昔兩漢時郡守乃與九卿令僕迭相出入其政理尤異至有直拜三公者今碩峻其等威如漢故事使雜流不得妄入則賢者樂居其職矣商書曰德懋懋官功懋懋賞雖堯舜三代群臣猶須官賞以勸立功德而況今人哉臣請别立典州考課之等委監司采察三考有善政者則升其官資兩任有善政者則升其任使顯無狀者則罷黜之庶幾可以副陛下憂民之意也一伏覩詔㫖將帥之任所以威服四夷而罕聞稱職臣嘗觀太祖太宗之時征伐海內建威定亂成太平於十九年之中將帥得人固可知矣唯自咸平巳來真宗嘗與陳堯叟馬知節共論將帥之難得至于今日陛下復以將不稱職為憂豈天下之人獨生才哲於建隆興國之間而咸平以來逮今五十餘年絶然無一臣之能繼乎是必不然也臣慮選之未得其要或用之不盡其才爾軍志曰三試然後授事是欲先視其才實然後任之以事昔趙奢與子括論兵奢不能屈退而歎曰兵危事也括易言之用之必敗李靖為將似不能言則知將之才能其難知也如此臣昨見陜西用人固未聞朝廷有試以實效者如趙珣因上圖說便委萬兵之任卒至於敗臣所以慮選之未得其要者皆此類也其次雖得善將而任之不盡其才何哉恭以太祖太宗之朝軍政巳講廟堂之宰練知兵體故帥臣之進一言畫一計利病用捨雖從中覆及其畫奏報下無不適其事機將之有材可以竭盡矣咸平而後守文偃革大臣宰相罕歷邉務故帥臣進一言畫一計尚如祖宗之時利病用捨悉從中覆及其畫奏報下茍一事不適機要則將有不得盡其才慮者矣望其立功何可得哉故咸平逮今乏善將者其弊未必不由此也孫子曰不知三軍之事而同三軍之政者謂之軍惑不其信哉方今二邉不警朝廷得以講備臣請自今擇將未加遷擢必先試以行陳疆埸之事所試有效至于三四始與顯官厚祿以重其任然後委其命而勿制用其言而勿疑此孫子所謂將能而君不御者勝是也一伏覩詔㫖謂西北多故變態難常獻竒譎空言者多陳悠久實效者少備豫不虞理當先物此蓋陛下得安不忘危有備無患之深㫖也臣伏思朝廷北有契丹西有拓跋二邉講備為日久矣今北邊之勢纍年孱弱向欲報仇夏臺猶不能舉矧肯捨嵗入之厚利而輕犯中國也雖豺豕之性難以保信料勢利束之當不能動也況今大河之北重兵列戍巳有藩籬之固矣西夏新有巨釁君少國疑料其衆心猶懼大國之見絶豈遑自出為盜也四路見兵備之有餘矣臣以謂朝廷方今之慮不在二邊而在山東河北之地刀鋸之慘人心尚危小有水旱姦凶必乘為寇宜常得要官才吏以分鎮要州庶幾可以消患於未萌者也右臣祗奉聖問條對如右識慮暗淺塵冒天聽歷代名臣奏議卷三十一
