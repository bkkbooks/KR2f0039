body:
  text: 歴代名臣奏議卷二百二十二明楊士竒等撰兵制宋徽宗時李復奏乞罷造戰車劄子曰臣准樞密院劄子奉聖㫖令本司製造戰車三百輛專令臣催促製造應副本路出入攻戰使用臣嘗覽載籍古者師行固嘗用車詩云公車千乗公徒三萬又曰元戎十乗以先啓行及周制自歩百為畝積而至於通十為成成出革車一乗其他斑斑亦可見古之用兵與今不同古者兵不妄動征戰有禮不為詭遇舉皆有法多在平原易野故車可以行敵人不敢輕犯此以車為利也今之用兵盡在極邉敵人乗勢而來雖鷙鳥飛翥不如是之迅㨗下寨駐軍各以保險為利得其機便或有負敗各逃散不相顧其往車不及期居而保險車不能登歸則敵多襲逐争先趨奔不暇回顧車安能收非若古昔扵中國為用臣在兵馬間親冒矢石前後十餘次觀之屢矣有至糧糗衣服器械不能為用者又況扵車乎聞此議出於許彥圭彥圭因姚麟之子師閔而得見麟遂獻説扵麟懇告求以此為進身之謀麟乞憐而上其説朝廷以麟邉人必熟於邉事意遂然之不知彦圭劇為輕妄麟立私恩不思誤朝廷之事是亦容易昔唐之房琯嘗用車戰大敗扵陳濤斜十萬義軍無有脫者當時止在畿邑平地且如此況今欲用於峻坂溝谷之間乎又戰車比常車闊六七寸運不合轍牽拽不行今配買木植物料差雇工匠大為費擾既成艱於牽拽昨東來者牽拽不行致兵夫典賣衣物自賃牛具終日方進五七里遂致兵夫逃亡戰車棄於道路大為諸路之患其糜費不知其幾千萬矣茍望一官之進上㒺朝廷下害百姓此而不誅何以懲後臣今乞便行罷造如别路已有造者乞更不牽拽前來免致徒費人力如朝廷未以臣言為然乞賜博訪通判李新奏曰臣嘗謂古先聖王扵萃聚之時必除戎器戒不虞示有國者不可一日去兵也天下承平日久州郡軍器因循不修治暑月未嘗暴曬兵刃不加淬礪衣甲旗幟破碎㫁裂少有鮮明者大率安置不如法蜀地卑溼天多沈隂雨水動經旬月既非髙燥處貯藏則未閲嵗時筋膠解拆韋革腐爛絛貫㢮絶蹂踐弃擲不可勝數如梓州一路遂寧府叙州有都作院嵗課不少而兩州皆無樓閣架放非惟枉費官物緩急警嚴殊無犀利可用之器誠可慮也臣欲乞諸州府甲仗庫未有樓處並許創置有而隘陋處即添展修葢務要收藏軍器可以耐久亦預備之術立武之餘事也欽宗靖康元年尚書右丞李綱上言曰臣竊惟軍政之不修二十餘年扵此矣將驕卒惰賞罰無章毎戰輙北兵既寡弱民又凋弊金人由此敢肆慿陵中國之不振未有甚於此時者也今敵雖退師尚未出塞所至剽掠無復顧憚葢由初未嘗有所懲創時方向暑須暫逺去秋凉馬健何憚而不來此其可慮又非前日之比義宜及今速為之備一曰選將二曰募兵三曰訓練四曰保甲五曰馬政六曰繕器甲七曰峙糧草八曰修城壁九曰増塘濼十曰置堡塞凡此皆軍政之大者當今之急務也而其財用調度之費不與焉前此敵未退師支梧目前固未有暇今度其勢出塞決在旬日而此去防秋近在三數月間要當自兹講求施行不可復緩又況西戎跳梁五路並入四夷交侵誠可深慮臣以書生備位樞筦方艱難乏使之時乞避賢路不䝉賜許夙夜思之國之大事無過於此誠非一介孤陋所能獨任要當合衆智協衆力上稽祖宗之舊下考當今之宜庶㡬有濟欲望聖慈許臣辟置叅謀官四員扵職事官中不拘官資髙下兼充仍添置編修官二貟同共措畫條具以時推行如䝉允許容臣續具姓名以聞綱為河東北安撫使又論不可遣罷防秋人兵劄子曰臣昨待罪樞府伏䝉陛下委令措置防秋人兵臣意以謂中國軍政不修幾三十年矣闕額不補者過半其見存者皆潰散之餘不習戰陳故令金人得以窺伺既陥燕山長驅中原遂犯畿甸來無藩籬之固去無邀擊之威廟堂失策使之割三鎮質親王刼取金帛以億萬計驅虜士女屠戮良民不可勝數誓書之言所不忍聞此誠宗社之羞而陛下嘗膽而思報者也今河北之兵雖退而中山河間之地不割敵馬出沒並邉諸郡寨柵相連兵不少休太原之圍未觧而河東之勢危甚旁近縣鎭皆為敵兵之所占據秋髙馬肥敵騎慿陵決須深入以責三鎭之約及金帛之餘數倘非起天下之兵聚天下之力觧圍太原防托河北則必復有今春之警宗社安危殆未可知故臣輙不自揆為陛下措畫降詔書以團結諸路防秋之兵大約不過十餘萬人而欲分布河北沿邉雄霸等二十餘郡中山河間真定大名横海五帥府腹裏十餘州軍沿河一帯控扼地分翊衛王室隄防海道其甚急者觧圍太原收復忻代以悍金人夏人連兵入寇不知此十數萬之衆一一皆到果能足用而無賊馬渡河之警乎今臣被命出使去清光之日未㡬朝廷已盡改前日詔書調兵防秋之計既罷峒丁又罷刀弩手又罷土兵又罷四川福建廣南東路将兵又罷荆湖南北路係将不係将兵而京西州郡又皆特免起發是前日詔書所團結之兵罷去大半不知金人聚兵兩路入寇将何以支梧而朝廷何恃不留意於此也臣切思之以兵為不須起者大槩有五川廣福建荆湖之地逺一也錢糧犒賞之費多二也河北兵退天下已無事三也太原之圍敵馬不多不攻自解四也探報有林牙髙麗之師金人牽制未必深入五也若以川廣福建荆湖之地逺則詔書之下以四月期天下兵以七月當時闋報三省何不即止今已七月逺方之兵皆已在道始復約回是復蹈今春勤王之師約回之弊也一嵗兩起天下之兵中道而兩止之天下謂何臣恐朝廷自此不復能取信四方而将士觧體矣國之大事在戎宗社安危所繫而且行且止有同兒戲臣竊痛之若以謂錢糧犒賞多則今春無兵捍敵致令誤國土地寳貨人民皆為所取今惜小費又不為之備臣恐後來所取又不止扵前日也況元降指揮防秋人兵各令齎糧以行則錢糧犒賞之乏自非所患廟堂不深思宗社大計而惜小費臣切所不取也若以河北兵退天下無事則邉郡日報金人聚兵聲言某月入冦當取某地强敵臨境非和非戰朝夕恐慄懼其復來天下果無事乎賈誼謂厝火積薪之下而坐其上火未及然因謂之安以今日觀之何止扵火未及然殆處扵烈熖之旁而言笑自若也若以謂太原之圍敵馬不多不攻自觧則自春徂秋攻守半年曽不能得其實數姚种二帥以十萬之師一日皆潰彼未嘗有所傷衂不知何以必其兵之不多以為可以不攻而自觧者臣以謂非愚則誣至於林牙髙麗牽制之報理或有之然不可恃彼之不來當恃我之有備則屯兵聚糧正今日之先務不可忽也今河北河東州郡日告危急乞兵皆以三五萬為言而半年以來未有一人一騎可以副其求者防秋之兵甫集又皆遣罷不知此何理也若必以謂不須動天下之兵而自可無事則臣誠不足以任此責陛下胡不遣建議之人代臣坐致康平而重為此擾擾也除范世雄所統湖北兵聞已至㐮唐間臣已作奉聖㫖令疾速發赴宣撫司外所有餘路乞依元降詔書起發庶㡬不誤國事又近降指揮減罷防秋之兵臣所以深惜此事者一則河北防秋闕人恐有疎虞二則一嵗之間再令起兵又再止之恐無以示四方大信防秋之計臣前奏論之已詳請為陛下更論不可失信之意者周為戎人所侵嘗以烽火召諸侯兵恐諸侯之未必至也舉烽以試之諸侯之兵大集知其試已皆怒而歸其後真舉烽無復至者去冬金人将犯闕詔起勤王之師逺方之兵踴躍赴難至中途而敵已和有詔止之皆憤惋而反今以防秋之故又起天下之兵良非獲已逺方之兵率皆就道又復約回将士卒伍寧不觧體夫以軍法勒諸路起兵而以寸紙罷之臣恐後時有所號召無復應者矣許翰上言曰臣伏見國家武備久弛盜賊横行不忌雖有軍旅驕惰難用非一新之無以禦捍臣愚願詔郡縣什伍其民家富者出財人衆者出力城郭之民使自守其城郭田野之甿使自衛其田野城郭分坊以保門田野分鄉以保境拔其豪傑使之部勒私務之隙教以武事家識金鼓進退之節人能弓矢擊刺之技小寇之至則可叅錯以捍禦大盜之入則得㑹合以擊逐藝進則郡縣旌之以金帛功立則朝廷勸之以爵位如此天下􅏮然皆為長城之固矣立法天下嚴其誅賞使凡寇至無敢不救縣破則責州州破則責帥隣路近州不能應援亦皆有責必行無赦宣王之詩所謂有常德以立武事者謂其能使天下必信如此故也髙宗建炎元年尚書右僕射李綱上言曰臣竊以唐有天下貞觀開元間號為治平無事者以外有方鎭之兵捍禦邊陲内有府衛之兵臨御方鎮表裏相制國勢以安其後府兵之法壊邉兵之勢强乃有天寳安史之亂然卒戡定之者方鎮力也代宗避吐蕃之寇而幸陜德宗避朱泚之變而幸奉天亦資方鎮之兵以復國然行姑息之政威柄下移强藩悍臣浸成跋扈此非方鎮之罪措置失䇿之過也祖宗監唐末之弊削方鎮之權惟沿邉帥司屯宿重兵委以軍旅之事腹内㑹府雖有帥號其權甚輕自餘列郡守臣悉委文吏不與軍政以處承平治安無事之時可也今彊敵内侵壊吾邉防以擾腹心之地盜賊乗時蜂起蟻結而州郡猶以承平之制臨之安能捍患禦侮鎮撫之哉故唐方鎮之弊尾大不掉而今日州郡之弊手足不足以捍頭目理勢然也救其弊而振起之莫若取方鎮之制用其所長去其所短擇人而任之使大小相比逺近相維以蕃王室則中國之勢尊矣臣愚欲乞扵沿河沿江沿淮置帥府要郡次要郡帥府帯安撫使節制一路即唐節度使之兵也要郡帯兵馬鈐轄次要郡帯兵馬都監以佐帥府即唐觀察團練之兵也朝廷減上供金穀使之養兵寛法制而假之權将佐寮属聽其辟置平居責以訓練閲習有干戈盜賊之變即帥府量事起兵統率以行與隣路約為應援㑹合有功者増秩進職而不移其任如此數年上下安習即州郡之兵可用矣如䝉聖慈俯從所請乞降㫖三省樞宻院條具合行事件取㫖施行綱又上言曰臣聞天生五材民並用之闕一不可誰能去兵故黄帝伐蚩尤於涿鹿之野堯伐叢支胥敖舜伐三苖禹伐共工湯伐有夏文王伐崇武王伐商皆綴甲厲兵效勝於戰陣之間夫五帝三王豈不欲坐致治安哉顧其勢有所不能故必以戰續之寛則兩軍相攻廹則杖㦸相撞然後可以建大功而定祸亂是故兵勝於外義彊於内威立扵上民服於下欲措國家於尊强者非兵不可也本朝藝祖太宗削平僭亂混一區宇用兵不過十萬人而天下承平垂二百年四海賔服外患不興豪俊銷亡内難不作治既極矣兵亦隨廢至扵近年有養兵之費無訓兵之法有蓄兵之名無用兵之實軍政大壊金人因之得以陵侮中國而致靖康之祸則兵制久廢之過也夫秦晋齊魏韓趙皆天下勁兵之地也古之為國者得其一則足以戰勝而霸諸侯今國家兼有之而每與金人戰望風輙潰不能取勝則積威約之漸也方今當京邑殘破二聖播遷之後國勢益弱士氣益衰而欲遽與之戰正猶病人氣體未復而欲與壮士鬬必不可也昔周用鄉遂之兵而出無不勝漢用羽林孤兒七郡良家子而制服四夷唐用府衛之兵而威震天下齊用管仲之法而九合諸侯秦用商鞅之令而卒併六國然則有天下國家者强兵戰勝之術槩可覩矣為今之計莫若法鄉遂府衛之制而寓兵扵農法羽林孤兒七郡良家子而參以募兵改法更令信賞必罰以壮國威以養士氣使之有勇而知方然後兵乃可用也昔勾踐有㑹稽之耻欲用其民而五年休養五年訓練卒以報吳今天下之廣生齒之庶休養訓練當以三年為期則戰可以得志矣惟國家承平之久文事太勝士以武弁為羞而學者以談兵為耻至扵戰卒賤辱之甚無以比者正當趣時之變以武為先能言兵者稍褒崇之置武功爵益養死士有以得其心而作其氣則戰勝於一日之間有不難也伏惟陛下留神幸察綱又上言曰臣竊以祖宗建國以兵為重熈豐盛時内外禁卒馬歩軍凡九十五萬人承平既久闕額三分之一失扵招填比年西鄙喪師江浙山東寇作繼之以燕山陷沒所亡失者又半重以靖康之變金人再犯都城諸路禁軍往往潰散流為盜賊天下之兵所存者無㡬矣朝廷以蠟書召天下勤王之師皆募扵田畆之間及游手浮浪之人雖其數甚衆環繞畿甸不得毫髮之力而東南公私財物為之一空大抵起一兵公私所費非五十緡不可而沿路供給錢糧之費又倍於此是一兵率費百十而起萬兵則所費百餘萬緡矣今秋期不逺理當揀擇留之分屯沿河要害之地則所費不過日給錢糧而已朝廷初不較此應勤王之師已行放散被甲荷㦸而歸者項背相望扵道路亦有纔至中途不待令而自返者不知将來防秋扵何所取兵而可也禁兵之數既已不多而民兵又不可復起雖起之必無應者秋髙馬肥敵騎或復深入其何以支吾哉臣愚以謂濟今日一時之急莫若取財於東南募兵於西北夫東南之財已竭矣而臣以謂不得已猶有可取者當誘上户物力有餘之家出財以助募兵朝廷量多寡以名目酬之民知國家有兵而後家室可保則亦不以為厲已也國家嵗漕東南財糓以為上供又𣙜茶鹽之利以實中都葢以養兵日給六宫百官之費待祭祀賔客之用省矣而陛下節儉無玩好宴逰之娛故凡上供財糓茶鹽之利除經費外一切裁損專以養兵則亦無不足之患臣願下募民出財之令且降㫖委官措置於京東京西陜西河北募兵優立例物之數創為軍號團結訓練一切以新法施行分𨽻将佐逐處屯泊以時教閲比之起東南勤王之兵其利害不同者有三東南之人柔弱不耐勞苦一也不伏水土𩔖多疾病死亡二也屯駐稍久則有思歸之心往往逃亡潰散三也而募西北之人以為兵則無三者之患團結訓練積以嵗月皆為精兵與夫起烏合之衆暫聚復散豈不相逺哉今河北河東京東西為金人所擾民不能歸業者甚衆而陜西素號産兵願及時遣使扵數路募兵扵合屯駐路分建置營房更畨以衛行在以鎮四方以備征討此時不可失也伏望聖慈特賜詳酌施行綱又上言曰臣竊以大軍之禮用衆也軍之所以積少為衆聨属不散可恃以勝敵者以其有紀律也團結則有保伍之聨教閲則有戰陣之制執被則有甲冑五兵之利進止則有金鼔旌旗之節禁戒則有號令之威上下則有階級之法兵将相諳彼此相救逃亡潰㪚者必誅騷擾亂羣者必罰立功者必厚賞死敵者必優卹此之謂紀律有紀律然後軍可用也國朝軍政最號嚴明自童貫髙俅主兵以來其制始壊團結保伍廢而無以相維持教閲戰陣廢而無以習攻擊甲胄五兵初不服練旌旗金鼓初不習熟禁戒號令之威不振而無以作士氣上下階級之法不行而無以一士心兵将取於臨時而初不相知彼此逓相觀望而初不相救盧溝之潰反以金帛招集則逃亡潰散者不誅矣浙東之役虜掠良民財物者悉皆官軍則騷擾亂羣者不罰矣僕廝親近皆授髙爵而立功者不賞以收身不到為名而死敵者不卹紀律如此而欲驅之以抗大敵豈不難哉是以金人再犯王室則控扼之兵望風先潰攻圍帝都則救援之師逗撓不進其因循至此非一日之積也且金人訓兵十有餘年不用令者小則必死大則族誅此法既行威信已著則用刑反少故能滅契丹陵中國積威約之漸非一日也中國之兵既失訓練又不用令者不必誅逃亡潰散者反招集之此風既成習以為常則有不可勝誅者矣故以天下之大而不能禦金人積弊之漸亦非一日也夫用兵驅之扵死地者也茍非畏我過於畏敵進有生理退而必誅則安能使之效一日之命以成却敵之功哉為今日之計莫若更軍政而漸治之團結之法自五人為伍積至於二千五百人為軍部隊将統制官逓相臨制皆有尺籍伍符以周知其名數呼召指使存亡功過不勞而可知臨陣戰鬬進退緩急不約而相援如此則兵伍有所聨屬而不散矣教閲之法以車騎歩兵緫為營陣進退坐作分合出入皆依新制革去舊教文具之法如此則行陣足以捍禦鐡騎矣習弓弩者不必以斗力而以射親中的者為上習牌槍刀者不必以中敵而以勇敢向前者為勝神臂筒射鳳凰等弓可以及逺宜教之使精兠鍪金甲卒伍多不肻被帯宜習之使熟如此則甲胄五兵之利可以自保而取勝矣古之行師者聞鼓則進聞金則止以旗之偃舉為所向之指麾今則不然金鼓間作初無進止之令旌旗錯雜初無指麾之意宜依古制以習兵之耳目如此則金鼓旌旗之節可以一衆而臨敵矣禁戒號令雖出扵臨時而信必在扵言前然後威可畏也上下階級雖著於甲令而勢不容扵幸免然後法可行也自部隊将至統制官皆精選而預設之使其恩威素行扵士卒則兵将相諳矣自伍甲部隊至六軍皆使之前後左右迭相應援觀望不進及輙退者必行軍令則彼此相救矣禁軍逃亡依法七日不首身者必斬遇敵戰鬭力不能勝因而潰散不再聚集歸本部者必誅因而作過者滅族則逃亡潰散之弊可革矣禁軍扵行師之際盜博鬬毆飲酒至醉抛棄器甲藏匿婦人脅取財物扇揺惑衆者並行軍法則搔擾亂羣之弊可懲矣先登陥陣及能以弓弩射中賊者雖不納級亦賞一軍全勝則全賞一軍雖不勝而其間有能自斬賊級及中傷在前者則自賞如此則立功者勸矣将士戰歿非逃亡者委保伍将佐開具保明優卹其家不得輙以收身不到開落違者重寘于法如此則死敵者勸矣此皆今日軍政之急務當以次施行也然臣頃年嘗詢一老卒其言曰昔日禁軍難作而易活今日禁軍易作而難活詰其所以則曰昔者法行而上下之分嚴故難作然請給衣糧及時而得無凍餒之患故易活今日法不行而上下之分茍簡故易作然請給衣糧多不及時又有坐倉折估之法妻子不免於凍餒故難活其言極為有理則欲修軍政而嚴紀律當先留意於所養之者以素得其心不可使之怨咨也所有修改軍政合行事件乞降㫖三省樞密院同條具取㫖施行綱又上言曰臣竊以國家承平之久自河以南皆腹心内地城池堙圯而不修去春敵騎渡河殘破畿邑止扵百里之内葢未知中國虛實不敢逺縱敵退因建議請修畿甸諸邑拱鄭許滑四輔郡洛陽河陽城壁以防金人復來使吾民有所保聚而敵騎無所抄掠朝廷已降指揮而言者以為擾民遂復止之及去冬再宼縱兵逺掠環畿千里之内無人煙矣今京東西及江淮之間州縣往往無城将來秋冬敵必愈更南牧何以捍守治安之久雖小邑猶藏萬家之室榖粟貨財不可勝計使敵得之因糧取財脅掠吾民以為之用是所謂借寇兵而資盜糧也夫惜一時之擾而忘長久之利豈策也哉宜命州縣以漸増修城池朝廷量降度牒應副至扵器械甲胄之属州縣𩔖多闕乏亦宜立名色降樣制使及時製造除戎器戒不虞此正今日之先務也綱又上言曰臣聞以不教民戰是謂棄之未嘗素教而以之戰是棄民也古者兵民不分無事則為鄉遂之民有事則為軍旅之士三時務農一時講武少習長安皆為精兵有所不出出無不勝矣唐設府衛之兵頗倣古制無養兵之費而有用衆之實此良法也後世兵民既分不可復合惟陜西沿邉弓箭手及近置湖南刀弩手猶有古之遺意其法給田百畆使家出一人為兵自備器甲之属官為收掌有事則給之而養馬者又别給田五十畆私自習學武藝而官以時按閲其有力者雖一人係籍置私名數人以相夾輔故弓箭手雄扵西邉捍禦夏人多賴其力而刀弩手之法頗與之相𩔖亦能鎮服蠻獠不敢妄動今東南官田最多如所謂户絶田逃亡田天荒田屯田之𩔖皆是莫若一切令剗刷用弓箭刀弩手法參酌中制募民為義勇軍給地與之州郡籍其名數依新軍團結以時教閲則十數萬衆不勞力而可具假以嵗月皆精兵也又皆土著無逃亡潰散之患最策之得者如合聖意乞降㫖三省措置施行綱又上言曰臣竊以祖宗籍陜西河北河東之民以為保甲河北五十餘萬河東二十餘萬而陜西之數不下河北命提舉官緫之以時教閲葢有意寓兵扵農也十餘年來降指揮以免教閲其法遂廢而保甲不知兵徒有其名而已靖康間臣甞建議乞專遣使團結訓練加詳于舊與其召兵他路不若因此用之為得策而朝廷不以為然今河東河北之地既為金人之所踐蹂豪傑强壮多依山寨以相保聚朝廷已置招撫經制司以撫循經略之矣獨陜西保甲名數尚在可行措置然陜西之民素困於支移折變宜一切蠲免而係保甲之籍者依新法團結以二千五百人為一軍差正副統制官緫之以時訓練有事藝精者補以名目擢充部隊将之𩔖則數十萬兵不日可具西可以捍夏戎北可以禦金人非小補也京東西有弓箭社亦皆可倣此推行如合聖意乞降㫖三省措置綱又乞造船募水軍疏曰臣聞生扵陵者安扵陵生扵水者安扵水南方之人習水而善沒其操舟若神而北人有懼舟檝而不敢登者習與性成也騎兵施於南方非所便而南人教之水戰必可取勝昔曹操以數十萬衆順流襲吳而周瑜以三萬人逆戰于赤壁因風縱火焚其船筏遂大破之操自此不敢有窺江表之心而鼎足之勢立其後曹丕復以大兵次廣陵觀長江風濤􅍅湧吳人戈甲旌旗之盛恐懼而退晋有江左苻堅以百萬之衆次淝水而謝𤣥以八千人破之衆皆奔北聞風聲鶴唳皆以為王師将至則東南之兵養育訓練因地利而用之亦足以自守其地應沿河沿淮沿江帥府要郡凡臨流去處宜倣古制以造戰船上設樓櫓可以施弓弩下運艣棹可以破風濤頒法式以授之仍募習水者為水軍以時教閲激賞賊舟濟渡㑹合掩擊以我之素習擊彼之蹔濟其勢必勝得一勝則賊必破膽不敢有窺東南之心矣嘉祐中范仲淹上言乞於河陽置戰艦水軍以防契丹當時以為迂濶不果行使用其説剏設至今則大河有備靖康初金人豈能遽濟渡哉先事而言則近乎迂事至而後圖之則無所及其實今日之急務也所有諸路合置戰船募水軍欲乞專差官前去措置綱又上言曰臣聞以歩兵戰者不足以勝騎以其善馳突也以騎兵戰者不足以勝車以其善捍禦也古之戰者必以車故稱武王曰戎車三百兩稱衛文公曰革車三百乗稱宣王曰我車既攻稱小白曰兵車之㑹六而兵賦則必使之出車天子曰萬乗諸侯曰千乗大夫曰百乗皆以兵車為制也後世車戰有曰武剛車有曰偏箱車有曰鹿角車皆與古異制則便於其事而已金人以鐵騎勝中國其説有三而非車不足以制之歩兵不足以當其馳突一也用車則馳突可禦騎兵馬弗如之二也用車則騎兵在後度便乃出戰卒多怯見敵輙潰雖有長技不得而施三也用車則人有所依可施其力部伍有束不得而逃然則車之可以制鐵騎也審矣靖康間獻車制者甚衆獨統制官張行中者可取其造車之法用兩竿雙輪推竿則輪轉兩竿之間以横木筦之設架以載巨弩其上施皮籬以捍矢石繪神獸之象弩矢發扵口中而竅其目以望敵其下施甲裙以衛人足其前施槍刃兩重重各四枚上長而下短長者以禦人也短者以禦馬也其兩旁以鐵為鈎索止則聨属以為營體制簡而運轉速真禦戎之利器其出戰之法則每車用歩卒二十五人四人推竿以運車一人登車望敵以發弩矢二十人執牌弓弩長槍斬馬刀列車之兩傍重行行五人凡遇敵則牌居前弓弩次之槍刀又次之敵在百歩内則牌偃弓弩間發以射之既逼近則弓弩退後槍刀進前槍以刺人而刀以斬馬足賊退則車徒鼓譟相聨以進及險乃止以騎兵出兩翼追擊以取勝其布陣之法則每軍二千五百人以五分之一凡五百人為将佐衛兵及輜重之属餘二千人為車八十乗欲布方陣則面各用車二十乗車相聨而歩卒彌縫於其間前者其車向敵後者其車倒行左右者其車順行賊攻左右而掩後則隨所攻而向之左右前後其變可以無窮而将佐衛兵及輜重之属皆處其中方圓曲直隨地勢之便行則鱗次以為陣止則鈎聨以為營不必開溝塹而築營壘最為簡便而全固昔衛青征匈奴以武剛車自環以禦敵故能深入馬燧帥太原製戰車冒以狻猊甲士列㦸副之故能兵冠天下惟房琯用之為賊所焚而後世議者遂以謂車不可用殊不知古之兵車謂之革車冒之以革者正所以防火也欲勝金人鐡騎使不得奔突持久以取勝利器無以加此今圖畫樣制及分合陣圖上塵睿覽乞降付御營司製造教習便殿按視可以施用即頒降帥府要郡施行三年趙元鎮上奏曰臣竊惟太祖皇帝即位之初用趙普策收諸道之兵集之京師又於其中遴選材武以備禁衛謂之親兵委腹心之臣分軍統領謂之三衙所以弱藩鎮壮王室以革唐末五代之弊而又訓練駕馭各盡其術由是人思自効得其死力故凡邉隅有警姦雄違命天戈所指莫之能抗中外無事垂二百年由此道也太平日久習為驕惰而三衙之任或非其人自靖康以來南北流離散亡過半遂使朝廷有反側之憂人主無爪牙之勢非祖宗之深意也臣願陛下留意三衙擇其忠勇盡節臨難不避恩威兼濟為衆所服者親閲諸軍取其人材武藝以廣宿衛親兵之列所以恢張國勢震耀天威使悍将强臣膽落氣沮指顧號令雷動風行然後可以大有為於天下兹事甚易而所係利害非可以縷陳也惟陛下留神省覽元鎮又上奏曰臣竊見近降指揮王􅊅軍馬城外駐劄今已有來者見於禹廟諸處屯泊臣昨在温州時見􅊅軍馬亦止城外将士皆有言曰等是官軍獨不得入城以賊待我我亦何憚而不為􅊅軍昨在淮南後自建康由江東趨福建以達行在沿路肅然無秋毫所犯今由明越往往潰亡作過雖軍情變動莫測而懐憤之久由此而發故也養兵無他嚴號令信賞罰而已有功者賞有罪者罰自餘屯泊衣糧等事當待之如一儻有厚薄分别之異必生怨望不平之心理之必然不可不慮兼屯軍城外既無寨堡節其出入蹂踏民田潜行刼奪将無所不有非若城中有所關防也臣愚欲乞别降睿㫖取㑹人數多寡且令城中踏逐或於空閒官地搭蓋蓆屋居住猶愈於城外重為民患而生彼怨心也元鎮又論防秋奏曰臣契勘韓世忠属官陳桷等赴闕臣即子細叩問世忠防秋措置觀桷等所説可見世忠之意桷言世忠已過淮南相視控扼因桷等之來專令乞兵防守建康一帯意欲令張俊分占江上同負此責亦如張俊聚兵之意也臣以為敵若不能渡江只留淮甸即委世忠專切固䕶通泰萬一采石等處不能支吾則敵騎深入遂有無窮之患雖能保守通泰亦復何益今若便令世忠保守建康又緣敵騎未渡之間當且以通泰鹽利為重臣之愚意欲乞戒飭世忠且在承楚極力捍禦或采石等處已聞敵騎南侵即令世忠全軍而還徑趨江東或浙西衝要去處或腰擊或尾襲雖不能遏其來路亦足牽制少阻南侵之勢不能深入所有通泰鹽利在所不顧也臣本不知兵更願陛下召張俊與議之或以為然即乞召陳桷等面授此意及親洒宸翰以賜世忠不可坐視安危恬不為意遂如議者所料也臣一介書生辱陛下眷遇致身至此敢不黽勉圖報萬分自入夏以來每以防秋為念而議論不一何由措手既入七月方二使南歸而又朱勝非求去紛紛十數日不定八月初即有川陜之命萬里之行無一人一騎日夕經營自救不暇以是不能專一留心朝廷之事今事勢已廹乃䝉陛下擢寘宰司萬一小有蹉跌萬死不足塞責臣已力陳懇欵辭免誤恩或未賜矜從即乞陛下博選中外忠誠可倚之人寘之二府庶㡬協濟少分陛下宵旰之憂臣不勝萬幸元鎮於紹興間知洪州又上奏曰臣契勘本路江州興國南康軍邉臨大江地接光黄咫尺僞境沿流曲折控扼千里萬一有警須藉水軍防捍唯是闕少戰船緩急無以措手近據探報上流賊馬侵寇㐮隨包藏不測沿江制置使岳飛屯駐大軍列戍江上亦以戰船闕少為慮雖先奉聖㫖令江西轉運司和雇收買二百隻應副縁本路州縣累遭兵火繼而招討宣撫兩司大軍經由剗刷舟船殆盡目即江河惟有往來客船若一例不以情願便行雇買不惟商賈不通有害貿易亦非戰鬭所宜兼逐時般載軍儲錢穀亦無舟船輸運本司今相度欲計置打造戰船二百隻以為沿江控扼之備般載錢糧船一百隻專充本路徃來使用約其工費用度不下十餘萬貫欲望聖慈詳酌特降睿㫖就吉州𣙜貨務支降見錢一十萬貫如尚闕錢物更容本司那融支撥庶㡬乗此時月計置木植便可打造免致防秋有悞大計紹興二年詔内外官言事右文殿修撰季陵應詔上言曰軍興以來朝廷誥牒非彊以予民則莫售師旅糧草非彊取於民則莫給舊例和買無本可支者久矣新行和糴能償其直㡬何一遇軍興事事責辦有不足者預借後年之賦雖名曰和實彊取之雖名曰借其實奪之兵将衣食不取其飽煖取其豐美器械不取其堅利取其華好務末勝本初無鬭心敵至則僞言退保敵去則盛言收復遇敗以千為一遇勝以一為千今乗輿服御之費十去七八百官有司之費十去五六猶無益扵國者軍太冗也張浚一軍以川陜贍之劉光世一軍以淮浙贍之李綱一軍以湖廣贍之上供之物得至司農太府者無㡬夫彊兵不在冗食今統領家口隨行一聞敵至擇精鋭者䕶送老小其自隨者秖辦走耳當議者一虜掠婦女軍中多有養既不足寧免作過當議者二所至州軍邀求犒賞守令憚生事竭取民以奉之當議者三詭名虚劵隨在批請枉費官物當議者四或假關節或行賄賂寄名軍籍規冒功賞當議者五願詔有司專意講求革因循以作士氣則軍政立四年兩浙西路安撫使沈晦過行在面對曰藩帥之兵可用今沿江千餘里若令鎮江建康太平池鄂五郡各有兵一二萬以本部財賦易官田給之敵至五郡以舟師守江歩兵守隘彼難自渡假使能渡五郡合擊敵雖善戰不能一日破諸城也若圍五郡則兵分勢弱或以偏師綴我大軍南侵則五郡尾而邀之敵安敢逺去此制稍定三年後移江北糧餉器械悉自隨又自乞分兵二千及召募敢戰士三千叅用昭義歩兵法期年後京口便成强藩時方以韓世忠屯軍鎮江不果用三十年秘書丞虞允文上言曰臣聞古之聖王蒐無用之兵為有用之備所以堅固治本逆折亂萌而用智於未奔沈也我祖宗平一天下治定功成之後甲兵堅强四方無敢侮拂當乾德天聖之盛猶且詔諸道兵為長吏之所役使失於教習者著為禁令又廂禁軍敢占為技工者論如法而大中祥符間又詔諸州本城兵及等者五百人以上團立教閲升為禁軍其本城兵少即别召募嗚呼深謀逺慮所以銷患於未形者成憲具存也伏惟陛下作新軍政一以祖宗為法武備之嚴莫盡於今日凡分屯列戍待敵制勝之道舉無一策之遺矣而議者猶以為外實者必有内虛之憂葢行營重兵逺在邉境而策應之精鋭又須觀時而動而諸州所謂强弓弩手者亦已盡遣萬一郡縣間有一夫竊發豈不少貽宵旰之慮而臣竊以謂今之諸郡未嘗無兵諸郡之兵未嘗無将且以東南言之諸郡所餘禁軍及元額廂軍土軍亡慮十數萬而一監司一守貳占破之數輒二三百人一緫管一将官各不下百人其間以技執役如福建一䑓又有至數百人者而諸路将副今以二十四員為額其數亦不為少矣或以刀筆之吏或以給使之徒或以勢力富豪之家而居之使兵冗於國家之衣糧将糜於州郡之廪給而咸不適於用豈不亦甚可惜也如因其在籍之兵拘收而為之部分因其定員之将遴選而使之教閲假以旬嵗之後於大軍之勢亦一助也不然一路一郡之間顧不足以備他盜乎此皆祖宗之舊章有明效大騐書於國史者願陛下勿以為不足用之兵獨㫁而必行之中外幸甚三十一年王之道上奏曰契勘今日江北義社與建炎之末所謂義社事勢大段相逺葢當時縁金人入寇而羣盜相繼蜂起百姓東西南北逃竄無所惟有依山據水建置寨柵庶㡬可以保聚老幼以幸須㬰無死且如一村五百家其間必有六七十家儲積穀粟可以贍給其餘而貧窶者既與父母妻子同其死生亦復樂為之用葢臣當是時嘗同里人保守無為軍胡避山寨備見利害試以無為一郡言之建寨之始不下二三十處而積日累月之久能獲保全者僅一二數餘皆不潰則破至有亙相吞噬者言之可為寒心自經兵火江北之民十不存一紹興以來生養蕃息而雜以江浙等處流徙之人通計十有三四其疲瘵在所不論而其稍有儲積可以霑及貧弱者五百家中實無三兩家方無事之時州縣或有科擾則望望然去之今乃欲籍其丁壮緩急責之以禦敵與驅市人使戰何異果可恃哉今之議者不知今昔事勢之不同乃為竒謀秘計僥冒爵賞肆為巧辯以求售於上但恐為淵驅魚為叢驅雀其失人心有非言之所能盡者葢今日控扼敵人去處惟江北最為要切而其所籍義社莫非耕鑿之人乃不問其欲惡一槩驅而為之反置數十年所養将士扵無用之地至如鄂州駐劄都統制田師中乃欲将湖北京西兩路所管保伍乞依淮西路宻行團結如遇盜賊竊發許師中充鄉道若此是必欲擁百姓以為諸軍之前驅也且平時養兵之費悉出於百姓至於調發供億又責辦於百姓逮其兩陣相對復以鄉道為名而驅之扵死地是猶代庖人宰代大匠斵以情度情所謂一人之情千萬人情是者果安在哉今朝廷以議者之言似可聽或信而從之萬一至於誤事雖食議者之肉安能救哉為今之計莫若責官軍移屯沿邉要害去處俾之捍禦而責義社以保聚老幼防托州縣庶㡬可以同心協力以成恢復之功實天下幸甚三十二年張浚奏乞申嚴私役禁軍之法曰臣竊見陛下嚴戒御前諸軍不得私役軍士此誠軍政之要務號令一頒人心悦服臣仰惟國家郡置禁旅法令嚴宻養之訓之皆有成制葢将使之備緩急修守備戢姦宄除盜賊為千里之恵意甚深逺也自頃擾攘之後官吏玩習兵政不舉臣嘗熟究其弊矣自守臣兵官不務遵制以時閲習而違法差占若當然者以至監司倅貳僚属幕職凡不應差借之處巧作事目或以廵守或以備火或以收買軍器捕捉逃亡為名遣出差役及使之荷檐肩輿市買工作廣占人數大傷士心甚失朝廷養兵本意臣愚伏望下有司檢舉舊制應知州合破禁軍接送之𩔖並不許過數自兵興以來州郡添増官兵數多乞於合破舊數痛與裁減其不合破者止得差廂軍而後俾之揀退老弱招補闕額申明隊伍修飭器械嚴教閲之法謹階級之令其知州兵官所破人數亦仰依法輪次赴教置為兵籍以時勾稽委逐路帥憲嚴行覺察輙敢如前差占並行按劾從私役禁軍法必罰無赦仍自樞宻院常切委官宻賜體究施行庶㡬為民養兵不至虛設而緩急之際可以倚仗用復祖宗之良法不勝幸甚浚又上言曰臣契勘諸軍當結純鎗純弓純弩隊鎗之隊在前弓次之弩次之其弓弩手各帯刀斧每隊九十人通九隊作一部九部為一陣縁弓可射八十歩弩可射二百餘歩敵騎若近先發弩鎗弓隊小坐次發弓若至前則純鎗之勢甚壮可禦馬足鮮有不勝舊嘗以此行下諸軍韓世忠等用此後來更改不常名為花装徒便觀看臣恐弓弩數少鎗手又散在隊中參錯失序不能破敵如合聖意伏乞批付臣行下諸軍遵守施行浚又議練兵曰士有好為大言者以兵家勝負在将不在兵茍將得其人驅市人而戰可也将非其人兵精器利曽何補於用乎嗚呼為此説者盖亦不思之甚矣夫趙歇裒初斂之兵號稱二十萬能戰者無㡬也韓信率新勝之人以破之借使金人舉河北山東之衆無驍騎利甲無堅弓良矢雖董之以尼雅滿輔之以偽太子臣知其易為敵矣故有精練之卒然後可以議嚴訓之方有訓練之兵然後可以議兵器之利有堅利之器然後可以議破敵之計知此數者庶乎可以論兵矣彼空空然謂可驅市人而戰者豈不誤國惑聽乎知平江府洪遵乞精選間諜劄子曰臣聞古之人謀其鄰敵必有覘國之術所謂間諜者雖聖智不廢焉葢堂堂之國相與周旋而不知其用事之人若其人之賢愚與意向之所在徒冒不測角力於兩陣而庶㡬於或勝非所謂萬全者也荀息之謀虞既知宫之竒之存又知其雖諫不聽韓信之謀趙獨憚李左車之智又知其計之不用故皆決策一舉而得所欲漢髙祖因酈食其而知魏大將之為柏直騎將之為馮欽歩卒将之為項他而又知其不能當吾韓信灌嬰曹參焉知之既詳料之又審卒成漢業豈偶然哉恭惟陛下信順之徳昭格穹壌金人畔盟神人共憤起釁未㡬旋即内變此盖皇天后土資社稷靈長之福啓陛下恢復之圖方當日夜淬礪謀所以待敵今将士不患不勇糧餉不患不繼臣之過計竊謂我之覘彼者未甚精詳方兵交時通國所知者逆亮而已其腹心爪牙合慮併力以謀我者似亦未能盡察如聞邉郡諸軍間有所遣探劄而歸𩔖皆道聽塗説不惟非其要領兼亦虚實難明殆與不知者無異臣愚欲望聖慈深詔宻議博延智勇機畧之士深入敵境往來出入凡國家所宜知者纎悉以聞隨其所遇待之以術勝負之形雖未決彼已之勢已可議今日禦敵之具固有大於此者而莫有先於此者利害甚明不可不講惟陛下留神省察髙宗時殿中侍御史章誼獻戰守四策謂金人累嵗南侵我亦累嵗奔走葢謀國之臣誤陛下也比者駐蹕揚州有兵數十萬可以一戰斥候不明金人奄至踰江而東此宰相黄潛善汪伯彦過也移蹕建康兵練将勇據長江之險可以守矣舟師不設二相異意金人未至遵海而南此宰相吕頥浩過也不知今年守戰之策安所從出執政大臣誰為陛下任此事者臣愚謂有江海必資舟檝戰守之具有險阻必資郡縣防守之力有兵将必駕馭撫循不可為将帥自衛之資有糧賦必漕運轉輸不可為盜賊侵據之用四者各付能臣分路以辦重賞嚴罰誰敢不用命哉誼又奏曰臣聞古者軍容不入國葢閫外之将居有壁壘以自守行有介胄以自衛平時出門如見敵故能臨敵不懐生葢養之者有素也漢文帝遣三将軍以備敵灞上棘門見稱兒戲而細栁之師獨有真将軍之目者豈虚言哉今彊敵在境士氣宜振而介胄遨遊於城闕翁媪雜蹂於轅門統兵之将雖有臨淮校旗之法敢死之士雖有射麋麗龜之巧皆無以自見陛下誠能分遣将臣遍屯要害之郡使得各申軍法明習教令一旦有警老弱悉留精鋭悉發以聽陛下之指授則戰将必克守将必固此今日之急務惟陛下留神幸察誼又奏曰臣伏覩去年十月叛臣劉豫紿率金人阻兵南向不量輕弱狃習故態數萬之衆暴集淮甸自謂投箠可以渡江功在漏刻矣陛下奮揚神武親緫六師破邊境譸張之謀摧敵國憑陵之勢至使衆叛而親離情見而力屈潜師宵遁有風聲鶴唳之恐此誠陛下應天順人恢復中原之日也顧臣暗淺何足以仰裨廣淵之度預聞經畫之謀然臣聞之來逺之盛德莫上於修文禦戎之上策莫先於自治陛下仁恩浹洽不異南北天德覆臨無有逺邇故雖酋豪面内俘獲係塗一切矜容待以不死至有臨陣就執者釋縳而還鄉閭辮髮來附者冠帯而奉朝請此甚盛徳事也陛下固已安行之矣惟是自治之䇿臣請得而言之今朝廷廵幸東南外憑淮海内阻大江形勢非不壮也然而敵騎倏來曽無藩籬之固裴回累月輙有南渡之虞此無他舟楫不備而違設險之義也自敵騎既退議者便謂可以廓淸中原收復畿甸兹固乗時進取之㡬而安危之所係也使敵人果有腹心之患自救不暇則陛下遣一偏裨自河而南囊括席卷何為而不可萬一敵人止是師徒單弱知難而退别為後圖則秋髙復來将何以待之此臣所謂莫先於自治者也今有江海之險又有舟楫之備敵人來則阻險而還止則糧道不繼頓兵江淮之上縻以嵗月之久然後我可以得志矣雖然知所以自衛然後以守則固知所以用衆然後以戰則克陛下今日三四大帥之兵不為不衆矣舉此以削平祻亂盖有餘力而金榖之奉芻秣之費帑藏無餘僅可以集事然猶州郡之間禁旅猥多主兵之官流品冗雜捐金帛以招無用之兵捐倉廩以養不戰之卒平居依倚将副蔑視州縣一聞外警輙肆其毒自建炎以來殺長吏據城郭乍服乍叛惡本不除近聞淮甸之師建州處州又復相煽異時陛下分遣大兵渡淮而北安集降附東南将兵決為不靖為今之計且當擇取壮勇以補行陣之闕汰去冗濫以寛財賦之源盡舉平陸之兵悉為舟師之用罷招軍之請豐府庫之儲專奉征戰之師使之外捍彊敵内庇生靈則民力益固財用益饒兵氣益振矣今舉江南之户口有㡬而兵之𨽻籍者有㡬率一户而養㡬兵矣又復招軍不已則将何以善其後哉方今禦戎之策莫先於自治而自治之術莫急於訓兵訓兵有制然後定祻難攘諸邊詰姦慝致安平無施而不可惟陛下留神幸甚誼又奏曰臣竊謂安邉境定國家唯戰守二道而已二者皆以謀為主守不用謀則雖有金城湯池未必安也戰不用謀則雖有堅甲利兵未必勝也今國家阻江左山川之險擅東南陸海之富有列營熊羆之士加之器械戈甲之備然而守則不堅戰則不利者其故何也惟不用謀也請以近事言之敵人嘗渡江而南矣望風奔潰者往往皆官軍也得其酋領者往往皆土豪也豈官軍土豪勇怯有異哉官軍擊其堂堂之陣而用力土豪避其堂堂之陣而用智是以敵人每能摧官軍之堅而卒墮土豪之計者謀與力異也臣願陛下用沈㡬先物之智與經國逺圖之臣柔逺應敵揆事畫策一切以謀為主如此則戰勝守固而金人可制土疆可復矣況於削平盜賊亦何難哉誼又奏曰臣聞邵青賊兵近自太平州乗船經由鎮江府江隂軍遂入平江府之常熟縣所至劫虜見今浙西州縣遷徙奔走公私騷然契勘劉光世係浙西宣撫大使驍将鋭兵自可討擊然而不能應時擒制者決以邵青所乗皆舟楫而光世皆平陸之兵故也臣觀國家既憑大江以為險阻而於舟師畧不經意今邵青小醜光世大帥乃敢越境深寇使賊有大於此者将何以禦之臣聞古兵法舟師有三等其舟之大者為陣脚船其次為戰船其小為傳令船盖置陣尚持重故用大船出戰尚輕㨗故用其次至於江海波濤之間旗幟金鼓難以麾召進退故用小舟由此觀之凡舟之大小皆可以為守戰之備不必皆用大船然後濟也朝廷試於駐蹕之地聊為千艘之具教之攻戰之法計亦易辦伏望聖明特降睿旨置一水軍帥以名将以為江海守禦之備庶㡬盜賊莫敢予侮臣不勝憤懣激切之至誼又奏曰臣契勘朝廷設置州郡本謂地産可以充貢賦師旅可以戢盜賊兩者並行軍食皆足則安富尊榮之道也今温州軍兵猥多㡬倍祖宗舊制糜費衣糧耗蠧財用至使上供常賦不入王府州郡錢帛困於供億臣今畧舉大槩言之本州自元祐元豐以前舊置廂禁軍額共二千五十一名諸處廵檢多是只差禁軍前去守把罕曽招置嵗支錢七千餘貫米三萬二千餘斛紬絹布共一萬餘疋綿二萬餘兩自政和以後剏置禁軍兩指揮壯城廂軍一指揮六處廵檢剏招人兵九處廵檢各添二分通計添招廂禁軍一千七百餘人每嵗又支錢一萬二千六百餘貫米二萬八千八百餘斛紬絹布八千六百餘匹綿二萬一千九百餘兩此皆昔年供輸朝廷之物與夫本州支給官兵之費也況自多事以來不復出戍超轉資給人員數多每有招填費耗例物關糧半年旋行計置若不申明公私日困伏望朝廷詳度将本州舊額軍兵並政和以後添置廂禁軍并廵檢下剏招添招人兵遇有逃亡闕額並罷招填候人數與舊額相當即行撥併罷去剏置剏招軍兮若䝉便降指揮亦須數年方可銷廢盡絶庶㡬貢賦常物可以依得祖宗舊來立定格目供輸朝廷今來㑹計一州所費在前頗聞他郡財帛乏絶亦復因此伏望聖慈降付外廷詳酌施行誼為徽猷閣直學士又奏曰臣聞兵者禁暴止亂安民和衆聖王所資以拯民扵塗炭者也今陛下經營天下攘却盜賊累年於兹然未能指呼如意者臣恐制兵之術未盡也臣觀今日神武之兵萃為五軍分𨽻諸将其間往往迯亡盜賊之餘伎術市井之人得簉其列所謂正兵者鮮矣至於殿班親軍陛下倚以侍衛者曽無千百其於射麋麗龜之巧投石拔距之勇則未有聞焉又復統兵之将雍容緩帯初無折衝威名之望又無沈鷙猛毅之姿恐不足以仰副明主駕馭英傑鞭笞敵人之意臣考之前古漢兵之在京師者有南北兩屯唐兵之衛天子者有南北兩衙此皆天子自将之兵也其預選則莫非驍雄之士其可任則莫非土着之人其統率訓練則莫非智謀功名之将兩軍力侔勢敵内消祻變外遏僭亂人主獨操兵柄不以授人故國勢彊而豪暴服矣恭惟聖宋祖宗所置殿班親軍處禁門之内其魁雄武㨗皆極天下之選臣願陛下斟酌前代南北禁衛之意紹隆本朝遴選班直之法立為材技勇力之等選於五軍及江浙福建凢禁軍土軍弓手齒嵗强壮不犯徒役不經敗亡而有父母兄弟妻孥可任者皆為應選其選於五軍者聚為一衛其選於諸州者聚為一衛百人一校千人一将合取萬人分為兩衛各選殿帥統之而緫其任於樞宻使以聴陛下之指使如此則禁衛増嚴王室大競矣陛下時因聽朝之暇或御便殿或出近郊人人閲試旌别勸賞漸増俸廩使恩威足以得其死力其誰敢不聽命哉當陛下布昭聖武之時其措置設施似不可緩臣不勝區區之願誼又論民兵奏曰臣伏見今日州郡守戰之兵壊於昔年投換之法竄易姓名𩔖非土着尺籍伍符難以稽考平時嗔目語難每懐干命之心及其臨敵退避率無死難之節至於逃亡嘯聚焚劫剽攻擅據州城執戮守将然則軍政之弊至此極矣唯是民兵一事所宜乗時措置以備非常之舉盖今之民兵則周官六鄉之衆齊侯節制之師漢室更戍之卒有唐府衛之兵也近世廵社亦有遺意古今雖異經籍猶存法制具在因時施宜少加損益則東南郡縣數十萬之衆可指日而辦閒居無錢廪之費調發無羇旅之思習熟險易愛䕶鄉閭比之召募逰手之人以充師旅之任其利害明甚矣又況近者關陜有累㨗之音東北有可乗之便自宜命将北征以係人心大兵繼進盡復故土被甲荷戈之士分閫授鉞之臣方經營於江淮之北矣若夫根本之地在此南服非藉民兵何以為守禦之備哉臣頗聞獻是説於朝廷者甚衆而未獲施行伏望斷自聖心早賜措置不勝大幸時禁衛寡弱諸将各擁重兵御史中丞沈與求言漢有南北軍唐用府兵彼此相維使無偏重之勢今兵權不在朝廷雖有樞宻院及三省兵房尚書兵部但行文字而已願詔大臣益修兵政助成中興厯代名臣奏議卷二百二十二
