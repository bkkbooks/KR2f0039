body:
  text: 歷代名臣奏議卷二百四十九明楊士竒等撰水利周靈王三十二年靈王大心也榖洛鬭將毁王宫穀洛二水名鬭者兩水挌有似於鬭王欲壅之大子晉諫曰不可晉聞古之長民者不墮山不崇藪不防川不竇澤竇決也不為此四者為其反天性夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚於髙歸物於下疏為川谷以導其氣陂塘汚􅋻以鍾其美是故聚不阤崩而物有所歸大曰崩小曰阤氣不沈滯而亦不散越沈伏也滯積也越逹也是以民生有財用而死有所葬物有所歸故生有財用山陵不崩故死有所葬然則無夭昏扎瘥之憂而無飢寒乏匱之患短折曰夭狂惑曰昏疫死曰扎瘥病也故上下能相固以待不虞古之聖王唯此之愼昔共工棄此道也虞于湛樂淫失其身欲壅防百川墮髙堙􅋻以害天下皇天弗福庶民弗助禍亂並興共工用滅其在有虞有崈伯鯀播其淫心稱遂共工之過堯用殛之于羽山其後伯禹念前之非度釐改制量象物天地比類百則儀之于民而度之于羣生共之從孫四嶽佐之共共工也從孫昆弟之孫也四嶽官名主四嶽之祭為諸侯伯佐助也髙髙下下疏流導滯鍾水豐物封崇九山決汨九川陂障九澤豐殖九藪汨越九原宅居九隩合通四海故天無伏隂伏隂夏有霜雹地無散陽散陽李梅冬實水無沈氣沈伏也無伏積之氣火無災燀燀焱起貌天曰災人曰火神無間行間行姦神淫厲之屬民無淫心隂陽調財用足故無淫濫之心時無逆數逆數四時寒暑反逆物無害生蝗螟之屬不害嘉榖帥象禹之功度之于儀軌莫非嘉績克厭帝心皇天嘉之胙以天下胙祿也賜姓曰姒氏曰有夏謂其能以嘉祉殷富生物也胙四嶽國命為侯伯賜姓曰薑氏曰有吕謂其能為禹股肱心膂以養物豐民人也此一王四伯豈繄多寵皆亡王之後王謂禹四伯謂四嶽也唯能釐舉嘉義以有胤在下守祀不替其典有夏雖衰把鄫猶在把鄫二國夏後也申吕雖衰齊許猶在申吕四嶽之後商周之世或封於申齊許其族也唯有嘉功以命姓受祀迄于天下及其失之也必有慆淫之心間之慆慢也故亡其氏姓踣弊不振絶後無主堙替𨽻圉堙沒也替廢也隸役也圉養馬者夫亡者豈繄無龍皆黃炎之後也唯不帥天地之度不順四時之序不度民神之義不儀生物之則以殄滅無胤至于今不祀及其得之也必有忠信之心間之度於天地而順於時動和於民神而儀於物則故髙朗令終顯明昭融命姓授氏而附之以令名若啓先王之遺訓省其典圖刑法而觀其廢興者皆可知也其興者必有夏吕之功焉其廢者必有共鯀之敗焉今吾執政毋乃實有所避而滑夫二川之神使至於爭明以妨王宫王而飾之毋乃不可乎魏文侯時西門豹為鄴令有令名至文侯曽孫襄王時與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也於是以史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻梁漢武帝初方事胸奴興功利言便宜者甚衆齊人延年史不得其姓氏上書言河出昆侖經中國注勃海是其地勢西北髙而東南下也可案圖書觀地形令水工準髙下開大河上領上領山頭也出之胡中東注之海如此關東長無水災北邊不憂胸奴可以省隄防備塞士卒轉輸盜賊侵掠覆軍殺將暴骨原野之患天下常備胸奴而不憂百越者以其水絶壤斷也此功一成萬世大利書奏上壯之報曰延年計議甚深然河乃大禹之所道也聖人作事為萬世功通於神明恐難改更元光中河決於瓠子武安侯田蚡為丞相其奉邑食鄃鄃居河北河決而南則鄃無水災邑收多蚡言於上曰江河之決皆天事未易以人力為強塞塞之未必應天而望氣用數者亦以為然於是天子久之不事復塞也是時鄭當時為大司農言曰異時關東漕粟從渭中上度六月而罷而漕水道九百餘里時有難處引渭穿渠起長安並南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉田此損漕省卒而益肥關中之地得穀天子以為然令齊人水工徐伯表悉發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉田矣成帝初清河都尉馮逡奏曰郡承河下流與兖州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙增隄防終不能泄如有霖雨旬日不霽必盈溢靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有藝故穿九河今既滅難明屯氏河不流行七十餘年新絶未久其處易浚又其口所居髙於以分殺水力道理便宜可復浚以助大河泄暴水備非常又地莭時郭昌穿直渠後三歲河水更從故第二曲間北可六里復南合今其曲藝復邪直貝丘百姓寒心宜復穿渠東行不豫修治北決病四五郡南決病十餘郡然後憂之晚矣哀帝初平當使領河隄奏言九河今皆填滅按經義治水有決河深川而無隄防壅塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光大司空何武奏請部刺史三輔三河𢎞農太守舉吏民能者莫有應書待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水藝所不及大川無防小水得入陂障卑下以為汙澤使秋水多得有所休息左右遊波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋防隄之作近起戰國壅防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊蕩時至而去則填淤肥美民耕田之或久無害稍築室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防狹者去水數百步遠者數里近黎陽南故大金隄從河西西北行至西山南頭乃折東與東山相屬民居金隄東為廬舍住十餘歲更起隄從東山南頭直南與故大隄會又內黃界中有澤方數十里環之有隄往十餘歲太守以賦民民今起廬舍其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河遠者數十里內亦數重此皆前世所排也河從河內北至黎陽為石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫厄如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄藝不能遠泛濫期月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕折底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄歲費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相姦且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水髙於平地歲增隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄髙一丈自是東地稍下隄稍髙至遮害亭髙四五丈往五六歲河水大盛增丈七尺壞黎陽南郭門入至隄下水未踰隄二尺所從隄上北望河髙出民屋百姓皆走上山水留十三日隄潰二所吏民塞之臣循隄上行視水藝南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歲適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以卜之其水門但用木與土耳今據堅地作石隄藝必完安冀州渠首盡當卬牛向反此水門治渠非穿地也但為東方一隄北行三百餘里入漳水中其西因山足髙地諸渠皆往往股引取之旱則開東方下水門溉冀州水則開西方髙門分河流通渠有三利不通有三害民常罷於救水半失作業水行地上湊潤上徹民則病溼氣木皆立枯鹵不生穀決溢有敗為魚鱉食此三害也若有渠溉則鹽鹵下隰填淤加肥故種禾麥更為粳稻髙田五倍下田十倍轉漕舟船之便此三利也今瀕河隄吏卒郡數千人伐買薪石之費歲數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百歲故謂之中策若乃繕完故隄增卑倍薄勞費無已數逢其害此最下䇿也王莽時徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢少稍自索雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬史長安張戎言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益髙於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣御史臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海勃海地髙於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出寖數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜卻徙完平處更開空使緣西山足乘髙地而東北入海乃無水災沛郡桓談為司空掾典其議為甄豐言凡此數者必有一事宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無産業民空居與行役同當衣食衣食縣官而為之作乃兩便可以上繼禹功下除民疾晉武帝咸寧三年杜預言諸欲修水田者皆以火耕水耨為便非不爾也然此事施於新田草萊與百姓居相絶離者耳往者東南草創人稀故得火田之利自頃户口日增而陂堨歲決良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輒復橫流延及陸田言者不思其故因云此土不可陸種臣計漢之户口以驗今之陂處皆陸業也其或有舊陂舊堨則堅完修固非今所謂當為人害者也臣前見尚書胡威啓宜壞陂其言懇至臣中者又見宋侯相應遵上便宜求壞泗陂徙運道時下都督度支共處當各據所見不從遵言臣案遵上事運道東詣壽春有舊渠可不由泗陂泗陂在遵地界壞地凡萬三千餘頃傷敗成業遵縣領應佃二千六百口可謂至少而猶患地狹不足肆力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害者也此理之所以未盡而事之所以多患也臣又按豫州界二度支所領佃者州郡大軍雜士凡用水田七千五百餘頃耳計三年之儲不過二萬餘頃以常理言之無為多積無用之水況於今者水潦瓫溢大為災害臣以為與其失當寧瀉之不滀宜發明詔敇刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決瀝之長吏二千石躬親勸功諸食力之人並一時附功令比及水凍得粗枯涸其所修功實之人皆以俾之其舊陂堨溝渠當有所補塞者皆尋求微迹一如漢時故事豫為部分列上須冬東南休兵交代各留一月以佐之夫川瀆有常流地形有定體漢氏居人衆多猶以無患今因其所患而宣寫之迹古事以明近大理顯然可坐論而得臣不勝愚意竊謂最是今日之實益也朝廷從之後魏太武帝延和三年以刁雍為薄骨律鎮將雍至鎮表曰臣蒙寵出鎮奉辭西藩總統諸軍户口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口纍率皆飢儉略加檢行知此土稼穯艱難夫欲育民豐國事須大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔為之髙於水不過一丈河水激急沙土漂流今日此渠髙於河水二丈三尺又河水浸射往往崩頽渠溉髙懸水不得上雖復諸處按舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十步臣今求入來年正月於河西髙渠之北八里分河之下五里平地鑿渠廣十五步深五尺築其兩岸令髙一丈北行四十里還入古髙渠即循髙渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步髙二丈絶斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉穀得成實官課常充民亦豐贍詔從之宣武帝時冀定數州頻遭水害左中郎將鄭楷上疏曰臣聞有國有家者莫不以萬姓為心故矜傷軫於造次求瘼結於寢興黎民阻飢唐堯致歎衆庶斯饉帝乙罰已良以為政與農實繫民命水旱緣兹以得濟夷險用此而獲安頃東北數州頻年淫雨長河激浪洪波汨流川陸連濤原隰通望彌漫不已泛濫為災戶無擔石之儲家有藜藿之色華壤膏腴變為舄鹵菽麥禾黍化作萑蒲斯用痛心徘徊潸然佇立也昔洪水為害四載流於夏書九土既平攸同紀自虞誥亮由君之勤恤臣用劬勞日昃忘餐宵分廢寢伏惟皇魏握圖臨宇總契裁極道敷九有德被八荒槐階棘路實維英哲虎門麟閣實曰賢明天地函和日月光曜自比定冀水潦無歲不飢幽瀛川河頻年泛溢豈是陽九厄會百六鍾期故以人事而然非為運極昔魏國鹹舄史起哂之兹地荒蕪臣實為耻不揆愚瞽輒敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一準古法皆循舊隄何者河決瓠子梁楚幾危宣防既建水還舊迹十數年間戶口豐衍又決屯氏兩川分流東北數郡之地僅得支存及不通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毁滅良由水大渠狹更不開瀉衆流壅塞曲直乘之所致也至若量其逶迤穿鑿溝澮分立隄堨所在疏通預決其路令無停蹙隨其髙下必得地形土木參功務從便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海遠邇徑過瀉其墝潟泄此陂澤九月農罷量役計功十月昏正立匠表度縣遣能工麾畫形勢郡發明使籌察可否審地推岸辨其脈流樹板分崖練厥從往别使案檢分部是非瞰睇川原明審通塞當境修治不勞役遠終春自罷未須久功即以髙下營田因於水陸水種粳稻陸藝桑麻必使室有久儲門豐餘積斯實上䇿禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢汙下雲雨隂霖動彌旬月遙途遠運惟用舟艫南畝畬災微事耒耜而衆庶未為饉色黔首罕有飢顔豈天德不均致此偏罰故是地勢異圖有兹豐餒臣既鄉居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚誠丹欵實希效力有心螢爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑飢荒之士鄴宰深笑息自一朝臣之至誠申於今日詔曰頻年水旱為患黎民阻飢靜言念之旰不遑食鑒此事條深協在慮但計畫功廣非朝夕可合宜付外量聞事遂施行宋太宗淳化二年秋涇陽縣民杜思淵上書言涇河內舊有石翣以堰水入白渠溉雍耀田歲收三萬斛其後多歷年所石翣壞三白渠水少溉田不足民頗艱食乾德中莭度判官施繼業率民用梢穰笆籬棧木截河為堰壅水入渠緣渠之民頗獲其利然凡遇暑雨山水暴至則堰輒壞至秋治堰所用復取於民民煩數役終不能固乞依古制調丁夫修疊石翣可得數十年不撓所謂暫勞永逸也詔從之遣將作監丞周約已等董其役以用功尤大不能就而止至道元年正月度支判官梁鼎陳堯叟上鄭白渠利害案舊史鄭渠元引涇水自仲山西抵瓠口並北山東注洛三百餘里溉田四萬頃畝收一鍾白渠亦引涇水起谷口入櫟陽注渭水長二百餘里溉田四千五百頃兩渠溉田凡四萬四千五百頃今所存者不及二千頃皆近代改修渠堰浸隳舊防繇是灌溉之利絶少於古矣鄭渠難為興工今請遣使先詣三白渠行視復修舊迹於是詔大理寺丞皇甫選光祿寺丞何亮乘傳經度選等使還言周覽鄭渠之制用功最大並仲山而東鑿斷岡阜首尾三百餘里連亙山足岸壁頽壞堙廢已久度其制置之始涇河平淺直入渠口暨年代浸遠涇河陡深水勢漸下與渠口相懸水不能至峻崖之處渠岸摧毁荒廢歲久實難致力其三白渠溉涇陽櫟陽髙陵雲陽三原富平六縣田三千八百五十餘頃此渠衣食之源也望令增築隄堰以固護之舊設莭水斗門一百七十有六皆壞請悉繕完渠口舊有六石門謂之洪門今亦隤圯若復議興置則其功甚大且欲就近度其岸勢别開渠口以通水道歲令渠官行視岸之缺薄水之淤填即時浚治嚴豪民盜水之禁涇河中舊有石堰修廣皆百步捍水雄壯謂之將軍翣廢壞已久杜思淵嘗請興修而功不克就其後止造木堰凡用梢樁萬一千三百餘數歲出於緣渠之民涉夏水潦木堰遽壞漂流散失至秋復率民以葺之數斂重困無有止息欲令自今溉田既畢命水工坼堰木置於岸側可充二三歲修堰之用所役緣渠之民計田出丁凡調萬三千人疏渠造堰各獲其利固不憚其勞也選能吏司其事置署於涇陽縣側以時行視往復甚便又言鄧許陳潁蔡宿亳七州之地有公私間田凡三百五十一處合二十二萬餘頃民力不能盡耕皆漢魏以來召信臣杜詩杜預任峻司馬宣王鄧艾等立制墾闢之地內南陽界鑿山開道疏通河水散入唐鄧襄三州以溉田又諸處陂塘防埭大者長三十里至五十里闊五丈至八丈髙一丈五尺至二丈其溝渠大者長五十里至百里闊三丈至五丈深一丈至一丈五尺可行小舟臣等周行歷覽若皆增築陂堰勞費頗甚欲隄防未壞可興水利者先耕二萬餘頃他處漸圖建置九月帝以汴河歲運江淮米五七百萬斛以濟京師問侍臣汴水疏鑿之由令參知政事張洎講求其事以聞其言曰禹導河自積石至于龍門南至華隂東至砥柱又東至于孟津東過洛汭至于大伾即今成臯是也或云黎陽山也禹以大河流泛中國為害最甚乃於貝丘疏二渠以分水勢一渠自舞陽縣東引入漯水其水東北流至千乘縣入海即今黃河是也一渠疏畎引傍西山以東北形髙敝壞隄水勢不便流溢夾右碣石入于渤海書所謂北過洚水至于大陸洚水即濁漳大陸則邢州巨鹿澤播為九河同為逆河入于海河自魏郡貴鄉縣界分為九道下至滄州今為一河言逆河者謂與河水往復相承受也齊桓公塞以廣田居唯一河存焉今其東界至莽梧河是也禹又於滎澤下分大河為隂溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠元經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌魏郡謂之鴻溝莨菪渠自滎陽五出池口來注之其鴻溝即出河之溝亦曰莨菪渠漢明帝時樂浪人王景謁者王吳始作浚儀渠蓋循河溝故瀆也渠成流注浚儀故以浚儀縣為名靈帝建寧四年於敖城西北壘石為門以遏渠口故世謂之石門渠外東合濟水濟與河渠渾濤東注至敖山北渠水至此又兼邲之水即春秋晉楚戰于邲邲又音汳即汴字古人避反字改從汴字渠水又東經滎陽北旃然水自縣東流入汴水鄭州滎陽縣西二十里三皇山上有二廣武城二城相去百餘步汴水自兩城間小澗中東流而出而濟流自兹乃絶唯汴渠首受旃然水謂之鴻渠東晉大和中桓溫北伐前燕將通之不果義熙十三年武帝西征姚秦復浚此渠始有湍流奔注而岸善潰塞帝更疏鑿而漕運焉隋煬帝大業三年詔尚書左丞相皇甫誼發河南男女百萬開汴水起滎澤入淮千餘里乃為通濟渠又發淮南兵夫十餘萬開𨝍溝自山陽瀆至于揚子江三百餘里水靣闊四十步而後行幸焉自後天下利於轉輸昔孝文時賈誼言漢以江淮為奉地謂魚鹽穀帛多出東南至五鳳中耿壽昌奏故事歲增關東穀四百萬斛以給京師亦多自此渠漕運唐初改通濟渠為廣濟渠開元中黃門侍郎平章事裴耀卿言江淮租船自長淮西北沂鴻溝轉相輸納於河隂含嘉太原等倉凡三年運米七百萬石實利涉於此開元末河南採訪使汴州刺史齊浣以江淮漕運經淮水波濤有沈損遂浚廣濟渠下流自泗州虹縣至楚州淮隂縣北八十里合于淮踰時畢功既而水流迅急行旅艱險尋乃廢停却由舊河德宗朝歲漕運江淮米四十萬石以益關中時叛將李正已田恱皆分軍守徐州臨渦口梁崇義阻兵襄鄧南北漕引皆絶於是水陸運使杜佑請改漕路自浚儀西十里疏其南涯引流入琵琶溝經蔡河至陳州合潁水是秦漢故道以官漕久不由此故填淤不通若畎流培岸則功用甚寡又廬壽之間有水道而平岡亙其中曰雞鳴山佑請疏其兩端皆可通舟其間登陸四十里而已則江湖黔嶺蜀漢之粟可方舟而下由是白沙趨東關經廬夀浮潁步蔡歷琵琶溝入汴河不復經沂淮之險徑於舊路二千里功寡利博朝議將行而徐州順命淮路乃通至國家膺圖受命以大梁四方所湊天下之樞可以臨制四海故卜京邑而定都漢髙帝云吾以羽檄召天下兵未至孝文又云吾初即位不欲出虎符召郡國兵即知兵甲在外也唯有南北軍期門郎羽林孤兒以備天子扈從藩衛之用唐承隋制置十二衛府兵皆農夫也及罷府兵始置神武神䇿為禁軍不過三數萬人亦以備扈從藩衛而已故祿山犯闕驅市人而戰德宗蒙塵扈駕四百餘騎兵甲皆在郡國額軍存而可舉者除河朔三鎮外太原青杜各十萬人邠寧宣武各六萬人潞徐荆揚各五萬人襄宣夀鎮海各二萬人自餘觀察團練據要害之地者不下萬人今天下甲卒數十萬衆戰馬數十萬匹並萃京師悉集七亡國之士民於輦下比漢唐京邑民庶十倍甸服時有水旱不至艱歉者有惠民金水五丈汴水等四渠𣲖引脈分咸會天邑舳艫相接贍給公私所以無匱乏唯汴水橫亙中國首承大河漕引江湖利盡南海半天下之財賦并山澤之百貨悉由此路而進然則禹力疏鑿以分水勢煬帝開甽以奉巡遊雖數湮廢而通流不絶於百代之下終於國家之用者其上天之意乎真宗天禧四年二月河塞羣臣入賀上親為文刻石紀功是年祠部員外郎李垂又言疏河利害命垂至大名府滑衛德貝州通判軍與長吏計度垂上言臣所至並稱黃河水入王莽沙河與西河故瀆注金赤河必慮水勢浩大蕩浸民田難於隄備臣亦以為河水所經不無為害今者決河而南為害既多而又陽武掃東石堰掃西地形汙下東河泄水又艱或者云今決處漕底坑深舊渠逆上若塞之旁必復壞如是則議塞河者誠以為難若決河而北為害雖少一旦河水注御河蕩易水徑乾寧軍入獨流口遂及契丹之境或者云因此搖動邊鄙如是則議疏河者又益為難臣於兩難之間輒畫一計請自上流引北載之髙地東至大伾瀉復於澶淵舊道使南不至滑州北不出通利軍界何以計之臣請自衛州東界曹公所開運渠東五里河北岸凸處就岸實土堅引之正北稍東十三里破伯禹古隄注裴家潭􅏙牧馬陂又正東稍北四十里鑿大伾西山釃為二渠一逼大伾南足決古隄正東八里復澶淵舊道一逼通利軍城北曲河口至大禹所導西河故瀆正北稍東五里開南北大隄又東七里入澶淵舊道與南渠合夫如是則北載之髙地大伾二山脽服之間分酌其勢浚瀉兩渠匯注東北不遠三十里復合于澶淵舊道而滑州不治自涸矣臣請以兵夫二萬自來歲二月興作除三伏半功外至十月而成其均厚埤薄俟次年可也疏奏朝議慮其煩擾罷之仁宗慶歷間守平江范仲淹上奏曰德惟善政政在養民此言聖人之德惟在善政善政之要惟在養民養民之政必在農務江南舊有墟田每一墟田方數十里如大城中有河渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利又浙西地卑常苦水沴雖有溝河可以通海惟時開導則潮泥不得以堙之雖有隄塘可以禦患惟時修固則無摧壞臣知蘇州日點檢簿書一州之田係出産者三萬四十頃中稔之利每畝得米二石或三石計米七百餘萬石東南每歲上供之數六百萬石乃一州所出臣詢訪髙年則云曩時兩浙未歸朝廷蘇州有營田軍四部共七八千人專為田事導河築隄以減水患于時民間錢五十文糴白米一石自宋朝一統江南不稔則取之浙右浙右不稔則取之淮南故慢於農政不復修舉江南墟田浙右河塘大半隳廢失東南之大利今江浙之米石不下六七百足至一貫省比於當時其貴十倍民不得不困國不得不虛矣臣請每歲之秋降敕下諸路轉運司令轄下州軍吏民各言農桑可興之利可去之害或合開河渠或築堤堰陂塘之類並係本州軍選官計定工料每歲於二月間興役半月而罷仍具功績聞奏如此不絶數年之間農利大興下少飢寒上無貴糴則東南歲糴輦運之費大可減省其勸課之法宜選官討論古制取其簡約易從之術頒賜諸路轉運使靣賜一本付新授知州知縣等此養民之政富國之本也皇祐三年直集賢院劉敞論修商胡口奏曰臣聞天有時地有勢民有力聖王之建功謀事者不與天分時不與地分勢不與民分力則功成而事立今朝廷以河決商胡議必塞之臣竊謂過矣乃者霖雨淋溢山谷發泄經川橫潰或衝冒城郭此天時也澶魏之掃如商胡者多矣莫決而商胡獨敗此地勢也淮汝以西關陕以東數千里之間罹於水憂者甚則溺死不甚則流亡夫婦愁痛無所控告略計百萬人未聞朝廷有以振業之也而議塞河強疲病之餘以極其力乘殘耗之後以略其財重為事而罰所不勝急為期而誅所不至上則與天爭時下則與地爭勢此臣所謂過也臣聞河之為患於中國久矣其在前代或塞或不塞塞之為仁不塞不為不仁此有時而否者也以堯為君以舜為臣以禹為司空十有三年而後僅能勝水患耳今朝廷之無禹明矣而欲以數月之間塞決河不權於時不察於民不亦甚乎議者以為不塞河則冀州之水可哀甚不然夫河未決之時能使水不病冀州則已矣既決之後縣邑則已沒矣人民則已亡矣府庫則已喪矣雖塞河不能有救也今且縱水之所欲往而利導之其不能救與彼同而可以息民何嫌而不為詩云民亦勞止汔可小康惠此中國以綏四方夫中國者固四方之本也唯陛下與知道者慮之至和二年兼判三司院歐陽修狀奏曰臣伏見學士院集兩省臺諫官議修河事未有一定之論蓋由賈昌朝欲復故道李仲昌請開六塔互執一説莫知孰是以臣愚見皆謂不然言故道者未詳利害之源述六塔者近乎欺罔之繆何以言之今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢決之因所以未知故道有不可復之勢此臣故謂未詳利害之源也若言六塔之利者則不攻而自破矣且開六塔既云減得大河水勢然今恩冀之患何緣尚告危急此則減水之利虛妄可知開六塔者又云可以全回大河使復橫壠故道見今六塔只是分減之水下流無歸已為濵棣德博之患若全回大河以入六塔則其害如何此臣故謂近乎欺罔之謬也臣聞河本泥沙無不淤之理淤澱之勢常先下流下流淤髙水行不快乃自上流低下處決此其常勢也然避髙就下水之本性故河流已棄之道自是難復臣不敢遠引書史廣述河源只以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澀乃於滑州天臺掃決尋而修塞水復故道未幾又決於滑南鐵狗廟其後數年又議修塞水令復故道已而又於王楚掃決所決差少與故道分流然而故道之水終以壅淤故又於橫壠大決則決河非不能力塞故道非不能力復不久終必決於上流者由故道淤髙水不能行故也及橫壠既決水流就下所以十餘年間河未為患至慶歷三四年橫壠之水又自下流先淤是時臣為河北轉運使海口已淤一百四十餘里其後遊金赤三河相次又淤下流既梗乃又於上流商胡口決然則京東橫壠兩河故道皆是下流淤塞河水已棄之髙地京東故道屢復屢決理不可復其驗甚明則六塔所開故道之不可復不待言而易知臣聞議者計度京東故道功料止云銅城已上地髙不知大抵東去皆髙而銅城已上乃特髙耳其東比銅城已上則似低比商胡已上則實髙也若云銅城已東地勢斗下則當日水流宜決銅城已上何緣而頓淤於橫壠之口亦何緣而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有不能必則較其利害之輕重擇其害少者而為之猶勝害多而利少何況有害而無利此三者可較而擇也臣見往年商胡初決之時議欲修塞計用一千八百萬梢芟科配六路一百有餘州軍今欲塞者乃往年之商胡必須用往年之物數至於開塞故道張奎元計功料極大後來李參等減得全少猶用三十萬人然欲以五十步之狹容大河之水此可笑也又欲增一夫所開三赤之方倍為六尺且闊厚三尺而長六尺已是一倍之功在於人力已為勞苦若云六尺之方以開方法算之乃八倍之功此豈人力之所勝是則前功浩大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國而勞人所舉如此而欲開難復屢決已驗之故道使其虛費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞暫復以紓目前之患而終於上流必決如龍門橫壠之比重以困國勞人此所謂利少而害多也若六塔者於大河有減水之名而無減水之實今下流所散為患已多若全回大河以注之則濵棣德博河北所仰之州不勝其患而又故道淤澀上流必有他決之虞此直有害而無利耳是智者之不為也今若因水所在增治堤防疏其下流浚以入海則可無決溢散漫之虞今河所歷數州之地誠為患矣隄防歲用之夫誠為勞矣與其虛費天下之財虛舉大衆之役而不能成功終不免為數州之患勞歲用之夫則此所謂害少者乃智者之所擇也大抵今河之勢負三決之虞復故道上流必決開六塔上流亦決今河下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求其入海之路而浚之不然下流梗澀則終虞上決為患無涯臣非知水者但以今事目可驗者而較之耳言狂計愚不足以備聖君博訪之求此大事也伏乞下臣之議廣謀於衆而裁擇之謹具狀奏聞伏候敕旨修又上奏曰臣竊見朝廷近因臣寮建議欲塞商胡開橫壠回大河於故道已下三司候今秋興役見令京東計度物料次臣伏以國家興大役動大衆必先順天時量人力謀於其始而審然後必行計其所利者多乃能無悔伏見比年以來興役動衆勞民費財不精謀慮於厥初輕信利害之偏説舉事之始既已倉皇羣議一搖尋復悔罷臣不敢逺引他事上煩聖聰只如往年河決商胡是時執政之臣不慎計慮遽謀修塞科配一千八百萬梢芟搔動六路一百有餘州官吏催驅急若星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役遽已罷修虛費民財為國斂怨舉事輕脫為害若斯雖既往之失難追而可鑒之蹤未遠今者又聞復有修河之役聚三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災歲旱之時民困國貧之際不量人力不順天時臣知其有大不可者五蓋自去秋以及今春半天下苦旱而京東尤甚河北次之國家當務安靜振恤之猶恐飢民起而為盜何況於此兩路聚大衆興大役此其必不可者一也河北自恩州用兵之後繼以凶年人戶流亡十失八九數年以來人稍歸復然死亡之餘所存無幾瘡痍未斂物力未完今又遭此旱歲京東自去冬無雨雪麥不生苖已及暮春粟未布種不惟目下乏食兼亦向去無望而欲於此兩路興三十萬人之役若别路差夫則遠處難為赴役就河便近則此兩路力所不任此其必不可者二也臣伏見往年河決滑州曽議修塞當時公私事力未如今日貧虛然猶收聚物料誘率民財數年之間方能興役況今國用方乏民力方疲且合商胡塞大決之洪流此自是一大役也鑿橫壠開久廢之故道此又一大役也自橫壠至海一千餘里掃岸久已廢壞頓須修緝此又一大役也往年公私有力之時興一大役尚須數年今併三大役倉卒興為於災旱貧虛之際此其必不可者三也就令商胡可塞故道可回猶宜重察天時人力之難為何況商胡未必可塞故道未必可回者哉臣聞鯀障洪水九年無功禹得洪範五行之書知水趨下之性乃因水之流疏決就下而水患乃息然則以大禹之神功不能障塞其流但能因而疏決爾今欲逆水之性障而塞之奪洪河之正流斡以人力而回注此大禹之所不能此其必不可者四也橫壠湮塞已二十年商胡決流又亦數歲故道已塞而難鑿安流已久而難回昨聞朝廷曽遣故樞密直學士張奎計度功料極大近者再行檢計減得功料全少功料少則所開淺狹淺狹則水勢難回此其必不可者五也臣伏見國家纍歲災譴甚多其於京東變異尤大地貴安靜動而有聲巨嵎山摧海水搖蕩如此不止僅乎十年天地警戒必不虛發臣謂變異所起之方尤宜加意防懼今乃欲於凶旱之年聚三十萬之大衆於變異最大之方臣恐地動山搖災禍自此而始方今京東赤地千里飢饉之民正苦天災又聞河役將動往往伐桑拆屋無復生計流亡盜賊之患不可不虞欲望聖慈特降德音速罷其事當此凶歲務安人心徐詔有司審詳利害縱令河道可復乞候豐年餘力漸次興為臣實庸愚本無遠見得於外論不可不言謹具狀奏聞三年修判三司院又奏曰臣伏見朝廷定議開修六塔河口回水入橫壠故道此大事也中外之臣皆知不便而未有肻為國家極言其利害者何哉蓋其説有三一曰畏大臣二曰畏小人三曰無竒策今執政之臣用心於河事亦勞矣初欲試十萬人之役以開故道既又捨故道而修六塔未及興役遽又罷之已而終為言利者所勝今又復修然則其勢難於復止也夫以執政大臣鋭意主其事而又有不可復止之勢固非一人口舌可回此所以雖知不便而罕肻言也李仲昌小人利口偽言衆所共惡今執政之臣既用其議必主其人且自古未有無患之河今河浸恩冀目下之患雖小然其患已形回入六塔將來之害必大而其害未至夫以利口小人為大臣所主欲與之爭未形之害勢必難奪就使能奪其議則言者猶須獨任恩冀為患之責使仲昌得以為辭大臣得以歸罪此所以雖知不便而罕敢言也今執政之臣用心太過不思自古無不患之河直欲使河不為患若得河不為患雖竭人力猶當為之況聞仲昌利口詭辨謂費物少而用功不多不得不信為竒䇿於是決意用之今言者謂故道既不可復六塔又不可修詰其如何則又無竒䇿以取勝此所以雖知不便而罕肻言也衆人所不敢言而臣今獨敢言者臣謂大臣非有私仲昌之心也直欲興利除害爾若果知其為患愈大則豈有不回者哉至於顧小人之後患則非臣之所慮也且事欲知利害權重輕有不得已則擇其害少而患輕者為之此非明智之士不能也況治水本無竒䇿相地勢謹隄防順水性之所趨爾雖大禹不過此也夫所謂竒䇿者不大利則大害若循常之計雖無大利亦不至大害此明智之士善擇利者之所為也今言修六塔者竒䇿也然終不可成而為害愈大言順水治堤者常談也然無大利亦無大害不知為國計者欲何所擇哉若謂利害不可必但聚大衆興大役勞民困國以試竒䇿而僥幸於有成者臣謂雖執政之臣亦未必肻為也臣前已具言河利害甚詳而未蒙採聽今復略陳其大要惟陛下詔計議之臣擇之臣謂河水未始不為患今順已決之流治隄防於恩冀者其患一而遲塞商胡復故道者其患二而速開六塔以回今河者其患三而為害無涯自河決橫壠以來大名金堤掃歲歲增治及商胡再決而金堤益又加功獨恩冀之間自商胡決後議者貪建塞河之䇿未嘗留意於堤防是以今河水勢浸溢今若專意併力於恩冀之間謹治隄防則河患可禦不至於大害所謂其患一者十數年間今河下流淤塞則上流必有決處此一患而遲者也今欲塞商胡口使水歸故道治堤修掃功料浩大勞人費物困弊公私此一患也幸而商胡可塞故道復歸髙淤難行不過一二年間上流必決此二患而速者也今六塔河口雖云已有上下約然全塞大河正流為功不小又開六塔河道治二千餘里隄防移一縣兩鎮計其功費又大於塞商胡數倍其為困弊公私不可勝計此一患也幸而可塞水入六塔而東橫流散溢濵棣德博與齊州之界咸被其害此五州者素號富饒河北一路財用所仰今引水注之不惟五州之民破壞田産河北一路坐見貧虛此二患也三五年間五州凋弊河流注溢久又淤髙流行梗澀則上流必決此三患也所謂為患而無涯者也今為國設計者本欲除一患而反就三患此臣所不諭也至如六塔不能容大河橫壠故道本以髙淤難行而商胡決今復驅而注之必橫流而散溢自澶至海二千餘里堤掃不可卒修修之雖成又不能捍水如此等事甚多士無愚智皆所共知不待臣言而後悉也臣前未奉使契丹時已嘗具言故道六塔皆不可為惟治堤順水為得計及奉使往來河北詢於知水者其説皆然雖恩冀之人今被水患者亦知六塔不便皆願且治恩冀堤防為是下情如此誰為上通臣既知其詳豈敢自默伏乞聖慈特諭宰臣使更審利害速罷六塔之役差替李仲昌等不用選一二精幹之臣與河北轉運使副及恩冀州官吏相度隄防併力修治則今河之水必不至為大患且河水天災非人力可回惟當順導防捍之而已不必求竒䇿立難必之功以為小人僥冀恩賞之資也況功必不成後悔無及者乎臣言狂計愚惟陛下裁擇至和二年侍御史趙抃上奏曰臣竊聞有內臣擘畫奏請於在京汴河兩畔增築堤岸大段髙闊以防決溢之患見下三司相度併係開封府縣東西排岸八作濠寨等司檢計施行次日近自有此行遣以來沿汴兩邊居民戶口非常驚動搔擾日夕洶洶其貧者則曰官中果有必行之命奪民之地毁民之屋則我輩離散狼狽父子夫婦不能相保矣其富者則公行賄賂百方請囑吏緣為姦無所不至夫河防為害須順其情性在先朝時歲歲開濬就深通行後數十年泥滓漲淤官司因循以役民為重困監轄僥幸以省工得恩澤今汴河之底比於疇昔已厚數丈而汴河之堤纍年添起今却視通衢其堤髙下已與居民簷廡相等矣復更欲如何增築之耶以臣愚見莫若向去每年開淘不輟使水性就下汴底深快則灼然無橫流之虞京師溝渠積滯因而亦可流布通泄設若不順水性暫圖苟安其堤愈髙其勢愈危既非國家經久之利又有居民重遷之嗟伏望陛下宸斷早賜聖旨指揮直行寢罷無使相度官吏尚持兩端猶豫之説而干繫師局得以誅求計會為名下以安民心上以固邦體也嘉祐元年右司諫馬遵議開浚汴河奏曰臣竊聞本朝舊制每歲興功開浚汴河故水行地中而無濫溢填閉之患祥符中巡護使臣韋繼升表請罷修一年以省物力又請今後三五年一浚徒見目前茍簡之利而不能思患於久遠故近年以來河底漸髙口地數易水小則東南有漕運之阻水大則京師有隄防之虞歲習為常人恬不怪夫禍固藏於隱微而發於人所忽者暴水可為寒心雖使橫流僅紓大患而所殘無數百姓可哀臣欲乞朝廷指揮自今每歲農隙之際檢計開淘以深快為限縱未能一切如舊積功數年可以濟集八年河流派于魏之第六掃遂為二股自魏恩東至于德滄入于海是謂東流時議者多不同李立之力主生堤帝不聽卒用宋昌言説置上約三月翰林學士司馬光奏治河當因地形水勢若強用人力引使就髙橫立隄防則逆激旁潰不惟無成仍敗舊績臣慮官吏見東流已及四分急於見功遽塞北流而不知二股分流十里之內相去尚近地勢東髙西下若河流併東一遇盛漲水勢復西合入北流則東流遂絶或於滄德堤掃未成之處決溢橫流雖除西路之患而害及東路非䇿也宜專護上約及二股堤岸若今歲東流止添二分則此去河勢自東近者二三年遠者四五年候及八分以上河流衝刷已闊滄德堤掃已固自然北流日減可以閉塞兩路俱無害矣會北京留守韓琦言今歲兵夫數少而金堤兩掃修上下約甚急深進馬頭欲奪大河緣二股及嫩灘舊闊千一百步是以可容漲水今截去八百步有餘則將束大河於二百餘步之間下流既壅上流蹙遏湍怒又無兵夫修護堤岸其衝決必矣況自德至滄皆二股下流既無隄防必侵民田設若河門束狹不能容納漲水上下約隨流而脫則二股與北流為一其患愈大又恩深州所創生堤其東則大河西來其西則西山諸水東注腹背受水兩難扞禦望選近臣速至河所與在外官合議帝在經筵以琦奏諭光命同張茂則再往四月光與張鞏李立之宋昌言張問吕大防程昉行視上約及方鋸牙濟河集議於下約光等奏二股河上約並在灘上不礙河行但所進方鋸牙已深致北流河門稍狹乞減拆二十步令近後仍作蛾眉掃裹護其滄德界有古遙堤當加葺治所修二股本欲疏導河水東去生堤本欲捍禦河水西來相為表裏未可偏廢帝因謂二府曰韓琦頗疑修二股趙抃曰人多以六塔為戒王安石曰異議者皆不考事實故也帝又問程昉宋昌言同修二股如何安石以為可治帝曰欲作簽河甚善安石曰誠然若及時作之往往河可東北流可閉因言李立之所築生堤去河遠者至八九十里本計以禦漫水而不可禦河南之向著臣恐漫水亦不可禦也帝以為然五月丙寅乃詔立之乘驛赴闕議之六月戊申命司馬光都大提舉修二股工役吕公著言朝廷遣光相視董役非所以褒崇近職待遇儒臣也乃罷光行七月二股河通快北流稍自閉戊子張鞏奏上約纍經泛漲并下約各已無虞東流勢漸順快宜塞北流除恩冀深瀛永靜乾寧等州軍水患又使御河胡盧河下流各還故道則漕運無壅遏郵傳無滯留塘泊無淤淺復於邊防大計不失南北之限歲減費不可勝數亦使流移歸復實無窮之利且黃河所至古今未嘗無患較利害輕重而取舍之可也惟是東流南北隄防未立閉口修堤功費甚夥所當預備望選習知河事者與臣等講求具圖以聞乃復詔光茂則及都水監官河北轉運使同相度閉塞北流利害有所不同各以議上八月己亥光入辭言鞏等欲塞二股河北流臣恐勞費未易成幸而可塞則東流淺狹隄防未全必致決溢是移恩冀深瀛之患於滄德等州也不若俟三二年東流益深闊隄防稍固北流漸淺薪芻有備塞之便帝曰東流北流之患孰輕重光曰兩地皆王民無輕重然北流已殘破東流尚全帝曰今不俟東流順快而塞北流他日河勢改移奈何光曰上約固則東流日增北流日減何憂改移若上約流失則事不可知惟當併力護上約耳帝曰上約安可保光曰今歲創修誠為難保然昨經大水而無害今歲地腳已牢復何慮且上約居河之側聽河北流猶懼不保今欲橫截使不行庸可保乎帝曰若河水常分二流何時當有成功光曰上約茍存東流必增北流必減借使分為二流於張鞏等不見成功於國家亦無所害何則西北之水併於山東故為害大分則害小矣鞏等亟欲塞北流皆為身謀不顧國力與民患也帝曰防捍兩河何以供億光曰併為一則勞費自倍分二流則勞費減半今減北流財力之半以備東流不亦可乎帝曰卿等至彼視之時二股河東流及六分鞏等因欲閉斷北流帝意嚮之光以為須及八分乃可仍待其自然不可施功王安石曰光議事屢不合今令視河後必不從其議是重使不安職也庚子乃獨遣茂則茂則奏二股河東傾已及八分北流止二分張鞏等亦奏丙午大河東徙北流淺小戊申北流閉詔奬諭司馬光等仍賜衣帶馬歷代名臣奏議卷二百四十九
