body:
  text: 歷代名臣奏議卷七十二明楊士竒等撰儲嗣唐太宗嘗謂左庶子于志寧曰古者太子既生士負之即置輔弼昔成王以周召為師傅日聞道習以成性今太子幼卿當輔以正道無使邪僻啓其心勉之官賞可不次得也太子承乾屢有過惡志寧欲救止之上諫苑以諷帝見大悅賜黃金十斤絹三百匹俄兼詹事以母喪免有詔起復本官固請終喪帝遣中書侍郎岑文本敦譬曰忠孝不兩立今太子須人教約卿強起為我卒輔導之志寧乃就職時太子以農時造曲室纍月不止又好音樂過度志寧諫以為今東宫乃隋所營當時號為侈麗豈容復事磨礱彩飾於其間丁匠官奴皆犯法亡命鉗鑿槌杵往來出入監門宿衛直長千牛不得苛問爪牙在外厮役在內其可無憂乎貞觀十七年太宗謂長孫無忌司空房玄齡曰三師以德道人者也若師體卑太子無所取則於是詔令撰太子接三師儀注太子出殿門迎先拜三師答拜每門讓三師坐太子乃坐與三師書前名惶恐後名惶恐再拜十八年晉王初立為皇太子尚未尊賢重道太宗又嘗令太子居寢殿之側絶不往東宫散騎常侍劉洎上書曰臣聞郊迎四方孟侯所以成德齒學三讓元良由是作貞斯皆屈主禮之尊申下交之義故得芻言咸薦睿問旁通不出軒庭坐知天壤率由兹道永固鴻基者焉至若生乎深宫之中長乎婦人之手未曽識憂懼無由曉風雅雖復神機不測天縱生知而開物成務終由外奬匪夫崇彼干籥聽兹謡頌何以辨章庶類甄核彛倫歷考聖賢咸資琢玉是故周儲上哲師望奭而加裕漢蓄兩人引園綺而昭德原夫太子宗祧是繫善惡之際興亡斯在不勤於始將悔於終是以朝錯上書令通政術賈誼獻䇿務知禮教竊惟皇太子玉裕挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天資非勞審諭固以華夷仰德翔泳希風矣然則寢門侍膳已表於三朝藝宫論道宜𢎞於四術雖春秋鼎盛飭躬有漸實恐嵗月易往墮業興譏取適宴安言從此始以臣愚短幸參侍從思廣儲明輕願聞徹不敢曲陳故事請以聖德言之伏惟陛下誕睿膺圖登庸歷試多才多藝道著於匡時允武允文功成於纂祀萬方即敘九圍清晏尚曰雖休勿休日慎一日求異聞於振古勞睿思於當年乙夜觀書事髙漢帝馬上披卷勤過魏王陛下自勵如此而令太子優遊棄日不習圖書臣所未諭一也加以暫屏機務即寓雕蟲紆寶思於天文則長河韜映摛玉華於仙札則流霞成彩固以錙銖萬代冠冕百王屈宋不足以升堂鍾張何偕於入室陛下自好如此而太子悠然靜處不尋篇翰臣所未諭二也陛下備該衆妙獨秀寰中猶晦天聰俯詢凡識聽朝之隙引見羣官降以溫顔詢以今古故得朝廷是非閭里好惡凡有巨細必關聞聽陛下自行如此今太子久入趨侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥蔑而不急未見其可伏願俯推睿範訓及儲君推以良書娛之嘉客朝披經史觀成敗於前蹤晚接賔逰訪得失於當代間以書札繼以篇章則日聞所未聞日見所未見副德逾光羣生之福也竊以良娣之選遍於中國仰惟聖旨本求典內冀防微慎逺慮羣下所知暨乎徴簡人物則與躬納相違監撫二周未近一士愚謂內既如彼外亦宜然者恐招物議謂陛下重內而輕外也古之太子問安而退所以廣敬於君父異宫而處所以分别於嫌疑今太子一侍天闈動移旬朔師傅以下無由接見假令供奉有隙暫還東朝拜謁既疏且事俯仰規諫之道固所未暇陛下不可以親教宫寀無因以進言雖有具寮竟將何補伏願俯循前躅稍抑下流𢎞逺大之規展師友之義則離徽克茂帝圖斯廣凡在黎元孰不慶賴太子溫良恭儉聰明睿哲含靈所悉臣豈不知而淺識勤勤思效愚忠者願蒼溟益潤日月增華也太宗乃令洎與岑文本馬周遞日往來東宫與皇太子談論太宗謂侍臣曰古有胎教世子朕則不暇但近自建立太子遇物必誨諭見其臨食將飯謂曰汝知飯乎對曰不知凡稼穡艱難皆出人力不奪其時常有此飯見其乘馬又謂曰汝知馬乎對曰不知能代人勞苦者也以時消息不盡其力則可以常有馬也見其乘舟又謂曰汝知舟乎對曰不知曰舟所以比人君水所以比黎庶水能載舟亦能覆舟爾方為人主可不畏懼見其依於曲木之下又謂曰汝知此樹乎對曰不知曰此木雖曲得繩則正為人君雖無道受諫則聖此傅説所言可以自鑑太宗於寢宫側别置院居太子褚遂良諫以為朋友深交者易怨父子滯愛者多愆宜許太子間還東宫近師傅專學藝以廣懿德帝從其言太宗寵愛魏王泰月稟過皇太子逺甚諫議大夫褚遂良諫曰聖人尊嫡卑庶謂之儲君故用物不會與王共之庶子不得為比所以塞嫌萌杜禍源先王法制本諸人情知有國家者必有嫡庶庶子雖愛不得過嫡子如當親者疏當尊者卑則私恩害公惑志亂國今魏王稟料過東宫議者以為非是昔漢竇太后愛梁王封四十餘城王築苑三百里治宫室為復道費財巨萬出警入蹕一不得意遂發病死宣帝亦驕淮陽王幾致於敗輔以退讓之臣乃得免今魏王新出閣且當示以節儉自可在後月加歲增又宜擇師傅敦以謙儉勉以文學就成德器此所謂聖人之教不肅而成也帝又敕泰入居武德殿侍中魏徴亦言王為陛下愛子欲安全之則不當使居嫌疑之地今武德殿在東宫之西昔海陵居之矣論者為不可雖時與事異人之多言尚或可畏又王之心亦弗遑舍願罷之成王以寵為懼之美帝悟乃止時魏王泰禮秩如嫡羣臣未敢諫帝從容訪左右曰方今何事尤急岑文本泛言禮義為急帝以不切未頷可遂良曰今四方仰德誰弗率者惟太子諸王宜有定分帝曰有是哉朕年五十日以衰怠雖長子守器而弟支子尚五十人心常念焉自古宗姓無良則傾敗相仍公等為我柬賢者保傅之夫事人久情媚熟則非意自生其令王府官不得過四考著為令太子承乾廢魏王泰間侍帝許立為嗣因謂大臣曰泰昨自投我懷中云臣今日始得為陛下子更生之日也臣惟有一子百年後當殺之傳國晉王朕甚憐之起居郎褚遂良曰陛下失言安有為天下主而殺其愛子授國晉王乎陛下昔以承乾為嗣復寵愛泰嫡庶不明紛紛至今若必立泰非别置晉王不可帝泣曰我不能即詔長孫無忌房玄齡李績與遂良等定䇿立晉王為皇太子太子承乾廢帝欲立晉王未決坐兩儀殿羣臣已罷獨留無忌玄齡績言東宫事因曰我三子一弟未知所立吾心亡聊即投牀取佩刀自向無忌等驚爭抱持奪刀授晉王而請帝所欲立帝曰我欲立晉王無忌曰謹奉詔異議者斬帝顧王曰舅許汝矣宜即謝王乃拜帝復曰公等與我意合天下其謂何答曰王以仁孝聞天下久矣固無異辭有如不同臣負陛下百死於是遂定髙宗時王皇后無子以燕王忠為太子及后廢武后子𢎞甫三歲許敬宗希后旨請立正嫡謂太子忠宜同漢劉強故事帝問立嫡若何對曰正本則萬事治太子國夲也且東宫所出微今知有正嫡不自安竊位而不自安非社稷計帝曰忠故自讓敬宗曰能為太伯不亦善乎於是降封忠梁王武后時姚班為太子詹事兼左庶子時節愍太子稍失道班凡四上書諫其一曰臣聞賈誼稱選天下端士使與太子居處出入故太子見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正習與不正人居不能無不正教得而左右正則太子正太子正天下定矣伏見內置作坊諸工伎得入宫闈之內禁衛之所或言語內出或事狀外通小人無知因為詐偽有玷盛德臣望悉出宫內造作付所司其二曰漢文帝身弋綈足革舄齊髙帝闌檻用銅者皆易以鐵經侯帶玉貝劍環佩以過魏太子太子不視經侯曰魏國亦有寶乎太子曰主信臣忠魏之寶也經侯委劍佩去杜門不出夫聖賢以簡素為貴皇主以菲薄為德惟殿下留心恭儉損省玩好以訓天下其三曰前世東宫門閣往來皆有簿籍殿下時有所須唯門司宣令姦偽乘之因緣增損近吕升之乃代署宣敕賴殿下糾發其姦以後墨令及覆事並請內印畫署冀免詐繆其四曰聖人不專其德賢智必有所師今司經無學士供奉無侍讀宜視膳時奏請其人俾奉講勸夫經所以立行修身史所以諳識成敗斯急務也太子雖稱善不能用其言及敗索宫中得班諫書中宗嘉歎時洛陽人王慶之率險佞數百人請以武承嗣為皇太子后不許固請后遣鳳閣侍郎同鳳閣鸞臺平章事李昭德詰其故昭德笞殺慶之餘黨敗散因奏曰自古有姪為天子而為姑立廟乎以親親言之天皇陛下夫也皇嗣陛下子也當傳之子孫為萬世計陛下承天皇顧託而有天下又立承嗣臣見天皇不來食矣后乃止張易之嘗從容問自安計於鸞臺侍郎同鳳閣鸞臺平章事狄仁傑仁傑曰惟勸迎廬陵王可以免禍會后欲以武三思為太子以問宰相衆莫敢對仁傑曰臣視天人未厭唐德比胸奴犯邊陛下使梁王三思募勇士於市踰月不及千人廬陵王代之不浹旬輒五萬今欲繼統非廬陵王莫可后怒罷議久之召謂曰朕數夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無子也天其意者以警陛下乎且太子天下本夲一搖天下危矣文皇帝身蹈鋒鏑勤勞而有天下傳之子孫先帝寢疾詔陛下監國陛下掩神器而取之十有餘年乂欲以三思為後且姑姪與子母孰親陛下立廬陵王則千秋萬歲後常享宗廟三思立廟不祔姑后感悟即日遣徐彥伯迎廬陵王於房州王至后匿王帳中召見仁傑語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舍龍門具禮迎還中外大悅武后末年太子雖還東宫政事一不與大臣畏禍無敢言冀州武邑人蘇安恆投匭上書曰陛下膺先聖顧託受嗣子揖讓應天順人二十餘年豈不聞虞舜褰裳周公復辟事乎今太子孝謹春秋盛壯使統臨宸極何異陛下身撫天下哉胡不傳位東宫休安聖躬自昔天下無二姓並興且梁河內建昌諸王以親得封恐萬歲後不能良計宜退就公侯任以間簡又陛下二十餘孫無尺土封非長久計也請以都督府要州分而王之縱今尚幼且擇立師傅養成德器藩屏皇家書奏后雖猜刻不能無感乃召見賜食厚慰遣之明年復諫曰臣聞天下者髙祖太宗之天下有隋失馭羣雄鹿駭唐家親事戎旅以平宇縣指河為誓非李氏不王非功臣不封陛下雖居正統實唐舊基前日太子在諒暗相王非長嗣唐祚中弱故陛下因以即位今太子年德已盛尚貪有大寶忘母子之恩蔽其元良以據神器何施顔面見唐家宗廟大帝陵寢哉臣謂天意人事逺歸李氏物極則復器滿則覆當斷不斷將受其亂誠能髙揖萬幾自怡聖心史臣書之樂府歌之斯盛事也臣聞見過不諫非忠畏事不言非勇陛下以臣為忠則擇是而用以為不忠則斬臣頭以令天下書聞不報中宗初為太子時生懿德太子重潤髙宗喜甚是歲為皇太孫開府置官屬帝問吏部侍郎裴敬彛郎中王方慶對曰禮有嫡子無嫡孫漢魏太子在子但封王晉立愍懷子為皇太孫齊立文惠子為皇太孫皆居東宫今有太子又立太孫於古無有帝曰自我作古若何對曰禮君子抱孫不抱子可以為王父尸者昭穆同也陛下肇建皇孫本支千億之慶帝悅睿宗初以子憲為太子後復位楚王有功將建東宫未定憲辭曰儲嗣天下公器時平則先嫡國難則先功重社稷也使付授非宜海內失望臣以死請因涕泣固讓帝嘉憲讓遂許之玄宗時張九齡奏曰臣伏以皇太子是天下之本為國之二今則睿質漸長猶在深宫所與近習者未必皆正人端士安於逸樂久則性成是以古者明王恐其若此雖在赤子先之以教必使耆儒碩德為之師保故大戴禮云周成王在襁褓之中太公為之太師教之順也周公為之太傅傅其德義召公為之太保保其身體是故成王能聖周道用康秦始皇使趙髙傅其太子胡亥因教之以獄所習者非斬劓人則夷人之三族也胡亥即位秦氏以亡則明人之性情莫不由習若近正人聞正事雖欲為惡固已不忍若親近細人不聞教諭縱欲行善猶未知所適此必然也胡越之人生則聲同長則語異蓋聲者天然語者所習習於胡則胡習於越則越故知成於所習不可不慎臣伏願詳擇典故徴用名賢執經勸學朝夕從事俾皇太子得於所習天下幸甚玄宗寵幸惠妃妃訴太子瑛於帝帝大怒欲廢之中書令張九齡諫曰太子諸王日受聖訓天下共慶陛下享國久子孫蕃衍奈何一日棄三子昔晉獻公惑嬖姬之讒申生憂死國乃大亂漢武帝信江充巫蠱禍及太子京師蹀血晉惠帝有賢子賈后譛之乃至喪亡隋文帝聽后言廢太子勇遂失天下今太子無過二王賢父子之道天性也雖有失尚當掩之惟陛下裁赦帝默然太子得不廢肅宗時太子妃蕭母部國公主也坐蠱媚幽禁中帝怒責太子太子不知所對中書侍郎李泌入帝數稱舒王賢泌揣帝有廢立意因曰陛下有一子而疑之乃欲立弟之子臣不敢以古事爭且十宅諸叔陛下奉之若何帝赫然曰卿何知舒王非朕子對曰陛下昔為臣言之陛下有嫡子以為疑弟之子敢自信於陛下乎帝曰卿違朕意不顧家族邪對曰臣衰老位宰相以諫而誅分也使太子廢他日陛下悔曰我惟一子殺之泌不吾諫吾亦殺爾子則臣絶祀矣雖有兄弟子非所歆也即噫嗚流涕因稱昔太宗詔太子不道藩王窺伺者兩廢之陛下疑東宫而稱舒王賢得無窺伺乎若太子得罪請亦廢之而立皇孫千秋萬歲後天下猶陛下子孫有也且郜國為其女妒忌而蠱惑東宫豈可以妻母纍太子乎爭數十意益堅帝悟太子乃得安時軍中謀帥皆屬建寧王廣平王行軍司馬李泌密白帝曰建寧王誠賢然廣平冢嗣有君人量豈使為吳太伯乎帝曰廣平為太子何假元帥泌曰使元帥有功陛下不以為儲副得乎太子從曰撫軍守曰監國今元帥乃撫軍也帝從之憲宗元和元年左拾遺元稹奏曰臣伏見陛下降明詔修廢學增胄子選司成大哉堯之為君伯夷典禮夔教胄子之深旨也然而事有萬萬急於此者敢冒昧殊死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中才也近管蔡則讒入有周召則義聞豈可謂天聰明哉然而克終於道者得不謂教之然耶始其為太子也未生胎教既生保教太公為之師周公為之傅召公為之保伯禽唐叔與之遊禮樂詩書為之習目不得閲淫艷妖誘之色耳不得聞優笑淩亂之聲口不得習操斷擊搏之書居不得近容順隂邪之黨遊不得恣追禽逐獸之樂玩不得有遐異僻絶之珍凡此數者非謂備之於前而不為也亦將不得見而為之矣及其長而為君也血氣既定遊習既成雖有放心快已之事日陳於前固不能奪已成之習已定之心矣則彼忠直道德之言固吾之所習聞也陳之者有以諭焉回佞庸違之説固吾之所積懼也諂之者有以辨焉人之情莫不欲耀其所能而黨其所近茍將得志則必快其所蘊矣物之性亦然是以魚得水而遊馬逸駕而走鳥乘風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其蘊則興禮樂而朝諸侯措刑罰而美教化教之至也可不謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙髙者詐宦之戮人也而傳之以殘忍戕賊之術且日恣睢盱天下以為貴莫見其面以為尊是以天下之人未盡愚而胡亥固已不能分獸畜矣趙髙之威懾天下而胡亥巳自幽於深宫矣李斯者秦之寵丞相也困讒寃死無以自明而況於疏逺之臣庶乎若此則秦之亡有以致之也漢髙承之以兵革漢文守之以亷謹卒不能蘇復大訓是以景武昭宣天資甚美才可以免禍亂哀平之間則不能虞篡弒矣然而惠帝廢易之際猶賴羽翼以勝其邪心是後有國之君議教化者莫不以興亷舉孝設學崇儒為意曽不知教化之不行自貴者始略其貴者教其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至於為太子也選知道德者十八人與之遊習即位之後雖宴逰飲食之間若十八人者實在其中上失無不言下情無不達不四三年而名髙盛古豈一日二日而致是乎遊習之漸也貞觀已還師傅之官皆宰相兼領其餘宮寮選亦甚重馬周以官髙恨不得為司議郎此其驗也文皇之後漸踈賤之至於武后臨朝剪棄王族當中睿二聖危難之際雖有骨鯁敢言之士既不得在調護保安之職終不能措扶衛之一詞而令近胡安金藏剖腹以明之豈不大哀哉兵興以來兹弊尤甚師資保傅之官非疾廢眊瞶不任事者為之即休戎罷帥不知書者處之至於友諭贊議之徒踈冗散賤之甚者縉紳耻由之夫以匹夫之愛其子者猶求明哲慈惠之師以教之直諒多聞之友以成之豈天下之元子而可以疾廢毦聵不知書者為之師踈冗散賤不適用者為之友乎此何足反居上之甚也近制宫寮之外往往以沈滯僻老之儒充侍書侍讀之選而又踈棄斥逺之越月踰時不得召見彼又安能傅成道德而保養其躬哉臣以為積此弊者豈不以皇天眷祐祚我唐德以舜繼舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計無窮傳後嗣則不可脫或萬代之後有若周成王中才者而又生於深宫優笑之間無周召保助之教則將不知喜怒哀樂之所自矣況稼穡之艱難乎今陛下以上聖之資肇臨海內是天下之人傾耳注目之日也特願陛下思成王訓導之功念文皇遊習之漸選重師保慎簡宫寮皆用博厚𢎞深之儒而又練達機務者為之更進迭見日就月將因令皇太子洎諸王定齒胄講業之儀行嚴師問道之禮至德要道以成之撤膳記過以譬之血氣未定則輟禽色之娛以就學聖質既備則資遊習之善以𢎞德此所謂一有元良萬國以貞之化也豈直修廢學選司成而足倫匹其盛哉而又俾則百王莫不幼同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衛之盛入則有東牟朱虛之強蓋所謂宗子維城犬牙盤石之勢又豈與夫魏晉以降囚賊其兄弟而自剪其夲枝者同年而語乎微臣竊不自揆思為陛下建永永無窮之長䇿輒敢冒昧殊死而言之三年學士李絳上言曰古先哲王以天下為大器知一人不可以獨理四海不可以無本故立皇太子以副已設百官以分職然後人心大定宗社永寧有國家者不易之道也陛下嗣膺大寶四年於兹矣而儲闈未立典䇿不行是開窺覦之端乖重慎之義非所謂承宗廟重社稷也且漢魏故事國朝舊制懸諸日月著為憲章伏望陛下抑撝謙之小節行至公之大典用興儲副永固邦家則主鬯承祧必光於萬代問安侍膳道播於百王上曰朕以菲薄獲守社稷而虔懇未通於天地孝誠未達於宗祧而遽示天下私光及於子孫朕甚惡焉然以卿忠誠纍有陳請援引祖宗制度援引經典憲章事重禮崇瞿然增惕宜依所請遂下制司擇日備禮册命即惠昭太子也宣宗時御史中丞魏謨進同中書門下平章事建言今天下粗治惟東宫未立不早以正人傅導之非所以存副二之重且泣下帝為感動自敬宗後惡言儲嫡事故公卿無敢開陳者時帝春秋髙嫡嗣未辨謨輔政白發其端朝議歸重後唐明宗天成三年張昭遷都官貟外郎時皇子競尚奢侈昭疏諫曰帝王之子長於深宫安於逸樂紛華之玩絲竹之音日接於耳目不與驕期而驕自至倘非天資英敏識本清明以此蕩心焉能無惑茍不豫為教導何以置之盤牙臣見先帝時皇子皇弟盡喜無稽玩物之言厭聞致治經邦之論入則務飾姬薑出則廣增僕馬親賔滿座食客盈門針規者少諧謔者多以此而欲託以主鬯不亦難乎臣請諸皇子各置師傅陛下令皇子屈身師事之講論道德使一日之中止記一事一歲之內所記漸多每月終令師傅具録聞奏或皇子上謁之時陛下更令侍臣面問十中得五為益良多博識安危之理深知成敗之由臣又聞古之人君即位而封太子拜諸王究其所由蓋有深旨使庶不亂嫡疏不間親禮秩有常邪慝不作近代人君失於此道以至邦家搆患釁隙萌生昔隋祖聰明煬帝亦傾楊勇太宗齊聖魏王終覆承乾臣每讀古書深悲其事願於聖代杜此厲階其於卜二封宗在臣未敢輕議臣請諸皇子於恩澤賜與之間婚姻省視之際依嫡庶而為禮秩據親踈而定節文示以等威絶其徼幸保宗之道莫大於斯明宗覽疏而不能用宋太宗時寇準出知青州召還入見帝足創甚自褰衣以示準且曰卿來何緩耶準對曰臣非召不得至京師帝曰朕諸子孰可以付神器者準曰陛下為天下擇君謀及婦人中官不可也謀及近臣不可也惟陛下擇所以副天下望者帝俯首久之屏左右曰襄王可乎準曰知子莫若父聖慮既以為可願即決定帝遂以襄王為開封尹改封夀王於是立為皇太子宋真宗咸平元年侍御史知雜事田錫上言曰臣竊觀唐憲宗即位改元元和四年冬十月御宣政樓册皇太子又按李絳論事集元和三年翰林學士李絳等上言曰古先哲王以天下為大器知一人不可以獨理四海不可以無本故立太子以副已設百司以分職然後人心大定宗社永寧有國家者不易之道也陛下嗣膺大寶四年于兹矣而儲闈未建典册不行是開窺覦之端乖重謹之義非所以承宗廟重社稷也憲宗依所請下制所司擇日備禮册命今陛下自纂承大位改元以來五年于兹矣儲闈未建典册不行豈不慮窺覦之端豈不思重謹之義宜速以宗社永寧為圖也天禧元年兵部員外郎直史館陳靖上奏曰臣伏見皇太子光踐承華照臨方內洊雷成象正位於青宫五輅和鈴炳儀於清廟惟賔寮之具爾獨師保之闕如且夫師者師法其規模保者保安於德義茍曠厥任未協前經臣是以展轉三思揣摩羣籍冀有確論上贊昌朝粵自五帝選賢三王授子雖揖遜之或異在訓導以攸同虞舜之書則曰教胄子姬周之典則曰延沖人著于格言莫重尊教雖然服冕裘陳鹵簿此可以莊禮容於外也至若就道德敦孝恭此可以發智理於內也伏願陛下隆邦家之本考沿襲之文延揖公台充備師傅體二聖之基緒副三靈之宅心人謀大同知有尊於調護神器光屬亦共貫於守成又惟陛下頒列藩房夙昭聖範歷試京邑之繁重備嘗稼穡之艱難雖勿用以居潛已重暉而合照故太宗皇帝英心奮斷大略制權謂六傅而可虛俾庶務而從簡今皇太子適膺儲位方在妙齡是宜設彼師臣豐其禮數恢七教以興之德業廣五行俱下之聰明春誦夏絃遍遵行於故事左輔右弼率永賴於正人臣謹案漢書始元五年六月詔曰朕以渺身獲保宗廟戰戰栗栗夙興夜寐修古帝王之事通保傅者是知保傅之重不可不備也又伏覩唐貞觀十七年散騎常侍劉洎以謂皇太子初立宜尊賢重道以昭聖德遂上書論列亦有憲章然而師傅之名未聞沿革之制臣學識寡陋罔測津涯伏乞陛下選載筆之洪儒俾其檢討召秉鈞之元輔計之久長庶使左右周儲賴旦奭之耆德羽翼漢室躡園綺之髙蹤上符宗社之靈下副華夷之願臣適當暮齒尚玷周行請老歸田案禮經而愧晚封章言事表臣節之有終倘蒙宸鑒俯回離明增耀不獨臣死生幸甚抑亦使兆庶同歡仁宗皇祐五年太常博士張述上奏曰臣聞漆室之女有憂國之心倚檻而嘆臣位於朝二十五年而區區之慮不蚤為陛下建長世之䇿是漆室之不若也臣實憂之有生之命繫於宗廟社稷之重而以繼嗣為之本匹夫匹婦有百金之産猶能定謀託後事出於素況有天下者哉建隆乾德之臣子孰不願太祖皇帝享年億萬者而端拱天禧之臣子其心亦莫不若此然天地有運行日月有盈昃隂陽之數有煥有章氣至而回極而變理之必然者也藝祖以神器付太宗太宗以傳真宗真宗以傳陛下陛下承三聖之業傳之於千萬年斯為孝矣而春秋四十四宗廟社稷之繼未有託焉此臣所以夙夜倣徨而憂也陛下知此矣而以嫌疑不決非孝也羣臣知此矣而以避諱不言非忠也陛下享天下之貴而不自怠有天下之富而不自侈過成康文景逺矣謂宜默祈天地嶽瀆分寵六宫用均愛施或未之獲則遴擇宗親才而賢者異以禮秩試以職務俾內外知聖心有所屬則天下大幸嘉祐五年述又上奏曰臣聞明兩作離大人以繼明照四方離為日君象也二明相繼故能久照東升西沒一晝一夜數之常也陛下御天下將三紀是日之正中也而未聞以繼照為慮臣誠疑之夫嗣不早定則有一旦之憂而貽萬世之患歷觀前世事出倉猝則或宫闈出令或宦官主謀或姦臣首議貪孩孺以久其政冀暗昧以竊其權安危之機發於頃刻而朝議恬不為計豈不危哉六年述為職方員外郎提點淮浙銅場又上奏曰臣讀書為儒歷覽經史而效官州縣唯有忠義常盡瘁於職業自登朝列伏見皇嗣未立中外憂之十餘年間已五次上書所言皆指陳宗廟社稷可安可危之事自知卑微天聽髙邈伏慮衡石程書之時不足感悟宸聽又恐言詞激切觸犯忌諱為左右隱蔽臣伏念三聖寶位傳付陛下陛下在位既四十年未有繼嗣陛下曽不細思之耶若仔細思之則憂宗廟社稷俾繼嗣不絶矣若未仔細思之耶不當因循委順天命一祖二宗傳付陛下寶位欲其宗廟社稷世世嗣續不絶則陛下方為孝矣臣愚敢引杜太后之言庶激切感悟陛下之心杜太后臨終以藝祖得天下謂無長君所以藝祖得之藝祖奉杜太后之言所以不忍傳之子而傳之太宗是也向使世宗在位更十數年少帝嗣位藝祖豈得應天順人之事乎陛下當思之陛下昔誕育豫王若天意與陛下則今已成立矣近聞一年中誕四公主若天意與陛下則其中有皇子矣上天之意如是陛下合當悟之陛下在位四十年當其安寧萬歲時宜審擇藝祖太宗賢子孫且立為皇子但且異其爵位試之官政繫天下之望陛下詳察有賢德可以傳付則立之所以謹重大事俾宗廟社稷得其主矣而況天地之大五行休王皆有數在天地之中固不可逃其數也一旦卒有萬一不可諱倉皇之際危急之間寶位神器而欲使宫闈左右中官兩府遞相觀望而一言謀之豈陛下之心輕祖宗之基業如是之易也當陛下安康之時不能擇而為之欲至倉皇之際顧令左右取次謀之此陛下不謹重三聖之基業同尋常之事爾夫繼嗣有賢有不賢則朝政有治有亂宗廟社稷有安有危陛下之心固亦知之矣今陛下在位歲久萬幾之政稔聞熟見但欲凝神淵默垂拱仰成威福賞罰雖曰出自朝廷即陛下不專於已賞罰不專於已而威福漸移於下臣愚實憂之書曰惟辟作福漸之時義大矣哉履霜堅氷至蓋言漸之不已則東漢陵夷之禍復見於今矣臣愚生不能一益聖世所以吐肝瀝膽觸犯忌諱狂言僭説庶有感悟陛下之心若有所感悟而能擇繼嗣紹隆宗廟社稷俾世世祭享不絶臣雖赴鼎鑊萬死之日猶生之年而名不朽挂於忠義之列所求遂矣至和二年侍御史趙抃上言曰臣聞聖人之制變不可無權宜天下之能事不可失機會至於去禍以歸福却亂以格治救亡以圖存轉危以置安者用權宜適機會也向者伏覩陛下聖體偶一違豫中外人心莫不動搖賴宗廟社稷之降靈天地神明之垂祐四海蒙福宸躬寖康然猶上有謫見之文逮無虛月下有妖言之俗至于再三天其或者豈非以陛下皇嗣未立人心未有所係垂厥祥異明白丁寧警誡陛下意欲陛下深思逺圖亟有所為而然也權宜也機會也今其時矣書曰一人元良萬邦以貞易曰大人以繼明照四方叔孫通以謂天下之本奈何以天下為戲韓愈亦云前定可以守法不前定則爭且亂臣不勝大願願陛下思所以答謫見妖言之警誡思所以固三聖百載之基業思所以安中外臣庶之憂惑思所以破姦雄隂賊之窺覦斷宸衷發天意擇用宗室賢善子弟或教育宫闈或封建任使左右以良士輔導以正人磐石維城根本深固有是二者惟陛下示天下以至公而財擇焉伏況陛下春秋富盛福夀延洪一旦皇子慶誕少陽位正儲二事體何損權宜方今施為且適機會轉禍亂危亡將然之勢為福治安存無疆之基豈不盛哉豈不休哉臣職有言責計無家為戴陛下之恩極泰山之重顧愚臣之命等鴻毛之輕儻一毫有益於朝廷則萬死甘從於鼎鑊干冒旒冕臣無任納忠待罪激切屏營之至三年通判并州司馬光請建儲副狀曰竊以人臣之進言者捨其急而議其緩則言益繁而用益寡矣人君之聽納者忽其大而謹其細則心益勞而功益淺矣故明主不惡逆耳之言以察治亂之原忠臣不避滅身之禍以論危安之本是以上下交泰而事業光美也臣竊見陛下自首春以來聖體小有不康天下之人側足而立纍氣而息恟恟憂懼若蹈氷炭間者雖已痊平而民間猶有妄為訛言以相驚動者雖有司以嚴刑束之彼口不得言中心惶惶何所不慮邪陛下胡不試思其所以然者何哉豈非儲二者天下之根本根本未定則衆心不安也賈誼有言抱火措之積薪之下而寢其上火未及然因謂之安當誼之時漢孝文帝春秋鼎盛有孝景以為之太子中外乂安公私富溢誼猶有是言使誼處於今日當云何哉陛下好學多聞博覽經史試以前古之事質之治亂安危之幾何嘗不由繼嗣哉得其人則治不得其人則亂分先定則安不先定則危此明白之理皎如日月得失之機間不容髮於朝廷至大至急之務孰先於此而陛下晏然不以為憂羣臣愛身莫以為言此臣所以日夜痛心疾首忘其身之踈賤而不顧鼎鑊之罪者也伏惟陛下哀而察之今夫細民之家有百金之寶猶擇親戚可信任者使謹守之況天下之大乎三代之王以至二漢所以能享天之祿若是其久者豈非皆親任九族以為藩輔乎使親者猶不可信則踈者庸足恃乎臣竊惟陛下天性純孝振古無倫事無大小關於祖宗者未嘗不謹身苦體小心翼翼以奉承之況所受祖宗光明盛大之基業豈可不為之深思逺慮措之於安平堅固之地以保萬世無疆之休哉臣聞天子之孝非若衆庶止於養親而已蓋將慎守前人之業而傳於無窮然後為孝也故經稱天子之孝曰德教加於百姓刑于四海諸侯之孝曰保其社稷而和其民人卿大夫之孝曰守其宗廟士之孝曰保其祿位而守其祭祀庶人之孝曰謹身節用以養父母此皆聖人之言非臣之狂瞽也今陛下所以奉事祖宗其道至矣若獨於此未留睿意早定大議則嚮時純孝巍巍之德皆無益矣此天下所共為陛下重惜非特愚臣而已臣聞禮大宗無子則同宗為之後為之後者為之子也故為人後者事其所後禮皆如父所行尊尊而親親也伏惟祖宗受天明命功德在人本支百世子孫千億而陛下未有皇嗣人心憂危伏望陛下深念祖宗之艱難基業之閎美神器之大寶蒼生之重望勿聽茍且之言勿從因循之計斷自聖志昭然勿疑謹擇宗室之中聰明剛正孝友仁慈者使攝居儲二之位以俟皇嗣之生退居藩服儻聖意未欲然者或且使之輔政或典宿衛或尹京邑亦足以鎮安天下之心如此則天神地祇宗廟社稷實共賴陛下聖明之德況羣臣兆民其誰不歡呼鼓舞乎昔魯漆室之女憂魯君老太子幼彼匹婦也猶知憂國家之難蓋以魯國有難則身必與焉故也況臣食陛下之祿立陛下之朝又得承乏典册之府比於漆室之女斯亦重矣誠不忍坐視國家至大至急之憂而隱默不言臣誠知言責不在臣言之適足自禍然而必言者萬一冀陛下采而聽之則臣於國家譬如螻蟻而為陛下建萬世無窮之基救四海生民之命臣榮多矣願陛下勿以臣人微位賤謂之狂狷而忽之試以臣言自為聖意延問大臣忠於社稷者倘以為非臣請伏妄言之誅倘以為是願陛下決志而速行之焚臣此奏勿以示外足以明臣非敢徼冀毫釐之幸也虞書曰敕天之命惟時惟幾陛下當此之時變危為安變亂為治易於反掌若失時不斷使天下之人有以議陛下之純孝者則臣雖欲畢命捐軀以報陛下亦無及已臣不勝區區憤悶之誠干冒冕旒伏地待罪嘉祐元年光又上言曰臣先於六月十九日輒以瞽言干犯聖聽伏地傾耳以俟明詔於今月餘一無所聞陛下寬仁不加誅於狂愚之臣然亦未賜采納臣竊自痛人品猥細言語吃訥不能發明國家安危大體致陛下輕而棄之此皆臣之罪也雖然臣性誠愚位誠賤而意誠忠語誠切願陛下不以人之愚賤而廢忠切之言少留聖心於宗廟社稷之至計則天下幸甚竊以為國家者政有小大事有緩急知所先後則功無不成議者或曰當今之務大而急者在於水災泛溢是大不然彼水災所傷不過汚下及濵河之民若積雨既止有司少疏而塞之則民皆復業豈能為國家之患哉又曰然則在於穀帛窘乏是又不然夫以四海之富治平之久若養之有道用之有節使良有司治之穀帛不可勝用也豈能為國家之患哉又曰然則在於戎狄侵盜是又不然夫戎狄侵盜不過能驚擾邊鄙之民若禦之有道備之有謀可使朝貢相繼豈能為國家之患哉以臣之愚當今最大最急之患在於本根未建衆心危疑釋此不憂而顧憂彼三者是捨其肺腑而救其四肢也不亦左乎借有髙才之臣能復九河之道儲九年之食開千里之邊而本根未建猶無益也況復細於彼三事者烏足道哉今陛下聖體雖安四方之人未能遍知尚有疑懼者陛下不以此時早擇宗室之賢者使攝居儲副之位內以輔衛聖躬外以鎮安百姓萬一有狂妄之人出於意外喧譁驚衆雖知萬全無慮然亦豈可不過為之防哉臣竊意陛下聖智聰明洞照安危䇿慮已定而尚密之未欲宣示於外審或如此亦恐不可何則今天下之人企踵而立抉耳而聽以須明詔之下然後人人自安又何待而密哉若以儲副體大非造次可定者或且使之輔政或典宿衛或尹京邑亦足以遏禍難之原靖中外之意今危安之幾間不容髮日失一日貴在及時而朝廷置之意外不為汲汲朝夕所議大抵皆目前常事非甚大而急者臣恐髙拱雍容養成國家之患從而理之用力難矣此臣所以區區寢不能安食不能飽不避死亡之誅進言不已者也伏望陛下察其愚衷特賜詳擇臣前日所奏及今狀內事理稍有可施行者乞決計而速行之以安天下元元之心然後理臣僭妄建言之罪不敢辭也光又上言曰臣兩曽上言乞擇宗室賢者進而用之蓋以上則輔衛聖躬下則鎮安百姓迄今未聞聖朝少垂采聽臣誠愚昧不達國家髙逺之意若臣所言非邪當明治其罪以示天下若其是邪亦謂聖心不宜棄忽豈可直以臣之愚賤不察其言若投羽毛於滄海之中杳然莫知其所之豈踈逺所望哉臣不勝憤悶敢復剖析肝膽陳布以聞雖抵罪萬死亦無怨悔臣聞書曰逺乃猷詩云猶之未逺是用大諫凡國家之弊在於樂因循而多忌諱不於治安之時豫為長逺之謀此患難所從而生也竊觀漢室以至有唐簡䇿所載帝王即位則立太子此乃古今不易之道也其或謙讓未暇則有司請之所以尊宗廟重社稷皆國家莫大之慶矣未聞人主以為諱惡也及唐中葉以來人主始有惡聞立嗣者羣臣莫敢發言言則刑戮隨之是以禍亂相尋不可復振殊不知本強則茂基壯則安此乃國家所當深鑒而不足以為法也今天下之人上自公卿下至庶人茍有知識忠於國家者其心皆知當今之務無此為大無此為急然而各畏忤旨之誅莫敢進言臣獨不愛犬馬之軀為陛下言之陛下豈可不少留聖思而聽察之邪臣嘗歷觀春秋以來逮至國初積一千六百餘年其間天下混一內外無患兵寢不用者不過四百餘年而已至如聖朝芟夷僭亂一統四海內平外順上安下和使在朝在野之人自祖及孫耳目相傳不識戰鬪蓋自上世以來治平之久未有若今之盛者也臣竊見國家於州縣倉庫斗糧尺帛未嘗不嚴固扃鐍擇人而守之況如是融明閎茂之業豈可不謹擇親戚可信任者使助陛下守之乎此則賢愚之人所共為陛下重惜者也陛下當此之時頥指如意不早決至䇿以固萬世不拔之基獨不念太祖太宗跋履山川經營天下真宗宵衣旰食以致太平之艱難乎此臣所以夙夜遑遑起則思之卧則夢之感嘆涕泗不能自已不避煩瀆之誅再三進言者也或者謂臣身賤居外而言朝廷之事侵官也臣愚以為治古諫諍無官自公卿大夫士至於庶人百工商旅矇瞍芻蕘無有不得言者所以達下情而察國政也若置官而守之非其官者皆不得言則下情壅而不通如是則國家雖有迫切之憂行道之人皆知之而在上者莫得聞也此其為害豈不深乎況臣食陛下之祿於今三世矣先臣某以亷直恬退特為陛下所知擢自孤微升之侍從此恩之重子子孫孫何時敢忘而又陛下嚮以水災親下明詔延訪中外勤求得失臣獨何人身逢盛際捨此大節隱而不言其餘瑣碎豈足道哉抑又聞之元后作民父母陛下臣父也安有為人之子見危而不告其父乎伏望陛下察臣區區之心不為私其一身不惜少頃之間取臣前後所奏略賜省覽其中萬一茍有可施行者乞以陛下之意斷而行之宣告中外使逺近渙然無復憂疑則自然神靈悅於上而災異伏衆庶喜於下而姦宄消至於草木昆蟲靡不蒙其福其為功業豈不盛哉夫時者難得而易失惟陛下早留神詳察六年光為起居舍人同知諫院乞建儲上劄子曰臣先於至和三年通判并州事日三曽上言乞陛下早定繼嗣以遏亂源當是之時臣疏逺在外猶不敢隱忠愛死數陳社稷至計況今日侍陛下左右官以諫諍為名竊惟國家至大至急之務無先於此若捨而不言專以冗細之事煩瀆聖聽厭塞職業是臣懷姦以事陛下罪不容於葅醢伏望陛下取臣嚮時所進三狀少加省察或有可取乞斷自聖志早賜施行如此則天地神祇宗廟社稷羣臣百姓並受其福惟在陛下一言而已光又乞建儲上劄子曰臣近於前月二十六日上殿敷奏乞檢會臣在并州所奏三狀早定繼嗣事陛下聖意昭然即垂聽納凡所宣諭皆非愚臣所能及此乃天地神祇保佑皇家實萬世無疆之休也臣謂陛下朝夕當發德音宣告大臣施行其事今將近一月未有所聞豈陛下以兹事體大慎選宗室未得其人將左右之人有所間沮熒惑聖聽臣皆不得而知也臣聞為人後者為之子也著於禮律皆有明文漢孝成帝即位二十五年年四十五以未有繼嗣立弟子定陶王欣為太子今陛下即位之年及春秋皆已過之豈可不為宗廟社稷深思逺慮哉況今亦未使之正東宫之名但願陛下自擇宗室仁孝聰明者養以為子官爵居處稍異於衆使天下之人皆知陛下意有所屬以係逺近之心俟他日皇子生復使之退歸藩邸有何所傷此誠天下安危之本願陛下決意而速行之七年光又請早令皇子入內劄子曰臣等伏聞擇今月二十五日差內臣宣皇子曙入內而曙猶復稱病未入臣等竊以臣子有君命召不俟駕之禮使者有受命不受辭之義今曙但以恐懼不敢便當陛下非常恩寵而所差內臣亦合以臣子事君父之禮曉諭切責使即奉命豈得備禮致命默然往復殊不副陛下聖意其今月二十五日宣曙內臣伏乞特行責降以懲不職之罪況皇子之名本非官職無容避讓今詔命已下二十餘日而曙既為陛下之子禮當朝夕定省備人子之職不宜久處外宅伏望聖慈速賜選差都知御藥諭以君父之命不可違臣子之職不可闕敦迫切責使即時入內并下大宗正司及本宫亦仰以禮敦遣不得更容遷延仁宗始不豫國嗣未立天下寒心而莫敢言諫官范鎮首發其議光為開封府推官在并州聞而繼之且貽書勸鎮以死爭至是復面言臣昔通判并州所上三章願陛下果斷力行帝沈思久之曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及耳光曰臣言此自謂必死不意陛下開納帝曰此何害古今皆有之光退未聞命復上疏曰臣向者進説意謂即行今寂無所聞此必有小人言陛下春秋鼎盛何遽為不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳定䇿國老門生天子之禍可勝言哉帝大感動曰送中書光見韓琦等曰諸公不及今定議異日禁中夜半出寸紙以某人為嗣則天下莫敢違琦等拱手曰敢不盡力未幾詔英宗判宗正辭不就遂立為皇太子又稱疾不入光言皇子辭不資之富至於旬月其賢於人逺矣然父召無諾君命召不俟駕願以臣子大義責皇子宜必入英宗遂受命歷代名臣奏議卷七十二
