body:
  text: 歴代名臣奏議巻三百二十七明楊士竒等撰禦邊宋仁宗慶歴三年樞宻副使富弼論削兵當澄其冗弛邊當得其要上奏曰臣聞茶塩之法漢唐之所取贍也孔僅建白有釱趾之刑桑羊畫策為安邊之本張林衞覬踵陳其方此煑海之利也至如張滂始倡於正元之間王涯繼議於太和之後鄭注趙贊並沿其術此摘山之税也國家茶塩之利兼唐數十倍矣向以邊隅用兵經費不足主計之吏益求其贏新舊之法屢更是非之議紛起羣商咨怨逺近諠然究其弊端奚厚利之可致哉試陳一策或可取焉臣嘗究桑羊之説觀倪寛之論從大夫之計則曰修鄣塞偹屯戍必蕃貨長財以禦不軌通有無調緩急必建本抑末以制豪人覽文學之策則曰廣道徳開仁義必本修民慤以興教化遏貪鄙尚至誠必防塞利門以劭農業二者之術交尚而相勝卒無所歸準由是溺利權者不知興王致治之本談古誼者不知佐財備邊之急今徒能語興王致治而不能思其急則腐儒之議也止能語佐財備邊而不能思其本則霸圖之駮也今國家追王風黜霸畧國用稍艱而利課遂梗者兵不可削籍而邊不可弛候故也然兵有可削之術邊有可弛之謀所謂兵有可削者非能去之也在乎澄其冗者而已所謂邊可弛者非不􅊀之也在乎得其要者而已今中自京畿外至州縣防戍之卒屯駐之兵其籍盈數百萬無技勇者有之矣癯弱朽邁則虚為耗蠧是皆可澄之者也今屯備之要存乎西北自西羌叛命以來朝廷制禦之術為不少矣其北鄙雖結驩奉好無輕儳宼鈔之患然烽候不可不嚴堡鄣不可不備且邊陲所恃唯騎與射若夫勁弩大㦸長矛巨盾鏃之所中刃之所挂洞􅎍連腋則非彼之所能加也儻釋騎而就步則参伍不能當中國之一必若馳髙騖下規廻矩折則非中國之騎所堪也中國之馬駔駿既少騎士或非精習戰陣之際步兵整頓騎士馳突多或蹀亂誠宜損其駑下存其精鋭以増步兵東漢嘗詔邊郡増置步兵列屯塞下此其効也而況給一騎之芻粟可以贍步兵數人矣得不違害而就利哉此又可以澄之者至如今之邊候多屯内兵土宜非所堪技能非所習而坐食儲峙慣忲給賜乆恬安逸靡知艱苦有未嘗識陣伍而聞金鼓者忽有一旦之用擐三屬之甲雪霜増其惨瘃墯切其身則恐疲瘁顛仆之不暇非全勝之師也夫邊儌之人土俗懻忮便騎射能寒苦與戎人習尚一同寇或暴至皆能全保聚有闘心雖討擊驅攘亦嘗参用然什不得伍所遺實多莫若嵗乗農餘鳩集勇壯教以長技繕其利兵示之以進退之形權之以賞罰之柄分之以部隊領之以幹臣粟帛可以不供賦租可以自贍角前犄後翼以内兵則為全勝之師矣此所謂得其要者如此而後利途可以寛本業可以阜教化可以振貪鄙可以消而免譏乎腐儒之議漸逺乎霸圖之駮也願陛下不以臣説為妄特留聖意四年弼上河北守禦十三策疏曰臣伏以北敵自古為中國患黄帝時謂之獯鬻周時謂之玁狁秦時謂之胡漢時謂之匈奴唐時謂之契丹其名雖異其實則一也有民人而不能教化有土地而不出財貨寒無温麗之服饑無甘珍之食凡百所欲率皆不足只知有射獵之事鬭戰之習恣其欲逞其强而已矣於是見中國之盛萬物之富非已之所有求而不可得貪惏之性濟以趫武則不得不為邊鄙侵掠之患也然為患深淺係其強弱亦係中國盛衰焉或暫而入宼或連嵗擾邊或散處中原或逐出漠北或費兵力而臣蓄之或從權宜而亢禮之伏叛相倚勝敗不常歴代帝王知其若此不欲困百姓而外事四夷故有曰視為化外放之而已復有曰接以禮讓覊縻不絶而已又有或質其子或盟於天或啗之金帛以厭其欲或結之姻好以暱其心自古謀謨之臣運籌畫策相與争於廟堂之上者亦惟此數科而已國家初得天下震耀威武太祖待北敵僅若一族毎與之戰未嘗不克太宗因親征之衂敵勢遂驕頻年寇邊勝敗相半真宗嗣位之始專用文徳于時舊兵宿將往往淪没敵騎深入直抵澶淵河朔大騷乗輿北幸於是講金帛啗之之術以結懽好自此河湟百姓㡬四十年不識干戈嵗遺差優然不足以當用兵之費百一二焉則知澶淵之盟未為失策而所可痛者當國大臣議和之後武備皆廢以邊臣用心者謂之引惹生事以搢紳慮患者謂之迂濶背時大率忌人談兵幸時無事謂敵不敢背約謂邊不必預防謂世常安謂兵永息恬然自處都不為憂西北之寇稔知朝廷作事如此之失也於是隂相交結乗虚有謀邊臣有奏敵中事宜則猶曰探候之人妄報所以希賞固未嘗聽也蕃使毎到朝廷悖慢則尚曰異域之人無禮是非異事固不之恤也但只自謾嚇佯為包容其實偷安不肻為國家忘私任責畫乆長之逺經所以縱其姦謀養成深患是致寳元元年元昊竊發數載用兵西人窮困未有勝筭又至慶歴二年契丹觀舋而動嫚書上聞中外倉黄不知為計不免益以金帛且茍一時之安此二邊所以敢然者盖國家向來輕敵忘戰不為預備之所致也臣深見二敵為患卒未寧息西乏則北助北静則西動必欲舉事不難求舋通和則安享重幣交戰則必敗官軍叛而復和孰敢不許擒縱自在去住無梗兩下牽制困我中國有何大害而不為邊患有何後悔而長守懽盟渝盟擾邊我則遂困不幸凶荒相繼盜賊中起則彼二敵所圖又甚大矣臣故曰二敵為患卒未寧息臣上之所陳西北形勢乃唐室以前戎人之事也其後契丹自得燕薊以北拓䟦自得靈夏以西所生英豪皆為其用得中國土地役中國人民稱中國位號立中國家屬任中國賢才讀中國書籍用中國車服行中國法令是二敵所為皆與中國等而又勁兵驍將長於中國中國所有彼盡得之彼之所長中國不及我當以中國勍敵待之庻㡬可禦豈可以古之戎人待二敵邪前既輕敵妄戰不為預備致二敵結祻為朝廷深憂今又欲以茍安之勢遂為無事二敵各獲厚利退而養勇不數年相應而起則無復以金帛可啗而盟詛可約也臣向者累奉徳音今韓琦范仲淹專管西事命臣專管北事臣才識無取濫膺擢任退自循省何以塞責然敢不強勉夙夜揣摩今輙得守䇿凡六事禦策凡七事謹具如左一河北三十六州軍内縁邊次邊如北京雄霸祁深保瀛漠滄定鎮冀十二州廣信安肅順安信安保定乾寧永寧七軍緫一十九城皆要害之地可以控制敵寇而不得深入矣定為右臂瀛滄為腹心北京為頭角此四城者河朔之所望也餘十五城為指爪支節乃四城之所使者定瀛滄各置一大帥餘十五城分屬定瀛滄三路悉擇善將守之十九城都用三十萬定五萬滄瀛鎮各三萬冀二萬冀在要㑹之地諸路皆通故比餘郡蓄兵稍多保祁深廣信安肅各一萬保州廣信安肅當入寇之衝故三城鼎足相峙欲以交相㑹合以禦初入之鋒也祁在鎮定之東舊頗慢後來敵騎入寇以鎮定有重兵不肻趨鎮定路才過保州便從東南道出祁深往取冀路寇澶魏故祁深亦須屯兵稍多雄霸漠順安信安保定乾寧永寧各五千北京五萬為諸路救援之兵今河朔平時有駐泊屯駐就粮兵十八萬本城五萬至用兵時増十萬人則戰兵足矣此三十萬兵非如景徳年閉門自守皆使出而接戰也當時城守不敢出所以寇兵堂堂直抵澶淵㡬至渡河為京師患今若使良將帥守十九城分頭三十萬衆左右出入縱横救應閃誤逗誘衝陷掩襲臣雖愚未信敵敢長驅而南也頃年大兵悉屯定州然閉城不使出戰者盖恐一敗塗地則無以救援且防中渡之變也今雖用兵三十萬而分置十九城右敗則左救縱失則横援豈更有昔時之虞邪其外十七城不復蓄兵只以本郡鄉兵堅守不使出戰一河朔州軍長吏最宜得人以備匃奴之變自來都不選擇贓汙不才年老昏昧者盡使為之又移替不定乆者不過一二年其間茍且之人只是幹尋常之務其經乆利害自知不及其身率皆不為前後相承積弊已甚若不選人乆任以矯前失則異日或有變故邊城不守浸滛深入為患不細其上件十九州軍在河朔尤為要害内定保雄霸滄五州廣信安肅順安信安四軍近已得旨選人差定見施行次北京已有大臣自餘鎮冀瀛漠祁深六州保定乾寧永寧三軍北平一寨亦乞選差長吏並使乆於其任内績效著聞者優與就遷秩禄及厚加賜予使樂於邊寄亡所怨苦則悉心營職自甘乆處或亷勤可尚才有不足者罷之與内地合入差遣若故為乖繆欲違邊任及有罪不可留而法不至死者廢之終身如此則人知祻福必及孰敢不勉别有事件已具進呈一除上件十九州軍長吏已下並乞詔本路轉運提刑安撫部管鈐轄分擘舉充仍委樞宻院三班審官銓司選擇不許循入並須三年一替所貴上下得人衆職皆舉用兵之際有可供使與夫臨時外求得失相萬也一屯兵備邊古今常制所患者民賦有限兵食多缺必須廣為經度其間嵗有凶歉謀之不獲或寇至益兵食常不足則暴歛横取何所不至民由是困盜由是起此歴代之所患也河北自石晋失燕薊之險無所固守是以蓄兵愈多積粟愈厚國朝踵之頗乆至景徳講和之後兵備漸弛粟亦隨減前年敵忽生變雖強與復和而終非悠乆之計自此邊舋已兆向去未有寧嵗尤宜謹備禦之策使乆而不匱臣輙得養兵二條其一據守邊兵馬合留外屯駐駐泊就粮諸軍悉分屯於河南鄆齊濟濮等州以教以養況其地富實不勞而足率三年一代遇有警急發符召之不旬日可到豈有後期不及者邪所以畧省河朔誅歛以寛疲民使之安逸蘇息坐待宼至而用庻㡬沛然師有餘力可以禦敵其二縁大河州軍起敖倉支移河南民税及漕江淮粟以實之分屯近邊兵馬毎二嵗一代亦足以寛河湟之困民二者可擇一焉或兼用亦善不然臣恐無事時河北已見殫竭一旦用武又重加歛民必怨叛則肘腋之下皆為仇讎豈暇禦外宼哉一河北最號勁兵之處若盡得精鋭則無敵於天下況邊鄙乎頃年朝廷未與匈奴講和敵毎入宼唯懼北兵視南兵輕蔑之也我分南北兵各為一軍凡敵陣必先犯南兵南兵潰則并北軍累之而必敗懲此因有以南北兵混而戰者敗走北兵南兵尚多徒能張為虚聲而實不足用臣願自今河北増募土人為禁軍料錢不可過五百文毎成一指揮即代南兵一指揮歸營不數年三十萬盡得北兵不教之精勇則匈奴自當畏服豈敢輕動哉恐議者謂不宜益兵則請於别路罷招以此易彼亡所増矣既得土兵勿戍他郡粮不足則願用臣前養兵二條一北敵風俗貴親率以近親為名王將相以治國事以掌兵柄而信任焉所以視中原用人亦如已國向者燕王威望著於北敵知是皇叔又為王爵舉天下之尊無與二謂朝廷庻事皆決於王又疑王善用兵天下兵皆王主之嚴刑好殺無敢當者北敵疑此益所畏懼故燕薊小兒夜啼輙曰八大王來也於是小兒輟啼毎牽牛馬度河或旅拒未進又曰必是八大王在河裏其畏服如此敵人毎見南使未嘗不問王安否及所在朝廷以王之故亦見重於敵朝廷有如是親賢毎欲妄動未必不畏王而止今春王薨識者亦憂之謂王之生則北敵以朝廷為重王之薨則北敵以朝廷為輕矣臣亦嘗念國家將帥既未聞於敵國而親王素有威望為匈奴所畏者又已淪謝且不復更聞有皇親可以為朝廷屏翰者必謂王室孤弱無所扶助本根不固易以動摇此誠宜為敵人之所窺測也臣願陛下親擇宗室中年長知書識理道曉人事者十數人為王畿千里知州慮宗室不逹民政且或有任性為事通判位下難規正宜擇方嚴公幹近上朝廷一人為同知州所貴勢均力敵可以共事而無所乖失俟厯一兩郡決知可以獨任則罷同知州只置通判又擇其次者數十人為千里内州郡鈐轄恐亦未練軍政職事不舉其都監監押未可減省宜擇亷幹厯事之人令共職仍選良守臣伺察而裁處之其年少官卑度其稍堪差使者為畿縣都監監押雖年少亦須三十嵗已上者亦擇良令長以董正之並限二年一替亦用文武臣寮賞罰之法以勸沮之内有勤儉好學接寮屬有曉習文法能治民事者量髙下等第或降詔奬諭或賜金帛或遷官秩有諸過者亦量大小等第或罰俸或贖金或降官甚者召還黜於宫宅俾之省過一二年復遣補外凡三省過而遂不改者終身使奉朝請如此教育之選試之善者必賞不善必罰臣知不數年當有賢宗室如前漢河間後漢東平二王者不為難矣内可以藩屏王室外可以威示四夷此有國家者之急務臣觀二代已後興王者今日得天下明日封建宗室至于襁褓之子亦皆為侯為王分割土地自成邦國所以分布枝葉庇廕根本張大王室壯觀天下使英豪無間辭無異意謂四海之内盡是一姓雖有凶謀變計不敢妄動此前代帝王制御天下長乆之策也布在簡牘驗之可信今則埋没抑壓僅同豢養縱其非僻殊不教訓雖有説書之官又實虚設是盡欲愚之而不令知善道為善人甚非帝王飬宗室之義也至於臣庻之家有子孫弟姪者無不孜孜誨誘使之成器盖持門户主祭祀若子孫不肖則家道淪没又有擔負之夫微乎微者日求升合之粟以活妻兒尚毎日那一二錢命厥子入市學謂之學課亦欲厥子讀書識字有所進益而嗣其家國家富有天下基業全盛實祖宗艱難而致所宜子子孫孫相承不絶為萬世之計豈可宗室滿宫而陛下都不教導任為過惡俾外裔輕笑是陛下自去枝葉而取孤根易摇之患臣竊憂之臣又伏思陛下任李用和為殿前副指揮使任曹琮為馬軍副都指揮使是任親也用和與琮誠親矣然皆異姓異姓者尚可信之則宗室同姓與陛下是骨肉之親反不可信之哉陛下不過謂宗室無人臣謂今則誠未見其人教之試之當自有人矣今唯朝㑹時羣行旅進青盖滿道士大夫見者方知有宗室但出得都城四門之外已不知宗室之有無況天下乎況四夷乎上古直至周世宗其間所厯何啻萬代而宗室不教不試不用微弱之人未有如本朝之甚之極者也宜乎為識者之所憂而北敵之所輕也且如北敵有南大王蕭孝穆北大王蕭孝惠魯王特哩衮楚王伊勒希巴是其近親者甚衆臣前嵗奉使盡與之接又詢其國人未必實皆才武而中原聞之莫不疑其人人皆良將也其故何哉盖聞其名而疑其有實爾今朝廷若能崇植宗室使聲名漸著聞於北敵亦謂南朝宗室有人根本牢矣藩屏固矣欲謀則息欲動則止古者有以實效濟務者亦有虚聲懾敵者兵尤重先聲而後實況臣之所説必能聲實相副願陛下行之無疑一景徳以前縁邊土兵無事時戍本州軍宼至則盡為逐路部管司抽起沿邊缺人却以南兵屯守甚無謂也夫土兵居邊知其山川道路熟其彼中人情復諳敵兵次第亦藉其營䕶骨肉之心且又服習州將命令所以禦必堅戰必勝也若遷入内地則山川道路不知人情不熟敵兵不諳骨肉不在州將命令不習又為南兵怯弱所累則禦不必堅戰不必勝也北敵唯懼土兵毎聞以南兵替入内地敵人大喜故來則勝而回前年河朔有警定帥復尋景徳故事盡抽邊兵守定州河湟之民大恐以謂官軍必敗幸而敵騎中止不見失律不然䘮師必矣臣願自此若敵入宼沿邊土兵只在本處不復令部管司抽移若逐處土兵尚少即以南兵益之如其有餘方許部管司抽起況部管司自有近裏州軍土兵可以聚而為大陣矣臣上篇議十九城分領兵三十萬出戰餘十七城係近裏州軍只用鄉兵守之更不出戰其逐路部管可於十七城聚大陣兵矣邊兵勇悍不畏堅敵敵騎初入使當堂堂之鋒或得便可戰必能取勝則近裏州軍人心自壯則雖是南兵之怯亦自增氣茍以南兵在邊遇宼一敗敵騎乗勝而南則表裏震恐雖精鋭盡在部管司亦已沮䘮安能保其全勝哉一景徳以前匈奴寇邊必由飛狐易州界道東西口過陽山子度滿城入自廣信之西後又多出兵廣信安肅之間大抵敵騎率由西山之下入宼大掠州軍然後東出雄霸之間景徳前二州之間塘水不相接因名東塘西塘二塘之交蕩然可以為敵騎歸路遂置保定軍介於二州以當敵衝厥後開導不已二塘相連雖不甚浩渺而敵路亦少梗矣然或窮冬氷堅或旱嵗水竭亦可以濟未為必安之地雖然但少以兵控扼之則敵騎無以過矣自餘東從泥茹海口西至保州一帶數百里皆塘水瀰漫若用以為險可以作限只自保州以西至山下數十里亡塘水之阻敵騎可以平入敵若守盟不動則我無先發但用臣上篇屯兵之法足以固守萬一渝盟入宼用臣之策可以轉禍為福逞志泄憤矣何以陳之今敵若寇邊必由廣信西來敵騎初入境沿邊州軍堅壁亦不得出兵敵必不顧而進將入鎮定亦堅壁敵必易我而懈於是令廣信安肅保州三城開壁㑹兵張虚而不與戰敵必分兵來禦已而令鎮定互開壁復不與戰彼既前後受敵必未敢長驅而南於是我急從滄州取海上路以數十艘出輕兵三千趨于州入宼家口咫尺燕薊滄州至北界平地水路約五百里不數日豋岸地肥水草美不必重齎計其日然後自雄霸之間即景徳年敵騎東歸之路也又出精兵直抵燕京㑹滄州兵𢷬其腹心破其聚積彼見兩下兵入則莫之為計矣燕地既亂入宼者必有歸心又為王師所牽而不能遂去於是乗其向背之際使沿邊三城及鎮定兵合擊必大破之追奔及燕盡逐敵兵過山後敵兵入界則整若敗而出塞則紛然散走無復行陣易為驅除矣則敵騎無復南者因其妄動可以一舉而復全燕之地㧞數郡陷兵之俗平累朝切骨之恨臣自謂必無遺策矣既以兵守四關口外唯西山後有新開父牛鐡脚猪窠三口敵人以通山後八州之路然皆峻狹不容車馬敵人鑿山為徑只通人行險峻非兵行之道雖不加防守亦無所害或於口側少伏兵馬縱敵入宼發伏可以盡殺之假如陛下謹重未欲盡舉復燕之策即請寇入之後頓重兵於西山下敵騎有所掠而東出亡路進退不遂我於是以十九城之兵分布掩擊必使退敗保無深入之患敵勢既屈與物則削與和則乆亦制匈奴之下策也一燕地割屬契丹雖逾百年而俗皆華人不慣為匈奴所制終有向化之心常恨中國不能與我為主往往感憤形於慟哭臣前年奉使邊廷邊上往復數次邊人皆勸臣無重契丹以困民萬一入宼我沿邊土人甚有豪傑毎一豪傑可自率子弟數百人為官軍前驅願朝廷復取燕薊吾等却為華人死亦幸矣臣竊壯之慰謝而退朝廷之力未及外禦遂虚邊豪之請雖臣未嘗忘懐思為異日之外用自後不輟尋訪所得邊豪頗多將來敵若宼境臣必能以所得邊豪令自率鄉户各成一隊或為嚮導或為内應或破陣或攻城大可以為王師之助矣其始去則質其家其成功則厚其賞臣不患其譎而反為害也一古者有外虞則以敵國攻敵國中國之利也朝廷西有羌人之患力足備禦不假求外援以自助唯是北敵強盛十倍羌人異日渝盟悉衆南下王師力若不給則禍未可涯宜求所以牽制之術使有後顧而不敢動則有所憚而不能盡鋭以來我力足以禦之此不可不慮也今契丹盡服諸畨如元昊回鶻髙麗女真渤海惹鐡勒黒鞨室韋逹靼步奚等弱者盡有其地強者止納其貢賦獨有髙麗不伏自謂夷齊之後三韓舊邦讀書禮義之風不減於中國契丹用力制之髙麗亦不戰後不得已而臣之契丹知其非本意頗常勞於制御髙麗亦終有歸順朝廷之心臣伏見淳化年中其國王王治遭契丹兵入境遣使元郁來朝納欵太宗不從但婉順回答又於咸平年中其國王王誦遣户部郎中李定古來使真宗不納但降優詔而已又於祥符七年其國王王詢遣工部侍郎尹古貢表來使表稱今斷絶契丹乞歸附大國仍乞降正朔并皇帝尊號真宗又不許陛下即位後天聖二年復曽遣使來朝朝廷差栁植管接其事甚近可以按證前後髙麗四次遣使修貢毎來必言不願附契丹而願歸朝廷終不允納雖然髙麗欵附之切如渇者望飲飢者望食無一日而忘也但畧遣人翹發則其來必矣來則善遇之許其嵗朝京師賜與差厚於前以回其心優為詔命之辭以悦其意它時契丹復欲犯順以逞志我遣人使髙麗激之且約曰契丹往年無故侵髙麗三韓之地今又累興師深入誅求無厭髙麗甚苦之我先帝重惜民命不欲數與之闘故嵗遺厚幣於茲四十年矣今契丹又欲背施肆毒犯我邊境我軍民並怒皆願死戰我不敢違衆師行有日髙麗又舉兵相應表裏夾攻契丹敗則三韓之地及所得人民府庫盡歸髙麗我秋毫不敢有但止復所割故地爾髙麗素怨契丹侵其地又怨毎嵗斂取過重向者恨無大國之助以絶之聞今之説必然從命然則契丹不足破也或者疑其納髙麗則契丹可以為舋端不便臣答曰前嵗之隙豈為納髙麗興辭邪北敵之性變詐多端茍欲背盟何説不可豈宜動自拘礙不敢有為直俟禍來坐受其弊愚者尚不肻如此況謀謨天下之事乎髙麗果入貢假契丹來問我當答以中原自古受方國之朝獻矧髙麗素禀朝廷正朔但中原有阻今却復舊好使我何辭阻絶之與契丹納諸國之欵一也契丹安能使我必不納髙麗之貢哉臣又思之若契丹寡弱不足為虞或能謹守盟誓無陵侵中國之志則何用遠納髙麗之欵而忽契丹之約今契丹盡吞諸蕃事力雄盛獨與中原為敵國而漸有憑陵之心況前嵗己生舋隙自知不直謂朝廷偽増金帛後圖釋憾不乆又將先有以制我焉發而謀之則不及矣經營措置今及其時臣又嘗聞契丹議曰我元昊與髙麗約連衡攻中原元昊取關西髙麗取登萊沂宻諸州又曰髙麗隔海恐不能乆據此數城但縱兵大掠京束官私財而去我則取河北三十六州軍以河為界臣聞此乆矣萬一果如斯説臣恐朝廷必無以制之外宼如此窺圖中國中國但因循日過一日臣不知終乆如何夫髙麗累年貢奉朝廷朝廷終不許遂決志事契丹所以為契丹用也契丹所使無令不從今朝廷能許髙麗進貢正遂其乆志則必反為我之用矣契丹何能使之邪臣熟知髙麗雖事契丹而契丹實憚之天聖三年契丹嘗伐髙麗是年朝廷遣李維奉使髙麗敗契丹兵三十萬疋馬隻輪無回者自是契丹常畏之而不敢加兵朝廷若得髙麗不必候契丹動而求助臣料契丹必疑髙麗為後患卒未敢盡衆而南只此已為中國之大利也臣願陛下行之無疑一鎮定西山有谷口十餘道盡通北界山後之路景徳已前不甚迹熟盖溪澗峻狹林木擁遏故敵罕由茲路而入雖有來者亦必艱阻臣頃聞河朔人説契丹自山後斬伐林木開鑿道路直抵西山漢界而止今則來往通快可以行師臣亦細詰其由云契丹舊亦疑朝廷有復燕之志恐天兵渡界河直北趨燕京則敵人欲出我不意由山後進兵旁擊鎮定横行河朔牽制王師以觧収燕之患也臣必料往年縁邊已曽探報聞于朝廷今或契丹自廣信安肅入竊我必以重師禦其鋒若有西山别衆出于鎮定横行背擊官軍敗績則大事去矣兵家切務不可不知當得能幹而謹宻者隂往經制如何屯戍如何捍禦必有可以勝之術先事而定以待其來則保邊之道也一祁深二城舊非要郡宿兵至少故城壘廹而陋不甚修葺竊聞契丹今復入寇知吾重兵屯鎮定不肻南靣直走纔過保州便取東南路由祁深以來祁深二壘當廣而髙之以防攻逼誓書言不得創制城池若因而廣之則無疑又曰敵既憚鎮定而忽祁深必謂二城兵寡不戒而過我若乗其不備使二城潛出精兵首尾應而擊之必大得志此係於臨時非可預度然亦當知之俟其變則易為謀矣一漢唐以前匃奴入宼率由上郡鴈門定襄等路盖當時中國據全燕之地有險可守匈奴不敢由此路而來也自石晉割燕薊入契丹無險可守由是敵騎直出燕不復尋定襄等故道今朝廷若留意河朔邊鄙有俻敵不可得而入須求别路以來路或雖可入宼苐取定襄等路為犄角之勢則河東不得不大為防或創立城池或造作險阻何地可以設竒伏何路可以出牽制此須預為經度素有隄俻則臨時足以禦捍應卒不至倉皇使與河朔表裏相應宼不能逞其欲實邊防之急務也右守禦二策緫一十三條是臣庚辰壬午二嵗奉使契丹日於河朔往回十餘次詢諸縁邊土兵并内地故老博采参較得之甚詳及到敵廷議事又頗見其情狀以至稽於載籍質於時務用是裒聚撰述以副陛下委責之意即非臣任胸臆罔聖聽惟陛下令兩府㑹議可者速行之其未可者交相致詰而是正之臣必不敢持己狥私旁拒衆證兩府亦不得畏事飬病而無所發明如此則庻㡬謀行而患可弭矣臣聞古者人君遭患難則退修道徳可以無咎是故文王出羑里純任教化而終滅獨夫勾踐脱㑹稽厲精武事而卒破夫差又聞主憂則臣辱主辱則臣死是故陳主答書悖慢而楊素下殿請死蔡賊䟦扈難制而裴度誓不兩全終之隋滅江南裴度平淮西有以見古之君臣所為各得其道無不建功立業聲流後世者也昨契丹背約呼索無厭朝廷以中國之尊敵人敢爾陛下固未聞有文王勾踐復讎雪耻之心臣亦未見有楊素裴度死難平賊之志如此而望排患觧紛建功立業如古之君臣何可得也臣計北敵勢方強盛可以為宼而輙肻議和者有謀也謀而後舉以為萬全之䇿也又計中國之勢如人坐積薪之上而火已然雖熖未及其身可謂危矣北敵之強既如彼中國之危又如此而尚不急求所救之術是欲秦之魚爛梁之自亡耶臣備位樞府夙夜憂畏恨未得死所少紓國難願觧臣宻職與河朔一要郡得以效拙經營邊事雖未敢必謂無虞然料或可稍寛陛下北顧之憂矣伏惟早賜裁幸弼又論契丹不宼河東上疏曰臣昨日垂拱奏事准宣諭今來契丹雲州受禮恐於河東作過令兩府設備實由臣誤荷奬擢無所施設致此外宼上煩聖憂聞命震驚不遑啓處然退自思念僅得粗畧切謂契丹必不宼河東其事有九無名一也動稱王師不肻竊發二也河北平坦可以長驅必不由河東險阻而來易入而難出三也河北富實河南虚乏必不肻擊虚乏而令我備富實地四也河北無備河東有備黠敵萌南下之心乆矣臨事必不肻捨無備而宼有俻五也若欲乗我不測而入當行詭道出於倉卒必不肻先報雲州受禮六也契丹始與元昊相約以困中國前年契丹背約與中國復和元昊怒契丹坐受中國所益之幣因此有隙屢有怨辭契丹恐其侵軼於是壓元昊境築威塞州以俻之而保族累殺威塞役兵契丹又疑元昊使來遂舉兵西伐驗之非詐今必無㑹合入宼之理七也契丹惜燕地如人惜心腹若宼河東豈不防我攻燕為牽制之術于今不聞俻燕八也契丹自得燕薊不復由河東入宼九也臣驗此九事故知契丹不宼河東必矣臣今但論目下不為河東之患過此以往則非臣所知臣謂契丹異日之祻必在河朔河東只可為牽制之地所以臣近奏河北守禦之策因乞守一要郡自行其事下二府議之未合只且令田況往彼按臣所説此乃平時悠悠所為非今來確乎至急之意也河朔二三年來雖名為設備其實未堪禦宼乃是張豫備之虚聲適足重敵人之姦計為患愈大不可不思臣前嵗奉使契丹理當無所増賂盖為朝廷方盡力西郡未遑北事於是忍羞自屈嵗益所入聊以欵兵緩祻而望雪耻於後也臣今欲乞必願俞允不住多兵備敵以安元元至於身羞國耻庻㡬可刷臣不勝大幸弼又論元昊所上誓書上疏曰臣近見元昊所上誓書及表奏辭禮恭順一遵朝廷所約只是疆埸上微有商量候楊守素等到闕乞與婉順商議示以必和之意使之深信不可為其恭順却於元約事外别有詰難邀勒所宜多方容納令無俻我心則必盡力與契丹相持若二宼自相殺伐兩有所損此朝廷之福天之所假也茍議絶和約或大段拖延不成則元昊必復與契丹合而為患如故此必然之理也臣料契丹必未肻與朝廷絶好余靖此去保無他虞將來若遣謝使所齎謝物不可過數茍多無益更乞深加詳擇五年弼為河北宣撫使論河北七事上疏曰臣伏以河北一路盖天下之根本也古者未失燕薊之地有松亭關古北口居庸關為中原險要以隔關匈奴不敢南下而歴代帝王尚皆極意防守未嘗輕視自晉祖失全燕之地北方關險盡屬契丹契丹之來蕩然無阻況又河朔士卒精悍與它道不類得其心可以為用失其心則大可以為患安得不留意於此而反輕視哉臣昨奉詔宣撫自度河而北徧詢土人熟知祖宗以來邊防事機者觀其所説皆有條理太祖太宗之時契丹入宼邊兵或有䘮敗而不能長驅真宗初邊兵亦少失而有長驅之患者何哉盖太祖太宗時屢曽出師深入攻討及寇至又督諸將發兵禦戰敵騎雖勝知我相繼開壁援兵四至無退藏之懼是以怱怱出塞不敢長驅也洎真宗即位懲䘮師之衂遂下詔邊臣宼至但令堅壁清野不許出兵縱不得已出兵只許依城布陣又臨陣不許相殺賊知我不敢出戰於是堅壁之下不顧而進一犯大名一犯澶淵是故雖無䘮師之失而有長驅之患真宗再駕河朔幸而講和不然事未可知也臣嘗為史官竊覽國史以土人之説參驗之大畧相合既得祖宗朝守禦利害又伏思今來事體不及祖宗朝其事有七朝廷號令不一前後自相牴牾事有緩急四方不能遵行北敵茍動必有闕誤此號令不及先朝嚴明一也自西鄙用兵今七年大小凡經十餘戰毎戰必敗官軍沮䘮望風畏怯此威令不及先朝震赫二也北敵之衆又非西賊可比茍有變動何由以威武取勝兩府大臣不敢主事設有所主斷然而行則横議羣興惑亂聖聽以此往往破壊暫行復止是故朝政不舉北敵茍動事繫安危誰敢為朝廷主行之四方多事此執政事者不及先朝大臣主斷三也天下之人恩信不及配率重大攘肌及骨悲愁怨恨莫不思亂近年凡有盜賊應者如雲足見人心多叛北敵茍動大兵四集百姓必有觀舋而起者自憂内患不暇豈暇防外虞哉此民心不及先朝固結四也朝廷費用浩瀚財物殫竭取於民則民人已困取於帑則内帑有限今河北諸州軍唯粮儲稍有準備外其餘藏庫無不空虚北敵一動所費無涯今未有財用所出之計此財用不及先朝豐足五也外有強敵竊窺中國或攻或守須得健將今河朔止有一二人可充偏裨五七人可於陣中役使北敵茍動大兵畢集都未有將帥統領此將帥不及先朝有謀勇而輕戰陣六也軍政隳弛士卒驕惰居常少有鈐束不過笞箠已謀殺害都將結扇逃背若急有調發使當矢石則豈無變亂與外宼合勢為孽昨保塞事起滄州兵欲刼瀛州莫州兵欲刼順安軍自餘至城下者無不白日刼人殊無畏憚其事甚近可以為驗此士卒不及先朝肅整七也上件七事盡臣目覩耳聞不敢緘黙恐係邊防大計伏望陛下特留聖念以先朝已試之效而革因循之弊奮自宸斷以為乆長之策不勝大幸仁宗時蔡襄知諫院論拒二敵皆為邊患上奏曰或曰今拒二敵皆為邊患何以處之臣謂校輕重之勢執理道之直者行之然沿邊亦須俻若契丹一舉我軍未能決勝則人心摇動中國之勢十去五六況元昊之和未決契丹以兵脅之二敵通謀元昊當陜西契丹當河北合兵而出河東則中國所俻者衆而兵勢分此天下至危之勢也襄又奏曰或曰前所陳沿邊地形之勢勝在我其利出攻乎曰出攻未見其利也何則我雖有地形之勝而西虜之地亦多險隘是皆有地利但為客者敗多而為主者勝多耳今若興兵出攻且西虜地無水草又飛芻輓粟﨑嶇山谷虜必深遁逺去我若進攻虜必遣兵依險設伏絶我粮道進則不得攻止則粮不給退則必有掩襲之兵此出攻其利少也或曰既不可出攻又不可通和但増兵守邊繁費轉多虜何時可破乎曰若邊郡帥臣能設計謀誘之使其來侵而敗之然後元昊可得而制也此最為上策襄又乞大為邊備之要上奏曰或曰契丹事宜如此朝廷應副添兵擇將可以禦之臣謂不然不去其弊不求其要兵多益分危事也臣所謂求其要者一曰變軍法二曰委兵柄於必戰之人三曰擇偏裨於行陣四曰去無用之兵五曰分守兵與應兵為首尾救援之勢六曰擇要害郡縣之官六者既修然後可言邊備若因循舊弊未見可勝之期此方今至急之務也襄又乞拒契丹之請上奏曰契丹今以兵助中國討元昊偽為善意朝廷若不從其請契丹必以為詞又駐兵雲州正當鴈門之路或便盟好即為邊患河東河北必為大俻或曰契丹今在雲中只是帳下兵馬不曽㸃集他部必非大舉臣謂元衡歸既得此事端傳檄而起不踰月而大合豈得不為患哉患在目前若拒契丹則當速為偹襄又請納元昊使人上奏曰右臣等伏見北敵請絶西人使纔去而西人納欵之信已來從北敵則畏西人納西人則畏北敵不審廟堂之上何以為謀自元昊宼邊以來國家有累敗之羞而無一戰之勝復忍耻屈體以金帛買和又不能自為而假手黠敵當敵人對梁適遣耶律音使元昊之時中國今日之患已萌矣而中道有可悔之理而大臣執不悟之迷事至於今勢何可已使北敵晏然不動俟和而邀功故已為吾大患二敵詐謀一來納欵一請絶和而使中國絶和莫知所從亦是為患二敵實有舋而相攻使中國納西則違北心顧北則失西好亦足為患然等為受患宜擇其輕何謂擇輕速納西人是也今料二敵者不過直疑其實有隙與實無隙耳且俟我和西而責報是敵本志今和垂就而反請我絶之其意何在豈非彼衒其強自是能指麾中國謂和必由我不和亦由我欲使元昊必信中國和與不和皆由之故託有隙之名而遣絶和之使茍中國遂從其請則元昊不得不信中國動止由於彼也是北敵一與西賊為有隙之名使元昊遂信中國不得自由此則北敵之舉南則指麾中國西則能信服羌人他日却為元昊服罪之名又使中國通好則度吾今已從其請則後日必不能違茍至於斯中國不能為國矣以此言之二敵雖無隙而詐來請絶不可從之必矣若實有隙則納西人粗為中國之利西人新與北結舋而與我和得無南顧之憂而東併力以拒之必不肻輕絶吾盟北敵萬欲西戰元昊吾雖不從其絶和亦不有力分兵而寇中國以此而言雖實有隙尤宜早納西人也伏以二敵交構中國憂危盖由從前所議參差兩端不決切恐西人已到議者尤更遲疑伏望聖慈決於睿斷襄又乞通和之後早計費用上奏曰自趙元昊狂悖以來朝廷日日發關東兵馬以為邊郡守備然沿邊州軍自來只約見在人馬芻粟為一二嵗計今者増兵與馬比舊必多數倍至於饋運芻粟轉輦兵甲修葺城塞燕犒給賜之費日以益廣若終一嵗而計之其費用之物大率必倍多於毎嵗既邊兵未有罷期則其費愈多臣恐年嵗之後必有議者建白請賜元昊金帛與之通和者臣謂此謀非國家長乆之計也若元昊削去尊號臣禮如舊朝廷但赦其罪亦不當大與金帛與之金帛是為狂悖而得之況元昊豈肻削去稱號何名而賜之金帛與之通和哉國家遺北敵其費不少若更與西虜通和使北敵窺中國之強弱而啓其狡心不細事也臣謂朝廷將來罷通和之議莫若早計度減損費用之物茍費用不減於舊日則何以持乆而制狂虜也宋庠在崇政殿與樞宻院同答手詔曰臣等今月十七日伏䝉聖慈召赴崇政殿靣賜手詔各一封仍令中書樞宻院一處商量對答聞奏者伏讀聖訓震駭愚衷退獲詳研稍分條目乃知皇帝陛下防危於慮表求策於事先欝悼諄勤徧咨良策此誠聖人勞謙思治博索廣詢不以睿哲掩尋常之謀不以髙深辭淺近之益雖舜好問禹拜言無以過此奚獨臣等幸甚抑亦天下幸甚然臣等與聞㡬事皆忝近司自去嵗春陛下有秘殿疇咨之勞迎陽敷納之廣是時中書樞宻院亦合條對急政尋曽靣諭以謂兩府者佐天子決大攻揔四海謀議評百官能否或片言可以防患或寸效可以佐時凡有見聞便當裁處不須承命然後告猷而宸旨丁寧辭不獲免靦顔待罪粗述大綱雖荷天地包荒之仁終慙股肱同體之美今者再煩清問是重前尤既不敢固拒詔音仍且許協陳公論銜恩被貸無可寘言敢不悉心同上愚對謹案聖詔大畧以今契丹因有西征之役遣使來告深慮狡黠别有邀求詭譎多途將何回答臣等竊謂敵人之性雖不可以仁義禮法為期待文書言辭為約束見利則動縁間則争狡詐猶疑固其常態至於向背之勞逸利害之輕重雖曰匪人亦將有擇契丹自景徳通好垂五十年冠盖相望於嵗時金繒沓委於幽朔戎馬不汗而坐収厚利邊烽不焰而自稱鄰國彼若常保此誓可謂逸而不勞常獲所資可謂利而無害今或自違信順固作端倪必欲渝盟以圖入寇是則部落䝉調發之苦酋豪須嘗餌之科穿塞必有矢石勝負之憂掠野不過牛羊廪窖之獲我若堅壁以持重蓄力以待疲去則不追來則固守但恐彼之所獲不復有五十萬之數矣捨交聘就戰闘則背逸而向勞絶嵗輸謀掠奪則利輕而害重果從此舉是謂無謀況今特聘之來未失睦鄰之意且西北搆舋邊境具知既議出師固當通問昔嵗髙麗之役近年河西之行皆遣使人實為成例未聞前來兩次别有他求兼契丹常作大言欲平西夏今若乞財助費便為示弱於人遥揣敵情恐無此理萬一狂狡實有過言則對答之間誓書可復彼曲我直何懼無辭然必望朝廷且鎮之以静淺謀横議抑而未行聖意又慮詐報西行隂為南顧山川地形甚處可為控扼臣等竊以自來河北河東兩路各有控制走集之地救應邊陲之所只縁保守信誓不敢明作改張必縁此使人便違舊約則可勅此兩路馳案邊屯或展塘水以扼兵衝或築軍城以遮賊道壍山堙谷何所不為樹師分兵唯變所適事至而應亦匪後時聖意又念方靣輔翊之材帥領偏裨之舉或難於自薦或須藉衆推威禦綏寧堪為鎮静者臣等以謂將帥之器非獨今世所難得威禦之略顧亦前代所希逢然自古聖帝明王選才擢士未有借才於既往待俊於將來必以一世之人治一世之事不可謂將無韓白而廢軍帥吏非龔黄而去守宰顧其策勵奬育任使之術何如耳茍得其道胡恤乏才若能賞不過功罰必當罪上無姑息之施下無僥倖之求則雖懦夫可使握節以制軍女子可使攘袂以赴敵又況擇材武之長用訓練之師哉大法一行則賢者不得藏其謀何煩於自薦智者有以申其用何待於衆推而綏寧鎮禦之方唯所使矣聖意又念河朔軫救之外軍儲闕乏及向去財用如何省節加以冗兵尚衆戰馬未孳發于焦勞並令周悉臣等伏以冀部不幸決溢為災中路州軍例遭湮没此則非縁它故專為河防民户既已流亡田𤱔未能耕蓺且可恣其所往以就廣饒所在撫綏庻㡬存活議者多欲使州縣出粟以救其命虚倉餔餒誠是深仁連營乏儲更非小事欲乞嚴勅三司及安撫轉運等使凡係本路浮費且令一切罷之專以調食為先次以安民為急若向去秋夏西路豐豋必有餘波可蘇疲衆至如冗兵一事最是減費大端日近雖累降指揮並令揀退天下剰貟萬數亦已别行催督其餘條貫敢不申明此則向去財用省節之矣若廼戰馬豋耗事存監牧然自昔生馬之地今皆不屬中州唯藉四夷與官互市切聞邊關黠詐未嘗肻出名駒徒費財珍例多駑劣其源若此為弊實深自餘坊監官司華戎貿易更乞下羣牧制置使多為條約以量價直重明賞罰以督蕃孳常或舉修亦恐可豋舊數然臣等今來所陳數事即是日夕奉行行而復言理不踰此竊恐衆臣議論别有所長欲望聖慈盡取將相學士以下對詔之文降付中書樞宻院商量行遣匪徒逃尸素之責固亦合中外之謀天下至公於此為美惟陛下留神財幸庠又答手詔曰伏奉手詔以賊昊未平邊防用武上煩聖慮諮及具臣竊以賊昊旅拒偷生巢穴深固若或興師出境必須命將得人又縁承平以來乆無征伐縱有驍勇之士皆非緜歴之流況復饋運之間勞費斯甚陜西民力配率已繁更或隨軍愈難應副且當静守頗謂得宜今來邊臣例循舊轍靡營禦寇之策但急濟師之言須立定規俾從經乆縁邊州郡皆有熟户蕃兵不能訓齊但務姑息雖有弓箭手人數甚衆其如部伍未明至於本城蕃落定功之類亦未嚴整凡所防托悉藉正軍是致調發之煩不無科率之困復又多立小寨倒蕃粮儲無事則兵勢虚分臨敵則不能自固奔衝掩襲職此之由所宜委自轉運使與逐州長吏量其户口籍定土兵毎至農閒輪畨教閲仍選勇敢有部轄之人充等第將校其熟户蕃兵亦須㸃集齊整撿括人數與本城及弓箭手毎臨陣敵前後節次使用所有賊兵出入道路合行把截去處並可展置大寨令弓箭手與本城兵士守把其諸小寨不可廢去者量留側近土兵看守探候不得廣積粮草所有朝廷差去禁軍只委自部置鈐轄路分臣僚相度賊勢逺近策應如此則固守有常東兵可減盖資其土人服習道路彼中若有㸃集易為探候自免奔衝而又兵籍素定經費有涯轉餉之勞漸可撙節自來毎招役蕃户耗蠧頗多主帥但納其虚言臨陣恐成於悮事今後不須枉用金帛更有招収其逐州長吏能訓練兵師修完戰偹膽勇材幹為人所稱朝廷當與保全不責小過嵗滿成績増秩再留使之恩信及人用明奬激臣等素不知兵叨居近列欽承睿問莫副天心無任戰懼之至庠又答内降手詔曰伏奉二月二十七日手詔以逆賊元昊阻命西鄙令臣等細畫方畧並具實封進入者仰讀天旨伏用震汗臣等愚駑無狀待罪宰府聖恩含養弗暴所疵夙宵惟念未獲云補乃今羌戎小種違背恩盟輕為風塵穿盜邊塞而將吏未習烽儌弗明蕞然逆醜遂積天罰此皆臣等謀猷䟽暗奉職不稱之咎也陛下幸開大惠不忍加誅丁寧垂喻俾悉其意此誠謀及卿士詢于芻蕘之成訓然臣等旅服三事義殊百辟以謂中書門下政令之所出也朝夕之所詢也事無鉅細謀無逺邇皆可罄率庸淺日陳于前隨宜制務靡容有隠不當更竚清問始復條列至於守禦方畧之要則與樞宻院立可議定饋運便宜之常即下三司轉運司坐見虚實凡所關啓略皆施行此陛下之明悉也雖使各述爾志亦不出于兹矣惟詔旨内深入討擊一事臣等自來未敢輕議非謂沮損威重直以勢有輕重時須進退請試言之夫中國之人習見承平乆矣將不六十不更金鼓戰陣之事卒不五十不經疆埸馳闘之役齊民編户租賦之外不知差調率歛之勞猝然有警孰不騷動自劉平石兀孫陷没之後邊防震擾吏氣沮傷奏報相銜妄増敵數或言四十萬或稱三十萬故敵未攻壘先上城門賊已出界尚求兵援將帥庸懦亦縁人情未嘗諳歴故也今若更責未習之將驅嘗敗之兵討己黠之虜而希百勝之術無功必矣故臣等近者但乞本路修峻城堞以遏奔衝籍閲強壯以擬緩急速遣韓琦等馳至邊郡采訪利病補理頽敝且為今秋守禦之䇿仍令紓放倚閣緩責轉輸綏撫西人務令安堵且亦申戒邊將以時訓練使賊去勿追此上數事雖皆老生常談然當今守邊之策未有易此者也臣等又料狡敵狃忲必須再謀宼抄欲乞諭縁邊守戍因賊入境之際或羸師以誘之或伏險以邀之或竒兵夜斫其營或堅壁晝挫其鋭務據便地勿與馳逐俟其疲老則犄角以斃之如此一經創艾則可以漸謀羈服矣臣等熟計莫便於此至若臨機處可應變弛張一二之言非可豫述事至中覆未為後時然敢不策發憃冥以須期㑹思有以伐謀決勝少報萬分然後退就田里誠無所恨謹昧死上愚對惟陛下幸察歴代名臣奏議巻三百二十七
