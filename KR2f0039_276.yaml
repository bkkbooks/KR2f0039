body:
  text: 歷代名臣奏議卷二百七十六明楊士竒等撰國史東漢獻帝時祕書監侍中荀悅上奏曰古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必書善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隱而名章得失一朝而榮辱千載善人勸焉淫人懼焉宜于今者偹置史官掌其典文紀其行事每於嵗盡舉之尚書以助賞罰以行法教帝善之魏明帝景初中帝問祕書監王肅曰司馬遷以受刑之故內懷隱切著史記非貶孝武令人切齒肅對曰司馬遷記事不虛美不隱惡劉向揚雄服其善叙事有良史之才謂之實録漢武帝聞其述史記取孝景及己本紀覽之於是大怒削而投之於今此兩紀有録無書後遭李陵事遂下遷蠶室此為隱切在孝武而不在於史遷也吳烏程侯時韋曜為侍中領左國史烏程侯欲為父和作紀曜執以和不登帝位宜名為傳如是者非一後以曜不承用詔命遂收付獄右國史華核上疏救之曰曜運值千載特䝉哀識以其儒學得與史官貂蟬內侍承合天問聖朝仁篤慎終追逺迎神之際垂涕敕曜曜愚惑不達不能敷宣陛下大舜之美而拘繫史官使聖趣不叙至行不彰實曜愚蔽當死之罪然臣慺慺見曜自少勤學雖老不倦探綜墳典溫故知新及意所經識古今行事外史之中少過曜者昔李陵為漢將軍敗不還而降胸奴司馬遷不加疾惡為陵逰說漢武帝以遷有良史之才欲使畢成所撰忍不加誅書卒成立垂之無窮今曜在吳亦漢之史遷也伏見前後符瑞彰著神指天應繼出纍見一統之期庶不復久事平之後當觀時設制三王不相因禮五帝不相㳂樂質文殊塗損益異體宜得曜輩依準古義有所改立漢氏承秦則有叔孫通定一代之儀曜之才學亦漢通之次也又吳書雖已有頭角叙贊未述昔班固作漢書文辭典雅後劉珍劉毅等作漢記逺不及固叙傳尤劣今吳書當垂千載編次諸史後之才士論次善惡非得良才如曜者實不可使闕不朽之書如臣頑蔽誠非其人曜年已七十餘數無幾乞赦其一等之罪為終身徒使成書業永足傳示垂之百世書上不許薛瑩以罪徙廣州核又上疏曰臣聞五帝三王皆立史官叙録功美垂之無窮漢時司馬遷班固咸命世大才所撰精妙與六經俱傳大吳受命建國南土大皇帝末年命太史令丁孚郎中項峻始撰吳書孚峻俱非史才其所撰作不足紀録至少帝時更差韋曜周昭薛瑩梁廣及臣五人訪求往事所共撰立備有本末昭廣先亡曜負恩蹈罪瑩出為將復以過徙其書遂委滯迄今未撰奏臣愚淺才劣適可為瑩等記注而已若使撰合必襲孚峻之跡懼墜大皇帝之元功損當世之盛美瑩涉學既博文章尤妙同寮之中瑩為冠首今者見吏雖多經學記述之才如瑩者少是以慺慺為國惜之實欲使卒垂成之功編於前史之末奏上之後退填溝壑無所復恨於是召瑩還為左國史東晉元帝中興草創未置史官中書監王導上疏曰夫帝王之迹莫不畢書著為令典垂之無窮宣皇帝廓定四海武皇帝受禪于魏至德大勳等蹤上聖而紀傳不存于王府德音未被乎管絃陛下聖明當中興之盛宜建立國史撰集帝紀上敷祖宗之烈下紀佐命之勳務以實録為後代之準厭率土之望恱人神之心斯誠雍熙之至美王者之𢎞基也宜備史官敕佐著作郎干寶漸就撰集帝納焉後魏孝文帝時祕書令髙祐與丞李彪等上奏曰臣等聞典謨興話言所以光著載籍作成事所以昭揚然則尚書者記言之體春秋者録事之辭尋覽前志斯皆言動之實録也夏殷以前其文弗具自周以降典章備舉史官之體文質不同立書之㫖隨時有異至若左氏屬詞比事兩致並書可謂存史意而非全史體逮司馬遷班固皆博識大才論叙今古曲有條章雖周達未兼斯實前史之可言者也至於後漢魏晋咸以放焉惟聖朝創制上古開基長發自始均以後至於成帝其間世數久逺是以史弗能傳臣等踈陋忝當史職披覽國記竊有志焉愚謂自王業始基庶事草創皇始以降光宅中土宜依遷固大體令事類相從紀傳區别表志殊貫如此修綴事可備盡伏惟陛下先天開物洪宣帝命太皇太后淳曜二儀惠和王度聲教之所漸洽風譯之所覃加固已義振前王矣加太和以降年未一紀然嘉符禎瑞備臻於往時洪功茂德事萃於曩世㑹稽佇玉牒之章岱宗想石記之列而祕府䇿勳述美未盡將令皇風大猷或闕而不載功臣懿績或遺而弗傳著作郎已下請取有才用者參造國書如得其人三年有成矣然後大明之德功光于帝篇聖后之勳業顯於皇策佐命忠貞之倫納言司直之士咸以備著載籍矣帝從之宣武帝初踐阼李彪上表曰臣聞龍圖出而皇道明龜書出而帝道昶斯實冥中之書契也自瑞官立而卑髙陳民師建而貴賤序此乃人間之繩武也是以唐典篆欽明之册虞書銘眘徽之篇傳著夏書之針詩録商家之頌斯皆國史明乎得失之迹也逮于周姬鑒乎二代文王開之以兩經公旦申之以六聫郁乎其文典章大略也故觀雅頌識文武之丕烈察歌音辨周公之至孝是以季札聽風而知始基聽頌而識盛德至若尼父之别魯籍丘明之辨孔志可謂婉而成章盡而不汚者矣自餘乘志之比其亦有趣焉暨史班之録乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類三代炎劉崇道冠乎來事降及華馬陳于咸有放焉四人敷贊弗逺不可力致豈虛也哉其餘率見而書覩事而作者多矣尋其本末可往來焉唯我皇魏之奄有中華也嵗越百齡年幾十紀太祖以弗違開基武皇以奉時拓業虎嘯域中龍飛宇外小往大來品物咸亨自兹以降世濟其光史官叙録未充其盛加以東觀中圯册勳有闕美隨日落善因月稀故諺曰一日不書百事荒蕪至於太和之十二年先帝先后逺惟景業綿綿休烈若不恢史闡録懼上業茂功始有缺矣於是召名儒博達之士充麟閣之選于時忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓髙祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢制作於此者恐閨門既異出入生疑弦柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功録美不其闕歟伏惟孝文皇帝承天地之寶崇祖宗之業景功未就奄焉崩殂凡百黎氓若無天地賴遇陛下體明睿之真應保合之量恢大明以燭物履靜恭以安邦天清其氣地樂其靜不愆不忘率由舊章可謂重明疉聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善流者欲以繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖達今王之懿美洞鑒準之前代其聽靡悔也時哉時哉可不光昭哉合德二儀者先皇之陶鈞也齊明日月者先皇之洞照也慮周四時者先皇之茂功也合契鬼神者先皇之𤣥燭也遷都改邑者先皇之達也變是協和者先皇之鑒也思同書軌者先皇之逺也守在四夷者先皇之略也海外有截者先皇之威也禮田岐陽者先皇之義也張樂岱郊者先皇之仁也鑾率幽漠者先皇之智也燮伐南荆者先皇之禮也升中告成者先皇之肅也親䖍宗社者先皇之敬也衮實無闕者先皇之充也開物成務者先皇之貞也觀乎人文者先皇之藴也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功二十加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書於竹素聲播於金石臣竊謂史官之達者大則與日月齊明小則與四時並茂其大者孔子左丘是也小者史遷班固是也故能聲流於無窮義昭於來裔是以金可滅而風流不泯者其唯載籍乎諺曰相門有相將門有將斯不唯其性蓋言習之所得也竊謂天文之官太嵗之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯蓋世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳所以言及此者史職不修事多淪曠天人之際不可須臾闕載也是以談遷世事而功立彪固世事而名成道爭乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈違閣而就志近僭晉之世有佐郎王隱為著作虞預所毁亡官在家晝則樵薪供爨夜則觀文屬綴集成晋書存一代之事司馬紹敕尚書唯給筆札而已國之大籍成於私家末世之弊乃至如此史官之不遇時也今大魏之史職則身貴祿則親榮優哉遊哉式榖爾休矣而典謨弗恢者其有以也而故著作漁陽傳毗北平陽尼河間邢産廣平宋辨昌黎韓顯宗等並以文才見舉注述是同皆登年不永弗終茂績前著作程靈虬同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興由於大業雅頌垂薦起於德美雖時有文質史有備略然厯世相仍不改此度也昔子談誡其子遷曰當世有美而不書汝之罪也是以久而見美孔明在蜀不以史官留意是以久而受譏取之深衷史談之志賢亮逺矣書稱無曠庶官詩有職思其憂臣非今之所司然昔忝斯任故不以草茅自疏敢言及於此語曰患為之者不必知知之者不得為臣誠不知彊欲為之耳竊尋先朝賜臣名彪者逺則擬漢史之叔皮近則準晉史之紹統推名求義欲罷不能荷恩珮澤死而後已今求都下乞一靜處綜理國籍以終前志官給事力以充所須雖不能光啓大録庶不為飽食終日耳近則朞月可就逺也三年有成正本藴之麟閣副二藏之名山西魏文帝時栁蚪以史官密書善惡未足懲勸乃上疏曰古者人君立史官非但記事而已蓋所以為監誡也動則左史書之言則右史書之彰善疸惡以樹風聲故南史抗莭表崔杼之罪董狐書法明趙盾之愆是知直筆於朝其來久矣而漢魏已還密為記注徒聞後世無益當時非所謂將順其美匡救其惡者也且著述之人密書其事縱能直筆人莫之知何止物生橫議亦自異端互起故班固致受金之名陳夀有求米之論著漢魏者非一氏造晉史者至數家後代紛紛莫知准的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言諸史官記注者請皆當朝顯言其狀然後付之史閣庶令是非明著得失無隱使聞善者日修有過者知懼敢以愚管輕冒上聞乞以瞽言訪之衆議事遂施行唐髙祖時祕書丞令狐德棻上言曰近代無正史梁陳齊文籍猶可據至周隋事多脫損今耳目尚相及史有所馮一易世事皆汨暗無所綴拾陛下受禪於隋隋承周二祖功業多在周今不論次各為一正史則先烈世庸不光明而後無傳焉帝然之太宗時褚遂良遷諫議大夫兼起居事帝謂遂良曰卿記起居大抵人君得觀之否對曰今之起居古左右史也善惡必記戒人主不為非法未聞天子自觀史也太宗曰朕有不善卿必記邪對曰守道不如守官臣職載筆君舉必書黃門侍郎劉洎曰使遂良不記天下之人亦記之矣太宗曰朕行有三一監前代成敗以為元龜二進善人共成政道三斥逺羣小不受才言朕能守而勿失亦欲史氏不能書吾惡也又謂房元齡曰比見前後漢史載録揚雄甘泉羽獵司馬相如子虛上林班固兩都等賦此既文體浮華無益勸戒何暇書之史册其上書論事詞理切直可裨於政理者朕從與不從皆須載書太宗又謂房𤣥齡曰朕每觀前代史書彰善疸惡足為將來規誡不知自古當代有國史何因不令帝王親見之對曰國史既善惡必書庶幾人主不為非法止應畏忤㫖故不得見也太宗曰卿可撰録進來諫議大夫朱子奢奏曰陛下獨覽起居于事無失若以此法傳示子孫㦯有飾非護短史官不免刑誅莫不順㫖全身千載何所信乎上不從元齡等遂删略國史為編年體撰髙祖太宗實録表上之太宗見六月四日事語多微文謂元齡曰昔周公誅管蔡而周室安季友鴆叔牙而魯國寧朕之所為義同此類蓋所以安社稷利萬人耳史官執筆何煩有隱宜即改削浮詞直書其事魏徴奏曰臣聞人主位居尊極無所忌憚唯有國史用為懲惡勸善書不以實後人何觀陛下今遣史官正其辭雅合至公之道代宗時吏部侍郎楊炎薦沈既濟有良史才召拜左拾遺史館修撰初吳競撰國史為則天本紀次髙宗下既濟上奏曰則天皇后進以彊有退非德讓史臣追書當稱為太后不宜曰上中宗雖降居藩邸而體元繼代本吾君也宜稱皇帝不宜曰廬陵王睿宗在景龍前天命未集假臨大寶於誼無名宜曰相王未容曰帝且則天改周正朔立七廟天命革矣今以周廁唐列為帝紀考于禮經是為亂名中宗嗣位在太后前而叙年製紀反居其下方之躋僖公是謂不智昔漢髙后稱制獨有王諸吕為負漢約無遷鼎革命事時孝惠已殁子非劉氏不紀吕后尚誰與哉議者猶謂不可況中宗以始年即位季年復祚雖尊名中奪而天命未改足以首事表年何所拘閡而列為二紀魯昭公之出春秋嵗書其居曰公在乾侯君在雖失位不敢廢也請省天后紀合中宗紀每嵗首必書孝和在所以統之曰皇帝在房陵太后行某事改某制紀稱中宗而事述太后名不失正禮不違常矣夫正名所以尊王室書法所以觀後嗣且太后遺制自去帝號及孝和上諡開元册命而后之名不易今祔陵配廟皆以后禮而獨承統於帝是有司不明正失先㫖若后姓氏名諱才藝智略崩葬日月宜入皇后傳題其篇曰則天順聖武皇后云議不行憲宗元和十五年史館修撰李翺上奏曰臣等無能謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠臣賢士事業載奸臣佞人醜行以傳無窮者史官之任也伏以陛下即位十五年矣乃元年平夏州二年平蜀斬闢三年平江東斬錡張茂昭遂得易定五年擒從史得澤潞邢洺七年田宏正以魏博六州來受常貢十二年平淮西斬元濟十三年王承宗獻德棣入租稅滄景除吏十四年平淄青斬師道得十二州神斷武功自古中興之君莫有及者而自元和以來未著實録盛德大功史氏未記忠臣賢士名德甚有可為法者逆臣賊人醜行亦有可為誡者史臣皆闕而未書臣實懼焉故不自量輒欲勉强而修之凡人之事迹非大善大惡則衆人無由知之故舊例皆訪問於人又取行狀諡議以為一據今之作行狀者非其門生即其故吏莫不虗加仁義禮智妄言忠肅惠和㦯言盛德大業逺而愈光㦯云直道正言歿而不朽曽不直叙其事故善惡混然不可明至如許敬宗李義府李林甫國朝之姦臣也其使門生故吏作行狀既不指其事實虛稱道忠信以加之則可以移之於房元齡魏徴裴炎徐有功矣此不唯其處心不實茍欲虛美於所受恩之地而已蓋亦為文者又非遊夏遷雄之列務於華而忘其實溺於辭而棄其理故為文則失六經之古風記事則非史遷之實録不如此則辭句鄙陋不能自成其文矣由是事失其本文害於理而行狀不足以取信若指事書實不失虛言則必有人知其真僞不然者縱使門生故吏為之亦不可以謬作德善之事而加之矣臣今請作行狀者不要虛說仁義禮智忠肅惠和盛德大業正言直道蕪穢簡册不可取信但指事說實直載其詞則善惡功跡皆據事足以自見矣假傳魏徴但記其諫諍之詞足以為正直矣如傳段秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣今之為行狀者都不指其事率以虛詞稱之故無魏徴之諫諍而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以為據若考功視行狀之不依此者不得受依此者乃下太常并牒史館太常定諡牒送史館則行狀之言縱未可一一皆信與其虛加妄言都無事實者猶山澤髙下之不同也史氏記録須得本末茍憑往例皆是空言則使史館何所為據伏乞下臣此奏使考功守行善惡之詞雖故吏門生亦不能虛作而加之矣臣等要知事實輒敢陳論輕黷天威無任戰越文宗時帝方議政適見起居郎鄭朗執筆螭頭下帝謂之曰向所論事亦記之乎朕將觀之朗曰臣執筆所書者史也故事天子不觀史昔太宗欲觀之朱子奢曰史不隱善不諱惡自中主而下㦯飾非護失見之則史官無以自免且不敢直筆褚遂良亦稱史記天子言動雖非法必書庶幾自飭帝恱謂宰相曰朗援故事不畀朕見起居注可謂善守職者然人君之為善惡必記朕恐平日言之不協治體為將來羞庶一見得以自改時魏謨為起居舍人文宗嘗索起居注謨奏曰古置左右史書得失以存鑒誡陛下所為善無畏不書不善天下之人亦有以記之帝曰不然我既嘗觀之謨曰向者取觀史氏為失職陛下一見則後來所書必有諱屈善惡不實不可以為史且後代何信哉乃止武宗㑹昌中李德裕上奏曰長夀二年宰臣姚璹以為帝王謨訓不可闕於紀述史官踈逺無因得書請自今以後所論軍國政要宰臣一人撰録號為時政記厥後因循多闕紀述臣等商量向後每坐日聖言如有慮及生靈事關興替可昭示百代貽謀後昆者及宰臣獻替謀猷有益風教並請依國朝故事知印宰臣撰録連署名封印至嵗末送史館德裕又上奏曰臣等伏見近日實録多云禁中言者伏以君上與宰臣及公卿言事皆須衆所聞見方合書于史策禁中之語向外何由得知㦯得於傳聞多出邪妄便載史筆實纍鴻猷向得實録中如有此類並請刋削更不得以此紀述又宰臣及公卿論事行與不行須有明據或奏議允愜必見褒稱㦯所論乖僻固有懲責在藩鎮獻表者必有答詔居要官啓事者自合著明並當昭然在人耳目或取舍存於堂案或與奪形於詔敇前代史書所載奏議無不由此近見實録多載密疏言不彰於朝聽事不顯于當時得自其家未足為信向後所載羣臣奏議其可否得失須朝廷共知者方可紀述密疏並請不載如此則書必可法人皆首公愛憎之志不行褒貶之言必信矣宋太祖開寶七年知制誥史館修撰扈䝉乞委宰執抄録言動送付史館上疏曰臣嘗讀唐書見文宗每開延英召大臣論事必命起居郎起居舍人執筆于殿階螭頭之側以紀時政故文宗一朝實録稍為詳備至後唐明宗亦命端明殿學士及樞密直學士輪修日厯旋送史館近世以來此事都廢每季雖有內庭日厯樞密院抄録送付史館所記者不過對見辭謝而已帝王言動莫得而書亦緣宰相以漏泄為虞無因肯說史官以踈逺是隔何由得聞徒䖍著撰之心難紀憂勤之德伏望今後凡有裁制之事優恤之恩發自宸衷合書簡册者並委宰相及參知政事每月輪次抄録送付史館以憑修撰日厯所貴睿德神功厯千年而不朽嘉謨聖政垂萬世以為光太宗淳化五年左諫議大夫史館修撰張佖乞復左右史之職上疏曰臣竊以史官之職掌修國史不虛美不隱惡凡天地日月之祥山川封域之分昭穆繼世之序禮樂師旅之政本於起居注以為實録然後立編年示褒貶伏覩聖朝編年謂之日厯惟紀報狀略叙敕文于聖政嘉言皇猷美事羣臣之忠邪善惡庶務之㳂革弛張汗簡無聞國經曷紀謹案六曹故事起居郎掌修記事之史凡記事以事繫日以日繫月以月繫時以時繫年必書朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅罰黜免以懲惡季終則授之國史起居舍人掌修記言之史録天子制詔德音政事之制臣欲請置起居院修左右史之職以記録為起居注與時政記逐月終送史館以備修日厯如此則聖朝稽古必煥發於典墳信史成文固度越於周漢矣真宗時詔遷官校勘三國志晉唐書或有言兩晉事多鄙惡不可流行者真宗以語宰相翰林學士畢士安奏曰惡以戒世善以勸後善惡之事春秋備載真宗然之仁宗嘉祐四年翰林學士史館修撰歐陽修論修日厯疏曰臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世者皆得書而不隱故自前世有國者莫不以史職為重伏見國朝之史以宰相監修學士修撰又以兩府之臣撰時政記選三館之士當升擢者乃命修起居注如此不為不重矣然近年以來貟具而職廢其所撰述簡略遺漏百不存一至于事關大體者皆沒而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也今時政記雖是兩府臣僚修纂然聖君言動有所宣諭臣下奏議事關得失者皆不紀録惟書除目辭見之類至於起居注亦然與諸司供報文字無異修撰官秖據此銓次繫以日月謂之日厯而已是以朝廷之事史官雖欲書而不得書也自古人君皆不自閲史今撰述既成必録本進呈則事有諱避史官雖欲書而又不敢書也加以日厯時政記起居注例欲承前積滯相因故纂録者常務追修纍年前事而嵗月既逺遺失莫存至于事在目今可以詳于見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂成廢墮矣臣竊見趙元昊自初僭叛至復稱臣始終一宗事莭皆不曽書亦聞修撰官甚欲紀述以修纂後時追求莫得故也其于他事又可知焉臣今𣣔乞特詔修時政記起居注之臣並以德音宣諭臣下奏對之語書之其修撰官不得依前秖據諸司供報編次除目辭見並須考驗事實其除某官者以某功如狄青等破儂智髙文彥博等破王則之類其貶某職者坐某罪如昨來麟州守將及并州龐籍緣白草平事近日孫沔所坐之類事有文據及迹狀明白者皆備書之所以使聖朝賞罰之典可以勸善懲惡昭示後世若大臣用情朝廷賞罰不當者亦得書以為警戒此國家置史之本意也至於其他大事並許史院據所聞見書之如聞見未詳者直牒諸處㑹問及臣僚奏議異同朝廷裁置處分並書之已上事莭並令修撰官逐時旋據所得録為草卷摽定月分于史院躬親入匱封鎖候諸司供報齊足修為日厯仍乞每至嵗終命監修宰相親至史院㸃檢撰官紀録事迹內有不勤其事隳官失職者奏行責罰其時政記起居注日厯等除今日以前積滯者不住追修外截自今後並令次月供報如稍有遲滯許修撰官至中書樞密院催請其諸司供報拖延及史院有所㑹問諸處不畫時報應致妨修纂者其當行手分並許史院牒開封府勾追嚴斷其日厯時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言仁宗時知成德軍宋祁乞宰相監修唐書疏曰臣先奉詔修定唐書是時賈昌朝罷執政丁度以參知政事嗣揔其任度比罷免而書局不解今度不幸薨謝臣又逺守邊郡本局止有删修官王疇以下四貟至今編纂遼延紀志俱未有草卷誠恐書無統制諸儒論議不一淹引嵗時欲望朝廷許依前例以宰相監修竊以一王大典垂法千古今功且垂成而其間褒貶是非出史臣等須藉當國大臣商榷訂正為斯文之重庶書成行逺無愧前人唐特修晉氏一史亦宰相恭總彼偏方陋國制度殘窶尚以輔弼領之比今唐書恢大光明為不侔矣伏乞特賜詳度施行宋庠乞删修唐書及五代史疏曰臣伏見劉昫唐書及范質五代史並是近代修纂雖粗成卷帙而實多漏略義例無次首末相違按唐自武宗以還實録皆闕詳昫等輯綴之日因舊史存體統續後事者不無叢脞至于序篇贊論褒貶大方訂之前世訖無可采其五代帝紀則殆是全寫實録列傳則更同銘志比於唐史抑又甚焉自宋興八十餘年上距李氏厯載踰百五姓相代故老淪亡語授耳傳寖以踈闊若不因時修定則二書者非徒取愧于來葉固將遺恨于當年乃者威武軍莭度使知樞密院事盛度任學士日亦嘗乞搜訪唐事以裨史闕雖文移遍下而州縣俗吏罕或省知逮此數年莫克如詔臣誠不自揆然由布衣之日服膺簡册竊觀二史未嘗不廢書結欷但恨家乏篇籍人無師仰區區之志誰與憫之比者幸䝉陛下教育之仁久塵史觀讐撰之職每緣是正文字見祕府所藏唐家紀傳詔令及偏記小說之類名種尚多五代實録諸國僭僞之篇往往完具若得裒類而通閲猶足以整齊年月補緝散亡勒成新書或矯前病然念臣才識䝉淺見聞凡近必依朋類參質否臧竊覩同館修撰翰林侍讀學士尚書吏部貟外郎李淑預修三朝正史博貫前載文雄學奧儻諧咨定實繄宗矩臣弟尚書刑部貟外郎直史館祁稍勤篇翰頗及輩流俾之編删亦必盡力臣欲望聖慈差李淑及臣弟等三人同將唐書及五代史别加撰著然乞不為官局只許於館閣內正行公文更互掇借應係唐書及五代史照對文字各就本家纂録並不煩官司供給庶得寖尋史法寬假嵗期上賴好文之明恣窮希古之樂此亦千載一時之遇耳臣又案唐張說退罷許在家修史沈傳師出為湖南觀察使亦令在州撰述彼本朝記注尚許私藏況前世成書詎勞公禁如臣等或有外補差擇亦乞如傳師故事哲宗元祐元年門下侍郎司馬光乞令校定資治通鑑所寫稽古録劄子曰臣聞史者今之所以知古後之所以知先是故人主不可以不觀史善者可以為法不善者可以為戒自生民以來帝王之盛者無如堯舜書稱其德皆曰稽古然則治天下者安可以不師古哉伏見皇帝陛下初開經筵先講論語讀祖宗寶訓論語記孔子之言行寶訓述祖宗之聖謀誠為從學之要然國家未有天下以前帝王之事臣愚以為亦不可不知也顧以年祀悠逺載籍浩博非一日二日所能遍閲而周知所宜提其綱目撮其精英然後可以見治亂存亡之大略也臣先於英宗皇帝時嘗采獵經史上自周威烈王二十三年下盡周世宗顯德六年略舉每年大事編收為圖年為一行六十行為一重五重為一卷凡一千三百六十二年共成五卷謂之厯年圖上之以省煩文便觀覽臣又於神宗皇帝時受詔修國朝百官公卿表臣依司馬遷法自建隆元年至治平四年各記大事於上方書成上之有詔附於國史臣今更討論經史上自伏羲下至周威烈王二十二年略序大要以補二書之闕合為二十卷名曰稽古録欲繕寫奏御而私家少得筆吏恐日近不能了畢竊見先有聖㫖令祕書省正字范祖禹等就本省校定臣所編修資治通鑑見有筆吏及紙札等物伏望聖慈特降指揮許臣并上件稽古録送祖禹等令就夲局繕寫校對訖先次上進候將來讀祖宗寶訓了日若别未有書可讀欲乞且取臣此書進讀仍令讀官隨文解釋則前王軌轍皆可槩見庶幾足以資稽古之萬一輔聖性之聰明徽宗即位初右正言陳瓘上奏曰臣伏聞王安石日録七十餘卷具載熙寧中奏對議論之語此乃人臣私録之書非朝廷之典册也自紹聖再修神宗實録史官請以此書降付史院凡日厯時政記及神宗御集之所不載者往往専據此書追議刑賞奪宗廟之美以歸故臣建掌書之官以修私史考之往古並無此例唯唐武宗時宰相李德裕引鄭亞之徒改修憲宗實録增損筆削専美其文其後宣宗即位追念憲考不能平也故大中三年九月制曰委國史於愛壻之手寵祕文于弱子之身擅敢改張罔有畏忌奪他人之懿績為私門之令猷於是德裕鄭亞皆從貶竄蓋以國史實録皆欲顯揚宗廟之美非人臣之所得私也神考之信任安石雖成湯之于伊尹不過如此安石密贊之言強諫之語何必盡宣于外然後見君臣相得之盛乎昔者周公之訓曰爾有嘉謀嘉猷則入告爾后于內爾乃順之於外曰斯謀斯猷惟我后之德安石日録所載嘉謀嘉猷既入告而發于命令則斯謀斯猷皆神考之德也豈可以繼志述事為名而專紹人臣之美乎伏惟陛下若稽如堯舜繼述如武王棄斥人臣不改之小孝光神考日新之聖緒忍使裕陵之美皆為私史所攘改而正之理不可緩所有紹聖神宗實録願詔史臣别行删修以成一代不刋之典瓘又論哲宗實録不當止差蔡京兼修狀曰臣聞公而不私則朝廷無過舉之事私而不公則天下有不服之心臣伏見近差翰林學士承㫖蔡京兼修哲宗皇帝實録此朝廷過舉之大而人心不服者也國家自太宗以後每朝實録提舉修撰皆有正官用度雖多不敢惜費命官雖衆不敢憚煩所以重大典而敬先朝也今修哲宗實録獨用兼官而已豈非以蔡京欲擅史局而朝廷不欲重違其意乎蔡京得兼局而哲宗史事不得具官輕一朝大典違祖宗故事皆為一京則是朝廷之所以厚京者過於哲宗明矣臣前章所謂朝廷大政無不委曲遷就而為一京之地者此亦其一事也陛下篤于天倫曲致其厚每對臣下語及泰陵則聖顔慘戚感動左右豈肯以天下而儉於先朝之史事乎今物議訩訩皆有公私厚薄之說無不歸過於陛下矣京為陛下畫不忠之䇿陛下為京受不厚之名京無忌憚人不敢言陛下孤立人不敢助卑君尊臣陵壓主道豈有朝廷事勢倒置如此而可以久安乎昔者為修王安石日録専置一局今者為修哲宗實録則兼官而已王氏尊於神考蔡氏重于哲宗三家僭魯六卿分晉原其起因不過如此前古已陳之事安可以不監戒乎臣自十八日不得上殿次日又復隔下自知必有重譴理當誅竄然而未受謫命猶在言職豈敢以一身之危辱而棄其所當言乎願詔三省檢㑹纍朝差官修實録故事如臣所言不誣乞行改正以稱陛下厚于泰陵之意時詔三史三國志晉書舛誤其選官校正之瓘又上疏曰人君稽古之學一經一史經則守之而治身史則考之而應變天下之事其變無窮故往古可監之迹不可不詳知也仁宗嘗謂輔臣曰朕聽政之暇於舊史無所不觀思考厯代治亂事迹以為監戒也英宗命司馬光論次歷代君臣事迹可以為監戒者既上通志八卷又命置局續修書成取㫖賜名神考繼志述事賜其名曰資治通鑑又為親製厥序炳若雲漢為章于天自然之巧變化出焉其略曰所載明君良臣切摩治道議論之精語德刑之善制天人相與之際休咎庶證之原威福盛衰之夲規模利害之效良將之方略循吏之條教斷之以邪正要之于治忽辭令淵源之體針諫深切之議良謂備焉列于戶牖之間而盡古今之統博而得其要簡而周於事是亦典刑之總㑹䇿牘之淵林矣臣嘗三復明訓掩卷歎息以謂諸史所載數千年事文字繁多不可勝覽窶儒寒生業專習一窮年皓首猶或昧陋仰窺聖作區判事類數語之間盡史之要翕受以畜德敷施而日新堯舜之所謂稽古何以加此而況不忘謙抑俯比漢唐自謂文景太宗無間然矣自餘治世盛王得聖賢之一體者亦皆取焉至于荒墜顛危之主亂賊姦宄之臣可觀可鑑無不悉論以著聖志其書既以印行可取而讀也然則仁宗校正之時則資治通鑑既有兆矣聖聖稽古同乎一心皆以載籍垂示後嗣昔之人積纍艱難非一日也繼而張之正在今日大觀二年起居郎石公弼上奏曰臣竊考唐貞觀職官故事天子御正衙則起居郎居左舍人居右有命則臨陛俯聽退而書之每仗下議政事亦必隨輔臣入殿執筆記録於前史官隨之及仗在紫宸內閣則夾香案對立殿下上記得失繇是事之機要言之微密人之忠邪皆得書之方册昭示將來明主賢臣之事罔或缺遺一代之典文燦然大備且唐天下垂三百年號稱至治莫盛于貞觀而謀猷設張制度文采勳績治效必可垂法後世而當時崇尚史官載録如此由今考之事之存者猶十之五六此史官之不可不知故事也永徽以後髙宗不躬萬機重臣許李綰權持政姦謀邪計杜塞不聞畏避羣臣自是起居稍奪故事止于對仗承㫖仗下議論不復與聞至長夀中宰相姚璹始建議執政大臣録仗下論議多出于股肱輔弼之臣史官職在記録而已利害殊絶較然可知若夫時政記使宰相為之賢者則推美避譽邪臣則飾過隱非事關機要或疑謀泄而功沮言及臣寮或慮隙開而怨售巧事形迹互相依倚銓次不廣筆削自私此時政記之在當時屢建而屢罷者此也臣竊惟國家受命以來纍聖相繼百度修明度越前古獨史臣之職未復故事修時政記即未免有昔時之纍起居注及史館日厯意在塞責具貟茍免以編制敕類除免叙年月為纂述聖主言動仗下與便坐論議既不與聞而羣臣奏疏諫官言事留中者未嘗宣諭焚藁者往往無傳神機天算竒謀碩畫內安社稷外撫四夷可以輝煥竹帛儀刑今古者或在當時未嘗撰述至于異日稍稍訪求則必耳目不接真僞相冒是非雜揉失實傳之後世其可信乎事之出於羣臣者家人故吏因兹緣飾朋黨仇怨得以成私文字增加委曲㫖意虛美溢惡不可勝聽遂使髙文直筆是非猶豫褒貶自疑忠臣義士視既往之迹暗昧不章因有自悔不前之心臣竊以邪正辨而有好惡好惡形而為是非施于有政也則為刑為賞列之國史也則為褒為貶必著明萬世既有以旌别於生前又有以追録于已死如此為善者自堅造非者解體二者皆人主之操柄教化之樞機不可不審也方今史官之選必天下文學修潔之士若止以編制敕類除免叙年月為奉職則但通曉文字求之二省一令史足矣何必擇人哉且唐天寶以後天下多故起居之職因循曠弛然後百家傳記之說雜然並興瀰漫流行不可勝數率皆耳剽口傳轉相紀述文辭侈靡誑亂事實猥發宫闈之私傅致難知之事采獲竒怪雜以詼笑施之當時未免無疑傳之後世豈得不信古者禮失求之于野孔丘學官名於郯子皆以事久難明茍可考焉必為事實唐褚遂良知起居事太宗問曰朕有不善卿必記耶對曰臣職載筆君舉必書劉洎曰使遂良不書天下之人亦記之矣夫起居之録不詳則臣下之記逾廣機失于上則柄任于下自然之理也近世綴文之事頗為傳記有所論列臣愚以為不復其本則其原未可卒禁臣愚伏願陛下詔大臣講求故事稍還史館之職使之得以悉意記録善惡必書至纎至悉無所或遺凡羣臣奏疏諫官言事或行或否並望即時宣示史官删叙潤色書之緗簡使後世知陛下有納諫之明知直臣立不諱之朝知議事有羣臣之論知陛下無偏聽之聰羣臣拜免必叙遷責之由使後世知陛下無好惡之私倘或史官因循廢職著撰不時則必明加黜責庶幾君臣行事廊廟規圖纎微必著後世有所考法焉臣又以為唐制起居供奉仗內而史官必隨其後者意欲記注臣寮與修撰學士者皆得親見事實與聞謨訓然後銓次不相抵牾此最䇿之得者也又臣嘗考漢事記注無定貟而太史有常職是時近臣皆持槖簮筆入侍左右蓋欲有所紀述而天下計書先上太史副上丞相由是事得廣載書可責成此兩漢遺史所以為後世模楷也今近臣非職事者自見聖君言動固不敢有所紀而天下記之亦未嘗上羣臣列傳事非章章尤著者則唯取信行狀行狀者門人故吏之所為非大公至正之語尤難依據者也臣又以古之史官皆久于職如司馬遷班固皆父子繼纂其事唐張說致仕亦必修史吳競被貶以藁自隨方今史臣遷擢不時前後相承文書猥積修舊不給何暇議新以至軍國政要纂録後時久而訛謬事多此類難一一陳至于宰相監修劉子允以為十羊九牧書成進本朱子奢以為開後世史官之禍如此等事所宜變更伏望聖慈俯察狂瞽如前所陳萬有一分倘合聖意即乞詔公卿議定其例四年起居舍人宇文粹中上奏曰臣聞人君忠利以導民則民安其政信順以事神則神饗其德神民不相雜擾則天下之物有非人力可校而自至者故禮記言四靈為畜謂至和浹洽而物遂其性也周詩言貽我來牟謂五榖順成而得所養也物遂其性民得所養修德錫符之應莫大于此若夫鱗毛羽介之孽虹霓光景形色變怪之祥華實之非其時孽育之非其類則月令書之以為異洪範五行傳記之以為妖先儒董仲舒劉向之徒論之詳矣臣伏覩近年起居注所書祥應猥冗而不經煩雜而無所别擇如檜枝生黃花菜果有佛像白氣騰空紅光燭天桃李冬實仙人影晝見之類皆前世以為妖異今一切紀為瑞應昔桑榖共生于亳廷則伊陟巫咸贊太戊修德以禳之飛雉升于鼎耳則祖己訓髙宗正厥事以應之今州郡諛佞成風裒集境內妖怪繪圖奏陳其意曰此臣治理之效三省集諸路所奏拜表稱賀其意曰此皆燮理之功而數月之間動以千數夫物反常為變天反時為災所以警懼告戒者今不以為憂又從而講慶賀之禮史官所紀乃天子言動政事誥命而雜以諛佞無實之事豈不為典册之纍乎恭惟陛下內德淳茂昭格于三靈惠澤洋溢丕冒于四海天地助順祖宗儲福何必假此虛誕蕪翳盛美伏望明詔史官應禮部所關報祥瑞驗以經典而載其大者若常雨常燥青眚赤祥凡前史以為灾異者直書其事不必㸃綴文辭遷就附合庶幾弭灾報貺可以仰當天地之心無虛美無溢言可以垂訓于千百世之後徽宗時侍御史陳次升上奏曰臣訪聞前右司諫陳瓘嘗論史院修神宗實録多用王安石家日録頗失事實不聞施行者臣竊謂神宗皇帝聰明英睿超絶古今熙寧元豐間勵精庶政更新百度盡出宸斷而執政大臣但奉行而已如聞安石日録多稱己善謂一時制作皆自己出矯詞託訓前無祖宗上薄神考厚誣天下事非一端其于聖德掩蔽多矣瓘嘗指陳數事朝野相傳皆謂得實至今不得改正兼風聞史院先因曽布請用安石日録遂准得朝㫖謂修入實録必取㫖而後用不知果有乎無耶若果有之不委史院曽無取㫖乎陛下貴為天子持萬乘之權而神考一朝大典儻容史官任其私意紊亂事實不行究治何以彰聖孝之至伏望聖慈早賜指揮施行次升又論神宗實録劄子曰臣恭惟神宗皇帝在位十有九年其道德之妙不可得而名所見於政事者特緒餘而已史傳所載豈能形容其萬一哉訪聞史院官附㑹執政蔡卞用故宰相王安石日録變亂事實熙寧元豐間聖作之善者悉歸功于安石朝廷時政記則略而不用前諫官陳瓘嘗具論列陛下仁孝篤至躬親省覽灼見事實至今未聞施行近又覩禮部關報御史臺牒云史院僅十年方修帝紀五册其餘並未修撰竊以史官直筆取信天下昭垂萬世是是非非實繫褒貶若以非為是以是為非後世何觀而又貪冒史院供給優厚遷延嵗月以圖利入曽不以修撰為意遂使君父盛美掩蔽而不揚一朝大典久稽而不就附下罔上尊臣抑君不忠不敬莫大乎是此而不懲何以示戒伏望聖慈明詔史院改正事實重黜史官以正典刑庶彰神考之聖烈以昭陛下之聖孝以慰中外之公議不勝幸甚次升又上劄子曰臣竊以聖人之治無以加于孝孝莫大于嚴父嚴父莫大顯名于後世恭惟神宗皇帝功業赫顯前古無上其所以流傳萬世者國史而已今史院官先用王安石日録歸美安石而掩蔽神考盛德陛下躬親省覽灼見事實已行删改天下莫不仰陛下孝誠之至也然而史官之罪未正朝廷失刑也今朝廷既見史官弗䖍職事忽略大典僅及十年方修帝紀五册而史官之罪又置而不問天下以謂陛下獨厚于史官不忍加罪而顯親之道未至加隆有纍聖德伏望睿㫖檢㑹臣前奏早賜施行次升又上劄子曰臣伏以臣任侍御史日論奏史院官修神宗皇帝國史僅及十年方修帝紀五册其餘並未修撰乞行黜責未見指揮竊以國家馭吏之法有司承行事件雖甚微末偶爾稽違必行糾治況一朝大典所繫國體最重安可置而不問乎今史官敢爾慢令輕視朝廷貪冒俸給優厚特有稽留遂使神宗皇帝盛德大業前後相承十有七年不獲成書自古已來修撰國史未有如此其久也今若不正其罪何以為後來之戒信書未委何日可成伏望聖慈斷自清衷無牽大臣之私意以廢天下之公議次升又論鄧詢武狀曰臣伏聞祕書少監鄧詢武除同修正史輿議未允者竊以王言如絲其出如綸王言如綸其出如綍言命令一出而不可反也詢武前日史院留之朝廷謂其不可遂行寢罷今又有此差除衆議籍籍以謂命令反覆如此何以明是非别賢愚而取信于天下乎況詢武父綰昔為御史中丞專事姦佞求媚大臣為安石求賜第薦安石子滂及其壻蔡卞館職神宗皇帝察見底裏親批聖語操心頗僻賦性姦回論事薦人不循分守今詢武修史豈能公心直筆以發揮神考之盛德而不能掩其父之惡乎兼詢武學問荒唐衆所共知前日蔡卞報綰之私恩及欲褒飾妻父安石之美故置詢武于史院以偹檢討士人莫不指笑今令同修正史尤非所宜伏望聖慈斷自宸衷特賜寢罷以允公議次升又上奏曰臣近彈奏祕書少監鄧詢武不可同修神宗皇帝正史不䝉施行須至再瀆天聽者竊以史官直筆取信萬世祖宗以來尤為慎重咸平初修太宗皇帝實録錢若水主其事薦起居舍人李宗諤等數人充史官真宗皇帝指宗諤曰自太平興國以後皆昉在中書日事史策本憑直筆倘子為父隱何以傳信于後代乎除宗諤不許餘悉可之且宗諤文學才名顯于一時議論堅正信於朝廷真宗皇帝以此尚不授之史官而詢武人材凡下詞筆繆陋不可比擬宗諤一二昉亦當時名相非若鄧綰之姦佞兼綰自為御史知雜以至御史中丞凡六七年論事不少頗僻為多詢武豈不為父隱乎何以取信天下後世前日既已罷之今日又有此差除公議實為未允伏望聖慈以國史為念特賜追寢除命無使小臣得逞其私諫議大夫襲夬上奏曰臣伏覩制命以祕書監鄧詢武兼編修神宗皇帝實録者臣恭惟神宗皇帝在位一十九年勵精政事百度修明當有一朝盛典垂範萬世光耀無窮者也宜得博學純儒端正之士以任其職詢武何人乃與此選臣謹按詢武中懷險詐內行汚惡諛諂權要縉紳不齒東觀長吏已為冒榮豈容濫廁史筆滓穢先朝大典臣愚伏望聖慈追還成命别選名流以慰天下之望左司諫江公望上奏曰臣恭以神宗皇帝史書經元祐紹聖修纂史臣議論各有所挾類多偏係不唯不足以傳信後世今日史官實難措辭若折以紹聖之書則元祐修纂之臣法固不容匿藁臣妄意其家各有追記所以之文後世其書必别行議陛下者必曰神考乃陛下之父豈有子不為父作好書必不信史而信别行之書也盛德大業反遭掩昧而不明當是時誰為分辨今日所當痛思也或者之論欲重為恩賞以出私挾之書并二書焚之别行修纂如是則野史復興矣適以實元祐别行之書為不妄也史官以二書叢較矛盾相持不獨神考德業未易措辭當時預政大臣子弟或在顯仕豈無顧避業已在職以編次纂集為名茍延嵗時假此以為階至于華近遂脫身去矣此史所以未有絶筆之期也況神考盛德大業事實見在陛下雖欲加損益且不可得況人臣乎況天下後世乎伏望陛下搜羅博古洽聞平心篤論之士凡三數人不以彼時此時之間擢自淵衷付以史任期以一二年早見成書故不受汙染之清明不入形容之氣象倘得良史筆下自傳此意而簡牒迥有光彩伏望特降詔書明榜朝堂使曉陛下德意以先帝史牒異論相持久不得就今訪之公論取博古洽聞平心篤論之士蔽自朕意以補史官不以元祐紹聖為間二書並存折之事實書就即焚之雖朕與士大夫無預加損要以近期不以貟多為冗豈惟神考盛德大業增潤于直筆傳美于正論俾朕夙夜不遑康寧之心少安亦卿等父祖之休績不為阿論異見之所掩共揚斯休朕與汝之責塞矣伏冀聖慈如允所請早賜降詔施行臣以謂機已失時已後矣雖旦晝不可停也惟陛下勉之翰林學士王覿辭免修史上奏曰臣今月七日閣門告報奉敕差修神宗國史兼哲宗實録修撰者伏以史氏之職古難其才況兩朝之信書示萬世之常道恭惟神宗皇帝盛德大業際天接地哲宗皇帝柔逺能邇持盈守成繼明于三紀之間致治乎百王之上宜得深識義理博通古今富于典麗之辭責以論次之效豈容蹇淺輒汙簡編伏望聖慈矜此微誠察其非據追還成命改授名儒庶幾灝噩之文不墜典謨之體所有敕命不敢祗受厯代名臣奏議卷二百七十六
