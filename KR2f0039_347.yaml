body:
  text: 厯代名臣奏議卷三百四十七明楊士竒等撰四裔宋徽宗即位殿中侍御史龔夬論青唐狀奏曰臣竊聞敵人之勢分而不一則為中國之利自頃敵人強盛必賴比近部族自相攜二偵伺敵情為國藩翰臣伏見青唐一族世受封爵堅心依漢又嵗出善馬以供和市自熙寧元豐已來朝廷待之尤厚昨因強臣盜有其地至其嗣子國人不附逃難來奔特青唐之一夫耳而朝論以為納土之降王引對闕庭超受節鉞為四方之笑至於道路宴犒之費以巨萬計關輔騷擾不可具道今則不惟不得其地而使青唐之人遂無向漢之心其勢必與夏人解仇結約以為邉患和市善馬不復出矣數年之後夏賊兵力稍全青唐不復附漢而合從於敵臣恐朝廷西顧之憂未易言也今既往之失無所云救將來之䇿尚或可圖伏望聖慈特詔邉臣多方誘諭赦其罪戾使之自新待其入貢因撫而有庶幾復堅向漢之誠不復歸心於敵以為預備不虞之計邉氓幸甚建中靖國元年侍御史陳次升論西蕃市馬上奏曰臣竊以邊人勢合則強勢分則弱強則難禦弱則易制神宗皇帝熙寧元豐間以夏人為中國患乃優撫青唐一族世襲封爵俾伺間隙蠧其腹心而又嵗市善馬以強兵深得禦戎之要道也其後青唐衰弱土地為強臣之子繼立國人不附棄位為僧迹不自安窮來歸我特一亡徒爾邉臣張皇招納以致种朴敗衄為國家辱所得亡人道路將迎甚勤朝廷恩賜甚渥費用不資為四方笑已往之失不可救未來之患深可慮夫兵家制勝莫如馬步兵雖多十不當馬軍之一故自古論兵必以馬為先焉今西戎既叛馬不出市國家每嵗所失二萬餘匹數年之後馬必甚闕萬一夏人與青唐解讎連衡入寇併力衝突其將何及訪問聞今日邉將乃是前日招納之人多行庇護冀免譴責患害並不以實聞伏乞睿旨令本路帥臣將官各具的實利害結罪保明敷奏朝廷詳酌施行或令多方開諭許其自新依前入貢待過如初可益強兵勢威聲遐憺夏人不敢窺邉國家之福也龍圖閣學士范純粹乞令蕃官不得換授漢官差遣上奏曰臣久忝帥任殆遍諸邉竊見諸路蕃官近年以來志意驕滿習於惰慢緣數有立功之人敘述祖父曽任漢官或帥臣姑息特為陳乞遂得輕授漢官差遣致互相攀援不安守分訪聞各有觀望不肯專意訓習弓馬管幹部族以至遣使探諜講論邉事無復留心倣效成風事有未便切緣屬羌部族既始祖元是羌人即雖綿隔世代因功授官不論髙卑要之終是蕃種豈容輒有變易雜亂華人況自來應蕃官首領侵刻部族或犯餘罪罪雖至死止是罰納羊馬以至婚姻亂倫喪葬異制皆與漢户禮法不同兼條禁不得與漢官婚姻亦不許置買産業固有深意今昔不殊雖功大官髙不過充蕃將享厚祿而已而其位著久來不以官品髙卑並敘在漢官之下所以尊中國而抑四夷也故每遇差點驅使並聽漢官統馭指呼命無不伏今則輒容僥幸改授漢官差遣不惟上下姑息之風既已增熾而於漢蕃區别之體遂致陵夷因此又多與漢人婚姻不遵昔日條禁各自置買田産廢格朝廷典刑為患日深不可不戒兼逐人皆是近上使額或至遙郡防團一旦既敘漢官多在舊統轄官之上事屬倒置人情不甘姑息之害至于如此積弊在後無有已時若不别作申明來者未易止息兼誘致諸路蕃官子弟儇衣豐食驕恣相尚不肯伏從若復緩急之際更無可使之人雖有得力蕃兵亦無舊人統領臣恐積久之後部族減耗籬落凋殘逺畫長謀為損不細輒有短見謹具下項一乞朝廷明降指揮今後諸路帥臣不得奏乞與蕃官換授漢官差遣其蕃官亦不得輒有陳乞一乞朝廷契勘諸路蕃官已換漢官差遣之人並與改換就差充元舊部族都巡檢或官職甚髙者即與某路蕃兵統領兼本地分沿邉都巡檢名目並在將副之下仍明降指揮並令久任不限資考一乞立法應蕃官雖已換授漢官如遇舊曽統轄將副城寨官不以官職髙下依舊在舊統轄官之下一乞立法應蕃官已換授漢官差遣之人並止終其身其弟姪子孫雖因薦奏得官並只得充舊管本族蕃官各依蕃官條貫施行一乞立法應蕃官已換授漢官差遣之家婚姻及置買産業並依蕃部舊條施行右伏乞朝廷更賜詳酌如臣言可採即乞以臣今奏潤色立法速賜施行仍乞不坐臣所奏行下崇寧五年知鳯翔府馮澥論湟廓西寧三州疏曰臣伏覩陛下比年以來知關陜勞弊罷兵偃武與之休息和氣充塞年榖豐稔百姓快樂道路歌舞臣於今年三月到任首問民間疾苦皆云自罷兵之後人若更生疾苦事十已去九唯支移一事尚為民害自本府至湟州千有餘里唯道里遙逺又為經涉生界民間勞困不易興調臣遂即敷奏蒙恩第加寬免上等不過十程下户不出府界旨下之日萬口歡呼言自今以去更無餘事太平如此尚復何言而臣竊有所憂者病本尚在陛下雖欲罷兵而兵安可得罷雖欲息民而民安可得息臣竊以湟廓西寧三州本不毛小聚大河之外天所限隔陛下空數路耗內帑竭生靈膏血而取之收復以來何嘗得一金一縷入府庫一甲一馬備行陳而三州嵗用以億萬計仰於官也而帑藏已空取之民也而膏血已竭有司束手莫知為計塞下無十日之積戰士飢餒人有菜色今殘寇逰魂未即歸順黠羌阻命公為脣齒窺伺間隙忽肆姦侮則兵將復用役必再籍殘弊之後尚安可堪陛下以四海九州之大德被萬方威震四夷奈何以二三小聚困弊關陜一方生靈長為朝廷西顧無窮之憂乎臣愚欲采前世羈縻之義擢其酋豪授以旄鉞其首領等級命官使失地無歸之人復得其殘兵敗卒疆土各安其故嚴其誓約結以恩信彼將畏威懷德稽顙聽命輸誠效順長為漢守有得地之名無費財之患兵革不用藩籬永固而又可以逆絶北敵之辭旁釋西羌之怨一舉而衆利得䇿無上於此者或以謂朝取暮與取與無常為已甚者此大不然始朝廷慮其為邉患也一舉而取之易於探囊今知無所用也一舉而與之輕若擲芥其擒縱在我取與不計大度無所不包神機不俟終日利便所在何常之有又謂棄地之議未逺罪斥之人未復今而為此彼將有辭又大不然羈縻之義使為臣屬與夫捐棄自不同且此輩沮壞先帝功烈宜加罪誅今之利害彼復何異議方陛下以邉鄙生靈為念含垢忍耻猶或不辭況兹小嫌尚何所恤臣望陛下下臣言於本路帥府使之看詳或遣近臣臨察可否然臣言一出必為衆所咻沮何者蓋無邉事則朝廷之福有邉事則臣下之福用兵以來州縣小官反掌而登侍從行伍賤夫移足而專斧鉞金錢充棟宇田壤連阡陌下至幕府偏裨趨走廝役計其所得略皆稱是故大者稱功德小者論利害欺罔熒惑日陳於前陛下雖欲不作邉事尚安可得雖愛民如赤子亦無暇顧矣臣願陛下懲既往之失窒方來之路奮威斷顯絀一二以示好惡以絶欺罔則朝廷之福天下之幸臣逺方踈賤不避忌諱荷陛下非常之遇蒙陛下不次拔擢念非捐軀隕命無以報稱冒萬死為獻使狂瞽獲效萬一則臣雖死之日猶生之年大觀四年安堯臣上書論燕雲之事其言曰宦寺專命倡為大謀燕雲之役興則邉釁遂開宦寺之權重則皇綱不振昔秦始皇築長城漢武帝通西域隋煬帝遼左之師唐明皇幽薊之寇其失如彼周宣王伐玁狁漢文帝備北邉元帝納賈捐之之議光武斥臧宫馬武之謀其得如此藝祖撥亂反正躬擐甲胄當時將相大臣皆所與取天下者豈勇略智力不能下幽燕哉蓋以區區之地契丹所必爭忍使吾民重困鋒鏑章聖澶淵之役與之戰而勝乃聽其和亦欲固本而息民也今童貫深結蔡京同納趙良嗣以為謀主故建平燕之議臣恐異時脣亡齒寒邉境有可乘之釁敵人蓄鋭伺隙以逞其欲此臣所以日夜寒心伏望思祖宗積纍之艱難鑒厯代君臣之得失杜塞邉隙務守舊好無使敵人乘間窺中國上以安宗廟下以慰生靈上然之宣和間承平日久兵將驕惰蔡攸童貫貪功開邉將興燕雲之役引女真夾攻契丹以宇文虛中為參議官虛中以廟謨失䇿主帥非人將有納侮自焚之禍上書言用兵之䇿必先計強弱察虛實知彼知已當圖萬全今邉圉無應敵之具府庫無數月之儲安危存亡係兹一舉豈可輕議且中國與契丹講和今踰百年自遭女真侵削已來嚮慕本朝一切恭順今捨恭順之契丹不羈縻封殖為我藩籬而逺踰海外引強悍之女真以為鄰域女真藉百勝之勢虗喝驕矜不可以盟誓要不可以言説誘持卞莊兩鬪之説引兵踰境以百年怠惰之兵當新鋭難抗之敵以寡謀安逸之將角逐於血肉之林臣恐中國之禍未有寧息之期也四年童貫蔡攸等師既行即降旨妄議北事者必罰無赦廷臣皆無一言獨朝散郎宋昭論女真決先敗盟上疏曰臣聞外裔之性不以戰鬪為苦去來無定叛服不常雖成周盛世猶有玁狁之難故自古禦戎未見上䇿漢唐以還或盛或衰乍叛乍服其禦之之術率非良䇿皆不足為聖世道故略而不論迄我有宋寰區之內靡不歸順而景德中亦有澶淵之役真宗皇帝天威一震敵勢瓦解當是時乘勝逐北則敵國之兵無噍類矣真廟聖慈深厚特以兩國生靈為念故推天地之量洪覆載之恩啖以厚利與之議和為天下後世萬萬年安全之計故敵人謹守盟誓不敢南下而牧馬者誠以天地之洪恩不敢忘也自爾聖聖相承明明繼照雖睿智神武堯仁湯德足以懷柔然實亦恃此以為長城神宗皇帝熙豐之間鋭意北伐選將練卒積榖理財葺城郭修器械十九年間倉廪實府庫充貔貅之士無不一當百當是時鼓噪而前則自燕以北其人皆俎上肉矣亦以河朔祖宗興王之地不忍騷動安可快一時之忿失百年之好故終莫之舉也陛下即位以來禦戎之術實得上䇿敵使之來宴犒賜豫恩數曲盡故懷德畏威向風慕義稽首稱藩介胄之士櫜弓偃息黔黎之民鼓腹詠歌厯觀三代以來傾心恱服至誠面內莫如今日實太平希世之盛事也比者王黼童貫力引狂生李良嗣董才之徒妄興邉事致煩宸慮遣大臣提重兵久屯塞上倉廪府庫為之一空官卒民兵死亡無數前所奏陳悉皆誕妄財用尚可復全死者何由更生欺君罔上蠧國害民罪不容誅臣願斷此數人頭以令天下不唯慰安敵人之心使明知陛下德意無復猜忌謹守盟好庶幾姦臣賊子欺君罔聖妄興邉事僥覬功賞者有所懲戒臣固知陛下聖慈不忍誅戮臣下然此數人不誅則敵人猜忌之心末易可解臣願陛下勿以馭賢臣之禮馭此姦賊則不勝幸甚臣聞敵中頻嵗不登斗米千錢雖或請和恐非本心特出於不得已耳萬一養鋭數年嵗榖小稔秋髙馬肥士氣稍振復來侵擾則干戈相尋無時而巳較其利害輕重則姦臣數人之誅不足恤也又況李良嗣董才皆北敵叛臣心懷怨望故附會邉臣撰造虛語欲假中國之勢以復私讎耳實兩朝之姦賊豈復忠義之可望哉臣竊料議者謂嵗賜浩瀚虛蠧國用是不知祖宗建立榷場之本意也蓋祖宗朝賜豫之費皆出於榷場嵗得之息取之於敵而復以豫敵中國初無毫髮損也比年以來𣙜場之法寖壞遂耗內帑臣願遴選健吏講究𣙜場利害使復如祖宗之時則嵗賜之物不足慮也或者又謂九州中國之地皆上饒膏腴之田嵗得甚厚是曽不慮屯戍守禦之備戰鬪犒賞之費嵗幾百萬計耶貪其所得既不足以償所失而又戰鬪死亡之士橫被屠戮之民幾人也哉徒有闢國之虛名而無補國之實利或者又謂山後之民皆有思漢之心咸欲歸順此尤誕妄之易見者不唯北敵為備日久山後之民往往徙居漠北又自唐末至於今數百年間子孫無慮巳易數世今則盡為藩種豈復九州中國舊民哉皆由邉臣用人無術致探報者利於所得恣為誕謾帥臣庸暗更加緣飾妄議邉事僥覬功賞或者又謂北敵比年以來為女真所困侵城掠地橫亘千里勢以迫蹙願與女真合從腹背攻射則撲滅之易甚於反掌是亦弗思之甚也滅一弱冦而與強敵為鄰恐非中國之福徒為女真之利耳且北敵雖異族然久漸聖化粗知禮義故百餘年間謹守盟誓不敢妄動者知信義之不可渝也今女真性剛狠善戰鬪坐擁精兵勢熖日甚北敵以同類相攻尚不能勝儻與之鄰則將何術以禦之不過修盟誓以結鄰國之外好而已本朝與北敵通好百有餘年一旦敗之女真果能信其不渝乎異日女真決先敗盟為中國患必矣此理之必然事之必至雖使伊周復生不能易此議也臣又聞兩國之誓敗盟者禍及九族陛下以孝理天下其忍忘列聖在天之靈乎陛下以仁覆天下其忍致河北之民於塗炭之中而使肝腦塗地乎臣竊謂凡今之人臣不負陛下諏訪之意愛君憂國論奏忠赤者間亦有之其希意承旨背公營私茍求陛下富貴者不可勝數遂使忠赤之臣志不得伸言不見用此臣所以痛心疾首扼腕憤悶犯顔逆鱗以蹈萬死者豈得巳哉誠以國之大事實係安危下情壅遏不得上達今而不言其如後患何譬猶人之一身中氣痞隔陽不降隂不升則百脈不調四體不充久而不治病在膏肓雖有良醫不能愈也今疾幸在膚腠是正宜投藥石之時也臣願為陛下出疆説諭敵人云比因彼中亡失國主深慮擾攘之時疆陲不戒姦人作過邉臣生事故遣近臣使之防邉果有羣寇妄託北朝驚却邉民雖降處分不得殺戮止牒北界緊行捕捉切慮尚懷疑二妄興兵馬務在謹守祖宗之盟無失百年之好如女真侵削不已力不能勝則許求援於中國報使復來厚加恩禮以釋其疑使之外扞女真內屏中國則陛下奠枕永無憂於北顧百姓安業得盡力於南畝實天下萬萬年無窮之利古人謂外域相攻中國之福正謂是矣臣固知踈逺微賤輒以狂瞽冒犯天威難逃誅戮然臣聞忠臣徇義志士徇名故忠義發於內則鼎鑊忘於外愛君之心切則慮患之志深也況頑石五色尚有補天之功愚夫千慮豈無一得之長願陛下勿以人廢言留神聽察則撮土之微尚能增山嶽不厭之髙爝火之光尚可裨日月不照之明矣臣向任陜州靈寶知縣日因論列陜右錢法蒙恩召對面奉德音欲除監司旋致煩言猶叨二郡未到任間復蒙聖恩除臣提舉江南茶鹽事以嵗課增衍又蒙特轉一官臣每以未能仰報天地為恨今者伏覩姦賊敢爾欺君義當竭節圖報涓埃是敢越職輒貢芻蕘萬一臣言可采乞不降出庶使天下皆知斷自宸衷不由人言足以竦動神靈激昂士類北敵聞之恩歸陛下則臣報上之心足矣儻或上誤聖聰置諸鼎鑊亦臣之所甘心也惟陛下擇而處之真定府路安撫趙遹乞撫存北敵疏曰臣伏準今月十三日樞密院劄子奉御筆敵界為女真所侵兵勢瓦解切慮奔潰侵軼逼犯邉境仰河北諸路帥司依降指揮團結兵馬編排器甲準備不測勾抽上邉使喚仍先具知委奏聞除已具知委及逐時探到北界事節次附入內內侍省遞奏聞去訖臣竊詳北敵自澶淵既盟之後嵗省用兵之費國享重幣之利敵自知得計守盟修好皆其誠心然纍年以來敵酋失德上下離叛人不為用女真勃海寇亂其國征伐不已敗衄相繼境土侵削士馬凋殘財力匱耗常疑中國密有窺伺左枝右梧困弊日甚恭惟陛下好生之德深洽民心帝王之舉必度萬全況臣嘗親奉玉音屢被詔劄每念南北歡好方固祖宗盟誓謂非細事不可少有引惹造端生釁而敵殊不知聖神加惠兩國之意如此今兹睿旨特慮他寇與奔潰之衆不測侵軼姑示備禦之計廟謨甚逺預為之防然臣叨承閫寄職所當言茍有管見豈敢緘默伏覩邉報近者敵酋獵於白水川女真掩其無備全軍陷沒敵酋不知存亡國中震擾未見所立若復調兵上邉彼將謂中國起乘其弊疑隙既開何可復釋唯當示之安靜致其懷服臣愚竊謂耶律氏既有沙漠歷年甚多其人習熟貴其種類設有姦雄誰肯推服仰惟朝廷與彼兄弟之國共守盟好百有餘載今敵酋叔兄子弟甚衆若敵酋真遂不還願陛下用家人禮特遣重臣將命彼國推急難之義念外侮之虞慰諭其宗族臣下厚加拊勞勉以忠孝雪耻戡難就其敵酋叔兄子弟取敵酋之所愛國人之所慕擇賢立孤以主其衆隆其恩禮錫封册申結信誓以繼好息民俾之知戴中國彼既倚中國為重得存其宗社則中國有大造於彼也陛下雖不責報彼歸故地減嵗幣必有一以報陛下矣如是則中國不得汗馬之勞遺鏃之費萬無失一而安享大利機會之來間不容髮伏望聖慈特加採擇速奮睿斷施行實天下大幸貼黃臣愚竊謂敵失其酋未知所立方疑中國乘間而攻之然陛下兼愛南北生靈務隆義好若即恤其禍難援立新酋當此孤遺乏助之時得倚朝廷以存其國名正言順勢無不從則恩歸於我必復披心申固盟誓為利無窮若使彼新酋自立則恩非我出立而衆附則勢將復強增戍緣邉過為隄備徒足生釁以啓戎心願陛下無遽增戍開先時之隙毋緩立孤貽不及時之悔孔子曰興滅國繼絶世天下之民歸心焉惟聖神亟圖之貼黃臣契勘女真蕞爾偏隅自昔臣屬北敵勢不過敵之一大族其衆強弱與敵不侔徒以敵酋失德乘其離心遂致以寡敵衆以弱凌強者非女真之能皆其所自取也然北敵大國其人素不畏女真女真今雖得志亦豈能久橫行於敵中哉敵之新酋既立得國人心事將反掌也陛下仁聖被於四海普天率土罔不臣妾若速於斯有以深結其心使之懷服自削其平日之貪傲今若止增戍之役收援立之恩處以守盟存國之大義蠻貊革心固不難矣臣所謂用力小而見功多也徽宗時趙鼎臣代條具北邉事宜曰臣竊以耶律氏自五季以來盜據全燕抗衡中國遭值國家以仁德撫四夷屈以休兵與之講好慿藉祖宗百年蓄飬之恩因得私其土宇有其人民蓋自古昔以來其盛未有如此者也自禧僭立之後肆為荒淫無復法度再至燕京窮極暴虐燕人痛毒貫入骨髓而又出入輕佻斥去防衛嫚我使人笞辱儐者人怨神怒罪已貫盈譬如猛虎不自飬威而終日跳踉搏噬其勢窮力困當自斃踣此殆天亡之之時也今奚又首亂破其三州兵勢甚盛據諜報所傳殊未衰息密邇漢境休戚繫焉而守邉之吏未有深謀逺慮條畫上聞致煩聖訓委曲訪逮網羅設張究極終始此臣所以被詔震恐竊自訟其不敏而無所辭誅也臣材質駑下思慮短淺何足以贊廟謀之末議顧以方承人乏冒領帥事不敢不自竭其愚以塞聖問臣聞古之善用兵者在於觀釁而動所謂釁者固有小大強弱之形遲速逺近之迹善觀其幾而應以謀則動無不剋矣今奚人叛遼衆已盈萬止殺契丹不戮漢人其意蓋欲隂結其黨以為己助雖曰草竊固亦未易可量然既破三州未能長驅有所深入尚且屯聚於採涼山中不聞諜者言其有窺覦燕薊之意則虛實強弱亦未可以隃度也臣竊料之彼與敵戰而勝也則其志將愈大志將愈大必不肯侵犯吾圉以結中國之怨明矣使彼戰而不勝耶一旦豕突敢犯吾境則是乃吾之賊也邉吏當亟捕之夫復何疑其或戰既不勝而提其孤軍扣關請命則是特敵之一叛將耳以中國之大而納其亡人吾何賴焉又況隳盟約以啓寇讎決非朝廷之所樂為也臣愚以謂窮來歸我宜不可受深閉固拒理不獲巳既足以昭睦鄰之德又足以示中國之義禧雖庸材將感激沒齒不敢忘陛下之賜矣至其或者遼不勝奚敗北擾亂而思漢之民悉舉燕地來歸有司方是之時勝負之數既可見強弱之勢又可知應接斷於一朝竊謂未可逆決其去取也何則漢宣因胸奴乖亂五單于爭立然後擁護呼韓卒臣其國光武因胸奴自分為南北單于然後建立日逐終饗其利唐失河湟舊封至宣宗時吐蕃主弱大臣相攻兵拏不解然後唐不血刃而復三州七關已而沙州人張義潮以瓜沙十一州歸于有司蓋存亡之數成敗之形天時人事率相符合故臣願徐觀其釁最䇿之上也恭以本朝和戎之久講信之嚴自三代以來未見其比今禧雖荒縱不悛其於奉事中國亦未敢大失禮也然其國內不靖如此或是滅亡之萌兆皇天所以右助我宋而付屬陛下以燕之遺黎蓋必有日雖不可以後時而縮然尤不可以先時而起也自古王師之出要必有名故臣深願陛下靜而俟之不勝幸甚臣伏誦聖訓所以咨謀臣者可謂至矣而必繼之以有備無患仰見陛下凡所以周旋戒敕臣者要使之先備而預謀耳臣聞宣王伐玁狁復疆土必使之修車馬備器械漢髙祖欲伐魏聞其三將皆不及吾所遣也然後進兵自古待敵未有不先於自治者矣今防邉之備可謂致嚴矣然臣竊嘗以謂一堡寨官之能否乃一路之休戚一隊部將之勇怯乃一軍之勝敗故臣守邉日久每以選人材為最急自邉事平息以來本路奏舉大小使臣率多以不應格報罷今雖未有他警然求於倉猝顧安足以及事哉臣愚乞聖慈特降睿旨應河東河北緣帥司所舉大小使臣員闕權許不以有無違礙特行差注一次庶幾官無巨細皆得其人敵至則戰未至則守陛下雖髙枕可以無北顧之念矣至於軍中儲蓄尤為急務而邉臣廩粟每以匱乏為憂伏乞嚴飭計司多方積貯或果有急闕仍許帥司申請措置支降施行邉境之上既得可用之人又有可食之粟奉陛下之威靈稟廟堂之成算區區鼠盜不足置齒牙間也臣不勝昧死謹上宋欽宗靖康元年尚書右丞李綱上徽宗疏曰臣聞中國外裔相為盛衰非徒人為殆亦天數一昨金人緣藥師叛既陷燕山寖窺河北城壘相望而無藩籬之固牧守相視而無封疆之臣老將持兵望風先潰大河解凍乘桴競浮駿騎長驅於中原徑兵直指於魏闕以正月初七日迫邇都城劫掠士民焚蕩廬舍以大火船鐵騎攻水西門守衛之具辦於倉卒臣奉皇帝旨率勵將士誓以死守設械拒於汴流之中殺獲數千人逮曉方息復以鋭兵攻酸棗門一帶敵國之衆蜂屯蟻附渡壕臨城梯長如雲箭落如雨天地改色風沙晝昏人心震驚宗社危急臣奉皇帝旨將諸班直弓弩手救援躬冒矢石以摧其鋒令敢死士焚爇雲梯殺獲首領一人攻破其黨獲級甚衆敵兵乘筏以強弩射之往往沒溺障汴河水令歸城壕水勢漲溢自卯及午敵兵方退却知我城中有備始遣使人同李鄴等計議臣等糾集將士欲以死戰皇帝以宗社生靈之故務令持重始議通和使者旁午冠蓋相望纍日而後議成皇帝聖德格於曠古變鴟梟為好音化強暴為善類不愛金幣務保要害之地遂遣康王張邦昌使軍前悉如所請敵方退舍俟犒師之物以歸然邀求數多殫竭帑藏空匱民力不足以給之敵情難窺尤當預防臣見修治守禦之具訓練出戰之兵使敵蠲減所須之數果如期而退夫復何言萬一有跋扈之慿陵欲危宗社臣等當陳師鞠旅以圖進討神人共憤天必助之恭惟道君太上皇帝祗遹神考以武繼文天下稱其孝傳位聖子法堯禪舜天下稱其髙翠華南幸臣拘以職守不敢負羈紲以從艱難之秋冒處政機誓將肅清畿甸奉迎鑾輿矢心已明殞首何悔綱又上奏曰臣伏蒙聖慈以臣乞罷職任特降親筆令安心職事及蒙宣諭和議解圍兩不相妨若敵人必欲三鎮不免戰爭今則解圍之事不可少緩臣伏讀聖訓第深感懼竊以今春戎馬犯闕倉卒無備自當議和但一切如其所欲許以三鎮及金幣之數太多則為非是臣所以當時與宰執力爭者正恐貽今日之患非為不欲和而主戰也戎馬既退河北兩鎮幸自保全而太原之圍至今未解陛下既出師以解圍又遣師以約和議雖兩不相妨然敵情狡獪自春徂秋頓兵堅城之下而不退又以重兵侵犯河朔我師屢北而議和之使始行臣恐中國之勢益弱而黠敵之氣益驕矣且自秋以來沿邉探報金人日聚兵為南牧深入之計朝廷日罷兵如太平無事之時今中山河間真定諸郡乞兵告急羽書狎至宣撫司無兵可遣申奏朝廷又只行下宣撫司措置是徒以空文往復初無補於實用敵騎憑陵復有今春之虞將何以禦之臣纍具劄子乞再行起發後來罷止防秋人兵團結弓手之類未蒙施行伏望留神為宗社計募兵擇將以圖自強無謂和議之使便可恃以為安也如臣書生不習兵法不厯行陳大帥之任誠非所宜況今春危城之中陛下之所驅䇿者悉已去位而臣獨以非材尚叨重寄恐不知者謂臣黷武貪功為國生事招致人言陛下雖欲保全不可得也仰冀聖慈終始哀憐特降睿旨許臣守本官致仕糜捐之報期於異日干冒天威不勝戰越待罪之至吏部侍郎程振上言曰柄臣不和論議多駁詔令輕改失於事幾金人交兵半嵗而至今不解者以和戰之説未一故也裁抑濫賞如白黑易分而數月之間三變其議以私心不除各蔽其黨故也今日一人言之以為是而行明日一人言之以為非而止或聖斷隃度而不暇疇咨或大臣偏見而遂形播告所以動未必善處未必宜乃輒為之反汗其勢不得不爾也時金兵至河北振請糾諸道兵犄角擊之曰彼猖獗如此陛下尚欲守和議而不使之少有懲艾乎上嗟味其言而牽於外廷不能用監察御史余應求乞將相勿爭私忿早定和戰之計上疏曰臣嘗讀六月之詩有曰文武吉甫萬邦為憲又有曰侯誰在矣張仲孝友蓋宣王既使文武之將征伐於外矣若內無孝友之臣以與王居則讒毁之言日至忠謀不見用雖有吉甫烏能成其功哉至唐穆宗則不然裴度以元臣宿望出討幽鎮烏重嗣李光顔皆一時名將勢若甚易而元稹用事恐度有功妨已進取所畫軍事皆從中沮壞之故屯守踰年迄無成功夫內外之事相須如此可不鑒哉方今強敵入寇四郊多壘講和之計雖決而金帛之數未足兵將之勢已振而師出之日無期是宜內外之臣同心一意共議國事以雪耻辱之時也而道路籍籍皆言宰執大臣與將相異謀朝夕喧爭未有定論審如此豈誠心為國者哉夫和親征戰之説漢廷臣論之詳矣今日之䇿未可偏廢然金幣既不足敵人必不肯退師又三鎮三關之地向以兵力寡弱不得不姑從之今老將援師繼至而城下要盟神弗信也若敵人必要金幣之足與三鎮三關之地又豈得憚於用兵哉陛下既以兵事委李綱與諸將矣願詔執政大臣以孝友張仲為心和以濟事無爭私忿先公而後私庶幾大功可立如或不悛與夫妨功害能之人當顯出之求所謂孝友者而任之可也雖然戎馬在郊城門未啓中外不通巳再旬矣和戰之計亦宜早定願詔宰執將帥僉議於黼座之前使將帥出師與之對壘然後遣辨士以利害禍福成敗曲直與之言若能休兵講和以繼好息民䇿之上者茍貪婪而無厭旅拒而不受陛下雖欲勿戰得乎又況事直師壯人有鬪心以宗廟社稷之靈何憂不克所可慮者窮寇逺來自居死地奮不顧身之時也願更詔將帥持重應機無輕接敵以取萬全之䇿不勝幸甚臣一介書生不知兵謀忠憤所激欲默不能惟陛下財擇朝説之應詔上封事曰二月十六日朝請大夫賜紫金魚袋臣朝説之謹昧死再拜上書皇帝陛下比者皇天眷命陛下即位之七日下詔求直言天下幸甚微臣居山邑距京師越百里而近踰月得隨士庶垂淚以伏讀干戈風塵阻絶如此不謂國家遭陽九之厄也女真一旅矜棘入塞擁馬渡河曽不淹時勢如壞山直底王城之下嗚呼天乎忘我祖宗配天澤民二百年之基業乃一日有斯酷耶在昔春秋之時周室衰微天下無王諸侯相侵莫酷於城下之師莫辱於國中之盟孔子春秋用是作也孰謂國家聖聖相繼重光洽熙天下太平自結繩而來未之或有天子坐廣內朝四夷而牧萬國曽不足以為輕重威至廣也乃於女真小敵平昔服屬髙麗臣事契丹者逡巡偃蹇乃有城下之師國中之盟何其甚耶義士痛心壯夫瀝血孰甚於斯時耶臣至愚且老敢齒於義士壯夫而逖視樵牧思謀妾婦思勇之際寧無一言以自效哉況臣一門七世食祿髙祖回咸平景德之際極禮樂文章之譽曽祖宗慤寶元康定之時專任西鄙之役遂參大政罷兵息民自爾以來海內推臣族為文學之家微臣之言亦其職也雖然臣在元符末上皇即位之初嘗應詔有封事蒙有司第臣為邪等著籍刑部初禁入京城漸許仕宦而擯斥卑竄二十餘年矣其所言皆天下大利害今莫能悉記唯是二事不能忘也一曰國家纍聖功德巍巍無所與二而近日諂諛大姦獨推尊考廟是觀德不在七世之廟而下同庶士祭行於寢乎二曰自古衰世暗君乃有誹謗先烈之言以鉗天下之口唯我神宗皇帝何所負於天下天下內外罔有一人不足於恩德者尚何謗毁之有彼諂諛大姦濟以凶暴徒以資一身之欲而不知上纍先帝之明也臣愚欲因此二事申言當今之急務豈顧卞和之玉再刖其足耶竊惟城下之師明主夙夜焦勞憂慮之時狂夫之言未暇擇也伏覩戊申大赦強敵逋遁齊民乂安凡有血氣之屬咸以更生相賀又不必自言也含哺鼓腹以沐太平之澤不知其已雖死猶生也然赦文有新邉之語讀者疑焉識者則歎妄以謂涿州易州之地竟不能保而復棄之為新邉也既而乃知所謂新邉者河間府中山府太原府三大鎮無慮二十餘州五六十縣自州升之為府而未幾乃自中國棄之為新邉也耶嗟夫斯地可棄也斯民其可棄乎斯民可棄也吾祖宗艱難之業其可棄乎嗟乎誰為陛下而為此䇿乎昔賈誼不忍以文帝之明承天下之資而久為戎人欺傲乃歎曰可謂中國無人矣臣竊考之當是之時高祖之舊臣猶有在者如陳平周勃灌嬰季布之徒其後進者議論有袁盎朝錯賈山馮唐守正有宋昌申屠嘉司刑有張釋之司兵有周亞夫柴武誼尚何恨哉使誼尚在謂今之日有人無人乎臣於是乎忘其至愚且老不能默已請專以割地為言未暇及天下事也唯陛下幸察臣元符中知磁州武安縣嘗作朔問二篇因杜牧之論而發也牧之意則勤矣其論失之迂而不密蓋山東不足以兼河北而河北為能制山東牧安得以天下之勢專之於山東也哉凡君天下者得河北則得天下失河北則失天下凡有國者得河北則其國興失河北則其國弱又有其國雖不正而得河北則強其國雖正而失河北則弱其國雖無道而得河北則強其國雖不至無道而失河北則弱秦漢晉隋唐之有天下宋武帝之不能有天下苻堅之秦拓跋之魏朱氏之梁李氏之後唐石氏之晉劉氏之漢其國所以強弱之勢與夫曹氏之魏強於劉氏巴蜀之漢髙氏之齊強於宇文氏崤函之周其迹昭然在方䇿可考不誣是謂河北之形勢臣敢為陛下略言之陛下幸察臣既言河北重於天下矣乃敢復言三鎮之重於河北者不必繁引逺古唯事與國家造邦相因者則不得而略昔周世宗之英武雄毅實漢光武唐太宗之流承石晉父事契丹之後劉漢禍亂於契丹之餘即位僅踰兩月黃鉞親征而師出之日四壘奔北為我有宋驅除晚以數千之師伐契丹不血刃而取益津關繼取瓦橋關又繼取髙陽關是三關者晉人棄之以為契丹之元首非特為其右臂也何則契丹之所盜據者六國時燕地也唐方鎮中盧龍也六國之燕最弱非韓魏趙之比河北方鎮中盧龍亦最弱朱滔朱克融輩非魏博田承嗣鎮冀王武俊之比而其人堅忍竒倔藏禍心畜凶謀前有太子丹荆軻之風後習安祿山史思明之態易以興亂而難與圖治也以故雖曰弱燕而常重於趙魏雖曰隂燕而常動搖乎魏博鎮冀之上棄之以與契丹固非所宜況以奉契丹之叛臣女真小敵者審其情狀得幽薊則潛窟壤得三關則遊粟積其勢倍萬也然克是三關者雖曰周世宗之英武而我太祖太宗實在師間也世宗嘗以千人之軍溺於亂流叢葦之中而契丹不敢以一鏃來加者以三天子之威靈在是也其克瓦橋關者又專在太祖之功也夫以三天子之威靈而得之者乃一日無名而棄之於一荒裔小敵豈勝慟哭之痛哉又如晉開運之末出帝之醜先自梁漢璋覆師於髙陽關遂使契丹侵鎮定入京師縛晉帝而北其在咸平中康保裔敗於髙陽關契丹遂得犯澶淵儻如康保裔無髙陽之敗則不勞真宗皇帝為澶淵之役矣髙陽關之勝敗猶繫中國之輕重如此忍論髙陽關之存亡邪廊廟之上肉食者宜為陛下念之中山府唐義武軍也此軍甲兵雄於天下城壁堅髙自昔有揖客三年不得上之語況又其帥獨知臣節昔號河北四叛之時義武不與後稱河北二寇之時義武亦不與也逮黃巢之亂中原四方諸鎮孰為勤王之師獨義武王處存擁兵渡河以解關中之急不幸石晉之梁漢璋敗於髙陽契丹遂得犯鎮定攻中山然契丹之兵亦豈能必勝而前為入京師之舉哉亦且屢危矣唯是張彥澤杜重威以禁旅重兵至中渡橋降於契丹而中山李商者納契丹於中山使契丹遂得入京師成晉出帝之禍為中國之醜向使髙陽完師中山堅璧寧至是邪咸平中康保裔既敗於髙陽而定州之望都且復失守遂勞真宗皇帝革輅親征而傅潛擁十數萬精兵屯中山不出一騎當斯之時逺邇愚智無不憤疾潛者耻與之俱生無幾何革輅班師之後潛議罪當斬真宗特賜其首領竄斥之衆議甚欎也至今聞者擊指奮袂而起孰知真宗聖意自有在也豈臣下所易窺哉蓋潛實白首老將耳目親接晉開運之禍變今坐擁十萬精兵以完中山示怯於契丹勿擊堂堂之陳勿當得意之鋭脫彼能至澶淵必不能渡河待其將成渡河之役我出中山十萬蓄鋭請戰之師一舉而蹙之彼契丹雖衆豈堪填吾洪流而代吾灑掃也哉彼或不克渡河我以此師覆其歸路片馬隻輪定不返矣恭惟祖宗無失刑真宗豈特私一傅潛也哉真宗清淨垂拱之君不惑於羣䇿而決意親征不以王超石普楊延斷契丹之歸路不斬傅潛之不濟師巍巍然振乎千古之上矣中山之形勢其何如哉唯我祖宗為能用中山之形勢也何則在戰國時介於魏趙之間屹然自成一國其地雖狹而謀至廣其人雖寡而材最武西足以抗秦北足以制燕無論趙魏也所謂中山君者是也太祖太宗時每嵗防秋之兵全師聚於定州真宗躬置禦戎之陳以鎮定髙陽諸路之兵並會定州夾唐河為大陳量蕃寇逺近出軍建柵仁宗謹是祖宗之制積粟則中山為多畜兵則中山為重命帥則得韓琦焉至今廟而祀之嵗時嚴也太原府劉氏盜有之太祖皇帝親往而未之克留以待太宗皇帝特封太宗為晉王逮夫晉王即皇帝位之四年親征克之於是有宋受天明命平一天下萬國罔不臣妾逮今將二百年重惟太祖皇帝號令之所加鼓鼙之所及一日削平唐末暨五代百年之僣亂曽不足以摧枯拉朽諭之乃於太原獨艱難如此何邪劉繼元雖孺子也有郭無為之謀侯霸榮之勇其兵嗜戰不怯死其民樂土不輕去且復念曰太原吾父兄之世有也吾家所以革晉為漢者自太原基之也彼石氏有天下者亦自晉而得之遂以晉自命也晉篡李氏之唐而李氏所以為唐奪朱氏之梁者初實起諸晉也其上則髙祖太宗所以為唐者晉奉之也楊氏所以為隋者晉肇之也髙氏所以為齊者晉大之也司馬氏以晉自命者實謂受命於晉也其在成周宣王承厲王之亂號為中興者伐玁狁於太原也其後王師敗績於羌氏之戎王乃料民於太原是太原為成周之盛衰者又如此也嗚呼太原之為鎮可輕畀付哉重以太宗皇帝之神武念太原久未下顧視羣臣誰可與議者首詢之張暉暉曰戢兵育民待富庶而後為謀繼詢之張永德永德曰太原兵少而悍加以北戎為援未可倉猝取也莫若先離其戎心又詢之薛居正居正曰太原自古難克之國周世宗之伐至於師老太祖破北戎於鴈門關南盡驅其人民居虎牢以西雖巢穴尚存而危困已甚卒得曹彬而謀之問曰顯德開寶兩征太原以當時兵力不能克何也帝意豈不深哉彬能身任其役帝遂決意親征躬貫介胄曹彬潘美郭進等為之將先以進守石嶺關禦北敵乃降繼元平太原保全其人民而毁築其城郭將貽萬世之安也嗟夫兩朝三帝二十餘年而得之者一日甘心而棄之邪或謂唐自安史之後河北遂非朝廷所有亦何害乎為唐也哉臣應之曰唐之河北固重而失之然其據太行津大河以制河北太原猶在朝廷也此李德裕相武宗毅然以身許國不赦澤潞卒能號令鎮魏以誅劉稹成一代偉績也以兵論之河北之鋭師固為三鎮而飛揚然太原青州各有兵十萬邠寧宣武各有兵六萬自足以制彼三鎮矣今又并太原而棄之古未之有也太原唐重兵之地今棄之矣而青州賊盜久熾又未必有如唐之重兵也邠寧之兵凋殘於近嵗未易並言唐之宣武是謂今之汴都祖宗以重兵威天下千百倍於唐宣武之兵也太宗時張洎為能言京師之兵制固於唐之兵制仁宗時尹洙又能言京師兵制出於秦漢上非特與唐室論也後來者宜不復措意開口於斯也奈何初變更於王安石卒殱盡於童貫天下之勢墊矣惟陛下念之天下萬方臣妾不勝至願而三鎮之形勢臣愚略陳之矣臣前謂國家無名而賜之者敢復言之大凡王者慎一嚬一笑不易以假人不知此三鎮於一嚬一笑孰輕重哉謂此小敵為有功則隋唐因突厥之兵以有天下唐郭子儀嘗以回紇南蠻大食之兵而興復中國矣安得人人賜之土田也哉惟石敬瑭父事契丹假其兵力以即帝位割燕以委契丹而魏趙之地猶不與也謂其能戰則彼荒絶遐陬疆場不相接未嘗一日當中國仁義之師也亦未嘗一日聞中國雷霆之音也果孰怯而孰勇哉但聞勃海者髙麗之别種也女真者勃海之别種也髙麗臣事契丹而女真國因髙麗以臣事契丹者也在祖宗時嘗因髙麗以入貢而昔困於契丹之三柵求救於淳化之初也其後國家絶髙麗而不與之通女真遂亦自絶於中國逮熙寧初國家復與髙麗通而女真方狃於契丹不得與也奈何一且凶謀傾奪契丹之國出其故君空其寶貨而狂肆之心不能自已遂欲陸梁於中國哉在祖宗時嘗來寇我白沙寨略官馬三匹民一百二十八口適其貢馬之使在京師遂執之不得還無幾何渤海入貢而渤海之酋為謝女真之過遂詔還女真之使不知今日女真之暴逆不恭自干天誅孰與三馬百人多少在祖宗之令當如何哉議者曰奈其頓兵城下何請責之曰唐廣德初突厥自涇州犯長安至於代宗幸陜而郭子儀帥師則吐蕃望風遁去越二年僕固懷恩以吐蕃回紇羌渾二十萬寇京畿郭子儀以回紇伐吐蕃而難平皆未有割土田以奉之者也恭惟陛下始初清明之時天以小敵警懼陛下增修盛德巖廟之上肉食者必有長駕逺馭之術三鎮已復歸於職方氏矣顧惟踈逺小臣必待百官班賀之後乃得與昆蟲共慶也雖然臣猶將有所陳者唐杜牧最善論兵謂上䇿莫如自治漢皇甫規善用兵而先零諸種羌慕其威信相勸降者十餘萬則以威信為干櫓也規之言曰力求猛敵不如清明勤明孫吳未若奉法皆自治之道也又如程苞於板楯蠻但選明能牧守自然安集不煩征伐亦知自治者也陛下誠得如皇甫規之有威信者為師師程苞之明能者為州郡則三鎮之復為王土可指日而期也然而此則邉埸之臣自治之道也若夫人君之自治者無時而不然尤見於變亂之後猶之治兵也漢路溫舒嘗為宣帝言之曰齊有無知之禍而小白以興晉有驪姬之難而重耳用霸近趙王不終諸吕作亂而孝文為太宗禍亂之作將以開聖人也文帝永思至德以承天心崇仁義省刑罰通關梁一逺近禮賢如大賔愛民如赤子內恕情之所安而施於海內是以囹圄空虗天下太平夫繼變亂之後必有異舊之恩此聖賢所以昭天命也溫舒於是逺不及髙祖近不及武帝可謂知務矣其視東方朔對武帝之化民不言堯舜而言文景尤著明也今陛下繼變亂之後思所以昭天命者其不在仁宗乎凡溫舒之稱文帝者實為吾仁宗而云爾也核而論之仁宗於斯天德加以嚴恭寅畏翼翼而純矣漢文未必無愧色也且文帝在位二十三年逮其嵗晚頗惑異端孰如仁宗在位四十二年日慎一日圖治愈切求言愈急用賢愈勤正德愈勵使漢文加之二十年之後不知又果如何也語曰不知其君視其臣漢文之臣略如前之所陳者矣孰如仁宗初相王曽李迪吕夷簡晚得杜衍文彥博韓琦富弼其在內外大小華國命世之臣蔚乎不可稱數也其用之未盡留以遺子孫者吕誨范鎮司馬光吕公著皆社稷之衛也陛下今日繼變亂之後誠能得臣如仁宗時不開邉以玩兵不專利以殘民不急刑以殺士不禁言拒諫以自蔽則何慮乎女真小敵是謂大有上九天祐之吉無不利之時也是謂洪範九疇彛倫攸敘之時也儻或不然使梟鳴嘉木之上蛭毒清池之中如漢幸而有皇甫規張奐為將而不幸胡廣趙戒為相其中則張遜假圭曹節輩凶閹為之虎狼唐幸而有郭子儀李光弼為將而不幸元載盧把為相其中則李輔國程元振魚朝恩輩凶閹為之虎狼則天下之事去矣是謂困之六三困于石據于蒺䔧入于其宫不見其妻凶之時也是謂洪範九疇彛倫攸斁之時也嗚呼天下治亂興亡之迹出一轍也如此其在治世既有明君則有賢相而將臣自出矣臣雖至愚不願國家獨以將稱而無相也昔者賈誼慟哭於明時不勝其忠也阮籍慟哭於衰世不勝其憂也當今執政大臣必有撥亂之才幹國之器請為陛下念之臣前所謂大有上九自天祐之吉無不利者乃自乎六五之君厥孚交如威如吉也六五有信以交乎天下終以威乎天下是謂德威故能以一柔用五剛使上九受天人信順之助吉無不利也大有之君於是乎得以遏惡揚善順天休命如其惡者不遏則善亦無自而揚何以為大有之休命也大有一變而為乾乾之德首在剛健而後曰中曰正曰純曰粹曰精也人君之德固宜先之以剛健而繼之以中正歸之於純粹精而天下何難乎為治哉臣愚言不識忌諱陛下赦其死幸甚臣前所謂朔問二篇者今輒隨封事上進以備乙夜之覽重增死罪陛下赦之幸甚臣説之昧死再拜侍御史胡舜陟論髙麗人使所過州縣之擾狀曰臣伏以漢建武時西域請置都護送侍子光武不許唐貞觀中髙昌王將入朝西域諸國欲悉遣使奉獻魏徴以為不可太宗從之皆不欲以蠻夷敝中國也髙麗敝我國家五十餘年矣政和以來人使每嵗一至淮浙之間不勝其擾所過州縣官私船盡為用驅村保挽舟一縣有至數百人田桑之時農業盡廢州縣前期勾集保丁多致凍餓失所沿流亭館寺觀悉陳設排辦所用之物皆出於民官吏督迫急如軍期吏緣為姦民無所訴更有官為之提轄事過有須索州縣尤畏之鞭笞取辦於民故淮浙間言髙麗一過甚於遭寇朝廷所得貢獻皆玩好無用之物所費皆帑藏之實民之膏血近嵗錫豫尤腆所費不資而有一路饋遺燕勞之用約數十萬緡髙麗人貪利唯欲數至臣不知朝廷蠧國害民以待此小醜果何用耶有為害之大者彼昔臣事契丹今必臣事大金二敵能制其死命而我無如彼何故畏敵而不畏我所得賜豫聞與之分我之山川形勢兵旅衆寡財用虛實往往窺測以報敵人如此不唯有所煩費實養虎遺患豈非為害之大者乎臣近見兩浙路申髙麗人使入朝非久到明州臣恐復如前日騷動淮浙蠧耗邦財今日聖政一新悉革弊事以撫養吾赤子伏望陛下以漢光武唐太宗為法勿使入朝實國之利如使人已到明州止令本州遞表入進遣還使人大率高麗入貢於國於民有害焉於州縣贓吏小人有利焉臣願睿明察此去數十年之弊病以慰天下企望之情歷代名臣奏議卷三百四十七
