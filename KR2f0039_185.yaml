body:
  text: 歷代名臣奏議卷一百八十五明楊士竒等撰去邪宋寧宗時衛涇論新除司農少卿張鎡乞賜竄責狀曰臣仰惟陛下奮發乾剛誅鉏元惡中外慶快萬口一詞惟是更化之初一黜一陟天下觀瞻所係不容少有差失儻使姦人投隙而進豈不致中外之疑謹按新除司農少卿張鎡很甚虎狼毒於蛇虺立朝則猥賤而無耻居家則瀆亂而朋淫其回邪姦慝之迹雖盡南山之竹不足登載而前後亦略見於臺臣之章疏矣若其凶殘著於心本奴婢廝役之徒少忤其意必潜置之死地當蘇師旦用事之時鎡傾其故弟家財強抑孤女與師旦子為婚其女出嫁之夕號泣登車指鎡而慟曰叔要做好官却以我嫁書表司之子聞者為之悲感有銜不怯卒殞非命自此益得罪於公議不復以人類待之廢放終身猶為僥幸忽傳除目大駭聽聞轉相顧語莫測其端識者尤為疑懼況張鎡既為師旦姻家情好稠密崇資顯秩皆自師旦得之師旦既斥每懷觖望近正典刑當益懷鞅鞅既為刑人死黨豈宜置之卿列而俾近君側乎臣職在彈劾若不於幾微之始亟鉏其姦設或鎡交結非類益肆梟張則為國蟊賊將有不可勝言者用敢冒昧以聞伏望聖斷將張鎡削奪官資重賜竄責以清朝列以杜姦萌中外幸甚取進止十一月十五日三省同奉聖㫖張鎡特降兩官送廣德軍居住涇又論朝議大夫易祓太常少卿朱質朝奉大夫林行可乞賜鐫斥狀曰臣恭惟陛下奮發英斷雷厲風行元惡巨姦一朝屏殪兵民欣快夷夏聳聞宗社幸甚然以托胄自強秉政日久中外之士被其汲引安於平進無所阿附者豈無其人勢亦難以盡責之若夫朋姦罔上長惡怙終為天下所指目者安可置而不論乎臣謹按朝議大夫易祓器識卑凡貪躁嗜進學舍優選歆艷士林使之稍加涵養自可馴致通顯繇館學而攝詞垣蓋鄉用矣一旦托胄畀蘇師旦以節鉞猶有憚於物議祓乃懷章詣師旦之門極其褒美有文事武備及智名勇功之語傳者唾罵形於譏誚既而懷不自安求居諫職以鉗衆口士行已掃地矣遂愈無顧藉凡可以投合者靡所不為托胄竊弄威福怨嫉既多密圗兵柄以固其位鄧友龍倡用兵之議易祓和之更互表裏專務詭隨去年之春托胄意雖已决然未卜人心之從違祓乃獻說張大敵中之事使廷臣條具易祓首言敵人有必敗之勢中國有必勝之理又曰敵國如外強中乾之人僅延喘息易祓號為儒生豈無見於利害之實徒以意在逢迎不復體國托胄始欲加罪異議而廷臣言不可者什七八卒亦無如之何易祓果得為諌大夫復力主兵說方其遣從臣宣諭荆襄也止以賑恤流民為詞人尚疑信及易以宣撫則中外始知其必妄動同列有力爭者易祓鄧友龍相繼論奏遂至貶斥而師已出境矣逮友龍以喪師罷黜祓自知其敗露佯為大言以宣威自任欲蓋前日之繆妄且師旦之麻祓寧不知其不當草托胄亦不強其必從祓諂附師旦攫金而不見人慨然援筆師旦既敗托胄每對客鄙笑之主持用兵本欲附㑹托胄以茍富貴至誕謾之不可掩則雖托胄亦厭惡之矣未幾而果逐去易祓知有權要而不恤國計兵釁一動貽禍生靈祓偃然家居坐享祠廩其心亦自安乎朝請郎太常少卿兼權吏部侍郎兼侍講朱質趣操回邪心術傾險䇿名髙第榮進素定初任回改秩即授學官具有舊比質既欲速乃於任未滿之前力求特薦有審察之命已不安分義矣入朝甫閲四載以著廷權郎朝廷待遇不薄不自愛重日事奔競至投拜李士謹以結蘇師旦或謁不得入則伺候終日趑趄受命閽人館閣之彥當如是乎師旦雖揄揚於托胄而未有以中其意也去嵗正旦北使來廷偶閣門詔相差誤致北使舉止周章未為甚失禮也質知托胄意在尋釁遽上章乞斬北使師旦言於托胄謂質天下之竒才且訝廷臣不知出此質由是進見無節竟得諌官遂與易祓更相附和形於章奏無非迎合如曰方今指義旗以行天討弔遺黎而復舊疆來蘇徯望之久雲合響應之勢摧枯拉朽指日可俟不知質何所見而云爾耶丘崈之在督府斟酌事勢嘗遣小使往通和議北使一再回答指言托胄不及其他托胄怒其不與回護直以上聞諷質使言質即上疏醜詆務快其意雖不厭公論不恤也質既盤據要地自謂莫敢孰何每肆劫持之言謂可以聾瞽上下而不知人之視己如見其肺肝托胄亦始覺其非矣乃移之奉常質盍自圗去就乃復乞憐於托胄自述其宿昔奉承之謹求兼吏侍仍廁經帷前此卿監郎曹之兼講讀或出於一時擢用者有之其罷臺諌而仍兼講讀者惟陳讜嘗冒處旋即論去質居之安焉且以張栻自況多見其不知量又其大可罪者近日陛下竄斥托胄質自以失所依賴纍若喪家之狗荒廢職事奔趨他門止復為庇身之所至有拒而不納者夫子曰茍患失之無所不至矣有臣如此尚可使居獻納之任侍清閒之燕乎至若朝奉大夫林行可者狀類鬼蜮心同蛇虺褊狹多忌深峴莫測兩宰劇邑粗有能稱而大體不正貪榮嗜利背君忘親其人之賢否可見矣陳自強冒居政地即引為六察以為己助二年之間躐處臺端凡所論奏無非奉行權臣風指暨以憂去書問交通殆無虛月每遇托胄生日餽獻之禮不違時刻托胄亦拳拳於行可率朝至暮報常許還以舊物夫居喪而通問於人在禮必有甚不得已者而行可念弗及此一意趨媚事親不孝其能移忠於君乎去夏六月蘇師旦敗行可未及知致書師旦囑浦城宰陳至和轉達書題稱為恩府節使相公至和急封還之已為一士夫所見相與傳笑行可身為臺諫顧稱奴𨽻為恩府其茍賤亡耻抑可知矣其居鄉也嘗以舊臺諫自處縱容親黨陵轢州縣福州因買銀事有親戚占吝富室無禮縣官邑宰林洽稍加懲治行可大怒帥憲為之斷遣數人猶未快意必欲作草大臣上疏論奏以欺脅愚民搖撼邑宰幾至不免夫臺諫朝廷紀綱之任豈行可恣睢鄉曲之具乎服闋被召處以奉常清選怏怏不樂諂佞百出一日見執政忽言平章可謂與天同心衆人以為當用兵則從而用兵衆人以為議和亦從而議和夫兵陛下之兵也豈衆人所得可否而托胄所得專決與天同心之語豈所施於臣下乎托胄之擅開兵端不特士大夫知之閭閻小民亦知之不特中國知之敵人亦莫不知之方丘崈之遣小使也書詞未嘗不為之歸過於鄧友龍皇甫斌輩而敵帥貽書直謂托胄既為太師平章軍國使無意於用兵則師旦輩豈敢專擅由是言之則首謀姦臣其為托胄明矣夫逺而敵國亦知兵端起於托胄而行可獨不知之不過巧為諂辭為托胄文過而已欺君負國孰甚於斯卒自奉常晉長諫省又見外議籍籍謂國事至此咎將誰歸推所從來將不利於自強托胄必去異議者然後可安遂有一網打盡之謀夫托胄專擅日久自強依阿取容人畏凶焰莫敢指言䝉蔽之禍將不勝救而行可又欲盡逐異議是將使陛下左右皆托胄自強之人而後已此其意欲何為耶臣前所謂姦險之徒樂為之鷹犬者易祓朱質行可其人是矣夫托胄之姦惡易祓導之於前朱質助之於後行可成之於終今托胄既已竄殛而三人者使得佚罰則何以快人心之憤鬱昭國憲於陛下更化厲精之始乎臣愚欲乞睿斷將易祓朱質林行可重賜鐫斥終身不齒以為士而不顧行檢自棄名義朋姦罔上長惡怙終者之戒涇又論宫觀鄧友龍乞賜鐫黜狀曰臣聞國家之大柄賞罰而已昭勸示懲維昔盛時未嘗廢一是以公道興行人心恱服臣伏見與宫觀鄧友龍始焉立朝頗得士譽慷慨自許亦足稱尚朝廷以其勇赴功名之㑹未暇詳考才諝之實畀以重權不從中御而友龍踈闊脫略乏持重之操阻愎迷暗無臨敵之算所以許之便宜正應斟酌彼已審量進退設若未得機便不厭反覆論議以圗萬全而友龍不思委寄之重無虞心而務輕信上違指授督趣師行遂使績效未暏憂顧方深職任宣威咎將誰執所幸陛下明見萬里察其負勝改授宿望友龍自宜上章引過屏息俟命傳聞道路尚乃偃然自居猶覬入臺就職紀綱風憲之首當如是乎雖陛下曲示保全賦以祠祿然既辜任使遽得優閒懲勸不明公論未塞欲望聖斷將鄧友龍特賜鐫黜以彰國典天下幸甚涇又論蘇師旦狀曰臣仰惟天眷宗社啓佑聖衷奮發英斷斥竄凶惡一正君臣上下之分方陛下躬攬萬幾之始號令之行當若風雷之震蕩然後可以聳動羣聽收還主威臣猥以庸虛乃於斯時誤膺親擢濫長憲府拜命之日即具二凶罪惡彈劾繼而諫臣論奏給舍繳駮萬目傾注以觀陛下維新之政而側聽四日未䝉施行臣考其故乃因臣首章中小貼子論及蘇師旦本托胄奴𨽻因賣鬻將帥縱使托胄竊弄兵柄使托胄上至誤國下不保家師旦未正典刑輕重失序師旦既敗即有三省樞密院人吏史逹祖耿柳董如壁三名隨即用事賄賂公行向來師旦所賣者軍帥而已三吏用事以來監司郡守職事官亦以貨取托胄進退用捨惟三吏之言是聽以至調發軍馬移易兵將科撥錢糧同列皆不得與聞雖三吏視執政亦蔑如也恣橫如此其誤托胄多矣加以陳自強未第時又嘗館史達祖家身至宰輔止以弟行呼達祖為兄士大夫茍賤亡耻者干求差遣必先登達祖之門有若市井論量物價專以金帛之多寡為豫奪傳聞四方有史丞相耿參政董樞密之謡公吏之用倉法謂之重祿贓滿十貫配廣南自有成憲初不以官之崇庳為間三吏之贓蓋不知其紀極也況托胄自強皆已誅竄托胄又至家破師旦乃安處善地而三吏各擁厚資遍求關節臣所奏文字已得㫖依徒以三吏之故稽留敕命委曲求全是陛下刑政獨行公卿而不行於胥吏何以服人心何以令天下且臣之章為三吏而沮格不下亦何以厲風采振紀綱上副陛下大有為之意乎是以不避斧鉞再冒昧以聞伏望陛下特賜睿斷行下廣東提刑躬親臨視將蘇師旦處斬仍下大理寺將三吏盡情根勘依法施行以伸國憲以快公論不勝幸甚涇又奏按郭榮乞賜鐫黜狀曰臣照對湖南飛虎一軍自淳熙間帥臣辛棄疾奏請創置垂四十年非特彈壓蠻猺亦足備禦邊境北敵頗知畏憚號虎兒軍開禧用兵蓋嘗調發緣統御無術分𨽻失宜兵將素不相諳枉致銼衄人皆惜之今盜賊平定正賴主兵官潔已奉公撫摩教閲振刷士氣茍任非其人專事貪刻利害非輕關繫帥閫臣安敢避仇怨不為陛下陳之臣伏見武翼郎飛虎軍統制郭榮貪鄙庸繆全無知識昨因峒寇竊發鄂州差榮部領大軍五百人前來防托擁兵飬寇初乏戰勇夤緣奏功進官三等就升統率賞之可謂厚矣盍思奮勵上報國恩自領軍職以來一意掊斂豐殖囊橐巧事苞苴侵盜官錢虐用士卒未易縷數姑托其害軍政者言之榮𨽻籍鄂渚因遂家焉比嵗遺漏延燒私室及房廊之屬輒支破軍中錢物以修寨屋為名買山斫木結縳簰筏順流而下役軍匠修治熟材製造窗隔動使不時裝發至於燒造石灰木炭亦載往鄂渚皆付親戚嚴三官人者變賣乘時射利厥直倍增掩為己有其軍兵般運往來之費則責其自備至於本軍打造衣甲器械自臣到任節次支撥錢㑹二千餘貫榮所創置十不二三多因向來討捕關出器甲已行銷破既撤戍繳納不曽收附樁留軍中初間補緝呈㸃稍似從實已而用吏胥之計移舊換新工料鹵莽妄作支破錢數轉多悉贏落以為利至為軍典持厯告論減剋鐵炭物料案牘具存其貪黷猥屑尤可駭者如差出戍兵責令回易深入二廣收買箭簳牛皮軍須等物每遇江鄂荆襄戎司差人計置或托其收買即增擡髙價取利歸已此何異市井販夫豈管軍所為乎其更戍將佐回司必抑令以回易息錢買納銀兩盡入私帑稍不滿意生事捃拾或遭毒手及將佐闕額保明升差不較勞能止以賄賂多寡為可否本軍有營田莊有房賃有租地錢有營運錢本以偹器械修營寨充激賞悉肆侵漁所餘無幾士卒不堪勞役重以刻削貪困多有逸而為盜潭州嘗捕獲強劫乃本軍劉勝為首當廳引問聲言統制掊刻軍人不容存活又貽怨於軍中者本軍舊有漏澤園一所士卒葬埋之地榮遽墾闢創立亭館種植花木以偹遊樂及布種粟豆謀取微利揮鋤之際白骨紛如過者傷心榮不恤也古之良將師入敵境猶不伐墓夷父兄之墳壟使其子弟見之誰獨無是心乎稍有識知寧忍為此臣自去冬已見物論騰沸屢行告戒仍出榜禁戢榮懷不自安嘗欲陳乞離軍差遣臣冀其猶有悛心或圗後效遲遲纍月見其循習故態溪壑無厭不復自新之意不容但已矧方敵人內訌所宜練習軍伍警戒不虞如榮之貪狠刻薄素失士心平居暇日已懷怨憤脫有征調孰肯用命若不亟行斥逐必致誤事無疑是敢煩瀆天聽儻以其山前討捕曽宣微勞與免根究亦乞睿斷將榮特賜鐫黜少懲貪刻别選公亷材武之將表率士伍修明軍政俾還舊觀以為一旦緩急之備不勝幸甚劉光祖上奏曰臣猥以非才待罪憲府僅踰兩月數糾官邪一一䝉陛下主張施行臣之感奮自惟隕身不足為報近者竊見陛下潜邸瑣𨽻吳端除帶御器械諫臣三入章疏陛下御筆批出可依已得指揮緣此夀皇潜邸人孫璫亦萌意干求轉行觀察使給事中封還詔㫖御筆又令書讀旬日之間疊此二事人言籍籍仰議聖明臣職彈劾應臣寮不安分守僥求無厭者正在彈劾之科今吳端孫璫輒敢踰分干請臣不即時彈劾已是職事不修竊緣諫臣後省既已有言不須臣更入文字今來以二瑣𨽻之故而使給諫論奏不行僥幸大啓又勤人主親批訓止事體異常臣若喑默不言豈不仰孤陛下任使臣謂天下至大所以統臨而維持之者不過恃主權之尊綱紀之嚴名器之重執此三者守而勿失而已矣今以吳端孫璫微瑣小人而屬鞬之任職躐等威亷車之選班為侍從使軍功武力之士戚里勳舊之臣或耻與之列或羞居其下其為名器不已輕乎諌臣論列後省封駁是其職所當然今乃重改二人之除授而輕違給諫之本職其為綱紀不已虧乎人主之威天也天豈可瀆而小人無識祈恩求寵遂令人主命令既輕及至臣寮有言又屈陛下手筆訓諭其為主權不既䙝乎是二事者可謂一舉而三失矣臣若不言為負陛下言而不行又增人主之一失是臣所深懼也然臣斷然有所控奏者臣伏觀紹興聖政講筵所祗應人以經進書推恩內門下後省私名慕允中換進義副尉仍與不作非泛補授左司諌唐輝論列乞追改之髙宗曰既有例當依例施行席益曰此事固有前比當如聖㫖施行然副尉而煩諫官論執乞陛下且與允所奏髙宗曰此小事非繫國體吕頥浩復與席益固請從輝之說髙宗可之當時君相之所重者諌官之體也況今吳端超受要近之職又非小事而諌臣已三言之其為事體孰為輕重乎吳國長公主為女夫鄭珙陳乞轉兩官添差浙東帥司參議給事中賀允中封駁之髙宗曰命下逾兩旬鄭珙已被受差遣敕矣乃始封駮轉官詞頭恐非故事可諭令書讀宰執退以聖㫖諭允中允中申執所見翌日再進呈髙宗曰雖稍後時所論極有理當曲從之沈該等曰諫行言聽使言者得以自安此盛德事也今孫璫之命初出而給事中據理封駮亦必有故且以長公主之請而視宫邸之使臣又孰為重輕乎髙廟中興規摹足以貽訓今日臣意陛下必不終徇小人之私請以遂廢國家之公法是以敢冒死極陳之陛下俯從微臣之請則是轉三失而為四美矣臣以四美望陛下伏惟陛下斷自聖意追改吳端除授免令福過灾生更思孫璫無功而為觀察使外議終不以為當特賜停寢如此則名器無由可輕綱紀無由可紊主權無由可䙝陛下之剛健威明聽言納諫之德一日而聳聞於中外足以仰承髙廟之規摹不負夀皇之付託盛美之事臣豈可不控露愚衷冒犯天威無任激切俟命之至謹録奏聞伏候敕㫖光祖又奏曰右臣昨於十八日封入奏章論吳端孫璫除轉僥幸給諫各有文字陛下重於改命仰煩宸筆諭止之給諫不復申執前奏臣緣此事反復憂慮以為從此臺諫給舍無緣可以舉職而攀附使令之輩各自以為人主恩我外廷臣僚其如我何自後當言者憚於有言不行不若初無言之為愈臣念及此中心有如焦灼是以冒昧具奏小人踰分僥求使名器紀綱與夫人主之大權三者俱失臣竭忠效愚無復餘藴俯伏俟命今已三日未聞付外施行臣為執憲之官其所關繫乃是國家之憲令今小人干請犯分臣合糾奏以聞公法茍惟不行是臣不能守官以孤陛下委寄而使微瑣之人尚得依憑以逞志自今不復知有臺綱如此則陛下亦安用此偹位之臺臣也臣以憂及隄防從此而蕩不敢備禮一言而止謹再具奏仰瀆天聰伏乞檢㑹前奏早賜睿斷施行謹録奏聞伏候敕㫖光祖又奏曰右臣昨冒萬死兩上奏封乞陛下且將吳端除授孫璫轉官特屈已行之命使臺諫給舍不至有負職業伏緣臺諫給舍乃是朝廷紀綱所繫既有論奏不可茍止臣於數日之內洊瀆天聽屏躬惕息以俟允從今日宰臣令都司來諭臣以聖意臣實何人仰勤宸訓戰汗如雨便合遵承君父之誨不當再有奏陳重念孤逺小臣䝉陛下親擢置之言路使知無不言言無不盡猶懼不足以報也今乃知之而有所不言言之而有所不盡陛下縱寬臣而不責臣獨不愧於心乎臣又念本朝家法聖聖相傳率多屈己以從人虛心而聽諫此乃玉音之所屢及聖德之所優為今孫璫之命陛下以服勤於夀皇者四十餘年所以令轉行觀察使陛下事親之孝可謂至矣臣愚以為深惜名器力持紀綱使主權日尊而左右不容妄有干請陛下志業如此諒尤夀皇之所樂聞也至於吳端則豫奪皆由陛下耳復何難哉陛下以恩而豫之臣僚以義而有請陛下捨恩而取義可也詩云鼓鍾于宫聲聞于外臣聞陛下宫庭之內裁抑左右之請求多矣其所以持守祖宗之法度外人靡不知之且如后戚私恩不曽令有過當而驟加之以富貴此最久長之道中外之所共服也今乃以宫邸微瑣之𨽻謂其階官已髙除授不為超躐然而物議則曰屬鞬之職是要近選授之地未可以階官言此前後除擢足以考求使吳端而稍知道理聞臣僚纍入封章自當再三控辭云不敢以賤臣仰纍聖德它日足望陛下成就如此則能持其福祿而深得進退之宜今乃偃然當之却令人主不免有毫髮之可議端之罪大矣臣既䝉聖諭今來處分悉由人主自當退聽但中心所懷亦須一一控陳欲待面奏而未得請對之日不敢不即日叙謝仍罄竭其愚忠伏惟聖慈寬其僭犯之誅尚賜採用庶幾人臣後來皆能勉於職業不至畏縮保身都忘國事光祖又論陳賈黃掄疏曰臣竊謂臺諫之任古難其人國朝以來尤重此選居是官者或以剛直盡言而一時得罪於人主或以回邪害正而萬世得罪於清議一時得罪於人主人主終復以清議而取之萬世得罪於清議人主終亦以清議而薄之簡䇿所傳前後非一臣謹按前諫議大夫陳賈今右正言黃掄皆為清議之所非有孤人主之任使可謂聖世之罪人也已矣按賈為人險悍用意姦回自得入臺罔思報國舞其憸黠上御主心數年之間進長諫省無吉士忠純之意有小人駔儈之風容蓋所私排逐異己縱橫請託禍福繫於從違喜怒任情風㫖生於咳唾如賈者真倚勢以為威託公以為姦者也王渥解四川茶馬還朝贓數十萬靡人不知賈為諫諍之官乃受渥貝錦蜀珍甚夥既已蝕於利欲一切與之彌縫情分日深言皆響答夀皇因事察賈私於渥而不直之當是時也賈若不以憂歸必以罪去何則身在言路屢以賄聞庇貪忌亷無復更恤於清議夀皇明聖淵鑒豈逃而今也乃以集撰典大州何君子之不幸而小人之獨幸也至如掄者志趣凡近資禀佞柔陛下偶得之於進對之間意其為淳實朴茂之士擢在言路豈不望其公忠朝有愆違庶幾密見啓沃而掄疏一出聞者駭然且陛下欲更補闕拾遺之名初匪有督過諫臣之意詔墨開勉臣子感心一去一留事已久定而掄於事定之後乃妄謂人臣掠名而歸過君父陛下聞其所謂無尊君親上之意聽其所謂以直諫得罪之言雖天度之能容豈聖心之所樂二人之罷亦為臣之分也而群情共惑則掄實有以致之臣於彼時讀掄此疏驚嘆失聲曰豈有身任諌官而惡人忠諫又使陛下真有罪諌之名與詔意特異皆掄以讒說誤聖聰之過也其後淵衷漸察欲擇臺臣不知掄何慮何疑而亟入奏封乃謂恐從臣薦人各有私意陛下聰明洞照掄說不行中外聞之咸誦聖德且掄前出一言而使人主厭惡人言後出一言而使人主猜防臣下掄之職任所當然否臣昨者上殿本首欲劾掄議論邪諂不堪為諫官又念臺諫一體擊之太遽故於奏疏千餘言之後深切及之掄來見臣面目羞愧臣雖勉強開釋之使去然意其必能請外以自全掄察臣意度稍寬復自言初非己意諉人以自免諂臣以求安臣於是鄙掄之為人見其依違反覆以難保略小嫌而明大義臣之所不可後也臣於陳賈范處義黃掄三人誠素意所薄且每恨其孤負君恩今處義敗露而去如賈者縱不深罪亦宜罷郡以慰人心如掄者就令寬恩且使補外以塞公議臣盡言孤拙不恤顛危上恃陛下訓以所守不回臣以死報伏惟亮其愚忠而采納之聖斷立行四海傳誦臣不勝幸時韓托胄當國武學生華嶽上書曰旬月以來都城士民倣徨四顧若將喪其室家諸軍妻子隱哭含悲若將驅之水火闤闠籍籍欲語復噤駭於傳聞莫曉所謂臣徐考之則侍衛之兵日月潜發樞機之遞星火交馳戎作之役倍於平時郵傳之程兼於疇昔乃知陛下將有事於北征也托胄以后族之親位居極品專執權柄公取賄賂畜飬無藉吏僕委以腹心賣名器私爵賞睥睨神器窺覘宗社日益炎炎不敢嚮邇此外患之居吾腹心者也朝臣有以庸瑣之資請姻師旦驟入政府者有以諛佞之資阿附托胄致身顯貴者陳自強老不知耻貪不知止私植黨與隂結門第凡見諸行事惟知托胄不知君父此外患之居吾股肱者也爽奕汝翼諸李之貪懦無謀倪僎倬杲諸郭之膏粱無用諸吳之恃寵專僭諸彭之庸孱不肖皇甫斌魏友諒毛致通秦世輔之雕瘵軍心瘡痍士氣以至陳孝慶夏興祖商榮田俊邁之徒皆以一卒之才各得把麾專制平日剜膏刻血包苴托胄以致通顯飢寒之士咸願食其肉而不可得萬一陛下付以大事彼之首領自不可保奚暇為陛下計哉此外患之居吾爪牙者也程松之納妾求知或以售妹入府或以獻妻入閣魯之貢子為郎富宫之庸駑充位此外患之居吾耳目者也蘇師旦以穢吏冒節鉞牙儈名爵周筠以𨽻卒冒戎鈐市易將相此外患之扼吾咽喉者也彼之所謂外患者實未足憂而此之外患蓋已周吾一身之間矣禮樂征伐自天子出所貴乎中國者皆聽命於陛下也今也與奪之命黜陟之權又不出於陛下而出於托胄是吾有二中國也命又不出於托胄而出於蘇師旦周筠是吾有三中國也女真以區區之地猶能逼我淮漢曽謂外患之居吾腹心股肱耳目爪牙及吾咽喉而不馮陵吾之宗廟社稷乎曽謂一家之中自為秦越一舟之中自為敵國而能制逺人乎比年軍皆掊克而士卒自仇其將佐民皆侵漁而百姓自畔其守令家自為戰此又啓吾中國億萬之仇敵也今不務去吾腹心股肱爪牙耳目咽喉與夫億萬之仇敵而欲空國之師竭國之財而與逺人相從於血刃相塗之地顧不外用其心歟臣嘗推衍兵書自去嵗上元甲子五福太一初度吳分四神直符對臨荆楚始擊蜚符旁臨甌粵青門直使交次于幽冀黑殺黃道正按于燕趙考之成法主算最長客算最短兵以先發為客後發為主自太嵗乙丑至庚午六年之間皆不利於先舉儻其畔盟犯義撓我疆埸至於事不獲已然後應之則反主為客猶曰庶幾萬一國家首事倡謀則將帥內暌士卒外畔肝腦萬民血刃千里此天數之不利於先舉也矧將帥庸愚軍民怨懟馬政不講騎士不熟豪傑不出英雄不收餽糧不豐形便不固山寨不修堡壘不設吾雖帶甲百萬餫餉千里而師出無功不戰自敗此人事之不利於先舉也臣願陛下除吾一身之外患吾中國之外患既已除然後公道開明正人登用法令自行紀綱自正豪傑自歸英雄自附侵疆自還中原自復天下自底於和平四海自躋於仁夀何俟乎兵革哉不然則亂臣賊子毁冕裂冠哦九錫隆恩之詩恃貴不可侔之相私妾內姫隂臣將相魚肉軍士塗炭生靈墜百世之逺圗虧十廟之遺業陛下於此雖欲不與之偕亡則禍迫於身權出於人俯首待終何臍可噬事之未然難以取信臣願以身屬之廷尉待其軍行用師勞還奏凱則梟臣之首風遞四方以為天下欺君罔上者之戒儻或干戈相尋敗亡相繼強敵外攻姦臣內畔與臣所言盡相符契然後令臣歸老田里永為不齒之民書奏托胄大怒下大理貶建寧圜土中郡守傅伯成憐之命獄卒使出入毋繫時史嵩之服除有嚮用之意殿中侍御史章琰正言李昴英監察御史黃師雍論列嵩之甚峻翰林學士李韶同從官抗疏曰臣等謹按春秋桓公五年書蔡人衛人陳人從王伐鄭春秋之初無君無親者莫甚於鄭莊二百四十二年之經未有云王伐國者而書王書伐以見鄭之無王而天王所當聲罪以致討未有書諸侯從王以伐者而書三國從王伐鄭又見諸侯莫從王以伐罪而三國之微者獨至不足伸天王之義初不聞以其嘗為王卿士而薄其伐今陛下不能正姦臣之罪其過不專在上蓋大臣百執事不能輔天子以討有罪皆春秋所不赦乞斷以春秋之義亟賜裁處理宗寶祐元年起居舍人牟子才上奏曰臣聞君子之於小人猶隂之於陽不能以相無而消長有常亦非人之所能損益也先儒以為聖人作易於其不能相無者既以健順仁義之屬明之而無所偏至於消長之際淑慝之分未嘗不致其扶陽抑隂之助蓋陽屬君子隂屬小人固不可相無亦不可相亂固不可相亂尤不可相暴泰之為卦內健而外順內陽而外隂內君子而外小人所以深致其內外之辨使之界限一明不相殽亂君子得其位可進以有為小人得其欲雖退而無怨故聖人名之以泰泰之為言安也言君子小人各得其所而不相害乃所以為安也自古惟堯舜之時足以當之三代而下治亂靡常然不過由此二道用君子則去小人用小人則去君子未聞君子小人參用者也用君子則治用小人則亂亦未聞君子小人參用而可以久安而無亂者也然則有天下國家欲久安而無亂者必自辨君子小人始不明君子小人之辨而泯其異同混其賢否而曰吾將以是為安也直幸而已矣非聖人所為致泰之道也臣抑嘗讀國朝元祐之事而竊有感焉夫元祐之所以為元祐者用君子而退小人也元祐之所以為紹聖則君子小人並用故也方元祐之四五年當時言者已凜然以邪正之不辨為憂朱光庭則謂用人之際當以善與利二者之間加明察使正臣日進而邪臣永退范祖禹則謂憸人在前則害政事在下則害風俗大則傾覆邦國小則殘敗善類不當使之在位為他日患蘇轍則謂君子小人勢如氷炭同處必爭一爭之後小人必勝君子必敗不可惑於浮議引與共事王巖叟則謂小人無能斯不足畏小人而材然後可畏當明辨力遏毋使小人得以雜其間其言皆深切著明反覆詳盡而於泰之一卦莫不援以為據蓋以為保泰之道在乎此而隳泰之道亦在乎此是豈私憂過計哉使當時盡用其言絶禍萌培治本雖百年元祐可也奈何調停之說雖賢如吕大防范純仁劉摯亦且惑之楊畏鄧溫伯李清臣皆小人之雄而引之腹心俾得乘間抵巇隂唱邪說紹述之論起而君子不能以一日安其後黨錮禍成雖大防純仁摯亦皆不免報復之禍則調停之論蓋亦疏矣遂使國家當其禍敗至於宣靖之事不可勝悔而光庭祖禹轍巖叟之流獨受知言之名可不為痛哭流涕者哉伏惟陛下臨政願治垂三十年宜可以為元祐矣而乃岌岌乎紹聖且宣靖宜可以為泰矣而乃駸駸乎為姤為遁陛下亦嘗思其故乎陛下未嘗不用君子而不純於用君子未嘗不去小人而不盡於去小人故其勢不免參而用之夫君子小人勢不兩立參而用之則是正邪相軋而使之日鬭于下豈有安靖之理哉陛下試觀三十年間君子小人幾進幾退幾僨幾起幾勝幾負相尋至今未有止極者皆以此也陛下見其如此不察其故以為是紛紜譁競者皆君子之過也而小人又擠而陷之以為必去其類而後可靖國則益誤矣故始於君子小人之並用而卒至於君子日空小人日盛臣竊惟小人不去其害之大者有三焉纍君德也害治體也敗善類也敢為陛下悉言之小人性本巧惡又敢欺誣其狡獪之術足以逢迎而為恱其淫詖之辭足以譸張而為幻變黑為白指鹿為馬以之惑人主之視聽而亂其是非甚至借人主之喜怒以成其威福耻為正論則厚誣其君為不可以責難隂進邪謀則歸過於上以自逃於公論遂使謗議流聞聲光不著此則欺誣之說有纍於君德也小人性本傾危又好反覆勢在彼則始趨而終背勢在此則始背而終趨閃倏遊揚蹤跡詭祕巧險側媚情態乖張其狀似三變柔行巽入善為模稜軟語卑詞曲相容悅其狀似兩來操三變之心行兩來之術而視勢之所趨為向背此反覆之說有害於治體也小人性本刻薄又善激發上惡譁競則曰是好名也是多言也上惡朋比則曰是某黨也是交結也上惡誕妄則曰是欺罔也是浮矯也駕虛翼僞造謗興訛其譖貝錦其言巧簧陽為納忠隂實激怒其術一售其勢遂成梟心虺志無所不為此激作之說有害於善類者也此三害者千岐萬轍為變多端不懼上之悔患務行其言不恤國之憂危務伸其志不虞君子之困敗務遂其說為禍之烈如此而可使之一日參乎君子之間耶今通國之所謂小人者陛下亦知去之矣臣以為非去之之難而辨之之難去一小人是一小人也安知一小人之去無一小人之進辨之則幾矣夫君子小人如數一二如别蒼素辨之無難者是在陛下之心耳陛下如能致知格物以明此心賤貨貴德以一此心明目達聰以廣此心使此心之體如衡之平如鑑之空既不失其好惡本然之真又有以得其是非當然之則所謂君子小人之情狀固無所逃乎陛下之前而陛下又即其賢否枉正之所在而為用舍進退之分焉柔邪巧佞阿意承㫖者必斥剛方鯁亮犯顔苦口者必容輕儇便給狡慧削刻者必逺而莊重靖嘉溫純朴茂者必親出入多岐隂有所主者必屏忠信不二孤立無朋者必用去其庸猥卑雜而存其耿介挺特去其狠戾駔儈而任其宏毅惠和懲其躁競無耻而擢其靖退有守黜其隂墨深阻而取其疏明洞逹不以鄉原而易狂狷不以嬖人而嫉莊士不以美疢而疏藥石則忠邪之位定而內外之限明豈不能致元祐泰亨之治哉今上而論思獻納多夀俊忠正之臣次而給舍臺諫皆端亮純實之士下而百司庶尹又能時發讜言於靖共正直之餘陛下宜鑑鏡其心勿以小人參乎其間而二三執政亦宜去係纍之私昭平明之治融朋黨之意絶反覆之慮一以開誠心布公道之言而為進君子退小人之地思元祐諸老拳拳之憂鑒紹聖以往紛紛之事務使邪正不暴隂不勝陽以成泰內之治豈不韙歟不然實未有以知人材之孰忠孰邪而姑聽其一時之乍賢乍佞則用者不必用去者未嘗去而所謂安者乃禍亂之所伏也臣隱憂所發冒進瞽言不勝拳拳理宗時浙東提㸃刑獄髙斯得劾奏知處州趙善瀚知台州沈塈等七人倚勢厲民疏上不報改江西轉運判官斯得具辭免又奏曰臣劾奏趙善瀚等七人未聞報可固疑必有黨與營救惑誤聖聽今奉恩除乃知中臣所料善瀚者侍御史周坦之婦翁也贓吏之魁錮於聖世鄭清之與之有舊復與州符沈塈者同簽樞密院事史宅之妻黨也祖宗以來未有監司按吏一不施行者壞法亂紀未有甚此臣身為使者劾吏不行反叨易節若貪榮冒拜則與世之頑鈍無耻者何異乞併臣鐫罷以戒奉使無狀者斯得任祕書少監兼侍立修注官又奏曰紹聖三年正月寶文閣待制知成德軍楊畏知河中府右正言孫諤言畏在元豐之間其為御史其論議趨向皆與朝廷合及元祐之末吕大防蘇轍用事則盡變其趣而從之紹聖之初陛下躬親總攬則又變其趣而偷合茍容交鬭執政傾亂朝政至今天下之人謂之三變詔楊畏落寶文閣待制依舊河中府中書舍人盛陶言未敢詞行下移知虢州臣聞舜之戒其臣以難任人為急難之一辭乃聖人屏惡之深意不可不精思而熟玩也蓋憸壬之人易惑難逺聖人非特去之而兢兢業業戒謹恐懼惟慮其人之復來以傾亂吾國茍畏難之心頃刻不存則彼必緣間伺隙不旋踵而至矣詎可忽哉熙豐祐聖之間小人反覆莫如楊畏利在王安石則附安石利在吕大防蘇轍則附大防蘇轍利在章厚安燾李清臣則附厚安燾清臣天下之人謂之三變國家惡運亂源濫觴于符紹滔天于崇觀政宣畏實為之若此傾覆之徒其可近乎嘉熙以來侍從之臣固有隨世俯仰逐利轉移如楊畏之三變者方其氣焰熏灼之時其力至能進退宰相鉗制言路善良重足懼遭傾覆之禍幸賴陛下洞照其姦不動聲色而去之天下咸仰聖德之明彼其退伏散地豈一日而忘復出哉特未有可乘之機耳邇來國家多釁局勢漸搖彼靜觀竊笑久矣一旦因事論建依倣公議以動陛下之思而廷臣不自後先及其奏至之時復加薦引中外相應如此豈得為無意哉陛下茍入其說召之使還臣恐楊畏一來元祐變為紹聖特反掌間耳況比日以來從臣奏議欲用嵩清與三黨倡邪說以誤國事包藏已深乃今又有佞人來矣之漸邪氣盤結如此臣竊為國事􅏮􅏮也臣願陛下深察安危存亡之機以舜難任人為法斥去邇言謹勿輕信使已去之姦絶意再用則局面增固善人獲安陛下更化善治之初心不至中道而改轍矣臣憂愛之切遂忘其愚惟陛下采擇祕書少監湯漢疏論比年董宋臣聲焰薰灼其力能去臺諌排大臣結連凶渠惡德參㑹以致兵戈相尋之禍陛下灼見其故斥而逺之臣意其且影滅而迹絶矣豈料夫隂消而再凝冰解而驟合既得自便即圗復用以其罪戾之餘一旦復使之出入壼奧之中給事宗廟之內此其重干神人之怒再基禍亂之原上下皇惑大小切齒而陛下方為之辨明大臣方與之和解臣竊重傷此過計也自古小人復出其害必慘將逞其憤怨嘯其儔伍顛倒宇宙陛下之威神有時而不得以自行甚可畏也中書舍人徐元杰奏繳胡泓新除宗正少卿指揮疏曰臣聞君者天也父也人臣立人之本朝以事天之心而事君則知盡萬物之生不足以報天之德以事父之心而事君則知竭百體之勞不足以報父之恩況於身為要臣而狎被御筆親除之寵其當若何勉竭自厲以為君上罔極之報可也今胡泓讀聖賢之書豈無羞惡是非之心哉平居討論亦豈不知三綱五常之正理者哉臣與泓同朝且同江鄉本以其年長而敬之每聽其語言則有大謬不然者官爵陛下之官爵也泓自作郡而廢黜陛下柬拔登朝置之郎省洊膺親擢方陪虎觀之聨忽領烏臺之職不惟泓喜過其望人皆以為殊特超躐之典此正砥節礪行明目張膽敢於論事之時奈何泓資禀凡下血氣衰而志節之不立辭㫖所及不以聖恩親擢者勉務稱塞惟曰此恩此德實出於公雖聲言於衆而不以為耻臣聞泓之初來登對首劄有愛國必愛大臣之語巧為容悅至次劄猶曲意阿諂識者覺其為人久矣及其職司彈劾專為報復私讐之地前後所詆皆犯物論而不恤是非易位好惡反常以耆艾典刑之名臣而妄有論列以五十年儒科之宗老而亦被詆誣泓誠何心哉豈舉世己無一可論之士哉方舊相以憂去也稍有人心者皆知人道之不可廢泓一則曰恩相何來之遲二則曰何必只管說綱常甚至延見士夫正色厲辭毁短國祚背棄君恩盡倒公論之戈橫身要衝以售其足香糞苦之諂通國皆切齒其姦為之憤疾涕洟陛下一旦感悟特出御筆拔擢公忠骨鯁之士以代之人心鬱悶之餘不翅如幽暗而復見天日如泓者既無羞惡是非之心是尚可容其汚惟月之清峻者乎況泓出身始末尤可羞稱自其微官時未嘗用舉削而脫選率不待終更而圗辟泓知贛州既不申審奏事却令通判舒復宗語部使者以本州盜發催其赴上泓舊與贛之娼女狎稔到郡取為小妻當時輿卒皆出不遜語聞舒復宗於幕次顯以匪人斥之其他不顧十手十目之罪在南安時同官備能言之是其居要地而甘自暴棄在外服而不自愛重類有如此臣與泓雖同江鄉平時雖有敬老之念然陛下恩德之罔極臣雖糜捐不足補報何敢芘泓而不以聞況泓年將耆稀戒之在得臣愚欲乞睿察稍懲其姦且以祠廩畀泓使之少待而上掛冠之請公論幸甚世道幸甚所有泓詞頭一件臣獨未敢撰述元杰再繳胡泓乞祠不允指揮疏曰臣聞諸孟子曰有官守者不得其職則去有言責者不得其言則去臣叨恩過分濫兼掖垣實以封駁為職事無巨細當言必言是亦合官守言責為一職也昨日臣以胡泓除宗正少卿詞頭未敢撰述已懇切奏陳未䝉頒命苐切凌兢臣竊見泓昨以御筆親除職居臺察既不知明目張膽為扶持綱常計觀其前後彈劾專為報復私怨而已最是背棄君恩毁短國祚每厲聲對衆盡倒公論之戈舉朝之士為之切齒涕洟相與言曰自古見無禮於其君則當如鷹鸇之逐鳥雀臣蓋為陛下憤疾其人久矣況泓自微官以至守南安守贛郡貪淫之狀備載前櫝昨汚臺綱物論籍籍黨姦醜正善類吞聲今幸一旦親擢正人以代之有識無識同切慶快而月卿宗少之任是為清切入從之階泓既無人心犯物論如此斷斷不可與之並處朝列明矣臣職在繳駁不避仇怨痛切言之實以泓久為公論之所不容市議道謗至作為歌謡皆以泓為小人之倡臣自昔持心近厚非敢過為指摘為公道計為朝綱計不得不以去就爭之今泓既上丐祠之牘臣愚欲乞聖斷亟從泓請早畀以祠所有泓奉聖㫖不允指揮録黃臣實未敢書行元杰又繳錢相召赴行在指揮疏曰臣竊見錢相起自儒科殊乏器識齷齪自守榮進是貪仕於外則政以賄成仕於朝則公為私奪其居於鄉則縱容子姪恣肆幹僕廣占民産閭里怨嗟衆謂其多資發身嘗遍歷言路矣凡所論列摘微過而蔽巨姦每借之以為修怨之地逮其躡天官之長兼夕瑣之任都人為之謡曰要過銓衡及銀臺除非大錢小錢來蓋指其父子黷貨而言也相不是察身居緊頭行每由徑故曩為學校所詆又為吏議所斥相嘗假親老丐祠今其親九十餘矣而又急於規圗超用召命一下人言籍籍咸謂聖化方新汚俗漸洗詎容愚而能神復覬於穿金門入紫闥乎為相之計正當回顧親老退處寬閒日供滫瀡之奉惟內存畎畝不忘之念庶乎其少逭清議矣乃獨不然何耶言之至此不覺寒心臣濫尸繳駁之職若不正救於未用之先何以為士大夫風俗之戒欲乞睿斷將相召赴行在恩命亟賜寢免世道幸甚士論幸甚元杰又繳鄧泳乞祠不允指揮疏曰臣竊惟長江號天險也然必得人之險而後天之險為可恃㳂江制副甚重匪輕胡可畀非其人哉今鄧泳心術回邪氣貌粗俗早求速化遍歷邊閫入幕之賓其為謀畫不過所至清野殫國之財撒花資寇而已用是而為績最麾節更迭徑躐朝班入從出藩如取諸寄臣每聞其在朝之日怙勢擅權不可具狀姑以一二言之泳嘗脅制言路之臣抑遏其月課所及更授以揆路之風㫖臺臣不敢自固所守以至憂患而斃又嘗為殿廬編排官凡詳定而下皆惟泳意所授屏息以俟其頥氣諸房敢怒而不敢言陛下蓋嘗察之雖能黜泳於外乃又以重任付之徒見其軍政不修江防不備將校率惟私人是用問其郡政既多為苛斂之術凡商賈鹺運之往來泳復百計困沮之至專其利以自豐殖是尚可使之當重地者乎臣職在封駁因其再有乞祠之牘豈容緘默而不言臣愚欲乞聖斷俯從泳之所請亟使解罷制副職事畀之投間少自警省别選材望以重茲寄庶乎天險與人險相資而無虞矣元杰又繳趙汝􅴏改差知邵武軍指揮疏曰臣聞士大夫年及者不作縣不作郡著之令甲昭然不誣況於得郡而闕及凡未經登對之人必奏事訖然後之任此又聖朝所以重臨遣專牧飬也今趙汝􅴏元未嘗作宰是猶曰兩嘗為令但當考其月日滿與未滿而已然汝􅴏年已七十有二邇者臣寮奏乞以年及人姑畀參議未欲絶其祿亦不欲勞以郡也汝􅴏年踰古稀偃然得郡不待奏事而徑己之任是於法守無一可也臣職在繳駁未暇論其人之賢否與夫功過之有無姑就臣職分之所當覺察者而舉之臣愚欲乞聖聰特發英斷將汝􅴏改差知邵武軍指揮特賜寢免姑畀議幕以祿其老所有録黃臣未敢書行元杰又繳蕭郊理還元斷日月指揮疏曰臣聞士大夫貪鄙無厭昏謬無狀有一于此所至毒民初犯再犯猶不知改必又展轉三犯不復有人心者未有若蕭郊之甚也郊之初宰漳浦其罪不可勝數且庇同官從㬰其汙穢相與壓良為賤指無為有轉相誣詐平民漁獵銀㑹不極不止具見提刑陳韡之所按次宰湘潭疲軟不足以勝任容縱吏胥肆為民病又見於提刑羅愚之再劾若是則無所往而不自罹咎覺悟警省豈非郊之所當動心者而猶未也其所恃者謂朝廷忠厚遇郊則可陳乞參注未逾時又可陳乞改正故逃邑而受僉幕郊於是益無忌憚矣妻妾奴僕第第交通下則啖民膏以自潤上則睨郡計以自豐以折苖虧公為能奉上以隨事獵貨為所當然江西提舉趙希巃之彈墨未乾也而放行參注之㫖隨請而輒下朝廷但務姑息既許令授親民差遣又曲從其理還元斷月日之請若是則昏鄙狼藉之人所至皆可攫取貨財為湔洗之計餓虎出柙齧噬縱橫民瘼其何以瘳臣職兼繳駁誼難隱容欲乞聖慈特發英斷將郊理還月日指揮亟賜寢免俟明禋赦後别聽陳乞施行仍乞自今以始令郊注授間慢差遣庶幾職事與民兩不相病公論幸甚元杰又繳趙逢龍江東提舉王傑知雷州指揮疏曰臣聞士大夫可用與否惟精神心術不可不察蓋精神昏闒每事受成吏手視為腹心使民無所吐氣雖有愛民之意不能自由其已若是者為郡且誤民況為一道乎臣於趙逢龍見之其心術姦欺嗜利亡耻不知命義數罹譴訶懵不知所自悔若是者雖為倅二且不可況為郡乎臣於王傑見之臣切惟逢龍讀書授徒奮由科第臣與來往嘗稱其亷及解郡而為郎士論籍籍相告曰人知其迹而已去年秋旱田野煎熬吏告逢龍以軍期為名搔動六邑公私鼎沸朝廷果有出軍之令乎逢龍可謂之不知事乎況以前官積下官錢為吏奄有以數萬計逢龍家僕具能言之簿歷尚可驅磨也彼其待吏如弟兄燕私率與之對坐稱都吏而不名民訟曲直期㑹寬嚴皆吏之命至有一事而三四案官書擬者甲不滿吏意則之乙乙不滿吏意則之丙或一訟而迭勝迭負更禪無窮如此等類不知其幾臣切怪之姑言其略及聞諸要路之臣亦曰士夫豈無昏庸者未有如逢龍昏庸之極豈無信吏者未有如逢龍信吏之極臣怍不能對益信知人之難如此今濫貟封駁知而不言不惟無以見江東父老亦非所以愛逢龍是有負陛下多矣王傑生長膏粱鮮克由禮嗜利亡耻所至貪淫狎妓受賕獄訟為市如預借官物而去其籍如廣敷楮皮而肆其暴舉差役而滋賣弄之弊虐小民而奉大家之歡始則宰長興而見於臺臣之彈擊次宰龍游又見於知郡蔡岊之按劾蓋亦不復知有世間亷耻事矣況其罪犯既多前此脫網為倅今僅一為倅爾又復脫請一麾若且放過則逺方赤子畀之虎狼得乎臣於逢龍雖為有舊一道事重不當隱情臣於王傑初無怨尤然知其人亦難自默之二人者善惡不同同於為民之病欲乞聖斷各且畀之祠祿使知退省其私他日警悟各當其所而用之亦未為晚監察御史吳昌裔論史嵩之疏曰臣等聞之易之師曰大君有命開國承家小人勿用聖人象之曰小人勿用必亂邦也必之為辭言其決然而無可疑也臣觀自古以來必有君子而後能國未有用小人而不至於敗亡者聖人之言如金科玉條其可犯也哉臣等謹按太中大夫新除刑部尚書史嵩之習氣輕浮操心狡獪膏粱之子本無學術憑藉其伯彌逺聲勢濫魁朝列公論不容至今籍籍逰邊纍年初乏善狀彌逺內專八柄之權外存三窟之勢遂以乳臭小子謬當閫寄彌逺晚年每欲引之自代師昭之心人皆知之氷山既摧嵩之知無所恃外交敵人私結和議用權檜故智恐脅朝廷為守祿固位之計不臣莫大焉邊方以積貯為大命嵩之空京湖之粟以餧强鄰以博珠玉兵民苦於轉輸破蕩死徙而不恤敵人本未知中國虛實嵩之屈體事之引敵人頭目一二百人出入城府聽其節制而殊不知耻往者小使鄒伸之之遣引致王楫窺覘上都啓敵人貪婪之心貽襄蜀蹂踐之禍皆嵩之實為之斥逐家居安享富貴在嵩之可為幸矣而乃恃其多資交結中外規圗復進起家而帥江右物議已自沸騰曵履而玷清班名器抑何輕䙝給事洪咨夔謂近日雷雪之變皆此人所致嘗行繳駮權直院吳詠亦復見之論奏為嵩之者合知去就矣顧乃偃然供職恬若不聞可謂小人之無忌憚者也嵩之為人惟陛下與一二大臣謂其才可集事而天下之人皆謂其輕囂寡謀必將重至誤國此譬之惡草當芟夷藴崇之勿使能殖可也豈宜任獨見違公論而用之乎且陛下與一二大臣必欲用嵩之者不過謂其嘗為襄帥稍諳北人情性可以招來郭勝講解敵師而已臣等以為不然勝之叛去父母妻子被戮怨望已深決無可招之理敵得志而驕和議亦斷未易成嵩之近日奏疏嘗為走弄之語矣陛下用之必無益而有害臣等聞元祐間衆賢聚朝天下駸駸向治矣時相吕大防把捉不定至用調停之說兼用熙豐舊人進李清臣鄧溫伯而楊畏章厚蔡京之徒攀援而至其時雖以劉摯范純仁蘇轍王巖叟諸賢參錯要路不足以遏其復然之凶焰而中原之禍隨之天下安危理亂之機甚可畏也彌逺濁亂天下一十八年遺患餘禍至今不可醫治今陛下復欲用其猶子置之文昌八座之列臣等恐其巧窺隂伺呼集非類以害君子而紹聖之禍復作矣臣等甚憂之在易內君子而外小人其卦為泰內小人而外君子其卦為否小人之不可近也如此臣等愚見欲望陛下特賜睿斷將嵩之刑書職任亟行褫罷以清朝列以快公論若謂時方多事未免使貪使過且乞與一在外州郡差遣少老其才以備他日邊頭任使庶合泰否內外之道謹具覺察以聞伏候敕㫖昌裔又論鄭清之疏曰臣等惟國家之患莫大於用兵人臣之罪無加於誤國此漢武所以正王恢之誅晉穆所以行商浩之廢也臣等竊見左丞相鄭清之舊由庠序驟致顯榮涉歷迂踈智謀短淺扳援潜藩之舊冒居宰輔之司當陛下親攬萬幾聿新大化清之亦悉心輔贊隨事更張如絶苞苴斥貪佞召耆德去副封等事其於新政豈無小補特其不能度德量力保境息民妄意功名經營分表力排羣議輒啓兵端信輕鋭之士以主帷幄之謀用虛驕之將以分節鉞之寄輕挑強鄰敗師河洛兵民之物故者以數十萬計糧食之陷失者以百餘萬計凡器甲舟車悉委僞境而江淮蕩然無以為守禦之偹如清之者能因一蹶之失翻為百全之圗愛惜餘力保守舊境猶可補瘡痍之痛收桑榆之功而乃護疾弗悛私心自用但求已說之勝靡恤事力之窮復妄許於摧鋒不痛懲於覆轍繼而邳徐唐泗俱以敗聞士氣沮失國威敗喪遂使驟興逺夷得以歸曲于我始寇關蜀而八郡為之荼毒旋犯京襄而江面為之繹騷以叛將召戎亂兵干紀外鬭內訌之孔棘左支右吾之莫能凡邊民之骸骨相枕國家之膏血無餘使陛下寒心銷志於九重之上夜不安枕至於纍月者皆清之輕動干戈之罪也誤國孰大焉方今春氣向深敵騎將退正當更改規模補苴罅漏兩排和戰之論專為守禦之謀如清之固位不去必不能盡變舊習載圗新功滯吝私心重誤國事不至於危亡不止儻或狼狽至是而後如靖康之誅王黼開禧之竄陳自強夫果何益臣等不避大譴欲乞聖慈下臣等此章示清之待其自知引退即賜允俞以全陛下進退大臣之節以謝關蜀京湖四路之民俾繼此為宰執者不敢輕易謀國以遺陛下之憂豈勝天下宗社之幸臣等非不知臺諫彈擊大臣往往與之俱出苐臣等猥䝉親擢備數言路不敢自愛其身而為國家忠計謹具覺察以聞惟陛下裁斷昌裔又論趙汝榟兄弟疏曰臣按本臺令諸御史臺每季專委臺官一貟躬詣大理寺及應有刑獄去處㸃檢禁囚淹留不決或有寃濫並具當職官職位姓名以聞臣於今月二十二日恭奉詔條前往大理寺及臨安府三院錢塘仁和兩縣㸃檢其有事情交互囚繫淹延問駁迂回降斷遲緩等事除已同本臺官一面申朝省外內仁和縣一項劉允中等為趙大使宅少監位買獻平江府苖田三百餘畝又府院一項周夢庚為寺丞大監包占常州沙田一萬四十餘畝是皆勢要貪利致獄訟淹留若非澄治其何以感召和氣臣契勘稱寺丞者即汝榟也稱大監者即汝櫄也父子以驕侈而相詔兄弟以兼并而相師強奪民田不知其幾而常州一事尤駭聽聞止因遊士一時無根之談遂占平民百年有契之業為數浩大至萬四千始令周夢庚出名陳詞後却使李天祐等交業管幹帶領兵衆以張其勢持執槍杖以示其威孀婦為之銜寃平民為之掩泣官吏雖知枉狀亦復飲氣奉承蓋緣是時汝榟簉蹟周行汝櫄詳刑浙右氣焰熏灼莫敢誰何若非朝廷清明政令更始奪諸暴虎還與飢鴻則晉陵之民將填于溝壑矣在法當職官吏不許請佃官田今汝榟身為王官既已犯法包占而汝櫄職在風憲又敢冒嫌行移以若所為是不知有國法也是不知有天民也竊詳案周夢庚者當被誣告之罪而汝櫄汝榟曽無毫髮之傷安坐家庭僥覬擢用將恐自是貴要觀望法禁陵夷民業不安獄訟滋起其患有甚於所謂盜賊矣竊見汝櫄兄弟以乳臭之資濟婪貪之欲依憑城社過惡頗多具見臺章未暇悉數今臣因司刑察姑摘其貪暴一事亟以奏聞欲望聖慈將汝櫄汝榟特賜鐫秩罷祠永不得與親民差遣併乞行下所屬將幹人李天祐馬伯駒等同周夢庚一例定法重作施行庶幾範權要而仁困窮實所以昭陛下平明之理也謹具覺察以聞伏候敕㫖貼黃臣近又風聞汝櫄有淮西提刑之命却未曽見邸吏報行若果無之豈非至幸萬一有此臣竊惑焉夫以浙西三輔之地去日甚近汝櫄奉使無狀一至于此況淮右乃風寒之處民物凋瘁而使之司臬其間將恐移浙右之害而害淮右矣又何望其執邦憲而求民瘼哉臣愚過慮欲望陛下特出睿斷明諭大臣或有進擬汝櫄等新除亟賜寢罷以穆公論以慰人心伏乞睿照昌裔又論四都司疏曰臣竊惟政府萬事之樞機宰椽諸司之綱紀故參陪機政者必先民望而彌綸省闥者多用士人在祖宗時不輕其選也前者樞臣非才備位臣已論列之矣今都曹之中先後相望有利口之覆邦家庸人之擾天下者臣敢置而不言乎謹按前户部尚書兼檢正余鑄性資深刻言行辨堅以操切合權姦以便佞躐清要出入都省蓋踰十年縱豪橫之僕以籠貨財館輕囂之賓以通關節貪逺濁亂之政鑄也實附益之大化既更舊掾盡屏鑄獨漏網出尹神京治狀無聞經營再入以沮壞人事為任怨以寬恤民隱為好名每於論事之間常有感舊之意黃幹學者之宗也鑄乃謂之很士陳宗仁林介小人之黠也鑄乃謂之好人是非良心倒置如此況能以當事任哉陛下赫然宸斷令奉祠官公論莫不稱快然不正其久據都司之罪而僅以督府之微罪行偃然家居咸謂佚罰此臣所謂利口之覆邦家者新除司農少卿兼檢正顔耆仲器能皎厲舉止輕儇假借他人之文以躐世科諂事權門之子以玷班著方其分治省事遽與同列交爭暴氣鄙辭聞者眙愕朝廷不靖之風實自耆仲倡之逮至出使淮堧不能奉宣德意而乃操聚斂之術𣙜鹽醝之贏以微羡獻朝廷以毫末濡僚屬其朘脂膏以自潤者蓋有倍蓰于此行道之人往往能言其數進承密㫖見謂叨覦糾正省務尤為非據似聞朝廷方以財賦之任委之竊恐其力小任重才短學踈實無補於國家大計耳此臣所謂庸人之擾天下者也倉部郎中兼左司崔端純獰貌而駑材亦一庸人也其在番陽貪鄙慘刻以小價兊㑹而換內庫之金以畸零折鈔而奪下戶之利以贓罰積鏹而豐囊橐之藏軍怒塞胸民怨入骨幾於激變幸而脫歸余鑄以其能執籌算計引佐都省不務大體求詳細苛所擬文書動多積壓近者交爭相府人頗駭之豈容以冒居藂委之任哉樞密院編修官兼侍右郎官劉克莊纎能而小慧亦一利口也蚤雖能文見謂輕薄真德秀其師也平昔受知出入其門及德秀疾病則遂奔競而他往曽從龍其所主也督府幕屬皆其所擬及上命督趣則又變其說以沮行王邁其鄉人也平時握手出示肺肝及為臺評所㸃則遂拒户而不見既背其師又誤其主又不得譽於鄉黨朋友如此至于刺探時事以聞大臣傳誦風㫖以諭臺諫心術巇險人皆畏之豈可以久居編摩之選哉臣來自逺方靖共下位與四人者初無怨尤竊謂國家多事正藉宰士得人而使憸人俗吏交迭居之物論沸騰不容自默用敢列其姓名聞奏欲望聖慈將鑄罷祠以示利口之戒端純罷斥以彰庸人之罰耆仲姑畀外任以老其才克莊且與祠廪以奉其母庶幾宰路嚴重而政本澄清其於國論實非小補謹具覺察以聞昌裔又論王定等狀曰臣聞中興南渡留意海道之防專置帥垣實為重寄矧强敵猖獗孽婦窺覦正當固結民社控制水軍朝夕究圗以隄備不測則分閫置幕詎可委非其人乎臣謹按㳂海制置使王定人物頑頓心術回邪因賂故相僕昕而得京削因結寧海尼普而登權門出守毗陵蔑聞善狀徒以奉承貪梱之意仳離賤息之姻因此薦􅏡持節浙右進不以正公論鄙之更化之初例叨收召方為宰椽隂附用兵及分臺察專仇善類所幸陛下洞燭其姦亟屏于外不然端平人才一網盡矣䝉恩豫郡不能導德意致之民而乃搜括見緡稱提㑹子民大為擾形于嘲詩反以此敗公朝增美秩日聞易鎮之除浙東楮價為之頓落蓋恐其移害一郡者而害一路也尚何望其任分梱而控海道乎㳂海制置司主管機宜文字袁似道生禀凶暴家傳刻深方韶尹亰政出子舍昵比黠吏交通賄賕估籍富民掩為囊橐凡韶一切貪黷之政實似道附益之聖化更新凶徒盡屏汙吏之子斥謫無遺似道其尤乃獨漏網方且多岐交結開幕鄉邦倚勢作威道路以目甚至泄銅鏹以罔畨舶之利擲樗蒲以醉營妓之家䦧墻之羞尤不忍道人言籍籍謂其以毒天府者而毒鄉閭必矣何以持幕畫而贊其長乎㳂海備禦之計正在主賓相扶而今以老繆之人少凶之子參㑹其間國事鮮有濟矣欲望聖慈將定豫祠似道罷黜别選威望之臣并柬忠雅之士以重梱事以清海塵此今日之急務也謹具覺察以聞昌裔又論趙汝遇等狀曰臣聞典獄者必用常人祥刑者必惟哲人常則哀矜惻怛不以惠文為師哲則明允篤忱不以獄市為擾廷尉天下之平司臬四方之訓其可不得若人而任之乎臣謹按大理少卿趙汝遇棗昏樗散寸無他長其兄汝述五木之一也薦于故相升之中都假守廬陵一無善狀但聞黷貨囊橐以歸架屋天台極其華麗旦評公族多不齒之入為郎曹偶承卿乏暨升戎監乃謂下遷出語乞憐聞者眙愕廷理二正之選今以庸人居之汚我棘位甚矣江東提刑林半千皎厲輕儇素虧士檢自初筮仕已乏亷聲今使江東尤無美政縱部曲以追胥而肆攘奪淹民詞以監繫而多瘦亡屈法以受富民之賕冒禁以狎官籍之妓至于按行屬部尤為寵賂彰聞以若所為豈不孤臨遣之意福建提刑葉宰狷執偏滯自負吏能方在朝端粗知趨向及更民事浸見乖踈憲江右則誘殺降民守溫陵則席卷公帑逮茲易節宜務觀風而乃徇偏聽以長胥吏之姦開越訴以撓州縣之政甚至溺于子妾之愛公以貨賕交通人言如斯決難久澄清之任方聖朝欽恤之際正天牧明謹之時而內之寺廷外之臺治猶不純以吉士臣濫司刑察得之風聞用敢疏列姓名具奏欲望陛下將汝遇與宰姑畀祠廪其半千特賜罷黜庶以仰助大德曰生之造謹具覺察以聞昌裔又論安癸仲疏曰臣聞紓蜀難者在收軍心收軍心者在足兵食兵食之匱總計責也為計所言者多曰生劵日增引直日減一兵而兼兩人之請斗米而償三倍之直嵗支增至於五千萬緡而所收僅及於一半向以二分就糴關外而今盡仰給於上流事事築底若難措手矣然使得趙開之操略李逮之算計王之望之通敏勤疆夙夜諳知源流則雖公私赤立之餘尚可支梧萬一今有都賦輿之任而無調度之才者臣豈敢避仇怨而不言乎謹按具位安癸仲品凡而資騃識暗而氣昏緣先世之勳勞躐朝廷之官爵辛卯之變帥幕節麾身兼數器才聞敵至徑走合陽朝廷不加譴呵付以餉事之重蓋謂其能損家資以助國也而癸仲不惟絲毫無補反以囊橐自豐馮安世土牢刑人也乃舍之正堂以為腹心馮異孫等江湖敗賈也乃假之外幕以為羽翼委官糴於親屬而一碩一引與分其利掩官井於私家而一月數萬自操其贏根刷及於樁坐而郡計空科斂至於抵擬而民力困支糧雜糠䬣而士不飽衣賜率紕薄而師多寒是致敵騎一來望風輒潰皆以總所乏糧為詞當癸仲浮家再為遁計而潰徒尾襲追及其舟焚燬一空僅以家免其積怨怒蓋可知矣臣嘗游于劔外見癸仲任內廪無半月之積帑無經宿之儲至于關表糧多不給今觀其節次申狀乃言青澗倉失糧七千八百餘石黃沙倉失糧三千二百七石漢沔諸倉失糧一萬七千石約計三百四十萬有竒虛張夸言漫不可考不幾于大出豁以欺天聽乎且朝廷每年為之科降度牒增印引料撥大寧監鹽息合茶馬司羡利扶助總司靡不周盡而癸仲稱提無䇿征𣙜無方截科降以營私創回易以罔利所為若是豈不有辜朝廷美意乎近者癸仲自知手足俱露日夜求以脫去既僥撫諭又覬召還人言籍籍咸謂其心計智略不及乃父逺甚而交結營進反有過之可謂頽其家聲矣臣愚欲望聖慈特將癸仲鐫職罷黜亟於監司中選差諳曉財賦者一貟令代其任驅磨其失陷錢物拘核其支出米數以正典刑則不勝幸甚歷代名臣奏議卷一百八十五
