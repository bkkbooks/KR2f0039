body:
  text: 歷代名臣奏議卷二百八十明楊士竒等撰律歷周世宗即位外伐僭叛內修法度端明殿學士王朴通於厯數乃詔朴撰定嵗餘朴奏曰臣聞聖人之作也在乎知天之變者也人情之動則可以言知之天道之動則當以數知之數之為用也聖人以之觀天道焉嵗月日時由斯而成隂陽寒暑由斯而節四方之政由斯而行夫為國家者履端立極必體其元布政考績必因其嵗禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶務有為必從其日月是以聖人受命必治厯數故五紀有常度庶徵有常應正朔行之於天下也自唐之季凡歷數朝亂日失天垂將百載天之厯數汩陳而已陛下順考古道寅畏上天咨詢庶官振舉墜典臣雖非能者敢不奉詔乃包萬象以為法齊七政以立元測圭箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黃道之邪正辨天勢之升降而交蝕詳焉夫立天之道曰隂與陽隂陽各有數合則化成矣陽之䇿三十六隂之䇿二十四竒偶相命兩陽三隂同得七十二同則隂陽之數合七十二者化成之數也化成則謂之五行之數五行之得朞數過之者謂之氣盈不及者謂之朔虛至於應變分用無所不通故以七十二為經法經者常用之法也百者數之節也隨法進退不失舊位故謂之通法以通法進經法得七千二百謂之統法自元入經先用此法統厯之諸法也以通法進統法得七十二萬氣朔之下數分必盡謂之全率以通法進全率得七千二百萬謂之大率而元紀生焉元者嵗月日時皆甲子日月五星合在子當盈縮先後之中所謂七政齊矣古者植圭於陽城以其近洛也蓋尚慊其中乃在洛之東偏開元十二年遣使天下候影南距林邑北距橫野中得浚儀之嶽臺應南北弦居地之中大周建國定都於汴樹圭置箭測嶽臺晷漏以為中數晷漏正則日之所至氣之所應得之矣日月皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔自古朓朒之法率皆平行之數入歷既有前次而又衰稍不倫皇極舊術則迂回而難用降及諸歷則疏逺而多失今以月離朓朒隨歷校定日躔朓朒臨用加減所得者入離定日也一日之中分為九限每限損益衰稍有倫朓朒之法所謂審矣赤道者天之紘帶也其勢圜而平紀宿度之常數焉黃道者日軌也其半在赤道內半在赤道外去極二十四度當與赤道近則其勢斜當與赤道逺則其勢直當斜則日行宜遲當直則日行宜速故二分前後加其度二至前後減其度九道者月軌也其半在黃道內半在黃道外去極逺六度出黃道謂之正交入黃道謂之中交若正交在秋分之宿中交在春分之宿則比黃道益斜若正交在春分之宿中交在秋分之宿則比黃道反直若正交中交在二至之宿則其勢差斜故校去二至二分逺近以考斜正乃得加減之數自古雖有九道之說蓋亦知而未詳徒有祖述之文而無推步之用今以黃道一周分為八節一節之中分為九道盡七十二道而使日月無所𨼆其斜正之勢焉九道之法可謂明矣星之行也近日而疾逺日而遲去日極逺勢盡而留自古諸歷分段失實隆降無凖今日行分尚多次日便留自留而退惟用平行仍以入段行度為入歷之數皆非本理遂至乖戾今校逐日行分積以為變段然後自疾而漸遲勢盡而留自留而行亦積微而後多别立諸段變厯以推變差俾諸段變差際㑹相合星之遲疾可得而知之矣自古相傳皆謂去交十五度以下則日月有蝕殊不知日月之相掩與暗虛之所射其理有異今以日月徑度之大小校去交之逺近以黃道之斜正天勢之升降度仰視旁視之分數則交虧得其實矣臣考前世無食神首尾之文近自司天卜祝小術不能舉其大體遂為等接之法蓋從假用以求徑捷於是乎交有逆行之數後學者不能詳知因言厯有九曜以為注厯之常式今並削而去之謹以步日步月步星步發斂為四篇合為歷經一卷歷十一卷草三卷顯德三年七政細行歷一卷以為欽天歷昔在帝堯欽若昊天陛下考歷象日月星辰唐堯之道也天道𤣥逺非微臣之所盡知世宗嘉之詔司天監用之宋太祖乾德中以雅樂聲髙詔有司重加考正時判太常寺和峴上言曰古聖設法先立尺寸作為律吕三分損益上下相生取合真者謂之形器但以尺寸長短非書可傳故纍秬黍求為凖的後代試之或不符㑹西京銅望臬可校古法即今司天臺影表銅臬下石尺是也及以王朴所定比校短於石尺四分則聲樂之髙蓋由於此况影表測於天地則管律可以凖繩上乃令依古法以造新尺并黃鍾九寸之管命工人校其聲果下於朴所定管一律又內出上黨羊頭山秬黍纍尺校律亦相符合遂下尚書省集官詳定衆議僉同由是重造十二律管自此雅音和暢太宗雍熙元年四月布衣趙垂慶上書言本朝當越五代而上承唐統為金德若梁繼唐傳後唐至本朝亦合為金德矧自國初符瑞色白者不可勝紀皆金德之應也望改正朔易車旗服色以承天統事下尚書省集議常侍徐鉉與百官奏議曰五運相承國家大事著於前載具有明文頃以唐末喪亂朱梁篡弒莊宗早編屬籍親雪國讎中興唐祚重新土運以梁室比羿浞王莽不為正統自後數姓相傳晉以金漢以水周以木天造有宋運膺火德况國初祀赤帝為感生帝于今二十五年豈可輕議改易又云梁至周不合迭居五運欲國繼唐統為金德且五運迭遷親承歷數質文相次間不容髮豈可越數姓之上繼百年之運此不可之甚也按唐書天寶九載崔昌獻議自魏晉至周隋皆不得為正欲唐逺繼漢統立周漢子孫為王者後備三恪之禮是時朝議是非相半集賢院學士衛包上言符同李林甫遂行其事至十二載林甫卒復以魏周隋之後為三恪崔昌衛包由是逺貶此又前載之甚明也伏請祗守舊章以承天祐從之端拱二年四月己未翰林祗候張玭夜直禁中太宗手詔曰覽乾元厯細行此夕熒惑當退軫宿乃順行今止到角宿即順行得非厯差否奏曰今夕一鼓占熒惑在軫末角初順行也據厯法今月甲寅至軫十六度乙卯順行驗天差二度臣占熒惑明潤軌道兼前嵗逆出太微垣按厯法差疾者八日此皆上天祐德之應非厯法之可測也至道二年屯田員外郎吕奉天上言按經史年厯自漢魏以降雖有編聨周秦以前多無甲子太史公司馬遷雖言嵗次詳求朔閏則與經傳都不符合乃言周武王元年嵗在乙酉唐兵部尚書王起撰五位圖言周桓王十年嵗在甲子四月八日佛生常星不見又言孔子生於周靈王庚戌之嵗卒於周悼王四十一年壬戌之嵗皆非是也馬遷乃古之良史王起又近世名儒後人因循莫敢改易臣竊以史氏凡編一年則有一十二月月有晦朔氣閏則須與嵗次合同茍不合同何名嵗次本朝文教聿興禮樂咸備惟此一事久未刋詳臣探索百家用心十載乃知唐堯即位之年嵗在丙子迄太平興國元年亦在丙子凡三千三百一年矣虞夏之間未有甲子可證成湯既沒太甲元年始有二月乙丑朔旦冬至伊尹祀于先王至武王伐商之年正月辛卯朔二十有八日戊午二月五日甲子昧爽又康王十二年六月戊辰朔三日庚午朏王命作冊畢自堯即位年距春秋魯𨼆公元年凡一千六百七年從𨼆公元年距今至道二年凡一千七百一十五年從太甲元年距今至道二年凡二千七百三十二年從魯莊公七年四月辛卯夜常星不見距今至道二年凡一千六百八十一年從周靈王二十年孔子生其年九月庚戌十月庚辰兩朔頻食距今至道二年凡一千五百四十五年從魯哀公十六年四月乙丑孔子卒距今至道二年凡一千四百七十二年以上並據經傳正文用古厯推校無不符合乃知史記及五位圖所編之年殊為濶略諸如此事觸類甚多若盡披陳恐煩聖覽臣耽研既久引證尤明起商王小甲七年二月甲申朔旦冬至自此之後每七十六年一得朔旦冬至此乃古厯一蔀每蔀積月九百四十積日二萬七千七百五十九率以為常直至春秋魯僖公五年正月辛亥朔旦冬至了無差爽用此為法以推經傳縱有小增減抑又經傳之誤皆可以發明也古厯到齊梁以來或差一日更用近厯校課亦得符合伏望聖慈許臣撰集不出百日其書必成儻有可觀願藏祕府詔許之書終不就又司天冬官正楊文鑑上言新厯甲子請以百二十年事下有司以其無所依據議寢不行太宗曰支干相承雖止於六十儻再甲子成上夀之數使期頤之人得見所生之年不亦善乎遂詔新厯甲子所紀百二十嵗真宗大中祥符三年開封府功曹參軍張君房上言自唐室下衰土德隤圮朱梁氏彊稱金統而莊宗旋復舊邦則朱梁氏不入正統明矣晉氏又復稱金蓋謂乘于唐氏殊不知李忭建國于江南耳漢家二主共止三年紹晉而興是為水德洎廣順革命二主九年終于顯德以上三朝七主共止二十四年行運之間隂𨼆而難賾伏自太祖承周木德而王當於火行上繫于商開國在宋自是三朝迄今以為然矣愚臣詳而辨之若可疑者太祖禪周之嵗嵗在庚申夫庚者金也申亦金位納音是木蓋周氏稱木為二金所勝之象也太宗登極之後詔開金明池於金方之上此誰啓之乃天之靈符也陛下履極當彊圉之嵗握符在作噩之春適宋道之隆興金天之正氣臣試以瑞應言之則當年丹徒貢白鹿姑蘇進白龜條支之雀來頴川之雉至臣又聞當封禪之時魯郊貢白兔鄆上得金龜皆金符之至驗也願以臣章下三事大臣參定其事疏奏不報天禧四年光祿寺丞謝絳上書曰臣按古志凡帝王之興必推五行之盛德所以配天地而符隂陽也故神農氏以火德聖祖以土德夏以木德商以金德周以火德自漢之興王火德者以謂承堯之後且漢堯之裔也五帝之大莫大於堯漢能因之是不墜其緒而善繼其盛德也國家膺開光之慶執敦厚之德宜以土瑞而王天下然其推終始傳承周之木德而大當其次且朱梁不預正統者謂莊宗復興于後自石晉漢氏以及于周則李忭建國于江左而唐祚未絶是三代者亦不得正其統矣昔者秦祚促而德暴不入正統考諸五代之際亦是類矣國家誠能下黜五代紹唐之土德以繼聖祖亦猶漢之黜秦興周之火德以繼堯者也夫五行定位土德居中國家飛運於宋作京于汴誠萬國之中區矣傳曰土為羣物主故曰后土洪範曰土爰稼穡稼穡作甘方今四海給足嘉生蕃衍邇年京師甘露下泰山醴泉湧作甘之兆斯亦見矣矧靈木異卉資生於土千品萬類不可勝道非土德之驗乎臣又聞之太祖生于洛邑而胞絡惟黃鴻圖既建五緯聚於奎躔而鎮星是主及陛下升中之次日抱黃珥朝祀于太清宫有星曰含譽其色黃而潤澤斯皆凝命有表盛德攸屬天意人事響效之大者則土德之符在矣是故天心之在兹陛下拒而罔受民意之若是陛下謙而弗答氣壅未宣河決遂潰豈不神哉然則天淵之勃流水德之浸患考六府之厭鎮驗五行之勝尅亦宜興土之運禦時之灾伏望順考符應詳習法度惟陛下時而行之幸甚大理寺丞董行父又上言曰在昔泰昊以萬物生於東至仁體乎木故德始於木木以生火神農受之為火德火以生土黃帝受之為土德土以生金少昊受之為金德金以生水顓頊受之為水德水以生木髙辛受之為木德木以生火唐堯受之為火德火以生土虞舜傳之為土德土以生金夏為金德金以生水商為水德水以生木周為木德木以生火漢應圖讖為火德火以生土唐受厯運為土德陛下紹天之統受天之命固當上繼唐祚以金為德顯黃帝之嫡緒彰聖祖之丕烈臣又按聖祖先降於癸酉太祖受禪於庚申陛下即位於丁酉天書下降於戊申庚金也申酉皆金也天之體也陛下紹唐漢之運繼黃帝之後三世變道應天之統正金之德斯又順也詔兩制詳議既而獻議曰竊詳謝絳所述以聖祖得瑞宜承土德且引漢承堯緒為火德之比雖班彪叙漢祖之興有五其一曰帝堯之苗裔及序承正統乃越秦而繼周非用堯之行今國家或用土德即當越唐上承於隋彌以非順失其五德傳襲之序又據董行父請越五代紹唐為金德若其度越纍世上承百代之統則晉漢洎周咸帝中夏太祖實受終於周室而陟于元后豈可弗遵傳繼之序續於遐邈之統三聖臨御六十餘載登封告成昭姓紀號率循火行之運以輝炎靈之曜兹事體大非容輕議矧雍熙中徐鉉等議之詳矣其謝絳董行父等所請難以施行詔可仁宗初馮元等上新修景祐廣樂記時鄧保信阮逸胡瑗等奏造鍾律詔翰林學士丁度知制誥胥偃右司諫髙若訥韓琦取保信逸瑗等鍾律詳考得失度等上議曰保信所製尺用上黨秬黍圓者一黍之長纍而成尺律管一據尺裁九十黍之長空徑三分空圍九分容秬黍千二百遂用黍長為分再纍成尺校保信尺律不同其籥合升斗深濶推以算法類皆差舛不合周漢量法逸瑗所製亦上黨秬黍中者纍廣求尺製黃鍾之律今用再纍成尺比逸瑗所製又復不同至於律管籥合升斗斛豆區釜亦率類是蓋黍有圓長大小而保信所用者圓黍又首尾相銜逸等止用大者故再考之即不同尺既有差故難以定鍾磬謹詳古今之制自晉至隋纍黍之法但求尺裁管不以權量絫黍參校故歷代黃鍾之管容黍之數不同惟後周掘地得古玉斗據斗造律兼制權量亦不同周漢制度故漢志有備數和聲審度量權衡之說悉起於黃鍾今欲數器之制參互無失則班志積分之法為近逸等以大黍纍尺小黍實籥自戾本法保信黍尺以長為分雖合後魏公孫崇所說然當時已不施用况保信今尺以圓黍纍之及首尾相銜有與實籥之黍再纍成尺不同其量器分寸既不合古即權衡之法不可獨用詔悉罷之又詔丁度等詳定太府寺并保信逸瑗所制尺度度等言尺度之興尚矣周官璧羡以起度廣徑八寸袤一尺禮記布手為尺淮南子十二粟為一寸孫子十氂為分十分為寸雖存異說莫可適從漢志元始中召天下通知鍾律者百餘人使劉歆典領之是時周滅二百餘年古之律度當有考者以歆之博貫藝文曉達歷算有所制作宜不凡近其審度之法云一黍之廣為分十分為寸十寸為尺先儒訓解經籍多引以為義歷世相襲著之定法然而嵗有豐儉地有磽肥就令一嵗之中一境之內取以校驗亦復不齊是蓋天物之生理難均一古之立法存其大槩爾故前代制尺非特纍黍必求古雅之器以雜校焉晉泰始十年荀勗等校定尺度以調鍾律是為晉之前尺朂等以古物七品勘之一曰姑洗玉律二曰小吕玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺當時以朂尺揆校古器與本銘尺寸無差前史稱其用意精密隋志所載諸代尺度十有五等然以晉之前尺為本以其與姬周之尺劉歆銅斛尺建武銅尺相合竊惟周漢二代享年永久聖賢制作可取則焉而隋氏銷毁金石典正之物罕復存者夫古物之有分寸明著史籍可以酬驗者惟有法錢而已周之圜法歷載曠逺莫得而詳秦之半兩實重八銖漢初四銖其文亦曰半兩孝武之世始行五銖下暨隋朝多以五銖為號既歷代尺度屢改故大小輕重鮮有同者惟劉歆置銅斛世之所鑄錯刀并大泉五十王莽天鳳元年改鑄貨布貨泉之類不聞後世復有兩者臣等檢詳漢志通典唐六典云大泉五十重十二銖徑一寸二分錯刀環如大泉身形如刀長二寸貨布重二十五銖長二寸五分廣一寸首長八分有竒廣八分足股長八分間廣二分圍好徑二分半貨泉重五銖徑一寸今以大泉錯刀貨布貨泉四物相參校分寸正同或有大小輕重與本志微差者蓋當時盜鑄既多不必皆中法度但當校其首足肉好長廣分寸皆合正史者用之則銅斛之尺從可知矣况經籍制度皆起周世以劉歆術業之博祖沖之算數之妙荀朂揆校之詳密校之既合周尺則最為可法兼詳隋牛𢎞等議稱後周太祖敕蘇綽造鐵尺與宋尺同以調中律以均田度地唐祖孝孫云隋平陳之後廢周玉尺用此鐵尺律然比晉前尺長六分四氂今司天監影表尺和峴所謂西京銅望臬者蓋以其洛都舊物也今以貨布錯刀貨泉大泉等校之則景表尺長六分有竒略合宋周隋之尺由此論之銅斛與貨布等尺寸昭然可驗有唐享國三百年其間制作法度雖未逮周漢然亦可謂治安之世矣今朝廷必求尺之中當依漢錢分寸若以為太祖膺圖受禪創制垂法嘗詔和峴等用影表尺與典修金石七十年間薦之郊廟稽合唐制以示貽謀則可且依影表舊尺俟有妙達鍾律之學者俾考正之以從周漢之制王朴律凖尺比漢錢尺寸長二分有竒比影表尺短四分既前代未嘗施用復經太祖朝更易其逸瑗保信及照所用太府寺等尺其制彌長出古逺甚又逸進周禮度量法議欲且鑄嘉量然後取尺度權衡其說踈舛不可依用謹考舊文再造影表尺一校漢錢尺二并大泉錯刀貨布貨泉總十七枚上進詔度等以錢尺影表尺各造律管比驗逸瑗并太常新舊鍾磬考定音之髙下以聞度等言前承詔考太常等四尺定可用者止按典故及以漢志古錢分寸參校影表尺略合宋周隋之尺謂宜準影表尺施用今被㫖造律管驗音髙下非所素習乞别詔曉音者總領較定詔乃罷之而若訥卒用漢貨泉度尺寸依隋書定尺十五種上之藏于太常寺時朝臣宋祁田況薦益州進士房庶曉音祁上其樂書補亡三卷召詣闕庶自言曰嘗得古本漢志云度起於黃鍾之長以子榖秬黍中一黍之起積一千二百黍之廣度之九十分黃鍾之長一為一分今文脫之起積一千二百黍八字故自前世以來纍黍為尺以製律是律生於尺尺非起於黃鍾也且漢志一為一分者蓋九十分之一後儒誤以一黍為分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鍾之長九寸加一以為尺則律定矣直祕閣范鎮是之乃為言曰照以縱黍纍尺管空徑三分容黍千七百三十瑗以橫黍纍尺管容黍一千二百而空徑三分四釐六毫是皆以尺生律不合古法今庶所言實千二百黍於管以為黃鍾之長就取三分以為空徑則無容受不合之差校前二說為是蓋纍黍為尺始失之於隋書當時議者以其容受不合棄而不用及隋平陳得古樂器髙祖聞而歎曰華夏舊聲也遂傳用之至唐祖孝孫張文收號稱知音亦不能更造尺律止治隋之古樂制定聲器朝廷久以鍾律未正屢下詔書博訪羣議冀有所獲今庶所言以律生尺誠衆論所不及請如其法試造尺律更以古器參考當得其真乃詔王洙與鎮同於修制所如庶說造律尺籥律徑三分圍九分長九十分籥徑九分深一寸尺起黃鍾之長加十分而律容千二百黍初庶言太常樂髙古樂五律比律成才下三律以為今所用黍非古所謂一稃二米黍也尺比橫黍所纍者長一寸四分庶又言古有五音而今無正徴音國家以火德王徴屬火不宜闕今以五音旋相生法得徴音又言尚書同律度量衡所以齊一風俗今太常教坊鈞容及天下州縣各自為律非書同律之義且古者帝王巡狩方嶽必考禮樂同異以行誅賞謂宜頒格律自京師及州縣毋容輒異有擅髙下者論之帝召輔臣觀庶所進律尺籥又令庶自陳其法因問律吕旋相為宫事令撰圖以進其說以五正二變配五音迭相為主衍之成八十四調舊以宫徴商羽角五音次第配七聲然後加變宫變徵二聲以足其數推以旋相生之法謂五行相戾非是當改變徴為變羽易變為閏隨音加之則十二月各以其律為宫而五行相生終始無窮詔以其圖送詳定所庶又論吹律以聽軍聲者謂以五行逆順可以知吉凶先儒之說略矣是時瑗逸制樂有定議乃補庶試祕書省校書郎遣之慶厯四年范鎮上書曰陛下制樂以事天地宗廟以揚祖宗之休兹盛德之事也然自下詔以來及今三年有司之論紛然未決蓋由不議其本而爭其末也竊惟樂者和氣也發和氣者聲音也聲音之生生於無形故古人以有形之物傳其法俾後人參考之然後無形之聲音得而和氣可道也有形者秬黍也律也尺也籥也釜也斛也算數也權衡也鍾也磬也是十者必相合而不相戾然後為得今皆相戾而不相合則為非是矣有形之物非是而欲求無形之聲音和安可得哉謹條十者非是之驗惟裁擇焉按詩誕降嘉種維秬維秠誕降者天降之也許慎云秬一稃二米又云一秬二米後漢任城縣産秬黍三斛八斗實皆二米史官載之以為嘉瑞又古人以秬黍為酒者謂之秬鬯宗廟降神惟用一尊諸侯有功惟賜一卣以明天降之物世不常有而可貴也今秬黍取之民間者動至數百斛秠皆一米河東之人謂之黑米設有真黍以為取數至多不敢送官此秬黍為非是一也又按先儒皆言律空徑三分圍九分長九十分容千二百黍積實八百一十分今律空律徑三分四氂六毫圍十分三氂八毫是圍九分外大其一分三氂八毫而后容千二百黍除其圍廣則其長止七十六分二氂矣說者謂四氂六毫為方分古者以竹圍為律竹形本圓而今以方分置算此律之為非是二也又按漢書分寸尺丈引本起黃鍾之長又云九十分黃鍾之長者据千二百黍而言也千二百黍之施於量則曰黃鍾之籥施於權衡則曰黃鍾之重施於尺則曰黃鍾之長今遺千二百之數而以百黍為尺又不起於黃鍾此尺之為非是三也又按漢書言籥其狀似爵謂爵盞其體正圓故籥當圓徑九分深十分容千二百黍積實八百一十分與律分正同今籥乃方一寸深八分一氂容千二百黍是亦以方分置算者此籥之非是四也又按周禮釜法方尺圓其外深尺容六斗四升方尺者八寸之尺也深尺者十寸之尺也何以知尺有八寸十寸之别按周禮璧羡度尺好三寸以為尺璧羡之制長十寸廣八寸同謂之度尺以為尺則八寸十寸俱為尺矣又王制云古者以周尺八尺為步今以六尺四寸為步八尺者八寸之尺也六尺四寸者十寸之尺也同謂之周尺者是周用八寸十寸尺明矣故知八寸尺為釜之方十寸尺為釜之深而容六斗二升千二百八十籥也積實一百三萬六千八百分今釜方尺積十寸此釜之非是五也又按漢書斛法方尺圓其外容十斗旁有庣焉當隋時漢斛尚在故隋書載其銘曰審律嘉量斛方尺圓其外庣旁九氂五毫羃百六十二寸深尺容一斛今斛方尺深一尺六寸二分此斛之非是六也又按算法圓分謂之徑圍方分謂之方斜所謂徑三圍九方五斜七是也今圓分而以方法算之此算數非是七也又按權衡者起千二百黍而立法也周之釜其重一鈞聲中黃鍾漢之斛其重二鈞聲中黃鍾釜斛之制有容受有尺寸又取其輕重者欲見薄厚之法以考其聲也今黍之輕重未真此權衡為非是八也又按鳬氏為鍾大鍾十分其鼓間之以其一為之厚小鍾十分其鉦間之以其一為之厚今無大小薄厚而一以黃鍾為率此鍾之非是九也又按磬氏為磬倨句一矩有半其博為一股為二鼓為三蓋各以其律之長短為法也今亦以黃鍾為變而無長短厚薄之别此磬之非是十也前此者皆有形之物也可見者也使其一不合則未可以為法況十者之皆相戾乎臣固知其無形之聲音不可得而和也請以臣章下有司問黍之二米與一米孰是律之空徑三分與三分四氂六毫孰是律之起尺與尺之起律孰是籥之圓制與方制孰是釜之方尺圓其外深尺與方尺孰是斛之方尺圓其外庣旁九氂五毫與方尺六寸二分孰是算數之圓分與方分孰是權衡之重以二米秬黍與一米孰是鐘磬依古法有大小輕重長短薄厚而中律孰是是不是定然後制籥合升斗釜斛以校其容受容受合然後下詔以求真黍真黍至然後可以為量為鐘磬量與鐘磬合於律然後可以為樂也今尺律本末未定而詳定修制二局工作之費無慮千萬計矣此議者所以云云也然議者不言有司論議依違不決而顧謂作樂為過舉又言當今宜先政令而禮樂非所急此臣之所大惑也儻使有司合禮樂之論是其所是非其所非陛下親臨決之顧於政令不已大乎昔漢儒議鹽鐵後世傳鹽鐵論方今定雅樂以求廢墜之法而有司論議不著盛德之事後世將何考焉願令有司人人各以經史論議條上合為一書則孰敢不自竭盡以副陛下之意如以臣議為然伏請權罷詳定修制二局俟真黍至然後為樂則必至當而無事於浮費也詔送詳定所慶歷中翰林學士宋祁論以尺定律奏曰臣聞樂主於音音生於律律定於尺尺成於黍得黍不真尺固不定定尺無準律亦自差而望聲調是南舟泝燕北轅走越愈亟逺也故尺短則律從而短尺長則律從而長短者聲清益上長者聲濁益下清濁不得其中而至樂遁矣古者神瞽考中聲而量之以為之律所以立均出度也黃帝命伶倫斷竹長三寸九分吹之以為黃鍾之宫然後制十二律以上下求而聽鳳鳴司馬遷黃鍾之律長八寸七分之一太簇七寸七分之二林鍾五寸七分之三應鍾四寸三分之二班固司馬彪說黃鍾長九寸聲最濁太簇長八寸林鍾長六寸應鍾長四寸七分四氂强聲最清蔡雍鄭𤣥杜夔荀朂等所論尺有增損而黃鍾之宫要以九寸為定始朂當武帝泰始中校太樂八音不和知後漢至魏尺長於古四分有餘朂乃部著作郎劉恭依周禮制尺所謂古尺也以古尺更鑄銅律調叶聲韻後汲郡盜發六國時魏襄王冡得古周時玉律及鐘磬與新律聲韻暗同于時郡國或得漢時故鍾吹朂律以合之其聲皆應時人稱為精密惟散騎侍郎陳留阮咸譏其聲髙聲髙則悲非興國之音必古今尺有長短所致也武帝以朂律與周漢器合遂施用之後始平掘地得古銅尺嵗久欲腐不知所出何代果長朂尺四分時人咸服其妙而莫能措意焉朂立千載之下推百代之法度數既合聲韻又諧亦可謂密切而有證也而時人掘地之一尺破周漢之二器亦近夫貴耳賤目也隋時始用木尺律而定律吕鑄壞前代金石以息物議大業中更詔用梁表律調八音之器比之前代最為合古惜其制度文議設於江都無聞焉耳是時有十五等一周尺二晉田父玉尺三梁表尺四漢官尺五魏尺六晉後尺七後魏前尺八中尺九後尺十東後魏尺十一蔡雍銅籥尺十二宋氏尺十三萬寶常水尺十四雜尺十五梁朝俗間尺後周時達奚震等議獨以鐵尺為允即十二宋氏尺也其說曰今以上黨羊頭山黍依漢書律厯志度之若以大者稠纍依數滿尺實於黃鍾之律須撼乃容若以中者纍尺雖復小稀實於黃鍾不動而滿計此二事之殊良由消息未善其於鐵尺終有一㑹且上黨之黍有異他鄉其色略烏其形圓重用之為量定不徒然正以時有水旱之殊地有肥瘠之異取黍大小未必得中案許慎解字黍體大本異於常疑今之大者正是其中纍百滿尺非是㑹古實籥之外裁剩餘此恐圍徑或差造律未妙就如撼動取滿論理亦通今勘周漢古錢大小有合宋氏渾儀尺度無舛古者黃金方寸重一斤今鑄金校驗鐵尺為近未及詳定㑹髙祖受命而止唐貞觀中又詔張文收鑄銅斛稱尺咸得其數詔以其副藏於樂署至武延秀為太常卿用為竒玩以律與古玉尺玉斗舛合獻焉開元中將考宗廟樂有司奏請出之敕惟以銅管付太常亡其九管國朝金石傳自周代世宗常詔王朴纍黍定尺以為律管管既不便作準之尺寸于今具在而當時實録不論秬黍未知何用即加詳定且五代離亂古器蕩然雖欲制作靡所緣旁時無神瞽孰敢取中獨非莫知獨是莫曉工乎音者不能言義工乎書者不能察聲信乎音樂之難不可以言曉者也故曰知之者欲教而無從心達者體之而無師方今去聖既逺知音又寡但取朴準調叶八音屬者太常臣燕肅以律準尺之三分欲為十二律管而黃鍾九寸遂不得聲更廣空道乃與律應雖管內均厚未悉如法然深疑今尺比古差短太常鐘石遂及於清流至法部轉用髙急臣以為宜求索上黨秬黍如達奚震之言選其精圓纍定分寸尺定求管得管求聲以所管之聲合周時之準茍髙下符㑹清濁無差即可遂為定法頒布方國足以示陛下同律度量權衡之制脫有與準未合即乞募知音别用新管參考中聲檢攝羣音制定雅樂庶乎正歷代之謬秕亦何憚焉元世祖至元十三年命郭守敬與王恂率南北日官分掌測驗推於下命張文謙與樞密張易為之主領裁奏於上左丞許衡參預其事郭守敬首言歷之本在於測驗而測驗之器莫先儀表今司天渾儀宋皇祐中汴京所造不與此處天度相符比量南北二極約差四度表石年深亦復攲側守敬乃盡考其失而移置之又奏唐一行開元間令南宫說天下測景書中見者凡十三處今疆宇比唐尤大若不逺方測驗日月交食分數時刻不同晝夜長短不同日月星辰去天髙下不同即曰測驗人少可先南北立表取直測景帝可其奏十七年新厯告成郭守敬與諸臣同上奏曰臣等竊聞帝王之事莫重於厯自黃帝迎日推䇿帝堯以閏月定四時成嵗舜在璇璣玉衡以齊七政爰及三代厯無定法周秦之間閏餘乖次西漢造三統歷百二十年而後是非始定東漢造四分歷七十餘年而儀式方備又百二十一年劉洪造乾象歷始悟月行有遲速又百八十年姜岌造三紀甲子歷始悟以月食衝撿日宿度所在又五十七年何承天造元嘉歷始悟以朔望及弦皆定大小餘又六十五年祖沖之造大明厯始悟太陽有嵗差之數極星去不動處一度餘又五十二年張子信始悟日月交道有表裏五星有遲疾留逆又三十三年劉焯造皇極厯始悟日行有盈縮又三十五年傅仁均造戊寅元歷頗采舊儀始用定制又四十六年李淳風造麟德歷以古歷章蔀元首分度不齊始為總法用進朔以避晦晨月見又六十三年一行造大衍歷始以朔有四大三小定九服交食之異又九十四年徐昻造宣明歷始悟日食有氣刻時三差又百三十六年姚舜輔造紀元歷始悟食甚泛餘差數以上計千一百八十二年歷經七十改其創法者十有三家自是又百七十四年聖朝專命臣等改治新歷臣等用創造簡儀髙表憑其測實數所考正者凡七事一曰冬至自丙子年立冬後依每日測到晷景逐日取對冬至前後日差同者為準得丁丑年冬至在戊戌日夜半後八刻半又定丁丑夏至在庚子日夜半後七十刻又定戊寅冬至在癸卯日夜半後三十三刻己卯冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻各減大明歷十八刻逺近相符前後應凖二曰嵗餘自大明歷以來凡測景驗氣得冬至時刻真數者有六用以相距各得其時合用嵗餘今考驗四年相符不差仍自宋大明壬寅年距至今日八百一十年每嵗合得三百六十五日二十四刻二十五分其二十五分為今歷嵗餘合用之數三曰日躔用至元丁丑四月癸酉望月食既推求日躔得冬至日躔赤道箕宿十度黃道箕九度有竒仍憑每日測到太陽躔度或憑星測月或憑月測日或徑憑星度測日立術推算起自丁丑正月至己卯十二月凡三年共得一百三十四事皆躔於箕與日食相符四曰月離自丁丑以來至今憑每日測到逐時太隂行度推算變從黃道求入轉極遲疾并平行處前後凡十三轉計五十一事內除去不真的外有三十事得大明歷入轉後天又因考驗交食加大明厯三十刻與天道合五曰入交自丁丑五月以來憑每日測到太隂去極度數比擬黃道去極度得月道交於黃道共得八事仍依日食法度推求皆有食分得入交時刻與大明歷所差不多六曰二十八宿距度自漢太初歷以來距度不同互有損益大明歷則於度下餘分附以太半少皆私意牽就未嘗實測其數今新儀皆細刻周天度分每度為三十六分以距線代管窺宿度餘分並依實測不以私意牽就七曰日出入晝夜刻大明歷日出入晝夜刻皆據汴京為凖其刻數與大都不同今更以本方北極出地髙下黃道出入內外度立術推求每日日出入晝夜刻得夏至極長日出寅正二刻日入戌初二刻晝六十二刻夜三十八刻冬至極短日出辰初二刻日入申正二刻晝三十八刻夜六十二刻永為定式所創法凡五事一曰太陽盈縮用四正定氣立為升降限依立招差求得每日行分初末極差積度比古為密二曰月行遲疾古歷皆用二十八限今以萬分日之八百二十分為一限凡析為三百三十六限依垜疊招差求得轉分進退其遲疾度數逐時不同蓋前所未有三曰黃赤道差舊法以一百一度相減相乘今依算術句股􅋃矢方圜斜直所容求到度率積差率與天道實吻合四曰黃赤道內外度據纍年實測內外極度二十三度九十分以圜容方直矢接句股為法求每日去極與所測相符五曰白道交周舊法黃道變推白道以斜求斜今用立渾比量得月與赤道正交距春秋二正黃赤道正交一十四度六十六分擬以為法推逐月每交二十八宿度分於理為盡處士楊恭懿進奏曰臣等遍考自漢以來歷書四十餘家精思推算舊儀難用而新者未備故日行盈縮月行遲疾五行周天其詳皆未精察今權以新儀木表與舊儀所測相較得今嵗冬至晷景及日躔所在與列舍分度之差大都北極之髙下晝夜刻長短參以古制創立新法推算成辛巳厯雖或未精然比之前改歷者附㑹元歷更日立法全踵故習顧亦無愧然必每嵗測驗修改積三十年庶盡其法可使如三代日官世專其職測驗良久無改嵗之事矣又合朔議曰日行歷四時一周謂之一嵗月踰一周復與日合謂之一月言一月之始日月相合故謂合朔自秦廢歷紀漢太初止用平朔法大小相間或有二大者故日食多在晦日或二日測驗時刻亦鮮中宋何承天測驗四十餘年進元嘉歷始以月行遲速定小餘以正朔望使食必在朔名定朔法有三大二小時以異舊法罷之梁虞􅒠造大同歷隋劉焯造皇極歷皆用定朔為時所阻唐傅仁均造戊寅歷定朔始得行貞觀十九年四月頻大人皆異之竟改從平朔李淳風造麟德歷雖不用平朔遇四大則避人言以平朔間之又希合當世為進朔法使無元日之食至一行造大衍歷謂天事誠密四大二小何傷誠為確論然亦循常不改臣等更造新歷一依前賢定論推算皆改從實今十九年歷自八月後四月併大實日月合朔之數也世祖時東平布衣趙天麟上䇿論同制度疏曰臣聞四海若一堂之上聖王無二上之尊頒法制以為先俾和同之咸若昔有虞之巡狩覲國君於四方先之以協時月正日次之以同律度量衡延及蒼周之時立司市以平物價至於炎漢之世命張蒼以定章程究而言之由來尚矣粵自曹劉鼎峙南北瓜分前乎此則七雄之疆域參差後乎此則五季之風塵擾攘欲其同也不亦難乎古制猶存前書備載今國家堯天蕩蕩禹跡茫茫一民莫非其臣也尺地莫非其有也然其曹奢魏褊楚急齊舒皆風土之漸摩習俗之常然欲移易亦非他得乎中而止矣若夫方方異政縣縣殊俗不為一新何成盛化且天為繩而貴直地為準而貴平東方之神其名勾芒執規司春南方之神其名祝融執衡司夏西方之神其名蓐收執矩司秋北方之神其名𤣥冥執權司冬由此觀之準繩規矩權衡所以為六合之司職也臣聞虞夏商周之法不可得而詳矣惟劉歆之義載在班書最為詳悉臣試條之一曰備數二曰和聲三曰審度四曰嘉量五曰權衡參伍以變錯綜其數稽之於古今效之於氣物和之於心耳著之於經傳咸得其實靡不協同所謂備數者制器規圓矩方權重衡平準繩嘉量而不失故紀於一協於十長於百大於千衍於萬也所謂和聲者律吕以成之支干以該之故中於宫觸於角祉於徴章於商宇於羽也所謂審度者以子榖秬黍之中者一黍之廣度之九十分黃鍾之長一為一分自分而上十為差率故别於分忖於寸矱於尺張於丈信於引也所謂嘉量者本起於黃鍾之籥以子榖秬黍之中者千有二百粒可實其籥自籥而上十為差率故躍於籥合於合登於升聚於斗角於斛也所謂權衡者亦起於黃鍾之籥每籥二十銖二十四銖成兩十六兩成斤三十斤成鈞四鈞成石故始於銖兩於兩明於斤均於鈞終於石也臣又以劉歆之法三十餘斤為一斗今則不可從也然其理有可從方今數已宣於天下歷已職於太史樂已總於太常聲已協於協律其所以雖有未定雖定而未齊一者度量衡而已矣臣居山東但見山東數郡或隔一鎮或間一河其度之長短量之多寡衡之輕重已皆不相同矣則何以示四海一家之平制哉伏望陛下詔令都省昭立制度採劉歆之說監其可否定其髙低既約黍粒之多寡勻長為一尺復約黍粒之多寡平重為一斤外但約今法以十有二斤為斗五斗為斛兩斛為石石重百二十斤水平為槩用銅則焉三者既定頒付行省散於隨路以為各路之的可也截自令行之後違者有司治其罪庶乎自南自北知制度之昭彰于外于中等資財之出納聖人嘗謂謹權量四方之政行焉此之謂也厯代名臣奏議卷二百八十
