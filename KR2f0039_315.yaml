body:
  text: 歴代名臣奏議卷三百十五明楊士竒等撰營繕魯莊公丹桓宫之楹而刻其桷匠師慶言於公曰臣聞聖王公之先封也遺後之人法使無陷於惡其為後世昭前之令聞也使長監於世故能攝固不觧今先君儉而君侈之令徳替矣公曰吾屬欲美之對曰無益於君而替前之令徳臣故曰庶可以已矣楚靈王為章華之䑓與伍舉升焉曰䑓美夫對曰臣聞國君服寵以為美安民以為樂聴徳以為聰致逺以為明不聞其以土木之崇髙彫鏤為美而以金石匏竹之昌大囂庶為樂不聞其以觀大視侈淫色以為明而以察清濁為聰也先君莊王為匏居之䑓髙不過望國氛大不過容宴豆木不妨守備用不煩官府民不廢時務官不易朝常問誰宴焉則宋公鄭伯問誰相禮則華元駟騑問誰賛事則陳侯蔡侯許男頓子其大夫侍之先君是以除亂克敵而無惡於諸侯今君為此䑓也國民罷焉財用盡焉年榖敗焉百官煩焉舉國留之數年乃成願得諸侯與始升焉諸侯皆距無有至者而後使太宰啟疆請於魯侯懼之以蜀之役而僅得以来使富都那豎賛焉而使長鬛之士相焉臣不知其美也夫美也者上下外内小大逺邇皆無害焉故曰美若於目觀則美縮於財用則匱是聚民利以自封而瘠民也胡美之為夫國君者將民之與處民實瘠矣君安得肥且夫私欲𢎞侈則徳義鮮少徳義不行則邇者騷離而逺者距違天子之貴也惟其以公侯為官正而以伯子男為師旅其有美名也惟其施令徳於逺近而小大安之也若斂民利以成其私欲使民蒿焉而忘其安樂而有逺心其為惡也甚矣安用自觀故先王之為䑓榭也榭不過講軍實䑓不過望氛祥故榭度於大卒之居䑓度於臨觀之髙其所不奪穡地其為不匱財用其事不煩官業其日不廢時務瘠磽之地於是乎為之城守之木於是乎用之官寮之暇於是乎臨之四時之隙於是乎成之故周詩曰經始靈䑓經之營之庶民攻之不日成之經始勿亟庶民子来王在靈囿麀鹿攸伏夫為䑓榭將以教民利也不知其以匱也若君謂此䑓美而為之正楚其殆矣普平公使叔向聘於呉呉人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而狐裘者叔向歸以告平公平公曰呉其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之䑓上可以發千兵下可以陳鐘鼓諸侯聞君者亦曰奚以敬䑓奚以敬民所敬各異也於是平公乃罷䑓平公春築䑓叔向曰不可古者聖王貴徳而務施緩刑辟而趨民時今春築䑓是奪民時也夫徳不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而又奪其時是重竭也夫牧百姓養育之而重竭之豈所以定命安存而稱為人君於後世哉平公曰善乃罷䑓役衞靈公以天寒鑿池宛春諫曰天寒起役恐傷民公曰天寒乎宛春曰君衣狐裘坐熊席隩隅有竈是以不寒今民衣弊不補履決不苴君則不寒民誠寒矣公曰善令罷役齊宣王為大室大盖百畆堂上三百户以齊國之大具之三年而未能成羣臣莫敢諫者香居問宣王曰荆王釋先王之禮樂而為淫樂敢問荆邦為有主乎王曰為無主敢問荆邦為有臣乎王曰為無臣居曰今王為大室三年不能成而羣臣莫有諫者敢問王為有臣乎王曰為無臣香居曰臣請避矣趨而出王曰香子留何諫寡人之晚也遂召尚書曰書之寡人不肖好為大室香子止寡人也漢武帝使太中大夫吾丘夀王與待詔能用算者二人舉籍阿城以南盩厔以東宜春以西提封頃畆及其賈直欲除以為上林苑屬之南山又詔中尉左右内史表屬縣草田欲以償鄠杜之民吾丘夀王奏事上大説稱善時東方朔在旁進諫曰臣聞謙遜静慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累郎䑓恐其不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止灞滻以西都涇渭之南此天下所謂陸海之地秦之所以虜西戎兼山東者也其出玉石金銀銅鐵豫章檀柘異𩔖之物不可勝原此百工所取給萬民所仰足也又有秔稻棃栗桑麻竹箭之饒土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號為上膏其賈畆一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖是其不可一也且盛荆棘之林而長養麋鹿廣狐兔之苑大虎狼之虗又壊人冢墓發人室廬令幼弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以彊國富人也夫殷作九市之宫而諸侯畔靈王起章華之䑓而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死東漢明帝永平三年夏旱帝大起北宫尚書僕射鍾離意詣闕免冠上䟽曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日宻雲遂無大潤豈政有未得應天心者邪昔成湯遭旱以六事自責曰政不節邪使人疾邪宫室崇邪女謁盛邪苞苴行邪讒夫昌邪竊見北宫大作人失農時此所謂宫室崇也自古非苦宫室小狹但患人不安寜宜且罷止以應天心臣意以匹夫之才無有行能久食重禄擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱宻雲數㑹朕戚然慙懼思獲嘉應故分布禱請闚候風雲北祈明堂南設雩場今又敕大匠止作諸宫減省不急庶消灾譴詔因謝公卿百僚遂應時澍雨焉靈帝欲造罼圭靈昆苑司徒楊賜上䟽諫曰竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以修三驅之禮薪莱芻牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壊沃衍廢田園驅居人畜禽獸殆非所謂若保赤子之義今城外之苑已有五六可以逞情意順四節也四節謂春蒐夏苗秋獮冬狩也宜惟夏禹卑宫太宗露䑓之意以慰下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣王五十里人以為大今與百姓共之無害於政也帝悦遂令築苑魏文帝時力修殿舍百姓勞役衞尉辛毗上䟽曰竊聞諸葛亮講武治兵而孫權市馬遼東量其意指似欲相左右備豫不虞古之善政而今者宫室大興加連年榖麥不收詩云民亦勞止迄可小康恵此中國以綏四方唯陛下為社稷計帝報曰二虜未滅而治宫室直諫者立名之時也夫王者之都當及民勞兼辦使後世無所復増是蕭何為漢規摹之略也今卿為魏重臣亦且解其大歸帝又欲平北芒令於其上作䑓觀則見孟津毗諫曰天地之性髙髙下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而邱陵皆夷将何以禦之帝乃止明帝即位營脩宫室蘭陵侯王朗上疏曰陛下即位已来恩詔屢布百姓萬民莫不欣欣臣頃奉使北行往返道路聞衆徭役其可得蠲除省減者甚多願陛下重留日昃之聽以計制寇昔大禹將欲拯天下之大患故乃先卑其宫室儉其衣食用能盡有九州弼成五服句踐欲廣其禦兒之疆禦兒呉界邉戍之地名馘夫差於姑蘇故亦約其身以及家儉其家以施國用能嚢括五湖席卷三江取威中國定霸華夏漢之文景亦欲恢𢎞祖業増崇洪緒故能割意於百金之䑓昭儉於弋綈之服内減大官而不受貢獻外省徭賦而務農桑用能號稱升平㡬致刑錯孝武之所以能奮其軍勢拓其外境誠因祖考畜積素足故能遂成大功霍去病中才之將猶以匈奴未滅不治第宅明卹逺者略近事外者簡内自漢之初及其中興皆於金革略寢之後然後鳯闕猥閌徳陽並起今當建始之前足用列朝㑹崇華之後足用序内官華林天淵足用展游宴若且先成閶闔之象魏使足用列逺人之朝貢者修城池使足用絶踰越成國險其餘一切且須豐年一以勸耕農為務習戎備為事則國無怨曠户口滋息民充兵彊而寇戎不賔緝熈不作未之有也明帝青龍中營治宫室百姓失農時司空陳羣上䟽曰禹承唐虞之盛猶卑宫室而惡衣服況今䘮亂之後人民至少比漢文景之時不過一大郡邉境有事將士勞苦若有水旱之患國家之深憂也且呉蜀未滅社稷不安宜及其未動講武勸農有以待之今舍此急而先宫室臣懼百姓遂困將何以應敵昔劉備自成都至白水多作傳舍興費人役太祖知其疲民也今中國勞力亦呉蜀之所願此安危之機也惟陛下慮之帝荅曰王者宫室亦宜並立滅賊之後但當罷守耳豈可復興役邪是故君之職蕭何之大畧也羣又曰昔漢祖唯與項羽争天下羽已滅宫室燒焚是以蕭何建武庫太倉皆是要急然猶非其壯麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭況乃天王莫之敢違前欲壊武庫謂不可不壊也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也漢明帝欲起徳陽殿鍾離意諫即用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣盖為百姓也今臣曽不能少凝聖聽不及意逺矣帝於是有所減省景初元年愈増崇宫殿雕飾觀閣鑿太行之石英采榖城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黄龍鳯凰竒偉之獸飾金墉陵雲䑓陵霄闕百役繁興作者萬數公卿以下至于學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂没民物光禄勲髙堂隆上䟽切諫曰盖天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財然則士民者乃國家之鎮也榖帛者乃士民之命也榖帛非造化不育非人力不成是以帝耕以勸農后桑以成服所以昭事上帝告虔報施也昔在伊唐世值陽九厄運之㑹洪水滔天使鯀治之績用不成乃舉文命随山刋木前後歴年二十二載灾眚之甚莫過於彼力役之興莫久於此堯舜君臣南面而已禹敷九州庶土庸勲各有等差君子小人物有服章今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也是以有國有家者近取諸身逺取諸物嫗煦養育故稱愷悌君子民之父母今上下勞役疾病凶荒耕稼者寡飢饉洊臻無以卒嵗宜加愍恤以救其困臣觀在昔書籍所載天人之際未有不應也是以古先哲王畏上天之明命循隂陽之逆順矜矜業業惟恐有違然後治道用興徳與神符灾異既發懼而脩政未有不延期流祚者也爰及末葉闇君荒主不崇先王之令軌不納正士之直言以遂其情志恬忽變戒未有不尋踐禍難至於顛覆者也天道既著請以人道論之夫六情五性同在於人嗜欲亷貞各居其一及其動也交争于心欲彊質弱則縱濫不禁精誠不制則放溢無極夫情之所在非好則美而美好之集非人力不成非榖帛不立情茍無極則人不堪其勞物不充其求勞求並至將起禍亂故不割情無以相供仲尼云人無逺慮必有近憂由此觀之禮義之制非茍拘分將以逺害而興治也今呉蜀二賊非徒白地小虜聚邑之宼乃據險乗流跨有士衆僭號稱帝欲與中國争衡今若有人来告權備並脩徳政復履清儉輕省租賦不治玩好動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其徴賦下不堪命吁嗟日甚陛下聞之豈不勃然忿其困我無辜之民而欲速加之誅其次豈不幸彼疲弊而取之不難乎茍如此則可易心而度事義之數亦不逺矣且秦始皇不築道徳之基而築阿房之宫不憂蕭墻之變而脩長城之役當其君臣為此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以為使先代之君知其所行必將至於敗則弗為之矣是以亡國之主自謂不亡然後至於亡賢聖之君自謂將亡然後至於不亡昔漢文帝稱為賢主躬行儉約恵下養民而賈誼方之以為天下倒縣可為痛哭者一可為流涕者二可可為長歎息者六況今天下凋弊民無儋石之儲國無終年之畜外有强敵六軍暴邉内興土功州郡騷動若有寇警則臣懼板築之士不能投命虜庭矣又將吏奉禄稍見折減方之於昔五分居一諸受休者又絶廪賜不應輸者今皆出半此為官入兼多於舊其所出與參少於昔而度支經用更毎不足牛肉小賦前後相繼反而推之凡此諸費必有所在且夫禄賜榖帛人主所以恵養吏民而為之司命者也若今有廢是奪其命矣既得之而又失之此生怨之府也周禮大府掌九賦之則以給九式之用入有其分出有其所不相干乗而用各足各足之後乃以式貢之餘供王玩好又上用財必考于司㑹今陛下所與共坐廊廟治天下者非三司九列則䑓閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷議其不正諫而為世戒書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉時司徒椽董尋亦上䟽曰建安以来野戰死亡或門殫户盡雖有存者遺孤老弱若宫室狹小當廣大之猶宜随時不妨農務況作無益之物哉陛下既尊羣臣顯以冠冕載以華輿而使穿方舉土沾體塗足毁國之光以崇無益甚無謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立臣知言出必死而自比於牛之一毛生既無益死亦何損秉筆流涕心與世辭臣有八子死後累陛下矣將奏沐浴以待命魏主曰尋不畏死邪主者奏收之詔勿問景初間宫室盛興民失農業期信不敦刑殺倉卒秘書監王肅上疏曰大魏承百王之極生民無㡬干戈未戢誠宜息民而恵之以安静遐邇之時也夫務畜積而息疲民在於省徭役而勤稼穡今宫室未就功業未訖運漕調發轉相供奉是以丁夫疲於力作農者離其南畆種榖者寡食榖者衆舊榖既没新榖繼荒斯則有國之大患而非備豫之長䇿也今見作者三四萬人九龍可以安聖體其内足以列六宫顯陽之殿又向將畢惟泰極已前功夫尚大方向盛寒疾疢或作誠願陛下發徳音下明詔深愍役夫之疲勞厚矜兆民之不贍取常食廪之士非急要者之用選其丁壯擇留萬人使一朞而更之咸知息代有日則莫不恱以即事勞而不怨矣計一嵗有三百六十萬夫亦不為少當一嵗成者聽且三年分遣其餘使皆即農無窮之計也倉有溢粟民有餘力以此興功何功不立以此行化何化不成夫信之於民國家大寳也仲尼曰自古皆有死民非信不立夫區區之晉國㣲㣲之重耳欲用其民先示以信是故原雖將降顧信而歸用能一戰而霸于今見稱前車駕當幸洛陽發民為營有司命以營成而罷既成又利其功不以時遣有司徒營其目前之利不顧經國之體臣愚以為自今已後倘復使民宜明其令使必如期若有事以次寜復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏而暴其罪鈞其死也無使汙于宫掖而為逺近所疑且人命至重難生易殺氣絶而不續者也是以聖賢重之孟軻稱殺一無辜以取天下仁者不為也漢時有犯蹕驚乗輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安所措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為己而輕於為君不忠之甚也周公曰天子無戲言言則史書之工誦之士稱之言猶不戲而況行之乎故釋之之言不可不察周公之戒不可不法也明帝時棧潜以衆役並興戚屬䟽斥上䟽曰天生烝民而樹之君所以覆燾羣生熈育兆庶故方制四海匪為天子裂土分疆匪為諸侯也始自三皇爰暨唐虞咸以博濟加于天下醇徳以洽黎元頼之三五既㣲降逮于漢治日益少䘮亂恒多自時厥後亦罔克乂太祖濬哲神武芟除暴亂克復王綱以開帝業文帝受天明命廓恢皇基踐阼七載毎事未遑陛下聖徳纂承洪緒宜崇晏安與民休息而方隅匪寜征夫逺戍有事海外縣旌萬里六軍騷動水陸轉運百姓舍業日費千金大興殿舍功作萬計徂徕之松刋山窮谷怪石珷玞浮于河淮都圻之内盡為甸服當供槀秸銍粟之調而為苑囿擇禽之府盛林莽之穢豐鹿兔之藪傷害農功地繁茨棘災疫流行民物大潰上減和氣嘉禾不植臣聞文王作豐經始勿亟百姓子来不日而成靈沼靈囿與民共之今宫觀崇侈雕鏤極妙忘有虞之總期思殷辛之瓊室禁池千里舉足投網麗擬阿房役百乾谿臣恐民力彫盡下不堪命也昔秦據殽函以制六合自以徳髙三皇功兼五帝欲號諡至萬葉而二世顛覆願為黔首由枝幹既抏本實先㧞也盖聖王之御世也克明俊徳庸勲親親俊乂在官則功業可隆親親顯用則安危同憂深根固本並為幹翼雖歴盛衰内外有輔昔成王幼冲未能蒞政周吕召畢並在左右今既無衞侯康叔之監分陜所任又非旦奭東宫未建天下無副願陛下留心闗塞永保無極則海内幸甚時中書侍郎王基亦上䟽曰臣聞古人以水喻民曰水所以載舟亦所以覆舟故在民上者不可以不戒懼夫民逸則慮易苦則思難是以先王居之以約儉俾不至於生患昔顔淵云東野子之御馬力盡矣而求進不已是以知其將敗今事役勞苦男女離曠願陛下深察東野之弊留意舟水之喻息奔駟於未盡節力役於未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之曰置火積薪之下而寢其上因謂之安也今寇賊未殄猛將擁兵撿之則無以應敵久之則難以遺後當盛明之世不務以除患若子孫不競社稷之憂也使賈誼復起必深切於曩時矣帝既新作許宫又營洛陽宫殿觀閣少府楊阜上䟽曰堯尚茅茨而萬國安其居禹卑宫室而天下樂其業及至殷周或堂崇三尺度以九筵耳古之聖帝明王未有務宫室之髙麗以彫弊百姓之財力者也桀作琁室象廊紂為傾宫鹿䑓以䘮其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡髙髙在上實監后徳慎守天位以承祖考巍巍大業猶恐失之不夙夜敬止允恭恤民而乃自暇自逸惟宫䑓是侈是飾必有顛覆危亡之禍易曰豐其屋蔀其家闚其户閴其無人王者以天下為家言豐屋之禍至於家無人也方今二虜合從謀危宗廟十萬之軍東西奔赴邉境無一日之娯農夫廢業民有飢色陛下不以是為憂而營作宫室無有已時使國亡而臣可以獨存臣又不言也君作元首臣為股肱存亡一體得失同之孝經曰天子有争臣七人雖無道不失其天下臣雖駑怯敢忘争臣之義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜于地使臣身死有補萬一則死之日猶生之年也呉烏程侯寳鼎二年作昭明宫左丞相陸凱上表諫不聽重表曰臣聞宫功當起夙夜反側是以頻煩上事往往留中不見省報於邑歎息企想應罷昨食時被詔曰君所諫誠是大趣然未合鄙意如何此宫殿不利宜當避之乃可以妨勞役長坐不利宫乎父之不安子亦何倚臣拜紙詔伏讀一周不覺氣結於胷而涕泣雨集也臣年已六十九榮位已重於臣過望復何所冀所以勤勤數進苦言者臣伏念大皇帝創基立業勞苦勤至白髪生於鬢膚黄耉被於甲胄天下始静晏駕早崩自含息之𩔖能言之倫無不歔欷如䘮考妣幼主嗣統柄在臣下軍有連征之費民有彫殘之損賊臣干政公家空竭今彊敵當塗西州傾覆孤罷之民宜當畜養廣力肆業以備有虞且始徙都屬有軍征戰士流離州郡騷擾而大功復起徴召四方斯非保國致治之漸也臣聞為人主者禳災以徳除咎以義故湯遭大旱身禱桑林熒惑守心宋景退殿是以旱魃銷亡妖星移舍今宫室之不利但當克己復禮篤湯宋之至道愍黎庶之困苦何憂宫之不安災之不銷乎陛下不務脩徳而務築宫室若徳之不脩行之不貴雖殷辛之瑶䑓秦皇之阿房何止而不喪身覆國宗廟作墟乎夫興土功髙䑓榭既致水旱民又多疾其不疑也為父長安使子有倚此乃子離於父臣離於陛下之象也臣子一離雖念克骨茅茨不翦復何益焉是以大皇帝居于南宫自謂過於阿房故先朝大臣以為宫室宜厚備衞非常大皇帝曰逆虜游䰟當愛育百姓何暇趣於不急然臣下懇惻由不獲已故裁調近郡茍副衆心比當就功猶豫三年當此之時寇鈔懾威不犯我境師徒奔北且西阻岷漢南州無事尚猶沖讓未肯築宫況陛下危側之世又乏大皇帝之徳可不慮哉願陛下留意臣不虚言不聽中書丞華覈繼上䟽曰今倉庫空匱編户失業而北方積榖養民專心東向乃舍此急務盡力功作卒有風塵之變驅怨民而赴白刃此乃大敵所因以為資者也普穆帝升平中將脩後池起閣道吏部郎長兼侍中江逌上䟽曰臣聞王者處萬乗之極享富有之大必顯明制度以表崇髙盛其文物以殊貴賤建靈䑓浚辟雍立宫館設苑囿所以𢎞於皇之尊彰臨下之義前聖創其禮後代遵其矩當代之君咸營斯事周宣興百堵之作鴻鴈歌安宅之歡魯僖脩泮水之宫採芹有思樂之頌盖上之有為非予欲是盈下之奉上不以劬勞為勤此自古之令典軌儀之大式也夫理無常然三正相詭司牧之體與世而移致飾則素故賁返於剥有大必盈則受之以謙損上益下順兆庶之恱享以二簋用致約之義是以唐虞流化於茅茨夏禹垂美於卑室過儉之陋非中庸之制然三聖行之以致至治漢髙祖當營建之始怒宫庫之壯孝文處既富之世愛十家之産亦以播恵當時著稱来葉今者二虜未殄神州荒蕪舉江左之衆經畧艱難漕揚越之粟北餽河洛兵不獲戢運戍悠逺倉庫内罄百姓力竭如春夏以来水旱為害逺近之收普減常年財傷人困大役未已軍國之用無所取給方之往代豐弊相懸損之又損實在今日伏惟陛下聖質天縱凝曠清虚闡日新之盛茂欽明之量無欲體於自然沖素刑乎萬國韶既盡美則必盡善宜養以𤣥虚守以無為登覽不以臺觀游豫不以苑沼偃息畢於仁義馳騁極於六藝觀巍巍之隆鑒二代之文仰味羲農俯尋周孔其為逍遥足以尊道徳之輔親搢紳之秀疇咨以時顧問不倦獻替諷諫日月而聞則庶績惟凝六合咸熈中興之盛邁於殷宗休嘉之慶流乎無窮昔漢起徳陽鍾離抗言魏營宫殿陳羣正辭臣雖才非若人然職忝近侍言不足採而義在以聞帝嘉其言而止漢主劉聰立貴嬪劉氏為皇后聰将為劉氏起䳨儀殿於後庭廷尉陳元達諫曰臣聞古之聖王愛國如家故皇天亦祐之如子夫天生烝民而樹之君者使為之父母以刑賞之不欲使殿屎黎元而蕩逸一人晉氏闇虐視百姓如草芥故上天剿絶其祚乃眷皇漢蒼生引領息肩懐更蘇之望有日矣我髙祖光文皇帝靖言惟兹痛心疾首故身衣大布居不重茵先后妃嬪服無綺綵重逆羣臣之請故建南北宫焉今光極之前足以朝羣后饗萬國矣昭徳温明已後足可以容六宫列十二等矣陛下龍興以来外殄二京不世之寇内興殿觀四十餘所重之以飢饉疾疫死亡相屬兵疲於外人怨於内為之父母固若是乎伏聞詔㫖將營䳨儀中宫新立誠臣等樂為子来者也竊以大難未夷宫宇粗給今之所營尤實非宜臣聞太宗承髙祖之業恵吕息役之後以四海之富天下之殷尚以百金之費而輟露䑓歴代垂美為不朽之迹故能斷獄四百擬於成康陛下之所有不過太宗二郡地耳戰守之備者豈僅匈奴南越而已哉孝文之廣思費如彼陛下之狹欲損如此愚臣所以敢昧死犯顔色冒不測之禍者也趙主曜命起酆明觀立西宫建陵霄䑓於滈池又將於霸陵西南營夀陵侍中喬豫和苞上䟽諫曰臣聞人主之興作也必仰準乾象俯順人時是以衞文承亂亡之後宗廟社稷流漂無所而猶上候營室以構楚宫彼其急也猶尚若兹故能興康叔武公之迹以延九百之慶也前奉詔書將營酆明觀市道芻蕘咸以非之曰一觀之功可以平涼州矣又奉勅㫖復欲擬阿房而建西宫模瓊䑓而起陵霄此則費萬酆明功億前役也以此功費亦可以吞呉蜀翦齊魏矣陛下何為於中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉過貴在能改終之實難又伏聞勅㫖將營建夀陵周廻四里下深二十五丈以銅為棺椁黄金飾之恐此功費非國内所能辦也且堯葬榖林市不改肆顓頊葬廣陽下不及泉聖王之於終也如是秦皇下錮三泉周輪七里身亡之後毁不旋踵闇主之於後也如此向魋石椁孔子以為不如速朽王孫倮葬識者嘉其矯世自古無有不亡之國不掘之墓故聖王知厚葬之招害也故不為之臣子之於君父陵墓豈不欲髙廣如山嶽哉但以保全始終安固萬世為優耳興亡奢儉冏然於前惟陛下覽之曜大恱下書曰二侍中懇懇有古人之風烈矣可謂社稷之臣也非二君朕安聞此言乎以孝明於承平之世四海無虞之日尚納鍾離一言而罷北宫之役況朕之闇眇當今極弊而可不敬從明誨乎今勅悉停夀陵制度一遵覇陵之法詩不云乎無言不酬無徳不報其封豫安昌子苞平輿子並領諫議大夫可敷告天下使知區區之朝思聞過也自今政法有不便於時不利社稷者其詣闕極言勿有所諱曜將葬其父及妻親如粟邑以規度之負土為墳其下周廻二里作者繼以脂燭怨呼之聲盈于道路㳺子逺諫曰臣聞聖主明王忠臣孝子之於終葬也棺足周身椁足周棺藏足周椁而已不封不樹為無窮之計伏惟陛下聖慈幽被神鑒洞逺毎以清儉恤下為先社稷資儲為本今二陵之費至以億計計六萬夫百日作所用六百萬功二陵皆下錮三泉上崇百尺積石為山増土為阜發掘古塜以千百數役夫呼嗟氣塞天地暴骸原野哭聲盈衢臣竊謂無益於先皇先后而徒喪國之儲力陛下脫仰尋堯舜之軌者則功不盈百萬費亦不過千計下無怨骨上無怨人先帝先后有泰山之安陛下饗舜禹周公之美惟陛下察焉曜不納後魏文成帝時給事中郭善明性多機巧欲逞其能勸髙宗大起宫室中書侍郎髙允諫曰臣聞太祖道武皇帝既定天下始建都邑其所營立非因農隙不有所興今建國已久宫室已備永安前殿足以朝㑹萬國西堂温室足以安御聖躬紫樓臨望可以觀望逺近若廣脩壯麗為異觀者宜漸致之不可倉卒計斫材運土及諸雜役須二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其飢一婦不織或受其寒況數萬之衆其所損廢亦以多矣推之於古驗之於今必然之效也誠聖主所宜思量髙宗納之孝明帝時胡太后作永寜寺於宫側又作石官寺於伊闕口皆極土木之美為九層浮屠髙九十丈刹髙十丈塔廟之盛未之有也李崇上表曰髙祖遷都垂三十年明堂未脩太學荒廢城闕府寺頗亦頽壊非所以追隆堂構儀刑萬國者也宜罷尚方雕靡之作省永寜土木之功分石官鐫琢之勞因農之隙脩此數條使國容嚴顯禮化興行不亦休哉太后不能用唐太宗貞觀四年將脩洛陽宫戴胄上䟽諫曰比闗中河外置軍團彊夫富室悉為兵九成之役又興司農將作見丁無㡬大亂之後户口單破一人就役舉室捐業籍軍者督戎仗課役者責糧齎竭貲經紀猶不能濟七月以来霖潦未止濵河南北田正洿下年之有亡未可預知壯者盡行賦調不給則帑藏虚矣今宫殿足庇風雨容羽衞數年後成猶不謂晚何憚而遽自生勞擾邪帝覽奏罷役時詔發卒脩洛陽之乾元殿以備廵狩給事中張𤣥素上書諫曰陛下智周萬物囊括四海令之所行何往不應志之所欲何事不從㣲臣竊思秦始皇之為君也藉周室之餘因六國之盛將貽之萬葉及其子而亡諒由逞嗜奔慾逆天害人者也是知天下不可以力勝神祇不可以親恃惟當𢎞儉約薄賦斂慎終如始可以永固方今承百王之末屬凋弊之餘必欲節之以禮制陛下宜以身為先東都未有幸期即令補葺諸王今並出藩又湏營構興發數多豈疲人之所望其不可一也陛下初平東都之始層構廣殿皆令撤毁天下翕然同心傾仰豈有初則惡其侈靡今乃襲其雕麗其不可二也毎承音㫖未即廵幸此乃事不急之務成虚費之勞國無兼年之積何用兩都之好勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立飢寒猶切生計未安三五年間恐未能復柰何營未幸之都而奪疲人之力其不可四也昔漢髙祖將都洛陽婁敬一言即日西駕豈不知地惟土中貢賦所均但以形勝不如闗内也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事宜詎可東幸其不可五也臣嘗見隋室初造此殿楹棟宏壯大木非近道所有多自豫章採来二千人曳一柱其下施轂皆以生鐵為之中間若用木輪動即火出略計一柱用數十萬功則餘費又過倍於此臣聞阿房成秦人散章華就楚衆離乾元畢工隋人解體且陛下今時功力何如隋日承凋殘之後役瘡痍之人費億萬之功襲百王之弊以此言之甚於煬帝逺矣深願陛下思之無為由余所笑則天下幸甚太宗謂𤣥素曰卿以我不如煬帝何如桀紂對曰若此殿卒興所謂同歸於亂太宗歎曰我不思量遂至於此顧謂房𤣥齡曰今𤣥素上表洛陽亦實未宜脩造後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古来不易非其忠直安能若此且衆人之唯唯不如一士之諤諤可賜絹五百匹魏徴歎曰張公遂有回天之力可謂仁人之言其利溥哉太宗作飛山宫魏徴上䟽曰臣觀自古受圖膺運繼體守文控御英傑南面臨下皆欲配厚徳於天地齊髙明於日月本枝百世傳祚無窮然而克終者鮮敗亡相繼其故何哉所以求之失其道也殷鑒不逺可得而言昔在有隋統一寰宇甲兵彊盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安不欲社稷之長久故行桀虐以就滅亡哉恃其富彊不虞後患驅天下以從欲罄萬物以自奉採城中之子女求逺方之竒異宫苑是飾䑓榭是崇徭役無時干戈不戢外示嚴重内多險忌讒邪者必受其福忠正者莫保其生上下相䝉君臣道隔民不堪命率土分崩是以四海之尊誅於匹夫之手子孫殄絶為天下笑可不痛哉聖哲乗機拯其危溺八柱傾而復正四維弛而更張逺肅邇安不踰於期月勝殘去殺無待於百年今宫觀臺榭盡居之矣竒珍異物盡收之矣姬姜淑媛盡侍於側矣四海九州盡為臣妾矣若能鑒彼之所以失念我之所以得日慎一日雖休勿休焚鹿臺之寳衣毁阿房之廣殿懼危亡於峻宇思安處於卑宫則神化潜通無為而治徳之上也若成功不毁即仍其舊除其不急損之又損雜茅茨於桂棟叅玉砌於土階恱以使人不竭其力常念居之者逸作之者勞億兆恱以子来羣生仰而遂性徳之次也若惟聖罔念不慎厥終忘締構之艱難謂天命之可恃忽采椽之恭儉追雕墻之靡麗因其基以廣之増其舊以飾之觸𩔖而長不知止足人不見徳而勞役是聞斯為下矣譬之負薪救火揚湯止沸以暴易暴與亂同道莫可測也後嗣何觀夫事無可觀則人怨神怒人怨神怒則灾害既生灾害既生則祻亂必作祻亂既作而能以身名全者鮮矣順天格命之后將隆七百之祚貽厥孫謀傳之萬葉難得易失可不念哉時公卿有奏依禮季夏之月可以居臺榭今夏暑未退秋霖方始宫中卑溼請營一閣以居之上曰朕有氣疾豈宜下溼若遂来請縻費良多昔漢文將起露臺而惜十家之産朕徳不逮于漢帝而所費過之豈為民父母之道也固請至于再三竟不許太宗謂侍臣曰朕近讀劉聰傳將為劉后起䳨儀殿廷尉陳元達切諫聰大怒命斬之劉后手䟽啟請辭情甚切聰怒乃觧而甚愧之人之讀書欲廣聞見以自益耳朕見此事可以深戒比者欲造一殿仍構重閣令於藍田採木並已備具逺想聦事斯作遂止左僕射房𤣥齡右僕射髙士亷於路逢少監竇徳素問北門近来更何營造徳素以聞上乃謂𤣥齡曰君但知南衙事我北門少有營造何與君事𤣥齡等拜謝魏徴進曰臣不觧陛下責亦不觧𤣥齡士亷拜謝𤣥齡既任陛下大臣即陛下股肱耳目所有營造何容不知責其訪問官司臣所不觧且有利害役工多少陛下所為善當助陛下成之所為不是雖營造當奏陛下罷之此乃君使臣臣事君之道𤣥齡等問既無罪而陛下責之𤣥齡不識所守但知拜謝臣亦不觧太宗深愧之又嘗謂侍臣曰為政之要必須禁末作傳曰彫琢刻鏤傷農事纂組文彩害女工自古聖人制法莫不崇節儉革奢侈又帝王凡有興作亦須貴順物情昔大禹鑿九山通九江用人力極廣而無怨讟者物情所欲共衆所有故也秦始皇營建宫室而人多謗議者為徇其私不與衆共故也朕今欲造一殿材木已具逺想秦皇之事遂復不作也古人云不作無益不見可欲使心不亂至於鏤雕器物珠玉服翫若恣其驕奢則危亡可立待也自令王公已下准品秩不合服用者宜一切禁斷由是數十年間風俗簡朴財帛富饒無復飢寒之弊又嘗謂侍臣曰隋煬帝廣造宫室以肆行幸自西京至京都離宫别舘相望道次乃至并州涿郡無不悉然馳道皆廣數百歩種樹以飾其傍人力不堪相聚為賊逮至末年尺土一人非復已有以此觀之廣宫室好行幸竟有何益皆朕耳所聞目所見深以自戒故不敢輕用人力惟令百姓安静無有怨叛而已太宗時諫議大夫蘇世長侍宴披香殿酒酣進曰此煬帝作邪何雕麗底此帝曰卿好諫似直然詐也豈不知此殿我所營乃詭云煬帝邪對曰臣但見傾宫鹿䑓非受命聖人所為者陛下武功舊第纔蔽風雨時以為足今天下厭隋之侈以歸有道陛下宜刈奢滛復朴素今乃即其宫加雕飾焉欲易其亂得乎帝咨重其言太宗末年軍旅數動宫室互興百姓頗有勞敝充容徐恵上䟽諫曰貞觀以来二十有餘載風調雨順年登嵗稔人無水旱之弊國無飢饉之灾昔漢武守文之常主猶登刻玉之符齊桓公小國之庸君尚塗泥金之望陛下推功損已讓徳不居億兆傾心猶闕告成之禮云亭佇謁未展升中之儀此之功徳足以咀嚼百王網羅千代者矣然古人有云雖休勿休良有以也守保未備聖哲罕兼是知業大者易驕願陛下難之善始者難終願陛下易之竊見頃年以来力役兼緫東有遼海六軍西有崐邱之役士馬疲於甲胄舟車倦於轉輸且召募投戎去留懐死之痛因風阻浪人有漂溺之危一夫力耕年無數十之獲一舩致損則傾覆數百之糧是猶運有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍雖除凶伐暴有國常規然黷武習兵先哲所戒昔秦皇併吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非務功恃大棄徳而輕邦國圖利而忘害肆情而縱欲遂使悠悠六合雖廣不救其亡嗷嗷黎庶因弊以成其禍是知地廣非常安之術人勞乃易亂之源願陛下布澤流仁矜弊恤乏減行役之煩増雨露之恵妾又聞為政之本貴在無為竊見土木之功不可遂兼北闕初建南營翠㣲曽未踰時玉華創制複山藉水非無構架之勞損之又損頗有土力之費終以茅茨示約猶興木石之疲假使和雇取人不無煩擾之弊是以卑宫菲室聖人之所安金屋瑶臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力不竭矣用而息之則人其悦矣夫珍玩技巧為喪國之斤斧珠玉錦繡實迷心之酖毒切見服玩鮮靡如變化於自然職貢珍竒若神仙之所製雖馳華於季俗實敗素於淳風是知漆器非延叛之方舜造之而人叛玉杯豈招亡之術紂用之而國亡方驗侈麗之源不可不遏夫作法於儉猶恐其奢作法於奢何以制後伏惟陛下明照未形智周無際窮奥秘於麟閣盡探賾於儒林千王理亂之蹤百代安危之迹興亡衰禍之數得失成敗之機故亦包吞心府之中循環目圍之内乃宸𠂻久察無假一二言焉唯知之非艱行之不易志驕於業著體逸於時安伏願抑志摧心慎終成始削輕過以添重徳擇今是以替前非則鴻名與日月無窮盛業與乾坤永泰矣太宗甚善其言髙宗永淳元年既封泰山欲遍封五嶽作奉天宫於嵩山之南監察御史李善感諫曰陛下封泰山告太平致羣瑞與三皇五帝比隆矣數年不稔餓殍相望四夷交侵兵甲嵗駕宜恭黙思道以禳灾譴更廣營宫室勞役不休天下莫不失望矣上不納武后長安中作興泰宫於萬安山左拾遺盧藏用上䟽諫曰陛下離宫别觀固多矣又窮人力以事土木臣恐議者以陛下為不愛人而奉己也且頃嵗榖雖頗登而百姓未有儲陛下廵幸訖靡休息斤斧之役嵗月不空不因此時施徳布化而又廣宫苑臣恐下未易堪今左右近臣以䛕意為忠犯忤為患至令陛下不知百姓失業百姓亦不知左右傷陛下之仁也忠臣不避誅震以納君於仁明主不惡切詆以趨名于後陛下誠能發明制以勞人為辭則天下必以為愛力而苦已也不然下臣此章得與執事者共議不從中宗景龍中盛興佛寺公私疲匱左拾遺辛替否上䟽曰古之建官不必備九卿有位而闕其選故賞不僭官不濫士有完行家有亷節朝廷餘奉百姓餘食下忠於上上禮於下委裘無倉卒之危垂拱無顛沛之患夫事有惕耳目動心慮作不師古以行於今臣得言之陛下倍百行賞倍十増官金銀不供於印束帛不充於錫何所媿於無用之臣無力之士哉古語曰福生有基禍生有胎且公主陛下愛子也選賢嫁之設官輔之傾府庫以賜之壯第觀以居之廣池籞以嬉之可謂至重至憐也然用不合古義行不根人心將變愛成憎轉福為禍何者竭人之力費人之財奪人之家怨也愛一女取三怨於天下使邉疆士不盡力朝廷士不盡忠人心散矣獨持所愛何所恃乎向使魯王賞同諸壻則有今日之福無曩日之禍人徒見其禍不知禍所来所以禍者寵過也今棄一宅造一宅忘前悔忽後禍臣竊謂陛下乃憎之非愛之也臣聞君以人為本本固則邦寜邦寜則陛下夫婦母子長相保也願外謀宰臣為久安計不使姦臣賊子有以伺之今疆埸危駭倉廪空虚卒輸不充士賞不及而大建寺宇廣造第宅伐木空山不給棟梁運土塞路不充墻壁所謂佛者清浄慈悲體道以濟物不欲利以損人不榮身以害教今三時之月掘山穿地損命也殫府虚帑損人也廣殿長廊榮身也損命則不慈悲損人則不愛物榮身則不清浄寜佛者之心乎昔夏為天子二十餘世而商受之商二十餘世而周受之周三十餘世而漢受之由漢而後歴代可知已咸有道之長無道之短豈窮金玉脩塔廟享久長之祚乎臣以為減彫琢之費以賙不足是有佛之徳息穿掘之苦以全昆蟲是有佛之仁罷營構之直以給邉垂是有湯武之功回不急之禄以購亷清是有唐虞之治陛下緩其所急急其所緩親未来䟽見在失真實冀虚無重俗人之所為而輕天子之業臣竊痛之今出財依勢避役亡命𩔖度為沙門其未度者窮民善人耳㧞親樹知豈離朋黨畜妻養孥非無私愛是致人毁道非廣道求人也陛下常欲填池壍捐苑囿以賑貧人今天下之寺無數一寺當陛下一宫壯麗用度尚或過之十分天下之財而佛有七八陛下何有之矣雖役不食之人不衣之士猶尚不給況必待天生地養風動雨潤而後得之乎臣聞國無三年之蓄曰非其國今計倉廪度府庫百僚共給萬事用度臣恐不能卒嵗假如兵旱相乗則沙門不能擐甲胄寺塔不足穣飢饉矣帝不省睿宗為公主造金仙玉真二觀替否時為左補闕復上䟽諫曰臣嘗以為古之用度不時爵賞不當破家亡國者口説不如身逢耳聞不如眼見臣請以有唐以来理國之得失陛下之所以眼見者以言之惟陛下審之聽之擇善而從之則萬嵗之業自可致矣何憂乎黎庶之不康福祚之不永伏以太宗文武聖皇帝陛下之祖撥亂反正開階立極得至理之體設簡易之方省其官清其吏舉天下職司無一虚授用天下財帛無一枉費賞必俟功官必得雋所為無不成所征無不克不多造寺觀而福徳自至不多度僧尼而殃咎自滅道合乎天地徳通乎神明故天地憐之神明祐之隂陽不愆風雨合度四人樂其業五榖遂其成腐粟爛帛填街委巷千里萬里貢賦于郊九夷百蠻歸欵于闕自古有帝皇以来未有若斯之神聖者也故得享國久長多歴年所陛下何不取而則之中宗孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言徒恣子女之意官爵非擇虚食禄者數千人封建無功妄食土者百餘户造寺不止枉費財者數百億度人不休免租庸者數十萬是使國家所出加數倍所入減數倍倉不停卒嵗之儲庫不貯一時之帛所惡者逐逐多忠良所愛者賞賞多讒慝朋佞諜諜交相傾動容身不為於朝廷保位皆由於黨附奪百姓之食以養殘兇剥萬人之衣以塗土木於是人怨神怒衆叛親離水旱不調疾疫屢起逺近殊論公私罄然五六年間至於禍變享國不永受終于兇婦人寺舍不能保其身僧尼不能䕶妻子取譏萬代見笑四夷此陛下之所眼見也何不除而改之依太宗之理國則百官以理百姓無憂故泰山之安立可致矣依中宗之理國則萬人以怨百事不寜故累卵之危立可待矣頃自夏已来霪雨不觧榖荒于壟麥爛于場入秋已来亢旱成灾苖而不實霜隕蟲暴草菜枯黄下人咨嗟未知賙賑而營造寺觀日繼于時檢校試官充䑓溢署伏惟陛下愛兩女為造兩觀燒瓦運木載土填坑道路流言皆云計用錢百餘萬惟陛下聖人也無所不知陛下明君也無所不見既知且見知倉有㡬年之儲庫有㡬年之帛知百姓之間可存活乎三邊之士可轉輸乎當今發一卒以禦邉陲遣一兵以衞社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯而乃以百萬貫錢造無用之觀以賈六合之怨乎以違萬人之心乎伏惟陛下族阿韋之家而不改阿韋之亂政忍棄太宗之理本不忍棄中宗之亂階忍棄太宗久長之謀不忍棄中宗短促之計陛下又何以繼祖宗親萬國昔陛下與皇太子在阿韋之時危亡是懼常切齒於羣兇今貴為天子富有海内而不改排羣兇之事臣恐復有切齒於陛下者也陛下又何以羣兇而誅之臣往見明勅自今已後一依貞觀故事且貞觀之時豈有今日之造寺營觀僧尼道士益無用之官行不急之務而亂政者也臣以為棄其言而不行其信慕其善而不遷其惡陛下又何以刑於四海往者和帝之憐悖逆也為姦人之所誤宗晉卿勸為第宅趙履温勸為園亭損數百家之居侵數百家之地工徒斵而未息義兵紛以交馳卒使亭不得逰宅不得坐信邪佞之説成骨肉之刑此陛下之所眼見也今兹造觀臣必知非陛下公主之本意得無有趙履温之徒將勸為之冀誤其骨肉不可不明察也臣聞出家脩道者不干預於人事專清其身心以虚泊為髙以無為為妙依兩卷老子視一軀天尊無欲無營不損不害何必璇臺玉樹寳像珍龕使人困窮然後為道哉且舊觀足可歸依無造無營以取窮竭若此行之三年國不富人不安朝廷不清陛下不樂則臣請殺身於朝以令天下言事者伏惟陛下行非常之恵權停兩觀以俟豐年以兩觀之財為公主施貧窮填府庫則公主之福徳無窮矣不然臣恐下人怨望不減於前朝矣前朝之時賢愚知其必敗雖有口而不敢言言未發聲禍將及矣韋月將受誅於丹儌燕欽融見殺於紫庭此人皆不惜其身而納忠於主身既死矣主亦危矣故先朝誅之陛下賞之是陛下知直言之士有裨於國臣今直言亦先朝直言之人也惟陛下察之䟽奏帝不能用然嘉其切直時造金仙玉真觀雖盛夏工程嚴促黄門侍郎魏知古上奏曰臣聞古之君人必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢故曰不作無益害有益又曰罔咈百姓以從己之欲禮季夏之月樹木方盛無有斬伐不可以興土功此皆興化立治為政養人之本也今為公主造觀將以樹功祈福而地皆百姓所宅卒然迫逼令其轉徙扶老攜幼剔椽發瓦呼嗟道路乖人事違天時起無用之作崇不急之務羣心震揺衆口籍籍陛下為人父母欲何以安之且國有簡册君舉必記言動之㣲可不慎歟願下明詔順人欲除功役收之桑榆其失不逺不納中書舍人裴漼亦上言曰春夏毋聚大衆起大役不可興土功妨農事若役使乖度則有疾疫水旱之烖此天人常應也今自冬徂春雨不時降人心焦然莫知所出而土木方興時暵之孽職為此發今東作云始丁壯就功妨多益少飢寒有漸春秋莊公三十一年冬不雨是時嵗三築臺僖公二十一年夏大旱是時作南門陛下以四方為念宜下明制令二京營作和市木石一切停止有如農桑失時户口流散雖寺觀營立能救飢寒弊哉不報代宗大歴二年宦官魚朝恩以賜莊為章敬寺以資太后冥福窮壯極麗奏毁曲江及華清宫館以給之衞州進士髙郢上書曰先太后聖徳不必一寺増輝國家永圖無寜以百姓為本捨人就寺何福之為且古之明主積善以致福不費財以求福脩徳以消禍不勞人以禳禍今徇左右之過計傷皇王之大猷臣竊為陛下惜之宣宗時欲作五王院以處皇子之幼者召術士柴嶽明使相其地嶽明對曰臣庶遷徙不常故有禍福之説隂陽書本不言帝王家也上善其言賜以束帛後唐莊宗同光二年作清暑樓初唐主苦溽暑宦者因言長安全盛時宫中樓觀以百數今日官家曽無避暑之所唐主乃命王允平别建一樓宦者曰郭崇韜常不伸眉為孔謙論用度不足恐陛下雖欲營繕終不可得唐主曰吾自用内府錢無闗經費然猶慮郭崇韜諫遣中使語之曰今嵗盛暑異常朕昔在河上行營卑溼被甲乗馬親當矢石猶無此暑今居深宫之中而暑不可度柰何崇韜對曰陛下昔在河上勍敵未滅深念讐耻雖有盛暑不介聖懐今外患已除海内賔服故雖珍臺閒館猶覺欝蒸也陛下倘不忘艱難之時則暑氣自消矣唐主黙然宦者曰崇韜之第無異皇居宜其不知至尊之熱也唐主卒命允平營樓日役萬人所費巨萬崇韜諌曰今河南水旱軍食不充願且息役以俟豐年不聽後晉天福二年河南奏脩洛陽宫諌議大夫薛融諫曰今宫室雖經焚毁猶侈於帝堯之茅茨所費雖寡猶多於孝文之露臺請俟海内平寜營之未晚詔襃納之宋真宗大中祥符二年知制誥王曽乞罷營玉清昭應宫疏曰臣伏聞朝廷設諫諍之官防政治之闕非其官而言者盖表愚忠況當不諱之朝復忝非常之遇茍進思之無補懼竊禄以貽譏臣伏覩國家誕受殊祥洊膺秘籙祚洪圖於萬載超盛烈於百王陛下寅畏寳符陟封名岳功垂不朽澤浸無垠奉若之心斯為至矣而清衷濬發成命亟行就嚴城之北隅啓列真之秘宇式昭丕應特建嘉名自經始以来庀徒斯廣輦他山之石相屬於道途伐豫章之材逺周於林麓累土陶甓揮鍤運斤功極彌年費將鉅萬掩祈年之舊制踰槩日之前聞輟貴近以董臨假使權而領䕶如此則國家尊奉靈文之意不為不厚矣崇飾臺觀之規不為不壯矣然臣之愚懇或異於斯既有見聞安敢緘黙臣以為今之興作有不便之事五焉雖鳩僝已行未可悉罷茍或萬一采芻蕘之説省其功用抑其制度亦民之大恵而憂國之逺圖也所謂五者之目請為陛下陳之且今来所創立宫規制宏大凡用材木莫非楩楠切聞天下出産之處收市至多般運赴官尤傷人力雖云只役軍匠寜免煩擾平民況復軍人亦是黎庶此未便之事一也邇者方畢封崇頗煩經費今兹興造尤耗資財雖府庫之中貨寳山積畚築之下工徒子来然皆内帑費積代之蓄藏百物盡生民之膏血散之孔易斂之惟難雖極豐盈猶宜重惜此未便之事二也夫聖人貴於謀始智者察之未形禍起隐㣲危生安逸今雙闕之下萬衆畢臻暑氣方隆作勞斯甚所役諸雜兵士多是不逞小人其或鼠竄郊鄽狗偷都市有一於此足貽聖憂此未便之事三也王者撫御寰區順承天地舉動必遵於時令財成不失於物宜靡崇奢侈之風罔悖隂陽之序臣謹按月令孟夏無發大衆無起土工無伐大木今肇基卜築衝冒欝蒸俶擾厚坤乖違前訓矧復旱暵卒痒雷電迅風㧞木飄瓦温沴之氣比屋罹災得非似未承天地之明効歟此未便之事四也臣切聆中間符命之文有清浄育民之戒今所脩宫閣盖本靈篇而乃過興剖掘之功廣務雕鏤之巧雖屢殫於物力恐未協於天心此未便之事五也伏望陛下思祖宗之大猷察聖賢之深戒遷思回慮懲往念来詔將作之官息勤勞之衆輯寜羣品對越髙穹如此則遐邇宅心人祇快望必若光昭大瑞須建靈宫將畢相勞聿爰成績則臣敢效愚計亦可必行但能損彼規模减其用度止崇樸素無取瑰竒唯将之以誠明仍重之以嚴潔名數之際加等是宜實費之資節儉為要俾四海之内知陛下愛重民力之意豈不美歟昔太宗皇帝建太乙上清等宫亦不使窮極壯麗臣謂陛下宜遵而行之取為法制以示不敢踰節謙大之徳光於千古矣柰何特欲過先帝之制作乎并覩西京造太宗影殿東岳置㑹真之宫計其工庸亦皆不啻中人百家之産然於尊祖禮神則盛矣其於邦國大計則猶未足為當時之急務也臣料陛下必謂海内承平邊隅清晏人康俗阜時和年豐縱或築宫無損於事則臣復謂其不然也方今疆埸甫定邊庭有姑息之虞民俗茍安倉箱無紅腐之積况闗輔之地流亡素多近甸之氓農桑失望雖令有司安慰亦恐未復田廬秋冬之間飢歉是懼亟經營於神館慮稍欝於輿情且往古廢興之端前王得失之事布告方册是足為商鑒者陛下覽之詳矣非假愚臣一二言焉試觀自昔人君崇尚土木孰若清静無為者之安全乎願陛下留神垂聽無忽臣言則天下幸甚今雖上下之人皆知事理如此而人人自愛莫敢輕黷冕旒至於左右大臣則慮計之不從致見踈之悔中外百執則慮言之難達招妄動之尤使忠讜之謀未盡良為此也唯臣出自幽隐遭遇文明特受聖知度越流軰官為侍從身服簮裳粗識安危之機未申補報之効捐軀思奮今也其時又安敢循黙茍容不為陛下别白而論之乎是以輙率庸妄輕冒宸嚴感發於中無所顧避陛下寛其鼎鑊之罪矜其螻蟻之誠深監古先試垂採擇無謂増建靈宫為一細事而弗恤也臣以為興役動衆尤繫事機不可不察也當使鄉校之中豪奸之黨無所開竊議之口則㣲臣之望也天下之幸也歴代名臣奏議卷三百十五
