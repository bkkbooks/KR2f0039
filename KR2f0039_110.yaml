body:
  text: 歴代名臣奏議卷一百一十明楊士竒等撰務農周宣王即位不藉千畆虢文公諫曰不可夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎純固於是乎成是故稷為大官古者大史順時覛土覛視也陽癉憤盈土氣震發癉厚也憤積也農祥晨正農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥日月底於天廟底至也天廟營室也孟春之月日月皆在營室土乃脉發脉理也農書曰春土冒撅陳根可拔耕者急發先時九日大史告稷曰自今至於初吉陽氣俱烝土膏其動弗震弗渝脉其滿眚榖乃不殖渝變也眚災也言陽氣俱升土膏欲動當即發動變冩具氣不然則脉滿氣結更為災病榖乃不殖稷以告王曰史帥陽官以命我司事史太史陽官春官司事主農事之官也曰距今九日土其俱動王其祗祓監農不易袚齋戒袚除也王乃使司徒咸戒公卿百吏庶民司空除壇于藉命農大夫咸戒農用先時五日瞽告有協風至瞽樂大師知風聲者協和也風氣和時侯至也王即齊宫百官御事各即其齊三日王乃淳濯饗醴淳沃也濯溉也饗飲也謂王沐浴飲醴酒及期鬱人薦鬯犧人薦醴犧人司尊也王祼鬯饗醴乃行祼灌也灌鬯飲醴皆所以自香潔百吏庶民畢從及藉后稷監之膳夫農正陳藉禮大史賛王王敬從之王耕一墢音鉢一墢一耜之墢也王無偶以一耜耕班三之班次也三之下各三其上也至一墢公三卿九大夫二十七庶人終于千畆其后稷省功大史監之司徒省民大師監之畢宰夫陳饗膳宰監之膳夫賛王賛王王歆太牢歆饗也班嘗之庶人終食是日也瞽帥音官以省風土音官樂官也風土以音律省土風也廪於藉東南鍾而藏之廩御廪一名神倉東南生長之處鍾聚也謂為廪以藏王所藉田以奉粢盛而時布之於農稷則徧戒百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司寇乃命其旅日徇農師一之一之先往也農正再之農正后稷之佐田畯也故次農師后稷三之后稷農官之君故次農正司空四之司空主道路溝洫故次后稷司徒五之司徒省民故次司空大保六之大師七之大保大師天子三公佐王論道汜監衆官不特掌事故次司徒大史八之大史掌達官府之治故次大師宗伯九之宗伯卿官掌相王之大禮若王不與祭則設位故次大史王則大徇大徇帥公卿大夫親行農也耨穫亦如之民用莫不震動恪恭於農脩其疆畔日服其鏄不觧於時財用不乏民用和同是時也王事唯農是務無有求利於其官以干農功求利謂變易役使干亂農功三時務農而一時講武故征則有威守則有財若是乃能媚於神而和於民矣則享祀時至而布施優裕也今天子欲修先王之緒而棄其大功匱神之祀而困民之財将何以求福用民王弗聽漢文帝即位躬修儉節思安百姓時民近戰國背本趨末賈誼上奏曰筦子曰倉廪實而知禮節衣食足而知榮辱民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之饑一女不織或受之寒生之有時而用之亡度則物力必屈屈盡也古之治天下至纎至悉也故其畜積足恃今背本而趨末食者甚衆是天下之大殘也滛侈之俗日日以長是天下之大賊也殘賊公行莫之或止大命将泛泛覆也莫之振救生之者甚少而靡之者甚多天下財産何得不蹷蹷傾竭也漢之為漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧民欲有畔意若狼之顧望也嵗惡不入請賣爵子賣爵級又賣子也既聞耳矣聞於天子之耳安有為天下阽危者若是而上不驚者阽音閻阽危欲墜之意也世之有饑穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邉境有急數十百萬之衆國胡以餽之兵旱相乗天下大屈有勇力者聚徒而衡擊罷夫羸老易子而齩其骨罷疲同齩齧也政治未畢通也逺方之能疑者並舉而争起矣疑讀曰擬僣也謂與天子相比擬廼駭而圖之豈将有及乎夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懐敵附逺何招而不至今敺民而歸之農皆著於本使天下各食其力末技㳺食之民轉而縁南畮則蓄積足而人樂其所矣可以為富安天下而直為此廩廩也廪廩危也言務耕農厚蓄積則天下富安何乃不為而常不足廩廩若此竊為陛下惜之於是上感誼言始開藉田躬耕以勸百姓晁錯上奏曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國無捐瘠者言無相棄捐瘦病者以蓄産多而備先具也今海内為一土地人民之衆不避禹湯加以亡天災數年之水旱而蓄積未及者何也地有遺利民有餘力生榖之土未盡墾山澤之利未盡出也㳺食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖髙城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖饑之於食不待甘㫖饑寒至身不顧亷耻人情一日不再食則饑終嵗不製衣則寒夫腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務於農桑薄賦斂廣蓄積以實倉廪備水旱故民可得而有也民者在上牧之所以趨利如水走下四方無擇也夫珠玉金銀饑不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易藏在於把握可以周海内無饑寒之患此令臣輕背其主而民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而饑寒至是故明君貴五榖而賤金玉今農五口之家其服役者不下二人其能耕者不過百畆百畆之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間無日休息又私自送往迎来弔喪問疾飬孤長㓜在其中勤苦如此尚復被水旱之灾急政暴虐賦斂不時朝令而暮改當且有者半賈而賣本直千錢者止得五百也亡者取倍稱之息取一償二為倍稱舉也於是有賣田宅鬻子孫以償債者矣而商賈大者積財倍息小者坐列販賣操其竒贏日㳺都市竒贏謂有餘財而蓄聚竒異也乗上之急所賣必倍故其男不耕耘女不蠺織衣必文采食必粱肉亡農夫之苦有仟伯之得仟謂千錢伯謂百錢也因其富厚交通王侯力過吏埶以利相傾千里㳺敖冠盖相望乗堅策肥履絲曵縞堅好車也此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖迕而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富民有爵農民有錢粟有所渫渫散也夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二曰民賦少三曰勸農功今令民有車騎馬一疋者復卒三人復三卒之算錢也車騎者天下武備也故為復卒神農之教曰有石城十仞湯池百歩帶甲百萬而無粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上廼復一人耳五大夫第九等爵也此其與騎馬之功相去逺矣爵者上之所擅出於口而亡窮粟者民之所種生於地而不乏夫得髙爵與免罪人之所甚欲也使天下入粟於邉以受爵免罪不過三嵗塞下之粟必多矣帝從其言東漢順帝即位不行藉田之禮尚書僕射黄瓊以為國之大典不宜久廢乃上奏曰自古聖帝哲王莫不敬恭明祀増致福祥故必躬郊廟之禮親藉田之勤以先羣氓率勸農功昔周宣王不藉千畆虢文公以為大譏卒有姜戎之難終損中興之名竊見陛下遵稽古之鴻業體乾肅以應天順時奉先懐柔百神今廟祀適闋而祈榖潔齋之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典藉田有日司徒咸戒司空除壇先時五日有協風之應王即齋宫饗醴載耒誠重之也自癸巳以来仍西北風甘澤不集寒凉尚結近春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風易曰君子自强不息斯其道也書奏帝從之魏明帝即位大司農司馬芝奏曰王者之治崇本抑末務農重榖王制無三年之儲國非其國也管子區言以積榖為急方今二虜未滅師旅不息國家之要唯在榖帛武皇帝特開屯田之官專以農桑為業建安中天下倉廪充實百姓殷足自黄初以来聽諸典農治生各為部下之計誠非國家大體所宜也夫王者以海内為家故傳曰百姓不足君誰與足富足之由在於不失天時而盡地力今商旅所求雖有加倍之顯利然於一統之計已有不貲之損不如墾田益一畆之收也夫農民之事田自正月耕種芸鋤條桑耕熯種麥穫刈築場十月乃畢治廩繫橋運輸租賦除道理梁墐塗室屋以是終嵗無日不為農事也今諸典農各言留者為行者守田計課其力勢不得不爾不有所廢則當素有餘力臣愚以為不宜復以商事雜亂專以農桑為務於國計為便帝從之太和中散騎黄門侍郎杜恕以古之刺史奉宣六條以清静為名威風著稱今可勿令領兵以專民事俄而鎮北将軍吕昭又領冀州恕乃上䟽曰帝王之道莫尚乎安民安民之術在於豐財豐財者務本而節用也方今二賊未滅戎車亟駕此自熊虎之士展力之秋也然搢紳之儒横加榮慕搤腕抗論以孫吴為首州郡牧守咸共忽恤民之術脩将率之事農桑之民競干戈之業不可謂務本帑藏嵗虗而制度嵗廣民力嵗衰而賦役嵗興不可謂節用今大魏奄有十州之地而承喪亂之弊計其戸口不如往昔一州之民然而二方僭逆北虜未賔三邉遘難繞天畧帀所以統一州之民經營九州之地其為艱難譬策羸馬以取道里豈可不加意愛惜其力哉以武皇帝之節儉府藏充實猶不能十州擁兵郡僅十二也今荆揚青徐幽并雍涼縁邉諸州皆有兵也其所恃内充府庫外制四夷者惟兖豫青冀而已臣前以州郡典兵則專心軍功不勤民事宜别置将守以盡治理之務而陛下復以冀州寵秩吕昭冀州戸口最多田多墾闢又有桑棗之饒國家徴求之府誠不當復任以兵事也若以北方當須鎮守自可專制大将以鎮安之計所置吏士之費與兼官無覺然昭於人才尚復易中朝茍乏人兼才者勢不獨多以此推之知國家以人擇官不為官擇人也官得其人則政平訟理政平故民富貴訟理則囹圄虗空陛下踐阼天下斷獄百數十人嵗嵗増多至五百餘人矣民不益多法不益峻以此推之非政教陵遲牧守不稱之明效歟往年牛死通率天下十能損二麥不半收秋種未下若二賊㳺魂於疆埸飛芻輓粟千里不及究此之術豈在彊兵乎武士勁卒愈多愈多愈病耳夫天下猶人之體腹心充實四支雖病終無大患今兖豫青冀亦天下之腹心也是以愚臣慺慺實願四州之牧守獨脩務本之業以堪四支之重然孤論難持犯欲難成衆怨難積疑似難分故累載不為明主所察凡言此者𩔖皆䟽賤之言實未易聽若使善策必出於親貴固不犯四難以求忠愛此古今之所常患也呉烏程侯時倉廩無儲世俗滋侈民不務本東觀令領右國史華覈上䟽曰今寇虜充斥征伐未已居無積年之儲出無應敵之畜此乃有國者所宜深憂也夫財榖所生當出於民趨時務農國之上急而都下諸官所掌别異各自下調不計民力輙與近期長吏畏罪晝夜催民委舎佃事遑赴會日定送到都或藴積不用而徒使百姓消力失時到秋收日督其限入奪其播殖之時而責其今年之稅如有逋懸則籍没財物故家戸貧困衣食不足宜暫息衆役專心農桑古人稱一夫不耕或受其饑一女不織或受其寒是以先王治國惟農是務軍興以来已向百載農人廢南畆之務女工停機杼之業推此揆之則蔬食而長饑薄衣而履氷者固不少矣臣聞主之所求於民者二民之所望於主者三二謂求其為己勞也求其為己死也三謂饑者能食之勞者能息之有功者能賞之民以致其二事而主失其三望者則怨心生而功不建今帑藏不實民勞役猥主之二求已備民之三望未報且饑者不待美饌而後飽寒者不俟狐貉而後温為味者口之竒文繡者身之飾也今事多而役繁民貧而俗奢百工作無用之噐婦人為綺靡之飾不勤麻枲並繡文黼黻轉相倣效耻獨無有兵民之家猶復逐俗内無儋石之儲而出有綾綺之服至於富賈商販之家重以金銀奢恣尤甚天下未平百姓不贍宜一生民之原豐榖帛之業而棄功於浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人織績一嵗一束則十萬束矣使四疆之内同心戮力數年之間布帛必積恣民五色惟所服用但禁綺繡無益之飾且美貎者不待華采以崇好豔姿者不待文綺以致愛五采之飾足以麗矣若極粉黛窮盛服未必無醜婦廢華采去文繡未必無美人也若實如論有之無益廢之無損者何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業也使管晏復生無以易此漢之文景承平繼統天下已定四方無虞猶以雕文之傷農事錦繡之害女工開富國之利杜饑寒之本況今六合分乖豺狼充路兵不離疆甲不觧帶而可以不廣生財之原充府藏之積哉西晉武帝咸寧中詔訪朝臣政之損益司徒左長史傅咸上言曰陛下處至尊之位而脩布衣之事親覽萬機勞心日昃在昔帝王躬自菲薄以利天下未有踰陛下也然泰始開元以暨於今十有五年矣而軍國未豐百姓不贍一嵗不登便有菜色者誠由官衆事殷復除猥濫蠶食者多而親農者少也臣以頑踈謬忝近職毎見聖詔以百姓饑饉為慮無能云補伏用慙恧敢不自竭以對天問舊都督有四今并監軍乃盈於十夏禹敷土分為九州今之刺史幾向一倍戸口比漢十分之一而置郡縣更多空校牙門無益宿衛而虗立軍府動有百數五等諸侯復坐置官属諸所寵給皆生於百姓一夫不農有受其饑今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省事靜事息役上下用心惟農是務也武帝詔以比年饑饉議所節省齊王攸上奏曰臣聞先王之教莫不先正其本務農重本國之大綱當今方隅清穆武夫釋甲廣分休假以就農業然守相不能勤心恤公以盡地利昔漢宣嘆曰與朕理天下者惟良二千石乎勤加賞罰黜陟幽明于時翕然用多名守計今地有餘羨而不農者衆加附業之人復有虛假通天下之謀則饑者必不少矣今宜嚴勅州郡檢諸虛詐害農之事督實南畆上下同奉所務則天下之榖可復古政豈患於暫一水旱便憂饑餒哉考績黜陟畢使嚴明畏威懐惠莫不自厲又都邑之内游食滋多巧伎末業服飾奢麗富人兼美猶有魏之遺弊染化日淺靡財害榖動復萬計宜申明舊法必禁絶之使去奢即儉不奪農時畢力稼穡以實倉廩則榮辱禮節由之而生興化反本於兹為盛武帝使黄門侍郎虞􅔎桓彞開倉廩振給饑民并省衆役百官各上封事後軍將軍應詹上表曰夫一人不耕天下必有受其饑者而軍興以來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓僮僕不親農桑而游食者以十萬計不思開立美利而望國足人給豈不難哉古人言曰饑寒並至堯舜不能使野無寇盜貧富兼并雖臯陶不能使强不陵弱故有國有家者何嘗不務農重榖近魏武皇帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下不甚勞而大功克舉也間者流人奔東吳東吳今儉皆以還反江西良田曠廢未乆火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中與百姓二年分税三年計賦税以使之公私兼濟則倉盈庾億可計日而待也武帝欲廣農束晳上議曰伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉榖此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霢霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蓘於中田猶不足以致倉庾盈億之積也然地利可以計生人力可以課致詔書之㫖亦將欲盡此理乎今天下千城人多游食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又司州十郡土狹人繁三魏尤甚而猪羊馬牧布其境内宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸菀牧不樂曠野貪在人間故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈䍧羊取之清渤放豕之歌起於鉅鹿是其效也可悉徙諸牧以充其地使馬牛猪羊齕草於空虛之田游食之人受業於賦給之賜此地利之可致者也昔騅駓在坰史克所以頌魯僖却馬務田老氏所以稱有道豈利之所以會哉又如汲郡之吳澤良田數千頃泞水停洿人不墾植聞其國人皆謂通泄之功不足為難舄鹵成原其利甚重而豪強大族惜其魚捕之饒構説官長終於不破此亦谷口之謡載在史篇謂宜復下郡縣以詳當今之計荆揚兖豫汙泥之土渠塢之宜必多此𩔖最是不待天時而豐年可獲者也以其雲雨生於畚臿多稌生於決泄不必望朝隮而黄潦臻禜山川而霖雨息是故兩周争東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹案以聞又昔魏氏徙三郡人在陽平頓丘界今者繁盛合五六千家二郡田地逼狄謂可徙還西州以充邊土賜其十年之復以慰重遷之情一舉兩得外實内寬増廣窮人之業以闢西郊之田此又農事之大益者也愍帝時江東草創農桑弛廢熊逺上議曰立春之日天子祈榖於上帝乃擇元辰載耒耜帥三公九卿諸侯大夫躬耕帝藉以勸農功詩云弗躬弗親庶人不信自喪亂以來農桑不脩游食者多皆由去本逐末故也時議美之後魏太武帝時多禁封良田又京師㳺食者衆侍郎髙允上言曰臣少也賤所知惟田請言農事古人云方一里則為田三頃七十畆百里則田三萬七千頃若勤之則畆益三升不勤則畆損三升方百里損益之率為粟二百二十萬斛況以天下之廣乎若公私有儲雖遇饑年復何憂哉帝善之唐太宗貞觀五年有司上書言皇太子将行冠禮宜用二月為吉請預以備儀注太宗曰今東作方興恐妨農事命改用十月太子少保蕭瑀奏曰准隂陽家用二月為勝太宗曰隂陽拘忌朕所不行若動静必依隂陽不顧徳義欲求福祐其可得乎若所行皆遵正道自然常與吉會且吉凶在人豈假隂陽拘忌農時甚要不可蹔失太宗時京師旱蝗蟲大起太宗入苑視禾見蝗蟲掇數枚而祝曰人以榖為命而汝食之是害于百姓百姓有過在予一人爾其有靈但當食我心無害百姓將吞之左右遽諫曰恐成疾不可太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不復為災太宗謂侍臣曰凡事皆須務本國以人為本人以衣食為本凡營衣食以不失時為本夫不失時者唯在人君簡静乃可致耳若兵戈屢動土木不息而欲不奪農時其可得也王珪曰昔秦皇漢武外則窮極兵戈内則崇侈宫室人力既竭禍難遂興彼豈不欲安人乎失所以安人之道也亡隋之轍殷監不逺陛下親承其弊知所以易之然在初則易終之實難伏願慎終如始方盡其美太宗曰公言是也夫安人寜國唯在於君君無為則人樂君多欲則人苦朕所以抑情損欲剋已自勵耳太宗以天下粟價率計斗直五錢其尤賤處計斗直三錢因謂侍臣曰國以民為本人以食為命朕為億兆人父母若禾黍不登則兆庶非國家所有既屬豐稔若斯唯欲躬務儉約必不輙為奢侈朕常欲賜天下之人皆使富貴令省徭薄賦不奪其時使比屋之人恣其耕稼此則富矣敦行禮譲使鄉閭之間少敬長妻敬夫此則貴矣但令天下皆然朕不聽管弦不從畋獵樂在其中矣房𤣥齡曰陛下務農重榖誠生民之幸也武后時詔市河南河北牛羊荆益奴婢置監登莱以廣軍資監察御史張廷珪上書曰今河南牛疫十不一在詔雖和市甚於抑奪併市則價難準簡擇則吏求賄是牛再疫農重傷也髙原耕地奪為牧所兩州無復丁田牛羊踐暴舉境何賴荆益奴婢多國家戸口姦豪掠買一入於官永無免期南北異宜必至生疾此有損無益也抑聞之君所恃在民民所恃在食食所資在耕耕所資在牛牛廢則耕廢耕廢則食去食去則民亡民亡則何恃為君羊非軍國切要假令蕃滋不可射利后乃止徳宗貞元五年詔以二月一日為中和節所司進農書永以為恒式栁宗元進農書状曰臣伏以平秩東作虞書立制俶載南畆周雅垂文是皆奉天時以授人盡地力而豐食自陛下惟新令節益厲農功既立典於可傳毎陳書而作則耕鑿之利敷帝力於嘉謨稼穯之難動天心於睿覽勤勞率下超邁古先凡諸率土不勝幸甚前件農書謹函封進後唐明宗天成四年上問宰相馮道曰今嵗雖豐百姓贍足否道曰農家嵗凶則死於流殍嵗豐則傷於榖賤豐凶皆病者惟農家為然臣記進士聶夷中詩云二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉語雖鄙俚曲盡田家之情状農於四民之中最為勤苦人主不可不知也上恱命左右録其詩常諷誦之宋太宗淳化四年詔有司議均田法太常博士陳靖上議曰法未易遽行也宜先命大臣或三司使為租庸使或兼屯田制置仍擇三司判官選通知民事者二人為之貳兩京東西千里檢責荒地及逃民産籍之募耕作賜耕者室廬牛犁種食不足則給以庫錢别其課為十分責州縣勸課給印紙書之分殿最為三等凡縣管墾田一嵗得課三分二嵗六分三嵗九分為下一嵗四分二嵗七分三嵗至十分者為中最一嵗五分未及三嵗盈十分者為上最其最者令佐免選或超資殿者即增選降資毎州通以諸縣田為十分視殿最行賞罰候數嵗盡罷官屯田悉用賦民然後量人授田度地均稅約井田之制為定以法頒行四方不過如此矣太宗謂吕端曰朕欲復井田顧未能也靖此策合朕意至道二年靖任将作監丞又上奏曰臣伏以天生烝民為國之本地生百榖為民之財國非民罔興民非財罔聚故書有本固邦寧之㫖易有聚人曰財之文考斯格言誠為要道夫先王之聚民也豈能耕與之食織與之衣盖開其貨殖之門示以農桑之本俾夫養生送死力役田疇而無輕家離鄉之心是知理國之道聚人為先人聚則野無閒田家無乏用義夫節婦由是而生内則恭睦於親姻外則協和於鄉黨争訟無所作邪偽無所安欲其教化不行不可得也茍不然者則官無定籍世有浮民逆黨凶徒由是而起小則干陵於閭里大則侵軼於州縣禮遜無所興仁信無所設欲其刑罰不用不亦難乎是故王者察逆順之端究存亡之理設職官以持國本立井田以節民財貧弱者不使之饑寒富豪者不使之兼并小大畢濟遐邇同歸然後賦調上均而國無苛歛衣食下給而人無他求倉廩充盈時俗康阜既庶且富近悦逺來盡令四海之民咸若一家之子縱有風雨不節螟螣為災但可以小虞未足以大害也而自秦壊周制立阡陌而尚戰功漢因秦規益算緡而取民利故使國内咸怨天下無聊至有劉項之爭莽卓之亂也逮夫晉魏迄於隋唐其間明主昏君治亂相繼或増之以掊剋或施之以寬平或用於國而資於民或利當時而弊後世損益之理史籍具存然則地之生財有時人之用力有倦必在人君審時以測地察倦以因人使其力出無窮財生不匱則聚人之要在於兹矣今國家富有萬國治勝三王塞邪路於漢劉剗訛根於晉石罄域中之黎庶孰匪王民窮宇内之舟車咸輸貢賦用衆庶則方今特出擬豐盈則䆳古難差而且游力尚多曠土不少餒凍之色十五其民得非版籍之所未精勸課之所未備臣愚以為精版籍莫若遵閭伍之法備勸課莫若申殿最之科如是則游力必除曠土盡闢管子曰欲治其國先知其人欲知其人先明其地盖黄帝有鄉井之制周人置三隧之官使其什五相司里鄰相保有無得以相貸巧拙得以相謀生産得以相均死病得以相救危難得以相助婚嫁得以相媒人顧其家家守其口奔亡者無所匿遷移者無所從欲盖而彰不救而得故民有安土之意官無漏人之虞主政可行於民民心可繋於主衆寡之額老幼具存故周禮每至孟冬司徒獻其人數王拜而受冡宰貳之乃命有司登於天府其重民籍也如是及東晉以土斷其民北齊之間俗便其制陳亡隋亂紀紊綱頺洎乎李唐大革斯弊乃有村正掌其田野坊正司其邑居大約科條與今相𩔖然以彼時村正坊正皆選彊幹㢘平州官縣官悉知丁口存歿三年一造戸籍三本一本供省司一本在縣主將一本納州照對隠一戸則罰加守宰漏一丁則罪連鄉鄰故得上盡其心下竭其力互相檢謹無敢罔欺加以糾摘姦訛督課租賦隨其等級並有勸懲今則州額不登天府未聞其必罰縣數有漏州司亦因而無言存亡只任於里胥増減悉由於田畯地有姦惡至彰露以方知戸有死亡遇差徭而始報夫如是得不掩藏其疾而使復本歸農者哉故曰版籍之所未精也又地者穀之所生穀者人之司命地不耕無以取其穀穀不熟無以養其人是以古者宅不毛田不闢皆有里布之率屋粟之租盖勉其勤勞而罰其怠惰也漢詔曰洪範八政以食為先斯誠家給之源刑措之本是宜厚農薄賦令與孝弟同科者其重農也如是及孝平元始之初有大農部丞之制分管勸課逐處耕桑未踰二三載中墾田九百萬頃戸足人給流亡漸還又晉司徒石苞奏郡縣農桑未有殿最宜増官屬有所廵檢帝俞其言民獲其利洎後或弛不可備論逮乎李唐開元則立口分永業各定頃畆隨其等級於事雖涉太煩亦可體為常式但臣竊見先有敕命遍下諸州俾置農師猶謂勸人復本然雖有其詔誥而且無其主張坊村得以因循郡邑不虞其殿最遂使耕耘之力尚遺畎畆之間故曰勸課之所未備也臣所議上件事由兼有前古制度倘若陛下不遺葑菲特賜施行即乞據今村坊加之保伍隨其土斷不問僑居應是浮浪之徒悉歸版籍所管然後按其人數授以土田五家為鄰五鄰為保逓相檢察責以農桑勿容游食之徒勿縱惰耕之子仍更示其殿最勵彼屬官或土不曠功則隆之以爵賞人有游力則降之以典刑自然上下相承小大無隠良疇委而再闢游民蕩而復歸太古之風於今曷逺故曰精版籍莫若遵閭伍之制備勸課莫若申殿最之科其有子細事宜更在臨時條貫退循虚昩無補盛明靖任太常博士直史館又迄從京東西起首勸課疏曰臣聞國以民為本民以食為天食足則民天恊和民安則國本正固是以國非民罔立民非食罔生夫先王之欲生其民豐其食者莫大於積穀而勸農也農田之興教化攸重王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色然後天子食日舉以樂抑所謂湯之流金爍石堯之懐山襄陵而國無捐瘠者率由是道也臣徃嵗輙進淳化議五卷其一曰聚人乃逺自黄帝已還歴叙鄉井農田之損益近自聖朝而上備論勸課圖籍之是非續主判三司開拆及提㸃百司庫務日前後二拜封章皆議耕桑利害又前年曲䝉聖造許歸住處寜親亦曽稟取指揮尋到古本版籍去嵗伏奉勅命差徃荆湖復自許州附奏劄子兼乞容臣迴日别具條件請行區區之心勤勤不忘於農事者誠以陛下御宇以来二十餘祀躬臨庶政日總萬機以至宵旰忘疲夙夜不寐陛下之欲萬邦咸寜而四岳十二牧之任未能遂堯舜之心陛下之欲九功惟叙而六府三事之官未能致商周之理抑又臣先居省職日嘗奏公事次伏覩金口宣示曰稼穡農耕政教之大本設有人為官家力行勸課康濟黎元則鹽鐵𣙜酤是何末事并前嵗中宣令尚方製造農器散給諸郡使教民耕此又見陛下用意愈於前代哲王逺矣臣由是晝忖夜度採古諭今或得之於方䇿之間或取之於衆多之議其可損而益用於聖世者敢此布露而俟詳擇焉臣謹按方今天下土田除淮海江浙荆湖隴蜀河東已外郡邑各在逺處或廢或開假使勸課必行即日未見其利又古人強榦弱枝之法必先富貴於内敢請指以京畿之地南北東西環繞三二十州連接三數千里其田之耕稼者十纔二三又其耕稼之田所入租税者十無五六既有坐家破逃之戸又有惰農廢業之夫坐家破逃者則姦偽日生賦額嵗減賦額減則國用不豐國用不豐則配率科歛無所不行矣惰農廢業者則游手日衆地利斯寡地利寡則民食不足民食不足則爭盜殺傷無所不至矣又安得人康俗阜地平天成使萬乗端拱穆清百官靖恭厥位凡欲革其弊鼎其利非遇明朝昭代孰敢議於斯乎臣竊見漢武帝之日曽封丞相田千秋為富民侯以趙過為搜粟都尉過執事於外能為代田戮力教人人獲其利又孝平元始中置大司農部丞十三人人部一州勸課農桑不二年内定墾田八百二十七萬五百三十六頃家給戸足國用充盈且以孝武孝平漢之中主也尚能選官擇吏蕆事於當時矧陛下濬哲文明超邁舜禹若當才遴柬責成其功即前代帝王將何以擬陛下之清光休烈者也臣愚不佞欲乞於大臣中采其高識逺見誠能為國家立功立事者一人比田千秋只在中書兼判大司農事又於朝行郎吏中取其才幹精通能撫民役衆者一人為副司農比之趙過執事於外且從京東京西兩路良田美利之所起首勸課仍兼轉運之名所貴事歸一家别無矛盾或殿最屬吏或部領使臣分頭用心教民力穡又臣常由銜命出入所見抛荒田疇或倚枕溝渠或比鄰城郭可以致國家紅腐之粟可以致民室巨萬之資而皆卒是汙萊極目無際者臣亦嘗詢問備得縁由皆謂朝廷累下詔書許民復業雖官中放其賦稅限以嵗時然鄉縣之間行用非細且毎一戸歸業即須申報所由朝耕尺寸之田暮入差科之籍追呼責問繼踵到村其免稅之名已受朝廷之賜而逐時之費踰於租賦之資況民戸所致逋亡始因貧困或閃私下之債負或避官中之征徭盖不獲已而逃固非樂為其事尋為鄉里知覺即便檢責資財或只元住室廬家事兼之種木計其所直至甚微茫鄉官即取以了納税租債家則争以平折欠負不計遺下之物固是蕩然無餘及至他日却来乃稱復業居止既失動用亦無雖欲歸耕農具何取雖欲久住生計莫營以此逃亡不還者遂食於他鄉歸復田里者亦無門而力穡且夫小人困患必思其姦姦心一萌何事不作若非聖朝設法良吏盡心遏流蕩於隄防化災殃於福祐者則蚩蚩之𩔖擾擾何知臣性顓䝉志甚堅確臣子事無巨細動必期成儻陛下果納愚言庶集其事更或朝行之内采擇未有其人則臣之幽孱得以待罪願備趙過之用以賛千秋之謀又若陛下不棄非才果授斯任則臣願就官中借逐處之閒田曠土招逐處之末作㳺民誘以開耕未論租賦官中亦譬如自来荒廢且令不係省司許臣别置版圖便宜從事酌人戸之等第測田土之磽肥分配必務其得中課督必使其無倦仍據逐戸歸業逐處授田至於細碎事宜並取大農擬議除却耕桑之外復教植木種蔬或飬畜牛羊或孶蕃雞彘或給受田土之際潜擬井田或營造室廬之時便立保伍應是飬生送死之物追風立社之資並令收積經營防備支用至纎至悉必躬必親使其黎庶樂生官吏勤勸待至三五年後生計已成有室家物産以可懐有桑土園林而可戀官中即量田收税計戸定征以農司新附之人田合計府舊存之戸税共成圖籍置之司存為萬古之宏規乃一勞而永逸或慮新歸民户多是貧困艱窮心雖欲耕力所不及者若官中許於逐處預借和糴價錢並管在農司斟酌擘劃或以充合造耕稼之具或以為買糴糧種之資便須逐事計錢明收貫伯於東作之日貸於逐人於西成之時取其償值據官中合要斛㪷依逐處時估分文折納入倉分明係帳且在農司收管逐旋牒報三司看三司如要收支即隨處差人交割仍㸃勘預借錢數准折勾銷有剰則計數潤官有欠則農司催促此亦應用之良䇿有速成之要期臣合貢此言一繋上㫖又慮舊存税戸見管催科覩新戸䝉優饒棄舊業却來歸附既失計省之賦額又誤國家之軍須臣固不敢幸此非功以為勤績抑其間有兼并豪富之族自來廣占田土及坐家破逃亡之人承前得其慣便見官行此勸課輙便用意無端或農司配田之時或人戸請田之際紛挐競訟煩紊典刑乃須定在爭先塞其姦妄必使舊户甘心於條貫新户得地以安寜正家給刑措之源國富人康之本降次淮南江北諸道州軍侯此地事如有成即彼處亦令勸課且臣又聞昔者周公之理也一年而變三年而成五年而定鄭子産為政一年而人謗三年而人頌易曰吉㓙悔吝生乎動者也今臣以冗賤孤陋之跡欲為國家立長乆逺大之規誠恐忿嫉臣者多而成就臣者少或興沮謗誑紊聰明伏願陛下垂白日而照丹心保元龜而體前事容臣辛勤勉勵盡瘁於斯倘三年無成五年不定則國家自有典憲㣲臣亦能揣量或流于幽州或殛于羽山皆臣之所甘心固無恨也然或五年以來事稍成就况臣此際必已衰羸兼慮前程隕躓無日亦願陛下不加爵賞只乞賜臣優閒於百越之間假二車之職庶得狐死有期於丘首鳥巢不繞於南枝如此即是陛下之知臣至矣而臣誓報陛下之心極矣其他給受田疇殿最官吏創新户之屬籍塞舊户之姦訛定差徭賦税之等差約儲積輦運之利害有法度可以經乆有行用且合權宜百事千端無巨無細臣悉請預大農之可否采群議之是非與衆士竭公共之心助陛下敷神明之教顯有刑墨幽有鬼神茍違斯言寜逃自孽真宗咸平五年屯田貟外郎盛梁乞授陳靖勸農使諭民耕田曠土疏曰臣昨因行檢㸃本州户口尋究簿書即今公私荒田已及六千一百七十餘頃秋夏正税全虧一十萬四千八百貫石有餘初謂州縣之官不能綏撫致鄉村之俗各暫流亡前後繼降明勅不住招呼其如舊降勅書只許歸業人户容放一料苗税盖縁逃移之日家資牛畜悉已破除洎歸復之時屋木田園例遭毁伐墾土未觀於稼穡巡門已聽於征催乏牛羊雞犬之可陪無屋舍田園之可戀故有春歸夏去秋復冬逃以今逓年州縣虛降版簿計都額則空邁千萬收實利則全無二三臣伏見江南轉運使陳靖昔在先朝曽陳農事觀其舉措頗識淺深臣欲望特降勅書委自陳靖先取江南兩浙公私都大荒田逐處頃畝數目并㳂征簿籍逃移人户姓名且於昇州都置勸農一司俾於階銜之中授以勸農使額仍抽諳會田農人吏攅成都大簿書況逐處田土高下不同内有乆來逃移壠畝全成榛莽亦有近年流散界址半已荒涼復有白地平田全作林菁之利亦有被山兼水頗霑柴木之資以此品量須分等級仍乞逐州縣明掛勅牓曉示諸色人户及更委陳靖揀選三五人循良官吏散徃諸州親諭鄉民或有大段荒逃軍州即委陳靖親自徃彼召耆年宿徳之輩與親民守土之官同就鄉園少陳酒饌達君父勸課之意示朝廷寬大之恩如人户有元舊莊田乆難歸復或是他人物業素失開耕者除已有人户占射為主外不問有税無税人户在公在私之家以至事力僧人宫觀道侣並許量其事力請佃計地耕耘明與減絶舊日税名剗去當時苗數變兹曠土悉作租田仍許取便耕修特免三年輪送貴使修營住舍蓄養猪牛待其竹木有成田疇見利顧室閭而全備覩稼穡以豐饒即自窮苦兩忘饑寒並去疇肯更思游惰再樂逋逃然後每畝秋夏之中都收二㪷租利更免諸般配率雷例差徭臣所陳勸農之課程益之則内外有成損之則公私無害況江浙所獲之財自與諸路不同有航舟可以運輸有物帛可以變易待其事成之後有利歸官之時即令逐處州軍每納租課悉令别倉收受遇㐫嵗則糴充民食當豐年則貢作軍須有餘糧足以濟民有羡財足以助戰如江浙成其厚利則淮甸荆渚河北關西亦可依此施行其有施行節目條貫事宜約束之重輕勸誘之法式候諸處取到田段人户都大數目齊整亦乞降勅與陳靖與臣討理商量别作畫一條奏六年陳靖為江南轉運使上奏曰臣竊以民惟邦本食乃民天童子婦人皆知此理今盛梁所陳農事頗合臣之素心實王化之大端聖朝之急務然臣再三忖度未敢預聞其事者盖中書劄子所降指揮令據轄下州軍躬親子細相度不得行遣文字意者慮擾民户耳況江南農田乆失制度公私弊病根抵滋深今朝廷若欲剗除必須明行檢責若是慮有勞擾無若却且因循事既因循豈須擘劃臣嘗觀史載粗究興亡見前代之哲人御逺方之妙術不使俗甚富庶亦不使民至困窮俗富庶則侈僭之心生民困窮則怨亂之心起欲其侈僭怨亂之不作富庶困窮而得中莫若周知田地之磽肥遍測租賦之輕重民户丁稚之多少物産貨殖之豐約紀綱正於手舒慘繋乎時然後四海一家如指其掌也儻或覩深弊而不除忽後患而不慮唯務姑息尚或推延臣恐民之蓄姦慣便於此日國家行事沮柅於他時臣到任以來不敢廢職其諸處逃户物産及官莊屯田臣先已取得荒熟頃畆數目見在自去年七月以來後逐旋差人幹當於當年之内其租課除舊額外頗有出剰以至逃户物産官莊荒田頃畝甚多並可勸課候相次或有良便上奏凝旒庶使利害顯然朝廷信察今所奉指揮據盛梁起請農事令臣相度擘劃聞奏者以臣愚慮若不先取進止固難容易披陳乞候將來臣或到闕即子細分析以俟朝廷可否仁宗皇祐元年右司諫錢彦逺上奏曰臣伏以農桑者生民大事國家急務所以順天養民禦水旱制蠻夷之原本也本朝自祖宗以來留意尤切故諸路轉運司提㸃刑獄臣寮知州通判皆帶勸農職名授勅結銜政在督課而近嵗徒有虛文初無勸導之實汙萊不闢事出因循今欲乞應天府諸州軍於長吏㕔各置勸農司以知州為長官通判為佐官於部内各舉清強官一員兼充判官量抽吏人先將部内諸縣今日已前見管墾田畝戸口數目陂塘山澤桑棗溝洫都大之數著為帳籍仍開析見有若干逃移人户賦税荒廢田畝古之水利後來殘毁者委自勸農官司多方設法勸課招誘安其生業去其乆害興其長利侯至年終農隙之際轉運司遍行比較委是増得墾田户口數目或流人自占或逃移復業陂塘灌溉有利桑棗廣植溝洫開闢賦税増多丁口蕃息明著版籍不至煩擾者保明舉奏朝廷特與就賜章服増其秩禄如一任終始悉有顯效令轉運司批上厯子到闕委所司磨勘即乞超擢任使其判官亦特與磨勘引見其轉運使提㸃刑獄臣寮每廵歴州軍先須㸃檢勸農司訖方得㸃檢諸事如長吏等因循違慢職業無聞人户逃移至多墾田之數日削並乞除授散官監當其判官亦同降黜所貴天下本農生民富給為萬世之基望詔三司檢舉舊貫賞罰施行嘉祐六年起居舍人同知諫院司馬光論勸農劄子曰臣聞食者生民之大本為政之首務也饑饉之世珠玉金銀等於糞土惟穀之為寳不可一日無也今國家每下詔書必以勸農為先然而農夫日寡游手日繁豈非為利害所驅邪今農夫苦身勞力惡衣糲食以殖百穀賦斂萃焉徭役出焉嵗豐則賤糶以應公上之須給債家之求嵗凶則流離異鄉轉死溝壑如是而欲使夫商賈末作之人坐漁厚利鮮衣美食者轉而縁南畆斯亦難矣然則勸農者言也害農者政也天下生之者益少食之者益多欲榖之無涸得乎哉為今之術勸農莫如重榖重榖莫如平糴使諸路轉運使及州軍長吏遇豐嵗能廣謀糴入官滿之日倉廪之實比扵始至増羡多者賞之其無水旱之災益兵之費而蓄積耗減者黜之又令民能力田積榖者不以為家貲數如是則榖重而農勸雖有饑饉常無流亡盜賊之患矣今嵗河北河東㳂邊榖糴至賤此亦國家所宜留意者也光又上奏曰夫農天下之首務也古人之所重而今人之所輕豈獨輕之又困苦莫先焉何以言之彼農者苦身勞力衣麄食糲官之百賦出焉百役歸焉嵗豐則賤貿其榖以應官司之求嵗凶則流離凍餒先衆人填溝壑如此而望浮食之民轉而縁南畆難矣彼直生而不知市井之樂耳茍或知之則去而不返矣故以今天下之民度之農者不過二三而浮食者常七八矣欲倉廩之實其可得乎臣愚以為凡農民租稅之外宜無有所預衙前當募人為之以優重相補不足則以坊郭之民部送綱運典領倉庫不費二三而農民常費八九何則儇利戇愚之性不同故也其餘輕役則以農民為之嵗豐則官為平糴使榖有所歸嵗凶則先按籍賙贍農民而後及浮食者民有能自耕種積榖多者不籍以為家貲之數如此則榖重而農勸矣仁宗時侍讀學士宋祁上奏曰臣伏見邉鄙用兵以来所急者莫急扵食食者出扵力農而國家未嘗留心扵農事天下郡縣雖有陂湖塘堰例不修營轉運使知州通判但帶勸農之名畧無其實及知州通判令佐結銜兼堤堰溝洫習以為常亦不復知是何等語是以農困食艱通天下計之常無一年之畜且天下無一年之畜古語以為國非其國況今大兵在外水旱難調脫若災儉相仍臣知國用盡於軍興則力耕之人餓死不救羸老委溝壑少壮為盜賊貽患國家非細事也臣欲望朝㫖専下轉運使知州通判令佐等嚴行曉告使扵部内各按求陂塘古跡可以利民救患者並令修復量率夫力限日計功如能不擾村鄉久逺利濟並與理為勞績優加酬賞若因此取受搔擾農人所犯一疋以上乞追官勒停十疋以上仍除名終身禁錮又條制舊有五户各一保申明此條令力農之家五户相保其中如有惰丁㳺手不事桑柘不勤五榖田疇荒閒者並許本保申舉官司明行科罰遷配逺州其勤勸農業者國家毎三年畧行優䘏自然人務農業國計必充歴代名臣奏議卷一百一十
