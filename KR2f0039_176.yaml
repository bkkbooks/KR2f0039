body:
  text: 歴代名臣奏議卷一百七十六明楊士竒等撰去邪宋英宗即位初殿中侍御史司馬光論程戡劄子曰臣伏覩制書宣徽南院使鄜延路經略安撫使程戡加安武軍節度使令再任臣聞官以待賢才賞以勸有功官非其人則職事廢缺賞不當功則羣臣解體程戡素無才術少北之時歴職中外猶無名迹為人所稱況今老病昏懦尤甚在鄜延茍且偷安以度日月為吏兵所慢戎狄所輕臣謂朝廷當因其嵗滿授以冗秩别擇能臣以代其任今乃寵以節鉞使居舊任外廷聞者無不駭愕臣竊以兩府之外官尊禄厚無如節度使者羣臣非有大功豈可輕授臣不知程戡在鄜延曾有何功遽授此官萬一邉臣有能立大功者朝廷當復以何官處之况陛下踐阼之初四方之人拭目傾耳觀聽朝廷之刑賞以占聖政而戡首䝉濫賞臣竊為陛下惜之伏望聖慈追還前命别選賢才使守鄜延合中外之望光又言曰臣近曾上言鄜延路經畧使程戡建節再任不合衆望乞追還前命事至今不聞施行臣竊以方今國家外患唯在西北二寇所以捍禦二寇唯在諸路經畧安撫使居此任者豈可不精擇其人程戡在鄜延自以衰老畏人指目專務姑息取媚羣小僚属軍伍尚無凛畏况於外夷固所輕侮比年以來趙諒祚數違舊制易姓建官妄有邀求不遵朝命戡不能式遏而容納其使事之可否盡諉於朝廷則禦侮之臣将何所用事君不忠孰甚於此臣愚以為凡御羣臣之道若居官稱職衆所不及則當使之再任若立功立事為人所知則當加之品秩今語其稱職則軍政不修語其立功則敵人驕慢而朝廷寵命益優委任益厚臣恐将帥之臣宣力者無所勸而懐奸者得其志如此而望疆埸安寕四夷賔服臣竊以為難矣所有程戡新受恩命伏乞早賜追還治平二年光論陳述古劄子曰臣竊聞陜西都轉運使陳述古昨因廵邉妄奏朝廷稱邉鄙寕静不足為慮後因權涇原路經畧司事聞副縂管劉几稱西人㸃集将謀入寇請出兵防邉述古恐與前奏相違因此怒几奏稱不協軍情張皇生事擅移几知鳳翔府数日之間西人果大舉犯邉殺掠弓箭手及熟户蕃部述古亦不即時發兵救援致陷沒數千戸近者雖知朝廷已差臺官勘述古罪状然竊聞所坐止於擅移劉几及奏状有不實之處若以文吏議之罪不至重若以國計言之為害實深何則國家承平日久人不習戰雖屯戍之兵亦臨敵難用唯弓箭手及熟户蕃部皆生長邉陲習山川道路知西人情偽材氣勇悍不懼戰闘從來國家頼之以為藩蔽今述古知西人欲來侵擾而自避翻覆之辜順成欺罔之謀抑遏将官不許救䕶遂以數千户生民委於虎口使父子流離骨肉塗炭豈唯已陷没者深可痛哭臣恐自今以後諸路弓箭手皆不敢於極邉居止熟户蕃部皆有叛國從賊之心以此觀之其害豈小哉況述古出於門䕃材氣庸鄙自歴官以來所至之處縱恣胸臆殘虐吏民不顧憲典輕侮王命驕暴很狡天下共知屢曾坐事黜降旋復驕用叨竊名位一朝至此誠過其分量故天奪之魄舉措乖謬駭人視聼陷敗民命挫辱國威内外之人無不憤疾臣聞舜誅四凶而天下服如述古平生所為亦可以謂之凶人矣陛下縱不欲明加斧鉞以謝邉民亦當投之荒裔以禦魑魅庶使封疆之臣少加警懼光又論皮公弼劄子曰臣伏覩近降詔書於初任第二任通判人中選人權發遣三司判官公事九年之後擢為職司既使之久於其事又待以不次之位此誠用人之要術為政之首務也然當茲選擢之初天下士大夫莫不延􅖪而望拭目而觀若得清修孤直之人則皆勸慕為善砥節礪行不肖者亦化為賢矣若得貪汚諂偽之人則皆傾巧干進飾貎盗名安恬者亦變而為躁矣此乃風俗之本原政治之樞機不可以不眘自非有竒材異績為天下所知未可容易當此舉也竊見尚書都官員外郎皮公弼為吏之處以貪饕致富資性狡猾善為進取在京師造請不倦在外則書啟相尋專用此術致舉主三十餘人一旦首膺兹選天下之人茍有知公弼所為者但私議竊嘆憤􅓹喑鳴莫敢發言此豈可以稱陛下求賢之意副四方跂竦之望哉若所選之人皆如公弼之𩔖乃是開此儌倖之門以為佞邪躁進之途恐非朝廷之福也所有皮公弼伏望聖慈追還前命勒歸本任況今中外之官本資序合入三司判官者尚不啻数十人豈得其中全無可選擇者願且選以補即因三司判官之闕俟果有竒材異績為衆所知者然後依近降詔書舉而用之天下幸甚光又論王廣淵劄子曰臣伏見新除王廣淵直集賢院外廷之人無不恠惑偶語族談莫知其故或云廣淵以唇舌便佞逰走於公卿之門盖執政所薦也或云陛下龍潜之時廣淵以文章因陛下故人自薦逹素䝉知賞故特加拔擢此二者莫知其虚實若果有其一皆非朝廷之美也夫端士進者治之表也憸人進者亂之階也臣竊聞廣淵雖薄有文藝其餘更無所長於士大夫之間好奔競善進取稱為第一若以此獲公卿之知則其人固非端士矣鄉以初任通判編排中書文字二年之間堂除知舒州縉紳已皆相與指目以為儌倖今又驟加美職安得不取外廷之怪惑乎陛下方蒞政之初欲簡拔天下賢材寘諸不次之位以率厲羣臣而執事之臣不能稱陛下之意前此用皮公弼權發遣三司判官今又用王廣淵直集賢院将何以使天下之人尚㢘恥之節崇敦厚之風乎若陛下龍潜之時廣淵果曾以文章自逹於左右此尤不可昔漢文帝時景帝為太子嘗召上左右飲中郎将衛綰獨稱疾不往及即位寵待綰過於它臣周太祖時世宗鎮澶州張美為三司吏掌州之錢榖世宗私有求假美悉力應奉及即位衆皆稱美材敏而世宗終薄其為人廣淵若當仁宗之世私以文章獻於陛下為臣忠謹者肯如是乎陛下今日當治其罪而又賞之将何以厲人臣之節也所有王廣淵新授直集賢院𠡠伏乞追還英宗時殿中侍御史傅堯俞論王臨疏曰臣伏見殿中丞王臨為任莫州推官日移雄州推官因縁差遣拖延月日就成考第冒轉京官後因魏景攀援心迹皆露御史中丞張昪包拯韓絳知雜事范師道等相繼論列朝廷更不根究特追事發後所轉一官猶與知縣差遣人言不已始降監當公議紛然逮今未定而臨敢為欺㒺妄引劉庠王淵例欲從難議書罪都不理為過犯臣雖䝉暗殊用震駭臣竊見王臨事状備於案牘非有隠深廋匿不可窺而索者取而一閲則妄冒之情畢得公私之坐已明乃能使李象賢曲庇其罪夏防獨當其責歴三中丞而不能正其事經諸有司而不敢斥其過不知王臨挾何術而至於斯也急進則交結以圖儌倖既敗則文飾以自解免固巧官之傑而奸人之雄此而可容孰為不可容者朝廷既不令窮劾但加輕罰有司以元無案欵便為無過臣恐刑典自此揺矣王臨之事案中皆具而人所共聞臣今不復備論唯陛下察臣顓愚之懇誅臨猾巧之心一以審官曾追官免勒停人定法從事則懐諼㒺上者不得肆其志而舞文附下者可以懲其後臣不勝懇懇之至英宗有疾既平堯俞為起居舍人上書皇太后請還政久之聞内侍任守忠有讒間語堯俞諌皇太后曰外間物論紛惑兩宮之情未通臣謂天下之可信者無大於以天下與人亦無大於受天下以公況皇帝以明睿之資貫通古今而受人之天下乎如誅竄䜛人則慈孝之聲並隆矣堯俞知諌院又論薛向疏曰臣近有状論列除薛向不當以向􅏽險多機用援甚衆自從被責百塗經營未離故居遽此牽復壊陛下賞罰之權無以取信天下且謂邉防之間纔有小警不當藉以為牽復罪人之資及論薛向材質事状乞寝新命皆悃愊公議未䝉指揮降出臣雖甚愚深所未喻謹條事體重煩天聼伏惟少賜詳擇夫設官吏責以言天下之事其所論奏當辨别是非當否茍渉阿私竄黜可也若言入則留中不下面奏則置而不聼殆非所以開廣聰明者也朝廷初政首梗言路臣竊為陛下惜之陛下天資英斷當斷於是者斷於非是害政非輕陛下視從諫如轉圜者為何等主哉夫挾萬乗之勢執生殺之柄以臨沮臣下是豈艱哉顧道理何如耳陛下儻不深思謂事以不移為得臣恐自此以往必有倚聖斷以售其智筭者況二府各有常職詎容相侵今樞宻院專除文吏不幸中書又專行樞宻院事報復徃還積為私隙将何以帥正百官共成天下之務若曰出自聖心俾樞宻院行之者尤為不可陛下總攬綱紀而自紛之誰為此謀将誤陛下審如是執政者亦當以職分自陳姑務救正以順成美徳不當茍且依違奉行況薛向小人惡足留神如是謂今天下無如向之材者欺㒺不已甚乎儻此事不改非獨刑賞失當是祖宗之舊法皆可隳而言職可以廢也且薛向兩經樞宻院除官輙復追奪何先帝謂之非而陛下必以為是此臣重為陛下不取也伏望併以臣輩前状付外必賜施行臣無任忠憤激切之至堯俞再論薛向劄子曰伏為牽復薛向陜西轉運副使不當累曾論列至今未見指揮竊縁賞罰紀綱朝廷重輕所繋臣之瞽言亦已詳盡與尋常風聞之説事體不同伏望陛下早加詳擇如臣言是乞賜施行臣言茍非乞黜臣以誡狂易循黙觀望既非臣所能茍免取容亦非臣所喜干冒天聼伏俟鈇鉞堯俞又論薛向疏曰臣甞有状論列陜西轉運使薛向争奪舘驛致前榮州應靈縣令崔令孫身死公事今來再勘奏案已到風聞其間事節與前勘畧同輙復有言惟陛下詳擇伏以薛向倚恃權勢作威作福使天子之命吏無事殞身都不避嫌自判本家詞状以送靈寳縣所以縣吏奉行不復檢驗其死状殊不分明及趙約之取勘案成所招情欵甚畧自度非便乃翻訴以疑衆欺侮上下機械無窮若謂向志在殺人固為非允然令孫之死本由薛向今則南宻張皥張奕等各陷深刑罪首乃從輕典此臣前状所謂未雪舊寃更生新枉者也茍不原情議罰何以粗厭人情向若偶為此事猶或庶㡬縁向任性為虐其來有素鄜州三川縣令嚴寅只因迎候差近叱罵摧辱所不能堪即時發病既歸而死位在已下者縱意陵轢官居已上者伺隙擒制茍能附會則曲法維持自陜以西幾乎道路仄目又其所領皆是要司部中舉官其數且百専以應副有位故為㳺説者多臣又慮朝廷牽於用度謂解塩等事非向不能辦了須少假借以責其功是大不然其薛向敢為詭激狙詐百端移東就西改頭換尾以惑朝廷者甚衆借令頗有實效乃是聚歛之臣不過能為裴延齡皇甫鏄之罪人耳夫與其有聚歛之臣寧有盜臣其疾之如何哉方今經費猥多民力屈竭非陛下痛自儉刻窮其本原固不能為已如欲崇奨聚斂之臣賴以取濟臣恐失之逾逺今薛向髙自夸大以為它人無能及之臣謂朝廷求忠藎悃愊愷悌以濟務者或恐不多如向之比不患無人大凡君上之馭臣下也有勞則必勸之以賞犯法則必繩之以刑使猾奸者破膽知懼茍圖其用敢不盡心求償有恩無威獨事姑息其志得氣溢則貪權固位尚肯為國家盡瘁者哉況向智數狡獪或得親近左右足以熒惑天聼其才識雖不逮裴延齡皇甫鏄若懐䜛㒺上争進害人臣知其過之逺甚伏乞深察其情特加黜免不獨使幽寃有訴刑賞並行亦使奸豪少沮不敢縱其技巧而久為世道之患也殿中侍御史范純仁奏乞罪執政邪議尊崇濮邸疏曰臣伏見執政首開邪議妄引經證以枉道悦人主以近利負先帝欲累濮王以不正之號将陷陛下以過舉之議朝論駭聞天下失望政典之所不赦人臣之所共棄臣地居言職勢不嘿全請尚方之劒雖古人所難舉有國之刑典章猶在且議既不合理難並立昔師丹之説行則董宏坐其罪董宏之論勝則師丹廢於家臣等言不足用願從竄謫上不辜陛下之任使下不廢朝廷之職業臣等之志足矣竊以自古人君之御天下未嘗不以人心為本得之則中才可以免危亂失之則賢智不能保治安故曰民猶水也可以載舟可以覆舟人心之得失可不慎哉豈有身備大臣與國同體希合上意内營己私移過於人君失望於天下為臣之惡莫重於斯伏惟陛下紹膺大統稱尊御極生育之恩禮宜追厚然當俟先帝祥禫之既畢陛下徳澤之已行然後講求典禮褒崇本親況仁宗虞主始祔陵土未乾而遽開越禮之言欲遵衰世之迹致陛下外失四海臣庶之心内違左右卿士之議陛下自臨御以來厲精為治遇烖而懼則有周宣之風至誠感神則有虞舜之徳至於徽稱所加却而不受皆前代難行之節治朝可紀之政推而行之和氣可致然而中外人情囂然不安者良由邪說震驚大議未定今不正濮王之禮則無以慰羣心不罪首惡之臣則無以清朝政伏望聖慈早出臣前後章奏付外施行純仁又奏乞責首啟濮邸邪議之臣疏曰臣䓁近准閤門告報奉聖㫖令赴臺供職臣等尋為所論濮王典禮未正具状奏陳不敢奉詔復准御批今依已得指揮臣等伏縁近以彈奏輔臣乞正大議以雪君父之謗欲清左右之奸愚忠憤懣陷於僭越乃至封還詞誥擅離官次情雖愛君罪實違法伏䝉陛下深察其意貸其所犯朝命再行諭令就職臣等徒荷陛下全度之恩未見朝廷法制之正今濮王典禮雖去殊號而首啟邪議之臣未加顯責之命中外猶以為惑臣等何敢自止伏望檢會臣等前奏施行所有本職未敢祗赴依前居家待罪俯望聖慈早賜睿斷純仁又奏乞罪邪議尊崇濮邸疏曰臣近兩次全臺列章彈奏執政官不合首建邪議欺惑聖聡上損君徳下驚民聼伏惟陛下即位以來兢兢業業慎重萬幾四方翹首已望太平而執政不能以古先哲王致治之術開廣上意發號施令動合人心使億兆之民鼓舞神化而乃希意要寵但為邪説違越禮法不顧大義将陷陛下於有過之地及乎近臣集奏禮官討論遷延經時大議不决而又欲牽合前代衰暗之世所行謬迹以飾奸言距塞正論挾邪㒺上心實不忠伏望聖慈奮然獨斷將臣等前奏付外施行庶分邪正以服天下臣自去秋以來相繼論列中書門下不合建議欲加濮王非正之號不䝉開納又於近日臣等三次全臺列状奏弹未䝉施行盖由臣等才識淺陋不能開悟聖心早正典禮又不能擊去奸惡肅清朝廷遂使大議久而不決中外之人謗論洶洶若安然尸禄不自引罪則上成陛下之失徳下隳臣等之職業臣等已将元授御史告身隨状􅌳納自今月二十二日更不赴臺供職居家待罪伏望聖慈早賜黜責神宗即位初御史中丞司馬光論王廣淵劄子曰臣聞明君之政莫大於去奸忠臣之志莫先於嫉邪陛下不知臣無似使待罪憲府受任以來於今踰月而寂無所糾誠負大恩伏見直龍圖閣兼侍讀王廣淵以小人之質有傾巧之材茍求進身無所不至外依政府内結近習數年之間致位清顯國家本以龍圗閣寵賢彥邇英待儒雅皆非廣淵所宜濫處陛下即位以來未聞放黜奸邪以警羣臣廣淵於朝列之中為奸邪之尤者伏望陛下奮發乾剛首加斥逐奪去職名降一逺地監當亦足以快天下之耳目光又論王廣淵第二劄子曰臣近曾上言直龍圗閣兼侍讀王廣淵傾巧奸邪乞盡奪去職名除一逺地監當差遣至今未聞指揮臣竊惟廣淵所為布聞海内陛下昔在宮邸豈不備知何假㣲臣更為詳述書曰任賢勿貳去邪勿疑此大舜所以成大功也陛下若未知廣淵之為賢與不肖尚容致疑若果知廣淵奸邪之状則豈可復置之左右而不速去之哉夫佞人者巧於求合變故萬端雖聖賢所不能察是以帝堯畏巧言令色孔壬而孔子教顔淵以逺佞人夫堯與顔淵非不明也茍不畏而逺之則有時而惑之矣伏望陛下依臣前奏其王廣淵早賜黜逐光又論郭昭選除閣職状曰臣竊聞陛下鄉時直省官郭昭選等四人近有特㫖並除閤門祗候衆言籍籍頗謂儌忝國初草創天歩尚艱故祖宗即位之始必拔置左右之人以為腹心羽翼豈以為永世之法哉乃遭時不得已而然也自後嗣君守承平之業繼聖考之位亮隂未言之間有司因循踵為故事凡東宮僚吏一槩超遷謂之隨龍以此昭選之徒得自厮役直除班行其為幸已多矣乃敢妄有攀援邀求無已曾不自省有何功勲小人之心終無厭極不可縱也且閤門祗候祖宗所以蓄養賢才以待任使之地也其與班序差遣事體不同譬諸史臣則舘閣之流也豈可使厮役之人為之哉況東宮其餘吏卒甚衆茍一人得之則皆有兾望之心此書所謂啟寵納侮者也陛下既承大統則率土之濵誰不為臣而獨私於東宮之人則所與親者至狹矣臣昨除御史中丞初上殿之日首以官人賞罰為言誠以三者致治之本自上世以來不易之道也今昭選等以賤隷而叨美職是官不擇也無横草之勞而數月之間恩命相繼是無功受賞也奸慝明著如髙居簡等尚保而庇之是有罪不罰也陛下始初清明方勵精求治而乃輕其官爵慢其賞罰如此将以興太平之功猶適楚而北轅也今臣所以區區進言者但為陛下惜此而已所有昭選等新除閤門祗候乞賜追還熈寕三年光任御史中丞論王安石疏曰參知政事王安石不合妄生奸詐熒惑聖聰及公亮等各務依違未曽辨正乞明其罪不䝉施行竊以易喻履霜示為君制臣之術書戒作福明凶國害家之常易書之義其知㡬乎君子見幾不俟終日是以自古君無過失而臣不奸欺盖知其幾而遏其端也伏遇陛下即位以來日慎一日聞過則喜從諫如流四方翹企以望太平萬俗謳謡而陶美化其以用安石為相斯見陛下焦中心而求治急先務以濟時者也而安石備政府必當輔國以伊周之道致時為堯舜之民發政施仁俾合輿意而安石首倡邪術欲生亂階違法易常輕革朝典學非言偽王制所誅非曰良臣是為民賊而又牽合衰世文飾奸言徒有嗇夫之辨談拒塞争臣之正論加以朋黨鱗集親舊星攅或備近畿或居重任窺伺神噐專制福威人心動揺天下驚駭茍陛下不遏其端則安石為祻不小夫書易之戒正急於斯且陛下以安石有師保之尊故舊之恩俾為相臣使預政事昔漢尊桓榮徒聞設几燕貴鄒衍惟見築宫豈有俾居顯重而妄使改為若不正其罪惡亦難以順乎衆意臣職居御史身為諫官非不能希意茍合以求寵榮盖以立君朝者當勵已以去邪食君禄者必輕身以為國臣之與安石猶冰炭之不可共噐若寒暑之不可同時是以屢犯天顔輙陳狂瞽心既為國寕復愛身茍今日䝉鈇鉞之誅勝異日死賊臣之手伏願陛下獨奮乾剛專行夬決一遵祖憲無用邪謀誅逐亂臣延納正士上以順皇太后之意下以慰億兆人之心則臣等退就誅戮亦所甘心四月二日光知許州論王安石疏曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇決不如范鎮誨於安石始知政事之時己言安石為奸邪謂其必敗亂天下臣以謂安石止於不曉事與狠愎爾不至如誨所言今觀安石引援親黨盤據津要擯排異己占固權寵常自以己意隂賛陛下内出手詔以決外廷之事使天下之威福在己而謗議悉歸於陛下臣乃自知先見不如誨逺矣純仁與顥皆與安石素厚安石拔於庶僚之中超處清要純仁與顥覩安石所為不敢顧私恩廢公議極言其短臣與安石南北異鄉取舎異道臣接安石素疎安石待臣素薄徒以屢常同寮之故私心眷眷不忍輕絶而預言之因循以至今日是臣不負安石而負陛下甚多此其不如純仁與顥逺矣臣承乏兩制逮事三朝於國家義則君臣恩猶骨肉覩安石專逞其狂愚使天下生民被荼害之苦宗廟社稷有累卵之危臣畏懦惜身不早為陛下别白言之軾與文仲皆踈逺小臣乃敢不避陛下雷霆之威安石虎狼之怒上書對䇿指陳其失隳官獲譴無所顧慮此臣不如軾與文仲逺矣人情誰不貪富貴戀俸禄鎮覩安石熒惑陛下以佞為忠以忠為佞以是為非以非為是不勝憤懣抗章極言自乞致仕甘受醜詆杜門家居臣顧惜禄位為妻子計包羞忍恥尚居方鎮此臣不如鎮逺矣臣聞居其位者必任其事食其禄者必任其患茍或不然是為盜竊臣雖無似甞受教於君子不忍以身為盜竊之行今陛下唯安石之言是信安石以為賢則賢以為愚則愚以為是則是以為非則非諂附安石者謂之忠良攻難安石者謂之讒慝臣之才識固安石之所愚臣之議論固安石之所非今日所言陛下之所謂讒慝者也伏望陛下聖恩裁處其罪若臣罪與范鎮同即乞依范鎮例致仕若罪重於鎮或竄或誅所不敢逃熈寕二年侍御史范純仁論新法乞責降状曰臣自僭位諫垣殫竭愚衷實欲少禆聖治仰答天恩但其才不逮人技有所止多言煩黷一無可收加以執政之臣遂非强愎自謂人莫已若唯欲衆不我違率意而行略無顧忌至於元臣舊老皆務泯嘿雷同漸恐欲事必行嚴立法制深嫉異同之論急繩違忤之人以致忠賢日踈䛕佞得志陛下無納諫之美百官懐茍且之心衆怨潛興無敢言者此事将有漸固非臣力可囬則其疲懦無堪罪在難赦伏望聖慈早行黜責别擇争臣庶㡬取信朝廷可救時弊大臣有所驚懼小人不能為奸惟在睿斷行之不疑臣無任激切之至純仁又論薛向疏曰臣累言薛向有罪不宜獲貸又其性貪狡不可付以六路之權不䝉聼納臣聞傳曰徳惟善政政在養民又曰春省耕而補不足秋省斂而助不給是聖王之政在乎愛養百姓而補助其不足使之衣食有餘然後供給公上猶先培其根本而待華實之茂理之必然也陛下方以公私匱乏故務先於理財盖欲厚本抑末補助百姓将使富而後教兾三代之政耳非有意於損下奉上廣殖貨利増大侈心而已也然則付其任者宜得仁愛有徳之士視人如己方能知民飢渴發斂以時庶可副陛下愛養元元之意固非如薛向急進希功貪狡刻薄之人所能為也方今多士盈庭必有賢才可副選任在陛下擇之而已今乃付以薛向而欲使黎民不飢不寒知陛下愛養之意是猶愛其赤子而付之狠戾貪狡之乳母欲其子無飢渴之患而知其父母之慈固亦難矣今陛下成命已行聖意莫囬而臣區區言之不已者是臣之職也天下之士未至絶無君子而致陛下屈法奨用小人是執政之罪也陛下聰明聖智有納諫之資而臣言無可取則臣不肖失職之罪也執政之罪在聖恩得以含容而臣之罪又安得不治哉臣不勝待罪之至純仁乂論薛向疏曰臣前表累言薛向在陜西違條㒺上罪状顯明不當曲加恩貸仍䝉奨用及張靖不當先於罪人責降皆是朝廷賞罰之失将使奸邪得志盡謂憲典可欺中人之性易移悉以張靖為戒遇事必皆希㫖蔽惑人主聰明盖是中書不合差除致累陛下聖政臣雖累曽陳奏不䝉聼納施行今又委以六路生靈使之専治財賦則薛向奸詐必更甚於陜西縁陜西有都轉運使諸路帥臣走馬承受皆是朝廷信臣不為向所統攝又有非時使命往還訪察若是臣寮善惡朝廷易為得聞而向以巧能彌縫尚敢肆為欺惑今來東南六路官吏皆是向所統臨又無非次使命採訪加以吏民懦弱被苦不能伸陳即向欺奸足以自恣又聞東南諸郡民力多困窮近復連被水灾正要朝廷優恤陛下當遣寛厚仁愛之使惟令撫養瘡痍俾得漸就富完以厚根本豈有更令纎巧刻薄之吏别肆誅求或致民心困窮亦必别生事變則於治亂所繫非輕臣居諌垣豈敢緘嘿陛下度臣於向素無嫌隙又非强愎欲遂己言何必區區頻黷天聼盖以朝廷賞罰為重六路生民可憂復遇陛下聖明其言不可不盡惟望早垂睿斷勿憚改為從諌黜邪二美兼舉使天下風俗一變奸人革心豈不盛哉如或以掩善嫉能其説無取則乞宣示外廷早行責降純仁又論薛向疏曰臣准中書劄子以臣乞補小郡奉聖旨不允所乞者竊以臣叨預諫垣裨補無状遂使奸人壊法朝廷賞罰不平固當竭力陳論死而後已乃敢妄求責降輙請郡符疲懦無堪罪宜不赦而䝉尚加容貸未賜允俞在君父保全之恩極於仁厚而臣子補報之義愈宜竭忠然有未盡之誠不避頻黷天聼縁薛向詐佞貪狡衆所共聞陛下但愛其小才可備噐而不言負陛下之罪不容誅矣純仁又論王安石疏曰臣昨日上殿劄子䝉聖恩令送中書臣恐執政遂非不以臣言為是進呈之際不䝉施行伏縁臣自到諫垣方見陛下進用富弼王安石臣與士大夫私相慶忭以為儒者得用必賛陛下行堯舜三代之政以修己安人為務敦舉直錯枉之風先道徳而後事為先教化而後法制變俗易於偃草施仁速於置郵是将拱手垂衣而天下晏然矣今則安石乃以五霸富國强兵之術啟廸上心忘其舊聞以希速效甚異孔子不言軍旅孟軻恥道桓文之意也又復任用小人專興財利将使上玷聖徳侵刻生民臣雖屢有奏陳不䝉聼納而執政之意持之益堅故臣太息失望不能自已觀其舉事倉卒知人不明必恐别生事端上負陛下注倚此臣私憂過計愛君行己區區莫奪之志也今執政之臣既謂臣言無状而臣亦恐執政不能致君若使尚處諫垣議論無由協濟豈惟職事廢闕實亦不可同寅伏望陛下察臣狂愚早行降責庶盡犬馬之力别圗報効則臣雖死之日猶生之年純仁又彈呉安持李偉疏曰臣伏覩都水使者呉安持李偉等決大名第三鋪口欲因漲水囬大河入孫村口使還故道暴集薪芻屢差夫力倚河之民殆不堪命訖無成績虚費不可貲計若知不可而强為是貪賞欺天若果可為而不效是不䖍敗事欺天敗事未嘗議刑奸憸之人既無所懲艾故今又欲興作大役數十倍於前日假託是朝廷賞罰之失實係消長安危事理甚明不䝉聼納臣若偷安茍且狥俗好名則必謂此事已曽力言自是朝廷不聼足以聊塞責任遂可竊位保身何必違忤君親以取擯逐之辱盖以人臣之罪莫大於容養小人下使侵剥生民上使虧損聖政況臣謬居諫列職當指佞嫉邪又以連任陜西親見安持奸迹今若言而茍止則是輕職愛身不惟非臣素心陛下亦何所賴是以區區不已上黷睿聰伏望更将臣前後所陳反復詳究如臣言非誣㒺則陛下何惜施行不惟使奸吏悛心亦可正朝廷綱紀如或謂人才難得須當委任小人而臣欲遂己言務隨流俗不思體國意在嫉能則臣之不忠罪亦難恕豈可尚叨任使猶處諫垣雖䝉聖恩含容於臣何施顔面唯望早行黜責以誡百官純仁又乞戒約妄陳邉事疏曰臣聞舜難任人而蠻夷率服詩稱讒人㒺極交亂四國易曰小人勿用必亂邦也以見小人用之則交亂邦國逺之則能服蠻夷皆前世之明效而聖人之深誡也伏見近日因陛下求治之切延訪之勤時有小人之言上惑聖聼聞之似若可采行之必累至明盖其天性憸邪淺狭效小忠而忘大體貪近利而昧逺圖急於營身不思害國皆以己之所好便為致主之謀行於其身尚為衆人所惡采而治國豈能有補大猷如昨來某人等起横山之謀西陲至今受弊及河北某人好奏邉事亦多細瑣不實自謂朝廷委信帥臣難為節制并諸路走馬承受亦有不遵條約輕妄奏論揺動邉臣過索承奉朝廷毎有升黜適足助其威勢若不早加禁約實恐深蠧紀綱伏望陛下法宣尼逺佞之言體虞舜疾讒之道凡是憸人近習其言不可輕信及乞宣諭二府如有妄陳邉事及曾引惹生事之人不得令在邉任候有急難方得用之及委轉運使提㸃刑獄等體量諸路走馬承受不得於元降條約外妄陳邉事及言人長短其所奏文字亦乞降樞宻院公行如此則小人道消太平可致右諫議大夫兼御史中丞呂誨論王安石奸詐十事状曰臣竊以大奸似忠大詐似信惟其用舎繫時之休否也至如少正夘之才言偽而辯行偽而堅順非而澤强記而博非宣父聖明孰能去之唐盧把天下謂之奸邪惟徳宗不知終成大患所以言知人之難堯舜其猶病諸陛下即位之初起王安石就除知江寕府未㡬召為學士搢紳皆慶陛下之明擢有文之人得以適其用也及進貳台席僉論未允衡石之下果不能欺其輕重也臣伏覩參知政事王安石外示樸野中藏巧詐驕蹇慢上隂賊害物斯衆所共知者臣畧疏十事皆目覩之實迹兾上寤於宸鑒一言近誣萬死無避安石向在嘉祐中判糾察刑獄司因開封府争䳺鶉公事舉駮不當御史臺累移文催促謝恩倨傲不恭相次仁宗皇帝上仙未幾安石丁憂其事遂已安石服滿託疾堅卧累詔不起終英宗朝不臣就如有疾陛下即位亦合赴闕一見稍存人臣之禮及就除知江寧府於私計安便然後從命慢上無禮其事一也安石任小官毎一遷轉遜避不已自知江寧府除翰林學士不聞固辭先帝臨朝則有山林獨往之思陛下即位乃有金鑾侍從之樂何慢於前而恭於後見利忘義豈其心乎好名欲進其事二也人主延對經術之士講解先王之道設侍講侍讀常一員執經在前及進説以傳道也安石居是職遂請坐而講説将屈萬乗之重自取師保之尊真不識上下之儀君臣之分況明道徳以輔益聰明者乎但要君取名而已其事三也安石自居政府事無大小與同列異議或因奏對留身進説多乞御批自中而下以塞同列沮公論是則掠美於己非則斂怨於君用情㒺公其事四也安石自糾察司舉駮多不中理與法官争論刑名不一常懐怨隙昨許遵誤斷謀殺公事力為主張妻謀殺夫按問欲舉減等科罪挾情壊法外報私怨兩制定奪但聞未詳亦皆畏避挾私報怨其事五也安石初入翰林未聞進一士之善首率同列稱弟安國之才朝廷與状元恩例猶謂之薄主試者定文卷不優其人遂罹中傷小恵必報纎仇必復及居政府纔及半年賣弄威福無所不至自是畏之者勉意俯從附之者自鬻希進奔走門下惟恐其後背公死黨今已盛矣怙勢招權其事六也宰相不視事旬日差除自専逐近臣補外皆不附已者妄言盡出聖衷若然不應是安石報怨之人丞相不書勅本朝故事未之聞也意示作威聳動朝著然今政府同列依違宰相避忌遂専恣而何施不可専威害政其事七也凡奏對黼座之前惟肆强辨向與唐介争論謀殺刑名遂致諠譁衆非安石而是介介忠勁之人務持大體不能以口舌勝不幸憤懣發疽而死自是同列尤甚畏憚雖丞相亦退縮不敢較其是非任性陵轢同列其事八也陛下方稽法唐堯敦睦九族奉親愛弟以風天下而小人章辟光獻言俾岐王遷居於外離間之罪固不容誅上尋有旨送中書欲正其罪安石堅拒不從仍進危言以惑聖聰意在離間遂成其事朋奸之迹甚明其事九也今邦國經費要會在於三司安石居政府與知樞宻者同制置三司條例兵與財兼領之其掌握重輕可知矣又舉三人者管當八人者廵行諸路雖名之曰商𣙜重利其實動揺於天下也臣未見其利先見其害其事十也臣指陳猥瑣煩黷髙明誠恐陛下悦其才辯久而倚毗情偽不得知邪正無復辨大奸得路則賢者漸去亂繇是生臣究安石之迹固無逺畧惟務改作立異於人徒文言而飾非将㒺上而欺下臣切憂之誤天下蒼生必斯人矣伏望陛下圖之宜當稽於衆方天灾屢見人情未知惟在澄清不宜撓濁如安石乆居廟堂必無安静之理臣所以瀝懇而言不虞横祻期感動於聰明庶判别於真偽況陛下志在剛決察於隠伏當質於士論然後知臣言之中否然詆訐大臣之罪不敢茍逭孤危若寄職分難安當復露章請避怨敵熈寕二年六月呂誨時為右諌議大夫兼御史中丞先是安石見上曰此非卿不能為朕推行須至以政事煩卿料卿學問如此亦欲施設必不固辭也安石對曰臣所以來事陛下固願助陛下有所為然天下風俗法度一切頽壊在廷少善人君子庸人則安常習故而無所知奸人則惡直醜正而有所忌有所忌者倡之於前無所知者和之於後雖有昭然獨見恐未及成功而為異論所勝陛下誠欲用臣宜先講學使於臣所學本末不疑然後用之庶㡬能粗有成上曰朕知卿久非適今日也然須勿為嫌専督責朕使大有為不知卿所施設以何為先安石曰變風俗立法度最方今所急也一日上欲用安石秉政曽公亮因薦之唐介曰安石恐難大任上曰卿謂文學不可任耶經術吏事不可任耶介曰非謂此也安石好學而泥古論議迂濶若使為政恐多所變更必擾天下退至中書謂公亮等曰異日安石之言果用天下困擾諸公當自知之耳安石既秉政上問安石何以得陜西錢重可積邉榖安石對欲錢重當修天下開闔斂散之法因言泉府一官先王所以摧制兼并均濟貧弱變通天下之財而使利出於一孔者以有此也其言曰國事於財用取具焉盖經費則有常賦以待之至國有事則財用取具於泉府後世桑𢎞羊劉晏粗合此意然自漢以來學者不能推明先王之法更以為人主不當與百姓争利今欲理財則當修泉府之法以收利權既修法則必與流俗所見不同而異論必衆在陛下先有以斷之然後可為此須藉人才然人才難得亦難知今使能者理財則十人之中合有一二人敗事從來但以有敗事者則異論乗之以紛擾臣以謂堯與羣臣共擇一人治水尚不能無敗事況所擇而使者非一人豈能無所失要當計利害多少於前日而不為異論所惑其有敗事之人即從而行法乃更講求所以敗事之由以増修法制則事無不成上曰自來有一人敗事則遂廢所圗此所以少成事也遂命知樞宻院陳升之與安石取索三司應干條例文字看詳其合行事件聞奏列為一司名曰同制置三司條例升之安石因請以著作佐郎編校集賢書籍呂恵卿為制置司檢詳文字前權大名府留守推官蘇轍同檢詳文字權湖北路轉運判官都官員外郎劉彛比部員外郎通判缺州謝材卿太常博士河北轉運司管當公事王廣廉秘書丞知安逺縣侯叔献著作佐即陳顥大理寺丞知開封府倉曹參軍盧秉許州司理參軍國子監直講王汝翼權興化軍判官監建州買納茶場曽伉凡八人分往諸路相度農田水利税賦科率徭役利害於天下紛擾誨上此奏上得誨疏即批送誨仍遣内侍李舜舉諭意侍御史劉琦論王安石状曰臣等歴觀自古以來為人君者未有不以偏聼失徳為人臣者未有不以専權致亂志曰聼之不聰是為不謀盖以其不能廣覧逺聼擇所長而用之而溺於私愛甘於䛕佞忘義理之是非惟辯給之嘉尚洪範曰聰作謀若其聼受之偏其能謀乎書曰臣之作福作威害于而家凶于而國易曰或從王事無成有終盖言臣之事君将順其美正救其惡有功而不敢尸有善則歸于上故人雖知其賢而不得見其迹茍異於是已非臣道矧威福在己乎臣等竊見陛下擢用王安石為參知政事未踰半年中外人情囂然不安盖以其専肆胸臆輕易憲度而全無忌惮之心也臣等請言其畧伏自陛下即位以來精心萬機任賢求治常若飢渴故置安石在政府必欲致時如唐虞躋俗如成康今安石反以管商權詐之術戰國縱横之論取媚於陛下陛下遽信其言遂與陳升之同謀侵奪三司之利收為已功開局置官引三人者於本司議事用八人者分行天下驚駭物聼動揺人心其所辟用皆門下親舊之人如呂恵卿王子韶盧秉王汝翼之徒豈能通曉錢榖周知天下之利源乎復用薛向為發運使兼領均輸之職信如詔書之言徙貴就賤用近易逺固亦無害然使小人為之假以貨泉任其變易縱有所入則不免乎奪商賈之利商賈既不行則諸路税課自然虧失是先喪其嵗時之常入則國之經費何以仰給官司販易物有難售者須至均配在民以取其直物既積壅難於速貿則必有鬻田宅破家業以應期會者不然則滛刑濫罰從而加之矣古人有言曰財盡則怨力盡則叛民既怨叛則恐奸雄之人得以攘臂於其間矣不識朝廷之意果以是為便乎而況薛向之為人也所至之處多用耳目刺探州縣長短從而脅持之即以裒斂非道之事俾之承禀其贓貪畏懦之人莫不俛首曲從其公正持守之者須至違戾則必為其中傷矣朝廷方委之興事萬一有勉而聴之者則縉紳之徒離心解體将自竄於巖穴之中矣不識朝廷之意復以為便乎去年用許遵文過飾非妄議謀殺自首按問之法朝廷遂差王安石與司馬光定奪二人者所見不同司馬光則持至公之論請依舊法不可以謀為因王安石則任一偏之見改舊法而立新議以害天下之大公臣等抗章論辨指安石之議為非復差呂公著韓維錢公輔再定而皆附從其説不思法制之難行但務人情之茍合後來言者不已又令宻院同議可否文彥博等所定既協公道陛下即以衆人所議文字委富弼看詳弼在病告不俟其出朝廷又却行安石所定首減指揮良由同列畏其强愎陛下惑其浮辯乃至此爾小人章辟光妄獻岐邸遷外之議踈間陛下友愛之徳罪不容誅御史中丞呂誨及臣等連章奏乞加竄逐以絶疑萌陛下雖屢許其請獨安石百端沮格且熒惑聖聼而陛下以為愛已遂隠忍而不行是以呂誨指陳安石黨庇小人之迹而誨復降黜中外之議喧然不平及呂公著一言辟光之罪即時貶責誨與公著均中丞也何誨言之而獲戾公著言之而遽行非公著與安石生平相知表裏相應亦恐言之未必從也且非威福之柄不出於陛下而盡由於安石乎且如近用呂公著為御史中丞與兄公弼職任相妨臣等亦曽論列陛下不以為聼也竊聞陛下始欲用司馬光為中執法安石力薦公著而欲罷公弼樞府之任公著以人言不協又於兄弟之義難安也遂亦辭免陛下乃聼安石之言遂兩用之此得為允當乎近又覩中書劄子今後御史中丞獨舉臺官不拘官職高下此亦安石之謀也不過欲引用門下之人置在臺中為已之助耳已之有過彼則不言此得為朝廷之福乎況祖宗以來未嘗有兄在樞府而弟為中丞者亦未有舉臺官不拘官職高下而知雜御史不同議也亦未常有不與學士院輪舉也先朝所立制度乃陛下家法自宜世世子孫守而勿失今一旦信安石之言乃欲事事更張廢而不用良可惜也如上所條之事豈非安石之専權而陛下之偏聼乎竊見安石故人團練副使陸申叙復著作郎頗喧物議縁陸伸昨知栁州日於治平亮隂中使妓樂宴飲以至更深因虞候兵士作閙伸遂決撻虞候至於身死情理至重朝廷明有指揮經恩未得叙用仍不與親民差遣前福建路提刑王陶因不覺察其子販鹽一般責降團練副使比之陸伸所犯差輕尚未甄叙況陸伸身為郡守官列朝行不存臣子之禮全無忠孝之義将何面顔更求仕進若非與安石相知豈能便得復官又安石舉親情王無咎充國子監直講無咎昨自亳州衞真主簿移台州天台縣令係次逺不赴任尋醫却於常州掌學二年後復授南康軍南康縣主簿避見逺官又乞尋醫遂來京師以聚徒教學為名出入權門營求直講御史孫昌齡迎合安石之意奏無咎不候尋醫年滿先次差充直講況流内銓尋醫人未嘗有預先舉授差遣體例兼無咎尋醫後自係違礙選人即合入元初次逺路分今有此優命若非安石力加薦引曲為主張豈能冐寵儌倖異於衆人乎如此之事皆安石欺㒺不公之罪也謹按安石自應舉歴官以來凡著書立言莫不知尊尚堯舜之道以倡率學者故天下士人之心無不歸嚮謂之為賢以至陛下遂聞而愛之遂致位公府今遭時得君如此之専當以平時所學仁義之道啟沃上心以廣聖徳今乃首以財利之議務為容悦言行乖戾一至於此剛狠自任則又甚焉不知安石之心待陛下為何如主也陛下天資頴悟不世而出堯舜至治指日可復今反以覇國諸侯之術唐室衰主之事誘惑上聼何不恭之甚也孟子曰齊人莫如我之敬王也我非堯舜之道不敢陳於王前而安石則異於是其意無它是欲持禄保位覬覦宰相耳其奸詐之迹顧不明耶奸詐専権之人豈宜任在廟堂以亂國紀臣等伏願陛下奮乾剛之斷早罷安石重任以慰天下元元之心其曽公亮位居承弼被遇三朝自宜悉慮竭忠奮身許國而反有畏避安石之意隂自結援更相稱譽以固寵榮致安石奏對之際惟肆强辯多生横議豈執政大臣體采祖宗以來宰相故事若昭文在假集賢尚不敢専行聖㫖豈如今日安石作參知政事傲視同列旁若無人愛憎與奪一出於已敗壊中書故事皆公亮之罪也況公亮久妨賢路無補時政亦堪罷免趙抃則括囊拱手但務依違大臣事君固如是耶方今河北地震連年不已加之星文謫見天下水灾漂溺人民不可勝數變異之來無甚於此廟堂視之恬不為怪臣等但恐漸更多事使陛下不得安枕而卧皆大臣之罪也伏望陛下思宗社之長計措生靈於久安委任老成有徳之人踈逺迂濶生事之軰臣等不勝愛君憂國之至熈寧間管幹北京國子監王巖叟論王安石疏曰臣聞事之急者無徐行心之痛者無緩聲今天下事急而臣已痛矣尚忍徐行緩聲以忽君親之憂哉臣為此書唯恐人知臣不盜名今日之事惟恐君父不知臣不避禍使陛下自無心於生靈臣雖抱忠姑亦已矣盖潜聼天下深識之士相與而言曰夫畋逰之快心聲色之悦意浮華之玩情喜有溢賞怒有過刑雖古之歴嘗艱難而老於為國者之所難免而吾君以鼎盛之春秋臨無事之天下乃能不快心於畋逰不恱意於聲色不玩情於浮華賞不以喜刑不以怒憂勤恭儉惟以治道未舉於堯舜三代之隆為急此可謂盛徳矣然而有人焉有逆常理蠱壊萬事以蠧陛下盛徳而使四海内外不得覩日新之光輝而同登於堯舜三代之域此忠臣義士之所以撫膺而切齒也臣謹按王安石性非忠良心不造道徒能著空文而欺世談髙致以要君可謂借鳳羽翰以文梟音者矣人以為鳳臣以為梟天下皆知陛下所存則是求治之心而安石所為乃召亂之本陛下以腹心委安石而安石不以腹心事陛下自求死黨據滿要津司農曰布强悍而險刻中丞曰綰善柔而隂讒曰向剥下附上曰起狠深曰絳苛佞曰繹曰琥險回忮忌曰定曰秩藏奸包慝曰坰曰確狂誕輕狡曰子厚曰将阿䛕辨巧曰宦官昉暴横凶忍荼毒一方威焰所向人莫敢指曰惟恵卿奸邪之才又冠其黨雖持喪家居而中外畏之猶若在朝其下蜮狐山鬼夜號窟居以恐動人者處處皆是不足一一為陛下道也盖未嘗公心求一吉士以為朝廷故天下謂其不以腹心事陛下者非妄也陛下知以權與之而不知與之之過知以誠信之而不知信之之蔽與之過故難制信之蔽故易欺三四年來天下不知有朝廷而只知有安石福隨其喜禍逐其怒四方之人如喑如啞不敢吐氣以至青天白日舞奸攘權以斵王室而曽不畏人此臣所以不能徐行緩聲而告也臣知王室作之甚苦成之甚難陛下豈不為祖宗愛惜之而容它人壊之耶臣請為陛下疏其大者至於紛紛交舉以撓萬𩔖者未暇種種而數也夫王室之所以重者雖以人主之尊不敢以名噐輕授人也而今也塗巷之人朝逰私門則暮紆金朱矣取名噐於萬乗之旁而曽不少顧安石可謂陵王室矣王室之所以尊者以老成在側忠鯁在庭也而今也離間老成棄逐忠鯁獨為陛下引頑童進柔佞安石可謂卑王室矣王室之所以强者以綱紀振法度修賞罰正也而今也綱紀則亂之法度則毁之賞罰則倒之安石可謂弱王室矣王室之所以安者以能使百姓有餘力而樂其生也而今也斂於民者煩督於民者急奪於民者盡而人人救死恐不暇安石可謂危王室矣王室之所以明者以人情不壅於上聞而萬里兼聼也而今也朋邪壅之或近在輦轂之下國門之外而君父不知赤子嗷嗷控告無路安石可謂翳王室矣忠臣義士言之及此往往聲涙俱發臣知陛下方倚望太平必以臣言為非是然願陛下宻擇一二正人以它事使於四方使潛採公議及遴選一二親信訪於都城使盡録衆説則必有甚於臣所陳者矣臣猶恐未必敢以其實告陛下也其為忿嫉億兆所同惟陛下穆然凝邃獨不得聞臣毎思奉天之變盧把養成未嘗不為陛下寒心故人怨而不知天下之深忌也以危為安天下之深禍也惟陛下念之無忽臣嘗讀易至於孔子之雜卦曰親寡旅也不覺為君父掩書而泣夫惟天下之忠信為可親陛下試察今左右前後之臣皆忠信耶非耶為權臣用耶為陛下用耶彼其唯相用以逢迎陛下以窺伺陛下以蒙蔽陛下為權臣地爾而君父獨立於羣邪之中可謂所親者寡矣奈何以南面之尊天下之勢多士之盛而自謂旅人也陛下學備古今獨不見朱温之事乎先使昭宗孤然寄身於汴人之間而後為亂唯天下之至明為能見之於至㣲而破之於未大願陛下少囬天幾以照之社稷幸甚陛下若惓惓於其賢以為用之未盡則何不静心潛思自用之已來四年於今其益於陛下者何事成於天下者何功施於生民者何恵可垂後來者何法進於列位者何賢投於四荒者何佞陛下心通目明能不昭覺豈待臣一一指其人而條其事也意者陛下數年以來力排天下之議主張斯人而赧於卒不效不果去之耶此又臣以為固無傷陛下之明而適足示陛下之聖也前日聞天下譽之則用今日見天下怨之則舎是用以天下舎以天下也陛下何私哉不出反掌之間而取泰於否轉危為安聖人之能孰過此者陛下幸思臣言勿復以為疑且歴古以來賢王英主所與取天下守天下者莫非中原偉人今陛下坐中原不與中原端厚之士共之而獨引逺荒竒邪輕淺之人與議大計臣竊恐中原豪傑有侮笑陛下於林間者矣以陛下天資如此自勵又如此真得忠賢而用之堯舜三代不難到天下何時無真賢今日取之者非其道爾彼真賢不以辯給為能不以文采為髙不以聚斂為智獨能平心正意深思逺謀為社稷久計爾顧肯屑圗近利以誤蒼生哉然其人誰不欲為君父用者但恥其身出於權臣之門故逡廵晦縮而不肯進豈嘗須㬰忘陛下陛下曠然奮英斷自收主權誅大奸而竄羣惡以一清中外而下半紙詔書以謝天下曰聼任之偏大事㡬去天啟朕明洞掃疑蔽今願復與士民相親也則可以激忠義於已闌消禍灾於欲起堯舜之治咫尺在前可不為陛下賀也如不留意於斯焉後日之事臣不忍言矣惟陛下察之巖叟又請詔執政裁抑三省人吏儌倖疏曰臣伏以朝廷之弊莫甚於容儌倖以養蠧尚姑息以恵奸不治其源而立法於下流法愈煩而愈多非計之得也今天下皆曰儌倖之甚者莫如三省之胥吏嵗累優秩月享厚禄日給肉食春冬有衣寒暑有服出入乗官馬使令得營卒郊禮霑賜賚又許有服親入為吏如士大夫任子無以異而曽不限年得禄尤早其為恩幸可謂厚矣言其供職事則一月之間或僅踰兩旬一日之間常不滿半日其為勤勞可謂薄矣㸃檢諸司文字舛錯乃是職分當然何至字字論功日日計賞或升名次或減磨勘或添科錢或支銀絹以彼易此有如己物又毎遇朝廷舉動一事曽行過一紙文書則復妄叙勞能别希恩澤如近日二王出居外第省吏有何辛苦而亦要功以冒賞推此一端餘皆可見臣不知平居禄賜優厚将焉用之其為儌倖可謂甚矣此盖前來宰執以姑息相承養之至此賣朝廷之恩以買譽結左右之愛以固權何嘗以嚴謹紀綱為事澄清根本為心哉故議者以為廟堂之上為天下百姓理㑹弊事則少與省中吏人行遣濫恩則多静而察之非虚語也伏望聖慈特賜勅厲執政大臣裁抑儌倖以除蠧杜絶姑息以戢奸棄近例禁換法復講治平以前條格循用之庻可以肅百司而正四方熈寕中唐坰除太子中允數月将用為諫官安石疑其輕脱将背已立名不除職以本官同知諫院非故事也坰果怒安石易已凡奏二十疏論時事皆留中不出乃因百官起居日扣陛請對上令諭以它日坰伏地不起遂召升殿坰至御坐前進曰臣所言皆大臣不法請對陛下一一陳之乃搢笏展疏目安石曰王安石近御坐聴劄子安石遲遲坰訶曰陛下前猶敢如此在外可知安石竦然而進坰大聲宣讀凡六十條大畧以安石専作威福曽布等表裏擅權天下但知憚安石威權不復知有陛下文彦博馮京知而不敢言王珪曲事安石無異廝僕且讀且目珪珪慚懼俛首元絳薛向陳繹安石頥指氣使無異家奴張琥李定為安石爪牙臺官張商英乃安石鷹犬逆意者雖賢為不肖附己者雖不肖為賢至詆為李林甫盧把上屢止之坰慷慨自若畧不退懾讀已下殿再拜而退侍臣衞士相顧失色安石為之請去閤門糾其凟亂朝儀貶潮州别駕龍圖閣直學士韓維上奏曰右臣竊聞御史中丞王陶等言宰相跋扈及除用不當昨日傳聞罷陶中丞還舊職事續乂聞除翰林學士今早又聞參知政事呉奎待罪臺諫官請對論事相繼不絶中外喧𫝊憂疑震駭而風霾日興旱暵滋甚濫炎數發寒燠不常天人之情可謂至不和矣臣伏思天下所以君君臣臣父父子子而莫敢亂者以義理存也義理者非它是是而非非也人君者明義理别是非以治天下者也宰相天子所信任御史中丞天子所咨決今御史中丞言宰相跋扈即有是事則是王法之所誅也陛下若以御史中丞言為信則宰相安得不罪若其不然則是御史中丞搆造邪説離間陛下君臣其罪豈止罷去而已若又除翰林學士是遷之也陛下既不能明辨大臣示信任不疑之意以盡其心又使言者無名罷去疑惑逺方謂陛下不能納諫頻黜憲官臣雖忝備近侍尚不知陛下之罷王陶所言為是耶為非耶若以為是則陶乃稱職不可輕罷若其非也豈當更遷其官此臣不得不惑也臣且惑之欲令四方不疑難矣兩朝顧命大臣陛下不能主張辨明使負惡名有不自安之意則其下者豈肯為陛下盡心中丞在天子左右言之是非陛下不能裁察則逺者豈肯為陛下盡言陛下即位之初将收天下之心盡衆人之言别白邪正協和上下以舉大治而今者是非雜揉賢不肖淆亂羣情暌乖日益偷惰人事尚且如此望欲天道之順序豈不甚難哉臣願陛下廷對羣臣面問宰相跋扈之状及御史中丞所言如何使是非一判邪正兩辨然後斷自宸慮大行顯黜以開天下之耳目此事若不明辨臣恐朝廷刑政自此衰敝不復振矣若臣所言幸䝉施用則事辨之後乞罷臣職任授一小州或留臺閒官以明臣一心為陛下忠計非有愛憎向背於其間也臣竊聞衆人憚陶及以用附大臣為嫌莫肯正言臣幸得以宮府舊寮蒙被知遇不敢愛身以廢公議惟陛下特留聖意干冒宸嚴臣無任戰汗隕越忠憤之至謹具状奏聞歴代名臣奏議卷一百七十六
