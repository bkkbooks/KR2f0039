body:
  text: 歷代名臣奏議卷一百十三明楊士竒等撰學校漢武帝時公孫𢎞為學官悼道之鬱滯與太常博士孔臧等上議曰臣聞三代之道鄉里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其徵惡也加之刑罰故教化之行也建首善自京師始繇內及外今陛下昭至德開大明配天地本人倫勸學興禮崇化勵賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者常與計偕詣太常得受業如弟子一嵗皆輒課能通一藝以上補文學掌故缺其髙第可以為郎中太常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一藝輒罷之而請諸能稱者臣謹按詔書律令下者明天人分際通古今之誼文章爾雅訓辭深厚恩施甚美小吏淺聞弗能究宣亡以明布諭下以治禮掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一藝以上補左右內史大行卒史比百石以下補郡太守卒史皆各二人邉郡一人先用誦多者不足擇掌故以補中二千石屬文學掌故補郡屬備貟請著功令他如律令制曰可自此以來公卿大夫士吏彬彬多文學之士矣東漢光武建武七年太僕朱浮以國學既興宜廣博士之選上書曰夫太學者禮義之宫教化所由興也陛下尊敬先聖垂意古典宫室未飾干戈未休而先建太學造立黌舍比日車駕親臨觀饗將以𢎞時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博舉明經唯賢是登學者精勵逺近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之密邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其真非有期㑹不及逺方也又諸所徵試皆私自發遣非有傷費頻擾於事也語曰中國失禮求之於野臣浮幸得與講圖䜟故敢越職帝然之魏齊王正始中廣陸亭侯劉馥上疏陳儒訓之本曰夫學者治亂之軌儀聖人之大教也自黃初以來崇立太學二十餘年而寡有成者蓋由博士選輕諸生避役髙門子弟耻非其倫故無學者雖有其名而無其人雖設其教而無其功宜髙選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制絀陟榮辱之路其經明行修者則進之以崇德荒教廢業者則退之以懲惡舉善而教不能則勸浮華交遊不禁自息矣闡𢎞大化以綏未賔六合承風逺人來格此誠聖人之教致治之本也東晋元帝初即位軍旅不息學校不修散騎常侍王導上書曰夫風化之本在於正人倫人倫之正存乎設庠序庠序設五教明德禮洽通彛倫攸叙而有耻且格父子兄弟夫婦長幼之序順而君臣之義固矣易所謂正家而天下定者也故聖王䝉以養正少而教之使化霑肌骨習以成性遷善逺罪而不自知行成德立然後裁之以位雖王之世子猶與國子齒使知道而後貴其取才用士咸先本之於學故周禮鄉大夫獻賢能之書于王王拜而受之所以尊道而貴士也人知士之貴由道存則退而修其身以及家正其家以及鄉學於鄉以登朝反本復始各求諸已敦朴之業著浮僞之競息教使然也故以之事君則忠用之蒞下則仁孟軻所謂未有仁而遺其親義而後其君者也自頃皇綱失統頌聲不興于今將二紀矣傳曰三年不為禮禮必壞三年不為樂樂必崩而况如此之久乎先進忘揖讓之容後生惟金鼓是聞干戈日尋俎豆不設先王之道彌逺華僞之俗遂滋非所以端本清源之謂也陛下以命世之資屬陽九之運禮樂征伐翼成中興誠宜經綸稽古建明學業以訓後生漸之教義使文武之道墜而復興俎豆之儀幽而更彰方今戎虜扇熾國耻未雪忠臣義夫所以扼腕拊心茍禮儀膠固淳風漸著則化之所感者深而德之所被者大使帝典闕而復補皇綱弛而更張獸心革面叨餮檢情揖讓而服四夷緩帶而天下從得乎其道豈難也哉故有虞舞干戚而化三苖魯僖作泮宫而服淮夷桓文之霸皆先教而後戰今若幸遵前典興復道教擇朝之子弟並入于學選明博習禮之士而為之師化成俗定莫尚於斯帝深納之建武元年博士太常荀嵩上疏曰臣聞孔子有云才難不其然乎自喪亂以來經學尤寡儒有席上之珍然後能𢎞明道訓今處學則闕朝廷之秀仕朝則廢儒學之美昔咸寧太康元康永嘉之中侍中常侍黃門之深博道奧通洽古今行為世表者領國子博士一則應對殿堂奉酬顧問二則參訓門子以𢎞儒學三則祠儀二曹及太常之職以得藉用質疑今皇朝中興美隆往初宜憲章令軌祖述前典世祖武皇帝聖德欽明應運登禪受終于魏崇儒興學治致升平經始明堂營建辟雍告朔班政鄉飲大射西閣東序圖書禁籍臺省有宗廟太府金墉故事太學有石經古文先儒典訓賈馬鄭杜服孔王何顔尹之徒章句傳注衆家之學置博士十九人九州之中師徒相傳學士如林猶是選張華劉實居太常之官以重儒教傳稱孔子沒而微言絶七十子終而大義乖自頃中夏殄瘁講誦遏密斯文之道將墜于地陛下聖哲龍飛闡𢎞祖烈申命儒術恢崇道教樂正雅頌於是乎在江揚二州先漸聲教學士遺文於今為盛然方之疇昔猶千之一也臣學不章句才不𢎞道階緣光寵遂忝非服方之華實儒風邈逺思竭駑駘庶增萬分願斯道隆於百代之上搢紳詠於千載之下伏聞節省之制皆三分置二博士舊貟十有九人今五經合九人準古計今猶未中半今九以外猶宜增四願陛下萬機餘暇時垂省覽周易一經有鄭𤣥注其書根源誠可深惜宜為鄭易博士一人儀禮一經所謂曲禮鄭𤣥於禮特明皆有證據宜置鄭儀禮博士一人春秋公羊其書精隱明於斷獄宜置博士一人榖梁簡約隱要宜存於世置博士一人昔周之衰下陵上替臣弒其君子弒其父上無天子下無方伯善者誰賞惡者誰罰綱紀亂矣孔子懼而作春秋諸侯諱妒懼犯時禁是以微辭妙㫖義不顯明故曰知我者其唯春秋罪我者其唯春秋時左丘明子夏造䣛親受無不精究孔子既沒微言將絶於是丘明退撰所聞而為之傳其書善禮多膏腴美辭張本繼末以發明經意信多竒偉學者好之儒者稱公羊髙親受子夏立於漢朝辭義清俊斷決明審多可採用董仲舒之所善也榖梁亦師徒相傳暫立於漢時劉向父子漢之名儒猶執一家莫肻相從其書文清約諸所發明或是左氏公羊所不載亦足有所訂正是以三傳並行於先代通才未能廢今去聖久逺斯文將墜與其過廢寧過而立也臣以為三傳雖同一春秋而發端異趣案如三家異同之說義則戰爭之場辭亦劒㦸之鋒於理不可得共博士宜各置一人以傳其學後軍將軍應詹上疏曰性相近習相遠訓導之風宜慎所好魏正始之間蔚為文林元康以來賤經尚道以𤣥虛宏放為夷逹以儒術清儉為鄙俗永嘉之弊未必不由此也今雖有儒官教養未備非所以長育人材納之軌物也宜修辟雍崇明教義先令國子受訓然後皇儲親臨釋奠則普天尚德率土知方矣元帝雅重其才深納之散騎常侍戴邈上疏曰臣聞天道之所運莫大於隂陽帝王之至務莫重於禮學是以古之建國教學為先國有明堂辟雍之制鄉有庠序黌校之儀皆所以抽導幽滯啓廣才思蓋以六四有困䝉之吝君子大養正之功也昔仲尼列國之大夫耳興禮修學於洙泗之間四方髦俊斐然向風受業身通者七十餘人自兹以來千載寂寞豈天下小於魯國賢哲乏於曩時厲與不厲故也自頃遭無妄之禍社稷有綴旒之危寇羯飲馬於長江凶狡虎步於萬里遂使神州蕭條鞠為茂草四海之內人迹不交霸主有旰食之憂黎民懷荼毒之痛戎首交拜於中原何遽籩豆之事哉然三年不為禮禮必壞三年不為樂樂必崩况曠載纍紀如此之久邪今末進後生目不覩揖讓升降之禮耳不聞鐘鼓管絃之音文章散滅胡馬之足圖䜟無復孑遺於世此蓋聖逹之所深悼有識之所咨嗟也夫治世尚文遭亂尚武文武迭用久長之道譬之天地昏明之術自古以來未有不由之者也今以天下未一非興禮學之時此言似是而非夫儒道深奧不可倉卒而成古之俊乂必三年而通一經比須寇賊敉寧天下平泰然後修之則功成事定誰與制禮作樂者哉又貴逰之子未必有斬將搴旗之才亦未有從軍征戍之役不及盛年講肄道義使明珠加瑩磨之功荆隨發采瑑之美不亦良乎愚以世喪道久民情玩於所習純風日去華競日彰猶火之消膏而莫之覺也今天地造始萬物權輿聖朝以神武之德值革命之運蕩近世之流弊繼千載之絶軌篤道崇儒創立大業明主唱之於上宰輔篤之於下夫上之所好下必有過之者焉是故雙劒之節崇而飛白之俗成挾琴之容飾而赴曲之和作君子之德風小人之德草實在所以感之而已臣以暗淺不能逺識格言謂宜以三時之隟漸就經始成帝咸康三年國子祭酒袁瓌上疏曰臣聞先王之教也崇典訓明禮學以示後生道萬物之性暢為善之道也宗周既興文史載煥端委治於南蠻頌聲逸於四海故延州入聘聞雅音而咨嗟韓起適魯觀易象而歎息何者立人之道於此為首也孔子恂恂道化洙泗孟軻皇皇誨誘無倦是以仁義之聲于今猶存禮讓之風千載未泯疇昔陵替喪亂屢臻儒林之教暫頽庠序之禮有闕國學索然墳卷莫啓有心之徒抱志無由昔魏武身親介胄務在武功猶尚息鞍披覽投戈吟詠以為世之所須者治之本宜崇况今陛下以聖明臨朝百官以䖍恭蒞事朝野無虞江外靜謐如之何泱泱之風漠焉無聞洋洋之美墜於聖世乎古人有言詩書義之府禮樂德之則實宜留心經籍闡明學義使諷頌之音盈於京室味道之賢是則是詠豈不盛哉疏奏帝有感焉孝武帝太元元年尚書謝石上奏曰立人之道曰仁與義翼善輔性唯禮與學雖理出自然必須誘導故洙泗闡𢎞道之風詩書垂軌教之典敦詩說禮王化以斯而隆甄陶九流群生於是乎穆世不常治道亦時亡光武投戈而習誦魏武息馬以修學懼墜斯文若此之至也大晉受命值世多阻雖聖化日融而王道未備庠序之業或廢或興遂令陶鑄闕日用之功民性靡素絲之益亹亹𤣥緒翳焉莫抽臣所以逺尋伏念寤寐永歎者也今皇威遐震戎車方靜將灑𤣥風於四區導斯民於至德豈可不𢎞敷禮樂使煥乎可觀請興復國學以訓胄子班下州郡普修鄉校雕琢琳琅和寶必至大啓群䝉茂兹成德匪懈于事必由之以通則人競其業道隆學備矣帝納其言孝武帝時選公卿二千石子弟為學生增造廟屋一百五十五間而品課無章士君子耻與其列國子祭酒殷茂上言曰臣聞𢎞化正俗存乎禮教輔性成德必資於學先王所以陶鑄天下津梁萬物間邪納善潜被於日用者也故能疏通𤣥理窮綜幽微一貫古今彌綸治化且夫子稱回以好學為本七十希仰以善誘歸宗雅頌之音流詠千載聖賢之淵範哲王所同風自大晋中興肇基江左崇明學校修建庠序公卿子弟並入國學尋值多故訓業不終陛下以聖德𤣥一思隆前美順通居方導逹物性興復儒肆僉與後生自學建彌年而功無可名憚業避役就存者無幾或假託親疾真僞難知聲實渾亂莫此之甚臣聞舊制國子生皆冠族華胄比列皇儲而中者混雜蘭艾遂令人情耻之子貢去告朔之餼羊仲尼猶愛其禮况名實兼喪面墻一世者乎若以當今急病未皇斯典權宜停廢者别一理也若其不然宜依舊準竊謂羣臣內外清官子姪普應入學制以程課今者見生或年在扞格方圎殊趣宜聼其去就各從所安所上謬論乞付外參議帝既下詔褒納又不施行朝廷及草萊之人有志於學者莫不發憤歎息清河人李遼上奏曰臣聞教者治化之本人倫之始所以誘逹群方進德興仁譬諸土石陶冶成器雖復百王殊禮質文參差至於斯道其用不爽自中華湮沒闕里荒毁先王之澤寢聖賢之風絶自此迄今將及百年造化有靈否終以泰河濟平徙海岱清通黎庶䝉蘇鳬藻奮化而典訓弗敷雅頌寂蔑久凋之俗大弊未改非演迪斯文緝熙宏猷將何以光贊時雍克隆盛化哉事有如賖而急實此之謂也亡父先臣回綏集邦邑歸誠本朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頓軌式頽弛萬世宗匠忽焉淪廢仰瞻俯慨不覺涕流既逹京輦表求興復聖祀修建講學至十四年十一月十七日奉被明詔采臣鄙議敕下兖州魯郡準舊營飾故尚書令謝石令臣所須列上又出家布薄助興立故鎮北將軍譙王恬版臣行北魯縣令賜許供遣二臣薨徂成規不遂陛下體唐堯文思之美訪宣尼善誘之勤矜荒餘之凋昧愍聲教之未浹愚謂可重符兖州刺史遂成舊廟蠲復數户以供掃灑井賜給六經講立庠序延請宿學廣集後進使油然入道發剖琢之功運仁義以征伐敷道德以服逺何招而不懷何柔而不從所為者微所𢎞甚大臣自致身輦轂于今八稔違親轉積夙夜匪寧振武將軍何淡之今震扞三齊臣當隨反裴回天邑感戀罔極乞臣表付外參議宋武帝受命明年議建國學以范泰領國子祭酒泰上表曰臣聞風化興於哲王教訓表之聖世至說莫先講習甚樂必寄朋來古人成童入學易子而教尋師無逺負糧忌艱安親光國莫不由此若能出不由户則斯道莫徔是以明詔爰發已成渙汗學制既下逺近遵承臣之愚懷少有未逹今惟新告始盛業初基天下改觀有志景慕而置生之制取少停多開不來之端非一塗而已臣以家推國則知所聚不多恐不足以宣大宋之風𢎞濟濟之美臣謂合選之家雖制所未逹父兄欲其入學理合開通雖小違晨昏所以大𢎞孝道不知春秋則所陷或大故趙盾忠而書弒許止孝而得罪以斯為戒可不懼哉十五志學誠有其文若季降無幾而深有志尚者何必限以一格而不許其進邪楊烏豫𤣥實在弱齒五十學易乃無大過昔中朝助教亦用二品潁川陳載已辟太保掾而國子取為助教即太尉淮之弟所貴在於得才無繫於定品教學不明奬勵不著今有職間而學優者可以本官領之門地二品宜以朝請領助教既可以甄其名品斯亦敦學之一隅其二品才堪自依舊從事㑹今生到有期而學校未立覆簣實望其速回轍已淹其遲事有似賖而宜急者殆此之謂古人重寸隂而賤尺璧其道然也時學竟不立齊武帝永明三年春詔立學創立堂宇召公卿子弟及貟外郎之𦙍凡置生二百人其年秋中悉集有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器尚書令王儉上議曰周禮春入學舍菜合舞記云始教皮辨祭菜示敬道也又云始入學必祭先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石俎豆皆無明文方之七廟則輕比之五禮則重陸納車𦙍謂宣尼廟宜依亭侯之爵范寧欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂此則車陸失於過輕二范傷於大重喻希云若至王者自設禮樂則肆賞於至敬之所若欲嘉美先師則所況非備尋其此說守附情理皇朝屈尊𢎞教待以師資引同上公即事惟允元嘉立學裴松之議應舞六佾以郊樂未具故權奏登歌今金石已備宜設軒縣之樂六佾之舞牲牢器用悉依上公其冬皇大子講孝經親臨釋奠車駕幸聽明帝建武四年春詔立學永泰元年東昏侯即位時依永明舊事廢學領國子助教曹思文上奏曰古之建國君民者必教學為先將以節其邪情而禁其流欲故能化民裁俗習與性成也是以忠孝篤焉信義成焉禮讓行焉尊教宗學其致一也是以成均煥於古典虎門炳於前經陛下體睿淳神纘承鴻業今制書既下而廢學先聞將恐觀國之光者有以擬議也若以國諱故宜廢昔漢成立學爰洎元始百餘年中未嘗暫廢其間有國諱也且晋武之崩又其學猶存斯皆先代不以國諱而廢學之明文也永明以無太子故廢斯非古典也尋國之有學本以興化致治也天子於以咨謀焉於以行禮焉記云天子出征受命於祖受成於學執有罪反釋奠於學又云食三老五更於太學天子袒而割牲執爵而酳以教諸侯悌也於斯學是天子有國之基教也或以之所言皆太學事也今引太學不非證也據臣所見今之國學即古之太學晋初太學生二千人既多猥雜惠帝時欲辨其涇渭故元康三年始立國子學官品第五以上得入國學天子去太學入國學以行禮也太子去太學入國學以齒讓也太學之與國學斯是晋世殊其士庶異其貴賤耳然貴賤士庶皆須教成故國學太學兩存之也非有太子故立也然繫廢興於太子者此永明之巨失也漢崇儒雅幾致刑措而猶道謝三五者以其致教之術未篤也古之教者家有孰黨有庠術有序國有學以諷誦相摩今學非唯不宜廢而已乃宜更崇向其道望古作規使郡縣有學鄉閭立教請付尚書及二學詳議有司奏從之後魏獻文帝時中書令髙允上奏曰臣聞經綸大業必以教飬為先咸秩九疇亦由文德成務故辟雍光於周詩泮宫顯於魯頌自永嘉以來舊章殄滅鄉閭蕪沒雅頌之聲京邑杜絶釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡素風方事尚殷弗遑克復陛下欽明文思纂成洪烈萬國咸寧百揆時叙申祖宗之遺志興周禮之絶業爰發德音惟新文教搢紳欣慶莫不幸甚臣承㫖敕並集二省披覽史籍備究典紀靡不敦儒以勸其業貴學以篤其道伏思明詔𤣥同古義宜如聖㫖崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人其博士取博關經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上若道業夙成才任教授不拘年齒學生取郡中清望人行修謹堪循名教者先盡髙門次及中第帝從之郡國立學自此始也時相州刺史李欣上疏求立學校曰臣聞至治之隆非文德無以經綸王道太平之美非良才無以光贊皇化是以昔之明主建庠序於京畿立學官於郡邑教國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五九服之民咸仰德化而所在州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童幼覩經教之本臣昔䝉恩寵長管中祕時課修學有成立之人髦俊之士已䝉進用臣今重荷榮遇顯任方嶽思闡帝猷光宣於外自到以來訪諸文學舊德已老後生未進嵗首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典於州郡治所各立學官使士望之流冠冕之胄就而受業庶必有成其經藝通明者貢之王府則郁郁之文於是不墜書奏帝從之孝文帝時國子祭酒鄭道昭上奏曰臣竊以為崇治之必也須才養才之要莫先於學今國子學堂房粗置絃誦闕爾城南大學漢魏石經丘墟殘毁藜藋蕪穢逰兒牧豎為之歎息有情之輩實亦悼心况臣親司而不言露伏願天慈回神紆眄賜垂鑒察若臣微意萬一合允求重敕尚書門下考論營制之模則五雍可翹立而興毁銘可不日而就樹舊經於帝京播茂範於不朽斯有天下者之美業也帝不從道昭為州都又上奏曰臣聞唐虞啓運以文德為本殷周致治以道藝為先然則禮樂者為國之基不可斯須廢也是故周敷文教四海宅心魯秉周禮彊齊歸義及至戰國紛紜干戈遞用五籍灰焚羣儒坑殄賊仁義之經貴戰爭之術遂使天下分崩黔黎荼炭數十年間民無聊生者斯之由矣爰暨漢祖於行陳之中尚優引叔孫通等光武中興於撥亂之際乃使鄭衆范升校書東觀降逮魏晋何嘗不殷勤於篇籍篤學於戎伍伏惟大魏之興雖羣凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義於八荒布盛德於萬國教靡不懷風無不偃今者乘休平之基開無疆之祚定鼎伊瀍惟新寶歷九服感至德之和四垠懷擊壤之慶而蠢爾閩吳阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命御史中尉臣李彪興吏部尚書任城王澄等妙選英儒以崇文教澄等依㫖置四門博士四十人其國子博士太學博士及國子助教宿已簡置伏尋先㫖意在速就但軍國多事未遑營立自爾迄今垂將一紀學官凋落四術寢廢遂使碩儒耆德卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思𤣥鑒洞逺越㑹未欵務修道以來之遐方後服敷文教而懷之垂心經素優柔墳籍將使化越軒唐德隆虞夏是故屢發中旨敦營學館房宇既修生徒未立臣學陋全經識蔽篆素然往年刪定律令謬預議筵謹依準前修尋訪舊事參定學令事訖封呈自爾迄今未䝉報判但廢學歷年經術淹滯請學令并制早敕施行使選授有依生徒可準帝詔曰具卿崇儒敦學之意良不可言新令尋班施行無逺可謂職思其憂無曠官矣道昭復奏曰竊惟鼎遷中縣年將一紀縉紳禠業俎豆闕聞遂使濟濟明朝無觀風之美非所以光國宣風納民軌義臣自往年以來頻請學令並置生員前後纍上未䝉一報故當以臣識淺濫官無能有所感悟者也館宇既修生房粗構博士見員足可講習雖新令未班請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出不報宣武帝時侍中祭酒劉芳上奏曰夫為國家者罔不崇儒尊道學斆為先誠復政有質文兹範不易諒由萬端資始衆務禀法故也唐虞已往典籍無據隆周以降住居虎門周禮大司徒云師氏掌以媺詔王居虎門之左司王朝掌國中失之事以教國子弟蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏洛陽記國子學官與天子對太學在開陽門外案學記云古之王者建國親民教學為先鄭氏注云內則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在內太學在外明矣案如洛陽記猶有仿像臣愚謂今既徙縣嵩瀍皇居伊洛宫闕府寺僉復故址至於國學豈可舛替校量舊事應在宫門之左至如太學基所炳在仍舊營構又去太和二十年發敕立四門博士於四門置學臣案自周已上學惟以二或尚西或尚東或貴在國或貴在郊爰暨周室學蓋有六師氏居內太學在國四小在郊禮記云周人養庶老於虞庠虞庠在國之西郊禮又云天子設學當入學而太子齒注云四學周四郊之虞庠也按大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴德帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰案鄭注學記周則六學所以然者注云內則設師保以教使國子學焉外則有太學庠序之官此其證也漢魏已降無復四郊謹尋先旨宜在四門案王肅注云天子四郊有學去王都五十里考之鄭氏不云逺近今太學故坊基址寬曠四郊别置相去遼闊檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時制置多循中代未審四學應從古不求集名儒禮官議其定所帝從之常山侯拓跋英奏曰謹按學令諸州郡學生三年一校所通經數因正使列之然後遣使就郡練考臣伏惟聖明崇道顯成均之風藴莪光膠序之美是以太學之館久置於下國四門之教方搆於京鄽計習訓淹年聽受纍紀然雋造之流應聞於魏闕不革之輩宜返於齊民使就郡練考核其最殿頃以皇都遷構江揚未一故鄉校之訓弗遑正試致使薰蕕之質均誨學庭蘭蕭之體等教文肆今外宰京官銓考向訖所遣四門博士明通五經者道别校練依令黜陟孝明帝時明堂辟雍並未建就起部郎源恭上書曰臣聞辟臺望氣軌物之德既髙方堂布政範世之道斯逺是以書契之重理冠於造化推尊之美事絶於生民至如郊天饗帝蓋以對越上靈宗祀配天是用酬膺下土大孝莫之能加嚴父以兹為大乃皇王之休業有國之盛典竊惟皇魏居震統極揔宙馭宇革制土中垂式無外自此徂南同卜維於洛食定鼎遷民均氣候於寒暑髙祖所以始基世宗於是恢構按功成作樂治定制禮乃訪遺文修廢典建明堂立學校興一代之茂矩標千載之英規永平之中始創雉構基址草昧迄無成功故尚書令任城王臣澄按故司空臣沖所造明堂樣并連表詔答兩京模式奏求營起緣期發㫖即加葺繕侍中領軍臣乂物動作官宣贊授令自兹厥後方配兵人或給一千或與數百進退節縮曽無定準欲望速了理在難克若使專役此功長得營造委成責辦容有就期但所給之夫本自寡少諸處競借動即千計雖有繕作之名終無就功之實爽塏荒茫淹積年載結架崇構指就無兆仍令肄胄之禮掩抑而不進養老之儀寂寥而不返構廈止於尺土為山頓於一簣良可惜歟愚謂召民經始必有子來之歌興造勿亟將致不日之美況本兵不多兼之牽役廢此與彼循環無極便是輟創禮之重資不急之費廢經國之功供寺館之役求之逺圖不亦闕矣今府寺大作稍以粗舉並可徹減專事經綜嚴勒工匠務令克成使祖宗有薦配之期蒼生覩禮樂之富書奏帝從之冀州刺史李崇上表曰臣聞世室明堂顯於周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黃髮以詢格言育青襟而敷典式用能享國久長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰暨亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分崩祚終二世炎漢勃興更修儒術文景已降禮樂復彰化致升平治幾刑措故西京有六學之美東都有三本之盛莫不紛綸掩藹響流無已逮自魏晋撥亂相因兵革之中學校不絶遺文燦然方軌前代仰惟髙祖孝文皇帝禀聖自天道鏡今古徙馭嵩河光宅函洛模唐虞以革軌儀規周漢以新品制列教序於鄉黨敦詩書於郡國使揖讓之禮橫被於﨑嶇歌詠之音聲溢於仄陋但經始事殷戎軒屢駕未遑多就弓劒弗追世宗統歷聿遵先緒永平之中大興板築續以水旱戎馬生郊雖逮為山還停一簣竊惟皇遷中縣垂二十祀而明堂禮樂之本乃鬱荆棘之林膠序德義之基空盈牧豎之跡城隍嚴固之重闕瑼石之工墉堞顯望之要少樓榭之飾加以風雨稍侵漸致虧墜又府寺初營頗亦壯美然一造至今更不修繕廳宇凋朽墻垣頽壞皆非所謂追隆堂構儀形萬國者也伏聞朝議以髙祖大造區夏道侔姬文擬祀明堂式配上帝今若基宇不修仍同丘畎即使髙皇神享闕於國陽宗事之典有聲無實此臣子所以匪寧億兆所以失望也臣又聞官方授能所以任事事既任矣酬之以祿如此上無曠官之譏下絶尸素之謗今國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍陳禮樂以風化天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至於禮樂則曰未敢是則敢於殺人不敢於養人也臣以為當今四海清平九服寧晏經國要重理應先營脫復稽延則劉向之言徴矣但事不兩興須有進退以臣愚量宜罷尚方雕靡之作頗省永寧土木之功并減瑶光材瓦之力兼分石窟鐫琢之勞及諸事役非急者三時農隙修此數條使辟雍之禮而復興諷誦之音煥然而更作美榭髙墉嚴壯於外槐宫棘宇顯麗於中道發明令重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序遊夏可致之於下國豈不休歟誠知佛理淵妙含識所宗然比之治要容可小緩茍使魏道熙緝元首唯康爾乃經營未為晚也靈太后令曰省表具悉體國之誠配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧年和歲稔當敕有司别議經始廢帝時膠序廢替名教陵遲侍中羊深上疏曰臣聞崇禮建學列代之所修尊經重道百王所不易是以均孰洞啓昭明之頌載揚膠序大闢都穆之詠斯顯伏惟大魏乘乾統物欽若奉時模唐軌虞率由前訓重以髙祖繼聖垂衣儒風載蔚得才之盛如彼薪槱固以追隆周而並驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自兹已降世極道消風猷稍逺澆薄方競退讓寂寥馳競靡節進必吏能升非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之為本所貴得賢茍值其人豈拘常檢三代兩漢異世間出或釋褐中林欎登卿尹或投竿釣渚徑升公相事炳丹青義在往䇿彼哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠時盛德見徴不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮宫頌聲爰發鄭廢學校國風以譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳俎豆斯闕四海荒涼民物凋弊名教頓虧風流殆盡世之陵夷可為歎息陛下中興纂歷理運惟新方隅稍康實惟文德但禮賢崇讓之科㳂世未備還淳反朴之化起言斯繆夫先黃老而退六經史遷終其成蠧貴𤣥虛而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼確論造次必儒臣愚以為宜重修國學廣延胄子使函丈之教日聞釋奠之禮不闕并詔天下郡國興立儒教考課之程咸依舊典茍經明行修宜擢以不次抑斗筲喋喋之才進大雅汪汪之德博收鴻生以光顧問縶維竒異共精得失使區寰之內競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠暗短敢慕前訓用稽古義上塵聽覽伏願陛下垂就日之監齊非煙之化儻以臣言可採乞特施行帝善之隋文帝時潞州刺史柳昴見天下無事可以勸學行禮因上疏曰臣聞帝王受命建學制禮故能移既往之風成惟新之俗自魏道將謝分割九區關右山東久為戰國各逞權詐俱殉干戈賦役繁重刑政嚴急蓋救焚拯溺無暇從容非朝野之願以致於此晚世因循遂成希慕俗化澆弊流宕忘反自非天然上哲挺生於時則儒雅之道經禮之制衣冠民庶莫肯用心世事所以未清軌物由兹而壞伏惟陛下禀靈上帝受命昊天合三陽之期膺千祀之運往者周室頽毀區宇沸騰聖䇿風行神謀電發端坐廊廟蕩滌萬方俯順幽明君臨四海擇萬古之典無善不為改百王之弊無惡不盡至若因情緣義為其節文故以三百三千事髙前代然下土黎獻尚未盡行臣謬䝉奬䇿從政藩部人庶軌儀實見多闕儒風以墜禮教猶微是知百姓之心未能頓變仰惟深思逺慮情念下民漸彼以儉使至於道臣恐業淹事緩動延年世若行禮勸學道教相催必當靡然向風不遠而就家知禮節人識義方比屋可封輒謂非逺上覽而善之因下詔曰建國重道莫先於學尊主庇民莫先於禮自魏氏不競周齊抗衡分四海之民鬪二邦之力遞為强弱多歷年所務權詐而薄儒雅重干戈而輕爼豆民不見德惟爭是聞朝野以機巧為師文吏用深刻為法風澆俗弊化之然也雖復建立庠序兼啓黌孰業非時貴道亦不行其間服膺儒術蓋有之矣彼衆我寡未能移俗然其維持名教奬飾彛倫微相𢎞益賴斯而已王者承天休咎隨化有禮則祥瑞必降無禮則妖孽興起人禀五常性靈不一有禮則隂陽合德無禮則禽獸其心治國立身非禮不可朕受命於天財成萬物去華夷之亂求風化之宜戒奢崇儉率先百辟輕徭薄賦冀以寬𢎞而積習生常未能懲革閭閻士庶吉凶之禮動悉乖方不依制度執憲之職似塞耳而無聞蒞民之官猶蔽目而不察宣揚朝化其若是乎古人之學且耕且養今者民丁非役之日農畝時候之餘若敦以學業勸以經禮自可家慕大道人希至德豈止知禮節識廉耻父慈子孝兄恭弟順者乎始自京師爰及州郡宜祗朕意勸學行禮自是天下州縣皆置博士習禮焉唐武后時麟臺正字陳子昂上言曰陛下方興大化而太學久廢堂皇埃蕪詩書不聞明詔尚未及之愚臣以私恨也太學者政教之地也君臣上下之取則也爼豆揖讓之所興也天子於此得賢臣焉今委而不論雖欲睦人倫興治綱失之本而求之末不可得也君子三年不為禮禮必壞三年不為樂樂必崩奈何為天下而輕禮樂哉願引胄子使歸太學國家之大務不可廢已鳯閣舍人韋嗣立上疏曰臣伏聞古先哲王立學官所以掌教國子以六德六行六藝三教備而人道畢矣禮記曰化民成俗必由學乎學之於人其用蓋博故立大學以教於國設小學以化於邑王之諸子卿大夫士之子及國之俊選皆造焉八歲入小學十五入大學春秋教以禮樂冬夏教以詩書是以教洽而化流行成而不悖故自天子至於庶人未有不因學而成者也國家自永淳以來二十載餘國學廢散胄子衰缺時輕儒學之官莫存章句之選貴門後進競以僥幸升班寒族常流復因陵替弛業考試之際秀茂罕登驅之臨人何以從政又垂拱之後文明在辰盛典鴻休日書月至因藉際會入仕尤多加以讒邪凶黨來俊臣之屬妄執威權恣行枉酷陷正直之伍死亡為憂道路以目人無固志罕有執不撓之懷徇至公之節偷安苟免聊以卒嵗遂使綱領不振請託公行選舉之曹彌長踰濫隨班少經術之士攝職多庸瑣之才徒以猛暴相誇罕能清惠自朂使海內黔首騷然不安賴陛下憂勞頻有處分然革弊斯近此風尚餘州縣官僚貪鄙未息而望事必循理致俗康寧求之於今不可得也陛下誠能下明制發德音廣開庠序大敦學校三館生徒即令追集王公以下子弟不容别求仕進皆入國學服膺典訓崇飾館廟尊尚師儒盛陳奠菜之儀宏敷講說之㑹使士庶觀聽有所發揚𢎞奬道德於是乎在則四海之內靡然向風延頸舉足咸知所向然後審持衡鏡妙擇良能以之臨人寄之調俗則官無侵暴之政人有安樂之心居人則相與樂業百姓則皆戀桑梓豈復憂其逃散而貧窶哉今天下戶口亡逃過半租調減耗國用不足治人之急尤切於兹故知務學之源豈惟潤身進德而已將以安人利國安可不務之哉𤣥宗時國子祭酒楊瑒上言曰古者卿大夫子弟及諸侯嵗貢小學之異者入太學漸漬禮樂知朝廷君臣之序班以品類分以師長三德四教學成然後爵之唐興二監舉者千百數常選者十之二考功覆校以第謂經明行修故無多少之限今考功限天下明經進士嵗百人二監之得無幾然則學徒費官廩而博士濫天祿者也且以流外及諸色仕者嵗二千過明經進士十倍胥史浮虛之徒眊先王禮義非得與服勤道業者挈長短絶輕重也國家啓庠序廣化導將有以用而勸進之有司為限約以黜退之欲望俊乂在朝難矣帝然其言代宗時皇太子欲臨國學行齒胄禮國子司業兼集賢殿學士歸崇敬以學與官名皆不正乃上議曰古天子學曰辟雍以制言之壅水環繚如璧然以誼言之以禮樂明和天下云爾在禮為澤宮故前世或曰璧池或曰璧沼亦言學省漢光武立明堂辟雍靈臺號三雍宫晉武帝臨辟雍行鄉飲酒禮别立國子學以殊士庶永嘉南遷唯有國子學隋大業中更名國子監今聲明之盛辟雍獨闕請以國子監為辟雍省祭酒司業之名非學官所宜業者栒簴大版今學不教樂於義無當請以祭酒為太師氏位三品司業為左師右師位四品近世明經不課其義先取帖經顓門廢業傳受義絶請以禮記左氏春秋為大經周官儀禮毛詩為中經尚書周易為小經各置博士一員公羊榖梁春秋共準一中經通置博士一員博士兼通孝經論語依章疏講解德行純潔文詞雅正形容莊重可為師表者委四品以上各舉所知在外給傳七十者安車蒲輪敦遣國子太學四門三館各立五經博士品秩生徒有差舊博士助教直講經直律館算館助教請皆罷教授法學生謁師贄用腶修一束酒一壺衫布一裁色如師所服師出中門延入與坐割修㪺酒三爵止乃發篋出經摳衣前請師為說經大略然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬省月試時考嵗貢視生徒及第多少為博士考課上下有不率教者檟楚之國子移禮部為太學生太學又不變徙之四門四門不變徙本州之學復不變繇役如初終身不齒雖率教九年學不成者亦歸之本州禮部考試法請罷帖經於所習經問大義二十而得十八論語孝經十得八為通䇿三道以本經對通二為及第其孝行聞鄉里者舉解具言試日義闕一二許兼收焉天下鄉貢如之習業考試並以明經為名得第授官與進士同有詔尚書省集百官議時憚改作故無施行德宗時太子校書郎李觀請修太學疏曰臣伏思太學之為道也厥惟大哉實所以德宇於國家教源於萬方辨齊於人倫親親而尊尊誠宜嵗敕崇嚴日致齊肅祗工度木不俟乎榱崩頒朝命官取稱乎師氏然後乃可以陳四代之禮興無窮之風開素王之堂削青襟之篇人懋廉隅俗捐爭端天下之人人相則焉是以德繇此澤教繇此流若水之潤下洚涌植物利不浩哉今嘗覩斯壞甚不然嗚呼在昔學有六館居類其業生有三千盛侔於古中年禍艱寖用耗息洎陛下君人宿弊尚在執事之臣顧不為急升學之徒罔敢上達積微成慝超嵗歷紀賤臣極言求合要道且六館之目其曰國子太學四門書律算等今存者三亡者三亡者職繇厥司存者恐不逮修輿人有棄本之議羣生有將壓之虞至於博士助教鋤耕犁其中播五稼於三時視辟雍如農郊堂宇頽廢磊砢屬聮終朝之雨流潦下渟既夕之天列宿上羅羣生寂寥攸處貿遷而陛下不以問官不以聞執政之臣不以思所謂德宇將摧教源將乾先聖之道將不堪猶火之炎上焰焰至焚其為烈也豈不畏哉日者聖朝以武夷時屯有風牧建帝庸今者聖朝以文象天經有臯衡宣皇猷實四三六五之君子間無足以間之然事不為加理人不為加安嵗貢之夫不能應請問宴罷之産無以悟𤣥機天下有倒懸之悲諸侯有安忍之懷執事之臣深惟無從但勞心於無益全身於因循是果不知長國之術在乎養士養士之方在乎隆學夫學廢則士亡士亡則國虛國虛則上下危上下危則禮義銷禮義銷則狂可姦聖賊可淩德聖德逶迆不知其終今觀執事之臣之心必以修學為害時而他害者千之養士為費財而他費者萬之殊不知此費無費而他費為費也此害無害而他害為害也諺所謂溜之細穿石綆之細斷幹斯言損益有漸非聰哲靡察今乃明徵於儒書欽若於權輿繼統於易從恢業於純風而望海內雋傑靡然踵武於雲龍之庭不知其可也禮稱虞夏殷周天下之盛王也蓋以其有庇民之德祚國之仁可仰而巍巍且太學之興本於有虞達於三王踰至漢魏以降特盛於我太宗文皇重聖遵之無以增洊興於先皇而延於聖朝此乃古帝王愍淳醨亂萌故同教於民百代奉之以𢎞長國家廣之以存存陛下不宜忽之而已今四君德以相高八聖幽而不照風聲隨而凋落焉夫四君之民古猶易制陛下之民猾且難矣易制之民猶或遺之難矣之民得不重愼乎魯春秋書太廟屋壞傳曰書不敬也臣今懼聖朝之史書太學廢使萬代之嗣無法今聖朝聚國中之兵守塞下之壘空織婦之機悉農夫之儲豈其惡民而賤物誠為社稷之計也設一旦農夫死織婦病兵壘在邊粟帛不輸陛下此時其暇勸學乎則禮義之心不素蓄於人亦難以致天下之和矣且四方之學太學之枝葉也天子之教諸侯之本也未有本之顚而枝葉之存天子之廢而諸侯之興夫為國者亦猶治一人之身京師人之心四方心之體諸侯體之四支心平則體患易治體平則四支之患不治而愈今不嗇神於心體而竭資於四支時變於外氣殫於中則為不起之憂矣伏惟陛下察弛張之㑹觀損益之圖滅無用之府崇有裕之原廢闕修而百度明庠序昌而教化行勞經邦於長久熙帝載於登閎顧夫周營靈臺魯修泮宮於陛下萬之一焉伏惟速令於職司無至於不可持天下幸甚憲宗時學士李絳上疏曰自三代哲王已降奄有天下未嘗不崇建太學尊重名儒習干戚羽籥之容盛樽爼揖讓之禮以興教化以致太平天子親入視學皇太子行齒胄之禮斯所以用化成天下也故記曰如欲化民成俗必由學乎當征討之急則先武事丁理平之運則尚文德二柄相須百王不易故漢光武於兵革之中投戈講藝魏太祖亦於擾攘之際崇立學校歷代之於儒道如此急也後漢儒碩之盛太學至有三萬人諷先聖之言酌當代之務鴻名碩德康國濟時未有不遊於太學以躋顯位也國家自高祖初平關中便修太學并為功臣宗室子弟别立小學建黌舍大引儒訓增置生徒各立博贍鴻儒碩學盛於朝列質疑應問酌古辨今咸徵經據並得傳師法故朝廷無不根之論蕃夷有慕義之名風教大行禮樂咸備貞觀之理謂之太平至於開元中亦引國學之制復覩儒道之盛故太學廢於衰亂之代非所以俾風俗趍末而忘實蓋由國學廢講論之禮儒者靡師資之訓自是以降不本經義不識君臣父子之道不知禮樂制度之方和氣不流悖亂遂作其師氏之廢如是之害也今天下遭逢聖明蕩滌瑕穢前代所不能舉而陛下舉之百王所不能行而陛下行之萬方傾耳兆人企踵思陶聖化希承德風而德盛道隆闕弦歌之雅詠政流化洽鮮儒學之髙風頃自胡寇亂華乘輿避狄中夏凋耗生人流離儒碩解散國學毀廢生徒無鼓篋之志博士有倚席之譏馬廄園蔬殆恐及此伏惟陛下挺超代之姿發振俗之令復崇太學重延儒碩精選生徒奬寵博士備徵天下名德專門之士增飾學中屋室厨饌之制殿最講習之優劣彰明義訓之得失明立科品使有懲勸拔萃出羣者縻之以祿廢業怠教者置之以刑自然儒雅日興經典日重先王之道日盛太學之訓日崇陛下垂拱明廷受釐清禁使師氏教德不獨美於周時橋門觀禮豈復謝於漢日伏希天造特覽愚言起兹廢墮引於教化冀裨聖政少助皇風上於是宣付中書門下令修起國學歷代名臣奏議卷一百十三
