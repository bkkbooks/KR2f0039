body:
  text: 歷代名臣奏議卷一百六十五明楊士竒等撰選舉宋仁宗時知諌院包拯上取士疏曰臣以孤逺之迹猥荷聖選擢升憲府退思所以為報則智識蒙淺無以副上㫖之萬一敢竭愚見唯明主裁之臣伏覩近降詔敕以官吏升陟賢否相溷世族補䕃愚智不分並立新條以革舊弊有以見陛下求治垂訓之深㫖也臣聞天下大器也羣生重畜也古之聖王御大器保重畜蓋各有其道焉以萬務之無極也一統於上豈可以思慮盡之耶故立三公設九卿百執事以維持之俾羣材盡力而百工無曠則王者正其本執其要而天下之大務舉矣故治亂之原在求賢取士得其人而已漢書曰帝王之德莫大於知人大抵斯人之情皆希榮進莫不飾正於外藏邪於內邪正所藴淵密難辨而審之必有術焉以賢知賢以能知能知而用之之謂也且知人與不知人而任之乃得失所繫而安危從之宜乎取士之際不可不慎焉夫三代取士之法闊略難議兩漢而下莫若唐天寶之制自京師逺郡縣皆有學焉每嵗仲冬館學課試乃與計偕其不在館學而舉者謂之鄉貢並責成有司惟以得之與否以為榮辱得士者升失士者黜孰不公其心以進退乎其得第者但謂之選人有格限未至而能試文三道者謂之宏詞試判三道者謂之拔萃中是選者得不限年而授職復有賢良之科焉所以區别才行慎重名器如是之審也故當時文物尤盛比隆三代基構綿逺垂三百年其有繇矣今之取士則異於是鄉曲不議其行禮部不專其任但糊名謄本煩以繩檢復於軒陛躬臨程試三題競作百篇來上不逾三數日升降天下士其考較去留可謂之精且詳矣臣亦恐非進賢退不肖之長䇿也周禮升秀辨官司徒司馬大樂正之職未聞王者躬其事也議者謂不若近約唐制歸諸有司或曰取捨之柄當繇人主曰盍使禮部考試定其可否髙下混於奏籍賜第上前抑亦無失於國體矣然後復宏詞拔萃之科明立條目寬限人數嵗一設之其與選者比類奏舉之人以次甄擢而任之有以得其實才矣頃年雖復賢良拔萃之科得人裁一二而已又罷拔萃之舉恐未足盡魁梧之選也且今之仕者非保任則無以自進若參以二科而精求之則取人之路豈不裕乎而又僉舉之敝漸不可長其間或昵於愛私或逼於勢要不得已因而舉之者衆繆濫無别宜一警革若至其甚何所及焉方今天下多事邉鄙未寧政失於寬而弊於姑息士弛於務而幸於因循固宜推擇真賢講求治道外則黜郡守縣令不才貪懦苛虐之輩以利於民內則辨公卿大夫無狀諂佞朋比之徒以肅於朝杜絶回邪振張紀律可使教敦于上民悅于下足以導迎和氣馴致太寧不亦盛哉伏望陛下稽前代之成敗驗當今之得失政有未順理有未安則思而圖之圖而行之行而終之則生靈受其福而宗社享無疆之休矣惟陛下鑒其區區恕其狂直一賜觀采拯又上疏曰臣伏覩新定貢舉條制節文諸州發解令知州通判職官令録等保明行實更不封彌謄録者此乃三代里選之法蓋朝廷欲先德行而後詞學責成有司不欲煩以繩檢庶取士有以得其實才矣緣天下郡學自罷聽讀之後生徒各以散去一旦詔下投牒求試者比比皆是是長吏等又安能一一練悉行實哉不免秖慿選人遞相保委然而詐僞猥雜者亦無由辨明兼每州用試官一員是天下試官逾三百餘員必恐未能盡得其人而悉心於公取也或緣其雅素或牽於愛憎或迫於勢要或通於賄賂勢不得已因而升黜者有矣又何暇論材藝較履行哉洎取捨一謬則是非紛作不惟抑絶寒素竊慮天下因此構起訟端多矣況封彌謄録行之且久雖非取士之制精協盡公之道若今來諸州解發舉人且令仍舊封彌謄録者校於理甚便若以敕命方行難於遽改即乞特降約束其逐處試官如稍涉徇私及請託不公並於常法外重行處置不然合别定刑庶使官吏各知警懼拯又上疏曰臣竊見審官院差京朝官並循舊例以到院先後為限未嘗較辨賢否論次殿最清濁一溷流品不分但以名次補闕而已甚非委重近臣審擇之意況國家設提漕按察之職察羣吏亷穢之狀其治績尤著者則必慰薦稱奉貪懦不治者則必體量按劾别白善惡悉以上聞而審官院署名于籍以為沮勸之本今則不然當除擬之時但以月日次第差而授之則向來黜陟之狀委而不顧乃同虛設豈不惜哉且黎元之命繫于長吏今郡守縣令鮮或得人盜賊間起生民重困天下受敝職此之由可不慎哉臣欲乞今後審官院應京朝官初任即令勘㑹在任有舉主五人無私罪者升為上有舉主三人已下或無舉主及私罪者以為次其有私罪及體量者降為下凡差授以為定制如此則進者知勸退者知懼旌别淑慝無大於此拯又上疏曰臣伏覩近降敕命以樞密直學士知益州蔣堂為奏舉前保州通判袐書丞石待舉不當罰銅四十斤考案石待舉殘虐屯兵刻削廪食羣凶相扇固守城壁殺害民吏幾成大患原其情狀免死猶未塞責而保任之者止從輕典竊恐不足以誡其濫舉也緣河朔三路軍民財賦事務繁劇長吏僚佐尢在得人所以申命近臣同罪保舉蓋國家慎重選擢如是之至也而論薦之人不能體認朝廷求實才偹急用之意但緣其雅素或昵於愛私或迫於勢要或通於賄賂勢不得已因而舉之又何暇論材器較治行之詳悉哉致一旦用之為國生事不可不深慮也臣欲乞今後應河北陜西河東知州軍通判兵馬都監已下依舊令兩制已上臣寮舉曽歷三路差遣諸悉邉事京朝官及武職等委是精當方得以次選用如擢用後稍不如舉狀並乞同坐重行朝典侍御史裏行𫝊堯俞上奏曰臣伏覩兩制臣僚與御史臺審刑院大理寺等處更互舉逐司屬官頗為不便臣不敢委曲叙陳久煩天聽粗條一兩事伏乞詳擇頃者御史闕員凡一年半方得韓縝昨吕誨出臺又當學士院舉官填補逮今幾嵗而薦章未上蓋緣人衆議論難合一介之士須數人皆熟其材行其為留滯固無足怪使元敕日限遂為空文去年舍人院舉太常博士李球充詳議官而審刑院乞選嘗歷法官者既而飛章論辨卒不復舉去就之間頗傷事體且諸司長官朝廷慎選其所付與固已非輕至於擇人獨不倚辦臣竊謂未為得也欲乞今後應諸司寮屬合舉充者一切委長吏自薦茍非其人及稍涉朋比重坐舉主則孰敢不盡其心況此事唐相陸贄論之詳矣儻䝉施行深允公議宋庠上奏曰竊見近者召試制䇿并武舉人于崇政殿皇帝陛下親迂詔蹕留神永晝嚴門異席程其才略誠見聖心核真僞進英豪之審也然臣以謂有司祇事失於奏請茍從便易乖戾舊章措置之間甚不稱陛下求賢之意伏覩賢良方正蘇紳等就試之日並與武舉人雜坐廡下洎摛辭寫卷皆俯伏氊上自晨至晡訖無餘食飢虛勞悴形于歎嗟雖僅能成文可謂薄其禮矣又況武舉人等才術膚淺流品混淆挽弩試射與兵卒無異使天子制䇿之士並日較能此又國體之深譏者也臣竊為朝廷惜之臣不敢上引漢唐以煩省覽仰惟先帝故事布在耳目縉紳列位孰不知之謹按真宗皇帝凡五䇿賢良皆躬御便坐其舉人就試並于殿廊張幕為次埀簾設几太官賜膳酒醪茶菽無不畢供聖人之心以謂張不次之科待非常之士所咨者天人之際所質者古今之宜言若可行髙者足以和隂陽躋仁夀下者足以明利害觀學術是則所責於人者若是之重矣所設之禮也又可以輕乎勢當自然非茍而已臣恐有司自今以往待士之禮因循亡棄則國家雖設此舉必無異人何者夫士有髙才必有髙節節髙禮薄將耻而不就其就者皆輕躁徼幸先身後義之徒適足啓偷競之風玷詳延之詔若執事者以為人不逮古文罕中程虛屈至尊行不急之務則因而罷之可也或惜其歷代盛王之所重當世竒才之未乏則先朝舊禮庸可廢乎伏願申詔近臣檢詳舊史作為定式付于攸司今後每試此科即備陳條件凡厥供擬關報所由仍乞或有武舉雜科不令同日就試庶擬人於類有協禮經仍貫而行嗣恢世烈狂言聖擇或補大猷如允所陳乞降付中書詳議干黷旒扆臣無任省循狂瞽慙懼屏營之至蘇舜欽上疏曰臣昨伏覩陛下發德音下明詔廣延天下博習之士以大治本詔降之日識者喧然咸謂陛下張祖宗之基致億兆之福慮意有所不逮政有所未敷雖碩輔盈廷諫臣滿著朝訪前王之陳迹夕講先朝之故事尚欲親聞芻蕘廣采髦哲此非惟藴才抱器者幸甚實亦天下之幸甚也臣竊見分四制限十一科使官京司者得應賢良體用之目潜白屋者出赴沈淪髙蹈之制州縣判等限以字數武舉䇿試兼之騎射臣敢謂陛下之詔體則正矣而綱條未至輒有管穴願鋪白而言之夫賢良之科肇於漢世故公孫丞相之徒多以褐衣射策而解巾入仕其已居位者日邇帝光出入禁掖志或未發則可囊奏而建言政有未安則可排闥而請見況其身檢命敕已得為朝中官則口鉗舌卷鮮肯言天下事惟是韋帶繩樞之士義踈禮隔趨走塵土間未嘗咫尺人主之顔靣加以天閽九重交㦸數里雖胸文陸離筆語滂霈而豈得一達旒纊之下哉脫欲聲鼓叩輦則有司必以狂妄之罪罪之且身無一命志氣自得邦家闕政實亦敢言漢世兼采庶士者深有意於此也下至李唐穿鑿前軌以謂民間不知帝王之動靜俗儒不講朝廷之經法專以官士者得應直言科及我炎統勃興不血刃而得天下太祖太宗拓樹基扃誕布鴻文而大變汙俗真宗嗣二后教信兩漢法笑却唐弊追還古風故詔賢良而草莽之士無棄焉今陛下之詔有異於上是未至者一也次則髙蹈丘園沉淪草澤臣亦謂未至者何嘗聞帝者慎器與名不務虛假且遁逸之士不示見聞今陛下垂詔而雜舉之是欲使之自見聞也若出而赴陛下之詔是其人非沈淪者若出而求陛下之試是其人非髙蹈者則皆露已揚才干時謁進者也非惟失彼之行恐使人謂陛下設虛名無精求之意州縣判等亦未折衷夫録人罪失務在淺要不過數字以見意數句以成文今限字二百束之對耦則皆漫誕而無功繁博而寡要不可施用卒為空言至如武舉䇿試兼之騎射竊觀詔㫖既令先進軍機後即陛試是陛下取將帥材者也反使張一弮發數矢是陛下校一夫藝取一人之敵也夫欲練將材而取一夫之技又何異考編鍾堵磬而求鄭衛之音伏願賢良之科使復兩漢真宗之制不以官士為之限則國家之得失可聞也沈淪髙蹈者則令諸郡守宰根索其名而籍奏之然後給傳續食逹輦㑹試以文故蓄響埋照之流不逺而至矣書判者削其字限各罄其才而為之則文識髙劣盡可見矣武舉者去騎射之末而訪以機略之大則將帥之具鱗集矣若然則陛下之詔不虛下天下之人無異議四條而十一科正矣臣録録者豈當輒述國家大事上干天子聽覽蓋以陛下開言路塞諱門采瞽說納愚慮是以臣析肝瀝懇而具述之其若陛下責其犯上罪其錯議臣雖膏鉞轉壑不為之怨伏願俯而察之知制誥王圭上奏曰右臣竊惟貢舉之法盛于有唐自貞觀訖於開元文章最隆其較藝者千餘人而所收者無幾咸亨上元中嘗增其數然無及百人者國初取士之科大抵皆襲唐制暨興國中始大擢貢士其後寖以益廣無有定數故自近年以來官吏猥濫溢於常員甚非國家所以取人之意前詔禮部應進士諸科奏名皆以四百人為額兹誠聖慮所欲革仕進之弊而敦治原之要也臣愚伏慮將來羣士至闕下一有扇搖而言者輒議衝改伏望宸指申飭有司固令遵守為定式圭又上奏曰右臣竊以有唐取士之法雖有數科然當時士選之盛者惟明經進士而已蓋明經先問義而後䇿試三試而皆通者為得第其大略與進士等國家比試諸科既不明義又無䇿試之式但能精於誦數者則舉以中選是豈朝廷設科取士之意哉前詔禮部令諸科終場日於本經問大義一十道九經五經只問大義兹誠國家推廣教導將令士者悉以明六經大法之歸固不專於記誦之工也臣已著之于條然慮議者以謂難於猝更猶欲安習前弊伏望朝廷預戒有司永以遵守圭又上奏曰右臣得御史臺牒奉詔令議貢舉庠序之法夫以古之取士莫不即之以鄉里考之以行藝然後賔興之故得純明朴茂之材咸爵之於朝今天下雖有學人率多遊放未盡得土著之士教授者又無訓導之科指每詔下京師增補監員不可勝數使飭身厲行者與夫不肖叢然而並趨將何以别焉請選置天下學官罷京師增補監員盡命歸就本貫凡薦送俟有司考定命長吏發其名氏參以行實而髙下之若素無檢者皆得以斥去今計三嵗設科以大較羣士亦當間令諸道搜訪髙行之人庶幾逺近無遺材又諸科徒專誦數之學無補於時請自今新人毋得應諸科皆令習明經不數舉間可以盡革其弊若乃貢舉以詩賦䇿論取人蓋自祖宗以來收攬天下豪俊莫不用此臣不敢輕議知制誥范鎮議取士狀曰竊以取士之敝患於以文而不以行非一日之積也其勢然也自井田廢黨遂州鄉教訓之官不立而士不素養所以道化不粹於古也中間號稱得人而歷世之久如漢唐者雖不盡由於學蓋材之於位試之以事使賢者能者進而愚者不肖者退是亦古之道也方堯之時臯陶稷契進而靜言庸違方命圮族者退材諸位而考之以事也今取士不由於學以文而不以行及其官之也又不材諸位不考之事簿書期會而已是本末皆失也學者士之本也慶厯中嘗興學矣有貧不能入學者親老不能入學者至其親請而免入學者是士之不盡由於學也古之士雖云取之於鄉其實皆出於學今之士既不能盡由於學欲盡知其行豈可得哉貢舉之法不孝不悌不得舉舉者罰是亦責行之本也然而每一下詔應書而起以數萬計不可以人人知也故必考之以文也今之詩賦論䇿是也周之制行同能耦則决之以射其所謂詩賦論䇿不猶愈於射乎故取之以文不可廢者其勢然也今天下非無學也無良師也待之不以禮也世之所謂糊名者待盜跖可也以待盜跖之法而欲求顔閔之人其為顔閔者不化為盜跖幾希矣而議者以為糊名不可廢糊名不可廢而欲責士之行誼難矣哉臣請擇良師而教之於學以觀其素弛糊名之禁而待之以禮以飬其誠以謹士之初也官而使之也材之以位考之以事在朝廷者朝廷推之在州縣者州縣推之推其尤善者而進之曰某人嘗為某事為有行推其不善者而退之曰某人嘗為某事為無行以謹士之終也如是而本末俱得則天下之士相率而入於善矣其於詩賦䇿論雖無更之可也李淑侍經筵仁宗訪以進士詩賦䇿論先後俾以故事對淑對曰唐調露二年劉思立為考功員外郎以進士試䇿滅裂請帖經以觀其學試雜文以觀其才自此㳂以為常至永隆二年進士試雜文二篇通文律始試䇿天寶十一年進士試一經能通試文賦又通而後試䇿五條皆通中第建中二年趙贊請試以時務䇿五篇針論表贊各一篇以代詩賦太和三年試帖經略問大義取精通者次試議論各一篇八年禮部試以帖經口義次試䇿五篇問經義者三問時務者二厥後變易遂以詩賦為第一場論第二場䇿第三場帖經第四場今陛下欲求理道而不以雕琢為貴得取士之實矣然考官以所試分考不能通加評校而每場輒退落士之中否殆繫於幸不幸願約舊制先䇿次論次賦及詩次帖經墨義而敕有司併試四場通校工拙毋以一場得失為去留詔有司議稍施行焉蔡襄上奏曰臣伏見隋唐以來以進士明經二科取士迄今以為永制進士雖通試詩賦策論其實去留專在詩賦糊名謄紙以示至公㸃抹細碎條約纎悉所司奉之便於考校明經逐場對義鈔節注疏記誦字數至有一字旁寫聲形類者三兩字如有一中亦是通義字猶不識經㫖何從而知取士之方一至于此臣聞有國家者取天下之士將以治民而經國耳故敦其行欲以表風俗試其才欲以濟成務今進士之詩賦明經之帖義於治民經國之術了不相關及其間或有長材異節之士幸而有之或官而後習非因設科而得也今有善射者或使之御其人必自以為不能世之人亦曰彼射也責之以御強人之所不習不可也而以詩賦帖義取士偶與科合者即為中第一日使之臨民謀國其人必自以為能而世之人亦習而不怪兹大可異也或曰取士在於得人豈繫詩賦策論乎皇甫鏄以賢良方正中科而姧邪過人豈不專試䇿乎裴度以進士中第而功德尤著者豈不由詩賦而得之臣竊謂不然取之以其道任之以其術而陷於姧邪其人自隳也取之不以其道任之不以其術而能功德著聞其人自立也豈可以自隳與自立之人而害經久之制乎三代之道鄉舉里選專取德業漢察孝亷加之䇿問取士有經術隋唐以來盡失之矣行之既久難於卒更今就其所試之業而裁之以試䇿為去留進士之術以大義為去留明經之術庶幾可行也一天下之州軍盡許立學選擇鄉里有年德通經義者補為教授講說經書教勗生徒不應舉者三年後乞與助教名目且令講說應舉之人須經本州學聽書其日限以國子監新立條約為例一請試䇿三道為一場考校驗落外次試論為一場又考校驗落外次試詩賦為一場以三場皆善者為優或䇿論詩賦互有所長則互取之其䇿仍請一道問經義異同以觀其識一道問古今㳂革以觀其學一道問當世之務以觀其才此其大略也一眀經只問所習經書異同大義所對之義只合注疏大意不須文字盡同或自有意見即依注疏解釋外任自陳述可以眀其識慮若以經科文人所習已久未能變革即艱其取而薄其恩取能對大義者頗優奬之自有稍有智識之人去彼取此矣襄又上奏曰臣聞人主擇宰輔宰輔擇長官長官擇僚佐此至治之要至簡之術也周命太僕則曰慎柬乃僚漢之公府令自辟召唐陸贄作相奏請諸司長官各擇屬吏後因讒謗輒有變更陸贄論之詳矣又髙元裕為御史中丞上言御史綱紀之地官屬選用宜得實才其不稱者臣請黜之監察御史杜宣猷李瓌等並出為府縣之職此皆前世專任長官之眀驗也國朝諸司省監悉非本官惟御史臺職不殊古制方今臺中條制如臺官不稱職者亦許紏舉近年臺官宰輔避嫌例不中除多令兩制參舉又限資考苛細多不得人蓋由不寬資限不責長官之弊也近見御史中丞王拱辰奏舉楊紘等充臺官朝廷循執舊規下兩制參舉臣謂朝廷既任拱辰為中丞若實非才則當别擇才者而任之若才堪其任則所請屬官可悉委之未為過也況拱辰於官屬請去不才者而更擇才者是盡心於朝廷不避衆怨也今御史席平已出潤州若參舉之人又得軟懦傾險之士則何以處之臣故謂莫若專任長官寬其資限則責有所歸也臣乞御史臺官屬只下御史中丞薦舉寬其資限之格資深者為銜官卑者為裏行若能稱職亦是官守之常不必過有升陟或不稱職可并舉者坐之在朝廷有責任之方風憲有得人之美矣知揚州劉敞上奏曰臣伏見近敕更張貢舉條約欲令四方遊士各歸其鄉里而有司得以觀行聽言絶濫進之弊此誠上近古制下適時宜然臣猶謂必欲人安其居皆有常心漸之於仁摩之於義化民成俗則莫若開庠序以收飬之設師弟子以教誨之月考時試以勸勉之教定俗成然後賢不肖立見而真僞不雜矣今州郡幸皆有學學皆有生徒而終患無師以教之但令掾曹雜領其事職既不專教用不眀自古儒學之官不兼治民蓋為此也臣欲乞州郡有學處聽長吏各奏辟教授一員於前任判司簿尉中選有文行堪為人師者充仍令以四年為一任與理考數官資俸祿同之掾曹則學有常師教有常業士子競勸矣於朝廷長育人材之意誠未失也今欲遊士歸鄉而不為設學則無以收之設學而不為置師則無以率之置師而不立課式講習之法則無以成之三者名存實亡則學者不歸雖欲别賢不肖興亷遜崇鄉黨之化不可得矣惟陛下裁許敞又上奏曰臣伏見敕命諸路經略安撫轉運提刑司舉政績尤異可備任用者各三人此誠朝廷求賢審官疇咨僉謀之道然臣愚竊計之疑於待天下之士有多有寡而未能均茍未能均則必有幸不幸之弊矣何以言之陜西河北皆三十餘州軍各有經略安撫四五人并提刑轉運共舉二十餘人若所舉皆賢才固不為少儻賢才不能若此之多必以中人常士之偶無過者而充數則亦有幸而得舉者矣京西淮南亦皆二十餘州軍唯有提刑轉運兩司而所舉不過六人如令二十餘州軍誠寡賢才矣固不為吝如賢才衆多而限以六人之數則亦必有不幸而見遺者矣幸而得舉者朝廷無由知且信以為賢而用之不幸而見遺者朝廷亦無由知且信以為不肖而棄之則設法之弊也至於江南東西福建官吏之衆不能半淮南二廣夔利福建僥外吏或以謫往或以攝補員常不足今亦與內地等皆不可均者也恐未能慰士大夫之望伏乞更賜詳察損所有餘而增所不足使常人無或以幸而進賢才無或以不幸而遺則於治體為允敞又上奏曰臣伏以朝廷設保薦之令者欲振拔幽滯甄録才實也士大夫所以報國恩無過於此矣然猶閉其聽請濫進之隙故限以定員結以同罪防禁既詳責望又重不可復加而頃來奏章之入或文字小不應式或筆畫偶有所遺於義無害皆見退却甚失朝廷求才實之本亦非士大夫舉所知之意也臣謂中外舉狀除員數須要照㑹不可不言及同罪所以立法不可不謹其他雖小小差誤並許收使不須曲難如此足以開廣薦引之路亦杜絶所由巧文要市之敝庶幾簡而易行矣敞又上奏曰臣伏見今嵗制舉中選者三人耳其間猶有以薄於行誼而被黜者此非有司校試之不精蓋在於聽言而不察行玩文而不計實之蔽也選舉若此豈可為永法哉臣前嵗嘗言州郡有學學皆有生徒而患無講授之師以專領之乞令州郡自辟選人為教授仍理四考為一任未䝉施行臣以謂朝廷大務莫重於選舉常患遊士不安其鄉里則有司無由考其行實是以專取詞藻則賢不肖混淆至於廉耻之節壞而浮僞之俗成皆從此塗出也今使州郡有學學皆有師師皆有課試之法居常則勉其學而矯其失當貢士則訂其行而程其言一郡之士性之若否習之邪正能之多少皆可預見而蚤定也於是上其名與計偕則選舉精矣人知為善於其身然後乃能信於鄉里信於鄉里然後乃得聞於朝也則皆勸於為善矣一紀之外三十年之內教成俗定則士各安其土相厲以義相尚以節何患賢士之難得哉誠如此古治之風庶幾可復也事固有言之似迂而理甚切行之似近而功甚逺者教化之謂也伏乞檢㑹臣前奏事理特賜詳擇知制誥胡宿上奏曰臣等竊以六經傳先王之道教化根本舊制課試進士止以詩賦䇿論簡拔才俊其實少有專門名學之人諸科雖能誦記章句復又不通大義施於有政則又牆靣所以前後論取士者常以此科為言景祐制書節文始令禮部貢院舉人通三經已上進士諸科過落外許自陳嘗於某處講授某經貢院别試經義十道直取聖賢意義解釋對答或以詩書引證不須全具注疏以六通為合格講誦精通具名聞奏乞差學官或御試覆試得中具對義粗通取㫖此則聖朝扶進經術漸復兩漢射䇿之舉也慶厯六年應詔者士四人合格者八人進士諸科各四人皇祐元年應詔者八十二人合格者二人進士五人諸科二人今年投牒進士七十七人諸科五十人凡一百二十七人比之嚮來數目倍多豈非詔書開勸使然而利祿誘導之至也條制每科不得過五人比再經覆試又須過落奬進之路似未開廣恐學者稍怠懈美業中止臣等欲望聖慈稍增人數以勸來者四方聞朝廷參用此科取士莫不靡然向風潜心經術則彬彬之舉兼成於前代矣宿又上奏曰臣聞漢制刺史奉詔條察州秩六百石至卑也委之察一部者意在秩卑無所顧惜敢刺舉耳某年初置刺史部十三州文武名臣欲盡委察今之轉運使大抵漢刺史之職也陟黜臧否興利除害莫不係之國初用官亦輕選才則重其間外計多著能名古人有言引一代之人理一代之務不借才於異代若謂方今乏人是誣一代之人也顧朝廷所選用何如耳若欲天下轉運使盡得其人莫若慎選省府推判官提㸃刑獄此三道者取才之要比來夤緣用人忽略此職一槩置親厚之吏或假借橫勢之家故外計之任有以資叙而入往年葉清臣在三司判官不才者奏罷數人當時物論是之今稍稍復用矣天聖景祐之間屢降大敕舉提㸃刑獄頗亦得人近年多㳂差遣敕上帶入選舉之法格而不行又罕見顯拔循吏為之省府陛下惠綏元元勵精政治近制川廣知州通判知縣並須選差所以重遐方而矜逺俗也況轉運使提㸃刑獄表率部吏宣眀風化可不慎擇哉宜得通知民事綽有才望者居之若按舉稱職風績較然或增秩再留或移蒞劇部俾久其任以伸厥能諸積久纍官秩髙而才下素望不著者不可使居其任恐隳職事且非陛下求治之意宿為翰林學士又上奏曰臣竊以殿前馬步軍等帥臣統陛下爪牙之兵為陛下心腹之佐宿衛宫省拱扈宸極凡所進任固先出於聖意然後參訪大臣公議既同方可除授近來內外臣僚多舉武臣管軍此非臣下輕可論薦漢宣帝時丞相黃霸薦侍中樂陵侯史髙為太尉帝使尚書召霸曰樂陵侯髙帷幄近臣朕之所自親君何越職而舉之尚書令丞相對霸免冠謝罪數日乃決霸為丞相薦髙為太尉以職事言之未為過舉猶見詰責如此豈非以太尉掌武之官也陸賈有言將相和則權不分權不分則士豫附士豫附則國家安以此而言宿衛帥臣當選謹厚朴忠之人以總禁旅不宜輕用論薦以收私恩或任非其才則開隙生事國之利器所宜慎重尚書度支郎中金君卿上奏曰臣不避誅罰敢以愚見謹條貢舉事切於時宜較然易行者有三析于章左伏望聖聰俯加裁擇發於睿斷早賜施行臣人賤言鄙輕浼宸旒無任俯伏待罪戰汗屏營之至一事臣伏覩皇祐二年明堂赦書節文貢舉人曽經先朝省試下特免將來文解如省試不合格者别具名聞奏臣妄測聖心蓋謂其人嘗䝉先帝樂育之恩又恤其久於場屋而特加優異也臣竊觀先朝舉人類多在耆艾氣體衰朽或素無生業迫於資費而天下州郡逺者動萬千里夫以貧病衰老至甚之人驟為萬千里之行則其為勞亦甚矣至如前嵗詔下先朝舉人希覬恩澤望風而至都下者甚衆是時朝廷别無恩㫖例賜錢二千俾為歸計而屬嵗厲疫在道或病或死者不少誠可憫傷今而詔下臣竊思其人力能往者十無三四其三四中勞其筋力苦於道途不幸而病且死者抑又可料則是得以名聞者十才一二爾伏惟陛下躬祀眀堂使民知孝有生之類莫不涵被恩渥故人人鼓舞歌詠喜逄盛眀在先朝學校之人䝉陛下預開優恤之意特異於常今其間力不能往者獨不䝉惠澤之流均及其身此人可憫也臣今欲望聖慈特詔天下州郡先朝舉人有願赴省試者聽之其間有貧病衰老就試不得者委本州郡勘㑹得解後來但不曽犯真刑者具名聞奏乞朝廷就賜一上佐之官以畢餘年臣觀此等人雖材器或有短長然自束髮從學至老而志操不變是亦有意於善也今若朝廷惻然憫其夙心使至暮年卒被恩命少酬願望庶不辜生平嗜學之志上以廣先帝樂育之恩次以彰陛下優老好善之實而又使天下之人曉然知為學之利也二事臣聞漢世學者皆以専經補吏故士者治身從政罔悖於理當時所得類多有道之士而後世不克循之故所進之人未有如兩漢之盛也國家因近代之制用詞科以取士向者有司命題發䇿多不專於經典往往雜取諸家小說故朝廷患其如此亦嘗頒示條約須得於國子監經史中出題目近嵗已來遂於注疏及但係監本諸雜文字中擲裂句讀以為題目況本朝文物寖盛國庠典籍部類實繁學者若專志於經則不足以備科試將遍而治之則力有所不逮由是靡靡然秪務馳騁涉獵破碎文義以絢飾辭章而已求其內可以美其身外可以謀王體斷國論者蓋幾希矣凡士之出處語默鮮能及於古者亦由不専於經術而然也臣今欲乞申敕內外主司凡試進士詩賦只於九經正文中出題目其䇿論亦詳於三史及荀孟揚雄書中通用如此行之則學者皆務深於經術而有道之士出矣三事臣竊見向來開封府國子監兩處應舉者常至數千人其間雖有竒才異士然亦類多託籍冒名浮薄不逞者雜于其中或紛撓禮闈動致喧爭或輕議國體妄生謗讟是非雜揉玷我士風朝廷近年亦患其然故嘗詔立賞格許人告訐徒使狡詐之人夤緣為姦興構獄訟殊虧事體適長澆風以至于引試之際則士人汹湧歡噪不可止禦至有歐擊吏卒肝腦塗地者況天府國庠乃朝家觀禮示化之地而萃集浮薄不逞之徒為弊至此甚可怪也今年自聞詔下四方之往者不絶於道臣恐前嵗之弊未能遽已也竊原士之所以輕去州郡而樂趨府監者大抵以近年州郡立定解額多不均一及開封府國子監素無定額比之外郡稍寬故外郡解額少處競奔湊京師及府監舉人保明行實約束未盡致有冒名之弊臣今以諸郡應舉人數計之有十人解一名處有二十人及三十人已上解一名處又況每嵗人數多少不定若只限以舊額實見不均臣今欲乞申敕開封府國子監及天下州郡例皆以分數取人二十人中與解一名則不惟取士之均又使人皆樂就於鄉舉矣其開封府進士須得在京户稅委實居止去處不實者論違制之罪雖去官經赦見任官委保不得原免其衣冠子弟今後就學上庠者須得本貫見任官與發保明文牒方許入學類試則府監無僞濫之弊矣英宗治平元年參知政事歐陽修上奏曰臣伏見近有臣寮上言乞將南省考試舉人各以路分糊名於逐路每十人解一人等事雖已奉聖㫖送兩制詳定臣亦有愚見合具敷陳竊以國家取士之制比於前世最號至公蓋纍聖留心講求曲盡以謂王者無外天下一家故不問東西南北之人盡聚諸路貢士混合為一而惟材是擇又糊名謄録而考之使主司莫知為何方之人誰氏之子不得有所憎愛薄厚於其間故議者謂國家科場之制雖未復古法而便於今世其無情如造化至公如權衡祖宗以來不可易之制也𫝊曰無作聰明亂舊章又曰利不百者不變法今言事之臣偶見一端即議更改此臣所區區欲為陛下守祖宗之法也臣所謂偶見一端者蓋言事之人但見每次科場東南進士得多而西北進士得少故欲改法使多取西北進士爾殊不知天下至廣四方風俗異宜而人性各有利鈍東南之俗好文故進士多而經學少西北之人尚質故進士少而經學多所以科場取士東南多取進士西北多取經學者各因其材性所長而各隨其多少取之今以進士經學合而較之則其數均若必論進士則多少不等此臣所謂偏見之一端其不可者一也國家方以官濫為患取士數必難增若欲多取西北之人則却須多減東南之數今東南州軍進士取解者二三千人處只解二三十人是百人取一人蓋已痛裁抑之矣西北州軍取解至多處不過百人而所解至十餘人是十人取一人比之東十倍假借之矣若至南省又減東南而增西北則是已裁抑者又裁抑之已假借者又假借之此其不可者二也東南之士於千人中解十人其初選已精矣故至南省所試合格者多西北之士學業不及東南當發解時又十倍優假之蓋其初選已濫矣故至南省所試不合格者多今若以一例以十人取一人則東南之人合格而落者多矣西北之人不合格而得者多矣至於他路理不可齊偶有一路合格人多亦限以十一落之偶有一路合格人少亦須充足十一之數使合落者得合得者落取舍顛倒能否混淆其不可者三也且朝廷較藝取人而使有藝者屈落無藝者濫得不問繆濫只要諸路數停此其不可者四也且言事者本欲多取諸路土著之人若此法一行則寄應者爭趨而往今開封府寄應之弊可驗矣此所謂法出而姦生其不可者五也今廣南東西路進士例名絶無舉業諸州但據數解發其人亦自知無藝只來一就省試而歸冀作攝官爾朝廷以嶺外煙瘴北人不便須藉攝官亦許其如此今若一例與諸路十人取一人此為繆濫又非西北之比此其不可者六也凡此六者乃大槩爾若舊法一壞新議必行則弊濫隨生何可勝數故臣以謂且遵舊制但務擇人推朝廷至公待四方如一惟能是選人自無言此乃當今可行之法爾若謂士習浮華當先考行就如新議亦須只考程試安能必取行實之人議者又謂西北近邊士要牢籠此甚不然之論也使不逞之人不能為患則已茍可為患則何方無之前世賊亂之臣起於東南者甚衆其大者如項羽蕭銑之徒是已至如黃巢王仙芝之輩又皆起亂中州者爾不逞之人豈專西北矧貢舉所設本待材賢牢籠不逞當别有術不在科場也惟事久不能無弊有當留意者然不須更改法制止在振舉綱條爾近年以來舉人盛行懷挾排門大譟免冠突入虧損士風傷敗善類此由舉人既多而君子小人雜聚所司力不能制雖朝廷素有禁約條制甚嚴而上下因循不復申舉惟此一事為科場大患而言事者獨不及之願下有司議革其弊此當今科場之患也臣忝二宰司預聞國論茍不能為陛下守祖宗之法而言又不足取於人主則厚顔尸祿豈敢偷安而久處乎故猶此彊言乞賜裁擇三年命宰執舉館職五人先是英宗謂中書曰水潦為災言事者云咎在不能進賢何也修對曰近年進賢路狹往時入館有三路今塞其二矣進士髙科一路也大臣薦舉一路也因差遣例除一路也往年五人以上皆得試第一人及第不十年有至輔相者今第一人兩任方得試而第二人以下不復試是髙科路塞矣往時大臣薦舉即召試今只令上簿候缺人乃試是薦舉路塞矣惟有因差遣例除者半是年勞老病之人此臣所謂薦舉路狹也帝納之故有是命英宗時知諫院司馬光上奏曰伏見國家間嵗一開科場詔下州郡使之鄉舉里選遣詣京師覆試於禮部雖幽逺之士咸與其進然而天下發解進士到省常不下二千餘人南省取者才及二百而開封國學鎖廳預奏名者殆將大半其諸路州軍所得者僅百餘人爾惟陜西河東河北荆湖北廣南東西等路州軍舉人近年中第者或一二竊以科舉既頻天下之士誠奔走之不易而嶺外尤為遐僻每隨計動經五七千里往來不啻百餘程跋履道塗䝉犯風雪比至京師扶持困躓之不暇使與郊圻安燕之士角其藝能固不可得也既而不第孤寒之路最為蹭蹬干進且難往往廢學於臣愚見似有未均欲乞今後南省考試進士將開封國學鎖廰舉人試卷衮同糊名其諸道州府舉人試卷各以逐路糊名委封彌官於試卷上題以在京逐路字用印送考試官其南省所放合格進士乞於在京逐路以分數裁定取人所貴國家科第均及中外如允所請伏乞下兩制詳定者右謹具如前當院今將簿籍勘㑹近嵗三次科場內嘉祐三年國子監得解及免解進士共一百一十八人及第者二十二人約五人中取一人開封府得解及免解進士共二百七十八人及第者四十四人約六人中取一人河北路得解及免解進士共一百五十二人及第者五人約三十人中取一人京東路得解及免解進士共一百五十七人及第者五人梓州路得解及免解進士共六十三人及第者二人並約三十人中取一人廣南東路得解及免解進士共九十七人及第者三人約三十二人中取一人荆湖南路得解及免解進士共六十九人及第者二人約三十四人中取一人廣南西路得解及免解進士共三十八人利州路得解及免解進士共三十六人夔州路得解及免解進士共二十八人及第者各共一人河東路得解及免解進士共四十四人全無人及第嘉祐五年國子監得解及免解進士共一百八人及第者二十八人開封府得解及免解進士共二百六十六人及第者六十九人並約四人中取一人京東路得解及免解進士共一百五十人及第者五人約三十人中取一人荆湖南路得解及免解進士共六十九人及第者二人約三十四人中取一人廣南東路得解及免解進士共八十四人及第者二人約四十二人中取一人河東路得解及免解進士共四十一人陜西路得解及免解進士共一百二十三人及第者各只一人荆湖北路得解及免解進士共二十四人廣南西路得解及免解進士共六十三人夔州路得解及免解進士共三十二人並全無人及第嘉祐七年國子監得解及免解進士共一百一十一人及第者三十人約四人中取一人開封府得解及免解進士共三百七人及第者六十六人約五人中取一人荆湖南路得解及免解進士六十八人及第者二人約三十四人中取一人陜西路得解及免解進士共一百二十四人及第者二人約六十二人中取一人河北路得解及免解進士共一百五十四人河東路得解及免解進士共四十五人荆湖北路得解及免解進士共二十三人及第者各一人廣南東路得解及免解進士共七十七人廣南西路得解及免解進士共六十三人利州路得解及免解進士共二十八人並全無人及第以此比較在京及諸路舉人得失多少之數顯然大假不均蓋以朝廷每次科場所差試官率皆兩制三館之人其所好尚即成風俗在京舉人追趨時好易知體面淵源漸染文采自工使僻逺孤陋之人與之為敵混同封彌考較長短勢不侔矣孔子曰十室之邑必有忠信如丘者焉言雖微陋之處必有賢才不可誣也是以古之取士以郡國戶口多少為率或以德行或以材能隨其所長各有所取近自族姻逺及夷狄無小無大不可遺也今或數路之中全無一人及第則所遺多矣國家用人之法非進士及第者不得美官非善為賦詩論䇿者不得及第非逰學京師者不善為賦詩論䇿以此之故使四方學士皆棄背鄉里違去二親老於京師不復更歸其間亦有身負過惡或隱憂匿服不敢於鄉里取解者往往私買監牒妄冒户貫於京師取解自間嵗開科場以來逺方舉人憚於往還只在京師寄應者比舊尤多國家雖重為科禁至於不用䕃贖然曽犯之人嵗嵗滋甚所以然者蓋由每次科場及第進士大率是國子監開封府解送之人則人之常情誰肯去此而就彼哉夫設美言厚利進取之塗以誘人於前而以苛法空文禁之於後是猶決洪河之尾而捧土以塞之其勢必不行矣書曰無偏無黨王道蕩蕩國家設賢能之科以俟四方之士豈可使京師詐妄之人獨得取之今來栁材所起請科場事件若依而行之委得中外均平事理尤當可使孤逺者有望進達僑寓者各思還本土矣難者必曰國家比設封彌謄録以盡至公其諸路舉人所以及第少於在京者自以文藝踈拙長短相形理宜黜退今若於封彌試卷上題在京逐路字號必慮試官挾私因此得以用情是大不然國家設官分職以待賢能大者道德器識以弼諧教化其次明察惠和以拊循州縣其次方略勇果以扞禦外侮小者刑獄錢榖以供給役使豈可專取文藝之人欲以備百官濟萬事邪然則四方之人雖於文藝或有所短而其餘所長有益於公家之用者蓋亦多矣安可盡加棄斥使終身不仕耶凡試官挾私者不過徇其親知鄉黨今雖題逐路字號若試官欲徇其親知則一路之人共聚一處不知何者為其親知若欲徇其鄉黨則一路之中所取自有分數豈敢偏於本路剩取一人以此言之雖題逐路字號試官亦無所容其私也今欲乞依栁材起請今後南省考試云云裁定取人若朝廷尚以為有嫌疑即乞令封彌官將國子監開封府及十八路臨時各以一字為偏傍立號假若國子監盡用乾字開封府盡用坤字京東路盡用離字京西路盡用坎字為偏傍其餘路並依此例委知貢舉官於逐號考校文理善惡各隨其短長每十人中取一人奏名其不滿十人者六人以上亦取一人五人以下更不取人其親戚舉人别試者緣人數至少更不分别立號只依舊條衮同封彌分數取人其合該奏名者更不入南省奏名數內如允所奏乞降指揮下貢院遵守施行光又上奏曰臣聞致治之本在於得賢天下至廣羣臣至衆人主不能遍知必資薦舉不得其實則邪巧並進官職耗廢是故設連坐之法以懲之此百王不易之道也伏見近降詔書令中外臣寮於文資官內不以職位髙下舉行實素著官政尤異可僃升擢任使之人又於諸司使以下至三班使臣內舉堪充將領及行陳任使之人此乃前世之令典當今之切務臣始聞之不勝慶抃既而議者皆言數年之前亦曽有此詔書所舉甚衆未聞朝廷曽有所升擢今兹蓋亦修故事飾虛名而已非有求賢之實也若果如此誠有何益臣愚欲望陛下盡將今來臣寮所舉之人隨逐人資叙各置一簿編其姓名留之禁中其副本降付中書樞密院若遇文臣轉運使提㸃刑獄轉運判官知大藩府及武臣總管鈐轄路分都監知州軍等有闕除用舊資叙人外應係陟入上件差遣者並乞於今來舉官簿內次等資叙人中陛下親加選擇㸃定一人其不係今來薦舉之人不得差充上件差遣若升陟以後他日職事敗闕不如所舉及犯贓私罪其舉主並依法施行雖見任兩府亦乞不以恩例特放凡係舉官不當降官及降差遣者未滿三年雖遇恩赦不得牽復如此則羣臣莫敢不盡公擇人天下賢才皆可得而官使矣光又上奏曰臣竊見國家舊制資䕃出身人初授差遣者並令審官院流內銓試省格詩或賦或論一首或五經墨義十道各從其便其賦論墨義徒有其名無人願試大率皆乞試詩其間甚有假手於人真僞難辨就使自能作詩辭采髙妙施於治民亦無所用不可以此便為殿最臣欲乞今後應資䕃出身人初授差遣者並委審官院流內銓試孝經論語大義共三道仍令主判臣寮更將所對義面加詢問使之口說若義理精通者特為一等并所試大義卷子保明聞奏京官與減一任監當選人並與家便差遣合入家便者與先次其義理稍通者依常調不通者且令修學候一周年外再試必須試中方得出官若年四十以上者即聽依舊制只寫家狀讀律如此則公卿大夫子弟皆嚮學知道亦近於先王教胄子之術也孫洙上疏曰三代而下選舉之法何紛紛乎其法始得者終必失也故孝亷之始得也人務本行也其終失也計口繆舉也辟署之始得也人樂自修也其終失也流競成俗也限年之始得也敦德飬器也其終失也少成不貴也九品之始得也家舉人興也其終失也愛憎在吏也清議之始得也名實相尚也其終失也浮僞相沮也銓選之始得也權不外假也其終失也美惡同流也故孝亷失之繆辟舉失之詭限年失之同九品失之徇清議失之僞銓選失之雜是六者之法皆足以救一時而不足以通百世也故始終而各有得失焉今始終一切皆失者其國家資格之法乎臣請言其弊今賢材之伏於下者資格閡之也職業之廢於官者資格牽之也士之寡亷無耻者爭於資格也民之困於虐政暴吏資格之人衆也萬事之所以抗弊百吏之所以廢弛法制之所以頽爛決潰而不之救者皆資格之失也惟天之生大賢大德也非以私厚其人將使之輔生民之治者也惟人之有大材大智者非以獨樂其身將以振生民之窮者也今小人纍日而取貴仕君子側身而困卑位賢者戴不肖於上而愚者役智者於下爵不考德祿不授能故曰賢材之伏於下者資格閡之也才足以堪其任小拘嵗月而妨之矣力不足以稱其位增纍考級而得之矣所得非所求也所求非所任也位不度才功不索實故曰職業之廢於官者資格牽之也今夫計嵗閥而爭年勞者日夜相鬪也有司躐一名差一級則攝衣而羣爭訴矣其甚者或懷黃敕而置于丞相之前也其行義去市賈者亡幾耳故曰士之寡亷鮮恥者爭於資格也來而暴一邑既嵗滿矣又去而虐一州也非以贓敗至死不黜虎吏劘牙而食於民賢者鬱死於巖穴而赤子不得愛其父母也故曰民之困於虐政暴吏者資格之人衆也夫資格之法起於後魏崔亮而復行之於唐之裴光庭是二子者其當世固以罪之不待後世之譏矣然而行之前世不過數十年者也後得稱職者矯而更之故其患不大今資格之弊流漫根結踵為常法方且世世而遵行之矣往者不知非來者不知矯故曰萬事抗弊百吏廢弛法制頽爛決潰而不之救也雖然不無小利也小便也利之者蠢愚而廢滯者也便之者耋老而庸昏者也而於天下國家焉則大失也大害也然而提選部者亦以是法為簡而易守也百品千羣不復銓叙人物而綜核功實一吏在前勘簿呼名而授之矣坐廟堂者亦以是法為要而易行也大官大職列籍按氏差第日月遝然而登之矣上下相冒而賢材去愈逺可為太息也為今之急誠宜大蠲弊法簡拔異能爵以功為先後用才為序次無以積勤纍勞者為髙叙無以深資久考者為優選智愚以别善否陳前而萬事不治庶功不熙者臣愚未嘗聞也知通進銀臺司韓維上言曰臣竊思自古致治之術莫不以守令為急誠知務也縣令今已舉之矣唯知州但用資序名次充補略無選用之法一非其人數萬之生聚便受其弊甚可痛也伏望聖慈特詔諸路轉運提刑除藩鎮及堂選知州外其久積姦弊號為難理及纍被灾傷盜賊數發處所悉以上聞朝廷慎擇有識向公臣寮舉才任治民者往臨其處俟見實有政理即隨其迹狀大小升入堂選州郡或擢升省府及監司任使其間增秩賜金錫詔褒勸之法繫自朝廷臨事裁處所冀中庸常調之人知有自奮之路各加厲勉疲瘵之俗漸被聖澤御史中丞賈黯言今京朝官至卿監凡二千八百餘員而吏部奏舉磨勘選人未引見者至二百五十餘人且以先朝事較之方天聖中法尚簡選人以四考改官而諸路使者薦部吏未有限數而在京臺閣及常參官嘗任知州通判者雖非部吏皆得薦時磨勘改官者嵗才數十人後資考頗增而知州薦吏視屬邑多少裁定其數常參官不許薦士其條約漸繁而改官者固已衆矣然引對猶未有待次者也皇祐中始限監司奏舉之數其法益密而磨勘待次者已不減六七十人皇祐及今才十年矣而猥多至於三倍向也法疏而其數省今也法密而其數增此何故哉正在薦吏者嵗限定員務充數而已如郡守嵗許薦五人而嵗終不滿其數則人人以為遺已當舉者避謗畏譏欲止不敢此所以多而真才實亷未免慁於無能也宜明詔天下使有人則薦不必滿所限之數天子納其言歷代名臣奏議卷一百六十五
