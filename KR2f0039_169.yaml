body:
  text: 歷代名臣奏議卷一百六十九明楊士奇等撰選舉宋髙宗建炎四年趙元鎮上奏曰臣訪聞湖南北及江東西諸路帥守往往闕人行在侍從除臺諫外止有綦崈禮汪藻兩人近汪藻在假不出而郎官百司局務多差外官權攝昨雖有㫖召謝克家等又皆散在四方不能即至亦不聞再行催促不唯國體卑弱無以示天下緩急大事何所咨訪邦家以得賢為基而人主以任賢使能為職固不可緩也今帥守有闕欲自外除授則多以事不行或不知居止所在欲自行在遣行而又闕人如此逺方憔悴之民何所赴訴去嵗渡江之初首頒明詔許左右司郎官已上各薦二人其間以才能擢用者固多有之臣愚欲乞依去年體例詔臺諫及左右司郎官已上各薦二人令所在州差人結劵限三日彂赴行在審察賜對隨才任使仍令執政大臣同共採擇在外侍從雖在謫籍别無大過而政事才學實可用者廣行召擢庶幾間有來者以備獻納論思之職元鎮又上奏曰臣竊惟士之失職責在朝廷比緣國步艱難例不得調有勢援者堂中擇闕而寒逺坐受困弊陛下灼見其事已令措置盡還部闕士大夫方有赴調之期無不欣快然臣聞參選之人多被沮抑既無案籍稽考則法令隨事變更吏得因緣為姦而以書鋪為假手之地故一人參選謂之鋪例者不下數十千至如召保官之類費尤不資參選已如此況注擬邪臣以謂宜令吏部裁定保官之數如行在職事官一員用本司印狀許保盡參選注擬諸事仍飭吏部長二戒勵書鋪毋得妄生沮抑過為僥求倘致士人詞訟即送所司䆒治如此則參選之士稍無留難以稱陛下優恤寒逺之意其他常行禁飭條法更宜明加申戒榜示施行紹興二十二年右諫議大夫林大鼐言國初常參官皆得舉人不限內外亦無員數南渡之初恩或非泛人得僥幸有從軍而改秩者有捕盜而改秩者有以登對而改秩者今朝廷無事謹惜名器惟薦舉一路貪躁者速化廉靜者陸沈今欲取考第員數增減以便之增一任者減一員十考者用四十二考者用三十五考者用二如減舉法須實歷縣令不得仍請嶽祠其或負犯殿選自如常坐士有應此格者行無玷缺年亦蹉跎無非孤寒練習安義分之士望付有司條上以弭奔競二十九年聞人滋奏請凡在官歷任及十考以上無公私罪雖舉削不及格許降等升改或疑其太濫則取吏部纍年改官酌中之數立為限隔舉狀年勞參酌並用於是下其議中書舍人洪遵給事中王晞亮等上議曰本朝立薦舉之法必使歷任六考所以遲其嵗月而責其赴功必使之舉官五貟所以多其保任而必其可用今如議臣所請則有力者惟圗見次無材者茍冀終更出官十餘年可以坐待京秩此不可一也今欲減改官分數以待無舉削者則當被舉之人必有失職淹滯之嘆此不可二也京官易得馴至郎位任子之恩愈不可減非所以救入流之弊此不可三也夫祖宗之法非有大害未易輕議今一旦取二百年成法而易之此不可四也臣以為如故便三十一年禮部侍郎金安節奏言熙寧元豐以來經義詩賦廢興離合隨時更革初無㝎制近合科以來通經者苦賦體雕刻習賦者病經㫖淵微心有弗精智難兼濟又其甚者論既併場䇿問太寡議論器識無以盡人士守傳注史學盡廢此後進往往得志而老生宿儒多困也請復立兩科永為成憲從之紹興間張浚上議曰設官分職本以為民故聖人視勤勞之大小命品秩之髙下非有功於民不在選也監司守令於民最親者也今皆號為冗官及瓜而去則乞憐於人莫有顧者彼文詞巧麗親舊推薦期嵗之間可致清要兹豈不倒置已甚乎嗚呼求天下之士於言語文采之間臣知其無以得真賢矣況夫推薦者之不公耶後世坐廟堂秉樞要而於安危之機治亂之理百姓之情財用之源甲兵之事矒然不曉者無他用之無其道也繼自今以往可不知所戒哉江西安撫制置大使李綱上言曰臣伏覩二月九日手詔以太陽有異氛氣四合令中外侍從之臣遵前後詔書各舉能直言極諫之士一人將諏以過失次第施行用承天意有以見陛下克謹天戒思聞讜言銷弭變故以助中興之運甚盛德也臣竊考西漢舉賢良文學之士詳延于庭如董仲舒公孫𢎞朝錯之徒不過對策一篇指明時政得失至本朝設賢良方正能直言極諫科始有進卷及試六論乃對廷策其六論題雜出於經子史注疏之間所以求卓識洽聞之士號為制科其得人如富弼張方平夏竦皆致宰輔其次如錢易錢明逸孔文仲武仲蘇軾蘇轍兄弟之流皆為名士論議有補於國家然制科之舉貫穿古今汪洋浩渺非强記博識積以嵗時未易能䆒其業所以朝廷近年復置此科未有應令者無足怪也今者陛下以天變之故詔中外侍從之臣遵前後詔書各舉能直言極諫之士臣深慮有司拘以進卷六論牽制舉者難於得人無以仰副陛下咨訪闕失寅畏天戒之意臣愚欲望聖慈特降睿㫖將今來所舉直言極諫之士與免進卷六論秖令對策于廷仍於制策內許其展盡無隱庶幾忠言嘉謨得以上聞其進卷六論自以待應科目之士天下不勝幸甚翰林學士周麟之上奏曰臣聞文章經國之大業體尚不一從古而然故論世者以是識風俗之盛衰觀人者以此别材智之逺近猶所謂見禮聞樂而知德政不可不察也西漢二百年名儒鴻生鋒起間作雍容揄揚著録于後則炳然與三代同風唐有天下文亦三變至於美才輩出嚅嚌道真反刓剗僞薰醲涵浸然後天下化之粹然一出於正何其盛哉我國家恢儒右文列聖一揆取士之制不過曰經義詩賦然或偏廢而獨舉或兩存而並行或兼用而通試三者所向雖異及夫得人則奏賦擅場者無不精其能談經析理者靡不輳於奧纍朝名臣悉繇此出致治之美固已逺邁前世仰惟皇帝陛下躬天縱之資恢復古道優入聖域猶且博覽經史左右藝文孜孜不倦至其躬御翰墨發為宸章雲漢昭回光被萬物古帝王莫能跂及裁詩樂以侑禋祀則十三篇極風雅之妙記損齊以明鑒戒則數百言皆道德之辭若此之類殆不可殫舉士生斯時親得聖王為之師此千載一逢也臣伏見昨降明詔用經義兼詩賦合二者之長以作成多士永為定制可謂善矣今肄業之士服勤有年秋試不逺臣愚欲望聖慈申飭儒官奬勸士類戒志尚之不一革文體之未純母好髙以異論相矜母因陋以陳言自蔽母泥迃僻之習而失其正毋縱浮靡之說而溺於夸坯冶一陶聖風雲靡將見四方俊茂試于有司者無不丕應徯志咸知以體要為宗文弊既除而文格益勝用之以黼黻一代羽翼六經實斯文之幸也髙宗時李光乞薦舉武臣狀曰臣伏準紹興五年三月六日敕中書門下省依臣僚奏請銓量郡守監司遴選縣令及檢㑹紹興元年十一月十九日手詔令內外侍從官以上監司帥臣各舉所知限半月具奏有以見陛下虗心求助之意可謂切矣然臣頃任行朝職事官已嘗應詔今陛下所求益廣中外薦者紛紛而文學之士峩冠博帶布列中外者固已足用初無乏材之患昔叔孫通之歸漢從弟子百餘人乃専言諸壯士進之或以為言通曰漢王方䝉矢石爭天下諸生寧能鬭乎故先言斬將搴旗之士若通知時務矣今夷僞憑陵中原版蕩此陛下馭雄材虎將以制天下之時臣之所薦不敢復言文士臣纍任守臣竊見諸路武士多流落失所其間人材少壯弓馬趫捷武藝絶倫者甚衆朝廷既未嘗録往往散在諸軍無以自拔或委盜賊不能自新甚可惜也臣愚不敢指名論薦欲望聖慈特降睿㫖令諸路州軍廣行招收其間雖無武藝而通曉兵機能料敵制勝或造作攻守之具各為一科令監司帥守按試保明發赴樞密院量才擢用庶幾韓彭之徒或為時而出不勝幸甚監察御史劉行簡上劄子曰臣竊惟陛下側身修行克自抑畏布德行惠賴及四方自即位至今星紀一周天始悔禍區宇革心歸我輿圖休兵息民既有成約中興之功未有高焉者也然而智者於此竊有懼焉何也懼朝廷有一朝之喜而忘憂畏也而況經理之初事亦多種未易槩舉若軍儲民食之有無河防邉境之備禦既不可預計而逆度亦未可悉舉而並行是必知其所謂而後圖之𫝊曰廊廟之材非一木之枝帝王之功非一士之略則儲蓄人才以備任用豈得不為先乎矧陛下已降赦令加惠新復郡縣之民將有以大慰其心蠲稅租寬戍役固理之所不免然則經費所出實在牧民御衆之官顧安得不擇使智使愚使功使過在兹時矣臣愚欲望聖慈特降明詔令內外侍從監司守臣各舉所知才堪任劇忠不辭難者不限員數咸以名聞命有司籍記之以次除用其有以瑕纇坐廢與異時僥幸冒進之徒茍有才能亦在所舉觀其後效如有顯勞隨事旌擢若不改悔復為姦利則終身廢之庶幾人人知勸以赴事功有以助成經理之政行簡又上奏曰臣竊惟在外之官賦政煩劇深察民隱莫急於縣令總按群吏風動列城莫要於監司二者不可不擇明矣臣謂朝廷有選擇之名無選擇之實何也陛下聖德寬隆憂民深切頃降詔㫖令內外侍從官多舉材堪縣令者二人謂縣令不可不擇也然臣嘗得其所舉之目而詢求之十不得一二又除用監司率以他才有殊不曉政事者如此尚可恃以為治乎臣故曰有選擇之名無選擇之實也臣愚欲望出自聖斷令諸路監司列郡守臣各舉所知曽任縣令民所便安有顯效者一二人條具以聞無其人則闕之遇監司有闕首擇所舉之人拔而用之以示褒寵其謬者坐以欺君罔上之罰天下豈有能為縣令而不能為監司者乎審如此可謂兩得之矣陛下垂意人材自小官識擢任用者多矣獨未聞拔一循吏而驟用之此踈逺之臣所以不加勸也黃霸以治郡有稱入為三公今以良縣令為監司不亦可乎伏惟聖慈特賜詳酌施行行簡又奏曰臣竊謂州縣之官莫難於縣令而治獄次之此兩者蓋不可不擇而朝廷求所以選擇之名而未得者有年于兹矣銓曹注擬按格而授初無豫奪之法又員額至多雖欲選擇有所不能恭惟陛下自即位以來為民擇吏之詔固已屢下而司政典獄或非其人未有以仰副憂勤惻怛之意臣竊怪之伏見知溫州章誼奏請於所屬官吏擇其能者易置縣令已䝉俞允臣謂此舉誠得選擇之道且要而易行唯是典獄之官未聞有以移易為請者刑憲所加非所宜忽臣愚欲望聖慈更賜詳酌明降指揮令列郡通知應縣令治獄之官並許以所屬幕職州縣官以下選擇移易各不理為違闕其請俸自有等若州郡所謂供給應移易之人聽從多給如或郡守有挾私意妄加移易者聽監司紏察以聞庶幾吏知嚮方民受實德無失政濫刑之患章誼上奏曰臣聞古之任吏部也以人今之任吏部也以法其任在人故銓量品藻升黜進退在提衡者而已有司無可執之文也其任在法則功罪能否賞罰殿最各有程度有司便文守據毫釐不敢差也夫以便文守據之有司當四選並進之文武而典籍散亡法令不立省門旦開訴牒盈几長二郎曹據案熟視終無法令可以折中於是胥史序進各售其私廢置在其筆端可否出其脣吻搢紳士大夫弱者俯首而不敢辨强者忿詈而不能屈富者苞苴賂遺造請囑託而喪其廉耻貧者困辱摧折飢寒留滯而無以自進官以資遷政以賄成非所以尊朝廷而風天下也吏部既已難進如此是以文士輻輳於宰司武人接跡於樞府下至管庫游僥之微率在朝廷除授之目豈天下之士不樂平進而固為此紛紛哉誠有以驅之也願詔有司編類四選通知之條與夫一司專用之法兼以前後續降指揮分為敕令格式自成一書委官雕印立直給售如此則士子有進身之階銓曹有可守之法姦吏無舞文之弊四方萬里執事之人知陛下待遇之意聞風自勵矣誼又上奏曰臣近者曽奏乞編類吏部四選敕令格式以幸多士伏䝉睿斷特賜施行中外搢紳無不欣戴今聞書成有日將遂頒印臣復體問得自來吏部雖有法案止是承受續降指揮與夫劄敕之類其於本部職事鋪引條例蓋無與也尚書侍郎郎官未必盡習法令當其可否與奪之際唯本選主令是聽一有疑似法案辭非其任無所稽考今欲乞專置法司優其廪給嚴其罪賞使掌四選之法本選所不能决者聽委法司鋪叙條格然後長二據法與奪如此則本選人吏不得專為輕重矣所謂許首原之弊者吏部注官出闕關升磨勘給據告示行遣非一雖今來法令明具而人吏情有好惡睚眦之間動輒沮格搢紳之士不免投牒自訴長二方將繩按而首狀出於懷袖矣今欲乞有過自首者雖原其罰金受杖之責而書其罪由計為一犯異時名次補授皆視罪罰之多寡以為任事之殿最十罰以上重者停替降名輕者展年出職如此則人人自愛無敢玩法矣如臣所陳仰當聖意即乞降付有司討論立法不勝天下之幸誼又上奏曰臣竊見越州奏觀察判官楊願未有替人本州踏逐到迪功郎張晟乞充前件差遣奉聖㫖特令吏部與差臣伏詳選人階官有七其注擬各有等差迪功郎到部止許就判司簿尉自修職郎而上許就知令録自從事郎而上許就推判官仰惟祖宗銓曹之法不可易也其於積日纍月程事計功使朝廷名位不可驟取士子致身不容冒進等級分明而堂陛增峻矣政和執政用事之臣敗亂法度分曹建掾以朝議朝請大夫為工兵曹而以迪功郎為士户曹直居其上官制隳紊位著蕪雜士人越法犯分干請無已今方痛革前日之弊豈容特徇越州所請而亂祖宗銓曹之法哉如張晟才能學行誠有過人則朝廷别加任擢無所不可如越州許辟幕屬則當求應格官吏以充此選至於吏部格法州郡官曹伏望聖斷申嚴舊制共加遵守不勝天下之幸誼又上奏曰臣伏見朝廷近者多收吏部員闕以充堂除之選凡知通僉判知縣縣尉無非三省除授其在吏部者判司丞簿而已諸路帥司又復辟舉吏部員闕幾盡矣士大夫積資纍考關升知通與夫京朝官之任知縣者無執政侍從之援則唯縣丞是任國家全盛時府郡知通之堂除者共不過百員而寺監丞簿悉由吏部注擬士人循守分義自度材力所堪按格而求之吏部其應選者日益自勵礙格者無所怨尤其文學行義材能政事卓然有聞則朝廷拔其尤異者乃在堂除之列今則不然內非堂除外非辟舉則職任無從而得賢否混并資格盡廢長奔競之風抑亷退之節寒畯之士願就銓曹求一逺闕而不可得巧宦之人已有除授未厭所懷而不肯之官監當者悉為親民親民者必求知通朝廷幾務方多日不暇給安得人人厭其欲哉願詔執政稍稽舊制盡㑹諸路員闕若干為堂除若干歸之吏部嚴辟舉之科重除授之選庶幾養成士子靖恭之操以副陛下仄席之求誼又上奏曰臣聞堯舜以知人為難孔子以方人為不暇是以羲易之設六辭莊周之論九證蓋難之也仰惟祖宗以來取材拔士慎重其選其於有官君子不敢定賢否於俄頃之間而必考之以嵗月之久一郡委之守倅一路委之監司隨材薦舉改官縣令率有常格士之趨事赴功涵養淵源暗然而日章與夫浮躁貪僞有人則作無人則輟者皆不得而隱規模宏逺矣近自江淮九路發運之罷而薦舉之格移之於都運都運復罷而移之於淮南提㸃官士之得薦者十去七八矣自武臣提刑之罷而薦舉之格移之於文臣文臣提刑不敢專用薦格而士之得舉者十去五六矣陛下當此艱難之時求賢如不及而士之修其職業行義以履平進之塗者難於昔日是豈本朝貪賢之意哉臣因此詳定吏部薦舉格法得此二事伏望睿慈付之外廷俾均其數以委郡守監司各許薦舉則得人之路自兹廣矣誼又上奏曰臣伏觀今日多故之時非得人材無與共成事功而搢紳介胄之間懷抱器能之士不因薦舉則無路自達祖宗全盛時間求賢良方正直言極諫之士天子常稱制詔策問于廷號為制舉其未仕者有文武兩科進士生徒之選其入仕之後亦有薦對宏辭學官之召人可自奮今唯進士一科其餘未及遍舉方之前日求才之路殆恐未廣漢以數路得人唐以科目取士具載方册度今可行如博通墳典達於教化軍謀宏逺堪任將帥詳明政術可以理人與夫洞明韜略翹關負重言辭辨正書判拔萃之科皆可以網羅俊乂共濟艱難如䝉明詔有司設為程度𫝊示四方嵗一薦舉使有為之士曉然知聖主招徠奬進之意則傑才偉人咸萃天朝恢復之效可坐而致臣愚無知冒眛自竭不勝惶懼之至謹録奏聞殿中侍御史鄭剛中上奏曰檢准貢舉法試院官考試進士不滿三百人二貟五百人四貟每增五百人添一貟至七貟止伏見兩浙轉運司見置院差官引試進士取到本司狀稱今嵗合赴試約計一千餘人又取到本司前舉赴試人數計六百五十四人差過考試官四貟㸃檢試卷官二貟今舉且作一千二百人赴試比之前舉計添七百餘人若差官至七貟止則可添試官一貟是以一人之力增前舉二千卷之多也竊詳士子三嵗一試全在有司精明去留詳允故績學能文者不至有淹冒之嘆苟考官目力不逮試卷沓來心志既疲工拙交進眩然不知朱墨之可施如是而曰不遺士者未之有也欲望朝廷下本司契勘如就試委及千人以上許通差試官一十貟仍精選文藝有稱者充場屋費用必不因三人而大有增損庶幾考校得人上副朝廷樂育成就之意吏部尚書劉才邵上劄子曰虞舜躬濬哲之資明黜陟之法以臨照百官小大之才宜無不察至於命九官咨詢于下當時之臣更相稱譽因舉而用之遂能代天工熙庶績垂衣拱手坐收無為之功則求賢之效豈不盛哉恭惟陛下聰明睿智出於天縱群臣能否灼見不疑然睿意勤勤思所以廣求賢之路凡侍從之臣受命之初各得舉所知以自代虞舜用心無以復加臣愚欲望聖慈特降睿㫖凡所舉之人已經試用者時加考核其有績效顯著或不如所舉因加勸沮庶進賢者有以顯其能謬舉者無所逃其責以仰稱求賢如不及之意不勝至願才邵又上劄子曰臣竊惟朝廷設銓試之法以待出官之人各隨所長場數不一其間試之以刑統義欲以觀其知法律之意試之以時議欲以觀其達古今之變皆學以從政者所以盡心故以是待之蓋將求實用之才非徒校工拙於文詞之間也然自來試題往往於刑統則專取詞句分明而未嘗及於罪法之輕重於時議則泛用經史事迹而未嘗近於時務之利害誠皆如此則後來者惟文詞之習其何以仰稱設科選材之意乎臣區區愚見欲望聖慈申命攸司立為定式凡銓試出題於刑統義必兼以罪法之疑似於時議必參以時務之因革使之各隨所見得售所長則其從政也將見有以允協獄情通曉世變其為益也豈小補哉虞允文上言曰臣竊謂士以多才起當世之名亦以虛名起斯民之禍不可不察也蓋士倚其才彂而為文章為語言為政事莫不粲然可觀聳然可聽井井然皆可用而學之不深養之不厚以文章名者流而為輕浮以言語名者流而為巧僞以政事名者流而為苛刻朋比狎習知賈其道而不知所以守道知充其欲而不知所以窒欲凡一云為務在求合希進而上之人亦循其文章語言政事之名薦之用之而不察輕浮巧僞苛刻之禍其民者至深至隱也臣嘗觀太宗皇帝詔書有云士大夫浮薄者多宜行戒勵又云如斯巧僞必置嚴刑又云惠愛臨民乃可書為勞績丁寧訓告之意皆所以救其敝而作成之故端拱淳化之間士皆以敦重誠慤仁厚為本胥效胥勸躋時雍和幾與唐虞三代同風臣愚欲望陛下明詔中外大有以清其源自監司守臣一章之薦一闕之辟推而上之至於朝廷凡士以文章進者必抑其輕浮以言語進者必黜其巧僞以政事進者必去其苛刻而陛下於陟降之際時出動化之方而用之臣以為不數年間士皆去其惡習以就成材可以任重而致逺得時得位必流為百姓盛福祖宗基圖所以深根固蒂者無切於此惟陛下留神省察允文又言曰臣竊惟陛下以濬哲上聖之姿撫太平中興之運伏自親攬權綱以來用一公道頓八紘而奄有之臣以為公道之在天下猶人身之有元氣也元氣固于內而使一手足或廢折於外豈不亦甚可惜哉蜀去朝廷萬里陛下憂其民之失業而人材之或遺也凡郡守之有治效既詔帥臣監司薦之因其薦而遷秩得貼職擢為監司者有矣縣令之有治效又詔帥臣監司郡守薦之因其薦而為大藩通判諸臺幕屬者有矣尚慮德意之未孚天下之材未衆建也併詔諸路帥臣監司明薦之為郡太守而不次擢用者有矣是三者陛下之心一於民也然而被薦之人或狃於勢力而得之或牽於私昵而得之或嬖於親朋僚屬而得之故昏耄者廢事貪鄙者黷貨殘暴不恤者虐刑偃然恃其知已當本道之權無復忌憚而民益病矣善論議者謂陛下以公道付帥臣監司郡守而帥臣監司郡守不以公道報陛下也臣實憤之臣愚欲望睿慈下臣章有司參立㝎制以革其弊凡人材之預嵗薦者必使隨奏赴都堂審察如所薦得人然後以今所立之格自監司至幕府隨其才而用之間有卓異之才大臣又因得以聞于陛下而顯擢之茍所薦非人坐其罔上之罰如此則授受之間不敢有所私而公道行於四方真才實能在位在服元元赤子咸得以被仁天子愛育惠懷之意矣龍圖閣直學士知湖州汪藻上奏曰臣聞鮑宣言於漢曰昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑言當時為政者其心不公其法不一而無以厭塞天下之望也陛下以前者仕塗猥冗濫進者多其取名器類皆廝役之流故慨然詔有司立討論之目凡以不道而補官遷秩者皆論如律天下孰不以為宜然此法止行於吏部而堂除之人則一切置而不問是使孤寒椎鈍者獨廢其終身凡稍黠而有援者巧騰捷出於法度之外而僥冒自如也此豈聖朝行於天下畫一之公法乎臣愚欲乞應今後堂除又並先取㑹吏部有無干礙討論事件如涉討論即依條改正合除官則除官庶幾法令不偏小人退聽無使天下紛紛謂朝廷私御史中丞廖剛上奏曰臣近具奏願陛下兼收天下之才而並用之無內外彼此之間自然朋黨之名泯而異同之論熄人知尊君親上而風俗以厚誠治道之本也然天下之才陛下深居九重亦安得而盡知之雖執政大臣容有所不知而況陛下乎臣竊考祖宗之時嘗數詔近臣尚書翰林學士至給舍等各薦舉人材省部諸郎亦間許二人共舉一人節度使留後觀察使每各舉二人防禦團練使刺史亦許舉一人則知所搜訪廣矣淳化五年蓋嘗詔宰相呂䝉正等各舉有器業可任以事者一人至道二年又詔宰相張齊賢等各舉曉錢榖朝官二人䝉正嘗奏曰臣􅊀位宰相可以進退百官今獨一二人示天下隘也太宗不聽遽詔史館檢討故實謂䝉正曰虞丘子舉孫叔敖狄仁傑自薦其子光嗣何謂無此䝉正於是奉詔臣竊以謂太宗豈不知人主論一相宰相進退百官之說殆欲示至公於天下消黨與之疑於冥冥之中是固所以愛護大臣之意也陛下倘以臣言為可採願遵祖宗故事詔中外各舉所知時加親擢則庶寮無附下之嫌大臣免招權之謗而海內亦莫不歸心於陛下矣豈不韙歟吏部侍郎洪遵上奏曰臣竊見川蜀士人水陸萬里來奉廷對其意皆欲即日霑恩歸榮鄉黨而科第在五甲者法當守選必俟銓試中格乃許調官一復蹉跌則有踰嵗旅食之憂臣視諸銓曺有川闕百五十餘而留待黃甲者不過數十纍舉以來川人賜同進士出身者例控告朝廷皆得免試擬注實惠及人士子感泣唯是二廣士人經涉炎瘴逺者數千里群試南宮每舉登第率不過三兩人其入五甲者亦須候銓試注授獨不得與蜀士為比情實可矜至於海南四州逺涉鯨波遐陬聞見不廣類多下第及其垂老特恩幸而得文學以上又必俟郊霈方許入官空行空反尤為可念臣愚欲望聖慈令有司看詳著為定令自今舉為始川廣進士中第法當銓試者並候黃甲集注畢以餘闕差擬其海南特奏名人當銓試者與免試當候赦者與放選入五等者亦乞特與出官一次庶幾逺方寒士皆獲寸進無有留滯棲遲之嘆以副陛下不忘逺之意遵又上奏曰臣竊惟薦舉之制祖宗所以均齊天下之至權行之百年講若畫一雖不能免於賢愚同升之弊然薦貟有五人之限考績有六年之拘有力者不得亟進而驟遷而中庸寒人亦可指日以望進至公至平萬世不可易也而比年以來監司郡守不能皆以體國首公為心懦者迫關請貪者通賕餉閡於定貟無以塞責章交公車敢為誕謾而書吏又以謝錢多寡隂寄姦蠧不惟愆期生事有悮選人而銓曹文書渺若煙海僞謬百出無所覆按實為有司大患臣恭覩近降指揮今後如有重疊奏舉令吏部具名劾奏有以見陛下仁明天日照臨灼見其弊臣濫二天官恭承睿訓晨興晏罷惟以察姦柅弊為急期使士大夫少逭滯淹之歎然則舉削之弊其可置而不問乎請以近事為陛下别白言之有同時一章而巧為兩牘並至而不疑者有嵗薦五人而彂奏削至以十數而不止者有當彂職官而詐為京狀者有只係常調而詭稱職司者有轉運雙貟交承各異而南廳北廳妄行攙補者有上下半年日月有限而先時後時了無忌憚者有被舉之人見存而假稱事故奪而之他者有經隔數年而冒作交代即行補彂者若此之類不可槩舉臣愚欲望聖慈特賜睿㫖今後奏舉輒有冒僞不實如前所陳許令本部具姓名事由劾奏乞從朝廷取㫖懲責書奏之吏亦各隨所犯斷罪勒罷庶幾選人到部不至臨期失望官吏知有所畏無敢飾僞以罔公上亦可以助陛下謹守祖宗成憲之一端也孝宗乾道六年周必大上言曰臣竊見在法選人曽歷一任方注縣丞有舉主關升改官方得為邑重民事也今初官為尉偶獲强盜七人不待滿考便可改秩其間未經任者雖注監當亦理親民資序又有徑為邑者則是擇令輕於擇丞臣竊以為過矣異時山東河北之盜類皆桀黠驍果其徒不繁而能橫行於州縣賞格之重或以示勸今江湖閩廣山長谷荒無知之民春夏歸農秋冬散剽所在有之藉令為尉者勇能執俘藝可奪矟猶於邑政未遽習也況弓兵格鬬而獲司獄傅㑹而奏其弊尚多若不稍加釐正臣懼子産有傷割學製之譏也願詔有司具為令應縣尉獲賊當改官者吏部先給公據候歷任及六考以上方許收使彼既無營求舉將之勞而考第稍多免初等細轉之迂名緩其期實厚其賞所貴稍更民事不至政學七年必大權禮部侍郎上言曰臣聞政有似緩而實急者科舉是也夫以士子一日之長而欲驗其終身之事業疑若迂濶矣然昔人賦有物混成及金在鎔而識者遂以公輔期之蓋有學有文形於筆端決非闒茸之士而骫骳剽竊者必常才也本朝取人雖曰數路然大要以進士為先陛下篤意人才士之求試于有司者日益衆惟是三嵗發解凡州縣官茍有出身不問才否例差考試其間富於學識固不乏人亦有工聲律者未必通經習經術者未必能賦或學殖不豐懵於文體或久去場屋忘其舊業命題彂策往往顛倒事實背違義理故當校藝之際則平凡者收優異者斥至使真才實學一鬱而不伸庸人假儒僥幸而濫中非所以崇雅黜浮勸勤抑惰羅英俊育人材也兹事體大臣心知其弊而未敢輕為之說願下此章於學官俾之博詢諸生條上利害然後命廷臣雜議而詳處其當斷自後舉行之非特於學者甚惠抑庶幾名臣輩出如祖宗盛時於以助陛下之大有為不亦善乎必大又上言曰臣聞知人則哲帝猶難之然所以能官人者舉得其要故也舜問疇若豫工滿朝專以垂對又問疇作朕虞滿朝皆曰益可上不泛問下不泛應是故所取必合衆論所用必稱厥職不亦簡而易行敏而有功也歟本朝太平興國六年特命翰林學士承㫖李昉等十一人於常參官內各舉堪任三司判官及轉運使者一人淳化三年又命宰執翰林學士御史中丞尚書丞郎兩省給諫以上各舉一人是亦唐虞之遺法也仰惟陛下急於圖治勞於求賢乃者嘗詔監司臧否守令矣略計諸路所薦無慮數百繼命侍從臺諫設四條薦士矣合在廷所舉又百餘人既不可以悉褒而盡用不過召見一二隨才奬擢其餘則籍記姓名於中書而已後有任使又將他求烏足以副陛下為官擇人之意哉臣愚欲望聖慈逺稽前代近法祖宗遇內外要劇官闕復行雜舉之制假令辦某事須某才則詔公卿各舉資任相當堪此委寄者一人然後取衆所共稱者而用之其利將有四焉合廷臣之意不患於不公一也採衆人之論不患於不精二也遇闕而亟求則囑託之私絶三也既舉而必用則虛文之弊革四也惟陛下留神財幸淳熙三年必大為兵部侍郎上奏曰伏準御筆凡監司郡守欲盡加精選但恐才能應選者少而資格合入者多如此則又有淹滯之歎二者當如何哉卿等可議來上臣等聞古者為民設官為官擇人故凡監司郡守皆當選才能而任之不當專以資格為限也然知人之難今昔通患非親非舊遺佚者多於是設為資格將以杜私門而開公道若在上者推而行之不膠於迹則可以得更練民事習知政體之人布在諸道而僥求躁進資淺望輕者不可得而至矣及其弊也中下之才積日纍月歷階而進至於姦利暴著不可掩覆乃遭按治其他庸鄙貪沓之人往往幸免是以朝廷而行銓部之法且取蟊賊布之郡國也其可乎觀本朝舊法改官後兩任關升通判通判兩任關升知州知州兩任即理提刑資序此一定之格也及除授之際則有以知縣資序人隔兩等而作州者所謂權彂遣者是也有以通判資序人隔一等為之者所謂權知是也上而提轉亦皆如此蓋隔等而授是擇才能也結銜有差是參用資格也今誠得才能資格俱應者而用之固無以加其次則擇第二任知縣以上有課績者許其作郡又擇初任通判以上許其作監司第二任通判以上許其作職司於資格則稍寬於才能則加詳庶幾人法並用民被實惠其或資任雖髙才能無取者自依近制或畀祠祿或處以參議通判尚何淹滯之歎哉雖然人主深居九重輔相助理萬機耳目所及或未能周知天下之才故姚崇謂擇十道按察使猶未盡得人況三百餘州安得刺史皆稱其職此薦舉之法所以自古不可廢而陸贄所以有臺省長官各舉其屬著名詔書異日考其殿最并以升黜舉者之論也今侍從臺諫兩省皆天子之所識擢以自助者也不助人主求才安所事乎若令於知縣資序以上嵗薦堪充郡守者若干人於通判資序以上嵗薦堪充監司者若干人仍用漢朝雜舉之制明言有何政績有何才術或共為一奏或各為之三省詳加察焉除朝廷自用人外所舉果才也果能也有闕則以次除授否則置之縱未盡善蓋亦十得六七矣或曰今薦舉之法弊矣有請託有奔競烏在其得才能乎曰天子之於侍從臺諫兩省不薄矣使其不自愛至於容私何所逃罪故臣等復欲檢照前後薦舉條令嚴為之法惟陛下留神采擇四年必大又上奏曰臣聞舉尓所知仲尼明訓以其為主孟子格言夫以監司郡守五人而薦一士則其可信固亦無疑其如閲時寖久流弊非一賢愚同滯取舍不公方當總核之朝所宜留意於此故比者載嚴實跡之令期革虛文之弊然非在上位者以體國為念以引類為心則把梓良材或沈澗壑駑駘下駟反被服乘豈惟無益為害大矣臣愚欲望聖慈申飭監司郡守凡舉所部官必精加選擇得其人則被以上賞非其人則坐以謬舉使濟濟多士列于王官備異時之器使不亦善乎必大改吏部侍郎又上奏曰臣聞法本無弊推而行之非其人弊則隨之自堯舜以來蓋莫難於知人既非聲音笑貌所能求又非閥閲課試所能盡其可常行者不過薦舉而已今夫選人改秩之後外可以馴致守倅監司內可以躐登臺省寺監此本朝之所遴擇陛下之所留意者也今每嵗雖有定貟而賢否未免雜進舉詞雖用實迹而是非亦或難辨其間營求囑託巧奪力取固亦有之比嵗事為之制曲為之防非不詳矣而法出姦生令下詐起者衆人之所趨勢不能遏也上下通知其弊顧未有以易之臣謂法令中明有連坐之文而其奏牘亦云甘當同罪然曠嵗踰時未聞有所懲治也今莫若申嚴此制務在必行其制既嚴其選必遴縱未能盡得俊傑之士比之泛然而取則有間矣昔治平間英宗方倚樞密直學士李參知秦州㑹所舉人坐贓特命奪官夫以守邉之臣宣勞於國猶且不廢絀罰況餘人乎此亦救弊之要道也淳熙中袁說友上言曰臣仰惟陛下踐祚以來留意人物急賢選能惟恐不及或命侍從之臣隨才公舉或命監司郡守嵗舉所知一有上聞以次收用蓋欲多士濟濟輔成治功四海之士皆知砥厲激昻求以上副公朝崇奬之寵惟是未聞詔頒郡國搜舉逸民示國之表儀新天下之觀聽如前代故事者要亦似為闕文也臣兹者恭遇陛下祇遹舊章肇稱毖祀對越天地均釐寰海旁流祭澤行慶大賚于是乎渙彂明詔訪舉逸民使天下歸心野無遺逸厥今實其時也臣恭惟藝祖皇帝之召王昭素真宗皇帝之召种放二人者皆時逸民一登周行士所歆慕而化民成俗興治起功賢才彚征悉基於此蓋已然之明驗也方今天下乂安文物隆盛山林巖谷之下殖學藴德懷才抱智而不求聞達不事科目者固豈乏人哉臣愚欲望聖慈遵祖宗之舊憲念逸民之見晚如所謂淹貫經史學業有用博通今古明達世務節行峻潔識量髙逺負才宏大有志經綸凡是四目皆推重鄉里不求聞達不事科目者願於大禮慶成之日明降德㫖命帥臣監司同加搜訪詳為考察照所立四目每路共舉一人仍具所舉人事實連銜結罪保明限一季具有無聞奏即不得以常才非隱逸者備數然後下之三省再加審究如所舉不妄即賜召用以風厲四方鼓舞人物仰當陛下對天交神之初斂福錫民之意實天下厚幸說友又上言曰臣竊惟今日之法其犁然當於人心不可一日而易者銓試是已茍非已銓而中雖有以恩例而進以特㫖而免然朝廷必不敢除給舍必不敢書吏部必不敢擬行之甚公持之甚力無有一幸免者誠可謂良法矣而近年以來法出姦生弊幸紛起徒知銓試之法可以律仕子而不知試闈之弊反有甚於不銓而仕者嵗復一嵗姦計百出臣請得而詳言之今一嵗則一銓銓者不下三百人自試闈法嚴之初子弟來試其才否雖不同同於自試其文無它說也試闈寖寬乃始有以賄賂預結同試之能文者約以酬勞之直定以綴榜之數復囑巡案之吏使之場中寬其伺察然後能者以代不能小則口𫝊大則授草甚則易卷此固已可嫉矣今大不然則又甚於此者自數年來專以厚賂內外囑託異鄉無圖之士則預謀兜攬如罔市利諸郡報榜之徒則與之尋囑有同置局內則試題甫出密𫝊於外急如星馳外則同謀士人得題共作尋復𫝊入出入之路或由金口門或自墻穴入或由水筒進或雜於食物之內或隱於瓶盎之下姦計萬狀未易殫舉夫能使試題之出於外與文字之復於內者此非上下相交受賂脉絡貫穿彼此一律安能往來䝉蔽如風雨鬼神之迅速哉且場屋所恃者門有監官官有巡案巡有邏卒又皆各有兵吏互相察視惟其一以賄賂悉美衆口交𫝊往復如臂使指嵗嵗為例各有定價率一人之銓而幸中者凡捐金千緡使朝廷良法美意無復可恃而子弟之果於修學者不得而自見其庸繆多資者不復修習惟以賄賂而占前列珉玉弗辨才否混淆大非國家程能審官之意今來已引銓試所有關防禁戢之䇿目即已是不及臣愚欲望睿斷深鑒上件情弊候今來銓試榜出如試中人應參部曰先於吏部尚書廳簾試一次經義人試小經一道詩賦人試省題詩一首長二臨時於六部郎官內不測輪㸃有出身人一貟赴尚書㕔出題簾試仍以簾試卷與銓試卷辨驗字跡有無同異其紕繆全不成文與字畫兩體者取㫖黜落庶幾今嵗先革代筆冒濫之弊貼黃臣所陳上件銓闈情弊今雖銓試已畢它日豈宜不行措置欲望朝廷下吏部長二俾之共議關防禁戢之策何前日易於約束而今日乃略不敗露須究其由得其要領務貴詳盡期於大革前弊開具聞奏施行庶幾自來嵗以往便能剗剔姦弊一新觀聽亦教化習俗之所繫也併乞施行實天下幸甚說友又上言曰臣竊惟國家取士之道條約最密沿隋唐之舊制以進士為首迄於今日大抵先辭華而略行實要未能盡無遺材之歎臣嘗觀三代兩漢其取士之法甚要而得人之效後世莫及蓋其專求行實而務於可用故凡任君之事者皆純厚而堅正洪毅而該敏足以任重致逺振舉百職風俗渾厚治道粹美較之隋唐雖法之詳略不同而所得之才固異矣今朝廷取士惟進士之科最大自進士外雖有賢良一科又不可以數致率皆純用文辭為去取而於行實則所不問方陛下求用實材實行之時若取士之路秪專於文辭而不兼求行實臣恐未免遐遺也今天下巖穴草茅間固有為鄉里所推懷才抱德行實純懋或志節慷慨操履剛正或學識該洽智略詳敏或其才可以治民或知兵可以制敵凡此類者往往多以場屋一日之程少乖時好蹭蹬弗偶進士之外它無可進之路而賢良之科又非人人所能應選遂至老於場屋有終身泯沒而不少露者因噎廢食可不為聖時惜哉臣愚欲望睿斷以實才實行為急務特頒明詔令諸郡詳加搜訪嚴為取豫各薦如前所陳實材一人大郡二人須本州鄉黨衆所推信知通保明申監司監司盡公體國不得少徇私意廣行物色見得某人實應上項條目然後以名來上命宰執臺諫後省視其所以果見可用令召試學士院量人材以授官爵漸次擢用若所舉不當並行黜罰或果得人優與推賞茍一郡得一實材則終嵗之間可得數百人或僻逺小郡無人可薦及它郡偶未有人皆毋强以必舉將見實材輩出萃於朝廷緩急之時足以立事誠為國之大務也惟陛下深切留意而亟行之天下幸甚貼黃議者或以方此官冗恐難更立表薦之目臣竊見進納入流官多是無所知識之人又皆不曽銓試秪為州縣之纍乞降睿㫖權罷進納其進納也未出官人並要銓試中選訖方許注授其已到任者候滿罷日亦俟銓試中選方許參部其已注授而未到任者亦先赴銓試中選訖方許到任若闕到一年而試未中選者並以違年法庶幾澄此雜流以容實材之薦其得失相去萬萬矣併乞睿照知信州趙汝愚上奏曰臣聞古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功天子賜之車服弓矢以彰異數國家之制監司郡守以郡縣多寡嵗得各舉所部吏古之制也其法縣令若職官須三人以上同舉舉京官者又加二人所以絶阿私示公路也然大音不合於衆耳至味難調於衆口必待一時監司郡守皆知其賢其間又不為權勢所奪每患其不齊矣於是守道自信不求聞達之士陸沉於下僚露才揚已汲汲於仕進者干託請謁無所不至風俗大弊莫可救藥臣愚欲望聖慈詔許監司郡守謹擇所部竒才異行之人聽以任滿合舉五人之數併舉京官一人不滿五人者任滿亦聽舉一人舉縣令職官亦如之茍無其人則從舊法如此則所謂守道自信不求聞達之士或為知己用而舉不以實之罪可行也庶幾崇尚亷隅俗日歸厚天下幸甚汝愚又上奏曰臣聞取才貴廣用才貴精譬夫取牛山之木以供匠石之求則方圓曲直不勝其用乃若執東門之式用以求馬則雖空冀北之野蓋無馬矣臣伏觀國家內外須才而每有不足之歎者豈非蓄飬之無素而選用之際容有未精耶然其致弊之由要非一旦之積為今之計則莫若稍嚴職事官之選蓋數年之後外而郡守監司內而卿監侍從率皆取諸此也至於廣招徠之路絶朋比之嫌則莫若用故事令侍從兩省臺諫各舉所知若干人須才行兼備而未經擢用者陛下以其姓名悉付中書籍記候職事官有闕則選諸所表以次用之其有不如所舉則坐以謬舉之罪庶幾寒畯並用官得其人若夫作成之道勸奬之方則惟陛下留神幸甚汝愚又上奏曰臣伏覩近降指揮應薦舉官並須指陳事實不得徒飾虛詞如或違戾令吏部不得放行此誠陛下責實之先務不可不致嚴者也然而號令之初體式未具上下疑慮不知所承或謂察以所居之官或謂考其平生之行人之情性靜躁不同至於職業繁簡亦異所患士無常守咸事作為務恱見聞遞相夸尚譎詐矯激無所不至矣臣愚欲望明詔有司詳定格式頒示于四方或止依倣司馬光十科之制各以所長論薦朝廷隨才任使自無虛詞溢美之弊如䝉聖慈俯賜俞允仍乞自今年下半年為始汝愚由集英殿修撰帥福建又上疏曰臣照對今日員多闕少一官至數人共之如海口鎮係京官窠闕見任人汪楫今過滿一年餘尚無人願受以此可見嵗額難辦事理灼然伏乞睿照一照對本州今次科場所納家保狀計一萬六千餘人他州軍未有其比而解額只六十二人係二百七十方解一人場屋之內寧免遺才緣此士人遇大比年分流溢散漫或聚都城或趣他路陳乞附試干覓漕牒甚者久棄親養抵冒鄉貫僞濫之事種種有之朝廷前後約束非不諄切而習俗相延未能自反臣詢究士風大抵地狹人衆户多業儒進身之途既難奔競之心愈切雖誠可罪亦在可憐臣竊見本州自崇寧三舍法行嵗貢士二十七人即係三年共貢八十一人及罷舍法行科舉本州始定解名六十人至紹興二十六年因罷流寓試續添二名共成六十二名然罷舍法之初當時就試人數大率不過三四千人今六十年間纍舉增加人數已逾五倍而解名尚仍舊貫竊聞今來又不放行附試即臨時奔還本貫就試人數轉多欲乞朝廷特賜矜念一方士子之衆與依崇寧貢額定取八十一人雖近日官冗之患正務撙節然約所增解額將來省試只添得一名設使其中收羅得一二究心學業之人上可不負朝廷設科之意下可以慰邦人父老之心其平日困於馳騖者因今增添解名之後或能安分鄉閭以待至公之舉風俗漸可歸厚所補多矣一契勘本州科舉之盛實為天下之冠然緣人數太多考校不精亦甚為害臣嘗以前舉終場人數計之一萬五千餘人通三場共為四萬五千餘卷試官十員正使窮日之力豈容銖錙比較臣詢之父老數十年前就試者人數未多當時場屋甚為整肅考官得以盡心士茍負才學馳月旦之評者無不預薦名故人知力學自重比年以來人數不啻數倍而所取之人反不如舊蓋緣玉石相眩長才實學往往為庸流所混且有程文不曽經考官之目而例被沈淪者誠為可惜竊惟國家設三嵗大比之科將以網羅賢才為異日選用之儲也今乃以人數之多致去取之際復不能盡厭士論豈足以仰副明詔丁寧郡國之本意哉兼本州舊有試院今緣士子衆多屢行改闢猶自狹隘以至通併轉運行司展移曹職官廨舍每遇科舉年分動是數月上下勞擾至入場之際韋布紛然競欲爭先深有奔突蹂踐之患每引試三日官吏惴惴然常恐别有踈虞如所差謄録人率用七八百人併在舊屋數間之中夜以繼日不容休息每舉常有疾病以至死者其間利害不容殫舉臣伏見朝廷前此患太學補試之冗嘗創諸州待補之法行之兩舉天下甚以為便臣今來欲乞於本州每舉科場年分預於二月中通定一日從本州互差官下逐縣如武舉法先行比試一次率兩人取一名赴秋舉謂如一縣千人比試今先取五百人則冗雜之流既以沙汰而英雋之士不致漏遺將來秋試易為考校其所取待補人即乞照纍舉體例通以赴比試終場人數為額更不裁減如䝉朝廷施行一則可以收拾人才而真僞不至於混淆二則可以革去宿弊而場屋不至於喧雜三則可以省減有司之費為一方永久之利汝愚制置四川兼知成都府又上奏曰臣伏䝉聖恩不以臣愚不肖付以全蜀軍民之寄臣自入境所過夔梓兩路已備見閭閻窮苦之狀比至成都日與士大夫相接及受接人户詞狀又見得利州一路物輕錢重民間愈覺艱難至於㳂邉數州之民又苦差使繁重惟成都一路素號繁華緣自軍興以來困於支移折變日朘月削寖不可支全賴為守為令者各以體國愛民為念服勤職守加意撫摩如臣所見所聞蓋有尚可議者臣伏見陛下自即位以來勤恤民隱東南諸路凡守令有政績者皆許諸司薦舉省郎臺察多出此途惟西蜀去朝廷最逺雖名卿才士揚歷清要固不乏人蓋未聞顯然有以治績䝉薦進者是以蜀士大夫類以文藝相髙而於法令最為踈略雖風俗好尚容有不同亦由朝廷所以勸奬作成之道或有所未至也臣愚伏望聖慈下臣此章戒諭州縣各使盡心職業寅奉詔條如能學道愛人興隆政化或奉公潔已省節財用或興利除害可為後法並許監司論薦具以實聞若乃阿黨徇私所奏不實者仍許臣覺察或有贓汙不法為害一方而監司守臣互相容庇不行舉按者亦許臣具事狀聞奏庶幾上下相維小大咸勸萬里逺民俱受大賜厯代名臣奏議卷一百六十九
