body:
  text: 歷代名臣奏議卷三明楊士竒等撰君德宋高宗建炎元年尚書右僕射李綱上奏曰臣聞昔有夏先后方懋厥德罔有天災山川鬼神亦莫不寧暨鳥獸魚鱉咸若而伊尹之稱商則曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德帝王之所以為神民萬物主者仰以動天俯以感民非德何以哉方今國家新罹敵人之禍百度多廢四方未寧乃天意民心去就之際伏望陛下日新盛德以感動之體堯之仁以覆民躬舜之智以察物卑宫室菲飲食以法大禹之儉遠聲色遺貨利以法成湯之明至於日昃不遑暇食如文王之憂勤一怒而安天下之民如武王之果毅豁逹大度同漢高祖之用人聽言如流同唐太宗之納諫勿以小善為無益而弗為勿以小纍為無傷而弗去日愼一日新而又新思宗社之危而不忘之於寤寐念父兄之辱而欲見之於羮牆出於至誠悠久不息則天意民心自然感動以圖中興有不難也書曰皇天無親惟德是輔又曰民罔常懷懷于有仁傳曰應天以實不以文動人以行不以言臣願陛下特留聖意天下不勝幸甚三年觀文殿學士張浚上奏曰臣竊惟自昔大有為之君莫不內剛以立事外柔以待下內剛所以堅在已之志外柔所以來天下之賢易曰天行健君子以自强不息其意以謂人君之德要當抗以剛大持以至誠是以在乾則以剛健中正純粹精也以象人君之七德在大畜則曰剛健篤實輝光日新其德以言人君之自養古之聖人未嘗不以此持身者是以文王拘於羑里而王德日修少康有田一成有衆一旅而夏后氏之基復振向使文王以被辱為羞少康懷退縮之志則二王之業無自而興矣豈獨文王少康為然哉漢髙祖先入關中於懷王之約當王全秦之地項氏不義肆行威劫當是時鴻門之㑹僅以身免其後屢戰屢敗事幾可笑太公吕后為質敵人而高祖之氣未嘗少屈終能滅項氏而有天下此亦內剛以立志之效也陛下繼祖宗積纍之基承人心推戴之業上天昭格眷佑顯然以陛下英斷之資仁儉之德何求而不得何為而不成顧惟風俗之壞積有嵗年天其或者俾陛下一變舊風重致治效是以敵人侵突無嵗無之而生民轉徙比昔尤甚天意亦欲以堅陛下有為之志啓下民願治之心也孟子曰天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身所以動心忍性增益其所不能人常有過然後能改困於心衡於慮而後有作出則無敵國外患者國常亡然後知生於憂患而死於安樂也願陛下勉之至於飲食之奉起居之養喜怒之節願陛下以道寧志守以恬淡持以戒謹無使隂陽之冦或至傷和上念祖宗委寄之重下念生靈繫望之深自然動靜之間不至乖養臣言狂切幾至犯分然區區具述至此其中心之所感激者已不覺涕泗交流矣願陛下無忽於須臾臣與天下不勝幸甚建炎間開封尹宗澤上奏曰臣昨奏乞修寶籙宫為淵聖皇帝他日涖止之所未䝉降㫖臣聞有子曰孝悌也者其為仁之本歟知孝悌則不犯上不犯上則天下治矣恭惟陛下孝於道君則天下莫不愛其親陛下悌於淵聖則天下莫不欽其兄是知上有所好則下必有甚焉者矣此所謂以身教者也臣竊見隆德宫面勢翬飛孔安如舊將來迎奉道君皇帝自可臨御願陛下預勑有司灑掃嚴潔使天下知陛下孝於父淵聖將來還歸未有涖止之處臣欲乞將寶籙宫改建以為迎奉之地使天下知陛下悌於兄也推而行之薄海內外父父子子兄兄弟弟黎民不時雍而萬國不咸寧者未之有也如䝉俞允伏望斷自淵𠂻御前處分行下付臣施行樞密院編修官胡銓上奏曰臣竊聞近日中外洶洶之議皆以外敵方强吾兵力不敵為患臣竊以為不然昔魏文侯恃山河之固吳起對以在德不在險楚子問鼎之大小輕重王孫滿對以在德不在鼎今日之事臣亦以謂在德不在兵夫誠能修德以結民心以固吾圉兵雖弱未害也德茍不修而惟兵是急惟民是殘兵雖强未善也彼謂外敵方强而吾兵力不敵者非善覘國者也臣嘗讀春秋至魯昭四年晉司馬侯對平公之言未嘗不反復太息歎其切於治體也方楚靈為封豕長蛇荐食上國使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸於德吾猶將事之况諸侯乎若適淫虐楚將棄之吾又誰與爭美哉斯言聖人復起無以加毫末於此矣臣於今日亦云區區管見如此惟陛下裁幸銓又論持勝疏曰臣聞有道之主能持勝自古賢君良臣更相敕戒未嘗不以戰為危事然而居危思安之心則同而居安慮危之心則異陛下留神春秋臣請以春秋之事明之楚子之克庸重耳之城濮秦伯之王官晉悼之蕭魚此戰而勝也然克庸之役楚人危之則曰禍至之無日又曰紂之百克而卒無後城濮之役重耳病之則曰得臣猶在憂未歇也王官之役秦伯畏之則曰同盟滅敢不矜乎吾自懼也蕭魚之役魏絳難之則曰願君安其樂而思其終是何也勝而憂也晉厲之鄢陵子國之侵蔡子耳之圍蕭齊侯之伐晉此亦戰而勝也然鄢陵之役士燮危之則曰君驕侈而克敵難將作矣侵蔡之役國僑憂之則曰小國無文德而有武功禍莫大焉圍蕭之役仲孫蔑危之則曰鄭其有災乎師競巳甚伐晉之役晏嬰患之則曰不德而有功憂必及君是何也勝而驕也勝而憂則其勝為福故曰知懼如是斯不亡矣勝而驕則其勝為禍故曰虢君驕而驟得勝必棄其民矣此治亂興衰已然之明效也陛下以神武定四方相賢將良動則有功兵興以來未有如今日之勝者然勝非難持之則難願陛下以春秋為鑑而謹持之則社稷之福也抑臣聞逢滑有言國之興也視民如傷是其福也其亡也以民為土芥是其禍也臣愚無識敢以此規惟陛下憐其區區之心而少賜容焉紹興二年進士張九成對策略曰禍亂之作天所以開聖人也願陛下以剛大為心無以驚憂自沮臣觀金人有必亡之勢中國有必興之理夫好戰必亡失其故俗必亡人心不服必亡金皆有焉劉豫背叛君親委身夷狄黠雛經營有同兒戲何足慮哉前世中興之主大抵以剛德為尚去讒節欲逺佞防姦皆中興之本也今閭巷之人皆知有父兄妻子之樂陛下貴為天子冬不得溫夏不得凊昏無所定晨無所省感時遇物悽惋於心可不思所以還二聖之車乎九年右正言陳淵上奏曰臣聞孔子之言智仁勇曰知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣夫自修身治人以至為天下國家莫不以此故子思子曰智仁勇三者天下之逹德也所以行之者一也無所不逹而行之不以一則於斯三者莫知所先後矣臣至愚甚陋陛下不知其不才處之諫省若將責以言者臣井蛙之智誠不足以測知滄溟之大亦何所言然臣嘗讀中庸之書竊窺三者之㫖求所以合乎聖德者以謂陛下仁智則有餘矣而獨於勇未嘗加意焉此臣所以不能無疑也何以明之陛下無所不知而能行其所無事智之至也無所不愛而能克已以消兵仁之至也乃若抑畏太甚而示人以弱則靳於勇矣夫勇非撫劔疾視曰彼烏敢當我之謂也如天之行健終古不息如水之攻堅强莫之能先操至權以默運斡萬化於不測夫是之謂真勇神器待之而後安四海依之以為命其又可略耶昔者以大事小莫若湯之於葛文王之於昆夷以小事大莫若太王之於獯鬻勾踐之於吳孟子蓋嘗以是為仁且智矣彼其處心積慮豈有異於陛下乎如太王勾踐固不足為陛下道至於湯文之事乃陛下之所安行者然以臣觀之湯事葛文王事昆夷雖曰無所不至及其十一征而無敵於天下命將帥遣戍役以守衛中國亦何有於葛與昆夷哉故忘巳以樂天者雖聖人之事而用兵以保民者亦王者之所不得巳焉此湯之勇所以表正萬邦文王之勇所以一怒而安天下之民也由是言之湯之於葛文王之於昆夷方其事之也勇巳行乎其中矣第不露其威而巳今陛下之於鄰國將不露其威乎亦將信之而不以為備乎此臣所以通夕不寐求其說而不可得也或曰小役大弱役强天也順天者存吾何容心哉臣則以謂欲知天道視民之去就而已民心歸之天其有不從乎湯以七十里文王以百里其强大不足言矣而孔子以湯武之事為順乎天而應乎人得民故也得民斯得天矣曷不觀今日河南陜右之民乎已叛者欲歸方叛者隨悔此豈人力之所能致哉天實使之也然則或以不校為順天或以征誅為順天其義一也陛下孝悌之至通於神明凡遐方異類不可以言化而理諭者固將有以感之也則兩宫之還宜有近日未還之間隱忍以致愛親之誠既還之後釋憾以睦鄰國之好此固陛下巳定之意其誰曰不然然臣之所言蓋非謂今日之所當行也以謂天下之大宗廟社稷之重祖宗開創之至勤纍世持守之不易適當小雅盡廢之後而陛下承之其可不為後來慮乎天命靡常事變難測以天下之力過為之備以待不虞非失計也記曰凡事豫則立不豫則廢故臣願陛下稍收異議以來天下敢言之士毋或輕棄厚積錢榖以為他日糗糧之用毋或妄費密飭諸將練兵秣馬毋得輕動失信亦毋恃其不來以豫立事而養之以勇庶幾萬世根本於我乎定則天下幸甚淵又奏曰臣聞古之聖賢不能無過雖周公孔子顔子皆有過也而萬世所法焉茍知過而改之亦何足以纍德哉故曰過而不改是謂過矣過而能改善莫大焉夫聖賢之過二有形於事者周孔之過也有動於心者顔子之過也形之於事或不可悔則當改之於後來動之於心在所當克則當改之於方作故有心過有行過人主之所宜改者心過而已心過不作而行過亦無矣顔子之不二過過於心不二之於行也故孔子之稱顔回曰有不善未嘗不知知之未嘗復行也夫如是何過之可名哉祖宗之設諫官蓋不自以為無過使之進諫以補過也然形於事者可得而言而每患於難改動於心者宜若易改而每患於難言故心過非自知而改之不可也孔子之語顔回曰非禮勿視非禮勿聽非禮勿言非禮勿動所防者心過而已蓋操則存舍則亡出入無時莫知其鄉者人心也而人君之在天下一日萬幾語默動靜之間所應多矣安能無過而居補過之職者亦何所致力哉然臣嘗聞之師曰心有私焉過也仁而不私則無過矣心有偏焉過也公而不偏則無過矣心有利焉過也義而忘利則無過矣是三者正心也理義之心也過或生焉如太空之有雲霧乍起乍滅而空之體常自若也如明鑑之有塵埃或去或留而鑑之體常自若也於此乎知之則偏私而利將無所容矣是之為說見於論語之所謂仁子思之所謂誠孟子之所謂性堯舜之所以帝禹湯文武之所以王以心傳心後之王者不可不知也故臣願陛下所防者心過而行過自無者以此敢緣職事輒陳所學庶幾㳙塵有補海嶽區區僣言惟陛下赦之高宗時御史中丞廖剛上奏曰臣聞人之言曰豫無樂乎為君惟其言而莫豫違也仲尼以為斯言或可以喪邦故人君之患莫大乎好人從已若大臣惟一人之從百執事又惟大臣之從則小大之政必至於委靡爛熟不可為而後慊是豈所以為天下哉故君臣上下不貴於同而貴於和和者可否相濟之謂也言有當愆事有逆順一切惟理之從而相臨之勢不行於其間然而治道不興者未之有也伏望聖慈謹察乎此舍已從人樂取諸人以為善常不忘舜之所為則大臣百執事自當效上之德阿諛順㫖之風不復見於有道之朝矣天下幸甚權中書舍人張孝祥上論曰漢文帝可謂知道也巳不以我之休戚易天下故約於處已而天下以尊榮歸之詘於一時而萬世以盛德稱焉炎正傳祀彌於四百文帝所以固結天下之心者在是也夫儉非難而出於誠之為難民至愚而神不可以文具化也慎夫人不出房闥而天下知其衣不曵地文帝亦庶乎其誠矣其於富海內而興禮義也何有昔者舜禹之世而苗民不格夷狄之患何世無之不曰舞干羽乎文德誕敷而後干羽可以懷遠不然抑末也丐奴盜邊文帝猶恐傷民不欲深入蓋諱兵而不用也然當文帝之時疆埸無甚擾丐奴浸亦帖服文帝所以為强在德而不在兵也夫强固不在兵而軍政不可不修細栁之屯帝識其為真將軍當饋而歎然後又知文帝勤於修德猶不敢一日而忘兵也殿中侍御史張守上劄子曰臣聞創業之艱難守文之不易古今以為名言臣竊謂中興之君則於守文之時而行創業之事蓋為尤難何以言之創業之君則崛起於干戈百戰之餘撫循於人心厭亂之後守文之君則當天下之升平無事而先王之法度可遵殆未為甚難至於中興之時則不然狃於治安上下茍玩禍難遽作不容枝梧敵國方强而未衰也寇盜方起而未息也兵驕而責之戰財匱而費益廣民力困弊天災流行乃於是時扞外治內振紀綱修法度復先王之大業比之創業守文誠為尤難自非人君側身修行痛自貶損豈足以致治哉恭惟陛下體斤斤之明纂承大統念元元之災焦勞聖心踰年於茲矣然而二聖母后尚寓沙漠雖祈請之使項背相望而平安之問初未通也兩河鞏洛猶未收復則敵國未衰閩粵淮右尚困討殺則寇盜未息軍士所至輒縱暴略則兵驕而不可用也府庫所出費倍前日則財窘而莫之繼也流亡未復而民力困弊飛蝗遍野而天災流行臣於是時誠知其難矣又復自念責難於君之義不敢不盡臣子之恭也臣聞傳曰君以為難易將至矣君以為易難將至矣又曰動民以行不以言應天以實不以文書曰惟德動天言有德則為天所佑也又曰至諴感神言至諴則為神所依也有德而不能動至諴而無所感則聖人之言是欺後世矣伏願陛下處宫室之安則思二聖母后穹廬毳幕之居也享膳羞之奉則思二聖母后羶肉酪漿之味也服輕暖之衣則思二聖母后窮邊絶漠之寒苦也握豫奪之柄則思二聖母后語言動作之受制於人也享嬪御之適則思二聖母后誰為之使令也對臣下之朝則思二聖母后誰為之尊禮也要如舜之兢兢業業如湯之栗栗危懼如大禹之菲惡如文武之憂勤聖心不倦盛德日隆而神天不為之助順者萬萬無此理也日者伏聞聖體小失調護罷朝兩日臣下憂懼不知所云蓋以宗廟社稷之重海宇億兆之衆託命於陛下一人而已更願陛下於衛生之經少留神焉漢王吉有云俯仰屈伸以利形進退步趨以實下吐故納新以練藏專意積精以適神此言可以行也漢枚乘有云出輿入輦命曰蹶痿之幾洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥此言可戒也以陛下生知之聖必深明乎此而臣猶區區以為言者出於愛君憂國之誠而不自知其進越惟陛下裁赦守又上劄子曰臣仰惟祖宗基業垂二百年積纍之久圖回之勞憂勤恭儉垂訓萬世陛下纂服適際艱難之時歲苦邊鄙之暴而根本之地盡為敵區今則屬車駐於江南越在一隅而四方朝貢之職尚未修也二聖留於沙漠行及三歲而一介咫尺之問尚未通也九廟播遷而神主未盡奉安諸陵阻遠而松檟失於保護財用窘竭而費出滋廣將士惰驕而無所禀畏加以苗劉之變生於肘腋今雖宵遁而公肆剽掠浙東騷然為患未艾政如虛羸之人病久變生砭劑靡及中外臣子雖痛心疾首莫效敉寧之方朝廷大臣雖勞形怵心未聞經濟之略今日所恃以茍存者大江之險而巳若防秋之策一有不善而一騎南渡則無可言者他日不幸至此不過遷謫大臣誅戮將帥亦何所益禍福利害陛下實任之伏望陛下念祖宗基業之重增修恭儉之德益勵憂勤之心勉其所難節其所欲至誠不倦則盛德日新而上下孚信神天佑助將何往而不克哉昔越王勾踐為吳所敗食不加肉衣不重采卒能報吳衛文公為狄所遷大布之衣大帛之冠晚年兵車致十倍之衆况於陛下為天之子動靜語默上與天通固非臣下所可擬倫儻修德不已則恢復大業亦豈甚難昔盤銘紀成湯之德曰茍日新日日新又日新言其修德有加而無已也更望訓飭大臣日以禹惜寸陰之義汲汲措置仍詔行在職事官及沿江帥守監司條具守江之策以聞擇其可者而亟行之臣言狂瞽惟陛下裁赦守又上劄子曰臣近緣奏對論及金人深入陜右伏䝉聖諭謂自古人君要須有德豈有專事殺戮而能長久者大哉帝王之言也臣退竊歎仰陛下深識遠慮輩古帝王因敢復進修德之說伏以國家自金人犯順憑陵中都殘破郡邑兵不用命非敗則潰自崇寧以來不獨軍政不修賞罰失當亦由大臣導諛近習蔽欺以敗主德卒致禍亂宗社危於纍卵賴陛下勃興神器有屬薄海內外延頸望治然自今春以來金人所破甚於前日唐鄧均房陳蔡汝許青齊淄濰同華秦隴長安鳳翔西京河陽鄭州等處皆被焚掠雖熙河涇原仰憑天威連獲勝捷而敵巢河陽猶未退舍近者又聞韓世忠兵輒亦敗衄夫以陛下留神軍政信賞必罰而世忠名將統領精鋭未能成尺寸之功主憂臣辱計無所出臣竊意其天未悔禍患毒未已而又去冬徂春雨雪過多入夏已半暑氣未壯陽微陰盛灼見不疑災變之頻必有所自恭惟陛下以聰明神武應天順人宗廟社稷之所為主四方萬里之所託命者陛下一人而巳更願上思宗社之重下念生靈之艱痛憤夷狄之恥修德以格天意庶幾信順獲助天人書曰無怠無荒四夷來王又曰明王慎德四夷咸賔言德足以服四夷也昔舜之時苗民逆命帝號于旻天負罪引慝祗事瞽瞍誕敷文德舞干羽而有苖格文王伐崇三旬不降退修德教而復伐之因壘而降夫舞非伐叛之謀壘非決勝之計卒能服之者修德故也伏望陛下以虞舜文王嘗試之效為心寢食起居二聖是念屏聲色逺佞人容直言恤民隱日慎一日至誠不倦自然德盛而日新率普雖遠自然心悅而誠服傳曰動民以行不以言應天以實不以文動民以行則人助之應天以實則天助之人助則用命天助則降康將何求而不得區區之愚念此至熟惟陛下採納劉行簡進故事曰魏武侯謀事而當羣臣莫能逮朝而有喜色吳起進曰今者有以楚莊王之語聞者乎武侯曰未也莊王之語奈何起曰莊王謀事而當羣臣莫能逮朝而有憂色申公巫臣曰君朝而有憂色何也莊王曰吾聞之諸侯自擇師者王自擇友者霸足已而羣臣莫之若者亡今以不穀之不肖而議於朝羣臣莫能逮吾國其幾於亡矣是以有憂色莊王之所以憂而君獨有喜色何也武侯逡巡而謝曰天使夫子振寡人之過也臣嘗謂人主之憂莫大乎國無謀臣茍無謀臣不可以為國矣故有為之君不以獨智先物為能而以衆智不足為憂懼事變之鼎來而謀不勝應也今羣臣之謀反不逮君謂之無謀臣可也楚莊之所憂而魏武侯乃以為喜是何見之相戾耶朝錯謂五霸不及其臣故屬之以國任之以事使其臣之謀乃不逮君則臣知其不能霸矣漢高帝嘗曰運籌帷幄之中決勝千里之外吾不如子房蓋不以不如為恥此其所以能兼衆智屈羣策而成大功也書曰能自得師者王謂人莫已若者亡謂人莫已若者好自矜大而已然猶懼焉况其臣真莫及之將誰與謀臣故以國無謀臣為人主之大憂也權吏部侍郎汪應辰上奏曰臣恭惟陛下清心約巳仁民愛物比者洊下明詔廢甲庫罷教坊減邏卒出宫女盛德之事一皆出於聖意非羣臣所能預縉紳大夫交相告語以為聖德日新天意可見惟是和戎以來諱兵不言幾二十年中外之人習熟見聞以為朝廷規模止於如此今乃一旦整飭奮厲修舉兵政小民無知或疑其未必然以臣觀之此亦無足怪者傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之胸丐而易其行況今日之事特出於民志之未信而陛下所以動天地通神明者亦豈有待於外哉臣嘗竊考自昔興衰撥亂之君非獨其才術勝人也要必有修其在我之道焉漢高祖入關中財物無所取婦女無所幸范增知其必有天下光武入河北馮異勸之曰當行人所不能為者於是節儉飲食動遵法度鄧禹吳漢寇恂邳丹耿純劉植之徒望風慕德奔走踵至夫修之於此而敵我者懼慕我者勸則高光之所以卓然成功者此其本也臣願陛下推今日之所以行者擴而充之凡無益之作其去之惟恐不盡凡利民之事其行之常若不及表裏如一細大畢舉至誠不息真積力久發為輝光流為潤澤則盛德大業皆在於陛下彼其一時紛紛之說復安在哉孟子曰古之人所以大過人者無他焉善推其所為而已此亦微臣惓惓之志也孝宗乾道三年十月汪應辰自成都召還上奏曰臣竊觀漢宣帝厲精為治其丞相魏相數上疏反復懇切以天道民事為言又敕掾史案事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之蓋宣帝君臣之間更相警戒未嘗不在於畏天愛民而唯恐有所不知不聞其精神之㑹念慮之積政事所設施規模所成就終於使吏稱其職民安其業非茍然也唐史亦稱明皇厲精政事然姚崇為相山東蝗起倪若水盧懷慎謂當修德崇皆彊辭以却之專以遣使捕蝗為事其後明皇將幸東都而太室屋壞宋璟蘇頲請勿行以答天戒崇獨贊其行使明皇忽略災異而無恐懼修省之意治不克終以致天寶之亂崇實啓之夫欲治而不知以畏天愛民為本其明必有所蔽其志必有所移治亂之幾固已分於此矣恭惟陛下日致孝道躬行儉德無宫室苑囿之娛無聲色玩好之惑省覽庶政不遺細微延見臣下不間踈賤至於雨暘或愆則焦勞淵衷減損常度潔嚴禱祠以導迎善氣嵗或不登則除租賦發倉廪以賑救乏絶州縣水旱而奏報不以實與夫檢視不以時者皆正其罪戒慘刻之刑郤羡餘之獻詔書屢下德音甚厚所謂畏天愛民之實陛下固已見諸行事以幸天下矣然臣竊以天人之理無窮而聖人之心未嘗以自足伊尹周公之言天曰難諶曰不可信曰我不敢知以堯舜之盛而以知人安民為難以修已安百姓為病夫在天者常有所不敢必在已者常有所不敢易非茍為是謙退抑畏而已乃其理當然也伏願陛下以聖心之所自得而聖政之所已行者擴之以廣大持之以悠久陟降不違微顯如一凡言行之發刑賞之用大公至正無非順天理而服人心則感應召致以為天下福者將日新又新矣孟子曰古之人所以大過人者無他焉善推其所為而已臣不勝惓惓五年應辰為敷文閣待制又進故事曰唐太宗問給事中孔頴逹云孔子稱以能問於不能以多問於寡有若無實若虛何謂也頴逹對曰此聖人教謙耳巳雖能仍就不能之人以咨所未能巳雖多仍就寡少之人更資其多內有道外若無中雖實容若虛非特匹夫君德亦然故易稱䝉以養正明夷以蒞衆若其據尊極之位炫耀聰明恃才以肆則上下不通君臣道乖自古滅亡莫不由此太宗稱善臣竊惟聖人聰明睿智首出庶物而不有其善不居其聖謙冲退託委曲周密以通天下之情以兼天下之智此所以為聖人也孔頴逹對太宗之言簡直明白切於治道太宗能嘉納之其致貞觀之治宜矣孝宗時權吏部尚書韓元吉進故事曰後漢書鄧禹傳光武自薊至信都使禹發奔命得數千人令自將之别攻拔樂陽從至廣阿光武舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內殽亂人思明君猶赤子之慕慈母古之興者在德薄厚不以大小光武恱臣觀光武可謂知難者也語有之君以為難易將至焉方其用兵河朔僅得一郡覩天下郡國之衆怛然自畏慮巳之不能取也以問於禹為禹者以他人論之當時更始據關西赤眉青犢之屬動以萬數三輔假號往往群聚必勸其君以厲兵秣馬務其事力以角一旦之勝而禹乃曰在德薄厚不以大小是料光武必足以定天下欲廣其德以收天下之心爾嗟夫此三代王者之佐之言伊尹吕望所以思濟斯民者也故光武至邯鄲分遣官屬徇行郡縣理寃結布惠澤録囚徒存鰥寡其敕馮異有曰今之征伐非必略地屠城要在平定安集之耳皆禹有以發之也後世乃以禹不能徑攻長安為疑然禹以謂赤眉新拔長安財富充實鋒未可當盜賊群居無終日計財穀雖多變故萬端蓋姑欲假以歲月待其自斃也禹之謀固不盡用而師行有紀降者日以千數停車住節勞來父老以慰其謳吟思漢之心光武以元功賞之豈其謀識所先後者哉今以天下之半而慮夷狄則輿地固已逺過漢光而强敵憑陵肆擾踰五十年其勢亦將自斃聖主盛德日新施者厚矣群臣宜亦有禹之謀而不計近功以圖之則中興為日月可冀也楊萬里上奏曰臣聞人主之治天下必正其治之之主人臣之相其君必先正其人主之主而小人敵國之欲傾人之國也必先敗其人主之主而已齊人懲於夾谷而謀魯也不以齊謀魯也以魯謀魯也魯以女樂罷朝而孔子行則先敗其用孔子之主也孰為用孔子之主也非魯君之心乎越人懲於㑹稽而謀吳也不以越謀吳也以吳謀吳也吳信宰嚭而子胥踈則先敗其用子胥之主也孰為用子胥之主也非吳王之心乎是故人主之有天下如富家之産也人主之有一心如富家之有家主也今也有千金之産而其家主者博奕焉酒色焉與不逞之奴客狎而不嚴焉則其千金之資人孰不視之為外府耶而其友之忠焉者不先正其家之主而欲扶其主之家是故枝其東而西傾富其左而右貧世之君子之相其君也不過曰人材之未用也民力之未裕也國未富而兵未强也太平之未有期而敵國外患未有已也是皆知扶其主之家也而未知正其家之主也古之君繼體守文不知艱難而敗其國者臣未暇言也請言其創業之難而又自敗者隋文帝取周取陳以混一百年四分五裂之天下開皇之治漢以來僅有此爾其賢明何如也唐莊宗與梁對壘於河上不解甲者十五六年百戰而氣不折卒以滅梁其英雄何如也二君者創業之難如此然皆身不免於禍而國不免於亡夫興隋者文帝也亡隋者亦文帝也滅梁者莊宗也自滅者亦莊宗也君一君也而興亡成敗之自異也蓋前日之文帝前日之莊宗正其主也其主正則國從而興後日之文帝後日之莊宗自敗其主而已其主敗則國有不敗乎蓋二君者天下之主也二君之心者二君之主也勤儉創業之心一變而為逸欲樂成之心主已敗矣當其惑於女子嬖於伶人二君自以為無害也然女子伶人之禍一發則橫潰決裂而不可救卒以殺二君之身而覆二國之祀則天下之所以治亂存亡者夫豈階於外哉亦視其人主之主如何爾今以天子之聖明仁孝而加之以典學之緝兢業如舜勤儉如禹不邇聲色如湯不盤于逰田如文王則所以正心誠意以立其致治之主者至矣臣猶首以為言者蓋聖人之防其心不恃其天而盡其人不警于危而警于安今日邊事小息矣憂顧小紓矣外息而內紓此治亂安危之所伏而未測者也豈無以新聲麗色而蠱上之心者豈無以伎巧玩好而蕩上之心者豈無以弋獵逰幸宫室臺榭而迎上之心者道塗相傳萬幾之暇毬馬稍進矣臣不敢信也而不能不懼也獨不見髙漸離之筑耶事豈必大而後慮也漢文帝之賢與成康孰先孰後也敦朴勤儉一無嗜好顧獨稍好射獵未損帝之賢也而賈誼諌之曰不獵猛敵而獵田彘玩細娛而不圖大患可為流涕賈山亦諫曰願少衰射獵修先王之道不如此則行日壞而榮日滅二臣者所以責文帝備也非責之備也愛帝之全也臣願聖天子罷毬馬之細娛而求聖賢之至樂收召天下耆儒正學之臣與之探討古今之聖經賢傳深求堯舜三代漢唐所以興亡之原而擇其中以之正心修身日就月將聖德進矣則二帝三王之治涵養於聖心而周流於天地敵國雖强其强易弱也提㸃江西刑獄公事朱熹上奏曰臣竊惟陛下以大有為之資奮大有為之志即位之初慷慨發憤恭儉勤勞務以內修政事外攘邊患汛掃陵廟恢復土疆為已任如是者二十有七年于茲矣而因循荏苒日失嵗亡了無尺寸之效可以仰酬聖心下慰人望不審陛下亦嘗中夜以思而求其所以然之說耶以為所任者非其人則陛下之神明豈可謂所任盡非其人以為所由者非其道則陛下之仁聖豈可謂所由盡非其道以為規模不定則陛下之規模嘗定矣以為志氣不立則陛下之志氣嘗立矣然且若是何耶臣誠愚賤竊為陛下惑之故嘗反覆而思之無乃燕閒蠖濩之中虛明應物之地所謂天理者有未純所謂人欲者有未盡而然歟天理有未純是以為善常不能充其量人欲有未盡是以除惡常不能去其根為善而不能充其量除惡而不能去其根是以雖以一念之頃而公私邪正是非得失之幾未嘗不朋分角立而交戰於其中故所以體貌大臣者非不厚而便嬖側媚之私顧得以深被腹心之寄所以寤寐豪英者非不切而柔邪庸繆之輩顧得以久竊廊廟之權非不樂聞天下之公議正論而亦有時而不容非不欲堲天下之讒說殄行而亦未免於誤聽非不欲報復陵廟之讐耻而或不免於畏怯茍安之計非不欲愛養生靈之財力而或未免於歎息愁怨之聲凡若此類不一而足是以所用雖不至盡非其人而亦不能盡得其人所由雖不至盡非其道而亦不能盡合其道規模蓋嘗小定而卒至於不定志氣蓋嘗小立而卒至於不立虛度嵗月以至於今非獨不足以致治而或反足以召亂非獨不可以謀人而實不足以自守非獨天下之人為陛下惜之臣知陛下之心亦不能不以此為恨也問者天啓聖心日新盛德奮發英斷整頓綱維蓋有意乎天理之純而人欲之盡矣然臣竊以其事觀之則猶恐其未免乎交戰之患也蓋詰傳寫漏泄文字之罪則便嬖側媚之流知所懼矣然而去者未逺而復還存者更進而愈盛則知陛下親寵此曹之意未衰也罷纍年竊位盜權之姦則柔邪庸繆之黨知所懼矣然而希次補者襲其迹以僥幸而不訶當言責者懷其私以緘默而不問則知陛下委任此輩之意猶在也增置諫員斥遠邪佞則兼聽之美固有以異乎前日矣然可諫之端無窮則其或繼進而愈切未知陛下果能納而用之否也辨明誣枉慰撫孤直則燭幽之明固有以異乎前日矣然造言之人無責則其或捷出而益巧未知陛下果能逺而絶之否也謝却傲俠嘉奬壯圖宜若可以勵茍安之志矣而置將之權旁出奄寺軍政敗壞士卒愁怨則恐未有以待天下之變振廪蠲租重禁科擾宜若可以寬疲民之力矣而監司不擇守令貪殘政煩賦重元元失職則恐未有以固有邦之本即是數者而論之則是所謂天理者雖若小勝而所謂人欲者終未盡除也夫以陛下之神聖仁明蒞政之久圖治之切宜其晏然髙拱以享功成治定之安久矣而嵗月逾邁四顧茫然隂陽方爭勝負未决不知將復何日何時而可以粗見聖治之成也耶聞之道路比來士大夫之進說者多矣然不探其本而徒指其末不先其難而姑就其易毛舉天下之細故而不本於陛下之身營營馳騁乎事為利害之末流臣恐其未足以端出治之本清應物之源以贊陛下正大宏逺之圖而使天下之事悉如聖志之所欲也昔者舜禹孔顔之間蓋嘗病此而講之矣舜之戒禹曰人心惟危道心惟微惟精惟一允執厥中而必繼之曰無稽之言勿聽弗詢之謀勿庸謹乃有位敬修其可願四海困窮天祿永終孔子之告顔淵既曰克已復禮為仁一日克已復禮天下歸仁焉為仁由已而由人乎哉而又申之曰非禮勿視非禮勿聽非禮勿言非禮勿動既告之以損益四代之禮樂而又申之曰放鄭聲逺佞人鄭聲淫佞人殆嗚呼此千聖相傳心法之要其所以極夫天理之全而察乎人欲之盡者可謂兼其本末巨細而舉之矣兩漢以來非無願治之主而莫克有志於此是以雖或隨世以就功名而終不得以與乎帝王之盛其或耻為庸主而思用力於此道則又不免蔽於老子浮屠之說靜則徒以虛無寂滅為樂而不知有所謂實理之原動則徒以應緣無礙為逹而不知有所謂善惡之機是以日用之間內外乖離不相為用而反以害於政事蓋所謂千聖相傳心法之要者於是不復講矣臣愚不肖竊願陛下即今日之治效泝而上之以求其所以然之故而於舜禹孔顔所授受者少留意焉自今以往一念萌則必謹而察之此為天理耶為人欲耶果天理也則敬以擴之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之知其為是而行之則行之惟恐其不力而不當憂其力之過也知其為非而去之則去之惟恐其不果而不當憂其果之甚也知其為賢而用之則任之惟恐其不專聚之惟恐其不衆而不當憂其為黨也知其為不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將惟陛下之所欲為無不如志矣詩曰豐水有芑武王豈不仕貽厥孫謀以燕翼子武王蒸哉矧今祖宗光明盛大之業付在陛下將以傳之無窮四海之內所望於陛下者不但數世之仁而已書曰若藥不瞑眩厥疾不瘳惟陛下深留聖志痛自刻勵而力行之使萬世之後猶可以為後聖法程則宗社神靈永有依託萬方黎獻永有歸在天下幸甚天下幸甚臣孤陋寡聞學無所就前此兩䝉賜對所言大意與此略同辭不别白㫖不分明曾不足以上悟聖心而陛下哀憐不忍終棄使得復望清光環視其中無他所有輒繹舊聞復以此進僭妄狂率罪當萬死伏惟陛下裁赦孝宗方鋭志肄武右諫議大夫黃洽因風諫言頥之大象君子以慎言語節飲食言語飲食猶謹節之况其他乎凡筋力喘息之間一有過差皆非所以養其身也上曰卿言無非仁義忠孝可為萬世臣子之法朕常念之衛博上奏曰臣聞君天也天以元氣祖羣物君以神道制萬方盎焉而春燠焉而夏潔焉而秋肅焉而冬盤薄乎太虛之中胚胎融液不可測知而萌者逹屈者信潜者奮生者遂人徒知確然在上若以不宰為功而不知天之所以祖羣物者以元氣之正也經之為文緯之為武威之為刑慶之為賞奔走乎四海之內動化鼓舞不可測知而大者畏小者懷亂者定肆者束人徒知巍然在上若以不勞而治而不知君之所以制萬方者以神道之設也惟元氣正則茫然運窅然化所以為天之髙惟神道設則震動靜專參侔開闔所以為君之尊仰惟陛下躬大歷服于今六年賞慶刑威文昭武烈所以恢張天紀奠安區極宥天下以不測之神者固已與天侔大無間然矣然臣猶有是說者以臣之愚竊謂陛下有四三王之資一九州之志簫勺羣慝冠帶百蠻之略而功之所加化之所被尚未酬聖神之心此臣區區所以益願陛下體乾之健秉夬之决而執神之機以運天下則何事之不成何征之不服何政之不治哉虞允文上奏曰臣伏䝉聖恩頒賜御筆曲示腹心之眷臣下拜感藏之餘竊惟陛下以天錫之智勇天授之規摹方略如臣至愚何敢望清光之萬分然出入周行七年於此仰窺陛下營經四方之遠圖終始惟一臣有以卜知上天畀付大勳大業開億萬年無窮之基者固自默定矣然天下之事有敗有成而衆人之謀有失有得得失之間而成敗遂分甚可懼也臣嘗觀自古明良之㑹精神交感於一堂之上而言意相通於萬里之表惟信與誠而已誠則不變信則不疑不疑則無間言之可入不變則無異論之可移勳業之集蓋本於此載籍所傳可考也陛下秉誠信一德方將以真情推布於下臣嘗四顧其身惟有隻影雖使之處至危之地而行至難之事亦何敢不堅其誠信傾盡肺腑勉圖於一得覬事之或成以效後日之報乎感天荷聖不能自已併及其卷卷之忠伏乞睿照衛涇上奏曰臣聞君天也易曰天行健君子以自强不息言天德主乎剛健君德貴乎自强故造化所以運用不窮而德業所以光輝日新也恭惟陛下以不世出之資乘大有為之㑹飛龍之始厲精圖治憤勍敵之逆理讐版圖之未復疆場備禦之略不忘於念慮規恢廣大之志嘗載於詠歌以陛下英武神聖鋭意事功中興之圖日月可冀然歷嵗滋久一事未就仰知天機洞照廟謨密運草茅書生固難窺識而臣所得竊聞者自陛下即位以來八策多士大抵曰兵曰財曰民曰風俗曰人才曰賞罰刑政曰紀綱法度孜孜講求不外此十數端而二十六年之間凡所規畫凡所施設凡所建立孰非所以興利除害而課效無有救過不暇行寬恤之政而民困未蘇作武勇之氣而士弱未振取財已浚而常憂之用用人雖廣而尚多遺才吏冗而未澄令行而數改舉目前之事曾無足以少稱陛下意者而何暇於規恢之大計事機易失時不再來陛下富於春秋聖子神孫本支日茂以一祖八宗之業太上皇付託之重子孫億萬年之基緒陛下一身任之可不圖終慮逺詒謀燕翼為宏遠久大之規摹僅可以茍安無事而遂已耶臣甲辰之春獲偕諸生冒上愚對嘗謂天下非治效不進之足憂而風俗安於茍且之可畏大略言陛下即位之始鋭於為治不次而用將相委任而責成功一時之臣徒肆大言誕謾亡補往往負責而去而陛下大有為之志亦因是少弛故妄議陛下前日求治傷於太急而今日之事又失於太緩故庸常之流得以持祿保身成偷安之習上下茍且莫肯任事風俗日以壞士氣日以陋民生日以困刑法日以滋天下之患將有出於意慮之外者臣嘗以更化之說為陛下獻臣所謂更化非變法易令之謂也願陛下體剛健之德堅自强之志振紀綱以尊國體明賞罰以厲偷墮起萬事於積廢圖大業於日新顧豈在於紛紛多事耶詩曰周雖舊邦其命維新此之謂也陛下過聽擢置首選兹緣故實誤恩收召綴貟班行獲因輪對瞻望天日臣竊伏惟念一介踈賤僣言朝廷大體則未信而諫聖人深戒若掇拾細故上瀆淵聽則又負夙心敢以奏篇之末議嘗䝉陛下所採録者誦言之惟陛下貰其狂愚歷代名臣奏議卷三
