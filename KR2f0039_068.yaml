body:
  text: 歷代名臣奏議卷六十八明楊士竒等撰治道元成宗時鄭介夫上奏曰竊謂釋道之教與夫子之道並立為三不知釋道之所謂教者何事背棄君親毁滅綱常捨本逐末以此教人可乎明知其非而趨從愈廣蓋闢之者不針其病彼得以有辭謂世間無佛無仙不可也誠有之一言以蔽之曰無用耳於國無益於人無濟雖宗而事之將焉用之夫聖人之道不可一日無三綱五常之理不可一日缺百姓恃此以自存無此則不能以一朝居雖無佛可也無仙亦可也況彼二者之説不過竊聖道之緒餘耳夫子之所不屑為彼方挾此以自髙夫子豈不知佛之為佛仙之為仙以其不切於日用常行故未始言之昧者反謂佛能超世夫子不能免於世佛為上一截事夫子為下一截事故夫子之不及佛也噫為是説者愚亦甚矣殊不知夫子正是上截事佛乃下截事耳季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死此一章乃三教是非之所由分也謂佛超世者以其入聖而不淪於鬼趣長生而不與俗同腐也謂聖人不免於世者以其猶未能脫然於鬼與死也其言固髙矣不思天下百萬億蒼生豈能盡為佛盡為仙乎能超世者寧幾何人泝古及今或得一於千百中或閲數世而不得一焉正自不能免於世也三綱淪而九法斁禮樂崩而隂陽隔人之類滅久矣安得有所謂佛與仙耶夫子所以不言者蓋為世道深長思也君臣父子夫婦人之大倫人稟天地之靈以生幼學壯行期為世用於人之道未能了何暇問鬼於生之理未能知何暇問死能無忝於為人能無負於此生然後反而求之可以免輪回致不死耳非佛與仙為下一截事乎況今之奉佛求仙者逐風吠影懵不知佛與仙謂何祖風法門云何如達摩靣壁九年維摩不二法門止為身計何嘗施禍福於人亦未嘗要人之敬奉後人為之莊嚴懴誦扇惑愚民非佛之真性也張道陵逺處深山薩真人一瓢自隨厭與俗接何曽妄有希求於人人亦不敢輕有所與後來設立符籙醮禳誑取錢物非祖師之初意也今見披禪衣者便拜為佛見戴黃冠者即稽為仙彼於自身尚不克保何能及人乃欲賴之以祝聖躬之夀考祈國祚之延長黎庶之安樂非大愚而何往年留都下見帝師之死馳驛取小帝師來代不過一尋常庸廝耳舉朝上下傾城老弱郊迎望風頂禮羅拜道旁不知所敬者何所慕者何其愚一至於此哉力排其非反招怪怒指為毁佛謗道幾若漆沫不可解者今以出於祖師之口者解之則可釋然矣昔達摩自南天竺來梁武帝詔至金陵問曰朕造寺捨經度生不可勝紀有何功德師曰並無功德此但天人小果有漏之因如影隨形雖有非實此語足以解求福田利益者之惑陳摶隱華山宋太宗召至闕下延入宫中與語使宰相宋琪等問曰先生得玄默修養之道可以授人乎對曰練養有術縱使白日升天何益於治今聖上洞達古今深究治亂正是君臣合德致治之時勤行修練無以加此琪等表上其語上喜甚斯言可為求神仙者之鑒愚冥之徒不知取法於此輒取其無稽之論公卿士庶合情勤奉稍有怠慢懼禍目前隨所愛欲無不聽從胡不思此輩妖妄上不足以裨國政下不足以熙群生中不足以潤身屋竭有用之財事此無用之物吾不知其何心尚論其祖風法門數椽以庇風雨榻外視猶傳舍何假乎廣廈千間琉璃萬瓦一鉢以供晨夕身外皆為長物何資乎千倉萬箱前騶後從今天下大寺觀租入巨萬徒衆千百饗用過於宫籞積蓄侔於邦賦為長老觀主者營求而得之榱題華麗珍具畢陳擁妓宴飲連宵浹旦佃客火工男女雜襲蠧政侵民無所不至經理營運結納官府不異於庶姓人家教門至此掃地盡矣若不少抑為禍滋深殆有不可勝言者唐會昌間為僧尼耗蠧天下命併省佛寺上都東都各留二寺上州留一寺中下州並廢分為三等上等留僧二十人中等十人下等五人餘僧及尼皆勒歸俗通毁招提蘭若四萬餘區收良田數千萬頃奴婢十五萬人歸俗僧尼二十六萬五百人真是快活條貫宜體此意先將西畨大師留京都者以禮敦遣悉令還國外而天下寺觀錢糧拘使輸官其遊手惰農之夫蠶食常住無異俗人各令歸農務本如果有德行真修茹枯絶欲之士雖無補於世用然息念離塵亦有可取但官給日米二升料錢二貫嵗絹五匹許置從二名以供使令每名日米二升嵗布三匹如此待之亦云足矣設或果有真佛出現當如韓文公所云容而接之禮賔一設賜衣一襲衛而出之於境不令惑衆也若夫神仙潛形遁迹不輕於降臨塵問人亦不得而見之使可見可接則非仙矣然舉此甚難悟此甚寡和之者衆牢不可破非有髙明特達之見洞察其理深明其妄不足以語此惟聖朝其採擇焉介夫又論邉逺狀曰邉逺之任至甚不輕古王者之遣將也跪而推轂曰閫以內寡人制之閫以外將軍制之故邉將咸得以便宜從事朝廷不得而專之無他謂其諳於風土習於形勢久知其人之可用與否以之臨事如身之使臂臂之使指莫不順意若待朝廷選官分任無非紈袴膏粱之子刀筆筐篋之吏不習兵事不歷艱難到彼無所用焉故昔者邉鄙用人每嵗給降空頭宣敕令帥臣就便補擬類名申奏而已以其所用之人出乎常調之外非持文墨議論者所可制其短長之命也且就安避危人之常情萬里之逺煙瘴之區在常選中者必不肯往黃石公軍勢曰使智使勇使貪使愚使智者樂立其功勇者好行其志貪者急趨其利愚者不計其死若非至貪與至愚誰肯離妻子去墳墓置身於必死之地其有輕生好名之人激節赴義之士不顧父母之遺軀求升數級之資品朝廷亦何吝一紙虛名以勉勵之然今日未嘗無邉逺選固有準保定奪者矣但保舉之初欠於立法防姦區用之後失於計功核實耳如雲南甘肅八畨兩江等處統帥藩臣一赴闕下便行保人就於京都旋揑前資以所保之品級定價例之重輕多者百錠少者亦三之二或盡數納足或先與一半或立利錢文書呈解到省官可立得以此淹困仕人街市富子每聞一帥臣至則爭先求之並未嘗涉歷塞庭練習邉事也處於豢養者不吝資財茍圖根腳又為改仕之謀出於微賤者僥幸榮名欣然勇往何濟緩急之用近兩江元帥黃實喇布哈纍保得除者幾及百數續穆爾瑪哈穆特元帥蹈其故轍公然賣保聲迹頗張甚為不雅今有劉巴圖爾平章在都而投門下求保舉者又將紛然而至矣遂致邉鄙失得才之實朝廷負濫爵之名皆諸帥不忠誤國之過也更有甚於此者今八方按堵烽燧不驚正無事於窮征逺討但務安集故地足可矣往者劉鄭二帥妄開邉釁以致雲南小有不安尺地皆祖宗之遺業一民皆祖宗之赤子不宜置之度外如八百媳婦之國素不沾化縱令盡有其土地人民初無益於聖朝之萬一生事之臣但知可以要功希賞不知有損於國家甚大也且外夷小醜何足芥蒂服不能為國之榮叛不能為國之辱得之不足以加國之富失之不足以致國之貧故古聖人以不治治之不計其去就也昔傅介子以偏使斬樓蘭王鄭吉以騎都尉發諸國兵破車師降日逐威振西域馮奉世因使大宛矯制擊莎車平諸國凡此者皆未嘗出於朝廷之命也不假乎遣將調兵無煩於運輸供給用得其人則自能集事若待稟命而行整堂堂之陳出師數萬里之逺驅不安水土之弱兵羸卒而投之不毛之地虎狼之口宜其將亡兵喪外損國體內傷國用蓋必致之理也今後逺方之事一切委任邉將借以豫奪黜陟之權責以內守外攻之效聽其擇人而使伺隙而動可以進則取不可以進則守其有赴闕朝見者乃臣子之彛禮慰諭勤渠賜宴增級足矣不許在都以白呈濫保凡有合用之人並從本處公舉完簽轉申移咨都省隨其所擬職名即與準給宣敕若不由各省咨來者别無定奪則帥臣不得以容其姦矣既除之後考核真偽有已受不任而借徑他求或已在不職而耽誤官事並須罪及本人罰及保官則求仕者揆已無能自不妄求保舉者量才無取必不輕保而邉境獲真才之用矣果能如傅介子輩卓有所立不資朝廷毫髮之費而逺拓疆土之廣則優加旌賞以示激勸此用人之微機安邉之要道善謀國者之長䇿也介夫又論抑強狀曰漢書所稱遊俠即今之豪霸也其時貴臣如竇嬰田蚡之屬競逐於京師布衣如劇孟郭解之徒馳騖於閭閻立氣勢作威福結私交連黨類權行州域力折公卿凡此者皆亂之所由生也豪俠之輩代不能絶世降俗末流弊滋甚古之豪霸猶能賑窮周急謙退不伐色取仁以合時好立虛譽以要權利今之豪霸所謂禦人於國門之外者真生民之蠧國家之賊也然有席祖父之勢者有挾富強之資者其下則有經斷官吏間廢於家務為潑皮無賴者人雖不等均之為蠧為賊耳憑震主之威執豫奪之柄死可使活生可使殺富可使貧賤可使貴此在朝之豪霸也氣爍同寅吞聲莫校威凌胥吏奉令惟謹借公道以縱賄賕營私財以奪民利此在官之豪霸也布置爪牙把握官府小民畏奉餽遺填門其孶産視為已物其妻子俾同奴婢此在鄉之豪霸也地雖不同亦均之為蠧為賊耳然在鄉者雖為豪霸之么麼而禍及於百姓則甚大也且即在下而小者言之凡有詞訟必須經手若不稟白而徑陳之有司者則設穽尋隙陷之於刑既已歸命於已而官吏有不順從者則别生事端纍贓誣告其􅐽粉可立而待也威勢既成動皆如意村落居民事之如父母敬之如神明郡縣守宰頥指氣使俯首聽命而已問有一二剛方自立奮然出為寃民施一援手僅能抑之一時被罪還家之後故態依然真是法制所不能及禮義所不能移朝廷便民之事亦甚不少微有一利舉入豪家而細民何嘗得沾濡沫之惠使美政不能下逮者盡此輩有以阻之也由此推其大者為患何可勝言如朱張二家一賖死之盜賊耳以言豪霸則渠魁也皆向來朝廷寵遇之太過所以養成今日之餘殃原其始然抑之不早遂至身遭顯戮禍及宰臣此眼前之轍迹也昔漢主父偃説武帝曰天下豪傑兼并之家亂衆之民皆可徙茂陵內實京師外銷姦猾所謂不誅而害除武帝從之徙郡國豪傑及訾三百萬以上于茂陵誠抑強扶弱之良法也今後若有醜惡聞於鄉邑聲迹播於中外不必加以刑辟但限以訾財若干即遷之他郡或徙之荒壤視所犯之重輕以定地之近逺有訾不及者則移於附近以五百里為限根蒂既搖枝黨自散使良善咸獲安存官府亦易振立彼得以全軀保家朝廷亦不至於多戮少恩去豪霸之䇿無以加此矣又曰隆古無豪霸之名自秦廢井田而兼并起於是強者日富弱者日貧豪霸日興殆不可遏蓋強必凌弱富必欺貧貧弱不能與競遂歸心服命於富強之家理勢然耳聖朝開國以來軫恤民憂禁治豪霸制令甚嚴終莫能少戢其風今上而府縣下而鄉都隨處有之小大不侔而蠧民則一蜂起水湧誅之不可勝誅雖有智者莫如之何愚嘗日夜思之不究其源徒窒其流未易以制也制之之道惟有井田一法今不可得而行矣蓋自古天下之田無不屬官民不得而私有之但強者力多能兼衆人之利以為富而無力者不能自耕其所有之田至於轉徙流蕩先王授田使貧富強弱無以相過各有其田得以自耕故天下無甚富甚貧之民至成周時其法大備畫地為井八鳩五規二牧九夫以等其髙下溝洫畎澮川塗畛徑以立其堤防疆井既定無得侵奪雖欲貪并不可得也商鞅用秦規則寖弛已不復有井田之舊於是開阡陌阡陌既開乃有豪強兼并之患富者田連阡陌而貧者無置錐之地然猶不明説田在民也官不得治而民得自占為業耳迄于漢亡三國並立兵火之餘人稀土曠當時天下之田既不在官亦終不在民以為在官則官無人收管以為在民則又無簿籍契劵但隨其力之所能至而耕之元魏行均田稍亦近古唐因元魏而損益之為法雖善然令民得賣其口分永業始有契約文劵日漸一日公田盡變為私田先王之法由是大壞天下紛紛互相吞并而井田永不可復矣民得自有其田而公賣之官安得而禁制之田既屬民乃欲奪富者之田以與無田之民禍亂羣興必然之理也董仲舒在武帝朝此時去古未逺井田之法尚可追也乃曰井田雖難卒行宜少近古限民名田以贍不足言甚善而未克行至哀帝時孔光何武曰吏民名田無過三十頃期盡三年而犯者沒入官時丁傅用事董賢隆貴不便於已遂寢其行夫三十頃之田周民三十夫之田也以一人而兼三十夫之田亦已過矣而期之三年似太迫蹙為今之計豪強卒難禁止惟有限田之法可以制之酌古準今宜為定制每一家無論門閥貴賤人口多寡並以田十頃為則有十頃以上至于千頃者聽令分析或與兄弟子姪姻黨或立契典賣外人但存十頃而止或敗亡而所存不及十頃者亦聽十頃以下至于一畝者許令增買亦至十頃而止寬以五年為限如過限不依制而田富如故者除十頃外並沒入官然官不歸於公仍將沒官田召賣與貧民所得田價一半輸官一半給主彼富者亦甘心而無辭不出十數年而豪強不治而自無矣此法不驚民不動衆不用井田之制而獲井田之利使周公復生亦何以易此哉然寺觀布滿天下田業過於巨室卒未能如會昌之併省廢毁而僧道恃無差發因而廣置田宅侵奪民役為禍不小亦宜立限分為三等大寺觀不得過十頃中止五頃下存二頃有過制者依上沒官亦足以少抑僧道之僭踰也良法美意無加於此以數千年未全之規一旦復見於今日豈非超古之事業太平之盛觀歟惟慮左右之臣如丁傳等恐妨於已百端阻當有不得行焉必須斷以決之不間於讒執而守之克底于終而後有所成也惟聖朝其嘉納焉介夫又論閲武狀曰取兵於民最為近古計户簽軍乃國家之良法亡宋弛於軍政用錢雇軍以有限之國儲供無窮之戰役遂至兵盡國亡而不可救此可鑒之覆轍也國家自車書大同之後誠偃武修文之時既未尚文又不事武文武兩失非計之得也夫治不可恃安不可偷天命靡常難保其長如一日廟堂之上習於安娛轅門之中恬於豢飬兵不知律將不知兵國不知將一旦走檄傳警以弱將冗兵投之敵前小出則小挫大舉則大北何異驅市人而置之死地耶昔之為元帥為萬户為千户鎮撫者皆是披荆棘冒矢石身經百戰萬死一生然後報之以此職名也今子弟承廕不為降資是不忘其父而惠及其子固見朝廷之厚德然承廕者例皆弱冠乳臭之子著衣喫飯之外他無能焉忝賴世資驟膺異擢若再有軍功則以何爵賞之夫兵凶器也戰危地也豈可使不歷事之小兒以當一面之重任哉兼向出於海放者今皆無軍可管虛擔宣敕牌面子弟亦復承襲尤為冗濫可盡減併也軍人自混一以來久不知兵昔之善戰者壯而老老而死所餘今無幾矣都城之下禁衛軍卒每嵗雇替應役倐來倐往互換代名甫諳兵事又復還家盡皆遊惰之夫豈識戰為何事外路鎮守者不聞兵革不習騎射升斗之糧不了供給汲汲焉買賣謀生為糊口贍家之計况各處軍官頭目不思分鎮軍户乃國家之士卒而以該管軍人為梯已之丁夫或令報役私門或遣營運逺方上失備禦之謀下奪農商之利雖名為軍實與百姓等耳似此之徒使之臨敵制勝惟有束手就擒雖千百不足以當一二也昔唐太宗引諸衛將卒習射於庭諭之曰邉境少安則逸遊忘戰是以寇來莫之能禦今不使汝等穿池築苑専習弓矢居間則為汝師寇來則為汝將於是人思自勵數年之間悉為精鋭夫穿築之事自有民役唐立租庸調法每丁嵗役二旬者謂此耳今後軍官子孫宜擇有器識才力者比民官承廕之例稍優一等待其久習戰事顯立軍功然後復之以祖父之職軍戶宜點其丁壯強悍者永當官身勿令交換朝夕訓習騎射優其衣糧更立賞格以激勵之夫將不在多兵不在衆若訓練之精搜閲之勤將為勇將兵皆勝兵孰有當其鋒者此事似緩而實急長計逺慮者所宜究心也介夫又論馬政狀曰古今立國未嘗怠於馬政蓋以邉庭守戰之備馬不可缺而車輦出入百官擁從及檄書交馳郵傳迭發尤不可一日無也國朝開基以來以牧放為俗羊馬之群遍滿谷野生長草地不假喂飼之勞隨意所用如取廄中是以出兵行師所向無前皆資馬之力也近年偃武之餘用馬日少故於馬政不復介心古者給價換馬已非長䇿今乃刷馬民間尤為弊政且南北之風土不同生長於南者則不禁其冷生長於北者則不禁其熱隨其土産之宜而用之可也若刷東南之馬以供西北之用則立見其死亡耳又兼牧於野者安於水草習於馳驟以之臨敵易於鞭䇿畜於私家者飽以芻豆勤於剪拂一旦置之荒郊便已瘦弱無力况當矢石之衝何濟於用朝廷失於計畫苟且目前不循廣馬之成規而行刷馬之下䇿雖曰和買何異白奪且刷馬之政出於亡金其時鄰敵交攻疆土滋削未免刷之民間以應一時之急耳堂堂天朝不宜蹈襲亡國之遺轍也兼刷至之馬實無所用而民間之怨皆歸於國甚非經久之計今民間皆畏憚不敢養馬延以嵗月民馬已稀萬一國家急欲用馬何從而得宜及間暇早為之謀可也唐初得牝馬三千匹徙之隴右命張萬嵗掌之蕃息至七十萬匹分為八坊四十八監各置使以領之是時天下以一縑易一馬及玄宗以王毛仲為內外間廄使東封之日有馬四十三萬匹牛羊稱是此已然之明效也今國家之地數倍於唐水草美處盡在版圖之中擇宜牧之地各設牧馬監官給牝馬選用能吏使專牧馬之權重之以職任優之以俸祿責之以成效不十數年馬不可勝用矣向來家自為牧衣食之資皆仰於此取其餘而用之猶且不竭况今以全盛之國又助之以官府之力因其舊俗而行之亦甚易事何必以刷馬為政徒結怨於民間也介夫又上疏曰近覩朝廷庶政更新廣開言路愚嘗採托二十餘事陳之省臺自謂言當乎理事當乎情可以少裨聖政之萬一而乃視為迀踈不切之論為泛常虛調之行外示容納內懷猜疑展轉數月竟成文具古人謂忠言逆耳夜光按劔良有以也茍祿素餐固可蒙蔽皇天后土豈堪厚誣未幾八月初六之夕京師地震者三市庶恟恟莫知所為越信宿而衛輝太原平陽等處馳驛報聞者接踵雖震有輕重而同出一時人民房舍十損八九震而且陷前所罕聞迄今動搖勢猶未止亦可謂大異矣春秋二百四十二年之間災變迭出而地震者才五國家自十數年來凡三見之以今考古未有若此之數數也漢哀帝初水出地震李尋對曰四方中央連國歷州俱動者其異最大關東數震未為大逆近者之震連亘西北數千百里而東南亦皆搖撼以古證今未見若此之廣且甚也安得不謂之大異乎廟堂之上謂宜朝不暇食夕不安寢思所以更絃易轍為修禳息變之䇿方且恬然自安不以經意何異乎依危幕而不知懼履春氷而不自覺世無是理也必明其致震之因而求其安震之道則庶乎其可矣夫地道柔而靜無故而動以為地之變殊不知地無附麗實依於天之中地亦氣中之一物耳先賢謂天形如雞子天其殼也地其黃也日月星辰黃外之白也易曰天行健君子以自強不息故天圓而獨運於兩間一氣周流循環無已則地得以遂其資生之性若天運有一息之間斷而地不能自存矣故其變也為震為裂為崩陷為水潦為草木枯傷皆由此也如人之一身一日一萬三千五百息周而復始若一息不順則肉瞤膚蠕壅而為癰疽逆而為癥瘕故曰陽用其精隂用其形精損則形傷蓋必然之理天為乾為陽君道也地為隂為坤臣道也天運愆忒故地道失常驗之於人則知臣職之不舉亦由乎君德運量之未至也傳曰天氣下降地氣上騰二氣交而成泰一有不交則變而為否竊聞古者人君每日視朝不遑寧處故欲上意下達下情上通故能致天下於泰和之域又聞古者凡遇災異必詔求直言極諫冀有以補時政之不逮達民隱之未知故能感格天地轉禍為祥今得奏之臣有限而奏事之日甚稀憂愛之忠雖至而九重之邃不聞君臣隔塞情愫莫抒是猶天地之氣不交安得不反泰而否乎然則胡為天不示變而獨見之地震者良由羣臣不能順承天地下遂萬物之情故變見乎地以深警之固已明矣何以言之嘗觀漢史翼奉之言曰地變為隂氣太盛宜疏后黨親同姓出後宫損隂氣李尋之言曰地震有上中下上位應妃后中位應大臣下位應庶民宜弱外戚強本朝崇陽抑隂以救其咎或以言遊畋土木或以言宦臣嬖幸或以言小人黨盛各因其時弊而指斥之耳以今日之人事觀之閫儀嚴肅女謁不行如吕韋之専趙楊之寵無有也後宫列陳名不盈數如三千一萬之充滿無有也秉國鈞者皆色目漢兒未嘗一官任舅后之族如吕霍上官之僭奢無有也敷奏出納非省臺不得與聞未嘗一事出閹官之口如恭顯魚程之専擅無有也春秋出畋循行故典宫墻殿宇一安舊規如阿房復閣之興樓船錦纜之侈無有也然則致是變也既皆非此之故則當歸之執政大臣矣今大小政事總於都省有奏皆準無言不行意欲若此君亦從其若此意欲如彼君亦從其如彼不聞天子以巳意強用一官奪行一事則官之不職事之不舉是誰之過歟不聞天子以私欲行一不義殺一不辜則仁心之未被德政之未敷是誰之過歟為執政大臣者烏得以辭其咎哉既得君又得時又得可為之權亦可以有為矣使不可為則諉曰非我之過使得為之而安於不肯為愚不知其何心且近來朝廷所行其忤天意咈人心者殆非一端民之所欲天必從之使能取弊政一整而新之民心既順安知天意之不回乎如直言所當求也近雖容受陳言可即行之否即舍之而乃反復議擬動經旬月議以為非已同故紙議以為是亦成虛文非時政之弊乎賢才所當進也未聞朝廷因一言而知一人由一能而擢一職若非書尺轉送必須勢援梯引次則贄禮先容賄賂取恱舍此之外決不能無因而至前也近聞廉察交章以薦者不少使果賢也既不任之風憲亦宜升之民職省資臺呈而至者亦多使果有治效也既不加以資品亦宜賜之褒奬今保在臺者已成子虛呈到省者亦化烏有非時政之弊乎選法所當清也近吏曹銓擬縱私逾甚集賢翰林亂保滋多待除求進之人接袂摩肩不平之鳴溢于閭巷選法紊壞日甚一日非時政之弊乎官冗吏繁所當減併也近聞置局商度當否猶豫半嵗竟已寂然夫添一官則為民增一害省一職則為民去一蠧此理甚明其事甚易合存則存合革則革立談可決正不用如此狐疑也非近事之失乎刑賞所當明也近聞採訪使巡行各道所斷官吏皆絶知識失計置之徒若稍有智力者已望風先為逸罪之謀矣潛形掩寇必無逃理建鼓求亡誰不趨避中以私情縱放僥幸脫免者何可勝數大姦巨蠧未嘗少懲兼巡歷之廣閲人之多豈非出類拔萃者亦不聞薦一賢為國家深長計以言乎刑則未公以言乎賞則未見非近事之失乎俸祿所當均也近增官吏俸米通支糧二十八萬餘石外任分給公田多歸於具員冗職實勤王事則不免乎號寒啼飢內任雖曵紫懸金立可企斯而買桂炊玉居甚不易縱益之以升斗之糧莫能禁其尋尺之枉徒多費太倉之粟實未得均祿之道非近事之失乎集賽所當裁減也近奏準分揀中外欣快而各官掩護力寢其行良家有才無力之士反不見取軍站雜色無賴之流則當直自若非近事之失乎奔競所當息也今求仕必須親身升等必待營幹若朝市之近山林之逺有閉戶讀書絶迹權門者決無得官之理又非時政之弊乎法律所當定也竊聞都城內外近聞亦有強盜夜劫之風且聞臨清以東河西以北私醖私牛狼籍官道藐視官府若無所禁雖都下正自不少外路槩亦可知是人心全無忌憚也又非時政之弊乎風俗所當正也京闕之地教化所先淫風大行滅棄廉耻南北之民相習為薄鬻婦販子絶恩離情今天下皆急私而慢公先利而後義所關甚不小也又非時政之弊乎物價所當平也近來鈔價賤物價踊昔直一錢者今直一貫物直錢而鈔不直錢若不改易鈔法增造銅錢則民生之危蹙殆未已也又非時政之弊乎學校所當崇也而視為不急之務往往求進者因朝廷不以為重多不揆已而妄求而朝廷亦以為輕故不擇人而準保非惟主領失人學校虛設而選法之壞士風之薄亦職此之故又非時政之弊乎備荒所當急也近覩省部議行賑濟標散户帖每石六貫五伯放糴官米每石一十六貫百姓均為皇帝之赤子而限以有無户帖之分米糧均為皇家之公儲而自為髙下價鈔之異如今年闕食止數處耳未足以言荒也或有甚於此更直連嵗之歉出有限之見管應未已之長飢將何以救之每年海道運糧幸賴洪休安然得濟或遇不測之風濤一嵗所仰沒為泥沙將何以繼之修舉儲畜之條置立義倉之䇿執政者何不究心乎僧道所當抑也而紅帽黃冠駢闐巷陌二司頭目分布郡縣朝廷上下仰之如日月畏之如雷霆而官府士民嫉之如仇讎惡之如蟊賊使能祈請而獲福禳度而免禍必無地震之變矣其為虛妄顯然可知今一畨災異則一畨好事災異愈甚而好事愈廣豈天地示警之至專為僧道布施之階執政者何不深省乎貢舉所當行也雖嘗形於詔書終然付之埋沒今合朝官職盡屬吏員其進身也既不出於文學亦不由於選舉問其吏則不知民間疾苦問其儒則不通文理句讀十數年後儒之類滅欲求識一丁字者亦無之矣雖未至焚書坑儒而不焚之焚不坑之坑其禍尤烈於昔此事大有關於理亂之故執政者何不垂鑒乎武備所當修也今將帥重臣皆承廕子弟不經兵事之少年軍卒戰士乃互換替名不習騎射之惰夫一旦警生意外驅弱將冗兵投之敵前其為國家大計甚可憂也執政者何無逺慮乎賦役所當平也如軍站既已出力當官每嵗租入僅了支持而匠户之貧窶尤甚豈堪重併當差飲恨吞聲有言莫訴如儒户雖無效勞實關國體傳曰土之美者善養禾君之明者善養士今儒人之二稅既輸初無損於公上但與除免雜泛差役少安其心庶見朝廷樂育人材之意可也如僧道户計隱占過半仍復全免深為不均此事尤切於民執政者何不動念乎民瘼所當瘳也近年以來存恤之詔屢頒而舉目乏雍熙之和苛虐之政罕有而比屋交愁怨之聲亦當思其所以然之故矣今閭閻之下田里之中寃民抑事叢如蝟毛雖罄南山之竹莫能枚舉而條陳然疏逺瑣碎之務安得一一上煩朝廷而朝廷亦無以盡知之故漢相平勃於決獄錢榖幾何之問而謝曰不知蜀相亮罰二十以上皆身親之失於太察蓋謂其各有司存也使路府州縣牧民之官任得其人各盡所職則凡可便益於民間者自能盡舉若任非其人縱其殘暴雖日嚴禁治之章家至而户曉亦無救於百姓也故曰安民無他道在乎知人而已任賢去邪一事尤為廟堂之急先務執政者豈可尚付之悠悠乎凡此者皆致變之因也究其所因而求其安變之道亦無出於此朝廷一舉一動之間神明在上昭不可欺能盡目前當行之事則無逺不通無幽不格矣昔陶侃謂禹惜寸隂常人當惜分隂今觀大臣群僚皆持祿顧望相與依違堂食既升一日又了務為淺者近者不求其逺者大者暖衣飽食樂以忘憂不思在下之窮人飢寒所迫度日如年甚非易過也近朝廷完議一事至數月不得施行終嵗之間寧堪幾議雖以司縣不能為理而謂負天下之寄可如是乎萬機之輻湊如水之趨海焉巨川三百支流三千奔忙雜沓莫之能禦日夜泄之以尾閭猶懼不蔇乃欲持瓢抱甕區區以升斗計之其不泛濫於中土者幾希休運難逢良辰豈再異至不應災將隨之失今不圖則後禍未可知也常人之言曰地變因於天運天子宜減膳徹樂今吾君之服御供饌務從儉朴雖大禹之惡衣菲食不是過樂人如林非大朝覲而音律不入於耳愚以為膳不必減也樂不必徹也但使通下情責實效內修已德上應天心則天地之氣交而萬物咸通矣常人之言曰地變應乎中位大臣宜避位辭祿今都堂一新隆膺委任正是協贊扶危鞠躬致命之時當思體坤以承乾滅凶而致吉愚以為位不必避也祿不必辭也但使庶事畢張群賢咸集百司盡職萬姓全生凡可以竭臣道之當為者無所不至則妖沴自消休祥自降德合無疆乃終有慶矣常人之言又曰凡變異之來宜布新頒赦減稅放租以安人心以答天譴斯言無稽必不可信傳曰無赦之國其刑必平故諸葛孔明之治蜀絶口不言赦而國以大治若肆赦之頻徒以長姦貪資盜賊初無利於君子也姦貪盜賊乃覆載之所不容因變而復赦之寧不重神人之怒乎書曰懷保小民又曰以小民受天永命蓋天意所屬惟在小民若減放之多徒以繼富初無利於小民也彼終嵗勤動僅食其力戶無稅而官無租縱除免天下十年之糧而小民亦不沾分毫之賜富豪亂衆乃幽明之所同忿因變而附益之又非以重神人之怒乎為此謀者實無補於時政之闕失是猶田舍翁適遭患難橫逆不知自反遽修因果以為禳災徼福之計亦愚甚矣伏惟聖君賢相其拒之絶之介夫久隨禁直愧乏才資廁名學官粗償書債而拳拳愚忠不忍目中之無人遂吐平生之耿耿者既揆情無所覬望故出辭不避掁觸比見陳言不為少矣立竒者則不切時務希賞者則専尚貢諛取合者則興利以啖國欲求其議論正大識見髙明達變通時之士蓋十無一二也昔人有言忠臣不順時而取寵烈士不惜死而偷生愚雖未能自附於忠臣烈士之目而夙昔所期不肯多讓自度所言誠有足采不懼斧鉞再干天聼如以為可則見之施行國家幸甚生民幸甚歷代名臣奏議卷六十八
