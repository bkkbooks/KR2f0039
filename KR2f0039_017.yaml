body:
  text: 歴代名臣奏議巻十七明楊士竒等撰郊廟唐𤣥宗開元初奉昭成皇后祔睿宗室又欲肅明皇后并升焉陳貞節奏言廟必有配一帝一后禮之正也昭成皇后有大姒之徳宜升配睿宗肅明皇后既非子貴宜在别廟周人奏夷則歌小吕以享先妣先妣姜嫄也以生后稷故特立廟曰閟宫晉簡文帝鄭宣皇后不配食築宫扵外以嵗時致享肅明請準周姜嫄晉宣后納主别廟時享如儀扵是留主儀坤廟詔𨽻太廟毋置官属陳貞節與博士蘇獻上言曰睿宗扵孝和弟也按賀循說兄弟不相為後故殷盤庚不序陽甲而上繼先君漢光武不嗣孝成而上承元帝晉懐帝繼世祖不繼惠帝故陽甲孝成出為别廟又言兄弟共世昭穆位同則毁二廟有天下者従禰而上事七廟尊者所統廣故及逺祖若傍容兄弟則上毁祖考天子不得全事七世矣請以中宗為别廟大祫則合食太祖奉睿宗繼髙宗則祼獻永序詔可乃奉中宗别廟升睿宗為苐七室五年太廟壊天子舎神主太極殿營新廟素服避正寢三日不朝猶幸東都伊闕男子孫平子上書曰乃正月太廟毁此躋二帝之驗也春秋君薨卒哭而祔祔而作主特祀扵主烝嘗禘扵廟今皆違之魯文公之二年躋僖扵閔上後太室壊春秋書其災說曰僖雖閔兄甞為之臣臣居君上是謂失禮故太室壊且兄臣扵弟猶不可躋弟甞臣兄乃可躋乎莊公薨閔公二年而禘春秋非之況大行夏崩而太廟冬禘不亦亟乎太室尊所若曰魯自是陵夷堕周公之祀太廟今壊意者其将陵夷堕先帝之祀乎陛下未祭孝和先祭太上皇先臣後君昔躋兄弟上今弟先兄祭昔太室壊今太廟毁與春秋正同不可不察武后簒國孝和中興有功今内主别祠不得列于世亦已薄矣夫功不可棄君不可下長不可輕且臣繼君猶子繼父故禹不先鯀周不先不窋宋鄭不以帝乙厲王不肖猶尊之也況中興邪晉太康時宣帝廟地陷梁折又三年太廟殿陷而及泉更營之梁又折天之所譴非必朽而壊也晉不承天故及于亂臣謂宜遷孝和還廟何必違禮下同魯晉㢤帝異其言詔有司復議貞節獻與博士馮宗質之曰天子七廟三昭三穆與太祖而七父昭子穆兄弟不與焉殷自成湯至帝乙十二君其父子世六易乾鑿度曰殷之帝乙六世王則兄弟不為世矣殷人六廟親廟四并湯而六殷兄弟四君若以為世方上毁四室乃無祖禰是必不然古者繇禰極祖雖迭毁逓遷而三昭穆未甞闕也禮大宗無子則立支子又曰為人後者為之子無兄弟相為後者故捨至親取逺属父子曰繼兄弟曰及兄弟不相入廟尚矣借有兄弟代立承統告享不得稱嗣子嗣孫乃言伯考伯祖何統緒乎殷十二君惟三祖三宗明兄弟自為别廟漢世祖列七廟而惠帝不與文武子孫昌衍文為漢太宗晉景帝亦文帝兄景絶世不列扵廟及告諡世祖稱景為従祖今為晉武帝越崇其父而廟毁及亡何漢出惠帝而享世長久乎七廟五廟明天子諸侯也父子相繼一統也昭穆列序重繼也禮兄弟相繼不得稱嗣子明睿宗不父孝和必上繼髙宗者偶室扵廟則為二穆扵禮可乎禮所不可而使天子旁紹伯考棄已親正統㢤孝和中興别建園寢百世不毁尚何議㢤平子猥引僖公逆祀為比殊不知孝和升新寢聖真方祔廟則未嘗一日居上也帝語宰相召平子與博士詳論博士䕶前言合軋平子平子援經辯數分明獻等不能屈蘇頲右博士故平子坐貶都城尉然諸儒以平子孤挺見迮扵禮官不平帝亦知其直久不决然卒不復中宗於廟𤣥宗將大享明堂貞節惡武后所營非古所謂木不鏤土不文之制乃與馮宗上言明堂必直丙巳以憲房心布政太微上帝之所武后始以乾元正寢占陽午地先帝所以聴政故毁殿作堂撤之日有音如雷庶民譁訕以為神靈不恱堂成災火從之后不修徳俄復營構殫用極侈詭禳厥變又欲嚴配上帝神安肻臨且宻邇掖庭人神雜擾是謂不可方物者也二京上都四方是則天子聴政乃居便坐無以尊示羣臣碩以明堂復為乾元殿使人識其舊不亦愈乎詔所司詳議刑部尚書王志愔䓁僉謂明堂瓌怪不法天燼之餘不容大享請因舊循制還署乾元正寢正至天子御以朝㑹若大享復寓圓丘制曰可開元中典章差駮左補闕王仲丘欲合貞觀顯慶二禮據有其舉之莫可廢之之誼即上言貞觀禮正月上辛祀感帝扵南郊顯慶禮祀昊天上帝扵圓丘以祈榖臣謂詩春夏祈榖于上帝禮上辛祈榖于上帝則上帝當昊天矣鄭𤣥曰天之五帝遞王王者必感一以興故夏正月祭所生扵郊以其祖配之因以祈榖感帝之祀貞觀用之矣請因祈榖之壇徧祭五方帝五帝者五行之精九榖之宗也請二禮皆用貞觀禮雩祀五方上帝五人帝五官于南郊顯慶禮祀昊天上帝于圓丘臣謂雩上帝為百榖祈甘雨故月令大雩帝用盛樂鄭𤣥說帝上帝也乃天别號祀扵圓丘尊天位也顯慶祀昊天與月令合而貞觀甞祀五帝矣請二禮皆用貞觀禮季秋祀五方帝五官扵明堂顯慶禮祀昊天上帝扵明堂臣謂周郊祀后稷以配天宗祀文王扵明堂以配上帝先儒以天為感帝引太微五帝著之上帝則属之昊天鄭𤣥稱周官旅上帝祀五帝各文而異禮不容并而為一故扵孝經天上帝申之曰上帝亦天也神無二主但異其處以避后稷今顯慶享上帝合扵經然貞觀甞祀五方帝矣請二禮皆用詔可太子賔客崔沔上宗廟加籩豆議曰臣竊聞識禮樂之情者能作知禮樂之文者能述述作之義聖賢所重禮樂之制古今所崇變而通之所以久也所謂變者變其文也所謂通者通其情也祭祀之興肇扵太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麯蘖汚樽抔飲則有𤣥酒之奠施及後王禮物漸備作為酒醴伏其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至敬可備而不敢廢也是以血腥爓熟𤣥樽犧象靡不畢登扵明薦矣然而薦貴扵新味不尚䙝雖則備物猶存節制故禮云天之所生地之所長茍可薦者莫不咸在備物之情也又曰三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶爼籩豆簠簋樽罍之實皆周人之時饌也其用通扵宴饗賔客而周公制禮咸異與毛血𤣥酒同薦扵先晉中郎盧諶近古之知禮者也著家祭禮觀其所薦皆晉時常食不復盡用禮之舊文然則當時飲食不可闕扵時祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史扵前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢来祭致逺物也有親必薦順時令也苑囿之内躬稼所収蒐狩之時親發所中莫不割鮮美薦而後食盡誠敬也若此至矣復何加焉但當申勅有司祭如神在無或簡怠朂增䖍誠其進貢珍羞或時物鮮美考諸同典有所漏畧皆詳名目編諸甲令因宜而薦以𩔖相従則新鮮服濃盡在是矣不必加扵籩豆之數也至扵祭器随物所宜故太羮古食也盛扵豋豋古器也和羮時饌也盛扵時器故毛血盛扵盤𤣥酒盛扵樽未有薦時饌而追用古器者由古質而今文便扵事也雖加籩豆十二味足以盡天下美物而措諸清廟有兼倍之名近扵侈矣魯人丹桓公之楹又刻其桷春秋書以非禮御孫諫曰儉徳之恭也侈惡之大也先君有恭徳而君納諸惡無乃不可乎是不以越禮而崇侈扵宗廟也又據漢書藝文志墨家之流出扵清廟是以貴儉由此觀之清廟之不尚扵奢舊矣太常所請恐未可行又按太常奏状今酌獻酒爵制度全小僅未一合執持甚難不可全依古制猶望稍須廣大臣竊據禮文有以小為貴者獻以爵貴其小也小不及制敬而非禮是有司之失其傳也固可随失釐正無待議而後革然禮失扵敬猶奢而寜儉非大過也未知今制何所依准請兼詳今式據文而行韋述張均同上宗廟加籩豆議曰謹按祭統曰凡天之所生地之所長茍可薦者莫不咸在水草陸海三牲八簋昆蟲之異草木之實隂陽之物皆備薦矣聖人知孝子之情深物𩔖之無限故為之節制使祭有常禮物有其品器有其數上自天子下至公卿貴賤差降無相踰越百代常行不易之道也又按周禮膳夫掌王之飲食膳羞食用六榖膳用六牲飲用六清羞用百有二十品珍用百物醤用百有二十甕則與祭祀之物豐省夲殊左傳曰饗以訓恭儉以行禮慈惠以布政又曰饗有體薦宴有折爼杜元凱曰饗有體薦爵盈而不飲肴乾而不食宴則相與食之饗與宴猶且異文祭奠所陳固不同矣又按周禮籩豆人各掌四籩四豆之實共供祭祀與賓客所用各殊處此數文祭奠不同常時其来久矣且人之嗜好夲無憑准宴私之饌與時遷移故聖人一切同歸扵古雖平生所嗜非禮亦不薦也平生所惡是禮則不去矣楚語曰屈到嗜芰有疾召宗老而属曰祭必以芰及祥宗老将薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下安之不羞珍異不陳庶侈不以私欲干國之典遂不用此則禮外之食前賢不敢薦也今欲取甘㫖之物肥濃之味随所有者皆充祭用茍踰舊制其何限焉雖豆有加豈能備也傳曰大羮不致粢食不鑿昭其儉也書曰黍稷非馨明徳惟馨事神在於䖍誠不求厭飫三年而禘不欲黷也三獻而終禮有成也風有采蘋采蘩雅有行葦泂酌守以忠信神其捨諸若以今之珍饌平生所習求神無方何必師古簠簋可去而盤盂杯按當在御矣韶濩可息而箜篌笙笛當在奏矣凡斯之流皆非正物或興扵近代或出扵蕃夷入耳之娛夲無則象用之宗廟後嗣何觀欲為永式恐未可也且自漢已降諸陵皆有寢宫嵗時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率情變革人情所難又按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵此明貴小賤大示之節儉又按國語觀射父曰郊禘不過蠒栗蒸甞不過把握天神以精明臨人者也求備扵物不求豐大茍失扵禮雖多何為豈可捨先王之遺法徇一時之所尚廢棄禮經以従流俗裂冠毁冕将安用之且君子愛人以禮不求茍合況在宗廟敢忘舊制楊仲昌上宗廟加籩豆議曰臣按禮經祭法曰夫祭不欲煩煩則黷祭亦不欲簡簡則怠又鄭𤣥云人生尚䙝食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存𤣥酒示不忘古春秋曰蘋蘩蕰藻之菜潢汙行潦之水可羞扵王公可薦扵鬼神又曰大羮不致粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為上将儉約以表誠則陸海之物鮮肥之𩔖既乖禮文之情而變作者之法皆充祭用非所詳也易曰樽酒簋貳納約自牖此明祭存簡易不在繁奢所以一樽之酒二簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則䙝味有登加籩爵則事非師古與其别行新制寜如謹守舊章將作大匠韋湊上義宗廟號書曰臣聞王者制禮是曰規模規模之興實資師古之道必也正名惟名與實故當相副其在宗廟禮之大者豈可失㢤禮祖有功而宗有徳祖宗之廟百代不毁故殷太甲為太宗太戊曰中宗武丁曰髙宗周則文王為太宗武王為中宗漢則文帝為太宗武帝為世宗其後代有稱宗者以方制海内徳澤可宗列扵昭穆期扵不毁稱宗之義不亦大乎伏惟孝敬皇帝位止東宫未甞南面聖道誠冠扵儲副徳教不被扵寰瀛立廟稱宗恐非合禮況别起祀典何義稱宗而廟號義宗稱之萬代以臣庸識竊謂不可陛下率循典禮以闡大猷儻致此失或虧盡善豈不惜哉望更詳議務合扵禮經唐郊祭天地以髙祖神堯皇帝配肅宗寳應元年杜鴻漸為太常卿禮儀使扵是禮儀判官薛頎集賢校理歸崇敬等共建言曰神堯獨受命之主非始封君不得冐太祖配天地景皇帝受封扵唐即商之契周之后稷請奉景皇帝配天地扵禮宜甚諫議太夫黎幹非之乃上十詰十難傅經誼扺鄭𤣥以折頎崇敬䓁曰頎等引禘者至日祭天扵圓丘周人以逺祖配今宜以景皇帝為始祖配昊天圓丘臣幹一詰國語稱有虞氏夏后氏並禘黄帝商禘舜周禘嚳二詰商頌長發大禘也三詰周頌雍禘太祖也四詰祭法虞夏並禘黄帝商周俱禘嚳五詰大傳不王不禘王者禘其祖之所自出以其祖配之六詰爾雅禘大祭也七詰家語凡四代帝王所郊皆以配天所謂禘五坐大祭也八詰盧損以禘祭名禘諦也事取明諦故云九詰王肅言禘五年大祭十詰郭璞亦云此經傳先儒皆不言祭昊天扵圓丘根證章章故臣謂禘止五年宗廟大祭了無疑晦其十難一曰周頌雍之序曰禘祭太祖也鄭𤣥說禘大祭也太祖謂文王也商頌長發大禘也𤣥曰大禘祭天也商周兩頌同文異解索𤣥之意以禘加大因曰祭天臣謂春秋大事于太廟雖曰大得祭天乎虞夏商周禘黄帝與嚳禮不王不禘皆不言大𤣥安得稱祭天乎長發所歎不及嚳與感生帝故知不為祭天侑嚳明矣商周五帝大祭見扵經者甚詳而禘主廟不主天今背孔子之訓言取𤣥之偏誼誣繆祀典不見其可二曰不王不禘王者禘其祖之所自出以其祖配之此言惟天子當禘如虞夏出黄帝商周出嚳以近祖配之自出之祖無廟乃自外至自外至者同之天地得主而止又自出者在母亦然春秋傳陳則我周之自出詎可謂出太微五帝乎𤣥以一禘為三誼在祭法則曰祭昊天扵圓丘在春秋傳則郊以后稷配靈威仰在商頌曰祭天在周頌則禘曰大扵四時祭而小扵祫本末駮舛臆判自私不足以訓三曰商周之前禘所自出自漢魏以来曠千餘嵗其禮不講盖𤣥所說不當扵經不質扵聖先儒置之不用是為棄言四曰今禮家行扵世者皆本𤣥學臣請取𤣥之隙還破頎等所建頎等曰景皇帝為始祖以配天按王制天子七廟𤣥曰周禮也太祖與文武之祧合親廟四而七商氏六廟契與湯合二昭二穆而六據𤣥則夏不以鮌顓頊昌意為始祖是又與𤣥乖背自古未有以人臣為始祖者唯商以契周以稷夫稷契皆天子元妃子簡狄呑𤣥鳥卵而生契契佐禹有大功舜封之商其詩曰天命𤣥鳥降而生商宅殷土芒芒后稷母曰姜嫄出野履巨跡而生稷稷勤稼穡堯舉為農師舜封之邰號曰后稷其詩曰履帝武敏歆攸介攸止即有邰家室舜禹有天下契稷在焉傳曰功施扵人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百榖而山死皆在祀典及子孫而有天下故尊而祖之五曰既用𤣥說小徳配寡而后稷止配一帝不得全配五帝今以景帝配昊天扵𤣥為可為不可乎六曰衆詰臣曰上帝一帝周官祀天旅上帝祀地旅四望旅衆也則上帝是五帝臣曰否旅有衆義出扵爾雅又為祭名亦曰陳也如前所詰旅上帝為五帝則季氏旅扵泰山可得為四鎮邪七曰援𤣥之言則景帝親盡主應在祧反配天地禮不相值夫所謂始祖者經綸草昧功普體大以比元氣含覆廣大者也故曰萬物之始天也人之始祖也日之始至也掃地而祭則質器用陶匏則性牲用犢則誠兆扵南郊則就陽至尊至質不敢同扵先祖也白虎通義曰祭天嵗一者何事之不敢黷也故因嵗之陽氣始逹而祭之今一嵗四祭黷莫大焉上帝五帝祀闕不舉怠孰甚焉黷與怠皆失也臣聞親有限祖有常聖人制禮不以情變唐家累聖歴祀百年非不知景帝為始封當時通儒鉅工尊髙祖以配天宗太宗以配上帝人神克厭為日既久乃今以神堯降侑含樞紐而太宗仍配上帝則樞紐上帝佐也以子先父非天地祖宗之意八曰景皇帝非造我區夏不得與夏之禹商之契周之稷漢髙帝魏武帝晉宣帝唐神堯皇帝並功而陟配圓丘上與天匹曾謂圓丘不如林放乎九曰魏以武帝晉以宣帝為始祖者夫操與懿皆人傑也擁天下强兵挟弱主制海内之命名雖為臣勢實為君後世因之以成帝業尊而祖之不亦可乎十曰神堯拯隋室之亂振臂大呼濟人塗炭汛掃蕩攘羣凶無餘出入不數年而成王業漢祖之功不能加焉夏以禹漢以髙帝我以神堯為始祖訂夏法漢扵義何嫌今頎崇敬革天對易祖廟事之大者不稽扵古難以疑文僻說定之臣官以諫為名不敢不盡愚議聞代宗不韙其言其後名儒大議而景帝配天卒著于禮代宗時主客員外郎歸崇敬奏言東都太廟不當置木主按禮虞主用桑練主用栗作栗主則瘞桑主猶天無二日土無二王也東都太廟夲武后所建以祀諸武中宗去主存廟以備行幸遷都之置且商遷都前八後五不必每都别立神主也若曰神主已經奉祀不得一日而廢則桑主以虞至練祭而埋之明是不然時有方士巨彭祖建言唐家土徳請以四季月郊祀天地詔禮官儒者雜議崇敬議禮以先立秋十八日迎黄靈祀黄帝扵五行為土而火為母故火用事之末而祭之三季月則否彭祖牽緯候說事詭不經不可用博士獨孤及上景皇帝配昊天上帝議曰謹按禮經王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖以下六廟則以親盡迭毁而太祖之廟雖百世不遷此五帝三王所以尊祖敬宗也故受命于神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊㝠而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝惟漢崛起豐沛豐公太公皆無位無功徳不可以為祖宗故漢以髙皇帝為太祖其先細微故也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇成王業建封于唐髙祖因之遂以為有天下之號天所命也亦由契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊禮髙祖猶周之祖文王而宗武王也今若以髙祖創業當隮其祀是棄三代之令典遵漢代之末制黜景皇帝之大業同扵豐公太公之不祀返古違道失孰甚焉夫追尊景皇帝廟號太祖所以崇尊之禮也若配天之位免易則太祖之號宜廢祀之不修廟亦當毁尊祖報夲之道其墜扵地乎漢制擅議宗廟以大不敬論今武徳貞觀之憲章未改國家方将敬祀事以和神人禘郊之間恐非所宜臣謹稽禮文叅諸夏殷周漢故事配食天帝之制請仍舊典謹議𤣥宗肅宗既祔室遷獻懿二祖于西夾室引太祖位東嚮禮儀使于休烈議獻懿属尊扵太祖若合食則太祖位不得正請蔵二祖神主以太宗中宗睿宗肅宗從世祖南向髙宗𤣥宗従髙祖北向禘祫不及二祖凡十八年建中初代宗䘮畢當大祫陳京以太常博士上言春秋之義毁廟之主陳扵太祖未毁廟之主合食扵祖無毁廟遷主不享之言唐家祀制與周異周以后稷為始封祖而毁主皆在后稷下故太祖東向常統其尊司馬晉以髙皇太皇處士征西四座為别廟大禘祫則正太祖位無所屈别廟祭髙太以降所以叙親也唐家宜别為獻懿二祖立廟禘祫則祭太祖遂正東向位徳明興聖二帝向已有廟則蔵祔二祖為宜詔百官普議禮儀使太子少師顔真卿曰今議者有三一謂獻懿親逺而遷不當祫宜蔵主西室二謂二祖宜祫食與太祖並昭穆闕東向位三謂引二祖祫禘即太祖永不得全其始宜以二主祔徳明廟雖然扵人神未厭也景帝既受命始封矣百代不遷矣而又配天尊無與上至禘祫時蹔屈昭穆以申孝尊先實明神之意所以教天下之孝也況晉蔡謨等有成議不為無據請大祫享奉獻主東向懿主居昭景主居穆重夲尚順為萬代法夫祫合也有如别享徳明是乃分食非合食也時議者舉然扵是還獻懿主祫於廟如真卿議徳宗即位禮儀使顔真卿論元皇帝祧遷状曰王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七世之廟可以觀徳此經典之明證也七廟之外則曰去祧為壇去壇為墠故歴代儒者制迭毁之禮皆親盡宜毁伏以太宗文皇帝七代之祖髙祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命于天始封于唐元夲皆在不毁之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或議者以祖宗之名難扵迭毁昔漢朝廷近古不敢以私滅公故前漢十一帝為祖宗者四而巳至後漢漸違經意子孫以推美為先自光武以下皆有廟號則祖宗之名莫不建也安帝以讒害大臣廢太子及崩無上宗之奏後自建武以来無毁者因以陵號稱宗至桓帝失徳尚有宗號故初平中左中郎蔡邕以和帝以下功徳無殊而有過差不應為宗及餘非宗者追尊三代皆奏毁之是知祖有功宗有徳存至公之義非其人不居盖三代立禮之夲也自東漢以来則此道䘮矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名悉為廟號未有子孫踐阼而不祖宗先王者以此明之則不得獨據兩字而為不合祧遷之證假令傳祚百代豈可止存百代以為孝乎請依三昭三穆之義永為通典寳應二年升祔𤣥宗肅宗則獻祖懿祖已従迭毁伏以代宗睿文孝皇帝卒哭而祔則合上遷一室元皇帝代數已逺其神主凖禮祧而禘祫之時然後饗祀真卿又上廟享議曰議者或云獻祖懿祖親逺廟遷不當祫享宜永閟扵西夹室又議者云二祖宜同祫享與太祖並列昭穆而空太祖東向之位又議者云二祖若同祫享則太祖之位永不得正宜奉遷二祖神主祔蔵扵徳明皇帝廟臣伏以三議俱未為允且禮經殘闕既無明據儒者能比方義𩔖斟酌其中則可舉而行之盖叶扵正也伏以太祖景皇帝以受命始封之功處百代不遷之廟配天崇享是極尊嚴且至禘祫之時暫居昭穆之位屈已伸孝敬奉祖宗縁齒族之禮廣尊天之道此實太祖明神烝烝之本意亦所以化被天下率循孝弟也請依晉蔡謨等議至五年十月祫享之日奉獻祖神主居東靣之位懿祖太祖臮諸祖宗遵左右昭穆之列此有以彰國家重本尚順之明義足為萬代不易之令典也又議者請奉遷二祖神主扵徳明皇帝廟行祫祭之禮夫祫合也故公羊傳曰大事者何祫也若祫祭不陳扵太廟而享扵徳明廟斯乃分食也豈謂合食乎名實相乖尤失禮意固不可行徳宗時權徳輿上遷廟議曰今年夏四月禘饗于太廟太祖皇帝東嚮之位并遷廟之位右伏准今月十六日勅禘祫之祭禮之大者先有衆議猶未精詳宜更令百僚議限至二十六日内聞奏者臣聞禮有五經莫重扵祭祭稱百順實受其福故曰萬物夲乎天人夲乎祖以太祖始封之重當殷祭東嚮之尊百代不遷下統昭穆此孝享嚴禋之極制也周自后稷十六代至武王毁廟遷主皆太祖之後故序列昭穆合食無嫌漢之太上皇主瘞扵園寢尋置别廟是為属尊故周漢皆太祖之位正自魏至隋則虛其位魏明帝初以太皇别廟未成故權設對祫後有司定七廟之制太祖已下為昭穆二祧旋至三少帝運移于晉不以兄弟為代數故元帝上繼武帝簡文上繼元帝至安帝時然後征西至京兆四府君遷盡未及殷祭運移于宋初永和中疑四府君主所蔵之禮詔公卿博議范宣請特築一室韋𢎞請屋朽乃止蔡謨亦請改築别室若未展者當入就太廟以征西府君東向議竟不行宋齊梁北齊周隋悉虚其位以待太祖皆以短祚其禮不伸則自魏以降太祖列昭穆之位非通例也武徳中立親廟四自宣簡公而下貞觀中七廟六室自𢎞農府君而下開元中始制九廟追尊獻祖懿祖故自武徳至于開元太祖在四廟七廟九廟之數則東向之虛又非例也廣徳二年將及殷祭有司以二祖親盡當遷大祖九室既備其年冬祫扵是正太祖扵東向蔵二主扵夹室凡十八年矣建中二年冬祫有司誤引蔡謨征西之議以獻祖居東向懿祖為昭太祖為穆此誠乖疑倒置之大者也議者或引春秋禹不先鯀湯不先契文武不先不窋以為證且湯與文武皆太祖之後理無所疑至于禹不先鯀安知說者非啓與太康之代而左丘明因而記之耶向者有司以二主蔵夹室非宜則可闕殷祭非敬則可處東向之位則不可是以貞元七年冬太常上奏請下百僚僉議詔可其奏八年春有于頎等一十六狀至十一年又詔尚書省集議有陸淳宇文炫二狀前後異同有七家之說至扵蔵夹室虚東向逺遷園寢分饗禘祫加幣玉虞主而枚卜瘞埋膚引滋多皆失禮意臣䓁審細討論惟置别廟及祔于明徳興聖二說最為可據明徳興聖之廟猶别廟也等扵剏立此又易行伏以明徳皇帝扵舜禹之際與稷契同功契後為殷向五百年稷後為周逾八百年明徳流光無窮啓皇運扵後景福靈長與天地凖又獻懿二祖扵興聖皇帝為曽為𤣥猶周人祔扵先公之祧也此亦亡扵禮者也明尊祖之道正大祭之義禮文祀典莫重扵是凡議同者七状百有餘人其中名儒禮官講貫詳熟臣扵貞元八年蒙聖恩以博士徴至京師属當㑹議時與崔儆劉執同状十一年臣官備近侍不議禁中乃今累叨睿奨獲貳宗伯職業所守典禮是司硏考古今罄竭愚管豈敢以疑文虚說黷陛下嚴敬重難之心其夹室等五家不安之說謹具條上伏惟聖慮裁擇蔵夾室右太祖已下毁廟主之所蔵也今若以二祖之主同在夾室當禘祫之際代祖元皇帝以遷主合食而二主㽞在夹室神靈何所依耶或主有禱則祭無禱則止如殷祭何如或云每禘祫時就饗扵夹室如合食何此其不可也虚東向右自魏晉方有太祖已上府君以備親廟自太祖已下昭穆既列太祖之上親盡皆遷然後正東向之位明不遷之重自魏至隋皆以短歴或遭離多故其禮未行故虚東向自武徳後貞觀開元加廟數太祖尊位厭而未申故虚東向今九廟已備代祖已遷而議虚東向則無其例此其不可也園寢右漢魏太上皇處士居園寢之制近在京師故扵遷主無有異議今二祖園寝皆在趙州法駕撰儀經途遐逺此其不可也分饗右尊祖敬宗至當無二審禘合饗王者所先議者請常以獻祖受祫太祖受禘五年之間迭居東向就如其說則當祫之時太祖固序昭穆矣當禘之禮獻祖何所依也從古已来無此義例此其不可也埋瘞右議者引古者貴祖命歛幣玉蔵諸兩階之間又埋虞主扵廟門外之道左以為比𩔖彼主命幣玉者既反告則無所用矣彼虞主用桑者既練祭則無所用矣不忍䙝瀆故歛而蔵之徹而埋之豈如栗主依神雖廟毁而常存之制哉此其不可也況兩階之問與門外道左皆祖廟也今則下瘞扵子孫之廟扵理安乎此其又不可也以前謹具周漢太祖居東向魏晉以下虛東向并貞元八年十一月兩度㑹議一十八狀内夾室等五家不安之說如前謹錄奏聞貞元七年太常卿裴郁上言商周以契稷為祖上無餘尊故合食有序漢受命祖髙皇帝故太上皇不以昭穆合食魏祖武帝晉祖宣帝故髙皇處士征西等君亦不以昭穆合食景皇帝始封唐唐推祖焉而獻懿親盡廟遷猶居東向非禮之祀神所不享碩下羣臣議扵是太子左庶子李嶸等上言謹按晉孫欽議太祖以前雖有主禘祫所不及其所及者太祖後未毁已升蔵扵二祧者故雖百代及之獻懿在始封前親盡主遷上擬三代則禘祫所不及太祖而下若世祖則春秋所謂陳扵太祖者漢議罷郡國廟丞相韋𤣥成議太上皇孝惠親盡宜毁太上主宜瘞于園惠主遷髙廟太上皇在太祖前主瘞扵園不及禘祫獻懿比也惠遷髙廟在太祖後而及禘祫世祖比也魏明帝遷處士主置園邑嵗時以令丞奉薦東晉以征西等祖遷入西除同謂之祧皆不及祀故唐初下訖開元禘祫猶虚東向位洎立九廟追祖獻懿然祝扵三祖不稱臣至徳時復作九廟遂不為𢎞農府君主以祀不及也廣徳中始以景皇帝當東向位以獻懿兩主親盡罷祫而蔵顔真卿引蔡謨議復奉獻主東向懿昭景穆不記謨議晉未嘗用而唐一王法容可凖乎臣等謂甞禘郊社無二尊瘞毁遷蔵各以義斷景皇帝已東向一日改易不可謂禮宜復蔵獻懿二主扵西室以夲祭法逺廟為祧去祧而壇去壇而墠壇墠有禱祭無禱止之義太祖得正無所屈吏部郎中栁冕等十二人議曰天子以受命之君為太祖諸侯以始封之主為祖故自太祖祖以下親盡迭毁洎秦滅學漢不暇禮晉失宋因故有連王廟之制有虚太祖之位且不列昭穆非所謂有序不建迭毁非所謂有殺連王廟非所謂有别虚太祖位非所謂一尊此禮所由廢也傳曰父為士子為天子祭以天子葬以士今獻懿二祖在唐未受命時猶士也故髙祖太宗以天子之禮祭之而不敢奉以東向位今而易之無乃亂先帝序乎周有天下追王太王王季以天子禮及其祭則親盡而毁漢有天下尊太上皇以天子之禮及祭也親盡而毁唐家追王獻懿二祖以天子禮及其祭也親盡而毁復何所疑周官有先公之祧先王之祧先公遷主蔵后稷之廟其周未受命之祧乎先王遷主蔵文武之廟其周已受命之祧乎故有二祧所以異廟也今自獻而下猶先公也自景而下猶先王也請别廟以居二祖則行周道復古制便工部郎中張薦等請自獻而降悉入昭穆虚東向位司勲員外郎裴樞曰禮親親故尊祖尊祖故敬宗敬宗故収族収族故宗廟嚴宗廟嚴故社稷重太祖之上復追尊焉則尊祖之義乖太廟之外别祭廟焉則社稷不重漢韋𤣥成請瘞主扵園晉虞喜請瘞兩階間喜據左氏自證曰先王日祭祖考月祀曽髙時享及二祧嵗祫及壇墠終禘及郊宗石室是謂郊宗之祖喜請夹室中為石室以處之是不然何者夹室所以居太祖下非太祖上蔵主所居未有卑處正尊處傍也若建石室扵園寝安遷主采漢晉舊章祫禘率一祭庶乎春秋得變之正是時陳京以考功員外郎又言興聖皇帝則獻之曽祖懿之髙祖以曽孫祔曽髙之廟人情大順也京兆少尹韋武曰祫則大合禘則序祧當祫之嵗常以獻東向率懿而後以昭穆極親親及禘則太祖筵于西列衆主左右是扵太祖不為降獻無所厭持諸儒以左氏子齊聖不先父食請迎獻主權東向太祖暫還穆位同官尉仲子陵曰所謂不先食者丘明正文公逆祀儒者安知夏后世數未足時言禹不先鯀乎魏晉始祖率近始祖上皆有遷主引閟宫詩則永閟可也因虞主則瘞園可也縁逺祧則築宫可也以太祖實卑則虚位可也然永祧與瘞園臣子所不安若虚正位則太祖之尊無時而申請奉獻懿二祖遷于徳明興聖廟為順或曰二祖别廟非合食且徳明興聖二廟禘祫之年皆有薦享是已分食奚獨疑二祖乎冕又上禘祫議證十四篇帝詔尚書省㑹百官國子儒官明定可否左司郎中陸淳奏按禮及諸儒議復太祖之位正也太祖位正則獻懿二主宜有所安今議者有四曰蔵夹室曰置别廟曰各遷扵園曰祔興聖廟臣謂蔵夹室則享獻無期非周人蔵二祧之義置别廟論始曹魏禮無傳焉司馬晉議而不用遷諸園亂宗廟之制唯祔興聖廟禘若祫一祭庶乎得禮帝依違未決也國子監四門博士韓愈上議曰陛下追孝祖宗肅敬祀事凡在擬議不敢自專聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之初迄至今嵗屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠今輙先舉衆議之非然後申明其說一曰獻懿廟主宜永蔵之夹室臣以為不可夫祫者合也毁廟之主皆當合食扵太祖獻懿二祖即毁廟主也今雖蔵扵夾室至禘祫之時豈得不食扵太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毁廟之主皆蔵扵祧廟雖百代不毁祫則陳扵太廟而饗焉自魏晉已降始有毁瘞之議事非經據竟不可施行今國家徳厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位況扵毁瘞而不禘祫乎三曰獻懿廟主宜各遷扵其陵所臣又以為不可二祖之祭扵京師列扵太廟也二百年矣今一朝遷之豈惟人聴疑惑抑恐二祖之靈眷頋依遲不即饗扵下國也四曰獻懿廟主宜附扵興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其扵属乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟扵京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既蔵之主而復築宫以祭今之所議與此正同又雖違禮立廟至扵禘祫也合食則禘無其所廢祭則扵義不通此五說者皆所不可故臣博采前聞求其折中以為殷祖𤣥王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東向之位子孫従昭穆之列禮所稱者豈以紀一時之宜非傳扵後代之法也傳曰子雖齊聖不先父食盖言子為父屈也景皇帝雖太祖也其扵獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜従昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比扵伸孫之尊廢祖之祭不亦順乎事異殷周禮従而變非所失禮也臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對靣陳得失庶有發明天寳中詔尚食朔望進食太廟天子使中人侍祠有司不與也貞元十二年帝始詔朔望食畀宗正太常合供扵是太常博士韋彤與博士裴堪議曰禮宗廟朔望不祭園寢則有之貞觀開元間在禮若令不敢變古天寳中始有進食事殆王璵緣生事亡用燕具䙝饌參瀆禮薦不可示逺傳曰祭非外至生于心者也是故聖人等牲牢布籩豆昆蟲草木可薦者莫不咸在所以享宗廟交神明全孝敬也絜膳羞八珍百品可嗜之饌美膬甘旨謂之䙝味所以燕賔客接人情示慈惠也是則薦與宴聖人判為二物不可亂也今若熟饔而享非以異為敬之意且祭不欲數亦不欲疏感時致享以制中也今園寝月二祭不為疏廟嵗五享不為數有司奉承得盡其恭若又加盛饌扵朔望是失禮之中有司不得盡其恭也故王者稽古弗敢以孝思之極而溢禮弗敢以肴品之多而賸味碩罷天寳所増奉園寝以珍奉宗廟以禮兩得所宜帝曰是禮先帝裁定遽更之其謂朕何徐議其可而朔望食卒不廢貞元中将禘祭陳京復奏禘祭大合祖宗必尊太祖位正昭穆請詔百官議尚書左僕射姚南仲等請奉獻懿主祔徳明興聖廟鴻臚卿王權申衍之曰周人祖文王宗武王故詩清廟章曰祀文王也故不言太王王季則太王王季而上皆祔后稷故清廟得祀文王也太王王季之尊私禮也祔后稷廟不敢以私奪公也古者先王遷廟主以昭穆合蔵于祖廟獻懿主宜祔興聖廟則太祖東向得其尊獻懿主歸得其所是時言祔興聖廟什七八天子尚猶豫未剛定至是羣臣稍顯言二祖夲追崇非有受命開國之鴻構又權根援詩禮明白帝茫然扵是定遷二祖于興聖廟凡禘祫一享詔增廣興聖二室㑹祀日薄廟未成張繒為室内神主廟垣間奉興聖徳明主居之廟成而祔憲宗元和中左拾遺元稹上奏曰謹按禮官以順宗至徳大聖大安孝皇帝神主升祔則中宗大和大聖大昭孝皇帝主為代數當遷之廟議者云中宗復辟中興當為百代不遷之廟臺省官等又議云則天為居攝則中宗非中興不得為不遷之廟以愚所裁皆非得禮之中案禮官與臺省官䓁議但以為中宗非中興故不得為不遷之宗曽不知雖實為中興亦不得為不遷之廟何則祖有功而宗有徳盖謂始有功者為祖始有徳者為宗非謂後代有功有徳者盡為祖宗也禮緯云唐虞立二昭二穆與太祖之廟為五夏不立太祖之廟四廟而已至後代以禹為宗亦立五廟其餘仲康復厥位少康代寒浞豈非嗣夏中興哉並無祖宗之號至殷以契為始祖初立五廟後代以湯為宗遂立六廟太戊武丁之徒雖有中宗髙宗之名盖子孫加之懿號而巳亦無不祧之說周人以后稷為始祖後代又祖文王為宗武王遂立七廟唐虞夏殷周雖立廟之數不同其實親親之廟皆以四為准禮記王制云天子七廟三昭三穆與太祖之廟七盖后稷文武三廟為不遷其餘成康已降盡為祧廟故周禮守祧注云先公之祧祔扵后稷之廟先王之祧祔扵文武之廟若以為後代有功有徳者盡為不遷之廟則成康刑措宣王中興平王東周之始王並無不祧之說豈非有功有徳㢤盖以為七廟之數既定若親盡之廟不毁則親親之昭穆無所設矣故不得不祧耳至漢承秦滅學之後諸儒不通大義匡衡貢禹之徒遂建議云髙帝為太祖孝文為太宗孝武為世宗孝宣為中宗惠景已下為遷廟適值漢祚不永昭成已降徳不逮扵四君向若漢有八百之祚繼徳之君有若孝文孝武者七人盡為不遷之廟豈可後代遂不祀其祖禰㢤不經之言孰甚扵此又有以七廟之外别立祖宗之廟為說者以理推之尤為不可假如聖朝以景皇帝為太祖神堯大聖大光孝皇帝為髙祖文武大聖大廣孝皇帝為太宗别立昭穆之廟六合不遷之廟為九盖以為積厚者流澤廣故以増親親之廟六矣夫傳無窮者為萬代計國家以聖生聖以明繼明無非有徳之宗盡為有功之祖則百祖千宗盡居别廟扵禮又可乎必若俟其褒貶然後定祧遷則是臣子有輕議之非萬代無可傳之法考殷周則無據言情禮則兩乖考古宜今孰云可者曷若削漢朝不經之說徴殷周可久之文従親盡則遷之常規為萬代不朽之定制不易親親之祀終無惑惑之疑誠一王之盛典也謹議憲宗時徴仕郎守國子博士史館修撰臣李翺䓁上陵廟日時朔祭議曰國語曰王者日祭禮記曰王立七廟皆月祭之周禮不載日祭月祭惟四時之祭禴祀蒸甞漢朝皆雜而用之盖遭秦火詩書禮經燼滅編殘簡缺漢乃求之先儒穿鑿各伸已見皆託古聖賢之名以信其語故其所記各不同也古者廟有寢而不墓祭秦漢始建寝廟扵園陵而上食焉國家因之而不改貞觀開元禮並無宗廟日祭月祭之禮盖以日祭月祭既已行扵陵寝矣故太廟之中每嵗五饗六告而已不然者房元齡魏徴之輩皆一代名臣窮極經史豈不見國語禮記有日祭月祭之祠乎斯足以明矣伏以太廟之饗籩豆牲牢三代之通禮是貴誠之義也園寝之奠改用常饌秦漢之制乃食味之道也今朔望上食扵陵寝修秦漢故事斯為可矣若朔望上食扵太廟豈非用常䙝味而貴多品乎且非禮所謂至敬不饗味而貴氣臭之義也傳稱屈到嗜芰有疾召其宗老而嘱之曰祭我必以芰及祭薦芰屈建命去芰而用羊饋籩豆脯醢君子是之言事祖考之義當以禮為重不以其生存所嗜為獻盖明非食味也然則薦常饌扵太廟無乃與薦芰為比乎且非三代聖王之所行也况祭器不設爼豆祭官不設三公執事者唯宫闈令宗正卿而已謂上食可也安得以為祭乎且時享于太廟有司攝事祝文曰孝曽孫皇帝臣某謹遣太尉臣名敢昭告于髙祖神堯皇帝祖妣太穆皇后竇氏時維孟春永懐罔極謹以一元太武柔毛剛鬛明粢薌萁嘉蔬嘉薦醴齊敬修時享以申追慕尚饗此祝詞也前享七日質明太尉誓百官扵尚書省曰某日時享于太廟各揚其職不供其事國有常刑凡陪祀之官散齋四日致齋三日然後乃可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂為大故下百僚使得詳議臣等以為貞觀開元禮並無太廟上食之文以禮節情罷之可也至若陵寝上食采國語禮記日祭月祭之詞因秦漢之制脩而存之以廣孝道可也如此則經義可據故事不遺大禮既明永息異論可以繼二帝三王而為萬代法與其黷禮越古貴因循而憚改作猶天地之相逺也謹議武宗會昌元年李徳裕等請尊憲章武孝皇帝為不遷廟状曰臣等伏聞開成中文宗甞頋問宰臣欲褒崇憲宗功徳其時宰臣莫能推順美之心明尊祖之義臣等至愚竊所歎息伏思國家受命二百二十五年矣列聖之功徳區宇之廣大王化之盛明禮樂之偹具過殷周逺矣而未有中興不遷之廟臣等所以夙夜而發憤也禮祖有功宗有徳夏之祖宗經傳無聞殷則一祖三宗成湯為始祖太甲為太宗太戊為中宗武丁為髙宗劉歆曰天子七廟茍冇功徳則宗之所以勸帝者功徳博矣故周公作無逸舉殷之三宗以勸成王漢景帝詔曰孝文皇帝徳厚侔天地利澤施四海廟樂不稱朕甚懼焉其為孝文皇帝廟為昭徳之舞以明休徳然後祖宗之功徳施于萬代其與丞相列侯中二千石禮官具禮儀奏丞相申屠嘉䓁奏曰功莫大扵髙皇帝徳莫盛扵孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜代代獻祖宗之廟又漢宣帝詔夙夜惟念孝武皇帝躬履仁義選名将討不服功徳茂盛不能盡宣而廟樂未稱其議奏有司奏請尊孝武為世宗廟奏盛徳文始五行之舞天子代代獻此則子孫褒崇祖宗之明據也自天寳以後兵宿中原强侯締交髖髀甚衆貢賦不入刑政自出包荒含垢以至于貞元徳宗懲奉天之難厭征伐之事戎臣優以不朝終老于外其卒則以幕吏将校代之故長武城在王畿之内斥逐主将矣河中居股肱之郡坐邀符節韋臯因備邊之勢自擅靈闗李錡竊煮海之資專制澤國而兩河蕃鎮或倉卒易帥甚扵奕棊或陸梁弄兵同扵拒轍憲宗感祖宗之宿憤舉升平之典法始命将帥順天行誅元年僇惠琳暨闢錡季年梟元濟及師道其他或折簡而召或執珪請覲獻其名城割其愛子不可遍舉豈有去天下之害不享其名致生人之安不受其報臣伏見元和初議遷廟之禮而史官稱中宗不得號中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也臣等竊思此議實所未盡中宗朝自以政事多釁權移后妃所以未得稱為中興恐議者復以此為疑夫興業之與隆道事實不同漢光武再造邦家不失舊物晉元帝雖在江左亦能纂緒此乃王業中興可謂有功矣殷髙宗躬行大孝求賢俾乂周宣王微而復興衰而復盛此乃王道中興可謂有徳矣故詩云車攻宣王復古也宣王能内修政事外攘夷狄復文武之境土又蒸民美宣王任賢使能周室中興焉又江漢美宣王能興衰撥亂命召公平淮夷又漢書宣帝贊曰功光祖宗業垂後嗣可謂中興侔徳殷宗周宣之美若皆如漢光武晉元帝則殷宗周宣並不得稱中興矣臣䓁伏思任賢使能内修政事平淮夷之叛復祖宗之土皆憲宗有之所謂隆道中興與殷髙宗周宣王漢宣帝侔徳矣臣等敢遵古典請尊憲宗章武孝皇帝為百代不遷之廟上以昭陛下大孝之徳廣貽謨之訓下以表臣等思古之憤申欲報之誠如合聖心伏望令諸司清望官四品以上尚書兩省御史臺與禮官叅議聞奏謹錄奏聞歴代名臣奏議巻十七
