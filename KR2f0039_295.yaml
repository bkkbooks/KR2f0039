body:
  text: 歷代名臣奏議卷二百九十五明楊士竒等撰災祥殷帝太戊立伊陟為相陟伊尹之子亭有祥桑穀共生於朝一暮大拱祥妖怪也二木合生不恭之罰鄭玄曰兩手扼之曰拱帝懼問伊陟陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之是時史請卜之湯廟卜者曰吾聞之祥者福之先者也見祥而為不善則福不生殃者禍之先者也見殃而能為善則禍不至於是乃早朝而晏退問疾弔喪三日而桑穀自亡周幽王二年西周三川皆震涇渭洛也伯陽甫曰周將亡矣伯陽父周柱下史老子也夫天地之氣不失其序若過其序民亂之也過失也言民不敢斥王者也陽伏而不能出隂迫而不能蒸蒸升也於是有地震今三川實震是陽失其所而填隂也為隂所鎮笮也陽失而在隂在隂下也原必塞原塞國必亡夫水土演而民用也水土氣通為演演獝潤也演則生物民得用之土無所演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭亡國之徴也川竭必山崩若國亡不過十年數之紀也天之所棄不過其紀是嵗三川竭岐山崩十一年幽王乃滅周乃東遷晉平公問於士文伯曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時平公以石言于魏榆問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動于民則有非言之物而言今宫室崇侈民力雕盡怨讟並作莫保其性石言不亦宜乎齊景公時彗星見景公坐柏寢嘆曰堂堂誰有此乎服虔曰景公自恐德薄不能久享齊國故曰誰有此也羣臣皆泣晏子笑公怒晏子曰臣笑羣臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君髙臺深池賦斂如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝衆口乎是時景公好治宫室聚狗馬奢侈厚賦重刑故晏子以此諫之公使祝禳之晏子曰無益也秖取誣焉天道不諂不二其命若之何禳之也且天之有彗以除穢也君無穢德又何禳焉若德之穢禳之何損詩云惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德之回亂民將流亡祝史之為無能補也公説乃止齊太旱景公召羣臣問曰天不雨久矣民且有飢色吾使人卜之祟在髙山廣水寡人欲少賦斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天久不雨髮將焦身將熱彼獨不欲雨乎祠之無益景公曰不然吾欲祠河伯可乎晏曰不可祠此無益也夫河伯以水為國以魚鱉為民天久不雨水泉將下百川將竭國將亡民將滅矣彼獨不欲雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎於是景公出野暴露三日天果大雨民盡得種樹景公曰善哉晏子之言可無用乎其惟有德也宋景公時熒惑在心懼召子韋而問曰熒惑在心何也子韋曰熒惑天罰也心宋分野也禍當君身雖然可移於宰相公曰宰相所使治國也而移死焉不祥寡人請自當也子韋曰可移於民公曰民死將誰君乎寧獨死耳子韋曰可移於嵗公曰嵗飢民人必死為人君欲殺其民以自活其誰以我為君乎是寡人之命固盡矣子無復言矣子韋還走北面再拜曰臣敢賀君天之處髙而聽卑君有仁人之言三天必三賞君今夕星必徙舍君延壽二十一嵗公曰子何以知之對曰君有三善故三賞星必三舍舍行七星星當一年三七二十一故曰延壽二十一年臣請伏於陛下以司之星不徙臣請死之公曰可是夕也星三徙舍魏文侯御廪災文侯素服辟正殿五日羣臣皆素服而弔公子成父獨不弔文侯復殿公子成父趨而入賀曰甚大善矣夫御廪之災也文侯作色不悅曰夫御廪者寡人寶之所藏也今火災寡人素服辟正殿羣臣皆素服而弔至於子大夫而不弔今已復殿矣猶入賀何為公子成父曰臣聞之天子藏於四海之內諸侯藏於境內大夫藏於其家士庶人藏於篋櫝非其所藏者不有天災必有人患今幸無人患乃有天災不亦善乎文侯喟然嘆曰善漢武帝建元六年六月丁酉遼東髙廟災四月壬子髙園便殿火董仲舒對曰春秋之道舉往以明來是故天下有物視春秋所舉與同比者精微眇以存其意通倫類以貫其理天地之變國家之事粲然皆見亡所疑矣按春秋魯定公哀公時季氏之惡已孰孰成也而孔子之聖方盛夫以盛聖而易孰惡季孫雖重魯君雖輕其勢可成也故定公二年五月兩觀災兩觀僭禮之物天災之者若曰僭禮之臣可以去已見罪徴而後告可去此天意也定公不知省至哀公三年五月桓宫釐宫災二者同事所為一也若曰燔貴而去不義云爾哀公未能見故四年六月亳社災兩觀桓釐廟毫社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也季氏亡道久矣前是天不見災者魯未有賢聖臣雖欲去季孫其力不能昭公是也至定哀乃見之其時可也不時不見天之道也今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同其不當立久矣至於陛下時天乃災之者殆亦其時可也昔秦受亡周之敝而亡以化之漢受亡秦之敝又亡以化之夫繼二敝之後承其下流兼受其猥難治甚矣又多兄弟親戚骨肉之連驕揚奢侈恣睢者衆所謂重難之時者也陛下正當大敝之後又遭重難之時甚可憂也故天災若語陛下當今之世雖敝而重難非以太平至公不能治也視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟乃可視近臣在國中處旁昃及貴不正者忍而誅之如吾燔髙園殿乃可云爾在外而不正者雖貴如髙廟猶災燔之況諸侯乎在內而不正者雖貴如髙園殿猶燔災之況大臣乎此天意也罪在外者天災外罪在內者天災內燔甚罪當重燔簡罪當輕承天意之道也宣帝時大將軍霍光薨兄子山領尚書親屬皆宿衛內侍地節三年夏京師雨雹東海蕭望之上疏願賜清間之宴口陳災異之意帝下少府宋畸問狀無有所諱望之奏曰臣以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉音向使魯君察於天變宜亡此害今陛下以聖德居位思政求賢堯舜之用心也然而善祥未臻隂陽不和是大臣任政一姓擅藝之所致也附枝大者賊本心私家盛者公室危唯明主躬萬機選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣奏對天子拜望之為謁者元帝時地震𢎞恭石顯許史子弟侍中諸曹皆側目於蕭望之等劉向懼焉乃使其外親上變事言竊聞故前將軍蕭望之等皆忠正無私欲致大治忤於貴戚尚書今道路人聞望之等復進以為且復見毁讒必曰嘗有過之臣不宜復用是大不然臣聞春秋地震為在位執政太盛也不為三獨夫動亦已明矣謂蕭望之周堪及向獨夫猶言匹夫也且往者髙皇帝時季布有罪至於夷滅後赦以為將軍髙后孝文之間卒為名臣孝武帝時兒寬有重罪繫按道侯韓説諫曰説讀曰悅前吾丘夀王死陛下至今恨之今殺寬後將復大恨矣上感其言遂貰寬復用之位至御史大夫御史大夫未有及寬者也又董仲舒坐私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興常有詔問仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗繫獄三年免為庶人宣帝復用勝至長信少府太子太傅名敢直言天下美之若乃羣臣多此比類難一二記有過之臣無負國家有益天下此四臣者足以觀矣前𢎞恭奏望之等獄決三月地大震恭移病出後復視事天隂雨雪由是言之地動殆為恭等臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之源塞矣永光元年劉向見周堪張猛在位幾音冀已得復進懼其傾危乃上封事曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徴表為國欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也況重以骨肉之親又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報忠臣之義一攄愚意退就農畝死無所恨臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故蕭韶九成而鳯凰來儀擊石拊石而百獸率舞四海之內靡不和寧及至周文開基西郊雜遝衆賢罔不肅和崇推讓之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和於內萬國歡於外故盡得其歡心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐牟釐牟麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方衆小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之既臧則具是違謀之不臧則具是依君子獨處守正不撓衆枉勉疆以從王事則見憎毒讒訴故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸當是之時日月薄蝕而無光其詩曰朔日辛卯日有蝕之亦孔之醜又曰彼月而微此日而微今此下民亦孔之哀又曰日月鞠凶不用其行四國無政不用其良天變見於上地變動於下水泉沸騰山谷易處其詩曰百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚衆大也此皆不和賢不肖易位之所致也自此之後天下大亂篡殺殃禍並作厲王奔彘幽王見殺至乎平王末年魯隱之始即位也周大夫祭伯乖離不和出奔於魯而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣諸侯背叛而不朝周室卑微二百四十二年之間日食三十六地震五山陵崩弛二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鷁退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨木冰李梅冬實七月霜降草木死八月殺菽大雨雹雨雪雷霆失序相乘水旱飢蝝螽螟螽午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師於貿戎伐其郊鄭傷桓王戎執其使衛侯朔召不往齊逆命而助朔五大夫爭權三君更立莫能正理遂至陵夷不能復興由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優遊寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午謬戾乖剌更相讒訴轉相是非傳授增加文書紛糾前後錯謬毁譽混亂所以營惑耳目感移心意不可勝載分曹為黨往往羣朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乖治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權藉勢之人子弟鱗集於朝羽翼隂附者衆輻湊於前毁譽將必用以終乖離之咎是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶卻行而求及前人也初元以來六年矣案春秋六年之中災異未有稠如今者也夫有春秋之異無孔子之救猶不能解紛況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譛之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工歡兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毁流言相謗豈可勝道哉帝堯成王能賢舜禹周公而誚共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而誚孔子叔孫故以大亂汚辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位厯年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望隂陽之調不亦難乎是以羣小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄愠于羣小小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅連茹以其彚征吉在上則引其類在下則推其類故湯用伊尹不仁者逺而衆賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩厯周唐之所進以為法原秦魯之所誚以為戒考祥應之福省災異之禍以揆當世之變放逺邪佞之黨壞散險詖之聚杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也臣幸得託肺附誠見隂陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以不宜宣泄元帝因日蝕地震之變問匡衡以政治得失衡上疏曰臣聞五帝不同樂三王各異教民俗殊務所遇之時異也陛下躬聖德開太平之路閔愚吏民觸法抵禁此年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以姦惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉恥之節薄淫辟之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆茍合徼幸以身設利不改其原雖嵗赦之刑猶難使錯而不用也臣愚以為宜一曠然大變其俗孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義髙節則民興行寬柔和惠則衆相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也今俗吏之治皆不本禮讓而上克暴或忮害好陷人於罪貪財而慕藝故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民淫祀晉侯好儉而民畜聚太王躬仁邠國貴恕由此觀之治天下者審所上而已今之偽薄忮害不讓極矣臣聞教化之流非家至而人説之也賢者在位能者布職朝廷崇禮百僚敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知是以百姓安而隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寧以保我後生此成湯所以建至治保子孫化異俗而懷鬼方也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相蕩善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者暗水旱之災隨類而至今關東連年飢饉百姓困乏或至相食此皆生於賦斂多民所共者大而吏安集之不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宫衛罷珠崖偃武行文將欲度唐虞之隆絶殷周之衰也諸見罷珠崖詔書者莫不欣欣人自以將見太平也宜遂減宫室之度省靡麗之飾考制度修外內近忠正逺巧佞放鄭衛進雅頌舉異材開直言任溫良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務明自然之道博和睦之化以崇至仁匡失俗易民視令海內昭然咸見本朝之所貴道德𢎞於京師淑問揚乎疆外然後大化可成禮讓可興也上説其言遷衡為光祿大夫太子太傅初元元年翼奉上封事曰臣聞之於師曰天地設位懸日月布星辰分隂陽定四時列五行以視聖人名之曰道聖人見道然後知王治之象故畫州土建君臣立律厯陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有隂陽詩有五際春秋有災異皆列終始推得失考天心以言王道之安危至秦乃不説傷之以法是以大道不通至於滅亡今陛下明聖深懷要道燭臨萬方布德流惠靡有闕遺罷省不急之用振救困貧賦醫藥賜棺錢恩澤甚厚又舉直言求過失盛德純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇知日蝕地震之效昭然可明猶巢居知風穴處知雨亦不足多適所習耳臣聞人氣內逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人之有五藏六體五藏象天六體象地故藏病則氣色發於面體病則欠伸動於貌今年太隂建於甲戌律以庚寅初用事歷以甲午從春厯中甲庚律得參陽性中仁義情得公正貞廉百年之精歲也正以精歲本首王位日臨中時接律而地大震其後連月久隂雖有大令猶不能復隂氣盛矣古者朝廷必有同姓以明親親必有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓疏而難通故同姓一異姓五乃為平均今左右亡同姓獨以舅后之家為親異姓之臣又疏二后之黨滿朝非特處位藝尤奢僭過度呂霍上官足以卜之甚非愛人之道又非後嗣之長策也隂氣之盛不亦宜乎臣又聞未央建章甘泉宫才人各以百數皆不得天性若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王園與其後宫宜為設員出其過制者此損隂氣應天救邪之道也今異至不應災將隨之其法大水極隂生陽反為大旱甚則有火災春秋宋伯姬是矣唯陛下財察明年夏四月孝武園白鶴館災奉自以為中又上疏曰臣前上五際地震之效曰極隂生陽恐有火災不合明聽未見省答臣竊內不自信今白鶴館以四月乙未時加於卯月宿亢災與前地震同法臣奉乃深知道之可信也不勝拳拳願復賜間卒其終始上復延問以得失奉以為祭天地於雲陽汾隂及諸寢廟不以親疏迭毁皆煩費違古制又宫室苑囿奢泰難供以故民困國虛亡纍年之畜所繇來久不改其本難以末正乃上疏曰臣聞昔者盤庚改邑以興殷道聖人美之竊聞漢德隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宮館也未央宫又無髙門武臺麒麟鳯皇白虎玊堂金華之殿獨有前殿曲臺漸臺宣室溫室承明耳孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存又下遺詔不起山墳故其時天下大和百姓洽足德流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻黽池前鄉嵩髙後介大河建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西逺氐羌之難陛下共已亡為按成周之居兼盤庚之德萬歲之後長為髙宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作故願陛下遷都正本衆制皆定亡復繕治宫館不急之費嵗可餘一年之畜臣聞三代之祖積德以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔有司各敬其事在位莫非其人天下甫二世耳然周公猶作詩書深戒成王以恐失天下書則曰王母若殷王紂其詩則曰殷之未喪師克配上帝宜監于殷駿命不易今漢初取天下起於豐沛以兵征伐德化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未久至於陛下八世九主矣雖有成王之明然亡周召之佐今東方連年飢饉加之以疾疫百姓菜色或至相食地比震動天氣溷濁日光侵奪繇此言之藝國政者豈可以不懷怵惕而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太隂以東行到後七年之明歲必有五年之餘蓄然後大行考室之禮雖周之隆盛亡以加此唯陛下留神詳察萬世之策書奏天子異其意成帝建始三年冬日食地震同日俱發詔舉方正直言極誎之士太常陽城侯劉慶忌舉太常丞谷永待詔公車永對曰陛下秉至聖之純德懼天地之戒異飭身修政納問公卿又下明詔帥舉直言燕見紬繹以求咎愆使臣等得造明朝承聖問臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心則庶徴序於下日月理於上如人君淫溺後宫盤樂遊田五事失於躬大中之道不立則咎徴降而六極至凡災異之發各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭墻之內二者同日俱發以丁寧陛下厥咎不逺宜厚求諸身意豈陛下志在閨門未恤政事不慎舉錯屢失中與內寵大盛女不遵道嫉妒專寵上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於內藝行於外至覆傾國家惑亂隂陽昔褒姒用國宗周以喪閻妻驕扇日以不臧此其效也經曰皇極皇建其有極傳曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統羣生方內之治亂在陛下所執誠留意於正身勉強於力行損燕私之間以勞天下放去淫溺之樂罷歸倡優之笑絶卻不享之儀慎節遊田之虞起居有常循禮而動躬親政事致行無倦安服若性經曰繼自今嗣王其毋淫于酒毋逸于遊田惟正之共未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致慎也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功幽王惑於褒姒周德降亡魯桓脅於齊女社稷以傾誠修後宫之政明尊卑之序貴者不得嫉妒専寵以絶驕嫚之端抑褒閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宫親屬饒之以財勿與政事以逺皇父之類損妻黨之權未有閨門治而天下亂者也治逺自近始習善在左右昔龍管納言而帝命惟允四輔既備成王靡有過事誠敕正左右齊栗之臣戴金貂之飾執常伯之職者皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過則左右肅艾羣僚仰法化流四方經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢違功則亂誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能考功實以定德無用比周之虛譽母聽浸潤之譛訴則抱功修職之吏無蔽傷之憂比周邪偽之徒不得即工小人日銷俊乂日隆經曰三載考績三考黜陟幽明又曰九德咸事俊乂在官未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下分絶為十二州制逺之道微而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海內崩析者刑罰深酷吏行殘賊也夫違天害德為上取怨於下莫甚乎殘賊之吏誠放退殘賊酷暴之吏錮廢勿用益用溫良上德之士以親萬姓平刑釋寃以理民命務省繇役母奪民時薄收賦稅毋殫民財使天下黎元咸安家樂業不苦踰時之役不患苛暴之政不疾酷烈之吏雖有唐堯之大災民無離上之心經曰懷保小人惠于鰥寡未有德厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極傳曰六沴作見若不共御六罰既侵六極其下今三年之間災異鋒起小大畢具所行不享上帝上帝不豫炳然甚著不求之身無所改正疏舉廣謀又不用其言是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南面之急務唯陛下留神對奏天子異焉特召見永又奏曰臣前幸得條對災異之效禍亂所極言關於聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虛文欲末殺災異讕誣天是故皇天勃然發怒甲乙之間暴風三臻拔樹折木此天至明不可欺之效也上復問永永對曰日食婺女九度占在皇后地震蕭牆之內咎在貴妾二者俱發明同事異人共掩制陽將害繼嗣也亶日食則妾不見亶地震則后不見異日而發則似殊事亡故動變則恐不知是月后妾當有失節之郵故天因此兩見其變若曰違失婦道隔逺衆妾妨絶繼嗣者此二人也永始二年二月晦日有食之永以京房易占對曰元年九月日蝕酒亡節之所致也獨使京師知之四國不見者若曰湛湎于酒君臣不别禍在內也今年日食賦斂不得度民愁怨之所致也所以使四方皆見京師隂蔽者若曰人君好治宫室大營墳墓賦斂兹重而百姓屈竭禍在外也永遷涼州刺史奏事京師訖當之部時有黑龍見東萊上使尚書問永受所欲言永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輒上聞則商周不易姓而迭興三正不變改而更用夏商之將亡也行道之人皆知之晏然自以若天有日莫能危是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也陛下誠垂寬明之聽無忌諱之誅使芻蕘之臣得盡所聞於前不懼於後患直言之路開則四方衆賢不逺千里輻湊陳忠羣臣之上願社稷之長福也漢家行夏正夏正色黑黑龍同姓之象也龍陽德由小之大故為王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之際欲因擾亂舉兵而起者邪將動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能處也元年九月黑龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒書曰乃用婦人之言自絶于天四方之逋逃多罪是崇是長是信是使詩云燎之方陽寧或滅之赫赫宗周褒姒滅之易曰濡其首有孚失是秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效易曰在中餽無攸遂言婦人不得與事也詩曰懿厥哲婦為梟為鴟亂匪降自天生自婦人建始河平之際許班之貴傾動前朝熏灼四方賞賜無量空虛內藏女寵至極不可上矣今之後起天所不饗什倍于前廢先帝法度聽用其言官秩不當縱釋王誅驕其親屬假之威權縱橫亂政刺舉之吏莫敢奉憲又以掖庭獄大為亂阱搒箠慘於炮烙絶滅人命主為趙李報德復怨反除白罪建治正吏多繫無辜掠立迫恐至為人起責分利受謝生入死出者不可勝數是以日食再既以昭其辜王者必先自絶然後天絶之陛下棄萬乘之至貴樂冡人之賤事厭髙美之尊號好匹夫之卑字崇聚僄輕無義小人以為私客數離深宫之固挺身晨夜與羣小相隨烏集雜會飲醉吏民之家亂服共坐流湎媟嫚溷殽無别閔免遁樂晝夜在路典門户奉宿衛之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聽邪臣之計去髙敞初陵捐十年功緒改作昌陵反天地之性因下為髙積土為山發徒起邑並治宫館大興繇役重增賦斂徴發如雨役百乾溪費疑音擬驪山靡敝天下五年不成而後反故又廣盱大也營表發人塜墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異屢降飢饉仍臻流散冗食餒死於道以百萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不逺在夏后之世願陛下追觀夏商周秦所以失之以鏡考已行有不合者臣當伏妄言之誅漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠宜發明聖之德昭然逺寤畏此上天之威怒深懼危亡之徴兆蕩滌邪辟之惡志厲精致政專心反道絶羣小之私客免不正之詔除悉罷北宫私奴車馬媠遊之具克已復禮母二微行出飲之過以防迫切之禍深惟日食再既之意抑損椒房玊堂之盛寵毋聽後宫之請謁除掖庭之亂獄去炮烙之陷穽誅戮佞邪之臣及左右執左道以事上者以塞天下之望且寢初陵之作止諸繕治宫室闕更減賦盡休力役存恤振救困乏之人以弭逺方厲崇忠直放退殘賊無使素餐之吏久尸厚祿以次貫行固執無違夙夜孳孳屢省無怠舊愆畢改新德既章纎介之邪不復載心則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保唯陛下留神反覆熟省臣言臣幸得備邉部之吏不知本朝失得瞽言觸忌諱罪當萬死元延元年永為北地太守時災異尤數當之官上使衛尉淳于長受永所欲言永對曰臣永幸得以愚朽之材為太中大夫備拾遺之臣從朝者之後進不能盡思納忠輔宣聖德退無被堅執鋭討不義之功猥蒙厚恩仍遷至北地太守絶命隕首身膏野草不足以報塞萬分陛下聖德寬仁不遺易忘之臣垂周文之聽下及芻蕘之愚有詔使衛尉受臣永所欲言臣聞事君之義有言責者盡其忠有官守者修其職臣永幸得免於言責之辜有官守之任當畢力遵職養綏百姓而已不宜復關得失之辭忠臣之於上志在過厚是故逺不違君死不忘國昔史魚既沒餘忠未訖委柩後寢以尸逹誠汲黯身外思內發憤舒憂遺言李息經曰雖爾身在外乃心無不在王室臣永幸得給事中出入三年雖執干戈守邉陲思慕之心常存于省闥是以敢越郡吏之職陳纍年之憂臣聞天生蒸民不能相治為立王者以統理之方制海內非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有德不私一姓明天下乃天下之天下非一人之天下也王者躬行道德承順天地博愛仁恕恩及行葦籍稅取民不過常法宫室車服不踰制度事節財足黎庶和睦則卦氣理效五徴時序百姓夀考庶草蕃滋苻瑞並降以昭保右失道妄行逆天暴物窮奢極欲湛湎荒淫婦言是從誅逐仁賢離逖骨肉羣小用事峻刑重賦百姓愁怨則卦氣悖亂咎徴著郵上天震怒災異屢降日月薄食五星失行山崩川潰水泉踊出妖孽並見茀星耀光飢饉􅥐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有德詩云乃眷西顧此惟豫宅夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功德有厚薄期質有修短時世有中季天道有盛衰陛下承八世之功業當陽數之標季涉三七之節紀遭無妄之卦運直百六之災厄三難異科雜焉同會建始元年以來二十載間羣災大異交錯蜂起多於春秋所書八世著紀久不塞除重以今年正月己亥朔日有食之三朝之會四月丁酉四方衆星白晝流隕七月辛未彗星橫天乘三難之際會畜衆多之災異因之以飢饉接之以不贍彗星極異也七精所生流隕之應出於飢變之後兵亂作矣厥期不久隆德積善懼不克濟內則為深宫後庭將有驕臣悍妾醉酒狂悖卒起之敗北宫苑囿街巷之中平安之家幽間之處徴舒崔杼之亂外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍內亂朝暮日戒諸夏舉兵以火角為期安危之分界宗廟之至憂臣永所以破膽寒心豫言之纍年下有其萌然後變見于上可不致慎禍起細微姦生所易願陛下正君臣之義無復與羣小媟黷燕飲中黃門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留勤三綱之嚴修後宫之政抑逺驕妒之寵崇近婉順之行加惠失志之人懷柔怨恨之心保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除內亂之路塞矣諸夏舉兵萌在民飢饉而吏不恤興於百姓困而賦斂重發於下怨離而上不知易曰屯其膏小貞吉大貞凶傳曰飢而不損兹謂泰厥災水厥咎亡訞辭曰關動牡飛辟為無道臣為非厥咎亂臣謀篡王者遭衰難之世有飢饉之災不損用而大自潤故凶百姓困貧無以共求愁悲怨恨故水城關守國之固固將去焉故牡飛往年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水泛濫郡國五十有餘此年喪稼時過無宿麥百姓失業流散羣輩守關大異較炳如彼水災浩浩黎庶窮困如此宜損常稅小自潤之時而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之狀殆為此發古者穀不登虧膳災屢至損服凶年不暨塗明王之制也詩云凡民有喪扶服救之論語曰百姓不足君孰豫足臣願陛下勿許加賦之奏益減大官導官中御府均官掌畜廪犧用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏開關梁內流民恣所欲之以救其急立春遣使者循行風俗宣布聖德存恤孤寡問民所苦勞二千石敕勸耕桑毋奪農時以慰綏元元之心防塞大姦之隙諸夏之亂庶幾可息臣聞上主可與為善而不可與為惡下主可與為惡而不可與為善陛下天然之性疏通聰敏上主之姿也少省愚臣之言感寤三難深畏大異定心為善捐忘邪志毋二舊愆厲精致政至誠應天則積異塞於上禍亂伏於下何憂患之有竊恐陛下公志未専私好頗存尚愛羣小不肯為耳對奏天子甚感其言成帝因日蝕地震之變詔舉賢良方正能直言士合陽矦梁放舉武庫令杜欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也臣愚不足以奉大對臣聞日蝕地震陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五或吳楚侵中國或政權在臣下或婦乘夫或臣子背君父事雖不同其類一也臣竊觀之事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無強大之國三垂蠻夷無逆理之節殆為後宫何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中此必適妾將有爭寵相害而為患者惟陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至髙宗遭雊雉之戒飭已正事享百年之夀殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明內推至誠深思天變何應而不感何搖而不動孔子曰仁逺乎哉惟陛下正后妾抑女寵防奢泰去佚遊躬節儉親萬事數御安車由輦道親二宫之饔膳致晨昏之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近諂諛之人而逺公方信讒賊之臣以誅忠良賢俊失在巖穴大臣怨於不以雖無變異社稷之憂也天下至大萬事至衆祖業至重誠不可以逸豫為不可以奢泰持也惟陛下忍無益之欲以全衆庶之命鴻嘉二年三月博士行大射禮有飛雉集于庭厯階登堂而雊又集大常宗正丞相御史大夫大司馬車騎將軍之府又集未央宫承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以類相應師古曰以經術待詔其人名寵不記姓也譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣經載髙宗雊雉之異以明轉禍為福之驗今雉以博士行禮之日大衆聚會飛集於庭歷階登堂萬衆睢睢呼惟反驚怪連日經歷三公之府太常宗正典宗廟骨肉之官然後入宫其宿留告曉人具備深切宿先就反留力救反雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖德如此者左右阿諛甚衆不待臣音復讇而足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先受誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出泆行流聞海內傳之甚於京師外有微行之害內有疾病之憂皇天數見災異欲人變更終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有髙祖天下當以誰屬乎師古曰不然者謂不如所諫而自修改也老母帝之母即太后也言帝不自修改國家危亡太后不知處所髙祖天下無所付屬也屬之欲反宜謀於賢知克已復禮以求天意繼嗣可立災變尚可銷也定陶共王來朝太后與上承先帝意遇王甚厚大將軍王鳯心不便共王在京師會日蝕鳯因言日食隂盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國上不得已而許之京兆尹王章素剛直敢言乃奏封事言日蝕之咎天子召見章延問以事章對曰天道聰明佑善而災惡以瑞異為符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正義善事當有祥瑞何故致災異災異之發為大臣顓政者也今聞大將軍猥歸日蝕之咎於定陶王建遣之國茍欲使天子孤立於上顓擅朝事以便其私非忠臣也且日蝕隂侵陽臣顓君之咎今政事大小皆自鳯出天子曽不一舉手鳯不內省責反歸咎善人推逺定陶王且鳯誣罔不忠非一事也前丞相樂昌侯商本以先帝外屬內行篤有威重位歷將相國家柱石臣也其人守正不肯詘節隨鳯委曲卒用閨門之事為鳯所罷身以憂死衆庶愍之又鳯知其小婦弟張美人已嘗適人於禮不宜配御至尊託以為宜子納之後宫茍以私其妻弟聞張美人未嘗任身就館也且羌俗尚殺首子以蕩腸正世况於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及他所不見者鳯不可令久典事宜退使就第選忠賢以代之自鳯之白罷商遣定陶王也上不能平及聞章言乃感寤納之謂章曰微京兆尹直言吾不聞社稷計王鳯専政災異寖甚中壘校尉劉向上奏曰臣聞伯禹戒帝舜毋若丹朱傲周公戒成王毋若殷王紂詩曰殷監不逺在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹按春秋二百四十二年日蝕三十六襄公尤數率三嵗五月有竒而一食漢興訖竟寧孝景帝尤數率三嵗一月而一食臣向嘗數言日當食今當三年比食自建始以來二十嵗間而食率二嵗六月而一發古今罕有異有小大希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故歷失則攝提失方孟陬無紀此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出於四孟太白經天而行無雲而雷枉矢天夜光熒惑襲月孽火燒宫野禽戲廷都門內崩長人見臨洮石隕于東郡星孛大角以亡觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有泰山卧石自立上林僵柳復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西久隂不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉髙宗成王亦有雊雉拔木之變能思其故故髙宗有百年之福成王有復風之報神明之應應若景嚮世所同聞也臣幸得託末屬誠見陛下有寬明之德冀銷大異而興髙宗成王之聲以崇劉氏故貇貇數姦死亡之誅今日食尤屢星孛東井攝提炎及紫宫有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意是以設卦指爻而復説義書曰伻來以圖天文難以相曉臣雖圖上猶須口説然後可知願賜清燕之間指圖陳狀上輒入之然終不能用也哀帝即位召李尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言無有所諱尋對曰陛下聖德尊天敬地畏命重民悼懼變異不忘疏賤之臣幸使重臣臨問竊見陛下新即位開大明除忌諱博延名士靡不並進臣尋位卑術淺過隨衆賢待詔食大官衣御府久汙玊堂之署比得召見亡以自效復特見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須臾之間宿留瞽言考之文理稽之五經揆之聖意以參天心夫變異之來各應象而至謹條陳所聞易曰縣象著明莫大乎目夫日者衆陽之長輝光所燭萬里同晷人君之表也故日將旦清風發羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中輝光君德盛明大臣奉公日將入專以一君就房有常節君不修道則日失其度暗昧亡光各有云為其於東方作日初出時隂雲邪氣起者法為牽於女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營間者日尤不精光明侵奪失色邪氣珥霓數作本起於晨相連至昏其日出後至日中間差愈小臣不知內事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不慎也惟陛下執乾剛之德強志守度毋聽女謁邪臣之態諸保阿乳母甘言悲詞之託斷而勿聽勉強大誼絶小不忍良有不得已可賜以貨財不可私以官位誠皇天之禁也日失其光則星辰放流陽不能制隂隂桀得作間者大白正晝經天宜隆德克躬以執不軌臣聞月者衆隂之長消息見伏百里為品千里立表萬里連紀妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君德春夏南秋冬北間者月數以春夏與日同道過軒轅上后受氣入太微帝廷揚輝光犯上將近臣列星皆失色厭厭如滅此為毋后預政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足仗矣屋大柱小可為寒心唯陛下親求賢士無強所惡以崇社稷尊強本朝臣聞五星者五行之精五帝司命應王者號令為之節度嵗星主嵗事為統首號令所紀今失度而盛此君指意欲有所為未得其節也又填星不避嵗星者后帝共政相留於奎婁當以義斷之熒惑往來無常周歷兩宫作態低卬音昻入天門上明堂貫尾亂宫太白發越犯庫兵寇之應也貫黃龍入帝庭當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故禍亂不成也熒惑厥弛佞巧依藝微言毁譽進類蔽善太白出端門臣有不臣者火入室金上堂不以時解其憂凶填嵗相守又主內亂宜察蕭墻之內毋忽親疏之微誅放佞人防絶萌芽以蕩滌濁穢消散積惡無使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出早政緩則出晚政絶不行則伏不見而為彗茀四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下也宜深自改治國故不可以戚戚欲速則不達經曰三載考績三考黜陟加以號令不順四時既往不咎來事之師也間者春三月治大獄時賊隂立逆恐歲小收季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土溼奧恐後有雷雹之變夫以喜怒賞罰而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動靜不失其時其道光明書曰敬授民時故古之王者尊天地重隂陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有謬於時者當知爭之以順時氣臣聞五行以水為本其星玄武婺女天地所紀終始所生水為準平王道公正修明則百川理落脈通落謂經絡偏黨失綱則涌溢為敗書云水曰潤下隂動而卑不失其道天下有道則河出圖洛出書故河洛決溢所為最大今汝潁畎澮皆川水漂涌與雨水並為民害此詩所謂燁燁震電不寧不令百川沸騰者也其咎在於皇甫卿士之屬唯陛下留意詩人之言少抑外親大臣臣聞地道柔靜隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歷州俱動者其異最大間者關東地數震五星作異亦未大逆宜務崇陽抑隂以救其咎固志建威閉絶私路拔進英俊退不任職以強本朝夫本強則精神折衝本弱則招殃致凶為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫𢎞不足言也𢎞漢之名相於令無比而尚見輕何況亡𢎞之屬乎故曰朝廷無人則為賊亂所輕其道自然也天下未聞陛下竒策固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷馬不伏攊不可以趨道士不素養不可以重國詩曰濟濟多士文王以寧孔子曰十室之邑必有忠信非虛言也陛下秉四海之衆曽亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士中人皆可使為君子詔書進賢良赦小過無求備以博聚英俊如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌邪偽並興外戚顓命君臣隔塞至絶繼嗣女宫作亂此行事之敗誠可畏而悲也本在積任母后之家非一日之漸往者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有德行道術通明之士充備天官然後可以輔聖德保帝位承太宗下至郎吏從官行能亡以異又不通一藝及博士無文雅者宜皆使就南畝以視天下明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆愚臣之言哀帝與宜陵侯息夫躬議事躬因言往年熒惑守心太白髙而芒光角星茀於河鼓其法為有兵亂是後訛言行詔籌經歷郡國天下騷動恐有非常之變可遣大將軍行邉兵敇武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相丞相王嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐況於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心説而天意得矣辨士見一端或妄以意傅著星歷傅音附著治略反虛造胸奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有罪車馳詣闕交臂就死恐懼如此而談説者云動安之危辨口快耳其實未可從夫議政者苦其讇諛傾險辨慧深刻也讇諛則主德毁傾險則下怨恨辨慧則破正道深刻則傷恩惠昔秦穆公不從百里奚蹇叔之言以敗其師悔過自責疾詿誤之臣思黃髮之言名垂於後世唯陛下觀覽古戒反覆參考無以先入之語為主上不聽哀帝以郡國地震民訛言行籌又正月朔日蝕乃徴孔光免孫寵息夫躬罷侍中諸曹黃門郎鮑宣上書言陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日蝕於三始誠可畏懼小民正月朔日尚恐毁敗器物何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徴拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜天人同心人心説則天意解矣乃二月丙戍白虹虷日連隂不雨此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜亡度竭盡府藏并合三第尚以為小復壞暴室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冡有會輒太官為供海內貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海內免遣就國收乘輿器物還之縣官如此可以父子終其性命不者海內之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下復徴何武師丹彭宣傅喜曠然使民易視以應天心建立大政以興太平之端髙門去省户數十步求見出入二年未省欲使海瀕仄陋自通逺矣願賜數刻之間極竭毣毣之思退入三泉死亡所恨上感大異納宣言徴何武彭宣旬月皆復為三公元夀元年正月朔上以皇后父孔鄉侯傅晏為大司馬衛將軍而帝舅陽安侯丁明為大司馬驃騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉杜鄴方正鄴對曰臣聞禽息憂國碎首不恨卞和獻寶刖足願之臣幸得奉直言之詔無二者之危敢不極陳臣聞陽尊隂卑卑者隨尊尊者兼卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義雖有文毋之德必繫於子春秋不書紀侯之母隂義殺也昔鄭伯從薑氏之欲終有叔段篡國之禍周襄王內迫惠后之難而遭居鄭之危漢興呂太后權私親屬又以外孫為孝惠后是時繼嗣不明凡事多暗晝昏冬雷之變不可勝載竊見陛下行不偏之政每事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌傳相驚恐案春秋災異以指象為言語故在於得一類而達之也日食明陽為隂所臨坤卦乘離明夷之象也坤以法地為土為母以安靜為德震不隂之效也占象甚明臣敢不直言其事昔曽子問從令之義孔子曰是何言與善閔子騫守禮不茍從親所行無非理者故無可間也前大司馬新都侯莽退伏弟家以詔策決復遣就國髙昌侯宏去藩自絶猶受封土制書侍中駙馬都尉遷不忠巧佞免歸故郡間未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使顯寵過故及陽信侯業皆緣私君國非功義所止諸外家昆弟無賢不肖並侍惟幄布在列位或典兵衛或將軍屯寵意并於一家積貴之藝世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日暗然日食不在前後臨事而發者明陛下謙遜無專承指非一所言輒聽所欲輒隨有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之逮身所行不自鏡見則以為可計之過者疏賤獨偏見疑內亦有此類天變不空保右世主如此之至奈何不應臣聞野雞著怪髙宗深動大風暴過成王怛然願陛下加致精神思承始初事稽諸古以厭下心則黎庶羣生無不説喜上帝百神收還威怒禎祥福祿何嫌不報哀帝以日蝕後十餘日傅太后崩乃徴孔光詣公車問日蝕事光對曰臣聞日者衆陽之宗人君之表至尊之象君德衰微隂道盛強侵蔽陽明則日蝕應之書曰敬用五事建用皇極如貌言視聽思失大中之道不立則咎徵洊臻六極屢降皇之不極是為大中不立其傳曰時則有日月亂行謂朓側匿甚則薄蝕是也又曰六沴之作嵗之朝曰三朝其應至重乃正月辛丑朔日有蝕之變見三朝之會上天聰明茍無其事變不虛生書曰惟先假王正厥事言異變之來起事有不正也臣聞師曰天右與王者故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉其至可必詩曰敬之敬之天惟顯思命不易哉又曰畏天之威于時保之皆謂不懼者凶懼之則吉也陛下聖德聰明兢兢業業承順天戒敬畏變異勤心虛已延見羣臣思求其故然後敕躬自約總正萬事放逺讒説之黨援納斷斷之介退去貪殘之徒進用賢良之吏平刑罰薄賦斂恩澤加於百姓誠為政之大本應變之至務也天下幸甚書曰天既付命正厥德言正德以順天也又曰天棐諶辭言有誠道天輔之也明承順天道在於崇德博施加精致誠孳孳而已俗之祈禳小數終無益於應天塞異銷禍興福較然甚明無可疑惑書奏上説賜光束帛拜為光祿大夫秩中二千石給事中位次歷代名臣奏議卷二百九十五
