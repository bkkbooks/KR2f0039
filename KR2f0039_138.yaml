body:
  text: 歷代名臣奏議卷一百三十八明楊士竒等撰用人宋哲宗立傅堯俞自知明州召為祕書少監兼侍講擢給事中吏部侍郎御史中丞奏言人才有能有不能如使臣補闕拾遺以輔盛德明善正失以平庶政舉直措枉以正大臣臣雖不才敢不盡力若使窺人隂私抉人細故則非臣所能亦非臣之志也元祐元年平章軍國重事文彥博奏曰臣伏蒙聖恩特差中使降手詔詢訪仰披訓旨俯集兢營恭惟太皇太后陛下坤厚博載天光大明自聽政以來發號施令及進賢退愚時政汚隆或因或革小大愜當中外欣悅所謂宗社無疆之福太平浸隆之時矣而猶謙勤退托以臣遭遇纍聖久竊重任又謂其犬馬之齒加長宜有重言曲賜下問乃詢黃髮采芻蕘之義臣敢不勉竭愚忠粗裨虛佇夫治體之大莫大乎任賢納諫近者所用輔相所擢諫憲皆久積時望大協輿情必能弼直獻納上副陛下求治深切之心以至罷去市易減損青苗停養保馬免納役錢寬保甲按閲之頻遂豐民耕種之業此則市井畎畝之人歡呼之聲必已達於天聽矣豈在老臣條陳而後詳然上之數事有損無益不可久行而罷者本非朝廷所圖皆是近年以來臣僚急進僥幸成風率務妄起事端自求總領粗有微效則過求恩賞事若有害曾無責罰欲其省官省事民安政治不可得矣為今之要當革此弊自去年以來斥去聚斂之臣頗寬農商之利四民樂業萬國歡心無名之入多已削除有常之用當要豐足今之戶部實主邦計尚書侍郎郎中員外未聞精擇久任惟見屢遷數易欲使何人專任其責國之大計安所望哉此乃朝廷所宜先而不可忽也又謂臣之所知堪大任者臣素愚昧艱於知人然纍玷鈞衡之任惟在薦賢以圖報國方其當軸任人極於慎柬拔十得五安敢庶幾及出領外藩將踰一紀朝中多士罕有識知雖有所聞莫更所試輕議論薦恐未審詳然熟聞士論謂樞密直學士劉庠端正有守雖已在近職久從外補臣向在樞密庠在太原邊事民政鎮靜不擾光祿大夫前吏部侍郎蘇頌性行淳和學問該博於本朝故事多所詳記若備顧問議論當有裨益朝奉大夫京西路提點刑獄劉奉世才力精明所守堅正向為樞密院檢詳及中書檢正頗得時譽若並召還左右宜有所補更乞聖明詳擇或更有新進可副柬求容臣博訪别具奏陳況天下之大必有多士置於周行然自數十年來養育人材有所未至蓋鄉里舉選不兼取文行禮部覆試類收膚淺之學今若條理學校貢舉之法庶幾取士得人以次擢升大任則濟濟以寧如周之盛方朝廷大推仁政勤恤民隱親民之官專在守令臣謂宜申戒吏部慎擇其人政得以和民受其賜前代銓衡授官之後多赴政府引驗問其所長或采其已試之效而遣之間有昏謬不才類多退落如此則郡縣得人政事修舉又用人之法當各因其才器孔門四科分政事文學之品亦須就其所長而受其職職乃無曠前朝選試文學之士即置於館閣育材之地漸進用之雜學士待制皆主侍從備顧問議論以裨時政今則盡補外任臣謂宜略定員數留充左右供職久當察其器識緩急執政闕人便可僉議進擢臣蒙詔旨詢訪敢不傾盡所蘊但以老昏言無倫理不任隕越惶懼之至二年彥博又乞中外官久任上奏曰臣以中外任官移替頻速在任不久有如驛舍無由集事何以致治故纍曾上言乞中外官各令久任須滿資考近日以來遷改尤為頻數蓋由風俗躁競例欲速遷執政者或避怨謗不能鎮靜欲望中外治安未可期也臣欲今後凡差除中外官並具見在任官年月滿未滿須令任滿方得交替如是急速藉才須要其人則不拘此制其任滿得替之官須具在任實有勞績方與照會合關升差遣所貴官吏自此不敢茍簡欲速百職自然修舉貼黃臣纍曾上言以吏戶刑部官屬主選大計刑罰并外任監司及親民之官並須久任此繫朝廷致治之本不可忽也今乞與三省更申明祖宗舊法遵守施行元祐元年門下侍郎司馬光乞令監司州縣各舉按所部官吏白劄子曰檢會監司知州通判於本部官吏內有罪惡顯著而有失覺察者並連纍責降雖有舊條然未嘗一一行遣又慮一路一州吏衆多上位覺察不盡又未指定合覺察事件致寬者則一切不問急者則濫及無辜又凡為監司州縣長吏當進賢退不肖不可但令覺察有罪不令薦舉賢才今欲立舉薦四條一曰仁惠謂安民利物衆所畏愛非疲軟不立曲取人情者二曰公直謂心無適莫事不吐茹非內私外公實佞詐直者三曰明敏謂深察情理應機辦事非飾詐掠美利口矜功者四曰廉謹謂安貧守分動遵法度非詐清釣名偷安避事者按察四條一曰苛酷謂用刑繁苛殘虐踰法者二曰狡佞謂傾險巧詐危人自安者三曰昏懦謂不惠物情依阿無守者四曰貪縱謂叨餮無厭任情不法者凡監司州縣於所部之民皆得以此八條舉按官吏其舉薦者於本部官吏之內有仁惠公直明敏廉謹者可舉則舉無有定數縣舉之州州置簿記姓名州舉之監司監司置簿記姓名監司舉之朝廷中書置簿記姓名各隨所舉行能任使以試之果有實效則漸加旌異其按察者監司專按察知州軍通判路分都監以上知州軍通判專按察在州官吏及諸知縣知縣專按察簿尉及縣界內官吏若有苛酷狡佞昏懦貪縱者縣體量申州州體量申監司監司體量申奏續更體量的確事迹糾發施行若有失察覺别致因事彰露其監司降知州軍知州降通判通判各降一資知縣降監當其餘所部官吏監司知州軍通判皆得按察但不坐失覺察之罪即挾情按察不以公者候勘鞫見實日依常法知縣惟得具事迹申州不得擅勘命官太常少卿梁燾乞五事論相之得失上奏曰臣聞自古聖主賢君任用宰相必取天下公議之所在者得公議則人望得得人望則人心得得人心則四海歡欣交通而無事四海歡欣交通而無事則坐享太平之福隆太平之基矣伏惟太皇太后陛下嚴靜仁明與天無私恭惟皇帝陛下孝敬聰哲嗣隆正統宜得老成道德之臣以為宰相濟以二三耆哲同寅協恭咸有一德使聖賢事業相資而成康靖之功此宗社之福生靈之幸也夫天下之人所共尊敬依歸者人主也宰相不敢為欺蔽侮慢是與天下之人同心以事其上也以是而人心喜之公議從而歸矣以其盡忠盡公也宰相敢為欺蔽侮慢是不與天下之人同心以事其上也以是而人心怒之公議從而去矣以其不能盡忠盡公也當公議所歸人主雖欲不用之不可得也若不用之是抑天下之喜心也邦國所以安者以人有喜心也喜心豈可抑之哉是雖欲不用亦不可得也況有用賢之志乎當公議之所去人主雖欲用之不可得也若用之是激天下之怒心也邦國所以危者以人有怒心也怒心豈可激之哉是雖欲用之亦不可得也況有去邪之志乎前世之主皆務崇用輔佐以興起治道然而一失所由流患後世初有害政之纍終有難制之憂甚可懼也惟聖君賢主為能得之於是獲上天之敷祐洽四海之歡心其初至明甚易也臣輒言人主聽言受事之規摹以廣論相之得失惟陛下録其忠而裁擇焉宰相者患專權固位竊用人主之威福也夫持權久者習強矣未有不好其權者也居位安者貪寵矣未有不固其位者也好權則忌人為切固位則謀身為深公議之所不與也有以恭儉行已夙夜在公善則稱君過則歸已不敢避所難不敢忽所易惟知尊主威而盡忠於上可謂不好權不固位矣是公議以為可任宰相者也宰相患在立朋黨以私滅公相為傾危而蒙人主之聰明此公議之所不與也有以中立不倚孤忠自守進一士必以其公譽而不敢以私愛也既進之必曰主上之明以避其恩退一吏必以其公毁而不敢以私惡也既退之必曰朝廷之公以當其怨國家之事必正色直言力行而不回不委曲交結以避一身之危不俯仰顧忌以藉衆力之助惟知尊主威而盡忠於上可謂不立黨矣是公議以為可任宰相者也宰相者患在以權位妄自尊大以逼主勢上有輕易人主之心下有陵侮多士之氣此公議之所不與也有以謙虛沖約折節下士不恤己之勞苦以君逸民安為急不恤己之菲薄以君裕民富為先惟知尊主威而盡忠於上可謂不以權位妄自尊大矣是公議以為可任宰相者也宰相者患在不以正道事其君不恤是非利害惟君意之是成惟君欲之是從至於政疵民病而不為顯言依違因循而不為更張此公議之所不與也有大公至正為心與人主同道一德慨然以立忠言奮然以行正事意在成國家之利而除生靈之害惟知尊主威而盡忠於上可謂以正道事其君矣是公議以為可任宰相者也宰相者患在務結私恩蔽善醜正誘集群邪陽尊忠良隂結姦惡捍據要路相為死黨一倡十和表裏相應幸上之未悟得以肆行其志此公議之所不與也有以樂善好賢安君靜民為事謂爵祿人主之柄也非臣下所敢專必公言於廟堂而請決於上使清明之恩平行而直流開張公道銷除姦朋惟知尊主威而盡忠於上可謂不結私恩矣是公議以為可任宰相者也凡此五者所宜辨也君臣之大要古今之先務也人主得之以為安榮失之以為憂悔故聖君賢主必明察而審擇獨斷而力行也陛下如天大明無幽不燭真偽邪正判别白黑誠以曉然知公議之所在者自有人矣伏願自強明德任賢勿二用公議所在早命宰相以慰人望以收人心自然隂陽和而風雨時矣一旦明制布告廷臣喜色相視國人歡聲相聞四方忠義咸歸一德天下之願也臣迹在疏遠接士民最近聞公議為真且熟輒敢布於天聽願陛下信其公議之在下者果如此也臣遠觀詔書近覩政事仰識聖意明目達聰欲通下情而盡公議樂聞直言不吝改作是正人端士千載會遇不可失之時故臣不敢苛舉細故上浼宸聰輒忘僭越論國家之大者遠者臣區區之誠以謂人主之職在論一相論相之得失安危之所以分干冒宸嚴臣不勝盡節竭誠激切之至燾改右諫議大夫乞親賢疏佞堅其始終上奏曰臣聞天下治亂在賢佞而人君之道以用人為先得之賢則君德清明政由忠厚百姓和樂四夷賓敬而朝廷尊安矣故治之所由興者在此甚可愛也失之佞則君德蔽蒙政由煩苛百姓怨鬱四夷驕侮而朝廷危辱矣故亂之所由起者在此甚可畏也自古帝王莫不知之然得之賢人常少而失之佞人常多其故何哉蓋始終之勢異而謹忽之心殊也夫治亂之作當其微時間不容髮至其著也判如霄壤之異人君者所宜深戒早辨謹持而不失毫釐也賢人之事君也主於盡忠盡忠則不欺不欺則至公至公則言有所拂事有所違人君者初則親之終則疏之方其急於求治之時責其盡忠勵其不欺行其至公雖有所拂違而必喜之及其久也習於既安而或怠於為治以既怠之心處拂違之間故終有所厭而又疏之也賢人疏則佞人乘隙以入矣佞人之事君也主於不忠不忠則忍於欺罔欺罔則為私為私則言皆諛悅事皆柔從人君者初則遠之終則比之方其急於求治之時惟知佞人之善眩惑聰明也必嚴思慮以待之及其久也習於既安而或怠於為治以既怠之心處諛從之間故終有所愛之而又比之也與賢人俱時有以忤其意然而卒至於治與佞人俱莫不得其所欲然而卒至於亂此治亂之相去甚近而甚著則堯舜桀紂之分霄壤不足以侔其遠矣惟大聖人為能廣其聰明謹其好惡峻其去取堅其始終以收天下之忠立天下之公成天下之治舉以此也恭惟太皇太后陛下以大公至正制臣下皇帝陛下以至仁純孝承祖宗親用忠賢風節頗厲疏斥姦佞朋黨漸消清明之德日以尊忠厚之政日以修和樂興於百姓賔敬見於四夷太平之功指日可待矣誠願陛下自強剛德如天不息必使怠惰之意不少動於清𠂻察兩端之傾危排根而去之明一忠之靜正舉類而進之將令風俗純厚朝廷尊安近者獻其忠遠者扶其公仰跂仁祖之治不難及矣惟聖心少加思焉臣愚不勝惓惓盡節幸陛下裁納燾又奏曰臣伏聞誥命除給事中顧臨待制河北都轉運使清議頗為朝廷惜之臨昨任河東轉運使未久陛下召入為給事中是知臨之用宜在朝廷顧臨論思獻納號為稱職未久復出為轉運使士論以此疑之未有以識聖意之所在也竊以侍從之官親近主上其進退繫朝廷輕重不宜輒有改易今以轉運使求其在外者宜自有人以給事中求其在內者如臨恐不易得伏望聖慈特賜指揮留臨依舊供職庶朝廷多得正人上下相維共守祖宗之法度紀綱助陛下求治之意五年燾為御史中丞又論宰相以禮去者可以復用上奏曰臣伏見陛下眷遇大臣極其恩禮不忍聞其過惡輕奪其位使傷其進退之名所以委曲容覆真有天地之賜為大臣者何以副陛下之深仁乎祖宗之時宰相率二三年以禮去今宰相率二三年以罪去禮去者顧義重雖有功而必去罪去者顧利重非有罪則不去以禮去者可以復用以罪去者不可以再來蓋祖宗之大臣皆以名節自重一舉動必存大體必副人望不敢專寵祿以自愛不敢挾權勢以自強日思以得罪為憂以妨賢為懼故率三二年自引避位朝廷褒答自有恩數其優者為使相其次猶須超進數官為大學士其在位也名益重望益高眷益厚一旦復用則中外之民莫不以為宜皆為朝廷助喜此所以朝廷重也其間亦時有貪鄙之人當去而不去以固位戀祿清議己不容矣以之招致人言暴著過惡從而罷遣之殆不過一諫官一御史論之則已不能安矣如臺諫合攻連擊者衆則終身不得復用故以禮去者多以罪去者少大臣既已法小臣從而廉士大夫化之皆磨勵振潔以節操相高風俗純美由此道也比年以來大臣皆以竊祿偷安為計寖以成風雖有大過猶巧自掩蓋恐其失位一二人言之不知求去臺諫官共言之又不肯去至於紛紛不已上不能止其言竟出其章疏然後請退聖恩乃聽之公議為之鄙薄私友為之歎惜喪其節守敗其名譽冒其過咎終以疏絶朝廷雖以乏人而欲用之疑其姦心之不測畏其清議之不容卒不敢用既以有罪不可復用必用其以次者安得人材衆多而為用乎朝廷將無人可用矣此不可不思也祖宗之時輔相之材非不多也然而進者必以其賢退者必以其禮去而復來所以用之不足也臣近嘗建言乞陛下許呂大防以自請罷去相位者正為如此若蒙陛下許呂大防令以禮去不惟大防得其進退之道且掩覆其罪狀不為臣言之所指擲不為公議之所不容使之養望於外它日用之必無敢議者設有議者其迹以無罪而去陛下主張之無纍知人之明矣是於大防其有天地之賜足稱陛下眷禮之本意也非獨以安大防也又以示後來之人皆思以禮去位而漸以名節自重如祖宗之大臣也朝廷由是尊矣伏望聖慈以安危為計治亂為念以養大臣之譽望為意以勵搢紳之廉隅為術保全大防今日之去存全大防它日之用兢謝旱烈之譴銷厭愁怨之氣上敬天道下順民心中不失君臣之恩一舉而三善得豈不美歟伏惟聖神采納天下幸甚哲宗時燾為尚書左丞與同列議夏國地界不能合遂丐去哲宗遣近臣問所以去意且令密訪人材燾曰信任不篤言不見聽而詢問人材非臣所敢當也使者再至乃言人材可大任者陛下自知之但須識别邪正公天下之善惡圖任舊人中堅正純厚有人望者不牽左右好惡之言以移聖意天下幸甚元祐元年范純仁上奏曰臣近以辭免恩命伏蒙聖慈纍差中使封回劄子宣諭丁寧者愚賤之臣屢煩天聽再蒙遣使恩典過優固當勉勵疲駑上副任使然臣有危懇須合力陳竊聞臣今來告命不曾經門下審讀臣聞爵人於朝與衆共之所以昭示至公杜絶私門乃有司之職守為朝廷之典章此萬古不易之規而聖王之通道也今聞臺諫臣僚皆習文字論列而未蒙追改陛下必以謂進用輔臣已有成命不當因人之言輕有回改以示睿斷欲全恩禮臣之愚慮竊謂不然方今拔擢臣僚須宜號令多因公卿密啓或非陛下素知若不經歷有司必然難得審當今來臺諫官若俱有文字即是朝野公言其言當則人皆謂之忠賢其言不當則人皆謂之讒黨各自保其名節豈肯輕易奏論非同一人私竊之言可以誤惑聖聽陛下當坦然聽信不必致疑彼皆陛下選用正直使為耳目之官豈有人而不用耳目而可以聽視於天下也況陛下臨御以來聞善必納從諫如流今乃於臣告命特令不過門下言者必不肯已微臣必不敢居久鬱衆情恐失羣望不如因臣辭免特賜允從則上可以資陛下納諫之明下可以成愚臣安分之志而俾近臣得職言路開通廣帝堯捨己從人之風協成湯從諫弗咈之義一舉而數善皆得在聖明可不務乎與夫微臣叨被誤恩沮格公議利害相去遠矣伏望陛下察臣竭誠為國不為身謀特賜留神采納天下幸甚二年純仁同知樞密院事論韓維不當與外任疏曰臣竊聞門下侍郎韓維有與外任指揮臣伏見韓維公忠篤實稟於天性議論賞罰據理直前盡心國家不避嫌謗陛下用為執政可謂股肱之良伏惟陛下寬仁大度委任羣臣進退輔弼咸以至公今韓維未聞别有大過不候封章陳請遽然逐去必有姦人密行譖訴上誤聖聰致陛下用賢不終使大臣失進退之節實恐正人失望有虧聖政伏望陛下深加睿思或因臣寮開陳却令追寢前命以成帝堯捨己從人之心以繼商湯改過不吝之美臣被恩殊異難以緘默伏望聖慈深賜采察天下幸甚臣與韓維亦霑姻戚既欲上裨聖化難以避嫌自安更乞聖慈遍詢文彥博呂公著已下諸大臣則知維之邪正若維果是正人則雖有些小過失全望陛下主張若以小過去之是使姦人得計恐非天下之福臣聞謗韓維者多言其引用親戚乞陛下將進用過韓維親戚遍問三省元是何人發意因與不因韓維自然有無阿私事狀明白庶不誤陛下至公懲戒之意純仁又論大臣輔政不當顧慮形迹上奏曰臣近見執政議論以章子厚父年將九十因明堂恩霈之後欲請除一鄉郡使便其親臣但見其可裨仁化不慮其他遂共以為當然繼而聞三省奏上陛下即賜允許臣以陛下天地之仁念其垂老之親不録往咎臣實喜不自勝遂於簾前仰贊聖德以謂自古臣子無如今日遭逢繼聞諫官有言陛下遂寢前命亦是聖心從諫之美前日更蒙宣諭此事三省有失思慮戒其今後不得如此臣愚恐有言者以謂朝廷所怒之人不當遽有開陳又謂執政都徇人情必有主張之者致煩陛下宣敕戒諭丁寧微臣固宜佩服聖訓然有未盡之懇亦當罄竭敷陳方陛下急於求治之時是臣子知無不為之際豈宜顧慮形迹蓄縮周防今所用大臣多是老於患難陛下奬之使進尚恐立志不鋭思慮太周若更戒使逺嫌則恐顧避保身自防不暇在陛下愛惜諸臣則為恩德之厚若使輔翊聖政却恐事無所裨蓋人臣以匪躬自信為難媕婀固寵為易若今容其所易沮其所難則其間希意顧望之人翻為得計甚非朝廷之福伏見仁宗皇帝惟委執政一無所疑凡所差除多便從允而使臺諫察其不當隨事論奏小則旋行改正大則罷免隨之使君臣之恩意長行朝廷之綱紀自正是以四十餘年不勞而治況陛下方稽仁皇之治聖度如天從諫不倦任賢不疑紀人之功忘人之過皆是自古人君所難若更垂拱責成逸於委任臺諫糾其誤謬侍從罄其論思群臣一德一心陛下無為無事自然不須防慮百職具修坐致太平垂休萬世天下幸甚貼黃凡人於富貴功名皆願乘時早立近用二三執政年皆六十已上或七十正是餘年無幾今幸遭逢陛下行堯舜之政擢居近輔可謂千載一時不於此時攀附神聖早立功名不知更待何日豈肯别懷顧望阿徇他人自取上疑以招危辱在常情且無此理況陛下以公望選擇人哉其間或有進人不敢太速責人不敢太深者不過謂事當馴致不可黑白太明却恐扇成朋黨害陛下和平之政矣萬一因此恐有間言誤陛下不細又蒙宣諭譬如人家尊長所怒之人卑幼豈可輕易寬解臣愚以謂不然蓋人主之量當如天地無所不包衆人所欲進退則人主從而行之所謂捨己從人便無喜怒好惡之迹不使姦人測見意旨别生讒間以惑聰明古今盡然商鑒不遠惟陛下稽察唐魏徵有毁其阿黨親戚於太宗者帝使溫彥博責以不避形迹遠嫌疑徵謝曰臣聞君臣同心一體豈有置至公事形迹若上下共由兹路邦之興喪未可知也帝矍然曰吾悟之矣以此可見自古君臣之間不當更事形迹此陛下之所熟聞臣敢引而言之哲宗時用二三大臣皆從中出侍從臺諫官亦多不由進擬純仁上言曰陛下初親政四方拭目以觀天下治亂實本於此舜舉臯陶湯舉伊尹不仁者遠縱未能如古人亦須極天下之選純仁為右僕射論用人疏曰臣昨日面奉德音詢及將用之人臣愚雖不足以贊陛下則哲之明然不敢不竭心極慮仰副聖問須至再三陳奏少補萬一伏緣聖政之初選用股肱正如舜舉臯陶湯舉伊尹須宜譽望出衆才德過人方可以倚辦國事化服羣心縱未能遠比古人亦須極天下精選不宜參以中常之士誤知人之德伏望陛下深垂聖念少察愚𠂻慎推舉直之方以稱安民之化純仁又論擇臺諫疏曰臣纍聞德音欲選擇臺諫官命自中出事既出於宸斷發自至公宜須言路得人則中外快愜然臣愚以謂臺諫者陛下之耳目朝廷之準繩可以分别邪正規助風化百職之中其任最重當陛下初親庶政四方拭目以觀知人舉直之化萬一小有失當渙汗難收綸綍既行所繫不細更望深留聖念慎加審擇則天下幸甚純仁為中書侍郎奏舉彭汝礪疏曰臣近曾具可充臺諫官人姓名奏入亦曾與鄧溫伯等面奏彭汝礪等可為御史中丞乞陛下早賜點差至今未蒙降旨伏緣舉直錯枉則天下心服孔子曰舉直錯諸枉能使枉者直蓋用得其人則不惟朝廷尊嚴亦可使天下士風知所趣向則其選用當否所繫不輕臣職叨宰弼今逾半年未嘗進用一賢以居要劇於臣可謂失職朝夕不遑寧處所以不避煩黷天聽伏望睿慈早賜選擇庶當聖政之初得以化服多士元祐元年御史中丞劉摯等論安燾敕命不送給事中書讀上奏曰臣等伏聞除安燾知樞密院事因給事中兩次封駁不當遂蒙特降指揮更不送本官書讀直下吏部施行臣等竊見安燾差除未論當否然朝廷命令之出必由門下中書省審而後行所以謹重防察示至公於天下也今陛下除一大臣因其封駁不當遂廢給事中職業不令書讀則是命大臣以私矣私門一開將何以振肅公道維持紀綱乎伏惟陛下臨御以來政事之舉皆合至公獨此一事設施乖戾恐於盛德所損不細臣等深為陛下惜之伏望速降指揮追還告命及詳覽臣寮前後論列安燾章疏别賜指揮以全朝廷典法貼黃制敕不由門下及省審書讀不偹則不成命令其經歷之司必不敢過被受之人必不敢當摯等又上奏曰臣等纍次論奏安燾知樞密院不當其録黃不令給事中書讀及經歷受付官司並不覆奏乞寢罷追改正其罪今已數日未賜俞允臣等以謂朝廷高爵重位非有德與功不可虛受若以恩禮假借則不協公議今安燾才望素輕偹位樞府已為忝幸一日驟有遷進躐過衆人士論紛然謂朝廷除拜樞府之長殊不遴選非所以鎮社稷服四夷命令既出給事中不得書讀於法式未偹而施行門下一省官存職廢紀綱紊亂此事尚書僕射左右丞皆無一言建明執奏遂付有司乃是上下廢法中外徇私何以訓治四方維持萬世所繫甚大極可駭嘆恭惟太皇太后陛下保佑聖德以修正法度為急今有此舉人皆惜之非獨惜安燾差除之過分蓋惜國家法度之廢失也伏望聖慈檢會臣等纍次論列事并今來奏陳寢罷安燾除命所有經歷受付官司并乞早正其罪其范純仁録黃指揮仍乞由門下省書讀省審施行摯又乞追還安燾等告命及施行經歷付受官吏之罪上奏曰臣近見安燾范純仁告命不由給事中直付所司臣以謂朝廷之大失政也故尋具狀與臺官連狀共四次論列至今未蒙追正臣誠不知陛下命令不使給事中書讀此何意也將憚其封駁耶厭其封駁耶夫天下之理不過是非當否而已陛下試思之今來進用燾等若果當其人不緣私授則天下必以為是而給事中雖百十封駁猶當終使之經歷而後行不然罷其人可也若燾等之進不由公道理有未安天下不以為是而給事中乃能封還駁正則是拾遺救失善守其官有補于國者陛下當嘉納而改為之乃盛德之事也不當厭憚其言而廢其職也今陛下以給事中之言為是耶為非耶而陛下何故自隳典憲為此委曲行政不由於直道命官乃出於斜封不知誰為陛下建此謀者今於門下之録黃明書云奉聖旨更不送給事中書讀於吏部之告身給事中銜下明書云奉聖旨更不書讀制命乖當未見有如此者實恐取謗四方貽譏後世不可忽也録黃初下既見批留則門下侍郎合行進駁不合放出既出之後尚書省左右僕射左右丞亦合執奏不合承行既行之後命令不全吏部亦合申稟不合書告是官司上下皆阿諛苟且失其職守壞亂紀綱成此繆誤以纍聖德臣不知陛下以名器祿食養大臣置百官將何所用之凡人主出令差誤古今所不能無但左右之臣將順救正之則不至於成其失況皇帝陛下富於春秋淵默之日而太皇太后陛下聽政不出房闥之時乎夫斜封墨敕濫官橫賞乃前古之所以召亂者也今大臣欲以此事事陛下若門戶一開何所不有欲望聖慈詢問大臣命令如此施行是與不是苟以為是則可謂罔上迷國茍知其非而不言則可謂不忠尚可以任人之國乎伏請速降指揮追還燾等告命依國朝典故行下所有門下侍郎及尚書省官屬吏部官吏各有前項罪狀伏乞以臣此章并前後論列文字付外施行貼黃進任大臣而不使告命遍歷門下乃是陛下先以私自處也制書不全而受之是臣下以私自進也上下如此則何以厭服中外臣固知燾等之必不敢受也陛下臨御方踰年正當謹守祖宗法度以銷壓權僭今差除告命偶有差失左右執政既不肯建明而臺諫之言又不蒙聽納則朝廷闕失誰復救之陛下既已沮壞給事中所守而又欲隳言路職業臣所以夙夜憂懼不能自已非獨論燾之進退而上惜朝廷紀綱所以防微杜漸而已摯又論司馬光薨當謹於命相上奏曰臣伏見左僕射司馬光薨逝朝野人情驚悲一詞皆曰天乎不憖遺一老以大濟我國家而奪之速此何理也臣恭惟陛下以至明至聖首識光忠置諸左右舉天下以聽之而光亦以大忠直道忘身徇國雖姦謀異心百端排沮而橫身當之夙夜盡瘁以死圖報其純誠至公足以薦天地而貫神明真所謂社稷之臣矣然而非陛下信任之明仰成之篤則光亦安能自行其志故天下不獨美光事君之盡節而以陛下任賢不二為難能也今光云亡兩宫車駕即日臨奠賻襚之典有加故常下至搢紳善士閭巷鄉野之人罔不為之哀歎而惟是姦邪之黨醜正惡直之徒頗已相與有竊喜之意蓋小人從來怏怏不便於新政藏情匿迹日夜窺伺常幸有非意之變以冀善治之不能成今其臆度以謂陛下既失光之助則前日求治之志必稍變懈遂可以乘便投隙熒惑而動搖此其所以喜也且陛下為政以來收拔衆正布列上下制國之法除民之害雖節文潤色有未齊者至於大本已定十之八九矣惟陛下益加之意常以辨别邪正保邦愛民為念堅守此指終始如一而已行之令持循無變則治道成矣廟堂之上必有如光之事朝廷者臣實懼陛下悼光之後謂誰助我者而意稍有間則邪謀隂計或起而乘之此臣之所以為私憂而獻其説也抑臣又有過計之言蓋今上宰虛位竊惟不日制詔命相矣此尤不可以不謹外論籍籍謂文彥博必代光之任臣固知不然然於萬一之中不可以不言彥博年逾八十爵位窮極於天下矣前日陛下假其威望以為朝廷之重其官則天下之師其職則平章軍國重事陛下之禮元老尊崇優佚可謂得其體也今若任之以為相三省有職守矣其成敗之責豈師臣之所宜當其繁悉之務豈老人之所能辦殆非所以處彥博也又彥博於知人非其所長賢士大夫罕出其門近日有所薦論衆皆傳之為笑若居上相引用人物每每如此今日引一二明日引三四積而至於百十常才列于朝路非小害也其人重其位高有所薦者若陛下違其言則傷恩皆從之則害政又非所以安彥博也臣昨四月中已曾建論此事矣故今日之命相實繫天下之安危與善政之成敗可不重哉伏望陛下詳考歷選得其人而任之以尊廟社以厭公議臣不勝隕越待罪之至惟陛下赦其愚而察其忠哲宗時摯為侍御史乞選監司澄汰州縣上奏曰右臣準尚書省劄子準十月十八日聖旨指揮節文比者詔令屢下以寬民力便安公私官吏或致廢格自今州縣悉心奉行監司點檢御史臺覺察彈奏者臣有以見陛下誠心愛民慎重政令天下幸甚臣竊謂州縣之政廢舉得失其責宜在監司夫監司之任亦重矣人一有賢不肖則環地數千里休戚繫之曩時朝廷大更法度選建推行之人故不以資任務得果健強鋭猋厲風生之才蓋規以就事倚辦於一時及法行事立矣而其後用人猶復因襲未曾權量時宜有所張弛之也是以至今使者之政刻核褊迫相師成風郡縣承望亦莫敢不然使民不見德與義而惟刑是覿惟利是聞者蓋亦久矣斯豈政令之本意然哉奉宣繆戾積習至此故也比蒙聖明哀念元元取監司罪惡已甚者既去之矣然其餘人材頗尚駮雜情志未一各懷所私蓋其隂有觀望者則必習常而慢令以致惠澤之壅其淺中覬利者則又將矯枉而過正或廢其所宜治之事二者不可不察也惟得其人庶懲此患臣欲望聖慈詳酌河北河東陜西素號劇部向來所用使者出於暴進多非更歷民事人微望輕雖自過為威刻而下終不服今宜稍復祖宗故事於三路各置都轉運使用兩制臣僚充職以重其任自餘諸路亦望推擇資任稍高練達民政識治體近中道之人分補監司之任明授之以詔令使忠厚安民而不失之寬弛肅給應務而不失之淺薄部使者誠如此州縣之政隨之則先朝之仁政陛下之恩德庶幾下究而與民休息無難矣考察見任之無狀者一切澄汰罷之被罷之人苟非有顯過宜還其資考别為任使要令不至於失職無聊而已方今先務恐實在此伏望詳酌施行摯又乞令蘇軾依舊詳定役法上奏曰臣聞中書舍人蘇軾辭免詳定役法有旨不許又具辭免者竊以差役之法最今重事陛下欲使利害曲盡置局講求此甚盛德自置局以來為日浸久未見就緒而議法之官頗已屢易今聞軾以議有異同力欲辭避人人如此則法度之成何時可冀乎臣聞五味不同而適於口者味相足也五聲不同而恱於耳者聲相偹也一可一否一是一非雜然並作此議之所以同歸於盡一人曰可皆曰可一人曰是皆曰是信如此又何以議為哉議有異同正宜反覆曲折相足相偹以趨至當而遽為避就非獨議法難成使姦人乘之投隙伺釁搖撼法意非國之計也臣願深詔執事者毋矜能毋愎衆毋以小利妨大體使利害曲盡以稱朝廷之意所有蘇軾且令依舊詳定仍乞催促成就以時布宣鎮慰天下喁喁之望貼黃吕大防范純仁韓維皆係朝廷遷擢兼官為執政事無不領雖離去本局其責尚存軾若陳乞獲免則不復干預非大防等比不可不論摯為門下侍郎與同列奏事論及人材摯曰人才難得能否不一性忠實而才識有餘上也才識不逮而忠實有餘次也有才而難保可藉以集事又其次也懷邪觀望隨勢改變此小人也終不可用哲宗及宣仁后曰卿常能如此用人國家何憂元祐元年翰林學士朝奉郎知制誥蘇軾上論冗官劄子曰臣伏見近日言者以吏部員多闕少欲清入仕之源救官冗之弊裁減任子及進士纍舉之恩流外入官之數已有旨下吏部禮部與給舍詳議臣竊謂此數者行之則人情不悅不行則積弊不去要當求其分義務適厥中使國有去弊之實人無失職之歎然後為得也欲乞應任子及進士纍舉免解恩例並一切如舊只行下項一奏蔭文官人每遇科場依進士法試大義䇿論如係武官即試弓馬或試法並三人中解一人仍年及二十五已上方得出官內已舉進士得解者免試如三試不中年及三十五已上亦許出官應試大義䇿論及試法者在京隨進士赴國學在外赴轉運司試弓馬者在京隨武舉人赴武學在外轉運司差官一進士纍舉免解合推恩者並約嘉祐以前酌中數目立為定額如所試優長係額內人數即等第推恩並許出官如係額外即並與一不出官名銜一流外入官人除近已有旨裁減三省恩例外其餘六曹寺監等處及州郡監司人吏出職者並委官取索文字看詳有無僥幸定奪酌中恩例右若行此數者則任子雖有三試留滯之艱而無終身絶望之歎亦使人人務學文臣知經術時務武臣間弓馬法律皆有益於事而進士纍舉有詞學人自得出官若無所能得虛名一官免為白丁亦無所恨如有可採乞降下與前文字一處詳議軾又同鄧溫伯胡宗愈孫覺范百祿等薦朱長文劄子奏曰臣等伏見前許州司戶參軍蘇州居住朱長文經明行修嘉祐四年乙科登第墮馬傷足隱居不仕經三十年不以勢利動其心不以窮約易其介安貧樂道闔門著書孝友之誠風動閭里廉高之行著于東南本路監司本州長吏前後纍奏稱其士行經術乞朝廷旌擢差充蘇州州學教授未蒙施行近奉詔中外臣僚自監察御史已上並舉堪充內外學官二人此實朝廷博求人才廣育士類之意如長文者誠不可多得其人行年五十餘昔苦足疾今亦能履臣欲望聖慈褒難進之節收久廢之材量能而使之特賜就差知蘇州州學教授非惟祿餼調養一鄉善士實使道義模範彼州之秀民軾等又薦用劉攽上奏曰右臣等伏見朝議大夫直龍圖閣劉攽近自襄陽召還祕省旋以病乞出守蔡州自受命以來日就痊損假以數月必復康強謹按攽名聞一時身兼數器文章爾雅博學強記政事之美如古循吏流離困躓守道不回此皆朝廷之所知不待臣等區區誦説但以人才之難古今所病舊臣日已衰老而新進長育未成如攽成材反在外服此有志之士所宜為朝廷惜也欲望聖慈留攽京師更賜數月之告稍加任使必有過人臣等偹員侍從懷不能已冒昧陳論伏俟誅譴二年軾乞録用鄭俠王斿狀曰右臣聞國之興衰繫于習俗若風節不競則朝廷自卑故古之賢君必厲士氣當務求難合自重之士以養成禮義廉恥之風臣等伏見英州别駕鄭俠向以小官觸犯權要冒死不顧以獻直言而祕閣校理王安國以布衣為先皇帝所知擢至館閣召對便殿而兄安石為相若少加附會可力致富貴而安國挺然不屈不獨納忠于先帝亦嘗以苦言至計規戒其兄竟坐與俠遊從同時被罪吕惠卿首興大獄鄧綰舒亶之徒搆成其罪必欲置此人于死賴先帝仁聖止加竄逐曽未數年逐惠卿而起安國今來朝廷赦俠之罪復其舊官經今踰年而俠終不赴吏部參選考其始終出處之大節合於古之君子殺身成仁難進易退之義朝廷若不少加優異則臣等恐俠浩然江湖往而不返若溘先朝露則有識必為朝廷興失士之歎至於安國不幸短命尤為忠臣義士之所哀惜臣等嘗識其少子斿敏而篤學直而好義頗有安國之風養成其才必有可用欲望聖慈召俠赴闕及考察斿行實與俠並賜録用不獨旌直於九泉之下亦所以作士氣於當代也軾同傅堯俞孫覺狀奏右臣等伏見徐州布衣陳師道文詞高古度越流輩安貧守道若將終身苟非其人義不往見過壯未仕實為遺才欲望聖慈特賜録用以奬士類兼臣軾臣堯俞皆曽以十科薦師道伏乞檢會前奏一處施行軾又同李常王存鄧溫伯孫覺胡宗愈狀奏右臣等竊見給事中顧臨資性方正學有根本慷慨中立無所阿撓自供職以來封駮論議􅏮然有古人之風僥幸之流側目畏憚近聞除天章閣待制充河北都轉運使遠去朝廷衆所嗟惜方今二聖臨御肅正紀綱如臨等輩正當置之左右以輔闕遺或者謂緣黃河輟臨幹治臨之所學實有大於治河治河之才固有出臨之上者欲望朝廷别選深知河事者以使河北且留臨在朝廷以盡忠亮補益之節臣等備位侍從懷有所見不敢不盡五年軾以龍圖閣學士左朝奉郎知杭州進何去非偹論狀奏曰臣自揣虛薄叨塵侍從常求勝己以為報國恭惟先皇帝道配周孔言成典謨雲漢之光藻飾萬物而臣子莫副其意蓋嘗當食不御有才難之歎伏見承奉郎徐州州學教授何去非文章議論實有過人筆勢雄健得秦漢間風力元豐五年以纍舉免解答䇿廷中極論用兵利害先帝覽而異之特授右班殿直使教授武學不久遂為博士臣竊揆聖意必將長育成就以待其後豈特以一博士期去非而已哉而去非立志強毅不苟合於當時公卿故莫為一言推轂成就之者臣任翰林學士日嘗具以此奏聞乞換文資置之太學雖蒙恩換承奉郎而今者乃出之徐州教授比於博士乃似左遷非獨臣人微言輕不足取信亦恐朝廷不見其文章議論無以較量其人謹繕寫去非所著備論二十八篇附遞進上乞降付三省執政考覽如臣言不繆乞除一館職非獨以收羅逸才風曉士類亦以彰先帝知人之明一經題目決無虛士書之史册足為光華若後不如所舉臣甘伏朝典六年軾為翰林學士承旨左朝奉郎知制誥兼侍讀乞擢用程遵彥上奏曰臣竊謂朝廷用人以行實為先以才用為急二者難兼故常不免備取而端靜之士雖有過人之行應務之才又皆藏器待時恥於自獻朝廷莫得而知之如臣等輩固當各舉所聞以助樂育之意伏見左朝散郎前簽書杭州節度判官廰公事程遵彥吏事周敏學問該洽文詞雅麗三者皆有可觀而事母孝謹有絶人者母性嚴甚遵彥甚宜其妻而母不悅遵彥出之妻既被出孝愛不衰歲時伏臘所以事姑者如未出而母卒不悅遵彥亦不再娶十五年矣身為僕妾之役以事其母雖前史所傳孝友之士殆不能過臣與之同僚二年備得其實今替還都下未有差遣碌碌衆中未嘗求人臣竊惜之伏望聖慈特賜采察量材録用非獨廣搜賢之路亦以敦厲孝悌激揚風俗若後不如所舉臣甘伏朝典七年軾為龍圖閣學士左朝奉郎守兵部尚書上奏曰臣竊謂才難之病古今所同朝廷每欲治財賦除盜賊幹邊鄙興利除害常有臨事乏人之嘆古人有言寬則寵名譽之人急則用介胄之士所用非所養所養非所用此古今之通患也臣伏見承議郎監東排岸司林豫自為布衣已有奇節及從事所至有聲其在漣水屏除群盜尤著方略其人勇於立事常有為國捐軀之意試之盤錯之地必顯利器伏望聖慈特與量材擢用若後不如所舉臣等甘伏朝典元祐元年右司諫蘇轍等論安燾敕命不送給事中書讀上奏曰臣等前月二十八日奏論安燾除知樞密院告不令給事中書讀直下吏部施行事人微言輕未能仰回聖意竊惟封駮故事本唐朝舊法祖宗奉行未嘗敢廢其法而不守也蓋此法之設本以關防欺弊君臣所當共守今安燾差除未允公議有司舉職實不為過而陛下即令廢法以便一時古語所謂若有短垣而自踰之臣等竊恐百司法度自此隳廢君臣之間無所據執何以經久近日朝廷除吕公著門下侍郎止因中書吏人行遣差誤不經門下而給事中范純仁以失職為言朝廷為之行遣以申明舊法及今未幾乃以一安燾之故特開此例況燾與純仁並命二告皆不經書讀竊料純仁必不肯不顧前言黽勉而受純仁既不受命則燾必不敢不辭燾既力辭而給事中又封駮不已臣等必恐此命無由復行伏乞陛下克己為法檢會前奏且令燾依舊供職陛下必謂先朝舊臣無大過惡不可輕棄則同知樞密院任用不輕陛下必謂己行之命不可中止則命之未行臣等無由預議若既行之後又不得言則朝廷設置臺諫竟將安用陛下明聖其必不然臣等區區所惜者祖宗法度非敢必行己意以廢格明詔惟陛下裁擇歷代名臣奏議卷一百三十八
