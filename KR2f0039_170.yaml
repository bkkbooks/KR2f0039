body:
  text: 歷代名臣奏議卷一百七十明楊士奇等撰選舉宋孝宗時王師愈上奏曰臣恭惟皇帝陛下知人之明得於天縱文武之臣固已並用而無偏淮北歸正之人亦加器使或為將帥或為臺諫或為丞郎館職或為監司郡守各有攸當雖漢髙祖之善用人殆逺過之矣然而臣竊見歸正不釐務人散在諸州軍其間朴實可倚仗者疏通有材術者尚多有之逸居素餐每懷鬱欎以不見信任為耻又且輕於犯法以擾州縣之政甚違陛下兼用南北人材之意臣愚欲望聖慈許令諸州軍於歸正不釐務人隨其材而試之諳民事則使之治民事曉財賦則使之治財賦知軍旅則使之治軍旅其它有技藝者亦若是俟其果有成效令監司郡守從實奏舉俾之釐務或有卓然英傑之資則别加拔擢豈不愈於坐耗廪粟乎不唯見今歸正人獲展其所長是亦招徠中原人材之一端也其不能體陛下之優恤敢為暴橫以擾民則令州軍依公以法繩治庶幾歸正人凡抱寸長者無遺佚之怨愚而不肖者亦知所畏憚矣楊萬里上疏曰臣聞選法之弊其弊在於信吏而不信官信吏而不信官是故吏部之權不在官而在吏三尺之法適足以為吏輩取富之源而不足以為朝廷為官擇人之具所謂尚書侍郎郎官者據桉執筆閉目以書紙尾而已且夫吏之犯法者必治而受賕者必不赦朝廷之意豈真信吏而不信官者耶非朝廷之意也法也意則信官也法則未嘗信官也非惟不信官也朝廷亦不自信也朝廷不自信則法之可否孰決之決之吏而已矣夫朝廷之立法本以防吏之為姦而其用法也則取於吏而為決則是吏之言勝於法而朝廷之權輕於吏也其言至於勝法而其權至重於朝廷則吏部長二安得而不奉吏之㫖哉長二非曰奉吏也吾奉法也然而法不決於官而決於吏非奉吏而何夫是之謂信吏而不信官蓋世之家主有以家政聼於子弟而其權卒歸於臧獲者彼其心非疑子弟而信臧獲也蓋子弟之於家政也務知其大而不務知其細臧獲則不然其大者不知也至其細者則往往知之它日主人者偶舉其細以問焉於子弟子弟未對也而臧獲者奮而前曰我知之於是有以中其主人而取其信已其始信其細其終將不復疑其大矣於是子弟為備位而臧獲為腹心今之吏部何以異此法曰如是而可如是而不可士大夫之有求於吏部有持牒而請曰我應夫法之所可而吏部之長二亦曰可宜其為可無疑也退而吏部出寸紙以告之曰不可既曰不可矣宜其為不可無改也未幾而又出寸紙以告之曰可且夫可不可者有一定之法而用可不可之法者無一定之論何為其然也吏也士大夫之始至恃法之所可亦恃吏部長二之賢而不謁之吏故長二面可之退而問之吏吏曰法不可也長二無以詰則亦曰然士大夫於是不即之法不請之長二而以市於吏吏曰可也而勿亟也伺長二之遺忘而畫取其諾昨奪而今與朝然而夕不然長二不知也朝廷不訶也吏部之權不歸之吏而誰歸夫其所以至此者其發也有端其積也有漸而其成也植根固而流波漫矣然則曷為端其罪在於忽大體謹小法而已矣吏者從其所謹者而中之并與其所忽者而竊之此其為不可破也且朝廷何不思之曰吾之銓選果止於謹小法而已則一吏執筆而有餘也又焉用擇天下之賢者以為尚書侍郎也哉則吾之所以任尚書侍郎者殆不止於謹小法而已是故莫若略小法而責大體使夫小法之有所可否而無繫於大體之利害則吏部長二得以出意而自決之要以不失夫銓選之大體而不害夫法之大意天之春溫而秋􅏮也春豈無一日之寒而秋豈無一日之熱哉亦不失四時之大體而已責大體而略小法則不決於吏而吏之權漸輕吏權漸輕然後長二之賢者得以有為而選法之弊可以漸革也萬里又上疏曰臣聞吏部之權不異於宰相亦不異於一吏夫宰相之與一吏不待智者而知其逺也既曰吏部之權不異於宰相又曰亦不異於一吏者何也今夫進退朝廷之百官賢者得以用而不肖者得以黜此宰相之權也注擬州縣之百官下至於簿尉上至於守二此吏部之權也朝廷之百官自非大科異等與夫進士甲科之首者不由於吏部它未有不由於吏部而官者今日之簿尉未必非它日之宰相而况今日宰相之所進退者臺閣之所布列者皆前日之升階揖侍郎者也故曰吏部之權不異於宰相雖然吏部之所謂注擬者何也始入官者則得簿尉自簿尉來者則得令丞推而上之至於幕職由是法也又上之至於守二由是法也其宜得者則曰應格其不宜得者則曰不應格曰應格矣雖貪闒者疲懦者老耄者乳臭者愚無知者庸無能者皆得之得者不之愧與者不之難也曰不應格矣雖真賢實能潔廉才智之士皆不得也不得者莫之怨不與者莫之恤也吏部者曰彼不愧不怨吾事畢矣如募役焉書其産之髙下而甲乙之按其役之久近而勞逸之呼一吏而閲之簿盡矣此縣令之所以止小民之爭也夫吏部注擬百官而寄之以天下之民命乃亦止於止爭而已乎故曰亦不異於一吏今吏部亦有所謂銓量者矣揖之使書以觀其能書與否也召醫而視之以探其有疾與否也贊之使拜以試其視聼之明暗筋力之老壯也曰銓量者如是而已矣而賢不肖智愚何别焉昔晉用山濤為吏部尚書而中外品貟多所啓授宋以蔡廓為吏部尚書郎先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答云黃散已下悉委卿廓猶以為失職遂不拜蓋古之吏部雖黃門散騎皆由吏部之選授則當時之為吏部者豈亦止取夫若今之所謂應格者而為黃散耶抑將止取夫今之所謂銓量者而為黃散耶臣願朝廷稍增重尚書之權使之得以察百官之能否而與奪之如丞簿以下官小而任輕者固未能人人而察之也至於縣宰之寄以百里之民者守二之寄以一郡之民者豈不重哉且天下幾州一州幾縣一嵗之中居者待者之外到部而注擬縣宰者幾人守二又幾人則亦不過三數百而已以一嵗三數百之守二縣宰而散之於三百六旬之日月則一日之注擬者絶多補寡亦無幾爾一日之間而不能察三數人之能否則其為尚書者亦偶人而已矣日計之而不粗嵗計之而精則其州縣之得人豈不十而五六哉雖不五六豈不十而三四哉以此校彼不猶愈乎或曰尚書之權重則將得以行其私奈何是不然昔陸贄請令臺省長官各舉其屬而德宗疑諸司所舉皆有情故或受賂者贄諫之曰陛下擇相亦不出臺省長官之中豈有為長官則不能舉一二屬吏居宰相則可擇千百具寮其要在於精擇長吏贄之說盡矣今朝廷百官孰非宰相進擬者而不疑也至於吏部尚書之注擬而獨疑其私乎精擇尚書而假之以與奪之權使得以精擇守二縣宰而無專拘之以文法庶乎天下不才之吏可以汰而天下之治猶可以復起也歟太學博士虞儔上言曰臣嘗怪今日內外人材習為軟熟其勢久而必至於委靡不振夫國家之有人材猶人一身之有精神也精神去幹則人何以生人材委靡則國無以立良由始進之日上之人失其所以風厲之也夫科目髙下士子所視以為趨嚮者也大抵愛君憂國者必有切直之論而嗜進茍得者必多諂諛之辭然則因言以求人有司取捨烏可不審故切直之論勝則人材日盛國勢日彊諂諛之言行則人材日衰國勢日弱理之必然無足怪者臣於前舉備貟殿試對讀官見士人答䇿其間頗尚切直既而唱第之日在前名者蓋有諂諛之人而切直之士往往或居下列兹非有司顧望畏忌考校之過乎國家三嵗一舉親屈帝尊䇿士於廷豈直遵故事而已哉蓋欲收拾人材以為它日之用也臣嘗觀髙宗皇帝紹興更化之初御筆宣示殿試官曰對䇿中有指陳時事鯁亮切直者並置上列考試官精加詳定無失忠讜無尚諂諛用稱朕取士之意又宣諭宰臣沈該等曰今次殿試舉人程文議論純正仍多切直自此人材極有可用是年在前列者皆正直之士其後多為名臣然則以切直之言而取人思過半矣仰惟陛下以上聖之資膺夀皇聖帝付托之重所以示大始而正本者莫急於求直言以網羅人材今次殿試實為龍飛榜天下之士輻湊誠千載一遇也臣私憂過計恐有司考校之間不能深識乎聖明之意抑切直之言以避忌諱進諂諛之論以求容悅則非所以示風厲多士之意也臣愚欲望陛下特降睿㫖戒敕攸司考校對䇿須求切直當理之言毋取諂諛不根之論庶幾作新人材增重國勢知南劒州羅願上奏曰臣恭惟陛下寤寐英傑慮內外薦舉改官或遺實才修立薦式使開具事迹月日過一季不復收受將因事擇人以起治功望於臣子厚甚小大之臣宜何以稱塞臣愚輒有管見竊以為內外小吏職有繁簡舊來大吏察其屬有奉法循理意趣向公愈於輩類者即當援引不能一一皆有卓然可書之迹其有操履可嘉議論可採器局可望者亦皆多方收羅以待上之選用誠以天下至大職業繁夥所資才器不一而足此亦古者德進事舉言揚之遺意今兹專取官業誠欲勸之趨事赴功第恐奉行者迫於應令却不暇考其素行臣又見昨者推行實迹以來大吏欲有所舉或不得其詞往往就委求舉之人令自供具雖名實迹恐未能盡副上意今來雖只要在任及差出事件假令本任偶有一事疑在可取之域要須徐察其用心與此事久逺果利果害倘數人皆有可録又當較短量長擇其尤者今立限既逼恐不得詳盡其差出者或隔州隔路事畢還任各言功狀尤難得實聞昔神宗皇帝時監司登對有問麥價而對稱不知者帝以為麥價可撰而能闕所不知嘉其忠信他日擇按察首用之前朝名士鄭俠見應舉不以實年者俠戒之曰方謀入仕已有欺君之心可乎凡此皆懲便文之為害也國家設改官之法拘以六考限以五貟纎毫不備有司得以難問蓋已詳矣今舉官大吏內則六部寺監之長二外則監司帥守其貴而不在職者則前宰相執政皆上所委信使其果賢必不私一小吏以欺陛下不然亦何詞而不可飾臣願陛下特賜詳酌少寬起彂之限其有操履議論器局一長可取者於今薦式之外稍斟酌舊法通許薦引以養臣子忠信誠慤之心至於薦舉不當甚者自有謬舉之罰亦足以懲如此庶幾抱一長者皆得自見於明時且不失今日責實之意蔡戡上奏曰臣聞漢宣帝拜刺史守相輒親見問勸其所由考察其所行唐宣宗詔刺史無得外徙令至京師面察其能否然後除授二宣之時良吏最多號為中興職由此也恭惟陛下踐阼以來每除郡守必使陛辭此制一行不待汰斥而老者病者愚懦無能者莫不望風引退州郡長吏往往得人天下隂受大賜甚盛典也臣仄聞近制凡吏部注授州軍人令赴都堂審察前去之任候任滿奏事臣竊疑焉夫銓曹法守之地人人執成法以取必於有司積資纍考法所當得無詞以却之況吏部闕類皆川廣逺郡去朝廷二千里今或付之老病無能之人一郡之權若不假之子弟則委之胥史或者自知日暮塗逺不復顧藉取給於二年之間則靡所不至逺方何辜焉臣謂江湖淮浙州郡朝廷所重非宸衷妙簡則廟堂遴選必不輕畀其所得人可知矣至如逺郡人心固已薄之其間以才自奮者未必肯就銓選而資厯深者又多髙年之人若據吏部成法而與之不加考察臣恐逺方之民必有罹其害者臣愚欲望聖慈特仍舊制許之陛辭或臨時具名取㫖間令引對示以不測則凡老病無能者自度不堪為郡必䝉罷遣勢須改授它職不敢輒當郡寄庶幾逺方皆得良二千石斯民或安田里而無愁恨歎息之聲則二宣之治蓋不足過戡又上奏曰臣竊惟襄陽據荆楚之㑹可以控扼上流捍蔽吳蜀臨宛洛之衝可以長驅中原恢復關陜欲進取則利欲退守則固自古號為重地故楚莊王以此臨上雒霸諸侯漢世祖以此破尋邑復天下桓溫自此而入關柳元景自此而克陜齊桓公以諸侯之師伐楚屈完對以楚國方城以為城漢水以為池雖衆無所用之齊師乃盟而還魏孝文以十萬衆圍樊城經月不下魏主臨沔水望襄陽岸乃去豈非形勝之地以戰則利以守則固自古所重歟宋文帝經營中原首謂襄陽外接關河欲廣其資力以江州之文武配雍州湘州之租賦給襄陽蓋欲用之必先有以重之也普永和初朝議欲以庾爰之代庾翼鎮襄陽何充曰荆椘國之西門户口百萬北帶强敵西鄰徑蜀地勢險阻周旋萬里得人則中原可定失人則社稷可憂陸抗所謂存則吳存亡則吳亡者也豈可以白面少年當之哉蓋欲重之必先得人以為重也今有其地而不以為重重其地而不擇其人臣竊惜之蓋朝廷除授既重內地士大夫宦游又欲便鄉逺塞窮邉人所不樂往往付之資淺望輕非所當得之人故帥臣監司多不勝任以至吏部注擬有舉將恩例者必得內地老耄庸繆過犯之人不得已而就焉故州縣官吏多不稱職用人如此恐非所以重邉一旦有警責其趨事赴功伏節死義難矣臣愚欲望陛下遴選本路帥守監司仍詔吏部凡注授沿邉職官縣令兵官巡尉銓量人材以畀能者庶幾形勝之地得人以重之緩急賴以為用所補不細王質上舉賢能二論其一寬大臣曰夫所謂寬大臣者何也臣嘗論之古之大臣其操心也不危其臨事也不忌是以優游閒暇而能有所建立夫使大臣而下比小吏瑟縮踧踖常若有所掣其肘而履其足者左顧右盻惟恐它人得以短長是非而議其後坐于廟堂􅏮然燕之巢幕也當是之時惟夫無能不才慕恩寵保爵位之人然後能靦顔安據乎其上而竒傑大度之士以有為之才而束之小吏之律則亦褰裳而去有所不顧者故夫天子之大臣使其施為注措不盡拘於繩墨規矩之內間有所斡旋拱挈以讋天下之情夫既為天子之大臣則當開胸露臆以與天子共推無疑之心不可為曲廉細謹以自免於衆人之議而僥幸於久安而不奪夫曲廉細謹非所以為大臣體也其賢不過為張禹孔光而不肖者乃至於蘇循趙涉夫其開胸露臆而無所疑其上者遂為伊尹周公而下亦不失為杜黃裳李德裕天下徒見夫王莽楊堅之流盜權而取國以謂凡為大臣者舉不可以有所為而不知王莽楊堅之流固不世世有也如是則拱手卷舌而已矣蓋昔者堯舜之咨四嶽曰孰能乂水也四嶽曰鯀可曰孰能巽朕位也四嶽曰舜可夫鯀之方命圮族然雖堯舜亦度其不可用而四嶽乃以甚不肖之人而猥充至重之責自今視之必曰是誤國也舉天下而豫人豈細事哉而四嶽遽以天下匹夫而上居天子之正位自今觀之必曰是非所當言也蓋古之君臣相與忘機於形迹之外小過不責大言不怒然後能濟天下之功今之大臣何其甚謹也平日之論薦者才氣雄渾足以任重而致逺者何人也議論慷慨足以籌安而慮危者何人也幹局明練足以剸繁解紛者何人也以臣觀之非雕章繪句而取科第則守己畏事而省過失者也夫雕章繪句而取科第君子謂之陋儒守己畏事而省過失君子謂之庸夫非天子大臣所宜論薦也然此二流者雖不足以立事亦不足以纍人大臣論薦而出此無乃取其不足以纍人而不恤其不足以立事歟懼馬之奔蹶而求其無奔蹶者可矣取偶馬乘之曰吾懼其奔蹶也不亦太過矣乎臣非敢妄詆大臣之論薦也然慮其操心不危臨事不忌則莫若陛下少寬假之略其小失而責之以大綱使大臣稍稍釋去負背之芒刺從容泮肆措意於法律之外而専搜天下英偉豪傑之才必不敢徒為論薦以虛文而塞上意臣愚以謂小有所肆者乃大有所畏也其二制私情曰夫所謂制私情者何也臣嘗論之古者才則進不才則退舉天下之才而其進退舉不出於此兩者而今之進退才與不才俱無與乎其間古者士大夫皆涵養醖釀於學校之中司徒之所謂選士則士之秀者也學之所謂進士則造士之秀者也司馬之所謂辨論官材則又進士之賢者也天下之士萃而奔走於天子之爵祿惟其秀且賢者得之秀者異於人賢者過於人之謂也至於東寄而西棘不得被中華之衣冠而與魑魅夷貊為伍則皆恬於為惡而不變者也夫是之謂有才者進不才者退自後世才與不才混并為一而所為進退者惟其有力無力而已有力者不患其不才而無力者雖有才而不濟是故爵祿之公器而集乎權勢之私門此其勢然也蓋制私者不强其勢而反之正而使平其勢而不趨乎偏故祖宗所為舉薦之格者所以均天下進退之勢也今之法大略自迪功推而上之必三削而後遷謂之關升自從政推而上之必五削而後遷謂之改官而其上所當舉薦之人以章計之嵗有定數以人計之嵗有定貟如是而後有力者有所格而不得騁而無力者亦得以馴致而序進臣故曰祖宗所以均天下進退之勢也自今觀之進退之勢初未嘗均非法之有弊也法為人所勝也非人之能勝法也人為情所勝也凡人之情有所畏則有所迫有所愛則有所牽迫者牽者交勝則天下之公法徇於一人之情有不得不然者今夫某人操某人之書而謁於某人此必有所挾也挾之愈重則應之愈速謂之應副其求者有如執劵之取償其應之也如取諸懷而豫之也有某章而不敢用有某人而不敢舉曰後將無以應權勢之請也謂之準備寧不忍而不彂以俟夫急而應也某人禱某人而求薦某人則某人亦禱某人而求薦某人謂之換易內有不酬從而為辭曰某人債未償也或委某人而治某事則先令之曰某事集則以某章薦或以某人營某物則隂囑之曰某物至則以某章薦謂之酬勞有不如其所欲不特不薦而已又加以罪焉夫是四弊者舉內外流弊也臣嘗謂應副之弊準備之弊是生於畏而有所迫換易之弊酬勞之弊是生於愛而有所牽臣愚欲望陛下明諭當薦舉之人舉某人則列某實曰臣以某事而舉某人也既以名聞則京秩而上付之給舍京秩而下則付之御史以按其奸此其事雖繁然可以制人畏愛之私情庶幾有所憚而不至於大縱今某之論曰是無益也植藩籬固扃鑰雖未足以禦盜不猶愈於徹藩籬而啓扃鑰以聼其自至者哉是謂之無益不可也吏部侍郎李椿上奏曰臣竊見吏部遵依聖㫖指揮措置薦舉改官畫一本職實跡可謂詳備茍舉主非其人則雖有良法美意亦為虛文蓋求進之士惟務一得無所不用其至監司郡守牽於勢利罕有得其實材薦舉求才之本意失之久矣欲革其弊當澄其源精擇職司足矣在法舉改官合用舉主五員內職司一員如職司有知人之明非勢利可動公心舉人庶幾得真才實能上副君父求才願治之意臣愚欲望陛下委大臣精擇職司使之薦士郡守止許薦之于職司不必拘五員之數止用職司一員其被薦者凡申省部狀終身稱係職司某人舉改官舉主到闕及差除磨勘並具所舉過人考較賢否以為升黜之端庶使薦人及受薦者皆知自重不在繁文其弊自革如臣狂言可採伏乞出自聖意特降處分椿又上奏曰臣竊見薦舉改官之令數有申明更改本欲革奔競求實才用意非不善而實才未效奔競愈甚士夫惟知求進法出幸生營求百方無所不用其至但知求得而後已今來吏部遵依聖㫖指揮畫一措置令舉本職可謂詳備若舉主非其人雖有良法美意徒為虛文無益於事臣愚願陛下精擇職司裁損員數戒飭臣僚當使薦士及被薦者皆自重而擇人則庶幾奔競之風少戢而實才出焉臣有二說其一禁關節其二減薦員禁關節者大抵薦舉貟數以十分言之勢力取之八九非出己意罕稱其職欲乞降詔戒飭今後不得宛轉求囑為人覓薦舉如有違犯並坐違制之罪不以赦原其薦舉奏內各稱不係受人求囑實出自己所見違者亦同上科罪其有公心推薦分明移文於所舉官者即於奏內稱說係某人稱道實跡可據其後犯入已贓自依舊法監司薦人令先取本州保明狀於奏狀內聲說州郡薦人申轉運司照㑹體量保明申部然後收使所謂禁關節者如此減薦員者在法用舉主五員然後改官委是員多所以求之者奔競干求無所不用其至舉之者率不自由牽於勢力求舉者惟務其得甘心稱門生不復顧何等人其於薦舉求賢之本意失之逺矣臣愚欲乞今後改官止用二員舉主其應舉五員改官者止聽舉二員如當年不及五員之數即併次年計數奏舉若任滿不及五員之數聽後官通計其數奏舉其被舉人應有申朝省狀並具舉過改官人姓名以考所舉之人如得真才則賞之如得奸邪誕妄則罰之庶幾薦士及被薦者皆知自重擇人以息奔競之風椿為司農卿又上奏曰臣竊聞陛下軫念四方萬里留聖意於監司郡守使臣僚講究才能資格之間精選之誠為盛德事要切至當者也臣雖未聞臣僚精選之議而臣輒有管見一語可以盡之曰公選而已監司數十人猶且難之郡守數百人其可以容易而選耶若求於片文隻字或求於利口辨捷或出於左右先容或出於親黨引援或出於迎合諛佞不可謂之公選決非陛下之意也臣愚願陛下責大臣公選之然則不用資格則干求僥冒之風愈難革當於應資格中選才能之士然後盡善凡乞知州郡已上差遣具公狀申部州郡當分大小小郡有闕則令吏部具資格功過於尚書省大臣按資格於都堂差注呼請至都堂審察訖送部具鈔監司大郡有闕則集侍從官赴都堂各舉所知不限內外宰執取其善最者公共選差所知之官為狀首保薦衆官連書具奏各盡所見不得隱默所差人稱職則旌賞為首保薦者不爾則罰之其大賢大姦則連書官並罪賞之宰執所知之人聽獨具奏保薦賞罰如前私第謁見宰執者但許言公事其千求差遣者令榜於客位以絶之庶稍革僥進之風光宗紹熙元年彭龜年上審材辨官疏曰臣聞古者三年大比而興賢者能者其選舉之塗已異及其論辨而後使之則亦辨其賢與能而已漢王嘉薦儒者公孫光滿昌及能吏蕭咸等尚有分别未有混天下之材納之一區不擇材之短長不計職之劇易為人擇官而不為官擇人如近世者也大抵天下未嘗有不可用之材而亦鮮有無所不能之人能於此者或不能於彼可任繁劇者於坐鎮雅俗未必優也使處之各當其任用之各盡其材則不惟官各舉其職而人亦無遺才易務之恨倘德足以鎮雅俗而使之任繁劇則必暴其短才足以任繁劇而使之坐鎮雅俗則必不勝其官矣故天下之事多敗於官之不得其人而天下之才亦敗於用之不稱其宜如斫梁為杙以金代土甚非后王所以輔相裁成天地之道也臣愚欲望聖慈明詔大臣於選任之際審材辨官可大受者不使之䙝小務事一節者不使之受繁劇工文學者卒任之以文學精政事者專責之以政事而且量其職任之輕重以為進用之等級使官各稱其才而無觖望人各安其官而無幸心實天下幸甚龜年又乞寢罷版行時文疏曰右臣待罪太學博士昨准國子監關備准尚書省劄子臣寮上言士子不閲經史子集之文而專意於時文不閲舊來典實之文而專意近日浮虛之文朝廷方以程試取士欲其不習時文固不可得如舊來之典實足矣今欲一洗其弊當自成均始乞令監學官公共精擇舊來時文謹嚴而有法度精粹而有實學者經義詞賦論䇿各若干篇許之版行以為程式奉聖㫖依劄付本監本監關臣及監學官詳臣寮劄子內事理將新舊時文分官精擇去訖臣竊詳臣寮申請乃是父兄教子弟之法而非太學教天下士之法雖曰救文之弊而臣恐滋文之弊實自此始不可不慮也請為陛下畫一陳之臣聞三代取士皆本德行隋唐而降始尚文詞至于本朝循而不改夫以德行取士猶開目取物既能識其大小又可辨其美惡以文詞取士猶閉目取物大小美惡無所不收左采右獲庶幾一中所以忠厚浮薄色色有之蓋為是也先正有識之臣率以為病故司馬光謂取士之道當以德行為先其次經術其次政事其次藝能近世以來專尚文詞文詞乃藝能之一耳未足以盡天下士也鄒浩嘗論科舉謂上自輔弼之大臣下至州縣之小吏皆佐陛下行道者也非欲其若司馬相如枚乘沈佺期宋之問之屬以文詞供奉而已而乃取之不以道用之不以實誰與成天下之務哉然則取士以文已愧於古況教以時文乎此不可一也自古文士多出東南東南之士不患乏詞藻唯患不篤實今居東南之地用東南之人猶病其不文可不深究其所以然哉臣寮所謂不閲經史子集之文而專意於時文是也夫舊日典實之文乃根本乎經史子集今日虛浮之文乃自時文壞之今不教之研窮今古依據義理以涵養根本而復教以時文是惡其溼而使居下流此不可二也夫謂之時文政以與時髙下初無定制也前或以為是後或以為非今或出於此後或出於彼止隨一時之去取以為能否今求其義理精深文字渾厚者能有幾何縱得一二十篇其格又多不與今同捨之則失簡别之本意存之則破文字之近體此不可三也或者必曰朝廷方以時文取士今以時文為不足學則是當併廢之而後可烏足為通論臣謂不然天下之材不可一律取也朝廷設科止為中材地尓欲使髙者可以俯而就卑者可以企而及豈謂天下士盡可以科舉之文得之唐韓愈謂來京師見有舉進士者人多貴之就求其術或出禮部所試詩賦䇿等以相示以為可無學而能由此觀之有司所取之文天下固有以為不足學者也天下雖不能皆韓愈然豈可輕天下無韓愈哉朝廷取人固欲其如愈不欲其不如愈也今也乃一切以時文教之編類成帙公私刋行凡應進士者家家售之父詔其子兄語其弟以為朝廷取士不過如此朝讀夕思唯此是習經史子集將覆醬瓿臣恐天下文章益見凋敝必又甚於今日也先朝諸臣皆欲尚德行以救文敝而今乃欲擇時文以教舉子其於本末母乃甚舛歟此臣所以知其不可也臣嘗聞先朝常欲更定四場去留指揮時鄒浩為頴昌府教授乃沿工執藝事以諫之義抗疏論列今臣為學官職分所在明知不可而以成命既頒忍口不言詭隨苟從是不忠也實孤臣志是以不避斧鑕之誅肆其狂愚欲望聖慈下臣此章與臣寮之言參訂得失如臣言可採將近日精擇時文指揮特賜寢罷止今學官於公私試文字精加考校以義理明正者為上學問淹博者次之文采華贍者為下茍不入格雖是中選不許刋行去取既明趨向自正舉子之文將不求典實而自典實矣干冒宸嚴臣下情無任俯伏俟命之至謹録奏聞吏部尚書趙汝愚上奏曰臣等竊惟今之吏部古之天官也成周之時掌聽百官府之事而詔王廢置普宋以來其選猶重故山濤為尚書甄拔人物多所啓擬景平間以蔡廓為尚書時自黃散以下悉以委蔡而廓猶不拜至唐盛時率以宰相領選事其選注之法惟視其人之能否或不次超遷或老於下位不為定制逮開元中裴光庭始奏用循資格無問能否選滿則注限年躡級母得踰越非負譴責者皆有升無降其庸愚沈滯者皆喜謂之聖書而才俊之士無不怨歎遂有賢愚同滯之譏而吏部之權廢矣惟我國家銓法甚備而循資歷考尚由唐舊茍法之所當得則雖行如桀跖為長二者心知其不可而一拘於法不敢不與茍於法微有拘礙則雖有淵騫之行龔黃之才為長二者亦不得稍致力於其間倒持太阿吏執其柄是則朝野所共知縉紳所共歎也況今貟多闕少士流壅滯安可不因時救弊稍議甄别臣等伏思惟今銓量之法猶有古意而有退無進不可偏舉欲望聖慈特降睿㫖今後四選官吏如衰病昏謬及曽有負犯者許令長二照見行條法依公銓量外或有真才實能陸沈未用或恬靜守道不求聞逹或名節素髙偶有微纍並許長二各具功狀申尚書省取㫖升擢若所舉非才徇情阿黨或挾私報怨任意自肆者並許臺諫彈劾庶幾銓部得人仰稱陛下選賢圖治之意汝愚又上奏曰某等竊惟太學待補之法其弊已多因仍嵗時弊將益甚今欲易之混試固足取快一時然多士沓來以數萬計非惟有司重有勞費日力有限較閲難精亦恐道路奔衝不無寒暑之患場屋湫隘更多蹂踐之虞彼此相形得失居半盍有根本之論稍師古始而言夫三代鄉舉里選之法雖世逺事異不可遽復然其教育作成之意本諸天地而合乎人情者則雖百世不能改也惟我國家內自京師外而郡縣皆置學校慶歷以後文物彬彬幾與三代同風矣逮至崇觀創行舍法所在養士誠得黨庠遂序之遺意故一時學者粗知防檢非冠帶不敢行於道路遇鄉曲之長上及學校之職事則斂容而避之其風俗亦誠美矣然其失也在於專習新義崇尚老莊廢黜春秋絶滅史學又罷去科舉使寒畯之士捨此無以為進身之路事理俱礙旋以廢革此非舍法之罪其時弊則然也中興以來投戈講藝行都重建太學諸郡復行貢舉士生斯時可謂幸矣然浮僞之風勝忠信之俗微有司頗以為病者亦由州縣之間士之榮辱進退皆不由乎學校至論德行道藝則惟取決於糊名茍為雕篆之文無復進修之志其視庠序有同傳舍視師儒幾若路人月書季考盡為文具殊失朝廷教養之意某等擬欲逺稽古制近酌時宜不煩朝廷建官不勞有司增費惟重教官之選假守二之權倣舍法以育才因大比而貢士考終場之數定所貢之貟期以次年試于太學庶幾士修實行不事虛文漸復淳風仰裨大化有三舍之利無三舍之害其法頗為近古如䝉朝廷采録所有諸州教養課試升貢之法乞下有司詳議施行然科舉事嚴試期甫邇其今嵗待補試欲乞且與依舊放行一次寧宗時袁說友上言曰臣聞為治之道莫先於用人而用人之難尤貴乎審擇世未嘗無材也然一見於用則有心術有好尚適於平正者則為公為賢而溺於偏黨者則為私為詖要其終而成敗可見此無它中庸之為德民鮮能久矣夫師也過商也不及非中也夫子無取焉蓋智者過之愚者不及皆足以害道也狂者進取狷者不為非中也孟子無取焉蓋狂者失已狷者失人皆足以害道也害道則害治矣惟夫中者有平正之德無黨偏之蔽觀之攲器中則必正貴中也不平不正則覆矣考之洪範㑹其有極貴中也無黨無偏則中矣自古人材非材之難也一得其中則有平正無黨偏中一失則失人人主用人之際是豈不難哉仰惟陛下以人材為急務以中道律人材盡捐偏黨之私力扶平正之論還泰和之盛治享安靜之美福者誠非細事也近者陛下親頒御筆立為資格以嚴職事官蓋將垂意人材不輕除授然欲絶濫進則當嚴其資格若夷考其人則尤貴於預擇爾臣竊觀孝宗皇帝淳熙九年令侍從臺諫各舉所知淳熙十五年復令侍從臺諫各舉職事官太上皇帝紹熙二年令侍從臺諫各舉卿郎職事官此皆預加審擇也今周行闕貟朝廷或難於選授緩急之時歎於乏才欲圖得人預擇間暇上法淳熙紹熙故事以詔論思獻納之臣實今日所當先者臣愚望聖慈特彂宸斷命六曹侍從翰苑臺諫兩省給舍各舉堪充職事官者四五人或學焉有用而不事於空言或材有過人而可堪於任劇皆須心術本於公正好惡不激於黨偏除見充職事官外不拘資格不間寒逺平心審舉具名奏聞留置御前以備審擇仍令録申朝廷遇闕審用則王多吉士國無憸人進退盡出於聖明人物悉趨於中道昭明國是宏濟治功天下厚幸中書舍人虞儔上劄子曰臣聞天下之至平者莫如衡故能權物之重輕天下之至明者莫如鑑故能别物之妍醜茍惟衡之不平鑑之不明則輕重倒置妍醜不分理之必然無足怪者夫場屋考校之官士子所恃以為衡鑑者也去取髙下無不繫焉國家取士之制有經義有詩賦自紹興分科以來士子不過各專習其一以應上之科目今之所謂考官者其向之進取蓋不過工於一而已矣若以經義之人而考詩賦則恐於聲律未能細評以詩賦之人而考經義則恐於㫖趣未能深究又六經之中率是互考其春秋之凡例二禮之制度易之象數倘非素習未免有所抵牾往往去取髙下顛倒謬誤不厭士論何所不有是猶衡不平而欲權物之輕重鑑不明而欲别物之妍醜雖欲勿失其可得乎臣竊見省闈體例士人卷子先經㸃檢官批鑿分數然後參詳官審訂其當否而上之知舉從而決其去取髙下則參詳㸃檢最為緊要伏望聖慈明詔大臣將來省試參詳㸃檢等官凡六經詩賦於朝士中選其所素習者使各有其人仍詔知舉隨其所習分𨽻考校庶幾士子所業衡鑑不逃去取髙下咸得其當以副國家取士之意天下幸甚江東轉運副使真德秀上奏曰臣恭聞太平興國中嘗詔諸道轉運司察訪部下官吏凡罷軟不勝任及黷于貨賄者俾條上其事狀其清白自守斡局不苛者亦許其明揚臣仰見祖宗盛時選用監司付以事權者蓋欲其公於刺舉使貪懦者無所容而廉能者有以勸責任之意蓋不輕也自嘉泰開禧以來公道不行請囑日盛郡縣之官有罪狀彰灼為監司者甫欲案劾已求要路之援以自脫甚者得以施其反噬之計於是刺之權有所不行矣嵗舉之員往往奪於權貴之命孤寒無援者雖盡心職業不免陸沈之歎膏梁庸騃茍有所挾則若執劵以取償焉於是舉之權又有所不行矣是以州縣之間賢否不分民受其病今陛下更新大化公道昭明寖還乾道淳熙之舊矣獨薦紳間親故請託之弊未能盡革臣愚欲望聖慈戒諭中外士大夫相與維持公道使將指承命者得以展澄清之志而賢不肖有所甄别於治道豈小補哉司令許應龍上奏曰臣聞薦舉而不拘其數此朝廷之美意也薦舉而或失其實此士大夫之私心也因士大夫之私心而失朝廷之美意豈可不思所以處之乎臣請先原其弊而後僭陳其所以變革之術夫一郡之吏察於太守一路之吏察於諸司滿一朞則有關升之薦逾三考則有京削之薦嵗有常員截然一定固不患其濫也至若政績則聽其剡上初無定數豈固縱其猥濫而無所紀極哉蓋以效績顯著固未易得若拘以嵗薦茍未有其人必以庸常之流勉強充數其謹重之意蓋可見矣是以剡牘來上悉從其請或與升擢或令審察或付中書籍記使賢者知所勸而不賢者亦知自勉進者以為榮而未進者亦有所慕得人之效大率由此豈非朝廷之美意乎奈何人情貪榮競欲速化不顧職事之修否而惟欲露章之薦引頭鑽肘刺不得不已以公道自任者旌别淑慝固不肯曲徇其請而樂於周旋者見其既無定數求者必與逮其甚也一章所薦或五六人或十數人載於邸報殆無虛日合一嵗而論不知其幾非親故之夤緣則勢要之囑托非關升之所不及則京削之所未遍譽過其情則以鉛刀而為銛舉非其類則以薰蕕而同器此豈非士大夫之私心乎夫惟其出於私則賢否混淆真僞雜揉形於薦牘者未可盡信不免視為具文而一切不復用矣吁不意求才之美意而為士大夫私心壞之也雖然變而通之夫豈無術一曰定剡薦之數二曰嚴保任之法昔皇祐初詔舉縣令而張易於逼替之際併薦一十六人上謂輔臣曰所舉猥多豈無干請可令裁定此定剡薦之數者也馮拯請諸司四品以上具表舉人若效績著明當特酬賞不如所舉依法加罪此嚴保任之法者也數既一定則不容妄舉以徇泛應之私法既加嚴則誰敢失實以干謬舉之罰如此則公論大明羣賢並進得以隨才而器使之百工允釐庶績咸熙蓋有不難致者抑又有當察者昔歐陽修有云善惡之人各以類舉廉謹者舉清幹贓汙者舉貪濁徇私者舉請求茍任是責者或非其人亦安能無妄舉哉太宗皇帝親閲班簿常曰不擇舉主何由得人此清源正本之論真萬世龜鑑也惟陛下與大臣亟圖之臣不勝拳拳知江州袁燮上便民䇿曰臣聞人才之生殆非偶然凡堪為時用者皆不可廢彼其禀英秀之質固超然異於凡民因其資而培植之將有不可勝用者厥今天下常苦於乏才以臣觀之惟見其衆多爾十步之內必有茂草秀傑之士何時不生臣承乏偏州適當旱歉之餘爰俾僚屬條陳救荒之䇿每都必為一圖地名山川橋道寺觀之屬咸具而列飢民居處及户口之數於其間歷歷明白按圖而視無得隱者所以隄防奸弊責其實也區處既定分遣官僚遍走阡陌而其人皆不憚勞苦不避塗潦平時官吏不至之處一一躬往而核其實如是者再焉其愛民之篤如此臣又因民間詞訟委之剖決以觀其能亦皆恪共厥職本於法意參以人情而斷之以理靡不精當才之可用又如此其他如器局端重者廉潔守正者詞采絢彂者留意獄事者宰邑著稱者敏於治財者嚴於捕盜者亦不乏人區區支郡一時為僚可觀如此豈可謂海內無人乎古者寸長必録故人才不至淪棄後世不能如古故天下常多遺才然則其榮其枯其興其仆皆繫乎居上者何如爾善夫陸贄之言曰如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥疏濬則沼沚由此觀之人才豈有常哉今聖主求賢如渴監司牧守形於薦牘者亦時有之而朝廷視為故常少所拔擢未免有陸沈之嘆臣竊以為監司牧守皆陛下所擇果賢乎當信任之其所論薦當收用之周書曰舉能其官惟尓之能稱匪其人惟尓不任董仲舒亦云所貢賢者有賞不肖者有罰殿最昭然誰敢謬舉惟陛下亟行理宗時禮部侍郎曹彥約上奏曰臣竊見科舉之弊莫甚於牒試而牒試之弊莫甚於作僞蓋解額之有廣狹士子之有衆寡廣而寡者固已安其分則狹而衆者必思所以為之計朝廷以承平日久士子日盛設為牒試之法寬其進取之門末莭細故未暇深察於是改鄉里以就它人之貫改三族以認它人之親甚者改其父祖改其姓氏若得若失尚未可知而欺君之迹已昭昭不可掩矣今國子監牒試其弊尚少臣不知其本末未敢遽議惟是漕試之弊積習既久士大夫互相欺詐恬不為怪壞士子心術莫甚於此臣嘗反其本而思之立法之初其意甚悉户貫之必欲土著結保之必用三姓慮其居鄉之無行也慮其家世之黨錮也慮其科舉之有殿罰也慮其期以上親之有喪服也今乃改其户貫改其親戚改其父祖改其姓氏任意所欲不定貟數時舉摘一二尤者而懲戒之於事無補律以科舉之法無一可者則解而更張之不可緩也好事者深知其不便求其說而不得欲增解額則難立限制欲均解額則侵及它郡欲廢漕額以益諸郡不特舊額不等極費區處而所部之親戚故舊有決不可不避者變舊法以起爭端終不可久無已則有一焉在內有職事官朝廷之所選用也在外有監司帥守朝廷之所責任也大郡之有通判小郡之有簽判轉運司之有主管文字諸路之有川廣福建又逺地之多士子處也與其詐僞避親而使之冒試孰若嚴其保任而許其牒試隨其官職分其等差若監司帥守可舉十五人則大郡可舉十人中下郡可舉七八人通判可舉五人主管文字與簽判可舉三人川廣福建不在此位者不過一二人職事官之牒門客者當如其舊其以川廣福建牒者郎官以上不得過下郡之數寺監丞以下不得過通判之數明載之於公牘密參之以法令曰此某人者乃某之子若弟也某之親若故也或曰雖非某之子弟某之親故而某前知其為人也其居鄉無失行也其家世非逆惡也其場屋無殿舉也其親屬無喪服也後有異同甘朝典不辭也如是而行之與今時牒試之法無以大相過不增發解不拂人情而解額之狹處與士子之衆處受其利如前日也但前之為法不許其保任而容其詐僞後之為法不容其詐僞而許其保任其利害相去何如哉然州縣官之牒本路可以稽考而監司帥守之牒鄰路容有泛濫且如兩浙路與江東福建為鄰而又與淮東為鄰湖北一路與湖南江西為鄰而又與淮西京西夔路為鄰若只許一處則地里有不便或分之數路則渙散而無統須合與之關防立為限制應監司帥守牒過貟數並限七月三十日以前具申禮部禮部總其名數並限九月三十日具申都省備牒御史臺諫院則其弊可革矣至如四川解試日分不同又須比附曰限别作行下但今嵗科舉在近難以驟變舊規亦不敢以鄙陋愚見以為盡得天下士子之情欲望聖慈下臣此說付禮部監學熟議之與大臣圗回之如或可行以備戊子嵗漕試科舉之用恐於名教亦有萬一之補臣不勝大願李鳴復上奏曰臣竊惟國家設科以取士公卿大夫由此其選所以正國致君者在是所以濟時拯世者在是所以美教化移風俗者亦在是一時之去取異日之理亂繫焉可不謹哉陛下憤纍嵗公道之不明載灑宸翰以崇雅黜浮參觀器識之說訓諭知舉以易卷假手懷挾傳義之弊戒約多士使真才實能得以自見德至渥也而有司奉行不謹繩墨解縱弊幸繁滋邇者覆試而中選之士不入程度者尚多有之所以虛陛下責成之意亦已甚矣雖然往者不必責來者猶可勉也髙宗皇帝於紹興二年嘗批賜考校官曰今次殿試對策直言之人擢在髙等諂佞者置之下等辭語尤諂佞人與諸州文學是嵗得張九成為第一上曰凡士人當自初進便須别其忠佞庶可冀其有立如張九成對䇿上自朕躬下逮百執言之無所回避擢在首選其誰曰不然至二十七年又嘗以御筆宣示殿試官曰對策中有指陳時事鯁亮切直者並置上列無失忠讜無尚諂諛以稱朕取士之意是嵗得王十朋為第一上宣諭宰臣曰殿試卷子其間極有直言者前後廷對未見有此又曰自此人才極有可用聖謨洋洋真萬世取士之龜鑑也何代不生才顧上之人所以拔擢委任者何如耳陛下益計偕之額重司衡之選嚴覺察之禁下覆試之令無非為摉才設也而真僞混淆尚闕然不滿人意今群天下之士悉試于天子之庭倘復因仍故態忠佞不分是非倒置或有學術淺暗議論乖繆如葉祖洽者竊據上等則士氣摧沮人才委靡陛下異日將誰共治天下哉髙宗皇帝家法具在願陛下舉而行之使天下咸知更化之後鯁直者必用諛佞者必黜果有以異於前日不勝宗社之幸貼黃臣生長萬里外素不知朝廷事體但見數十年來大庭策士貴要之子權勢之家多竊據前列如毛自知之乳臭劉渭之多資至今議者猶竊非之嵗在己丑臣始至京蜀士有該特奏恩者先一日知問目後遂試中甲科莫曉其故近見學士院宣鎖乃在於引試數日之前機事不密或者其在此乎臣嘗觀周必大序掖垣類藁謂國朝知制誥掌外制必召試中書而後除所以試者觀其敏也若代言之官止預一日宣鎖授以㫖意俾之撰述不過頃刻可辦候進士入當制者始出夫如是則造廷之士各展盡一日之長僥幸者不容以行其私而真才實能始得以自見其於聖治實非小補如臣言可采乞斷自聖意降付中書省自今而後檢舉施行伏乞睿照洪舜俞上言曰謹按熙寧三年知貢舉吕公著在貢院中密奏言天子臨軒策士而用詩賦非舉賢求治之意乞出自宸衷以咨訪治道至是上御集英殿進士初就席有司猶給禮部韻及試題出乃策問也既而賜葉祖洽已下及第時韓維呂惠卿初考策阿時者多在髙等訐直者多在下等臣伏以自鄉舉里選之法壞而取士惟虛文是尚漢䇿賢良雖未免以利祿入其心科别或有未竟猶不失言揚之意唐進士得人為盛特絺章繪句之習工如日五色何益世用國朝䇿士初襲唐人詞章之舊至此始以策咨訪治道與漢制科等其意美矣然草茅言事豈能皆若素宦于朝而效忠獻直悉出於愛君憂國之真情言之當固不以人廢言之過亦貴於能容人君能容過直之言市駿骨揖怒蛙感發作興之下孰不以安危治忽之實來告茍有司喜阿逢而惡訐直以行上下其手之私如呂惠卿輩美意一失奚以臨軒發策為哉維我仁宗之策蘇轍其言宫中事過於直上曰以直言求人而以直棄之天下謂我何可謂有大舜之大矣度宗時太常寺丞牟濴上奏曰臣既以知行之說告陛下臣螻蟻微忱有不能自已者臣猶記去夏輪當陛對首以正人心之說獻之先皇帝玉音加奬因及近世士大夫風俗先皇帝天顔不樂諭臣曰此曺無忌憚之甚蓋嘆士習之不美也臣嘗因是而推求其故所以陷溺其良心者抑有由焉禮義廉耻國之四維士大夫當以此自維其身不當使上之人執此以為維之之具也士方其未得也奔競茍且不知有義命故其既仕也攫拏貪黷但知其有利祿未仕則有科舉之纍既仕則有薦舉之纍人才所以日不逮古而或者遂謂士習不正由二者陷溺其心也臣獨以為不然先朝范鎮以奏名第一唱第殿庭自來唱過三名則奏名之首者必抗聲自陳考校雖在下天子亦擢置上列鎮獨耻於自陳唱至七十九名然後出而就列其後進退出處有古人風遂為國朝名臣科舉而得若人則浮薄者知愧矣張忠定詠凡所薦舉皆方亷恬退之士且曰奔競者將自得之何假吾舉薦舉而得若人則奔競者革心矣然則科舉何嘗壞人士實自壞耳薦舉何嘗纍人士實自纍耳故臣謂奬恬退抑奔競正人心之第一義也昔孟子欲闢楊墨以明孔子之道首以正人心為本今士習如此不自其心而正之恐愈趨愈下於世道關係甚不細也惟陛下不以人廢言金世宗初近侍有欲罷科舉者上曰吾見太師議之張浩入見上曰自古帝王有不用文學者乎浩對曰有曰誰歟浩曰秦始皇上顧左右曰豈可使我為秦始皇乎事遂寢元世祖時監察御史魏初上疏曰舊制常參官諸州刺史上任三日舉一人自代況風紀之職與常貟異請自今監察御史按察司官在任一嵗各舉一人自代所舉不當有罰不惟砥礪風節亦可為國得人趙天麟上策曰臣聞君子達上則思進賢小人乘時焉能汲善君子之人君子朋之小人之人小人黨之同聲相應同氣相求德不孤決有鄰自然之理也夫賢者知有國而不知有其身嘗喻義而未嘗喻於利是以內舉不避親外舉不避讎公舉而不恐妨其位古之君子有行之者若祁奚舉祁午於晋侯而以為中軍之尉蕭何舉曹參於漢祖而以嗣相國之位以至子皮薦子産於鄭而民謂之母國賴其賢鮑叔達管仲於齊而九合諸侯一匡天下者皆是也小人則不然懷私挾詐以濫天官飾智屈心以固權寵親同類如就芝蘭憎君子如惡蛇蝎又常欲使後進皆出已下而恐其踰於己也古之小人有行之者若歡兜美共工於堯朝而象共滔天上官誣靈均於椘王而人亡國瘁以至臧文仲不顯展禽聖人謂之竊位公孫𢎞不引董生劉子謂其妒賢者皆是也易嘉拔茅春秋述惟善能舉其類豈輕乎哉今國家求賢之心極重取士之路未優且內外官僚所食者國家所錫之田也所衣者國家所給之祿也脫編氓之賤而得享尊榮溢宗祖之光而獲班鼎祭女不知織男不知耕如此而不思報國家之厚祉其可乎哉且食蘋之鹿尚呦呦以呼羣出谷之鶯猶嚶嚶而求友此皆物也況於人乎故伊人之將逍遙也當思縶白駒而恐有遐心嘉賓之未至止也曽念汕嘉魚而與同宴樂此人臣之大節盛德之良心也伏見方今雖有貢儒貢吏之格尚未通行或闔郡而不薦一賢或終考而不舉一士因循為務茍且為心不幾乎杜悰劉勝之徒乎臣竊以任職立功治民興譽未若舉賢之為美也何以言之舉一賢則賢者復舉衆賢而報國之績為多不舉賢則止一身而已故也伏望陛下載宣天㫖昭諭中外凡郡縣臨民正官七品以上及諸衙門官三品以上每三考之中各薦一人凡薦之士須稱其人籍貫性行委係何德何才可充何職凡薦書達上委於都省判送吏禮部以三德八才之法照薦書考校其人果為應否然後申省乞隨選奏而用之凡以後其人稱職則初薦官至考滿之日優加爵級凡其人不稱職則初薦官至考滿之日隨䡖重以黜其爵級凡其人臨官有非常之罪則初薦官亦放歸田里可也使方方士子咸慕貞淳在在官僚共求賢者而賢者知國家之尚賢莫不出矣又奚須寧戚悲歌五羖飯牛而自進之哉又奚須成湯幣聘髙宗圖形而自求之哉野無遺賢此亦一助也至元二十三年中書奏擬漕司諸官姓名帝曰如平章右丞等朕當親擇餘皆卿等職也中書右丞相安童奏曰比聞聖意欲倚近侍為耳目臣猥承任使若所行非法從其舉奏罪之輕重惟陛下裁處今近臣乃伺隙援引非類曰某居某官某居某職以所署奏目付中書施行臣謂銓選之法自有定制其尤無事例者臣常廢格不行慮其黨有短臣者幸陛下詳察帝曰卿言是也今後若此者勿行其妄奏者即入言之成宗時翰林學士王惲上奏曰貢舉人材肇自唐虞而法備於周漢興乃用孝亷秀才等科策以經術時務以州郡大小限其嵗貢之數以賞罰責長吏極其人材之精猶古貢士法也歷魏至於後周中間因時更革固為不一要之不出漢制之舊逮隋始設進士科目試以程文時勢好尚有不得不然者至唐有明經進士等科既明一經復試程文對策中者雖鮮號稱得人至有龍虎將相之目其明經立法敷淺易於取中當時亦不甚重又别設制科以待天下非常之士故前宋易明經為經義其賦義法度嚴備考較公當至亡金極矣後世有不可廢者然論程文者謂學出剽竊不根經史又士子投牒自售行誼蔑聞廉恥道喪甚非三代貢士之法伏遇聖天子臨御之初方繼體守文以設科取士為切若止用先皇帝已定格法與時適冝可舉而行如邁隆前代創為新制可不詳思揣其本末酌古今而論之惟古貢士率從學而出後世不詢經行徒採虛譽因循薦舉狃為私恩不顧公道此最不可者也莫若取唐楊綰宋朱熹等議參而用之可行於今綰之法曰令州郡察其孝友信義而通經學者州府試通所習經業貢於禮部問經義十條對時務策三道皆通為上第其經義通八策通二為中第其論語孝經孟子兼為一經熹之議曰分諸經史如易詩書周禮二戴禮經春秋三傳各為一科將大學中庸論孟分為四科並附已上大經逐年通試及廷試對策兼用經史斷以己意以明時務得失愚謂為今之計宜先選教官定以明經史為所習科目以州郡大小限其生徒揀俊秀無玷汚者充貟數以生徒貟數限嵗貢人數期以嵗月使盡修習之道然後州郡官察行考學極其精當貢於禮部經試經義作一場史試議論作一場題目止於正史內出廷試策兼用經史斷以己意以明時務如是則士無不通之經不習之史進退用舍一出於學既復古道且革纍世虛文妄舉之弊必收實學適用之效豈不偉哉外據詩賦立科既久習之者衆亦不宜驟停經史實學既盛彼自絀矣厯代名臣奏議卷一百七十
