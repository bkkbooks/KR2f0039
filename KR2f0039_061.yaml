body:
  text: 歴代名臣奏議卷六十一眀楊士竒等撰治道宋理宗時詔求言處州教授陳塤上封事曰上有憂危之心下有安泰之象世道之所由隆上有安泰之心下有憂危之象世道之所由汙故為天下而憂則樂隨之以天下為樂則憂隨之有天下者在乎善審憂樂之機而已今日之敝莫大於人心之不合紀綱之不振風俗之不淳國敝人偷而不可救願陛下養之以正勵之以實涖之以眀斷之以武而塤直聲始著於天下戸部郎官張忠恕上封事陳八事一曰天人之應捷於影響自冬徂春雷雪非時西霅東淮狂悖洊興客星為妖太白見晝正統所繫不宜諉之分野二曰人道莫先乎孝送死尤爲大事孝宗朝衣朝冠皆以大布迨寜考之適孫承重光宗雖有疾未嘗不服䘮宫中也洎光宗上賔權燄方張莫有言者去秋禮寺受成胥吏未嘗以義折衷慶元間再期而祥百僚始純服吉今若甫經練祭雖朝臣一帶之微不復有凶吉之别則是三年之喪降而爲期害理滋甚況人主執喪于内而羣工之服無異常日是有父子而無君臣也三曰太母方卻垂簾之請而慶夀前期陛下吉服稱觴播爲詩什此世俗之見非所以表儀扵天下也四曰陛下斬然在疚大婚之期固未暇問然非豫講夙定恐俚說乗間而入臣所望於今日者亦曰嚴取舍而正法度廣詢謀而恊公議爾五曰陛下於濟王之恩自謂彌縫曲盡矣然不留京師徙之外郡不擇牧守混之民居一夫奮呼闔城風靡尋雖弭患莫副初心謂當此時亟下哀詔痛自引咎優崇恤典選立嗣子則陛下所以身處者庶㡬無憾而造訛騰謗者靡所致力自始至今率誤於含糊而猶不此之思臣所不觧也六曰近世憸佞之徒凡直言正論率指為好名歸過夫好名歸過其自為者非也若首萌逆億厭惡之心則自今言者望風見疑此危國之鴆毒七曰當今名流雖已褒顯而搜羅未廣遺才尚多經眀行修如柴中行陳孔碩楊簡識髙氣直如陳宓徐僑傅伯放僉論所推史筆如李心𫝊何惜一官不俾與聞況邇来取人以名節為矯激以忠讜為迂疏以介潔為不通以寛厚爲無用以趣辦爲彊敏以拱黙為靖共以迎合為適時以操切為任事是以正士不遇小人見親八曰士習日異民生益艱第宅之麗聲伎之美服用之侈餽遺之珍向来宗戚閹官猶或聞見今搢紳士大夫殆過之公家之財視爲已物薦舉獄訟軍伎吏役僧道富民凡可以得賄者無不爲也至其避譏媒進往往分獻厥餘欲基本之不揺殆却行而求前也䟽入朝紳𫝊誦禮部侍郎真徳秀上奏曰臣竊惟今日求治之要莫難於得天心亦莫難扵収人心然天人非二致也得人斯得天矣在易大有上九自天祐之吉無不利孔子曰天之所助者順也人之所助者信也當元祐初二聖臨朝聽政四方稽首請命西羌夏人降附相尋而黄河北流有復禹舊迹之勢天下曉然知上意與天合蘇軾推眀其故以爲此二聖躬信順以先天下之功也夫無一事不當扵天心乃可言順無一事不孚扵人心乃可言信今陛下躬親庶政内禀慈謨以時攷之甚似元祐而求之於天則震電雨雪繼見扵冬春星文變異洊形扵邇日求之於人則忠義之旅反側未安朝野之民咨歎未息意者朝廷之舉措所以信服乎人心者有未至歟人心之未信此天心之所以未順也夫是是非非之理本諸天道而著在人心不以古今而存亡不以智愚而増損上之所爲一與理合則不待教令而自孚上之所爲一與理悖則雖加刑僇而不服然則今日人心之未信者果安在耶成王之命君陳曰有廢有興出入自爾師虞庶言同則繹孔子荅哀公之問曰舉直錯諸枉則民服舉枉錯諸直則民不服盖立政用人未有不叅稽公議而能厭服天下者祖宗盛時凡有大政必采羣言太平興國中秦邸之事作太子太師王溥等議于朝堂者七十有四人然後有詔裁決以大事之不可輕也廼者霅川之變眎昔略同而未聞有参聽于槐棘之下者此人情之所共惑也康定慶歴間簡求西帥必取當世第一流宰臣吕夷簡至忘讎薦進以重任之不可輕也往者淮蜀二閫之除皆出僉論所期之外今其效亦可覩矣而除目洊攽僉論之不同猶昔也天下之事非一家之私其在公朝何惜不與衆共以求至當之歸乎且廟堂之上所以廢僉諧而任獨見者不過惡聞異論而已抑不思事未行而有異論吾猶得以参酌可否而惟是之從事既行而有異論則國體已傷而救無所及朝廷施爲動闗理亂嘗試之誤豈容數耶臣願自今國有大議陛下虚心於上使羣臣各得盡言於下大臣至公無我而羣擇其中至於簡㧞材能以當重任亦必以公論為主此今日収人心之一事也賈誼有言慶賞以勸善刑罸以懲惡先王執此之政堅如金石行此之令信於四時據此之公無私如天地今之賞罰其未能允惬衆志者毋乃有未適其平者乎夫難平者事也惟任理無情而付輕重於物然後施置得所而人莫得而議焉今有功同而賞異者問之則其厚者必某人之所主也其薄者必孤寒而無援者也又有罪同而罰異者問之則其輕者必某人所主也其重者必踈逖而寡與者也朝廷之於天下當如天之於萬物栽培傾覆付之無心而可使一毫私意介其間乎諸葛亮偏方之佐爾而其言曰吾心如秤不能為人作輕重故當時之臣有為其廢絀者不惟無怨而且思報焉況堂堂天朝誠能以至公之心行至平之政則與奪所加誰敢不服惟陛下常存此心而總綱於上大臣常守此道而持衡扵下賞一人必使凡爲善者勸罰一人則使凡爲惡者懲此今日收人心之二事也夫官之失徳以寵賂之章其在昔人以為至戒當乾道淳熈間有位于朝者以饋遺及門為恥受任于外者以苞苴入都為羞今薫染成風恬不之恠陸贄有言鞭靴不已必及衣裘衣裘不已必及幣帛幣帛不已必及金璧由今觀之豈止是哉新巧相夸而亡窮誅求横出而罔極扵是軍民之膏血竭盡而無餘矣怨讟繁興日以滋甚然貴臣邇列非必有利之之心往往藉其名以事侵刻者大抵皆是利歸私室怨萃公朝抑何便而莫之止也今誠欲息天下之議惟在朝廷曉然示人以屏絶之意甚者反其物而辠其人則心迹暴白而假託以自私者不得肆矣正已示儀之方孰先扵此仍願斷自聖心誕降眀詔以儆中外俾皆滌除貪暴砥厲廉隅恵綏兵民銷弭怨疾此今日収人心之三事也朝廷之規摹欲其廣大不欲其褊狭治世之氣象欲其寛裕而不欲其廹蹵商民之胥動浮言若可忿疾而盤庚方且登進在庭丁寜開曉藹然如家人父子之親周公作無逸以戒成王亦曰小人怨汝詈汝則皇自敬徳又曰亂罰無罪殺無辜怨有同是叢于厥身夫以怨詈殺人周公之所畏也獨奈何其輕犯哉曩者以訛言之籍籍於是有譏呵之令譏呵則已過矣甚至於流竄焉殺僇焉而人愈駭矣𫝊曰我聞忠善以損怨不聞作威以防怨自譏呵之令行都城之民搖手相戒有道路以目之風此何等氣象而見扵聖眀嗣服之初乎夫峻刑而重罰本欲以一衆心而不知人情之疑懼則其心之不一正自此始不惟是也朝廷布羣材於列位夫固賴其言以相正也而選懦成風精鋭銷耎朝有闕政則拱嘿弗言而私嘆扵家朝有過舉則進焉導諛而退竊非議尊君親上人情所同夲心昏迷何至於是亦由誘導未至而猜阻先形人思茍容誰敢自竭且自孝宗以来臨御未㡬即下求言之詔訪問所逮下至芻蕘今詔㫖之頒既徐徐數月之後而僅止官吏罔及士民方眀目達聰之初遽示人以弗廣何以昌士氣何以達下情是宜播告雖修而人以虛文視之也今誠欲慰天下之望惟當開廣規摹昭示徳意解煩苛之網闢寛裕之塗而又式循舊典載播綸音韋布之㣲咸許論事庶㡬憂虞者得以自安忠直者得以自奮此今日收人心之四事也古今天下最易失者莫如人心而最易感者亦莫如人心轉移之機殆𩔖反掌今中外恫疑逺近咨怨非大有以慰安之臣恐攜離日甚一或騷動将有不可收拾之憂此羣臣之所共知顧恐度所惡聞未有以實告于上者爾然臣區區豈欲朝廷専尚姑息茍為嘘濡以恱之哉惟公惟平惟正惟大一循天下之理而不雜以一已之私易之所謂信順者如是而已惟陛下與二三大臣身體而力行之則天人之助将有不求而自應者元祐之治豈難致哉意切言狂伏俟威譴兵部侍郎曺彦約上奏曰臣伏讀聖訓至再至三仰見陛下夤畏以奉天艱難以濟業不矜伐聰眀不鄙薄愚賤博采旁求思有益於治道而後已臣待罪言語侍從之列職思其憂聖意之所未及猶當有以補報萬一矧惻怛求之可無一言以自効耶臣竊觀陛下嗣服之初未嘗有失徳于天下而天下之共治者常有凛然不安之憂天下之論治者常有歉然不足之歎不可謂之小故也豈新政所當行者有未盡耶亦事變之方来者有難測耶将異議者好為紛紛而不足䘏耶亦将疑其說之不合而思求以勝之耶眀良精一之地兢業萬㡬主徳必欲其宣恩澤必欲其流乃方與賢士大夫争辨扵是非之際疑似扵従違之末則致治之効無時而可望矣都俞之堂何嫌於吁咈好謀之主何難乎銷印施行容有未盡事變容有難測異議者正所當卹而其說之不合者不足勝也臣不暇廣譬曲引以眀前事之失亦不敢偷容取恱以媚世俗之好竊以爲重裘可以禦寒自脩可以止謗若國是之所以未定與人情之所以未孚陛下諸臣皆足以應詔言之矣不復條列以紊天聽請即其易行者而徑言之庶㡬其有補也陛下謹定省以事長樂開王社以篤天倫孝友之行宜足以取信於天下矣然而兄弟至親猶誤扵狂妄小人之手道路異說猶襲扵尺布不縫之謡事關國體人皆以爲難䖏矣臣猶以爲易也守法者人臣之職也施恩者人主之柄也漢淮南厲王欲危社稷大臣張蒼馮敬等請論如法文帝既赦其罪廢而勿王不幸而死即封其三子於故地以示私恩此往事之眀騐本朝太宗皇帝之所已行也今若徇文帝縁情之義法太宗繼絶之意眀示好惡無隙可指雖不止謗而謗乃息矣陛下招山東以復境土撫忠義以幸遺民混一之機宜闓端於此矣然而跋扈之将肆兇殘扵制閫授鉞之人持依違扵兩端去留不常包藏未發事關國勢人以爲難䖏矣臣猶以為易也戍虎牢之城鄭不得與晉争杜太行之險楚不足以支漢用兵之道可以形格而勢禁不可以直致也江内者兩淮之腹心正軍者忠義之主宰有三萬之正軍然後可以制一萬之降卒有十萬之正軍然後可以制三萬之忠義今盱眙孤單江面闊逺三衙渙𣪚見謂脆懦若能徙江外之闕額立江内之重屯人衆而聚則有才可選軍歸其營則無劵可擘可以省廩稍可以減般運使超石拔距之勇出其中而牛酒日至之聲聞于外然後經理淮壖振立威柄則犯上者飜為孝悌而狂狡者莫不率服矣陛下位置虎臣布列閫外峻陟驟用不拘常制宜有以得其人矣然而每一選用物論洶洶幸而無事則舉朝相賀不幸而敗事則舉朝歸怨事闗國論人以爲難䖏矣臣猶以為易也寇準之在北門則白溝不警矣張浚之在江左則淮淝不震矣今大而帥守小而一州選用已定臣未敢輕議金陵虚席公論之所屬目合公論則朝廷奠枕拂公論則海内寒心筋力不逮者既不可以勝任位望未至者又不可以嘗試或已試而軍民不服或未試而公論不與豈惟臣獨憂之凡心乎國事者皆不免於過計矣臣以為人才不可以全求公論不可以力勝與其用輕虚淺廹之人不若用遲鈍木訥之士與其用掊克聚斂之才不若用寛裕溫柔之徳其仁聲足以安百姓其器宇足以壓人望氣𩔖相感則寮属可以任事清介相勉則道義可以相規用人如此則戅直者可以寝淮南之謀而儉約者可以罷子儀之樂矣陛下正旦視朝以求賢為急訪落親擢以静退為首㧞茅連茹以其彚征宜必以序而進矣然而詔㫖所攽或指為文具選召所及或慮其不廣事闗國榦人以為難處矣臣猶以為易也求賢者人主之心也用賢者人主之實也仁宗之用執政或給札扵天章而使之盡言真宗之待兩制或賜對扵夜分而與之議事故中外無不盡之情而田里無不安之俗今已至者列扵朝而未能行其言未至者遲扵外而未能必其進有言而未用則或者疑其沮扵訐當言而未發則或者疑其局扵懦日月逾邁功効蔑然循習如此其視前日未求賢之時何異今若考其言而信其所學用其長而棄其所短則能言者無面從有懐者無腹非矣陛下求言之心已形扵御筆而播告之㫖復發扵手詔勤勤懇懇惟恐不逮宜有以獲其利矣然而外議致疑莫能觧釋以爲眀言文武似或止扵衣冠而泛言小大恐不及扵韋布事關國脉人以爲難䖏矣臣猶以為易也赦令之已行者猶必曰該說恐有未盡詔㫖之已誤者猶必曰前降更不施行況已謂小大之臣則凡率土之濱者皆得以盡言矣引而伸之特在扵一命令之間耳孝宗皇帝即位扵六月之丙子而求言降詔已見扵是月之甲申至八月壬午而進士上書者已補官矣九月癸丑而布衣獻言者已召赴都堂矣今若眀降指揮發揚詔㫖之意精選近臣考定可来之䇿舉而行之不間扵樸直旌而賞之首及扵踈賤則在上者罔有逸言而在下者民用丕變矣凡此數者舉天下皆疑其難而臣獨以易言之臣非輕此數者而忽之也懼陛下疑言者之過而以為不可行也懼言者測陛下之意而以爲必不行也果其不戾扵聖賢不拂扵典故可以寛聖慮可以繫人心若何其不于簡易求之而使上下之情扞格而至扵此也然臣猶有獻焉立天下之事者貴乎斷處天下之事者貴乎謙慮天下之事者貴乎詳行天下之事者貴乎速肇十有二州舜之功也汝平水土乃歸之於禹薄伐玁狁吉甫之功也侯誰在矣乃歸之張仲謂天下可以一人治也不可以一人智力専也丘山積卑而爲髙江河合水而爲大君不自有而歸之扵其臣臣不自有而歸之於同列所謂謀及乃心者必謀及扵卿士謀及卿士者必謀及扵庶人然後人心恱服怨讟不生今天下之事雖出扵獨斷而衆多之論豈無偶合程度者若因某人之說而建某利用某人之䇿而除某害造命扵上者不失於斷而推功扵下者益示其謙此則舜禹之用心也故曰立天下之事者貴乎斷而處天下之事者貴乎謙武王克商未及下車而封黄帝之後於薊孔子為政甫及七日而肆少正夘於市謂盛徳不可不速祀而姦宄不可不速去也臨淵而羡魚者不若結網之為便冠胄而枕轡者不若彎弓之為捷賞罰之所當行命令之所當出聞一善則若決江河去一惡則迅如震電使責望扵上者無所憤怨而玩狎扵下者不至茍免此則武王孔子之用心也故曰處天下之事者貴乎詳而行天下之事者貴乎速今天下之大害者莫急於贓吏羣臣既已言之而陛下既已聞之矣竊意陛下将以行其言也而出令未暇也天下之大害者又莫急於苞苴羣臣亦已言之而陛下亦已聞之矣竊意陛下亦将以行其言也而出令未暇也議者不深察朝廷之意即謂厭薄其說而不用臣知其不然也陛下無意扵求賢則不發求賢之詔矣無意扵求言則不發求言之詔矣贓吏之不可使治民苞苴之不可以立國夫人而能言之其在聖眀豈不知此何忍迂緩隐忍以至今日哉行臺諌之所已言用轉對之所通論求贓吏之昭灼者而深治之難有功勿貸察苞苴之肆行者而逺斥之雖親賢勿釋立此之斷䖏此之謙慮此之詳行此之决則臣猶以為易也觸𩔖而長舉天下無不可為之事矣然則天下之事終扵易而已耶禹曰后克艱厥后臣克艱厥臣孔子曰為君難為臣不易聖人之言有異扵臣之說者何也盖難於保治者君臣之心也而易扵行事者君臣之政也有心扵慮治則於理為難有政以為治則扵事為易上天有靡常之命祖宗立不㧞之基以朽索而馭馬以弱水而載舟若何而謂之易従諌則能如流改過則能不吝賞善罰惡惟恐其不及舉直錯枉惟恐其不速若何而謂之難臣之所謂易者特在扵舍己以從人耳慮治之所以難羣臣既已言之爲治之所以易臣遂得以進其說雖二事也其實一理也古者天子即位三卿進策始之以除患則為福次之以先患慮患謂之豫終之以禍與福鄰莫知其門豫哉豫哉萬民望之以為禍者福之所倚福者禍之所伏言福而不言禍非所以愛其君而憂其國也陛下勿謂天災之未見而以為安也勿謂外難之未作而以爲治也天災未見楚荘王以爲憂外難未作晉范燮以為慮董仲舒所謂出災異以譴告出恠異以驚懼者推廣此意也賈誼所謂即不幸有方二三千里之旱卒然邊境有急者端本此說也臣壮時粗有志時事今年六十有九多病少安去死無㡬心志既已不强議論又復淺陋自量筋力無益斯世感陛下求言之意而羣臣又已建責難之義敢復求其所以易者以獻望陛下行之而已非敢反常說而背古道也惟陛下與大臣圖之臣不勝惓惓彦約又奏曰臣聞天生民而立之君使司牧之非以厲民将以全其生也絲麻榖粟皆所以養其生刑威慶賞皆所以保其生甲胄干櫓皆所以䕶其生賦斂力役皆所以久其生其有功扵天下也如此然後居無倫之貴享無敵之富玉食以為奉而黄屋以為居誰敢議者天有愛民之心而不與民接民有願安之心而不能自安以天下而付之扵君以一人而奄有天下所以利扵民者必平治而害於民者必削弱意可見也本朝光有天下夐出唐虞三代之表攷諸名賢之論知其國祚長久出於市不易肆其端甚微而其效甚顯萬世帝王之業固已權輿於此矣累聖相承以民為本賦斂欲其必薄刑罰欲其必輕力足以制敵而每欲議和兵足以討賊而毎欲招安愛民之心與天通矣比年邊戍未撤糧運不寜事有牽制非朝廷之所欲也一家之大者多至百夫一夫之費者何止十緡其困如此而州縣猶以爲貨有濡沬不至而重疊差之者有富豪得免而移扵下戸者水旱間作嵗事不登事出不測亦朝廷之所憂也窘於浸潤者或不能入土殞扵焦枯者或廢扵銍艾其災如此而州縣猶肆其虐有循行其地而懜若無見者有量減一二以應故事者以至多量斛面名曰出剰碎納尺寸不許合鈔産去稅存勒令代納已經預借更作㸃名甚者嗾使頑民誣訴上戸執以隐微便加籍沒入其干連便作正犯千金之家萬畝之産視若已物曽無忌憚法令眀備既不舉行朝論禁戒若無聞知蠧國害民一至扵此習俗不美良可歎也亦又有可言者混區宇者莫大扵兼愛傷和氣者莫甚扵嗜殺假息微虞屢擾邊垂中原遺黎襁負歸化祖宗徳澤深入人心者牢不可遏一統之效可以循致矣敵以侵掠子女為軍前之賞我則反其耄倪以示吾仁敵以焚蕩室廬為軍前之威我則安堵黎元以示其整取級扵當陣而不取扵逐北因糧扵儲積而不因扵民財使彼民之怨彼者怨之而益急而其所以慕義者慕之而不置欲聲教之不暨朔南不可得也如聞邊境之上浸失本意效尤扵敵而結怨扵民逞怒扵赤子而帖耳于敵國甚者忠義之徒以打刼名軍主将通知未能遽革以此而欲弔民可謂心迹判然矣百姓不奠枕則頌聲不作邊民不袵席則簞壺不至臣願陛下嚴監司之選如仁宗之用張昷之以按察為職則境内之民皆得其所重将帥之任如太祖之用曹彬以不殺為賢則境外之民皆嚮其化如此而邦基不鞏固社稷不靈長臣未之聞也敢以是為初政之獻惟陛下留神知瀘州魏了翁奏疏曰臣伏覩詔書凡内外文武小大之臣有所見聞以封章来上者臣嘗讀易至天地定位則乾與坤對山澤通氣則艮與兊對雷風相薄則震與巽對水火不相射則離與坎對此為先天八卦之序也然而語其用則地天而為泰澤山而為咸風雷而為益水火而為既濟盖天道不下濟則地氣不上躋山體不内虚則澤氣不上通雷不倡則風不和也火不降則水不升也於是而為否為損為恒為未濟又即其大體而言則水雷山皆乾也火風澤皆坤也其要則乾坤坎離故先天之卦乾南坤北而其用則乾上而坤下也後天之卦離南坎北而其用則離降而坎升也大率居上者必以下濟為用在下者必以上躋為功天地萬物之理凡莫不然況乾天也離日也皆為君之象坤地也坎月也皆為臣之象其理顧不曉然未有乾坤不交而能位天地坎離不交而能育萬物君臣不交而能躋斯世扵泰和也臣嘗以是考諸今日之事而未能無惑焉行一事也上之人以為是而下或疑其私上之人其辭常泰而下之語常危上之人其念常紓而下之憂常廹然則是居上者不能以孚於下而在下者不能以達于上此顯然為上下不交之證殆非細故也而莫有為陛下言之且上之人曰方今事勢庶㡬其暫安矣内而畿輔之間善政嘉令以次舉行謗讟訛言今且消弭雖曰旱勢可畏而浙東一道雨暘時若雖曰物價未平而臨安一城錢㑹稍通外而疆埸之事則齊疆魏服以次来歸敵國外患日就衰弱雖制閫遇害而兇徒自劾已従鐫削雖狼心難保而委用得人必能調䕶此上之說然也而下之人則曰内患外禍未有稠如今者也正月而潘丙之叛使我不得以全兄弟之愛二月而劉慶福之變使我不得以全君臣之義三月而紀邦瑞之亡使我不得以保歸附之民四月而荀夢玉之死使我不得以芘勤事之吏五月而客星入于尾六月而太白見乎晝皆為盜賊兵戈之象目前事變雖若粗定而禍根亂孽元未翦除號令賞刑元未暢達内則以貪吏治彫郡以暴政涖怨民而根本既撥外則以窽籍待悍将以弱勢操强形而威柄倒持尚曰可以暫安誰實信之上之人曰百官有司庶㡬其無曠矣内而有位之士兼収並蓄以盡其才年除嵗遷以旌其勞雖多用親故然非親與故則無由知其人也雖不拘資望然純取資望則不必為吾用也外而任事之臣茍見其可任則試之以方面雖違衆背公不遑恤也察其可制則待之以不次雖滛刑黷貨不暇問也凡此規摹自更化以来二十年間未之有改雖間亦非才旋即消弭此上之說然也而下之人則曰曠官敗事未有甚於今也廟堂之上大官倡聲一口附和侍従之臣事不及知知不敢言䑓諌之任擬非所論論非所擬給舍之官號書辭頭實註紙尾經筵之選職在切磋動懐顧畏百官有司問例決事計考望遷以至将帥所以折衝禦侮也而國人非笑盜賊戮辱監司所以揚清激濁也而賄賂相先貪暴相習郡守所以平易近民也而與胥為市眎民如讎夫所謂大臣者所以表儀百工也今顧狃扵得失利害之私而使百工各不能以盡其職尚得為無曠乎不特此也尊禮耆老所以勸賢也下之人則曰不過隆以爵秩錫以鞶帶未甞有所訪問此郭公父老所謂善善而不能用子思所謂以髙爵厚禄鉤餌君子而無信用之實者也招延俊髦所以重朝廷也下之人則曰不過趣以溫詔位之閒曹未嘗有所信任此詩人所謂召彼故老訊之占夢孟軻所謂終扵此而已弗與共天位也弗與治天職也朝廷未嘗以言語罪人雖事關廊廟亦示優容不可謂不受言也下之人則曰雖外亦示優容而疑其沽名惡其不静終於逐之而實則喜佞諛而樂辯給也朝廷未嘗輕聽士大夫之去雖請至再三必示縶留不可謂不愛賢也下之人則曰雖外示縶留而疑其求遷惡其立異終扵壊之而實則私同已而用小才也朝廷之上士大夫日以綱常名分不立為憂下之人則曰君命犯而主威奪上無以表率而何以責在下朝廷之上士大夫日以禮義㢘恥不張為慮下之人則曰苞苴行而女謁盛上無以風厲而何以遏其流雖然不特下之論為然也臣日在陛下之左右而猶未能釋然于心者陛下未眀而尚衣進服始旦而司輦出房九門洞開七萃森列親臣近戚魚貫而入起居既畢二府分班奏事宰臣留身宻唘然後賛者以新制引一班上殿閤門報無公事則大駕已興陛楯皆出此人主御朝之事也為上之人未始不曰人主夙興眎事無闕於禮亦云足矣而臣疑其不然古人自朝至日中昃不遑暇食猶若不給乃今陛下臨御㡬一年中外非無事也臣毎旦侍立但見陛下淵嘿臨朝頃刻而罷未嘗躬親聽斷屈已訪問豈為君真若是易易耶臣又退而觀扵有位蟲飛而興㑹盈而退乗軒列哄以造厥司渉筆占位以書乃事文案山疊披閱未終而鳴鐘戒時聚食而返或造請權勢或奔走書謁此百官一日之事也為上之人未始不曰人臣分曹列局上下相承亦云可矣而臣謂不然古人謂無曠庶官天工人其代之其任至不輕也況今内訌外猘事㡬錯至豈是茍安之時臣每旦就列但見羣臣位卑勢踈者猶能治常程文書制錢榖出入位髙勢偪則謾不敢可否事優游拱嘿交委其責豈為臣者亦若是易易耶臣至愚極陋者也固已惕然憂之矧惟民至神也下至衆也既神且衆而道謗市議每與上之論若不相似然則是豈可藐如不聞乎陛下潜邸舊學講究新功閱天下義理不爲不多願試以臣言體八卦往来之用玩上下交濟之理而思古昔以来有偏聽獨任忠言蔑聞百官有司不脩其職發號出令不本扵誠而挈持虚器長久而不墜者乎夫危機屢發而旋止此非美政也失今不治痞鬲日甚将為不可治之證治之何如一言蔽之曰以下情達之上耳然而陛下便朝講幄所對者不過三四宰執十餘講讀官縱下情未達無由上聞臣竊見祖宗時侍従近臣率是親擢且非時宣召與之從容講論雖文武朝士至使臣選人亦時得進見而禁林舘職尤號親宻司馬光推本此意嘗請日輪侍従一員畫直夜宿以備不時宣召今陛下便殿講幄之暇深居禁中澹然無營獨不可親擢天下之耆哲位之禁近日輪一員時賜召對従容講論以盡下情乎祖宗時除䑓諌亦由親選每當言事雖扵長官亦無闗白自慶元權臣用事䑓諌遂與給舍同為廟堂私人臣以為自今陛下於輪對羣臣之日察其議論之忠鯁器識之醇眀柬自宸衷或遇䑓諌有闕獨不可親加選任以盡下情乎祖宗時事關大體必付之外廷集議自比日以来率是先期取納議状此制遂成文具臣以爲目今國有大事獨不可盡除近弊一付外廷公議庭辯衆決以盡下情乎祖宗時輪對羣臣及見辭官率是兩三班或食已再引自比日以来創引一班罕所諮訪夫人臣将有所言積誠以冀感格蓄聞以待疑問乃使之不得盡展所懐臣謂自今獨不可數對羣臣反覆問辨以盡下情乎祖宗時置登聞檢院以達四方之書朝政得失公私利害軍期㡬宻皆得上達今此制雖存僅成虚設自今獨不可申嚴厥司勿加沮遏以盡下情乎大抵此數者臣自省事以来猶及聞前輩大老歴歴能言髙宗孝廟時數對羣臣及親擢䑓諌等事又有語及兩朝集議輪對上書往往成誦毎使人有恨不同時之嘆自孽韓柄國此制始壊今而復之是乃所以述髙孝常行之規繼先朝未終之之志收人心於渙散固邦本扵蕩搖此陛下初政至近至切事也不然悠悠嵗月上有失而下不諌下有怨而上不知如乾坤之否而天下無邦如水火之未濟而六爻失位臣莫知所以為陛下計矣臣西蜀寒逺誤䝉陛下不以人廢言亟下求言之詔臣感泣思奮恨無以報稱今臣適以舊疾所撓凡再上祠官之請雖未䝉俞允恐疾狀轉劇無復瞻望清光之日故尚支持餘息為陛下懇懇言之李鳴復上奏曰臣聞善用天下之勢者不可使失之輕善持天下之勢者不可使流扵弱始焉輕而事變交激終焉弱而紀綱廢弛天下之治始有不滿人意者矣天祐社稷柄臣云亡陛下以大有為之資當大有為之㑹向也權去公室而今則挈之以歸於人主向也政出私家而今則斂之以㑹扵中書衆正之路闢而野無遺賢羣枉之門窒而朝多吉士一時氣象翕然丕變由中及外孰不謂一洗積年之薄習追還祖宗之盛治将無不可者臣獨惜夫立志太銳而謹重之道不足求治太速而培植之功不加謂富强可以談笑辦謂勲業可以徼幸致政府方新而兩界之楮俱易此首事也自易楮之令行而帑蔵悉空矣庭議未集而六月之師已興此繼事也自興師之命下而公私皆困矣財貨源流國之命脉繋焉兵家勝負民之休戚關焉顧皆率意為之得不謂之輕乎日遷月徙視官府如傳舍則用人失之輕求得欲從養邉帥若驕子則御将失之輕號令數易而輕在朝廷和戰迭用而輕在中國天下大器也而輕用之若此此臣所以先為陛下惜也夫舉事而捷如吾意則爲之也易臨事而或有齟齬則應之也難以其難扵應也而一切解縦䋲墨聽其勢之自之則天下事無復可爲矣易楮初意本以佐用度也府庫竭名器濫而楮賤物貴之弊自若興師初意本以大恢拓也士馬物故器械𣪚亡而内阻外訌之憂益甚一鼓作氣至再而遂衰焉得不謂之弱乎士卒干紀但有羈縻則弱勢見於京都主将僨軍曲加覆䕶則弱政行乎邊鄙跋扈之習交扇姑息之風遂成國勢九鼎也而削弱至此此臣所以重為陛下慮也由前而論固若可挽囬唐虞三代之純懿由後而觀㡬不免流為唐季五代之陵遲考古以騐今即理以揆事其何以為䇿乎昔者世至春秋周之勢弱矣孔子曰如有用我者吾其為東周乎盖謂東周不足為而欲反之扵西周之盛也觀其得用扵魯行偽而堅言偽而辨者首加誅戮正之以公法不聞待之以姑息也曰家不藏甲邑無百雉之城扵是叔孫墮郈季孫墮費諭之以正理不聞誘之以厚賞也却莱兵戮齊優而侵疆以復臨之以大義不聞示之以屈辱也盖夫子之所講眀者由開闢以来不可易之常理爾是理也與生俱生無智愚賢不肖人皆有之一日捨是雖天地不能以有立而况人乎哉天下之勢由强而入於弱此理之晦也天下之勢反弱而歸扵强此理之眀也夫子之緒餘少見扵用魯而夫子之藴藉盡寓於春秋陛下誠能取其用魯者以用天下推其寓之春秋者以律斯世将見紀綱森嚴法度峻整君安其為尊臣安其為卑下不敢淩上夷不敢亂華而國勢泰山其安矣當今要務莫急扵此臣無任俯伏祈望之至鳴復又奏曰臣聞為天下者有道揆有法守道揆眀扵上法守行扵下天下不足治矣夫天下大器也事物之衆機務之煩非一人之智所能周知亦非一人之力所能獨任先王知其然故舉其事之要者以属其股肱大臣凡天下大政令大更革必使之相可否而後行大謀議大賞罰必與之訂是非而後定應天下之大變排天下之大難進天下之大賢黜天下之大姦其他瑣瑣細務皆不以累其心是之謂道揆舉其事之詳者以付之羣有司百執事曉錢榖者使治財賦識經略者使嚴武備眀禮者掌禮眀法者主法吏治之能否民生之休戚雖天下萬變日陳乎前皆有人焉執條據例以酬酢之是之謂法守委其要於大臣付其詳扵羣有司百執事要則使之清心省事以思其職詳則使之畢智竭能以效其忠由堯舜三代以来未之或改也陛下厲精更始亦既踰年天下翹首以望太平而若内若外不滿人意者十猶八九即其實而求之或者中書之務不清六曹之職不舉不容無議也且中書者政本之所自出也惟静而後可别動惟簡而後可御繁若乃弊精神扵蹇淺之餘疲智慮扵瑣細之末至扵軍國要務凡有繋扵廟社之安危生靈之利害者事急則草草應酬事已則悠悠玩愒臣恐古之所謂論道經邦貳公𢎞化似不若此六曹者所以行君之令而軌範四方者也設一職當著其一職之效任一事當責其一事之實若乃觀美有餘實用不足振起事功之意少粉飾治具之意多案牘滿前乃受成扵吏手職業俱廢殆無補於公家臣恐古之所謂分職率属倡九牧成兆民似不若此今天下事勢可言矣往嵗興師本以繋中原之望今一跌不振矣往嵗易楮本以平物貨之價今百貨愈貴矣東有徐邳之寇則新疆悉所以召禍南有廣恵之盜則舊部亦敢於生變欲和而兵未可撤欲静而勢不容止邊庭驕蹇有尾大不掉之勢畨漢雜處有狙詐作敵之憂國論易搖人心多惑如是焉而猶欲以蹈常襲故之規模當紛至遝来之事變能保其必濟乎臣願陛下宣諭大臣清中書之務以逺者大者為憂重六曹之責以怠焉忽焉為戒使上下相維紀綱不紊任道揆者各盡其道任法守者各執其法天下庶乎其可為矣或曰六曹不任職久矣應有勘當每含糊其辭應有指定多兩可其説故必都司書擬而後其理眀必廟堂予奪而後其事決臣曰不然今之侍従尚往日之都司也安有任都司則辦事任侍從則廢事哉今之都司即今之六曹郎官也安有在省則賢眀在部則愚暗哉同是人也易地則皆然顧上之人所以責任者何如耳今大臣虚心無我邇者除目播􅤬孰非廟堂之所進擬陛下之所旌擢委任責成當如身之使臂臂之使指正不必有親踈輕重之别也任以是職而不責之以其事奚益哉臣嘗讀栁宗元梓人𫝊謂梓人之道𩔖於相其為說曰梓人量棟宇之任視木之能舉揮其杖曰斧彼執斧者趨而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削其不勝任者怒而退之亦莫敢愠畫宫於堵盈尺而曲盡其制計其毫釐而建大厦無進退焉既成書扵上棟曰某年某月某日某建則其姓字也是足為佐天子相天下法矣臣每嘉歎以為雖古之伊傅周召其規模亦不外此今政府日困扵多事而六曹㡬至於具員用敢僭陳其說以瀆宸聽惟陛下與二三大臣實圖利之鳴復又奏曰臣嘗讀書見周召相成王為左右召公不說周公至作書以告之稱小子旦者二稱君奭者四無非寓其懃拳之意達其懇切之情謂有殷多歴年所則由伊尹至甘盤原其所以為殷之輔者凡七謂文王能集大命則由虢叔至南宫括推其所以為周之佐者凡五曰若游大川暨汝奭其濟所以望召公者惟懼其不至曰襄我二人汝有合哉所以勉召公者惟恐其不盡不說者在奭開釋其疑而使之説者在旦烏乎此周之所由盛歟且夫大厦之建非一木之能支大器之安豈一力之能置使當軸䖏中者先有迭相疑忌之私則見之施設注措必有齟齬而不遂者周家忠厚之治著扵分陕歌於二南傳而至于歴世三十歴年八百實自二相成之此可為萬世法也陛下總攬權綱舉數十年久廢之典並建二相竊窺廟謨雄斷意者見夫更化已久而治效未著欲使謀王體斷國論者各得展盡底裏相與恊濟耳為二臣者其何以仰酬聖意臣嘗妄謂鄭清之有宰相之度而才不足喬行簡有宰相之才而力不逮合二長以共成事功其庶㡬乎然臣竊有憂焉盖自後世克己之學不眀而執要權者皆不免私情之徇權合而為一則過扵自用而同列不得以行其志權分而為二則終扵相忌而小人因得以乘其危浚鼎並命間隙忽開蚌鷸相持卒墮檜手此分任之弊也權檜獨相虐焰薰灼忠臣義士飲氣吞聲此専任之弊也今天下可謂多事矣合衆人之智以為智兼衆人之勇以為勇猶懼不給顧可二三其徳哉臣碩陛下下臣此䟽宣諭二大臣以周召為法以浚鼎為戒毋使復有如檜者持刺虎之術以售其姦不勝宗社之幸生靈之幸鳴復又奏曰臣比聞都城復有鬱攸之變七年之間災禍迭作陛下焦心勞思不遑寜處宰執負咎引慝不敢安居羣有司百執事惴惴奔走之餘精思熟慮求所以進言扵陛下者不為不多矣臣濫分閫寄宻邇輔藩當無事之時既不能貢曲突徙薪之謀扵有事之日又不容施焦頭爛額之術事變叢脞人心憂危臣實懼焉臣不避狂愚謹以三言為獻一曰願陛下脩實徳以格天不睹不聞之際天心之鑒照也甚嚴無聲無臭之間人事之感通也甚易必夙夜畏威而後可以囬天意必屋漏不愧而後可以永天命毋徒曰避殿減膳已足以示躬行之實此殆具文也二曰碩陛下行實政以安民兩淮京襄胡為而墮扵塗炭四蜀闗隴胡為而斃扵干戈兵端之妄開既有以致紛擾之禍必兵端之暫息然後可以收安静之福毋徒曰發府庫百餘萬錢給倉廪十數萬斛已足以賑一時之急此殆小恵也三曰願陛下求實才以輔政宰執侍從得人則朝廷治監司守令得人則郡國治将帥守禦得人則邉境治除授在朝廷各有以當其選則服役在天下斯有以稱其職毋徒曰奉璋峩峩佩玉濟濟已足以盡一世之人物此殆觀美也所修者實徳所行者實政所用者實才當今急務莫切扵此信能行斯三者則轉禍為福易危為安有不難矣患難之来乃人主建功立業之地惟陛下加之意鳴復又奏曰臣猥以愚庸濫叨器使向者便殿引對兩陳奏䟽之外以違逺闕庭懐不自已嘗冒進狂言碩陛下定大本執大權求實才行實政到郡未㡬且復奏聞然舉其綱猶未條其目提其要猶未布其詳也今陛下不以臣為不肖召自藩閫俾與政機揆度時宜審觀事勢方今急務無切乎此用敢申其說以獻何謂大本主器出震眀兩作離是也古者帝王即位必首建世子以為宗廟社稷無窮之計世子者王之貳天下之本也世子定而天下國家之本定矣然與子易與賢難與賢非難擇其賢者之為難也嘗即其難者而思之必先扵養而後可以擇必謹扵擇而後可以與英宗年未齠齓即鞠養扵禁中仁宗皇帝視如已子育而教之以全其氣質不待擇也髙宗皇帝詔知南外宗正事令廣選宗子以進既而貓過而蹴者不足以任重拱立如故者遂足以付託此謹於擇也邇者御筆肆頒令宗司参酌彛典建置内學選育宗賢天下翕然傳誦謂陛下知以宗廟大計為慮矣今聞諸道路宗賢雖選而未決内學雖置而未備夫與其育於外曷若教之扵内與其咨扵人曷若斷之於已優柔饜飫之際性習之所由成動容周旋之間徳量之所由見陛下春秋鼎盛當有皇嗣誕生然與賢與子皆天也非人之所能為也陛下儻能承天意以従事力行其所已行必建内學必育宗賢視其所以觀其所由察其所安而徐為之決擇則人心有所属天命有所歸而陛下之聖心亦泰然其有餘裕矣此重事也陛下已開其端臣敬以是為陛下賀何謂大權惟辟作福惟辟作威是也昔之英君誼辟未有不自執其權而可以有為於世者然天下之大事物之衆豈一人之智力所䏻酬應哉言之在人行之在我其利害之所闗繋特在乎斷與不斷耳執狐疑之心者来讒慝之口持不斷之意者開羣枉之門孝元優游不斷故政出多門而漢之業以衰光武赳赳雄斷故權綱緫攬而漢之祚以復有天下者可以鑒矣陛下日親經幄閱天下之義理已多日御路朝更天下之事變巳熟亦甞究觀前古理亂之原乎自古兆亂之端有四而弭亂之本有一强臣擅兵朋黨交扇外戚預政中常侍用事所以兆亂也操縦予奪一出扵我慶賞刑威不移扵人所以弭亂也重其任使戴吾之徳収其權使畏吾之威則强臣無擅兵之患矣休休有容者任之而勿貳截截善諞者去之而勿疑則朋黨無交扇之患矣公議不以私情奪公器不以私恩授則外戚無預政之患矣腹心以之託君子法制以之䋲小人則中常侍無用事之患矣陛下信䏻行此使天下大權一歸扵人主天下大政盡出扵中書則紀綱修眀法度峻整天下事尚安有不可為之理哉此要務也陛下當謹其微臣敢以是為陛下勸若夫人才之賢否政事之得失係焉有是實才斯有是實政脉絡相通不容以二觀也陛下即位十有四年矣天下有望治之心而無平治之實則所以爲陛下用者不䏻不負陛下也寶紹之始柄臣専國鉗天下之口而奪之氣故相與附和而一時之才病扵䛕端平以来朝廷更化鼓天下之氣而使之伸故談辯風生而一時之才又傷於激諛固非盛世事也激而不巳豈國家之福哉臣曩在臺端嘗慮及此故於請對之初首以致中和建皇極之說進今雖數載而此風猶未静也非特不静而草茅之士又風其焰而烈之此何異南北部互相譏揣三君八俊八及之共相標榜其不成黨錮之禍者㡬希阿䛕之久既變而為矯激矯激之窮又浸入扵浮虚曰吾言不售吾志不行但有去而已矣嗟夫同舟遇風胡越相救生此王國去将安之曽謂少無宦情不預世事果可免排墻之禍乎欲潔其身而亂大倫學自孔氏君臣之義如之何其廢乎舜命九官同寅協恭不聞其以矯激爲事周分六職敬爾有官不見其以引遁爲髙泰和在唐虞成周可為萬世法也陛下誠能詢四岳闢四門如舜言焉必責之以底可績行焉必要之以成厥功考其幽眀加以黜陟則實才不患其不著以八柄馭羣臣如周邦國都鄙各謹攸司月要日成各共乃職嵗終而小廢置三嵗而大誅賞則實政不憂其不舉不然虚名者用而不察其所辦者何事空言者進而不計其所成者何績以此致治未見其能治也臣在㑹稽有議及時事者忽謂臣曰端平之不為元祐無恠也元祐之君子斂熈豐之紛更而務為安靜端平之君子厭嘉紹之委靡而務為紛更三亰之役取湟鄯之故智也元祐為之乎稅畝之事𣪚青苗之餘習也元祐為之乎舉事有如熈豐而致平欲為元祐無恠乎端平之不元祐也此往事也陛下既知其所以失則當求其得可也臣敢併以是為陛下告大本定扵内則宗社之勢以固大權執扵上則禍亂之原以消以天下之實才行天下之實政則吏稱其職民安其業而若内若外之治皆可次第而舉矣傅説之告髙宗曰非知之艱行之惟艱惟陛下不以其艱而力行之宗社幸甚天下幸甚軍器監丞杜範入對言陛下親覽大政兩年扵兹今不惟未覩更新之效而或者乃有浸不如舊之憂夫致弊必有原救弊必有本積三四十年之蠧習浸漬薰染日深日腐有不可勝救者其原不過私之一字耳陛下固宜懲其弊原使私意浄盡顧以天位之重而或藏其私憾天命有徳而或濫扵私予天討有罪而或制於私情左右近習之言或溺於私聽土木無益之工或侈於私費隆禮貌以尊賢而用之未盡温辭色以納諌而行之惟艱此陛下之私有未去也和衷之美不著同列之意不孚紙尾押敕事不預知同堂決事莫相可否集議盈庭而施行決於私見諸賢在列而宻計定扵私門此大臣之私有未去也君相之私容有未去則教條之頒徒為虚文近者召用名儒發眀格物致知誠意正心之學有好議論者乃従而詆訾訕笑之陛下一惑其言即有厭棄儒學之意此正賢不肖進退之機天下安危所繋碩以其講眀見之施行範為右丞相入覲帝親書開誠心布公道集衆思廣忠益賜之範又上五事曰正治本謂政事當常出扵中書毋使旁蹊得竊威福曰肅宫闈謂當嚴内外之限使宫府一體曰擇人才謂當隨其所長用之而久扵其職毋徒守遷轉之常格曰惜名器謂如文臣貼職武臣閤衛不當為徇私市恩之地曰節財用謂當自人主一身始自宫掖始自貴近始考封樁國用出入之數而補窒其罅漏求塩䇲楮幣變更之目而斟酌其利害仍乞早定國本以繋人心上命宰執各條當今利病與政事可行者範又上十二事曰公用捨碩進退人才悉参以國人之論則乗罅抵巇者無所投其間曰儲材能内而朝列則儲宰執扵侍従䑓諌儲侍従䑓諌扵卿監郎官外而守帥則以江面之通判為幕府郡守之儲以江面之郡守為帥閫之儲他職皆然如是則臨時無乏才之憂曰嚴薦舉宜詔中外之臣凡薦舉必眀著職業功状事實不許止為褒辭朝廷籍記不如所舉並罰舉主仍詔侍従䑓諌不許與人覓舉曰懲贓貪自今有以贓罪案上即行下勘證果有贓敗必䋲以祖宗之法無實跡而監司妄以贓罪誣人者亦量行責罰䑓諌風聞言及贓罪亦行下勘證曰専職任吏部不可兼給舍京尹不可兼戸吏經筵亦必専官曰久任使内而財賦獄訟銓選與其他煩劇之職必三年而後遷外而監司郡守亦必使之再任其不能者則亟行罷斥曰抑僥倖布告中外各務職業朝廷不以弊例而過恩宫庭不以私謁而廢法勲舊之家邸第之戚不以名器而輕假曰重閫寄曰選軍實曰招土豪曰宜倣祖宗方田之制䟽為溝洫縦横經緯各相灌注以鑿溝之土積而為徑使不得並轡而馳結陣而前如曹瑋守陕西之制則戎馬之来所至皆有阻限而溝之内又可以耕屯勝扵陸地多矣曰治邊理財實為當今急務有眀扵治邊善扵理財者搜訪以聞秘書少監袁甫上疏曰臣竊伏思念先臣某事寜考朝嘗進精神之說大要以為人主運動天下其妙在精神寜宗欣然嘉納臣今復掇拾遺論為陛下詳言之陛下新更大化日與大臣論道經邦精神之運宜可以光宅風動矣而中外多事蠧弊滋長因循嵗月未臻厥成其故何哉君臣之間聚精㑹神之意常少而事物之来敝精勞神之患常多此正今日之大病也陛下每旦辨色視朝大臣奏事之後或間以䑓諌之論奏或繼以百官之輪對而經筵早講已廹矣進膳之餘陛下復扵宫中省閱章奏而晚講又且廹矣則是一日之中焦焦焉疲其精神不亦甚乎精太用則竭神太勞則敝此必然之理也況天下之事有緩急有輕重於其緩且輕者姑徐徐焉應之則可以併其精神扵急且重者而無失事之患今陛下既以聽政勸講窘扵日力之不給而中書之務不問巨細内而庶政外而邊防叢委轇轕盡歸廟堂無一事之區䖏不闗扵念慮無一紙之申眀不經扵裁決雖曰機務總括之地勢則宜然亦恐執要御詳之道未必如是陛下與二三大臣有限之精神既已奪扵泛泛之常程則夫急政大務所當静觀黙察者安得復有精神以為之運用耶夫所謂急政大務者何也上而畏天下而愛民舉至大至重之責萃於陛下之一身陛下亦嘗思之乎迺月正元日風從乾来占為兵起越三日月犯太白占為强侯作難天下民靡敝立春之朝條風起西北占為暴霜殺物粟踴貴驚蟄後一夕雪降非時占為廹近之象又七日太白與填星合占為疾為内兵既而隕霜之異果在寒食之後則春日所占不虚矣陛下覩兹變異惕然自反凡可以召和者無所不用其至此則陛下所宜専用精神者也近者邳徐失守海亦旋棄新復州郡勢皆瓦解外虞既急内備又單維揚半是北人洞知我之表裏事勢如此真可寒心軍實隳扵輕進戍兵勦扵屢衂枵然空虚何以應猝況所在軍情易扵激變殺官吏焚州縣如恵陽近事漸豈可長齊安隐憂未容安枕而豫章近地㡬致生變推其所以致此之因皆由帥閫乆虚素無鎮壓之勢兵備單弱易唘陵侮之端此亦陛下所當倍加精神者也而臣竊窺今日之勢君臣上下非不夙夜究心然大抵緩急重輕混而為一始欲俱急而終至扵當急者亦緩始欲俱重而終至於當重者亦輕在彼既有所分則在此者必無所専是亦可以悟敝精勞神之失矣奈何因循茍且不能奮然改其舊而新是圖士大夫有憂國之心者徒能仰屋竊嘆而無敢精為陛下言之者雖言之而陛下亦未必䏻行之也孟軻曰堯舜之知而不徧物急先務也堯舜之仁不徧愛人急親賢也夫以堯舜大聖不以周徧為能而惟以急先為貴若之何悠悠泛泛而欲治道之興起乎是故善運其精神則雖憂勤而決無勞敝之患不善運其精神則雖勞敝而反無憂勤之實光隂迅速嵗不我與陛下勿恃春秋之鼎盛而輕用其精神也臣忠愛之心出扵懇惻惟碩陛下與二三大臣日夜聚精㑹神毋以薄物細故耗有限之力必使志慮専於大政規模急於逺圖天下之事綱舉目張而太平不難致矣惟陛下財幸益王府教授吴昌裔上奏曰臣嘗讀儀禮始見于君執摯傳曰摯者質已之誠致已之悃愊也故盟心以待對積誠以告君在昔儒臣率謹茲禮臣雖晚陋愚鄙無所肖似然扵見君父之始何敢不潜思積慮輸􅅹悃愊求所以忠陛下之職分乎臣聞天下之理有感必有應隂陽之屈信而冬必有春日月之晦眀而晝必有夜寒暑之往来而雨必有暘盈天地間無一非感應之理也人君中天地而立執感應之機一悟而反風一懼而銷旱一言善而星曜順軌一氣清眀而山川出雲其機曷如是速耶不寂未有䏻感不虚未有能應不誠未有䏻動者也動以天則物與無妄而皆誠動以人則朋従爾思而爲咎天人證應之舒疾顧人君所以感之者如何耳恭惟皇帝陛下天造神斷日躋聖功負荷神器襲四宗之緝熈至孝也親攬政機制八枋之予奪至剛也銳情經術究百聖之精㣲至眀也以英睿不世之主乗改紀更化之時是宜已日乃孚朞年而變風動丕應惟上之從然人情翫愒敝化未新乾象推移妖祲錯起月犯金宿火入帝垣太白經天流星墮地風雷雨雹之變奉諱惡扵太史者無月不書而四方逆賊之事麗司馬之法者又無日而不有也不視其形而察其景㳺聲噂沓私切惑之陛下試於蠖濩之居清閒之燕政事不干於思慮嬖御不接扵清眀此時此際静觀宻察究所以然之故無乃澄源正本之地天理有未純歟立政造事之間天徳有未健歟誠身謹獨之際天命有未敇歟圖事揆物之所天工有未亮歟班朝表著所以治天職者未公歟軍伍府衛所以奉天討者未正歟天非昭昭之多也非蒼蒼之謂也此在陛下之心百官之志朝廷之政事三軍庶民之視聽而已臣請區别其目為陛下熟數之天地生物各無不足之理天理在人常有不盡之分盖反身而誠則天理存感物而動則天理滅是以舜敕天叙之典禹叙天錫之彛湯綏帝降之衷無日而不與天對也天尊地卑而君臣定聖作眀述而父子親兄弟既翕而父毋之心寜夫婦有别而内外之位正所以維持宇宙經紀國家不大冺亂于民彛者用此道也陛下聖心虚静天理融眀大本大經孰不精講然本末舛逆經制搶攘君命犯主威奪逆節姦萌見間而起倡聲臆決皆有輕朝廷之心此豈可求之陛下之身外哉袁絲無驕主之諌張敞無就第之書徐𫝊無暴罪之詔盖經一世而君臣之綱不眀子仲無命蔡之封子安無列侯之爵巢隠無改卜之典盖厯一紀而兄弟之倫不復承正統者不顧私親禮也亰師立廟未央設幄而夲統之義不尊基王化者必夲后妃詩也後庭數㳺教坊盛選而嬪嬙之御無節陛下毋謂執命之臣無闗扵王度因心之友不與於邦常並統二上無嫌於宗社之靈深宫閒居不顯扵邦家之化心術一形扵此而證兆著見扵彼捷扵影響甚可畏也陛下儻一旦赫然震怒穆然深思追一竦之諡以誅姦䛕録涪陵之孤以厚倫理以奉秀園之典而抑顧復之恩以戒張媛之言而防私詖之謁則大綱正而等威尊小宗法而本統重鴒原有歸而嗣息以蕃魚貫順序而夀命以固無非祈天永命垂裕後昆之本也子盜父兵之語人所難言䝉犯霧露之諌非所宜道然人臣一言而主聽隨悟盖觸其天理油然之機耳今言及權臣者不過欲眀綱常而陛下謂之捃摭言及濟嗣者不過欲篤恩紀而陛下謂之輕議言及王邸戚藩者不過欲辨等物而陛下必為之愀然不樂見于色辭遂令天地之經隠扵人心者舉朝相告以為世之大戒豈所以立人紀而範来世乎此臣輙議陛下天理之未純也一日而一周天者天行之運一息而無非天者人君之徳天徳不運則化育之功閉君徳不强則物欲之私行是以帝徳之廣運湯徳之日日新文徳之純亦不已皆與天爲一也威福玉食則曰辟賞慶刑威則曰君禮樂征伐之所自出曰天子典禮命討之所以行曰天王凡經理萬微宰制羣動納民庶于軌物者此天徳也陛下夙興視朝大昕聽政位于天徳罔不清眀然勵精之志雖勤致理之效逾邈更化志操衰於始初言来而多疑事至而少決盱豫有悔已開羣邪窺伺之端此豈可不求其故也盖繋累扵物欲之多則天徳不健牽制扵文義之細則天徳不健黯閽扵私昵之請求則天徳不健囬互扵舊恩之除授則天徳不健壅閼聽候於􅉏御之人則天徳不健猜貳仁賢扵讒慝之口則天徳不健陛下盍不思左右便辟非伐徳之斧乎婣婭膴仕非累徳之疢乎保阿女巫非溺徳之淵乎壬人讒說非損徳之穽乎陛下儻體乾之健徳而閑隂邪用洪範之剛徳而克偏詖行中庸之勇徳而經綸天下之大經使政事必歸扵中書宫府必統于冢宰紀綱必一于臺省選舉必本扵天官則以之式我王度豈不清正我朝綱豈不肅用之扵私蹊邪徑豈不杜用之於師律軍政豈不嚴此則天徳王者之政非特如後世之勵精綜核而已司馬光厯事四朝而所言不出仁眀武之三徳范祖禹進帝學一書而其要不過謂法仁祖則可至天徳祖宗之所以爲學先正之所以告君天徳之外無他法也或者謂陛下有帝堯之神而僅循孝元優㳺不斷之迹有湯文之勇而微近文宗不能堅決之風有可以法仁祖至天徳之資而天運不息未能盡如四十二年之治其何以强庶政而作新民乎此臣輙議陛下天徳之未健也𠡠天之命惟時惟㡬時者事之宜㡬者動之㣲也盖天命不已流行於起居日用之間時時整𠡠則為吉為永年為無疆惟休一有不𠡠則為凶為不其延為早墜厥命扵一日二日之㡬常有眀徴定保之戒此帝王君臣所共兢業也我國家積徳深厚受命靈長陛下昭事小心罔不祗肅然天命不易天位惟艱灾祥之降靡常休恤之㡬可畏必罔游于逸罔滛于樂而後可以𠡠天命必無敢戲豫無敢馳驅而後可以𠡠天命必其疾敬徳其徳之用而後可以勑天命必知小人之依知稼穡之艱難而後可以𠡠天命湎于酒則天命不又班伯號呼之戒不可以不思慆于色則天命多辟南威靡曼之好不可以不逺土木之崇非所以謹天戒大寶瓊䑓之箴不可不日陳於前忿兵之出非所以應天道丹書造矛之銘不可不日省諸已夷夏大勢隉杌而未定也邊方逺民離𣪚而未集也塞外吏士反復而難養也寇賊姦宄鴟義而難安也天下愚夫愚婦之情怨詈而難保也臣碩陛下亟扵此時上下相勑用司馬光罷燕飲之戒以保太和從王素出女口之諌以夀國脉行王曽玉清昭應之䟽以息民力聽富弼二十年不道用兵之語以阜安宇内深惟㡬康克自抑畏日謹一日以迓續乃命于天此今日㝡急務也若臨朝接下所奏皆常程文書宫中宴䖏所問多閭閻細事而安危界分利害機括所以闗繋天運者則不致深長之思豈所以𠡠天命乎無曠庶官天工人其代之治人者官而代天者相也道揆職任當體造物為心撫五辰順四時而後可以代天一物失所則非天也鎮四夷附百姓而後可以代天一夫不獲則非天也統百官均四海而後可以代天一賢不得其職則非天也位育和同之妙不過彌綸輔賛之間代天工者盍亦盡天分而已陛下上稽天運下揆人情祗遹先猶並命二相聖斷先定人望允孚謂宜朝紳動色相慶海㝢延頸升平而廷揚以来将閱三月未見勤彊夙夜以行所欲為況今天下弊積事極外有窺邊之虎兕内有起陸之龍虵四方有敗日至廟堂蕭墻之憂近在旦夕氣象澟澟如此此豈亢章引去所能解紓耶此豈杜門謁告所能鎮定耶此豈避權逺謗所䏻茹納耶唐朝宰相於政事堂更旬秉筆為員數猥多也國朝宰輔遇機速事輪日當筆為軍務擁併也吏禮委延賞刑罰委渾軍旅粮儲委泌徳宗之責成至矣而言復中悔張浚可専治軍旅胡松年専治戰艦財用可専委一大臣我髙宗之責任専矣而事不果行盖宰相非他官比也非可以一職名也非可下行有司之事也天下機務當共平章天下人才當共進退朝廷事宜當共䖏分邊郡吏瑣當共科條同寅恊恭和衷哉是出扵衷而後為和也據亦同耳焉得和是心乎和者不必同也昔臣琦等論事如争及至下殿不失和氣今扵殿上唯唯可可而退朝以後人各有心其不與先正之和異乎臣公著等日聚都堂率與同列各盡所見今雖都堂㑹聚如昔而人懐異見不能自盡其不與先正之和異乎該政事則問集賢該典故文學則問東西廳必事事公共商停而後謂之和也欲知選事則問吏部欲知財用則問戸部必人人博加諏訪而後謂之和也設或面從而心違陽與而隂異豈所謂忠臣不和之節乎臣願陛下申勑二相永肩一心開誠布公竭節勵善曰方今何事可憂何人可任何利可興何弊可革何者為急務何者為危機愛惜分隂力行好事以杜韓之公道自任以馬吕之正學自期以梁賈之務崇私交不篤義訓為戒如此何患乎經綸事業之専美扵昔也摯與大防本同心耳而吏額増損乃唘黨論之争浚鼎情分如兄弟也而賓客往来遂造讒說之間一隙不謹而小人乗之邇臣不和庶政皆惰豈所以賛元工乎一世人才所與治天職也陛下更化以来収召衆正白首耆艾之士骨鯁碩大之儒厄扵柄臣久鬱民望者悉皆録用有位于朝可謂治世之良瑞邦家之景光也然賢者充庭而治不加昔與亂同道往往過之是豈君子果無才耶善人果不能辦事耶儒術果迂且腐無益人之國耶不蔽帝臣者乃所以事帝弗共天位者非所以尊賢盖知賢而不用用之而不盡則爲弗敬厥職弗克若天矣尊事黄耉圖任舊人尚猶詢茲黄髮此詩書之美事逺耆徳播棄黎老咈其耉長舊有位人此商周之衰形陛下召彼故老凡耆夀俊罔不在厥服矣然典刑四朝經理全蜀者猶有未就予忌之嘆十年躬耕一介不取者猶有亦不我力之疑彼其陳謨抗論不遜於諸儒也服采錯事不衰扵晚學也顧乃謂哲為愚謂耄為謔而佚之閒廩何耶其惟吉士其惟克用常人惟成徳之彦乂我受民此立政之根本勿以憸人無以利口無以巧言令色便辟側媚此周官之法度陛下登崇俊良凡庶常吉士咸布在䑓省矣然先事衡慮力諌用兵者常有曷予還歸之興竭節盡言白發姦墨者日有亦惟斯戾之憂彼其横身以抗羣小非爲私也出力以爲國家非要譽也顧乃謂才勝徳謂利捨義而潔其去志何耶公卿大夫當用有經術眀大誼者而唯諾供給奉行文書之士猶参錯扵其間則得無疏粺雜糅之嫌法從近臣豈無陳善道廣聞聽者而精鋭銷耎莫敢盡言之人亦載尸扵其列則寜免珉瑜混淆之病不懈于位民之攸塈職當思其居也自處官不親所職而怠事之弊生靖共爾位正直是與官必守其道也自行事互觀顔面而徇情之弊生魚潜在淵或在于渚謂下位不援于上也自浮競驅馳計資商利而嗜進之弊生鳳凰鳴矣于彼髙岡謂直聲有聞于時也自上下選愞容頭過身而循黙之弊生陛下之所以治天職者三事大夫也四輔疑丞也䑓省長官與百執事也今上無樂與之誠下無首公之節良實者怨乎不任盡忠者憂乎見疑以身任事者懼於眷衰以言犯顔者嫌於厭薄周行之彦未能一一極其妙選而欲以補綻缺壊支撑傾邪求變化扵朞月之間不亦難乎臣願陛下謹好惡之偏戒邪正之雜保守初意純任諸賢勿使在外失職之徒日夜窺伺規求復用以動揺朝廷則天職公而人心籲矣賞罰二枋所以正天討也陛下奮發眀斷緫攬權綱一紙而斥二凶一疏而逐二帥凡懐諼黷貨之徒次第屏斥于外可謂得一怒之正眀五刑之公也然威令雖振而陟罰無章嫗柔豪强漸用頺弛邊臣不禀扵朝筭軍吏不尊扵王官衙校偏裨不憚扵主帥此豈一日之故耶将眀威以臨有罪謂之天罰奉王命以伐不仁謂之天吏盖命討皆以天論一置私意于其間則是我之賞罰非天之賞罰矣籍賢家財収冀財貨斥賣元載家産藩貨之家必録此天也今奪民之産者輒貸掊軍之賦者輙略盜庫之金而有案括亰之鏹而厚藏者皆置不問乃摘其近者一人姑懲之適所以警餘黨而為之計此天討之不正一也戮馬謖廢商浩繋劉彦之僨軍之将必罰此天也今棄師於汴洛者不斥殱民扵邳徐者不誅救宿而委齎糧攻唐而棄鎧仗者悉皆廢法不惟不眀春秋責帥之誼而其徒之輕儇屢敗者亦貸之此天討之不正二也神䇿恃恩驕横君子謂徳宗之失刑禁軍遮馬告寒英主歎荘宗之無法軍法之行當自近始天也今輦轂之下咫尺天威折箠嘯呼比屋洶懼嗔目汰軍則為之住㨂藉口罷教則為之賜緡部轄嚴緊者以召怨而罷歸将領縦容者反以有勞等第行賞此天討之不正三也絳卒以無糧叛子儀遂正行營之誅淮兵以防秋潰李泌迄行軍門之戮蟊賊内訌法所不赦天也今郡國之兵動踰階級廣寇以逋而佚罰建卒以潰而稽誅丹徒水軍遣帳兵而始平髙沙戍卒降黄榜而後下不惟瘡殘灰燼未息民碞而戎首厲階尚屈邦憲此天討之不正四也夫外寇未平四支之病内政不理心腹之憂宿衛喧謗不治姦雄見而生心朝廷事柄不一藩方歸而益横天下之變紛擾不齊亦在為國者謹其政刑而已今政令垢翫文法羈縻罪以隐匿而不彰功以嫌疑而不賞天下大姦猶有漏網匹夫小人猶敢争衡為政如此亂何由而已乎臣謂贓吏之不戢非公也得一李絳則人争輸家財以代賦矣邊臣之不戒非斷也得一宋璟則人不敢求邊功以希賞矣王駕鶴典禁衛人懼為亂而轉移于坐語之間則一祐甫為之盧従史擅鎮兵或疑其變而縛致扵従容之頃則一裴垍為之朝廷有道宰相眀哲天下事何有不可為耶臣碩陛下謹審政理宣眀典章夲常理之大公絶姑息之私意毋使朝廷政令一有蹉跌而宿姦新蠧不得以遺育易種扵眀時則天討公而人心服矣臣之所言六事非敢支離其辭也上天之載流行者曰命秩序者曰理得扵身者曰徳授扵人者曰工措諸事業者曰職用諸刑罰者曰討目雖有六而本則一也一則公二則私一則天理二則人欲一則陽眀勝而君子用二則隂濁行而小人長易曰天下之動貞夫一書曰善無常主恊于克一中庸曰天下之大本逹道所以行之者一一者何天是也天者何誠是也陛下日御經帷緝熈聖學清眀在上湛濁在下不知嘗存養此一乎眀師在前勸講在後不知亦講貫此一乎臣每惜陛下有天地貞一之心而攻取扵血氣物欲之私有聖人精一之學而䝉雜扵諸儒曼衍之説不惟後宫之左右嬖御有以亂其聰眀而細氊之間毁譽是非亦得以撓其純一是以天理乍眀而還晦聖斷方銳而復衰行一善也而猶有小不忍牽扵其中用一賢也而或以小有才乗扵其後端良之士雖好而未䏻壊𣪚險詖之聚安静之說雖入而未能絶去喜功之根一日之中二者交戰此豈陛下之本心乎輔拂之任未有専官誦説之時不過數刻其扵學之精藴未皇専一講眀而心之危微不免攻之者衆衆說淆亂而初意轉移此正程頥所謂講讀五人率兼他職乃無一員専職輔導拳拳於元祐者盖有味乎其言也陛下儻能采用臣頥之說禮命脩博之儒使之日親便坐専以正君為職或賜之内直相與講論經理薫陶之習久而徳性融持養之志一而治功起則學焉而為孔孟徳焉而為堯舜多歴年焉而為商為周無非同此一理如臣所言六事亦在其中矣始晉罔孚浚常求深臣則有罪惟陛下財幸昌裔為監察御史又奏曰臣聞夀天下之脉者在國論閑人心之邪者在朝綱國論之不立脉病隨之矣朝綱之不正邪氣乗之矣天道隂陽之界限人才消長之樞機世運治忽之萌象昔之君子毎扵此乎覘焉臣仰惟皇帝陛下臨御海㝢㡬一周星改紀政弦亦再閱嵗以斥逺壊爛之天下而希端平恢拓之治功勵精雖勤責效逾邈作興不逮扵初意運掉若乖扵素期勍敵鴟張軍慝蝟起環視世務事事不牢猶幸拔擢風憲之官開廣忠直之路御筆徑下而外庭不知國家真元存此一髮或者以是知隆平之運尚可冀也臣一介踈逺㢘靖自将忽蒙誤恩獲玷分察若昔先正居是職者曰此爲何官曰此官不比閒慢差遣故有入臺之次日而論社稷之大計供職之三日而言治亂之本原臣雖妄庸其扵受命之始敢不空臆盡言以荅陛下之親擢哉臣竊惟國朝家法治體寛厚而憲度浚眀外戚避親近之嫌不敢與政閽寺供洒掃之職不敢竊權近習畏清議之口不敢輙奸國事軍國大務則委二三大臣公議之時政缺失則置五六䑓諌宻察之是以事歸中書責重言路政令詳審朝廷尊嚴定公是而銷姦萌者此也景徳之議論在戰慶歴之議論在和治平之議論在於鎮定羣疑元祐之議論在扵扶植衆正議革弊者不牽扵姑息議變法者不狃扵勌令用君子則不参之以小人主正論則不雜之以邪説上自人主下至大臣先事而謀據義而守此議論之所以純一不二也今之國論果何所擇乎和戰二議之衡決邪正兩途之并容議一楮幣也而乍収乍放之不齊議一督府也而或罷或行之不一令出而還反論定而數移有繋隨之牽累而無介豫之堅決無恠乎議論愈多而事愈不辦哉歐陽脩以専脅而論夷簡蔡襄以懐安而論晏殊唐介以燈籠錦而論彦博王陶以不押班而論韓琦韓絳以事寝不下而論富弼劉安世以除授多其親舊而論公著大防純仁事茍有闕雖公衮之賢有所不避或以濮園之議而劾執政或以袖中之文而彈新参或率同列以言升之之交結或連九章以議方平之除拜或以廢格詔㫖罪呉奎或以不協物望排宗愈人苟有過雖丞弼之賢有所不屈䑓諌眀眸以言之人主虚心以聽之大臣為法而受之此國之紀綱所以憑藉而不替也今之朝綱果無所撓乎言及親故則為之留中言及私昵則謂之訖了事有窒礙則節帖而付出情有嫌疑則調停而寝行今日而遷一人曰存近臣之體眀日而又遷一人曰爲逺臣之地屈風憲之精采而徇人情之去留将恐士氣銷耎下情壅滯非所以紏正官邪而扶助國脉也雖然國論者非一人之私也天下之公是也朝綱者非䑓臣之利也天下之公法也世之有容徳者常銳扵慷慨願治之初必厭於玩習已安之後初則開導而易入久則勉强而難平耳目之官遂至孤立甚可畏也臣願陛下以公論責大臣而無爽其更化之初志以公法責臺諌而無替其導諌之初心使君子有所恃而安小人有所畏而懾主本彊而客邪不入脉理宻而外寇潜消則三院紀綱之地自今皆微臣砥礪節行之日也之綱之紀惟陛下謹守而力行之謹録奏聞伏候𠡠㫖厯代名臣奏議卷六十一
