body:
  text: 歷代名臣奏議卷三百三十七明楊士竒等撰禦邊宋光宗時彭龜年論邊防事宜疏曰臣聞北敵近有韃靼諸國之兵河北又遭水旱狎至之變度其事勢和好必堅唯聞河南流人並無歸著若更不熟未免聚為盜賊又云流人往往有歸附之語亦知朝廷已有指揮令沿邊諸州謹守疆埸至即約回但恐此輩以救死為心彼既無從得食忽爾衝突而來未必可以攔約儻或攔約不住又難驅逐以兵敵人亦耻於百姓流移當必反以本朝誘引人過界為解設或至此不特失中原之心又將失敵國之心事當早圖不可坐待寧謀之而不用勿事至而旋圖欲望聖慈宣諭大臣令密與侍從臺諫兩省官熟議所以處之之道庶幾不致緩急誤事寧宗慶元元年大府寺丞臣吕祖儉上奏曰臣恭惟國家遭靖康之禍至慘至痛所不忍言凡在臣子皆同不共戴天之責髙宗中興大業屈已和戎終未克伸大義於天下孝宗思雪讎耻務圖規恢雖倦於憂勤不得少遂然天地大分於是稍正亦足以慰列聖在天之靈陛下承太上之付託洪濟艱難與時屈伸不殄厥愠祗宜懋德修政蓄鋭養力以俟時幾誠不可妄挑兵端趣其變動然臣竊揣事勢敵情難知備豫不虞始能無悔自紹熙變故有輕我心彼之來者陳幣在館辭語不恭我之去者摧辱逼脅不顧常禮傳聞駭常孰不悲憤夫其所以敢於藐玩是豈無故而然而又邊遽所傳其事非一括馬簽軍近淮積粟治戰艦於海道遣大酋於汴京固難盡謂實然苐人情巳覺動搖今使命之歸乃以其所知盡寬衆聽既曰無他憂也彼自防內難爾又曰無他事也彼自興河役爾形跡事實莫得而掩辭說解釋過為自文設使彼之計慮祇為虛聲未必有實則隋文平陳之䇿所謂量彼收穫之際徵集士馬聲言掩襲彼既聚兵我便解甲再三若此彼以為常後更集兵彼必不信猶豫之頃我乃濟師萬一敵情或出於斯則亦必深勞宵旰之慮矣兵家常言無恃敵之不來恃吾有以待之今交為無他之說者是乃恃其不來徒覬幸其如我所料而已儻或是說浸淫不已而弗圖所以待之之具他日邊烽有警敵使扣關若有無厭之求難塞之請事出卒遽莫知所應從之則國威愈損拒之則國勢難支至於此時而後知其言之誤國亦何及哉伏望陛下痛念讐耻之未報深察戎心之難知夙夜之間基命宥密固不可以為無他而自寬尤不可徒為張皇而自擾眀詔二三大臣堅彊志意審定規模相與盡誠勠力圖回實政布置實材以為待敵之方內而宿衛諸將訓飭其和輯士心外而被邊諸屯申嚴其周視邊備復於重鎮圖任舊臣老將俾為固圉之謀彼若求釁生辭則在幃幄運籌者折之以正理出之以遜辭盡其在我毋為兵首神天助順軍聲自強宋德在人必無厭斁嘉泰三年前知潭州湖南安撫趙彥勵上言湖南九郡皆接溪峒蠻夷叛服不常深為邊患制馭之方豈無其說臣以為宜擇所在知勇為猺人所信服者立為酋長借補小官以鎮撫之況其習俗嗜欲悉同猺人利害情僞莫不習知故可坐而制服之也五年之間能立勞效即與補正彼既榮顯其身取重鄉曲豈不自愛盡忠公家哉所謂損虛名而收實利安邊之上䇿也帝下其議既而諸司復上言往時溪峒設首領峒主頭角官及防遏指揮等使皆其長也比年往往行賄得之為害滋甚今宜一新蠻夷耳目如趙彥勵之請所謂以蠻夷治蠻夷䇿之上也帝從之寧宗時著作佐郎張宓言邊事有二病戒敕千條猶患悖繆指意眀白猶復背違安有不示其所向而謂可責其成且言戰則當知於彼言和則當請於彼惟守則自求諸已而已倘以為可則當力主其說眀告天下日講求其所以守之之䇿蓋議論貴合一而今則病乎雜也用人不可以嘗試任人不可以自疑朝廷惟慮獨任之難勝彼此互分不相扶持人得抗衡莫有稟屬制置但存虛器便宜反出多門蓋體貴合一而今則病乎分也衛涇應詔論北伐劄子曰臣踈賤至愚暫爾兼官猥奉眀詔使得吐露與聞邊議之重仰見陛下博盡下情憂深慮逺以圖帝王萬全之至計臣敢不罄竭愚忠臣竊惟國家再修盟好以來邊報晏清中外寧謐民不知兵以保和平之福蓋踰四十年于此比來敵運衰微內當多事自敝之餘頗為恭順外知吾國飭備之謹寖生疑懼伏覩宣示類聚探報事宜其虛實的確雖不可盡知臣妄料敵情不過因並邊侵軼之擾多為防備必未敢輕犯王略自速殄亡近者賀正使副陳景俊等回程竊知敵廷嘗有文喻其詞委曲類若退懦然觀其指意只欲求邊臣無生事盜賊不作邊境安靜而已今探報所云修道路閲舟師㸃集兵夫添置寨栅等事往往其國視吾增戍隨亦葺備施行未必周悉傳聞易至張皇譬之對奕彼此相應此示之急則彼亦急此示之緩則彼亦緩如邇日朝廷分置使命相繼宣諭諜間往來彼寧不知恐其展轉生疑安知凡百繕守殆將不止如目前所傳此亦事勢之所必至毋足怪者臣反覆熟慮今日之計惟當審在我之虛實以為備禦必勝之䇿無或隨在彼之動靜以為作輟無定之謀自古兩國相持未問强弱持重者安輕動者危應兵常勝首事常沮秦漢之逺未暇悉論東晉事體大略類今謝𤣥淝水之勝苻堅舉國之衆匹馬不能北返此應兵必勝之驗也禇裒殷浩投機太速勞師于外曽微寸功此首事多沮之鑒也本朝中興以後凡渝盟興師常先出於敵然敵首兵每衄而我應兵常得利烏珠號善用兵獨潁昌大敗以十萬徑騎不能支劉錡背城之一戰海陵凶焰方張自謂可以叱咤渡江而海道采石所向輒挫卒授首于廣陵此二役者敵以首兵而皆敗使今日侵犯之謀果先出於彼是以機授我堅師不動以待之正不足畏矧敵之既衰萬萬不及烏珠及海陵時臣知其必不能出此眀矣易曰不利為寇利禦寇今當令敵常居為寇之名而在我先定禦寇之計是遺敵以不利而我擇其甚利圖全制勝莫切於此兵法曰善戰者致人不善戰者致於人臣所謂持重則安致人者也輕動則危致於人者也若北敵自貽伊戚警我邊陲是墮乎致於我之術矣以靜制動以逸待勞豈不能收潁昌城下卻敵之效乎臣所慮者彼此疑障既開邊備未可輕撤要當力於自治堅忍持重勿為無益之爭以啓其侮勿為易泄之機以激其變稍遲嵗月使吾之戎政益修軍實愈核儲蓄豐裕士馬騰奮則伸縮進退無不在我遲速操縱終可以得志矣況中國舉措尤貴嚴密若朝得一報而為之營營不寧夕得一奏而遽謂晏然無事臣恐非所以示朝廷之整暇而敵國得以窺測淺深也昔魯有疆事疆吏以告魯桓公曰疆埸之事謹守而偹其不虞姑盡所備事至而戰又何謁焉魯豈忘疆事哉蓋內為之備而外不示弱此有所主而彼不能動耳豈以天下之大而可無自立之規模乎臣有惓惓之愚夫事有先後謀有緩急譬人之一身腹心無疾而後外邪可攻今備邊之計誠不可緩而荆襄兩淮所在饑民未甚帖息尤所當急若艱食者衆萬一盜賊有警則敵得窺伺之便而始有重煩朝廷之憂者其可不亟圖之臣願陛下申敕宣諭使司且以撫安饑民為先使腹心敉寧根本充實則內安外懼而禦備之䇿可以無闕臣識見短淺冒陳管臆不足以仰裨廟算席藁恐懼陛下赦之幸甚司令許應龍奏曰臣竊惟今日之務莫急於備邊小大之臣陳謀獻議不曰意嚮當定則曰規模當立不曰議論貴一則曰事機貴審陛下既熟聞之矣臣雖至愚安敢復援前說以瀆天聽輒以彊本之䇿為陛下陳之夫紓一時之急者不得不為權宜之舉防後日之患者不可不為彊本之計倚權宜之舉而欲其經久而無患者見逺識微之論則以為猶有遺慮也且賴忠義之人以紓一時之急豈非權宜之舉乎練官軍以防後日之患豈非彊本之計乎粵自京口之舟失於警備之不嚴泗水之師衄於揣度之不審既而決淮隂之勝而挫殘敵之鋒者忠義之力也邇者烽燧告警而敵情叵測游騎出沒而疆埸靡寧未幾奏濠梁之捷以伸吾中國之威者又忠義之力也夫軍書輻湊以交馳羽檄重跡而狎至隨機應變豈容無䇿今也連營列戍苐為守衛之謀邊將閉城僅防衝突之擾苟非調發忠義設伏犄角則何以却鴟張之勢而成克獲之功哉是則將以紓一時之急其勢不得不爾雖然此特權宜之舉而彊本之計又有不容緩者蓋元氣既固外邪自消吾之威令苟伸則英雄豪傑之徒莫不俯首屈意於其下然則官軍者豈非今日之所當振乎官軍振則根本彊根本彊則忠義之人可以為吾之助而不能為吾之患此亦漢以南北軍相制之遺意苟以其脆弱難用不加激厲而攘却之功一切倚辦於忠義彼將謂秦無人萬一恃彊而驕蹇挾功而邀求不厭其欲其能帖然而無譁乎況吾之虛實彼所熟知苟一搖足何以制之且今之官兵非不多也器甲非不利也廩食非不繼也以此禦戎何患不濟苟能揀其驍鋭嚴其紀律日夕淬礪常若寇至逮遇敵之際則功多者有厚賞不迪者有顯戮毋徇私意而為之重輕毋事姑息而為之容隱則怯者奮而為勇弱者轉而為彊兵威振厲隱然有猛虎在山之勢不惟可以折敵人之衝尤可以消山東偏重之勢何者彼知朝廷之所倚仗者不専在我也夫既資彼之力以紓一時之急復張吾軍以消他日之患則國勢巋然猶泰山而四維之矣而或者乃曰忠義之人猶養虎耳飢則求食飽則反噬深咎夫招來者之不審也吁是固然矣然既招之則不容却之彼既與敵為仇羣然歸我苟無以安其心是絶其向生之塗激其等死之忿獸窮則搏勢所必至況彼方有功於我猶賴以為犄角之助則亦惟區處調伏使之有致逺之能而無泛駕之虞耳所謂區處之䇿者何也懷之以恩結之以信寵之以爵賞贍之以闕額官兵之廪使之歡欣感戴樂為吾用而吾之兵威又足以鎮服其心則亦庶乎其可也吁忠義若可慮也而有以制之則不足慮官軍若難用也而有以厲之則皆可用然而致此者則必有任其責者耳夫膺守禦之寄者邊將也總邊將之權者制閫也昔蜀以孔眀駐漢中吳以陸遜守荆渚皆付以事權不從中御故得以乘機制變而有成功今之任制閫者苟得其人則舉邊陲之寄悉以付之使進退伸縮莫不如意則號令一而人心協苟州縣之有事權者或得以已見專達雖曰事機無壅然而謀議或有異同施行或至抵牾則倉卒緩急諸將罔攸稟令廟謨宏深其必有以處此矣雖然備禦之䇿尤當一定不可視緩急而為之作輟覩勝負而為之驚喜昔元祐初以纍世逋誅之鬼章一日縛致闕庭疑若可以晏然矣而議臣以為安危之機正在今日若處之有術則安邊息民必自此始不然則以勝為灾夫當國家全盛之時猶不敢忘警懼之戒況邊事未寧之日乎毋恃其一勝當思為常勝之謀毋豢於少安益圖為久安之計此又帝王萬全之䇿也臣位卑言髙罪在不赦惟陛下恕其愚忠應龍又奏曰臣聞禦戎之䇿有三曰戰曰守曰和因時施宜固難執一然其事未嘗不相關焉鋭於立功者則曰殘敵煙滅中原丘墟振兵直前當如摧枯拉朽之易不特慰來蘇之望尤可成剋復之勳是則攻戰之舉固不容緩然深謀逺慮者則曰理內斯可禦外彊本斯可折衝兵財俱乏事力不繼而遽尋干戈則召釁稔禍功未成而害已見其可不為備守之圖然城壘方營而侵軼已至糧食甫積而摽掠時警羽檄交馳將左支右吾之不暇其能固吾圉乎是又不容於不和也是必和親以紓其擾然後備守之計為可圖備守以壯其勢然後征伐之謀方可舉是以古人雖和未嘗不為守雖守亦曷嘗忘為戰之備哉請以漢家之事眀之漢興之初平城之圍未報嫚書之辱未雪犂庭掃穴似不容已然而樊噲橫行之請則却之賈誼三表五餌之䇿則謝之和親之約細過之棄冠蓋往來金繒賂遺曽不以為勞且費何耶蓋小屈者所以為大伸之基而斂翼匿形者未始不為搏擊計也況當是時民之瘡痍未瘳而休息之政未施公私之積尚乏而邊陲之警未寧則所以拳拳於議和者將以為備守之圖也故塞下之粟可得而積內帑之錢可得而羡材官騎士搜閲於都試六郡良家之子間習於馳射凡此者孰非為攻戰之備逮夫國勢已彊皇威益振然後馳隂山之北而使漠南無王庭焉極其盛也欵塞而慕義稽首而稱藩推所由來亦和親之計有以基之今日和好之議意或出此是豈怯懾而不振者乎所患者玩一時之少安而忘備禦之大計耳況强敵之心背服靡定其吞併種落每以和好為豢敵之計今當深思曲防以伐其謀外姑示講和之意而內實為強本之圖厲兵堅守常若冦至來則應之侵則禦之庶乎其可以自固也乃者䝉古使來或欲絶之以杜其窺伺或欲卑之以示吾名分或疑其虛僞而不應加禮此固所以尊國勢而挫戎心然此既通好於彼彼以復命而來已抵中都亦難遽絶寵以錫賚勞以燕享隨時施宜不得不爾初非過於懲創而自損威重也雖和好成否難以預計然絶之卑之則憤心一生其能保其無間言乎釁端一開其患立見蓋不止於威重之少損也為此舉者姑欲因此而達和好之意欵侵撓之兵而為安邊息民之計耳使和議既成尚當嚴於備禦況議猶未定可不亟思所以處之乎且今之師旅疲於攻守財用耗於調發郡邑困於應辦盡心力而為之猶懼不給一或少緩突如其來得無倣徨失措乎兵之闕額者當補而訓練之必精城之頽圮者當修而防捍之必嚴事事而為之慮使無一之不盡所謂無恃其不來恃吾有以待之者此乃禦戎之上䇿也吁內修者如支傾極力拄撑不急則仆外攘者如奕棊當審彼己輕舉則失苟為計既審而又極力以拄之安彊之效自可坐致雖然能戰而後可以能守苟徒曰守之可以無虞也彼長驅而來與吾對壘擁兵直前其能閉關以自保乎抑鋒鏑不容於不交乎是則攻戰之具尤所當講今雖未為開拓之謀然豈終忘規恢之計生聚教訓可以成報復之功內修政事可以收外攘之效根本苟彊皇威益振天道好還寧無可乘之機苐今未可為耳今主議于中者既有定論而宣力于外者當為逺謀羊祐在襄陽務修德信使命常通刈穀為糧則輸絹以償欲進詭計則却而不納二境之間歡然交和疑若安於苟且而無逺略矣孰知夫規恢之謀已寓於此而混一之功不旋踵而成今之任責者當以是為心毋貪小勝以窮追毋校小嫌而起釁飬威持重待時而動復文武之境土當侔德於宣王矣惟陛下與大臣亟圖之嘉定元年大學博士真德秀上殿奏劄曰臣竊惟權臣用事妄開兵端南北生靈均被其毒陛下為之旰食焦勞者二年于兹矣天啓睿謀迄殄元惡尋盟繼好休息有期豈非天下之福哉而臣區區愚慮竊謂為國者當示人以難犯之意不可示人以易窺之形昔春秋時晉師入齊齊使國佐求盟於晉其勢亟矣一聞齊之封內盡東其畝之言雖僨軍之餘不肯苟從以紓一旦之禍蓋敵國之相與有以折其謀則為和也易有以唘其嫚則為和也難況反覆無常變詐百出又非可以中國常理待之乎側聞日者小行人之遣也敵人欲多嵗幣之數而吾亦曰可增敵人欲得姦臣之首而吾亦曰可與至於往來之稱謂犒軍之金帛根括歸眀流徙之民承命唯謹曽亡留難竊揆謀國之意不過以樂天保民為心幸和好之亟就耳獨不思敵人得以窺吾之情而滋嫚我之意乎雖然此既往之咎矣所以圖制方來者猶可謹其初也蓋古者敵國通和有養其事力以待可為之機者越之事吳是也有聽命於敵以圖苟安之計者六國之事秦是也今日尋盟於敵臣不知姑欲養其事力而待可為之機乎抑將聽命於敵而圖苟安之計乎勾踐之行成於吳也蓋忍恥以志仇讎之復而非倚和以自固也是以三十年間蚤朝晏罷卧薪嘗膽未嘗一日忘㑹稽之恥故雖詘辱一時迄能伸其志於異日若夫六國則不然其求和於秦也蓋委國以為仇讎之役而非用權以蘄濟也故朝割地以賂秦則暮棄謀臣之言夕遣質以入秦則旦絶鄰國之援撤防弛備冀秦之矜已而不加兵奚異委肉虎狼而幸其弗食也夫是以六國之地卒歸於秦豈秦之力能亡六國哉六國實自亡耳今日而知是則當以越之事為法而以六國之事為戒可也抑臣聞之善謀國者不觀敵情之動靜而觀吾政之修否元祐初用司馬光為相盡更王安石敝法契丹聞之以勿生事戒其邊吏今日號為更化矣而敵之桀驁亡異前日毋亦我之所為尚有可思者乎故臣妄論今日之事必吾無以取輕於敵而後和可成必有以深服其心而後和可固臣觀昨者竄殛柄臣之始不惟四方萬里咸服英斷而敵國亦竦然易視矣誠使剛健不息之誠愈篤於初振厲有為之志益加於舊則國勢日彊敵自退聽奈何朝綱方整而紛紊之漸已萌政事方修而懈弛之形已露正人雖進志未獲伸言路雖開忠罕見用我之更化者僅如此其能使敵情之畏服哉況夫彼之待我者方驕我之恃和者太重一介行李曽未越境而動色相慶若無事然臣恐盟好既成志氣愈惰晏安鴆毒之禍作浮淫冗蠧之事興彼方資吾嵗賂以厚其力乘吾不備以長其謀加之數年聲勢浸盛然後發難從之請挑必爭之端而吾倣徨四顧將無以應之此長慮逺識之士所為寒心者也臣願陛下以通和講好為權宜以修德行政為實務君臣之間朝夕警戒于敵情之難保禍至之無日搜討軍實申飭邊防凛然若敵師之將至如是而國勢不張外虞不弭者未之有也臣一介微賤乍對清光輒竭毣毣之思惟陛下財擇六年德秀為起居舍人直前奏劄曰臣竊惟備邊制敵有國之大事也今之邊面控連要害者近則兩淮荆襄逺則蜀之關外然以地形考之蜀居上流實東南之首荆襄其吭而兩淮其左臂也比嵗以來經理淮襄廟堂蓋有成算矣臣敢以蜀事言之夫蜀之與秦壤地相屬長安百二之勢天下有變則豪傑之所必爭今敵為䝉古所乘悉力以備燕晉而秦之地必虛萬一靈夏伺隙而長驅盜賊乘時而竊據邠岐汧隴遂為戰場虎鬭于垣而主人得安枕以卧者亡是理也今漢中重臣與益梓瀘遂諸鎮人物相望足副倚毗然蓄材待用寧過於有餘毋失之不足臣觀寶元慶厯間西事既興一時名臣往往多在邊境陜西闕帥則就命韓琦延安闕帥則就用仲淹無事機蹉跌之虞有威信相孚之素者蓋預蓄人材之效也今自東南持麾節以往者選用不為不精以臣觀之平居暇日拊摩民瘼區處吏事政自有餘而威名智略可當一靣者殆未之見臣愚謂宜倣先朝西鄙故事凡蜀之名藩要郡若總餉𣙜牧之官轉􅒩刑獄之任非精眀魁壘可以折衝禦侮者不在兹選其罷軟弗勝任者易之儲材於閒暇之餘而拔用於倉猝之頃備邊制敵莫此為急臣妄言有罪惟陛下赦之貼黃臣竊見九月丁巳流星晝隕占者以為覆軍流血之象分雖在晉野實在益故臣妄謂蜀之邊備尤宜致謹而儲蓄人材尤邊政之大者伏乞睿照臣恭聞淳熙間有太府丞勾昌泰者獻言蜀中制置使一員任六十州安危或疾病遷改自朝廷除授動經年嵗始至一去一來之時至為利害之機願於從臣中常儲一二人于蜀令作安撫一旦制置有闕便可就除實思患豫圖之䇿孝宗皇帝諭輔臣曰此正在卿等留意今後欲除蜀帥須是選擇可備制置使用者庶幾臨時不至闕事大哉聖謨誠可為萬世法惟陛下財察七年德秀使還上殿劄子曰臣等非材䝉陛下擢將使指修聘鄰邦適當朔庭雲擾之秋不克以成禮歸奏然久駐淮壖日聆邊報或云䝉古之衆已陷燕山或謂西夏之兵方窺秦隴或稱兵陸梁有鐡槍之號或志復父仇興縞素之師雖傳聞之事固有異同而危亡之形大扺可見臣等夙夜以思有當勤聖慮者敢因賜對而輒陳其愚臣聞中國有道異域雖盛不足憂內治未修異域雖微有足畏蓋昔者劉石之紛擾與單于爭立之事同而拓拔氏之東西與胸奴之分南北亦無以異然宣帝因呼韓之朝而益彊其國劉石苻姚之變晉迄不能以成寸功光武因南單于之歸拓地千里而侯景內附適以兆蕭梁之釁所遇略同而成敗以異者豈固有幸不幸哉蓋宣光之政修而晉梁之政失也今敵運衰微雖吾宗社之慶然臣等審觀事勢竊以為深可慮者三亟當為者二何謂深可慮者三曰對境之流民僅存之遺孽驟興之狂冦是也臣等近抵山陽聞淮北之民扶攜老稚結筏欲渡者日以百數雖邊臣謹守疆埸拒卻使還然蝟集而南者其勢未已蓋其仍嵗洊饑重以師旅遺黎何辜死者什七苟非越境亡以偷生故其謀遂出諸此今將容而納之固未易處若一切拒絶彼或萌等死之心設有不幸隨之以潰散之兵繼之以羣行之盜其將何以待之此其可慮者一臣等又聞舊酋之子改元僭號於山東比者攻圍海州距吾並邊才數十舍倘其粗能自立遂成瓜裂之形因而撫柔尚易為力萬一外裔得志必欲滅完顔之宗干戈相尋威力弗敵紛紜奔突迫吾邊垂又將何以禦之此其可慮者二昔宣和中女真始大耶律浸微識者豫知必貽中國之患蓋雖均為外裔然習安者易制崛起者難馴理固然也今女真土傾魚爛勢必不支萬一䝉古遂能奄有其土疆方張之勢未易屈服卻之則怨接之則驕重以亡國舊臣各圖自售指嗾之計何所不為設或肆溪壑之求要吾以待女真之禮從之則不可以立國拒之則必至于交兵宣和舊事可為龜鑑此其可慮者三何謂亟當為者二曰內固邊防外精間諜是也書曰惟事事乃其有備有備無患傳亦有云無恃其不來恃吾有以待之今邊庭探報未必盡然臣等所陳亦似過慮然未至豫言固嘗為虛若其已至又無所及況積薪欲然之勢日長不已者乎而封疆扞圉之臣往往內實驚危外示閒暇其說曰吾將以鎮安物情也獨不知人心有所恃則雖不鎮而自安若其未然則雖無故而自擾與其避張皇之小害孰若圖倉猝之深憂夫自古立國東南未有不以兩淮荆襄為根本紹興中李綱建議六朝之能保守江左者以彊兵重鎮盡在淮襄雖曹魏之雄苻石拓拔之衆卒不能一窺江表後唐李氏有淮南則可都金陵其後失之遂以削弱今朝廷欲為守備則當于兩淮荆襄置三大帥屯重兵以臨之分遣偏師進守支郡小築城壘如開新邊遇有賊馬則大帥遣兵應援稍能自守商旅必通乃可召人來歸漸次葺理假以嵗月則藩籬成矣綱之言政今日所宜用也臣等間者自揚而之楚自楚之盱眙經行所及凡數百里平疇沃壤極目無際重湖陂澤渺漭相連而田野之民又皆堅悍彊忍無吳兒驕脆之氣逮久駐邊城訪問益審凡兩淮形勢之利如在目中然後喟然嘆曰此天賜吾國以為大江之屏障使彊兵足食為進取之資也而士大夫習尚因循視其荒殘漫弗之惜田疇不闢溝洫不治有險要不知所以控扼有丁壯不知所以練習有豪傑武勇不知所以牢籠收拾之方一旦驚急但思委而去之以長江為足恃是猶咽喉見扼于人而欲與之角藩墻扄鐍為盜所有而欲居堂奧之安亡是理也且往者極邊之地城壘不建戍守不增徒以區區要盟之故今事變一新政吾更張規模之日臣等謂宜及今亟行經理選儒臣之有威重知兵略者二三人俾之督護諸將其掊克自封巽愞不立者易之沿江列屯亡慮十數萬徑騎精卒皆當移駐並邊而增募舟師以扼江靣凡城池樓櫓之未固若要害之未築者就遣屯兵併力繕治使沿邊數千里脉絡相聫有貫珠之勢首尾相應有率然之形兵力既雄民志自固然後大修墾田之政倣漢搜粟故事顓為一司以領之力本務農如周秦之用西土數年之後積貯充實邊民父子爭欲自保因其什伍勒以軍法不待糧餉皆為精兵金湯之勢成盤石之基立則退足以守進足以攻此亟當為者一也夫間諜不眀最兵家之深忌今女真與䝉古相持蓋非一日戰鬭離合不知其幾而吾邊臣迄未有得其要領者至如烏凌噶忠之歸赫舍哩執中之死並邊諸郡言人人殊即此推之他可槩見臣等比至維揚首聞敵巢摧陷之報質諸戎師亦復謂然逮次修門其說又異夫敵國存亡茲非細事風傳不一乃至於斯脫有緩急其將何及昔中興初韓世忠吳玠諸人捐金募間如用砂礫故敵人深謀祕計靡不豫知取勝之術大扺由此臣等謂宜申飭主兵之臣顓任遣間之責事之驗否特示勸懲庶幾實事必聞而聞事必實此亟當為者二也臣等區區本無竒䇿獨念將命之初違去殿陛䝉陛下溫顔賜諭以江淮之事歸日奏聞故敢罄竭愚忠期報萬一惟聖眀財察德秀為江東轉運副使奏論邊事狀曰臣至愚極陋䝉陛下選擢將漕江東朝夕之所盡心不過州縣間常事未足仰報大恩今事有關於宗社之安危國家之休戚職有常守在臣雖不當言而其義則有可言者昔歐陽修以知制誥出為河北轉運使嘗請與聞兵事仁宗許之臣雖於修無能為役然亦由詞臣出使且以轉餉為職則邊垂利害臣敢避晋越之罪畏縮不言臣竊見金人自失國南遷其勢日蹙比者䝉古與西夏并兵東出潼關深入許鄭金人危迫之狀見于僞詔所云近復傳聞敵兵攻圍都邑遊騎布滿山東雖探報之辭不無同異要其大勢以河南數州僅存之地而抗西北二國方張之師加以羣盜縱橫叛者四起土傾魚爛厥證具形括馬敷糧公私並竭交鈔數萬僅博一餐危急如此不亡何待臣謹按國史女真叛遼在政和之四年甲午嵗其滅遼也在宣和之七年乙巳嵗是冬即犯中原臣竊謂今日天下之勢無以異政宣之時陛下所以自治其國與外禦邊人者亦宜以政宣為鑒夫以皇皇巨宋八葉重光至于政宣蓋太平極盛之日使朝廷之上知守成之惟艱無難之可畏惕焉戒懼以祈天永命為心親信仁賢修舉德政則國勢屹然有泰山磐石之固雖百女真其何能為不幸燕安沉溺之餘紀綱蕩然無一足恃本根既撥枝葉從之於是女真得以逞其凶殘攻陷我都城傾覆我社禝劫遷我二聖荼毒我蒸民自開闢以來敵國之禍未有若是之酷也今將戒前車之覆永神器之安其道非他願以政宣為鑑而已臣嘗妄論政宣致禍之由其目有十夫君臣相敕維時幾安股肱不良萬事隳壞其在虞廷猶以為戒自蔡京倡豐亨豫大之說王黼開應奉享上之門專以淫侈蠱上心奢靡蠧國用土木之功窮極盛麗花石之貢毒遍東南甚至內庭曲宴出女樂以娛羣臣大臣入侍飾朱粉以供戲笑於是荒嬉無度而朝政大壞矣其失一也易曰師貞丈人吉又曰師出以律否臧凶言總師必得老成厚重之人用師必有節制訓齊之律反是則凶也自童貫髙俅迭主兵柄教閲訓練之事盡廢上下陛級之法不行潰敗者不誅而招以金帛死敵者不恤而誣以逃亡於是賞罰無章而軍政大壞矣其失二也詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅自昔未聞簡忽天變而無禍者政宣之世災異數見大星如月徐徐南行日黯無光洶洶欲動赤氣犯斗水冒都城當時羣臣恬不知警方且以怪孽為嘉祥變異為休徴此上不畏天戒其失三也大舜之聖舍己從人成湯之德從諫弗咈自昔未聞飾非遂過而不亡者政宣之際以言為諱張根論征斂之煩散官安置李綱論大水之變逺謫監征於是薦紳不敢言矣鄧肅以進詩諷諫屏出太學朱夢說以昌言宦寺竄斥偏州於是布衣不敢言矣箝結成風馴致禍敗此下不恤人言其失四也夫君子在內其卦為泰濟濟多士文王以寧政宣用事之臣專以毁忠忌賢為事凡纍朝老成之望當代鴻碩之材不以姦黨廢則以邪等斥不以曲學貶則以異論逐排沮挫揠之餘舉國無君子矣雖欲久安得乎其失五也夫開國承家小人勿用而難任人蠻夷率服政宣之世京黼繼尸宰柄貫攸濫厠樞庭其翺翔臺省布列館殿非歌頌詩書即膏粱子弟非奴事閹尹即翼附權臣更引迭援在廷皆小人矣雖欲勿危得乎其失六也記曰四方有敗必先知之此之謂民之父母政宣小人顓為䝉蔽以欺上聼劉法敗死西陲而童貫乃以捷聞方臘破東南六郡而王黼匿不以告郭藥師反形已露而邊臣掩覆於外女真剋期入冦而大臣諱晦於中上下相䝉稔成大患至敵兵濟河而朝廷猶未之覺其失七也書曰民惟邦本本固邦寧政宣小人專務聚斂以搖根本朱勔以貢奉擾浙右李彥以括田困京東蔡京改鹽鈔法而比屋歎愁王黼創免夫錢而諸路騷動人不聊生散為盜賊雖微敵國亦必有蕭牆之憂其失八也詩曰無競維人四方其訓之古者以一士寢敵謀片言折外侮政和初遣使覘國而童貫實行遼之君臣相顧竊笑已有南朝無人之譏北事既興遂付戎律以僕𨽻之才當元戎之任節制不眀諸將無所禀畏庸懦不武敵師得以馮陵未幾副之以蔡攸易之以談稹其為駑怯又益甚焉於是女真知中國之無人而異志興矣此授任非材其失九也昔子産以蕞爾之鄭﨑嶇彊國間區區一環宜無愛於晉而子産則曰大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有卒不與秦求地於趙趙欲與之虞卿曰王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙用其計而秦不能加蓋有國者不幸與彊敵為鄰當有以服其心而不當徇其欲方女真與遼國交兵雖能每戰輒克然視吾中國之尊如髙山大海未易測其雄深何敢遽有他志不幸姦臣腐夫希功寡謀唯恐無以順適其意彼方邀吾嵗幣則豫以契丹舊數而不辭邀吾燕地稅賦則豫以銀絹百萬而不靳至於索犒師則許以犒師欲貸糧則許以貸糧一事方酬而一事已生前請未塞而後請復起一切順承無敢或戾而南牧之師已侵尋於境上矣蓋蠶食并吞本無饜足徒知徇其欲而無以服其心其禍固應爾也或者惟以納張㲄結余覩為造釁之由而不知召侮取輕其漸非一雖微結納之事其能保盟約之不寒乎此處置乖宜其失十也今陛下聖德清眀萬無此失然臣獨怪一人憂勤恭儉無愧仁祖之風而羣臣盤樂怠傲乃有宣和之習東南民力耗於軍餉者十八而士卒窮悴常有不飽之嗟災異頻仍修省之實未覩言路壅塞讜直之士弗容君子非不參用而正論未嘗獲伸小人非不欲逺而讒諂猶或得志䝉蔽之風日熾聚斂之政日滋此失未除臣恐後之視今猶今視昔也雖然臣外有司也其於內事不敢盡言獨請為陛下深陳所以待敵國者臣觀䝉古之在今日無異昔者女真方興之時一旦與吾為鄰亦必祖述女真已行之故智蓋女真嘗以燕城歸我矣今獨不能還吾河南之地以觀吾之所處乎受之則享虛名而召實患不受則彼得以陵寢為詞假大義以見攻女真嘗與吾通好矣今獨不能卑詞遣使以觀吾之所答乎從之則要索亡饜豈能滿其溪壑之欲不從則彼得藉口以開釁端黠巧之情必出於此不可不豫圖所以應之也自三數年來謀國者不深惟長算而一切幸安曩者敵在幽燕吾以嵗時聘問已非獲巳彼既播越而南獨不可遷延其辭俟復燕山然後玉帛往來如故乃使大宋臣子拜仇敵於祖宗殿廷之下其誤一也嵗幣之弗遣是矣然不以還燕為詞而諉曰漕之渠乾涸使殘敵得以移文督責中原豪傑聞之寧不以寡謀見哂乎其誤二也並邊遺民皆吾赤子窮而歸我當示綏懷疆吏非人唯知拒卻固已絶中原之望甚者視為盜賊戮之焚之上流制閫之臣眀揭大榜來者即行𠞰殺西州總戎之帥殺程彥暉一家骨肉於黑谷山秦隴之人莫不切齒召鄰國之侮開邊鄙之隙結遺黎之怨逆上帝之心孰甚於此其誤三也積此三誤而吾國之威靈氣𦦨索然矣漢昭烈有言事㑹之來寧有終極夫誤於前者不可悔而應於後者猶可為所願朝廷毋再誤而已厥今庸人之論有二不曰敵未遽亡猶可倚為屏蔽則曰中原方擾未暇窺我江淮凡此皆誤國之言不可不察也敵之必亡無愚智舉知之臣不復重陳若昔永嘉之亂江左粗安者蓋以羣醜並爭莫能相一故吾江表得以偷旦夕之安及苻堅既滅慕容旋起吞晉之謀元魏已併諸國遂萌飲江之志今新敵乍張盡有河朔而楊劉羣盜又皆往往服從臣恐與五國角立之勢殊未可為江左苟安之計也或又以為安邊置所儲峙日豐以此餌敵何患不濟臣竊謂不然夫金繒遺敵雖後世偃兵息民之權宜然用之於國勢盛彊之時則足以示恩而不至於召侮景德之事是也用之於國勢委靡之時則適以召侮而不足示恩宣和之事是也儻不思自彊其國而倚賂遺以幸一日之安臣知其非䇿矣昔孫氏以區區之吳而當彊大之魏若未易為力者然其君臣相與䇿勵遂能挫曹公虎狼之敵晉氏東遷至岌岌也徒以將相有人處分得所卒能破苻秦傾國之師今國家幅員萬里貢賦雲集帶甲百萬江漢為池豈下於吳晉者而中外有司忠誠憤激者少委靡頽惰者多一聞赤白囊至則相顧失色不知所為少定則又帖然矣國家平時不愛名器爵祿以寵士大夫一旦有急未見有毅然以戮力王室自任者此臣之所以大懼也夫天下之勢猶長江大河上流決潰下流必無獨寧之理今荆淮以北數百里間干戈搶攘戎馬雜襲正如熊咆虎鬪近在藩垣之外而或者乃曰無預吾事彼其中心實不謂然姑欲架漏目前攫取名器爵祿而去至於宗社生靈之憂而使陛下獨當之耳彼羣臣為一身計可也陛下為人子孫任九廟之託奈何付安危於度外乎陛下誠欲尊國勢以弭外虞則政宣之十失必當懲近日之三誤必當戒庸人之論必當破自彊之計必當立至誠一心對越上帝廣謀兼聽曲盡下情以收天人之心以合中外之助庶天下事猶有可為者若或上下悠悠養成深患機㑹浸失事變日殊臣實不知其所終也臣自委質立朝以來區區之愚唯知有君父有社稷故常盡忠極慮不敢自為身謀今見時事憂虞如此而顧戀寸祿不為朝廷一言豈惟自負夙心抑亦有慚戴履是用齊心潔誠忘寢廢食裁成此章欲進復休至于數四懷不能已卒以上聞意者天誘臣衷欲以感悟陛下儻或萬一見於施行則臣雖擯廢田里其幸多矣貼黃臣竊見太祖太宗艱難百戰以有天下真宗仁宗兢業守成至于徽宗之世宇內承平民物熙洽不幸崇寧而後羣小得志陷害忠良遂使在廷無一君子逮政和初遼國衰微金人崛起王黼童貫之徒希功寡謀取侮敵人馴致靖康之變都城失守二聖䝉塵追前失可為隕涕臣仰惟陛下鋭精典學親御經帷凡祖宗創守之規模可為今日法者既日陳于前矣至於崇宣之事可為今日戒者願詔館閣之臣編類來上退朝之暇以時省覽庶幾姦邪誤國之狀敵人內侵之恥一一備見本末于以鑒前失而圖今得非小補也皇太子春秋鼎盛問學日新亦宜命宫僚編纂上件故實從容謀論其於令德啓發必多臣位下人微志在納忠狂僣妄言伏俟誅殛九年袁燮輪對劄子曰臣竊惟當今之務有不可一日緩者邊防是也自陛下更化以來今十年矣築城壁浚壕塹繕兵甲積芻粟習武藝申軍律未嘗一日不為備禦計也勤勤葺理至于今日宜其十全無闕物物可仗邊疆隱然有不可敵之威外域帖然無敢為冦之意其理固當然也近者竊聞垂亡之敵輒敢率其餘衆侵我疆埸掠我人民焚我邊舍偃然有輕視中國之心陛下知其所以然乎則以我之所謂邊防者未必真可恃也將帥者三軍之司命往時稍有勞績之人率以罪罷凡今所用新進為多孰為智孰為勇朝廷不得而知也孰為傑出孰為中才朝廷不得而知也四顧乏使聊復用之是謂之嘗試任嘗試之將而責以真才實能之事豈不難哉然則何以得良將曰朝廷之上改弦更轍作其怠驕苟安之氣則良將出矣敵雖微弱而交聘未已所以猶敢桀驁一旦絶之出其不意寧不震懾若猶侵犯以兵驅之觀其戰鬭而智勇傑出之才因是表見折衝禦侮不患無人此乃邊防之首務也講和誓書質諸天地邀諸神眀不如約者墜其國可謂嚴矣誰敢違之而殘敵輒敢渝盟豈不自知其非哉直欲邀我嵗幣故為此小撓爾我從而與之是畏其威也是示之弱也堂堂大朝而見脅於衰殘之敵國惟其所欲略不敢較兹其為恥辱也大矣使彼猶在燕山其國尚疆未嘗棄好雖與之可也今失其窟穴不絶如縷又已渝盟其可與乎稽諸公論萬口一辭謂不當與惟淺謀寡識者或以為當與爾一或與之我氣先索何以立國方今外國䝉古最彊及其他豪傑崛起於北地者甚衆見吾怯弱如此將有吞噬之心豈不尤為可慮乎昔紹興中北敵彊盛而徽皇梓宫未歸太母隔在沙漠故髙宗不得不與之和所給嵗幣減於全盛者半而當時忠臣義士猶以死爭之及金人叛盟親提重兵大入淮甸而完顔雍已入於北方亮尋隕于非命而雍盡反其所為其國再安欲尋舊好故孝宗減幣而許其和今之殘敵與其彊盛之時固萬萬不侔也而我之與幣增於隆興一如紹興之數毋乃太不稱乎毋乃太卑辱乎借冦兵資盜糧古人之所深戒也彼既渝盟是為寇盜乃以重幣資之衰弱之餘一旦得此於以激厲其衆又豈中國之利也哉善立大事者能反而用之不以是資敵而反以制敵夫今之所患者財用未充也然嵗幣之數不為不厚足以募勇敢足以旌戰功自今以往邊防於此取辦國威由此復伸此天所以佑我國家也其弱也易兼其昧也易攻摧枯拉朽不勞餘力此天所以授陛下復讎刷恥之機㑹也殘敵折而入我䝉古及夫群雄知中國有人莫不惕息此天所以啓我昌運也陛下內揆於心曉然見夫嵗幣之不可與固守而確持之則可以奉順天意矣臣聞孔子之言曰為君難何以為難也決大疑定大計措其國於泰山之安天下無敵焉所以難也勢則不彊威則不振患人之見陵重賂以求免中才常主亦能為之何待於聖君乎碩陛下審思之臣不勝惓惓十年袁燮又上劄子曰臣竊惟當今之務備邊為急要當精講而熟計之吳吕範有言同舟涉海一物不牢則俱受其病此至論也然則今之邊防其可有一事之不備乎臣職在獻納不敢緘默謹以今日六事公論以為未備者上徹淵聽臣聞古之立大事者必定其規模而乘其機㑹譬如農功日夜以思之思其始而圖其終行無越思所謂規模也始如處女敵人開户後如脫兔敵不及拒所謂機㑹也夫惟規模素定於胸中緩急先後有如王朴平邊之䇿故守不為徒守而戰不為浪戰機㑹未至則舒徐以待可為之時機㑹可乘則果決以奮有為之略大功之所由集也今之邊防亦果能若是否乎此公論以為未備者一也臣聞古之善料敵者必察其虛實而知其强弱避實擊虛避强擊弱則易為力今自間探不眀懵不知其所向不搗其虛而搗其實不攻其弱而攻其强豈惟無益必將自斃又何以決勝乎此公論所以為未備者二也臣聞古者百將一心三軍同力如心腹手足之交相為用如父子兄弟之無有間隔泰誓曰受有臣億萬惟億萬心豫有臣三千惟一心此興亡之所以殊也今人各有心異論蜂起不以國事為念而惟已私是逞甚者他人有能己則嫉之造作浮言播於朝路使有功者不能自安豈忠於事君者乎此公論以為未備者三也臣聞兵不在多以精為貴國初兵籍不過十五萬而征伐四出莫不如意惟其精也自秦檜當國隂與敵結沿邊不宿重兵故大軍屯於江上有急出戍給之生劵不為不多矣然皆習於驕惰不堪戰攻故議者以為不若令歸舊屯而以其生劵給沿邊武勇之士公家支費不增於前而守禦得人逺勝於舊有安居之樂而無出戍之勞新卒列營相望則大軍可以漸減闕額勿補以計消之誠强兵省費經久無窮之利也而不聞施行此公論之所為未備者四也臣聞善馭軍者必嚴其紀律白刃在前不敢不蹈以為退卻者必死而前進者猶可冀其或生也故惟知主將之可畏而不知敵人之可畏出師之日坐者涕沾襟卧者涕交頥一死將至所以悲爾今軍人遇敵望風而奔蓋以為前進多死而退卻可幸免也紀律之不嚴一至於此乎此公論以為未備者五也臣聞善養兵者必厚其貨財國初沿邊諸將久於其職關市之征皆得自用以招募勇士以旌賞有功以資給間諜裕然有餘未嘗匱乏中興大將所蓄之財亦不可勝計紹興之末內帑所賜犒軍緡錢多至千萬無所靳惜今日軍用不饒既無以豐犒戰士又主將朘削而軍人益貧平居憔悴無聊臨難豈能死敵此公論以為未備者六也即此六事推之其他未備者亦多矣區區殘敵敢抗天威苟不能克為千載笑伏惟陛下眀詔股肱之臣大修軍政如臣所陳六事靡不更張以實邊防以强國勢當今之急務也惟陛下亟圖之燮又上劄子曰臣聞天下之大勢有安危有存亡關乎安危猶可言也關乎存亡不可勝諱矣人孰不知存亡之分至為可畏惟辨之不早於其關乎安危也不速救之浸淫不已則存亡繫之矣豈不哀哉臣竊觀當今之務惟邊防最切而其間利害有未易言者自淮甸以迄巴蜀皆邊靣也形勢至廣不勝其備要當斟酌時宜而善處之淮甸迫近中都論者皆以為急然以臣觀之近者固不可緩逺者尤不可忽臣請先言蜀中之利害可乎蓋昔者張浚既失五路力不足以養兵乃以五路財賦均之四蜀增立名色謂之折估蜀人由是重困馴致于今資用耗竭人情既岌岌矣往嵗殘敵寇邊淮襄之間日尋干戈獨此一方互市自若遂唘戎心乘間深入殺戮不可勝計忠義之徒痛其家之碎于敵也縞素復讐義固當爾而我師追而還之敵躡其後無所逃死安得不怨讟並興慮其難制盡散之以為農則安得而不叛敵窺其意從而誘之幸以忠義自名終不甘為敵役及其未固汲汲招集其亦可也而事權不出於一諸司各行其意於是乎紀綱紛亂姦宄並作而關外四郡遂莽為盜墟此關乎安危之時也若救頭然雖危可安失今不圖噬臍何及萬一四郡失守則四蜀之心搖矣惟蜀與楚相依以立蜀人乖亂楚將若何脣亡齒寒之憂近在眼中矣淮甸其能自安乎中都寧不震乎可為寒心可為慟哭此其利害豈直安危也哉智者圖事因禍為福轉敗為功原紛擾之由求康濟之䇿推赤心置人腹中則銅馬之流莫不感悅釋賊將用其計謀則李祜之徒皆能成功不疑於物物亦誠焉古人此論可謂著眀矣淮西山東之豪所以為我盡力者誠心待之蜀之當事任者誠能效其所為開示大信堅於金石孰不樂為吾用並邊忠義聲勢相接若左右手之交相為援若兄及弟之共禦其侮智謀迭出則殘敵不能支矣此所謂因禍為福轉敗為功者也揚雄有言御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵御之為言結之以恩信間之以法度不疾而徐巧於調伏有致逺之能而無泛駕之患也苟非其人孰任兹事擯黜其庸懦不才者更用其望實夙著者號令一新精采俱變元氣既充外邪消伏挈諸擾攘之中置之安全之域豈惟蜀安天下舉安事之樞要昭然在是也惟陛下亟圖之十一年臣僚復上言慶厯間張方平嘗以為朝廷每備西北孰不知猺蠻衝突嶺外南鄰交址勢須經營唐時西備吐蕃其後安南寇邊旋致龎勛之禍國朝每憂契丹元昊而儂智髙陷雍州南僥騷動天子為之旰食豈細故哉臣等比見淮甸間版築洊興更戍日益而廣南城隍摧圮不葺戍兵逃亡殆盡春秋教閲郡無百人雖有鄉兵義丁土丁之名實不足用緩急豈能集事宜於嶺南要地增築城堡籍其民兵嵗時練習定賞罰格以示懲勸如此則號令嚴眀守禦完固民習戰鬭可息猺蠻侵掠之患措四十州民於久安之域矣詔從之袁說友論楚州屯戍臣竊謂城守以為固不若軍心以為固蓋城雖堅而固之者在人軍無二三之心則誠甚於百二山河之險也故曰衆心成城此言誠在於衆而不專在於城也臣兹奉選命護客有行往來之間道由楚州切觀本州城壁勢極雄壯蓋楚州實為揚州籓籬之衛也臣復詢之淮民與軍士等皆謂自淮而南其陸路至揚州則自盱眙由天長而來其水路則自清河口由楚州而來也然楚州尤為要害者以敵人糧道必由於楚又楚在揚之前其來則楚為之敵若以他路至揚州則楚又扼其後所以朝廷以楚為重增城設塹不敢忽也今楚之人皆謂頃年朝廷嘗以武鋒一軍八千人屯駐于楚軍人家屬悉在焉誠足為緩急死守之備自揚州增創堡寨以一時建議者遂移武鋒一軍盡屯堡寨今不過令鎮江都統司每嵗更戍于楚僅五千人耳既無老小同行又每嵗一替不為久計總司復添支食錢幾二萬緡誠恐緩急之日更戍之士各念妻兒在他郡且非久屯更練者恐不能責之死守臣等欲望聖慈以楚城為揚州腹背要害命樞廷相度或不復武鋒一軍即乞令鎮江都統司撥五千人選擇將副各同老小就來年二月合更戍日密與分屯久戍于楚庶不張皇其元來武鋒軍寨屋見今存在却預行修葺庶幾軍士老小同戍且為久計其與無家屬而更戍者事體全然不同他日緩急必可恃以固守兼亦省總司每嵗二萬餘緡之費誠非細務歷代名臣奏議卷三百三十七
