body:
  text: 歷代名臣奏議卷二百十八明楊士竒等撰赦宥東漢光武建武二十年大司馬廣平侯吳漢病篤車駕親臨問所欲言漢對曰臣愚無所知識但願陛下慎無赦而已桓帝時河南尹李膺初與廷尉馮緄大司農劉祐等同心糾罰姦幸時膺等以罪輸作司𨽻校尉應奉上疏理膺等曰昔秦人觀寶于椘昭奚恤蒞以群賢梁惠王瑋其照乘之珠齊威王答以四臣夫忠賢武將國之心膂竊見左校施刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法衆庶稱宜昔季孫行甫親逆君命逐出莒僕於舜之功二十之一今膺等投身彊禦畢力致罪陛下既不聽察而猥受譛訴遂令忠臣同愆元惡自春迄冬不䝉降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徴張敞於亡命緄前討蠻荆均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作解君子以赦過宥罪乞原膺等以備不虞書奏乃悉免其刑東晋元帝永昌元年皇孫生郭璞上疏曰有道之君未嘗不以危自持亂世之主未嘗不以安自居故存而不忘亡者三代之所以興也亡而自以為存者三季之所以廢也是以古之令主開納忠讜以弼其違標顯切直用攻其失至乃聞一善則拜見規誡則懼何者蓋不私其身處天下以至公也臣竊惟陛下符運至著勳業至大而中興之祚不隆聖敬之風未躋者殆由法令太明刑教太峻故水至清則無魚政至察則衆乖此自然之勢也臣去春啓事以囹圄充斥隂陽不和推之卦理宜因郊祀作赦以蕩滌瑕穢不然將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖其後月餘日果薄鬬去秋以來諸郡並有暴雨水皆洪潦嵗用無年適聞吳興復欲有搆妄者咎徴漸成臣甚惡之頃者以來役賦轉重獄犴日結百姓困擾甘亂者多小人愚嶮共相扇動雖勢無所至然不可不虞按洪範傳君道虧則日蝕人憤怨則水涌溢隂氣積則下伐上此微理潜應已著實於事者也假令臣遂不幸謬中必貽陛下側席之憂今皇孫載育天固靈基黔首顒顒實望惠潤又嵗涉午位金家所忌宜於此時崇恩布澤則火氣潜消災譴不生矣陛下上承天意下順物情可因皇孫之慶大赦天下然後明罰敕法以肅理官克厭天心慰塞人事兆庶幸甚禎祥必臻矣臣今所陳暫而省之㦯未允聖㫖久而尋之終亮臣誠若所啓上合願陛下勿以臣身廢臣之言臣言無隱而陛下納之適所以顯君明臣直之義耳疏奏帝納焉後魏明元帝時以郡國豪右大為民蠧乃優詔徴之民多戀本所在聚結盜賊並起守宰不能禁帝乃引白馬侯崔𤣥伯及元城侯元屈等問曰前以凶俠亂民故徴之京師而守宰失於綏撫令有逃竄今犯者已多不可悉誅朕欲大赦以紓之卿等以為何如屈對曰民逃不罪而反赦之似若有求於下不如先誅首惡赦其黨類𤣥伯曰王者治天下以安民為本何能顧小曲直也譬琴瑟不調必改而更張法度不平亦須蕩而更制夫赦雖非正道而可以權行自秦漢以來莫不相踵屈言先誅後赦會於不能兩去孰與一行便定若其赦而不改者誅之不晚帝從之後周宣帝在位德政不修數行赦宥京兆丞樂運上疏曰臣謹按周官曰國君過市則刑人赦此謂市者交利之所君子無故不逰觀焉若逰觀則施惠以恱之也尚書曰眚災肆赦此謂過誤為害罪雖大當緩赦之吕刑云五刑之疑有赦此謂赦疑從罰罰疑從免論語曰赦小過舉賢才謹尋經典未有罪無輕重溥天大赦之文逮兹末葉不師古始無益於治未可則之故管仲曰有赦者奔馬之委轡不赦者癰疽之礪石又曰惠者民之仇讐法者民之父母吳漢遺言猶云唯願無赦王符著論亦云赦者非明世之所宜豈可數施非常之惠以肆姦宄之惡乎唐髙祖時東都平大赦天下又欲責賊支黨悉流徙惡地治書侍御史孫伏伽諫曰臣聞王者無戲言書稱爾無不信朕不食言言之不可不慎也陛下制詔曰常赦不免皆原之此非直赦有罪是亦與天下更新辭也世充建德所部赦後乃欲流徙書曰殱厥渠魁脅從罔治渠魁尚免脅從何辜且跖狗吠堯吠非其主今與陛下結髮雅故往為賊臣彼豈忘陛下哉壅隔故也至疏者安得而罪之由古以來何始無君然止稱堯舜者何也直由善名難得也昔天下未平容應機制變今四方已定設法須與人共之法者陛下自作須自守之使天下百姓信而畏也自為無信欲人之信若為得哉賞罰之行無貴賤親踈惟義所在臣愚以為賊黨於赦當免者雖甚無狀宜一切加原則天下幸甚太宗貞觀中鹽澤道行軍總管岷州都督髙甑生坐違李靖節度減死徙邉時有上言者曰甑生舊秦府功臣請寬其過太宗曰甑生違李靖節度又誣告靖謀逆雖是藩邸舊勞誠不可忘然治國守法事須畫一今若赦之使開僥幸之路且國家建義太原元從及征戰有功者甚衆若甑生獲免誰不覬覦有功之人皆須犯法我所以必不赦者正為此也又謂侍臣曰天下愚人者多智人者少智者不肯為惡愚人好犯憲章凡赦宥之恩惟及不軌之輩古語云小人之幸君子之不幸一嵗再赦善人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑兹無赦又蜀先主嘗謂諸葛亮曰吾周旋陳元方鄭康成之間每見啓告理亂之道備矣曽不語赦故諸葛亮理蜀十年不赦而蜀大化梁武帝每年數赦卒至傾敗夫小仁者大仁之賊故我有天下以來絶不放赦今四海安寧禮義興行非常之恩彌不可數將恐愚人常冀僥幸惟欲犯法不能改過長孫皇后遇疾漸危篤皇太子啓后曰醫藥備盡今尊體不瘳請奏赦囚徒并度人入道冀䝉福祐后曰死生有命非人力所加若修福可延吾素非為惡若行善無效何福可求赦者國之大事佛道者上每示存異方之教耳常恐為理體之弊豈以吾一婦人而亂天下法不能依汝言也武后時突厥入趙定殺掠甚衆民多脅從於賊賊已去懼誅逃匿時狄仁傑為河北安撫大使乃上疏曰議者以為虜入寇始明人之逆順㦯迫脅㦯願從㦯受僞官㦯為招慰誠以山東之人重氣一往死不為悔比緣軍興調發煩重傷破家産剔屋賣田人不為售又官吏侵漁州縣科役督趣鞭笞情危事迫不循禮義投跡異域以圖賖死此君子所愧而小人之常民猶水也壅則為淵疏則為川通塞隨流豈有常性昔董卓之亂神器播越卓已誅禽部曲無赦故事窮變生流毒京室此由恩不溥洽失在機先今負罪之伍潛竄山澤赦之則出不赦則狂山東群盜緣兹聚結故臣以為邉鄙暫警不足憂中土不寧可為慮也夫持大國者不可以小治事廣者不可以細分人主所務弗檢常法願曲赦河北一不問罪詔可中宗時張易之誅議窮治黨與監察御史張廷圭建言曰自古革命務歸人心則以刑勝治今唐歷不移天地復主宜以仁化蕩宥且易之盛時趨附奔走半天下盡誅則已暴罰一二則法不平宜一切洗貸中宗納之德宗時中書侍郎同中書門下平章事陸贄論左降官准赦量移事狀曰右竄謫之徒皆在遐僻㦯迫於衰暮顧景思還㦯困於瘴癘翹心望徙既關霈澤許以量移企躍之情逺想可見若准所司舊例須俟州府録申盤勘檢尋動踰年嵗上稽恤宥之㫖下虧慶賴之心臣等商量恐須釐革望令所司據承貞元六年恩赦檢勘已量移未量移官及貞元六年恩後左降官等除遷改亡殁之外具名銜及貶責事由年月速報中書門下不須更待州府申請臣等據所司報到則便進擬不出嵗內冀悉霑恩未審可否謹録奏聞伏聽進止贄又上奏曰伏以國之令典先德後刑所後者法當舒遲故決罪不得馳驛行下所先者體宜疾速故赦書日以五百里為程誠以聖王之心務𢎞慶惠必回翔於行罰而企躍於舒恩不加罰於典法之外不虧恩於德令之內則受責者莫得興怨荷貸者咸思自新所謂威之斯懲宥之斯感懲以致理感以致和致理則尊致和則愛為人父母必在兼行陛下德配上𤣥澤流下土頃因郊祀普降鴻恩凡是貶責之人並許量移近處臣等任叨輔翼職在宣行尋具奏聞請便進擬聖心精一務欲均齊令待所司檢尋一時類例處分其左降官內㦯罪非可棄才有足甄亦許别狀啇量不拘常例奬用臣等據所司檢勘左降官及流人送名到者都比擬量移及别追用分為三狀前月十二日封進其流人量移狀已䝉印出行下訖餘兩狀至今未奉進止竊以赦書宣布僅欲半年若更淹遲恐乖事體又諸州刺史及臺省官等繼有事故頗多缺貟睿㫖精於選求至今常不充備以眚掩德見非古人録用棄瑕允歸聖造願廣含𢎞之美庶增誘拔之途謹奉狀陳聞伏聽進止贄又上奏曰右希顔奉宣進止舊例左降官每准恩赦量移不過三百五百里今度進擬稍似超越又多是近兵馬處及當路州縣事非穩便宜更商量伏以罰宜從輕赦宜從重所以昭仁恕之道廣德澤之恩也夫位尊者其惠不可以不重言大者其實不可以不豐位尊而惠輕則體非宜言大而實寡則人失望陛下躬行盛禮渙發德音念謫居之荒遐哀負纍之沈棄俾移近處將合新恩赦令初行室家相慶惠亦至矣言亦大矣竊料竄逐窮僻喜聞霈澤降臨固必破産以飾行裝計日而俟休命荏苒淹恤復經半年儻又所移之官還與舊任鄰近竊恐乖陛下垂愍之意虧制書行慶之恩口惠重而事實輕非所以揚鴻休而布大信也謹按承前格令左降官非元敕令長任者每至考滿即申所司量其舊資便與改叙縱㦯未有遷轉亦即任其歸還逮于開元末李林甫固權專恣凡所斥黜類多非辜慮其却回㦯復冤訴遂奏左降官考滿未别改轉者且給俸料不須即停外示優矜實欲羈係從此已後遂為恆規一經貶官便同長任回望舊里永無還期縱遇非常之恩許令移逺就近雖名改轉不越幽遐㦯自西徂東㦯從大適小時俗之語謂之橫移馴致忌尅之風積成天寶之亂展轉流弊以至于今天下咸病此法深苛而不能改從舊典者良以猜嫌之慮易惑上心將謂負譴之人悉包樂禍之意已經黜責遂欲隄防故髙論則痛嫉林甫之隂邪而密網則習行林甫之弊法憸邪為蠧乃至於斯然則左降永絶於歸還量移不離於僻逺蓋是奸臣詭計殊非國典舊章且貶黜之中情狀各異犯有輕重責有淺深固非盡是回邪皆須備慮王者之道待人以誠有責怒而無猜嫌有懲沮而無怨忌斥逺以警其不恪甄恕以勉其自新不警則浸及威刑不勉則復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進叙人知復用誰不增修何憂乎亂常何患乎蓄憾如㦯以其貶黜便謂姦凶恆處間防之中長從擯棄之例則是悔過者無由自補藴才者終不見伸凡人之情窮則思變含悽貪亂㦯起於兹雖則何患能為亦足感傷和氣謂非帝王開懷含垢之大體聖哲誘人遷善之良圖也臣等昨進擬商度非不精詳既審事宜亦尋舊例參求折衷兼務齊平大約所擬之官各移近地一道郡邑稍優於舊任官資序進於本銜並無降差亦不超越其有纍經移改已至關畿則但以大州增其常秩所冀人皆受賜施不失平上副鴻恩下塞延望才將得所殊匪為優今若裁限所移不過三五百里則有改職而疆域不離於本道遷居而風土反惡於舊州徒有徙家之勞是增移配之擾又當今郡府多有軍兵所在封疆少無館驛應合量移之例約有二百許人道路須計其逺邇之差州縣則校其髙下之等若必選非當路復不近兵則恐類例失倫署置偏併示人疑慮體人非𢎞幸希聖聰更賜裁審其擬官狀並未敢改革贄又論赦書事狀曰右隱朝奉宣聖㫖并以中書所撰赦文示臣令臣審看可否如有須改張處及事宜不盡條録奏來者臣謹如詔㫖詳省再三猶懼所見不周兼與諸學士等參考得失僉以為綱條粗舉文理亦通事多循常辭不失舊用於平昔頗亦可行施之當今則恐未稱何則履非常之危者不可以常道安解非常之紛者不可以常語諭自陛下嗣承大寶志一中區窮用甲兵竭取財賦氓庶未達於暫勞之㫖而怨咨已深昊穹不假以悔禍之期而患難繼起復以刑謫太峻禁防傷嚴上下不親情志多壅乃至變生都輦盜據宫闈九廟鞠陷於匪人六師出次於郊邑奔逼憂厄言之痛心自古禍亂所鍾罕有若此之暴今重圍雖解逋寇尚存裂土假王者四凶滔天僭帝者二豎又有顧瞻懷二叛換黨姦其流實繁不可悉數皇輿未復國柄未歸勞者未獲休功者未及賞困窮者未暇恤滯抑者未克申將欲紓多難而收羣心唯在赦令誠言而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懷昔成湯遇災禱于桑野躬自髠剔以為犧牲古人所謂割髮宜及膚翦爪宜侵體良以誠不至者物不感損不極者益不臻今兹德音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不𢎞宣暢鬱堙不可不洞開襟抱洗刷疵垢不可不蕩去瘢㾗使天下聞之廓然一變若被重昏而覩朗曜人人得其所欲則何有不從者乎應須改革事條謹具别狀同進除此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難易曰聖人感人心而天下和平夫感者誠發於心而形於事人或未喻故宣之以言言必顧心心必副事三者符合不相越踰本於至誠乃可求感事㦯未致則如勿言一虧其誠終莫之信伏惟陛下先斷厥志乃施於辭度其可行而宣之其不可者措之無茍於言以重其悔言克誠而人心必感人心既感而天下必平事何可不詳言何可不務罄輸愚懇伏聽聖裁贄又請宥趙貴先罪狀曰右欽溆奉宣聖㫖前者共卿商量趙貴先欲恕其罪朕朝來更問諸將皆云貴先順從朱泚則是逆人合依常刑不可寬捨衆人意既如此應難釋放卿宜知悉者臣愚以為貴先從逆之罪法當不容貴先陷身之由情則可恕陛下所議矜宥原其情也諸將所請誅戮據於法也據法而除君之惡者人臣之常志原情而安衆之危者人主之大權臣主之道既殊通執之方亦異言各有當體各有宜事㦯相駮而無傷此之謂也往以襄城告急詔命隴右發兵齊映率衆東行貴先即其部將于時軍至昭應適遇駕幸奉天齊映馳歸鳯翔貴先獨王營幕進無揔帥退閡亂兵遂為賊泚所招紿以同迎鑾駕泚既反狀未露貴先安得勿從已受邀留遂遭劫制身縻僞職兵𨽻凶徒雖居賊中亦不見任首末事跡簡在天心臣亦親承德音非獨聞於傳說其於情狀頗有足矜所可受責之辜唯在不能守節而死耳貴先儻能守節即是忠烈之徒固獲褒旌豈資寬捨況所議讞蓋緣獄疑罪疑惟輕實編令典脅從罔理亦載聖謨況復懷光未殱希烈猶熾遭罹誘陷其類實繁今京邑初平皇猷更始乃是汚俗觀化之日聖王布德之時所用刑章尤宜審慎一輕一重理亂攸生宥之以恩則自新者咸思歸命斷之以法則懷懼者姑務偷生衆心既偷賊勢思固不忍一朝之忿而貽纍嵗之憂茍循匹夫之談以興億衆之役為計若此夫何利之有焉曩者安史創亂染汚士吏肅宗興復纍降赦書罪止渠魁餘所不問河朔遺孽既聞德澤之𢎞被且幸脅汚之見原人人皆自怨尤各悔歸國之晚及乎三司按罪繼用嚴科未降之流復喜得計慶緒將消而再結思明已附而重攜浸長厲階至今為梗豈不以任法吏而虧權道小不忍而亂大謀者乎昔漢髙帝既定四方見諸將往往偶語謀反乃問張良曰為之奈何良曰陛下所最恨者為誰帝曰雍齒與我有舊而數窘我良曰今急封雍齒則人人自堅矣帝用良計諸將果安皆云雍齒且侯吾屬何患蓋以圖霸王者不牽於常制安反側者罔念於宿瑕今陛下有漢髙之英貴先無雍齒之釁加戮不足威暴逆矜全可以定危疑明恕而行盛德斯在何所為慮尚勞依違微臣區區上言蓋為將來張本凡非首惡皆願從寬庶使負纍之徒莫不聞風而化消姦凶誘惑之計開叛亂降附之門此其大機不可失也陛下前意固為善矣伏惟不為浮議所移憲宗元和三年帝御丹鳳樓大赦天下知樞密中使劉光竒黨庇同類奏准舊例散差中使走馬往諸道送赦書所貴疾速意欲疵瑕其類使至諸道受納財賂俟其至也自獲其半翰林學士裴垍李絳等奏曰陛下自臨御海內事推至當易去煩苛今復以赦書散差敕使專送是求方鎮貨財蓋非陛下意㫖請付度支鹽鐵急遞發遣既得疾速簡便又無求取勞擾上依絳等所奏光竒又奏曰舊例如此難便改易上曰舊例若是即須恭守若不是即須改移豈可循舊弊耶宜依裴垍李絳所奏文宗時雍管經略使董昌齡誣殺參軍衡方厚貶溆州司户俄徙峽州刺史右拾遺魏謨諫曰王者赦有罪唯故無赦比昌齡專殺不辜事跡暴章家人銜冤萬里投訴獄窮罪得特被矜貸中外以為屈法今又授刺史復使治人紊憲章乖至治不見其可有詔改洪州别駕後晉髙祖即位屢赦天下左散騎常侍張允為駮赦論以獻曰管子曰凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福漢之吳漢疾篤帝問漢所欲言漢曰惟願陛下無赦爾蓋行赦不以為恩不行赦不以為無恩罰有罪故也自古皆以水旱則降德音而宥過開狴牢而出囚冀感天心以救其灾者非也假有二人之訟者一有罪而一無罪若有罪者見捨則無罪者銜寃此乃致灾之道非救灾之術也至使小人遇天灾則皆喜而相勸以為惡曰國將赦矣必赦我以救灾如此則是赦民為惡也夫天之為道福善而禍淫若捨惡人而變灾為福則是天又喜人為惡也凡天之降灾所以警戒人主節嗜欲務勤儉恤鰥寡正刑罰而已上覽之大恱宋太宗時祖吉守郡為姦利事覺下獄案劾爰書未具郊禮將近太宗疾其貪墨遣中使諭㫖執政曰郊赦可特勿貸祖吉趙普奏曰敗官抵罪宜正刑辟然國家卜郊肆類對越天地告于神明奈何以吉而隳陛下赦令哉太宗善其言乃止太宗嘗因郊禮議赦有秦再思者上書願勿赦引諸葛亮佐劉備數十年不赦事帝頗疑之時趙普對曰凡郊祀肆眚聖朝彛典其仁如天若劉備區區一方臣所不取上善之遂定赦初太祖將祀南郊詔兩京諸道自十月後犯強竊盜不得預郊祀之赦天聖五年馬亮上言朝廷雖有詔而法官斷獄乃言終是㑹赦多所寬貸惠姦宄失詔㫖遂詔已下約束而犯劫盜及官典受贓悉論如律真宗時右正言夏竦上奏曰臣聞仲尼曰善人為邦百年可以勝殘去殺傳曰為溫慈惠和以效天之生育長飬臣以為邉無兵革之患官無貪暴之吏國無率斂之制民無寇盜之憂則元元受好生之賜萬物遂長育之性皆非謂肆赦之義也蓋赦者偏枯之物權時之制君子所懼小人所恱夷吾嫉其大害孔明譏其小惠故無赦之國其刑必平居上者攸宜矜慎皇家解五代之苛暴復八世之典憲撥亂之始宜推解網之惠守成之朝難縱委轡之權夫赦不可以逆知逆知則姦作姦不可以數惠數惠則政煩方今郊祀之日必覃渙汗之恩豪猾瞻望而造姦吏胥因緣而㺯法雖預示禁章不令原免及廣覃慶澤誰復舉行願陛下崇先王去殺之道塞叔世屈法之門令恩不預彰罪無茍免霽霜威流惠澤若以廢之不可必也用之有方書曰眚災肆赦易曰赦過宥罪或當陽氣發生之始薰風亭育之際順雷雨之象布蓼蕭之恩必也赦除悮失寬宥故犯庶幾懲戒有差免使重輕一致肆眚之文事宜從簡若蠲放理督之物升進官資之屬各詔有司頒下其事何必縷陳條例動盈數幅使舞文之吏得以因緣載筆之官難為紀述從其簡易足正經綸仁宗景祐元年二月侍御史龐籍乞郊禋更不行赦疏曰臣竊見南郊禮畢行赦且禮行於郊而勸賞賜赦者古之人無有也三王之世嵗親祀昊天上帝於圜丘又祀感生帝於泰壇漢朝有甘泉五畤之祭綿代而降郊祀不輟至於賞赦皆未之聞也有唐兵興以來事天之祀嵗㦯廢之迄于五代三年之行還必大賞所以勞衛兵也必大赦所以蕩亂獄也然則所賞既大不可以嵗舉故必三載而躬祀也聖朝承五代之弊興千齡之統應變以制事酌中而立治逺遺前古之法近擇後王之迹是以間嵗報本就陽位而展禮一朝錫福御端闈而行赦慶賞二柄行慶之道也謂夫法駕順動六師景從雖無大勞而必隆賞所以勉軍伍而衛社稷也雖至愚以謂賞者國家之大典可以仍舊謂夫狴牢悉啓桎梏並空雖皆大罪而必盡赦所以滌衆故而使自新也雖至愚以為赦者政教之大患不可以常用何以明之且有罪者宥之未必自新也被苦者抑之未必無怨也不能自新將復為惡不能無怨將悔為善一赦而使民悔善復惡故以為政教之大患也所謂常赦者除十惡鬬殺劫殺謀殺並為已殺人者及放火官典犯正枉法贓至死不赦外其餘罪咸赦除之設有鬬毆者折肋墮胎折跌人支體及瞎其一目即損二事已上及因舊患令至篤疾以威力取財雖不傷人是皆凶險之大楚毒之極置之常刑則可以舒平民之憤挫惡人之鋭乃復被其大恩出為無罪誠不足以增光盛德適足以塞和氣而已況復將有事於南郊之嵗必告布天下民以是知國將郊禋郊必宥罪乃先其時節用肆其凶暴雖約束之預降終瑕釁之悉蕩宣父有言民可使由之不可使知之今使之知所以為幸陛下誠能布發睿㫖昭示天下今後郊禋之日除賞賜之外更不行赦使無敢為虐則善懦者懷惠凶頑者知禁矣慶歷二年館閣校勘蔡襄上疏曰臣伏覩比年以來盛夏之月陛下親慮京師繫囚令天下負罪者減降便從輕典此蓋陛下嗟憫元元重罹禁網冒炎暑之苦而處狴牢之下天衷惻然下寬大之詔實羣生之厚幸也臣愚無智慮不能識天地無垠之施而竊有惑焉臣聞古先帝王躬慮獄囚皆以決訴冤滯非特專宥過戾也迫隆冬緣亢旱則或行之非一定而不易之制也向者國家行之比三年矣編户之民習蹈前事咸知指時月輕觸憲度豈非屢行之乃滋而為弊夫法者天下大公之本也故罪有大小法有輕重今所蒞者大罪而所處者輕法以非其罪邪雖輕法不得施安在降其等乎誠當其罪邪重法尚不足以禁顧輕之何以革小人之心而驅之嚮善哉國家每郊禮必大赦貸民之罪固不鮮矣又仍嵗有踈決減降之制臣謂貧弱者多負寃而富強者多䝉宥為惠甚小而其蠧甚大非有補於治體也伏望陛下參前古之制拯當今之弊罷減降之詔而責天下州郡吏審辨獄情而毋多久繫也臣職賤而言近不勝隕越之至嘉祐四年知制誥劉敞上奏曰臣伏見今月二十八日疏決在京繫囚雖恩出一時然在外群情皆云聖意以皇女生故施此慶澤恐非王者之令典也去年閏月已曽減降尚未半年復行此恩傳稱民之多幸則於國不幸一嵗再赦好人喑啞前世明君賢臣論此詳矣雖成事不說臣願朝廷慎之六年起居舍人同知諌院司馬光論赦及踈決狀曰臣竊以赦者害多而利少非國家之善政也虞書曰眚災肆赦怙終賊刑謂過誤有害則赦之恃惡自終則殺之非不擇罪之有無并赦之也漢大司馬吳漢病篤光武親臨問所欲言對曰惟願陛下慎無赦而已王符亦曰今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣蜀人稱諸葛亮之賢亦曰軍旅屢興而赦不妄下然則古之明君賢臣未嘗以數赦為美也國家承順天心子愛百姓發號出令必先至仁然數赦之弊猶未能去又古之赦者其出無常嚴謹周密不可前知姦民猶抵冒以待之況今國家三年一郊未嘗無赦每嵗盛夏皆有踈決猾吏貪縱大為姦利悍民暴橫侵侮善良百千之中敗無一二幸而發露率皆亡匿不過周嵗必遇赦降則晏然自出復為平人往往指望謂之熱敕使願慤之民憤邑惴恐凶狡之羣志滿氣揚豈為民父母勸善沮惡之意哉且踈決之名本以盛暑之際恐囹圄之中有滯積冤結有司不為申理使無所告訴故天子臨軒親加慮問平其枉直無辜則赦有罪則誅使久繫之人一朝而決故能消釋沴氣迎致太和非謂不問是非一切縱之也又祖宗之時每嵗不過一次踈決死罪以下皆遞降一等近年以來㦯至再三自徒以下一切赦之今嵗五月以前踈決之令已再行矣此所以使百職隳慢姦邪恣睢者也今縱未䏸盡革前弊伏望陛下特降指揮下中書今後每嵗踈決不過一次㦯早㦯晚使外人不可豫期其徒罪仍依舊降從杖㦯遇親祀南郊之嵗更不踈決永為定制庶幾為惡之人不敢指以自寬有所戒懼七年光又上論赦劄子曰臣伏見國家每下赦書輒云敢以赦前事言者以其罪罪之誠欲恩澤下究而號令必信也比見臣僚多以私意偏見奏赦前事乞不原赦㦯更特行編配重於不經赦之人朝廷皆從其請若其人情理巨蠧必不可赦者則國家當於約束敕及赦文內明白言之若所坐不至甚重而特不赦是恩澤有所不均而同死罪猶赦之而微罪不赦是則罪之輕重不繫於人主不刋之法令而決於人臣一時之私意也況使經赦之人仍就編配得罪重於不經赦者尤無謂也夫赦者誠非致治之道然朝廷若能永無赦令使有罪者必刑則人知恐懼莫敢犯矣今既數下赦令而使大罪得免小罪被刑經赦者其罰重不經赦者其罰輕臧否糾紛使百姓何所取信哉臣愚欲望陛下自今犯罪之人情理巨蠧必不可赦者乞於豫降約束敕內明白言之其餘並從赦文處分其有指赦作過情狀顯然不因臣僚奏請陛下聖意特不原免者止宜依法施行亦不可使重於赦前之罪應昨赦前犯罪不至編配而赦後特行編配者並乞放令逐便庶使恩澤均一號令明信仁宗時范仲淹奏為赦後乞放祖宗朝缺負疏曰臣伏覩國家每一降赦萬人歡呼一兩月間錢穀司存將缺負之人依舊督責桎梏老幼籍沒家産既失大信且虧至仁䝉聖恩已差楊日嚴王質與三司詳定不係侵欺盜用該赦缺負次臣舊曽在三司定放缺負見滑州酒務有少缺雜物係專副四十餘界計八十來年登戴少數又不顯侵欺其勾當人亡殁年深只追貧弱子孫理納並不知祖父如何少缺似此刻剝傷民豈陛下愛育生靈之德臣欲特出聖意應祖宗朝天下缺負更不問侵欺盜用並與除放如省司更不舉行許三司知次第人陳告干繫人吏並坐違制決停告事人與轉一資諸處承受施行官吏並科違制之罪起居舍人知諌院范鎮上奏曰臣聞古人有言曰一嵗再赦好人喑啞此言赦之惠姦而無益於治道不可數者也屬者京師及畿輔嵗一赦而去嵗再赦今嵗三赦京師兵士又得再賜錢姑息之政無此甚者夫嵗一赦者細民謂之熱恩必其在五六月間也猾胥姦盜倚為過惡指期以待免況再赦乎況三赦乎其為惠姦虧損治道可知矣好人良善也數赦尚猶喑啞蚩蚩愚民其不狃而為姦且盜者無幾矣又今防秋備塞之人無慮五六十萬使聞京師端坐而受賜者能無動心乎不可不慮然陛下德音已下賜錢已出臣知不可救已伏乞今後罷所謂嵗一赦者以摧姦猾而使善良有所立也罷兵士之特賜錢者以均內外以防後患而使民力得寬裕於財也昔唐太子承乾為長孫皇后請肆赦以崇福祐者長孫皇后曰赦者國之大事豈以吾故亂天下法乎長孫婦人耳猶能如此陛下聖仁堯舜之資顧不為長孫后之所為乎臣竊惜之神宗熙寧元年通判利州周表臣論灾異不必肆赦疏曰臣伏見國家每因天文之異水旱之灾大則行德音於天下小則曲赦於西京臣竊惑焉夫數赦之為害古人論之詳矣蓋古者赦過宥罪行於過失遺亡而不以惠姦陷於刑辟者非盜人貨財則脅弱暴寡者也使為盜者䝉釋則其主必憤疾使衆強者被宥則寡弱必無訴故赦者良民不被其澤而惡人昌矣又況小人習性之愚不能改過自新其既出也大至於讎害其主小至於傷損平人則復穴坯踰垣揭篋探囊故朝脫桎梏夕復殺人朝出囹圄夕復為盜此非一日也國家何姑息於此而赦之乎昔成湯之時其旱可謂久矣湯以六事自責而已未嘗聞赦也髙宗有飛雉之鳴可謂異矣祖已訓之以正厥事而已未嘗聞赦也周宣王之時其旱亦可謂久矣詩美其側身修行而已未嘗聞赦也夫遇灾應變得如成湯髙宗宣王不亦可乎而必赦姦宄以為惠不亦異乎竊原國家之意豈非謂刑罰獄訟或有寃濫故赦之以致和氣茍得其人則自無寃濫矣況近年以來省法弛禁人持近厚之心刑罰清而獄訟理乃使凶姦之人槩䝉釋宥恐非國之福也臣願朝廷或遇灾異求古明王所以應天之道或修法度政事之未備者㦯求惠民濟衆之未至者㦯舉擢有道德才行而隱晦於下位者㦯出宫嬪之間執事嵗深與無職掌掃灑而幽閉者臣聞太祖皇帝躬履儉約嬪御不滿三百猶以為多嘗因霖雨又出數十人此近事之驗也凡此皆先王舊典或祖宗故事惟陛下博求行之以應變而赦不妄下庶乎使寇賊姦宄無不息矣七年三月不雨帝以旱欲降赦時已兩赦王安石奏曰湯旱以六事自責曰政不節與若一赦三赦是政不節矣非所以弭灾也上乃止元豐三年大尉文彥博上論赦事疏曰臣伏覩陛下躬行大享之禮前期潔齊於路寢朝謁於靈宫孝享於太廟乃格明堂以嚴宗祀祀禮之重莫重於此既而御端闈孚大號霈惠澤於天下號令之重亦莫重於此然號令之出在於必行不惟其反謹詳辛巳赦文釋係縲貸逋負比常赦至寬自殺人已死及監主自盜官吏枉法外罪無輕重悉除而近嵗以來中外臣僚多不詳罪犯與情理之輕重皆乞遇赦不原朝廷或從其奏臣恐輕重之間有所未安且臣下迎格赦令則禮為不恭朝廷遂從其請則令有不信臣乞今後凡有罪奏乞不赦原者並送刑部候具獄上一繫朝廷臨時特㫖神宗時知諫院司馬光上言曰按察之官以赦前事興起獄訟禁之誠為大善至於言事之官事體稍異何則御史之職本以繩按百僚糾擲隱伏姦邪之狀固非一日所為國家素尚寬仁數下赦令㦯一嵗之間至于再三若赦前之事皆不得言則其可言者無幾矣萬一有姦邪之臣朝廷不知誤加進用御史欲言則違今日之詔若其不言則陛下何從知之臣恐因此言者得以藉口偷安姦邪得以放心不懼此乃人臣之至幸非國家之長利也請追改前詔刋去言事兩字光論至再帝諭以言者好以赦前事誣人光對曰若言之得實誠所欲聞若其不實當罪言者帝命光送詔於中書知諫院陳襄乞原免張堯夫等狀曰臣伏見轉運司差官置院取勘本州宛丘縣令張堯夫司法參軍周琳為檢斷潁州萬夀縣令劉獻臣等明知手分張育等多納人户青苖頭子錢四十四貫有零偷盜入已及事發旋搬所盜錢入縣其時劉獻臣等却容庇本人許令陳首虗作誤納錢數在庫從杖罪就縣斷遣係提刑司巡歷到縣㸃檢發覺差官覆勘出上件情罪牒請張堯夫録問周琳檢法將劉獻臣等作故出張育等盜錢徒二年全罪以官吏分首從從私罪定斷尋䝉大理寺等處駮定只合用公坐相承四等減斷其張堯夫周琳却有檢斷不當罪名准敕下轉運司取勘雖兩經德音及遇郊禋大赦其推勘院為見前來德音後准朝旨取勘以此不敢引赦恩釋放依前圎結公案録奏檢准熙寧編敕諸官貟將校犯罪自首或㑹恩合原除私罪徒及贓罪並結案聞奏餘更不結案其張堯夫周琳所犯只得公罪杖不合結案事理分明臣昨曽知本州備知逐官蒞職公動州縣所賴今再叨朝寄益見其職事風蹟可觀歷任以來各無公私過犯內張堯夫是故禮部尚書張詠曽孫到邑三年臨事精敏威惠兼著奉行新法夙夜匪懈僧道舉人等纍次經轉運司陳狀稱本官婚田鬬訟給納青苖並無留滯催驅青苖稅物不施刑責各依限了足備見愛民之甚乞留再任已具奏陳提刑司曽申中書乞免替移通判比部貟外郎雍標亦具申奏乞依敕條原放兼入仕已來有韓絳吳充王拱辰滕甫劉庠陳薦薛向等一十三人保舉充縣令京職官任使得替合該磨勘惜其名臣之後能自立身勤政如此誠可奬激及周琳除本職外州司多委他局勾當並皆濟集強幹可稱竊詳萬夀縣令佐元犯本為不覺察人吏多納青苖錢數有礙新法刑名深重避見申解上州暴揚已過以此商量許令陳首作悮納錢數只就本縣斷放雖然公事其間雜有私情顯是刑名疑慮其張堯夫等意在推明新法嚴誡吏人取受以致失錯檢斷别無枉曲今依條減外亦只有公罪杖纍逢恩宥於法自合全原不當圎結公案竊慮將來奏案朝廷以前來德音曽降敕命取勘特有移改隔礙磨勘指揮原其本情誠足矜憫欲乞聖慈檢㑹提刑轉運司及本州通判雍標等奏狀及申中書狀特賜詳酌與依赦敕原放不作遺闕庶使公勤盡心之吏知所勸激謹具狀奏聞伏候敕㫖彭汝礪上奏曰禮之有刑非以民為不足教也所以救禮之失也刑之有赦有宥有贖非以姦為可容也所以待刑之所不及也故周公之法非獨老幼蠢愚者有赦也而不識者亦有宥焉非獨墨劓之疑有赦也而大辟者亦有贖焉以此知先王之所以愛人厚矣後世無先王之教育而有先王之刑有先王之刑而無先王之赦是所以愛人者少而所以傷人者有餘也此豈可忽哉律大辟刑名疑慮許奏請然有司畏於駮問見坐而移易獄辭牽合法令以刑之則疑者未必釋也杖罪情理可矜許贖然有司用法㦯出於喜怒而無告者未必有而無故未必刑也大辟極矣而㦯有減則徒役者何獨不幸耶杖罪至輕矣而亦有贖則流配者何獨不恤耶舜典曰罪疑惟輕又曰宥過無大刑故無小則赦宥非有輕重之論也臣欲乞應以過失犯刑應刑名疑慮皆聽贖則請於逐路職司而已其應赦而不請應決而私用贖許民得自言而使職司督察之如此則民無幸不幸者矣先王仁義之意其㦯在是歟哲宗元祐七年九月侍講學士范祖禹乞除賊盜重法狀曰臣於去年十二月轉對奏事乞除賊盜重法未䝉施行臣聞王者之德如天無不覆地無不載四海之內皆赤子也無有逺邇當視之如一今重法之地獨為匪民一人犯罪連及妻孥沒其家産便同反逆先王制刑必使民得以自新不聞别異州域偏行峻令恐非聖世所宜為也陛下將郊見天地御樓肆赦若於赦文悉除此法一切蕩滌與之更始足以感格人心召致和氣則帝舜好生之德大禹泣罪之仁成湯解網之恩復見於今矣恭惟祖宗無不哀矜庶獄刑罰從寬逺過前代實有隂德上當天心是以承平百年福祚無窮唯自嘉祐七年初立窩藏重法至熙寧中中書檢正官奏請遂為著令皆因有司建議非仁宗神宗本意此乃權時之制不可久行臣前奏論之已詳今因初郊宜以為仁政之始聖人順動雲行雨施刑清民服此其時也伏望聖慈斷而不疑特降睿旨於將來赦書行下使百姓曉然知二聖天地涵養無私之德不獨視此諸郡如夷貊之人臣將見民之戴恩淪於骨髓則勝殘去殺庶可望矣謹録奏聞元祐中上清儲祥宫成將肆赦樞密直學士王巖叟曰昔天禧中祥源成治平中醴泉成皆未嘗赦古人有垂死諫君無赦者此可見赦無益於聖治也徽宗時翰林學士葉夢得上奏曰臣近因申明昊天上帝皇地祗冊文尋䝉聖㫖别撰已為祈辭今來合降赦書謂宜更行推廣歷叙天下艱危之狀深自貶損明示四方使無逺近皆知陛下為民請命以邀福於上下神祗之意昔漢光武初興第五倫每讀詔書常嘆息曰此聖主也一見決矣唐德宗以朱泚之亂巡幸奉天陸贄在翰林每降詔令武夫悍卒無不感泣李抱真自山東入朝言曰此時臣知天下不足平蓋上天不可矯誣人情易以誠感惟不諱禍難而示以惻怛則雖幽逺與愚賤皆可以動文辭播告不為無補伏望聖慈詳酌如允所請將赦書乞降付本院依此施行髙宗建炎元年尚書右僕射李綱議赦令疏曰臣伏讀陛下登寶位赦書竊怪與祖宗登極之赦恩數不同及得張邦昌僭位僞赦考之乃知登寶位赦書一切比附以行也臣所致疑者有三祖宗登極惟赦雜犯死罪以下至於惡逆則不赦蓋惡逆者天地之所不容使其罪亦得以幸免則人倫廢而天理絶矣邦昌嘗位宰輔依附金人易姓建號身為惡逆之魁故其僞赦不循典憲而首為亂階今陛下纘承大統以為神民萬物主豈可不法祖宗而赦惡逆哉此臣之所疑者一也祖宗登極自京官以上有轉官恩數而選人則否豈非以其貟多而太濫故耶邦昌僭竊欲以私恩收天下之士心故其僞赦雖選人亦有循資之文今陛下嗣位於艱難多事之時正宜吝惜名器示天下以大公至正之道豈可不法祖宗而行濫賞哉此臣之所疑者二也祖宗登極於有罪犯安置編管羈管等人次第推恩㦯量移㦯自便或叙用或復官以其罪之輕重為差故恩施而威立邦昌僞赦一切復官而有職名者又皆復職惟以姑息更無典憲今陛下出政於國勢削弱之際正宜分别是非行核實之政豈可不法祖宗而務姑息哉此臣之所疑者三也是三者豈朝廷以今日事勢為正當如此耶將以邦昌僞赦寬大而不比附以行則失天下之心耶抑邦昌與聞國事欲以此蓋其惡耶臣愚竊以為過矣宜降詔改從祖宗之制惡逆不赦選人不循資安置編羈管人令刑部檢具元犯以聞等第施行則國政立而人心服矣春秋大正始今日所當正者莫先於此伏望聖慈斷而行之以公天下為度而勿以反汗為嫌天下幸甚髙宗時皇子生故事當肆赦綱為尚書右僕射又上奏曰陛下登極曠蕩之恩獨遺河北河東而不及勤王之師天下觖望夫兩路為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心勤王之師在道路半年擐甲荷戈冒犯霜露雖未效用亦已勞矣加以疾病死亡恩恤不及後有急難何以使人乎願因今赦廣示德意上嘉納於是兩路知天子德意人情翕然知洪州趙元鎮乞曲赦䖍寇疏曰臣訪聞䖍州自從衛軍民交變以來凡十縣之間失業之民率聚為寇雖聖恩寬厚貸其脅從亦既纍年而猶家藏兵器未嘗輸官州縣既不能止絶又其聽訟理獄往往許以追證舊事閭里騷然各懷反側則是陛下已赦之罪官吏猶得治之使德澤阻於布宣人情積于忿怨一旦姦心不能自懲則投兵剚刃勢有必然者因而聚衆阻險無由自新昨遣嶽飛再已平定而前日怨仇之訟紛紛猶未已也臣區區愚見欲望聖慈依昨來建州平范汝為體例特降曲赦或止降詔書貸其往咎及應干優恤等事並檢舉施行如此則人獲安業盜賊潜消矣中書舍人洪遵上奏曰臣伏見天下惡少平時飲博椎埋剽竊盜販睚眦殺人肆為不逞㦯竄聚山谷㦯行劫江湖無所不至固嘗儲其什一以俟緩急之用一旦抵罪則盡出所藏行賕獄吏以覬幸免而免之之術其說有四曰案問曰無證左曰非故殺曰尸不驗往往奏裁例從輕比止於鞭撲而宥以逺惡然其逺者不過三千里惡者不過嶺南凶徒惡黨類多伏匿於窮山敻野之間為之影援部送軍兵㦯取其金帛㦯墮其酒炙㦯窘於黨與㦯反羅殺害行不半途則已逸去政使得至配所才及年嵗則左賂右買規脫尺籍否則逋逃亡命覆出為惡延禍良民不可縷數夫被罪之人可以驅駕自古以然春秋之時越勾踐使罪人三行屬劒於頸以取檇李之勝秦漢以來東征西伐赦弛刑官徒發天下亡命毆之為兵載在方策昭然可考臣愚欲望聖慈令有司看詳凡天下凶惡强盜及雜犯殺人罪應至死而赦之者量地里逺近分配大軍不惟可免逋亡異日生患而此徒輕生好殺既𨽻軍伍知有洗心自新之路稍加閲習必樂為用孝宗淳熙三年兵部侍郎周必大乞因久雨親札同赦恤民劄子曰臣竊見月初陛下以霖雨過多親發德音分遣御史提㸃刑獄疏理囚繫將諸路杖罪以下與夫干繫之人並從釋放命令一頒旋即晴霽天髙聽卑應若影響此固陛下躬行而親致者不必逺引古事以為證也然自秋冬以來陛下每有寬恤之詔則亦隨有感格暨數日之後復爾隂雨今則稻不可穫農夫皆以為憂麥不可種嗣嵗在所當念臣嘗深思其故得非羣臣將順聖德有所未至不然四方民隱有所未達天雖不言示人以事仁愛拳拳㦯在兹乎今郊禋密邇將來所下赦書多是循用定式雖嘗令六部前期條具亦不過常事末節往往州縣亦以空文應之甚不稱陛下斂福敷錫之意臣愚欲望聖慈因霽色之未效察天意之有由特運宸心益思民間之利病凡可以罷行者默而識之俟有司赦條既定特降親札與赦俱下使四方萬里鼓舞盛德上動天監必獲無疆之休下得人心自成中興之績蓋念慮彌廣則報應彌大又豈特晴霽而已六年必大為禮部尚書兼翰林學士又論詳議明堂赦書疏曰臣仰惟仁宗皇帝在御之二十八年肇行宗祀之禮當時所降赦書恩意特厚又别為手詔闢至公之路杜私謁之蹊以新庶政載在史冊垂之無窮今陛下臨政願治十有八載德日新而又新治既進而加進其視祖武無間然者是以發德音下明詔卜以秋季宗祀上帝蓋盛舉也惟是自來赦令多因諸部條具而去取之文詞雖繁卓然可行者少故州縣亦視為常程未免徒掛墻壁臣愚欲望今兹出自聖意密諭三省樞密院就此三兩月間詳議政事施設之大者用仁宗故實敷為詔㫖與赦俱下至如諸路刑獄有觀望淹延纍嵗不能決者州縣賦稅有輕重不均若登帶積缺名存實亡者版曹憲部皆可稽考並作訪聞㦯貸㦯蠲一新斯民之耳目此實人主殊常之恩而非有司所能及也故願陛下與大臣預圖之又諸州太守到任便民五事其事亦有言一方大利大害尋常例付曹部勘當鮮聞施行臣亦乞命大臣表而出之取㫖行下使四方萬里之逺知陛下上承天心下恤人隱歡欣感戴溢為和氣自然華夷來同福祿無疆不其韙歟孝宗時敷文閣待制四門置制使范成大上奏曰臣聞刑罰者聖人所不得已也赦宥者亦聖人所不得已也愚民犯法彼固無辭遇赦當釋官亦無辭縱有情重難貸出於一時特斷者亦當因赦而稍輕不應引赦而反重此理甚明而人不以為怪臣竊惑之伏見近日奏案赦前犯罪者有司以為依赦合原緣情重奏裁以人情事理論之特不用赦而行刑已為甚重今乃反增其刑謂如本犯徒一年遇赦當放以情重故特斷徒二年三年或增至配流之類雖欲禁暴戢姦然非德刑並用之意兼在外州縣禁囚遇赦者則依等第徑行釋放其偶在奏案者乃反增加則是州縣用恩朝廷用威豈不倒置欲望聖慈特降睿㫖今後遇有赦前犯罪情重奏裁決不可貸者止於特不用赦以元刑斷之已自不恕人情事理實為允愜元世祖時趙天麟上策曰臣聞天之道隂陽而已矣王者之道刑賞而已矣故承天而居尊宜法道而立政夫陽主生而春夏始於前隂主殺而秋冬繼於後斯二者天也慶賞以勵功能威刑以警罪惡斯二者人也有功弗賞有能弗舉則無以激將來之功能有罪不刑有惡不除則無以致姦佞之絶迹是以明乎隂陽之並行審乎冬夏之先後賞者無以為慶也刑者所以好生也故刑期無刑辟以止辟豈虛語哉然而赦者欲以蕩滌瑕穢與民更始以負罪者言之則實莫大之洪恩以致治者論之則非太平之常事也近世以來郊天祀宗建儲立后未有不肆赦者僥幸之子逆知期㑹能不啓非濫之心哉且罹犴罹獄者皆人之切心側目者也及乎啼烏夜啓驛馬宵流玉籥告靈金雞樹伏雷雨一解例皆釋之名為嘉吉之符實皆變異之徴也遂使攘劫服贓而詫議善流屏忍而銜寃飬稂莠於良田縱豺狼於當道獨不念害嘉穀而傷平民乎風俗駭然誠可憚也又況大赦之後姦邪未嘗衰止朝脫囹圄夕嬰縲紲其不能承化自新亦已明矣書曰文王作罰刑兹無赦志曰太宗絶赦四海安靜子顔願無赦於光皇孔明非惜赦於蜀土故得彌天息寇闔境安生此皆前世明主賢臣已然之效也今國家哀囚徒之孽苦憫小民之庸騃頻降原赦此蓋朝廷不忍人之心形於外而不能自已也推此以及良民順天道以正生殺則周文之治不難同矣又豈唐太漢光蜀國琭琭之足言哉夫當罪而宥之當殺而生之亦猶來暄風於霜雪之辰行春令於秋冬之際如此而欲天道之成臣不知其可也事作于下者象動于上感興於人者應發於天能無懼乎易曰一隂一陽之謂道伏望陛下信賞決罰無肆赦宥使上下有紀內外絶幸則治天下可運之掌上矣且使王符之類靡得而議焉時冊上尊號議大赦天下參知政事張雄飛諌曰古人言無赦之國其刑必平故赦者不平之政也聖明在上豈宜數赦帝嘉納之語雄飛曰大獵而後見善豺集議而後知能言汝所言者是朕今從汝遂止降輕刑之詔順帝時蘇天爵論不可數赦疏曰自昔國家務明刑政茍或赦宥之數行必致紀綱之多紊是以先王既興禮樂以教民又嚴法制以懲惡蓋禮樂興則教化洽法制嚴則姦貪懼未嘗數赦以病民也唐太宗貞觀二年謂侍臣曰凡赦惟及不軌之輩古語有云君子不幸小人之幸一嵗再赦善人喑啞夫養稂莠者傷禾稼惠姦凶者賊良人朕有天下以來嘗須慎赦蓋數赦則愚人嘗冀僥幸唯欲犯法不復能改過矣誠哉太宗之斯言也昔我世祖皇帝即位之初未嘗肆赦臨御既久聖德深仁丕冒天下是以刑政肅清禮樂修舉姦貪知懼善良獲伸故中統至元之治比隆前古欽惟聖天子承順天心子愛百姓發號施令必先至仁踐阼伊始已降寬恩然自近嵗以來赦宥太數誠恐姦人貪吏各懷僥幸大為姦利非國之福也夫以世祖皇帝在位三十五年肆赦者八近自天歷改元至元統初嵗六年之中肆赦者九蓋敷恩宣澤雖出於朝廷之美意然長姦惠惡誠為政者所當慎也伏願自今以始近法世祖皇帝之所行逺鑑唐太宗之所言使中外臣民洗心革慮守法奉公知非常之恩不可復覬不勝幸甚歷代名臣奏議卷二百十八
