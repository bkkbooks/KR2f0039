body:
  text: 厯代名臣奏議卷二十五明楊士竒等撰治道魏文帝即位御史大夫王朗上疏勸育民省刑曰兵起巳來三十餘年四海蕩覆萬國殄瘁賴先王芟除寇賊扶育孤弱遂令華夏復有綱紀鳩集兆民于兹魏土使封鄙之內雞鳴狗吠逹於四境蒸庶欣欣喜遇升平今逺方之寇未賔兵戎之役未息誠令復除足以懷逺人良宰足以宣德澤阡陌咸修四民殷熾必復過于曩時而富于平日矣易稱敕法書著祥刑一人有慶兆民賴之慎法獄之謂也昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無寃死之囚丁壯者得盡地力則無飢饉之民窮老者得仰食倉廪則無餒餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之纍壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其業威罰以抑其強恩仁以濟其弱振貸以贍其之十年之後既笄者必盈巷二十年之後勝兵者必滿野矣明帝初蒞政司空陳羣上疏曰詩稱儀刑文王萬邦作孚又曰刑于寡妻至于兄弟以御于家邦道自近始而化洽于天下自喪亂以來干戈未戢百姓不識王教之隆懼其淩遲巳甚陛下當盛魏之隆荷二祖之業天下想望至治唯有以崇德布化惠恤黎庶則兆民幸甚夫臣下雷同是非相蔽國之大患若不和睦則有讎黨有讎黨則毀譽無端毀譽無端則真偽失實不可不深防備有以絶其源流時詔大議政治之不便于民者少府楊阜議以為致治在于任賢興國在于務農若舍賢而任所私此忘治之甚者也廣開宫館髙為臺榭以妨民務此害農之甚者也百工不敦其器而競作竒巧以合上欲此傷本之甚者也孔子曰苛政甚于猛虎今守功文俗之吏為政不通治體茍好煩苛此亂民之甚者也當今之急宜去四甚並詔公卿郡國舉賢良方正敦檏之士而選用之此亦求賢之一端也青龍中軍國多事用法深重侍中髙堂隆上疏曰夫拓迹垂統必俟聖明輔世匡治亦須良佐用能庶績其凝而品物康乂也夫移風易俗宣明道化使四表同風回首面內德教光熙九服慕義固非俗吏之所能也今有司務糾刑書不夲大道是以刑用而不措俗弊而不敦宜崇禮樂班序明堂修三雍大射養老營建郊廟尊儒士舉逸民表章制度改正朔易服色布豈弟尚儉素然後備禮封禪歸功天地使雅頌之聲盈于六合緝熙之化混于後嗣斯蓋至治之美事不朽之貴業也然九域之內可揖讓而治尚何憂哉不正其夲而救其末譬猶棼絲非政理也可命羣公卿士通儒造具其事以為典式吳烏程侯寶鼎元年徙都武昌揚土百姓泝流供給以為患苦又政事多􅍝黎元窮匱左丞相陸凱上疏曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡夫民者國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年以來君威傷于桀紂君明暗于姦雄君惠閉于群孽無災而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖而諸公卿媚上以求愛困民以求饒導君于不義敗政于淫俗臣竊為痛心今鄰國交好四邉無事當務息役養士實其廪庫以待天時而更傾動天心搔擾百姓使民不安大小吁嗟此非保國養民之術也臣聞吉凶在天猶影之在形響之在聲也形動則影動形止則影止此分數乃有所繫非在口之所進退也昔秦所以亡天下者但坐賞輕而罰重政刑錯亂民力盡于奢侈目眩于美色志濁于財寶邪臣在位賢哲隱藏百姓業業天下苦之是以遂有覆巢破卵之憂漢所以強者躬行誠信聽諫納賢惠及負薪躬請巖穴廣采博察以成其謀此往事之明證也近者漢之衰末三家鼎立曹失綱紀晉有其政又益州危險兵多精強閉門固守可保萬世而劉氏與奪乖錯賞罰失所君恣意于奢侈民力竭于不急是以為晉所伐君臣見虜此目前之明驗也臣暗于大理文不及義智惠淺劣無復冀望竊為陛下惜天下耳臣謹奏耳目所聞見百姓所為煩苛刑政所為錯亂願陛下息大功損百役務寬蕩忽苛政乂武昌土地實危險而堾確非王都安國養民之處船泊則沈漂陵居則危峻且童謡言寧飲建業水不食武昌魚寧還建業死不止武昌居臣聞翼星為變熒惑作妖童謡之言生於天心乃以安居而比死足明天意知民所苦也臣聞國無三年之儲謂之非國而今無一年之畜此臣下之責也而諸公卿位處人上祿延子孫曾無致命之節匡救之術茍進小利于君以求容媚荼毒百姓不為君計也自從孫𢎞造義兵以來耕種既廢所在無復輸入而分一家父子異役廪食日張畜積日耗民有離散之怨國有露根之漸而莫之恤也民力困窮鬻賣兒子調賦相仍日以疲極所在長吏不加隱括加有監官既不愛民務行威勢所在搔擾更為煩苛民苦二端財力再耗此為無益而有損也願陛下一息此輩矜哀孤弱以鎮撫百姓之心此猶魚鱉得免毒螫之淵鳥獸得離羅網之綱四方之民襁負而至矣如此民可得保先王之國存焉臣聞五音令人耳不聰五色令人目不明此無益于政有損于事者也自昔先帝時後宫列女及諸織絡數不滿百米有畜積貨財有餘先帝崩後幼景在位改奢侈不蹈先迹伏聞織絡及諸徒坐乃有千數計其所長不足為國財然坐食官廪歲歲相承此為無益願陛下料出賦嫁給與無妻者如此上應天心下合地意天下幸甚臣聞殷湯取士于商賈齊桓取士於車轅周武取士于負薪大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹素非求顔色而取好服捷口容恱者也臣伏見當今內寵之臣位非其人任非其量不能輔國匡時羣黨相扶害忠隱賢願陛下簡文武之臣各勤其官州牧督將藩鎮方外公卿尚書務修仁化上助陛下下拯黎民各盡其忠拾遺萬一則康哉之歌作刑錯之理清願陛下留神思臣愚言烏程侯凶暴驕矜政事日弊太子太傅賀邵上疏諫曰古之聖王所以潛處重闈之內而知萬里之情垂拱衽席之上明照八極之際者任賢之功也陛下以至德淑姿統承皇業宜率身履道恭奉神器旌賢表善以康庶政自頃年以來朝列紛錯真偽相貿上下空任文武曠位外無山嶽之鎮內無拾遺之臣佞諛之徒柎翼天飛干弄朝威盜竊榮利而忠良排墜信臣被害是以正士摧去而庸臣茍媚先意承指各希時趣人執反理之評士吐詭道之論遂使清流變濁忠臣結舌陛下處九天之上隱百重之室言出風靡令行景從親洽寵媚之臣日聞順意之辭將謂此輩實賢而天下已平也臣心所不安敢不以聞臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至是以古之人君揖讓以進賢虛巳以求過譬天位于乘奔以虎尾為警戒至於陛下嚴刑法以禁直辭黜善士以逆諫臣眩耀毀譽之實沈淪近習之言昔髙宗思佐夢寐得賢而陛下求之如忘忽之如遺故常侍王蕃忠恪在公才任輔弼以醉酒之間加之大􅓍近鴻臚葛奚先帝舊臣偶有逆忤昏醉之言耳三爵之後禮所不諱陛下猥彂雷霆謂之輕慢飲之鴆酒中毒隕命自是之後海內悼心朝臣失圖仕者以退為幸居者以出為禍誠非所以保光洪緒熙隆道化也又何定本趨走小人僕𨽻之下身無錙銖之行能無鷹犬之用而陛下愛其佞媚假其威柄使定恃寵放恣自擅威福口正國議手弄天機上虧日月之明下塞君子之路夫小人求入必進姦利定間妄興事役發江邉戍兵以驅麋鹿結罝山陵芟夷林莽殫其九野之獸聚于重圍之內上無益時之分下有損耗之費而兵士罷于運送人力竭于驅逐老弱飢凍大小怨歎臣竊觀天變自比年以來隂陽錯􅍝四時逆莭日食地震中夏隕霜參之典籍皆隂氣陵陽小人弄勢之所致也臣嘗覽書傳驗諸行事災祥之應所為寒栗昔髙宗修已以消鼎雉之異宋景崇德以退熒惑之變願陛下上懼皇天譴告之誚下追二君攘災之道逺覽前代任賢之功近寤今日謬授之失清澄朝位旌敘俊乂放退佞邪抑奪姦勢如是之輩一勿復用廣延淹滯容受直辭祗承乾指敬奉先業則大化光敷天人望塞也傳曰國之興也視民如赤子其亡也以民為草芥陛下昔韜神光潛德東夏以聖哲茂姿龍飛應天四海延頸八方拭目以成康之化必隆于旦夕也自登位以來法禁轉苛賦調益繁中宫內豎分布州郡橫興事役競造姦利百姓罹杼軸之困黎民罷無已之求老稚飢寒家户菜色而所在長吏迫畏罪負嚴法峻刑苦民求辦是以人力不堪家户離散呼嗟之聲感傷和氣又江邉戍兵逺當以拓土廣境近當以守界備難宜特優育以待有事而徴發賦調煙至雲集衣不全短褐食不贍朝夕出當鋒鏑之難入抱無聊之戚是以父子相棄叛者成行願陛下寬賦除煩振恤窮乏省諸不急蕩禁約法則海內樂業大化普洽夫民者國之夲食者民之命也今國無一年之儲家無經月之畜而後宫之中坐食者萬有餘人內有離曠之怨外有損耗之費使庫廪空于無用士民飢于糟粳又北敵注目伺國盛衰陛下不恃巳之威德而怙敵之不來忽四海之困窮而輕虜之不為難誠非長策廟勝之要也昔大皇帝勤身苦體創基南夏割據江山拓土萬里雖承天贊實由人力也餘慶遺柞至于陛下陛下宜勉崇德器以光前烈愛民養士保全先軌何可忽顯祖之功勤輕難得之大業忘天下之不振替興衰之巨變哉臣聞否泰無常吉凶由人長江之限不可久恃茍我不守一葦可航也昔秦建皇帝之號據殽函之阻德化不修法政苛酷毒流生民忠臣杜口是以一夫大呼社稷傾覆近劉氏據三關之險守重山之固可謂金城石室萬世之業任授失賢一朝喪沒君臣係頸共為羈僕此當世之明鑒目前之炯戒也願陛下逺考前事近覽世變豐基強夲割情從道則成康之治興而聖祖之祚隆矣西晉武帝初即位廣納直言開不諱之路駙馬都尉傅玄及散騎常侍皇甫陶其掌諫職玄上疏曰臣聞先王之臨天下也明其大教長其義節道化隆于上清議行于下上下相奉人懷義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通逺而天下賤守節其後綱維不攝而虛無放誕之論盈于朝野使天下無復清議而亡秦之病復發于今陛下聖德龍興受禪𢎞堯舜之化開正直之路體夏禹之至儉綜殷周之典文臣詠嘆而已將又奚言惟未舉清逺有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言詔報曰舉清逺有禮之臣者此猶今之要也乃使玄草詔進之玄復上疏曰臣聞舜舉五臣無為而化用人得其要也天下羣司猥多不可不審得其人也不得其人一日則損不資況積日乎典謨曰無曠庶官言職之不可久廢也諸有疾滿百日不差宜令去職優其禮秩而寵存之既差而後更用臣不廢職于朝國無曠官之纍此王政之急也又曰臣聞先王分士農工商以經國制事各一其業而殊其務自士已上子弟為之立太學以教之選明師以訓之各隨其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆民之衆無有一人遊手分數之法周偹如此漢魏不定其分百官子弟不修經藝而務交逰未知蒞事而坐享天祿農工之業多廢或逐淫利而離其事徒繫名于太學然不聞先王之風今聖明之政資始而漢魏之失未改散官衆而學校未設遊手多而親農者少工器不盡其宜臣以為亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而巳尊儒向學貴農賤商此皆事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬耕稼祚流後世是以明堂月令著帝籍之制伊尹古之名臣耕于有莘晏嬰齊之大夫避莊公之難亦耕于海濵昔者聖帝明王賢佐俊士皆嘗從事于農矣王人賜官冗散無事者不督使學則當使耕無緣放之使坐食百姓也今文武之官既衆而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食祿者參倍于前使冗散之官農而收其租稅家得其實而天下之榖可以無乏矣夫家足食為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之教可不令而行也為政之要計人而置官分人而授事士農工商之分不可斯須廢也若未能精其防制計天下文武之官足為副二者使學其餘皆歸之於農若百工商賈有長者亦皆歸之于農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是為九年之後乃有遷敘也故居官久則念立慎終之化居不見久則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也仲尼有言人能𢎞道非道𢎞人然則尊其道者非惟尊其書而巳尊其人之謂也貴其業者不妄教非其人也重其選者不妄用非其人也若此而學校之綱舉矣太中大夫恬和上表陳便宜稱漢孔光魏徐幹等議使王公已下制奴婢限數及禁百姓賣田宅中書啓可屬主者為條制李重奏曰先王之制士農工商有分不遷其業所以利用厚生各肆其力也周官以土均之法經其土地井田之制而辨其五物九等貢賦之序然後公私制定率土均齊自秦立阡陌建郡縣而斯制巳沒降及漢魏因循舊迹王法所峻者唯服物車器有貴賤之差令不僣擬以亂尊卑耳至于奴婢私産則實皆未嘗曲為之立限也八年已巳詔書申明律令諸士卒百工以上所服乘皆不得違制若一縣一歲之中有違犯者三家洛陽縣十家以上官長免如詔書之旨法制已嚴令如和所陳而稱光幹之議此皆衰世踰侈當時之患然盛漢之初不議其制光等作而不行非漏而不及能而不用也蓋以諸侯之軌既減而井田之制未復則王者之法不得制人之私也人之田宅既無定限則奴婢不宜偏制其數懼徒為之法實碎而難檢方今盛明垂制每尚簡易法禁已具和表無施泰始中詔天下舉賢良直言之士太守文立舉郤詵應選詔曰蓋太上以德撫時易簡無文至于三代禮樂大偹制度彌繁文質之變其理何由虞夏之際聖明係踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也聖王既沒遺制猶存霸者迭興而翼輔之王道之缺其無補乎何陵遲之不反也豈霸德之淺歟期運不可致歟且夷吾之智而功止于霸何哉夫昔人之為政革亂亡之弊建不刋之統移風易俗刑措不用豈非化之盛歟何修而嚮兹朕獲承祖宗之休烈于兹七載而人未服訓政道罔述以古況今何不相逮之逺也雖明之弗及猶思與羣賢慮之將何以辨所聞之疑昧獲至論于讜言乎加自頃戎狄內侵災害屢作邉氓流離征夫苦役豈政刑之􅍝將有司非其任歟各悉乃心究而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之詵對曰伏惟陛下以聖德君臨猶垂意于博採故招賢正之士而臣等薄陋不足以降大問也是以竊有自疑之心雖致身于闕庭亦僶俯矣伏讀聖䇿乃知下問之旨篤焉臣聞上古推賢讓位教同德一故易簡而人化三代世及季末相承故文繁而後整虞夏之相因而損益不同非帝王之道異救弊之路殊也周當二代之流承雕偽之極盡禮樂之致窮制度之理其文備詳仲尼因時宜而曰從周非殊論也臣聞聖王之化先禮樂五霸之興勤政刑禮樂之化深政刑之用淺勤之則可以小安墮之則遂陵遲所由之路夲近故所補之功不侔也而齊桓失之葵丘夷吾淪于小器功止于霸不亦宜乎䇿曰建不刋之統移風易俗使天下洽和何修而嚮兹臣以為莫大于擇人而官之也今之典刑匪無一統宰牧之才優劣異績或以之興或以之替此蓋人能𢎞政非政𢎞人也舍人務政雖勤何益臣竊觀夫古今而考其美惡古人相與求賢今人相與求爵古之官人君責之于上臣舉之于下得其人有賞失其人有罰安得不求賢乎今之官者父兄營之親戚助之有人事則通無人事則塞安得不求爵乎賢茍求達達在修道窮在守義故靜以待之也爵茍可求得在進取失在後時故動以要之也動則爭競爭競則朋黨朋黨則誣誷誣誷則臧否失實真偽相冒主聽用惑姦之所會也靜則貞固貞固則正直正直則信讓信讓則推賢推賢不伐相下無饜主聽用察德之所趣也故能使之靜雖曰髙枕而人自正不能禁動雖復夙夜俗不一也且人無愚智咸慕名官莫不飾正于外藏邪于內故邪正之人難得而知也任得其正則衆正益至若得其邪則衆邪亦集物繁其類誰能止之故亡國失世者未嘗不為衆邪所積也方其初作必始于微微而不絶其終乃著天地不能頓為寒暑人主不能頓為隆替故寒暑漸于春秋隆替起于得失當今之世宦者無關梁而邪門啓矣朝廷不責賢正路塞矣得失之源何以甚此所謂責賢使之相舉也所謂關梁使之相保也賢不舉則有咎保不信亦有罰故古者諸侯必貢士不貢者削貢而不適亦削夫士者難知也不適者薄過也不得不責強其所不知也罰其所不適深其薄過非恕也且天子于諸侯有不純臣之義斯責之矣施刑之道寧縱不濫之矣今皆反是何也夫賢者天地之紀品物之宗其急之也故寧濫以得之無縱以失之也今則不然世之悠悠者各自取辦耳故其材行並不可必于公則政事紛亂于私則汙穢狼籍自頃長吏特多此纍有亡命而被購懸者矣有縛束而絞􅓍者矣貪鄙竊位不知誰升之者獸兕出檻不知誰可咎者網漏吞舟何以過此人之于利如蹈水火焉前人雖敗後人復起如彼此無已誰止之者風流日競誰憂之者雖今聖思勞于夙夜所使為政恆得此屬欲聖世化美俗平亦俟河之清耳若欲善之宜創舉賢之典峻關梁之防其制既立則人慎其舉而不茍則賢者可知知賢而試則官得其人矣官得其人則事得其敘事得其敘則物得其宜物得其宜則生生豐植人用資給和樂興焉是故寡過而逺刑知恥以近禮此所謂建不刋之統移風易俗刑措而不用也策曰自頃夷狄內侵災眚屢降將所任非其人乎何由而至此臣聞蠻夷猾夏則臯陶作士此欲善其末則宜先其夲也夫任賢則政惠使能則刑恕政惠則下仰其施刑恕則人懷其勇施以殖其財勇以結其心故人居則資贍而知方動則親上而志勇茍思其利而除其害以生道利之者雖死不二以逸道勞之者雖勤不怨故其命可授其力可竭以戰則克以攻則拔是以善者慕德而安服惡者畏懼而削迹止戈而武義實在文唯任賢然後無患耳若夫水旱之災自然理也故古者三十年耕必有十年之儲堯湯遭之而人不困有偹故也自頃風雨雖頗不時考之萬國或境土相接而豐約不同或頃畝相連而成敗異流固非天之必害于人人實不能均其勞苦失之於人而求之於天則有司惰職而不勸百姓怠業而咎時非所以定人志致豐年也宜勤人事而巳臣誠愚鄙不足以奉對聖朝猶進之于廷者將使取諸其懷而獻之乎臣懼不足也若收不知言以致知言臣則可矣是以辭鄙不隱也以對䇿上第拜議郎時西虜內侵災眚屢見百姓飢饉詔王公卿尹常伯牧守各舉賢良方正直言之士于是太保何曾舉阮种賢良䇿曰在昔哲王承天之序光宅宇宙咸用規矩乾坤惠康品類休風流衍彌于千載朕應踐洪運統位七載於今矣惟德弗嗣不明于政宵興惕厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡喻朕志深陳王道之夲勿有所隱朕虛心以覽焉种對曰夫天地設位聖人成能王道至深所以行化至逺故能開物成務而功業不匱近無不聽逺無不服德逮羣生澤被區宇聲施無窮而典垂百代故經曰聖人久于其道而天下化成宜師蹤往代襲迹三五矯世更俗以從人望令率土遷義下知所適播醇美之化杜邪枉之路斯誠羣黎之所欣想盛德而幸望休風也又問政刑不宣禮樂不立對曰政刑之宣故由乎禮樂之用昔之明王唯此之務所以防遏暴慢感動心術制節上靈而陶化萬姓也禮以體德樂以詠功樂夲于和而禮師于敬矣又問戎蠻猾夏侵敗王略雖古盛世猶有此虞故詩稱獫狁孔熾書歎蠻夷帥服自魏氏以來夷虜內附鮮有桀悍侵漁之患由是邉守遂怠鄣塞不設而令醜虜內居與百姓雜處邉吏擾習人又忘戰受方任者又非其材或以狙詐侵侮邉夷或干賞滔利妄加討戮夫以微羈而御悍馬又乃操以煩䇿其不制者固其理也是以羣醜蕩駭緣間而動雖三州覆敗牧守不反此非胡虜之甚徑蓋用之者過也臣聞王者之伐有征無戰懷逺以德不聞以兵夫兵凶器而戰危事也兵興則傷農衆集則費積農傷則人匱積費則國虛昔漢武之世承文帝之業資海內之富役其材臣以甘心胸奴競戰勝之功貪攻取之利良將徑卒屈于沙漠勝敗相若克不過當夭百姓之命填餓狼之口及其以衆制寡令胸奴逺迹收功祁連飲馬瀚海天下之耗已過大半矣夫虛中國以事夷狄誠非計之得者也是以盜賊蜂起山東不振暨宣元之時趙充國征西零馮奉世征南羌皆兵不血刃摧抑強暴擒其首惡此則折衝厭難勝敗相辨中世之明效也義問咎徴作見對曰隂陽否泰六沴之災則人主修政以禦之思患而防之建皇極之首詳庶徴之用詩曰敬之敬之天惟顯思天聰明自我民聰明是以人主祖承天命日慎一日也故能應受多福而永世克祚此先王之所以退災消眚也又問經化之務對曰夫王道之夲經國之務必先之以禮義而致人于亷恥禮義立則君子軌道而讓于善亷恥立則小人謹行而不淫于制度賞以勸其能威以懲其廢此先王所以保乂定功化洽黎元而勳業長世也故上有克讓之風則下有不爭之俗朝有矜節之士則國無貪冒之人夫亷恥之於政猶樹蓻之有豐壤良歲之有膏澤其生物必悠然茂矣若廉恥不存而惟刑是御則風俗雕弊人失其性錐刀之末皆有爭心雖峻刑嚴辟猶不勝矣其于政也如農者之殖磽野旱年之望豐穡必不幾矣此三代所以享德長久風醇俗美皆數百年保天之祿而秦二世而弊者蓋其所由之塗殊也又問將使武成七德文濟九功何路而臻于兹凡厥庶事曷後曷先對曰夫文武經德所以成功丕業咸熙庶績者莫先於選建明哲授方任能令才當其官而功稱其職則萬機咸理庶寮不曠書曰天工人其代之然則繼天理物寧國安家非賢無以成也夫賢才之畜于國由良工之須利器巧匠之待繩墨也器用利則斫削易而材不病繩墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也賢臣之于主進則忠國愛人退則砥節潔志營職不干私義出心必由公塗明度量以呈其能審經制以效其功此昔之聖王所以恭己南面而化于陶鈞之上者以其所任之賢與所賢之信也方今海內之士皆傾望休光希心紫極唯明主之所趣舍若開四聰之聽廣疇咨之求抽羣英延俊乂考功授職呈能制官朝無素飧之士如此化流罔極樹功不朽矣太康中華談至洛陽武帝親䇿之曰今四海一統萬里同風天下有道莫斯之盛然北有未羈之人西有醜族之氐故謀夫未得髙枕邉人未獲晏然將何以長弭斯患混清六合對曰臣聞聖人之臨天下也祖乾綱以流化順谷風以興仁兼三才以御物開四聰以招賢故勞謙日昃務在擇材宣明巖穴垂光隱滯俊人龍躍帝道以光清德鳳翔王化克舉是以臯陶見舉不仁者逺陸賈重漢逺夷折節今聖朝德音發于帷幄清風翔乎無外戎旗南指江漢席卷干戈西征羌蠻慕化誠闡四門之秋興禮教之日也故髦俊聞風而響赴殊才望險而雲集虛髙館以俟賢設重爵以待士急善過于飢渴用人疾于應響杜佞諂之門廢鄭聲之樂混清六合實由乎此雖西北有未羈之寇殊漠有不朝之虜征之則勞師得之則無益故班固云有其地不可耕而食得其人不可臣而畜來則懲而禦之去則備而守之蓋安邉之術也又䇿曰吳蜀恃險今既蕩平蜀人服化無攜二之心而吳人恣睢屢作妖寇豈蜀人敦朴易可化誘吳人輕鋭難安易動乎今將欲綏靜新附何以為先對曰臣聞漢末分崩英雄鼎峙蜀棲岷隴吳據江表至大晉龍興應期受命文皇運籌安樂順軌聖上潛謀歸命向化蜀染化日久風教遂成吳始初附未改其化非為蜀人敦慤而吳人易動也然殊俗逺境風土不同吳阻長江舊俗輕悍所安之計當先籌其人士使雲翔閶闔進其賢才待其異禮明選牧伯致以威風輕其賦斂將順咸恱可以永保無窮長為人臣者也又䇿曰聖人稱如有王者必世而後仁今天成地平大化無外雖胸奴未羈羌氐驕黠將修文德以綏之舞干戚以來之故兵戈載戢武夫寢息如此已可消鋒刃為佃器罷尚方武庫之用未邪對曰夫唐堯厯載頌聲乃作文武相承禮樂大同清一八紘綏蕩無外萬國順軌海內斐然雖復被髮之鄉徙跣之國皆習章甫而入朝要衣裳以磬折夫大舜之德猶有三苖之征以周之盛玁狁為寇雖有文德又須武備備預不虞古之善教安不忘危聖人常戒無為罷武庫之常職鑠鋒刃為佃器自可倒戢干戈苞以獸皮將帥之士使為諸侯于散樂休風未為不泰也又䇿曰夫法令之設所以隨時制也時險則峻法以取平時泰則寬網以將化今天下太平四方無虞百姓承德將就無為而又至于律令應有所損益不對曰臣聞五帝殊禮三王異教故或禪讓以光政或干戈以攻取至于興禮樂以和人流清風以寧俗其歸一也今誠風教大同四海無虞人皆感化去邪從政夫以堯舜之盛而猶設象形殷周之隆而甫侯制律律令之存何妨于政若乃大道四逹禮樂交通凡人修行黎庶勵節刑罰懸而不用律令存而無施適足以隆太平之雅化飛仁風于無外矣又䇿曰昔帝舜以二八成功文王以多士興周夫制化在于得人而賢才難得今大統始同宜搜才實州郡有貢薦之舉猶未獲出羣卓越之倫將時無其人有而致之未得其理也對曰臣聞興化立法非賢無以光其道平世理亂非才無以宣其業上自皇羲下及帝王莫不張皇綱以羅逺飛仁風以被物故得賢則教興失人則政廢今四海一統萬里同風州郡貢秀孝臺府簡良才以八紘之廣兆庶之衆豈當無卓越雋逸之才乎譬猶南海不少明月之寶大宛不乏千里之駒也異哲難見逺數難覩故堯舜太平之化二八由舜而甫顯殷湯革王之命伊尹負鼎而方用當今聖朝禮亡國之士接遐裔之人或貂蟬于帷幄或剖符于千里巡狩必有吕公之遇宵夢必有岩穴之感賢俊之出可企踵而待也時帝出祠南郊詔使散騎常侍鄭默驂乘因謂默曰卿知何以得驂乘乎昔州里舉卿相輩常愧有纍清談遂問政事對曰勸穡務農為國之基選人得才濟世之道居官久職政事之宜明慎黜陟勸戒之由崇尚儒素化導之夲如此而已矣帝善之愍帝即位尚書郎諸葛恢調為會稽太守臨行帝為置酒謂曰今之會稽昔之關中足食足兵在于良守以君有蒞任之方是以相屈四方分崩當匡振圮運政之所先君為言之恢陳謝因對曰今天下喪亂風俗陵遲宜尊五美屏四惡進忠實退浮華帝深納焉東晉元帝時冬雷電且大雨帝下書責躬引過御史中丞熊逺上疏曰被庚午詔曰以雷電震暴雨時深自尅責禹湯罪己未足以喻臣暗于天道竊以人事論之陛下莭儉敦朴愷悌流惠而王化未興者皆羣公卿士不能夙夜在公以益大化素飧負乘粃穢明時之責也今逆賊猾夏暴虐滋甚二帝幽殯梓宫未反四海延頸莫不東望而未能遣軍北討讎賊未報此一失也昔齊侯既敗七年不飲酒食肉況此恥尤大臣子之責宜在枕戈為王前驅若此志未果者當上下克儉恤人養士徹樂減膳惟修戎事陛下憂勞于上而羣官未同戚容于下每有會同務在調戲酒食而已此二失也選官用人不料實德惟在白望不求才幹鄉舉道廢請託交行有德而無力者退修望而有助者進稱職以違俗見譏虛資以從容見貴是故公正道虧私塗日開強弱相陵寃在不理今當官者以理事為俗吏奉法為苛刻盡禮為諂諛從容為髙妙放蕩為達士驕蹇為簡雅此三失也世所謂三失者公法加其身私議貶其非轉見排退陸沉泥滓時所謂三喜者王法所不加清論美其賢漸相登進仕不輟官攀龍附鳳翺翔雲霄遂使世人削方為圓撓直為曲豈待顧道德之清塗踐仁義之區域乎是以萬機未整風俗偽薄皆此之由不明其黜陟以審能否此則俗未可得而變也今朝廷羣司以從順為善相違見貶不復論才之曲直言之得失也時有言者或不見用是以朝少辨爭之臣士無祿仕之志焉郭翼上書武帝擢為屯留令乂置諫官所以容受直言誘進將來故人得自盡言無隱諱任官然後爵之位定然後祿之敷奏以言明試以功車服以庸舜猶厯試諸難而今先祿不試甚違古義亂之所由也求才急于踈賤用刑先于親貴然後令行禁止野無遺滯堯取舜于仄陋舜拔賢于岩穴姬公不曲繩于天倫叔向不虧法于孔懷今朝廷法吏多出于寒賤是以章書日奏而不足以懲物官人選才而不足以濟事宜招賢良于屠釣聘耿介于丘園若此道不改雖并官省職無救弊亂也能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬此官得其人之益也明帝時前將軍溫嶠奏軍國要務其一曰祖約退舍壽陽有將來之難今二方守禦為功尚易淮泗都督宜竭力以資之選名重之士配征兵五千又擇一偏將將二千兵以益壽陽可以保固徐豫援助司土其二曰一夫不耕必有受其飢者今不耕之夫動有萬訃春廢勸課之制冬峻出租之令下未見施惟賦是聞賦不可以已當思令百姓有以殷實司􅑫置田曹掾州一人勸課農桑察吏能否今宜依舊置之必得清恪奉公足以宣示惠化者則所益實𢎞矣其三曰諸外州郡將兵者及都督府非臨敵之軍且田且守乂先朝使五校出田今西軍五校有兵者及護軍所統外軍可分遣二軍出并屯要處緣江上下皆有良田開荒雖一年之後即易且軍人纍重者在外有樵採𬞞食之人于事為便其四曰建官以理世不以私人也如此則官寡而材精周制六卿蒞事春秋之時入作卿輔出將三軍後代建官漸多誠由事有煩簡耳然今江南六州之土尚又荒殘方之平日數十分之一耳三省軍校無兵者九府寺署可有并相領者可有省半者計其間劇隨事減之荒殘之縣或同在一城可并合之如此選既可精祿俸可優令足代耕然後可責以清公耳其五曰古者親耕藉田以供粢盛舊制藉田廪犧之官今臨時市求上黷至敬下費生靈非所以虔奉宗廟蒸蒸之旨宜如舊制立此二官其六曰使命愈逺益宜得材宣揚王化延譽四方人情不樂遂取卑品之人虧辱國命生長患害故宜重其選不可減二千石見居二品者其七曰罪不相及古之制也近者大逆誠由凶戾凶戾之甚一時權用今遂施行非聖朝之令典宜如先朝除三族之議奏多納之康帝即位庾氷進車騎將軍氷懼權盛乃求外出會弟翼當伐石季龍于是以本號除都督江荆寧益梁交廣七州豫州之四郡軍事領江州刺史假節鎮武昌以為翼援氷臨發上疏曰臣因循家寵冠冕當世而志無殊操量不及逺頃皇家多難釁故頻仍朝望國器與時殱落遂令天眷下墜降及臣身俯仰伏事于今五年上不能光贊聖猷下不能緝熙政道而陛下遇之過分求之不已復䇿敗駕之駟以冀萬里之功非天眷之隆將何以至此是以敢竭狂瞽以獻血誠願陛下暫屏旒纊以𢎞聽納今強寇未殄戎車未戢兵弱于郊人疲于內寇之侵逸未可量也黎庶之困未之安也羣才之用未之盡也而陛下崇髙事與下隔視聽察覽必寄之羣下羣下宜忠不引不進百司宜勤不督不勸是以古之帝王勤于降納雖曰總萬機猶兼聽將相或借訟輿人或求謗芻蕘良有以也況今之弊開闢之極而陛下厯數屬當其運否剝之難嬰之聖躬普天所以痛心于既往而傾首于將來者也實冀否終而泰屬運在今誠願陛下𢎞天覆之量深地載之厚宅沖虛以為夲勤訓督以為務廣引時彥詢于政道朝之得失必關聖聽人之情偽必達天聰然後覽其大當以總國綱躬儉節用堯舜豈逺大布之衣衛文何人是以古人有云非知之難行之難非行之難安之難也願陛下既思日側于勞謙納其起豫之情則天下幸甚矣臣朝夕伏膺猶不能暢臨疏徘徊不覺辭盡穆帝時苻堅敗朝廷欲鎮靖北方出劉波督淮北諸軍冀州刺史以疾未行上疏曰臣聞天地以𢎞濟為仁君道以惠下為德是以禹湯有身勤之績唐虞有在豫之誥用能惠被蒼生勳流後葉宣帝開拓洪圖始基成命爰及文武厯數在躬而猶虛心側席卑已崇物然後知積纍之功重勤王之業艱先君之德𢎞貽厥之賜厚惠皇不懷委政內任遂使神器幽淪三光翳曜園陵懷九泉之感宫廟集胡馬之迹所謂肉食失之于朝黎庶暴骸于外也賴元皇帝神武應期祚隆淮海振乾綱于已墜紐絶維而更張陛下承宣帝開始之宏基受元帝克終之成烈保大定功戢兵靜亂故使負鱗橫海之鯨僭位滔天之寇望雲旗而宵潰覩太陽而霧散巍巍蕩蕩人無名焉而頃年巳來天文違錯妖怪屢生會稽先帝夲封而地動經年昔周之文武有魚鳥之瑞君臣猶懷震悚況今災變衆集曽莫之疑公旦有勿休之誡賈誼有積薪之喻臣鑒先徴竊惟今事是以敢肆狂瞽直言無諱往者先帝以玄風御世責成羣后坐運天綱隨化委順故忘日計之功收歲成之用今禮樂征伐自天子出相王賢俊協和百揆六合承風天下響振而鈞臺之詠弗聞景亳之命未布將羣臣之不稱陛下用之不盡乎凡聖王之化莫不敦崇忠信存正棄邪傷化毀俗者雖親雖貴必踈而逺之清公貞修者雖微雖賤必親而近之今則不然此風既替利競滋甚朋黨比周毀譽交興鑽求茍進人希分外見賢而居其上受祿每過其量希旨承意者以為奉公共相讃白者以為忠節舉世見之誰敢正言陛下不明必行之法以絶穿鑿之源者恐脫因疲倦以誤視聽且苻堅滅亡于今五年舊京殘毀山陵無衛百姓塗炭未蒙拯接伏願逺觀漢魏衰滅之由近覽西朝傾覆之際超然易慮為于未有則靈根永固社稷無虞臣豈誣一朝之人皆無忠節但任非其才求之不至耳今政煩役殷所在雕弊倉廪空虛國用傾竭下民侵削流亡相屬略計户口但咸安已來十分去三百姓懷蜉蝣之歎下泉興周京之思昔漢宣有云與我共治天下者其惟良二千石乎是以臨下有方者就加璽贈法苛政亂者恤刑不赦事簡于上人恱于下今則不然告時乞職者以家弊為辭振窮恤滯者以公爵為施古者為百姓立君使之司牧今者以百姓恤君使之蠶食至乃貪汚者謂之清勤慎法者謂之怯劣何反古道一至于此陛下雖躬自節儉哀矜于上而群寮肆欲縱心于下六司垂翼三事拱默故有識者覩人事以歎息觀天眚而大懼昔宋景退熒惑之災殷宗消鼎雉之異伏願陛下仰觀大禹過門之志俯察商辛沈湎之失逺思國風共公之刺深惟定薑小臣之喻暫回聖恩大詢羣后延納衆賢訪以得失令百寮率職人言損益察其所由觀其所以審識羣才助鼎和味克念作聖以答天休則四海宅心天下幸甚庾羲少有時譽初為吳國內史穆帝頗愛文義羲至郡獻詩頗存諷諫因上表曰陛下以聖明之德方隆唐虞之化而事役殷曠百姓雕殘以數州之資經贍四海之務其為勞弊豈可具言昔漢文居隆盛之世躬自儉約斷獄數百殆致刑措賈誼歎息猶有積薪之言以古況今所以益其憂懼陛下明鑒天挺無幽不燭𢎞濟之道豈待瞽言臣受恩奕世思盡絲髮受任到來親臨所見敢緣𢎞政獻其丹愚伏願聽斷之暇少垂察覽孝武帝時范寧求補豫章太守上書陳時政曰古者分土割境以益百姓之心聖王作制籍無黃白之别昔中原喪亂流寓江左庶有旋反之期故許其挾注夲郡自爾漸久人安其業丘壟墳柏皆已成行雖無夲邦之名而有安土之實今宜正其封疆以土斷人户明考課之科修閭伍之法難者必曰人各有桑梓俗自有南北一朝屬户長為人𨽻君子則有土風之慨小人則懷下役之慮斯誠并兼者之所執而非通理者之篤論也古者失地之君猶臣所寓之主列國之臣亦有違適之禮隨會事秦致稱春秋樂毅宦燕見褒良史且今普天之人原其氏出皆隨遷移何至于今而獨不可凡荒郡之人星居東西逺者千餘近者數百而舉召役調皆相資須期會差違輒致嚴坐人不堪命叛為盜賊是以山湖日積刑獄愈滋今荒小郡縣皆宜并合不滿五千户不得為郡不滿千户不得為縣守宰之任宜得清平之人頃者選舉惟以恤貧為先雖制有六年而富足便退又郡守長吏牽制無常或兼臺職或帶府官夫府以統州州以監郡郡以蒞縣如令互相領帖則是下官反為上司賦調役使無復節限且牽曵百姓營起廨舍東西流遷人人易處文書簿籍少有存者先之屋宇皆為私家後來新官復應修立其為弊也胡可勝言又方鎮去官皆割精兵器仗以為送故米布之屬不可稱計監司相容初無彈糾其中或有清白亦復不見甄異送兵多者至有千餘家少者數十戶既力入私門復資官廪布兵役既竭枉服良人牽引無端以相充補若是功勳之臣則巳享裂土之祚豈應封外復置吏兵乎謂送故之格宜為節制以三年為斷夫人性無涯奢儉由勢今并兼之士亦多不贍非力不足以厚身非祿不足以富家是得之有由而用之無節蒱酒永日馳􅕽卒年一宴之饌費過十金麗服之美不可資算盛狗馬之飾營鄭衛之音南畝廢而不墾講誦闕而無聞凡庸競馳傲誕成俗謂宜驗其鄉黨考其業尚試其能否然後升進如此匪惟家給人足賢人豈不繼踵而至哉官制謫兵不相襲代頃者小事便以補役一愆之違辱及纍世親戚旁攴罹其禍毒戶口減耗亦由于此皆宜料遣以全國信禮十九為長殤以其未成人也十五為中殤以其尚童幼也今以十六為全丁則備成人之役矣以十三為半丁所任非復童幼事矣豈可傷天理違經典困苦萬姓乃至此乎今宜修禮文以二十為全丁十六至十九為半丁則人無夭折生長滋繁矣帝善之安帝時山湖川澤皆為豪強所專小民薪採漁釣皆責稅直至是禁斷之時民居未一劉裕表曰臣聞先王制治九土攸序分疆畫境各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富強兼并于是為弊然九服弗擾所託成舊在漢西京大遷田景之族以實關中即以三輔為鄉閭不復係之于齊楚自永嘉播越爰託淮海朝有匡復之算民懷思夲之心經略之圖日不暇給是以寧民綏治猶有未遑及至大司馬桓溫以民無定夲傷治為深庚戌土斷以一其業于時財國豐實由于此自茲及今彌厯年載畫一之制漸用頽弛雜居流寓閭伍弗修王化所以未純民瘼所以猶在臣荷重任耻責實深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居纍世墳壟成行敬恭之誠豈不與事而至請準庚戌土斷之科庶子夲所𢎞稍與事著然後率之以仁義鼓之以威武超大江而跨黃河撫九州而復舊土則戀夲之志乃速由于當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懷鴻鴈之詩思隆中興之業既委臣以國重期臣以寧濟若所啓合允請付外施行于是依界土斷唯徐兖青三州居晉陵者不在斷例諸流寓郡縣多被併省宋孝武帝即位普責百官讜言建平王宏中軍録事參軍周朗上書曰昔仲尼有言治天下若置諸掌豈徒言哉方䇿之政舉息在人蓋當世之君不為之耳況乃運鍾澆暮世膺亂餘重以宫廟遭不更之酷江服被未有之痡千里連死萬井共泣而秦漢餘敝尚行于今魏晉遺􅍝猶布于民而望國安于今化崇于古卻行及前之言積薪待然之譬臣不知所以方然陛下既基之以孝又申之以仁民所疾苦敢不略薦凡治者何哉為教而已今教衰已久民不知則又隨以刑逐之豈為政之道哉欲為教者宜二十五家選一長百家置一師男子十三至十七皆令學經十八至二十盡使修武訓以書記圖律忠孝仁義之禮廉讓勤恭之則授以兵經戰略軍部舟騎之容挽強擊刺之法官長皆月至學所以課其能習經者五年有立則言之司徒用武者三年善藝亦升之司馬若七年而經不明五年而勇不達則更求其言政置謀迹其心術行履復不足取者雖公卿子孫長歸農畝終身不得為吏其國學則宜詳考占數部定子史令書不煩行習無糜力凡學雖凶荒不宜廢也農桑者實民之命為國之夲有一不足則禮莭不興若重之宜罷金錢以榖帛為賞罰然愚民不達其權議者好增其異凡自淮以北萬匹為市從江以南千斛為貨亦不患其難也今且聽市至千錢以還者用錢餘皆用絹布及米其不中度者坐之如此則墾田自廣民資必繁盜鑄者罷人死必息又田非潦水皆播麥菽地堪滋養悉藝紵麻蔭巷緣藩必樹桑柘列庭接宇唯植竹栗若此令既行而善其事者庶民則序之以爵有司亦從而加賞若田在草間木物不植則撻之而伐其餘樹在所以次坐之又取稅之法宜計人為輸不應以資云何使富者不盡貧者不蠲乃令桑長一尺圍以為價田進一畝度以為錢屋不得瓦皆責資實民以此樹不敢種土畏妄墾棟焚榱露不敢加泥豈有剝善害民禁衣惡食若此苦者方今若重斯農則宜務削兹法凡為國不患威之不立患恩之不下不患土之不廣患民之不育自華夷爭殺戎夏競威破國則積尸竟邑屠將則覆軍滿野海內遺生蓋不餘半重以急政嚴刑夭災嵗疫貧者但供吏死者弗望薶鰥居有不願娶生子每不敢舉又戍淹徭久妻老嗣絶及媱奔所孕皆復不收是殺人之日有數途生人之嵗無一理不知復百年間將盡以草木為世邪此最是驚心悲魂慟哭太息者法雖有禁殺子之科設蚤娶之令然觸刑罪忍悼痛而為之豈不有酷甚處耶今宜家寬其役户減其稅女子十五不嫁家人坐之特雉可以娉妻妾大布可以事舅姑若待足而行則有司加糾凡宫中女𨽻必擇不復字者庶家內役皆令各有所配要使天下不得有終獨之生無子之老所謂十年存育十年教訓如此則二十年間長户勝兵必數倍矣又亡者亂郊饉人盈甸皆是不為其存計而任之遷流故飢寒一至慈母不能保其子欲其不為寇盜豈可得邪既御之使然復止之以殺彼于有司何酷至是且草樹既死皮葉皆枯是其粱肉盡矣氷霜已厚苫蓋難資是其衣裘敗矣比至陽春生其餘幾今自江以南在所皆穰有食之處須官興役宜募逺近能食五十口一年者賞爵一級不過千家故近食十萬口矣使其受食者悉令就佃淮南多其長帥給其糧種凡公私逰手嵗發佐農令堤湖盡修原陸並起仍量家立社計地設閭檢其出入督其遊惰須待大熟可移之復舊淮以北悉使南還江東旅客盡令西歸故毒之在體必割其緩處函渭靈區闃為荒窟伊洛神基蔚成茂草豈可不懷歟厯下泗間何足獨戀議者必以為胡衰不足避而不知我之病甚于胡矣若謂民之既徙狄必就之若其來從我之願也胡若能來必非其種不過山東雜漢則是國家由來所欲覆育既華得坐實戎空自逺其為來利固善也今空守孤城徒費財役亦行見淮北必非境服有矣不亦重辱喪哉使虜但發輕騎三千更互出入春來犯麥秋至侵禾水陸漕輸居然復絶于賊不勞而邉已困不至二年卒散民盡可蹻足而待也設使胡滅則中州必有興者決不能有奉土地率民人以歸國家矣誠如此則徐齊終逼亦不可守且夫戰守之法當恃人之不敢攻頃年兵之所以敗皆反此也今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣漢之中年能事胡者以馬多也胡之後服漢者亦以馬少也既兵不可去車騎應蓄今宜募天下使養馬一匹者蠲一人後三匹者除一人為吏自此以進階賞有差邉亭僥驛一無發動又將者將求其死也自能執干戈幸而不亡筋力盡于戎役其于望上者固已深矣重有澄風掃霧之勤驅波滌塵之力此所自矜尤復為甚近所功賞人知其濃然似頗􅍝虛實怨怒實衆垂臂而反脣者往往為部耦語而呼望者處處成羣凡武人意氣特易崩沮設一旦有變則向之怨者為敵也今宜國財與之共竭府粟與之同罄去者應遣濃加寵爵發所在祿之將秩未充餘費宜闕他事負輦長不應與唯可教以搜狩之禮習以鉦鼓之節若假勇以進務黜其身老至而罷賞延于嗣又緣淮城壘皆宜興復使烽鼓相逹兵食相連若邉民請師皆宜莫許逺夷貢至止于報答語以國家之未暇示以何事而非君須內教既立徐料寇形辦騎卒四十萬而中國不擾取榖支二十歲而逺邑不驚然後越淮窮河跨隴出漠亦何適而不可又教之不敦一至于是今士大夫以下父母在而兄弟異計十家而七矣庶人父子殊産亦八家而五矣凡甚者乃危亡不相知飢寒不相恤又嫉謗讒害其間不可稱數宜明其禁以革其風先有善于家者即務其賞自今不改則沒其財又三年之喪天下之逹喪以其哀並衷出故制同外興日久均痛故愈遲齊典漢氏節其臣則可矣薄其子則亂也云何使衰苴之容盡鳴號之音息夫佩玉啓旒深情弗忍冕珠視朝不亦甚乎凡法有變于古而刻于情則莫能順焉至乎敗于禮而安于身必遽而奉之何乃厚于惡薄于善歟今陛下以大孝始基宜反斯􅍝且朝享臨御當近自身始妃主典制宜漸加矯正凡舉天下以奉一君何患不給或帝有集皂之陋后有帛布之鄙亦無取焉且一體炫金不及百兩一歲美衣不過數襲而必收寶連櫝集服纍笥目豈常視身未時親是為櫝帶寶笥著衣空散國家之財徒奔天下之貨而主以此惰禮妃以此傲家是何糜蠧之劇惑鄙之甚逮至婢豎皆無定科一婢之身重婢以使一豎之家列豎以役瓦金皮繡漿酒藿肉者故不可稱紀至有列軿以逰遨飾兵以驅叱不亦重甚哉若禁行賜薄不容致此且細作始并以為儉節而市造華怪即傳于民如此則遷也非罷也凡天下得治者以實而治天下者常虛民之耳目既不可誑治之盈耗立亦隨之故凡厥庶民制度日侈商販之室飾等王侯傭賣之身製均妃后凡一袖之大足斷為兩一裾之長可分為二見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已睥睨宫中朝製一衣庶家晚已裁學侈麗之原實先宫閫又妃主所賜不限髙卑自今以去宜為莭目金魄翠玉錦繡縠羅竒色異章小民既不得服在上亦不得賜若工復造竒伎淫巧則皆焚之而重其罪又置官者將以燮天平氣贊地成功防姦御難治煩理劇使官稱事立人稱官置無空樹散位繁進冗人今髙卑貿實大小反稱名之不定是謂官邪而世廢姬公之制俗傳秦人之法惡明君之典好暗主之事其憎聖愛愚何其甚矣今則宜先省事從而并官置位以周典為式變名以適時為用秦漢末制何足取也當使德厚者位尊位尊者祿重能薄者官賤官賤者秩輕纓冕紱佩稱官以服車騎容衛當職以施又寄土州郡宜通廢罷舊地民户應更置立豈吳邦而有徐邑揚境而宅兖民上淆辰紀下亂畿甸其地如朱方者不宜置州土如江都者應更建邑又民少者易理君近者易歸凡吏皆宜每詳其能每厚其秩為縣不得復用恩家之員為郡不得復選勢族之老又王侯識未堪務不應強仕須冠而啓封能政而議爵且帝子未官人誰謂賤但宜詳置賔友選擇正人亦何必列長史參軍别駕從事然後為貴哉又世有先後業有難易明帝能令其兒不匹光武之子馬貴人能使其家不比隂后之族盛矣哉此于後世不可忘也至當輿抑碎首之忿陛殿延辟戟之威此亦復不可忘也內外之政實不可雜若妃主為人請官者其人宜終身不得為官若請罪者亦終身不得赦罪凡天下所須者才而才誠難知也有深居而言寡則蓄學而無由知有卑處而事隔則懷竒而無由進或復見忌于親故或亦遭讒于貴黨其欲致車右而動御席語天下而辨治亂焉可得哉漫言舉賢則斯人固未得矣宜使世之稱通經逹史辨詞精敏吏能將謀偏術小道者使襪纓危膝博求其用制內外以官之官逺近及仕之類令各以所能而造其室降情以誘之卑身以安之然後察其搖脣吻樹頰胲動精神發意氣語之所至意之所執不過數四間不亦盡可知矣若忠孝廉清之比強正惇柔之倫難以檢格立不可須臾定宜使鄉部求其行守宰察其能竟皆見之于選貴呈之于相主然後處其職宜定其位用如此故應愚鄙盡捐賢明悉舉矣又俗好以毀沈人不知察其所以致毀以譽進人不知測其所以致譽毀徒皆鄙則宜擢其毀者譽黨悉庸則宜退其譽者如此則毀譽不妄善惡分矣又既謂之才則不宜以階級限不應以年齒齊凡貴者好疑人少不知其少于人矣老者亦輕人少不知其不及少矣自釋氏流教其來有源淵檢精測固非深矣舒引容潤既不廣矣然習慧者日替其修束誡者月繁其過遂至糜散錦帛侈飾車從復假粗醫術託雜卜數延妹滿室置酒浹堂寄夫託妻者不無殺子乞兒者繼有而猶倚靈假像背親傲君欺費疾老震損宫邑是乃外刑之所不容􅓍內教之所不悔罪而橫天地之間莫不紆察人不得然豈其鬼歟今宜申嚴佛律禆重國令其疵惡顯著者悉皆能遣除則隨其藝行各為之條使禪義經誦人能其一食不過𬞞衣不出布若應更度者則令先習義行夲其神心必能草腐人天竦精以往者雖侯王家子亦不宜拘凡鬼道惑衆妖巫破俗觸木而言怪者不可數寓采而稱神者非可算其原本是亂男女合飲食因之而以祈祝從之而以報請是亂不誅為害未息凡一苑始立一神初興淫風輒以之而甚今修隄以北置園百里峻山以右居靈十房糜財敗俗其可稱限又針藥之術世寡復修診脈之伎人鮮能逹民因是益徴于鬼遂棄于醫重令耗惑不反死天復半今大醫宜男女習教在所應遣吏受業如此故當愈于媚神之愚徴正湊理之弊矣凡無世不有言事而無時不有令下然而升平不至昏危是繼何哉蓋設令之本非實也又病言不出于謀臣事不便于貴黨輕者抵訾呵駭重者死壓窮擯故西京有方調之誅東郡有黨錮之戮陛下若欲申常令循末典則羣臣在焉若欲改舊章興王道則微臣存矣敢昧死以陳唯陛下察之書奏忤旨厯代名臣奏議卷二十五
