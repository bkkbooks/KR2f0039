body:
  text: 歴代名臣奏議卷五十四明楊士竒等撰治道宋孝宗時朱熹上奏曰臣聞昔者帝舜以百姓不親五品不遜而使契為司徒之官教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信又慮其教之或不從也則命臯陶作士明刑以弼五教而期于無刑焉盖三綱五常天理民彛之大節而治道之本根也故聖人之治為之教以明之為之刑以弼之雖其所施或先或後或緩或急而其丁寜深切之意未嘗不在乎此也乃若三代王者之制則亦有之曰凡聽五刑之訟必原父子之親立君臣之義以權之盖必如此然後輕重之序可得而論淺深之量可得而測而所以悉其聦明致其忠愛者亦始得其所施而不悖此先王之義刑義殺所以雖或傷民之肌膚殘民之軀命然刑一人而天下之人聳然不敢肆意於為惡則是乃所以正直輔翼而若其有常之性也後世之論刑者不知出此其陷於申商之刻薄者既無足論矣至於鄙儒姑息之論異端報應之說俗吏便文自營之計則又一以輕刑為事然刑愈輕而愈不足以厚民之俗徃徃反以長其悖逆作亂之心而使獄訟之愈繁則不講乎先王之法之過也臣伏見近年以来或以妻殺夫或以族子殺族父或以地客殺地主而有司議刑卒從流宥之法夫殺人者不死傷人者不刑雖二帝三王不能以此為治於天下而況於其繫於父子之親君臣之義三綱之重又非凡人之比者乎然臣非敢以此之故遂勸陛下深於用法而果於殺人也但竊以為諸若此𩔖渉於人倫風化之本者有司不以經術義理裁之而世儒之鄙論異端之邪説俗吏之私計得以行乎其間則天理民彛幾何不至於泯滅而舜之所謂無刑者又何日而可期哉故臣伏願陛下深詔中外司政典獄之官凡有獄訟必先論其尊卑上下長幼親踈之分而後聽其曲直之辭凡以下犯上以卑陵尊者雖直不宥其不直者罪加凡人之坐其有不幸至於殺傷者雖有疑慮可憫而至於奏讞亦不許輙用擬貸之例又詔儒臣博采經史以及古今賢哲議論及於教化刑罰之意者刪其精要之語聚為一書以教學古入官之士與凡執法治民之官皆使略知古先聖王所以敦典敷教制刑明辟之大端而不敢隂為姑息果報便文之計則庶幾有以助成世教而仰稱陛下好生惡殺期於無刑之本意熹提舉浙東常平茶鹽公事上奏曰臣聞人主所以制天下之事者本乎一心而心之所主又有天理人欲之異二者一分而公私邪正之塗判矣盖天理者此心之本然循之則其心公而且正人欲者此心之疾疢循之則其心私而且邪公而正者逸而日休私而邪者勞而日拙其效至於治亂安危有大相絶者而其端特在夫一念之間而已舜禹相傳所謂人心惟危道心惟微惟精惟一允執厥中者正謂此也臣嘗竊怪陛下以大有為之資膺受付託憂勤願治恭儉愛民二十年於此矣而間者臨軒慨然發嘆乃或未免以治效之不進為憂因竊以是推之而得其説請昩萬死為陛下一二陳之夫天下之治固必出於一人而天下之事則有非一人所能獨任者是以人君既正其心誠其意於堂阼之上突奥之中而必深求天下敦厚誠實剛明公正之賢以為輔相使之博選士大夫之聦明達理直諒敢言忠信廉節足以有為有守者随其器能寘之列位使之交脩衆職以上輔君徳下固邦本而左右私䙝使令之賤無得以奸其間者有功則乆其任不稱則更求賢者而易之盖其人可退而其位不可以茍充其人可廢而其任不可以輕奪此天理之當然而不可易者也人君察於此理而不敢以一毫私意鑿於其間則其心廓然大公儼然至正泰然行其所無事而坐收百官衆職之成功一或反是則為人欲私意之病其偏黨反側黮闇猜嫌固日擾擾乎方寸之間而姦偽讒慝叢脞眩瞀又將有不可勝言者此亦理之必然也恭惟陛下即政之初盖嘗選建豪英任以政事矣不幸其間不能盡得其人或以庸陋猥𤨏不堪委寄或以朋比欺罔自速罪辜而陛下之心又本有前日權臣跋扈之疑是以不復廣求賢哲而姑取軟熟易制承順不違之人以充其位於是左右私䙝使令之賤始得以奉清閒備驅使而宰相之權日輕既而陛下亦慮其勢有所偏而因重以壅已也則又時聽外庭之論雖甚狂訐無所違忤意者将以隂察此軰之負犯而操切之欲其有所忌憚而不敢肆於為惡陛下之用力則已勞矣而其翕張擒縱之機周防畏備之計又可謂無遺巧矣然而天下之勢終不免於偏有所重而治亂安危之效又未能盡如聖志之所欲盖既未能循天理公聖心以正朝廷之大體則固已失其本矣而又欲兼聽士大夫之公言以為駕馭之術則士大夫之進見有時而近習之從容無間士大夫之禮貎既荘而難親其議論又苦而難入近習便僻側媚之態既足以蠱心志其胥史狡獪之術又足以眩聦明此其生熟甘苦既有所分則恐陛下未及施其駕馭之䇿而先已堕其數中矣是以比来陛下雖欲微抑此輩而此輩之勢日重雖欲兼採公論而士大夫之勢日輕重者既挾其重以竊陛下之權其輕而姦者又借力於陛下之所重以為竊位固寵之計中外相應更濟其私至於姦窮惡稔蹤跡敗露然後其素輕者不免於譴訶然猶委蛇盤礴不失其崇資峻秩而攫取陛下之厚賜優禮以去其素重者則陛下固未嘗一問其朋比援引之姦也日徃月來浸淫耗蝕使陛下之徳業日隳綱紀日壊邪佞充塞貨賂公行兵怨民愁盜賊間作灾異數見饑饉荐臻盖群小相挺人人皆得滿其所欲唯有陛下了無所得而國家顧乃獨受其弊是則陛下之勞既不足以成天下之務而反以敗之其巧既不足以勝群小之姦而反以助成其勢若彼之所以蔽遮天理濁亂聖心則将益深錮而遂至於不可解盖其失萌於一念之疑大臣而其為害輾轉至此所謂差之毫釐謬以千里者臣恐陛下於此偶未察也是以徃嵗䝉恩賜對去年應詔言事皆以明理正心之說陳于陛下之前惓惓深衷實在於此而學淺辭拙不足以起發聖意恐懼至今乃幸復以職事得望清光敢畢其餘忠如此誠願陛下深察天理以公聖心廣求賢才以修聖政則夫左右私䙝使令之賤固已無隙可投以誤恩顧則又痛斥而逺屏之以永除後日蔽遮濁亂深錮之害庶幾天下之事猶可復為而陛下之國家将不至於卒受群小之弊臣至愚極陋學無所成獨有螻蟻愛君憂國之心不能自己妄論至此悲憤填臆伏惟陛下赦其罪而納其忠深為宗廟社稷大計不俟終日斷然行之則不唯愚臣之幸實天下之幸熹直寳文閣上封事曰臣竊惟皇帝陛下有聦明睿智之姿有孝友温恭之徳有寛仁博愛之度有神武不殺之威養徳春宫垂二十年一旦受命慈皇親傳大寳龍飛虎變御極當天凡在覆載之間稍有血氣之屬莫不延頸舉踵觀徳聽風而臣適逄斯時首䝉趣召且辱賜對得近日月之光感幸之深其敢無說以效愚忠之一二盖臣聞古之聖賢窮理盡性備道全徳其所施為雖無不中於義理然猶未嘗少有自足之心是其平居所以操存省察而致其懲忿窒慾遷善改過之功者固無一念之間斷及其身之所履有大變革則又必因是而有以大警動於其心焉所以謹初始而重自新也伊尹之告太甲曰今王嗣厥徳罔不在初又曰今嗣王新服厥命惟新厥徳召公之戒成王曰若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歴年知今我初服肆惟王其疾敬徳盖深以是而望於其君其意亦已切矣今者陛下自儲貳而履至尊由監撫而専聽斷其為身之變革孰有大於此者則凡所以警動其心而謹始自新者計已無所不用其極矣而臣之愚猶竊有懼焉者誠恐萬分有一所以警動自新之目或未悉舉則釁孽之萌将有作於眇綿之間出於防慮之外者是以輙忘踈賤而妄以平日私憂過計之所及者深為陛下籌之則若講學以正心若修身以齊家若逺便嬖以近忠直若抑私恩以抗公道若明義理以絶神姦若擇師傅以輔皇儲若精選任以明體統若振綱紀以厲風俗若節財用以固邦本若脩政事以禦敵國凡是十者皆陛下所當警動自新而不可一有闕焉者也臣不勝犬馬愛君憂國之誠輙敢事為之說而昩死以獻謹條其事如左其一所謂講學以正心者臣聞天下之事其本在於一人而一人之身其主在於一心故人主之心一正則天下之事無有不正人主之心一邪則天下之事無有不邪如表端而影直源濁而流汙其理有必然者是以古先哲王欲明其徳於天下者莫不壹以正心為本然本心之善其體至微而利欲之攻不勝其衆嘗試驗之一日之間聲色臭味㳺衍馳驅土木之華貨利之殖雜進於前日新月盛其間心體湛然善端呈露之時盖絶無而僅有也茍非講學之功有以開明其心而不迷於是非邪正之所在又必信其理之在我而不可以須臾離焉則亦何以得此心之正勝利欲之私而應事物無窮之變乎然所謂學則又有邪正之别焉味聖賢之言以求義理之當察古今之變以驗得失之幾而必反之身以踐其實者學之正也渉獵記誦而以雜博相髙割裂􅏻綴而以華靡相勝反之身則無實措之事則無當者學之邪也學之正而心有不正者鮮矣學之邪而心有不邪者亦鮮矣故講學雖所以為正心之要而學之邪正其繫於所行之得失而不可不審者又如此易曰正其本萬事理差之毫釐繆以千里惟聖明之㽞意焉則天下幸甚其二所謂脩身以齊家者臣聞天下之本在國國之本在家故人主之家齊則天下無不治人主之家不齊則未有能治其天下者也是以三代之盛聖賢之君能脩其政者莫不本於齊家盖男正位乎外女正位乎内而夫婦之别嚴者家之齊也妻齊體於上妾接承於下而嫡庶之分定者家之齊也采有徳戒聲色近嚴敬逺技能者家之齊也内言不出外言不入苞苴不達請謁不行者家之齊也然閨門之内恩常掩義是以雖以英雄之才尚有困於酒色溺於情愛而不能自克者茍非正心脩身動由禮義使之有以服吾之徳而畏吾之威則亦何以正其宫壼杜其請託檢其姻戚而防禍亂之萌哉書曰牝雞之晨惟家之索傳曰福之興莫不本乎室家道之衰莫不始乎梱内惟聖明之㽞意焉則天下幸甚其三所謂逺便嬖以近忠直者臣聞蓬生麻中不扶而直白沙在泥不染而黒故賈誼之言曰習與正人居之不能無正猶生長於齊之地不能不齊言也習與不正人居之不能無不正猶生長於楚之地不能不楚言也是以古之聖賢欲脩身以治人者必逺便嬖以近忠直盖君子小人如冰炭之不相容薰蕕之不相入小人進則君子必退君子親則小人必踈未有可以兼收並蓄而不相害者也能審乎此以定取舍則其見聞之益薰陶之助所以謹邪僻之防安義理之習者自不能已而其舉措刑賞所以施於外者必無偏陂之失一有不審則不惟其妄行請託竊弄威權有以害吾之政事而其導䛕薰染使人不自知覺而與之俱化則其害吾之本心正性又有不可勝言者然而此輩其𩔖不同盖有本出下流不知禮義而稍通文墨者亦有服儒衣冠叨竊科第而實全無行檢者是皆國家之大賊人主之大蜮苟非心正身脩有以灼見其情状如臭惡之可惡則亦何以逺之而来忠直之士望徳業之成乎諸葛亮有言親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時毎與臣論此事未嘗不歎息痛恨於桓靈也本朝大儒程頥在元祐間常進言於朝以為人主當使一日之中親賢士大夫之時多親宦官宫妾之時少則可以涵養氣質薰陶徳性此皆切至之言也然後主不能用亮之言故卒以黄皓陳祗而亡其國元祐大臣亦不能白用頥說故紹聖元符之禍至今言之猶可哀痛前事不逺惟聖明之留意焉則天下幸甚其四所謂抑私恩以抗公道者臣聞天無私覆地無私載日月無私照故王者奉三無私以勞於天下則兼臨博愛廓然大公而天下之人莫不心悦而誠服儻於其間復以新舊而為親踈則其偏黨之情褊狹之度固已使人􅍀然有不服之者而其好惡取舍又必不能中於義理而甚則至於沮謀敗國妨徳亂政而其害有不可勝言者盖左右廝役横加官賞宫府僚屬例得襃遷固不問前例之是非而或者又不問其有無此固舊事之失而不可以不正況今又有蚤懐姦心預自憑結者又将貪天之功以為已力而不顧其仰累於聖徳妒賢嫉能禦下蔽上而不憂其有害於聖政也茍不有以深抑私情痛加屏絶則何以明公道而服衆心革宿弊而防後患乎唐太宗之責龐相壽曰我昔為王為一府作主今為天子為四海作主為四海作主不可偏與一府恩澤若復令爾重位必使為善者皆不用心正為此也又況有國家者當存逺慮若漢髙祖之戮丁公我太祖之薄王溥此其深識雄斷皆可以為後聖法惟聖明之㽞意焉則天下幸甚其五所謂明義理以絶神姦者臣聞天有顯道厥𩔖惟彰作善者降之百祥作不善者降之百殃是以人之禍福皆其自取未有不為善而以諂禱得福者也未有不為惡而以守正得禍者也而況帝王之生實受天命以為郊廟社稷神人之主茍能脩徳行政康濟兆民則灾害之去何待於禳福禄之来何待於禱如其反此則獲罪於天人怨神怒雖欲辟惡鬼以来真人亦無所益又況先王制禮自天子以至於庶人報本享親皆有常典牲器時日皆有常度明有禮樂幽有鬼神一理貫通初無間斷茍禮之所不載即神之所不享是以祭非其鬼即為淫祀淫祀無福經有明文非固設此以禁之乃其理之自然不可得而易也其或恍惚之間如有影響乃是心無所主妄有憂疑遂為巫祝妖人乗間投隙以逞其姦欺誑惑之術既行則其為禍又将無所不至古今以此坐致亂亡者何可勝數其監盖亦非逺苟非致精學問以明性命之理使此心洞然無所疑惑當有即有當無即無則亦何据以秉禮執法而絶妖妄之原乎先王之政執左道以亂政假鬼神以疑衆者皆必誅而不以聽其慮深矣然傳有之明於天地之性者不可惑以神恠明於萬物之情者不可罔以非𩔖則其為妄盖亦不甚難察惟聖明之㽞意焉則天下幸甚其六所謂擇師傅以輔皇儲者臣聞賈誼作保傅傳其言有曰天下之命繫於太子太子之善在於早諭教與選左右教得而左右正則太子正太子正而天下定矣此天下之至言萬世不可易之定論也至論所以教諭之方則必以孝仁禮義為本而其條目之詳則至於容貎詞氣之微衣服器用之細纎悉曲折皆有法度一有過失則史書之䇿宰撤其膳而又必有進善之旌誹謗之木敢諫之鼓瞽詩史書工誦箴諫士傳民語必使至於化與心成中道若性而猶不敢怠焉其選左右之法則有三公之尊有三少之親有道有充有弼有丞上之必得周公太公召公史佚之流乃勝其任下之猶必取於孝弟博聞有道術者不幸一有邪人廁乎其間則必逐而去之是以太子朝夕所與居處出入左右前後無非正人而未嘗見一惡行此三代之君所以有道之長至於累數百年而不失其天下也當誼之時固已病於此法之不備然考孝昭之詔則猶知誦習誼之所言而有以不忘乎先王之意降而及於近世則帝王所以教子之法益踈略矣盖其所以教者不過記誦書札之工而未嘗開以仁孝禮義之習至於容貎詞氣衣服器用則雖極於邪侈而未嘗有以裁之也寮屬具員而無保傅之嚴講讀備禮而無箴規之益至於朝夕所與出入居處而親宻無間者則不過宦官近習掃除趨走之流而已夫以帝王之世當傳付之統上有宗廟社稷之重下有四海烝民之生前有祖宗垂創之艱後有子孫長乆之計而所以輔養之具踈略如此是猶家有明月之珠夜光之璧而委之衢路之側盜賊之衝也豈不危哉詩曰豐水有芑武王豈不仕貽厥孫謀以燕翼子惟聖明之㽞意焉則天下幸甚其七所謂精選任以明體統者臣聞人主以論相為職宰相以正君為職二者各得其職然後體統正而朝廷尊天下之政必出於一而無多門之弊茍當論相者求其適已而不求其正已取其可愛而不取其可畏則人主失其職矣當正君者不以獻可替否為事而以趨和承意為能不以經世宰物為心而以容身固寵為術則宰相失其職矣二者交失其職是以體統不正綱紀不立而左右近習皆得以竊弄威權賣官鬻獄使政體日亂國勢日卑雖有非常之禍伏於冥冥之中而上恬下嬉亦莫知以為慮者是可不察其所以然者而反之以汰其所已用而審其所将用者乎選之以其能正己而可畏則必有以得自重之士而吾所以任之不得不重任之既重則彼得以盡其獻可替否之志而行其經世宰物之心而又公選天下直諒敢言之士使為臺諫給舍以參其議論使吾腹心耳目之寄常在於賢士大夫而不在於群小陟罰臧否之柄常在於廊廟而不出於私門如此而主威不立國勢不彊綱維不舉刑政不清民力不裕軍政不脩者臣不信也書曰成王畏相語曰和臣不忠且以唐太宗之聦明英特號為身兼将相然猶必使天下之事關由宰相審熟便安然後施行盖謂理勢之當然有不可得而易者惟聖明之留意焉則天下幸甚其八所謂振綱紀以厲風俗者臣聞四海之廣兆民至衆人各有意欲行其私而善為治者乃能緫攝而整齊之使之各循其理而莫敢不如吾志之所欲者則以先有綱紀以持之於上而後有風俗以驅之於下也何謂綱紀辨賢否以定上下之分核㓛罪以公賞罰之施也何謂風俗使人皆知善之可慕而必為皆知不善之可羞而必去也然綱紀之所以振則以宰執秉持而不敢失臺諫補察而無所私人主又以其大公至正之心恭己於上而照臨之是以賢者必上不肖者必下有功者必賞有罪者必刑而萬事之統無所闕也綱紀既振則天下之人自将各自矜奮更相勸勉以去惡而從善盖不待黜陟刑賞一一加於其身而禮義之風㢘耻之俗已丕變矣惟至公之道不行於上是以宰執臺諫有不得人黜陟刑賞多出私意而天下之俗遂至於靡然不知名莭行檢之可貴而唯阿䛕軟熟奔競交結之為務一有端言正色於其間則羣譏衆排必使無所容於斯世而後已此其形勢如将傾之屋輪奐丹雘雖未覺其有變於外而材木之心已皆蠧朽腐爛而不可復支持矣茍非斷自聖志灑濯其心而有以大警敕之使小大之臣各舉其職以明黜陟以信刑賞則何以振已頽之綱紀而厲已壊之風俗乎管子曰禮義㢘耻是謂四維四維不張國乃滅亡賈誼嘗為漢文誦之而曰使管子而愚人也則可使管子而少知治體是豈可不為寒心也哉二子之言明白深切非虛語者惟聖明之㽞意焉則天下幸甚其九所謂莭財用以固邦本者臣聞先聖之言治國而有莭用愛人之說盖國家財用皆出於民如有不莭而用度有闕則横賦暴斂必将有及於民者雖有愛人之心而民不被其澤矣是以将愛人者必先莭用此不易之理也國家承五季之弊祖宗創業之初日不暇給未及大為經制故其所以取於民者比之前代已為過厚重以熈豐變法頗有増加而建炎以来地削兵多權宜科派又復數倍供輸日乆民力已殫而間者諸路上供多入内帑是致户部經費不足遂廢祖宗破分之法而上供嵗額必取十分登足而後已期限迫促科責嚴峻監司州縣更相督迫唯務自寛己責何暇更察民情捶撻號呼有使人不忍聞者而州縣嵗入多作上供起發則又於額外巧作名色寅縁刻剥此民力之所以大窮也計其所以至此雖云多是贍軍然内自京師外達郡邑上自宫禁下至胥徒無名浮費亦豈無可省者竊計若能還内帑之入於版曹復破分之法於諸路然後大計中外冗費之可省者悉從廢罷則亦豈不能少有所濟而又擇将帥核軍籍汰浮食廣屯田因時制宜大為分别則供軍不貲之費庶幾亦可減莭而民力之寛於是始可議矣此其事體至大而綱目叢細𩔖非一言之可盡今亦未暇盡為陛下言之惟聖明㽞意其本如上八者而後圖之則天下幸甚缺一條葉適應詔上言曰臣竊以陛下循祖宗之舊特詔近臣於科舉之外薦聞天下之豪儁許以極言當世之事而考察其尤異者秩以不次之爵待以非常之用而天下之豪儁亦莫不欣喜自効願致於其間夫開天下以不諱之門納踈賤於至髙之選此豈非堯舜之盛徳哉而臣之不肖則獨有所甚憂於此何者治道本不如是之易言也而陛下必以言求之使臣而少言之歟則略而不足聽盡言之歟則可以聽而未必信而天下之不知者又将强言之於是天下之言雜然並進而其上莫能擇也則一切以為空言而盡廢之夫以有用之學責臣等而卒不免以空言廢之此非陛下之意也而其勢有必然者盖自慶歴元祐以来著而為書者何其衆也其於天下之治亂軍旅錢糓之大計常先為之畫而以意處之者何其敢決而不疑也其言之多思之深豈無一二足用於世哉而後進之士耳剽目習以為言語文字之流使之運竒於異說之餘而求夸於陳言之外足以敗天下之定勢則夫朝廷之上於其發謀舉事之際而何以為守是故今日之患不患人主之不求言也而患其求之而不及用不患天下之不敢言也而患其盡言而無所用夫上有寛博無忌之心下有慷慨盡言之意皆前世之所不及也而其効止於若此此豈可不為之深憂其故歟以臣所論士之深識逺見卓然特出有志於天地君臣之大義而務盡其精微以興起一代帝王之業者雖以漢唐有國之長其間不過數人而已況其不少槩見而泯没於山巖木石之間者此臣所以中夜竊歎廢食忘寢以為陛下幸使因方正之選萬一能進於朝則其所以稽叅成敗之迹而推原當世之故宜特發其大意而無至於盡言夫廢置更革立命造謀而出政事於天下者天子與大臣之事也而踈逺一介之士豈得以僭言之惟夫居安者不思其危習常者不察其變見近者或忘於逺獨任者或失於人計利太卑而求民太甚持法愈宻而為治愈踈至於經國之規御世之要切近而不為陋宏闊而不為迂盛衰之相因治亂之相易若此者臣皆有以發之夫朝廷之上公卿百官所以統天下而常患於不能知天下之情四海之廣南北異俗賢愚異慮而常患不能通朝廷之意上下不合則禍敗出於其中而不知故臣以為誠略發其大意見於餘篇而又序其所以發者本末如此庶幾無猖狂驚世之論豫定必然之謀以逆堕於空言之譏而失明天子設科之意陛下幸使大臣擇焉君徳一臣聞人君必以其道服天下而不以名位臨天下夫莫尊於君之名莫重於君之位然而不得其道以行之則生殺予奪之命皆無以服天下之心其所以為之臣者特迫於名位而不敢抗耳夫是故以天下之大常沾沾焉疑其並出以撓己而禁防維持之不給尚安能保其民而與之長守而不變哉昔之人思其所以為人君之道以授世主而使操之者其說多而詳矣或以為所寳者在令令行而莫能逆故有㽞令虧令不從令之罰皆至於死或以為權者上之所獨制而不得與臣下共之者也故殺之足以為己威生之足以為己惠而天下之事自己而出者謂之君或以為人主之所恃者法也故不任己而任法以法御天下則雖其父兄親戚而有所不顧此三者雖非先王之所廢也然而不以是先天下而後世之君奈何獨甘心焉是以申商韓非之禍熾於天下而不可禁而其君之徳固已削矣夫偏説鄙論習熟於天下之耳目而近功淺利足以動人主之心於是以智籠愚以巧使拙其待天下之薄而疑先王之陋以為譬若狙猿之牧者數千百年於此矣哀哉盖世有狎猛虎者能使之忘其搏噬之毒以媚己也此豈非智巧之所能為也而況治天下者慈父母之於弱子之𩔖也又非若狎猛虎者之𩔖也智巧何為於此哉以智巧行令其令必壅以智巧用權其權必侵以智巧守法其法必壊臣竊嘗悲當世之故而其義不得以盡言請泛論前世之帝王得失成敗可攷之迹以見其意其逺而在唐虞三代者臣未敢及焉秦始皇漢武帝雄武之資懾服宇内意所誅戮如斃犬豕東征西伐萬里廵狩役使天下以贍其欲而天下之人赫然震恐不敢自必其命若是者有以示天下之威後世之君雖外諱其失而中有羨慕之侈心焉漢之宣帝有明智之才執賞罰之柄足以獨任天下鄙逺俗儒而叅之以覇道略務寛厚而齊之以法律其勤敏不懈而及於工技之細器械之微而天下之人拱手退聽不敢有所自為以逆其上之意若是者有以示天下之權唐之太宗少而為将帥長而為帝王英鋭明達駕馭賢俊利在仁義則行仁義利在兵革則用兵革利在諫諍則聽諫諍惟所利而行之而天下之人懽然畢力願為之用至於斃精罷力繼之以死而不悔若是者有以示天下之功是以後世之君推其求治之心欲庶幾焉而未之得也夫慨然有志者不免於羨慕始皇武帝之侈而精實求治者又止於庶幾宣帝太宗之事然後以其智巧而行申商韓非之說則雖有天下之威也天下之權也天下之功也抑猶未得其所以服天下之道而徒恃夫名位以臨之者也且夫風俗之所繫治化之厚薄享國之長短人心之向背是豈可不㽞意而詳擇也故臣以為天子之明聖誠能破壊數千百年之偏說詖論而無所入於其心雖不逺求唐虞三代之名而近亦無取於漢唐之陋則人主之實徳見於天下而天下服矣君徳二所謂人主之實徳者何也豈不以其容受掩覆大度不疑有以深結其臣民之心歟夫猜忌不信持法必行隂見天下之過而戾戾焉有疾其臣民之心使之脅息自語而不敢肆者則夫容受掩覆大度不疑曠然而與天下為一是宜可以服天下也雖然天下之治非若是而可致也名位者人主之所自有天下不得干也好治之君常恐名位之去已是故或出於令或出於法或出於權役巧任智斷制刑賞以執天下之命若此者凡以為㽞名位之術而不知夫名位者不必㽞而未嘗去也未嘗去而㽞之然後天下始有不安之心不安而将去也則必反之而後可然則容受掩覆大度不疑者是亦㽞名位之術也未有服天下之道也古之聖人自知其身有可以服天下之道而因名位以行之何者天下之政其大者為祭祀兵刑而其小者有期㑹節目之要其逺而萬民而近則羣臣侍御僕從之職其物為子女玉帛器用服食之事而其所分别好惡者則在於君子小人邪正所由之塗也吾之一身足以驗之矣其於事天地尊宗廟也真見其肅恭誠一而不敢懈而神祇祖考之来格也非貎為之敬而意其不吾享也而況於簡慢廢缺而不知畏也其於刑獄殺戮也真見其哀矜惻怛而不忍雖不忍而不可赦也非徒減膳徹樂以為是虛文故事而已也而況於輕怒暴誅喜深而致刻也其於天下之民也真見其可佚而不可勞可安而不可動可與而不可奪也非輕租捐賦寛釋逋負以為之賜也而況於急征横斂而無極也其於羣臣百官也真見其官各有守才各有宜畀之以事而不相易也非貴其所賤親其所踈而要之以報已也而況於姑使之充位而自用也其於聽言受責也真見其過言過行之出有以害天下而幸其臣之告己也非内不樂聞而外為寛容之意以悦天下也於其言也可從則用之真見其朝不能以及夕也不徒聽之而終置之也而况於拒諫塞謗而以不受教為能也其於君子小人也真見君子之可敬而小人之當逺也誠以惡佞䛕而好正救也不徒敬君子以為名而樂小人之自便也而況於踈君子而比小人也其於聲色㳺畋玩好珠玉也真見其簡靜而無欲屏棄而不御也不待於欲之而以理禁之也而況於沉溺堕壊於其中而不知反也積之以嵗月真見其悠乆也煩之以萬機真見其能無倦也凡此者皆實徳也真意實徳充塞於人主之身而施之於天下是故其髙厚可以配天地其明察可以並日月順隂陽之序遂萬物之性裁成輔相以左右民鼓舞動蕩運轉闔闢則令不期而信權不制而尊法不嚴而必兵强國富而討除殘暴不順之夷狄何向而不濟故人主誠自知其身有可以服天下之道則偏説詖論何足以累於其心且夫忽近而務逺虛内以事外惡靜而不能動喜强而實弱此人主之深患也方其長慮逺想拊髀太息而思功業之盛憤夷狄之驕横則欲鋭兵勇将鼓行四出以誅之厭風俗之頽堕則欲考核名實數見賞罰以厲之財之未豐兵之未練則欲講求遺利肄習行伍以精之故夫人主有好治之意如此其急者必自知其所以服天下之道則衆務不勞而並舉矣治勢上欲治天下而不見其勢天下不可治已昔之論治天下者以為三代之時其君各有所尚夏之忠商之質周之文數百年而不變其後周之失弱秦之失强故忠質文之相代若循環之無窮而或者又曰弱之失在於惠也則莫若濟之以威强之失在於威也則莫若反之以惠惠止於賞威止於刑故賞不至於濫而無所勸刑不至於玩而無所懼盖其意以為治天下之勢無出於此矣夫一弛一張者弓也而羿之能不與焉虛而敧滿而覆者器也而倕之巧不與焉故三代非忠質之尚而周秦無强弱之失治天下者姑舍是乎古之人君若堯舜禹湯文武漢之髙祖光武唐之太宗此其人皆能以一身為天下之勢雖其功徳有厚薄治効有淺深而要以為天下之勢在己而不在物夫在己而不在物則天下之事惟其所為而莫或制其後導水土通山澤作舟車剡兵刃立天地之道而列仁義禮樂刑罰慶賞以紀綱天下之民至於賔餞日月秩序寒暑而鳥獸草木之𩔖不能逃於運化之外此皆上世之所未有而聖人自為之者也及其後世天下之勢在物而不在己故其勢之至也湯湯然而莫能遏反舉人君威福之柄以佐其鋒至其去也坐視而不能止而國家随之以亡夫不能以一身為天下之勢而用區區之刑賞以就天下之勢而求安其身者臣未見其可也盖天下之勢有在於外戚者矣吕霍上官非不可以監也而王氏卒以亡漢有在於權臣者矣漢之曹氏魏之司馬氏至於江南之齊梁皆親見其篡奪之禍習以其天下之與人而不恠而其甚也宦官之微匹夫之奮呼士卒之擅命而天下之勢無不在焉若夫五胡之亂西晋之傾覆此其患特起於公卿子弟里巷書生㳺談聚論沈湎滛佚而已而天地為之分裂者數十世嗚呼勢在天下而人君以其身求容焉猶豫反側而不能以自定其或在於宦官或在於士卒而舉威福之柄以盡寄之者此甚可嘆也臣嘗恠唐末五代之衰皆以列校之卑易置人主如反掌之易而周世宗一日臨大位北威契丹南服李璟法度脩舉文武並用太祖皇帝踐阼十年之間不耀兵甲俘取僭偽之君若拾遺而天下為一身致太平為子孫萬世之計向之衰敗圯缺二百餘年英武之君忠智之臣圖回收取不能什一而孱王幼主俯首服從相顧憤發以至於流涕痛哭莫敢誰何者一朝翕然皆在把握之内何其速也此無他能以其身為天下之勢則天下之勢亦環向而從己其必然而無疑者矣且均是人也而何以相使均是好惡利欲也而何以相治智者豈不能自謀勇者豈不能自衛一人刑而天下何必畏一人賞而天下何必慕而刑賞生殺豈以吾能為之而足以制天下者雖然鳥髙飛於重雲之上魚深㳺於潜淵之下而皆不免有鼎俎之憂天下之人所以奔走後先維附聨絡而不敢自棄者誠以勢之所在也故夫勢者天下之至神也合則治離則亂張則盛弛則衰續則存絶則亡臣嘗考之於載籍自有天地以来其合離張弛絶續之變凡幾見矣知其勢而以一身為之此治天下之大原也治勢中臣請言祖宗天下之勢天下之勢其亂也有門其亡也有塗夫髙垣厚鐍足以備盜賊於外者此衆人之所為無憂也盜賊在内而與我共其垣鐍而納外宼者此憂之所不及也天下之亂與亡有五而人主之得罪於民不與焉一曰女寵二曰宦官三曰外戚四曰權臣五曰姦臣此非特秦漢之近事為然也而三代亦莫不然是五者有一焉此其天下未遽亂也未遽亡也而天下之垣鐍已與我共之矣發以虐政致以嚴刑而播人主之失徳於天下然後乗之以水旱動之以甲兵則小者亂大者亡是故善治天下者不惟閉是門也又使其門陋而不足求不惟塞是塗也又使其塗微而不足行太祖太宗削平専國統一方夏真宗仁宗祈天永命乂安海宇當是時也其要在使天下無女寵無宦官無外戚無權臣無姦臣随其萌蘖尋即除治而又蹙狹其門顛錯其塗使其至者蹊隧絶滅四顧而問不得其所求俛首而去之宫中之裁決大臣之平章近臣之獻納小臣之議論無不咸出於此操天下之垣鐍以與天下共守之而無所害是故以言其井地牧民稅賦均一則不如周羣臣材智赴功遵力則不如漢蓄積富厚國用沛然則不如隋拓地沙漠冠帶夷蠻則不如唐然而天下之勢周宻而無間附固而無隙不忽治而乍亂幾亡而僅存可以傳之後世垂之無極則逺過於前代夫學者之言治也其逺而在堯舜則常苦於迂闊而不信其近而在漢唐而可信也則又以其不能乆安長治而不足稱然則祖宗之天下亦可謂盛治而無以加矣而中國之所患者遼人也夏人也夏小而悍遼大而驕大而驕者或汎遣命使傳道言語以示其嫚侮之意則天下恐然如有百萬之師申嚴警備旁及嶺海為之益金幣厚書辭水陸之産百物畢致以中其欲小者或狂僭自大竊擾邉鄙則大師貴将相次陷没配民為兵多至百萬分遣大臣經略中外朝野聚議謀畫屢請而卒之天下困弊一方空虛曽不足以奏一戰之㨗然而朝廷之上羈縻慰撫不失其歡而天下之士相與慷慨憤激𣺌然長慮以為不可以乆也故其大言者則欲脩改法度振起弊事使天下富强将士用命然後鞭笞而臣服之小言者則欲絶賂以鬬之反間以亂之屢出以擾之委西北之地使之人自為守以持之而其所謂見逺察微之論者則皆以為異日天下之大禍存亡之所由分必出於二敵而不可救嗟乎處至足已安之勢而有慊然未厭之心深思極智以為國家憂未然之外其意誠若此矣而況於二敵之必然歟雖然法始變於熈寜成於元豐雖中沮於元祐而卒行於紹述之後凡祖宗之舊廢革無餘則其大言者既盡行之矣前取蘭㑹後取鄯善招拊族帳以剪西人之手足則其小者又略試之矣二敵卒無患也而天祚昏虐反足以自亡其國而已尚何足以為天下之憂哉則見逺察微之論習於目前而終不之驗歟且夫當中國安富契丹抗衡之際天下豈復知有女真也哉彼其﨑嶇種落人卒不當一校而豈有窺窬二大國之意於數百年之前者乎盖所以致靖康之變者昔之五患有其四焉耳由此言之天下之勢在内而不在外也故其上莫若使勢在己而不在物其次莫若使勢在内而不在外忘内憂外以起内亂其為計也末矣治勢下臣請言今天下之勢昔者天下無事忘戰乆矣女真起東北小國一日棄薦章挾勁騎直越燕趙躐齊魯遂至勾吳以觀南海中有大河江流孟門太行之險而不能為之限所過城邑無不開門迎勞行留自恣莫敢襲逐而奔走之民所在聚為羣盜以自相摽抄而已天子方親御征伐之事博采謀議而羣臣從官亦皆戎服肄習撃刺之術以拒胡又十有餘年而天下始益習兵革有輕死犯難敢戰喜敵之氣誠使因而用之暫失之地不難得也於是天子厭武亟詔罷兵修立文事於傷殘廢缺之時置學官飲鄉射定經界建賔館懐徕逺人以文太平既而連嵗屢豐州縣充實西北之避地者即其所至著籍為民而淮楚徹亭檄之警商賈徃来道路無禁然後天下始復帖息以室家妻子為意邈然忘其南北之事父兄門户之耻矣夫習危者其動易習安者其變難不然則紹興之末戎王以殘虐失衆嘗舉傾國之力聲搖江漢既而不戰自斃狼顧北還無復行伍而清鄆亳宋之間豪傑響應執殺其吏處處屯結或號三十萬衆以請命於王師此豈非其可以按劒抵掌經營河洛上以厲莭義下以報讎耻千載之一時者哉然而天下之意終以不振竊議轉語惟恐好使之不復通則習安難變乃其勢之必然歟臣觀今天下之士惟其嗜利無行者乃或叩閽投匭妄論形勢更易風雲之陣䟽釋孫吳之言請對便殿條畫邉要指心誓日以功名自詭及其寵異逾等尊用過望乃始徐托罪咎引身而去其大略如此而忠厚難進明見利害之人則皆深念根本之重以為不可輙發顧今天下之勢其於長淮以南上下乂安法令明具而徳澤所被民心不搖無以異於祖宗之勢然其於并兼進取則固已難矣陛下英武神斷廓清宇内如其責成将率使各盡力執大義以誅强讎則天下可以拱揖而定也而乃使之分治刑獄刺舉官吏或脱弁釋楯而為儒臣叅用牧守列布内地而士之纎弱無勇者乃反教以弓矢合射於庭而其偃蹇於州縣者亦或許之自薦而優以右職何哉豈非欲以變今之勢而後用之歟臣之不肖盖嘗籌之以為使今之天下自安而忘戰則不可使之自危而求戰盡變而能戰又大不可也何也盖世有陳設珍器調諧絲竹而飲酒歌舞以為樂者而其外且有焚溺之患卒然之憂焉則其主人何以待之歟将使其客盡廢其歌舞飲酒而褰裳濡足以救之歟則其勢不可以盡能而徒傷其樂且其徃救也則其樂必不竟而奴婢之無頼者顧從而竊之矣然則亦付之其人而已使其外不失為捍患而内無以傷吾樂患去功成而飲酒歌舞者不知焉斯天下以為賢且智矣夫何以異此强其所未能廢其所已能其要在於天下之皆能也皆能而臣竊憂其患之有不可勝諱者矣昔者秦人之患在於不能兼六國也是以日夜激厲其民使之功賞相長五甲首而肄五家當此之時秦人五尺童子皆有疾視山東之意由今計之六國未兼天下未一非秦人之所當患而長有其秦以及於天下者此秦人之所當講也若夫成王之於周太宗之於唐則不然剪商奄平淮夷驅逐虎豹犀象未嘗寜息取突厥滅髙昌吐谷渾東西征討用兵不廢而其朝廷之内郡國之外制禮作樂鳴玉曵組誦其詩讀其書而考其文義之彬彬焉是故享成功之利而不受其害然則天下之勢固不可使之盡變也國本上國本者民歟重民力歟厚民生歟惜民財歟本於民而從為國歟昔之言國本者盖若是矣臣之所謂本則有異焉臣之所謂本者本其所以為國之意而未及於民臣非以民為不足恃也以為古之人君非不知愛民而不能愛民者意有所失於内則政有所害於外也夫國於天地必有與立亦必有與亡孟子曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然且其昔何為而仁今何為而不仁使其後世之所以守天下者皆如其始之所以得天下則何為而失之嗚呼是豈不可以深思而極論乎夫植木於地者其華葉充榮者末也其根據盤亙者本也此衆人之所知耳夫根據盤互不徒本也自其封殖培養之始必得其所以生之意而後天地之氣能生之一日失其意則夫根據盤互者拜然顛蹶焦然枯槁而已矣地安能受之哉臣嘗論周人之得天下比三代最為長乆此非數也后棄在唐虞之時已為稷官傳十四五世而未嘗有失其所以得國之意者然後文武受天眷命而天下之諸侯挈商而歸周至於成康之後則漸已失之獨一宣王脩舊起廢能復求文武之意遂稱中興及其後世東遷而惠襄靈景之君甘召單劉之臣所以施於天下者悖謬而非先王之意至於益衰而自分為東西則其憲章文物莫有識者而塊然獨守其鼎然後其祖宗之意盡失而不繼以至於亡然則其所以不仁者不能如祖宗之仁而已若夫漢之髙祖唐之太宗起於細微單人挺劒特起臂指天下而四海之雄無不束手受事相與於草創之中拜伏俛仰而為之臣建置宗廟而立其典法以垂後世此雖不足以望周人積累之盛然而要其所以得之者必有合天之心順民之心而非偶然而自得之也故其後世若武帝明皇失其意則亂光武憲宗復得其意則興而元成穆敬沈溺宴安莫知其祖宗之所以致此者何也徒憑藉而有之則其業遂以衰敗而亡故臣以謂繼世而有天下其中才者固能守祖宗之意其賢聖者則増益祖宗之意其好謀而寡徳者徒以變亂祖宗之意而昏童不肖者則又不知祖宗之意故其為興亡治亂皆可考而無疑噫有志之君長睨逺覽欲以跨越前代而不能深知祖宗所以得天下之意施於今者忘其昔謀其新者非其舊動搖侵伐其為國之本而使之削薄而不悟此豈非其故臣遺老莫有以告之者歟其告而不之信歟春秋之時晉魏舒韓不信合諸侯以城成周而宋仲幾不受功指踐土之盟以為據當是時韓簡子與其佐士彌牟皆不能知也曰晉之從政者新子姑受功歸吾視諸故府仲幾不肯曰縱子忘之山川鬼神其忘諸乎彌牟反怒其誣已而執辱之嗚呼踐土之盟晉文公之所以主諸侯也諸侯猶記其舊而晉之從政大夫曽莫識焉則其後世之失覇不亦宜乎恭惟宋有天下肇立基本不以智力為治不以兵甲為彊不以險要為固功徳茂盛源流深逺聖人繼作因時制事微有變更而其為國之大意常増益而不廢天下之人受其隂利厚澤不知其所從来況於臣之淺陋何足究述謹擇其意之尤大與國家相為終始者二事事為一篇具䟽其説以獻竊以天子之明聖誠已知之而猶言之則愛君之忠不為煩未察而先言之則告君之義不為過而臣之區區畢於此矣國本中其一曰禮臣臣聞刑法所以待天下之有罪雖至親隆貴不得輙私而雖至親隆貴不能無罪則刑法不得不用然臣以為人主能使其臣無犯君之法不當以刑法御其臣夫人主之所與共守其國家者自宰相以下至於一命之士皆必得天下之賢材而用之其不能無犯法者不得居也當舜之時既放棄共鯀驩兠之徒其所與為臣工岳牧者皆忠肅和惠明允篤誠之士故其治化之成至於匹夫小民猶無犯法者而況其官師乎其後周文武最能得天下之賢材而用之遇以信厚而折旋之以禮樂故其詩曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜夫聚賢材於朝而分之以百官之事被服有雲龍藻火之章駕乗有和鑾旗旄之莭以至奉牲幣執豆籩薦告宗廟𩔖祀天神其盛若此而桎梧廢放黥劓殺戮之人安得叅於其間揚雄有言曰周之士也貴夫士貴而後官貴官貴而後國貴國貴而後主尊然則周文武之所以貴其士禮其臣者能使之無犯法而未嘗以刑法御之者也取不能無犯法之人而材諸位則不免於以法御之有以刑法御其臣之心則方其唯諾殿上委任尊寵若将有腹心股肱之寄者俄而桎梏廢放黥劓殺戮無所寛貸而其臣亦不能自必也故輕為姦而多犯法嗚呼此非國家之利也漢髙祖嘗裂數千里地使大功臣十數人得南面而稱王既而擒滅葅醢至於宗族無有遺𩔖其臣遂以禽獸自比故後世子孫習見前事不難於髙爵重位以寵秩不肖之人而亦輕於以鈇鉞刀鋸加其身唐太宗嘗喜張藴古所上大寳箴以為愛己一旦以治獄疑似遽命斬之謂盧祖尚文武忠義使督交趾祖尚再三辭行亦誅死於朝堂而不以為恠其臣如王珪魏徴號為面折庭爭亦莫有以為非者然則當時以刑法御其下而快喜怒於殺戮雖髙祖太宗之明不能免也噫以刑法御其下將以防姦臣而豈有意於輕殺人也哉自今效之其姦臣未必得罪而連頸就戮前後相望者皆善人君子也夫不能以禮化姦臣之心而以刑濫忠臣之罰國家将何便焉適所以借姦臣而為之資耳盖舜文王之意迄周衰而亡歴秦漢隋唐而不復興至於藝祖太宗而後盡去前世帝王苛刻猜忍之意一以寛大誠信進退禮節遇其臣下受禪之始因其故相委任若六年而後罷太宗召拜近臣嘗命擇良日曰朕欲其保終吉也盧多遜事發當時以為所坐大逆法既具矣以其嘗典國事止命竄流盖漢之三公無以善去位者不自殺則受誅其輕甚者猶以醜辭䇿之而自真宗仁宗以来執政大臣之将去也必使之連䟽自乞若将不得已而後從者又為之遷官加賜而付以重地前世之臣以諫諍忤㫖而死者皆是也祖宗不惟不怒又遷擢之以至於公卿神宗嘗疑其臣之罷惰而不任職者當汰而不忍始益宫觀之員廪之以粟而不責以事後遂為定法其後章惇弄權嘗欲興劉摯之獄以殺黨人而哲宗不從蔡京當國又欲殺天下士而徽宗不聽紹興初誤聽宰相誅諫官二人尋復自悔下詔責躬以謝天下故雖權臣用事二十年間予奪惟意而無殺士大夫之禍夫進人以禮退人以義而不以刑法御其臣者無過於祖宗之世而不使姦臣妄殺一士者亦無過於祖宗之世盖秦漢之風息滅不繼而舜文王之意復興天下之臣至有怯懦過當舉手畏法者矣未有强復不遜傲法以自便者也若其逆亂反側起於父兄子弟之間者盖不復有矣夫不以刑法御臣下而與臣下共守法此豈非祖宗為國之本意而舜文王之俗然歟國本下其二曰恤刑臣惟歴代用刑各有輕重不能盡舉然大要其君賢而所任者仁人也則用刑常輕其君不賢而所任者非仁人也則用刑常重非惟用刑為然也而歴代之議刑者亦莫不然盖其人君子也則議刑常輕其人小人也則議刑常重故觀其所用可以知其國觀其所議可以知其人然而未也盖其君賢君也而用刑不免於過重其人君子也而議刑亦不免於過重以為重刑所以致治非重刑而天下不可治者是可嘆也天下苦秦之刑重而欲輕之乆矣然而随其時之輕重而終於不能輕一代之刑夫後世有天下之長者莫若漢與唐其能求所以輕刑之意者亦莫若漢與唐而卒之能輕一代之刑者莫若吾宋也漢唐之時雖號治世猶多造大獄根連株送或數千里㑹逮乆者積數嵗而不觧公卿以下重足待命其論囚報重一郡之内一日有殺至數百人凡此者今天下之所未嘗有也五代暴亂承用重刑盜一錢以上輙坐死而茶鹽𣙜酤升合銖兩之犯至無生出者犴獄所用尤殘酷無法不啻若桀紂祖宗之世或漸輕之或盡除之而參刑具五刑相收連坐之刑皆漢唐之所常用者此亦今天下之所未嘗見聞也夫以前世用刑之重而民亦無畏刑之心滋長其悍虐視性命生死如旦暮或白晝挺刄殺人於市或報仇行俠而天下大姓姦豪皆持生殺人之權殺人未必死傷人未必刑而弱子幼弟有竊息而不敢言者少年亡賴篡人於獄官寺之外商旅至不敢行若此今皆民之所無也夫天下之俗燕趙强果呉楚輕鬬蜀人多怨至於激其所耻動其所憤皆有不畏死之心惟至仁可以柔之雖其自棄於盜賊者亦非重法之所能治此今日之所以用刑獨輕於前世而民之自愛而畏法亦逺過於前世也雖然今世之用刑比漢唐為輕比三代則為重而後世之所以制刑者則雖三代不能及也夫山澤之産三代雖不以與民而亦未嘗禁民以自利均田輕税而民無為生之苦惟其狼戾不遜以身犯法者乃得而刑誅之要之今世之民自得罪者其實無幾而坐鹽茶𣙜酤及它比巧法田役稅賦之不齊以陷於罪者十分之居其六七矣故曰比三代之刑為重三代之肉刑也其刑雖省而一或行之則其肢體殘壊至於終身亦已甚矣文王周公盖相承而不能變而論者則以為後世之刑不及上世之肉刑也豈不痛哉嗚呼後世之制刑仁於三代今既行之矣今世之用刑重於三代顧未能輕也則恤之而已矣然則祖宗之恤刑可謂至矣以恤刑之仁行制刑之仁輕於漢唐而庶幾於三代深者無公名平者無後患重失入之坐厚雪寃之賞是故無智力之治無兵甲之强無險要之固徳澤雖未大利於天下而民不攜貳天下安寜室家相保未嘗有匹夫横行之變下人謀上之姦者能隆禮以御其臣而恤刑以愛其民故此二者國家之大本無窮之祚不可變之俗也故臣之不肖以為誠使天下之賢君不免有重刑之心而天下之君子不免有重議刑之心者其禍最大其憂最甚此不可以不極慮而深言也嗚呼有自来矣求一切之治而不知天下之情怒一人之罪而有并嫉天下之意用一朝之決貽無窮之患而不察也豈不過哉夫二百餘年之國本在是天下安之也乆矣培之使益堅養之使不傷夫誰得而動之不顧而變其安危之端必自是始雖賈誼陸贄復生為今日計未有以易此也民事上古者民與君為一後世民與君為二古者君既養民又教民然後治民而其力常有餘後世不養不教專治民而其力猶不足古者民以不足病其官後世官以不足病其民凡後世之治無不與古異故論古者事逺而不可行因今者冐行而不可安嗟乎其孰能任是乎夫太息而言古義於今必不能改将安所用徒以為笑於執事者而已雖然不可不知也夫善論古者必始於田制徒田制而已何足言也古之為民無不出於君者豈直授之田而已哉其室廬器用食物百工之須雖非必其君交手以付之然既已為之設官置吏以教之通其有無補其不足其耕耘斂藏播藝之術必使之觀隂陽習四時而山澤之所有皆開示而勸求之其牛馬六畜家之所藏必知其數其婚姻祠祀疾痛死喪必知其急其官自下士至於三公位之登降必因其民之衆寡其意以謂民皆不自能也故其治之之詳如此雖然其役民之多用民之繁取其稅賦以供上之用度而春秋蜡社以禮㑹民鄉射讀法比之於閭胥用之於軍旅役之於府史胥徒宫室道路之事凡此有後世之所無者其要以為養之者備則其役之不得不多治之者詳則其用之不得不煩君民上下皆出於一本而已後世養之者不備治之者不詳使民自能而不知恤其所以設官置吏貴賤相承皆因民之自能者遂從而取之或有天患民病嘗一減租稅内出粟以示賑贍之意則以為施大恩徳於天下君臣相顧動色稱賀書之史官以為盛美其君民上下判然出於二本反若外為之以臨其民者故比閭族黨聮㑹考察之法一切盡廢以其不足者病民以其不養不教者治民毅然為之而無所愧而民亦習於自能而無求於其上而徒以為上之治我也故俛然受之而不敢辭其乖戾反忤而治道卒無一成之効者不特一世為然也雖然自漢至唐猶有授田之制則其君猶有以屬民也猶有受役之法則其民猶有以事君也盖至於今授田之制亡矣民自以私相賣易而官反為之司契劵而取其直而民又有於法不得占田者謂之户絶而沒官其出以與民者謂之官自賣田其價與私買等或反貴之然而民樂私自買而不樂與官市以為官所以取之者衆而無名也是官無以屬民也受役之法壊而官以傭錢自募浮浪不事事之人官民之急不相知也其有求請而相闗通者既視若敵國大抵今世之民分而為三齊民一也軍旅二也役人三也而齊民之間又相分異不知其幾是其民無以事君也君無以屬民民無以事君然則立州縣有官吏相事相使相君相長不異於古者徒有君民之勢爾世之俗吏見近忘逺将因今之故巧立名字並縁侵取求民無已變生養之仁為漁食之政上下相安不以為非嗚呼為古之民獨何幸而今使之至此也臣毎見今之吏所謂勸農者未嘗不竊嘆也夫官有田而民不知種有地而民不知闢故使吏勸之今其有者厚價以賣之無者半租以庸之是容有惰㳺者也故有求農而不得無得地而不農也官無遺地民無遺力而嵗以二月長吏集僚屬至近郊召父老而飲食之為之文以告之既告而去之若此者何也若其州縣荒闊良田沃土不耕不殖者朝廷當為之立法以来農民而使之從事焉耳豈為區區之文告哉為民田者無所用勸為官田者徒勸而不從君民二本古今異治而曰我無求為唐虞三代噫唐虞三代其果不足為矣民事中為國之要在於得民民多則田墾而稅增役衆而兵强田墾稅增役衆兵强則所為而必從所欲而必遂是故昔者戰國相傾莫急於致民商鞅所以壊井田開阡陌者誘三晉願耕之民以實秦地漢末天下殫殘而三國争利孫權捜取山越之衆以為民至於帆海絶徼俘執島居之夷而用之諸葛亮行師號為秉義不妄虜獲亦㧞隴上家屬以還漢中盖蜀之亡也為户二十四萬呉之亡也為户五十餘萬而魏不能百萬而已舉天下之大不當全漢數郡之衆然則因民之衆寡為國之强弱自古而然矣今天下之州縣直以見入職貢者言之除已募而為兵者數百十萬人其去而為浮屠老子及為役而未受度者又數十萬人若此皆不論也而户口昌熾生齒繁衍幾及全盛之世其衆强富大之形宜無敵於天下然而偏聚而不均勢屬而不親是故無墾田之利無增稅之入役不衆兵不强反有貧弱之實見於外民雖多而不知所以用之直聽其自生自死而已而州縣又有因其丁中而裁取其絹價者此其意豈以為民不當生於王之土地而征之者歟夫前世之致民甚難待其衆多而用之有終不得者今也欲有内外之事因衆多已成之民率以北向夫孰敢爭者而論者曽莫以為意此不知其本之甚者也以臣計之有民必使之闢地闢地則增稅故其居則可以為役出則可以為兵而今也不然使之窮苦憔悴無地以自業其駑鈍不才者且為浮客為傭力其懐利强力者則為商賈為竊盜茍得旦暮之食而不能為家豐年樂嵗市無貴糶而民常患夫斗升之求無所從給大抵得以稅與役自通於官者不能三之一有田者不自墾而能墾者非其田此其所以雖蕃熾昌衍而其上不得而用之者也嗚呼亦其勢之有不得不然者矣夫呉越之地自錢氏時獨不被兵又以四十年都邑之盛四方流徙盡集於千里之内而衣冠貴人不知其幾族故以十五州之衆當今天下之半計其地不足以居其半而米粟布帛之直三倍於舊雞豚菜茹樵薪之鬻五倍於舊田宅之價十倍於舊其便利上腴爭取而不置者數十百倍於舊盖秦制萬户為縣而宋齊之間山隂最大而難治然猶不過三萬今兩浙之下縣以三萬户率者不數也夫舉天下之民未得其所猶不足為意而此一路之生聚近在畿甸之間者十年之後将何以救之乎夫迹其民多而地不足若此則其窮而無告者其上豈宜有不察者乎田無所墾而稅不得增徒相聚博取攘竊以為衣食使其俗貪詐淫靡而無信義忠厚之行則将盡棄而魚肉之乎噫此不可不慮也漢之末年荆楚甚盛不惟民户繁實地著充滿而材智勇力之士森然出於其中孫劉資之以爭天下及其更唐五代不復振起今皆為下州小縣乃無一士生其間者而閩浙之盛自唐而始乃獨為東南之望然則亦古所未有也極其盛而将坐待其衰此豈智者之為乎且其土地之廣者伏藏狐兔平野而居虎狼荒墟林莽數千里無聚落姦人亡命之所窟宅其地氣蒸鬰而不遂而其狹者鑿山捍海摘抉遺利地之生育有限而民之鋤耨無窮至於動傷隂陽侵敗五行使其地力竭而不應天氣尤而不屬肩摩袂錯愁居戚處不自聊賴則臣恐二者之皆病也夫分閩浙以實荆楚去狹而就廣田益墾而稅益增其出可以為兵其居可以為役財不理而自富此當今之急務也而論者則又将曰慮其因徙而生變夫豈有不變之術而未之思乎抑聽其自變者乎民事下今之言愛民者臣知其説矣俗吏見近事儒者好逺謀故小者欲抑奪兼并之家以寛細民而大者則欲復古井田之制使其民悉得其利夫抑兼并之術吏之彊敏有必行之於州縣者矣而井田之制百年之間士方且相與按圖而畫之轉以相授而自嫌其迂未敢有以告於上者雖告亦莫之聽也夫二說者其為論雖可通而皆非有益於當世為治之道終不在此且不得天下之田盡在官則不可以為井而臣以為雖不得天下之田盡在官文武周公復出而治天下亦不必為井何者其為法𤨏細煩宻非今天下之所能為昔者自黄帝至於成周天子所自治者皆是一國之地是以尺寸歩畆可歴見於鄉遂之中而置官師役民夫正疆界治溝洫終嵗辛苦以井田為事而諸侯亦各自治其國百世不移故井田之法可頒於天下然江漢以南濰淄以東其不能為者不强使也今天下為一國雖有郡縣吏皆緫於上率二三嵗一代其間大吏有不能一嵗半嵗而代去者是将使誰為之乎就使為之非少假十數嵗不能定也此十數嵗之内天下将不暇耕乎井田之制雖先廢於商鞅而後諸侯亡封建絶井田雖在亦不能獨存矣故井田封建相待而行者也夫畎遂溝洫環田而為之間田而䟽之要以為人力備盡望之而可觀而得粟之多寡則無異於後世且大陂長堰因山為源鍾固流潦視時決之法簡而易周力少而用博使後世之治無愧於三代則為田之利使民自養於中亦獨何異於古故後世之所以為不如三代者罪在於不能使天下無貧民而不在乎田之必為井不為井也夫已逺者不追已廢者難因今故堰遺陂在百年之外瀦防衆流即之𣺌然瀰漫千頃者如其湮淤絶滅尚不可求而況井田逺在數千嵗之上今其阡陌連亘墟聚遷改盖欲求商鞅之所變且不可得矣孔孟生衰周之時井田雖不治而其大約具在故勤勤以經界為意歎息先王之良法廢慢於暴君汙吏之手後之儒者乃欲以其耳目所不聞不見之遺言顧從而効之亦咨嗟嘆惜以為不可廢豈不難乎井田既然矣今俗吏欲抑兼并破富人以扶貧弱者意則善矣此可随時施之於其所治耳非上之所恃以為治也夫州縣獄訟繁多終日之力不能勝大半為富人役耳是以吏不勝忿常欲起而誅之縣官不幸而失養民之權轉歸於富人其積非一世也小民之無田者假田於富人得田而無以為耕借資於富人嵗時有急求於富人其甚者庸作奴婢歸於富人㳺手末作俳優伎藝傳食於富人而又上當官輸雜出無數吏常有非時之責無以應上命常取具於富人然則富人者州縣之本上下之賴也富人為天子養小民又供上用雖厚取贏以自封殖計其勤勞亦略相當矣廼其豪暴過甚兼取無已者吏當教戒之不可教戒随事而治之使之自改則止矣不宜豫置嫉惡於其心茍欲以立威取名也夫人主既未能自養小民而吏先以破壊富人為事徒使其客主相怨有不安之心此非善為治者也故臣以為儒者復井田之學可罷而俗吏抑兼并富人之意可損因時施智觀世立法誠使制度定於上十年之後無甚富甚貧之民兼并不抑而自已使天下速得生養之利此天子與其羣臣當汲汲為之不然古井田終不可行今之制度又不復立虛談相眩上下乖忤俗吏以卑為實儒者以髙為名天下何從而治哉理財上夫理財與聚斂異今之言理財者聚斂而已矣非獨今之言理財者也自周衰而其義失以為取諸民而供上用故謂之理財而其善者則取之巧而民不知上有餘而下不困斯其為理財而已矣故君子避理財之名而小人執理財之權夫君子不知其義而徒有仁義之意以為理之者必取之也是故避弗為小人無仁義之意而有聚斂之資雖非有益於己而務以多取為悦是故當之而不辭執之而弗置而其上亦以君子為不能也故舉天下之大計屬之小人雖明知其負天下之不義而莫之卹以為是固當然而不疑也嗚呼使君子避理財之名小人執理財之權而上之任用亦出於小人而無愧民之受病國之受謗何時而已夫聚天下之人則不可以無衣食之具衣食之具或此有而彼亡或彼多而此寡或不求則伏而不見或無節則散而莫收或消削而浸微或少竭而不繼或其源雖在而浚導之無法則其流壅遏而不行是故以天下之財與天下共理之者大禹周公是也古之人未有不善理財而為聖君賢臣者也若是者其上之用度固已沛然滿足而不匱矣後世之論則以為小人善理財而聖賢不為利也聖賢誠不為利也上下不給而聖賢不知所以通之徒曰我不為利也此其所以使小人為之而無疑歟熈寜之大臣慕周公之理財為市易之司以奪商賈之贏分天下以債而取其什二之息曰此周公泉府之法也天下之為君子者又從而爭之曰此非周公之法也周公不為利也其人又從而解之曰此真周公之法也聖人之意六經之書而後世不足以知之以此嗤笑其辨者然而其法行而天下終以大弊故今之君子真以為聖賢不理財言理財者必小人而後可矣夫泉府之法斂市之不售貨之滯於民用者以其賈賣之其賒者祭祀喪紀皆有數而以國服為之息若此者真周公所為也何者當是時天下號為齊民未有特富者也開闔斂散輕重之權一出於上均之田而使之耕築之室而使之居衣食之具無不畢與然而祭祀喪紀猶有所不足而取於常數之外若是者周公不與則誰與之将無以充其用而遂與之也則民一切仰上而其費無名故賖而貸之使以日數償而以其所服者為息且其市之售貨之滯於民用者民不足於此而上不斂之則為不仁然則二者之法非周公誰為之盖三代固行之矣今天下之民不齊乆矣開闔斂散輕重之權不一出於上而富人大賈分而有之不知其幾千百年也而遽奪之可乎奪之可也嫉其自利而欲為國利可乎嗚呼居今之世周公固不行是法矣夫學周公之法於數千嵗之後世異時殊不可行而行之者固不足以理財也謂周公不為是法而以聖賢之道不出於理財者是足為深知周公乎且使周公為之固不以自利雖百取而不害而況其盡與之乎然則柰何君子避理財之名茍欲以不言利為義坐視小人為之亦以為當然而無恠也徒從其後頻蹙而議之厲色而爭之耳然則仁者固如是耶今天下之財亦可得而略計矣黄帝堯舜以來財之在天下今其不知取者幾也秦漢之後創取於民後世日以增益今其棄而不求者幾也天下之遺利天下之所不知不得而用之者幾也抑猶有上之所未斂者乎抑巳盡斂而不可復加歟然則有民而後有君有天下而後有國有君有國而後有君與國之用非民之不以與其上也而不足者何説今之理財者自理之歟為天下之理歟父有十子闔其大門日取其子而不計其後将以富其父歟抑愛其子者必使之與其父歟抑孝其親者固将盡困其子歟抑其父固共其子之財者歟然則今之開闔斂散輕重之權有餘不足之數可以一辭而決矣奈何以聚為理財而其上至於使小人君子以為不當理財而聽其絶而不繼若是者何以為君子哉理財中天下以錢為患二十年矣百物皆所以為貨而錢并制其權錢有輕重大小又自以相制而資其所不及盖三錢並行則相制之術盡矣而猶不足至於造楮以權之凡今之所謂錢者反聽命於楮楮行而錢益少此今之同患而不能救者也夫率意而戲造猥以補一時之缺而遂貽後日之憂大都市肆四方所集不復有金錢之用盡以楮相貿易擔囊而趨勝一夫之力輙為錢數百萬行旅之至於都者皆輕出他貨以售楮天下隂相折閱不可勝計故凡今之弊豈惟使錢益少而他貨亦并乏矣設法以消天下之利孰甚於此興利之臣茍欲必行知摸刻之易而不知其為盡錢之難十年之後四方之錢亦藏而不用矣将交執空劵皇皇焉而無從得此豈非天下之大憂乎夫見其有而因謂之有見其無而因謂之無者此常人之識爾所貴於智者推其有無之所自来不反手而可以除其患且今之所謂錢乏者豈誠乏耶上無以為用邪下無以為市耶是不然也天下之所以竭誠而獻者有二議有防錢之禁有羨錢之術夫南出於夷北出於敵中又自毁於器用盜鑄者雖殽雜而能增之為器者日損之而莫知也此其禁患於不宻也是誠可宻也若夫羨錢之術則鼓鑄而已矣雖然盡鼓鑄所得何足以羨天下之錢且天地之産東南之銅或暫息而未復雖有咸陽孔僅之巧何以致之噫不知夫造楮之弊驅天下之錢内積於府庫外藏於富室而欲以禁錢鼓鑄益之耶且錢之所以上下尊之其權盡重於百物者為其能通百物之用也積而不發則無異於一物銅性融溢月鑠嵗化此其朘天下之寳亦已多矣夫徒知錢之不可以不積而不知其障固而不流徒知積之不可以不多而不知其已聚者之不散役楮於外以代其勞而天下有坐鎮莫移之錢此豈智者之所為哉豈其思慮之有未及哉故臣以謂推其有無之所自来不反手而可以除其患者也雖然壅天下之錢非上下之所欲也用楮之勢至於此也齎行者有千倍之輕兌鬻者有什一之獲則楮在而錢亡楮尊而錢賤者固其勢也貴莫如珠金賤莫如泥沙至錢而平矣先王之用幣也錢居其一而後世之用錢也它幣至於皆廢誠以為輕重之適也故夫天下之貨未有可輕於錢者也一朝而輕千倍曽不為後日之計者何也此臣之所謂弊極而當反者也天下之事本無竒畫為竒畫者小人之自便以干其君者也不可聽也雖然臣又有疑焉計今日之錢自上而下者有兵之料有吏之俸自下而上者州縣倚鹽酒雜貨之入而民之賣易以輸送者大抵皆金錢也故雖設虛劵以隂納天下之錢而猶未至於盡藏而不用方今之事比於前世則錢既已多矣而猶患其少者何也古之盛世錢未嘗不貴而物未嘗不賤漢宣帝時糓至石五錢所以立常平之法唐太宗新去隋亂而至富强米斗十錢以上為率何者治安則物蕃物蕃則民不求而皆足是故錢無所用徃者東南為稻米之區石之中價財三四百耳嵗常出以供京師而資其錢今其中價既十倍之矣不幸有水旱不可預計惟極南之交廣與素曠之荆襄米斗乃或止百錢為率耳然大要天下百物皆貴而錢賤𤓰匏果蓏魚鱉牛彘凡山澤之所産無不盡取非其有不足也而何以至此且以漢唐之賦禄較之於吾宋其用錢之增為若干以承平之賦禄較之於今日其用錢之增又若干東南之賦貢較承平之所入者其錢之增又若干昔何為而有餘今何為而不足然則今日之患錢多而物少錢賤而物貴也明矣天下惟中民之家衣食或不待錢而粗具何者其農力之所得者足以取也而天下之不為中民者十六是故常割中民以奉之故錢貨紛紛於市而物不能多出於地夫持空錢以制物猶不可而況於持空劵以制錢乎然則天子與大臣當憂其本而已矣理財下使天下疑已不可以為天下臨財則疑其取見患則疑其避勢相軋權相傾之際則疑其謀若此者雖匹夫不能自立於鄉黨天下之人其所以力為忠信亷潔之行者未必其心安之以為當然盖将以求免乎天下之疑也故雖矯亢過情捨利就害而不敢憚焉一節之疑足以傷其終身之信此固人情之所甚懼也噫蛇未必噬也而人疑其螫虎未必搏也而人疑其暴有麟鳳之徳而後見之者無疑心雖然麟與鳳不常出於天下而天下亦安得而不疑古之聖人所為大過乎人者理天下之財而天下不疑其利擅天下之有而天下不疑其貪政令之行天下雖未必能知其意而終不疑其害已故聖人之於天下無不可為者以其所以信服天下者明也後世之君用民之財未必如三代之多役民之力未必如三代之煩常為安靜之令數出寛大之言而天下終疑之而不置不亦悲夫今國家之患法度未立號令未信財用未足欲有所為而不能遂若此者不足為大憂也而其憂則在乎未能免天下之疑何者天子仁孝恭儉服御簡約宫中之費可悉布於海内而無毫髮之私此亦足以明其無所取於天下矣一方水旱憂見顔色或特出使人申命長吏通財移粟惟恐在後奏䟽蠲除不問緡石来輙報可此亦足以明其深自結於天下矣而天下終不能無疑於其間某欠某負詔書已釋放矣民猶未信也曰此後豈不将復征之也開坐畫一條件無數謂之寛恤至深切矣民猶未信也曰此其文書未嘗不具也或特建一官或創立一司其事未見也而民已逆疑之曰此必将以興某利也下自一縣令而上至掌國計之近臣未必皆有取民之意也未必不與民也而民又皆疑之曰此其挾國之重以病已也天子以大義安天下非為茍且而已矣将用以滅敵而復北方也今也不出門閾之近而天下皆以利疑之矣是猶可與有為邪夫當天下之皆疑此不可以力勝而辨解也宜退而考其原今天下有百萬之兵不耕不戰而仰食於官北有强大之敵以未復之仇而嵗取吾重賂官吏之數日益而不損而貴臣之員多不省事而坐食厚禄夫明示天下以無所用財之門而後天下無疑心若是者其無所用耶然則雖上不能不自疑其為利也天下獨敢不疑其利之耶嗚呼數世之富人食指衆矣用財侈矣而田疇不愈於舊使之能慨然一旦自貶損而還其初乎是獨何憂雖然盖未有能之者也於是賣田疇鬻寳器以充之使不至於大貧竭盡索然無聊而不止今天下欲為大貧竭盡索然無聊之術耶又豈特上下相疑而已也天下之人私相與言者必曰今之官不可為也伯夷之㢘必改為跖蹻之横尾生之信必習為狙公之欺而非跖蹻非狙公則其事不可以濟然而不敢以其情告於上其告於上者姑曰陛下至仁法令明備羣臣奉行不謹而因以誅求於其中故朝廷雖惇重信而使民不能無疑耳上豈将以為然耶臣敢言其情今天下之財用責於户部户部急諸道每道各急其州州又自急其縣而縣莫不皆急其民天下之交相為急也事勢使然豈其盡樂為桑𢎞羊楊可之所為耶使天下之用誠有常數而户部以天下之税當之而有餘則户部必不以困諸道每道必不以困其州而州若縣獨何以自困其民耶使其真桑𢎞羊之流固且不暇而況其不為𢎞羊者耶所畏者上每以所不足責其臣使羣臣以不足而後見其財然則若是者固教天下之為𢎞羊者也昔劉晏當肅代衰亂之際天下多事故謂晏能以不足為有餘此出於不幸耳以今較之猶為平世而奈何以不足責其臣而謂羣臣以不足而後見其財歟豈不為有事者地歟天下方議更為貢賦之籍鈎考其㑹而悉書之使一縷以上上無不知其所自出而州縣不敢强取於民噫今州縣號為難治一縷以上既在籍矣而州縣之用於何取之若此者天下愈疑矣歴代名臣奏議卷五十四
