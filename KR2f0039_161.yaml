body:
  text: 歷代名臣奏議卷一百六十一明楊士竒等撰建官宋哲宗元祐元年門下侍郎司馬光上疏曰臣等聞三王不相襲禮五帝不相㳂樂況國家設官分職張立治具上下相維修飾明備何所愧於漢唐何必事事循其陳迹而失當今之宜也謹按西漢以丞相總百官而九卿分治天下之事光武中興身親庶務事歸臺閣尚書始重而公卿稍已失職矣及魏武佐漢初建魏國置祕書令典尚書奏事文帝受禪改祕書為中書有令有監而亦不廢尚書然中書親近而尚書踈外矣東晉以後天子以侍中常在左右多與之議政事不得任中書於是又有門下而中書權始分矣降及南北朝大抵皆循此制唐初始合中書門下之職故有同中書門下三品同中書門下平章事其後又置政事堂蓋以中書出詔令門下掌封駮日有爭論紛紜不決故使兩省先於政事堂議定然後奏聞開元中張說奏改政事堂為中書門下自是相承至於國朝莫之能改非不欲分也理勢不可復分也嚮日所謂中書者乃中書門下政事堂也唐末諸司使皆內臣領之樞密使參預朝政始與宰相分權矣降及五代改用士人樞密使皆天子腹心之臣日與議軍國大事其權重於宰相太祖受命以宰相專主文事參知政事佐之樞密使專掌武事副使佐之自是以來百有餘年官師相承中外安帖百司長官及諸路監司諸州長吏皆得專達或申奏朝廷或止申中書樞密院事大則中書樞密院進呈取㫖降敕劄宣命指揮事小則批狀直下本司本路本州本人故文書簡徑事無留滯神宗皇帝以唐自中葉以後官職繁冗名器紊亂欲革而正之誠為至當然但當據今日之事實考前世之訛謬刪去重復去其冗長必有此事乃置此官不必一依唐之六典分中書為三省令中書取㫖門下覆奏尚書施行凡內降文書及諸處所上奏狀申狀至門下中書省者大率皆送尚書省尚書省下六曹六曹付諸桉勘當檢尋文書㑹問事節近則寺監逺則州縣一切齊足然後相達事理定奪歸著申尚書省尚書省送中書取㫖中書既得㫖送門下省覆奏畫可然後翻録下尚書省尚書省復下六曹方符下諸處以此文字繁冗行遣迃回近者數月逺者踰年未能結絶或四方急奏待報或吏民辭訟求決皆困於留滯又本置門下省欲以封駮中書省録黃樞密院録白恐有未當若令舉職則須日有駮正爭論紛紜執政大臣遂成不協故自置門下省以來駮議甚少又門下不得直取㫖行下雖有駮議必須却送中書取㫖中書或不捨前見復行改易又內批文字及諸處奏請多降付三省同共進呈則門下之官已經商量奏決若復有駮正則為反復近日中書文字有急速者往往更不送門下省然則門下一官殆為虛設徒使吏員倍多文書繁冗無益於事臣等今衆共商量欲乞依舊令中書門下通同職業以都堂為政事堂每有政事差除及臺諫官章奏已有聖㫖三省同進主外其餘並令中書門下官同商議簽書施行事大則進呈取㫖降敕劄事小則直批狀指揮一如舊日中書門下故事併兩省十二房吏人為六房同共㸃檢鈔狀行遣文書若有溢員除揀選留住外並特與減三年出職不及三年應出職者與減磨勘年限若政事有差失委給事中封駮差除有不當委中書舍人封還詞頭又兩省諫官皆得論列則號令之出亦不為不審慎矣如此則政事歸一吏員不冗文書不繁行遣徑直於先帝所建之官並無所變更但於職業微有修改欲令於事務時宜差為簡便其委曲條目並候得㫖允許續議修正光又上疏曰臣等聞王者設官分職居上者所總多故治其大要居下者所分少故治其詳細此理勢之自然紀綱所由立也是以周官小宰以官府之六屬舉邦治大事則從其長小事則專達凡宰相上則啓沃人主論道經邦中則選用百官賞功罰罪下則阜安百姓興除利害此其職也至於簿領之差失期㑹之稽違獄訟之曲直胥吏之遷補皆郎吏之任非宰相所宜親也古人有言察目睫者不能見百步察百步者亦不能見目睫言詳於近者必略於逺謹於細者必遺於大也今尚書省事無大小皆決於僕射自朝至暮省覽文書受接辭狀未嘗暫息精力疲弊於米鹽細故其於經國之大體安民之逺猷不暇復精思而熟慮恐非朝廷所以責宰相之事業也竊以六曹長官古之六卿事之小者豈可不令專達臣等商量欲乞今後凡有詔令降付尚書省者僕射左右丞簽訖分付六曹謄印符下諸司及諸路諸州施行其臣民所上文字降付尚書省僕射左右丞簽訖亦分付六曹本曹尚書侍郎及本㕔郎官次第訖委本㕔郎官討尋公案㑹問事節相度理道檢詳條貫下筆判云今欲如何施行次第通呈侍郎尚書若郎官所判已得允當則侍郎簽過尚書判准應奏上者直奏上應行下者直行下即未得允當者委侍郎尚書改判事之可否皆決於本曹長官其文字分付本廰郎官之時委本曹長官隨事大小鑿限若有稽違即行糾劾即委的有事故結絶未得者申長官更不經由僕射左右丞即更改條法或奏訖得㫖或事體稍大或理有可疑非六曹所能專決者聽詣僕射左右丞咨白或具狀申都省委僕射左右丞商議或上殿取㫖或頭簽劄子奏聞或入熟狀或直批判指揮其諸色人辭狀並只令經本曹長官陳過尚書侍郎本廳郎官次第簽押判決一如朝廷降下臣民所上文字次第施行若六曹不為收接及久不結絶或判斷不當即令經登聞鼓院進狀降下尚書省委僕射左右丞判付本省不干礙官員看詳定奪若本曹顯有不當即行糾劾所貴上下相承各有職分行遣簡徑事務易集光又疏曰臣於去年曽上言州縣者百姓之根本長吏者州縣之根本根本危則枝葉何以得安故自古以來置州郡必嚴其武備設長吏必盛其侍衛所以安百姓衛朝廷也秦滅六國以為兵不復用雖置郡守而以御史監之墮名城銷鋒鏑故陳勝吳廣起而郡縣不能制國隨以亡晋武帝平吳悉罷州郡兵陶璜山濤皆言州郡武備不可廢及永寧以後盜賊羣起州郡無備天下遂大亂國朝置總管鈐轄都監監押為將帥之官凡州縣兵馬其長吏未嘗不同管轄蓋知州則一州之將知縣則一縣之將也熙寧中謀臣建議分天下禁軍每數千為一將别置將官以領之訓練差使抽那一出其手其逐州總管以下及知州知縣皆不得關預量留羸弱下軍及剩員以充本州白直及諸般差使而已凡設官分職當上下相維如身之使臂臂之使指紀綱乃立今為州縣長及總管等官而於所部士卒有不相統攝殆如路人者至於倉庫守宿街市巡邏亦皆乏人雖於條有許差將下兵士者而州縣不得直差須牒將官將官往往占護不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄哉臣目覩前宰相西京留守韓絳謁嵩山起建道場其將下禁軍充白直者於條不得出城經宿所敢留者剩員七八人而已況僻小州縣其守禦之備侍衛之衆可知矣臣當時乞悉罷將官其逐州縣禁軍並委長吏與總管等官同共提舉教閲及諸處差使其州縣長吏所給白直皆如嘉祐編敕以前之數臣自上此文字後來不聞朝廷有所施行竊見近嵗諸處多闕雨澤盜賊頗多州縣全無武備長吏侍衛單寡禁軍盡屬將官將官多與長吏爭衡長吏勢力逺出其下萬一有如李順王倫攻城陷邑之冦或如王均王則竊彂肘腋之變豈不為朝廷旰食之憂邪王者制治於未亂保安於未危豈可自恃太平之久謂必無此等事邪又自祖宗以來諸軍少曽在營常分畨往緣邉及諸路屯駐駐泊蓋欲使之均勞逸知艱難識戰鬪習山川自置將官以來茍非有所征討全將起彂與將官偕行外其餘常在本營不復分畨屯駐駐泊飽食安坐養成驕惰之性嵗月滋久恐不可復用又每將下各有部隊將准備差遣指使之類一二十人而諸州總管鈐轄都監監押員數亦如舊設官重復虛費廪祿凡將官之設有害無利天下曉軍政者莫不知之臣愚伏望朝廷如臣前奏盡罷諸路將官其禁軍各委本州縣長吏與總管鈐轄都監監押等管轄一如未置將官已前之法其諸州軍兵馬全少不足守禦之處量與立額招添其守禦有備而寇賊之彂不能式遏或棄城逃避或率吏民迎賊或斂民財賂賊雖責之以死彼亦甘心今平居騶從且不能備一旦寇至責以死節不亦難哉光為左僕射時上疏曰臣聞書稱眀王立政不惟其官惟其人臣少時見天聖中諸路止各有轉運使一員亦無提㸃刑獄惟河北陕西以地重事多置轉運使兩員然朝廷必擇朝士專任知州有聲迹曉錢榖者乃得為之未嘗輕以授人凡一路之事無所不總使按察官吏薦賢彂姦愛養百姓興利除害或朝廷有本路事務未能細知利害者則委之相度措置當是之時官少民安事無不舉公私饒樂海內晏清景祐初始復置提㸃刑獄其後或時置轉運判官以其冗長害事尋復廢罷自王安石執政以來欲力成新法諸路始置提舉常平廣惠農田水利官其後每事各置提舉官皆得按察官吏事權一如監司又增轉運副使判官等員數皆選年少資淺輕俊之士為之或通判知縣監當資序及選人以權彂遣處之有未嘗歷親民即為監司者能順己意則不次遷擢小有乖違則送審官院與合入差遣更加責降彼年少則歷事未多資淺則衆所不服輕俊則舉措率易歷事未多故措置百事往往乖方衆所不服故依勢立威以行號令舉措率易故慮事不熟壞法害民又利祿誘於前罪戾俟於後由是往往上不顧國家事體下不恤百姓怨咨止務希合以圗進取致今日天下籍籍如此皆由此來也陛下幸念民惟邦本本固邦寧知元元困窮於國家非便欲救而安之詔青苖錢不得抑配免役錢寬剩不得過二分竊聞諸路提舉官猶有於春首抑配青苗錢勒百姓供情願狀别作名目占免役寬剩錢但取文具而已如此則朝廷號令廢格不行於臣下恩澤壅塞不被於黎民徒存空文何以為政臣聞去草者絶其本救水者回其原提舉官者乃病民之本原也陛下必欲蘇息疲瘵乞盡罷諸路提舉官其轉運使除河北陕西河東外餘路只置使一員判官一員提㸃刑獄分兩路者合為一路共差文臣兩員凡本路錢榖財用事悉委轉運司刑獄常平兵甲賊盜事悉委提㸃刑獄管勾仍選知州已上資序纍歷差遣所至有政迹聰眀公正之人方得為監司聰眀則知官吏賢不肖公正則黜陟無私部下官吏既皆得人事務安有不幹集百姓安有不富庶此乃國家鎮撫四方之本也若以提舉官纍年積蓄錢榖財物不少恐轉運司一旦得之妄有耗散即乞盡樁作常平倉錢物委提㸃刑獄一面交割主管依常平倉法謹伺榖價賤糴貴糶及准備災傷賑貸其餘不得支用若轉運司委的窘乏須至兊那常平錢物者必須具數先奏朝廷得㫖乃得移牒支撥若以監司數少路分闊逺處巡歷及管勾不辦即乞只依舊法每嵗遍巡諸州更不遍巡諸縣自非要切大事朝廷不令監司親往勾當只令選差本部官除司理司法縣尉獨員監當之類舊條不許差出外其舊條不得隔州差選人勾當差及被差之人皆有罪新條諸州管勾官及主簿當給散月分不得差出之類指揮乞更不施行所貴監司有官可差幹得事務若遇有賊盜乞朝廷只委提㸃刑獄差官或行移文字監督捕盜官捉殺察其不稱職及有可以代之者先令權攝仍奏乞替換許一面相度賊盜强弱立賞錢數目其捕盜官若立功許隨功大小保眀乞轉官及升差遣或減年磨勘朝廷更不下刑部磨勘詰難住滯臨時詳酌恩澤直賜指揮賊盜自然無不敗獲不須令親出入監逐捉殺於事無益如此則監司巡歷管勾職事簡要易為辦集右正言朱光庭上奏曰臣等伏覩三月十八日聖㫖職事官許帶職內尚書候二年加直學士中丞侍郎給事諌議通及一年加待制臣踰月于兹反復思之不得其義多士紛紛之說不可勝紀聊採十說以陳於前惟陛下垂聽幸甚說者曰立為此法庶職事官罷日不煩商量便可令帶出臣以謂為中書自便則可於朝廷體要則未安也不若因其除外易以職名在人主恩意則新於臣下寵光亦異今既平居無事先以與之則一日補外何以示恩更進則太優不加則近薄雖曰善遷乃如少貶此不可一也借如自尚書一年餘罷則當與之直學士耶與之待制耶與待制則無以别於侍郎與之直學士則不應今日所立新制此不可二也或尚書侍郎而下以罪被謫於尋常例當落職者不知止落職事官之職耶并落職名耶不落職名則與平遷善罷無以異矣落則是不問過之輕重皆當奪兩重職矣此不可三也官制以來由諫議大夫中書舍人方為給事中由給事中方為侍郎而御史中丞又在侍郎之上其為等差如此今一年之後合為待制則等差紛紛然莫可辨矣此不可四也昨有自尚書除御史中丞者豈可一年之後亦止於加待制則為降官與直學士則為亂法舊制知雜御史乃今侍御史其於中丞相去甚逺猶有不歷月踰時或才滿嵗遂轉待制者今為中丞一年方得待制是今中丞反輕於前日之雜御史也舊制知制誥乃今中書舍人自居待制之上次遷當為翰林學士其或遷雜學士雖至於侍讀學士若不與權三司使及權知開封府皆不為美遷今一年之後乃得加待制是今日中書舍人亦輕於前日之制誥也又既為中書舍人以典制誥為職事其於侍從最為親近豈須更帶待制此不可五也六曹之官容以衆材並進或以錢榖稱或以刑法用使為尚書侍郎則可使兼學士待制則不可不然名器混淆而清濁一流矣此不可六也從來以寄祿官為行守試則試者多而行守少加職之後以職為行守試則試者少而行守多暗升資格隂益俸錢而陛下不知此不可七也官制以前侍郎尚書類為叙遷之官故更以帶職為寵官制以後以階為寄祿而尚書以下實行其職故自以職事官為重恩數之優非昔日比無更稍加職之例豈可以專官制之重職又兼舊制之寵名此不可八也人主之所以厲世磨鈍屈天下英雄之心俱入於術中者惟名與器而已故美官重器必使有難得之勢則人以得為榮為勸若豫之不加重不豫不加輕嵗月所積例以授之則鄙夫以茍得自矜而髙材以同受為耻矣此不可九也待制職備顧問非學術該通議論雅正誰宜為之祖宗之世其選最精出入朝廷才一二人而已故當世人人皆以為貴今乃立法無有定員將一年之後待制滿朝必有斗量車載之謡以玩陛下名器此不可十也方陛下修眀法度齊正典章之時而官制職名參錯如此臣謂終不可以並行伏望聖慈特詔輔臣别加講議裁定歸一適於至當庶行之當世而無礙垂之將來而可久監察御史上官均上奏曰臣聞朝廷設官分職所以治事才者並用則職修而事治才者不用則事紊而職廢才否並用則政事之不治者常半今之士大夫列於版籍者可謂至冗矣京官自承務郎至朝議大夫凡二千八百餘人選人一萬餘人大使臣二千五百餘人小使臣一萬三千餘人舉天下之員闕不足以充入仕之人故吏部左右選用闕京朝官及大小使臣大率一年以上選人須及二年以上或三年而闕次之逺者莫如選人大抵一官之闕在任與夫已授而又擬之者凡三人故自得替如不該移令待試法之中否須近一年而後擬呈已擬差必待闕三年而後就職七年之間方成一任京朝官待次幾一年而後得差遣待闕一年然後就職五年之間方成一任以常人言之三十而仕又十五而改官至七十而致政共成七任耳又況二十未必仕仕者未必皆至七十而又有不幸私故陷於吏議年雖及之未必滿七任也故舉天下之士大夫其才可以治事不至曠職者未必及半就令及半居間之日常多而治事之日常少此天下之郡縣所以不治閭井之民未純被朝廷之德澤者良以此也臣以為欲郡縣之治在夫才者居職欲才者居職在乎使其居閒之日少欲其居閒之日少在乎清入仕之源竊觀今之自文職入流者凡四進士補䕃與夫納粟得官百司胥史是也自武職入流者凡三武舉補䕃與夫百司胥史是也計其才行可以居官治事者納粟胥史不如補䕃補䕃不如進士武舉何以言之為進士者自十年就學加之十年而後能治經閲史綴緝文詞又加之十年而後能問學通博成就其志其學可謂勞矣及夫有司試之必擇其眀達義理而稍工文詞者方得薦送又求其尤者始預禮部之選又加廷試而後賜第擇之可謂至詳矣三年一取士舉天下學者羣試於有司亡慮數萬人而賜第者僅五百人取之可謂至艱矣彼貴逰子弟恃其父兄之䕃補類多驕惰不學僅通經義稍成文詞者則必中選就令屢試不中年及三十亦得出仕其視進士篤志講學趣操自立宜有間矣百司胥史主行文書積年寡過例該祿仕又豪右之家以資授官其才品庸下素不知義又外臺郡守奬薦之所不及彼固分甘自處於卑賤之地豈復有奮勵之意其視補䕃子弟聞父兄之教少壯就官有向進之心宜有間矣由此觀之計才量行可居官治事者納粟胥史不如補䕃補䕃不如進士理之必然也又進士科所謂特奏名者凡五等其最濫者但曽一次預薦僅及三十年即該推恩其就廷試則試題平易字數減少有司考校又加寬假但粗成文理不至甚紕繆者皆置第四等以上未滿七十者即更不須保任便許出官昨元豐八年特奏名係第四等以上者四百餘人可謂冗矣夫進士自秋試至省殿二處考校僅取五百其間尚容幸得又況偶獲一薦纍試見黜年髙才耗學術忘廢其比進士實固相逺而又五路學者鮮少取人數寬但獲一薦雖不事學坐待及三十年便該仕祿大率多年五六十以上既就仕官誰肯舉薦夫以血氣衰耗有茍得之心薦舉不及無向進之意其能精眀治事廉潔自守者十無一二智識才力方之進士固有間矣夫以特奏得官與夫補䕃流外之人學術才行皆不足以方進士而又仕之數常多於賜第之人並趨吏部吏部按格不計入流清濁才行髙下但以到部先後注擬授差遣以此待次者常至七八百人注擬二年以上員闕故負才可用之人率為特奏名得官與夫資䕃胥史之流冗占壅滯比肩待闕居閒之日多而治事之日少者常以此也不清其源欲官之不濫才者之獲進不可得也臣以為四者之冗有可罷者納粟得官是也有可以裁抑者特奏名資䕃胥史是也竊聞嘉祐四年以後係特奏名者才數十人自治平至熙寧三年止有百餘人自熙寧六年至今每次推恩入仕不減四五百人臣欲乞參酌祖宗故事須曽取到文解或經殿試計若干舉方許就省試實得文解及經殿試若干舉方許就殿試其就殿試文理稍優者方得充四等以上每等限定人數不過若干人其在四等外者不理選限其曽預一薦雖及三十年不在推恩之限蓋纍曽取到文解或經殿試即須稍有文學不至空踈四等以上限以人數則有司所取不至冗濫如此則稍可以革特奏之弊矣臣又見廣南攝官取本路曽預兩薦者權攝簿尉一任無過遂行正校雖曰優假逺方士人然僥幸太過若量加舉數即可以損入流之冗矣臣以為古人之仕者世祿蓋使為之後者一人世焉祿廩之而已矣詩人之所譏謂棄賢者之後絶功臣之世今之寄祿官自大夫以上初升大夫即奏補子弟一人其後兩經郊恩與致仕之日皆許奏䕃其為大夫以上嵗月深久往往奏薦多至數人夫廉謹無過積日叙遷而為大夫者未必有功而賢者也官其子弟一二人以寵其後固已厚矣臣欲乞自兩省兩制以下至大夫奏補之數宜加裁減限以多少則可以革資䕃之濫矣百司胥史積勤纍日大率須及二十餘年方得出仕惟三省人吏最為優幸每以檢㸃諸處文書酬奬減年出官最速其不願出官者坐理資任至為郡守宜加裁抑使無過厚則可以損雜流之弊矣四弊既損則入仕之源清而才行可用者不久於待闕不久於待闕則治事之日多而職業無不舉矣臣聞張官置吏所以為民今若捐虛授之祿以養害民之吏姑息不才之士以妨有才之進豈為民設官之意耶願陛下眀詔有司講求官冗之弊澄清入仕之源以幸天下實非小補知慶州范純仁上奏曰臣昨准兵部相度欲乞應蕃漢官非相統轄者並依官序相壓其城寨等管轄蕃官即依舊在本轄漢官之下詔依兵部所乞契勘諸路蕃官不繫官職髙卑久例並在漢官之下此所以尊中國而制外蕃也行之永久人情安熟雖蕃官之甚黠狡者亦不敢有覬望等輩之心蓋分義體勢不得不然上下遵承自無爭較況蕃官職名雖髙只是管幹部族人馬凡部族應有公事並須從漢官彈壓理斷及戰鬪亦並用漢官使臣統制驅䇿故於平日必使名分相殊體勢相異則緩急之際不失統御今若無故忽更舊制悉依漢官之法便與不相統轄之官依品序位即邉上使臣及京職官當在蕃官之下者十有八九而㳂邉將副使臣才過替移或於它處出入相值坐席相同便合在舊蕃官之下人情之間豈能堪此況外蕃之性驍勇尚氣當務裁抑驕慢之心豈可輒啓契勘緣邉使臣任滿多是就擬鄰近城寨差遣它日或再相統攝即漢官使臣中必有攄憤報怨之人而蕃酋之徒既以等輩自處必生嫌恨致統制官司煩於處置開端生事為害不小防微杜漸實在於此伏望朝廷詳酌特賜指揮諸路蕃官各依久例不得與漢官叙班並在漢官之下所貴不失中國外蕃尊卑之限絶蕃酋驕慢覬望之心統制有常不為後患二年平章軍國重事文彥博奏曰臣伏覩先朝復尚書省六部二十四司欲其分治職事悉如唐制臣竊以尚書省吏部典選戶部掌邦計刑部主國法此三部最為重而侍郎郎中員外多不久任遷轉頻數未熟本部職事已見遷改必致胥吏乘間作弊行遣迃滯臣欲乞三部郎中員外須令並滿四年理為兩任逐任與升資序立為定制經久遵行內吏部戶部司封司勳考功度支金倉部亦須再任與逐任升資上件三部郎官佐本部長官主判逐曹任官材掌邦計主國法皆是國之重事伏望聖慈詳察早賜施行開封府推官畢仲遊上言曰國家承五季之後典章制度號令文采雖未純於三代蓋皆有三代之意而髣佛焉至於慎刑罰息兵革寬仁盡下愛養元元得天下之心則有與三代比者獨官名自宰相而下至於百執事循用五季之舊而不知改天子臨朝太息於上而公卿大夫咨嗟悼歎發憤於下者不知幾十年矣及神宗皇帝同人心決大䇿以階寄祿而修復漢唐三省之制宜其歡呼鼓舞以慶朝廷之盛德而行之五年公卿大夫猶有不懌於官制者豈未改之前嘗厭五代之無法既改之後復云漢唐之非是則官名之所失如何而可蓋國朝雖循三省之舊而二十四司之名皆第之以待百官當選者在省之官及假他官以制之如兵部為樞密吏部為銓審庫部金部為三司水部為都水刑部為大理名𨽻尚書而事在他局者不可以為後世法則先帝之改制無可議者而改制之中有非漢唐之舊而未合於今日之務舊平章事遷中書令國朝以來未有遷至中書令者而今儀同三司一階兼昔日宰相纍遷之官舊禮部尚書遷戶部工部遷刑部刑部遷兵部而今銀青光祿大夫一階兼昔日尚書纍遷之官舊禮部侍郎遷户部户部遷吏部工部侍郎遷刑部刑部遷兵部而今正議大夫一階兼昔日侍郎纍遷之官卿寺亦然昔之官品難於進今之階秩易為髙而又降七品為八品降五品為六品降三品為四品至其不可用也則議請減䕃反以舊品為定而章服之令徒降五為六降三為四以遷就新品之失而不知義理之所在則所謂非漢唐之舊而不合今日之務者可驗於此然猶未有害也舊尚書省不總天下之政而中書門下合而為一則其治速今尚書省總天下之政而中書門下析而為二則其治緩此理之固然者至所謂畫黃録符牒關刺由上而下復由下而上近者浹旬逺者纍月有夜半停印待報而其務乃比於竹茹木屑之細或者補衣貸食未得其決而事久失於期㑹則非惟不合今日之務而良有害公卿大夫所以不懌於官制者以此亦在上之人損益之而已矣蓋隋唐二十有九而今寄祿階二十有五如益其階使與舊日之官品相對無併三遷兩遷而為一階則階正矣還舊日之品秩凡議請減䕃服章之名必合三五七九之數無易前古之常以就新品之失則品正矣事大而緩則由寺監而上臺省或由臺省而下寺監事速而小者則許之專決或專達而不為次第上下之道久則事正矣階正則朝廷尊名器重品正則義理安民志定事正則三省無滯務而逺近之人皆不失於期㑹修此三者而官制立矣豈以漢唐之官名不當復而五代之季為可循也仲遊又上言曰道不足以通庶事不謂之道法不足以行萬世不謂之法舜之德賞延於世可延之賞也文王之政仕者世祿可世之祿也賞可延而延之則無幸賞之心祿可世而世之則無猥多之患自漢以來捨其賞延世祿之說而不達其㫖是以官吏浮冗最為天下之大慮昔唐太宗省內外官定制為七百三十員曰吾以此待天下賢才足矣後世有特置同正員至於撿挍兼守判知之類皆非本制中世之後遂不勝其濫然而䕃補之格猶未若本朝之濫也蓋太祖太宗之時天下初定萬事草創有司停闕待注而無人故多為取士之門䕃補之法以應用至今百餘年間天下以補蔭入流者甚衆一嵗之選至千萬計豈特賞延世祿而已耶舊日之制嵗得任其子弟者易而為三嵗三嵗之制復易而為六嵗而猶患其濫則殆非嵗數之近䕃補人之多故也今若於定制之外復增嵗數則士大夫絶望於䕃補沮事之議將不可止非所以順人心助和氣而官冗之弊又未必能去為今之䇿莫若因仍嵗數逺近而漸實其試法試而中於法者然後入仕則是第存䕃補之舊名而已無入仕之新患順於人心所利有五不增䕃補之期無所觖望一利也公卿之子弟患於不學而今實其試法則自勸於學二利也得好學之人以為政不病於民三利也一不中選者猶欲再而中再不中選者猶望三而中不絶其望四利也官冗之弊可以漸省五利也豈惟䕃補凡天下之入仕者皆為試法以考之使人人勇於自試而止取百人而已數百人則數百人而已終無意外之濫雖行之萬世未見其弊又不失虞舜賞延文王世祿之㫖矣仲遊又言曰事不於無弊之時為有弊之慮知有弊矣復不早為之所既有猥并難治而欲彂一詔下一令使天下歡呼鼓舞遂返於無弊則雖稷契復生未易能也或者以其弊為不可救聽而任之則亦非治天下之術也昔周制六官其屬三百有六十而漢官之在內一千五十五在外之官猶不與唐太宗省內外官定制為七百三十員而開元天寶之間至萬有八千則漢唐之間官冗可謂弊矣而本朝之弊則尤甚於漢唐昔太祖太宗之定天下萬事草創中外之官不足以更代故多為入仕之選以應用而後世不知改作以適時變反有增而無損故治詞賦者舉進士誦書者為眀經五品已上嵗得任子而流外雜色之進蓋不可勝計至於今日尚書侍郎左右之選多至數千居家未仕與祿食於四方者倍乎在選之數被代赴選與已選待次又與居家未仕食祿者比而科舉任子益來而不已不知數十年外官冗之弊將何如邪則救之之方正在探其情而理勝之耳夫子之則喜奪之則怨雖人所不免茍奪之以理亦無可怨者故管仲奪伯氏駢邑三百沒齒無怨言則能探其情而理勝之故也今科舉之士雖以文章為業而所習皆治民之說選於十萬人之中而取其三二百使之治民理或可也而公卿大夫所任之子弟雖有賢者而驕驁愚懵未知字書之如何而從政者亦甚衆雖其父兄不自言以情占之豈能不以為愧而且幸哉然則損任子之恩而嚴入仕之選者正今日救冗官之道夫任子者朝廷所以厚公卿大夫之家而嚴其選者乃將治民而不可忽選之之法宜比進士加寬而所謂銓試者則加密或十而取其一或以二十而取其三惟朝廷之所進退中選者遂比進士而治民不中選者亦足保妻孥而免於皂𨽻順於人心其利有五公卿大夫之子弟皆勸於學其利一也得選士以治民民不告病二也中選者遂比進士彼之所願三也不中選者少沮而益勸無甚觖望四也官冗之弊從而可救五也蓋事不於無弊之時為有弊之慮知有弊矣復不早為之所既已猥并難治而欲發一詔下一令使天下歡呼鼓舞卻返於無弊則雖稷契復生未易能也而以其弊為不可救聽而任之則又非所以憂天下慮後世然則欲治猥并之患為一世之慮奪天下之所喜而要使無甚觖望非仍任子之恩而嚴入仕之選無可為者若眀經流外雜色之進則在朝廷斷而罷之勢有不可罷者則十省其五六不繫今日之輕重也中書侍郎呂大防上奏曰臣竊觀自古設官之意必先置二立副不以名位為限者所以紓艱危而適順用聚聰眀而濟不及也總兵命將尤重其選以漢唐事言之大將軍有長史司馬從事節度使有副使判官參謀其自小官而登寄任立功效者不可勝數本朝祖宗以來實用此法故名臣不絶而四逺畏服竊見今緣邉經略使獨任一人而無僚佐謀議之助雖有副總管鈐轄之屬皆奉節制備行陳非有折衝決勝之略預於其間朝廷每除一帥幸而得能者則一路兵民實受其賜不幸而不才者得與焉則是以三軍之衆一聽庸人之所為豈不可懼哉其弊蓋由朝廷不素養其材而取人之途又常太狹方今戎人旅拒邉患漸生若不早為准備閲試其能誠慮臨事用人不暇精選因而敗事所繫不細以臣愚見經略使各置副使或判官一人朝廷選差素有才略職司以上人充參謀一人委經略使奏辟知邉事有謀略知縣以上充如此則可用之士不以位下而見遺中材之帥又以人謀而獲濟兼得以博觀已試之效以備緩急之用講緝邉要莫先於此三年右正言劉安世上奏曰臣伏見祖宗初定天下首闢儒館以育人材纍聖遵業益加崇奬處於英俊之地而厲其名節觀以古今之書而開其聰眀廪食大官不任吏責所以成就德器推擇豪傑名卿賢相多出此途得人之盛無愧前古然自近嵗以來寖輕其選或緣世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂貼職名漸開僥幸之門恐非祖宗之意伏望陛下眀詔執政今後館職無俾輕授必求文學行誼有聞於時審察其才實可長育然後一依近降條制召試而命庶使名器漸重不容幸得循致賢能以備官使安世又上奏曰臣近嘗奏請今後館職欲乞並依元立條制召試而授已奉聖㫖施行然臣伏覩所降指揮尚有未盡輒復論列庶幾小補臣嘗謂祖宗以來新進入館之人鮮有不試而命者惟是縉紳宿望治效顯著或纍持使節或移鎮大藩欲示優恩方令貼職今陛下過聽臣言追復舊制雖云大臣奏舉到館職並依條召試方得除授而繼云其朝廷特除者不在此限則是不問人才之如何資歷之深淺但非奏舉皆可直除名為更張弊源尚在臣愚欲乞特降指揮依倣故事約自轉運使以上資序特除者方得不用此制庶能塞僥幸之門重館閣之選安世為左諫議大夫時上奏曰臣聞非至簡不足以待天下之煩非至靜不足以制天下之動故荀卿有言曰論一相以兼率人主之職也又曰相者論列百官之長要百事之聽嵗終奉其成功以效於君推此言之則人主擇輔臣輔臣擇庶長庶長擇僚佐以次選掄不容虛受是以所受愈隆而所擇愈簡所擇愈簡而所得愈多此堯舜三代之君所以垂衣拱手不煩事詔而天下晏然以治者用此道也秦漢以來官失其守居宰相之位者或不知其任在庶長之列者或不守其職因循至今流弊日積臣請為陛下詳言之昔魏晋以後採擇庶官多由選部故晋之山濤為吏部尚書中外員品往往啓授宋以蔡廓為吏部尚書黃散以下皆得自用廓猶以為薄已遂不之官唐制五品以上宰相商議奏可以除拜者則以制敕命之六品以下則吏部銓材授職然後上言詔㫖畫聞無所可否謂之㫖授開元中吏部置循資格限自起居遺補及御史等官猶並列於選曹其後幸臣專朝舊典失序故陸贄抗論以為捨朝僉而重已權廢公舉而行私惠是使周行庶品茍不出於時宰之意者則莫致焉此乃唐之弊風不可不革也臣伏見近來堂除差遣多取吏部之闕不問職司之輕重才品之優劣為人擇官殊失大體如承議王續堂除管勾左廂軍事奉議郎劉敦夫堂差權河南知録若此之類名品至卑吏部選差固不乏使何煩廊廟一一柬求臣恐三省之事日益紛紜執政大臣汨於細務則朝廷安危之至計禮樂教化之大原使天下回心而向道者將何暇以及之矣然則豈所以稱陛下圖任老成委注輔弼之意哉伏望聖慈眀敕三省别議立法今後除兩制臺省寺監長二以上並諸路監司瀕河並邉郡守之類所係稍重者令依舊堂除外其餘一切歸之吏部所貴執事簡得以留心於逺業而選部不至於失職以漸復舊制也安世又奏曰臣前月十二日上殿具劄子論列堂除之弊乞詔三省别議立法近日雖降指揮以在京寺監主簿等數十處送下吏部而外路知州等闕尚未盡還臣竊謂朝廷之上宜選大吏其餘小者盡可付之有司今堂除之人日益加多差除不行其勢必取於吏部吏部之闕日益加少則孤寒之士所得愈艱羈旅留滯動逾嵗月此最更張之所宜先也臣愚欲望陛下特降睿㫖稍謹堂除之選仍以元豐八年後來取過外路知州等闕擇其地望之重者依舊朝廷差除外其餘付之有司如此則堂中占闕既已不多吏部差注得行必無淹滯伏望聖慈詳酌早賜施行曾肇上奏曰臣伏見神宗皇帝大正官名始於三省詔令所出則自中書審覆駮正則繇門下受而行之則在尚書三省相成不可闕一中書則有舍人主行門下則給事主讀尚書則有左右司郎官受付使之更相彌縫更相可否然後彂號施令罔有不臧立政官人舉無過事此祖宗設官分職之本意也蓋三省各有分守不相侵踰而門下一職近取諸身則為咽㗋逺取諸物則為門戶所以駮正中書違失故自來舍人不兼給事之職伏見近日給事中封駮中書録黃三省進呈却令舍人書牘行下臣愚竊恐因此隳壞官制有損治體寖漸不已遂成大弊此臣夙夜熟慮不得不為陛下言之也伏望聖慈戒飭執政大臣謹守神宗所定官制勿使三省屬官得相踰越而中書詔令必由門下方得行出以眀職分以正紀綱以為天下後世之法陛下留意毋忽紹聖元年監察御史蔡蹈上奏曰臣伏覩近降聖㫖內藏庫見催索户部太府寺借缺出豁錢物不少依舊更不統轄者臣竊見國家分職設局所以舉官治而府藏出納尤宜參互鈎考以檢吏姦臣契勘元豐詳定官制事目格子太府寺掌庫藏項內有內庫拘催交納逐季㸃算內庫申到納訖官物帳狀抄上勾銷內庫納訖名件之類凡八件格目甚眀又太府寺案名稱內藏庫𨽻右藏案即是舊𨽻太府非無文據臣嘗聞真宗皇帝謂王旦曰內藏庫所貯金帛備軍國之用非自奉也顧外廷不知爾臣竊謂既通軍國之用則𨽻戶部太府寺正其宜也惟禁漏泄見在物數其餘雜務事件如官制格子該載者委有關防不可略去欲望聖慈省察元豐官制格子等特賜睿㫖令內藏庫復𨽻戶部太府寺所貴百官庶府皆有統帥事歸一體監察御史龔夬上疏曰臣聞唐虞稽古建官惟百夏商官倍亦克用乂然則先王建官因革不常其來尚矣臣伏見言事御史自皇祐以來員數不常昨置六察官方推行之初事務繁劇故令專領察事今來按察之法久已就緒在京官司無敢如日前遲者則治察御史其職太簡臣備員臺屬適值兩院闕官兼領六察未見廢闕然則人治兩案俾兼言職自不相廢況元豐三年八年并紹聖令察官各兼言事伏望聖慈特賜詳酌令監察御史三員兼掌論議庶幾益廣言路以稱朝廷眀目達聰之意哲宗時尚書右丞呂公著上奏曰臣伏覩周官三公三少掌論道經邦寅亮天地然皆分治卿職蓋進則坐而論道退則作而行之此三代之眀法也唐太宗用隋制以三省長官共職國政事無不總不專治省事國朝之制每便殿奏事止是中書樞密院兩班昨來先帝修定官制凡除授臣僚及興革廢置先中書省取㫖次門下省審覆次尚書省施行每省各為一班雖有三省同上進呈者蓋亦鮮矣蓋先帝臨御嵗久事多親決執政之臣大率奉行成命故其制在當時為可行今來陛下始初聽政理須責成輔弼況執政之臣皆是朝廷遴選安危治亂均任其責正當一心同力集衆人之智以輔維新之政譬如共輿而馳同舟而濟人無異心則何求而不得何為而不成伏望聖慈留神省察劉摯上言曰臣伏覩近降指揮增復館職及職事官並許帶職給諫以上一年帶待制尚書二年帶雜學士臣竊謂國朝舊制庶官之外别加職名所以厲行誼文學之士髙以備顧問其次與論議典校讎得之為榮選擇尤慎自元豐中修三省寺監之制其職並罷滿嵗補外然後加恩兼職常視治行優劣以為厚薄除三館並歸祕書省為職事官外有直龍圖閣省郎寺監長二補外或領監司帥臣則除之待制雜學士職給諫以上補外則除之亦繫一時恩㫖非有必得之理今盡復館閣而薦試之法未立校讎之職無與則是所復虛名而已朝廷必不甚惜人亦不以為重近日得之者固已衆矣臣考之僉言以謂修廢官耶則實無職事養人才耶則未加選擇反復不見其便至於給諫以上限年帶職尢所未諭且待制學士以侍從顧問為職自祖宗以來極天下之選不為定員今不考治行不察流品幸而至給諫以上則計日而得之人才不同一槩除授臣恐自此員品猥衆無復澄汰其有行能髙妙治最尤異者又將何以益之臣愚欲乞且依元豐官制施行或詔選臣僚講䆒本末别行裁定使名器增重人不虛授以稱朝廷勸沮多士之意御史中丞蘇轍上奏曰臣以空踈備位執法當得僚佐以助不逮竊見兩院御史見止三人而兩人辭免未入不獨言者寡少於朝廷得失有所不盡而六察所治事務至煩凡有不及則百司怠廢頃者員缺不補動經嵗月衆論莫不疑怪臣竊見唐制臺官皆大夫中丞自辟有不由此除授敕命雖行皆拒而不納至本朝雖稍損其舊然亦必令本臺與兩制分舉而人主自擇其可者用之初無執政用人之法也然人才之難非獨今日故自唐太宗以來兼設監察裏行以待資淺之士而祖宗舊制亦許用京朝官知縣以上立法稍寬易於應格近日舉法須得實歷通判一考人物衰少莫甚於今而獨於言事官重為艱阻實未允當臣頃在內外制見每有詔下同列相視患無合格可舉之人所舉既上又多不用却於前任臺官中推擇任使雖云舊人不免出自執政所可殊失祖宗博舉之意臣今欲乞並詔本臺及兩制依放舊制舉升朝官初任通判以上或第二任知縣從聖意選擇補足見闕仍依舊置監察裏行所貴祖宗選任臺官舊法不至隳壞而綱紀之地易於得人亦免遺曠轍又上奏曰臣聞宰相之任所以鎮妥中外安靖朝廷使百官皆得任職賞罰各當其實人主垂拱無為以享承平之福此真宰相職也臣竊見近者執政進擬鄧溫伯為翰林學士承㫖除命一下而中書舍人不肯撰詞給事中封還詔書御史全臺兩省諫議皆力言其不可議論洶洶經月不定而執政之意確然不回溫伯既仍舊就職而言者並獲美遷質之公議皆不曉其故若謂執政誠是耶則給舍臺諫並係所選豈其皆非若以論者誠非耶則不加黜責並獲優寵進退無據是以公議皆謂朝廷自知其非但重於改作而已今者謗議未息又復進擬禮部侍郎陛佃兵部侍郎趙彥若權本部尚書中書舍人二人復相次封還陸佃之命臣竊惟此二事本非朝廷急切之務勢須必行者也上既不出於人主下又不起於有司皆由執政出意用人致此紛爭內則皇帝陛下太皇太后陛下厭於煩言焦勞彌月下則侍從要司失其舊職綱紀廢壞至於賞罰顛倒頃所未聞臣不知為政如此得為鎮妥中外安靖朝廷者乎頃者諸曹侍郎闕人朝廷始擢用諸卿監為權侍郎蓋以不權侍郎則木曹公事闕官發遣如禮兵諸部事至簡少雖無尚書但責侍郎亦自可了況侍郎既具而復權尚書此何說也若謂侍郎久次當遷尚書臣不知尚書久次當遂遷執政乎此則為人擇官而非為官擇人之意也臣待罪執法竊慮聖意未經䆒察但見執政歷詆有司而自伸其意使羣臣無由自眀今後再有如此等事無敢守法為陛下眀白是非者是以區區獻言不覺煩瀆罪當萬死轍又奏曰臣等近准敕舉岑象求趙㞩充臺官已䝉聖恩除象求殿中侍御史竊見本臺兩院官共六員分領六察皆得言事元祐之初朝廷急於求治臺中員闕略無一二四方觀望皆知陛下勤於聽納爭效悃愊以補萬一今日監察御史併闕四員雖聖眀開納之意無損於前而員闕不補中外疑惑今六曹寺監雖復閒地每遇有闕猶未嘗不補況於人主耳目所係至重自非諱聞直言及有所壅蔽而聽其久闕實非治世之事也況六察所治事務不少若稍有弛廢則寃抑者必衆亦非先帝設官之本意也伏乞特出聖㫖下本臺及兩制分舉八員陛下擇取四人用之使天下曉然知朝廷招求忠言與昔無異不勝幸甚校書郎李昭玘進䇿曰昔先王自勤厥德夙夜不怠惟前代時若然後訓迪厥官而作周官立三公以論道分三孤以𢎞化公則燮理隂陽孤則寅亮天地皆所以成王道也道則一事則異故設六官各率其屬以象天地四時皆所以成王事也治則簡而嚴故冡宰為天教則詳而親故司徒為地禮和君親以體仁也故宗伯為春政正上下以合禮也故司馬為夏刑主制殺以象義也故司冦為秋事主應變以藏知也故司空為冬上則天地隂陽日時之變中則君臣父子之常下則山林川澤土壤之化繁至於宫室器械飲食衣服之節微至於蟲魚鳥獸草木之性莫不有官以治之有職以辨之增一則有餘虧一則不足內外相屬小大相聨故能國體完具政無不大而阜成兆民者也自周之衰其制變於戰國而大壞於秦漢承秦之後獨用其故號其位無統其事無聨至唐始為省寺臺監以分處百官使令宿業事事無曠問其名則以職對下其令則以官議司有常守位有定員唐之治績號為甚盛者其致然也謂之省有曰尚書有曰門下有曰中書尚書典領百官庶事所㑹決者也其屬則六其聨則二十四其位則各以其序知百官之功過然後與之以勳級勳級未足以勸賢也又加之以封命此三者未始不先選天下之材而用之也故考課勳封之職則主之以吏部倉廪有所積然後為權衡度量之制既為權衡度量則量嵗計所出而支調之此三者皆出於戶口田賦之所入也故錢榖土地人民之職則主之以戶部先王之為禮未常不謹於賔主之際外則謹於賔主內則嚴於鬼神為之牢醴膳羞之數為之祠祭祀享之節三者皆禮之事也故賔客膳飲祠祭之職則主之以禮部戎器既有藏車馬既有備必周知天下土地之籍鎮戎烽候之逺近者皆兵之事也故武庫輿輦方域之聨則主之以兵部謹門關出入之籍以防姦督財物期㑹之責以防僞以此防人猶有犯上違令者則戮辱隨之此三者皆刑之所治也故門關勾㑹禁𨽻之聨則主之以刑部津梁溝洫以時修苑囿山澤以時取屯營之事以時耕此三者皆工徒之所興作也故水利虞衡田作之聨則主之以工部門下之治掌出納帝命而相禮儀者也中書之治掌佐天子而執大政者也侍從顧問規諭諷諫之左右分更焉故記動史書其起居法度執大政則道揆者也參議表章草畫制命之職在焉故記言史書其詔誥德音儒學皆有選也圖籍皆有藏也議法制㳂革者其事小故屬之門下求賢才隱滯者其事大故屬之中書此三省之制也監則監其所守寺則法度之所出其事則同其主則異若禮樂飲膳宗室蕃夷之所掌圖籍天文學校服御之所司則又禮之别也宿衛工作僕御軍械則又兵之别也治水則工之别也此監寺之制也庶事既有别矣帝命既有掌矣大政既有議矣有守者付之監有法者付之寺朝廷之治略已具矣然而百官之所領萬事之所總必有責也故特置一職謂之宰相百官之罪惡朝㑹之儀典必有所糾也故特置一官謂之御史則內外各有所察也或不以一名其職唐之致其盛幾與古比隆者任官得其序而已國家設官分職一切用唐制或有職而非其官或有官而非其職或一職而治以數官或一官而兼以數職名分不正而已名分既不正則無能罔上之人盜名而自安喜功勇利之臣犯分而爭進今先正其名分而各以所能任職則賢不肖之實易察而功罪之迹易知又何患官不得其人人不能行法者哉侍御史王巖叟上疏曰臣聞維天下之勢者存乎法持天下之法者存乎平權之而後行議之而後用使不失其平者存乎其人當張釋之為廷尉人有盜髙廟坐前玉環者奏當棄市文帝大怒曰吾屬廷尉者致之族而以法奏之釋之謝曰今盜髙廟器而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其法乎文帝乃許廷尉臣以謂此不出於法之文而出於一時論議能推明輕重之意以釋上心而使天下後世莫不稱其當由是言之廷尉之選其當忽哉臣伏覩祖宗時審刑大理長官及其僚屬皆擇天下君子長者通物情知義理者以為之其用心平其持議不阿其知思足以講眀法之微意而必與情稱故天下號無寃民以今望之其遺風餘德猶釋之在漢也後專尚刑名法術之學而慘刻之吏多在此選議事不原於法意論刑不本於人情執文以致罪順㫖以成獄不知先王眀慎欽恤之心而復輔之以經術申之以道德故愈務而愈逺愈嚴而愈戾試以斷案巧則巧矣然不足以得正人而足以得狡吏委理卿獨舉專則專矣然不足以任至公而足以得偏見臣愚伏乞檢㑹舊大理舉官法及講祖宗置審刑院大理相持並行之初意今後罷試斷案人則釋之之徒將自為陛下用稍復刑措之治天下幸甚時兩省正言官久闕巖叟又上疏曰國朝倣近古之制諫臣才至六員方之先王已為至少今復虛而不除臣所未諭豈以為治道已清而無事於此邪人材難稱不若虛其位邪二者皆非臣所望於今日也願趣補其闕多進正人以壯本朝正人進則小人自消矣諫議大夫王覿上奏曰臣聞利不百不變法凡法之所變非得已也使利害等均而徒有變更之勞則不待明智不惑之士而後知其不足為矣彼中才之憚煩者皆不為也況利少害多而可輕變成法哉臣竊見今年九月九日朝㫖節文內外馬事並𨽻太僕寺直達尚書省更不經由駕部車營致逺務鞍轡庫駝坊皮剝所養象所並專𨽻駕部臣竊謂此獨可以敗壞官制而未見為利之實也夫自李唐失政官制紊亂久矣聖朝祖宗以來初則有東征西討之憂既混一區宇之後方務休養元元故於修完官制有所未暇也至神宗慨然憫之於是講求歷世之墜典造新一代之成憲正名百職建復六聨上下相維各有分守此真得唐虞三代建官之美意也後世所當謹守而勿失今朝廷以馬政久廢而推行牧養之法固太僕駕部之職矣若使太僕仍舊𨽻駕部而共修職事於牧養之法未見其害也使車營致逺等務不𨽻太僕而領於省曹於牧養之法未見其利也利害未分而徒使本末失叙官制復隳臣不知其可也且場務惡屬寺監寺監惡屬省曹乃官吏不恤法度者之常情顧朝廷處之如何耳伏望聖慈宣諭執政大臣無以牧馬一事而輕壞官制追還九月九日朝㫖别降指揮施行覿又上奏曰先朝造新官制於古義皆有按據若推行之際見其未盡乃當修完何可無故廢壞臣伏見今年八月二十日敕節文髙麗貢奉事節皆係管勾所檢勘依條格申所轄鴻臚寺其本寺不以事體大小皆不與奪勘㑹處分但騰申主客取候㫖撝今後髙麗夏國遇入貢應干排備所須之事並令管勾同文館所都亭西驛所徑申所屬曹部施行更不經由鴻臚寺臣竊謂鴻臚寺不與奪處分誠為非是然若非省曹不稍假以權而致其不敢與奪即是鴻臚寺不任職也此皆罪在官吏乃非官制之過豈可因官吏之罪而廢省曹寺監上下相維之序哉夫畨夷入貢合責辦鴻臚寺今奪而專之於省曹是省之辦事敏於寺也馬事措置合經由省曹者今析而擅之於太僕是寺之辦事敏於省曹也名實則同而緩急工拙之間何其異也故論者以謂均是省曹一則奪寺事而專之一則雖其所屬之寺事不得預焉均是寺也一則併省曹之事而專之一則雖其本寺之事不得預焉果何義也若謂減去經歷之處然後事可以速集而無害則非獨鴻臚太僕而省曹寺監上下維持之序可存者少矣法度如此豈經逺之道惟聖慈詳酌胡宗愈上疏曰臣檢㑹今年三月二十八日三省同奉聖㫖今來內外官並許帶職食錢并理任外其餘恩數並依官制以前條貫又准五月三日聖㫖指揮勘㑹祕書省自有職事官其舊帶館職并今後除授校理以上職名並不供職臣愚竊謂不知朝廷之治體則不足以立朝不習國家之故事則不足以應務唐李德裕謂用寒士不如用公卿之世議者以為偏論臣乃謂之知言蓋公卿之世耳目習朝廷之治體練熟國家之故事逺方寒士有不知其始末者裕之言未為過論太宗皇帝深達此意始置崇文院建祕閣集四庫書選天下名能文學之士以為校讐官給以見俸食於太官優其資秩自選人京官入者始除館閣校勘或崇文院校書及升朝籍乃為祕閣集賢校理或優之則為直館直院直閣其始入而官位卑者未得主判且令在館供職改京官升朝籍方得主判登聞鼓檢院同知禮院之類資任漸髙則為吏部南曹郡牧判官又髙則為省府推判官或出知藩鎮任轉運提刑又選其久任者或遷知諫院預講讀或為左右史遂典詞誥或待制內閣由此而為公卿執政以躋台輔逺器大節方重深厚事業磊落載在史册者前後相望外至於守土奉使藹然皆有風績可觀間有不才闒茸者叨預於其間則指目鄙笑不容於清議故纍朝得人方古為盛此實太宗皇帝憂深慮逺養育之功也熙寧執政務欲速援親黨假此為進人之階浮躁狂妄者爭趨之故有朝除校理而夕拜詞掖夕為直院而朝作輔臣館閣涵養之風遂至委地士人廉恥之節靡有孑遺既無素養之才悉是茍合之士臨時選用或非其人左右史才間用俗吏以致朝廷厭薄館閣遽行寢罷陛下即位以來招賢樂善追復太宗皇帝之政繼承列聖之業俾復三館職名又詔執政大臣各舉所知召試以充其選獨不許其供職臣愚莫知其意竊計議者必謂崇文院已改為祕書省已有官屬則帶館職名者不可供職臣愚以謂崇文院之名雖改而袐閣集賢昭文館四庫之書猶存既選英才除職名而不令供職不法太宗皇帝養才育士之深意而徒以虛名為士大夫進取之階不惟義理未安兼亦於事無補臣愚望朝廷稽考祖宗館閣之制選人京官除者且授祕省正字校書以比昔日之校勘選人已有改官并供職四年除校理指揮外有自京官除者亦自校書郎二年方授校理已升朝者得兼寺監職事以比昔日之主判由此漸進以歷省府與帶職之人並令入館供職依舊食於太官磨以嵗月使多士知陛下育才之意庶幾優遊議論漸知朝廷之治體羣居講習以議國家之故事廉恥清讓去而復還館閣素風墜而復振朝廷自後用人不乏實才將以成太平之業臣愚以為自此為始惓惓之意惟陛下采擇陳次升上奏曰臣伏覩官制格尚書省總判六曹事務勘當若否中書省取㫖門下省封駮法行之初先帝特降詔書云人各有分然後安官各有守然後治仍申諭中外違是令者執政官委御史臺彈奏尚書以下聽長官糾劾以聞當是時人循分守無敢僣紊元豐末以垂簾聽政令三省權同取㫖今陛下獨攬乾綱躬臨庶政孜孜䆒心以復先朝政事而三省者政事之本也尚未如官制格夫本既不正而齊其末是緩其所當先急其所當後也況先帝以三省分釐庶務其寓意豈徒然哉蓋欲上下相維以防偏蔽故也謂如尚書省勘當或未中理中書省取㫖必有去取中書省取㫖或有未當門下省必須封駮今三省長官既同取㫖門下省屬官雖欲封駮終難其議以此遂失上下相維之道非立法本意也若謂門下中書省見今獨員難以專委即當選任人才以補員闕安可以闕官而廢法哉伏願陛下留神先帝官制分釐之格詔書叮嚀之意斷自聖衷行之必果庶使政事之本立而良法美意得以推行天下之治可立而待不勝幸甚劉涇上奏曰臣聞外重之勢莫如監司蓋其勢與朝廷相為低昂則處材分憂可以無慎乎朝廷尚察嚴則此屬日夜淬汰喜為健人朝廷尚寬闊則此屬因緣茍偷勸為循吏方法新俗惡之初朝廷所以遇此屬者往往旦從常僚暮擢權路不愛爵賞以與此屬開富貴之門而其間以法意人情自責任者皆是也方斯時論者固有躐等踰防之譏而朝廷藉此屬以枝梧四方者亦豈少哉法寖行矣俗寖變矣此屬亦遂廢以貌相誨無復常故蓋未有如此日之優也方法新俗惡之初將一天下而首尾之則喜健力惡孱弱以集成為急法既行俗既變則尤當謹守而挾持使無倦焉可也遂以健力者為豺狼之人厭之以近厚相煦濡可乎曩惟朝廷有憾於百年者正以此屬無守法任事之人而志縻廪祿坐視塗炭力回已去不返之風波而作新焉曽未久也而已輒解體是使荏苒嵗月復如前日而又復更張之也觀今之法謂之已行則緝翩之人尚多今之俗謂之已變則頑梗之害尚在奈何使此屬無故而罷休也且如去冬造簿法行此朝寺既稔講之矣其升降虛實固大事也而守令往往習為常程至有以前日手實中廢為驗者茍如此則臣深知此法未可以全成望郡縣也其所由來監司以茍簡敗之爾前日上下之勢如束溼而朝廷法令十有九不如意況如今日已放繩墨之後乎借令文具然其縣大夫慵懦不力鄉書手之因仍為姦以害齊民者已深矣此非獨臣憂臣所聞於老世務者皆如臣憂無異也朝廷亦豈惜片言之戒為監司之勸沮乎非特此也其於法令之間見如不見聞如不聞按部未再三則以勞苦為辭在官未滿嵗則以久淹為歎者皆是也郡縣亦曰某監司接人無苛禮某監司臨事有大體皆姑息因循之實也然亦朝廷有以致之耳或曰造新法用新進如前所升拔是也守新法用舊人如比日用鞏彥輔髙秉孔宗翰林積趙約之類是也朝廷之行往往與世俗之疑合則亦何怪乎監司之不勸為近厚以致於茍簡而無畏哉此最當今急務不可緩圖者願陛下乘士氣竭蹶之時為一鼓焉如曰天下無事何用使此屬擾擾哉此非臣所敢知也厯代名臣奏議卷一百六十一
