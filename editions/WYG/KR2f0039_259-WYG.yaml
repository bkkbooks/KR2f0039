body:
  text: 歴代名臣奏議卷二百五十九明楊士竒等撰賦役宋光宗紹熈元年臣僚言古者賦租出於民之所有不强其所無今之為絹者一倍折而為錢再倍折而為銀銀愈貴錢愈艱得榖愈不可售使民賤糶而貴折則大熟之歲反為民害願詔州郡凡多取而多折者重置於罰民有糶不售者令常平就糴異時歲歉平價以糶庶於民無傷於國有補詔從之秘書監楊萬里上奏曰民輸粟於官謂之苖舊以一斛輸一斛今以二斛輸一斛矣輸帛於官謂之稅舊以正絹為稅絹今正絹外有和買矣舊和買官給其直或以錢或以鹽今皆無之又以絹估直而倍折其錢矣舊稅畆一錢輸免役一錢今歲增其額不知所止矣既一倍其粟數倍其帛又數倍其錢而又有月樁錢版帳錢不知幾倍於祖宗之舊又幾倍於漢唐之制乎此猶東南之賦可知也至於蜀賦之額外無名者不可得而知也陛下欲薄賦斂當節用度用節而後財可積財積而後國可足國足而後賦可減賦減而後民可富民富而後邦可寧不然日復日歲復歲臣未知其所終也吏部員外郎陳傅良上奏曰臣聞熈寧以來用事者始取藝祖之約束一切紛更之馴至於今而民力之困極矣葢自祥符奏立諸路上供歲額熈寧新法增額一倍崇寧重修上供格頒之天下率一路之增至十數倍迄今為額是特上供耳而其他雜斂皆起熈寧則以常平寛剰禁軍闕額之𩔖另項封樁迄今為額至於元豐則以坊場鹽酒香礬銅錫㪷枰披剃之𩔖凡十數色合而為無額上供迄今為額至於宣和則以贍軍糴本與凡應奉司無名之斂合而為經制迄今為額至於紹興則又以稅契七分得産勘合添酒五分茶鹽袋息之𩔖凡二十餘色合而為總制迄今為額最後又以係省不係省有額無額上供贍軍等錢均撥為月樁大軍迄今為額而折帛和買之𩔖不與焉夫取之之悉如此而茶引盡歸於都茶場不在州縣鹽鈔盡歸於𣙜貨務不在州縣秋苖斛㪷十八九歸於綱運不在州縣州縣無以供則豪奪於民於是取之斛面取之折變之科敷取之抑配取之贓罰無所不至而民困極矣夫藝祖以得民心受天命而使困窮至此此天所以復命壽皇爰暨陛下將以捄民窮也書曰天明畏自我民眀威方今之患何但夷狄葢天命之永不永在民力之寛不寛耳豈不甚可畏哉陛下知畏則宜以捄民窮為己任陛下以捄民窮為己任則大臣不敢茍目前之安大臣不敢茍目前之安則羣臣陳力何鄉不濟此藝祖意也亦天意也惟陛下留神幸甚光宗時彭龜年乞蠲積欠以安縣令䟽曰臣竊觀今日縣令之難非特士大夫知之朝廷亦必知之夫朝廷以新改官人必使為縣是知其不可為而彊之也獨知縣得以二年為任是慮其不可為而優之也然不求其不可為之實而去之何哉殆未有以此告陛下者乎臣出入州縣粗知其故凡今日縣令之所以難者葢以財榖之出入不相補爾豈特不相補直有銖兩之入而鈞石之出甚相絶者臣不暇縷數但深所怪者一責其出而不子其入也夫天下之財賦縣當受之民州當受之縣而今之民輸財者皆在州矣縣之合輸於州者初無額可取也唯無額可取故逋欠積壓有至十數萬緡者夫州既以得之民者輸於上矣而其責之縣而未得者皆以為逋也縣令初至新政未修舊欠已廹那移借兊所不能免猾吏假託以為姦大姓媒蘖以為訟而令不能久其職矣甚者嚴號令事箠楚誣良民以為逋假公事以罰錢而監司不容不取問送勘而令不得安其官矣此非獨令之罪葢有以使之然也臣愚欲望陛下將諸路屬縣欠監司若州乾道九年以前未解錢盡並與蠲放庶㡬縣令不為積欠所壓可以少行其志如此則雖不彊之而可使就雖不優之而可使安庶亦能使之為陛下盡撫綏之職矣實天下幸甚龜年又奏曰竊惟和買行於東南今近百年獨紹興一郡施行無定制議論無成説致煩明詔令廷臣集議臣嘗考究紹興和買不唯始初敷額太重立制不均而朝廷毎欲更張未及施行輒為浮言胥動又復轉易其病全與東漢不能均河南南陽之田相似病根如此雖有良藥無如之何然既有朝㫖集議臣叨綴從列敢不罄竭愚慮以備采擇臣嘗謂今日士大夫論紹興和買不過二説欲究實上四等詭名者其説正大而易敝欲均科及下五等小户者其説均平而不正何謂究實之説正大而易敝臣聞經界之初紹興和買鄉村物力三十二貫科一匹今則十七貫三百五文科一匹此皆上户走為下户之敝若核實詭户歸之上户則物力自寛和買自輕雖以嚴法行之人自無辭然從前為紹興守令者孰不知出於此而卒未能革間有不畏彊禦者財行一二而揺撼於後者已百十矣今日改正者曾無幾何而後日走寄復如初矣利之所在人所必趨一重一輕誰肯就重此所以不能使之無敝也何謂均科之説均平而不正夫不分等第一例科紐自此重者皆輕必無避免之謀無者皆有亦無隠寄之䖏可不謂公平矣乎然和買本非常賦也而今以常賦之法行之此不可也或者雖云江西及浙西平江等䖏和買通五等皆敷今紹興獨不敷及五等是偏也殊不知和買不及五等在今日猶為仁政若得他州併五等不及豈不幸甚今乃欲引他州刻取之法以例紹興又不可也或者又云和買初敷時官司給錢所以不及五等人户政恐其無物力可恃失陷官錢今既無此慮自可敷紐豈不思支錢而取絹則不及無錢而白取則及之豈為民父母之道乎又不可也此所以不得謂之正也然則若之何而可臣謂今日和買本非合取於民之物但以版圖未復用度未充不能遽捐之予民既未能捐之予民則取之之法豈可不立夫法亦貴於平而已矣今既上四等有和買下五等無和買開之以走寄之地安能禁百姓之不為哉前日田産自三十六貫減至十七貫敷一匹後日必自十七貫減至四五貫敷一匹未可知也而可不救乎臣所以嘗有請以上四等有田産人户和買七萬七千餘匹乞籍為定數令今後一隨田産推割除受可以絶目前走寄之敝唯是有田産下五等人户和買計四萬七千餘匹今户部蠲放四萬四千之數於内除豁逃絶等一萬一千餘匹外亦已放及三萬三千餘匹止有一萬四千餘匹未有着落欲乞户部更與寛容本府一年從本府選擇逐縣令佐有風力可倚仗者於今来下五等户合敷和買四萬七千匹數内更切根究走寄之數若再根究到走寄之數物力自寛又有上户買下户之田亦合依上户等處起紐和買如此則今來一萬四千匹未充之數漸漸可補但須預降指揮令本府今後根究得隠寄及增起到上户買下户田産上和買不得過今十萬之額如或有餘即增上物力錢貫均敷庶幾不致重取於民然此亦只是目前救敝之謀即非久逺通行之策濟所不及猶在夫人異時國家儻遂恢復財用稍寛則將此無名之賦一切掃除方始無愧於古謹議龜年又進故事曰戴盈之曰什一去關市之征章臣龜年曰盈之此説乃後世不能復古之根本也凡古制之所以壞者必有私情蠧之私情不能去而求復古無是理也盈之既知什一之不可重關市之不可征亦知民之不堪而古之當復矣在戰國時如盈之用心者豈不可進而孟子闢之如此其嚴者政恐其有所牽繫也盈之所謂今兹未能者果何為哉不求其所以未能者先去之而徒欲少損以收復古之名此君子所甚惡也葢是非不兩立公私不錯施邪正不並用一廢則一興一消則一長所以古人謂去惡如農夫之務去草焉絶其本根勿使能植則善者信矣未有惡未去而能為善者也謂之今兹未能則是其為國猶有資於横斂而但欲少損以俟來年而後去安保來年不復矣乎奈何世之謀國者多為此論以其易入也聽人之謀者多喜此論以其易從也若井田法難卒行宜少近古限民名田以贍不足之說若古人節儉什一而稅如太古難宜少放古以自節之說世皆以為通於世務不知自今觀之果何益哉不特謀國如此人君於遷善改過之間而一為此論所惑則亦將因循茍且展轉汨沒卒陷於過失而已耳可不戒哉寧宗嘉定八年江東轉運副使真徳秀奏乞倚閣第四第五等人户夏稅疏曰臣等近各具奏請倚閣本路旱傷州縣第四第五等人户夏稅轉運司准六月二十七日尚書省劄子夏稅錢帛並係上供準擬支遣窠名近已有臣僚奏請令州縣寛緩催理本司自可照應施行劄付本司照㑹臣等不敢避再凟之誅須至洊干宸聽竊惟今歲之旱不同常年在民既有非常之灾傷在國家當有非常之恩卹葢常年之旱或在已種之後若旋即得雨已槁之苖猶可復生或旱傷所及僅止數州有無通融尚足相濟或有旱無蝗則下田之已種者猶可薄收或本道雖菑而鄰境無虞則所憂者不過土着之民安慰拊循猶易為力今江東民田既皆失種秋成一事不可復言建康太平等七州旱勢最甚之外饒亦半歉各處貴糴既無由可以相資而淮浙荆襄又皆告旱招徠客米亦病其難飛蝗蔽天所在害稼遺孽盈野未易撲除近水可種之田農民極力車灌勞費百倍尋即一空麻豆蕎麥之種斗直不啻千錢典質借貸僅能入土而旋踵又為白地矣安慶光州流民自池州渡江而趨饒信者前後相續臣提舉嘗以奏聞長淮以北方尋干戈而淮土又自不熟此去流移必多本道沿江諸州未免首被其害丁夘戊辰饑疫之禍近在目前此臣等所謂非常之灾傷近年所未有也今當貴糴之初已有盜賊之漸池州境上黥徒剽掠建昌休寧饑民􅐁攘若使向去闕食是遺盜賊以其資邦本不寧將為大患是時雖欲蠲租弛斂以消弭之亦無及矣臣等以為灾變如此天意難測轉移之要全在民心惟國家大施非常之恩卹以召人和庶幾天意可回而灾變可息臣等職有常守未敢盡言而本道所當矜卹無如下户所苦莫甚催科况夏税之敷本由計畆而起田既荒蕪税何從出臣等切見孝宗皇帝淳熈二年建康大旱即從守臣劉珙之請蠲是歲夏稅七年江饒等州旱既詔逐州第五等人户未納夏稅倚閣五分復慮艱於輸納又詔逐州第四第五等人户未納今年夏稅日下倚閣其後池州興國軍旱皆嘗蠲放當年夏稅載在史籍不可勝舉仰惟聖心豈不顧惜經費獨惟民命所在實繫社稷安危權其重輕理當如此況江東州縣自丙寅用兵以来民力凋殘尤非昔比雖號為上户不足以比他處中人之産況於末等尤更可憐夏田纔種則指為借貸之本以度冬秋田甫揷則倚為舉債之資以度夏今田畆荒蕪無可指擬借貸之塗既絶生生之計遂窮經營餬口且患不給況吏卒在門有賄賂之費追呼在官有拘繫之苦愁歎之聲實不忍聞近䝉聖慈寛限催理仰見陛下聖眀洞照疾苦民間見此寛恤之令妄意必䝉蠲除雖蠶麥稍熟去處𩔖皆賤價轉變以充口食及限滿追理官司督促愈嚴自謂前既少寛今難更緩遂以常歲兩月可催之數併欲責償一月之間是陛下前日寛展之恩適足以使民受峻廹之害以臣等觀之若今便䝉除放未納之數已自不多將來終無可催亦必不免除放但早放一日則民免一日之苦若除放稍遲於官初無所補徒使貪吏􅃛胥得以並縁侵漁重為赤子之病臣等以為陛下當以孝宗故事為法若以今日國用非乾道淳熈比除信饒外且乞加惠七州其七州夏稅姑置四等非敢不恤國力姑息要譽既叨奉使一道親見民間狼狽如此豈容不以實言陛下仁儉之徳必不與饑困無聊之民較此毫末但恐堂陛尊嚴四方旱傷之狀未必一一盡聞則臣等之言疑若張大其事淳熈八年淮淛江東饑詔遣著作郎袁樞將作監主簿王謙躬親按視今願考循故實選遣朝臣徧行本道如臣等所言稍渉欺誕甘受㒺上之誅所有七州第五等夏稅仍乞先賜倚閣以昭陛下之徳意以廣孝廟之仁恩臣等不勝至望寜宗時青田縣主簿陳耆卿上奏曰臣聞之孟軻曰行仁政必自經界始經界葢良法也不幸而經界法壊則所信者簿書耳併簿書而不足信則何所取信哉且有田則有賦役此常理也田有多寡則賦役有輕重亦常理也今之世乃有田愈多而賦役愈輕者有無田而賦役反重者此弊在在有之而本郡尤甚姑以青田一縣言之自往歲巨浸之後片紙散逸而縱横變化在吏之掌握而已稅之厚薄當視其物力物力之髙下當視其産今田頃畆初不見於簿而物力之貫伯獨載之簿若是則其源既失矣過割用物力簿起催用二稅簿二者所當相關而今初不相知歲遇攅造不過以往年陳籍㳂襲抄轉而已陞降出沒既莫得詳鄉胥里豪始得株連姦偽以為牢不可破之計故有一户而化為數十户者有本無寸産而為富室承抱立户者有虚為名籍以避敷斂稍久而成乾沒者但見逃絶之家日多租稅之額日減上下愁歎而莫知其弊之所自邑令之有意者思欲釐正之然細民吐氣而大姓則忿然不懌矣官本制民而今制於民觸𩔖而長之又豈獨一青田也哉三歲一推排此常式也今或至十年而不講是使民之患苦無時歇也然則簿書何自而正乎臣愚欲乞睿㫖行下諸路戒飭所在官吏申嚴推排之法其出入規避者重置典憲每歲攅造必選一邑佐之清强者躬督其事既成則併舊籍上之郡郡復委寮屬研覈之有訴不平或得其實官吏俱從收坐庶幾賦役均壹牒訟稀簡吏稱職而民安業誠非小補耆卿又代上殿劄子曰臣竊惟今日科斂之法大槩極矣而極之中又有輕重焉夫粟帛者民之所有也錢者民之所無也民合輸粟與帛而官俾之輸錢固已非矣至有名曰上供銀錢而其禍酷於二稅者此不可不知也閩之郡八其最甚者曰泉臣因廵行入境見其土薄瀕海民多艱食而永春徳化安溪三邑介處窮谷怵廹尤甚正賦窘無以辦況其他乎稽諸故常每歲台信建昌邵武四郡縂納上供銀兩一萬五千六百葢為本州衣縑之助蠲半之後惟廣信僅僅取足三郡則否自乾道至開禧已積逋十五萬疋為錢七十五萬緡前此守臣雖聞於朝然止及三州逋久之弊未及本州科斂之弊也祖例産錢一緡以上合輸銀錢無官民之分也其後祝聖道塲及逃絶户得免免者猶未衆也其後一命以上咸得免而免者始衆矣又其後士凡薦於天府而籍於太學者咸得免而免者愈衆矣免者愈衆則科者愈寡故以官户士户合科之賦而併於貧弱之家貲不滿百例行科配厥價㣲踴毎兩科至二千八百正錢之外有頭錢有帶鈔發納錢有綱脚暗脚等錢民無所措則有淪落有奔迸有咨怨號呼而已夫一指有傷則通體不樂三州之民民也泉之民亦民也彼不之輸而此代受其害得無憂乎開禧初年有㫖嚴趣逐郡照元抛色目應副矣而積壓如舊為今之計非得朝廷主盟以三州銀額撥回俾之認納而本州衣縑自行措置弊無由革縱未能然亦當為七邑下户痛絶前擾而均之有品秩者之家貲不滿貫而科及額外而科者必罰無赦斷在必行毋掛墻壁則逺民可以息肩矣臣不勝惓惓江西提舉袁燮上便民劄子曰臣聞差役舊法惟以物力髙下為序自大至小謂之鼠尾勞佚雖均而物力不侔有至於破産者迨淳熈間始立倍法自增及一倍二倍以至三倍而有歇役十年八年六年之别髙者稍頻而不害下者由是而少寛可謂良法矣然行於州縣未能盡曉但謂朝廷專用倍法而不知兼用鼠尾法竊詳當時建議之臣有曰窄都不及歇役年限去處即從􅉍年體例所謂窄都者即紹興三十二年指揮地里窄狹人烟稀少不及十大保者是也所謂􅉍年體例者即鼠尾舊法也地里既狹人烟又稀役户無幾矣決不能及歇役十年八年六年之限故倍法有所不行而仍用鼠尾法今州縣間未逹􅉍年體例一句都分寛狹槩用倍法此役所以紛紛也欲乞朝廷的確行下明言􅉍年體例即鼠尾舊法寛都用倍法窄都用鼠尾法二者並行而不相悖誠便民之大者燮又奏曰臣甞謂差役之法惟其實之為貴視其物力果可以堪役而役之則勞而不怨矣今詭名挾户不勝其多有編户寄産於官户者有與黠吏通謀私减物力者有搢紳之家以前後歴任為數户以避限田外充役者惟已是便姦計百出獨善良之人畏法自重寧勞苦以執役而不肯詐欺以茍免遂致役併而家破又有都分雖寛而實堪充役者不過數家循環不已暫歇復充屢役之後其家亦破良可憫也伏覩慶元重修詐偽􅃯諸詐匿減免等第或科配者以違制論又重修格獲詐匿減免等第科配者以所告財産經減免者給五分未經減免者給三分之一今若申嚴此法務在必行則詭名挾户漸少合役之户漸多而頻併充役之家亦漸寛矣臣又覩紹興二十八年指揮鄉村都保比近地里窄狭人烟稀少并不及十大保處併為一都臣愚竊以為人烟雖稠十大保雖足而充役不過數家暫歇復差者亦宜比上項指揮與鄰都通融差保正免於破家亦仁政所宜施惟聖慈亟圖之理宗時知安慶黄幹代撫州陳守上奏曰役法之弊其来尚矣國家之制保副正謂之大役户長謂之小役二役皆選之每都人户大役者非户産稍髙不在其數至於小役則稅錢或不滿百亦所不免寛都人户有至二三十年方一差者狹都人户有三五家循環充役無歲不受其害者故物力之家雖置産於狹都而必立户於寛都雖散其産於狹都而必併其稅於寛都彼寛都之役日以寛狹都之役日以宻寛者益富而宻者益貧貧者益勞而富者益逸勞者日益朘削而逸者日益封殖勞逸不均而中産以下破蕩流移深可憐憫竊以保正副所管者烟火盗賊故必本都之人而後可充户長所管者催科亦何必皆本都人哉况今之保正副户長者皆非其親身逐都各有無賴惡少習知鄉閭之事為之充身代名執役之親身雖屢易而代役之充身者數十年不易也故莫若差大役則限以都差小役則不限以都而限以鄉一鄉數都寛狹相通則富者不至於逃逸而貧者不至於獨勞休飬生息加之數年小户漸為中户而為公家執役者甚衆則大户中户亦不至於有頻差之擾更勞迭逸其利無窮此亦固國本之一端也幹又代撫州陳守奏曰古者取民之法惟租稅而已其餘山澤之利皆與民共之茶鹽酒𣙜之禁古無有也後世國用匱乏權一時之宜以紓目前之急耳今國家征𣙜之法宻於前世無一目之漏一孔之遺而國之租稅所以為公家經常之用者顧乃為姦民變易名色􅍴亂簿書謂之逃户夫户則逃矣其田固自若也水不能飄火不能焚非箧笥所藏非人力所徙自古以常存誰得而掩覆之哉其所以不究見者鄉司實執其權耳稅産之陞降出於鄉司而為是逃亡倚閣者亦出於鄉司為官吏者又皆茍簡歲月應文逃責孰肯一一而研究之哉故莫若使為縣令者盡括諸鄉之逃户具為一書隨其一任之力根括捜求期復舊額及其終更具申於州州考其實以為殿最少示黜陟磨以歲月則稅額可以復舊而國用可以自足與夫屑屑於常賦之外以求足用之道者大相逺矣吏部員外郎陳傅良因輪對上言曰太祖皇帝垂裕後人以愛惜民力為本熈寧以来用事者始取太祖約束一切紛更之諸路上供歲額增於祥符一倍崇寧重修上供格頒之天下率增至十數倍其它雜斂則熈寧以常平寛剰禁軍闕額之𩔖别項封椿而無額上供起於元豐經制起於宣和縂制月樁起於紹興皆迄今為額折帛和買之𩔖又不與焉茶引盡歸於都茶場鹽鈔盡歸於𣙜貨務秋苖斗斛十八九歸於綱運皆不在州縣州縣無以供則豪奪於民於是取之斛面折變科敷抑配􅂍罰而民困極矣方今之患何但四夷盖天命之永不永在民力之寛不寛耳豈不甚可畏哉陛下宜以救民窮為己任推行太祖未冺之澤以為萬世無疆之休且言今天下之力竭於養兵而莫盛於江上之軍都統司謂之御前軍馬雖朝廷不得知縂領所謂之大軍錢糧雖版曹不得與於是中外之勢分而事權不一施行不專雖欲寛民其道無繇誠使都統司之兵與向者在制置司時無異緫領所之財與向者在轉運司時無異則内外為一體内外一體則寛民力可得而議矣帝從容嘉納時詔令刑部侍郎史嵩之籌畫糧餉嵩之奏言臣熟慮根本周思利害甘受遲鈍之譏思出萬全之計荆襄連年水潦螟蝗之灾饑饉流亡之患極力振救尚不聊生征調既繁夫豈堪命其勢必至於主户棄業以逃亡役夫中道而竄逸無歸之民聚而為盜饑饉之卒未戰先潰當此之際正恐重貽宵旰之慮矣兵民陛下之兵民也片紙調發東西惟命然事關根本願計其成必計其敗慮其始必慮其終謹而審之與二三大臣深計而熟圖之若夫和好之與進取決不兩立臣受任守邊適當事㑹交至之衝議論紛紜之際雷同和附以致誤國其罪當誅確守不移之愚上迕丁寧之㫖罪亦當誅迕㫖則止於一身誤國則及於天下中書舍人袁甫論履畆劄子曰臣仰惟陛下一念愛民上通於天急聞讜言如恐不及臣竊伏思念計田輸劵此事大非得已必須施行之際倍切謹審勿謂指揮已出憚於參訂致貽後悔及今明示徳意務體下情使人户曉然知朝廷寛恤之心庶幾不致激成他患今謹條列於後一指揮内一條人户所納官㑹各州軍截鑿一角發解朝廷臣謂令各州軍截鑿不若令人户自鑿齎赴官司何則官司截鑿人户弗信許人鑿納大信乃昭或謂人户鑿納必有夹雜偽㑹之弊殊不知此雖有之然其弊亦自有限況只鑿一角真偽自可稽考若從官司截鑿彼直謂以空言紿我將來官司仍前發出行用則彼固已有怨忿之心矣人情不甚相逺如許其自鑿以納官則心不疑則目前雖有輸財之苦亦知㑹少而價增異日可以獲利庶幾其不怨大凢處事當體下情朝廷但知出令不可屢改不思怨謗一興勢須改令與其改於怨謗既興之後孰若脩於怨謗未形之先或又謂我但真行截鑿足矣何恤人言殊不知朝廷用度目今窘急州縣揣知此意必有宻獻不必盡鑿之説者朝廷處匱乏至極之際萬一惑於其言豈不中天下之疑縱使不為迎逢者所惑然人之疑心難以家至户曉必曰截鑿一也何苦不許人户為之而官司必欲自行之耶臣之愚只是一箇信字使天下曉然無疑而已一指揮内一條令各州軍拘人户納官㑹分為六限每限半月計三月可足以臣觀之將来人户輸納不時州郡必致申請朝廷與之展限却恐限内先納者皆是畏謹及貧弱之人違限不納者却是頑梗及巨力之户朝廷今者施行正欲恤小然究其流弊反使强家濫被寛恩而弱户先受督責豈不倒行逆施耶臣欲反此説而用之令州郡先催形勢有力之家立定期限不許申展一則頓改收買㑹價必然驟長二則不墮勢家之術希望展限以求幸免三則貧小者見州郡嚴於大家其心大服彼大家者事力有餘許限内責其必納更復何辭待大家納足後催中户中户力雖稍薄然彼皆各自愛惜須能依限輸官末後視所收多寡如何斟酌事體催貧小之户或已納數多則朝廷施行寛恩可使貧小者霑被大凡作事寛嚴並用如此措置誠為兩得其宜右開具如前委是利便斷可施行免致後悔伏候􅃯㫖甫又奏曰臣竊惟近日收減㑹子指揮令人户有田一畆輸㑹子一貫分為六限三月而足臣嘗奏論州縣奉行往往不體朝廷之意致使中下之户先受督促之苦其豪家巨族與吏表裏不以時輸此大弊也謂當先督形勢之家嚴示約束如期輸納陛下既然臣之說臣退而告諸宰輔亦謂可行日徯續降指揮而猶未也臣亦聞其說矣葢曰勢家競買則價驟增然後催中戸以及下户反收貴價之楮甚而無可買者非所以利貧弱也臣竊以為過矣今惟憂楮之不貴不必憂楮之太貴也楮貴而無可買正自可賀有何可憂朝廷見下户之無可買也則寛恩可施矣此所以利貧弱也而何不利之有或又曰勢家廹之太急恐滋怨而激變此亦過計也輸財助國自古有之況自故相當軸士大夫不義而取之者多矣今以前日之所漁取者還以為公家之助非父祖生產作業傳諸子孫者也何至遽生變耶朝廷處事往往當憂者不憂而不必憂者反以為憂何謂不必憂士大夫決不因此而生變是也何謂當憂臣濫攝銓曹仍兼西掖日日書黄及書填綾紙紛乎不勝其多此等皆號官户然而未必盡鬻爵也用兵以來竄名功賞者皆妄庸無賴人耳又近年朝廷給降祠牒不計其數極目村疃盡化緇黄寺觀之内童行少而僧道多大槩皆横目無知之人此等易於為亂不若士大夫之有所顧惜也乃置此不憂而獨憂士大夫何耶且有力之士大夫亦猶有力之寺觀耳今法令之行將先寺觀之大者乎抑先其小者乎如謂勢家不可先督則寺觀之大者亦付之徐徐云爾而可乎論者又謂兵法攻瑕則堅者瑕攻堅則瑕者堅今不先督世家此亦不攻堅之意也臣以為國容軍容各有不同兩陳相對志在決勝則攻瑕可也撫柔此民恩意綢繆而先治貧弱可乎或又謂子産有言安定國家必大焉先臣亦以為不然鄭蕞爾國伯有伯石之徒逞暴恣行視公室何有故子産救之以弱今朝廷清明法度整肅上下一心安得以列國為比故臣觀今日之事所以牽制而不敢斷者一言以蔽之曰未能盡捐私意而已姑息於形勢之家而不念貧弱之户此病何自而發哉私意未克剛志未決故耳譬猶治深痼之疾當使元氣不傷而疾自去有庸醫者烏喙大黄輕於甞試無救於疾而氣先耗矣計田輸劵此用烏喙大黄之喻也毋用於貧弱而獨用於形勢則可以全安而無害不亦殆哉臣十有八日侍經帷陛下語臣曰脩内司有田七萬八千餘畆若以收減㑹子指揮言之亦合照數輸納今欲特降十萬貫赴封樁庫交納以充收減之數臣仰見陛下急救楮幣自上率下無所吝惜如此臣助賛陛下此舉足以大服人心已而伏覩指揮一一皆如聖諭又見陛下言行相應勇於斷制如此夫以陛下尚且為天下倡而士大夫獨不能為衆人户倡乎臣愚欲乞睿斷行下諸監司專主先督勢家之説過期不納者必罰無赦如州縣奉行不虔縱胥吏與勢家為地抵拒拖延慢上之令則監司定將守令按劾如監司曲為庇䕶不即發覺許臺諫糾察以聞自昔聖王之治天下不過寛嚴並用各得其宜而已嚴於監司守令以督形勢之家待輸納數多楮貴物賤則貧弱之户大示寛恩至此方表陛下憐貧卹小之心上通于天是亦祈天永命之一助也臣疊冒天威罪何所逃惟陛下裁赦甫又奏曰臣近者伏覩朝廷履畆收劵指揮退而精思畫為兩條一曰示信官同人户截鑿使天下知的然有收減之實而不至溺於空言二曰恤小先督形勢之家使天下知貧弱者其末必寛而不至流為虐政終始兩説言之懇切至於再三欲乞備聖㫖分明行下而側耳未有聞焉臣自知誠意不足感動然終不敢喑黙遂己者葢履畆本非仁者所當為乃大不得已而為之耳於大不得已之中而所行之有方足以救楮幣之窮則公私俱便亦未可全謂之不仁也自昔朝廷行事而犯不韙之名天下不亮其心往往激成大禍熈豐犯新法之名誰復亮其興起治功之心建紹犯事讎之名誰復亮其與民休息之心開禧犯開邊之名誰復亮其恢復故疆之心然則今日犯履畆之名而欲人亮其急救楮劵之心亦可謂甚難矣雖然茍能行臣示信恤小之説則天下知吾不以空言欺天下而使天下貧弱之户終被寛恩則猶可救藥也臣聞諸道路自此令之出大家巨族雖睨視未動而大寺觀主首之傑黠者巧謀詭計已窺伺朝廷之意向有欲挑包散衆者矣有欲鬻常住之産者矣大者既然小者胥俲勸諭之術既窮必將厲威刑以廹之當是時强有力者營關節託聲勢足以自庇而係纍笞箠以應官司之期限者皆弱小者也鄉村小寺觀緇黄猥雜何可勝數彼豈皆畏法循理之人哉且何獨寺觀為然如鬻爵冒賞之村夫與亡歿官户之不肖子平時常賦猶不樂輸今廹以出錢是無故剜其肌肉也彼又豈肯俛首帖耳受係纍笞箠之苦耶縣道差人催督始以抗拒抗拒不已繼以􅇌擊其間廵尉不識事體奮臂爭鬭則激變挻禍自此始矣此猶曰將來之患也只如目前科配㑹子之數亦自難行葢縁田有肥磽苖有輕重産錢有多寡在在不同難以拘泥且以臨安言之自十畆已上至四十畆均納苖一石此則田愈磽則苖愈輕也其它州縣有及此者苖極輕者為上田極重者為下田産錢之不等亦復若此槩曰履畆豈能遽得平耶行法不平則乖争之端已見矣如聞上户已有一種議論皆謂倉猝之間買劵未辦吾之歲收惟有米耳朝廷當此稔歲儲米為荒歉之備亦為有利於國為此説者乃窺測朝廷名為收減而實則横歛耳嗚呼陛下之心曷嘗為謀利而出此令哉彼見截鑿之令未必果行故以利心量我耳臣一聞此語即披瀝肝膽對衆言之其語乃塞若陛下不肯明白截鑿亦使臣虚負斯言矣臣所以極陳事理如上所云者大要欲陛下知天下人情如此知天下揣摩意向如此知天下求為脱免之計如此則陛下豈能家至戸曉又豈可刑驅勢廹也哉反覆思慮惟有臣之二説示信以釋天下之疑恤小以消天下之怨寓徳意於號令之外回陽和於肅殺之餘使天下亮陛下之心而已臣更有一說天府者天下州郡之所取則也畿漕者諸路監司之所視傚也行之有道守之不移必當衆截鑿必先催形勢以此推之天下大書榜帖揭之通衢有目者見有耳者聞咸曰示信如是恤小如是孰不以天府為準以畿漕為法遍天下欣然聽從也哉如商邑無以為四方之極則外之分符持節者且将有辭於我以為近甸尚不能行而何以令天下志卑者茍逃責而好髙者解印綬矣荀恱有言榮辱者賞罰之菁華也陛下有此菁華而不善用之臣謂宜宣召顔熈仲趙與諭以陛下至誠惻怛之心所宜上下交相孚洽其州縣有不擾而辦者首加褒擢而不然者必罰無赦菁華發用則人心興起仍乞陛下宣諭宰輔所有中書之務不繫大體者權令執政分押不必盡勞宰輔為宰輔者專以擇監司大守為務下至縣令亦合人人知其材之短長與其用心之邪正今者出堂甚晚儘可㑹聚掄材如更欲廣其見聞則當進侍從而博詢之既知之矣然後揀選疏剔斥其不善者而奬其循良者如監司大守果有風力待其績効既成雖驟寘清華可也譬如人之一身精神周於軀幹則可以常安而無疾今中書汨汨於細務而精神不周於事幾臣之所甚惑也嗚呼撫太平無事之運人誰不以為易今外而邊事方殷内而又倡為履畆之説此何等題目既不得已而犯之必磨淬精神求以善其後庶不至於大可悔恨耳奚獨宰輔當然哉陛下之精神所以鼓舞羣動者尤不宜有一息之宴安而使天下有一夫之怨讟也漢武帝席文景富庶之餘患國用不贍用桑孔輩不過更錢幣筭舟車數事尚不曾行履畆之下策而猶不免乎海内虚耗至下輪臺詔封富民侯僅能轉危亡為安存況今日乎陛下如視為等閒小事無庸過慮方且聽不必盡行截鑿之説而自悖收減之初意動揺於左右浸潤之言而形勢之家與夫大寺觀得以内降脫免此又陛下自撓其紀綱而它人無所致力者也惟聖明以社稷生靈為念察臣狂斐之言原臣屢凟之罪及今續降增添徳意指揮而毋致後日下哀痛之詔力遏請謁動揺之漸而毋輕蹈御札已事之步臣不勝大幸洪舜俞進故事曰魯宣公十有五年秋初稅畆初者何始也稅畆者何履畆而稅也初稅畆何以書譏何譏爾譏始履畆而税也臣聞立法以取民莫患乎其作俑也夫君與民本一家國用乏而取諸民民出其所有以供乎上猶子奉父孰不敬應然自昔什一之法公田藉民力而畊收其歲入民田之私則未嘗有稅魯剏法履畆以稅之國用不足葢有甚不獲已者聖人於此乃書初以示譏豈非初之所剏疑若特一時之暫而後之㳂襲必假是以行其無藝之斂如螽之生蝝其害未有底止二吾不足而用田賦此其俑也武帝紀書初筭商車初筭緡錢初𣙜酒酤頗識此意金煬王天徳二年河東南路轉運使毛碩上言曰頃者定立商酒課不量土産厚薄户口多寡及今昔物價之增耗一槩理責之故監官被繫失身破家折傭逃竄或為姦吏盜有實錢而以賖劵輸官故河東有積負至四百餘萬貫公私苦之請自今禁約酒官不得折准賖貸惟許收用實錢則官民俱便世宗問參知政事魏子平曰古者稅什一而民足今百一而民不足何也子平對曰什一取其公田之入今無公田而稅其私田為法不同古有一易再易之田中田一年荒而不種下田二年荒而不種今乃一切與上田均稅之此民所以困也宣宗時髙汝礪為尚書左丞時髙琪欲從言事者歲閱民田徴租朝廷將從之汝礪言曰臣聞治大國者若烹小鮮最為政之善喻也國朝自大定通檢後十年一推物力惟其貴簡靜而重勞民耳今言者請如河北歲括實種之田計數徴斂即是常時通檢無乃駭人視聽使之不安乎且河南河北事體不同河北累經刦掠户口亡匿田疇荒廢差調難依元額故為此權宜之法葢軍儲不加多且地少而易見也河南自車駕廵幸以來百姓湊集凡有閒田及逃户所棄耕墾殆遍各承元户輸租其所徴斂皆準通推之額雖軍馬益多未嘗闕誤詎宜一槩動擾若恐豪右蔽匿而逋征賦則有司檢括亦豈盡實但嚴立賞罰許其自首及聽人告捕犯者以盗軍儲坐之地付告者自足使人知懼而賦悉入官何必為是紛紛也抑又有大不可者三如每歲檢括則夏曰春秋曰夏量中間雜種亦且隨時量之一歲中畧無休息民將厭避耕種失時或止耕膏腴而棄其餘則所收仍舊而所輸益少一不可也檢括之時縣官不能家至户到里胥得以暗通貨賂上下其手虚為具文轉失其真二不可也民田與軍田犬牙相錯彼或陰結軍人以相冒亂而朝廷止慿有司之籍倘使臨時少於元額則資儲闕誤必矣三不可也夫朝廷舉事務在必行之既行而復中止焉是豈善計哉元世祖時東平布衣趙天麟上策曰臣聞乾下坤上謂之泰損上益下謂之益民雖極賤而存上交之理則安矣君雖至貴而盡下合之義則聖矣民借君以為心而鼓動天下之化君須民以為用而充給天下之力昔宋興役而起澤門之謳周經始而適子來之願原其築臺之實一也下民怨慕氷炭其殊焉豈非一失所用之時而一得之乎秦發閭左之戍而海内愁之衛建楚丘之封百姓恱之究其建城之名一也下民悲喜霄壤其異焉豈非一為無益之務而一有益乎故以逸道使民勞而不怨以當理動衆和而不傷且為人上者百姓之父母也百姓者君之赤子也設或父母陵虐其子其子雖勉强以從之然欲其家道之洽和則不可得也今國家之於下民可謂厚矣竊恐郡縣之官未奉國家之明法倘有虐貧陵弱者可不圖之哉臣伏見近年詔書有云自三月初至九月終凡勞民不急之役一切停罷欽此臣以為國家之心如天如地非一言之可盡也彼在外之有司因王事之靡盬多以假借為名農務之間亂起丁役局天蹐地無計陳寃雖曰省之其實非也臣又以妨農之役非一今試畧舉一端頃者㑹通河路流沙滯水方春之際大興徒役男執鍬畚女餉飲食耕者不得以服畆蠶者不得以伐揚民之生理甚大而不顧則䖏國家之職者果何務哉此但臣所親見者也若夫四方之大似山東者非一而其役又非一不亦怨哉或謂依春秋之法役冬月之民則所謂執古禮而不便今崇虚名而受實禍也氷雪凝冬役人多窘春陽扇暖易以施功由是而行之有何不可乎臣意非謂此也春秋之時井田法在末民極寡咸農務功是以恐妨農而移百役於冬也今則不然末民極衆若又用力役之事而妨其農則饑寒之苦莫逃矣臣又以郡縣之中鄉司里正鉛槧小技奴𨽻下材亦皆驅役良民莫敢違拒如或違拒者一旦科差定役之時循恩讎以增減之且差役委鄉司里正則將安用彼守令哉此皆小事敢干天聽者誠以國家之本莫大於農而國家之寳無急於力也伏望陛下居九重之深邃審百姓之艱難布告中外咸使聞知凡毎歲三月至九月有以勞民不急之事擅起丁役託假以為名者並以違制論凡三月至九月有耕耨之田者役無緩急不在其限凡三月至九月有逺大差役不得已而差煩農家者有田務之家助資給無田務之家助人力凡力役之品次幸從臣先所獻萬言策内之説則鄉司里正自不得以擅相欺矣然而民力猶未之均農民猶失其所者未之有也天麟又上寛逃民策曰臣聞貧民業輕而易舉下民心愚而若神撫之則聚擾之則散可以徳綏而不可以力勝可以道遇而不可以智欺之也今國家灼知此道是以辛酉詔令中統建元以前逃户復業者户下差稅第一年全免次年減半三年然後驗等第依例科徴自此以後累頒詔文優恤逃户蠲免欠負斯皆先帝天覆地載克寛克仁之惠也臣謂逃民之故有五一曰天二曰官三曰軍四曰錢五曰愚何謂天有田之家田為恒産屢經饑儉糧竭就食如此而逃者天所致也何謂官守令苛刻役斂煩興富以賂免貧難獨任如此而逃者官所致也何謂軍軍資不贍鬻賣田産産既盡矣無以供給如此而逃者軍所致也何謂錢生理不周舉債乾沒子本增積而不能速償債主稱辭而訴官急徴如此而逃者錢所致也何謂愚弗幹父蠱隕墜遺業悔恨不及窮困失所如此而逃者愚所致也夫逃民皆無奈之民也倘能存生豈肯逃哉又詔云苟避差發臣謂此則非民之罪乃官長之罪爾昔漢倪寛為内史軍發負租課殿當免民聞之大家牛車小家擔負輸租繈屬課更以最此葢民信愛之故也官長誠有憂民愛民之心而民亦信愛其官長豈有茍避差發者哉又聖人云君子固窮小人窮斯濫矣非務本而不能治也若國家但矜而免之則將致浮浪之民輕舉而茍免之心生若國家欲急而刑之則将致無恒之流計極而邪濫之事起耳國家矜而免之急而刑之不若使之樂業而不逃也欲使不逃盍亦務其本矣伏望陛下一新汚俗再整淳風下哀痛之詔該化導之義凡令下以前逋負差稅並行除免凡有田而逃者聽復本業優恤之理並同辛酉詔文凡無田而逃者聽於曠土占田優恤之理如有復田業者凡復業占田而貧無牛及田器者官為貰而頒之限三年外酬其賣主之直而無息也其限内自欲酬者聽凡因軍而逃者騐實貧與助資之戸凡欠負他人錢債者復業之後限五年之外一本一利償之其限内自欲償者聽凡既復業而尚游手荒廢農業者鄉三老舉於官而罪之逃民已定於是慎名器以絶濫虐之官限田産以絶兼并之家務農桑以絶廢業之人課義倉以絶凶歲之厄向之逃民雖賞之亦不復逃矣此謂之務本天麟又上薄差稅策曰臣聞晁氏云三王計安天下莫不本於人情人情莫不欲壽三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡也今國家灼知此道爰究時宜既立斤絲貫鈔包銀丁石之法又立賦稅三十而一之例然而公廪無彌年之積私家無備急之儲皆以郡縣不均之所致也承平之時烟火萬里境壤相接雞犬相聞或人樂逰遨或慘慘劬勞或棲遲偃仰或力役鞅掌富者奢侈而自富貧者困窮而愈貧臣謂不急救之行無及矣古者什一之法關市譏而不征澤梁無禁夏后氏立貢法而義士猶以為不及助徹管夷吾取關市之征五十而一後人謂之霸道葢國法有經而但當平立民財有而不可輕奪也方今賦稅三十而取一外有關市之征及酒醋鹽茶金漆竹樹銀銅錫鍇山場湖濼海舶江鄉竭萬物而𣙜之窮利源而課之國家亦已富矣古者什而取一其實止什一也方今三十而取一比古者其實什五也夫國家之用有八一曰宫禁之資二曰宴好之將三曰賞賜之頒四曰俸禄之給五曰軍旅之粮六曰工役之費七曰凶荒之用八曰芻秣之具於此八者之中軍旅之粮量為浩大幸從臣言偃兵戈而不動廣屯田而自贍亦不須多用民之粮矣其宫禁宴好俸祿芻秣已有供之者焉其餘節其所用而用之亦豈多須哉臣又以鹽者民之日用增其課利而人不之苦也伏望陛下降彌天之厚福顧下土之㣲民旁布玉音允符嘉㑹凡天下農民自屯田隨處並興之後例除租稅之半凡天下民户自鹽課約量增􅄈之後例除差稅之半於是幸從臣先所獻萬言策内均科差稅之法詔諭郡縣而均定之用為成式若然則廓造化之洪恩振内外之喜氣獲神祇之陰佑發太平之祥徴民安而社稷自安民富而社稷自富矣仁宗延祐元年平章章閭上言曰經理大事世祖已嘗行之但其間欺隠尚多未能盡實以熟田為荒地者有之懼差而析户者有之富民買貧民田而仍其舊名輸稅者亦有之由是歲入不增小民告病若行經理之法俾有田之家及各位下寺觀學校財賦等田一切從實自首庶幾稅入無隠差徭亦均歴代名臣奏議卷二百五十九
