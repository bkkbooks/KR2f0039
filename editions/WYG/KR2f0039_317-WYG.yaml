body:
  text: 厯代名臣奏議卷三百十七明楊士竒等撰弭盗漢武帝時東郡盜起丞相公孫𢎞奏言民不得挾弓弩十賊彍弩百吏不敢前彍音郭引滿曰彍盜賊不輒伏辜兔脫者衆害寡而利多此盜賊所以蕃也禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其埶必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議光禄大夫吾丘夀王對曰臣聞古者作五兵非以相害以禁暴討邪也五兵謂矛㦸弓劔戈安居則以制猛獸而備非常有事則以設守衛而施行陣及至周室衰微上無明王諸侯力政彊侵弱衆暴寡海内抏敝巧詐並生抏鈋盡也五官反是以知者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮墮名城殺豪桀墮火䂓反銷甲兵折鋒刄其後民以耰鉏箠挺相撻擊犯法滋衆盜賊不勝至於赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明德建太平舉俊材興學宫三公有司或由窮巷起白屋裂地而封宇内日化方外鄉風然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑􅓡蓬矢以舉之明示有事也有四方扞禦之事孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功言貴中也中竹仲反愚聞聖王合射以明教矣未聞弓矢之為禁也且所謂禁者為盜賊之以攻奪也政奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁抵觸也是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相𢎞𢎞詘服焉宣帝時渤海左右郡嵗飢盜賊並起二千石不能禽制上選能治者丞相御史舉龔遂可用上以為渤海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心内輕焉謂遂曰渤海廢亂朕甚憂之君欲何以息其盜賊以稱朕意遂對曰海瀕遐逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上聞遂對甚說答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金贈遣乗傳至渤海界張敞以勃海膠東盜賊並起上書自請治之曰臣聞忠孝之道退家則盡心於親進宦則竭力於君夫小國中君猶有奮不顧身之臣況於明天子乎今陛下逰意於太平勞精於政事亹亹不舍晝夜羣臣有司宜各竭力致身山陽郡户九萬三千口五十萬以上訖計盜賊未得者七十七人它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡嵗數不登盜賊並起至攻官寺簒囚徒捜市朝劫列矦吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀書奏天子徴敞拜膠東相賜黄金五十斤敞辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效者願得壹切比三輔尤異天子許之王莾以璽書令卜者田況領青徐二州牧事況上言盜賊始發其原甚微非部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽畧不輒督責遂至延曼連州乃遣將率多發使者傳相監趣郡縣力事上官應塞詰對共酒食具資用以救斷斬不給復憂盜賊治官事將率又不能躬率吏士戰則為賊所破吏氣寖傷徒費百姓前幸䝉赦令賊欲解散或反遮擊恐入山谷轉相告語故郡縣降賊皆更驚駭恐見詐滅因飢饉易動旬月之間更十餘萬人此盜賊所以多之故也今雒陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭少則亡以威示逺方宜急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積藏榖食并力固守賊來攻城則不能下所過無食埶不得羣聚如此招之必降擊之則滅今空復多出將率郡縣苦之反甚於賊宜盡徴還乗傳諸使者以休息郡縣委任臣況以二州盜賊必平定之東漢安帝即位以後頻遭元二之戹元二即元元也百姓流亡盜賊並起郡縣更相飾匿莫肯糾發更相文飾隠匿也尚書陳忠獨以為憂上䟽曰臣聞輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒是以明者慎微智者識㡬書曰小不可不殺詩云無縱詭隨以謹無良盖所以崇本絶末鉤深之慮也臣竊見元年以來盜賊連發攻亭刼掠多所傷殺夫穿窬不禁則致彊盜彊盜不斷則為攻盜攻盜成羣必生大姦故亡逃之科憲令所急至於通行飲食罪致大辟通行飲食猶過致資給與同罪也飲音䕃食音寺而頃者以來莫以為憂州郡督録怠慢長吏防禦不肅皆欲採獲虚名諱以盜賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有跼􅐲比伍轉相賦斂或隨吏追赴周章道路是以盜發之家不敢申告隣舍比里共相壓迮迮廹也或出私財以償所亡其大章著不可掩者乃肯發露陵遲之漸遂且成俗宼攘誅咎皆由於此前年勃海張伯路可為至戒覆車之軌其迹不逺盖失之末流求之本源宜糺增舊科以防來事自今彊盜為上官若它郡縣所糺覺一發部吏皆正法上官謂郡府也若及也部吏謂督郵斿徼也正法依法也尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切勅刺史嚴加糺罰冀以猛濟寛驚懼姦慝頃季夏大暑而消息不協寒氣錯時水涌為變天之降異必有其故所舉有道之士可䇿問國典所務王事過差令處煖氣不效之意庶有讜言以承天誡桓帝時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝亷茂才尚書陳蕃上䟽駮之曰昔髙祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴勅三府隠覈牧守令長其有在政失和侵暴百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守靈帝時鉅鹿張角偽託大道妖惑小民侍御史劉陶與奉車都尉樂松議郎袁貢連名上䟽曰聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切勅州郡䕶送流民㑹賜去位不復捕録雖㑹赦令而謀不解散四方私言云角等竊入京師覘視朝政鳥聲獸心私其鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不悟方詔陶次第春秋條例明年張角反亂海内鼎沸帝思陶言封中陵鄉侯後魏孝文帝問止盜之方秘書令髙祐曰昔宋均樹德害獸不過其鄉卓茂善教蝗蟲不入其境彼盜賊者人也茍訓之有方寧不易息當須宰守貞良則盜止矣宣武帝永平四年河南尹甄琛上表曰國家居代患多盜竊世祖廣置主司里宰多置吏士為其羽翼始得禁止遷都已來四逺赴㑹五方雜沓宼盜公行里正職輕任碎多是下才不能督察請少髙其品選下品中應遷者進而為之詔從之琛又奏以羽林為㳺軍於諸坊巷司察盜賊於是洛城清静後常踵焉隋文帝開皇四年上以隴西頻被宼掠而俗不設村塢命將軍賀婁子幹勒民為堡仍營田積榖子幹上書曰隴西河右土曠民稀邊境未寧不可廣佃比見屯田之所獲少費多虚役人功卒逄踐暴且隴右之民以畜牧為事若更屯聚彌不自安但使鎮戍連接烽堠相望民雖散居必謂無慮隋主從之煬帝大業十二年帝問侍臣盜賊翊衛大將軍宇文述曰漸少納言蘇威引身隠柱帝呼問之對曰臣非所司不委多少但患漸近帝曰何謂也威曰他日賊據長白山今近在汜水且徃日租賦丁役今皆何在豈非其人皆化為盜乎比見奏賊皆不實遂使失於支計不時翦除叉昔在雁門許罷征遼今復徴發賊何由息帝不恱頃之帝問威以伐髙麗事威欲帝知天下多盜對曰今兹之役願不發兵但赦羣盜自可得數十萬遣之東征髙麗可滅帝不懌唐太宗即位之初上與羣臣論止盜或請重法以禁之上曰朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法邪自是數年之後海内升平路不拾遺外户不閉商旅野宿焉穆宗即位韓愈論黄家賊事宜狀其一曰臣去年貶嶺外刺史其州雖與黄家賊不相隣接然見徃來過客并諳知嶺外事人所說至精至熟其賊並是夷獠亦無城郭可居依山傍險自稱洞主衣服言語都不似人尋常亦各營生急則屯聚相保比縁邕管經畧使不得人德既不能綏懐威又不能臨制侵欺虜縛以致怨恨蠻夷之性易動難安遂至攻刼州縣侵暴平人或復私讐或貪小利或聚或散終亦不能為事近者征討本起於裵行立陽旻此兩人者本無逺慮深謀意在邀功求賞亦縁賊未屯聚之時將謂單弱立可摧破争獻謀計惟恐後時朝廷信之遂允其請自用兵已來已經二年前後所奏殺獲計不下一二萬人儻皆非虚賊已尋盡至今賊猶依舊足明欺罔朝廷邕容兩管因此凋弊殺傷疾患十室九空百姓怨嗟如出一口陽旻行立相繼身亡實由自邀功賞造作兵端人神共嫉以致殃咎陽旻行立事既已徃今所用嚴公素者亦非撫御之才不能别立規模依前還請攻討如此不已臣恐嶺南一道未有寧息之時其二曰昨者併邕容兩管為一道深合事宜然邕州與賊逼近容州則甚懸隔其經畧使若置在邕州與賊隔江對岸兵鎮所在物力必全一則不敢輕有侵犯一則易為逐便控制今置在容州則邕州兵馬必少賊見勢弱易生姦心伏請移經畧使於邕州其容州但置刺史實為至便其三曰比者所發諸道南討兵馬例皆不諳山川不伏水土逺鄉羇旅疾疫殺傷臣自南來見說江西所發共四百人曾未一年其所存者數不滿百岳鄂所發都三百人其所存者四分纔一續添續死毎發倍難若令於邕容側近召募添置千人便割諸道見供行營人數糧賜均融充給所費既不增加而兵士又皆便習長有守備不同客軍守則有威攻則有利其四曰自南討以來賊徒亦甚傷損察其情理厭苦必深大抵嶺南人稀地廣賊之所處又更荒僻假如盡殺其人盡得其地在於國計不為有益容貸羈縻比之禽獸來則捍禦去則不追亦未虧損朝廷事勢以臣之愚若因改元大慶赦其罪戾遣一郎官御史親徃宣諭必望風降伏讙呼聽命仍為擇選有材用威信諳嶺南事者為經畧使處理得宜自然永無侵叛之事宣宗大中元年雞山羣盜宼掠果州及巴南妖賊言辭悖慢上怒甚崔鉉曰此皆陛下赤子廹於飢寒盜弄兵於谿谷間不足辱大軍但遣一使者可平矣乃遣京兆少尹劉潼招諭之潼言使之歸命其勢甚易所慮者武臣耻不戰之功議者責欲速之效耳宋真宗咸平三年濮州盜夜入城畧知州王守信監軍王順度知黄州王禹偁聞而奏䟽曰伏以體國經野王者保邦之制也易曰王公設險以守其國自五季亂離各據城壘區分𤓰剖七十餘年太祖太宗削平僭偽天下一家當時議者乃令江淮諸郡毁城隍收兵甲撤武備者二十餘年書生領州大郡給二十人小郡減五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣為强幹弱枝之術亦匪得其中道也臣比在滁州值發兵挽漕關城無人守禦止以白直代主開閉城池頽圮鎧仗不完及徙維揚稱為重鎮乃與滁州無異嘗出鎧甲三十副與廵警使臣彀弩張弓十損四五盖不敢擅有修治上下因循遂至於此今黄州城池器甲復不及滁揚萬一水旱為災盜賊竊發雖思禦備何以枝梧盖太祖削諸侯跋扈之勢太宗杜僭偽覬望之心不得不尔其如設法救世久則弊生救弊之道在乎從宜疾若轉規固不可膠柱而鼓瑟也今江淮諸州大患有三城池墮圮一也兵仗不完二也軍不服習三也濮賊之興慢防可見望陛下特紆宸斷許江淮諸郡酌民户衆寡城池大小並置守捉軍士多不過五百人閱習弓劔然後漸葺城壁繕完甲胄則郡國有禦侮之備長史免剽畧之虞矣䟽奏上嘉納之仁宗慶厯三年知諫院歐陽修上奏曰臣近因軍賊王倫等事累有論奏為天下空虚全無武備指陳隋唐亡國之監皆因兵革先興而盜賊繼起不能撲滅遂至横流又見國家綱紀隳頽法號寛弛賞罰不立善惡不分體量勢危可憂可懼欲乞朝廷講求禦賊之術峻行責下之法兼聞搢紳之内憂國者多皆論盜賊事臣但謂朝廷見已形之患聞衆多之言必動於心畧知恐懼及聞樞宻院戒勵進奏官不使外人知事方認兩府厭苦獻言之人又見自和州奏破王倫之後更不講求禦賊之策又認上下已有偷安之意殊不知前賊雖滅後賊更多今建昌軍一火四百人桂陽監一火七十人草賊一火百人其餘池州解州鄧州南京等處各有强賊不少皆建旗鳴鼓白日入城官吏逄迎飲食宴樂其敢如此者盖為朝廷無賞罰都不足畏盜賊有生殺時下須從臣恐上下因循日過一日國家政令轉弱盜賊威勢轉强使畏賊者多向國者少天下之勢從此去矣竊聞京西提㸃刑獄張師錫為部内使臣與賊同坐喫酒及廵檢縣尉不肯用心曽有論奏其言甚切臣舊識師錫其人恬静長者遲緩優柔不肯生事今尚有此奏則臣謂天下無賢愚皆為國家憂之獨不憂者朝廷尔嗟夫古之智士能慮未形之機今之謀臣不識已形之禍以患為樂以危為安盜賊雖多而時有敗者遂生玩宼之意見言事者衆而聽之已熟遂有忽人之心臣近曾求對便殿伏䝉陛下語及賊事憂形于色及退見宰輔從容閒暇天下之事深可憂矣今桂陽建昌軍賊數不少想其害為尤甚王倫在於逺處更不留意今自京發兵則道逺不及外處就撥則處處無兵欲乞嚴勅大臣鑒已成難救之意速講定禦盜之法兵行天下使四方漸為備禦攻守擘畫剪撲諸處見在賊數自有賊已來群臣上言者皆為自來寛法致不肯用心捉賊皆乞峻行法令近見池州官吏各只有罰銅五斤及知言者皆不䝉納臣謂大臣為國計者寧厭忠言之多不厭盜賊之多乃如此行事臣前後上言賊事文字不少仍乞𩔖聚擇其長者講定法制陛下欲知大臣不肯峻國法以繩官吏盖由陛下不以威刑責大臣此乃社稷安危所係陛下之事也伏望留意而行之修論禦賊四事劄子曰臣昨自軍賊王倫敗後尋曾極言論列恐相次盜賊漸多乞朝廷早為禦備凡為國家憂盜賊者非獨臣一人前後獻言者甚衆皆為大臣忽弃都不施行而為大臣者又無擘畫果致近日諸處盜賊縱横自淮海已南而新遭王倫之後今自京以西州縣又遭張海郭貌山等刼掠焚燒桂陽監昨奏蠻賊數百人夔峽荆湖各奏蠻賊皆數百人解州又奏見有未獲賊十餘火滑州又聞强賊三十餘人燒却沙彌鎮許州又聞有賊三四十人刼却椹澗鎮此臣所聞目下盜起之處如此縱横也此外京東今嵗自秋不雨至今麥種未得江淮倫賊之後繼以飢蝗陜西災旱道路流亡日夜不絶似此等處將來盜賊必起是見在者未滅續來者愈多而乾象變差譴告不一於古占法多云天下大兵並起今兵端已動於下天象又告於上而朝廷安恬舒緩無異常時此臣前狀所謂古之智者能慮未形之機今之謀臣不識已形之禍者也臣聞兩漢之法凡盜賊並起人民流亡天文災異如此等事皆責三公或被誅戮或行黜放今幸陛下仁聖寛慈大臣偶免重責而猶忘忽禍患偷習因循此臣所謂大臣不肯峻國法以繩官吏盖由陛下不以威刑責大臣者也今見在賊已如此後來賊必更多若不早圖恐難後悔臣計方今禦盜者不過四事一曰州郡置兵為備二曰選捕盜之官三曰明賞罰之法四曰去冗官用良吏以撫疲民使不起為盜此四者大臣所忽以為常談者也然臣視今朝廷於四者未有一事合宜伏望聖慈嚴勅兩府大臣問其捨此四事别有何術可為茍無他術則此四者宜早施行臣竊聞州郡置兵富弼已有條奏其餘三事前後言事者議論甚多伏乞合聚羣議擇其善者而行其禦盜四事方今措置乖失極多容臣續具一二條奏修論京西賊事劄子曰臣竊聞近日張海郭貌山與范三等賊勢相合轉更猖狂諸處奏報日夕不絶伏惟聖慮必極憂勞不聞廟謀有何處置臣竊見朝廷作事常有後時之失又無慮逺之謀患到目前方始倉忙而失措事纔過後已却弛慢而因循昨王倫暴起京東轉攻淮甸横行千里旁若無人既於外處無兵須自京師發卒孫惟忠等未離都下而王倫已至和州矣頼其天幸偶自敗亡然而驅殺軍民焚燒城市瘡痍塗炭毒遍生靈此州郡素無守備而旋發追兵誤事後時之明驗臣謂朝廷因此必悔前非須有更改以防後患而自王倫敗後居兩府者了無擘畫有上言者又不施行上下拖延日過一日遂致張海郭貌山等又起京西攻刼州縣横行肆毒更甚王倫依前外處無兵又自京師發卒臣聞張海是李宗火内惡賊郭貌山在商山已及十年其驍勇兇姦不比王倫偶起之賊縱使官兵追及亦其勝負未知天下之憂恐自此始臣亦知近日臣寮上言賊事者甚衆竊慮兩府進呈文字之時必須奏言已差使臣選兵追捕將此拙計便為廟謀上寛聖懐茍自塞責張海等二百餘人盡有甲馬日行一二百里馬力困乏則弃别奪民間生馬乘騎竊科官兵必難追逐縱使追兵能及生靈已受其殃此度賊雖能平後患豈可不慮以今四方盜起所在各要隄防則臣前所言禦賊四事之中州縣置兵最為急務伏望陛下憫此生民見受屠戮之苦不聽迂儒遲緩悞事之言其州縣置兵事件富弼已有起請伏乞決於宸意速與施行修再論置兵禦賊劄子曰臣近為張海等賊勢猖狂曾上言禦賊四事内一件州郡置兵為備風聞朝議已依富弼起請施行其餘三事一乞選捕盜官二乞定賞罰新法三乞按察老病貪賍之官此三事至今未聞擬議臣伏見去年朝廷於諸道州府招宣毅兵士及添置鄉兵弓手當時騷擾次第不小本要為州縣禦賊之備及一旦王倫張海等相繼而起京東淮南江南陜西京西五六路二三十州軍數千里内殺人放火肆意横行入州入縣如入無人之境則去年所置宣毅兵鄉兵弓手等盡皆何在無一處州縣得力者盖由官吏不得其人賞罰無法而所置宣毅鄉兵弓手皆不堪使用所以張皇騷擾空有為備之名而無為備之用今朝廷雖依富弼起請令州郡置兵若不先擇官吏嚴立法令則依前置得不堪使用之兵空有其名終不濟事故臣謂必欲州郡置得精兵則須採臣所陳三事一一施行方可集事其州縣官吏悞事臣請試言京西一兩處則其他可知郢州知州王昌運老病腰脚行動不得毎日令二人扶出坐衙三年之内州政大壊臨替得一比部員外郎劉依交代其劉依亦是七十餘嵗昏昧不堪昨在滑州寄居臣為通判三四度來看臣毎度問臣云中書有一王參政名甚如此不知人事陛下試思如此等人能為國家置兵禦賊乎今汝州知州鮑亞之是三司以不才東退者鄧州知州朱文郁是轉運使中不材選退者二人老懦不才如此等人能為國家置兵禦賊乎陛下欲知全盛之世盜賊便敢如此者盖為處處官吏非人故臣前後累言乞按察冗濫之官者盖為恐有此事也兩府之議不肯於無事之時先為禦備直待打破一州方議換知州打破一縣方議換縣令其餘未經打破州縣一任老病貪繆之官壊之臣謂是大臣不欲以身當怨之過也今天下生民獲安樂則皆須上感陛下聖德若其父子殺戮離散不安則亦必歸怨陛下今大臣不肯澄汰盖避百十人官吏怨其身寧使百萬蒼生塗炭而怨國家今盜賊一年多於一年一火强於一火天下禍患豈可不憂伏望聖明特出睿斷如必行州郡置兵之法則先須慎擇官吏免致虚為騷擾反更害民臣前後三次乞案官吏況國家自來毎有災傷路分累曾遣使安撫豈於今日視民如此塗炭頓以遣使為難願陛下力主而行之則天下幸甚修論募人入賊以壊其黨劄子曰臣竊聞京西賊盜日近轉多在處縱横不知火數所患者素無禦備不易枝梧然獨幸賊雖猖狂未有謀畫若使其得一曉事之人教以計策不掠婦女不殺人民開官庫之物以振貧窮招愁怨之人而為黨與況今大臣不肯行國法州縣不復畏朝廷官吏尚皆公然迎奉疲民易恱豈有不從若兇徒漸多而不暴虐則難以常賊待之可為國家憂矣以此思之賊衆雖多尚可力破使有一人謀主卒未可圖臣前因王倫賊時曾有起請十餘事内一件乞出牓招募諸處下第舉人及山林隠士負犯流落之人有能以身入賊筭殺首領及設計誤賊陷於可敗之地者優與酧奬所貴兇黨懐疑不納無賴之人以為謀主當時議者頗以為然伏乞採臣此意速降指揮與杜杞令所在張牓使賊聞知所貴投賊之人懐疑不納但無謀主尚可剪除又論宜專責杜杞捕賊劄子曰臣伏見昨張海等賊勢初盛之時京西未有得力官吏遂自朝廷差臺官蔡禀催督捉殺後來已别選杜杞充京西轉運使委以一路之事並近日差出兵馬甚多分為頭項不少部分進退須要統一指縱號令不可二三竊慮杜杞蔡禀不相叶同各出異見凡指揮諸事使諸將難從一失事機反成敗蹤自兵士差出今已多時然未聞奏報與賊闘敵及殺獲次第竊慮官兵互相廻避空作徃來或恐進退之間號令不一致兹逗遛未見成功今雖賊奏稍稀然亦未見殺獲之數困獸猶闘不可不虞宼死命窮恐未易敵合早除剪仍須督責況蔡禀是應急差出杜杞乃選材用之責任之問宜專在杞兼聞蔡稟自到京西處置多未合宜近聞欲枷一廵檢致得兵士喧噪㡬至生變茍或如此張皇竊恐别致生事其蔡禀伏乞早賜指揮抽回只委杜杞一靣催捉庶得專一早能了當修論捕賊賞罰劄子曰臣伏見方今天下盜賊縱横王倫張海等所過州縣縣尉廵檢有迎賊飲宴者有獻其器甲者有畏懦走避者有被其驅役者朝廷於此憂賊之時正患乏人之際或於廵檢縣尉之内得一捕賊可使之人則必須特示旌酬以行激勵茍或未能者猶須懸賞以待之何況有而失賞伏見吏部選人區法自出身以來兩任縣尉初任臨江軍新淦縣三年之内大小賊盜獲四十餘火内雖小盜數多其如强刼羣賊亦不為少據於賞格合改京官而有司守纎細之文執尋常之例謂其所獲雖為全火而不同時因不與理為勞績臣料天下州縣盜賊之多無如新淦天下縣尉能捉賊之多亦無如區法又聞法次任吉水縣尉使其縣民結為伍保至今吉水一縣全無盜賊民甚便之法為縣尉官至卑賤所至之處皆有可稱臣思朝廷非不欲賞善罰惡以行勸戒而患於有司法弊拘守常文致抑才能失於旌賞其區法偶與臣相識因得知之然人所不知抑而不申者何可勝數竊以盜賊是方今急患縣尉方今切要之人皆朝廷常合留意之事臣輒有起請事件具畫一于後一選人區法捕賊之効甚多但為有司拘守細碎之文不理勞績其人已升得職官伏乞追取本人厯子别加考驗如實有勞能即乞不拘常格特與酬奬以勸後來一臣謂天下羣盜縱横皆由小盜合聚今但患其大而不防其微故必欲止盜先從其小能絶小盜者廵檢縣尉也然而賞罰之法其弊極多只如捕盜去惡但要浄盡豈必須是一日之内同時捕獲假如有全火强賊縣尉廵檢以死命闘敵若於兩日内捉盡已不理為勞績其守文之弊如此極多欲乞下銓司重定捕賊賞格施行一臣伏見自天下有盜賊以來議者多陳禦盜之策皆欲使民結為伍保則姦惡不容今區法於吉水縣立伍保之法三年之内刼賊不敢入其縣界臣欲乞特降指揮下江南西路體量吉水縣自區法創立伍保之法以來如實全無刼賊又民間以為便利即乞頒行伍保之法於天下四年修論湖南蠻賊可招不可殺䟽曰臣風聞楊畋近與蠻賊闘敵殺得七八十人首級仍聞入彼巢穴奪其糧儲挫賊之鋒增我士氣畋之勇畧固亦可嘉然朝廷謀慮事機宜思久逺竊恐上下之心急於平賊聞此小㨗便形虚喜不能鎮静外示輕脫其間二事尤合深思一曰不待成功便行厚賞二曰謂其可殺更不肯招茍或如此則計之大失而事之深害也今湖南捕賊者殺一人頭賞錢十千官軍利賞見平人盡殺平人驚懼盡起為盜除鄧和尚李花脚等數十頭項外其餘隨大小成火者不可勝數今畋所擊只一洞所聚已二千餘人於二千人中殺七八十人是二十分之一其餘時暫鳥散必須復集臣見自古蠻蜑為害者不聞盡殺須是招降昨縁邵飾等失信於黄捉鬼遂恐更難招誘今若因畋小勝示以恩威正是天與招服之機不可失也若令畋自作意度招取大頭項者因此小勝傳布㨗聲其餘諸處結集者分行招誘藉此聲勢必可盡降旬日之間湖南定矣若失此時漸向夏熱以我所病之兵當彼慣習水土之賊小有敗衂則彼勢復堅不惟為害湖南必慮自此貽朝廷憂患今於未了之間便行厚賞則諸處廵檢捕賊官等見畋獲賞争殺平人而畋等自恃因戰得功堅執不招之議朝廷亦恃畋小勝更無招輯之心上下失謀必成大患其楊畋等伏乞且降勅書奬諭授與事宜俟彼招安便行厚賞今湖南賊數雖多然首惡與本賊絶少其餘盡是枉遭殺戮逼脅為盜之徒在於人情豈忍盡殺惟能全活人命多者則其功更大仍乞明說此意諭與楊畋其賞典乞少遲留庶合事體修又上䟽曰臣風聞湖南蠻賊近日漸盛殺戮官吏鋒不可當新差楊畋銳於討擊與郭輔之異議不肯招降又王絲去時朝廷亦别無處分慮絲到彼與畋同謀盖蠻賊只可招􅂝卒難剪撲而畋等急於展効恐失事機今深入而攻則山林險惡巢穴深逺議者皆知其不可若以兵外守待其出而擊之則又未見其利也盖以蠻所依山在衡州永州道州桂陽監之間四靣皆可出宼若官兵守於東則彼出於西官兵守於南則彼出於北四靣盡守則用兵太多分兵而邀之則兵寡易敗此進退未有可擊之便也今盤氏正蠻已為鄧和尚黄捉鬼兄弟所誘其餘山民莫猺之𩔖亦皆自起而為盜竊聞常寧一縣殆無平民大小之盜一二百火推其致此之因云莫猺之俗衣服言語一𩔖正蠻黄鄧初起之時捕盜官吏急於討擊逄蠻便殺屢殺平人遂致莫猺驚惶至此以此而言則本無為盜之心固有可招之理然欲諸盜肯降必須先得黄鄧昨邵飾等初招黄捉鬼之時失於恩信致彼驚逃尋捕獲之斷其脚筋因而致死今鄧和尚等若指前事為戒計其必未輕降如云且招終恐難得必須示以可信之事推以感動之恩若得黄鄧先降其餘指麾可定今深入而攻既不可待其出而擊之又不可且殺且招又不可以臣思之莫若罷兵曲赦示信推恩庶㡬招之可使聽命臣亦廣詢南方來者云我若推信彼不難招鄧和尚等大則希一班行其次不過殿侍足矣正蠻叛者得一團主之名亦足矣莫猺之𩔖使安耕織而嵗輸皮粟得為平民乃彼大幸不徒足志而已今若擊之不已則其為害愈深況漸近夏暑雨方燀溼士卒不習水土須慮死傷仍恐廹之大急則潭郴全邵諸寨向化之蠻皆誘脅而起則湖南一路可為國家之憂臣欲乞速令兩府大臣深究招殺之利害共思長䇿決定廟謀若遷延後時致彼猖獗不幸官吏頻遭殺害則朝廷之體難為屈法而招彼以其罪既多必恐不能自信則兵久不解害未有涯伏望聖明斷之在早慶厯三年右正言余靖論禦盜之䇿莫先安民䟽曰臣竊見陜西京西京東淮南荆湖等路各有群賊大者數百人小者三五十人剽刼州縣恣行殺伐官吏罷軟望風畏懼如張海等軰日肆猖狂逐處州軍為備者唯能乞師以自防援此盖軍政久弛又少良吏故小有寇盜則上煩朝廷伏見近日遴擇才臣為諸路轉運使提㸃刑獄等將令上下相維謹於伺察去貪殘之吏撫疲瘵之民此誠求治之本也然臣愚慮思之自數年以來宼賊為害幸而起於軍伍烏合成羣百姓尚懐其生不相應和兹乃國家自祖宗以來輕徭薄賦以結人心至於此也臣聞孟子曰推恩足以保四海不推恩無以保妻子此古今之通論也國家西陲用兵以來經費漸廣故言利之臣日進其術不以安民為意者多矣惟陛下察之大抵民有蓄積能自充足則隣里親戚共相守衞不忍弃其安逸以就死若朝廷畧加存撫則不失其所凡今之所以害於農者謬官狡吏兼并之家㳺手之人乘國家賦斂猝暴而射其利以耗其蓄聚也今又加以賊盜驚擾廢其耕桑若皆失業困窮而共為盜則黄巾赤眉之患可憂矣故朝廷尤宜急撫之也夫州郡之兵多則食不充少則不足自衞裁當今之所宜唯兼濟而後可若使朝廷遴擇長吏長吏擇捕盜之官廵檢得自募勇力之士嚴捕賊之令重捕賊之賞賊無不破矣安民之術則但不奪其時不傷其財能禁其為非而去其為惡者則皆安堵矣故盜賊之勢不可使其滋蔓唯先求安民之術而已矣欲民之安者在乎謹改作勿争其利而已矣國家不謹改作而與民争尋常之利者臣别具條奏樞宻副使富弼乞諸道置兵以備宼盜䟽曰臣竊聞知金州比部員外郎王茂先奏九月十三日卯時有羣賊入州城打開軍資庫甲仗庫般運出衣甲物帛散與賊衆及貧民等知州以下只領當直兵士二十四人鬭敵不住州官走出城外任賊刼掠直至未時以來方始出城臣謂賊勢轉盛深可憂虞臣前嵗曾陳備賊之策正為今日之事今來累有羣賊白日入城開軍資等庫刼取衣甲物帛散與賊黨州中兵士不滿三十人州官散走賊徒恣行刼殺殊無畏憚官司勢不能制禦臣前嵗所陳只是過為隄防萬一或有此事不意今來便至如此小宼聚集尚陵侮朝廷臣決知自後更有大盜殺官吏據州城盡取官私財物召募徒衆必千萬人且賊頭稱王稱朕與朝廷相抗大刼財物散施無涯則貧民樂隨矣恣行刼殺務要震恐則小大脅從矣朝廷賞必有限罰必有條不得如賊之使人樂隨而脅從也若諸處觀望奸雄相應而起賊滿天下則大事去矣秦末隋末唐末皆由此而亂臣夙夜思念實為寒心臣伏以西賊未叛以前諸處雖有盜賊未嘗有敢殺戮官吏者自四五年來賊殺都廵檢縣尉官者約五六十員又西賊未叛以前諸處雖有盜賊未嘗敢入州城行刼自四五年來賊入州縣打刼者約三四十州向來入城尚皆暮夜竊發潜形徃來今則白日公行擅開府庫其勢日盛一日自此以徃只有轉盛若不早為隄備事未可知臣前嵗所上備賊之䇿當時不曾施行近日因兩府奏事論及淮南賊盜陛下問臣前䇿臣次日再録一本進呈訖然臣策只是備兵聚東南九路及京東一路今據金州奏在城只有兵士二十四人顯是無備致盜生心今并京西一路亦於要害聚兵為州郡聲援今諸處賊盜已盛方思設備已是後時若又遷延則無所及伏乞速賜施行五年弼知夀州兼京東路安撫使乞採訪京東狂謀之士䟽曰臣近曾親書劄子聞奏見察訪民間恐有暗行結扇不徒驚刼别蓄奸謀如劉巹之𩔖者候見的實别具申奏次臣後來察訪京東一路甚有兇險之徒始初讀書即欲應舉洎至長立所學不成雖然稍能文詞又多不近舉業仕進無路心常怏怏頗讀史傳粗知興亡以至討尋兵書習學武藝因兹長大胷膽遂生權謀每遇災祥便有竊議自以所圖甚大蔑視州縣既不應舉又不别營進身所臨之官無由肯見往往晦名詭姓潜迹遁形唯是兇徒宻相結扇或遇饑嵗必有竊發臣恐此軰一作卒難剪除縱無成謀亦能始禍似此軰𩔖的實甚多散在民間但未發耳又縁不希仕進難以牢籠不可捕而加刑加刑則黨𩔖驚而速為也不可縱而稔惡稔惡則根株成而難去也要在得而縻之使兇謀不能成此㝡上也欲乞批下於此一路中擇三兩處臣寮可委者宻令多方採訪如知姓名居處作草澤遺逸以禮呼召薦于朝廷隨其所能量加恩命則奸謀不能成矣或得稍優者量加異待則徒黨聞之未必不冀望而出因而收拾或可畧盡若以此軰不作其他盜賊雖遇飢年蜂起不足為慮也伏望陛下深切留意於此不可忽也八年弼乞選任轉運守令以除盜賊䟽曰臣伏見西鄙用兵以來騷動天下物力窮困人心怨嗟朝廷不能撫存遂使聚而為盜今張海郭貌山等數火驚擾州縣殺傷吏民恣凶殘之威洩憤怒之氣廵檢縣尉不敢向前遂從京師遣兵仍令中使監督尚猶遷延日月倔强山林以至白晝公行平入州縣開發府庫刼取貨財散募凶徒嘯聚漸衆陜西南京唐汝均房金商襄鄧相去凡千餘里殺人放火所在瘡痍賊一經過六親不能相保人民恐懼道路艱難每郡無兵各不自保若大段結集攻陷諸州緩急亦未有所以備之之䇿賊既轉盛不可不防秦末隋末唐末諸宼或起於畎畆或起於商客或起於士卒或起於負擔其初起莫不甚㣲尚不得如張海郭貌山軰如此其盛然以小合大漸成巨盜縱横難制遂亂天下今兹賊黨未見剪除所宜多設隄防以備滋蔓臣前日曾具劄子奏乞於京西路擇要害數州屯聚兵馬以為諸處聲援此最急務宜速施行臣又思京西諸州長吏皆非其人如襄鄧唐汝均房金商安郢等十餘州盡是賊盜見今往來之處長吏尤須得人伏乞先選轉運兩人徑令往彼體量諸州長吏不才及贓濫老病者急罷之便令於轄下通判或知縣中保舉權充知州如不足則朝廷下審官院選差人填補知州得人則就令選郡内知縣縣令昔前漢宣帝時渤海郡盜起帝選能治之人丞相舉龔遂遂至郡盜賊悉平後漢安帝時朝歌縣盜賊屯聚連年未獲乃以虞詡為朝歌長賊遂駭散此是兩漢時一郡一縣有賊只得龔遂虞詡兩人為守宰自然破滅之驗也今且以上項襄鄧等十餘州論之其知州知縣縣令皆庸謬懦怯尋常之人盜賊所到如入無人之境廵檢縣尉又一一不堪驅使賊不猖狂自恣復何為㢤臣竊謂非盜賊果能强盛自是朝廷只守弊法不肯更張唯恐不才不賢者怨恨不早罷去故以州縣委賊任賊殘害臣謂盜賊之起已是遲矣若以朝廷自來處置次第早合賊滿天下但為宗社有靈陛下仁德所感故未至如此然今盜賊已起乃是徧滿天下之漸若朝廷依舊避人怨恨不早更張臣恐賊盜愈多竊據州縣或稱將軍或稱太尉或稱王或稱帝兵戈四起所在僭偽事到如此生靈如何社稷如何朝廷守此一城還得安穩否況今來不同漢唐都關中洛陽各有險固可恃緩急有變用兵守險亦未能便至危窘尚自明皇德宗俱曾播越唐室危若贅旈者數矣今來都城並無險固所謂八靣受敵乃自古一戰場爾若四方各有大盜朝廷力不能制漸逼都城不知何以為計臣每念及此不寒而戰臣又伏思古者亂離無世不有然而傾亡至速者亦各不下三五十年唯唐室之後凡更五代十二帝共只得五十四年國祚短促自古未之有也其故何哉盖是都城在四戰之地並無險固四方有變直到城下畧無障礙之所致也唯是王者能鎮撫天下常使安寧災害不生賊盜不作則是都城也且保無虞故大宋之興實賴太祖英武之才平定祻亂盡削方鎮兵權只用文吏守土及將天下營兵縱横交互移換屯駐不使常在一處所以壊其凶謀也又賴太宗相繼尅復諸國一統天下更賴真宗為民屈己與北敵西戎議通和好故能八十餘年都城無事海内富庶不用干戈雖是人謀亦有天幸今則西戎已叛屢喪邊兵北敵愈强且增嵗幣國用殫竭民力空虛徭役日繁率斂日重官吏猥濫不思澄汰人民疾苦未嘗省察百姓無告朝廷不與為主不使叛而為宼復何為哉朝政不舉都城無依五代事迹已復萌露艱虞之運正在今日須是君臣上下同心協力廢寢㤀食夙夜整救則數年之内或致小康若猶因循茍且尚務偷安不練人謀只求天幸臣恐五代之祻不旋踵而至矣臣因論京西盜賊遂至理亂憂懼所廹不覺切至陛下便賜萬死亦所甘心臣所乞選京西轉運使知州知縣不可稽緩盖擾攘之際全藉有才謀轉運使往來按察經營又藉逐處知州知縣守䕶城池安集百姓及設方畧驅除宼盜其餘有朝廷意所不到指揮不及者其良守宰必自能就便處置不至失所州縣既各得一人又得要郡所屯之兵犄角救應則盜賊不難擒捕矣至於廵檢縣尉亦可並委轉運知州揀選不煩朝廷費力此䇿最為簡要無可疑難京西既行次及諸路變故或起倉卒設備皆不可遲朝廷但能不務因循不避怨謗天下之事未有不可為者所有諸路揀退不才及贓濫老病轉運知州知縣縣令等仰只在元守官處聽候朝㫖朝廷只就外指揮更不令赴闕仍乞檢㑹臣前奏相度施行慶厯五年翰林學士張方平上言曰西疆征戍未解天下州郡兵累次料揀赴京江淮已南空虚尤甚無復武備日來逐處盜賊連結剽劫城鎮聲勢甚張至今不能誅擒自古盜賊之擾攘不啻四夷之患漢唐之事為鑒不逺國家創五代之亂削方鎮之權誠為强幹弱枝之術及兹敝也無臂指相為用之勢通都大邑吏守空城而已慢藏之悔不可不慮今諸道提舉兵甲司向來領為虚名但朝廷稍付事權則猶有古者方靣之制應提舉兵甲州軍乞慎選良吏而為除本路鈐轄一員各令本路募兵量其山川險易封畧逺近而約置兵之數常令教閱務為精練朝廷更不行抽揀本道亦不得閒雜差使逺出其一路廵檢使臣縣尉諸捕盜官吏使得察亷其能否勇怯而升黜之所部郡縣强惡之民累犯罪禁者械送本司酌情法移配有宼盜結集之處量其勢力督遣廵檢等領兵甲捕逐若賊羣黨稍衆則本路鈐轄親督吏兵㑹合掩殺漢制刺史太守率以盜賊分數為最負其賞罰條目乞自朝廷比議指揮所冀郡縣武備氣勢相應萑苻不逞望風知懼肅清盜賊消弭厲階方平又上奏曰臣前在諫院累曾論郡縣武備所陳意見朝廷未加精察比來軍興多事賦役煩數顧亦天幸而屢有年姦㳺之民猶聚為盜至擁旗鼓入城邑殺吏堂堂無所憚不幸嵗洊饑民艱食勢必羣聚蜂起為盜或數軰匿村間至聚吏兵千計縣鄉為之殘敝而不能時擒即氣燄稍盛兵連祻結豈在敵國也漢唐之大業未嘗無四夷之患至或長驅而犯宫闕然無害於根本之固及黄巾巢賊竟以大壊天下國家創艾五代之亂藩鎮不得擅兵常畨禁旅外屯州郡乃自近嵗悉還戍邊其州郡兵之壯者亦率㸃選配諸禁衞所餘乃罷弱羸卒供雜役使官吏導從而已豈知執兵之事今愚細之民知窺此隙故昨王倫等賊起沂州並淮渡江厯數千里若蹈無人地乃始下京師之甲而趨躡之使民間而有姦桀豈不生易朝廷之心歟伏以先朝置諸道提舉兵甲司所以專督盜賊抑有經逺之㫖粗存方靣之制比來忽畧領為虚名今能稍付事權自可外張形勢計諸藩郡有兼提舉兵甲處其為要地自用重臣鎮守自餘地望稍輕亦領此名者不過七八誠選用有風望方畧之士以任長吏各於本路除鈐轄或都監一員量其路分輕重提封近逺約置兵之數令於本郡及所部州軍見兵中選取壯强集成指揮因昨所置武衞為名而廪給之若見管兵籍取不足則令招募及數明降朝㫖更不揀選調發赴邊亦不得輙差逺出内有逃亡隨即完補所有器甲必令精良每道選差班行使臣一兩人或令長吏薦舉比監押廵檢資叙專管教閱若所部郡縣有宼盜結集之處即量事勢發卒赴應使之統領追捕其所捕州軍都監監押廵檢縣尉諸督盜官吏令得察㢘其能否勇怯以聞而升黜之若所部郡縣强惡姧蠧之民得以檢察追逮按情科罪移配逺方若賊羣黨稍衆鈐轄都監親督吏卒㑹合掩殺自餘賞罰科條更自朝廷比議指揮如此則不惟壯郡縣武備抑稍復方鎮事體庶以式遏宼虐消除暴害仁宗時侍讀學士宋祁奏曰臣伏見近年諸處盜賊結連黨與州縣不能擒制雖有廵檢縣尉皆畏懦不肯公心以時捕捉臣愚以為縣尉廵檢既非其人而國家立法又不嚴切是使上下因循更相推避盜賊知其如此故多行賕賂却與兵士弓手隂相聞知打劫之時先為耳目只如臣在夀州日京東透過賊十四人入界其時五員廵檢四員縣尉合兵士八九百人終無一人用心向前捉賊賊入州界九日凡八處打劫臣曾具此奏聞乞行嚴斷臣後來探知只是等第降却差遣若國家只如此行法如何使官吏用命盜賊畏威譬如鳴佩以救焚卜日而拯溺沈淪焦爛終無全理臣愚以為今後應有賊發去處如係羣黨十人以上或雖不及十人但有器械甲胄不畏州縣明行劫掠者本處廵檢縣尉並令兵士弓手明立部伍結陣鬬敵多設方畧粘趂前後勿令走透或力有未勝仍逐村拘集耆壯分頭設伏圍掩如更敢公然畏避放縱賊徒不能擒制並乞所屬州軍攝送司理院枷禁勘奏取朝廷指揮並行停替於逺地編管仍委長吏逐急别選在州有心力曹官職官縣令主簿監當使臣交割兵甲一靣追捕盜賊所差權官賞罰進退一如正官取進止范仲淹奏乞召募兵士捉殺張海等賊䟽曰臣竊見鄧州奏賊人張海等一行已及六千餘人各騎鞍馬有弓弩器械驚劫縣鎮恣取金帛强掠士女不懼朝廷凶虐如此百姓被害不堪其憂臣恐逐處窮民見其豪盛各生健羨聚成徒黨脅取州縣事勢漸次張大不早殄滅必生他患漢唐之末皆因羣盜而天下大亂朝廷豈得安然伏乞聖慈來日便差中使計㑹殿前馬歩軍司於七百料錢已下軍分内募情願捉殺强賊人員兵士三百五人須是勇壯喫得辛苦或曾經使喚之人限一兩日内引見靣賜盤纒錢并冬寒綿衣及大與逐月添支選差有心膂使臣部押與謝雲行同去分布掩殺不以逺近粘趂直候捉殺净盡即等第優與酬奬知諫院包拯上䟽曰臣竊見廣南東路鈐轄司奏據連州申勘到行者孫之道稱蠻賊三千餘人商量入連州打劫勘㑹彼中兵甲數少已差奉職周僧辨帶兵甲一百人前去防托者縁廣南英韶連賀四州並與湖南郴衡道永等州相接自蠻賊騷動以來彼處稍有備擬鹵畧無得賊計必謂嶺南無備有侵軼之意兼聞八月九日蠻賊五百餘人打劫劫連州桂陽縣兩村人户財物牛馬不少今來賊勢轉盛所差兵級數少必難枝梧況廣南州郡並無城壁及攻守之具加之兵力綿薄無堪用者若不速議措置使此賊得便乗虚深入曷以禦之欲望聖慈特降指揮下本路轉運鈐轄司令於逐州界首可控扼之處相度添置寨柵屯兵防托以警備之不然恐為患轉大貽朝廷之深慮也拯請速除京東盜賊䟽曰臣竊見江淮兩浙京東河北累年以來旱澇相繼物價涌貴民食艱阻兩浙一路災疫尤甚雖朝廷寛免租賦優加賑䘏而迄今未得蘇息近聞京東濟鄆河北德博淮南宿亳等州盜賊充斥所在竊發州縣不時擒捕頗甚兇猛蓋長吏與廵檢縣尉罕得其人上下䝉蔽不以實聞必恐稔成大患為朝廷深憂不可不速行處置也頃嵗浙東鄂鄰淮南王倫京西張海等皆起自倉卒結為巨盜劫害居民郡邑悉不能制禦幸而殱滅無謂邾小蜂蠆有毒且四方藩郡兵伍絶少多者不逾數百軰皆厮役羸卒又驕惰難用寛之則逾慢急之則生祻身不更訓練目不識行陣驅之禦宼必先事而敗雖烏合嘯聚莫能久長而生靈塗炭矣則國家將何道而猝安之況今國用窘急民心危懼凡盜賊若不即時誅滅萬一無賴之軰相應而起胡可止焉伏望陛下督責有司精擇逐路按察之官及諸州長吏有不任職者即令黜罷其廵檢縣尉等並委安撫轉運提㸃刑獄司專切舉察如庸懦不才者速具體量衝替應有盜賊不以多少逺近並須捕捉浄盡免成後害或少渉弛慢並乞重行朝典知杭州司馬光論兩浙不宜添置弓手狀曰臣竊觀兩浙一路與他路不同臣謹條列添置弓手不便事件如左伏惟聖恩省察少加詳擇焉當今西戎梗邊三方皆聳人心易動當務安之一旦異常詔書大加調發擐甲執兵學習戰陳置指揮使節級等名目頗似軍法以為欲效河北陜西沿邊鄉兵謂國家以權計㸃之假名捕盜漸欲收為卒伍戍守邊防吳人輕怯易惑難曉道聽塗說衆情鼎沸至欲毁體捐生竄匿山澤臣雖明加告諭嚴行止約愚民無知不可户說誠恐差㸃之後揺動生憂其不可一也吳越素不習兵以故常少盜賊不過聚結朋黨私販茶鹽時遇官司往往鬬敵在於兩浙最為劇賊然皆權時利合事訖則散不能久相屯結又無銛利兵器止偷商稅不敢剽掠平人近年以來雖亦頗有强盜然比諸内地要自稀踈今避差㸃者若竄匿無歸必致為宼加以弓矢刀㦸之𩔖許其私置自今以後賊盜必多及私販茶鹽之徒皆有利兵抵拒吏士益難擒討積微至著漸不可長其不可二也姦吏貪饕惟利是務不畏法令不顧公議幸得因縁惟喜多事今計杭州管界當差若干人他州比率大凡有㡬縣胥里長於兹相慶民既憂愁而又脅之煩苦不安而又擾之所規自潤豈顧其外雖朝廷重為懲禁特倍常科長吏勞心不能悉察厚利所誘死亦冒之加以版籍差誤户口異同毫釐不當互相告訐追呼無時獄訟不歇則民未暇為公上給役而先困於貪吏之誅求矣此之騷擾勢不能免其不可三也民皆生長畎畆天性戅愚所知不過播種之法所識不過耒耜之器加之吳人駑弱天下所知一旦使棄其所工學所不能徒煩教調終無所成就其有成不堪施用則是虛有煩費而與不添置無異其不可四也吳子夀夢以前世服於楚自申公巫臣得罪于楚逃奔于晉為晉聘吳教之乗車教之戰陳其後楚人戎車嵗駕早朝晏罷奔命不息以至吳亡自是以來號稱輕狡逺則劉濞近至錢鏐其間承風倔强無數豈唯其人之跋扈亦由習俗之樂亂也幸頼祖宗之馴致陛下之敦化至德之醲淪於骨髓暴亂之風移變無迹此皆上天降祐前世所不能庶㡬者也今忽無故黷玩威稜狎侮危事示以逆德弄之凶器生奸回之心啟祻患之兆臣恐其久非國家之至便所以萬全而無害其不可五也方今兩浙雖水旱稍愆未至流殍閭閻無事盜賊不添縱使有之舊來吏士隨發擒討甚有餘力不假更求正恐平居興役有害無益而已臣職忝宻近官備藩方不敢黙然理須上列伏望陛下特令兩浙一路更不添置或以事須過防舊人太少則乞只依近降勅命量加添補更不立指揮使等名目閱習諸事一如舊規貴得衆情大安别無生事厯代名臣奏議卷三百十七
