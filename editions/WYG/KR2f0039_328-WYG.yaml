body:
  text: 歴代名臣奏議巻三百二十八明楊士竒等撰禦邊宋仁宗時翰林學士宋祁議減邊兵上奏曰臣本書生不當妄言兵革但以事勢料之參驗今古有灼然易了者敢為奏請臣伏見自古以來防邊守塞未有屯結兵馬經年亘嵗常在城砦無有休息者傳曰乆暴師則國不足雖有智者不能善其後只如秦漢時與匃奴更相酬報出入鈔掠亦是兵罷即歸不令屯結亦不如聖朝長令兵馬守偹邊上既不出攻坐費粮運是故用兵未及六年天下之財已告匱竭良由邊將不知休兵朝廷不授成筭億萬之費耗散而不計若更十年未知多少財用可濟其艱臣請言其驗賊界自三月後馬瘦放在草野不能負重關陜人皆知之則背春向夏賊不能大舉其驗一也賊無餽運毎入漢界常因糧於中國中國自三月以後才有麥熟其餘禾稼未成無糧可因賊不能大舉其驗二也又有髙山大川溪谷相衝春夏之後雨水時行霖潦為阻賊不能大舉其驗三也是賊兵鋭於秋冬而屈於春夏其勢可見臣欲乞朝廷詳度許令應沿邊州軍城砦毎年自三月後抽減一半兵馬入内地州府就糧直至九月却往元駐劄去處號為防秋況所抽兵士雖在内郡其校習訓練一如邊上此乃事之至便不足多疑一則邊上州軍愛惜得年支糧草二則兵馬有休息之時三則兵士到内地州府易為裹費四則關陜之民免得轉般糧草是邊上一年支準可展為二年也識者必難臣曰賊知朝廷自三月後抽退兵馬必選擇壯騎精兵出人不意入來漢界作過恐大段深入鈔掠人民破蕩城砦何以為偹臣對曰假如令賊有壯馬精兵能於盛夏入漢界作過三五萬只是抄掠得界上些小熟户人民且無糧草可食賊又不㑹攻打城壁朝廷但只令所在城砦堅守不出兵及州軍只坡城立栅相對不與賊戰則見在一半人馬已自足用萬一假令賊敢謀深入即令内郡就糧兵馬旬日内可以勾集令大將將數萬之兵結陣徐驅往彼救應亦只立硬砦相持勿與賊争鋒使賊進則不敢退又粘逐常擇便地自逗留至二十日以上賊必有糧盡或雨水之阻又何能破蕩城砦大段深入也但自來朝廷不肻明下成筭與邊將令抽退兵馬是以邊將畏避責罰長要占留在邊上圖常有準擬其添到軍馬以死固執無因肻減一人一騎今若朝廷明降成筭使之遵守如賊非時入界萬一有少敗衂朝廷自任其責自然邊將必無固執斯議者也伏望降付中書樞宻院仔細商量取進止祁知成徳軍論蠻夷利害劄子曰右臣竊聞用兵者不幸敵之亂而欲已之不可亂不畏彼之侵而患所以來其侵也今聞契丹興端造隙欲敗和誓外倚虚驕摇脇近邊不顧曲直惟利是視是謂貪兵兵貪者亂此可乗而取之然陛下無良將邊陲之臣類皆才下又甲胄不完宻弓弩不射逺行無䭾幕出無營壘馬乏精突士習饞墯外不能扞患内能為患此陛下未有冀敵之不能亂也邕溪之蠻最脆弱者今乃離去巢窟略地千里弄兵安行無一能拒䖟飛蠅營挐而不散此官濫吏庸招其所以侵也事弊及此不振而張之不可謂謀謀之不臧使得遺祻不可謂國臣伏見陛下諸臣急則念治緩則偷安天下無事時見利害之小者則鄙之以為不足事及大利害則憚曰安可卒行又曰據今日之安亦未及于危小者鄙之大者難之逺者蔑之於是天下之事日損一日嵗耗一嵗經制不立紀綱頺陵頼陛下盛徳四海晏然然無法而治不可以恃今幸二邊少警朝廷焦意寒心士各獻謀人意必向臣請先舉二方言之今河北既分部署等路各有屬州是唐諸節度兵也然而未有都統以節進退臣請因建大帥以一之使部分各得其人則金鼓旗幟卒伍號令便當一禀於其帥綴鎧磨兵益養馬閲師而討之講求法度朝廷宻詔以敵入某處以某部署軍當之某路以師援某所以糧濟咨大帥而聽命焉擊首尾應擊尾首應犄角屈伸包裹彌縫明立賞罰閫外之務不從中制此所謂不可亂也不亂則陛下可用而勝彼之亂也嶺南外區瘴癘熏蒸北方戍人夏秋往者九死一在多發兵則糧乏少發則事不集急責功則蠻獠遁逃不肻出緩則復來擾人是宜有以制之也今聞發北方兵踰萬人已戍嶺外下濕上蒸病死必多料羣蠻勢不乆屯擊之必散臣謂不如選一二健將嵗纔留北兵五千人分屯要害處得善吏十數人完治諸州募土人為郷軍復其租調視州大小户多少為之數統以部伍教以進退習以彼所長伎與相追逐率百人給北兵三十以勁弩利兵佐之冬春則使深入擾其居夏秋則使謹守防其略彼雖能誘納中國亡命要之食盡必出擄掠若其來也一大斬獲則終身創矣我威已立然後可議招來與之盟則固許之臣則乆逺期五年近止三年南方無事矣臣竊恐有司茍且復仍舊弊多留客兵自取死亡又不先以威而務招懐不為逺圖而求近効故雖盟必違雖臣必叛夫前日之失已不可追自今之利便當審料恐諸將功成之後議者泰然遂便因循授吏鹵莽設防不為陛下議長乆計雖一賊死而百賊生故臣曰彼侵不足畏患所以來其侵也臣愚陋不識禁忌惟陛下裁赦用之祁知定州上便宜奏曰右臣伏念行年五十有六素自衰怯不逮人宜内治一郡習刀筆簿領計校米塩與俗吏争課最以報萬分不意陛下過聽乃使守邊居真定不半年徙定武任過所能早夜震惶然常聞天下根本在河北河北根本在鎮定以其扼賊衝為國門户且契丹强悍五十年習不畏人很態貪心不能無動今䑛齶垂涎欲肆囓者惟定與鎮二軍不戰則進搏深趙邢洺咋脆撞虚血吻婪婪無有患矣臣所以日夜深計者以為欲兵之強莫如多糓與財欲士而練莫如善擇將欲人歆艷樂闘莫若賞重而罰嚴欲賊顧望不敢前莫如使鎮重而定強夫耻怯尚勇好論事甘得而忘死河北之人殆天性然陛下少勵之不憂不戰以欲戰之士不得善將雖闘猶負無糓與財雖鎮金城定湯壕勢必輕今朝廷擇將練卒制財糧反以陜西河東為先河北為後非計也夫西戎兵鋭士寡能略邊不能深入河東天險敵憚為宼惟河北不然失長城之防自薊而南直視千里敵鼓而前如莞衽上行故曰謀契丹患不得不先河北謀河北捨定與鎮無可議矣故臣願先入糓鎮定鎮定己充可入糓餘州列將在陜西河東有功狀者得遷鎮定則鎮定重天下久平馬益少臣請多用步兵夫䦑然聚霍然去雲奔飈馳抄後掠前此馬之長也強弩巨梃長槍利刀什什相聨伍伍相遮大呼薄戰此步之長也臣料朝廷與敵相攻必不深入窮追􅇌而去之及境則止然則不待馬而步可用矣臣請損馬而益步故馬少則騎精步多則闘健我能用步所長雖契丹多馬無所用之夫鎮定一體也勢不可離今判為二恐謀之未詳自先帝為一道帥專而師不分故定揕其胷則鎮𢷬其脅勢自然耳今其顯顯有害者屯寨山川要險之地裂而有之平時號令文移不能一賊脱叩壘則彼此不相謀誰肻任責耶臣請合鎮定為一路願以將相大臣領之無事時以鎮為治所有事則遷治定指授諸將諸將權一而責有歸無茍且意策之上也惟陛下與中書樞宻院當安慮危熟計所長必待事至而後圖之殆矣河東馬強士習善馳突與鎮定若表裏然東下井陘不百里入鎮定矣賊若深走以河東健馬佐鎮定兵掩契丹之墯若歸者萬出萬全此一竒也臣聞事切於用者不可以文陳臣所論増步兵及入糓分兵𨽻禆將等諸條件目繁碎要待刀筆吏委曲可曉臣已便俗言之輙别封上至擇善將多蓄財乞委樞宻院三司條具以聞臣一諸生弗知軍旅事偶有所見不敢隠特以受大恩思亟報也恐議涉迂暗有司疑詰更乞付臣令悉意條陳然後施行至和二年祁又進禦敵論表曰臣去皇祐四年秋七月待罪成徳軍五年二月改定武軍皆兼本路安撫部署兩司此河北極選賢士大夫日夜所望立功名者也臣某誠恐誠懼頓首頓首臣不肖少服儒業幸得秉筆代天子制令奉職弗稱遂用外遷不謂尊號皇帝陛下擢自踈冗付以劇使俾專一靣䕶諸將貴重體雄日靡皇寧出入三年無毫髪之報竊以持兵擁甲野戰乗城皆非臣所能勉加體力早衰年向六一謀不逮逺識不先事姑奉陛下經武之略赧然汗發于背然所至詢疆埸事所以制敵大畧目見耳聞非獨一端輙次為禦狄論七篇其語不文以便事也弗泥於古從權宜也直取今日利害決為可行也不足示後時異則計有所不用也伏以中書樞宻院皆忠力大臣謨謀閎深奉承聖筭明燭萬里敵無遁情臣今所上乃廊廟殘計策牘弃語猶敢冐昧上陳者欲明邊臣思不出職亦上佐朝聽芻蕘千慮之冀也干冐宸覽臣無任愧羞戰栗之至其論謹附表投獻以聞臣某誠恐誠懼頓首頓首謹言篇之一客問臣子為陛下守中山直契丹西鄙天下精兵處敵敢引弓南靣射最先薄戰自先帝咸平以來常以重將臨統子今出入三年頗知賊情偽乎臣應曰太守本諸生朝廷不知其愚使護諸屯未嘗履軍䧟陣又無横縱之辯王霸之術烏能論戰乎雖然傳曰知彼知已太守誠不肖粗能舉其凡客曰願子無讓請以今事言之竊聞西羌與北敵觧仇申約復為甥舅信乎臣曰契丹使一介叩朝廷言夏人臣順事驅馬羊納有司果信矣然則兩敵合而無隙彼將連衡以擾二邊柰何臣曰合則有之隙未平也契丹地大兵衆而猥羌地狹卒寡而精以大臨狹則羌弗獲已而合以精抗猥彼何敢安受其臣哉且北酋與羌兒戰一不勝殺卒二萬餘其主僅自脱北築威武金蕭等城跨河而守者五年矣訖無尺寸功是契丹窮於侵羌倦於守矣故卑辭厚幣以休兵甲之勞羌非真畏敵原本缺子女麗金錢多故思隙而連和以軋吾境鈔刼係纍各飽其私安得不合臣曰不然如客所謂兹易與耳國家嵗棄金帛五十萬與北敵以五萬與西羌彼有背盟為不臣者我幣五十五萬固不出境若隂以十萬許羌人赦其罪以攜之彼必以中國合還兵而抗北北失西援且狼狽不敢前我又隂許還北敵三十萬與之平則二敵之仇結不觧矣北敵之怨必嫁于西羌西羌之怒且銜于北朝廷安視其祻以虚饋操二國重輕何所患哉客曰羌人自元昊以來勢始張國褊而兵寡􅄐與合恐不足為重輕對曰不然元昊善用兵其左右皆賢故數亂西垂未嘗少衂焉雖挾勝而不敢不來臣知事大之體也既父子戕死而諸酋扶孀嫗抱嬰雛南靣而朝人惕息相與守舊君法無違徳南抗中國東支契丹養馬按兵自如四隣不敢侵中國有年無疾疫死亡意者天假之幸是且將興烏得不為重輕哉篇之二客曰子謂契丹與古孰強臣曰耶律一姓王二百年今其衰也歟客曰彼兼奚黒水髙麗逹靼新羅數十國薄海而東南包燕薊肥腴之地孳養族類戢戢林林重穢北荒與中國争長六十年今又得西夏而臣之何云衰耶臣曰客詫其表不責其裏請為客道所聞敵主懦庸其弟悍剽好戰本許傳國故盡以奚契丹兵屬之敵主有子且長更為王以燕薊華人屬之然其弟常右蕃卑漢數請犯中國子常佐漢鄙狄願與中國和又寡老嫗在焉故敵主依違不能有所決華人之輔政者皆附主與子蕃長之當國者附其弟是此敵一軀裂為二支祻難待時作耳有如君長一日有疾病很弟即位愛子能相下為君臣乎能為君臣無疑忌乎華蕃大臣能合而不限乎幸而寡嫗未死肻捨其子而助其孫乎内不能定必大誅殺安得不亂亂必有黨黨必争争未必有能國也彼髙麗逹靼等苦為契丹屬乆矣誅求無時調發無度一日契丹亂彼將蝟毛而奮自王其國且何恃而強又和戎以來北人習見朝廷袍笏之美百官之富肴果餼醪炙瀹甘珎衣服噐彛薰澤光鮮皆競浮靡厭質樸改移異俗慕為華風時時道詩書語竊問儒者禮樂等事争貨紈綃纎䌨之麗橙茗辛馥之竒以相夸尚此賈誼所謂五餌壊其耳目腹心者也客曰五餌等語班固詆以為踈子何據之臣曰然誼於治體深故其言奥其事乆而効固俗儒也見誼不為文帝用便以誼為空言固則陋矣且自古外國所以強中國者隨水草無常居耐霜雪以鞍馬為家此其勝邑居城郭也射狐鹿兎麞飲其血服其皮脯肉而糗之此其勝耕歛囷廩也喜相羣怒相殺殺人者取償而止有罪即誅凡召發傳一箭哄然皆集此其勝文檄簿領也生能挽弓傳矢帶刀劒孺妻弱子皆習熟此其勝營伍教督也不解節文習熟制度精詳君臣並肱而踞情一而志通此其勝禮文親䟽嫌疑等差也今則不然反殺而強仁反戰而崇和弃粗糲甘饔飱美衣食酣聲樂所以勝中國之具者一切䘮矣是耳目腹心壊而不復完徒操虚強以摇中國太守知其無能為也篇之三客曰景徳契丹數宼河北我諸將謀必敗戰必走何耶敵既負勝由是鼓而前破五六城突魏觸澶躨跜無所畏子識所以然乎臣曰識之中國失虎北之隘自幽而南地如衽席然何承矩始畜陂障建屯田塍而畦之限賊馳突然東不盡海西薄常山數百里輙止外無所阨故敵常掃穹廬而來厲壯馬走平地以大衆加中國其時也馬適肥士適飽人人貪抄刼之以利氣適無前我諸將常迎其鋭薄之又以寡抗衆故敵常勝吾常負失所以制敵之術也曰然則何不待其氣弱而後戰臣曰得已而然哉夫大將在外必有貴臣監軍貴臣見敵至不課彼已強弱不待便利促其將使闘闘而敗閉壘不敢出矣然後敵以數萬騎綴廣信安肅二軍嬰保州則定武僅能自守敵精兵獵瀛冀犯深趙瀛冀自不支其穿西山而出者繞鎮右行鎮兵雖急戰不能禁其入由是蹂邢躪洺而睥睨澶魏矣客曰䇿安出臣曰在擇將以閫外事付之夫任一則權不分故外不見脅於中上不見狃於下值隙而後攻逢利而後為可而奮不可而止避其鋭間其墯邀其歸厭其所不能無促以功則功易成無必其期則戰易勝此亦一端也客曰未也請衍而申之臣曰敵人之來因粮於漢聞景徳時大帥固營不動而游騎四出發窖竇掠馬牛係老弱刼樵採旦而出夕而内之軍中仰以濟師當此時諸將熟視不出一卒以乗其弊敵由是肆然燔室廬殘邑聚逮於講和河北為空此一失也又詔書勅諸將逐敵無深入及境則止故敵勝則驅而進不勝則不畏追逐也是塞之人按堵而吾鄙不聊生矣此再失也夫戎人安知恐懼修省哉悍然其貪利而逐便也惟勁鏃遺胷長刀築脅乃怖耳當鈔騎之出我若以邊人邏士邀之或㢁其左或戹其右蔽林伏垠掩所不防但令無所獲而走不過五日七日衆飢師老矣以吾飽乗敵飢何攻不破何擊不北耶敵之入塞掠吾老弱畜産若干我伺其便以五六月敵馬瘦弓弛勒偏將出塞虜其部族牛羊亦若干相當輙止敵所恃以為富者特幽薊耳彼能殘我河北吾一支病也我能殘其幽薊彼一軀廢也若是則敵懲艾計較必不敢輕入而為寇矣漢武帝使衛青霍去病深入鏖闘斬匈奴首級最凡十四萬而已北敵遂衰此驗在前可質也故曰不殺不怖不傷不刈不得其當不止此上術也客曰太守計雖審然與嚴尤班固之説戾而不合何哉尤之言曰周秦漢三家征匈奴未有得上策者周得中策漢得下策秦無策焉又言宣王時獫狁内侵至於涇陽命將征之盡境而還故天下稱明固之言曰來則懲而御之去則備而守之此聖王制御蠻夷之常道也臣對曰尤固皆中人俗儒不足與論天下計彼特得皮忘髓齧胲膍而未知雋腴也唐牛僧孺嘗詆尤以為禦戎無上策秦為無策非是世謂知言夫戎人既可以術羈糜之班固所言是不可以道徳仁義化也道徳仁義不可化則無上策矣必以強武服之所謂武未有不殺而能威之以武秦漢是已然秦與漢自以它失為後世譏病於計匈奴不為無功尤盛贊宣王以及境則止為明非也宣王興厲王之後奮衰氣逐強敵威不能加於敵故及境而止詩人姑美其能中興不美不追賊也易稱髙宗伐鬼方三年克之伐而克非道徳可化章章矣故曰來則懲而御去則備而守殊可􅅓怪必如其言是兵常在邊而弛甲無期矣故曰尤固不足與論天下計篇之四客曰敵之來常因吾粮故朝廷以清野困之常獵吾民故堅壁挫之今日北邊髙城濬池樓櫓堅宻比景徳有加焉一日契丹送腰領其可以制敵乎對曰能捍敵未足以制敵也吾野雖清吾壁雖堅若鎮㝎兵不出敵猶敢負戎馬足直驅深入𢷬虚而奪人氣也曰然則奈何曰敵中軍其大渠常自將我若使鎮㝎兵從之與相上下吾常環車固壘出輕騎擾其餉擊其鈔夜譟其營彼求戰不得攻不能下掠無所獲大衆老而懼吾因其懼而舉薄之無不勝矣前日敵人犯㝎軍夾唐河以陣敵不能勝因捨㝎攻瀛破其外郛又不能克乃直走澶淵是時定軍尚未出也由此觀之吾失在不戰矣太守是以知今日邊臣專修守械不為攻戰計未足以制敵也客曰然則今日樓櫓城隍果勝於異時臣曰不然祖宗時有北復燕易意故不專於守今者專於守故城益髙隍益深勢自當然非今人工昔人拙也客曰今日朝廷分河北為四路可以經制乎對曰甚善無事時訓師徒撫風俗便事之宜治葺保障督官吏能否鼎峙而立其效過異時逺甚一日軍興猶須即河北安撫為大使統而一之乃可責功又鎮定不可裂付二將宜及平時并為一路使將佐部分有臂指之勢輕重相權誰不曰宜滄州東薄海南倚濵棣斜視淄青北與敵接其間漢蕃弃地各數百里土鹹舄水泉不可食夏蚊如雲不可居也至冬萑葦際天姦細商賈未嘗行故朝廷輕其戍列數堡而已景徳之後守臣廣陂障蓄水接海又黄河限其南是以議者超然不以滄州為劇地自河決横壟商胡游波紆浸貝丘盪永静環海而北破乾寧恣肆妄流以入于海凡㳺塞下陂水數百里皆為平地則濱棣淄青失河之險未有以恃也我未有恃則啓戎心故敵不可不虞也是宜權建滄州為一道以扞東垂伐敵之謀然止十年計河若用道滄可廢矣客曰塘水之險可恃乎吾聞議者或謂不然對曰塘水東西袤六百里其闊百里或五十里夏浪冬冰淺不可載舟深不可亂而濟足以挫敵騎突怒省亭堡之防也然議或不同何哉盖語塘之利者不列其害謂害者不該其利是以聽之似可用質之似無有也客曰其害奈何對曰昔之蓄水為塘其制曰若干地淺若干尺若干地掘而浚之若干尺相錯如繡是謂深不可度馬淺不可載舟也後人忘向時之制惟因霖潦時漲而廣之故壊民良田無有涯極而議者詆無涯之害因忘設險之利也客曰若何而可曰邢鎮定皆西倚山水泉悉輸東北其地西髙東下若建瓴於霤然昔之為塘必掘而浚之所以留水也今若案舊法為塘之限闊不過百里狹不下五十里隄而限之亦足制北敵之入為中國十二又得良田還與民則利害曉然判矣客曰可為無窮利乎曰百年計耳水潦自髙而注者必嵗淤而月廞如今不掘而浚弗出百年為平原矣篇之五客曰北敵負其衆中國常為之屈將天運乎亦人謀有未至耶臣曰儒者不可捨人而言天意者謀有未至爾祖宗事太守不及知直以慶歴時驗之北敵乗西鄙方擾裒其衆首䑕叩境作謾言求關南十縣時議臣倉卒直以十縣嵗賦才二十萬為對故嵗益金幣二十萬與之因欲塞求地之請敵由是得自大謂不遺鏃缺刃而成功妄為醜言夸示其下由是縣官用度益急矣殊不知與敵二十萬則其地故其有也彼且縁為辭曰吾不取賦而還吾縣即是朝廷植今日之禍根取它年之亂實已失吾財又亡吾地尚謂國有謀乎故曰未有至焉客曰不然是時不許其求則戰我兵未合必為敵乗故為一切之權必亂其謀子何昧焉對曰等為之權不如直以百萬賂之使罷兵既不為無窮之饋又使它年絶旁縁之辭不猶愈乎客曰北敵得朝廷之賜充足其欲然常以虚計搖邊何耶答曰契丹君臣合謀以為取二十萬于我為無名謂我且嘗膽以圖其國刷耻取償焉是以嵗閲馬料衆治橋路郵舍以自張大示將狼貪無厭者外又挾漢為重制服諸戎太守固知虚矯而實衰也客曰如此何計而宜對曰莫如自治所謂思患而預防者也今朝廷英俊林立豈謂無人但莫適任患故功不立粮可廣入也而便糴曰改法下不信則塞下之倉庾空財可預積也而有司辭以用乏吝而不出則塞下之帑庫空馬可孶養也議者啽阿日推月引苟安其任終不肻盡力則塞下之牧廐空不止三空又有五可誚騎軍多馬少三分其人馬才居一士既不可為步是畜無用之兵一可誚河決澶滑横流不制壊陂障破漕渠失國所恃以為防者又破滄州嵗貲七十萬朝廷玩之不為塞二可誚舉河北義勇且三十萬著令嵗一大習盡一月止用古一時講武之義而州縣避事或嵗未稔民且困即罷之又惜數萬碩之廪嵗為此言雖有教閲者不為部伍行陣如小兒戲即止又流亡物故皆不補十耗三四自謂便民民之便國之不便也三可誚縁邊守將輕授而重任之重任而輕易之衆皆知不肖而朝廷謂之能見效無狀而歴任累其年一日警急是軰巽愞奔走敗軍損國者也若廼公忠材猷嶄然風采士不肻衮衮雷同欲卓爾自立時或有之但一失意於銜命小臣則飛奏朋毁使内不能自明上有以為惑一紙詔移它路矣是以不材者在而材者去四可誚近年議邊臣公用錢尤急計校出入剖粒析毫監司督察急為威峻至於探候間諜無財貨募召皆不能入敵境比蕭徳吴湛筭告西人之和足及藁街尚未得其奉使意此乃所責小所失大五可誚故曰三空宜早實五誚宜速除居安慮危之至計也然朝廷毎得敵人一好言便釋然髙枕至邊戍奏請罕復報下得一妄語焦心不終日督切邊臣宣勅紛然此似未盡其情夫用兵以狙詐為本凡不足示人以有餘強示人以弱兵家常策也景徳時北敵窮兵深入豕突澶淵先時令王繼忠累表乞和兵益急表益來㑹伏弩射殺敵將敵母大懼因遂講好先帝不窮其姧而與之盟此已驗之效也故得敵好言可聽而不可怠得敵惡言可防而不足懼不懼謂何自治有素矣篇之六客曰敵常籍諸戎兵席卷來寇故河朔之勢不支子何以禦之茍如子之策可決勝乎對曰大衆不足恃也其取勝者在中軍而已中軍不振諸酋長且土崩雖衆何賴為夫鎮定在河朔兵第一今使悉衆從敵中軍與相進退令瀛魏軍當酋長縱竒兵擊鈔騎河南列屯營謹守澶淵餘州皆清野以待不逾月敵必飢飢必求戰我畜鋭不發以羸畜弱卒嘗之待其争而囂則整師犯之無不敗衆塗地矣然中國不用兵五十年軍有所未習先屈而後勝未可知用之數年習知委曲則士心侈而樂闘矣士見所得財珎馬羊皆自取也所上首級厚賞也死事者卹其後奔怯者無衆寡必戮罰信而賞明則士氣鋭將謀果人心定不止禦自來之敵可北圖燕薊矣夫燕薊契丹恃以為強也故太宗巳平河東而先取幽州聖謀深矣故不復慮北契丹不可臣客曰子言太髙恐不為時所信且陛下為四海屈已斥銀幣五十萬為年賜使者賀正月慶誕曰廷勞答貺又十餘萬西夏亦十餘萬大抵直百萬嵗弃之二垂安天下元元徳至厚也子欲輕動干戈為國生事非策之宜對曰唯唯太守所云非謂欲朝廷舉兵討也直因其來寇而豫為計耳敵之南牧必先犯鎮定邢趙瀛魏以地平戰易民富有易擾而多獲也所在發掘鈔略終無顧巢窟意夫敵留吾境大衆不輕動吾可用竒矣若令輕騎挾半月粮出河東以殘雲應出雄州以襲幽燕治戰舠數千載半嵗食出青萊浮海以動營州縱諜者告敵能安然不畏乎比敵之還吾輕騎戰舠歸矣故彼歸我出我出彼歸不數年敵山川險要無不究則彼自保不暇矣朝廷又出寳貨募使者走間道賂新羅逹靼黒水等諸戎以諜士隨説之許以重爵割地與之平使叛契丹彼不從必露言於敵敵且内相疑若聽吾命敵固失援矣此皆伐謀紓難可先計而後用者也客曰或言契丹嵗得銀幣五十萬庫積充滿安肻自為送死計彼之來不過略河北數十州固無五十萬之獲敵雖愚肻捨安受之賄與朝廷決不可必之勝也子試策之此言是乎非耶答曰今者敵君臣皆不肖殆有是矣彼其臣為王謀曰宋所輸珎寳君皆自得之今若縱兵鈔略所得財皆􅄆於下有功者君又將傾府庫以賞然則違盟而戰下得所欲上䘮所蓄君但有勝負之虞將何事焉太守策之此北敵所以遷延自安未肻作反計昭昭矣篇之七客詰曰子策契丹不反然子之在中山所統九州軍修樓櫓濬壕隍畜粮増馬勒部伍無日不討於兵何不自安對曰客言非也兵家有云無恃敵不攻恃吾所不可攻也彼雖未叛吾備何得弛乎常治所以待亂也不虞是其可虞也前所謂彼主孱其子長也而弟又凶徳一日其主殂以疾弟與子必争其位争而勢分有弱有強強者與我為敵則弱者求吾為助許之強者怒不許弱者必致讎于我彼習知邊鄙怯懦漢地富有故攻所易攻以自長雄不可不為之備又其弟得國必恣狂勃先剽劫于邊左右素不慊者將妄誅夷雖不保終要能為疆埸患朝廷尤須以兵鎮撫所謂亂也慶厯時彼主將叛乞師於諸戎皆以兵從之約曰所獲人畜財貲皆自取諸部喜日夜馳且南向㑹與彼和各罷歸諸部皆恚曰欺我使來因大掠幽薊間數十縣去契丹不能禁也今彼主再遣王綱約諸國借師皆曰又欲如前欺我乎不肻出兵故去年八月遣使叩塞告與西夏絶正言甘而禮厚以反謀未成為詭計訹朝廷之北敵耳異時能得諸戎兵即又尋隙責言肆其沓貪此謂可虞也故太守欲朝廷自治以待彼亂常備不虞奚待可虞也又況嵗出貲百萬賜二陲此寧無窮垂子孫計耶水旱疾疫古今代有假如萬分一中國遭三年之水旱數千里疾疫南方治課不豋而上取無涯之財填沙幕之北是自困天下者也天下窮則厚取於民厚取於民則怨怨而不亂者未之有也彼將乗吾之困民之怨責吾所輸恚氣直辭歸曲於我此不謂倒太阿假敵以柄乎太守聞異時縣官嵗與銀皆還入漢邊相貿易官得什六嵗益三四則略足自慶厯後敵禁止銀不得復入邊州且十年此欲困中國非一日計也自和盟以來嵗與三十萬者四十年五十萬者十年契丹所得銀幣凡七千百萬矣春秋許敵國者不一而足有如他日敵復壓境又欲如慶厯時増嵗入之物與之盟乎故莫若先自治待其來勒兵固以威武示之如前所陳者我威一立與之盟則固與之惠則悦而易臣有所賜與不過二三十萬則天下之財不至乏垂之後世而易遵焉慶厯七年樞宻使文彦博論討戎瀘小夷不必自秦鳳興師奏曰臣今覩梓州路奏稱涓并監夷人作過事體不小乞依慶厯四年例於秦鳳路差撥兵馬赴本路救應事臣勘㑹慶厯四年夏瀘州界夷人作過是時臣任秦鳳路都部管經略等使准朝旨令臣發禁軍兩指揮赴瀘州救應臣以秦州去戎瀘四十餘程地逺必赴救不及枉有拖曵兵甲臣雖知不便當時以朝旨丁寧不敢稽留異議遂發禁軍兩指揮赴瀘州未及中路夷人果已退去其上件兩指揮兵士只到遂州駐泊是時川界州軍見此兵士經過人情頗亦驚恐兼為遂州官吏不曉軍政不能平心撫馭動有猜疑㡬至生事臣知益州日鑒此舉動之失曽具利害擘畫聞奏以謂戎瀘些小夷人作過只是本處白艻子弟及寧逺兵士自可禦遏若賊勢稍大則計㑹梓夔益利兩路就近差那兵甲可以討擊盖蠢爾小蠻來則禦之不可窮其窟穴豈煩遠自秦鳯興師空自勞弊兼恐别有驚擾況嘉眉州皆是益州鈐轄司屯兵之處若發兵救應乗舟下水不三四日便至瀘州赴救之勢最為神速臣之奏章必在樞府可以復視伏乞更不自秦鳳發兵只令速計㑹益州鈐轄司相度量差兵甲由水路赴瀘州策應尤為允當仁宗時王堯臣為學士知審官院陜西用兵為體量安撫使將行請曰故事使者所至稱詔存問官吏將校而不及於民自元昊反三年于今關中之民凋弊為甚請以詔勞來仍諭以賊平蠲租賦二年仁宗從之使還上言陜西兵二十萬分屯四路然可使戰者止十萬賊衆入寇常數倍官軍彼以十戰一我以一戰十故三至而三勝由衆寡不侔也涇原近賊巢穴最當要害宜先􅇱之今防秋甚邇請益團土兵以二萬屯渭州為鎮戎山外之援萬人屯涇州為原渭聲勢二萬屯環慶萬人屯秦州以制其衝突且賊之犯邊不患不能入患不能出也並塞地形雖險易不同而兵行須由大川大川率有砦柵為控扼賊來利在虜掠人自為戰故所向無前若延州之金明塞門砦鎮戎之劉璠定川堡渭州山外之羊牧隆城静邊砦皆不能扼其來故賊不患不能入也既入漢地分行鈔略驅虜人畜刧掠財貨士馬疲困奔趨歸路無復闘志若以精兵扼險彊弩注射旁設竒伏斷其首尾且追且擊不敗何待故賊之患在不能出也賊屢乗戰勝重掠而歸諸將不能追擊者由兵寡而勢分也若尚循故轍必無可勝之理又論延州鎮戎軍渭州山外三敗之由皆為賊先據勝地誘致我師將帥不能據險擊歸而多倍道趨利兵方疲頓乃與生羌合戰賊始縱鐡騎衝我軍繼以步奚挽彊注射鋒不可當遂致掩覆此主帥不思應變以懲前失之咎也願敕邊吏常逺斥候遇賊至度逺近立營砦然後量敵奮擊毋得輕出詔以其言戒邊吏監察御史包拯進張田邊説疏曰右臣以懦庸之質荷邊帥之任才輕責重不能稱職進退隕越罔知所措伏自北敵請和以來邊境無事垂五十載守禦之􅇱因循寖乆將領之選未甚得人卒伍之軰復多驕惰若不精加擢擇一旦緩急用之以庸謬之將緫驕惰之卒必先事而敗雖有犀甲利器焉所施哉況敵中日有事宜姦詐萬狀不可謂要盟甚固萬無負徳往年之事亦可明矣孫子曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也若沿邊長吏兵官悉得有才之士委而用之上下協濟庶㡬後患可弭臣昨待罪諫署未嘗不論列及此今叨邊寄安敢循黙而不傾竭愚慮圖所以為報哉臣竊見殿中丞通判信安軍張田性質端勁文藝該博周知河朔之事嘗著邊説七篇詞理切直深究時病輙敢繕寫進呈伏望陛下萬機之暇少賜觀覽則㳂邊利害粲然可見仍乞宣諭兩府大臣參議可否鋭意而預圖之實天下幸甚拯又論契丹事宜疏曰臣伏見契丹近遣人使復有請求今朝廷重遣使命以答其意者盖覊縻不絶之誼也且北敵自先朝請盟之後邊鄙無事垂四十年近因昊賊背畔以來邀乞無厭情偽可見臣訪聞敵中官吏薄於俸給人民窘於衣食故自將相而下以及族帳乆萌南牧之心所未欲者特其主耳亦非甲兵用度之未足種落上下之未和其力固有餘也所以然者以國家嵗入數十萬計往還聘問之禮未之或闕無舋而動佳兵不祥不欲曲在彼耳非有服仁義崇徳讓之道也其貪而好利忍而好殺強則驕傲弱則卑順率敵人之天性也故自古聖王以大度涵之來則􅇌而御之去則􅊀而守之此制異域之常道然無代不為中國之患議者或謂四夷乃支體之疾夫支體之疾亦根於心腹矣茍支體未寧則心安得無患願陛下深鑒於此慎無忽焉又慮陛下左右或言事者有以敵中無事以安聖意謂彼君臣樂我和好盟誓甚固萬不負徳竊恐有誤於陛下也兵法曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也今既無故遣使是必以不可從之事為請乃其詭計耳但小不如意則欲以為詞況今夏地震於并代之境盖隂盛之象且異域者中國之隂也又震於純隂之地此天之有以示戒也豈徒然乎彼必有潛謀構隙之志尤不可不深慮也臣竊知沿邊諸將未甚得人皆售進市恩結援固寵不講方略不訓士卒撫馭無術勞逸不均以致邊偹未完邊廪未實一旦急用必先事而敗且河朔地方千餘里列郡數十與敵界連接深入之患甚可虞也而郡無善將營無勝兵卒有來如疾電去如脱兎緩急之際曷以禦之臣毎念至此寒生毛骨況觀今來事勢乃必然之兆雖命兩府重臣往逐路宣撫措置更望陛下頻召執政大臣與緫兵將帥乞丁寧訓諭俾圖議謀策選求將帥精練卒伍廣為積聚以大警備之不然則懼貽陛下之深憂也臣區區之心無所云補惟陛下裁擇拯又上疏曰臣聞異域為中國之患其來乆矣以古揆今未有恃盟好舍武備而不為後患者國家自契丹請命逾四十年沿邊卒驕將惰糧匱器朽主兵者非綺紈少年即罷職老校隠蔽欺誕趣過目前但持張皇引惹之説訓練有名無實得不熟慮乎臣昨奉命出境敵中情偽頗甚諳悉自創雲州作西京以來不輟添置營寨招集軍馬兵糧積聚不少但以西討為名其意殊不可測縁雲州至并代州至近從代州至應州城壁相望只數十里地絶坦平此中與外古今所共出入之路也自失山後五鎮此路尤難控扼萬一侵軼則河東深可憂也不可信其虛聲弛其實備兼聞代州以北累年來蕃户深入南界侵占地土居止耕田甚多盖邊臣畏懦不能畫時禁止今若不令固守疆界必恐日加滋蔓窺伺邊隙寖成大害銀方城等亦縁此而致切不可忽也況邊上將帥尤在得人昔太祖經營四方選勇幹忠實者分控邊陲以何繼筠滄景李漢超關南以備北邊郭進邢州以禦太原姚令斌慶州董遵誨通逺軍以捍西戎傾心委之錫賚殊異皆一任十餘年不遷卒獲其效今則不然蒞事未㡬即從遷徙又何暇於訓練備禦乎臣欲乞今後應沿邊要衝之處專委執政大臣精選素習邊事之人以為守將其代州尤不可輕授如得其人責以實效雖有微累不令非次移替所貴軍民安其政令緩急不至敗事拯為河北轉運使乞河北添糴粮草上疏曰臣累曽上言以河北河東沿邊守將未甚得人特乞精選帥臣訓練卒伍廣為聚積以防後患而位疎言賤未賜開納臣昨奉命出疆詢訪敵中情偽亦甚諳悉盖彼處官吏薄於俸給人民苦於衣食其下族帳各萌南牧之心所未欲者獨其主與一二將相而已亦非兵力用度之不足盖利國家嵗入數千萬不欲無舋而動耳然㸃集軍馬創造兵器無日無之觀廼所為其志不小而議者但欲少安聖意謂彼君臣樂我和好盟誓甚固萬不負徳竊恐有誤於陛下也孫武曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也況河北河東京東地震尤甚沿邊大水並隂氣極盛之象兼又五星屢失躔次此皆災異之大者且天之示變盖不虚發所以警悟於陛下勤勤如是固不可推咎四夷以忽天戒也其邊上事宜不可不速為備禦之具今雖遣臣寮往三路便糴縁逐處少得見錢恐難集事欲望特出宸斷許於内帑支見錢或絹百餘萬匹逐路乗此之便相兼収糴俾邊廪稍實有數年之蓄庻少寛聖慮然後日御便殿召執政大臣與緫兵戎帥丁寧訓論俾謀議畫策講求將帥練習兵旅繕完城壘以先警脩之況當此可為之際若不鋭意逺圖但務因循憚於更張措置恐非宗社之福必貽陛下之深憂也臣區區之心不能自已惟陛下留神省察拯再請移那河北兵馬及罷公用回易臣竊見天下之患在乎三路而河朔為患最甚冗兵耗於上公用蠧於下内則致帑廪空竭外則致生靈困敝臣前後累次論列乞那移兵馬於河南州軍及罷諸處公用回易尋委逐處安撫轉運司相度終未見果決施行況北敵請和四十餘年嵗遺金帛數十萬者是欲寛國用而舒民力爾今邊鄙不聳正是保國息民之時而屯兵益衆用度益廣毎年河北便糴糧斛三四百萬石約支見錢四五百萬貫僅有二三年之􅇱雖朝廷竭力應副亦所不逮日甚一日恐數嵗之後必有不可捄之患至如寳元以前天下無事財貨充足一旦昊賊猖獗調發旁午公私窘絶迄今未復以今事勢較之往日則不侔甚矣萬一或有警急何以取濟且邊疆者四支也河朔者心腹也幸而外無邊警之虞而令河朔塗炭如此是防手足未然之患而自潰其心腹也則朝廷安可不深慮而務捄之之策乎若上下協心更張措置如反掌之易而有太山之安又何憚而不為哉欲望聖慈宣諭兩府執政大臣應沿邊及近裏州軍兵馬除合留防守外其屯駐駐泊諸軍悉令歸營就糧諸軍即分屯於河南兖鄆等諸州率三年一代遇有邊事即時舉發不旬日可到豈有後期不及者邪其諸州公用錢其沿邊及人使路分州軍量與増添外諸路一切禁止並不得回易則國用民力漸可完復惟陛下矜念元元斷在必行若更令逐路相度則互執所見益無涯矣臣區區之心不能自巳伏乞陛下留神省察拯又請擇探候人上疏曰臣竊見沿邊州軍探候事宜於體最急舊日何承矩李允則識敵之情偽大小必得其實後來葛懐敏亦能使人自王徳基王仁朂後惟務邀功冐名所遣既不得慎宻之人且從而聲張之是致契丹累次捉過漢人去界上多添廵邏驗認于今全不能深入只是到得四𣙜塲及齒涿間傳得民間常語及虛偽之事便為事宜且諸處自有機宜一司所管金幣不少自來只備支賜與探事人近年甚有侵借過處兼沿邊守將類不得人但圖進取殊不以此為意正恐一日敵及境而不知也欲乞應係沿邊自來探候事宜州軍宻令知州通判及舊例管機宜人等盡籍見勾當事人姓名仍具機宜司見管金幣多少自來毎得甚事支與何等物㡬月日可來一報仍令多方求訪舊日曽經探事人使用新差少年不諳事者並令廢罷及只令探首領所在任將相何人山前山後人哀樂如何諸國臣與不臣并訓練㸃集兵馬造作姦謀年嵗豐凶轉移糧草凡干大事即許申報自餘打圍移帳放赦修城細碎尋常衆人所見虚偽傳聞之事並不可納徒廢金幣無益於事伏望聖慈特降指揮仍乞嚴賜約束不得漏洩所貴逐處官吏用心緩急免致誤事時陜西用兵判國子監葉清臣上言曰當今將不素蓄兵不素練財無乆積小有邊警外無驍將内無重兵舉西北二陲觀之若濩落大瓠外示雄壯其中空侗了無一物脱不幸戎馬猖突腹内諸城非可以計術守也自元昊僭竊因循至於延州之寇中間一嵗矣而屯戍無術資糧不充窮年畜兵了不足用連監牧馬未㡬已虚使蚩蚩之氓無所倚而安者此臣所以孜孜憂大瓠之穿也今羌戎稍却變詐亡窮豈宜乗即時之小安忘前日之大辱又將泰然自處則後日視今猶今之視前也仁宗御便殿訪近臣以􅇱邊之策清臣為翰林學士權三司使上對曰陛下臨御天下二十八年未嘗一日自暇自逸而西夏契丹頻嵗為患者豈非將相大臣不得其人不能為陛下張威徳而攘四夷乎昔王商在廷單于不敢仰視郅都臨代匈奴不敢犯邊今内則輔相寡謀綱紀不振外則兵不素練將不素蓄此外寇得以内侮也慶厯初劉六符來執政無術略不能折衝爼罇之間以破其謀六符初亦疑大國之有人藏奸計而未發既見表裏遂肆陸梁只煩一介之使坐致二十萬物永匱膏血以奉强敵此有識之士所以為國長太息也今詔問北使詣闕以伐西戎為名即有邀求何以答之臣聞誓書所載彼此無求元昊叛邊累年致討契丹坐觀金鼓之出豈有毫髮之助今彼國出師輙求我助奸盟違約不亦甚乎若使辯㨗之人判其曲直要之一戰以破其謀我直彼曲豈不憚服茍不知咎或肆侵陵方河朔灾傷之餘野無廬舍我堅壁自守縱令深入其能乆居既無所因之糧則亟當遁去然後選擇驍勇遏絶歸師設伏出竒邀擊首尾若不就禽亦且大敗矣詔問輔翊之能方靣之才與夫帥領偏禆當今孰可以任此者臣以為不患無人患有人而不能用今輔翼之臣抱忠義之深者莫如富弼為社稷之固者莫如范仲淹諳古今故事莫如夏竦議論之敏者莫如鄭戬方靣之才嚴重有紀律者莫如韓琦臨大事能斷者莫如田況剛果無顧避者莫如劉渙宏逹有方略者莫如孫沔至於帥領偏禆貴能坐運籌策不必親當矢石王徳用素有威名范仲淹深練軍政龐籍乆經邊任皆其選也狄青范全頗能馭衆蒋偕沉毅有術畧張亢倜儻有膽勇劉貽孫材武剛斷王徳基張慤勁勇此可以補偏裨者也詔謂朔方灾傷軍儲缺乏此則三司失計置轉運使不舉職固非一日既往固已不咎來者又復不追臣未見其可也且如施昌言承乆弊之政方欲竭思慮辦職事一與賈昌朝違戾遂被移徙軍儲何由不乏自去年秋八月計度市糴而昌朝執異議仲春尚未與奪財賦何縁得豊先朝置内帑本􅇱非常今為主者之吝自分彼我緩急不以為備則臣不知其所為也至如粒食之重轉徙為難莫若重立爵等少均萬數豪民詿誤使得入粟以免杖笞必能速辦夫能儉嗇以省費漸至於從容徳音及此天下之福也比日多以卑官躐請厚俸或身為内供奉而有遥刺之給或為觀察使便占留後之封倖門日開賜予無藝若令有司執守率循舊規庶㡬物力亦獲寛弛詔問戰馬乏絶何䇿可使足用臣前在三司嘗陳監牧之弊占良田九萬餘頃嵗費錢百萬緡天閑之數纔三四萬急有徴調一不可用今欲不費而馬立辦莫若賦馬於河北河東陜西京東西五路上户一馬中户二户一馬養馬者復其一丁如此則坐致戰馬二萬疋不為難矣歴代名臣奏議巻三百二十八
