body:
  text: 歴代名臣奏議卷一百四十三明楊士竒等撰用人宋髙宗時章誼乞謹選執政大臣上奏曰臣聞人主繼天而為之子宰相代天工而熙庶績百辟卿士猶日月四時運行而不息者也如此則君無為而逸臣有為而勞故曰天何言哉四時行焉百物生焉自堯舜禹湯文武以来未之有改也今陛下即位累年于兹求治甚切宵衣旰食焦勞憂慄於廟堂之上而羣臣奉令承教優游逸樂於下真所謂本末倒置上下易位以此求治是適越而比轅也敵國内侵誰為陛下建攘却之䇿者盜賊紛擾誰為陛下言消弭之術者財用匱乏人民流散宗社靡寧土疆日蹙執政大臣略無扶顛持危之意但以致身宰輔位髙金多為樂即有緩急謀在奔走設使陛下覺悟或行罷免髙可望開府大觀文次不失資政節度使國勢微弱兵禍相纒九族分離二聖播越陛下獨受其無聊此臣所以疚心瀝膽願陛下慎選執政大臣之意陛下得二三賢執政慰天下之望弭邊陲之難而陛下優游無為責成仰治天下才智之士皆為陛下奔走自竭然後君臣之位正而治道得矣此天之道也非臣之臆説也惟聖主留神幸甚誼又乞參稽衆論選擇大臣上奏曰臣聞爵人於朝與士共之刑人於市與衆棄之盖刑賞大政帝王不敢私決擇也其好惡予奪必詢之衆庶謀之卿士以觀公議之所在然後用捨焉考之於經虞舜聖君也所用禹益伯夷之臣亦聖賢之臣也其未得也必始於疇咨其得之也乃由於僉舉是以孔子稱之曰舜有臣五人而天下治又曰無為而治者其舜也與言得人之盛致治之羙也後世朋比之臣懐私植黨欲鉗衆多之口以迷奪人主之視聽於是立為說曰下輕其上爵賤人圖柄臣則國家揺動由是天子進退大臣不聞天下之公議而執政用事之人引用黨與雷同瓦合日入於亂亡之域而人主始孤立矣今陛下所與共圖天下之治者唯二三執政也人或未充官或未偹非降疇咨之命不足以得俊傑之才近者參知政事謝克家以疾辭位陛下深惟國計之重幸聽其請下掩大臣妨賢之誚外厭衆庶望治之情甚大惠也臣聞參知政事之選位亞宰司任重職大必咨僉諧之舉乃竦中外之聽如得其人日與宰相議論可否仰副陛下側席之求則安榮自此成禍灾自此弭土疆自此復茍非其人治亂分矣孟軻有言曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之伏望陛下體虞舜好問之德觀孟軻察言之道公聽並觀參稽衆論慎極一時之選然後斷自聖心使毗大政不勝天下之幸誼又乞重宰相之責上奏曰臣竊見陛下御極以来五命相矣前此四相以不稱職而罷今皆從容閑曠不受憂責在彼未為失計也陛下之國勢日蹙宗社日危萬官億姓六宫九族遷徙不常殆無容足之地此宰相誤陛下也陛下終以論一相為人主之職而未嘗躬行威斷其於禦戎大計未有指授臣恐又無以善其後矣夫禦外患者必先定攻守之䇿成内政者必先操威福之權宰相者為陛下擇攻守之人而佐陛下施賞罰之政者也前此御營之兵宰相領之而急則奉陛下以趨攻守之䇿何如哉賞罰喜怒不攷功罪自其已出威福之權何如哉陛下誠能指授方略而責宰相以辟土疆躬親聽斷以明賞罰則宰相之任雖專而宰相之責亦重委任責成期以歳月境外之患可弭中興之功可冀君臣並受其福豈不羙歟誼又論大臣數乞引去上奏曰臣竊觀日者大臣數為出入致煩陛下遣使宣諭傳詔勞問至於再三然後就職自春徂夏殆無虛月此雖於人臣進退之禮所不可廢而論其以誠事君自任以天下之重者恐未安也禮記曰事君者量而後入不入而後量孔子曰陳力就列不能者止夫今之為陛下大臣者其除拜之始必自負其才以謂兵革可平盜賊可息土疆可復以此為己任故其嘉言讜議仰當上心是以受而不辭所謂量而後入也及其執政之後事有不遂其初心而求去者將必有説矣諫不行言不聽膏澤不下於民則去焉可也力少而重未易任智小而大未易謀不能而止則去焉可也不然則功已成矣名已遂矣不伐其功不居其名體天之道引身而退則去焉可也今陛下聽言納諫其於大臣奏請未嘗少却而大臣任陛下之事非功成名遂之時但數因人言乍去乍留此甚非大臣以道事君之義也臣謂大臣當為陛下建天下之大利除天下之大害以身任天下之責如樂毅之輔燕以破齊為任如種蠡之輔越以報吳為任如諸葛孔明之輔蜀以興復大漢為任如周公之輔成王以平三監滅淮夷為任誠以此自任則雖有流言飛語所不恤也大臣今日之事陛下其所任者何事其欲去者何事去就紛紜誠無益也公孫𢎞曰揉曲木者不累日銷金石者不累月周公朞年而化臣𢎞尚竊遲之公孫𢎞何人哉能以天下自任如此臣願睿明深詔執事責其恢復之大功而使之勿為區區之苛禮捍外侮弭盜賊指日以冀當今之成效不勝大幸若其受任無功仰辜委寄雖曰進退有禮亦何以塞天下之望哉誼又乞重監司之選上奏曰臣伏觀部使者之職號為外臺所以統治郡縣頒宣詔條廉問風俗任至重也前世選授大槩有二欲諳練世務求之久次則惟其官欲簡拔俊良待以非常之舉則惟其人是以舜之四岳十二牧周之方伯連帥漢之州牧刺史唐之採訪觀察使其髙者咸預公卿之選下者亦秩真二千石所以用貴理賤求之久次也若夫圖事任職務在得人登賢選能唯恐不及則凡文學政事有一可稱風操識度在所甄録者雖無積月累歲之勞假以權發遣之號盖亦不待次而舉也近時委任頗異於此伏望聖明考此二端増重部使者之職自非豪傑卓異之材且勿輕授上觀虞周下採漢唐使嘗歴從官卿監之人咸預兹選而與臺閣省寺之除更為出入不唯可以革去内重外輕之弊且復輶軒所至吏民有所矜式仰稱陛下知人任使之明不勝幸甚誼又論劉綱合還鎮或𨽻一將帥上奏曰臣聞滁濠州鎮撫使劉綱昨在江東别無職守欲歸淮南軍衆乏食進退無據士卒散擾於是挺身自歸朝廷冀䝉措置而羇旅累月每詣都堂宰執略不省顧端坐客次見士大夫輒流涕自言誠可憐憫臣愚以為劉綱果有罪犯自當早正典刑若猶可恕或其無罪則當付以職任無宜閑廢縁劉綱之父劉位身本農家頗富於財自靖康建炎以来出身衛國數平巨宼卒死於兵今劉綱所領皆其父部曲徃徃盡是莊客家僮若不令劉綱自行鈐束或聞劉綱貧困無歸決須散為盜賊别生變亂昔唐朱泚帥涇原以忠誠自歸既至長安拘留不遣一旦部曲擁泚為亂幾亡唐室盖亦當時措置乖誤也伏望聖慈畧鑒前事特賜睿斷發遣劉綱還鎮或如岳飛體例領其部曲𨽻一将帥使不失職不勝天下之幸誼又論徽州知通棄城乞奨擢汪希旦上奏曰臣聞近者張琪之兵自臨安府奔走侵犯徽州其徽州知通望風棄城而遁六月十三日張琪人馬猶在臨安府之昌化縣而十四日徽州已無官吏矣有寄居官汪希旦者知官吏逃避之地自徽州城中折簡招致使回郡守禦至十八日尚未有還任者遂具事因申尚書省樞宻院至今張琪人馬未知所向徽州安危亦未可知而郡守通判尚未有申奏文字至朝廷者臣又不知本路帥臣監司曽無申發文字與汪希旦相繼而来者也夫郡守通判帥臣監司受任以守一州一路而盜發不知盜至不擊上不能聞之朝廷請兵討捕下不能躬率吏民力為戰守率皆奔走掩匿不以上聞此則畔官離次不勝其任矣如汪希旦者素非朝廷倚任投閑置散之人也乃能憂國如此臣謂防秋甚近諸路帥臣監司知州通判所宜一例選擇悉付能臣則今年外患可却盜賊可息若委任非人復如徽州知通者将誤陛下立國之勢矣所有徽州知通朝廷固宜汰斥其汪希旦亦乞睿明量事奨擢以為人臣能否之勸劉行簡上殿劄子曰臣竊惟為政之要莫切於救弊事之弊者固非一端而尤以人材為急自古人主所與共天下之治者未嘗不属之公卿大夫士必得真材實能列于庶位徧為吾用猶懼有闕比歲以来乃或不然舉所謂材能者皆斥去之事孰與濟人材淪落莫甚斯時迄今垂二十年槁死寂寞之濵者不可勝數矣其幸而未擠於溝壑者於今亦無幾人可勝慨歎昔人或以十年不調白首為郎尚痛恨其不遇方之斯時猶未為失其所也臣以衰晚誤膺簡召自揆庸虚豈有深謀袐畫可以仰裨日新之政惟有振滯淹之説願以為獻伏望陛下深詔大臣搜舉向来擯斥委棄不用之士取其尤者越次拔擢必皆仰戴恩徳益輸忠藎于以共成治道實非小補惟陛下留神裁擇行簡又上䟽曰李道裕貞觀末為将作匠有告張亮反者詔百官議皆言亮當誅獨道裕謂反形未具帝怒不暇省斬之歲餘刑部侍郎闕宰相屢進不可帝曰朕得之矣是嘗議張亮者朕時雖不從今尚悔之遂命道裕臣竊謂臣受知於君不以一時遇合為難而以知其心之所存為不易太宗之於道裕也始棄其言卒乃用之豈以疇昔之事為過而悔之歟曰不然太宗願治之主也其措心積慮未嘗不在於天下國家雖一事之疑必悔之況其平時欽恤用刑每決死罪必三覆五奏而後定意太宗之斷未必為踈而追悔不忘若是者豈恤刑之心誠有合耶嗚呼人主未嘗無願治之志然而不克有濟者誠不至而已矣茍出於誠則反覆念慮浸久而不忘惟其當而後已故於聽用之際有合於心者雖棄之於前而收之於後不以自慊也若德宗之於陸贄則不然當危難時惟贄言是聽天下既定乃追仇盡言怫然以讒倖逐猶棄梗焉以此一事足以觀人主之用心矣何必多耶行簡又乞令侍從臺諫舉縣令䟽曰臣聞刺史入為三公郎官出宰百里守令之任在古甚重其體惟均朝廷循襲故常漫不加擇唯郡守間䝉選除外縣令注擬悉歸銓曹臣竊以謂近民之官縣令為㝡豈得若此而況今日中外多故軍旅洊興安民保疆其事不一為縣令者非但如前日出入阡陌勸督農桑謹期㑹簿書而已茍非其人為患滋大唐太宗嘗詔内外五品以上舉任縣令者於是官得其人民無愁歎漢馮野王上書願試守長安令宣帝竒其志然終不以與之盖遴選如此臣愚以謂莫若倣古之意令侍從臺諫各舉所知可充縣令者若干人上之朝廷左右司置籍以偹選用然後命監司守臣察縣令之不職者汰之以所籍姓名随闕除授假以五品之服任滿稱職有進秩陞等之賞其治行尤異者不次拔擢使之歆豔則人人激昻以赴事功舉當者有重賞舉謬者有薄罰庶幾近民之官拔十得五有以仰副陛下仁民愛物之意權吏部侍郎廖剛論縣令劄子曰臣竊聞朝廷近日有意遴選縣令此誠惠飬元元之急務然古有郡守入為三公郎官出宰百里惟外内無輕重之偏是以人榮其官而樂於治民近世不然内重外輕至縣令為尤甚凡督責難辦罪罰易及非他官比故人未有願為者拘於格法不得已然後為之彼稍負才器可以得羙官者未嘗過而問也然則奈何欲薦舉而使之為邪臣謂差注一付吏部而重其賞罰以為勸沮可也選人除軍功捕盜非實歴令丞一任不許改本等官京朝官非實歴知縣兩任必如祖宗法外不得為通判内不得為郎官其有治績顯著者優加旌别如漢増秩賜金之𩔖而貪汙不法者又必重寘典憲如此則才者庶亦願就而妄作者有所憚矣盖不必薦舉為可賴也昨者陛下嘗詔舉為令者矣才者既有不願就而其乞憐於親舊以得之者徃徃非才此其弊也且事故有要領使監司郡守皆擇得其人則視令之賢否而進退之正其職耳烏在遍天下之令皆選之於朝廷區區管見惟陛下裁擇剛又論除中丞上殿劄子曰臣嘗聞唐文宗擢丁居晦為御史中丞謂宰相鄭覃曰朕嘗與居晦論世人言李杜元白為四絶如何居晦曰此非君上合論之事朕以此記得居晦可為御史中丞又謂牛僧孺可以為大夫覃曰向為中丞頗不能擊搏恐非夙望文宗揺首曰不然鸞鳯自與鷹隼異羙此文宗任人之意也臣闒茸下材陛下不以其不肖擢居是職固不敢望古人萬分之一然臣伏讀訓詞責臣持大體以正國之紀綱有以見陛下之意與文宗合矣人主惟患不得論道經邦爕理隂陽之人與之躋一世於仁壽之域若乃區區藝文之末豈所留神者哉居晦之言宜有取於文宗也中丞執法固當維持邦憲擊去姦邪之為國害者乃捃摭細故矜觜爪於狐兔之㣲曽何足道覃之不察僧孺宜乎文宗不以為然臣願陛下不以文宗為無足法而忽其意臣亦不敢徇流俗之見專事苛察而忘大體也惟聖明鑒焉剛又論朋黨劄子曰臣聞洪範之書曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極此箕子為武王陳世之大法盖帝王不易之常道也若好惡悖於正理偏黨徇其私心則不能蕩蕩如天之大平平如天之明失所謂大中至正之道矣㑹歸其有極大中至正之謂也人君惟以大中至正之道照臨百官無有愛惡無有戚踈一視同仁則萬邦黎獻化上之徳亦将惟皇之極是訓是行以近天子之光鳥有所謂朋黨者哉盖天子作民父母以為天下王薄海内外無小無大孰非吾之臣子無賢無不肖孰不欲媚于天子以求其所欲此戴天履地者之常情也然而後世乃有朋比之徒結為死黨或至於相與欺君罔上而不顧者何哉臣嘗思其故矣請試為陛下言之今夫人主以甲為朋黨也方與乙共治之惟乙之徒是與惟甲之徒是惡他日以乙為朋黨也則又與丙共治之惟丙之徒是與惟乙之徒是惡乃至更出迭入亦莫不然此朋黨之弊所以至於牢不可破也何則利害有以怵之彼慮其所終則其勢不得不然耳故臣嘗謂朋黨之名雖生於君子小人之相閧其實人君有以致之也誠使王道明於上善惡别白仁賢不肖襲情疑在位在野各安其分則朋黨何自而興乎臣每聞聖訓常自謂於物無心有以見廣大之徳與天地合矣然至於論臣下朋附之迹則未免有彼此之間臣故不避誅責輒以是為言也願陛下垂日月之明而惟君子小人是辨鑒徃代之失而惟皇極之道是遵賢則用之豈曰彼之黨嘗所援引而必疑之哉猥瑣無用則置之豈曰彼之黨嘗所擯棄而必録之哉若進若退若取若舍初無係吝於其間而必合天下之至公此所謂皇極之道也如是則君子之徒莫不以𩔖而進萃聚於朝志同謀合濟濟其和而天下之人方且胥慶以為得人雖有姦慝不得厚誣以為朋黨矣凡以朝廷清明君子小人之分素定初無可疑故也由是觀之大中至正之道行則朋黨不革而自消是誠在我而已惟睿明不以臣言為迂而加採擇焉天下幸甚剛又奏曰臣聞易以内君子而外小人為天地交泰之時盖君子道長小人道消泰之道也反是則為否而天下無邦矣人君之處君子小人可不謹哉盖小人未嘗無適用之才固不必盡廢然而必外之者䛕言足以惑人主之聰明非事足以亂人主之心志一容其身則膠固而不可去仲尼論為邦貴於逺佞人者以此臣願陛下選任之際每加察焉旌别淑慝無使小人得間於君子庶幾朝廷清明風俗純一在位皆有羔羊之徳而詩人無候人之刺矣不亦善乎胡寅上䟽曰臣聞周公制法使民興賢出使長之使民興能入使治之以是致太平垂萬世後漢憙平時縁朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨立三互法禁忌甚宻蔡邕上䟽論其非且曰韓安國起自徒中朱買臣出於幽賤並以事宜還守本邦豈顧循三互繫以末制乎司馬光韙其言近年指揮監司郡守不得除用土人違周公之訓蹈憙平之失出於當時用事大臣私意非良法也夫得賢才使臨本邦知利害尤悉愛百姓尤切不賢不才者雖在他方以非吾土為害滋甚矣不知擇人而謬於立法此與三互同為後世笑也臣愚伏望陛下明詔大臣蠲除近禁盡公選授惟務得人有功則賞有罪則罰何憂其徇情亂政而以疑忌不廣示天下哉寅又上䟽曰臣竊見洞庭水賊本縁官吏非人政煩賦重所致今治之之術以郡縣得人為本而縣令尤為近民若得其人則能奉行寛恤之政使未為賊者安土樂業已為賊者壊植散羣其選付責成不在兵將之下豈可輕也軍興以来便宜辟置及於縣令固已非是又乞不以諸般拘礙皆許奏辟於是詐官負罪姦贓無行一切拘礙不敢至朝廷參銓部者咸輻湊之其為赤子之害可勝言乎又況鼎州昨縁程昌禹借補烏合官吏猥多急政豪奪為楊么驅民今程千秋繼之尤當加意選擇縣令而所陳如此豈可聽許臣欲乞因千秋所請特降指揮應殘破縣分奏辟令佐者須選已出官歴任無贓私罪犯之人方許奏請差注其未出官無歴任曽犯贓私罪及見係貶降未經叙復或無出身告勅批書印紙而稱兵火去失者即不得輒行奏辟及不得陳乞不以諸般拘礙辟差庶幾縣令得人百姓受惠掉葉兵刃復縁南畝以臣愚見不以諸般拘礙辟差縣令利害甚大所有已降指揮臣未敢書行校書郎王十朋輪對劄子曰臣一介小臣不識忌諱不知朝廷事體愛君憂國出於天性妄懐嫠不恤緯之心竊聞道路匈匈咸謂敵情叵測有南下牧馬巢穴汴都窺伺江淮之意廟堂之上帷幄之臣必有料敵制勝之䇿臣不可得而知然議者以謂邊奏有警則羣臣失色相顧傳聞稍息則恬然便以為安且謂敵有内難勢必不来夫不恃我之有偹而幸敵之有難其謀國之術亦踈且殆矣自建炎至今敵未嘗不内相殘賊也然一酋斃一酋出其勢愈熾曷嘗為中國利哉要在所以自偹者如何爾我有先備敵雖强而不足憂我茍無偹敵雖有難幸之何益彼或不以有難為畏乗我稍怠長驅而来其將何以禦之耶臣謂今日禦戎之䇿莫急於用人用人之要莫先乎人望盖知人之術自古所難蕭何不生孰能識韓信於未知名之日孟軻復出亦必取士於國人皆曰賢晉悼公以民譽而用六卿遂成復霸之業東晉以人心而起謝安遂成破敵之計國家寳元慶歴間西夏叛命仁宗以經略安撫之任付之韓琦范仲淹二人雅有時望軍中有一韓一范西賊破膽之謡兵不大用而元昊臣服皇祐中用文彦博富弼為相朝士相賀仁宗曰古之用人或以夢卜茍不知人當從人望夢卜豈足憑耶元祐初相司馬光遼人夏人相戒曰中國相司馬矣謹無生事人望之能服人如此今若外若内士夫軍民口無異辭咸謂有天資忠義材兼文武可為將相者有長於用兵士卒樂為之用可為大帥者今乃投閑置散無地自效或老於藩郡以泯没其材内為讒邪之所媢忌外為敵人之所竊笑天下輿情憤悶抑欝臣願陛下斷然為社稷計起而用之以從人望可以作士氣可以慰人心可以寝敵人之謀可以圖恢復之大計陛下縱未大用之亦宜付以江淮重任使自當一面為國長城亦可無西顧憂矣臣又聞范仲淹初以言事得罪尤為宰相吕夷簡所惡斥逐于外及西方用兵仁宗思用仲淹夷簡薦之亦力仲淹果能成功夷簡不失為賢相陛下當以仁宗之心為心大臣當以夷簡之事為法相與任用天下之賢才以為排難解紛計天下幸甚社稷幸甚其次有舊宰執侍從及嘗言事之臣名節素著者或守逺藩或食祠禄或已休致或在謫籍並宜起廢置諸朝列其聲名風采亦足以聳動一時謀謨措畫必有大過人者諸将有以驍勇善戰稱者悉宜列置分布於荆襄江淮間以為爪牙藩屏用賈誼衆建諸侯而小其力之法以駕馭之如是則異人輩出可以供任使矣猛虎在山藜藿不採國有人焉難當自消臣以為禦戎之䇿莫大於此右正言陳淵論用有徳上奏曰天下之士有有徳者有有才者有有智者人君用之唯其宜而已智者謀之才者辦之有徳者守之是三者闕一不可用或偏焉必不能有所濟矣故書曰凡厥庶民有猷有為有守汝則念之才智與有徳者之謂也或曰治平之時唯徳是任艱難之際所當用者才與智而已是不然夫有徳者何施而不可昔髙帝定天下天下所謂傑然者三人既以為其腹心爪牙之用矣其餘如曹參周勃陳平亦皆足以相國才智之徒盖不少也然必待四老人者出以傅太子然後漢室以安光武中興宼鄧耿賈之流二十八人者依乗風雲俱有可稱所謂才智者亦衆矣然必起良吏卓茂以為太傅然後風俗以變由是言之才智之士艱難之時雖不可無而有徳者亦不宜忽矣淵又論用老成上奏曰夫學然後知其不足經歴既久然後知其誤謬方少年恃其天資過人盛氣以待物更事之後未有無悔者也悔而知改猶足以為善悔而不改終於敗國亡家者有之矣故學不可以已也若乃學焉而未至事不素練則老成之人可尊而不可忽人主深居九重之中稼穡艱難之未知而能應天下方来之變者知此而已昔者孫權年未及冠而能使曹操望其營壘曰生子當如孫仲謀此可謂一時豪傑之主矣然其母嘗以属張昭故昭每諫之必以太后為言我太祖皇帝英偉之資無與倫比而杜太后嘗令趙普輔之夫孫權之智不減張昭而太祖之聖豈趙普所可跂及乎取其經變之多歴事之久而已況於不及二君而欲棄老成人未見其可也虞允文奏還吏部侍郎汪應辰除知衢州詞頭䟽曰臣聞士君子之進退去留必觀於時時當去而不去傷乎廉時當留而不留傷乎義廉義舉而公議定矣今强敵犯江邊境多事君父勤宵旰之憂乃智者効謀勇者効力忘家報國之時也應辰蚤歲以文章決科陛下親擢為第一賜名之寵多士至今歆豔年甫四十又䝉親擢為言語侍從之臣不為不遭遇矣一旦無故補外廷紳之論咸疑之謂應辰之才望實周於世用朝廷若藉其才望以禦外侮則衢之為郡不為要邊若以其罪當黜則不明言其罪以正其當黜之名若出於應辰之請則有傷於事君之義而非書生報國之本心也應辰之去名既不正茍不以為非則援引而求去者繼出而紛紛矣多事之時如使人材相繼去國此物論所以為朝廷惜也臣愚欲望睿慈將應辰衢州之命特賜追寝且令依舊在職以待後日或有任使庶幾朝廷百僚各安其職不為茍去之計而公議自定更乞自宸衷裁酌施行武義大夫曹勛上書曰臣聞官者勵世磨純者也人者嚮徳慕名者也官得其宜則事辦而功就人樂其事則功倍而邦寧故聖王觀向順宜因事制法所以勵人厚國也恭惟陛下建中興之業必制中興之典然後驅一世之民而成興王之功臣欲乞如古制為武功官賞十等惟寵戰功它賞不與每授令繋於銜官同則以此髙之宻院别置籍記載其名謂之入等則不次召用陞擢使令庶約功而得死節革濫而收實才方時右武於是在焉或可施行乞下臣具等格聞奏帝嘗詔權禮部侍郎周必大同王之竒陳良翰對選徳殿袖出手詔舉唐太宗魏徴問對以在位久功未有成治效優劣苦不自覺命必大等極陳當否退而條陳陛下練兵以圖恢復而将數易是用将之道未至擇人以守郡國而守數易是責實之方未盡諸州長吏倐来忽去婺州四年易守者五平江四年易守者四甚至秀州一年而四易守吏姦何由可察民瘼何由可蘇上善其言必大除敷文閣待制兼侍讀兼權兵部侍郎兼直學士院上勞之曰卿不迎合無附麗朕所倚重必大奏言太宗儲才為真宗仁宗之用仁宗儲才為治平元祐之用自章蔡沮士氣卒致裔夷之禍秦檜忌刻逐人才流弊至今願陛下儲才於閑暇之日吏部侍郎洪遵薦王珏奏状曰臣伏覩降授右朝散大夫王珏廉勤公明所至可述頃為䕫州湖北路轉運判官每出按属部盡以随行胥吏閉之一室臨當啓途湏衆吏上馬已然後乃去雖供帳帟幕亦只用漕司者至於薪水芻粟不得已合用者皆估計其直給錢償之州縣無秋毫之費民間詞訴躬親聽決無一不得其平者部内賍吏望風斂迹不敢復肆嘗於武昌築堤外遏江漲内灌民田行旅農人均被其賜兩道歌詠其政以為近所無有前知真州到任才五月官無乏事又能取其贏餘積米數千石以為来歲軍儲之偹拊循凋郡日不暇給千里之民上下便安之一時諸司以激濁揚清為職既不能薦反以羅織成罪按章所言𩔖無實迹而使之錮於聖世人以為寃誠如近降指揮所謂有公累而其材實可用者起之閑廢必能趨事赴功如䝉朝廷抆拭付以煩劇去處施之政事當有可觀臣今先次舉到王珏一貟保任終身如犯賍及不職甘與同罪謹録奏聞紹興中遵又薦用林珦上奏曰右臣伏覩右通直郎新差通判福州軍州事林珦本出書生敏於為政治民有愛利之行持己有公廉之稱昨知宣州宣城縣縣有笪岳豐稔兩陂遏溪水以溉田自政和初為水所壊莫能修復並陂之民歳常苦旱珦修治朞月而畢髙山之頂皆為良田明年宣城大水破圩田一百六十餘所而陂口不動百姓更名曰林公泉後知常州無錫縣舊例令佐四廳催科浮民得以為姦號為雜催者至七百餘人因縁侵漁人䝉其害經界覆實官在縣置枷械於門追呼自便又於太保長名下勒取丁口圖帳七千餘本皆魚鱗細圖期限嚴峻遂以重價就買官中本送納珦始至之日即時禁止又户長催科舊以五日一比較有逃絶則令償填有逋緩則加杖責徒為苛擾元不集事珦親行鐫諭盡革宿弊是年官物不出省限皆足而户長未嘗輒追一人到官酒壚茶肆至無村民之跡差役有闕人争先為之及為邵武軍通判有水口土軍擅開武庫被甲持刃驚動逺邇珦以計撫定得其首惡四人按誅之餘一無所問先是和平大寺兩寨戍卒循習縱肆官吏不能彈壓自此為之帖然凡平時能害齊民如公吏弓手亡賴子弟及詐為秀才宗室者以事詣曹窮治不貸悉皆斂迹一郡方安其惠化實縁小人誣譛遂以罷去今朝廷雖知其有寃起倅藩府然尚待逺次未究設施臣與珦初不相識采之士大夫公議知其所為所行灼然有大過人者臣今保舉堪充繁劇州郡守臣任使臣除已舉王珏外今来所舉林珦係第二員如䝉朝廷擢用後其人終身犯贓及不職臣甘與同罪謹録奏聞遵又薦胡璉上奏曰右臣伏覩左從事郎胡璉學古為政勤身奉公嘗為洪州豐城令邑當水陸之衝民狡吏頑素號繁劇前政或坐應辦不登或縁獄訟不理多以罪去惟璉興利除害抑彊扶弱痛治豪猾之撓政者善良得以安堵諸司率皆薦之如䝉朝廷旌擢付之大縣必有可觀臣今保舉堪任知縣縣令如後不如所舉臣甘與同罪臣除已舉過左宣教郎羅鞏外今来所舉係第二員謹録奏聞左正言鄧肅辭免除左正言第十三劄子曰臣嘗觀宣和司諫髙伯振觀望王甫不敢誰何每出傳呼諫官道路之人皆得以慢罵之靖康諫議洪芻阿附耿南仲不恤國難一日過朱雀門羣小擁其馬以數之曰國歩如此爾所諫者何事彼二人者方其巧為身謀以竊禁從徃徃自以為得計殊不知欺君之罪重於欺天故伯振死於白刃而洪芻流於海島皆天有以罰之也臣誤䝉三朝之知實縁論事宣和之末嘗進乞罷花石詩羣臣欲置於死地上皇赦之仍欲召對靖康之初賜對便殿力詆權臣當時指以為狂而淵聖容之尚寘於寺監今年不食楚粟飢餓殆不能行萬死一生奔赴行在陛下即擢於言路初望天顔遽論宰執必待其去臣言乃已當時士夫謂臣必踵張所吳給之轍矣而陛下錫臣以五品之服且褒以聖語謂臣論事正當甚可取顧臣何人上䝉聖眷如此雖瀝臣之血而膾臣之肝不足以謝天地之徳也然臣之職則諫臣也若陛下曰然而臣亦曰然若陛下曰否而臣亦曰否是奉天子者也非諫天子者也雖聖徳眷遇未即賜罪然臣獨不愧於心乎獨不愧於天地神明乎今雖可免異日将何如哉不為髙伯振即為洪芻矣此臣愚所以日夕惶恐而未知死所也竊惟人主之職在論一相陛下初登九五之位召李綱於貶所而任之以鈞衡其待之非不專而禮之非不厚然李綱學雖正而術踈謀雖深而機淺固不足以上副眷注之誠矣惟陛下嘗顧臣曰李綱真以身徇國者今日罷之而責詞嚴甚此臣所以竊有疑也既非臺章又非諫䟽不知遣詞者亦何所據而言之臣若觀望豈復敢言臣愛君其敢黙黙乎且兩河百姓雖願効死而五月之間略無統領民心茫然将無所適從矣及李綱措置不一月間民兵稍集今綱既去兩河之民将如何哉偽楚之臣罪當萬死前日紛紛皆在朝廷李綱先乞逐逆臣張邦昌然後叛黨稍能正罪今綱既去則叛臣将如何哉叛臣在朝廷政事乖矣兩河無兵則敵人驕矣李綱於此亦不可謂無一日之長也昔者宣王所以為中興之主者内脩政事外服逺人而已陛下聖徳過於周宣所以修政事而服逺人者豈可後哉李綱一日之長亦惟陛下采之御史中丞張守論差李公彦李正民權官不當劄子曰臣聞正朝廷以正百官正百官以正萬民盖朝廷施設不問大小當則人心服否則人心離在廟堂跬歩之間而利害實繋於四方萬里之逺不可不慎也伏見太常少卿減為一員近自外召黎確為太常少卿促赴行在視事之二日又除李公彦為太常少卿交割職事臣所未諭使公彦賢於確即當降㫖罷確而用公彦不然則是重疊除授也既知重疊除授即當改正今踰旬日未聞施行若以罷確為是耶而確亦久以行著名稱士論未以為非也又伏見中書舍人有闕祖宗故事差起居舍人兼權又闕即差它官今董逌為右史而差左司員外郎李正民權中書舍人臣所未諭使正民賢於逌即當便用正民為中書舍人不然即是董逌不學無文也逌不學無文則不當擢為右史若曰逌不可權攝邪而逌亦久以文學著稱士論亦未以為不可也無故罷黎確而用李公彦疑其厚於公彦然人必以為公彦攘之恐非愛人以徳之意也亦恐攘奪之風自是起矣近捨董逌而逺取李正民未必薄扵董逌然人不能無疑而逌亦無以自安恐非以禮處人之意也亦恐祖宗故事自是廢矣方今號令不行紀綱未立舉措之間人心所繋伏乞詔大臣詳酌改正施行守為殿中侍御史論増置教授状曰臣伏見六月二十二日聖㫖復置教授四十餘貟仰知睿明留神儒術雖在軍旅不忘爼豆之意然採聽公議未能無疑恭以國家自遭不測之禍二聖播遷鑾輿出狩兩河之地已陷敵境西京關陕尚為敵巢邊亭無卧鼓之期潢池有弄兵之警征役守禦逺近騷然行關防秋當在朝夕雖講畫焦勞廟謨深秘四方萬里不能戸知但見詔㫖増置教授必謂先其所緩後其所急此不可者一也崇寧以来蔡京用事舉天下嘗置教授矣餼廪所出不可貲計其所以教養成就之才亦未甚愈於昔也宣和之末卒無救於禍亂方今痛懲徃謬急所當先覆車是遵貽笑後世此不可者二也或謂士人猥多無闕可授姑欲以此撥遣滯留臣聞為官擇人未有為人而擇官也况兹多艱理宜省併冗員裁節浮費縱使未暇豈當復増況得禄私喜不過此數十人爾彼竊議而觧體者不知幾千萬人此不可者三也師儒之官要在遴選近改制科參用詩賦後進習經懵不通曉若取兼習詩賦可為人師者誠恐今日未易多得姑徇一時之求以失四海之望未見其利此不可者四也其間借有試中教授之人數固不多自有祖宗以来舊置教授窠闕因以除授誰曰不然昔叔孫通歸漢弟子百餘人無所進莫不疑之通曰漢王方䝉矢石爭天下諸生寧能鬭乎故先言斬将搴旗之士其後漢業既定禮儀既成拜為奉常通因進曰諸弟子儒生随臣久矣願陛下官之髙帝悉以為郎諸生喜曰叔孫生聖人知當世務盖因時制宜先後緩急古今不易之道也今陛下方居漢髙之馬上而公卿大臣豈當出通下哉伏望聖慈明詔大臣追寢已降指揮候軍務平定日取㫖施行天下幸甚守又状曰臣近嘗具䟽論列復置教授事未䝉施行臣竊謂學校建官固為美事但無事之日教飬士𩔖粉飾太平稍多何傷在於今日誠恐未可所有利害曲折已具前奏臣又聞堯舜之仁不徧愛人急親賢也堯舜之智而不徧物急先務也故雖堯舜之聖必度緩急之宜而有為也陛下上法堯舜以圖回治功時當艱難理有先後尤宜因時乘理以求所急顧兹防秋在候選将練兵扞外治内孜孜汲汲如救焚拯溺而乃増置教官數十員何異適楚而北轅救經而引其足邪今謂士人多聚東南舊任試中及合差之人差除不行因設官以與之臣竊以為過矣夫試中之人數目甚少舊所有處亦可除授若為舊任者多則自行三舍以来曽任教授者不可勝數也若謂合差之人多則不過及此四十餘人耳此數十人雖喜於得禄其間粗有知識者固未必以為然也又況所不及者邪方其無闕之可授則人固息扵僥求及其有闕而不及則人必懐於怨望利害得失固亦明甚又況崇寧以来設官冗濫無非徇一時之求也卒致財殫力屈敵人内侮貽陛下今日之憂若以為教授可復則崇寧以来汎濫之冗官何憚而不復乎伏望聖慈檢會前奏亟賜寢罷天下幸甚吕頥浩論黜浮薄之士上奏曰臣前日與宰執進呈潘棐差充川陜宣諭官李愿下幹辦公事面奉聖訓令説與李愿潘棐比因上殿觀其為人頗輕浮不可全信此行秪以棐久在西方知川陜人意偹詢問爾夫潘棐臣素不識之但曽召至都堂觀其為人有口辯善談論然舉止輕儇議論捭闔政如聖訓臣與宰執退而仰嘆睿照精明以此推之人之才否忠佞豈能少逃於聖鍳臣嘗觀自古立功立事之人皆剛毅木訥重厚寡言其輕儇辯捷之人聽其言雖可喜使之臨事非惟鮮克有濟亦往往至於敗事故自古聽言之際尤不敢忽昔張釋之對漢文帝以謂絳侯東陽侯言事曽不能出口豈效嗇夫喋喋利口今以嗇夫口辯而超遷之恐天下風靡不可不察釋之之論是矣唐徳宗寵任裴延齡每奏對恣為詭譎皆衆所不敢言延齡處之不疑徳宗雖頗知其詭譎但以好詆毁人冀聞外事故親厚之韋渠牟形神浮躁有口辯徳宗親信之此二人者皆以辯㨗變亂是非唐政不綱孔子謂惡利口之覆邦家者此也臣願陛下日後引對臣僚之際更加詳審察其趣向而用之庶幾所進擢者皆重厚沈毅之人而退黜輕儇浮薄之士使小人不得間君子則可以立功立事恊濟中興之大業矣臣不勝拳拳之至秘書正字張孝祥論涵飬人才劄子上奏曰臣聞國勢之强弱不係於土地之廣狹甲兵之利鈍而係夫人才所謂人才者有二焉文章足以藻飾治具風采足以羽儀薦紳此平時用之而有餘者也靜有以察未形之機動有以應方來之變如藥石真可療病如榖粟真可救飢此則平時既未嘗涵飬蓄儲而羽檄交馳之際則又不可頃刻而無此者也恭惟陛下以天縱之聖躬履興運而宵旰求治深思逺慮將以遺子孫萬世之安搜羅人才惟恐或失所謂藻飾治具羽儀薦紳者固自不乏然臣區區之忠猶効此言者誠懼夫實用之才尚少也夫楩楠把梓自拱把知其為良然不假之以歲月培壅封植􅃍責之以任重鮮有不撓折者是人才貴夫涵飬欲望聖慈深詔二三大臣俾更廣求實才可用之人善謀能斷文不足而質有餘者置之中都扶持長飬屢試熟察以須其成在平時則隆國勢以折未萌於緩急則受任奔走禦侮捍患無不可者誠得一二十軰森布在列則陛下可以垂拱無為固宗社於盤石而二三大臣亦可以優游怡愉於廟堂之上而無所事矣樞宻行府參謀鄭剛中請除罪籍上奏曰臣檢㑹今年正月五日赦書内一項新復州縣見停廢文武官将校公吏未經甄叙人並許赴所在自陳保明以聞當議特與甄叙臣切詳劉豫僭竊逆天悖道謂之有功者實助豫為虐之人謂之有罪者未必真坐累也今豫所録者朝廷包含混貸捐其舊惡豫所斥者朝廷從而棄之可乎方使無辜抱恨之人伸吭自訴有司錙銖原減論如常程則是朝廷尚為偽齊行法也臣愚欲乞應新復州縣官吏軍民被罪有文字照驗者並不理遺闕減降未經叙復者即依本等叙復内有元因劉豫補受復為劉豫廢奪者永不在甄叙之限庶幾功罪兩平衆論惟允剛中又乞委任李宷上奏曰臣竊觀四牡勞使者之詩也序詩者謂有功而見知則説矣臣昨日上殿因禀奏江西盜賊聖訓以李宷恐不能辦了此事臣退而有疑朝廷頃以江西多盜恐州縣不能存撫至於失業遣察官採訪措置而名以宣諭此宷奉使之指也為宷者布宣徳意按察官吏訪求致盜之端講究弭盜之術則宷之事舉矣至於討捕誅戮則非兵不可猶一病人陛下方命醫視之而藥未具也為醫者觀其形色審其氣候某處納邪某䖏受病歸告主人使具藥而攻之則醫之事舉矣江西之盜在處皆有而䖍吉最甚江西之兵合不過三二千人餘皆土軍廵尉之属與賊不相當也深山峻谷如窟如巢兵至散而民兵退聚而盜寀将所有之兵分布搜討能當幾處筠州黄十五負險不服宷方督申世景圍捕而處吉袁撫接連湖南諸處徃徃三五百人成羣出沒此盖盜多兵少力所不及也非擁兵坐視而徒以招安為事也若謂宷出使之日便不帶兵前去則宷之意豈不以數郡皆有盜賊根株連結自非得其要領未易進兵又恐前期遣發重有勞費是猶醫者欲見病然後求藥於朝廷爾宷之䇿非不善也如聞寀自到江西展體盡力一路官吏遂皆究心數千里之外利害動息皆便到朝廷此其為補亦非小小雖未可謂之有功陛下亦當知而使之說矣得無有告陛下者曰李宷授之以兵而不欲今果不辦矣信有是也則願陛下思朝廷所以遣宷之意本不專使捕賊而寀所以先措畫招安者盖坐無兵今朝廷方分遣大兵随張守以去亦須得寀徧歴諸郡詳究利害使民間知朝廷專有耳目之官與之採訪上下感懼而平定有期若謂宷無功於江西而不令究其施設則前日遣使之意虛矣願闡燭㣲之睿旁昭靡盬之臣臣不勝區區剛中又論人才上奏曰臣聞世之論治道者莫不以求才為急夫人君以一身之微受寄託之重孰不欲與賢智共之然用之不因所長則得之雖多寧有補於治道乎大抵用才如用藥苓术參桂徒聚之無益也惟寒温緩急各因其性然後有起病之功不然是與無藥等爾道徳才智徒取之無益也惟長短小大各随其能然後有致治之效不然是與無才等爾臯禹稷契夔龍伯益皆一世俊傑舜知用之至於禮樂刑政各不失其所付兹其所以聖歟陛下履中㣲之運圖復古之功以禮為羅賢俊並致臣子雖一介無它技而盛徳包覆皆所不遺是則無才者非今日之患而量才任用者正所急爾昔馮簡子善斷事子太叔善决公孫揮善辭令裨諶善謀而鄭國之政常使禆諶謀可否簡子斷之公孫為辭令成乃付子太叔行之是以無敗事也陛下以至誠之意昭日月之明何所不察區區之言尚願陛下因任羣材使小大之臣各迪有功且無用非所長之失則㳙埃之㣲或有補於萬分惟陛下留神省察與三數大臣圖之剛中又乞留曽開罷栁約召命上奏曰臣竊得於傳聞曽開罷禮部侍郎衆論疑惑開之所坐臣未得而詳也然聖恩從来優禮侍從未嘗輕有罷黜雖言章論數其短者猶委曲保全其去此開之罷所以人不能無疑每見人稱開厚重質實有文采論今日朝廷人物者必指為善𩔖宜無顯過得罪於清議也或謂止縁近日論議使事略有異同遂至牴牾獨臣以謂不然陛下聖度如天物物並受數降詔㫖謂今此通和之事無非審處中道務令經久可行固嘗許羣臣條奏利害一二来上陛下之心可謂酌人情而濟世者則開也雖有大同小異之見君父寧不諒其心乎謂縁論使事而罷者非也求其所以致罷者而弗得無乃開戇愚太甚有至妄發狂瞽之言聖人初有不能容者則開之罷疑或出於此也臣數日前嘗上䟽乞罷栁約召命未聞施行夫約之為人陛下當自知之事童貫而求其薦事路真官而問其術奸滛之事又詳於孫悟之妹其素行不待臣暴章之而後露也然如約者陛下猶欲􅋞拭而用之則如開者豈不能容忍而留之乎約之来陛下雖未必侍從之開之去陛下雖未必終忘之但朝路見一曽開去一栁約来進退人材似有可疑此衆論之所以惑也一曽開去便未損於朝廷恐如開者又或去焉則有損矣一栁約来便未累於朝廷恐如約者又或至焉則為累矣聖人虛心屈己禁萌於甚㣲而防患於甚久方今虜使逺来計議未定愛君憂國之人心魂夜悸謂禍福之幾皆在乎此是雖衆智交陳羣䇿並入原其用心皆為區區正當容納各領其意他日事成使論事者自懐無逺見之羞脫或不成陛下回思言者不至有悔如是可矣況陛下南渡以来聖徳日躋略無過舉如前日胡銓上書狂悖削吏籍而投荒宜矣然猶從大臣之請俯加原貸則開之罷臣誠有望於聖思焉武帝初不能堪汲黯之言其後則曰天子置公卿輔弼之臣寧令從䛕承意䧟主於不義乎故卒優容之此臣所以懇祈於天聽也臺諫天子以為耳目下有公論而不上聞則是耳目失其所司也臣忍為是哉縷縷之言期以報陛下而已矣上瀆天威罪當萬死惟聖慈幸赦之剛中又論久任良郡守上奏曰臣聞人君張官置吏欲其以實徳惠民而已官吏不能皆良而畏朝廷之責故虛文之弊由之以生臣頃以責實之說區區為陛下言之退而又為陛下求所以革虛文之道其莫如久任乎夫吏員之冗無如今日久任之說非所宜言而臣所謂久任者謂良郡守也郡守不良者易而去之一方之福其有安便風俗百姓信愛確然能布宣上意使實惠被民者大抵閱三數政而得一人輕為奪之為害多矣臣親見州郡長吏更易之際非但公私費耗迎送煩擾文書獄訟變移之弊為不可言徃徃上下茍且人情弛慢踰時未定既而長吏者至風俗不能周知利害不能徧察慮朝廷督辦有條茍不誕謾以紓一時之急則無以塞責況復遷延歳月得更易而去則其自為謀者善矣此所以忍為虛文而不顧也幸而得一良吏教令已孚績用方著朝廷亦何苦奪此而與彼乎謂欲以旌其能則増秩賜金之典可按而行也或謂臣曰守令之選既有成法今無􅃍易者矣如臣所聞或三兩月或半歲久者亦不至於成資而罷是法雖具有時而廢也前史謂忠良之吏國家所以為治也求之甚勤得之至寡臣願陛下申嚴成法重長吏之遷徙可乎令有治狀者亦可賜金増秩俟其終滿召用之未晚也聖人為官擇人不為人擇官陛下留意行之臣恐州縣虛文之弊自此可息右僕射吕搢奏曰臣自歴宦以来荷累朝黼扆之知兹者又䝉聖恩為臣比經艱難粗立功效擢寘宰輔臣敢不仰體眷禮優厚雖糜骨粉身亦恐未能圖報天地父母之徳茍有所見安忍不為陛下别白詳言之臣竊攷祖宗留意人才度越前代是以元祐間名儒鉅公相繼而出人亦各奮己長陛下聖學髙明博觀圖史此不能逃睿鑒矣惟是王安石首先變亂祖宗法度紹聖間章惇蔡京蔡卞兄弟之徒各快私意以忠為邪以邪為忠将元祐諸人累更竄逐衣食不繼殁于遐荒海嶠者甚多子孫禁錮貧悴異常人至于今寃之而惇輩忍為是舉豈不有負國家耶臣區區愚見今陛下六飛雖暫駐吳會然臣恭料宸衷仰思二聖之心瞻念陵寝恢復境土則未始一日而忘也如元祐諸人經隔歲月並未曽追復官職依條格合得恩數亦不曽給付雖其間有子孫族属縁兵火之後捨鄉里墳墓随車駕南来者甚衆然尚有淪䧟比界者亦多欲乞聖慈廓獨照之明廣好生之恵不以臣為僭率貸其狂妄将元祐臣僚命有司條具經遷責之人並例復元授官爵子孫合陳乞恩數照應格法放行庶幾南来之族無不感戴鴻覆之澤在比界之家亦知陛下懐思中原淪陷名臣之族痛念向来皆由姦邪誤國宗社播遷而一朝盡還其父祖官爵恩澤人非木石安得不銘佩陛下耶臣今所乞亦恐敵詐而叵測先將元祐之家子孫用之本朝則所失愈多後雖欲為亦無及矣更望睿慈不下臣此章只作聖意批出庻幾逺邇存殁皆戴陛下矣冒瀆天聰臣無任怔惶戰慄之至范宗尹嘗仕偽楚故凡受偽命者皆録用户部侍郎季陵上䟽曰前日士大夫名節不立論事者皆喜攻之瑕疵既彰不復可用縱加抆拭攻者踵来雖君相制命亦不能為之地臣試舉其罪大者言之崇寧大觀以来黨助巨奸由詭道以饕寵榮者不知幾何人邦昌亂朝不能死節者不知幾何人苖劉專殺拱手受制者不知幾何人以義責之固不容誅以情恕之亦不幸耳弄筆墨者文致其罪既得惡名誰敢引薦臣願明詔宰執於罪戾中選擇實能量付以事勿因一眚廢其終身仍詔臺諫為國愛人勿復言馮當可論守令銓選上奏曰臣竊謂於民至親莫如守令守令之選難得其人當今銓選所行並依格法格法所當與雖庸謬之資有司不得而奪格法不當與雖循良之才有司不得而與天下論者皆言欲救其弊莫若任人或使内外薦揚或令主者銓擇然風俗弊壊為日既久奉公竭節盖鮮其人或恐銓擇任情薦揚非實誠無益於救弊徒妄至於紛紜而已臣愚願陛下謹擇監司勿以輕授監司陛下耳目之臣也茍得嚴明督察之才風采一路黜陟其廉汚廢置其賢否下吏有所矜式小民有所告訴則雖萬里之外如在咫尺之前州縣非才誠非所患自軍興已後民力彫弊重以漁擾民愈不堪守令之多陛下豈能為民盡擇今天下監司不過數十人耳少加簡拔不患無才陛下付授之際徃徃亦将視其資格之髙卑不復論其人才之可否健者以趨期㑹為急懦者以不生事為賢至於刺舉精明使州郡望風畏縮者未之見也陛下愛民如子民國之本也守令虐民國之巨蠧也監司刺舉守令之精鑒也伏惟少留聖慮歴代名臣奏議卷一百四十三
