body:
  text: 歴代名臣奏議卷七十明楊士竒等撰法祖宋光宗時軍器少監兼權侍左郎官劉光祖上聖範劄子曰臣猥以虚庸待罪冊府伏見陛下引見羣臣若内若外各極所對不倦聽納臣於此時獲望清光雖欲竭其愚衷補報萬一而智慮踈短自度無以動悟淵聽使之收拾細故瑣瑣條列又非臣事君之本心臣竊惟朝廷法度無出祖宗太祖創業垂統太宗混一守成規模深遠成憲具在臣甞一二掇其故事伏而思之皆國家之宏圖天下之大慮臣謹隨事𩔖次分為十節名曰兩朝聖範首之以治兵之法謂兵者國之大事死生存亡之地不可以不思也國家二百餘年而將才絶少故次之以任將之道宰相者無所不統任社稷之憂者也於是以祖宗選任大臣次之選任大臣莫先於精擇侍從於是以祖宗除用侍從次之自古賢者在位能者在職各有其宜祖宗之時兩盡其用故又次之以才能之任人才之在天下初不乏也顧所以振作之選用之為如何耳故又次之以取人之方若夫愛惜名器甄别流品祖宗所以垂法度者如此賞不輕用罰不茍貸祖宗所以示勸懲者如此過則使諫事必先議祖宗所以達下情者如此是三者各為一條至於防微杜漸鑒前代之失塞禍亂之原凡祖宗之為萬世慮者臣則以是而終其說臣仰惟陛下臨御已二十年惟盛徳故能孝惟不息故能勤惟寡欲故能儉惟無私故能斷是以天人和同朝野少事陛下修身於九重之中湯之日新文王之純亦不已也然傅說之告髙宗必曰念終始典于學厥徳修罔覺監于先王成憲其永無愆臣每念之今陛下之學至於進修之久其心日純而其迹不見可謂至矣顧為治當有所法祖宗垂範近而易攷創守之際思之甚精傅說監于先王之言誠當今之要務也臣愚不佞初無千慮之一得可以仰裨聦明所有兩朝聖範謹繕冩上進致臣惓惓聖範一臣觀國家得天下不以兵而守天下以兵盖其親見五代之禍皆生於兵建都大梁非有四塞之固則其勢不得不恃兵以為守太祖皇帝聦明聖武未甞以私怒殺戮一人至於御兵紀律最嚴曾不少貸建隆元年荆罕儒與北漢戰于京土原罕儒戰沒太祖戮當時之不用命者黜二將斬其部下大校二十九人二年令殿前侍衛司及諸州長史閱所部兵驍勇者升其籍老弱怯懦者汰之於是初置剰員以處退卒又詔釋周朝鎮州諸縣弓箭手千四百輩以為徒費調給實不足賴此非身親戎行深曉軍事不能如此決擇之明也三年令搜索諸軍亡賴不逞者悉配海島姦猾斂迹是歳大閱西郊因謂近臣曰晉漢以来衛士不下數十萬然可用者極寡朕去其冗弱又親校其擊刺騎射之藝今悉為精銳之兵則太祖之於兵其簡練至矣甞選御馬直三十人𨽻郭進麾下與北漢接戰進以其退怯斬十餘人以聞太祖潛遣中使諭進曰恃其宿衛親近驕倨不禀令戮之是也乾徳三年雄武卒於都下掠人子女即命捕斬百餘人京城以安四年親閱殿前諸軍武藝不中選者三百餘人悉補外職五年索殿前承㫖不逞者百二十六人分配河東諸州開寳四年川班殿直撾鼓訴郊賞不得比御馬直太祖怒使人謂之曰朕之所與即為恩澤又安有例哉斬四十餘人餘悉配他軍遂廢其班時内臣李承進逮事後唐太祖因問以莊宗英武何享國不久也承進對以御軍無法威令不行賞賚無節所致太祖為之撫髀而嘆曰以兹臨御誠為兒戲也夫太祖豈獨於此少恩哉竭民以養兵恃兵以為國而軍政不立秪以召亂臣甞觀開寳末年親征太原諸班衛士扣頭争奮願出死力太祖曰汝曹皆我所訓練無不一當百所以備肘腋同休戚也我寧不得太原詎忍驅汝曹蹈必死之地乎皆感泣再拜然則太祖豈無故而戮人者哉後之言兵必以太祖為法則其明識深計不可以不察也聖範二臣觀本朝名臣不少而將才最乏徳業之佐過於漢唐爪牙之士不及前代雖以太祖創業之功其將帥之可稱者盖無㡬也然而任將之道則無加於太祖何以言之方太祖之得天下也内之禁旅則以太宗為殿前都虞候以掌之建隆二年太宗行開封尹太祖謂殿前衛士如虎狼者不下萬人非張瓊不能統制於是始自都頭擢瓊為殿前都虞候乾徳元年瓊死以楊義為之一日義暴疾失音太祖幸其第賜錢二百萬命義掌軍如故義雖不能言指顧之間衆皆禀令軍政肅然然則太祖之知人也亦異矣然自韓重贇罷而殿前都指揮使闕者凡六年乃以命義義時為殿前都虞候十一年矣權侍衛歩軍司事王繼勲恃恩驕恣奪其軍職命杜審瓊代之審瓊卒党進代之其不輕於委任盖如此也外之守邊則李漢超在關南馬仁瑀在瀛州韓令坤在常山賀惟忠在易州何繼筠在棣州以拒北敵郭進守西山武守琪守晉州李謙溥守隰州李繼筠守昭義以禦北漢趙賛屯延州姚内斌屯慶州董遵誨屯環州王彦升屯原州馮繼業屯靈武以備西戎或五六年或七八年或十餘年以至二十年不易也其専兵伐國則獨得曹彬一人以匣劍授彬而潘美等不敢仰視然彬之伐江南也許以使相為賞及還則曰汝為使相品位已極肯復力戰耶且徐之更為朕取太原因密賜錢五十萬王全彬伐蜀之後先黜其功既克金陵而後語之曰朕頃以江左未平慮征南諸將不持紀律故抑卿數年為朕立法今以克金陵還卿節鉞其為駕馭之略非英主不能也至於得將帥之死力則如觧所服真珠盤龍衣以賜董遵誨曰吾委遵誨方面不以此為嫌也為郭進治第視親王公主曰郭進控扼西山逾十年使我無北顧憂我視進豈減兒女耶二人聞之感極涕下夫太祖之任用將帥大略如此此其所以削平僭叛折衝禦侮而無安得頗牧之嘆也聖範三臣觀自古興王之君必有輔弼之臣起而為之謀太祖皇帝神武英略運天下有餘智既受周禪即其舊相范質等而用之不少疑焉盖前古未之有也質等練習朝廷故事沈厚精審太祖初得大器則與之共持而守之人心不驚天下自定質相踰年奏䟽曰宰相者以舉賢為本職以掩善為不忠呂餘慶趙普富有時才精通治道每因款接備見公忠是宜授以台司俾申才用太祖嘉納其言後二年質等罷政遂相趙普於是大謀大慮普得叅之普初以吏道聞寡學術太祖每勸以讀書普由是手不釋卷君臣之間講學求治汲汲如此普獨相凡十年沈毅果斷以天下為己任故太祖甞叱雷徳驤曰鼎尚有耳趙普吾之社稷臣也其後凡再相太宗一日奏䟽薦張齊賢曰防微慮逺必資通變之才定難扶危宜退諂䛕之輩即今同僚共事無非謹畏清亷唯於獻替之時並執謙恭之禮稍存緘黙寧濟急須張齊賢頃年特受聖知升於宻地公私識者咸謂當才歳月未多出為外任向来微有傅聞或云奏對過當凡言大事須有悔尤其如義士忠臣不顧身之利害齊賢如當重委必立殊功於是太宗復召齊賢為樞宻副使普之識慮深切盖如此也當普之再相也與呂蒙正並命而蒙正質厚寛簡不為黨比遇事敢言普甚推許之蒙正亦凡再相太宗太宗甞欲選人使朔方蒙正退以名上太宗不許他日又問復以前所選對復不許他日又問益急蒙正終不肯易其人太宗怒投其奏於地曰何太執耶必為我易之蒙正徐對曰臣非執盖陛下未諒耳臣不欲用媚道妄隨人主意以害國事乃搢笏俛而拾其書徐懐之而下太宗退謂左右曰是翁氣量我不如已而卒用其人號為稱職方是時也太宗可謂得任相之道矣蒙正後罷遂相呂端端持重識大體方奏事時同列多異議太宗一日内出手札曰自今中書事必經呂端參酌乃得奏聞其後真宗之立不為王繼恩等所變則端之力也夫祖宗時宰相之任遇如此然趙普自樞宻升宰輔出入三十餘年未甞為其親屬求恩澤蒙正與端清浄寡欲號稱賢相當時無譏後世不議君臣之美兩盡其極此足以為法也聖範四臣甞論國家欲宰輔得其人必自擇侍從始左右皆正人也就而選焉其得之必多左右皆非正人也就而選焉其所獲可知也已臣觀太祖一日謂宰輔曰北門深嚴當擇審重者處之范質以為清介謹厚無若竇儀者太祖曰禁中非此人不可卿當喻朕意勉再赴職劉温叟為中丞者十二年太祖難其代温叟卒於官太祖曰必得純厚如温叟者乃可命也先是有張去華者自訴久次欲與知制誥張澹較其詞文之優劣澹雖黜而去華自是凡十六年不遷梁周翰頗有文辭太祖欲用為知制誥周翰微聞之遽上表謝太祖復薄其人不與也至於太宗擢用侍從得人最多竇偁為開封府判官面折賈琰之䛕太宗為之不樂而罷酒及即位思偁召為樞宻直學士已而大用之曰以卿甞面折賈琰賞卿之直也一日用李穆呂蒙正李至並參知政事張齊賢簽書樞宻院事穆等入對太宗謂之曰朕為官擇人惟恐不當今兩制之臣十餘皆文學適用操履方潔穆居京府尤號嚴肅故兹奨擢盖推公也當是時也左拾遺王化基抗䟽自薦太宗覽之謂宰相曰化基自結人主誠可賞也因曰李沆宋湜皆佳士即命中書併化基召試並以為知制誥焉甞謂左右曰詞臣之選古今所重每命一詞臣則必咨訪宰相求才實兼美者先召與語觀其器識然後授之甞詔諸王府僚各獻所為文閱視累日問近臣曰其才則見矣其行孰優或以畢士安對曰正合朕心遂令掌制也范果數致書宰相求入翰林為學士太宗惡其躁競終不使居内職出知濠州而以畢士安為之執政言張洎文學久次不在士安下太宗曰第徳行不及耳執政乃退後又甞欲召和㠓為之已而曰㠓眸子眊眊胷中必不正不可以居近侍也其後乃使錢若水為之寇準甞以直史館承詔極言北邊利害太宗器之謂宰相曰朕欲擢用準當授何官宰相請用為開封府推官太宗曰此官豈所以待準耶復請用為樞宻直學士良久曰且使為此官可也準尋大用呂端自以前事秦王又事許王皆有罪當黜太宗曰朕自知卿已而亦用為樞宻直學士端尋復大用又召向敏中於廣南一日御飛白書敏中及張詠姓名付宰相曰此二人名臣也朕將用之乃並以為樞宻直學士然則祖宗選用從臣可為後法而太宗之際盛矣盖至於真宗仁宗時宰輔多有拔擢之餘也聖範五臣又甞論人才不可以一偏取優於徳行則為賢優於才智則為能國家兼收而並蓄之無遺才無廢事然後為御之得其術也臣觀太祖器使才能之士皆足以鼓舞而興起之侯陟為寃句令以清幹聞即擢左拾遺知縣事其後又命陟監本縣屯兵未浹日又命為淮南轉運使周渭者為白馬縣主簿縣大吏犯法渭即斬之太祖竒其才擢右賛善大夫知永濟縣而符彦卿憚之初下興州渭通判州事斬一軍校戍卒不敢肆太祖壯之詔嘉奨焉方是時也蜀平未㡬太祖命安守忠者撫和漢中復自漢中命為廣漢刺史太祖每遣使必戒之曰安守忠在蜀能自律已汝見當效其為人又命辛仲甫權知彭州謂之曰蜀土始平爾有文武才幹是用命爾也後將用兵於嶺南以王明為荆湖轉運使王師南伐明知廣南轉運事嶺道險絶兵食給足每下郡邑收其版籍固守帑廪參預軍畫師以有功太祖嘉之自右補闕擢為祕書少監領韶州刺史其後問宰相趙普曰儒臣中有武幹者何人普以辛仲甫對乃徙仲甫為西川兵馬都監召見謂曰汝見王明乎朕已用為刺史汝頗忠淳若公勤不懈不日亦當為牧也因謂普曰朕今選儒臣幹事者百餘分治大藩縱皆貪濁亦未及武臣一人也先是考功郎中段思恭甞有功眉州太祖召思恭赴闕乃詔之曰馮繼業言靈州非蕃帥主之戎人不服意謂非我它人不能治也汝能治之乎思恭曰謹奉詔太祖壯之復謂曰唐李靖郭子儀皆出儒生立大功豈於我朝獨無人耶思恭既視事悉心撫綏夷落安静周訪利病多有條奏甚得吏民之情以是觀之太祖可謂明於知人善於任使矣有李符者知歸州見轉運司置制有不合理者符即上言太祖嘉之秩滿歸闕即命符知京西轉運事且書李符到處如朕親行八字以賜之令揭於大旗以自随符前後條奏便宜凡百餘事其四十八事皆施行之復著于令又有梁夢昇者知徳州繩刺史以法刺史以事告太祖親信史珪者圖去之珪悉記于紙伺便而言太祖一日從容言邇来中外所任皆得其人珪遽曰今之文臣亦不必皆善因探囊中所記以進曰秖如梁夢昇權知徳州欺蔑刺史郭貴㡬至於死太祖曰此必刺史所為不法夢昇真清强吏也取所記紙召一黄門令齎付中書曰即以夢昇為賛善大夫既行又召還曰與左賛善大夫仍知徳州而珪乃不敢言范質之子旻先知邕州甚有治效其後太祖令管當淮南諸州并淮北徐海沂等州水陸計度轉運公事謂旻曰朕委卿以方面凡除去民隐漕輦軍儲悉許便宜從事不用一一中覆也許仲宣亦太祖時所用者也至太宗時王師征交州周渭仲宣並為轉運使有敗卒奔還掠民財物渭捕而戮之後至者悉令觧甲以入而仲宣便宜班師不竢報詔嘉奨之凡太宗之委用能臣悉本太祖用范旻知兩浙諸州以李符知開封府以辛仲甫知益州當是時也陳恕奏三司姦弊即擢恕與侯陟王明同判三司則太宗之所用多太祖之人也又有如李維清者王濟者任中正者皆公平辦職而柳開等以文臣知兵換秩赴功夫祖宗之用人如此率皆精强幹治忠實不欺盖非憸巧之徒行險而僥倖是以事立而民安也聖範六臣甞伏思天下之事變無窮而人才為有限每不足以給天下無窮之事變此古今之所通患也然而嚴為之法不若廓為之途譬之水焉壅則腐敗決則䟽逹臣觀太祖皇帝建隆三年詔翰林學士文班常參官曾任幕職州縣者各舉堪為賔佐令録一人聽其内舉而坐以失舉之罪乾徳二年又詔制舉三科不限内外職官前資見任布衣黄衣並許直詣閤門聽其自薦是歳又詔吏部南曹自今常調赴集選人取其歴任有課績無闕失而其人才可副升擢者具名送中書門下引驗以聞量才甄奨盖太祖慮失銓衡之職止憑資歴而英俊或沈於下僚故也五年又詔諸道節度使㽞後觀察使各舉部内才識優長徳行尤異者二人防禦團練刺史各舉一人當是時也太祖親試取士抑權貴之僥倖開孤平之進取是以太宗即位之始思欲廣振淹滯則謂侍臣曰朕欲博求俊乂於科塲中非敢望㧞十得五止得一二亦可為致治之具矣於是進士得呂蒙正以下一百九人而甲乙之科悉為監郡宰相言取人太多用人太驟而太宗不之顧也蒙正等辭又特召令升殿諭之曰到治所事有不便於民者疾置以聞由此觀之祖宗創守之初思得多士布列中外其選拔盖如此也其後太宗或詔從臣或詔監司或詔州牧或詔四品或詔五品各令舉人甞謂宰相曰國家選才最為切務人君深居九重何由徧識必須採訪茍稱善者多即是操履無玷若擇得一好人為益無限甞詔李昉楊徽之等十一人舉三司判官及轉運使各一人又詔蘇易簡陳恕魏庠寇準趙昌言等各舉堪任京官二人又詔左司諫呂文仲等九十七人各舉五千戸以上縣令二人當是時民務豐庶天下少事太宗聽政之暇悉索兩省兩制清望官名籍閱朝士有徳望者悉令舉官他日又謂呂蒙正等曰求賢之要莫若責之舉主因詔蒙正以下至知制誥各舉有器業可任以事者一人他日有司奏諸州闕官五十餘員又詔尚書左丞李至等八十四人舉亷恪有吏幹者各一人補之因謂宰相曰卿等職在掄才今令朝臣舉官已為逐末茍更不擇舉主何以得人至哉斯言可謂得取人之要矣王禹偁羅處約皆東南一縣令耳聞其名並召而試之擢為直史舘錢若水同州推官耳聞其事亦召而試之又擢為直史舘夫太宗之選用庶僚也皆引對而觀之時加超擢焉然又慮其矯節冒進也則復送中書門下考其履歴而進退之故甞與呂蒙正言曰治世無事人才難知蒙正對曰迭試事任則能否洞分人之善惡終不能掩久則彌著茍暫聞善惡或渉愛憎恐悮任使故必久而察之則賞罰無濫太宗善之以是而觀則當時羅網天下之士取之若易而試之則精夫太宗之作人非特為一時之用也自是皆砥礪洗濯彬彬軰出矣聖範七臣聞名器不可以妄假而流品不可以私狥毋為之漸其勢將長毋為之基其事將成是以祖宗於紀綱法度維持之際不敢少壊其隄防者所以為後世慮也臣觀太祖皇帝開寳中詔流外選人經十考當入令録者必引對乃得注擬至於驅使散官伎術之流資考雖多不在注擬之限其後教坊使衛徳仁以老請外官援同光故事求領郡太祖曰用伶人為刺史此莊宗失政可效之耶宰相擬上州司馬太祖曰上佐乃士人所處資望甚優亦不可輕授此軰但當於樂部遷轉耳太祖一言而世守以為法太宗皇帝時有陳舜封者父為伶官以罪黥流後舜封舉進士及第為縣主簿轉運使言其通習法律宰相以廷評授之因奏事言辭㨗給舉止𩔖俳優太宗問誰之子也舜封自言其父太宗曰此真雜𩔖豈得任清望官盖宰相不為國家澄汰流品於是遂以為殿直也先是中書吏有以舉學究及第者已而太宗知之令追奪所授勅牒勒歸本局謂侍臣曰科級之設待士流也豈容走吏冒進因下詔禁絶之至道二年中外官以郊祀當進秩有白州刺史錢昱者始自吳越歸朝自陳甞習文藝求改秩除祕書監後遷工部侍郎已而連試郡無善政至是太宗謂宰相曰錢昱貴家子無檢操不宜任丞郎乃以為郢州團練使於是宰臣等言覃慶推恩南北省及憲官不可以它官循資遷授惟登進士第有文學者可膺是選也又詔伎術官見任京官者自今遇慶澤但加勲階不得擬常參官而諸科登第者所選官亦不得與進士比其嚴如此初五品以上官任子皆攝太祝太宗謂宰相曰膏粱之族子孫任者多至四五人而覃慶之際中書又皆授以攝官未㡬即補正員不下數年遂通朝籍此其弊政亟宜革之詔自今止賜同學究出身準法選集當是時也國家甚强中外和樂優恩濫秩未甚有害而太宗聦明守太祖之遺意君臣之間講求裁節不以天下之私情輕壊國家之公器然則朝廷之上所宜推此𩔖以行之塞僥倖之門開公正之路而誰敢不聽也聖範八臣甞論人臣食君之禄任君之事因事而有勞則人臣所當然之分也食君之禄任君之事因事而有罪則所不當然之分也分之所當然何賞之可幸分之所不當然何罰之可貸臣觀祖宗之用賞罰也非可勸之功則不賞非可議之罪則不貸臣甞攷之建隆二年導閔水與蔡水合貫京師南歴陳潁逹夀春以通淮右命右領軍衛上將軍陳承昭督丁夫數萬以治之浚五丈渠自都城北歴曹濟及鄆以通東方之漕命給事中劉載督丁夫三萬以治之又命陳承昭於京城之西夾汴河造斗門自滎陽鑿渠百餘里引京索二水架流于汴東匯于五丈河以便東北漕運此三役者史不書其賞也後數月又命承昭塞衛滑決河役成賜錢三十萬不聞賞其官也乾徳元年又命承昭鑿池於朱明門外引蔡水注之造樓船百艘以習水戰二年又命承昭鑿渠自長社引潩水至京合閔河閔河之漕益通四年河決滑州詔殿前都指揮使韓重斌馬歩軍都頭王廷乂等督士卒丁夫數萬人治之開寳元年增修京城又詔王廷乂䕶其役凡此數役者史不書其賞也是歳大内營繕俱畢亦不書其賞也五年河大決澶州𤼵諸州兵及丁夫凡五萬人塞之命蔡州團練使曹翰往督其事未㡬河所決皆塞亦不書其賞也太祖時征伐諸國兵器精甚後世莫及也當是時獨委一魏丕掌之自初即位授丕作坊副使丕在職甚盡力居八年始遷正使至開寳末仍典作坊而始以丕領代州刺史也然則太祖時人臣盡瘁事功如此而賞不可妄得非太祖寡恩也人臣分之所當然而一一賞之則人心惟有幸賞耳將皆以奔競得之而賞不足以勸矣至其用罰也臣又甞考之建隆二年内酒坊火工徒突入三司太祖怒以酒坊使左承規副使田處岩縱其下為盜並棄市館陶民訴括田不實本縣令程迪決杖流海島而給事中常準括田使也奪兩官免之謫本縣令李瑶以括田受賍而右賛善大夫申文緯受詔按田不之察瑶杖死文緯除籍為民也二年右衛率府率薛勲掌常盈倉受民租槩量重詔免勲官流徙之當是時也在官犯賍者雖去官已久而事覺猶坐非太祖深於用法也人臣分之所不當然而一一貸之則人心惟有幸免耳將皆貪暴殘民而罰不足以懲矣在太宗時其用賞罰也亦然淳化元年採訪使言知白州蔣元振清苦勵節民便其政秩滿遮轉運使乞㽞凡七八年不得代太宗嘉嘆乆之詔賜元振絹三十匹米五十石而已又言知須城縣姚益恭不施鞭朴境内大治民數千人三遮轉運使乞㽞惟恐其去亦賜絹三十匹粟二十石耳當是時以勞増秩者鮮矣至殿直李諤坐監牧許州盜官菽一百五十石馬死者千五百疋則械送闕下并内侍梁守忠及主吏三人悉斬于市太宗之懲􅂍吏也未甞少貸少府監請配役人郭冕等九軰昔任京朝官會赦當叙太宗曰冕等􅂍吏不可復齒仕籍止令釋遣之吏部選人以郊赦免選悉集京師太宗曰並放選則負罪者幸矣無罪者何以旌勸乃令經停殿之官守常選也夫太祖太宗以賞功罰罪為政令之紀綱是以賞行而人知勸罰行而人知懼雖其後累聖相承率本忠厚然而賞必加有功罰不失有罪雖重輕不同而其歸一也聖範九臣聞天子者當以天下之目視以天下之耳聽以天下之口使言以天下之心使思然後利害畢逹休戚畢陳善善惡惡是是非非然後可以不亂太祖皇帝神聖豁逹不自掩盖初詔五日内殿起居百官以次轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦咸許采訪以聞仍須直言其事不在廣有牽引或事關急切則許非時詣閤上章此建隆三年詔也乾徳四年又詔曰國家選用時才參掌邦計貨泉所聚職任尤繁所冀得人俾各陳力雖思不出位勿侵官局之權而知無不為共濟公家之務或綱條有所未正利害有所未明正期開善以相規安可不言而自守自今三司使所行事或未當本判官並應執諮所執理明而三司使不從則許面奏或事有已經敷奏獲㫖施行而未通便亦許指陳若本判官避事不言許它部判官及逐路轉運使直具利害聞奏其或因而更改頗協便益並充課績若明知利害循嘿不言則殿罰随之由是觀之太祖皇帝時直言得失不為訕上明辯是非不為侵官所以盡事理而究下情也至太宗皇帝在位田錫以進諫為己任太宗以納諫為盛徳方錫為盧多遜所不恱出為河北南路轉運副使也因入辭進封事論軍國要機者一朝廷大體者四太宗賜詔答之且云自今有所見聞無辭獻替其後復自相州上䟽言方今筦𣙜貨財網利太宻躬親機務綸㫖稍頻復有未喻聖意之事三奏請可行之事二其後又自睦州上䟽曰近陛下有朝令夕改之事由制敕初行時有未當而無人封駁者給事中之過也陛下有捨近謀逺之事由言動所為未合至理而無人敢諫諍者是左右拾遺補闕之過也又曰加以時久升平天下混一致陛下謂升平自得資陛下以功業自多日遷月移浸成聖性左取右奉無非睿謀又曰臣下言之則謂之封章陛下行之則出為法令法令可簡而不可使繁制度可久而不可屢變變易不定是彰思慮之不精繁多難依是令手足之無措其後入為知制誥復奏䟽論邊事曰今之禦戎無先於選將帥既得將帥請委任責成不必降以陣圖不須授之方略又曰前年出師命曹彬以下欲取幽州是矦利用賀令圖之軰惑悮聖聦陳畫謀䇿而宰臣昉等不知去年招致義軍劄配軍分宰相普等亦不知之豈有議邊陲發師旅而宰相不預聞今宰臣普三入中書再出藩鎮人所具瞻事無不歴乞陛下以軍旅之事機宻之謀悉與籌量盡其機畫此乃國家大體君父至公又曰以臣所見小小公事不勞陛下一一用心若以社稷之大計為子孫之逺圖則在乎舉大略求將相務帝王之大體也錫前後所陳深切載在史冊足以彰太宗受言之美方是時也太宗以補闕拾遺時多循嘿失建官本意於是改為左右司諫左右正言俾職業之是修期名實之相副其後右正言謝泌數奏章論時政得失太宗嘉其忠藎擢左司諫賜金紫并錢三十萬泌一日得對便殿復面加賞激泌謝曰陛下從諫如流故臣得竭誠昔唐末有孟昭圖者朝上諫䟽暮不知所在前代如此安得不亂太宗動容久之夫祖宗聖徳豈羣臣之敢窺而其樂受忠諫無一善之不録然則舍已從人固堯舜之所以為大也聖範十臣甞謂自古禍亂之萌有三而宗社之本有一强臣擅兵外戚預政中常侍用事三者皆前古禍亂之萌也付託神器厚重而深固一者宗社之本也祖宗時窒其萌而培其本臣請得歴言之太祖皇帝既誅李筠等一日召趙普問曰天下自唐季以来數十年間帝王凡易八姓戰闘不息生民塗地其故何也吾欲息天下之兵為國家長久計其道何如普曰陛下之言及此天地人神之福也此非他故方鎮太重君弱臣强而已今所以治之無他竒巧惟稍奪其權制其錢榖收其精兵則天下自安矣時石守信王審琦等皆太祖故人各典禁衛普乗間數言之請授以它職太祖曰彼等必不吾叛卿何憂普曰臣亦不憂其叛也然熟觀數人者皆非統御才恐不能制服其下茍不能制服其下則軍伍間萬一有作亂者彼臨時亦不得自由耳太祖悟於是召守信等飲酒酣喻以安危禍福之理明日皆稱疾請罷於是乃漸消藩方之權收其精兵聚之京師國家二百餘年無强臣擅兵之禍者由制之得其道故也杜太后聦明有智度毎與太祖參決大政杜審瓊太后之兄也與其弟審肇審進家于常山太后無恙時審瓊甞入見置酒萬歳殿上太祖與太宗以元舅故皆捧觴列拜稱夀其尊禮不過如此而已昭憲升祔且一年始悉召赴闕皆命為大將軍然並致仕賜第京師其後特命審瓊代王繼勲軍職耳未甞及以政也國家二百餘年無外戚預政之禍者亦由制之得其道故也太祖時左右内臣不過五十餘員止令掌宮掖中事或不得已銜命而出止令幹一事不得妄採聽他事奏陳又詔年三十以上聽養一子所以裁之者至矣至太宗時王繼恩以平賊之功中書議欲以為宣徽使太宗曰朕讀前代史書多矣不欲令宦官干預政事宣徽使執政之漸也止可授以它官宰相懇言繼恩功大非此不足以賞太宗怒深責宰相因别建宣政使名以授之先是通進銀臺司𨽻樞宻院凡内外覆奏文字必關二司然後奏御外則内官及樞宻吏掌之内則尚書内省籍其數以下有司或行或否莫得而糾察也太宗始詔宣徽北院㕔事為通進銀臺司命向敏中張詠同知二司公事然則祖宗之良法美意所以杜中常侍用事之漸又如此也三者皆自古禍亂之萌而太祖太宗深思逺慮逆塞其原至於付託神器厚重而深固又足為萬世之法且太祖藏誓書於金匱之事非漢唐之君所能及也至於太宗初置皇子侍讀其後又為諸王及皇子府初置諮議翊善侍講等官以王適姚坦邢昺等十人為之甞謂宰相曰近有人上章言及儲貳者國家宗祀豈不在心朕於諸子常加訓勵今寮屬悉擇良善之士至於輿臺皂𨽻之軰並朕親選不欲令姦憸佞人在左右更待三五年後各漸成長朕於處馭必使得宜也其後以夀王為皇太子喬維嶽楊礪為諭徳楊徽之畢士安為庶子李至李沆為賔客賔客見太子如師傅之儀太子見必先拜動皆諮詢焉京師之人見太子者皆喜躍曰真社稷之主也夫祖宗知天下之本在此察天下之禍在彼是以防微杜漸深計而極慮之也蔡戡上奏曰臣聞堯𫝊之舜舜𫝊之禹皆曰允執厥中書賛舜曰重華協于帝賛禹亦曰祗承于帝堯舜之所𫝊舜禹之所承莫非一道故堯舜為五帝之盛帝大禹為三王之顯王後聖有作不可企及恭惟髙宗皇帝茂建中興勤勞三紀親以天下授之夀皇聖帝夀皇嗣守丕基勵精二十有七年親以天下𫝊之陛下陛下父子相繼揖遜相承又非堯舜禹所能比擬亘古未有可謂盛矣三聖授受之際心𫝊之妙愚臣不可得而聞竊讀隆興詔書有曰凡今日發政施仁之目皆得之問安視膳之餘乃知夀皇動以髙宗為法然則夀皇之治又陛下之所當取法也夀皇誠心愛民出於懇惻凡有水旱尤軫聖懐如捄焚拯溺唯恐或後不吝倉廪府庫以賑濟之勤䘏民隐視之如傷此夀皇之仁也夀皇奉事北宮孝敬曲盡朝以五日嵗時躬率百寮親奉玉巵上千萬夀以侈大慶自奉甚薄極天下以為養猶懼不至此夀皇之孝也夀皇勵精為治毎日視朝未甞暫廢親覽章牘朝奏夕報不時宣召儒臣講論經理詢訪治道此夀皇之勤也夀皇以儉約先天下在位日久宮室苑囿無所増益飲膳服御悉從裁損知天下之賦租乃生民之膏血未甞妄費濫予此夀皇之儉也夀皇遴選將帥分任邉閫講明軍政簡練師徒蜀道地最重去朝廷最逺尤切西顧曩甞闕師亟命大臣鎮撫之責以近期星馳而往所以修武備重邉寄者如此夀皇待遇臣鄰黜陟有序進退有禮縱有顯惡必待人言洊至然後譴斥與衆共之示天下以至公所以勸臣下勵風節者如此夀皇奬借言者導之使諫其人未必皆賢所言未必皆是夀皇不憚舍已而從之所以廣言路振紀綱者如此夀皇愛惜名器不以假人凡有除授未合公論給舍繳駮無不聽從所以吝爵賞抑僥倖者如此夀皇聖政載之簡牘播之天下不可具舉此數者其大要也臣願陛下深念夀皇付託之重凡事親修身立政用人一以夀皇為法則三聖之治如出一轍𫝊之無窮施之罔極於舜禹有光矣實惟宗社無疆之休天下幸甚戡又上奏曰臣聞事有見於載籍者不若𫝊聞之詳得於𫝊聞者不若親見之審祖宗之政布在圖史斑斑可考然未若孝宗之治陛下之所親見孝宗聖政天下能誦之難以悉舉凡事親修身立政用人皆可為萬世子孫家法陛下嗣守丕基遵奉成憲罔敢墜失孝宗所以貽厥孫謀陛下所以繩其祖武者可謂兩得之矣太上皇帝在位未久率循舊章然髙世之行有二自古甚盛徳之主鮮能及之太上馭下以嚴未甞假以詞色凡有小過必加譴逐人人重足而立不敢撓法干政紀綱整肅中外清明此太上之義徳也太上聖度包荒容受直諫雖犯顔逆指自敵已以下不能堪者太上怡然受之不以為忤未甞罪一言者此太上之容徳也二者可為法於萬世抑又陛下之所親見臣願陛下動法孝宗至如太上皇帝馭下納諫之美尤當守而勿失則三聖之治如出一轍傳之無窮施之罔極於祖宗有光矣實惟宗社無疆之休元世祖時趙天麟上䇿曰臣聞繩祖武以受天祜者武王之繼於文也兼三王以施四事者公旦之忠於周也髙宗之命傅說曰迪我髙后以康兆民仲尼告之曾子曰無念爾祖聿修厥徳何祖宗之皆可法而子孫之不敢忘哉盖祖宗所以立業子孫所以守成立業者須備於三理四維守成者亦須備於三理四維故也夫道不足以御天下之衆豈能得天下哉徳不足以一天下之心豈能服天下哉仁不足以博天下之施豈能安天下哉志於道據於徳依於仁此之謂三理然後行之以乾健柔之以坤順鼓之以震勇和之以咸感此之謂四維理以理之維以維之乃能立萬世子孫帝王之業也或者以平亂右武持盈右文攻守非一途動盪有萬變執陳迹以調政者猶膠柱而調弦拘舊章而求治者如刻舟而求劒將致弦不可調劒不可求而勞心無益也臣竊以為不然臣之所言者理也彼之所知者事也自萬事之殊而歸乎一理之同豈有不合者哉我聖朝太祖之立業也英雄入彀俊乂圖功駕福氣以長驅燦天光而下照强梁之子噤氣吞聲悖逆之徒糜軀碎首禮以定慶賞義以制刑罰慶賞以厲功能刑罰以加非辟上順天時下協人欲凡此皆志於道也金行既墜水運方来冠一家天子之先王應四海人民之嘉會風塵未息雨露常濡已服者返舊業而安居未服者不得已而致討凡此皆據於徳也袖攜三尺力拯群生奮遐方沙漠之龍庭居歴世帝王之封域雖未暇並襲其禮樂然莫非暗運於權衡貽厥孫謀面稽天若凡此皆依於仁也而又不遑啓居居甞戒飭握乾符而大有緫師衆以同人翼翼䕫夔兢兢戰戰豈非健乎逹宜處事捨已從人不先事以啓後悔之門不後時以虧先見之哲豈非順乎果於濟世信於立言符契有結繩之淳風戈甲有無敵之利用豈非勇乎恩波旁溢化日髙明方其道行也聖心開江北之區及祚盛也神孫定江南之地七八九六無思不服億兆三千惟時各遂豈非感乎伏望陛下永言孝思孝思維則保太平之廣業覽聖祖之宏規布于方維宣昭令典頒諸史舘庸播皇風移向時平亂之端為今日守成之具以極天下之望以盡陛下之孝不亦可乎道以修身徳以御世仁以撫民健以遷善順以理性勇以改過咸以結人三理理乎内四維維乎外宗廟常享其祭陛下常奉其祀卿士常守其職小民常託其庇非但遹追来孝亦所以垂裕後昆也仁宗皇慶元年翰林學士承㫖劉敏中上奏曰臣某等言盖聞人臣以報國為忠効忠以進言為先況臣等以衰暮之年遭逢聖運首膺寵召過荷異恩不有一言將何以報竊惟天育萬物不能自理付之天子天子理萬物不能獨為付之中書中書所以行天子之令而裁理萬物者也其事權不可不専猶慮有缺焉於是置御史䑓執憲以繩之繩之者所以成之也其紀綱不可不振茍中書之事權不分憲䑓之紀綱不沮天下無難事矣故聖王無為無為者得其要也其要柰何省䑓是已臣等前陳八事既甞言之矣欽惟皇帝陛下聦明知睿出于生知寛仁慈愛發乎至性爰自潛邸至踐東闈再剪巨姦一匡宗社其規摹注措固已有在矣即位之日遵述世祖皇帝成憲頒降明詔播告天下丁寧切至聞者感動其於利民去弊之道至矣盡矣至謂除樞宻院御史䑓徽政院宣政院各依舊制其餘諸衙門及近侍人等敢有擅自奏啓中書政務者以違制論又至元三十年已後諸衙門改陞剏設并多餘貟數非世祖皇帝之制者從省䑓分揀減併降罷詳此二條聖意之所以假權中書畀重憲䑓者昭然可見何者急於圖治耳是以中外拭目欣覩太平然臣等愚謬過計猶有不得不冒罪為陛下言者夫欲得而患失與喜而奪悲人情之所同也今當分揀減降之始其患失而悲奪者為不少矣慮或萋斐之言伺便而入浸潤膚受謗歸省䑓倘省䑓一揺政本随易必至上煩聖慮下紊諸司在於逺圖所繫甚大伏願陛下𢎞乾坤之量廓日月之明謹更始之方守已頒之制提綱挈要確然不移使微漸之萌宻遏潛弭如此事權自一紀綱自振庶政萬㡬不勞而理陛下雍容髙拱坐撫至治享萬斯年無為之樂臣等之願也干冒天威不勝恐懼歴代名臣奏議卷七十
