body:
  text: 歴代名臣奏議卷二百三十七明楊士竒等撰任将宋仁宗景祐元年通判絳州富弼上奏曰臣聞漢拜韓信舉軍驚笑蜀用魏延羣臣觖望盖富貴易為善貧賤難為工也北齊段孝元云持大兵者如擎盤水傾在俛仰間一致蹉跌求止豈得哉魏元忠曰今朝廷用人𩔖取将門子弟亦有死事之家而䝉抽擢者此本無幹略趙奢之子括少時學兵法以天下莫能當甞與其父奢言兵事奢不能難然不謂為善其母問奢何故曰死地也而乃易之趙若以為将破趙軍必此兒也後果有長平之敗而趙遂弱今不預選将以備不虞臨事而遣是易之之甚也古者命将君跪而推轂曰閫以内寡人制之閫以外将軍制之又賜以斧鉞使得專政且用兵之道主於威而輔以權變若不得專則威挫而權變滯矣且君不可制況令閽寺之賤監督之使舉動不舒羈扵俯仰而望成其功雖甚愚者亦知其難矣古之試良将者亦問以䇿夏商時只命六卿未聞卒然命介胄武夫可以集事者也王者治天下唯二柄文武之謂也大槩文以飾治平而武以靖禍亂然亦相交為用故孔子曰有文事者必有武備國家文既富矣武未甚備臣請為陛下陳之臣聞歴世為天下所患者外邊釁而内姦雄三代以降歴秦與二漢南北十朝唐及五代其危亡宗社無不出乎邊釁與姦雄也今北敵結好西戎請吏誓若皎日藏在天府邊釁之患姑未慮也若夫姦雄則無世不有但觀世事何如爾政教宣達民心和樂天時豐茂國用充實則姦雄不得志扵是蓄鋭而退或在畎畆或在商賈或在戎卒或入仕宦或薄㳺四方政教虧損民心􅄐貳天時凶殺國用蹙乏則姦雄得志乗釁而動出農賈奮戎卒棄仕宦起薄㳺横戈一呼羣怨嘯聚陵斥郡邑揺亂區夏小則有割據之患大則致傾亡之禍然禦之有備救之有術未始不由兵也兵之勝敗國之存亡未始不由将也将得其人則安國常安危國復振失其人則安國致危危國遂滅故孫武曰将者人之司命國家安危之主也司馬法曰将不預設亡以應卒太史公曰且欲興聖綂惟在擇任将相晁錯曰君不擇将以其國與敵也伏惟陛下承累聖之業撫乆安之運謂兵已戢謂将無用謂天下不足憂臣甚惑焉故敢以上之四事為請昔者荘憲太后稱制明不外照蔽於近習庶政大擾紛然無紀荘憲既往陛下一更大變逐宦寺罷女謁邪路既絶群綱漸整求讜直之士納諫諍之説臣謂革荘憲時弊事則美矣若夫紹祖宗之遺範考治世之徽烈則陛下試自審政教果無虧損者乎此一也國家用度至廣規求無莭賦税過太半之暴徭役有竭作之苦民本無求於公盖自出貨力耕田鑿井以養父母妻子而百計歛之攘肌刺骨及有不足窘於飢凍則未聞開倉廪以賑卹不惟賑卹無所又從而鞭扑以求苛殘之賦縱或假貸多不及時皆流徙餓殍之餘是有假貸之名而無其實四方愁怨别求生路則億兆民心果無離貳者乎此二也前二年江淮蟲旱水泉皆竭民十死八九今年京東西河北河東闗右兩川蟲旱一如江淮但死者差少然至今未息是舉海内盡罹其害荒儉之極近世以來未之有也城邑虚廢荆􅁄徧野物價翔貴人無榖色天時如此陛下以為果無凶殺者乎此三也古者國有九年之蓄曰足無六年之蓄曰急無三年之蓄者謂國非其國今天下郡邑除備邉數郡其餘率無三年之蓄甚者不能備一二年國家居常小有費用必命主計者斡旋移用始可以足今年京東大歉發使詣江淮括三十萬糧以賑之江淮凶歉固已最甚彼自不足安有羨利以及扵它哉今幸天下寧敉無干戈之費但賑救飢殍尚已求縠扵空虚之地若不幸干戈蹔擾舉十萬之衆日費千金即不知使執事者何從而得之國用如此陛下以為果無蹙乏者乎此四也臣謂四者既如是則隙開釁露今之姦雄已得志矣但未動爾設或一旦有出畎畝捨商賈奮戎卒棄仕宦起薄㳺乗凶荒之嵗率怨咨之民屯結山林焚蕩邑屋陛下直扵此時始欲遣卒命将禦宿謀之寇驅不教之士當必死之鋒臣為陛下危之萬一西北二邉棄信叛約姦雄侮於内邊釁啓於外雖伊呂復生臣恐亦不能為陛下計矣為今之計莫如選将預備之今選将之道雖粗有律令或列制科或設武舉然皆法度齷齪必未能致特起之士何則應制科者必樂為賢良方正材識兼茂耻為将帥邉寄之名蓋今人重文雅而輕武莭也又考試者欲使難其對必求艱奥煩碎之事為問故今所習不專為有用之學既又限以日刻責以文多設有應者視日足文之不暇其暇究極韜畧運動謀猷哉武舉者蹶張馳射儕於卒伍所得庸妄鄙淺固不敢望得異士但稍能警勵有㢘耻則焉肯為卒伍之事乎臣不知國家立此二道姑欲示風采耶必欲得将帥耶示風采則可如必欲選竒傑為将帥藩翰四方則非臣所知陛下求相臣即自布衣考文藝試於州縣然後升之朝廷列於臺省館閣及群有司驗其行實才効為最者則擢之為相至於求武臣自三班及諸軍敘補崇者為歩騎都督殿前帥以至登樞府亦自有次第二者頗為得術而獨於将帥不知術焉豈不謂武臣者便可為将帥焉苟如是卒然委以重兵托以安危則邱明所云可謂寒心賈誼所云可謂痛哭者也臣請詔近位及藩鎮大臣於文武官中各舉明兵法有威果習練武畧堪任将帥者一二人仍請不限品秩不責罪過限品秩則下位有才者遺矣責罪過則負譴有才者亦遺矣爵禄妄高齷齪守細行者於事無益於急難無用既而召置闕下量與遷擢隨其品位任於邉塞重難之地使其磨勵且以觀其能否焉或有警急則取之有處遣之不疑與夫臨事而命命而不果夐相遠也雖然備今一時之用則有餘必欲垂永乆為不易之制臣復有愚䇿宜於太公廟建置武學許文武官與白身嵗得入補聚自古兵書置於學中縱其討習勿復禁止朝觀夕覽無一日離乎兵戰之業雖曰不果臣不信也夫習武者讀太公孫吳穰苴之術亦猶儒者治五經捨之則大本去矣今陛下設制科武舉求将帥之才而反禁其所習之書令學者何所師法若禁其所習而冀其所立是由緤韓盧而求其獲絆驥足而望其騁也不亦難乎且國家所禁者盖恐生變臣歴觀自古倡亂如秦末陳勝吳廣及隋末十餘輩皆崛起農畆而卒亂天下其凶謀姦計盖順民好亂之心爾豈盡曉兵法哉況雖欲禁止今蓄書之家往往皆有假使處私室熟習如韓彭蘇李陛下何由知之是禁之適足自禁不能禁人不若不禁之愈也必未能行於天下且可行於學中亦命雜讀史傳令博知古今勝敗之勢以輔助兵術昔晉文公謀元帥以郤縠説禮樂敦詩書乃命将中軍漢明帝時期門羽林之士悉令通孝經孫權謂呂䝉蔣欽曰宜學問自開益䝉曰軍中日苦多務不及讀書權曰孤豈用卿治經為博士耶渉獵見往事爾䝉乃就學自餘儒将固亦不少焉兵術既精史傳既博然後中年一校三歳大比當雜問兵術史傳之䇿才者出試之不才者尚許在學是國家常有良将布於四方内外不逞知我有大備安敢輕動動則威之軍志所謂無恃其不來恃吾有以待之又曰不戰而屈人兵此其要也仁宗時張方平上論曰臣聞馭将之道置兵之機繫天下安危為國之大事臣實陋儒寧識其術竊按前代之載冊觀英主之立制較其輕重之勢考其得失之迹最為得䇿惟在漢唐漢定天下置材官於郡國京師有南北軍之屯後平百粤更増七校其有四夷之事旋授中府之甲入卿出将無文武之常位因事立號無名職之定稱故五營六郡之旅事畢觧散貳師下瀨之官功成輙罷而将軍奉朝請矣是以終漢之世無弄兵内侮之禍東都之後四方分裂重兵在邉驍将緫戎强臣執權國從外理故叛亂接踵顛危相逐唐氏一綂乃因隋制内設諸衞以處武臣外布府兵以𨽻諸衞四方有變選将于朝調兵于府建牙而出凱歌而旋将軍就第矣郡縣有守禦之備朝廷無權重之臣不耗帑財不費廪給國力充實民用家足本末相稱表裏相托誠天機神筭平康之道也至于景雲之初始立莭度之號以雄邉鎮以寵勲臣行則建莭府樹六纛得以軍事專殺而方面始大及明皇天寳之末昏惑不事邀功競進之将獻謀於恢拓當國執政之臣務專乎寵利兼道開鎮地逾四履銳卒殱於沙磧邦財空乎上林盖中原無擊柝之虞而北兵排乎函谷矣由是憤兵悍将連衡接勢東擊西應朝降暮叛更相禽獵或自簒逐生民焦灼勦絶耗斃肅代之後中官得政行軍始於輔國軍容自乎朝恩暨徳宗之興元置中尉於神筞兵權國命盡在北司矣蘭錡虎臣皆其子蓄方岳戎帥率自賄成至有市井賈販之夫臺輿廝養之賤折劵而取千里諂附而得通都至于蹈利干賞壞法侵紀姑息假借養成驕孽君位天禄如從其􅐙賃以居焉故唐氏之基圖終為藩臣所傾且古之賢臣在國則為相在軍則為将商則阿衡佐升陑之伐周則尚父領渡盟之師姬旦東山之征以剋淮奄孔子夾谷之㑹以折齊萊漢高文之朝命相於諸将之列武宣之後将軍為執政之官留侯漢祖之謀臣未嘗親矢石髙密光武之元勲本則理爼豆孔明處士也西據荆州建蜀三分之勢元凱書生也東平吳㑹成晉一綂之基江左五朝兵官尤重二衞四軍五校七帥皆選朝廷清重之士搢紳名望之流介胄武人非所預也唐初大臣入為三公八座出為行臺緫管故自三代而至唐氏莫不合兵農而議政通文武以命官是故苟有制勝之術何必擊刺之伎乃為勇茍有經邦之道何必章句之學乃為文若夫積恩澤以稍遷階奔走之勤舊以敢死為武以引强為材臝股肱而決射御䄇軀幹而角健捷此所謂匹夫之敵一隊之長又豈将之云乎又若樞密之名近由大歴置於宫閫不列朝位凡中外臣庶上計議事干軍國秘未宜行則謂之樞密兵亂之際機務煩多乃用中人使專掌職五代後唐已來始更崇重與宰司分緫文武謂之兩府焉噫夫欲論致理之要講太平之筞是必先在乎一政事通文武合兵農而後天下之務可成矣如曰未能則漢唐之盛終不至況曰三代之道歟臣筞事迂鄙衆必誚其難用然通識逺慮知治道之本者必有是乎臣言者也張方平又上䟽曰昨戎使蕭英等回朝廷處置北鄙雖増兵飾壘事為之備然所遣将率未盡推擇臣聞之軍志善待敵者無恃其不来也當為不可勝恃我有以待之故城雖堅兵雖衆財用誠給茍将率非其人無足恃已故将者人之司命國家安危之主惟陛下念茲戒茲即戎騎敢越封略使楊崇勲在鎮定夏守贇在瀛州劉渙在滄州張耆在河陽陛下得髙枕乎雖愚夫童子亦知其必敗事也盖朝廷非不知崇勲等之不足使也迫於用人之常體慊然而遣之爾必欲上寛倚注之憂下為衆論所信自非已試之効者不足賴也勢不得已莫若且取陜西偏裨之知名者如狄青范全軰每路輙徙一兩人況自西鄙用兵已來三年于茲立功将士如青等未嘗得一到京輦仰望天顔若以此為名召之赴闕量其材器稍遷用之追崇勲等使奉朝請議者必謂西北事均若青等被奪必恐西帥有辭且陜西四路各據千里之地連城數十官吏将佐以千計勝兵衆矣豈不能選練偏裨日以為用一旦天子登一小校于朝而辭焉愛君體國者義不如是及兹盛夏邉未有虞可速致之比富弼使歸幸而盟好未渝即各還之本路若敵人南向且使分捍北方事機所懸乞賜裁察知諫院司馬光論張方平状曰臣竊聞近者秦鳳路經略安撫使知秦州張方平承信邉人虚稱西夏㸃兵侵犯邉境惶擾失度閉門乗城移牒隣路索兵自救永興以西軍馬皆被抽發使近邉之民轉相驚動闗隴騷然仍飛奏上聞致朝廷憂疑已而按省皆無事實方平身為元帥繫一方安危舉措施為衆所瞻倚今乃怯懦輕易一至於此萬一疆埸實有警急使方平當之豈不敗事臣竊恐敵國聞之得以闚将帥之淺深益有輕中國之心非所以壮皇威鎮殊俗也伏望朝廷治方平之罪嚴加譴謫更擇明智沈勇之人以代其任庶幾國家藩屏得禦侮之臣可以高枕矣司馬光又論張方平第二状曰臣先於今月十四日上言秦鳳路經略安撫使張方平怯懦輕易乞更擇良将以代其任未䝉朝廷采納臣聞将者成敗之機安危之本固不可以任非其人今方平舉措輕脱震駭一方傳笑天下不才之跡章灼如此而朝廷猶掩覆包含一無所問臣恐敵國聞之皆有窺窬之志吏士覩之皆有輕侮之心是國家重惜方平而輕棄秦隴也凡将帥能否患在不知既知其不能而任之如故臣誠愚戇深所未達議者或以為方平雖失於倉猝然止於過為備禦若從而罪之恐自今守邉之臣聞有宼至皆不敢為備也臣竊以為不然所謂為備者當平居無事之時簡其将佐訓其士卒嚴其壁壘利其器械審其間諜逺其斥堠使朝夕之間常若寇至如是則雖有猛鷙之敵不能犯也萬一犯之可以安坐而制之耳何至狼狽如是哉臣聞方平在秦鳳專以貴倨自處下情壅而不通自門墻之外皆可欺也況於兵民之休戚敵國之情偽方平安得而知之是以一旦承信虚聲惶惑失據内驚諸郡上動朝廷此而不責典刑安用臣所以區區獻言不已者乃責方平之無備非責其為備也伏望朝廷察臣前後所言明治方平之罪謫之逺方以儆封疆之臣使皆豫為備禦不敢驕傲懈弛如方平所為也光又論張方平第三状曰臣先曽上言秦鳳路經畧安撫使張方平怯懦輕易乞更擇人至今未䝉朝廷施行臣竊聞拓拔亮祚年齒寖長猖狂好兵常分之外邀求無厭董氊凶悍狡獪超其父兄朝廷官爵不滿其意頗懷怨懟與契丹結婚隂相表裏此朝廷所當旰食而憂也秦州居二敵之交為陜西四路之首軍馬民夷最號繁富而以怯懦輕易之人守之是委羔豚扵虎狼之蹊也臣竊為國家危之況方平其佗材識素無所長止以文辭致位至此姦憸貪猥士論共知今不可使之守邉事状昭然而朝廷掩覆其過曲加保全愛一人而失一方臣竊以為過矣伏望陛下不以邉事為細而忽之速治方平之罪嚴加譴謫更擇沈勇曉兵之人以代其任不然必待有烽燧之警然後易之則宼已深矣寳元二年右司諫韓琦乞許邉臣過闕朝見状曰臣竊見朝廷近來每於外任就移臣寮往沿邉委寄任使内有路由京師經過者多是陳乞朝見例各不䝉允許豈非朝廷以乞朝見者只是欲陳乞恩澤希求錫賜遂一例不允其請只今将所見入逓以聞臣竊以臣寮乆在外任必有素藴冀得一望清光開陳本末理既周盡事必易行陛下若因而勉之責其效命則必挺身忘死思有以報陛下寵遇之厚若或别有陳乞亦在朝廷詳其可否必不容其僥倖況今西陲設備之際以此移赴邉任臣寮自當詔令入對慰而遣之豈有邉臣到闕不面天顔使其自陳猶行沮遏甚非國家撫御将帥之術也臣欲今後就移邉任委寄臣寮因經過到京乞朝見者並賜恩許若因此妄有陳乞即繫在朝廷斷在不行豈可防小故而失於大體臣兼聞見有新差知渭州張元經過到京累状陳乞朝見未見俞㫖亦望特賜允可康定元年殿中侍御史文彦博奏曰臣聞穰苴出師首誅荘賈孫武教戰先斬愛姬當事而行未嘗禀命盖将權不可以不專軍法不可以不峻茲所以攻必克而戰必勝者用法嚴也自古有将權不專軍法不峻而行師必勝者未之聞焉臣切聞去嵗以來用兵西鄙或有禁軍小校臨陣而先退邉壘偏師望敵而不進而綂帥之臣即時不行軍令悉以事状上聞皆令鄰郡置獄取勘下法寺詳案定刑臣以謂失閫外之制隳軍中之令臨事不斷禀命不威豈曰軍容同夫兒戲復恐推劾之際據引枝蔓萌其茍免之心奏報之間淹延時日啓其幸生之路縱不至此亦慢令稽誅無以勵衆乃老師驕兵之弊也臣不知朝廷所用将臣必欲不令專制悉上禀於宸筭乎復不知将臣不能用軍法皆取則於朝廷乎儻朝廷用将而不令專制則臣所謂失閫外之制矣古之遣将也君推轂而命之曰閫以内者寡人制之閫以外者将軍制之此非徒然也盖委任責成之道不得不重今而輕之故臣所謂失閫外之制矣茍将臣不能自用軍法則臣所謂隳軍中之令矣人之常情孰不畏死敺億萬之衆冒矢石之衝刑之不嚴何以督戰兵法曰畏我者不畏敵畏敵者不畏我豈非嚴刑故對敵而伍中有不進者伍長殺之伍長不進什長殺之夫以什伍之長尚得專殺而綂帥之重不能誅一小校以厲士卒故臣以謂隳軍中之令矣議者或曰今所遇之寇未為大敵所興之師未至深入軍中之法未可專用将校有犯所宜奏裁茍如議者之言臣以為過矣宼非大敵兵未深入尚且狼狽先退逗撓不進儻遇大敵深入而将校有犯必須上聞則穰苴之戮荘賈非大敵也止扵㑹軍而後期孫武之斬美人非深入也惟以習戰而衆笑戮其君之寵臣愛姬亦未嘗素禀而先啓終扵齊師勝晉吳人入郢孫武穰苴皆為名将者委任專而法素行也以區區霸國猶知任将之道豈巍巍聖朝不及于是且國朝著令凡禁軍将校有退奏裁此則施於平居無事之日邉州守戍近郡屯聚則用之可矣今昊賊亂常蜂蠆有毒防邉之兵逾數十萬将權不專軍法不峻則何以御之臣伏望陛下出自宸斷稍假将權凡有偏裨小校臨陣先退望敵不進如此之𩔖罪犯灼然但合該軍法者不須置獄並許本部綂帥對衆便行軍令訖然後奏聞如此則師旅畏威進退從令或守或戰必有殊功兵者國之大事陛下扵廟堂之上與宰輔大臣計之審矣豈容踈賤輙有輕議然臣承乏憲署職在司聦茍有見聞安可緘黙陛下勿以臣之此言徒習老生之常談耳遂忽而不省臣熟思之任将治兵之術何莫由此道也愚者之慮幸賜采擇干冒旒冕文彦博又奏令邉帥練兵約束諸将曰臣切見自慶歴初陜西四路之兵逐路始分數将毎将馬歩不下三二千人各自訓練務要精熟兼得兵将相諳使喚之際盡知人人所能則鮮敗事近聞諸将多不和同大率罕能綂制教閱部分各立異見寛猛之莭不得中道狥情斂怨由此而生師克在和有異扵是伏乞嚴戒逐路大帥講求軍法精加訓練約束諸將務在和同兵聲稍振邉宼自畏慶歴三年知諫院歐陽脩上奏曰臣伏見國家自西鄙用兵累經敗失京師勁卒多在征行禁衞諸軍全然寡小又無将帥以備爪牙方今為國計者但務外憂强敵專意邉陲殊不思根本内虚朝廷勢弱事有萬一無以枝梧今軍帥暗懦非其人禁兵驕墮不可用朝廷自以為患不待臣言而可知也臣亦歴考前世有國之君多扵無事之際恃安忘危備患不謹使禍起倉卒而至敗亡者有矣然未有於用兵之時而反忘武備如今日者兵法曰将者民之司命國家安危之主也外以李昭亮王克基軰當契丹内以曹宗李用和等衞天子如當今之事勢而以民之司命國之安危繫此數人安得不取笑四夷遭其輕侮臣謂去嵗北邊或興狂悖今年元昊妄有請求若使朝廷有一二人中材之将叩頭効死奮身請戰誓雪君耻少増國威則敵人未敢侵淩朝廷未至屈辱奈何自中外都無一人既無可恃以力爭遂至甘心於自弱夫天下至廣遂無一人者非真無人也但求之不勤不至耳臣伏思自用兵以來朝廷求将之法不過命近臣舉朝士換武官及選試班行方略等人而已近臣所舉不過俗吏才幹之士班行所選乃是弓馬一夫之勇至於方略之人尤為乖濫試中者僅堪借職縣尉參軍而已扵此求將而欲捍當今之患此所以困天下而敗於敵人者也臣不知朝廷以此數事為求将之術果是乎果非乎以為是則所得何人知其非則盍思改革又不知朝廷以将為易得乎為難得乎為易則數嵗未見一人知其難得則當多方用意早賜采擇俟其臨患何可得乎伏望陛下特詔兩府大臣别議求将之法盡去循常之格以來非常之人茍非不次以用人難弭當今之大患臣亦常有愚見乆欲條陳若必講求庶可參用臣伏見唐及五代至乎國朝征伐四方立功行陣其間名将多出軍卒只如西鄙用兵以來武将可稱者往往出扵軍中臣故謂只扵軍中自可求将試略言求将之法謹條如左凡求将之法先取近下禁軍至廂軍中年少有力者不拘等級因其伎同每百人團為一隊而教之較其伎精而最勇者百人之中必有一人矣得之以為隊将此一伎勇實能服其百人矣以為百人之将可也合十隊将而又教之較其伎精而最勇者十人之中必有一人矣得之以為裨将此一人之伎勇實能服其千人矣以為千人之将可也合十裨将而又教之夫伎勇出千人之上而難為勝矣則當擇其有識見知變通者十人之中必有一人矣得之以為大将此一人之伎勇乃萬人之選而又粗知變通因擇智謀之佐以輔之以為萬人之将可也幸而有伎勇不足而才識出乎萬人之外者此不世之竒将非常格之所求也臣所謂只扵軍中自可求将者也誠能如此得五七萬兵隨而又得萬人之将五七人下至千人百人之将皆自定然後别立軍名而為階級之制每萬人為一軍以備宿衞有事則行師出征無事則坐威天下比夫以豐衣厚禄養驕惰無用之卒而逓遷以補至于校帥皆是凡愚暗懦之人得失相萬矣若臣之説果可施行俟成一軍則代舊禁兵萬人散出之使就食于外新置之兵便制其始稍増舊給不使大優常役其力不令驕惰比及新兵成立舊兵出盡則京師減冗費得精兵比之為利又逺矣右臣所陳只是選勇将訓衞兵之法耳如捍邉破賊竒才異略之人不可謂無伏乞早賜留意精求歐陽脩又論李昭亮不可将兵劄子曰臣伏見朝廷近自河東移李昭亮為鎮定高陽三路都部署竊以北敵險詐必與國家為患北面之事常須有備此一事陛下聖心乆自憂之執政大臣非不知而憂之天下之人共為朝廷憂之李昭亮不才不堪為将帥不可委兵柄此一人陛下聖心乆自知之執政大臣非不知之天下之人亦共知之不審因何遽有此命大凡朝廷行事不當者或謂小事而忽畧容有不知致誤施行而至乖錯者有矣未有以天下大可憂患而上下共知之事公然乖繆任以非人如此者臣料兩府之議必因施昌言等近奏三路闕都部署而目下無人以昭亮塞請而欲徐别選擇不過如此而已然臣竊見朝廷作事常患因循應急則草草且行纔過便不復留意只如今秋用郭承祐扵鎮定尋以非才罷之當時應急且以常一作康徳輿為鈐轄闕都部署一職本待徐擇其人臣初喜朝廷必能自此精於選任經今數月何曽用意求人一旦昌言奏來又遣昭亮且去今平時無事之際尚如此不能選人任用若一旦倉皇事動更於何處求人故臣謂朝議欲徐擇人而代昭亮者乃虚語爾方今天下至廣不可謂之無人但朝廷無術以得之耳寧用不材以敗事不肯勞心而擇材事至憂危可為慟哭臣思朝廷所以乏人任用之弊盖為依常守例須用依資歴級之人不肯非次拔擢所以無人可用古人謂勞扵擇賢而逸於任使今人既難得求之又不勤待其自來何復可得臣累曽上言練兵選将之法未賜施行又曽言乞於沿邉十數州且選州将亦不䝉聽納寧可公選不材之人委以大兵之柄一旦誤事悔何及之伏望聖慈出於睿斷其李昭亮早令兩府擇人替換仍早講求選将之法若大将難卒然而得即乞於沿邉州軍選擇州将近下資淺人中庶乎易得昨北使姓名稍遲始日中外之士已共憂疑幸其未動之間宜作先時之備兵法曰無恃其不來恃吾有以待之惟陛下為社稷之計深思而行之則天下幸甚歐陽脩又論郭承祐不可帥真定奏曰臣伏聞朝㫖用郭承祐為真定部管臣自聞此除改夙夜思惟國家用兵已五六年未有纎毫所得挫盡朝廷威勢困却天下生靈細思厥由其失安在患在朝廷拘守常例不肯越次擇材心知小人付以重任後雖敗事亦終不悔今每有除擬人或問於大臣則曰雖知非材捨此别無人甚者欲塞人言則必曰爾試别思更有誰可用乎臣亦嘗聞此言每退而嘆息夫所謂别無人者豈是天下真無人乎盖不力求之耳今不肯勞心選擇越次而用但守常循例輕用小人寧誤大計一誤不悔後人復然至如葛懷敏頃在西邉天下皆知其不可當時議者但曰捨懷敏别未有人難為換易及其戰敗身亡横屍原野懐敏既不復生亦須别求人用臣謂今日任承祐亦猶當時用懐敏也況如承祐者凡庸奴𨽻之才不及懐敏逺甚頃在澶州只令築城幾至生變豈可當此一路臣謂朝廷非不知承祐非才議者不過曰例當敘進别更無人此乃因循之説爾方今强敵潜謀禍端已兆中外之士見國家輕忽戎患弛武北方人皆獻言願早為備忽見如此除改誰不驚憂前六符之來朝廷忍耻就議盖為河朔無可自恃難與速争須至屈意茍和少寛禍患今幸得此自紓之計所宜多方汲汲精意将以先為禦備猶恐不及豈是因循守例輕任小人之日也其郭承祐欲乞早移與一不用兵處知州或召還别與一閒慢職秩若欲録其勲舊優其戚里之恩閒官厚禄足可養之不必須令居此要任伏願陛下深思大計不憚改為則天下幸甚脩又論趙振不可将兵劄子曰臣風聞河東近日累奏事宜探得昊賊㸃集兵馬伏縁昨來張延夀議和之際尚有朝廷未許事莭深慮狂賊因忿出兵即三路邉防皆合設備伏見河東都部署明鎬雖是材臣未諳戰陣副部署趙振人品庸劣全不知兵只是好交結沽買聲譽所以不因功業擢至将帥前在延州遂致敗誤雖行責降不及朞年却授兵權全無報効其人少壮尚不堪用今又年老病患全然不堪戰鬬一旦臨事必誤國家臣聞将者國之司命今陛下安危之機繫於将帥而河東一路無一戰将只有趙振老病一人而已細思此事大可寒心茍有誤事憂在朝廷其趙振伏乞速下本路體量如或實老病不任即乞罷歸散秩别委将臣竊以河東一路兵馬極多豈是蓄養病将之處西北二邊為患如此亦非趙振可當若使臨事敗誤悔恐不及伏望聖慈深思大計無惜一老病敗事之人仁宗時歐陽脩知諫院又上䟽曰臣訪聞岢嵐軍昨於四月中捉獲逃走萬勝長行張季虎翼張貴李徳等三人並係禁兵本軍勘正法司檢用編勅禁軍料錢滿五百文逃走捕捉獲者處斬訖奏其張貴等並依法處斬訖本路轉運司檢㑹先降令勅春夏不行斬刑合決重杖處死糺駮本軍不合斬見差嵐州團練判官劉述取勘岢嵐軍使米光濬等竊縁岢嵐軍地接西北二邊正是秋冬大屯軍馬之處若管軍将率斬一逃軍却遭勘罰則無由綂衆漸啓兵驕況重杖與處斬俱是死刑無所失入運司守令勅糺案雖執常科兵官以軍令斬人亦是常事況米光濬等勘成公案亦不過得違制失刑名論情定罪所犯至輕阻将率以長兵驕其損不細伏乞朝廷只作訪聞此事特降聖㫖與免勘劾所貴沿邉将率知朝廷委遇之恩盡心效用兵戎畏肅不致驕恣生事謹具状奏歐陽脩又論乞不勘狄青侵公用錢劄子曰臣風聞邉臣張亢近為使過公用錢見在陜西置院根勘其勘官所取干連人甚衆亦聞狄青曽隨張亢入界見已勾追照對臣伏見國家兵興以來五六年所得邉将惟狄青种世衡二人而已其忠勇材武不可與張亢滕宗諒一例待之臣料青本武人不知法律縱有使過公用錢必不似葛宗古故意偷謾不過失於㸃檢致誤侵使而已方今議和之使正在敵中茍一言不合則忿兵為患必至侵邉謹備過防正藉勇将況如青者無三兩人可惜因些小公用錢扵此要人之際自将青等為敵拘囚使敵聞之以為得計伏望特降指揮元勘官只将張亢一宗事莭依公根勘不得枝蔓勾追其狄青縱有干連仍乞特與免勘臣於邉臣本無干涉豈有愛憎但慮勘官只希朝廷意㫖不頋邉上事機将國家難得之人與常人一例推鞫一旦乏人誤事則悔不可追伏乞朝廷特賜寛貸邉臣知無功之将犯法必誅要藉之人以能贖過則人人自勵将見成功慶歴四年參知政事范仲淹奏曰臣竊聞國家置武學以來若未有人習藝或恐英豪隠晦耻就學生之列儻乆設此學無人可教則慮外人窺覘謂無英材於體非便欲乞指揮國子監不須别立武學之名如學生中有好習兵書者令本監官員保明委是忠良之人即密令聽讀臣竊見邉上甚有弓馬精强諳知邉事之人即未曽習學兵書不知為将之體所以未堪拔擢欲乞指揮陜西河東逐路經略司於将佐及使臣軍員中揀選識文字的有機智武勇乆逺可以為将者取三五人令經略部管諸司參謀官員等密與講説兵書討論勝䇿所貴邉上武勇已著之人更知将略或因而立功則将來有人可任即不得虚張多教人數仁宗時范仲淹又奏乞減武臣充提刑及今樞密院三班選人進呈䟽曰今西北二方交困中原驕盛如此國家禦捍實在三邉不惟戰将乏人其知州知軍并駐泊都監大寨寨主常要有心力人勾當方可主兵馬安緝蕃部嚴治城寨體探事機今來諸路提㸃刑獄多占却心力使臣或邉上倉卒要人終是怯懼不堪任使欲乞特降聖㫖諸路提㸃刑獄除川廣福建路依舊差文臣武職相兼外其餘路分只令文資勾當却留武職揀選少壮有精神者並與三路邉上差遣令慣習邉事或年甲雖髙素有心力未至衰老者亦可充邉上知州軍駐泊都監勾當頗濟事務如無精神心力則是不材之人豈堪為按察之官澄清部下因此便可退入閒慢差使庶免取笑四方仍乞委樞密院除選揀上項提㸃刑獄使臣外更常切於武臣中選人及令三班院亦常選人逐月一度具選到人姓名聞奏引見與沿邉次邉差遣所貴邉上多得有精神心力之人既乆於其事則漸増膽勇緩急可用此乃養育将材禦備戎宼之要也至於川廣荆湖近蠻之處亦乞重選知州軍都廵檢等以鎮撫邉界存活生民范仲淹時為陜西經略安撫使又奏曰臣等竊見用兵之處諸軍内若有指揮使員寮得力則不唯訓練齊整兼臨陣之時各能将領其下士卒方肯用命若人員不甚得力則向下兵士例各驕惰不受指蹤多致退敗顯是軍氣强弱繫於将校今來邉上諸軍人員甚有年老病患全不得力之人兼更有見闕人數不少若不早行選擇則恐將來依前悮事臣等欲乞朝廷於都知押班及近上内臣内選差諳歴邉事者三員内二員往陜西路一員往河東路計會逐處經略部署司勾集管下屯駐駐泊就糧諸軍人員司共揀選如内有年髙脚手沈重并疾患尫弱不堪披帶及愚戇全無精神不能部轄者並開坐申奏内屯駐駐泊人員一面發遣赴闕别與安排所有就糧指揮人員即更於逐人名下各令指射願管廂軍去處聞奏仍勒在本營聽候朝㫖候揀選畢即據指揮見闕人數便扵諸軍十将以上揀選曽有功勞者并武藝高强得力之人升一兩資給帖權管候将來轉員却依本資敘遷所貴将校得人士卒増氣仲淹又奏陜西主帥帶押蕃使䟽曰臣竊見環慶路熟户蕃部約及二萬人内只蕃官一千餘人各有請受每人惟有料錢亦無月糧衣賜所費少於養贍長行兵士皆能辛苦熟扵戰鬭如撫馭之間恩威得所大可防托邉界減得兵馬今來環州种世衡原州蒋偕撫馭蕃部㝡有畏愛緩急可以呼集使喚欲乞朝廷先授此二人兼管轄蕃部使所貴激勸邉臣於熟户用心專加綂領緩急使喚漸可減得戍兵萬數其四路主帥亦令依舊時莭度並帶蕃部使皇祐四年直集賢院劉敞奏曰臣聞朝廷以狄青宣撫荆湖經制盜賊而議不置副臣以謂不便或曰置副而使中人為之臣又以為不便臣聞上古王者之遣使命将也必為之設介貳參佐非獨思紀綱廣謀䇿而已亦所以謹大事備不然也今擁數萬人之衆連四路之廣莭制萬里吉凶所繫而單車臨之孤拱獨立猝有疾病不意之虞無所仗托莫相維持非計之全也狄青起於行伍而遷樞近天下誠未見其美方以盜賊之急擁兵而出故人人想望風采願聞成功宜得正固幹略之臣參職共事設以中人為之必大失事望足以示陋非朝廷之光也臣故曰議不置副不便置副而使中人為之亦不便此臣所以拳拳也盖先事而言者常若迂闊後事而言者常若不及惟陛下留意芻蕘謹重軍旅之任仁宗時蔡襄上奏曰臣切見唐代宗徳宗朝吐蕃屢侵邉境是時唐帝在長安勢大力衆大臣如郭子儀李抱玉渾瑊繼緫大兵已鎮近畿猶命馬璘李元諒守涇州張獻甫楊朝李晟守邠州郝玭守渭州分扞虜勢是邠涇兩路自古為西虜之扼而長安之所恃以為屏蔽也今事之勢與唐不侔而涇原邠寧朝廷命帥雖以永興延州二帥遥領西路安撫之名萬一邉郡有警豈能遥制事機應變以破敵乎臣請邠涇二路當擇帥臣使其勢若鄜延環慶之重勵兵訓卒待敵之至而破之此制勝之術也蔡襄又奏曰臣伏見數年以來北敵觀我事勢資負固淩脅之驕廟堂失於計謀抱屈意依隨之辱然契丹貫盈自任當極盛必衰之期若朝廷處置得宜能反弱為强之勢方今敵衆於雲州㸃集河北繫天下安危深思作備之方盡在得人而已臣切見河北鎮定都部署李昭亮鎮州張存雄州王徳基澶州李昭述等或居要郡或緫重兵假使智能盡厭服於人猶恐計慮或見輕於敵而況指數名姓知委任非人尚令列在邉防得不取笑外裔李昭亮張存李昭述王徳基伏乞速行差替朝廷若以皆無顯過不欲非時改移是惜數人之顔情不頋生民之禍患若以無人可使延日茍安侍從文武之班同國家休戚之計度才委任必濟艱危伏望聖慈決於睿斷知制誥范鎮上奏曰伏見寳元慶歴間用兵伐元昊而兵之積於陜西者數十萬人天下英才皆聚闗中然未嘗有尺寸功者横山為之限也元昊大入則大勝小入則小勝每戰得意者横山之人為之用也横山之人為之用終之以厚利而盟之又如其號為國主豈得已哉此忠臣義士嘗膽而不可忘者則前日种諤之舉發於忠義也提兵二千得其衆數萬馬牛二十萬拓地百餘里至綏州而城之不旬月間壘壁樓櫓倉敖府庫凡戰之具無不皆備亦可以言才矣而議者以其不中覆一言輕之今諤下吏事在不測臣有所懐不敢不陳且横山之人苦諒祚虐政不為之用欲内附者乆矣昔先帝嘗欲經營之其志未就陛下悼先帝之志未就也屢召邊臣與之計議則諤雖不中覆可無罪也議者又以為待逺人不可以失信異時山遇詣延州告元昊反知州郭勸執而還之可謂不失信矣而元昊殺山遇卒反無改是逺人不足以信待之也廼者諒祚寇渭州掠邊民拒使者而不納又寇大順反迹明矣朝廷絶其歳賜以困弊之乃卑辭稱臣謝過伏罪是豈真稱臣哉直以其國中饑而未能發耳使諤不受其降衆亦反受之亦反然受之已足雪寳元慶歴之耻快邊人之心且夏人之性畏勝而侮敗今諤已可使之畏矣而議者乃欲殺之是沮邊臣之立功者而為諒祚報仇也世之論者常病無将非無将也但御将之術太拘耳陛下試觀寳元慶歴間事則諤今日可以為将矣昔者魏尚嘗有罪於漢矣文帝感馮唐之言而赦出之尚終立功願陛下奮文帝之心感臣之言赦諤使護領其衆以捍塞下必能立魏尚之功扵此世使臣得為馮唐幸矣監察御史包拯論邊將上奏曰臣近者累曽上言以河北沿邉将帥未甚得人特乞精選其代州尤不可輕授縁代州與雲應等州相去至近路又坦平古今最是難控扼之所太宗朝以驍将楊業守之業殁繼以給事中張齊賢守之其慎重用人如此自後邊鄙無事然亦用武臣中有材略者今朝廷委任郭承祐必恐敗事按承祐累任無状朝野共知物議喧然以為不可且北敵請命歴年多矣然恩過則生驕安乆則忘備理之常也況西北二陲自古嘗惡其連盟協勢以為中國之患以今觀之釁端已兆廟堂之上所宜窺之未萌而為國家鋭意而逺慮也今天下不患乏人患在不用用人之道不必分文武之異限髙卑之差在其人如何耳必當考以應敵制勝之畧詢以安邊禦衆之宜觀辭氣之瓌竒舉動之方重者擢而用之則取人之要無大於此況河北河東同時地震變異如此不可不懼臣先進劄子言之頗詳其承祐欲乞早令召還别用能者沿邉守将畏懦不勝任者亦乞速賜移易若不預為之具緩急圖之則無及矣惟陛下特留聖意則天下幸甚諫議大夫夏竦上奏曰臣聞将者人之司命國家長城将帥之任非材不居求材之道斯為難哉若以頒首胼肋為壮則秉鉞非角觝之戲以巨觴大炙為勇則建牙非飲食之場以彎􅓡提劒為彊則上将非一人之敵以遭逢故舊為忠則三軍非恩澤之任在觀其器能察其性情輕者易恐躁者易撓很者易激疑者易動驕者易誘弱者易詘剛者易誤況其材不同而其任復異任文儒則懼其畏懦任英武則防其䟦扈任剛勇則慮其寡謀任庸鄙則恐其敗事是則幅員萬里殆無将業豈其選任殫乏良規但﨣﨣之夫良多客氣既昧今古孰知成敗春秋郤縠為将敦詩説禮戰國孫吳論兵文動辭采漢興曹參趙充國祭遵盧植魏晉諸葛武侯杜預羊祜唐李靖郭元振裴度或立戰功或為名将觀其武略抑資文術以是而觀可否自分前事元龜後之法則但能精選文臣材兼智勇若多識前賢事跡必資通變機籌授之斧鉞臨事可裁然旁選英雄列為裨佐以勇佐謀舒急相濟謀者足以制敵勇者足以冠軍二者有方則師律正矣夏竦時為陜西經略安撫使又上奏曰臣聞古者将帥受命於廟受脤於社王者遣之則跪而推轂曰自閫以外将軍制之賜以斧鉞得專殺戮故三軍弭伏克捷相仍後代自疑多輕兵柄恐其末大本小臨事難為制禦斯皆流議頗昧逺圖盖昔者皇綱解紐擢任非人内多讒賊之臣致有䟦扈之将若朝廷有序邪佞不生雖使舉國出師孰敢潛圗不軌稽夫往事足有成範樂羊伐中山魏文侯示其謗書三箧條侯屯細桞漢太宗為之按轡徐行在君臣相契故功業易成将以軍法行師王命有所不受制敵變化無方難可授之成筭兵有速如風雨不測如神三軍趋利而行豈當千里請戰用将之道歴代攸難今則邊臣武帥禄厚責輕俸給之費月差千萬歌舞殽觴樂極品流邊鄙之上戰陣之前外示彊毅内多畏懦不知竒正要覆之略解交伐謀之計攻分戰守之利紆直遲速之勢茍有所施躬循繩墨先咨中貴之官次訪參謀之臣鳴鼓而行控弦而列勝則逐北敗則嬰城以是制戎終無竒效近年二将端坐邊城頗失國威故縱敵騎而大者不及誅夷小者尚分麾寄雖令後人無懼死之變奈使蒼生有無告之䰟誠當選任賢良絶其疑問法漢髙之将将推光武之赤心委以駿權責之成效聽以古禮用兵便宜從事功成速賞要以帶礪之盟注意不回開以丹青之信是則百萬之衆可以恩齊荒服之君可以威制侍御史趙抃上言曰臣聞吉之先見聖人所以知幾豫備不虞治世因而無悔朝廷之設外禦帥府之握重兵不唯用政術以安吾民抑亦修武事以制他寇茍曰稱職則一方何憂或非得人則為國生事伏見京東路青鄆二州知州各帶安撫使其地控山並海兵民一有失所易為作過近年悉差兩制及前兩府臣寮以鎮撫之今曹佾知青州李端懿知鄆州素匪勲舊俱縁戚里威名未著勢力且輕萬一屬部有不測事宜則人心動揺何所倚賴兼亦曽有臺官上言謂其不便臣欲乞聖㫖特賜檢㑹改差青鄆二州安撫使選有才謀經任使兩制以上臣寮充之以安京東人心亦先見豫備之一端也英宗初即位殿中侍御史司馬光上奏曰臣聞趙滋為人剛愎不可管軍朝廷不以為信臣亦自恐聞聽未審不敢復有所陳自後又聞滋對契丹人使禮貌驕倨不遵舊式近者又聞本路帥臣奏滋任意行事恐致引惹竊以景徳以前契丹未和親之時戎車歳駕疆埸日駭乗輿暴露扵澶淵敵騎憑陵扵齊鄆兩河之間暴骨如莽先帝深惟安危之大體得失之至計親屈帝王之尊與之約為兄弟歳捐金帛以餌之聘問往來待以敵國之禮陛下承統一遵故約夫豈以此為不辱哉志存生民故也是以兵革不用百姓阜安垂六十年今契丹所以事中國之禮未有闕也為邊臣者當訓卒乗繕器械以戒不虞厚饔餼慎威儀以待使者内不失備外不失好以副朝廷之意而已今滋數乗客氣以傲使人争小勝以挑彊敵茍為夸大於目前以求一時之聲名而不顧國家永乆之患臣恐釁隙一開則朝廷未得髙枕而卧也昔孫蒯毀缾而曹衛構難鄫人漚菅而魯國喪邑渉佗捘手而晉失諸侯女子争桑而呉師入郢故禍常起於細㣲而事或生於所忽凡二國所以相交之道不可以不慎也雄州當敵之衝平居則行李之所往來有事則戎馬之所出入典州之将不可不精擇其人滋禀性狂很恐不可乆寘扵彼乞落軍職徙之内地毋使邊将相效為國生事實天下幸甚司馬光又上奏曰臣累曽上言趙滋剛愎狂妄不可管軍及守邉必将敗事近聞朝廷益加寵任令再知雄州臣愚瞽之言誠無足采然竊聞曏時本路都轉運使唐介安撫使彭思永昔曽言滋罪状今朝廷使之再任彼三人者必不肯同心協力以利公家但更相違戾窺伺得失雖容貌語言外相包容其中心豈能坦然全無猜惡是朝廷􅈭之使交鬭也若監司将帥互相猜惡而欲使之安下民扞外敵臣竊以為難矣伏望朝廷念河北一路繫國家安危察滋所為皆夸誕不實授滋别路一閒慢差遣使上下之情各獲自安不唯邊境保無他慮亦滋一身之福也治平元年光知諫院言程戡施昌言劄子曰臣竊聞近者夏國屢起事端邊境之變不可不備為備之要在於擇帥伏見鄜延路經略使程戡資性姦回涇原路經略使施昌言老病昏昧皆以斗筲罷愞之才當折衝禦侮之任平居之時未見有闕一旦警急必敗大事譬如開門揖盜以肉餧虎臣竊為國家危之伏望陛下早擇智勇之将以代其任二人並除致仕以安邉境之民戒偷禄之臣二年侍御知雜事吕誨論差中官為陜西鈐轄状曰臣近聞陜西四路各差中官一員􅂶鈐轄專管蕃部公事及支公使庫錢千貫仍每嵗入奏邊事權勢甚重驚駭羣聽臣不識聖筭之遠但聞羣臣之議不以為便亦恐為陛下之謀者思之未至耳但有唐以來舉兵不利未有不自扵監軍者我朝因循前弊尚多乆未更革奈何又増置此員如走馬承受官品至卑一路已不勝其害況今鈐轄寄重其實已均安撫使之權矣原朝廷之意必為昨來熟户背叛弓箭手逃亡使之以時犒設專行姑息何其踈也臣嘗見熟户耕佃官田並無征徭遇戰鬭方出一人一騎茲外更無侵擾熈熈安業界外生户羨慕不足常苦諒祚誅求願為漢民不可得爾有以知熟户無背漢之心明矣但為諒祚誘之以厚利刼之以重兵邊臣坐視殺戮不為救䕶彼将逃死豈得已也若威加邉外戎人不敢内侵熟户自然安堵不爾雖豐牛酒日為犒設徒有損費何益於事哉至如士卒乆不訓練盖兵官不務協同借若五将軍中有一員内臣不喜教閱動為姑息由此卒伍驕惰他将稍嚴紀律則怨謗競起帥臣畏懼唯恐生事上下因循茍簡軍旅無繇精鋭斯中官姑息之効也疆埸之事果只如此處置未知其利而但見其害藩籬不日隳壞将盡藩籬墮則邊城危矣臣前奏上乞扵無事時整齊熟户弓箭手大臣合議終不以為然臣觀今日處置誠未為便喑黙不言則負任使所謂鈐轄四人者臣欲乞朝廷省罷精擇帥臣凡事一切付委庶幾閫外之權專制則於責重矣惟聖智擇焉侍御史趙瞻論五路置帥不當更以馮京為安撫状曰臣伏見陜西置永興秦延慶渭五路安撫經略使各開帥府以制西戎今又忽差馮京安撫諸路風聞士論莫測所謂不知朝廷以諸帥臣皆不能安撫本路邪是國家欲深究邉事而專委近臣經畫之也帥臣非才自當更置直欲經畫暫至豈能究知是皆未有以補疆埸之萬一而足以愧邊帥擾戍兵矣犒師勞将遷易卒伍浮費百出虚聲交至闗陜之民必大恟動臣愚固以為無益至有損也昔杜預使王濬先入石頭避其親受莭制裴度為韓洪已為都綂遂不更稱招討深達國體共成邊功古之用人今悉相反以臣所見乞罷馮京之行茍欲精求利病即有文彦博孫沔新付兵柄未出國門授以聖謨廟筭彼皆元老可以仰成臣愚不識事機願進區區之慮趙瞻又論差中官為陜西鈐轄状曰臣伏聞古者天子推轂遣将則曰自閫以外将軍制之盖明委任之專也故唐於諸道行軍而置緫管莭度以至領押諸蕃部落及近界諸蠻之𩔖率入階銜遂成定制國朝自起西師分置戎府外有四路以扼敵境然招討經略安撫緫管之司責任至重故未嘗不選文武賢明之臣以領其柄内則數州之軍民外則諸部之蕃落威恩刑賞處置制宜敢於纎㣲有不振舉比者戎事稍息人自謀安繒絮飲食失於侈靡藩籬族聚不復頋卹向即已稱兩面今遂絶為匪人去歳西夏兵勢壓邉思順酋豪既為綂率諸族離弱固自歸投中國不為救營熟户隨亦翻叛致此疆埸蕩無斥堠敵若犯境徑至城下固宜朝廷熟慮更制近乃特以内臣王昭明四輩各當一路招撫近蕃雖留神則甚勤在制宜則殊失竊觀唐室興兵最多更用宦人率致敗事如觀軍容及宣慰等名常為切齒之患今招集蕃部鎮安方陲悉皆大将之權豈容偏帥所撓一委斯柄将襲往弊兵機牽制綂帥何安臣愚所見不若以此等事盡付帥臣是其官守誰執其咎既塞分權生事之隙又明委任責成之專即罷閹宦無侵軍政足以前鑒史戒而後息亂原矣臣以乆居闗陜寖識事宜比自西來兼訪道路邉人議士率言此失願陛下特留神斷不憚改更隨意招懷以安攜貳趙瞻又論差中官為陜西鈐轄状曰臣伏䝉陛下特出聖意擢在言職犬馬猶知報效臣子豈忘奮勵況聞輿論敢自循黙近日於垂拱殿輙已具劄子敷奏以内臣王昭明等四人分制邊任侵撓帥權乞賜更置更責大将至今未䝉采聽是臣所負言責之未塞者也此事一書國史已玷陛下元年之大政今又不察臣言遂為國家異日之遺恨茍能遽追前命慰快群情即於返掌之間更彰納諫之徳故人人莫不為陛下深惜之也且如帥府處置蕃部乃是邉事萬分之一今以一事偶失即為添置中官将來復有事生又欲何以為計況彼各受密㫖嵗入朝謁邉臣䟽逺日慮傾危軍政異同孰能主執外未制敵内先壞事昔程元振誣來瑱之罪魚朝恩間子儀之功故穆質諫用宦人為将而吐突承璀終無功于鎮定裴度奏罷諸軍監陣而李愬逐賊于淮蔡至如本朝鄜延敗事則斬徳和于河中麟府喪師則流元道于海裔豈非古今得失之明效哉然猶使議者惓惓疑宸􅇆之未斷怪輔臣之依違斯可謂事機之切不可不亟諫也臣至㣲賤愚忠所激義忘後害殊不知有一身一門之私計亦不知有羣閹羣邪之勢力上冒天威死有餘戮臣愚不勝激切之至叅知政事歐陽脩上奏曰臣伏見諒祚猖狂漸違誓約僭叛之迹彰露已多年嵗之間必為邊患國家禦備之計先在擇人而自慶歴罷兵以來至今二十餘年當時經用舊人零落無幾惟尚書户部侍郎孫沔尚在西事時沔守環慶一路其人磊落有智勇但以未嘗出兵又不遇敵故未有臨陣破賊之功然其養練士卒招撫蕃夷恩信著扵一方至今邉人思之雖世不乏材朝廷方務推擇若求曽經西事可用之人則臣謂無如沔者沔今年雖七十聞其心力不衰飛鷹走馬尚如平日況所用者取其智謀藉其威信前世老将彊起成功者多沔雖中間曽以罪廢棄瑕使過正是用人之術臣今欲乞朝廷更加察訪如沔實未衰羸伏望聖慈特賜奨用庶扵擇材難得之時可備一方之寄歴代名臣奏議卷二百三十七
