body:
  text: 歴代名臣奏議卷八十四眀楊士竒等撰經國宋欽宗時許翰上言曰臣愚伏被詔㫖除已具劄子陳衰疾不勝事任外方此國歩艱虞臣竊懐欲有陳而事有理須朝夕上達少緩則已後時不暇為者臣輙先具畫一以聞一自崇寜以来天下之士以謂非姦佞貪黷不進非軟熟趣和不容故凡為時所崇奨至大吏者鮮有可用之才今不得已則當擢小吏而用之准出使法借以官資使攝郡府竢有功效而正除之則人人磨厲思自奮起此賢於前日全軀保妻子之臣寵禄已過如飽肉之鷹不復鷙擊者不翅百倍矣一今軍政久壊士卒難恃宜使郡縣什伍其民而教之戰使自保疆緩急亦可調發以赴難河東河北與瀕大河帥臣皆使得擅一方之賦便冝従事以足兵食昔唐李抱真節制澤路以賞罰激勵其民得卒二萬遂雄山東是時稱昭義兵為諸道冠今使諸帥各放其法則天下皆昭義兵矣然昭義法計丁擇人蠲其徭租農隙習射嵗終大校此可持久而難以應卒今寇難乃在數月之内必欲令下而衆集事濟者則諸縣皆有一鄉之豪傑使守令躬親訪問召見喻以忠義寵錫之榮示以寇攘屠戮之害借一進武義副尉等官使各慕少壮樂為用者得分總之縣得三四豪傑則封内勁果忠固有用之人可盡出矣此其取效易且速盖一時之利也如昭義之政脩則效亦不過二三嵗間可以兼行而持久者雖至平世不可易也臣頃亟為淵聖言禦寇之務要在邊境使邊境不禦而寇入腹心則人情震擾士氣沮壊驅而與戰百不當一故祖宗以来恃邉備不恃都城又聞祖宗之時邊臣如郭進李漢超等皆數十年不易委任而責成功而去年諸州至有三易守者邊帥無不紛紛變更臣數争之而不􅀎得今守帥凡宜於民兵者願著憲令勿復動移増秩賜金以厲勲績而後民兵可用疆域可保邊境可强也一臣去嵗道過泗上見歸朝官張企肅言願得燕人三百質其家屬給馬資金由登莱海道潜入燕境號召鄉黨與叛女真必有大功亦聞已甞有人以其䇿告宰相唐恪恪大笑之比有族人自供䧟敵脱歸者陰得契丹燕人之情見其怨憤金人欲食其肉臣以是知敵之可離也契丹燕雲之地本非國家所有若使燕人遂往得地因以封其人遇財因以賞其士則金人支解疾入腹心必不能久為中國患矣一臣考秦漢以来用兵之變能覆堅敵者皆合衆弱以為强如燕昭之破齊漢髙之取椘是也今金人既取契丹遂亂中國其勢必将加兵隣壤如西夏髙麗大小敵國𩔖皆有􅏮􅏮狼顧之意臣甞建欲棄陜西進築無用之地以與西夏増其嵗賜與之解怨申結舊恩使一辯士説之可使岀兵以攻雲中又使人結髙麗大小敵國諸小寇等與之立契丹後則金地坐見分裂中國将得休息矣按唐遭禄山之變肅宗起靈武引回紇之兵以復兩京今但使之擾敵巢穴其利百倍於唐也一河朔山東近甸郡縣皆易野用車之地可以教民車戰昔者元魏謂劉裕兵畏其鐵騎衝突以鐵鏁連車為函陣又趙元昊反時國家亦甞用車有功今金兵無他長技所恃惟鐵騎耳禦騎用車古今所同而我師毎憚其重遲勞費迄莫肯用宜詔有司講眀其法而督教之一遷都有經久之制行幸有促辦之功二者異冝今若近責嵗月之利宜令金陵帥臣集海船教水戰儲積廪庾待或行幸而已其他一切營繕力役皆冝且止存撫休息以固民心以建國本此大務也今雖已有詔㫖戒告勿使勞民然若非一切罷去之則恐勞民之戒殆為虚文昔唐太宗脩洛陽乾陽殿以待廵幸張元素諌之以為勞民不可即罷其役曰使後必往雖露坐庸何傷況如今之艱虞正冝貶損過中乃能下感人心上格天意凡是府廷官寺粗飭圮壊則皆可以息鑾駕而張黼扆使逺人皆知陛下盛徳所以師象陶唐茅茨土堦之意天下幸甚右臣度金兵擾邊之期不過旬月若使小失支吾必至又復深入伏望聖慈下臣之言於大臣或有可採擇則願詔速施行庶㡬及事謹録奏聞伏候勅㫖髙宗即位唐重應詔上䟽曰臣於今月十七日恭奉初一日皇帝登寳位赦書望闕宣讀人人感慨流涕當國歩多艱之際忽聞詔書以定神器宗廟社稷不失祭祀四海生靈不忘舊戴誠千萬世之幸累日祗誦紬繹詞㫖其中有云紹祖宗垂創之基懐父兄播遷之難卒章云伺候兩宫之復終圖萬世之安其言哀痛深切臣泣血銘心推原徳意而施行之惟恐奉詔不勤不敏以辜新政若廢神霄朝拜罷常平給散限外印契額外撥放道傳逺俗者給據商賈般販者免稅如此等事扵朝政非大安危也於國體非大利害也於人情非大休戚也陛下制詔之意欲紹祖宗垂創之基以京師為根本以兩河為股肱金人再犯京闕則根本揺矣長驅兩河則股肱病矣所以為興復之䇿者何如也陛下以太上皇為父以嗣君皇帝為兄金人一舉而邀兩宫當被髪纓冠而往救之矣所為患難之方者何如也自古遐裔之侵中國未有如此之酷然其吞噬之欲尚未厭足其馮陵之勢尚未已也前日致寇之因陛下甞通知之乎今日禦寇之術陛下亦熟計之乎既不知己而又不知彼者必殆既不能强而又不能弱者必危陛下度彼已之術則知所以自治矣察强弱之理則知所以常勝矣此天下之大計也陛下所以與大計天下者固以素定非臣所得而擬議也然以今日之急務有四而其利甚博大患有五而其禍不可勝言臣為陛下舉其畧而試陳之定都關中據山河百二之勢以植根本之地所以杜瓜分之漸也建牧大藩重宗子維城之計以固磐石之基所以救瓦解之失也通夏國之好而守吾舊疆所以繼好息民也立青唐之後而封以故地所以興滅繼絶也此四者千萬世之大利也雖千萬言而莫究豈非今日之急務乎若夫大患有五而救患者亦不可緩法令滋彰而吏縁為姦欲救此者莫先於守祖宗成憲朝綱委靡而不振故士大夫相習而誕謾欲救此者莫先於登用忠直軍政敗壊而不舉故将兵相肩而奔潰欲救此者莫先於大正賞刑國用竭矣而利原又失欲救此者莫先於選将漕之臣民心離矣而調發方興欲救此者莫先扵擇循良之吏此五者非天下之通患乎今日之急務有四而其利甚博大患有五而其禍不可勝言皆詔㫖之所未及臣愚不忍緘黙以苟容敢竭誠而妄有陳焉天下之大計議不旋踵而投機之會間不容髪惟陛下獨斷而早圖之以起中興之運而成再造之功則祖宗垂創之基扵此可紹而兩宫播遷之難扵此可復矣此誠天下之大計也臣曩叨諫官屢陳致寇之因坐是斥逐承乏守土累上禦戎之畧言皆有證頃者聞陛下以大元帥之節戡定國難臣甞具劄子陳述三䇿乞移鎮關中以符衆望臣區區之愚已陳其梗槩矣兹者恭承詔㫖許臣庶詳具利害陳述雖語言詆訐亦不加罪以此見陛下誠有聴言之意首開求言之路有君如此其忍負之臣愚戇狥國不識忌諱敢肆危言以塞眀詔進退存亡之㡬臣扵此卜焉陛下不以臣愚不肖許赴行在得方寸地以披露肝膽庶或補於經綸之萬一臣之願也臣非為身謀也實為天下國家計也惟陛下裁幸建炎元年尚書右僕射李綱議國是曰臣竊以和戰守三者一理也雖有髙城深池弗能守也則何以戰雖有堅甲利兵弗能戰也則何以和以守則固以戰則勝然後其和可保不務戰守之計惟信講和之説則國勢益卑制命扵敵無以自立矣景徳中契丹入寇罷廵幸之謀決親征之䇿捐金幣三十萬而和約成百有餘年兩國生靈皆賴其利則和戰守三者皆得也靖康之春粗得守䇿而割三鎮之地許不可勝計之金幣以議和懲刼寨之衂而不戰於和與戰兩失之其冬金人再入畿甸廷臣以春初固守為然而不知時事之異膠柱鼓瑟初無變通之謀内之不能撫循士卒以死捍賊外之不能通達號令以督援師金人既登城矣猶降和議已定之詔以欵四方勤王之師使敵得逞其欲凡都城玉帛子女重寳圖籍儀衛輦輅百工伎藝悉索取之次第遣行及其終也刼質二聖廵幸沙漠東宫親王六宫戚屬宗室之家盡驅以行因逼臣僚易姓建號自古遐裔之禍中國未有若此之甚者是靖康之冬并守䇿失之而卒為和議之所誤也天祐有宋必将有主故使陛下脱身危城之中摠師大河之外入繼大統以有神器然以今日國勢揆之靖康之初其不相若逺甚則朝廷所以捍患禦侮敉寜萬邦者於和戰守當何所從而可也臣愚雖不足以知朝廷國論大體然竊恐猶以和議為不然也何者二聖播遷陛下父兄沈于北廷議者必以謂非和則将速二聖之患而虧陛下孝友之徳故不得不和臣竊以謂不然夫為天下者不顧其親顧其親而忘天下之大計者此匹夫之孝友也昔漢髙祖與項羽戰于滎陽成臯間太公為羽軍所得其危屢矣髙祖不顧其戰彌勵羽不敢害而卒歸太公然則不顧而戰者乃所以歸太公之術也晋恵公為秦所執吕郤謀子圉以靖國人其言曰失君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎秦不敢害而卒歸恵公然則不恤敵國而自治者乃所以歸恵公之術也今有盗賊於此刼質主人以兵威臨之則必不敢加害以卑辭求之則所索彌多往往有不可測之理何則彼為利謀陵懦畏彊而初無惻𨼆之心故也今二聖之在北廷莫知安否之審固臣子之所不忍言然吾不能逆折其意又将堕其計中以和議為信然彼必曰割某地以遺我得金幣若干則可不然二聖之禍且将不測不予之是陛下之忘父兄也予之則所求無厭雖日割天下之山河竭取天下之財用山河財用有盡而金人之欲無窮少有釁端前所予者其功盡廢遂當拱手以聴其命而已昔金人與契丹二十餘戰戰必割地厚賂以講和既和則又求釁以戰卒滅契丹今又以和議惑中國至扵破都城滅宗社易姓建號其不道如此而朝廷猶以和議為然是将以天下畀之敵國而後已臣愚竊以為過矣為今之計莫若一切罷和議専務自守之䇿而戰議姑俟於可為之時何㢤彼既背盟而刼質地不可復予惟以二聖在其國中不忍加兵俟其入寇則多方以禦之所破城邑徐議収復建藩鎮扵河北河東之地置帥府要郡於㳂河江淮之南治城壁修器械教水軍習車戰凡捍禦之術種種具備使進無抄掠之得退有邀擊之患則雖時有岀没必不敢深入而慿陵三數年間生養休息軍政益脩士氣漸振将帥得人車甲偹具然後可議大舉振天聲以討之以報不共戴天之讐以雪振古所無之恥彼知中國能自强如此豈徒不敢肆兇而二聖保萬夀之休亦将悔禍率従而鑾輿有可還之理倘舍此䇿益割要害之地奉金幣以予之是倒持太阿以其柄授人藉寇兵而資盗糧也前日既信其詐謀以破國矣今又欲蹈覆車之轍以破天下豈不重可痛㢤或謂强弱有常勢弱者不可不服於强昔越王勾踐卑身重賂以事吴而後卒報其恥今中國事勢弱矣盍以句踐為法卑身重賂以事之庶㡬可以免一時之禍而成将来之志乎臣以謂不然夫吴伐越句踐以甲楯三百棲扵會稽遣使以行成而吴許之當是時吴無滅越之志故句踐得以卑身厚賂以成其謀枕戈甞膽以勵其志而卒報吴今金人之於國家如何㢤上自二聖東宫下逮宗室之係於屬籍者悉驅之以行而陛下之在河北遣使降偽詔以宣召求之如是其急也豈復有恩於趙氏㢤雖卑身至於奉藩稱臣厚賂至於竭天下之財以予之彼亦未足為徳也必至於混一區宇而後已然則今日之事法句踐甞膽枕戈之志則可法句踐卑身厚賂之謀則不可事固有似之而非者正謂此也然則今日為朝廷計正當嵗時遣使以問二聖之起居極所以崇奉之者至扵金國我不加兵而待其来寇則嚴守禦以偹之練兵選将一新軍律俟吾國勢既强然後可以興師邀請有此武功以俟将来此最今日之上䇿也古語有之曰願與諸君共定國是夫國是定然後設施注措以次推行上有素定之謀下無趨向之惑天下之事不難舉也靖康之間惟其國是不定而且和且戰議論紛然致有今日之禍則今日之所當監者不在靖康乎臣故敢陳和守戰三説以獻伏願陛下斷自淵𠂻以天下為度而㝎國是則中興之功可期矣取進止綱復上言曰臣竊以河北河東兩路國家之翰蔽也唐杜牧謂河北視天下猶珠璣也天下視河北猶四支也珠璣苟無豈不活身四支既去吾不知其為人故王者不得不王霸者不得不霸猾賊得之足以致天下不安其地勢風俗使然也而河東實為天下之脊介於河北陜西之間其地險固其民堅忍其俗節儉其兵勁悍祖宗得天下削平僭亂㒺不臣服惟河東最後再駕而後得之其難如此而靖康之初金人犯闕以孤軍入重地我之守禦固而援師集其勢不難於和宰相失䇿欲脱一時之禍而不為久長之計凡所邀求一切許之遂割三鎮而河北河東之地㡬去其半及敵兵退三鎮兵民為朝廷固守中山真㝎及㳂邊諸郡既已保全而敵盡力以圍太原不肯捨去朝廷遣使以兵民之意及保塞陵寝之故願輸租稅以易疆土金人且許且攻㡬年而太原䧟猶信譎詐以講和不為備禦之䇿至其渡河再薄都城遂盡割兩路以與之畫河以為界遣執政侍従郎官數十軰分詣交割皆為兩路之人所殺夫朝廷割地不足以塞金人貪婪之欲而適足以失兩路士民之心使地割而和可成宗社遂安猶之可也今乃假和議以欵我既破京師挟二聖以北狩脅逼臣寮僭竊神器矣而議者猶以割地為然此何理哉河北西路三帥府二十餘郡靖康末所失者真㝎懐衛濬一帥府三郡而已其餘至今皆堅守一路兵民有城郭者依城郭無城郭者依大河山西自相結集多者數萬少者不下萬人各立首領以相統率知名號者已數十處日以蠟書號籲朝廷乞師請援願為前驅因而循撫為吾之用數十萬衆不日可致而金人留兵懐衛濬三郡以扼吾要津每郡不過三千人其餘皆脅制吾民剪髪易衣以疑我耳大兵臨之遣間要約必有應者則三郡不旬月間可復也三郡既復則真定可圖而中山之圍可解河北復為我有矣然後第功行封以河外郡縣悉議封建使自為守朝廷量力以助之則藩籬固而中原寜此今日之要䇿也河東之勢亦然但所失州郡視河北為多然所以處之之䇿亦無以過扵此者臣愚欲乞於河北西路置招撫司河東路置經制司擇文武臣寮中有材略名望素為兩路兵民信服者為之使副布宣朝廷徳意以結其心信賞必罰以作其氣訓練習服以教之戰量補名目以旌勸其首領寛給錢穀以賑貸其乏絶辟置寮屬将佐乗機應變一切許以便宜從事則兩路可以復全中興之功指日可成必自此始猶捍水患於決溢之口則下流無泛濫之虞禦盗賊扵門墻之外則堂奥有安靖之勢理之必至也倘捨此而不為則兩路之人且歸怨於朝廷强壮狡獪者反為敵用将何以待之故臣以謂今日之所當先務者無急於此惟睿斷不疑特従所乞天下不勝幸甚綱又上言曰臣竊以國家都汴處中以臨四方垂二百年靡有變故豈特仁徳足以結萬邦之心亦由以中制外據天下之利勢使之然也方今多難之際不可定都以權時冝固有所不得已者然宗社朝廷一遷天下之勢必有偏而不起之處中原揺動卒難復安此臣所以夙夜思慮欲為陛下權天下之勢以濟長久之䇿也古者帝王有廵幸之禮故虞舜五載一廵狩羣后四朝而成王撫萬邦廵侯甸見扵周官之書今四方多故宜講廵幸之禮以鎮撫之除四京外以長安為西都襄陽為南都建康為東都各命守臣營葺城池宫室官府使之具儲峙糗糧積金帛以備廵幸陛下時乗六龍鑾輿順動以天臨之覧觀山河之形勝省察牧守之治忽撫士民問風俗収豪俊之用以掃邉塵復境土然後復據河洛而都之此今日權宜之上䇿也用臣此䇿其利有三藉廵幸之名國勢不失於太弱一也不置定都使敵人無所窺伺二也四方望幸使奸雄無所覬覦三也至於費用則長安當委之四川襄陽當委之荆湖建康當委之江淮閩浙深戒守臣因陋就簡勿事壮麗具圖来上惟取便安因縁騷擾者重寘于法則三都成而天下之勢安矣議者謂車駕當且駐蹕應天以繫中原之心或謂當遂幸建康以紓一時之患臣皆以為不然夫汴京宗廟社稷之所在天下之根本也陛下嗣登寳位之初豈可不一幸舊都以見宗廟社稷慰安都人之心下哀痛之詔擇重臣以鎮撫之使四郊畿邑之民乂安益治守禦之具為根本不拔之計㢤天下形勢關中為上襄陽次之建康又次之今捨上中而取其下非得計也宜先期降勅榜曉諭軍民及以脩謁陵寝為名擇日廵幸據要會之地以駐六師既有以繫中原之心又有以紓一時之患䇿無出扵此者臣愚伏望聖慈斷自淵衷詳酌而推行之天下不勝幸甚綱又上言曰臣以愚陋誤䝉聖恩擢任宰相初對之日甞以廵幸之議冒瀆天聰其意以謂京師初經殘破之後理難固守然車駕不可不一到以慰天下之心然後鑾輿順動法古廵狩之禮以行四方西則關中南則襄陽東則建康以天下形勝之勢觀之關中為上襄陽次之建康為下伏䝉睿慈特採其議已降指揮京師催促脩城祗偹謁欵宗廟而永興襄陽建康皆令葺治宫室以俟翠華之幸臣累留身奏事論及天下利害安危所繫之大者未甞不以此為言甞䝉宣諭但欲先迎奉元祐太后及遷六宫如建康并禁衛家屬願遷徙者亦津遣南去而車駕獨留中原選将屯兵以衛行在雖關中可往雖金人可戰臣竊仰陛下英睿果斷如此雖古創業中興之主如漢之髙祖光武唐之太宗不是過也昨日忽被手詔宣諭京師未可往而欲為大王避狄之計廵幸東南擇形勝之便利逺水火之焚溺来春還闕聚糧屯兵為守禦攻討之計令臣條具合措置事務以聞臣伏讀愕然未喻聖意不知天慮與前不同果以為當如此耶将左右大臣宻獻此説姑従其䇿耶如天慮果以為當如此臣竊以為未然而左右大臣宻獻此説則臣竊歎其未甞深思逺慮姑欲脱一時之患而不知禍難之在後也夫京師宗廟所在陛下即位之初禮當一到徒以城池之脩未偹而防秋之期已廹勢有未可往者臣固不敢力争至扵廵幸東南以避狄則臣不知車駕果将安之耶若欲岀扵下䇿遂往建康則臣恐天下之勢傾而中原不復為我有矣請為陛下試詳言之夫陜西者中國勁兵健馬之區也河北河東者中國之屏蔽也京畿及京東西者中國之腹心也江淮荆湖閩浙川廣者中國之支𣲖也今與鄰國争屏蔽之地不能保腹心以號召勁兵健馬與之馳逐而欲自竄於支𣲖之鄉臣恐天下之勢偏而不舉敵騎深入號令不行州郡莫相救援皆将碎扵敵手敵以精兵驚擾京東控制淮楚陛下雖欲還闕不可得矣況欲屯兵聚糧議攻守計以迎二聖哉王命不通盗賊蠭起殺害官吏屠䧟城邑如今之河北兵民不待金人然後為害自江以南皆當揺動不知獻䇿之臣果能保其必安乎夫江之廣不如河江之險不如河江之湍激不如河金人渡河猶不能禦江豈可恃而南人之輕脆非北人之比敵至則潰南方之城壁非北方比敵攻則破陛下必以幸建康為安臣愚竊以為過矣夫利在耳目之前患在一世之後中智以上乃能知之今欲乗舟順流而東其安便比於鞍馬之間何啻相百逺幸江湖之濵其閒適比於兵革之際何啻相萬然偷取一時安適而忘禍患之在後獻説者如此臣愚竊以為不思之甚矣為今之計縱未能行上䇿以趨關中莫若取其次䇿以適襄鄧襄陽近為李孝忠所據雖已潰散恐或殘毁惟鄧為可以偹車駕之時廵夫鄧者古之南陽光武之所興也西鄰關陕可以召兵北近京畿可以遣援南通巴蜀可取貨財東達江淮可運穀粟有髙山峻嶺可以控扼有廣土寛城可屯重兵民風號為淳固盜賊未甞侵犯此誠天設以待陛下之臨幸事之機會不可失也願詔守臣増修城池漕臣儲峙糧草朝廷給降錢帛廣行應副專遣使者以督其事将来秋髙六飛啟行由陳蔡唐以趨南陽不過半月可達天下之士知陛下之不忍棄中原也河北河東之民知陛下之不逺徙也天下郡縣知陛下之處中以臨四方也皆當心服而無解體之患是一幸南陽則三者皆得一幸建康則三者皆失利害安危之機在此一舉陛下何憚而不行也臣愚伏望聖慈斷自淵衷従臣之言勿是先入之説天下不勝幸甚綱又上言曰臣前已具劄子論車駕廵幸京師城壁未可保守修葺未備當權時之宜駐蹕南陽據天下之中以號令四方不宜東幸建康棄置中原以失天下之心伏䝉聖慈令與執政同議然前䟽未盡區區之意敢昧死再陳之臣聞自昔人主當草昧艱難之時或與英雄角逐或為寇盜所侵皆據地利而莫肯先退盡人力而莫肯先屈夫勝天下者必以勢而據地利莫肯先退者勢也盖天下者必以氣而盡人事莫肯先屈者氣也漢髙祖與項羽戰於滎陽成臯間相持累年髙祖雖屢敗不肯退尺寸之地既割鴻溝羽引而東遂有垓下之亡曹操與袁紹戰於官渡操雖兵弱糧乏不肯解去既焚紹輜重紹引而歸遂䘮河北由此觀之與勍敵争勝負豈可不據天下之勢而先自退㢤唐之初突厥頡利以數萬騎飲馬渭水去長安纔數十里太宗以七騎臨渭上與語以大義折之既而王師大集旌旗戈甲光彩精眀頡利震怖遂以請和本朝景徳中契丹以數十萬寇澶淵真宗渡河親征射殺所謂統軍達蘭者彼主惶懼遂亦請和而去兩朝盟好凡百餘年由此觀之為敵人所侵豈可不作天下之氣而先自屈哉今金人雖號為勍敵其實皆中國失䇿養之使然考其兵之强盛豈能過項籍袁紹其敢深入豈能過頡利契丹而吾方其未至之時已相與震怖委棄中原而自竄於江湖之間既失天下之勢又索天下之氣不知敵騎果復渡河攻圍我城邑屠戮我人民以精兵控扼淮泗而王命為之不通盜賊蠭起所在竊發跨州連邑自相建置将何以待之且今之所恃者兵也陛下毎欲聚西北之兵十餘萬日加訓練以待親征睿謀壮矣既適建康不知此兵将何所用夫建康水鄉其土卑濕其食魚稻非西北之兵所利不産粟麥稈草土氣多熱非西北之馬所便往年方臘起於江浙朝廷遣西兵討之疾病物故者三之二而馬之存者無㡬由此觀之欲聚西北之兵而適建康猶資章甫而適越也惟南陽可為今冬駐蹕之計賴天之休陛下聖徳所感河北河東兩路兵民戴宋之心借使敵敢深入邀截掩擊中國得一勝則天下之勢壮而氣振矣然後降親征之詔率天下之師問罪以迎二聖之鑾輿決有轉危為安撥亂反正之理在陛下自强不息力行之而已臣偹位宰相不惟仰荷特逹之知思自竭盡以報萬一天下之責交歸謀慮一有不當何以塞之伏望聖慈斷自淵衷察臣孤忠勿為羣議所惑天下不勝幸甚時上議遣使于金綱奏曰堯舜之道孝悌而已孝悌之至可以通神眀陛下以二聖逺狩沙漠食不甘味寝不安席思迎還兩宫致天下養此孝悌之至而堯舜之用心也今日之事正當枕戈甞膽内修外攘使刑政脩而中國强則二帝不俟迎請而自歸不然雖冠盖相望卑辭厚禮恐亦無益今所遣使但當奉表通問兩宫致思慕之意可也紹興五年綱提舉西京崇福宫上言曰右臣伏奉詔書以偽齊金人兵馬退遁令臣深思熟講凡今攻戰之利守偹之宜措置之方綏懐之略條具来上臣仰荷聖恩憐臣孤跡甞備位扵近司察臣迂愚有千慮之一得雖以罪戻屏伏海濱曽不遐遺以國家邊防恢復大計特降清問顧臣學術闊疎智識淺短何足以稱詔㫖而禆廟畧之萬一敢竭狂瞽以塞眀命伏惟陛下留神採擇臣不勝幸甚臣竊以僭逆之臣挟强悍之敵提兵南嚮俶擾淮壖其意盖料朝廷蹈前日退避之轍得以乗間渡江慿陵東南不虞六飛親臨江上號令既行賞罰既眀将士摧鋒俘馘係路虜氣挫屈潛師遯逃此盖陛下睿謨宏逺天威英斷之所致宗社無疆之休中外臣子之共慶也然臣區區之愚竊願陛下勿以敵軍退遁為可喜而以僭逆未誅仇敵未報為可憤勿以保全東南為可安而以中原未復赤縣神州猶䧟扵敵人為可恥勿以諸将屢㨗為可賀而以軍政未脩士氣未振尚使狂寇得以潜逃為可虞則中興之期可指日而俟臣謹考往古之跡揆方今之宜條具攻戰守偹措置綏懐之䇿以獻議者或謂敵軍既退當遂用兵為大舉之計臣竊以為不然譬如奕棊先當自生乃可殺敵生理未固而欲浪戰以僥倖此非制勝之術也髙祖先保關中故能東嚮與項籍争光武先保河内故能岀征以降赤眉銅馬之屬肅宗先保靈武故能破安史而復兩京今朝廷以東南為根本倘不先為自固之計将何以能萬全勝敵又況将士暴露之久財用調度之煩民力科取之困謂宜大為守偹痛自料理使之蘇息乃為得計議者又謂敵軍既退當且保據一隅以茍目前之安臣又以為不然譬如奕棊捨局心而就邊角廹蹙褊小浸以衰微何以取勝秦師伐晋以報殽之師諸葛亮佐蜀連年岀師以圖中原不如是不足以立國髙祖在漢中謂蕭何曰吾亦欲東耳安能鬱鬱久居此乎光武破隗囂詔岑彭曰人苦不知足既平隴復望蜀此皆帝王以天下為度者也不如是不足以混一區宇戡定禍亂又況祖宗之境土豈可坐視淪䧟不務恢復今嵗不征眀年不戰使賊勢益張而吾之所糾合精鋭士馬日以損耗何以圖敵謂宜扵防守既固軍政既修之後即議攻討乃為得計此二者守偹攻戰之序也至於守偹之冝則當料理淮南荆襄以為藩籬夫淮南荆襄者東南之屏蔽也六朝之所以能保有江左者以强兵巨鎮盡在淮南荆襄間故以魏武之雄苻堅石勒之衆宇文拓拔之盛卒不能窺江表後唐李氏有淮南則可以都金陵其後淮南為周世宗所取遂以削弱今朝廷欲為守備則當於淮南東西及荆襄置三大帥屯重兵以臨之東路以揚州西路以廬州荆襄以襄陽為師府分遣偏師進守支郡小築城壘如開新邊其初朝廷應副錢糧謂如淮東則以江東路財用給之淮西則以江西路財用給之荆襄則以湖南北路財用給之徐議營田使自贍養遇有敵軍則大帥遣兵應援稍能自守商旅必通乃可召人歸業漸次葺理假以嵗月則藩籬成矣前有藩籬之固後有長江之險加以戰艦水軍使㳂江一帯帥府郡縣上連下接自為防守則敵兵雖多豈敢輕犯近年以来大将握重兵於江南官吏守空城於江北雖有天險初無戰艦水軍之制故敵人得以侵擾窺伺欲為守偹無他反此而已或謂三大帥率重兵以屯江北則供億之費不貲臣應之曰使三大帥屯兵於江南亦仰給於朝廷其費等耳曷若使之渡江葺理淮南以為家計則朝廷異時可省經費而藩籬之勢成為無窮之利守偹之宜莫大扵是有守偹矣然後可以議攻戰之利亦當分責於諸路大帥謂如淮東之帥則當責以収復京東東路淮西之帥則當責以収復京東西路荆襄之帥則當責以収復京西南北路川陜之帥則當責以収復陕西五路諸路尅㨗因利乗便収京畿復故都以戡大憝此雖落落難合然在陛下志先㝎扵中而斷以至誠必為之意盖無不可成之理至扵擇将之術治兵之政車馬器械之制號令賞罰之權兵家皆有常法無待臣言而戰陳之間因敵決勝臨事制變者兵無常形又不可以預圖也臣願竊以為獻者在勿失機會而已夫機會之来間不容髪以戰則勝以守則固一失其機悔不可追昔劉表悔不用蜀先主之言蜀先主曰天下日尋干戈事會之来豈有終極若能應之扵後則此未足為恨也臣竊觀朝廷近年以来失機會者多矣自今以往如能保淮南荆襄以為固選将練卒厲兵秣馬聚財積穀應機而作則以弱為强取威定亂扵一勝之間僭逆之臣可正藁街之誅强悍之敵豈無頓刄之日攻戰之利莫大於是此二者守備攻戰之䇿也若夫措置之方則臣願先定駐蹕之所盖萬乗所居必擇形勝然後能制服中外以圖事業臨安平江皆澤國褊廹偏霸所據非用武之地惟建康自昔號為帝王天子之宅以其江山雄壮地勢寛博可容萬乗故六朝以来更都之今鑾輿未復舊都莫若權宜且扵建康駐蹕控引二浙襟帯江湖運漕財穀無不便利臣昨於建炎初建議廵幸關中為上襄陽次之建康為下者以天下形勢言之也今以建康為便者以東南形勢言之也然淮南有藩籬之固然後建康可都願陛下與二三大臣熟計之既料理淮南仍詔建康守臣治城壁脩宫闕立官府創營房使粗成規摹以待翠華之幸近年以来車駕所寓因陋就簡諸事草創雖陛下以時方艱難用過于儉然宫室制度亦有不可已者有城壁然後人心不恐有官府然後政事可脩有營房然後士卒可用惟自朝廷應副詔有司以漸脩建庶㡬不擾此措置之方所當先者也綏懐之畧則臣願先為自强之計夫西北之民皆陛下之赤子荷祖宗涵養之徳其意曷甞一日忘宋㢤特制於勍敵之勢為所驅廹䧟於塗炭故捨二百年之本朝而事大不道之僭逆豈其本心惟朝廷之力未能保覆之故數路之民雖困於重斂傷扵峻刑而不能以自歸倘淮南荆襄藩籬既成壤地相接甲兵既備天威震驚必有結約来歸如宿遷之民者必有願為内應如京東郡縣者宜命諸帥優加拊循来歸者給田土内應者予爵賞官吏将士禄秩由舊許之自新孰不感恱朝廷近者得諸路簽軍皆不殺而優䘏之自賊中来歸者皆優與官秩可謂得䇿更願力為自治自彊之計使陷溺之民知所依怙益堅戴宋之心此綏懐之畧所當先者也攻戰守備措置綏懐皆中興之至計今日之急務聖問所及臣已粗陳其梗槩矣臣伏讀詔書有曰朕将虚己以聴擇善而從君臣之間期扵無𨼆利害之決斷以必行臣三復聖訓不知涕泗之交頥也何則君臣之遇號為千載聴言用謀尤其所難未信而言則有謗己之嫌交疎言深則有失身之戒盖雖朋友尚不易言而況於君臣之間乎今陛下求治之切詔㫖如此而臣以憂患之餘孤危特甚欲淺言之則何以副陛下期於無𨼆之訓欲深言之則慮有犯顔逆鱗之愆感懼交中進退維谷雖然陛下當艱危多故之秋詔臣以丁寜惻怛之意緘黙不言臣則有罪有君如此其忍負之敢冐鼎鑊刀鋸之誅以布心腹腎腸之實惟陛下幸察臣竊觀陛下有聰眀睿智之資有英武敢為之志然自臨御迄今九年國不闢而日蹙事不立而日壊将驕而難御卒惰而未練國用匱而無贏餘之蓄民力困而無休息之期陛下憂勤雖至而未足以成中興之業者則羣臣誤陛下之故也陛下自近年以来所用之臣凡㡬人慨然敢任天下之重建事立功與夫充位備貟者皆不逃於聖鍳夫用人如用醫必先知其術業可以己病然後使之進藥而責成功今扵醫者之術業初不詳究而姑試之則雖日易一醫何補病者殆将飲藥以加病而已平居無事小廉曲謹初似無過而乏濟時之大畧忽有擾攘之故則錯愕無所措手足不過奉身以退天下憂危之重委之陛下而已不知何補於國家陛下亦安取此大概近年所操之説有二閒暇則以和議為得計而以治兵為失䇿倉卒則以退避為愛君而以進禦為誤國衆口和之牢不可破然累年之間冠盖相望而初不得其要約翠華䝉塵而尚未有所定居上下茍且偷安而不為長久之計天歩艱難國勢益弱職此之由大運有開天啟宸衷超然逺覧悟前日和議之失而親總六師懲前日退避之非而親臨大敵逆臣勍敵數十萬衆飲馬江干雖未能掃蕩邀擊盡復邉疆而天威所臨已足以使之震怖不敢南渡潜師宵奔則和議之與治兵退避之與進禦其效槩可覩矣今敵軍雖退而其情狡獪變詐百出未大懲創疆場相望道里不逺安知其秋髙馬肥不再来擾我使疲於奔命㢤是宜眀詔於却敵之初求善後之䇿也臣夙夜為陛下深思所以為善後之䇿者無他在盡反前日之所為解琴瑟而更張之先定其論如奕棊之立意後圖其功如奕棊之置子必可得志臣請陳其説竊觀自古創業中興之主必以兵勝而為親征之計者其意豈謂必冒矢石履行陣而後可㢤黄屋所臨人心自固賞罰既當士氣奮張用能成功故髙祖既得天下擊韓王信陳豨黥布未甞不親行光武自即位至平公孫述十三年間無一嵗不親征本朝藝祖太宗㝎維揚平澤潞下河東皆躬御戎輅真廟亦有澶淵之行措天下於大安此所謂始於勤勞終於逸樂者也退避之䇿可暫而不可久可一而不可再退一歩則失一歩退一尺則失一尺往時自南都退而至於維揚則關陕河北河東失矣自維揚退而至扵江浙則京東西失矣萬一有敵騎南牧復将退避不知何所適而可航海之䇿萬乗冒風濤不測之險此尤不可者惟當於國家閒暇之時眀政刑治軍旅選将帥脩車馬備器械峙糗粮積金帛敵来則禦俟時而奮以光復祖宗之大業此最上䇿杜牧所謂上䇿莫如自治也臣願陛下自今以往勿復為退避之計可乎臣又觀古者敵國善鄰則有和親仇讐之邦鮮復遣使豈不以釁隙既深終無講好脩睦之理故耶東晋渡江石勒遣使于晋元帝命焚其幣而却其使彼遣使来且猶却之此何可往假道扵僭偽之國而自取辱無補扵事祗傷國體金人自知罪惡之重懼我必報其措意為如何而我方且卑辭重幣屈體以求之其不推誠以見信決矣器幣禮物所費不貲使軺往来坐索士氣而又邀我以必不可從之事制我以必不敢為之謀是和卒不成而徒為此擾擾也非特如此於吾自治自彊之計動輙相妨實有所害金人二十餘年以此䇿破契丹困中國而終莫之悟夫辨是非利害者人心所同豈真不悟㢤聊復用此以僥倖萬一曽不知為吾害者甚大此古人所謂㡬何僥倖而不䘮人之國也臣願陛下自今以往勿復遣和議之使可乎此二説者既定然後擇所當為者一切以至誠之意為之先後本末各有次第俟吾之政事脩倉廩實府庫充器用備士氣振力可有為乃議大舉則兵雖未交而勝負之勢已決矣抑臣聞朝廷者根本也藩方者枝葉也根本固則枝葉繁朝廷者腹心也将士者爪牙也腹心壮則爪牙奮今國家逺有盛强之敵國近有僭偽之逆臣所仰以為捍蔽者在藩方所資以致攻討者在将士然根本腹心則在朝廷惟陛下正心以正朝廷正朝廷以正百官使君子小人各得其分則是非既眀賞罰必當自然藩方協力将士用命雖勍敵不足畏雖逆臣不足憂此特在陛下方寸之間耳臣昧死條上六事一曰信任輔弼二曰公選人材三曰變革士風四曰愛惜日力五曰務盡人事六曰寅畏天戒何謂信任輔弼夫撥亂之主履時艱難資輔弼之臣同心同徳相與有為豈易致㢤必如元首股肱之於一身父子兄弟之於一家乃能協濟故髙祖視蕭何如左右手太宗遇房杜如子弟蜀先主得諸葛孔眀如魚之有水不如是不能感會風雲以成王霸之業今陛下選扵衆以圖任遂能捍禦大敵可謂得人矣然臣願陛下待以至誠無事形跡久任以責成功勿使小人得以間之則君臣之美垂裕無窮昔髙祖終始用蕭何太宗終始用房杜故能勘亂㝎功卒致太平管仲有言曰知人而不能用害霸也用而不能信任之害霸也信任而使小人㕘之害霸也霸者猶如此而况於欲恢復天下者乎魏鄭公有言曰君臣同心是謂一體豈有置至公事形跡若上下共由兹路邦之興䘮未可知也夫事形跡者未必有過舉而魏公以為興䘮未可知者凡以無至誠相與之意而惟嫌疑之為避不足建興邦之大績故也陛下誠能推信任之誠臣将見輔弼任責而中興之業不難致矣何謂公選人材夫治天下者未甞不資於人材而創業中興之主所資為尤多何則繼體守文率由舊章得中庸之材亦足共治至於艱難有為興衰撥亂則非得卓犖􅉞偉之材未易有濟故武王之有十亂宣王之有吉甫方叔召虎髙祖之有三傑光武之有鄧禹耿弇吴漢之屬太宗之有房杜英衛之流憲宗有裴度武宗有李徳裕皆以不世岀之材佐大有為之主􅄁翊佐佑以成大業古今通道其可忽諸然自昔抱不羣之材者多為小人之所忌嫉或中之以黮闇或指之為黨與或誣之以大惡或摘之以細故而以道事君者不可則止難扵自進恥扵自眀雖負重謗遭深譴安扵義命不復自辨惟至眀之主為能察小人之情偽而辨其臣之非辜此霍光所以見察扵昭帝房喬所以見信於太宗也陛下臨御以来用人材多矣世之所許以為正人端士者往往閒廢扵無用之地豈非罹此謗耶遂使陛下寤寐側席而有乏材之歎懐材抱義願為國家宣力者無因而進前陛下盍亦少留聖意致察扵此洪範皇極之疇曰無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平好惡偏黨皆足以為至公之累惟以道為公而無好惡偏黨之私則王道眀矣魏鄭公亡太宗遣人至其家得書半藁其可識者曰天下之事有善有惡任善人則國安用惡人則國弊公卿之内情有愛憎憎者惟見其惡愛者止見其善愛憎之間所宜詳慎若愛而知其惡憎而知其善去邪勿疑任賢勿猜則可以興矣太宗感悟夫人主豈能無愛憎然必去愛憎而後得人以興者愛憎出於私情用人以興邦必由扵公道故也管仲雖仇齊公必用雍齒雖怨漢祖必賞而况其餘乎陛下誠能推至公之道臣将見人材軰出中興之業不難致矣何謂變革士風夫用兵之際似與士風初不相及然其實相為表裏者也士風淳厚則議論正而是非眀朝廷賞罰功罪當而人心服此措置所以得宜而寖眀寖昌也士風澆薄則議論不正而是非不眀朝廷賞罰功罪不當而人心不服此措置所以失冝而寖微寖弱也晋之士風尚虚浮而不事事故當時措置乖謬盜賊並起而有五戎亂華之禍本朝嘉祐治平以前士風何其淳厚也自數十年来非特不事事而已奔競争進議論狥私邪説利口足以惑人主之聴元祐大臣如司馬光之流皆持正論為朝廷長慮却顧圖久逺之計社稷之臣也而羣枉嫉之指為奸黨聴其言則大者可族小者可誅賴國家寛仁祗従竄逐其士風逓相倣俲顛倒是非變亂白黒政事大壊以馴致靖康之變非偶然也殆今四十餘年世變風移愛憎之情銷盡然後朝廷始知元祐羣臣之忠褒贈官秩録用子孫然已何補於事曷若早變此風則忠臣無誅謫之寃國家有治安之實兩受其利豈不美㢤臣觀近年士風尤薄随時好惡以取世資不顧國體惟欲進身不覈事實惟欲傷人大詈則大進小詆則小遷潝訿成風此非朝廷之福也陛下得一張浚付以重權使禦强敵扵關陕浚雖以忠許國而事失機會不為無過言者痛䋲醜詆誣以大惡豈不太甚歟浚有浴日之功足以結陛下之知有大臣之辨足以回陛下之聴故得自洗濯復侍清光扵帷幄之中然其所傷已多矣藉使遭謗困讒之臣無浚之功又無大臣為之辨白而有下石以擠之者則何以自雪扵君父冀察其不然㢤夫朝廷設耳目及獻納論思之官以廣視聴固許之以風聞至扵大故亦須覈實使果如其言則誅責所加豈宜止従輕典使言而無實則誣人之罪伏讒蒐慝得以中害善良皆非所以修政也臣願陛下降眀詔以戒諭士大夫使體徳意從忠厚變近年澆薄之風昔賈誼勸文帝養人臣以禮義亷恥陸贄勸徳宗聴言必考其實而察其情以正典刑不宜兩置而不問皆治道之要陛下誠能行責實之政臣将見士風淳厚而中興之業不難致矣何謂愛惜日力臣聞之周書曰功崇惟志業廣惟勤盖功以志崇所以為之規摹也業以勤廣所以為之積累也猶建大厦堂室奥序其規摹可一日而成至於鳩工聚材則積累非一日所致創業中興何以異此髙祖得韓信與之論亡椘之䇿光武得鄧禹與之論興漢之謀蜀先主得諸葛亮與之論鼎立之計皆㝎於談笑之間而髙祖以五年成帝業光武以十三年混區宇先主得蜀亦在數年之後盖積累而致者如此今陛下臨御九年于兹境土未復僭逆未誅仇敵未報尚稽中興之業則其始不為之規摹其後不為之積累故也邊事粗定之時朝廷所推行者皆簿書期會不急之細務至於攻討防守之䇿國之大計皆未甞留意安得不為僭逆之臣强悍之敵之所窺伺然則自今以往其可不惜日力㢤昔禹不貴尺璧而惜寸陰今日朝廷艱難乃惜分陰之時臣願陛下詔二三大臣熟議所以規摹者凡所施為畫一條具如立課程以次施行又詔州縣使體陛下徳意而奉承之所立期限勿太遽以致搔擾勿太緩以失機會使事得其序不擾而辦乃為得䇿夫天下無不可為之事亦無不可為之時惟失其時則患之小者日益大事之易者日益難正如醫者之治病其在皮膚針烙及之其在五臓湯劑及之至於骨髄則雖有扁鵲俞跗蔑以為矣此時之所以不可失也詩曰迨天之未陰雨徹彼桑土綢繆牖户今此下民或敢侮予孟子曰國家閒暇及是時眀其政刑雖大國必畏之矣夫用智者當於未紛擾之前千日聚之以待一日之用渇而穿井闘而鑄錐其能及乎陛下誠能存愛日之心将見為無不成中興之業不難致矣何謂務盡人事臣竊觀天人之道其寔一致人之所為即天之所為也國之将興百度皆舉天實佑之猶之農夫盡其穮蓘之力乃亦有秋使未甞致耕耨之勤而欲望稼穡之利其可得耶天不人不因人不天不成人事盡扵前則天理應於後自然之符也光武以兵三千攻尋邑百萬者人也適雷電風雨遂有昆陽之勝而中興之運啟者天也孫權以兵三萬拒曹操數十萬者人也適風順可以縦火遂有赤壁之㨗而鼎足之勢成者天也謝安以兵八千擊苻堅百萬者人也適秦師小却遂有淝水之功而東晋之祚延者天也創業中興之主莫不皆然盡其在我者而以其成功歸之於天孟子曰君子創業垂統為可繼也若夫成功則天也今未甞盡人事敵至則先自退屈而欲責功扵天其可乎臣願陛下詔二三大臣協心同力務盡人事以聴天命則恢復土宇翦屠鯨鯢迎還兩宫必有日矣夫人心即天心也下得人心上合天心則無不成之功陛下誠能和同天人之際臣将見中興之業不難致矣何謂寅畏天戒夫天之扵王者如父母之扵子愛之至則所以為之戒者亦至是以孔子作春秋於灾異必書以謹天戒臣觀商之盛如武丁周之盛如成王漢唐之盛如文景太宗之時未甞無天變而不為災者以能寅畏其戒而仰合其心也是知人主之於天戒必恐懼脩省以致其寅畏之誠則能變灾以為祥天人之際何其昭昭然也比年以来熒惑失次太白晝見地震水溢或久陰不雨或久雨不霽或當暑而反寒乃正月之朔日又食之此皆天意眷佑陛下丁寜反覆以致告戒陛下雖甞降詔俾士大夫各脩厥職以答天譴然臣竊謂應天以實不以文此在陛下以至誠之意正厥事以應之昔宋公一言而妖星退舍大戊桑穀共生扵朝而反以為祥陛下誠能行應天之實臣将見百祥来止中興之業不難致矣此六者皆陛下所當先務正心以正朝廷者故糞土愚臣忘生觸死為陛下詳言之抑臣又聞聖人不畏多難而畏無難或多難以固其國啟其疆土或無難以䘮其國失其土宇昔少康以一旅之衆而祀夏配天不失舊物光武太宗皆躬擐甲胄履危險而身致太平享國長久今朝廷人材不乏将士足用江淮荆浙閩廣川陕財用可理足以為中興之資陛下勇智天錫春秋鼎盛欲大有為何施不可要在改前日之轍斷而行之耳昔仲虺之稱湯不稱其無過而稱其改過不吝盖帝王之度如天地之無心是則行非則改何憚之有酈食其勸髙祖鑄印以封六國之後子房一言則趣銷之封徳彛勸太宗用刑法以威天下魏鄭公一言則行仁義遂致貞觀之治無損盛徳而大功可成豈竊竊然畏人之議己哉陛下視建炎以来其所措置是耶非耶以為是則何以不見其效以為非則安可復蹈其轍臣前所陳皆改轍之道非循舊跡所能為也擇善而従斟酌而行則在陛下夫以祖宗二百年之基四海億兆之生靈皆繫扵陛下清燕之間聖慮及此得不慄慄危懼勉勉自强上以慰祖宗在天之靈下以副四海生靈之望㢤昔周宣中興南征北伐之威復古接下之美詠扵小雅盖有文武之吉甫顯允之方叔以為之将帥有孝友張仲以在其左右故能内脩政事外攘夷狄復文武之境土然則陛下所當法者深考周室之詩則得之矣所謂善後之䇿何以加此臣以至愚極陋之質荷陛下非常特達之知龍飛之初虚席以待眷遇之禮邁於等倫特以志廣材踈自度不足以任天下之責力丐罷政無補國事每自愧惕違去闕庭九更寒暑犬馬之心何甞不在赤墀之下自以罪戾逺屏不敢復與世故芻蕘之言久不上達近者邊報警急戎輅親臨臣子之情不勝憤懣故敢冒昧以三䇿為獻伏䝉聖慈特降詔書奨諭今者又奉詔㫖咨以當世之務而臣不量荒淺冒進狂瞽之説以瀆天聰昔太宗謂魏鄭公為敢言謝曰陛下導臣使言不然其敢數批逆鱗㢤今陛下盛徳過扵太宗臣雖無魏公之敢言然展盡底藴亦思慮之極也良藥苦口而利扵病忠言逆耳而利於行在陛下察之而已况臣自經憂患衰病交攻氣息奄奄日與死廹常懼先犬馬填溝壑無以報盛徳之萬一今得奉眀問攄至情臣願足矣雖死之日猶生之年也伏望陛下哀憐赦其愚直而取其拳拳之忠實天下之幸歴代名臣奏議卷八十四
