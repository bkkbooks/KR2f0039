body:
  text: 歴代名臣奏議卷二百十六明楊士竒等撰慎刑宋太宗太平興國中詔羣臣言事知睦州桐廬縣刁衎上諌曰刑書謂淫刑酷法非律文所載者望詔天下悉禁止之巡檢使臣捕得盜賊亡卒並送本部法官訊鞫無得擅加酷虐古者投姦凶於四裔今逺方囚人盡歸京闕以配務役最非其宜且神臯勝地天子所居豈使流俗於此聚役自今外處罪人望勿許解送上京亦不留於諸務充役又禮曰刑人於市與衆棄之則知黄屋紫宸之中非用刑行法之處望自今御前不行决罰之刑殿前引見司鉗黥法具並赴御史臺廷尉之獄敕杖不以大小皆引赴御史廷尉京府或出中使或命法官具禮監科以重聖皇明刑慎法之意或有犯刼盜亡命罪重者刖足釘身國門布令此乃小民昧於刑憲逼於衣食偶然為惡義不及他被其慘毒實傷風化亦望减除其法如此則人情不駭各固其生和氣無傷必臻上瑞真宗咸平四年春旱判三司楊覃上言曰古之用刑皆避三統之月漢舊章斷獄報重盡三冬之月又唐太宗凡斷重刑日勅減膳徹樂今春物方盛時雨尚愆輦轂之下獄係甚繁望詔有司死罪未得論决俟雨降乃復常典仍望自今凡决重刑日依唐故事以彰至仁之徳五年通判蘄州錢易乞除非法之刑疏曰臣竊聞聖人之為政也太上以仁其次以智仁智不行上下無信是以刑之設也盖國家不得已而用之約禮從輕察罪肆赦聖人實有憫傷之心焉是以刑之用期扵無刑爾非欲毒扵民也凡考罪之獄則五辭五聽無有疑屈然後擇其時而行之古者痛其不可盡行乃施許贖之典則君之省刑愛民斷可知矣堯之時誅四罪止曰殛鯀扵羽山竄三苖戮驩兠斬共工扵其處然此四罪者皆殺戮滅絶之典也盖堯之仁聖而四者雖凶尚惡言殺是故國之重者莫先乎刑刑之傷者無至扵殺乃修其法式以節其用刑不本扵法則刑黷刑黷則法無㨿法無㨿則國政暴國政暴則臣不敢言臣不敢言則一人專善惡之心以制天下燭理不及則㡬扵亂矣秦任商鞅仁智不行而厚扵法天欲䘮秦而始皇復酷扵民棄三代之法恣一時之威行肉刑族誅之例為秦民者皆寃之殘害父母之體令受苦痛一人有過而九族遭誅漢祖既入闗蕭何以文無害居宰相故約秦之法為三章文帝有徳詔除肉刑此盖秦漢是非明在簡䇿夫古之肉刑者劓椓黥刖之𩔖然此刑者非死刑也以其身命尚存令受其刑後代尚以為虐而絶之死刑者有二焉大斬小絞絞者以首領猶全故分二等百代奉之以為常法有司承式罔敢增變竊見近代以來非法之刑不知建於何時本扵何法律文不載無以證之亦累代法吏不敢言至扵今日乃㦯行之刼殺人白日奪物背軍逃走與造惡逆者㦯時有非常之罪者不從法司所斷皆支解臠割斷截首足坐釘立釘鈎背烙筋及諸雜受刑者身見白骨而口眼之具猶動四體分落而呻痛之聲未息置之闤闠以示徒衆四方之外長吏殘暴更加増造取心活剥所不忍言十五年前杭州妖僧造變數嵗前蜀部兩回作亂事後多用此刑亦恐仁聖之朝不能除之則永為訛法今盖以已死之刑復加臠截斷割此即古之五虐之刑不酷於今矣凡罪當死故重矣刑止扵殺則絞斬行焉而使先受苦痛臠截斷割然後就刑然亦非欲黷扵刑所貴誡扵後人令無犯者臣淳化中寄居夀春縣見廵檢使生釘一賊而扵集衆之際猶盗人物者此豈嚴刑可誡乎若使嚴刑可誡則秦之天下無一黔首為盗賊矣漢文措刑亦亂國矣三代以來當先刑矣齊之以刑亦不當言民免而無耻矣臣愚見以謂一人愛民民亦愛一人既愛扵上則奉上而懼茍以嚴刑欲誡則懼未至而怨已深伏惟陛下仁理天下徳感中外事天地如父母愛赤子如嬰孺僭偽悉蕩祥瑞疊現古帝王不能行之者皆行之近代未復古者悉復之臣恐近代非法之刑非陛下能除之則後代相承益為常行矣臣又竊見唐文皇以人之五臓繫扵背有罪者仍不行鞭背慮傷其命故扵今稱善理天下能保社稷皆曰文皇放死罪四百令歸畢農然後就法至期而無一人不到者此豈在嚴也且近廣州僭稱帝號理廣以酷死扵毒刑湯煎鋸解靡所不至廣民怨之立扵刀刃今之史傳貶以尚刑太祖神徳皇帝平之而絶其法廣民扵今歌頌鼓舞方保其生死亦無怨今㦯非法之刑不除亦恐政闕況割心刖脛獨夫受行之矣為萬古所笑今以此為刑臣耻之陛下亦必耻之非臣盡心報政孰肯言扵陛下非陛下大聖仁慈孰能信臣而行之哉臣不勝深有所望乞自今後明下詔書斷天下非法之刑止存絞斬則仁政王道盡在此矣陛下從而行之則誅臣一身愚直之罪亦幸矣真宗時殿中侍御史趙湘上奏曰聖王行法必順天道漢制大辟之科盡冬月乃斷此古之善政當舉行之且十二月為承天節萬方祝頌之時而大辟决斷如故況十一月一陽始出其氣尚微議獄緩刑所以助陽抑隂也望以十一月十二月内天下大辟未結正者更令詳覆已結正者未令决斷所在厚加矜恤掃除獄房供給飲食薪炭之屬防䕶無致他故情可憫者奏聽敇裁合依法者盡冬月乃斷在京大辟人既當春孟之月亦行慶施惠之時伏望萬機之暇臨軒躬覽情可憫者特從末減亦所以布聖澤扵無窮況愚民之抵罪未斷兩月亦非淹延若用刑順扵隂陽則四時之氣和氣和則百榖豐實水旱不作矣仁宗天聖四年刑部侍郎燕肅上奏曰臣切考唐大理卿胡演進月囚帳太宗曰其間有可矜者豈宜一以律斷因詔凡大辟罪令尚書九卿讞之又詔凡决死刑京師五覆奏諸州三覆奏自是全活甚衆正觀四年斷死罪二十九開元二十五年斷五十八今天下生齒未加扵唐而天聖二年斷大辟二千四百三十六視唐㡬至百倍京師大辟雖待覆奏而州郡之獄有疑及情可憫者至上請而法守多所舉駁官吏率得不應奏之罪故皆増飾事状移情就法失朝廷欽恤之意望准唐故事天下死罪皆得一覆奏議者必曰待報淹延臣則以為漢律皆以季秋論囚又唐自立春至秋分不决死刑未聞淹延以害漢唐之治也仁宗時監察御史裏行包拯請令提刑親按罪人疏曰臣伏見國家設按刑之司盖慮郡縣長吏㦯不得人刑罰􅁈濫俾之糾察而大獄出入未嘗按問細故增減即務舉劾是小過必察而大罪不訶何以副聖人欽恤之意㢤今敢畧舉一二以明之臣昨任端州日獄中重囚七人具案已就適㑹提刑司廵歴将至聞其未斷即遷延引避又隣近春州禁勘罪人追捕甚衆縲繫二百餘日凡該大辟罪者四五人徒罪不少亦不聞提刑司推究淹延之状洎轉運司取公案委官定奪果有失入死罪等雖官吏悉行重典而死者不可復生竊恐天下刑獄似此寃枉者至多雖前後累降詔勅丁寧罕㦯遵守臣欲乞今後諸州凡勘大辟罪不以軍賊百姓五人已上并出違日限者並委提刑司畫時親徃審問决斷所冀刑獄無㦯􅁈濫知陜州吳育乞今後毋輕置詔獄疏曰臣聞先王凝旒黈纊不欲聞見人之過失有犯典憲即屬之有司按文處斷情可矜者猶㦯特從寛典如此則恩歸主上而法在有司人被誅殛死亦無憾祖宗以來不許刑獄司状外求罪是以人人自安近傳三司判官楊儀下獄自御史臺移勘都亭驛械縛過市萬目随之咸共驚駭不測為何等大獄及文案具乃止坐請求常事非有枉法􅂍賄又𫝊所斷罪名法不至此而出朝廷特㫖恐非恩歸主上法在有司之意也且儀身預朝行職居館閣任事省府使有大罪雖加誅斬自有憲章茍不然者一旦至此使士大夫不勝其辱下民輕視其上非所以養㢘耻示敦厚也自古刑獄滋彰之時誅家滅族寃枉大半大抵雷霆方振人莫敢言有司以深就深各圖自免或因而為利以希進取使君恩不得下達人情不得上通感傷至和灾變百出陛下為四海愛戴之主忽使道路之口紛紛竊議朝廷之士人人自寃此臣所以深為陛下痛惜之也若儀罪未斷臣不敢言今事已徃且無救解之嫌止祈聖神此後詳審庶事毋輕置詔獄具案之上自非情涉巨蠧且從有司論讞不必法外重行如此足以安人心静風俗養㢘耻召和平天下之幸也知諫院司馬光上奏曰臣等伏聞皇城司親事官奏報有百姓殺人私用錢物休和事下開封府推鞫皆無事實欲勾元初廵察人照勘其皇城司庇䕶不肯交付臣等竊以祖宗開基之始人心未安恐有大姦隂謀無狀所以躬自選擇左右親信之人使之周流民間密行伺察當是之時萬一有挾私誣枉者則斧鉞随之是以此屬皆知畏懼莫敢為非今海内承平已踰百年上下安固人無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉委此屬摭其過失廣作威福公受貨賂所愛則雖有大惡掩而不問所憎則舉動語言皆見掎摭臣等常病國家擇天下賢才以為公卿百官而猶不可信顧任此廝役小人以為耳目豈足恃㢤今乃妄執平民加之死罪使人幽縶囹圄横罹楚毒幸而不自誣服僅能辨明若更不聽有司詰問元初廵察之人少加懲戒臣恐此屬無復畏憚愈加恣横使京師吏民無所措其手足此豈合祖宗之意㢤伏望朝廷指揮皇城司令送元初廵察人下開封府推問本情㦯别有仇嫌㦯察訪鹵莽各随其狀依法施行仍自今後永為定制庶可以塞欺罔之源絶侵寃之門以全國家至公之道張方平上論曰臣伏以先帝勤恤有邦明慎庶獄故内制審刑之職以覆天下之辯外布提㸃刑獄之司受民詞牒使侵枉無辜之人有所訴告得察舉州縣二千石已下羣吏一道百城糾攝千里其選任甚重夫吏民之訟州縣不得其情而能復扵外臺者固鮮矣外臺不為受則已矣鄉鄙之民有能立扵肺石者乎是故天下常有寃人常有滯訟今之有是司是為民更開取直之一門矣豈非國家盡心扵小大之獄者歟然今各所部廣者至數十郡而按行封域不許分途故終歳廵歴不逾一再窮乏之民投訟既不能逺就疑滯之繫有濫㦯不能盡聞臣愚以為逐路可立廨扵道里之中一人行一人處行者察郡縣之治處者受吏民之訟使訟者有常適治者有所憚又臣比見州縣羣吏有以剛介忤長吏及為衆所惡忌者㦯以微犯下獄遂至非命臣愚以為應州縣吏抵罪而當繫鞫者本屬州郡列其犯狀以聞提㸃刑獄司本司攝取劾焉其應對辨者移州追遣夫官吏抵罪既非常有處者一人可以訊之矣㦯就繫者積三人以上即報白行者還同鞫焉如此則長吏雖有凶暴之人而下吏不罹枉濫之酷夫郡政之舒慘由長吏之仁暴其有貪殘自用蔽昏昧理倚法以削恣情無憚則是流虐被境人孰敢遏雖有掾佐地卑而勢弱盖亦徒展螳蜋之臂雖有介貳事同而力亞孰肯輕犯豺狼之口故多容容自守循循引避不唱和者難矣能持執者鮮哉又況以中人而居下位罕不承風而迎意者也近如蘄州王䝉正之姦暴林宗言之侵辱其可知矣且宗言朝士䝉正員郎官叙固相亞埒守宰未為逺絶以地居控轄摧屈至然又況尊卑不侔位貎相邈者乎死為宜矣故臣請官吏抵罪當繫者付提㸃之司劾焉則庶乎盡情偽之實免鍜鍊之枉誠用刑之一益也方平又上論曰臣聞刑罰不中則民無所措手足夫刑者治之末路也然古帝明王所以輔徳教非必刑人殺人劓刖人而後為刑也故舜稱臯陶曰汝作士明扵五刑以弼五教期扵予治刑期扵無刑民協扵中惟兹臣庶罔㦯干予正時乃功懋㢤而臯陶歸美扵帝曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延扵世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽扵民心兹用不犯扵有司此言君能以徳撫民臣能将順其美乃大明服致時雍熙故至於無為而治也三代之王歴世治主孰不慎求理官之良以决刑法之平㢤在周文王則曰罔攸兼扵庶獄庶慎惟有司之牧夫武則蘇公式罰穆則甫侯訓刑西漢則釋之定國以寛平名於文宣之朝東都則郭躬陳寵以矜恕稱扵明章之際凡人主存慮扵欽恤則有司盡心扵讞當夫刑者有滛有濫有破家覆族人命之所繫可不重歟夫刑者有生有殺有亂邦危國主柄之所在可不慎歟未有不由寛慈恵和以得衆未有不由慘虐酷毒以失民立官選才蔽要處當兩造備具五辭簡孚小大之情鰥寡無盖一成之法三尺具存而舞文巧詆之人曲致希合之吏猶㦯髙下其手輕重在心鈎摭鍜磨罔用靈制又況多張羅穽旁開詔獄理官不得而議廷臣不聞其辯事成近習之手法有二三之門㢤是人主視天下以私而大柄所以失扵下亂所由生也漢唐之覆車軌迹猶在漢有亂政而立黄門北寺之獄唐有亂政而起神䇿北軍之獄二辟之興皆弊世也大凡强臣擅命女君臨朝率多作為刑獄以威制天下而官有二辟流虐尤甚濟其賊害䲭義姦宄奪攘矯䖍誣染善良屠陷吉士邪枉熾結寃横棼淪惟詐惟内惟貨惟來漢自黨事之起芟夷俊乂邦國殄瘁朝野分離泯泯板蕩而至頽亡唐自晚節雖將相大獄亦成扵閽寺更復羅織豪人没取財貨書云典獄非訖扵威惟訖扵富言當先絶乎賕賂也扵後南北乖剌民庶怨愁陵遲鬱否以成危亂故知刑罰者人主大柄天下公器非所以假人者也法一傾而上下危矣我國家襲仁重熙明徳慎罰震曜殺戮具嚴天威平康正直審用中典惟良折獄何擇非人慎測淺深之量必附寛平之比忠愛恩恵在人骨髓可謂祥刑寛法率乂無濫矣然頃嵗王府鞫獄㦯以中人臨訊有司承㫖頗復侵急扵時識者懼履霜之漸已有寒心者矣而陛下神斷英彂天徳剛健威福不假雷霆自然逺暨躬攬萬機首為辨洗斥逺招權之孽擯去隂佞之猾明明棐常白日開照可謂立法垂制之大智聦明叡武之英主㢤臣愚伏願陛下顯示明制垂戒無窮俾刑罰之權非有司不得專無容自外干預庶属于五極咸中有慶永貽百世監于我祥刑詩曰宜民宜人受禄于天書曰一人有慶兆民賴之夫受天之休為民之福徳之甚盛其惟慎刑乎審刑院詳議官孫抃上奏曰臣聞書云官師相規工執藝事以諫臣不肖親逢寛仁之主為執法吏輙原刑罰之本願効愚忠惟陛下幸憐赦臣以畢其說竊惟前世肉刑之設斷肢體刻肌膚使終身不忘以至屨賤踊貴有鼻者醜刑罰之濫乃如此漢文感緹縈之意謂刑者不可復属雖欲改行為善其道無由故扵肉刑易之以鞭笞曰斬左指者笞五百劓者笞三百然已死而笞未止外有輕刑之譽内實殺之景帝葢寛之僅有存者祖宗覽既徃之弊蠲除煩苛顧我細民愛同赤子始用折杖之法新天下之耳目茲盖曠古聖賢思所未至一旦決而行之海隅元元如被父母之教恵澤之厚淪扵骨髓矣陛下至明如日廣覆如天髙拱法宫深惻民隠何甞不伸勅羣吏親覽庶獄而疑讞屢報罔不䝉生歴代用刑未甞如本朝之清宜乎天報之佳瑞錫以純嘏陛下方當隆盛之際未享繼嗣之慶者臣竊惑焉臣聞天地之性人為貴王者之治故當上調隂陽下順萬物一蟲魚之細一草木之微不當其宜則執政者有罪焉耳況乎肖方圎之貎禀精粹之靈乎天其意者宦官太衆而陛下未悟也何者古者肉刑之一曰宫聖人除之所以重絶人之世今陛下不以為意宦官之家競求他子勦絶人理希望爵賞為門户之芘童幼何罪陷扵刀鋸因而夭死者未易具數夫有疾而夭者治世所羞況無疾乎有罪而宫者前王不忍況無罪乎臣又聞漢永平之際中常侍四員小黄門十人耳唐太宗定制無逾百員臣不敢逺引漢唐取必扵當世請以祖宗近事較之陛下試觀祖宗時宦官凡㡬何人今凡㡬何人衆寡之差不待臣言而陛下可見臣愚以為胎卵傷而鳳凰未至宦官盛而繼嗣未育伏望陛下順陽春施生之令濬彂徳音詔巖廊大臣詳為條禁進獻為宦官者一切權罷罷進獻則不足任使臣謂非不足也弊在掌典他務之過也陛下若令宦者兼領外事則雖多而不足如令專守中禁則雖少而有餘且宣傳聖㫖分幹職任則有外廷三班之臣在外何必區區扵中人㢤今三班使臣待闕都下率二三嵗未能補吏至扵出妻鬻子嗟怨道途和氣既傷㢘隅都盡抑亦内臣侵牟員闕所致今既罷去進獻絶領他務姑可許養子得以為後但勿去其勢耳扵内臣之計則不至傷息扵陛下之私則不為害物若然天心必應聖嗣必廣召福祥安社稷之策無先扵此孟子有言老吾老以及人之老幼吾幼以及人之幼惟陛下留意中外不勝幸甚侍御史趙抃乞釋傅卞罪狀曰臣伏見國子博士傅卞近因所乘馬驚逸衝冒禁衞係憲臺勘鞫法寺議讞竊縁卞經明行脩士譽推服今其所犯衆知詿誤書曰眚災肆赦易曰赦過宥罪此皆聖賢用忠恕之道以謂凡人孽非自作以過誤而獲累者則赦之而勿疑伏惟陛下至仁至聖堯舜其心凡百用刑必原情實臣愚欲乞聖旨指揮明卞之誤釋卞之罪申恩屈法則涵容光大之徳日益隆盛也知制誥糾察在京刑獄范鎮上奏曰臣等奏陳開封府勘到桑達公事不經本司引問便行處斷雖攀援近例即元無正條乞今後一切編勅施行今月十九日准密院劄子節文右開封府縁有上件體例所乞今後一依編􅃯施行已奉聖旨不行臣等未曉此理檢㑹開封府前後承受特㫖勘鞫公事本非因聖意有所喜怒皆是府縣失職不能禁姦姦彂之後尚未舉覺致煩聖聦旁加采聽正是其救過苟免之際然則結案之後一行密問略辨白黒宜無所害何必深自蔽匿偷欲了當㦯内懐不辜無所申吐恐此但可以成獄吏侮文之弊而未足副朝廷恤刑之意也先帝聖徳仁明欽恤庶獄以京師浩穣刑獄最繁故建設糾察一司令澄審真偽欲使凡受罪者自以不寃從建置以來毎有大辟倍加精密此則先帝不敢兼扵庶獄庶謹惟有司之任聖鑒卓然與文王等矣若以奉聖㫖并中書密院所勘公事即不録問無乃非先帝之意亂有司之守大凡設法者必闗盛衰以立制防因循以杜漸今既曲許聖㫖中書宻院所勘公事不復審察未見所以尊朝廷重刑罰之理而適足啟府縣弛慢不勤其職獄吏侵侮無所忌憚罪人銜寃不得告訴之弊此臣所不諭也又竊見朝廷舊法中外通制官府常守皆不許用例破條今或扵四方承平之日京師取則之地刑獄極審之司人命至重之際特許􅆸條用例事理乖舛又臣所不諭也臣等䝉朝廷選委不敢不盡心誠望萬分有一可補聖政非欲採摭錯失以為已能但先帝所謹者亦望陛下謹之刑不可濫弊不可啓條不可􅆸苛不可廣乞今後府司及左右軍廵大辟公事内雖係奉聖㫖及中書密院勘送者案成之後一依編勅施行貴得允當皇城邏卒吴清誣奏富民殺人鞫治無狀有司須清辨内侍主者不遣監察御史傅堯俞上奏曰近曽上言乞彂遣親事官吴清等付開封府照證張文政公事至今未䝉施行臣竊思之深為不便豈有報人殺人不從對辨獄詞未盡寃抑可虞固非陛下仁惻慎刑之素意也臣伏料陛下非惜此數人但欲知外事恐沮塞之今後不敢報耳以臣所見實為未得若付之有司辨其是否而賞罰之則實事日聞扵陛下維慮言者多耳儻但縱之使言一切不問則以賕結之者有罪不彂以事忤之者無過被報雖刺告盈前扵陛下何益適足以煩刑禁而揺善良之心況今吴清等事與前後不同本属城南地分乃報城東公事事實當賞吳清等而罪城東探報之人事虛則吴清等豈得免責茍罔辨是非蕩無拘檢臣恐此曺過䝉優假因勢作威誣陷平民漸不可長必有謂若沮此曹則陛下無由知外事者以此誤陛下幸深思臣言則事理可見伏望早賜指揮彂遣免致淹延刑禁且長小人之權臣不任懇激之至劉敞上奏曰臣伏以先帝哀矜庶獄開釋無辜以京師浩穣獄訟煩多創設糾察一司辨理微枉澄審繆誤誠不欲使吏得弄法民陷非罪設令侵寃有所告訴也伏見諸大辟公事㦯具獄既上情渉可疑㦯審問之際囚自翻變者並皆移司推勘左軍則移右軍右軍則移左軍府司亦然然此三處刑勢既均利害略同更相頋望自為地道寧伸吏曲莫念民枉以此治獄恐非朝廷欽恤之意臣謂諸大辟公事其情理可疑及囚自變者並委糾察司奏請别差官置勘其司獄等仍須與元勘處不相干礙方許抽差如此則獄無銜寃之濫吏無試法之倖好生之徳洽扵民心判刑部李綖上言曰一嵗之中死刑無慮二千餘夫風俗之薄無甚骨肉相殘衣食之窮莫急扵盗賊今犯法者衆豈刑罰不足以止姦而教化未能導其為善歟願詔刑部𩔖天下所斷大辟嵗上朝廷以助觀省從之神宗熈寧元年知審刑院蘇頌奏乞春夏不斷大辟疏曰臣伏思國家以仁恩被冒天下祖宗慎用刑辟陛下丕承謨烈憲章大備輕重得宜上自朝廷下及州縣遵守條詔無有違者雖杖笞之責不合法令未甞輙行其已斷之獄猶宜加審官司縱出者坐罰深故者㦯至􅆸黜而不用臣甞謂自堯舜以來經史所著用刑詳慎未有及我朝之仁恕平允者也惟論決論辟猶不以時而議者未甞及之誠恐亦為聖世當行之一事臣愚戇不識大體故敢以前古之説言之傳曰賞以春夏刑以秋冬是三代之時春夏未甞行誅殺也史載秦世四時行刑王莽盛夏殺人是皆譏其虐政也漢制斷獄報重常盡三冬之月盖不扵陽盛之時勦絶生𩔖所以協天意助人情也東漢以後㦯行㦯否近世遂􅆸而不舉其說盖患囚繫之淹久耳臣以謂獄官案鞫茍有連逮不以輕重追呼参驗動渉嵗時未甞以淹久故釋而不問也臣愚欲望聖慈叅酌古義采用周漢詔天下獄囚自非惡逆以上決不待時外其餘衆罪並俟秋冬論決免當温煦之日而有愁痛之聲亦足以成聖朝仁恩之美也且無知之民輕犯刑網殺之為可矜貸之為􅆸法萬一待決踰時㦯遇恩降得從末減是陛下不􅆸法而全人命者多矣恩威並行民知畏愛上當天心感召和氣誠太平之髙致也二年樞密使吕公弼上奏曰臣伏見韓絳甞奏乞用肉刑今日陛下亦以為然絳又言假如折一支去一指有何不可況堯舜尚用之此徒信古之論不適時變自漢文帝感一婦人之言罷肉刑而天下歸仁逮今千餘年一旦暴行之駭四海觀聴況古雖有肉刑之法在堯舜之世亦未甞行之書曰象以典刑流宥五刑堯舜之世用流以寛五刑也若四凶者止扵流則五刑無所施焉臣願陛下上法堯舜下體漢文無取迂儒好古之論陛下病今之犯刑者衆臣􅂅審擇守臣宣布恵愛使民各得其所則民不犯上矣今不究其本而徒更其刑辟臣恐民心一駭而動後雖欲全撫之未易安也三年知陳州張方平上奏曰臣伏以國朝自祖宗以至陛下積徳累仁重用刑辟急深故之罪寛縱出之罰愛育下民若保赤子致其忠愛可謂至矣近年監司之官所在多起刑獄至扵州郡常程公事方行推問未見情實㦯已經檢斷事理明白扵法平允偶有所見愛惡異同即别差官置司推覆事夲微小張皇為大因縁騷擾株連枝蔓至有徃還數千里勾追證佐盛暑嚴冬淹留牢禁其中有罪犯絶輕亦有無罪之人一身久繫家為破散瘐病饑寒愁痛無告及其結正亦有不移前案者推勘官承望其意巧文鍛鍊雖是平人亦須有虛妄為坐以一州一路為率至扵天下銜寃抱枉感傷和氣災害日生且獄者人命所係王者所當深重者也豈容官吏依勢作威事既自外專行朝廷亦無由知得臣到陳州方此親見自三月末赴本任至四月中所司呈公事一件稱有兵士指論冒請粮米事係是去年十二月狀自後行遣㑹問回報始足遂扵四月十二日送司理院方行􅂑勘文案未具當月十九日有轉運判官張次山到州㸃檢取索一宗狀詞將帶前去尋别差官置院推勘四月末所差官到院至九月初方始結絶歴一百二十餘日前後所經禁繫近六十人徃還三千餘里勾追照證炎暑之月係累道路自夏渉秋其間病患相繼亦有軍員枉遭刑禁及至斷遣並止杖罪推院繳送到所取欵狀二千一百三十一張浄案六百七十張諸雜行遣照證文字三十五卷當時若自本州勘結不過十餘日可了其滋章為弊如此今又有百姓樊宗望公事已經本州奏斷近轉運副使李南公到州㸃檢取索上件公案將帶前去又已差官令置院推勘臣詳樊宗望公事本州勘結頗已詳允具狀聞奏法寺定斷尋已准朝㫖斷放訖竊慮差官前來置院依前追擾淹延貧細之民饑寒失所欲乞特下法寺取索上件公案㸔詳委有情節不圎刑名差誤即乞别差官依公取勘施行縁此置獄之弊事干天下伏乞朝廷特降約束諸路非奉朝㫖所置推院令推勘官候結案日具録監司所送公事因由據到院出院月日但係勾追禁繫人數扵在禁日有無病患死亡所追干繫人州縣程途近逺及斷放刑名開坐申中書送御史臺㦯法寺看詳事狀其有不當置院推鞫㦯淹延枝蔓枉繫無罪之人諸有非理伏乞議立條制頒下所冀上合聖朝重用刑辟之意感召和氣以正治體十年監察御史裏行彭汝礪上奏曰臣聞人主之所宰制羣動百官萬民如馭一馬進退逺近無不在我非獨威福之效也而有徳禮焉上下之道報施而已上施之以禮則下欲報之以禮上施之以徳則下欲報之以徳其澤盖非一世而已其遺波餘澤流溢漫衍及數十世而未已也朝廷數以疑似嵗起詔獄卿士大夫慄然懐茍免之心是故夤縁飾虚辭以為容恱故外有事君之禮而内無事君之心造偽飾詐趨利亡耻其流及下浸不可止且古者扵大臣其罪也甚章衍著明白尚欲遷就而為之辭况事㦯出扵嫌惡而多在扵疑似此不可不重也故詩曰伐木椅矣析薪杝矣木非不可伐然必椅之恐傷其性也薪之欲析必固杝之不欲逆其根也彼扵物如此而況扵人乎彼扵民如此而況扵卿士大夫乎且夫人主之威非特雷霆也而勢非特萬鈞也大臣之生死貴賤在人主而已是至微賤今以雷霆之威萬鈞之勢震壓扵至微賤之身而阻之以虎狼之吏罪之以秋毫之法又逼之以狴犴桎梏之具待之如此何所求而不得者夫漢唐之臣入嬰冠冕退就囹圄朝坐廟堂暮戮都市以今視之至有禮也自祖宗以來愛養卿士大夫甚厚天下化之皆肅然有尊尊貴貴之心今近臣輕扵陷法扵是浸益陵夷矣臣聞之君子言必慮其所終行必稽其所敝方陛下操與奪抑揚之柄以御羣下必不為已甚然末流之敝恐有甚扵漢唐者夫舜誅四罪而天下咸服則刑罰雖盛世有不能無也至扵以愛惡而議獄以疑似而論罪實非天下之所以望扵陛下者汝礪又上奏曰臣訪聞秦鳳路運判孫迥言熙河路結糴等事朝廷怒守臣輕為國費財為之置獄以迥使本路使究其事聞自經略安撫轉運緫管知州通判使臣等已替未替拘留被劾及下獄㡬四五十人其他連累左證者數倍矣夫朝廷專使置獄又以本路職司主之此無求而不得然一方騷然矣臣聞之國中之事聽之扵君軍中之事聽之扵將為國計惟慎擇其人而已今置帥不善故事至此然方軍興士民冒矢鏑沐霜霧出萬死一生之地其所徃還非貪墨吏則屠沽小人非有㢘節禮義之士措足扵其間也利不厚不足以使之法不寛不足以容之故為之帥者必縱弛繩墨不愛惜金帛然後使人死力其官府事素如此而以一旦密網羅之萬一不勝矣聞朝廷初許結糴即與官員秀才約之又未甞為定價則本路以與官員秀才又賤與之雖為有罪然未為亂法朝廷遂以此起獄故人不能無疑恨焉今六州之勢亦未定也勞者未息離散者未集哈瑪爾伺其左果荘窺其右蕃落雖有内向然猶首䑕兩端而營田事亦未就緒方當并謀合力以為經久計今以事擾之臣恐邊臣掣肘無敢為之志而小人獸駭有不自安之心萬一敵人承上下之疑而以兵動恐所失不償扵此矣陛下所以得熈河其費㡬何其所用人㡬何竭天下之力而得之為數萬已費之財易之盡天下之慮而得之為匹夫不審之言輕疑之何始予之重而終略之甚也事固起扵不虞而禍生扵人之所忽臣實為陛下重之聞結糴等錢稍見次序􅂅付有司許年嵗收納如明入已者固不在赦其他些小違法事件伏望朝廷寛貸以安窮邊吏民之心汝礪又上奏曰臣檢㑹近開封府奏軍人張全為殺死阿蘇合處死者臣伏念祖宗恩徳博厚法令簡寛其風議入人也深故有司詳閱案牘上下皆以矜慎為事毎有一事可施議論反覆至扵再至扵三至扵四其言未甞不從厚至扵大辟必甚無可奈何乃敢行其明慎用刑前代盖未有也今朝廷一日萬㡬不及細務其原察情實必不能如有司之深盡其閱視案牘亦不能如有司之詳其檢用條例必不能如有司之熟今有司皆以為不可殺朝廷必以為可殺是朝廷敢扵殺人不敢扵生人也朝廷好惡有司以為表其所行有司以為例上有好者下必有甚焉今朝廷議刑欲重則有司皆將以深入為事其弊可立待夫朝廷所行則有司便據以為例昔者強盜不與謀者貸今殺之強盜殺人同行而不與聞知者貸今殺之自此殺人不可勝數矣扵二聖好生之徳其為累不淺豈可以不慎臣㳟惟太皇太后陛下皇帝陛下大仁普施兼並天地雖一草木螻蟻猶欲愛惜保全況人民㢤伏望陛下茍有可生亦何所吝元豐二年尚書祠部員外郎直史館權知徐州軍州事蘇軾狀奏曰臣聞漢宣帝地節四年詔曰令甲死者不可生刑者不可息此先帝之所重而吏未稱今繫者㦯以掠辜若饑寒瘐死獄中何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠笞若瘐死者所坐名縣爵里丞相御史課殿最以聞此漢之盛時宣帝之善政也朝廷重惜人命哀矜庶獄可謂至矣囚以掠笞死者法甚重惟病死者無法官吏上下莫有任其責者苟以時言上檢視無他故雖累百人不坐其飲食失時藥不當病而死者何可勝數若本罪應死猶不足深哀其以輕罪繫而死者與殺之何異積其寃痛足以感傷隂陽之和是以治平四年十二月二十四日手詔曰獄者民命之所繫也比聞有司嵗考天下之奏而瘐死者甚多竊懼乎獄吏與犯法者旁縁為姦檢視㦯有不明使吾元元横罹其害良可憫焉書不云乎與其殺不辜寧失不經其具為令今後諸處軍廵州司理院所禁罪人一嵗内在獄病死及兩人者推司獄子並從杖六十科罪毎增一名加罪一等至杖一百止如係五縣以上州毎院嵗死及三人開封府府司軍廵院嵗死及七人即依上項死兩人法科罪加等亦如之典獄之官推獄經兩犯即坐本官仍從違制失入其縣獄亦依上條若三萬户以上即依五縣以上州軍條其有養療不依條貫者自依本法仍仰開封府及諸路提㸃刑獄毎至嵗終會聚死者之數以聞委中書門下㸃檢㦯死者過多官吏雖已行罰當議更加黜責行之未及數年而中外臣僚争言其不便至熈寧四年十月二日中書劄子詳定編敇所狀今衆官叅詳獄囚不因病死及不給醫藥飲食以至非理慘虐㦯謀害致死自有逐一條貫及至捕賞格若實縁病死則非獄官之罪況有不幸遭遇瘴疫死者㦯衆而使獄官濫被黜罰未為允當今請只行舊條外其上件獄囚病死條貫更不行用奉聖㫖依所申臣竊惟治平四年十二月二十四日手詔乃陛下好生之徳逺同漢宣方當推之無窮而郡縣俗吏不能深曉聖意因其小不通輒為駮議有司不能修其缺達其礙乃舉而廢之豈不過甚矣㢤臣愚以謂獄囚病死使獄官坐之誠為未安何者獄囚死生非人所能必責吏以其所不能必吏且懼罪多方以求免囚小有疾則責保門留不復療治茍無親屬與雖有而在逺者其捐瘠致死者必甚在獄臣謹按周禮醫師嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失四為下臣愚欲乞軍廵院及天下州司理院各選差衙前一名醫人一名毎縣各選差曹司一名醫人一名專掌醫療病囚不能更充他役以一周年為界量本州縣囚繫多少立定傭錢以免役寛剰錢㦯坊場錢充仍扵三分中先給其一俟界滿比較除罪人拒捕及鬭致死者不計數外毎十人失一以上為上等失二為中等失三為下等失四以上為下下上等全支中等支二分下等不支下下科罪自杖六十至杖一百止仍不分首從其上中等醫人界滿􅂅再管勾者聽人給厯子以書等第若醫博士助教有闕則比較累嵗等第最優者補充如此則人人用心若療治其家人縁此得活者必衆且人命至重朝廷所甚惜而寛剰役錢與坊場錢所在山積其費甚微而可以全活無辜之人至不可勝數感人心合天意無善扵此者矣獨有一弊若死者稍衆則所差衙前曹司醫人與獄子同情使囚詐稱疾病以張人數臣以謂此法責罰不及獄官縣令則獄官縣令無縁肯與此等同情欺罔欲乞毎有病囚令獄官縣令具保明以申州委監醫官及本轄干繫官吏覺察如詐稱病獄官縣令皆科六十分故失為公私罪伏望朝廷詳酌早賜施行三年太尉開府儀同三司復判河南文彦博奏乞恤刑䟽曰臣切見近嵗以來中外刑獄頗有枝蔓淹延大暑盛寒縲繫囹圄其間豈無寃滯感傷和氣朝廷毎至盛夏必行疎決㦯水旱為菑原減輕繫此聖慈欽恤之至也然守臣獄官鮮能上副陛下之意有傷仁厚之化夫刑者所以輔教聖人不得已而用之故三王任徳不任刑以徳為陽居大夏生成之時以刑為隂居大冬不用之處所施輕重居然可知臣不敢以經史逺事言之切以唐之憲宗號為中興任徳任刑頗得其理甞謂宰相曰于頔懐姦勸朕任刑欲朕失人心也且聖人感人心而天下和平人主而失人心邦本何由寧固臣以謂今之牧守監司宜得明恵厚重之人宣布朝廷寛大之澤施愷悌之政變刻薄之風則太平之隆可垂拱而致神宗時陳襄乞疎放秀越二獄干繫人狀曰臣伏見中書劄子差屯田郎中沈衡著作佐郎張載徃秀越二州置司推勘祖無擇苖振公事風聞其間因縁作過及干連照證人數不少若依制勘條例並須逐一勾追證對圎結縁杭明二州去勘所各經數舍徃來追攝不無搔動竊以朝廷詔獄本為守臣違越為害於民以此差官取勘若令無辜干繫之人一例拘留對辨㦯因累被罪反為平人之害甚非陛下繩吏愛民之意欲乞特降指揮下逐處勘官只令取勘祖無擇苖振及現禁作過情理切害之人所犯重罪依例追呼照證結絶以申懲誡外其餘罪輕不坐與應係干證之人如已勾追即畫時取狀踈放其未勾追者並免追究及雖有小可罪愆本州作過因被連累之人亦乞出自聖慈特與推恩矜放更不具案圎結施行所貴不至滋蔓淹延别致騷擾蘇軾下御史獄勢危甚無敢救者直舍人院王安禮從容言扵上曰自古大度之主不以言語罪人軾以才自奮謂爵位可立取頋碌碌如此其心不能無觖望今一旦致扵理恐後世謂陛下不能容才帝曰朕固不深譴也行為卿貰之卿第去勿漏言軾方賈怨扵衆恐言者縁以害卿也金君卿上奏曰臣竊見天下州郡奏案繁多獄訟未甚衰息以至炎荒之地方盛暑時留獄待報者不以嵗月淹徊寢罹愁苦戾氣之作未必不由此也伏惟陛下祇繩祖武守之以仁綱舉網踈思致刑措而郡縣之吏将何以稱陛下欽恤之意臣竊詳新降編勅條貫内有奏聽勅裁勘罪聞奏禁奏取裁當行極斷決配之𩔖不一揔七十條件除大辟外流徒杖罪者甚衆皆須奏􅂑朝旨且凡百獄訟自縣至郡鈎連案驗逮其獄成已有日矣以至奏而得報雖近地州軍亦須半年已上況州廣逺處以至法寺案牘填委曾無虚日其間甚有事極細微可以原情麗事寘之中典不須奏請者不惟朝廷大政㡬務要多滋事叢脞有煩聖慮況復盛夏恤刑之際飜此囚繫動經嵗時深可矜惻為州郡者雖有臯蘇之眀而欲奉行寛大之詔以推廣陛下好生之徳使不留獄其可得乎臣今愚見欲望聖慈特降勅㫖擇臺諫名臣與法寺審刑院將編勅内該論奏條件詳議除命官犯罪及疑獄成大辟情理可憫者依舊奏聽􅃯裁外其餘叅酌輕重不須論奏者立定刑名使郡府遵行無使碎獄繁文盡闗旰食之慮抑又令犯禁之民知有定憲兼逺方盛暑之際無復留繫庶㡬刑清訟簡以迎和氣之應臣言固陋不足以上裨仁化無任俯伏待罪戰汗屏營之至哲宗元祐元年右正言朱光庭奏乞罷大理獄曰臣聞易曰聖人以順動則刑罰清而民服恭以陛下上契天心下符人意凡一舉動莫非順理刑罰之清萬民之服適當今日竊聞詔委御史中丞劉摰右諫議大夫孫覺看詳大理獄探報不當事有以見陛下寛仁之盛徳其大理獄從而可􅆸伏縁治獄自有開封府御史臺安用更致此獄且獄名不一非治世之美事又帝居之側豈當致獄之地凡為人臣者不務崇理義以輔太平而乃長刑罰以虧仁徳不忠莫大焉臣竊見刑部侍郎崔台符户部侍郎楊汲務為刻薄致位高顯久任大理官稔為刑罰虧仁徳之事乃不忠之臣也臣欲乞罷大理獄并黜崔台符楊汲刻薄不忠之臣扵外俾天下知聖人唯尚仁徳以化民則刑罰愈清而萬民咸服矣五年給事中范祖禹乞復降詔恤刑狀曰臣近準中書省錄黄節文尚書省檢準元祐勅諸獄暑月五日一次湯刷枷杻其罪人以時沐浴五月二十五日奉聖㫖令刑部遍下諸路開封府界今後毎嵗暑月依上條施行者臣檢會祖宗舊制毎嵗冬夏降詔恤刑自太宗皇帝雍熙三年以來累聖遵行未之有改至熙寧三年編修中書條例所奏委逐路提㸃刑獄司毎嵗扵四月十月檢舉牒逐州長吏訖奏臣竊惟祖宗欽恤庶獄特從朝廷降詔盖當盛暑大冬之月使溥天之下至扵海隅狴牢囹圄之中皆知聖主深居九重而憫念及之此所以為仁恩也今令刑部遍下諸路雖重扵提刑司檢舉然州縣奉承宣布及書之史冊猶未若恤刑之詔臣竊惜之欲乞依祖宗舊制令學士院毎嵗冬夏降詔仍自今年十月為始以副陛下仁恤刑獄之意祖禹又乞踈決劄子曰臣伏見陛下以久旱踈決在京及三京繫囚聖心焦勞欽恤庶獄祖宗以來赦過宥罪多䝉嘉應然今溥天不雨旱災甚廣恐刑獄寃滯以傷和氣者不止扵四京臣􅂅陛下因推恵澤以及四方詔諸路轉運提刑司官疾速分詣所属州縣引問見禁罪人踈理決遣仍先徧行指揮疾速結絶無令淹延深戒官吏務察寃枉使朝廷徳意及逺感動人心庶可消弭大畧祖禹為右諫議大夫又乞寛刑疏曰臣伏見蔡確已責降英州别駕新安置臣知陛下宸謀逺慮㫁在不疑除去大姦實為宗廟社稷之計非以陛下一心私喜怒也忍扵一人所以不忍扵天下之人不愛一人所以愛天下之人也然確以凶徳叨竊相位作威作福欺罔先帝屡起大獄排陷善良故聞確名者無不震畏以朝廷名噐為已私物市恩結黨故貪利之士多為確用今佐佑確者不過懐其舊恩甞與之相濟為惡㦯畏其復起不敢結怨不然則所見偏謬謂確以詩得罪欲薄其責不出此三者而已臣聞帝堯刑一人而天下服書曰殱厥渠魁脅從罔治古之明王征討叛逆亦不過誅其元惡餘皆赦而不問使之自新若窮治支黨滋蔓不已懼罪者衆則人情不安必有過刑濫及無辜此先王所深戒也夫聖人之道不過中天下之事不可極意一時極意後必有悔用刑寧失之扵寛不可失之扵急寧失之扵略不可失之扵詳自乾興貶丁謂以來不竄逐大臣六十餘年今已用大刑四方聞之無不震聳然人無愚智皆以確之得罪為當更有驚駭物聽且丁謂見在相位故朝廷有黨不可不黜然而章獻明肅太后仁宗既黜謂黨即下詔曰内外臣僚凡與謂徃還者一切不問所以安人情也今確已罷相數年陛下所用多非確黨其有素懐姦心為衆所知者固不逃於聖鍳自餘偏見異論者若皆以為黨確而逐之臣恐刑罰之失中人情之不安也又確已投荒裔不憂不死小人破膽不憂不慴惟當選用忠良力行仁義繼之以善政而已若因一凶人延及士大夫相繼黜逐不已則人情震動不安方今朝廷唯宜安静臣􅂅陛下天地之徳包含隠忍容養羣臣不責其全俟有顯過黜逐未晚臣受恩深厚不同他人茍有益扵國家不敢隠情臣無任恐懼之至紹聖元年祖禹知陜州又論卹刑䟽曰臣竊以先王欽恤庶獄務在於寛刑期無刑盖非得已國家一祖五宗以聖繼聖以仁繼仁哀矜扵民率用中典此所以祈天永命垂百三十年太平之本也臣伏觀陛下聖性仁厚有堯舜成康之質比聞有司奏獄多務從寛臣􅂅陛下長守此意操之勿失有勸陛下嚴刑峻法以威肅四方者宜拒而勿聽陛下為民父母海内皆赤子也人君之勢其尊如天其不測如神誰敢不畏何患威之不立而必嚴刑以肅之惟陛下聖意専主扵寛仁如天地之涵養萬物則刑罰庶可清省矣臣久侍經幄無所裨補今將逺違左右思所以助陛下施隂徳益福祚結人心者莫先扵此故不敢不言伏望陛下深留聖心天下幸甚三年監察御史蔡蹈論監設獄中使不當受大理囚訴疏曰臣近者竊聞敕遣中使鄭舉詣大理寺設獄囚有對舉聲寃者舉輙受其訴甚駭衆聽臣伏見大理獄朝廷所重非刑部御史臺不得詳覆糾察而監設使臣本無省獄之命而敢聽其辭生事犯分莫此為甚臣甞覩大中祥符詔書曰比來内臣將命出外如聞有收受牒訴恐縁致枉抑自今宜切禁止違者重論之臣竊聞祖宗之意防微杜漸可謂明且逺矣臣愚欲望陛下少加聖慮特降睿㫖下大理寺根問施行庶使使命小臣知所禁戒不敢因縁生事哲宗時陳次升奏乞立限疎決䟽曰臣恭惟祖宗以来至仁之政敷錫庶民好生之徳哀矜庶獄方夏之祈暑冬之祈寒禁刑慮有淹延纍囚困苦故立斷絶之法熙寧間又令刑法官吏並赴中書省勒宿立限斷案中書得案即降指揮頃刻無留人實被賜自後因縁刑寺申請刑法官斷絶之名而實恵不及扵囹圄殊失祖宗立法之意臣欲乞睿㫖令刑部及朝省並立定日限所責繫囚不致留滯庶仁徳誕敷扵幽隠次升又論皇城司獄疏曰臣竊以掖廷之獄事干宫禁自来多用内臣専治不無寃抑如聞皇城司今者置獄陛下至仁惻怛慮及非辜特差外官雜治要盡至公雖虞舜好生之徳無以加此然而刑禁之下五木所加何求而不得若不盡心輙有觀望必致枉濫欲乞聖慈嚴勅推鞫之官宜加審克務令平允庶使獄成之後適輕適重各得其實罪當其情亦所以彰陛下哀矜庶獄明慎用刑之意也尚書右僕射范純仁論誅蔡確當與師臣商量疏曰臣之愚心雖知蔡確衆議不容復憂聖政㦯有所虧盖陛下臨御以来政化清明如青天白日無輕氛薄翳道徳純備如精金美玉無纎瑕小疵今以一蔡確之故煩朝廷行稀闊之刑天下久安人所罕見必生疑駭復恐貽之将來垂之史策薄有擬議則扵聖徳神功深為可惜在臣負恩竊位罪不容誅盖如父母之有逆子雖天地鬼神不能容貸至扵父母親置扵必死之地則却恐傷恩臣之區區實在扵此陛下保完社稷之心天地神明之所昭鑒而微臣愛惜陛下聖政之誠亦應陛下可察不避一身之萬死而展補報之愚忠惟願睿慈曲加詳慮所有再行重責伏乞付與師臣已下商量所貴責歸臣佐不累聖明臣無任愛君激切之至殿中侍御史吕陶上奏曰臣伏以聖人之政以慎刑為本王者之居以施徳為先故扵聽斷尤務欽恤設官創局深有意謂敢縁因革之理輙議防制之宜謹具條奏一京師之獄自開封府御史臺大理寺諸寺監開祥二縣并尉司左右外廂馬步等軍司三排岸以至臨時詔獄及晝監夜禁等無慮二十餘處祖宗以来雖極詳慎然猶恐有司失實而寃者無告故祥符中詔置糺察一司以統制之如諸路之有提刑諸縣之有提㸃也特重其職不領他務得以專意扵決訟報囚之事其訪問則無賔客之禁其廵省則無冬夏之限耳之所聞惟求寃抑目之所見惟審慘暴刺伺防檢深得其要凡大辟獄具本處先已錄問乃申糺察司差官審之儻有疑慮並許駮勘㦯留繫之淹久㦯處決之過濫大則條奏辯明小則移文戒督而又廣闢治舍標榜其門被枉之人知所赴訴玩法之吏不肆姦欺明慎哀矜扵斯至矣近嵗罷歸刑部謂之糺察案止以胥吏三人主行其事諸處申到大辟文案亦委郎官一員與吏部所差之官同慮不過引囚讀示再取伏辯而已其名雖存其實已廢縁刑部主天下獄訟簿書文牘紛委目前雖彊明幹濟之才日力亦有不給所以在京諸處刑獄無復糺正而察檢之又況省部深逺細民容有不知者豈能皆詣長貳求以自直臣恐大衆所聚之地㦯陷非辜而無以伸其痛恨矣臣愚謂宜復置糺察在京刑獄司庶協先王閱實之意以廣陛下好生之徳一本朝以来大理寺主斷天下奏獄而刑部覆之故大理有詳斷官刑部有詳覆官淳化中因蕭氏之訟論決非當朝廷慮庶獄之不慎始置察刑院扵中書之側以侍從領其事設屬四員稍增為六謂之詳議官盖議其當否而後行也當時既有尚書刑部而又置院者何㢤盖以刑部受寃辭主雪正大理審刑之失當者不可亦與斷獄之事也斷以一司審以一司雪以一司前後相承上下相制所主不同各得盡其心而舉其職所以極慎重之意元豐三年始罷審刑院為刑部詳議司雖移其名而職任亦不改舊官制既行乃以詳議一司歸扵大理改詳斷為評事改評議為丞案牘上刑部勘當而施行焉自此刑部始與斷案之事大理刑部責任既同皆為法守讞議既定一成不變㦯訴理不當則又委刑部受而治之果渉枉撓理當辯正其刑部元斷之官亦須開說合行取㫖初則自斷中則自雪終則自劾盖非人情之所宜萬一主者護短遂非則理訴之人何以伸其枉臣愚謂宜復置審刑院以中書押刑案舍人一員主之以大理丞六員為詳議官領職如故其刑部以侍郎一員専掌理雪及餘職事則上順治體下協典故謹録奏聞乞指揮稽考故事參酌施行陶又上奏曰臣伏以都城之廣萬衆所聚姦偽百出刑訟實繁推劾聽斷尤宜詳慎朝廷欽恤之意防禁最密毎開封府大辟獄具本處既已錄問則申刑部請覆其實刑部乃關吏部差官同慮謂之審問囚無翻異則論決如律事有可疑則移治他司盖所以察寃濫而重人命也安可狥一已之私見而欲他人之必死乎臣伏見開封府勘小阿賈殺人公事吏部差劉斐審問斐看詳案卷稱是情節可疑遂疏述不圓七事申刑部乞行㑹問續㨿本府回報三事並是誤供又據劉斐續條陳案節不圓一十二項其刑部既見劉斐所申如此亦慮阿賈之情㦯渉寃枉遂付大理再推庶得其實即扵格法未見違戾而知府蔡京輙有論奏謂阿賈大情已正便當處死劉斐不合疏駮刑部不當移推皆宜論罪其徇情好勝逞威犯分不頋義理一至扵此且人命至重死不復生小節既是未圎大情容有不實若便将阿賈處死則是大辟罪人不須再行審問五木之下枉殺必多况朝廷立法極從仁愛天下死罪稍渉疑慮可憫並須奏聽勅裁多䝉寛貸豈有不容問難便欲行刑又縁録問條制令移司勘逐者並指定不圎事節回牒本處今劉斐既疏述一十九事皆是不圓刑部須至重勘若阿賈果不行兇則京顯有殘忍鍜鍊失入之罪㦯阿賈委是正賊則京猶有鹵莽判押不職之愆生殺之端斐皆無過若萬一朝廷聽其妄奏加罪扵斐則向去審問之官率皆畏避不敢伸陳被刑之人多負抑屈無所赴愬況尚書刑部主天下獄訟兼糺察在京刑獄之職可以統轄開封按劾其罪今既舉職事反為開封所按則上下之分顛倒錯亂非所以尊朝廷風四方之意又縁京知府以来殊無治迹聽獄斷罪失繆極多扵叚繼隆之事則親書塗抹放縱冒法賣官之人扵僧恵信之事則遂非妄奏曲庇重禄受賕之吏方當至公之朝宜檢舉京前後過惡重行黜降今既未正其罪又差知真定府兼安撫使考之公論殊未為允伏請寢罷新命候大理結正小阿賈等公事三件了日别取朝廷指揮時刑部讞囚宰執論殺之有司以為可生不奉詔左諌議大夫鄭雍上言曰是固可罪然究其用心在扵廣好生之徳耳若遽以為罪臣恐鄰扵嗜殺今使有司欲殺而朝廷生之猶恐仁恩徳意不及扵天下而況反是者㢤哲宗嘉納囚遂得生歴代名臣奏議卷二百十六
