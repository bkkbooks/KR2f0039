body:
  text: 歴代名臣奏議巻十一明楊士竒等撰孝親宋光宗紹熙二年帝以疾不過重華宫祕書正字項安世上書言陛下仁足以覆天下而不能施愛於庭闈之間量足以容羣臣而不能忍於父子之際以一身寄於六軍萬姓之上有父子然後有君臣願陛下自入思慮父子之情終無可斷之理愛敬之念必有油然之時聖心一回何用擇日早往則謂之省暮往則謂之定即日就駕旋乾轉坤在反掌間爾三年上以憂疑成疾不過重華宫中書舎人黄裳奏曰陛下之於夀皇未盡孝敬之道意者必有所疑也臣竊推致疑之因陛下毋乃以焚廪浚井之事為憂乎夫焚廪浚井在當時或有之夀皇之子惟陛下一人夀皇之心託陛下甚重愛陛下甚至故憂陛下甚切違豫之際焫香祝天為陛下祈禱愛子如此則焚廪浚井之心臣有以知其必無也陛下何疑焉又無乃以肅宗之事為憂乎肅宗即位靈武非明皇意故不能無疑夀皇未倦勤親挈神器授之陛下揖遜之風同符堯舜與眀皇之事不可同日而語眀矣陛下何疑焉又無乃以衞輙之事為憂乎輙與蒯聵父子争國夀皇老且病乃頥神北宫以保康寧而以天下事付之陛下非有争心也陛下何疑焉又無乃以孟子責善為疑乎父子責善本生於愛為子能知此理則何至於相夷夀皇願陛下為聖帝責善之心出於忠愛非賊恩也陛下何疑焉此四者或者之所以為疑臣以理推之初無一之可疑者自父子之間小有猜疑此心一萌方寸遂亂故天變則疑而不知畏民困則疑而不知恤疑宰執專權則不禮大臣疑臺諫生事則不受忠諫疑嗜慾無害則近酒色疑君子有黨則庇小人事有不須疑者莫不以為疑乃若貴為天子不以孝聞敵國聞之将肆輕侮此可疑也而陛下則不疑小人将起為亂此可疑也而陛下則不疑中外官軍豈無他志此可疑也而陛下則不疑事之可疑者反不以為疑顛倒錯亂莫甚於此禍亂之􅎯近在旦夕宜及今幡然改過整聖駕謁兩宫以交父子之歡則四夷向風天下慕義矣校書郎蔡幼學上封事曰陛下自春以来北宫之朝弗講比者夀皇愆豫侍從臺諫叩陛請對陛下拂衣而起相臣引裾羣臣隨以號泣陛下退朝宫門盡閉大臣屢日弗獲一對清光望日之朝都人延頸遷延至午禁衞飲恨市廛軍伍謗誹籍籍旁郡列屯傳聞疑恠變起倉卒陛下實受其禍誠思身體髪膚夀皇所與宗社人民夀皇所命則疇昔慈愛有感乎心可不獨出聖斷復父子之歡弭宗社之禍光宗車駕将朝賀重華宫既而中輟翊善羅㸃言自天子達庶人節序拜親無有闕者三綱五常所係甚大不當以為常事而忽之上過宫意未決㸃奏陛下已涓日過宫夀皇必引領以俟陛下常人於朋友且不可以無信況人主之事親乎今陛下乆闕温凊夀皇欲見不可得萬一憂思感疾陛下将何以自解於天下司農寺主簿吕祖儉奏曰臣聞臣之事君猶子之事父也子則受氣於父臣則制命於君是臣子之身非可私為巳有也故君父安則家國安家國安則此身始得而安否則天地雖大四海雖廣将無所安其身矣自昔以来仁人孝子忠臣義士所以竭誠盡言視家國之事如已事而不避死亡之誅其心豈有他哉盖以家國之安危實相闗繋有不可得而解者固非沽名要譽訐以為直以自私其身也矧臣世受國恩粗明兹義先臣䝉正輔太宗真宗夷簡輔仁宗公弼輔英宗神宗公著輔神宗哲宗好問復輔髙宗於即政之始事體之艱難時勢之變故是皆身厯其間調娱維持均休共戚不敢有二臣之父兄又䝉朝廷記錄亦皆有位於朝臣從州縣小官復䝉陛下㧞擢使之備數班列得非皇慈興念舊族俾其扶植嗣續或能不私其身耶自惟位下言微止當退循分守豈應狂妄僣貢封章實以區區愚衷有所感激雖欲緘黙不能自制不得不昧死為陛下言之恭惟國家聖聖相承受天眀命紀綱法度賞罰政刑是豈盡過於漢唐獨仁孝之行既本諸内心而大過人之徳業夐超千古故能祈天永命雖經變故而終不傾揺髙宗皇帝匹馬渡江再造區夏不謀不筮挈提大寳付之夀皇聖帝以對越藝祖在天之靈惟我夀皇翼翼孜孜躬致二十七年之孝養鑾車往来萬姓瞻仰豈惟天下愛戴而夷狄異𩔖亦能詠歎欣慕莫知其然於斯之時雖有水旱之灾盜賊之虞人心既固旋即消弭盛徳格天其應自爾此非以幸而得也仰惟皇帝陛下春宫毓徳仁孝升聞日就月将閱天下之義理已多獄訟謳歌㒺不歸仰夀皇顧天位之有託睠萬機之憂勤雖春秋未髙而精一之傳復見之於陛下三聖授受赫奕焜煌慈孝偕極是誠簡冊之所未嘗有也夫貴為天子富有天下而得以天子之貴天下之富奉事其親此古今之難值君父之至榮自三代以還歴千餘載惟唐之數君為然太宗之於髙祖眀皇之於睿宗肅宗之於明皇遜禪之際皆匪由衷嫌隙疑阻禍亂隨至而肅宗因臣庶之言抱玩弱女感懐顧復至於歔欷載之史冊至今讀之可以使人流涕肆我本朝禪代之美固始見於靖康然是時戎馬在郊事出倉猝相與之際有不忍言者夫以古今人主難逢之盛事既有其時復乖所願而有害夫養志之至樂此仁人君子所以痛心疾首也今陛下躬承休運所以事夀皇者一遵夀皇所以事髙宗若記禮所載文王之事王季武王帥而從之真無間然家法懿範休聲鉅美陛下既皆得之是誠足以教天下之孝而垂法於萬世兹盖我國家仁孝之所積故非常之慶錫之於天而尤當極其培植保養之功也去冬郊禋之夕風雨暴至聖心祗懼遂愆天和然陛下思念慈闈之心不為疾輟藥餌甫除不憚風雪遂御乗輿都人夾道聳瞻莫不鼔舞聖孝其所以培植保養乎天之錫我國家者亦可謂至矣旋聞聖躬復少違豫夀皇愛念切至於是屢頒免過宫之㫖今閱日久矣清明在御臣下恱喜比者㑹慶節前期十日奉香致敬羣疑氷釋歡意周流逮至流虹之旦天氣和暢百官敘立重華宫外皆自以為必得瞻覩親奉玉巵之禮大明浸升踵企目斷拜表竣事衆心皇皇抑不知聖心以夀皇慈訓難於重違故不欲數蹕煩民耶或聖體有甚不能勉强者而非外庭所能知邪孟子曰孰不為事事親事之本也孰不為守守身守之本也陛下仁孝得於生知豈容復有擬議然臣下猶有不能忘其憂者誠恐玉體猶有未康而無以釋海内之至情也尋聆御朝臨講之制不踰常式雖有以知陛下已集和平之福而道路籍籍愈以為疑盖事親之禮衆所共知儻有少愆自難户曉在庭之臣庶幾長至在即陛下既受羣臣之朝必将祇欵北宫以展未申之誠及期天仗入陳百辟就列顧瞻黼扆不啻渇飢傍徨徘徊嚴辦未奏離立庭中蹙頞閣淚人情憂迫若癡若狂咫尺天閽無路可扣逡廵退却相顧黯然流言紛紛有不忍聴方當有道之朝加之陽剛漸長政是陛下膺受多福庶邦丕享之時胡為而使人心至於此極臣竊自妄測聖意必以為父子至情當盡慈孝嵗時之慶止屬禮文既慈孝之兩隆雖禮文而可略臣則以為不然士庶人之家父子同室動息與倶至於人主有庶政之繁問安視膳不容朝夕之必躬則五日一朝節序稱慶盖将達人子之情所謂禮文乃是實事況人主者華夏蠻貊之所觀瞻凡見於節物儀典皆所以感化天下起其忠君親上之心詎宜於疑似之間謂因循為無傷而使人心解弛妄有測度乎夫君心所感隨動輙應陛下試反而思之陛下親舉重華之禮則天心底豫兩宫喜恱羣臣觀感軍民歡呼萬方儀刑四夷敬服洋洋然有太平之象樂莫大焉尊榮莫大焉陛下暫輟重華之禮則天心必不孚格兩宫必形思念羣臣憂懼㒺知所依軍民怨誹無復忌諱萬方有泮渙之勢四夷有輕侮之謀宛然有衰殘危悴之態辱莫大焉不祥莫大焉此二者其利害榮辱至易知至易見陛下将何擇哉竊聞夀皇鉅典已成進書有日恭想陛下躬率羣臣必欲行此縟禮以慰神人之望雖夀皇復有免到宫之命不可遂巳盖免到宫者夀皇愛子之心而必到宫者陛下事親之實擴天性之固有如水勢之必東不必以屢出欲止為嫌不必以人言既多為厭或萬一有援引繳進之説者兹乃為導䛕竊寵之計非所以愛陛下也天意之從違人心之離合政在今日惟陛下念之然臣之愚所以拳拳於此者非為陛下愛惜此名也國家南渡以来版籍半淪於沙漠而讐耻未能遽雪言乎民力則困於養兵而焦熬憔悴𩔖不聊生言乎軍政則墮於和議而驕脆窮怨緩急難倚言乎人才則務為沈黙即有患難孰同其憂静言思之誠可寒心所恃以維持億萬年之基者盖祖宗既有仁孝慈愛不可及之盛徳而比年三聖授受孝愛交孚又足以祈天永命故他雖未至猶可漸而為也儻聖孝於形迹之間稍有所虧四方傳聞愈逺愈異人心揺動根本必傷竊慮菑害自此而生禍變自此而萌無以恃之為固事實在於目􅊿不可謂為迂談而轉移之機則在陛下一念之頃耳臣於此而不言是愛其身而負國家累世養育之恩也詩云心之憂矣不遑假􅄰臣不勝拳拳冐犯天威臣無任瞻天望聖懇祈激切惶懼俟命之至四年祖儉又上奏曰臣世受國恩兹又備數朝列近因輪對得望清光天容穆穆極其粹温不遺微賤之言曲加奨納至論天人感通之際有及於事親之禮聖謨洋洋窮極根柢謂事親如事天當務誠實有以仰見陛下聖念所存真與天通凡禮文所寓或未甚周初非有虧天性之至愛誠有非外廷所能知者然事因適爾觀聴浸隳誠實之徳曖昧而不彰禮文之實因循而失信國勢人心岌岌揺動盖凛然有不保朝夕之憂以陛下之明聖照臨宇内方将登延俊良以興治功今焉於此屢有虧闕既非陛下之本心而猶爾優㳺視為常事使道路流言浸不忍聴臣實痛心若執政大臣侍從臺諫不以今日事理之實告之陛下則是羣臣有負陛下也若有所論奏不得即以上聞則是左右閹宦畏威逺罪壅蔽陛下之聰明也夫天下之心有萬不同至於事親之實則本於孩提之良知不待家至而戶曉自天子至於庶人壹是皆以此為本而人主者華夏蠻貊之所觀瞻兹事實為三綱之首茍舉措乖違則天意人心隨即渙散臣不敢避萬死為陛下極言之非是敢為危言苦論盖以聖性本不如此而不忍陛下負此不美之名也且過宫之宻疏初何疑間獨以自去冬以来乗輿屢駕皆成中輟皆是舉行盛禮之日粤若㑹慶之旦臣所目覩百官序立重華宫外以望翠華之来大眀浸升踵企目斷拜表竣事衆心皇皇當是時陛下雖自以為誠實無他而人情固已不能不愕疑矣至於長至之辰臣所目覩者天仗入陳百辟就列徬徨徘徊嚴辦未奏離立庭中蹙頞閣淚人心憂迫若癡若狂咫尺天閽無路可扣逡廵退却相顧黯然當是時陛下雖又自以為誠實無他然流言籍籍尤有非辭說所能解者矣臣於十一月十二日冐死投匭以自通於陛下之前盖恐於中外之情或有所未知也所幸邇来進書成禮過宫如儀天宇開霽都人歡欣中外疑惑方得消釋陛下誠實之意始昭于四方而此月兩旬之間過宫之日則復兩皆放仗十七日之事又復甚於往時自旦至暮竟無傳㫖侍臣在庭衛士在列經過官司伺候起居捉巷軍兵次第排立終日守次莫不皇皇逮夫殿門将閉始各散歸宰輔章奏間阻隔絶宫闈殿陛有同萬里呼吸之際闗念實深夫偶未過宫亦非大失苐以屢不加察因是而可生禍亂之階盖因循失信閒燕自如固已深失人心而外庭内朝闗節脉理不相貫通譬若咽喉之間須㬰閉塞便成危疾此乃陛下切身之利害而宗社安危之所分也若乃四方之觀聽夷狄之窺伺姦雄之生心聲聞流傳愈逺愈異則猶為後日事耳臣在闕門之外聖意所以適爾未出之故非所敢知但此事至大至重人所共曉合四方之心以此為莫大之憂更不暇語及他事陛下聖性髙眀静而思之其可復以為常邪今夀皇生朝進香之禮降旨過宫陛下寓誠意於禮文不敢有忽凡曰臣民孰不鼓舞聖徳而適以隂雨有所未果但自兹以往衆心愈覺顒顒政在陛下益加聖心謹此常禮疑情滯念不可復存感動轉移難以少緩每遇過宫日分前期敬戒養此誠心或恐左右便嬖之臣妄測意旨但務逢迎否則覆藏姦慝潜行離間時當過宫往往進酒排當留連夜刻無以全陛下平旦清明之氣遂使鸞車夙駕多失期度此等情状未必有之然臣私憂過計則願陛下更致察焉古人有言所不可得而久者事親之日也夀皇躬致二十七年之養於髙宗雖殊方異𩔖亦皆感化今夀皇春秋寖髙陛下問安侍膳不容朝夕之不親則五日一朝節序展慶式循儀制猶為闊踈陛下聖孝自天可不深念若或聖體適於斯時少有未怡謂宜預降指揮改作他日清燕髙拱以養和平之福雖一時小小排當亦當暫輟如此則始能還天意於既暌之後收人心於既失之餘大本充立有以發天下孝敬之心則事或未理皆可支吾而陛下事親如事天之實徳殆若日月之食更也人皆仰之豈惟纎塵浮翳有如氷釋不足為累而孝徳感召和氣致祥又有以開萬世無疆之休矣臣拳拳之志止在愛君發言狂愚憂心如醉惟陛下裁赦臣冐犯天威俯伏待罪之至紹熙三年十一月陳傅良上封事曰臣一介踈逺才不逾衆人而多病早衰齒髪頺變久無榮進清顯之望間者将指湖湘罷弗勝任嘗上奉祠之請乞便醫藥不謂陛下過聽不以臣為不肖歸以畿節留之郎舎賜對便殿初無建明而天顔開懌玉音温厚曾不數日擢貳冊府又未幾用以為皇子嘉王府贊讀官極一時儒者之遇臣誠不自意陛下待之甚寵也不勝大懼無以塞遭值之責日夜思念獨有與二三僚友共秉一意為大王道古今父子君臣之際人之大倫天地之正義以成孝敬長恩愛無負任使之意死且不朽盖嘗讀書至文王世子之記曰文王朝於王季者日三雞初鳴衣服至于寝門外問内侍之御者今日安否何如内侍曰安文王乃喜其有不安則文王色憂行不能正履則必反覆為王誦之曰是可以為法事親若文王則受命作周本支百世功徳見於雅頌願王慕之效之勿以為不可及也至漢戾太子之傳曰親戚之路隔塞而不通太子進不得見上退則困於亂臣獨寃結而亡告則亦必反覆為王誦之曰是可以為戒事親如漢太子則交兵闕下父子不相保而望思歸来之臺天下悲之願王警之懼之勿使萬一有此也賴天之靈社稷宗廟之福而大王資禀純眀嗜好鮮少不自貴倨喜親書生每得僚佐危言極論則深信而不諱忌至若周之所以得則斂袵加敬漢之所以失則嚬蹙不忍聞也邇者王譽日彰人心日附臣與二三人者竊相欣賀以為陛下有子國家無疆之休也今竊有惑焉㑹慶誕節陛下闕上觴之禮而弗講長至大㑹陛下復闕稱賀之禮而弗講羣臣迫怵妄窺聖意臣固知陛下自違豫以来雖及康復尚弗便於乗輿而怯風霜雖然非所以為訓也何者區區陳說無過口耳之感必不能勝躬行之化汎觀往古無過紙上之習必不能如家傳之法今陛下上虧三宫之歡而下責小臣陳誼於冢嗣以庶幾寡過則雖抱血誠之忠未見其補将以逃斧鉞之誅而已楚王有言人之愛其子者亦如余乎陛下以國家無疆之休託在一子宜如何愛之而偶不察夫所以儀刑之道如此顧使講讀皆為空言名曰輔導安用臣等此所以痛惜此舉動非所以為訓也臣以多病早衰齒髪頺變乆無榮進清顯之望方申祠請以便醫藥不忍黙黙昧死為陛下一言以冀省悟伏紙流涕不知所云四年傳良為起居舎人兼中書舎人又上奏曰臣不勝螻蟻之忠輙有愚言仰干天聴如䝉省覽即臣雖就誅戮不悔臣聞父子天性也孝慈之道不待教而能者也自士庶人皆然而況於人主乎然考之載籍則有尊為人主而隙開於父子之間至於禍敗反不若士庶人之家者何也賤者羣居其勢易親貴者異宫其勢易踈故也夫惟其勢易踈則離間之言易入離間一入則父之情不欲自通於其子子之情不欲自明於其父由是愈難於言而父子之隙開矣父子之隙開而禍敗至唐之西内則李輔國之徒前日之龍徳宫則梁師成之徒是也論至於此可為寒心恭惟陛下父子之間一同舜禹而比年以来稍虧定省之節臣誠卑賤不能知宫禁間事若以前鑒觀之或者亦當有離間兩宫者乎陛下孝謹本自無他偶以纎介動成疑阻夀皇恐傷陛下之意不欲自察察言之陛下恐傷夀皇之意又不敢自察察言之而左右之臣各憚天威又亦以傳言為諱由是禮文寖踈情好日隔積成因循實駭聞聽此臣所以不避萬死而輙言之也言之也者将以通之也有如天意信謂如此即下臣此章明詔大臣使兩宫左右曉然知此務通二聖之情則舜禹之徳千載同符矣臣無任拳拳激切祈懇之至傳良又上奏曰臣近者不識忌諱幸因賜對輙論及兩宫情意未通事仰荷聖慈闊略愚直曲垂清問備盡懇悃仍令臣入文字指罪離間之人将有施行以釋疑阻則古所謂狂夫之言聖人擇焉何以過此臣雖麋捐無以報稱比至奏入竟留不下臣切自咎責非陛下之不聽臣言實臣負陛下耳以此不避煩凟再有奏陳臣聞天倫骨肉自然恩愛偶有嫌隙至相猜疑考之載籍間或如此然而秉彞之性不可解剝同氣相求終易感動是以方其懐疑若将終身而不合及至感悟則又俄頃而如初往往喜極至於流涕豈同他人各有異志雖以盟誓相要竟亦闗防不已者乎又況陛下父子聖眀同徳舜禹適至今日尤非本心茍反求於一念之初則何待於多言之切且陛下獨不記夀皇之踈魏邸乎自古廢立出於愛憎夀皇此時果何心耶而陛下忍忘之也若曰離間之人則亦宜有緣故究觀前代多是姦臣因懐反側之心遂行鬭喋之計為此向背皆以自危今之羣臣豈有是事盖未嘗得罪於陛下則必不赴愬於夀皇人情曉然可以洞察假使近習妄自分朋間或有少可語言亦不過時暫欺蔽初非要害可造事端雖是合正典刑何足尚煩聖慮此臣所以日夜痛心以為陛下誤有所疑而積憂成疾至此也抑臣不識聖意今将聽二三大臣與百執事之言而為父子如初歟将一切勿聽使父子終不得相見歟昔者虞舜欲見其父於生前日號泣于旻天訖於克諧萬世誦聖漢武欲見其子於死後作歸来望思之臺天下聞而悲之而事巳無及徒成永恨二君之心大抵略同遲速之間得失相反臣恐陛下今日之不為虞舜而他日之将為漢武也臣言及此亦既泣下今請以此月扈從車駕過宫為期若猶未也則臣實負陛下将退而就誅戮矣臣不勝迫切之情傳良又上奏曰臣竊覩兩年以来以不過宫諫者衆矣誦說義理條陳利害非不詳盡非不激切而陛下曾不加聴間或聴之亦不過勉强一出近者且以面從為聴嘻笑不加恠矣獨臣私念以為陛下誤有所疑積憂成疾以至於此故自去冬凡四請對每於陛下心事之間反覆開眀至於深入切中往往陛下為臣傾倒一無隠情臣亦益得肆其狂愚無所諱避枚解而件析之誠冀聖懷曠然大悟起居飲食務自安和號令言語務自平允其在外朝不必事事過為留難其在内廷不必人人過為猜慮如此則淵衷寧謐天性自見何待臣下固要力請乎而陛下以臣言之故釋然無他凡三感悟於此矣去冬令臣宣諭兩府翊日取旨前月令臣更入文字付外施行最後十八日復諭臣以早来曾許丞相以十九日命駕退朝之後便降指揮臣數四懇奏而玉音亦數四響答此陛下三感悟之幾也然今日確許眀日中變不惟中變而又號召大衆赫然示天下以不肯出假如陛下有一人可信有一策可取有一日清明在躬豈至此乎臣所以惶恐踧踖前此對後輙乞補外於今極矣宜即誅戮納祿謝事猶是自營而非臣之敢要君也天度寛容降旨不允臣敢不更自殫竭以畢區區之義臣聞抱虚恐者蹈實禍懐妄憂者得真疾何也此心最靈功侔造化一有所蔽皆成定力自非聖賢未易開悟甚者無故及於亂亡昔漢武帝征和間居建章宫見一男子收之弗獲而巫蠱始起又常晝寝夢木人數千持杖欲擊帝帝驚寤因是體不平忽忽善忘疑左右皆為蠱祝詛莫敢訟其寃者巳而有戾園之禍隋煬帝大業初内殿火帝以為盜起驚走入西苑匿草間火定乃還自後每夜眠中常驚悸云有賊至以甖貯毒藥謂所幸姬曰賊至當飲之已而有江都之禍由今觀之征和巫蠱本無是事只緣武帝疑心不解姦臣夤緣卒禍其子大業盜賊亦無是事只緣煬帝疑心不解左右壅蔽卒禍其身臣故曰此心之蔽甚者無故及於亂亡二君是也陛下不過宫豈非誤有所疑乎臣不識陛下何所疑重華耶道路之言不以為責善則以為猶吝權以臣計之二者皆誤也且夀皇責善為天下計為社稷宗廟計耳假使陛下政事脩明人心愛戴則夀皇之願得矣尚復何辭陛下不是之察豈非誤乎若曰吝權則進退百官必與聞其人罷行庶政必與聞其事而五六年来天下不見其有此也但見陛下懐不自安動輙阻惑以其人為欺雖大臣死亡而不信以其事為怪雖細民疚灾而不恤又豈非誤乎夫以誤為實而開無端之釁以疑為信而成不療之疾臣切以為夀皇不能禍陛下是陛下自貽禍也臣言不足聴分當永棄念此違離不宜自外復為陛下懇惻言之伏惟鑒隋漢之所已往而捄其将来國家之福也兩宫之所期待也非獨臣之願也臨紙涕泣庶幾萬一傳良又上奏曰臣聞人主之所以得天下者以得人心也所以失天下者以失人心也非獨以父子之私也苟得人心雖其父不得以天下私諸人苟失人心雖其父不能以天下私其子昔者禹薦益於天将以天下遜也而謳歌朝覲獄訟者皆不之益而之啓故禹卒不與賢而與子故曰茍得人心雖其父不能以天下私諸人啓是也秦人自以為萬世有天下死而號曰始皇帝其次曰二世欲以一至萬也然身死纔數月耳天下四面而攻之宗廟滅絶矣故曰茍失人心雖其父不能以天下私其子胡亥是也恭惟陛下今所憂疑豈非以不得愛於夀皇乎夫惟以不得愛於夀皇而欝􅉱終日以失天下為懼於是舉朝諫之而不聽舉國非之而不恤舉世為之惶惑而不加怪臣恐陛下之憂不在聖父而在人心也何者假如萬一夀皇誠責善誠猶吝權而天下歸心則陛下固有辭於夀皇矣夀皇雖不責善雖不吝權而天下離心則雖夀皇亦無以為陛下計者是故疑夀皇者虚憂也失人心者實禍也此理曉然不待智者而諭今也舉朝諫之而不聴百官解體矣四參常朝宰執而下無一人立班者是失舉朝之心也舉國非之而不恤軍民皆怨讟矣或詐為詔書敢於指斥是失舉國之心也且舉朝諫之而不聽舉國非之而不恤猶曰為憂疑夀皇故也若乃吳挺之死半年而不置将張孝芳之見殺累月而不討賊他如班直待試於殿庭侍從待命於郊外往往邈然都不省記是於夀皇何預焉而陛下獨固守力行之又所謂舉世為之惶惑而不加怪者是豈不足以失舉世之心乎不但此也人情好逸而惡勞今仗下之士皆苦晏朝已報班矣有唾不顧者臣未知禁衛之心果如何人情利親而患踈今自閤長御藥卒不得一至左右間嘗一日逐數十人臣未知近習之心果如何甚者嘉邸有子而不奏告掖庭有喪而不起發臣又未知宫閫后妃之心果如何陛下試一念此不謂之孤立歟不謂之人人自危歟陛下博覽載籍閱義理熟矣亦嘗見自古人主孤立如此人人自危如此而可晏然無事乎今天下本無事而陛下以憂疑失人心至此方且曰吾計當如此吾不可放下矣而專欲盛怒益不容解則古所謂肘腋之變蕭墻之禍殆不可謂今直無也豈不甚可畏哉雖然破疑為笑在蹙頞之頃則轉禍為福亦在反掌之間何者今日之事非若敵國對壘難平也非若強臣䟦扈難制也又非若四分五裂難收拾也徒以聖意憂疑夀皇過當而人心不服耳聖意釋然則人心帖然矣故今日過宫則人心以今日解明日過宫則人心以眀日解然則陛下何苦執滯而為此岌岌也在易暌之上九曰暌孤見豕負塗載鬼一車先張之弧後脱之弧匪寇婚媾往遇雨則吉說者曰睽孤之極見豕負塗甚可穢也載鬼盈車吁可怪也方張弧以攻矣而其極必變變必通俄而脱弧則無為寇之患有遇雨之吉者隂陽和也孔子之象曰遇雨之吉羣疑亡也人有此事則易有此象陛下今日非偶然也極則變變則通此其時矣獨奈何弗悟乎臣前後論奏以干冕旒大抵務為開釋冀自感悟而不忍以危言傷聖懐念當謝事納祿永辭闕庭是以復誦人心可畏之説以望裁擇惟陛下速圖之幸甚幸甚秘書郎彭龜年乞車駕過重華宫上䟽曰臣聞大學之九章曰孝者所以事君也弟者所以事長也慈者所以使衆也古之君子不出家而成教於國者如此而已矣堯舜禹湯文武此六君子者未有不謹於此者也恭惟陛下嗣無疆大歴服四年于兹講求治道非不勤至然而風化未興習俗日頺閨門乏雍穆之風郡國多陵犯之變逺未暇言姑言其近御史臺朝廷紀綱之地而羣不逞敢奪人其中驅擊於市餘杭縣去行都財百餘里而無賴之人輙登縣治而逐其長秀州私販鹽者廵檢捕之反縛廵檢而殺士伍其無忌憚至此耳目習熟以為故常循循不已禍将益大不可待之為小變而不顧也國家法令眀備若使此等可以法治則人固畏之矣法宻而人不畏此非法之罪也大學曰君子有諸已而后求諸人無諸已而后非諸人所藏乎身不恕而能喻諸人者未之有也陛下抑嘗自反矣乎書曰萬方有罪在予一人又曰民不靖亦惟在王宫邦君室古之聖人非是彊認以為已責理固如此易曰有父子然後有君臣有君臣然後有上下然則欲使君臣上下各盡其分豈無自而然耶恭聞夀皇聖帝之事髙宗也備極子道其始受禪欲日一朝髙宗不可於是下倣漢制月六朝焉已而髙宗復難之始展為四朝然不朝之日晨昏定省之禮飲食上下之節寒暑温凊之宜無不聞之雖有南北宫之不同而父子嬉嬉如處一堂自舜文而後事父母盡其道唯夀皇而已耳此皆陛下所親覩想當時宫閫之間委蛇曲折求以說夫親者陛下又皆心得之外庭不得知也至今天下稱頌夀皇之徳必指事親為第一事以夀皇之事髙宗如此則陛下之事夀皇當有以過之而後可若纎毫有所不及則天下之責必至盖夀皇之於髙宗與陛下之于夀皇又不同故也陛下自即位以来供養三宫未嘗有缺止因前嵗聖躬不和於是過宫稍稀夫過宫固事親之末節也今日三宫之情如春風和氣何嘗計此然有不可已者陛下事親自視孰與周文王文王朝王季且日三焉而陛下歴月不過宫可乎是不可委之於偶然而已以是為偶然而弗恤則其他以偶然而罷者亦必猶是也夫稍不過宫直以為有損於孝固不可然今世之所謂孝者曾不過如此等事於此有不謹無怪乎人之輙以議已也何也吾之所謂實然者誠未有以大信於人則捨禮文之間抑何以自見乎且父母之愛其子不論貴賤其情則一人至晚年愛子尤切倚門之望豈獨閭巷之人哉况夀皇今日止有陛下一人聖心拳拳不言可知特遇過宫日分陛下或遲疑其行則夀皇不容不降免到宫之旨此亦夀皇恐人得以竊議陛下故為陛下辭責於人此盖夀皇美意必非不願陛下之来也陛下儻疑夀皇不喜陛下之来鑾輿何不一往以嘗之上可以感動慈親之意下可以解釋國人之疑今日夀皇愛子之心人莫不知而陛下事親之心人猶未信自去年陛下不過宫得之道塗之議籍籍可畏不知曾有舉以告陛下者否似聞宰執侍從臺諫亦嘗泛然有召亂致禍之言已而竟不過宫言遂不驗然亦幸而不驗爾今日不可不以其言之無驗而遂忽之也臣所以欲有言於陛下而必首及近日數事政欲陛下知人情已動不得不警爾抑又有大可憂者焉臣聞之道塗皆謂兩宫之情頗不如舊疑間之隙漸覺有形此雖小人見陛下乆不過宫有此擬議然臣以事揆之亦有不容不疑者陛下既舉慈福慶夀大典自合奏禀而陛下不行此一事也陳源乃夀皇所屏逐之人而陛下錄用之此二事也夀皇近失長婦若庶人見父母晚年遭此憂戚亦必親唁之而陛下不往此三事也積之不已其疑愈深却恐因循遂成阻隔此豈細事哉竊聞嘉祐治平之間英宗母子携貳已開内臣任守忠等間諜之於内大臣則韓琦富弼侍從臺諫則吕誨司馬光王疇等調停之於外當是之時小人唯欲其離君子唯欲其合天錫我家社稷有福二聖英睿既不惑於小人之言而諸臣懇惻又足以動天性之愛所以天下禍亂無從而起盖自古人君處骨肉之間指為家事多不與外臣謀而與小人謀之所以交鬭日深疑隙日大今日兩宫萬萬無此然臣所深憂者陛下外無韓琦富弼吕誨司馬光之臣而小臣之中已有任守忠者在焉兩宫豈堪有他疑哉方今廷臣無不知此每至聚首動色憂之然臣嘗竊聞其議論皆未有忠實為陛下謀者或曰父子之間人所難言人誰無親親所當事奚待人言言之適足激陛下之怒不如聽之天理自還為此說者委陛下為不足與言此最不忠之大者或曰此亦非言語論說所能動獨有夀皇降意以就陛下或可回爾為此説者是又欲僥倖陛下一出以厭人情而不知其誤陛下尤甚儻為此舉在夀皇固慈矣然倒置如此於陛下得為安乎使韓琦富弼吕誨司馬光之徒當今日臣知其獨有事親不可不孝一説告陛下必不委曲回互反累聖徳如諸臣者臣實慕焉臣竊觀陛下近日所為眎中庸九經已犯其五臣之所欲言者盖不止此此特大學九章中之一條最大者也唯陛下幡然改圗一新聖徳使綱常之間了無所愧不特可以息禍亂又且可以致太平初無拘礙牽制在陛下反覆掌之易耳何憚而不為也哉干冐宸嚴臣下情不勝隕越俟命之至龜年又上䟽曰臣輙瀝血誠仰干天聽臣聞人主不可有所疑疑則天下之情壅遏而不通天下之事廢格而不舉其為害至切也故歐陽脩嘗奏䟽仁宗皇帝曰自古有天下者莫不欲治而常至於亂莫不欲明而常至於昏者其故何哉患於好疑而自用耳夫好疑而自用其弊乃至於昏亂脩之言非過也情既壅而不通事既廢而不舉則理固應爾也恭惟陛下聰眀睿智度越常主忠信誠慤孚於天下羣臣獲事休眀自非病風喪心安敢輙以昏亂二字重誣聖世適自今嵗以来朝廷機務多疑不決宰執侍從臺諫皆陛下委以心腹耳目之寄者言輙不行金字牌專一報機速軍事尋常郵傳文書莫此為急亦復委之不信雖無昏亂之形而有昏亂之理有識者固已憂之然其事皆有跡可考一日清明盖不待頃刻而可以一言辨之不難也唯是重華之朝累月不講閭閻竊議其言萬端多出揣摩𩔖不可信逮至九月二十二日忽自南内徑罷過宫指揮而後羣臣始知兩宫必有所疑不然陛下天性至孝不應於至親父子恝然相忘如此臣聞之道塗陛下宫閫之間上自中宫下逮嬪御或遇生日其大者則必有所宴集其小者亦必有所錫予盖不如是則人情必有不美寜有慈福誕彌之月而不親舉萬年之觴夀皇聖節近在朝夕而進香故事又復不舉以臣揆之陛下非大有所疑於中必不若是然夀皇之於陛下乃親父子親父子復何所疑而至此乎臣觀自古帝王親父子嘗有暌阻者唯舜而已爾其父至欲殺之其母若弟又從而設為機穽以圗之至難處也然舜未嘗疑其父亦未嘗怨其母與弟唯夔夔齋慄負罪引慝自今觀之舜之事親古今莫加焉豈有罪可負有慝可引耶而舜獨如此者非偽為也其心以謂吾事父而不得乎父即為罪與慝矣故書紀其祇載見父而父旋有允若之應夫舜之祇載以見其父乃其父真情實意所從而感發之機也使其不見詎敢望其允若哉今之時非舜之時也舜處其變陛下處其常舜為其難陛下為其易計時揆事舜豈敢望陛下然舜能處其變而陛下乃不能處其常舜能為其難而陛下乃不能為其易獨何歟顔淵曰舜何人也予何人也有為者亦若是孟子曰謂其君不能者賊其君者也臣雖愚戇固不敢謂陛下不能為舜之事也邇者羣臣􅎨章無不切至而天聽穹窿未見昭格此固羣臣孚誠有所不足詞語有所未眀然臣竊料必有植此疑根於陛下之胷中者見外庭紛紛迭有奏䟽将千方百計誤陛下之聽使陛下不省羣臣之言未可知也比亦聞宣諭宰執侍從以所疑之故而一時無有忠實懇惻能啓廸聖心者是以其疑至今未解臣方聞有此宣諭時雖竊喜陛下推赤心以待臣下不示形迹而又竊憂其遲回不決必将益甚也何也陛下父子豈復有疑為此疑者必有人焉其人聞陛下将與羣臣剖析此疑則其心必如沸湯唯恐陛下父子一見天性復還則前日間言反将為莫大之禍臣料此人自此将益為間諜妄指形似重惑皇眀使陛下不復出激怒聖父或傷隂陽之和乃適其意然陛下獨不思萬一如此彼之計誠遂矣陛下豈不負天下萬世之責乎臣甚為陛下惜此也昔穎考叔以遺母之意感鄭荘公卒能復荘公母子之愛李唐山人亦以愛女之心感唐肅宗而不能通肅宗父子之情其機一也而應否異者莊公無人間之而為肅宗父子之間者李輔國軰尚在左右故也然則羣臣之言不能感陛下豈不𩔖是哉雖然陛下既因是人而起是疑矣一旦欲使遽釋其疑固甚難也何也未知陛下所疑者何事而無以辨之則固難望陛下之幡然也臣嘗聞陸贄有云明則㒺惑辨則㒺寃惑莫甚於逆詐而不與眀寃莫痛於見疑而不與辨唯眀與辨乃治疑之良藥臣竊觀陛下多疑皆始於不喜眀辨之故然外廷之事羣臣尚能為陛下辨之乃若父子之間非陛下自辨之不可也臣愚欲望陛下肅命鑾輿亟朝重華反躬自咎極其誠意盡以所疑之事面質之於夀皇夀皇見陛下如此必将感發慈愛歡然相接盡以所疑眀辨之於陛下臣殆見陛下父子自此天清地寧日光月潔當無一毫之間可窺矣方今兩宫暌異落落難合而臣知其必可合者以父子天性不可泯滅但恐隔而不通則無如之何若陛下感於此夀皇必應於彼視影響形聲猶為不速也反昏為眀轉亂為治直在陛下他人安能與哉臣但能為陛下言之而已唯陛下念之干冐宸嚴臣下情無任隕越俟命之至龜年又上䟽曰臣輙瀝血誠仰干淵聽臣備數三館無補公上比隨同列疉􅎨封章陳乞陛下過宫幾至煩黷臣於十月十七日又嘗獨上一䟽謂陛下乆不過宫必有所疑而植此疑者必有人焉深恐其益為間諜欲乞車駕早過重華親辨其事意雖誠懇詞實荒踈不足以裨補聰明實深憂懼至十月二十六日忽聞陛下遣宰執詣重華奏事雖未見鑾輿順動而已知父子情通至次日降過宫指揮閭閻之人破涕為笑聞之道路皆謂陛下嘗眀諭大臣以小人間諜之語将有行遣人皆謂陛下父子自此當歡愛如初矣而臣實未敢以為喜也何也陛下既眀諭間者姓名而大臣不能正其罪間者不去則陛下過宫之期必不可必矣盖天下之人皆願陛下過宫而所不願陛下過宫者不過此三數小人其平日造作疑阻以間踈陛下之父子者不知其幾何矣一旦陛下父子相見豈不憂其言語之敗乎豈不憂其罪戾之及乎臣嘗見陛下臨朝與羣臣語及過宫未嘗不動色及入中禁即變其説是以知左右之惑陛下者衆而陛下之父子終未得相見也既而果聞中輟不勝憂懣臣不敢保惜首領終為陛下眀言之臣在闕門之外固不能知爲陛下父子間者果為何人耶抑為何事耶臣但見自昔間人父子者皆必有故逺則興慶之事猶有明皇結歡父老召宴将臣之可指近則靖康之事猶有徽宗不發逓角截留兵卒之可疑夀皇自揖遜以来何嘗畧有此等痕迹陛下試舉間者之言一二質之於外臣知其必妄無疑矣臣不知陛下所以乆蓄此疑而不決者果何故耶臣知非陛下不欲決但數間者不欲決耳陛下早決此疑一日則小人必早獲罪一日陛下遲決此疑一日則小人必遲獲罪一日陛下若但蓄此疑而不決只是爲此數間者匿此惡而不使之敗陛下不忍於數間者以受天下之謗而乃忍於夀皇以成數間者之姦乎然臣亦恨陛下未有忠實首公勇敢任事者爲陛下辨此疑任此事也今日宰執侍從但能推父子之愛以調停重華臺諫暨百執事但能仗父子之義以責望陛下至於疑間之根盤固左右者畧不敢一語及之曾不知此疑根未除雖至情有所不能通雖大義有所不能舉譬如隂沍之雲凝結未散非疾風動蕩盡力掃除安能使太清廓然皎日復麗哉臣區區愚忠誠不忍陛下為此數小人者受天下不義之名如此也故終日忘食終夜忘寝思有以告之陛下十月十六日之䟽猶未敢誦言之今事急矣不得不言矣竊見今日内侍間諜兩宫者固不止一人唯見陳源在夀皇朝得罪至重近日復遭進用外人皆謂離間之禍必自源始方源未進之時雖陛下過宫巳踈然源之進也政以知陛下此疑已動而其黨之進源也亦欲陛下此疑愈固也源輩既在宫中臣知陛下之疑未易可解盖其膽大敢為欺㒺機深能為狡獪陛下飲食居處皆将投以所疑重華往来問訊皆将指以為疑或陽請陛下之出而隂尼陛下之行或名為畏懼夀皇而實以激怒陛下千方百計神出鬼没雖不可得而窮詰而其情状意態不過是數端而已大要只欲陛下父子終不相見而後其志始遂矣古人求忠臣必於孝子之門謂其有父子然後有君臣也今人有父子而欲間絶之則其於君臣何有哉陛下儻以斯人為忠則臣有以驗之矣始李輔國之欲間肅宗父子也張后與焉既而父子暌異輔國得志卒之殺張后而致肅宗亦隨以亡者實輔國也陛下自今觀之間人父子者豈不可畏也哉今陛下乆不過宫而道塗紛紛議及中殿陛下以為誰實為此宫禁之事秘不可聞所以騰播於外者皆此輩為之也今已如此後可知矣司馬光嘗論髙居簡以為置居簡於肘腋恐令陛下父子兄弟夫婦皆不寜臣見源輩實亦如此故臣愚欲望陛下亟發威斷斥逐陳源以謝天下然後肅命鑾輿亟朝重華負罪引慝以謝夀皇使陛下父子歡然宗社有永豈不幸歟若陛下以臣言為愚妄不足採取即乞放歸田里以畢餘生陛下既已赦臣不可使臣為小人所陷不勝忠憤懇切震慴悚恐以俟威命之下五年龜年為起居舎人又上䟽曰臣恭聞三月二十三日有旨日輪侍從官一員詣天竺寺禱雨臣雖庶官次亦當行臣於今月四日齋戒夙興奉将淵指跪辭致敬唯懼不䖍然自朝廷祈禱以来臣竊觀天意未見感通纔雨即風纔風即晴常若有散之而不得合格之而不得下者訪之諸處皆未浹洽農事已過旱勢可憂臣自服職柱下凡四閱月已兩被㫖禱雨天竺皆無昭格此盖諸臣誠敬不足不能仰達宸衷合被譴訶理無疑者然臣竊伏自念水旱之灾何世蔑有靡神不舉具有憲章若成湯之桑林周宣之雲漢無非反已自咎藉以徼福於神盖未有只事祈禱以冀感通者也臣竊聞仁宗皇帝每遇水旱必露立仰天痛自刻責盡精竭慮無所不至而韓琦猶謂陛下欽順上天之誠可謂至矣其於消伏災𤯝之道則猶未焉琦所謂消伏災𤯝之道者即書所謂惟先格王正厥事者是也當時廷臣多持此論故景祐元年旱李淑歸咎於爵賞過優康定元年天乆不雨龐籍以謂費用奢廣出納不嚴所致二臣之言災異亦異乎漢之諸儒矣然槩之格王正厥事之説則誠有此理也富弼謂天地人本是一氣氣既相貫氣動則應人君欲考天地災祥以是察之而已臣竊觀今日不雨所以召此者雖未易數然其大者未有若過宫者也臣非彊自牽合欲得陛下因此警懼幸聴臣言實緣天人相與理政如此夫匹夫之賤儻孝於父母猶能致天降甘露地冽美泉設或不然禍亦視此而況陛下據億兆人之上則其勢力感通必視億兆人之衆盖不止如匹夫而止也陛下豈不見去嵗未過宫之前黑子見於日赤𤯝作於夜既過宫之後瑞雪忽降災變盡消感應之理其速如神則臣以為今日不雨在於不過宫豈過也哉且向来無雪固嘗禱而不應矣去嵗之雪乃因不禱而得之陛下非不禱也禱於夀皇即禱於天竺也今不一定省於北宫而但懇祈於釋氏使釋氏無靈則已釋氏有靈而真可禱也臣知必監陛下事親之念必不監陛下命臣之旨也何也兩宫不和則天下不和天下不和則天地不和天地不和則釋氏雖欲彊雨以應陛下之求将不可矣盖天地和則雨未有不和而雨者陛下一念儻回則此和自陛下而生一念不回則此和自陛下而乖顧釋氏何有哉陛下儻不聽臣之言非特不能得雨於釋氏陛下今嵗郊祀合祀天地而不先求夫所以得天地者臣尤以為憂也孝經曰事父孝故事天眀事母孝故事地察謂之眀察者盖無毫釐不盡之謂也於父母有不盡之心則於天地亦有不盡之心矣此心儻有毫釐之不盡尚何以事天地乎此臣又非特為不雨而言也情出迫切言詞狂悖天威咫尺俯聽誅夷唯陛下裁幸龜年又上䟽曰臣竊見近日廷臣自宰執至於百執事陳乞陛下過宫不知幾䟽皆不䝉聴納至一日之間舉朝求去自古及今盖未聞有此等事也臣謂陛下見此必加省察乃聞宰執開陳聖怒叵測陳善閉邪人臣之職分也羣臣獲事休眀偶見陛下過宫希闊恐虧孝道故畢力開陳一幾感悟雖詞語狂悖舉措輕脱然究其中心則皆有忠君愛父之意若以古人之法揆之不唯當容受聴納又當奨予激勵然後士氣可振國勢可安而陛下乃反有含怒之意将大有所懲戒此則臣之所甚憂者用是昧萬死一為陛下陳之臣竊惟今日之事憂陛下者指小人以為間順陛下者指君子以為激夫以臣事君或出於激此固不可然有輕重焉君子雖激猶為愛君小人之間直損君徳耳陛下至親父子若非有間寧至於是羣臣但見陛下乆不過宫人情洶洶不勝憂懣只得以大義勉陛下小人必曰若如此而出是陛下本不孝因羣臣而後孝也本其意止欲固其間言使不至於敗而已陛下乃從而信之可乎設若陛下不聴羣臣之言終於不出亂或由是而生則昔之投間於陛下者又未必不推為羣臣之激有以使之也而陛下又加怒於羣臣可乎小人始以間誤陛下而終以激殺羣臣豈不重失天下之心哉陛下試觀二十二日聖駕不出舉朝求去如出一口此豈有形役而氣使之者盖出於其心之同然故不期而動如此陛下只以此推之則自此舉止動息若稍不順人心其應又豈止此而陛下不懼可乎臣觀陛下近日所為多拂正理唯有容納讜直闊略狂狷所以人心未離若更於此路稍加荆棘則陛下大事去矣陛下豈不思此等本何所為而不容之乎此等不過少忤陛下之意陛下若遂去之則順陛下者進矣陛下抑思今日之事忤陛下而欲陛下全事親之孝者為愛君乎順陛下而欲陛下失事親之孝者為愛君乎陛下但與羣臣較從違而不與天下較逆順臣雖至愚未敢以為然也陛下疑之益甚則兩宫不合既為君徳之玷諸臣得罪卒兆國家之禍是未可知也陛下若聽羣臣之言父子如初不唯聖孝光明上紹虞舜羣臣得安意奉職共登太平豈不休哉國家安危羣臣禍福繋此一舉此臣所大憂也唯陛下念之龜年又上䟽曰臣輙冒萬死仰控忠懇臣本無材術謬司記注近數奏論過宫希闊載筆難書書之則臣不知愛君不書則臣不知守職書與不書臣皆有罪是以抗章自劾陳乞竄逐聖恩寛大俾復故官威命一臨跼􅐲就職陛下既未許臣以去則臣安得不復修其官用敢冐昧條舉一二陛下事親禮有常數設若夀皇有旨免到宫臣猶可書也四月二十二日初無免到宫之旨而陛下不出使臣如何書耶尋常問安偶免到宫猶可書也五月七日既以夀皇聖帝聖體不和遣官奏告矣旋有旨免到宫使臣又如何書耶然初八日免到宫既云有夀皇聖旨猶可書也今月十五日初無免到宫之旨在朝羣臣累請問疾乗輿已駕道路已清而陛下復不出使臣又如何書耶十九日為夀皇服藥肆𤯝天下連日都人顒望翠華之出不啻望嵗而陛下晏然不動使臣又如何書耶然此特見之闗報之粗者耳若夫道路流𫝊至有不堪聞者臣雖不得而書計必有野史書之其言但有增加必無隠諱傳之後世重累聖徳臣實為陛下惜也臣竊見近日羣臣請陛下過宫者不止一人或将順或正救或解釋其疑亦不止一説言語忿激引𩔖䙝慢殆不可恕而陛下受之曾無難色一入内庭其意即異果何為而然哉是必有誤陛下者也然誤陛下者不特間踈陛下父子而已父子之間人所難言儻非羣臣忠愛陛下誰敢及此今陛下外雖受其言而内實背之是必有謂羣臣舉不足信者也謂羣臣舉不足信則是又踈間陛下之君臣矣羣臣但見夀皇春秋已髙多近醫藥恐陛下因循不見或成不可追之悔故勸陛下太急小人知陛下父子天性終必復還唯恐羣臣之言入而陛下之天復也故誤陛下愈深想其為説不一而足臣觀近日夀皇逰幸而陛下無所効獻夀皇服藥而陛下不及省問陛下豈忘此者是皆内侍輩自愛已甚唯恐陛下疑其輙通重華消息故不敢以告致陛下事親之禮少虧今小人又欲以此離外庭之臣使外庭之臣鉗口而不敢言則陛下父子終身不可復見矣豈不痛哉彼小人者既離陛下父子又離陛下君臣使陛下孤立於上内外不得通禍亂不得聞此其意欲何為而陛下不悟乎若此等事法皆不利於陛下之身而陛下冐行之臣實痛心疾首不曉其故以陛下聰明睿智纎悉必察何獨於此畧不省覺盖小人誤陛下已深矣彼但使陛下父子恩意之間日損於一日如履淤泥一歩深於一歩則不待更加讒毁之言而陛下自不能已可不謂惨耶然以臣觀之父子之性出於天命安能終暌唯患聖心不回耳聖心一回臣以為處此甚易也夫木本不衰有蠧則衰一去其蠧木如初矣父子本無暌有間則暌一去其間父子如初矣陛下今若翻然悔悟将平日為間之人揚於王庭眀正其罪則向来陛下父子之間少有所不及之事盖有任其責者又何足累陛下哉臣愚欲望陛下平心下氣少察所親無使父子之恩絶而後悔小人之間遂而後悟天下之亂作而後圗則無及矣唯陛下速為宗社念之臣為右史輙及陛下父子之間自知必干天誅然陛下之意不回則臣之職終不可舉是以率意極言無有所隠唯陛下幸赦其愚光宗時陸游上奏曰臣恭惟陛下躬聖人之資履天子之位而致養三宫承顔左右盛事赫奕冠映千古尚何待塵露之增山海哉顧臣竊抱惓惓之愚不敢輙黙伏惟陛下聖孝純至禀於天性昔在潛邸及登儲宫以来夙夜孜孜何嘗頃刻不以夀皇為心夀皇罷朝而悦進膳而美則陛下欣然喜動於色夀皇罷朝而不悦進膳而少味則陛下愀然憂見於色方是時徒能喜之憂之而已今則致親之恱者責在陛下其可以不深念乎所謂悦親之道非薦甘旨奉輕暖也非晨昏定省冬夏温凊也非千門萬戶之宫鈞天簫韶之樂也唯在陛下得得天下之愛戴以寧夀皇之心而已雞鳴而攬衣辨色而視朝必曰此昔者問安之時也今以萬幾之繁不能日朝重華歉然於懐豈有限極然闕問安之常禮之小也致天下之治孝之大也吾其力為其大者乎此固夀皇所望於陛下亦天下所望於陛下也治功已成中外無事陛下時備法駕率羣臣上萬年之觴豈非天下之大慶不然太史或以災異上聞四方或以寇盜来告夀皇聞之萬分有一微輟玉食陛下雖居萬乗之貴孰與解憂哉臣昧死願陛下於進退人才罷行政事之際率以是為念自三思十思以至百思不為過也自一日五六日至於百時不為緩也謀及卜筮謀及卿士謀及庶人不為廣也一有小失豈獨上勞宵旰夀皇亦與焉故陛下今日憂勤恭儉百倍於古帝王乃僅可耳譬如臣民之家上有尊親則所以交四隣訓子弟備饑饉禦盜賊比之他人自當謹戒百倍何則彼亦懼憂之及其親也犬馬小臣貪於增廣聖孝不知言之渉於狂妄冐犯天威伏候斧鉞歴代名臣奏議巻十一
