body:
  text: 厯代名臣奏議卷三百十一明楊士竒等撰灾祥宋理宗淳祐七年夏旱牟子才為太常博士上奏曰臣伏自丙午之夏被命造朝今一年餘矣所見災異不可勝數惟巖廊之上宴安自如而海内之人寒心已乆廼五月不雨旱暵為災河港斷流秧不入土既踰夏至無望晚禾縱有沾濡僅灑塵􅅽㝡可恠者閩中之水江西之澇同此一時而近畿諸郡乃以旱告上天仁愛之意厥有攸在此非責躬修行之時乎此非下詔求言之時乎此非避殿減膳之時乎臣延頸企踵以望此詔乆矣而九重深嚴迄無聲聞臣工觀望亦失開陳但聞今日醮内庭明日禱新宫今日封神祠明日迎佛像倚靠於衲子聽命於黄冠是皆無益之舉所謂咸平明道熈寜紹興淳熈求言之故事迄不復講而專襲靖康不舉行之失以遏天下敢言之口此臣所以憤悶不平激而為今日之䟽也且今日之旱與庚子異庚子之旱旱於秧苖已種之餘今日之旱旱於秧苖未栽之際已種者尚猶有望未栽者已無餘覬矣委之於天數之適然可乎或曰桑林之禱六事自責是湯未甞有此失特疑其詞而逆致其防耳今宫中府中之事窒而不通治内治外之政闕而不舉道揆輕而法守紊刑罰濫而貪黷滋則政之不節有其實矣干戈征斂之重交困於民生飢饉流徙之虞徧形於田里魚介勞而下多苦鴻鴈散而民未安則民之失職已有其證矣内而䆳舘増築石山外而新宫大展藩屏降及侯王之邸第争興輪奐之斧斤則宫室之崇有其所矣權寵之地既窟令萱請謁之門争求王聖旁及嬪嬙之貴亦多依託之私則女謁之盛有其候矣貨財多入於水衡寳賂交通於禁宻力之大者可以營權位力之微者可以鬻州符則苞苴之行有其信矣諂瀆相䝉於上下奸讒交亂於愛憎隂毒中人者力比於含沙睢盱行世者工侔於鬼蜮則讒夫之昌有其驗矣而九五之尊亢然居上未聞出一言下一詔如桑林之所謂禱者其為䙝天不亦多乎臣應之曰今日六事之失其形已成矣臣民言之亦衆矣吾君之聽亦玩矣與其鋪陳舊失以取吾君之玩曷若於六事之外求其近事之切於利害者而極言之以冀吾君之一悟乎臣生長逺方賦性愚狷其敢回隠以負陛下隆天厚地之知請遂言其槩臣竊甞讀易至於恒見天地萬物之情惟其常而已日月惟其常故冬北夏南朝震夕兊而能乆照不則不常其道矣四時惟其常故春震秋兊夏離冬坎而能變化不則不常其化矣聖人惟其常故居上不驕䖏柔不躁順動不失守正不變而能化成不則不常其徳矣常則乆反常則息常則善反常則惡常則吉反常則凶然則常之為道其人君凝固善念之大機括乎陛下以至明至聖之資臨政願治于今二十有四年閱天下之理不為不多習國家之事不為不熟發而為政一一中節布在天下著在人心者固不可以一二枚數然㝡其著見而關係甚大者有三事焉正人國之精神也陛下懲衰周監謗之失垂情容納天下於是服陛下之量草茅國之氣脉也陛下懲孤秦賤士之失推誠尊禮天下於是服陛下之誠小民國之大命也陛下懲潢池弄兵之失加意撫綏天下於是服陛下之仁夫三徳者天下之所仰望以為平治者也而陛下勉焉可謂大過人矣使行之力守之篤持之定不間斷焉以睽其常不二三焉以窒其常則終始如一時乃日新而常之功用凝矣然自去冬以迄于今僅五閱月而所為驟變不𩔖故常豈陛下於長乆不變之義或未之思歟抑情意厭倦易其舊而新是圗必盡棄平日之程度而不復存歟不然何其變之倏更之驟也且正臣進者治之表也往者柄臣𩔖於千官百辟之中擇其蹤跡詭秘敢行不義以為吾之役與夫至庸極陋貪懦無耻決不至於妨吾之事者而後用之於要津由是人主不得聞天下之事是非淆亂無所不至矣比嵗以來此弊已革所用之人率皆正直然以建議立論謇謇諤諤輙不為人所容盖有厭而棄之者矣去臘二臺諫之逐搢紳愕眙韋布嗟惜往往私竊妄議以為二臣所以獲譴者必其言宫庭幽隠之過也必其言宦寺女謁之私情也必其言君子小人之朋比也及退而考其所為則為其議論乆静而再言嵩之為其彈劾甫息而又論陳韡夫權奸接跡表裏為欺論之誠是也今乃借中傷善𩔖之名以逐之而不頋其指揮之乗快也稽諸故典唐介劾文彦博斥去未乆旋復召用今嵩之已都書殿之榮陳鞾亦受元樞之命而琰與昴英一斥五月未聞有召用之期旌直言者固如是耶此臣之所未喻也一詞臣之去中外小大之臣相與驚疑私竊妄議以為詞臣之所以徑去者必以其嘗言天倫之不可昧也必以其嘗言臺諫之不可逐也又以其嘗言新宫之不當建也今退而徐考其所為則謂其請老非一章求去凡十䟽也夫重於起家輕於去國固臣子之髙致也今預憂暑途之可畏而聽其徑歸姑徇人言之可畏而復預經幄予奪軒輕見於思慮委折之餘而狎侮娯嬉形於詞意抑揚之表待仁賢者固如是耶此臣之所未喻也其他如王佖之直情徑行雖乏委曲然他日之事乃以南陽而獲譴嵗月既周畀以逺節非特見天道之當復亦可騐聖心之易回也而又屏之王爚守正不阿雖少踈通然龍翔之役論諫甚力其於聖徳所補不細今杜門求去非特見去就之當然抑亦見風撡之不屈也而遂逐之此陛下不以直臣視直臣而銳於逐之其失一也旱何為而不作耶議政鄉校鄭國以昌䇿士大廷漢室以治是士氣不可一日不養也然所貴乎士者以其爵禄可辭也白刄可蹈也挾其所甚重而眇其所甚輕也尊其所可貴而輕其所可賤也豈區區富貴可得而輕重哉去嵗四學之士始也以敢言而䝉榮終也以多言而䝉辱方其敢言也孰不以青天白日為清明鳯凰麒麟為美瑞及其多言也既以一試之餌誘之於前復以不試之令制之於後既馳驟之復束縛之既羈縻之復簸弄之一切以啗嬰兒御童僕者為一時之予奪使患得患失而不敢言箝口結舌而不復言意向之所之甚於斧鉞之誅而一語之輕出過於市朝之撻其為厭薄不既多矣乎三嵗取士古制也舉於鄉試于春官覆試於有司親䇿於天子之庭重事也方其始也以鄉三物教萬民而賔興之曰賔者敬之至也及其終也鄉老及鄉大夫羣吏獻賢能之書于王王再拜而受之曰拜者尊之至也夫賔之拜之猶恐不敬今濟濟鏘鏘羣然而來而搜索挾書之令已擬其後矣夫挾書有禁國之法也徇習於累年法制之寛縱弛於一朝恩數之濫陛下而有意更革之則先期而致戒三令而五申夫孰不洗心滌慮以應新令今告諭甫形知聞未徧一旦守閽之吏禁衛之卒已得而孰何之顛倒其衣裳仳離其冠屨詬罵之聲不絶于口而士則乍入君門不敢譁也掊擊之勢不絶于道而士則乍入君門不敢聲也間有挺特之士不受屈束則相與仇視而姍笑之遂使鯁直之氣沮抑而不得伸緼蓄之胷迷惑而不得吐或畏憚而逺遯或驚疑而成疾嗚呼何其重不幸耶陛下二十四年之間未嘗有此舉動今此手一滑而僇辱至於如此此陛下不以士𩔖視士𩔖而輊於辱之其失二也旱其有不作乎撫我則后虐我則讎天畏棐忱民情難保言民則至繁而易安小民則至微而易動君臣之間交相警告使知邦之根本專在小民者盖國家之亡不在大族不在諸侯不在姦雄盜賊而止在於小民之身是天命未足為天命而人心乃所以為天命也其所關係豈小小哉近者因感生帝大興土木拓開輦路増廣祠庭七八百家之居屋随手毁除一萬餘口之黔黎聚頭嗟怨陛下雖捐水衡少府之積増直價然都城之内人心皇皇道路籍籍咸謂陛下興此不急之務以毒我民彼其窮閭故屋暑雨淋漓曽不能以自覆而陛下忍毁之乎敗絮破衾風雪凝沍曽不能以自温而陛下忍毁之乎隆寒皸瘃坐須窮餓曽不能以榖其腹而陛下忍毁之乎陛下起自民間其於民之疾苦亦熟悉之矣胡獨於此而用其忍耶不寜惟是毁室之謗未已失帶之事旋興祖宗敷遺之寳一旦失墜陛下覺之夫孰不以為當然掌寳玉者當誅而不誅盜寳玉者當誅而未即誅此國法之不可貫也而有司奉行過當無故而估籍平民乾沒寳貨者不可勝數市井之間族談聚議皆謂某人已籍矣某人已獄矣所籍已踰所失矣夫平民見利而遷初豈知其為寳玉大弓哉使其知之何敢以一身輕冒法禁此其情亦可以闊畧矣昔太祖皇帝謂朕有三條帶汴河一條恵民河一條五丈河一條今淮蜀之要地祖宗之所寳也陛下失其半亦既累年矣而不之問頋乃因一帶而擾害百姓耶甚為陛下惜此舉措也秦掲竿之夫起於閭戍之頻仍唐天寳之盜興於百姓之嗟怨萬事之得或以一事之失而召怨萬人之恱或以一夫之怨而生亂此天下必然之理也今所失非一事所怨非一夫陛下而可以細微而忽之至愚而目之乎此陛下不以小民視小民而銳於忽之其失三也旱何為而不作乎夫一善之揚可以順天也今一失於簡賢而容受之徳反其常則非所以順天矣一俊之籲可以事帝也今再失於辱士而敬體之徳反其常則非所以事帝矣一小民之安可以永命也今三失於害民而仁愛之徳反其常則非所以永命矣此旱之所應也人徒見陛下自去臘以至于今兹所失非一事而不知上天自去臘以至于今兹所應亦非一變陛下不數月而見此三失於天下上天不數月而見此數異於國中一事失則一證見一徳虧則一變生影響形聲其機甚㨗豈不大可畏哉雖然三者之失固在陛下而䋲愆糾繆則在大臣古者大臣格君心皆於過失未形之際不待已形而後言也益之戒舜則曰任賢勿貳去邪勿疑是舜未嘗有疑貳之事也召公之戒武王則曰徳盛不狎侮狎侮君子罔以盡人心是武王未嘗有狎侮之事也周公戒成王則曰君子所其無逸先知稼穡之艱難乃逸則知小人之依是成王未嘗有忽小人之事也未嘗有此事而二三大臣拳拳告其君若此是敬其君而不忍置之於有過之地也今大臣以師臣之舊居伯益周召之位其可不使陛下為舜武成王之君耶然則欲改陛下之舊失以起今日之新功則大臣當齋戒沐浴積其誠以告于陛下曰寜考所以傳位於陛下者以陛下能敬賢能禮士能安民也前日不幸而有拒諫之事又不幸而有辱士之言又大不幸而有害民之舉若悔心一生則前之所謂不幸者皆如日月之食焉不然臣亦末如之何矣陛下聖性髙明一聞此言必飜然改悔發自聖衷避殿減膳詔天下臣民極言朝政之闕失然後寵章李於既斥之餘禮多士於沮辱之餘安百姓於離析之餘使天下咸曰大哉王言又曰一哉王心則簡賢之失轉而為容受慢士之辱轉而為優禮害民之舉轉而為安民二十四年曰量曰誠曰仁三者之徳復全於今日而無驟反故常之譏矣天變其有不弭者歟語云法語之言能無從乎改之為貴惟陛下力行之子才又上言曰臣不識忌諱嘗條舉三失以告陛下矣復有餘悃願終陳之盜賊水旱之變交萃於今日人皆以為國家之災臣則以為國家之福是何也天下之祸常伏於人心所不慮之餘而國家之福每兆於君心常謹畏之日正孟子所謂生於憂患死於安樂也昔李沆相真宗每朝謁奏事畢必以四方水旱盜賊奏聞同列或以為非沆曰人主一日豈可不知憂懼也不知憂懼則無所不至其後又謂王旦曰沆死子必為相遽與敵和一朝疆埸無事不有盤㳺之樂必興土木之功矣及祥符間契丹既修好兵革不用近習用事之人始建議封泰山祀汾隂築玉清昭應宫崇奉天書耗用寖廣旦常悒悒不自得然不忍獨善其身以去曰誰為國家抗羣小者乃薦呂夷簡王曽等二十餘人布列于位所以小人力不能勝沆之此言其千萬世人主恐懼修省之龜鑑乎今敵國勢大意欲飲江禍至烈矣江湖閩越所在盜起患亦廣矣旱暵孔殷水澇並作天變亦極矣當軸居李沆之位藴李沆之識厯此三者之變固未嘗不奏聞以警上心也然警省之餘亦當求所以弭災銷變之䇿乎今禦敵雖得人而激昻奮厲振起事功在廟堂當有以盡其扶持之力平盜雖有人而安静不擾鎮撫得宜在廟堂當有以示其意向之明乃若水旱之来正君相交修力行好事之時也頃者頻遣使車慮囚放罪洊頒寛詔蠲賦恵民非不懇切而旻蒼益髙旱勢彌甚是必有大不可於帝意者不然何其窒而不通感而不應耶臣之愚見則謂陛下宜痛自悔艾而深思平日歉然不足于心惕然不寜于心者盡其所以愛敬而彌縫於㝠㝠之中以平其恨而釋其寃則鬼神恱豫宗廟安妥矣挽回不可測之天心消釋不可觧之天怒迓續不可終窮之天命其機括有大於此者乎此愚臣所以拳拳納忠於陛下也惟陛下實圗利之子才又上䟽曰臣濫吹班行尸素無補比者天乆不雨嘗不量愚昧冒萬死裁一書為陛下極言三事之失且於其末致拳拳之忠所冀聖心開悟引咎責已導諫敷㤙以解天下之惑今已踰旬未聞有所施行而天怒不解旱勢愈張四海臣民睹此鉅異愈益憂皇咸謂祖宗求言具有故實惟靖康多難不及舉行此等所為已非美證堂堂盛世所當監其失而敬天怒何乃襲其咎而玩天災乎臣竦聞其言退而追惟靖康以前之事未嘗不痛恨當時而重有感於今日也陛下自親政以來凡三更大化矣一更於端平其失也輕再更於嘉熈其失也濫又再更於淳祐其失也專曰輕曰濫曰專其事雖殊其失則一今政瑟之更幾二年于茲矣始焉剛果之氣未嘗不翕然惟慶厯元祐之趨日慆月邁志氣不強曽幾何時而委轡中道已逸而奔於崇觀宣靖之域矣嘗即其實而考之其事力反不及於崇觀宣靖而證候則有𩔖乎崇觀宣靖也且人才國家之精神也乃者弓旌四出非不招来而難進易退不肯輕出間有出者亦不能尊信而用之其間如極論綱常者執憲端平者力拄閹戚者肅清宫禁者未嘗無人而御屏簡記㡬亡其姓名夾袋薦揚又遺於物望彼亦不過甘心空谷絶意中朝方之崇觀宣靖諸臣時望之偉亦有如李綱者乎舊學之粹亦有如楊時者乎耆徳之尊亦有如許翰者乎經術之奥亦有如胡安國者乎直亮自許亦有如崔鶠李光余應求者乎威望可倚亦有如种師道劉韐宗澤者乎是人才反不如崇觀宣靖也兵者國之爪牙也兵不精利與空手同甲不堅實與袒搏同古人無日不計軍實擇令典者正謂是也今子虚烏有之籍在在而有之戍淮之兵殱於戰闘防江之兵狃於驕惰淮東先鋒數僅二干荆楚壮士十喪八九山西勁卒𩔖多烏合郡國禁兵僅充厮役而倚以捍禦者又多北來之軍圈豹養虎禍變難測加以器械鈍􅇅戈㦸凋殘䝉衝海鰍率多壊爛神臂床弩半就消磨駐隊舊制之不存克敵斗刁之不等方之崇觀宣靖間亦有十餘萬之京城兵乎亦有二百萬之諸道兵乎亦有二十七萬之河南北兵乎亦有一百七指揮馬歩軍乎亦有二百疋之天駟戰馬乎亦有五千座之京師砲乎亦有千餘兩之宣閫造車乎是兵革之多不如崇觀宣靖也財者國之命脉也國家一嵗通制國用正當量入以為出而近年以來横費亡藝嵗終㑹計已加多六七千萬一朝御札又嵗新劵三四十萬督視之行新禇以一千萬計銀兩以五十萬計其他諸閫之非時科降戎所之制造鎧甲制閫之臨遣撥賜合而言之亦千餘萬其他如宫掖之横恩燕飲之用度權奸之盜竊郡守之囊槖要路之苞苴閒官冗吏泛濫之支吾邸第宫觀不急之營繕又不可枚數府庫所積在在枵焉其視崇觀宣靖間亦有大觀西庫三四千萬緡之積儲乎亦有諸路所積三千餘萬之積鏹乎亦有在京庫務一千三百餘萬之積貨乎亦有諸監所鑄九百萬之錢乎亦有延豐倉四十萬之積粟乎亦有宣和六庫上供四百萬乎亦有無額上供三百萬乎亦有京師新收一百餘萬乎亦有諸路免夫錢六千二百餘萬緡乎雖曰半天下之勢不及全盛之時然所積竟不能髣髴其萬一是財計反不如崇觀宣靖也雖然人才不如兵財不如使振而起之猶可勉強今所患者無崇觀宣靖之事力而有崇觀宣靖之證候何謂證候曰奉御筆也事燕㳺也崇土木也逐君子也諱讜言也思權奸也用戚里也信宦官也激盜賊也致外患也御筆始於政和四年初焉楊球之代書終焉流弊之滋熾或稱詔或稱御筆手詔或用御寳或用長印或有金填紅刻指揮由中而出不在於中書門下之㫖也當時三省但奉行御筆而已陛下即位之初壓於權臣潜光晦迹不敢自大所謂御筆非惟不能亦未知其為何許事粤自親政攬權蹊路漸熟然亦未至於蕩然也今輕視四海玩弄諸臣用力於區區術數之㣲偃然自謂人莫已若矣女子宦官邸第戚里窺見罅隙請託紛如於是御筆㳫至往往夜漏十數刻省吏傳呼晷刻不爽大臣簽押奉行惟謹妨害政幾虧損觀聽清明之世為此弊倖陛下不欲為千萬世之令主乎宰相不欲為千萬世之賢相乎不然何縱弛之如是也臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎政和以後逰燕浸多燕太清樓有記燕承平殿有記曲燕保和殿有記幸鳴鑾堂又有記皆所以記一時燕㳺之盛而史臣書之不少隠諱者將以垂子孫之鑒為萬代之勸也陛下富有四海紹隆大業亦幾有年謂宜兢兢業業視為商監今得之道途咸謂陛下内庭排當寒暑不輟敵騎侵淮未盡出境而常舞酣歌見於自逸湖宼鴟張未盡撲滅而耽樂飲酒或至罷朝雖洊歌雲漢瘨旱之詩尚未下避殿減膳之詔始焉縱容不過自恕曰吾惟今日耽樂耳一日逰逸為害幾何不知是心一流則自一日至於二日而至於終身不改雖敵國急警燎原滔天駸駸及我亦㒺聞知矣臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎祖宗以来宫室制度不至太廣政和初始建延福宫樓殿相望跨越宫城自是興作不已又即延福宫之舊基建保和殿即誕聖之地作玉清和陽宫即宫城之東建寳籙宫疊石為山號曰艮嶽亦汰侈矣陛下襲十三葉祖宗之業所宜深監往失以示古人卑宫之意為天下先今得之傳聞咸謂陛下聖性好大務營土木内而宫掖四面築山多取石於南内燕息之所雖未必果有兹事然内臣附㑹多以人所不知為說誤陛下而陛下不悟其非此豈可令衆庶見乎外而龍翔興建祠宇每拓地於百姓生産作業之地雖非陛下本意然奸臣附㑹多以異說怵陛下而陛下不悟其奸此豈可使外國聞乎臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎政和元年陳瓘台州羈管崇寧六年鄒浩永州安置此皆權奸當國欺君玩世借此以報怨也今章琰李昴英居瓘浩之位而又有瓘浩區區之心其排斥嵩之論列陳韡此其志豈有他哉徒以國家比年以来氣勢微弱精神萎薾皆起於小人之誤國所以悉意極陳將以補􅇅政而裨聖聦也不謂踈狂之言上觸宸怒一斥五月不復召還前後臣隣言之屢矣而陛下終不省悟遂使二臣堕在逺方曽不得復齒縉紳之列豈盛世美事哉矧今敵國孔熾盜賊横行水旱交作患至廹矣若不早霽威嚴亟加萬一因他人激怒或以瓘浩之罪加之則大體愈虧非所以為挽回天心之術矣此臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎燕雲之議呂頥浩謂窮天下之力竭天下之財必無以善其後此忠言也而御筆則以興訛造訕罪之此言為諱也京城大水李綱謂變異不虚發必有感召之由災害非易禦必有消去之䇿此忠言也而以隄防不修即非災異詆之此言為諱也陛下自去臘以來每有諱言之意責實下詔一諱言也風諭數語二諱言也春官宣諭三諱言也搜索懐挟四諱言也逐二臺諫五諱言也去一詞臣六諱言也陛下諱言於其上羣臣緘口於其下間有冒死一言則上下相與仇視而深嫉之不以㣲罪行則以他事去之嗚呼忠臣烈士所以極言敢諌者非沽美名也非好為不靖也為人主心術慮也為朝廷大體惜也為生民大命計也而陛下一切厭薄之非特厭薄之且憎嫉之矣非特憎嫉之且逐而去之矣此豈盛世之美事哉臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎方蔡京之為中太一宫使也既許之謝事又使之削官又使之居杭凡京所為一切罷之所用一切去之誰曰京不逺矣上意決不向用矣曽未三年而五日一朝赴堂治事矣又未幾而落致仕矣領三省矣懐憾肆毒之乆矣茍可肆其一螫者未嘗不甘心焉積而至於禍敗尚忍言之哉今去相之奸與京相埒而忿戾不可解之之毒則又過之觀其厚結㳺士宻伺朝廷多積金錢直通宫禁兼以空郿塢之積以實水衡少府之儲窮水陸之珎以供太官玉食之奉此其意非但如此而已也安知其不以北事只我了得之語刼陛下乎又安知其不詐為遼使問京何在之語以竦陛下乎此臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎祖宗戚属不得預政非故䟽之其所以憂思深逺至矣鄭居中同知樞筦勉徇後宫之請既罷免之又申命之中外交疑道路指目陛下臨御以來未嘗不以至公為務而肺腑戚属屢玷班行子姓怪民濫叨扈節列辟猥歸於嬖族驕滛不減於曲陽布列卿郎日求速化翺翔丞簿時冀超遷材幹者猶有可言乳臭者是誠無謂逺而節旄誤擬南陽之寵近而畿輔有同恩澤之侯雖比之鄭居中固亦有間然浸滛不已亦非所以示天下之公也豈天下之大果無一人可以供陛下之用耶臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎童貫譚藉首禍燕雲楊戩何所踵貫而起其初起於毫芒其末流之禍至於塞天地亘古今陛下總攬權綱豈不能深燭此理然便嬛側媚有以中欲甘言巽入有以順情陛下雖未嘗縱之而慿依竊弄盖有非陛下之所能盡知者故虚張科斂之數其力可以移漕臣而陛下不悟也慿依格殺之威其勢可以屈國法而陛下不疑也典領營造費用泥沙至不貲也而勘同錢緡率用新楮不肯循國計之常掌司寳玉愛䕶不謹罪當誅也而轉移主聽嫁禍他人㡬不遵國法之常臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎方臘才亂連陷數州諸峒結連聲勢張大江西䖍吉以至建昌盜賊間作騷擾良民以至此極陛下寛以御下仁以結民薄海内外悉主悉臣豈忍自壊於照臨之下而比年或多梗化兩淮流民吾遺黎也區處無術侵廹畿甸激而為㓂如往嵗之繹騷者有之矣湖衢建昌之民吾赤子也慿恃險阻雄長相角激而為盜如前日之陸梁者有之矣閩嶺之鹽丁江湖之峒丁皆王民也為守者不知撫循與之争刀錐之利奪衣食之源憤怨不平激而為亂如今春之猖獗者亦有之矣始焉之激常起於細微終焉之憂卒至於盛大遂使横行數州之廣綿厯旬時之多大師克之猶未即功兹其為力豈不戞戞乎其難哉臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎宣和五年秋敵益兵雲中經營南宼其冬宗維宼河東宗傑入河北邉遽倐聞舉朝失色今北邉新興哨騎狎至自春徂夏勢欲飲江夀泗吾藩籬也地界南北敵所必攻驍將勢窮士馬物故則藩籬不可頼矣通泰吾根本也地據斥鹵敵所必攻人民之生聚亭竈之精儲公私之餘羡悉皆破壊則根本不可支矣福山吾屏蔽也去毗陵纔二十五里而驚塵㳺騎直至於此聲勢㡬揺於京邑烽火直至於甘泉則屏蔽又不可恃矣其如淮西諸郡間被傷殘蜀西諸屯時肆蹂踐逺而至於廣西一路又有斡腹之憂恫疑虚喝其意直不肯置我於度外也天氣尚熱變已如斯秋風纔髙禍尤惨烈陛下出自聖斷分命樞臣進屯江面仗國威靈克勝而後朝食決矣然今嵗之諜異於他日料敵制勝不宜輕易行兵用師不宜退却定功行賞不宜混淆一或反是則何以起人心興事功耶此臣所謂有崇觀宣靖之證候者此其一也天乆不雨其以是乎夫人物兵財色色不逮而亡國證候無一而不相似此臣所以痛哭流涕為陛下言之也然而欲消證候則自吾君一心始君心得其正則志氣清肅而天下之證候不生君心入於邪則晶光掩黯而天下之證候皆非先民有言陽明勝則德性用隂濁勝則物慾行萬事之得失係於一心之正不正如何耳夫天下以一人為主人君以一心為主君之方寸物慾多門撓之者衆攻之者繁至可畏也大學言治國平天下之用而其本在乎正心仲舒論正朝廷百官之本而其說則始於正心大哉心乎其理慾誠妄消長之源而天下萬事感應之機乎然嘗論之陛下之心其初未始不正也自人心汨之而心始不得其正陛下之心其初未始不誠也自妄念撓之而心始不得其誠陛下之心其初未始不清也自隂柔濁之而心始不得其清陛下之心其初未始不明也自利欲昏之而心始不得其明不能以禮制欲而陛下之心始蕩不能以義制事而陛下之心始縱此心一萌於方寸之間而証候已見於天下國家之大此無他理與慾之界限不明誠與妄之源流不别而其應如是也然則澄其源以為立政造事之本其有大於正心乎陛下清燕之頃試省察焉凡親政以來聦明不及於前時事業日負於初心者誰實為之必其聲色貨利有以蝕吾之天也便僻側媚有以汨吾之天也蜵蜎蠖濩之中不能存道心而去人心也虚明應物之地不能純天理而除人欲也内降之多必私心之勝也燕㳺之數必滛心之蕩也土木之崇必侈心之汰也君子之踈必敬心之衰也正論之嫉必誠心之怠也奸邪之喜必禍心之包也貴戚宦寺之積必愛心之纒繞也必畏心之芽蘖也盜賊外患之盛必常心之驟反也必懼心之少弛也是心之私起於方寸之端芒其極至於結為國家沈痼弗瘳之疾獨不可克而去之乎臣願陛下正其身之所主不以私慾間之實其心之所發不以妄念雜之養此心於虚明公溥之中一此心於喜怒哀樂之後叙慶厯元祐之所以得監崇觀宣靖之所以失側身修行察諸邇言凡事之背理傷道者悉更革之一動作而反欲為度一云為而即誠去偽萬事皆善十證並消此孟子所謂有本者如是而大學所謂物有本末事有終始也不揣其本而齊其末則人欲肆妄念作激而為崇觀變而為宣靖不惟不能躋慶厯元祐之治而國家之禍恐在丁未不在丙午也可不懼哉干犯雷霆不勝震慄子才又上言曰臣待罪奉常食粟而已惟曉夕露香告天願得一雨以釋吾君吾相憂勤之心一二日來油雲屏屏微雷隠隠百姓翹首以望曰今夕必雨矣吾君吾相庶㡬其少寛矣曽未頃刻風吹醨之雲雨之勢又堕虚無是雖無言盖亦有意臣因嘿坐静而思惟前時之三失今日之十證皆足以致天怒也而怒之甚者又有事焉常棣一詩其廢已乆斵䘮國脉養成敵釁當必由此非可以細故忽之也陛下逺覽古今飽諳世故其於禍福倚伏之機察之熟矣所宜運思眇綿動心寂寞復兄弟本然之天性洗國家難觧之嫌疑使幽明之際怨恨俱消泬寥之中䰟魄有主則綱常事定骨肉釁平上天之怒豈有乆而不釋之理哉臣干犯天威罪當萬死惟陛下赦宥子才又繳進輪對䟽曰臣日者天乆不雨甞竭愚忠首陳三失次條十證又於貼黄兩言天倫之當厚乞陛下恪循故事下詔求言今政事之間雖未見陛下有所改悔而祖宗故事則已施行仰見陛下聖徳本自聰明前旒未為䝉蔽而臣之言亦不為徒發也臣初謂政在中書而專攻上身者罪也政不在中書而專攻上身者亦罪也臣比進兩䟽既已冒犯罪戾推究災異之所從出為陛下言之矣而陛下之諸臣豈得為無罪耶請極論其所以然臣嘗讀易至否而重有感於今日焉天地交則為泰不交則為否否者閉塞不通之名也故太元準之以唫以守唫曰隂不之作陽不之施萬物各唫守曰隂守户陽守門物莫相干謂天地各居其所閉塞而不通也當是時也内隂不肯應外之陽下氣不肯應上之氣此臣之所謂否也以節令言之雪者五榖之精也去臘不雪雷者號令之象也今春夏不雷五月梅節也地乆不梅夏至雨節也天乆不雨至於六七月之間是皆天地閉塞而隂陽之氣不和也非否乎夫否塞之證見於上下不交之時人孰不以為天地自閉塞也而不知天地之所以閉塞者則陛下之諸臣實為之諸臣謂何宰相臺諌是也凡其所為不能貫通於上下者皆否也而可已於言乎所貴乎宰相者以其能輔佐天子而進退百官也向也端平之初進賢去佞位置得宜天下翕然稱之曰小元祐雖兊㑹壊楮履畝傷民入洛失地輕銳可譏而用人一節髙掩千古真賢相也今再相淳祐四海蒼生日夜復以端平之治望今日而免牘未下旱暵頻仍景象逼廹上下煎熬雖日不暇給而一再進擬大抵不能盡副天下之望今觀其布在班行非天子之勲戚則大臣之鄉舊也非侯伯之子孫則臺諫之羽翼也非邸第之狎客則京兆之親宻也又觀其布在郡國非天子之近親則大臣之婿姪也非執政之姻婭則諸邸之子弟也非諫坡之舊舘則臺臣之婦翁也苞苴之餽交接於閨閫深邃之間請託之私周旋於堂從鄉隣之宻黄髮兒齒之老豈能制依慿機巧之人赤松從逰之餘胡亦有頋惜子孫之念人謂小相若在猶且善惡相兼豈謂大老来歸乃無一事公當逺視端平如出兩人近比淳祐殆同一轍而況胡宗愈軰隂結厚確交相為朋人所共嫉今乃拂逆公論引據要津清臣温伯左袒熈寜蹤跡顯著人所共嫉今乃故開倖門延入共政調停之説一起呂范之責難逃況君子小人勢如冰炭決無兩立之理必有反覆之虞與其自保於一身孰若均憂於天下不此之務乃反誨之豈不重孤天下之望耶此宰相之否也所貴乎臺諫者以其能繩愆糾繆分别邪正於已然之後也祖宗時臺諫例不兼講席自中興後王賔為中丞建請復開經筵自是每除言路必兼講讀說書之職由此臺諫與天子習熟無復有敢言者矣向也為權臣之私人今則為天子之私人矣向也供劾檢於權奸今則受天子之宣諭矣向也受劾草於權奸今則受天子之調停矣故上意所不予則施矰繳於既逐之諫臣上語所不樂則縱斧斤於廣東之倉節或倚上眷而執人物進退之權或探上心而掣朝廷行事之肘此逢君者也乃若宰旅直士棖觸鼎鼐則弋之惟懼其不早中書緊官拂逆貴近則擠之惟恐其或後樞臣剛愎睥睨台枋則傾臺以助之督視臨遣請存臺諫則含茹以翼之此媚要途者也其他計使同列而已獨寂然隂報私仇而我若無與或以惡名而中傷善𩔖或託公義而輕㸃時賢此行私意者也所可誚者擊婺相於京祠已罷之後擊殿帥於兵權已解之後姑以備數豈果觸邪此懐茍心也推原其意不過如鄧綰軰受笑罵攫好官而已最是宥府之臣才智輻湊其力足以拒權奸也中執法則擊之以倒公議之戈騎省之長天資柔佞其術足以援權奸也中執法則翼之以摩公議之壘則是開奸邪道路之基培國家禍亂之本者中執法也雖然此豈人力之所能為不知造物者栽埋此禍根養成此禍胎將醖造何等事以壊天下國家耶此臺諫之否也宰相之説不過曰所以致旱者非一日之積也行乎國政如彼其新也受任以來未嘗畫一籌也是則然矣然舊學疇庸非他臣比雋夀在位非新進比中書再入非生局比觀棊既乆非輕奕比舉而措之茍合公論則天聽雖髙亦且感動矣今所為若此其何以回天怒乎為今之計當公此心以為進賢退佞之地固不可乗間而進所私之人尤不可因便而任所親之吏固不可顔情而用讒謟之徒尤不可愛憎而嫉恬退之士也其他鎮定事機調齊鼎實平章棼錯皆當以一公字行之否轉而泰此其機乎其或力不逮心終以渝始則否之又否矣臺諫之説不過曰新宫不可諫也諫則嬰鱗忤㫖矣大奸不可論也論則胚胎後菑矣寵佞不可言也言則追蹤章李矣是則然矣然大觀文致仕之命出於睿斷則權奸未始不可去也龍翔工役人以為不可止而天子暫止之戚里貪虐人以為不可去而天子終去矣則是天子未嘗不可諫特諸臣觀望頋惜不肯諫耳為今之計當公一心以為排擊奸邪之地固不可任喜怒之情而報宿怨尤不可因黨與之偏而快私心固不可以風聞之謾而害善良尤不可舉瑕纇之微而黜孤逺其他一徳之疵一事之失一舉措之誤皆以公心言之否轉而泰此其機乎其或怙終不改耻過作非則否之又否矣夫宰相失其調燮之職而道揆之地結而為一否卦臺諫失其風憲之職而法守之地結而為一否卦是以上下不交天地不通當雪不雪當雷不雷當梅不梅當雨不雨又激而為天地間一大否卦也雖然又有所說臣所論宰相臺諫不過舉其事耳而未論其心也請為陛下言之瑣瑣閹㜮挾天子之威窟於宫禁而為天下奸邪犇趨之主赫赫權奸挾宫闈秘奥之援窟於海濵而為天下䛕佞嗾使之主陛下内牽閹㜮之愛外怵權奸之賂佞人憸夫闚見罅隙遂謂陛下因閹㜮之交通將權奸之復用也於是寵幸者内則交結於閹㜮以濟其私外則接引於權奸以締其好大佞者内則借譽於閹㜮以固其寵外則隂主於權奸以効其報遂使忠臣飲氣志士吞聲嗚呼陛下為社稷宗廟之主為四海臣民之主而不自主張乃使若權奸若寵倖等軰反結閹㜮之交以取必於陛下又倚陛下之勢以脅制於羣臣數日以來外論頗傳陛下以外權太重思欲起權奸而用之又見邇來所用樞臣皆權姦平日之所與遂相與讙言權奸復出矣審如是必交結諸臣之左右以誤陛下此其意欲何為哉是撡王莽董卓之心以盜陛下之富貴也夫奸利之臣所主如此茍得一重臣如玉旦力遏王欽若之不可當國如韓琦坐政事堂出頭子勾任守忠徑押就貶所使在我者有泰山喬嶽之勢則中外之人乃始知畏不敢為非今秉鈞者不惟不能遏絶乃反倚以為重不惟不能竄逐乃反推波助瀾則將焉用彼相哉又如李沆言丁謂有才不可用如司馬光謂王廣淵奸邪不可近使在我有壁立萬仭之勢則巧佞之人乃始斂戢不敢妄圖今謀國者不惟不能踈逺乃反與為婚姻不惟不能諫止乃反與通譜叙則將焉用彼相哉夫宰相統百官而一宫府也今内倚閹㜮外比奸邪或相挽推或相鼓舞豈持禄保位之念勝而正大之體或虧患得患失之心多而卓特之見或少耶豈牽連諸臣之黨與自度不能勝其奸姑委靡頺堕以聽其所止耶抑畏憚權奸之氣燄自揣不能抗其鋒姑韜杜斂軸以待其自定乎不然何為徇䁥已之私忘天下之公随波逐流事事鶻突系小子失丈夫以至此極耶此以張禹孔光之學誤陛下之國家也則將天地磔裂日月錯行星辰顛踣如漢之末造又豈止不交不通而已哉然則上有休否之君則下有休否之臣否之九五曰休否大人吉其亡其亡繫于苞桑夫否極之世泰道有將開之機否道有將傾之勢然猶未離於否也君子處此豈可茍安而玩視乎故安而不忘危存而不忘亡治而不忘亂常有戒懼危亡之心則繫於苞桑堅固不㧞矣陛下當隂不消陽不虧之時雖有光明正大之位以為休否之資雖有陽剛中正之才以為休否之道然必深思逺慮常懐其亡之戒而後有苞桑不㧞之固若非恐懼修省常憂否道之復來念慮㡬微常思否證之復見則表裏諸臣不知警懼相與為非則否日益甚而神器移矣豈四海蒼生所以深望於休否之君也哉惟陛下留神歴代名臣奏議卷三百十一
