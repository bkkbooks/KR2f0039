body:
  text: 歴代名臣奏議卷三百十四明楊士竒等撰灾祥宋理宗時江東提㸃刑獄杜範上奏曰旱暵洊臻人無粒食楮劵猥輕物價騰踴行都之内氣象蕭條左浙近輔殍死盈道流民充斥未聞安輯之政剽掠成風已開弄兵之萌是内憂既迫矣新興北兵乗勝而善闘中原羣盜假名而崛起𢷬我巴蜀據我荆襄擾我淮堧近又由䕫峽以瞰鼎澧疆埸之臣肆為欺蔽勝則張皇而言功敗則掩覆而不言脫使乗上流之無備為飲馬長江之謀其誰與捍之是外患既深矣人主上所事者天下所恃者民近者天文示變妖彗吐芒方冬而雷既春而雹海潮衝突於都城赤地幾徧於畿甸是不得乎天而天已怒矣人死於干戈死於饑饉父子相棄夫婦不相保怨氣盈腹謗言載路等死一萌何所不至是不得乎民而民已怨矣内憂外患之交至天心人心之俱失陛下能與二三大臣安居於天下之上乎陛下亦嘗思所以致此否乎盖自曩者權相陽進妾婦之小忠隂竊君人之大柄以聲色玩好内蠱陛下之心術而廢置生殺一切惟其意之所欲為以致紀綱陵夷風俗頽靡軍政不修而邊備廢缺凡今日之内憂外患皆權相三十年醖成之如養䕶癰疽待時而決耳端平號為更化而居相位者非其人無能改於其舊敗壊汙穢殆有甚焉自是聖意惶惑莫知所倚仗方且不以彼為讎而以為徳不以彼為罪而以為功於是天之望於陛下者孤而變恠見矣人之望於陛下者觖而怨叛形矣陛下敬天有圖㫖酒有箴緝熈有記使持此一念振起傾頽宜無難者然聞之道路謂警懼之意秖見於外朝視政之頃而好樂之私多縱於内廷燕䙝之際名為任賢而左右近習或得而潛間政出於中書而御筆特奏或從而中出左道之蠱惑私親之請託䝉蔽陛下之聰明轉移陛下之心術也範遷吏部侍郎兼侍講以久旱復上言曰陛下嗣膺寶位餘二十年灾異譴告無嵗無之至于今而益甚陛下求所以應天者將止於減膳徹樂分禱羣祀而已乎抑當外此而反求諸躬乎夫不務反躬悔過而徒覬天怒之釋天下寜有是理欲望陛下一洗舊習以新天下出宫女以逺聲色斥近習以防蔽欺省浮費以給國用薄征斂以寛民力且儲貳未立國本尚虚乞選宗姓之賢者育之宫中而教導之又言銓法之壊廟堂既有堂除復時取部缺以徇人情士大夫既陷贓濫乃間以不經推勘而改正凡此皆徇私忘公之害未㡬復上言曰天災旱暵昔固有之而倉廪匱竭月支不繼升粟一千其増未已富户淪落十室九空此又昔之所無也甚而闔門餓死相率投江里巷聚首以議執政軍伍誶語所不忍聞此何等氣象而見於京城衆大之區浙西稻米所聚而赤地千里淮民流離襁負相屬欲歸無所奄奄待盡使邊塵不起尚可相依茍活萬一敵騎衝突彼必奔迸南来或相攜從敵因為之鄉導巴蜀之覆轍可鑑也竊意陛下宵旰憂懼寜處弗遑然宫中宴賜未聞有所貶損左右嬙嬖未聞有所放遣貂璫近習未聞有所斥逺女冠請謁未聞有所屏絶朝廷政事未聞有所修飭庶府積蠧未聞有所捜革秉國鈞者惟私情之徇主道揆者惟法守之侵國家大政則相持而不決司存細務則出意而輒行命令朝更而夕變紀綱蕩廢而不存無一事之不弊無一弊之不極陛下盍亦震懼自省詔中外臣庶思當今急務如河道未通軍餉若何而可運浙右旱歉荒政若何而可行財計空匱糴本若何而可足流徙失所遣使若何而可定敵情叵測邊圉若何而可固各務悉力盡思以陳持危制變之䇿右正言兼侍講李大同上言曰趙冀分野乃有熒惑犯填星之變則我師之出豈無當長慮而郤顧者臣願陛下勿以星文為小異而或加忽一話一言一政一事必求有以格天心而弭災變度宗咸淳九年起居舍人髙斯得進故事曰漢董仲舒治國以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是行之一國未嘗不得所欲臣聞水旱之有祈禳古之道也何則民命所闗茍有可以救之者君子必盡心焉不若是則謂之無志於民可也周禮太祝六祈有鬯人禜門祭法曰雩宗祭水旱也漢晉梁隋暨唐皆遵用之不以為世俗祈禳小數而忽之也然臣以為水旱之有祈禳猶焚溺之有救拯當急而不當緩急則可及其未然而弭之緩則災變成形無益於事矣雲漢之詩曰祈年孔夙方社不莫夙與不莫者言貴早耳古人之於民事皇皇汲汲而圖之故曰民事不可緩也董仲舒之治江都史不載他事獨詳著其求雨止雨之法亦可見以此為先務之急矣行之一國未嘗不得所欲忱意感通宜其應之速也國家凡有水旱祈禳之禮著于令甲有司未嘗不舉而行然常失之遼緩赫赫炎炎苗將槁死而勤雨之令始行浩浩洋洋慮殫為河而閉隂之典方舉其未然者固可及救然其所傷亦已多矣有民有社災已切近勇於行之不為晉越也而猶拘攣蓄縮視儀聽唱亦何為哉雖然水旱者隂陽而已救之者縱閉而已所謂縱閉豈止於城門開闔而已哉夫淫雨為沴者隂盛陽㣲之證也今朝廷之上明目張膽之夫少而宛舌同聲之士多此隂也邊鄙之間投石拔距之氣衰而棄甲曳兵之習痼此隂也田里之間擊壌鼓腹之音絶而疾首蹙頞之恨深此隂也光弼出矣而旗幟未見其精明勝之用矣盜賊不為之衰止貪墨之吏去之是也而使之易鎮僨軍之將斥之是也而使之扞城朝臣舛午膠戾乖剌㡬有漢人之患正衙罷奏庶官不對㡬有唐世之風凡此皆隂盛陽㣲之證也㣲者不縱使之日消盛者不閉使之日長安得不感天地之精而生戾氣哉此又祈禳之大者而尤當皇皇汲汲以圖之也臣憂愛之深愚戇妄發惟陛下幸赦牟濴進故事曰乾道元年二月甲辰以久雨避殿減膳蠲兩浙災傷州縣身丁錢絹決繫囚蠲福建寺觀嵗輸寛剰二年四月戊寅以淫雨為沴詔侍從臺諫講究刑政所宜以聞臣恭惟皇帝陛下臨政願治法祖敬天肇新初元與天下更始徳至渥也乃仲春之月一雨兼旬霖霪未已聖心惻然憂民之憂遣使察獄捐帑賑貧堯舜用心何以加此臣竊觀中興以来之治莫盛於乾淳而稽之史冊元年春以久雨避殿減膳次年夏以淫雨講究刑政夫以夀皇勵精為治之初君徳初無絲毫之失而頻年苦雨如此夀皇切切然懼一政一事之間有以干隂陽之和者即此一念自可格天故終不能累乾淳之治者以此陛下初政罔匪大公杜貢獻之門絶憸壬之路皆為民生計也而隂沴之氣乃見於清明之時何耶快活條貫日見施行天地生物之心也或者奉行不䖍徳意志慮猶未逹於民歟聖恩汪洋仁及草木天地成物之仁也或者猶有沈鬱于下而不能自拔者歟禁法令所當禁欲民知重本也而京城游手末作者衆或困於衣食之無資平物價之未平欲民易養生也而在在物價騰湧毎病於貿遷之無術不傷不困明主未嘗不欲躋世於治平而欲夀欲安人情終莫能盡遂也得無猶有乖氣致異者歟不然有君如此淫雨何從而来耶方細民艱食計日以望二麥之登而今壊於垂成何以觧陛下為民之憂耶陛下謙遜未嘗御正殿未嘗享玉食之奉可無愧於孝宗皇帝避殿減膳矣臣願陛下以孝宗之心為心詔内而侍從臺諫講求刑政之所宜外而監司帥守條陳民生之疾苦因其所已行而求其所未至一政一令果合人情乎人情悦則天意回矣然此皆目前顯然之憂也而隂陽消長之機又有大可畏者焉今正人登進善𩔖翕集方陽明用事而隂晦乃爾是可不思其故乎隂為女子為小人以至四裔盜賊皆隂也陛下力行通喪孝思罔極決無聲色之奉所可慮者小人得無包藏乎四裔得無窺伺乎盜賊得無竊發乎天其或者警吾君吾相使為持陽抑隂之計無事而為有事之防歟凡此數端皆當上闗聖慮書曰惟事事乃其有備有備無患惟陛下與二三大臣亟圖之臣不勝惓惓宗正少卿趙景緯上奏曰雷發非時竊迹今日之事而有疑焉内批疊降而名器輕宫閫不嚴而主威䙝横恩之濫已收而復出戢貪之詔方嚴而随弛宫正什伍之令所以防竒衺而或縱於乞憐之卑詞緇黄出入之禁所以嚴宸居而間惑於禬禳之小數以至彈墨未乾而抆拭之㫖已下駁奏未㡬而㨗出之徑已開命令不凝則陽縱而不收主意不堅則隂閉而不宻陛下可不思致災之由而亟求所以正之哉願清其天君以端出治之源謹其號令以肅紀綱之本毋牽於私恩而撓公法毋遷於邇言而亂舊章去讒而逺色賤貨而貴徳則人心悦而天意得可以開太平而兆中興也金章宗明昌二年參知政事張萬公賜告省親還上問山東河北粟貴賤今春苗稼萬公具以實對帝謂宰臣曰隨處雖得雨尚未霑足柰何萬公進曰自陛下即位以来興利除害凡益國便民之事聖心孜孜無不舉行至於旱災皆由臣等若依漢典故皆當免官帝曰卿等何罪殆朕所行有不逮者對曰天道雖逺實與人事相通唯聖人言行可以動天地昔成湯引六事自責周宣遇災而懼側身修行莫不修飾人事方今宜崇節儉不急之務無名之費可俱罷去帝曰災異不可專言天道盖必先盡人事耳故孟子謂王無罪嵗左丞完顔守貞曰陛下引咎自責社稷之福也承安五年烈風昏曀連日詔問變異之由平章政事圖克坦鎰上奏曰仁義禮智信謂之五常父義母慈兄友弟敬子孝謂之五徳今五常不立五徳不興縉紳學古之士棄禮義忘亷耻細民違道畔義迷不知返背毁天常骨肉相殘動傷和氣此非一朝一夕之故也今宜正薄俗順人心父父子子夫夫婦婦各得其道然後和氣普洽福禄洊臻矣因論為政之術其急有二一曰正臣下之心竊見羣下不明禮義趨利者衆何以責小民之從化哉其用人也徳器為上才美為下兼之者待以不次才下行美者次之雖有才能行義無取者抑而下之則臣下之趨向正矣其二曰導學者之志教化之行興于學校今學者失其本真經史雅奥委而不習藻飾虚詞釣取禄利乞令取士兼問經史故實使學者皆守經學不惑於近習之靡則善矣又曰凡天下之事叢来者非一端形似者非一體法制不能盡隐於近似乃生異論孔子曰義者天下之斷也記曰義為斷之節伏望陛下臨制萬機事有異議少凝聖慮尋繹其端則裁斷有定而疑可辯矣宣宗時天旱宣差河南提控完顔伯嘉上奏曰日者君之象陽之精旱暵乃人君自用亢極之象宰執以為寃獄所致夫燮和隂陽宰相之職而猥歸咎於有司髙琪武弁出身固不足論髙汝礪輩之不知所職其罪大矣漢制災異䇿免三公顧歸之有司邪臣謂今日之旱聖主自用宰相諂䛕百司失職實此之由也元太祖征西域駐鐵門闗有一角獸形如鹿而馬尾其色緑作人言謂侍衞者曰汝主宜早還帝以問左右員外郎耶律楚材對曰此瑞獸也其名角端能言四方語好生惡殺此天降符以告陛下陛下天之元子天下之人皆陛下赤子願承天心以全民命帝即日班師世祖至元二十年有星孛于帝座帝憂之夜召平章政事布呼密入禁中問所以銷天變之道對曰風雨自天而至人則棟宇以待之江河為地之限人則舟楫以通之天地有所不能者人則為之此人所以與天地參也且父母怒人子不敢疾怨惟起敬起孝故易震之象曰君子以恐懼修省詩曰敬天之怒又曰遇災而懼三代聖王克謹天戒鮮不有終漢文之世同日山崩者二十有九日食地震頻嵗有之善用此道天亦悔禍海内乂安此前代之龜鑑也臣願陛下法之因誦文帝日食求言詔帝悚然曰此言深合朕意可復誦之遂詳論欵陳夜至四鼓明日進膳帝以盤珍賜之世祖聞李冶賢召問昨地震何如冶對曰天裂為陽不足地震為隂有餘夫地道隂也隂太盛則變常今之地震或姦邪在側或女謁盛行或讒慝交至或刑罰失中或征伐驟舉五者必有一于此矣夫天之愛君如愛其子故示此以警之耳茍能辯姦邪去女謁屏讒慝省刑罰慎征討上當天心下協人意則可轉咎為休矣帝嘉納之成宗大徳七年八月戊申夜地大震詔問致災之由及弭災之道齊履謙對曰按春秋言地為隂而主静妻道臣道子道也三者失其道則地為之弗寜弭之之道大臣當反躬責已去專制之盛以答天變不可徒為禳禱也成宗以恒暘暴風星芒之變詔公卿集議弭災之道翰林學士承㫖劉敏中等上奏曰切惟事有本末政有後先今摭其本與先者言之其畧有七一曰畏天天育萬物不能自理乃立君以主之故君者所以代天育物也惟明君能知天監在上赫赫甚邇凡一語動一政令罔不兢兢業業思合天則期當天心若論官則曰天命有徳五服五章不敢乗一時之喜怒而輕予奪之也若論刑則曰天討有罪五刑五用不敢因一時之喜怒而輕出入之也凡事如此謹守勿失於是隂陽和風雨時而萬物育天相之也乃若政令之或爽天必出災異以儆之而儆之者所以仁愛人君欲其久安長治而萬物得其育也故明君遇此則必省躬以知懼昭徳而塞違誠格政修天意乃得於是災變弭而和氣復矣故雖堯湯之世不能無水旱而卒以無害者堯湯用此道也二曰敬祖自古帝王創建國家無不自艱難而得之而傳之子孫猶菑者之望播穫作室者之待堂構也夫固不易哉我太祖皇帝起自朔方身歴百戰收附諸國惡衣菲食櫛風沐雨何如其辛勤也世祖皇帝親歴行陣心籌計畫恭儉敬畏以有天下混一南北何如其辛勤也欽惟陛下以仁明天縱之聖紹膺景命盖嘗以此存心思祖宗開基建業之不易而遇是儆也固益兢兢業業用一財則必曰此民力也自祖宗艱難而得之也豈可輕用官一人則必曰此國柄也自祖宗艱難而致之也豈可輕與動静整勅毎事如此則百司自然共職庶政自然修舉祖宗在天之靈必皆歡恱而天佑響答福禄日臻邦基益固矣三曰清心心者一身之主萬事之本也夫目之於視耳之於聽口之於言手之於執足之於履皆惟心之所使心得其正則接物臨事之際視聽言動皆得其正而無有繆悮乖戾之患況四海之廣萬㡬之㣲皆仰治于一人而一人之所仰者非惟心乎盖水必止乃可以涵物象鏡必明乃可以别妍醜故帝王貴清心清者静一不遷之謂也若聲色之娯宴飲之樂所不能無尤當節適使不至撓吾心之清心清則四海之廣無不燭萬㡬之㣲無不察光明洞徹不言而信讒䛕不得施邪偽不敢前百官有司各安其職無有撓格之患則法制流行紀綱振舉災變息而天下治矣語曰本立而道生故帝王以清心為本實總攬權綱之要道也四曰持體事莫不有體體者得其要之謂耳人君任宰輔以馭百官守法度以信萬民斯其體也若乃任一小官罰一小過有司之事耳而人君親之則有司懼矣夫上下正政令一賦斂以時用度有節賞罰必信此天下之守也而朝行夕改守無所止則臣下恐懼皆思為己而怠其所職殃害及民怨讟不免而或召災異故為君之道在乎持大體先有司裁制予奪必信必一則雍熈之治可坐而致何災異之有哉五曰更化傳有之琴瑟不調甚者必觧而更張之為政不行甚者必變而更化之今有司所甚患者曰財用不足曰選法撓亂曰官府不治三者而已改絃更張此其時也盍亦思其所由乎財用不足豈非所入者有限所出者無窮歟選法撓亂豈非賢不肖混淆越格者多而非格者不少歟官府不治豈非賞罰不明而名節素不勵歟宜敕有司詳校一嵗錢榖所入㡬何所出㡬何若所出皆為當出則財之不足將無法可理若猶有不當出而可以已者如不急之營繕無名之賜予據其名件一皆止之則財用必足矣又詳校銓選除合格外越格與非格者㡬何任廻量其根脚功過定奪仍原其所由跡轍一禁絶之則選法必行矣官府之制上下内外相維相資各有條理果皆得人何有不治然人材不齊善惡必有故賞罰立焉若善者當賞而不賞惡者當罰而不罰則善者變而為惡而惡者狃而益甚又如犯至不叙大罪也而或巧圖復用老病謝事常理也或戀不忍去至有貪欺害民善於自蔽不即敗露上官不以審風憲不以察因習成風不知有耻治何由興宜嚴敕省臺公賞罰勵名節由京朝始則官府自治矣凡此三者更化之大畧也三者果更民力必紓人材必多祥瑞必集國勢必隆然非更之之難行之之難也非行之之難守之之難也惟聖天子以畏天敬祖清心之徳守而行之又何難哉六曰察吏治官府之設本以為民然而民弗䝉恵者豈非任職之人亷正者恒少而貪邪者恒多歟恒少者宜培植而反摧抑之歟恒多者宜簡除而反擁䕶之歟何以知其然也夫亷正者仰不能悦上官而復或忤也憾怒畜矣俯不能媚奸民而又常戢之怨憎積矣故舉一事則沮於上行一政則謗於下奸人乗釁猾吏授計扇黨搆誣譁然訟之蓄怒者得以折辱求索鍜煉而成其罪夫以搢紳亷正之士一旦屈膝受誣置對於無賴之小民縱萬一得觧而風槩掃地矣彼貪邪者於上則先意以希合於下則越禮以求媚贓賄狼籍無由敗露憲司上司佯為不知安然秩滿給由而去乃且奔走權要徼取優等擇授美官是亷正者少而益少貪邪者多而益多也嗚呼所謂實恵者將孰從而致之哉夫源清則流清本治則末治宜端本澄源特發嚴令戒敕内外官吏皆當洗心易慮奉公為民所在憲司及上司衙門毋敢抑正容姦務要精詳察舉其治行超衆者増秩賜金如漢世故事貪鄙尤甚者黜竄不齒憲司或失察舉亦行論罪如是良吏日多奸吏日少官府立而政化行恵及民而災變息矣七曰除民患公家百須皆民所出取之有法民不知病今夫夏絲秋税乃其常賦和買和雇官皆給價宜無所病者然和買和雇名件不一駢至疊出責辦須㬰故和買必至望户科着貪吏憸人得縁為姦易新鈔為爛鈔者有之給價撙除者有之縁指其物惡賂焉而受者有之預嚇以多買而取賂者有之受賂當買之户而移之下户者有之而又追呼停留費用過當民不勝擾矣其和雇則十車之運而為百車之雇有車之家闔境追攝必賂而後免故和買和雇姦民之利而細民之病也今後一切和買和雇憲司必須宻為體察仍許諸人首告似前犯者痛行追斷監臨有失防禁罰俸摽過甚者降等憲司不察同坐惟後止於大都將年例和買段疋絲絹等物預期張立榜文各開色様幅尺麄細輕重添價收買仍許中買塩引商旅四集旬月可辦不惟省減脚力防押官兵及免水火盜賊之虞實永絶姦人因公規利害民之弊若慮或有躭悞且可内外分買若大都果便来嵗通行斯亦恵民弭災之切務也英宗至治三年夏帝以日食地震星變詔議所以弭災者太常禮儀院經歴曹元用上言曰應天以實不以文脩徳明政應天之實也宜撙浮費節財用選守令卹貧民嚴禋祀汰佛事止造作以紓民力慎賞罰以示勸懲至於科舉取士之法當革冒濫嚴考覈俾得真才之用朝廷咸是之泰定帝泰定元年車駕在上都先是帝以災異詔百官集議集賢大學士張珪與樞宻院御史臺翰林集賢兩院官極論當世得失詣上都奏之曰國之安危在乎論相昔唐𤣥宗前用姚崇宋璟則治後用李林甫楊國忠天下騷動㡬致亡國雖賴郭子儀諸將效忠竭力克復舊物然自是藩鎮縱横紀綱亦不復振矣良由李林甫妒害忠良布置邪黨奸惑䝉蔽保禄養禍所致死有餘辜如前宰相特們徳爾奸狡險深隂謀叢出專政十年凡宗戚忤已者巧飾危間隂中以法忠直被誅竄者甚衆始以贓敗諂附權姦實勒們及嬖幸伊埓薩巴之徒茍全其生尋任太子太師未㡬仁宗賔天乗時幸變再入中書當英廟之初與實勒們等恩義相許表裏為姦誣殺蕭楊等以快私怨天討元凶實勒們之黨既誅坐要上功遂獲信任諸子内有宿衞外據顯要蔽上抑下杜絶言路賣官鬻獄威福已出一令發口上下股栗稍不附己其禍立至權勢日盛中外寒心由是羣邪並進如逆賊特克實之徒名為義子實其腹心忠良屏迹坐待收繫先帝悟其姦惡仆碑奪爵籍没其家終以遺患構成弑逆其子索諾木親與逆謀所由来者漸矣雖剖棺戮尸夷滅其家猶不足以塞責今復回給所籍家産諸子尚在京師夤縁再入宿衞世祖時阿哈瑪特貪殘敗事雖死猶正其罪況如特們徳爾之姦惡者哉臣等議宜遵成憲仍籍特們徳爾家産逺竄其子孫外郡以懲大姦君父之讎不共戴天所以明綱常别上下也特克實之黨結謀弑逆君相遇害天下之人痛心疾首所不忍聞比奉㫖以特克實之徒既伏其辜諸王阿勒台布哈博囉伊埓特穆爾綽羅布哈烏魯思布哈亦已流竄逆黨脅從者衆何可盡誅後之言事者其勿復舉臣等議古法弑逆凡在官者殺無赦聖朝立法强盜刼殺庶民其同情者猶且首從俱罪況弑逆之黨天地不容宜誅阿勒台布哈之徒以謝天下書曰惟辟作福惟辟作威臣無有作福作威臣而有作福作威害于而家凶于而國盖生殺與奪天子之權非臣下所得盜用也遼王托克托位冠宗室居鎮遼東屬任非輕國家不幸有非常之變不能討賊而乃覬幸赦恩報復讎忿殺親王妃主百餘人分其羊馬畜産殘忍骨肉盜竊主權聞者切齒今不之罪乃復厚賜放還仍守爵土臣恐國之紀綱由此不振設或效尤何法以治且遼東地廣素號重鎮若使托克托乆居彼既縱肆將無忌憚況今死者含寃感傷和氣臣等議累朝典憲聞赦殺人罪在不原宜奪削其爵土置之他所以彰天威刑以懲惡國有常憲武備卿濟里前太尉布哈以累朝待遇之隆俱致髙列不思補報專務姦欺詐稱奉㫖令鷹師强收鄭國寶妻古哈貪其家人畜産自恃權貴莫敢如何事聞之官刑曹逮鞫服實竟原其罪輦轂之下肆行無忌逺在外郡何事不為夫京師天下之本縱惡如此何以為政古人有言一婦銜寃三年不雨以此論之即非細務臣等議宜以濟里布哈付刑曹鞫之中賣寳物世祖時不聞其事自成宗以来始有此弊分珠寸石售直數萬當時民懐憤怨臺察交言且所酬之鈔率皆天下生民膏血錙銖取之從以捶撻何其用之不吝夫以經國有用之寳而易此不濟饑寒之物又非有司强要和買大抵皆時貴與斡脫中寳之人妄稱呈獻冒給回賜髙其直且十倍蠶蠧國財暗行分用如沙布迪音之徒頃以増價中寳事敗具存吏牘陛下即位之初首知其弊下令禁止天下欣幸臣等比聞中書乃復奏給累朝未酬寳價四十餘萬錠較其元直利已數倍有事經年逺者三十餘萬錠復令給以市舶畨貨計今天下所徴包銀差發嵗入止十一萬錠已是四年徴入之數比以經費弗足急於科徴臣等議畨舶之貨宜以資國用紓民力寳價請俟國用饒給之日議之太廟神主祖宗之所妥靈國家孝治天下四時大祀誠為重典比者仁宗皇帝皇后神主盜利其金而竊之至今未獲斯乃非常之事而捕盜官兵不聞杖責臣等議庶民失盜應捕官兵尚有三限之法監臨主守倘失官物亦有不行知覺之罪今失神主宜罪太常請揀其官屬免之國家經賦皆出於民量入為出有司之事比者建西山寺損軍害民費以億萬計刺繡經幡馳驛江浙逼迫郡縣雜役男女動經年嵗窮奢致怨近詔雖己罷之又聞姦人乗間奏請復欲興修流言喧播羣情駭驚臣等議宜守前詔示民有信其剏造刺繡事非嵗用之常者悉罷之人有寃抑必當昭雪事有枉直尤宜明辯平章政事蕭拜珠中丞楊多爾濟等枉遭特們徳爾誣陷籍其家以分賜人聞者嗟悼比奉明詔還給元業子孫奉祀家廟修葺茍完未及寜處復以其家財仍賜舊人止酬以直即與再罹斷没無異臣等議宜如前詔以元業還之量其直以酬後所賜者則人無寃憤矣徳以出治刑以防姦若刑罰不立奸宄滋長雖有智者不能禁止比者額森特穆爾之徒遇朱太醫妻女故省門外强拽以入姦宿舘所事聞有司以扈從上都為觧竟弗就鞫輦轂之下肆惡無忌京民憤駭何以取則四方臣等議宜遵世祖成憲以姦人命有司鞫之臣等又議天下囚繫寃滯不無方今盛夏宜命省臺選官審録結正重刑䟽決輕繫疑者申聞詳讞邊鎮利病宜命行省行臺體究興除廣海鎮戍卒更病者給粥食藥力死者人給鈔二十五貫責所司及同鄉者歸骨於其家嵗貢方物有常制廣州東莞縣大歩海及恵州珠池始自大徳元年姦民劉進程連言利分蜑户七百餘家官給之糧三年一採僅獲小珠五兩六兩入水為蟲魚傷死者衆遂罷珠户為民其後同知廣州路事塔塔爾等又獻利於實勒們剏設提舉司監採亷訪司言其擾民復罷歸有司既而内正少卿魏按達拉冒啟中㫖馳驛督採耗廪食疲民驛非舊制請悉罷遣歸民善良死於非命國法當為昭雪特克實弑逆之變學士布哈指揮布延呼哩院使特古斯皆以無罪死未褒贈特們徳爾專權之際御史徐元素以言事鎖項死東平及賈托卜堅布哈之屬皆未申理臣等議宜追贈死者優叙其子孫且命刑部及監察御史體勘其餘有寃抑者具實以聞政出多門古人所戒今内外増置官署員冗俸濫白丁驟陞出身入流壅塞日甚軍民俱䝉其害夫為治之要莫先於安民安民之道莫急於除濫費汰冗員世祖設官分職俱有定制至元三十年已後改陞剏設日積月増雖嘗奉㫖取勘減降近侍各私其署夤縁保禄姑息中止至英宗時始鋭然減罷崇祥夀福院之屬十有三署徽政院斷事官江淮財賦之屬六十餘署不幸遭罹大故未竟其餘比奉詔凡事悉遵世祖成憲若復循常取勘調虚文延嵗月必無實效即與詔㫖異矣臣等議宜勅中外軍民署置官吏有非世祖之制及至元三十年已後改陞剏設員冗者詔格至日悉減併除罷之近侍不得巧詞復奏不該常調之人亦不得濫入常選累朝鄂爾多所立長秋承徽長寜寺及邊鎮屯戍别議處之自古聖君惟誠於治政可以動天地感鬼神初未嘗徼福於僧道以厲民病國也且以至元三十年言之醮祠佛事之目止百有二大徳七年再立功徳使司積五百有餘今年一増其目明年即指為例己倍四之上矣僧徒又復營幹近侍買作佛事指以筭卦欺昧奏請増修布施莽齋自稱特奉傳奉所司不敢較問供給恐後況佛以清浄為本不貪不欲而僧徒貪慕貨利自違其教一事所需金銀鈔幣不可數計嵗用鈔數千萬錠數倍於至元間矣凡所供物悉為己有布施等鈔復出其外生民脂膏縱其所欲取以自利畜養妻子彼既行不修潔適足䙝慢天神何以要福比年佛事愈繁累朝享國不永致災愈速事無應驗斷可知矣臣等議宜罷功徳使司其在至元三十年以前及累朝忌日醮祠佛事名目止令宣政院主領修舉餘悉減罷近侍之屬並不得巧計擅奏妄増名目若有特奉傳奉從中書復奏乃行古今帝王治國理財之要莫先於節用盖侈用則傷財傷財必至於害民國用匱而重斂生如鹽課増價之𩔖皆足以厲民矣比年㳺惰之徒妄投宿衞部屬及宦者女紅太醫隂陽之屬不可勝數一人收籍一門蠲復一嵗所請衣馬芻糧數十户所徴入不足以給之耗國損民為甚臣等議諸宿衞宦女之屬宜如世祖時支請之數給之餘悉簡汰和托齊牧養馬駞嵗有常法分布郡縣各有常數而宿衞近侍委之僕御役民放牧始至即奪其居俾飲食之殘傷桑果百害蠭起其僕御四出無所拘鈐私鬻芻豆瘠損馬駞大徳中始責州縣正官監視盖暖棚團槽櫪以牧之至治初復散之民間其害如故監察御史及河間路守臣屢言之臣等議宜如大徳團槽之制正官監臨閱視肥瘠拘鈐宿衞僕御著為令兵戎之興號為凶器擅開邊釁非國之福蠻夷無知少梗王化得之無益失之無損至治三年參不郎盜始者刼殺使臣利其財物而已至用大師期年不戢傷我士卒費國資糧臣等議好生惡死人之恒性宜令宣政院督守將嚴邊防遣良使抵巢招諭簡罷冗兵明勅邊吏謹守禦勿生事則逺人格矣天下官田嵗入所以贍衞士給戍卒自至元三十一年以後累朝以是田分賜諸王公主駙馬及百官宦者寺觀之屬遂令中書酬直海漕虚耗國儲其受田之家各任土著姦吏為莊官催甲斗級巧名多取又且驅迫郵傳徴求餼廪折辱州縣閉償逋負至倉之日變鬻以歸官司交忿農民窘竄臣等議惟諸王公主駙馬寺觀如所與公主僧格喇卜濟及普安三寺之制輸之公􅅒計月直折支以鈔令有司兼令輸之省部給之大都其所賜百官及宦者之田悉拘還官著為令國家經費皆取於民世祖時淮北内地惟輸丁稅特們徳爾為相專務聚斂遣使括勘兩淮河南田土重併科糧又以兩淮荆襄沙磧作熟收徴徼名興利農民流徙臣等議宜如舊制止徴丁稅其括勘重併之糧及沙磧不可田畆之稅悉除之世祖之制凡有田者悉役之民典賣田随收入户特們徳爾為相納江南諸寺賄賂奏令僧人買民田者毋役之以里正主首之屬逮今流毒細民臣等議惟累朝所賜僧寺田及亡宋舊業如舊制勿徴其僧道典買民田及民間所施産業宜悉役之著為令僧道出家屏絶妻孥盖欲超出世表是以國家優視無所徭役且處之官寺宜清浄絶俗為心誦經祝夀比年僧道往往畜妻子無異常人如蔡道泰班講主之徒傷人逞欲壊教干刑者何可勝數俾奉祠典豈不䙝天瀆神臣等議僧道之畜妻子者宜罪以舊制罷遣為民賞功勸善人主大柄豈宜輕以與人世祖臨御三十五年左右之臣雖甚愛幸未聞無功而給一賞者比年賞賜汎濫盖因近侍之人窺伺天顔喜恱之際或稱乏財無居或稱嫁女取婦或以技物呈獻殊無寸功小善逓互奏請要求賞賜回奉奄有國家金銀珠玉及斷没人畜産業似此無功受賞何以激勸既傷財用復啓倖門臣等議非有功勲勞效著明實蹟不宜加以賞賜乞著為令臣等所言弑逆未討姦惡未除忠憤未雪寃枉未理政令不信賞罰不公賦役不均財用不節民怨神怒皆足以感傷和氣惟陛下裁擇以答天意消弭災變帝不從珪復進曰臣聞日食修徳月食修刑應天以實不以文動民以行不以言刑政失平故天象應之惟陛下矜察允臣等議乞悉行之帝終不能從文宗天歴二年御史中丞史惟良上奏曰今天下郡邑被災者衆國家經費若此之繁帑藏空虚生民凋瘵此政更新百廢之時宜遵世祖成憲汰冗濫蠶食之人罷土木不急之役事有不便者咸釐正之如此則天災可弭禎祥可致不然將恐因循茍且其弊漸深治亂之由自此而分矣帝嘉納之順帝至正二年監察御史王思誠上奏曰京畿去年秋不雨冬無雪方春首月蝗生黄河水溢盖不雨者陽之亢水涌者隂之盛也嘗聞一婦銜寃三年大旱往嵗巴延專擅威福讐殺不辜郯王之獄雅克特穆爾宗黨死者不可勝數非直一婦之寃而已豈不感傷和氣邪宜雪其罪勅有司行禱百神陳牲幣祭河伯發卒塞其缺被災之家死者給塟具庶㡬可以召隂陽之和消水旱之變此應天以實不以文也順帝在位毎遇天變民災必憂見於色翰林學士承㫖庫庫乗間上奏曰天心仁愛人君故以變示儆譬如慈父於子愛則教之戒之子能起敬起孝則父怒必釋人君側身脩行則天意必回矣蘇天爵上奏曰盖聞應天以實不以文動人以行不以言此自昔國家消弭天變感格人心之至計也洪惟天朝列聖臨御深仁厚澤涵育羣生或遇災異猶思修省誕布徳音務施實恵是則祖宗畏天愛民之盛徳也邇者日月薄食星文示變河北山東旱蝗為災遼陽江淮黎民乏食方此春夏之始農人播植之時災異若此嵗事何望夫天之變異盖不虚生將恐人事有乖和氣當是之時國家正宜訪求直言指切時政矧在卑職忝居言官豈容緘黙伏願朝廷哀矜黎民誕敷實恵更新庶政勿示虚文庶㡬消弭天災感召和氣宗社臣民不勝幸甚一賞罰者國之大柄朝廷紀綱繫焉故賞不失有功則勞臣勸刑不失有罪則姦人懼二者或失綱紀必隳故古者爵人於朝與士共之刑人於市與衆棄之雖人君不得而私也況左右臣鄰敢擅威福而為之乎竊聞近日以来倖門漸啓刑罰漸差無功者覬覦以希賞有罪者僥倖以求免中外聞之竊議傷嘆誠恐刑政從此漸隳紀綱自此日紊勞臣何以示勸姦人無所警懼矣伏願自今以始凡官賞刑獄敢有交結近侍互相請托恣為罔欺紊亂政治者嚴行禁治中書左右兩司及六部等官所以叅賛宰臣決理政務若有不思奉公守法阿容茍從并許究問庶㡬賞罰攸當刑政肅清雍熈之化可坐而致矣一節用愛民有國之常經今朝廷用度不足弊在於浮費不節所入者有限而所出者無涯遂令内外帑􅅒皆未充贍夫天下之財皆出于民既傷其財民必罹害故愛民必謹於節用也盖國家財用責之户部户部責之運司州郡州責之縣縣責之民至民而止民竭其力以佐公上而用猶不足則嗟怨之氣上干天地隂陽之和此水旱災變所由作也宜從朝廷專命中書省官二員責督户部詳定減省罷不急之工役止無名之賞賜裁官吏之冗員減僧道之好事凡百用度務令撙節庶㡬國用既充民無横斂感召和氣莫急于此一遇災知懼聖賢之明訓昔之有國家者凡值凶荒災異必減膳徹樂側身警畏憂恤元元惟恐其不至也盖天災方作民食未充在位者於此時何忍相與飲食燕樂而不恤其民乎近年以来朝廷無事待遇勲臣固為優厚然而宴享太頻財用不能無費夫珠璣國之重寳馬政國之大事今宴享必以殺馬為饌珠璣為花誠恐習俗成風奢侈日甚費財擾民有損國治矧當災異洊臻尤宜警懼以答天意今後内外百司凡有必合筵宴一切浮費奢靡之物並宜裁節禁治是亦恐懼修省之一事也一在古有訓作善降祥不善降殃盖言人之為善為惡殃咎各以其𩔖應也後世佛教既入中國始言人能修奉佛事輒獲福利小民信之或不能悟甚至有國家者傾其府庫捨施金帛供佛飯僧唯恐不至然其徴驗盖可覩矣是以中外之臣言其可罷者十常八九而國家崇信方篤不忍遽已邇者徽政院臣以府庫不充金帛不給啓奉懿㫖凡在興聖宫常例好事一切罷止今朝廷政教惟新方圖孝治宜體東朝之意凡大内常例好事宜權停止豈惟制節浮費有裕于國財庶㡬不惑異端有闗于政化也一建官分職本以為民官冗事繁適足害治盖古者爵禄所以待賢才熈庶績非以供人之欲給人之求者也是以上自公卿大夫下及抱闗擊柝皆有定員而無曠職故官無茍得人無倖心洪惟世祖皇帝在位三十五年建官之制詳酌古今之宜故治化成而事功立爰自近嵗以来官府日増選法愈弊俸禄既廣事功益隳夫文翰之職既同何為復列數職造作所司既一不應又置數司掌軍政者亦既俱分奉祭祀者似太重複至于屬官羣吏員額雜冗支俸食米内外繁多若不早為裁減日久愈難沙汰夫科場取士三年止得百人今吏屬出身一日不知其㡬即目中書𩔖選已有積年不調之苦孰思數嵗之後吏部選又將柰何宜從都省早為聞奏照依至元定制合併裁減不惟省去冗員清選舉之方亦以制節浮用為裕財之道一命郡縣之官唯欲圖治班田禄之制所以養亷今國家設官固有髙下之列頒禄當無厚薄之分然而朝廷卿士俸􅅒既均郡縣公田多寡不一亦有剏設員闕逐月止請俸錢故亷者奉公凍餒其妻子貪者受賄辱及其宗親各處雖嘗申明其事主者但言設置已久亷吏嗟嘆無可柰何宜從户部行移取勘各處所闕公田於係官田内均行標撥豈惟廪禄恵及官吏之一家庶責亷能治洽郡縣之兆姓一錢幣之制在古所以恵民鈔法之行嵗久不能無弊盖米粟布帛養兆民之本錢幣鈔法權一時之宜故法久必更理當然也昔者世祖皇帝始立法制遂行中統交鈔其後又行至元寳鈔夫行之既久真偽不無坐罪雖曰匪輕獲利自是甚重爰稽造鈔以来元額已踰數倍以致鈔日益虚物日益貴民庶有倒鈔檢鈔之擾官吏有監鈔燒鈔之害欲救其弊理宜更張洪惟武宗皇帝即位之初始命尚書省更行銅錢本欲復古以便民未聞有妨於國計盖因至大已後一切矯枉太過因併銅錢遂亦不用夫行封贈所以勸忠増俸禄所以養亷禁干名犯義者厚風化之原減吏員月日者奬奉公之吏是皆尚書省所行未聞人以為非何於銅錢獨為不可況逺自唐漢近及宋金明君才臣阜民之制皆本乎此矧今國家疆宇萬里錢幣之制祖宗已嘗舉行宜從都省明白奏聞令户部官講究歴代鼓鑄之方用錢之制逺近便宜斷然行之豈惟救鈔法一時之宜實所以遂民生無窮之利也一治平既久民獲奠居版籍既定田無餘畆盖山東益都之境自昔號稱廣斥書所謂莱夷作牧是也今國家平定盖已百年户數土田悉有定籍邇者姦人妄行呈獻凡民之田宅墳墓悉指以為荒閑朝廷雖嘗差官覆實輒與符同不復考察夫既設置官吏遂為㑹斂稅糧幸因水旱為由不克收滿元額民既無所控訴官亦無可柰何驗其一嵗所入之稅糧僅足諸人所支之俸給既不能裕財富國徒足以害衆擾民矧今山東黎民阻飢盜賊多有誠恐因之别生利害欽覩天歴元年詔書節文有曰國家租稅自有常例今後諸人毋得妄獻田土違者治罪擬合欽依明詔將山東田賦總管府等衙門革去其百姓合納租賦並依舊制庶使一方之民咸獲有生之樂仰稱文宗皇帝發政施仁之盛徳一薄賦稅者治國之大經廣聚斂者蠧民之弊法夫以河南之地方數千里所輸稅糧已有定數先之以劉伊木罕妄獻地土既已長流海南是無閑田亦已明矣自延祐以来姦人竊取相位欲興功利以固權寵輒以經理為名惟欲擾害其衆名曰自實田糧實是强行科斂朝廷深知其弊累降詔書免除有司失於奉行至今令民包納夫以堂堂天朝富有四海差稅之入悉有定制乃因興利之徒遂遺斯民之害擬合欽依累朝詔㫖其經理虚樁之數並行革撥豈惟彰朝廷薄斂恵民之厚澤亦以植斯民本固邦寜之逺圖一國家之治當一視而同仁夫以髙麗為國僻居海隅聖朝肇興首效臣節世祖皇帝嘉其勤勞釐降公主盖所以懐柔小邦恩至渥也比年以来朝廷屢遣使者至于其國選取子女求娶妾媵需索百端不勝其擾至使髙麗之民生女或不欲舉年長者不敢適人憤怨感傷無所伸訴方今遼東嵗歉民適告飢和氣之傷或亦由此今後除内廷必合取索外其餘官員敢有不經中書擅自奏請取索髙麗女子及因使其國娶妻妾者擬合禁治庶㡬彰國家同仁之治慰小邦嚮化之心歴代名臣奏議卷三百十四
