body:
  text: 歴代名臣奏議卷四十二明楊士竒等撰治道宋哲宗時平章軍國重事文彦博進故事曰太宗淳化三年二月詔以新印儒行中庸篇賜中書宻院兩制三館御史中丞尚書丞郎給諫等人各一軸注先是御試進士日以儒行篇為論題帝意欲激勸士人敦修儒行故特命雕印至是首賜新及第舉人孫何等次及宰輔近臣臺閣臣僚並銓司選人聖㫖諭令依此修身為治仍各於聽事所展掛終身遵奉之真宗大中祥符二年十一月帝作文武七條其文臣七條一曰清心謂平心待物不為喜怒愛憎之所遷則庶事自正二曰奉公謂公直潔已則民自畏服三曰修德謂以德化人不必專尚威猛四曰責實謂專求實効勿競虚譽五曰勤察謂勤察民情勿使賦役不平刑罰不中六曰勸課謂勸諭下民勤於孝悌之行農桑之務七曰革弊謂求民疾苦而釐革之以賜京朝官任轉運使提㸃刑獄知州府軍監通判知縣者武臣七條一曰脩身謂脩飾其身士卒有所法則二曰守職謂不越其職侵撓州縣民政三曰公平謂均撫士卒無有偏四曰訓習謂教訓士卒勤習武藝五曰簡閲謂閲觀士卒識其勤惰勇怯六曰存恤謂安撫士卒甘苦皆同常使齊心無令失所七曰威嚴謂制馭士卒無使犯禁以賜節度使以下至刺史及諸司使以下任部署鈐轄知州軍縣監押駐泊廵撫者又以禮記儒行篇賜親民釐務文臣其幕職州縣官監務使臣仍並賜勅戒勵令崇文院刻板摹印送閤門分給之臣伏覩先朝賜臣僚儒行中庸篇及文武臣七條所以激勵士大夫修飾行撿及中外臣僚謹奉官箴其出外任者朝辭日各賜一本仍令閤門丁寕宣諭凡在臣下靡不恭授而奉行慶歴中先朝以乆罷賜七條儒行中庸篇嘗降詔書申明然而後來臣僚乆不受賜無所警䇿至有士行不完進取無恥官守失職茍簡無功臣欲乞舉行此法依例於朝辭日閤門給賜及宣諭誡勵之臣愚以謂敦奨士𩔖鎮静風俗激勸官吏治守忠亷斯乃為治之大本循致太平之道故敢竭此區區仰干宸聽庶裨聖政伏乞付外施行著作郎范祖禹進故事曰唐太宗幸洛陽宫苑謂侍臣曰煬帝作此結怨於民今悉為我有正由宇文述之徒内為諂諛外蔽聰明故也可不戒哉臣祖禹曰昔周公召公之相成王一話一言未嘗不以夏桀商紂為戒也其臣危亡之言不絶於口其君危亡之言不絶於耳故天下國家可得而安也唐太宗見隋煬帝亡國故覩其宫苑而以諂諛掩蔽戒羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王所由興也漢昭帝詔曰朕以眇身獲保宗廟戰戰栗栗夙興夜寐脩古帝王之事通保傅傳孝經論語尚書未云有明其令三輔太常舉賢良各二人郡國文學髙第各一人臣祖禹謹按大戴禮保傅傳曰昔者周成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅其德義師導之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也三公三少明孝仁禮義以導習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以輔翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正猶生長於齊不能不齊言也習與不正人居不能無不正猶生長於楚之地不能不楚言也及太子少長則入於學學禮曰帝入東學上親而貴仁則親踈有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入太學承師問道退習而端於太傅太傅罰其不則而正其不及則德智長而治道得矣三代之禮天子春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醤而親饋之所以明有孝也行以鸞和歩中采齊趨中肆夏所以明有度也其於禽獸見其生不忍見其死聞其聲不忍食其肉故逺庖厨所以長恩且明有仁也明堂位曰篤仁而好學多聞而道慎天子疑則問問則應而不窮者謂之道道者導天子以道也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志也常立於左是太公也潔亷而切直正過而諫邪者謂之弼弼者拂天子之過也常立於右是召公也博聞強記接給而善對者謂之丞丞者丞天子之遺忘也常立於後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事商周之前所以長乆者其輔翼天子有此具也天子不論先聖王之德不知國君畜民之道不見禮義之正不察應事之理不博古之典傳不閑於威儀之數詩書禮樂無經學業不法凡此其属太師之任也天子無恩於父母不惠於庶民不禮於大臣不中於刑獄無經於百官不哀於䘮不敬於祭不信於諸侯不戒於戎事不誠於賞罰不厚於德不疆於行賜與侈於左右近臣吝於䟽逺卑賤不能懲忿窒欲不從太師之言凡此其属太傅之任也天子處位不端受業不敬言語不序聲昔不中律進退節度無禮升降揖譲無容周旋俯仰視瞻無儀凡此其属太保之任也天子宴廢其學左右之習反其師答逺方諸侯不知文雅之辭應羣臣左右不知已諾之正簡聞小誦不博不習凡此其属少師之任也天子居處出入不以禮冠帶衣服不以制御器在側不以度縱上下雜采不以章忿怒悅喜不以義賜與奪讓不以節凡此其属少傅之任也天子宴私安所易樂而湛飲酒而醉食肉而飽飽而彊饑而惏自取玩好自執器皿凡此其属少保之任也不知日月之時節不知先王之諱與大國之忌不知風雨雷電之眚凡此其属太史之任也昭帝先通保傅傳謂此書也唐太宗縱死囚使歸家期以秋來就死皆如期自詣朝堂上皆赦之臣祖禹以為太宗縱天下死囚皆如期自歸此由至仁愛人至誠感物之所致也書曰好生之德洽於民心太宗之謂矣唐明皇東封還至宋州宴從官於樓上刺史寇泚預焉上謂張説曰曏者屢遣使臣分廵諸道察吏善惡今因封禪歴諸州乃知使臣負我多矣懐州刺史王丘餼牽之外一無他獻魏州刺史崔沔供張無錦繡示我以儉濟州刺史裴耀卿表數百言莫非規諫如三人者不勞人以示恩真良吏矣顧謂寇泚曰比亦屢有酒饌不豐訴於朕者知卿不借譽於左右也自舉酒賜之臣祖禹以為漢武帝好用慘酷之吏故董仲舒以守令未得人為言夫一郡守不得人則千里之地受其害一縣令不得人則百里之地受其害欲天下之民皆得其所莫如選擇守令之為急也唐明皇東封過諸州而懐魏濟宋皆有良守亦足見其時州郡多得人矣豈非姚崇宋璟為相之效乎宋太宗至道元年正月望夜御乾元樓觀燈召司空致仕李昉賜坐於御榻之側慰撫良乆酌御樽酒飲之自取果餌以賜上觀京城繁盛親指前朝坊巷省寺之所今拓為通衢長廊因曰晉髙祖優柔無斷稔成奸惡少主昏蒙卒至亡滅洎自漢朝其政愈亂致蘇逢吉史洪肇輩互相猜貳李崧之族枉陷塗炭是時京城人情倉惶殆無生意豈暇營繕都邑乎昉對曰晉漢之事老臣備經今陛下恭勤治道聽政無倦是致四海清晏輦轂繁盛上曰勤故憂民帝王常事耳朕不以繁華為樂葢以民安爲樂仁宗嘉祐七年上元御宣德門召近臣宗室觀燈酒行上顧左右曰朕非欲獨為游觀此因歳時與萬姓同樂耳漢制立春之日下寛大書制詔三公方春東作敬始慎㣲動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良不當用者如故事月令曰命相布德和令蔡邕曰即此詔之謂也唐舊制雅俗之樂皆𨽻太常明皇精曉音律以太常禮樂之司不應典倡優雜伎開元二年更置左右教坊以教俗樂又選樂工數百人自教法曲於梨園謂之皇帝梨園弟子又教宫女使習之又選妓女置宜春院給賜其家禮部侍郎張庭珪酸棗尉袁楚容皆上疏以為上春秋鼎盛宜崇經術邇端士尚樸素深以悦鄭聲好逰獵爲戒上雖不能用欲開言路咸嘉賞之臣祖禹曰昔紂作靡靡之樂北里之舞以亡其國明皇即位之初留意聲樂故其末年耽樂奢侈以致大亂幾亡天下人君所好可不慎哉夫太常掌天地人之禮郊廟之樂舜命伯夷典禮䕫典樂之職也以明皇之好音猶不使雅俗相雜國朝祖宗以來教坊宴樂𨽻宣徽院自宣徽院廢乃屬太常以鄭衛之樂瀆典禮之司此有司官制之失也漢髙祖七年丞相蕭何治未央宫立東闕北闕前殿武庫大倉上見其壯麗甚怒謂何曰天下匈匈勞苦數歲成敗未可知是何治宫室過度也何曰天下未定故可因以就宫室且夫天子以四海為家非令壯麗無以重威且無令後世有以加也上悅臣祖禹曰禹卑宫室孔子美之曰吾無間然矣周宣初即位更爲儉宫室小宗廟而致中興之功詩人歌之蕭何不能以道佐漢祖乃襲亡秦之奢侈創業之君一言一動子孫視傚此乃武帝千門萬户所以興也臣恭聞太祖皇帝詔宫殿之制惟得赤白累聖遵守不敢有加儉德之美過於漢祖逺矣唐太宗嘗罷朝怒曰㑹須殺此田舍翁時文德皇后謂帝曰誰觸忤陛下帝曰魏徵每廷辱我后退具朝服立於廷帝大驚曰皇后何為若是后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀帝乃悦臣祖禹曰詩人美后妃輔佐君子求賢審官國家将興必有淑哲之配儆戒以成君子之德若長孫皇后感悟太宗其可謂賢矣後漢建武初任延拜武威太守光武親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也唐太宗夲以兵定天下雖已治不忘經畧四夷也魏徵侍宴奏破陣武德舞則俯首不顧至慶善樂則諦玩無斁舉有所諷切如此慶善樂者文德之舞漢武帝建元三年上始爲㣲行常以夜出自稱平陽侯旦明入南山下射鹿豕狐馳騖禾稼之地民皆號呼罵詈鄠杜令欲執之示以乘輿物乃得免又嘗夜至栢谷投逆旅宿就逆旅主人求漿主人翁曰無漿止有溺耳且疑上爲姦盜聚少年欲攻之主人嫗覩上狀貎而異之止其翁曰客非常人也且又有備不可圖也翁不聼嫗飲翁以酒醉而縛之少年皆散走嫗乃殺雞爲食以謝客明日上歸召嫗賜金千斤拜其夫為羽林郎臣祖禹曰仁宗皇帝皇祐二年四月御邇英閤讀漢書東方朔傳至武帝㣲行數出仁宗曰帝王每出須中嚴外辦何容易如此侍讀丁度對曰武帝以承平日乆藉文景之資所以窮志極欲仁宗曰若安寕之時常思危亡之戒豈有後悔臣愚竊謂武帝以天子之尊而好狂夫之遊困於逆旅幾至危殆考其行事足爲永戒仁宗皇帝特發德音所以垂訓萬世也唐肅宗為太子時常侍膳尚食置熱俎有羊臂臑臂臑肱骨也臑音奴到反明皇顧使太子割肅宗既割餘汚墁在刀以餅潔之上熟視不懌肅宗徐舉而啖之上甚悦謂太子曰福祿當如是愛惜臣祖禹曰明皇教太子愛惜福祿不棄一餅可謂知稼穡之艱難矣然於其身窮極奢侈用財物如糞土卒致天下大亂何其明於子而闇於已乎書曰非知之艱行之惟艱明皇之謂矣史記樂書君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣致猶深審也樂由中出故治心也易平易直正直子諒愛信也易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威若善心生則寡於利欲寡於利欲則樂矣志明行成不言而見信如天也不怒而見畏如神也致樂以治心者也致禮以治躬者也致禮以治躬則莊敬莊敬則嚴威禮自外作故治身心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貎斯須不荘不敬而慢易之心入之矣易輕易也故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與争也望其容貎而民不生易慢焉故德輝動於内而民莫不承聽理發諸外而民莫不承順鄭𤣥曰德輝顔色潤澤也理客貌進止也孫炎曰德輝明惠也理言行也故曰致禮樂之道舉而措之天下無難矣臣祖禹謹按禮記樂記祭義皆載此語司馬遷取之以為樂書葢古之君子傳先王之法言論禮樂之本而造於道德之精㣲孔子之門人祖述而傳之亦猶大學誠意正心齊家治國之説也此學者所當盡心而人君所宜留意臣是以敢獻之唐明皇每酺宴先設太常雅樂坐部立部繼以鼓吹胡樂教坊府縣散樂雜戲又以山車陸船載樂徃來又出宫人舞霓裳羽衣又教舞馬百匹銜杯上夀又引犀象入塲或拜或舞安祿山見而悅之後禄山反既克長安命搜捕樂工運載樂器舞衣驅舞馬犀象皆詣洛陽司馬光論曰聖人以道德為麗仁義爲樂故雖茅茨土階惡衣菲食不恥其陋惟恐奉飬之過以勞民費財明皇恃其承平不思後患殫耳目之玩窮聲技之巧自謂帝王冨貴皆不我如欲使前莫能及後無以踰非徒娯已亦以誇人豈知大盜在旁已有窺窬之心卒致鑾輿播越生民塗炭乃知人君崇華靡以示人適足爲大盜之招也史記呉世家呉王僚九年公子光伐楚㧞居巢鍾離初楚邉邑卑梁氏之處女與吳邉邑之女争桑二女家怒相滅兩國邉邑長聞之怒而相攻滅吳之邉邑吳王怒故遂伐楚取兩都而去臣祖禹曰疆塲之事常起於細㣲故兩女子争桑而吳楚相攻由漢以來守邉之吏或忿争細故或徼幸功賞以怒隣敵至兵連禍結而兩國受其敗人君不知者多矣可不戒哉漢光武建武八年帝自征隗嚻隴右潰嚻奔西域遣大司馬吳漢征南大将軍岑彭圍之時公孫述将李育將兵救嚻守上邽帝命虎牙大將軍葢延建威大將軍耿弇攻之潁川盜賊宼沒属縣河東守守兵亦叛帝自上邽晨夜東馳車駕還宫勅彭書曰兩城若下便可将兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚爲白臣祖禹曰漢光武以兵定天下中興漢室是時隗嚻據隴公孫述據蜀未得息師光武厭苦軍事雖謀臣猛將衆多猶曰每一發兵頭鬚為白其憂畏如此葢深知百姓疾苦懲用兵之爲天下害也順帝時災異屢見陽嘉二年春郎顗上書其四事曰易傳曰陽無德則旱隂僭陽亦旱陽無德者人君恩澤不施於人也隂僭陽者祿去公室臣下專權也自冬渉春訖無嘉澤數有西風反逆時節朝廷勞心廣爲禱祈薦祭山川暴龍移市董仲舒春秋繁露曰春旱以甲乙日為蒼龍一長八尺居中央為小龍七各長四尺於東方皆東向其間相去八尺小童八人皆齋三日服青衣而舞之夏以丙丁日為赤龍服赤衣季夏以戊巳日為黃龍服黃衣秋以庚辛日為白龍服白衣冬以壬癸日為黑龍服黒衣牲各依其方色皆燔雄雞燒豭豬尾於里北門及市中以祈焉禮記歲旱魯穆公問於縣子縣子曰為之徙市不亦可乎臣聞皇天感物不為偽動災變應人要在責己若令雨可請降水可攘止則歳無隔并太平可待然而災害不息者患不在此也不在祈禱立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光耀比頻也時恭陵百丈廡災仍有光耀不絶明此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨将害宿麥若一糓不登則饑者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之畜者簡稅防災爲其方也簡少也方法也願陛下早宣德澤以應天功若臣不用朝政不改者立夏之後乃有㴻雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎書奏特詔拜郎中辭病不就即去歸家至四月京師地震遂陷其夏大旱秋鮮卑入馬邑城破代郡兵明年西羗寇隴右皆畧如顗言臣祖禹曰天人之交相去不逺故漢世儒者各以所學推原災異其言多驗臣恭聞仁宗皇帝最深洪範之學每有變異恐懼脩省必求其端近世學者廢而不習人君奉順天道不可不留意也漢文帝時賈誼上書曰三代之禮春朝朝日秋暮夕月所以明有敬也朝日以朝夕月以暮皆迎其初出也春秋入學坐國老執醤而親饋之所以明有孝也行以鸞和歩中采齊樂詩名也字或作齊又作茨並音才私反趨中肆夏亦樂詩名趨疾歩也凡此中者謂與其節相應也並音竹仲反所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長乆者以其輔翼太子有此具也鼂錯上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海内必從矣知所以忠孝事上則臣子之行備矣此四者臣竊爲皇太子急之臣祖禹曰賈誼之學本於詩禮故欲人君知禮義鼂錯之學本於刑名故欲人君知術數三代之君以禮義治故下以誠應之秦漢之君以術數治故下以詐應之人主臨制羣臣聽言受事錯皆以為術數而不知聖人之道無二唯一以至誠而已唐太宗猶恥以權術接臣下而況於三代之主乎又曰自唐天寳之亂兵革不息訖於五代後周顯德凢二百十有五年天下分裂為八九生民糜爛於兵周世宗以䧺武之才在位六年南征北伐以強中國雖綱紀稍振而大功未成太宗受命削平僭亂然後海内為一盖天将啓太祖之運以授聖人世宗征伐之功實為有宋開創之基也觀周顯德以前治少而亂多然後知本朝百三十餘年中外宴安自三代以來未之有也可不兢兢業業以守之哉又曰古者至治之世麟鳳在郊藪龜龍游宫沼河出圗洛出書舜之時簫韶九成鳳凰來儀文王之生鷟鸑鳴於岐山聖人在上則四靈為畜所以謂之瑞也漢武帝幸雍祠五畤獲一角獸若麃然有司以爲麟武帝博謀羣臣而終軍上對宜因昭時令日改定告元苴白茅於江淮發嘉號於營丘帝甚異之由是改元爲元狩臣竊考元狩之間有淮南衡山之獄坐死者數萬人吏益慘急而發令察武帝方甘心快意結怨於匈奴命衛青霍去病等将兵連歳出征匈奴亦數入爲寇於是天下騷然倉庫空虛貧民流徙乃與公卿議白金及皮幣以奪商賈之利取諸侯之財吏民犯法者不可勝數於是酷吏用事多至公卿而繡衣直指之使斬斷於外當此之時生民如處於鑪炭之上然則何以致天地之和氣麟曷為出哉昔魯哀公十四年西狩於大野獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之麟於魯出非其時惟聖人識之故春秋書獲麟武帝得一角獸而有司謂之麟終軍因勸以改元封禪甚矣羣臣之諛也後世言帝王窮兵黷武嚴刑峻法者必曰秦皇漢武葢以始皇無道而武帝亦近似之矣考其行事豈獨武帝之過哉其臣諛佞以成之也孟子曰長君之惡其罪小逢君之惡其罪大漢之羣臣豈不然哉范祖禹為右諫議大夫上奏曰臣竊以朝廷治道必歸於一祖宗創業傳之萬世造立法度皆因衆人之智積日累月講磨而成非獨出一人之意取一時之便而已累聖相承百三十年比之前代治安最爲長乆其法有已成之效此可信而不疑也然行之既乆則其間不能無弊熙寕之初先帝勵精求治思致太平稍欲更革弊事以光大祖宗之業而王安石用意過當獨任私智悉排衆論吕惠卿曽布之徒欲以改法進身一切變易祖宗舊政至今天下以爲不便前後臣僚論之已詳不待臣言而知也自魏晉以後官名不正國家承平日乆未遑制作元豐中先帝置局講求此誠一代大典然有司亦失先帝本意一切遵用唐之六典夫唐六典雖修成書然未嘗行之一日今一一依之故自三省以下無不煩冗重複迂滯不如昔之簡便臣恭聞先帝已厭官制之煩但未及修完不幸早棄天下今二聖埀拱循守成規除去弊事十已七八海内安靖已有成效今臣之愚竊謂朝廷旣以王安石之法爲非唯當修復祖宗舊政則天下無事伏望陛下明諭大臣凡所措置變改悉遵故常無得出意於新舊之間别立一法自官制兵制將法民事有未便者更加修完祖宗時所無而今所有其可行者存之不可者去之祖宗時所有而今所無可復者復之如官制正名則如先帝之規事實則仍祖宗之舊其他可以𩔖推如此則上可以存祖宗經乆之法成先帝制作之意下亦便於當今之宜庶使法度不至數變紀綱不寖隳壊校書郎李昭玘進策曰昔先王和同四方連絡萬里使家與家相愛人與人相親保之而不忘合之而不散者有道以維之有政以屬之有法以制之而已以民情爲易離也故以九兩繫焉牧以地得之則食之者不去長以貴得之則事之者不忘師以賢得之儒以道得之則樂其教者安宗以族得之主以利得之則親其上者服友以任得之則善有以相成藪以富得之則利有以相養以民心爲易危也故又以本俗六安焉媺宫室所以同其生族墳墓所以同其死聨兄弟所以同其恩聨師儒朋友所以同其義同衣服所以同其禮故能上下綂一逺近和合父與父言義子與子言孝長與長言友幼與幼言弟恩足以合情而相愛文足以飾貎而相接此維之有道者也先王既有以繫其民又有以安其俗猶以爲不足恃也故五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔至於守望相助出入相友嫁娶相媒有無相貸疾病相恤祭祀同福死䘮同哀男子不足於耕也相從而助耕婦人不足於績也相從而助績一鄉之事皆通也無求而不得一鄉之情皆同也無爲而不和此屬之有政也先王以謂有政以屬於前無法以制於後未足以防民也故徙於國中及郊則從而授之徙於他則以旌節行之無授無節則以圜土納之竄伏者無所匿欺偽者無所容無事而出鄉則鄉必問無事而出闗則闗必譏民不擾於流寓吏不勞於呼索由此而登於司民則可以知其數由此而比於鄉大夫則可以均其力由此而歛於司稼則可以制其食由此而會於小司徒則可以用其衆此制之有法也維之旣有道屬之旣有政制之旣有法不幸旱乾水溢民食不足轉流四方則非道之所能維非政之所能屬非法之所能制雖天屬俯仰之間不能以自存又焉有守邑地居家室而不去者哉故爲之鄉里之委積以恤艱阨爲之縣都之委積以待㓙荒又爲之荒政十二以聚萬民不必歛其利而利可散不必盡其征而征可薄力則弛其勞刑則緩其責舍禁以赦小害去幾以釋小過眚禮而使勿充殺哀而使勿致樂則蕃而不用昏則多而不備索鬼神以致福去盜賊以除害雖㐫年饑歳民猶安居重家佚居飽食故自少壯以至於老髦老髦以至於死亡食其田飲其井十里之外不知道途百里之外不傳風俗此先王之保民也可謂至矣自夫仁政不行井地不均民易其業官失其守内不能制其情外不能知其數此宣王料民於太原仲山甫所以非之也迨夫戰國交侵土地時易封疆不足以限其遷徙城邑不足以遏其流亡管仲以區區瀕海之齊制國為二十五鄉郊之内自軌以至帥郊之外自邑以至屬以相糾聨以相保合少相居長相遊居處相樂行作相知以守則固以戰則服故桓公九合諸侯而號為彊國者善保民故也自熙寕之初嘗詔天下行保伍之令此有意於三代之遺法也行之數年法雖具存而民未安土義不足以相守則時有桴鼓之警恩不足以相保則或起父子之訟壯力分於出贅世業入於兼并户口隠於圖板夫家脫於聮伍輕鄉危家逺出千里故秦多晉寇而魯雜齊語祭祀不從丘壠老死不知子孫罰不及於其鄰罪不及於其友其犯法也輕其背也衆雖欲均地著之政立土斷之法未易制也昔三代之時里無閒民民無遊業居皆勸功樂事之人出則爲伏節死難之士以守則國富以戰則兵彊今天下壯有力之民僑寓雜處散於四方手不服耒耜之勤心不知田畝之樂為淫巧竒技屠販遊博其無理之甚者嘯聚不逞殺人於貨邑里不告訐門闗不訶問縣官鄉吏察治無術計户而不得其家計家而不得其人居無與守出無與戰此爲國計者未嘗不深惜之也昔者既詔天下置義倉矣義倉設則雖年􅂖不豐民可仰食貧不至於易業饑不至於輕家然後禁游手抑末作去舊里者必告入新鄉者無容如此則民無流散之苦吏無逋逃之憂三代之法可漸致而力行矣昭玘又進䇿曰嘗觀漢唐任刺史或輙親見問退而考其所行以質其言或録其姓名得才否狀以擬廢置或増秩賜金以勞其成或臨軒受服以光其遣故漢之吏事號為稱職唐之任人所得十五葢重郡縣之官慎臨人之責自古皆然不特為今日之所急也愚竊論之天下之事有名變而實存者後世習於名而遂略其實此名實所以並廢而事功不立也今之守令視古猶諸侯也非不有境土也獨不得斂其賦爾若勸課之責則在焉非不有城邑也獨不得專其地爾若守禦之責則在焉非不有官府也獨不得置其屬爾若察治之責則在焉非不有學校也獨不得命其士爾若教飬之責則在焉非不有軍旅也獨不得專其政爾若簡習之責則在焉或以謂古之諸侯與天子同體而尊故其任重今之諸侯與朝廷異勢而卑故其任輕然不知地土封爵名數儀物雖今日之所輕而重穀阜民養材教士無以異於昔日之所重承今日之責者務覈簿書促期會以文法吏自處其於詔令之意教化之實玩以為不急歳時上計茍於文具而已必欲宣徳流化移風易俗一陶天下之和固亦難矣故勸課不修則耕稼不時田野荒汙水旱無具老壯流徙守禦不修則羣小嘯聚屠牛發冢焚燒區落白晝殺人察治不修則吏行貪汚交貨賣法公義不肅私倖争出教養不修則學舎蕪没圖籍塵委人材徧野士論淺俗簡習不修則卒伍墮氣器械鈍弊春秋角牴坐作如戲凡此者吏不知其責故也國家頻年以來除繇役興農利聨什伍講學校練軍士其法備成其令數下郡縣之吏猶不能盡心率職以稱上意葢其修飾形迹附就名數茍可以奉朝廷之法其實無至誠惻怛以行朝廷之意此特失於亷按未精而督責太輕爾若三代之時諸侯之見天子也春以受其圖秋以比其事夏以陳其謨冬以協其慮時以發其禁衆以施其政天子之撫諸侯也諭言語協辭命諭書名聽音聲同度量成牢禮同器數修法則有撢人以道其政事有掌交以道其徳意故能均政刑合禮樂一道徳同風俗以天下為一家以中國為一人者察治詳故也今夫州為之守邑為之令星列棊布散於四方萬里之逺道不足以一揆法不足以一守無禮以制之無政以合之凡朝廷之政事法度雖時下其詔丁寕告戒而奉承之吏習爲茍簡大事則行文檄記條目小事則掛屋壁束髙閣至於獄訟農穀貨幣征租力役之常歳爲一書以上於朝其人之賢不肖其治之得失其事之利害以謂盡在於此是亦踈矣朝廷常患其弊而設監司矣委之以亷按付之以督責修職者薦於上不才者罷而去此代天子知人者也然而監司未必皆賢也庇姦則以寛縱為度喜事則以苛細為功惰怯則操鎮静之說強忍則徼刻薄之利挾氣者輕於沮下幸名者急於趨上取未必中也或出於親戚故舊之先去未必當也或出於怨嫌忿怒之表其情狀之相攻自治且不暇又況治人哉朝廷所望於人者乃止於如此則監司未必爲得人也夫郡縣之治視監司指顧爲近監司之治望朝廷耳目爲逺天下之事嘗勞於總覈難於察治者葢在此也唐制監察御史掌廵按州縣其一察官人善惡其二察户口流散帳籍隠沒其三察農桑不勤倉庫減耗其四察妖猾盜賊不事生業其五察德行孝悌茂材異等藏器晦迹以待時者其六察黠吏豪宗兼并縱暴寃抑不伸者方今莫若時詔御史分出而臨遣之使郡縣覈於監司監司覈於御史御史致其狀於宰相則天下郡縣之治可指掌而議可僂指而分庶幾古循吏之風復見於今日矣昭玘又進策曰天下之治渉於道者無患乎至略渉於事者無患乎致詳盖道之所以官天地府萬物役使羣動運之以精神感之以會通聖人端冕南面恭已而已事所以應時而造推物而行號而讀之則有名指而議之則有數自其名而舉之則小大先後不可易也自其數而積之則一二三四不可亂也然而日之來者無窮徃者益逺事之方至者常謹幾成者常忽此所以苟完於耳目之前寖微於歳月之久以至曠敗缺漏紛紜倒迕而不可考者常以此也有一成而不變或先易而後難或初因而終革不有圖籍日陳於前操以為騐稽以為决則朝廷上下失於茍簡官人百吏習於惰偷上以方信人臣有爲之功而矜覽緒餘下亦操人主不自任之說以彌縫罅漏雖欲虚心以望成功拱手以迎太平是亦踈矣周之治官也小宰歳終令羣吏正歳會月終正月要旬終正日成司會掌凢在書契圖板者之貳以逆羣吏之治而聽其會計以參互考日成月要考月成歲會考歲成以周知四國之治以詔王及冢宰廢置冢宰歳終則令百官府各正其治受其會聽其政事詔王廢置三歳大計羣吏而誅賞之不獨官府之治如此也春朝諸侯以受天下之圖籍而行人之官以利害爲一書禮俗政事教治政刑逆順為一書㐫災貧阨為一書其康樂和親安平為一書以反命於王以周知天下之故夫内以弊羣吏之治外以周知天下之故舉無遺事事無遺慮其職守之勤怠功利之登下用度之多寡經畫之利害百日之所積者一日而槩舉之百人之所共成者一人而坐見之任事之臣不敢爲偷得之利以倖耳目之所不及天下之治常為之不厭通而不倦考覈詳故也後世不知其法以謂帝王之道必無為而用天下不達無為者無不爲之說政教禁令紀綱法度一切曰有司存事常至於偏弊而不救者無術以舉之也故大事幸天子之不問小事幸大臣之不知漢文帝問丞相決獄錢糓數而對之以廷尉内史宣帝時郡國上計簿具文而三公不以爲意上下如此則何以督察天下而與之仰成哉今陛下必以朝廷官府已行之法度緝爲政錄有凢有目有要有會而時自閲覈如裘提領屈五指而頓之不勝其舉矣使官人百吏宿道向方勸勤樂職夙夜不惰可謂治術詳矣臣聞五覇不及其臣故委之以能托之以國三王臣主俱賢故合謀相輔五帝其臣不及故親自處事於法宫之中今陛下訓廸厥官總核名實此聖功成終之時也惟陛下加意而已畢仲游言併州縣曰竊觀逺近之勢要在均一而易治昔周之盛時畫千里爲王畿王畿之外制天下爲九服九服相距各五百里而要服之内封其地者盖千有八百餘國以此知其欲均一也封國之制侯百里伯七十里子男五十里不能五十里者謂之附庸以營丘曲阜之封而不過百里以此知其欲易治也及秦變古裂天下為郡縣一郡之地包十諸侯之封猶倍侯伯之制天下之地始不均而民始嗸嗸苦其難治矣伏惟朝廷建功立事一出先王之道而乃削郡成邑割邑成聚所以省官併員寛去力役幸天下者甚厚然一邑併一邑併去之邑則力寛併入之邑則力重邑之有併也有數百人之邑有四五局之官既併矣則役去其十數而官存其一二是故其力寛而其併入之邑一官任二官之事一人任二人之役昔之訟者五今之訟者十昔之徃來者一宿而至今之徃來者再宿而至其他可以𩔖舉矣是故其力重夫小邑併大邑必無四面之均以南併北則南長而北促以西併東則西寛而東狹促狹之鄉其民逸寛長之鄉其民勞此又理勢之自然也雖於出錢之數可省三數然酒稅虧折則必稱此矣以淮甸一路言之邑小則易爲治地大則難其人光之仙居夀之夀春泗之昭信此小而易為治者也廬之舒成蘄之蘄水光之固始此大而難其人者也理宜割大以爲小今乃併小而爲大捨易治而求難為非其術矣且今州縣之役豈不輕州縣之吏豈不省昔先王之封國也雖子男之邦必有宗廟祭祀之費有人徒禄廩之厚有兵甲車馬之衆而城郭道路闗梁廬館尤嚴於賔客之事而又歳時使人存覜若歸賑賀慶致禬之來又有四隣之交廵狩朝覲會同聘問之集所以設官致員役民力者盖甚繁且宻而州縣之治存於古者無幾則天下吏員之未易民力之未輕不在此矣為今之策宜先求建國之大法要在均一而易治凡邑之大者割其大以補小邑之小者増其小以成大置一縣之封必度四面之界分長鄉以補短分寛鄉以補狹縣縣相比州州相較大者不使如固始之寛小者不使如仙居之狹此之謂均户口賦稅之籍徭役獄訟之制大略相等賢者俯就而有餘不肖者勉強而無累此之謂易治其有大邑次大邑雖割而猶大者則増官小邑次小邑雖割而猶小者則減役官不求茍省可置則置役不求茍廢可存則存如是則民不驚動而地均官不勞擾而治定指顧相視而逺近之勢已分文檄相移而分割之功已就官吏之所願民情之所安公家之所便公家併兩爲一廢州爲縣廢縣爲聚有寛省之小利成難治之大患官吏之所重爲民俗之所驚駭違今時古法者相去逺矣均一易治之說惟朝廷擇焉畢仲游又上言曰治一鄉必有治一鄉之具治一國必有治一國之具治天下必有治天下之具具者非若簠簋爼豆尊勺鼎鼐可陳於前也由是而治者謂之具聽斷獄訟簿書期會所以治一鄉也守法令拊循其民以承事天子所以治一國也明制度不得相踰越貧冨貴賤各安其分而易足所以治天下也以大治小則小有所不能容故孔子之武城聞絃歌之音而笑以小治大則大有所不能治故孟子不學諸侯之禮而言其略三代而下不知治具之有小大以簿書法令治鄉國之具而治天下是以天下而終不大治昔孝文之時賈誼謂大臣不報期會之間爲大故至於俗流失世敗壊因恬而不知恠爲可太息孝宣時王吉亦言公卿未有建萬世之長策舉明主於三代之􅂭而上下僭差人人自制是以貪財誅吏不畏死亡而孝文孝宣卒莫能用所以然者治大者其効緩而逺治小者其効速而近人君有治天下之心而求近効以語禮俗制度禁防之事則指以為迂濶而見簿書法令聽斷獄訟則以為治天下如是而足雖有唐太宗之賢與房魏論周禮語未卒而有畫虎之疑又况不及太宗者則天下之不大治凡皆以小治大而無其具故爾今國家傳序相習百有餘年方内無事幾於致平殆非漢唐之比而禮俗制度禁防之不立反甚於漢唐田宅奴婢車馬服用恣民之所自爲而莫有限樂漢唐之小具不思三代之大治豈非以上下相安風俗已成而難於驚動耶是亦未知講爾昔楚王患其國之庳車欲下令使髙之孫叔敖曰令數下民不知所從請教里人髙其梱乘車者皆君子不能數下則車自髙矣從之半歳而楚國無庳車盖國家立事好爲法令而以深罰重賞隨之法令既繁而罰深賞重無以措其手足是以民驚動而事不立今如倣庳車之意定爲田宅奴婢車馬服用之等級在上者躬化以行之簡其法令平其賞罰有不從者苐禁勿使仕宦庻人則重租賦以困辱之乆以歳月無求近効則三代治天下之具將復立於今日度越漢唐而頌聲興然則禁勿使仕宦重租賦以困辱而終不爲深罰重賞者亦今日治天下之梱耳何患乎驚動孔文仲對策曰臣伏惟陛下下明詔降清問講求萬世之綂皆非愚臣之所能及也然臣竊有深憂者陛下求言好善之􅂭名逺出百王之上至於用言納諫之道有未克盡其極爾何者陛下涖阼之初首開轉對以延踈逺切直之言召羣臣以詢安危利害之策者此陛下天資謙恕思得深謀至計以補所未逮也而言之既多聽之既乆卒未聞采一事用一畫見之天下至於近日四方之人與夫朝廷之上賢卿誼老交章累䟽論列時政得失臣考之公議以爲雖臯夔周召之謀所以致君福民寜九廟而安萬世者公讜不能過此矣而陛下聞之若不聞見之若不見豈其急近論而略逺慮安小補而捐大忠乎此臣所大懼也臣願陛下首思聽言用諫之義不聽則已聽則博同天下之心不用則已用則兼取逺近之策然後動無遺事舉無失計而善政可行太平可議矣臣将論天下事先述此以獻臣誠愚闇不知大體惟陛下省納焉聖策曰在昔明王之治天下仁風翔洽德澤汪濊四序調於上萬物和於下兵革不試刑辟弗用内則儁賢居位以熙於王職外則戎夷嚮風以修於歳貢建皇極以承天心斂時福以錫民庶然後日星雨露鳥獸草木効祥薦祉書之不絶甚尊慕之其何術而臻此與臣聞天下之術有大小而人君用之有先後先其大而後其小則用力不勞而天下治宜先而後可大而小則用力愈勞而天下亂天下之術其大者能正其始是也其小者不能正其始是也在昔明王之治天下仁翔而德洽四序調而萬物和以至兵偃刑措儁賢修職夷狄納貢建皇極而天道應斂五福而民氣洽吉祥見於上珍符出於下者正始之術行也後世之治天下萬事失其序而災害洊至者正始之術廢也陛下追慕古昔治功之美而諮求致之之術臣請遂言正始之說夫天下之道三曰王曰覇曰強國天下之本一曰即位即位者王所以自正也始不以正及其末也雖欲變而正之亦無及矣是故始爲強國未有能終之以覇政者也始爲覇政未有能終之以王術者也孔子作春秋書元年春王正月公即位夫元年正月者一年一月也而變之曰元與正者欲人君當即位之初體元以居正也元者善之本也正者道之極也人君能於治初清明力行善本而躬履道極此王道所以成也且夫一之以道德淳之以仁義此王道也行之以仁義雜之以功利此覇道也專用權謀不顧義理此強國之術也及考其見於効也王道行於數千歳之外詠歌畏愛猶深結於民心而不忍去之覇政止能及其身至子孫之世則廢熄不講強國之術民之視上相疾如仇讎伺其有間則相與蹈藉傾覆之矣凡三道者得失之報若白黒然而世主趨王道者少適覇政與強國者多何也盖王道所及甚逺而不能取成於倉卒覇政與強國爲敝雖深而能見効於目前人之常情薄逺効而貴速成是所以失趨適之正也漢之文景唐之太宗皆有可致之資又有能致之勢而致治安國不能與三代並者失其所適也伏惟陛下聰睿神武得之於天可謂有能致之資矣日月所被皆在圖籍可謂有必致之勢矣當承祧踐極之始端本清源之日欲王而王欲覇而覇欲強國而國強得失之策繫於一舉而已譬猶御八駿之馬馳九軌之路擇而後徃則得其正一或不愼以意馳之則宜之燕者或造於楚矣宜徃吳者或之於秦矣則夫事物交會之間不可不慎所適如此臣竊觀近日朝野之論而考陛下意之所適求之於古不能無疑且天下之所以治者貴義而不貴利也奈何先之以興利仁人之所以尊者明道而不計功也奈何一之以望功萬事所以成就者遲乆也奈何期之以廹急四方所以畏爱者愷悌也奈何驅之以威刑荀卿曰國者巨用之則巨小用之則小揚子曰好大而不為大不大矣好髙而不爲髙不髙矣此而望仁翔而德洽四序調而萬物和以至兵偃刑措儁賢修職夷狄納貢建皇極而天道應斂五福而民氣洽吉祥見於上珍符出於下豈不難哉臣願陛下曠然大變而行衆人之所不能爲卓然自致而行前世之所不能到尊尚王道賤略強覇其尊之也若抱渴而需飲其賤之也若辭闇而即明屏去諛佞親近忠直數御東序開陳圖書講前代之興亡論百王之成敗以其善行以其惡戒避其所得趨其所失仰而思之以夜而繼日也幸而得之輟寐以待旦也有言逆於心必求諸道有言遜於志必求諸非道用其粹而遺其駁操其要而治其煩凡此皆王道之術而正始之論也陛下深講而力行之則馴致古昔明王之道如決流抑墜爾何患慕之而未臻乎聖策曰朕承祖宗之業託士民之上明有所未燭化有所未孚又退託於任大守重艱於負荷思聞讜直之言以輔不逮庶幾乎治此見陛下虛心訪道至誠惻怛之至意也如臣之愚何足以奉承之而臣嘗聞之曰明欲被於萬物化欲孚於四方未有不自治心始也夫治心者聖人所以窮理之術也人之有心猶天之有極也是故晦冥隂黙之中不足以辨南北而能考而正之者極星是也是非紛雜之間不足以審真偽而能别而分之者心官是也心也者天下之至正也又能飬之以正則善惡是非萬事之理無不白矣齋戒以持之使其不失清虛以守之使其不亂問以通之謀以發之此治心之始也及其成也不思焉未嘗不應於理也不勉焉未嘗不合於道也藏之為志氣而無不充發之爲事業而無不濟如權衡設於此而萬鈞之重銖兩之輕無所不辨如槃水設於此而大如天地細如毛髮無所不察此治心之効也心正則明盡明盡則化至此自然之道陛下思聞讜直之言庶幾乎治此天下之盛福也臣聞適於耳目之娯而爲心腹之害者柔從說順也雖芟夷之而常患其有餘忤於一日之意而爲百世之利者剛方讜直也雖養長之而常患其不足古之聖賢屈已執謙和顔遜志加之以勞來之厚助之以勸賞之渥凣以養天下剛方讜直之節使森然立於吾庭爲國家廟社之福故夫伏格趨鼎引衣㫁檻破裂麻制封還詔書如此之𩔖日常有之而不爲怪者所以廣聰明而來下情也臣願陛下容忍近臣之獻言開納逺臣之論事廣諫諍之任以助聞見補憲肅之官以振綱紀而又力以謙冲假借深養剛方讜直之氣如漢髙祖之於周昌晋武帝之於劉毅然後可以得天下讜直之言以輔治道不然猶却行求前徒舉以訪臣又安補於萬一哉聖策曰盖人君即位必求端於天而正諸已惟五事得其常則庶徴協其應有國以來靡敢自肆而和氣猶欝大異數見廼元年日蝕三朝洎仲秋地震數路而冀方之廣爲災最甚自處於弗德之致夙寤晨興思其所以此見陛下畏天飭已恐懼修省之盛德也臣聞日食地震者陽㣲隂盛也而或曰日食者歴之常數也臣請辨之一百七十三日有餘而爲一交然後食此歴家之說也而春秋㐮公二十一年之九月十月二十四年之七月八月皆未及一交則食此歴之不合一也二漢之政西京爲盛東京爲衰大率皆二百餘年爾而西京四十五食東京七十四食食之䟽宻應政之盛衰而然曽無定數此歴之不合二也是日食者非可託於歴其要爲隂盛之應也陽浮為天而主於動隂凝為地而夲於静宜静而動者隂越其分而擬諸陽陽之與隂君子小人之道也君子道長則陽氣發於祥瑞小人道長則隂氣見於災變此天人相與必然之應也易自復之一陽至坤之六隂凢十二卦相徃來於一歳之間盖聖人告人以君子小人之道有相更之勢貴於早防之也在臨則戒之曰八月有凶在㤗則戒之曰無平不陂無徃不復欲其愼之於八月之前消之於未陂未復之始也陛下欲應變求端謹五事而協庶應消大異而召和氣在乎尊陽抑隂尊君子之道抑小人之道而已凣天下之道有故有新有大有小有老有弱有正有邪有訥有辯有躁有静以對而言之在上偏者皆陽而君子之道也在下偏者皆隂而小人之道也上偏欲其過厚下偏欲其常損宜厚而薄之宜損而益之則隂盛陽㣲君子道消小人道長其敝至於不可扶持此不可以不察也若夫舊策必遷而新策必合大臣依違而小臣執議老成淪伏而弱齒簡㧞方直踈逺而柔諛親附辯給者獲用而遲蹇者被退銳進者褎陞而黙守者遺落隂盛陽㣲之變莫著於此矣天地告戒之意不為不審願陛下思所以應之夫陽不可以不尊隂不可以不抑君子之道不可以不進小人之道不可以不退不抑不退其萌雖㣲及其既盛甚可畏也周之衰諸侯僭天子又其衰也大夫僭諸侯又其衰也家臣僭大夫又其衰也呉楚盟中國此隂盛之極也而春秋自此絶筆矣故臣願陛下早思所以救之聖策曰圖講政務則日至中昃而猶多茍簡之習烝進人材則官無虚假而頗乏績用之美臣聞講政務而絶茍簡在於貴遲乆進用人材而底績用在於練名實易曰聖人乆於其道而天下化成夫聖人之才所過者化所存者神而至於論治定功成之業未嘗不待之以乆何也速則粗粗則所得暴而所及淺乆則精精則所收博而所被深此聖人之意也盖夫仁必乆安義必乆由志必乆勤法必乆守令必乆行官必乆任士必乆養兵必乆練游神於累歳之外望化於必世之後夫如是則心一而慮精事詳而理究德新而道大化浹而澤流動乎萬物之上被乎天地之間又何患茍簡之習哉聖人無爲不言而海内大治者以能練羣臣覈名實也官各守其分謂之名職各治其事謂之實丞弼之任責之以論道德和隂陽財計之司責之以通有無足國用諫官責之以直言得失御史責之以彈戢愆違侍從責之以盡規納誨將帥責之以安邊却敵職司責之以一路之政守令責之以一郡一縣之治如此舉名以責其官按實以督其職而庶績弗凝者未之有也今夫大臣下兼財計之柄小官或侵將帥之權侍從言責不得盡其詞職守令不得專其治未見其能無虛假也朝廷設百官於外内皆所以治天下萬事非徒爲空名以付之也欲立一事重建一官欲治一政重遣一使未見其能底績用也聖策曰種羗非不懐徠也而邊候或時繹騷以至臨遣輔臣憺明神武臣以爲禦戎之策失之於素而已夫以邊鄙之重不責綂帥之臣而求希合倖進之小謀金革之機不爲持重之算而聽輕率易動之踈計是以其弊在於茍爭小功而忘大憂專趨小利而失大信此猾敵所以敢負懐徠之恩踐王圉而抗官師亦吾有以致之而已夫敵之未至也制之宜以經逺之策敵之既至也禦之宜有應變之術齊景公時燕晉爲寇景公患之問於晏嬰而嬰之所薦者穰苴而穰苴卒能逐寇而安邦唐憲宗時劉闢爲梗憲宗患之問於杜黃裳黃裳所薦者髙崇文卒能擒敵而定蜀陛下宜詔輔弼大臣各薦将才而用之則神武憺於天地之表河湟之外當有觧椎髻襲衣冠來獻國地者又豈患奔衝之寇不可禦乎聖策曰蒸民非不愛養也而生業或未完富以至外馳使者布宣惠教臣以爲陛下愛民欲其富而不足以富國遣使宣惠教而適足以爲弊盖失所以先後之序矣夫事有肇禍而法有起患者不謂事之始法之初也累之至乆則弊敗積而禍患起此必至之勢也臣嘗爲陛下深慮後世之患而必爲無窮之弊盖在乎富民之道不講而富國之謀太深也凢賦斂之於民古人貴其損之而不貴其益春秋書宣公初稅畝成公作丘甲哀公用田賦以爲益之不已則勢窮力弊必至於變故孔子詳錄其事以貽後世之戒臣嘗觀富國之論不起於豐大之世而多出於戰爭之際王者總制六合所以服民心而重國體者在吾道德之盛大不繫財貨之豐盈易之小畜者德之小者也則曰富以其鄰在㤗與謙則道之大者也皆曰不富以其鄰夫左右相比之謂鄰人君之與天下中國之與四夷皆鄰也人君所以運動天下役使四夷道有餘者不假於富德不足者須富行之陛下固宜法謙㤗之有餘豈可用小畜之不足是以鉅橋雖積而商不能居敖倉雖盈而秦不能守非無財也道德不建而失天下之心也夫鳥窮則啄獸窮則搏人窮則詐陛下之民可謂窮矣前世所謂無蓻極之賦大之山海細之草木其利皆已入於官而行於今矣陛下徐思弛費息用以寛民財而逸民力若大禹卑宫惡服漢文弋綈革舄以澤天下庶幾不致大匱而復出泉以取其息寘使以厚其征而求富民宣惠之名不可得矣易之剥者始於下也其象曰上以厚下安宅所以救剥也陛下取於下悉矣上取下悉則其勢既極而其象為剥孟子曰君子用其一緩其二用其二而民有莩用其三而父子離臣懼民心積窮不知所出漸為離㪚以至剥落雖有湯禹文武之才無所復施其巧易曰觀我生觀民也詩曰念我皇祖陟降庭止陛下觀天下之勢易離難合一危則不可再安上念五聖之業艱難勤苦一敧則不可復正則大富國之謀適足爲深憂未足爲陛下利也伏惟發於神㫁罷法追使以幸天下以福萬世此四方裂眦決目之所共望豈獨賤臣之妄言哉聖策曰國用雖節而尚煩於調度兵籍雖衆而未精於簡稽臣以爲國用雖節而調度煩者未得節之之道兵籍雖衆而簡稽䟽者未得簡之之本也九州土地之産撮粟尺布之賦陸輓水漕銜柂摩轂日夜合雜以輸太倉以古準今可謂盛矣至於道途之艱将負之疲京師之一金田野之百金也少府之百金民屋之萬金也夫以萬金之費施之於一燕好之中用之於一賜予之内此𩔖可勝計哉地之財有時民之力有限人君之費無窮以有時有限養無窮此調度所以愈增而不已民力所以愈困而不支也古者宫庭之職百二十員漢之文帝明帝給事宦者不過二人太祖養兵不過十二萬太宗嘗謂近臣曰人君當淡然無欲不使嗜好形見於外則姦佞無自入矣凡此皆清心節用之本寛民養物之要不務先理其本而廣爲調度之求故曰未得節之之道也今夫能省内郡之黥兵而益以土兵然後兵可簡也國家北失幽燕西捐靈夏守邊捍塞無百二之要阻是以二邊黥卒恃爲爪牙不可以廢至於方内無事之郡百年不識兵革而例設屯伍坐蠧民力此不可不制也宜依前世府衞之法使民得以相率出徒而分天下郡爲三等上郡五千中郡三千下郡一千而止畨休迭上不過什一則武備修而簡稽精矣周公制禮方五百里謂之大國其車千乘爲五萬五千兵而民不告勞者施之有序制之得術也今之所謂上户者征斂甚厚而其力困所謂下户者庸役不及而其勢逸而上户居其一下户居其十是常困其一而逸其十也家有二夫古者皆出一兵今皆逸之而不能用反斂有限之穀帛以給不耕之墮民此豈周公之心哉故曰未得簡稽之本也聖策曰寛闗梁之禁而商賈靡通臣聞錢者無用之物而聖人貴之者以其能通有用之財也夫以無用而通有用是以貴其通而不貴其積古之所以通貨達財者在乎商賈之職而不在乎上今之闗市之征宻於布棊均輸之利苛於翼虎商旅易業轉爲他技而求財貨之通難矣聖策曰捐器玩之巧而工弗戒此在陛下約已以率爾陛下約已於上則六宫蒙化於内百官率法於朝百姓承流於下及其乆也風俗轉移嗜好薄損有其財而無其尊弗敢踰制有其力而非其道不敢敗度則雖不捐器而工自戒矣臣又聞之天下技巧華靡之玩未有不始於京師欲治四方先治京師古之道也夫以千里之地而四方之俗皆有焉者唯京師也唯其難制之宜甚詳周法六鄉四郊之内自比長主五家積而上之至鄉大夫凢萬有八千九百三十六官而後足以致京師之治今京師治民之職大不過京兆尹次不過河南令而求風敦俗朴是以難也唯陛下擇之而已聖策曰風俗浮薄根於取士之無本教道之不明而博詢臺閣之論所執者不一豈無救敝之道焉凡取士之要不過二科曰德行也文辭也而已臣以爲自三代以上可以用德行由秦漢以下不過用文辭而臺閣所以異論者盖不過二者之間也陛下必欲以德行取天下之士則井田當授也侯國當建也民必家給也官必乆任也鄉當讀法也家當有塾也而後可以求全德真行致之於位如其未也而獨設選舉德行之科是亦無補而已夫先世之吏正故所舉者必求仁義孝弟今世之吏邪故所舉者不過請託嗜好故曰今日取士不過可以用文辭爾至於敦俗之本教道之法臣願有獻焉盖士節之重輕未嘗不與體國之安危相應如根本強弱於下而枝葉榮枯於上也昔周之士貴秦之士賤夫上有屈體下無屈道者貴也舍已所守求合於上者賤也周秦治亂考此可見盖夫士無守道自重之節人有翾躁不恥之求漸漬成俗恬不爲怪未有甚於今日也宜有以矯正其弊使士知自重而人蹈亷恥凢潛德獨行不求聞之君子必深察之而使之常在於必顯仰希俯合昧於寵辱之人必深觀之而使之常至於不用則天下皆知盛德之意士節一變敦俗之本教道之法自此致之可也聖策曰刑罰煩重出於設法之多門㳂襲之不革而將加恩仁之政使死者少緩必有可行之術焉臣觀陛下之意不過欲倣三代之肉刑施之於從坐之死爾是未盡觀時制宜之道也古者政敦事樸雖以聖人之智而因革之間猶有未盡者肉刑是也斷民之支體使不爲完人此非聖人之心而三代用之者因革之理有未盡也且立尸而祭近於瀆神爼豆而食近於甚野豈若後世虚神之位金石爲器哉肉刑之不可用於今猶之不可尸祭而爼食夫大辟之科至死而不敢怨者法當其罪也儻欲加恩仁之政寛從坐之死則今之律令自有減死一等法捨此不用而斷支刖足爲駭民驚俗之政未足爲可行之術也昔子産欲止伯有之妖必並立子孔之後則夫政雖期於推賞而亦貴於慎名使天下不知朝廷恩仁之意而徒傳告以㫁人之足而棄之豈所以爲愼名哉聖策曰予欲興七教兼乎三至以底聖人之道則宜條其先後之次欲明乎六親盡乎五法以極天下之治則宜叙其始末之要此見陛下博稽古先欲舉載籍之所傳施之於今以盡聖人之道而盡天下之治也臣請深論天下之道先後之次始末之要而陛下酌焉盖德與刑並行於天地之間如寒暑相將而未嘗離也於是之間必有先後之次上焉者專德以勝刑若堯舜之無刑成周之措刑是也中焉者假刑以助德若西漢宣帝任刑名東漢明帝善刑理是也下焉者唯刑而已秦人以刑致亂隋人以刑兆變是也此先後之次不同故治亂之應異也則夫恭老尊齒樂施親賢好德惡貪亷儉之七教至禮不辭而天下治至賞不費而天下悅至樂無親而天下和之三至從而可明其次也抑臣又聞之恐懼寅畏者政之始也驕逸隳惰者政之末也周宣王中興之盛德而不慎於後其詩終爲變雅唐太宗慈儉英武之主而魏鄭公劉洎馬周之徒咸諫以爲漸不及正觀盖崇髙富貴之勢驕逸隳惰之所伺也視其有間則入而不能出矣是以聖哲之君遐觀逺慮思之於所不思求之於所不求方其大安也必以危自厲方其大榮也必以辱自惕不使非常之變起於不測而至於不可救也豈非知治道本末之要也歟則夫六親之等五法之數又從而可推其要也聖策曰仲舒之言班固謂切於當世而可施於今者何策崔寔之論范曄謂明於政體而有益於時者何事昔班固載仲舒漢廷之策於史其間講天下治亂之理可謂詳矣舉而行之皆足以助治而最可施於今日之策臣以為莫如天道先陽而後隂王政先德而後刑之論也范曄紀崔寔政論數十條於書以為凣所辨論通明政體而言有益於今者則臣以為不足深論者也何者寔之大概欲人主不能純法八世而宜參以霸政嚴刑峻法破姦宄之膽以之行於漢桓帝衰替之世可爾安足為陛下深論哉策曰無以為古人陳迹既乆而不可舉無以為本朝之成法已定而不可改惟其改之而適中舉之而得宜不廹不迂歸於至當陛下議政法而舉適中得宜為言此天下之望也臣安得無辭以致之盖勢可以舉則舉之則不失於陳迹力可以改則改之則不泥於成法此因革之常道也至於未適於中未得其宜而改之則今日之變法猶或可議焉臣讀易至革卦言天下之法至於有弊則不可不革也而辭曰元亨利貞悔亡然則革之必至於元亨利貞然後悔可亡爾又曰革而當其悔乃亡然則革之而不當益以招悔也夫革之必至於亨然後可以議革變之必至於當然後可以言變斯聖人之能事易象之精義也思之於㝠㝠索之於昏昏使盡合道義之中而後革之則一法出而天下倚之若山嶽此之謂革而亨謀之於衆多待之以遲乆使盡得上下之宜而後變之則一制行而天下望之若雲霓此之謂變而當古之為治相與謨謀於廟堂之上至於風移俗易徙善逺罪而天下不知其措置之迹者必亨而後革必當而後變也今則不然一法朝出而夕已囂一制暮行而曉或弊斧鉞不足以禁謗論竄黜不足以抑煩言其故何邪未決其亨而革之未計其當而變之舉而不必適中動而不必得宜也臣願陛下愼之而已盖夫革而未盡其至則其勢必復革而有復則法以輕而不信矣法制數變國家之大病也漢徙甘泉后土之祠自是之後三十年間五徙而天地之兆終不能定故願陛下愼之則至當之論無過於此矣陛下慮臣之惮言而不必行則茍飾行以自免則詔之曰言之非艱行之惟艱又慮其畏避執事而不盡其悃愊也則又曰悉心以陳亦不憚於改為臣是以敢進其私憂過計之說臣聞天下者大物也是以治之者必得大才茍未得大才而委畀之則天下之政終無時而理矣萬鈞之鼎天下之至重也而孟賁烏獲持之奔走踰越險阻若踐平地此無他其力足也使力不足者負之而趨不獨折絶筋骨又将隳器敗餗而不可救矣易言天下萬物之理至詳宻矣而至於治天下之難治而未嘗不歸之大才碩德之人故屯之不寜必待君子之經綸蠱之敗壊必待君子之振育旅之分散必待智者之有為否之欲休必俟大人之獲吉聖人以為當四卦之時不得四人者治之則愈益其亂而無補於治昔湯之求伊尹也見之耕者髙宗之求傅說也見之巖築文王之用太公也見之漁釣三士者藏迹至深而三君者能舉而用之者以其取之公求之廣也唐文宗可謂恭險慈仁勤於致理之主當是時李德裕在其庭而不用裴度捐於外而不使乃覽貞觀政要而歎息又曰吾視開元天寳事則氣拂吾膺然則文宗所以憂勤盡心者徒虚器爾伏惟陛下法成湯髙宗文王公聽廣取以為法鑒文宗捨本憂末以為戒獨觀昭曠之道驅馳域外之議不論隠顯不間内外不異逺近不殊明晦才之當者取之德之宜者予之可大者治大可小者治小則天下之才繼踵而起凣陛下所舉而詢於臣者不治而自治矣陛下有為之術何以先此古人有言曰言切直而不用則身危不切直則不可以明道茍求所以明道又避於危身此勢之不可並者也說不由道憂也由道而不合非憂也茍求所以由道又希於必合此理之不可兼者也臣學術淺陋言論狂鄙罪當萬死無所敢恨幸陛下察焉歴代名臣奏議卷四十二
