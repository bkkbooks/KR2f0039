body:
  text: 歴代名臣奏議卷八十九明楊士竒等撰經國宋髙宗紹興間虞允文上言曰臣聞國勢有强弱人心有向背而天下之理有順逆理之順人心之所嚮也勢雖弱而可以强故有以百里之地而興王一旅之衆撥亂世而反之正者能用吾之順以應彼之逆而已彼以其虐吾則應之以寛彼以其奢吾則應之以儉彼黷於貨利吾則應之以無欲彼窮其力役吾則應之以不擾一順一逆之間而向背自分四海之大可使一心也世之人以斧析薪以錐鑿石可以必克矣然不得其理則斧可缺薪不可破錐可折石不可鑿而謂敵挾强勢用逆理可得志於天下振古未有也臣觀今日之勢天所以相陛下者甚厚而陛下所以答天之休者無不用其至臣敢以今歲所親見者粗言之罷駞坊之冗費減甲庫之雜務禁諸軍之重役細至於美瓜之獻卻而不納道路驩傳以至感泣臣愚猶欲望陛下廣運兹德縁其𩔖而推之凡冗費如駞坊者雜務如甲庫者諸軍之弊有大於重役者外廷之獻又有甚於美瓜者願陛下必罷必禁以次而施行之蠧國害治之事已盡矣尚憂其未盡宅中圖大之慮可休矣尚勤而勿休一號令之行煥然有以起天下之心而作其氣臣將見四方萬里之外莫不丕應徯志而勢有所激則弱者忘其所以為弱而强者失其所以為强恢復之功日月可冀尚何敵人窺伺之憂哉里語曰盜欲入人之室主人覺之則盜無自而入矣此言雖小可以喻大毣毣孤忠惟陛下幸擇胡宏上書曰治天下有本仁也何謂仁心也心官茫茫莫知其鄉若為知其體乎有所不察則不知矣有所顧慮有所畏懼則雖有能知能察之良心亦浸消亡而不自知此臣之大憂也夫敵國據形勝之地逆臣僭位於中原牧馬駸駸欲爭天下臣不是懼而以良心為大憂者蓋良心充于一身通于天地宰制萬事統攝億兆之本也察天理莫如屏欲存良心莫如立志陛下亦有朝廷政事不干於慮便嬖智巧不陳於前妃嬪佳麗不幸於左右時矣陛下試於此時沈思靜慮方今之世當陛下之身事孰為大乎孰為急乎必有歉然而餒惻然而痛坐起彷徨不能自安者則良心可察而言可信矣昔舜以匹夫為天子瞽叟以匹夫為天子父受天下之養豈不足於窮約哉而瞽叟猶不悅自常情觀之舜可以免矣而舜蹙然有憂之舉天下之大無足以解憂者徽宗皇帝身享天下之奉幾三十年欽宗皇帝生於深宫享乗輿之次以至為帝一旦刼於讎敵逺適窮荒衣裘失司服之制飲食失膳夫之味居處失宫殿之安妃嬪之好動無威嚴辛苦墊隘其願陛下加兵敵國心目睽睽猶飢渴之於飲食庶㡬一得生還父子兄弟相持而泣歡若平生引領東望九年於此矣夫以臣之踈賤念此痛心當食則嗌未甞不投箸而起思欲有為況陛下當其任乎而在廷之臣不能對揚天心充陛下仁孝之志反以天子之尊北面讎敵陛下自念以此事親於舜何如也且羣臣智謀淺短自度不足以任大事故欲偷安江左貪圖寵榮皆為身謀爾陛下乃信之以為必持是可以進撫中原展省陵廟來歸兩宫亦何誤邪萬世不磨之辱臣子必報之讎子孫之所以寢苫枕戈弗與共天下者也而陛下顧慮畏懼忘之不敢以為讎臣下僭逆有明目張膽顯為負販者有協贊敵人為之羽翰者有依隨兩端欲以中立自免者而陛下顧慮畏懼寛之不敢以為計守此不改是祖宗之靈終天暴露無與復存也父兄之身終天困辱而求歸之望絶也中原士民沒身塗炭無所赴愬也陛下念亦及此乎王安石輕用已私紛更法令棄誠而懐詐興利而忘義尚功而悖道人皆知安石廢祖宗法令不知其并與祖宗之道廢之也邪說既行正論屏棄故姦䛕敢挾紹述之義以逞其私下誣君父上欺祖宗誣謗宣仁廢遷隆祐使我國家君臣夫婦之間頓生疵癘三綱廢壊神化之道泯然將滅遂使敵國外横盜賊内訌王師傷敗中原陷沒二聖逺栖於沙漠皇輿僻寄於東吳囂囂萬姓未知攸底禍至酷也若猶習於因循憚於更變亡三綱之本性昧神化之良能上以利勢誘下下以智術干上是非由此不公名實由此不核賞罰由此失當亂臣賊子由此得志人紀由此不修天下萬事倒行逆施人欲肆而天理滅矣將何以異於先朝求救禍亂而致升平乎末言陛下即位以來中正邪佞更進更退無堅定不易之誠然陳東以直諫死于前馬伸以正論死于後而未聞誅一姦邪黜一䛕佞何摧中正之力而去姦邪之難也此雖當時輔相之罪然中正之士乃陛下腹心耳目奈何以天子之威握億兆之命乃不能保全二三腹心耳目之臣以自輔助而令姦邪得而殺之於誰責而可乎臣竊痛心傷陛下威權之不在已也知饒州李彌遜上奏曰臣聞光武起南陽一年而破新室肅宗起靈武一年而復兩京元帝起建康數月而君臣之禮定遂成東晉之基事雖不同皆謀深志定力行而不疑故功效之成如此其速也竊惟國家之患振古未聞天祐宋德陛下興起於艱難之中以陛下英睿神武何啻並駕漢唐之君而祖宗流澤入人之深比方數代何啻相什百也然閱時滋久大勲未集者良由聖志未定廟謨未決上下無所遵承小大之臣無路以自效也爰自多事以來朝廷雖未甞不以復境土為急而前後議者各私其説以相矛盾主和者以征討為敗謀好攻者以守備為失計彼是而此非朝令而夕改紛紜殽亂上紊宸聽猶豫不決日復一日而已迫防秋之期矣故八九年間排難解紛之不暇其於恢復之圖初未有定計也求治效之成難矣哉夫千金之家為巨室者必先度方隅正基陛然後鳩工庀材藩垣而棟宇之則室成矣不然雖有良工無所施其巧也況天下之大不正其基址定其規模而可為乎書曰事不師古以克永世匪說攸聞伏望陛下奮剛健勇智之德考前古已行之事酌今日當務之宜斷自宸𠂻定其規模而力圖之姦言浮議排斥不用上志既定然後詢謀一二同心之臣任之勿疑責以成效恢復境土歲月可待也天下之事未有不為而成亦未有為而不成者也古人有言患莫大於以為不足為而不為願陛下早圖之彌遜又上奏曰臣聞易曰介如石不終日吉孔子曰茍有用我者期月而已可也三年有成天下之事方其臨機應變間不容髮朝聞而夕行猶恐失之至於恢逺圖振長䇿貽謀百世之後非先其根芽封植而長養之不能成功故不俟終日不以為速期月三年之間不以為久為國者不可偏廢也國家靖康之末法度大壊陛下繼紹丕圖日新庶政當如創業之初條舉而叙行之然外患内憂無有寧嵗盡心力而為之僅救目前之急其逺者大者有所未暇此亦臨機應變隨時之義不得已爾而上下習熟便謂當然禦敵之外一切不議間有陳一說論一事利在歲月之後者衆皆指為迂闊非笑而詆訿之朝廷因以為不急之務置而不知妨功害治莫此為甚也孟子曰猶七年之病求三年之艾茍為不蓄終身不得傳曰無三年之蓄曰國非其國也豈有為國之慮不及三年之近乎伏望陛下詔左右輔弼之臣禦敵之暇取社稷經逺之計治安亂危之所係者條具以進陛下少加宸慮審其先後緩急而推行之日滋月益必有成效上禆中興之治庶幾國有定安之期民有休息之望彌遜又上奏曰臣聞圖治安者忘艱難險阻之為勞故終於逸樂而克成永世之基溺宴安者忽因循茍且之可慮故怠於閒暇而馴致一朝之患在昔多事之時人君未甞不欲求安而每至於顛隮離析者樂於茍且而倦於艱難故也仰惟陛下聰明睿智負興衰撥亂之才踐祚以來焦心勞思圖回治功是宜措天下於泰山之安矣然而國步未寧民居未奠一有小警上下騷動陛下不得髙枕於九重之中臣所未喻也豈尚或怠於閒暇而救焚援溺之䇿不汲汲於朝夕耶何以言之臣竊觀累年敵退之後中外熈然便謂無事朝廷有偃武之象將帥思歸馬之期一日無事幸一日之安一月無事幸一月之安欲求終歲之安已不可得而求天下之安可乎賈誼居文帝時謂猶抱火厝之積薪之下而寢其上火未及燃因謂之安今日方之豈不為寒心哉易於萃除戎器戒不虞於既濟思患而預防之居安慮危猶不可緩而況欲轉危為安乎臣願陛下不以艱難險阻為甚勞而以因循茍且為甚可慮忘目前朝夕之娛為社稷萬世長久之計天下幸甚彌遜又上奏曰臣近准大臣宣諭聖㫖令臣條具今日當行事件臣惶恐震懼罔知所措自惟空疎不識治體何以仰副聖訓輙罄愚𠂻少布犬馬之誠臣痛念國家多事十有餘年前後失圖屢有改作致誤陛下焦勞如此未見成效臣謹稽合公論參酌事宜今日規模當急為自治之計先令國勢日安日强以圖恢復方為萬全之䇿安强之術其目有六一曰固藩維以禦外侮二曰嚴禁衞以尊朝廷三曰練四方之兵以壯國勢四曰富國用以備軍食五曰收民心以固根本六曰擇守帥以責實效信能行此六者則一年而安三年而强然後資閩廣之利以守淮南積四川之財以窺關陜政事既修舉則必勝不然按兵固守傳檄遣間逺者自至惟陛下用之爾然臣之所陳拯危救亂之䇿難以循守故常當如創業之初為之先須陛下聖慮深思熟計灼見利害確然不疑必欲力行不為浮議所揺方可擇人以任之數年之間可見成效良以國勢空虛危弱至此已甚不以持久不能有成若但應目前以為迂闊而不為孟子論三年之艾政可為比陛下既欲力行而又委任得人則於聽言之際尤不可不審也蓋興大利必有小害圖逺業必無近功𩔖非衆人所能窺測兼立言者甚易立事者至難若事有小害輒罷人有小失輒廢一守前日之轍臣恐徒養小惠有害陛下安危大計日復一日事無立期加以數年天下有不可勝慮者矣臣冐瀆聖聰罪不容誅伏望聖慈察臣區區之忠不敢愛身上酬天地生成之賜貸臣萬死使得少圖報效臣不勝惶恐激切屏營之至兵部侍郎王庶入對上曰召卿之日張浚已去趙鼎未來此朕親擢非有左右之助庶頓首謝因奏曰恢復之功十年未立其失在偏聽在欲速在輕爵賞是非邪正混淆誠能賞功罰罪其誰不服昔漢光武以兵取天下不以不急奪其費不知兵者不可使言兵又口陳手畫秦蜀利害上大喜即日遷本部尚書岳飛為太尉從幸建康以王德酈瓊兵𨽻飛詔諭德等曰聽飛號令如朕親行飛數見帝論恢復之畧又手疏言金人所以立劉豫於江南蓋欲荼毒中原以中國攻中國金人因得休兵觀釁臣欲陛下假臣月日便則提兵趨京洛據河陽陜府潼關以號召五路叛將叛將既還遣王師前進彼必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經畧兩河如此則劉豫成擒金人可滅社稷長久之計實在此舉帝答曰有臣如此顧復何憂進止之機朕不中制㑹與張浚不協乞終母䘮詔强起慰遣之飛因奏比者寢閤之命咸謂聖斷已堅何至今尚未決臣願提兵進討順天道因人心以曲直為老壯以逆順為强弱萬全之效可必又奏錢塘僻在海隅非用武地願陛下建都上游用漢光武故事親率六軍徃來督戰庶將士知聖意所向人人用命未報而酈瓊叛浚始悔飛復奏願進屯淮甸伺便擊瓊期於破滅不許詔駐師江州為淮浙援監察御史鄭剛中上奏曰臣聞執一隅之見偏信自守者謂之衆人見善則改惟義之適者謂之智人通流變化不可測知者謂之聖人惟聖人之見髙出一世之上故能宰制籠絡御天下而為之主臣謂和議髙世之見陛下得之矣何則敵人虐犯中國禍毒流布則號呼怨恨思欲犁庭而報耻者衆人之所同也而有智者不以為然顧我之勢既未可與為敵料彼之情猶不敢以為信則卑辭遜意姑曰從之者智士之所同也而陛下不以為然陛下之意決謂敵人之心在於休兵河南之地必以歸我故於衆論猶豫之時守以剛明不回之斷所以得陜得洛得汴又得禁軍弓箭手以備西入之夏得榖粟布枲以寛出蜀之兵可謂盛舉矣然而今也迎請之使半留半返凡我所以懇祈于彼者皆靳且遲陛下於此雖已有髙世之見然通流變化區區臣子之心尚有望於陛下焉蓋敵今日之勢非前日之勢也我之勢非前日之勢也何以言之昔為敵謀者主為和好者也而今為敵謀者其和好非自己出也然敵捨河南之地斂跡而北非其國中内有牽制之患外無及人之力當未至此則通和之議彼豈遽變第其謀國之臣必不肯一遵前議勢須少示齟齬艱難之狀然則我所以懇祈于彼者能一請而遂乎臣故曰敵今日之勢非前日之勢也河南之民方其陷沒日有懐朝廷之心今其歸矣日有失朝廷之憂臣比見陜西兵民具言敵無技能用一人可當其四五臣卜之曰如是則關陜當永無亡失之患對曰不然朝廷主之則敵為可勝朝廷棄而不顧則又復解散而已嗚呼殆眞情也使果有解散之患其何以為國哉臣故曰我之勢非前日之勢也夫彼已之勢皆有不同則所以通敵人所以保新疆者必有道焉靜而勿躁緩而弗迫堅忍以濟其誠慮逺以防其變如有須於我者於其所可酌中道以從之於所不可遜辭意以違之此通敵人之道也定帥臣以專其託通兵勢以示其形料理三京使其血脉相連分委大將使其號令相及此保新疆之道也剛中又上奏曰臣聞人君之有天下猶人之有四體也人之四體惟血氣浹洽脉絡流通然後疾病不生一者有痞塞則膚理為之不榮人君之天下惟德意交孚政事徧舉然後危亂不作一者廢隔則綱紀為之不貫國家多故以來江淮之北隂邪之氣結為癰疽聚為痼癖者不可勝數賴陛下感動天地强敵革心和氣一通而大河以南妖沴平息甚盛德也臣今年四月被㫖為樞宻院行府叅謀官渡江踰淮道京洛抵關陜甞為陛下詳觀今日天下之勢關陜新復而且逺然其就緒也必易三京去東南為近然其就緒也尚難關陜就緒矣三京之力又從而相接則關陜之安久而可保茍三京之力衰敝不振於中則關陜孤絶後當有可慮者臣請備言之陜西諸路雖號新復然得禁軍可四萬皆壯勇善戰之人是官不至於無兵也弓箭手舊額一十四萬今猶得六萬是民尚可以為兵也年榖既狼戾官中見管之粟與和糴相當共可以足一歲之食是土地不全曠也今又益之以秦鳳熈河出蜀之兵宣撫使節制其間有一旦之警利兵據險六經畧趨走而聞號令未易窺也臣故曰就緒為易惟洛陽百戰之餘凋殘尤甚其西則陜府為鄰陜自李彦僊死守敵悉力取之民無噍𩔖其東則汴京應天府一帶久為劉豫兇焰所焚焦痛未蘇三京户口今計雖僅四十萬比平時不能十分之三近又縁屯田司收其已租之田追其元買農具公私相礙宿麥不入土民力殊困論其地勢則平川通道不見藩籬無一兵可以受甲無一家可以輸上孤城乍聚之衆不相統屬釁隙之所易生臣故曰就緒為難夫關陜先就緒而三京不能振起則朝廷之德意政事痞塞于數千里之間有如盜賊䝉死徼幸乗執事之不備則潼關以西不過自能保守當無氣力相援紀綱廢隔豈不再貽關陜之憂哉臣願陛下與二三大臣講究所以保養三京之道選任名德重望之士置之要郡審擇材猷敏博之吏使為監司增廣戍兵而謹備不虞精究屯田而俾民安業使朝廷和氣自東南達乎西北中間血氣浹洽脉絡流通起居食息日就安彊則事功之興起未易量也茍惟不然膚理不榮復有受病之處不治將深矣剛中又論東南根本疏曰臣聞第五琦謁見肅宗於彭戍原奏言今之急在兵兵强弱在賦財賦所出江淮為淵臣請悉東南寶貲飛餉函谷肅宗恱之臣不識陛下以肅宗之恱琦為是耶非耶陛下見肅宗之非則臣不復論若以為是則臣欲有言夫西北有亂藉東南為根本奈何欲先揺其本以徇西北乎國家兩宫逺狩中原未復生靈日望陛下出之於塗炭謂可棄西北而不顧者非也而又人心久而不收則離德澤久而不繼則竭僭竊之勢豈可容其蟠結漸牢謂可棄西北而不顧者非也知以西北為念力守其說而不忘經營則濟矣謂可困東南以徇西北者亦非也書曰民罔常懐懐于有仁西北之民以東南為裕則如水就下雖萬折而必至若東南自有愁嘆之苦彼何所慕而歸乎大抵事不可令再失䇿今陛下親撫六師大臣統䕶將展力共洗前日退避失䇿之悔則天下幸甚不然槃水一跌恐無有再能收拾者剛中又上奏曰臣竊見朝廷自去冬建議移蹕論者是非相半或謂建康阻江為固有如敵騎徼幸萬一則受敵在先非百司安枕之地故以幸浙西為是或謂士卒之氣恃朝廷進退為强弱進尺則有賈勇之望退寸則有解體之憂故以幸浙西為非臣皆以為不然也古人之言曰人君門庭逺於千里堂下逺於萬里必待近而後理則其逺已如此身臨戎馬者便足以為治乎又曰不出户而知天下坐於室而見四海必謂逺者難治則易亦如此決勝千里者亦豈不然哉鄰有堅敵士未解鞍或進或退觀時應變此未足以定是非而恐是非在其後也使朝廷謀慮足以料敵賞罰足以使人雖走一函之書可以驅三軍於水火孰謂捨建康而不可以制勝人亦不得而非之矣使防閑失計外侮可入則一馬朝渡暮即東南何臨安之可保吾亦安能獨是哉為今之計要當保其所謂是無使為人所非也乘輿還臨安矣侍衞亦臨安矣百司庶府皆臨安矣朝廷以為安且治邪其以為未然邪陛下與二三大臣宻勿之意以為未治未安夙夜圖畫如是守淮如是守江何地置兵何人應敵上下同心不置中原於度外如是則豈害中興之功陛下與二三大臣以為巳治己安兵自此可以漸息民自此可以少休敵人不復來東南不復擾我在堂奥藩籬已自可託如是則臣恐不能無後日之悔二者朝廷當自知所擇矣陛下豈不見鑾輅所臨州里老人攜子抱孫駢肩趼足如見父母其鞠育保全之道陛下宜有以勉之董仲舒曰髙明光大不在於他在乎加之意而已臣不勝區區之心剛中又上奏曰臣竊見比者敵使造朝人情疑慮咸謂國家數年蟠屈待時之氣一旦又訹甘言而自解於是感激不平者咸以所見抗論于上夫論事者言不切至則事不可回論事而欲其必回則其言常多偏偏勝之論聽者難之而人主或至於厭聞矣然可否相濟社稷之福雷同之論古今之患故聖人之建功立事寧使衆智畢陳可否相反而不欲上下䛕恱雷同而相比寧使發揚宣布戇愚而面折不敢使其緘黙隠避顧望而腹非惟吾守中平至當之道裁應事機故雖衆多之論時有偏勝過直者亦一切虛心容納之所以下有盡言之忠上有兼收之美而事亦無適而不得其當也敵人之恨臣子緘於骨髓然國家士馬之氣力財用之源流智者當自黙識而心計之機雖不可不投患亦不得不慮敵乃肯開我以好言示我以善意我亦何辭而峻絶之乎絶之誠易也後日之策計將安出謂有揚旌電掃問罪破竹之勢則平時自可用之何待絶使者而後可以有為乎故專意不與敵和者臣知其言必偏勝而難聽雖然犬方齧人豈有無因而自己虎方得肉必不無故而捨之勍敵狃忲種種如意今一旦欲還我已捐之地歸我已棄之民是未可信也而又妖祥變恠詭詐反覆之士無世無之亦不可不察故專意不欲議和者其言雖偏勝過直臣謂陛下正當虛心容納而守以中平至當之道也中平之道法當何如亦曰應之而已好言善意我姑領之秣馬按兵靜觀其變所以守江所以守淮者論之宜加詳所以取中原所以圖恢復者念之宜益深使天意悔禍吾則與億萬生靈同享其福敵情叵測吾則與三軍將士常自有備矧又時移事異勢已不同當不至如前日斂手入其計中也道理明甚而人情不免於疑者正以未知朝廷信與未信為如何爾朝廷以敵為必信而善鄰之望在於朝夕則論者之言恐或可采不以為信而姑曰從之則以弱應强在理為順以誠待詐於我無捐論者雖過陛下自可優容之古人有言聽者事之候也計者存亡之機也陛下跨馬横槊以有天下敵人情偽何待馬援言之然後在於目中聽言定計當亦審矣踈逺之臣懐區區不自已之意上瀆天威惟陛下幸赦其愚剛中又上奏曰臣今月十九日准樞宻院劄子備奉聖㫖節文以梓宫未還母后在逺陵寢宫闕兄弟宗族之故欲屈己就和令在廷侍從臺諫之臣詳思所宜條奏來上臣伏讀流涕仰見陛下孝友格天敵人改意事雖可喜可疑至於屈己之言則臣子所不忍聞也且國家南渡以來間關險阻寒心銷志僅能自立謂今日可與敵爭者非癡則愚又況敵遣使曰休兵我何辭曰用兵敵曰通和我何辭曰立敵敵曰奉梓宫母后還我何辭曰不欲聽其甘言領其善意少降辭氣以就和議勢有不可已者然陛下詔羣臣以屈己則臣所未詳夫屈己之事非一端也前世固有奉子女者有供金繒者有割土地者有北面而臣稱者皆上為宗社下為生靈不得已而為之今國家之於金人土地為其所據金繒子女為其所取崇髙之號亦嘗自貶而臣稱之屈己至矣不知此外又將何如其屈也父子之間所本者孝君臣之間所本者忠陛下欲為親屈此孝也安能使天下皆忘陛下而廢忠乎上而士大夫下而國人衆而三軍士卒方同心而上戴有如敵使狂悖過一縣則欲使縣令拜過一郡則欲使郡守拜至中都又妄有所欲則是傳一函紙自北撫定而南非通和也人皆肯從乎國人之情士大夫之情也陛下詢士大夫則見國人之情矣至於三軍士卒之情亦即此而可卜陛下儻未以為信試呼一二大將問之彼不至為酈瓊必不率三軍而屈膝也士大夫之情不得順小則去大則其身死而已矣三軍之情不得順則事有不待臣言者夫强敵之奉命至境而吾軍民順從者半不從者半使者眙愕相顧觸藩而返則結讎造怨益不淺淺曷若卑辭報使者曰江南雖小要自各有君臨以小事大稱臣可也獨難行之禮無以塞大國之責弗辱顧憐則是吾之誠意不足以感動大國而上天終未至於悔禍末如之何也已然後督勵將士謹備不虞江外塵起則上下協心再修甲寅之役臣恐敵人便未能越長江如坦途也雖然臣有一焉陛下欲謝使者必先呼集大將更令各與近上統制官數人同定此議陛下仍開心諉之曰金人邀我以難行之禮汝軰其許之乎謂可許則後日敵再封一函紙又甚於此計將安出謂不可即有邊陲之警孰為吾當之彼如慷慨垂泣各願效死則長江之氣已增十倍謝使者何憚臣不敢逺引前代鋪叙為可觀之文直以存亡禍福之機係於今日者為陛下言其梗槩愚陋不足以奉承明詔臣罪當萬死惟陛下幸赦之剛中又上奏曰臣竊聞敵使就館朝廷差官同王倫等計議衆論皆謂朝廷審處適中必無過舉和議之事次第可成此至幸也然衆皆知和議之可成而不知垂成之事亦復可敗要須有道以濟之何則敵所求出於平易其事必成敵所求出於甚難其事必敗事之成也謀畫可以繼進事之敗也智者無以善其後此幾微禍福之原不可差以毫釐者陛下應之可不審乎有如敵求我以甚難則和議之敗蓋有兩端其一激怒於敵人也二則激怒於國中也有一于此非但和議之不成蓋亦産禍之甚速臣請試言其畧朝廷若曰敵不可從必峻辭而拒之敵必曰稱臣者汝也請和者汝也致我使徃來者汝也今遽云爾是我不紿汝而汝復無信也其激怒將如何和議當自是敗矣朝廷若曰敵不可違悉俛首聽之國中必曰是無中夏也是棄君尊也是忘宗廟也雖有防川之力恐不能防人之口其激怒又如何和議亦敗矣為今日計者必當以適中之論調䕶其間其從之也不使激怒於國中其有可辭也不使激怒於敵人周旋曲折以就其事如是則和議可成矣雖然適中之舉要在勿速有如未就益擇善議論之士熟為使者開陳道理使其心解意恱共擇兩平之道守而行之仍曉然令内外通知勿使下有憂疑之意如是則事無不濟漢韓安國有言謀事必就祖發政占古語側聞咸平二年章聖皇帝謂曹彬曰北鄙終成和好此事須朕屈節為天下蒼生然又須執綱紀存大體即為久逺之利陛下欲謀事就祖其法章聖之意而已矣郅支求侍子漢議遣谷吉送至庭貢禹持不可曰春秋之義許夷狄者不一而足先儒謂節制之不求稱其欲也陛下欲占古語其合春秋之義而已矣陛下孝友之心感天地而動金石微臣區區之意惟恐朝廷行之失當有害成議其數以和議為言者乃所以欲和議之成也陛下恕其愚否剛中又上奏曰臣竊見講和之事初則士大夫以為憂中則民庶以為憂今則將帥以為憂士大夫見朝廷審處適中未有失策方朝夕為陛下同心謀慮共圖善後之計初以為憂而今少定民庶則視士大夫為舒卷者也見士大夫之情稍安於前故其憂亦緩而未迫聞之道路獨將帥之憂洶洶如風濤爾朝廷但知今日某人入館議事明日某人入内奏禀而不知士卒竊竊之言日益憤激此其為患不可不慮也蓋陛下間關之初收拾西北流離之士拔為將帥分置軍旅相倚為安危者踰十年矣曰敵騎人邊詔使守禦者諸將也曰盜賊據險詔使招捕者諸將也諸將顧雖未能以大功名自見然其所以事陛下者甚久且勤今陛下一旦欲成和議敵使在館曾未與諸將道其曲折寧不使其疑且憂歟安知其不深思自念曰我軰平時不能相與展力今乃使君父至於屈已降氣則懐厚恩而感激者必至於自慙又安知其不相與語曰和議既成我軰自是當漸無用而朝廷自是漸至於相忘則防後患而危疑者必至於自恐使諸將慙且恐其終不為朝廷憂者無是理也臣愚謂此後勢當選擇大臣别作措畫以繫諸將之心目今且當分遣官吏宻宣詔㫖以慰諸將之意繫諸將之心則和議成與不成皆不相妨但少俟金使北去之後議之未晚臣未敢進其說也至於慰諸將之意則勢有不可緩者陛下誠即日遣人分詣諸屯喻以至意使知朝廷施設皆無過當事成則與汝等彊兵積粟漸為進守之計不成則與汝等鞠旅陳師圖為後日之舉雖成否未知真偽相半然皆不捨汝以圖功也如是則將帥安而羣論息人情通而和議固矣傳曰髙鳥盡良弓藏今日豈陛下藏弓時乎愚瞽之計願陛下即施行之勿以為疑也剛中又上奏曰臣累具奏禀講和事惟在審處中道務令可行陛下亦頗采納其說謂北使今已在館足可商議臣不勝幸甚今者如聞敵書緘藏未肯分付意欲陛下實行臣事之禮拜而奉之臣實駭懼且今日之事或從或違各有大害惟於從違之間求得中道乃可施行然而不可急也臣冐死畢其說惟陛下留神省察臣聞齊楚交善之國也秦欲伐楚先使張儀紿楚約獻商於之地六百里使之絶齊楚王大說羣臣畢賀獨陳軫不賀楚王曰不煩一兵不傷一人而得地六百里子獨不賀何也軫對曰臣見商於之地不可得而患必至也且先出地後絶齊秦計必弗為也先絶齊後責地必受欺於張儀矣楚王不聽使勇士詈齊王絶之使將軍受地於秦張儀指謂楚使曰從某至某可六里楚之君臣始大悔今日講和之事臣竊謂𩔖此而又有甚焉者夫不因謀慮不勞師旅而敵欲復故地還梓宫歸母兄反宗族是其所以許我者何止商於六百里耶秦欲使楚絶齊敵欲使我受詔使楚絶齊不過孤其旁援而已使我受詔是欲伐吾之本根也墮其計而孤旁援為禍猶淺墮其計而伐本根禍無乃深乎此不可不察也雖然用陳軫之計則必使秦先出地後絶齊然而秦不肯也今使敵先復故地還梓宫歸母兄反宗族而後奉詔則敵亦不肯矣軫恐後責地受張儀之欺則我豈不憂後求五事為敵所紿乎道理分明如此則講和之事自當絶之然而上之百執下之國人皆紆囬曲折共為陛下圖善後之䇿而不欲絶之者古語有云利則行之害則舎之疑則少甞之今日之事正可以為疑也陛下孝友之性動天地而感金石釃酒奉觴日欲上長樂之夀故臣子亦不敢專言其害止欲陛下以為疑而少甞之爾何則敵見吾今日朝廷氣力稍强號令漸一以地勢言之則又據長江而擁襄漢彼與其渉逺勞師而容有後害曷若設謀用計而制其十全此其智慮不淺然萬有一焉者彼或同室相攻族𩔖内潰欲有中原而患力之不足欲平故怨而念恩之無從則革意回心事有不可知者此正疑則少甞之之時也少甞之之道當如何亦曰推我誠心領其善意汝封一函紙來吾謹待爾使欽聽爾言可從則致禮以答之不則修辭以謝之執紀綱存大體如是乃可今敵使就館踰數日必欲屈陛下為自古帝王所不行之禮此豈謂之講和哉是其心非但欲使楚罵齊而自絶也然亦猶癡賈操竒貨於市知人欲之則予價愈多而愈不肯售願陛下少回天意更賜從容命大臣於從違兩者之間求一可行之道與北使再三商量庶幾協濟講和之議陛下不可專見可從之利而忘其害事茍失䇿非但楚受六百里之欺為天下後世笑而已幾微之禍有不可測者仰惟哀憐臣子之心而俯聽之臣不勝懇祈之切剛中又上奏曰臣昨日與臺諫連書入奏乞令王倫等盡力取敵書納入方為今日兩全之䇿如聞聖意允許不勝幸甚然臣有一言更須控陳惟陛下哀憐聽之所謂取敵書者但欲為敵使作道地爾恐書至而我不屈則敵或以為未滿故欲取而納入今日納入明日見使者或書與使偕入置使者幕中大臣授書入之陛下徐出見使者如是則不屈非彼所知也是謂兩全之䇿至於陛下聖躬則雖書入而不可屈也聖人有言莫見乎隠莫顯乎微隠微之中天下所同見陛下勿謂禁宻之中可以潛行天日之表可以暗屈一人知之什百人言之四方萬里皆傳矣或謂臣曰陛下為親屈傳之天下何害臣應之曰親歸地得播告中外布禮以謝大國之惠天下不敢議正恐親未必歸地未必得徒取天下後世笑爾又或謂臣曰彼諾而我信之有如負約則曲為在彼於我無愧是又不然墮其計則解體䘮氣精銳銷愞何所不有又或謂臣曰敵非前日比謀亦何用蒼蒼悔禍事寧可知臣又應之曰用謀者敵人之常情革意者古今之萬一立國之道以守常為正而不可以僥倖為心大抵破人之國奪人土地者未嘗不慮其再興也若曰今不滅越後必悔之則吳君臣所以慮越者如何曰汝忘㑹稽之耻耶則越君臣所以念吳者如何非特是也秦甞破荆矣後與荆人和荆乃起為秦敵又破魏矣後與魏人和魏乃起為秦敵故秦之謀臣痛誚其主謂其不早成王業者良由不絶滅荆魏而使其得以收亡國聚散民而再立宗社也然則堅敵之待殘國其心忍矣故傳載其語曰削株掘根無與禍鄰禍乃不存由是觀之敵人之情眞可畏哉若乃陛下孝友格天祖宗德澤在人强敵改心事隨世變於理不謂之無獨不可全信之爾一書逺來未見端的天子屈帝尊而受之無乃信之全乎陛下為親而意切天下念而心危矣臣又得之王倫謂敵後日有南北羈縻之請此尤不可之大者一言許之後不可爽今日奉詔之事乃是議和之初未嘗逺慮但作悠悠之語不思事至之時遂至無畫今若又以此事許其後日則今雖平和後復難處惟陛下稍回聖心思慮後日祖宗基業不全矣民力窮矣人心危矣更令失計悔將如何伏望憫臣戇愚察臣踈淺但見人情物論有不允當故盡取以告陛下使陛下初不過聽置臣言責之地則臣豈敢越職犯分累冒天威哉臣不勝懇祈之切剛中又上奏曰臣聞自下劘上非全身之謀再三而瀆非得已之計竭陳愚悃仰冒帝尊臣比縁使事條陳利害數千百言大要欲得和議不敗天予不屈而已昨與臺諫乞令專委王倫取敵書納入陛下念祖宗存大體之訓畏古人犯衆怒之言俯從其計事已獲濟不勝幸甚然臣尚有私憂者敢因事濟之初妄獻預謀之䇿南北羈縻之請臣所憂也果有是耶其不然耶今復不正其始則他時從違無䇿利害益深矣臣料陛下旦夕必再見使者與之計議大抵敵有所欲寧難之於初不可悔之於後難於初彼自見理而止悔於後彼固得以歸曲也如聞朝廷亦嘗扣問驛客所有羈縻之人欲於何時交付臣謂審之是也問其時則非矣要當為敵言如某等人可還如某等人不可得開言創意宜懐逺圖勿謂事未至而謾云也且如今來許我者事事皆得籍兵之敵而可遣乎臣請備論之通和之後其割以還我者必止是空地無府庫也無桑棗也無蓄聚也無大姓豪民也梗莽丘壟之間所留者老病孤弱豈復有强壯可戰闘之人郡縣既開東南虛匱籍兵之敵平時倚以為用者又一旦舉而還之則衆心解散不待立六國後而人各指其故鄉矣可不念哉和議既成萬端偕起凡有措畫便當為經久之計不可僥倖而茍就也說者謂數年卑屈祈哀自請迨敵國專使來臨許以通好豈容輕失其意他時敵遣萬騎臨江人情駭懼吾内顧財用自知不足外督將士或恐難用則事亦可虞此陛下之所慮也紀綱散矣士馬空矣衣食竭矣得宗族而復不能保得土地而復不能定大河之南藩籬蕩然如失元氣之人忽忽待盡此臣子之慮也陛下之所慮能作而起之豈不在我臣子之所慮茍至其時則無䇿矣審量輕重顧久圖逺惟聖心加察焉臣聞爵禄者厲世之具也陛下操爵禄而欲有為何所不可然羣言交入衆智紛然好謀能聽此前史所以獨稱於漢祖蓋事方危疑國論未定必有揣摩傅㑹之士投隙而進其心雖上欲獵取陛下之爵禄而不知禍毒可流於天下惟陛下禁其萌焉臺諫天子以為耳目臣雖愚陋不足以當陛下視聽之責斷不敢導君父以姦聲惡色也感激言狂至於流涕冒瀆天威罪在不赦剛中又上奏曰臣伏見敵人敗約中外不以為憂而為喜敵逆天太甚養禍彌深變已和之議而神必誅驅久戰之兵而人極怨措身危絶之地行師盛夏之中茲故可以無憂陛下以孝悌之至雖從其請初未嘗為屈己太過之事也根本不移藩籬如故比前日實無所損而敵人受其田茲故可以為喜夫舉大事者在酌民情中外之情如是勝負之形形矣然區區之愚憂喜猶交戰也陛下精兵勁甲需險有年今欲震發沈潛布昭聖武則檄書一行萬物吐氣其誰敢敵臣固安得不為喜然用兵者如槃水在檠臨敵者如養虎遺患惟持重可以鎮物惟果斷可以成功旋踵之間禍福相倚臣亦安得不為憂又念敵人多計善為妖祥稍覺失利便能以甘言相怵正恐他時將帥鼓行士卒用命兇孽遊魂之日或我師顔行不備小有萬一之虞彼未必不再遣一介持消釋釁憾之語復相紿弄于斯時也陛下持以斷然之志否乎臣又安得不以為憂持之不堅行之不果既已為强又欲為弱遲疑兩端之間吾進無所鼓退失所據皆志士寒心之日也臣又安得不以為憂臣嘗精思深念以為今日之事雖感動士心同力赴敵猶是中䇿而陛下持以斷然之志終始不變者上䇿之上也茍士氣不衰國論堅決鼓而進之敵人震壊則破竹之勢次第可圖知難而退以戰為守則長江之險方可為固不然則後日持之不堅與今日畏縮退避其患一也新疆之民方如赤子之得父母父母今又棄而逺之計其宛轉塗炭延頸拯救者日夜號呼以幾願陛下以臣堅果不變之說詔之大臣天下幸甚剛中又上奏曰臣聞中國之治有盛衰敵國之勢有彊弱執權應變因時制宜此聖人撫中國御天下之道也伏自夏五月封疆之臣以敗盟之警聞陛下惻然慨傷知曲直之有在爰戒師律奉揚天威克獲之書以日來上制宜應變之道誠得之矣夫以敵人輕視中國無謀妄動宜其一跌塗地盡斃其衆而不返然猶能收拾餘衆欺有大河之民者無他蓋去年修還地之好今年報敗盟之警長驅之馬觸盛夏而甘暍死顧吾猝遽之間謀既不得素定諸將之戰力亦未能齊一此宜渠酋之誅尚以頃刻淹也雖然今茲中冬嵗之杪日無幾朝廷所以為來年計者盍亦蚤正而先定乎中國之盛衰比前日自可見敵人之彊弱比前日自可料願陛下乗萬寶亨昌之始即乾剛運動之初開廓規模沈潛機算與二三大臣預為來歲待敵之畫動靜戰守皆使謀素定而力齊一則中興之功成於此矣謀之素定在朝廷力之齊一在將帥但朝廷之謀素定則將帥之力自然齊一側聞太祖皇帝兵不過十萬而平定四海指麾如意者用素定齊一之道也臣不勝區區願望之切歴代名臣奏議卷八十九
