body:
  text: 厯代名臣奏議卷三百十六明楊士竒等撰營繕宋仁宗景祐三年左司諫韓琦乞罷寳相禪院創建殿宇奏曰臣竊聞右街寳相禪院見今移拆法堂創盖大悲殿宇特命中官監領其事所役兵匠數千百人假以舟車資其輦運凡百用度悉從官給規模之盛功作甚崇臣計其興建之因恐非陛下之意也臣伏覩近者興國寺䨇閣災延及大殿長廊俱爲煨燼其寺舊安祖殿俯逼都市衆人方慮再有修葺而陛下亟降㫖命悉令停寢任其縁化使自營造斯所以重天戒而愛民力也稽諸載籍事實難行戴履之倫孰不欣幸何乃遽傷治體有損邦用起無名之役爲不急之務議者所謂恐非陛下之意斯亦明矣又向者陛下崇務本之仁念維城之重即昭應之遺址建睦親之大第諸邸之聚三千餘間常度不充侵用南郊材植又且萬計復令出産州郡供補其闕物役之大從可知矣今者業已成功焯爲熈事何則厚宗枝而隆孝治豈無益之所爲乎當時言事者猶比上封章願寢斯議盖亦重改作而節浮費也臣以謂此役既終即凡土木不急之事一切宜停以緩財力夫崇采椽三等之制者唐堯之仁化也惜露臺百金之産者漢文之儉德也煥在方牘所宜規範伏望陛下俯從愚說逺紹前徽悟色相之非求本慈仁之足尚躋民夀域永底太平斯乃奉順祖宗愛養元元之本也其寳相院剏盖殿宇等臣欲乞詔下有司令悉停罷俾其營求施利得自􅁱崇盖此殿若成則法堂未立加之廊宇制度悉求相稱必於間隙漸次申陳事既垂成理須從許如此則功費之廣倍於初矣利其成而規賞典者其徒亦繁矣且罷興國而營寳相則是休彼役而勞此功廢置雖殊耗蠧豈異臣又慮違陛下重天戒愛民力之本意故昧死陳述冀禆萬一慶厯元年監察御史裏行孫沔乞罷脩萬春閣奏曰臣竊聞内中建起萬春閣破用至多役工不少方當仲春萬物發生昆蟲起蟄按大禮月令固非興土木之時也況陜西宿兵三十萬經冬已來抱戈被甲衝風冒雪受艱苦而争性命數矣涉嵗無一次特支以慰其懃瘁之節盖國家財賦闕乏未能豐富於士卒今礱石鏤木塗朱帖翠非錢十萬不能成一閣而爲優閒不急之務此諒非陛下之意必恐諂邪冀於僥倖立木上梁則獲賞賜畢工落成又遷官秩始謀之人得其利而使聖明受不恤四方之謗此義士所不忍聞也臣請罷營此閣且葺其舊制則可弭庶議而省虛費伏望陛下崇勤儉之風戒宴逰之樂莭嗜慾之情養元和之氣保攝天機果㫁政事則天下幸甚皇祐元年殿中侍御史何郯上奏曰臣伏聞朝廷近有指揮以寳相寺昨遭焚蕩許令寺僧縁化脩葺盖朝廷重靡府庫之財又不欲遂廢其寺故有此處分以臣愚心思之其間尚有利害不可不具論列訪聞寺僧主事者素來豪猾頗善結託今既開端許其縁化彼將假朝廷之命以脅誘民庶多求財貨則京師騷然侵蠧盖其意不唯以脩寺爲事將圖財用爲奉身恣縱之資或民力不足則將因縁權倖復求朝廷出府庫之財以畢其事此必然之理也假使民力可辦於國家雖無所費亦不可許何者方今公私財力大屈凡起一事興一役未嘗不取於民外方之民已困數斂唯京師之民幸而未加横賦緩急有事亦將不免固不可使之輕廢家貲以奉土木不急之務朝廷頃年脩寺舍佛閣已費累巨萬一旦遂爲煨燼況外議傳云寺僧常以婦人置於佛閣昨火發之際焚死者數人若傳者果信是朝廷廣費財以崇奉佛事適足爲羣僧淫戲之所近日主首坐遺火罪止於奪師名紫衣寛假已甚不可更啟其姦弊重耗民財臣按春秋或書災或書火其名雖殊然於變異之兆其實同歸定哀之間兩觀桓僖宫災漢儒皆謂天燔其所不當立今寺舍之災豈非以彫靡之過不當立而立天命燔之亦如兩觀等災以示勸戒若又重議脩之非所以畏上天之譴告伏望陛下追觀前事之監深究異祥之來無興功以答天戒其寺舍佛閣欲乞一切罷脩用示聖懐抑畏之美臣以朴愚誤䝉擢進茍有聞見不敢不陳惟聖明不以狂妄廢其言則死生幸甚至和二年翰林學士歐陽脩上奏曰臣近者爲京師土木興作處多乞行減罷尋准勅差臣與三司同共相度減定續具奏聞次今又聞聖㫖下三司重脩慶基殿及奉先寺屋宇臣伏見近年政令乖錯綱紀隳頽上下因循未能整緝唯務崇脩祠廟廣興土木百役興作無一暫息方今民力困貧國用窘急小人不識大計不思愛君但欲廣耗國財務爲己利恣侵欺於官物圖酬奬之功勞託名祖宗張大事體況諸處神御殿當盖造之初務極崇奉棟宇堅固莫不精嚴雖數百年必未損動近年已來不住脩換昨開先殿只因一柱損遂換一十三柱前後差官檢計朝廷並不取信只憑最後之言遂至廣張工料盖縁廣張得工料即多圖酬奬恩澤切以崇奉祖宗禮貴清浄今乃頻有遷徙輕瀆威靈要其所歸止爲小人圖利臣見自古人君好興土木者自春秋史記厯代以來並皆書爲過失以示萬世今小人圖一旦之利黷祖宗之威靈致人主於有過之地誰忍爲之臣實痛惜臣因准勅減定於三司畧見大槩開先殿初因脩柱損今所用材植物料共一萬七千五百有零睦親宅神御殿所用物料又八十四萬七千又有醴泉福勝等處工料不可悉數此外軍營庫務合行脩造者又有百餘處使厚地不生他物唯産木材亦不能供此廣費自古王者尊祖宗事神祗各有典禮不必廣興土木然後爲能臣切見累年火災自玉清昭應洞真上清鴻慶夀寧祥源㑹靈七宫開寳興國兩寺塔殿並皆焚燒蕩盡足見天意厭土木之華侈爲陛下惜國力民財譴戒丁寧前後非一陛下與其廣興土木以事神不若畏懼天戒而修省其已興作者既不可及則未修者宜速寢停況睦親神御殿於禮不宜作其事甚明别無禮典講求乞更不下太常便行寢罷其慶基殿如的有損漏只令三司差官整補不得理爲勞績其奉先寺乞令寺家自修今垂拱殿是陛下常坐之殿近聞爲無梁木且止未修諸皇親自火燒居宅後至今寄寓它居盖爲將良材美木俯徇小人並於不急處枉費遂致合行修造處却致乏材伏望陛下追思累次大火常發於土木最盛處凡國家極力興修者火必盡焚且天厭土木而焚之又欲興崇土木以奉之以此福應未臻而災譴屢降也伏乞上思天戒下察人言人言雖狂而實忠天戒甚明而不逺伏惟陛下聖德恭儉不樂逰畋凡所興修皆非嗜好但以難違小人一時之請自取青史萬世之譏實爲陛下惜之伏望聖慈廣賜裁擇修知開封府判太常禮院上奏曰臣所領太常禮院得御藥公文稱奉聖㫖送畫到景靈宫廣孝殿後修盖郭皇后影殿圖子一本詳定者其圖子已别具狀繳奏訖臣伏見近年京師土木之功縻耗國用其弊特深原其本因只爲差内臣監修利於偷竊官物及訖功之後僥求恩賞以故多起事端務廣興作其甚則託以祖宗神御張皇事勢近年以來如此興造畧無虛嵗伏以景靈宫建自先朝以尊奉聖祖陛下又建真宗皇帝章懿太后神御殿於其間天下之人皆知陛下奉先廣孝之意然則此宫乃陛下奉親之所今乃欲以後宫已廢未復之后建殿與先帝太后並列有瀆神靈莫此之甚臣竊謂事必不出於聖意皆小人私於興作有所僥求爾盖自前世帝王於宗廟之外别爲廟享以追奉祖宗者則有之未聞有自追奉其妃后者盖小人不識事體但茍一時之利不思損虧聖德伏乞特賜寢罷以全典禮侍御史趙抃上言曰臣竊以邦財匱乏民力疲敝土木工役嵗無虛用伏見京師寺宇宫觀營造連年始云購募民間終亦取辦官府其監修官吏唯務增廣間架窮極奢侈貪功冒賞以爲己利今醴泉觀將已畢工更添創獻殿一座又慈孝殿鴟吻損動復議自新起盖至於洪福寺屋宇興國寺經藏開寳寺佛塔等處紛紛營建競相夸尚只如昨者開先殿止換二柱尚已費官錢十萬餘貫今來諸寺觀營建衆多如此侵耗帑藏不知紀極且國家財用縻費如邊隅多事河流未平官冗兵衆是皆仰給縣官一出于民力而不得已者也其不急之務無益之役復不能制之則傷財害民朝廷有不莭之嗟矣臣愚伏望聖㫖指揮應在京寺院宫觀見役土木一切早賜裁減停罷内慈孝寺殿損動去處只乞量與修補無使貪功冒賞之計得行致國家浮費日廣而用不易也嘉祐三年知制誥范鎮乞罷修并州神御殿奏曰臣竊見并州素嘗無火災自建神御殿未幾而輙火災天意若告陛下祖宗御容非郡國所宜奉安者近日又聞下并州復加崇建是徒事土木以重困民力非所以答天意也自太宗皇帝下并州距今七十七年故城父老不入新城陛下宜寛其賦輸緩其徭役以除其患使河東之民不㤀太宗皇帝之德則陛下孝思豈特建一神御殿之比哉伏惟上觀天意下顧人心特賜停罷臣不勝區區之愚四年知制誥劉敞論睦親宅不當建神御殿奏曰臣伏見古之正禮諸侯不祖天子公廟不可設於私家所以明正統尊一人也今睦親宅興建神御殿不合王制不應經義竊聞聖慈以天寒人勞權罷役徒臣謂若於禮當作則不可以人勞之故而止何則祖宗至尊也役徒至賤也恤至賤之衆而輟至尊之廟非所以爲名也若禮本不當作則不如遂止之耳何必權罷哉伏乞令禮官詳議其事使下不爽於名上不愆於禮仁宗時殿中侍御史文彦博上奏曰臣聞狂夫之言聖人擇焉臣遭逄聖神敢獻狂瞽伏惟天地之大德特貸鈇鉞之嚴誅則微臣幸甚臣伏覩今月十四日詔書太平興國寺僧紹宗縁化修盖外所有太祖神御殿令三司差係官工匠重修又云庶重修於宏麗獲時薦於芬馨有以見陛下奉先思孝之道髙出百王復又盡給國財不煩民力此乃陛下敦崇儉德勤恤民隠之意也天下幸甚臣竊以載營寳殿嚴奉聖容仰佇靈㳺是爲别廟臣聞清廟之制理在去華茅屋采椽本貴乎克儉丹楹刻桷乃譏其崇侈漢書藝文志曰墨家者流出於清廟之官是以尚儉由此觀之則清廟之尚儉明矣臣伏恐監工之官未詳詔㫖惟務宏麗不稽典故乖清廟尚儉之文累烈祖恭德之羙臣伏望申勅有司凡所營修循以典制經始勿亟必順天時臣按月令云孟春無聚大衆孟夏無起事工又曰孟冬可以造宫室皆不欲妨農事而違天時也臣竊計今之力役固應不減千夫雖用官工不妨民事然而聚大衆起大功作事不時恐乖令典伏望預計徒傭漸儲財用俟良月而興作亦不日而考成神之格思宜錫純嘏臣又風聞羣僧籍籍道路云云皆謂既建太祖神御殿庭則本寺佛殿鐘樓即應次第官修事之然否雖未審知臣忝陛下風憲之任爲陛下耳目之官茍有所聞理當先事言之庶㡬上達宸聽盖欲杜其萌漸臣伏覩景祐三年八月十三日所降聖㫖云太平興國寺佛殿鐘樓并戒壇院舍宇等官中更不修盖令開封府及僧録司告示僧俗諸色人並許縁化錢取便興修明命既行逺邇胥恱皆以謂陛下省不急無益之務軫愛民莭用之心自後已有僧紹宗化錢興修漸成輪奐臣伏慮羣僧黨扇希望官中兼修佛殿鐘樓不復化縁營造伏乞申舉景祐三年先降聖㫖其興國寺佛殿鐘樓任令僧俗縁化興修所冀絶其希望之心固其縁化之志況佛寺者非急之務何須速成國帑者有限之財不可虛費景祐中昊賊未萌逆節朝廷未議兵事尚且愛惜用度不修佛舍今則戍重兵於西鄙一日之費何啻千金茍旬時之間昊賊之首未即梟於藁街臣恐事邊之費未免重困於民臣愚以謂宜莭營寺之浮費以濟備邊之急用邊備既實則大敵何憂乎不殱芻蕘之言願賜詳擇時有詔罷修寺觀而章惠太后以舊宅爲道觀諫官御史言之帝曰此太后奩中物也諫官御史欲邀名邪參知政事宋綬進曰彼豈知太后所爲哉第見興土木違近詔即論奏之且事有疑似彼猶指爲過或陛下有大闕失近臣雖不言然傳聞四方爲聖政之累何可忽也太祖嘗謂唐太宗爲諫官所詆不以爲愧何若動無過舉使無得而言哉英宗治平元年知諫院司馬光上奏曰臣伏聞感慈塔已有聖㫖坼修五層竊以開封府界京東京西河北河東陜西西川等路自去冬少雪今春少雨麥田已無所收昨得五月十二日雨方種秋田自後又經一月無雨萌芽始生隨復焦槁農民嗷嗷大率無食棄去鄉里流離道路雇妻賣子以接糇糧縣官倉廪素無蓄積贍給軍衆猶恐不足固無贏餘可以賑貸陛下當此之際所宜側身刻意降服捐膳以救其患而更修此佛塔以費國財臣竊以爲失緩急先後之務矣且此塔傾攲爲日已久借使更經數年不修於僧徒有何大害若百姓飢窮朝不及夕而國家不能收恤則老弱轉死溝壑壯者聚爲盗賊當是之時雖有千塔將安用之夫府庫之財皆生民膏血茍非事不得已安可輕費今有司既諂䛕茍且曾不爲陛下愛惜陛下又不以介意一皆聽之使四海蒼生將何所依仰臣愚欲望陛下親發德音宣諭有司以今嵗旱災且罷修此塔及其餘不急之費有似此𩔖者皆仰有司條奏以聞一切寢罷候他年豐稔帑藏有餘然後徐議其事於聖政之初亦足以彰愛民之意爲盛美之一事也光又上論修造劄子曰臣伏見近日以來修造稍多只大内中自及九百餘間以至皇城諸門并四邊行廊及南薰門之𩔖皆非朝夕之所急無不重修者役人極衆費財不少此盖陛下纉極之初禁廷之中誠有破漏不可居者陛下畧命整葺理亦宜然而左右之臣便謂陛下好興土木之功遂廣有經度雖不至損壊之處亦毁拆重修務以壯麗互相誇勝外以希㫖求知内以營私規利萬一陛下更因此賞之則營造之端猝無窮已國財必竭民力必殫臣竊惟陛下新臨天下惠澤未孚於民而以好治宫室流聞四方非所以光益聖德也修造勞費不可勝數臣請且言諸州買木一事擾民甚多衙前皆厚有産業之人毎遇押竹木綱散失陪填無有不破家者先帝躬履節儉宫室苑囿無有增飾故諸場材木皆有羨餘屢因赦恩放免買木以寛民力自頃修造倍多諸場材木漸就減耗有司於外州科買百端營致尚恐不足而工匠用之賤如糞土昔漢文帝惜十家之産罷露臺而不作今諸場前後所積竹木何啻十家之産陛下至仁若察其所從來得不爲之愛惜乎況即今在京倉庫踈漏甚多皆以上數處興功占使匠人物料未暇修葺致粟帛之𩔖大有損敗古者將營宫室宗廟爲先廐庫爲次居室爲後今之所修緩急先後無乃未得其宜乎又皇子生而富貴年未及冠所宜示以樸素慎其所習今聞所修三位規模侈大又復過於祖宗之時皇子所居漢明帝曰我子何得比先帝子此恐非所以納之於義方也臣愚伏望陛下特降聖㫖應大内裏外舍屋即目不至大叚損壊之處及不至要切如南薫門之𩔖並罷興修其皇子位只因舊屋夾截修整早令畢工不得過爲宏壯且令那減匠人物料修倉庫之損壊者所有諸處監修之官自是本職更不與減年磨勘及轉官酬賞以塞泰侈之源使天下皆知陛下去奢從儉仁民愛物不亦美乎治平二年同知諫院兼侍御史知雜事吕誨上奏曰臣伏以先帝臨御四十餘年未嘗崇宫室侈服玩事宴㳺儉德之著天下共知臣竊見修内一司居常取索無度盖三司逐急應副物色亦無由㑹計以此因縁爲弊耗蠧滋深以事驗之後苑曾修龍船一隻費用不知紀極經今四年有餘尚未畢工先帝果爲宴逰之備豈容數嵗造一船不成事何其久非但費用直恐成一時奢侈之事貽譏後世有累先朝之全德誠可惜也臣欲乞朝廷差官㸃檢龍船修葺經今㡬年㑹計所費錢物有無欺弊所有修内司自來係中官二人管幹伏乞減省一員以武官代之仍添文官一員委自三司保舉所貴拘轄官物不致枉有費用實爲利便英宗時知諫院傅堯俞上奏曰伏見近日土功併興其間亦有不甚急者鳩聚兵力諸事極有妨闕況監督官吏不務堅久但取髙峻以夸示目前趣辦偷功用希渥賞隨畢隨壊日復增多故營修造完無有窮已夫古者用材取譬於梓匠者盖以能適其大小曲直之度而無遺木焉今則不然雖極大材木皆斵而小之以充細碎之用主掌之人都不顧惜殊不知斫山日逺巨材固不易得京師但知興作不察外方供億之民極爲勞擾且積年隳損恐未能一旦併葺臣謂宜應不急者一切權停其須至興修處亦乞次第營之仍嚴行約束如敢輙壊大木及工力不至精壯者悉痛繩之則不獨粗免枉費使民力稍寛亦庶㡬多得嵗月崇葺之役有時而減至於皇子位舍宇頗事宏麗臣竊謂天子之子所歉不在於此而潁王等執心謙儉大率減於制度盖庀役者務侈其事有所覬倖耳惟陛下裁之以昭示其德美則天下幸甚臣又聞孝嚴殿成執事者議推恩例夫神御非古固陛下所知盖於陛下有不得已者焉既以不貲之費度越祖宗又從而賞其官吏臣恐僥倖之人務極土木而國家之財益多糜耗陛下必不欲黜其勞者乞比附先帝皇堂與太廟賞典使重輕之間不相踰則不爲僭矣臣又聞禁中之屋舍修者乃至九百餘間今暴完之豈易爲力與夫隨敗隨補功殆相百此足以爲陛下之誡惟他事亦然茍有頽廢理之於其初微無使至於極而後圖之則力省而功倍伏惟陛下赦其愚而詳擇神宗即位監察御史裏行劉摯上言曰臣竊聞禁中計料修飾福寧殿彩繪制度極於藻麗惟人主之奉以文爲稱而一殿之飾亦無大費然而敦朴素者所以爲天下先卑宮室者前聖之盛德方今生靈靡敝財用耗竭居養服用僭儗無節陛下正宜躬率儉德以淳風俗示以彌文下必有甚伏況藝祖遺訓宮中止用赤白爲飾仁宗故事欄楯徹去朱縁之采陛下纂服所宜守之又聞慈夀長樂二宫殿宇華侈金碧朱丹窮人力之巧豈非誠心孝德尊事兩宫故極所以奉養之觀然踰禮過制不可以訓今外論藉藉以謂左右䛕說之人進說陛下指二宫以爲法使論者出於臆度不過臣爲􅄭言萬有一實則於聖德不爲無益臣所以先事爲言伏冀寛其狂瞽而采其誠特賜寢罷以解天下之疑熈寧四年樞宻使文彦博上言曰臣伏見修建太一宫爲民祈福臣聞太一天神之貴者天道貴質凡所營繕謂宜簡質不務雕鏤之巧不事金碧之華不重費不太勞不日成之明神安之䖍潔之誠内充天人之心交感神應之福其理必然臣又見累年以來禁中營造不已般運木石鳩集丁匠殆無虛日既有専切提舉修内司復置都大提舉内中修造司誠恐所司各以宏麗取恱上心一作未畢一作復興新舊相形不極不已國財民力豈易支供臣伏見陛下督責水官以利農畆必思夏禹卑宫室盡力乎溝洫勵精庶政勤恤民隠必思漢文罷露臺惜十家之産臣伏願陛下亟勅中外應不急營造一切權罷則國用無窘民力稍寛臣又見繼聖堂祖宗燕射之地今爲造弩樁所運斧斤置鑪鍜喧煩䙝瀆理恐非宜詩云維桑與梓必恭敬止況祖宗之舊跡乎欲乞將製造弩樁移置他所或歸之有司則重明麗正之廷加之嚴潔奉先思孝之道益以光顯臣職在樞筦主調兵匠官忝論道義當獻納區區下誠伏望采察八年彦博又上奏曰河北平壤其城池樓櫓之設尤嚴於他道凡遣使行邊所以督責於守臣按察之吏者必先焉夫豈以有事則整完無事則廢弛哉比者命安撫使以修完屬郡之城壁周相其摧壊褊狹將易而新之使士民有以容兵械有以施誠善矣茍慮事計材趣期㑹於嵗月之頃無不完者此固足以代守國之險而嚴禦戎之備也命方行而反令依倣制度造作熟材堆積盖藏於官舍之中以俟樓櫓之大壊而易之未見其利也北京樓櫓之當修者九百餘所凡八千餘間若欲槩修於數月之間雖盡鳩天下之良工亦不可卒就焉必在次第而修作之舊材之中尚有可用者亦兼取焉然猶要之一二年僅可完矣今乃以成熟之材委積於虛閑之處敵來而后立患至而后興無乃不及於事乎今若據樓櫓見在區數内有庳下不及制度并攲側朽弊者計其數且修其半仍間隔一座拆一座所貴城上不至斗然空闕年嵗之間便得周遍完備乃爲便也熈寧七年正月判軍器監曾孝寛論軍器監事不必謀及殿前馬步軍司奏曰臣伏見朝廷必以武人習用器械故謀及殿前馬步軍司然臣體問得逐司毎准朝㫖送下定奪事件只是取責軍校文狀聞奏非獨務持舊說不肯改更又其智慮未必能知作器之意故凡外人所陳非己出者必不肯言是朝廷亦未嘗考其說之當否遂從而寢荀卿以謂工精於器而不可以爲工師有人也不能此技可使治其官唯精於道者爲然今陛下置監以除戎器不屬之介胄之武夫斧斤之巧匠而使臣等領其事則豈以臣嘗能此技而使之乎殆將以其薄燭道理而可使治其官者也臣辭不獲命遂受其職茍或自度不足以畢事則亦豈敢當故其器械必盡觀中外之所藏其法度必盡考古今之所說其制作必究良匠之所編其施用必問邊臣之所試而臣之愚慮亦以爲可然後上聞而朝廷乃下此屬議之如聞前所定弓箭等習用故態亦只聚集軍校曹司共執舊說未知實否今軍器式様又從本監齎送徃逐司定奪則是使臣等營之而其是否乃取决於此屬也非獨謀及之而己臣以從官預典監事於陛下則爲論思謀畫之臣朝廷一日有四方之事若幸得使令於前當使此屬奔走以聽事今乃以其悉心并智之所爲而使之議可否於今日之間臣固不敢自愛深恐武夫健卒軰有以窺朝廷之心膂謂其智慮乃决於我也以理言之竊恐爲倒盖此屬既多出於行伍則其底裏淺深其下之所熟知而臣等雖不肖然上託陛下名器寵任之故猶宜見懾今又使有以窺之則不特於朝廷之體爲輕而又非所以崇堂陛之勢而陛下經營四方又未能舍文臣而用此屬則其名分之定豈可無素雖政事之臣不慮及此而陛下豈不自愛國體也臣等以朝廷己行之命不敢言改乞從本監奏就一司同議哲宗元祐元年右司員外郎張舜民乞罷中慜造寺奏曰臣備員宰屬無補嵗月茍有所見不敢不言祖宗日逺淺聞狹見且以嘉祐治平及熈寧之初年揆之當嘉祐治平與熈寧之初在京寺觀㡬何僧籍㡬何今相距未三十年間創造修飾寺觀外來土居之僧徒無慮數倍之多也不唯其多愈見其侈彼百間不足居也我則以千楹彼丹雘不足觀也我則以金碧前耻不若後求勝之爲朝廷則曰我一以官錢營造未嘗取民也爲僧徒則曰我唯是化縁修建不敢仰於官也究而言之則財力是何從出哉皆百姓之膏血也漢文帝以露臺爲中人十家之産罷而不爲孫樵謂十農夫之耕十蠶婦之織終嵗不能養一僧徒今一寺觀之興造又何止中人十家之産一僧徒之奉養又何止十農婦之耕織以古望今良可歎也尤不可忍者是以軍營地修造寺觀也祖宗開基有此都邑當其經始可謂勤勞罷方鎮之兵而聚之京畿其慮深矣漕輓金粟休養區處静則雄中動則制外不畏一朝之警急熈寧併廢鞠爲茂草有識視之猶或歎息今又委爲寺觀其勢未已太平日久兵愈消地愈空寺觀愈多茍有一朝之急則將驅僧道以禦之乎累朝勅令創造寺觀者徒二年造殿閣神祠者杖一百若殿閣有損壊而欲移修者申所屬驗實乃聽即不得以修造寺觀爲名求化錢物此朝廷之法禁也非不明白外方州縣以時申明無敢慢易唯京師此法不行京師法令之所出乃猶不行前之日官造一寺觀後之日私起一殿閣疇敢誰何不知此俗何時而替也今所謂中慜者既爲西塔又爲東塔東塔未起又請造寺朝廷爲之響應不知造寺何時而已乎又安知今請之寺成而更不欲造寺修塔乎在國則以爲蠧在己則以爲功於其起塔聚徒之處居處十數年之間返謂我爲客寄棲泊簷廡之下備極恓惶此尤見罔上誕謾之甚也其居其處其飲其食享御凡百指呼王公大人有及之者乎不唯不及有似之者乎是欲窮極饜奪無有休已朝廷既許以空閒官地且京城之中何處有空閒之官地以待修寺者非居民則官府非官府則軍營民居官府既不可遷彼將不滿而再請則唯有空閒軍營可以從事矣此役一興上之宫邸衣冠之家下之閭閻啇販小民又將征求割剰三五年間不得休已比年已來豐歉不常自冬徂夏雨淫爲災京之東南千里渺㳽不止夏秋不成而復田廬漂沒今已八月麥未施種關中又以旱訴至於來嵗尚未可知都市飲食儉薄小民失職衢巷之中稍有菜色遷流之民日有過者二聖焦勞軫惻分遣使臣賑恤之方未知攸濟豈可因之飢饉重以此徒蟊賊良民如水益深如火益熱其能賑濟唯在聖慈伏乞特賜指揮將八月四日指揮更不施行令中慜止居相國寺東塔或不自安即勒歸受業院舍仍乞申明勅令自此止絶修寺造塔之役不唯少阜於民財亦可仰消於天變四年左司諫劉安世上奏曰臣伏見近降指揮於京東河北差崇勝奉化兵士各五百人及招填廣固四指揮各令及八百之額立限五年修築京城又許支朝廷應千封樁錢和雇人夫二千人令作四年開掘城壕臣雖至愚慮不及逺詳觀事理甚有未安輙進瞽言以黷天聽惟陛下留神省覽臣伏覩陛下聽政之始沛發德音修城兵夫悉令散遣道路歌頌讙仰聖澤四年于此未嘗有枹鼓之警今元元之民方就休息四夷順軌外無戎事而遽興大役衆謂無名又於京東河北再發廂兵人心驚疑不可不慮況修城與開壕之工㡬八百萬計其費用固已不貲方二聖崇尚寛厚前日利源之入去其大半封樁錢物尤宜謹惜而乃竭有限之財應不急之役非計之得也兼臣訪聞近日朝市之間徃徃竊議以謂朝廷將復治茶磨以收其利雖廟堂之論不能知其有無而庶人之言何因而起臣恐傳之四方皆謂陛下前此所罷之事漸欲復講揺動人心所害不細伏望聖慈深賜詳察特罷修城之役非惟爲國家惜費便民亦可以杜塞奸人􅄭意陛下爲善不終之議惟冀獨出睿斷早賜指揮安世又上奏曰臣昨累具狀論奏修城利害至今未䝉施行日近訪聞開壕人夫其數增倍所散工直頗有掊斂雖號爲加給得力之人多是上下干繫作頭壕寨之𩔖隂有侵刻既聚大衆而不以公平處之積怨日深或致生事兼壕身大闊所出之土占壓民田壅塞道路隣近墳墓多被穿掘怨歎之聲達於衆聽臣職在耳目不敢不言竊謂國家建置治官本欲循名責實今修城開壕之工共七百餘萬日役兵夫無慮數千付之一二庸人而不領於將作名實紊亂孰甚於此如聞板築方畢旋致摧毁盖上下官吏肆爲誕謾無所統屬以糾其繆此不可以不更張也伏望聖慈檢㑹臣累奏事理特降指揮惟用廣固兵士三千二百人不計嵗月修築城壁以終其事所有開壕役夫並乞放罷止以兵工隨其地形量加濬治不必盡如元料仍專委將作監主轄所貴事有統領不至乖戾安世又上奏曰臣近累具狀乞罷雇夫開壕止以兵工隨其地形量加濬治不必盡如元料仍令將作監專切總領至今未奉指揮臣竊謂事之利害己具前奏不復委曲再煩聽覽然臣有所甚疑者特以帝王之都而髙城深池過於邊郡雉堞樓櫓之迹隠然相望若於京師而爲受敵之具其如天下何議者不能爲國家畫久安之䇿而區區增峻城隍欲恃之以爲固亦已過矣方朝廷講求國用正務裁損而舉百萬之貲棄於無用之地實爲可惜伏望聖慈深賜省察檢㑹臣累奏事理特降指揮施行安世爲右正言時上奏曰臣近以自春渉夏旱暵爲虐地震星殞巨異仍出輙奏狂瞽之論粗陳銷復之理方陛下祗畏天戒側身修行日俟明詔採用一二今既旬浹未覩施行惓惓之心不能自已再浼天聽幸垂省覽臣嘗考禮記春夏月令以謂無聚大衆無置城郭掩骼埋胔毋起土功有以見聖人奉順隂陽取法天地力役之事不奪農時行道之墐亦順生氣是以風雨時若災害不生天人和同上下交泰其或賦政違道役使過中人力疲勞養氣揺動則國有水旱之變民罹疾疫之災此繼天奉元之君所以夙夜恭敬而不敢忽也春秋莊公三十一年冬不雨五行傳以謂是嵗一年三築臺僖公二十一年夏大旱五行傳以謂作南門勞民興役災祥之應各以𩔖至著之方冊皆可稽考臣伏見京師修城開壕工費重大兵夫之衆已至數千徒庸之計幾八百萬穿掘墳墓傷掩骼之仁違逆天時犯無戎之戒人困於役國傷於財然則嘉氣之久不効未必不由於此也臣聞天子有道守在四夷今帝王之都而爲受敵之具則在外屏翰將安用之必謂州郡爲不足恃則平陸之一城恐非用武之地況國家利源之入比之前日去其大半用度漸窘止務裁節陛下躬行法度爲天下先而乃以不貲之費棄於無用之所可不惜哉或謂先朝已嘗興作欲終其事則乞罷雇人夫止以廣固之兵不計嵗月漸令完葺自餘土木不急之役伏乞特降指揮悉俾停罷所貴順承天意以致膏澤右諫議大夫范祖禹上奏曰臣伏聞開修京城濠日役三四千人雖和雇夫力調發不及民其錢不屬户部然財出於民一也豈可不計校愛惜而枉費用之臣聞開濠深一丈五尺闊二百五十一步廣於汴河三倍自古未聞有此城池也新城周世宗所築太祖因之建都于此百三十年無山川之險可恃所恃者在修德在用人在得民心此三者累聖所以遺後嗣子孫也神宗時宋用臣提舉修京城大興土功板築過當小人之情唯欲廣用民力多費國財上則徼幸爵賞次則隠盜官物故役無有不大費無有不廣此姦臣之所利本非先帝意也陛下始初聽政散遣修城役夫百姓皆歡呼鼓舞今欲終成前功但完之而已可也何必廣作無益以害有益乎又京城外門正門即爲方城偏門即爲甕城其外門皆用純鐵裹之此祖宗時所無有也甕城乃邊城之制非所以施於京師今東西南三靣偏門亦欲爲甕城臣不知大臣以何見而爲此謀也必以爲威契丹也使契丹果渝盟南向大臣將坐守此以受敵乎春秋時楚囊瓦爲令尹城郢沈尹戍曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四隣諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無内憂而又無外懼國焉用城今吳是懼而城於郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待今大臣不修德政而急於城池此囊瓦城郢之計也唐神龍中張仁愿爲朔方總管築三受降城不置壅門曲敵戰格或曰邊城無守備可乎仁愿曰兵貴攻取賤退守㓂至當併力出拒敢回望城者斬何事守備退忸其心哉後常元楷代爲總管始築壅門議者益重仁愿而輕元楷今於京城爲受矢石之備是不如張仁愿之守邊城也自修城浚池以來議者皆以爲無戎而城無㓂而溝公宫此言不可不畏其北門甕城已就改之重勞臣欲乞降指揮東西南三靣偏門止爲方城其濠廣闊可減三分之二稍正王城之體以惜民力以省國用祖禹又上奏曰臣昨上殿論修城開濠欲乞改東西南三靣偏門甕城曲門爲方城直門其濠廣闊可減三分之二稍正王城之體以惜民力以省國用今將兩月未䝉施行臣竊以京城爲甕城尤爲失體議者必謂可以威服四夷今使外國傳聞天子居於甕城不足以示威乃所以啟侮此公卿大夫之辱也而大臣以此爲守國之計臣愚竊所未諭況當國用窘乏之際計無所出而枉興土功爲此無益之費不知紀極假使作之有用不惜費而爲之可也今實無用其費豈不可惜又發掘既廣多發人塜墓害及幽明恐傷和氣此皆朝廷所當恤也伏乞檢㑹臣前奏早降指揮施行七年祖禹乞不遷開封府狀曰右臣凖尚書省批送工部狀乞遷開封府於舊南省令禮工部與將作監同勘當者臣竊以開封府自太祖皇帝開國建置於此太宗真宗皆嘗尹京潜龍故迹至今存焉昨因廨舍遺火逼近原廟遂有遷改之議若以火而遷則廟之東北皆有民居比之開封尤更不逺火何可防又舊南省已爲試院今欲以開封府爲試院豈可不嚴火禁乎若以開封敲扑之地不可近原廟則景靈宫在祖宗時已有列聖神御比之今日輕重亦均若以狹隘而遷則祖宗以來官吏所容亦足以治事且開封非貯火之所但長吏與僚屬住家於其中爾比之民居孰爲難防唯當申嚴火禁或築髙墻以爲隔限亦可以備患矣今乃欲改已成之試院爲府廢百三十餘年之府爲試院此兩大役營造不小夫土木之功使匠人度之無不言費省而易了及其作之便見費大臣恐枉勞人力虛費國用無大利害不必遷也今若因舊興葺稍徙近南比之兩處營造功費猶小凡官舍數遷改則民心亦不定不若因其故便昔魯人爲長府閔子騫曰仍舊貫如之何何必改作孔子稱之盖爲國者姑務省事不欲多變革也伏望聖慈更賜詳擇哲宗時殿中侍御史吕陶上奏曰臣伏謂古之明王講求治道以幸天下者凡不急之務必先罷去乃省事省官之一端也國家自慶厯罷兵以來武庫百備廢壊幾盡神宗皇帝以常德立武事震耀威靈治兵制器憲度詳謹内置軍器監外創都作院日程其功月閲其課戈矛弧矢甲胄刀劔之具皆極完具等數之積殆不勝計茍有靈旗之伐可足數十年之用方朝廷弭戎息戍以戢干櫜矢爲意顧惟兵械謂非今日之急務也比嘗降詔併爲兩坊坊止三作省去監督綜轄之員揀放疲癃拙惰之匠據所積材具以漸造制然至今兵匠尚以六千人爲額兩坊額外亦四五百人以一嵗計之爲口食米者凡四萬五千石又縁内外廂軍大率闕少亦有廢事去處若值工役急速未免於民間差雇人夫官有耗費私有騷擾臣愚欲乞減兵匠三分之二罷監官四員小作料次責其日力積之嵗月亦無所闕却將所減之兵分填添助諸處廂軍差使候將來修制軍器闕人仍勾抽赴作不惟省監官軍匠添給之費抑亦助廂兵役使之勞況今財利羨息之端多䝉蠲罷如此等事雖於國家富有之體未必爲害亦宜裁損均莭以稱量入爲出之義伏望聖慈付有司相度施行右諫議大夫梁燾上奏曰臣竊以都城之役工程浩瀚開廣池隍最爲大事全如受敵邉備動揺人心盡發封樁官錢蠧耗國力毁徹廬舍生者不得安掀剔墳隴死者不得息棄土山積旁無曠地稍已湮没園林寖至壅閼道路近城居民深以爲勞兼冒寒暑怨通幽明累德損政莫甚於此言者相繼指擿明白日聽蠲罷邈未䝉省敝病之時横在十目愁怨之聲逹于四海未諭朝廷何憚不革且以糾殊異之情久則難齊任困苦之事極則生變羣疑不解理有可虞今若但省工料别期嵗月未免久勞終是無益臣愚欲乞聖慈特賜指揮放散見雇人夫只留廣固軍工濠塹已開處令結束了當城壁據未堅處令漸次修築除冗費之患去􅄭作之擾使民情安恱而氣和人力舒暇則功倍輦轂之下先見安静誠今日聖政之所宜爲也伏望深留宸念髙宗建炎中御史中丞許景衡上奏曰臣聞天下之事有緩急其治之也有先後聖人常先其所急而後其所緩故事得其序而治功成矣今敵人暴横盜賊間作陛下宵衣旰食圖刷國耻節省浮費以應軍須可謂先其所急者矣至於工技之末作掖庭之所須此其事爲至緩宜在所後而有司不知大體乃欲以承平靡麗之事而修復於艱難之時若賈詡所領後苑作准備造作生活工匠是也書曰不作無益害有益功乃成兹事雖小其於聖朝致治之功則爲害此臣所以昧死須至上浼天聽也伏況東南製作甲於四方或掖庭有須臨時置買應手可辦正不必專置吏卒徒爲此紛紛也平日耕桑之民死傷流亡之餘尚能竭力以供租賦者彼誠知國家之艱難而上體陛下之憂勤欲足兵食以安中原也故雖極勞瘁而不敢辭今若聞置官司破禄食以營技巧彼必歎息憤懣有不平之氣矣臣愚伏望聖慈深念賦入之耗減軍須之糜費凡不急之務悉詔罷去掖庭所尚宜示敦朴以革近世豪侈之習以成中興節儉之化夫豈不美哉所有八月二十一日後苑作差人吏工匠二指揮伏乞特賜寢罷髙宗時應天府尹葉夢得上奏曰右臣近承尚書工部符備到七月十八日勅莭文京東路州軍增修城壁樓櫓仰當職官隨宜修治勘㑹本府昨五月内先准聖㫖修城尋行相度據舊城外今添幇城身底闊一丈四尺髙六尺增築馬靣團敵創建樓櫓一千八百六十餘間合起夫八十餘萬收買木植一百六十三萬餘條計合用錢二十一萬貫有零自臣到任親再檢視以勞費浩大民力不易兼元料有大計虚費不實去處遂别措置裁減據舊城外止合添幇城身底闊一丈髙三尺及造樓櫓一千間比元料計減人夫五十餘萬工木植一百餘萬條計合用錢七萬餘貫其合用人夫仍欲召募日支工食錢米於民即無騷動已具狀奏聞去訖臣竊惟本府當東南之衝内屏王室漢吳楚七國舉兵西鄉闗中震驚景帝遣周亞夫將三十六將軍距於洛陽相持三月然卒挫其鋒而遁死者梁孝王力限之於此而不得西之效也唐安禄山叛幽薊安慶緒遣其下尹子琦將同羅突厥等勁兵十餘萬來攻卒能保有江淮使不敢長驅唐得保有其財用以濟中興者張廵許逺以死守之於此而不得逞之效也盖嘗以此考之自東南而來如漢之吳楚由西北而下如唐之尹子琦皆以睢陽爲襟喉則控扼之要利害豈與他郡比哉又況本朝王業所基見奉三聖神御於離宫夾輔京師號爲陪都其形勢又非漢唐之比則府城勢決不可不修以爲非常之備今有司之所較者不過目前之費而已臣今來裁減之數止是七萬餘貫朝廷豈當以此豪末之費而不爲王業本基之計乎契勘發運司并江西轉運司見拖欠本府宣和五年以後年額合應副斛斗二十七萬石臣今來更不敢上干朝廷别作施行支降錢本只乞於今來上供斛斗内截留十萬石依准去年御筆指揮充三年帶納之數亦可變轉了辦目今秋田收刈不逺若不乗農事稍隙之時疾速下手併力營治竊恐遷延至冬必不及事臣已一靣收簇本府諸色樁管經費係省錢先次兊那使用徑自擇日興工外欲望聖慈特賜開允許臣依數截留上件斛斗撥還庶㡬不誤年計夢得爲兩浙西路安撫使時又奏曰右臣備員從官出守藩輔近者嘗以疾病乞就閒秩伏䝉聖恩未即矜許既勉强承命方時艱難身覩陛下宵旰以圖中興之日曾未纎毫報効夙夕愧懼無以自處惟有隨事納忠少圖裨益庶猶愈於緘嘿坐食故茍在職一日不敢遽忘此心伏見經營建康以備廵幸捨二百年定都之業而即偏霸蹔處之地此誠不得已之下䇿非出陛下本意然而天子以四海爲家古之帝王一嵗而四廵狩不以爲難則今萬一順動固未爲過也惟無傷財無動衆事不求備居不求安則何所徃而不可竊聞今建康規畫有司似不能盡體聖意道塗之言皆云欲創建宫室備列百司規傚京師臣愚竊以爲未然此行幸非遷都也何遽如是哉夫功大則費廣費廣則民勞此理勢之自然㡬月以來争傳江東之民有家業錢一千而取三十者田一畆而出方甎一片者一邑而率甎灰土木之費以二十萬計者置窑燒甎而望青斫木者甚有至於取平江府朱勔家之巧石以備玩設雖未必皆實然方陛下恢復之初愛民恤下之意如撫赤子惡衣菲食之念自比匹夫此聲豈宜聞於外乎是殆州縣之吏廹於期㑹各課職守規以自免過咎而不暇爲朝廷之思也然所以爲累者大矣昔周以公叔帶之亂挾戎狄以伐京師襄王出居於鄭使人告難於魯自稱曰不榖左丘明以爲易服降名禮也非特王者爲然狄人侵衛齊小白復之文公衣大布之衣大帛之冠以臨其國獨務材訓農通商惠工謹教勸學授方任能而衛復興故史稱其元年革車三十乗季年乃三百乗下至於越王勾踐蠻夷之事無足言矣然及圖報吳也在國親廵孤寡而共其乏困在軍熟食者分而後敢食所共嘗者卒乗與焉居不重席室不崇壇器不雕鏤舟車不飾故其未戰也父兄相與請曰越四封之内親吾君也猶父母也子而思報父母之仇臣而思報君之讎其敢不盡其力乎及其將戰也則又父勉其子兄勉其弟婦勉其夫曰孰是君也而可無死乎於是敗吳於囿又敗之於没又郊敗之遂以滅吳恭惟陛下以神聖文武之資受天明命奄有祖宗之大業天下孰敢不服即位以來膏澤屢下寛大之令日聞於人耳哀痛之詔日感於人心天下孰敢不歸惟兹飛揚跋扈之敵合中國之力而共誅之其殄滅必有日矣何足懼哉在陛下行之如何耳廼者天申節上夀作樂抑而不行貢奉之物非天地宗廟陵寢所須却而盡罷天下皆知陛下約已思艱之意堯舜無以過然執事之吏乃復因縁舊習過舉如此甚不稱陛下盛德美意愚俗難以家至户曉願下明詔顯示戒飭應建康等處營繕除城池樓櫓以備守禦營寨次舍以待屯戍糧糗儲蓄以充廪給金錢幣帛以供犒賞外其餘一切並從簡約無以儉陋爲不中無以草創爲非體古者君在草莽其臣皆反首茇舍則百司庶府亦非求安之時陛下既屏聲色而不御抑侍衛而弗充則外朝之制後宫之儀亦不必備使天下曉然皆知陛下大讎未雪不㤀嘗膽之心二聖未還常切承顔之念則四海之内茍非木石食陛下之禄沐陛下之恩誰不欲畢命自効彎弓而北向乎設有背德避患者天下必共起擊之矣追迎鑾輿再造王室復還千里之畿歸嚴九廟之奉可剋日而至臣位卑人微未嘗得覲清光遽冒君威犯分不韙罪當萬死不勝惶懼激切屏營之至御史中丞廖剛奏曰臣契勘軍器所見造李顯忠所請軍器名件凡一萬八千有竒爲工㡬十萬而所役兵匠及和雇纔一千八百餘人人各占一能不可以相易則費日非止十萬也況鐵必精鍊皮必熟治漆必俟乾而後再施若此之𩔖儻廹以嚴限不唯難於辦集所成之器亦將苦窳而不可用昔晁錯有言兵不犀利與空手同甲不堅宻與袒裼同弩不及逺與短兵同矢不能入與無鏃同今幸未急於用臣愚欲望聖慈特降處分稍寛其工程則人力裕而器械精矣必欲速就不過添雇人匠本色匠人既不易得則府縣强雇不能無騷擾而事亦未必濟也孝宗淳熈四年吏部侍郎周必大上奏曰臣聞歐陽修在翰林日曾上言京師土木興作處多乞行減罷尋差修與三司同共相度減定修因言神御殿不住修換昨開先殿只因兩柱損遂換一十三柱用材植物料共一萬七千有零且崇奉祖宗貴於清浄頻有遷徙輕瀆威靈其言甚爲詳備仁宗嘉納臣竊見近嵗營造往往委臨安府及轉運司例皆茍簡趣辦閱時未㡬即復繕修秖如景靈宫嵗嵗換柱毎次所費不下數千緡盖抽換之時率用溼木塗以丹漆夾以墻壁纔及數月又已損爛近修兩學亦復如此官吏只欲速成冀目前之賞豈暇計慮久逺以邦財民力爲念哉臣愚欲望聖慈嚴賜戒飭凡遇修宗廟等處須用乾壯材植若年嵗間依前損壊即推究元修官吏重行責罰其他土木之工有可節者節之謂如封樁錢物雖少屋宇而左藏東西庫大段有空閒去處若就用盛貯别差專庫看守却令提領官掌其扄鑰遇有收支躬親啟閉户部何由敢有移用自不必令漕司踏逐地步枉費十餘萬緡造屋五百間拆移大府寺其爲利害若白黑之易見仰惟陛下恭儉出於天性此事偶有未知知則必爲裁制此臣所以不避妄言之罪期効涓埃之補也孝宗時趙汝愚陳便民事宜曰臣嘗論奏國家渡江以來費用寖廣民間兩稅之外科斂不一民力可謂困矣而人不以爲怨者知朝廷養兵之費盖不得已故也然有得已而不已者寺觀修造是已近時僧道自知道業無聞於世而專務營造以侈相髙用誇已能至有一樓一閣而工費鉅萬者其銷鎔金寳又不可數計竭民膏血委於無用誠爲可惜臣竊見司馬光奏議謂國家明著法令有創造寺觀一間以上者聽人陳告科違制之罪仍即時毁撤臣愚伏望聖慈申嚴前項法禁今後寺觀除舊管屋宇或有損壊處許隨宜修葺外並不得别有創造或遇水火不測合行再造者並委州縣長吏量度費用務從簡省須出給公憑開具間架方得修造如有違犯官吏僧道並與同罪金哀宗至蔡命有司修見山亭及同知衙爲逰息之所完顔仲德諫曰自古人君遭難播越于外必痛自刻苦貶損然後可以克復舊物況今諸郡殘破保完者獨一蔡耳蔡之公廨固不及宫闕萬一方之野處露宿則有加矣且上初行幸已嘗勞民葺治今又興土木之役以求安逸恐人心解弛不足以濟大事上遽命止之元世祖時趙天麟上䇿曰臣聞物之有益者天下之通物也理之極中者聖人之極理也故物渉於玩視則足以蕩吾之心而理及於太過則所以傷吾之道以九五之位生殺之權俯天下而御之宜若得以從心所欲矣以祖宗之大社稷之重仰天命而思之雖欲自逸而亦弗敢矣是以聖人之治天下事皆從於寛厚尊在民上而知民之不可下也故近之貴爲人主而知人之爲王天也故靖之審民情之莫不欲富欲逸欲安軫宸心而載行去甚去奢去泰昔堯之不剪其茅茨禹克卑其宫室晉成計四十金而射堂遂止漢文惜十家之産而露臺不興況今也去古既逺澆民難化不據正以率之則其誰順哉不倡正以變之則烏可清哉我國家兩都宫禁温凊修省塗粉白丹艧於隨年整簾幙庭陳於逐節斯皆理之當然也臣但以發府庫之財役生靈之力崇修佛寺多積佛縁畫棟挿天飛甍隠霧極今古之巧麗耀金碧之輝光且依佛經而言則佛者覺也將以覺妙悟寂滅聲聞縁覺之民物而釋迦者能仁也將以仁四恩三有誦經持戒之衆生今乃以下民之財下民之力粧㸃色身之相好臣竊以爲非如來之本意也欽惟皇國武定四方文綏一統握厯世帝王之大柄爲百家道術之宗盟者皆孔子三綱五常之力也豈宜獨崇絕滅綱常之教以率天下奉信浮圖之人哉臣又以京師者天下之所瞻仰也孔子乃帝王之師綱常之主而其廟學猶爲闕然臣於先所獻萬言䇿内已言之矣盖理貴得中而已彼老佛之教乃山林曲士之所奉虚無寂滅之一術無父子之恩無君臣之義今國家取其一節而崇其寺觀猶可也至如師孔子而獨惜崇興廟學之資費此臣所以不能無言也故爲國家者於所可止者不容不止於所不可止者不宜遽止也伏望陛下念孔子道德之尊報孔子綱常之力採老氏之知足法如來之能仁凡兩都宫禁但令春秋補葺其弊革異其損者不須創建凡勞民無益之役不拘時月並皆停罷其不急者如前詔凡僧道寺觀截自令下之後内本京師外及所在但許修整無敢創立凡所在文廟依時修整自有常制若夫京師廟學惟陛下識之文宗天厯初詔以建康潜邸爲佛寺務窮壯麗毁民居七十餘家仍以御史大夫督其役江南行臺監察御史盖苗上封事曰臣聞使民以時使臣以禮自古未有不由斯道而致隆平者陛下龍潜建業之時居民困於供給幸而獲覩今日之運百姓跂足舉首以望非常之恩今奪農時以剏佛寺又廢民居使之家破産蕩豈聖人御天下之道乎昔漢髙帝興於豐沛爲復兩縣光武中興南陽免稅三年既不務此而隆重佛氏何以滿斯民之望哉且佛以慈悲爲心方便爲教今尊佛氏而害生民無乃違其方便之教乎臺臣職專糾察表正百司今乃委以修繕之役豈其禮哉順帝至正二十年欲修上都宫闕工役大興叅議中書省事陳祖仁上䟽其畧曰自古人君不幸遇艱虞多難之時孰不欲奮發有爲成不世之功以光復祖宗之業茍或上不奉於天道下不順於民心緩急失宜舉措未當雖以此道持盈守成猶或致亂而況欲撥亂世而反之正乎夫上都宫闕創自先帝修於累朝自經兵火焚燬殆盡所不忍言此陛下所爲日夜痛心所宜亟圖興復者也然今四海未靖瘡痍未瘳倉庫告虚財用將竭乃欲驅疲民以供大役廢其耕耨而荒其田畆何異扼其吭而奪之食以速其斃乎陛下追惟祖宗宫闕念兹在兹然不思今日所當興復乃有大於此者假令上都宫闕未復固無妨於陛下之寢處使因是而違天道失人心或致大業之隳廢則夫天下者亦祖宗之天下生民者亦祖宗之生民陛下亦安忍而輕棄之乎願陛下以生養民力爲本以恢復天下爲務信賞必罰以驅䇿英雄親正人逺邪佞以圖謀治道夫如是則承平之觀不日咸復詎止上都宫闕而已乎䟽奏帝嘉納之厯代名臣奏議卷三百十六
