body:
  text: 歴代名臣奏議巻二十六明楊士奇等撰治道南齊髙帝建元元年崔祖思轉長兼給事黄門侍郎上初即位祖思啓陳政事曰禮誥者人倫之襟冕帝王之樞柄自古開物成務必以教學為先世不習學民忘志義悖競因斯而起禍亂是焉而作故篤俗昌治莫先道教不得以夷險革慮儉泰移業今無員之官空受禄力三載無考績之效九年闕登黜之序國儲以之虚匱民力為之彫散能否無章涇渭淆流宜太廟之南𢎞修文序司農以北廣開武校臺州國限外之職問其所樂依方課習各盡其能月供僮幹如先充給若有廢惰遣還故郡殊經奇藝待以不次士修其業必有異等民識其利能無勉勵又曰漢文集上書囊以為殿帷身衣弋綈以韋帶劍慎夫人衣不曳地惜中民十家之産不為露臺劉備取帳鉤銅鑄錢以充國用魏武遣女皁帳婢十人東阿婦以繡衣賜死王景興以淅米見誚宋武節儉過人張妃房唯碧綃蚊幬三齊苮席五盞盤桃花米飯殷仲文勸令畜伎答云我不解聲仲文曰但畜自解又答畏解故不畜歴觀帝王未嘗不以約習律令試簡有徵擢為廷尉僚屬茍官世其家而不美其績鮮矣廢其職而欲善其事未之有也若劉累傳守其業庖人不乏龍肝之饌斷可知矣又曰樂者動天地感鬼神正情性立人倫其義大矣按前漢編戸千萬太樂伶官方八百二十九人孔光等奏罷不合經法者四百四十一人正樂定員唯置三百八十八人今户口不能百萬而太樂雅鄭元徽時校試千有餘人後堂雜伎不在其數糜費力役傷敗風俗今欲撥邪歸道莫若罷雜伎王庭唯置鍾簴羽戚登歌而巳如此則官充給養國反淳風矣又曰論儒者以徳化為本談法者以刻削為體道教治世之粱肉刑憲亂世之藥石故以教化比雨露名法方風霜是以有恥且格敬讓之樞紐令行禁止為國之關楗然則天下治者賞罰而巳矣賞不事豐所病於不均罰不在重所困於不當如令甲勲少乙功多賞甲而捨乙天下必有不勸矣丙罪重丁眚輕罰丁而赦丙天下必不悛矣是賞罰空行無當乎勸阻將令見罰者寵習之臣受賞者仇讎之士戮一人而萬國懼賞匹夫而四海恱又曰籍稅以厚國國虚民貧廣田以實廩國富民贍堯資用天之儲實拯懷山之數湯憑分地之積以勝流金之運近代魏置典農而中都足食晉開汝潁而汴河委儲今將掃闢咸華題鏤龍漠宜簡役敦農開田廣稼時罷山池之威禁深抑豪右之兼擅則兵民優贍可以出師又曰古者左史記言右史記事故君舉必書盡直筆而不汙上無妄動知如絲之成綸今者著作之官起居而已述事之徒襃諛為體世無董狐書法必隠時闕南史直筆未聞又廢諌官聽納靡依雖課勵朝僚徵訪芻輿莫若推舉質直職思其憂夫越任干事在言爲難當官而行處辭或易物議既以無言望已己亦當以吞黙慙人中丞雖謝咸𤣥未有全廢劾簡廷尉誠非釋之寧容都無訊諜故知與其謬人寧不廢職目前之期効也漢徴貢禹為諫大夫矢言先䇿夏侯勝狂直拘繫出補諷職伐柯非遐行之即善又曰天地無心賦氣自均寧得誕秀往古而獨寂寥一代將在知與不知用與不用耳夫有賢而不知知賢而不用用賢而不委委賢而不信此四者古今之通患也今誠重郭隗而招劇辛任鮑叔以求夷吾則天下之士不待召而自至矣髙帝踐阼以劉善明勲誠欲與善明禄召謂之曰淮南近畿國之形勝自非親賢不使居之卿為我卧治也代髙宗為征虜將軍淮南宣城二郡太守遣使拜授封新塗伯邑五百戸善明至郡上表陳事曰周以三聖相資再駕乃就漢值海内無主累敗方登魏挾主行令實踰二紀晉廢主持權遂歴四世景祚攸集如此之難者也陛下凝暉自天照湛神極睿周萬品道洽無垠故能髙嘯閒軒鯨鯢自翦垂拱雲帟九服載晏靡一戰之勞無半辰之棘苞池江海籠苑嵩岱神祇樂推普天歸奉二三年間允膺寳命胄臨皇歴正位宸居開闢以來未有若斯之盛者也夫常勝者無憂恒成者好怠故雖休勿休姬旦作誥安不忘危尼父垂範今皇運草創萬化始基乗宋季葉政多澆苛億兆倒懸仰齊蘇振臣早蒙殊養志輸肝血徒有其誠曾闕埃露夙宵慙戰如墜淵谷不識忌諱謹陳愚管瞽言芻議伏待斧鉞所陳事凡十一條其一以為天地開創人神慶仰宜存問逺方宣廣慈澤其二以為京師浩大逺近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存隨宜量賜其三以宋氏赦令蒙原者寡愚謂下赦書宜令事實相副其四以為匈奴未滅劉昶猶存秋風揚塵容能送死境上諸城宜應嚴備特簡䧺畧以待事機資實所須皆宜豫辦其五以為宜除宋氏大明太始以來諸苛政細制以從簡易其六以為凡諸土木之費且可權停其七以為帝子王姬宜崇儉約其八以為宜詔百官及府州郡縣各貢讜言以𢎞唐虞之美其九以為忠貞孝弟宜擢以殊階清儉苦節應授以民政其十以為革命惟始天地大慶宜時擢才辯北使匈奴其十一以為交州險夐要荒之表宋末政苛遂致怨叛今大化創始宜懐以恩徳未應逺勞將士揺動邊氓且彼土所出唯有珠寳實非聖朝所須之急討伐之事謂宜且停後魏孝文帝時征東大將軍任城王拓䟦澄朝京師引見於皇信堂詔澄曰昔鄭子産鑄刑書而晉叔向非之此二人皆是賢士得失竟誰對曰鄭國寡弱攝於強隣民情去就非刑莫制故鑄刑書以示威雖乖古式合今權道隨時濟世子産為得而叔向譏議示不忘古可與論道未可與權髙祖曰任城當欲為魏之子産也澄曰子産道合當時聲流竹素臣既庸近何敢庶幾今陛下以四海為家宜文徳以懷天下但江外尚阻車書未一季世之民易以威服難以禮治愚謂子産之法猶應暫用大同之後便以道化之髙祖心方革變深善其對笑曰非任城無以識變化之體朕方剏改朝制當與任城共萬世之功耳太和初韓顯宗除著作佐郎車駕南討兼中書侍郎既定遷都顯宗上書其一曰竊聞輿駕今夏若不巡三齊當幸中山竊以為非計也何者當今徭役宜早息洛京宜速成省費則徭役可簡并功則洛京易就往冬輿駕停鄴是閒隙之時猶編户供奉勞費為劇聖鑒矜愍優㫖殷勤爵浹髙年賚周鰥寡雖賑普霑今猶恐來夏菜色況三農要時六軍雲㑹其所損業實為不少雖調斂輕省未足稱勞然大駕親臨誰敢寧息往來承奉紛紛道路田蠶暫廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生癘疫此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功専力以營洛邑則南州免雜徭之煩北都息分析之歎洛京可以時就遷者僉尒如歸其二曰自古聖帝必以儉約為美亂主必以奢侈貽患仰惟先朝皆卑宫室而致力於經畧故能基宇開廣業彌隆泰今洛陽基址魏明帝所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有别四民異居永垂百世不刋之範則天下幸甚矣三曰竊聞輿駕還洛陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂況萬乗之尊富有四海乎警蹕於闈闥之内者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜橛之或失況履涉山河而不加三思哉此愚臣之所以悚息伏願少垂省察其四曰伏惟陛下耳聽法音目翫墳典口對百辟心虞萬幾晷昃而食夜分而寢加以孝思之至隨時而深文章之業日成篇巻雖叡明所用未足為煩然非所以嗇神養性頤無疆之祚莊周言形有待而智無涯以有待之形役無涯之智殆矣此愚臣所不安伏願陛下垂拱司契委下責成唯冕旒垂纊而天下治矣髙祖頗納之顯宗又上言曰進賢求才百王之所先也前代取士必先正名故有賢良方正之稱今之州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此可令别貢門望以敘士人何假冒秀孝之名也夫門望者是其父祖之遺烈亦何益於皇家益於時者賢才而已茍有其才雖屠釣奴虜之賤聖皇不恥以為臣茍非其才雖三后之𦙍自墜於皁𨽻矣是以大才受大官小才受小官各得其所以致雍熙議者或云今世等無奇才不若取士於門望此亦失矣豈可以世無周召便廢宰相而不置哉但當校其有寸長銖重者即先器之則賢才無遺矣又曰夫帝皇所以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家必以刑法為治生民之命於是而在有罪必罰罰必當辜則雖箠撻之刑而人莫敢犯也有制不行人得僥倖則雖參夷之誅不足以肅自太和以來多坐盜棄市而逺近肅清由此言之止姦在於防檢不在嚴刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盜迭相敦厲遂成風俗陛下居九重之内視人如赤子百司分萬務之要遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此書曰與其殺不辜寧失不經實宜敕示百寮以惠元元之命又曰昔周王為犬戎所逐東遷河洛鎬京猶稱宗周以存本也光武雖曰中興實自創革西京尚置京尹亦不廢舊今陛下光隆先業遷宅中土稽古復禮於斯為盛豈若周漢出於不得巳哉按春秋之義有宗廟曰都無則謂之邑此不刋之典也況北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦逺矣今使同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見洛京之制居民以官位相從不依族𩔖然官位非常有朝榮而夕悴則衣冠淪於厮豎之邑臧獲騰於膏腴之里物之顛倒或至於斯古之聖王必令四民異居者欲其業定而志専業定則不偽志専則不滛故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居伎作屠沽各有攸處但不設科禁買賣任情販貴易賤錯居混雜假令一處彈箏吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齓任意所從其走赴舞堂者萬數往就學館者無一此則伎作不可雜居士人不宜異處之明驗也故孔父云里仁之美孟母𢎞三徙之訓賢聖明誨若此之重今令伎作家習士人風禮百年難成令士人兒童効伎作容態則一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷毎選舉人士則校其一婚一宦以為升降何其密也至於開伎作宦途得與膏粱華望接閣連甍何其畧也此愚臣之所惑今稽古建極光宅中區凡所徙居皆是公地分别伎作在於一言有何為疑而闕盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邊民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地里舊名一皆釐革小者並合大者分置及中州郡縣昔以户少併省今人口既多亦可復舊君人者以天下為家不得有所私也故倉庫儲貯以俟水旱之灾供軍國之用至於有功徳者然後加賜爰及末代乃寵之所隆賜賚無限自比以來亦為太過在朝諸貴受禄不輕土木被錦綺童妾厭粱肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周急不繼富之謂也愚謂士有可賞則明㫖襃揚稱事加賞以勸為善不可以親近之昵猥損天府之儲又曰諸宿衞内直者宜令武官習弓矢文官諷書傳而今給其蒱博之具以成䙝狎之容長矜爭之心恣喧囂之慢徒損朝儀無益事實如此之𩔖一宜禁止祕書丞李彪表曰臣聞昔之哲王莫不亹亹孜孜思讜言以康黎庶是以訪童問師不避淵澤詢謀諮善不棄芻蕘用能光茂實於竹素播徽聲於金石臣屬生有道遇無諱之朝敢修往式竊揆時宜謹冐死上封事七條狂瞽之言伏待刑戮其一曰自太和建號踰於一紀典刑徳政可得而言也立圓丘以昭孝則百神不乏享矣舉賢才以酬諮則多士盈朝矣開至誠以軌物則朝無佞人矣敦六順以教人則四門無凶人矣制冠服以明秩則典式復彰矣作雅樂以協人倫則人神交慶矣深慎罰以明刑則庶獄得衷矣薄服味以示約則儉徳光昭矣單宫女以配鰥則人無怨曠矣傾府藏以賑錫則大賚周渥矣省賦役以育人則編户巷歌矣宣徳澤以懐逺邇則華荒抃舞矣垂至徳以暢幽顯則禎瑞效質矣生生得所事事惟新巍巍乎猶造物之曲成也然臣愚以為行儉之道猶自闕何者今四人豪富之家習華既深敦樸情淺夫識儉素之易長而行奢靡之難久壯制第宅美飾車馬僕妾衣綾綺土木被文繡僣度違衷者衆矣古先哲王之為制也自天子以至公卿下及抱關擊柝其宫室車服各有差品小不得踰大賤不得踰貴夫然故上下序而人志定今時浮華相競情無常守大為消功之物巨制費力之事豈不謬哉消功者錦繡彫文是也費力者廣宅髙宇壯制麗飾是也其妨農業害女工者焉可勝言哉漢文時賈誼上疏云今之王政可為長太息者六此即是其一也夫上之所好下必從之故越王好勇而士多輕死楚靈好瘠而國有饑人今二聖躬行儉素詔令殷勤而百姓之奢猶未革者豈楚越之人易變如彼大魏之士難化如此蓋朝制弗宣人未見徳使之然耳臣愚以為第宅車服自百官以至於庶人宜為等制使貴不逼賤卑不僭髙不可以稱其侈意用違經典今或者以為習俗日乆不可卒革臣謹言古人革之之漸昔子産為政一年百姓歌之曰我有田疇子産伍之我有衣冠子産貯之孰殺子産吾其與之及三年乃改歌曰我有田疇子産殖之我有子弟子産誨之子産若死誰其繼之然則鄭人之智豈前昏而後明哉且從政者須漸受化者難頓故也今若為制以差品之始末之情魏士與鄭人同矣既同鄭人是為卒有善歌豈可憚其初怨而不為終善哉夫尚儉者開福之源好奢者起貧之兆然則儉約易以教行華靡難以財滿是以聖人留意焉賢人希準焉故夏禹卑宫室而惡衣服殷湯寢黄屋而乘輅輿此示儉於後王所宜觀其意而取折衷也孔子為魯司㓂乘柴車而駕駑馬晏嬰為齊正卿冠濯冠而衣故裘此示儉於後臣後臣所宜識其情而消息之也前志云作法於涼其弊猶貪此言雖畧有達治道臣之瞽言儻或可採比及三年可以有成有成則人務本人務本則奢費除奢費除則榖帛豐榖帛豐則人逸樂人逸樂則皇基固矣其二曰易稱主器者莫若長子傳曰太子奉冢嫡之粢盛然則祭無主則宗廟無所饗冢嫡廢則神器無所傳聖賢知其如此故垂誥以為長世之法昔姬王得斯道也故恢崇儒術以訓世嫡世嫡於是習成懿徳用大協於黎蒸是以世統生人載祀八百逮嬴氏之君於秦也殆棄徳政坑焚儒典弗以義方教厥冢子於是習成凶徳肆虐以臨黔黎是以饗年不永二世而亡亡之與興其道在於師傅師傅之損益可得而言昔者周公傅成王教以孝仁禮義逐去邪人不使見惡行又選天下之端士孝悌博聞有道術者以為衞翼衞翼良成王正周道之所以長久也宦者趙髙傅胡亥教以刑􅓍斬劓及夷人族逐去正人不得見善士諂佞讒賊者為其左右左右邪胡亥僻秦祚之所以短促也夫皇天輔徳者也豈私周而疎秦哉由所行之道殊故禍福之途異耳昔光武議為太子置傅以問其羣臣羣臣望意皆言太子舅執金吾新陽侯隂就可博士張佚正色曰今立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才光武稱善曰置傅以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅漢明卒為賢主然則佚之傅漢明非廼生之漸也尚或有稱而况廼生訓之以正道其為益也固以大矣故禮曰太子生因舉以禮使士負之有司齋肅端冕見於南郊明冢嫡之重見乎天也過闕則下過廟則趨明孝敬之道也然古之太子自為赤子而教固已行矣此則逺世之鏡也髙宗文成皇帝慨少時師不勤教嘗謂羣臣曰朕始學之日年尚幼冲情未能専既臨萬機不遑温習今而思之豈唯予咎抑亦師傅之不勤尚書李訢免冠而謝此則近日之可鑒也伏惟太皇太后翼賛髙宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬之躋及儲宫誕育復親撫誥日省月課實勞神慮今誠宜準古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈畜倉廪故堯湯水旱人無菜色者蓋由備之有漸積之有素暨於漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畆不實罪及牧守聖人之憂世重榖殷勤如彼明君之恤人勸農相切如此頃年山東饑去歲京師儉内外人庶出入就豐既廢營産疲而乃達又於國體實有虚損若先多積榖安而給之豈有驅督老弱餬口千里之外以今況古誠可懼也臣以為宜析州郡常調九分之二京師度支歲用之餘各立官司年豐糴積於倉時儉則加私之二糶之於人如此民必力田以買官絹又務儲財以取官粟年登則常積歲凶則直給又别立農官取州郡户十分之一以為屯人相水陸之宜料頃畆之數以贓贖雜物餘財市牛科給令其肆力一夫之田歲責六十斛蠲其正課并征戍雜役行此二事數年之中則榖積而人足雖災不為害臣又聞前代明主皆務懐逺人禮賢引滯故漢髙過趙求樂毅之胄晉武廓定旌吳蜀之彦臣謂宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義二可以懐江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大二情讞決之日多從降恕時不得已必垂惻愍雖前王之勤聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重常盡季冬至孝章帝時改盡十月以育三微後歲旱論者以十月斷獄隂氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌故十一月有射干芸荔之應周以為春十二月陽氣上通雉雊雞乳殷以為春十三月陽氣已至蟄蠱皆震夏以為春三微成著以通三統三統之月身欲寧事欲靜以起隆怒不可謂寧以行大刑不可謂靜章帝善其言卒以十月斷令京都及四方斷獄報重常竟季冬不推三正以育三微寛宥之情每過於昔遵時之憲猶或闕然豈所謂助陽發生垂奉微之仁也誠宜逺稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道協幽顯仁垂後昆矣其五曰古者大臣有坐不廉而廢者不謂之不廉乃曰簠簋不飭此君之所以禮貴臣不明言其過也臣有大譴則白冠㲠纓盤水加劍造請室而就死此臣之所以知罪而不敢逃刑也聖朝賓遇大臣禮同古典自太和以降有罪當陷大辟者多得歸第自盡遣之日深重隠愍言發悽淚百官莫不見四海莫不聞誠足以感將死之心慰戚屬之情然恩發至衷未著永制此愚臣所以敢陳末見昔漢文時有告丞相周勃謀反逮繫長安獄頓辱之與皁𨽻同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而體貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司冦榜笞之小吏詈罵之殆非所以令衆庶見也及將刑也臣則北面再拜跪而自裁天子曰子大夫自有過耳吾遇子有禮矣上不使人抑而刑之也孝文深納其言是後大臣有罪皆自殺不受刑至孝武時稍復入獄良由孝文行之當時不為永制故耳伏惟聖徳慈惠豈與漢文比隆哉今天下有道庶人不議之時臣安可陳瞽言於朝但恐萬世之後繼體之主有若漢武之事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性書云孝乎惟孝友于兄弟二經之㫖蓋明一體而同氣可共而不可離者也及其有罪不相及者乃君上之厚恩也至若有懼懼應相連者固自然之恒理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也昔秦伯以楚人圍江素服而示懼宋仲子以失舉桓譚免冠而謝罪然則子弟之於父兄父兄之於子弟惟其情至豈與結盟相知者同年語其淺深哉二聖清簡風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰免留之如此足以敦厲凡薄使人知有所恥矣其七曰禮云臣有大喪君三年不呼其門此聖人縁情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮於虐秦殆皆泯矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未滿三月皆弗徭役其朝臣䘮制未定有聞至後漢元初中大臣有重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭黙䘮親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂反正未遑建終䘮之制今四方無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懐切有未盡伏見朝臣丁父憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂緌同節慶之醼傷人子之道虧天地之經愚謂如有遭大父母父母䘮者皆聽終服若無其人有曠庶官者則優㫖慰諭起令視事但綜司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆於禮事所宜行也如臣之言少有可採願付有司别為條制髙祖覽而善之四年尚書令王叡疾篤上疏曰臣聞忠於事君者節義著於臨終孝於奉親者淳誠表於垂沒故孔明卒軍不忘全蜀之計曾參疾甚情存善言之益雖則庸昧敢忘景行臣荷天地覆載之恩蒙大造生成之徳漸風訓於華年服道教於弱冠濯纓清朝垂周三紀受先帝非分之眷叨陛下殊常之寵遂乃齊跡功舊内侍幃幄爵列諸王位班上等從容聞道與知國政誠思竭盡力命以報所受不謂事與心違忽嬰重疾每屈輿駕親臨問之榮洽生平惠流身後犬馬之誠銜佩罔極今所病遂篤慮必不起延首闕庭鯁戀終日仰恃皇造宿眷之隆敢陳愚昧管窺之見臣聞為治之要其畧有五一者慎刑罰二者任賢能三者親忠信四者逺讒佞五者行黜陟夫刑罰明則姦宄息賢能用則功績著親忠信則視聽審逺讒佞則疑間絶黜陟行則貪饕改是以欽恤惟刑載在唐典知人則哲惟帝所難周書垂好徳之文漢史列防姦之論考省幽明先王大典又八表既廣逺近事殊撫荒裔宜待之以寛信綏華甸宜惠之以明簡哀恤孤獨賑施困窮録功舊赦小罪輕徭役薄賦斂修福業禁滛祀願聽政餘暇賜垂覽察宣武帝初年廣訪得失治書陽固上讜言表曰臣聞為治不在多方在於力行而已當今之務宜早正東儲立師傅以保護立官司以防衛以係蒼生之心攬權衡親宗室彊榦弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素餐孜孜萬幾躬勤庶務使民無謗讟之響省徭役薄賦斂修學官遵舊章貴農桑賤工賈絶談虚窮微之論簡桑門無用之費以存元元之民以救飢寒之苦上合昊天之心下恱億兆之望然後備器械修甲兵習水戰滅吳㑹撰封禪之禮襲軒唐之軌同彼七十二君之徽號協定鼎嵩河之心副髙祖殷勤之寄上與三皇比隆下與五帝齊美豈不茂哉臣位卑識昧言不及義屬聖明廣訪敢獻瞽言伏願陛下留神少垂究察延昌中門下録事孫紹表曰臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命兆啓無窮畢世後仁祚隆七百今二虢京門下無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領護分事之式徴兵儲粟之要舟居水陸之資山河要害之權緩急去來之用持平越救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理望而卑寒亦免士庶同悲兵徒懐怨中正賣望於下里主按舞筆於上臺真偽混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊𩔖應同役而苦樂懸異士人居職不以為榮兵士役苦心不忘亂故有競棄本業飄藏他土或詭名託養散在人間或亡命山藪漁獵為命或投伏強豪寄命衣食又應遷之户逐樂諸州應留之徒避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定關禁不修任意取適如此之徒不可勝數爪牙不復為用百工爭棄其業混一之計事實闕如考課之方責辦無日流浪之徒決須精校今强敵窺時邊黎伺隙内民不平久戍懐怨戰國之勢竊謂危矣必造禍源者北邊鎮戍之人也若夫一統之年持平用之者大道之計也亂離之期縱横作之者行權之勢也故道不可久須文質以換情權不可恒隨洿隆以收物文質應宜道形自安洿隆獲衷權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令並議律尋施行令獨不出十餘年矣臣以為令之為體即帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要乃是有為之樞機世法之大本也然修令之人亦皆博古依古撰置大體觀比之前令精粗有在但主議之家太用古制若全依古髙祖之法復須昇降誰敢措意有是非哉以是爭故乆廢不理然律令相須不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懐於悒孝明帝時徐兖和糴使孫紹表曰臣聞文質互用治道以之緝熙洿隆得時人物以之通濟故能事恢三靈仁洽九服伏惟陛下應靈踐阼沖明照物宰輔忠純伊霍均美既致昇平之基應成無為之業而漠北叛命隴右搆逆中州驚擾民庶竊議其故何哉皆由上法不通下情怨塞故也臣雖愚短具鑒始末往在代都武質而治安中京以來文華而政亂臣昔於太和極陳得失具論四方華夷心態髙祖垂納文應可尋延昌正光奏疏頻上主者收録不蒙報問即日事勢乃至於此盡微臣豫陳之驗今東南有竊號之豎西北有逆命之寇豈得怨天實尤人矣臣今不憂荒外正慮中畿急須改張以寧其意若仍持疑變亂尋作肘腋一乖大事去矣然臣奉國四世欣戚是同但職在冗散不關樞密寧濟之計欲陳無所可經緯甚多無機可織夫天下者大器也一正難傾一傾難正當今之危攝足之急臣備肉食痛心無已泣血上陳願垂採察若得言㕘執事獻可替否寇逆獲除社稷稱慶雖死如生犬馬情畢靈太后臨朝任城王拓跋澄表曰臣聞三季之弊由於煩刑火徳之興在於三約是以老聃云法令滋彰盜賊多有又曰其政察察其民缺缺又曰天網恢恢疎而不漏是故欲求治本莫若省事清心昔漢文斷獄四百幾致刑措省事所致也蕭曹為相載其清靜畫一之歌清心之本也今欲求之於本宜以省事為先使在位羣官纂蕭曹之心以毗聖化如此則上下相安逺近相信百司不怠事無愆失豈宜擾世教以深文烹小鮮以煩手哉臣竊惟景明之初暨永平之末内外羣官三經考課逮延昌之始方加黜陟五品以上引之朝堂親決聖目六品以下例由勅判自世宗晏駕大宥三行所以蕩除故意與物更始革世之事猶相窮覈以臣愚見謂為不可又尚書職分樞機出納昔魏明帝卒至尚書門陳矯亢辭帝慙而返夫以萬乘之重非所宜行猶屈一言慙而回駕羣官百司而可相亂乎故陳平不知錢榖之數邴吉不問僵道之死當時以為達治歴代用為美談但宜各守其職思不出位潔已以勵時靖恭以致節又尋御史之體風聞是司至於冒勲妄考皆有處别若一處有風謡即應攝其一簿研檢虚實若差舛不同偽情自露然後繩以典刑人孰不服豈有移一省之案取天下之簿尋兩紀之事窮革世之尤如此求過誰堪其罪斯實聖朝所宜重慎也諫議大夫張普惠上疏論時政得失一曰審法度平斗尺租調務輕賦役務省二曰聽輿言察怨訟先王舊事有不便於政者請悉追改三曰進忠蹇退不肖任賢勿貳去邪勿疑四曰興滅國繼絶世勲親之𦙍所宜收敘書奏肅宗靈太后引普惠於宣光殿隨事難詰延對移時令曰寧有先王之詔翻改普惠僶俛不言令曰卿似欲致諫故以左右有人不肯苦言朕為卿屏左右卿其盡陳之對曰聖人之養庶物愛之如傷況今二聖纂承洪緒妻承夫子承父夫父之不可安然仍行豈先帝傳委之本意仰惟先帝行事或有司之謬或權時所行在後以為不可者皆追而正之聖上忘先帝之自新不問理之屈伸一皆抑之豈蒼生黎庶所仰望於聖徳太后曰小小細務翻動更成煩擾普惠曰聖上之養庶物若慈母之養赤子今赤子幾臨危壑將赴水火以煩勞而不救豈赤子所望於慈母太后曰天下蒼生寧有如此苦事普惠曰天下之親懿莫重於太師彭城王然竟不免枉死微細之苦何可得無太后曰彭城之苦吾已封其三子何足復言普惠曰聖后封彭城之三子天下莫不忻至徳知慈母之在上臣所以重陳者凡如此之枉乞垂聖察太后曰卿云興滅國繼絶世竟復誰是普惠曰昔淮南逆終漢文封其四子葢骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一徳之虧自貽悔戾沈淪幽壤緬焉弗收豈是興滅繼絶之意乞收葬二王封其子孫愚臣之願太后曰卿言有理朕深戢之莊帝時關西慰勞大使辛雄請事五條一言逋懸租調宜悉不徵二言簡罷非時徭役以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起歴年死亡者衆或父或子辛酸未歇見存耆老請假板職恱生者之意慰死者之魂五言喪亂既久禮儀罕習如有閨門和睦孝弟卓然者宜表其門閭仍啓曰臣聞愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之使民不失其時則利之也教民不失其性則成之也省刑罰則生之也薄稅斂則與之也無多徭役則樂之也吏靜不苛則喜之也伏惟陛下道邁前主功超往代敷春風而鼔俗旌至徳以調民生之養之正當兹日恱近來逺亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩救疾惠孤恤寡便是徒乘官馹虚號王臣往還有費於郵亭皇恩無逮於民俗謹率愚管敢以陳聞乞垂覽許莊帝從之西魏文帝大統十一年大行臺度支尚書蘇綽上疏六條其一先治心曰凡今之方伯守令皆受命天朝出臨下國論其尊貴並古之諸侯也是以前世帝王毎稱共治天下者唯良宰守耳明知百僚卿尹雖各有所司然其治民之本莫若宰守之最重也凡治民之體先當治心心者一身之主百行之本心不清淨則思慮妄生思慮妄生則見理不明見理不明則是非􅍝亂是非􅍝亂則一身不能自治安能治民也是以治民之要在清心而已夫所謂清心者非不貪財貨之謂也乃欲使心氣清和志意端靜心和志靜則邪僻之慮無因而作邪僻不作則凡所思念無不皆得至公之理率至公之理以臨其民則彼下民孰不從化是以稱治民之本先在治心其次又在治身凡人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自修而欲百姓修行者是猶無的而責射中也故為人君者必心如清水形如白玉躬行仁義躬行孝悌躬行忠信躬行禮讓躬行㢘平躬行儉約然後繼之以無倦加之以明察行此八者以訓其民是以其人畏而愛之則而象之不待家教日見而自興行矣其二敦教化曰天地之性唯人為貴明其有中和之心仁恕之行異於木石不同禽獸故貴之耳然性無常守隨化而遷化於敦朴者則質直化於澆偽者則浮薄浮薄者則衰弊之風質直者則淳和之俗衰弊則禍亂交興淳和則天下自治治亂興亡無不皆由所化也然世道彫䘮已數百年大亂滋甚且二十歲民不見徳唯兵革是聞上無教化唯刑罰是用而中興始爾大難未平加之以師旅因之以饑饉凡百草創率多權宜致使禮讓弗興風俗未改比年稍登稔徭賦差輕衣食不切則教化可修矣凡諸牧守令長宜洗心革意上承朝㫖下宣教化矣夫化者貴能扇之以淳風浸之以太和被之以道徳示之以朴素使百姓亹亹中遷於善邪偽之心嗜欲之性潛以消化而不知其所以然此之謂化也然後教之以孝悌使民慈愛教之以仁順使民和睦教之以禮義使民敬讓慈愛則不遺其親和睦則無怨於人敬讓則不競於物三者既備則王道成矣此之謂教也先王之所以移風易俗還淳返素垂拱而治天下以至太平者莫不由此此之謂要道也其三盡地利曰人生天地之間以衣食為命食不足則飢衣不足則寒飢寒切身而欲使民興行禮讓者此猶逆坂走丸勢不可得也是以古之聖王知其若此故先足其衣食然後教化隨之夫衣食所以足者在於地利盡地利所以盡者由於勸課有方主此教者在乎牧守令長而已民者冥也智不自周必待勸教然後盡其力諸州郡縣每至歲首必戒敕部民無問少長但能操持農器者皆令就田墾發以時勿失其所及布種既訖嘉苗須理麥秋在野蠶停於室若此之時皆宜少長悉力男女併工若援溺救火寇盜之將至然後可使農夫不廢其業蠶婦得就其功若有游手怠惰早歸晚出好逸惡勞不勤事業者則正表牒名郡縣守令隨事加罰罪一勸百此則明宰之教也夫百畆之田必春耕之夏種之秋收之然後冬食之此三時者農之要也若失其一時則榖不可得而食故先王之戒曰一夫不耕天下必有受其飢者一婦不織天下必有受其寒者若此三時不務省事而令民廢農者是則絶民之命驅以受死然單劣之户及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之睱又當教民種桑植果藝其菜蔬修其園圃畜育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則民煩勸課亦不容太簡簡則民怠善為政者必消息時宜而適煩簡之中故詩曰不剛不柔布政優優百禄是求如不能爾則必陷於刑辟矣其四擢賢良曰天生烝民不能自治故必立君以治之人君不能獨治故必置臣以佐之上至帝王下及郡國置臣得賢則治失賢則亂此乃自然之理百王不能易也今刺史守令悉有僚吏皆佐治之人也刺史府官則命於天朝其州吏以下並牧守自置自昔以來州郡大吏但取門資多不擇賢良末曹小吏唯試刀筆並不問志行夫門資者乃先世之爵禄無妨子孫之愚瞽刀筆者乃身外之材藝不廢性行之澆偽若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以涉道也若刀筆之中而得志行是則金相玉質内外俱美實為人寳也若刀筆之中而得澆偽是則飾畫朽木恱目一時不可以充欀椽之用也今之選舉者當不限資蔭唯在得人茍得其人自可起廝養而為卿相伊尹傅說是也而況州郡之職乎茍非其人則丹朱商均雖帝王之𦙍不能守百里之封而況於公卿之胄乎由此而言觀人之道可見矣凡所求材藝為其可以治民若有材藝而以正直為本者必以其材而為治也若有材藝而以姦偽為本者將由其官而為亂也何治之可得乎是故將求材藝必先擇志行其志行善者則舉之其志行不善者則去之而今擇人者多云邦國無賢莫知所舉此乃未之思也非適理之論所以然者古人有言明主聿興不降佐於昊天大人基命不擢才於居土常引一世之人治一世之務故殷周不待稷契之臣魏晉無假蕭曹之佐仲尼曰十室之邑必有忠信如丘者焉豈有萬家之都而云無士但求之不勤擇之不審或用之不得其所任之不盡其材故云無耳古人云千人之秀曰英萬人之英曰儁今之智效一官行聞一邦者豈非近英儁之士也但能勤而審察去虚取實各得州郡之最而用之則民無多少皆足治矣孰云無賢夫良玉未剖與瓦石相𩔖名驥未馳與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分彼賢士之未用也混於凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同昔吕望之屠釣百里奚之飯牛寗生之扣角管夷吾之三敗當此之時悠悠之徒豈謂其賢及升王朝登霸國積數十年功成事立始識其奇士也於是後世稱之不容於口彼瓌偉之材不世之傑尚不能以未遇之時自異於凡品況降此者哉若必待太公而後用是千載無太公必待夷吾而後用是百世無夷吾所以然者士必從微而至著功必積小以至大豈有未用而已成不用而先達也若識此理則賢可求士可擇得賢而任之得士而使之則天下之治何向而不可成也然善官人者必先省其官官省則善人易充善人易充則事無不理官煩則必雜不善之人雜不善之人則政必有得失故語曰官省則事省事省則民清官煩則事煩事煩則民濁清濁之由在於官之煩省案今吏員其數不少昔民殷事廣尚能克濟況今戸口減耗依員而置猶以為少如聞在下州郡尚有兼假擾亂細民甚為無理諸如此輩悉宜罷黜無得習常非直州郡之官宜須善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監統夫正長者治民之基基不傾者上必安凡求賢之路自非一途然所以得之審者必由任而試之考而察之起於居家至於鄉黨訪其所以觀其所由則人道明矣賢與不肖别矣率此以求則庶無愆悔矣其五䘏獄訟曰人受隂陽之氣以生有情有性性則為善情則為惡善惡既分而賞罰隨焉賞罰得中則惡止而善勸賞罰不中則民無所措手足而怨叛之心生是以先王重之特加戒慎夫戒慎者欲使治獄之官精心悉意推究事源先之以五聽參之以證驗妙覩情狀窮鑒隠伏使姦無所容罪人必得然後隨事加刑輕重皆當赦過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心逺明大教使獲罪者如歸此則善之上也然宰守非一不可人人皆有通識推理求情時或難盡唯當率至公之心去阿枉之志務求曲直念盡平當聽察之理必窮所見然後拷訊以法不苛不暴有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次若乃不仁恕而肆其殘暴同民木石專任捶楚巧詐者雖事彰而獲免辭弱者乃無罪而被罰有如此者斯則下矣非共治所寄今之宰守當勤於中科而慕其上善如在下條則刑所不赦當深思逺大念存徳教先王之制曰與殺無辜寧赦有罪與其害善寧其利淫明必不得中寧濫捨有罪不􅍝害善人也今之從政者則不然深文巧劾寧致善人於法不免有罪於刑所以然者非皆好殺人也但云為吏寧酷可免後患此則情存自便不念奉公守法如此皆姦人也夫人者天地之貴物一死不可復生然楚毒之下以痛自誣不被申理遂陷刑􅓍者將恐往往而有是以自古以來設五聽三宥之法著明慎庶獄之典此皆愛民甚也凡伐木殺草田獵不順尚違時令而虧帝道况刑罰不中濫害善人寧不傷天心犯和氣也天心傷和氣損而欲隂陽調適四時順序萬物阜安蒼生恱樂者不可得也故語曰一夫吁嗟王道為之傾覆正謂此也凡百宰守可無慎乎若有深姦巨猾傷化敗俗悖亂人倫不忠不孝故為背道者殺一勵百以清王化重刑可也識此二途則刑政盡矣其六均賦役曰聖人之大寳曰位何以守位曰仁何以聚人曰財明先王必以財聚人以仁守位國而無財位不可守是故五三以來皆有征稅之法雖輕重不同而濟用一也今逆寇未平軍用資廣雖未遑減省以䘏民瘼然令平均使下無匱夫平均者不捨豪強而徵貧弱不縱姦巧而困愚拙此之謂均也故聖人曰蓋均無貧然財貨之生其功不易織絍紡績起於有漸非旬日之間所可造次必須勸課使預營理絹鄉先事織絍麻土早修紡績先時而備至時而輸故王賦獲供下民無困如其不預勸戒臨時迫切復恐稽緩以為已過捶扑交至取辦目前富商大賈縁兹射利有者從之貴買無者舉之與息輸稅之民於是弊矣租稅之時雖有大式至於斟酌貧富差次先後皆事起於正長而繫之於守令若斟酌得所則政和而民恱若檢理無方則吏姦而民怨又差發徭役多不存意致令貧弱者或重徭而逺戍富強者或輕使而近防守令用懐如此不存䘏民之心皆王政之罪人也令百司習誦之其牧守令長非通六條及計帳者不得居官後周明帝武成元年六月以霖雨詔百官上封事車騎將軍左光禄大夫樂遜陳時宜一十四條其五切於政要其一崇治方曰竊惟今之在官者多求清身克濟不至惠民愛物何者比來守令年期既促歲責有成蓋謂猛濟為賢未甚優養此政既代後者復然夫政之於民過急則刻薄傷緩則弛慢是以周失舒緩秦敗急酷民非赤子當以赤子遇之宜在舒疾得中不使勞擾頃承魏之衰政人習逋違先王朝憲備行民咸識法但可宣風正俗納民軌訓而已自非軍旅之中何用過為迫切至於興邦致治事由徳教漸以成之非在倉卒竊謂􅁎周盛徳治興文武政穆成康自斯厥後不能無事昔申侯將奔楚子誨之曰無適小國言以政狹法峻將不汝容敬仲入齊稱曰幸若獲宥及於寛政然關東諸州淪陷日乆人在塗炭當慕息肩若不布政優優聞諸境外将何以使彼勞民歸就樂土其二省造作曰頃者魏都洛陽一時殷盛貴勢之家各營第宅車服器玩皆尚奢靡世逐浮競人習澆薄終使禍亂交興天下䘮敗比來朝貴器服稍華百工造作務盡奇巧臣誠恐物逐好移有損政俗如此等事頗宜禁省記言無作滛巧以蕩上心𫝊稱宫室崇侈民力彫弊漢景有云黄金珠玉饑不可食寒不可衣彫文刻鏤傷農事者也錦繡纂組害女紅者也以二者為饑寒之本源矣然國家非為軍戎器用時事要須而造者皆徒費功力損國害民未如廣勸農桑以衣食為務使國儲豐積大功易舉其三明選舉曰選曹賞録勲賢補擬官爵必宜與衆共之有明揚之授使人得盡心如覩白日其材有升降其功有厚薄禄秩所加無容不審即如州郡選置猶集鄉閭況天下選曹不取物望若選置州郡自可内除此外付曹銓者既非機事何足可密人生處世以榮禄為重修身履行以纂身為名然逢時既難失時為易其選置之日宜令衆心明白然後呈奏使功勤見知品物稱恱其四重戰伐曰魏祚告終天睠有徳而髙洋稱僭先迷未改擁逼山東事切肘腋譬猶棊刼相持爭行先從若一行非當或成彼利誠應捨小營大先保封域不宜貪利在邊輕為興動捷則勞兵分守敗則所損已多國家雖強洋不受弱詩云徳則不競何憚於病唯徳可以庇民非恃強也夫力均勢敵則進徳者勝君子道長則小人道消故昔之善戰者先為不可勝以待敵之可勝彼行暴戾我則寛仁彼為刻薄我必惠化徳澤旁流人思有道然後觀釁而作可以集事其五禁奢侈曰按禮人有貴賤物有等差使用之有節品𩔖之有度馬后為天下母而身服大練所以率下也季孫相三君矣家無衣帛之妾所以勵俗也比來富室之家為意稍廣無不資裝婢𨽻作車後容儀服飾華美眩曜街衢仍使行者較足路人傾蓋論其輸力公家未若介冑之士然其坐受爵賞有踰攻戰之人縱令不惜功費豈不有虧清徳必有儲蓄之餘孰與務恤軍士魯莊公有云衣食所安不敢愛也必以分人詩言豈曰無衣與子同袍皆所以取人力也又陳事上議之徒亦應不少當有上徹天聽者未聞是非陛下雖念存物議欲盡天下之情而天下之情猶為未盡何者取人受言貴在顯用若納而不顯是而不用則言之者或寡矣宣帝昏暴滋甚京兆郡丞顔運乃輿櫬詣朝堂陳帝八失一曰内史御正職在弼諧皆須參議共治天下大尊比來小大之事多獨斷之堯舜至聖尚資輔弼比大尊未為聖主而可專恣巳心凡諸刑罰爵賞爰及軍國大事請參諸宰輔與衆共之二曰内作色荒古人重誡大尊初臨四海徳惠未洽先捜天下美女用實後宫又詔儀同以上女不許輙嫁貴賤同怨聲溢朝野請姬媵非幸御者放還本族欲嫁之女勿更禁之三曰天子未明求衣日旰忘食猶恐萬機不理天下擁滯大尊比來一入後宫數日不出所須聞奏多附内豎傳言失實是非可懼事由宦者亡國之徵請准髙祖居外聽政四曰變故易常乃為政之大忌嚴刑酷罰非致治之𢎞規若罰無定刑則天下皆懼政無常法則民無適從豈有削嚴刑之詔未及半祀便即追改更嚴前制政令不定乃至於是今宿衞之官有一人夜不直者罪至削除因而逃亡者遂便籍沒此則大逆之罪與十杖同科雖為法愈嚴恐人情愈散一人心散尚或可止若天下皆散將如之何秦網密而國亡漢章疎而祚永請遵輕典並依大律則億兆之民手足有所措矣五曰髙祖斵雕為朴本欲傳之萬世大尊朝夕趨庭親承聖㫖豈有崩未逾年而遽窮奢麗成父之志義豈然乎請興造之際務從卑儉雕文刻鏤一切勿營六曰都下之民徭賦稍重必是軍國之要不敢憚勞豈容朝夕徵求唯供魚龍爛漫士民從役祇為俳優角抵紛紛不巳財力俱竭業業相顧無復聊生凡此無益之事請並停罷七曰近見有詔上書字誤者即治其罪假有忠讜之人欲陳時事尺有所短文字非工不密失身義無假手脫有舛謬便陷嚴科嬰徑尺之鱗其事非易下不諱之詔猶懼未來更加刑􅓍能無鉗口大尊縱不能採誹謗之言無宜杜獻書之路請停此詔則天下幸甚八曰昔桑榖生朝殷王因之獲福今𤣥象垂誡此亦興周之祥大尊雖減膳撤懸未盡銷譴之理誠願諮諏善道修布徳政解兆民之愠引萬方之罪則天變可除鼎業方固大尊若不革兹八事臣見周廟不血食矣帝大怒將􅓍之内史元巖紿帝曰運知書奏必死所以不顧身命者欲取後世之名陛下若殺之乃成其名也帝然之因而獲免翌日帝頗感悟召運謂之曰朕昨夜思卿所奏實忠臣先皇明聖卿數有規諫朕既昏暗卿復能如此乃賜御食以罷之隋髙祖時柳彧為治書侍御史見上勤於聽受百寮奏請多有煩碎彧上疏諫曰臣聞自古聖帝莫過唐虞象地則天布政施化不為叢脞是謂欽明語曰天何言哉四時行焉故知人君出令誡在繁數是以舜任五臣堯咨四岳設官分職各有司存垂拱無為天下以治所謂勞於求賢逸於任使又云天子穆穆諸侯皇皇此言君臣上下體裁有别比見四海一家萬機務廣事無大小咸關聖聽陛下留心治道無憚疲勞亦由羣官懼罪不能自決取判天㫖聞奏過多乃至營造細小之事出給輕微之物一日之内酬答百司至乃日旰忘食夜分未寢動以文簿憂勞聖躬伏願思臣至言少減煩務以怡神為意以養性為懐思武王安樂之義念文王勤憂之理若其經國大事非臣下裁斷者伏願詳決自餘細務責成所司則聖體盡無疆之夀臣下䝉覆育之賜也上覽而嘉之歴代名臣奏議巻二十六
