body:
  text: 歴代名臣奏議巻二十三明楊士奇等撰治道周武王問於太公曰賢君治國何如對曰賢君之治國其政平其吏不苛其賦斂莭其自奉薄不以私善害公法賞賜不加於無功刑罰不施於無罪不因喜以賞不因怒以誅害民者有罪進賢舉過者有賞後宫不荒女謁不聽上無婬慝下不隂害不幸宫室以費財不多觀㳺䑓池以罷民不雕文刻鏤以逞耳目官無腐蠧之藏國無流餓之民此賢君之治國也武王曰善哉成王問政於尹逸曰吾何徳之行而民親其上對曰使之以時而敬順之忠而愛之布令信而不食言王曰其度安至對曰如臨深淵如履薄氷王曰懼哉對曰天地之間四海之内善之則畜也不善則讎也夏殷之臣反讎桀紂而臣湯武夙沙之民自攻其主而歸神農氏此君之所明知也若何其無懼也齊桓公田至麥丘見麥丘邑人問之子何為者也對曰麥丘邑人也公曰年幾何對曰八十有三矣公曰美哉壽乎子其以子壽祝寡人麥丘邑人曰祝主君使主君甚壽金玉是賤人為寶桓公曰善哉至徳不孤善言必再吾子其復之麥丘邑人曰祝主君使主君無羞學惡下問賢者在傍諫者得人桓公曰善哉至徳不孤善言必三吾子一復之麥丘邑人曰祝主君使主君無得罪於群臣百姓桓公怫然作色曰吾聞之子得罪於父臣得罪於君未嘗聞君得罪於臣者也此一言者非夫二言者之匹也子更之麥丘邑人坐拜而起曰此一言者夫二言之長也子得罪於父可以因姑姊叔父而解之父能赦之臣得罪於君可以因便辟左右而謝之君能赦之昔桀得罪於湯紂得罪於武王此則君之得罪於其臣者也莫為謝至今不赦公曰善頼國家之福社稷之靈使寡人得吾子於此扶而載之自御以歸禮之於朝封之以麥丘而斷政焉桓公謂管仲曰吾欲舉事於國昭然如日月無愚夫愚婦皆曰善可乎仲曰可然非聖人之道桓公曰何也對曰夫短綆不可以汲深井知鮮不可以與聖人之言慧士可與辨物智士可與辨無方聖人可與辨神明夫聖人之所為非衆人之所及也民知十己則尚與之争曰不如吾也百己則疵其過千己則誰而不信是故民不可稍而掌也可并而牧也不可暴而殺也可麾而致也衆不可戸說也可舉而示也景公問於孔子曰秦穆公其國小處僻而覇何也對曰其國小而志大雖處僻而其政中其舉果其謀和其令不偷親舉五羖大夫於係縲之中與之語三日而授之政以此取之雖王可也覇則小矣晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人将加大誅于子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪臣今臣之後治東阿也屬託行貨賂至并㑹賦斂倉庫少内便事左右陂池之魚入於權家當此之時飢者過半矣君乃反迎而賀臣愚不能復治東阿願乞骸骨避賢者之路再拜便辟景公乃下席而謝之曰子強復治東阿東阿者子之東阿也寡人無復與焉齊侯與晏子坐于路寢公歎曰羙㦲室其誰有之乎晏子曰敢問何謂也公曰吾以為在徳對曰如君之言其陳氏乎陳氏雖無大徳而有施於民豆區釡鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無徳與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善㦲是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善㦲我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聼禮也君令而不違臣共而不貳父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而従婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以為其民也是以先王上之騶忌子以鼔琴見威王威王說而舍之右室須􅁷王鼔琴騶忌子推戸入曰善哉鼔琴王勃然不說去琴按劒曰夫子見容未察何以知其善也騶忌子曰夫大絃濁以春温者君也小絃㢘折以清者相也琴操曰大絃者君也寛和而温小絃者臣也清㢘而不亂攫之深徐廣曰以爪持也攫音已足反醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不恱曰若夫語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大絃濁以春温者君也小絃㢘折以清者相也攫之深而醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民者無若乎五音者王曰善騶忌子見三月而受相印宣王謂尹文曰人君之事何如尹文對曰人君之事無為而能容下夫事寡易従法省易因故民不以政獲罪也大道容衆大徳容下聖人寡為而天下理矣書曰睿作聖詩人曰岐有夷之行子孫其保之宣王曰善晉獻公之時東郭民有祖朝者上書獻公曰草茅臣東郭民祖朝願請聞國家之計獻公使使出告之曰肉食者已慮之矣藿食者尚何與焉祖朝對曰大王獨不聞古之将曰桓司馬者朝朝其君舉而晏御呼車􅆖亦呼車御肘其􅆖曰子何越云為乎何為藉呼車􅆖謂其御曰當呼者呼乃吾事也子當御正子之轡銜耳子今不正轡銜使馬卒然驚妄轢道中行人必逢大敵下車免劒涉血履肝者固吾事也子寧能辟子之轡下佐我乎其罪亦及吾身與有深憂吾安得無呼車哉今大王曰食肉者已慮之矣藿食者尚何與焉設使食肉者一旦失計於朝堂之上若臣䓁之藿食者寧得無肝膽塗地於中原之野與其亦及臣之身與有其憂深臣安得無與國家之計乎獻公召而見之三日與語無復憂者乃立以為師也文公時翟人有封狐文豹之皮者文公喟然歎曰封狐文豹何罪哉以其皮為罪也大夫欒枝曰地廣而不平財聚而不散獨非狐豹之罪乎文公曰善哉説之欒枝曰地廣而不平人将平之財聚而不散人将争之於是列地以分民散財以賑貧平公問於師曠曰人君之道如何對曰人君之道清净無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘於左右廓然逺見踔然獨立屢省考績以臨臣下此人君之操也平公曰善平公閒居師曠侍坐平公曰子生無目联甚矣子之墨墨也師曠對曰天下有五墨墨而臣不得與一焉平公曰何謂也師曠曰群臣行賂以采名譽百姓侵寃無所告訴而君不悟此一墨墨也忠臣不用用臣不忠下才處髙不肖臨賢而君不悟此二墨墨也姦臣欺詐空虚府庫以其少才覆塞其惡賢人逐姦邪進而君不悟此三墨墨也國貧民罷上下不和而好財用兵嗜欲無厭諂䛕之人庸庸在傍而君不悟此四墨墨也至道不明法令不行吏民不正百姓不安而君不悟此五墨墨也國有五墨墨而不危者未之有也臣之墨墨小墨墨耳何害乎國家哉秦昭王時客卿范睢請間說曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽髙陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穰侯出使不報華陽涇陽䓁擊斷無諱高㖫進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安不傾令安得従王出乎臣聞善治國者乃内固其威而外重其權穰侯使者操王之重決制於諸侯剖符於天下攻敵伐國莫敢不聼戰勝攻取則利歸於陶國弊御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋縣之於廟梁宿昔而死李兊管趙囚主父於沙丘百日而餓死今臣聞秦太后穰侯用事髙陵華陽涇陽佐之卒無秦王此亦淖齒李兊之𩔖也且夫三代之所以亡國者君専授政馳騁弋獵不聼政事其所授者妒賢嫉能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼曰善於是廢太后逐穰侯髙陵華陽涇陽君於闗外秦王乃拜范睢為相魯哀公問孔子曰寡人生乎深宫之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子避席曰吾君之問乃聖君之問也丘小人也何足以言之哀公曰否吾子就席微吾子無所聞之矣孔子就席曰然君入廟門升自阼階仰見榱棟俯見几筵其噐存其人亡君以此思哀則哀将安不至矣君昧爽而􅌨冠平旦而聼朝一物不應亂之端也君以此思憂則憂将安不至矣君平旦而聼朝日昃而退諸侯之子孫必有在君之門庭者君以此思勞則勞将安不至矣君出魯之四門以望魯之四郊亡國之墟列必有數矣君以此思懼則懼将安不至矣􅉌聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危将安不至矣夫執國之柄履民之上懔乎如以腐索御奔馬易曰履虎尾詩曰如履薄氷不亦危乎哀公再拜曰寡人雖不敏請事此語矣衛靈公謂孔子曰有語寡人為國家者謹之於廟堂之上而國家治矣其可乎孔子曰可愛人者則人愛之惡人者則人惡之知得之己者亦知得之人所謂不出於環堵之室而知天下者知反之己者也靈公問於史鰌曰政孰為務對曰大理為務聽獄不中死者不可生也斷者不可屬也故曰大理為務少焉子路見公公以史鰌言告之子路曰司馬為務兩國有難兩軍相當司馬執枹以行之一鬭不當死者數萬以殺人為非也此其為殺人亦衆矣故曰司馬為務少焉子貢入見公公以二子言告之子貢曰不識哉昔禹與有扈氏戰二陳而不服禹於是脩教一年而有扈氏請服故曰去民之所事奚獄之所聽兵革之不陳奚鼔之所鳴故曰教為務也魏武侯問元年於吳子吳子對曰言國君必慎始也慎始奈何曰正之正之奈何曰明智智不明何以見正多聞而擇焉所以明智也是故古者君始聽治大夫而言士而一見庶人有謁必達公族請問必語四方至者勿距可謂不壅蔽矣分祿必及用刑必中君心必仁思君之利除民之害可謂不失民衆矣君身必正近臣必選大夫不兼官執民柄者不在一族可謂不權埶矣此皆春秋之意而元年之本也漢高帝時大中大夫陸賈時時前說稱詩書高帝罵之曰迺公居馬上而得之安事詩書陸賈曰居馬上得之寧可以馬上治之乎且湯武逆取而順守之文武並用長乆之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏趙氏秦姓也鄉使秦已并天下行仁義法先聖陛下安得而有之文帝時賈山言治亂之道借秦為諭名曰至言其辭曰臣聞為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士修身於内成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數百姓任罷任為役事也罷讀曰疲任疲言疲於役使也赭衣半道群盜滿山犯罪者則衣赭衣使天下之人戴目而視傾耳而聼一夫大謼天下嚮應者陳勝是也嚮讀曰響秦非徒如此也起咸陽而西至雍離宫三百離宫者皆謂於別處置之非常所居也鍾鼓帷帳不移而具又為阿房之殿殿高數十仭東西五里南北千歩從車羅綺四馬騖馳旌旗不橈橈屈也為宫室之麗至於此使其後世曽不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十歩三丈而樹厚築其外隠以金椎作壁如甬道隠築也以鐡椎築之築令堅實而使隆高耳不為甬壁也隠於斳反樹以青松為馳道之麗至於此使其後世曽不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉三重之泉言其深也合采金石冶銅錮其内漆塗其外被以珠王飾以翡翠中成觀游上成山林為葬薶之侈至於此使其後世曽不得蓬顆蔽冢而託𦵏焉秦以熊羆之力虎狼之心吞食諸侯并吞海内而不䔍禮義故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中臣聞忠臣之事君也言切直則不用而身危不切直則不可以明道故切直之言明主所欲急聞忠臣之所以䝉死而竭知也地之磽者雖有善種不能生焉江臯河瀕雖有惡種無不猥大昔者夏商之季世雖闗龍逢箕子比干之賢身死亡而道不用文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善飬禾君之仁者善飬士雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也埶重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又迺况於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦箴諫瞽誦詩諫公卿比諫比方事𩔖以諫也士傳言諫過庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之内其義莫不為臣然而飬三老於太學親執醤而餽執爵而酳進食曰餽酳者少少飲酒謂食已而蕩口也祝䭇在前祝鯁在後饐字謂食不下也以老人好饐故為備以祝之公卿奉杖大夫進履舉賢以自輔弼求脩正之士使直諫故以天子之尊尊飬三老視孝也立輔弼之臣者恐驕也置直諌之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗已而改之從善無不聼也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為闗塞秦地之固大小之埶輕重之權其與一家之富一夫之彊胡可勝計也然而兵破於陳渉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也昔者周盖千八百國以九州之民飬千八百國之君用民之力不過嵗三日什一而藉君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自飬力罷不能勝其役財盡不能勝其求罷讀曰疲一君之身耳所以自飬者馳騁弋獵之娛天下弗能供也勞罷者不得休息飢寒者不得衣食亡罪而死刑者無所告訴人與之為怨家與之為讐故天下壊也秦皇帝身在之時天下已壊矣而弗自知也秦皇帝東廵狩至㑹稽琅邪刻石著其功自以為過堯舜統縣石鑄鍾虡縣稱也石百二十斤稱銅鐡之斤石以鑄鍾虡言其奢泰也虡猛獸之名謂鍾鼔之柎飾為此獸虡音距篩土築阿房之宫自以為萬世有天下也古者聖王作謚三四十世耳雖堯舜禹湯文武絫世廣徳絫古累字以為子孫基業無過二三十世也秦皇帝曰死而以謚法是父子名號有時相襲也以一至萬則世世不相復也復重也故死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功徳度其後嗣世世無窮然身死纔數月耳天下四靣而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡飬老之義亡輔弼之臣亡進諫之士縱恣行誅退誹謗之人殺直諫之士是以道諛媮合茍容比其徳則賢於堯舜課其功則賢於湯武天下已潰而莫之告也詩曰匪言不能胡此畏忌聼言則對譛言則退此之謂也又曰濟濟多士文王以寧天下未嘗無士也然而文王獨言以寧者何也文王好仁則仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數死則往弔哭之臨其小斂大斂已棺塗而後為之服錫衰麻絰涂謂塗殯也錫衰十五升布無事其縷者也而三臨其䘮未斂不飲酒食肉未𦵏不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功徳立於後世而令聞不忘也今陛下念思祖考術追厥功術亦作述圖所以昭光洪業休徳使天下舉賢良方正之士天下皆訢訢焉訢讀與欣同曰将興堯舜之道三王之功矣天下士莫不精白以承休徳今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳敺射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聼樂減外徭衛卒止嵗貢省廐馬以賦縣傳去諸苑以賦農民出帛十萬餘匹以振貧民禮髙年九十者一子不事八十者二筭不事一子不事蠲其賦役二筭不事免一口之筭賦也賜天下男子爵大臣皆至公卿發御府金賜大臣宗族無不被澤者赦罪人憐其無髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜是以元年膏雨降五榖登此天之所以相陛下也刑輕於他時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而往聼之願少須㬰毋死思見徳化之成也今功業方就名聞方昭四方鄉風鄉讀曰嚮今從豪俊之臣方正之士直與之日日獵射擊兔伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏嵗二月定明堂造太學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴㳺方正修絜之士不得從射獵使皆務其方以高其莭則群臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壊而榮日滅矣夫士修之於家而壊之於天子之廷臣竊愍之陛下與衆臣宴逰與大臣方正朝廷論議夫㳺不失樂朝不失禮議不失計軌事之大者也上嘉納其言文帝時天下初定制度踈闊梁懐王太傅雒陽賈誼數上䟽陳政事多所欲匡建其大略曰臣竊惟事埶可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難徧以疏舉進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寝其上火未及然因謂之安方今之埶何以異此夲末舛逆首尾衡決國制搶攘非甚有紀胡可謂治陛下何不壹令臣得熟數之於前因陳治安之策試詳擇焉夫射獵之娛與安危之機孰急使為治勞智慮苦身體乏鍾鼔之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保首領匃奴賔服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海内之氣清和咸理生為明帝沒為明神名譽之羙垂於無窮禮祖有功而宗有徳使顧成之廟稱為太宗上配太祖與漢亡極建久安之埶成長治之業以承祖廟以奉六親至孝也以幸天下以育群生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得䝉業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也其具可素陳於前願幸無忽臣謹稽之天地驗之往古按之當今之務日夜念此至熟也雖使禹舜復生為陛下計亡以易此夫樹國固必相疑之埶下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過徳澤有加焉猶尚如是況莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壮漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黄帝曰日中必􅡢操刀必割􅡢音衛日中盛者必暴􅡢也謂暴曬之也今令此道順而全安甚易不肯早為已迺墮骨肉之屬而抗剄之豈有異秦之季世虖夫以天子之位乗今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處将不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳狶在代令此六七公者皆無恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下殽亂高皇帝與諸公併起非有仄室之埶以豫席之也諸公幸者乃為中㳙其次厪得舍人廑劣也材之不逮至逺也高皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣惪至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自高皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼恵王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆無恙當是時陛下即位能為治虖臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死辠甚者或戴黄屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啟其口七首已陷其胷矣陛下雖賢誰與領此故疏者必危親者必亂已然之效也其異姓負彊而動者漢已幸勝之矣又不易其所以然同姓襲是跡而動既有徵矣其埶盡又復然殃旤之變未知所移明帝處之尚不能以安後世将如之何屠牛坦一朝解十二牛坦屠牛者之名也而芒刃不頓者頓謂曰鈍所排擊剥割皆衆理觧也至於髖髀之所非斤則斧夫仁義㤙厚人主之芒刃也權埶法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北埶不可也臣竊跡前事大抵彊者先反淮隂王楚最彊則最先反韓信倚胡則又反貫高因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙迺在二萬五千户耳功少而最完埶疏而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子之勿菹醢則莫若令如樊酈䓁欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海内之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼恵王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁它國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之衆天子亡所利焉誠以定治而已故天下咸知陛下之廉地制壹定宗室子孫莫慮不王下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫高利機之謀不生柴奇開章之計不萌細民鄉善大臣效順故天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘而天下不亂置遺腹朝委裘皆未有所知也當時大治後世誦聖壹動而五業附陛下誰憚而久不為此天下之埶方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指搐身慮亡聊搐謂動而痛也失今不治必為錮疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盭􅏓古蹠字足下曰蹠今所呼脚掌是也盭古戾字言足蹠反戾不可行也元王之子帝之從弟也今之王者從弟之子也恵王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以偪天子臣故曰非徒病瘇也又苦􅏓盭可痛哭者此病是也天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匃奴嫚娒侵掠至不敬也為天下患至亡已也而漢嵗致金絮采繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能觧猶為國有人乎非亶倒縣而已亶讀曰但又𩔖辟且病痱辟足病痱風辟音辟痱音肥夫辟者一靣病痱者一方痛今西邉北邉之郡雖有長爵不輕得復五尺以上不輕得息斥侯望烽燧不得卧将吏被介胄而睡臣故曰一方病矣醫能治之而上不使醫者誼自謂可為流涕者此也陛下何忍以帝皇之號為戎人諸侯埶既卑辱而旤不息長此安窮進謀者率以為是固不可觧也亡具甚矣臣竊料匃奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主匃奴行臣之計請必係單于之頸而制其命伏中行說而笞其背舉匃奴之衆唯上之令今不獵猛敵而獵田彘不搏反寇而搏畜菟翫細娛而不圖大患非所以為安也徳可逺施威可逺加而直數百里外威令不信可為流涕者此也今民賣僮者為之繡衣􅁝履偏諸縁加牙條以作履縁偏諸若今之織成以為要攀及標領者也古謂之車馬裠其上為乗車及騎從之象也内之閑中閑賣奴婢闌是古天子后服所以廟而不宴者也入廟則服之宴處則不着盖貴之也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸偏諸緁着衣也緁音妾謂以偏諸緶着之也羙者黼繡黼者織為斧形繡者刺為衆文是故天子之服今庻人大賈嘉㑹召客者以被牆古者以奉一帝一后而莭適今富人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皁綈綈厚繒也而富民牆屋被文繡天子之后以縁其領庶人㜸妾縁其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡䓁也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壮則出分家貧子壮則出贅借父耰鋤慮有徳色耰摩田器也言以耰及鉏借與其父而容色自矜為恩徳也母取箕箒立而誶語誶責讓也誶音碎抱哺其子與公併倨言婦抱子而哺之乃與其舅併倨無禮之甚也婦姑不相說則反脣而相稽稽計也相與計校也其慈子耆利不同禽獸者亡幾耳然并心而赴時猶曰蹶六國兼天下功成求得矣終不知反㢘愧之莭仁義之厚信兼并之法遂進取之業信讀曰仲一曰信任天下大敗衆掩寡智欺愚勇威怯壮陵衰其亂至矣是以大賢起之威震海内徳從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮義捐㢘耻日甚可謂月異而嵗不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寝戸之簾剟謂割取之也剟音輟搴兩廟之噐搴取也兩廟高祖恵帝廟也音騫白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乗傳而行郡國此其亡行義之先至者也而大臣特以簿書不報期㑹之間以為大故至於俗流失世壊敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而鄉道𩔖非俗吏之所能為也俗吏之所務任於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣䓁上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壊筦子曰禮義㢘耻是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凢十三嵗而社稷為虗虗讀曰墟今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人無所幾幸而群臣衆信上不疑惑此業壹定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波舩必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子迺生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王㓜在襁抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之惪義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也宴謂安居故迺孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子迺生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所耆必先受業迺得嘗之擇其所樂必先有習迺得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疎有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴徳則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有䓁而下不踰矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則惪智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌進善言者立於旌下誹謗之木譏惡事者書之於木敢諫之鼔欲顯諫者則擊鼔瞽史誦詩工誦箴諫大夫進謀士𫝊民語習與智長故切而不媿化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醤而親餽之所以明有孝也行以鸞和歩中采齊趣中肆夏趣讀曰趨所以明有度也其於禽獸見其生不食其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍跡可見也然而不避是後車又将覆也夫存亡之變治亂之機其要在是矣天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而巳夫胡粤之人生而同聲耆欲不異及其長而成俗累數譯而不能相通行者雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見已然不能見将然夫禮者禁於将然之前而法者禁於已然之後是故法之所用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺辠而不自知也孔子曰聽訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或敺之以法令道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其徳行六七百嵗而弗失秦王治天下十餘嵗則大敗此亡它故也湯武之定取舍審而秦王之定取舍不審矣夫天下大噐也今人之置器置諸安䖏則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而徳澤洽禽獸草木廣裕徳被蠻貊四夷累子孫數十世此天下所共聞也秦王置天下於法令刑罰徳澤亡一有而怨毒盈於世下憎惡之如仇讎禍幾及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂群臣如陛衆庶如地故陛九級上㢘逺地則堂髙級䓁也㢘側隅也陛無級㢘近地則堂卑高者難攀卑者易陵理埶然也故古者聖王制為等列内有公卿大夫士外有公侯伯子男然後有官師小吏官師二官之長延及庶人䓁級分明而天子加焉故其尊不可及也里諺曰欲投䑕而忌器此善諭也䑕近於噐尚憚不投恐傷其噐況於貴臣之近主乎㢘耻節禮以治君子故有賜死而亡戮辱是以黥劓之罪不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乗車則下入正門則趋君之寵臣雖或有過刑戮之辠不加其身者尊君之故也此所以為主上豫逺不敬也所以體貌大臣而厲其莭也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庶同黥劓髠刖笞傌棄市之法然則堂不亡陛虖被戮辱者不泰迫乎㢘耻不行大臣無迺握重權大官而有徒𨽻亡耻之心虖夫望夷之事二世見當以重法者決罪曰當閻樂殺二世於望夷宫本由秦制無忌上之風也投䑕而不忌噐之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履夫甞已在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司冦編之徒官司冦小吏詈罵而搒笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦迺可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安冝得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁靣吞炭必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讐行若狗彘已而抗莭致忠行出乎列士人主使然也故主上遇其大臣如遇犬馬彼将犬馬自為也如遇官徒彼将官徒自為也頑頓亡耻奊詬亡莭奊詬謂無志分也奊音胡結反詬音后㢘耻不立且不自好茍若而可故見利則逝見便則奪主上有敗則因而挻之矣主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主将何便於此群下至衆而主上至少也所託財噐職業者粹於群下也俱亡耻俱茍妄則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之莭也古者大臣有坐不㢘而廢者不謂不㢘曰簠簋不飾坐汙穢淫亂男女亡別者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其辠矣猶未斥然正以謼之也尚遷就而為之諱也故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請辠耳上不執縛係引而行也其有中罪者聞命而自弛上不使人頸盭而加也其有大辠者聞命則北靣再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故群臣自憙嬰以㢘耻故人矜莭行上設㢘耻禮義以遇其臣而臣不以莭行報其上者則非人𩔖也故化成俗定則為人臣者主耳忘身國耳忘家公耳㤀私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫将為我危故吾得與之皆安顧行而忘利守莭而伏義故可以託不御之權可以寄六尺之孤此厲㢘耻行禮義之所致也主上何䘮焉此之不為顧彼之久行故曰可為長太息者此也上深納其言時文帝詔有司舉賢良文學士太子家令晁錯在選中上親䇿詔之曰惟十有五年九月壬子皇帝曰昔者大禹勤求賢士施及方外四極之内舟車所至人迹所及靡不聞命以輔其不逮近者獻其明逺者通厥聦比善勠力以翼天子是以大禹能無失徳夏以長楙高皇帝親除大害去亂従並建豪英以為官師為諫争輔天子之􅇅而翼戴漢宗也頼天之靈宗廟之福方内以安澤及四夷今朕獲執天子之正以承宗廟之祀朕既不徳又不敏明弗能燭而智不能治此大夫之所著聞也故詔有司諸侯王三公七卿及主郡吏各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數将以􅋌朕之不逮二三大夫之行當此三道朕甚嘉之故登大夫于朝親諭朕志大夫其上三道之要及永惟朕之不徳吏之不平政之不宣民之不寧四者之􅇅悉陳其志母有所隠上以薦先帝之宗廟下以興愚民之休利著之于篇朕親覽焉觀大夫所以佐朕至與不至書之周之宻之重之閉之興自朕躬大夫其正論毋枉執事烏虖戒之二三大夫其帥志毋怠錯對曰臣竊聞古之賢主莫不求賢以為輔翼故黄帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得筦子而為五伯長今陛下講于大禹及髙皇帝之建豪英也退託於不明以求賢良讓之至也臣竊觀上世之傳若髙皇帝之建功業陛下之徳厚而得賢佐皆有司之所覽刻于玉版藏於金匱厯之春秋紀之後世為帝者祖宗與天地相終今臣窋䓁迺以臣錯充賦甚不稱明詔求賢之意臣錯屮茅臣亡識知昧死上愚對曰詔䇿曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處于法宫之中明堂之上動静上配天下順地中得人故衆生之𩔖亡不覆也根著之徒亡不載也燭以光明亡偏異也徳上及飛鳥下至水蟲草木諸產皆被其澤然後隂陽調四時莭日月光風雨時膏露降五榖熟妖孽滅賊氣息民不疾疫河出圖洛出書神龍至鳯鳥翔徳澤滿天下靈光施四海此謂配天地治國大體之功也詔䇿曰通於人事終始愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲夀三王生之而不傷人情莫不欲富三王厚之而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王莭其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以己内恕及人情之所惡不以強人情之所欲不以禁民是以天下樂其政歸其徳望之若父母従之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔䇿曰直言極諫愚臣竊以五伯之臣明之臣聞五伯不及其臣故属之以國任之以事五伯之佐之為人臣也察身而不敢誣奉法令不容私盡心力而不敢矜遭患難不避死見賢不居其上受祿不過其量不以無能居尊顯之位自行若此可謂方正之士矣其立法也非以苦民傷衆而為之機陷也以之興利除害尊主庇民而救暴亂也其行賞也非虚取民財妄予人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此歛民財以顧其功而民不恨者知與而安己也其行罰也非以忿怒妄誅而從暴心也以禁天下不忠不孝而害國者也故辠大者罰重辠小者罰輕如此民雖伏罪至死而不怨者知罪罰之至自取之也立法若此可謂平正之吏矣法之逆者請而更之不以傷民主行之暴者逆而復之不以傷國救主之失補主之過揚主之美明主之功使主内無邪辟之行外無騫汙之名事君若此可謂直言極諫之士矣此五伯之所以徳匡天下威正諸侯功業甚美名聲章明舉天下之賢主五伯與焉此身不及其臣而使得直言極諫補其不逮之功也今陛下人民之衆威武之重徳恵之厚令行禁止之埶萬萬於五伯而賜愚臣策曰匡朕之不逮愚臣何足以識陛下之髙明而奉承之詔策曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富強夫國富強而隣國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信䜛賊宫室過度耆慾亡極民力罷盡賦斂不莭矜奮自賢群臣恐諛驕溢縱恣不顧患禍妄賞以随喜意妄誅以快怒心法令煩憯刑罰暴酷輕絶人命身自射殺天下寒心莫安其處姦邪之吏乗其亂法以成其威獄官主斷生殺自恣上下瓦觧各自為制秦始亂之時吏之所先侵者貧人賤民也至其中莭所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疎皆危外内咸怨離散逋逃人有走心陳勝先倡天下大潰絶祀亡世為異姓福此吏不平政不宣民不寧之禍也今陛下配天象地覆露萬民絶秦之迹除其亂法躬親本事廢去淫末除苛觧嬈寛大愛人肉刑不用辠人亡帑非謗不治鑄錢者除通闗去塞不孽諸侯接之以禮不以庶孽畜之賔禮長老愛䘏少孤辠人有期後宫出嫁尊賜孝悌農民不租明詔軍師愛士大夫求進方正廢退姦邪除去隂刑害民者誅憂勞百姓列侯就都親耕莭用視民不奢所為天下興利除害變法易故以安海内者大功數十皆上世之所難及陛下行之道純徳厚元元之民幸矣詔策曰永惟朕之不徳愚臣不足以當之詔策曰悉陳其志毋有所隠愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而賢聖不廢也故各當其世而立功徳焉傳曰徃者不可及來者猶可待能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明徳厚資財不下五帝臨制天下至今十有六年民不益富盜賊不衰邉竟未安其所以然意者陛下未之躬親而待群臣也今執事之臣皆天下之選已然莫能望陛下清光譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺也日損一日嵗亡一嵗日月益暮盛徳不及究於天下以傳萬世愚臣不自度量竊為陛下惜之歴代名臣奏議巻二十三
