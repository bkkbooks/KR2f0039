body:
  text: 歴代名臣奏議卷一百六十三明楊士竒等撰選舉晉大夫祁奚老晉君悼公問曰孰可使嗣祁奚對曰解狐可君曰非子之讐邪對曰君問可非問讐也晉遂舉解狐後又問孰可為國尉祁奚對曰午也可君曰非子之子邪對曰君問可非問子也君子謂祁奚能舉善矣稱其讐不為諂立其子不為比書曰無偏無黨王道蕩蕩祁奚之謂也外舉不避仇讐内舉不囬親戚可謂至公矣惟善故能舉其𩔖詩曰惟其有之是以似之祁奚有焉漢武帝元光六年冬十一月有司奏議曰古者諸侯貢士壹適謂之好徳再適謂之賢賢三適謂之有功迺加九錫不貢士一則黜爵再則黜地三而爵地畢黜矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝亷所以化元元移風易俗也不舉孝廉不奉詔當以不敬論不察廉不勝任也當免奏可元帝竟寧元年御史大夫缺在位者多舉馮昭儀兄大鴻臚野王上使尚書選第中二千石而野王行能第一上以問中書令石顯顯對曰九卿無出野王者然親昭儀兄臣恐後世必以陛下度越衆賢私後宫親以為三公也上曰善東漢章帝建初中陳事者多言郡國率非功次故守職易懈而吏事寖疏咎在州郡有詔下公卿朝臣議大鴻臚韋彪上議曰伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以孝行為首孔子曰事親孝則忠可移於君是以求忠臣於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚鍜鍊之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閱然其歸要在於選二千石二千石賢則貢舉皆得其人矣帝深納之和帝永元十四年司空徐防上疏曰漢立博士十有四家設甲乙科以勉學者今大學試博士弟子皆以意說不修家法不依章句妄生穿鑿輕侮道術寖以成俗誠非詔書實選本意改薄從忠三代常道專精務本儒學所先臣以為博士策試宜從其家章句開五十難以試之解釋多者為上第引文明者為髙說若不依先師義有相伐皆正以為非上從之順帝時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏尚書僕射胡廣上書駮之曰臣聞君以兼覽博照為德臣以獻可替否為忠書載稽疑謀及卿士詩美先人詢於蒭蕘國有大政必議之於前訓諮之於故老是以慮無失策舉無過事竊見尚書令左雄議郡舉孝㢘皆限年四十以上諸生試章句文吏試牋奏明詔既許復令臣等得與相叅竊惟王命之重載在篇典當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎歟盖選舉因才無拘定制六竒之䇿不出經學鄭阿之政非必章奏甘竒顯用年乖彊仕終賈揚聲亦在弱冠漢承周秦兼覽殷夏祖德師經叅雜霸軌聖主賢臣世以致理貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不厭矯枉變常政之所重而不訪台司不博卿士若事下之後議者剝異異之則朝失其便同之則王言已行臣愚以為可宣下百官叅其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁惟陛下納焉靈帝時中常侍吕強上言舊典選舉委任三府三府有選叅議掾屬咨其行狀度其器能受試任用責以成功若無可察然後付之尚書尚書舉劾請下廷尉覆按虛實行其誅罰今但任尚書或復勅用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自勞苦乎夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也願陛下詳思臣言不以記過見玼為責書奏不省議郎蔡邕上疏曰伏見幽冀舊壌鎧馬所出比年兵飢漸至空耗今者百姓虛縣萬里蕭條闕職經時吏人掾属而三府選舉踰月不定臣徑恠其事而論者云避三互十一州有禁當取二州而已又二州之士或復限以歳月狐疑遲淹以失事㑹愚以為三互之禁禁之薄者今但申以威靈明其憲令在任之人豈不戒懼而當坐設三互自生留閡邪昔韓安國起自徒中朱買臣出於幽賤並以才宜還守本郡又張敞亡命擢授劇州豈復顧循三互繼以末制乎三公明知二州之要所宜速定當越禁取能以救時敝而不顧爭臣之義茍避輕㣲之利選用稽滯以失其人臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中書奏不省魏明帝時曹植陳審舉之義疏曰臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其𩔖而進矣諺曰相門有相將門有將夫相者文德昭者也將者武功烈者也文德昭則可以匡國朝致雍熙稷契䕫龍是也武功烈則可以征不庭威四夷南仲方叔是也昔伊尹之為媵臣至賤也吕尚之處屠釣至陋也及其見舉於湯武周文誠道合志同𤣥謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是也若夫齷齪近歩遵常守故安足為陛下言哉故陰陽不和三光不暢官曠無人庶政不整者三司之責也疆埸騷動方隅内侵没軍喪衆干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益髙者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天真之淑聖登神機以繼統異聞康哉之謌偃武行文之美而數年以來水旱不時民困衣食師徒之發歳歳増調加東有覆敗之軍西有殪没之將至使蚌蛤浮翔於淮泗鼬讙譁於林木臣每念之未嘗不輟食而揮餐臨觴而搤腕矣昔漢文發代疑朝有變宋昌曰内有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下逺覽姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳阪可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里盖伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也若朝司惟良萬機内理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悅見豺則戰忘其皮之虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕廉頗在楚思為趙將臣生乎亂長乎軍又數承教于武皇帝伏見行師用兵之要不必取孫呉而闇與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須臾之問使臣得一散所懷攄舒藴積死不恨矣被鴻臚所下發士息書期會甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾挂神思臣誠竦息不遑寧處願得䇿馬執鞭首當塵露撮風后之竒接孫吳之要追慕卜商起予左右効命先軀畢輪轂雖無大益冀有小補然天髙聽逺情不上通徒獨望青雲而拊心仰髙天而歎息耳屈平曰國有驥而不知乘焉皇皇而更索昔管蔡放誅周召作弼叔魚陷刑叔向匡國三監之釁臣自當之二南之輔求必不逺華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事唯陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕盖取齊者田族非吕宗也分晉者趙魏非姬姓也惟陛下察之茍吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮没同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身逹則兼善天下今臣與陛下踐氷履炭登山浮澗寒温燥溼髙下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂使夫博古之士糾臣表之不合義者如是則臣願足矣帝輒優文答報青龍中諸葛誕鄧颺等馳名譽有四窓八逹之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也吏部尚書盧毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名按常為職但當有以驗其後故古者敷奏以言明試以功今考績之法廢而以毁譽相進退故真偽渾雜虛實相䝉帝納其言晉武帝咸寧初司𨽻校尉劉毅以魏立九品權時之制未見得人而有八損乃上疏曰臣聞立政者以官才為本官才有三難而興替之所由也人物難知一也愛憎難防二也情偽難明三也今立中正定九品髙下任意榮辱在手操人主之威福奪天朝之權勢愛憎決於心情偽由於已公無考校之負私無告訐之忌用心百態求者萬端廉譲之風滅茍且之俗成天下訩訩但爭品位不聞推譲竊為聖朝恥之夫名狀以當才為清品輩以得實為平安危之要不可不明清平者政化之美也枉濫者亂敗之惡也不可不察然人才異能備體者寡器有大小逹有早晩前鄙後脩宜受日新之報抱正違時宜有質直之稱度逺闕小宜得殊俗之狀任直不飾宜得清實之譽行寡才優宜獲器任之用是以三仁殊塗而同歸四子異行而均義陳平韓信笑侮於邑里而收功於帝王屈原伍胥不容於人主而顯名於竹帛是篤論之所明也今之中正不精才實務依黨利不均稱尺務隨愛憎所欲與者獲虛以成譽所欲下者吹毛以求疵髙下逐強弱是非由愛憎隨世興衰不顧才實衰則削下興則扶上一人之身旬日異狀或以貨賂自通或以計協登進附託者必逹守道者困悴無報於身必見割奪有私於已必得其欲是以上品無寒門下品無勢族暨時有之皆曲有故慢主㒺時實為亂源損政之道一也置州都者取州里清議咸所歸服將以鎮異同一言議不謂一人之身了一州之才一人不審便坐之若然自仲尼以上至於庖犧莫不有失則皆不堪何獨責於中人者哉若殊不脩自可更選今重其任而輕其人所立品格還訪刁攸攸非州里之所歸非職分之所置今訪之歸正於所不服決事於所不職以長讒構之源以生乖爭之兆似非立都之本㫖理俗之深防也主者既善刁攸攸之所下而復選以二千石已有數人劉良上攸之所下石公罪攸之所行駮違之論横於州里嫌讎之隙結於大臣夫桑妾之訟禍及吳楚闘雞之變難興魯邦況乃人倫交爭而部黨興刑獄滋生而祻根結損政之道二也本立格之體將謂人倫有序若貫魚成次也為九品者取下者為格謂才德有優劣倫輩有首尾今之中正務自逺者則抑割一國使無上人穢劣下比則拔舉非次并容其身公以為格坐成其私君子無大小之怨官政無繩姦之防使得上欺明主下亂人倫乃使優劣異地首尾倒錯推貴異之器使在凡品之下負戴不肖越在成人之首損政之道三也陛下踐阼開天地之德𢎞不諱之詔納忠直之言以覽天下之情太平之基不世之法也然賞罰自王公以至于庶人無不加法置中正委以一國之重無賞罰之防人心多故清平者寡故怨訟者衆聽之則告訐無已禁絶則侵枉無極與其理訟之煩猶愈侵枉之害今禁訟訴則杜一國之口培一人之勢使得縱横無所顧憚諸受枉者抱怨積直獨不䝉天地無私之德而長壅蔽於邪人之銓使上明不下照下情不上聞損政之道四也昔在前聖之世欲敦風俗鎮靜百姓隆鄉黨之義崇六親之行禮教庠序以相率賢不肖於是見矣然鄉老書其善以獻天子司馬論其能以官其職有司考績以明黜陟故天下之人退而脩本州黨有德義朝廷有公正浮華邪佞無所容厝今一國之士多者千數或流徙異邦或取給殊方面猶不識況盡其才力而中正知與不知其當品狀采譽於臺府納毁於流言任己則有不識之蔽聽受則有彼此之偏所知者以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之譽又非朝廷考績之課遂使進官之人棄近求逺背本逐末位以求成不由行立品不校功黨譽虛妄損政五也凡所以立品設狀者求人才以理物也非虛飾名譽相為好醜雖孝悌之行不施朝廷故門外之事以義斷恩既以在官職有大小事有劇易各有功報此人才之實效功分之所得也今則反之於限當報雖職之髙還附卑品無績於官而獲髙叙是為抑功實而隆虛名也上奪天朝考績之分下長浮華朋黨之士損政六也凡官不同事人不同能得其能則成失其能則敗今品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨繫縶選舉使不得精於才宜況今九品所踈則削其長所親則飾其短徒結白論以為虛譽則品不料能百揆何以得理萬機何以得脩損政七也前九品詔書善惡必書以為褒貶當時天下少有所忌今之九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷清濁同流以植其私故反違前品大其形勢以驅動衆人使必歸已進者無功以表勸退者無惡以成懲懲勸不明則風俗汙濁天下人焉得不解德行而銳人事損政八也由此論之選中正而非其人授權勢而無賞罰或缺中正而無禁檢故邪黨得肆枉濫從横雖職名中正實為姦府事名九品而有八損或恨結於親親猜生於骨肉當身困於敵讎子孫離其殃咎斯乃歷世之患非徒當今之害也是以時主觀時立法防姦消亂靡有常制故周因於殷有所損益至於中正九品上聖古賢皆所不為豈蔽於此事而有不周哉將以政化之宜無取於此也自魏立以來未見其得人之功而生讎薄之累毁風敗俗無益於化古今之失莫大於此愚臣以為宜罷中正除九品棄魏氏之弊法立一代之美制䟽奏優詔答之太康中太子少傅衛瓘以魏立九品且權時之制非經通之道宜復古鄉舉里選與太尉王亮等上䟽曰昔聖王崇賢舉善而教用使朝廷德讓野無邪行誠以閭伍之政足以相檢詢事考言必得其善人知名不可虛求故還脩其身是以崇賢而俗益穆黜惡而行彌篤斯則鄉舉里選者先王之令典也自茲以降此法淩遲魏氏承顛覆之運起喪亂之後人士流移考詳無地故立九品之制粗具一時選用之本耳其始造也鄉邑清議不拘爵位褒貶所加足為勸勵猶有鄉論餘風中間漸染遂計資定品使天下觀望唯以居位為貴人棄德而忽道業爭多少於錐刀之末傷損風俗其弊不細今九域同規大化方始臣等以為宜皆蕩除末法一擬古制以土斷定自公卿以下皆以所居為正無復懸客逺属異土者如此則同鄉鄰伍皆為邑里郡縣之宰即以居長盡除中正九品之制使舉善進才各由鄉論然則下敬其上人安其教俗與政俱清化與法並濟人知善否之教不在交遊即華競自息各求於已矣今除九品則宜準古制使朝臣共相舉任於出才之路既博且可以厲進賢之公心覈在位之明闇誠令典也武帝善之而卒不能改太熙中時燕國中正劉沈舉霍原為寒素司徒府不從沈又抗詣中書奏原而中書復下司徒叅論司徒左長史荀組以為寒素者當謂門寒身素無世祚之資原為列侯顯佩金紫先為人間流通之事晩乃務學少長異業年踰始立草野之譽未洽德禮無聞不應寒素之目李重曰案如癸酉詔書廉譲宜崇浮競宜黜其有履謙寒素靖恭求已者應有以先之如詔書之㫖以二品繫資或失廉退之士故開寒素以明尚德之舉司徒緫御人倫實掌邦教當務峻準評以一風流然古之厲行髙尚之士或栖身巖宂或隠跡邱園或克已復禮或耄期稱道出處黙語唯義所在未可以少長異操疑其所守之美而逺同終始之責非所謂擬人必於其倫之義也誠當考之於邦黨之倫審之於任舉之主沈為中正親執銓衡陳原隠居求志篤古好學學不為利行不要名絶迹窮山藴韣道藝外無希世之容内全遯逸之節行成名立搢紳慕之委質受業者千里而應有孫孟之風嚴鄭之操始舉原先諮侍中領中書監華前州大中正後將軍嬰河南尹軼去三年諸州還朝幽州刺史許猛特以原名聞擬之西河求加徵聘如沈所列州黨之議既舉又刺史班詔表薦如此而猶謂草野之譽未洽德禮無聞舍所徵騐之實而無明理正辭以奪沈所執且應二品非所求備但原定志窮山脩述儒道義在可嘉若遂抑替將負幽邦之望傷敦德之教如詔書所求之㫖應為二品詔從之武帝時重為始平王文學上䟽陳九品曰先王議制以時因革因革之理唯變所適九品始於喪亂軍中之政誠非經國不刋之法也且其檢防轉碎徵刑失實故朝野之論僉謂驅動風俗為弊已甚而至於議改又以為疑臣以革法創制當先盡開塞利害之理舉而錯之使體例大通而無否滯亦未易故也古者諸侯之治分土有常國有定主人無異望卿大夫世禄仕無出位之思臣無越境之交上下體固人德歸厚秦反斯道罷侯置守風俗淺薄自此來矣漢革其弊斟酌周秦並建侯守亦使分土有定而牧司必各舉賢貢士任之鄉議事合聖典比蹤三代方今聖德之隆光被四表兆庶顓顒欣覩太平然承魏氏彫弊之跡人物播越仕無常朝人無定處即吏蓄於軍府豪右聚於都邑事體駁雜與古不同謂九品既除宜先開移徙聽相并就且明貢舉之法不濫於境外則冠帶之倫將不分而自均即土斷之實行矣又建樹官司功在簡久階級少則人心定久其事則政化成而能否著在三代所以直道而行也以為選例九等當今之要所宜施用也聖王知天下之難常從事於其易故寄隠括於閭伍則邑屋皆為有司若任非所由事非所覈則雖竭聖智猶不足以贍其事由此而觀誠令二者既行即人心反本脩之於鄉華競自息而禮讓日隆矣惠帝時重為尚書吏部郎上䟽曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺髙義也昔先帝患風流之弊而思反純朴乃諮詢朝衆搜求隠逸咸寧二年始以太子中庶子徵安定皇甫謐四年又以博士徵安南朱沖太康元年復以太子庶子徵沖雖皆以病疾不至而朝野悅服陛下逺邁先帝禮賢之㫖臣訪沖州邑言其雖年近耋耄而志氣克壯耽道窮藪老而彌新操尚貞純所居成化誠山栖耆德足以表世篤俗者也臣以為宜垂聖恩及其未没顯加優命時朝廷政亂竟不能從懷帝永嘉初尚書左僕射領吏部山簡上䟽曰臣以為自古興替實在官人茍得其才則無物不理書言知人則哲惟帝難之唐虞之盛元愷登庸周室之隆濟濟多士秦漢以來風雅漸喪至於後漢女君臨朝尊官大位出於阿保斯亂之始也是以郭泰許邵之倫明清議於草野陳蕃李固之徒守忠節於朝廷然後君臣名節古今遺典可得而言自初平之元訖於建安之末三十年中萬姓流散死亡畧盡斯亂之極也世祖武皇帝應天順人受禪于魏泰始之初躬親萬機佐命之臣咸皆率職時黄門侍郎王恂庾純始於太極東堂聽政評尚書奏事多論刑獄不論選舉臣以為不先所難而辦其所易陛下初臨萬國人思盡誠毎於聽政之日命公卿大臣先議選舉各言所見後進儁才鄉邑尤異才堪任用者皆以名奏主者隨缺先叙是爵人於朝與衆共之之義也朝廷從之東晉元帝太興初尚書陳頵上陳時務以為昔江外初平中州荒亂故貢舉不試宜漸循舊搜揚隠逸試以經䇿又馬隆孟觀雖出貧賤勲濟甚大以所不習而統戎事鮮能以濟宜開舉武畧任將率者言問核試盡其所能然後隨才授任舉十得一猶勝不舉況或十得二三日磾降虜七世内侍由余戎人入為秦相豈藉華宗之族見齒於奔競之流乎宜引幽滯之儁抑華校實則天清地平人神感應元帝時以兵亂之後務存慰悅逺方秀孝到不䇿試普皆除署至是申明舊制皆令試經有不中科刺史太守免官太興三年秀孝多不敢行其有到者並託疾帝欲除署孝廉而秀才如前制尚書郎孔坦奏議曰臣聞經邦建國教學為先移風崇化莫尚斯矣古者且耕且學三年而通一經以平康之世猶假漸漬積以歳月自喪亂以來十有餘年干戈載揚爼豆禮戢家廢講誦國闕庠序率爾責試竊以為疑然宣下以來渉歴三載累遇慶會遂未一試揚州諸郡接近京都懼累及君父多不敢行其逺州邊郡掩誣朝廷冀於不試冒昧來赴既到審試遂不敢會臣愚以不會與不行其為闕也同若當偏加除署是為肅法奉憲者失分僥倖投射者得官頽風傷教懼於是始夫王言如絲其出如綸臨事改制示短天下人聽有惑臣竊惜之愚以謂王命無貳憲制宜信去年察舉一皆策試如不能試可不拘到遣歸不署又秀才雖以事策亦記問經義茍所未學實難闇通不足復曲碎乖例違舊造謂宜因其不㑹徐更華制可申明前下崇脩學校普延五年以展講習鈞法齊訓示人軌則夫信之與法為政之綱施之家室猶弗可貳況經國之典而可翫黷乎帝納焉後魏孝文帝時秘書令髙佑上䟽曰今之選舉不採識治之優劣專簡年考之多少斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆又勲舊之臣雖年勤可録而才非撫人者則可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也髙祖皆善之帝雅重門族以范陽盧敏清河崔宗伯滎陽鄭羲太原王瓊四姓衣冠所推咸納其女以充後宫又更為六弟聘室而以前所納者為妾媵又詔以代人穆陸賀劉樓于嵇尉八姓勲著當世位盡王公勿充猥官一同四姓其舊為部落大人而三世官在給事已上若本非大人而三世官在尚書已上者皆為姓其大人之後而官不顯若本非大人而官顯者皆為族帝與羣臣論選調李沖曰未審張官列位為膏粱子弟乎為致治乎帝曰欲為治耳沖曰然則今日何為專取門品不拔才能乎帝曰君子之門借使無當世之用要自德行純篤朕故用之沖曰傅説吕望豈可以門地得之帝曰非常之人曠世乃有一二耳李彪曰魯之三卿孰與四科韓顯宗曰陛下豈可以貴襲貴以賤襲賤帝曰必有髙明卓然出𩔖拔萃者朕亦不拘此制孝明帝時崔亮奏立停年之格不簡人才專問勞舊吏部尚書薛琡上書言黎元之命繫於長吏若得其人則蘇息任非其器為患更深若使選曹唯取年勞不簡賢否便義均行雁次若貫魚執簿呼名一吏足矣數人而用何謂銓衡請不依此書奏不報後因引見復諫曰共治天下本属百官是以漢朝常令三公大臣舉賢良方正有道直言之士以為長吏監撫黎元自晉末以來此風遂替今四方初定務在養民臣請依漢氏更立四科令三公貴臣各薦時賢以補郡縣明立條格防其阿黨之端詔下公卿議之事亦寢時任城王澄以北邊鎮將選舉彌輕恐賊虜闚邊山陵危迫奏請重鎮將之選脩警備之嚴詔公卿議之廷尉少卿袁翻議曰比緣邊州郡官不擇人唯論資級或值貪汙之人廣開成邏多置帥領或用其左右姻親或受人貨財請属皆無防宼之心唯有聚斂之意勇力之兵驅令抄掠奪為已富羸弱老小㣲解工作苦役百端伐木芸草販貿徃還窮其力薄其衣用其功節其食綿冬歴夏加之疾苦死於溝瀆者什常七八是以鄰敵伺間擾我疆埸皆由邊任不得其人故也愚謂今後邊鎮郡縣府佐統軍至于戍主皆令王公以下各舉所知必選其才不拘階級稱職敗官所舉之人隨事賞罰時不能用及正光之末北邊盗賊羣起遂迫舊都犯山陵如澄所慮唐太宗貞觀初上謂右僕射封德彛曰致安之本惟在得人比來命卿舉賢未嘗有所推薦天下事重卿宜分朕憂勞卿既不言朕將安寄對曰臣愚豈敢不盡情但今所見未有竒才異能上曰前代明王使人如器不借才於異代皆取士於當時豈得待夢傅說逢吕尚然後為政乎且何代無賢但患遺而不知耳德彛慚赧而退上又謂侍臣曰朕今孜孜求士欲專心政道聞有好人則抽擢驅使而議者多稱彼者皆宰臣親故但公等至公行事勿避此言使為形跡古人内舉不避親外舉不避讎而為舉得其真賢故也但能舉用得才雖是子弟及有讎嫌不得不舉二年上謂吏部尚書杜如晦曰比見吏部擇人惟取其言詞刀筆不悉其景行數言之後惡跡始彰雖加刑戮而百姓已受其弊如何可獲善人如晦對曰兩漢取人皆行著鄉閭州郡貢之然後入用故當時號為多士今每年選集向數千人厚貌飾詞不可知悉選司但配其階品而已銓簡之理實所未精所以不能得才十三年太宗謂侍臣曰朕聞太平後有大亂大亂後必有太平承大亂之後即是太平之運也能安天下者唯在用得賢才公等既不能知賢朕又不可遍識日復一日無得人之理今欲令人自舉於事何如魏徵曰知人者智自知者明知人既以為難自知誠亦不易且愚暗之人皆矜能伐善恐長澆競之風不可令其自舉太宗時冀州進士張昌齡與王公治皆有文名考功員外郎王師旦知貢舉黜之上問其故師旦曰二人文體輕薄終非令器若置之髙第恐後進效之傷陛下雅道上善其言髙宗即位屢責侍臣以不能進賢衆不敢對中書舍人李安期進曰十室之邑且有忠信天下至廣不為無賢比見公卿有所薦進皆劾為朋黨滯抑者未申而主薦者已訾所以人人惟噤黙以避囂謗若陛下忘其親讎曠然受之惟才是用塞讒毁路其誰敢不竭忠以聞上乎帝納之顯慶中吏部黄門侍郎劉祥道知選事乃釐補敝闕上䟽陳六事一曰今取士多且濫入流嵗千四百多也雜色入流未始銓汰濫也故共務者善人少惡人多臣謂應雜色進者切責有司試判為四等第一付吏部二付兵部三付主爵四付司勲若坐負當責雖經赦仍配三司不者還本貫則官不雜矣二曰内外官一品至九品萬三千四百六十五員大抵三十而仕六十而退取其中數不三十年存者畧盡若嵗入流五百人則三十年自相充補況三十年外在官猶多不慮其少今入流嵗千四百其倍兩之又停選六七千人復年别新加其𩔖􅎊廣殆非經久之制古者為官擇人不聞取人多而官少也三曰永徽以來在官者或以善政擢論事者或以單言進而庠序諸生未聞甄異是奬勸之未周也四曰唐有天下四十年未有舉秀才者請自六品以下至草野審加摉訪無令赫赫之辰斯學遂絶五曰唐虞三載考績黜陟幽明二漢用人亦久其職今任官率四考罷官知秩滿則懷去就民知遷徙則懷茍且以去就之官臨茍且之民欲移風振俗烏可得乎請四考進階八考聽還以息迎新送故之弊六曰三省都事主事主書比選補皆取流外有刀筆者雖欲參用士流率以儔𩔖為恥前後相沿遂成故事且掖省崇峻王言祕宻尚書政本人物所歸專責曹史理有未盡宜稍革之以清其選乾封中時承平既久選人益多司列少常伯裴行儉始與員外郎張仁禕設長名姓歴牓引銓注之法又定州縣升降官資髙下其後遂為永制無能革之者劉曉上䟽論之曰今選曹以檢勘為公道書判為得人殊不知考其德行才能況書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何闗理體文成七歩未足化人誠使取士以德行為先文藝為末則多士雷奔四方風動矣永淳元年中書門下同平章事魏𤣥同言選舉法弊上䟽曰方今人不加富盜賊未衰禮誼􅎊薄者下吏不稱職庶官非其才取人之道有所未盡也武德貞觀庶事草創人物固乏天作大聖享國永年異人間出諸色入流嵗以千計官有常員人無定限選集猥至十不取一取舍淆紊夏商以前制度多闕至周煥然可觀諸侯之臣不皆命於天子王朝庶官不專一職穆王以伯冏為太僕正命曰慎簡乃僚此乃自擇下吏之言也太僕正特中大夫耳尚以僚属委之則三公九卿亦當然也故太宰内史並掌爵禄廢置司徒司馬别掌興賢詔事是分任羣司而統以數職王命其大者而自擇其小者漢制諸侯自置吏四百石以下其傅相大臣則漢為置之州郡掾史督郵從事悉任之牧守自魏晉以後始歸吏部而迄於今以刀筆量才簿書察行法與世弊其來久矣尺丈之量鍾庾之器非所及則不能度非所受則無以容況天下之大士類之衆可委數人手乎又尸厥任者間非其選至為人擇官為身擇利下筆繫親䟽措情觀勢要悠悠風塵此焉奔競使百行折之一面九能斷之數言不亦難乎且臣聞蒞官者不可以無學傳曰學以從政不聞以政入學今貴戚子弟一皆早仕𢎞文崇賢千牛輦脚之類程較既淺技能亦薄而門閥有素資望自髙夫所謂胄子者必裁諸學少則受業長而入官然後移家事國謂之德進夫少仕則不務學輕試則無才又勲官三衛流外之属不待州縣之舉直取書判非先德後言之誼臣聞國之用人如人用財貧者止糟糠富者餘梁肉故當衰弊之乏則磨策朽鈍以馭之太平多士則遴柬髦俊而使之今選者猥多誼以簡練為急竊見制書三品至九品並得薦士此誠仄席旁求之意也但褒貶不明故上不憂黜責下不盡搜揚莫慎所舉而茍以應命且惟賢知賢聖人篤論臯陶既舉不仁者逺身茍濫進庸及知人不擇舉者之賢而責所舉之濫不可得已以陛下聖明國家德業而不建經久之策但顧望魏晉遺風臣竊惑之願少遵周漢之規以分吏部選則所用詳所失鮮矣武后天授中選舉多濫左補闕薛登上䟽曰臣聞國以得賢為寳臣以舉士為忠是以子皮之讓國僑鮑叔之推管仲燕昭王委兵於樂毅苻堅托政於王猛子産受國人之謗夷吾貪共賈之財昭王錫路馬以止讒永固戮樊世以除譛處猜疑而益信行間毁而無疑此由黙而識之委而察之深也至若宰我見惡於宣尼逢萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失之故也是以人主受不肖之士則政乖得賢良之士則時泰故堯資八元而庶績其理周任十亂而天下和平由是言之則知士不可不察而官不可妄授也何者比來取士多不以才馳聲假譽互相推奬希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣切觀古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵已明節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必脩貞確不抜之操行難進易退之規衆議以定其髙下郡將難誣於曲直故計貢之賢愚即州將之榮辱穢行之彰露亦鄉人之厚顔是以李陵䧏而隴西慙干木隠而西河美故名勝於利則小人之道消利勝於名則貪暴之風扇是知化俗之本須擯輕浮昔冀缺以禮讓升朝則晉人知禮文翁以儒材奬俗則蜀士多儒燕昭好馬則駿馬來庭葉公好龍則真龍入室由是言之未有上之所好而下不從其化者也自亡國之季雖雜縱横而漢代求才猶徵百行是以禮節之士敏德自脩閭里推髙然後為府寺所辟魏氏取人尤愛放逹晉宋之後祗重門資為奬人求官之風乖授職惟才之義有梁薦士雅愛属辭陳氏簡賢特珍賦詠故其俗以詩酒為重不以脩身為務逮至隋室餘風尚存開皇中李諤論之於文帝曰魏之三祖更好文辭忽君人之大道好雕蟲之小藝連篇累軸不出月露之形積案盈箱唯是風雲之狀代俗以此相髙朝廷以兹擢士故文章日煩其政日亂帝納李諤之策由是下制禁斷文筆浮辭其年泗州刺史司馬幼之以表不典實得罪於是風俗改勵政化大行煬帝嗣興又變前法置進士等科於是後生之徒復相放傚因陋就寡赴速邀時緝綴小文名之䇿學不以指實為本而以浮虛為貴有唐纂歴雖漸革於前非陛下君臨思察才於共理樹本崇化唯在旌賢今之舉人有乖事實鄉議决小人之筆行脩無長者之論䇿第喧競於州府祈恩不勝於拜伏或明制纔出試遣捜敭驅馳府寺之門出入王公之第上啓陳詩唯希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覓舉覓為自求之稱非是人知之辭察其行而度其材則人品於兹見矣徇己之心切則至公之理乖貪仕之性彰則廉潔之風薄是知府命雖髙異叔度勤勤之譲黄門已貴無秦嘉耿耿之辭縱不能挹已推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮髙物表較其廣狹也是以耿介之士羞自拔而致其辭循常之人舍其踈而取其附故選司補署喧然於禮闈州貢賔王紛爭於階闥謗議雜合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之累自非上智焉能不移在於中人理由習俗若重謹厚之士則懷禄者必崇德以潔己若開趨競之門則邀仕者皆戚施而附㑹附㑹則百姓罹其弊潔己則兆庶䝉其福故風化之漸靡不由兹今訪鄉閭之談唯秖歸於里正縱使名虧禮法罪挂刑章或冐籍以偷資或邀勲而竊級假其不義之賂則是無犯鄉閭豈得比郭有道之銓量茅容望重裴逸民之賞拔夏少名髙語其優劣也祗如才應經邦之流唯令試䇿武能制敵之例秖驗彎弧若其文擅清竒便充甲第藻思㣲減旋即告歸以此收人恐乖事實何者樂廣假筆於潘岳靈運辭髙於穆之平津文劣於長卿子建筆麗於荀彧若以射䇿為最則潘謝曹馬必居孫樂之右若使協賛機猷則安仁靈運亦無裨附之益由此言之不可一槩而取也至於武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計畧使樊噲居蕭何之任必無指蹤之機使蕭何入麾下之軍亦無免主之效闘將長於摧鋒謀將審於料事是以文淵聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設髙祖追慙於酈生九拒之計窮公輸息心於伐宋謀將不長於弓馬良相寧資於射䇿豈與夫元長自表妄節辭鋒曹植題章虛飛麗藻較量其可否也伏願陛下降明制頒峻科千里一賢尚不為少僥倖冒進須立隄防斷浮虛之飾辭收實用之良策不取無稽之說必求忠讜之言文則試其効官武則令其守禦始既察言觀行中亦循名責實自然僥倖濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝超絶文鋒挺秀有効技之偏用無經國之大才為軍鋒之爪牙作辭賦之標準自可試淩雲之策練穿扎之工承上命而賦甘泉禀中軍而令赴敵既有隨才之任必無負乘之憂臣謹按吳起臨戰左右進劒吳子曰夫提鼔揮桴臨難決疑此將軍事也一劒之任非將事也謹按諸葛亮臨戎不親戎服頓蜀兵於渭南宣王持勁卒不敢當此豈弓矢之用也謹按楊得意誦長卿之文武帝曰恨不得與此人同時及相如至終於文園令不以公卿之位處之者盖非其所任故也謹按漢法所舉之主終身保任揚雄之坐田議責其冒薦成子之居魏相酬於得賢賞罰之令行則請謁之私絶退讓之義著則貪競之路銷自然朝廷無爭禄之人選司有撝謙之士仍取寛立年限容其採訪簡汰堪用者令其試守自然見賢不𨼆食禄不專則荀彧進鍾繇郭嘉劉隠薦李邕朱穆勢不云逺有稱職者受薦賢之賞濫舉者抵欺㒺之罪自然舉得賢行則君子之道長矣長安中太后嘗與宰相議及刺史縣令李嶠唐休璟等奏竊見朝廷物議逺近人情莫不重内官輕外職除授牧伯多是貶累之人風俗不澄實由於此望於臺閣寺監妙簡賢良分典大州共康庶績臣等請輟近侍率先具僚從之𤣥宗開元中國子祭酒楊瑒奏流外出身每歳二千餘人而明經進士不能居其什一則是服勤道業之士不如胥史之得仕也臣恐儒風寖墜廉恥日喪若以出身人太多則應諸色裁損又奏主司帖試明經不求大指專取難知問以孤經絶句或年月日請自今並帖平文上甚然之肅宗寳應二年禮部侍郎楊綰條奏貢舉䟽曰國之選士必藉賢良盖取孝友純備言行敦實居常育德動不違仁體忠信之資履謙恭之操藏器則未嘗自伐虛心而所應必誠夫如是故能率已從政化人鎮俗者也自叔世澆詐兹道寖㣲爭尚文辭互相矜衒馬卿浮薄竟不偶於任用趙壹虛誕終取擯於鄉閭自時厥後其道彌盛不思實行皆徇空名敗俗傷教備載前史古人比文章於鄭衛盖有由也近煬帝始置進士之科當時猶試策而已至髙祖朝劉思立為考功員外郎又奏進士加雜文明經加帖經從此積弊寖而成俗㓜能就學皆誦當代之詩長而博文不越諸家之集遞相黨與用致虛聲六經則未嘗開卷三史則皆同挂壁況復徵以孔門之道責其君子之儒者哉祖習既深奔競為務矜藝者曽無愧色勇進者但欲淩人以毁讟為常談以向背為己任投刺干謁驅馳於要津露才揚己喧騰於當代古之賢良方正豈有如此者乎朝之公卿以此待士家之長老以此埀訓欲其返淳朴懷禮譲守忠信識亷隅何可得也譬之於水其流已濁若不澄本何當復清方今聖德御天再寧寰宇四海之内顒顒向化皆延頸舉踵思聖朝之理也不以此時而理之則太平之政又乖矣凡國之大柄莫不先擇下臣古先哲后皆側席待賢今之取人令將牒自舉非經國之體也望請依古制縣令察孝廉審知在鄉閭有孝悌及信義廉恥之行加以經業才堪策試者以孝亷為名薦之於州刺史當以禮待之試其所通之學其通者送名於省自縣至省不得令舉人輙自陳牒比來有到狀保辨識牒等一切並停其所習經左傳公羊榖梁禮記周禮儀禮尚書毛詩周易任通一經務取深義奥㫖通諸家之義試日差諸司官有儒學者對問毎經問義十條問畢對䇿三道其䇿皆問古今理體及當時要務取堪行用者其經義并䇿全通為上第望付吏部便與官其經義通八䇿通二為中第與出身下第罷歸其明經比試帖經例非古義皆誦帖括冀圖僥倖并近有道舉亦非理國之體望請與明經進士並停其國子監舉人亦請准此如有行業不著所由妄相推薦請量加貶黜所冀數年之間人倫一變既歸實學當識大猷居家者自脩德業從政者皆知廉恥浮競自止敦厖自勸教人之本實在兹焉事若施行即别立條例詔左右丞諸司侍郎御史大夫中丞給舍同議聞奏尚書左丞賈至議楊綰條奏貢舉䟽曰謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且夫述行美極人文人文興則忠敬存焉是故前代以文取士本文行也由辭以觀行則及辭也宣父稱顔子不遷怒不貳過謂之好學至乎脩春秋則游夏之徒不能措一辭不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下闗雎之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗盖王政之所由廢興也故延陵聽樂知諸侯之存亡今試學者以帖字為精通而不窮㫖義豈能知遷怒貳過之道乎考文者以聲病為是非而務擇浮艶豈能知移風易俗化天下之事乎是以上失其源而下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是生焉臣弑其君子弑其父非一朝一夕之故其所來者漸矣漸者何謂忠信之陵頽恥尚之失所末學之馳騁儒道之不舉四者皆由取士之失也夫一國之事繫一人之本謂之風賛揚其風繫卿大夫也卿大夫何常不出於士乎今取士試之小道而不以逺者大者使干禄之徒趨馳末術是誘道之差也夫以蝸蚓之餌雜垂滄海而望吞舟之魚至不亦難乎所以食垂餌者皆小魚就科目者皆小藝四民之業士最闗於風化近代趨仕靡然向風致使禄山一呼而四海震蕩思明再亂而十年不復向使禮譲之道𢎞仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而揺也且夏有天下四百載禹之道喪而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆考實行故能風俗淳一運祚長逺秦坑儒士二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東都終持名節之行至有近戚竊位強臣擅權弱主孤立母后專政而社稷不隕終彼四百豈非學行扇化於鄉里哉厥後文章道弊尚於浮侈取士術異茍濟一時自魏至隋僅四百載三光分景九州阻域竊號僭位德義不脩是以子孫速顛享國咸促國家革魏晉梁隋之弊承夏殷周漢之業四隩既宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道蹤亂代取人之術此公卿大夫之辱也楊綰所奏實為正論然自典午覆敗中原版蕩劉石侵凌衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因緣官族所在耕築地望繫之數百年之外而身皆東西南北之人焉今欲依古制鄉舉里選猶恐取士之未盡也請兼廣學校以𢎞訓誘今兩京有太學州縣有小學兵革一動生徒流離儒臣師氏禄廪無向貢士不稱行實胄子何常講習獨禮部每歳擢甲乙之第謂𢎞奬擢不甚謬哉秖足長浮薄之風啓僥倖之路其國子博士等望加員數厚其禄秩選通儒碩生間居其職十道大郡量置太學舘令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利如此則青青不復興刺擾擾由其歸本矣人倫之始王化之先不是過也德宗時試太常寺協律郎沈既濟以肅代兵興天下多故官員益濫而詮法無可道者至是極言其敝曰近世爵禄失之者久其失非他四太而已入仕之門太多世胄之家太優禄利之資太厚督責之令太薄臣以為當輕其禄利重其督責夫古今選用之法九流常叙有三科而已曰德也才也勞也而今選曹皆不及焉且吏部甲令雖曰度德居任量才授職計勞升叙然考校之法皆在書判簿歴言辭俯仰之間侍郎非通神不可得而知則安行徐言非德也空文善書非才也累資積考非勞也茍執不失猶乖得人況衆流茫茫耳目有不足者乎盖非鑒之不明非擇之不精法使然也王者觀變以制法察時而立政按前代選用皆州府察舉至于齊隋叙置多由請託故當時議者以為與其率私不若自舉與其外濫不若内收是以罷州府之權而歸於吏部此矯時懲弊之權法非經國不刋之常典今吏部之法蹙矣不可以坐守刓弊臣請五品以上及羣司長官宰臣進叙吏部兵部得參議焉六品以下或僚佐之属聽州府辟用則銓擇之任委於四方結奏之成歸於二部必先擇牧守然後授其權髙者先署而後聞卑者聽版而不命其牧守將帥或選用非公則吏部兵部得察而舉之聖主明目逹聰逖聽遐視罪其私冐不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則竊名偽命之徒菲才薄行之人貪叨賄貨懦弱姦宄下詔之日隨聲而廢通大數十去八九矣如是人少而員寬事覈而官審賢者不奬而自進不肖者不抑而自退或曰開元天寳中不易吏部之法而天下砥平何必外辟方臻於理臣以為不然夫選舉者經邦之一端雖制之有羙惡而行之由法令是以州郡察舉在兩漢則理在魏齊則亂吏部選集在神龍景龍則紊在開元天寳則理當其時久承升平御以法術慶賞不軼威刑必齊由是而理匪用吏部而臻此也況以此時用辟召之法則理不益久乎天子雖嘉其言而重於改作訖不能用貞元中中書侍郎同中書門下平章事陸贄上奏曰今月十七日顧少連延英對廻奉宣宻㫖卿先奏令臺省長官各舉属吏近聞外議云諸司所舉皆有情故兼受賄賂不得實才此法甚非穏便已後除改卿宜並自揀擇不可信任諸司者臣以闇劣謬當大任果速官謗上貽聖憂過䝉恩私曲降慈誨感戴循省寢興不寧縁是宻㫖特宣不敢對衆陳謝祗禀成命所宜必行恭惟聖規又合無隠茍有未逹安敢勿言雖知塵煩固不可已夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧偽繁興而貞方之人罕進徇聲華則趨競彌長而沈退之士莫勝自非素與交親備詳本末探其志行閱其器能然後守道藏用者可得而知沽名飾貌者不容其偽故孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里舉選之法長吏辟署之制所以明歴試廣旁求敦行能息馳騖也昔周以伯冏為太僕命之曰慎柬乃寮罔以巧言令色便僻側媚其惟吉士是則古之王朝但命其大官而大官得自柬僚属之明驗也漢朝務求多士其選不唯公府辟召而已又有父任兄任皆得為郎選入之初雜居三署臺省有闕即用補之是則古之郎官皆以任舉充選此其明驗也魏晉以後暨于國初採擇庶官多由選部唯髙位重職乃由宰相考庶官之有成効者請而命焉故晉代山濤為吏部尚書中外品員多所啓授宋朝以蔡廓為吏部尚書郎先使人謂宰相徐羨之曰若得行吏部之職則拜不然則否羨之答云黄散已下悉委蔡廓猶憤恚以為失職遂不之官是則黄門散騎侍郎皆由吏部選授不必朝廷列位盡合柬在台司此其明驗也國朝之制庶官五品已上制勅命之六品已下則並㫖授制勅所命者盖宰相商議奏可而除拜之也㫖授者盖吏部銓材署職然後上言詔㫖但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刋未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序倖臣專朝捨僉議而重已權廢公舉而行私惠是使周行庶品茍不出時宰之意者則莫致焉任衆之道益㣲進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉淩遲人物衰少居常則求精大過有急則備位不充欲令庶績咸熈固亦難矣臣實駑鈍一無所堪猥䝉任使待罪宰相雖懷竊位之懼且乏知人之明自揣庸虛終難上報唯廣求才之路使賢者各以彚征啓至公之門令職司皆得自達臣當謹守法度考課百官奉揚聰明信賞必罰庶乎人無滯用朝不乏才以此為酬恩之資以此為致理之具爰初受命即以上陳求賢審官粗立網制凡是百司之長兼副貳等官及兩省供奉之職并因察舉勞効須加奬任者並宰臣叙擬以聞其餘臺省属僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各於除書之内具標舉授之由示衆以公明章得失得賢則進考増秩失實則奪俸贖金亟得則襃升亟失則黜免非止搜揚下位亦可閱試大官前志所謂逹觀其所舉即此義也自䝉允許即以宣行南宫舉人纔至十數或非臺省舊吏則是使府佐僚累經薦延多歴事任議其資望既不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聰道之難行亦可知矣陛下勤求理道務徇物情因謂舉薦非宜復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖德之盛者然於委任責成之道聽言考實之方閑邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人慎謀其始既謀其始詳慮其終終始之間事必前定有疑則勿果於用既用則不復有疑待終其謀乃考其事事愆於素者革其弊而黜其人事協於初者賞其人而成其羙使受賞者無所與譲見黜者莫得為辭夫如是則茍無其才孰敢當任茍當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實虛受廣納𢎞接下之規明目逹聦廣濟人之道欲知事之得失不可不聽之於言欲辨言之真虛不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徵行善之跡論人之惡者必明辯為惡之端凡聽其言皆考其實既得其實又察以情既盡其情復稽於衆衆議情實必參相得然後信其說奬其誠如或矯誣亦寘明罰夫如是則言者不壅聽之不勞無浮妄亂教之談無陰邪傷善之說無輕信見欺之失無浸潤不辯之寃此古之聖王聽言考實不出户而知天下之方也陛下既納臣言而用之旋聞横議而止之於臣謀不責成於横議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恒必由之昔齊桓公將啓覇圖問管仲以害覇之事管仲對曰得賢不能任害覇也任賢不能固害覇也固始而不能終害覇也與賢人謀事而與小人議之害覇也所謂小人者不必悉懷險詖故覆邦家盖以其意性憸邪趣向狹促以沮議為出衆以自異為不羣趨近利而昧逺圖効小信而傷大道故論語曰言必信行必果硜硜然小人也夫以能信於言能果於行唯以硜硜淺近不克𢎞通宣尼猶謂其小人管仲尚憂其害覇況又有言行難保而恣其非心者乎此皆任不責成言不考實之弊也聖㫖以為外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閱責謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦􅂍不加辯詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何頼焉聖㫖又以官長舉人法非穏便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能徧諳多士備閱羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明敭以暗投儻如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不渉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非逺聖鑒明知今人將徇浮言專任宰臣除吏宰臣不徧諳識踵前須訪於人若訪於親朋則是悔其覆車不易前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官慎柬僚属所柬既少所求亦精得賢有鑒識之名失實當闇謬之責人之常性莫不愛身況於臺省長官皆是久當朝選孰肯循私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則徃日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行業頓殊豈有為長官之時則不能舉一二属吏居宰臣之位則可擇千百具寮物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人於不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失類以類則詳知實行有倫則杜絶徼求將務得人無易於此是故選自卑逺始升於朝者各委長吏任舉之則下無遺賢矣寘於周行既任以事者於是宰臣序進之則朝無曠職矣才德兼茂歴試不渝者然後人主倚任之則海内無遺士矣夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也考精在於按名責實宰臣之序進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則茍取偹員是以考課之法不暇精也考不精則能否無别能否無别則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格浸㣲是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益麤塞源浚流未見其可臣欲詳徴舊說伏恐聽覽為煩粗舉一端以明其理徃者則天太后踐祚臨朝欲收人心尤務拔擢𢎞委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輒試其於進士之道豈不傷於容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明累朝賴多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寳歴思致理平雖好賢之心有踰前哲而得人之盛未逮徃時蓋由鑒賞獨任於聖聦搜擇頗難於公舉但速登延之路罕施練覈之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎柬之規太精而失士是知雖易於舉用而不易於茍容則所易者適足廣得人之資不為害也不精於法制而務精於選才則所精者適足梗進賢之途不為利也人之才行自昔罕全茍有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問於孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之盖以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下慎選宰臣必以為重於庶品精擇長吏必以為愈於末流及至宰臣獻規長吏薦士陛下則但納横議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辯所毁之虛實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎臣之切言固非為己所惜者致理之道所感者見過之恩輙因陳謝布露以聞惟陛下幸察韓愈上奏曰右臣伏見今月十日勅今年諸色選舉宜權停者道路相傳皆云以歳之旱陛下憐憫京師之人慮其乏食故權停舉選以絶其來者所以省費而足食也臣伏思之竊以為十口之家益之以一二人於食未有所費今京師之人不啻百萬都計舉者不過五七千人并其僮僕畜馬不當京師百萬分之一以十口之家計之誠未為有所損益又今年雖旱去歳大豐商賈之家必有儲蓄舉選者皆齎持資用以有易無未見其弊今若暫停舉選或恐所害實深一則逺近驚惶一則人士失業臣聞古之求雨之詞曰人失職歟然則人之失職足以致旱今緣旱而停舉選是使人失職而召災也臣又聞君者陽也臣者陰也獨陽為旱獨陰為水今者陛下聖明在上雖堯舜無以加之而羣臣之賢不及於古又不能盡心於國與陛下同心助陛下為理有君無臣是以久旱以臣之愚以為宜求純信之士骨鯁之臣憂國如家忘身奉上者超其爵位置在左右如殷髙宗之用傅說周文王之舉太公齊桓公之拔寗戚漢武帝之取公孫𢎞清閑之餘時賜召問必能輔宣王化銷殄旱災臣雖非朝官月受俸錢歳受祿粟茍有所知不敢不言謹詣光順門奉狀以聞憲宗元和中舒元輿上䟽曰聖德修三代之教盡善矣唯貢士一門闕焉不修臣竊以為有司過矣臣為童子時學讀書見禮經有鄉舉里選必得其人而貢於上上然後以弓旌束帛招之臣年十五既通經無何心中有文竅開則又學之徧觀羣籍見古人有片善可稱聞於天子有司天子有司亦修禮待之不茍臣既學文於古聖人言皆信之謂肖質待問上國必見上國禮無幾前年臣年二十三學文立成為州縣察臣臣得備下土貢士之數到闕下月餘待命有司始見貢院懸板様立束縳檢束之自勘磨狀書劇責與吏胥等倫臣幸狀書備不被駁放得引到尚書試試之日見八百人盡手攜脂燭水炭洎朝哺餐器或荷於肩或提於席為吏胥縱慢聲大呼其名氏試者突入棘圍重重乃分坐廡下寒餘雪飛單席在地嗚呼唐虞闢門三代貢士未有此慢易者也臣見今天下之貢士既如此有司待之又如此乃益大不信古聖人言及覩今之甲賦律詩皆是偷拆經誥侮聖人之言者乃知非聖人之徒也臣伏見國朝開進士一門茍有登升者皆資之為宰相公侯卿大夫則此門固不輕矣凡將為公侯卿相者非賢人君子不可有司坐舉子於寒廡冷地是比僕𨽻以下非所以見徵賢之意也施棘圍以截遮是疑之賊姦徒黨非所以示忠直之節也試甲賦律詩是待之以雕蟲㣲藝非所以觀人文化成之道也有司之不知其為弊若此臣恐賢人君子逺去不肖汚辱為陛下用且指近陳之今四方貢珠玉金銀有司則以篋篚皮幣承之貢賢才俊乂有司以單席冷地承之是彰陛下輕賢才而重金玉也賢才恥之臣亦恥之臣又見每歳禮部格下天下未有不言察訪行實無頗邪然後上貢茍不如格抵罪舉主臣初見之竊獨心賀謂三代之風必作於今日及格既下而法不下是以歳有無藝朋黨譁然扇突不可絶此又徒用格為徒亂人耳又於格中程之人數每歳多者固不出三十少或不滿二十此又天子納士之心也何以言之今日月出没皆為陛下内地自漸海流沙朔南周環綿億萬千里其間異氣所鍾生英豪俊彥固不少矣若陛下明詔必以禮舉之忽一歳之内有百數元凱揚馬之才德者來之則有司必曰吾格取二十而黜八十是為求賢耶遺賢耶若有司以僕𨽻待之忽一歳之内負才德來者無十數軰則有司必曰吾㧞二十是繆收其半徒足滿人數是為取才耶取合格耶其不可先定人數亦昭昭矣向之數事臣久為陛下疾有司不供職使聖朝取士首科委就地矣臣寒㣲若此出言不足以定貢士之得失然百慮之中或幾一得之臣竊欲陛下詔有司按三代故事明修格文使天下入貢者皆茂行實不拘人數其不茂行實法與之隨此為澄源源既澄則來者皆向方矣俾有司加嚴禮待之舉六義試之試之時免自擔荷廊廡之下特設茵榻陳爐火脂燭設朝晡飯饌則前日之病庶幾其有瘳矣人人知天子重賢奬士之道勝氣坌漫如此士之立身無不由正以成之者為士身正則公卿正公卿正未有天下不治者天下治而陛下求不埀拱以髙揖羲軒不可得也茍不如此則士之求名無不由邪以成者為士邪未有公卿不邪者公卿邪未有天下而治者天下不治而陛下欲不役聖慮而憂黔首不可得也臣雖至愚以此觀之知貢士之道所繫尤重是以願輸血誠以正此門陛下無以臣跡在貢士中疑臣自謂臣雖不敏竊窺太常一第不為難得何以明之若使臣為今日貢士之體事便僻巧佞馳騖關鍵固非臣之所不能也恥不為也故臣以頑才干有司得之固無忝不得則納履而去蹤跡巢由以樂陛下熈熈之化何徃而無泉石之快哉伏惟陛下留神獨聽天下之幸也於臣何幸歴代名臣奏議卷一百六十三
