body:
  text: 歴代名臣奏議卷一百九十七明楊士竒等撰謹名器周襄王三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于周使隰朋平戎于晉王以上卿禮管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲毋逆朕命管仲卒受下卿之禮而還東漢順帝漢安中梁冀子弟五人及中常侍等以無功並封大司農杜喬上書諫曰陛下越從藩臣龍飛即位天人屬心萬邦攸頼不急忠賢之禮而先左右之封傷善害德興長佞䛕臣聞古之明君襃罰必以功過末世闇主誅賞各縁其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸茍遂斯道豈伊傷政為亂而已䘮身亡國可不慎哉書奏不省桓帝延熹七年南廵園陵特詔太尉楊秉從及行至南陽左右並通姦利詔書多所除拜秉上䟽諫曰臣聞先王建國順天制官太微積星名為郎位入奉宿衞出牧百姓臯陶誡虞在於官人頃者道路拜除恩加竪𨽻爵以貨成化由此敗所以俗夫巷議白駒遠逝穆穆清朝遠近莫觀宜割不忍之恩以斷求欲之路於是詔除乃止桓帝時封賞踰制内寵猥盛光祿勲陳蕃乃上䟽諫曰臣聞有事社稷者社稷是為有事人君者容恱是為今臣蒙恩聖朝備位九列見非不諫則容恱也夫諸侯上象四七垂燿在天下應分土藩屏上國高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之内侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事已行言之無及誠欲陛下因是而止又比年收歛十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可貲計鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎是以傾宮嫁而天下化楚女悲而西宮災且聚而不御必生憂悲之感以致并隔水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而今天下之論皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求得失擇從忠善凡一選舉委尚書三公使襃責誅賞各有所歸豈不幸甚帝頗納其言為出宮女五百餘人但賜儁爵關内侯而萬世南鄉侯靈帝時尚書令陽球奏罷鴻都文學曰伏承有詔勅中尚方為鴻都文學樂松江覽等三十二人圖象立賛以勸學者臣聞傳曰君舉必書書而不法後嗣何觀案松覽等皆出於微蔑斗筲小人依憑世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥盈簡而位升郎中形圖丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被䝉殊恩蟬蛻滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省魏文帝召蔣濟為散騎常侍時有詔賜征南將軍夏侯尚曰卿腹心重將特當任使作威作福殺人活人尚以示濟濟至帝問以所聞見對曰未有他善但見亡國之語耳帝忽然問其故濟具以答因曰作威作福書之明戒天子無戲言惟陛下裁之帝即追取前詔帝欲追封武宣卞太后父母尚書陳羣奏曰陛下以聖德應運受命創業革制當永為後式案典籍之文無婦人分土命爵之制在禮典婦因夫爵秦違古法漢氏因之非先王之令典也帝曰此議是也其勿施行以作著詔下藏之臺閣永為後式晉懐帝永嘉末丹陽太守輔國將軍王導上書曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過别部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輙有鼓盖動見相準時有不得者或為耻辱天官混雜朝望頽毁導忝荷重任不能崇浚山海而開創亂源饕竊名位取紊彛典謹送鼓盖加崇之物請從導始庶令雅俗區别羣望無惑成帝以保母周氏有阿保之勞欲假其名號内外皆奉詔侍中顧和獨上䟽以為周保祐聖躬不遺其勲第舍供給擬於戚屬恩澤所加已為過隆若假名號記籍未見明比惟漢靈帝以乳母趙嬈為平氏君此末代之私恩非先代之令典且君舉必書將軌物垂則書而不法後嗣何觀帝從之宋孝武帝時江夏王義恭與驃騎大將軍竟陵王誕奏曰臣聞佾懸有數等級異儀珮笏有制卑髙殊序斯盖上哲之洪模範世之明訓而時至彌留物無不弊僭侈由俗軌度非古晉代東徙舊法淪落侯牧典章稍與事廣名實一差難以卒變章服崇濫多歴年所今樞機更造皇風載新耗弊未充百用思約宜備品式之律以定損厭之條臣等地居枝昵位參台輔遵正之首請以爵先致貶之端宜從戚始輙因暇日共參愚懐應加省易謹陳九事雖懼匪忠庶竭微欵伏願陛下聽覽之餘薄垂昭納則上下相安表裏和穆矣詔付外詳有司奏曰車服以庸虞書茂典名器慎假春秋明誡是以尚方所制漢有嚴律諸侯竊服雖親必罪降于頃世下僭滋極器服裝飾樂舞音容通于王公達于衆庶上下無辨民志靡一義㳟所陳實允禮度九條之格猶有未盡謹共附益凡二十四條詔可後魏孝文帝初即位將遷顯祖神主于太廟有司奏舊事廟中執事之官例皆賜爵今宜依舊詔百寮評議羣臣咸以為宜依舊事祕書令程駿獨以為不可表曰臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯必當屬有命於大君之辰展心力於戰謀之日然後可以應茅土之錫未見預事於宗廟而獲賞於疆土徒見晉鄭之后以夾輔為至勲吳鄧之儔以征伐為重績周漢既無文於遠代魏晉亦靡記於往年自皇道開符乾業創統務髙三五之規思隆百王之軌罰頗減古賞實增昔時因神主改祔清廟致肅而授群司以九品之命顯執事以五等之名雖復帝王制作弗相㳂襲然當時恩澤豈足為長世之軌乎乖衆之愆伏待罪譴書奏從之宣武帝時天大旱司徒髙肇擅録囚徒欲以收衆心清河王懌言於帝曰昔季氏旅於泰山孔子疾之誠以君臣之分宜防微杜漸不可瀆也減膳録囚乃陛下之事今司徒行之豈人臣之義乎明君失之於上姦臣竊之於下禍亂之基於此在矣帝遂詔尚書與羣司鞫理獄訟明帝時太后父司徒胡國珍薨議贈相國大上秦公諫議大夫張普惠力陳其不可㑹聞胡家穿壙下墳有磐石乃宻表曰臣聞優名寳位王者之所光錫尊君愛親臣子所以慎終必使勲績相侔號秩相可然後能顯揚當時傳徽萬代者矣竊見故侍中司徒胡公懐道含靈實誕聖后載育至尊母儀四海近樞克唯允之寄居槐體論道之明故以功餘九錫襃假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未𠂻何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可並大禮記曰天無二日土無二王嘗禘郊社尊無二上明君臣不可並上伏見詔書以司徒為太上秦公夫人為太上秦君夫人䝉號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊為太上皇此因上上而生名也皇太后稱令以繫勅下盖取三從之道遠同文母列於十亂則司徒之為太上恐乖繫勅之意春秋傳曰葬稱公子辭明不可復加上也書曰兹予大享于先王爾祖其從與享之司徒位尊屬重必當配享先朝若稱太上以為臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晉有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又曰困於上者必反於下故受之以井比剋卜定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啓聖情伏願回日月之明察微臣之請停司徒逼同之號從卑下不踰之稱畏困上之鑒邀謙光之福則天下幸甚唐高祖以舞工安叱奴為散騎常侍禮部尚書李綱諫曰臣按周禮均工樂胥不得厠於士伍雖復妙如師襄才如子野皆繼世不易業故魏武使禰衡擊鼓衡先解朝衣曰不敢以先王法服為伶人衣齊高緯封曹妙逹為王以安馬駒開府有國家者可為鑒戒今新造天下開太平之基功臣賞未及徧髙才猶伏草茅而先令舞工鳴玉曵組位五品趨丹地殆非創業垂統貽子孫之道也帝不納太宗貞觀中監察御史馬周上䟽曰臣聞致化之道在求賢審官孔子曰惟名與器不可以假人是言慎舉之為重也臣伏見王長通白明達本樂工輿皁雜𩔖韋槃提斛斯正無它才獨解調馬雖術踰等夷可厚賜金帛以富其家今超授高爵與外廷朝㑹騶豎倡子鳴玉曵履臣竊恥之若朝命不可追改尚宜不使在列與士大夫為伍也帝善其言中宗以方士鄭普思為秘書監葉靖能為國子祭酒侍中桓彦範執不可帝曰要己用之不可止彦範曰陛下始復位制詔軍國皆用貞觀故事貞觀時以魏徵虞世南顔師古為監以孔頴達為祭酒如普思等方伎猥下安足繼蹤前烈臣恐物議謂陛下官不擇才以天秩加私愛也睿宗景雲中柳澤為右率府鎧曹叅軍以中宗時長寧宜城安定諸公主及后女弟昭容上官與其母鄭尚宫柴隴西夫人趙及姻聨數十族皆能降墨敕授官號斜封及姚元崇宋璟輔政白罷斜封官數千員元崇等罷去太平公主盡奏復之澤詣闕上䟽曰臣聞藥不毒不可以蠲疾詞不切不可以補過故習甘㫖者非攝飬之方邇䛕佞者非治安之宜臣竊見神龍以來綱紀大壞内寵專命外嬖制權因貴憑勢賣官鬻爵妃主之門同商賈然舉選之署若闤闠然屠販者由邪忝官廢黜者因姦冐進天下溷亂幾危社稷頼陛下聦明神武拯溺舉墜耳目所親豈可忘鑒誡哉且斜封官者皆僕妾私謁迷謬先帝豈盡先帝意邪陛下即位之初用元崇等計悉以停廢今又收用之若斜封之人不可棄邪韋月將燕欽融不應襃贈李多祚鄭克義不容盪雪也陛下何不能忍於此而能忍於彼使善惡混并反覆相攻道人以非勸人以僻今天下咸稱太平公主與胡僧慧範以此誤陛下故語曰姚宋為相邪不如正太平用事正不如邪臣恐流近致遠積小為大累微成髙勿謂何傷其禍將長勿謂何害其禍將大又言尚醫奉御彭君慶以巫覡小伎超授三品奈何輕用名器加非其人臣聞賞一人而千萬人恱者賞之罰一人而千萬人勸者罰之惟陛下裁察焉𤣥宗時李林甫無學術見中書令張九齡文雅為帝知内忌之會范陽節度使張守珪以斬可突于功帝欲以為侍中九齡曰宰相代天治物有其人然後授不可以功賞國家之敗由官邪也帝曰假其名若何對曰名器不可假也有如平東北二陲陛下何以加之遂止又將以涼州都督牛仙客為尚書九齡執曰不可尚書古納言唐家多用舊相不然歴内外貴任妙選有德望者為之仙客河湟一使典耳使班常伯天下其謂何又欲賜實封九齡曰漢法非有功不封唐遵漢法太宗之制也邊將積糓帛繕器械適所職耳陛下必賞之金帛可也獨不宜裂地以封帝怒曰豈以仙客寒士嫌之邪卿固素有門閱哉九齡頓首曰臣荒陬孤生陛下過聽以文學用臣仙客擢胥史目不知書韓信淮陰一壯夫羞絳灌等列陛下必用仙客臣實恥之帝不恱翌日林甫進曰仙客宰相材也乃不堪尚書邪九齡文吏拘古義失大體帝由是決用仙客不疑德宗興元中駕幸梁州詔翰林學士陸贄曰朕自發洋州已來累路百姓進獻菓子雖甚微細且有此心今擬各與散試官卿宜商量可否贄上狀曰伏以爵位者天下之公器而國之大柄也惟功勲才德所宜處之非此二途不在賞典恒宜慎惜理不可輕輕用之則是壊其公器而失其大柄也器壊則人將不重柄失則國無所持起端雖微流弊必大縁路所獻𤓰菓盖是野人微情有之不足光聖猷無之不足虧至化量以錢帛為賜足彰行幸之恩饋獻酬官恐非令典帝復令欽溆齎中書所與進𤓰菓人擬官狀示贄仍奉宣㫖曰朕所到處欲得人心喜恱試官虛名無損於事宰臣已商量進擬與亦無妨贄又奏曰臣愚以謂信賞必罰霸王之資輕爵䙝刑衰亂之漸信賞在功無不報必罰在罪無不懲非功而獲爵則爵輕非罪而肆刑則刑䙝爵賞刑罰國之大綱一綱或棼萬目皆弛雖有善理末如之何天寳季年嬖倖傾國爵以情授賞以寵加天下蕩然紀綱始紊逆羯乘釁遂亂中原遣戍歲增䇿勲日廣財賦不足以供賜而職官之賞興焉職員不足以容功而散試之號行焉青朱雜沓於胥徒金紫普施於輿皁薰蕕無辨涇渭不分二紀于兹莫之能整當今所病方在爵輕設法貴之猶恐不重若又自棄将何勸人聖㫖以為試官虛名無損於事臣伏恐陛下思之未熟偶有是言倘或謂之信然臣竊以為過矣夫立國之道惟義與權誘人之方惟名與利名近虛而於教為重利近實而於德為輕凡所以裁是非立法制者則存乎其義至於參虛實揣輕重並行而不傷迭用而不悖因衆之欲度時之宜消息盈虛使人不倦者則存乎其權專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨故國家之制賞典錫貨財賦秩廪所以彰實也差品列異服章所以飾虛也居上者必明其義達其變相須以為表裏使人日用而不知則為國之權得矣謹按命秩之載于甲令者有職事官焉有散官焉有勲官焉有爵號焉雖以𩔖而分其流有四然其掌務而授俸者唯繫於職事之一官以序才能以位賢德此所謂施實利而寓之虛名者也其勲散爵號三者所繫大抵止於服色資蔭而已以馭崇貴以甄功勞此所謂假虛名以佐其實利者也虛實交相養故人不瀆賞輕重互相制故國不廢權今之員外試官頗同勲散爵號雖則授無費祿受不占員然而突銛鋒排患難者則以是賞之竭筋力展勤効者又以是酬之其為用也可謂重矣今或捧𤓰一器挈果一盛亦授試官以酬所獻則彼突銛鋒而竭筋力者必相謂曰吾以忘軀命而獲官此以進𤓰菓而獲官是乃國家以吾之軀命同於𤓰菓矣𤓰菓草木也視人如草木誰復為用哉且員外試官無俸祿之資無攝管之柄無見敬之貴無免役之優唯假虛名以籠浮俗浮俗所以若存若亡而未甚厭棄者徒以上之所惜耳今陛下若又輕用之以為無損於事人寤斯㫖復何頼焉後之立功曷用為賞陛下若欲賞之以職事則官員有限而勲伐無窮固不勝其用矣陛下若欲賞之以貨財則人力已殫而帑藏皆匱固不充其費矣既未有實利以敦勸又不重虛名而濫施人無藉焉何以為國且植𤓰樹果多是野人貧者所資唯在衣食假以冗號亦奚用焉必欲使之歡欣不如厚賞錢帛人不失利國不失權各得所宜兩全其寳何有不可固傷大猷願留睿思更少詳度時又有㫖與贄云比在奉天將士並賜名定難功臣令宰臣等商量扈從中官辛苦至甚亦合依例並賜此名朕以南衙朝士之中有經奉天重圍又以卿等昨者奔赴行在渉歴危險亦極艱難今不問中官朝官但經重圍又到山南者並擬賜名定難功臣卿宜商量穏便贄又上奏曰陛下惠霑暬御仁洽庶寮念隨難之憂危恤從廵之勞苦議增寵飾将錫嘉名事雖未行意則已就凡在貴近固知銜恩睿㫖淹詳復詢庸賤惟精惟慎允謂防微顧省何如屬當下問臣若自貪榮號傍懼怨憎因循順成不極所見心且知負如天鑒何是以不揆言之淺深不計身之利害但輸狂直唯聖所裁臣聞賞以懋庸名以彰行賞乖其庸則忠實之效廢名浮於行則瀆冒之弊興一足以撓國權一足以亂風俗授受之際豈容易哉頃以駐蹕奉天迫於患難竟攘兇逆實頼武人遂旌定難之勲特賜功臣之目名頗符實事亦會時所霑雖多誰曰非允至如宮闈近侍班列具臣雖奔走恪居各循厥職而驅除翦伐諒匪所任又屬皇輿再遷天禍未悔見危無補曷謂功臣致宼方深孰云定難縱使遭罹圍逼䟦履﨑嶇難則當之定將安據勞或有矣功其謂何大凡有生之倫莫不各親其𩔖賤彼貴我抑惟常情黜異奨同亦是常性臣沗搢紳之列又當受賜之科竊自校量猶知不可而况於公議乎況於介胄之士乎人之多言靡所不至必謂陛下溺愛近習故徇其茍得之情汎該羣司以分其私昵之謗怨不在大釁皆自微必將沮戰士激勵之心結勲臣憤恨之氣所恱者寡所愠者多所與者虛名所失者實事所恱者臣下之誇志所病者國家之大猷利害皎然不為難辨且名者衆之所評也是曰公器亦為爭端覈之至精猶患相軋處或乖當安能勿踰以漢高之制服雄豪太宗之削平區㝢天下既定乃論功勲有蕭曹之殊庸有房杜之碩畫戰守經畧倬乎殊倫猶謂豐沛故人刀筆文吏諸將不服頗相訐揚乃至攘袂指天抜劒擊柱偶語謀反諠譁訟寃矧今國歩猶艱王化未洽方資武力以殄宼讎盖非恩倖競進之時文儒角逐之日當功而奨尚恐未孚奨又非功固宜見誚儻有節効尤著理當襃崇賞典甚多何必在此其餘别無績用例徇驅馳且俟賊平甄録非晚贄為中書侍郎同中書門下平章事時上奏曰右希顔奉宣進止萬榮安撫有功聞亦忠義甚得衆心若更淹遲却恐事不穏便今商量除一親王充節度使且令萬榮知留後其節度制便從内出萬榮須與改官卿等即商量進來者臣性習懦頑藝識空乏辱當奨任待罪宰司事闗安危不敢容黙雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之險地則覆置之夷地則平材如負焉唯在所授授踰其力則踣授當其力則行故負重者不可以微劣勝器大者不可以輕易處有巨力而加重負猶懼蹷跌之不虞擇安地而寘大器尚慮傾覆之難備焉有委非所任置非所安而望其不顛不危固亦難矣劉士寧窮兇極暴衆所不容李萬榮因人之心閉城拒逐為國除害亦有可嘉誠宜星夜上聞請擇節將今所陳奏頗渉張皇但露徼求之情殊無退讓之禮據兹鄙操殊異純良又聞本是滑人偏厚當州將士與之相得纔止三千諸營之兵已甚懐怨據此頗僻亦非將材且邀君而力取其位不忠逐帥而謀代其權不義犯此二者而加之非材得志驕盈不悖則敗悖謂犯上敗謂僨軍俱為厲階莫見其可今雖遽加寵命務壓貪求曲示保持冀消凶慝然其所行不遜所得無名縱之則反側而益疑善之則觖望而肆惡夫善始而克終者猶寡況始於不善而求能以義自全者乎又縁嘗自蓄謀以危主將及居人上恒恐見圖必於部校之間多有疑阻之釁上下猜貳何能乆安縱未干紀亂常亦必䘮師蹙境所以承前方鎮之任選建才德而不副所委者則有矣其不由才德而授終能殿邦固節者未之有也是猶置器欲安而不擇可安之勢負重欲濟而不量可濟之材處非所宜不敗何待陛下若謂臣説體迂濶有異軍機引喻乖踈不同事實臣請指陳汴宋一管近代成敗之跡皆陛下之所經見者以為殷鑒惟陛下覽而察之往者田神功作鎮河南領汴宋徐泗兖鄆曹濮八州之地兵食兼足職貢備脩左肅青齊右弭滑魏南控淮浙北輔滎瀍殷如長城不震不聳此由制置於可安之地付授得可濟之材其為利宜斯謂大矣及神功入覲遘厲不還先皇帝示眷悼之優崇貪因循之便易知神玉才不勝任排衆議而竟授之既而維御無方經畧失制權歸豪将勢散列城禍機一興内叛外破委三軍於暴帥䧟五郡於匪人轉輸所經塗路亟阻此由制置於必危之地付授於必躓之才其為敗傷亦已甚矣近者劉𤣥佐驅攘巨猾底復大梁即鎮於兹幾将十載雖不能勤身節用以撫疲甿畢力竭誠以揚丕烈然尚號令由已部屬畏威緝脩戎旅振耀聲勢遠邇談瞩且為完軍制持秉方猶有所倚及𤣥佐殂沒朝廷命吳湊代之士寧兇頑輙敢眦睚素非得衆且甚不材緩之旬時必自離沮隨機制馭指顧可平陛下念深黎元姑務容養適使姦徒得計庸豎作狂但肆醜厲之詞豈懐任置之惠運路幾絶生人重殘殷然垣翰之軍鞠為汙染之俗追思致患之本豈不失於茍且哉今若又授萬榮則與士寧何異負立而取誰曰不然邀取而除孰為非據茍邀則不順茍允則不誠君臣之間勢必嫌阻與其圖之於滋蔓不若絶之於萌芽忘乆遠而樂因循固非英主御天下長筭遠慮之計也且為國之道以義訓人將敎事君先令順長用能弭爭奪之禍絶窺覬之心聖人所以興敬讓而服暴强禮逹而分定故也假使士寧為将慢上虐人萬榮懐奉國之誠禀嫉惡之性棄而違之斯可矣討而逐之亦可矣謀其帥而簒其位則不可焉何者方鎮之臣事多專制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潜滋禍必難救非獨長亂之道亦開謀逆之端四方諸侯誰不解體得一夫而䘮羣帥其何利之有焉矧兹一夫猶未可保徒亂風教以生人心昨者所逐士寧盖起於倉卒諸郡守将固非連謀一城師人亦未協志況又待之不一撫之不均黨助萬榮其能有幾仍各計度於成敗之勢廻遑於逆順之名安肻捐軀與之同惡今所以未即變者皆為萬榮所誘許其賞給貨財且相服從以候制㫖陛下但於文武羣臣之内選一和惠寛敏素為軍旅所愛信者命為節度仍降優詔慰勞彼軍奨萬榮以撫定之功别加寵任褒将士以輯睦之義厚賜資裝衆知保安人且懐惠舍此助亂更將何求揆其大情理必寧息萬榮縱欲䟦扈勢何能為三軍既自離心列城又不為援縁其迫逐主將諸道必復憎嫌邇無所親遠無所與不勞天討必自殱夷陛下何所為虞而欲受其邀致臣雖孱怯竊有未安昨因希顔宣㫖却廻已與趙憬等同附口奏展轉申吐慮多闕遺臣更通夕詳思恐亦無易於此不勝拳拳愚懇謹復宻啓以聞如蒙聖恩察納臣即與趙憬等商量應須處置事宜具作條件聞奏儻後事有愆素臣請受敗撓之罪德宗初置六統軍視六尚書以處罷鎮者相承用麻紙寫制時竇文埸為護軍中尉諷宰相比統軍降麻翰林學士鄭絪奏曰故事惟封王命相用白麻今不識陛下特以寵文埸耶遂為著令也上乃謂文埸曰武德貞觀時中人不過員外将軍衣緋者無幾輔國以來始隳制度朕今用爾不謂無私若復降麻天下必謂爾脇我為之矣文埸叩頭謝上謂絪曰宰相不能違拒中人朕得卿言方寤耳憲宗時翰林學士李綘上奏曰臣謹案守謙宻言聖恩商量以昭義兵馬使烏重衡部署軍中事不獲已須與節度使者臣竊以此處置實非所宜比者以從史受命不由朝廷遂至生彼邪心致兹惡跡今重衡驅逐從史忽領旌旄兩河聞知必生怨望謂陛下宻以官爵誘其將校逐其主帥人情雖愜國體已傷若以重衡主兵勢須便與即是威福不在朝廷於事體之間與從史何異議者若云重衡見主權必不受制臣觀事勢實恐不然何者伏縁從史懐惡蓄奸罔上違命所以重衡得仗義獻欵以順為名其衆遂伏今重衡若不顧憲章以力取位即其同列寧息偏辭儻失衆心前事豈遠以此事理必無異圖縱軍中有狀請與重衡此時之事必非忠心其流軰既多當不願重衡獨得别與一鎮少愜衆心伏望聖恩先令宻諭重衡授以河陽節度使除元陽澤潞節度使則人情大伏國體得全且重衡忽自軍將校授以河陽校於行間恩生望外豈於此際更有遲廻棄義虧忠遣福取禍雖至愚下亦必不然元陽功効素髙公望又積澤潞接近乆亦承風今若除授便徑入潞府慰勞將士家口䘏其貧乏各使安存三軍聞知自然感恱重衡既得方鎮元陽又愜人心如此處置必無差誤機事可惜實所痛心威柄一失豈可復得伏望聖恩不以臣愚昧特賜省覽斷自宸慮成此聖功輙敢獻陳憲宗時河東王鍔将加平章事左拾遺白居易以為宰相天下具瞻非有重望顯功不可任按鍔誅求百計不䘏彫瘵所得財號為羨餘以獻今若假以名器四方聞之皆謂陛下得所獻與宰相諸節度私計曰誰不如鍔爭裒割生人以求所欲與之則綱紀大壊不與則有厚薄事一失不可復追宣宗時中書門下奏諫官闕員請補上曰諫官要在舉職不必人多如張道牛叢趙璘軰數人使朕日聞所未聞足矣乆之出叢為刺史入謝上賜之紫叢曰臣所服緋刺史所借也上遽曰且賜緋上重惜服章有司常具緋紫衣數襲從行以備賞賜或半歲不用其一故當時以緋紫為榮上重翰林學士然遷官必校歳月以為不可以官爵私近臣也宣宗嘗敕補醫工劉集為場官鹽鐡轉運使柳仲郢上言曰醫工術精宜補醫官若委任銅鹽何以課其殿最且場官賤品非特敕所宜親上遽賜絹遣之他日見仲郢勞之曰卿論劉集事甚佳上嘗有疾醫工梁新治之良已自陳求官但敕月給錢三十緡而已時蔣伸從容言於上曰近日官頗易得人思徼倖上驚曰如此則亂矣伸對曰亂則未亂但僥倖者多亂亦非難上稱歎再三曰異日不復得獨對卿矣伸不諭尋拜伸為同平章事懿宗時優人李可及能新聲自度曲辭調悽折同昌公主䘮畢帝與郭淑妃悼念不已可及為帝造曲曰歎百年敎舞者數百皆珠翠襐飾刻畫魚龍地衣度用繒五千倚曲作辭哀思裴回聞者皆涕下帝以為天下之至悲可及憑恩横甚帝欲擢為威衞將軍中書侍郎曹確諫曰太宗著令文武官六百四十三謂房𤣥齡曰朕設此待天下賢士工商雜流假使技出等夷止當厚給以財不可假以官與賢者並肩立同坐席也文宗欲以樂工尉遲璋為王府率右拾遺竇洵直固爭卒授光州長史今以可及位将軍其如太宗之令何臣以為不可帝不聽宋真宗即位初右司諫孫何上言曰伏見國家撫有多方並建衆職外則郡将通守朝士代行闗征𣙜酤使者兼掌下至幕府職掾之微或自朝廷選補而授用人既廣推擇難精貢部上名動踰千計門資入仕亦及百人稍著職勞即升京秩将命而出冗長尤多每躬祀圜丘誕敷霈澤無賢不肖並許敘遷至使評事寺丞纔數載而通閨籍賛善洗馬不十年而登臺郎竊計今之班簿臺省宮寺凡八百員玉石混淆名品猥濫異夫虞書考績周官計治之法也有唐舊制郊禋慶宥但進階勲而已今若十年之内肆赦相仍必恐京僚過於胥徒朝臣多於州縣豈惟連車平斗之刺亦有敗財假器之失况祿廪所賦皆自地征所來湏從民力何必空竭公藏附益斯人已授者朘削既難未遷者防閑宜峻古人所謂損無用之費罷不急之官正在此也伏願特降詔書自今郊祀羣官一例不得遷陟必若績用有聞才名夙著自可待之不次豈俟歴階而升至於省併吏員上繫與奪時左司諫耿望亦以為然故咸平二年親郊止加階勲命有司考其殿最而黜陟之然三年差遣受代率皆考課引對多獲進改罕有退黜而官籍浸增矣真宗時右正言夏竦進䇿曰臣聞周官曰以賢制爵則民慎德以庸制祿則民興功盖爵以待賢祿以待庸賢不及爵爵非其賢則民嫚庸不及祿祿非其庸則民惰嫚則廢德惰則無功故先王重車服慎名器崇德報功以敎天下國家鑒三代典章采漢唐故事文質彬彬不遠中道在於授受猶有所疑何則王者撥亂反正自家刑國賢哲並起攀龍附鳳及其功成治定猶議賢而封計庸而賞豈有守文之君應天承祖恭嗣皇器而藩邸臣僕驟升清貴若師傅之官賛佐之吏輔翼之功宜被寵耀而鞭綏之御導從之𨽻競乘軺車爭受命服庶官恐懼號為隨龍歲月之間遷擢非次以新間舊頗為無謂昔仲叔于奚請繁纓以朝仲尼曰惜也不如多與之邑唯器與名不可以假人其是之謂歟伏願陛下崇不諱之德采狂瞽之議改立明制垂法萬世使日月之光流被子孫竦又進䇿曰經國以體馭賢以爵國以體立必也宏遠賢以爵貴無或僭濫體國不大則制度叢脞爵賢不正則服位陵替仲尼曰唯天為大惟堯則之大體之謂也又曰惟器與名不可以假人正爵之謂也故善為國者存其大體則削其叢脞用其正爵而去其陵替然則大中之道行於典憲矣國家誕膺駿命奄有萬國稽古垂法彛倫攸敘然承唐氏亂離之後撥五代紛競之基冗制因縁或未全去臣聞身被命服即為王臣除官授職必聞賜誥豈有卑品之官州縣之職将拜絲綸之命乃輸綾紙之錢有識之徒誰不堙鬱況軍國之用動以萬計府藏之實何俟於此忍使惠之王澤而責之泉布又聞唐室衰弱兵在節鎮麾下從吏官皆假版皇家受命政出天子州郡職員因循舊式豈有笞撻之吏輿皁之役階敘銀青銜稱檢校或兼烏府之官或假青宮之秩禮制之間無乃僭矣惠愛之道在於此乎誠當特降詔書並削冗事諸如此比一切刋正書之信史垂耀百代詩云周雖舊邦其命維新仁宗景祐三年右司諫韓琦上奏曰臣伏聞寒暑順則歲功成賞罰明則君柄重故王者興化立政動法天道必功而議賞必罪而行罰若春夏之生殖秋冬之肅殺物無不從也茍異於是猶當寒而燠當燠而寒物無不違也善為國者能執其中以馭天下則堯舜之盛可得齊焉臣材朽職近猥叅諫諍之末有所聞見每願竭肝膈上補醇治少副陛下隆寛廣問之意故莫敢容黙于位以負甄擢惟陛下矜而察之臣伏見近者睦親宅告成自提舉臣寮而下有詔增秩用勸勞者入内内侍省副都知張永和實搃其事故有遙領團練之命逮夫同列旋亦推恩當時公言共謂非是盖以其一官之故而衆人䝉賞故也或以謂省局之内官次相妨因而敘遷未甚為害臣是以不敢遽有論列今聞前省都知以降又復優加使額臣竊觀衆論益以懐疑誠以勸沮之方爵賞為大若匪問其官簿醻以年勞則必顯著功籍時申寵拜或不由是皆渉無名故書曰官不及私昵惟其能爵罔及惡德唯其賢昔衛人賞于奚以邑辭請繁纓以朝而許之孔子聞之曰惜也不如多與之邑惟名與器不可假人東漢館陶公主為子求郎明帝不許賜錢千萬而曰茍非其人民受其殃是以難之斯皆古先哲王謹刑罰之源也伏望陛下念恩私於近則勞臣必怨失知其捄則大猷日新特示至公亟行追寢使褒一功而天下勸正一罪而天下服為善者彌思於勵行不仁者更務於革心式臻嘉靖之風永協大中之化慶歴三年知諫院歐陽脩上奏曰臣伏見國家每出詔令常患官吏不能遵行不知患在朝廷自先壊法朝廷不能自信則誰肯信而行之然多因小人僥倖而不知抑絶所與之恩雖少所損之體則多臣聞去年十月中曾有臣僚上言乞今後大臣廝僕不得奏薦班行勅㫖頒下纔三四月已却用呂夷簡僕人袁宗二人為奉職夷簡身為大臣壊亂陛下朝政多矣茍有利於其私雖敗天下事尚無所顧況肯為陛下惜法但朝廷自宜如何今一法纔出而大臣先壊之則其次臣寮僕人豈可不與不與則是行法有二與之則近降勅㫖今後又廢有司為陛下守法者不思國體但徇人情或云二僕得㫖與官在降勅前奈何授官在降勅後凡出命令本為釐革前弊法家以後𠡠衝前𠡠今袁宗等雖曾得㫖而未授命間已該新制自合釐革夷簡不能止絶而恣其僥倖朝廷又不舉行近勅而自隳典法今後詔令何以遵行其袁宗等伏乞特追奉職之命别與一軍将之類名目足示優恩不可為無功之臣私寵僕奴而亂國法八年侍御史知雜事何郯上奏曰臣伏聞閤門近進四日紫宸殿宴人使坐圖入内都知王守忠亦在楊景宗下預坐臣訪得閤門儀制内外臣僚帯刺史節度觀察留後並係遥郡不得正官班列以至賜與進獻頗甚殊絶唯正刺史以上凡遇宴會坐次方許列在殿上今若以守忠帶兩使留後便依正官例升殿與宴即是自今内外臣僚凡帶遥郡皆合上殿預坐啓僭壞法莫此之甚且朝廷儀品所以辨尊卑上下之分不可輕棄舊章以生紊亂況祖宗典法未嘗有内臣殿上預宴之事此弊一開所損不細伏望指揮下閤門速行改正一遵舊制仍令今後遇有宴會臣僚職位不合預坐之人不得妄有陞進坐次所冀示朝廷紀綱之正戒人臣僭差之望郯又上奏曰臣伏聞降勅命以昭宣使王守忠脩祭器物勞効特除景福殿使仍賜節度觀察留後月俸臣始初風聞内批指揮止授守忠宣慶使次日聞授節度觀察留後今雖節度觀察留後之命不行仍以月給賜之復遷改使名勞淺賞重中外之議頗不為允夫爵位之設以待勞臣而勸忠義故賞之厚薄視功之大小歸乎不虛授而已至於舉一職領一事有所幹濟蓋人臣戮力之常分也以常分而受賞典已為過矢又厚焉適足以啓澆濫之源也且守忠之掌脩祭器亦人臣領一事戮力之常爾然陛下重宗廟之事以報其勞自昭宣使超授宣慶使恩賞之行不過不薄適其中也而守忠曾不滿望仍要君命夫以小勞職分之常而所求猶如此過當則後來有冒矢石捍邊宼之臣果有顯效則将何爵賞以稱其意焉況内臣領遥郡祖宗之制止於觀察使然非積勞未甞妄授今守忠雖不授兩使留後而得給其祿人情所希皆起於漸既得其祿必欲其官茍又從之是何位之不可求也夫事戒其始末猶不禁況不戒焉則弊將横流矣其王守忠欲乞只依元降指揮授以宣慶使所有兩使留後俸料亦乞罷給陛下如欲優示寵待則乞厚以金帛賜之足為恩假至於爵祿公器不可輕授授之不濫則朝廷紀綱庶可存焉臣以空踈獲備耳目遇事即言因無忌諱伏望聖朝特賜省納郯又上論兩府遷官䟽曰臣等伏見前任兩府臣僚繼有除拜非復差功計勞特出一切恩命近時典故未見此比物議喧然不知其由夫爵祿固上所得專予以其可以厲世磨鈍使天下之人赴忠義立事功至於徇節捐軀而不自悔故古之王者至重至謹賞一人必使天下之人皆知以為當然不敢用為己私而輕天下之所重也今若授受之際皆出無名則何以勸有功有功者不足勸是古之所重今便以為輕雖極顯官厚祿將無以磨礪天下而人人有覬覦徼幸之心復何所恃而為治哉況股肱大臣天下所望為表則者豈特以一官自私而不為國家惜大體臣等固知爵命之行必有遜而不受者伏望朝廷察臣等言稽之典故如今來例行除授事體有輕重必當即乞明示中外使灼然曉知若秪出一時之恩願下臣等章奏詢之公議儻以為然或難追寢前命因其表遜悉停過恩如此則上無虛授之譏下有相遜之勸與其一舉兩失事相萬也臣等待罪言責不敢顧避緘黙皇祐二年知諫院司馬光上論麥允言給鹵簿狀曰昔仲叔于奚有功於衞衞人使之繁纓以朝孔子曰惜也不如多與之邑惟器與名不可以假人夫爵位尊卑之謂名車服等威之謂器二者人主所以保畜其臣而安治其國家不可忽也今麥允言近習之臣非有元勲大勞過絶於人而贈以三公之官給以一品鹵簿其為繁纓不亦大乎陛下雖欲寵秩其人而適足增其罪累也何則三公之官鼎足承君上應三台鹵簿者所以褒賞元功皆非近習之臣所當得者陛下念允言服勤左右生已極其富貴死又以三事之禮為之送終鼓吹簫鐃烜赫道路是則揚其僭侈之罪使天下側目扼腕而疾之非所以為榮也惟陛下御覽仲叔于奚之傳垂意孔子之言則知名器之重不可加非其人況唐制羣臣於國立大功者婚葬則給鹵簿餘不在給限伏望陛下追寢前命其麥允言更不給鹵簿毋使天下之人竊指目以為朝廷過舉不勝幸甚至和二年侍御史趙抃上言曰臣伏見近年朝廷非次除節度使宣徽使頗為煩數竊以二者使額在唐季則付與容易属聖朝則授受艱難職任絶優事權實重臣僚設非勲舊名器安可輕假謂宜慎重賞格得以關防倖門湏有定規庶裨至治臣愚欲乞指揮今後宣徽并節度使内文臣湏是曾歴中書樞宻院任用加之德望為人推服武臣曾經邊鄙建立功業者方許除拜兼宣徽使元額只是兩員至如使相之任體貌尤重更當慎惜豈宜輕議嘗聞太祖皇帝朝命曹彬收復江南功成凱還雖賜與則多終不授彬使相臣以謂此等官職平時無故等閑除授臣僚亦以等閑得之不以為貴四方向去萬一有緩急事宜必有賢智豪偉之人為陛下制變禦侮立功立事當此之際朝廷行爵賞恩賚之議則以何官職處之乆遠之制須今日思之重之惜之不可不慎也伏望陛下特賜聖㫖以臣所請付兩府議定執守施行上以遵祖宗之法下以重爵位之賞則中外幸甚仁宗時監察御史傅堯俞上奏曰臣聞爵祿天下之砥石其所以礪世者非謂人人飽高爵而厭重祿也蓋必當其勞則天下知勸茍異於是雖窮極班品不能滿貪冒之心而但啓僥倖之路不能為勤瘁之激而徒樹營私之恩伏惟陛下留神而察之臣伏覩單州團練使劉永年除齊州防禦使臣竊思永年進因恩澤未著績用於榮寵固已優渥況有舊條武臣正授已上不許無勞敘進若此官用乆次能得則建節縁日月可取至於餘人不得援例此語尤為未允惟以庸制祿不當有引例之嫌既廢令假人安可杜抜茅之勢事體明著不為難曉豈有他日約束不能限永年而今日指揮可以塞來者乎是不足昭信天下益取輕耳臣恐縁此煩聖聦者衆陛下無以拒之近錢晦知代州亦未甞改官不識永年何以異於晦也伏望陛下追寢新命加慎名器使圖顯效然後遷擢則能者益奮而不能者知勉且俾條詔不為空文臣不勝懇激之至堯俞又上奏曰臣近嘗論列劉永年無勞轉官乞行追寢至今未䝉施行臣聞爵祿天下之公器法令王者之大柄既不能以大柄自持而以公器私於人方復區區誡之以不得援例此臣所以大惑也借使私於永年衆人可隔於陛下平均之德固已虧損況衆人之不可隔乎茍不復計校率以例遷則天下之公器如何哉方今事不責實貪競尚多不作法以抑僥倖廼廢陛下成法啓僥倖而為之地臣所以尤為陛下惜之且法自永年始而廢於永年又可恠之甚者夫置言事之官使拾朝廷之闕古惟恐其不言今乃不然平居議論率常十格七八若壊法濫官章明較著如是之不疑者以列於陛下又置而不聽則安用言事者乎惟陛下必垂省察英宗治平二年龍圖閣直學士何郯上奏曰臣聞聖人之養賢也能品其德能量其才能授以官於是分之為三上賢使之為三公次賢使之為臺諫監司下賢使之為守令所以寓權而恱之也於是為之宮室輿馬以養其體為之旌旗冕弁以養其貴為之鐘鼓琴瑟以養其樂為之弓矢斧鉞以養其威然而不可以私授惟其德惟其才而已矣茍授非其人則覬倖之端啓有小人者得之則胥効犇嚮而求之若固有於已寖以成俗人人皆以取之甚易而無難矣一旦聖人将革其弊而廢黜之莫不怨望盈耳是非小人之過其過在於人主授之之輕也人主不禁之於前而止於後蓋無及已嗚呼用人之際可不謹歟昔衞以鞶纓授仲叔于奚仲尼非之館陶為子求郎漢明拒之知名器如此其重也今陛下紹德業之崇卜基圖之永大設綱紀思合天人行於前必慮其後圖於始必全於終惟是選用之艱尤所可重品其德然後授其官量其才然後定其位使朝廷上下公卿大夫皆得以服其榮安其分士無覬覦職無虛授則天下官冗之弊息名器之用正夫以大理評事之卑而太宗猶謂之清望官不以授伶人之子況其大者乎惟陛下重之英宗時殿中侍御史范純仁上奏曰臣聞君之大柄在於刑賞賞不僭則為善者勸而下無覬覦之心罰不濫則為惡者懲而人無􅁈抑之患善為國者必慎於斯陛下臨御已來於刑罰固已慎矣而於濫賞之弊未聞更張近自兩月已來尤多輕授如待制龍圖脩撰之職相次拜者幾十餘人豈必盡是賢才且復别無勲績但以一人擢用比之同列稍優則人人敘遷以足其希望之意務為姑息如止兒啼輕爵濫恩無甚於此伏惟祖宗之制尤慎寵名至於小官未嘗輕授況於近侍之職豈容什伍而進哉伏望聖慈詔中書門下凡經筵雜學士待制脩撰等職並依内外制修注體例各立定員數必湏才德兼優或聖意柬擢或委以重任或别立事功仍俟闕員方許除授自餘不得進擬如此則得馭臣之道革僥倖之風近侍得人名器增重神宗時知諫院陳襄乞止絶權貴非次陳乞恩例劄子曰臣竊見近日臣寮并故臣寮之家陳乞内外親属恩澤衝改已授差遣人員闕朝廷雖有先降指揮過一月之外不許衝改然所陳乞恩例名目稍多逐時中書樞宻院不住於審官三班院流内銓取已使員闕差注終属未便縁逐處待闕之人守候名次動經歲月洎至授下差遣出京待闕或已前去赴任却被衝改雖在遠方不免依前再赴銓院别候闕次孤寒乆旅之人寧不嗟怨朝廷既有恩例許令指射優便差遣已是優恩豈可更容衝奪已使員闕甚無謂也兼陳乞恩澤多是近上臣僚之家非理僥求因成體例攀援引用寖不可革國家爵祿恩賞所以待賢能之士今惟以父兄親屬私恩陳乞使閥閱無功之人占奪優便差遣一切出於僥倖甚非至公之朝慎名重器區别能否之道也臣以為立法更弊必先自貴者始欲乞今後除前兩府出鎮與沿邊安撫帥臣辟舉人依條施行及勞績酬将大堂除人許指射非次見闕外其餘乞先自兩府以至文武臣僚及分司致仕故臣僚之家如合陳乞弟姪兒男及異姓骨肉恩澤并奏薦人差遣等並令一例於季闕已前一月内指射合入優便之處依例等待即不得臨時陳乞非次見闕及衝改已授差遣人貝闕庶使權貴絶僥求之望寒士無被奪之患而稍獲均濟矣神宗即位御史中丞司馬光論王廣淵劄子曰臣前兩次上言王廣淵傾巧奸邪乞盡奪去職名與遠地監當近聞夲人帶舊職知齊州仍賜章服如此乃是賞之非黜之也曏使廣淵自改京官以來謹身守分不為奸謟以至今日不過作第二任通判今所得乃如此豈可謂為奸諂無益哉孔子稱唯器與名不可以假人今之章服所謂器也職名所謂名也二者皆無用之物然而天下貴之者為其非賢才則不能得之故也唐宣宗重惜章服不輕以與人有司製緋紫衣以備賜與經年不用三兩領故當時服緋紫者人以為貴夫名器者譬如珠玉若使之易得如瓦礫尚安足貴乎近歲兩次覃恩賜緋紫者已為汎濫今又如陳鑄王廣淵輩皆賜章服是使今後受賜章服者皆以為耻不以為榮也且陛下使廣淵出補外官者必已知其姦邪之迹也今又復以職名章服寵之是勸人使效廣淵所為也臣竊恐非國家之福伏望聖斷依臣前奏盡奪去廣淵職名并此來章服與遠地監當使賞善罰惡皦然明白歴代名臣奏議卷一百九十七
