body:
  text: 歴代名臣奏議卷一百八十三明楊士竒等撰去邪宋髙宗時胡寅繳劉僴復秘閣修撰疏曰臣謹按劉僴服事蔡攸以叨官爵天下共知其所歴差遣則為大晟府按協聲律則為提舉道籙院管幹文字而非士大夫之所肯為也其所轉官則縁按樂精熟及修道籙院與管幹明節皇后園陵而非年勞之所當得也其所賜帶則因撰祥應記而非品職之所當賜也其所被譴則以臣寮論其諂事蔡攸交結童貫而貶降則以臣寮論其詭計秘謀附會姦惡而褫職至於勒停廢棄不與士齒而非過誤不幸情可矜宥之人比也今已累縁赦恩盡還官秩食祠宫之禄僥倖甚矣乃敢陳狀訴求復職無恥之心未嘗悛改若使參華中秘與論撰之列則名儒碩學寓處其間者心將謂何臣恐非勸懲之道也伏望聖慈别降指揮所有録黄臣未敢書行寅又繳湖北漕司辟許宜卿為桃源令疏曰臣竊以湖北昨來民聚為盜止縁守宰貪虐政煩賦重所致今平定之初縣令尤宜再三慎擇如人以酒色伐身幾致危殆藥攻之後氣血乍復凡昔日所以生疾者一切屏逺輔以良劑養以珍羞加以嵗時庶幾復舊若仍以嗜欲戕賊之則不可復救矣謹按許宜卿者建炎二年曾知湘隂縣到任未幾即取祗應弟子為妻就本縣創造大第窮土木之役百姓交訴為潭州帥臣所劾值畨騎破城獄事不究後權湘潭縣纔四十日比其解去滿邑胥吏攀船號送又相與裒集賄賂於上司借留而百姓重足一迹畏見其面去年宜卿有族人客死於潭州境内宜卿託名經理其家乃盜發其囊篋及私其婢女為族人之子訴於潭州又訴於監司尚未結絶也宜卿往潭州九年睥睨富實縣分宻結胥吏揺動見任人常有奪攘之意賴其惡聲已著上下共知計不得發其人材大槩如此而可以牧民乎今乃投名湖北漕司僥倖奏辟知桃源縣契勘桃源是鍾相所起之地其疾視令宰虐己為甚故倡亂之日首殺縣官今當委付何等循良庶弭後日之患乃用宜卿輩此何異於以嗜慾戕賊大病初愈之人欲其久生不可得也漕臣以刺舉為職而所薦如此知而舉之是不忠也不知而舉之是不明也一路何賴焉桃源赤子何其重不幸哉今宜卿先次赴任已是逾月想見遺民已在鼎鑊伏望聖慈速降指揮罷斥仍戒約本路監司帥臣每有奏辟必加審詳如所舉繆妄再致臣寮論列重賜黜罰施行庶幾一路官吏上下得人以慰惟新之望所有録黄臣不敢書行寅又論吳幵莫儔徐秉哲疏曰臣謹按吳幵莫儔徐秉哲等致身侍從偷生惜死奉女真之意將祖宗一百六十年神器泣涕來往交割與叛臣張邦昌為邦昌之臣行邦昌之政施施然自肆非不得已也怨在七廟天下仇之貸死投荒失刑甚矣猶萬冀一少紓公議者謂無湔洗之理耳今乃節次用赦許令自便是教人使反覆賣國戕毁三綱豈撥亂反正之道乎昔者世衰道微暴行有作臣弑其君子弑其父孔子為此大懼而作春秋以俟後世有能舉行其法者其法謂何莫嚴於討賊矣陛下志在春秋固將見諸行事深切著明況當艱難之時逆臣僭竊反面事之者皆我臣庶天下大變也若不申著君臣之義以立國政則乾綱解紐賊亂接迹人欲放肆天理淪滅亦何所不至哉所有吳幵逐便指揮下臣皇恐不敢書行寅又繳傅雱用赦量移疏曰臣謹按傅雱於建炎三年為宣撫處置使司主管機宜文字徑至荆南自稱湖北路制置使以撫定孔彦舟為名入其軍中相與渡江過澧州與澧州通判任誼竭取民之膏血以啗彦舟因以自潤百姓怨苦乃從鍾相為寇彦舟不敢安處遂破鼎州遣兵擊敗鍾相又以押送為名直犯湖南入據潭州已而大掠潭衡旁及永邵三湘千里之内公私舟船為之一空最後自衡順流下岳鄂為蘄黄路鎮撫使雱皆與之終始其事彦舟凶狡初不識知文法凡奏請文移欺惑朝聽侮弄三尺詭詐百端皆雱教之至於州縣應副錢糧不知紀極雱則公然乞於彦舟動以萬計營置田産皆有實狀李成江西之敗張用已就招安彦舟其時行次武昌兵勢窮蹙若乗機㑹一掃無餘雱又教之厚行賂遺躬自押送為之緩頰非獨免討且得兩州遂使彦舟自是北遁投於逆黨未即授首推究本末皆自一雱人但知彦舟作賊之披猖而不知雱畫謀之姦祕原情定罪豈可赦原謹按春秋誅討亂賊之法尤嚴於與惡者夫欲為賊亂之事而人皆莫之與則無以自立於世其謀尚得施乎惟有與之者而法不加焉是以無所畏憚浸滛滔天雖陳旅誓師加以征討或有所不勝矣况雱身為朝郎職在省户所為如此上干國體按據其罪揆以春秋之法就死司寇方為稱當得從羈置已是寛恩若遇赦文便許内徙使懐姦黨賊者安心自肆指日貸宥不懼放流恐非式遏亂略修明軍政之道一雱雖小所繫則大伏望聖明深察别降指揮將雱永不量移以為後來羽翼亂賊之戒所有録黄臣未敢書行御史中丞章誼上奏曰臣今月二十二日本臺據檢校少師武成感徳軍節度使神武左軍都統制韓世忠狀繳到進呈劄子一本連粘在前臣初見關報給事中陳戩累乞宫祠遂䝉恩除職與郡其後頗聞因論執政樞機之臣於都堂樞府便衣燕服接見將帥坐此補外今據韓世忠劄子所論則又可駭無而言之則世忠所聞之誤也陛下當召至便殿或諭以温詔開釋其疑有而言之則世忠所謂乞行根治嫁禍之人者安可但已也夫敢於陛下之前造為世忠之語因以進退從官者陛下固知其人矣乞降姓名於外廷俾付有司宻行推究大正典刑以絶後來誣譖之路孔子曰浸潤之譖膚受之愬不行焉可謂明也已矣可謂逺也已矣今將帥之臣人敢誣譖以誤陛下之賞罰其間如韓世忠能自陳其區區以昭雪其誣謗者能有幾人哉若懐疑不釋不能自言於君父之前而與士大夫結為仇怨或與造言之人私相報復則禍亂之萌有不可勝言者今世忠能言之陛下又為别白其是非之所在則君臣之情固已無間文武兩班誠好相接譖愬之言非特不行又將陳露矣豈非社稷之福哉伏望睿明下臣此章與世忠所陳宻與大臣措置施行不勝大幸誼又論贓吏罪狀疏曰臣伏讀近降手詔以縣令之官於民為最近且歎比年以來其選太輕貪汙殘暴靡所不有自京朝至于選人各令内外侍從官薦舉其闕次令三省選擇詔㫖再下訓辭深厚中外傳聞士庶感悅有以見陛下懇惻愛民之意徳至渥也臣愚以謂選用循良而不去貪汙殘虐之吏則㢘平之士不勸非所以昭大化廣恵澤也臣請劇論贓吏一員仰冀陛下顯行誅斥以為天下縣令貪虐之戒臣聞衢州江山縣令某冒功得官頑傲無恥以茍得為心以殘酷為政漁獵一邑之財封殖無饜之欲此蓋盜跖之居官者也嘗任獄司吕彊以溼紙掩百姓柴四之口而殺之於獄中聽保正家人偏詞而致百姓徐詢縊死於縣廨容弓手祝超乞取錢物而挽取毛衢之室女怒柴及柴直儒之欺詐而毁沒其屋業一嵗盜用官田錢九千三百餘貫每月增添坊場錢二百五十餘千取人户米藏於私家者七百餘石率皆不上赤歴侵盜入已其日用之酒則取足於貼司張七其日用之柴薪則取足於武勇鄭十其日用之飲食則取於諸鄉書手其所任之吏王裳薛陟徐禮祝惠之徒納京銷白金十有六枚以資某行李之費此其貪虐之暴著者也其他與姦為市詭秘未露者不可勝數比者臺臣彈奏之章屢入朝廷取勘指揮亟下然而衢州知州是其長吏也為所劫持而不敢按發婺州處州承勘官司也許其請求而不肯追逮提刑轉運提舉司是其部使者也既不能按舉繩治又聽受權貴之囑託而留滯取勘指揮者累月有此三者以玩弄朝廷之法令沮格陛下之詔㫖宜其某之罪不可得而正也某之罪不正則州郡監司得以市私恩矣至於無告之民愁歎窮苦而咨怨每歸於陛下此臣所以痛心疾首知姦贓貪虐之吏為不可容也臣今體訪得某罪狀二十事皆贓私自盜枉法入己律所不貸者也雖更赦令自合推治臣乞檢㑹去年本臺十月奏疏併賜行下乞將某先次停罷然後追攝取勘究其罪犯所有前項三處官司沮格詔令遷延月日之罪亦乞特賜懲戒庶幾人臣壊植散羣孤立一意以祗肅朝廷之紀綱奉承陛下之徳澤誼又上疏曰臣竊見比者宰執大臣建明政事初不審詳利害輕信小人浮偽之說如措置討論文臣濫賞二十六事衆議紛然不以為便陛下沈幾先物灼見可否睿斷英發亟行住罷天地之施博矣臣今日以來乃聞宰相某堅執前議以寢罷為非遂抗章辭位臣不知某自言於陛下之前者何辭也若自以識暗才小不足以明事之是非知人之情偽以陛下之號令而引愆自訟待罪私室則猶之可也若以言不行而求去則某之罪大矣某措置濫賞之議近則公卿士大夫微則武夫賤𨽻皆以為不可行也身為宰相以不可行之言進說人主而人主悟其非是不加譴呵止令寢罷自宜將順徳美奉承周旋今乃家居自若不復治事孔子謂臧武仲雖曰不要君吾不信也其某之謂乎臣願睿明察臣此章以觀某進退之義則某之可罷可相斷可知矣誼又上疏曰臣今月二十四日曾論宰相某不能將順陛下徳美猶復堅執討論濫賞之議為可施行悻悻然以言不用而求去略無省愆念咎之懐而有要君無上之罪當行罷黜至今經日未䝉施行臣謹按某近者議三大政皆信妄庸之邪說以誤朝廷之號令自非陛下聰明照臨即行寢罷則取笑四方貽患萬姓召禍賈怨有不可勝言者臣得而詳言之比者某欲於淮南等路置宣諭使副而糧餉之餽兵革之衞一切紛擾若行其議則京畿京西湖北淮南數路之人歸怨朝廷矣陛下知其不可斷然寢罷然後數路之人安某又欲盡取官田不問有人承佃無人承佃率行出賣而方量根括建官置吏一切紛擾若行其議則耕夫織婦敦本樂業之人無不歸怨朝廷矣陛下知其不可斷然寢罷然後四民之心悅某於此二事既以顛沛迷誤可以已矣又復信用堂吏滑浩俞宗适之言而建為討論文臣武臣濫賞之議書成奏御同列執政有不及知者若行其議則中外文武忠臣義士賢愚功罪混為一區無不歸怨朝廷矣陛下知其不可斷然寢罷而某執迷遂非不肯奉詔移疾家居偃然自若此豈人臣事君之義哉今陛下既已更此三事之非出於睿斷天下之人感悅欣戴矣若某猶在相位則天下之人疑於前議之復行而逺邇之人無以自安伏望聖明亟罷某以清衆論誼又上疏曰臣近者曾論奏總䕶使與橋道頓遞使不應收受朝廷給賜銀絹比見關報李回已遂回納而某自請收受一半此何理也夫二使支賜之物或辭或受於朝廷未有甚加損然二使衆人之領袖也二使辭免則自餘執事之人可以息僥倖之心亦可以裁損其賜予之物此於邦財頗有省節誠非小補豈意某規一時之小利忘事君之大節不恤國家之禍難但計私室之有無自同羣𨽻獨願邦貺觀今日立朝之風操則可以推其平日之行已矣搢紳士大夫聞其如此莫不竊笑嗟歎憐其無戒得之心昧取舎之理誠不足表勵風俗又安可以居獻納之地哉伏望聖明早賜罷黜以清班列誼又彈浦城縣丞不法疏曰臣訪聞建州浦城縣丞某在任貪縱不法與姦為市結託監司僥冒功賞陵蔑同官殘害百姓仰負聖朝字民之意臣今得其罪狀甚衆略舉其罔上虐民之大者言之去年浦城縣百姓張徳等因醉與鄰里争競放火燒茅屋數間尋即悔悟自經而死某適出㸃寨遣人斬其首級冒稱捕獲是時本路監司保奏乞令某改官再任朝廷倚信使者之言不復驗實遂可其請某自是益横陵其官長任意掊刻每人户三十家差催稅甲首一名每户十日一次赴縣驅磨出寛限錢一貫文足浦城萬户催稅甲頭三百有竒月為錢千緡矣某悉掩取之有甲頭姓陳人貧不能辦懼遭殘辱抗繩自絶某受納苗米一石輙取樣米二斗公然變賣市物入已又復虚增防縣保甲人數侵盜官錢停販衙前官鹽增價出售廹脅豪户黄中甫乞取金銀一邑士民殘擾殆徧方福建盜賊並興人未安業而邑丞貪縱不恤又復如此即有弄兵赤子相因而起其貽患朝廷豈細事哉伏望聖斷速賜罷黜付之有司推鞫實狀重寘典憲以勵其餘誼又乞推鞫天台知縣申本州守臣受賂事疏曰臣竊見近者天台知縣某申尚書省及御史臺稱本縣百姓求珍殺人以金釵三十隻銀一百兩行賂於台州知州某之妻遂得不死其事暴著聞者駭聽謂求珍百姓也敢通貨財以結郡太守之妻某郡守也敢因請求以擅朝廷生殺之柄然事之有無尚未可知而某為屬縣宰遽訐其事以直聞於省臺三者皆罪干典憲事係風教不可以不覈實朝廷雖下本路提刑司體究然守令同在一州人情互有觀望嵗月遷延獄將不直臣伏望聖慈特降指揮將干證人並付大理寺或從朝廷差就台州置司明白推鞫以靖衆論以儆在位不勝幸甚左正言鄧肅上疏曰臣於今月初六日上殿論耿南仲與其子延禧主和之過與李邦彦白時中吳敏等乞陛下明正典刑陛下以謂耿南仲真誤國者今越八日未䝉行遣臣切惑之謹再為陛下敷奏曾不知其為再三之瀆也臣嘗面奉孝慈淵聖皇帝面諭曰耿南仲嘗薦汝矣臣明日亦以門生之禮謁南仲於府第今此待罪諫省亦何忍獨論南仲父子之過耶然君父之徳天下之公也恩門之徳一己之私也臣亦安得以一己之私而忘天下之公乎重念四五月間畏日流金雖庸夫販婦亦以行色為難而使兩朝君父登小車涉險途作止飲食悉付他人之手親王貴族且數百人一旦蕩然皆在沙漠數千里之外使道路聞之皆為泣血此何自而然哉主和誤國堕敵計中正在耿南仲父子耳且臣之君父為南仲所誤如此義不戴天豈容黙黙陛下若念南仲父子嘗在艱難之中久從行在未忍賜罪則臣之言為失矣臣待罪諫省敷奏有失臣之罪也夫何面目尚稱諫臣雖微臣進退不足以為朝廷重輕然在臣之節則不可以不立也臣視此命輕於螻蟻臣守此節重於邱山惟陛下察之肅又奏曰臣竊觀前日臣僚上言有論偽楚之臣止論王時雍徐秉哲等未嘗輙論吕好問且王時雍等偽執政也吕好問亦偽執政也論時雍而捨好問豈非以好問今為右丞乎右丞之職天子命之也雖賢與否不得以盡知然偽楚之朝始為冊立使俄為門下侍郎此好問之迹亦昭昭矣論事之臣亦安得漏網以罔天子之聽乎謹按好問本非姦雄但怯懦耳從王時雍遊致有叛臣之迹皆怯懦所致也今雖居宰職亦不能為朝廷患然國家艱難急於求賢豈容有怯懦無立之士廁迹於二府乎好問在朝則偽楚姦臣必不盡責蓋有以蔽之也臣又聞中書舎人李㑹至今嘗語人曰張邦昌有伊周之志非謀逆者其推戴偽楚之心猶昔也謹按李㑹嘗拜偽楚之庭甘為禁從今日復廁朝班有愧同列遂為巧語以蔽邦昌嗚呼衣天子之衣而坐天子之殿降赦令以朝百官擁殿班以稱陛下邦昌反狀雖三尺之童亦知之矣其臣李㑹不知何辭尚敢為之遊說乎且以邦昌為是則陛下責之為非是邦昌而非陛下信乎桀之犬可使吠堯也臣所論叛臣乞陛下定罪章疏再上未蒙陛下一正典刑臣切考叛臣在朝今居二府者吕好問也今作從官者李㑹也臣愚欲乞先正此二人之罪以去其大者然後乞檢㑹臣所校者叛臣八種定罪二格一網而盡俾無遺漏庶幾可以少釋二聖之怒以慰天下之望也惟陛下斷而行之毋惑羣聽取進止肅又奏曰臣聞有同腹心之臣然後可與同患難有可與同患難之臣雖患難之來無足慮也孝慈淵聖皇帝恭儉之徳可追湯禹一旦竒禍起於不測正為無同腹心之臣耳聖駕既出無一人以䝉塵為念者邀上皇則宫臣奉之邀太子則詹事奉之皇后諸王惟其所欲是舉朝之臣争用私心捐上皇本支以保其私家耳嗚呼痛哉古未聞也及偽楚一立則争拜其庭略無難色有願為事務官者以講偽帝之禮有願為奉使者以結天下之心有閒為宫觀而下為庶官者皆彈冠而起争為禁從甚者至有居宰執持樞柄傳呼道路洋洋得志其下下無能者及竭姦䛕之心有名犯邦昌即請於朝以改之舉國委然知有偽楚而已儻言聖朝往往竊笑嗚呼淵聖皇帝其無腹心之臣如此烏能保天下哉不在圍城之中者不能盡知往往為姦人游說似是而非以惑其聽凡在城内者又各食偽禄以汚其身故無肯為陛下盡言者遂致陛下雖念二聖之未囘而惡叛臣之賣國稍正典刑以立朝綱終未足以慰天下之望而快二聖之怒也淵聖臨行以批諭徐秉哲託市少物以為路費遂簽御諱如與平交其意豈在物耶正為行計已廹欲速相救援耳豈意舉朝叛臣他腸有在坐視君父如棄路人陛下若不正其罪無乃辜二聖乎臣竊惟去年治王甫蔡京等罪不肯果決費臺諫一年之力遂致邊事有失防閑臣愚欲乞先立罪格然後按籍定刑使凡有司者皆不得以容私焉則一按而定可以絶後患矣諸侍從官而偽為執政者諸庶官及宫觀而起為侍從者與撰勸進文獻赦書求事務官與因張邦昌改名者是皆已不復知有宋徳矣臣請定為叛臣之上諸執政侍從臺諫曾稱臣於偽楚及拜於庭下者及願為奉使與庶官升擢差遣者是皆臣服偽楚矣臣請定為叛臣之次叛臣之上乞寘於嶺外叛臣之次乞逺小處編管仍乞帶叛臣名目若夫卿監以下庶官也朝廷初不以國士待之亦安得以國士責之若未嘗升擢及如前所論二等之罪惟戴偽楚供職不廢以茍禄食而已臣乞赦之然亦乞籍定姓名從此不復用為臺諫侍從矣蓋惡其無立也若用此法則一網而盡不惟可以上報二聖之徳亦所以破天下姦雄之膽也使舉朝之臣畧無姦雄則人人可與同腹心矣予有臣三千而一心此武王之所以勝紂也況以天下之大而除邊難乎惟陛下察之取進止肅又奏曰臣竊聞人臣之事君有毫髪之私必有欺君之罪人君之治天下有毫髪之私必失天下之心恭惟陛下聰明睿智卓絶今古固非臣愚所能窺測然謂之無毫髪之私則非臣愚所能知也臣切見陛下臨御以來首取前日姦臣講和誤國者如李邦彦白時中吳敏等投之逺方以禦魑魅天下壯士聞之鼓舞以為中興必矣然自靖康以來有専主和者耿南仲與其子延禧是也閨門之内同惡相濟沮渡河萬全之戰遏勤王已到之兵今日割三鎮明日截黄河自謂和議可必無患凡戰守之具若無事於切切然者孝慈淵聖皇帝亦以東宫耆舊之故信如蓍龜敷奏之語蓋未嘗不從也及敵人借和用兵勢不可遏南仲誤國狀已敗露淵聖亦不得以私之遂遣南仲出使使之自當南仲偶脫萬死以其子延禧之故遂得從陛下左右竊聞陛下欲進大兵以援京城又為南仲父子所諫以為和議已成不可輙壊是則南仲父子主和誤國豈不過於李邦彦等乎此陛下親見而熟講之矣又不待臣愚再三之瀆也然南仲尚為兩府以宫觀居閒延禧尚為兩制以名邦自奉雖南仲自擇不過如此陛下何正邦彦等罪如彼其審何容南仲等惡如此其恕豈非以南仲父子於艱難之際從陛下日久耶且天子父也羣臣子也舉天下之臣皆陛下之子豈復更有親踈之間乎淵聖不忍輙棄南仲故有今日之悔陛下之於南仲又何有焉若復容之臣恐天下得以私心議陛下也且南仲腐儒延禧孤陋進退出處本不足論臣今切切不已正為陛下惜耳伏望明正典刑與李邦彦白時中吳敏等以示天下之公御史中丞張守上奏曰臣伏見自崇寧以來外則姦臣擅政内則閹寺弄權相為蔽欺以亂主聽卒至禍敗宗社幾危陛下纂承親見既覆之車深懲不逺之鑒勵精政事固宜内外臣寮洗心滌慮精白以承休徳而欺罔之風猶未丕變近者特降聖㫖為剰員髙貴叫稱吕源行下收買竹木搭蓋席屋出賃等事令御史臺體究本臺按驗並無實狀尋具奏聞乞降下告人姓名追呼照對奉聖㫖髙貴踈放告事人更不追呼臣竊謂此事上聞宜有所自致煩特降睿㫖付之有司實賴聖明燭見事情乃加考核設或不付有司便行典憲則一吕源固不足惜人或謂陛下之聰明可欺陛下之命令輕出陛下之賞罰失當一舉而三失之所以累聖徳者豈細也哉夫以陛下英睿天縱而臣下猶敢誕惑如此則罔上之心可以按見使其得逞則變亂是非以白為黑將何憚而不為伏望陛下特詔有司如係朝廷之上得於告言則誣告之律固當舉行如緝捕人直達聖聽則罔上之誅不容恕免欲乞聖慈檢㑹本臺先奏事理降下姓名以慿按治庶幾防微杜漸使小人有所懲戒而欺罔之風息矣侍御史孫覿奏曰臣伏見女真大帥擁萬騎入朔方跨大河直犯京闕忽睹神州隩區金城湯池之髙且大也斂兵不動遣使議和將相大臣盍量彼己之勢勿亟勿徐示以閒暇使之疑懼有虎口之虞壓以重兵不戰而威之使去此百全之上計也忽傳李綱劫寨之敗上驚朝聽下駭羣情為之奈何綱本書生素不知戰力小圖大挑發兵禍以帷幄之臣行穿窬之謀以王者之師為攻劫之計藉令出於敵人不意偶獲小利猶為怒敵以誤朝廷而狂率無謀漏言於旬日之先提數千兵以入空寨敵圍四合盡驅而納諸隍中無一存者九重帝居宗廟社稷所在而僥倖於一擲滔天之罪車裂以徇死有餘誅方從薄罰而太學諸生陳東等聚衆伏闕鼓倡羣小妄謂宰相連結强隣開關延敵欲起李綱復還兵柄俄頃間嘯聚數萬撾登聞鼓呼聲動地手擲瓦礫狙擊大臣屠裂中貴人流血滿道天子震懼與之召還李綱然後解去自古衰亂板蕩大壊書傳所載未有如此之甚者也唐徳宗時除國子司業陽城為道州刺史太學諸生詣闕請留夫城者道徳文行一世標表常率諫官合遏裴延齡不得為宰相名震天下諸生請留以為師範朝廷所當從從之是衆為政也太學者賢士之關禮義之所自出也朝廷衆建師儒營宫室豐餼廪以養士祭酒司業以率其屬博士掌訓導正録掌規矩恩禮深厚教法明具士當洗心易慮以承上之休徳陳東等乃幸天下有大變蔑視官師不告而出怙衆興訛厚誣朝廷朋比罪人廹脅君父肆行殺戮遂至大亂而李綱不知羞愧尚戴其面立於朝端東安坐學宫洋洋自若失今不治他日必有握兵之臣劫制天子武夫悍卒戕害將帥縣殺其令丞郡殺其守尉以衆暴寡必自兹始矣臣承乏國子司業時童貫修建武學落成矣陳東為教諭議率同列獻書童貫請車駕臨幸其中有不從者遂至讙譁臣聞之曰武學落成何預太學有云頃者乗輿幸太學而武學生例被恩賜此東所以建獻書之議蓋東狂生不守分義其志止欲圖尺寸之柄猖狂不已以至稱亂今雖未即典刑當具申學法屏之逺方終身不齒為多士之戒無令覆出為惡以階禍亂天下幸甚御史中丞廖剛乞禁妖教疏曰臣伏覩刑部關報臣寮上言乞修立喫菜事魔條禁務從輕典奉聖㫖令刑部看詳申尚書省臣謹按王制曰執左道以亂政殺假於鬼神時日卜筮以疑衆殺非樂於殺人為其邪說詭道足以欺惑愚衆使之惟己之從則相率為亂之階也今之喫菜事魔傳習妖教正此之謂臣訪聞兩浙江東西此風方熾倡自一夫其徒至於千百為羣隂結死黨犯罪則人出千錢或五百行賕死則人執柴一枝燒焚不用棺槨衣衾無復喪葬祭祀之事一切務滅人道則其視君臣上下復何有哉此而不痛懲之養成其亂至於用兵討除則殺人將不可勝數矣宣和間江浙數州已見此事厥鑒未逺也臣聞傳習事魔為首之人蓋有所利而為之誑惑愚民怵以禍福而取其財物謂之教化此最不可恕者推究為首之人峻法治之自當衰息若不分首從槩欲以不應為坐之恐非所以戢姦弭亂也臣謂貧窮而為盜賊情或可恕事魔非廹於不得已也故為邪僻敗壊風教之事其措心積慮已不順矣是故易誘為亂也如被誘之人尚或可以闊略彼為首者雖未有不順之迹安可輕恕欲望睿㫖并送刑部看詳施行吏部侍郎李光論孫覿劄子曰臣伏覩紹興元年十二月十四日三省同奉聖㫖備坐祖宗舊制應贓吏決杖配諸州牢城蓋謂軍興之際不免時有科率若更容縱贓吏並縁為姦則民力愈弊此有以見陛下意在生靈深疾貪汙命下之日孰不相慶今已累月而諸司按察官循習既久恬不為怪遂使朝廷美意委為空文臣竊痛憤伏自艱難以來朝廷一切姑務涵貸凶貪之徒割剥生靈無所忌憚況朝廷行法當自貴近始臣伏見前知臨安府孫覿在任贓汙不法逺近播傳諸司懼其一旦復用則為己害不敢按發覿之為人朝廷所知前後臣僚論列罪大惡稔至辱詈君父甚於仇讎有臣子所不忍聞者陛下貸而不誅又使復典郡寄於覿恩徳厚矣乃不悛革益肆無賴到任之初以軍期為名拘九邑縣令在府勒令出錢共肆萬伍千餘緡名曰助軍不附文歴又將親信使臣毛汝能辟為都監文林郎毛珪權錢塘縣令令二人提領本府應干倉場庫務偷盜轉易不可稽考郡中官僚相顧側目至有人生五馬貴莫受二毛侵之語臨安府捉獲酤賣私酒百姓其家富厚覿令珪受錢一千貫更不解送所司至帖下本縣直行放免又遣所親姓董人乞覓過新城縣百姓唐邦臣等錢一千五百貫皆有跡狀除代之後將犒賞庫金銀錢物與都吏専知官等分受比至得替其公庫供帳之物並不發還及將空名度牒官告等移易妄用收附不明監司往來厚加結納每到發送饋謂之合食日事燕遊每㑹不下百餘千以此上下相䝉無縁顯露伏望聖慈奮發乾剛出自睿斷送大理寺或差臺官一員就府置司體究候贓證分明捕逮送獄依法斷遣以警具僚其屬邑縣令及人吏等廹於威勢者贓非入已或許其自首庶幾逺近聞風咸知畏戢實天下幸甚取進止吏部員外郎陳公輔上疏曰臣聞今日之禍實由公卿大夫無氣節忠義不能維持天下國家平時既無忠言直道緩急詎肯伏節死義豈非王安石學術壊之邪議者尚謂安石政事雖不善學術尚可取臣謂安石學術之不善尤甚於政事政事害人才學術害人心三經字說詆誣聖人破碎大道非一端也春秋正名分定褒貶俾亂臣賊子懼安石使學者不治春秋史漢載成敗安危存亡理亂為聖君賢相忠臣義士之龜鑑安石使學者不讀史漢王莽之簒揚雄不能死又仕之更為劇秦美新之文安石乃曰雄之仕合於孔子無可無不可之義五季之亂馮道事四姓八君安石乃曰道在五代時最善避難以存身使公卿大夫皆師安石之言宜其無氣節忠義也中書舍人虞允文上言曰臣伏惟神宗皇帝作新官制一清樞宻都承㫖之班更用士人視儀從列而副都承㫖之選與之俱重侍殿廬親承邃㫖武臣之除職清地禁未有踰於此者所以激厲其徒使之趣名節立事功為百世勸也謨烈之傳至陛下而丕顯丕承之故近嵗廖虞弼以非才而用未幾罷黜之㫖從天而下當時人心咸大和說其後多虚其選不以輕授陛下傳祖宗心法之妙顯顯如此書之國史足為無窮之光今元居實者外廷之議以為本出給使之流未嘗歴親民近邊差遣而所出入交結皆内侍之雄欺隠御前金帛之訟見歴臺省未決一旦無尺寸功効亟登清班使將士解體非今日細事又朝廷施行之初不經門下書讀致議者闐然益以為疑兩日以來物論籍籍不肯置若臣輙擬詞以進實負陛下使令之意罪不容誅矣所有詞頭臣不敢書行翰林學士汪藻奏曰臣准中書省送到詞頭一道奉聖㫖知髙郵軍趙士􅢔因發運司舉留令依舊在任其稽違朝命特降兩官蘇遲别與差遣令臣撰詞進入者右臣竊以人主之柄賞罰而已賞必及善然後人知所勸罰必及惡然後人知所懲未聞且賞且罰而可以為政也謹按趙士􅢔始以蘇遲赴官不肯受代朝廷怒其稽違朝命特降兩官又縁自陳四任堂除粗有勞効及發運使李祜劄子保奏復令在任臣不知朝廷以士􅢔為是耶為非耶若以為是則方命不從者堯四凶之罪也不應使之在任若以為非則借留在任者漢循吏之恩也不應使之降官以一士􅢔之身而一日之間可賞可罰臣竊惑之且士􅢔自陳歴任有勞至据其所臨推之不去公違詔條不顧義理亦可謂無㢘恥甚矣縱方今乏材豈無一人可治髙郵如士􅢔者耶況新除人别與差遣在任人遷延依舊使有力者交結當權無日不居官無援者待闕及期輙為人所奪有十年不霑一日之祿者宣和之風也今陛下中興當痛革此弊奈何因士􅢔復啓僥倖之門耶臣以為不罷士􅢔恐人之效其所為茍欲貪祿則冒恥自陳及計㑹監司僥倖保奏者皆得之矣此風漸不可長伏望聖慈别擇能吏知髙郵軍或且令蘇遲赴任斥去士􅢔為後來鄙夫之戒所有趙士􅢔依舊在任降兩官詞頭臣未敢撰進户部侍郎李彌遜上奏曰伏覩近降指揮差新除起居郎莫將充送伴使臣契勘比者金人遣使畫地講和旬月之間禮儀未定中外惶駭人情不安賴陛下聖度剛明曲從羣議斷以不疑致使金人屈服致書而去國人欣恱萬口一詞天下幸甚將輕儇不端素無所守揣摩迎合僥倖一時意為身謀不恤社稷之計而使將與賔客言深恐將遂非文過姦䛕不悛觀望反覆隂揺敵情上負陛下聖孝愛親之念況將越次而遷已咈公議遽委使節俯示曲全為將計則善矣非國家之福也伏望陛下更加聖慮罷將送伴使别選忠信之人協濟國事臣職在論思茍有所見不敢緘黙冒瀆聖聰不任恐懼戰越屏營之至時金遣使要以難行之禮秦檜為相力贊屈己之說外議羣起計雖定而未敢行㑹龍如淵說檜宜擇人為臺官使擊去異論則事遂矣於是如淵施廷臣莫將皆據要地人皆駭慢吏部侍郎晏敦復上疏言前日如淵以附㑹和議得中丞今施廷臣又以此躋横榻衆論沸騰方且切齒莫將又以此擢右史夫如淵廷臣庸人但知觀望將則姦人也陛下奈何與此輩斷國論乎乞加斥逐杜羣枉門力為自治自彊之策金遣使議和監察御史施廷臣抗章力贊和議吏部尚書張燾率侍郎晏敦復上疏曰仰惟陛下痛梓宫未還兩宫未復不憚屈己與敵議和特以衆論未同故未敢輕屈爾幸小大之臣無復異議從容獻納庶幾天聽為回卒不敢屈此宗社之福也彼施廷臣乃務迎合輙敢抗章力贊此議姑為一身進用之資不恤君父屈辱之恥罪不容誅時邊報王倫來歸殿中侍御史黄龜年劾檜專主和議沮止恢復植黨專權漸不可長乃上書曰臣聞一言而盡事君之道曰忠罪莫大於欺君一言而盡輔政之道曰公罪莫大於私己臣人者背公而徇私則刑賞僭濫慮人主之照其姦則合黨締交相與比周熒惑主聽故附下罔上之黨盛而威福之柄下移禍有不可勝言者伏見秦檜還自金國陛下驟任不一年而超至宰輔乃不顧國家盜威福在己欲永塞言路書上檜罷併劾檜黨王㬇王昞王守道皆罷之檜罷仍授觀文殿大學士提舉江州太平觀官如故龜年又奏曰比論秦檜徇私欺君合正典刑投諸裔土以禦魑魅今乃任便居住雖陛下曲全大臣之禮奈檜姦狀暴露復寵以儒學最上職名俾優游琳館聽其自如律斷羣盜必分首從為之從者皆已伏誅獨置渠魁可乎又曰臣聞恩莫隆於父子義莫重於君臣不義則後其君不仁則遺其親君親既然則何忌憚而不為檜厚貌深情矯言偽行進廹君臣之勢陽為面從退恃朋比之姦隂謀沮格上不畏陛下中不畏大臣下不畏天下之議無忌憚如此欺君私已有一即可黜況檜之欺與私顯著者為多乎章凡三上遂褫檜職孝宗淳熙六年夏大旱詔監司郡守條具民間利病知南康軍朱熹上疏言天下之務莫大於恤民而恤民之本在人君正心術以立紀綱蓋天下之紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後有所繫立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正今宰相臺省師傅賔友諌諍之臣皆失其職而陛下所與親宻謀議者不過一二近習之臣上以蠱惑陛下之心志使陛下不信先王之大道而說於功利之卑說不樂莊士之讜言而安於私􅉏之鄙態下則招集天下士大夫之無恥者文武彚分各入其門所喜則隂為引援擢寘清顯所惡則宻行訾毁公肆擠排交通貨賂所盜者皆陛下之財所竊者皆陛下之柄陛下所謂宰相師傅賔友諫諍之臣或反出其門墻承望其風㫖其幸能自立者亦不過齪齪自守而未嘗敢出一言以斥之其甚畏公論者乃能畧警逐其黨之一二既不能深有所傷而終亦不敢正言以𢷬其囊橐窟穴之所在勢成威立中外靡然向之使陛下之號令黜陟不復出於朝廷而出於一二人之門名為陛下獨斷而實此一二人隂執其柄莫大之禍必至之憂近在朝夕而陛下獨未之知也孝宗時熹提舉浙東常平茶鹽公事奏知台州唐仲友違法促限催稅搔擾飢民事狀曰臣昨訪聞知台州唐仲友催稅急廹致得民户流移等事即具大略奏聞今廵歴到本州天台縣據人户遮道陳訴本縣夏稅絹一萬二千餘匹錢三萬六千餘貫縁本州催促嚴峻六月下旬已納及絹五千五百餘匹錢二萬四千餘貫而守臣唐仲友嗔怪知縣趙公植催理遲緩差人下縣追請赴州縣人聞之相與號泣遮攔公植回縣情願各催户下所欠零稅絹二千五百匹限十日内赴州送納方得放免仲友遂専牒縣尉康及祖催納零欠更不照應三限條法及近日累降指揮牒内明言要在六月終以前一切數足又牒縣尉催淳熙七年八年殘欠官物専差人吏在縣監督及節次差下承局禁子等人絡繹在道乞覓搔擾無所不至又據寧海人户論訴本州専差天台主簿張伯温及州吏在縣催督去年殘米下户丁稅百端搔擾本司見行追問未到而聞張伯温在寧海縣追呼廹急本縣人户不堪其擾相與羣聚喧譟欲行毆擊伯温知之僅得走免臣竊惟台州頻年災傷民力凋弊仲友儒臣幸得䝉恩典郡専以布宣徳澤摩撫疲瘵為職而乃舞智徇私動乖仁恕在法夏稅省限至八月三十日下限方滿近來户部擅行指揮必要七月盡數到庫已是違法而仲友乃於户部所促之限又促一月公行文移督廹屬縣頓辱良吏苦虞飢民使千里之人愁怨歎息無所告訴甚失聖朝所以選用賢良恵恤鰥寡之本意又況方此饑饉人心易揺萬一果然生事不知何以彈壓臣雖踈賤誤蒙任使職在刺舉不敢不言欲望聖慈先將仲友亟賜罷黜以慰邦人之望其不公不法事件臣當一面審實以聞須至奏聞者熹又按唐仲友狀曰臣猥以踈賤叨被使令雖衰病之餘精力不逮而驅馳勞瘁不敢頃刻自安者誠以陛下知遇之深而思有以仰報萬分也今者不幸不得其職臣實有罪無所逃刑然有血誠敢勤天聽臣昨在紹興府道間聞得台州守臣唐仲友催稅刻急民多流移即於七月十九日具狀奏聞至二十三日入本州界又得其實再以狀奏至二十七日又得其貪汚淫虐蓄養亡命事狀數件復具條奏竊謂聖明威斷必不容貸雷霆震擊將不旋踵而側聽兩旬未奉處分仲友始者自知罪贓應死亦甚皇恐此數日來忽復舒肆追呼工匠言語譸張又遣客將傳語通判趙善伋云已得指揮差浙西提刑前來體究未可引斷竊詳上件事理元係本司奏劾若有指揮合是本司被受本司既無被受仲友何縁聞知便敢傳布意欲施行觀此氣象若非有人隂為主張擿語消息仲友罪人何敢遽然如此是則不唯臣竊惑之而此州闔境千里前日歡呼鼓舞之民莫不人懐疑懼懔乎如虎兕之將復出於柙也臣伏見仲友本貫婺州其亡弟之妻王氏見隨仲友同在郡舎仲友近日又為吏部尚書侍御史所薦而其支黨共為貪虐之人又皆臺省要官子弟親戚況仲友為人隂狡有素事窮勢廹干求請託何所不為竊慮以此之故黨援衆多曲為掩蔽使臣孤忠無路上達有以仰累日月之明兼衢婺明州災傷極重而處州士民近亦告急臣欲自此遍走諸州計度捄荒事務而台州之人以仲友未罷恐其一旦復出為惡邀留臣車不容起發臣遂不免申尚書省且住本州恭俟奏報竊慮違程日久按行遲緩有失數州飢民之望仰貽陛下宵旰之憂靜言本末由臣愚闇見事遲晚既不能及早按劾致留天誅又不能阿徇權豪共為欺蔽有此二罪難以復居官次顧以本路飢民阽於溝壑未敢自劾謹復具此曲折昧死奏聞欲乞睿斷先將仲友早賜罷黜付之典獄根勘行遣以謝台州之民然後申詔攸司議臣之罪重寘典憲以謝仲友之黨臣不勝幸甚干犯天威無任恐懼戰悚之至須至奏聞者時趙汝愚乞按提刑吳宗旦運判張伯垓疏曰臣聞身修而后家齊家齊而后國治未有其身不修而能齊其家其家不齊而能治其國者也謹按知嘉州張伯垓到任以來為政苛急督責財賦人多致死縱容子弟親隨干預政事交通貨賂出入倡館醜聲四聞初縁提㸃刑獄吳宗旦與之結姻遂相䙝狎每用妓樂燕飲常至達旦馴致兩家子弟人有所私衆皆指名不敢塵瀆今嵗上元諸郡皆不敢燕集唯聞嘉州與提刑司張燈以多相勝連夕遊宴肆為歡樂場務官司俱被科擾其後宗旦不避親嫌謬以伯垓為臧最遂誤朝廷除授就陞本路運判呼索從物並要如法近聞兩屬官管押衙兵方到客次伯垓親隨數人遽執衙兵司係縛箠打取索錢物至數百千兩屬官見之遂慙而退運司逺接舟船人從自有條例更於嘉州諸縣須索船錢寺院科取夫脚各有定數不知復作何用初政如此人將何堪今一路官吏百姓聞其先聲無不震恐臣謬將使指理難坐視伏望聖慈將吳宗旦張伯垓特賜罷黜使監司郡守咸知修身齊家之道以恵逺民幸甚汝愚又按汀守趙汝劼奏曰臣契勘本路汀州其地嶮僻其俗暴悍素號難治稍失調御輙敢數百為羣依山阻險抗拒官司為守臣者宜得寛猛相濟善撫柔其民者留意恵養庶幾上下相安幸於無事今訪聞得守臣趙汝劼自到任以來貪淫暴縱日事游宴不恤其民催督諸縣積年欠負急於星火去秋雖䝉朝廷罷免軍器物料本州不敢催理却以舊欠為名抑令諸縣認納如未罷免之數諸縣既無軍器科名往往復苛取暴斂以塞其意至有知縣不堪其苦欲自縊而死者本州兩獄禁繫欠負之人飢餓而死者前後蓋以百數却將所收錢物恣為妄費今嵗上元買琉璃燈至數千盞所費萬餘緡所愛官奴號蔡素嬪及隨行私僕皆交通關節貨賂公行一郡之政惟素嬪之言是聽委任進納人司理張珙及清流縣丞曾註使權職官皆招權納賂妄作威福凡暴虐刻薄之政二人者實助之然也本州久闕推官又司理已過滿半年以上代者恐違年遣人呼索迓吏汝劼輙追其人叱而去之其私於二人如此臣等恐其更有不公不法事件除已差官前去體究外今一郡之人如在湯火之中朝夕不能自保竊恐别致生事欲望聖慈特降指揮將汝劼張珙曾註先賜罷斥一方幸甚汝愚又繳韓彦質除知臨安府奏曰臣竊惟臨安雖號為駐蹕之地其實事體所關蓋與神州無異凡為守臣者謂宜精選公忠端亮深知治體者為之所補蓋非他郡比也而近嵗以來頗乖選任所用如吳淵輩例皆掊克貨財交結權倖以自封殖至於一郡政刑紀綱法度無不大壊所欠行户錢物家家以千萬計吳淵方有宫觀之命臣聞閭里之間無不歡呼鼓舞人人舉手加額以為陛下聖明至有逐行逐户率斂錢物市酒相慶者此其情蓋可見也數日以來未曾除代上自士大夫下至闔境百姓皆謂朝廷不輕謀帥必得公忠端亮深知治體之人庶幾稍革前日之弊而命下之日卒用彦質臣恐都人愈失望矣臣與彦質猶未相識臣亦不能深知其才行但以一事觀之臣故知其不可始縁今夏都城遺火吳淵自知無所逃罪遂嫁禍於民居建為拆屋之說是時一城大擾百姓怨嗟然猶有可諉者謂可暫勞而永逸也今聞彦質效尤復欲自都門之外至鎮江府沿路民居屋宇並要除拆數尺於是數郡之民又大驚擾怨嗟盈道所不忍聞而彦質又不能周宻頗漏其意至於道路相傳皆謂翠華不日臨幸人言籍籍遂不可掩誠恐鄰國聞之所繫顧不重哉加之彦質此行實與北使俱往萬一北使所至或有得於觀聽之間亦豈能無疑也臣以是知彦質以謀國則甚踈以臨民則甚擾以事上則不忠其意不過欲託為夸大可喜之說以迎合陛下之意而竊取美官爾其實非能為國家深計也陛下英明天縱如揭日月彦質情狀豈不洞見今乃付以京尹之任寵以祕殿之名望其能體國愛民臣知其不能矣臣愚伏望聖慈收還新命精選良吏更定規模庶幾漸復祖宗之制亦使要功生事為國斂怨之人自今稍知懲創天下幸甚汝愚又按永福知縣髙㮚羅源縣尉龔史良奏曰臣等竊惟國家之治専以仁厚寛恕為本張官置吏凡以為民其間有奉職失當致百姓有無辜而死者臣等職在按察不敢隠黙臣等伏見本州去嵗豐熟今嵗米價不至甚貴永福縣在市白米每斗不過二百三十文足自不須賑糶官米知縣事宣教郎髙㮚擅作常平米出糶其減價太低又措置無術六月二十日有男子婦人小兒約五千餘人擁併入縣互相蹂踐至林全等死者七人傷者一人又羅源縣先有行者光潤因帶銀貨入城中塗為盜所殺本縣尉廸功郎龔史良疑是鄰近景跡人項徳為盜遂併捕其子受僧就本廳逐日訊勘經渉二十餘日終無贓證又不依條申解本縣致項徳被苦身死本州除已追合千人送獄根勘依條施行及將髙㮚先次對移懐安縣丞外其髙㮚龔史良雖是縁公致罪情在可矜然事干人命不容但已伏望聖慈特賜黜責以謝無辜之民吏部郎官范成大奏曰臣伏覩中書省録黄指揮宋貺召赴行在臣謂率土之濵莫非王臣陛下欲見一臣寮何所不可天鑒之下將無所逃用捨廢置皆未可知固無必不可見之理但臣採之公議有不得而黙者契勘宋貺當秦檜柄國之時號為親昵用事為世指目章章尤顯者士大夫醜其姓名于今有年矣臣取㑹前後章疏姦汚之狀固不一端為奉使則興販北貨攝京府則强畧倡優任版曹則買諸軍之銀領贍軍則受辟官之賂司建康留鑰則専為權門起造園宅如此之𩔖未易槩舉亦未暇論也究其始初罷逐之由正縁司計不職以致左帑闕乏支遣不行至用臨安公使庫及激賞贍軍等庫錢物那移又勘虚旁令軍人自往漕司支請若漕司無錢幾致生事臣寮論其身為計臣經畫如此是時檜猶無恙而貺已斥矣則其才術已試大繆明白如此今聞忽有召命竊恐或謂其有富國才術欺陛下者只攷元罷户部因由則是非虚實灼然可見臣聞人才難得弗忍終弃聖人之用心也使君子之人而偶罣憲網固當扙拭而進之使小人而有才亦可覆其玷缺駕馭以驅使之今以貺為君子而偶罣憲網邪則平生姦汚之聲徧于海隅矣以為小人而有才者耶則當兵釁未開之前朝廷積富之後從容版曹而使帑藏空乏至以虚旁撥遣軍人亦可駭矣竊恐一旦進用不惟無益於國其餘黨𩔖帖息伏潜者皆將動心經營僥倖復進徒使疑議四起又費彈壓臣恭惟陛下昭徳塞違以臨照百官正欲安靖國人純一風俗而已將來貺或有所除授必致衆論紛紛以發其不靖之機臣䝉被陛下擢寘西掖正典書命比之諸臣尤不當緘黙伏惟聖慈儲神委照攬臣此章特留聖念别賜處分不勝幸甚成大又上劄子曰臣聞聖人在上所以虚已以來天下之言者蓋欲廣見聞資啓沃以輔聰明之所未及也至於朝變夕改乘時射利之徒候伺上意耳剽口傳為迎合之說取容一時以釣爵位者將安用之哉國家之於北敵可謂血讎矣是讎也天地神明社稷蒼生其誰不知陛下受太上之託荷列聖之休不忘北向以雪宗廟大恥可謂有志矣是志也天地神明社稷蒼生亦其誰不知乃宸謨聖策甫欲有所設施而一時射利之徒如前所云者即便髣髴指意爭獻迎合之說繙舊史以談計謨檢方志以述地理詢北客以撰事機走權門以伺報應如是而已聖朝以其說之惓惓不吝賞激至有布衣補官而去者甚衆一人得志轉相倡和競以迎逢為進身事業傳播既廣四方翕然洩陛下之神機漏朝廷之宻指甚非國家之利也伏望聖慈與腹心輔臣思大計之甚重審先務之當行日夜淬厲自圖實効凡迎合之虚言取恱一時之聽無益於國而徒利其身者不必更誘而進之以開倖門而玩大謀天下幸甚歴代名臣奏議卷一百八十三
