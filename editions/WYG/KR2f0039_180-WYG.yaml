body:
  text: 歴代名臣奏議卷一百八十明楊士竒等撰去邪宋哲宗時監察御史龔夬彈章惇疏曰切以宰相之任代天理物佐人主出令茍非其人害及天下臣伏見左僕射章惇性質凶邪敢為姦暴今則罪状顯著天下共聞臣特掇其大者言之盖舜之罪驩兜也以其誣人罪故放之崇山號為凶人按惇昨在元祐間廢黜不用及紹聖初擢任元輔不思竭忠以圗報稱而乃隂懐私忿專報仇怨及其甚也誣人以悖逆之罪俾其朽骨銜寃於地下子孫禁錮於炎荒天下忠臣誼士憤悶而不敢言是以隂陽疵癘凶饑相仍皆有以致之也乃者先帝大漸而惇不思社稷大計輒進姦說意在傾揺此其為罪死有餘責矣恭惟先皇帝委任輔弼推誠不疑度越前古而惇乃肆為姦暴以快私意則負先帝也多矣若其它姦賊萬狀人言紛紛於他人以為大惡其於惇之身則罪尚為細未易遽論伏望聖慈特賜詳酌宻正刑典夬再論章惇疏曰臣伏覩朝㫖下御史臺根勘道路官吏節次施行外臣謂管幹道路等官吏信有罪矣然全由山陵使司措置無術以至於此臣切見章惇奉使裁處一行事務唯是妄作威怒致上下人情怨咨無肯究心出力以奉上者至鞏汜之間因泥雨過常遂至墊陷臣又聞昨来靈駕離汜水頓其力士等止給蒸餅四枚而已自二十七日夜至二十九日天明雖使不至泥淖亦有饑乏不能舉重兼惇既領使事親見泥淖自當從靈駕逐旋措置而自申未間先到幄次既聞靈駕過期不至亦合前去照管直至一更已来方始往泥陷處又無規畫止用枋木薦動大昇轝顯見前後高下不平靈駕自来早入幄殿百官朝晡入臨官中亦當早晚上食是日悉皆廢闕人情惶駭不可具道又元祐皇后扈從不敢少去靈轝之側而惇乃請歸幄次則是已不能竭力又欲䧟元祐宫於不義其罪可勝言哉臣謂道路應干官吏已送有司施行而惇為罪首伏望聖慈特賜詳酌施行夬又論章惇䟽曰臣伏聞今月初八日宣制章惇落尚書左僕射兼門下侍郎依前官知越州命下之日士論皆云少慰而未快按惇凶德暴著人神共怒今纔奉使失職而去除罷政外不聞褫奪雖朝廷優禮輔弼以勸来者然罪止於此則人情不能無惑盖惇受先帝之厚眷委信不疑雖古君臣相與之盛未之有也義當虚心一意旁求俊傑以助聖治而乃隂懐宿憤專報恩讐力引姦凶並據要路睚眦之怨竄斥無餘竊聞昔日丁謂執政號為恣睢然不過能陷寇準而已紹聖四年之春廟堂之論方一於是國之故老元輔侍從臺省之臣凡天下所謂賢者不問存殁並從貶斥一日之間布滿湖嶺自宋有天下以来未之聞也當是時惇之凶威震於海内陛下之所親見固不待臣言而後知盖其立造不根之語文致悖逆之罪是以人人危懼莫能自保天下忠臣義士為國家寒心者多矣使惇之所為出於誠心猶且不可其於貶降之人不廢私禮但云獲罪於天則是使人歸怨先帝而快己之私意罪不容於誅矣今惇罷相近同無罪而去此公議之所以未平也伏望聖慈俯徇中外之情速正姦惡之罪非獨臣之願乃天下之所望於朝廷也御史中丞傅堯兪彈安燾䟽曰臣近見諫官䑓臣論列知樞宻院事安燾孝聲不聞等事燾抗章避位而陛下留之頗堅臣竊以為陛下未之思也衆人所言臣不敢重煩天聽臣有所見不敢不以聞惟陛下留神省察臣伏以安燾天資囘僻無大臣風操自陛下聽政以来天下事可行即行可改即改惟以便民為務固一歸於公議而燾方執政柄其可改者未嘗奮然肯行有迫於公議不得已而行者行之未嘗肯盡必留根枿為異日可以翻移之計如保甲及渠陽軍之𩔖是也其多不可遍舉專務謀身徼福未嘗有首公利社稷之心此皆無逃聖鑒若陛下於清閒之宴追記而詳察之其議論事為歴歴可見乆居機宻為害己深今又顧慕以窺冀宰相而方固留之臣實未諭陛下念燾乆侍左右聽其罷去陛下終始之㤙已不貲矣若欲決留遂躋揆路臣雖無状敢以死争臣無任懇激之至堯俞又論蔡確䟽曰臣竊聞知鄧州蔡確近以怨誹上聞陛下不忍加誅降為光禄卿分司南京士大夫轉相慶抃仰陛下全生育之㤙顧確之狂忿豈足以塵㸃太清惟陛下盛德之光益輝映於古今矣然確之自絶於天陛下既屈典刑矣無足復道臣獨念陛下克己敦仁盡至公以臨下有生之𩔖莫不䝉被盛徳而歌頌盛美廼得此於確雖聖度如天莫可窺測誠恐有不能平者願陛下聽之如蚊蝱過耳不使有纎微之忤以干太和之氣則天下幸甚初確詩之傳議論之間是非殆相半盖足以見確黨之盛矣惟此不可不察是固難逃神鑒願陛下深思而留意焉邪正之辨定與不定視此一舉臣不勝區區之至貼黄風聞中書舍人彭汝礪縁蔡確事亦嘗抗章論列及其降黜又不草制詞外廷不知端倪未敢彈奏乞勘會若稍渉救解不能與衆共疾姦惡當明加黜責茍無行遣則是賞罰不明無以鎮服天下堯俞又論蔡確疏曰臣竊聞蔡確分司南京尚帶左中散大夫臣再三思之其官既崇又分司者敘復皆有常法陛下過屈典刑雖深仁盛德超絶古昔然於是事殊為未便緣確之用本無德望徒以數興大獄遂躋相位纔罷政柄怨誹己及君親其憎疾善人固可知矣萬一復進上必為解構之姦下必有排䧟之酷臣謂宜投竄荒僻使還路迂逺而不可必則善人安而小人革矣如此則向背之風自然寢息確之深狡衆所共知若不如此其懐毒伺隙殆無術以止其来士大夫所以多觀望而持兩端者以此今天奪其魄自為狂悖之語以𤼵露其心不因此時去之將貽後悔願陛下奮然必行斷在無惑至其黨與雖不可窮治當取其尤親善者併逐之以懲邪慝自昔斥大臣者皆然固可考而知也臣無任懇欵之至堯俞又奏曰自古端人正士誰不欲盡忠於人主人主亦豈不故聞盡忠之言常患執政大臣離間於中使明主之初心遂移忠臣之雅懐不盡以為痛恨爾時多有元豐舊黨分布中外多起邪説以揺撼在位吕大防劉摯患之欲稍引用以平夙怨謂之調停宣仁后疑不決侍御史蘇轍靣斥其非復上疏曰臣近面論君子小人不可並處聖意似不以臣言為非者然天威咫尺言詞廹遽有所不盡臣而不言誰當救其失者親君子逺小人則主尊國安疎君子任小人則主憂國殆此理之必然未聞以小人在外憂其不恱而引之於内以自遺患也故臣謂小人雖不可任以腹心至於牧守四方奔走庻務無所偏廢可也若遂引之於内是猶患盜賊之欲得財而導之於寢室知虎豹之欲食肉而開之以坰牧無是理也且君子小人勢同冰炭同處必争一争之後小人必勝君子必敗何者小人貪利忍耻撃之則難去君子潔身重義沮之則引退古語曰一薰一蕕十年尚猶有臭盖謂此矣先帝聦明聖智疾頺靡之俗將以綱紀四方比隆三代而臣下不能将順造作諸法上逆天意下失民心二聖因民所願取而更之上下忻慰則前者用事之臣今朝廷雖不加斥逐其勢亦不能復留矣尚賴二聖慈仁宥之於外盖已厚矣而議者惑於邪説欲招而納之與之共事謂之調停此軰若返豈肯但已哉必将戕害正人漸復舊事以快私忿人臣被祻盖不足言臣所惜者祖宗朝廷也惟陛下斷自聖心勿為流言所惑勿使小人一進後有噬臍之悔則天下幸甚疏入宣仁后命宰執讀於簾前曰轍疑吾君臣兼用邪正其言極中理諸臣從而和之調停之説遂已時中官裴彦臣建慈雲院戸部尚書蔡京深結之強毁人居室人訴於朝詔御史劾治常安民言事有情重而法輕者中官豪横與侍從官相交結同為欺罔此之姦状恐非法之所能盡願重為降責以肅百官獄具章惇主之甚力止罰金安民因論京姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顛倒天下之是否内結中官外連朝士一不附已則誣以黨於元祐非先帝法必擠之而後已今在朝之臣京黨過半陛下不可不早覺悟而逐去之他日羽翼成就悔無及矣是時京之姦始萌芽人多未測獨安民首𤼵之蔡確為裕陵復土使還朝以定策自居監察御史王巖叟言陛下之立以子繼父百王不易之道且太皇太后先定於中而確敢貪天自伐章惇䜛賊狠戾罔上蔽明不忠之罪盖與確等近簾前争役法詞氣不遜無事上之禮今聖政不出房闥豈宜容此大姦猶在廊廟徽宗即位殿中侍御史陳師錫上䟽曰元豐之末中外洶洶矣宣仁聖后再安天下委國而治者司馬光吕公著爾章惇誣其包藏祻心至於追貶天相陛下𤼵潜繼統而惇猶據高位光等贈諡未還墓碑未復願早攄宸畧以慰中外之望蔡京為翰林學士師錫又言京與弟卞同惡迷國誤朝而京好大喜功銳於改作日夜交結内侍戚里以覬大用若果用之天下治亂自是而分祖宗基業自是而隳矣京援引死黨至數百人鄧洵武内行汙惡搢紳不齒豈可滓穢史筆向宗回宗良亦隂為京助是皆國之深患為陛下憂為宗廟憂為賢人君子憂若出之於外社稷之福也帝曰此於東朝有礙卿為我處之對曰審爾臣當具白太后遂上封事言自昔母后臨朝危亂天下載在史冊可考而知至於手書還政未有如聖母退抑謙遜真可為萬世法而蔡京隂通二向妄言宫禁預政以誣聖德不可不察也殿中侍御史龔夬乞示好惡明忠邪疏曰臣聞好惡未明人迷所嚮忠邪未判衆聽必疑臣頃在外服側聞朝廷聖政日新逺邇忻戴及被命詣闕又聞進退人材皆出睿斷此固甚盛之舉也然而姦黨既破則彼將早夜為計以謀自安不可不察或遽於革靣以求自入或申執邪說以拒正論或妄稱祻亂以動朝廷或託言祖宗以廹人主或巧事貴戚或隂結左右大抵姦人之情其計百出不可盡舉其要則欲變亂是非渾殽曲直以疑誤朝廷將幸其既敗復用已去復留而已矣君子直道而行不為機變則必墮姦人之術内若然則天下之治殆未可知也故必在朝廷洞判忠邪斷而行之若小不忍則害大政恭惟先皇帝聰明聖神臨政願治臣昔䝉賜對親被聖訓勿為阿附以期自守今臣不言則為上負厚恩下廢所守朋姦㒺上自取犯義之罪惟陛下深察臣言以示好惡以明忠邪而陟降多士使逺近皆知進賢退姦之意将見天下鼓舞聖化太平之治不難致也夬又彈蔡京䟽曰臣伏覩朝廷罷黜方天若事命下之日士論忻快盖天若之凶邪人情共惡衆見其已廢復用竊疑之忽聞新命大慰輿望然臣切聞翰林學士承旨蔡京自天若為布衣收寘門下賴其傾險以為腹心蹤跡詭秘未可遽論而其稍可見者昨因周穜與天若私論鄒浩事穜以為難天若非之遂以語京京遽以聞由是穜等得罪自爾附會之人肆為攻訐立起犴獄多斥善士天下寃之皆京與天若為之也且浩之言事既為衆所取而京職在獻替自當採摭公言聞於朝廷請貸其罪既不能然反與天若互為表裏力肆傾陷以快私意盖穜初與京善其後稍異故私欲報之臣竊謂京之為人嘗如此今乃職據要近冠於從官此忠邪之所未判清論之所未平也按京外寛内深邪諂以合小人之情今其黨與助為遊說欲掩其罪最為難察臣驟䝉朝廷擢居言路聞於輿議參考得實不敢循黙以避怨謗伏望朝廷洞察京之姦邪不可尚留左右早賜斥逐以慰中外天下之望不勝幸甚夬又論蔡京䟽曰臣近論奏蔡京事雖得於風聞未究實状然訪之外議人人皆同乆而彌彰按京之傾邪與卞不殊臣今所言為兆而已然已見其難行若朝廷國史大典欲使成書非臣所預而臣特論其人物邪正不可先差擾數日而辦及紹聖講復免役復預討論又昨卞在朝與京表裏相濟而今或謂趨向不同此尤可怪盖其為人反復趨利頗為難察復善權數以傾陷言官自頃議者敢有論列即被排逐此天下之所共知也一起犴獄誣陷非辜其事不一伏望聖慈博加採訪以辨忠邪天下幸甚夬又論三省不疾速進呈言蔡京章䟽状曰臣自今夏以来彈奏蔡京姦惡更渉寒暑章䟽累上又聞臺諫臣寮相繼各有彈劾文字今䝉陛下洞察其情以章付外而三省大臣或隂相交結或私懐畏避並不疾速進呈取旨謫降使國之典刑㡬廢不用外議訩訩不可具述伏望聖慈特賜詔問三省顧望之意仍乞以臣前後所奏速賜施行夬又彈蔡京疏曰臣伏見新除端明殿學士知永興軍蔡京性資凶邪心術傾險多罪著聞中外譁沸而況私交宫省之臣宻伺人主動静與古姦臣異世同惡今朝廷寵以秘殿之華資付以咸秦之方面尚敢不體至恩偃然自肆遽請祠宫情渉怨望人臣凶横有至於此理無可恕伏望聖慈特賜睿㫁檢臣前後所奏施行貼黄臣自夏以来累具彈奏蔡京姦惡兼前後臣寮皆有彈劾今來京以無罪而去則是朝廷全廢典刑不唯士論未快而使天下姦惡無所忌憚非國之福伏望聖慈詳酌速賜施行夬又論蔡京疏曰臣勘會蔡京姦惡不可具述除前後彈奏外伏覩先朝降旨於資善堂書寫五朝寳訓所降指揮止令差使臣二人而京却請乞殿閣内臣一員又差入内供奉官等二人後来朝旨已罷所指差文臣而所差内臣不罷盖京自来宻交近侍之臣使之刺探起居為臣之姦無大於此京以侍從之貴而於内臣雖高品黄門之𩔖無不曲加禮敬卑汙庸俗不可具道素喜翰墨好施予無問高下多以書禮問遺結其驩心積有年矣兹事中外之所共聞大為清論所鄙而京不顧㢘耻安而行之尤善秘其迹故議者不能斥論然臣有說於此按京姦邪隂險衆所同惡而左右之臣輒有譽其所長諱其所短者則其交結無疑不必得其迹而後可知也又京之徒毎揚言於人云彼善結宫貴之歡外庭論議必不能動盖自恃左右之助以恐動言者茲尤可鄙今雖聞已補外而不緣罪去輿論甚欝伏望聖慈特降睿旨檢會臣累奏前後臣寮所上章䟽及今来事理重行貶竄以為天下後世姦臣之戒夬又論蔡京疏曰臣近甞具奏言文及甫書及究問所獄事今聞陳瓘辭免㤙命文字所言蔡京罪惡疏内一事京親寫奏劄乞誅滅劉摯等宗族賴哲宗仁聖不行其請臣竊惟哲宗皇帝臨御天下十有六年自即阼以来赦過宥罪與民更始向有朝士之子語言不順有司用法將寘極典而哲宗親為辨明貸其罪一方水旱憂形玉色遣使顧恤倒廩而餔之然則聖徳深厚寛仁愛人得於天縱而京以私忿輒欲族滅無辜以希進取又欲厚誣宣仁聖烈以合惇卞之意是故上天譴告沈隂不解星度尤異既而先帝感悟竟從寛貸天下方且仰頌聖明美幷萬口而京輒自稱平反之功使人歸怨於上此天下忠臣義士所以含憤扼腕而不能自已也臣前後所言京事獨患不得其跡今陳瓘所言如此則是京自有所上文字事狀甚著始則上誣宣仁終則歸咎先帝人臣之惡有甚於此者乎若瓘所論謬妄失實則朝廷自當重行貶逐以戒狂誕而臣愚承誤敢復論奏亦當與瓘同責若其言不妄豈得以無罪而去朝廷之論必當居一於此臣以上殿劄子恐不能盡所欲言須至先具奏陳伏望聖慈詳酌檢會臣寮前後所奏速賜施行夬又奏乞檢尋文及甫究問獄案狀曰臣竊聞自古姦臣戕敗善𩔖以防後患必置之死地而善人脩身無大過失欲求其罪惡之實而不可得故託以悖逆無驗之罪又慮其異時子孫訴理於朝故必欲族滅而後已此古姦邪之常態也臣近觀前日及甫之書究問之獄不意兹事出於朝廷使愚臣痛心疾首感憤流涕臣竊惟宣仁聖烈擁佑先帝慎擇累朝重望之臣寘之左右輔道聖徳彌綸朝政九年之間中外安静此天下之所共聞也前日止緣一二姦邪嘗被斥逐敢欺㒺朝廷成此大獄以報私仇必欲族滅無辜以快其意當爾之時天地變色日月無光積隂踰時中外詾懼以至彗出西方譴告甚著先帝為之肆赦求言以答天戒而姦臣之忿不已持之益堅由是逐臣死於瘴海家族不許生還至有一門二十餘䘮者然則雖無刀鋸其實族滅也朽骨銜寃沈䰟為癘以及於斯痛不忍言今及甫等罪上賴聖斷已行竄斥而當時秘獄必有案牘章䟽可以見其鍛錬文致附㑹欺罔之人若不早行根究必慮藏匿焚滅無所歸咎則天下何以知其非先帝之本意伏望聖慈特賜睿㫖須管檢尋當時照證文書以正姦臣之罪以慰天下之望夬又彈蔡卞䟽曰臣聞為國之要必辯忠邪忠邪既分當明黜陟臣伏見尚書左丞蔡卞操心深險賦性隂邪始緣阿附權臣致位二府既而漸盜威福中分國柄曩怨宿仇隂加報復不附己者棄斥無餘止緣為王安石之壻妄謂盡傳安石之學以欺惑朝廷於是一時嗜利之人翕然附之以助成其說使天下不覩是非之實恭惟先皇帝體貌大臣極於㤙禮而卞之事君如此則不忠之罪大矣彼既不忠於先皇帝豈能忠於陛下今乃尚居二府叅預機政是以清議沸騰中外一口伏望聖慈察其姦邪斷自宸衷特行罷黜以慰天下之望夬又論蔡卞䟽曰臣近嘗論奏尚書左丞蔡卞姦邪不可尚留二府未䝉付外施行中外之情殊為未允臣謹按卞事上不忠衆所共惡而懐姦深阻最為難知頃在先朝受國厚㤙不思補報專為邪說迷誤朝廷凡天下公論之所同者反指以為流俗使正人端士不容於朝前則有陳次升因事被逐後則有鄒浩以言得罪皆竄之蠻荒期於必死由是言事之臣競為阿附中外士庶孰敢吐氣雖同時執政亦預是事而皆由卞發之為力居多恭惟先皇帝聦明神聖比德祖宗臣頃以凡庸誤䝉賜對隨事獻言無不開納臣又風聞前此憲臣進諫其言苦切先帝容其讜直御坐為起然則聖德之盛雖自古納諫之主方之蔑矣卞為大臣不務將順聖意而乃務為邪說以便其私則其不忠之罪可勝道哉陛下聖度優容未忍加罪而彼不忠於先朝陛下安得而赦之伏望聖慈察臣言之懇惻採輿議之至公特賜施行以慰士論天下幸甚夬又論蔡卞䟽曰臣伏聞蔡卞落職提舉宫觀太平州居住天下之士恭仰聖㫁孰不忻躍然臣竊見蔡京與卞表裏相濟天下共知其惡播於民謡號二蔡又曰大蔡小蔡者是也而議者患其無跡可考不敢斥論盖未深思耳臣按君子為善小人為惡若其跡暴於天下者皆非善惡之至也茍臻其極二俱無迹房杜宋成貞觀開元之治考其施設殊不聞於後世又況稷卨臯陶之盛宜乎人無能名焉惟惡亦然昔人嘗論少正卯盜跖其惡孰深或曰正卯雖姦不至割人充膳則盜跖為甚荅者曰為惡彰露人思加戮隠伏之姦非聖不誅是故正卯一國之聞人而仲尼戮之者盖察其無跡之惡耳夫是之謂聖人按京服䜛廋慝外寛内深與其弟卞陽踈隂合宻叅國論附麗者亟躋顯要異議者立見排逐迷誤朝廷誣害忠良多出其謀而身不在二府故跡不暴著是姦邪之尤者非陛下之睿聖何以破此無跡之姦是以天下忠義之臣方正之士顒顒然日有望於英斷臣以愚陋實有言責既聞輿議如此不敢私畏強禦茍避祻患故輙陳其一二伏望聖慈特賜詳酌施行以慰天下之望貼黄臣按民謡云二蔡二惇必定沙門籍没家財禁錮子孫又云大惇小惇入地無門大蔡小蔡還他命債竊謂民至愚而神其不可欺如此夬又上疏曰臣聞牧羊者不去敗羣則羊不蕃飬榖者不鋤莨莠則榖不植聖人之治以去邪勿疑為深訓容姦納邪雖堯舜之君不能成政臣伏見陛下即位以来宵旰求治然尚疑於去邪欲望政成是猶却行而求前也臣謹按翰林學士承旨蔡京資政殿學士知江寧府蔡卞姦詐狠愎兄弟同惡迷國誤朝為害甚大卞雖去位尚竊峻職玷名邦京偃然在職謂朝廷無識其姦日夜交結内侍戚里以覬大用中外見陛下容忍留京咸謂果有大用京之意諫官御史自四月以後彈奏京罪並未䝉施行今京内恃郝隨劉佶軰為之頰舌外結宗回宗良等為之肘腋以成自安之計使京果賢無覬位之心知臺諫論列如此豈不引嫌畧為去就乃敢傲慢自若不顧公議曾何靣顔況京好大喜功銳於改作若果大用必須妄作變亂國政天下治亂自此分矣祖宗基業自此隳矣自京卞在朝援引天下之士居要塗躐美官者何啻數百人皆死黨附麗若更大用則貪爵祿無執操之徒盡附之矣其不附者京必以惡名加之不誅則廢當是之時京卞之門政令所從出陛下孤矣雖欲去之不可得也臣以謂京之敢爾者緣陛下去卞不早既去又不能正典刑以明罪惡京以此窺陛下故敢愚弄朝廷玩侮國章陛下作新初政而姦人窺伺如此臣恐天下有識之人豪傑之士皆解體矣伏望聖慈特降前後臺諫彈劾蔡京蔡卞文字速賜施行夬又論章惇疏曰臣伏覩本朝法制寛平過於歴代民之所欲者因而循之民之所病者革而化之祖宗德澤所以入人深而海内乂安民氣和樂建隆初編勅四卷百有六條太平興國中增至十五卷淳化中倍之咸平中增至萬八千五百五條芟其煩亂可為勅者二百八十有六條緫十二卷當時便其簡易大中祥符七年又增至二十卷千二百七十四條至天聖中有司言勅復增至六十餘條命官刪定仁宗皇帝問輔臣曰或謂先朝詔令不可輕改信然乎王曾曰此憸人惑上之言也咸平中刪太宗詔令十存一二去繁宻之文以便於民何為不可仁宗然之於是下詔中外使言勅之得失由是觀之朝廷之法消息盈虚與時偕行何常之有神宗皇帝窮天下之至神語聖人之妙道其緒餘為法於天下新於熈寧成於元豐及其乆也如天四時春夏雖仁不可常行秋冬代之秋冬雖義不可常用春夏更之元祐上封事者言法度於民不便因而更張之如太宗之於太祖章聖之於太宗仁宗之於真廟神考之於仁英朝刪法度務從民便所以垂簾九年朝廷無事夷夏乂安哲宗皇帝親政召章惇為宰相不能以道事君用羣小合謀害元祐忠賢司馬光吕公著等變亂神考法度謂之不忠不能紹述謂之不孝以此激怒先朝此王曾所謂憸人惑上之言也惇以光等變亂神考法度不足為深罪又編𩔖臣寮章疏擇其切直不諱之言與夫陳亂世以諷今者謂之訕上謂之指斥臣觀書見禹戒舜曰無若丹朱傲惟慢遊是好周公戒成王曰無若商王紂丹朱堯不肖子紂商之無道君禹以堯不肖子戒舜周公以商無道君戒成王亦可謂之訕上乎亦可謂之指斥乎惇又以章疏語言不足為大惡乃持文及甫邢恕之私言輙誣光等謀廢立為不軌無状可按無迹可尋無證佐可明惇一切以意為之臣聞章獻時程琳上武后臨朝圗終仁祖世為将相光等有程琳之事乎惇輙誣光等為不軌是誠何心哉永興軍流人上寇準變事吕夷簡曰準治下急是欲中傷準耳宜勿治益徙之逺方元祐間有曾告光等變者乎今輒誣光等為不軌是誠何心哉徐鉉於江南録云宋齊丘将圗不軌太宗皇帝覽書謂左右曰齊丘盡節於李氏鉉以私憾加謗豈得為直筆乎齊丘江南李氏之臣鉉以不軌之罪加之太宗猶惡焉況惇輙誣本朝忠賢司馬光等謀廢立為不軌陛下可優容之乎臣謹按惇當國七年竊持威柄禍福天下勇於害賢敢於殺人臨大變訂大事包藏隂謀𤼵為異議陛下尚優容之乎祖宗怒惇乆矣今付陛下震之上帝怒惇乆矣今命陛下誅之陛下何惮而不果耶伏乞睿斷早賜施行大觀三年何執中為尚書左丞加特進制下太學諸生陳朝老詣闕上書曰陛下知蔡京之姦解其相印天下之人鼓舞有若更生及相執中中外黯然失望執中雖不敢肆為非法若京之蠧國害民然碌碌常質初無過人天下敗壊至此如人一身臟腑受沴已深豈庸庸之醫所能起乎執中夤緣攀附致位二府亦已大幸遽俾之經體賛元是猶以蚉負山多見其不勝任也䟽奏不省而眷注益異御史中丞石公弼上奏曰臣伏覩近降指揮内東門司自今後應使臣醫官等並不得将帶經火製煉毒藥如伏火砒硫黄朱砂之𩔖入會通門入内許諸色人陳告酬賞臣有以見陛下造道深妙聖慮獨高凡挾方技進者所不能欺也盖丹藥出於方士之說事不經見率是誑誕凡人尚當審謹豈可供進宫禁固宜重為闗防以塞妖妄之源臣愚以為皇城諸門禁令尤不可不嚴亦宜此施行如臣寮以此陳獻或援引製煉之人亦乞立法止絶所有見今燒製道士挟持惑衆臣訪聞稍稍招權作過修盖葆真宫約費錢十二萬餘貫今既不用其術臣以為其人不宜留置京師欲乞特降睿旨奪去師名押歸本貫葆真宫修造如可減節即乞減節施行四年彗再見侍御史毛注言臣累論蔡京罪積惡大天人交譴雖罷相致政猶怙㤙恃寵偃居賜第以致上天威怒推原其咎實在於京考京之罪盖不可以縷數陛下去黨碑以開自新之路京疾其異已而别為防禁陛下頒明詔以来天下之言京惡其議已而重致於法以嚴刑峻罰脅持海内以美官重禄交結人心錢鈔屢更而商賈不行邊事數興而國力大匱聲熖所震中外憤疾宜早令去國消弭災咎奏上京始出居錢塘洪彦昇為殿中侍御史任言責閱五年論蔡京再居元宰假紹述之名一切更張敗壊先朝法度朋姦誤國公私困弊既已上印而偃蹇都城上慿眷顧之㤙中懐跋扈之志願早賜英斷遣之出京何執中緣潜邸之舊徳薄位尊當軸處中殊不事事見利忘義唯貨殖是圗願解其機政以全晩節政和中尚書右丞許翰上奏曰今月日承中書省刑房送到詞頭一道盛章落職差提舉南京鴻慶宫襄州居住何訢落職差提舉亳州明道宫本處居住者按章姦慝之迹乆已不逃聖鑒幸蒙陛下天地涵容湔濯奨蹙冀收其報而章之兇險根于天資孤負明㤙終不思革顯謫既行公議交慶然臣尚有所未喻者㐮陽乃章墓墳之國章於州城比營大第雲屋潭潭甲於諸路功役資費不出其家徒以威聲氣焰刼使郡縣侵牟百姓騷動一方至今寃痛之音未絶也而又使以其身往彼其貪忍之資不待親執州權民必重被其患襄陽之人亦何負哉今何訢坐與交通已徙它州而盛章重有姦邪倨傲不恭之罪乃獨歸安其第均為斥逐重輕不倫且使為人臣者姦慝未彰則要職美官揚厲於公朝罪惡既暴則眞祠厚禄優㳺於私室小人夫亦何憚而不為此雖一盛章之休戚何足以言而繋廷臣之勸沮不得不慮所有詞頭臣未敢具草謹録奏聞宣和元年翰為中書舍人又上奏曰右臣今月日承中書省兵房送到詞頭一道為趙畿化諭夷人并趙隆趙吉頓習禮義等各特與轉官事臣聞大而化之者聖人之事也是以聖王在上則詩無諸侯之風盛德所格殊俗惟新竝邊蠻夷曠然服化此皆陛下神明威武之所感移不得不爾一趙畿者何人乃敢以為已力臣竊觀畿所申狀輒言以副知郡丁寧教戒之心又有自知郡到任除去夷風等語使人誠有此意而畿恬有其言以聞朝廷則是不専歸徳於上臣禮不恭使人本無此意而畿訹使之言則是便文為姦欺罔朝廷罪益大矣二者無一可夫人君體道以兼容人臣守法而盡察古之義也今朝廷示以德信覽其奏則損一官而與之其事至微然臣竊恐夔峡一路靡然効畿所為謂國賞之可徼忘天功之難僭則陶化殊俗之美不在陛下而在守臣此非所以聞四夷載史冊也非諸侯無風之義也是以不可不論且使今日畿已受賞則它日身至朝廷必将援以為功干祈擢用叨取㤙榮人臣不得而追論矣至此則四方聞之必有動心者長鄙俗之風害謹信之化所慮豈止夔峡一路而已其㳙易防其萌易析誠使㡬微必察自然國體皆正除趙隆等轉官臣已草詞外所有趙畿轉官詞頭未敢具草宣和中殿中侍御史許景衡論罷童貫宣撫河東䟽曰臣聞天下之事言之未然則若狂率而無根言之已然則又緩後而無及矣近者中外喧傳皆言朝廷将起童貫宣撫河東若果無此議則是傳者之妄而臣有採聽不審之罪若果有此議則臣願言之於未然也謹案貫頃在陜西專務誑誕以為事功夤縁軍須攘竊邊計重以賄賂至千萬億奏功第賞皆由請屬胥吏厮僕皆位侯伯狎昵士卒隳壊軍政此皆陛下所洞知固不待臣之縷數者也前日燕山之役不能上遵宸畫漫無紀律􅥐至敗衂徘徊境上師老氣索遂使敵人得志妄為己功邀求無厭傷威倍費貫之誤國豈不灼然臣昨論列劉延慶不當量移事親奉德音以為皆由宣撫司號令不一以致白溝之敗為其引年謝事故議者不復及之今若起自廢閒重領兵柄則不獨誕謾貪墨有甚於前日也且貫既無功於河朔尚能有為於河東乎方其壮時罪惡固已貫盈今老且病矣尚能革心自新乎古者國有大議謀及卿士謀及庶人今陛下命将興師以靖疆埸此政事之大者亦當謀之衆人乎士民駭惑論議紛然夫豈妄意以為不可哉誠見其已試而無效也臣累被聖訓彈撃官邪毋憚大吏然則今之官邪亦有甚於貫者乎今之為吏亦有大於貫者乎故敢昧死獻先甲之言庶㡬不貽朝廷後日之悔也伏望睿斷亟罷所以命貫者别謀良帥以濟萬全之舉實天下之幸景衡又奏核劉喜張士英強勒人投軍劄子曰臣訪聞開封府祥符縣百姓朱謹被京西同廵檢司兵士劉喜等四人擒拽強令投軍朱謹不從而四人雜毆之既而廵檢張士英仍令執縛拷掠至累百且誣以嘗買賊人衣物於是刺𨽻軍籍其母阿王訴其事而祥符縣推治證佐甚明臣竊惟招軍著令一切取人情願昨者有司奉行失指市井騷然陛下甞賜戒飭矣故近日不聞招刺之擾今阿王年六十九嵗朱謹無兼侍此正母子相為命者豈樂應募充軍哉而張士英乃敢違法箠掠而强刺之其困虐無告亦甚矣近在赤邑耳目所及若不懲誡則四方之逺慢令之吏可勝治耶臣愚伏望睿㫁特賜施行左司諫江公望上奏曰臣竊以君臣一體人君元首也左右大臣股肱也諫官御史耳目也股肱不力則百事隳耳目不明則四方塞一體病則元首為之不康是職也曷可輕付哉人君賴以知時政之利病人臣之忠邪無若諫官御史之為可信患聞知之不博也故聽以風聞事雖有不實聞無不言乃言者之職故未甞加罪也至若挾情肆誣務快私忿欺罔聖聽排陷善𩔖耳目如是元首何賴焉御史中丞趙挺之䟽王古隂與胥吏為姦臣兩上封章乞明治罪状未䝉朝廷施行古與挺之等四人同治放欠所若以古一人獨與胥吏為姦務在放官欠三人何為允從三人者既已允從則必同書奏議何獨挺之一人退有後言知而不言則是容姦容而為請則是同姦又云古欲盡傾天下之財且天下之財雖𨽻戸部古為計貳操何權術乃敢盡傾天下之財以為私惠古與挺之等執奏以礙官本者未敢盡放䝉朝廷以陛下登極大赦欲與天下更始一切蠲免豈容古以私意能傾天下之財也若以私意能盡傾天下之財則挺之三人者亦預焉何獨指古而言之也臣訪聞挺之與古昔在國子監日論事𩔖皆不合屢見辭氣懐不平之心有待而發俚語有之官事私讐此小人所不為而挺之安為之曷不思御史中丞天下風憲之地紏正官邪開闢公道乃敢挟情肆誣務快私忿萬一悞陛下聽擇姦計得行浸滛不已善𩔖引去朝廷一空盖爵祿者止能砥礪鈍頑之人不能籠輕富貴安貧賤有道之士古人去就豈為爵禄而已正以觀朝廷忠邪之判如是無罪而去有罪而留刑賞混濫天下治亂自此分矣比聞在言職者不以職之得失暗遷易者數人王覿豐稷張舜民賈易朱紱張庭堅等是也以為遷則無功以為謫則無過功過不明去就不白何以養君子之直氣何以沮小人之姦心陛下遭此機會正宜清心逺覽明判忠邪攬威福之柄以馭天下無使移於人臣之手而為姦人快忿菁菁不剪蔓蔓柰何不可不察也徽宗時諫議大夫陳次升奏彈曾布䟽曰臣竊以正而不撓乃可以任天下之重公而不私然後服天下之心茍為反是曷副具瞻伏見右僕射曾布性禀姦邪心懐凶險頃居樞府阿順宰臣進用匪人大開邊隙費財用如糞壤輕人命如草芥今獨歸罪章惇未知布之所職何事玉毁櫝中則誰之過陛下矜容曲貸仍有進擢荷天地不貲之㤙臣子之心義當如何而布不圗補報惟務徇私自登宰席獨擅國權輕視同寮威福由已進拔親故羅列京局以為耳目任用門人寘之臺諫以為腹心不以人材為國用惟以爵賞為私㤙所親者進所疎者退愛之者則留京師惡之者則令補外書疾比徳詩刺不平其布之謂乎布既以此自任其子弟亦甚招權交通賔客其門如市且附枝既大必賊本心私家既盛必危公室古人以為戒陛下其可不念之兼布在紹聖初實與蔡卞交結遂申請乞用王安石日錄修神宗皇帝國史致史官觀望變亂事實多譽安石之善掩蔽神考之美近者諫官論列陛下已令㸔詳經渉春冬未見行遣訪聞布欲自掩其過又欲為史官之地恐甥壻葉濤例皆得罪是以稽緩未肯進呈專擅如此頗駭羣聽况布之登用方且彌月凶威氣燄薰炙中外若更遷延日乆盤根固基必貽國患其将柰何易著履霜堅冰詩戒桃蟲維鳥辨之於早正在今日伏望聖慈特正布之典刑以謝天下以為社稷無窮之計次升又上䟽曰臣伏見右僕射曾布姦凶擅國臣已具詳䟽退而思之專輒移易臺諫官一事頗為寒心夙夜不皇須至再凟天聽竊以御史中丞諫議大夫天子耳目之官朝廷委寄之權最為親切選任除授繋國重輕祖宗以来毎有差除執政不得干預豈敢專擅進退之者乎況君者制命者也臣者行君之命者也君唱臣和則名分乃正臣強上陵則主威不立今布之所忌則移之布之所親則用之去取惟己不出聖意進彼退此易於反掌作福作威莫大乎是尚賴宗廟之威靈陛下之神聖照見底裏比因人言即行改命而布猶偃然當國不愧乎人揚揚自若曾匪引咎豈惟不足以儀刑百辟表正四方而凶悍之心已明跋扈之萌可見今日不圗於始異日難制其終國家安危之基實在此舉伏望聖慈斷而行之特正布罪以儆有位天下之幸次升又上疏曰臣竊以避親之法著于甲令有官守者悉皆遵禀而況貴近臣乎今曾布曾肇乃親兄弟也布為右僕射肇為翰林學士不行迴避豈得為允盖宰相任天下之重握威福之柄而行命令者也翰林學士職親地近朝廷命令皆所自出茍不中度理當執議捨親而議之則傷私恩以親而不言則害公議祖宗所以立避親之法盖謂此也陛下方當持盈守成之時宜守而勿失以為太平基業社稷無疆之福也伏望聖慈特令迴避以遵祖宗之法次升又奏弹蔡京疏曰臣伏見蔡京姦邪凶險隂害善良呼吸羣小交通内外臣寮章䟽累上朝廷已罷京翰林承旨輿議以謂京之過惡甚多而交結近習之罪最大安可以赦今猶寵之以端殿之職委之以帥府之權顯是失刑須至彈奏者謹按京職居翰長身為從官委蛇經幄日侍清光可謂貴臣矣而乃卑恭屈己親昵閹宦或以貨財相結或以書劄徃来汚辱縉紳清議所鄙京揚揚然有自得之色原其設心豈徒然哉實欲令其伺陛下之起居漏宫禁之事而又使之周旋庇盖前日與章惇蔡卞相濟之惡虚稱其美以僥倖進用陛下既察見底裏議罪如彼其輕何足以厭天下之公議況宫禁之中自古以来漏泄之法極為嚴宻所以防姦人之窺伺慮患生於不測今京交通如此禁中之事必無不知茍有姦謀何所為而不可思患豫防古人所戒伏望聖慈原京之罪重行貶黜以警官邪以清宫禁以為國家社稷之福不勝幸甚次升又上疏曰臣伏見新除端明殿學士知永興軍蔡京凶邪肆害罪狀著聞中外交通蹤跡可驗言章屢上天鑒難逃宜鳴鼓而顯攻彰大佞之已辨陛下特優禁從未即譴訶畀之以端殿之華付之以帥權之重詔命初下物論尤喧謂姦惡之免誅有典刑而何賴臣聞斯議嘗具奏彈今已彌旬未蒙顯責如聞京尚懐偃蹇不體㤙私慢君命而弗處丐祠宫而自若肆行忿忮愚㺯朝廷如此可容孰不可忍伏望聖慈檢會臣寮前後章疏付外重行黜責以副朝望次升又上疏曰臣恭惟哲宗皇帝仁民愛物出於天性紹聖以来垂拱仰成責任宰執是時降授中大夫行少府監分司南京蔡卞備位政府隂肆姦謀造朝奏對専務殘忍殺害巧計既行凶焰日熾竊㺯賞罰私報㤙讐人有譽其妻父之美者極力主張寘之顯要有議其妻父之短者指為誹謗宗廟置之深罪其所進用若非妻黨之小人即是門下之姦吏更唱迭和相倚為重造作事端屢成寃獄㸔詳理訴編𩔖章疏洗垢索瑕中傷事𩔖或輕或重皆出己意或投之逺方或陷之深僻毒流天下實不忍聞其事主行雖在章惇卞實啓之時人目之為咲靣夜叉天下之所共知也陛下入承大統判别忠邪灼見姦凶率先棄逐近雖責降未厭人心咸謂卞之過惡實與惇等置散投荒尚為寛典今猶分務仍居善地何以懲姦伏望聖慈重行竄責以謝天下歴代名臣奏議卷一百八十
