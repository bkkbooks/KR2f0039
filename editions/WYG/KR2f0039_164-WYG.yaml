body:
  text: 歴代名臣奏議卷一百六十四明楊士竒等撰選舉宋太宗時梁顥初舉進士不中第留闕下獻䟽曰臣歴觀史籍唐氏之御天下也列聖間出人文闡燿尚且渴於共治旁求多彥設科之選逾四十等當時秉筆之士彬彬翔集表著所以左右前後有忠有良導化原樹治本者享三百年得人之由也五代不競兹制日淪國家興儒追風三代方今科名之設俊造畢臻秉筆者如林趨選者如雲貢於諸侯考於春官陛下躬臨慎擇必盡至公奈何所取不出於詩賦䇿論簡於心者援而陟之咈於心者推而黜之寧無濫陟枉黜之失耶其間闒茸妄進濫廁科場者間亦有之若曰陛下嘉惠孤寒沈滯之士㒺計賢否悉拔而登之一視同仁臣竊謂此非確論盖聖人在上則内君子而外小人若薰蕕同器甚非所以正人倫厚風俗也況邱園之下豈無宏才茂德之士陛下誠能設科以擢異等之士俾陳古今之治亂君臣之得失生民之休戚賢愚之用舍庶幾有益於治不特詩賦論策之小技以應有司之求而已䟽上不報真宗咸平元年右司諫孫何上奏曰臣聞王化基乎儒學而冶本根于文章故歴代取人必先文學之士賢輔名將良二千石皆由此途出所謂學非解詁句讀之學也必可以財成制度弼厥治助厥化者焉所謂文非聲病偶對之文也必可以寅亮經綸夀吾民致吾君者焉唐虞夏商簡畧難嗣炳煥可法時唯宗周始之以鄉舉里選終之以察言觀行多士之脉由兹而興垂之百王宜無愧色漢懲戰國亡秦之弊追用周制旌表孝悌簡拔茂異或待之不次或歸之常調茍不以納粟拜爵入貲為郎􅏮然古風庶幾而復由魏而下迄于陳隋規模齷齪無足比數唐五代之末斟酌㳂革參用古今紀綱四方牢籠俊乂失在禮部得於制舉禮部之失進士明經等科是也制舉所得賢良方正等科是也凡進士明經等科前所謂解詁句讀聲病偶對者也非失而何凡賢良方正等科前所謂財成制度寅亮經綸者也非得而何然是時流品洞分除授有别禮部所第不過典校辟置郡掾縣佐曠日持久未出平遷制舉所得必皆遺補舘殿臺郎御史匪朝伊夕奮為公輔故所失無大害所得必大利事在前史可覆而驗李唐將季干戈日㝷無用之詞勝化成之文廢始罷制舉專取禮部五代執守以為故事雖復朝野多故戎馬洊生至於文物寂寥治道蕪雜衣冠千計無一赫赫之稱者未必不由於此國家有天下四十年矣廓土闢宇芟逆夷亂髙視百代巍為太平寤寐雋賢勵精貢舉樂才嗜善夐無與隣然猶未復賢良方正等科清途華貫唯以進士明經逓資而升豈不念林壑非常之士或有遺棄者乎豈不念臺閣所進之人或有僭濫者乎豈不念羣官庶尹或有才畧無以自發者乎豈不念一日萬幾或有遺闕無以上逹者乎豈不念取士之制因循近例不可為子孫法者乎意者羣有司百執事未之思耶將兹事體大非賤臣之所知耶不然何當置而未置當復而未復如此之久耶是則士傳言庶人竊議不為僭矣何又上奏曰臣聞書稱教胄子有虞庠辟雍之文昜載賔王有鄉舉里選之制皆所以導王化育官材牢籠英雄陶冶風俗必見推於太學方獲譽於公朝從古洎今斯道不昜東漢則諸生三萬李唐則學生八千上所柬求必由此出亦有定兹歳貢擇彼時英或州舉謂之茂才或公車宣為有道縣次給食俾與計偕下詔雖頻中選尤寡及乎孝廉立格進士設科尚皆聘自髙年召從太守上中下郡人數有差餘皆附學讀書方得上名禮部其後士風澆薄世態銷刓賤古道於儒宫慕他岐於天府闒茸之士始入泮林英豪之流例趨京兆而又兵戈繼起經制莫存絃誦之義皆亡郡縣之學盡廢原乎所以抑有其由盖以定令之初綱條踈濶六舘升降縱限門蔭之髙卑兩京薦論曽無科禁以釐革遂令淺俗扇以成風外地絶無學生神州悉號鄉貢下至工商雜類方遊太學廣文伏見近降明制懲科場之積弊立貢士之新規申命有司十取其二違則有辟令在必行斯實聖哲教導之方朝廷畫一之法然臣以為尚有未盡者請為陛下陳之夫理歸宗極事有根源將陳救弊之謀須冇從長之論且生徒棄本為日斯多庠序不修其來自久國家必欲開孤進之路闢至公之門莫若再舉令文復嚴經術使寒畯之士由鄉里以升聞世禄之家自成均而出仕太學不得補庶人之子神州不得貢鄉士之門貴介綺羅府送者有罪草莾韋布監牧者黜官其外郡或駢繁縣之富庶者按舊典重立學官俾選耆儒碩生為之博士助教精加課試公與薦延歲終仍依新條限以人數發解必有軼羣之異行拔俗之英才匪由鄉庠亦許公議得其士受薦賢之賞非其人坐謬舉之刑㝷常之流一準上法易貴變而能久政在改而更張臣謂此令既行可使斯文復振豈直四科取士自當三代同風難者或曰今古異宜質文迭用但求至藝勿繫前言此又委巷之談陋儒之見夫以文取士既已失之取之乖方弊將安救今士子目為鄉舉其實自媒贄投於郡府之門闗節於公卿之第属詞比事合格者不過彫蟲任傳棄經入流者未逾章句若不收之學校選自州閭實慮他時益成薄俗兹事體大惟陛下特達而行之臣出身之初亦自府解豈敢忘本遽陳此謀盖目擊輕浮心知謬濫是以冐不測之罪罄狂夫之言三年知泰州田錫上奏曰臣竊惟唐設制科有道侔伊吕科有識洞韜畧堪任將帥科有賢良方正直言極諫科自太祖朝兵部尚書張照奏請興制舉于時據所奏前代制舉内選置三科一賢良方正能直言極諫科一經學優深可為師法科一詳閑吏理達於教化科勅文畧曰應天下諸色人中不限前資任職官黄衣草澤等並可應詔送吏部試䇿論三道共三千言以當日内取文理俱優人物爽秀者方得解送其登朝官亦許上表自舉雖設制科之名未盡取人之理何以明之夫漢詔取人不限對䇿字數隨其所對盡其所見故孝文時晁錯對䇿不過二千字孝武時董仲舒對䇿不過二千餘字然上覧之而異焉乃復䇿之凡詔䇿三問而所對皆不及二千餘字洎公孫𢎞答䇿纔五百餘字然漢之得賢良斯為盛矣觀董仲舒所對䇿三道亦非以當日内成今但依漢之取人則董晁公孫輩不獨漢有也天禧元年禮部員外郎直集賢院李諮上奏曰臣伏覩近降詔書應内職三司副使諸司使升朝官正言監察已上各於見任知州通判知縣縣令内奏舉一員者此盖陛下順考古道啓廸鴻猷顧萬務之至繁思衆才之共理遂申命於執事俾各舉於所知冀英俊無沈陸之嗟而朝廷有得人之盛斯實治國掄材之要道也若乃舉不失德式副於明揚如或稱匪其人曷資於委用恭以詔㫖云升朝官正言監察已上即是南宫員外郎已上皆得舉官也伏以國家荷錫祚之珍符悟開先之寳系喬丘檢玉睢壌瘞牲修曠絶之上儀沛厖鴻之渥澤汪濊有同於雲露涵濡靡間於蓼蕭絲綸併示於均禧簮紱盡令於進秩埀紳文陛雖謂於才升應宿仙曹或由於恩授亦有身居散地職異親民若令一槩舉官實恐未能作哲臣以謂舉官之道不如精擇舉主若得其人則所舉之官自然不謬矣昔鮑叔之薦管仲子桑之知孟明祁奚之稱觧狐胥臣之任郤缺率皆成功立事垂範作則傳稱唯其善故能舉其類者盖謂此也臣欲乞自職諸司使及正言監察已上須歴任已來别無􅂍汚及不是見監臨場務者方得依所降詔勅舉官然後據其所舉之人載詢淑慝重覈幽明儻肆欺誣嚴行黜削如此則圭符之吏必獲於循良銅墨之官免貽於貪冐選衆責實或近於斯臣早以庸材遭逢亨會仰荷生成之施敢忘補報之心雖芻蕘之至㣲亦睿聖之攸擇仁宗寳元二年知諫院富弼上奏曰臣伏覩載籍自古取士無如本朝路狹三代以徃不復紀列兩漢而下歴南北朝及隋唐十餘代取士之法各有科條大率如賢良孝廉孝弟力田明經秀才進士唐又添制舉五十餘科此外又許藩鎭辟召及諸色人薦舉亦許自薦拜官歴代求人唯務廣博所以天下懷才抱器之士無不牢籠收攬盡為朝廷之所用也國家取人唯有進士明經二科雖近設制舉亦又取人不多是三者大抵只考文辭念誦而已天下之士有大才大行而賦性不能為文辭就舉試者率皆遺之臣竊思近年數牓以來放及第者如河北河東陜西此三路之人所得絶少者何盖此處人物禀性質魯不能為文辭中程試故皆老於科場至死不能得一官豈三路之人獨不樂富貴哉盖求之而不得也今縱有稍在顯官者亦不過三五人而已此數路之人雖不能為文辭若其大才大行及强悍奸雄則諸路不及向時天下無事則此等人或在場屋或在農畆或為商賈或為僧道屈伏不能有所為但怨望思亂而已今昊賊宼邊西陲用武覆軍殺將中外震恐兵寡粮匱調發無所當是之時乃此等人踴躍快意皆欲助賊為患或更有盜賊屯聚則為之倡首驚劫州縣自圖富貴之時也其間忠義者尚思因時駐屯而願為朝廷之用者然朝廷至今未悟不加捜訪臣恐為他人所得則中國處處皆為敵國也臣伏見漢髙祖作歌曰安得猛士兮守四方武帝又親作詔令州郡察吏民舉可為將相及使絶域者唐髙祖亦勅闗内河東諸州召募勇敢以討吐蕃此皆前王所行而有濟時用者也臣又見朝廷向來所用之人多至敗事雖切求人未見可者陛下勿謂在官皆人傑而民間無復有人臣欲乞條列名目如臨難不顧勇敢絶倫武足安邊才任將帥武藝超衆智謀宏逺并可使絶域之類列十餘條特降手詔下陜西河北河東京東京西路轉運使副提㸃刑獄及諸州長吏仰依上項名目察訪舉奏不拘人物不限人類能作文字者即試以䇿問勿限字數不能為文者但令直說事狀或口陳方畧亦許詣闕自薦仍各量給裝錢如審知可用即文武資中隨其所欲量髙下補授如此必然得人伏緣太平已久武人在顯位者或以恩澤進或以年勞陞自餘門蔭雜調皆是常人不聞自孤寒中才武擢用臣所以謂非常人多在民間自是不求或求之不至若果行此必非虛設今歲或有貢舉兼之不妨若貢舉權罷獨行此詔亦不失人慶歴元年弼為右正言知制誥上奏曰臣伏以取士之道為國家之大務也三代兩漢專求行實是以風俗淳厚百職修舉隋唐之際純用文辭以篇賦相髙以聲譽相尚公卿將相於是乎出國朝􅆓隋唐之制以進士取人祇採辭華不求行實雖間設制舉然大率亦以章句為務是以擇之彌謹而失之愈踈且以陛下臨御以來計之積二十年所得不減三千餘人其間確然為名公巨賢者無幾近日竊見朝廷欲選一二良吏而終未能得其故何哉盖入仕之初但取空文不求實才實行之所致也今天下多事邊鄙未寧若不求人將何以濟求人之本唯科場最大科場之法行之已久盡革則駭衆不革則乏人臣欲今後科場考試以䇿論為先校度所放人數且取其半餘半詔天下諸州於境内搜訪土著之人自來為鄉黨所推或德行純備或志節方勁或學識該敏或智畧詳明或有才可以治民或知兵可以禦敵如此之類者仰逐州官吏同共察訪委實應得上項條目即具名聞奏仍以州郡大小限其人數令長吏以禮津遣年終集於都下朝廷再加較試量髙下擢用若舉薦不當明行降黜或所舉得人則優與酬賞昔漢尚書令左雄建明孝廉之法頒下郡國是時濟陰太守胡廣等十餘人皆坐謬舉黜免唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉東漢得人之盛唯此為最伏惟陛下勉而行之不數年當盡得天下實才實行之士萃於朝廷緩急應用百務俱理又何患乏人哉必若行此取士之數不加而得人之實則多矣至於明經選試尤為無法乞今後不較字數專以經中否為格仍試時務䇿三道以定髙下每度所放人數祇取其半自然得人而不至冗矣吏部尚書夏竦論制貢舉疏曰伏以隋設進士之科唐氏特隆其選歳登牓帖不逺三十賢雋之器將相之具在其選中諒不虛語然主司慎選弊於回撓豪右角逐之衢是非鋒起之場進孤寒則道直而有悔私權貴則道枉而無咎貢舉之間因循滋弊國家大設場屋旁求髦儁雖搜賢之禮博於虞夏而登科之士冗於隋唐濫者或軰進材者或旅退薦書未逹於冕旒馳聲已滿於塗路求夫厥由其弊斯在始則天下州郡薦送冗雜祝謁已先秋賦里選何有至公擇官一郡選賢數縣錚錚佼佼推為翹楚故大藩動盈百數支郡不逺百里一賢無乃多矣次則省試有司優容過當或以三應五上華顛鮐背嘗對揚金殿授薦邊城皆蒙始息取預科級明試之道無乃逺乎若萬方上計扄鍵貢闥衣冠鱗萃而萬數卷軸山積而億計良苦相雜精稗交半銓品之官不踰五員考試之限不越三旬雖周孔無以施其鑒荀孟無以展其材況主司不一好尚差殊學古者注意於䇿論脩辭者宅心於詩賦簡畧者鄙其閎衍綺麗者輕其質直鑒裁既紛品題乃惑緇素無常色金土無定價燕雀遇便風則髙翔千仞蛟龍無尺水則困於泥塗故工拙之狀多乖外望致躁競之士騰口謗議為朝廷計者莫若改立制度頒下郡國自今本道舉人各於都㑹取解專委輸運之使慎擇秋賦之官選采良士上名禮部朝廷於是選官十員立限一季先則品題所業次乃詳考呈試不得以場籍年齒御試逺人妄分條目濫居等級但詩賦䇿論俱善為上等詩賦優而䇿論劣䇿論優而詩賦劣者為中第自餘不逮皆從駮放擇材而升不限其數奏名之日則牓列程試合格者自省門而右丹筆題注明下臧否標其警䇿之辭識其疣贅之語凡於卷末統論得失合送合落各令知悉如有不當並聽言上是則主司無啓倖之門薄徒有知過之心進人以禮退人以禮必也是乎右正言孫沔乞定蔭補奏曰臣伏覩國朝自景德祥符間屢行大禮旁流慶澤凡文資自帶職員外郎武職自諸司副使已上每遇南郊及知雜御史已上逐年聖節並許奏蔭子孫弟姪雖推恩至深而永式未立今臣寮之家皇親母后外族皆得奏薦略無定數多至一二十人少不下五七人不限才愚槩居禄仕未離襁褓已列簮紳或自田畆而來或從市井而起官常之位已著而僕𨽻之態猶存是則將國家有數之品名給人臣無厭之私惠故使父兄不知教訓子弟不修藝業俾之從政只以害民若不急為更張已見積成弊倖欲乞今後帶職員外郎正郎只許蔭敘一名子弟少卿給諫二人丞郎三人尚書四人僕射已上五人致仕及物故各更與一名武職等次比類官品皇親母后之族及兩府大臣亦乞約立人數用分等級臣叨司遺事合舉大綱伏望聖慈特差近上臣寮定其久制以為萬世之法三年知諫院歐陽脩上䟽曰臣伏見朝廷選任百官文武叅用文官在選者各以舉主遷京朝官其間雖容時有濫冒然孤寒有才行之人亦徃往獲進惟有武官中近下班行並無賢愚分别一例以年歳逓遷自借職得至供奉官須是三十餘年使賢愚同滯而國家緩急要人使用無由知其能否或要人使則臨時只㸔脚色㸃差多是不副所選臣謂班行入仕之人雖多端然其中亦極有才能可任用者但國家舉選之法全未精博臣欲乞將近下班行比類選人别立舉官之法凡無人舉者官有所止更不例遷有舉主者方與遷轉或且令無舉主者依舊年限遷轉將有舉王者别作任使仍乞嚴為約束重其連坐之法使舉者不容冒濫則才與不才漸可分别而用人不濫況今四方多事天下都監廵檢監當之類盡要得人方能集事不必邊任并閤職方用舉薦其他要切使唤處多如允臣所請乞付樞宻院商量立定法制頒行脩論臺官資考劄子曰臣伏見御史臺闕官近制令兩制并中丞輪次舉人遂致所舉多非其才罕能稱職如昨來蘇紳舉馬端却煩朝廷别有行遣臣謂今兩制之中姦邪者未能盡去若不更近制則輪次所及須令舉人近聞梁適舉王礪燕度充臺官其人以適在姦邪之目各懷愧醜懼其汚染風聞皆欲不就以此言之舉官當先擇舉主臣欲乞今後只令中丞舉人或特選舉主仍見官班中雖有好人多以資考未及遂致所舉非人者皆為且就資例可入仍乞不限資考惟擇材堪者為之況臺中自有裏行之職以待資淺之人仍乞重定舉官之法有不稱職連坐舉主重為約束以防偽濫庶幾稱職可振綱紀脩又上劄子曰臣近曽上言為臺官闕人乞不依資限選舉仍乞添置裏行所貴得材可以稱職竊聞近詔宋祁舉人依前只用資例又未見議復裏行臣竊嘆方今事無大小皆知其弊不肯更改凡臺官舉人須得三丞已上成資通判此例起自近年然近年臺官無一人可稱者近日臺官至有彈教坊倭子鄭州來者朝中傳以為笑其臺憲非才近歳尤甚是此例不可用明矣然而寧用不材以曠職不肯變例以求人今限以資例則取人之路狹不限資例則取人之路廣廣之猶恐無人何況專守其狹若使資例及者入三院未及者為裏行又於差除都不妨礙況今四方多事之際揚威出使正要得人臣今欲乞特降指揮令舉官自京官已上不問差遣次第惟材是舉使資淺者為裏行資深者入三院臣見前後舉臺官者多徇親戚舉既非材人或問之則曰朝廷用資限致别無人可舉今若革此繆例責其惟材是舉則不敢不舉好人所冀漸振臺綱免取非笑四年脩論貢舉劄子曰臣竊聞近有臣寮上言請改更貢舉進士所試詩賦䇿論先後事已下兩制詳議伏以貢舉之法用之已久則弊當變更然臣謂必先知致弊之因方可言變法之利今貢舉之失者患在有司取人先詩賦而後䇿論使學者不根經術不本道理但能誦詩賦節抄六帖初學記之類者便可剽盜偶儷以應試格而童年新學全不曉事之人往往幸而中選此舉子之弊也今為考官者非不欲精較能否務得賢材而常恨不能如意大半容於繆濫者患在詩賦䇿論通同雜考人數既衆而文卷又多使考者心識勞而愈昏是非紛而益惑故於取捨往往失之者此有司之弊也故臣謂先宜知此二弊之源方可言變法之利今之可變者知先詩賦為舉子之弊則當重䇿論知通考紛多為有司之弊則當隨場去留而後可使學者不能濫選考者不至疲勞今若不改通考之法而但更其試日之先後則於革弊未盡其方凡臣所請者若漫然泛言之恐不能盡其利害請借二千人為率以明變法之便謹條於左凡貢舉舊法若二千人就試常額不過選五百人是於詩賦䇿論六千卷中選五百人而日限又迫使考試之官迨廢寢食疲心竭慮因勞致昏故雖有公心而所選多濫此舊法之弊也今臣所請者寛其日限而先試以䇿而考之擇其文辭鄙惡者文意顛倒重雜者不識題者不知故實略而不對所問者誤引事迹者雖能成文而理識乖誕者雜犯舊格不考式者凡此七等之人先去之計於二千人可去五六百以其留者次試以論又如前法而考之又可去其二三百其留而試詩賦者不過千人矣於千人而選五百則少而易考不至勞昏考而精當則盡善矣縱使考之不精亦選者不至大濫盖其節抄剽盜之人皆以先經䇿論去之矣比及詩賦皆是已經䇿論粗有學問理識不至乖誕之人縱使詩賦不工亦足以中選矣如此可使童年新學全不曉事之人無由而進此臣所謂變法必須隨場去留然後能革舊弊者也其外州解送到且當博採秪可盡令試䇿要在南省精選若省牓奏人至精則殿試易為之考矣故臣但言南省之法此其大槩也其髙下之等仍乞細加詳定大率當以策論為先右臣所陳伏乞特加詳覽茍有可採即乞降付有司與前所上言參同詳議著於令式脩又上詳定貢舉條狀曰臣等準勅差詳定貢舉條制者伏以取士之方必求其實用人之術當盡其材今教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者專於記誦則不足盡人材此獻議者所共以為言也臣等參考衆説擇其便於今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣故為學制合保薦送之法夫上之所好下之所趨也今先䇿論則文辭者留心於治亂矣簡其程式則閎博者得以馳騁矣問以大義則執經者不專於記誦矣故為先䇿論過落簡詩賦考式問諸科大義之法此數者其大要也其詩賦之未能自肆者雜用今體經術之未能亟通者尚依舊科則中常之人皆可勉及矣此所謂盡人之材者也其通禮一有司之所習及州郡封彌謄錄進士諸科帖經之𩔖皆細碎而無益者一切罷之凡其所為皆申之以賞罰而勸焉如此則養士有素取材不遺茍可施行望賜裁擇五年脩上論學士差除䟽曰臣近見翰林學士蘇紳葉清臣等相繼解職風聞侍從之臣内有奸險小人頗急經營爭先進用至有喧忿之語傳聞中外既虧廉遜之風又損朝廷之體臣伏思翰林學士職重於唐世乃是天子親信朝夕謀議内助之臣當時號為内相故其進用尤極精選只取材識不限資品往往自州縣官擢而拜者國朝近歳於此一職頗非其人既其材識愚下不足以備訪問人主因之薄其待遇亦漸踈外同於冗官遂容小人得以濫進臣思其弊盖由不合令中書依資差除且學士之職本要内助天子講論外朝闕失今若却令中書除人置於内制則是恩出中書之人雖在天子左右與無同也伏乞自今後翰林學士不必足員用人不限資品但擇有才望正人堪充者出自聖意擢用以杜小人爭進之端而天子左右更無奸邪之人庶清侍臣之列脩為龍圖直閣學士河北轉運使上奏曰臣近准御史臺牒為臣寮上言待制以上舉省府推判官轉運使副等事奉聖㫖去年勅命更不行用令臣知悉者臣竊詳臣僚上言悉渉虛妄盖因近日陛下進退大臣改更庶事小人希合欺罔天聰臣試請辨之據上言者云若令兩制以上保舉則下長犇競之路方今上自朝廷下至州縣保舉之法多矣只如臺官亦是兩制以上舉以至大理詳斷審刑詳議刑部詳覆等官三路知州知縣通判選人改京官學官入國學班行遷閣職武臣充將領選人入縣令下至天下茶塩場務㩁場及課利多處酒務凡要切差遣無大小盡用保舉之法皆不聞以奔競而廢之豈可獨於省府等官獨長奔競而可廢此其欺妄可知也上言者又云遂令端士並起馳騖且馳騖盡係小人豈名端士至如自來舉官之法多矣豈能盡絶小人干求況自頒新勅以來何人舊是端士頓然改節馳騖於何門而得舉乞賜推究姓名若果無之則見其欺妄可知也上言者又云不因請託人莫肯言此又厚誣之甚也今内外臣寮無大小曽受人舉者十八九豈可盡因請託而得自兩府大臣而下至外處通判以上人人各曽舉官豈可盡因請託而舉若云其他舉官不因請託只此勅舉官須請託即非臣所知也今兩制之中好人不少繁難要切之地皆已委信任用豈可不如外郡通判等不堪委任舉官況兩制之臣除此勅外亦更别許舉官豈可舉他官則盡公唯此敕則頓徇私請此其欺妄可知也又云每歳舉一百五十人致人多而爭差遣臣筭一人有三人舉主方敢望差遣一百五十人須一歳内有四百五十員兩制為舉主今兩制不及五十人使人人歳舉三人即纔各是一人舉主豈敢便爭差遣況有不曽舉人者或舉不及三人者乞賜檢會去年終兩制以上舉到人數便可知其恣情欺妄也近日改更政令甚多唯此一事尤易辨明故臣不避煩言而辨者伏冀陛下因此深悟小人希合而欺妄也緣自去年陛下用范仲淹富弼在兩府值累年盗賊頻起天下官吏多不得力因此屢建舉官之議然亦不是自出意見皆先檢祖宗故事請陛下擇而行之所以元降敕文首引國書為言是也當時臣僚並不論議近因仲淹等出外與朝廷經畫邊事讒嫉之人見其不在左右百端攻擊不已此事朝廷不暇審察便與施行臣昨見富弼自至河北緣山傍海經畫勤勞河北人皆云自來未有大臣如此其經畫所得事亦不少歸至國門臨入而出使河北官吏軍民見其盡忠而不知其罪狀小人惟務希合又不為朝廷惜事體凡事攻擊至今未已況朝廷用人屢有進退豈有一人纔出便不問是非盡改所行之事若大臣一度進退政令一度改更如此紛紜豈有定制伏望陛下重察愛憎之私辨其虛實之説凡於政令更審改張臣檢察元降舉官敕意亦是於國書檢用祖宗所行之法今上言者却云因諫官論列致差遣不定而有更張事渉臣身不敢自辨然臣在諫省日言事無狀致今來臣寮皆以為辭豈可尚冒寵榮不能自劾請從黜罰以弭人言臣伏見陛下聖德仁慈保全忠正之士進退之際各有恩意此所以能使忠臣義土忘身報國至死而不已也其今後臣寮希附上言攻擊前兩府所行之事乞賜辨明擇其實有不便者方與改更庶全大體則天下幸甚臣伏見去年八月二日元降勅命節文云比於國書擇諸治要見其官人之際尤重外臺之選又云然其進任必属近臣又云告示賞罰之命皆三朝之攸行此是元議舉官因依乞賜詳酌至和中脩為翰林學士又上奏曰臣近准勅為見闕臺官下學士院令臣與孫抃等同共保舉兩人聞奏者伏以學士之職置自有唐初以文辭供奉人主其後漸見親信至於朝廷機宻及大除拜每被詢訪皆與叅決當時居是職者選擢既精信任亦重下至五代莫不皆然國朝遂用唐制尤重其任自比年以來選用之際時容謬濫職以人廢官以人輕往時臺官闕人只命學士一員獨舉今乃令三人共舉若以為俱可信則一員只以公舉若以為俱不可信則雖衆舉亦豈為得人若以為有可信有不可信則自宜捨不可信者專委可信者其不可信者既不稱職罷黜之可也以臣思之朝廷所以遽改舊制而學士不足取信皆由用非其人如臣是也今在院學士三員孫抃胡宿各曽獨舉臺官朝廷嘗所取信唯臣未曽舉人伏念臣才識庸暗不能知之使臣隨衆書名則臣為恥欲三人所見皆一則理必不能欲望聖慈免臣共舉却依舊例只命學士一員專舉泥孫抃胡宿嘗曽舉官可以不疑如以臣為不可獨任乞候將來續有臺官員闕更不差臣專舉非敢避事直以任非其才不足取信致煩朝廷改更舊制以此不敢不言脩判流内銓又上奏曰臣勘㑹銓司近年選人倍多員闕常少待闕者多是孤寒貧乏之人得替住京動經年歳遇有合入闕次多被權貴之家將子弟親戚陳乞便行衝改或已注授者且合待闕或纔到任者即被對移只就權貴勾當家私不問孤寒便與不便兼臣所見臣寮陳乞多非急切事故或云近便鄉里或云看覷墳塋僥倖希求妄託名目孤寒阻滯徒益怨嗟臣欲乞今後臣寮須有急切事故如委任邊寄不許般家及致仕分司丁憂病患之類方許陳乞子弟差遣其餘雖無事故自將恩澤陳乞者許銓司勘㑹如己注人者更不改注己到任者更不衝移並令别具陳乞仍不許連併陳乞而任如允臣所請乞下銓司遵守施行脩兼三班院又上奏曰臣勘㑹本班見管使臣至八千餘員其入仕之源既已冗濫及差遣之際又多有因緣附權貴者僥倖多門致孤寒者怨嗟不已伏見近年文武臣寮出外任者多帯指使隨行不久便奏乞監押廵檢差遣仍多指定去處陳乞亦有元只是諸司職掌人奏帯隨行後來改轉班行並不曽歴短使監當差遣便入監押廵檢親民亦無合入逺近路分取便指射有職田處朝廷以重違臣寮奏請更不勘㑹差遣資序路分逺近合與不合入得便行差除相繼成例近日漸多合行釐革臣今欲乞今後臣寮奏帯隨行指使之人及三年以上並只與理為一任候歸班依例差遣外更不得陳乞差遣所貴止絶僥倖慶歴六年六月吳育上奏曰臣伏以三代以來取士之盛莫若漢唐惟漢之興髙惠所未遑暇至文帝十五年九月詔舉賢良文學之士上親䇿之則有若晁錯者出焉是時無災異而舉也至武帝建元元年冬十月詔舉賢良對䇿則有若董仲舒公孫𢎞者出焉所學亦不因災異但䇿中語或及者亦陳事之一端耳非專主災異而舉也唐開元元年六月甲子制其茂才異等咸令自舉是年設直言極諫科迨憲宗元和間制科尤盛有元稹白居易皆特出之才觀當時䇿目所訪者皇王之要道邦家之大務可以覆視固不專於災異也此漢唐故事有足據者其間不因天變又非時親䇿者則亦有之厥後時君或常自逸謂無闕政及天災已著時蠧已形然後下詔舉之欲救於臨事此則取士之弊風而後王之未逮也豈足以師為髙矩哉陛下自復制科於今累年隨貢舉而開䟽數適中忽以一人之言欲議變常之制若必竢災譴然後詔舉非唯失設科之本意且尤不可者三一則天下賢儁滯淹之士待災異而致身非所以養廉恥也二則平居不詢變形乃問非所以懼無災也三則輕改信令示天下無渴士之心非所以廣賢路也且漢唐所立孝廉及進士等科皆每歳常選故制舉不隨而開今禮闈凡數年一啓以制舉隨之則事適其宜何害於事況災異之出不常厥期或彌年所無則此舉奚設或比歳而有則於事太煩既不因乎天災又不隨乎貢舉而曰非時詔舉浩無端倪乃是遂廢此科芻蕘稍詢則言路有開餼羊一去則禮制都亡今無故而更張使遺才絶望其傷國體不亦大乎乞并下臣奏令兩制詳定若漢唐故事非專為災異而設則宜當執守毋令輕變以惑羣心臣曽應制舉毋容不知知而不言於罪為大八年御史何郯上奏曰臣伏見近日臣寮累有舉奏近上内臣乞陞進職任差遣朝廷亦多從其請酌其事體於理非便緣内臣雖在外任遇赴闕奏請公事非時出入禁中於陛下左右最為親近或有干請易為通逹不宜外臣與之交結以長弊倖況外臣薦舉内臣本亦不為朝廷擇人皆是希附恩倖為因緣進取之階此風不除必敗綱紀伏望聖慈特降指揮戒約内外文武臣寮自今更不許舉薦近上内臣若奏狀下中書樞宻院亦望不行其間或有不可任使之人則乞從朝廷選擇如此則使中外之臣各有分守可以杜苞苴請託之弊左司諫錢彦逺上奏曰臣伏以生民休戚繫於牧宰當國家委寄非有才識學術則為政䟽矣朝廷授受之際固小文常事而千里取舍倚辦斯人故漢宣帝云與我共此者唯良二千石本朝太祖皇帝嘗曰下民雖不分菽麥藩侯不為蓄養朕斷不容之誠聖人之深見逺慮知治天下之本在此而近歳審官院推擇知州並不以賢愚器識而選止用資考與至院後令自占員闕差定其間或靣牆經術庸猥冗瑣老眊罷癃殘虐貪暴混淆雜進不敢裁黜暨拜吏而出豈復究心政事惟計圭田多少市估重輕苞苴稇載以濟所欲不然酷刑罰以快怒心飾廚傳以邀妄譽雖有循理君子茍身逺譽寡無階朝廷則汨没下流不能自振監司薦舉亦為虛名而庸鄙淺人坐享厚禄通都㑹府積日可至況今諸道水沴螟害洊臻民之性命責在長吏若圖朝夕近効誠亦未可願少革弊事漸期蘇息具管見如左一欲乞天下知州除藩方舊除兩省以上及節將判知沿邊武臣外其餘州軍民並依故事量大小要劇分緊望上中下五等其緊望州送中書門下除上中下送審官院一乞先命兩省官以上於曽任知州成資人内各舉一人須是履行潔白才識政事優長者送中書門下更令咨訪銓擇才器名實委能相副令分知緊州如任内政績有聞特行超擢其所舉官亦乞奨拔如不稱職業貪猥阿枉并坐所舉官重行黜責一上州乞令審官院不以先次名目差定揀選合入知州人歴任内曽有兩省已上臣寮轉運使副提刑朝臣共七人保舉及曽知中州成資有勞績人除授仍委中書門下於都堂坐引與相見訪其學藴測其器度堪任牧長者方許降勅如知上州任内政績殊絶即令審官院磨勘引見送名中書門下亦與緊望州其勞績即不得以催驅省稅理欠負除破應在課利増溢為數須是的為生民興利除害衆所共知者應如元因舉主擢用知上州其賞罰並依與緊望例所貴舉者不妄一中州即委審官院依名次先後差除候差定中書門下依上州例訪問才術如堪任牧長方得降勅其初任者入下州次任者無遣曠方與中州逺近資序並依舊勅如歴任内有􅂍罪及七十以上不得差注只與通判則貪夫息心懦夫自厲一武臣除主兵㳂邊差使外如合入内地知州即委樞宻院具歴任勞績資序送中書門下施行一緊望知州添支俸料圭田從兵並乞比舊當路節鎭例稍増名數其合増俸料即以本州贓罰錢充每州所増不過數十千而可以養廉恥慰清節上州亦乞優立則例中下州即依舊一廣南西川有知州當知縣者自來例用新轉京官或移人充皆是新學小生未練政事雖地極僻左人民乃亦陛下赤子更賦輸入刑罰用捨與内地不殊何苦輕委其人加以去闕庭迂逺萬一不幸為庸人所擾嗷嗷無告況受命之日優賜頗多俸料加厚欲乞差合入逺地通判人充一内外文武臣寮不得以恩澤陳乞子弟親戚陞陟差遣資序委御史臺彈奏黜責一今既分列州郡地望以為資序遴揀惟人即望朝廷少假權任寛其銜䇿不為小人脇持盡所藴蓄一通判知縣縣令乞委所司依知州例銓量條奏右具於前臣所陳列事節皆臣愚者之慮大體如此且今天下郡國四百有餘以朝廷濟濟多士歳取英髦動百千計入流雜色亦以倍増求四百之才分守郡國不為艱矣使生民帖泰衣充食給則太平之效如指諸掌願皇帝陛下特留睿覽如允臣所奏乞送中書門下詳酌施行皇祐元年彦逺又上奏曰臣伏以祖宗以來慮天下人物沈滯孜孜蒐訪雖左右侍從亦許延拔俊良所以逹幽隠而勸能否故敕命在朝文臣自知雜御史以上武臣自觀察使已上皆歳得舉外任州縣官二人為京官而近年徃往緣所舉之人或有改節踰矩刑罰并坐一切皆不論薦甚非詔書本意且唯賢知賢求士報國此古人勇為之事也茍不為權勢脅奪不為賄貨遷染操至公之心逹天下之才彼當立効成功何由謫累能至皆因己不明乃謂無善可引致陛下恩澤之詔鬱而未宣為羣臣私計則精在國家逺圖甚失伏望聖慈令中書檢㑹元勅自文臣知雜御史武臣觀察使以上應合舉官臣寮職位姓名每季行牒移趣候舉奏訖即關報御史臺如至歳終不曽舉官並仰彈劾所貴英彦聚在本朝少廣得人之路嘉祐五年殿中侍御史吕誨上奏曰臣竊以科場自間歳以來人數減半取之至艱來者愈濫其間實有才行遺者甚多先朝詔諸路津遣行實之士當時被薦雖有濫名者一二終是比之常調得人稍優若此科不廢誠有所勸臣欲乞詔天下郡守常切搜訪有學識通明履行清潔以名薦於監司委提刑轉運使司同共甄察實可取者津遣赴闕其䇿試且循舊式入官不必優異止賜出身可也如舉薦妄繆亦當重責行之若久得人必多矣六年右司諫趙抃上言曰臣竊以國家遵祖宗取士之法每下科詔其用舉數推恩賜第者所以振䘏淹滯惜其老將至而無成也伏見近歳行限年之制進士累舉到御前并到南省年及五十者始預恩例竊緣進士應到累舉大半是未開間歳科場之前經隔數歳始得一舉緜歴場屋及五六舉至有三二十年者艱阻不少今來舉數雖足及有踰數者其間多是年未及格所以不該恩澤四方孤寒深可憫惻臣愚伏望聖慈體其久在科場抱負文藝始能累此舉數特降指揮天下免解舉人舉數已足年未及五十今來不預南省奏名者許減五十年之限俾就廷試而霑一命則寒儒無沈淪之嗟聖朝廣捜揚之路亦忠厚之大端也仁宗時起居舍人同知諫院司馬光論舉選狀曰右臣竊以取士之道當以德行為先其次經術其次政事其次藝能近世以來專尚文辭夫文辭者廼藝能之一端耳未足以盡天下之士也國家雖設賢良方正等科其實皆取文辭而已近以祫享赦節文應天下士人有素敦節行兼通學術久為鄉里所推者委轉運使提㸃刑獄同加搜訪每路各三兩人仍與本處長吏連署結罪保舉聞奏所舉之人朝廷命本州敦遣至則館於太學待遇甚厚考試之際不糊名謄録既而署等補官皆過所望此誠合先王取士之道臣謂國家將除積久之弊立太平之基天下士大夫皆靡然嚮風矣行之未幾忽聞朝廷一切罷之無不悵然失望臣誠戅愚不識所謂若以所舉之人多非實有材行則當治舉將之罪别加搜訪豈可以一二人謬濫廢天下之舉賢是猶因溺而廢天下之舟因噎而廢天下之食也且人之毁譽或出愛憎雖復聖賢不能自免孔子曰衆好之必察焉衆惡之必察焉恐國家亦未可以此遥斷否臧遽行黜陟也就使其人平昔所行誠有虧缺古之人或舉於漁塩或舉於盜賊豈可不容其改行自新而終身棄之乎且人之行能迭有短長若不棄瑕錄用而以一節廢之則失人多矣臣愚以為天子撫有四海海内之士不可以身察之也必資舉者然後能盡天下之才既用舉者之言授之爵祿茍不嚴為禁約以防其私則請託欺罔無不至矣竊以孝者士之尊行廉者吏之首務故漢世舉士皆用孝亷行之最久得人為多臣欲乞應天下知州府軍監任内聽舉孝廉一人大藩聽舉一人轉運使提㸃刑獄任内聽舉三人並須到任及一年以上方得奏舉夫鄉舉里選雖為古法今之為吏者不得久於其任士之素行或不能盡知若本部無人可舉即聽舉别部之人素所知者以充其數其在京兩制以上聽歳舉一人其舉狀逐時送貢院置籍收掌每遇科場詔下即委貢院選擇其日以前舉主最多者取三十人申奏降指揮下本貫敦遣赴闕若舉主數同者即以發狀先後為次謂若俱有三人舉主則取第三狀日月在前者仍於進士奏名額内減三十人候到闕日或陛下臨軒親試或委中書門下試經義䇿一道時務䇿一道但以義理優長為上不取文辭華美若所對經義乖戾聖意及時務全不通曉方行黜落其及第授官並與進士第一甲同在明經之上仍於告身前列坐舉主姓名其所舉之人若犯私罪情理重及正入已􅂍未及第者舉主減三等已及第者減一等坐之並不以赦原其公罪及私罪情理輕者舉主不坐其未舉以前若曽犯罪除公案見在證驗明白外舉主亦不坐即因勢要属請求舉及為人属請并受属請而舉之者並科違制之罪受􅂍者並以枉法論即敦遣不至者更不就除官若累經敦遣不至即乞朝廷臨時裁度特加聘召不為定制又國家置明經一科少有應者及諸科所試大義有司不以定去留盖由始者立格太髙致舉人合格者少臣欲乞今後明經所試墨義止問正文不問注䟽其所試大義不以明經諸科但能具注䟽本意講解稍詳者為通雖不失本意而講觧踈畧者為粗餘並為不通若能先具注䟽本意次引諸家雜說更以己意裁定援據該贍義理髙逺雖文辭質直皆為優等與折二通若不能記注䟽本意但以己見穿鑿不合正道雖文辭辯給亦降為不通其明經以六通諸科以四通以上為合格若合格人少即并取粗多者合格人多即減去通少者委試官臨時相度令合元額又舊制明經以周易尚書為小經今欲乞以周易尚書毛詩為一科三禮為一科春秋三傳為一科皆習孝經論語為帖經又說書一科議者多以為不當廢欲乞與明經並置但毎次科場止取十人奏名在諸科額内試中受官並與諸科同若自以本科及第或出身者更不得就試説書如此則求賢之路廣請託之源絶浮偽之風息得人之頌興矣光又論制䇿等第狀曰右臣近䝉差赴崇政殿後覆考應制舉人試卷内􅱹􅝲两號所對䇿辭理俱髙絶出倫輩然􅝲所對命秩之差虛實之相養者一兩事與所出差舛臣遂與范鎭同議以􅱹為第三等􅝲為第四等詳定官已定從覆考竊知初考官以為不當朝廷更為之差官重定復從初考以􅝲為不入等臣竊以國家置此六科本欲取材識髙逺之士固不以文辭華靡記誦雜傳為賢􅝲所試文辭臣不敢復言但見其指陳朝廷得失無所顧慮於四人之中最為切直今若以此不蒙甄收則臣恐天下之人皆以為朝廷虛設直言極諫之科而􅝲以直言被黜從此四方以言為諱其於聖主寛明之德虧損不細臣區區所憂正在於此非為臣已考為髙等茍欲遂非取勝而已也伏望陛下察臣愚心特收􅝲入等使天下之人皆曰􅝲所對事目雖有漏落陛下特以其切直收之豈不美哉張方平上選舉論曰臣聞設官所以共理擇才所以任官夫位職祿三者官之紀也德才勞三者人之分也度德居位量才賦職計勞詔祿興王所以治德不稱位才不任職勞㣲祿重衰世所以亂惟君司牧兆庶惟理亂在庶官惟賢惟能其難其慎古先明王育才考德之道至矣周之取士爰始庠塾鄉老舉秀茂而賔其禮司徒教行藝而升諸學樂正品俊造而進其名司馬辨官材而定其論而後天官執其柄而詔其爵内史書其貳而制其祿司士掌其版而知其數小宰平其計而弊其治盖其官人之法如是之詳漢之取士亦始鄉邑自幹佐曹吏見抜州郡復辟公府更舉髙第始出除吏其郡國所送孝廉或公車延召諸罷職待詔者悉居三署光祿嵗察四行能吏廉吏方補用焉至於魏氏疆宇分蹙兵戎罹亂衣冠僑寓陳羣立九品之法而選舉始濫中正定髙下以署品吏部據升降而授任後其法雖益壞議者紛起而終不能革歴六代而至隋中正始罷夫進士科者設自隋煬緜於唐而我朝循之可謂浸滛而蕃大矣為業益浮入仕益易唐考貢士之制專委有司歳第殊鮮雖升名王府而未階仕牒再試於吏部有屢斥焉其中格者補畿赤丞尉爾其不中格者或例赴選曹之集從事藩侯之府必外效有著而真命始加我太祖之初受命也王畧猶梗人物盖希進士登科歳無十數抑于時文法闊略吏員簡踈嘗聞郡自牧長而下或數員而已爰及太宗治致泰平教風寖盛丕冐出日一統無外且喜天下英俊盡入彀中始親御便殿以臨試貢士博於采㧞務盡乎人材待以不次驟升乎美仕國初進士甲科授司寇或幕職官興國之初始授等甲京朝官倅大郡或即授直館者進士中第多至七百人後遂為例至今興國已降遂為常規然凡諸為士之民惟此為干祿之路儒術治國誠王道之大經文蓻起家固儒林之盛選是以天下學士靡然嚮風非惟道化所陶抑由寵利所誘也夫子曰以言取人必極其言而考言彌華於道所以紳行乏稽古之識端甫鮮經時之論蒞官少稱職之吏臨事無仗義之節風俗有流薄之損朝廷成掄選之濫豈不由乎易取而驟用之乎此張衡所以深憤嫉於漢日楊綰所以議革廢於唐年且三王之道不能無敝故董仲舒譬之琴瑟不調甚者必解而更張之夫周之造士論材始乎庠序至漢而興廉舉孝自諸鄉里至順帝凡三百年而左雄建議諸生試章句文吏課牋奏而為限年之格又百年而魏陳羣設九品官人之制又三百年而隋文立志行脩謹清平幹濟之目次及煬帝更制進士詞賦之科此皆歴代舉選之道因時之宜更救其失猶三代忠質文之政以革敝易化者也伏惟朝廷取賢斂才之方故亦並開數路惟是進士最廣而甚夷鼎司台席之崇玉署金閨之彦更處乎館殿參布乎臺省國之綱紀民之君師百辟衆官其清塗要地者何莫由斯而起歟雖名臣軰出而淆濫為多其故由乎取之泛也以周漢育士之詳而不能盡善良又況採一日之伎昧素定之價若之何責以無濫也歟夫以唐氏之制專委有司者則利在乎才者必不遺弊在乎啓奔馳之徑而平素者絀焉以今日之法則利在乎使人循道以求己弊在乎得者不必才才者不必得而勸勵之教怠焉其利害相形之理思所以折之必有短長矣至如儒術之㣲削思所以振重之士節之陵遲思所以興起之皆國家教化之端王政之本􅂓用窺測以著於篇方平上孝廉論曰臣聞善論士者先行而後藝善官才者奬本而勵末故有子曰孝弟也者其為仁之本歟先王之臨天下也正其大倫長其義節務隆道化使民歸厚故周官司徒以鄉三物教萬民而賔興之其一曰六行實先孝友漢制始復孝悌而得拜官武帝遂以孝廉名科郡國不舉孝以不恭論不察亷者免漢之得人雖稱數路最近王道兹制為篤歴世而下風教寖㣲豈古今之俗殊盖勸導之方淺且人才行鮮克相兼以慶建之謹厚不通舒誼之經術以黯式之質直又乏遷向之文雅而今官人之格盖進士明經世家而已孝如曽閔莫希勸駕之遣廉若夷范不入辨材之論臣愚以為宜復孝亷之科自兩府大臣各歳舉一人而天下歳貢委於外臺其有持身端事親孝生養以禮没喪有聞友于兄弟睦於族親為姻黨所宗慕為里閭之歸仰者可許鄉人署行列狀於縣縣大夫詢于衆而實升之于州州長審訪如所署以聞外臺外臺㑹郡部所上各考次其行陟其尤異者一道歳取三人焉獻於天子不必備惟其人其渉知文義頗通經業者命有司量䇿以時務隨才而叙官之其行實誠著而殊昧于學蓺者可寵以上佐助教冗散之秩復其家勿徭臣聞動人以行不以言教人以厚不以薄盖經術者仁義之糟粕文章者經術之駕說夫躬行其道而不見顯異顧獨駕說之尚臣疑旌勸之術未為盡也且世家廕補歳以百數二科取士一開貢闈而第者以千計雜流冗仕不在焉誠叅以孝廉之舉則勸善勵俗之方不益備乎記曰上舉孝則民不遺其親上察廉則民不黷於行邑取一人焉一邑之人勸動矣州舉一人焉一州之人聳礪矣天下之為人父兄者莫不朂其子弟天下之為人子弟者莫不勉其行之在其身也故夫厚人倫移風俗美教化其惟進孝廉之士乎方平又上選格論曰臣聞選舉之法自周漢至隋凡六革夫惟更張以救其弊立制以宜其時得政之體也且人情安於久習時論重乎改作通者寡而泥者衆倡者孤而沮者羣是故因循之患政之大病古今所同也昔後漢左雄以廉茂之陵遲郡國因緣多濫始建議諸察舉者皆先詣公府諸生試經業文吏課牋奏副之端門練其虛實而拘以限年之法于時胡廣郭䖍駮於前張衡黄瓊非於後上獨信嚮雄議得行自雄在尚書歴十餘年天下無敢妄舉朝廷稱為得人後世識者方善其制故知昧時之經者必循名以遺實逹政之方者乃收實而後名駮於前者是疑其胷臆之說善於後者是見其耳目之效也唐代宗時楊綰以貢舉之弊建議請廢明經進士之科而復鄉舉里選之法詔下其議而在廷名臣多同於綰遂行其制後近臣淺滯者或論其不便上不能持旋以復舊今二科之弊獨在乎泛濫猥多而取之不能精或實學而見遺或下材而髙第然天下所以未厭者以國家處之以至公而有司不得措其私此所以人自循已反之於命不復咎於法也且二帝之廷疇咨仄陋三王之盛感發夢卜至于兩漢士束脩於衡蓽而辟書在門魏晉之際操行内著清議外同夫使士以謹身篤行為無益寵名爵祿為儻來成茍然之俗敗奮勵之節是於政體不已虧乎今一啓禮闈仕逾千數銓衡依等以注授郡縣無員以除遣乃復過期停罷遷延歳月則是賢愚同滯涇渭一波不審源而塞其流不計本而抑其末也臣愚以為宜略比唐制依其甲品設為選限其在殊等特承優恩請循舊即除以旌髙業餘當入選率從限格其能别決科目自當更䝉賞拔且唐以明經進士為及第宏詞拔萃為出身及第者雖有籍王府而未階仕牒乃辨材定論之名出身者始著錄官板而蒞行公政有為臣事主之義故夫以二科羅衆士以詔舉擢異材以選限難濫進數路而取為制甚備若國行盛禮覃慶四方凡名選人復當普叙伏請初入選者稍宜異其節文可委自刺守察其鄉論有一介之節一善之長令以名聞即為注授其不預舉必滿選期凡今之士流鮮自敦飭學業務乎茍就仕進規乎速至且民之情偽動息事之險阻艱難古為政者必周知之自非賈生終軍之妙齡甘竒辟疆之神敏則雖有明悟之性或多輕簡之失今夫立選以重其進設舉以勉其立則必人自磨勵家自教朂終始脩整務為鎡基自然人知謹身之勸士免去業之速鄉里有恭讓之義場屋息爭逐之末官局得才良之吏銓調省煩積之員肅其風聲端其教節不亦優乎方平又上川嶺舉人便宜論曰臣聞唐因隋制以二科取士然諸侯得自辟署仕進路廣不專科第多由藩幕入登王朝又閩嶺黔峽士人殊鮮兩河之外後為寇境帝都闗中近乎巴蜀故禮闈可以歳啓選第不逾十人開元天寳舉人或至二千人然登第者百才收一我太祖朝其風猶在抑亦王度草創人物希少及舉荆蜀下江廣收閩越定太原武事偃罷文物寖昌興國以來取士益廣風教遐被海㝢大同曵博帯於文身誦聖言於鴂舌甌閩之俗編户待乎賔興卭髳之鄉比閭思乎隨計踰劒者﨑陟萬里度嶺者往復一年故禮闈不可歳開而賢者能者同時而滯塞貢士必當廣取而猥者濫者一槩而混淆且其逺方之人顧有可售之伎雖䝉續食莫拔窮巷之身弗預充庭遂斷亨衢之望託於遐陋誠有可嗟臣伏請凡當秋賦之年禮部既以三月上請即頒下逺方其嶺南兩川即於中夏發薦其預薦名者嶺南諸郡送廣州兩川諸郡送益州委二府如禮部式考試當試時本路轉運使及州長吏監考於部郡選差文學才望有聞者為試官朝廷特遣臺閣臣寮一人傳詣監試比歳之杪取令畢事其當解人即遣至都附南省牓送預廷試其不預解人即依到省叙舉其廷試下第者既還本貫許本路計使差充攝官如此則逺人免﨑嶇之勞寒士無棄廢之歎土俗以鄉舉而民勸禮闈得人省而考精矣難者曰今禮部考試選委大臣遍擇館殿愽用才良以司考較又糊名轉錄以防私濫誠重難其事矣捨是而委二府其曰可乎臣對曰彼岷嶺雖狹然各踰百城官吏數百計皆王朝任用銓衡選補二府長吏國之重寄兩臺使者朝必慎擇誠復遣臺閣才臣就而監之嚴其法制明其條約重其委付信其命令可遥御矣如唐時分選于洛邑放第於東都其制近之矣況此試時官集諸州匪容私請權分衆手當由公共且方為薦發之地豈預名器之柄理無疑者於何不安難者曰夫變常危事改作惡名今夫二府之選多則長濫鮮則起怨且衆聚焉非國家綏逺之術也臣對曰夫變常之事危改作之名惡為其乖民情而動也變之順衆改之就利何危而惡乎臣嘗見禮闈川廣之貢士各纔百人夫豈衆之謂乎且二方之士趨赴試集往復幾年驅渉萬里與四海之衆多角無涯之得失或數罷退鮮不告勞今使不出鄉闗坐而就舉蓺學相委名稱相聞就有取捨皆其土人擇一方之官吏考百人之所試取之必精又何濫之長退之以禮復何怨之召故臣謂之便理可詳矣方平知貢舉又上劄子曰臣聞文章之變盖與政通風俗所形斯為教本國體攸繫理道存焉況今官才專取辭藝士惟性資之敏而學問以充之故道義積乎中而英華發於外以文取士所以叩諸外而質其中之藴者也言而不度則何觀焉伏以禮部條例定自先朝考較升黜悉有程式自景祐元年有以變體而擢髙第者後進傳效因是以習爾來文格日失其􅃇各出新意相勝為竒至太學之建直講石介課諸生試所業因其好尚而遂成風以恠誕詆訕為髙以流蕩猥煩為贍逾越規矩或誤後學朝廷惡其然也故下詔書丁寧誡勵而學者樂於放逸罕能自還今貢院考試諸進士太學新體間復有之其賦至八百字已上而每句有十六十八字者論有一千二百字以上䇿有置所問而妄肆􅅐臆條陳他事者以為不合格則辭理粗通如是而取之則上違詔書之意輕亂舊章重虧雅俗驅扇浮薄忽上所令豈國家取賢斂材以備治具之意耶其舉人程式有擅習新體而尤誕漫不合程式者已准格考落外竊慮逺人未盡詳之伏乞朝廷申明前詔更於貢院前牓示使天下之士知循常道臣典司憲度復預文衡敢此敷聞伏候進止歴代名臣奏議卷一百六十四
