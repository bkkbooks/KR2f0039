body:
  text: 歴代名臣奏議卷二百九十七明楊士竒等撰灾祥漢靈帝建寧二年青蛇見御坐軒前又大風雨雹霹靂拔樹詔使百僚各言災應大司農張奐上䟽曰臣聞風為號令動物通氣木生於火相須乃明蛇能屈伸配龍騰蟄順至為休徴逆來為殃咎隂氣專用則凝精為雹故大将軍竇武太傅陳蕃或志寧社稷或方直不回前以讒勝並伏誅戮海内黙黙人懐震憤昔周公葬不如禮天乃動威今武蕃忠貞未被明宥災眚之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報天子深納奐言謝弼亦上封事曰臣聞和氣應於有德妖異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽又熒惑守亢裴回不去法有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定策宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下昔周襄不能敬事其母戎狄遂至交侵孝和皇帝不絶竇后之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邊境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞烝烝之化俯思凱風慰母之念臣又聞爵賞之設必酬庸勲開國承家小人勿用功臣久外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見陷群邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已徃人百何贖宜還其家屬解除禁網夫台宰重噐國命所寄今之四公惟司空劉寵斷斷守善餘皆素湌致宼之人四公謂劉矩為太尉許訓為司徒胡廣為太傅及寵也必有折足覆餗之凶可因災異並加罷黜徴故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永臣山藪頑闇未逹國典策曰無有所隠敢不盡愚用忘忌諱伏惟陛下裁其誅罰熹平元年青蛇見御坐帝以問少府光禄勲楊賜賜上封事曰臣聞和氣致祥乖氣致災休徴則五福應咎徴則六極至夫善不妄來災不空發王者心有所惟意有所想雖未形顔色而五星以之推移隂陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其明徴也夫皇極不建則有蛇龍之孽詩云惟虺惟蛇女子之祥故春秋兩蛇鬭於鄭門昭公殆以女敗康王一朝晏起關雎見㡬而作夫女謁行則讒夫昌讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之災惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉抑皇甫之權割豔妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明光和元年虹蜺晝降嘉德殿前帝惡之引賜及議郎蔡邕等入金商門崇德署使中常侍曹節王甫問以祥異禍福所在賜仰天歎謂節等曰吾每讀張禹傳未甞不憤恚歎息既不能竭忠盡情極言其要而反留意少子乞還女壻朱雲欲得尚方斬馬劒以理之固其宜也吾以微薄之學充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡國家休明則鑒其德邪辟昏亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也於中孚經曰蜺之比無德以色親方今内多嬖倖外任小臣上下並怨諠譁盈路是以災異屢見前後丁寧今復投蜺可謂孰矣案春秋䜟曰天投蜺天下怨海内亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宫易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國政欺罔日月又鴻都門下招㑹群小造作賦說以蟲篆小技見寵於時如驩兜共工更相薦說旬月之間並各拔擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辨之心各受封爵不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡殆㢤之危莫過於今幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身惟陛下慎經典之誡圖變復之道斥逺佞巧之臣速徴鶴鳴之士内親張仲外任山甫斷絶尺一抑止槃逰留思庶政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數䝉寵異之恩豈敢愛惜垂没之年而不盡其慺慺之心哉張文上論災異䟽曰春秋義曰蝗者貪擾之氣所生天意若曰貪狼之人蠶食百姓若蝗食禾稼而擾萬民獸齧人者象暴政若獸而齧人京房易傳曰小人不義而反尊榮則虎食人霹靂殺人亦象暴政妄有喜怒政以賄成刑放於寵推𩔖叙意探指求原皆象羣下貪狼威教妄施或苦蝗蟲宜勅正衆邪清審選舉退屏貪暴魯僖公小國諸侯勅政修已斥退邪臣尚獲其報六月甚雨之應豈况萬乘之主修善求賢宜舉敦朴以輔善政陛下體堯舜之聖秉獨見之明恢太平之業敦經好學流布逺近可留須臾神慮則可致太平招休徵矣靈帝特詔問曰比災變互生未知厥咎朝廷焦心載懐恐懼每訪羣公卿士庶聞忠言而各存括囊莫肯盡心議郎蔡邕經學深奥故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皂囊封上邕對曰臣伏惟陛下聖德允明深悼災咎襃臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今災眚之發不於他所逺則門垣近在寺署其為監戒可謂至切蜺墯雞化皆婦人干政之所致也前者乳母趙嬈貴重天下生則貲藏侔於天府死則丘墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程大人者察其風聲将為國患宜髙為隄防明設禁令深惟趙霍以為至戒今聖意勤勤思明邪正而聞太尉張顥為玉所進先禄勲姓璋有名貪濁又長水校尉趙玹屯騎校尉盖升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光禄大夫橋𤣥聰逹方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝㢘士之髙選近者以辟召不慎切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下忍而絶之思惟萬機以答天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚贛感激忘身敢觸忌諱手書具對夫君臣不宻上有漏言之戒下有失身之禍願寝臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息邕又應詔上災異疏曰詔問踐祚以來災眚屢見頃嵗日蝕地動風雨不時疫癘流行勁風折樹河雒盛溢臣聞陽微則日蝕隂盛則地震思亂則風貌失則雨視闇則疾簡宗廟水不潤下川流滿溢明君臣正上下抑隂尊陽修五事於聖躬致精慮於共御其救之也是年六月丁丑有黒氣堕北宫温明殿東庭中黒如車盖起奮迅身五色有頭體長十餘丈形貌似龍上問邕邕對曰所謂天投蜺者也不見足尾不得稱龍易傳曰蜺之比無德以色親也潜潭巴曰虹出后妃隂脅王者又曰五色迭至照於宫殿有兵革之事演孔圗曰天子外苦兵威内奪臣無忠則天投蜺變不空生占不空言意者陛下樞機之内袵席之上獨有以色見進陵尊踰制以昭變象若羣臣有所毁譽聖意低廻未知誰是兵戎未息威權漸移忠言不聞則虹蜺所在生也抑内寵任中正決毁譽分直邪各得其所勒守衛整武偹威權之機不以假人則其救也時頻有雷霆疾風傷樹拔木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥羣臣各陳政要所當施行邕上封事曰臣伏讀聖㫖雖周成遇風訊諸執事宣王遭旱密勿祗畏無以或加臣聞天降災異縁象而至辟歴數發殆刑誅繁多之所生也風者天之號令所以教人也夫昭事上帝則自懐多福宗廟致敬則鬼神以著國之大事實先祀典天子聖躬所當恭事臣自在宰府及偹朱衣迎氣五郊而車駕稀出四時致敬屢委有司雖有解除猶為疎廢故皇天不恱顯此諸異鴻範傳曰政悖德隠厥風發屋折木坤為地道易稱安貞隂氣憤盛則當静反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤懣謹條宜所施行七事表左一明堂月令天子以四立及季夏之節迎五帝於郊所以導致神氣祈福豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祇奉也而有司數以蕃國踈䘮宫内産生及吏卒小汙屢生忌故竊見南郊齋戒未甞有廢至於他祀輙興異議豈南郊卑而他祀尊㢤孝元皇帝策書曰禮之至敬莫重於祭所以竭心親奉以致肅祇者也又元和故事復申先典前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齋則不入側室之門無廢祭之文也所謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳豈謂皇居之曠臣妾之衆㢤自今齋制宜如故典答風霆災妖之異一臣聞國之将興至言數聞内知已政外見人情是故先帝雖有聖明之姿而猶廣求得失又因災異援引幽隠重賢良方正敦朴有道之選危言極諫不絶於朝陛下親政以來頻年災異而未聞特舉選博之旨誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隠之言一夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曽不以忠信見賞恒被謗訕之誅遂使羣下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子曠然衆庶解恱臣愚以為宜擢文右職以勸忠謇宣聲海内博開政路一夫司𨽻校尉諸州刺史所以督察姦枉分别白黒者也伏見幽州刺史楊憙益州刺史龐芝涼州刺史劉䖍各有奉公疾姦之心憙等所糾其効尤多餘皆枉撓不能稱職或有抱罪懐瑕與下同疾綱網㢮縱莫相舉察公府臺閣亦復黙然五年制書議遣八使又令三公謡言奏事是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寝息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來讒邪之口今始聞善政旋復變易足令海内測度朝政宜追定八使糾舉非法更選忠清平章賞罰三公嵗盡差其殿冣使吏知奉公之福營私之禍則衆災之原庶可塞矣一臣聞古者取士必使諸侯嵗貢孝武之世郡舉孝㢘又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以㳺意當代博奕非以教化取士之本而諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有𩔖俳優或竊成文虚冐名氏臣毎受詔於盛化門差次録第其未及者亦復随輩皆見拜擢既加之恩難復收改但守奉禄於義已𢎞不可復使理人及任州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子故當志其大者一墨綬長吏職典理人皆當以恵利為績日月為勞襃責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若噐用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相放效臧否無章先帝舊典未甞有此可皆斷絶以覈真偽一伏見前一切以宣陵孝子者為太子舍人臣聞孝文皇帝制䘮服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虚偽小人本非骨肉既無幸私之恩又無禄仕之實惻隠思慕情何縁生而羣聚山陵假名稱孝行不隠心義無所依至有姦宄之人通容其中恒思皇后祖載之時東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虚偽雜穢難得勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦䝉寵榮争訟怨恨凶凶道路太子官属宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽先和元年有日食之異尚書盧植上封事諫曰臣聞五行傳曰晦而月見謂之朓王侯其舒此謂君政舒緩故日食晦也春秋傳曰天子避位移時言其相掩不過移時而間者日食自已過午既食之後雲霧晻曖比年地震彗孛互見臣聞漢以火德化當寛明近色信讒忌之甚者如火畏水故也案今年之變皆陽失隂侵消禦災凶宜有其道謹畧陳八事一曰用良二曰原禁三曰禦癘四曰備宼五曰修禮六曰遵堯七曰御下八曰散利用良者宜使州郡覈舉賢良随方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉禦癘者宋后家屬並以無辜委骸横尸不得收葬疫癘之來皆由於此宜勅收拾以安逰魂備宼者侯王之家賦稅減削愁窮思亂必致非常宜使給足以防未然修禮者應徴有道之人若鄭𤣥之徒陳明洪範攘服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三嵗御下者請謁希爵一宜禁塞遷舉之事責成主者散利者天子之體理無私積宜𢎞大務蠲畧細㣲時連有災異郎中梁人審忠以為朱瑀等罪惡所感乃上書曰臣聞理國得賢則安失賢則危故舜有臣五人而天下理湯舉伊尹不仁者逺陛下即位之初未能萬機皇太后念在撫肓權時攝政故中常侍蘇康管覇應時誅殄太傅陳蕃大将軍竇武考其黨與志清朝政華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞蹋省闥執奪璽綬迫脅陛下聚㑹羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因共割裂城社自相封賞父子兄弟被䝉尊榮素所親厚布在州郡或登九列或據三司不惟禄重位尊之責而茍營私門多蓄財貨繕修第舍連里竟巷盜取御水以作魚釣車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州牧郡守承順風㫖辟召選舉釋賢取愚故蟲蝗為之生夷宼為之起天意憤盈積十餘年故頻嵗日食於上地震於下所以勸戒人主欲令覺悟誅鋤無状昔髙宗以雉雊之變故獲中興之功近者神祗啓悟陛下發赫斯之怒故王甫父子應時馘􅎒路人士女莫不稱善若除父母之讎誠怪陛下復忍孽臣之𩔖不悉殄滅昔秦信趙髙以危其國吳使刑人身遘其禍虞公抱寳牽馬魯昭見逐乾侯以不用宫之竒子家駒以至滅辱今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表掃滅醜𩔖以答天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路魏明帝太和中散騎常侍髙堂隆奏時風不至而有休廢之氣必有司不勤職事以失天常也詔書謙虚引咎博諮異同光禄勲和洽上奏以為民稀耕少人食者多國以民為本民以榖為命故費一時之農則失肓命之本是以先王務蠲煩費以專耕農自春夏以來民窮於役農業有廢百姓囂然時風不至未必不由此也消復之術莫大於節儉太祖建立洪業奉師徒之費供軍賞之用吏士豐於資食倉府衍於榖帛由不飾無用之宫絶浮華之費方今之要固在息省勞煩之役損除他餘之務以為軍戎之儲三邊守禦宜在備豫料賊虚實蓄士養衆筭廟勝之策明攻取之謀詳詢衆庶以求厥中若謀不素定輕弱小敵軍人數舉舉而無庸所謂悦武無震古人之誡也青龍中崇華殿災詔問侍中髙堂隆此何咎於禮寧有祈禳之義乎隆對曰夫災變之發皆所以明教誡也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君髙其臺天火為災此人君茍飾宫室不知百姓空竭故天應之以旱火從髙殿起也上天降鑒故譴告陛下陛下宜増崇人道以答天意昔太戊有桑榖生於朝武丁有雊雉登於鼎皆聞災恐懼側身修德三年之後逺夷朝貢故號曰中宗髙宗此則前代之明鑒也今案舊占災火之發皆以臺榭宫室為誡然今宫室之所以充廣者實由宫人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則祖已之所以訓髙宗髙宗之所以享逺號也詔又問隆吾聞漢武帝時柏梁災而大起宫殿以厭之其義云何隆對曰臣聞西京柏梁既災越巫陳方建章是經以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰柏梁災其後有江充巫蠱衛太子事如志之言越巫建章無所厭也孔子曰災者修𩔖應行精祲相感以戒人君是以聖主覩災責躬退而修德以消復之今宜罷散民役宫室之制務從約節内足以待風雨外足以講禮儀清掃所災之處不敢於此有所立作萐莆嘉禾必生此地以報陛下䖍恭之德豈可疲民之力竭民之財實非所以致符瑞而懐逺人也淩霄闕成鵲巢其上帝以問隆隆對曰詩云維鵲有巢維鳩居之今興宫室起淩霄闕而鵲巢之此宫室未成身不得居之象也天意若曰宫室未成将有他姓制御之斯乃上天之戒也夫天道無親惟與善人不可不深防不可不深慮夏商之季皆繼體也不欽承上天之明命惟讒諂是從廢德適欲故其亡也忽焉太戊武丁覩災竦懼祇承天戒故其興也勃焉今若休罷百役儉以足用増崇德政動遵帝則除普天之所患興兆民之所利三王可四五帝可六豈惟殷宗轉禍為福而已㢤臣備腹心茍可以繁祉聖躬毎安社稷臣雖灰身破族猶生之年也豈憚忤逆之災而令陛下不聞至言乎於是帝改容動色時有星孛於大辰隆又上疏曰凡帝王徙都立邑皆先定天地社稷之位敬恭以奉之将營宫室則宗廟為先廐庫為次居室為後今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾居室士民失業外人咸云宫人之用與興戎軍國之費所盡畧齊民不堪命皆有怨怒書曰天聦明自我民聦明天明畏自我民明威輿人作頌則嚮以五福民怒吁嗟則威以六極言天之賞罰随民言順民心也是以臨政務在安民為先然後稽古之化格於上下自古及今未嘗不然也夫采椽卑宫唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今之宫室實違禮度乃更建立九龍華飾過前天彗章灼始起於房心犯帝座而干紫微此乃皇天子愛陛下是以發教戒之象始卒皆於尊位殷勤鄭重欲必覺寤陛下斯乃慈父懇切之訓宜崇孝子祇聳之禮以率先天下以昭示後昆不宜有忽以重天怒帝初治宫室發美女以充後庭數出入弋獵秋大雨震電多殺鳥雀将作大匠揚阜上疏曰臣聞明主在上羣下盡辭堯舜聖德求非索諫大禹勤功務卑宫室成湯遭旱歸咎責己周文刑於寡妻以御家邦漢文躬行節儉身衣弋綈此皆能昭令問貽厥孫謀者也伏惟陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治緫觀季世放盪之惡政所謂善治者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以明赫及季世所以衰弱至於泯滅近覽漢末之變足以動心誡懼矣曩使桓靈不廢髙祖之法文景之恭儉太祖雖有神武於何所施其能邪而陛下何由處斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重慎出入以往鑒來言之若輕成敗甚重頃者天雨又多卒暴雷電非常至殺鳥雀天地神明以王者為子也政有不當則見災譴克己内訟聖人所記惟陛下慮患無形之外慎明纎微之初法漢孝文出惠帝宫人令得自嫁頃所調送小女遠聞不令宜為後圖諸所繕治務從約節書曰九族既睦協和萬國事思厥宜以從中道精心計謀省息費用吳蜀既定爾乃上安下樂九親熙熙如此以往祖考心歡堯舜其猶病諸今宜開大信於天下以安衆庶以示遠人齊王即位曹爽專政㑹有日食之變詔羣臣問得失大尉蒋濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏嬰對以布惠魯君問異臧孫答以緩役應天塞變乃實人事今二賊未滅将士暴露已數十年男女怨曠百姓貧苦夫為國法度惟命世大才乃能張其綱維以垂於後豈中下之吏所宜改易哉終無益於治適足傷民望宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也吳大帝時歩騭上疏曰天子父天母地故宫室百官動法列宿若施政令欽順時節官得其人則隂陽和平七曜循度至於今日官寮多闕雖有大臣復不信任如此天地焉得無變故頻年枯旱亢陽之應也又嘉禾六年五月十四日赤烏二年正月一日及二十七日地皆震動地隂𩔖臣之象隂氣盛故動臣下專政之故也夫天地見異所以警悟人主可不深思其意哉西晉武帝泰始四年以傅𤣥為御史中丞時頗有水旱之災𤣥上疏曰臣聞聖帝明王受命天時未必無災是以堯有九年之水湯有七年之旱惟能濟之以人事耳故洪水滔天而免沉溺野無生草而不困匱伏惟陛下聖德欽明時小水旱人未大饑下祇畏之詔求極諫之言同禹湯之罪已侔周文之夕惕臣伏懽喜上便宜五事其一曰耕夫務多種而旱暵不熟徒喪功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來久衆心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不懽樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作懽然悅樂愛惜成榖無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徴殺二千石以十數臣愚以為宜申漢氏舊典以警戒天下郡縣皆以死刑督之其三曰以魏初未留意於水事先帝統百揆分河堤為四部并本凡五謁者以水功至大與農事並興非一人所周故也今謁者一人之力行天下諸水無時得徧伏見河堤謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以歩百為畝今以二百四十歩為一畝所覺過倍近魏初課田不務多其頃畝但務修其功力故白田收至十餘斛水田收數十斛自頃以來日増田頃畝之課而田兵益甚功不能修理至畝數斛已還或不足以償種非與曩時異天地横遇災害也其病正在於務多頃畝而功不修耳竊見河堤謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為氐羌諸部不與華同鮮卑冣甚本鄧艾茍欲取一時之利不慮後患使鮮卑數萬散居人間此必為害之勢也秦州刺史胡烈素有恩信於西方今烈往諸羌雖已無惡必且消弭然野心難保不必其可久安也若後有動釁烈計能制之惟恐諸羌適困於討擊便能東入安定西赴武威外名為降可動復動此二郡非烈所制則惡羌東西有窟穴浮游之地故復為患無以禁之也宜更置一郡於髙平川因安定西州都尉募樂徙民重其復除以充之以通北道漸以實邊詳議此二郡及新置郡皆使并屬秦州令烈得專御邊之宜詔曰得所陳便宜言農事得失及水官興廢又安邊禦侮政事寛猛之宜申省周備一二具之此誠為國大本當今急務也如所論皆善深知乃心廣思諸宜動静以聞也太康五年正月癸卯二龍見於武庫井中帝見龍有喜色百僚将賀劉毅獨表曰昔龍漦夏庭禍發周室龍見鄭門子産不賀武帝答曰朕德政未修未有以膺受嘉祥遂不賀也衛将軍司馬孫楚亦上言曰頃聞武庫井中有二龍羣臣或有謂之禎祥而稱賀者或有謂之非祥無所賀者可謂楚既失之而齊亦未為得也夫龍或俯潜於重泉或仰攀於雲漢游乎蒼昊而今蟠於坎井同於蛙蝦者豈獨管庫之士或有隠伏廝役之賢没於行伍故龍見先景有所感悟願陛下赦小過舉賢才垂夣於傅巖望想於渭濵修學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮拔秀異之才可以撥煩理難矯世抗言者無繫世族必先逸賤夫戰勝攻取之勢并兼混一之威五伯之事韓白之功耳至於制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言帝詔賢良方正直言於東堂䇿問曰頃日食正陽水旱為災将何所修以變大眚及法令有不宜於今為公私所患苦者皆何事凡平世在於得才得才者亦借耳目以聽察若有文武噐能有益於時務而未見申叙者各舉其人及有負俗謗議宜先洗濯者亦各言之摯虞上奏曰臣聞古之聖明原始以要終體本以正末故憂法度之不當而不憂人物之失所憂人物之失所而不憂災害之流行誠以法得於此則物理於彼人和於下則災消於上其有日月之眚水旱之災則反聽内視求其所由逺觀諸物近驗諸身耳目聽察豈或有蔽其聦明者乎動心出令豈或有傾其常正者乎大官大職豈或有授非其人者乎賞罰黜陟豈或有不得其所者乎河濵山巖豈或有懐道釣築而未感於夢兆者乎方外遐裔豈或有命世傑出而未䝉膏澤者乎推此𩔖也以求其故詢事考言以盡其實則天人之情可得而見咎徴之至可得而救也若推之於物則無忤求之於身則無尤萬物理順内外咸宜祝史正辭言不負誠而日月錯行夭癘不戒此則隂陽之事非吉凶所在也期運度數自然之分固非人事所能供御其亦振廪散滯貶食省用而已矣是故誠遇期運則雖陶唐殷湯有所不變茍非期運則宋衛之君諸侯之相猶能有感惟陛下審其所由以盡其理則天下幸甚臣生長篳門不逮異物雖有賢才所未接識不敢瞽言妄舉無以疇答聖問東晉元帝即位時隂陽錯繆刑獄繁興著作佐郎郭璞上疏曰臣聞春秋之義貴元慎始故分至啟閉以觀雲物所以顯天人之統存休咎之徴臣不揆淺見輙依嵗首粗有所占卦得解之既濟按爻論思方渉春木王龍德之時而為廢水之氣來見乘加升陽未布隆隂仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理有壅濫又去年十二月二十九日太白蝕月月者屬坎羣隂之府所以照察幽情以佐太陽者也太白金行之星而來犯之天意若曰刑理失中自壊其所以為法者也臣術學庸近不練内事卦理所及敢不盡言又去秋以來沈雨跨年雖為金家渉火之祥然亦是刑獄充溢怨歎之氣所致往建興四年十二月中行丞相令史淳于伯刑於市而血逆流長摽伯者小人雖罪在未允何足感動靈變致若斯之怪邪明皇天所以保祐金家子愛陛下屢見災異殷勤無已陛下宜側身思懼以應靈譴皇極之讁事不虚降不然恐将來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋按舊經尚書有五事供禦之術京房易傅有消復之救所以縁咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招患此自然之符應不可不察也案解卦繇云君子以赦過宥罪既濟云思患而豫防之臣愚以為宜發哀矜之詔引在予之責蕩除瑕釁賛陽布惠使幽斃之人應蒼生以悦育否滯之氣随谷風而紓散此亦寄時事以制用籍開塞而曲成者也臣竊觀陛下貞明仁恕體之自然天假其祚奄有區夏啟重光於已昧廓四祖之遐武祥靈表瑞人鬼獻謀應天順時殆不尚此然陛下即位以來中興之化未闡雖躬綜萬機勞逾日昃𤣥澤未加於羣生聲教未被乎宇宙臣主未寧於上黔細未輯於下鴻鴈之詠不興康㢤之歌不作者何也仗道之情未著而任刑之風先彰經國之畧未振而軌物之迹屢遷夫法令不一則人情惑職次數改則覬覦生官方不審則粃政作懲勸不明則善惡渾此有國者之所慎也臣竊為陛下惜之夫以區區之曹參猶能遵盖公之一言倚清靖以鎮俗寄市獄以容非德音不忘流詠於今漢之中宗聦悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄況刑又是禮之糟粕者乎夫無為而為之不宰以宰之固陛下之所體者也恥其君不為堯舜者亦豈惟古人是以敢肆狂瞽不隠其懐若臣言可採或所以為塵露之益若不足採所以廣聽納之門願陛下少留神鑒賜察臣言疏奏優詔報之其後日有黒氣璞復上疏曰臣以頑昧近者冒陳所見陛下不遺狂言事䝉御省伏讀聖詔歡懼交戰臣前云升陽未布隆隂仍積坎為法家刑獄所麗變坎加離厥象不燭疑将來必有薄蝕之變也此月四日日出山六七丈精光潜暗而色都赤中有異物大如雞子又有青黒之氣共相薄擊良久乃解按時在嵗首純陽之月日在癸亥全隂之位而有此異殆元首供禦之義不顯消復之理不著之所致也計去臣所陳未及一月而便有此變益明皇天留情陛下懇懇之至也往年嵗末太白蝕月今在嵗始日有咎讁曾未數旬大眚再見日月告釁見懼時人無曰天髙其鑒不逺故宋景言善熒惑退次光武寧亂滹沲結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徴作陛下宜恭承靈譴敬天之怒施沛然之恩諧𤣥同之化上所以允塞天意下所以弭息羣謗臣聞人之多幸國之不幸赦不宜數實如聖㫖臣愚以為子産知鑄刑書非政之善然不得不作者須以救弊故也今之宜赦理亦如之随時之宜亦聖人所善者此國家大信之要誠非微臣所得干豫今聖朝明哲思𢎞謀猷方闢四門以亮采訪輿誦於羣心況臣䝉珥筆朝末而可不竭誠盡規㢤太興二年大旱詔求讜言直諫之士著作佐郎虞預上書曰大晉受命於今五十餘載自元康以來王德始闕匈奴及於中國宗廟焚為灰燼千里無烟爨之氣華夏無冠帶之人自天地開闢書籍所載大亂之極未有若兹者也陛下以聖德先覺超然逺鑒作鎮東南聲敎遐被上天眷顧人神賛謀雖云中興其實受命少康宣王誠未足喻南風之歌可著而陵遲之俗未改者何也臣愚謂為國之要在於得才得才之術在於抽引茍其可用讎賤必舉髙宗文王思佐發夣抜巖徒以為相載釣老而師之下至列國亦有斯事故燕重郭隗而三士競至魏式干木而秦兵退舍今天下雖弊人士雖寡十室之邑必有忠信世不乏驥求則可致而束帛未賁於邱園蒲輪頓轂而不駕所以大化不洽而雍熙有闕者也成帝咸和初夏旱詔衆官各陳致雨之意虞預上議曰臣聞天道貴信地道貴誠誠信者葢二儀所以生植萬物人君所以保乂黎蒸是以殺伐擬於震電推恩象於雲雨刑罰在於必信慶賞貴於平均臣聞間者以來刑獄轉繁多力者則廣牽連逮以稽年月無援者則嚴其檟楚期於入重是以百姓嗷然感傷和氣臣愚以為輕刑耐罪宜速決遣殊死重囚重加以請寛徭息投務遵節儉砥礪朝臣使各知禁葢老牛不犧禮有常制而自頃衆官拜授祖贈轉相夸尚屠殺牛犢動有十數醉酒流湎無復限度傷財敗俗所虧不少昔殷宗修德以消桑榖之異宋景善言以退熒惑之變楚國無災荘王是懼盛德之君未甞無眚應以信順天祐乃隆臣學見淺闇言不足採哀帝隆和元年詔曰天文失度太史雖有禳祈之事猶釁眚屢彰今欲依鴻祀之制於太極殿前庭親執䖍肅尚書左丞孔嚴諫曰鴻祀雖出尚書大傳先儒所不究歴代莫之興承天接神豈可以疑殆行事乎天道無親唯徳是輔陛下祗順恭敬留心兆庶可以消災復異皆已蹈而行之德合神明丘禱久矣豈須屈萬乘之尊修雜祀之事君舉必書可不慎歟太常江逌亦上疏諫曰臣尋史漢舊事藝文志劉向五行傳洪祀出於其中然自前代以來莫有用者又其文惟說為祀而不載儀注此葢久逺不行之事非常人所叅校按漢儀天子所親之祠惟宗廟而已祭天於雲陽祭地於汾隂在於别宫遥拜不詣壇所其餘羣祀之所必在幽静是以圜丘方澤列於郊野今若於承明之庭正殿之前設羣神之坐行躬親之禮凖之舊典有乖常式臣聞妖眚之發所以鑒悟時主故寅畏上通則宋災退度德禮増修則殷道以隆此往代之成驗不易之定理頃者星辰頗有變異陛下祗戒之誠逹於天人在予之懼忘寝與食仰䖍𤣥象俯凝庶政嘉祥之應實在今日而猶乾乾夕惕思廣兹道誠實聖懐殷勤之至然洪祀有書無儀不行於世詢訪時學莫識其禮且其文曰洪祀大祀也陽曰神隂曰靈舉國相率而行祀順四時之序無令過差今按文而言皆漫而無適不可得詳若不詳而修其失不小帝不納逌又上疏曰臣謹更思尋叅之時事今强戎據於關雍勁敵縱於河朔貔貅四逸虔劉神州長旌不卷鉦鼓日戒兵疲人困嵗無休已人事弊於下則七曜錯於上災沴之作固其宜然又頃者以來無乃大異彼月之蝕義見詩人星辰莫同載於五行故洪範不以為沴陛下今以晷度之失同之六沴引其輕變方之重眚求已篤於禹湯憂勤踰乎日昃将修大祀以禮神祗傳曰外順天地時氣而祭其鬼神然則神必有號祀必有義按洪祀之文惟神靈大畧而無所祭之名稱舉國行祀而無貴賤之阻有赤黍之盛而無牲醴之奠儀法所用闕畧非一若率文而行則舉義皆閡有所施補則不統其源漢侍中盧植時之逹學受法不究則不敢厝心誠以五行深逺神道幽昧探賾之求難以常思錯綜之理不可一數臣非至精孰能與此漢主劉聦時東宫鬼哭赤虹經天南有一岐三日並照各有兩珥五色甚鮮客星歴紫宫入於天獄而滅太史令康相言於聦曰虵虹見彌天一岐南徹三日並照客星入紫宫此皆大異其徴不逺也今虹逹東西者許洛以南不可圖也一岐南徹者李氏當仍跨巴蜀司馬叡終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太隂之變其在漢域乎漢既據中原歴命所屬紫宫之異亦不在他此之深重胡可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代燕趙皆有将大之氣願陛下以東夏為慮勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之鋭卒燕代之突騎自上黨而來曹嶷率三齊之衆以繼之陛下将何以抗之紫宫之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以逺追秦皇漢武循海之事内為髙帝圖楚之計無不剋矣聦覽之不悦劉曜夜夣三人金面丹脣東向逡廵不言而退曜拜而履其跡旦召公卿已下議之朝臣咸賀以為吉祥惟太史令任義進曰三者歴運統之極也東為震位王者之始次也金為兊位物衰落也脣丹不言事之畢也逡廵揖譲退舍之道也為之拜者屈伏於人也履跡而行慎不出疆也東井秦分也五車趙分也秦兵必暴起亡主䘮師留敗趙地逺至三年近七百日其應不逺願陛下思而防之時終南山崩長安人劉終於崩所得白玉獻於劉曜方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂䘮嗚呼嗚呼赤牛奮靷其盡乎時羣臣咸賀以為勒滅之徴曜大悅齋七日而後受之太廟大赦境内以終為奉瑞大夫中書監劉均進曰臣聞國主山川故山崩川竭君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其災也如是今朝臣皆言祥瑞臣獨言其非誠上忤聖㫖下違衆議然臣不逹大理竊所未同何則玉之於山石也猶君之於臣下山崩石壊象國傾人亂皇亡皇亡敗趙昌者此言皇室将為趙所敗趙因之而昌今大趙都於秦雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦将竭滅以構成趙也咢者嵗之次名作咢也言嵗馭作咢酉之年當有敗軍殺将之事困謂困敦嵗在子之年名𤣥囂亦在子之次言嵗馭於子國當䘮亡赤牛奮靷謂赤奮若在丑之嵗名也牛謂牽牛東北維之宿丑之分也言嵗在於丑當滅亡盡無復遺也此其誠悟蒸蒸欲陛下修德化以禳之縱為嘉祥尚願陛下夕惕以答之書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾均狂言瞽説誣㒺祥瑞請依大不敬論曜曰此之災瑞誠不可知深戒朕之不德朕收其忠惠多矣何罪之有乎秦主苻堅時太史令張孟言於堅曰彗起尾箕而掃井此燕滅秦之象勸堅誅慕容暐及其子弟堅不納更以暐為尚書苻融聞之上疏諫曰臣聞鮮卑在燕歴數彌久逮於石亂遂據華夏跨有六州南面稱帝陛下爰命六師大舉征討勞卒頻年勤而後獲本非慕義懐德歸化而今父子兄弟列官滿朝執權履職勢傾勞舊陛下親而幸之臣愚以為猛獸不可豢養扵帷幄往年星異災起於燕願少留意以思天戒臣據可言之地不容嘿已詩曰兄弟急難朋友好合昔劉向以肺腑之親尚能極言況於臣乎堅報之曰汝為德未充而懐是非立善未稱而名過其實詩云德輶如毛人鮮克舉君子處髙戒懼傾敗可不務乎今四海事曠兆庶未寧黎元應撫戎狄應和方将混六合以一家同有形於赤子汝其息之勿懐耿介夫天道助順修德則禳災茍求諸已何懼外患焉苻生時長安大風發屋拔樹行人顛頓宫中奔擾或稱賊至宫門晝閉五日乃止生推告賊者殺之刳而出其心左光禄大夫強平諫曰元正盛旦日有蝕之正陽神朔昏風大起兼水旱不時獸災未息此皆由陛下不勉強於政事乖戾和氣所致也願陛下務飬元元平章百姓棄纎介之嫌含山嶽之過致敬宗廟愛禮公卿去秋霜之威垂三春之澤則姦回寝止妖祲自消乾靈祇祐皇家永保無窮之美矣宋文帝元嘉二年范泰表賀元正并陳旱災曰元正改律品物維新陛下藉日新以畜德仰乾元以履祚吉祥集室百福來庭頃旱魃為虐亢陽愆度通川燥流異井同竭老弱不堪逺汲貧寡單於負水租輸既重賦税無降百姓怨咨臣年過七十未見此旱隂陽并隔則和氣不交豈惟凶荒必生疾疫其為憂虞不可偹序雩禜之典以誠㑹事巫祝常祈罕能有感上天之譴不可不察漢東海枉殺孝婦亢旱三年及祭其墓澍雨立降嵗以有年是以衛人伐邢師興而雨伏願陛下式遵逺猷思隆髙構推忠恕之愛矜寃枉之獄㳺心下民之瘼厝思幽㝠之紀令謗木豎闕諫鼓鳴朝察芻牧之言緫統御之要如此則苞桑可繫危幾無兆斯而災害不消未之有也故夏禹引百姓之罪殷湯甘萬方之過太戊資桑榖以進德宋景藉熒惑以修善斯皆因敗以轉成往事之昭晰也循末俗者難為風就正路者易為雅臣疾患日篤夕不謀朝㑹及嵗慶得一聞逹微誠少亮無恨泉壤永違聖顔拜表悲咽三年秋旱蝗泰又上表曰陛下昧旦丕顯求民之瘼明斷庶獄無倦政事理出羣心澤謡民口百姓翕然皆自以為遇其時也災變雖小要有以致之守宰之失臣所不能究上天之譴臣所不敢誣有蝗之處縣官多課民捕之無益於枯苖有傷於殺害臣聞桑榖時亡無假斤斧楚昭仁愛不禜自瘳卓茂去無知之蟲宋均囚有異之虎蝗生有由非所宜殺石不能言星不自隕春秋之㫖所宜詳察禮婦人有三從之義而無自專之道周書父子兄弟罪不相及女人被宥由來上矣謝晦婦女猶在尚方始貴後賤物情之所甚苦匹婦一室亦能有所感激臣於謝氏不容有情䝉國重恩寝處思報伏度聖心已當有在禮春夏教詩無一而闕也臣近侍坐聞立學當在入年陛下經畧粗建意存民食入年則農功興農功興則田野闢入秋治庠序入冬集逺生二塗並行事不相害夫事多以淹稽為戒不逺為患臣任學官竟無微績徒墜天施無情自處臣之區區不望目覩盛化竊慕子囊城郢之心庶免荀偃不瞑之恨臣比陳愚見便是都無可採徒煩天聽愧怍反側書奏上乃原謝晦婦女時旱災未已加以疾疫泰又上表曰頃亢旱歴時疾疫未已方之常災實為過差古以為王澤不流之徴陛下昧旦臨朝無懈治道躬自菲薄勞心民庶以理而言不應致此意以為上天之於賢君正自殷懃無已陛下同規禹湯引百姓之過言動於心道敷自逺桑榖生朝而隕熒惑犯心而退非唯消災弭患乃所以大啟聖明靈雨立降百姓改瞻應感之來有同影響陛下近當仰推天意俯察人謀升平之化尚存舊典顧思與不思行與不行耳大宋雖揖讓受終未積有虞之道先帝登遐之日便是道消之初至乃嗣主被殺哲藩嬰禍九服徘徊有心䘮氣佐命託孤之臣俄為戎首天下蕩蕩王道已淪自非神英撥亂反正則宗社非復宋有革命之與随時其義尤大是以古今異用循方必壅大道隠於小成欲速或未必逹深根固蔕之術未洽於愚心是用猖狂妄作而不能緘黙者也臣既頑且鄙不逹治宜加之以篤疾重之以惛耄言或非言而復不能無言陛下録其一毫之誠則臣不知厝身之所歴代名臣奏議卷二百九十七
