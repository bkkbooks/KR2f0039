body:
  text: 歴代名臣奏議卷四十三明楊士竒等撰治道宋徽宗即位禮部侍郎陸佃上䟽曰人君踐阼要在正始正始之道夲於朝廷近時學士大夫相傾競進以善求事為精神以能訐人為風采以忠厚為重遲以静退為卑弱相師成風莫之或止正而救之實在今日神宗延登真儒立法制治而元祐之際悉肆紛更紹聖以来又皆稱頌夫善續前人者不必因所為否者賡之善者揚焉元祐紛更是知賡之而不知揚之之罪也紹聖稱頌是知揚之而不知賡之之過也願咨謀仁賢詢考政事惟其當之為貴大中之期亦在今日也南鄭縣丞李新上奏曰臣伏覩詔書以四月一日日蝕許中外臣寮及民庶實封言事者臣學闇識陋不能深明治亂之原謹條當今急務析為十事以應詔書所求伏惟陛下裁擇臣聞天不言示人以象天子繼天故應天以實行無用之文以弭昭然之戒循先儒之腐說以為古人之禮經其誣甚矣春秋書日蝕書之而已不言禳禬之事而左氏乃有用牲用幣撃鼓馳走之文書曰建用皇極謂大中之道不立則咎徵洊臻其傳曰時則有日月亂行薄蝕是也而古人乃有避殿撤樂減膳之事是皆不求其端而脩其末不推原其失而狃習之臣所謂行無用之文以弭昭然之戒循先儒之腐說以為古人之禮經者此也迺者四月丁酉朔日有蝕之在畢八度夫日宗衆陽而象至尊四月正陽純乾之月也陽生於復至於已則隂爻盡矣隂爻盡而猶蝕明隂侵於陽是猶小人而乗君子之噐不可以不慮也臣竊念陛下出膺寳緒乘龍御天純乾之象也朔一月之始也即位人君之始也天其或者警陛下於其始耶春秋謹乎始所以舉其終君子謀於始所以慎其事方小毖求賢以為助訪落謀廟而後行綸語之敷初自微以及著涣號之發亦惟行而弗返一設不當則舉棊不㝎再慮莫中則置噐非安汨河之源而流卒於不清亂􅁝之端而末至於不理此陛下所以思正其始也仰惟陛下仁孝洽聞睿智有臨而更求已躬之闕失大新憲度刓去弊蠧而復咨政令之臧否欲分左右之忠邪故未即乎正殿而知親賢之為急欲明風俗之美惡故未加乎元服而知民事之不可緩廣垂漏泉而懼上之徳澤不下究大闢言路而恐下之疾苦不上聞雖舜之紹堯中宗之繼太戊孝文之起代邸稽古願治之意不過如此而臣竊有議焉自臣結髪讀書彈冠從仕釋負薪之憂而索大官之廪者已十年矣目之所覩者信以傳信耳之所聞者疑以傳疑屬在遐徼叩閽未得流賈生之涕抱􅄔婦之憂葢亦有日矣丁紹聖有為姦臣擅命朝多忌諱殺身亡益而狂狷之論進不得吐退復鯁其㗋而不得下見庶人之議於道商賈之謗於市則又與國包羞而懐憤也幸今陛下掲至公之路来直臣之口臣雖踈愚請畢以獻非陛下赦而容之孰肯右臣言者臣甞謂方今之弊權綱不在人主責任不及宰相朋黨之風熾䑓諫之職輕士不素飬而用師不素慮而出土木之役興財利之臣進西南亡􅊀以虞倉卒之變内外相䝉而有衰微之漸逺土下吏不識國體繆悠之談欲以上移天意動悟萬乗午夜甲帳乙其處以終篇是非野人之芹則􅈙東之獻豕者也何謂權綱不在人主自古固有專之者矣政在陪臣則諸田分齊政在大夫則六卿分晋在房闥則拱手在外戚則跋扈在諸侯則僭擬今之弊釋此而在宰相曷以知之臣甞見其挾天子而報私仇摟大臣而生死之鼻息干雲端芻狗視同列䑓諫斂袵道路側目方哲宗皇帝春秋鼎盛可與有為可與無為者也不於此時輔弼以仁義啓沃以道徳今日兵革明日祥瑞是進之以好勝喜功之心而萌夫驕汰之志則聲色之奉䑓榭之樂無所不至矣是蠱人主而奪之權也此與夫言天子不宜登髙登髙而國耗不宜閒暇閒暇而觀書者何以異也且神考憲度利於民者不一元祐諸人變更倒易失之太銳既竄其身又錮其家廢置其子弟蹊田奪牛不已甚乎於是排元祐者進士取上第小臣得要官有可以逞憾借交者反復訹導而躁競之士爭致其身非善攘人主之權者不能為也瑶華之廢哲宗皇帝固甞訪之宰相矣禁掖祕嚴事不得聞而一言喪邦焉用彼相乃至設鈎摭以防民口引羣小以固夲根恐其權分則虚右揆而無所薦㧞欲膠其權則植奥援而不恤公議黨已蕃矣而田蚡之除吏尚未盡門如市矣而欽宗之子壻尚撓法作福作威塗人耳目尚賴祖宗法度盤固嚴宻周慮逺顧而承平之人不敢變名姓以復讎養刺客以為用匕首雖銛利不得發盜賊之嘯不敢激民以首事臣恐乆假不歸專之不已而堅冰之漸養虎之患虞在後日則是辨之不早爾昔呉楚七國反以誅晁錯為名侯景陷䑓城以誅朱异為名祿山起范陽以誅國忠為名今天下嗷嗷亦必有指宰相以為名者臣願陛下收還權綱緫攬在已賞罰之任名噐之重雷動淵嘿出神入神端持太阿無授人柄豈惟天下之幸而亦宰相之重幸也何謂責任不及宰相古者三辰悖序水旱失時災異生變疫癘迭作盜賊竊發蠻夷不賓率以咎丞相丞相亦以不稱職上印綬乞骸骨避賢者路天子勉留之曰君上書歸矦印丐身謝事是章朕之不徳其專精神邇醫藥强起視事以與朕共治丞相固請則賜之以養牛上尊酒不得已而許之則杜門省愆免冠待罪甚者曰朕未忍退君其審處焉則丞相自殺淮南衡山稱戎而公孫自以為無功居位使諸侯有畔逆之謀平原東郡民多餓死而魏相亦以奉職不脩致灾害未息永徽中自三月不雨至九月而張行成告老焉熒惑守心而罷方進日蝕而罷王商問牛喘而内史以怪丙吉閉坊門而陷濘者以辱再思方今丞相殆不知此而朝廷亦不以此屬之髙堂鮮言務養崇貴曷與尸而祝之社而稷之乎稽攷程按顧問鹽米曷與什已者㳺而若已者趨乎八座議事而丞相睥睨如以鵰挾兎則一切媕娿氣焰十倍寒熱自殊則模稜以求茍容伴食以希無責其間和事忍垢者又比比也始霍光謂蔡義可制故引以同職林甫謂陳希烈可制故援以知政若是而朝廷何頼耶頃者河北水災齧地千里蕩室廬汨牛馬老弱轉徙箱筥錡釜篳輅藍縷號泣道路州縣畏其聚而無給則更勸而遞遣占富人之田者未暇耕鑿而死者已十八九所謂賑濟之法苐行空文爾自雍以西米斗千錢而京東西物價翔湧兩蜀巴漢之民採橡實屑木皮以充其膓而屋無尺椽突無燧烟獸㳺於市鬼哭於庭死者若蟻潰麻仆殆不可以占而記也朝廷曾不以此責宰相也宰相亦不以此謝而去也臣願陛下用鎮撫燮理之任專責宰相則天工人績庶㡬乎熈而理百辟卿士庶幾其率屬此國家大體非愚臣之所能條布也何謂朋黨之風熾且堯之朝有舜禹稷契皋陶太戊之時有伊陟巫咸文王之朝有閎夭太顛㪚宜生武王之朝有太公望周公旦召公奭宣王之朝則有山甫申伯方叔召虎之徒然不聞其有比周之嘆何也臣甞謂朋黨之原始於東漢盛於唐甚於夲朝為患最大而最深者也方今其標榜曷止三君八俊其熏焰曷止八闗十六子其禍之起曷止李杜其憾之結曷止牛李退休偃月而經營擠報者累累皆是也背公死權佩劒相笑飴漆不能過其宻鬼神不能窺其奥張弧於前設穽於後其甘如薺其烈如蝮笑間藏刄盃酒殺人者累累皆是也自古士植朋黨卒死於朋黨風俗薄於朋黨機務廢於朋黨由朋黨而亂法者非一日也一黨去一黨興根株蔓延不可芟藴天子巍然其中為之證佐而已既排其人則反其言其言反其法變勢不得不然也且進君子退小人太平之夲基可則因否則革天下之良法前日之士無賢不肖一切目之曰元祐黨詆之惟恐不力前日之法無可與否一切目之曰元祐法變之惟恐不盡逐之惡地禠職削階者五十餘人夤縁薦舉從而遷罷者又不知㡬何人也始時䜛媢之人為十九章以激怒哲宗皇帝和之者縵緯如織雖嶺南若人䝉罪以去迄今天下不知其由謂其有姦謀則昔漢桓帝之立止於殺李固憲宗之立止於殛八司馬不如是之甚也然猶明告天下咸使知之夫惡不可掩罪不可赦嫉之者與天下同嫉之也棄之者與天下同棄之也柰何執政者實以攻黨而反以罔上又以罔民者耶元祐訴理欲其改過不吝俾之自新捨此無他意也日月之食而更則人皆仰之惡人齋浴猶可以祀上帝而含垢國君之盛事使過古人之用權者也前日設訴理所執政者取刻薄吏司其職抉剔案牘吹求疵病槩指而摘之所雪者輙報罷而詿誤者益張也是豈聖人記功忘過之義耶夫治道惡太甚見淵魚為不祥尅核至則不肖之心生疾不仁則為亂之心速況已湔濯之矣而復治之何也是所以闢告訐之門而長怨讎之府欲以此召迎和氣弭寕天災得乎兹朋黨之弊也且自古及今人不勝天人能勝天天定亦能勝人此忠邪之分枉直之判所以有待於陛下也陛下臨御之始召元老於外咨以大政海隅蒼生咸謂直道更興正人在上而猶懼張權輿作坦腹之謡劉崇魯有掠麻之哭則人主疑之而不察昔小白問害覇於管仲管仲曰任賢而不能信既信而又使小人參之者害覇也唐欽宗謂宋申鍚孤直擢而任之王守澄誣以不道㡬弗免死此又在陛下待之以不疑而察之欲其至也何謂䑓諫之職輕古者御史大夫次丞相司諫亞九卿皆天子得自除授非以時薦而時用之也非限乎資格也故名其居則曰御史府或曰肅政䑓名其官則曰中執法或曰大司憲嚴其任則為風霜也端其夲則曰綱紀也分左右諌諍輔人主格非心糾百官不如法如豸之觸邪如草之指佞勅容其批也詔書許其封還也裾容其牽而止也檻容其折而勿治也何者司聦欲聦司明欲明使下之情上逹上之過失以時而聞元首之耳目不壅蔽而無飾非遂事之失假之以疾惡之權而實自以為助者也若人君自聖於不諫而宰相怙升沈之手以閉拒公議則䑓諫之官結舌飲忠約時情以去就殆未免過屠門而大嚼立仗馬者不嘶尚可希片言之助以寵進君子沮排小人也哉然用之非其人則将據要津以自保而一切觀望假道烏府以為清要之津委委備位否則懐怨隱慝席風聞以報其私而為之地者又安其說而不疑是非寄雌黄於匹夫之齒牙此被繡仗斧者所以不厭其心而至公之柄反困於倒持者也亦未聞朝廷以直敢養士氣而俯仰寵㧞與之温言賁之禮物以吐其骨鯁開白獸以助勁力賜黄金以比精厲而區區言官猶車中女三日婦卷懐皂嚢而伏蒲請劒寂世不聞其人矣亂之初生䑓諫為虚名亂之又生䑓諫為偹物鄒浩以言立后事得罪中外之士恬於故常學為轅駒安於豢蓄容容日乆一聞其風則或笑或駭立朝右者或目而憎之嗚呼古人之所甚易行今人之所良難知此衰世之弊而見於華旦者甚可傷也夫世無採詩之官以什民言又禁之使不得言道無朝端之木以集士書又禁之使不得陳賢良科廢而人吞直聲匭函名存而士司冷局天子所賴獨有䑓諫官爾臣竊謂哲宗皇帝强明䟽通不待劘拂而曉者大臣專恣築塞言路外峻刑法以拒脅来者士欲全身逺害呼吸以終天年者亦不肯自投諸淵然而鼎鑊白刄若置之通逵付之士師考其䟽論萬萬不中則坐之誣罔士雖死之日猶生之年何憚而不為耶近者陛下擢豐稷孫諤龔夬陳瓘䓁列之殿陛㫁自聖知大協羣情臣願陛下每於閒暇之時旁採清議區設名流躬自㧞識不以付大臣使行私恩以叛公正而䑓諫士自以為天子門生則効誠竭節於萬鈞之下而羔裘之正直晨風之飛集足以跨越古昔茲事體大伏願陛下不以臣言為愚而力行之亦社稷之福致治之夲原也何謂士不素養而用古者開石渠東觀以論經天祿以讎書宣室承明以訪問皆天子自育人材平居無事飬之有素一旦加諸上位使之陳力就列左之而宜之右之而有之以為相而廟堂無偹位以為将而閫外無敗績使之昌言則真御史也使之居百職事則名卿才大夫也置之近侍則正人列之郡國則循吏其未用也則或目之曰此國寳此南金此清廟噐此明堂材此千里駒人主振其侣若鵷鷺髙其選若瀛洲時雨之保䕶菁莪之樂育而巖穴幽隐玉彩呈露下僚英俊錐嚢穎脫號為得人之盛而三館之士天子徃徃微幸其處處士布衣得占詩進見載之輅車導之金蓮使參鈞天帝所之㳺以激奨英氣故拱把之把梓有干雲之志而一斑之於菟有食牛之量或引之便殿訪以外事宰相所不知諫官所不言者借筋假笏得盡閒燕而内相帝聦日聞所未聞矣非飬之有素試之亦有素乎今郡國庠序之地以家老圃太學教化之原以宗㳺譚謂他時十科適増長浮競而日者宏詞又闗通權要其與選者皆近臣之子弟四方寒士才力雖髙柰有司之不公不明者何自丞轄而下府寺之要䑓閣之妙至一牧守一監司遷除補叙出自權門天子頷之而已且管晏之智不可以方伊尹吕望伊吕之功不可以擬風后力牧騏驥千里駑馬十駕洪鍾百叩沙石一撃人之才噐之相逺也非今日矣驟而談兵則括不可以将驟而用客則武陽不可以使司晨必雞吠盜必狗織必婢耕必奴其所以養之者乃求所以用之也臣甞謂粹美王道粉澤治政卿雲黼黻以昭回雲漢之章盛時豈謂乏人而代王言操帝制者詞氣卑弱反衂國體俗失之俚輕失之誣粃糠我制度㫁絶我繩墨所謂大雅温厚之訓簡嚴易直之文或近於嘲罵不㡬於攘臂而捽之此識者所怪而流之遐陬適資夷狄之笑也至於治河者以河決奪官奉使者以辱命削職㢘吏十一貪吏十九民社之託筦庫之寄汚穢簡慢吏議而去者略無虚日夫蟲莫知於龍劉累豢而蓄之獸莫戾於虎梁鴦飬而馴之士不可養歟亦不可用歟以楚猶多賢臣以衛猶多君子皇宋造邦百有餘年文物之盛比蹤三五非楚衛區區小國之比而一職之闕緩急擇人則天子假名噐於近臣近臣斂恩意於私家大起寒滯之嘆甚無謂也臣願陛下養士以嵗月日與二三元老講論人物磨礲漸勸取其姓字書之屏風覆之金噐舉而用之以為治世先務從民之望以新天下之耳目豈不偉耶若夫朔方節度得其姓不得其名歇後鄭五有其名而無其實除韋巨源而朝廷觧體用牛仙客而士大夫養恩房琯有浮虚之名崔湜無經濟之略是又人主不可以不戒也何謂師不素慮而出臣逺不敢舉三代近不取五季其間彊臣專封而割據山河荒裔亂華而俶擾河洛如魏晋之時則臣不復借喻臣甞謂漢唐之地廣於本朝而法制不及法制不及雖多奚為也漢興封建子弟大啓九國燕代有鴈門以東齊趙有常山而南梁楚奄龜蒙而有之荆呉擅江湖鹽鐡之利淮南􅄣山澤之富諸侯之國聨三垂而控胡越天子止有三河江陵巴蜀雲中隴西凡十五郡而公主湯沐列侯之邑尚在其中唐列藩鎮以為附而大歴貞元以後益更負横田𢎞正盜有魏博王氏盜有成徳朱氏有幽薊李氏有淄青劉氏有宣武呉少誠有淮蔡或一傳或再傳或三四傳或一姓或再姓或三四姓四郊多壘唐天子號令所通者不過河湟数都是四海之逺賦之所入者十之一二而已逺惟祖宗深鑑漢唐之失以立法詒孫謀而不窮内無封建藩鎮之失外無夷狄侵擾之患坐而守此萬世帝王之業也以中國之實甲馬之利可以坐扑四夷而祖宗不肯輕舉而輙發者智慮深也澶淵之役豈得已哉方今西方用兵連年不觧青唐順義㪚而復圍是得其地不足守降其王無所用之勞民廢財職此之由永念神考之志謂羌夷驕黠為日已乆侵暴我黎庶虔劉我邊陲天威震疊欲待時而動舉無遺䇿睿謀神筭臣愚不足以知之然臣竊觀夫積粟如山是取於民有制也宿民於農是教於民有法也志已先定矣計已熟復矣糧已積矣兵已練矣一舉而用之豈無成功也哉今廟堂之上倉卒造次築一城俘一級喜見顔面賚予四出使之拓土至玉門列張掖酒泉武威等郡如漢武帝時若是不知朝廷何以為賞也日者固甞妄發救援行軍死地老師費財闗輔空困是皆慮之不素也且今叩闗請命未必不包狼子之野心而築城受降未必能㫁匈奴之右臂而又契丹輔車相依縱觀勝負强弱之勢徐起而乗我此尢令人寒心今欲進兵亦未可釋甲亦未得臣願陛下遴擇良将堅壁以守少休士卒訓練加勸積粟邉鄙待時而動以追述神考之志所謂萬全之師豈不韙耶何謂土木之役興臣甞論大禹之卑宫室不如堯之茅茨不剪武帝啓千門萬户不如文帝惜中人十家之産以禮考之天子之制有三朝有九門以考工言之夏后有世室商人有重屋周人有明堂其度如此而已治人事天以養體者亦惟如此而已洛邑之營止均諸侯之會不聞其為游觀之美靈臺之作止同庻民之樂不聞其崇私已之奉蕭何治未央孫盛之論以為開後世之侈楊素營仁夀裴矩之料以為必婦人之說諸侯黝堊大夫蒼則楹不可丹春築於郎冬築於囿則譏䑓不可為故阿房就而大盜興紫閣成而國用竭驪山幸而荒靈光成而亡以至鹿㳺姑蘇香分銅雀未暇風雨之避而招兵火之􅁨再行宫室之塲而增禾黍之嘆者古數有之殆未可法也邇者月䑓之造龍艦之制爾般之斤工輸之巧晝夜雜作丹砂曾青之所圖繪香棼桂楣之所紛奕磩金玉以次第為歩剞龍蛇以飛走為戲陶甓倍於南山之土釘頭多於太倉之粟以鬼為之尚憚其勞以人為之皆知其不可而又蕃餙服御增崇佛廬大司農不能供無訾之求諫官御史未甞有一言之及閹寺希寵則樂成竒麗以蕩揺天心庶幾荒淫不度顛倒裳衣以滋禍亂之芽而探矯命令與知朝政以隳紊祖宗之法者在旦暮也幸陛下繼統以清躬先天下黜淫靡之觀究支費之蠧前此者已罷而勿居則後來者宜勿啓也臣伏願陛下日慎終戒防微杜㡬書無逸為元龜置攲噐於座右仄席儒者而與之考古今成敗之由疚懐民力而躋之仁夀之域則堯禹之至徳孝文之恭儉亦陛下所常行而不為異者也何謂財利之臣進夫先王生財有政理財有義而論道者以謂不貴難得之貨使民不為盜説禮者以謂貨惡其棄於地也不必藏於已使養天下者揣本齊末厚於人而薄於已知所謂不貴難得之貨則雖借黄金白玉以翼而不能飛借明珠以脛而不能走非特使民不為盜而已也知所謂不必藏於已之意則家給人足猶吾之胠篋而掌握盈虚來如江河積如丘山不時焚燒無所藏之非特惡其棄於地而已也季道末世經營天下猶寒家細民務争錐刀而有司之吝賢士大夫不敢輕議其得失則桑𢎞羊起而為公卿皇甫鎛進而至宰相財利之臣得志矣且許行以滕君有倉廪府庫為厲民而記史者乃謂倉有紅腐都有朽貫為富國之美談王制者又謂國無九年之儲則國非其國而鑒古者則曰鉅橋之粟洛口之榖為興王之資則財用之積㪚與夫取予之多寡果在於時君世主因事趨變不拾狼戾為有餘不强殞穫為無節求適於當而已夫以父𣙜子則必貧旦旦伐木則必不􅍇而寡婦之利童子之餉無非吾國與天下也若生之而不傷厚之而不困使之捆載嚢負各滿其意以歸見於聲色此堯舜禹湯文武成康以来所以父母子民其愷悌忠厚發於詠歌傳於金石以至於今而不衰也方今利孔百出臣不敢徧舉獨指虐民之大者一事為陛下略陳之且摘山以為茶民之朝暮不可闕也議者以謂户部之計茶利嵗入不訾邉防之用仰此以為㗋吻之哺故朝廷假其權大臣怙其勢而司其事者過桀跖之徒奉其法者行水火之政臣官漢中目撃其事利之所在民賴以衣食得之則生弗得則死未易可遏也而比年禁其私販五木巨械鉗首貫足考一逮十考十連百囹圄無虚刑餘半道而寃痛之聲至不忍聞夫臈茶之直數十倍於草茶而其罪惟均細民輕以觸法自昔然也今官賤其直以市園户不吾市者為私售酷其威以脅州縣不吾從者為沮法陛下試令諸路提刑司具㫁獄以上聞則縁茶事坐者十倍其他也交通貧富貿遷有無商賈之職也茶事半天下則商賈不通商賈不通則闗市之征廢他司嵗計日朘削矣而又月計軍儲官吏之費歲總侵欺失陷之數其所得者僅償所亡是所謂朝三暮四割膚肉以啖口者也至於縣官茍旦夕之譴則抑配良民以津積滯而他司按劾所不得與鋪兵為盜賊之淵則轉寇良民以資口腹而有司坐視所不敢訶故每使茶一過則聚罵族誹思臠其肉噬其臍呼天而詛操矛而伐之何啻十目所視十手所指柰何朝廷益重而委之臣所謂財利之臣進者斯人之徒歟陛下之於逺民忍不聽此而矜怛之耶閭閻之疾苦此其大者如陛下以為鹽池之壊未復國用尤急於茶利又神考已施之迹不忍遂輟則宜求長厚之吏以補使者少緩法禁支計博買外許之通商則徳澤下流孰有逺邇耶何謂西南無偹而虞倉卒之變夫患生於所忽而燕安為鴆毒之懐壊防之水始於蟻穴拚飛之鳥兆於桃蟲故聖人於萃聚之時除戎噐於既濟之時思患而豫防之今朝廷惟知偹西北而不知西南之可偹也且自威茂黎雅以南正古之南詔南詔西北接吐蕃北抵益州東北際黔巫自唐時已更臣而數叛閤羅鳳之攻雲南劒南節度鮮于仲通乃有白厓城之敗天寳中異牟尋與吐蕃并力入寇令其下曰為我取蜀為東府杜元頴治西川王嵯巔乃悉衆掩卭戎嶲因陷三州入成都止西郛十日掠子女工技數萬引而南今南蠻種𩔖已離而不合西戎道里自梗而不通其勢不能并一然國家晏寜日乆兩蜀之民數世不見風塵之警白首休居拊子孫以待盡賣劒買書廣弦誦以竟日外户弗闔而無有吠狗行人千里而不持寸刄恬玩已乆臣恐一旦有急則劒外州郡為蠻夷區落是入無人之境而莫之嬰拂者矣臣蜀人也知之詳矣甞見乞第宼瀘川董阿丹宼茂州上煩朝廷命帥遣将而飛輓之饋一方騷然今蜀兵驕懦不可使飽稻飫豕十九如瓠朔風正嚴緩歩一舍已呀然汗矣萬一有變是決不可使也蜀之守邉者因仍徼倖計嵗月蓄香藥犀馬以去不問其他萬一有變是決不能守也以至有城池而無樓櫓有金鼓而無閒習矛楯以脆易良􅝟矢以柔易堅甲胄爛漬而不復治障堠㢮沓而不復明萬一有變是攻與守皆無其具也比年峨眉蠻獠以闗市不平即包人民掠牛馬以歸兩林種至挈工徒鑿山開道直趨盧山以市珠馬為名其意果安在耶使之有飲馬岷江之志而吾兵不能戰邉無良守戰與守又無良具則斬狄山之頭虜騎劫之兵出入自如蹂躪數千里之地而民畜為之一空矣臣所謂西南無偹而虞倉卒之變者此也伏願陛下勿以臣言為迂詔脩守偹益屯戌選清白知兵吏以鎮之斯逺人之福也何謂内外相䝉而有衰微之漸昔賈山謂秦以不聞其過失而亡故杜牧之曰族秦者秦也非天下也春秋書梁亡左氏言自取之也榖梁謂心昏耳目塞大臣背叛梁自亡也周之天下自夷王下堂平王東遷而周室遂微其亡也非赧之罪也秦之天下自二世暗弱趙髙專恣其亡也非子嬰之罪也西漢之亡非孺子也兆於元成之不㫁東漢之亡非獻帝也由於桓􅂕之不君唐自代徳姑息至昭宗而遂亡夫人之受病有在榮衛有在四肢有在心腹然非一日而成也在榮衛四肢則心腹為之不寜在心腹則四肢為之俱廢榮衛四肢之疾緩而可治腹心之疾急而欲急攻之也望色聆音以知病所從起不待疾至而治謂之良醫朝廷天下人主之一身也仰惟太祖太宗之德澤固結愈逺神考之紀綱維持不絶固無有受病處葢甞治之於未然而已臣試言之夫黄河貫地中猶人之榮衛邉鄙猶四肢大臣猶心腹築隄以壅䟽渠以泄然後河乃安流或決於東或決於西譬榮衛之不通故結而為癕㿉緩而絶經絡治河者不深窮其利而茍簡一時之功是諱疾於榮衛也芻粟不繼如筋不勝将不知兵兵不知戰如骨不勝今邉鄙之臣或虚張戰多或擅棄所得茍目前之㨗而不設乆慮是飬疾於四肢也前日大臣專恃顧命頗有徳色貪天之功以為已有臣言之於前矣上賴左廟右社之休山川百靈之助而權臣揺手不得不幸而有他變則莽之文詐操之姦雄掘起而萌亂矣是藏疾於心腹也一身而有此三疾臣所謂内外相蒙而有衰微之漸者此也陛下即位神噐攸屬人意所歸而又文母厚徳儀坤徽音嗣世沈幾意表而同天道之運扶日虞淵以赫下土之照共㫁大務而施設注措人神僉同則不必巫咸和緩之術滌膓紉腹肘後萬金反魂起廢於急廹尋常之間彼榮衛四肢心腹之疾徐診而治之箴砭所及聚毒供事尚未為晚也在陛下施之何如耳且今天下如磐石太山陛下求直言而臣以自古危亡之君以為陛下之鑑不已過乎李雲露布固訐矣而威帝止以不諦何語為口實韓愈表佛骨固切矣而憲宗止以天子夭促為乖剌是二君者有拒諫之實而無好諫之名安足為陛下道哉臣釋耒西山立朝無葭莩之親負笈賢闗終嵗惟雅言之學貧無以自資而載色載笑獨於借書乞火居下位不能媚上官以釣名沽譽所養如是殆一木彊人耳如上所陳皆朝廷已行之迹衆人之所不足言者無禆聖教之萬一而祗自以為勞伏惟陛下天縱之聖自誠而明既恭黙以思昭曠之道又緝熈而成光明之學昔人求禮於野人求道於瓦礫問迷於童子每況愈下謂愚者千慮或有一得而臣之井窺管見區區欲罄而終未能已也臣甞惟天下之事莫尚於宻聖人之功無易於勤昔陽處父言狐射姑不可将晋君以其言告射姑射姑刺處父於朝而奔狄髙宗欲廢武后上官儀諫之及髙宗見后則曰是皆上官儀教我而武后卒殺儀且為容之仰舉趾之髙儀可觀也而易測其中前在馳逐後在音聲志在内也而或見於外人君可以富貴生死天下之士未發其機而人已逆而合之矣況以不宻者乎故臣願陛下尚宻則無過事明皇之初銳意勵精誓復貞觀之治而開元之間號稱太平晚節怠荒聲色游幸失道敗度於天寳之末可為歎惜夫禹之勤於邦文王之日昃不食非謂其勤於始而已始始而終終也十日暴而一日寒百年為而一日廢適逺中畫與不適同深耕不穫與不耕同故臣願陛下貴勤則無棄功若夫血氣之戒精神之用隙不在大失不在小永惟陛下深思而長念之則天下幸甚臣誠狂妄干犯威顔臣無任瞻天望聖激切屛營之至建中靖國元年李朴上奏曰臣聞天下有事不足憂無事深可畏人之情勞則思逸則肆故方其有事之時則憂勤恐懼之心能以危亂而至於治安及其無事之後則驕盈怠惰之氣亦能以治安而至於危亂舜之時七政齊於上百獸舞於下可謂安且治矣而君臣之間惴惴然常若􅁨危禍亂之将必至何也知治安之不足恃而驕盈怠惰且隨其後也臣竊觀國家聖作明述自古太平之盛未有乆於今日者此正天下所謂無事之時而臣所謂深可畏者也伏願陛下思創業之甚難懼守成之不易親睦九族風示萬邦好惡不留於心喜怒循理而動體仁爱之徳而濟之以剛破險詖之論而平之以恕知君子所以致治而慮其難進則任之勿疑鑒小人所以致亂而防其易入則去之必速除心術之害然後可以育人材勵㢘媿之節然後可以肅仕路辨甞試之說然後可以来忠言師老而邉隙可慮莫若以自治為守禦之䇿民困而國用不足莫若以節儉為富庶之夲觀俗化而通其變議政事而處其中執持權綱爱惜百姓日謹一日保其初心若是者皆聖政之所當急者也雖然所以致此者有夲矣臣聞昔周成王即位召公為之保周公為之師同心輔導甞致謹於起居言動之間唐太宗開文學選道徳名儒十八人為學士雖飲食游宴十八人者未甞不在其中退朝與討論古今所以成敗輙至日昃夜分故成王能光昭文武之業而太宗獨髙三代之後無他知所以自治而天下不足治矣臣誠知陛下聦明仁聖性所自得然而聖人者徳配天地而志常不足不識陛下夙興視朝擁經左右詔徳意志慮者誰乎陳前世廢興治亂請得據舊鑒新者誰乎退居深宫之中燕見間召所以偹顧問者誰乎今縱未能逺法成周立師保之官宜且近倣唐制大開學館博選通儒耆德使侍經幄萬機之暇孜孜與之講論正心誠意事天治人之道雖陛下聖性所自得者臣願益加聖學焉此臣之所謂夲者也臣又聞人主不可求勝於天下不可廢天下之公議不可使心術失於毫釐之間此三者人主之要道也臣請為陛下别白而言之所謂人主不可求勝於天下者何也臣聞自古有道之君不敢失一夫之心以天下者一夫所積耳是故為其欲夀則與之輕刑為其欲富則與之薄歛為其欲逸則與之緩力凡上之禁令取舍惟恐一不當於天下之欲惡是以天下亦相與安之而已也後世有若韓非商鞅者始道其君以勝天下之事其言曰權勢法制者人主之操術彼天下者必於我而聼命者也而屑屑若是是以天下為匹夫役也故或勝之以擊㫁或勝之以裒剝或勝之以戰鬭安忍自恣仇讎其民民不勝其害則相與合天下而勝之矣臣故曰人主不可求勝於天下一也所謂人主不可廢天下之公議者何也臣聞人主勢能生殺禍福人而不能變天下之公議堯舜三代之時則公議用於朝廷之上以賞功罰罪進賢退不肖而行於天下至其亂則廢於朝廷之上而竊竊然發於閭閻之間又其甚而設誹謗之法以杜天下之口則又不發於閭閻而欝於人心最甚者莫若秦也立為腹誹心謗之誅則欲併取其在人心者而去之也然且獨能禁於一時而卒大肆於後世何則所謂公議者其夲與天地並立而是非出於人心之同然不可得而變者也知其不可得而變而使或發於閭閻或欝於人心或肆於後世孰若舉而用於朝廷之上行之天下乎臣故曰人主不可廢天下之公議二也所謂人主不可使心術失於毫釐之間者何也臣聞人主者天下之夲也心術者人主之夲也養之以道徳仁義則終身而未足以為功動之以回邪淫佚則一朝不可勝其患是何歟道徳仁義難全而回邪淫佚易溺也古語曰人主唯有一心而攻之者甚衆彼小人之欲禍天下必先敗壊其君之心術而後可以得志是故吾欲尚恭儉彼則攻之以驕奢吾欲夲仁恕彼則攻之以煩苛吾欲務厚下彼則攻之以聚歛吾欲用正直彼則攻之以佞柔彼其所以攻我者紛起並至人主又惡能以一心而保其所難全勝其所易溺者哉必主之以平照之以清持之以誠恐恐然若宼盜之将至而蚤杜其窺覦之漸也不然使之乗吾徘徊猶豫之時一投隙而得以自售則浸淫敗壊而終以不悟矣臣故曰人主不可使心術失於毫釐之間三也知此三者而大夲立矣臣愚不勝惓惓之忠惟陛下留神省察以幸天下左諫議大夫陳次升進戒豫六事奏曰臣噐非適用材不逮人夙䝉神考之誤知擢寘臺屬逮事哲宗皇帝又叨言責迄無善状終以罪廢陛下即位之初搜羅人材振㧞淹滯起臣於烟瘴之地擢貳烏府今復除臣諫議臣自以天資樸拙學問迂踈辭章屢上天聽莫回拜命以来不遑夙夜思所圖報輙取古先哲王洎我祖宗之大猷作為六事一曰體道二曰稽古三曰修身四曰仁民五曰崇儉六曰用人以豫為戒欲陛下念兹在兹使聖躬無過舉庶事無不治亦蒭蕘爱君之義也謹昧死上進其一曰體道臣聞天道運而無所積故萬物生帝道運而無所積故天下歸聖道運而無所積故海内服不可為也不可執也無偏無黨而蕩蕩乎民莫能名是以先王揆才頒政量能授職設為宰輔以經邦國以理隂陽以制卿士以撫四夷而又使夫通世務明治體多識前言徃行者繩愆糾謬而議論之故能垂拱無為而天下治彼昏不知或獨任宰輔或偏信諍臣或甞推誠為其所誤而兩棄之甚矣其惑也故書史特詳書為萬世誡者如秦之李斯趙髙漢之王莽董卓唐之李林甫盧把皆其君之所獨任者至於姦佞滿前而不見大謀顛錯而不知名辱身危覆邦絶祀譬猶掩塞耳目而運股肱其可濟乎樊豐周廣之於孝安朱异之於梁武裴延齡韋梁牟之於徳宗皆其君之所偏信者至於奪公輔之任挫宰相之威䜛慝忠良稔禍社稷譬猶芟割其股肱而任耳目其可濟乎漢武以英雄之資即位五六年間號勝文景及其獨任田蚡也入奏事則語移日所言皆聼飬成其罪遂致有吾亦欲除吏何不遂取武庫之怒爾後惟偏信嚴助朱買臣吾丘夀王主父偃之徒以辯論詘辱大臣至於交私諸侯潛藴譛訴劫殺親王訖未甞有得其死者漢武之志豈以其甞獨任宰輔者如彼偏信諍臣則又如此故兩踈之耶由是詭誕之士竒邪之術乗隙而進無正救者故窮奢極欲繁刑重歛内侈宫室外事四夷信惑邪怪廵遊亡度哀痛之詔由是作矣臣聞仁宗之御天下也民到於今稱頌盛美而不置者豈有他哉不為不執無偏無黨如天運之無積故民心歸而海内服也觀其用言者以罪范仲淹之黨及翻然而悟皆大用之唐介以彈文彦博貶未㡬而復其官以衆言黜歐陽脩因范鎮一言而留之機圓術妙可不務乎臣竊觀陛下即位以来獨任宰輔計行言聽莫之敢抗汲引黨與沸騰於朝臣恐其竊弄威柄而陛下厭之以致改轍而偏信諍臣以堕於漢武之失茍不出此若或委心腹寄耳目於近習則禍愈亟矣可不謹哉其二曰稽古臣聞堯舜之道載於二典者其目雖多而總其大美皆曰若稽古而已而傅說之戒髙宗亦曰不師古訓于何其訓詩人之頌成王亦曰日就月将學有緝熈于光明夫帝王以一身而應萬有茍不該博古今以深究夫明君賢臣修身治國之要雋功偉烈謀猷方略之施與夫昏虐賊亂禍根罪首之由取是捨非執古道以御今其何以堪之哉是故堯舜之所以若而順稽而考髙宗之所以師成王之所以學者如是而已矣若夫略典墳之大道好雕蟲之小技競一韻之竒争一字之巧者此腐儒之所為而藴徳行志功名者鄙之況於帝王日有萬機而盡心於卉木之間極意於烟霞之表將焉用之隋煬帝尤善於文不欲人出已右薛道衡被誣而死則曰復能作空梁落燕泥否王胄之誅則曰復能作庭草無人随意綠否又曰設令朕與士夫髙選亦當為天子梁武帝父子尤刻意於文學乃至隂陽卜筮騎射聲律草𨽻圍棊無不精妙又何補於治適足致亂耳何則既騁此以為智能矣則必恃此以驕慢天下故賢者由是觧體而小人競學是以資嫵媚則向之所謂智能者翻為亡身之具遺後世之所閔笑者臣聞陛下潛徳藩邸時則已留意翰墨矣即位以来好為詩曲以賜親幸鐫石鏤板傳播逺近臣愚過計恐天下之人不能盡知陛下由天縱之能不思而得肆茟而成妄以前代帝王之刓精竭慮於雕蟲篆刻之細為比且曰天下之政未理而游心於是豈不為盛徳玷乎又恐用小人之能是者則士風靡矣臣願陛下痛屏浮華無用之文不使膠於心術惟一以切磨治道聽政之餘躬閱書史取其闗國家之興衰生民之休戚成者襲之敗者反之以資益聖治之道以懋稽古之徳豈不偉歟其三曰修身臣聞之詩曰鶴鳴于九臯聲聞于天鼓鐘于宫聲聞于外易曰行發乎邇見乎逺葢修身之應也如此歴觀古之創業之君與夫中興之主承乎離亂之緒其俗其民乆已安於無治急之則怨緩之則偷賞之不勸刑之不變於斯時也而能肇造天命平滌九區恢廓宇宙致治之効可計日而待者豈有他哉葢明乎人可以誠感難以户說乃正其心以及身正其身以及國故道德由是而明風俗由是而羙也何則人君之所恃以有天下者曰天命之民歸之賢者附之耳而天親有徳民懐寛仁邦無道則賢者卷而懐之是三者皆非修身則莫能致不然則昭昭之鑒可以矯餙偽行而欺之乎億兆之心可以輿金輦寳而召之乎有道之士可以髙爵厚禄而誘之乎非所聞也又況君者民之師表動静舉措發於中必形於外民影從矣将欲興崇禮義厚人倫而美教化者其可以言率之哉此孟子所謂君仁莫不仁君義莫不義也是故堯之民比屋可封桀之民比屋可誅豈民異習哉格之者異也魏武好法律而天下貴刑名魏文慕通達而天下賤守節豈士異尚哉格之者異也此皆前事之驗也其可忽乎仁宗甞書無逸於邇英閣之屏嵗乆而弊命王洙復書之且曰朕不欲背聖言乃置之左取孝經天子孝治聖治廣要道四章命蔡襄書以對於右欲使聖言時存乎顧眄雖以聲為律而身為度者何以尚兹其興事造業制度遺文獨超於百王之表宜矣臣願陛下遹追仁祖謹厥身脩日新其德使百官有司相儆曰聖德如斯其可自怠巖谷之士相勉曰聖徳如斯其可自棄黎民戒其子弟曰聖徳如斯其忍犯上盜賊率其黨與曰聖徳如斯其敢猖獗如是則成康之治可立而待也其四曰仁民臣聞天之視聽在乎民國之存亡繫於天王者之所以得天下者民歸之而天命之也所以失天下者民叛之而天禍之也是故民歸一徳天乃命湯庻民子来天乃命周百姓弗堪天命殛桀民罔不欲喪天訖商命黔首愁歎天亡秦祀百姓怨望天剪隋虐古人以水能覆舟朽索御馬為戒者豈徒念民之孔艱則强者為盜賊弱者膏草野耶誠恐人君因之不免其身而毁辱及其宗廟困窮及其妻子也夫為人父母而生靈塗炭為人子孫而宗廟毁辱貴為天子不能保其身以及其妻子豈宜忍哉是以盛王兢兢業業以圗治者誠畏此耳惟知畏此故惡衣菲食輕徭薄賦使民家給人足知禮義㢘恥之尚舉天下而安樂之也頻年以来水旱屢作疾癘尤熾而兩河之民服役科須煩費愁苦而官司催科急於星火貪墨之吏從而誅求竊恐供者有限而取者無厭以有限供無厭天下一動變生無方此臣所以痛心疾首慄慄危懼也陛下雖屢形詔命偹陳至誠惻怛憂民疾苦之意惠澤之下如置郵傳命今乃公然廢格是朝廷之恩奪於州縣可不痛哉自古所患者君澤壅而不下逹民情欝而不上通以致君勤恤而民不懐民愁苦而君不知至於離叛危亡者踵相及也臣願陛下申勅䑓諌監司常切糾察嚴刑名以杜絶之如救拯焚溺以幸社稷其五曰崇儉臣聞禹卑宫室惡衣食克儉于家以有天下再傳而之太康則已色荒禽荒矣及桀之身竭百姓以為傾宫而天下亡之唐明皇之初乗輿服御金銀器玩令有司銷毁以供軍國之用其珠玉錦繡焚於前殿及其晚節窮天下之侈不足以供其慾由是觀之創業之君昭儉以示子孫其末流猶入於淫靡始於克儉者其終猶至於驕奢況無以啓廸後人不謹其始者哉天下習安於侈靡乆矣於今為甚貴介之族與夫兼并之家燕飲之物歌謡之具窮竒極巧以相傾勝銷金鋪翠旬翻月異一領之細至有千錢之直者此風其可長哉臣願陛下以道徳為麗仁義為華以珍玩竒貨為喪國之斧斤以珠玉錦繡為迷心之鴆毒芟夷藴崇之絶其根夲痛自裁抑以禁之褒進朝士之約素清修者貶退其淫荒驕奢者以敦薄俗顧不羙哉昔孝文惜百金不為露䑓而天下衣食滋殖晋武焚雉頭裘而士敦朴素唐太宗以亡隋為鑑而公私富給夫失節之嗟愚智同惡由恥不及其羣𩔖故勉强為之以相髙耳人主儻能躬儉以率之其趣也孰禦臣聞偽蜀以珠餙溺噐太祖命碎之且曰以此奉身不亡何待嗚呼聖人之慮逺矣是豈特化當時之習使知其所尚哉其六曰用人臣甞學稼於農矣凡播殖之宜耕鋤之功等則穫無或異茍隂陽之和雷風之動雨露之澤不時則與之同饑饉時則與之同豐穰由是而知天地之所以能成其大者豈非以其無私者耶是故先王法之其於用舍也能激天下之不善而使之退愧勸天下之良才而使之樂進以致治者抑亦法天地之無私故能成其私耳後世不該不徧之主鮮克由是其於用舍之際或崇勢地而抑寒門或任親宻而棄踈逺或採虚譽而廢卑賤或恱其才能而畧歴試或重朝廷而輕四方或皆反是而益亂其故何也夫君子與小人所出不在於世禄與側微而言行非一事之可槩出處非一端之可見此愚智同知也柰何立賢而有方哉以謂必出於勢地與親宻耶而膏粱子弟至有不辨菽麥而髙車大馬以為民上則版築之叟渭濱之漁何從致哉以謂必出寒門與踈逺耶而碌碌腐儒持方尺之紙書骫骳之文以享萬鐘則伊尹之伊陟周公之魯公何從致哉至或採虚譽而廢卑賤恱其才能而略歴試内外迭為輕重是皆昏君之所為可深戒者夫王者一視而同仁茍徳義可尊無擇負販故管仲之舉二盜穆公之用由余齊威王以左右譽而烹阿大夫功成於當年名著於後世可謂明也已矣以舜之聖受命之初且猶歴試諸難況其他乎近古漢宣亦可謂急賢之主矣而蕭望之杜延年葢其所尤厚者或出而治民或出為邉吏非為煩使之以觀人才亦所以維持四方均内外勢也其治優於文景者不其然乎夫祿一不才爵一無功未病於國而終為害者非惟其忌賢者進而害能者用也而賢能亦羞於同羣或恥居其下此其所以為害也自古人君之於進賢也罔間親䟽貴賤無有爱憎惟較其賢否耳故丁公於漢祖有活已之恩非徒不用而加誅焉唐太宗不恤秦王府官吏之怨嗟以為朕與卿軰日所衣食皆取諸民者設官分職以為民也當擇賢而用之豈以新舊為先後哉臣願陛下稽古先王法天地之無私鑑漢祖唐宗之公正不以布衣寒士公卿子弟惟賢是用不及私暱無所偏徇庶幾賢者彚征以光左右大觀四年侍御史毛注采當世之急務上奏曰省邉事足財用收士心禁技巧近年以来邉民僥倖茍得昔所入貢者今必成為郡縣昔所羈縻者今盡納其土疆以内地金帛而事窮荒不可計之費今黔南已有處分如夔渝新邉宜在裁省運塩昔主於漕計今移於它司常平昔積於外州今輸於都下經費安得不匱財貨何以轉移願詔有司悉講復元豐舊制湯之遭旱以士失職為辭今學校飬士葢有常額額外之人不復可預教飬嵗貢之餘畧無可進之地願留貢籍三分暫存科舉以待學外之士使無失職東南造作竒玩花石綱舟後苑工徒京城營繕並宜暫罷以抑末敦本凡此皆聖政之所當先人心悅則天意觧矣歴代名臣奏議卷四十三
