body:
  text: 歴代名臣奏議卷三百一明楊士竒等撰灾祥宋仁宗至和二年侍御史趙抃上言曰臣伏見自去年五月已來妖星遂見近及周稔至今光耀未退此谷永所謂馳騁驟歩芒炎長短所厯奸犯其爲謫變甚可畏也又去冬連今春京東西路及陜右川蜀諸郡旱暵不雨麥苖焦死民既艱食寇攘必興此京房所謂欲德不用兹謂張厥災荒其爲災沴復可懼也邇來岠嵎山谷驚裂有聲他郡數處地亦震動此伯陽所謂陽伏而不能出隂廹而不能升蓋土失其性其爲災異益可駭也夫燮調隂陽者三公之職天戒若曰陛下左右輔弼當得忠賢剛正之人爲之乃可以召至和之氣消未萌之旤不然何以妖星謫變也旱暵災沴也地震祥異也三者咎應粲明如是之著耶臣愚伏望陛下謹天之戒應天以實取天下公議與天下瞻望之所謂賢人君子者陟之使居廟堂之上責以三公四輔之事業委注而仰成之若然則隂陽以和災異以消朝廷清明逺人畏服太平之風可翹足引領而待之也臣朝夕思慮載惟擇賢命相繫國家休戚治亂之本伏願陛下慎重之然後發聖斷力行而不疑則宗廟社稷之福天下生靈之幸起居舍人知諫院范鎮上奏曰臣伏見去冬多南風今春多西北風乍寒乍暑欲雨不雨又有黒氣蔽日此皆人事之所感動也黒氣隂也小人也日陽也君象也黒氣蔽日者隂侵陽小人惑君也欲雨不雨者政事不決也陳執中爲相不病而家居者百日矣陛下以御史之言決一婢死而欲退宰相爲是即乞速退執中以觧天意以御史之言爲非亦乞勅執中起視事無使天意久不決也寒暑者賞罰也乍寒乍暑者不當賞而賞當罰而不罰也鄧保吉有過於法不當爲内侍都知鄧宣言不厯邊任於法不當爲内侍押班未幾而又改官石全斌不當爲觀察使未幾而又爲内侍副都知其餘攀縁改遷皆不應法律是不當賞而賞也陛下有㫖不應法律賞罰聽中書樞宻大臣執奏而中書樞宻大臣不執奏是當罰而不罰也冬而多南風春而多西北風皆逆氣也風主號令主思慮陛下思慮若有爲小人所惑而號令數變易也天變之發或發於未然之前或發於已然之後皆所以覺悟人君也人君修人事以應天變則災異可爲福祥也陛下如欲應黒氣蔽日之變莫若逺小人而近君子莫若黜小人之言而用君子之言陛下如欲應乍寒乍暑之變莫若速還鄧保吉等過恩而明正中書樞宻大臣之罪也陛下如欲應欲雨不雨之變莫若速定陳執中進退之勢以決中外之惑也陛下如欲應冬多南風春多西北風之變莫若精其思慮而不數號令也凡此皆古聖賢通天人之術著乎經史使後世爲人君者視之以奉天爲人臣者法之以事君者也非臣之臆說也陛下無以臣非才廢臣所陳先聖賢之言則臣之幸也非特臣之幸也天下之幸也社稷之福也惟妖星之變及今一年臣消息所未至也今春諸路無麥苖禾種不入而山東尤甚山東盜所起處萬一盜起陛下將何以待之妖星之變殆恐爲此臣所以居言責之地而不得黙黙也臣四歳而亡父七歳而亡母今食陛下之禄父母之養爲不及也所可爲者合忠孝一意以事陛下耳若於此時畏避而不盡言則臣負不忠不孝之罪於陛下也鎮又上奏曰今月二十三日秋分雷乃收聲二十四日雷大震大雨雹雷當收聲而反大震者號令之不時也雹不和之炁自上而下下而害物者也以況上興不急之務以用於下如雹之害物也近歳以來修集禧觀醴泉觀開元殿公主第靡費以鉅萬計尚未訖役又聞垂拱殿一棟折太廟一柱損有司建議舉欲新之夫一棟折修一棟一柱損修一柱事理然也若縁一棟而易一殿一柱而更一廟非惟人情不厭兼恐甚傷天理近者陜西旱饑河東薄稔科採材木不勝其勞此所謂號令不時自上而害物之政也天變所以作也古人於承平無事時尚猶戒土木之費況今國用不足民力凋弊豈可爲此不急以重困之臣竊惟念以一棟易一殿一柱易一廟似非恭儉之主所爲蓋左右近習計此以圖僥倖大臣不略建一言誤陛下至此耳伏乞差官重檢計合修換處量加功役其餘一切停罷上以應天變中以惜國用下以愛民力顧不益聖德耶昔漢文帝惜十家之産罷露臺史冊書之至今爲美陛下如能愛數萬家之産以罷此兩役則其美過漢文帝逺甚臣不勝大幸金君卿上奏曰臣伏讀六月三十日詔書節文以大水爲沴應中外臣寮上實封言時政闕失無有所諱逺方小臣不能詳知國體惟陛下赦臣進越之罪留神財擇幸甚幸甚臣謹按五行傳宗廟廢祭祀則水不潤下伏惟皇帝陛下仁孝之心格于神明時享月薦曾靡有懈咎譴之來不應縁此然臣之愚慮叅考經傳殆宗廟主器社稷本根之重陛下或未之思爾竊惟古先哲王雖已大治之後不能無災異惟恐懼脩省思所未至爲所未爲以應天心則災異自然而消弭臣不敢逺引他說試取兩漢近事以明之若孝景孝成光武孝章之世冬雷霪雨日蝕星隕地震川竭之變而能早定封建固國根本然後災變消復享國長久陛下睿謀英斷夐髙前古豈特周旋孝景孝章之間哉然比歳已來日月薄蝕地震河決天之告戒不爲不至陛下惻然引咎歸已故嘗避正殿損常膳節服御釋繫囚以圖消伏天鑒不回水沴仍作故臣愚以爲宜詢訪故事思宗廟主器社稷根本之重以謹天戒臣又聞漢書五行志曰地上有水比吉性不相害故曰比樂也而相毁墊淪失之象又易曰君不宻則失臣臣不宻則失身幾事不宻則害成今朝廷大政言未出口則已喧傳于道上矣願陛下超然逺慮奮乾剛之斷詔股肱大臣早定封建之議羣小之人無得預聞不然臣恐隂下相爲蠧賊侵陵之禍萌於今日矣詩曰畏天之威于時保之惟陛下垂精留意天下幸甚幸甚嘉祐二年齊唐論麒麟䟽曰臣竊見交趾所進麒麟二頭臣得之道路圖寫其形大扺牛身象耳狗足魚鱗臣謹按爾雅釋獸麏身牛尾一角郭璞注謂春秋所獲麟也又云麠大麃牛尾一角即漢武郊雍所獲麟也又云如馬一角不角者麒即元康中九真郡所貢也又唐龍朔三年麟見于介山又聖朝太平興國九年嵐州獻獸一角似鹿無班角端有肉性甚馴善當時以爲祥麟上表稱賀臣以前典觀之則麒如馬狀麟似鹿形況麟鳯四靈國家大瑞天下稱賀青史具書故唐改元年漢名書閣太平之瑞莫大於斯臣切聞此獸頗與書史所聞不同閉以檻車與象相觸所食草木皆中國所無萬一非是祥麟海外别有名目即朝廷殆爲蠻夷所詐又交趾以進麟爲名私齎行貨不少經過州縣津送之役動數千人以至京師民間之費不下百萬嶺表之民例皆貧弱典賣産業以給公費儻應圖合驗爲瑞聖朝則固不憚民勞以成一代之盛事果非瑞物則豈可以無名之怪獸而困一路之生靈哉伏惟陛下居尊御極垂四十年焦勞萬機愛惜黔首誠願日謹一日雖休勿休勿以所役細微則武王有旅獒之戒勿以綏懐逺俗則文帝有却馬之言昔西漢因鶡雀飛入府舍遂爲瑞鳥隋文帝好祥瑞有野雀集于宫掖因改儀鸞之殿取笑當世貽羞史䇿以斯爲鑒固宜審詳伏乞陛下延訪博物之臣徧考瑞圖所載確有符驗方可進呈事果非真即宜罷黜以寛一方百姓之弊臣素以寡聞昧於通識進言不用黙守常聨儻一辭有補於毫釐一舉少全於疲瘵則退甘鼎鑊萬死無逃臣不勝區區越職言事俯伏待罪四年日食三朝袐閣校理呉及上言曰日食者隂侵陽之戒在人事則臣陵君妻乘夫四夷侵中國今大臣無姑息之政非所謂臣陵君失在陛下淵嘿臨朝使隂邪未盡屏也后妃無權横之家非所謂妻乘夫失在左右親倖驕縱亡節也疆場無虞非所謂四夷侵中國失在將帥非其人爲敵所輕也六年京師大水知諫院楊畋上言洪範五行傳簡宗廟則水不潤下又曰聽之不聦厥罰常水去年夏秋之交久雨傷稼澶州河決東南數路大水爲沴陛下臨御以來容受直諫非聽之不聦也以孝事親非簡於宗廟也然而災異數見臣愚殆以爲萬幾之聽必有失於審者七廟之享必有失於順者惟陛下積思而矯正之乃下其章禮官并兩制考議判禮部司馬光論日食遇隂雲不見乞不稱賀狀曰臣伏覩近世以來毎有日食之變歴官皆先具日月時刻及所食分數奏聞至日或爲隂雲所蔽或所食不滿分數公卿百官皆奉表稱賀以爲大慶臣愚以爲日之所照周徧華夷雲之所蔽至爲近狹今若太陽實虧而有浮雲翳塞雖京師不見四方必有見者此廼天戒至深不可不察臣聞漢成帝永始元年九月日有食之四方不見京師見谷永以爲沈湎于酒禍在内也二年二月日有食之四方見京師不見谷永以爲百姓屈竭禍在外也臣愚以爲永之所言似未協天意夫四方不見京師見者禍尚淺也四方見京師不見者禍濅深也日者人君之象天意若曰人君爲隂邪所蔽災慝明著天下皆知其憂危而朝廷獨不知也由是言之人主尤宜側身戒懼憂念社稷而羣臣乃始相率稱賀豈得不謂之上下相䝉誣罔天譴哉又所食不滿分數者歴官術數之不精當治其罪亦非所以爲賀也伏望陛下明勅有司若六月一日更有日食之異或四方見京師不見或所食不滿分數皆不得奉表稱賀以重皇天之怒則天下幸甚臣職在禮部掌羣臣慶賀章表不敢不言英宗即位光爲殿中侍御史乞體量京西陜西災傷䟽曰臣竊聞京西陜西兩路自夏末以來殊少雨澤秋田豐稔者所收不過五分枯旱之處所得尤薄而官司或務爲聚斂民有訴旱者不肯受接道塗嗷嗷頗多怨讟已有流移就食他方者況此兩路昨來供應山陵百姓最爲勞苦朝廷尤宜優恤伏望特降詔㫖下兩路體量應有災傷之處倍加存撫寛其租稅敢有抑塞旱狀不爲收接者嚴加譴責庶使困窮之民有所赴訴治平元年光知諫院乞車駕早出祈雨劄子曰臣伏見權御史中丞王疇等建言乞陛下循真宗故事幸諸寺觀祈雨朝廷雖從其所請而講議選日已踰旬浹至今車駕未出衆論狐疑皆云事恐中輟臣愚竊以陛下踐祚已踰朞年京城百姓未聞屬車之音重以曏者聖體不安逺方之人妄造事端訛言未息若聞車駕一出則逺近釋然莫不恱喜況今春少雨麥田枯旱禾種未入倉廪虚竭閭里饑愁陛下爲民父母當與之同其憂勞祈禱羣神豈可晏然視之不以疚懐況詔命已降流聞四方若復遷延久而不出則道路之人愈增猜惑不若曏時初無此議也且王者以四海爲家故稱乘輿或稱行在今車駕蹔出近在京城之内亦何必拘瞽史之言選揀時日而忘萬民朝夕之急殆非成湯桑林周宣雲漢之意也臣愚伏望陛下斷自聖志於一兩日之間車駕早出爲民祈雨以副中外喁喁之望二年二月知磁州程珦上奏曰臣伏覩詔勅以年來水潦爲沴八月庚寅大雨應中外臣寮並許上實封言時政闕失及當世利病此蓋皇帝陛下承祖宗大業嚴恭天命祇畏警懼之深也天下士民欽聞德音茍有知見孰不願披忠瀝懇上逹天聽臣雖至愚官爲省郎職分郡寄敢不竭其區區之誠以應明詔惟陛下寛其狂易之誅賜之省覽則天下幸甚臣聞水旱之沴由隂陽之不和隂陽不和繫政事之所致是以自昔明王或遇災變則必警懼以省躬之過思政之闕廣延衆論求所以當天心致和氣故能消弭變異長保隆平昔在商王中宗之時有桑楮之祥髙宗之時有鳴雉之異二王以爲懼而修政行德遂致王道復興皆爲商宗百世之下頌其聖明今陛下嗣位之初比年隂沴聖心驚畏特下明詔以求政之闕誠聖明之爲也然臣觀近古以來引咎之詔自新之言亦世有之其如人君不由於至誠天下徒以爲虛語豈復有如商之二宗興王道於既衰者乎臣願陛下因此天戒奮興善治思商宗之休實鑒後代之虛飾不獨消復災沴於今日將永保丕基於無窮伏觀詔㫖時政闕失當世利病可以佐元元者悉心以陳母有所諱臣竊惟天下之勢所甚急者在安危治亂之機若夫指一政之闕失陳一事之利病徒爲小補不足以救當世之弊而副陛下勤求之意也所謂安危治亂之機臣請條其大端所謂安且治者朝廷有綱紀權持總攝百職庶務天下之治如網之有綱裘之有領舉之而有條委之而不紊也郡縣之官得人而職修惠養有道朝廷政化宣逹于下也百姓安業衣食足而有常心知孝悌忠信之教率之易從勞之不怨心附於上固而不可揺也化行政肅無姦宄盜賊之患設有之不足爲慮蓋有殱滅之備而無響應之虞也民心和而隂陽順無水旱蟲螟之灾有之不能爲害蓋倉廪實府庫充官用給於上民食足於下也武備修而威靈振蠻夷戎狄無敢不服雖有之不足爲憂蓋甲兵利而儲備豐將善謀而士素練也此六者所謂安且治者今之事一皆反是朝廷紀綱汗漫離散莫可總攝本原如此治將安出郡縣之官選不以道更易之數雖時謂才者尚莫能稱其職況庸常者乎循常茍安浸以成俗舉世以爲當然政治廢亂生民困苦朝廷雖有惠澤孰能宣布以逹於下所與共理者如此天下可知矣百姓窮蹙日以加甚而徭繁賦重剥削之不息天下户口雖衆而自足者益寡司牧者治其事爾非有師保左右之也其善惡勤惰趨利避害或昧而反之不從其自然而困之陷之之道又非一塗人用無聊茍度歳月驅之於治則難格率之於惡則易揺民惟邦本本根如是邦國柰何民無生業極困則慮生民不漸善教思利則志動乘間隙則萌姦宄逼凍殍則爲盜賊今兹幸無大故尚爾茍安設或遇大饑饉有大勞役姦雄一呼所在必應以今無事之時尚恐力不能制況勞擾多事之際乎天下安危實繫於此保民之道以食爲本今自京師至于天下計平時之用率無三年之蓄民困空匱則又甚焉以萬室之邑觀之有厚蓄者百無二三困衣食者十居六七統而較之天下虚竭可知矣豐年樂歳饑寒見於道路一穀不稔便致流轉卒有方數千里連數年之水旱不知何以待之姦盜蜂起於内邉隅乘隙於外雖欲爲之末如何矣敵國彊盛古未有此歳輸金帛以修好而好不可恃窮天下之力以養兵而兵不足用尚幸二敵無謀厭小欲而忘大利故我得以紓朝夕之急若其連衡而來則必興數十萬之衆宿於邊境餽餉不繼財用不充將何以濟乎驕惰之兵縱無奔潰之患曠日持久終有消窮之虞又況征斂興發而民人轉亡饑饉愁怨而姦雄競起事至於此興衰可知以此觀之天下之勢安乎危乎凡此數端皆有危亡之虞而未至於是者不識朝廷制置能使之然耶抑天幸而偶然耶幸然之事其可常乎先皇帝至仁格天地保持之以至於今厯時既久言者既已多朝廷遂以爲果不足憂也可以常然姑維持之而已雖聞至深至切之言不爲動也嗚呼貽天下之患必由於是乎今天下尚無事朝廷宜急思所以救時之道不然臣恐因循歳月前之所陳者一事至則爲之晩矣中人之家有百金之産子孫保守不敢不念陛下承祖宗大業可不懼乎今言當世之務者必曰所先寛賦役也勸農桑也實倉廪也備災害也修武備也明教化也此誠要務然猶未知其本也臣以爲所尤先者有三焉請爲陛下陳之一曰立志二曰責任三曰求賢今雖納嘉謀陳善算非君志先立其能聽而用之乎君欲用之非責任宰輔其孰承而行之乎君相協心非賢者任職其能施於天下乎三者本也制於事者用也有本不患無其用三者之中復以立志爲本君志立而天下治矣所謂立志者至誠一心以道自任以聖人之訓爲可必信以先王之治爲可必行不狃滯於近規不遷惑於衆口必期致天下三代之世此之謂也夫以一夫之身立志不篤則不能自修況天下之大非體乾剛健其能治乎自昔人君孰不欲天下之治然而或欲爲而不知所措或始銳而不克其終或安於積久之弊而不能改爲或惑於衆多之論而莫知適用此皆立志不堅故也臣觀朝廷毎有善政鮮克堅守或行之而天下不從請舉近年一二事以明之朝廷以今之任人未嘗選擇一用薦舉之定式患所舉不得其人也故詔以飭之非不丁寧然而當任者如弗聞也陛下以爲自後所舉果得其人乎曽少異於舊乎又以守令數易之害治也詔㢘察之官舉其有善政者俾之再任于今未聞應詔者豈天下守令無一人有善政耶茍誠無之朝廷負生民不已甚乎且以爲善政行之何不使天下奉承以見其效若曰非不欲必行也柰天下不從何如此則是政令不行矣將如天下何此亦在陛下而已茍陛下之志先立奮其英斷以必行之雖彊大諸侯跋扈藩鎮亦將震慴莫敢違也況郡縣之吏乎故臣願陛下以立志爲先如臣前所陳法先王之治稽經典之訓篤信而力行之救天下深沈固結之弊爲生民長久治安之計勿以變舊爲難勿以衆口爲惑則三代之治可望於今日也若曰人君所爲不可以易易而或失其害則大臣以爲不然稽古而行非爲易也厯觀前史自古以來豈有法先王稽訓典將大有爲而致敗亂者乎惟動不師古茍安襲弊卒至危亡者則多矣事據昭然無可疑也願陛下不以臣之踈賤而易其言則天下幸甚所謂責任者夫以海宇之廣億兆之衆一人不可以獨治必頼輔弼之賢然後能成天下之務自古聖王未有不以求任輔相爲先者也在商王髙宗之初未得其人則恭黙不言蓋事無當先者也及其得說而命之則曰濟川作舟楫歳旱作霖雨和羮爲鹽梅其相須倚之如是此聖人任輔相之道也夫圖任之道以謹擇爲本擇之謹故知之明知之明故信之篤信之篤故任之專任之專故禮之厚而責之重擇之謹則必得其賢知之明則仰成而不疑信之篤則人致其誠任之專則得盡其才禮之厚則禮貎尊而其勢重責之重則自任切而功有成是故推誠任之待以師傅之禮坐而論道責之以天下治隂陽和故當之者自知禮尊而任專責深而勢重則挺然以天下爲己任故能稱其職也雖有姦諛巧佞知其交深而不可間勢重而不可揺亦將見息其邪謀歸附於正矣後之任相者異於是其始也擇之不謹故知之不明知之不明故信之不篤信之不篤故任之不專任之不專故禮之不厚而責之不重矣擇不謹則不得其人知不明則用之猶豫信不篤則人懐疑慮任不專則不得盡其能禮不厚則其勢輕而易揺責不重則不稱其職是故任之不盡其誠待之不以其禮僕僕趨走若吏史然文案紛冗下行有司之事當之者自知交不深而其勢輕動懐顧忌不肯自盡上懼君心之疑下虞羣議之奪故蓄縮而不敢有爲茍循常以圖自安爾君子弗願處也姦邪之人亦知其易揺日伺間隙如是其能自任以天下之重乎若曰非任之難知之惟難且何以知其賢而任之或失其人治亂所繫此人君所以難之也臣以爲知人誠難亦繫取之之道如何爾臯陶爲帝謨曰在知人禹吁而難之及其陳九德載采采則曰底可績蓋詢行考實人焉廋哉厯觀前史自古已來豈有履道之士孝聞於家行著於鄉德推於朝廷節見於事爲其言合聖人之道其履蹈經典之訓及用之於朝反致敗亂者乎用是而求其有差乎若乃人君以爲賢而用之卒敗於事者古亦多矣稽迹其由蓋取之不以其道也大率一言一事合於已心則謂之才而用之曾不循核本末稽考名實如前之云傷民害政不亦宜乎四海之大未始乏賢誠能廣揚側陋至誠降禮求之以道雖臯夔伊周之比亦可必有賢德志道之士皆可得而用也願陛下如臣前所陳既堅求治之志則以責任宰輔爲先待之盡其禮任之盡其誠責之盡其職不患其不爲患其不能爲不患其不能爲患其不得爲蓋不爲者可責之必爲不能爲者可勉而能爲惟不得爲則已矣所謂不得爲者君臣之志不通懐顧忌而不肯自盡此由失待任之道也今執政大臣皆先朝之選天下重望陛下責任之而已臣願陛下延召宰執從容訪問今天下之事爲安爲危爲治爲亂當維持以度歳月乎當有爲以救其弊乎如曰當爲則願示之以必爲之意詢之以所爲之政審慮之力行之時不可後事不可緩也如曰非不爲也患不能也則天下之廣豈無賢德可以禮問朝廷之上豈無英髦可以討論有先王之政可以考觀有經典之訓可以取則道豈逺哉不求爾在君相協心勤求力爲之而已如曰無妄爲也姑守常而已則在陛下深思而明辨之唐文宗之時大權漸奪天下將亂而牛僧孺欺以爲治矣史冊書之可爲明鑒今陛下聖明執政忠良無是事也伏願陛下不以臣之踈賤而易其言則天下幸甚所謂求賢者夫古之聖王所以能致天下之治無他術也朝廷至於天下公卿大夫百職羣寮皆稱其任而已何以得稱其任賢者在位能者在職而已何以得賢能而任之求之有道而已雖天下常用易得之物未有不求而得者也金生於山木生於林非匠者採伐不登於用況賢能之士傑出羣𩔖非若山林之物廣生而無極也非人君搜擇之有道其可得而用乎自昔邦家張官置吏未嘗不取士也顧取之之道如何爾今取士之弊議者亦多矣臣不暇條析而言大概投名自薦記誦聲律非求賢之道爾求不以道則得非其賢間或得其才適由偶幸非知其才而取之也朝廷選任盡自其中曾不虞賢俊之棄遺于下也果天下無遺賢耶抑雖有之吾姑守法於上不足以爲意耶將科舉所得之賢已足自治而不乏耶臣以爲致天下今日之弊蓋由此也以今選舉之科用今進任之法而欲得天下之賢興天下之治其猶北轅適越不亦逺乎臣願陛下如臣前所陳既立求治之志又思責任之道則以求賢爲先茍不先得賢則雖陛下焦心勞思將安所施誠得天下之賢置之朝廷則端拱無爲而天下治矣此所謂勞於求賢逸於得人也歴觀前史自古以來稱治之君有不以求賢爲事者乎有規規守常以資任人而能致大治者乎有國家之興不由得人者乎由此言之用賢之驗不其甚明若曰非不欲賢也病求之之難也臣以爲不然夫以人主之勢心有所嚮天下風靡景從設若珍禽異獸瓌寶竒玩之物雖遐方殊域之所有深山大海之所生志所欲者無不可致蓋上心所好奉之以天下之力也若使存好賢之心如是則何巖穴之幽不可求何山林之深不可致所患好之不篤爾夫人君用賢亦賴公卿大臣推援薦逹之力今朝廷未嘗求賢公卿大臣亦不以求賢取士爲意相先引彚世所罕聞訪道求師貴逹所耻大率以爲任已可也士將安補今世無賢求之何益夫以周公之聖其自任足矣尚汲汲求賢以自輔也以其聖且好賢與知人之明宜天下之賢皆爲之用莫有遺也尚乃日不暇給恐失天下之士後之人其才不及周公而自謂足矣不求賢以自輔也以其不求且知之不明宜賢者在下之多也乃曰天下無賢矣噫何其用意與周公異也欲其助皇明燭幽隠不可得也然亦係上之所爲而已陛下誠能專心致志孜孜不倦以求賢爲事常恐天下有遺棄之才朝廷之上推賢援能者登進之蔽賢自任者踈逺之自然天下嚮風自下及上孰不以相先爲善行薦逹爲急務搜拔既廣雖小才片善無所隠晦如此則士益貴而守益堅㢘耻格而風教厚矣得天下之賢則天下之治不足道也今世人情淺近積習成俗朝廷進人茍循常法則雖千百而取羣伍而用庸惡混雜曾不以爲非設或抜一賢一善出於不次則求摭小差衆議囂沸如真廟擢种放先朝擢范仲淹是也設非君心篤信寧免疑惑反自爲過此所以非常之舉曠久不行也伏見近日陛下不由言薦擢范純仁置之言路在今世爲非常之舉純仁名臣之子有才名在位多言其能陛下擢之當也然臣願陛下自信勿疑純仁果賢則陛下知人之明也如用之而無顯效則亦曰吾勞心任人雖未得其效亦無愧於天下矣設或大敗厥職則亦曰吾之失也當益務選擇期於得人爾蓋拔十得五才不可勝用求賢而失尚愈於不求誠持是心何患不得賢也方陛下用純仁識者皆喜臣獨憂之何者陛下始奮英斷㧞一人誠恐或有差失遂抑聖心以爲專守常規可以無過不復以簡擢爲意則天下將何望焉此在陛下自信勿疑而已願陛下不以臣之踈賤而易其言天下幸甚臣前所陳三者治天下之本也臣非不知有興利除害之方安國濟民之術邊境備禦之策教化根本之論可以爲陛下陳之顧三者不先徒虚言爾三者既行不患爲無術也願陛下以社稷爲心生民爲念鑒茍安之弊思永世之策賜之省覽察其深誠萬一有毫髪之補於聖明臣雖被妄言之誅無所悔恨昔賈誼爲漢文言治亂漢文不能用者百世之下爲譏病陛下勿使後之視今猶今之視昔則天下不勝幸甚狂瞽之言惟聖明裁恕知諫院兼侍御史知雜事吕誨上奏曰臣伏覩詔音責躬引咎博訪羣臣有以見聖德之至矣臣聞隂陽和則風雨時王道正則百川理五事不修則物不遂性災沴繇兹而生矣斯政化通於天地見效可信者天以變異告戒人君者欲恐懼修省振起頽弛如其怠荒不新厥德外無保民之慮中無應變之實則咎罰洊臻危亡及之甚可畏也方秋令向深氛潦當息而霖雨驚驟泉源湧溢蕩覆廬舍墊溺民命京師訛言幾至生亂誠異常之變矣陛下即位之初事無過舉災沴遽作殆人情久鬱怨愁之氣積隂而成天意愛陛下之深以是譴告不可不求其原也臣謹按洪範曰肅時雨若狂恒雨若肅者貎之恭狂者事之妄居上則言動必謹謀慮必審號令必信賞罰必當一有其妄咎證斯應五行志曰簡宗廟廢祭祀水不潤下水者北方萬物終藏之地神道居隂尚乎安靜䖍恭廟祭所以昭孝道也廼者濮安懿王一事始議或將與仁廟比崇終罷追封不及燕王之例禮失中而孝不足是亦幾乎慢也京房傳曰饑而不損謂泰厥災水謂下民饑饉上宜減損去冬及春許潁等郡大荒上方多不急之用後苑有淫巧之工宜裁減以崇儉約量入制用正在今日也又曰避遏有德厥災水蓋以有德之人壅遏而不用也今則官不試職名不副實賢不肖溷淆於下而況前席詳延無非藩邸之舊清塗進用皆出權臣之門忠良之人寜無解體古者以功舉賢則萬化成而瑞應著以毁譽取人故功業廢而災異至斯皆前世已驗之明者陛下當翼翼循思追捄其失庶幾消復之理也然陛下側身恐懼祇悔誠深方注意輔臣代天理物隂陽不順風雨不時灾變於下致時政之闕失咎將安歸臣備員風憲無補聦明朝綱之頽弛時政之闕失職臣之繇罪在不赦詔命既下著位之臣莫不輸忠畢慮仰副諮詢惟陛下省覽無倦言或可用克已行之日謹一日惟新盛德更張治具隠䘏民病感召和氣以塞災變如曰休咎數也治亂勢也四輔俱賢百工皆舉不責人事委之天理臣恐天心未應沴氣還復人情動揺邦國傾矣愚臣之言不識忌諱唯聖明加察焉監察御史裏行吕大防應詔論水災䟽曰臣伏覩乙未詔書以水潦之變責躬恤物延問得失禹湯之引咎漢文之恭已不過是也臣伏覩自古人君之失德必皆有嗜好偏篤難改之行以害政事或好征伐或好田獵或好聲名或好行幸或好治宫室故臣下之言不可入而君上之過終莫能改則天爲出變異以警懼之如漢文帝之賢唐太宗之明皆不免此累伏惟陛下纂承大統三年于兹勤修鄰好屏棄物玩減後宫之冗罷不急之費早朝晏罷日謹一日於前數者曾無一焉而天變之大如此之甚臣竊思殆非出於陛下之聖躬而率由政事之失臣得爲陛下詳布其說蓋以天之告人不能諄諄然而常以象𩔖示今雨水之患至入宫城壊廬舍殺人而害物此隂勝陽之沴也以人事而言君弱臣彊隂勝也四裔謀中國盜賊害平民亦隂勝也臣雖愚昧䝉陛下非次抜擢日夕爲陛下講求思慮當今之故與今日之所宜無出八事之大一曰主恩不立二曰臣權太盛三曰邪議干正四曰私恩害公五曰二敵連謀六曰盜賊恣行七曰羣情失職八曰刑法失平何謂主恩不立陛下自即位以來所與日相見者兩府之臣七八人時與之相見少接其語言者兩制主判之臣經筵侍從諫官御史輩又數十人陛下之臣五日一謁於廷下四五百人而所與相見接其語言日纔一二如此則何以通君臣之情哉至如館閣省府之官皆陛下選擇養育以進用之人而有平生未嘗識陛下之龍顔者此臣所未諭也竊料陛下非憚其勞而不見特以故事如此不能遽改而已唐之制有待制本朝建隆乾德咸平天聖皆常行之又祖宗臨御往往非次宣召臣寮訪以政事或行幸書林接見儒臣臣愚以爲宜復轉對之制及許轉運判官辭見并權發遣三司判官授差遣及委審官擇大郡自來選差知州人並令上殿仍乞非時宣召臣寮以問政事羣臣之情逹則主恩立矣何謂臣權太盛進退百執事皆由宰司進擬而陛下直可其奏者十則十百則百故中外之臣有被任使當進擢惟知出執政之門而罕有歸恩於陛下士大夫相語以得官爲經營有力以失職爲某人不喜如此則望宣力盡忠之臣豈易得哉臣愚以爲小官冗職不必煩陛下揀擇至於修起居注集賢史館修撰天章閣侍講三司副使此四五職名僅及十員皆進用兩制之門陛下茍不以留意則庸人下才依託干請從此而進遂爲陛下侍從之臣一旦有緩急須將帥之才則常患無人退之則無名進之則無補置而不用則位髙禄重陛下試觀今日兩制之臣如此者有幾即可見其所從來者不謹選也陛下何不徧接識凡今館閣省府之臣隂察其可用者記之于籍間復參問近輔左右之臣以驗其實乃與大臣議某人堪某官任某事假如修注修撰侍講副使共須十員則采察二十人以待之遇一官闕陛下召而接之則恩自陛下出矣無經營馳騁之患矣至如其他進擬有不合陛下意者當退而改之如此則臣權不盛矣何謂邪議干正昨者朝廷參議濮安懿王典禮衣冠草茅之士無賢不肖上至陛下左右侍從素所取信之臣皆以爲出繼帝統大義甚重不宜復顧私親追榮之禮當據禮經而兩漢衰世故事不可援用然一二姦人内希陛下追懐之意外協大臣不正之議而復結濮宫諸貴人之歡遂不顧公議妄進邪說以白爲黒以是爲非惑亂聖聽中外切齒臣愚以爲應因濮安懿王論奏文字一切付外委未嘗預議近臣覆定可否宣示四方則隂邪之人不敢干正矣何謂私恩害公自古人君即位無不有攀附故舊之臣然賢智之君待故舊之意恩寵甚重而至於議政事論國體則必與天下之才共之漢文帝不訪宋昌而用賈誼袁盎以議當世之政不屬景帝以張武而謂周亞夫爲可用唐太宗之論人物薄髙士㢘唐儉而引重劉洎馬周其用王珪魏徴也皆仇敵之餘豈嘗計其新舊親踈哉陛下比日以來數引見藩邸之臣恩禮甚厚外人不知皆以爲陛下與之議政事論人物誠如此則害聖德多矣縁此等人材至下止可待以恩厚不宜置之顯路則私恩雖厚不害公議矣何謂二敵連謀元昊晩年君臣相疑而父子結隙謀臣壯士往往被誅又累爲唃氏所敗遂有休兵願和之意而疆臣急於進取激其成功議和之初許與太原歳遺金帛之直蓋三十萬緍戍邊之兵不能大減比之寶元以前戍兵増五六萬而歳費約二百餘萬故闗中民力之困而内帑泄於二邊而益虚今諒祚少年繼襲多招亡命與之爲謀有窺闗輔劍南之意不獲其意則又邀朝廷乞増賜予而後已頗聞近歳與北敵交通人使旁午遼人則利羌之賂羌則恃遼之援脣齒相依掎角爲寇其可不早爲計耶臣愚以爲擇將帥増參佐則邊備可講置都䕶結唃氏則分諒祚之勢絶劍南之患寛禁約撫屬羌則防落漸備久任堡障之戍得自爲政則二敵見畏矣何謂盜賊恣行今京東之民日夕爲盜之家往往不敢申舉者蓋官不能得盜復能爲害於申舉之家是盜之威勢常大於官司矣久而不禁則屯聚嘯集以覆州縣如反掌耳臣愚以爲多盜之邑令監司舉縣尉别爲改官之格以激勸之以捕盜殿最以課監司守令則盜賊消矣何謂羣情失職今審官所差知州通判得替而赴闕久而後差常在一年半之後而待次者又常及一百人知縣監當者略同其比是常參之官不釐務而請俸者常及其半其弊蓋由毎歳流内轉官之𩔖僅及百人其上簿而待遷者又數百人凡諸銓未遷者常及三年而後得此蓋法之敝也臣愚以爲改磨勘之法量入流之數則羣情不失矣何謂刑罰失所今大理審刑部乃天下所觀定法之地用法不當立比不一莫甚於此蓋法官銓擇殊爲滅裂臣愚以爲更法官之法則刑罰得中矣鄭獬論臣寮極言得失䟽曰臣伏見詔書以京師大雨爲沴壓溺者衆許中外臣寮極言得失者兹實陛下側身求過思有以消復之天衷懇懇至於魚蟲草木莫不感動況於能言者哉臣竊伏思今陛下發詔以求忠言將欲用之耶將欲因災異舉故事而藻飾之耶茍欲藻飾之則固無可議者必欲用之則臣願陳其方臣觀前世之君因恠變而求諫者甚衆書之史冊張以爲美事及考其實則能用其言而載於行事者蓋亦鮮矣徒使後世襲蹈以爲帝王之值災異者於此空言而足矣曷足謂之罪已修德者耶今詔㫖一發天下忠義之士必有極其所藴以薦諸朝者此當有益於治道不爲妄作然而疊章累䟽繁委而並集則陛下果能環復而究覽之耶計陛下一日萬機必未能然爾而將欲如平時章䟽事關深宻者則留中不出事繫政體者則下中書事屬兵要者則下樞宻院兩府覆奏則又下羣有司及郡邑至於無所行而後止如此則是有求諌之名而無求諫之實與前世之爲空言者等耳臣竊謂陛下萬機之繁既未能徧覽則宜選置官屬令專掌今之羣臣所上章䟽日許兩府及近臣番休更直便殿賜坐與之從容條陳講貫其可者則熟究而行之不可則罷之有疑焉則廣詢而后決之羣言得而衆事舉此應天之實也夫下之爲言也甚難而上之聽者常忽焉自非忠憤激於心則孰肯隳肝膽而冒忌諱者哉古之能建立功業者未嘗不好諫也好之者繇其能褒進而招徠之也太祖太宗時言事者多被甄賞自近年以來兹事寥闊仁宗寛仁最能容直言而亦不能甄賞也願陛下采羣臣之章䟽如其宏謀偉論可施於當世者則召見之與之共議不惟質其言且以觀其材大者擢之以職任次者加賜金帛無取焉報罷之如此則陛下下詔有實言得言有實用且使史冊書之以爲某年大水詔求直言用某人言行某事以絀夫前世之爲空言者則無令陛下下詔書藏於有司復爲數幅空紙而已惟乞陛下斷而行之則臣不勝大願時大雨霖災異數見論者歸咎濮議李清臣廷對奏曰天地之大譬如人一身腹心肺腑有所攻塞則五官爲之不寧民人生聚天地之腹心肺腑也日月星辰天地之五官也善止天地之異者不止其異止民之疾痛而已進士范百禄對策曰簡宗廟廢祭祀則水不潤下昔漢哀尊共皇河南潁川大水孝安尊德皇京師郡國二十九大水蓋大宗隆小宗殺宗廟重私祀輕今宜殺而隆宜輕而重是悖先王之禮禮一悖則人心失而天意暌變異所由起也龍圖閣直學士吕公著上奏曰臣聞水旱之災雖聖人在上不能免也然聖人在上雖有水旱而終不爲害者遇災而恐懼見異而修德夙夜自省以荅天戒故災可以轉而爲福危可以徙而爲安後世人君不知禍福無常而謂天命爲已有不知人情可畏而謂力可以制之災害既作矣猶不自知其非也乃引堯湯水旱以爲比而不知疇咨自責之獲終吉也故人心不從天命不祐災害不已怪異隨之怪異不已傷敗隨之由是觀之水旱之災不能使必無於世而其終所以安危存亡者在懼與不懼耳伏惟陛下蒞政已來日孳孳於庶事然累歳旱潦人多疫疾又近者大雨爲沴下民昏墊陛下徹宴損膳下毋諱之詔開直言之路將克已自新以求天意然臣愚獨以爲此皆常事猶未足以弭大災也唯當兢兢業業以求已過自奉先養親以至於任官使人求賢納諫愛民節用無不物物而思之行所未行補其闕誤以謝天心以順人意則社稷幸甚三年翰林學士承㫖張方平上言曰臣自到闕伏見陛下以垂象之變避正殿減膳降服恤刑罷宴徹聲樂弛力役所以修省荅天戒者甚至竊聞退就宫閤尤爲憂勞至以聖躬爲民祈請臣深惟陛下以上聖之資自在藩邸其稽古好德令聞夙著於四方繼天纂統越今四年始初清明厲精求治然未聞有以修明紀律震耀威靈以究安危治亂根本之議也前史推彗星之占率以爲除舊布新之象中外之因循久矣官失其守事忘其舊綱目頽紊憲章隳弛天其或者儻將以是爲告先賢以爲政譬之鼓琴瑟不調甚者必當解而更張之竊觀朝政殊未遑及此晉書紀何曽侍武帝退而告其子曰吾毎對見未嘗聞經國逺圖惟說平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎後天下亂危果如其言今夫萬機庶政屬在兩府願陛下以燕暇之時就清閒之處延召執政之臣從容賜坐垂意訪逮各使悉心陳治道之要以陛下之明而叅擇其言舉其可施行者以興敝舉廢捄時急務匪惟修人事抑以承天意又比來災眚間作率由隂沴夫隂也者臣道也妻道也四裔之道也庶民之象也陛下推是而求之則天意可見而消復之道得矣惟陛下留神幸察知諫院傅堯俞上奏曰臣伏讀舊史見前世已然之效國家將有失道之敗而天迺先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至今陛下操有爲之心以恭儉求治而大雨壊廬舍殺人極衆水入宗廟冒宫闕其譴告警懼丁寧切至之如是者何哉臣伏思其所以然之故蓋有所得傳曰簡宗廟逆天時則水不潤下昔至和大水當時議者亦以爲簡宗廟之罰先帝納諫事即施行今陛下受天下於先帝而昭陵之土未乾執政之臣導陛下以非義將以濮安懿王爲皇考於仁宗之廟簡孰甚焉是以大失人心上干天譴事重於昔故害亦過之陛下儻不感悟臣恐大異仍至更有甚於此者陛下縱不能盡逐執政猶當黜首議之人以謝上下此固天道抑又有人事焉夫兩日之雨京師之患如此陛下謂人事修乎廢乎賴天之靈而姑爲譴懼儻更一日未止者豈無傷敗之憂陛下得不爲之寒心哉臣愚願陛下取禮官兩制之議遂定濮王封冊黜歐陽修以暴其所以誤陛下者使天下較然知此意不出於陛下然後進修子道通廣言路切責三公以圖後效重黜水官以懲不職庶幾可以厭塞人情消弭他變此所謂應天以實不以文動民以行不以言者也若謂降詔責躬許有位粗陳得失便爲於事已足患至則惕然知畏事緩則置而不思讜正之言一切不入於天人之際適足有所激耳求福則未之聞也況公議鬰而不伸乃復區區以求直言臣恐天下不以朝廷爲至誠也方今佞邪之臣衆將有以天時常數上惑聖聦甚者又將有堯湯水旱之說願陛下深拒絶之勿使此曹重誤天下此繫國家安危成敗幸陛下留神毋忽堯俞爲右司諫上奏曰臣伏見霖雨踰月漸愆秋望郡國奏報水害已多都下細民艱窘尤甚陛下臨朝咨訪屢軫睿慈臣雖甚愚官有言責既不能通天下之志以開廣聦明又不能博貫六經求消弭時災之術辜負廪禄罪在無赦雖然輙效愚悃惟陛下留意臣聞和氣致祥乖氣致異祥異之至固不徒然陛下自親擥萬機恭儉求治宜享慶雲醴泉之應廼得旱虐雨淫之沴天人之際不得乖刺至此臣謂天當大有之世其所以責望於陛下者至深至重故於即位已來再三爲異以警動之又懼廋隠微僻之處有所忽者故用災譴以告戒陛下不然逺方之人寃失職者衆愁痛憤疾聚爲乖氣至於四裔中國之隂也隂盛頗劇良可爲虞大河之防亦宜預慮伏願亟降德音引過自予極懇惻􅉃怛之語以感動人心致恐懼修省之誠以祇答天意然後虚懐採納特詔百官言事庶幾朝廷闕失與四方幽隠悉獲上逹陛下詳擇於其間将有所得況因災異以求直言蓋古盛德之所爲也堯俞又上奏曰臣伏見今歳己來既旱而水災異仍發臣竊憂之臣頃嘗有狀乞陛下下罪已之詔令百官言事求所以消弭之術逮今未䝉收採誠恐陛下歸之數而已矣夫天人相與之際戒懼禳復之說豈爲欺於後世就使爲欺不猶愈於爲數者哉伏望以臣前狀速賜施行必有爲陛下道其所以然者雖然臣亦嘗有所言矣今復有得不敢自黙數干天聽實冀粗有禆補然後雖誅死竄殛無所憾焉臣竊謂今乾剛未奮陽明未融蓋亦致異之一端也天之譴告懇懇者其殆以此臣謹以見事明之臣近言審刑院大理寺匿法以罔上此豈區區彈劾事臣前奏所謂方今事體無大於此何則陛下髙居深念使人不敢欺則萬事自舉茍可欺也何所不至臣謂陛下朝得臣言暮行威罰而遷延浸久頗若常務權大理少卿賈夀雖非罪首實有闗通未聞劾問遽擢爲提㸃刑獄是豈嫉惡姦猾開廣言路之㫖乎臣雖至愚豈不知摭拾小碎可以取容倖進觸犯衆怒非安身之術其盡悃愊以深言者欲上副陛下求治之意以整齊權綱陛下儻不以爲然臣亦安事於貽患招悔者乎臣又聞法官復有事狀之說竊恐此語亦曾上聞蓋重爲欺耳凡斷案微有情節不圓乃以事狀改正安有出入人罪已經奏斷可用事狀修改茍如是何用不許舉覺條貫若果有此說乞陛下取許入事狀改正及不在舉覺兩道全條特賜親覽則是非即判臣與盧士宗輩素無嫌隙誠嫉其舞文挾詐而虧損陛下德聲陛下儻亮臣孤忠奮然獨斷則天日剛明可以變積隂之沴朝廷肅正可以杜羣枉之萌厯代名臣奏議卷三百一
