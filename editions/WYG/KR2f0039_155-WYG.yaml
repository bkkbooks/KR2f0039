body:
  text: 歴代名臣奏議卷一百五十五明楊士竒等撰知人宋哲宗元祐三年尚書丞王存乞明論朋黨所在状曰臣今月十八日同三省延和殿奏論王覿罷諫議大夫除外任差遣事伏䝉陛下宣諭近日朝廷煞有朋黨臣與吕大防等奏陛下所謂朋黨乞明示臣等庶知懲戒既而不䝉宣諭臣退竊恐悚盖朋黨者附下罔上紛亂邪正眩惑視聽隂為姦利此人臣之巨蠧而世主所深惡也漢之黨事始於甘陵二部浸滛不已至于衣冠塗炭垂二十年唐二李朋黨互相排斥凡四十年幾危朝廷國家慶歴間亦有朋黨之論當時富弼韓琦范仲淹等頗遭排擯賴仁宗盛徳不至傾害去年因張舜民被貶自此議論之人分為二黨亦互相詆毁聖明燭知稍加擯抑今雖其勢頗沮而餘風未殄臣職預敦厲風俗常竊患之今䝉宣諭近日朝廷朋黨未審聖意謂庶官近侍邪抑謂執政之臣必是察見實状亦當明諭中外厚加譴黜盖執政之人同心同徳乃克濟務若審知有挾邪朋比之人不可一日使居此位居此位者須待以不疑若懐疑心則必有小人造作飛語乘間而進者倘陛下涵容不欲暴露而執政被疑各懐形迹其害陛下聖政為不細矣臣䝉被拔擢使預機政雖甚愚鄙然粗識為臣去就之節固無貪戀禄位之心所以夙夜黽勉欲効其區區者誠荷陛下不次之遇思有以補報萬一是以心有所懐不敢嘿嘿伏望聖慈因延和殿奏對明諭臣等以朋黨所在使得循省如臣迹狀有渉於此願從竄黜以肅在位臣不勝惶懼之至翰林學士朝奉郎知制誥兼侍讀蘇軾辨舉王鞏劄子曰臣近舉宗正寺丞王鞏節操方正可備獻納科竊聞臺諫官言鞏姦邪及離間宗室因諂事臣以獲薦舉奉聖㫖除鞏西京通判謹按鞏好學有文强力敢言不畏强禦此其所長也年壮氣盛鋭於進取好論人物多致怨憎此其所短也頃者竄逐萬里偶獲生還而容貎如故志氣逾厲此亦有過人者故相司馬光深知之待以國士與之徃返論議不一臣以為所短不足以廢所長故為國収才以備選用去嵗以來吏民上書盖數千人朝廷委司馬光看詳擇其可用者得十五人又於十五人中獨稱奨二人孔宗翰與鞏是也鞏縁此得減二年磨勘仍擢為宗正寺丞則臣之稱薦與光之擢用其事正同若果是姦邪䑓諫當此時何不論奏鞏上䟽論宗室之䟽逺者不當稱皇叔皇伯雖未必中理然不過欲尊君抑臣務合古禮而已何名為離間哉況鞏此議執政多以為非獨司馬光深然之故下禮部詳議又兵部侍郎趙彦若亦曾建言若果是離間光亦離間也彦若亦離間也方行下有司時䑓諫初無一言及光没之後乃有姦邪離間之說則是鞏之邪正係光之存亡非公論也鞏與臣世舊幼小相知從臣為學何名諂事三者之論了無一實上賴聖明不以此罪鞏亦不以此責臣止除外官以厭塞言者之責臣復何所辨論但痛司馬光死未數月而所賢之士變為姦邪又傷言者本欲中臣而累及鞏誣罔之漸懼者甚衆是以冒昧一言伏深戰越哲宗時御史中丞蘇轍乞分别邪正劄子曰臣竊見元祐以來朝廷改更弊事屏逐羣枉上有忠厚之政下無聚斂之怨天下雖未大治而經今五年中外帖然莫以為非者惟姦邪失職居外日夜窺伺便利規求復進不免百端㳺說動揺貴近臣愚竊深憂之若陛下不察其實大臣惑其邪說遂使忠邪雜進於朝以示廣大無所不容之意則氷炭同處必至交争薰蕕同器久當遺臭朝廷之患自此始矣昔聖人作易内陽外隂内君子外小人則謂之泰内隂外陽内小人外君子則謂之否盖小人不可使在朝廷自古而然矣但當置之於外每加安存使無失其所不至忿恨無聊謀害君子則泰卦之本意也昔東晉桓温之亂諸桓親黨布滿中外及温死謝安代之為政以三桓分蒞三州彼此無怨江左遂安故晉史稱安有經逺無競之美然臣竊謂謝安之於桓氏亦用之於外而已未甞引之於内與之共政也向使安引桓氏而寘諸朝人懐異心各欲自行其志則謝安将不能保其身而況安朝廷乎頃者一二大臣専務含養小人為自便之計既小人内有所主故蔡確邢恕之流敢出妄言以欺愚惑衆及確恕被罪有司懲前之失凡在内臣僚例䝉摧沮盧秉何正臣皆身為待制而明堂薦子止得選人蒲宗孟曾布所犯明有典法而降官禠職唯恐不甚明立痕迹以示異同為朝廷斂怨此二者皆過矣故臣以為小人雖決不可任以腹心至於牧守四方奔走庶事各随所長無所偏廢寵禄恩賜常使彼此如一無迹可指此朝廷之至計也近者朝廷用鄧温伯為翰林承㫖而䑓諫雜然進言指為邪黨以謂小人必由此彚進臣嘗論温伯之為人粗有文藝無他大惡但性本柔弱委曲從人方王珪蔡確用事則頥指如意及司馬光吕公著當國亦脂韋其間若以其左右附麗無所損益遇便流轉緩急不可保信誠不為過也若謂其懐挾姦詐能首為亂階則甚矣盖臺諫之言温伯則過至為朝廷逺慮則未為過也故臣願陛下謹守元祐之初政久而彌堅慎用左右之近臣毋雜邪正至於在外臣子一以恩意待之使嫌隙無自而生愛戴以忘其死則垂拱無為安意為善愈久而愈無患矣臣不勝區區博采公議而效之左右伏乞宣諭大臣共敦斯義勿謂不顧改更之政輙懐異同之心如此而後朝廷安矣取進止再論分别邪正劄子曰臣今月二十三日延和殿進呈劄子論君子小人不可並處朝廷因復口陳其詳以瀆天聽竊觀聖意𩔖不以臣言為非者然天威咫尺言詞廹遽有所不盡退復思念若使邪正並進皆得與聞國事此治亂之機而朝廷所以安危者也臣誤䝉聖恩典司邦憲臣而不言誰當救其失者謹復稽之古今考之聖賢之格言莫不謂親近君子斥逺小人則人主尊榮國家安樂䟽外君子進任小人則人主憂辱國家危殆此理之必然而非一人之私言也故孔子論為邦則曰放鄭聲逺佞人子夏論舜之徳則曰舉臯陶不仁者逺論湯之徳則曰舉伊尹不仁者逺諸葛亮戒其君則曰親賢臣逺小人此前漢所以興隆也親小人逺賢臣此後漢所以傾頽也凡典冊所載如此之𩔖不可勝紀至於周易所論尤為詳宻皆以君子在内小人在外為天地之常理小人在内君子在外為隂陽之逆節故一陽在下其卦為復二陽在下其卦為臨陽雖未盛而居中得地聖人知其有可進之道一隂在下其卦為姤二隂在下其卦為遯隂雖未壮而聖人知其有可畏之漸若夫居天地之正得隂陽之和者惟泰而已泰之為象三陽在内三隂在外君子既得其位可以有為小人奠居於外安而無怨故聖人名之曰泰泰之言安也言惟此可以久安也方泰之時若君子能保其位外安小人使無失其所則天下之安未有艾也惟恐君子得位因勢陵暴小人使之在外而不安則勢将必至反覆故泰之九三則曰無平不陂無徃不復竊惟聖人之戒深切詳盡所以誨人者至矣獨未聞以小人在外憂其不恱而引之於内以自遺患者也故臣前所上劄子亦以謂小人雖決不可任以腹心至於牧守四方奔走庶務各随所長無所偏廢寵禄恩賜彼此如一無迹可指如此而已若遂引而寘之於内是猶畏盜賊之欲得財而導之於寢室知虎豹之欲食肉而開之以坰牧天下無此理也且君子小人勢同氷炭同處必争一争之後小人必勝君子必敗何者小人貪利忍恥擊之難去君子潔身重義知道之不行必先引退故古語曰一薰一蕕十年尚猶有臭盖謂此矣昔先皇帝以聦明聖智之資疾頽靡之俗将以綱紀四方追迹三代今觀其設意本非漢唐之君所能髴髣也而一時臣佐不能将順聖徳造作諸法率皆民所不悦及二聖臨御因民所願取而更之上下忻􅇺當此之際先朝用事之臣皆布列於朝自知上逆天意下失民心徬徨踧踖若無所措朝廷雖不斥逐其勢亦自不能復留矣尚賴二聖慈仁不加譴責而宥之於外盖已厚矣今者政令已孚事勢大定而議者惑於浮說乃欲招而納之與之共事欲以此調停其黨臣謂此人若返豈肯徒然而已哉必将戕害正人漸復舊事以快私忿人臣被祻盖不足言而臣所惜者祖宗朝廷也盖自熈寕以來小人執柄二十年矣建立黨與布滿中外一旦失勢睎覬者多是以創造語言動揺貴近脅之以祻誘之以利何所不至臣雖不聞其言而槩可料矣聞者若又不加審察遽以為然豈不過甚矣哉臣聞管仲治齊奪伯氏駢邑三百飯疏食没齒無怨言諸葛亮治蜀廢廖立李嚴為民徙之邉逺久而不召及亮死二人皆垂泣思亮夫駢立嚴三人者皆齊蜀之貴臣也管葛之所以能戮其貴臣而使之無怨者非有他也賞罰必公舉措必當國人皆知其所與之非私而所奪之非怨故雖仇讐莫不歸心耳今日竊觀朝廷用捨施設之間其不合人心者尚不為少彼既中懐不恱則其不服固宜今乃直欲招而納之以平其隙臣未見其可也詩曰無競維人四方其訓之陛下誠以異同反覆為憂惟當久任才性忠良識慮明審之士但得四五人常在要地雖未及臯陶伊尹而不仁之人知自逺矣故臣願陛下斷自聖心不為流言所惑毋使小人一進後有噬臍之悔則天下幸甚天下幸甚臣既待罪執法若見用人之失理無不言言之不從理不徒止如此則異同之迹亦復著明不若陛下早發英斷使彼此泯然無迹可見之為善也臣受恩深重輒敢先事獻言罪合萬死取進止元祐四年四月起居舍人范祖禹辨邪正劄子曰臣聞邪必害正正必去邪自古以來未有邪正並立而可以為國者也雖堯舜在上未嘗無小人唯能使小人不勝君子所以治也雖桀紂在上未嘗無君子唯使君子不勝小人所以亂也在易内君子而外小人其卦為泰泰者通而治也内小人而外君子其卦為否否者閉而亂也天下治亂未有不由君子小人君子在位必無惡政小人在位必無善政聖人為天下唯能使小人外而不内在野不在位而已非能使天下皆無小人也陛下自初臨政以辨别君子小人為先登進忠良斥退邪惡以致今日之治所進所退天下之人皆以為然雖舜舉十六相去四凶不過如此也而比年以來大臣以兼容小人為寛好惡不明邪正不分所引進者不盡得人夫今日之省寺他日之侍從也今日之侍從他日之輔弼也宰相豈能使之終身不進乎周公作立政以戒成王自準人綴衣虎賁趣馬小尹左右􅂝僕藝人表臣百司皆勿以憸人其惟吉士夫憸人在上位則害政事在下位則壊風俗大則傾覆邦國小則戕敗善𩔖朝廷之内何官可不擇人也邪人得志則正人不安正人不安則國無善政宰相以進賢退不肖為職而邪正不分豈不負國書曰惟說式克欽承旁招俊乂列于庶位此相之事也臣伏望陛下戒飭大臣各以公心求賢多引鯁正之人以重朝廷無使小人得在下位為他日之患以副陛下至誠求治之意取進止五年吏部侍郎兼侍讀范百禄分别邪正條目上奏曰臣愚竊以為分别邪正自古所難惟察言觀行考其事實所謂正直之人或天資亮直或家世忠義或有志報國或自立名節所謂姦邪之人或逄迎上意或希合權貴或性識頗僻或冀望寵利凡此二端其情非一不可遍舉今輙䟽其條目於後導人主以質直使之虚中聽納則為公正導人主以諂諛使之諱過拒諫則為姦邪導人主以徳義則為公正導人主以功利則為姦邪導人主以尊宗廟敬祭祀則為公正導人主以簡宗廟略神祇則為姦邪導人主以親睦九族恵養耆老則為公正導人主以踈薄骨肉棄老遺年則為姦邪導人主以恭儉清淨奉循典法則為公正導人主以驕侈放肆不顧舊章則為姦邪導人主以稼穡艱難恵及鰥寡則為公正導人主以輕鄙農事不卹惸獨則為姦邪導人主以柔逺息兵則為公正導人主以用兵攻戰則為姦邪導人主以原情謹罰則為公正導人主以峻法立威則為姦邪導人主以安民利衆則為公正導人主以勞民動衆則為姦邪導人主以進君子用善良則為公正導人主以近小人用惡徳則為姦邪右謹具進呈伏望特留聖意推此事𩔖以觀人情則邪正可分而聦明無惑矣臣不勝惓惓犬馬之忠六年翰林學士梁燾論為政之要在辨邪正之實上奏曰臣聞人主之徳莫大於知人朝廷之政無先於急賢徳以聦明為髙而政以忠厚為本恭惟太皇太后陛下至公至正明而有斷皇帝陛下仁孝荘敬静淵流通閱天下之事日益多進天下之材日益廣講求祖宗治體日益熟察見中外人情日益詳然而聦明或有所遺而忠厚未至於成者臣竊疑之或者聖心未加意於執要乎今日為政之要在於辨邪正之實也唐李徳裕有言曰邪正相攻上惑主聽正人呼邪人固為邪矣邪人亦呼正人為邪人主何以辨之臣故曰在辨其實也所謂正之實者能推公心以愛君憂國為計不附下不罔上樂進善𩔖愛惜生靈臨大節而㤀其身事兩宫而一其志為陛下常求長久安寜之計近思自於左右宫庭之間逺慮至於夷夏海隅之際皆欲得其歡心康寜無事上下一意其為安静真切如此者是正人也此𩔖進則聦明開廣内外大安豈不為國家忠厚之福耶所謂邪之實者緩公急私復仇報怨外陽為忠直内隂懐姦曲其言似忠而其實欺罔也其氣似敢而其實凶險也自謂介特而其實朋黨也自謂純一而其實二三其徳也貪禄競進猜忍傾奪專以傷害善良為謀而又附托權要出死力為之鷹犬不憚不恥以肆其毒不恤國之憂危務伸其志不懼上之悔患務行其言其為傾揺多端如此者是邪人也此𩔖進則聦明眩惑内外大恐豈不為國家忠厚之患耶今聽其言而求其用心之微觀其行而考其處已之端其向背之異有無之殊雖未能盡䆒而亦可以槩見矣願陛下自信素知之心而守之以定深辨姦詐之說而斷之以不疑斥其邪人以安正人正人知所依歸恃以無恐得以奮忠竭節畢身圖報則朝廷之理不難致也臣不勝惓惓納忠之至貼黄臣向在言路得侍清光伏見陛下照物必盡其情偽而量有包容論政深逹其義理而語有次序雖古之英主不能過也臣等累曾奏聞以謂邪正不可並用陛下深以為是知邪正之必相攻也今並用矣臣等又謂邪人在外正人在内則可治陛下亦以為是知邪人在内則害政也今邪人在内矣臣等又謂使邪人少正人多則可治陛下亦以為是知邪人之多則交相朋比損正人之道也今邪人多矣以在内衆多之邪人與寡少之正人並用勢自不敵豈能久安而終無憂悔乎奈何與前日之聖意不同耶必有姦人移惑聖意也如不悟則姦邪乘隙數數進計終至於成其祻此聖明所宜早辨勿為清衷他日之憂悔也貼黄陛下自御政以來選用可信之臣以忠孝報陛下之恩者今在朝廷不過數人羣小怨嫌隂結為朋力謀排陥者不一日也其心欲盡去此數人則姦謀可行大姦有復來之望此數人者方以時事難守為憂孤立難安為懼若非陛下知其從來忘身忘家當怨去姦有愛君憂國之心力賜主張則豈能安全至於今日也在於今日之勢尤為難立仰賴聖造終始主張也此數人者亦未足深惜但恐小人復興攻擊轉多萬一如此則為太皇陛下即日之悔為皇帝陛下他日之憂此可為大懼也願聖明凝神深慮以杜其漸待其事起而後處則其勢必强横難制縱終能制之憂勞亦已深矣伏望聖慈每當進擬人材之際丁寧審問謹重開可使私邪漸少朋黨自衰朝廷日有安静之望聖政日有清明之益此道既行可以緩憂矣小人姦言最是難辨盖其巧美似忠害善似直狠愎似敢誣罔似公人主聽之一誤則徳業俱損若不早辨則終至憂患故聖人曰惡利口之覆邦家者自古人君以為戒聖明不可不察也哲宗時殿中侍御史吕陶奏乞罷言職事上奏曰臣甞觀古之聖君賢臣相與圖治能闢衆正之路杜羣枉之門功業隆而聲名白者其術無他在乎絶朋黨而已盖朋黨之患不止於忘國家之事以私己自營挾疑似之說以養交固寵而其患乃在乎中傷忠直爾忠者先傷則凡懐忠者不容直者先斥則凡任直者不免夫然後率天下之人為不忠不直而相與共欺其君者朋黨也故為天下國家者不患不能知治道而患在不能知朋黨不患不能知朋黨而患在不能去朋黨昔者劉向論朋黨數千言李徳裕從而推廣其說然二人者卒為朋黨所害使人主能知其弊則二人者豈有不能自明之理哉故曰患在不能知之也唐文宗聦明俊偉有志於治嘗嘆曰去河北賊易去二李之黨難始失其制終成其亂雖欲痛治勢所未可故曰患在不能去之也盖人主所恃以治天下服萬民者公議也朋黨作則公議亡人心無所賴上下相徇毁譽亂真人主雖獨公其心於上天下誰與同其是非憂樂哉臣視徃事之變嗟念久矣起自踈逺無左右之助陛下擢於衆人之中付以言責之任感慨自誓恨無死所以報萬一然臣嘗謂諫官御史當尊朝廷肅臣下謹名分正綱紀逺比周然後為稱職故遇事必言不暇恤已牴牾同列亦既多矣違戾權貴亦已甚矣頃因程頥不嚴君臣之分欲就別殿說書臣以謂禮貴防微事宜戒漸名分一僭實生厲階乃獻封章論其不可奏削方上而陛下已悟其失有㫖改正則是頥之妄請不待臣言而陛下已辨也臣於頥素無嫌怨所論奏者乃職事爾非欲沮頥以伸已也同舍縁此反目相視不啻仇敵隂懐眦睚伺隙求報未幾張舜民罷職臺諫紛然共議營救亦欲率臣同入文字臣既思慮短闇始欲救之遂諾長貳以謂可言既而再思理有不可其後全臺具䟽力來强臣臣乃詳論舜民之言不可行舜民之罷不當救面却其請不敢雷同及至召赴三省宣諭其人各以為恥懐怨愈深意欲使臣不可獨免遂形惡奏上凂聖聦仰賴陛下睿明天縱照見邪隠社稷神靈弗祐非道斯人黨與不攻自破孤臣獲全復進諫列此天地之造也今韓維之上客程頥之死黨猶指舜民之事以攻臣是朋黨之勢復作而朝廷可欺乃天下之深憂也臣安可忍不辨而去哉所以辨者小則欲明一身之枉大則欲救天下之害也願陛下垂聽而察焉大凡臺諫供職之始當有章䟽所言之事必以逺者大者為先以近者小者為後此其體也今政令之得失生民之利害必有大於舜民之事者而不先言之乃汲汲言臣者意非他也其一則賈易為程頥報怨也其一則杜純藉此以恱韓維也韓縝誤神宗之政事韓宗師忝祕閣之除命韓宗儒醜穢之迹郭茂恂􅂍貪之罪臣累甞彈劾則維之憾臣亦深也彼杜純者與韓氏為婚姻維既判北京乞差純為本路運判朝廷起純於停廢之中而遣之在河北未數月召為大理少卿荷徳於韓豈肯不報其人天資刻深持法苛峻每斷疑獄主議維重以求合韓維之意維多從其說於是表裏相成與范百禄異論維因此益喜之忽有侍御史之除命下之初不協公議臣是時深欲論奏適會傅堯俞等事未辨明恐不知臣者謂臣又起争端遂隠忍而罷則純之言臣以恱韓維迹状亦明矣至于賈易為程頥之黨則士大夫無不知之今二人者不知何詞以罪臣也謂臣已甞出言欲救舜民既而不救有反覆之罪乎是不詳臣深思而欲臣苟合也昔季文子三思而後行孔子聞之曰再斯可矣盖中人之性燭理不能盡明況於事變必再三思慮則庶幾無悔雖聖人亦許之夫以孔子之聖許季文子之再思而臺諫不容臣之深慮亦已過矣謂臣見同官罷職不出力以救之為薄於風義乎則事固有輕重理固有取捨不可執一而言也臣雖不救同官薄於風義其過小也實知不當救而苟為辭說附助黨與以救之則欺於朝廷其罪大也臣寜有小過而不敢為大罪寜致同列之深怨而不誤國家之大事臣何愧也臣之罪止於此而言者源源未絶必欲臣廢逐而後已臣深痛朋黨弊至於斯也夫朋黨之人寄佞於忠托姦於直濟之以智成之以敢不可不察也昔劉崇魯哭李磎白麻者為諂崔昭緯也劉栖楚搆李紳之寃者為附李逄吉也豈宜聖世復啓此風小分曹𩔖大成黨錮漸不可長也臣伏聞神宗皇帝甞戒諫官曰不得潜為朋比隂有中傷祖宗訓戒著在史冊安可㤀哉恭惟皇帝陛下堯仁舜孝規天模地答揚祖考之光訓越對上帝之景命伏惟太皇太后陛下聖哲仁慈超出千古四海治理萬機得失神遇而心悟其於邪正了無遺察臣雖以螻蟻之命立於虎豹之羣憑賴天地之力未賜斧鉞之誅以安其餘生而不憂也雖然臣猶喋喋不能已者盖衆口可以鑠金積毁可以消骨曾參殺人入市有虎言者三至未免置疑跬􅇍一差遂投朋黨之陥穽此臣所以深憂也夫竭力事君有死無貳死得其義又何憾焉臣之區區惟恐不得死於陛下之斧鉞而将死於朋黨之陥穽則臣猶有憾也伏望陛下哀憐鑒照罷臣言職免使紛紜煩惑天聽臣不勝幸甚陶又乞罷京西路轉運副使除一小郡上奏曰臣近拜䟽具陳本末乞罷言職免使紛紜之論煩惑天聽孤危之誠必䝉聖察繼聞除臣外路轉運副使雖陛下知臣無他哀憐全庇未遂誅戮猶欲付之一道養以厚禄天地父母恩深徳厚其幸極矣然臣尚敢冒鈇鉞之威傾布腹心求免寄任者盖為陛下以臣為是公也黨人以臣為非私也受恩於陛下則生可保也得罪於黨人則死不可保也當此之時臣欲不言而去則負陛下㧞擢生成之恩不有鬼誅必有人祻臣欲言之而去則議者必謂臣因罷職補外憤怒狂躁敢肆譏譊則臣言與不言皆可罪也雖然臣今日在諌列則猶可言明日罷而去則不可復言徒抱恨而死目不􅉂矣臣寜取憤怒狂躁之責而不忍負陛下㧞擢生成之恩也盖為皇帝陛下承祖宗廟社之寄恭黙未言太皇太后保佑嗣聖務以徳治簾外之事有所不知每與講謀天下之政令者唯執政數人而已每欲詢求朝廷之闕失者唯臺諫數人而已每使談演經術開發聖性以充廣道徳仁義之實者唯講讀數人而已則居此職者安忍以回邪欺罔報陛下乎今臺官以阿附彈奏而執政應之於内講官以怨仇欲報而諫臣助之於外在臣一介固不足卹然此風一啓非朝廷之福也何則今日惡一小官而擊去明日憾一大吏而中傷推此而上何施不可雖陛下他日覺之亦恐根株已深而剗除不易也況臣今日已後不復面見清光無由更上章䟽故於此時敢效古人之尸諫詳悉條陳當今之事以補前䟽之畧願陛下知之者六然後退就斧鉞亦未為晚伏望陛下寛臣憤怒狂躁之罪一賜省覽幸甚幸甚臣聞本朝故事為御史者有兩府是舉主並須廻避盖置臺諫以檢察兩府之過若用其門生故吏慮致私徇此祖宗御下之機權至深至宻近歳以來此制隳紊只避親戚不避舉主昨除杜純為侍御史明知是韓維親家畧不廻避奮然用之無復忌憚中外𫝊聞莫不駭嘆盖杜紘之子為韓維壻純與維情愛豈不相厚動息豈不相通維有過則純必不言維有怨則純必不報害政之端莫甚於此今純雖已罷去深恐他日兩府又用其親戚及門生故吏為臺諫表裏作事以誤朝廷臣今日不可不言而去此願陛下知之者一也純之本末如此而人不敢言者畏韓氏之勢也韓氏之勢誠可畏矣宗道為左司宗直為司封宗師為衞尉劉攽為中書舍人未甚過也陛下方以安静為治進退大臣務全恩禮臣亦未敢指此以詆韓維也至於近日則頗專恣以宗文為光禄丞又有待次而權軍噐丞者又有奪吏部之闕而為北京通判者乃其子與姪也孔宗翰為刑部侍郎杜紘為大理卿張元方為府界提㸃辛雍為太常博士馬玿為清河輦運宋彭年為司農少卿楊景謨知開封縣謝景温免成都得揚州郭茂恂貪􅂍放罪得晉州徐耘待闕差磨勘染院物帛皆其親也臣方欲極力言之而自遭枉奏勢未暇及今韓維雖已罷免臣恐他日宰執有如維之彊横臣今日亦不敢不言而去此願陛下知之者二也朝廷以太平無事尊賢重道起程頥於山林之下而任以勸講日侍天子之側而訪以道義則非禮勿動非義勿言可也今乃講讀之罷徃徃與内侍宻語非其體也向者皇帝陛下偶因發嗽未御講筵頥乃申請乞今後須得闗報亦駭中外之聽不知義也詳定學制踈謬無取禮部逐一駮正三省至今依違未決議者非之臣又風聞頥在汝州侵占民田數家起訟邢恕在彼兩平其事然未審其實有無果無之則是他人以惡語加之也果有之則殊非朝廷所以待頥之意也臣知此久矣未深信之而不言也至于今日則不可不言而去此願陛下知之者三也古者冢宰制國用於歳杪量入以為出周公制禮太宰以九式均節財用然則邦家經費乃執政所當留意也今聚斂之弊蠲除已盡而浮冗之費殊少裁節雖降詔委官裁減冗費而所減者唯将官公使一項歳可省十萬貫其他則皆細碎毫末爾臣恐他時所入不足以備所出未免過於取民宜詔三省與戸部裁定國費革僥倖慎姑息上以富國下以厚民此願陛下知之者四也國家宗社所以延長萬世徳澤及人淪浹骨髄者盖懲秦漢以來至于五代之弊無族誅有貸法故也天聖中詔天下刑名疑慮情理可憫者皆許上請例䝉寛貸州郡縱有不應奏之罪則與免駮勘自昔至今由死得生者不知幾萬人矣近歳刪去此條於是天下之獄在可疑不可疑可憫不可憫之間者皆畏駮勘更不奏請率皆文致其罪處之死地臣恐刑獄益宻而濫死者衆則與免駮勘之條不可不復此願陛下知之者五也夫君子小人之道各有消長觀大勢何如則治亂可知矣君子並進則治小人彚征則亂世主所以防㣲杜漸而慎其用捨也今朝廷選㧞材噐澄清流品勤亦至矣而間有小人雜於其中不可不慮也王安禮者有吏材曉民事委以藩郡乃其所長然其人操行汙濁心膽麄豪神宗亦甞稱為惡人既差知成都必過闕下不宜留在朝廷況許将今冬成資宜令速赴新任盧秉者昔在兩浙提刑創興鹽法虐害東南至今瘡痍未復在渭州處置邉事惟求合李憲之意曲奉於憲有如尊親憲甞薦之秉相次服除決不可用宜置之散地苖時中李公南路昌衡軰皆刻薄之資見於已試而又任之以經畧發運轉運使之職必無以副朝廷徳意而恵養元元矣此願陛下知之者六也凡此六者陛下既已知之願以聖謀英斷收攬威權運於掌上使大臣小吏不敢為欺天罔日之事則宗社幸甚生民幸甚臣雖朝去闕廷暮死溝瀆亦無憾矣臣既與當塗之人多有仇怨今轉漕之職必難安處未免煩言重凂天聽伏乞除臣逺小一郡俾安其分元祐元年左司諫朱光庭乞以善利二者别邪正之臣上奏曰臣聞自古治天下之先務唯别邪正之臣爾正臣進則天下入於泰邪臣進則天下入於否然則何道而别之在善與利之間也正臣一意在善務引君以當道故盡忠盡公未甞不敬邪臣一意在利苟患失之故為佞為欺無所不至恭惟陛下天縱至聖明目逹聦灼見正臣之在善日寘諸朝審知邪臣之在利逺之於外臣願陛下堅持此志每用人之際以善與利二者之間常加明察使正臣日進而邪臣永退則天下何患乎不泰也同知樞宻院事范純仁論不宜分辨黨人有傷仁化状曰臣昨日簾前吕大防奏蔡確黨人甚盛欲陛下留意分别臣奏以為朋黨難辨却恐誤及善人大防以臣言為不然以謂正人必去姦邪朝廷豈有含糊不問臣遂言此事正宜詳審不可容易大防亦取臣言乃云須當審細臣遂引王安石好同惡異之患再三奏陳然尚抱區區之誠未能少開宸聽退而憂惕不能自安然須至重複陳論以竭愚見庶裨聖政少答大恩竊以朋黨之起盖因趣向異同同我者謂之正人異我者疑為邪黨既惡其異我則逆耳之言難至既喜其同我則迎合之佞日親以至真偽莫知賢愚倒置國家之患何莫由斯至如王安石自負學術即非全無知識止因喜同惡異遂至黑白不分引吕恵卿為大儒黜司馬光為異黨至今風俗猶以觀望為能後來柄臣固合永為商鑒恭惟仁宗皇帝政教施設實為帝王之師從諫審刑任賢容衆正與陛下今日之政相同慶厯中先臣仲淹與韓琦富弼同時大用歐陽修石介以夏竦姦邪因以疾其黨𩔖彼黨遂起大謗誣先臣與琦弼有不臣之心歐陽修尋亦坐罪石介幾至斵棺其時朋黨之論大起識者為之寒心上賴仁宗容覆兩黨之隙帖然自消此事至今以為美談陛下聞之必熟則是仁宗所行陛下可以取為成法今來蔡確之罪自有國家典刑不必推治黨人旁及枝葉臣聞孔子曰舉直措諸枉能使枉者直則是舉用正直而可化枉邪為善人矣又曰舜有天下舉臯陶不仁者逺則是用仁者而不仁者自當屏迹矣何煩分辨黨人或恐有傷仁化而況陛下聖度包容與天同徳至公克已今古無儔前來特降詔書盡釋臣寮徃咎不復䆒治恐累太和自此内外反側皆安上下人情浹洽盛徳之事誠宜久行臣心拳拳實切於斯仰惟皇慈深加采納天下幸甚純仁又繳奏歐陽修朋黨論䟽曰歐陽修朋黨論曰朋黨之說自古有之惟幸人君辨其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋唯君子則有之其故何哉小人所好者利禄也所貪者財貨也當其同利之時暫黨引以為朋者偽也及其見利而爭先或利盡而交踈則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工驩兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯夔稷契等二十二人並列于朝更相稱美更相推譲凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬唯億萬心周有臣三千唯一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黄巾賊起漢室大亂後方悔悟盡觧黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黄河曰此軰清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗然而皆亂亡其國更相賛美推譲而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不謂舜為二十二人朋黨所欺而稱舜為聦明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣又論曰嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉予甞至繁城讀魏受禪碑見漢之羣臣稱魏功徳而大書深刻自列其姓名以夸耀于世又讀梁實録見文蔚等所為如此未甞不為之流涕也夫以國與人而自夸耀及遂相之此非小人孰能為漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者故常寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其𩔖而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交㳺執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其𩔖也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其𩔖同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨見善者必相薦引薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日逺而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為唯空國而無君子然後小人得肆志於無所不為則漢魏唐梁之際是也故曰可奪國而與人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以䘮邦者其是之謂歟可不鑒哉可不戒哉臣聞舉直措諸枉則民服故陛下臨御之初舉用二三正人而天下恱服盖有㤗卦㧞茅連茹彚征之象所謂上下交而其志同則陛下得以裁成天地之化而太平可致也近日頗有匪人搆造謗言毁黷良善始以疑似之事玷汙一二忠臣漸興朋黨之名将以盡逐善𩔖若陛下辨之不早必致邪正難分眩陛下知人之明失陛下求治之意浸成遯卦否卦之象則是小人道長亦恐聖功難成臣伏惟陛下深居九重博采羣議惟以至公臨御天下故進退百辟悉用臺官諫官之言然臺諫之所風聞未必皆是善人之好惡凡所彈奏亦在深詳臣又聞孔子曰衆惡之必察焉衆好之必察焉又曰鄉人皆好之何如曰未可也鄉人皆惡之何如曰未可也不如鄉人之善者好之其不善者惡之大抵善人少而不善人多則是君子不免為小人所惡故雖衆而必察若專取善人之好惡則不善人搆造之言易為明辨若不追監前言無由防其微漸臣竊見本朝歐陽修作五代史於六臣傳後論及朋黨之事輙敢備録上進伏望萬幾之暇略賜觀覽庶幾仰裨四聦之萬一也臣不勝區區激切之至帝甞問朋黨之弊御史中丞胡宗愈對曰君子指小人為姦則小人指君子為黨君子盖義之與比者陛下能擇中立之士而用之則黨祻熄矣明日具君子無黨論以進陳次升奏對曰臣伏覩周紳李彦倫巴宜張康國蔡蹈吳伯舉李植朱甽近因賜對除朱甽知泗州吳伯舉太常博士餘皆提舉常平司官者竊以爵所以旌有徳禄所以待有功非徳而爵無功而禄何以為天下之勸故人主以爵禄為操柄而砥礪天下之才官必得其人人必稱其職恭惟神宗皇帝厲精庶政允釐百工大臣每薦人材必召對能者随其才而進之否則令歸本任盖所以明黜陟之公也風聞前任官登對朱甽㝡不稱㫖故與知州差遣且自通判升為郡守已是進職若得常調一郡亦僥倖今乃除知泗州況泗州地望非他郡之比經是任外則為監司内則省寺監官如此則是與稱㫖者盖無異矣以甽之守泗雖不足論然召對所以旌別人材今例有選任是有召對之名而無升黜之實朝廷用人如此良可惜哉除授恐累國體伏望陛下稽攷先朝政事召對臣寮必擇其能者而進之其不稱㫖者令歸本任庻使賢否有别多士知勸其朱甽若先有指揮與知州差遣即改差常調一郡少示黜陟庻允公議取進止校書郎李昭玘進䇿曰知人者自信知於人者信人道可以治天下則與之謀天下道可以治一國則與之謀一國噐大者不拘之以苛細噐小者不責之以闊逺能者官其能藝者食其藝使辨士不得以辭勝才士不得以文亂勇士不得以氣激智士不得以機合貪士不得以利摩有徳者居上無徳者居下有功者進無功者退量材而授官按法而麗罪如師曠之不可欺以聲離婁之不可欺以色言之所舉意已得之貎之所見情已察之姦良憸正毁譽是非無以逃於我而陟降沮止廢置予奪亦無不自乎我此知人自信者也内無主外無學好惡無别取捨無擇故人觀其倚而潜以應之倚於名髙則諛說之徒至倚於厚利則聚斂之徒至倚於法術則刻核之徒至倚於計數則譎變之徒至美言獻於前重禄餽於後使夫喜功易進挾捭闔之謀試揣摩之術排擊於必争之途譁噪於並趨之地前之既入後則却之昔之既獲今則攘之名噐可以餌取威福可以意移此知於人而信人者也知人之君使人畏上之知而不敢為也故勢重而威專知於人之君使人唯恐不為以自侈故勢輕而威奪凡此兩者治亂之所繫而人君之所察者也孔子曰不知言無以知人然則知人之本未始不先乎知言也夫天下無事則欲言者息天下有事則不能言者出故以言擇人以人責事雖堯舜不能廢也言乎經大事興大利舉偏而補弊革舊而造新此必有趨變之功也言乎明憲度謹禁令犯義者黜犯刑者誅此必有制法之功也言乎節財用阜通貨賄使公私無不足之患者此必有富國之功也言乎修車馬偹噐械選将礪士使敵人不敢加兵此必有强國之功也言乎稼穡有政農功有時竭人力盡地利此必有養人之功也言乎明道徳逹禮樂人無賢不肖才無智愚學則成不學則棄此必有教人之功也然許人以可用則不可用者無以知億人以不能則能者無以見故因而任之使自事之因而與之使自舉之功當其事事當其言者賞功不當其事事不當其言者誅大臣不能為朋黨之助左右不能為先容之助士大夫不能為㳺談之助賢不肖是非之迹循其後逐之而已窮矣故好誣者不能詭言言則不實之罪随之好匿者不能隠言言則不忠之罪随之好大者不能奓言言則惑衆之罪随之好毁者不能譛言言則蔽賢之罪随之度其誠可言則言誠不可言則止知其言之不可罔而名實之不可揜也昔者齊威王命大夫治即墨而毁言日至使人視即墨則田野闢人民給命大夫治阿而譽言日聞使人視阿則田野不闢人民貧苦故召即墨大夫封之萬家召阿大夫烹之堂下於是齊國震懼人人不敢飾非而務盡其誠雖然此知言者也持此以責人之功未足以盡人之才盡人之才惟聖能知之人之才於此於彼各有所能也不害其所能而用其所不能則所能者恱於見知而所不能者終不敢以非其才而自處唐太宗甞謂髙士㢘臨難不易節而所乏者骨鯁唐儉出言可喜而未一言及國家事楊師道自能無過而懦不更事長孫無忌應對機敏而攻戰非所善岑文本敦厚而謀長經逺劉洎堅正而其言有益馬周敏銳褚遂良竭誠依人太宗知此數人之才而用之數人者亦莫不盡心以應上使夫聖不足以通人知不足以周物疇克之哉故知人者始於試人之言而終於盡人之才凡此者出於聖王獨見非下之所能為也左諫議大夫劉安世論朋黨之弊状曰臣甞於史冊之間考前世已然之事盖有真朋黨而不能去亦有非朋黨而不能辨者此實治亂消長之機不可不察也東漢之衰姦人先以黨事誅戮禁錮天下之賢者而在朝皆小人也故漢以之亡此所謂非朋黨而不能辨者也唐之李世牛李之徒迭進相毁巧相傾覆而善人君子廢斥無餘其所用者皆庸鄙不肖也故唐以之亂此所謂真朋黨而不能去者也盖君子之進則至公引𩔖以報國小人之進則徇私立黨以固寵雖世主深疾臣下之背公成朋而小人窺見間隙鄉原上意閉匿其私陽若可信反指君子引𩔖之公以為有黨黨之與𩔖相似而不同是非虚實間不容髮辨之不早遂生亂階此正人所以常被誣而小人所以常得志也祖宗逺鑒歴代之弊慎擇耳目之官所以開衆正之路塞羣枉之門而日近士論稍有朋黨之迹深恐姦人乘主上冲幼陛下委任大臣之際隂引邪慝漸斥端士孤朝廷之勢而蔽人主之聦明盜刑賞之柄以快羣小之私意此弊浸長非國家之福也臣願陛下深覽前史之戒慎終如始奨借臺諫以養多士敢言之氣庻能破姦邪之謀而消未形之變天下幸甚紹聖二年監察御史常安民論大臣唱紹述之說上奏曰臣竊惟今大臣為紹述之說者其實皆借此名以報復私恩一時朋附之流從而和之遂至已甚張商英元祐時上吕公著詩求進其言諛佞無恥士大夫皆傳笑之及近為諫官則上䟽乞毁司馬光吕公著神道碑周秩在元祐間為太常博士親定司馬光諡為文正及近為正言則上䟽論司馬光吕公著乞斷棺鞭尸陛下察此軰之言果出公論乎朝廷凡事不用元祐例至王珪家䕃孫五人皆珪身後所生乃引元祐例許奏薦近日講復官制職事官不帶職寄禄官不帶左右至於權尚書侍郎獨以林希李琮之故不復改易如此等事謂之公心可乎故凡勸陛下紹述先帝者皆欲託先帝以行姦謀謂他事難以惑陛下若聞先帝則易為感動故欲快恩讐陷良善者須假此以移陛下之意不可不察宣仁聖烈皇后甚得人心前日陛下駕幸秦楚國夫人第澆奠及輟朝并命勅𦵏諸費從官給人人無不歡呼髙遵恵為侍郎士論皆以為當聞吳厚向得罪出於宣仁之意近聞待制舍人再激而大臣尚欲再下願陛下主張此事以順人心今權臣恣横朋黨滿朝未甞一言及之唯知論元祐舊事力攻已去臣僚臣荷陛下奨㧞不敢負恩摧枮拉朽之事臣實恥為之舉朝嫉臣誣陥非一臣賦性愚直恐終不能勝朋黨之論願乞外任以避之畢仲㳺上言曰學問之未成可以習也善行之未見可以積也而知人之明則不可强得乎天子為諸侯得乎諸侯為大夫得乎丘民而返為天子則民不可以不安欲安民而無其人則将誰使安之故二者帝堯之所難而天下之務㝡先者也孔子曰視其所以觀其所由察其所安人焉廋哉又曰吾於人也誰毁誰譽如有所譽者其有所試矣盖孔子不敢自謂之知人必視其所以觀其所由察其所安而又因其譽而試之然後有所定而近世之知人詳者求其簿書刀筆繩墨之間而勇者以目皮視天下士而遂言有以知之殆非聖人所以知人之方也今自公至士自正至旅其等級之相去固繁而數千萬人必人人而察事事而量待其適可而後用則雖帝堯孔子有所不能而況後世之人乎傳曰治衆如治寡度數是也制衆如制寡刑名是也今取人之麤者既有學校科舉公卿大夫保任之法而精者孔子所謂視其所以觀其所由察其所安與因所譽而試之之理在天子由此以知其一相一相由此以知其部刺史監司部刺史監司由此以知郡守縣令郡守縣令由此以知其下則自公至于士自正至于旅雖未易知然亦有可以知之之理盖視其所以乃人所用之心觀其所由乃人所從之道而察其所安盖能有所不動既得其所用之心又見其所從之道而利害得䘮之間且能安而不動則人之賢愚思過半矣然後随其所譽而試之則雖聦明智慮非聖人之比而其所以知之者乃聖人之方使行者不能盡而得其略猶與求於簿書刀筆繩墨之間而以目皮取天下士者為有間矣故古者進賢受上賞蔽賢䝉􅂋戮而諸侯貢士一適之謂好徳再適之謂賢三適之謂有功既有學校科舉公卿大夫保任之法以治其麄又有孔子所以知之以治其精而為之賞勸以勵之則雖貎厚情深而不能逃吾之法令也既不思孔子所以知人之方又舉賢而不肖則無罰舉賢而賢則無賞而唯用學校科舉保任之麄法嘆人之難知盖未可歎也元符三年陸佃蔡州召還上殿劄子曰臣竊惟聖君踐阼要在正始正始之道當自朝廷朝廷一正四方逺近莫敢不一於正記曰朝廷曰退燕逰曰歸師征曰罷蓋用師役未有不罷者也燕逰有出而無歸則縱朝廷有進而無退則爭又曰朝廷之美濟濟翔翔所謂濟濟舜命九官是也所謂翔翔翔而後集是也朝廷之上公卿大夫如此可謂美矣竊見近時學士大夫徃徃競進務相傾奪以善求事為精神以能訐人為風采以忠厚為重遲以静退為卑弱相師成風莫之能止正而救之實在今日恭惟陛下憲天聦明深燭民隠修明百度首以人材為急而臣逮侍神考元祐補外迨今一紀陛下即政之初首加識㧞此臣夙夜未知所以論報之方區區愚忠不能自已伏望陛下慎初謹始正自朝廷眷忠厚之臣擢静退之士使躁輕者革心浮薄者易慮建用皇極布宣中和以熈百志以凝庻績以追唐虞三代之治臣愚不勝願幸歴代名臣奏議卷一百五十五
