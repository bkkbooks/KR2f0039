body:
  text: 歴代名臣奏議卷一百二十六明楊士奇等撰禮樂祭禮宋太祖時左拾遺知制誥髙錫上封議武成王廟配享七十二賢内王僧辨以不令終恐非全徳尋詔吏部尚書張昭工部尚書竇儀與錫重銓定功業終始無瑕者方得預焉秘書郎直史舘梁周翰上言曰臣聞天地以來覆載之内聖賢交騖古今同流校其顛末鮮克具美周公聖人也佐武王定天下輔成王致治平盛徳大勲蟠天極地外則淮夷搆難内則管蔡流言㚄尾跋胡垂至顛頓偃禾仆木僅得辨明此可謂之盡美哉臣以為非也孔子聖人也刪詩書定禮樂祖述堯舜憲章文武卒以棲遲去魯奔走厄陳雖試用於定哀曽不容於季孟又甞履盜跖之虎尾聞南子之佩聲逺辱慎名未見其可此又可謂其盡善者哉臣以為非也自餘區區後賢瑣瑣立事比於二聖曽何足云而欲責其磨湼不渝始卒如一者臣竊以為難其人矣昉自唐室崇祀太公原其用意盖以天下雖大不可去兵域中有争未能無戰資其佑民之道立乎為武之宗覬張國威遂進王號貞元之際祀典益修因以歴代武臣陪饗廟貌如文宣釋奠之制有弟子列侍之儀事雖不經義足垂勸況於曩日不乏通賢疑難討論亦云折中今若求其考𩔖别立否臧以羔袖之小疵忘狐裘之大善恐其所選僅有可存只如樂毅亷頗皆奔亡而為虜韓信彭越悉葅醢而受誅白起則錫劔杜郵伍員則浮尸江澨左車亦僨軍之將孫臏實刑餘之人穰苴則僨卒齊庭吳起則非命楚國周勃稱重有置甲尚方之疑陳平善謀䝉受金諸将之謗亞夫則死於獄吏鄧艾則追於檻車李廣後期而自剄竇嬰樹黨而䘮身鄧禹敗於回溪終身無董戎之寄馬援死於蠻徼還尸闕遣奠之儀其餘諸葛亮之儔事偏方之主王景畧之軰佐閏位之君關公則為仇國所禽張飛則遭帳下所害凡此名将悉皆人雄茍欲指瑕誰當無累或從澄汰盡可棄捐況其功業穹隆名稱烜赫樵夫牧稚咸所聞知列将通侯竊所思慕若一旦除去神位擯出祠庭吹毛求異代之疵投袂忿古人之惡必使時情頓惑竊議交興景行髙山更奚瞻於往躅英魂烈魄将有恨於明時伏況陛下方厲軍威将遏亂畧講求兵法締構武祠盖所以勸激戎臣資假隂助忽使長廊虛邈僅有可圖之形中殿前空不見配食之坐似非允當臣竊惑焉深惟事貴得中用資體要若今之可以議古恐来者亦能非今願納臣微忠特追明敕乞下此䟽廷議其長建隆初有司言周木徳木生火宜以火徳王色尚赤遂以戌日為臘三年戊戌臘有司畫日以七日辛卯和峴奏議曰按蜡始於伊耆後歴三代及漢其名雖改而其實一也漢火行用戌臘臘者接也新故相接畋獵禽獸以享百神報終成之功也王者因之上享宗廟旁及五祀展其孝心盡物示恭也魏晉以降悉沿其制唐乗土徳貞觀之際以前寅日蜡百神卯日祭社宫辰日享宗廟開元定禮三祭皆於臘辰以應土徳今以戌日為臘而以前七日辛卯行蜡禮恐未為宜況宗廟社稷並遵臘享獨蜡不以臘請下禮官議議如峴言今後蜡百神祀社稷享宗廟皆用戌臘一日太祖時司寒之祭常以四月命官率太祝用牲幣及黑牡秬黍祭𤣥㝠之神乃開氷以薦太廟建隆二年置藏氷署而修其祀焉祕書監李至上言曰案詩豳七月曰四之日獻羔祭韭盖謂周以十一月為正其四月即今之二月也春秋傳曰日在北陸而藏氷謂夏十二月日在危也獻羔而啓之謂二月春分獻羔祭韭始開氷室也火出而畢賦火星昏見謂四月中也又按月令天子獻羔開氷先薦寢廟詳其開氷之祭當在春分乃有司之失也帝覽奏曰今四月韭可苫屋矣何謂薦新遂正其禮太宗太平興國八年河決滑州遣樞宻直學士張齊賢詣白馬津以一太牢沈祠加璧自是凡河決溢修塞皆致祭祕書監李至上言曰按五郊迎氣之日皆祭逐方嶽鎮海瀆自兵亂後有不在封域者遂闕其祭國家克復四方間雖奉詔特祭未著常祀望遵舊禮就迎氣日各祭於所𨽻之州長吏以次為獻官從之真宗景徳四年判太常禮院孫奭上言曰來年晝日正月一日享先農九日上辛祈榖祀上帝春秋傳曰啓蟄而郊郊而後耕月令曰天子以元日祈榖于上帝乃擇元辰親載耒耜躬耕帝藉先儒皆云元日謂上辛郊天也元辰謂郊後吉亥享先農而耕藉也六典禮閣新儀並云上辛祀昊天次云吉亥享先農望改用上辛後亥日用符禮文仁宗天聖三年同知禮院陳詁上言曰蜡祭一百九十二位祝文内載一百八十二位唯五方田畯五方郵表畷一十位不載祝文又郊祀録正辭録司天監神位圖皆以虎為於菟乃避唐諱請仍為虎五方祝文衆族之下増入田畯郵表畷云記曰八蜡以祀四方年不順成八蜡不通歴代蜡祭獨在南郊為一壇惟周隋四郊之兆乃合禮意又禮記月令以蜡與息民為二祭故隋唐息民祭在蜡之後日請蜡祭四郊各為一壇以祀其方之神有不順成之方則不修報其息民祭仍在蜡祭之後先是太常寺言四郊蜡祭宜依百神制度築壇其東西有不順成之方即祭日月其神農以下更不設祭又舊儀神農后稷並設位壇下當移壇上按禮記正義伊耆即神農也今壇下更設伊耆氏位合除去之政和新儀臘前一日蜡百神四方蜡壇廣四丈髙八尺四出陛兩壝毎壝二十五步東方設大明位西方設夜明位以神農氏后稷氏配配位以北為上南北壇設神農位以后稷配五星二十八宿十二辰五嶽五鎮四海四瀆及五方山林川澤邱陵墳衍原隰井泉田畯倉龍朱鳥麒麟白虎𤣥武五水庸五坊五虎五鱗五羽五介五毛五郵表畷五臝五猫五昆蟲從祀各依其方設位中方鎮星后土田畯設於南方蜡壇酉階之西中方嶽鎮以下設於南方蜡壇午階之西伊耆設於北方蜡壇卯階之南其位次於辰星康定元年集賢校理同判吏部南曹胡宿上奏曰臣伏以火正閼伯之祠南京國朝受命之地自祖宗以来未領祠官竊為朝廷惜之按春秋傳髙辛氏之二子長曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商邱以主辰故辰為商星遷實沈於大夏以主參故參為晉星又襄公九年傳陶唐氏之火正曰閼伯居商邱祀大火而火紀時焉且五行之官祀為貴神毎歳五時祀之謂之五祀火正又配食於火星者以其於人有功祭火星又祭之漢書曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星鳥首正南方則用火季秋星入則止火以順天時以救民疾云爾大辰房心尾也大火謂之大辰周官保章氏之職以星土辨九州之地所封之域皆有分星鄭氏引十二次之分則云大火宋也左氏傳亦曰宋大辰之墟漢書地理志宋房心之分野周分㣲子於宋今睢陽是也按圖經云商邱在宋城縣西南二里髙八十丈周廻二百步今閼伯之祠直當其上盖房心天帝之明堂太祖皇帝於此受命奄宅天下以宋建號以火紀徳都梁宋之郊當房心之次則大火之精閼伯之靈擁祐福䕃國家潜受其施者深矣而傳序四聖享祀弗及祥符中交脩大禮拱揖諸神雖偏方逺國山林之祀不出經據偶在祀典者尚秩王公之爵増牲牢之品而大火閼伯國家䝉福之地又陶唐氏之火正宋興八十年祠官不以聞此有司之闕也又按左氏國語董因逆晉文公於河公問曰吾其濟乎對曰君之出也歲在大火閼伯之星也是為大辰辰以成善又曰嗣續其祖如糓之滋韋昭以為辰為農祥周先后稷之所經緯以成善道子孫繼續其祖如糓之蕃滋推此而言則東方七宿房心通有農祥之稱若因舊立古祠除潔壇地臨遣近臣對祭閼伯不惟講脩火正亦足以祈求年豐以陶唐之舊祀祖宗之闕典一旦陛下恢而復之為萬世法詒厥子孫永錫純嘏不勝區區帝以宿䟽下太常禮部議於是太常禮部復奏曰伏以閼伯為堯火正實居商邱主祀大火能宿其官後世因之祀為貴神配火侑食亦如周棄配稷后土配社之比下歴千載遂為種祠祖宗以来郊祀上帝而大辰已在從祀閼伯之廟毎因赦文及春秋委京司長吏恭致沃奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火徳宜興王之地商邱之舊作為壇祧秩祀大火以閼伯配之毎建辰建戌出納之月内降祝版詔留司長吏奉祭行事籩豆牲幣得視中祠雖非舊章特示新禮其閼伯舊廟并壇祧之制請如宿所奏官為修崇之其言比年國家數有火灾宜遣使告謝然消復變異專在君徳恐未可施行宿任兩浙轉運使知制誥論祀九宫貴神奏曰臣竊見前書載九宫貴神實司水旱雖不經見而當時尊祀次於昊天上帝唐明皇肅宗嘗親祠事之雖大和降為中祀至於會昌復重其禮仍以宰相徃脩祠事國家祗若舊典列於常祀至和中因脩時祭光禄小史慢祀雷雨震死者二人威靈所傳耳目未逺今首夏垂盡而時雨尚愆有惻上仁徧走羣望昔宣王遭旱雲漢之詩曰上下奠瘞靡神不宗況司水旱之神又可闕諸愚以為宜因此時特遣近臣併祀九宫貴神以䖍齋禱宿又論太湖登在祀典状曰臣竊見吳中太湖即禹貢震澤也廣三萬六千頃其水利溉蘇湖常三州之地而蘇湖為多去二郡亦近湖中大小山七十有二洞庭林屋福地皆在其中商帆賈楫日相上下二郡各有湖廟而常州無廟蘇州廟在洞庭湖州廟在大錢口方俗目為平水大王廟是也二郡小小叢祠皆祭而太湖獨不祭盖由祀典失載因循忽諸禮境内山川諸侯當祭國家無文咸秩靡祀不宗其太湖欲乞下蘇湖常三州登其祀典春秋差官致祭至和二年正月翰林學士歐陽修上奏曰臣伏見今月八日聖㫖踈決禁囚特行減降及軍士各有特支陛下聖慈本以興國寺奉安真宗皇帝御容有此㤙㫖而中外之議紛然不一皆為正月八日是温成皇后周年故有此特支踈決又見聖駕朝謁萬夀宫又云温成畫像在彼所以聖駕親臨自去年追冊温成皇后之後朝廷每於典禮過極優崇遂致議者動皆疑惑今又聞来日聖駕幸奉先寺酌獻宣祖皇帝外議喧然又云温成皇后祠廟在彼伏以陛下聖徳仁孝本為祖宗神御以時酌獻不可使中外議者謂陛下意在追念後宫寵愛託名以謁祖宗虧損聖徳其事不細臣欲乞明日幸奉先寺酌獻畢更不臨幸温成祠廟以解中外之疑以止議者之説臣職忝侍從無所裨補聞外人議論不敢不言不唯臣有愛君之心合具陳述陛下舉動為萬世法亦不可不謹嘉祐八年正月禮官吕公著上奏曰臣伏見故追尊温成皇后於城南立廟四時孟月祭奠以待制舍人攝事牲幣祼獻登歌設樂並同太廟之禮盖當時有司失於講求非有典據昔商宗遭變飭已思咎祖已訓以祀無豐於昵況以内寵列於秩祀非所以享天心奉祖宗之意也欲乞改温成廟為祠殿歲時只遣宫臣行事薦以常饌以明祀事有漸仁宗時判太常寺吕公綽上言曰古者天地宗廟日月五方百神之祀咸有尊罍五齊三酒分實其中加明水明酒以逹隂陽之氣今有司徒設尊罍而酌用一尊非禮神之意宜按周禮實齊酒取火於日取水於月因天地之潔氣又言祖宗配郊當正位今側鄉之非所以示尊嚴也宋祁論國忌䟽曰伏見列聖忌日沿唐之舊百官伏閤慰訖咸詣寺觀跪伏齊賛謂之行香仍置神位進奠蔬饌臣竊思之禮尤不經方外之言本以懴罪求福誘訓迷妄邱樊委巷不逹死生之變故於䘮𦵏亦或用之至於朝猷帝範非若匹夫下俚可行之也臣愚不敢逺敷國家積累之慶且自太祖而下豐功鉅徳家至户曉生為睿明殁為上神何福之求何罪之懴求於非福則是諂祭懴於無罪則是誣親沿事索理謬悠可判且其諡在金冊主在清廟毎春秋享祀前誓有司齋戒奉之灌濯潔之禮以相儀樂以節歩尚畏不蠲以為非馨今乃緇毳羽衣輕接光烈熟具粗餗以希迪常使在天有知其不能下而臨享也明矣願罷忌日百官行香及撤去所設神位必若國家難於驟改則每及忌日止令道釋二家自率其徒薰祓誦唄列為䟽奏間遣一使馳詣陵寢焚之以伸蒼黔謝生之報庶幾近於禮歟宋庠奏乞禁止祠壇側近塟埋状曰伏見國家大小祠壇在近郊者二十一所春秋晝日享獻不絶臣檢勒其處大祠有九宫貴神青帝白帝黄帝感生帝皇地祗朝日夕月蜡祭百神共九壇逺不二百歩或五十歩皆有古墳拱木及庶民藁𦵏焚骸之地熏蒿布濩氣臭聯接或盛夏行禮則執事者不勝其厭亂黍稷薰冐豆籩其為不虔固已太甚人尚知惡神焉肯歆謹案令式大祠壇三百歩不得𦵏埋太宗淳化中因大臣建言移築十祠壇以逺塋冢歳月既乆厲禁遂隳臣聞古者兆帝於郊是稱吉土宅神之隩爰本積髙因馮爽塏之宜以修圭潔之薦又且散齋七日致齋三日不預刑殺不臨凶弔然後䟽瀹諸慮祓去不祥故能裒對上靈開右多福寧有迫近宰樹宻邇鬼隣燃骴煬煙暴骨流穢欲使苾芳上逹肹蠁降臻其可得邪況今疫癘頻年蝗旱仍出災氣未究嘉祥弗興原其所来或在於此臣以為故冢既難遷斥則當改善地以建新壇焚骸可得呵止則宜廣壝歩而防䙝慢明著甲令以示方来據其髙嚴式表夤奉遵協禮令深便神人庠又乞於御苑空地内種植奉祠祭状曰伏見國家每歲大小祠祭黍稷取於太常果蔬出於司農乾茹責於光祿然三寺皆牒取市物入供祠饌但具名品無復馨嘉雖明徳上通不貴多物而工祝奉告固有愧辭夫孝子事親必求仁粟聖王饗帝實立神倉三代以来兹禮惟重取不告乏用乃有虔國朝因循未遑斯議故令官司怠沓祭典廢隳百靈薦甞一切須索習貫成瀆神無據焉臣竊見玉津瑞聖諸園舊有隙地異時主者墾為公田歲藉其収以備常用臣􅂅即於苑中擇上腴之地播五榖之種謹耘耔之法慎登穫之勤毎春種秋歛之日陛下順時乗輿親省徜徉畎畝因行勞賜一以奉國大事一以勸民力農榖成之後擇其上者奉大祠次者奉中小祠各以御廩付所由吏鬯劑粢品悉量而取之至於果蔬之細比須囿游之植外盡庶物内将至誠達其令芳以介福祿兹亦三代為藉千畆以事天地社稷山川先古以為醴酪粢盛之比也其與物物仰市煩䙝神祗者寧並日而言哉庠又上家廟䟽曰伏覩慶厯元年十一月郊祀赦書應文武官並許依舊式創立家廟盖所以恢孝治穆彛倫風勸海内恩化甚美而有司終不能推述先典明喻上仁因循顧望遂踰十載使王公薦享下同委巷衣冠昭穆雜用家人緣偷襲弊殊可嗟憫臣嘗因進對屢聞聖言謂諸臣專殖第産不立私廟寧朝廷勸戒有所未孚将風教頽陵終不可復睿心至意形于歎息臣毎誦天訓愧汗交浹日夜循省求諸臣未即建立者誠亦有由盖古今異儀封爵殊制因疑成憚遂格詔書禮官既不講求私家何緣擅立臣以謂未信而望誠者上難必責徒善而設教者下或有違若令官制巳頒禮典咸具尚安所習不禀其規雖官司劾之可矣誅之可矣凡在臣子孰敢不勉哉今幸遇皇帝陛下因大饗之報躬嚴配之禮事天尊祖孝冠百王聖化所覃海内知勸臣欲乞明敕有司奉行慶厯詔書下禮官博士及臺閣儒學之臣考案舊章同加詳定不拘小以妨大不泥古以非今因時制宜使稱情禮則可矣若欲必如三代有冢嫡世封之重山川國邑之常然後議之則墜典無可復之期而禮祀或幾乎息矣夫建宗祏序昭穆别貴賤之等所以為孝雖有過差何害於治殖産利營居室為子孫之業與民争利顧不以為耻逮夫立廟則曰不敢寧所謂敢於争利而不敢於為孝耶以爵服承襲之間小有違古因放而不復又所謂去小違而就大違耶此諸儒之惑亦以甚矣臣幸得待罪宰相以明教化美風俗為職不勝惓惓請因明詔書文議以時決若制下之日或在立廟之科􅂅買地一廛悉力經始上副聖人廣孝之美下極私門顯親之榮推美人倫非獨臣幸知太常禮院蘇頌上家廟議曰檢會慶厯赦書文武官並許依舊式創立家廟謹按周禮諸侯五廟曰考廟曰王考廟曰顯考廟是諸侯祭父祖及曽髙所以然者服盡四世始祖不祧通為五世也大夫三廟及曽祖也始封不祧通為四世而髙祖止於享嘗也士二廟及王考也皇考則為壇而祭之下士止於一廟其王考則無廟而祭之唐及本朝廟二品以上得祭四世三品以下皆祭三世六品以下無廟者皆祭於寢按開元禮及開寳通禮皆云六品以下若有廟者如五品儀無廟者祭於寢今赦恩既許依舊式即合依禮令之數又按古者一世一廟五世則有五廟矣今之廟制與古不同皆為一廟同堂異室則一品二品之廟並一堂四室三品四品五品之廟並一堂三室乃合禮制又禮記王制曰大夫士有田則祭無田則薦是有土者乃為廟祭也有田則有爵無土與爵則子孫無以繼承宗祀若然是有廟者止於其身子孫無爵祭乃廢也又禮曰父為大夫子為士𦵏以大夫祭以士今二品之家立廟者既死而子孫主祭如六品以下即祧二主祔一主又牲牢爼豆噐物頓異在於人情似未允愜若乃參合古今之制依約封爵之令官當立廟者請因遇恩封國公立廟一堂四室祭及髙祖量賜田若干頃尚書将軍及曽任二府或節度使者特封郡公立廟一堂三室祭及曽祖賜田若干頃給諫以上曽任學士者特封縣公廟亦一堂三室賜田若干頃其初封官未及二品者依三品未及三品者依五品其未有廟者即不得賜田毎田二頃許置客户若干人並免州縣科役其田除租税外地利悉入其家專以奉祭事不得他用死則子孫承襲並世降一等當襲封者須長嫡子特改一官外其餘恩數悉同常制其田子孫不得典賣有罪絶者還没官此亦稍近古法可以上副赦恩之意若以封爵難於遽行即請考按唐賢寢堂祠享儀不須牲牢爼豆止用燕噐祭常食而已知諫院包拯上䟽曰臣近者監祭九宫貴神竊見以常朝官充攝太尉行事況屬大祀深恐未便伏覩唐天寳年勅以九宫神實司水旱功佐上帝徳庇下民冀百榖歲登災害不作毎至四時令中書門下往攝祭者又准禮九宫次昊天上帝壇在太廟之上用牲牢璧幣𩔖天地神祗前代王者或親行享祀緣累年以来四方水旱相繼慮是有司供職不謹稍失精嚴欲乞向後四時祭享其攝太尉令兩制已上官所貴差重其禮以申崇奉之意知洪州夏竦請斷祅巫狀曰臣聞左道亂俗祅言惑衆在昔之法皆殺無赦盖以姦臣亂節狂賊亂規多假鬼神動揺耳目漢之張角晋之孫恩偶失防閑遂至屯聚國家宜有嚴刑以肅多方竊以當州東引七閩南控百粤編氓右鬼舊俗尚巫在漢欒巴已甞翦理爰從近歲傳習滋多假託禨祥愚弄黎庶勦絶性命規取貨財皆於所居塑畫魑魅陳列幡幟鳴擊鼓角設立神壇嬰孺襁褓已令寄育字曰壇㽞壇保之𩔖及其稍長則傳習祅法驅為童𨽻民之有病則門施符術禁絶往還斥逺至親屏去便物家人營藥則曰神不許服病者欲飯則云神未聽飱率令疫人死於飢渇洎至亡者服用又言餘祟所慿人不敢㽞規以自入若幸而獲免家之所資假神而言無求不可其間有孤子單族首面幼妻或絶户以求財或害夫而納婦浸淫既久習熟為常民被非辜了不為怪奉之愈謹信之益深從其言甚於典章畏其威重於官吏竒神異像圖繪歲増邪籙祅符傳寫日夥小則雞豚致祀斂以還家大則歌舞聚人食其餘胙婚𦵏出處動必求師刼盜闘争行須作水蠧耗衣食眩惑里閭設欲扇搖不難連結在於典憲具有章條其如法未勝姦藥弗瘳疾宜頒峻典以革祅風當州師巫一千九百餘户臣已勒令改業歸農及攻習鍼炙之脉所有首納祅妄神像符籙神衫神杖魂巾魂㡌鐘角刀笏沙鑼等一萬一千餘事已令焚毁及納官訖伏乞朝廷嚴賜條約所冀屏除巨害保宥羣生杜漸防萌少裨萬一英宗時翰林學士范鎮議廢慈廟状曰夫禮不可以不及亦不可過故慈母不世祭慈母而必祭者恩在於己不可以不及也祭而不以世者其恩已斷不可過也春秋傳所謂於子祭於孫止是也伏以先皇帝以章惠皇太后有慈保之恩於已故以時而祭是禮之不可不及也今陛下嗣位於章惠皇太后於屬為孫其恩已斷其祭宜止是禮之不可以過也先皇帝之不可以不及陛下之不可過皆為禮矣神宗時張方平劉摯等論廟事䟽曰臣伏見司農寺奏請降下新制應祠廟並依坊塲河渡之例召人承買收取浄利本府勘會在府及管下所管祠廟五十餘處尋巳依應施行訖内有閼伯廟宋公微子廟已係百姓承買閼伯廟納錢四十六貫五伯文微子廟十二貫文並係三年為一界臣竊以閼伯逺自唐堯遷此商邱之土主祀大火而火為國家盛徳所乗而王本朝歴世尊為大祀微子宋之始封君開國于此亦為本朝受命建號所因載于典禮垂之著令所當虔潔以奉祀事又有雙廟乃是唐張廵許逺以孤城死賊所謂捍大患者今既許承買之後小人以利為事必於其間營為招聚紛雜冗䙝何所不至慢神黷禮莫甚於此盖聞有天下者祭百神故咸秩無文毖于羣祀先聖哲王所以致恭于鬼神者所以為國家萬民六經訓典備矣故曰克典神天俾作神主此人君之職也今既歲收細㣲而損國體至大臣愚欲乞朝廷詳酌留此三廟更不出賣以稱國家嚴恭典祀追尚前烈之意知諫院陳襄上奏曰臣等㸔詳禮曰天子𤣥冕朝日於東門之外又曰祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕注羣小祀林澤墳衍四方百物之屬孔頴達謂此據地之小祀以血祭社稷為中祀埋沈以下為小祀也若天之小祀則司命司中風師雨師鄭雖不言義可知矣國朝祀儀祭社稷朝日夕月風師雨師皆服衮冕其蜡祭先蠶五龍亦如之祭司命户竈門厲行皆服鷩冕夀星靈星司中司寒中霤馬祭皆服毳冕皆非是今天子六服自鷩冕而下既不親祠廢而不用則諸臣攝事自當從王所祭之服伏請依周禮凡祀四望山川則以毳冕祭社稷五祀則以希冕朝日夕月風師雨師司命司中則以𤣥冕若七祀蜡祭百神先蠶五龍靈星夀星司寒馬祭盖皆羣小祀之比當服𤣥冕哲宗元祐元年太常博士顔復上奏曰臣聞禮或失中寧過于厚過厚之積不可致逺國之大事無若于禮禮者謂有其舉之莫敢廢也有其廢之莫敢舉也言固厚矣然皆本先王立法而後言三代之時不無不正可疑之祀由聖人裁之以義是者存之否者去之為天下不刋之通法雖有髙才强辯莫能舉廢也近世拘儒不考本義操寧厚之疑論謂歴代之祀有出于秦滅學之餘時君迫取俚儒無根之說者有原于緯候妖妄之書者有由諸儒解經一時臆見穿鑿傅會者有取傳記非聖雜書者有本方士術家禬禳隂陽拘忌之術者既謂莫敢廢之與常祀共行則民疑致力祝多愧辭有司犇走不勝媟煩學者觀之莫原其禮雖齊明盛服思度如在嘉玉吉幣豐牲潔粢至神不榮矣國家襲唐之舊有加無損皇帝陛下寅畏三靈勤毖羣祀太皇太后陛下明徳格神萬方伊嘏唯歴朝之弊未深講明此逹禮者夙夜惓惓於盛時也伏乞降詔禮官攷經為正凡干䜟緯及諸儒曲學前古汚朝茍制諸子疑禮道士醮祈術家厭勝一切刪去然後大小羣祀皆合聖人之制行之無瀆慢之嫌奉者免繼倦之色潢汙可薦黍稷惟馨上帝居歆百神享止三時不害景福來同矧禮成樂備之世是以臣愚冐昧喁喁有望于陛下也惟陛下留神則臣與逹禮之士不勝大􅂅哲宗時太常卿葛勝仲進太常祠祀儀制剳子曰臣准尚書省劄子奉聖㫖歲中在京大中小祠祀應干儀制并合差官吏祗應人物及牲牢禮料名數等合奉常逐一抄錄成策進入毋致漏落臣等尋取會所屬躬加編次勒成一書竊以肇昔聖王制祭祀以交神明以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之千品萬官億醜兆民經入畡數以奉之以齊肅衷正無所寓使先聖之後能知山川之號昭穆之世禮節之宜威儀之則忠信之質禋潔之服而致恭明神者為之祝使名姓之後能知犧牲之物玉帛之𩔖采服之宜彞噐之量壇塲之所屏攝之位而心率舊典者為之宗今臣等以㝠凡之質待罪祠官蒐裒編纂大懼不足仰稱明制每歲大祠凡九十有六中祠凡二十有九小祠凡一十有四每祀為一卷歲再祀或四時祀或月祀若祭名異而祀儀相𩔖則合為一卷凡四十有八卷標錄二卷以太常祠祀儀制格目為名謹隨状上進徽宗崇寧三年太常博士羅畸上言曰九宫諸神位無禮神玉惟有燔玉竊謂宜用禮神玉少倣其幣之色薦於神坐議禮局言先王制禮用圭璧以祀日月星辰所謂圭璧者圭其邸為璧以取殺於上帝也今九宫神皆星名而其玉用兩圭有邸夫兩圭有邸祀地之玉以祀星辰非周禮也乞改用圭璧以應古制大觀中侍讀兼議禮武選詳議官慕容彦逄奏曰臣伏覩近降手詔命有司講究禮樂之情文以幸天下可謂太平甚盛之舉臣竊惟禮有五經莫重於祭祭之秩于典者多矣而自京師至于郡縣春秋祈報徧于天下者唯社稷為然今郡守縣令不深推其故以是為不急之祀壇壝不修甚者民得畜牧種藝於其間春秋行事取具臨時乃或噐用弗備粢盛弗蠲齋祓弛懈祼獻失度甚不稱陛下稱秩祀典之意臣契勘社稷之祀勅令該載詳悉欲望聖慈特降睿㫖戒勅郡縣務在遵承命諸路監司廵歴所至察視壇壝其不如儀者具事状以聞庶幾官司祗肅祀事神用顧享彦逄又上奏曰臣竊惟國家稱秩祀典交百神而禮之考諸令格唯以齋日多寡為大中小祀之辨大祀散齋四日致齋三日中祀散齋三日致齋二日小祀散齋二日致齋一日參稽情文各有攸當然祀之通於天下而最顯者社稷釋奠春秋二仲州縣展事四方士民於焉觀禮而皆列於小祀近緣臣僚奏請比附國子監修立外州軍釋奠儀注散齋三日致齋二日則既升為中祀矣所有外州軍社稷齋日義難獨殺臣愚伏望聖慈特詔禮官討論増定祕書監何志同上言曰諸州祠廟多有封爵未正之處如屈原廟在歸州者封清烈公在潭州者封忠潔侯永康軍李氷廟已封廣濟王近乃封靈應公如此之𩔖皆未有祀典致前後差誤宜加稽考取一髙爵為定悉改正之他皆倣此髙宗紹興二年駕部員外郎李愿上奏曰程嬰公孫杵臼於趙最為功臣神宗皇嗣未建封嬰為成信侯杵臼為忠智侯命絳州立廟歲時奉祀其後皇嗣衆多今廟宇隔絶祭亦弗舉宜於行在所設位望祭從之十一年中書舍人朱翌言謹按晉國屠岸賈之亂韓厥正言以拒之而嬰杵臼皆以死匿其孤卒立趙武而趙祀不絶厥之功也宜載之祀典與嬰杵臼並享春秋之祀亦足為忠義無窮之勸十八年二月監登聞鼓院徐璉上言曰國家原廟佐命配享當時輔弼勲勞之臣繪象廟庭以示不忘累朝不過一十餘人今之臣僚與其家之子孫必有存其繪象者望詔有司尋訪復摹於景靈宫庭之壁非獨假寵諸臣之子孫所以増重祖宗之徳業以為臣子勸孝宗乾道五年太常少卿林栗上言曰國家駐蹕東南東海南海實在封域之内自渡江以後惟南海王廟嵗時降御書祝文加封至八字王爵如東海之祠但以萊州隔絶未甞致祭殊不知通泰明越温台泉福皆東海分界也紹興中金人入冦李寳以舟師大㨗於膠西神之助順為有功矣且元豐間甞建廟於明州定海縣請依南海特封八字王爵遣官詣明州行禮詔可寧宗慶元中太常少卿虞儔應詔上封事曰臣伏準尚書省劄子五月十四日三省同奉聖㫖而雨澤愆期禱祈未應可令侍從臺諫兩省卿監郎官館職䟽陳闕失及當今急務毋有所隠臣恭惟皇帝陛下寅畏上帝軫憂下民既命執政侍從奉告郊廟又遣宰屬卿監郎官祈禱名山踈決獄囚寛釋監繫以致責躬避殿減膳徹樂九重之上可謂焦勞一念之頃必能感格然猶以為未也方且降求言之㫖此社稷之福生靈之幸也臣竊以謂為國家者不過事神治民兩端而已臣至愚極陋官在奉常凡治民之利病未暇縷陳而事神之闕失豈容緘黙聞之禮曰治人之道莫急於禮禮有五經莫重於祭夫祭者所以交於神明之義也雖幽明有間而肹蠁潛通茍不務嚴潔而浸成䙝瀆災變之生未有不由此也昔者孔氏之門子路請禱夫子告之曰丘之禱乆矣夫不致敬於常祭之時而亟禱於災變之日亦已晚矣其何及乎春秋書雩二十有一皆在七月之後左氏傳之曰龍見而雩過則書盖龍見乃建巳之月於是月而雩則常祀也過是而講焉此春秋所以譏也朝廷今歲四月已舉行雩祭之禮矣非若春秋之失時而雩於七月之後也然而自五月以來雨澤愆期旱勢日廣未免再雩者其故何哉臣知其説矣盖由朝廷上下以禮樂為無用之虛文以祠祭為有司之故事其間壇壝傾圯而不脩齋館摧頽而不葺牲牷滌飬之不謹神厨割烹之不䖍以至樂工供官之屬悉皆市升藍縷之人鍾鼓管絃豈盡諧於節奏籩豆簠簋或有怠於滌濯其為䙝慢無所不有将何以感格天地和協神人其寒暑之不節風雨之不時咎在於斯其來久矣臣自供職以来隨事懲革唯力是視不敢茍簡然區區愚見不能自已伏覩已降指揮今年正係郊祀年分事大體重非常祭比欲望聖慈特降睿㫖申勅有司必敬必戒凡應辦禮科雅飾樂具供備祭服修葺壇壝齋館神厨之𩔖至纎至悉併乞朝廷劄下合屬去處不得作毎郊常程事例施行庶幾無一事不用其至無一物不致其誠上足以迓續天休次足以光華國典此當今之急務也臣不勝惓惓寧宗時衞涇上奏曰臣恭惟陛下寅畏天命明徳恤祀大而天地宗廟社稷次而羣望百神祗循彞典咸秩時事罔有闕遺禮嚴體重所不容忽百官有司固當恪共廼職以欽承精意然人情狃於玩習法制廢於具文儻不因事申勅革媮振惰何以交通肹蠁對越神明哉臣竊考太常祀典歳凡八千有二其祀有小大之殊差官有崇卑之異誓戒有期齋宿有日欲其上下交脩謹於承事今乃有薦享太廟而以局務小臣攝獻官者有奏告社稷已差執事而避免者有員數本足而臨期通攝僅及其半者有職事移易而官品邈絶殊不相稱者若是之𩔖未易徧舉等威紊殽觀瞻䙝易隳禮失敬莫甚於此臣伏見乾道三年指揮行事官稱疾請假者依條牒醫官局㸔驗及淳熈十一年臣僚奏請祭祀委官如果拘於職守適有疾病者須於未受誓戒之前報聞當差一等班列充代臣愚欲望聖慈明詔所司檢坐前項指揮申嚴行下今後差祠祭官必遵條格所差之官不許規免庶幾人無避事禮無闕官仰副陛下昭事神天之實度宗咸淳八年起居舍人髙斯得奏曰臣聞人臣生而有功徳於民則其死也聖王制為祭祀之禮以報之此仁之至義之盡也人君之治天下建立法度興起事功安定國家捍禦菑患必衆建臣工而後可以有濟然君之於臣也使之必報之生則榮之以爵祿死則秩之於祭祀傳曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之夫是之謂五義自堯舜以來未有易此者故禮記者列農稷后土以下十有餘人皆有功烈於民者也成周之時有勲勞者祭於大烝有道徳者祭於瞽宗其他或即其地而祠或立之廟以祭載諸傳記班班可考凡皆以崇徳報功而已東漢之臣如馬援者佐中興之業平内外之難馬革裹尸之志至死不移其於勤事定國禦菑捍患可謂兼之矣而大功未錄讒言並興薏苡之謗一聞光武大怒妻孥惶懼不敢歸𦵏孤魂悵悵而無所依況敢祀典之秩乎同郡朱勃上書顯訟其寃而陳聖王祀臣五義之說其規諷光武亦深切矣帝終不悟書奏報歸田里終帝之世援謗卒無與明若光武者真少恩之主哉陛下天資仁厚遇下以恩茍有尺寸之功靡不酬報固非漢世之君所敢望矣然襄淮俶擾京索未清士卒暴露為日滋久豈無身膏野草魂為國殤之人主将不以聞有司不以告則忠憤之氣亦能感天地之精干隂陽之和以召水旱昆蟲之變臣願陛下監光武之失憫邊禦之勞亟命閫臣搜訪死事悉以上聞旌而錄之庶幾将士聞之感激而思奮其於安邊保境實非小補金世宗大定十四年國子監言歲春秋仲月上丁日釋奠於文宣王用本監官房錢六十貫止造茶食等物以大小楪排設用留守司樂以樂工為禮生率倉塲等官陪位於古禮未合也伏覩國家承平日乆典章文物當粲然備具以光萬世況京師為首善之地四方之所觀仰㨿釋奠噐物行禮次序合行下詳定兼兖國公親承聖教者也鄒國公力扶聖教者也當於宣聖像左右列之今孟子以燕服在後堂宣聖像側還虛一位禮宜遷孟子像於宣聖右與顔子相對改塑冠冕粧飾法服一遵舊制章宗泰和三年尚書省奏太常寺言開元禮祭帝嚳堯舜禹湯文武漢祖祝板請御署開寳禮犠軒顓頊帝嚳陶唐女媧成湯文武請御署自漢髙祖以下二十七帝不署平章政事鎰左丞匡太常博士温徳亨天興言方岳之神各有所主有國所賴請御署固宜至于前古帝王寥落杳茫列于中祀亦已厚矣不須御署參知政事即康及鉉以為三皇五帝禹湯文武皆垂世立教之君唐宋致祭皆御署而今降祝板不署恐於禮未盡不若止從外路祭社稷及釋奠文宣王例不降祝板而令學士院定撰祝文頒各處為常制勅命依期降祝板而不請署元世祖時東平布衣趙天麟上策曰臣聞大易有云精氣為物逰魂為變是故知鬼神之情状鬼幽而神明鬼隂而神陽一呼一吸無非鬼神也一動一静亦無非鬼神也是以聖人灼知樞斡之相關爰立祭祀之大禮及其弊也殷人尚之墨子明之幾何其不胥而為邪祟蠱心之流邪禮天子祭天地及天下之名山大川諸侯祭社稷及名山大川之在其地者大夫祭五祀士祭宗廟庶人祭祖考于寢上得兼下下不得僭上皆有制以節之也故禮不在煩而在乎誠事不在過而在乎中以之應神祗庶乎其近矣今國家稱秩元祀咸秩無文既有禮部及太常司侍儀司以備其節文又詔令所在官司歲時致祭五嶽四瀆名山大川歴代聖帝明王忠臣節士之載在祀典者猗歟休哉皆其宜也竊見方今小民不安常典妄事明神其𩔖甚多不可枚舉略舉一端惟陛下察之夫東嶽者太平天子告成之地東方藩侯當祀之山今乃有倡優戲謔之流貨殖屠沽之子毎年春季四方雲聚有不逺千里而来者有提挈全家而至者干越邦典渫瀆神明停廢産業麋損食貨亦已甚矣昔季氏魯國之上卿旅於泰山孔子猶欲其宰救之況小民之賤乎或者以天人無二幽明相通報薦之誠無不可者臣竊以為非也設如此言則虛騖髙逺貴賤兩忘其或有事而不經官府直訴闕廷亦當理邪所謂執道之空曠而亂名噐者也大人之教不以名噐分之則将紊矣小民之心不以名噐繩之則将恣矣況淫祀者事神之誠極寡希福之貪甚多且父慈子孝何用焚香上安下順何須楮幣不然則雖竭天下之香繼爐而焚之罄天下之褚為幣而􅅡之臣知其斷無益矣何以言之神者明也豈從僥倖之訴豈受枉濫之賂邪君子之人守其恒心未甞妄祀禱福而福自隨之愚惑之人居於下流毎欲妄祀禳災而災弗離之故知祻福皆人所召非神之所能加損也然而聖人立祀禮者報其當然之本行吾當然之義也伏望陛下申明前詔使天下郡縣官各祭名山大川聖帝明王忠臣節士之在其地者凡下民當祀之神如祖考及門庭户竈等聽之凡非典所當祀而祀者禁之無令妄瀆凡祈神賽社漿酒藿肉飾立神像泥金鏤木者禁之無令妄費如是則非但巫風之寖消抑亦富民之一助也右專言祭禮歴代名臣奏議卷一百二十六
