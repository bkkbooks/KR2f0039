body:
  text: 歴代名臣奏議卷二百七十五明楊士竒等撰經籍東漢光武建武元年陳元與桓譚杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃上奏曰陛下撥亂反正文武並用深愍經藝謬雜真偽錯亂每臨朝日輙延羣臣講論聖道知丘明至賢親受孔子而公羊榖梁傳聞於後世故詔立左氏博詢可否示不專已盡之羣下也今論者沈溺所習翫守舊聞固執虚言傳受之辭已非親見實事之道左氏孤學少與遂為異家之所覆冒夫至音不合衆聽故伯牙絶弦至寶不同衆好故卞和泣血仲尼聖徳而不容於世況於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏春秋不可立及太史公違戾凡四十五事案升等所言前後相違皆斷截小文媟黷微辭以年數少差撥為巨謬遺退纎微指為大尤抉瑕擿釁掩其𢎞美所謂小辯破言小言破道者也升等又曰先帝不以左氏為經故不置博士後主所宜因􅊞臣愚以為若先帝所行而後主必行者則盤庚不當遷于殷周公不當營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好榖梁有詔詔太子受公羊不得受榖梁孝宣皇帝在人間時聞衛太子好榖梁於是獨學之及即位為石渠論而榖梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾従衆至扵拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事略戢留思聖蓺眷頋儒雅採孔子拜下之義卒淵聖獨見之㫖分明白黒建立左氏解釋先聖之積結洮汰學者之累惑使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙甞傳師言如得以褐衣召見俯伏庭下誦孔氏之正道理丘明之宿寃若辭不合經事不稽古退就重誅雖死之日生之年也四年初尚書令韓歆上䟽欲為費氏易左氏春秋立博士詔下其議是年正月朝公卿大夫博士見于雲臺帝曰范博士可前平說升起對曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及太中大夫許淑等互相辯難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經蓺情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比𩔖亦希置立京費已行次復髙氏春秋之家又有騶夾如令左氏費氏得置博士髙氏騶夾五經竒異並復求立各有所執乖戾分争􅀙之則失道不従則失人将恐陛下必有厭倦之聽孔子曰博學約之弗叛矣夫夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知教顔淵可謂善學矣老子曰學道日損損猶約也又曰絶道無憂絶末學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其来已久孔子尚周流逰觀至于知命自衛反魯乃正雅頌今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不修奏立左氏非政急務孔子曰攻乎異端斯害也已傳曰聞疑傳疑聞信傳信而堯舜之道存願陛下疑先帝之所疑信先帝之所信以示反本明不專已天下之事所以異者以不一本也易曰天下之動貞夫一也又曰正其本萬事理五經之本自孔子始謹奏左氏之失凡十四事詔以下博士章帝建初元年詔賈逵入講北宫白虎觀南宫雲臺帝善逵說使發出左氏傳大義長扵二傳者逵於是具條奏之曰臣謹摘出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者什有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之属左氏義深於君父公羊多任於權變其相殊絶固以甚逺而寃抑積久莫肯分明臣以永平中上言左氏與圖䜟合者先帝不遺芻蕘省納臣言寫其傳詁藏之秘書建平中侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒内懐不服相與排之孝哀皇帝重逆衆心故出歆為河内太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏榖梁會二家先師不曉圖䜟故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子彊幹弱枝勸善戒惡至明至切至直至順且三代異物損益随時故先博觀異家各有所採易有施孟復立梁丘尚書歐陽復有大小夏侯今三傳之異亦猶是也又五經家皆無以證圖䜟明劉氏為堯後者而左氏獨有明文五經家皆言顓頊代黄帝而堯不得為火徳左氏以為少昊黄帝即圖䜟所謂帝宣也如令堯不得為火則漢不得為赤其所發明補益實多陛下通天然之明建大聖之本改元正歴垂萬世則是以麟鳯百數嘉瑞雜遝猶朝夕恪勤逰情六藝研㡬綜微靡不審覈若復留意廢學以廣聖見庶㡬無所遺失矣帝嘉之和帝永元十四年司空徐防以五經久逺聖意難明宜為章句以悟後學乃上奏曰臣聞詩書禮樂定自孔子發明章句始於子夏其後諸家分析各有異說漢承亂秦經典廢絶本文略存或無章句收拾缺遺建立明經博徴儒術開置太學孔聖既逺微㫖将絶故立博士十有四家設甲乙之科以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意說不修家法私相容隠開生姦路每有策試輙興争訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意說為得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三世常道專精務本儒學所先臣以為博士及甲乙策試宜従其家章句開五十難以試之解釋多者為上第引文明者為髙説若不依先師義有相伐皆正以為非五經各取上第六人論語不宜射策雖所失或久差可矯革詔下公卿皆從防言魏武帝時袁渙上言曰今天下大難已除文武並用長久之道也可大收篇籍明先聖之教以易民視聽使海内斐然向風則逺人不服可以文徳来之帝善其言吳大帝時初立易注虞翻上奏曰臣聞六經之始莫大隂陽是以伏羲仰天縣象而建八卦觀變動六爻為六十四以通神明以𩔖萬物臣髙祖父故零陵太守光少治孟氏易曽祖父故平輿令成纉述其業至臣祖父鳯為之㝡宻臣考故日南太守歆受本於鳯㝡有舊書世傳其業至臣五世前人通講多玩章句雖有祕說於經䟽闊臣生遇世亂長於軍旅習經於枹鼓之間講論於戎馬之上䝉先師之說依經立注又臣郡吏陳桃夢臣與道士相遇放髮被鹿裘布易六爻撓其三以飲臣臣乞盡吞之道士言易道在天三爻足矣豈臣受命應當知經所覽諸家解不離流俗義有不當實輙悉改定以就其正孔子曰乾元用九而天下治聖人南面盖取諸離斯誠天子所宜協隂陽致麟鳯之道又曰經之大者莫過於易自漢初以来海内英才其讀易者解之率少至孝靈之際潁川荀謂號為知易臣得其注有愈俗儒至所說西南得朋東北䘮朋顛倒反逆了不可知孔子歎易曰知變化之道者其知神之所為乎以美大衍四象之作而上為章首尢可怪笑又南郡太守馬融名有俊才其所解釋復不及謂孔子曰可與共學未可適道豈不其然若乃北海鄭𤣥南陽宋忠雖各立注忠少差𤣥而皆未得其門難以示世翻又以鄭𤣥解尚書違失事目復上奏曰臣聞周公制禮以辯上下孔子曰有君臣然後有上下有上下然後禮義有所錯是故尊君卑臣禮之大司也伏見故徴士北海鄭𤣥所注尚書以顧命康王執瑁古月似同從誤作同既不覺定復訓為杯謂之酒杯成王疾困憑几洮頮為濯以為澣衣成事洮字虚更作濯以從其非又古大篆卯也讀當為栁古栁卯同字而以為昧分北三苗北古别字又訓北言北猶别也若此之𩔖誠可怪也王人識曰天子執瑁以朝諸侯謂之酒杯天子頮面謂之澣衣古篆卯字反以為昧甚違不知盖闕之義於此數事誤莫大焉宜命學官定此三事又馬融訓注亦以為同者大同天下今經益金就作銅字詁訓言天子副璽雖皆不得猶愈於𤣥然此不定臣没之後而奮乎百世雖世有知者懐謙莫或奏正又𤣥所注五經違義尤甚者百六十七事不可不正行乎學校傳乎将来臣竊耻之後魏道武帝甞問定州大中正李先曰天下何書最善可以益人神智先對曰惟有經書三皇五帝治化之典可以補王者神智又問曰天下書籍凡有㡬何朕欲集之如何可備對曰伏羲創制帝王相承以至於今世傳國記天文祕緯不可計數陛下誠欲集之嚴制天下諸州郡縣搜索備送主之所好集亦不難帝於是班制天下經籍稍集宣武帝時祕書丞武邑郡中正孫恵蔚既入東觀見典籍未周乃上奏曰臣聞聖皇之御世也必幽賛人經參天二地憲章典故述尊鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圖書祕籍乃承天之正術治人之貞範是以温柔䟽逺詩書之教恭儉易良禮樂之道爻彖以精微為神春秋以属辭為化故大訓炳於東序藝文光於麟閣斯寔天下之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在兹乎及秦棄學術禮經泯絶漢興求訪典文載舉先王遺訓燦然復存暨光武撥亂日不暇給而入洛之書二千餘兩魏晉之世尤重典墳收亡集逸九流咸􅊀觀其鳩閲史篇訪購經論紙竹所載略盡無遺臣學闕通儒思不及逺徒循章句片義無立而慈造曲覃廁班祕省忝官承乏唯書是司而觀閣舊典先無定目新故雜糅首尾不全有者累帙數十無者曠年不冩或篇第褫落始末淪殘或文壊字誤謬爛相属篇目雖多全定者少臣今依前丞臣盧昶所撰甲乙新録欲裨殘補闕損併有無校練句讀以為定本次第均冩永為常式其省先無本者廣加推尋搜求令􅁕然經記浩博諸子紛綸部帙既多章篇紕繆當非一二校書嵗月可了今求令四門博士及在京儒生四十人在祕書省專精校考參定字義如䝉聽許則典文允正羣書大集詔許之殄宼将軍符節令江式上䟽曰臣聞庖犧氏作而八卦列其畫軒轅氏興而龜策彰其彩古史倉頡覽二象之爻觀鳥獸之跡别創文字以代結繩用書契以維事宣之王庭則百工以叙載之方册則萬品以明迄于三代厥體頗異雖依𩔖取制未能悉殊倉氏矣故周禮八嵗入小學保氏教國子以六書一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借盖是史頡之遺法也及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之籀書至孔子定六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖别暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙髙作爰歴篇太史令胡母敬作博學篇皆􅂑史籀大篆或頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用𨽻書古文由此息矣𨽻書者始皇使下杜人程邈附於小篆所作也以邈徒𨽻即謂之𨽻書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書漢興有尉律學復教以籀書又習八體試之課最以為尚書史吏民上書省字不正輙舉刻焉又有草書莫知誰始考其書形雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者獨張敞從之受涼州刺史杜鄴沛人援禮講學大夫秦近亦能言之孝平時徴禮等百餘人説文字於未央宫中以禮為小學元士黄門侍郎揚雄採以作訓纂篇及亡新居攝自以應運制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰篆書云小篆也四曰佐書秦𨽻書也五曰繆篆所以摹印也六曰鳥蟲所以幡信也壁中書者魯恭王壊孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相𩔖即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵脩理舊文殊藝異術王教一端茍有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好竒歎儒俗之穿鑿惋文毁於譽痛字敗於訾更詭任情變亂於世故撰說文解字十五篇首一終亥各有部属包括六藝群書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物竒怪珍異王制禮儀世間人事莫不畢載可謂𩔖聚羣分雜而不越文質彬彬最可得而論也左郎中将陳留蔡邕採李斯曹喜之法為古今雜形詔於太學立石碑刋載五經題書楷法多是邕書也後開鴻都書畫竒能莫不雲集於時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字訓究諸埤廣綴拾遺漏増長事𩔖抑亦於文為益者然其字詁方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博古開藝特善倉雅許氏字指八體六書精究閑理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣校之說文篆𨽻大同而古字少異又有京兆韋誕河東衛覬二家並號能篆當時臺觀榜題寶噐之銘悉是誕書咸傳之子孫世稱其妙晉世義陽王典祠令任城吕忱表上字林六卷尋其況趣附託許慎説文而按偶章司隠别古籕竒惑之字文得正𨽻不差篆意也忱弟静别放故左校令李登聲𩔖之法作韻集五卷宫商龣徴羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯𨽻體失真俗學鄙習復加虚巧談辯之士又以意説炫惑於時難以釐改故傳曰以衆非非行正信哉得之於斯情矣乃曰追来為歸巧言為辯小兒為䨲神蟲為蠶如斯甚衆皆不合孔氏古書史籀大許氏説文石經三字也凡所關古莫不惆悵焉嗟夫文字者六藝之宗王教之始前人所以垂今今人所以識古故曰本立而道生孔子曰必也正名乎又曰述而不作書曰予欲觀古人之象皆言遵脩舊史而不敢穿鑿也臣六世祖瓊家世陳留往晉之初與􅀙父兄應元俱受學於衛覬古篆之法倉雅方言説文之誼當時並收善譽而祖官至太子洗馬出為馮翊郡值洛陽之亂避地河西數世傳習斯業所以不墜也世祖太延中皇威西被牧犍内附臣亡祖文威杖策歸國奉獻五世傳掌之書古篆八體之法時䝉襃録叙列於儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時来恩出願外每承澤雲津廁霑漏潤驅馳文閣參預史官題篆宫禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍輙求撰集古来文字以許慎說文為主爰採孔氏尚書五經音注籀篇爾雅三倉凡将方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次𩔖編聫文無復重糺為一部其古籀竒惑俗𨽻諸體咸使班於篆下各有區别詁訓假借之誼僉随文而解音讀楚夏之聲並逐字而注其義不知者則闕如也北齊文宣帝天保七年詔令校定羣書時秘府書籍紕繆者多大行臺郎中樊遜上議曰案漢中壘校尉劉向受詔校書毎一書竟表上輙言臣向書長水校尉臣參書大夫公太常博士書中外書合若干本以相比然後校殺青今所讎校供擬極重出自蘭臺御諸甲館向之故事見存府閤即欲刋定必藉衆本太常卿邢子才太子少傅魏收吏部尚書辛術司農少卿穆子容前黄門郎司馬子瑞故國子祭酒李業興竝是多書之家請牒借本參校得失祕書監尉瑾移尚書都坐凡得别本三千餘卷五經諸史殆無遺闕隋文帝開皇初祕書監牛𢎞以典籍遺逸上䟽請開獻書之路曰經籍所興由来尚矣爻畫肇於庖羲文字生於蒼頡聖人所以𢎞宣教導博通古今揚扵王庭肆於時夏故堯稱至聖猶考古道而言舜其大智尚觀古人之象周官外史掌三皇五帝之書及四方之志武王問黄帝顓頊之道太公曰在丹書是知握符御厯有國有家者曷甞不以詩書而為教因禮樂而成功也昔周徳既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮刋詩正五始而脩春秋闡十翼而𢎞易道治國立身作範垂法及秦皇馭㝢吞滅諸侯任用威力事不師古始下焚書之令行偶語之刑先王墳籍掃地皆盡本既先亡從而顛覆臣以圖纎言之經典盛衰信有徴數此則書之一厄也漢興改秦之弊敦尚儒術建藏書之筴置校書之官屋壁山巖往往間出外有太常太史之藏内有延閣秘書之府至孝成之世亡逸尚多遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末長安兵起宫室圖書並􅀙焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅於是鴻生鉅儒繼踵而集懐經負帙不逺斯至肅宗親臨講肄和帝數幸書林其蘭䑓石室鴻都東觀祕牒填委更倍於前及孝獻移都吏民擾亂圖書縑帛皆取為帷囊所收而西裁七十餘乗属西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏在秘書内外三閣遣秘書郎鄭黙删定舊文時之論者美其朱紫有别晉氏承之文籍尤廣晋秘書監荀勗定魏内經更著新簿雖古文舊簡猶云有􅆙新章後録鳩集已多足得恢𢎞正道訓範當世属劉石憑陵京華覆滅朝章國典從而失墜此則書之四厄也永嘉之後宼竊競興因河據洛跨秦帶趙論其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚收其圖籍五經子史􅂊四千卷皆赤軸青紙文字古拙僭偽之盛莫過二秦以此而論足可明矣故知衣冠軌物圖書記注播遷之餘皆歸江左晋宋之際學藝為多齊梁之間經史彌盛宋秘書丞王儉依劉氏七畧撰為七志梁人阮孝緒亦為七録揔其書數三萬餘卷及侯景渡江破滅梁室秘省經籍雖從兵火其文徳殿内書史宛然猶存蕭繹據有江陵遣将破平侯景收文徳之書及公私典籍重本七萬餘卷悉送荆州故江表圖書因斯盡萃於繹矣及周師入郢繹悉焚之於外城所收十􅂊一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏㩀有山東初亦採訪驗其本目殘缺猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘􅆙此梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼已後迄于當今年踰千載數遭五厄興集之期属膺聖世伏惟陛下受天明命君臨區宇功無與二徳冠往初自華夏分離彛倫攸斁其間雖霸王逓起而世難未夷欲崇儒業時或未可今土宇邁於三王民黎盛於兩漢有人有時正在今日方當大𢎞文教納俗升平而天下圖書尚有遺逸非所以仰協聖情流訓無窮者也臣史籍宜司寢興懐懼昔陸賈奏漢祖云天下不可馬上治之故知經邦立政在於典謨矣為國之本莫此攸先今秘藏見書亦足披覽但一時載籍須令大備不可王府所無私家乃有然士民􅇻雜求訪難知縱有知者多懐恡惜必須動之以天威引之以微利若猥發明詔兼開購賞則異典必臻觀閣斯積重道之風超於前世不亦善乎伏願天監少垂照察上納之於是下詔獻書一卷賚縑一匹一二年間篇籍稍備唐憲宗時鄊貢進士李行脩上言曰臣覆視漢初經籍啓口傳壁匿煥然明備其所由者脩廢官立太學朝夕講貫以究聖意嵗時程課以􅃊師道使之然也迨乎桓靈之世遂使扶持亢極匡飭頽俗專委裘以終大運其儒術已試之明效歟近學無專門經無師授以音定字以䟽釋經是能使生徒由之中才不能使天下由之致理明矣大率五經皆然臣獨以詩學上聞趨所急也伏惟陛下赦其愚瞽垂恩聽察夫詩者發人之藴政謂之風手舞足蹈之音作用之光祖宗垂風聲勞歌怨誹之音作用之察吏理審教化是以四海雖大羣生雖廣猶民人之和氣息乎踵達乎顱流乎足猶草木之豐澤漸乎根窮乎杪被乎枝葉上下無滯氣内外無遁情如此則詩得其任風得其性也昔殷周相承俱有聖治道洽于下下無怏心王化盛告成功於神明徳澤衰反變化於禮素其辭主文譎諫而不訐其教温柔敦厚而不愚仲尼接于其時謂王者宜以陶冶風俗臣下宜以洗濯疑謬道濟于下宜若之何乃采其詩合三百五篇善者全而用不善者全而去非如春秋諸經或革或因相錯而成也其若禮樂征伐天地隂陽有度假於辭可見喜怒哀樂譏刺諷諭無方非其志莫傳志士躬當治亂之時氣有慘舒之變臻於極而後動積於中而後形故言之成文歌之成聲有一不至則非全矣是以聖人全動物物莫能固未施敬于人而人敬未施哀於人而人哀頑者以之開明躁者以之舒静道源于是絶而莫嗣獨有楚屈原頗得詩人之風介於子蘭靳尚後學軋于相語喑呃相授以及漢興雜全經者七十年師口説者四三軰漢武篤好經術立于學官雖章句大脩而比興未喻時揚雄司馬相如由是選耎觀望将迎忌諱勸百諷一推波助瀾文雖有餘不足稱也然以本學寖盛時因灾異屢起直聲初或不究終得其助故自殷以降有天下者莫長焉厥後君臣道薄詩道陵夷藴義感慨之士至曰吾何從乎上之追屈原不足以全性命下之跡相如不足以匡過失故居常則欝怏其胷襟嚄唶其齒牙代莫通其源臣伏思之以為詩教未隆於時風雅未洽於下教未隆則士不勸風未洽則言多缺故聞卒愕而愠者多喑投而却也自十聖紹業盈二百載經術益試周旋百度吏事反為縁飾霸道反為舛駮及陛下又登禮巖穴發揚仄伏宸心讜議猶天地相定儒風昌言與日月横騖以詞讓次征伐而不暴以誠明推教化而不浮如此則詩學何為鬱然積於空虚無用之地乎書殘於古今詩失於齊魯漢有毛萇鄭康成師道可觀逮聖朝劉迅者説詩三千言近代知詩者尚之伏惟陛下詔公卿諸儒講其異同綜其指要列四始之元本窮六藝之粹精不使講以多物而無譁蔽之言而得其言極者為師法傳經而行其毛鄭不安者亦随而刋正選立博士弟子貟如漢朝故事然後命瞽史納于聦明命司成教之世子是謂端本由朝廷被于民里由京師施之逺方是謂垂化復采詩之官以察風俗是謂兼聽優登才之選以勵生徒是謂興古四者既備大化自流則動天地感鬼神信豚魚甘堇荼来異俗懐鬼方皆在一致推而廣之神而化之無難矣微臣不知時變溺於師言謹詣光順門昧死以聞僖宗咸通中著作郎皮日休請為孟子科狀曰臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是子者必戾乎經史又率於子者則聖人之盜也夫孟子之文粲若經傳天惜其道不燼于秦自漢氏得之甞置博士以專其學故其文繼乎六藝光乎百氏真聖人之微㫖也若然者何其道曄曄於前其書汲汲於後得非道拘乎正文極乎奥有好者憚正而不舉嗜淺者鄙奥而無稱耶盖仲尼愛文王嗜昌歜以取味後之人将愛仲尼者其嗜在乎孟子矣嗚呼古之士以湯武為逆取者其不讀孟子乎以楊墨為達智者其不讀孟子乎由是觀之孟子功利於人亦不輕矣今有司除茂才明經外其次有熟荘周列子書者亦登於科其誘善雖深而懸科未正夫荘列之文荒唐之文也讀之可以為方外之士習之可以為鴻荒之民有能汲汲以救時補教為志哉伏請有司去荘列之書以孟子為主有能精通其義者其科選視明經茍若是也不謝漢之博士矣既遂之如儒道不可聖化無補則可刑於言者宋太宗至道二年吳淑遷職方員外郎時諸路所上閏年圖皆儀鸞司掌之淑上言曰天下山川險要皆王室之秘奥國家之急務故周禮職方氏掌天下圖籍漢祖入關蕭何收秦籍由是周知險要請以今閏年所納圖上職方又州郡地里犬牙相入向者獨畫一州地形則何以傅合他郡望令諸路轉運使每十年各畫本路圖一上職方所冀天下險要不窺牖而可知九州輪廣如指掌而斯在帝從之仁宗皇祐二年司馬光乞印行荀子揚子法言状曰臣伏以戰國以降百家蠭起先王之道荒塞不通獨荀卿揚雄排攘衆流張大正術使後世學者坦知去從國家博采藝文扶翼聖化至於荘列異端醫方細伎皆命摹刻以廣其傳顧兹二書猶有所闕雖民間頗蓄私本文字訛誤讀不可通誠恐賢達之言寝成廢缺今欲乞降下崇文院将荀子揚子法言本精加考校訖雕板送國子監依諸書例印賣臣愚懵不達大體不勝區區貪陳所見至和二年翰林學士歐陽脩上奏曰臣伏見國家近年以来定貢舉之科以為取士之法建立學校以為養士之方然士子文章未純莭行未篤不稱朝廷勵賢興善之意所以化民成俗之風臣愚以謂士之所本在乎六經而自暴秦焚書聖道中絶漢興收拾亡逸所存無㡬或殘編斷簡出於屋壁而餘齡昏眊得其口傳去聖既逺莫可考證偏學異說因自名家然而授受相傳尚有師法暨晉宋而下師道漸亡章句之篇家藏私蓄其後各為箋傳附著經文其說存亡以時好惡學者茫昧莫知所歸至唐太宗時始詔名儒撰定九經之䟽號為正義凡數百篇自爾以来著為定論凡不本正義者謂之異端則學者之宗師百世之取信也然其所載既博所擇不精多引䜟緯之書以相雜亂怪竒詭僻所謂非聖之書異乎正義之名也臣欲乞特詔名儒學官悉取九經之䟽删去䜟緯之文使學者不為怪異之言之所惑亂然後經義純一無所駮雜其用功至少其為益則多臣愚以謂欲使士子學古勵行而不本六經欲學六經而不去其詭異駮雜欲望功化之成不可得也伏望聖慈下臣之言付外詳議仁宗時宋祁代人乞存殁臣僚納家集狀曰臣竊以周徳之興多文以監二代舜華其協好問而察邇言爰歴古先咸遵風軌期有裨於治體無容廢于瞽詞輙罄芻微仰裨漏闕伏念臣材惟闒茸職本掃除服君度之在寛不汝瑕而垂采曩者太宗皇帝亮其愚訥奨以寵靈命臣充史館書庫都監兼秘閣供御圖書時属聖念嚮儒朝猷被世旁求典故備覽清閒又命臣往江浙搜訪遺書真宗皇帝繼體丕承好生善養洗其痕玷秩以冗閒伏遇皇帝陛下祗遹珍圖交修先憲遺簮未弃塗雘再加又命臣同天章龍圖閣都監臣委質三朝行年八十鐘漏方盡雖愧于夜行塵露有施敢忘于上報臣甞覽祕書目録伏覩自唐末至五代其間有以文章取名當世者咸存属綴列在緹緗載册府以相輝賁牙簽而有第我國家承百王之末披三代之英師儒挺生名臣軰出或髙文大册為廊廟之珍或隠居放言樂山林之志從臣抒嘆太史陳詩炳然斯文髙映前代然四部之内編集無聞一王之言規矱安寄使彌文不表則至化弗昭後之視今闕孰為大臣今欲乞䧏聖㫖下中書取四朝以来存没臣僚及隠逸之士以文學顯名者各許其人及子孫獻納所著家集乃降下兩制詳定若其深厚温潤可以垂著不朽者具姓名聞奏官為給紙墨差人繕冩三本付龍圖天章閣太清樓祕閣收藏足使増觀本朝垂榮来籍開元之目大備有司之副可求上以見文思安安堯之稽於古下以見賢士濟濟周之所以寧臣之至愚竊為深惜且年祀寝逺則亡逸滋多今而不求後亦隨廢異日當使陳農訪舊結馳傅之勞河間購遺軫補亡之慮功相逺矣誰曰不然臣衰疾見乗懵昧惟素願留餘景期觀大化之成輕率狂言或俟聖人之澤越干程覽伏待誅夷哲宗元祐四年梓州路轉運使吕陶上奏曰臣竊以朝廷復春秋之科為置博士所以扶進微學敦勸諸生甚大恵也然而聖經簡奥傳注之家未能盡通其藴謂宜博採衆說恭求所長庶幾一經餘義渙然易釋臣伏見轄下廣安軍鄉貢進士王乗少壮好學白首不倦甞撰春秋統解三卷序引二十四篇推明筆法得其大㫖比之陳岳折衷王㳂集傳孫復發微不在其下曽於元祐二年九月中繕寫投進訖伏乞聖慈特賜檢㑹詔侍從館閣臣僚考詳其書或萬一有補經術即乞藏於祕府以備一家之説以廣四部之盛陶又上奏曰臣先任梓州路轉運使日於元祐四年曽奏舉廣安軍鄉貢進士王乗所撰春秋統解及序引等篇推明筆法得其大㫖乞詔侍􅀙館閣臣僚考詳其書藏於祕府以備一家之説臣伏見朝廷崇尚春秋之學復置博士施於科舉此乃聖世大公至正之道尊經勸學必先原本不以好惡辯訥而為之廢興盛衰也如乗所著統解等書簡易明白有補經訓儻使學者從而習之㳂波討源窺見聖藴誠於文治之世不為小補況乗年過七十無心仕進或䝉盛時博收廣採得以伸發平生講解之學上助朝廷崇儒重道之意萬分之一不勝幸甚伏望聖慈察臣區區特降睿㫖檢㑹臣前奏并今来所請施行六年給事中范祖禹上奏曰臣竊惟祖宗置三館祕閣以待天下賢材公卿待從皆由此出不專為聚書設校理校勘之職亦非專為校書也六經之書不可不尊孔氏之道不可不明至於諸子百家神仙道釋盖以備篇籍廣異聞以示藏書之富無所不有本非有益於治道也嘉祐中増置編校之官繕寫黄本自此書籍益廣充牣四館朽蠧相仍居其中者固未能周覽而徧校也今又使道士陳景元校道書臣愚竊所未諭議者必曰漢成帝時劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技今使道士校道書亦其比也臣竊以為不然漢之時以竹簡寫書在天下者至少非祕府不能偹非如後世以紙傳寫流布天下所在皆有也劉向緫校羣書非一人之力所能獨了故又用任宏等三人然兵書數術方技皆為有用非異端之學也任宏等亦非異教之人也今館閣群聚天下賢才宜有詳見洽聞之士博極羣書乃使陳景元先取道藏之書校定成本供祕書省委本省官對校皆取正於景元不亦輕朝廷之體羞當世之士乎又道書除老子荘列已立於學官其餘多虚誕不經儒者所不道天下名山宫觀自有道藏館閣所藏唯備數可矣不必使方外之士讐校以崇長異學也漢武帝時董仲舒對䇿以為諸不在六藝之科孔子之術者皆絶其道勿使並進武帝感其言遂罷黜百家表章六經今館閣之書下至稗官小説街談巷語道聽塗説之所造者無所不有既使景元校道書則他日僧校釋書醫官校醫書隂陽卜相之人校技術其餘各委本色皆可用此為例豈祖宗設館閣之意哉夫聖王作事必防其微命出于上不可不慎昔熈寧中王韶開拓熈河王安石使其門僧智縁随韶誘説木征時人號為安撫太師今館職之外已置校黄本官又於黄本之外有校書道士天下之人必謂之編校大師事雖至微實損國體其祕書省所請乞更不施行哲宗時畢仲㳺上論曰臣竊以世之謂文者不繫於徳謂徳者不繫於文夫文章之士雖不繫於有徳無徳而無徳者不能為有徳之文有文之人不皆有徳有徳之人不皆有文而有文者無徳則不盡其善奚以知其然耶今人之言文者其任盖小矣希名幸世取合當時而古之人言文者其任不小善惡欲明是非欲辯久逺欲傳勸戒欲信非獨名位而已也故雖有精金良帛沈器重物非車輿則無以輸逺雖有竒功偉徳元凶大惡非文章則無以取信車輿不壯則雖載而必敗文章不著則雖傳而必惑故文章盖美惡之車輿也自六國以前孔子所定不敢輕議嘗竊觀六國以後西漢之前號綴文之士者𩔖皆過人而過人之逺者賈誼董仲舒司馬遷相如劉向揚雄此數子之文也盖善惡能明是非能辯久逺可傳勸戒足信雖有議論間未合於聖人然詞采條貫如親聽其談說而精神意氣可以想見其為人使後世識者心知其所異而口不能亟喻其何如此數子之文也然此數子者豈特文己事君必忠脩身以正趨嚮必厚議論必公其所存之徳既已過人則其發見於文章者豈不過人哉在唐三百年韓愈號為文師而忠厚公正之徳亦著于天下自韓愈以来文章之徳散科場之弊生使夫英雄俊才老死不顯而寡聞淺識之徒乃始支離攘臂自奮於其間私取近世之陳說而公為儌倖之論善惡不能明是非不能辯久逺不可傳勸戒無足信言今則近陋議古則近愚而其甚者鑿是為非飾惡成善借平常之易事為紛紜之轉詞以熒惑天下天下之人莫知其非故公則見信於有司退則受知於朋友而彼也遂真以為能此有志之士所以扼腕而太息也髙宗時祕書省正字洪遵乞訪遺書劄子曰臣聞自昔右文之主遭時艱難圖典散逸必汲汲搜求常若不及是以漢唐之間或訪以使者或遺之金帛故當其時斷簡殘帙晦而復出國朝承五閏之後尺簡不存至太平興國中始命三館以開元四部書目閲所闕者䟽其名於待漏院許天下吏民詣官投進及三百卷者送學士院驗人材補授於是四庫之書復全聖聖相繼籖縢之盛跨越前代陛下踐位復秘書省倣唐十八學士之制而定其貟廣求遺逸以補麟臺之闕其大恵也臣以職事幸預校讐視今所藏殊未及承平時十之一二昔漢祖入關鋒刃未解猶且先遣蕭何收秦圖籍仰惟陛下天縱将聖萬機餘暇留神簡䇿而今日海内承平無事固宜鋪張文物以侈中興之觀誠非入闗比而典籍猶未大備殆闕文也伏望睿慈舉行興國之制以唐藝文志及崇文總目恭校凡館中所闕者榜之檢鼓院仍照監司守令精意括訪凡臣庻所藏之書列其目以聞然後具秘閣所闕委所在州縣給紙札抄録其有願進者卷給錢帛而卷帙之富則别議襃賞臣将見祕册奥書叢然集於闕下誠有以副陛下右文之意蘇籀論經解劄子曰臣聞聖經賢傳唐虞三代所遺闕里之業王者樂道尊儒内自九重化流寰海金華露門咨訪紬繹辟雍東觀群能感奮俾天下品𩔖回心嚮正政孚教洽三代之盛漢唐之隆及吾祖宗聖功休烈六籍之效著矣洪惟陛下生而知之孳孳舜善聽朝之隙横經疇咨宵旰睿覽研㡬簡編建立太學首善之始崇道辯惑渥㤙養士臣等遭際作興帶經負笈陶沐亭育紳笏周行峩弁就列跂望睟穆之儀而又昧死論對軒陛當得言之秋非有㳙塵稱塞右文以為不足以為士矣竊聞永平之嵗期門羽林肄習名教貞觀之盛屯營飛騎受書博士臣固駑下亦知竦慕狂斐儳説不揆其愚昔者仲尼删定繫彖筆削問周史聞齊韶而詩書易禮樂春秋各得其所惟舉要發端不詳其言非不能詳也以為詳之則隘故略之使仁智者自求而得逮夫李斯滅學之後出於屋壁既非全經兩漢顓門之流白首講貫授受相傳深不負仲尼之㫖虎觀石渠摳衣重席論難紛紜開益後人多矣唐文皇時初詔顔師古考究章程孔頴達撰定義䟽遂為天下定論此兩漢魏晉以来千載儒術也夫六經微言妙用非可易解而遽曉始學必由傳䟽近嵗兵火典籍殘缺比日諸州刋印稍備今之諸生所以窮經捨正義傳注則懵然矣此非一代之所私一家之偏說一夫之獨智輯合陶汰千載宇宙之公是非也但漢初儒者各譊譊師習詩書春秋古文初不甚行公榖方熾左氏廢錮故三代遺典乖戾不合唐人因舊承疑去取粗當未暇大有發明易數樂律至今不得其傳臣願陛下特詔名儒學官既蓄聚唐之義䟽復收録近世儒臣以學顯者所著講解申敇州縣委自守貳網羅募輯刋刻抄録儲之太學臣嘗思念本朝祖宗以来名士豪傑之士體道彌切經藝䟽解愈明知先儒有未悟者條目甚夥本朝之學光矣非累聖神化不能然也意者商較評品假以嵗年加秩給費纂而成編古人有集傳集解之號補唐之正義闕遺凡説皆通則並存之疑者闕之不妄鑿焉庶㡬孔氏之舊祖宗右文實頼陛下為之統紀甚盛舉也其於設科取士考信萬方究析道真扶翊名教使天下後世滌耳劌目伏膺不忒寔文治之偉蹟也臣不勝犬馬昧死越職上言籀又論取士專優春秋三傳劄子曰臣恭惟本朝以詩賦經義造士庶㡬虞書颺言之舉於斯得人祖宗朝甚盛邇日海内諸生窮計聖籍該洽道藝義䟽名家羣士慕嚮罔不遵周孔之軌躅纂闕里之㫖趣易詩書及二禮先王謨猷貫穿詳備課有厥程惟春秋一經前此廢絶不用陛下稽古睿明注意經傳致令學者討訪修習今既舉行二百四十二年文字五家浩博以其久遭擯棄其説孤寂罕為人所講授僅有治者終恐蕪翳有識之士嗟咨歎息此書筆削乃文王之文襃貶則周公之法禮義大宗百王通典考周之所以王有邦家者守經事而欲知其宜更變禮而欲知其權是非勸戒係天下表儀繩準别嫌疑定猶豫至斷妙用世所希聞傳業者優柔浸漬積久轉解實不易領㑹也古之君子窮此學白首不輟惟經之體要固天下國家本務丘明受經仲尼厥為附傳非私意也前代稱左氏古學所載紬繹三代禮樂上紀犧炎唐虞禹湯周孔遺軼齊晉伯主尊奨王室捨此何㩀焉又公榖二儒傳經子夏二傳乃孔徒遺㫖典則非後世所及西漢賈誼賈嘉相與纂繼此道光武中興立左氏博士唐文皇早嵗受麟經之誼晉代杜預宗趣淵源大賢所業夫治春秋之學如賈及杜皆名世偉人臣願陛下明詔中外有司埸屋詩賦策論命題措意或用春秋三傳禮闈取人特優此孔經分數不妨以聲律定去留柬求精悉傑俊知𩔖通達者置在博學師儒之列如誼預才謨飛聲邁烈未必乏其人也俾瑣瑣懵學雖欲夸世亦不斥而自屏矣臣愚烏足以䆒其閎奥極其髙堅不勝懇懇披冩之誠所有越職不敢逃罪右正言陳淵因面對論程頥王安石學術同異上曰楊時之學能宗孔孟其三經義辨甚當理淵曰楊時始宗安石後得程顥師之乃悟其非上曰以三經義解觀之具見安石穿鑿淵曰穿鑿之過尚小至於道之大原安石無一不差推行其學遂為大害上曰差者何謂淵曰聖學所傳止有論孟中庸論語主仁中庸主誠孟子主性安石皆暗其原仁道至大論語随問荅惟樊遲問始對曰愛人愛特仁之一端而安石遂以愛為仁其言中庸則謂中庸所以接人髙明所以處己孟子七篇專發明性善而安石取揚雄善惡混之言至於無善無惡又溺於佛其失性逺矣孝宗時王之望上奏曰臣聞歐陽脩曰六經之道㡬熄於戰國而焚於秦自漢以来收拾亡逸發明遺義而正其訛謬以粗傳於今者豈一人之力哉後人迹前世之所傳而較其得失則有之矣若使徒抱焚餘殘脫之經倀倀於去聖千百年後不見諸儒中間之説而欲特立一家之學未信其果有能也臣愚以為天下之名言盖六經訓詁由漢至隋轉相祖述不勝其繁唐太宗命顔師古孔頴達之徒删取衆説撰為正義包貫同異最號詳博雖其中不能無冗謬至于剖析度數分别名物有功於經為不少矣近世諸儒著解注者各自名家然亦多承先儒之舊學者喜其新竒利其簡要因共宗之鮮復知有前人之説而義䟽之學微矣逮兵火之後此書之在天下者往往而絶皇天未䘮斯文陛下紹開景運内建太學外置官師親書石經以幸多士聖道煥然復興中外承風皆知好尚儒雅古今書籍刋印畧備萬世永頼甚盛徳之舉也但諸經䟽義部帙頗多逺方寒生未易可得恭聞端拱初太宗皇帝命國子司業孔維等校勘周易尚書春秋毛詩禮記正義雕板布行咸平中真宗皇帝命國子祭酒邢昺等刋定周禮儀禮公羊榖梁傳䟽及别脩孝經論語爾雅正義遣國子直講王煥齎詣杭州刻板送國子監臣愚欲望陛下倣端拱咸平故事悉取近地所刋羣經䟽義并經典釋文付國子監印數百部頒其書於四方詔郡縣以贍學或係省錢各市一本置之於學未有板者令臨安府速行雕造期以一年周徧遐邇則偏州下邑皆知朝廷存尚古學於以開道術之源廣經籍之路而仰副陛下崇儒右文追法祖宗之意不其韙歟圖䜟東漢光武建武間帝方信䜟多以決定嫌疑議郎給事中桓譚上奏曰凡人之情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虚誕之事盖天道性命聖人所難言也自子貢以下不得而聞況後世淺儒能通之乎今諸巧慧小才伎數之人増益圖書矯稱䜟記以欺惑貪邪詿誤人主焉可不抑而逺之哉臣伏聞陛下窮折方士黄白之術甚為明矣黄白謂以藥化成金銀也而乃欲聽納䜟記又何誤也其事雖有時合譬猶卜數隻偶之𩔖言偶中也陛下宜垂明聽發聖意屏羣小之曲説述五經之正義畧靁同之俗語詳通人之雅謀臣又聞安平則尊道術之士有難則貴介胄之臣今聖朝興復祖統為人臣主而四方盜賊未盡歸伏者此權謀未得也臣伏觀陛下用兵諸所降下既無重賞以相恩誘或至虜掠奪其財物是以兵長渠率各生狐疑黨軰連結嵗月不觧古人有言曰天下皆知取之為取莫知與之為取言先饒與之後乃可取之陛下誠能輕爵重賞與士共之則何招而不至何説而不釋何向而不開何征而不剋如此則能以狹為廣以遲為速亡者復存失者復得矣帝省奏不悦其後有詔㑹議靈臺所處平昌門直南大道東是明堂西是靈臺也帝謂譚曰吾欲䜟決之何如譚黙然良久曰臣不讀䜟帝問其故譚復極言䜟非經帝大怒曰桓譚非聖無法将下斬之譚叩頭流血良乆乃得解順帝時太史令張衡以圖緯虚妄非聖人之法乃上奏曰臣聞聖人明審律歴以定吉凶重之以卜筮雜之以九宫經天驗道本盡於此或觀星辰逆順寒燠所由或察龜筞之占巫覡之言在男曰覡在女曰巫覡音胡歴反其所因者非一術也立言於前有徴扵後故智者貴焉謂之䜟書䜟書始出盖知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱䜟若夏侯勝眭孟之徒以道術立名其所述著無䜟一言劉向父子領校祕書閲定九流亦無䜟録成哀之後乃始聞之九流謂儒家道家隂陽家法家名家墨家縦横家雜家農家尚書堯使鯀理洪水九載績用不成鯀則殛死禹乃嗣興而春秋䜟云共工理水凡䜟皆云黄帝伐蚩尤而詩䜟獨以為蚩尤敗然後堯舜受命春秋元命包中有公輸班與墨翟事見戰國非春秋時也又言别有益州益州之置在於漢世武帝始置益州其名三輔諸陵世數可知至於圖中訖于成帝一卷之書互異數事聖人之言埶無若是殆必虚偽之徒以要世取資往者侍中賈逵擿䜟互異三十餘事諸言䜟者皆不能説至於王莽篡位漢世大禍八十篇何為不戒則知圖䜟成於哀平之際也且河洛六蓺篇録已定後人皮傅無所容簒傅音附秦晋言非其事謂之皮傅謂不深得其情核皮膚淺近强相傅㑹也簒纂作竄義亦通永元中清河宋景遂以歴紀推言水灾而偽稱洞視玉版或者至於弃家業入山林後皆無效而復采前世成事以為證驗至扵永建復統則不能知永建順帝即位年也復統謂廢而復立言䜟家不論也此皆欺世罔俗以昧埶位情偽較然莫之糾禁且律歴卦候九宫風角數有徴效世莫肻學而競稱不占之書䜟書也譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虚偽不窮也宜收藏圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣元文宗至順二年司徒香山言陶𢎞景胡笳曲有負扆飛天厯終是甲辰君之語今陛下生年紀號實與之合此實受命之符乞録付史館頒告中外詔令翰林集賢奎章禮部雜議之翰林諸臣上議以謂唐開元間太子賔客薛讓進武后鼎銘云上元降鑑方建隆基為𤣥宗受命之符姚崇表賀請宣示史官頒告中外而宋儒司馬光斥其采偶就之文以為符瑞乃小臣之諂而宰相實之是侮其君也今𢎞景之曲雖於生年紀號若偶合者然陛下應天順人紹隆正統于今四年薄海内外罔不歸心固無待於旁引曲説以為符命従其所言恐啓䜟緯之端非所以定民志事遂寢歴代名臣奏議卷二百七十五
