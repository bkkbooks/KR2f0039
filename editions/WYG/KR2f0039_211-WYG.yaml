body:
  text: 歴代名臣奏議卷二百十一眀楊士竒等撰法令宋英宗治平間知諫院司馬光乞今後有犯惡逆不令長官自劾疏曰臣竊以國家承百王之弊俗化陵夷不肖愚民犯分侵禮無所不至此朝廷所宜留意不可忽也昔賈誼歎秦俗之薄惡以為借父耰鉏慮有悳色母取箕帚立而誶語抱哺其子與公併倨婦姑不相説則反脣而相稽以今閭巷之民旦夕所為如彼數者皆何足言近聞開封府屢有子殺父母者相繼事發以京邑之中猶有如此悖逆之民況於逺方教化之所不及哉臣竊見刑部格勅百姓間有犯惡逆以上者州縣長官量事貶降隠而不言委録事叅軍糾察聞奏刑統叅詳條部内有犯惡逆以上罪者今後刺史以上附表自劾以敦風教責與不責並聽勅裁朝廷近年務行寛政吏有故出人罪者率皆不問或小有失入則終身廢棄以此民有謀殺及毆詈尊長者州縣之吏專務掩蔽縱釋惟恐上聞往往止從杖罪斷遣少肯處以正法盖避自劾之恥務為身謀遂使頑民益無顧憚名敦風教其實壊之王者之政當善善惡惡若寛此悖逆之民以為仁政臣實愚淺未之前聞況教化之失風俗之弊任其責者豈特州縣長吏而已若長吏隠而不言乃使録事叅軍糾察聞奏斯亦難矣臣愚伏望朝廷今後除去上件貶降長吏及附表自劾二條更不施行在京則委糾察刑獄畿内則委府界提㸃在外則委轉運使提㸃刑獄常切覺察州縣官吏如有敢將惡逆不孝不睦等罪寛縱隠蔽不依正法勘鞫斷遣者並畫時糾舉聞奏随其輕重各以故出人罪論若上件諸司不糾舉者委臺諫官察訪聞奏取進止光又乞罷刺陜西義勇狀曰臣昨日上殿為言乞罷陜西義勇事陛下宣諭臣以為命令已行臣退而思之不勝鬱悒終夕不寐深惜陛下此言之失臣案周易復之初九曰不逺復无祇悔元吉祇大也盖言人誰無過雖聖賢亦不能免然聖賢皆能不逺而復故雖有小悔不至於大而終保元吉也其上六曰迷復凶有災眚用行師終有大敗以其國君凶至於十年不克征盖言失之已逺迷而不復無事不凶而人君尤甚故孔子賛之曰迷復之凶反君道也自古明聖之君聞一善言而立為之變更號令者多矣不可悉數唯近嵗大臣自知思慮不熟號令已失無以抑奪臺諫之言則云命令已行難以更改乃遂非拒諫之亂世陛下新臨大政當求善無厭從諫如流之時而亦有此言天下將何望焉且唐室以前諫議大夫拾遺補闕皆中書門下省屬官日與中書令侍於天子之側議論大政茍事有闕失皆得随時規正今國家凡有大政唯兩府大臣數人相與議論深嚴秘密外廷之臣無一人知者及詔勅已下然後臺諫之官始得與知或事有未當須至論列又云命令已行難以更改則是國家凡有失政皆不可復救也如此豈惟愚臣一人無用於時諫諍之官皆可廢也以臣所見但當論其事之得失言之是非不當云命令已行不可改也今陜西一路之民小大皇皇正如在湯火之中若忽得朝廷指揮云所有義勇且住揀刺其已刺手背者並給與公慿放令逐便得出湯火之中死而復生也其誰不歡呼鼓舞感戴聖恩豈有一人云命令已行不當復改耶陛下萬民之父母萬民陛下之赤子豈有父母誤墜其子於井而曰吾已誤矣遂忍不救邪昔舜稱堯之徳曰稽于衆捨己從人仲虺稱湯之徳曰用人惟己改過不吝臣願陛下勿以先入之言為主虚心平意以察臣前後五次所言果然為是為非若其是歟即乞早降指揮罷刺陜西義勇若其非歟即乞如臣前來所奏特賜降黜别擇賢才而代之所有命令已行之言伏望陛下自今永以為戒不可使天下聞之塞絶善言之路也翰林學士張方平請減刺配刑名劄子曰按歴代刑法之制盖自漢文除肉刑而用箠令於後沿革世有增損大體笞杖徒流大辟為法五等至隋髙熲以經世之才議定科律笞以一十至五十杖以六十至一百徒以一年至三年流以一千至二千里大辟以絞斬蠲損前代鞭刑梟首轘裂之法輕重之準識者以為盡天下之平唐室遵用惟加流刑以二千里至三千里然而笞杖皆用竹其徒流者不加杖若加杖者即免役諸犯徒應居作者在京送將作監婦人送少府監縫作在外者供當處官役婦人配舂犯流應配者三年俱役一年加役流者流三千里役三年若家無兼丁與工樂雜用太常音聲人及習天文并給使散使者方加杖免役還充本色皇朝建隆四年太祖皇帝神智英武自立一王之法始建折杖之制一百折二十以次為差杖制用木而大於箠各有重輕之令犯徒者加杖免役犯流者加杖配役其情罪尤重者更為加杖刺配之法逮今百年雖累聖以慈恕御天下欽恤慘怛留神刑典而科禁條章其實煩密四朝編勅自建隆開寳興國淳化咸平祥符天聖慶歴八經詳定門目寖廣其刺配之條比前代絶重前代加役流既不加杖又役滿即放或㑹赦即免今刺配者先具徒流杖之刑而更黥刺服役終身其配逺惡州軍者無復地里之限祖宗之世此條尚稀臣嘗檢㑹祥符編勅刺配之罪四十六條天聖編勅五十四條今慶歴編勅九十九條諸係禁奏取㫖又七十一條比之天聖盖已增倍其間亦有一條該刑名數節詳而究之比祥符勅㡬三倍矣錮械係纍扶老攜幼道路相望不得至配所而死溝壑者盖不可勝計州郡積多往往奏乞住配臣恐更歴年載逺方小郡流配益衆漸成淵藪其强猾不逞念已隔絶鄉里親戚不復更自顧藉厲階患萌亦嘗起於所忽也故臣前曾上言乞差官㨿慶歴編勅及續降勅諸刺配條重行詳定議從減除其情理蠧害顯為人患不可存之鄉閭者須用此法諸縁茶鹽酒麴銅礬冒禁以規財利之𩔖約見行刑名輕重别立居役之法合配逺惡州軍者令實役七年配三千里外者六年千里外者五年配隣州者三年並供當處官役不用赦降原免人情安土且開自新之路減遞送之勞息流離之苦州郡役事亦足資助譬若募本城役兵頗省衣粮之給又以少清刑本上洽和氣消逺方之釁兆廣仁政之大體其於治道實繋慘舒方平又請刪定勅令劄子曰竊見天聖中刪定編勅於今累年比來鄙庸之人意慮淺近不識大體妄陳利害朝廷輕聽往往行下自邉事之後末議蜂起條令錯出舊章殽亂郡縣承用益駮奸吏因縁出入為弊導民媮薄動開爭端亂獄滋豐民用怨苦臣聞天何言哉四時行焉簡易以信之謂也方今之政所謂文敝其民利而巧蕩而弗静勝而無耻為救之道在簡而信臣愚謂宜刋定法令以眀示民選命近臣逹政體通時務者三兩員慎舉京朝官之眀曉法意練習民事者五七員𩔖聚天聖編勅後條令其毛細苛冗者蠲除之違異重複者考正之必事理精審條目簡便有輔於政者存為著令夫子曰古之知法者省刑本也今之知法者不失有罪末矣夫然後官知守法吏息舞文民有措其手足兹當今之切務也知通進銀臺司韓維上奏曰臣近以黜呂誨等勅不由門下封駮司嘗面具論奏及兩上章乞正官法並未䝉聖慈施行臣伏以紀綱法度聖王所以維御邦國使不危而安者也其所措意皆關諸盛衰固不為一日設也譬之猶舟之有維楫馬之有銜轡今有人於此將假二物以出萬里之塗而自毁其維楫絶其銜轡則人人知其有奔僨沈溺之憂矣臣近對崇政殿亦嘗以此理上陳陛下初不省察又以失職求賜罷黜而聖慈再三敦諭不令投進文字臣僶俛而退猶望陛下寤前之失特詔有司修眀舊法以防將來之患而章上輙不出使臣不得少申職業坐守空名以䝉貪禄曠官之謗進退實亦難處伏望聖慈以臣此狀并前兩奏降付中書門下商量施行臣不敢枉道以阿人主之意愛身以壊祖宗之法惟陛下裁處維又乞議恕私罪劄子曰臣數見良吏善人以小過留滯而背公便己之徒不廢遷擢竊尋其端盖朝廷之制私罪雖得輕法常為仕進之累公坐雖大一時被責則復升進矣伏以國家賦禄命官本為治人而無狀之吏廢職以遂茍且之意壊法以行姑息之政計其用意豈復在公夫縁私致罪惡或止身廢職壊法其害及國二者相校孰為輕重伏望聖慈特詔有司議私罪之可恕者稍蠲留礙以通滯材公坐之有害者重加困抑以儆慢吏右正言傅堯俞論審刑院大理寺等處欺罔事狀曰臣伏以附下罔上昔為重辟刑故無小古有通規茍渉於兹詎容緘黙臣近聞大理寺斷鄭州嚴奕公事誤用格條已經裁決輙自舉覺再上殿敷奏中外聞者莫不驚駭縁法寺一司編勅法官錯誤不許陳首頃嵗張价劉述等黜官是也臣恐此條後有衝改伏乞追守以重刑典且使猾吏不得縁而為奸儻此法猶存則大理寺可謂故為罔上矣豈有本司定制而不知者乎始時之誤或有可矜乃敢公然自舉援據謬例上昧朝廷而謾陛下此而可貸孰不能容自陛下新覽萬機百司稍知畏懼日月未久輙肆欺誣臣恐陛下威令自兹虧損伏望窮究重行貶降庶㡬綱紀可以整齊臣屬以子䘮在告不獲即時論列堯俞再論審刑院等處欺罔事狀曰臣近有狀奏彈審刑院大理寺官吏不合舉覺誤斷嚴奕公事援據非例再上殿敷奏臣始疑一司編勅後有衝改盖竊料陛下新總大政勵精為治臣下豈敢遽為奸罔今訪聞審刑院大理寺詳斷諸色公案其所斷法狀並須兩司詳定同具進入如經奏斷後結狀却有錯失其兩司官吏不在舉覺之限此條見今行用況張价劉述等降黜未久耳目相接衆人共悉法官安得不知乃敢公相表裏共為欺謾方今之事無大於此者昔裴度以五坊使追捕平人為大而謂東方用兵為小誠深識治體者也況法吏匿法以舞文罔天子乎不獨如是又欲遂廢成法以自便其髙下之手茍幸無敗其漸將無所不為啓導奸源虧損威柄自此始也臣謂肅正紀綱可以破猾吏之膽在此一舉陛下儻從寛假姑務含容異時雖重為刑戮人且不懼況斷官孟開乃盧士宗親戚固足以察其用心惟陛下留神早賜施行韓琦進嘉祐編勅表曰臣琦等言恭聞古先哲王議事以制不為刑辟盖人情萬端法制一定夫以一定之法而制萬端之情欲輕重得宜古今無易不其難哉國家睿聖相繼承平百年立法本通務歸至當故自建隆以來迄於慶歴之初凡詔令所下綱條既繁則必建局命官一加刪定者豈欲紛更而數變哉亦慮乎執定制而失人情也今之論次所付匪輕夙夜以思懼不稱職臣竊以律設大法不能委曲而生意國用中典至於治平而後詳上既極於哀矜下無容於壅塞凡於闕漏皆得指陳前書之載或疎後令之眀寖密平亭差惑牴牾且多觸禁之民㡬不知其所避舞文之吏足縁之而為奸不有刋裁詎能永久恭惟皇帝陛下法天任徳本道無為恢陶唐畫象之仁隆天乙弛罟之惠永惟庶俗期底大中謂制禮以禁未然豈嘗忘教眀刑而使無犯自亦知方顧兹請比之文日益煩苛之敝几閣之盈難於徧睹錐刀之末虞乎盡争時合當更政其先務乃詔臣等特新編葺得盡詳度於是取慶歴編勅暨嘉祐三年終以前續降條貫凡四千三十一道求中而議就約以書存所便安汰其重複至於名篇而附律先例以舉凡㑹數勅而同一科參舊文而發新意事並出則分從其𩔖禁當立則特為之條皆眀著大防稽合前式臣等又以四海之廣獨見莫周雖當局之勤謂所思之已至及約情而用或在理以猶差必欲成本朝之善經固當合天下之公論首祈博訪亟奉俞音果衆説之畢伸亦寸長而備採復詳慶歴編勅毎條之後必書元降宣勅年月雖云舊體其實文煩今並改注於目録逐條之下以從簡便又刑統所附諸勅及參詳條件凡一百三十四道事雜前朝率多衝改審核之際典者為勞今取其見今可行者已入逐門收載外其刑統内諸勅并參詳條件伏請更不行用應中書樞密院聖㫖劄子批狀合行編録者悉改為宣勅共刪修成一千八百三十四條離為一十二卷内有條目繁多者即分為上中下共一十八卷總例一卷目録五卷凡勅内但行約束不立刑名事理輕者析為續附令勅三卷目録一卷犯者止從違令之坐及録到慶歴四年正月一日後來赦書徳音二卷總三十卷合為一部如得允當即乞特降勅命與刑統律令格式及建隆以來赦書徳音天聖中先編附令勅兼行其慶歴編勅及慶歴續附令勅并嘉祐三年終以前應係海行條貫除今來已編載外各更不行用四年正月一日後續降自為後勅施行自來𣙜茶之法今已刪除其通商之後所立條約自從詳定茶法所條次頒降應未降新嘉祐編勅以前已用舊勅斷遣與奪過公事不在援引新勅訴理之限其一司一務一路一州一縣并在京海行及三司見行條貫自依逐處元編定及續降勅條行用外内有係新編勅兼載與逐司舊制不同者並依新編勅處分盖以敦崇寛大蠲滌細微較然使其易知欽哉本乎惟恤譬夫江河紀地狎玩者誠稀震曜發天威眀之共仰其或多方謹飭庶務持循臨文參考於治宜決事深求於法意自然訟平以息氣感而和能致太平豈獨稱於周禮終成徼幸兹奚取於鄭書臣等道鄙少恩志希無害被詔徒知於竭慮訖功殊愧於淹期或許頒行仍乞以嘉祐詳定編勅為目其新編勅等共三十卷謹随表上進以聞臣無任神宗即位初御史中丞司馬光議謀殺已傷案問欲舉而自首狀曰右臣竊以為凡議法者當先原立法之意然後可以斷獄竊詳律文其餘人損傷不在自首之例注云因犯殺傷而自首者得免所因之罪仍從故殺傷法所謂因犯殺傷者言因犯他罪本無殺傷之意事不得已致有殺傷除為盜之外如刼囚畧賣人之𩔖皆是也律意盖以於人損傷既不得首恐有别因餘罪而殺傷人者有司執文并其餘罪亦不許首故特加申眀云因犯殺傷而自首者得免所因之罪然殺傷之中自有兩等輕重不同其處心積慮巧詐百端掩人不備者則謂之謀直情徑行畧無顧慮公然殺害者則謂之故謀者尤重故者差輕今此人因犯他罪致殺傷人他罪雖得首原殺傷不在首例若從謀殺則太重若從鬭殺則太輕故酌中令從故殺傷法也其直犯殺傷更無它罪者惟未傷則可首但係已傷皆不可首也今許遵欲將謀之與殺分為兩事案謀殺故殺皆是殺人若將謀之與殺分為兩事則故之與殺亦是兩事也且律稱得免所因之罪彼刼囚畧人皆是已有所犯因而又殺傷人故刼畧可首而殺傷不原若平常謀慮不為殺人當有何罪可得首免以此知謀字止因殺字生文不得别為所因之罪也若以刼鬭與謀皆為所因之罪從故殺傷法則是鬭傷自首反得加罪一等也遵所引蘇州洪祚斷例案律䟽云假有因盜故殺傷人而自首者盜罪得免故殺傷罪仍科疏既指言故殺傷人則是因盜謀殺傷人者自從謀法當時法官誤斷不可用例破條遵又引編勅謀殺人傷與不傷罪不至死者並奏取勅裁以為謀殺已傷而罪不至死者即是自首之人按尊長謀殺卑幼之𩔖皆是已傷而罪不至死不必因首也遵又引律䟽問答條云謀殺凡人乃云是舅又云謀殺之罪首盡顯是謀殺許令自首案彼皆謂謀而未傷方得首免若其已傷何由可首凡議罪制刑當使重輕有叙今若使謀殺已傷者得自首從故殺傷法假有甲乙二人甲因鬭毆人鼻中血出既而自首猶科杖六十罪乙有怨讎欲致其人於死地暮夜伺便推落河井偶得不死又不見血若來自首止科杖七十罪二人所犯絶殊而得罪相埒果然如此豈不長奸況阿云嫌夫醜陋親執腰刀就田野中因其睡寐斫近十刀斷其一指初不陳首直至官司執録將行栲棰勢不獲己方肯招承情理如此有何可憫朝廷貸命編管已是寛恩而遵更稽留不斷為之伸理欲令天下今後有似此之𩔖並作減二等斷遣竊恐不足勸善而無以懲惡開巧偽之路長賊殺之原奸邪得志良民受弊非法之善者也臣愚以為大理寺刑部所定已得允當難從許遵所奏作案問欲舉減等而科今來與王安石各有所見難以同共定奪伏乞朝廷特賜裁酌施行知登州許遵奏婦人阿云於母服内與韋阿大定婚成親後嫌韋阿大夜間就田中用刀斫傷縣尉令弓手勾到阿云問是你斫傷本夫實道來不打你阿云遂具實招通合作案問欲舉減二等大理寺不合作謀殺已傷絞罪斷遣下刑部定得大理寺允當遵不服詔下光與王安石定奪安石以為遵議是後朝廷竟從安石議熈寧二年御史中丞吕誨論重辟數多狀曰臣聞先聖立法眀刑者非以為治將以救衰亂之俗也然世輕世重因時之弊齊其非齊殺以止殺故犯治則重犯亂則輕斯馭威輔正之大要也降及三代稱治莫盛於漢唐髙帝約三章之始人心忻慰逮文景有刑措之風比隆成康貞觀中斷死刑二十九人開元中五十八人得為興隆之盛矣我朝興運一百餘年累聖繼述仁悳純被四方無事刑未至清天聖中嵗計重辟數千而後有増無減漢唐之天下亦今之天下漢唐之官政亦今之官政斷獄繁簡何其遼哉臣竊以古之新一號令必示於人俾其知禁命一官守必先風教今之所理與古相反夫訓道不眀則愚民陷焉人有過教未施而刑已加焉欲遷善逺罪而道亡繇也任刑之失正在於此加以賦斂日急力役日煩山澤之利籠入殆盡生齒之聚游手過半時豐儲嵗食者百無一二不幸水旱相繼流徙無定其等死則何所不至非不忌法勢使之然也矧閭井之人有不事事者悉皆循習以為常州縣熟視而不為除去奸吏養之以濟惡一有敗露抵法者皆良民平時誘脅之致職捕寇者罪爾朝廷推恩與時滌盪每嵗曲赦三年大霈蒙活者雖衆自新者無㡬重辟安得有少衰也觀今之用文大率生刑入於重死刑出於輕犯笞杖者在民則或黥或配在官則衝替停任皆出特㫖犯絞斬則遂成疑獄奏讞既上則例皆曲貸舞文者附㑹其事出入死生在於掌握使幽寃無以訴刑之不清殆為此也廷尉天下取平之今又欲以謀殺通守惠奸長惡莫斯之甚王符曰賊良民者莫大乎數赦孔眀相蜀不赦而國治王通謂無赦之國其刑必平數子者皆知識㡬微通乎世務豈無好生惡殺之意盖知輔政之道本於無刑矣獨唐太宗用是而治嘗詔侍臣曰我有天下以來絶不放赦令四海安静非常之恩也貞觀之刑不得不簡此其眀效矣臣伏望陛下至眀燭理盛徳圖新總攬權綱欽恤刑典法網宜疎畧使之易避禁防宜髙峻使之不越風俗大化屬於循吏號令謹於反覆律文戒於揺動凡有赦恩無失有罪惟有詿誤與之原免仁慈如是而推廣則天下之訟必清重辟之奏必簡太平之治不難成矣狂愚所慮仰副眀詔惟聖智詳擇海隅幸甚三年二月中書上刑名未安者五其一嵗斷死刑㡬二千人比前代殊多如强刼盜並有死法其間情狀輕重有絶相逺者使皆抵死良亦可哀若為從情輕之人别立刑如前代斬右趾之比足以止惡而除害禁軍非在邊防屯戍而逃者亦可更寛首限以收其勇力之効其二徒流折杖之法禁網加密良民偶有抵冒破傷肌體為終身之辱愚頑之徒雖一時創痛而終無愧耻若使情理輕者復古居作之法遇赦第減月日使良善者知改過自新凶頑者有所拘繋其三刺配之法二百餘條其間情理輕者亦可復古徒流移鄉之法俟其再犯然後決刺充軍其配𨽻並減就本處或與近地凶頑之徒自從舊法編管之人亦迭送他所量立役作時限無得髠鉗其四令州縣考察士民有能孝弟力田為衆所知者給帖付身偶有犯令情輕可恕者特議恕罰其不悛者科決其五奏裁條目繁多致淹刑禁亦宜刪定詔付編敕所詳議立法神宗時韓維議謀殺法狀曰臣等看詳王安石司馬光所論阿云案内情節勅律悉已眀備所爭者惟因字而已以光之説則謀不得為傷之因謀殺已傷傷不得首合從絞罪以安石之説則謀得為傷之因謀殺已傷傷不得首所因得首合從原減臣等竊尋聖人制法之意其大畧有三有量情而取當者有重禁以絶惡者有原首以開善者盖損傷於人有慘痛輕重之差故刃傷者坐以徒他物拳手傷者坐以杖其義足以相償而止是量情而取當者也畜謀伺便致人於死非重絶之則相仇者不禁故謀殺已傷者從絞是重禁以絶惡者也茍殺人未至於死於物尚可以償於事猶可以自遷者皆得以首是原首以開善者也三者雖制法各殊其於使人逺罪而遷善其義一也議者見損傷不許自首謀殺已傷從絞便謂謀殺不通原首是未盡聖人制法之意而於律文有所不達也律之正文著不得自首者凡六科而於人損傷不在自首之例其下注云因犯殺傷而自首者得免所因之罪仍從故殺傷法此正恐後人惑於損傷不得自首便將謀殺已傷之𩔖引用律文所以特發此注也然而於自首者但令免所因之罪而尚從故殺傷法者此尤見損傷不得自首之意甚眀何則所因之謀罪雖見原免而傷者還得傷之罪殺者還得殺之刑也且造律者於器物至不可備償則不許其自首今於損傷尚有刑可以相當而必令不得首其可悔之謀罪而即償以死恐不盡聖人好生之心而以開愚民改惡之路夫殺人者死傷人者抵罪此古初立法之本意也然傷人之惡其狀萬殊有因刼殺而傷者有因謀殺而傷者古初之法既不足以禁奸故後人酌其輕重之宜增以絞斬之坐以補前之未備因刼殺而傷者則增至於斬因謀殺而傷者則增入於絞向使不因先謀則不過徒杖參等之科而已豈至深入於絞乎今若首其先謀則傷罪仍在是傷不可首而因可首則謀為傷因亦已眀矣又案律家所以設首免之科者非獨開改惡之路亦恐犯者自知不可免死則欲遂其惡心至於必殺又罪人未獲則追擾逮捕酷及平民緜嵗踰時公私受害若許其自首俾從寛宥則罪人斯得刑獄無留公私之害一朝而息則其為益盖不輕矣今若由此著為定論塞其原首之路則後之首者不擇輕重有司一切案文殺之矣朝廷雖欲寛宥其可得乎茍以為謀殺情重律意不通其首則六科之中當著謀殺已傷不在自首之例也疏議引盜殺為例王安石所謂舉重以包輕是也盖律以强盜傷人為斬罪而謀殺已傷為絞刑假有羣盜於此共刼一家將至其門知有人守禦遂謀殺之而入若其不死而來首則强盜之斬罪已免所因而見原謀殺之絞罪以不得首而就死用刑如此豈不失輕重之差乎難者又以為謀殺得免所因有自絞刑而得杖罰者則為己輕是又未曉原首之意也人之惡莫大於謀反其暴横莫甚於殺人而奪財並於自首得從原減何獨於匹夫之相仇而必欲致於死也夫中下之情善惡相混糾紛反覆未始有定故小人之於罪惡有未作而悔者有方作而悔者有已作而悔者今法家以謀殺徒三年之罪未行兇以前自首故得全原已傷者其事已行遂不許自首便從絞坐即如此何以待方作而悔者其人已死在事有不可追之理於刑有不可逭之義方作而悔者其人尚存乃令與已殺者一坐以死是豈盡用刑之次序哉盖聖人之於不仁無已甚之嫉而於奸惡有怙終之殺今方作而悔得為怙終乎首而不原不為已甚乎夫造法者常本人之大情而不能曲盡情之變態古人所謂律設大法是也議者乃多引竒罪以責律文之不合若然恐雖沒世窮年而議卒不定也且今律所不備别以後勅從事者甚衆何獨怪論也請以謀殺一事言之案編勅節文謀殺於人若投棄人於水中并崖險處或以諸物縊繫及填塞口鼻但意在致人於死偶獲生免并扼捽捶打要害之處已死復生者以上雖不見血即同已傷之法又謀殺人傷與不傷情理兇惡而至死者並奏取裁勅茍律文自備則此二條何為而設也荀卿有言曰法而不議則法之所當至者必廢然則法必待議而後行所從來久矣今令所因之謀得用舊律而原免已傷之情復以後勅而奏決法以正其本議以盡其𩔖則何謂而不可也臣等以為宜如王安石所議便韓絳嘗請用肉刑曾布上議曰先王之制刑罰未嘗不本於仁然而有斷肢體刻肌膚以至於殺戮非得已也盖人之有罪贖刑不足以懲之故不得已而加之以墨劓剕宫大辟然審適輕重則又有流宥之法至漢文帝除肉刑而定笞箠之令後世因之以為律大辟之次處以流刑代墨劓剕宫不惟非先王流宥之意而又失輕重之差古者鄉田同井人皆安土重遷流之逺方無所資給徒𨽻困辱以至終身近世之民輕去鄉井轉徙四方固不為患而居作一年即聽附籍比於古亦輕矣況折杖之法於古為鞭朴之刑刑輕不能止惡故犯法日益衆其終必至於殺戮是欲輕而反重也今大辟之目至多取其情可貸者處之以肉刑則人之獲生者必衆若軍士亡去應斬賊盗􅂍滿應絞則刖其足犯良人於法應死而情輕者處以宫刑至於劓墨則用刺配之法降此而後為流徒杖笞之罪則制刑有差等矣知審刑院蘇頌奏乞今後衝改條貫並委法官詳定疏曰臣竊以國家承平百年遺文墜典罔不修舉固已跨越漢唐規模宏逺矣而於法令之間猶有所未盡者豈非前後論議之臣不能推原其本茍徇一時之便遂著而為令後之有司用之小或乖戾又復更易是致朝廷憲章未得一定夫聖王之法欲其簡約而眀白使人易避而難犯然後垂之久逺為不刋之典如唐之十二律本朝之刑統是已雖歴數百年其間勅條之更改者多矣而二書獨不廢者以其得簡眀之意故也自編勅之興號為繁密而中間衝改率不過一二十年又復重定盖文繁則易改事宻則難悉只如嘉祐編勅頒行未數年而續降散勅又增於前日以此無知之民至有輕犯於法舞文之吏得以髙下其手其敝盖在乎更改不常耳臣去嵗任淮南轉運使日承准三司行下當年九月三日中書劄子為據江西轉運司及江淮發運司起請䖍吉等州新船借裝一運上京東排岸司等處不得擅行截撥條約一道計四千七百餘字臣看詳大抵只是約束不得截撥新船往不係指定路分則編勅已有留納州府違之者自當嚴斷矣其添入兵梢等候合納處米鈔回歸梢工科違制兵士嚴斷若是創立上項刑名只當於本條下添入此一節可矣不必具載行遣使州郡煩費抄録若欲出榜曉示則數千餘言有司看覽尚或不悉豈庸愚兵卒能盡曉邪以此言之備録行遣徒有惑亂都無所益臣欲乞今後應有臣寮等起請刑名並委法寺及三司等處同共檢詳編勅果有未備即於門目内意相附近處添減裁定眀言於某條内添減計若干字或是創立新條亦眀言於某條後添入一條計若干字其衝改者即云某條自某字至某字計若干更不行用然後奏請頒行諸路便令諸州軍於編勅内添入逐件事節訖奏其先行下自降嘉祐編勅以後續降散勅亦乞委法官將逐件事節與編勅相叅重行刪定候了畢日依此頒行仍眀言多少條件各合附在某門目中或增減或衝改别立條目共計多少事件若干字數分眀别白頒降諸路使州郡用法知所適從免令法吏檢坐之際有所隠漏致出入刑名其散勅即乞更不行用所冀三尺之法無前後之差畫一之規載清静之美實治道之所先急者也頌又請重議加役流法疏曰臣聞曩嵗嘗有議者欲復肉刑將以寛減重辟而以此法久廢難以猝行又聞頗患配𨽻之人轉徙逺方監驅促迫經渉寒暑强者有奔亡之虞弱者有疲羸之困思革其弊宜求厥中昔漢文帝感一女子之言而制髠鉗代肉刑則有城旦鬼薪司寇之差唐太宗納裴洪獻之議而立加役流代斬趾則有三嵗居作之限今欲寛省嚴誅又憫配𨽻轉徙之勞臣愚以謂莫如重議加役流法取當黥貸者依條斷罪髠髮鉗足晝則居作夜則置之圜土實滿三嵗然後釋之中間雖逢恩宥未滿嵗則不在原免之限其初釋放者仍送所居鄉貫㡬察其出入又三嵗不犯故為之罪乃得聽從便其無鄉貫者隣近州縣拘管㡬察如前雖有兇頑之人而更三歳勞役之苦且足以懲艾矣復有鄉保㡬察之嚴又足以戒懼也如其性實兇暴放釋之後不知悛改復為人患則誅之可也投之四裔可也如此措置不惟省逺道奔亡之患又足以開其自新之路化暴惡為良民使愚俗知教化亦省刑止殺之一端也臣才識短淺不周世務姑奉詔㫖勉强罄竭所見如此非敢謂是然禮刑之論實繫朝廷事體伏望聖慈寛其罪戾特賜裁擇庶幾塵露少裨山海彭汝礪上奏曰刑罰之設或輕或重必也惟其當而已舜命臯陶之言曰與其殺不辜寧失不經然則先王之意非不欲輕也臣以職事斷獄至於强盜而疑之夫白晝䝉金革叫呼跳梁係累其老稚而奪其財者為强盜矣以饑餒故計為狗竊遇主人而或傷之者亦為强盜隂謀首惡唱其徒而先之以相賊害者其罪死宜矣蠢愚柔懦迫脅而從之或致有傷則其罪亦死以情論之則如不同以法論之則比等臣切以為過矣盖先王之用刑皆不得已也而至於殺人則尤重也可以刑可以無刑聖人曰無刑可以殺可以無殺君子曰無殺凡此皆忠厚之至也臣欲乞應先强後盜先盜後强而傷變主者論如今律持刃先盜後强不持刄先强後盜傷變主者其首死其從者流其有不持刃先强後盜傷變主者流其從者徒情理切害者特許奏汝礪又論刑名不當取決執政狀曰臣聞刑部大理寺近年用法多不守一而其刑名取決於執政所欲深則以重論所欲貸則以輕論然則輕重在有司不在法也臣切謂法者天下之平也而大理者法之所寓也大理知守法而已人君有不能奪也故于定國斷獄人自以為不寃張釋之論法天下無寃民今以取決於執政則大理審刑㡬無用矣以有司斟酌以有司定計如此則有司之守得上下之體定而中書總其成焉輕重之失得察而罪之使出於中書則審刑大理無所矜慮而人亦無敢言者矣而有司之守亡上下之體改吏將從而為奸大臣將縁而害正民將困而失所矣臣欲乞如事理顯白敢以疑慮為名切欲廵㕔商量仰中書樞密院御史臺覺察以聞汝礪又乞懸法示人狀曰臣為廬州職官以職事治獄而怪鄉閭平民非有饑寒之迫仇讎之報而徇情冒法自陷於重獄訊之盖亦不知法之至於此極也臣惻然傷之以謂聖人之於民所以愛養之厚有養有教有戒其或至於用刑者皆不得已也豈欲陷民於不可見耶盖周官之法凡治象之法教象之法刑象之法皆以正月陳於象魏或以木鐸徇之以警於衆或以時月讀之以教於衆而於刑禁尤悉也小宰憲宫刑士師憲禁令訝士諭罪刑讀誓禁布憲憲邦刑以達於四海此民之所以無憾而刑可以至於不用也後世法令一藏於有司而民未嘗知之及陷於罪然後從而刑之盖亦㡬於罔民矣臣欲乞凡國之政教刑禁之要各以時憲於州縣鄉保使有司讀諭而教之曰其言如是則其法如是其罪如是則其刑如是使天下之民知天子所以教愛之如此而得有所避也刑可得而省矣哲宗元祐元年光又乞不帖例貸配劄子曰臣勘㑹守法者有司之職揆道者君相之權伏見從來命官犯罪大理寺既依法定斷更令刑部檢例或追官或勒停或衝替或差替之𩔖朝廷依而行之謂之特㫖凡人之罪犯千端而事體萬計豈可求其比𩔖能得正同又既謂之特㫖當臨時斷在朝廷若先令刑部帖例朝廷依此施行乃是輕重之權返在有司也欲今後應命官犯罪大理寺既定斷委刑部看詳内有法重情輕或法輕情重並具狀申中書省更不帖例委中書省官相度情理輕重同共商量除依法外自貸命編配至特放臨時擬定進呈取㫖施行其百姓犯大辟罪諸州奏稱刑名疑慮及情理可憫者大理寺依法定斷委刑部看詳委的有疑慮可憫之狀即具狀申門下省更不帖例委門下省官相度事理同共商量臨時擬定或依法或貸命編配進呈取㫖施行光又乞令六曹刪減條貫劄子曰勘㑹近嵗法令尤為繁多凡法貴簡要令貴必行則官吏易為檢詳咸知畏避近據中書門下後省修成尚書六曹條貫共計三千六百九十四冊寺監在外又據編修諸司勅式所申修到勅令格式一千餘卷冊雖有官吏强力勤敏者恐不能遍觀而詳覽況於備記而必行之其間條目苛密牴牾難行者不可勝數昨者條貫初下吏部侍郎左遷差注不行者數日不免再有奏陳復依舊法必料諸曹條貫皆有似此拘礙難行者今欲特降指揮下尚書六曹委長貳郎官同共看詳本曹新舊條貫内有海行已有及全無義理於事無益防禁太繁難為遵守者盡令刪去惟取紀綱大體切近事情朝夕不可無者方始存留作本司條貫限兩月申奏施行翰林學士知制誥蘇軾論不可每事降詔劄子曰臣聞之孔子曰天何言哉四時行焉百物生焉天何言哉天子法天恭己正南面守法度信賞罰而天下治三代令王莫不由此若天下大事安危所繫心之精微法令有不能盡則天子乃言在三代為訓誥誓命自漢以下為制詔皆所以鼓舞天下不輕用也若毎行事立法之外必以王言随而丁寧之則是朝廷自輕其法以為不丁寧則未必行也言既屢出雖復丁寧人亦不信今者十科之舉乃朝廷政令之一耳況已立法或不如所舉舉主從貢舉非其人律犯正入已贓舉主減三等坐之若受賄徇私罪名重者自從重雖見為執政亦降官示罰臣謂立法不為不重若以為未足又從而降詔則是詔不勝降矣臣請畧舉今年朝廷所行薦舉之法凡有七事舉轉運提刑一也舉職司二也舉通判三也舉學官四也舉重法縣令五也舉經眀行修六也舉十科七也七事輕重畧等若十科當降詔則六事不可不降今從一事一詔則䙝慢王言莫甚於此若但取諫官之意或降或否則其義安在臣願戒敕執政但守法度信賞罰重惜王言以待大事而發則天下聳然敢不敬應所有前件降詔臣不敢撰七年軾知揚州論倉法猛政上奏曰臣竊謂倉法者一時權宜指揮天下之所駭古今之所無聖代之猛政也自陛下即位首寛此法但其間有要劇之司胥吏仰重禄為生者朝廷不欲遽奪其請受故且因循至今盖不得已而存留非謂此猛政可恃以為治也自有刑罰已來皆稱立法譬之權衡輕重相報未有百姓造銖兩之罪而人主報以鈞石之刑也今倉法不滿百錢入徒滿十貫刺配沙門島豈非以鈞石報銖兩乎天道報應不可欺罔當非社稷之利凡為臣子皆當為陛下重惜此事豈可以小小利害而輕為之哉臣竊見倉法己罷者如轉運提刑司人吏之𩔖近日稍稍復行若監司得人胥吏誰敢作過若不得人雖行軍令作過愈甚今執政不留意於選擇監司而獨行倉法是謂此法可恃以為治也耶今者又令真揚楚泗轉般倉㪷子行倉法網運敗壊執政終不肯選擇一强眀發運使以辦集其事但信倉部小吏妄有陳請便行倉法臣所未喻也今來所奏只是申眀元祐編勅不過嵗捐轉運司違法所收糧綱税錢一萬貫而能六百萬石上供斛㪷不大失陷又能全活六路綱稍數千牽駕兵士數萬人免陷深刑而押綱人貟使臣數百人保全身計以至商賈通行京師富庶事理眀甚無可疑者但恐執政不樂臣以疎外輙議已行之政必須却送戸部或却令本路監司相度多方沮難決無行理臣材術短淺老病日侵常恐大恩不報銜恨入地故貪及未死之間時進瞽言但可以上益聖徳下濟蒼生者臣雖以此得罪萬死無悔若陛下以臣言為是即乞將此劄子留中省覽特發徳音主張施行若以臣言為妄即乞并此劄子降出議臣之罪歴代名臣奏議卷二百十一
