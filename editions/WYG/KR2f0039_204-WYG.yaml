body:
  text: 歴代名臣奏議卷二百四眀楊士竒等撰聴言宋哲宗時右正言朱光庭上奏曰臣竊以自古以来甚盛徳之朝必兼天下之智以為聰眀中庸曰夫婦之愚可以與知及其至也雖聖人有所不知焉詩曰先民有言詢于芻蕘故敢諫之鼓進善之旌誹謗之木皆所以通治道而来諫者也固未嘗限以日月伏覩六月詔書俾天下臣庶並許實封直言此盛徳也必使知無不言而言無不盡然後與諫鼓善旌謗木之設初無以異若乃上之治底于無為下之人至于不議然博訪之道不可少廢況聖政日新方欲聞所未聞豈可於求言之始為日月限㢤欲望聖慈復詔天下臣庶依今年六月詔書並許實封直言更不限以日月如此則輿情盡達朝政常無壅塞之弊而聖治可不勞而成矣光庭又上奏曰臣竊以事之機宻者不可以口陳心之精㣲者固難以書盡夫天下之廣萬機之繁其間情偽萬状取舍兩途一失其當咎縁而生朝廷增置諫貟實司陛下耳目之任凡天下之事無不得言者若忠賢之未進姦佞之未除刑賞之失中政令之違常如此之類皆得以聞上使之日對清光獻納論奏尚虞未盡況天門九重邈若霄漢儻令祗上封奏不得面覩威顔則事之機宻心之精㣲何縁盡達伏自陛下臨御以来除執政外餘皆未許上殿臣遂于去年十二月内奏乞上殿至今未奉俞音兼臣或聞故事改元後許令臣寮上殿今已改元矣望出自宸斷檢會故事早賜指揮令䑓諫先次上殿上以廣陛下之聦眀下以盡愚臣之職事光庭又上奏曰臣竊以自古人君致功徳巍巍與天地並者積衆善之効也夫以天下之廣萬機之繁以一耳目兼聼周視欲事事中理其要道莫過扵取善而已大凡好勝自古之公患苟不以事之善否而皆欲莫予違則拒人於千里之外矣夫舍己從人唐堯之盛徳也與人為善虞舜之盛徳也以數聖人之盛徳猶聞取人之善恭惟陛下臨御以来盛徳日新百度脩舉求賢如不及從諫如轉圜與堯舜禹湯之盛徳無以異前日權給事中王巖叟封駮安燾知樞宻院不當陛下直令下吏部施行更不令給事中書讀臣竊以謂非取善之道也燾之不􅄑無公望陛下又素知之今日聖政如此退大姦進大忠天下翕然咸稱有古聖帝眀王之風在燾之躐等超陞一事何憚而不改耶且居陛下耳目之任者不敢不盡言盖思所以稱陛下付委之意若俾燾却居舊職任用不為不重告命必須書讀紀綱方始不紊臣願陛下以堯舜禹湯盛徳取善為事則臣之職可以無愧伏望聖慈㽞神天下幸甚光庭又上奏曰臣竊以諫諍之臣為天子耳目之任救正朝廷之事貴於其初凡政令未安于理除授或非其人扵命未行之日俾先知之則獻納之間事體甚便近日朝廷所闗報者皆是已行之事言者急思救止其道無繇又不免暴于人聽不若於命未行之前都無轍跡足以成朝廷之美故事諫臣許隨宰相入閤盖當議論之初便思救補不俟命令已行然後攻其失也臣欲乞朝廷今後凡有政令除改才到門下並令給事中即時闗報䑓諫所貴先事為慮所補不細又足以成朝廷之羙伏望聖慈詳酌施行光庭又論張舜民罷言職䟽曰臣切以正直之臣以遭時遇主為盛事盖敢言之氣雖天與有素非聖君養之厚容之深則敢言之氣未易伸也歴古而来青史之上直臣無㡬不獨天生其才難而遇聖君養其才尤為難也恭惟陛下自臨御以来以堯舜之徳養直臣之氣以堯舜之量容直臣之言故去天下之邪如拉朽除天下之弊如反掌千載以来一人而已方今内外清眀百度修舉人民乂安此已試之效也唯在久而不息則堯舜巍巍成功不難致矣臣切見吏部闗報䑓官張舜民為言文彦博照管劉奉世特罷言職臣以謂御史之職自許風聞言事使舜民之言盡中義理陛下固當行之設若未當止于不行而已豈可遽罷其職也今陛下從而罷之豈不沮敢言之氣㢤切以古今之治天下唯使忠勁之氣充塞朝廷然後紀綱正法度立姦邪無間而入臣與舜民接跡頗熟稔聞其有正直之莭司馬光賢之薦充館職陛下擢寘御史士論皆以謂得人今視職纔兩月正直之莭未少伸一言不合大臣已聞罷職自陛下臨御以来天下之人唯知從諫如不及聖徳冠古今若因舜民一言不合大臣遽使罷職致陛下今日有逐言事官之名臣為陛下惜之伏望聖慈開天地之量容養正直之臣以増敢言之氣特降聖詔還舜民舊職以盡其材臣愚不勝惓惓之忠右諫議大夫孫覺上奏曰臣竊以後世諫臣為天子左右耳目之官三代以来官不常置孔子曰天子有諍臣七人所謂七人者三公四輔是也天子一言一動七人者在焉有過不及隨輙正之故人君之失不聞于外不見于下尚書曰予違汝弼汝無面從退有後言是也後世七人者不任其責始置諫官唐太宗毎召宰相平章必遣諫官俱入小有頗失隨即箴規以此見諫官之職必待命令已行闕遺宣播然後從而救之亦已晚矣唐太宗雖不責宰相以七人之職猶使諫官與聞政事國家以来雖不全用唐制然祖宗朝諫貟亦不為少前後以言舉職見于國史磊落相望大扺于人主躬親聽決獨斷萬㣲之際諫貟常少先朝是也人主委任柄臣責成攬要之時諫貟常多仁宗荘獻太后是也臣竊以今者皇帝陛下冲年嗣位太皇太后同攬政機此宜多設諫貟以廣視聼庶㡬有補萬一若其人庸下姦邪自宜加罪竄斥以肅百寮若其人直方無所附麗則其所言必有可采如六典諫大夫補闕拾遺凡兩貟今臣獨貟供職不唯駑蹇朴陋無所聞識又綿力寡助深恐不逮伏乞特賜指揮依六典備置諫官覺為給事中又乞令䑓諫先次上殿䟽曰臣昨自先帝祔廟後曽具劄子乞賜指揮許臣寮奏對庶幾人情不至壅隔至今未奉聖㫖竊以人情壅隔則乖離疑惑之患生假竊盜亂之禍作于易乾下坤上為泰泰者上下交而其志同也坤下乾上為否否者天地不交而萬物不通也今者皇帝陛下太皇太后陛下大統萬國天臨四方即位以来且一年矣群臣望清光聆徳音者三省樞宻院大臣八人而已使此八人者聦明有餘論議皆當中立而無所附麗方正而無所阿私可也萬有一人焉不足以任此而曲折反覆不可以見于文字而御史不得請對諫官不得面陳則陛下何由而知之且諫官之設本以拾遺補缺為任密啟面陳乃其職也今一切須具章䟽劄子然後可得上聞則與夫百執事等矣伏望聖慈特許諫官御史上殿奏事尚書左丞劉摯論群罷䑓諫是自塞絶言路䟽曰臣伏自罷去言職待罪都省以来不復章䟽論事盖以謂職在執政苟有所見自當與同列僉議進對顯奏公論而行之不當私有密請恐非謂直道事上也必料陛下亦已察臣之意在于如此而已今乃有不得已之事須至一言冀效萬一十五日吕公著送下内降批㫖罷諫官梁燾等或移易或免黜者共十數人臣切料陛下必以近日張舜民事言者救觧紛紛不已雖然仁恕包涵而又欲加彈壓故不行重責但罷其言路此足以見聖度廣大愛惜數人之才黽勉而為此也臣觀舜民之論文彦博止有照管劉奉世一言而已此一言小事也奉世有才可用方出入彦博門下受其知遇而照管之乃大臣所宜則于彦博何傷兼彦博自不以槩意而議者私憂過計恐彦博有所不樂致陛下為罷舜民舜民之罷亦小事無足道也而言事者若欲論之一再言足矣何至議論蜂起相繼並作紊瀆天聼至煩宣召申諭尚且不已誠有罪也夫舜民輕言以及元臣一失也議者欲慰説大臣而罪御史又一失也言者之救舜民以全言路而不能體聖眀優禮故老之意又一失也今朝廷又從而移罷䑓諫則恐不止于三失而朝廷之失最處其大者也此臣所以夙夜徬徨深為陛下惜之也古之賢君眀主唯以開廣耳目優養直臣為甚盛之徳故曰主聖則臣直唯堯舜及三代之盛王乃有其事而陛下今優游行之自前嵗以来聞善若飢渇從諫若轉圜䑓諫言苟可采無不行者雖有失當一切包納故臣子無戮辱之懼罔避權要舒心展誠知無不言所以養就今日忠直之氣然上下姦邪摩牙切齒嫉惡䑓諫亦已久矣夫䑓諫以區區小官上則觸龍鱗而犯忌諱下則結仇怨而取禍患不知其何所利也盖恃陛下之主張謹其官守以盡事君之義耳一旦以小故摧沮罷去之適足以快憎怨之氣開私枉之門非朝廷福也若言者有所私徇渉于傾陷近於朋黨則不可不深責而痛治之乃若出于公議則雖有强直乖忤之言古之聖人一皆容之攷於傳記不可勝數今夫以一言旁及大臣而罷之則後来者不肯言大臣矣以一言彈給事中而罷之則後来者不肯言近侍矣以多言而去之則後来者循黙不言矣以剛勁而黜之則後来者柔和取容矣人情不逺相與為戒必然之理也深惟陛下恭黙未言太皇太后陛下簾門行政之日正宜大開聦眀以廣萬事之聼而乃杜絶言路是自蔽其耳目也言路一塞何事不生天下之朋黨大吏之私邪百官之罪惡逺方之利害陛下何由一一知也今成命已行臣不敢盡乞改正所以區區言之者非獨為數人盖所惜者朝廷事體爾内梁燾孫升外議皆以為責之太重臣欲望聖慈詳酌寛此二人之責還其職任以救言路以扶持忠臣之氣且天下之廣莫知其詳但見䑓諫官連群罷去凡與前日之事不同必疑謂朝廷厭倦言者則姦諛者張目攘臂而動矣後来所用未必皆得如此數人邪正既不可知言路風采一變豈不有損盛徳之治臣天生愚直孤立於朝受陛下異恩至深至厚夙夜思報唯有竭誠以主公道不敢雷同倡和茍有所見可以裨補若不盡言于陛下則將何告訴也因此得罪亦不敢辭伏望赦其狂愚特賜詳察開允摯又上奏曰臣備位左右憂深責重雖夙夜盡瘁恐終無所補報切謂國家先務莫如得人近臣事君唯有進善臣伏見知陳州傳堯俞知齊州王巖叟知潞州梁燾通判虢州張舜民知廣徳軍賈易皆早蒙陛下識擢分任言責不幸志業未伸謗嫉横作罷職補外各已數月按堯俞等皆忠直之臣守正不撓任職未久知無不言此固陛下素所奨愛未必棄捐然臣私憂過計恐有補外漸久朝廷漸亦忘之不避僣越輙效一言夫人才不同所用亦異或長于政事或善于文學或言語侍從或行義師表今多士盈庭於此數色固無乏事至于公忠朴直不避仇怨不附朋黨一節自守可當大事肯為國家效死守法之人則非獨今日難求也從前世以来不易得也譬如人之一身耳目手足肌膚爪髮闕一誠不可然而强四支者必以骨為主故自古人君崇奬忠直謂之骨鯁之臣傳曰山有猛獸藜藿為之不采言猛獸在山則山中之物不敢犯者如直臣立朝則姦佞有所畏憚也今堯俞等皆有骨鯁大節公論所重邪黨所畏況當今陛下明辯忠邪汲汲進賢之日而反使數人流落外郡為姦邪所快臣實痛惜兼觀近日言語稍異於昔雖章奏交上議論不少然而所推薦者非豪强則親舊所排擊者非孤寒則怨隙明比之心公無忌憚陛下試取近来言事章䟽密察其意其間心出於至誠言出於忠信憂國如飢渇謀議知大體有如堯俞者乎孤立不懼彈劾權强赤心事上略無私意有如巖叟者乎守正堅確不憚大吏不黨同列嫉邪指惡有如舜民燾及易者乎以此驗之真偽立見今聖明在上方修善政而羣小不快爭進於下布列朋黨造作謗議欲以傾陷善良動揺政令紛紛籍籍甚可懼也然上下相罔誰為陛下辯之者當此之時唯且收聚人才使在朝廷若正直之路廣則邪枉之志銷而治道成矣臣踈賤拙直天下無毫髪親黨之助獨䝉二聖選㧞致位於此恩至厚矣則報効之心豈宜自比衆人故當知無不為寧敢避罪臣願聖慈深賜省察特發睿斷召此數人忠正之臣入備任使以慰公議以消朋黨幸甚御史中丞傳堯俞論張舜民以言事罷職䟽曰臣等竊以御史之任以敢言為先自昔以來常難其選臣等昨被詔同舉御史兩員累月之間諮詢考察於千百人中乃得張舜民一人臣等素皆不識但見衆所共推學行兼美安貧守道不汲汲於進取熈寧元豐間嘗慷慨論時事言辭激切有諫臣之風司馬光嘉其端亮薦之館職關西士人稱為第一臣等取以應詔既至䑓中與之相接見其忠淳朴直心無所附嚮言無顧避臣等深以得人自喜居職未乆今以一言旁及大臣而遽罷之甚非陛下所以命臣等擇御史之初意也御史為天子耳目或懐姦挾附大臣則所當聲其罪而黜之也豈有不欺於君反以指摘大臣為罪也雖或論事有誤要之用心則忠欲厲事君所宜奬借儻加摧抑誰肯盡誠此臣之所為陛下惜也若要俛仰浮沉無所忤犯巧於自全之人以當言職固不難得然國事何如哉伏望陛下察求材之甚難亮進忠之非易恕其小失而録其大莭復舜民於言路以全朝廷之美臣等不勝幸甚堯俞又上奏曰臣近有劄子論列不當罷張舜民監察御史事至今未䝉付外施行臣竊以陛下自臨御以來未有此舉臣既謂朝廷大體須當愛惜又謂陛下全徳將遂虧缺所以歎惋憤懣不能下食而安寝者也言事之官稍及大臣不原其情遽加廢黜此實不足為法於天下也陛下以髙世絶人之資事皆抳於未萌而公開此端不防微而杜漸故臣深以為惑也陛下必謂事不在我但欲以慰安老臣出於至誠無私故決意行之爾殊未知既害大體且無益老臣若彦博於此恬然自處臣恐彦博遂失賢士大夫之心而為衆手所指矣是陛下欲愛之而實損之也臣聞人誰無過善於能改愚臣死罪深以此舉為陛下之過矣雖然君子之過如日月之蝕焉其過也人皆見之其更也人皆仰之今衆人延頸張目以待更焉不知何憚而不為也自昔人君以改過為難者無他恐事數移則威權不重爾臣獨以為未之思也夫興事不計當否而執之如金石此何益於威權哉盖用術者猶可以激而為之其状隠微難於窺測唯不憚改必於中理而後已則其權常重而其威無敵其要易持而其利甚博使用術者無以施其巧則人將膽破矣願陛下深念而亟改之則天下幸甚天下幸甚臣衰拙無取以朴忠自信所以敢辱此地茍非益陛下之光明者豈敢以告惟留神省察堯俞又上奏曰臣近累論奏罷張舜民監察御史不當未䝉施行竊以言事之官人所憎畏在權重者尤甚何則持權既重則人莫敢違忤獨言事者伺察而彈劾之其憎之也固宜而所以畏之者非衣冠顔状之有異盖人主信任而崇奬之爾夫人臣既辱知遇又行其言故輕紱冕捐軀命為國家正紀綱以伸萬分之報若稍加摧抑則人亦何憚況直為大臣而罷黜之臣恐而今而後有不忠於陛下而事權臣者矣不但偷合取容而已也陛下豈可不加意而念之自古諫官御史之患在敢攻人主之短不敢忤權臣之意若舜民者宜被擢賞而反䝉廢黜豈所以勸忠義之莭哉臣前日奏事延和親奉徳音謂舜民之言不可行而不可怒也今詔㫖甚峻極駭物聽必有借彦博之重以激怒陛下而行其私忿者此陛下不可不察陛下欲慰安老臣放罷舜民言職今採公議不得已而還之是陛下待老臣之禮備矣於彦博何傷彦博四朝宰相宜有體國之誠豈敢以此望陛下哉願勿輕臣言而詳其區區之心特奮睿斷早賜指揮臣不勝懇激之至堯俞又上奏曰臣等竊以言事之官許令風聞祖宗之詔曲全過當許風聞則豈皆責實全過當則必欲盡言張舜民昨因論列西事因及劉奉世乃天子左史下使屬羌恐失事體衆謂因文彦博照管且非斥言彦博又非專擊奉世其大意在尊朝廷愛國體而已其間侵詆論議大臣之言為多故中外之人以謂舜民之罷名為言及於彦博實由怒觸於柄臣臣等竊以朝廷罷一御史必當正其罪名布告中外可以示天下勵臣莭正紀綱貽後世今舜民既無朋附無中傷之迹又非犯顔逆鱗之過不當以一言風聞之失罪御史以柄臣之意違祖宗曲全過當之詔損仁聖至誠聽納之徳非所以示天下勵臣莭正紀綱貽後世今臣等惓惓愚忠至于再三不能自已也伏望皇帝陛下太皇太后陛下少霽天威曲回睿照省察臣等前後奏章降付三省施行如臣等所論不當乞行貶黜以謝冒犯宸嚴堯俞又上奏曰臣前日與侍御王巖叟列銜申奏乞檢會前後言張舜民文字降出施行至今未聞詔㫖臣聞忠義之士精貫白日誠洞金石臣雖無状肺肝竭矣實冀精誠上通有以感悟聖意臣竊見近日執政憎厭言事之官往往形於詞色今遂伺間而逐之不知如何而後可以厭其意也臣讀唐史見宰相裴垍傳云諫官言得失大抵執政多忌之惟垍奬勵使盡言初拾遺獨孤郁李正辭嚴休復三人皆遷及過謝垍垍獨責休復曰君異夫二人孜孜獻納者前日進擬上固為疑休復大慙臣不敢望執政以臯夔之心輔陛下得如裴垍足矣今非徒憎惡言事者既逐之又移過於陛下使陛下本無一事横被拒諫之名此得謂之忠乎且風聞言事舊矣既黜舜民尚有言職不識自此以往凡須勘當得實而後言耶或風聞之事獨不行於大臣耶亦乞明降指揮臣既不得其言又未知所守豈敢黙然伏俟譴黜堯俞又上奏曰臣等所論張舜民罷職不當事䝉宣諭後又兩䟽開陳舜民本無罪由大臣搆成乞賜照察復許還職尚未䝉聽納施行臣等恐進説者以謂御史無已罷復還之體請舉故事陛下考焉方開元之初明皇勵精政事是非明而不可欺紀綱正而不可亂典刑無私而不以姑息事有䝉蔽而不知則已知而必行故端良得以盡其忠姦邪無所用其巧時崔日知為京兆尹貪暴不法侍御史楊㻛與御史大夫李傑謀劾舉之傑反為日知先構罷言職㻛廷奏曰糾彈之司若遭恐脅以成姦人之謀則御史䑓固可廢矣上以其言切直遽令傑依舊視事貶日知為歙縣丞當時天下不稱楊瑒之能言而服明皇之能聽不矜日知之被逐而喜李傑之復用不髙風憲之自全而快姦言之終破明皇不吝於改過而其益如此史册一書流美萬古今大臣以非是誤陛下之聽有甚於日知御史惷直敢言忠信獲罪有寃於李傑言責之臣守義以爭有多於楊瑒又陛下聖哲之資十倍明皇察之宜深改之宜速而遲遲如此此愚臣之所惑也不知自古設諫官御史者欲以順朝廷之意邪欲以正朝廷之事邪若欲順意則臣以謂不須置若欲其正事則臣以謂不可廢陛下以萬乗之尊與臣論勢臣之言不得而行也陛下虛方寸之地與臣論理臣之言庻幾於用也伏望陛下觀開元之所以盛思明皇之所以賢聖心略回破姦言而全風憲易若反掌矣臣等以堯舜望陛下非敢以明皇始勤終倦比於全徳也陛下以為不可則乞罷臣之職紀綱之地由臣等不振以為朝廷羞得䝉竄殛以塞至公臣等之幸也左諫議大夫梁燾論張舜民罷言職䟽曰臣近論奏不宜以大臣之故輙罷御史乞還其言職至今未䝉指揮臣切以為始拒直言損納諫之美下移威罰失權斷之公所可愛者君徳所可惜者君體也决知此事不出聖意臣敢復論之國家所以尊安者以法度修而紀綱振也御史者守法度持紀綱之官也人主或有闕失猶且直筆正論至於犯顔逆耳無所諱忌況臣下過惡安得畏避而不言哉今御史敢言大臣者天下之公議也大臣不快御史者一夫之私心也罪天下敢言之公議便一夫不快之私心非大公至正之法度也大臣雖重人臣也御史雖微法官也徇大臣而廢法官非尊君卑臣之紀綱也況兩宫臨御之時必使上有尊嚴不可犯之勢下有報義忘私之臣安得假天威屈正論以中傷議己者乎自古全治之世必用天下清議故清議伸則正直之道行聰明之助多清議屈則姦邪之計得欺罔之患作今日清議喧然不平皆謂陛下之優大臣者亦巳至矣大臣之事陛下者未有以副人望也清議之罪大臣者日益以深則恐非所以安大臣也伏望聖慈以保君徳為難以全國體為重即日召還御史以正權綱然後慰籍大臣優加恩禮尊朝廷而强主威萬世之法也燾又上奏曰臣近屢論朝廷不當假借大臣罷斥御史命令失當公議不平玷陛下至仁求言之明損國家大公馭下之制非所以全飬忠勁之氣感勵敬順之心也陛下末即垂聽而至恩優容面命相臣布宣慈㫖臣等廹於公議願以至公之道上廣聖意下厭人望不敢奉詔而復再上章矣伏望陛下勿以既下之命為難改勿以已宣之㫖為難回唯强其剛明之徳從諫如轉圜之易也臣聞唐宣宗將幸華清宫已命治道兩省官拜章極諫宣宗謂宰相曰卿勉諭諫官勿更論列宰臣奉㫖召兩省官宣諭俄而諫章再入宣宗謂宰臣曰諫官䟽極懇切朕決不為逰華清之行矣卿宜説我此意宣宗唐室英明之主也行幸一時娯樂之事也諫臣猶且懇切進言之初未能回聽既令宰相宣諭而諫臣進言不已宣宗幡然感悟遂輟其行又令宰臣告以納聽之意是能自屈至尊欣納直諫真得人君之道矣故終獲忠賢之助而大中之政號為中興聲名輝映前代至今流為美談恭惟陛下之聰明逺過唐宗之徳朝廷紀綱法度不比華清之事臣軰區區陳誠意皆激切嘗䝉聖恩曲賜宣諭臣祗知尊君卑臣為萬世之計不知畏附權强便不論列陛下喜忠納諫上法仁祖言事之臣得盡誠莭更覬留神省察主張必行追還成命以解群言遂使朝廷益見清明之象天下馴致安静之理明徳日躋可以並隆堯舜矣雖宣宗賢主何足為陛下道哉燾又乞終始從諫䟽曰臣愚不肖䝉恩還以言職夙夜思所以副聖知者不敢以為榮而獨以為懼臣前日建言正綱紀明法度以尊君卑臣强公家弱私室正以皇帝陛下富於春秋未專宸斷太皇太后陛下保祐聖主制政簾帷權臣易為强悍姦人易為䝉蔽外之人情有可畏可恤者必欲陛下徧察外之事勢有可憂可疑者必欲陛下周知欲臣莭忠一而人無欺罔欲君勢隆重而下皆敬畏此臣自誓報陛下之心雖萬死不可變也竊謂陛下復置臣於言路者必以臣前日之言為是必以臣前日之心為忠臣前日之言為是則今日之言不為非矣臣前日之敢言為忠則今日之不敢言為負矣陛下既能知臣之忠必能用臣之言則臣報陛下之心豈可怠於前日哉臣聞人主不以受諫為難而以臣下敢言之為難人臣不以敢言為難而以君上從諫之為難唐李綘曰小臣晝思夜度將有上諫欲諫十事至時已除五六逮其緘封又削其半其得上達者十無一二信乎敢言之難也如此又曰聖主知直言有益於己正諫有裨於時温顔容納奬勵勸導忠臣抱義不顧其身懷忠不避禍患茍有致君濟時之益不識觸忌冒諱之誅何哉顧食君之禄其事不得不然也信乎聽諫之難也如此夫人主以臣敢言之為難是也然而有忠臣則不難矣人臣以主上從諫之為難亦是也然而遇明君則不難矣臣幸親逢兩宫之明切不以敢言為難在陛下信而聽之也辯姦人之妄而塞其讒誣折權臣之强而抑其排斥使多士以臣為法而進其忠勿使多士以臣為戒而挫其直當今之事所可言者尚不為少臣方且次第上之願陛下清心諦察而必行之至有切於聖徳急於民隠者不敢猶豫以留清衷後時之憂也致陛下有開納諍諫之美名有収攬權綱之明威朝廷尊嚴而清静宗社長乆而安寧此臣愛君謀國自誓之本志也唯陛下裁擇臣不勝惓惓盡莭之至右正言上官均乞聽言考實䟽曰臣竊聞人主之治天下考得失察邪正存乎知言聽言之難在乎同異之際聽納當則政令善而衆恱聽納失則政令乖而人不服兩漢以來治亂成敗之機未嘗不在於此世俗之情議論是非往往以多同者為是然而情有愛憎識有明暗心有向背同而多者或出於合羣而為朋黨異而少者或出於守正而獨立則是同者未必可取也有反常而為竒背公而行私不稽可否不顧是非惟勢利之為狥則是異者未必可取也然則人主之聽言其辯得失之際果不繫於同異之多少當察理之是非以定去取耳賈誼明於治體嘗曰聽言之道必以其事觀之則言者莫敢妄言盖事有顯迹推事以考言則詐者不能變白以為黒巧者不能飾非以為是此知言之要術也自陛下臨御以來出政令行刑賞稽合義理順於人心者不可勝數其間固有出於獨斷或有取於衆論公聽並觀不牽於異同之説天下之人皆以為陛下至公無私以治安天下為計故能洞照眞偽判别是非無所壅蔽此中外之所歌頌非臣之私言也然政令之損益百官之黜陟萬機日新自執政大臣以至侍從諫官御史皆得以言陛下寛仁好諫是非兼容而論者又得以盡言者既衆則意趣未必合識慮未必同意趣不合識慮不同則進言不得不異言意既異則互生愛憎迭相排毁以務相勝則是非汨亂尤為難察伏願陛下於衆言同異之際更加審擇推究事實凡言邪正者必考為行之實迹則同異之間瞭然而判然後在廷之臣不敢挾情飾言以熒惑聖聽故邪正區别政令刑賞皆合公論天下烏有不治哉御史中丞蘇轍論言事不當乞明行黜降䟽曰臣聞孟子有言有官守者不得其職則去有言責者不得其言則去故祖宗朝凡任䑓諫言而見聽則居職言而不用則黜罷理之必至前後悉然惟有去年䑓諫論回河不當言既不從而言者皆獲美遷今年復論鄧温伯不可任翰林承旨言既不效而言者亦並進職雖人臣廹於朝命黽俛就位而中外觀望不知曲直所在為損不細誠使朝廷偶有過舉聞善而改適足以增開納之光其或言者論事不當據法罷免亦足以示進退之公今者不辯是非一加進擢朝廷則負諱過便私之毁臣下則被茍簡懐禄之非風俗漸成士莭陵替載之史册不為美事臣今待罪執法才力疲輭何能發明然在職思憂不敢不勉若所言中理望陛下力賜主張行之無吝一有不當亦乞明加流竄以懲妄言惟乞勿為隠忍包含之計使臣主俱受其謗不勝甚幸蘇轍又論用䑓諫劄子曰臣聞書稱堯舜之徳曰明四目逹四聰盖人君居髙宅深其勢易與臣下隔絶若不務廣耳目則不聞外事無以預知禍福之原臣不敢復論前代請陳本朝故事每當視朝上有丞弼朝夕奏事下有䑓諫更迭進見内有兩省侍從諸司官長以事奏禀外有監司郡守走馬承受辭見入奏凡所以為上耳目者其衆如此然至於事有壅蔽猶或不免今自太皇太后陛下皇帝陛下垂簾以來每事重慎羣臣得對於前者惟有執政及䑓諫官而已然天下之事其是非可否既決於執政陛下欲於執政之外特有所聞者又獨有䑓諫數人而已臣觀今日䑓官三員諫官二員其間非執政私人特出聖意所用者又不過一二人孔子有言今吾於人也聽其言而觀其行陛下試取此五人言行之實而諦觀之則其邪正向背槩可見也昔漢成之世王鳳用事羣臣莫敢盡言惟劉向王章力言其惡無所顧避皆為鳳所不喜言卒不用或繼以死而鳳推薦其門人如杜欽谷永之流使上封論事欽等所言皆掩蔽鳳短專攻帝失由此直言不聞漢亦不競今陛下深處惟幄耳目至少惟有䑓諫數人若又聽執政得自選擇不公選正人而用之臣恐天下安危大計無由得達於前而朝廷之勢殆矣惟陛下留神省察無忽臣言則社稷之福也蘇轍又論所言不行劄子曰臣兩次面奏熈河路范育种誼等違背大信貪功生事以速邊患乞移降他路更選帥臣俾之鎮守臣方奏對間䝉太皇太后再三宣諭以臣言為是然至今多日但見种朴一人移涇原路勾當公事至於育誼並未見移動臣竊伏思念人臣言事不患聖意不囬患在聖意已囬而大臣固執事輙中止何者聖意不囬惟當再三開陳期於必悟若聖意已囬而大臣不可事不得行則是君權已移上下倒置雖欲納忠何益於事此臣所以晝夜憂懼欲言而復止者也昔齊桓公游於郭問郭公之所以亡其父老對曰以善善而惡惡桓公曰善善而惡惡此賢君也而何故亡父老曰善善而不能用惡惡而不能去此其所以亡也今陛下以臣言為是而不用以大臣為非而必聽臣竊惑之且陛下雖處幃幄之中實攬人主之事今依違退託專聽大臣事有未安誰受其弊故臣以為居其位而不任其事任其事而不斷其是非者古今未嘗有也臣以非才誤䝉擢用盡忠獻言上牾大臣下牾邊吏其所以再三論列不為身計者誠以為外可以利民而内可以報國故也今所言不從空結怨怒無補於國臣雖狂愚何苦而為此哉臣恐忠臣自此結舌不敢復以至言聞於陛下矣去年之冬陛下知囬河之失深詔大臣罷東流之役天語惻怛中外具聞而大臣奉行不得其半雖罷囬河之名仍存試水之實鋸牙馬頭率皆如故意幸漲水之至河或可回然今日觀之終復何益是以衆議皆謂陛下聖明察物照見千里之外而號令不行未見成效是時奉使契丹還奏其事此章具在可覆視也今熈河邊事大略類此若使聖意又為大臣所沮則君權愈奪臣勢愈張飬之不已後將益甚及其事極難忍而後制之則傷君臣之恩失朝廷之體不若今制其漸使事無所失而臣亦獲安之為善也臣不勝區區為國逺慮觸冒忌諱甘竢斧鉞殿中侍御史吕陶辯朱光庭彈蘇軾䇿題事䟽曰臣竊聞蘇軾試館職䇿題朱光庭彈奏以為譏議兩朝奉聖㫖蘇軾放罪軾遂乞補郡䝉陛下降詔不允光庭論列未巳臣既待罪言路理當辯明敢竭愚鄙為陛下極陳之夫䑓諫之職為天子耳目要在維持綱紀分别邪正凡所彈擊當徇至公不可假借事權以報私怨萬一及此是謂欺君今蘇軾所撰䇿題首言齊魯皆聖人之後其政化之弊至於衰亂其次乃曰國家承平百年六聖相授為治不同同歸於仁詳味此言固無譏議兩朝之意其次又曰今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於媮欲法神考之勵精而恐監司守令不識其意或流於刻則所謂媮與刻者明言百官有司監司守令不能上體朝廷本意而或至於媮與刻非指言二聖之失於媮刻也其終又曰昔漢文寛大長者至於朝廷之間耻言人過而不聞有怠廢不舉之病宣帝總核名實至於文理之士咸精其能而不聞有督察過甚之失者盖言漢文漢宣之時其臣下能如此不怠廢不過甚今朝廷當以何術治之使百官有司監司守令不至於媮刻乎盖作文者發此問端以觀其荅即非謂仁宗不如漢文神考不如漢宣也光庭指以為非亦太甚矣假使光庭直徇巳見不為愛憎而言則雖不中理義猶可恕或為愛憎而發則於朝廷事體所損不細今士大夫皆曰程頥與朱光庭有親而蘇軾嘗戲薄程頥所以光庭為程頥報怨而屢攻蘇軾審如所聞則光庭固已失之軾亦未為得也且軾薦王鞏為不知人戲程頥為不慎言舉此二者而罪之則當也若指其䇿問為譏議二聖而欲深中之以報親友之私怨誠亦過矣臣又聞軾與鄧温伯同進䇿題三道陛下㸃此一道而用則陛下聖鑒必謂切於時務故遂用之決知其不譏議兩朝也又況御史上官均近嘗論奏為政之道有寛猛兩端大槩與蘇軾䇿題同意陛下謂其言可取著為法令頒於天下夫上官均之奏蘇軾之䇿題二人之言皆是講明治道一則頒以為法一則指以為罪何輕重取捨之異哉此士大夫之意不能無惑也恭惟陛下聖慮髙逺從諫如流然臣下之言或至於激則亦願加審察昔富弼韓琦天下知其忠且賢弼因除張茂實管軍中丞韓絳乃言富弼欲謀不軌韓琦不赴文徳殿押班中丞王陶乃言韓琦反状已露尚賴聖主深炤情偽二人者始終安完以富弼韓琦之賢而言者猶如此中傷之則不迨於弼與琦者又可知矣今日光庭中傷蘇軾之心頗類前事欲使朝廷為之報怨不可不察也臣與蘇軾皆蜀人而不避鄉曲之嫌極論本末既備位䑓職而輙糺諫官之失當二罪皆不勝誅然喋喋不敢自黙者非特為一蘇軾盖為朝廷救朋黨之弊也孤忠危迹敢以死請右司諫王覿上奏曰臣謹按中庸曰舜好問而好察邇言夫好問不察而邇言則察者盖舜欲有問必擇乎端人正士而後問之所問皆端人正士則不察而信之可也察其人在前故也至於邇言則有不問而聞之者矣舜不以人廢言亦不遽信其言必察其真偽善惡而后用捨焉故不問無以致忠言之啟沃不察無以辯邇言之是非臣伏見陛下自春至今凡施設廢置莫不大慰天下之望雖天縱睿智如日月之照臨無所不燭然所以深䆒民情洞見物理者亦好問察言之助也陛下當龍潛之日政事無所預威福不在手凡逹於聖聰者皆無心之言以所聞無心之言裁以英斷而施之政教則法出而公論歸令下而民情恱不亦宜乎今陛下尊居九重奄有四海慶賞刑威卷舒於頥指之間有所問焉或畏威而匿情或懐利而曲説況乎邇言情偽萬状欲如前日無心之言豈易多得故好問尤不可以不擇其人邇言尤不可以不察其實也舜典曰朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允舜之好問察言者既如彼用以命龍者又如此可謂重且慎矣陛下以大舜之資行大舜之政故臣敢以大舜之所重且慎者上塵聽覽覿又上奏曰臣竊聞中書省欲以後省散騎常侍諫議大夫起居舍人正言㕔為制勅院擗截兩省見今諫官㕔出外别作門出入以防制勅之漏洩論者以謂名雖為關防制勅而實不欲諫官在兩省與給舍相見恐其或聞政事之本末而論列之頻數也何以驗之盖欲其作制勅院而巳則舍人㕔後起居舍人㕔正言㕔及直舍廊廡等屋已數十間作制勅院自足不須更取散騎常侍諫議大夫㕔以塞絶諫官出入之路而别為之門也兼門下後省既無制勅院而亦擗截諫官㕔出外即知不為關防制勅之漏洩而實不欲諫官在兩省與給舍相見恐其或聞政事之本末而論列之頻數而已臣聞自古為國家者未有踈薄諫諍之官而可以有為者臣不敢備引歴代之事以瀆聖聽今且以李唐言之昔太宗嘗謂侍臣曰朕雖不明幸諸公數相規正勅中書門下及三品已上入閤必遣諫官随之欲其預聞政事有所開説故自後諫官得閤中奏事遂以為常而讜言直論有補於朝政者世有其人也夫唐太宗之聖自三代以後本朝以前千載一人而已當時諫官之才能智識豈復有敢望太宗者哉不惟不敢望太宗而豈復有如當時之執政大臣者哉然太宗不自有其聖而虚心求諫如此當時執政大臣亦未嘗有以諫官預聞政事為嫌者也唐自武徳至昭哀三百年之間諫官皆列於中書門下兩省而亦未聞有臣僚建議諫官不得在兩省以防制勅之漏洩者也只自五代衰替朱梁初建都事事草創故諫官不在兩省聖朝祖宗承五季版蕩之後興弊極墜百餘年間凡前古之法度日以修舉至神宗而浸備是以鼎新兩省列諫官於其間以循唐制夫諫官必列於兩省者盖使在於政事之地而有所聞見則凡所論列庶幾不誤朝廷而有補於治道也惟是隨中書門下及三品以上入閤則尚未及講臣竊以謂必行於陛下之手雖或未暇柰何至於使諫官不得在兩省而惟恐其或聞政事耶又疑其漏洩制勅耶何示天下以不廣也況今諫官雖在兩省日與給舍相見而於政事委曲亦何所聞但存羊所以愛禮不猶愈於盡廢哉執政大臣若謂諫官不才罷之乃宜不可縁一二諫官之故而遂廢朝廷之法度也臣不能俛首循黙為自安之計以負陛下言責惟聖慈詳酌施行覿又上奏曰臣近於十一月二十五日有封事言兩省擗截諫官㕔出外隳壊法度乞行寝罷及十一月二十七日與諫官鮮于侁朱光庭列状聞奏各未䝉施行臣竊以自古聖帝明王莫不有諫諍之臣盖三代以前上自公卿次及百執事下至百工芻蕘皆可諫諍故雖不以諫諍名官而鯁言直論常逹於人主之聽及世衰道微言出於口而禍及於身者浸多故為人臣者若不以諫諍名官則鮮肯以諫諍為事於是秦漢以來乃始有諫大夫率皆列職清要日侍人主然歳月綿逺其㕔之所在有不可考者惟隋唐事近傳記甚明諫官於隋屬門下省唐初因之亦嘗屬中書省後乃分列兩省終於有唐未之或改也夫御史與諫官均任言責然御史䑓在外而獨諫官既為侍從又列於兩省者何也盖御史專在糺正百官必在外然後百官趨赴聽事鞫獄為便諌官之職在於論政事之過差補人主之缺失故不在政事之地則無以盡聞政事之過差不列侍從之班則無以盡知人主缺失也自五代亂離隋唐法度無復存者本朝祖宗以來講復前代之法度十八九矣惟是兩省之闊典至神宗而後復然諫官雖已列於兩省政事之地猶未預於入閤侍從之班乃防諫官漏洩政事而欲擗截㕔事出外使不得在兩省亦異於設諫官之本意矣夫兩省若有幾密之事吏人可密者諫官豈不能密耶兼見今諫官雖在兩省於政事實不預聞況幾密哉昔魏少府楊阜欲上䟽省宫人召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎明帝聞愈敬憚阜後世以為美談臣常謂陛下聖徳比堯舜豈於此而不迨明帝耶臣常以臯夔稷契期執政豈於此而不迨楊阜耶且先帝孜孜講復隋唐數百年之法度既合於古又宜於今乃一旦無故而壊之一不可也中書所謂制勅院者吏舍也廹逐天子之諫官以廣吏舍二不可也深信胥吏與之為密而過疑諫官以為漏洩三不可也使天下朝廷有疑諫官之心厭諌官之迹非所以廣聖徳於天下四不可也散騎常侍下執政一等爾今偶員闕不可謂終無其人也至於左右史亦陛下侍從之臣安可使中書吏人據其㕔事奪其正門而常侍諫官左右史乃屏置一隅宂垣墻而出入事體顛倒増長吏氣五不可也憎諫官者雖取快一時而五不可長乆之患歸於朝廷又使三省執政大臣皆受廹逐諫官之名為後世笑臣竊為陛下惜之臣愚暗不才陛下過聽擢為諫官若議論失當陛下罪之執政大臣惡之或一二日而罷或二三月而黜皆不可知也豈謂諫官可以乆為而兩省可以安處哉盖欲為朝廷長乆之計而已非臣謀身之計也若既憂得罪於陛下又慮見惡於大臣坐視法度之廢壊而緘黙不言則不惟有負陛下言責亦豈不自愧於心哉故不避冒瀆聖聽而喋喋不已陛下或采其言或賜之斧鉞之誅惟聖慈裁擇臣無任激切忠憤之至侍御史陳次升又奏乞留正言孫諤䟽曰臣伏見責降左正言孫諤知廣徳軍事風聞諤以論役法有過當之語以此得罪未審果是耶為復縁他事耶若不縁他事只縁役法臣竊謂朝廷復行免役之法實欲便民所繫至大其利害不止一州一縣而普及天下處之適中天下均被其利茍一失當天下均被其害而諫官以言為職既有見聞必須上達其言儻是則當聽納其言或失亦在曲全以示朝廷之容徳也臣伏覩天禧元年二月七日勅戒䑓諫詔書曰雖言有失當必示曲全則知聖朝廣開言路激昻士氣不以人言失當為慮而患在人之不言也今諤若無他罪止是議役法失當推原其情盖欲補完良法亦可矜察欲望朝廷再賜詳酌施行同知樞密院范純仁乞寛王覿之罪䟽曰臣與吕公著等并今日與文彦博等兩次簾前奏陳乞寛王覿之罪盖欲假借䑓諫使人敢言其間雖有不當亦須稍垂寛宥以彰朝廷容諌之美況陛下臨御已來未嘗嚴責諌臣一旦行之恐傷仁化又慮來者或多若一一竄逐寖失朝廷清浄之體其心止於如此更無他意側聞聖訓以謂朋黨甚多宜早施行恐於卿等不便以臣愚見朝廷本無朋黨只是善惡邪正各以類分陛下既用善人則匪人皆憂難進遂以善人之相稱舉者皆指以為朋黨欲得人主深防嚴戒盡行貶逐自然君子道消小人可以得志所以臣等不避違迕縷縷開陳罄竭愚誠莫囬天意臣若面從順㫖則是苟容之臣何足以副陛下柬求何面目處羣臣之右又況彦博公著等皆是累朝舊人陛下留在左右已二三年輔翊皇猷未嘗有闕今日豈肯雷同罔上庇䕶黨人盖其愛君之心與臣無異唯在陛下深加採納所有先降貶謫王覿文字臣未敢簽書更乞聖心熟慮臣自先朝言事不合擯斥處外幾二十年遭遇陛下一新庻政從諫任賢夷夏歡呼古今無比此皆聖心所悉非愚臣獨敢妄言而一旦拔臣於踈逺之中驟置於丞弼之位故臣夙宵盡瘁恐負聖知豈有容庇朋黨自損身名玷辱家聲取笑千古盖是愛惜聖政思報大恩螻螘之誠惓惓不已今若陛下決以臣言無取即乞謫臣補外被指為朋黨者自明臣雖一身斥逺若遂決朝廷大疑則是猶有少補不辜東拔則臣死之日猶生之年矣又臣曲謝日已曽奏聞昔先臣與韓琦富弼䝉仁皇同時用為執政三人各舉所知引用忠良有匪人之不得進者遂搆造謗語指為朋黨先臣與韓琦富弼皆得補外所用之人類遭貶逐當時搆謗之人皆欣快相賀曰且得一網打盡此事未逺衆人猶知亦可以為朝廷深戒純仁又論王覿乞從文彦博等所言䟽曰臣昨日入劄子未敢簽書王覿文字因以文彦博吕公著累朝舊人其言乞加採納及論朋黨事繫善惡消長皆愚臣受恩之深罄瀝血誠用伸補報更無顧望嬰觸之慮伏望聖慈特加詳覽又彦博公著年皆垂老屢乞退閒陛下特留平章國事盖以重徳老臣一心向國直可委信此聖慮之深髙出前古兼吕大防等皆陛下選拔於衆各有公望之人今若商量一諫官差除有言不䝉垂聽則與陛下眷留擢任之意輕重不同臣所以更望聖𠂻審慮少迴天意良加採納以成唐堯捨已從人之意不使大臣有不用之言則社稷幸甚臣前年初到􅇅時聞有徳音令䑓諫官但言事太皇自主張臣愚不勝欣喜今見彦博已下諸大臣奏事未䝉聽納臣不勝憂懼翰林學士范百禄乞審議轉對之制状曰臣恭聞太祖皇帝建隆三年詔自今每五日内殿起居翰林學士及文班常参官轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦咸采訪以聞事有要切者許非時詣闕上章不得須候次對既又命尚書省集官議其可者而行之為民求治之心可謂至矣真宗皇帝詔有司録轉對章䟽一本留中聽言擇善之志可謂勤矣祖宗之於轉對其勤且至如此今一歳之中視朝有數臣寮轉對者每次二員凡不過十餘人借使人悉知而言言皆見用亦不過十數事耳臣竊惟太皇太后陛下皇帝陛下固嘗有太祖為民求治之心真宗聽言擇善之志然於此事今昔有異心跡未侔補闕拾遺必在旁通於衆志博覽兼聽未能全美於前聞臣雖甚愚竊惜言路之未廣而恐人情之恬黙茍有所聞則積為蔽塞伏願陛下法堯之詢于衆蹈舜之取諸人使四目盡明庻言必達則時政之得失可以周知朝廷之急務能無小補刑獄寃濫百姓疾苦必無壅於上聞而有裨於聖徳矣孔子曰四方有敗必先知之斯可謂民之父母苟不周諮於人言物論何以臻兹伏望宸慈詔執事審議轉對之制率由太祖真宗之舊章則天下幸甚吏部侍郎彭汝礪上奏曰臣竊聞禮部侍郎曽肇以議禮不當乞從罷黜䝉恩降知徐州給事䑓諫臣有言臣竊謂南北郊合祭事朝廷自許近臣集議或同或異乃是常理必以此罷黜一從官如肇用意真國家忠臣朝廷容納直言愛惜人才義當為改命令體問畫黄已到吏部臣以為過矣臣伏念才難乆矣人常千百億而無一二茍或有之或流落而不偶幸而有之又既得之或棄於無所用故治安之日常不足而危亂之日常有餘孔子曰如有所譽必有所試如肇者其文可以當大命令其學可以決大謀議頃在西掖屢能補縫闕漏及還禮部遂能是正典常循名觀實謂之賢可矣且並祭之禮不經見如臣軰皆莫遑安其能奮不顧身忤大臣為陛下言者獨肇而已朝廷既不用其言又遂黜其人故臣以為過或曰朝廷非惡肇議禮謂其言過當而已夫言不直則道不見今病者之求藥唯病之愈是望故能五毒徧施針砭切骨而不為過使唯香味顔色之恱則豈唯不足治病適足以誤病書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道肇之言雖有所拂以道觀之為當矣夫欲安榮惡危辱人情之所同也臣願陛下少留神明以其理度之今人不肖朋比大臣而肇為朝廷明是非論然否此為其身邪以國家故邪順從緘黙則逺得福奮厲激昻則速得禍而人臣終不忍不言以負陛下此其心不在其身而在人主不在其私而在國家可見如曰人臣瀝肝膽披腹心為陛下國家長乆慮患而陛下屏去不容此甚非計也夫上所好惡人之表也今侍從之臣不能依随大臣而陛下去之則孰不願附大臣今一有言而陛下去之則孰不欲學不言近臣與國家同安危共休戚使皆附大臣而不以國為憂閉口不言而為妻子計此非社稷之福也惟陛下察之念之方朝廷多事宜盡得心膂之賢徧置左右博求骨鯁之士並為輔拂盖猶恐不足今有一曽肇而不能留故臣以為過非獨臣也凡忠於陛下者皆然南北郊祭議始下臣嘗與肇言天地之祭至大至重今欲易於改作實所未安肇云使無言責某決不敢緘黙肇為禮官其言當在肇遂有論議肇既逐臣亦難處肇終不可留臣亦願與同罪焉肇命已下而未行臣至愚欲望皇帝陛下深以愛大才容直言為念出自聖斷且留肇置朝廷肇守官任職必有以報國臣言或謬靡所逃誅夫改易差遣常事也留賢者盛徳也在朝廷盖優為之矣畢仲游上言曰昔仁宗皇帝之治天下也優禮大臣而聽用䑓官諫官之言盖大臣者天子之輔也不優為之禮則無以勵其節盡其心聽用䑓諌官之言所以存天下之公議而禁制大臣不得自放之術也故大臣起居進見未嘗不躬已以待之若乆於其位而不可動者及䑓官諫官一有論列則十言之中行其七八雖老故大臣必正其罪以是而去位者盖可數矣故嘉祐以來大臣平日足以致君臣之歡體貌之隆而私門姦吏破膽而不敢為仁宗皇帝所以四十二年天下安寧大臣無甚縱恣小官得行其志不法之事稀闊無聞者以優禮大臣而聽用䑓官諫官之言所致也歴代名臣奏議卷二百四
