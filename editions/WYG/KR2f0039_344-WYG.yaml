body:
  text: 歴代名臣奏議巻三百四十四明楊士竒等撰四裔宋神宗熈寜元年王韶詣闕上平戎䇿三篇其畧以為西夏可取欲取西夏當先復河湟則夏人有腹背受敵之憂夏人比年攻青唐不能克萬一克之必併兵南向大掠秦渭之間牧馬于蘭㑹斷古渭境盡服南山生羌西築武勝遣兵時掠洮河則隴蜀諸郡當盡驚擾轄珍兄弟其能自保邪今嘉勒斯子孫唯棟戬粗能自立轄珍希巴烏之徒文法所及各不過一二百里其勢豈能與西人抗哉武威之南至于洮河蘭鄯皆故漢郡縣所謂湟中浩亹大小榆枹罕土地肥美宜五種者焉幸今諸𦍑𤓰分莫相統一此正可併合而兼撫之時也諸種既服嘉勒斯其敢不歸嘉勒斯歸則河西李氏在吾股掌中矣嘉勒斯子孫轄珍差盛為諸羌所畏若招諭之使居武勝或渭源城使糾合宗黨制其部族習用漢法異時族類雖盛不過一延州之李士彬環州慕恩耳為漢有肘腋之助且使夏人無所連結䇿之上也神宗異其言翰林學士承㫖王珪乞令摩正不得還熈州劄子曰臣早来伏奉聖諭王韶欲令摩正復還熈州臣甚惑之竊惟熈河一道俗本羌戎自唐以来乗中原盛衰或得或失然失之莫不易得之莫不難也今得其地環數千里據大河上㳺使夏國有腹背之憂棟戬失脣齒之附不為不要矣顧非陛下獨奮英武盖未易得之前日得巴勒珍嘉卜轄烏恰棟郭等皆授以官而遣之盖欲招致摩正爾摩正既出而韶意欲復還者不過以南山猶有未附之人臣以為不然且摩正屢殺害邉吏衆亦知其出而不還非如巴勒珍嘉卜等之比因而縻之足使未附之人皆憚漢之威靈却易為撫輯況西畨大首領其桀黠更無有過摩正者自韶經制一方捕斬無慮數萬級其威名蚤立今所遺一二種落豈待摩正還而後定觀摩正之降盖勢不獲巳即非誠有向漢之心如使居熈州我之動靜虗實一以得之其種人皆腹心又怨漢深一旦引夏國與棟戬乗間發兵扼通逺之衝絶枹罕之餉四面畨部合力而攻熈州洮岷疊宕連衡而撓結沁方是之時恐熈河非復我有也塔本之變度猶可以復勝者彼内無應也儻謀出摩正變起熈州則事安可測也不但失之四夷又從而見侮棄前功遺後患不可不思也竊以為摩正之還利小而害大如陛下必欲慰羌人之心且令居秦州為便臣之愚見如此不敢自黙更繫聖裁二年翰林學士司馬光論召陕西邉臣劄子曰臣嚮任御史中丞日聞國家招納夏國降民曽上言方今百職未舉庶政未修百姓未安倉庫未實将帥未選軍法未立士卒未練器械未精八事不完不可興兵智慮迂踈不合聖心俄而种諤等起綏州之役楊定為夏人所殺陕西騷然困扵餽戍朝廷悔前之失故謫降种諤等以謝夏人再三招撫方能得其稱臣奉表復遵舊約朝廷特遣使者以誓詔冊命及金帛雜物賜之尚未返命今竊聞陛下復召种諤等詣闕引對不知陛下欲何所興為中外聞者無不寒心夫布衣不守信義猶見輕扵鄉黨況王者臨御四逺當叛則威之服則懐之使信義之明皎如日月若邉境幸而臣服無故擾之及其背誕則從而嫗煦之得其臣服又從而擾之其扵信義威懐如何哉國家以信義臣畜夏人百有餘年前日种諤等舉而棄之興兵掩其不備以邀一時之功僅能得不食之地百餘里殘黎萬餘人耳今地則歸之敵庭民則逃散畧盡朝廷有何所得而發兵守衞轉粟饋餉公私之費以鉅萬計其為失䇿豈不昭然今瘡痍未復憂患未弭臣前所言八事一無所修敵疑忌中國警備已嚴怨毒之心蓄而未發諤等乃欲復為前日所為臣見其無復綏州之功而必有大敗覆没之事兵連禍結不可救觧公私困竭盜賊将生此乃社稷之憂非獨邉鄙之患也孔子曰過而不改是謂過矣伏望陛下留神深念至于再至于三當先修内政未可輕議用兵實天下幸甚六年韓琦判相州契丹来求代北地帝手詔訪琦琦奏言臣觀近年以来朝廷舉事似不以大敵為恤彼見形生疑必謂我有圗復燕南意故引先發制人之説造為釁端所以致疑其事有七髙麗臣属北方乆絶朝貢乃因商舶誘之使来契丹知之必謂将以圖我一也強取吐蕃之地以建熈河契丹聞之必謂行将及我二也遍植榆栁扵西山冀其成長以制蕃騎三也剏圑保甲四也諸州築城鑿池五也置都作院頒弓刀新式大作戰車六也置河北三十七将七也契丹素為敵國因事起疑不得不然臣昔年論青苗錢事言者輙肆厚誣非陛下之明幾及大戮自此聞新法日下不敢復言今親被詔問事係安危言及而隠死有餘罪臣嘗竊計始為陛下謀者必曰治國之本當先聚財積榖募兵扵民則可以攘斥四逺故散青苗錢使民出利為免役之法次第取錢迨置市易務而小商細民無所措手新制日下更改無常官吏茫然不能詳記監司督責以刻為明今農怨扵甽畆商歎扵道路長吏不安其職陛下不盡知也夫欲攘斥四逺以興太平而先使邦本困摇衆心離怨此則為陛下始謀者大誤也臣今為陛下計謂宜遣使報聘具言向来興作乃脩備之常豈有他意疆土素定悉如舊境不可持此造端以隳累世之好以可疑之形如将官之類因而罷去益養民愛力選賢任能踈逺奸䛕進用忠鯁使天下悦服邉備日充若其果自敗盟則可一振威武恢復故疆攄累朝之宿憤矣疏上㑹王安石再入相悉以所争地與契丹東西七百里論者惜之神宗時吏部尚書蘇轍論北朝政事大畧疏曰臣近奉勅差充北朝皇帝生辰國信使尋已具語録進呈訖然扵北朝所見事體亦有語録不能盡者恐朝廷不可不知謹具三事條列如左一北朝皇帝年顔見今六十以来然舉止輕健飲啗不衰在位既乆頗知利害與朝廷和好年深蕃漢人户休養生息人人安居不樂戰鬬加以其孫燕王幼弱頃年契丹大臣誅殺其父常有求報之心故欲依倚漢人託附本朝為自固之計雖北界小民亦能道此臣等過界後見其臣僚年髙曉事如接伴耶律恭燕京三司使王經副留守邢希古中京度支使鄭顓之流皆言及和好咨嗟歎息以為自古所未有又稱道北朝皇帝所以館待南使之意極厚有接伴臣等都管一人未到帳下除翰林副使送伴副使王可離帳下不數日除三司副使皆言縁接伴南使之勞以此觀之北朝皇帝若且無恙北邉可保無事惟其孫燕王骨氣凡弱瞻視不正不逮其祖雖心似向漢未知得志之後能彈壓蕃漢保其禄位否耳一北朝之政寛契丹虐燕人盖已舊矣然臣等訪聞山前諸州祗候公人止是小民争鬬殺傷之獄則有此弊至扵燕人強家富族似不至如此契丹之人每冬月多避寒扵燕地牧放住坐亦止扵天荒地上不敢侵犯税土兼賦役頗輕漢人亦易於供應惟是每有急速發調之政即遣天使帯銀牌扵漢户須索縣吏動遭鞭箠富家多被強取玉帛子女不敢愛惜燕人㝡以為苦兼法令不明受賕鬻獄習以為常此盖邉境之常俗若其朝廷郡縣盖亦粗有法度上下維持未有離析之勢也一北朝皇帝好佛法能自講其書每夏季輒㑹諸京僧徒及其羣臣執經親講所在脩盖寺院度僧甚衆因此僧徒縱恣放債營利侵奪小民民甚苦之然契丹之人縁此誦經念佛殺心稍悛此盖北朝之巨蠧而中朝之利也右謹錄奏聞乞賜省閲亦足以見隣國向背得失情状取進止強幾聖論邉事劄子曰臣聞契丹之扵中國其勢不可常也弱則臣附強則相抗或至扵侵軼而不已遂有闚中原之心繇三代以迄五季其間臣以附者無幾若代侵而代抗未之或絶也既尊大扵石氏之晉又得燕地而其勢益張始以遼人為腹心而眡燕人猶行路也以是諸部樂為之用膠固而不可巳而燕人桀黠而巧事既親燕人而諸部日寖以踈故金城宗元之變起扵蕭墻相殘曽未幾而西夏遂攻其右脇而軍中徃徃出叛語女真諸種又乗釁而動今契丹雖欲復置諸部於腹中而人心亦已去矣又逐水草習騎射此遼人之所利今反棄之但坐啗中國之金繒而漸嗜奢佚之為樂此特夭亡之時也萬一彼衆兵其主而南報怨於燕燕人懼其塗炭也必求捄於我朝廷即當遣良将勁卒以拊援燕人且行復吾境土則幽薊之地皆漢有也如曰未能則是朝廷坐眡燕人之将死而授其首於遼人俾得血肉也其必反怨於朝廷而愈懼遼人之仇已無難矣設有慷慨豪侠如荆軻軰復出於其地一呼其徒而響應之南驅以避仇釋怨竊恐大河以南不得而有也臣兩使河朔頗究邉事今既耳剽其説心惟其勢豈敢嘿焉而不言為今計者莫若練兵實邉逆為北備使敵馬不敢牧扵南此先時之長䇿也朝廷垂聽而留意焉鄭獬論西夏事宜状奏曰臣近獲賜對條列西羌状陛下不以臣愚陋垂屈天意容其妄論至於還綏州赦楊定陛下雖以臣言為是然竊觀聖語躊躇而不盡似有隱計不欲暴扵外者臣退而惑之豈有執議之臣趨時窺利将有所邀乎盖邉隙之萌其曲不在彼是以諒祚敢肆其禍心誘楊定而戮之自定之死如朝廷能鞭撻四逺之暴則宜聲鐘鼓而伐之何為忍愧至今未能發一卒以問罪是不獨無辭其實力不足耳則瘡痏之在邉猶未愈也今幸而諒祚死稚子方在人股掌之間酋豪相謀懼未能固其國故馳使以告其禮甚順不失蕃臣之體陛下所宜照其肝膽而存撫之既已納其来則不宜反有所邀以怫其向義之心若責其殺楊定必使割地乞盟然後還其綏州而貸其顓殺之誅如此則恐非帝王綏逺之大畧乗人之䘮欺其孤兒因告哀之使屈之以圗利敵人聞之不有窺中國之淺深乎而議者乃用此為竒貨将以售寵市功於已之小智則可而豈不謬為國之大計哉方元昊之梟張竭天下之力而距之而竟不覩獻廟之俘又冊之以主號啗之以金繒乃得其歸欵而盟不於此時摧其兇焰以示威徳之強乃於孤兒之䘮謀其小利是豈足稱雄哉彼縱以零丁不支惟天子之命是從匍伏請盟割横山之地歸于我我得之猶且不武況彼君臣尚能崛强扵一方萬一如有不奉詔則我又将柰何遂爾刼持其使而使之必從耶遂爾遣将練兵以討其不恭耶是二者又非至理既無可柰何而復置之則我無乃反屈與是無疾而自灸也故不若不邀之為善誠能講襲故事立其幼子明告之曰殺楊定者爾父也罰不及嗣我已赦之向之邉臣擅城綏州乆欲歸汝以楊定之死故不可今還汝如此則中國之恩威重于北敵如泰山矣彼雖敵人豈無啾唧蹢躅之感兩疑之禍由此可觧夫釋金石之成議圗圭黍之末利虧損國家非至計也朝廷如欲經營四裔則今之羌雛孱孺酋豪用事必不能相下方且有釁因機制變陛下少遲之然非今日之事也臣自种諤結隙已来以為朝廷之憂無大於此者故曉夕講劘思有以弭其患少報陛下收采之恩所以每當機㑹屢言之不已伏望陛下奮獨見之明攘斥邪議一舉而逺人懐遂安中國豈不美歟前日誅种諤之機既以失之遂有楊定之恥則今日之議不宜再失恐有甚扵楊定者矣臣之慺慺不勝至願熈寜九年樞宻使文彦博上奏曰臣伏奉詔書詢及疆事臣以衰拙昏惷何足仰承聖問然以乆當柄任䝉國恩深義激於中敢不罄露庶伸補報之萬一夫外裔之情趨利生事從古以来載於書史者詳矣自真宗朝與通好所以息民幾八十年未嘗犯順惟慶歴初乗我西事未弭故有邀求餌之而已當時載立誓書亦古尋盟之義也歴觀前代中國與外裔通好未有如今之悠乆盖朝廷謹守信誓至雖瑣瑣細故亦不剏生變改是以戎人亦不敢輕有希求自數年前累来妄理白溝館地及要拆去鋪屋況誓書之中明載雄州所管白溝兩朝遵守已乆且信誓之辭質於天地神祇告於宗廟社稷此而可渝何以享國今蕭禧重来又決於雄州北亭交割禮物其意欲以雄州北亭為界其如誓書何誓書若不為憑即代北之地止以圗籍照驗宜其不以為據原其貪心亦因慶歴初西事未平之際求黄嵬之地朝廷容易棄與之又致今日妄有侵理誠如聖詔所謂敵情無厭勢恐未已臣亦謂敵因此妄起釁端聖意謂萬一不測何以待之臣以謂中國御戎守信為上必以誓書為證彼将何詞以亢縱騁詭詞難奪正論臣又以事理度之事固有逆順理固有曲直順而直天必助之逆而曲人不與之若敵人不計曲直利害肆其貪狠敢萌犯順之心朝廷固已講扵預備之要足食足兵堅完城壁保全民人以戰則勝以守則固止此而已臣又聞用兵之道兵應者勝不得已而用之此所以天必助之大抵中國之兵利在為主以主待客以逸待勞理必勝矣亦應兵之道也臣伏詳詔書曰思所以待遇之要禦備之方切料聖意慎於舉動尚慮發言盈庭各有異論或曰先發制人意在輕動或曰乗其未備襲取燕薊事不審處恐将噬臍非王師萬全之舉也伏願陛下垂意熟察之今朝廷分置将官整齊器械固得之矣然将校偏裨更須慎擇其人又河朔頻嵗飢荒粮餉用度窘乏尤索計置若兵連未觧物力殫屈即誤國大事切要先事而辦乃無後艱至扵不急煩費事須裁節在臣本道者亦當續次奏聞臣識淺才薄思慮不周伏望聖慈稍垂省覽寛其罪戾臣無任惶恐之至元豐六年夏人欵塞乞還侵疆户部尚書安燾言地有非要害者固宜予然羌情無厭常使知吾宥過而息兵不應示以厭兵之意哲宗立復仍前議二府遂欲并棄熈河燾固爭之曰自靈武而東皆中國故地先帝有此武功今無故棄之豈不取輕於外國扵是但以葭蘆等四砦歸之元祐二年進知院事時復洮河擒鬼章清宜結二邉小清而並塞猶苦寇掠燾言為國者不可好用兵亦不可畏用兵好則疲民畏則遣患今朝廷每戒疆吏非舉國入寇毋得應之則固畏用兵矣雖僅保障戍實墮其計中願復講攻擾之䇿且乾順幼豎梁氏擅權族黨酋渠多反側顧望若有以離間之未必不回戈而復怨此一竒也其後夏人自相攜貳使来修貢悉如燾䇿元豐間中書舍人曽鞏乞存恤外國請著為令上言曰臣昨任明州日有髙麗國界託羅國人崔舉等因風失船飄流至泉州界得捕魚船援救全度從此隨捕魚船同力採捕得食自給後於泉州自願来明州候有便船却歸本國泉州給與沿路口劵差人押来臣尋為置酒食犒設送在僧寺安泊逐日給與食物仍五日一次别設酒食具状奏聞臣奏未到之間先據泉州奏到奉聖㫖令於係官屋舍安泊常切照管則臣存恤舉等頗合朝廷之意自後更與各置衣装同天節日亦令冠帶得預宴設竊以海外蠻夷遭罹禍亂漂溺流轉逺失鄉土得自託扵中國中國禮義所出宜厚加撫存令不失所泉州初但給與口劵差人徒歩押来恐於朝廷矜恤之恩有所未稱檢皇祐一路編勅亦只有給與口食指揮今来聖㫖令於係官屋舍安泊常加照管事理不同縁今来所降聖㫖未有著令欲乞今後髙麗等國人船因風勢不便或有飄失到沿海諸州縣並令置酒食犒設送係官屋舍安泊逐日給與食物仍數日一次别設酒食闕衣服者官為置造路道隨水陸給借鞍馬舟船具析奏聞其欲歸本國者取禀朝㫖所貴逺人得知朝廷仁恩待遇之意神宗時晁補之上書論北事曰臣窮年把經志願局促緑衣紵絮多學無益竊甘野人自曝之温輒昧廣厦重裘之燠退無尸祝尊爼之位進干庖人操刀之職不計僭越冒言天下之事陛下赦其狂瞽而矜其市井草莽有介然之心一賜察省天下幸甚天下之治莫大於制禮作樂而臣之愚以謂二事有在於施設之後者其所先舉者已定天下晏然則禮不制而備樂不作而洽凡此所缺特北敵一事而已臣思之至深以謂陛下神道設教紀綱既正天下大定燕居而髙拱百工安職四民樂業矣而不能無一朝之事或經聖慮者庶幾在此廼臣之狂瞽而深思所至有取萬一則臣區區窮年抱經志願局促猶不為緑衣紵絮多學無益夫豈惟天下幸甚臣之師教臣亦若此也北敵猖狂敢冒故疆使天下百年有為兵不得藏今四野肅清邉不告遽而縉紳先生四方寒士或北首憤悱争道利害者非願扵太平無為之時生事覓功特以中國之地前王之舊有未復而已獻言陳計者踵相接扵國陛下優而容之如假種借耕乆貸不償亦不以劵責豈非周慎再思萬舉萬全以謂将欲取之必固予之不欲以所重試所輕哉内治未具不遑外憂心腹既寜手足當治以今準昔莫利此時置而不念何以異夫宿雨坳池科斗所泳不以時去設不害事而鼃黽日喧乃臣之所願為陛下深思者特曰以中國之師責中國之地得地而師觧不為無名如此而已陛下知兵之道愈於黄帝復古之功過於宣王披圗在目長想逺慮則窮髮龍堆螻蟻藏情不待前箸而臣私憂過計竊不自揆忘巳之愚不敢膠柱鼓瑟御馬以書陛下一發天光使得竭忠則言而有罪非臣所敢避也夫北敵之盛莫盛漢唐而所以制之亦漢唐為得三王以前事則經見戰國之際人自為防徧舉悉數則孰與四庫之書終始為備百執之謀同異致詳故臣輒皆置而不論漢唐之所以制其彊者其彊可制則方其弱時不論可知漢病匈奴唐病突厥至扵畿内鳴鏑渭橋按轡後宫辱扵敵兵宗室降扵絶域其形如此之逼也然而列五單于滅兩突厥擒回紇制延陀漠南塞北皆漢之賦盧龍松漠皆唐之府臣深思至此然後知北敵之盛雖莫盛扵漢唐而所以制之亦漢唐為得也冒頓烏維力足以弊漢而武帝雄才數戰不倦匈奴絶幕自以漢不能至而漢率二三嵗一出或二千里不見一人故匈奴至扵孕重墮殰罷極苦之夫搏䑕當庭善遁易失灌垣燻穴則生無聊賴故欲戰在我則不欲戰在敵此其情自昔然也頡利突利進如飈風而太宗知兵善戰敵在其術中而不悟兩陣馳語二主坐攜六騎臨水群酋奪魄靈朔之境曰我将滅之命有司更所與書為詔若勅思摩孱懦至感恩流涕願為中國守䕶北門盖五十年無突厥患臣嘗壮二主以謂得一時之權置三王之事則漢唐之事猶在中䇿何遽無䇿乎今臣又計之耶律雖桀驁其彊亦未有以過匈奴突厥者陛下神武不殺髙越前世制之得術可使繞指惟上之命何至越百餘年而不暇營哉臣請為陛下言契丹可取之形五古者北邉無大君長種落部族不相統攝捽搏鬬擊彊者為制往往而聚者百有餘部勝不相推敗不相愛尺地一民不自保而有也無城郭邑居故其民遷徙難制無耕田作業故其人食足不勞無文書約束故其人一而易使無營陣行伍故其人戰自趨利彼以其智力之全不治四者而一之扵鞍馬射獵中國亦以其智力雜治四者日夜不息而以應北敵之至門故其自視常以無法勝中國利則烏合譟而從人不利則雲散四去欲追無所自冒頓盡有北垂之地北人始不安其舊而有侈心尺地一民皆欲保而有之不能去也其後衛律教單于穿井築城治樓以藏粟或者以謂敵不能守降及唐世尤以合中國之好為重至佩印綬服爵命廢一置一皆決於朝廷羈臣之在中國者或樂而忘歸北人自是益雜中國之俗乃臣以今料之則盧龍范陽中國故地又非特如此而已城郭邑居耕田作業文書約束營陣行伍四者皆因漢俗而北無一焉雜䖏而交治欲其胥而北不知彊勉之難堪此其可取之形一也冒頓烏維伊種皆席匈奴之始彊能以其力為中國患武帝中年力盡扵北敵而朔方之患無嵗無之然匈奴卒不能踰塞而南以有漢尺寸之地而隂山草木茂盛單于之所依阻者漢輒奪焉匈奴失隂山之後過之未嘗不哭也頡利突利延陀之兵皆號精悍數入寇唐一旦至渭上薄畿内唐亦以其南征北伐之餘力完不弊日削月剥至奪之地而𨽻都護府不敢輒怨盖未有坦然肆志去石晋如摧林取中原若破竹如耶律之侈者臣嘗計之其君亦非有冒頓頡利等軰沈毅雄勇之姿按巴堅恃有天命而徳光之暴以謂晉之立自我晉亦不勝其徳而屈之敵人不制日益侈大割地弗厭至踐驕敵此如黔中之驢土所不産方其一鳴虎為逺遁而其技止此亦足悲也夫人之情勝則驕驕則不自彊乗秋未霜則水濵之腐草猶足以争明扵隂夜天寒既至萬物将肅則莫或使之一夕而零其理然也璟與明賢皆柔懦不事事隆緒稱多謀不能復振焉宗真好樂兩母争權至内相殘當是時皆有可乗之隙而中國不取迄扵今四十年彼其君茍非有過人之才臣知今日之治與璟明宗真未大異也夫知敵之主知敵之将則每戰不殆彼曲我直我整彼亂此其可取之形二也石氏之割地當其需人之力制命在外無以異於晉惠公河外之列城買人而已無積仁累義之資一朝而有天下舉天下之大偲偲然常恐其不能守何暇重割地哉譬窮室之人驟獲千金不能經營販夫孺子皆得以起而制其弊富家巨室力足以仁其四鄰則四鄰之外所衣食者猶我有也尚誰得而嗇之哉石氏既亡京師不守中國為之一虚當時人君内憂其腹心外病其四鄰中國狼顧自救之不暇故北人得以竊計其不及圗巳而跳踉虚喝求以堅中國不動之心至扵柴周天下小定以其享國之日淺乃能用一朝之議一戰而勝以復三闗由是言之敵雖彊中國雖積衰之緒猶足以勝之況治朝哉耶律明時敵已浸盛柴周之取三闗盖人有告之者曰此本漢地何惜之有然則彼其平居驁然不顧跳踉虚喝豈固敢吝其非己有之分為所常守之資哉求以堅中國不動之心而已今國家百年太平而陛下神武不殺髙越前古心有所懐威動萬里柴周叔世臣豈敢議然以今天下言之運偶聖人時在千一富萬柴周力萬柴周将賢則萬柴周士勇則萬柴周斷而必行鬼神且避以懾小寇勢易破竹此其可取之形三也太祖龍興不折一矢不馳一馬而有天下天下稽顙而稱臣五國委命而下吏夏商之興莫若此之㨗也當是時舉中國之兵十二萬而已太宗皇帝繼以神武之資經營四方至于大定并汾之討師乆扵外雖迄奏功然倉廪之羨士卒之鋭殫憊於河東太宗為社稷長慮慨然太息有恢復心士不弛弓馬不觧勒倍道兼行越數百里一日出塞金鼓之聲如在天上敵不素備而燕城遂圍分軍收城所向輒靡天下以謂遂無敵矣幽燕之人老弱登埤而望乗輿無意復戰敵之計自謂力不足抗乃為先聲張言兵至號五十萬太宗重愛民命不肯以力服敵欲退脩徳以懐之而師乆翺翔士馬南首亦有怠意幾舉而捨燕既釋圍而諸将所下輒復為敵盖臣聞之城中有謀執其帥而降者王師既還莫不泣下雖然北人自是始有疑中國之心四方已定中國厭兵景徳之役乗中國不虞大舉来寇章聖北廵天意助順彍弩竊發遂隕達蘭敵相顧自失屈首請命亦無復闘志當時之議以謂乗勝席巻兩翼遮前大軍從後可使無遺噍而天子嘉其既服亦棄不戮敵始痛自懲艾以謂中國不可得而侮也夫太宗以收并汾之餘力計議無素倉卒北狩然而一舉幾復章聖以寇出不虞至犯輔郡出師逆擊然而一戰遂却況今陛下席祖宗積累之舊敵不加彊而中國之盛則倍前日肉食之謀芻蕘之言垂數十年已審已備計成而動何慮不獲此其可取之形四也太祖神武有希世之謀御将訓兵臨機料敵出人意表舉天下之衆宰制役使如視嬰兒嘗謂北人之衆不過二十萬吾以十縑購一敵二百萬縑足矣以太祖神武左右之将不減衞霍滅越滅吳滅江南滅蜀滅河東天下已安四方之金帛充於内府士卒平居無事奕博超距志意無所騁當是時中國特不舉設有為敵孰能禦之者天下百年無水旱兵革法度致脩人物阜安以三十年之通制國用山積水委漢唐所無則成太祖之志臣以謂固在於今日陛下建學設科使為士者知兵頒教立法使為兵者知戰十有餘年墯慢疲軟之氣既復拯矣而堅甲利兵羨於四邉偏州小戎不移而具臣竊以北道三數者言之通都要路一庫之藏足以衣被十萬況濟之以大司馬之備驃騎西征艑師南畧河隍六城交州九郡歸命内附而飛輓之煩不及於邉民此其前古未有也舉事動衆宜百日之費者今千日之費不憂乏宜百金之賞者今千金之賞不憂匱盖非徒以厚費重賞為得也要以為前世之所不為者知今日之能為之而已順流建瓴如風靡草以臨不加彊之敵此其可取之形五也兵法曰取兵之極陛下亦既知形則不圗而何待臣請為陛下言所以入敵之䇿夫欲興大事所病者兵不衆食不充天下之言者必曰舉二十萬衆度百日糧鳴鼓而攻之以臨不加彊之敵如孟賁之戰嬰兒何徃而不可入而臣獨計以謂非勝之難所以入敵者實難以樊噲之驍悍自意得十萬之衆足以横行於匈奴而或者曰樊噲可斬夫使好竒之人不度是非不量利害髙論而忼慨其言固甚可喜然空語無施扵實事則陛下尚誰取之今臣則不然舉二十萬衆度百日糧非三年經營之不可借使以國家之盛一朝而可集銜枚縛馬口千里奄至雖計甚祕而人固有知之者矣緜十許州塘水之浸以彼入非易故我入亦難阻塞而陣燕亦起而拒白溝之南兵雖衆食雖充非勝不能入也臣請為陛下效臣之狂計盖昔者尉陀畔越漢兵出豫章出㑹稽而唐䝉獨上書發巴蜀罪人下牂牁以出越人不意卒平南越蜀姜維拒劔閣鄧艾乃潛自隂平馳無人之地七百里卒降劉禪兩人者若校之以事而索其情則皆近乎不知迂直之計而臣則以謂論越與蜀者不如是則不可得而入今敵之勢亦何以異此臣請先為樓船百艘精甲萬人浮膠東待渤海而勿發使大軍出次於王畿聲言以十萬出瓦橋瓦橋敵所備出亦此入亦此在兵法則所謂以正合者也潛軍其東以五萬則自滄趨平州同時而偕發潛軍其西以五萬則自代趨雲州同時而偕發平雲非敵之所素備則滄代之兵宜易入兩翼偕縱則燕之東西可擾矣東軍入平州戰且誘以稍西行附於瓦橋之軍矣西軍入雲州戰且略翺翔乎蔚朔之間而東以牽制敵勢敵必分軍以禦雲州然後瓦橋之大軍與東軍合勢南偕入則涿州新城不戰而可收東軍既棄平州平州備少觧然後渤海之精甲可以乗間入平州平州下則營并舉矣乃間使渤海之師通髙麗曰中國責故地髙麗宜以爾兵從而析渤海之精甲三千背道絶險以徑中京之南繚古北之後奪闗而守之謹守勿戰敵狼狽自救然後雲州之西軍鼓而東以取易州而與大軍合吾兵益張乃稍乗勝逐北則燕城可圍矣度燕城之大二十七里而止一人而守地六尺三圍之則滿卒三萬守地無餘以二十萬衆頓燕南攻而圍之若適三萬則是野戰以拒敵之大軍者猶十七萬也度敵之大軍亦不過二十萬盡燕城之大而以五萬人實之不能容矣敵之名統軍在燕城者其所護契丹奚渤海兵馬數才滿三萬而其曰侍衛在燕城者騎一萬歩一萬而止借使臣所聞未實敵能益之度燕城之大不過容五萬則既勃蹊矣而大軍相持傖囊未決其勢不相救以三萬鋭師濟以臨衝雲梯之械并力而急攻間使張良陳平不愛千金從反間以啗城中臣敵之子孫能以禍福諭其衆使内附者許以封侯萬户之賞彼其在敵或身居将相而服衣食飲不免扵輿皁之賤一聞徳音宜有發憤内應如望并汾之師者一人有心則舉燕城之内其勢摇矣燕城可圍則山前後之地雖未盡復可徐致也臣又率臣之意料之使敵能出上䇿中國之師始動敵無空國逆戰亦以二十萬拒大軍而更練竒兵間道他徑反乗我隙我大軍逺戍深討而敵兵出於不意釋燕而自圗則前功一發而盡廢欲勿釋耶而自治未可安能治人然而舉塞上十許州言之大軍出瓦橋矣又五萬出滄五萬出代敵亦以其軍三析之而應我滄翼其右而霸與信安保定介其間使堅壁勿戰則敵雖出竒兵亦必不能入霸入信安入保定代翼其左而保與廣信安肅介其間使堅壁勿戰則敵雖能出竒兵亦必不能入保入廣信入安肅何則吾為之守者素也置是數者自渤海之東言之操舟於水固非敵之所宜便而其所不當忽萬一可虞意者其西北之疆乎昔唐安禄山以范陽亂稱兵朔方中犯京兆不朞月耳臣嘗考之圗志則禄山所行自燕而西其跡具存不可不察也國家方恢復河湟全秦之力河湟之所仰或者思患而豫防之益全秦之地以待敵之出扵不意如此而已臣又率臣之意料之今單于之才不聞其沈毅雄勇敢為難制如冒頓烏維頡利突利等軰比者其左右賢王谷蠡亦非有如張説所稱闕特勒暾欲谷之徒超卓過人之才帖帖然慕中國學文字工語言是口尚乳臭安知出上䇿哉敵計出於數者而皆不能遂則臣之所料不過舉國興師烏合雲屯而已使敵先能扼古北口而守之渤海之舟師無以伺其利則我東軍扼彌老符家私亭口之右以西軍扼挑峪紫荆金坡口之左使其東西不能出竒而後大軍鼓行而陣以挑其南敵進不能拒退無所逃不力戰求勝則必有内顧自保之心此在兵法所謂窮寇臣請勿薄勿逼緩而持之置曹王居庸等闗而無奪以開其生路我亦視白溝之南塘水之浸所從歸者狹何以異扵淮隂泜水之傳湌東西與北三面薄阻而背阻塘水則士卒無所住其心宜固當是時陛下得人如韓信使乗其㑹則攘而扼之於井陘莫利乎此顧為陛下将者如何耳臨衝雲梯器械致脩士力致完以中國之善攻而加不能善守之敵則二十七里之城而已何為而不下燕城下空其積以賞戰士以臣度之三年可以無飛輓自京東西與河朔之列郡更輦緡榖以實之臨以重臣列亭障扵外燕可守也陛下以河湟六城之富孰與全燕河湟遼逺城中素空匱中國且能保而實之則全燕之富其易守可知也惟其城郭邑居耕田作業文書約束營陣行伍無一不出中國之舊今以中國之法守之其民宜易安燕城既守則凡石氏之故地猶不盡舉者未之有也雖然臣猶有説者則在乎先勝而後戰夫入人之地欲其不迷不可以不知地索人之情欲其不匿不可以不明間地可知間可明而軍無選鋒則兵不可以交有選鋒而不較長短不合外助則雖多猶寡也臣請為陛下言所以必勝之道陛下誠得數十将用之則何患夫四五者為今之慮士已知兵兵已知戰而臣獨過計以謂今選扵班列以将名官者患未試而已夫将欲興大事不可以無重臣重臣君所信功業已試可使士卒素附可使四夷知畏可使位重徳亦重可使權重威亦重可使舉一軍二十萬之衆而重臣得其人軍之命定矣千夫長萬夫長才各不同則舉二十萬之軍大吏偏禆二百人而後可也夫安能皆得重臣者而使之将委之有司之選耶則天下必有蕭何之至明然後可以知韓信之未試不然則趙括之易言不窮天下幾何其不以言而信之人之才有不能治一妻一妾者有不能耘三畆之宅者持籌挟筭擐甲百萬守地千里翛然不勞乎其間忘昔之短也平居自喜􅃝裼而按劔志如飄風而聞金鼓之聲失氣而死此人之情也然則将其可以不試哉天下之言兵曰微妙者祖孫吴然臣以謂是何以異扵宋人之遺劵宻數其齒而曰吾富可待豈不誤哉陛下知人能哲興大事選大将帥既已得其人矣凡此臣不敢議然臣以謂舉二十萬衆而為之吏者二百人所試者在此而已子文之治兵終朝而罷不戮一人子玉之治兵終日而罷鞭七人貫三人耳然而君子與子文李廣之行軍逐水草不擊刁斗程不識之行軍嚴斥候擊刁斗自衛然而士卒樂李廣将之才固不可而一也孫武之試於吳也以婦人孫臏之試扵齊也以上中下馬用之扵婦人用之扵馳馬非将之常也兩人者唯其無所不可用以成功故卒之武能将吳以入郢臏能将齊以却魏豈不用其試哉驪山之閲天下擐戎服以令賢如郭元振幾以失軍容而誅而薛訥觧琬乃獨有不動之軍教使然也今天下之吏以将名官握兵柄習軍事者環列於輔郡迨數十人平居無事大車駟馬洋洋乎國中與之言兵而不能者幾人若此臣豈敢以為遂乏才哉凡所以必待試而後可用者特不敢以能之扵平居無事而信其用之於倉卒擾攘也陛下知人則哲能官人用人之仁去其貪用人之勇去其暴用人之智去其詐皆得其所以用則向之四五者凡可以委之大将而已以二十萬之軍度百日而後罷厮役在焉人日糒二升則率兩日而食非萬石不可百日則百萬千日則千萬邉儲不足以給則不可不權而入之於民今天下之買爵者緡錢五千髙得一尉下乃助教極矣為之説者曰商賈之子孫不可以掲而加之於民上此為説者之過也天下無賴之民㳺手不業計窮力盡者皆起而為兵能犯矢石致頭首有一日之勞則紆朱懐金美爵厚廪徃徃而加之民上者皆是也何獨至扵民而疑之天下之民不幸而陷於盜賊白日殺人而奪之財亦可棄矣甚者竄山林晨夜聚嘯州里為之摇動其中有一人焉造利而自言則賞千金而命之官未始疑也則夫商賈之子孫雖其類則賤矧未至於盜賊哉臣請為賣爵如漢故事惟勿為郎而已其餘皆可易之以他秩得比朝籍與京師官率能入粟扵邉滿三萬石者為之等級以授事定而止不過假百人粟可充也昔武帝用晁錯議卒弱匈奴乃臣區區意竊在此陛下幸聽焉則其詳有司可得而講也何謂知地夫四夷之與中國其土地風俗剛柔險易之不同猶之城市之與山林並得其宜各便其欲未嘗同也百蠻之地皆阻山負海逺者去王畿數千里一隅有故不得已而應就其近者調之則兵少不足以用欲置大軍則病道里之遼首尾衝決倉卒不救設或遂能致之其土地風俗皆非國之所習知萃百萬之衆而頓絶徼之下欲深入不可欲致敵不能譬之逐兔叢林遇六而失則良鷙逸足猶翺翔傍徨雖巧而無所效其理然也東南西南群夷皆絶逺致險論其近而與中國比者則莫若北敵古者北敵則本非與中國近且比也踰塞而北至於寒露逺野人跡所不至者乃稍稍屯聚盖李牧破林胡雖斥地千里而敵不能吝自漢至唐迄於五代始侵尋曼衍寖有中國之地自王畿而言則白溝之南千里而近耳置驛十數則舉朔漠之事十日而傳之可聞城郭邑居漢也耕田作業漢也文書約束漢也營陣行伍漢也舉山前後之地而言之無為而非漢者臣嘗披圗而觀起白溝趨燕城二百里而止居庸曹王大安黍谷崆峒之山環抱如箕而燕城峙其中自白溝而北衆山而南燕城之四隅在箕中者其地如掌由燕城之三隅東西與北衆山之塞川闗要害逺者不過四百里近乃二百里而止山非不可陟也水非不可渉也土地風氣水泉百物之産又非中國之所不習也徒可徒騎可騎車可車何動而不可圗正可正竒可竒伏可伏何動而不如欲顧為陛下将者如何耳何謂明間夫書生之論以謂仁義之兵無術而自勝此臣讀孫子至所謂賞莫厚於間事莫宻扵間非聖智不能用間非仁義不能使間非㣲妙不能得間之實臣始不信今乃知之夫使仁義之兵無術而自勝則敵衆我寡亦勝敵彊我弱亦勝敵實我虚亦勝敵逸我勞亦勝敵有備我無備亦勝而聖人者何事乎教民七年而後即戎而其曰不教民戰是謂棄之者又何用也夫仁義王者所以無敵於天下不得已而去焉兵可去而去仁義則不安至於不得已而用兵仁義非可忘而所謂權焉者盖聖人亦多有之而未嘗去也孫武無王佐之才而其言有用於王者之事間非平日之所宜先也故非聖智不能用非仁義不能使非微妙不能得其實如此而已聖君㕘之以獲逺人之心賢将持之以制三軍之命士卒獲之以幸封侯之賞逺人取之則四境不能以是一日而安其理然也秦得由余而八國賔燕入秦闗而東胡破漢厚閼氏而冒頓觧唐語突利而頡利疑此中國之以間勝外國者也韓王信在敵而匈奴入太原盧綰在敵而匈奴入上谷中行説在敵而漢不得美幣市匈奴以至於唐突厥以萬榮侍子而寇瀛州回紇以僕固懐恩而入涇陽此外國之以間勝中國者也自昔兵家之用間者一勝一負不可得而數姑以中國外國之制勝負者言之在中國則外國憂在夷狄則中國病此其理易知而其事難成不可不察也今臣以北敵之勢言之山前後之民大槩皆思漢并汾之事王師在燕有謀執其帥而降者誠能得張良陳平不愛千金以致内應猶反掌耳唐周鼎失沙州州人易服而臣敵嵗時祀父母衣中國之服號慟而藏之河廣武梁故時城郭未隳龍支城耋老見唐使者拜且泣曰頃從軍没扵此朝廷尚念之乎臣讀史書至此則慨然知燕之地士大夫之子孫宜有發憤不辱飲氣南首而望王師者徒患無以發之耳以契丹之舊法言之其得漢人皆僕妾役之仕宦而顯者歸見其主如舊禮殺漢人而以牛馬償之弗誅也迨蕭氏乃始徙漢人益北居而以契丹奚渤海之民雜處幽薊殺漢人者如殺人之罪自以謂漢人之子孫可懐矣然臣度之燕之人皆謹厚朴茂世漢種也終不能易其心白溝新城﨑立而相望漢之俗良美也不幸而子孫世世為擄痿人不忘起肓者不忘視勢不可矣天下誠不乏張良陳平之智不愛千金仗社稷之神靈所麾前移所指前死五間俱起莫知其道是為神紀裹幽薊之城百日而平使彼粟實可因而食使彼粟虚可因而墟也地可知間可明夫然後合三軍之士而表其技且勇者此之謂選鋒越有君子五千人秦之鬬士倍扵晉若此皆選鋒也凡兵尚義而保氣義之所勝愚可明氣之所加柔可彊人之情非有頓利之殊也顧上所以表之者何如而巳一夫當死市袒裼而大呼則千人為之失色童子按劔而先登則七尺之丈夫全軀保妻子者猶為之却也然則人之情豈固難知也哉前有大壑臨之則魄墮而懼狼狽却踵則身在平地夫誰肯舉足而蹈其危使為士卒者知有死之榮無生之辱夫然後顧平地不為安蹈大壑不為懼則攻何患堅城戰何患堅陣哉吳起臨陣有一夫不勝其勇遽前取首而還吳起曰雖勇非吾法也斬之吐蕃逼奉天渾瑊進單騎馳之挟敵一将躍而出一軍皆譟臣以為若此者皆可賞勿誅而吳起反之此用兵之過也鋒可選然而不校長短則臣以謂兵不可以交何則天下皆以北敵為善用兵而臣獨計非能出竒合變循環無窮也顧其長在騎射而已自圗志言之多馬之地半出扵北而其能挽弓騎射盖亦天性使然趙武靈王變服習騎射而由是以取中山此其為䇿之得者非以其所長制其長哉冒頓控絃百萬白登之圍騂駹驪白各以其方之色自古以馬戰未有如此之盛者也漢武帝中年鋭意馬偹阡陌之間盛或成羣比戰數勝匈奴罷極矣而其後亦以馬少不能復出則度漢之能以其長弊匈奴亦在騎不在徒明矣唐薛延陀不知以所長抗中國而自恃其數以徒勝執馬者既收而徒不能復為卒以取敗北人自是益自知其短於徒而中國亦暴其所長而術制之比者朝廷置騎射又教民蕃馬意良而法美矣而或者民之馬雖蕃而未教故臣以謂置義勇置保甲則民馬皆可以假而習夫馬生其水土則人心可知然而教訓之不安以之當北馬之新羈朝夕馳騁乎荆棘斥澤之地體安而心調者恐非敵也陛下誠用臣説則義勇保甲之籍扵民者方其教時皆使之習騎騎不足則更借之乎民馬嘗入而藉諸官者畨假之則民力不勞而馬不病不過三年天下皆可用之馬以是佐軍則漢之戰何以易此雖然猶有所需者則外助而已自昔為國未嘗不以外國制外國其説以謂海濵之蚌鷸兩自斃而後人能并得之匈奴方病漢而烏孫昆彌亦自以不得與中國通漢藉烏孫撫諸部以孤匈奴之外援校尉常惠護五将軍兵擊敵而昆彌常力戰為漢軍鋒所殺過當匈奴遂虚於是丁令攻其北烏桓入其東烏孫擊其西而匈奴析其兵支三敵國以南與漢争一旦之命卒以困弱至於裂五單于昆彌與有助也臣嘗譬之鄉邑之小盜三人而為輩則百人不得以力擒一人焉争財而不平則二人者不制而自弊何則其素相知者審也陛下南面負扆冠帯而朝百夷四海之内八荒之外心有所懐唯上之所命迺者髙麗折扵敵不敢越遼而西以効其一日之力於中國陛下能撫之至絶海蹈越綿數千里而入貢闕廷陛下嘉納遣使報聘増美於祖宗之禮臣聞之其國見使者至皆懽喜擁道自慶未始獲也彼其折於敵乆矣宜有以逞其志如烏孫昆彌者而臣未敢言焉凡此數者陛下得一重臣而委之與在廷一二之士嘗得豫聞腹心者皆可以使之雜而議然後臣之䇿庶幾乎可効也兵既定石氏之故地已復臣請謹封疆嚴斥候戒邉吏無得以非中國之地而利絲毫以為功且示聖人以天下為度而致誠信以結之彼雖失燕知其本中國之舊而不以為吝中國亦與之講好修聘懽猶昔時可使如伯氏之奪邑没齒而無怨言此百世之計也臣身未嘗為吏則凡國中之議是非利害不知其果何從姑以臣深思所得發扵畎畆憤悱之忠而不能以自揜者獻之闕下陛下好問如虞舜亦幸擇焉韓愈曰凡此蔡功惟斷乃成故臣至此猶願致其愚者則曰必行而已以臣之幼而學壮而欲行之心而又幸出於聖人之世三代之時以戴非常之治沐無窮之休褒衣博帯學古人之事而名諸生之列每聞陛下徳音雖在市井草莽欣喜自幸如第五倫其所願伸喙道説以求補扵萬一者豈特此書之所叙而已然臣竊以謂禮樂為大而必其所先舉者已定天下晏然然後禮不制而備樂不作而洽區區之愚盖在於此臣身賤跡外其學甚野輙敢不避鈇質之誅而冒言其所不當豫之事懐不能忍憤悱自致無以異扵傳之所謂怒鼃而幸人君之一式陛下揭日月之光而蔀屋之幽得以容則臣踈逺之言庶幾乎可採而無罪若乃安畎畆之賤而不知聖人之世三代之時非常之治無窮之休親逢之㑹為難遭則臣之倀倀不出門庭其失時亦極矣伏惟陛下萬幾之閒一留神聽焉天下幸甚天下幸甚臣無任俯伏待詔激切之至臣補之誠惶誠恐謹昧死再拜歴代名臣奏議卷三百四十四
