body:
  text: 厯代名臣奏議卷一百四十七明楊士竒等撰用人宋光宗紹熙元年湖南轉運判官陳傅良薦宋文仲等状曰臣恭覩明詔搜羅湖廣遺材竊見通直郎知潭州長沙縣宋文仲有通務之才而發於謙和有及物之志而安於静退葢文仲雖生長南土其家學則中原文獻也頃丞萍鄉藹有民譽方臣假守桂陽得其為人就訪之而文仲嘗為柱陽錄事參軍授臣本軍㑹計錄一卷臣遵行之所以能蠲除宿負罷弛斜科不得罪於其民者文仲之助也尋領使事訪以九郡利病無不周知前者倉司糴補諸郡米僅十萬斛今者漕司蠲錢亦數萬緡皆文仲發之臣以為文仲雖衡陽人實國士也奉議郎知常州無錫縣吳獵學問本於純實器識期於逺大所居闔郡宗為師友凡與之遊𩔖多自愛而獵於其交有善稱之不容口有過捄之不遺力有急難雖不利於其身赴之不恤也頃從事桂林幕府與平李接之亂未嘗言功已而帥臣劉焞不理於口而獵誼不避罪屢訟其寃人臣如此其不負國必矣臣守桂陽獵適為贍軍酒官助講荒政甚於飢渴桂陽故事遇皇帝登極奉表進銀三千兩屬方捄荒之際力不辦此臣懼無以塞責獵實教臣申請減額迄䝉睿旨損三之一為惠一方獵與有力臣以為獵雖長沙人亦國士也文林郎知潭州攸縣蔣礪素秉端亮恥為茍簡徃嵗江陵今兹攸縣廉惠之譽兩邑同辭觀其為吏茍不便於民雖上官令之不聽茍便於民雖匹夫不獲伸則身任其責也臣嘗見其詣闕所上書論廣右利害有四救弊之説及與提㸃刑獄司論經總制錢其言惻怛可以施用則邇臣所謂逺方因革可備咨訪者在静江則礪其人也奉議郎知全州清湘縣楊炤賦受沈審濟以通練亦佐桂幕與平李接之亂隨宜知變見謂善謀而其操履自不可奪及今為縣益著吏績郡實賴之臣得其嶺外鹽筴本末一書自開寳訖於淳熙上下二百餘年燦然明白其論以政和蔡京變法實為咎根馴致二廣連年多盜官船客販迭為民擾葢利東路則西人被其害利西路則東人被其害宜為損益兼惠兩路斯可以便公私息紛更以臣所見廣鹽之説十數家未有如炤之平者則邇臣所謂逺方因革可傋咨訪者在臨賀則炤其人也如臣不肖非有知人之明能得此數子於衆人未識之先正以乆居於此或聞之公論之熟或見之同事之詳如宋文仲吳獵之在湖南蔣礪楊炤之在廣右朋儕鄉黨咸所推先牧守賔僚無不器重臣如隠黙不惟負蔽賢之罪是不奉明詔也已於今年某月某日具状奏聞臣愚欲望聖慈特賜甄錄以昭示公朝不遐遺之美謹錄奏聞伏候勅旨四年傅良為起居舎人兼中書舎人繳奏給事中黄裳改除兵部侍郎状曰臣以樓鑰差充御試官時暫兼攝吏左房書黄事近者新除鄭汝諧權吏部侍郎録黄一道臣已書行去訖給事中黄裳不肯書讀輒有論奏臣於鄭汝諧有鄉曲之好於黄裳有僚友之情與此二人初無厚薄鄭汝諧之除授堪與不堪黄裳之封駁當與不當臣不復論思奉聖㫖改黄裳兵部侍郎此臣之所不敢黙黙也何者給舎封繳是謂官守其言行則謂之振職其言不行則謂之失職振職謂之功失職謂之罪此百王以来與國家列聖之所務暴白者也今者黄裳之言臣不識陛下以為是歟抑以為非歟若以為是則當聽從若以為非則當罷黜今也隂廢其言而陽遷其官是非不明賞罰倒置臣竊以為當今之時不宜有此何者隂廢其言而陽遷其官古来傳記嘗有此事若非猜阻之君喜權任數以此為葢抺之術則是姦囘之臣嫉賢醜正以此為中傷之計今陛下寛容樂易非猜阻之君二三大臣靖共正直非姦囘之佐不謂清朝有此過舉臣頃常奏事屢言君德當與天同毎䝉淵聽曲加奨納今夫天發生則為雨露肅殺則為霜雪未有明示雨露之恩而密加霜雪之慘者也由此觀之若裳所言悖理傷道熒惑聰明懐姦挟私變亂事實則陛下宜出其章播之公衆明怒而明黜之如此施行豈不正大若裳所言止於為國過慮無悖理傷道之失或是求人太備無懐姦挟私之邪則以陛下明恕何所不容豈因違忤遽有遷改今乃名為進官而實奪其當言之職外示優假而中不無怒絶之意遂使凡有官守人人自疑黄裳雖去何以繼之强顔緘黙誰無愧恥隨事正捄未知所終則此際之後将見給舎竟為虛設雖有忠賢無以自明此臣之所甚憂而不敢黙黙也欲望睿慈少霽天威收囘成命令黄裳依舊供職以釋在廷之疑以為来者之勸傅良又上奏曰臣昨具奏給事中黄裳緣封駁不行改除兵部侍郎乞收成命且令黄裳依舊供職所有錄黄一道當日繳還中書門下省去後更不付出仰見聖心本無適莫不惟闊略黄裳違忤亦復不以僭越罪臣感激隆寛何以論報然黄裳尚未被受供職指揮瑣闥闕官今已數日臣愚窺度或者陛下以為無此故事尚遲之耳臣考之史𫝊人臣暫失人主之意將及去官俄而再留者不可勝數今特舉給事中二事為陛下誦之唐吕元膺自給事中除同州刺史及入謝奏對激切憲宗嘉之翊日語宰相曰元膺讜言直氣朕欲留在左右使言得失李藩裴垍進賀曰陛下納諫冠於前王臣等既不能廣求直士又不能數進直言合當負罪今請以元膺復為給事中上悦而從之且夫元膺解職刺州已有成命而憲宗終惜其去李藩裴垍復贊其留遂令元膺再還舊官故憲宗號為英主裴李亦稱名相雖然此猶是唐朝故事非本朝家法也紹興二年以兵部尚書權邦彦為簽書樞密院事給事中程瑀三疏駁之尋令他官書讀程瑀乞罷遂遷兵部侍郎瑀不拜除龍圗閣待制知信州臺諫官江躋方孟卿皆言黄門職典出納顧不留瑀自助竊為朝廷惜之上批復除瑀給事中及入謝上曰給事之設正要駁異豈在雷同朕以卿再三求去勉從所請然深不欲卿去故再有此除瑀出特賜象笏是則陛下家法也仰惟髙宗中興之初君臣相與不事形迹故程瑀志在報國不以嬰鱗為懼而敢於駁邦彦江躋方孟卿志在惜賢不以朋比為嫌而敢於留瑀而髙宗天錫勇智從善如流故亦不以反汗為吝而深信躋等之説用瑀如故傳之史籍千載美談臣所以不敢信宿進此二事以贊聖斷之決伏望宸衷體髙廟無我之心二三大臣効李藩裴垍獻替之力特收成命速降黄裳依舊供職指揮以增聖治之光華以勸臣工之興起而微臣不肖亦得與江躋方孟卿同托不朽曷勝榮幸傅良又繳奏張子仁除節度使状曰臣恭覩數日以来一二明詔講慶夀之禮足以歡兩宫之心除鬻田之令足以快四海之望中外大小之臣莫不手額欣抃延頸以企曰近者二三大臣進退哀榮之典乆未予決意自今聖心豁然如天開霽必次第處分矣忽奉宸旨張子仁除節度使果有以見九重燕閒未嘗不軫懐勲舊而及其後人誠舉斯心而加諸大臣則一指揮之頃耳然而人之闗繫有重輕則事之施行有先後今二三大臣進退哀榮之典宰執臺諫屢嘗奏請方留未下而遽加恩於勲臣之子則是輕重不倫先後失序臣竊未曉不敢不為陛下條陳之且夫留正輔相初政于今四年言聽志行曾未有君臣之間而倉卒不審便出脩門揆之經義未為中節然而待放郊外屏居山樊自咎陳情亦既累月陛下誠怒之歟則策免舊章皆可覆視誠不欲其亟去歟則或以少保歸班但解機政或以内祠領使間奉朝謁則為政者進退惟命夫復何辭若猶鞅鞅觖望禀命不䖍則持憲臣僚豈容但己然則今置正弗問而遽加恩於子仁獨何歟恩足以及勲臣之後而念不至上相此臣之所未曉者一也非特此也趙雄以抱痾不痊均佚鄉郡陛下强起之以帥江西雄之遜牘亦一再上而重違天威當暑出峽竟以舊恙卒於官萬里旅櫬道路惻然雖雄勲業不敢望過厚之禮而有司常度安用損益何為恤典遲遲至今至如尤袤三朝老儒而陛下之潛邸僚友也最䝉睿簡行且大用而其致仕遺表之章亦數月未報然則今置雄等弗問而遽加恩於子仁又何歟恩足以及勲臣之後而念不至故老此臣之所未曉者二也非特此也闗陜對壘今六十年國家以十萬貔貅付之吳氏父子三世全蜀晏然不煩西顧者吳挺之力也陛下方將召見闕廷行采薇杕杜之禮曾未及講挺復致仕故尤以為傳聞失實屏申奏而不信豈非托重於挺愛之欲其生乎陛下之意則厚矣而非其事情也以挺之威望敵國之所窺覦則擇代不可以不謹以挺之恩信士卒之所懐感則恤終不可以不至以挺之事權海内偏重則一旦而收之又不可以不深加思慮也方今急務未有過此然則今置挺弗問而遽加恩於子仁抑又何歟恩足以及勲臣之後而念不至大將此臣之所未曉者三也雖然臣所云云特謂輕重不倫先後失序物論沸騰因事而進言耳若夫張子仁者介在閒散人不稱數雖少長將家而無横草之勞雖乆綴班行而無㳙埃之補不知何故得此殊渥且夫開府建旄非叙遷之官也告廷孚號非私昵之賞也無故而取之則交結之謗在子仁適足以禍已無故而予之則非常之恩在聖朝不足以勸人況張子仁嘗使令姚徳打死命官歐陽安中又有外宅婢阿闗用炮烙刀刃之刑虚害阿鄭等葢嘗經法寺定斷臺官覺察矣又皆以議功僅從追奪即其怙勢奸法見於奴婢罪状明白不當除授大略如此其他妨礙臣未暇數以煩天聽臣不勝拳拳欲望聖慈下采公論將張子仁無故恩數速賜罷寝於以光華主德尊重名器而亟因羣情舉行體貌大臣之禮則社稷之福也搢紳之願也所有錄黄臣未敢書行謹錄奏聞第二状曰今月十二日恭奉御筆付下臣昨奏繳張子仁除節度使事奉御筆為係勲臣之子特除節度使可與書行須至再有奏聞右臣昨不揆愚賤嘗繳奏張子仁除節度使事退惟螻蟻輒抗雷霆言雖當理死有餘罪今者恭奉御筆令臣書行仰惟聖度如天曲賜容忍而又親灑宸翰明示風旨顧臣何人尚敢違忤雖然臣聞修當行之政者足以慰傒望之情施無故之恩者足以来謗讟之口臣前所奏固知子仁之為勲臣子也但方羣情嗷嗷延頸累月皆以留正待放而罷命未聞趙雄告終而恤典不及􅏮然西陲擁兵十萬吳挺物故闕無主者當此時也而授鉞於閒散庸繆之臣宜先者反後宜緩者加急則是捨當行之政而推無故之恩臣恐傒望者惶惑而謗讟至矣此所以深為聖明惜此事體且夫報答舊勞孰與輔初政者之為親矜憐後裔孰與專帥閫者之為重此事理曉然豈唯羣臣雖子仁固知之也使子仁稍有念慮則亦於此恩數跼蹐不安矣臣是以不敢隱嘿須至再三庶幾熙朝不以無故之恩而先當行之政恭惟陛下聰明仁厚逺繼三五儻䝉少霽威嚴下采狂瞽而今而後天意豁然萬幾之間羣疑氷釋事闗廊廟則立見施行憂在疆場則便須處置上以承兩宫之志下以盡百辟之情人無後言事無後患如是則國家尊榮朝野欣豫雖勲舊子孫憑藉寵靈窮極富貴亦物議之所不及矣至如張子仁有罪無功自是不當有此除授則臣不暇論所有元御封付下臣奏状一件連粘在前謹錄奏聞紹熙中太學博士彭龜年乞留侍御史劉光祖以伸臺諫上疏曰臣等備數學官素餐無補事有職守不敢越思惟念國家開設學校所以涵養天下公議之原而臣等僅以課試文藝茍求塞責誠不足仰稱明指日夕憂懼不知所為適有一事偶闗士氣之消長臣等儻顧出位小嫌緘黙自愛揆之初心實所不忍臣等伏見殿中侍御史劉光祖近除太府少卿士論紛紛皆謂因論吳端除授之故事之始末疎逺小臣不能盡知或是或非皆不敢決然臣等竊以為不可者偶留近倖而遽遷臺臣其於國體所繫甚大臣嘗竊觀祖宗借重臺諫之意揆之古昔所未前聞劉安世劾胡宗愈至二十餘章而不以為瀆貴重大臣如文彦博因唐介一言為之亟罷而不以為横葢所以優假直臣尊安國勢其為計慮至深逺也今光祖論端其言必不如安世之切陛下偶然進端亦未必寵任如彦博也而祖宗處之如彼陛下處之如此比而觀之孰得孰失當不待人言而後喻矣陛下嗣登大寳始初清明隆寛盡下邁迹三五豈容有此瑕玷傳播四方寧免疑惑況天下士氣方患不振今日之事朝路籍籍皆以為不可而告陛下者曾幾何人平居則仰屋竊歎遇事則緘黙不言陛下既未有以興起斯弊而敢言者復不得伸臣等深恐言者自此不敢言而不言者亦以言為戒甚非國家之福也臣等私憂猶不止此陛下所以遷端者止念其服役之乆而言者適然攻之太亟陛下亦適然拒之太堅小人不知必謂其徒得君如此其專據勢如此其固附聲托影寖成驕横則他日將有不勝憂者當是之時臣等恐陛下尤費區處如今日也陛下天資恢廓以虛受人於天下事初何容心其始本無親昵近倖之意而遽進端其終亦無厭薄臺諫之意而遽踈光祖然疑似之迹未能昭明羣情共憂所當深慮昔韓維因論臺官進退有曰自古聖王優待諫諍之臣雖甚狂直必加含忍其勢非不能黜也以為黜此一人則傷衆多之心遂此一失則敗天下之事故不為也老臣憂國其言懇切深中事情臣等欲望陛下平心定氣更加審處少抑近倖之恩寵以伸臺諫之公論復留光祖俾復其位使天下曉然知陛下聖德光明本無偏倚自此無復顧慮各罄心腹以不負陛下任使實宗廟無疆之福臣等冐犯宸嚴罪當萬死不勝俯伏俟命之至龜年論續降指揮之弊上疏曰臣聞古之善治天下者詳於用人而略於用法故法不過制其大綱而君臣之間相與講切者唯擇人以付之而已故所用無非才而法亦恃以無敝後世徒欲以法籠絡天下左牽右制一創百補不勝其繁而用人之際鹵莾滅裂一切不問故人適足為法之蠧而紛紛改更皆非法之真敝實人敝之耳恭惟陛下聰明憲天不自克聖寛洪盡下言無不聞近日天下利害雖瑣細猥繁亦得以上達天聰然究其所言𩔖多責詳於法而不求治於人故朝下一勅夕更一令所謂續降者殆不勝紀錄曾不知官非其人法亦徒設姦吏舞弄出此入彼適足以亂吾法耳故臣妄謂善治天下者任法不如任人變法不如變俗使天下士大夫皆持公爾忘私國爾忘家之心以蒞官効職則國家之法何者非善茍有所不及亦必有以治之矣臣之區區願陛下與二三大臣先講所以官人之方無使資格得以容不才薦舉得以行私意移審度人情之心以審度人物變推行已私之智以推行公道則求用之人必無不才所居之官必稱其職雖以今日之法為天下葢有餘矣不然臣未見徒法可以立者唯陛下留神吏部尚書趙汝愚奏薦張漢卿元汝楫状曰臣等備數銓曹慚無補報所得滯淹之士兩人職守所在不敢隠黙竊見從事郎張漢卿初任監興國軍在城酒稅到官未乆偶太守不相知督責太過漢卿不堪其辱遂和淵明歸去来辭一篇大書於印歴而歸今杜門讀書恬澹自守已十有六年又承節郎元汝楫嘗監復州酒税課亦登辦時郡中公使庫有煑醖酸腐太守責令酒務變賣汝楫辭曰在城拍户困於省額不聊生矣豈能認無用之酒陪無名之錢乎堅拒不受太守怒押汝楫下簽㕔供責吏稍侵之汝楫曰我直彼曲何供之有遂取印歴一抹而歸今躬耕􅅵畆葢二十餘年矣臣等竊惟漢卿等皆一介小官能不為勢利所屈忍貧絶祿不辱其身若朝廷稍旌異之使各充其所志則異時臨事必有可觀伏望聖慈特將漢卿汝楫並與堂除差遣一次仍令吏部取索印紙重别換給庶幾廉恥道興縉紳知勸誠非小補汝愚薦蜀中三縣令狀曰臣頃嵗䝉恩備員制帥竊見西蜀四路多士如林其間學行優長俱被朝廷選用惟諸邑知縣未聞以治績䝉擢用者竊恐無以深慰逺俗臣伏見承議郎劉甲乃元祐名摯之曾孫㓜孤能自奮立昨知䕫州雲安縣其邑素號難理惟甲寛而有制明而不苛為政優游人自悦服既去而人思之宣教郎程驤人物秀整嘗宰峩眉青城兩大縣而青城尤多巨族租賦皆不以時輸送惟驤到官不用刑罰雖經累月而杖未嘗啓封人亦無犯從事郎謝辛為人磊落有志事功上津極邊僻逺乆無人願就惟辛一聞辟命略不辭難時有朝旨修鵠嶺闗工役甚大而窮山極谷民户凋零勢必甚擾賴辛躬行險阻委曲措辦事濟而人安之在任三年綏撫善良鋤治强狡四境安静及辛旣滿經今累年無復一人肯就辟者右三人非惟所居政績尤異而文學行誼亦皆可觀伏望聖慈特賜旌擢以為四蜀官吏之勸一方幸甚汝愚又應詔薦李信甫徐誼鄭湜王聞禮范蓀楊翼之状曰臣伏見朝請郎主管建昌軍仙都觀李信甫質實無華剛毅有守入居臺院頗著直聲出守近藩亦多美政朝奉郎兩浙西路提舉常平公事徐誼育徳粹温受才膚敏方居學校時已慨然有憂世之志今把麾持節所臨有聲朝奉郎知建寧府鄭湜文為國華積有時望建寧災宼之後人情未安自湜下車寛猛並用旬月之間吏民悦服右三人各曾任監司太守可備郎官卿監之選宣教郎荆湖北路安撫司幹辦公事王聞禮故太子詹事十朋之子重厚質直有其父風臨事毅然義形於色宣教郎邛州蒲江知縣范蓀資禀粹然清約自守臣見其嘗臨利害羣議紛紜蓀獨退避不爭人服其量從政郎前汀州武平縣丞楊翼之風力敏彊有志當世蒞官則政事可紀居鄉則信義可稱右三人資歴未深可備職事官之選若䝉朝廷擢用之後其間有不如所舉者臣甘坐謬舉之罰知潭州朱熹同監司薦潘燾韓越蔡咸方銓狀曰臣等竊見比年以来臣僚申嚴薦舉之法以革獨員之弊葢所以示公道而杜私情也然人之才固有不同而薦之者所見亦或不一徃徃獨員之薦常多而列銜之薦常少繇此故也臣等備員帥臣監司其於一路人才職當留意既不敢以己見獨薦而叅之以公論茍有可以備采擇者又安敢隠嘿竊見朝請大夫權知邵州潘燾以學問持身以儒雅飾吏不鄙夷其民首以教化為務崇尚學校修建先賢祠宇民有嚚訟諭之以理事至有司敏於決遣由是庭訟日簡郡圄屢空湖北猺宼侵犯邊境而燾處置得宜民用安堵至於移屯置寨為民防患者無所不用其至其他設施一切不茍臣熹昨與帥臣周必大已嘗以其姓名薦聞矣朝請郎權知全州韓邈名臣之後材力有餘入仕以来凡三作邑皆有可紀民情利病纎悉洞究全之為郡乆費枝梧而邈廼能檢柅吏姦稽考滲漏民間輸納不多取斛面縻費商稅寛減苛細前政財賦不辦邈至未幾即不欠漕計且足郡用奉議郎權通判邵州蔡咸有髙祖襄精明之風自初試吏即以能聞用獲盜賞改官又用收彊賊應副錢糧賞循資又因水澇賑濟中書籍記姓名比者邵有猺人之擾咸詣山前督捕暴露經時多設方略鈎致蠻䝤之情卒能使之恐懼納欵其他佐理郡政不競不隨經總制錢不待催督毎嵗溢額總所亦已保奏委之賑濟措置有方民被其惠奉議郎提刑司幹辦公事方銓器資宏裕識趣髙明向宰懐安劇邑連事三帥皆稱其寛簡不擾急吏緩民所薦之詞如出一口懐安之民至今稱之今任湖南屬官其在幕中靖重寡言澹若無營至於酬應事機多所贊助前任提刑孫某嘗以其學識深潛持守正固薦充所知是四人者職雖不同然其才各適於用欲望聖慈特加旌擢以為趨事赴功者之勸如後不如所舉臣等甘坐謬舉之罰須至奏聞者熹知漳州薦龍溪縣令翁徳廣状曰右臣叨被誤恩假守偏郡自到官以来惟思所以仰稱使令之意以為布宣徳意固為郡守之職然茍屬縣奉行不得其人則無自而及於百姓故嘗深察諸縣令佐之賢否其背公營私廢弛不職者已嘗按劾具奏得旨施行其蒞官公勤委有善状者又豈敢黙黙而不以上聞乎臣伏見朝奉郎知龍溪縣翁徳廣天資剛直才氣老成不為赫赫可喜之名而毎有懇懇愛民之實臣嘗以縣事大要者三察其施為知其果有可稱者刑獄詞訟財賦是也縣所解徒流以上罪嵗率數十臣取其案牘觀之見其親畫條目委曲難問必盡囚辭而後已及州司理院再行審鞫而囚卒無異辭皆以縣之所鞫為得其情是能上體國家哀矜庶獄之意也漳之四邑龍溪為大理訴之牒日百餘紙巧偽詆讕姦詐百出徳廣乃隨事處決終朝而畢人服其公未嘗有知責留禁之人是能使百姓無屈抑不申之訟也縣所賦入最為浩繁合三縣之數不足以當龍溪十分之八郡之經費賴以取足徳廣乃從容應辦民自樂輸吏無追督是能足用裕民而無抑配科斂之患也考其治行葢庶幾乎古之循吏者竊謂若使凡為縣者皆能如此則國家徳澤不患於壅隔而田里之間亦不復有歎息愁怨之聲矣臣與徳廣為同郡人其孝友稱於宗族行誼信於鄉閭臣素知之固已甚審至此一年察其所以施於有政者又如此故今不復以鄉曲為嫌已照薦舉格令舉充陞陟員數又念方以災患乞奉香火朝夕得旨便當解罷而徳廣去替亦以不逺竊恐後来者知徳廣之賢未能若臣之詳偶至脱略則在臣有見賢不能舉之罪臣愚欲望睿慈察臣所舉出於公論將徳廣特與陞擢差遣以為官吏勤事愛民之勸臣不勝大幸謹錄奏聞蔡戡奏薦鄂州通判劉清之状曰照對臣等待罪本路職任雖不同其於薦賢報國臣子之心則一部内有賢知而不舉當得蔽賢之罪臣等不敢隠嘿竊見承議郎通判鄂州軍州事劉清之學行醇篤議論正平不為矯激以盜虚名不肯詭隨以追時好其憂國愛民之心趨事赴功之意出於懇惻居官首以風化為務留意學校廣延生徒又率介胄子弟欲習兵書者肄業其中荆楚之俗明鬼病者不藥而巫死者不𦵏而火清之力禁止之而又斥滛昏之祠表烈女之墓抑告訐之風使民知嚮屢攝郡事邦人宜之頃任太常寺主簿以憂去官今任垂滿其人静重恥於自媒臣等不言終恐湮沒欲望睿慈特賜旌擢或且試以一郡必能撫字疲民假以一節必能澄清屬部儻不如所舉臣等甘坐謬舉之罰戡奏薦衡州通判宗嗣良状曰照對諸州通判亦號按察官郡守或闕必以次攝事如得其人則郡政賴以修舉所補不細臣等近遵聖旨考察一路郡守臧否具名聞奏去訖惟是通判攝行郡事顯有勞効者臣等職在廉察其敢蔽而不言竊見通直郎權通判衡州軍州事宗嗣良故觀文殿學士京城留守澤之孫澤以忠義著聞而嗣良天資明敏濟以勤恪自到官之初適値知州趙彦恂因言章放罷嗣良實權州事衡為湖南劇郡嗣良不以時暫權攝而懐茍且之心決遣滯訟曉夕不懈蠲除苛斂務寛民力稽察欺隠財賦自足首尾半年之間起發上供錢物應副官兵請給並無違闕而不聞秋毫之擾安撫轉運兩司委嗣良和糴米三萬餘石未嘗遏糴而應期了辦其他處事多合人情一郡士民翕然稱之近已得守臣張緯到任交割訖緯嘗知南康軍嗣良為建昌知縣累政皆以罪去而嗣良獨以治辦稱緯亦素知其能到郡之初賴以協濟兼詢訪得嗣良初任汀州長汀縣主簿郡守以廉吏薦嘗䝉中書省籍記姓名次任静江府靈川縣令亦為漕臣所薦今觀其人禀資强敏足以辦事存心忠厚不肯擾民如䝉朝廷付以劇任必有可觀欲望聖慈特賜旌擢使之展盡其才亦為能吏之勸不勝幸甚戡又奏薦臨安通判王補之状曰臣猥以踈庸承乏京邑適值多事加以歉嵗應辦百出惴惴然惟曠敗是憂所賴寮佐同心叶濟僅無遺闕臣嘗具奏乞將趨事赴功之人稍加旌擢激厲其餘得旨依奏臣竊見臨安府通判王補之天資敏明濟以勤恪精通法令兼曉義理臨事不茍處事適中而又行之以公持之以恕毎有滯訟疑獄多委參訂必加詳審於人情法意無不曲當昨来禁中修造阜陵發引與夫舉行荒政悉以委之一皆趨辦臣賴其裨贊為多考其治行實為一府僚屬之最兼其人試中法科曾任大理寺丞例當得郡而乃俯就倅貳之職其廉於進取可知欲望聖慈特賜旌擢他日或有繁難任使必能了辦儻不如言甘坐謬舉之罰戡又奏薦胡槻万俟似狀曰照對臣等所部二十四州去朝廷􅆟逺仕者不憚數千里深入瘴鄉無非為利媮惰茍且浸以成風鮮有不溺其習者其間廉平之吏僅或有之求其材術優異治績昭著者得二人焉臣等隠黙不言不惟獲蔽賢之罪淑慝不分亦無以示勸臣敢冒死奏聞竊見奉議郎知邕州胡槻名臣銓之孫家學自有源流其人性資明爽風力强敏有志事功究心職業前任静江府通判差權貴融象三州所至輒最諸司交薦之邕管極邊控禦溪洞彈壓盜賊最為要地管下武緣宣化二縣羣盜淵藪豪猾巨寇根株囊橐盤固累年吏不能制槻到官未乆廣設方略遣人擒捕戮其渠魁蕩其巢穴餘黨鼠竄境内帖然比年以来沿邊官吏多為州洞所啗恣其侵暴不敢呵問槻正已律人無一毫與之交私示以威信蠻猺知畏姦民販鬻生口賣出外界槻力行禁止此患少息蠻人互市吏卒姦弊百出槻痛革之又能節損用度修葺城壁建樓屋千餘間除治軍器訓練士卒以備不虞勸誘州洞士人入學聽讀使知忠義職務具舉課其治效實為一道之最又朝奉大夫通判静江府万俟似故相卨之孫其材具風力不在槻下雖兩佐郡未究所長前任潭州通判帥臣王藺余端禮相繼力薦於朝㑹似適以憂去今任到官累月協贊郡政非一其人明而能恕敏而加審凡定奪公事躬覽案牘剖決是非平允詳盡合於法意當於人心委之以事不擇劇易不避嫌怨毅然有守不可干以私動遵繩檢恪守廉隅不為流俗所移寮吏之中未易多得實為一府之望臣等與二人素無雅故亦非請托既知其才不敢隠蔽欲望聖慈特賜旌擢以為逺方官吏之勸儻不如所言臣等甘坐謬舉之罰戡又奏薦髙商老周熺劉董状曰照對臣等俱䝉誤恩臨蒞劇部思欲推廣徳意惟藉郡守得人凡二十四州之廣其有治績顯著者敢不相繼奏聞向者諸司嘗以知邕州胡槻為一路之最首先剡上未䝉朝廷施行續加考察復得其人不避煩瀆輒敢論薦伏見朝請郎權知象州髙商老行誼著聞鄉間才術見推流輩文學吏事皆有過人頃宰劇邑已著能稱前後守臣以其政績上聞嘗降四轄指揮今為象臺行將兩考為政平易民懐吏畏檢柅姦弊郡計自然有餘撫摩凋殘田野為之加闢以至興修學校繕治城池鼎新軍營易茒以瓦區處有方人不知役繼累政窘匱之餘而能百廢具舉稽之列城未易多得又朝散大夫知潯州周熺問學深醇操履堅正秉心静退恬於勢利士論鄉評莫不歸重繼宰兩邑吏民至今去思逮為總所幹官分務池陽革去弊蠧號為稱職諸司亦嘗交章論薦今兹試郡清潯愷悌宜民恪意牧養流亡復業獄訟清簡人皆安之在一路中獨無訟牒至於諸司又能持身廉介以律寮吏乆例以魚稅錢幾千緡充郡守月給熺皆却而不取人所難能攷其治行近古循吏又朝奉大夫知宜州劉董元祐故相摯之後動遵家法嚴正有守吏不能欺試郡西融諸司已嘗論薦宜陽控扼羣蠻最為衝要而郡計窘匱事多廢弛自董到官數月之間興滯補弊井井有條理諸猺奉賜官兵廪祿率皆按月支給無復異時逋滯之苦奉行鹽筴尤得其宜調度賴以豐裕民猺安堵不相侵擾實為邊最臣等參訂共議得此三人不敢隠黙自貽蔽賢之罪亦不敢私徇以干謬舉之罰欲望聖慈特加甄擢庶幾可為逺方牧守之勸戡又奏薦蔣来叟状曰臣守藩行且再朞自念初無毫分可以稱塞惟有薦賢報國之心不能自已竊見静江府雖邈在嶠南然國家二百餘年聲教所暨風化所漸為日滋乆比来文物寖盛人材間出過於疇曩徃徃困於僻逺無路自達終老炎荒今有卓然傑立而為郡適在廵管之内者不敢隠嘿謹以薦聞竊見知賔州蔣来叟天姿敏明抱負瓌偉積文種學夐出輩流蒞官臨民動輒可紀早中甲科繼登朝列其人材可與中州之士頡頏實為二廣人物之秀今守荒逺小郡規模施設如古循吏治行藹聞為一路最特處之未得其地用之不盡其材使之陸沈瘴鄉誠為可惜若假以内地麾節漸加擢用必有可觀臣愚欲望聖慈特賜甄錄以為逺方表勸庶使嶺外士子仰認聖主不忘逺之意後来人材出者皆知激厲以傋國家器使不為無補臣不勝區區至願謹錄奏聞戡又奏薦趙時侃方信孺状曰照對臣今月二十六日承宰州公文準吏部符七月初二日三省同奉聖旨在内令侍從臺諫兩省卿監郎官在外令監司郡守前宰執侍從不拘文武臣各舉人材三兩人限三日具奏者臣伏覩奉議郎通判常州軍州事趙時侃性資闓爽吏事精明濟之以中和飾之以儒雅初調武進縣尉已有能稱適値嵗飢盜賊旁午時侃廣布耳目多設方略尋即捕獲用賞改官及宰句容剖決民訟皆得其平經理財賦不擾而辦興利除害愛民戢吏邑人至今思之今任毗陵郡丞究心職業有志事功處心和平不尚苛刻蒞事勤恪不為茍且佐理郡政調娱為多諸司所委看定案牘平讞獄訟咸謂允當列銜論薦者至再前後舉者二十餘人其人老成詳審練達疏通凡所施為無不中節事方業委時侃處之綽有餘裕付以一路必能澄按所部畀以一郡必能惠養小民委之繁劇必能治辦今已書兩考旦夕受代唯朝廷所用又承務郎知紹興府蕭山縣丞淮東隨軍轉運司幹辦公事方信孺材猷雋明風力强敏文采吏事皆有可觀粤自弱嵗下筆出語固已驚人出於天資非由學力及其入仕慷慨敢為事不辭難所治輒辦初調番禺縣尉承累政廢壞之後創立􅅟宇葢造營房置辦軍器教閲弓手境内肅然番禺新㑹闕令府檄攝事剗剔蠧弊百廢一新朝廷行下勸諭納粟本府委令信孺措置到三萬餘石諸司知其才同銜奏辟知增城縣上章列薦者無慮十數今任以獲盜賞改秩知蕭山縣丞到官未幾姓名聞於朝廷選差充淮東隨軍轉運司幹官見在軍前應辦其人年壯氣盛有意功名奮厲激昻不擇劇易少加涵養必為成材内而繁難執事外而沿邊任使皆可試用此二人者臣或目擊其治行或熟知其才業舉以應詔將来朝廷擢用後不如所舉甘俟朝典戡又奏薦万俟佀張忠恕狀曰照對臣等濫膺委寄刺舉列城五嶺之西封域至廣薦賢揚善職所宜先雖在僻逺猶當識拔況居臺府之下夐出流軰之中若不公共奏聞何以明示表勸伏見朝奉大夫通判静江府万俟佀好學自修不墜祖烈蒞官行已皆有可觀廉介自將公正不撓遇事明審而持心近厚材優治劇而不為煩苛入仕已及六任前後兩丞㑹府所至皆有聲績自倅静江逾一考詳定案牘剖決精當考覈簿書姦弊洗空吏不能欺事至立辦動遵繩檢不可干以私頃在長沙時帥臣王藺余端禮相繼力薦於朝比来諸司亦嘗剡上雖已報聞未䝉甄錄又通直郎充廣南西路轉運司主管文字張忠恕生長名門耳濡目染不學而能服勤儒素而無貴介之習妙齡秀發而有老成之風試吏之初人已夸敬逮為賔幙尤見其材運司財計至為浩繁分典南銓尤難平允加以漕臣仍年數易中間鹽筴逋滯為多忠恕乃能一意裨贊檢柅吏姦區處得宜事皆修舉頃為臨安府樓店務時帥漕各舉以所知比来漕臣亦嘗論薦前此以其方始到官故諸司未敢列薦臣等竊詳二人雖中州僚佐之盛恐亦未易多得而使之淹囘逺方實所共惜敢望聖慈特加擢用庶使臣子歆羨知嶺海之間無異畿甸有善必錄無逺不聞人皆樂於遊宦以興起事功實一路幸甚戡又乞選擇監司上奏曰臣聞范仲淹執政患諸路監司不才取班簿視之每見一人姓名以筆勾去以次更易富弼曰公是一筆焉知一家哭仲淹曰一家哭何如一路哭耶遂悉罷之韓琦當國用監司或非其人者崔公孺曰公居陶鎔之地宜以造化為心造化以蛇虎者害人之物故置蛇於藪澤置虎於山林今公乃置之通衢使為民害可乎夫監司者號為外臺耳目之寄其權任亦重矣茍得其人百姓知所畏茍非其人一路受其害可不遴選耶國初始置轉運使淳化中遣官提㸃諸路刑獄天聖中置轉運判官熙寧中置提舉常平其後又有提㸃坑冶茶馬市舶俱號監司一路之間多至五六人使有風節才力者為之一二人足矣何以多為如其不然重為民害凡除一監司槩以中數嵗費三萬緡公帑萬緡迎送萬緡俸給五千緡兵卒劵食五千緡賢者居之所費止此不才者抑又甚焉多取頭子錢者有之抑賣公庫酒者有之科買土産物者有之廵歴之餽遺宴設吏卒之取乞批支葢非一端州縣之擾可知也而又遷易不常費用不貲且以湖北漕言之淳熈三年迨今五六年間凡送迎三十餘次如此漕計安得不匱民力安得不困乎以臣愚見不若省其員而擇其人夫畿甸之内􅆟為浩穰向来獨員亦未有不辦之事今江東西湖南北福建並置兩漕其一似可省矣淮浙閩廣産鹽之地置提舉可也湖南北江東西似可併矣茶馬坑冶職兼數路遣使可也閩廣市舶職務至簡似亦可併矣員省則可以減費貟少則易於擇人費減則用度足人擇則職務舉此必至之效也臣愚欲望聖慈明詔大臣應諸路漕臣止除一貟江湖提舉茶鹽閩廣提舉市舶議所以省併之然後遴選有風力資望者分使諸路監司得其人必能激濁揚清而守令稱職守令得其人必能奉法循理而田里安業為治之要莫先於此取進止醴泉觀使周必大奏論任官疏曰臣聞堯舜而下設官分職未嘗不以乆任為先鯀堙洪水汨陳五行堯猶待其九年然後易置暨舜亦以三載考績九年然後黜陟幽明後世何獨不然粤自漢唐以迄於今論者孰不以是為急務固無待於縷述只如本朝文彦博年過九十更事最多當元祐二年輔哲宗初政累上言謂中外任官移替頻速在任不乆有如驛舍無由集事何以致治今聖主臨御詢事考言竊計講之已熟次第施行抑臣偶有管見輒妄言之今外路迎送守倅監司借請不貲凋耗郡計最為大弊其尤可慮者川廣小郡廂禁軍人數至少每遇迎新送舊徃徃别作名色盡數差撥逺者一年近或半嵗犇走道路廢其閲習平時旣已傷財緩急又將誤事若皆任滿猶且庶幾其間偶有事故則嵗中一再如此何以堪之臣意欲朝廷將川廣小郡迎送在千里之外者别為區處或就所過州郡隨其川陸應副舟車逐節交替所費度不甚多其本處迎送止以鄰境為斷一則大省借請二則不妨備禦然須所過州郡體國奉公乃無阻滯其餘大郡事力可辦又當别作措置願付議臣審詳利害使之悠乆可行免至輕於出令若乃選擇得人深戒數易或令因任舉增秩賜金之典則不勞更張善無以加矣監察御史虞儔輪對劉子曰臣聞邦本之安危常係乎民情之舒慘民情之舒慘常係乎守令之賢否書曰民惟邦本本固邦寧唐張九齡曰元元之衆繫命於縣令宅生於刺史葢擇守令以結民心以固邦本聖哲之格言帝王之先務也臣竊見今之州縣若守若令莫不以財賦為先未嘗以民事為意其農桑之勸不勸差役之均不均户口之安不安獄訟之理不理如秦人之視越人肥瘠藐焉不加憂喜於其間至若催科一事則急於星火上供有常額則以出剩為能省限有定期則以先期為辦斛斗升合所以準租也則對量加耗尺寸銖兩所以均稅也則展取竒零不求羨餘之獻則為乾沒之謀搥肌剥髓十室九空民財既殫民心亦怨萬一水旱繼作年榖不登飢寒廹於其身不去而為盜賊者鮮矣善乎揚雄有言曰秦之有司負秦之法度秦之法度負聖人之法度是以秦之末年郡縣皆殺其守令而叛葢怨疾之乆矣唐至僖懿以後奢侈日甚賦斂愈急連年水旱百姓流殍盜賊並起尤憎官吏得者無不殺之亦若秦而已矣夫張官置吏而使民疾之如讎則其為國不亦危乎易曰履霜堅冰至是豈可不為寒心哉我本朝有天下二百餘年所恃以為萬世不㧞之基者人心而已臣願陛下躬行節儉減省冗費不專以區區財賦為急明詔大臣精擇守令且以惠養斯民為先俾之以課勸農桑平均差役安集户口理斷獄訟葢農桑既勸則民有餘財差役既均則民有餘力户口既安則民無流移獄訟既理則民無􅁈抑雖有天災不能使之困雖有姦民不能使之亂人心既固邦本永寧矣宗社幸甚生靈幸甚儔又輪對劄子曰臣聞為君之道不過用人聽言之二端而已用君子而以小人間之非也聽忠言而以讒言沮之亦非也夫薰蕕不同器鸞鶚不並栖君子必惡小人小人必害君子君子不能勝小人小人常勝君子自古至今勢不兩立君子在内小人必在外小人在内君子必在外内外之分否泰係焉毒藥苦口利於病忠言逆耳利於行苦口則難受逆耳則難從小人善窺人主之意務為迎合君子則據正論事而不肯詭隨雖上之人公聽並觀然乆之不能無惑雖灼知其為姦邪然未有能決去之者況執狐疑之心持不斷之意乎昔漢元帝即位之初蕭望之張猛劉向與夫恭顯許史之徒雜然並立於朝是非相攻好惡相激元帝初心固亦洞然卒也望之引決於私室張猛自殺於公車劉向擯斥不得進用其紀綱日以紊權柄日以移國祚日以衰無足怪者雖能更制七十餘事以公田及苑振業貧民減樂府員罷甘泉宫衛齊三服官節用愛民葢小善無益也然則為君之道豈不在用人聽言之間乎昔子夏有言舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣陛下聰明如舜勇知如湯真異世而同符者有如漢元帝之事亦不可不鑒雖然小人之情偽常以疑似而亂真惟無心於上者乃克有所見權衡無心於輕重故錙銖莫欺水鑒無心於妍醜故毫釐罔遯人主茍能無心以御羣臣是非邪正一付之衆議衆議所是我則與之衆議所非我則去之彼惡得而欺我哉夫合衆人之視然後為公視合衆人之聽然後為公聽書曰天視自我民視天聽自我民聽衆之所在雖天不廢也惟陛下留神取進止起居郎劉光祖乞留侍講朱熹劄子曰臣孤逺之迹幸得依日月之末光侍立螭坳勸講經幄至親至近凡有所懐敢不輸瀝血誠上干天聽臣十九日直前面對奏陳本職之外因言朱熹前後論事望且略與施行庶幾其人乆在經筵補助聖徳臣之愚慮葢恐朱熹自見有言不行決至求去召之難而去之易四方視此為國重輕所以乞陛下采擇其言略行一二良以此故也臣當時只慮熹從此因不合而求去使人得以窺議國家不圖是日陛下不知積因何事大不樂熹批出與之宫觀熹自求去臣猶恐虧損事體今陛下乃自去之其所傷抑已多矣然必有其故而臣等不知不然陛下何用之急而去之遽宰臣之言轉力陛下之怒轉深也哉趙汝愚本為愛護君徳存全國體見此御筆密不使人知之雖其同列亦不以告意謂天意終囘然後徐令熹從容自請遂其難進之素志而陛下未察以為助熹而不行人主之命令中批徑達熹所觀此則聖怒之深固可知矣自昔英雄之主怒及忠賢如漢武帝之於汲黯唐太宗之於魏徵方其怒也如雷霆之震而不測及其悔也如日月之食而復明臣請為陛下陳之武帝方招徠文學儒者詔策之曰吾欲云云黯對曰陛下内多欲而外施仁義奈何欲效唐虞之治乎帝黙然怒變色而罷朝公卿皆為黯懼帝退謂左右曰甚矣汲黯之戇也及莊助為黯請告武帝則曰古有社稷臣至如黯近之矣前以為愚戇而後則以為社稷之臣武帝豈終怒黯哉太宗於魏徵言無不從徵前後二百餘奏無不剴切一日朝罷怒曰㑹須殺此田舍翁長孫皇后問曰誰也太宗曰魏徵數廷辱我后退具朝服立於庭太宗驚問其故后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀太宗乃悦夫太宗之於徵方盛怒而欲殺聞后言之善則悦而從之太宗豈終怒徵哉漢唐之英主無終朝之怒此猶以義理而矯其天資者也本朝仁宗皇帝仁厚之主也亦嘗有所不堪而怒尋復悔之唐介之事是也介彈文彦博仁宗怒曰介言他事乃可至謂彦博因貴妃得執政是何言也介面質彦博其争愈切仁宗大怒玉音甚厲衆恐禍出不測是時蔡襄修起居注立殿陛即進曰介誠狂直然納諫容言人主之美徳必望全貸遂召當制舍人就殿廬草制貶春州别駕明日御史中丞王舉正救解之上亦中悔改為英州别駕仍從介言罷彦博政事其後召介復用為御史大夫仁宗暫怒而即悔不惟無恨介之心又使之再在言路真所謂聖度如天非漢唐二君所能及也今陛下之怒熹無乃𩔖於是乎臣安知在内無荘助之請長孫后之賀而臣實居蔡襄之任敢不以仁廟事陛下乎雖然熹明先聖之道為今宿儒職專勸講葢陛下之所尊禮又非黯徵介三臣之比也三臣以直諫逢怒而熹以古道獲疎則儒者果無益於人之國如此乎且熹為人陛下在潛邸乆知其姓名以夀皇之英明嘗欲用之而卒不及用以太上之寛厚又欲用之而竟不能致者葢小人望風而嚴憚之有素此熹所以在外則負四海之望在朝則無一日之安也然陛下即位之始首召熹而寘之於侍從者何哉陛下初膺大寳以危惕為心招來耆儒而崇奨之用慰逺近之望此陛下初政之最善者也而熹本不可屈老乃更變深存宗社之念夫是以翻然一来臣素不識熹每與相見但勉令少安不可遽爾求去以副主上嗜學渴賢之意趙汝愚亦嘗令臣勉熹切未須深切言事第磨以嵗月涵養聖心俟既浹洽不患不言聽而諫從恐多强人主以所難行乆必生厭厭而請去則頓乖始謀轉使朝廷難於處置也熹比徃来已是與人曲折聞臣此言自謂酌量可否亦欲遲乆有補聖明獨不知曾向陛下言及何人説及何事忽觸天威至於即日罷遣臣料必不因十九日經筵留身所奏之一事而陛下遂赫然去之也熹乆有重望又在經幄不同他官進之退之皆當有禮故大臣重惜事體不即施行秘而不言仰冀密囘天意而方逢宸怒未軫聖思踧踖彷徨對人絶無顔面且陛下亦嘗念之乎使太上前者因廷臣盡言而舉逐之則方人心欲變之際祖宗社稷誰與扶持陛下歴數誰其翊戴今羣賢幸集而一旦無故先去首召首用之大老使人解體而離心臣兩日如醉如迷不謂聖君忽有此失只如臣徃年以執憲殿中極論吳端超遷給諫失職既䝉宣諭執奏如初違忤太上之意奪臣言職然猶俟臣三請祠而後許臣去國今陛下既曰憫熹耆艾又何恩意之蔑如也且古之君子進人以禮退人以禮今之君子進人若將加諸膝退人若将墜諸淵今陛下之於熹無乃加膝墜淵之謂乎夫天道乃人事也前日不測之風雷即兆陛下時出不測之號令有如此也熹麋鹿之性惟恐不入山林臣等姑羈縻之而陛下乃解而縦之是使熹得遂初欲而陛下自乖始圖陛下得無未之或思也歟臣叨荷寵榮不忍嘿嘿伏望聖慈覽臣此章釋然悔悟以示逺近以安羣聽昔帝堯捨已從人而成湯改過不吝無使前日尊儒重道之心一變而為惡直疎賢之舉臣非助熹者也乃真助陛下者也惟陛下財幸侍講朱熹以言事去監登聞鼓院游仲鴻上疏曰陛下宅憂之時御批數出不由中書前日宰相留正之去去之不以禮諫官黄度之去去之不以正近臣朱熹之去復去之不以道自古未有舎宰相諫官講官而能自為聰明者也願亟還朱熹毋使小人得志以養成禍亂殿中侍御史林大中奏言進退人才當觀其趣向之大體不當責其行事之小節趣向果正雖小節可責不失為君子趣向不正雖小節可喜不失為小人又論今日之事莫大於讎恥之未復此事未就則此念不可忘此念存於心于以来天下之才作天下之氣倡天下之義此義既眀則事之條目可得而言治功可得而成矣歴代名臣奏議卷一百四十七
