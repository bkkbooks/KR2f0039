body:
  text: 歴代名臣奏議巻三百四十六明楊士竒等撰四裔宋哲宗元祐中御史中丞傅堯俞奏曰臣聞夏人欵塞傳者謂必縁請地而來臣竊思之方今邉備未豐士氣未振民力未完賞罰不明将帥難倚其尤可慮者議論不齊平居講事或經時曠日而不能合茍必至於用兵豈能迎機應猝制變於千里之外㢤臣竊為陛下憂之夫自古和敵未有能抗天威而快人意者惟所屈者益深則所伸者益逺願陛下姑務柔之以徳專以繼好息民為意則天下幸甚四年龍圖閣學士朝奉郎知杭州蘇軾状奏曰臣伏見熈寜以來髙麗人屢入朝貢至元豐之末十六七年間館待賜予之費不可勝數兩浙淮南京東三路築城造舩建立亭館調發農工侵漁商賈所在騷然公私告病朝廷無絲毫之益而敵國獲不貲之利使者所至圖畫山川購買書籍議者以為所得賜予大半歸之契丹雖虚實不可明而契丹之彊足以禍福髙麗若不隂相計搆則髙麗豈敢公然入朝中國有識之士以為深憂自二聖嗣位髙麗數年不至淮浙京東吏民有息肩之喜唯福建一路多以海商為業其間凶險之人猶敢交通引惹以希厚利臣稍聞其事方欲覺察行遣今月三日准秀州𦍑人押到泉州百姓徐戬擅於海舶内載到髙麗僧統義天手下侍者僧夀介繼常頴流院子金保裴善等五人乃齎到本國禮賔省牒云奉太國王㫖令夀介等齎義天祭文來祭奠杭州僧源闍黎臣已指揮本州送承天寺安下選羌職員二人兵級十人常切照管不許出入接客及選有行止經論僧伴話量行供給不令失所外已具事由畫一奏禀朝㫖去訖又據髙麗僧夀介有状稱臨發日奉國母指揮令齎金塔二所祝延皇帝太皇太后聖夀臣竊觀其意盖為二聖嗣位數年不敢輕來入貢頓失厚利欲復遣使又未測聖意故以祭奠源闍黎為名因獻金塔欲以嘗試朝廷測知所以待之之意輕重厚薄不然者豈有欲獻金塔為夀而不遣使奉表上因祭奠亡僧遂致國母之意盖疑中國不受故為此茍簡之禮以卜朝廷若朝廷待之稍重則貪心復啓朝貢紛然必為無窮之患待其巳至然後拒之則又傷恩恭惟聖明灼見情状廟堂之議固有以處之臣參備侍從出使一路懐有所見不敢不盡以備採擇八年軾為端明殿學士兼翰林院侍讀學士左朝奉郎守禮部尚書論髙麗買書利害劄子曰臣近准都省批送下國子監状准館伴髙麗人使所牒稱人使要買國子監文字請詳此印造供赴當所交割本監檢准元祐令諸蕃國進奉人買書具名件申尚書省今來未敢支賣䝉都省送禮部㸔詳臣尋指揮本部令申都省除可令收買名件外其䇿府元龜厯代史太學敕式本部未敢便令收買伏乞朝廷詳酌指揮尋准都省批状云勘㑹前次髙麗人使到闕已曽許買䇿府元龜并北史今來本部並不檢㑹體例所有人使乞買書籍正月二十七日送禮部指揮許收買其當行人吏上簿者臣伏見髙麗人使每一次入貢朝廷及淮浙兩路賜予饋送燕勞之費約十餘萬貫而脩飾亭館騷動行市調發人船之費不在焉除官吏得少饋遺外了無絲毫之利而有五害所得貢獻皆是玩好無用之物而所費皆是帑廩之實民之膏血此一害也所至差借人馬什物攪撓行市脩飾亭館民力倍有陪費此二害也高麗所得賜予若不分遺契丹則契丹安肯聼其來貢顯是借宼兵而資盜糧此三害也髙麗名為慕義來朝其實為利度其本心終必為北敵用何也彼足以制其死命而我不能故也今使者所至圖畫山川形勝窺測虚實豈復有善意㢤此四害也慶厯中契丹欲渝盟先以増置塘泊為中國之曲今乃招來其與國使頻嵗入貢其曲甚於塘泊幸今契丹恭順不敢生事萬一異日有桀黠之軰以此藉口不知朝廷何以答之此五害也臣心知此五害所以熈寜中通判杭州日因其餽送書中不稱本朝正朔卻退其物待其改書稱用年號然後受之仍催促進發不令住滯及近嵗出知杭州却其所進金塔不為奏聞及畫一處置縁路接待事件不令過當仍奏乞編配狡商猾僧并乞依祖宗編敕杭明州並不許發船往髙麗違者徒二年沒入財貨充賞并乞刪除元豐八年九月内創立許舶客專擅附帯敵使入貢及商販一條巳上事並䝉朝廷一一施行皆是臣素意欲稍稍裁節其事庶㡬漸次不來為朝廷消乆逺之害今既備貟禮曹乃是職事近者因見館伴中書舍人陳軒等申乞盡數差勒相國寺行鋪入館鋪設以待人使買賣不惟移市動衆奉小國之陪臣有損國體兼亦抑勒在京行鋪以資吏人廣行乞取弊害不小所以具申都省乞不施行其乖方作弊官吏並不䝉都省略取問今來只因陳軒等不待申請直牒國子監收買諸般文字内有䇿府元龜厯代史及敕式國子監知其不便申禀都省送下禮部㸔詳臣謹按漢書東平王宇來朝上疏求諸子及太史公書當時大臣以謂諸侯朝聘考文章正法度非理不言今東平王幸得來朝不思制節謹度以防遺失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物恠太史公書有戰國縱横權譎之謀漢興之初謀臣竒䇿天官災異地形阨塞皆不宜在諸侯王不可予詔從之臣竊以謂東平王骨肉至親特以備位藩臣猶不得賜而況海外之逺人契丹之與國乎臣聞河北𣙜場禁出文書其法甚嚴徒以契丹故也今髙麗與契丹何異若髙麗可與則𣙜場之法亦可廢兼竊聞昔年髙麗使乞賜太平御覧先帝詔令館伴以東平王故事為詞却之近日復乞詔又以先帝遺㫖不與今厯代史䇿府元龜及北史竊以謂前次本不當與若便以為例即上乖先帝遺㫖下與今來不賜御覽聖㫖異同深為不便故申都省止是乞賜詳酌指揮未為過當便䝉行遣吏人上簿書罪臣竊為無罪可書雖上簿薄責至為末事於臣又無絲毫之損臣非為此奏論所惜者無厭之敵事事曲從官吏能㣘其意雖動衆害物不以為罪稍有裁節之意便行詰責今後無人敢逆其請使意得志滿其來愈數其患愈深所以須至極論仍具今來合處置數事如後一臣在杭州日奏乞明州杭州今後並不得發舶徃髙麗䝉巳立條行下今來髙麗使却搭附閩商徐積舶船入貢及行根究即稱是條前發舶臣竊謂立條已經數年海外無不聞知而徐積猶執前條公慿影庇私商往來海外雖有條貫實與無同欲乞特降指揮出牓福建兩浙縁海州縣與限半年内令繳納條前所發公慿如限滿不納敢有執用並許人告捕依法施行貼黄據陳軒所奏語錄即是髙麗知此條一今來髙麗使所欲買歴代史䇿府元龜及敕式乞並不許收買貼黄准都省批状指揮人使所買書籍内有敕式若令外夷收買事體不便看詳都省本謂策府元龜及北史前次巳有體例故以禮部並不檢㑹為罪未委敕式有何體例一槩令買一近日館伴所申乞為髙麗使買金箔一百貫欲於杭州粧佛臣未敢許以申禀都省竊慮都省復以為罪竊縁金箔本是禁物人使欲以粧佛為名久住杭州搔擾公私竊聞近嵗西蕃阿里骨乞買金箔朝廷重難其事節次量與應副今來髙麗使朝辭日數已迫乞指揮館伴令以打造不出為詞更不令收買一近據館伴所申乞與髙麗使抄冩曲譜臣為鄭衛之聲流行海外非所以觀徳若畫朝㫖特為抄冩尤為不便其状臣已收殺不行貼黄臣前在杭州不受髙麗所進金塔雖曽宻奏聞元已作臣意度拒絶兼自來館伴客使若有所求請不可應副即須一面説諭不行或其事體大即候拒訖宻奏今陳軒等事事曲從便為申請若不施行即顯是朝廷不許使彼國悦已而怨朝廷甚非館伴之體右所有申都省状其厯代史䇿府元龜及敕式乞詳酌指揮事並出臣意不干僚屬及吏人之事若朝廷以為有罪則臣乞獨當責罰所有吏人乞不上簿貼黄臣謹按春秋晉盟主也鄭小國也而晉之執政韓起欲買玉環於鄭商人子産終不與曰大國之求若無禮以節之是鄙我也又晉平使其臣范昭觀政於齊昭請齊景公之觴為夀晏子不與又欲奏成周之樂太師不許昭歸謂晉侯曰齊未可伐也臣欲亂其禮而晏子知之欲亂其樂而太師知之今髙麗使契丹之黨而我之陪臣也乃敢干朝廷求買違禁物傳冩鄭衛曲子譜䙝慢甚矣安知非敵人欲設此事以嘗探朝廷深淺難易乎而陳軒等事事為請恐失其意臣竊惑之又據軒等語録云髙麗使言海商擅往契丹本國王捉送上國乞更賜約束恐不穏便而軒乃答之風迅不順飄過乃是與閩中狡商巧説詞理許令過界竊縁私往北界條禁至重海外陪臣猶知遵禀而軒乃為歸咎於風以薄其罪豈不乖戾倒置之甚乎臣忝備侍從事闗利害不敢不奏軾又劄子奏曰臣近奏論髙麗使所買書籍及金箔等事准尚書省劄子二月十二日三省樞宻院同奉聖㫖所買書籍曽經收買者許依例收買金箔特許收買餘依奏吏人免上簿者臣所以區區論奏者本為髙麗契丹之與國不可假以書籍非止為吏人上簿也今來吏人獨免上簿而書籍仍許收買臣竊惑之檢㑹元祐編敕諸以熟鐵及文字禁物與外國使人交易罪輕者徒二年㸔詳此條但係文字不問有無妨害便徒二年則法意亦可見矣以謂文字流入諸國有害無利故立此重法以防意外之患前來許買䇿府元龜及北史已是失錯古人有言一之謂甚其可再乎今乃廢見行編敕之法而用一時失錯之例後日復來例愈成熟雖買千百部有司不敢復執則中國書籍山積於髙麗而雲布於契丹矣臣不知此事於中國得為穏便乎昔齊景公田招虞人以旌不至曰招虞人以皮冠孔子韙之曰守道不如守官夫旌與皮冠於事未有害然且守之今買書利害如此編敕條貫如彼比之皮冠與旌亦有間矣臣當謹守前議不避再三論奏伏望聖慈早賜指揮貼黄臣㸃檢得館伴所公案内有行下承受所收買文字數内一項所買䇿府元龜叙兵雖不曽賣與然髙麗之意可見矣又貼黄臣已令本部備録編敕條貫符下髙麗人使所過州郡約束施行去訖亦合奏知軾又劄子曰臣近再具劄子奏論髙麗買書事今准敕節文檢㑹國朝㑹要淳化四年大中祥符九年天禧五年曽賜髙麗九經書史記兩漢書三國志晉書諸子厯日聖恵方隂陽地理書等奉聖㫖依前降指揮臣前所論奏髙麗入貢為朝廷五害事理灼然非復細故近又檢坐見行編敕再具論奏並不䝉朝廷詳酌利害及編敕法意施行但檢坐國朝㑹要已曽賜予便為収買竊縁臣所論奏所計利害不輕本非為有例無例而發也事誠無害雖無例亦可若其有害雖百例不可用也而況㑹要之為書朝廷以備檢閲非如編敕一一皆當施行也臣只乞朝廷詳論此事當遵行編敕耶為當檢行㑹要而巳臣所憂者文書積於髙麗而流於北敵使敵人周知山川嶮要邉防利害為患至大雖曽賜予乃是前日之失自今止之猶賢於接續許買蕩然無禁也又髙麗人入朝動獲所欲頻嵗數來馴致五害如此之類皆不䝉朝廷省察深慮髙麗人復來遂成定例所以須至再三論奏兼今來髙麗人已發無可施行五年御史中丞蘇轍論不可失信夏人状奏曰臣聞善為國者貴義而不尚功貴信而不求利非不欲功利也以為弃義與信雖一快於目前而嵗月之後其害将有不可勝言者矣昔晉公圍原命三日之糧原不降命去之諜者曰原将降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇民所亡滋多退而原降晉荀呉圍鼓鼓人或請以城叛呉弗許左右曰師徒不勤而可以獲城何故弗為呉曰吾聞諸叔向好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉使鼓人殺叛人而繕守備三月鼓人請降使其民見曰猶有食色姑脩而城軍吏曰獲城而弗取勤民而頓兵何以事君呉曰吾以事君也獲一邑而敎民怠将焉用邑鼓人告食竭力盡而後取之克鼓而反不戮一人以世俗言之此二人者可謂踈於事情而怠於功利矣然要其終文公以覇天下荀呉以强晉國則信義之効見於久逺如此臣竊觀朝廷之所以御西夏者可謂異矣方元祐三年既受册命不肯入謝再以大兵蹂踐涇原大臣畏之明年遣使請以所許四寨易蘭州塞門朝廷雖不許大臣務行姑息不俟其請而以嵗賜等事許之一嵗所賜凡二十萬夏人仰以為命雖以一嵗之入易蘭州塞門可也而奈何與之盖自失嵗賜以來朝廷蕩然無復可以要結夏人者然此既往之事臣不復追咎矣頃者夏人既得嵗賜始議地界朝㫖許以見今州城堡寨依綏徳城例以二十里為界十里外量置堡鋪其餘十里為兩不耕地約束既定大臣中悔又欲堡寨相照取直議猶未定而熈河将佐范育种誼欲於見今城堡之外更占質孤勝如二堡大臣僥倖拓地之功不以育等為非從而助之尋為夏人所破所殺兵民皆不敢以實聞繼脩城門再被焚毁其事至今未定然夏人廹於内患不敢堅抗朝命許以照直為界其言猶未絶口而大臣又悔欲以堡鋪之外對留十里通前共計三十里此命既出有識之士以為失信太甚非中國之體若使邉臣稍知義理必不忍自出反覆之言以彰不信幸而夏人終以内患未觧不欲違拒黾勉從之十里之地得之不足為强失之不足為弱雖小人以為得計而君子謂之失䇿何者要約未定今嵗已添屯重兵前後十将有餘十將之衆凡五萬人使五萬人西食貴粟其費已不貲而夏人順否又未可必雖復暫順要之久逺不信朝廷為患何所不至然此亦既往之事臣復何言㢤臣之所憂但恐大臣狃於小利睥睨夏國便利田地貪求不已訪聞近遣穆衍與邉臣計議既欲取質孤勝如兩城一帯良田凡數十里又欲與秦鳯路隴諾城與熈河路定西城照直地僅一百里規畫極大聞者驚愕若此謀復作夏人不堪其忿竊出作過我曲彼直何以禦之且先朝用兵所得四寨朝廷猶務息民弃而不惜況於其餘何足計較在兵法有之曰有其有者安貪人有者殘又曰利人土地寳貨者謂之貪兵兵貪者破今之所為正犯此禁臣竊恠大臣皆一時儒者而皆棄所學貪求茍得為國生事一至於此外人皆言前後計畫皆出种誼誼本小人安知大慮而舉朝廷以從之乎要之不出數年此患必見患至而後言言雖易信而已無及矣伏乞陛下以社稷生民為念㫁之於心止其妄作則天下幸甚貼黄添屯數目臣見陜西轉運使李南公言自元祐以來朝廷不起邉事凡自前邉臣欺罔殺畧熟户計級受賞劫掠財物私自潤入及邉民幸於擾攘買賤賣貴如此等事皆不得為故上下鼓唱願有邉釁凡此皆姦人自作身計非國之利也今勝如質孤等處良田實西邉第一膏腴豈我獨知以為利而夏人不知耶彼知愛之則不免於争爭端一起則兵革不息此正堕邉臣之姦計矣臣訪聞夏國柄臣梁乙逋者内有簒國之心然其為人狡而多算寛而得衆方欲内安豪酋外結朝廷竢内外無患然後徐簒取之所以朝廷近日打量地界前後要求反覆而乙逋一一聼從盖見議地界止於二三十里之間於彼國不繫利害故也今朝廷若見其易與因而别有大段求索使彼不能堪忍或至忿争兵難一交必非朝廷所願至此而後返欲求和則所䘮多矣轍又乞罷熈河修質孤勝如等寨劄子曰臣伏見西夏輕狡屢臣屢叛為患莫測昨與延安商量地界遷延不決捨歸本國招之不至邉人之議始謂地界自此不可復議而坤成賀使亦當不至矣今者天誘其衷使者既已及境而地界復議如故方其未遽告絶招懐之計猶可復施此實中國之利也然臣恐朝廷忽而不慮不於今日窮究端由窒其釁隙必竢邉患既起而後圖之則無及矣臣聞熈河近日創脩質孤勝如二堡侵奪夏人御荘良田又於蘭州以北過河二十里議築堡寨以廣斥候夏人因此猜貳不受約束其怨毒邉吏不信朝廷不言可見矣徒以嵗賜至厚和市至優是以勉修臣節其實非徳我也使之稍有便利豈肯帖然不作過㢤何者中國既失大信則外國不可復責故也臣竊惟朝廷之於西夏棄捐金帛割裂疆土一無所愛者累年于兹矣而熈河帥臣與其將吏不原朝廷之心徼求尺寸之利妄覬功賞以害國事深可疾也頃年熈河築西闗城聲言次築龕谷鬼章疑懼遂舉大兵攻擾一路瘡痍至今未復今既城質孤勝如其勢必及龕谷夏人驚疑正與鬼章事同由此言之則曲在熈河非夏人之罪也夫蘭州之為患所從來逺矣昔先帝分遣諸將入界李憲當取􅂕武畏怯不敢深入遂以此州塞責自是以來築城聚兵完械積粟勞費天下動以千萬為計議者患之久矣好事之臣因此講求遺利以為金城本漢屯田舊地田極膏腴水可灌溉不患無食患在不耕不患不耕患無堡障凡西闗龕谷質孤勝如與過河築城皆所以為堡障也從來熈河遣兵侵耕此地皆為夏人所殺況於築堡致宼無疑而朝廷恬不為怪坐視邉釁之啓深可惜也夫蘭州不耕信為遺利矣若使夏人背叛則其為患此之不耕蘭州何翅百倍故臣以為朝廷當權利害之重輕有所取捨況蘭州頃自邉患稍息物價漸平比之用兵之時何止三分之一若能忍此勞費磨以嵗月徐觀問隙竢夏人㣲弱決不敢争乃議修築如此施行似為得䇿臣不知邉臣何苦而為此怱怱也昔唐明皇欲取吐蕃石堡城隴右節度使王忠嗣名將也以為頓兵堅城費士數萬然後可圖恐所得不酬所失請厲兵馬待釁取之帝意不快忠嗣由此得罪其後帝使哥舒翰攻拔之雖開屯田獲軍實不為無補而士卒死亡畧盡皆如忠嗣之言唐史以為深戒此則今日之龜鑒也若朝廷不用臣言臣料夏人久必復叛用兵之後不免招來其為勞恥必甚今日敵人强梁則畏之敵人柔伏則陵之恐非大國之體也惟陛下留神省察貼黄臣聞朝廷欲遣孫路以㸃檢弓箭手為名因商量熈河界至臣觀孫路昔在熈河随李憲等造作邉事由此䝉朝廷擢用深恐路狃習前事不以夏人逆順利害為心而妄圖蘭州小利以失國家大利伏乞明賜戒敕若因界至生事别致夏人失和勞民蠧國罪在不赦元祐中轍又奏乞裁抑髙麗人使状曰臣伏見髙麗北接契丹南限滄海與中國壌地隔絶利害本不相及本朝初許入貢祖宗知其無益絶而不通熈寕中羅拯始募海商誘令朝覲其意欲以招致逺人為太平粉飾及掎角契丹為用兵援助而巳然自其始通及今屢至其實何益於事徒使淮浙千里勞於供億京師百司疲於應奉而髙麗之人所至㳺觀伺察虚實圖冩形勝隂為契丹耳目或契丹常遣親信隠於髙麗三節之中髙麗宻分賜予歸為契丹㡬半之奉朝廷勞費不貲而所獲如此深可惜也今其復至既朝廷未欲遽絶謂當痛加裁損使無大饒益則其至必疎而我得其便矣竊見近日已降朝㫖自明州以來州郡待遇禮節率皆減舊而京師諸事未加裁定臣以謂朝廷交接四夷莫如遼夏之重而目前所以遇髙麗者㡬比二國非獨於本朝事有不便儻使二國知之亦為未允況髙麗之於契丹大小相絶有君臣之别今舘待之數出入之節或皆如一或更過厚其於事體實為不便臣欲乞凡舘待送遺並量加裁抑五年范育知熈州論禦戎之要上奏曰臣竊以禦戎之要防患在於無形制勝在於未然患至而後圖安未有不危者也兵交而後求勝未有不敗者也臣觀本路有無形之患其端已具其憂甚大臣䝉朝廷假以方面之寄容身自謀依違不言使患至形成上貽朝廷憂下為一方害則臣上負明主不忠之罪大矣故臣敢極陳其説臣伏見近朝廷詔本路與夏人分畫疆界依綏徳例非所賜城寨外以二十里為界通逺軍定西通西榆木等城寨朝廷指揮拶邉相照取直西人執以逐寨外取二十里蘭州質孤勝如堡前日朝廷令常作守據之計本路按視合取二堡外立界西人指為非舊堡寨要自龕谷寨打量此二事若朝廷從夏人之請則於本路邉面形勢有無窮之大害若不從夏人必起兵争占有害今日和議而西兵未有可息之期臣請陳其故盖定西北與夏人接境通西榆木等處則賊境在東若皆取二十里則今日所棄邉面多者已三二十里所徙弓箭手已數百千户失膏腴之地數千畆又定西孤絶賊兵可從中㫁其歸路其勢決不可守則通逺之邉面所蹙不啻數十里而賊兵毎出可至通逺通逺受敵則熈河一路有扼吭不通之患矣蘭州向藉質孤勝如川地五十餘頃皆膏腴上田有水田可以灌漑其收畆數斛無慮置弓箭手三千人昔之堡障未立不敢就耕而以名目占坐不去已千有餘人若從龕谷二十里為界則二堡之地皆不可耕蘭州捨此北距河南介山東西境壌無餘其耕種之地既不足以自食其州粟日益貴費日益廣又況賊兵一出則立至州之西野増兵備無時而已豈不危㢤此所謂從夏人之請於本路邉面有無窮之大患者也臣訪聞定西一帯川原廣濶昔花麻所居西市夏人置倉以積榖質孤勝如川偽號御拄自歸本路其土人皆走天都山及㑹州之境地瘠人貧未嘗一日不回思其地又聞夏人常使北方之人自謀争奪之計昨正月中西界所差分畫首領與邉臣議論不合而去今其再至探得集兵數萬屯於境上時出逰騎道不遜之語度其意盖将必争而後已雖至於用兵廢絶和事皆且不顧此所謂不從其請将見兵拏而不觧未有可息之期者也以臣計之不與則用兵雖速而患小盖吾邉有易守之形也與之則用兵雖緩而患大盖吾邉有難安之勢也然此二者不可不慮也臣請終言之竊聞青唐阿里庫昔以簒得國朝廷既行封爵常與夏賊同謀宼邉頼朝廷威㫁邉将出兵生擒果荘㫁河橋以挫其鋒遂寝姦謀納質効順息數嵗之邉患今聞阿里庫常疑其下有怨讎之謀日圖誅殺易置首領且與夏賊結約甚懽遣人往夏國詰其與漢和激其用兵之意盖邊人氣類既同其嗜欲既一唇齒之黨勢必相為而又阿里庫簒於前梁伊伯簒於後昔也相視而成其謀今也同心而濟其惡理必然也臣恐二賊締交夏賊出兵通逺金城之郊本路嚴兵以禦之里賊又出兵河岷之郊則本路分兵而力不給朝廷方且益發兵増備不知㡬何而止也商者不得安於途耕者不得安於野則所仰之粟不知㡬何而足五州之境邉面二十餘里二賊據吾腹背嵗嵗不可弛備一日不可減兵備其東則西出備其南則北出左提右挈四面受敵朝暮相救之不暇一有交兵則五州之勢岌岌乎皆有動摇之憂又況萬有一至於敗撓而不可支可不慮㢤此臣所謂無形之大患可為朝廷之憂者也以臣愚計欲防此未形之患必制勝未然之術臣願朝廷垂聼無忽臣昨累經畫青唐邈川利害朝廷未賜俞允近阿里庫再召温希沁愈懐疑懼邈川人情亦不安又殺郭羅族四人錮其囚首及格隆本綽克家族首領托薩魯新族其人户不從遂拘執首酋致有五百餘户走入河州界約欄未去自朝廷除結斡磋鎮州刺史勾在青唐拘留不還又勾界邊策巴克嘉勒亦留青唐其國人攜二酋長憂懼愈甚於前又近探得阿里庫病甚或云死匿哀不發欲踵前日簒棟戬之迹此逆酋之暴虐與人情之怨叛較然可見矣臣觀夏賊之邈川地近而形勢便青唐情通而利害同彼兩地之動息夏人知之固熟徒以伊伯始簒及彊議未決故遲遲計未發爾使其志得謀行移兵以舉邈川併青唐若振槁木之易其為西邉大患臣前日已嘗具奏于朝矣就其未能二賊方且合謀為患如臣所陳其勢必矣臣又聞古人善為謀者因禍而為福轉敗而為功今本路欲與夏人交議地界當賊兵之鋒而争口舌之勝臣未見其可也不若緩其所當争而出其所未發先為之計發夏賊之謀而絶其交乘青唐之變而定其國用臣前䇿納趙醇忠繼棟戬後醇忠既立忠順戴漢因撫諸酋悉皆内向則二賊之交絶矣棟戬繼世人心皆服虐亂既除國内舉安則青唐之變定矣夏賊失青唐之援則有背腹之憂本路得邈川歸順則有形勢之利彼之所恃者復在我吾之所患者復在彼如此則區區之夏賊将假息於巢穴而不敢窺吾邉鄙通逺金城之疆錫之則為朝廷之徳不與則亦不敢争吾兵不用而可以制夏賊之猖獗平西賊之禍亂威行萬里義服四逺雖唐虞三代之禦戎不過是矣将見本路州民有卧鼓息鋒之安趣耕稼而成樂俗矣復何邉患之憂㢤此所謂制勝於未然之術也臣伏思朝廷大計務欲安邉息民不用兵革臣為此謀其始唯䕶趙醇忠假兵力因其人心助其聲勢過此以往更不煩兵其津遣趙醇忠鎮撫部族合措置事件如䝉朝廷賜可乞别具條析聞奏頃臣雖述此利害或恐更有未盡事理朝廷若行詰問却致往復已依近降朝㫖選差本司幹當公事种朴乘逓馬赴闕詣三省樞宻院稟議去訖伏乞朝廷檢㑹臣累状及今奏事理早賜處置指揮哲宗時畢仲㳺論復境土上言曰自漢以來言外敵之利害者不知㡬十人矣然其成效非漢元鼎唐貞觀之門則外國之强未有不過中國者也由三代以前外國之患雖不免然終不能害中國也故詩曰征伐玁狁蠻荆來威又曰戎狄是膺荆舒是懲以玁狁戎狄雖始有其患而終至於威懲者此不能害中國之實也故所以不能害中國者以御之有道而有軍旅之制也有威徳之施也有地勢之利也今國家軍旅未制制之可也威徳未施施之可也地勢未利雖欲利而已失也故議者未嘗不惜幽薊之土以至晉石氏所割十六州者皆中國之大險也以大險之利而久失之於胡故太宗始因太原之㨗直抵其地㡬拔易順薊三州中又嘗駕幸大名未至於雍涿遂選十八将同出飛狐雍州鴈門之三道環朔雲應涿五州之民已望其更生矣然以貪将之累而不成功也及章聖景徳間敵嘗卒驚趙魏之地頼天地宗廟之神靈酋死敵散故國母奉誓求和至今為萬世計此皆以地利失得而致者也今上欲强中國弱四夷追祖宗之成畫復先王之故地則在知其兵之本兵之主兵之敎兵之用然後可也故省費寛役厚其輸畜者兵之本也熟察将帥試之以事者兵之主也習勒戰士四時不廢者兵之敎也脩完械用並使堅利者兵之用也今械用不利是無用也士不習勒是無敎也将不察使是無主也輸畜不厚是無本也無用則不可敵無敎則不可勝無主則不可戰無本則不可守四者不備則雖百勝之畫無㓂之地不可追復也四者備而用之是黄帝之兵也昔者太宗倚髙麗安定渤海而北征章聖封爵潘羅而弱繼遷此可追之成畫而晉石氏所割十六州皆不待痛而復矣仲㳺論棄熈河蘭㑹上言曰天之生民初無中國外國之别以其與中原之地甚相逺也然後謂之外國而自漢已來争取其不可治之地而治之是以府庫空虚人民死亡僅能得之而還為外國之地者多矣昔大王之治邠狄人攻之事之以玉帛皮幣狗馬子女而皆不免乃曰狄人之所欲者土地也為吾臣與為狄人臣奚以異因杖馬捶去之岐山之下中國之地至其不可有也則猶不欲强治之況欲强取外國之地而治之乎雖嘗為中國之郡縣而本外國之地者則亦無所用之雖欲用之而多不能有故武帝不能有輪䑓元帝不能有朱崖光武不能有西域而本朝亦棄􅂕武則今日熈河蘭㑹之計議足以㫁矣然事有既得之復棄而與未得同者有既得之復棄之而與未得不同者武帝棄輪䑓則不耕而已矣元帝棄朱崖則勿撃而已矣光武棄西域則謝其質子而已矣本朝棄􅂕武則置之度外而已矣此所謂與未得同者而今日棄熈河蘭㑹則與未得不同徹舊障而為新障棄之則新障已沒而舊障未完一不同也伐其山林平其道路棄之則無險阻而敵人将牧馬於階成之境外二不同也立城郭置倉廪實以榖粟錢幣而棄之則瘠中國而肥敵人三不同也然此猶小小者爾盖熈河之未取也為唃氏而蘭㑹之未取也為華麻氏雖覊屬夏人而非夏人之所有故猶足以分中國之宼今舉熈河蘭㑹而棄之則唃氏華麻氏者勢不能反而将為夏人之所有是以中國之力而為敵人驅除此大不同者也而不棄之則嵗運府庫之財以填黄河之磧又非中國長久安寕之䇿昔西羌反叛如趙充國者可謂知兵矣而曰難於遙度願馳至金城圖上方畧其後烏孫圍都䕶而陳湯於數千里之外逆知有吉語期以五日而四日至非充國之拙而陳湯之巧也盖烏合之兵易為料而長久之計難為功今熈河蘭㑹制之於未取之前則固無事今已取之而復棄之棄之之利如彼其害如此守之之利如此其害如彼則殆非遙度之所能盡必有馳至河隴而圖上方畧者然後可決歴代名臣奏議巻三百四十六
