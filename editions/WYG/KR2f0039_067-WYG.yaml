body:
  text: 歴代名臣奏議卷六十七明楊士竒等撰治道元成宗大徳七年鄭介夫上奏曰欽惟聖朝布威敷徳臨簡御寛極地際天罔不臣服混一之盛曠古所無三代以降自周至今二千年間得大一統者惟秦漢晉隋唐而已秦隋晉以貽謀不逺旋踵敗亡漢唐雖傳數十世其間又亂日常多治日常少古今一統其難如此而能保於長且乆者又難如此毋謂四海已合民生已泰可以安意肆志而不思否泰相因離合相仍大有可憂可慮者存也昔賈誼當漢文宴安之時猶為之痛哭為之流涕為之長太息方今之勢恐更甚焉安得如誼者復生為朝廷畫乆安長治之䇿今觀朝廷之上大臣則悠悠然持祿而顧望小臣則惴惴然畏懼而偷生含胡茍且以求自全之計玩嵗愒月以希遷轉之階誰肻奮不顧身出為百姓分憂者然或有之又招疑速謗不能自容扵時矣都堂總朝廷之樞柄謂宜立經陳紀為萬世法程進賢退不肖殖邦家根本制禮作樂以黼黻皇猷崇文興義以變移風俗當今之急務也卯聚酉散因循度日案牘紛填剖決不暇間或舉行一二下侵有司又皆不急之細事殊欠經逺之宏規臺察乃朝廷之耳目振刷風采修立紀綱錯舉枉直扶弱抑强職分之宜然也民寃載路十詞九退賄賂充斥掩耳不聞縱豺狼之肆暴取狐鼠以塞責謾膺搏擊之名殊乏風憲之體六部乃朝廷之手足宜思官盡其職職盡其事可也言乎吏則銓衡之無法言乎禮則文遜之不興言乎刑則奸慝之滋甚言乎戸則賦役之未均言乎兵則運掉之無方言乎工則規畫之不一使賈生身今之時目今之事不知何如其痛哭流涕又何如其長太息也髙見逺識之士雖以斧鉞在前刀鋸在後其能自已於言乎數年以來固有指陳事實傾吐忠藴者矣雖措辭不無純疵言事各有銳鈍中間豈無一事可行一語可採者往往堆案盈几畧不省察𩔖皆送部置架閣庫而已聞者扼腕誰肻為言於是忠直退䛕佞興或陳說田土以要利或進獻珎竒以希賞或賦述大都頌稱一統而得官陞職是皆無益於理亂所當類入架閣者也而返獲嘉賔優容之厚缺張齊賢以洛陽布衣太祖引見賜食謂不如是則上無以推納諫之誠下無以作敢言之氣也今朝廷合奏之事委積滿前動是浃旬半載不得聞奏而得奏事者又僅止二三大臣及近幸數人而已言官諍士莫得一覩清光所陳無問可否若抑而不奏則終為廢紙或事有緊切合從便宜者必待送擬完議宛轉遲誤乆而不決則遂至乾休上意不得下達下情不得上通萬㡬之來何由盡知此古今之通患有國之大戒也介夫㓜勤于學長習于吏備貟儒泮偃蹇無成侍直禁垣有年于此田野之艱難朝廷之利害嘗歴既乆靡不悉知胷中抱負頗異凡庸雖迹近權門不善造請故碌碌無聞少有知者欲緘黙無言則上負明時下負所學縱瞋目張膽羅縷自陳則不免束之髙閣否為刀筆吏覆醬瓿而已古語有曰樵夫之言聖人擇焉又曰愚者千慮必有一得或冀一言見聽可為㳙涘之助云爾如言而足取則施之時政必有所裨言無可采亦宜恕其狂僭以來諌諍之路輙以所見列為一綱二十目條陳于後謹投中書省御史臺以聞仰干宸聴臣無任瞻天望聖激切屏營之至一儲嗣儲嗣一事㝡為當今急務自三代殷周以來人君即位之初必先定儲嗣所以示根本之固杜覬覦之心也昔漢髙帝欲易太子叔孫通諫曰太子天下本本一揺天下震動漢文帝即位三月他事未暇議有司請早建太子曰豫建太子所以重宗廟社稷不忘天下也唐太宗嘗謂侍臣曰方今國家何事㝡急禇遂良進曰今四海無虞太子諸王宜有定分最急可謂明治亂之原知國家之體矣欽惟皇帝陛下春秋鼎盛徳業方隆億萬斯年正當發軔之初而拳拳愚忠首陳儲建則似乎不急不切然揆古度今未有如茲事之急且切也朝廷之上不知為古今常行之故實往往視為希世之曠典雖心知其事之必不可緩相與鉗口結舌莫敢發言此愛君憂國者重為之寒心也今皇太子天性聰明嫡而居長神人協賛朝野歸心宜早建儲宫正名定號所以尊崇宗社所以培埴國本所以鎮安天下聖朝萬世不拔之基實係於此昔齊桓五子争立而覇業遂㣲晉獻讒廢申生至國亂數十年始皇以扶蘇不定致使滅宗恵帝以繼子不明㡬至易姓自後由此而敗亡者不可勝計草茅之士猶不能忘情而秉鈞當軸之臣畧不及此何邪賈誼曰天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也皇太子嗜欲未開心術未定宜選擇端人正士以傅翼之與之居處出入教以漢兒文書使通古今治亂之成迹明君子小人之情偽所謂教得而太子正太子正而天下定矣今民家有十産之資便欲延師訓子為持盈守成之計孰謂善謀國家者不如一家之謀邪古者建東宫立太子將以表異示尊定民志非泛然之美稱也今諸王公子例呼太子嫡庶親踈畧無差别昔晉申𦙍曰太子統天下之重而與諸王齊冠逺逰非所以辨貴賤也同衣冠猶以為不宜況可同名號哉杜漸防㣲尤宜禁絶上下二三千年國家之興廢安危未有不因儲嗣一事鑒前代已然之失為今日庶政之先速定大謀使天下曉然知之所謂先立乎其大者大網既求其餘事務次第舉行則宗社幸甚一任官古者任官之法由儒而吏自外而内循次而進無有僭踰今中外百官悉出於吏觀其進身之初不辨賢愚不問齒徳夤縁勢援互相梯引有力者趨前無力者居後口方脫乳已入公門目不識丁即親案牘區區簿書期㑹之末尚不通習其視内聖外王之學為何物治國平天下之道為何事茍圖俸考争先品級以致臨政懵無所知傳曰仕而優則學學而優則仕不知為學豈知為仕心術既差氣節何在今随朝吏貟通儒明吏者十無二三天下好官盡使此軰為之甚可為朝廷名器惜也夫吏之與儒可相有而不可相無儒不通吏則為腐儒吏不通儒則為俗吏必儒吏兼通而後可以蒞政臨民漢書稱儒術飾吏治正謂此也今吟一篇詩習半行字即名為儒何嘗造學業之深奥檢舉式例㑹計出入即名為吏何嘗知經國之大體吏則指儒為不識時務之書生儒則指吏為不通古今之俗子儒自儒吏自吏本出一途析為二事遂致人物之冗莫甚於此時也今随朝自部典吏轉為省典吏又轉而部令史部陞之院院陞之省通理俸月不十年已受六品之官而各處州縣以吏進者年二十即從仕十年得補路吏又十年得吏目又十年可得從九中間往復給由待闕四十餘年才登仕版計其年已逾六十矣或有病患事故曠廢月日七十之翁未可得一官也以儒進者自縣教諭陞為路學錄又陞為學正為山長非二十年不得到部既入部選陷在選坑之中又非二十餘年不得銓注往往待選至於老死不獲一命者有之幸而不死得除一教授耄且及之矣望為少年相黒頭公必不可得也今内任以三十箇月為一考滿即陞一等又多是内任遷轉外任以三周為一考三考得一等又有給由入選待注守闕之嵗月六年才歴一任十八年得陞一等淹滯莫此為甚也且即所見言之如前徳興縣邢主簿竭職奉公政聲頗著去官之日不辦舡資亦可謂能吏矣無力求陞止淹常調且累任困於錢榖官今天下之公勤廉幹過於邢者甚不為少當路薦章未嘗及之如前禮部髙顯卿乃侯司卿根前提胡床小厮既無學識又乏徳行不知稼穡不習刑名僅十五六年已致身於四品今鵷行間出於役夫賤𨽻若髙之軰者不堪縷數雖知之莫有指斥之者懐能抱徳沈没下僚駑才妄子遽登樞要似此不公可為一慨昔宣帝以太守為吏民之本甞曰庶民所以安其田里而亡歎息愁恨之聲者政平訟理也與我共此者惟良二千石乎太宗謂養民惟在都督刺史縣令尤為親民不可不擇如路府州縣之官實百姓安危之所係若以内為重以外為輕是不知為政之根本也乆任於内者但求速化不歴田野之艱難乆任於外者惟務茍祿不諳中朝之體靣今朝廷既未定取人之科當思所以救弊之䇿在朝宜少加裁抑在外宜量與優遷可也今後州縣吏員當盡取之儒學子弟每嵗令風憲官選其行止無過廉能可稱者貢補省部典吏縣則補於部州則補於省滿考則部典吏發充外路司吏省典吏發充宣慰司令史又每嵗擇其上名貢補六部寺監令史滿考則發充各省令史並令依例入流其臺院令史從外任八品官選取其省掾從外任七品官選取通理内外俸月以定陞黜縣教諭與路司吏同資路學正與宣慰司令史同資各從所長而委用之百官自三品以下九品以上並内外互相注授歴外一任則陞之朝随朝一任則補之外凡任於外者必由内發任於内者必從外取庶使儒通於吏吏出於儒儒吏不致扞格内外無分於重輕雖不能盡選舉之規亦足以救一時之弊也一選法選曹乃治化之原人材所自出之地至甚不輕選者選擇之義也古之選法選其能者取之不能者去之今之選法但考俸月之多寡定品給之髙下如是而已有虞三載考績三考黜陟幽明成周三嵗則大計羣吏之治而誅賞之不聞三年必轉一官三考必陞一級也選法弊壊莫甚於此時矣夫貪汙無行者皆行險僥倖之小人也同流合汚而譽每歸之廉介自守者多與俗寡諧之烈士也疾惡過甚而怨每歸之惟在上之人有以辨明别白之耳今必待被告經斷方指為貪汚則人之實貪汚而能委曲周旋以幸免於告訐者比比皆是如路總管李多爾濟劉沃哷之徒歴任之初家無儋石之儲身有斡脫之債今皆田連阡陌觧庫鋪席随處有之非取於民何從而得凡此者皆實貪汚而未嘗經告者也及其滿替貪廉無别一體給由求仕彼貪汚者家計既富行囊亦充赴都縱賄無所不至每每先得美除彼㢘介者衣食所窘日不暇給至二三年閒廢於家雖已給由無力投放及文書到部復吹毛求疵百端刁蹬幸而入選在都待除淹困逾年飢寒不免則急進者可以速化恬退者反有體覆保勘之撓是朝廷誘人以奔競也今大小官正七以上者省除從七以下者部注然觧由到省例從部擬吏部由此得開賄門如散官職事互有髙低有力有援則擬從其髙力孤援寡則擬從其低雖以土木偶人及考亦得陞階更不問為人之賢愚居官之能否何如也既以入選公然賣闕以闕之美惡為賄之髙下各官該吏相為通融私門投下分擬名闕無力之士甘心於遐逺錢榖之除遂致勾䦨倡優以有才為有財以前資為錢資之戲每於注選時莫不争求其地之近闕之美而邉逺接連鈔庫去處有十餘年不得代之官民間有云使錢不慳便得好官無錢可幹空做好漢因此各思茍利肥家以為榮進之計誰肯忍苦吞飢自貽䟽逺之斥未免相胥為不廉矣是朝廷導人以貪汙也選法不公難以條舉且即所見言之如丘恢丘總管之子父存日已授崇安縣尹因奸囚婦斷罷不叙居閒八年父殁之後改名丘魁自稱白身承䕃再授寜都州同知聞者莫不駭笑如孔文昇係浙西㢘訪司書吏廵按常州改作文聲虚稱歴任學正滿考自行體覆揑合入府州選又以宣聖子孫即陞太平路教授除命已下猶在憲司勾當如此詐偽而省部更不究問實為孔門之玷風憲之羞又如牟應復輕薄無行傲狠不才初歴下州學正厚賂閻承㫖保稱亡宋故官之子便得攙陞路選自是援例者但夤縁翰林集賢院求一保闗不問人物根脚即加虚奨過褒闗節既到随准所擬小有不完必遭踈駁非才者陞選負能者淹屈欲望選法之清人材之盛不可得也古者自州縣官以上皆天子自選故銓曹每擬一官必先禀命於天子天子欲用一人亦詢其可否於執政今乃以省部除授之官指為常選以天子委用之人指為必里克選夫天下之官孰非天子之臣安得以一朝省而自分為兩途耶縁常選所除非出天子之意而伯勒格所用又非中外推許之人所以不能歸一若盡以必里克不得預常選之列則是天子之言得制於省部之手太阿之柄幾於倒持矣漢宣帝拜刺史守相輙親見問觀其所由退而考察所行以質其言唐太宗嘗列刺史之名於屏風坐卧觀之得其在官善惡之迹注於名下以備黜陟古者選官如此其精且嚴猶不能盡得其人今之所謂守選法者常選少一月一日必不許陞歴任雖多而根脚淺者通理必降必里克盡指為無體例難以定奪殊不知常選中太半非才俱可沙汰而必里克選中豈無一二可用之人才耶不嚴其選而嚴其格不清其源而澄其流是不識古人選法之意也今宜先擇風憲官委令常加體察除􅂍濫正犯之外有罷軟不勝任者行止不廉者帷簿不修者依阿取容而無所成立者並許彈罷有徳行可以㢘頑立懦才幹足以剸繁治劇但一事可稱一行可取者並許摘實薦舉依古法分為上中下三考書上考者陞中考者平遷下考者降不入考者黜從憲司上下半年或每季終造册開呈都省如各官根脚年甲籍貫三代已載元除在任實跡已見考書觧由之内不必贅冩止稱歴過俸月足矣並令還家聴除不許親齎赴都各省逐月𩔖咨差官馳驛入選令選曹自計考書之上中下以定黜陟誅賞然後照闕銓注將合授宣敕發付各省於元籍標散賢能者不待致力而自陞誰不知勸愚不肖無所容私而被降誰不知懼賞罰既公衆心自服矣如民生休戚官吏賢否既已責任憲司又有監察御史不時差出問事何須重復遣使廵行郡邑但每嵗委清幹官廵按各道専一體問風憲僚属有政事無取舉劾不公者比之有司罪加二等如此行之一年選曹不得而賣闕仕人不得而計置臺察不得而徇私滅公此絶弊倖之要道也一鈔法自漢以來止用銅錢亦用鐵錢至前宋祥符年始置交子續蔡亰又請創㑹子今之鈔法乃襲前宋交子㑹子之舊耳非古法也不必究其法始何代但可以利國濟民者通古今可行也前宋銅錢與交㑹並行以母權子而母益貴是時民間貧無置錐者亦有銅錢官㑹之儲無他子母相權而行也今國家造鈔雖廣而散在民間者甚少小民得之者亦甚難無他輕重失相權之宜也夫法立一時而弊出他日非法之不善也乃乆而自不能無弊耳事極則變變極則反能因弊更新然後可傳之不朽鈔法之弊已云甚矣天下之物重者為母輕者為子前出者為母後出者為子若前後倒置輕重失常則法不可行矣漢以銅錢而權皮幣之重皮幣為母銅錢為子宋以銅錢而權交㑹之重交㑹為母銅錢為子國初以中統鈔五十兩為一錠者盖則乎銀錠也以銀為母中統為子既而銀已不行所用者惟鈔而已遂至大鈔為母小鈔為子今以至元一貫准中統五貫是以子勝母以輕加重以後踰前非止於大壊極弊亦非吉兆美䜟也今物價日貴鈔價日賤往年物直中統一錢者今直中統一貫如至元鈔五釐與一分買不成物街市之間無所用焉乆而不革則至元一貫僅直中統一錢物直錢而鈔不直錢將見日賤一日而鈔法愈見澁滯此弊之一所宜急救也每嵗發出鈔本倒換昏鈔止収三分工墨可謂巧於利國廉於取民矣殊不知一貫出一貫入鈔行民間僅有三分而民間之鈔反損三分也且鈔在天下昏爛則已何必倒換於古亦無倒換之法兼倒鈔之便止是城市間一簇人烟得濟若各縣百姓散居村落僻逺之地去城數百里得倒換者絶少未嘗便於小民也且所倒昏鈔既皆付之丙丁則鈔本盡成虛捨矣況外路倒換到合燒之鈔貫伯分明㳂角無缺京都之下稱為料鈔一歸煨燼誠為可惜今但知可得工墨三分之利不悟虚捨本鈔九錢七分之害於國於民兩有所損將見日少一日而民間愈無鈔可用此弊之二所宜急救也古者藏富於民民富則國自富唐太宗曰民依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡此之謂也當今救弊之䇿宜増造大徳新鈔與至元鈔兼行大徳五貫或二貫准作至元一貫明以大徳易中統不過扶至元之輕以整一時之弊鈔母既起則物價自平矣每嵗發出各省勿令倒換就支作官吏俸錢和買絲料等用却以民間所出夏稅折粮課程􅂍罰諸名項錢起觧大都以供支持賞賜及随朝俸給庶國家鈔本俱為實用而鈔散天下民亦無損行之數年民間之鈔不可勝用矣鈔法既正更議鑄銅錢法使輔鈔而行則國家日富百姓日殷隆古至治將復見之若造新鈔而不行銅錢則鈔易壊爛損之多而益之少決難經乆造銅錢而不行新鈔則至元太過恐一旦行之輕重相懸不以為便二者不可偏廢也夫鑄銅為錢乃古今不易之法盜賊難以齎將水火不能銷滅世世因之以為通寳使法不可行則上下二三千年間滅棄不用乆矣何待今日始知之言者謂鑄一錢費一錢無利於國殊不知費一錢可得一錢利在天下即國家無窮之利也先賢嘗曰鑄錢無利所以能乆正謂費本之多故民間盜鑄者少然國課自有見銅以銅價計之亦不至於大費工本惟鈔用本之輕故偽造者紛然立法雖嚴終莫能戢今天下真偽之鈔幾若相半如不之信但以中統鈔通而計之自初造至住造該若干倒換已燒該若干便可知矣若以鑄錢不償所費則造鈔所得工墨三分必不了鈔局俸給一切物料之費也言者又謂錢重不可致逺尤為愚昧夫國家輸運則鈔為輕費百姓貿易則錢為利便二者相因而未嘗相背即子母相權之說此理甚明無足疑者今究其異議之原皆由内外官吏以利國為重利民為輕以至於誤天下國家也今有陳言謂何地産玉出金何處人家有竒珍異寳則朝廷忻然從之立見施行謂其有以利吾國也有陳言謂損朝廷一分之鈔可為民間十分之利或無損於國而有益於民之事則一切視同故紙抑而不行謂其無以利吾國也上下相蒙已成膏肓民生日蹙灾害日臻國家雖富將焉用之愚今請造銅錢以翼鈔法雖於國未見近利將以大利於民耳如一嵗造鈔一百萬錠五嵗該五百萬錠紙之為物安能長乆五年之間昏爛無餘逐年倒換盡皆燒燬則五百萬錠舉為烏有所存者僅工墨鈔十五萬錠而巳如一嵗造銅錢一百萬散在天下並無消折嵗累一嵗布流益廣雖億千萬年猶同一日所謂鈔為一時之權宜錢為萬世之長計也今鈔中明具錢貫即是銅錢之形古者懐十文銅而出可以醉飽而歸民安得而不富今之懐十文鈔而出雖買氷救渇亦不能敷民安得而不貧即此已為明驗不必旁引曲喻以論其利害也但比來言事者非指陳厚利不足以聳動朝廷之聽昔右丞葉李請造至元鈔謂中統一張僅可一張之用若以至元一張抵中統五張一嵗造鈔之費無所増益自可獲五倍之利以此啗國遂行其說豈知遺弊至于今日鈔價既賤而偽造更廣數年之後至元一張止可當中統一張國家未見其利民間不勝其害實為誤國之謀而當時遽以為信迄今不覺其非亦可恠也已聞言者請以大徳鈔一貫准至元鈔十貫即葉李之䇿也若如所言則他日至元之弊尤甚於中統矣亡宋自十六界加至十八界又加為官㑹以至于國亡不救此覆轍可鑒也彼知造至元之利可以五倍不知鑄銅錢之利又可以百倍夫鈔云一伯文乃百銅錢今民間稱為一錢一貫文乃千銅錢今民間稱為一兩是一錢准為百錢十錢准為千錢也若以銅錢一錢自作一錢之用則物直鈔一伯文者可以一銅錢買之各處月申時估云物一斤該鈔二錢者今律以本色銅錢二錢則二伯文鈔可得物一百斤以元價計之省鈔一十九貫八伯文是錢有百倍之利矣既利於國又便於民猶復議擬乆而不決甚可為國乏謀臣之歎也如准所陳造新鈔以扶至元之輕罷倒換以全國家之利鑄銅錢以通鈔法之滯富國恵民之道無以加此介夫前任湖湘司征猥役下僚區區忠愛無由自達欽覩累朝詔書節該諸人陳言在内者呈省聞奏在外者經由有司投進遂於前陳已准太平䇿内言有不能盡者摘出鈔法抑强户計僧道四事罄竭底藴赴湖南廉訪司及宣慰司投進雖䝉稱善靳於轉達言劇明切竟淪故紙今附錄于各項之後縱不獲遇於一時必將見知於異日有居樞要達官大臣能以致君澤民為心者當有取於所言竊謂國之與民實同一體民富則國自富國富則天下自平用銅錢雖未覩近利且以富民為先欽覩先皇帝立尚書省詔文内一欵節該世祖皇帝建元之初頒行交鈔以權民用已有錢幣兼行之意盖錢以權物鈔以權錢子母相資信而有證欽此銅錢初行民間得便歡謡之聲溢于閭里僅得逾年遽行改法又欽覩詔㫖罷用銅錢節該雖畸零使用便於細民然壅害鈔法深妨國計欽此竊詳詔意未嘗不以用錢為便何為於國有妨只此一語可見姦臣之誤國矣百姓足君孰與不足若便於民即利於國國與民相依而立安有便民而反妨國耶為今之計不必取民之資以富其國但因國之資以富其民足矣所謂富民之術無他道也當思古者民何為而富今者民何為而貧貧富相懸係乎銅錢之興廢耳農家終嵗勤動僅食其力所出者榖粟絲綿布帛油漆麻苧雞豚畜産等物所直㡬何若得銅錢通行則所出物産可以畸零交易不致物價消折得錢在手随意所用入多而出少民安得而不富今窮山僻壤鈔既艱得或得十貫一張扯拽不開若肯物還鈔則零不肻貼欲盡鈔買物則多無所用展轉較量生受百端或䘮婚之家急切使用只得以家藏貨物賤價求售貨不直錢而利盡歸於商賈之軰民安得而不貧詳今用錢之便有三一則歴代舊錢散在民間如江浙一省官庫山積取資國用可抵天下周年之稅非為小補二則市廛交易不煩貼換雖三尺孩童亦可入市免有挑偽昏爛疑認之憂三則國之所出者鈔也民之所出者貨也鈔以鉅萬計國不可以得民貨貨以畸零計民不可以得國鈔若使畸零之貨可易銅錢則鉅萬之鈔自然流通此國與民之兩便也禁錢之不便亦有三一則見有廢錢日漸消毀随處變賣鎔化為器滅棄有用之寳淪為無用之銅深為可惜二則市井懋遷難以碎貼店鋪多用鹽包紙摽酒庫則用油漆木牌所在風俗皆然阻滯鈔法莫此為甚三則商賈往來途旅宿食無得小鈔或留質當或以准折村落細民出市買物或背負榖粟或袖攜土貨十錢之貨不得五錢之物或應買一錢之物只得盡貨對換此則農商工賈之通不便者也以三者之便兼以三者之不便固知銅錢誠不可廢也即今民間所在私用舊錢准作廢銅行使㡬於半江南矣福建八路純使廢錢交易如江東之饒信浙東之衢處江西之撫建湖南之潭衡街市通行頗是利便愚嘗叅酌古今若以銅錢一伯文准中統鈔一貫一分一錢極為酌中亦與鈔文内貫形相符今銅價一斤該中統鈔一貫五伯每一斤銅可鑄錢一百六十箇則錢與銅價亦相等自無偽鑄之弊矣兼各處爐冶器具已有規可復鼓鑄除見管外仍設官旋造嚴禁民間擅鑄銅器見存之銅足可儘用銅坑所出更無盡藏將見國家日富百姓日殷太平盛觀何以加此此特言用錢之利而已鈔法之弊其害有不可勝言者鈔國課也朝廷之柄用也而與民間共之可為長太息可為痛哭今民間之鈔十分中九皆偽鈔耳偽鈔遍滿天下而朝廷畧不動念不知謀國之臣何如其用心也且如一年造鈔二百萬錠發出各省倒換舉化為灰止存工墨鈔三十萬錠而已今民問富家巨室庸僧繆道豪商鉅賈一家所藏有不啻三十萬錠者合而言之箱篋畜藏何止百千萬億計非偽鈔而何善為偽者與真無異雖識者莫能辨或有敗露到官乃造之未善不堪使用者耳愚嘗留杭見買賣者就庫倒出料鈔於店户使用反覆觀之曰此偽鈔也試代以偽反忻然而受之杭人習於市易尚不能辨況乎鄉落小民哉昔在仕途嘗推問偽鈔公事犯者謂一定工本可以造鈔數百定獲利如此人安得不樂為之雖赴蹈湯火亦所不顧如不以為然但更改鈔法悉令舊鈔赴官倒換新鈔必數百萬倍透出於元發鈔本矣又嘗考之自周漢以來皆用錢幣以珠玉為上幣黄金為中幣刀布為下幣武帝用白鹿皮方尺縁以藻繢為皮幣後漢光武貨幣雜用布帛金粟章帝時令天下悉以布帛為租市買皆用之至唐則全用銅錢或間以縑素不聞用鈔也至宋朝寇瑊刺蜀創置交子以權一時之宜因而行於中國識者謂紙錢乃鬼神所用非人世所宜以人用鬼固知宋祚之不長矣不謂聖朝立法不求乎古而循襲亡宋之舊誠為可惜愚於讀書之暇反覆紬繹頗得其說既乏權位雖有其䇿志不得伸言不得達惟有懐能抱恨而已以紙為鈔決難乆長如欲用鈔必須改法宜倣古用幣之意以絹為之國家立局置匠起機依鈔様織成方幅每貫自為一張約以尺二長七寸闊四圍邉幅俱全其貫文就機織成却以五方印色闗防之取青於極東取紅於極南取白於極西取黒於極北取黄於中土五色備具非民間可得之物雖欲偽為將焉用之然織者可作大張難製小幅零用自有銅錢不必小鈔若朝廷出納則代以輕齎此即子母相權之說一則可以數十年不壊二則偽造者不得為之三則免倒換燒燬之煩行之數年成多損少其鈔自不可勝用矣立法之善無出於此故曰錢決不可用鈔決不可改此事有闗國計非泛泛雜律常例之比可以富民可以强國可以觧嵗飢可以弭外患可以萬世開太平真乆安長治之䇿也雖是羣言噂沓誰適為謀築舍道旁嵗不我與因循茍且唯唯悠悠最為政之大患也深慮廢錢日銷偽鈔日廣國計日削大柄日移其流禍豈淺淺哉伏願賢相名卿其疾圖之天下幸甚一鹽法富國恵民無出於鑄山煑海二事而已鑄銅為錢固乃國家之大務煑醎為鹽雖知為重而未得規畫之方今随處立運司各塲置令丞實以課程浩大必須另設衙門以専管領不知為蠧民間甚不小也致弊百端何可勝言其於國家實無所益且如福建一道僅抵淮浙一塲周嵗辦鹽七萬引亦設運司正官首領官吏人等所轄一十塲批引入所鹽倉二處官攅人吏㳺食之徒不計其數惟蠶食鹽户而已今各處運司官吏每嵗輪畨分司給散工本雖曰唱名其實陽散隂收纔併開煎即以守催監装開竈起火住火比附考較封埕巧立名色百計科擾塲官因而倍取鹽户必須應付又有總司差人催辦取數什伍為羣不時下塲追擾若不取之鹽户從何而出上下交征通同隠蔽户之富者尚堪少延貧者無措必致私煎私賣之弊官司追搜如捕重寇只得舉家迯竄即目迯户已多不敢申明止令同竈鹽丁代辦數年以後必盡迯矣此鹽司之設不便於鹽户也商旅販賣所以流通鹽法助辦官課令運司賣引鹽倉支鹽則有照引散帖百種需求方得支發纂節去處又設批引官索瘢求瑕恣行刁蹬至地頭行賣又差拘收引官檢校多餘無非漁獵客人而已若鹽價髙運司官吏詭名先行攙買或鹽價低則勾鹽商聘賣及有上司官與權要之家挾勢奪買必須先儘數足而鹽商有守等半年一年不能得者又計其引數需要荅頭錢以客旅與官府交易本自疑忌豈可更加挾持此鹽司之設不便於商旅也運司闗防私鹽併逺塲毁逺竈立團煎煑外立團軍廵綽為法可謂嚴矣但團軍嵗一更易何所顧藉附團數十里雞犬不得寜甚至掠人殺牛樁配居民無所不為其能保私鹽之不漏乎又有鹽司差人及管軍頭目廵鹽絡繹鄉村間遇見有鹽不審虚實便指為私從其詐騙則免公庭少不依随遂成實禍及有正犯到官者設無賄賂監禁經年轉指平民連逮無已溪壑既厭盡皆撒放或至遭斷者無非窮民斷没家財一半多不過五七貫而已有援者咸得清脫無力者必至於罪此鹽司之設不便於百姓也運司立法凡有私鹽生發罪及州縣正官鹽出於倉塲而罪歸於州縣似此無辜何異池魚之殃兼鹽户不属有司無相統攝致有一等慣賣私鹽無頼之徒結搆鹽司上下容情縱令不軌無所畏憚及與附塲民户交參住坐便作竈户柴户等名色衮同影占又有民稅詭寄規避差役凡遇有司追㑹詞訟庇稱鹽户沮撓官府不得施行有必合約問之事即以辦課推辭動經嵗月不得杜絶此鹽司之設不便於官府也煑鹽𣙜課所以資助國用今言者但知為國興利不知為國省力總其所入為數雖多扣其所出已費不少何異以羊易牛猶謂之得策耶且以一引鹽論之嵗給工本及柴草等物又有鹽司官吏月支俸給般運水脚之費通以價錢准除折筭而官司月過本錢將及一半矣此則大不便於國家者也夫畜猫防鼠不知饞猫竊食之害愈甚飬犬禦盜不知惡犬傷人之害尤急今鹽司官吏猶饞猫惡犬之為害也宜先去之則鼠自穴蔵盜亦屏迹矣唐劉晏専用㩁鹽以充軍國之用觀其行事一時莫及後世亦無有以繼其軌者其言曰户口滋多則賦稅自廣理財常以飬民為先又謂官多則民擾但於出鹽之鄉置鹽官收鹽户所煑之鹽轉鬻於商人任其所之自餘州縣不復置官或商絶鹽貴則減價鬻之謂之常平鹽其始江淮鹽利四十萬緡季年乃六百餘萬緡由是國用充足民不困弊此已騐良法古今不能易也為今之計不必立竒求異但祖述劉晏之遺規則盡善矣宜將鹽運司衙門及各塲所設官吏團軍廵卒盡行革罷併入有司管領選省部内才幹官一員充𣙜鹽使於各州縣摘佐貳官一員提調鹽事於出鹽去處設鄉官一員専掌支發但簽取本處有抵業富家應當亭尸分認周嵗鹽額令亭户自行收拾竈户任便煎煑随處立倉交納亭戸不致於迯亡竈户可息於追剝民户亦免團廵誣逮之撓既無所擾自皆樂於應辦矣若非亭戸竈户而自煎者方為私鹽許令鹽户告發依條治罪事既歸一誰敢輕犯如工本實為鹽司所有而鹽户虚受其名得免額外苛虐已云幸矣雖不支工本亦無怨也終嵗額辦鹽引預於春季作一次發下諸路給散各鄉官收管令客人徑於收鹽去處支買依時價兩平交易聴從他處發賣随所至繳鹽引自可革去買引攬引支鹽分例批引過闗一應之弊商人獲利既厚則販者必多而民間亦可得賤鹽食用也古今鹽法不過為辦課耳使課而無虧何必廣布衙門自取多事今鹽有定額户有定數私煎有定罪若一委之有司取辦於亭户既省俸給工本自可全收課程官享其利而民安其業矣至於户日蕃而賦益廣鹽日多而利益博他日之増羡未可以限量計也富國恵民之道已盡於此一厚俗竊自三代漢唐以來歴數延長雖中經變亂至於臨危而獲安垂絶而復續者皆由風俗淳厚人心固結有以維持扶植之也賈誼曰化行俗定則皆顧行而忘利守節而仗義至哉言乎禮義不立㢘耻不興風俗日薄人心日漓如人之一身已無元氣安能長乆風俗乃國之元氣國祚脩短係乎風俗之厚薄所闗甚不輕也知為政之要者當以移風易俗為第一義夫移風易俗莫大於禮樂教化昔魯兩生曰禮樂所由起積徳百年而後可興自開國以來今且百年矣周書曰既歴三紀世變風移自混一以來今將三紀矣以時考之則可興禮樂崇教化變風俗不可謂之太早計而朝廷上下畧不及此茍且一時之謀不思萬世之䇿甚可為長太息也夫治國猶治身既未能補養元氣使之壯實宜先去其蟊賊不致於損傷則可矣且即數端大壊風俗者言之女正位乎内男正位乎外男女正天地之大義所以風天下而正夫婦王化之基也今街市之間設肆賣酒縱妻求滛暗為娼妓明収鈔物名曰嫁漢又有良家私置其夫與之對飲食同寢處畧無主客内外之别名曰把手合活又有典買良婦養為義女三四羣聚扇誘客官日飲夜宿自異娼户名曰坐子人家都城之下十室而九各路郡邑争相倣效此風甚為不美且抑良為賤者待告而禁終不能絶若令有司覺察或許諸人陳首但有此等盡遣從良有夫縱其妻者盖因奸從夫捕之條所以為之無忌若許四隣舉覺俾同奸斷或因事發露則罪均四鄰自然知畏不敢輕犯此可以厚俗之一也古者嫂叔不通問所以别嫌疑辨同異今有兄死未寒弟即収嫂或弟死而小弟復收甚而四十之婦而歸未冠之兒一家骨肉有同聚麀兄方娶妻而弟已有垂涎其嫂之想嫂亦有顧盼乃叔之意妻則以死期其夫弟則以死期其兄閨門之醜所不忍言舊例止許軍站續又令漢兒不得収今天下盡化為俗矣若弟可收嫂則姪可収嬸甥可収妗子可収母伯可收弟婦但有男女之具者皆可為種嗣之地縱意所為何所不至此風甚為不美除䝉古人外所宜截日禁斷有兄亡而嫂願改志及守志者並聼如収以為妻則比同奸罪更加一等此可以厚風俗之二也夫紀綱名分禮之大經賤以承貴下以事上明君子小人尊卑之分限也今有人家年深奴婢或需求不獲或索去不能欺蔑傲慢不聼驅使才加捶撻便成讎恨未免巧撰非違以誣其主官府未明其虚實主奴必須同跪于庭或攀指閨門婦女貴賤不分汚言無忌縱得觧釋何靣同處況南北之風俗不同北方以買來者謂之軀口南方以受役者即為奴婢各因其俗之舊則化易行也故唐法奴告主者皆勿受若縱奴告主名分不立此風甚為不美除謀反大逆謀故殺人許令陳首其餘一切事務並不得告有司亦不得受此可以厚俗之三也夫孝始於事親中於事君終於立身故自天子達於庶人莫之能易今有父母俱存而諸子便已分居析㸑又有職官歴任棄父母而􅂝妻子昔人三釜之禄為養親也不顧其親之養大行已虧安能治民又有父母祖父母訃音入耳畧無哀容或馳价奔䘮而居官自若又有親方垂絶不事津送且娶婦聘女恣為酣歌又有鶴髪之親在堂而牽於求名營利至十數年于外而喜懼罔知畧不動劬勞之念此皆絶滅大倫去禽獸者幾希夫三年之䘮天下通䘮也古人云求忠臣於孝子之門未有不孝其親而能忠於君者又云於所厚者薄無所不薄未有薄待其親而能厚於他人者此風甚為不美古者明王以孝理天下由身先之也又聞古者宗廟四時之祭祀烝嘗皆天子親享不敢使有司攝也伏望檢討舊典親行享廟之儀此謂追逺而民徳歸厚矣仍令天下無論官庶之家有親在而諸子忍於分析及居官客外而違於生事死葬者並坐以不孝之罪凡遇父母祖父母之䘮並令守制終服如有告閒養親或棄官廬墓者各從所性俟其孝行顯然則優加褒奬此可以厚俗之四也父子夫婦乃三綱五常之大者百世不能以損益也今鬻子休妻視同犬豕賤賣貴買畧無惻忍雖有抑良買休之條例而轉賣者則易其名曰過房實為軀口受財者則易其名曰聘禮實為價錢今大都上都有馬市羊市牛市亦有人市使人畜平等極為可憐是朝廷虚視其禁而明開其門也夫民之安於田里而不好作亂者以妻子可戀生理足惜耳若父不以子為子夫不以妻為妻朝為骨肉暮即岐路六親不保恩情已絶推是心以往則子棄其父妻棄其夫弟棄其兄為下者疾視其長上綱常之道蕩然不存此風甚為不美所宜嚴行禁絶無分買者賣者引至者並令一體斷治并坐本貫官吏以虧失户口之罪使各相保守無棄天倫此可以厚俗之五也古者定服色所以明貴賤陳卑髙今衣冠一體貴賤不分服色混殽尊卑無别如繡金龍鳳帝服也而百官庶人皆得服之眀珠碧鈿后飾也而閭閻下賤皆能效之若騶從廝役囊有一金者便可以乘肥衣輕雖徳行道藝缾無儲粟者亦甘於徒歩敝緼如主奴同出先與後之分耳或聨行並轡不辨誰主誰奴官吏雜處坐與立之殊耳或閒居促席不知孰官孰吏上下無差冠履倒置此風甚為不美宜以九品之官定為九等士農工商僧道定為六等下而臧獲定為一等使服飾各安於分限貧富不得而僭踰此可以厚俗之六也凡此數者皆時政之急先務邦國基本實繫於斯顧在朝廷力行何如耳徳風所加靡如草偃令行禁止誰敢不從所謂道以政齊以刑民知逺罪而未至革心化行俗變之餘所謂道以徳齊以禮民日遷善而不自知風俗既淳人心自固各遵徳義視法如讎欲挽回唐虞三代之風不難矣一備荒凶年飢嵗古不能免每每亂亡由此召之是以牧民之官常切究心備荒之䇿至甚詳宻古者無三年之蓄曰國非其國也三年耕餘一年食九年耕餘三年食故堯有九年水湯有七年旱天下不至於亂民生不至於乏者以備之有素也國家混一以來年榖屢登民無菜色間有不稔未見深害所以上下偷安不為經乆之思萬一遇大水旱大凶歉饑饉相因骨肉不保户口星散盜賊雲起將何䇿以救之今民間一年耕僅了一年食雖有餘粮亦不愛惜如近年河南小荒江淮一水便已蕩析流離無所依歸今年山東八路被灾闕食朝廷撥降鈔三萬錠委官計户見數大口二斗小口一斗賑濟兩月續據報到闕食戸四十六萬四百餘戸大小口一百九十萬四千有零該米六十七萬三千九百八十石折支鈔三十三萬四千八百餘錠亦可謂善政矣然民生不可一日無食七日不食則死安能忍飢以需賑濟若待所在官司申明聞奏徐議拯捄之術展轉遲誤往往流亡過半此不可一也灾荒之地自冬而春春而夏直至秋成方可再生縱得兩月之粮豈能延逾年之命此不可二也天雖雨玉不可為粟家累千金非食不飽若給以見粮猶能濟急今散以鈔物非可充飢縱有鈔滿懐而無米可糴亦惟拱手就死而已官雖多費而恵不及民此不可三也無預備之先謀至臨危以立䇿雖有上智無如之何今京都之下達官大家亦無儲畜百工庶民皆是旋糴給㸑朝不謀夕只今米多價平尚且不給設使價起更值凶荒盡為填溝壑之餓莩矣此皆可為甚慮者而執政恬然不以加意識者為之寒心伏覩至元新格諸義倉本使百姓豐年儲畜儉年食用此已驗良法其社長照依元行當復修舉文非不明也意非不嘉也越十三載未見舉行朝廷泛然言之百官亦泛然聼之不過虚文而已漢立常平倉榖賤増價而糴以利農榖貴時減價而糶民以為便二千年間皆則而效之朱文公嘗行於浙東最為得法每嵗秋成官司給錢依時價收糴入倉次年飢時依元價出糶錢復歸官官無所損而民有所濟備荒之䇿無出此者然此法不可行於今矣何也貪官汚吏並縁為奸若官入官出民間未沾賑濟之利且先被打筭計㸃之擾及出入之時又有剋減百端之弊適以重困百姓也宜於各處騐户多寡或一鄉一都於官地内設立義倉一所令百姓各輸已粟自掌出入之數不費官錢可免考較民入一石之粟自得一石之價不費於公亦無損於私雖不若官支價錢之為便然為倣古酌今之良法也猶慮風俗不古急義者少豪家巨室為富不仁惟想望飢年可以閉糴要價誰肻以隂徳濟人為心若令自願必無應者亦須官為立式有地百畝之家限以一嵗出粟一石如有好義願自多出者聼悉令出等甲户執其綱領擇鄉里能幹者效其驅馳嵗添新粟則旋廣倉廪每遇闕乏如取諸寄而已夫収支出入既無預於有司若其規畫未至必須助以官府之力或掌事任勞之人自有侵欺宜令司縣官依竊盜例科斷追理或司縣官因而挾勢借貸宜令廵按官依枉法􅂍例定罪徴還本色若所在官司有能勸率成效令合屬上司開具保舉優加陞賞誠為安民定業之長䇿經邦貽謀之要道雖言近迂緩而事實急切如今年之荒特其靡耳所可憂者正在他日毋謂不及於目前而藐然置之度外也然此事非二三年未能有成而目前之急必思先有以救之廟堂之上皆知為今日急務不過坐待其斃未聞處置之方畧雖官司賤價賑糶以有限之米應未已之荒長計將安出若勒令随處富家平糶則流害滋甚大户縱賄而求免小户力貧以奉行徒資官吏之買賣初無濟閭里之危急言者請給鹽引和中客米往年發珠子引鹽商失陷至今怨黷豈堪再虐以米引耶縱令優利數倍亦所不欲也今被灾之處雖多而江淮湖廣亦皆稔熟及此収成之餘急為立法收米四百餘萬石半運赴都半留随省以備明年之荒可也宜倣漢時輸粟為郎之例發下從七品正從八品虚名勅牒四千道實擬散官遥授職事分給行省填名𩔖報從七一千道每名米六百石正八一千道每名米四百石從八二千道每名米三百石可得米一百六十萬石天下之富而好名者皆争趨之既非常調亦無礙於選法也又倣宋時官賣度牒之例除西畨僧外發下度牒三十萬張散之各路凡為僧道悉令倒給自至元十四年始截日終出家者每名入米十石可得米三百萬石歸附以來僧道兼無慿據粮不輸官儲積㝡厚使少出所餘以濟飢歉亦無損於教門也二者但費朝廷之一紙不動聲色而數百萬粮可立而致矣舍此不行他未見其䇿也夫鬻爵濟時雖非令典稽之古史亦匪創行然可蹔不可常也度牒之法今後出家者每人納米四十石永著為令寛以二三年義倉既成儲畜自富可髙枕而無憂矣一定律律者所以齊天下之動至公大定之制也臯陶作士明于五刑穆王訓書罰属三千綱舉目張井然不紊故百官奉法各知所守而不敢踰百姓視法各知所避而不敢犯自三代而下國家立政必以刑書為先歴觀古今未有無法而能一朝居也今天下所奉以行者有例可援無法可守官吏因得以並縁為欺如甲乙互訟甲有力則援此之例乙有力則援彼之例甲乙之力俱到則無所可否遷調嵗月名曰撒放使天下黔首蚩蚩然狼顧鹿駭無所持循始之所犯不知終之所斷是陷之以刑也欲强其無犯得乎内而省部外而郡府抄冩格例至數十册遇事有難決則檢尋舊例或中無所載則旋行議擬是百官莫知所守也民間自以耳目所得之敕㫖條令雜採𩔖編刋行成帙曰斷例條章曰仕民要覽各家收置一本以為準繩試閱二十年間之例校之三十年前半不可用矣更以十年問之例校之二十年前又半不可用矣是百姓莫知所避也孔子曰刑罰不中則民無所措手足今者號令不常有同兒戲或一年二年前後不同或綸音初降随即泯没遂致民間有一緊二慢三休之謡上無道揆下無法守不聞如是可以立國者京都為四方取則之地法且不行況四方之外乎如往年禁酒而私醖者比屋有之酒益薄價益髙而民益困又如禁牛而私宰者愈多輦轂之下十家而八又如奸盜殺人必不可赦而每嵗放圖魯木以此人心輕於犯法又如婚姻聘財明有官庶髙下折鈔之例而今之嫁女者重要財錢品官富人或索七十錠一百錠市庶之家不下二三十錠更要表裏頭面羊酒等物與估賣軀口無異又如買賣田宅舊有先親後鄰之例而今民業多歸勢要雖親與鄰不得占執告到官府無力與競業在豪家終為所有推此數端天下槩可知矣今有司每視刑名為重而婚田錢債畧不加意殊不知民間争競之端無不始於婚田錢債而因之以至於奸盜殺人者也憲司廵按每以􅂍罰為重而一切民訟畧不省察殊不知百姓負寃上無所訴是開官吏受􅂍之路也審囚決獄官每臨郡邑惟具成案行故事出斷一二便為盡職不知大辟以下刑名公事甚不少也路縣官吏未飽其欲每聞上司官至則將囚徒保候審録既畢仍復收禁此皆無法之弊也又兼衙門紛雜事不歸一十羊九牧莫知適從普天率土皆為王民豈可家自為政人自為國今正官位下自立中政院匠人自𨽻金玉府校尉自歸拱衛司軍人自属樞宻院諸王位下自有宗正府内史府僧則宣政院道則道教所又有宣徽院徽政院都䕶府白雲宗所管户計諸司頭目布滿天下各自管領不相統攝凡有公訟並須約㑹或事渉三四衙門動是半年虚調文移不得一㑹或指日對問則各私所管互相隠庇至一年二年事無杜絶遂至於强淩弱衆暴寡貴抑賤無法之弊莫此為甚也昔先帝時嘗命修律未及成書近議大徳律所任非人訛舛甚多今宜於臺閣省部内選擇通經術明治體練達時宜者酌以古今之律文參以先帝建元以來制敕命令採以南北風土之宜修為一代令典使有司有所遵守生民知所畏避國有常科吏無敢侮永為定制子孫萬世之利也諸色衙門投下頭目除管領錢粮造作外無問大小詞訟俱渉約㑹者並令有司歸問似望政歸一體獄無乆淹可謂成物之簡能太平之要道矣一刑賞夫賞慶刑威國之大柄刑威不加則人無所畏賞慶不明則人無所慕二者不可偏廢也古者立刑必先施於􅂍吏盖􅂍吏為患甚於酷吏之肆虐酷吏雖為少徳人猶得而避之􅂍吏徇私滅公人之受害尤甚國法之不得行民寃之不得伸上情之不得下達善政之不得及民皆由􅂍吏有以蠧之先去􅂍吏猶除草必先去其根也􅂍既不行則刑自平矣昔國家定為枉法不枉法之例今則枉法者除名不叙不枉法者並殿三年制法雖明而犯者未已終莫能禁其萬一也賈誼曰禮者禁於將然之前法者禁於已然之後既不能革其心使自無所犯又未能使之畏法而不敢犯是為兩失之矣且如司縣官困於正從七品八品間終老無受宣之望吏員困於路縣終老無受敕之期凡人之自愛其身而重於犯法者以清議之可畏前程之尚逺也既無所畏又無所慕則仕而為貧耳復何所惜欲責以無貪不可得也若其家業已成資畜已富雖除名雖殿三年不足介意近見江西有路司吏因賊情事受鈔五百錠金銀一箱一夕挈家而去不知所之意謂累路吏月日老死不得一官不若多得鈔物可為富家翁也又見各處有州縣官不顧名節縱意侵漁大小民訟商賈納賄不幸而因小􅂍告發雖行定罪停罷今在閒居已成巨室縱不再仕亦可了終生之計也似此之𩔖何可勝數在昔有刺配籍没之法文其靣則終身不齒於鄉里籍其資則全家不免於飢寒治􅂍吏無出此法之善也然朝廷未嘗無刺籍之法如累朝宰執近臣多已被罪籍没豈此法獨行之随朝而不可行之外任又兼有强盜刺額􅀼盜刺臂之法矣其􅂍吏之害及百姓尤甚於强􅀼盜之害止於一家一人而已豈此法獨施之强竊盜而不可施之􅂍吏彼之受􅂍不顧者將以肥其身利其家養其妻子耳若使身陷刑戮田宅為空妻子不保雖不除名不殿三年亦不敢輕於干禁也今後無分内外大小官吏但是􅂍状明白者吏則刺靣配役官則免刺流徙所有家財田宅奴婢並令盡數没官庶􅂍吏知憚而犯者鮮矣夫法為小人而設非為君子也君子之人必不自同於􅂍吏而􅂍吏之法必不及於君子立法非過於嚴也治小人之法當如是耳然今日之政不患罰之不至而弊於賞罰之不公不患貪者之難制而病於貪廉之無别􅂍吏固嚴其罪矣而廉吏則未見其賞也今省部置立過名簿不聞有功績簿憲司嵗報􅂍罰冊不聞有廉能冊夫人性不大相逺利欲人之所易動苦節人之所難能豈以功績廉能為不美哉謂暴無傷謂善不足為也若為善而無以勸則皆相習為不善矣舜去四凶舉十六相而天下大治非罰之少而賞之多使善者並進而惡者自化也明王施政猶天地之於萬物雨露以滋養之而後雪霜以肅殺之有雪霜而無雨露非所以化育有刑罰而無恩賞亦非所以為政也朝廷昔有封贈之條該具雖明而舉行未見今後無分内外大小官員有一廉如水無擾於民者令風憲官從公保舉申臺呈省俾同實跡優陞一等歴一考則封贈其父母再歴一考則封贈其妻妾但才徳公勤有一可稱者亦如之不過費朝廷一紙之虚名而可以收激勸人材之實效使居官執役者明見􅂍吏之被禍及其身及其父母妻孥盡不免於戮辱又見廉吏之蒙福及其身及其父母妻妾俱得享於榮華誰不願趨榮而避辱捨貪而從廉不待畏法而不敢犯舉皆革心而自無所犯矣一俸祿孟子曰禄足以代其耕也在官者不耕而食故制禄以代之禄有不及何以養廉漢宣帝詔曰吏不廉平則治道衰今小臣皆勤事而俸禄薄欲無侵漁百姓難矣近來貪官汚吏習以成風禄之有餘者則視為儻來畧無撙節之心禄之不足者則借曰無可養廉恣為侵漁之地上下交征相承為例廉耻道䘮不覺其然宜思所以整救之可也時務所急雖未專在此而禄之不均自是朝廷一大缺政今親民之官該俸十兩者給職田二頃獨江南半之南地非肥北土非瘠也況江北少嚚訟之風江南多豪猾之俗而給田乃有重輕此禄之不均一也顧兹中外管軍管民務站各色官均為任君事也均為食天禄也而職田獨與路府州縣及廉訪司官而餘弗之及於此何薄於彼何厚此禄之不均二也今各處職田元有官田則有之元無官田則無之又雖有官田而不給為職田者有職田處除絲麻豆麥外所收子粒路之正官不下八百石㣲如廵檢亦收一百餘石無職田處浪得職官之名不沾顆粒之恵而況外任俸鈔從五品止三十兩從六品不滿二十兩如九品止十二兩以俸鈔買物能得㡬何十口之家除嵗衣外日費飲膳非鈔二兩不可九品一月之俸僅了六日之食而合得俸鈔又多為公用掯除若更無職田老穉何以仰給又如小吏俱已添俸添米舊請俸鈔六兩者増作八兩每鈔一兩月加米一斗以此比之則六品以下之無職田者反不如一小吏也飢寒相迫欲律以廉得乎此禄之不均三也今内任俸鈔倍於外任而京城之間尋常米價亦是半定一石飲食衣帛件件穹貴以鈔數計之雖多一倍以日用計之實無外任一半所得況無職田可以供贍如外任三品官月得俸鈔八十兩職田米八百石一月該米六十餘石至如九品亦收職田米一百石以上一月得米已近九石之數随朝三品官月請俸鈔三錠一十五兩既元無職田又不添俸米而四品官除俸鈔外月増米一石九斗五升由此言之則随朝三品四品之官反不如外任九品簿尉之俸此禄之不均四也制禄不均則人心不一放辟邪侈無不為已其流弊可勝言哉且俸禄一事自歸附以來言者不知其㡬矣而所言俱不得其要朝廷舉行亦不知其幾矣而所行皆未底于平一畨更變又是一畨衮行終無益於缺政之萬一也中朝冗職固難枚舉如各處廵檢各路提控案牘嵗收職米尤為虚費随縣置尉司簽弓手以専廵警又有分鎮軍官以助之何須贅設廵檢司甚而一縣之内有設三四處者徒蠧民間無濟官府随路既有經歴知事足任案牘又令行省贅差一員徒蠧官府無益民間兹𩔖頗多皆合汰去既可省俸又可以清選法也如處州徽州等路總管無職田可收縱令每月増米一石五斗五升而省劄人員一月反得米八石有零似此不平朝廷何嘗知之當今之弊不在俸禄之薄而在俸禄之未均不患俸禄之不敷而患設官之太濫均有餘以周不足取濫設之米以給合設之官則國無所損而官有所利矣議事之臣日夜講求俸米之說謾爾紛紛莫窮要領其有俸鈔有職田則過於厚無俸鈔又無職田則過於薄尸位素餐者空負縻廪粟之譏服勤輸力者乃有飯不足之歎若能裒多益寡截長補短職田所收自可敷用今有額外多費二十八萬餘石粮徒於國儲大有所損實於官吏未見其益且丞相職居人臣之右每月得俸八錠有零一日之俸不滿十四兩若放晉之何曽日食萬錢無下筯處雖罄竭私帑亦不能自給矣天子立相必須厚禄以優崇大臣律身自宜戒奢而從儉豈可先處以約而薄其所養哉今俸自三錠以上者不得添米官益髙而俸益薄甚非尊尊貴貴之道也又如随朝大小官及各處行省宣尉司皆是樞要重臣既無所取於民又無職田可收縱添些少俸米何足為養㢘計君子猶良驥也欲責之日行千里又不飽以芻菽世無是理也宜盡取元撥職田合收子粒錢粮官為收貯將中外合設人員分别差等而普及之随朝官吏俸給雖厚米價則穹凡俸五兩月給米一石外任官吏俸給既薄米不直錢凡俸五兩月給米二石五兩以上随俸加之不願支米者則随時價准之以鈔内外臺察院廉訪司事煩而形神勞官清而交往絶比之有司量加優添所以重風憲也和林上都山後河西諸州城不係出米去處照依本處時估折價不當拘以二十五兩所以重邉鄙也無分軍民各色官吏但請俸錢者随所給鈔數按月支米元無俸錢者随所授品從依例増支將官収職田錢粮先儘外任數足其餘剰者盡令起運赴都以給随朝官吏計其所得倍多於前又可無過費太倉之粟此所謂利國利官之要道也其禄既均其政自平免致飢寒之憂自存廉耻之節然後律之以􅂍貪之法彼亦不得而有辭矣一求賢治天下無他道得人而已矣詩曰得賢則能為邦家立太平之基書曰野無遺賢萬邦咸寜自古及今國家之興廢世祚之長短係乎君子小人之分用君子必治用小人必亂不待縷數詳陳雖三尺之童亦知此語也欽覩明詔有徳行才能不求聞達者具以名聞上意非不勤也未有一山澤之賢布韋之士得進於朝廷者豈四海之廣盡無其人耶天之生才代不乏絶何嘗借才於異代不患無才所患求之之道未至耳待其自求而後用之求進者必非佳士其有異才者必不肻自鬻其身也混一以來中外薦舉紛奏迭章而取好人之使接踵交驛𩔖皆猥瑣齷齪之軰次則庸醫繆卜及行符水售妖術之流耳未見得一真好人也古語云達視其所舉又云惟賢知賢薦引者已非好人安能識一真好人耶況賢才之生散在四方古今大賢多産於遐陬僻壤之地出於閭閻寒素之家雖明君哲輔不能周知豈嵓廊之内跬歩之間所能盡天下之賢今朝廷選人省部䑓院互相推舉見任者既罷前廢者復起往來除授不出眼前數輩而已使皆賢也尚不足以舉政況未必皆賢耶既不取人於寒㣲又不歴試其能否數年之後舊人已死來者又皆不經事之少年無仁賢則國空虚識者之所甚憂也唐太宗征髙麗得薛仁貴謂曰諸將皆老思得新進用之不喜得遼東喜得卿也盖天下之才猶水焉浚導其源而䟽通其滯則取之不竭未見其窮也三代漢唐以來有鄉舉里選有孝廉科賢良方正科進士科武士科又有任子軍功之例進取之途非一端也廣以取之而後精以擇之則賢否判然矣故賢者於此時不求而自至非樂於求進也乃耻於明時不見用也當今既無廣取之科又無精選之法取人於吏他無進身之階海宇之中山林之下懐瑾握瑜韞匵自珍者甚不少也如郡縣之吏或以市井小軰或以僕御賤夫皆頑頓亡耻之徒耳技止於刀筆力困於期程彼磊落之才必不肻屑就明矣如朝中小吏若非達官之𤓰葛即是見役之梯引争附炎門自同輿皂皆㳺惰無知之子耳或有生脚而至者以文學結交決難投合非禮物贄見何足動人又豈貧者之所能辦彼有志之士必不肻茍合亦明矣昔田千秋一言寤主即登侯相鄭然明一言見知便獲賞識古今際遇往往皆然若必待肥羊美酒以為先容幣帛筐篚以將其厚意則千秋老死於郎官然明終役於堂下而已耳仲弓問政孔子答以舉賢才又問焉知賢才而舉之曰舉爾所知爾所不知人其舍諸盖四方之賢有得於所見有得於所聞有得於人之所見所聞其所知者有限所不知者無窮取在取人之知以為已知非為平生歡半面雅而後謂之所知也今朝廷上下不問何人為賢不知賢為何物但以巧令迎合即為精細以勤奔走善枝梧即為了得以乆出門下包苴追往即為知識好人所知者止此所舉者亦止此而使此流皆得以居官治民祗見人才日少政事日乖紀綱日壊不可得而復整矣使一路一縣一衙門之内止得一真賢委而用之何政不舉何事不辦不浚其源而澄其流不端其表而正其影雖日夜紛更徒勞無益也宜令各道廉訪司随路文資官採訪遺逸無問已仕未仕見任在閒但徳行可取才能足稱卓然為鄉里所敬及郡邑有聲者不限員數具以名聞待以不次之擢任以繁要之職兼内外䑓設監察御史五十餘員各令嵗舉一人重責執結如大失舉甘當罷職不叙必然不肯徇情容私以自貽身禍也賢者遭時喜於自効朝廷得人足以分憂古者明良相逢之盛復見於今日矣一養士自唐虞三代春秋戰國以來王宫國都下及閭巷莫不有學由閭塾而升之黨庠遂序鄉校國學自月書季攷以至三年大比興賢能而爵之禄之漢唐以後崇尚益加建太學贍生徒至億萬計如六朝之紛擾南北之戰争亦未嘗一日廢學而公卿大夫有不出於學校中者雖處尊榮終身為耻是以古今用人必從學校捨此他無取焉欽覩明詔學校之設所以作成人才仰各處正官教官主領敦勸嚴加訓誨務要成材以備擢用仰中書省議行貢舉之法今内而京都外而郡邑非無學也不過具虚名耳京都立國子監設生員無非貴逰子弟群居終日句讀未通已登仕版欲冀成材實不可得若真欲取材於監中豈二三十軰乳臭無知之子所能盡之耶在學諸生既無出身之定例宜乎來者之不多所設伴讀又不擇人重賂監官賸出陪堂便得入名更不知所伴所讀者何事惟想望部領史儒學教授而已朝廷養士為國家深長計乃令每月梯已出陪堂鈔一十五兩勢家官族視此為輕貧儒寒生何所從出今朝廷每嵗竭内府太倉以贍集賽以錫僧道豈少十五兩鈔而靳於樂育人材耶朔望奠謁已為簡慢春秋二丁但掲碑刻宣聖一本破官錢辦祭物畧無禮儀之可觀以杯酒腐肉為徳色鹵莽滅裂莫此為甚随路立學例設教授凡𨽻文廟錢粮獨不考較計㸃之目朝廷待士亦云厚矣何乃不體上意務為茍且以偷盜侵欺為能事以積日滿考為盡職書單作支破食甚衆坐齋習讀不見一人每嵗租入僅以供給教授正錄直學吏胥數家而已生員子弟並不沾升合之恵學校已為虚設又立一儒學提舉司上不能承流宣化下不足儀表後進尤為冗濫者也且今之為教授者失於遴選薫蕕並進有犯􅂍十惡之徒有市井無賴之軰亦有江湖間說相談命技術之流及有新進少年假儒之名全不通文理者主領不得其人安能責成其效夫學官與有司官不同儒者以行為先若於士行稍虧聲迹不美便難居以師儒之職何待被告取招然後明其非儒也䑓憲上司特以儒官之故每加優容誠為過矣如卲文龍乃黄班塘之賊黨起身㣲賤兩遭杖決不軌之行鄉里不容因奸易妻畜女為妾閨闈之醜路人皆知初任建康再任平江皆多士之區為諸郡之甲而使此軰居之豈不為明教之玷士流之辱又如方平因為人奴乆留都下夤縁詐冐兩除教授並不到任在都以結攬公事為活每日宿飲於生子人家羣優嘲戲呼之曰方大頭棄父母妻子於不顧俱以凍餒而死訃音到都正飲娼門畧不舉哀亦不奔赴至今父母妻三䘮不舉閭黨有詩譏盈滿墻壁傳播都下言之可醜他郡學官似此盖不少也又有待選未除五百餘名誰為才學明敏誰為教養精勤出於選用必合相應人數其有虚偽揑合濫名選中者又且十居四五望其作成人材豈可得哉作成者固不用心而人材亦不肯就學今之𨽻名儒籍者不知壮行本於㓜學而謂借徑可以得官皆曰何必讀書然後富貴既仕路非出於儒不須虚費日力但厚賂翰林集賢院求一保文或稱茂異或稱故官或稱先賢子孫白身人即保教授才入州選便求陞路才歴一任便幹提舉但求陞遷之速何問教養之事因此學校遂成廢弛言者皆歸咎於差役所致不思唐宋盛時儒人未嘗免差而士風甚盛人材甚廣無他聲名誘之於前利禄引之於後也使前數年不當差役亦未見有一人成材者若業儒而獲用則人自慕尚雖當役不足以抑之使業儒而無所用則人皆厭棄雖免役亦不足以厲之夫士列四民之一為國効役乃分之宜而治國平天下必須取才於士非工農商之比在朝廷自當有以優異之故除徭以逸其身存恤以養其心好爵以縻其材信任以行其志必如是可以盡樂育之道也儘優異之虚文無激勸之良法終何補於世用近朝廷舉擢二三孔氏謂尊崇聖道不出於此比年派譜不明但姓孔者俱稱聖裔蠢然無學即充路教甫歴初階即陞八品有實能繼聖學明聖道者反不得援例夫子之道垂憲萬世凡天下之蹈仁履義者皆夫子之徒也豈萃在一家一姓之中耶若朝廷廣廷儒士孔道大行則生民蒙其福矣非謂私其子孫以示尊崇之至也今後宜以教養實效責之教授常令風憲官及随路文資官嚴行體訪但素行有虧無足師範者即便彈罷精選徳行文學衆所推敬者補授見闕勤加勉勵每嵗於朝廷優給衣糧以贍養之限二百員或三百員校其能否次第錄用庶使學校不為虚設人人各知自奮數年之間誦濟濟多士之詩矣一奔競奔競之風尤不可長古之人惟患徳之不修學之不講不患人之不已知故用行舍藏一安於命仕止乆速各随其時何嘗識有奔競之事國朝混一之初力革虚偽選任實才此時求進者少人心猶有古意近年以來倖門大開庸妄紛進士行澆薄廉耻道䘮雖執鞭拂鬚䑛痔甞糞之事靡所不為其有攀附營求即獲陞遷者則衆口稱之羡之以為能若安分自守羞於干謁者則衆口譏之笑之以為不了事習以成風㡬不可觧矣昔桓𤣥以前世皆有隠士耻於已時獨無求得皇甫希之使隠山林號曰髙士時人謂之充隠豈有當今盛際更無一人髙尚耶朝廷既不為耻則天下亦不以妄進為耻矣且即近事明之如前年趙著作依附梁平章門下希望恩賞再求抄冩大元一統志選用能書者二十名語人云舊例已歴任陞職一資白身人即入流品日支食錢公給筆札聞者鼓舞莫不争趨於是趙著作之户外餼餽交馳願求一保如登天府飛沈出其顧指予奪定其一言至今談者莫不為笑又如去嵗上命冩金字經從禮部與翰林院官選擇字様一時奔競喧閧京師各投門下百計經營侍郎髙顯卿學士張師道至下如應奉鄧善之奏差張士開數家之門賄賂公行各出抹子分占名數不以字様定去取有計置即中程式論價買名如同商賈有不由禮部發者則就經局投門下動至數千百人禮部經局互相詆毁即此二事而觀可為風俗一慨奔競日滋氣習日下自兹以往尤恐日甚一日且編一統志前後兩見其初也監中求人而人不屑就今則人争求之而惟恐不得冩金字經前後三見其初也各省取人莫不力辭求免官府以勢迫其來次則人雖樂從猶耻於求也今則趨者如市競進争先惟恐居後是人心士習一日不如一日亦可見矣此事所闗甚非細故執風化之樞者畧不慮及何耶管子曰禮義廉耻是謂四維四維不張國乃滅亡凡此者皆不知禮義廉耻之所致也惟在上之人有以絶僥倖之門則此風自息耳夫尺寸之名求則得不求則不得人安得而不争錐刀之利趨前則有居後則無人安得而不逐俗流相因恬不知恠而能不求不趨卓然自立於名利之外者千萬中無一人也風憲之官尤為禮義廉耻之所自出往往亦可求而得之又何恠世俗之皆然耶昔人云天下有道公論在朝天下無道公論在野甚矣天下不可一日無公論也公論所在如鑒空衡平纎毫不能以容其偽雖無事於奔競可也自公論不明之後美惡妍醜畧無定價愛憎取舍一出私情人非樂於奔競也其勢不得不然耳如抄録志書描寫金字非有追章琢句之巧考古證今之難雖以愚夫下流但能繕書者皆可與選給食賞鈔足酬其勞又與之陞職減資是朝廷開天下以奔競之路也當今中外窮達之士有皓首窮經赤心報國而未獲一階半級之陞者何可勝計僅能㸃綴字畫便可以拾取朝廷之官爵豈不貽笑於天下後世耶市井之間莫不忻慕得寫者之遷擢有期又怨咎不得寫者之求幹不早而得寫者皆志高意滿不得寫者亦深自悔恨民習淳漓之判正在此日失今不救則流禍未知所終也若遽欲反其澆風易其心術夫豈一朝一夕之故且先自志書金經二事始宜將前次之已陞已注者追理前資盡行改正今次之求陞未陞者截日停革杜其妄想使天下之人明知上意之所向自然各識進退去就之宜出處行藏之正雖未能盡化天下之俗而奔競之風亦能十去其七八矣其於世教實非小補一核實虚文無實壊政尤甚漢宣帝信賞必罰綜核名實政事文學法理之士咸精其能其時猶有王成虚増户口黄覇妄指神雀議者以有名無實譏之況下此者不言可知今朝廷布政頒令出於一時漫浪之言百司不知所守百姓不以為信習為文具徒美外觀雖庶人不能以理其家況可以治天下乎且即所見而言之明詔徳行文學髙出時軰者有司保舉肅政廉訪司體覆相同以備擢用年來中外所舉不為少矣未見擢一才㧞一士豈非虚文求人乎若薦状明白必須録用如人不當任則必與保官同黜斯為用人之實也明詔政事之未便人情之未達朝廷得失軍民利害有上書陳言者皆得實封呈獻年來官庶所陳不為少矣未聞納一諌從一事豈非虚文求言乎宜選省䑓中曽歴外任文資官専一披詳擇其可取者不必議擬即見施行斯為用言之實也格例該諸縣尹以五事備者為上選三事成者為中選五事俱不舉者必黜今各官觧由之内無有不備五事者皆是滿替之後巧装飾詞私家填寫上司更不推問但辨慿無偽俸月無差便給半印依本抄連到選之日真偽無别實備五事而無力者止於常調虚稱五事而有力者則引例陞等豈非虚文考績之弊乎宜從各官所属上司考察其在任有無五事實跡另行開申付部以定陞黜斯為責效之實也國家立御史䑓立肅政廉訪司不揀甚麽勾當並令糾彈凡有取問公事諸人無得沮壊今所糾劾者僅可施之小官下吏若據要津慿城社者莫敢誰何縱令言之亦不聼之所薦舉者呈省到部俾同故紙雖有異才終不見用言既不行因以為欺而外任廵按書吏人等反有借風憲之威徇私納賄無所畏忌其為民患過於有司今䑓選中所用人物冗雜逾甚豈非虚文重䑓察之弊乎責任既専則言無可否必合信從若所言不公則嚴加誅罰斯為任風憲之實也至元新格該常事五日程中事七日程大事十日程並要限内發遣違者量事大小計日逺近随時決罰今小事動是半年大事動是數嵗婚田錢債有十年十五年不決之事訟婚則先娶者且為夫婦至兒女滿前而終無結絶訟田宅則先成交者且主業至財力俱弊而兩詞自息訟錢債則負錢者求而遷延而索欠者困於聼候況刑名之事疑獄固難立決其對詞明白者可折以片言也有司徒以人命為重牽連嵗月干犯人等大半禁死但知一已死者當重不知囚禁以至死者十倍其數尤為不輕也更無一事依程發遣而違者亦無一人依格決罰豈非虚文議獄乎若事有踰限不歸結者坐以不稱職之罪比同􅂍濫以定責罰斯為聼訟之實也詔書累降停罷勞民不急之役存恤鰥寡孤獨之人愛民之念可謂至矣孟子曰有仁心仁聞而民不被其澤者不行先王之政也古者發政施仁必先於四者非謂官司専養之也但化行政成四者不至於失所足矣今與之衣給之食賜之鈔而曰愛民之道止此是猶輿梁徒杠以濟人也且鰥寡孤獨多在村落萬山之間無持瓢乞食之所深為可憐今之𨽻名官籍者皆坊正巷長畧舉市間所知以應故事而已實為窮民無告者未嘗登籍沾恵也聞吉州有王清甫一户家富百金勢淩官府而每嵗亦請衣粮獲賞賜似此甚不少也縻費廪粟於民間實無纎毫之補豈非虚文愛民乎使上下相安家給人足則鰥寡孤獨自有所依斯為仁愛之實也國家立司農司以敦農政路縣正官銜内加以兼勸農事每嵗仲春令親行劭農重農之意可謂盡矣夫農桑之事民所恃以為命者一日不作則終嵗飢寒誰肯惰農自安以貽伊慼惟在上之人養之愛之使之無失其時自然各安生理不廢農業若使親民官吏縱其侵漁日夜呌囂雞犬不得寜焉雖家置一勸農之官何益於事如每嵗出郊勸農各官借此為逰宴之地帶行不下數十百人里正社長科斂供給有典衣舉債以應命者一畨擾民誠為不小所謂以無益害有益豈非虛文務農乎若嚴禁逰手之徒罷絶妨農之事則力耕者衆田野自闢斯為重農之實也國家倣古立翰林院集賢院秘書監太常寺可謂彬彬文物之盛矣今翰林多不識字之鄙夫集賢為羣不肖之淵藪編修檢閱皆歸於門館富兒秘監丞著太半是庸醫繆卜職奉常者誰明乎五禮六律居成均者誰通乎詩書六藝且為公家分任一日事則酬以一日俸今十日之間僅聚三日一月二十一日閒居私家虚給俸禄受若直而怠若事可乎況九日完坐又不過行故事同杯酌而已若云無事可舉不必濫此職名以示美觀也如醫學儒學蒙古學各置提舉司尤為無益於國政若此者衆不可枚舉豈非虚文設官乎無問内外衙門凡新所添設盡行沙汰舊有冗員嚴加減併則官無曠職人無廢事斯為命官之實也國家設立太史司天以明占測崇奉國師宗師以嚴祈禱可謂盡事天之誠矣今日月薄蝕則期集鼓奏以彰信推歴未嘗剋定其應驗星象失躔但托辭禳度以分受官物未嘗指稱其變故罄竭公帑以供西畨好事徒資妄僧之酒色盛陳金帛以副黄冠醮筵但充貧道之口體比來仰觀俯察災異迭興其示儆戒亦云至矣而恬無畏懼之心藐爾修禳之實豈非虚文對越乎蒼蒼在上臨鑒不逺豈具文繆敬所能感通反躬修徳則妖沴自消悔過作善而休祥自降斯為昭事上帝之實也凡此數端特其甚者其餘事務往往皆然近朝廷庶政更新整除前弊如裁減官吏分揀集賽台禁絶必里克一時號令雷厲風飛衆聼羣心為之驚聳謂徳化之成指日可待側耳數月皆已寂然無聞是朝廷虚言以戲人耳欲民之無駭不可得也凡布一政頒一令務在必行設一官分一職責以必效上無茍且之謀下無慢易之心上下一意以實相與所謂執此之政堅如金石行此之令信如四時據此之公無私如天地將何事之不可成哉一户計國家設立諸色户計最為得法古今不能易也然法乆弊生若能因弊修理使乆而不壊即是良法如軍站乃法之尤善者而弊在乎消乏且軍户雖困於供給軍期站户雖疲於造船買馬亦多是人家子弟不肖自行破蕩未可全歸咎於軍站之難當也然當站必須見鈔可無丁不可無産當軍必須親身可無産不可無丁實則丁産相資皆不可無也如站九户當一馬四户當一船消乏者雖多而興進者亦不少但騐户稅新収實數使各相糾覈有一户消乏則以他户餘剰者補之如軍有貼户同當亦有獨户當者多因單丁無人當官以致迯亡其户雖絶而遺産尚存也丁有消乏則别簽貼户􅂇之産有消乏則以迯亡遺産補之自然俱不至於消乏矣然軍站二户出力最多每嵗支持至甚生受若又令與民一體和雇和買則消乏愈甚矣今議者紛紜一則以為當差便一則以為不便殊不知南北不同似難一律北方站户多貧終嵗營生僅了應辦南方站户皆巨富有輸粮百石之家止以四石當水站其餘則安享其利靠損貧難北方軍户皆元簽有丁産大户一家親軀至四五十口限地之外餘剰亦多南方止是新附軍人間有一二出等大户乃軍官之家餘皆亡宋時無頼之徒投雇當軍歸附後籍為軍户僅有妻子而無抵業以此北站南軍再當差發直是貧不聊生北軍南站雖重復當之未為大損也如照依元簽頃畆粮石以定則額仍舊除免外有餘剰者却令與民一體當差庶南北無偏負之失繇役免重併之憂矣如金户一項所簽户計散在諸路而淘金之地聚在數場雖令各户自行淘採其實用鈔買金以辦官課耳既與之免稅免役以稅役之費為買金之資亦無損於民也在先立淘金漕運司金户不能自存革罷之後皆得稍安然猶不免金場各官頭目之擾今金有定額户有定數不必設官計户㸃名亦不必拘以正月下場十月閉場之程限但責任有司官用心提調依各處里正例立排子頭催辦依每嵗徴粮例照元額徴納則自安生計不致失所矣如匠户一項随朝所取匠人與外路當工者不同在京都者月給家口衣粮鹽菜等錢又就開鋪席買賣應役之暇自可還家工作皆是本色匠人供應本役雖無事産可也外路所簽匠户盡是貧民俱無抵業元居城市者與局院附近依靠家生尚堪存活然不多户也其散在各縣村落間者十中八九與局院相隔數十百里前迫工程後顧妻子往來奔馳實為狼狽所得衣粮又多為官司掯除随處濫設局官三員典史司吏庫子祇候人等各官吏又有老小及帶行人一局之内不下一二百人並無俸給止是捕風捉影蠶食匠户以供衣饍人匠既無寸田尺土全藉工作營生親身當役之後老㓜何所仰給如抄紙梳頭作木雜色匠人何嘗知㑹絡絲打線等事非係本色只得顧工每月顧錢之外又有支持追往之費合得口粮已准公用工作所獲不了當官計無所出必至迯亡今已十亡二三廷之數年迯亡殆盡矣今後除随朝匠户外各路局院宜悉令有司管領量設局官一員支給俸禄其餘職名盡行革去照依水馬站例於有稅户内簽取人匠除其稅徭令顧匠當工如本户自能當匠或顧匠願入局受顧者聼庶貧難下户可免顧工又得顧錢以贍其家自然人匠不至迯亡工程易以辦集凡此所言皆在民間得之目覩田野利害無因上達而朝廷清問不及下民似此弊端何由知之所宜早加整救使民得安心而奉公官不勞力而辦事於國於民兩得其便云爾績在湖南再以户計未盡底藴赴有司投進附録于此聖朝定奪諸色户計實為得法或有未盡善處非朝廷之失也不得周知民間之疾苦故耳若使知之安得不從而改之聖朝以仁慈為政何嘗一毫損民之事如水馬站户與之除粮免差粮資足以補辦祗應可抵里役如金户辦金則就推本户合納之稅如匠户當工則官支口粮以贍養之如竈户燒鹽則給以工本銀場煉鍛既給工本又與口粮計所入之課程正與買價無異朝廷不以屑較者將以優恤百姓耳寜過費於公儲不以重困於民力愛民之厚於此可見今各處廵尉司設弓手少不下三十名多者至百名各路縣獄司設禁子牧民官各衙設祇候曵刺率土皆為王民差使特分内事既免粮以優之而有司不與開除乃令稅户分任包納於合輸粮額之外别立名項曰包米考古證今所未嘗見若以别色户計推之朝廷豈獨靳此數百石之米但承流宣化者不得其人尸餐茍禄不以轉達耳若朝省知有此弊決不肯作此害民之舉也移該免之粮而加於庶姓之家何分厚薄於磚瓦而受此池魚之殃邪且弓手祇候曵刺禁子與水馬站匠金竈等户又有勞逸之相懸站有消乏金湏本色竈欲辦課匠不離局設有不及訶責踵至所准稅粮豈了供給而弓手祇候曵刺禁子等户役甚優聞無費於已又可肥家不知何名而與之免粮哉當今四方無虞盜賊潛銷廵尉之名有若虚設遇有煙火迯亡詐偽等項公事廵尉司一畨買賣弓手遍擾鄉落排門受攤指之害隳突呌囂雞犬不得寜焉閭閻吞聲無所告訴如祇候曵刺分入各官門下視同私人任以腹心公行闗節倚借氣勢騙脇吏民凡有公訟必先達於祇候而後得通於官長每日跟随到公廨侍立問事有衙畨錢就喚錢行杖錢多立名色所獲不少禁子在獄圉中則有直監錢燒紙錢好看錢逓飯錢百端需求囚人俯首聼命莫敢誰何此數者少出倍入利多害寡更得免粮誠為過矣既與免粮乃令稅户與之包納以詩禮閥閱之家而與小夫賤𨽻代輸户粮出於無辜甚抱不平如蒙垂聼將包納之米仍令各户自認輸官正供使令之末初無重難雖不免粮亦可也如或不然照各色户計依例開除庶不致偏負累及於稅家更或不然徑令包粮稅家自行應當前役雖不除粮亦所甘心此事甚易改正惜乎未有言之者惟明良採納焉一集賽古稱侍衛禁直左右前後之人今謂之集賽台以今倣古而古者為數甚多立名甚繁今之名數視古頗簡周禮天官冡宰曰膳夫曰庖人曰内饔曰外饔曰漿人曰烹人曰籩人今之博囉齊也曰幕人曰司服曰司䘮曰内宰今之舒庫爾齊也曰掌舍曰掌次今之巴喇噶齊也曰閽人今之諤徳齊也曰縫人曰屨人曰典婦功今之伊嚕勒齊也曰宫人今之珠拉齊也古者分以職役定以等差用當其人人當其任是以人無覬覦各守分義今則不然不限以員不責以職但挾重貲有梯援投門下便可報名字請粮草獲賞賜皆名曰集賽台以此紛至沓來争先競進不問賢愚不分階級不擇人品如屠沽下𨽻市井小人及商賈之流軍卒之末甚而倡優奴賤之輩皆得以渉跡宫禁又有一等流官胥吏經斷不叙無所容身則夤縁投入以圖陞轉趨者既多嵗増一嵗乆而不戢何有窮已夫集賽之名將以侍君側直禁庭也今乃出入私門效奔走於車塵馬足之下實當集賽者十無二三是各官門下之集賽非天子根前之集賽也冒奉上之名以供私家之役此為欺罔之甚者安而行之不以為意今各色集賽除近行人外其餘投入者但知集賽官排子頭為使長嵗時餽遺朝夕跟随給假還家去來厚賂所請粮草分要過半四集賽輪當三日例閒九日而三日之内未嘗執役但早晚詣各門下見面呈身而已富者財力一到便可幹必里克早得名分貧者茍焉棲身以叨竊恩賞誑上慢下莫甚於此今一人嵗支糧十石表裏叚疋雙馬草料或三年四年散鈔一百三十錠以有用之財養此無用之人實於朝廷有損無益諸王公子例皆如此進身既易為弊滋多愚臣不肖𨽻名正宫位下鄂囉齊身役三年于兹稔知其弊常竊自笑每嵗朝廷支粮給衣以養我軰何補於國哉今江北江南富家巨室夤縁而至者不計其數縱賄揮金畧不愛惜鞍馬騎從有似貴逰或以坐子為家或取樂人為妾似此之流大傷風化究其所因自韓光甫以說謊出入於托和巴之門不及半年便除杭州府判人争羡慕謂投當集賽者即可得六品管民官扇惑富豪之民妄生奔競之心皆其有以召之也近覩朝省有嚴行分揀之令私竊自喜遭遇聖朝行此善政雖被斥逐實所甘心豈謂各官頭目顧為私謀不恤大體其勢必不可行矣若去一人雖國家得省一名之虚費而各官未免失一户之供給取辦於公而歸利於私宜其百端阻當也今遽改前令停罷分揀固見聖徳之寛容然以為不當分揀則宜拒絶於聞奏之初如以為必合分揀豈宜變易於已准之後王言如絲渙號猶汗使既出而可以復反百姓觀瞻不可掩也萬世青史謂之何哉如舒庫爾齊博囉齊伊勒都齊珠拉齊實保齊伊嚕勒齊巴喇噶齊和尼齊摩哩齊等職皆君側必用之人所不可少者今後宜限以名數擇其人品又以所職貴賤髙下定其出身之例遇有名闕方許選補則人心自無過望而國家不至濫恩矣如筆且齊一項今省部䑓院諸司庶府所用椽史吏貼無非天子之筆且齊各執所役已有定員不必又贅此虚名也如齊哩克昆除蒙古人外若漢兒皆是有户百姓令就民間當差足矣普天率土盡是皇帝之齊哩克昆何為更分彼我今正宫位下齊哩克昆有總管府所管户計又有四集賽官所管身役殊不知在集賽中者乃百姓避役投充以希望粮草賞賜耳若將見在數目收作投下户計各令還家辦課通𨽻位下總管府管領既免朝廷供給之虚費又可為正宫増辦之實利也如鄂囉齊一項各庫錢帛已設庫官六員又有庫子司吏人等即是鄂囉齊之名足可任出入收支之責何須重復濫設更有皇太后位下各色集賽今已終䘮猶擁虚語循例供給費破不資稽之古典實出無名所宜盡行放散使之各務本業如准所陳行之自可免分揀之多事也每嵗國家省粮數十萬石段子數千萬疋嵗收草料三中之一足了支持而百姓亦免鹽折草之料官省其勞民受其利誠為兩得矣既有職役定員則挾貲投入者無所容力既有出身定例則必里克選不禁自無此國家無疆之休子孫萬世之利也一僧道竊自唐虞三代以來國祚延長羣生康泰不聞有釋老也三國六朝以後僧尼道士始布滿天下求福田利益者不之老則之釋人君好尚往往過之夫福非如粟帛金寳可求而取之物也上好儉則民財豐節力役則民不困養生送死無憾則四海皆躋於仁夀之域民生安樂便是好事獄訟無寃便是布施何必張浮費事繁文泥金檢玉而謁之於虚無也一僧一道之祝延不若百姓羣黎之同願一寺一觀之祈禱不若千門萬户之齊聲古諺云福從賛歎生正此謂也西方乃佛生之地佛聖人也安肯作威福以要人之敬奉佛教人以不貪不妒不傷生不害物為好事故云即心是佛也何嘗以陳玉帛嚴香燈晨夜誦經禮拜至於殺人致祭縱囚示恩而名曰做好事哉今國家財賦半入西畨紅帽禪衣者便公然出入宫禁舉朝相尚莫不傾貲以奉之此皆庸僧作此妖妄非佛之真心本性也道家以老子為宗惟在清浄無為祖師係赤松子的孫惟求辟榖棄人間事今張天師縱情姬愛廣置田莊招攬權勢淩爍官府乃江南一大豪覇也其祖風法門正不如此諸佛三清在天之靈不可誣也往往嗣法者失其初意耳愚氓俗子不知所以為佛所以為天師者云何但見赭其頭即指為佛黄其冠即指為天師雖百喙不能觧其惑其可為世道一慨朝廷特加寵異另立宣政院道教所以其棄俗出家非有司所可統攝也而乃恃寵作威賄賂公行以曲為直以是為非僧道詞訟數倍民間如奸盜殺人諸般不法之事彼皆有之矣學釋老者離嗜慾去貪嗔異乎塵俗可也而艷妻穠妾汗穢不羞奪利争名奔競無已雖俗人所不屑為甚非僧道之宜然也僧道之盛莫甚今日而僧道之弊亦莫甚今日朝廷若不稍加裁抑適所以重其他日之烈禍也能律以禮法制以分義使不至於驕奢無度敗壞宗風乃為敬奉之至矣今各寺既有講主長老各觀既有知觀提舉足任管領之責随路又濫設僧録司道録司各縣皆置僧綱威儀反為僧道之蠧所宜革去也且僧道另設衙門三代以下前所未聞亡金棄人尚鬼故立二司與民官鼎立而三豈謂巍巍聖朝不師古聖王之常法而踵殘金之弊政耶況為僧録道録者皆無頼之徒立談遭遇遽授此職便與三品正官平牒往來以白身之人一旦居此榮貴得之既易視之亦輕宜乎逞私妄作而無復顧藉也近令憲司糾刷文卷僧官跼蹐知懼而僧人皆喜得安此明騐也所欠道家猶未一體刷卷耳若僧道中有棲心寂滅息念塵寰者必不自絓憲綱雖無假官府可也若行止不檢身陷刑戮亦佛法道教之所不容宜令有司管領嚴行究治罪狀明白比之常人更加一等斷遣還俗彼亦甘心今僧道不蠶而衣不耕而食皆得全免繇稅而愚民多以財産托名詭寄或全捨入常住以求隠蔽差役驅國家之實利歸無用之空門視民間輸稅之外又當里正主首又當和顧和買非惟棄本逐末實是勞逸不均今後寺觀常住稅粮宜准古法盡令輸官俟其有佛法髙妙道行絶倫者從衆推舉然後蠲其繇役除其稅粮庻可養成清浄之風亦足激勵澆薄之俗也外有白雲宗一派尤為妖妄其初未嘗有法門止是在家念佛不茹葷不飲酒不廢耕桑不缺賦稅前宋時謂其夜聚曉散恐生不虞猶加禁絶然亦不過數家而已今皆不守戒律狼藉葷酒但假名以規避差役動至萬計均為誦經禮拜也既自别於俗人又自異於僧道朝廷不察其偽特為另立衙門今宗攝錢如鏡恣行不法甚於僧司道所亦宜革去以除國蠧以寛民力可也歴代名臣奏議卷六十七
