body:
  text: 歴代名臣奏議巻三百二十二明楊士竒等撰禦邊宋太宗時王化基權御史中丞一日侍便殿問以邉事對曰治天下猶植木焉所患根本未固固則枝榦不足憂朝廷治則邉鄙何患乎不安朝廷議城古威州遣内侍馮從順訪于工部員外郎鄭文寳文寳上言威州在清逺軍西北八十里樂山之西唐大中時靈武朱叔明収長樂州邠寜張君緒収六闗即其地也故壘未圮水甘土沃有良木薪秸之利約葫蘆臨洮二河壓明沙蕭闗兩戍東控五原北固峽口足以襟帶西涼咽喉靈武城之便然環州至伯魚伯魚抵青岡青岡拒清逺皆兩舍而清逺當羣山之口扼塞門之要芻車野宿行旅頓絶威州隔城東隅堅石盤互不可浚池城中舊乏井脉又飛烏泉去城尚千餘歩一旦縁邉警急賊引平夏勝兵三千據清逺之衝乗高守險數百人守環州甜水谷獨家原傳箭野貍十族脅從山中熟户党項孰敢不從又分千騎守磧北清逺軍之口即自環至靈七百里之地非國家所有豈威州可禦哉請先建伯魚青岡清逺三城為頓師歸重之地古人有言金城湯池非粟不能守俟二年間秦民息肩臣請建營田積粟實邉之策修五原故城專三池塩利以金帛啖党項酋豪子弟使為朝廷用不唯安朔方制豎子至扵經營安西綏復河湟此其漸也詔從其議端拱二年右拾遺直史館王禹偁上禦戎十事状奏曰臣伏以中國之病匈奴其來久矣故書云蠻夷猾夏寇賊姦宄則五帝之所不免也又詩云薄伐玁狁至于太原則三王之所為患也爰自秦漢降及隋唐擊伐通和布在方冊皆陛下之所詳覽矣臣今獨引漢之文帝時事跡以為警戒望陛下留意而覽之則天下幸甚盖以漢之十二帝言乎聖明者文景也言乎昏亂者哀平也然而文景之時單于最為强盛大肆侵掠候騎至雍火照甘泉宫哀平之時呼韓邪單于每嵗來朝委職稱臣邉烽罷警此豈繫乎歴數而不由于道徳邪臣以為不然矣且漢文景當單于强盛之時而外能任人内能修徳使不為深患者由乎徳也哀平當單于衰弱之際外無良將内無賢臣而使之來朝者繫于時也臣以為國家廣大不下漢朝陛下聖明豈減文帝契丹之强盛未及單于時至如撓亂邉土觸犯天威豈有候騎至雍而火照甘泉之患乎在陛下外任其人内修其徳矣以臣計之外任其人内修其徳之道各有五焉謹列如左外任其人有五者一曰兵勢患在不合將臣患在無權陛下固未能專委一人則請扵㳂邉要害之地為三軍以備之若有唐受降城之類如國家有兵三十萬則每軍十萬人使互相救援責以成功有功者行賞無功者明誅則契丹不能南下矣二曰伺邏邉事罷用小臣用小臣則邉情有隠而不盡知也臣伏見往來邉上者多闒茸小臣雖有愛君之心而無愛君之實恐邉疆塗炭而不盡奏邉民哀苦而不盡聞陛下誠能用老成大僚往來宣撫賜以温顔使盡情無隠則邉事濟矣三曰行間諜以離之因釁隙以取之臣風聞契丹中婦人任政荒滛不法陛下宜委邉上重募邉民諳練蕃情者間諜蕃中酋長㗖之以厚利推之以深恩蕃人好利而無義待其離心因可取也四曰以敵人攻敵人國之利也今國家西有趙保忠折御卿為國心腹陛下亦宜勅此二帥率麟府銀夏綏五州張其犄角聲言直取勝州則敵人懼而北保矣此實不用但張其勢而已五曰下哀痛之詔以感激邉民頃嵗陛下首伐燕薊盖以本是漢疆晉朝已來方入外域既四海一統誠宜取之而邉民蚩蚩不知陛下之意皆以貪其土地致敵人南牧陛下宜下哀痛之詔告諭邉民則三尺童丁皆奮臂而擊之矣然後得蕃人一級者賜之帛得外地一馬者還其價得酋帥者與之散官如此則人百其勇而士一其心也内修其徳有五者一曰併省官吏惜經費也竊以唐虞稽古建官惟百夏商官倍亦克用乂周設六官寮屬漸廣秦併六國郡縣益多食禄者日增力田者日耗降及漢魏以至隋唐員數有加職名無減清介者止餘俸料貪濁者又恣侵漁是以約人命官斯為中矣今百官之内三班之中若備論冗食且恐迂迴有煩聼覽只如臣舊知蘇州長洲縣七十餘家自錢氏納土已來聖朝命官之後七年無縣尉使主簿領之未嘗缺一事三年置縣尉主簿又存之未嘗立一功以臣詳之天下大率如是臣請黜陟庶寮併省羣吏賢者得以陳力不肖得以歸耕誠能省官三千員減俸數十萬以供邉備以寛民賦亦平敵之大計也二曰重選舉伏自陛下臨御以來崇尚儒術親至文闈志在得人未嘗求備上自文士下及腐儒大則十數年之間便居富貴小則數月之内便預官常或一行可觀一言可采寵賜之數動踰千萬不獨破十家之産抑亦起三軍之心臣亦其人因自言爾臣恐擐甲之士有使鶴之言望陛下減儒官之賜均戰士之恩矣三曰信用大臣參決機務盖以分閫外之事者在乎將帥用堂上之兵者在乎相臣宜資帷幄之謀以決安危之策方今君臣親愛宰執賢明振古而來未之有比然而限以常禮隔以朝儀情恐未通言恐不盡臣每見千官就列萬乗臨軒中書有平章之文宻院有機務之奏三司有出納之計歴階而進禮成而退為定制也臣望陛下坐朝之暇聼政之餘頻召大臣共議邉事定而後行無容小臣間厠即係單于之頸斷匈奴之臂必有人矣四曰不貴虚名戒無益也臣以為聖人無名神人無功跡用不彰品物自化道徳既䘮功名始生五帝之時猶能不伐三代而下多有自矜動干戈則重困生靈得土地則空標史冊禍敗之本何莫由斯方今萬國駿奔四方康樂聖徳被矣神功著矣唯兹北敵未服中原以臣思之恐是宗廟之靈天地之意慮陛下驕于大寳怠于安民用廣聖謨以為警戒陛下誠宜作備邉之計示憂民之心不必輕用雄師深入敵境竭蒼生之衆力矜青史之虚名如此則天道順人心悦年嵗之間可緩而圖也五曰禁止㳺手厚民力也夫牧民者君也聚人者財也産財用者土地也闢土地者人民也民衆則土地闢土地闢則財用足財用足則國家安矣方今雖務農桑尚多涼薄耕織者鮮矣衣食者衆矣加以飛芻輓粟之勞妨鑿井耕田之力若無條禁曷禦凶荒臣請陛下先問户部則輸税之家可見矣又問吏部則食禄之人可知矣又問兵部則軍人受食者可數矣又問祠部則僧道蠧人者可明矣復有臺寺之小吏府監之雜工總其數而計之聚其人而校之臣恐以三分勤耕苦織之人贍七分坐衣待食之軰欲望民㤗不亦難乎況今郡縣雖多要荒且逺河北備邉之民力可用者唯東至登萊西至秦鳳南抵淮西而已此數十州者乃中土之根本不可不惜也望陛下少度僧尼少崇寺觀勸其風俗務于田農則人力彊而邉民實也若輦運勞扵外㳺惰耗扵内人力日削邉用日多不幸有水旱之災則寇不獨在外而在乎内也惟陛下熟計之是年朝廷将討幽薊詔羣臣各言邉事吏部尚書宋琪上疏謂大舉精甲以事討除靈旗所指燕城必降但徑路所趨不無險易必若取雄霸路直進未免更有陽城之圍盖界河之北陂淀坦平北路行師非我所便況軍行不離扵輜重敵來莫測其淺深欲望回轅西適山路令大軍㑹扵易州循孤山之北淶水以西挾山而行援糧而進渉涿水並大房抵桑乾河出安祖砦則東瞰燕城裁及一舍此是周徳威収燕之路自易水距此二百餘里並是沿山村墅連延溪澗相接採薪汲水我占上㳺東則林麓平岡非戎馬奔衝之地内排槍弩歩隊實王師備禦之方而扵山上列白幟以望之戎馬之來二十里外可悉數也從安祖砦西北有盧師神祠是桑乾出山之口東及幽州四十餘里趙徳鈞作鎮之時欲遏西衝曾塹此水況河次半有崖岸不可徑度其平處築城䕶之守以偏師此斷彼之右臂也仍慮布希為寇可分雄勇兵士三五千人至青白軍以來山中防遏此是新州媯川之間南出易州大路其桑乾河水属燕城北隅繞西壁而轉大軍如至城下扵燕丹陵東北横堰此水灌入高梁河高梁岸狹桑水必溢可扵駐蹕寺東引入郊亭淀三五日瀰漫百餘里即幽州隔在水南王師可扵州北繫浮梁以通北路敵騎來援已隔水矣視此孤壘浹旬必克幽州管内洎山後八軍聞薊門不守必盡歸降盖勢使然也然後國家命重臣以鎮之敷恩澤以懐之奚霫部落當劉仁恭及其男守光之時皆刺面為義兒服燕軍指使人馬疆土少劣扵契丹自被脅從役属以來常懐骨髓之恨渤海兵馬土地盛扵奚帳雖勉事契丹俱懐殺主破國之怨其薊門洎山後雲朔等州沙陁吐渾元是割属咸非叛黨此蕃漢諸部之衆如将來王師討伐雖臨陣擒獲必貸其死命署置存撫使之懐恩但以罪契丹為名如此則蕃部之心願報私憾契丹偏地尅日殄平其奚霫渤海之國各選重望親嫡冊封為王仍賜弓器鼓旗車服戈甲以優遣之必竭赤心永服皇化俟克平之後宣布守臣令扵燕境及山後雲朔諸州厚給衣糧料錢别作禁軍名額召募三五萬人教以騎射𨽻於本州此人生長塞垣諳練戎事乗機戰闘一以當十兼得奚霫渤海以為外臣乃守在四夷也然自按巴堅時至扵近日河朔户口虜掠極多並在錦帳平盧亦邇栁城遼海編户數十萬耕墾千餘里既平邉鄙悉為王民拯其飢溺被以聲教願歸者俾復舊貫懐安者因而撫之申畫郊圻列為州縣則前代所建松漠饒落等郡未為開拓之盛也俄又奏曰國家将平幽薊臣敢陳十策一契丹種族二料賊衆寡三賊來布置四備邉五命将六排陣討伐七和蕃八饋運九収幽州十滅契丹契丹蕃部之别種代居遼澤中南界潢水西距邢山疆土幅員千里而近其主自按巴堅始彊盛因攻渤海死扵遼陽妻述律氏生三男長曰東丹次曰徳光徳光南侵還死扵殺虎林季曰自在太子東丹生永康永康代徳光為主謀起軍南侵被殺扵大神淀徳光之子述律代立號為睿王二年為永康子明吉所簒明吉死㓜主代立明吉妻蕭氏蕃将守興之女今㓜主蕭氏所生也晉末契丹主頭下兵謂之大帳有皮室兵約三萬皆精甲也為其爪牙國母述律氏頭下謂之舒紳舒紳有衆二萬乃按巴堅之牙将當是時半已老矣南來時量分借得三五千騎述律常留餘兵為部族根本其諸大首領有太子偉王永康南北王裕悦滿達烏延等裕悦謂其國舅也大者千餘騎次者數百騎皆私甲也别族則有奚霫勝兵亦萬餘人少馬多布希其王名阿布達者昔年犯闕時令送劉琋崔廷勲屯河洛者也又有渤海首領大舍利噶瑪哈歩騎萬餘人其鎧甲車仗竊為契丹之飾復有近界伊竒里室韋女真党項亦被脅属每部不過千餘騎其三部落吐渾沙陁洎幽州管内鴈門已北十餘州軍部落漢兵合二萬餘衆此是石晉割以賂蕃之地也蕃漢諸族其數可見矣每蕃部南侵其衆不啻十萬契丹入界之時歩騎車帳不從阡陌東西一槩而行大帳前及東西面差大首領三人各率萬騎支散逰奕百十里外亦交相偵邏謂之欄子馬契丹王吹角為號衆即頓舍環繞穹廬以近及逺折木梢屈之為弓子鋪不設槍營塹柵之備每軍行聼鼓三伐不問昏晝一匝便行未逢大敵不乗戰馬俟近我師即競乗之所以新羈戰蹄有餘力也且用軍之術成列而不戰俟退而乗之多伏兵斷糧道冐夜舉火上風曵柴饋餉自齎退敗無耻散而復聚寒而益堅此其所長也中原所長秋夏霖􅍂天時也山林河津地利也槍突劒弩兵勝也財豐士衆力强也乗時互用較然可知王師備邉破敵之計每秋冬時河朔州軍縁邉砦柵但專守境勿輙侵漁令彼尋戈其詞無措或戎馬既肥長驅入寇契丹主行部落萃至寒雲翳日朔雪迷空鞍馬相持北軍之利所宜守陴坐甲以逸待勞令騎士並屯扵天雄軍貝磁相州以來若分在邉城緩急難扵會合近邉州府只用歩兵多屯弩手大者萬卒小者千人堅壁固守勿令出戰彼以全國之兵此以一郡之衆雖勇懦之有殊慮衆寡之不敵也國家别命大将總統前軍以遏侵軼只扵天雄軍邢洺貝州以來設犄戎之備俟其陽春啟候敵計既窮新草未生陳荄已朽蕃馬無力疲寇思歸逼而逐之必自奔北前軍行陣之法馬歩精卒不過十萬自招討以下更命三五人藩侯充都監副戎排陣先鋒等職臨事分布所貴有權追戎之陣須列前後其前陣萬五千騎陣身萬人是四十指揮左右梢各十指揮是二十将每指揮作一隊自軍主都虞侯指揮使押當每隊用馬突或刃子槍一百餘並弓劔骨朶其陣身解鐙排之俟與戎相搏之時無問厚薄十分作氣槍突交衝馳逐往來後陣更進彼若乗我深入陣身之後更有馬歩人五千分為十頭以撞竿鐙弩俱進為囘騎之舍陣梢不可輕動盖防横騎奔衝此陣以都監主之進退賞罰便可裁決後陣以馬歩軍八萬招討董之與前陣不得過三五里展梢實心布常山之勢左右排陣分押之或前陣擊破寇兵後陣亦禁其馳驟輕進盖師正之律也牧誓云四伐五伐乃止齊焉慎重之戒也是以開運中晋軍犄戎未嘗放散三四年間雖徳光為戎首多計桀黠而無勝晉軍之處盖併力禦之厥後以任人不當為彦澤之所誤如将來殺獲驅攘之後聖人務好生之徳設息兵之謀雖降志難甘亦和戎為便魏絳嘗陳五利奉春僅得中策歴觀載籍前王皆然易稱高宗用伐鬼方詩美宣王薄伐玁狁是知戎狄侵軼其來尚矣然則兵為凶器聖人不得已而用之若精選使臣不辱君命通盟繼好弭戰息民此亦策之得也臣每見國朝發兵未至屯戍之所已扵兩河諸郡調民運糧逺近騷然煩費十倍臣生居邉土習知其事況幽州為國北門押蕃重鎮養兵數萬應敵乃其常事每逢調發惟作糗糧之備入蕃浹旬軍糧自齎每人給麨斗餘盛之扵嚢以自隨得馬每匹給生榖二斗作口袋飼秣日以二升為限旬日之間人馬俱無飢色更以牙官子弟戮力津擎裹送則一月之糧不煩饋運俟大軍既至定議取捨然後圖轉饟亦未為晚淳化五年琪又上書言邉事曰臣頃任延州節度判官經渉五年雖未嘗躬造夷落然常令蕃落将和斷公事嵗無虚月蕃部之事熟扵聞聽大約党項吐蕃風俗相類其帳族有生户熟户接連漢界入州城者謂之熟户居深山僻逺横過寇畧者謂之生户其俗多有世讐不相來往遇有戰闘則同惡相濟傳箭相率其從如流雖各有鞍甲而無魁首統攝並皆散漫山川居常不以為患党項界東自河西銀夏西至靈塩南距鄜延北連豐會厥土多荒隙是前漢呼韓邪所處河南之地幅員千里從銀夏至青白兩池地惟沙磧俗謂平夏拓㧞盖蕃姓也自鄜延以北多土山栢林謂之南山野利盖羌族之號也從延州入平夏有三路一東北自豐林縣葦子驛至延川縣接綏州入夏州界一正北從金明縣入蕃界至盧闗四五百里方入平夏州南界一西北歴萬安鎮經永安城出洪門至宥州四五百里是夏州西境我師如入夏州之境宜先招致接界熟户使為鄉導其强壮有馬者令去官軍三五十里踏白先行縁此三路土山柏林溪谷相接而復隘陿不得成列躡此鄉導可使歩卒多持弓弩槍鋸隨之以三二千人登山偵邏俟見坦塗寜静可傳號勾馬遵路而行我皆嚴備保無虞也長興四年夏州李仁福死有男彛超擅稱留後當時詔延州安從進與李彛超換鎮彛超據夏州固不奉詔朝廷命邠州藥彦稠總兵五萬送從進赴任時頓兵城下議欲攻取軍儲不繼遽命班師而振旅之時不能嚴整失戈棄甲遂為邉人之利臣又聞党項號為小蕃非是勍敵若得出山布陣止勞一戰便可盪除深入則饋運艱難窮追則道路幽隠莫若縁邉州鎮分屯重兵俟其入界侵漁方可隨時掩擊非惟養勇亦足安邉凡烏合之徒勢不能久利扵速闘以騁兵鋒莫若持重守疆以挫其鋭彼無城守衆乏餱糧威賞不行部族分散然後宻令覘其保聚之處預扵麟府鄜延寜慶靈武等州約期㑹兵四面齊進絶其奔走之路合勢擊之可以剪除無噍類矣仍先告諭諸軍擊賊所獲生口資畜許為已有彼為利誘則人百其勇也靈武路自通逺軍入青岡峽五百里皆蕃部熟户向來人使商旅經由並在部族安泊所求賂遺無幾謂之打當亦如漢界逆旅之家宿食之直也此時大軍或須入其境則鄉導踏白當如夏州之法況彼靈州便是吾土芻粟儲畜率皆有備縁路五七程不煩供饋止令逐都兵騎裹糧輕齎便可足用諺所謂磨䥥殺馬竭一時之力也旬浹之餘固無闕乏矣又臣曾受任西川數年經歴江山備見形勢要害利州最是咽喉之地西過桔栢江去劒門百里東南去閬州水陸二百餘里西北通白水清川是龍州入川大路鄧艾扵此破蜀至今廟貌存焉其外三泉西縣興鳳等州並為要衝請選有武畧重臣鎮守之奏入上宻寫其奏令繼隆擇利而行端拱二年知制誥田錫答詔論邉事上奏曰臣伏覩今月十一日御札宣示内外文武臣寮以北鄙多虞戎人為患延佇良策降諭徳音詢禦侮之嘉謀問安邉之逺畧俾悉陳扵異見将擇用其所言臣之顓愚豈足上副宸㫖臣之狂直敢不罄盡鄙懐倘敭納可裨扵事宜則明聖不罪扵狂瞽臣每讀史傳詳觀古來戎狄騷邉乃是常事朝廷設備自有常規舉其大畧而言之不過訓練師徒選擇将帥廣蓄儲備多置屯田嚴其池城明扵斥候謹扵烽火利其甲兵行間諜以離狄心禁侵擾以怠敵意待彼羸弱因勢取之候其賔服以徳綏之此皆方冊備陳采擇可用也捨此則未見禦戎之術用此在臨事之宜兵機則不可定謀邉議則須依古制今具條奏惟陛下擇而行之一今之禦戎無先扵選将帥既得将帥請委任責成不必降之以陣圖不須授之以方畧自然因機設變觀釁制宜以此無不成功以是無不破敵昔漢之西羌犯塞攻城邑殺長吏趙充國年七十矣上使邴吉問曰誰可為将充國對曰無踰老臣以是言之則請令宰臣已下各舉堪為将帥者又令宿舊武臣素有問望者亦令自舉然後陛下詳擇而用之又趙充國既為将宣帝遣問曰将軍度敵勢如何當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方畧然羌戎逆天背叛滅亡不久願陛下以属老臣勿以為憂以是言之昔充國為老将尚謂百聞不如一見況今委任将帥而每事欲從中降詔授以方畧或賜與陣圖依從則有未合宜專斷則是違上㫖以此制勝未見其長伏乞速命宰臣令舉良将及令素有問望宿舊武臣自舉其能及舉所知者也一将帥行恩信䘏士卒必豐財貨方得士心昔趙奢為将所得王之賞賜盡與軍吏又李牧為将軍市之租皆用享士卒魏尚守雲中其軍市租盡以給士卒出私養錢享賔客軍吏是以匈奴不近雲中之塞今國家所命将帥雖古今異宜凡有給賜今則誰敢效古散家財賞士卒去吝嗇有幾何人哉若以年年供億輓運老師費財曷若厚給将帥使之賞用也又聞近侯伯亦有㕔直三五十人習騎射為心腹每出入陣敵得以廳直隨身翼衛主帥後來不敢養置昨來楊業䧟陣訪聞亦是無自已腹心從人䕶助捍禦以致為狄之所獲今雖時異事殊然廢置利害亦繫詢訪行之一今之禦戎以㳂邉諸郡有勇智者命為刺史委之自用方畧警急利便事訖方奏使人人各盡其才術此必為陛下各立殊勲控制侵侮昔後漢郭伋為漁陽太守時匈奴數抄郡界邉境苦之伋乃整飭士馬設攻守之畧匈奴畏憚不敢入塞人得安業在職五嵗户口增倍又張堪為騎都尉破匈奴扵高栁拜漁陽太守捕繫姦猾賞罰必信人皆樂為用匈奴以萬騎入漁陽堪乃率數千騎奔擊大破之郡界以静乃扵狐奴開稻八千餘頃勸人耕種以致豐富百姓歌之視事八年匈奴不敢犯塞以此言之則㳂邉諸郡請令擇有智勇者為刺史必副陛下之憂寄也一今之禦戎更在悦取軍情凡經揀退尚堪力役者却與元本料錢其殁陣及守戍死亡兵士所有在營老㓜宜矜憫優恤或給賜令各存活勿使寒飢無所歸向又不可取充洒掃裁縫之𨽻其次揀中新招到軍雖稍有身手人材未宜便令管轄舊人須是經歴行陣稍知軍伍次第微有勞效者方令充節員所貴已下亦各甘心兼易為驅使若曾有功勞未得優賞者即乞别作名目優異酬賞臣未知朝廷府庫錢帛之大數亦不知國家支費用度之衆寡若陛下省罷塔廟之費耗廻充軍旅之賞給則孰不革其怨心孰不致其死力若使破敵必副陛下平戎之心也一今之禦戎亦宜别設條例等第立賞若得一堡壘或復一障亭與某官與若干賞賞不踰時必誠必信條例不煩令軍中曉會此必有果敢智謀之士副陛下之立賞也一今之禦戎又宜以重賞召募敢死之士仍以古來選士之科以取士卒亦扵軍中擇取應得選士之條目令舉其六七更可詳酌增損且據兵書言之取曾習韜鈴者有謀畫者又取能知敵情偽者取能知山川險易逕路迂直者取强力過人能斬將搴旗者又取往復數百里不及暮至者又取能破格舒鈎或負數百斤行五十歩者又取趫㨗若飛能踰塹壘出入無形善窺覘者各區别技能置立部分以副将帥之指使也一今之禦戎外則委任将帥内則詢謀宰臣行一事必使宰臣知之出一詔必令宰臣議之臣聞前年出師向北命曹彬以下欲取幽州是侯利用賀令圖之軰悞惑聖聰陳謀畫策而宰臣昉等不知又去年招置義軍刺配軍分宰相普等亦不知之豈有議邉陲發師旅而宰相不與聞若宰相非才何不罷免宰相可任何不詢謀今宰相普三入中書再出藩鎮重望碩徳元老大臣人所具瞻事無不歴乞陛下以軍旅之事機宻之謀悉與籌量盡其規畫此乃國體君父至公臣聞偏信生奸獨任成亂侯利用賀令圖等既悞陛下機宜扵前無令似侯利用賀令圖者復悞陛下機宜扵後伏乞陛下一一與宰臣謀議事事與宰相商量悔目前獨斷之明詳今後公共之理則事無不允當下無不盡忠則大臣之間足以副陛下憂勤之㫖也一今之禦戎在乎辨邉上奏報之虚實察左右䝉蔽之有無奏失利則未必盡言報大㨗則不足深信陛下未當信而先信陛下本欲知而未知如此何以料安危如此何以策成敗安危成敗之理乞陛下詳而察之一今之禦戎無先用諜兵書曰事莫宻扵間賞莫重扵間狄中自有諸國未審陛下曽採得凡有幾國否幾國與匈奴為讐若悉知之可以用重賞行間諜間諜若行則敵人自亂敵人自亂則邉鄙自寜昔李靖用間破突厥心腹之人自離貳也書在唐史其事可知宜募能往絶域闘亂蕃部使交相侵害如漢之陳湯傅介子之流則不勞師徒自然歸化此可以緩陛下憂邉之心也其餘謹烽火明斥候亦可以依古法為警備趙充國傳曰五星出東方中國大利蠻夷大敗太白出高用兵深入敢戰者吉雖天道逺而難知然昭昭垂象緯者為陛下言兵之利害也一今之禦戎凡召發兵士或儲糧草亦宜謹静勿使喧煩臣竊聞去年扵户税上折科馬草及官中和買當買納未足之間即有使臣催督貧下户婦女有行科校者又聞汴河乾淺遂分南河水添注汴河以待漕運國家計度何在而臨時一至扵此輦轂之下豈無外國諜人臣即不知國家見在軍儲支得幾年若是無九年之糧實為無備若是無三年之糧實為窘急若不窘急則何以科校婦女而納草添注河水而待漕運也一今國家富有天下精卒利兵計有百萬然無将帥為陛下治兵昔吳起為将為士卒吮癰霍去病為将漢帝欲為治第去病曰匈奴未滅豈以家為竇嬰為将得所賜金千斤陳扵廡下軍吏過者則量取為用未喻陛下以今之将帥如吴起霍去病否若以臣所見即将帥必無其人何以知之将帥肯與士卒吮癰乎若賜第宅肯不要乎将帥非材即無威名何以使匈奴望風而懼今有居顯位食厚禄為國之謀即不足奉身之謀即有餘何以副陛下致太平之心何以致陛下成清静之理然以臣所見凡小小公事不勞陛下一一用心若以社稷之大計為子孫之逺圖則在乎舉大畧求将相帝王之大體也設如人欲理身先理心心無邪則身自正欲理外先理内内既理則外自安臣謂邉上動由朝廷動之邉上静由朝廷静之任賢相扵内則百職舉而紀綱振委良将扵外則四夷服而邉鄙安臣之愚𠂻備扵此矣已然之患既陛下徧訪直言未然之虞乞陛下常切留意一已上條奏悉是國家已然之事所以勞陛下謀及卿士詢于芻蕘凡百臣寮悉陳所見然臣謂國家復有未然之事得不為陛下言之得不為陛下憂之今戎主一姥而已用姦人為謀主頗有輕中國之志今春夏必漸退秋冬必復來制之禦之惟在前所籌數事而巳若使狄人禦之而不去邉境備之而未寜加以匈奴間諜扵西蕃漢家未斷其右臂即秦隴千里之外𤓰沙玉闗之西恐非國家之所有萬一兵歉相仍寇盜多起此時何以謀之此時何以禦之聖人不能不灾而能禦灾今陛下聖徳合天二邉無虞萬里晏然居安思危之計得不由未然之事而豫防之此亦禦戎之逺意也右臣備位掖垣忝司誥命祗奉睿㫖俾陳方畧昧扵時事思慮不精然扵狂愚庶或可采端拱中契丹擾邉節度副使何承矩上疏曰臣㓜侍先臣闗南征行熟知北邉道路川源之勢若扵順安砦西開易河蒲口導水東注扵海東西三百餘里南北五七十里資其陂澤築隄貯水為屯田可以遏敵騎之奔軼俟朞嵗間闗南諸泊悉壅闐即播為稻田其縁邉州軍臨塘水者止留城守軍士不煩發兵廣戍収地利以實邉設險固以防塞春夏課農秋冬習武休息民力以助國經如此數年将見彼弱我强彼勞我逸此禦邉之要策也其順安軍以西抵西山百里許無水田處亦望選兵戍之簡其精鋭去其冗繆夫兵不患寡患驕慢而不精将不患怯患偏見而無謀若兵精将賢則四境可以高枕而無憂太宗嘉納之真宗即位李宗諤拜起居舍人從幸大名上疏曰國家馭邉之術制勝之謀将帥之短長兵衛之衆寡宸算廟謨盡在吾術中矣今之言事者不過請陛下益兵貯糧分道掩殺言之甚易行之則難始受命則無不以攻堅䧟陣為壮圖及遇敵則惟以閉壘塞闗為上計孤君父之重委致生靈之重困興言及此誠可歎息自古行軍出師無不首擇将帥夫将帥隨材任使守一郡控一城分領驍勇争據要害又豈直二路主帥之名然後能制六師生死之命乎今陛下選任非不至也權位非不重也告戒非不丁寜也處置非不專一也而外敵犯塞車駕親征曾不聞出丁人一騎為之救助不知深溝高壘秣馬厲兵欲安用哉臣以為臨軍易帥㧞卒為将在此時也有功者㧞扵朝不用者戮扵市亦在此時也惟陛下圖之然後下哀痛之詔行蠲復之恩回鑾上都垂衣當宁豈不盛哉咸平元年京西轉運副使朱台符上言曰臣聞蠻夷猾夏帝典所載商周而下數為邉害或振旅薄伐或和親脩好歴代經營斯為良策至扵秦築長城而黔首叛漢絶大漠而海内虚逞志一時貽笑萬代此殷鑒不逺也頃者晉氏失御中原亂離太祖深鑒往古酌取中道與民休息遣使往來二十年間罕聞入寇汰省戍邉之卒不興出塞之兵闗防謐寜府庫充溢信深得制禦之道也幽薊之地實維我疆尚隔混同所宜開拓太宗平晉之後因其兵勢将遂取之人雖協謀天未厭亂螗斧拒轍用稽靈誅重興弔伐之師又作遷延之役自兹厥後大肆兇鋒殺掠軍民攻㧞城砦長驅深入莫可禁止當是時也以河為塞而趙魏之間幾非國家所有既阻歡盟乃為備禦屯士馬益将帥芻粟之飛輓金帛之委輸贍給賞賜不可勝數繇是國家之食貨匱扵河朔矣陛下自天受命與物更始繼遷授節黎桓加爵咸命使者鎮撫其邦惟彼契丹未加渥澤非所以柔逺能邇昭王道之無偏也今祥禫将終中外引頸觀聽徳音臣愚以為宜扵此時赦契丹罪擇文武才畧習知邉境辯説之士為一介使以嗣位服除脩好隣國往告諭之彼十年以來不復犯塞以臣計之力有不足志欲歸嚮而未得其間也今若垂天覆之仁假來王之便必懽悦慕義遣使朝貢因與之盡捐前惡復尋舊盟利扵貨財許以闗市如太祖故事使之懐恩畏威則兩國既和無北顧之憂可以專力西鄙繼遷自當革心而束手矣是一舉而兩得也二年度支判官梁顥扈蹕大名詔訪羣臣邉事顥上疏曰臣聞自古用兵之道在乎明賞罰而已然而賞不可以獨任罰不可以少失故兵法曰罰之不行譬如驕子之不可用又曰善為将者威振敵國令行三軍盡忠益時者雖讐必賞犯法敗事者雖親必罰故孫武斬隊長而兵皆整穰苴斬監軍而敵遂退以此言之兵法不可不正也昨者命将出師乗秋備塞而傅潜奉明詔握重兵逗撓無謀守陴翫寇老精兵扵不用以至蕃馬南牧邉塵晝驚河朔之民流移失所魏博以北蹂踐一空遂致殘妖未殄鑾輅親征此所謂以賊遺君父者也乃或赦而不問則何以謝横死之民或黜而不戮則何以恢用兵之畧以軍法論之固合斬潜以徇軍中降詔以示天下如此則協前古之典章戒後來之将帥然后擇邉臣之可用者就委用之臣嘗讀漢史李廣之屯兵行師也無部伍行陣就善水草人人自便不擊刁斗以自衛逺扵斥候未嘗遇害而廣終為名将士卒樂用又唐高祖之備北邉也選勁兵為㳺騎不齎軍糧隨逐水草遇敵則殺當時以為得策願扵邉将中不以名位高卑但擇其武勇謀畧素為衆所推服者取十人焉人付騎士五千器甲完備輕齎糧糗逐水草以為利往復扞禦不令入郡邑不許聚處遇有寇兵隨時掩捕仍令烽候相望交相救應縁邉州郡守城兵帥即堅壁以待之遇㳺騎近城掩殺邉寇内量出兵甲援救如此則乘城者不堅閉壘門免坐觀扵勝負捍邉者不茍依郡郭可行備扵寇攘雖匪良籌且殊膠柱時論頗稱之右司諫孫何論禦戎畫一利害上奏曰臣聞禦戎之道選将為難将求邉鄙之乂寜必假英雄而鎮撫居其位不可一日無其寵得其人不可一日無其權責成之効既多錫命之儀須重謹按史記漢高祖将定三秦擇良日齋戒設壇場拜韓信為大将軍部管諸将魏故事遣将出征符節即授節鉞跪而推轂北齊命将出征則太卜諸廟灼龜授旗鼔扵廟皇帝陳法駕服袞冕拜扵太廟徧告訖降就中階引上将操鉞授柄将軍既執斧鉞對曰國不可從外治軍不可從中制臣即授令有鼓旗斧鉞之命而無一言之命扵臣帝曰茍利社稷将軍以之将軍就載斧鉞而出皇帝推轂度門曰從此已外将軍制之也今國提封萬里臣妾四夷唯此契丹獨迷聲教暴犯我疆理殺傷我士民以陛下英武天資睿謀神授可以斷匈奴之右臂焚老上之龍庭而無戰之師或聞挫衂乆安之地亦被憑陵者良由将帥或非其人委任未能盡善監制之臣寮稍衆倚毗之恩禮猶輕所頼陛下親御六師按廵河朔盡逐異方之衆方安黎庶之心臣伏見駐泊行營都部管即古之将軍大總管之任也授任赴鎮之際錫賜甚厚公使稍優之外縱握十萬之師但授尺一之詔前所謂築壇告廟之禮皆闕而未建良可惜也又都部管副部管之任多是将領乆經勞苦攀附鱗翼特沐寵光或決裂以無謀或遷延而玩寇所以動煩聖算鮮有成功謹按太公六韜有妻子之将有十人之将百人之将千人之将萬人之将百萬人之将則風彩名聲器度權變亦不可不察之察之亦不可不精也伏乞扵中外文武臣寮中以将将之術采赫赫之名取其文武相資智勇兼備者盛其禮重其權使受命之初可以聳動人聼出疆之日可以震懾邊庭先是監陣先鋒之類本用中官内使者減去其半皆以偏将為之庶其各禀指蹤無憂掣肘果用此道則四塞可以高枕萬里如有長城矣設若探刺邉情宣傳機事必藉使者以寜衆心則乞扵親信臣寮中選如有所聞亦乞閱其實事然後指揮一臣聞外域之為患中國也久矣周曰獫狁漢曰匈奴晉有劉石周有蠕蠕隋有突厥唐有吐蕃皆伺隙窺邉乗間犯塞勇悍好鬥殺掠吏民馳騁無厭吞噬亭障前代憤其如此亦嘗按劒憑怒命将出征或十萬以横行或五千而深入而四夷之衆部落殷繁道里遼濶或聚守其險要之地或散屯於平坦之鄉有利即来無得而去中國奪其地不足耕墾獲其人不足訓齊徒勞師而費財終有損而無益故宣王之詩曰薄伐獫狁至于太原盖譬乎鄰室之人亦相與比户而已不與角乎勝負螻蟻計其短長唯始皇孝武秣馬厲兵長驅萬里雖南牧暫息而中國蕭然故嚴尤以為漢得下策周得中策秦無策焉與夫保境庇民訓兵練将來則勿縱去即勿追固不可同年而語矣且契丹者塞外小蕃軍威匪盛料其土地計其人民固不敵中原之數郡多行不義公肆無厭惡既貫盈天當譴責但㳂邉将吏等亦有設竒沽譽恃勇貪功遇彼射鵰便稱萬衆逢其飲馬即舉邉烽間隙一生干戈不已及逢大敵又怯先登或堅壁以自安或死戰而無益兵連禍結何莫由斯伏乞嚴誡邉防俾謹疆界運權謀而制勝嚴斥堠以防奸彼将動則必知此有謀而皆秘若邊疆之侵軼必在驅除如将帥之張皇亦宜禁戢昔羊祜之鎮襄漢李牧之守鴈門破敵建功皆此術也惟陛下不以臣愚而用其言則邉民幸甚一臣聞唐堯建國有此冀方亷頗帥師思用趙卒盖土風雄毅民性剛方静足以控壓四方動可以驅除七狄故杜牧有言曰河北視天下猶珠璣也天下視河北猶四支也當六雄之角立則大魏為擾洎三鎮之横行則常山最盛豈不以慣聞金鼔狃習干戈不憚轉餉之勤不怨征戰之死國家㳟行天討屢出王師雖睿算所加舉無遺策靈旗所指告厥成功然摧鋒䧟堅之人斬将搴旗之士不居貝冀必出邢洺與夫河南之人主客既已不同勇怯又甚遼絶伏惟陛下去冬已來講求軍政詳究武經惻隠憂虞形扵詔㫖憫疲民之轉粟蠲彼賦税念猛士以守方優其月給凡是廳直静塞雲翼驍㨗之類皆降宣㫖升為禁軍甚叶機宜頗聞效用但或聞㳂邉屯駐駐泊兵士等尚多河南之人亦有江浙西川廣南等揀到軍伍臣恐土宜既異習俗不同緩急之間誤累邉事況㝢縣之地至廣鎮守之處亦多何必强其不能違其本性欲乞特降宣命應是河南及江南兩浙西川廣南軍人並不令邉上駐泊屯駐却支分扵别處防遏一則使趙魏之士固彼疆場一則免吳蜀之人彰其畏懦闘志既皆齊一軍聲亦皆雄豪臣愚以為斯事亦防秋備寇之大端惟陛下采而行之孫何從幸大名詔訪邉事何上疏曰陛下嗣位以來訓師擇将可謂至多以高祖之大度兼蕭王之赤心神武冠扵百王精兵倍扵前代分閫仗鉞者固當以身先士卒為心賊遺君父為耻而列城相望堅壁自全手握强兵坐違成算遂使敵人得計戎馬肆行焚刼我郡縣係累我黎庶陛下攄人神之憤怒憫河朔之生靈爰御六師親幸澶魏天聲一振敵騎四逃雖鎮定道路已通而徳棣烽塵未息此殆将帥或未得人邉奏或有壅閼隣境不相救援糗糧須俟轉輸之所致也将帥者何或恃勇無謀或忌功玩寇但全城堡不恤人民邉奏者何護塞之臣固禄守位城池焚刼不以實聞老㓜殺傷託言他盜不救援者何縁邉州縣城壘參錯如輔車脣齒之相依若頭目手足之相衛託稱兵少不出或待奏可乃行俟轉輸者何敵騎往還迅馳疾逝贏糧景從萬兩方行迨乎我來寇已遁去此四者當今急務擇将帥則莫若文武之内參用謀臣防壅閼則莫若凡奏邉防陛見庭問合救援則莫若督以軍令聽其便宜運糗糧則莫若輕齎疾馳角彼趫㨗今大駕既駐鄴下契丹終不敢萌心南牧所慮薦食者惟東北無備之城繕完周防不可不慎且敵軍勇悍不厭金革今契丹西畏大兵北無歸路勢窮則勇銳不可輕餘敵尚或稽誅奔突亦宜預備大河津濟處處有之亦望量屯禁兵扼其要害則請和之使不日可待真宗覽而嘉之契丹南侵屢遣内侍以宻詔問禦遏之計宻封以獻嘗詔聽邉民越拒馬河塞北市馬何承矩上言曰縁邉戰櫂司自淘河至泥沽海口屈曲九百餘里此天險也太宗置砦二十六鋪百二十五廷臣十一人戍卒三千餘部舟百艘往來廵警以屏姦詐則緩急之備大為要害今聽公私貿市則人馬交度深非便宜且砦鋪皆為虚設矣疏奏即停前詔三年承矩知雄州又上言曰契丹輕而不整貪而無親勝不相讓敗不相救以馳騁為容儀以戈獵為耕釣櫛風沐雨不以為勞露宿草行不以為苦復恃騎戰之利故頻年犯塞臣聞兵有三陣日月風雲天陣也山陵水泉地陣也兵車士卒人陣也今用地陣而設險以水泉而作固建設陂塘綿亘滄海縱有敵騎安能折衝昨者契丹犯邉高陽一路東負海西抵順安士庶安居即屯田之利也今順安西至西山地雖數軍路纔百里縱有邱陵岡阜亦多川瀆泉源因而廣之制為塘埭自可息邉患矣今縁邉守将多非其才不説詩書不習禮樂不守疆界制御無方動誤國家雖提貔虎之師莫遏鸛鵞之衆臣按兵法凡用兵之道校之以計而索其情謂将孰有能天地孰得法令孰行兵衆孰强士卒孰練賞罰孰明此料敵制勝之道也知此而用戰則必勝否則必敗夫惟無慮而易敵者必擒扵人也伏望慎擇疆吏出牧邉民厚之以奉禄使悦其心借之以威權使嚴其令然後深溝高壘秣馬厲兵為戰守之備修仁立徳布政行恵廣安輯之道訓士卒闢田疇勸農耕畜芻粟以備凶年完長㦸修勁弩謹烽燧繕保戍以防外患來則禦之去則備之如此則邉城按堵矣臣又聞古之明王安集吏民順俗而教簡募良材以備不虞齊桓晉文皆募兵以服鄰敵故强國之君必料其民有膽勇者聚為一卒樂進戰効力以顯忠勇者聚為一卒能踰高赴逺輕足善闘者聚為一卒此三者兵之練鋭内出可以決圍外入可以屠城況大小異形强弱異勢險易異備卑身以事强小國之形也以蠻夷伐蠻夷中國之形也故陳湯統西域而郅支滅常恵用烏孫而邉部寜且聚膽勇樂戰輕足之徒古稱良策請試行之且邉鄙之人多負壮勇識外邦之情偽知山川之形勝望扵邉郡置營召募不須品度人才止求少壮有武藝者萬人俟契丹有警令智勇将統而用之必顯成功乃中國之長算也工部侍郎集賢學士錢若水荅詔論邉事奏曰臣官忝貳卿曾叨大用國家得失臣合先言但以仲夏朝廷舉兵以來秋末敵人鈔邉之後凡有機事臣莫得聞是以不敢上言恐成狂瞽今陛下躬擐甲冑䝉犯雪霜駐蹕大名已踰旬浹一日徧詢輿論明發徳音大率不過即今禦戎之策将來安邉之術耳唯兹二事試為陛下言之臣聞孫武著書以伐謀為上漢高将将以用法為先伐謀者何盖将帥料敵制勝也用法者何盖朝廷能賞罰不私也今傅潜領數萬雄師閉門不出坐看敵軍俘掠生民上則孤陛下委注之恩下則挫陛下鋭師之氣此盖傅潜不能制勝朝廷未能用法使然也軍法臨陣不用命者斬若陛下明申重法斬潜以徇然後擢如楊延昭楊嗣者五七人增其爵秩分授兵柄使各将萬人間以强弩令分路討除孰敢不用命哉敵人聞我将帥用命不退則有死豈不懼惻豈獨思遁邪亦來嵗不敢犯邉矣如此則不出半月可以坐清邉塞然後鑾輅還京陛下威聲振四海矣臣嘗讀五代史見周世宗即位之始劉崇結敵軍遣大将楊袞領騎數萬隨崇至高平當時懦将樊愛能何徽等臨敵不戰世宗知之翌日大陳宴會斬愛能徽等拔偏将十餘人令分兵擊太原劉崇聞之股慄不敢出敵人即日而遁是以兵威大振爾後収淮甸下秦鳳平闗南如席卷耳以陛下睿聖神武豈愧于周世宗乎此所謂即今禦戎之策也其将來安邉之術臣不敢廣引前事慮煩聖聰止以近事言之太祖朝制最得其宜止以郭進在邢州李漢超在闗南何繼筠在鎮定賀惟忠在易州李謙溥在隰州姚内斌在慶州董遵誨在通逺軍王彦昇在原州然但得㳂邉廵檢之名不授行營部管之號皆十餘年不易其任立功者厚加賞賚其位皆不至觀察使位不高則朝廷易制久不易則邉事盡知然後授以聖謀不令生事來則掩殺去則勿追所以十七年中北戎西蕃不敢犯塞以至屢遣戎使先來乞和此皆布在耳目陛下之所知也伏望遵太祖之故事察下臣之愚衷精擇名臣分理邉埸罷部管之號使其不相統臨置廵檢之名俾其逓相救應如此則出必擊寇入則守城不數年間可致邉烽罷警矣若水知開封府時北邉未寜内出手札訪若水以策若水陳備邉之要有五一曰擇郡守二曰募郷兵三曰積芻粟四曰革将帥五曰明賞罰何謂擇郡守今之所患患在戰守不同心望陛下選沈厚有謀諳邉事者任為邉郡刺史令兼縁邉廵檢許召勇敢之士為隨身部曲廪贍不充則官為支給然後嚴亭障明斥候毎得事宜宻相報示寇來則互為救應齊出討除寇去則不令逺追各務安静茍無大過勿為替移儻立微功就加爵賞如此則戰守必能同心而敵人不敢近塞矣何謂募郷兵今之所患患在不知敵情望詔逐州召邉民為招收軍給與糧賜蠲其賦租彼縁兩地之中各有親族使其懐恵來布腹心彼若舉兵此必預知茍能預知則百戰百勝矣何謂積芻粟今之所患患在困民力望陛下令縁邉各廣營田以州郡長官兼其使額每嵗秋夏較其課程立旗鼓以齊之行賞罰以勸之仍縱商人入粟縁邉儻鎮戍有三年之備則敵人不敢動矣何謂革将帥今之所患患在重兵居外輕兵居内去嵗傅潜以八萬騎屯中山魏博之間鎮兵全少非鑾輅親征則城邑危矣望陛下慎選将臣任河北近鎮仍依舊事節制邉兵未能削部署之名望且減行營之號有警則暫廵邉儌無事則却復舊藩豈惟不啟戎心況復待勞以逸如此則不失備邉之要又無舉兵之名且使重兵不屯一處進退動静無施不可矣何謂明賞罰今之所患患在戍卒驕惰臣自知府以來見侍衛殿前兩司送到邉上亡命軍卒人數甚多臣試訊之皆以思親為言此盖令之不嚴也平時尚敢如此況臨大敵乎望陛下以此言示将帥俾申嚴號令以警其下古人云賞不勸謂之止善罰不懲謂之縱惡又曰法不可移令不可違臣嘗聞郭進出鎮西山太祖每遣戍卒必諭之曰汝等謹奉法我猶赦汝郭進殺汝矣其假借如此故郭進所至未嘗少衂陛下能鑒前日之事即今日之元龜也若水又言邉部用兵唯視太白與月為進退者誠以太白者将軍也辰星者廷尉也合則有戰不合則無戰合扵東則主勝合扵西則客勝陛下能用臣言以謹邉備則邉部不召而自來矣太祖臨御十七年間未嘗生事疆埸而敵人往往遣使乞和者以其任用得人而備禦有方也陛下茍思兵者凶器戰者危事而不倒持太阿授人以柄則守在四夷而常獲静勝此備禦之上策也右正言直集賢院趙安仁荅詔論邉事上奏曰臣以為當今有急務者二經久有大要者五急務二者其一激勵戎臣舉賞罰之典何者自防秋以來有保一軍守一壘而有功者有握重兵居重地而無功者故未能屏敵騎之迹止猾夏之謀今若有功者被加等之賞益以强兵使居要害之地無効者奪主兵之柄賜之重罰以懲逗撓之失則軍威自振敵氣自消故賞罰不可不舉也其二振救邉民行優卹之恵何者自敵人入寇以來邉民有闘敵之時没扵兵刃者遣使收瘞之有骨肉分離廬舍焚毁者本部撫卹之陛下光宅中興照臨四海以一方之騷動勞萬乗之撫廵今封疆之臣既行信賞邉鄙之俗又叶來蘇所宜歸奉宗祧以安逺近則神武不可不重也大要五者其一選将畧當今兵卒素練而其數甚廣用之邉方立功至少誠由主将之無智畧也豈非有一夫之勇者不足以為萬人之敵乎昔郤縠為将敦詩説禮杜預平呉馬上治春秋盖儒學之将則洞究存亡深知成敗求之今世亦代不乏賢太祖太宗親選天下士令布在中外不啻數千人其間有材武知兵法可以為将者固有之矣若選而用之則總戎訓旅安邉制敵不猶愈扵一夫之勇者乎況其識君臣父子之道知忠孝逆順之理與夫不知書者固亦異矣其二持兵勢京師天下之根本也澶魏河朔之咽喉也鎮定股肱之地也是知根本在乎深固咽喉在乎控制股肱在乎運用盖用兵衆寡貴得其宜若支大扵體末重扵本是以利器授人也其三求軍謀古者用軍必有成算諮謀籌畫以贊戎機比來用軍都無此選自今凡命将守邉仍取識孤虚成敗知寇戎情状者為參謀入官階資優與選職況今武舉已議復行其軍謀宏逺武藝絶倫科望依唐室故事復開此選其四修軍政古之名将必得衆心師克在和戰則必勝投醪挾纊史冊具陳若非畏愛兼行豈得士卒樂用故榖梁傳云善為師者不戰言敵人畏其法令也今之将帥請先以軍政能不黜陟之則人人自謹扵法令矣其五愛民力國家邉備尚嚴經費猶廣今嵗輦運固巳重勞茍或未議蠲租與免縁科折變不須給復可息疲羸仍望特戒有司務令省事用全民力以備軍須陛下以上聖之資兼神武之畧盪平邊徼止在朝夕臣之狂言姑以竭愚忠之一効烏足以資廟勝之成算也歴代名臣奏議巻三百二十二
