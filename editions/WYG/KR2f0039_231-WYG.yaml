body:
  text: 歴代名臣奏議卷二百三十一明楊士竒等撰征伐宋神宗元豐四年判河南府太尉文彦博論西事奏曰近聞西師已還中外但知時暫歇泊而未有分屯解甲之㫖人情憂疑皆慮王師必有再舉之計老臣受國恩深義同休戚齒髪如此無復覬望唯有區區欲報之意不能緘黙輙為陛下言之臣竊觀陛下臨御以來選抜將校訓齊師徒脩治器械儲峙糗粮皆衆智所不及近世所未有比者夏人昏亂自致天討陛下赫然命將出師以伐其罪師行以來㨗音屢上雖未能覆其巢穴係其君長而師行有紀所遇輙克羌人遁逃莫敢抗堂堂之鋒天威神武震慴四夷戰功之多近世未有然而數路進軍興動大衆彌歴累月餽輓不貲諸路之民疲於供給將士盡忠竭力為朝廷奮不顧身間關死亡衝突寒苦備極勤勞臣以謂國威既已振矣將士之力亦已殫矣百姓供餽亦已竭矣為陛下今日之計正當勞徠將士安拊百姓噢咻其疾痛補完其瘡痍使得蘇息按甲養威以全前日之勝如此則外足以懲艾逺人内足以愛養軍民乃宗社無疆之休也今若師徒暫還而復出士氣已衰而再皷民力已困而調發復興諸路深入而轉餉益逺如此則師之勝敗恐未可知而前功或䘮此天下之深憂也兼臣在洛中津遣陜西軍須不少亦聞陜西事體頗詳皆言百姓亦已流離菽粟之價騰踴今冬二麥多不下種將春農事方興又復調發不已必恐應副不前有誤大計臣而不言孰當言者伏望陛下以天下為度以蒼生為心不以盡敵然後為功亟詔班師分屯諸路使朝廷恩威並行軍民和附以小羌昏亂如此可以坐待其滅亡矣臣不勝大願老臣愚忠憂國之心不能自已僭易冒聞不任隕越五年陜西轉運使范純粹論西師不可再舉䟽曰臣伏見朝廷聚兵一道以俟西討將脩築堡寨聚積芻粮為進攻必取之計臣以非才職專餽餉雖前後累與同職官條具事狀仰煩聖聽然其所論皆區區餽運職事之所當言者至于攻討得失之勢城堡利害之實師期之緩急民情之戚休所以繫朝廷天下之體者則非臣之職而前此未之言也臣愚以謂畎畝不忘君者盖臣子之常守況臣世荷國㤙乆叨器使今事有所覩而心有所懐詎當以非職為間而𨼆黙自欺此臣所以自信不疑而欲言者也臣切聞去年邉事之初議者謂夏人惛亂囚辱其長衆怨親叛席卷可平朝廷大治兵師諸道並進所向力戰而賊巢不抜則是與夫議者之言有間矣今朝廷㑹兵涇原欲為且城且戰之計臣以謂精騎二十萬聚于一方聲勢重大彼必清野以避我鋒決於他路犯邉以為牽制萬一乘虚入宼則事可憂兼涇原進築之衆所食粮米日將萬斛所築城堡不過一二而地里漸逺餽運無可繼之䇿時日漸乆丁夫有奔潰之虞當此之時勢必中罷豈不負陛下興舉之意而繫逺方觀望乎矧所城堡障深在賊疆存守乆長豈敢自保此又不可不慮者也朝廷休飬民力充實府庫乆矣去嵗兵師一出而公私困弊若此其甚今者再議大舉人氣事力大非去嵗之比若今嵗事功不就即來嵗又將如何國財民力將何以繼此臣所謂攻討得失之勢城堡利害之實者也臣准制置司牒坐到調發時諸路兵馬之期皆在六月切計出兵之日決是初秋去嵗涇原環慶兩路各以九月出兵比至中冬漸以還塞然猶士卒疾凍十亡四五今七月行師方是苦暑以二十萬之衆冒犯炎日或被堅禦宼或負重力役渇飲難周瘧痢多有復當大雨時行之月豈無霖潦之虞臣恐疾病傷殘有甚前日内外重兵上繫國體此臣所謂師期之緩急者也臣切見去年調夫出界其上等人户有至獨出數十夫之家其貧下人户亦須數户共出一夫毎夫雇直至百貫文又諸路轉運司接續調發至于再三其間凍餒艱辛若遇賊被害死亡凋弊乆未可復今兹再籍百姓已諳事勢人必駭畏頗有逃散麰麥在隴秋禾將耘妨奪農時適於此日縁軍興大計動須人力臣等䝉朝廷誡以軍法責令趣辦若人戸大段流移關内騷動根本之地事有可憂異日言者必以臣等為歸咎之地一身之責無足自愛其如國事何此臣所謂民情之戚休者此也臣切謂朝廷興計當萬全而不當幸一時之無事發而無成前車可鑒臣切與老于邉事之人曲折講議事可寒心而中外之臣妄意朝廷謀身畏禍無有為陛下言者臣獨何人特以忠義所激不復以職事為間寧受盡言之罪于今日而不忍被不言之罪于他時故敢以所得衆人之論昧死以聞晁補之上言曰臣聞杜牧曰國家大事牧不當言實言之有罪則自以其書為罪言安南之舉賤臣輕言之亦罪也夫仁懐義率智謀信結而出之以勇闐然而皷堂然而陣身被堅執鋭奮臂大呼以先三軍使三軍之士進旅退旅如驅羣羊如視嬰兒與之徃與之來莫知所之若是者臣不能布䇿挾龜迎日計月望雲占風觀星候氣雷聲雨沐虹垂霧横暈珥光恠背建向破從孤擊虚六窮三刑生王囚死以察害凶以明利吉使三軍之士逆之以止順之以行不厭不疑至死無所災若是者臣不能畫地聚米相險度夷左青右白前鳥後龜無當天牢無處龍首髙陵知逆背邱知向林木之隰葭蔣之陂一迂一直一亟一遲使三軍之士所由以入所從以歸交挂圯絶不失地宜若是者臣不能馳一乗之車掉三寸之舌不甲不兵以行賊營曉以禍福諭以利害使賊交臂受事屈膝請和可以無戰而屈人之兵若是者臣不能深溝髙壘清野以待示以所害欲戰不可三時務農一時習武百姓家給人足雞犬相聞使賊不敢南下而獵於嶺東出而漁於海徹關棄傳内外為一若是者臣不能臣負不能之才五且少孤不幸墮在荆棘泥塗之中荒楚幽穢不得預聞下士之議而私慕庻人所以𫝊語者是以不勝犬馬心願効一言雖然凡所言者亦非曰能之特其理勢之然否可道者也自交趾犯順侵軼郡縣溪嶺騷然檄書日聞陛下仁愛逺民若保赤子憂勤宵旰思所以禁止安集者臣雖不備行列有目有趾莫非王臣故㤀其怯懦以自試鈇鉞之誅謹參古驗今先論其所宜勝與所為未可取者而次條愚計於後以備執事者擇焉𫝊曰不先時而起不後時而縮又曰敵加於己不得已而應之謂之應兵兵應者勝陛下以父道育四國四國所宜歡欣咸以子來而交趾不道乃干大順陛下謀於心謀於卿士以逮庻民設壇授鉞應而討之兵應者勝此其理勢必勝一也兵起之初五管莫備賊至城下市合不知而邕州刺史蘇緘家世儒者不識金革汗馬之勞卒遇大變乃能奮不顧身閉城乗壘連鬬宛轉以嬰賊鋒兵敗不屈血染砧几妻子女婦駢頭為戮將吏偕死者至數十人逺近聳動争欲伏節前驅者此其理勢必勝二也陛下即位以來精意武備設監置官以董軍器金鐡皮革筋簳膠漆精良百選刀矟矛槍㦸楯蔽櫓矢弩胄鎧鼓旗笳角凡軍之須一切素具北益黄河之水以滿隋渠南盡豫章之木以為舩一船所載當中國車数十量舳艫相銜以濟南師此其理勢必勝三也交趾之地不過中國一大郡呌呼跳梁不足以越千里疲弊空窶不足以支數嵗陛下神武天旋雷動莫不蠢然況此小宼制之得術捐五管一城足以當賊有餘何至嘵嘵以煩執事者今析中國之衆五一以伐之如舉岱山壓鳥卵此其理勢必勝四也陛下謀臣計士布列中外適一事命一將皆試可乃遣而比嵗更武舉之科親延於廷諏以計䇿天下小兒孺子莫不踴躍憤悱争試劒馳馬指畫論議以希功名其作新振起亦勇氣百倍矣交趾儌外小國其人腥臊雜處非素知兵能出竒合變也乍聚乍散非有常性鈔掠奪擊與邉人争一旦之命此如攫鳥逸獸雖角牙爪觜輕利足奮而不知人能以機械㒺罟獲之此其理勢必勝五也雖然勝可萬全而有未可取者此事之情不可不察也陛下方拓西疆指圖授筭以取熈河六城如探懐中物敵逃遁不敢窺境上將狃近功士飽新賞帶甲十萬乘勝南指有輕交趾心臣以謂姑無謂交趾小蜂蠆有毒不可忽也𫝊曰鳥窮則啄獸窮則摶人窮則詐昔魯人與邾人戰魯卑邾不設備而禦之邾人敗魯使我軍不知察此交趾示弱以堅我我廹其窮使姦謀得恃此其理勢或未可取一也中國隂陽之中土氣和適其生物如之故極寒甚熱皆是傷病百越之地少隂多陽其人䟽理鳥獸希毛故性能暑三月五月春草黄茅嵐霧瘴氛上炎下潦颶風之所扇鼓且土多毒蟲蚺蛇沙虱過而踣者猶十三四焉今以舉大軍宿之其間乆而不召強者病弱者死奚暇争功利哉此其理勢或未可取二也古者興師十萬日費千金故軍無輜重則亡無委積則亡無粮食則亡臣請以漢賈捐之所論羌軍質之暴師曽未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府錢續之今交趾之逺非特羌軍也且輟畿内禁卒及調河北京東戍兵五六萬以伐之倍道兼行三月而後至以臣計之人日糒二升則五萬人之費日千石也行三月日千石舎未畢陳未定而十萬石之粟去矣使其淹回未有成績其為費可勝言哉孫子曰智將務食於敵食敵一鍾當吾二十鍾􅠇秆一石當吾二十石此計平地千里之法也今以京師直交趾五倍而言之則何啻二十鍾二十石而後可以當賊之一矧其俗又非專以五榖為養也木實草根魚鼈蚌蜃之為餔且其土之所出足以給其人安坐而待我若此雖十年不病闕食也𫝊曰粟不如者勿與持乆持乆非逺行之利此其理勢或未可取三也平陸之軍習於車攻閑於騎鬭蹈蹂厚土大歩疾走左旋右折出入徃來蕩蕩坦坦不可障阨而以之入於東南之幽前則重山後則複溪左則大阜右則深谷積石叢篠車以摧輪馬以敗蹄擇土計地若不容足縱行則絶首尾衡行則絶兩翼徃不知所返而賊生死其地其人如猱狖下上坂險筋力百倍於華人倏起忽止適去已至從之如摶景不可得也傳曰不用鄉導不能得地利地利者兵之助故孟子所記亦先地利而後天時而將士非素知此其理勢或未可取四也畿内禁卒固天下之材選賞罸素信約束素明拳勇亦當百矣然臣竊計之設比營而擇或取左遺右或取右遺左參差不齊聚為一軍則少非同巷長非並舎賚賜不偕受調發不俱行雖一之以旗鼔晝戰目不能以相識夜戰聲不能以相知則臨事難濟而河北京東之卒又半雜新軍尫孱貧窶不任田畝徒博飲酒計窮力盡之人乃起而為兵一旦遂驅之戰不惟不足勝戈甲為病而其徃也皆有戚戚羇旅之懷夫戰勇氣也氣不盈不可必勝此其理勢或未可取五也凡此較然易見雖五尺童子能道之而臣所以獨不自已區區為國私憂過計者非以交趾果能為足拇病也以謂逺勞王師戰乆不決則事將不能無弊不可不察也夫交趾實古揚州之南境自三代盛時列荒服之外不及以政秦并天下略定揚粤以謫戍守五嶺與越雜處以至漢而任囂尉陀亦數以其地叛當是時有閩越東越南越東甌西甌謂之百越交趾百越之儌也其國距洛陽南萬一千里人皆雕題文身項髻徒跣俗相習以鼻飲父子男女同川而浴今其地負海倚山阻險僻迂師行之道可以為正為竒為伏者非特一途而已也盖漢初遣王恢韓安國擊越亦一出豫章一出㑹稽時唐䝉亦使越越人食䝉以蜀枸醬䝉歸因又上書通夜郎浮船䍧柯以出越人不意其後路博徳為伏波將軍出桂陽下湟水按圖湟水盖出於連州楊僕為樓船將軍出豫章下潢浦按圖潢浦盖出於廣州故歸義越侯二人為戈船下瀬將軍出零陵下灕水按圖灕水盖出於桂州馳義侯𤼵巴蜀罪人下䍧柯䍧柯即唐䝉所通道起夜郎者也於是五將軍咸㑹越人或降或亡南越平為九郡至建武中交趾女子側貳叛馬援將平之援始自合浦縁海而行隨山刋道盖千餘里如浪泊禁溪無功居風下雋壺頭之路凡圖記可見徃徃援所行也今其計謀所長不可得而知所可知者其出入徃來死生之地髣髴具在師行所從不可不察也臣又以今言之居後踵前固不必皆出前人之舊而其大槩瀕湖以南要害之地朝廷因以分屯迭進至於明越餘杭海上諸郡負海無障塞中國所素不虞者臣願亦粗修守禦備游宼凡此非特以待交趾而已臣又以今料之使賊能為狂計固不出於三若外有合交據關守隘以老我師我頓兵絶儌之下曠日持乆欲戰不可引去則賊又復至回軍轉陣返而赴之賊又入保如初如是數年則邊人未有息肩之期此計上也若開關闢户誤我以利誑我以弱設計誘我且戰且却我易而不戒乃亟入之以墮賊計中賊度我歸逺以竒兵斷後我進無所得欲退不能此計中也若棄關不守鼓行出隘唐突侵軼疾戰自快輕勇悍亟分散四擊大則劫城小則掠屯其入吾之地恐不深其爭吾之利恐不及我主彼客彼輕我重我衆彼寡雖強可虜此計下也賊出上計利在賊出中計利害半出下計魚爛亡矣臣又以今料之賊必不能出上計何則海外逺國固非交趾之弱所能恃雖近有羣獠又非固為交趾役也況敢侮王國乎意者輔車相依脣亡齒寒有不自安之心今臣姑置逺者而不論論羣獠之近者則亦不可無所以待之今見朝廷舉大兵欲滅交趾彼其中能無介然疑似之心哉臣獨計以謂誠能擇使者如酈食其司馬相如陸賈班起等軰乗馹持節以寛大鎮之告以朝廷誅叛逆賊即伏行罷兵矣能從中國討賊及反間致頭首者計所得以賞以身從者賞以身以家從者禄以家以鄉從者封以鄉以縣從者侯以縣縱不能悉從可以少定其志則是不戰而賊之形已窘矣臣又料之賊無他助其上計不能悉用或者猶參上計而雜中計參上計據關守隘以老我師我雖衆無所用之請以大軍當其衝虚張形勢以疑賊而隂擇精兵為三四間道絶徑或薄其左或突其右設竒取之兵法所謂攻其所不守也昔蜀姜維拒劒閣鄧艾乃潜自隂平行無人之地七百里鑿山通道﨑嶇險絶以氊自裹輪而下士卒皆縁崖攀木魚貫而進卒降劉禪此設竒者也雜中計開關闢户以誘致我我雖衆亦無必入請留大軍屯其後而以驍鋭佯從之輕足利兵以為前行分屯析隊伏於兩傍勿薄勿廹逺而挑之偶勝無追不勝疾歸棄金遺鼓拔衆以馳賊貪吾獲可邀於阨卒前遇伏其衆必覆兵法所謂引而去之令敵半出而擊之利者也昔北戎侵鄭公子突曰使勇而無剛者嘗宼而速去之君為三覆以待之戎勝不相讓敗不相救先者見獲必務進進而遇覆必速奔從之遂破戎師此設伏者也賊出上中而不利將悉衆偕出以徼幸於其下計是固中國之利也請剋日而取之昔魏祖伐關中賊毎一部至魏祖輒喜破賊諸將問其故魏祖曰關中道逺賊若依險阻征之不一二年不可下也今皆來集衆雖多軍無適主一舉可滅諸將皆服語曰連雞不俱棲可離而解賊衆之謂也此三説者譬之丸不能出於盤其大槩如此然兵無常數故隨所動而應之前必有減竈之説而後繼之者得以起添竈之智顧為陛下將者何如耳賊出下計而又不利將大走逺遁亡海絶道以保窟穴臣請按甲勿從或曰按甲勿從何以立威於天下曩士卒所以犯晨夜冒白刄者懼不勝使幸勝奈何幾舉而棄之且賊窘窮無所知此如兩鼠鬬穴中將勇者勝臣則以謂不然兩鼠鬬穴中將内鼠勝且欲摶賊大海之間其勢必與之相從於舟楫夫使吾三晉齊魯之人失夷曠而為樓船鬬艦浮之狂瀾之中平居無事目亂心悸而況乗以倉猝㣲風揺檣一夫蕩櫓我衆駭矣又何暇與之校強弱勝負哉盖前世語水戰以謂越人能入水負舟而杜牧所𫝊鄭年者能沒海履其地五十里不噎今海上賈人亦徃徃遇水宼鑿舟沈焉此其非中國所用以取勝故也故臣請按甲勿從而更設䇿修備以待之且陛下富有天下地漸日月之窟府籠山海之蔵非以交趾羸􅖮安定勾漏靡零曲陽比帶稽徐西于龍編朱䳒封溪望海卑陬不毛方尺圍寸之地為足有也又非以交趾生犀馴象古貝文螺琥珀翡翠鼊皮鮫革蕉紵桂蠧詼竒不法殫瑣極細之物為足寳也不得已而問其罪足以威懾小宼使之悔過効順歸命中國而已賊既定臣請循古更選仁厚勇略堪任將帥者以為五管諸州刺史太守以歳月鎮撫其民而因其家之可任者置土兵如保甲以時教習土兵之外乃募㳺軍而就擇將吏其地平居無事謹飬而善别之以周知其心有故王臣失勢欲復見其功者聚為一卒有死事之人昆弟欲為之報仇者聚為一卒有貧窮忿怒將使其志者聚為一卒有故贅壻人虜欲昭迹揚名者聚為一卒有故胥靡負犯之人欲逃其恥者聚為一卒加賜而時慰焉使之居其地服其俗安其水土便其械用因其糧食得以無煩執事而坐制其弊乃可以得志此百世之計也臣身非安南將吏民庻又不親與交趾接也安能周知其虚實短長利害所在曰今日出某道取某屯明日出某道取某聚某道可以為正某道可以為竒某道可以為伏意者其大槩理勢之所在故臣得以臆計胷度而妄議焉若夫知己知彼每舉不殆與敵變化循環無窮提軍挈衆動於九天之上此則大將軍之任非臣所得而前知也臣愚疎外不知事體昧死陳愚計哲宗即位守門下侍郎司馬光請革弊劄子曰臣伏見陛下自臨政以來夙夜孜孜以愛百姓安國家為事盖善治疾者必究其所來攻其所急救之欲速去之欲盡臣觀今日公私耗竭逺近疲弊其原大槩出於用兵夫兵者凶器天下之毒財用之蠧聖人除暴定亂不得已而用之耳自有唐中葉藩鎮跋扈降及五代羣雄角逐四海九州𤓰分麋潰兵相吞噬生民塗炭二百餘年太祖受天明命四征弗庭光啓景祚太宗繼之克成厥勲然後大禹之迹悉為宋有於是載戢干戈與民休息或自生至死年及期頥不見兵革吏守法度民安生業雞鳴狗吠煙火相望可謂太平之極致自古所罕侔矣及神宗繼統材雄氣英以幽薊雲朔淪於契丹靈夏河西專於拓跋交趾日南制於李氏不得悉張置官吏收籍賦役比於漢唐之境猶有未完深用為耻遂慨然有征伐開拓之志於是邉鄙武夫窺伺小利敢肆大言祇知邀功不顧國患爭賈餘勇自謂衛霍不死白面書生披文按圖玩習陳迹不知合變競獻竒䇿自謂良平更生聚斂之臣捃拾財利剖析秋毫以供軍費專務市㤙不恤殘民各陳遺利自謂研桑復出相與誤惑先帝自求榮位於是置提舉官強配青苖多收免役以聚貨泉又驅畎畝之人為保甲使捨耒耜習弓矢又置都作院調筋皮角木以多造器甲入飬保馬使賣耕牛市駔駿而農民始愁苦矣部分諸軍無問邉州内地各置將官以領之自知州軍緫管鈐轄都監監押皆不得關預捨祖宗教閲舊制諸射法效逺服機械陳圖競為新竒朝晡上場罕得休息而士卒始怨嗟矣置市易司強市推取坐列販賣増商稅色件及菜果而商賈始貧困矣又立賖貸之法誘不肖子弟破其家又令民封狀増價以買坊場致其子孫鄰保籍沒貲産不能備償又増茶鹽之額賤買貴賣強以配民食用不盡廹以威刑破産輸錢又設措置河北糴便司廣積糧榖扵臨流州縣以備饋運教兵既乆積財既多然後用之而承平日乆人已㤀戰將帥愚懦行伍驕惰加以運籌決勝者乃浮躁巧偽之士不知彼已妄動輕舉是以頓兵靈武力疲食盡自潰而歸執兵之士荷粮之夫暴骨塞外且數十萬築堡永洛怠忽無備縱宼延敵闔城之人翦為魚肉曽未足以威服敵國而中國先自困矣先帝深悔其然厭截截諞言思畨畨良士及下哀痛之詔息兵富民奄棄天下此臣所為痛心疾首泣血追傷者也伏惟皇帝陛下肇承基緖太皇太后同聽庻政首戒邉吏毋得妄出侵掠俾中外兩安今契丹繼好秉常納貢乾徳拜章征伐開拓之議皆已息矣則此置提舉官散青苖斂免役錢㸃教保甲置都作院飬保馬置將官市易司封狀買坊場増茶塩額措置河北糴便司皆為虚設陛下幸詔臣民各言疾苦其已至者千有餘章未有不言此數事者足以為天下公患衆人所共知非臣一人之私言也利害著明皎如日月何所復疑而羣臣猶習常安故憚於更張雖頗加裁損而監司按堵將官具存保甲猶教閱保馬猶養飼邉州屯戍不減軍器造作不休茶鹽新額尚在差役舊法未復是用兵雖息而公私勞費猶未息也如此因循不知改轍數年之後萬一遇水旱大飢盜賊羣起其為國家憂患豈敢盡言哉伏願陛下斷自聖志凡王安石等所立新法果能勝於舊者則存之其餘臣民以為不如舊法之便者痛加釐革雖非一日可行之事欲乞陛下宣諭執政令因臣民上封事熟議利害進呈以聖鑒裁決而行之昔夏遵禹訓商用湯法周循文武之典盖創業垂統之王貽厥孫謀後世所宜謹守不可失也若凡百措置率由舊章但使政事悉如熈寧之初則民物熈熈海内太平更無餘事矣議者必曰革弊不可倉猝當徐徐有漸此何異使醫治疾而曰勿使遽愈且勿除其根原使盡也其為醫者謀則善矣其為疾者謀奚利哉李廌上慎兵論曰臣聞兵不可好好兵者嗜殺人者也戰不可忘忘戰者棄民者也臣嘗原兵之理我克敵敵克我要之各有相傷為民父母奈何使民兩自相傷中道無罪而霣生哉萬一正不獲意則權必用武乃濟然後哀矜愴惻而用之以犯難難平即止非復可玩此以殺止殺以戰去戰之術也司馬法曰不違時不歴民病所以愛民也不加喪不因凶所以愛夫民也冬夏不興師所以兼愛其民也後之人君豈䘏是哉爭城則戰矣爭地則戰矣爭長則戰矣爭利則戰矣小忿則戰矣違言則戰矣代翕代張代存代亡民不加多率以戰死獨何辜哉今日暴原野之白骨乃昔日暴原野白骨之子孫也人君當視人猶已以己推人則好戰之心自平夫士卒之痛思己之痛士卒之傷思己之傷矢石在前白刄在左右法令在後萬死之間幸於一生其危心如何彼貴賤雖異位而喜懼好惡之心無二況復殺一人則父母妻子失所而無依者數人或至於殺其子孫則嗣續遂絶者夫推愛物之心猶不忍暴殄天物況人乎不戰而屈人兵者正慎於此故觀無衣之詩然後見興師之情觀揚之水之詩然後見屯戍之思觀葛生之詩然後見戰歿之感迨夫民日益寡國日益削力日益屈財日益殫於是惻然哀恫其前非殆矣主父偃曰務戰勝窮武事未有不悔者豈特悔而已禍亦隨之夫三世為將道家猶且忌之況好兵之主乎故禍莫大乎好兵好兵之心有二曰幸曰侈孔子曰不仁者不可以長處樂不可以乆處約惟樂與約處之實難自匹夫至於天下國家其召禍之漸均生於有餘不足有餘則侈心生不足則幸心生幸心之禍在厥身侈心之禍在子孫今夫國廹小而鮮長慮財褊急而多妄計貪而無謀勇而無禮惟試僥倖於一戰萬一償志於是乎幸心生矣幸心一生故不量力不度徳而所較非其敵志徒大心徒勞而所求非其道如卵投石如指撓沸自求危難屠其城夷其社覆其宗絶其嗣者踵相及孟子所謂縁木求魚必無後災以若所為求若所欲後必有灾是也不足為有天下者道若夫燕安閒暇財豐力富旁視四顧無一不可惟外事四夷然後快意於是侈心生矣侈心一生故好大喜功而不以生息元元為念窮兵黷武惟以無伐功為愧自求憂患困役傷財得寸損尺怨滿天地而禍及子孫衆仲所謂兵猶火也不戢將自焚者是也前王既以此致凶咎後王當以此為龜鑑古之好兵無功而其主非賢者不足道好兵而賢且有功者莫若漢孝武唐太宗夫孝武席髙祖文景之餘休太倉有紅腐之粟内府有貫朽之錢故放心肆欲玩兵耀武以事疆埸内則有期門羽林孤兒佽飛騎士之兵外則有六郡良家材官之士緫節制以統軍則有衛將軍之智提孤軍以深噪則有若霍驃騎之勇又有李廣程不識蘇建貳師安國嚴助李息徐自荀彘之徒以帥偏師楊僕路博徳李蔡王恢李陵李沮公孫賀公孫敖之徒以將别部擊匈奴救東甌平南粤誅昆邪平西羌伐朝鮮征大宛乃置朔方滄海武威儋耳䍧牁樂浪等二十四郡厥勛偉哉太宗以英雄神武戡定禍難以基王業自偏禆小校至於為帝大小戰無慮累百未嘗挫衂有若李勣李靖柴紹衛孝節薛萬徹之徒以平突厥有若道宗道彦樊興宗叚志元髙甑生之徒以平吐谷渾有若侯君集薛萬均之徒以平髙昌有若李襲譽李大亮之徒以平延陀有若牛進達之徒以平吐蕃有若郭孝恪之徒以平焉耆有若李子和齊善張士貴張徳寳上官懐仁之徒以平諸獠有若契苾何力阿史那杜爾之徒以平龜兹邦國既底定諸盜既勦絶其餘勇故氣猶未肯寧晚命馬周李勣張儉張亮為將統十六緫管之兵復逺駕遼海親征髙麗厥勛偉哉以漢武唐太宗之伐功度越前世所殺敵人固不可億數然士卒物故亦已多矣故君子曰戾太子父子庻人承乾兄弟之釁實由於此臣故曰兵不可好禍莫大於好兵好兵之禍既無近殃則慎用兵而重民命者其得福必永矣或曰子論兵而以好兵之禍為先奈何為驚人主心兵可去乎臣曰知戰可慎民可愛兵可蹔而不可玩禍可去福可就然後可以用兵矣書所謂知稼穡之難乃逸之意歟故曰仁者愛人惡人之害人義者循理惡人之亂紀以兹為兵意是乃仁術又安可去太祖皇帝昭受昊天之成命市不易肆兵不血刄與漢唐百戰以得天下固已異道五宗相承奉之以徳雖間用兵兵出有名未嘗有漢唐之侈心則基福而逺禍也其已乆矣陛下紹大統繼大烈可垂拱無為以荷天休然内寧必戒外居安必慮危故戰不可忘兵未可去戰雖不可忘當念民命之可重兵雖未可去當念好兵之貽禍鑒眎漢唐之侈心緝熈祖宗之多福故有曰今太平可恃四夷無虞宜毁兵革銷鋒鏑者自弊之論也願陛下勿聽或有曰今太平有餘四夷可討除宜興師旅闢土地是召禍之論也願陛下勿聽臣願陛下妙選將帥必求其良訓練士馬必致其精謹烽候繕甲械積芻粟完城壘以待四圉不害中國之為強脱若嬰吾憲吾以逸待勞以直待曲真天子之兵也欽宗靖康元年兵部侍郎李綱上言曰臣伏領御批降付臣僚所上奏劄不知何人所陳皆與臣意暗合乃知今日不為無人在陛下採其説斷而行之而已唐韓愈有言不赦不疑唯天子明凡此蔡功惟斷乃成正謂此也易於謙之上六稱利用行師征邑國於師之上六稱大君有命開國承家小人勿用盖謙之極非利用行師不足以濟功師之成非戒用小人不足以保治今陛下之於金人卑辭厚幣靡不順從其謙極矣然金人驕悖愈甚其勢非用師不能有濟以臣料之不得已而用兵其功必成然功成之後在陛下以小人為戒而已臣愚伏望聖慈深考聖人之言斷自淵衷無為浮議所動則大功一成中國數十年可以無强敵之患不然憂未艾也所降奏劄更容臣來早將上面禀聖訓謹録奏知御史中丞許翰上言曰臣聞敵方駐營朔野闚兵太行而种師道兵距河未渡此挫師之鋭而示敵以弱臣以為非便昔董卓自言討先零日留司馬劉靖屯兵安定以為聲勢虜欲斷卓歸道小擊輙開者以安定有兵故也虜謂安定當數萬人不知但歩騎四千而已故知兵之勢要恃聲援非必實加之也今我控扼狼車而大兵渡河號十萬衆此足以震敵人之心而増諸鎮之氣欲戰則可以及事欲和則易與之講此賢於老師不用而縱敵殘暴何啻萬萬也願陛下下臣之言詔大臣與种師道熟議其便然臣累論种師道今不可廢已䝉聖慈許令師道制置河北戎事之機間不容髮而逮今十三四日未聞施行今雖用師道言恐亦未必能盡其心以朝廷任之不專信之不一故也更望睿斷早圖任之翰又論戰曰臣伏見金人退師以來朝廷搢紳上恬下嬉幸於無事恃以為安而臣獨竊終夜不寐方以為憂夫以强敵之性貪惏無厭而我既示之以弱開之以利不過一二嵗勢必復來自所割三鎮疾馳三日則突騎犯都城飛塵入宫闕矣當此之時金帛不可復得土地不可復割邉鄙之師不可復召智能之士不可復圖萬世之變可勝言哉今聞姚古等兵已次國郊切謂陛下可以閫外之事制於將帥若遣一介之使可下下之使不可下則用兵不疑臣嘗熟計我戰而勝則䝉福無窮戰而不勝則北阨井陘西斷太行内守大河國固無患敵以殘弊將歸之兵力必不能取三鎮故我勝亦利不勝亦利此可決戰一也敵欲既盈將驕卒懈時益暄濁人馬喘汗以我方鋭擊其墯歸此可決戰二也我衆彼寡以十當一反顧者誅旋踵者斬使威令既必則罷弱者奮況於關陜百戰之士外誘以金繒而内激以憤耻破敵必矣此可決戰三也种師道持重名將今雖老疾智略足恃議者見其木訥若無䇿畫此盖不以口擊賊者昔趙括論兵其父奢不能難也而奢謂括將必敗趙師宋文割據江左聞王元謨論兵飄飄有伊洛間意及使之望風奔潰聞師道自少沈毅盖自天性介胄之士瞋目語難自古而然未可遂疑況今濟以姚古必能相與成功此可決戰四也陛下仁聖誠動萬姓義感三軍人人思為國死以滌中原之耻而發七廟之憤夫天時易失而人心難收陛下今不乘此利勢後必悔之此可決戰五也今全軀保妻子之臣務在張敵聲勢虚喝恐劫茍安目前遺患萬世此其意亦無他不過慮戰不勝則咎歸議者使身不利今一主和身保無患明年盛秋敵騎復來則必諉曰國家事敵不至不得歸咎和者姦回自營孰便於此非復有為陛下宗廟社稷長慮却顧者也夫一勝一負兵家常勢要觀大計如何爾議者以姚平仲前日妄動小衂以謂王師不可復用𫝊曰凡此蔡功唯斷乃成故願陛下斷之而已矣翰又論三鎮曰臣伏見王師既行而廟筭未定此疑事也古今盖未有能以疑事成功者故朝廷之意惑則將帥之心不一將帥之志分則士卒之氣不銳斷而必行鬼神避之此精誠之力也陛下欲斷今日之議當究為和與戰卒將如何而已矣其中小小利鈍非大計之所繫也昔漢髙帝蜀先主皆號聦明神武為一代之英雄考其用兵敗北無數然其志氣挫而愈厲絀而更揚者大計已定於中斯其所以為英雄者也陛下欲決和議則臣願陛下取太史公記虞卿𫝊覽其徃復此徃古之鑒也方今若失三鎮二十州之地則天下之勢已斷西北無河東則陜西不可守無河朔則汴不可都計不過謀渡江南臣考永嘉渡江能為東晋者乃有王導謝安英賢相繼扶危救傾僅能立國而中原邱􅇕遂陷鄰敵使世無王導謝安之才或有而不見施用則東晋割據猶恐未易為也借使能為東晋宗廟可復立也社稷可復建也盜入陵寢取一抔土則將若何言而至此可流涕陛下永念方來之艱則今日雖復勞動天下猶不得已何者擇禍莫若輕也或者以為太祖即位以來未有江南晋蜀而卒能混一區宇臣以為不侔太祖生長兵間非若陛下繼體守文建隆將士百戰精鋭非若方今將不素養兵不素練也敵在掌握縱而不取使益張大復何以敵不得以太祖言故凡守和之計以國與人者也陛下欲決戰議則臣之所陳可戰者五已具于前奏矣今使敵不辭城則渡河之師當戰戰則必有漕運之役有應援之兵有阨據之要皆當素治不計小却但責成功而後將帥志一而士卒氣奮三鎮之守有死無二若我以疑遣將帥以茍行則精鋭已亡矣何以取勝凡今為和議者茍取目前之無事則又未必可取臣聞西北之民人人相語曰吾属與其為虜則寧南向作賊死且為中原鬼使三鎮之衆發忿怨懟入為宼攘非小變也故姑息目前亦未為得況又方來之患未知所稅駕與自古用兵必有異議成王之時周公東征民獻有十夫予翼而已其他罔不反曰艱大晋武與杜預謀取江南大臣賈充等皆力爭之獨一張華賛定大計唐憲宗用武元衡裴度謀討淮西盜殺元衡朝廷震恐請罷裴度以安諸鎮憲宗大怒討蔡益急唐之威令自是復振周世宗初即位漢引契丹入宼河東世宗自將禦之宰相馮道固争不得周之功烈自是遂興書曰惟克果斷乃罔後艱陛下所以疑者度衆必以姚平仲前日之無功自持其説臣近問种師道平仲所以不利者師道為臣言刼寨之法不用大兵當小擾之使自蹂藉而後可乘又地勢入横河中度兵隘橋此利誘使出戰不利以兵入鬬也臣是以知師道之有謀故前日之功失在不用老將而用驍勇不恃謀將而恃辭説非兵不當用也昔石晋開運之變契丹始入敗不窮追冬復大來遂陷都城國朝景徳契丹入宼澶淵之役亦不窮追而卒和親夫開運景徳驅逐之䇿同而成敗之效異者何也開運之時中國方弱而示之以畏故敵復來景徳之間中國正強而受之以和故敵遂定今議者不鑒開運縱敵之患而欲為景徳之寛大則可謂不知時矣陛下何不試使議割地者身任數年敵不復入臣知議者必將難之夫為國不保數年之安而欲定萬世之䇿必不然矣願下臣章使有定議晁説之出狩議曰居其所而衆星拱之者北辰也乃一夕不居其所隨衆星以流焉天將無四時也啇詩不云乎邦畿千里惟民所止肇域彼四海非邦畿以止民也實止民以為邦畿也其能止千里而近者斯能域彼四海之逺也若夫千里不為我畿則四海將為他人域矣周詩亦曰价人維藩大師維垣大邦維屏大宗維翰懐徳維寧宗子維城無俾城壊無獨斯畏傷厲王失是道也民不懷徳而城壊矣烏覩文武成康之績哉是故國君死社稷禮也後世有以身保一州勇捍一城者為希世偉烈無他焉不學禮之過也聞之國君死社稷矣而大王去邠詩人不刺焉何也曰大王去邠以興周也時則商之衰世也紀侯大去其國春秋又不貶焉何也曰紀侯去其國以存其祀也時則周之衰世也若使當商周之治君盛世則紀侯者玉帛朝貢之不暇寧論於其國去不去耶春秋於紀侯信不貶矣而於周王則有譏焉書曰天王狩於河陽盖天王無出出則自絶於天下也天子之孝在天下諸侯之孝在一國所任不同所責亦異也漢文帝時老上單于自將十四萬騎入蕭關燒回中宫候騎至雍烽火通甘泉宫可謂危矣帝乃躬擐甲胄思親征焉其後匈奴復大入帝親勞軍至覇上及棘門而在細栁則黄輿屈而不得驅矣未聞其輕出狩也既而景帝立一日中七國同反帝命周亞夫竇嬰將三十六軍以伐之有張羽之力戰韓安國之持重韓頽當之功冠諸侯而趙渉劇孟鄧都尉軰為之謀畫七國王侯之首可指日而旌之也惟帝之斷足以誅御史大夫晁錯其勢足以使太常袁盎使吳其明足以容周亞夫之不奉詔以梁委吳亦未聞其輕出狩也唐明皇有始無卒昏滛不道固非文景之比而國家之盛不減文景時也一旦安禄山以范陽平盧河東之師率同羅奚契丹室韋十五萬衆反范陽取河北陷東京克桃林而潼關失守則不告宗廟不顧九族不諭百官身與宫宦數十人掲衣而奔才行四十里而無食飲與征徒並飢寒越明日軍士不肯行則斬宰相縊妃子僅行中道散去者衆賴劒南騾綱至以甘言強之而前不敢言騎騾之疲也受辱於饋食之田父訴誠於獻酒之㣲臣悲歌酸鼻若悔而不悔唐室自是傾矣其後肅宗幸岐代宗幸陜徳宗幸奉天皆脩明皇故事也末有僖昭之出則春秋之不貶也昔禄山之初叛也四方郡縣有不從賊者皆倚東平太守嗣吳王祗以起兵其終賴太子即位於靈武以固天下之基業則民心於帝豈不願其留而無出哉梁武帝區區好無益之名窺無實之利專以登叛人為謀末納侯景十有四州之地自謂坐獲非常之大功也不知其相朱异納景之賂其子正徳通景之謀長江不足以為險而朱雀航石頭城與浮苴等也景逼帝坐白刄交前而景徒能焚宫室辱妃主殺百官曾不自保其首領也梁室不碎於景之手者武帝坐朝如故而未嘗議及奔亡苻堅之秦軍聲國勢據中原以威百戎非江左可擬也鋭氣以攻衰微之晋戎卒六十萬介馬二十七萬下蜀漢之舟師擁幽冀之陸騎軍實萬里齊聲並進晋謝石之師不足以當其十二之一而石琰㓜度伊軰風流清談之師不足以當苻融張蚝慕容暐垂姚萇軰熊虎百戰之將而融陣逼淝水從㓜度之誘一動而奔潰不可制止融擒而堅僅以身遁姑得道洛陽而入長安曽不安席而復出五將山姚萇執之幽于新平别室而縊死靳𫝊國寳以陳義問尹緯以憐才於時垂與子寳中道叛而燕復以興乞伏父子繼以隴右叛而秦以立句町王以河南叛姚萇以萬年叛慕容冲兵起於帳下慕容暐變發於㑹中誠可懼矣向使堅收散卒不去長安任權翼苻越之忠謀督張蚝石越毛當苻飛龍之力戰則何遽有五將之辱新平之禍使秦遂亡乎執事者鑒漢文景不出而隆盛唐明皇出而衰亡梁武不出而存苻宣昭出而亡則一反覆手間天下之利害斷可知矣又有徃古實迹可按而為執事言者燕太祖文明帝以新造之邦出師小勝而激石虎之趙大陣以臨之一日亡其二十餘城於趙趙兵將逼所都之棘城皝懼欲出亡其帳下將慕輿根諫曰王一舉足則成彼趙之王業中趙之計矣今國家固守堅城其勢百倍事之不濟不失於走奈何望風委去為必亡之理乎元菟太守劉佩曰事之安危繫於一人大王當自強以厚將士不宜自弱也其謀臣封奕曰虎凶惡已甚鬼神共疾禍敗之至何日之有今空國逺來攻守勢異戎馬雖強無能為也頓兵積日釁隙自生但堅守以竢之耳燕乃以劉佩之力戰大敗趙師終為大國視石虎不義以死也是尤今日之所當知者也所謂尼雅滿斡哩雅布者非石虎之儔也其凶淫不道則過之我不可一舉足以自弱而成賊計惟堅守以成百倍之勢而視其明神誅殛可也況我祖宗基業之固宗廟社稷之靈今天子之勤儉圖治固非新造之燕可同日語也亦竊有可懼者今之謀臣視封奕如何其戰將視劉佩又如何執事者未宜忽於斯也又如燕幽帝慕容暐屢敗於晋大司馬温之師矣温乗勝至枋頭暐懼焉與太傅評謀奔龍城賴吳王垂請出戰曰若其不㨗走未晚也果大破温於襄邑而得晋之夀春焉此則危甚矣無足為執事者陳之也今之謀臣必不為慕容評而我將視慕容垂又如何執事者復宜念之也是二者盖有前比矣光武初在河北得邯鄲信都二郡之助而兵衆未合議者多言可因信都兵自送西還長安獨邳彤曰若明公無征伐之意則雖信都之兵猶難㑹也明公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也光武不復西而卒因二郡以一天下也方光武創業之初猶不肯散亡二郡之衆而固守河北執事者謂今累聖重光之基業可不恤京師之衆散亡而固守天下乎嗟夫皝去棘城暐奔龍城則燕雖興而復亡也光武輕去河北則不能中興而漢不得復有天下也執事者幸少念之也或曰晋元帝之亡也保江東而興王業胡為而不可曰元帝以琅邪王渡江而即帝位非驅黄屋以東廵也其所以即帝位者又豈特藉江山之固哉中原名徳之士王導周顗之屬不忘中原之故國相與慷慨垂涕而立宗廟於荆􅁄之中耳是時東晋之地南抵夀春北極彭城東至洛陽如使元帝居洛陽之舊都収中原之遺英則彼劉淵石勒軰果何有哉請以二事明之東晋之初興也弱矣劉琨遥奉朝廷之威命無日不戰於劉石間幾興而敗且使琨不死則滅劉以興晋陽殺石勒以固河北而洛陽長安皆晋之歸也祖逖志在中原琨之所畏也其在豫州百姓襁負而至將士樂為致死力敵人不敢窺兵石勒遣吏䕶其母墓黄河以南復為晋有畧地千里復戸萬計惜逖不能自成其渡江之志而卒也晉之末尤衰矣大司馬温之師猶足以至覇上劉裕之師又足以入長安況在元帝初興乎其初則未有定分争先破竹之勢也其後則強箭之末飲羽之勢也琨逖二人者元帝可用而不能用之以一天下者也温裕二人者不生於元帝之時使之効忠佐王者也執事者當念琅邪王渡江失計如此況以天子之尊為江東之舉乎豈不惜哉昔人所謂目前可驗天下共知之事區區所陳徃事是也其在本朝則章聖皇帝因契丹再入河北不西狩蜀不南狩金陵上有畢士安之深謀下有髙瓊之竭忠而成之於宼凖之決䇿不復徘徊而徑幸澶淵其流福天下至今賴之也是則不待説之之言而執事者宿知之矣厯代名臣奏議卷二百三十一
