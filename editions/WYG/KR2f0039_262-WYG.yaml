body:
  text: 歴代名臣奏議卷二百六十二明楊士竒等撰理財周厲王好利近榮夷公榮國名夷諡也芮良夫諫曰王室其將卑乎夫榮公好専利而不知大難夫利百物之所生也天地之所載也而或専之其害多矣天地百物皆將取焉胡可専也所怒甚多而不備大難以是教王王能乆乎夫王人者將導利而布之上下者也使神人百物無不得其極極中也猶日怵惕懼怨之來也故頌曰思文后稷克配彼天立我烝民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至于今今王學専利其可乎匹夫専利猶謂之盜王而行之其歸鮮矣榮公若用周必敗也厲王不聽景王二十一年將鑄大錢單穆公曰不可古者天灾降戾降下也戾至也於是乎量資幣權輕重以振捄民民患輕則為之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貿物物輕則子獨行物重則以母權而行之子母相通民皆得其欲若不堪重則多作輕而行之亦不廢重扵是乎有子權母而行小大利之堪任也不任之者幣重物輕妨其用也故作輕幣雜而用之以重者貿其貴以輕者貿其賤子權母者母不足則以子平而行之故錢小大民皆以為利也今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取扵民民不給將有逺志是離民也逺志逋逃也且夫備有未至而設之有至而後救之是不相入也可先而不備謂之怠可後而先之謂之召灾周固羸國也天未厭祻焉而又離民以佐灾無乃不可乎將民之與處而離之將灾是備禦而召之則何以經國國無經則何以出令令之不從上之患也故聖王樹徳扵民以除之夏書有之曰闗石和鈞王府則有闗門闗之征也石今之斛也言征賦調均則王之府藏常有之詩亦有之曰瞻彼旱麓榛楛濟濟愷悌君子干禄愷悌夫旱麓之榛楛殖故君子得以易樂干禄焉若夫山林匱竭林麓􅄆亡藪澤肆既民力凋盡田疇荒蕪資用乏匱君子將險哀之不暇而何易樂之有焉且絶民用以實王府猶塞川原而為潢汙也其竭也無日矣若民離而財匱灾至而備亡王其若之何吾周官之扵灾備也其所怠棄者多矣而又奪之資以益其灾是去其藏而翳其人也王其圗之齊桓公時管仲言通輕重之權曰嵗有凶穰故榖有貴賤令有緩急故物有輕重人君不理則畜賈㳺扵市乗民之不給百倍其本矣故萬乗之國必有萬金之賈千乗之國必有千金之賈者利有所并也計本量委則足矣然而民有飢餓者榖有所藏也民有餘則輕之故人君斂之以輕民不足則重之故人君􅄆之以重凡輕重斂􅄆之以時則凖平使萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘耒耜器械種饟糧食必取贍焉故大賈畜家不得豪奪吾民矣桓公遂用區區之齊合諸侯顯伯名伯讀曰霸漢文帝時錢益多而輕乃更鑄四銖錢其文為半兩除盜鑄錢令使民放鑄賈誼諫曰法使天下公得顧租鑄銅錫為錢敢雜以鉛鐵為它巧者其罪黥然鑄錢之情非殽雜為巧則不可得贏而殽之甚㣲為利甚厚夫事有召祻而法有起姦今令細民人操造幣之埶各隐屏而制作因欲禁其厚利㣲姦雖黥罪日報其埶不止乃者民人抵罪多者一縣百數及吏之所疑搒笞奔走者甚衆夫縣法以誘民使入陷阱孰積扵此曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何頼焉又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立吏急而壹之虖則大為煩苛而力不能勝縦而弗呵虖則市肆異用錢文大亂苟非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耨冶鎔炊炭姦錢日多五榖不為多善人怵而為姦邪愿民陷而之刑戮刑戮將甚不詳奈何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也故銅布扵天下其為祻博矣今博祻可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣偽錢不蕃民不相疑二矣采銅鑄作者反扵耕田三矣銅畢歸扵上上挟銅積以御輕重錢輕則以術斂之重則以術􅄆之貨物必平四矣以作兵器以假貴臣多少有制用别貴賤五矣以臨萬貨以調盈虛以收竒羨則官富實而末民困六矣制吾棄財以與匈奴逐争其民則敵必懐七矣故善為天下者因祻而為福轉敗而為功今反退七福而行博祻臣誠傷之上不聽武帝時有司言曰古者皮幣諸侯以聘享金有三等黄金為上白金為中赤金為下白金銀也赤金丹陽銅今半兩錢法重四銖文為半兩實重四銖而姦或盜摩錢裏取鎔音容冶器法謂之鎔錢益輕薄而物貴逺方用幣煩費不省乃以白鹿皮方尺縁以藻繢藻一作紫為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫為白金雜鑄銀錫為白金也以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名曰白選直三千二曰重差小方之其文馬直五百三曰復小撱之其文龜直三百令縣官銷半兩錢更鑄三銖錢文如其重盜鑄諸金錢罪皆死元狩中大農上塩鐵丞孔僅咸陽言山海天地之藏也皆宜属少府陛下不私以属大農佐賦願募民自給費因官器作煑塩官與牢盆牢廪食也古者名廩為牢也盆者煮塩盆浮食竒民欲擅管山海之貨若人執倉庫之管籥或曰管固以致富羨役利細民其沮事之議不可勝聽敢私鑄鐵器煮塩者釱左趾釱音徒計反釱以鐡為之著左趾以代刖也沒入其器物郡不出鐵者置小鐵官鑄故鐡便属在所縣使孔僅東郭咸陽乗傳舉行天下塩鐵作官府除故塩鐵家富者為吏吏益雜不選而多賈人矣商賈以幣之變多積貨逐利扵是公卿言郡國頗被菑害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貸賦而民不齊出扵南畆齊皆也商賈滋衆貧者蓄積無有皆仰縣官異時筭軺車賈人緡錢皆有差請筭如故緡絲也以貫錢也一貫千錢出二十筭也詩云維絲伊緡諸賈人末作貫貸買居邑稽諸物及商以取利者雖無市籍各以其物自占率緡錢二千而一筭以緡錢為筭是儲緡錢也故随其用所施施扵利重者其筭亦多諸作有租及鑄以手力所作而賣之率緡錢四千一筭非吏比者三老北邉騎士非吏而得與吏比者官謂三老北邉騎士也樓船令邉郡選富者為車騎士軺車以一筭商賈人軺車二筭商賈有軺車使出二筭重其賦也船五丈以上一筭匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之賈人有市籍者及其家属皆無得籍名田以便農敢犯令沒入田僮元封元年桑𢎞羊為治粟都尉領大農盡代孔僅筦天下塩鐵𢎞羊以諸官各自市相與争物故騰踊而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各往彼縣置均輸塩鐵官令逺方各以其物貴時商賈所轉販者為賦而相灌輸置平凖扵京師都受天下委輸名工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤即買之如此富商大賈無所牟大利則反本而萬物不得騰踊故抑天下物名曰平凖天子以為然許之元帝時貢禹為御史大夫數上書言得失曰古者不以金錢為幣専意扵農故一夫不耕必有受其飢者今漢家鑄錢及諸鐵官皆置吏卒徒攻山取銅錢一嵗功十萬人以上中農食七人是七十萬人常受其飢也鑿地數百丈銷隂氣之精地藏空虛不能含氣出雲斬伐林木亡有時禁水旱之灾未必不由此也自五銖錢起以來七十餘年民坐盜鑄錢被刑者衆富人積錢滿室猶無厭足民心動揺商賈求利東西南北各用智巧好衣美食嵗有十二之利而不出租税農夫父子露暴中野不避寒暑捽草杷土手足胼胝已奉榖租又出藁税郷部私求不可勝供故民棄本逐末耕者不能半貧民雖賜之田猶賤賣以賈窮則起為盜賊何者末利深而惑扵錢也是以奸邪不可禁其原皆起扵錢也疾其末者絶其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣除其租銖之律租税禄賜皆以布帛及榖使百姓一歸扵農復古道便東漢章帝時榖帛價貴縣官經用不足朝廷憂之尚書張林言今非但榖貴也百物皆貴此錢賤故爾宜令天下悉以布帛為租市買皆用之封錢勿出如此則錢少物皆賤矣又塩者食之急也縣官可自賣塩武帝時施行之名曰均輸扵是事下尚書通議尚書朱暉議曰王制天子不言有無諸侯不言多少食禄者不與百姓争利均輸之法與賈販無異以布帛為租則吏多姦官自賣塩與下争利非眀主所宜行桓帝時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士劉陶上議曰聖王承天制物與人行止建功則衆悦其事興戎而師樂其旅是故靈䑓有子来之人武旅有鳬藻之士皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之議訪覃幽㣲不遺窮賤是以藿食之人謬延逮及盖以為當今之憂不在扵貨在乎民飢夫生飬之道先食後民是以先王觀象育物敬授民時使男不逋畆女不下機故君臣之道行王路之教通由是言之食者乃有國之所寳生民之至貴也竊見比年以来良苖盡扵螟蝗之口杼柚空扵公私之求所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重㢤就使當今沙礫化為南金瓦石化為和玉使百姓渇無所飲飢無所食雖皇羲之純徳唐虞之文明猶不能以保蕭墻之内也盖民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便或欲因縁行詐以賈國利國利將盡取者争競造鑄之端扵是乎生盖萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖徳愍海内之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶飬魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至焦爛願陛下寛鍥薄之禁後冶鑄之議聽民庶之謡吟問路叟之所憂瞰三光之文耀視山河之分流天下之心國家大事粲然皆見無有遺惑者矣臣嘗誦詩至扵鴻鴈于野之勞哀勤百堵之事每喟爾長懐中篇而歎近聽征夫飢勞之聲甚扵斯歌是以追悟匹婦吟魯之憂始扵此乎見白駒之意屏營傍偟不能監寐伏念當今地廣而不得耕民衆而無所食羣小競起進秉國之位鷹揚天下鳥鈔求飽吞肌及骨並噬無厭誠恐卒有役夫窮匠起扵板築之間投斤攘臂登髙逺呼使愁怨之民嚮應雲合八方分崩中夏魚潰雖方尺之錢何能有救其危猶舉函牛之鼎絓纎枯之末詩人所以眷然顧之潸焉出涕者也臣東野狂闇不達大義縁廣及之時對過所問知必以身脂鼎鑊為天下笑帝竟不鑄錢靈帝多蓄私藏收天下之珎每郡國貢獻先輸中署名為導行費中常侍吕強上䟽諫曰天下之財莫不生之隂陽歸之陛下歸之陛下豈有公私而今中尚方斂諸郡之寳中御府積天下之繒西園引司農之藏中廐聚太僕之馬而所輸之府輙有遵行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容諂姑息自此而進晉安帝義熙間議欲廢錢用榖帛西閤祭酒孔琳之上議曰洪範八政以貨次食豈不以交易之所資為用之至要者乎若使不以交易百姓用力扵為錢則是妨其為生之業禁之可也今農自務榖工自務器四民各肄其業何嘗致勤扵錢故聖王制無用之貨以通有用之財既無毁敗之費又省運置之苦此錢所以嗣功龜貝厯代不廢者也榖帛為寳本充衣食今分以為貨則致損甚多又勞毁扵商販之手耗棄扵割截之用此之為敝著扵自曩故鍾繇曰巧偽之民競藴溼榖以邀利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由扵兵亂積乆自至扵廢有由而然漢末是也今既用而廢之則百姓頓亡其財今括囊天下榖以周天下之食或倉庾充衍或糧靡斗儲以相資通則貧者仰富致之之道實假扵錢一朝斷之便為棄物是有錢無糧之民皆坐而飢困此斷錢之立敝也且據今用錢之處不為貧用榖之處不為富又民習来乆革之必惑語曰利不百不易業况又錢便扵榖耶魏眀帝時錢費榖用三十年矣以不便扵民乃舉朝大議精力達治之士莫不以宜復用錢民無異情朝無異論彼尚捨榖帛而用錢足以明榖帛之弊著扵已試世謂魏氏不用錢乆積累巨萬故欲行之利公富國斯殆不然昔晉文後舅犯之謀而先成季之信以為雖有一時之勤不如萬世之益于時名賢在列君子盈朝大謀天下之利害將定經國之逺術若榖實便錢義不昧當世之近利而廢永用之通業㫁可知矣斯實由困而思革改而更張耳近孝武之末天下無事時和年豐百姓樂業便自榖帛殷阜㡬乎家給人足騐之事實錢又不妨民也頃兵革屢興荒饉洊及飢寒未振寔此之由公既援而拯之大革視聽𢎞敦本之教眀廣農之科敬授民時各順其業㳺蕩知反務末自牧固以南畆競力野無遺壤矣扵是以往升平必至何衣食之足恤愚謂救弊之術無取扵廢錢宋武帝時言事者多以錢貨減少國用不足欲悉市民銅更造五銖錢國子祭酒范泰諫曰流聞將禁私銅以充官銅民雖失器終扵獲直國用不足其利實多臣愚意異不寜寢黙臣聞治國若亨小鮮拯敝莫若務本百姓不足君孰與足未有民貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛寔難王者不言有無諸侯不言多少食禄之家不與百姓争利故㧞葵所以眀治織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農民尚寡倉廪未充轉運無已資食者衆家無私積難以禦荒耳夫貨存貿易不在少多昔日之貴今者之賤彼此共之其揆一也但令官民均通則無患不足若使必資貨廣以収國用者則龜貝之属自古所行尋銅之為器在用也博矣鍾律所通者逺機衡所揆者大夏鼎負圗寔冠衆瑞晋鐸呈象亦啓休徴器有要用則貴賤同資物有適宜則家國共急今毁必資之器而為無施之錢扵貨則功不補勞在用則君民俱困校之以實損多益少陛下勞謙終日無倦庶務以身率物勤素成風而頌聲不作板渭不至者良由根基未固意在逺畧伏願思可乆之道賖欲速之情𢎞山海之納擇芻牧之説則嘉謀日陳聖慮可廣其亡存心然後苞桑可繫愚誠一至用㤀寢食文帝元嘉二十四年録尚書江夏王義恭建議以一大錢當兩以防剪鑿議者多同散騎常侍何尚之議曰伏覧眀命欲改錢制不勞採鑄其利自倍實救弊之𢎞筭增貨之良術求之管淺猶有末譬夫泉貝之興以估貨為本事存交易豈假數多數少則弊輕數多則物重多少雖異濟用不殊况復以一當兩徒崇虛價者邪凡創制改法宜従民情未有違衆矯物而可乆也泉布廢興驟議前代赤仄白金俄而罷釋六貨憒亂民泣扵市良由事不畫一難用遵行自非急病權時宜守乆長之業煩政曲雜致逺常泥且貨偏則病民故先王立井田以一之使富不滛侈貧不過匱雖兹法久廢不可頓施要宜而近粗相放擬若今制遂行富人貲貨自倍貧者彌増其困懼非所以欲均之意又錢之形或大小多品直云大錢則未知其格若止扵四銖五銖則文皆古篆既非下走所識加或漫滅尤難分眀公私交亂争訟必起此㝡是其深疑者也命㫖兼慮翦鑿日多以致消盡鄙意復謂殆無此嫌民巧雖宻要有蹤跡且用錢貨銅事可尋檢直由属所怠縦糾察不精致使立制以来發覺者寡今雖有懸金之名竟無酬與之實若申眀舊科禽獲即報畏法希賞不日自定矣愚者之議智者擇焉猥參訪逮敢不輸盡中領軍沈演之以為龜貝行扵上古泉刀興自有周皆所以阜財通利實國富民者也厯代雖逺資用彌便但鑠鑄久廢兼喪亂累仍糜􅄆漂滅何可勝計晋遷江南疆境未廓或土習其風錢不普用其數本少為患尚輕今王畧開廣聲教遐暨金鏹所布爰逮荒服昔所不及悉已流行之矣用彌曠而貨愈狭加復競竊翦鑿銷毁滋繁刑禁雖重奸避方宻遂使嵗月増貴貧室日處暋作肆力之氓徒勤不足以贍誠由貨貴物賤常調未革弗思釐改為弊轉深斯實親教之良時通變之嘉會愚謂若以大錢當兩則國傳難朽之實家􅑿一倍之利不俟加憲巧源自絶施一令而衆美兼無興造之費莫盛扵此矣上従演之議遂以一錢當兩行之經時公私非便乃罷孝武帝即位又鑄孝建四銖三年尚書右丞徐爰議曰貴貨利民載自五政開鑄流圜法成九府民富國實教立化光及時移俗易則通變適用是以周漢俶遷随世輕重降及後代財豐用足因條前寳無復改剏年厯既逺喪亂屢經堙焚剪毁日月銷減貨薄民貧公私俱困不有革造將至大乏謂應或遵古典收銅繕鑄納贖刋刑著在往筞今宜以銅鑄刑随罰為品詔可孝武帝時鑄錢形或薄小輪郭不成扵是民間盜鑄者雲起雜以鉛錫並不牢固又翦鑿古錢以取其銅錢轉薄小稍違官式雖重制嚴刑民吏官長坐死免者相係而盜鑄彌甚百物踊貴民人患苦之乃立品格薄小無輪郭者悉加禁斷始興郡公沈慶之立議曰昔秦幣過重髙祖是患普令民鑄改造榆荚而貨輕物重又復乖時太宗放鑄賈誼致譏誠以采山術存銅多利重耕戰之器曩時所用四民競造為害或多而孝文弗納民鑄遂行故能朽貫盈府天下殷富況今耕戰不用采鑄廢久鎔冶所資多因成器功艱利薄絶呉鄧之資農民不習無釋耒之患方今中興開運聖化惟新雖復偃甲銷戈而倉庫未實公私所乏唯錢而已愚謂宜聴民鑄錢郡縣開置錢署樂鑄之家皆居署内平其凖式去其雜偽官斂輪郭藏之以為永寳去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄并禁剪鑿數年之間公私豐贍銅盡事息姦偽自止且禁鑄則銅轉成器開鑄則器化為財剪華利用扵事為益上下其事公卿太宰江夏王義恭議曰伏見沈慶之議聴民私鑄樂鑄之室皆入署居平其凖式去其雜偽愚謂百姓不樂與官相闗由来甚久又多是人士盖不願入署凡盜鑄為利利在偽雜既禁樂入必寡云斂取輪郭藏為永寳愚謂上之所貴下必従之百姓聞官斂輪郭輪郭之價百倍大小對易誰肻為之彊制使換則狀似逼奪又去春所禁新品一時施用愚謂此條在可開許又云今鑄宜依此格萬税三千又云嚴檢盜鑄不得更造愚謂禁制之設非惟一旦昧利犯憲羣庶常情不患制輕患在冐犯今入署必萬輸三千私鑄無十二之税逐利犯禁居然不㫁又云銅盡事息姦偽自禁愚謂赤縣内銅非可卒盡比及銅盡姦偽已積又云禁鑄則銅轉成器開鑄則器化為財然頃所患患扵形式不均加以剪鑿雜以鉛錫衆折耳越若止扵盜鑄銅者亦無須苦禁北中郎府主簿顔竣議曰貨泉利用近古所同輕重之議定扵漢世魏晋以降未之能改誠以貨物既均改之偽生故也世代漸久弊運頓至因革之道宜有其術今云開署放鑄誠所欣同但慮採山事絶器用日耗銅既轉少器亦彌貴設器直一千則鑄之減半為之無利雖令不行又云去春所禁一時施用是欲使天下豐財若細物必行而不従公鑄利已既深情偽無極私鑄剪鑿書不可禁五銖半兩之属不盈一年必致扵盡財貨未贍大錢已竭數嵗之間悉為塵土豈可令取弊之道基扵皇代今百姓之貨雖為轉少而市井之民未有嗟怨此新禁初行品式未一須㬰自止不足以垂聖慮唯府藏空匱實為重憂今縦行細錢官無益富之理百姓雖贍無觧官乏唯簡費去華設在莭儉求贍之道莫此為貴然錢有定限而消失無方剪鑄雖息終致窮盡者曰應官開取銅之署絶器用之塗定其品式日月漸鑄嵗久之後不為世益耳時議者又以銅轉難得欲鑄二銖錢竣又議曰議者將為官藏空虛宜更改鑄天下銅少宜減錢式以救交弊賑國紓民愚以為不然今鑄二銖恣行新細扵官無改扵乏而人姦巧大興天下之貨將靡碎至盡空立嚴禁而利深難絶不過一二年間其弊不可復救其甚不可一也今鎔鑄有頓得一二億理縦復得此必待彌年嵗暮税登財幣暫革日用之費不贍數月雖權徴助何觧乏邪徒姦民意騁而貽厥愆謀此又甚不可二也民徴大錢之改兼畏近日新禁市井之間必生喧擾逺利未聞切患猥及富商得志貧民困窘此又甚不可三也若使交益深重尚不可行況又未見其利而衆弊如此失筭當時取誚百代乎南齊建元中太祖以南方錢少更欲鑄錢奉朝請孔顗上言曰食貨相通理勢自然李悝云糴甚貴傷民甚賤傷農三呉嵗被水潦而糴不貴是錢少非榖賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為累輕輕錢弊盜鑄而盜鑄為禍深民所以盜鑄嚴法不能禁者由上惜銅愛工謂錢為無用之器務欲數多而易成不詳慮其為患也夫民之趣利如水走下今開其利端従以重刑是導其為非而陷之扵死也漢鑄輕錢巧偽者多及鑄五銖民計其費不能相償私鑄益少此不惜銅不愛工之效也宋文帝鑄四銖至景和錢益輕雖有周郭而鎔冶不精扵是盜鑄紛紜而起不可復禁此惜銅愛工之騐也凡鑄錢與其不衷寜重無輕自漢至宋五百餘年制度世有興廢而不變五銖者眀其輕重可法得貨之宜故也自鑄四銖又不禁民剪鑿為祻既博鍾弊扵今豈不悲哉自晉氏不鑄錢後經㓂戎水火所失嵗多士農工商皆喪其業愚以為宜如舊制大興鎔鑄錢重五銖一依漢法嚴㫁剪鑿輕小破缺無周郭者悉不行得官錢小者銷以為大利貧良之民塞奸巧之路錢貨既均百姓樂業市道無争衣食滋殖矣太祖然之後魏宣武帝踐阼通直􅄆騎常侍甄琛表曰王者道同天壌施齊造化濟時拯物為民父母故年榖不登為民祈祀乾坤所恵天子順之山川祕利天子通之苟益生民損躬無吝如或所聚唯為賑恤是以月令稱山林薮澤有能取蔬食禽獸者皆野虞教導之其迭相侵奪者罪之無赦此明導民而弗禁通有無以相濟也周禮雖有川澤之禁正所以防其殘盡必令取之有時斯所謂鄣䕶雖在公更所以為民守之耳且一家之長恵及子孫一運之君澤周天下皆所以厚其所養以為國家之富未有尊居父母而醯醢是吝富有萬品而一物是規今者天為黔首生塩國與黔首鄣䕶假獲其利是猶富専口齗不及四體也且天下夫婦嵗貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而苟禁一池古之王者世有其民或水火以濟其用或巢宇以誨其居或教農以去其飢或訓衣以除其弊故周詩稱教之誨之飲之食之皆所以撫覆導飬為之求利者也臣性昧知理識無逺尚每觀尚古愛民之跡時讀中葉驟税之書未嘗不歎彼逺大惜此近狭今偽弊相承仍崇闗鄽之税大魏恢博唯受榖帛之輸是使逺方聞者罔不歌徳昔亶父以棄寳得民碩䑕以受財失衆君王之義宜其髙矣魏之簡税恵實逺矣語稱出内之吝有司之福施恵之難人君之禍夫以府藏之物猶以不施而為灾况府外之利而可吝之扵黔首且善藏者藏扵民不善藏者藏扵府藏扵民者民欣而君富藏扵府者國怨而民貧國怨則示化有虧民貧則君無所取願弛兹塩禁使沛然逺及依周禮置川衡之法使之監導而已詔曰民利在斯深如所陳付八座議可否以聞司徒録尚書彭城王勰兼尚書邢巒等奏琛之所列富乎有言首尾大備或無可貶但恐坐談則理髙行之則事闕是用遲回未謂為可竊惟古之善為治者莫不昭其勝途悟其達理及扵救世升降稱時欲令豐無過溢儉不致弊役飬消息備在厥中節約取足成其性命如不爾者焉用君為若任其生産随其啄食便是芻狗萬物不相似矣自大道既往恩恵生焉下奉上施卑髙理睦然㤙恵既交思拯之術廣恒思財不賙國澤不厚民故多方以達其情立法以行其志至乃取貨山川輕在民之貢立税闗市裨十一之儲收此與彼非利已也回彼就此非為身也所謂集天地之産恵天地之民藉造物之富賑造物之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有義已禁此淵池不専大官之御斂此匹帛豈為後宫之資既潤不在已彼我理一猶積而􅄆之將焉所吝且税之本意事有可求固以希濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後来經圗未之或改故先朝商校小大以情降鍳之流興復塩禁然自行以来典司多怠出入之間事不如法遂令細民怨嗟商販輕議此乃用之者無方非興之者有謬至使朝廷眀識聼熒其間今而罷之懼失前㫖一行一改法若易棊参論理要宜依前式詔曰司塩之税乃自古通典然興制利民亦代或不同苟可以富民益化唯理所在甄琛之表寔所謂助政毗治者也可従其前計使公私並宜川利無擁尚書嚴為禁豪彊之制也詔琛叅八座議事靈太后時朝議鑄錢以髙謙之為鑄錢都将長史乃上表求鑄二銖錢曰盖錢貨之立本以通有無便交易故錢之輕重世代不同太公為周置九府圜法至景王時更鑄大錢秦兼海内錢重半兩漢興以秦錢重改鑄榆荚錢至文帝五年復為四銖孝武時悉復銷壞更鑄二銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖錢至眀帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不随時而變竊以食貨之要八政為首聚財之貴詒訓典文是以昔之帝王乗天地之饒御海内之富莫不腐紅粟扵太倉藏朽貫扵泉府儲畜既盈民無困弊可以寜謐四極如身使臂者矣昔漢之孝武地廣財豐外事四戎遂虛國用扵是草萊之臣出財助國興利之計納税廟堂市列𣙜酒之官邑有告緡之令塩鐵既興錢幣屡改少府遂豐上林饒積外闢百蠻内不増賦者皆計利之由也今羣妖未息四郊多壘徴税既煩千金日費資儲漸耗財用將竭誠楊氏獻説之秋桑児言利之日夫以西京之盛錢猶屡改並行小大子母相權況今㓂難未除州郡淪敗民物凋零軍國用少别鑄小錢可以富益何損扵政何妨扵人也且政興不以錢大政衰不以錢小惟貴公私得所政化無虧既行之扵古亦宜效之扵今矣昔禹遭大水以厯山之金鑄錢救民之困湯遭大旱以莊山之金鑄錢贖民之賣子者今百姓窮悴甚扵曩日欽眀之主豈得垂拱而觀之㢤臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益穆公之言扵斯騐矣臣雖術愧計然識非心筭暫充錢官頗覩其理苟有所益不得不言脱以為疑求下公卿博議如謂為允即乞施行孝眀帝熈平初尚書令任城王澄上言曰臣聞洪範八政貨居二焉易稱天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成飬羣生奉順天徳治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法扵是國貨始行定銖兩之楷齊桓循用以霸諸侯降及秦始漢文遂有輕重之異呉濞鄧通之錢收利遍扵天下河南之地猶甚多焉逮于孝武乃更造五銖其中毁鑄随利改易故使錢有小大之品竊尋太和之錢髙祖㽞心剏制後與五銖並行此乃不刋之式但臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利于京邑之肆而不入徐揚之市土貨既殊貿鬻亦異便扵荆郢之邦者則礙扵兖豫之域致使貧民有重困之切王道貽隔化之訟去永平三年都座奏㫁天下用錢不依凖式者時被敕云不行之錢雖有常禁其先用之處權可聽行至年末悉令斷之延昌二年徐州民儉刺史啓奏求行土錢㫖聽權依舊用謹尋不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河南諸州今所行者悉非制限昔来䋲禁愚竊惑焉又河北州鎮既無新造五銖設有舊者而復禁斷並不得行専以單􅁝之縑踈縷之布狭幅促度不中常式裂匹為尺以濟有無至今徒成杼軸之勞不免飢寒之苦良由分截布帛壅塞錢貨實非救恤凍餒子育黎元謹惟自古以来錢品不一前後累代易變無常且錢之為名欲泉流不已愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有大小之異並得通行貴賤之差自依鄉價庶貨環海内公私無壅其不行之錢及盗鑄毁大為小巧偽不如法者據律罪之詔曰錢行已久今東尚有事且依舊用澄又奏臣猥属樞衡庶罄心力常願貨物均通書軌一範謹詳周禮外府掌邦布之入出布猶泉也其藏曰泉其流曰布然則錢之興也始扵一品欲令世匠均同圜流無極爰暨周景降代亡新易鑄相尋参差百品遂令接境乖商連邦隔質臣比奏求宣下海内依式行錢登被㫖敕錢行已久且可依舊謹重参量以為太和五銖乃大魏之通貨不朽之恒模寜可専貿扵京邑不行扵天下但今戎馬在郊江疆未一東南之州依舊為便至扵京西京北域内州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五榖則有負擔之難錢之為用貫鏹相属不假斗斛之器不勞秤尺之平濟世之宜謂為深允請並下諸方州鎮其太和及新鑄五銖并古錢内外全好者不限大小悉聽行之雞眼環鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限唯太和五銖二錢得用公造新者其餘雜種一用古錢生新之𩔖普同禁約諸方之錢通用京師其聽依舊之處與太和錢及新造五銖並行若盜鑄者罪重常憲既欲均齊物品㕓井斯和若不䋲以嚴法無以肅兹違犯符㫖一宣仍不遵用者刺史守令依律治罪詔従之而河北諸州舊少錢貨猶以它物交易錢畧不入市也熙平二年冬尚書崔亮奏𢎞農郡銅青谷有銅鑛計一斗得銅五兩四銖葦池谷鑛計一斗得銅五兩鸞帳山鑛計一斗得銅四兩河内郡王屋山鑛計一斗得銅八兩南青州苑燭山齊州商山並是往昔銅官舊跡見在謹按鑄錢方興用銅處廣既有冶利並宜開鑄詔従之孝眀帝時河東郡有塩池舊立官司以收税利是時罷之而民有富彊者専擅其用貧弱者不得資益延興末復立監司量其貴賤節其賦入扵是公私兼利世宗即位政存寛簡復罷其禁與百姓共之其國用所須别為條制取足而已自後豪貴之家復乗勢占奪近池之民又輙障吝彊弱相陵聞扵逺近神龜初太師髙陽王雍太傅清河王懌等奏塩池天藏資育羣生仰惟先朝限者亦不苟與細民競兹贏利但利起天池取用無法或豪貴封䕶或近者吝守卑賤逺来超然絶望是以因置主司令其裁察彊弱相兼務令得所且十一之税自古及今取輙以次所濟為廣自爾霑洽逺近齊平公私兩宜儲益不少及鼔吹主簿王後興等詞稱請供百官食塩二萬斛之外嵗求輸馬千匹牛五百頭以此而推非可稍計後中尉甄琛啓求罷禁被敕付議尚書執奏稱琛啓坐談則理髙行之則事闕請依常禁為允詔依琛計乃為繞池之民尉保光等擅自固䕶語其障禁倍扵官司取與自由貴賤任口若無大宥罪合推斷詳度二三深乖王法臣等商量請依先朝之詔禁之為便防姦息暴斷遣輕重亦凖前㫖所置監司一同往式扵是復置監官以監檢焉孝莊帝永安元年有詔廢塩池税長孫稚上表曰臣前違嚴㫖徑觧河東非緩長安而急蒲坂誠以一失塩池則三軍乏食也畧論塩税一年凖絹三十萬疋昔髙祖昇平之年猶創塩官加典䕶非與物競利恐由利亂俗也況今國用不足徴六年之粟折来嵗之資此皆奪人私財事不獲已豈若寳天産之貨而均贍以理乎臣已輙符所部依常收税時用錢稍薄御史中尉髙道穆表曰四民之業錢貨為本救弊改鑄王政所先自頃以私鑄雜濫官司糾䋲挂網非一在市銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又随之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沈此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鈆沙縦復私營不能自潤直置無利自應息心況復嚴刑廣設也以臣測之必當錢貨永通東魏孝静帝武定六年齊文襄王以錢文五銖名須稱實宜稱錢一文重五銖者聴入市用計百錢重一斤四兩二十銖自餘皆凖此為數其京邑二市天下州鎮郡縣之市各置二稱懸扵市門私民所用之稱皆凖市稱以定輕重凡有私鑄悉不禁斷但重五銖然後聴用若入市之錢重不五銖或雖重五銖而多雜鈆鑞並不聴用若有輙以小薄雜錢入市有人糾獲其錢悉入告者其小薄之錢若即禁斷恐人交乏絶畿内五十日外州百日為限羣官叅議咸以時榖頗貴請待有年王従之而止唐太宗貞觀十年治書侍御史權萬紀上言宣饒二州諸山大有銀坑採之極是利益每嵗可得錢數百萬貫太宗曰朕貴為天子是事無所少乏惟須嘉言進善事有益扵百姓者且國家賸得數百萬貫錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪唯道税鬻銀坑以為利益昔堯舜扺璧扵山林投珠扵淵谷由是崇名美號見稱千載後漢桓靈二帝好利賤義為近代庸暗之主卿遂欲將我比桓靈邪是日勅放令還第武后時麟䑓正字陳子昂上䟽曰臣聞王者富國強兵未嘗不用山澤之利臣伏見西戎未滅兵鎮用廣内少資儲外勤轉餉山澤之利伏而未通臣愚不識大體伏見劔南諸山多有銅鑛採之鑄錢可以富國今諸山皆閉官無採鑄軍國資用唯斂下人乃使公府虛竭私室貧弊而天地珍藏委廢不論以臣所見請依舊式盡令劒南諸州凖前採銅扵益府鑄其松當諸軍所須用度皆取扵資給用有餘者然後使㳂江諸州逓運􅄆納荆衡沔鄂諸州每嵗便以和糴令漕運委神都太倉此皆順流乗便無所勞擾外得以事西山諸軍内得以實中都倉廩蜀之百姓免扵賦斂軍國大利公私所切要者非神皇大聖誰能用之管仲云聖人用無窮之府盖言此也臣某言臣伏見聖母神皇陛下恭已受圗遐想至理將欲制馭中外永安黎元不欲煩擾烝人故為無益賤臣朝不坐宴不預軍國大事非臣合言伏見松當軍粮費􅅰過甚太平百姓未得安居臣忝班一命庶㡬仁𩔖不敢目見避諱忍之不言所以不懼身誅區區上奏冒越非次伏待顯戮惶悚死罪死罪陳奏狀以待罪謹言𤣥宗開元二十二年宰相張九齡建議古者以布帛菽粟不可尺寸抄勺而均乃為錢以通貿易官鑄所入無㡬而工費多宜縦民鑄議下百官宰相裴耀卿黄門侍郎李林甫河南少尹蕭炅秘書監崔沔皆以為嚴斷惡錢則人知禁税銅折役則官冶可成計估度庸則私錢以利薄而自息若許私鑄則下皆棄農而競利矣劉秩請禁私鑄錢議曰臣伏奉今月二十一日勅欲不禁鑄錢更令百僚詳議可否者夫錢之興由来尚矣將以平輕重而權本末齊桓得其術而國以霸周景失其道而人用弊考諸載籍國之興衰寔繫扵是陛下思變古以濟今欲反經以合道而不改作詢之芻蕘臣雖蠢愚敢不薦其聞見古者以珠玉為上幣黄金為中幣錢刀為下幣夫三幣握之非有補扵煖也捨之非有損扵飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一髙一下不得有常故與之在君奪之在君貧之在君富之在君是以人戴君如日月親君如父母用此術也是謂人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必由乎是奈何而假扵人其不可二也夫鑄錢不雜以鈆鐡則無利雜以鈆鐵則惡惡則不重禁不足以懲衆且方今塞其私鑄之路人猶冒死以犯之況啓其源而欲之従令乎是設陷阱而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畆者衆去南畆者衆則草不墾草不墾又隣扵寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不可行之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役扵富室富室乗之而益恣昔漢文之時呉濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者由人日滋扵前而爐不加扵舊又公錢重與之銅價頗等故盗鑄者破重錢以為輕錢錢輕禁寛則多禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴在扵采用者衆夫銅之以為兵則不如鐵以為噐則不如漆禁之無害陛下何不禁扵人則銅無所用銅無所用則益賤賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄無因鑄則公錢不破人不犯死刑錢又日増末復利矣是一舉而四美兼也惟陛下熟察之代宗永奉元年河東租庸使裴諝入奏事上問𣙜酤之利嵗入㡬何諝不對復問對曰臣自河東来所過見菽粟未種農夫怨愁臣以為陛下見臣必先問人之疾苦乃責臣以營利臣是以未敢對也上謝之拜左司郎中徳宗即位楊炎拜門下侍郎同中書門下平章事舊制天下財賦皆入左藏庫而太府四時以數聞尚書比部覆出納舉無干欺及第五琦為度支塩鐵使京師豪將求取無節琦不能禁乃悉租賦進大盈内庫天子以給取為便故不復出自是天下公賦為人君私藏有司不得計贏少而宦官以宂名持簿者三百人奉給其間根柢連結不可動及炎為相言扵帝曰財賦者邦國大本而生人之喉命天下治亂重輕繫焉先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虛雖大臣不得知則無以計天下利害陛下至徳惟人是恤恭計敝蠧莫與斯甚臣請出之以歸有司度宫中經費一嵗㡬何量數奉入不敢以闕如此然後可以議政惟陛下審察帝従之乃詔嵗中裁取以入太盈度支具數先聞興元間扵行在夾廡署瓊林大盈二庫别藏天下貢奉之物翰林學士陸贄上奏曰臣聞作法扵涼其弊猶貪作法扵貪弊將安救示人以義其患猶私示人以私患必難弭故聖人之立教也賤貨而尊讓逺利而尚亷天子不問有無諸侯不言多少百乗之室不畜聚斂之臣夫豈皆能㤀其欲賄之心㢤誠懼賄之生人心而開祻端傷風教而亂邦家耳是以務鳩斂而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也天子所作與天同方生之長之而不恃其為成之收之而不私其有付物以道混然忘情取之不為貪散之不為費以言乎體則博大以言乎術則精㣲亦何必撓廢公方崇聚私貨降至尊而代有司之守辱萬乗以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過㢤今之瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分税賦當委之有司以給經用貢獻宜歸乎天子以奉私求𤣥宗悦之新是二庫蕩心侈欲萌柢扵兹迨乎失邦終以餌㓂記曰貨悖而入必悖而出豈其明效歟陛下嗣位之初務遵理道敦行約儉斥逺貪饕雖内庫舊藏未歸太府而諸方曲獻不入禁闈清風肅然海内丕變議者咸謂漢文却馬晋武焚裘之事復見扵當今近以㓂逆亂常鑾輿外幸既属憂危之運宜増儆勵之誠臣昨奉使軍營出逰行殿忽覩右廊之下牓列二庫之名懼然若驚不識所以何則天衢尚梗師旅方殷瘡痛呻吟之聲噢咻未息忠勤戰守之效賞賚未行而諸道貢珍遽私别庫萬目所視孰能忍懐竊揣軍情或生觖望試詢候館之吏兼採道路之言果如所虞積憾已甚或忿形謗讟或醜肆謳謡頗含思亂之情亦有悔忠之意是知甿俗昬鄙識昧髙卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外扞兇徒内防危堞晝夜不息迨將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啗功勞無猛制而人不􅂝懐所感也無厚賞而人不怨悉所無也今者攻圍已觧衣食已豐而謡讟方興軍情稍阻豈不以勇夫恒性嗜貨矜功其患難既與之同憂而好樂不與之同利苟異恬黙能無怨咨此理之常固不足怪記曰財散則民聚豈其殷鍳歟衆怒難任蓄怨終泄其患豈徒人散而已亦將慮有構姦鼔亂干紀而强取者焉夫國家作事以公共為心者人必樂而従之以私奉為心者人必咈而叛之故燕昭築金䑓天下稱其賢殷紂作玉杯百代傳其惡盖為人與為已殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大盖同利與専利異也為人上者當辨察兹理洒濯其心奉三無私以壹有衆人或不率扵是用刑然則宣其利而禁其私天子所恃以理天下之具也捨此不務而壅利行私欲人無貪不可得已今兹二庫珎幣所歸不領度支是行私也不給經費非宣利也物情離怨不亦宜乎智者因危而建安眀者矯失而成徳以陛下天資英聖倘加之見善必遷是將化蓄怨為銜恩反過差為至當促殄遺孽永垂鴻名易如轉規指顧可致然事有未可知者但在陛下行與否耳能則安否則危能則成徳否則失道此乃必定之理也􅂅陛下慎之惜之陛下誠能近想重圍之殷憂追戒平居之専欲器用取給不在過豐衣食所安必以分下凡在二庫貨賄盡令出賜有功坦然布懐與衆同欲是後納貢必歸有司每獲珍華先給軍賞瓌異纎麗一無上供推赤心扵其腹中降殊㤙扵其望外將卒慕陛下必信之賞人思建功兆庶悦陛下改過之誠孰不歸徳如此則亂必靖賊必平徐駕六龍旋復都邑興行墜典整緝棼綱乗輿有舊儀郡國有恒賦天子之貴豈當憂貧是乃散其小儲而成其大儲也損其小寳而固其大寳也舉一事而衆美具行之又何疑焉恡少失多亷賈不處溺近迷逺中人所非況乎大聖應機固當不俟終日不勝管窺願効之至謹陳冒以聞謹奏贄為兵部侍郎上奏曰嶺南節度經畧使奏近日舶船多往安南市易進奉事大實懼闕供臣今欲差判官就安南收市望定一中使與臣使司同勾當庶免隐欺希顔奉宣聖㫖宜依者逺國商販唯利是求綏之斯来􅅰之則去廣州地當要㑹俗號殷繁交易之徒素所奔凑今忽捨近而趋逺棄中而就偏若非侵刻過深則必招懐失所曽無内訟之意更興出位之思玉毁櫝中是將誰咎珠飛境外安可復追書曰不貴逺物則近人格今既狥欲如此宜其殊俗不歸況又將蕩上心請降中使示貪風扵天下延賄道扵朝廷黷汚清時虧損聖化法宜當責事固難依且嶺南安南莫非王土中使外使悉是王臣若縁軍國所須皆有令式恒制人思奉職孰敢闕供豈必信嶺南而絶安南重中使以輕外使殊失推誠之體又傷賤貨之風望押不出貞元四年上嘗謂李泌曰每嵗諸道貢獻共直錢五十萬緡今嵗僅得三十萬緡宫中用度殊不足泌曰古者天子不私求財今請嵗供宫中錢百萬緡願陛下勿受貢獻及罷宣索必有所須降勅折税不使奸吏因縁誅剥上従之九年户部侍郎裴延齡奏檢責諸州欠負錢八百餘萬緡收抽貫錢三百萬緡呈様物三十餘萬緡請置别庫以掌之欠負皆貧人無可償抽貫錢給用旋盡呈様染練皆左藏正物延齡徒置别庫虛張名數以惑上上信之以為能富國而寵之左補闕權徳輿奏曰延齡取常賦支用未盡者充羨餘以為已功縣官市物再給其直以充别貯邉軍自今春以来並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末眀行賞罰今衆口喧扵朝市豈皆為朋黨邪上不従徳宗時擢韓洄為户部侍郎判度支洄上言曰江淮七監嵗鑄錢四萬五千緡輸京師工用運轉每緡度二千是本倍扵子今商州紅崖冶産銅而洛源監久廢請鑿山取銅即冶舊監置十爐鑄之嵗得錢七萬二千緡度費每緡九百則得可浮本矣江淮七監請皆罷又言天下銅鐵冶乃山澤利當歸主者請悉𨽻塩鐵使従之厯代名臣奏議卷二百六十二
