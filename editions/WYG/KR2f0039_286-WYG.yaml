body:
  text: 歴代名臣奏議卷二百八十六明楊士竒等撰禮臣宋英宗治平二年監察御史裏行吕大防上奏曰臣伏覩前古至治之世君臣相與之際必以至誠而無虗飾故光武能以赤心置人腹中而取天下唐太宗納魏鄭公之言不事形迹而開忠言之路竊見陛下待遇臣下禮數太隆雖使臣以禮聖人之所重然禮既過厚則誠有所不通至如富弼病足不能侍從請解機務章十餘上凡幾及一年莫非懇至至以牛馬自比而陛下不納張昪年幾八十體力已衰聰明已耗樞宻之務紛然不舉昪哀乞骸骨而陛下不從吳奎有三年之䘮自古人君不呼其門而陛下召其子而呼之者再遣使而召之者又再程戡辭老不能當邊事至恐死塞上免以屍柩還家為請而陛下不從外間物議衆皆以為不當然而臣亦以為過矣弼賢臣也陛下將用其人不止於今日使其病時得休於外則不病之日為報陛下深矣奎才臣也陛下將用其人亦不止於今使其服䘮之日得盡其孝於所親則服除之日必能盡忠於陛下矣昪與戡既老矣又皆哀請而求去矣陛下欲盡君臣之分則皆與之閒務使盡其餘年如此非獨弼奎昪戡之幸抑使中外羣臣皆知陛下優待大臣進退以禮亦何必過為虗飾曲事形迹使四人者之誠不得通於陛下哉伏惟留神財幸侍御史趙瞻上奏曰臣伏聞國有大政必諮故老君所共事必任舊人是皆書傳據援歴代所尚至若田千秋乗小車入殿蔡義用兩吏持行斯漢史所最著者焉然於武昭之朝遇臣誠厚而若千秋及義則後世終不稱此為賢盖於進退之分有所闕然也陛下自即大位已再周星將相大臣無不獲禮如張昪程戡屢上章疏情皆懇到諫臣臺司亦嘗論列陛下皆未聽從此乃復見大漢之盛事矣然聖君之恩遇為已厚矣二臣之誠禮為已備矣天下臣子亦莫不知之矣今機務浩繁邊防要重而陛下猶固留之非欲用之盖欲用名位寵祿以榮之爾曩者戡昪揚歴事任幸著聲迹帥府憲臺風望甚壯國家得人足備書錄今乃於筋力衰朽之時當内外將相之任未即引退豈無虗曠使天下士大夫之論不以為是本欲榮之終為陷辱是陛下待賢者之意未深而為老成之惠非至也今之臣僚上書求去或亦聊塞物議未能盡是本心士論之疑誰可曉也然則陛下獨有推恩之美而戡昪難逃持祿之迹惟陛下全二臣始終之善辨天下指目之謗遂其勤請成其令名實亦戡昪之幸莫大于此三年翰林學士承㫖張方平上言曰臣聞君尊臣卑人倫大義所以立朝廷之體定上下之分不易之道也故君前臣名著自上古陛下紹膺寶命光宅萬邦降意虗懐優遇羣下小大之臣進對率稱其官此乃等夷相推民吏奉上之言非所以正尊極而隆堂陛明王制而崇主威也孔子曰必也正名乎名不正則言不順言不順則事不成以至禮樂不興刑罰不中真宗嗣立之始厚待先朝宰臣吕端李沆初不呼名二臣上表固辭尋如常禮陛下歴數在躬及兹四年君臣之際尊卑之分别嫌明㣲在乎言動願陛下揔攬權綱威恩並用呼官過禮乞從寢削曰公曰卿足正名分長轡逺馭使無遺力則百職並修庶務以濟此逺者大者之體也神宗熈寧二年翰林學士吕公著上奏曰臣竊以古之仕者七十而致仕雖有不得謝者然年至而去實禮之常制盖當其壯也既竭勤瘁以任其事故及其老也則使之優逸以終其身此君上之至恩而臣下之極榮也然自本朝以來凡致仕者雖例改官資或推恩子弟年及而願退者常少議者以疲癃老疾之人其精神筋力不足以任職則或至於蠧政而害民故著令應年及而不退者自知州以下皆降為監當然比年以來致仕者亦不加多矣昔為守倅而今釐務雖至愚之人豈不以為辱然所以被辱而不去者亦由朝廷立法有以致之何則古之為仕者終身食其地今之致政者即日奪其廪古之仕者不出鄉里今則有奔走南北之勞古之仕者常處其職今則有罷官待次之費故自非貪吏及素有經産則其祿已常若不足一日歸老則妻子不免凍餒是以雖㢘潔之士猶或隐忍而不能引去議者不推其本則曰此皆無耻之人宜思所以重辱之此朝廷之恩所以愈薄而臣下之節所以益壊也臣愚欲乞應文武官致仕非因過犯及因體量者並依外任官例與給四分俸錢嵗時州郡量致酒粟之問如此則自非無耻之甚者莫不感抱恩徳而争自引去矣朝廷優之如此而猶不能去則雖重辱之亦不為甚過也或曰今國用方患不足則吏祿豈宜有増臣切以為今日所議正為年及而不退者彼若年及而不退則其祿故未嘗絶如自此人多引去則今之去而受祿者乃向之不去而居官者也臣所論者其實國無所費而足以全遇下之恩臣無重辱而足以去瘝官之弊伏惟陛下方以至仁厚徳風化天下則於優養耆老固所先務伏乞詳酌施行時宰相吕大防以旱乞罷位右諫議大夫梁燾上奏曰臣伏見陛下眷遇大臣極其恩禮不忍聞其過惡輕奪其位使傷其進退之名所以委曲覆容真有天地之賜為大臣者何以副陛下之深仁乎祖宗之時宰相率二三年以禮去今之宰相率二三年以罪去禮去者顧義重雖有功而必去罪去者顧利重非有罪則不去以禮去者可以復用以罪去者不可以再盖祖宗之大臣皆以名節自重一舉動必存大體必副人望不敢專寵祿以自愛不敢挾權勢以自强日思以得罪為憂以妨賢為懼故率三二年自引避位朝廷褒荅自有恩數其優者為使相其次猶超進數官為大學士其去位也名益重望益高眷益厚一旦復用則中外之民莫不以為宜皆為朝廷喜之此所以朝廷重也其間亦時有貪鄙之人當去而不去以固位戀祿清議已不容矣以之招致人言暴著過惡從而罷遣之殆不過一諫官一御史論之則已不能安矣如臺諫合攻連擊者甚少一有之則終身不得復用故以禮去者多以罪去者少大臣既以法小臣從而廉士大夫化之皆磨礪振潔以節操相高風俗純美由此道也比年以來大臣皆以竊祿偷安為計寖以成風雖有大過猶巧自掩盖恐其失位一二人言之不知去臺諌官共言之又不肯去至於紛紛不已上不能止其言竟出其章疏然後請退聖恩因而聽之公議為之鄙薄私友為之嘆惜䘮其節守敗其名譽冒其過咎終以疏絶朝廷雖以乏人而欲用之疑其姦心之不測畏其清議之不容卒不敢用必用其以次者安得人才衆多而為用乎朝廷將無人而用矣此不可不思也祖宗之時輔相之材非不多也然而進者必以其賢退者必以其禮去而復來所以用之有得也今輔相之材亦不多也然而進之不必以其賢退之必以其罪去而不可來所以用之不足也臣近嘗建言乞陛下許吕大防以自請罷去相位者正為其如此若陛下許大防令以禮去不惟大防得其進退之道且掩覆其罪狀不為言者之所指擿不為公議之所不容使之養望於外它日用之人必無敢議者設有議者其跡以無罪而去陛下主張之無累知人之明矣是於大防真有天地之賜足稱陛下眷禮之本意也非獨以安大防也又以示後來之人皆思以禮去位而漸以名節自重如祖宗之大臣也朝廷由是尊矣伏望聖慈以安危為計以治亂為念以養大臣之譽望為意以勵精搢紳之㢘隅為術保完大防今日之去存全大防它日之用兢謝旱烈之愆銷厭愁怨之氣上敬天道下順民心中不失君臣之恩一舉而三善得豈不美歟伏惟聖神采納天下幸甚同知太常禮院劉攽上奏曰臣等議以謂侍從之臣見於天子應對顧問講論古事不可安坐自若避席立語乃是常禮今公著等自以傳先王之道求異其禮是大不然何以明之凡九經章句之説出於近世諸儒訓故委瑣未必皆合於聖人侍讀之職傳道章句之學耳是使與舊史諸子雜陳於前而明主一采擇之然朝廷班制猶以侍講居侍讀之下祖宗建官之本意其可知也今忘其章句之細而自謂道徳備已不察侍從之實而求以師賔見異不亦繆乎議者又謂天禧之時侍者講者皆坐天聖之後皆立至今侍者得坐而講者立以謂有司之失臣等以謂侍從之臣預於閒燕坐立不同人主可以專之不可計校前後歸過有司至於人臣求自殊異取必於上則為不可昔仲尼正假馬之名而拜下違衆曰事君盡禮人以為諂也今人主之待侍臣自始見以及畢講皆賜之坐而從容焉上意優厚亦以至矣不可復以暫立為歉如公著等議臣等以為不可許張方平上奏曰臣讀春秋傳晋叔向被囚時祁奚老矣聞之乗馹而見執政韓起為言叔向謀而寡過惠訓不倦宜䝉寛宥之意起與之同乗以言諸公而免之祁奚不見叔向而歸盖祁奚之言為國非私叔向也今日傳聞有使者追蘇軾過南京當屬吏臣不詳知軾之所坐而早嘗識其為人起逺方孤生遭遇盛明之世然其文學實天下之竒才向舉制䇿高等而猶碌碌無以異於流軰陛下振抜特加眷奬由是材譽益著軾自謂見知明主亦慨然有報上之心但其性資踈率闕於慎重出位多言以速尤悔頃年以來聞軾屢有封章特為陛下優容四方聞之莫不感嘆聖明寛大之徳而尤軾僭易輕發之性今其得罪必縁故態但陛下於四海生靈譬如天之無不覆冒如地之無不持載如四時之無不化育於一蘇軾豈所好惡伏惟英聖之主方立非常之功固在廣收材能使之以器若不棄瑕􅅤垢則人才有可惜者昔季布親窘髙祖夏侯勝誹謗世宗鮑永不從光武陳琳毁詆魏武魏成謀危太宗此五臣者罪至大而不可赦者也遭遇明主皆為曲法而全之卒為忠臣有補於世自夫子删詩取諸諷刺以為言之者無罪聞之者足以戒故詩人之作其甚者以至指斥當世之事語渉謗黷不恭亦未聞見收而下獄也唐韓愈上疏憲宗以為人主事佛則夀促此言最不順憲宗怒而罪之其後思之曰愈亦是愛我今軾但以文辭為罪非有過惡臣恐付之狴犴罪有不測惟陛下聖度免其禁繫以全始終之賜雖重加譴謫敢不甘心臣自念朽質上荷異恩今伏在田廬無復㳙埃之補竊慕祁奚雖老猶不忘公室而申請叔向之義僭越上言自干鼎鉞不任惶懼待罪之至知審刑院蘇頌上論祖無擇疏曰臣聞古者命夫命婦不親坐獄盖不使始常貴者與徒𨽻辯訟所以養㢘耻而崇禮節也賈誼曰廉耻禮節以治君子故有賜死而無僇辱是以黥劓之刑不及大夫以其離主上不逺也又曰古者大臣有坐不㢘而廢不曰不㢘曰簠簋不飾坐汙穢滛亂者不曰汙穢曰惟薄不修坐罷軟不勝者不曰罷軟曰下官不職故貴大臣定有辠猶未斥然正以謼之尚遷就而為之諱也古之所以待士大夫一以禮義如此之重也國朝推鞫之制命官犯贓罪亦先勘干連人證驗分明方得追攝其餘有犯如事狀明白三次拒抗即勒令參對是一命以上犯罪與庻民有等差若其職列貴近上嘗所加禮以待之者誠宜寛其縲繫以存事體也近聞龍圖閣學士祖無擇昨知杭州日有不公等事發已降勅命就秀州置院推勘仍差内臣押伴往彼竊以無擇郡政因循自貽物議固當窮治以警具官然以遭遇三朝擢在近列出典藩服案轄一道罷郡未久一旦有罪便與嘗所統臨羣吏辭對曲直不惟彼處吏民聽望不足抑於朝廷事體頗有虧損嘗聞祥符中樞宻直學士邊肅知鎮州日以公費錢貿易規利又令部吏强市民羊及買女使王嗣宗以其事聞真宗皇帝以肅居近職不欲屬吏特命劉綜任中正以嗣宗奏示之肅即引伏遂坐貶官嘉祐中觀文殿學士孫沔知杭州日在任不法諫官御史交章論列仁宗皇帝止令本路體量得實而黜之翰林侍讀學士吕溱知成徳軍日侵用公使錢本路追劾當時不令溱就鞫直行責降今無擇所犯未甚於此三人者仍該今來徳音自非贓汙盡當原減而不候取問便令赴彼對獄其為頓辱甚矣況已有御史章奏制院可以依慿根究不必親令即訊然後當罪也臣等欲望聖慈以無擇職在近列嘗為本路案轄之官特許免赴秀州制勘只令淮南州郡聽候指揮俟彼獄具日朝廷據案就問引伏即依例責降如其拒抗自有常法如此足以彰聖治之朝待遇臣下進退以禮免令州郡長吏虗被困辱在於朝體抑有裨助也知杭州鄭獬亦上奏曰臣竊觀漢有天下習秦之弊自宰相而下有罪皆繫之獄文帝時賈生嘆惜而言之自後文帝養臣下有節本朝優寵近臣雖有罪而就獄者亦鮮近時如孫沔吕溱亦止於削官未嘗就獄今龍圖閣學士諫大夫祖無擇因御史言治杭州時事詔令就秀州獄臣嘗見制獄中文移及所出左證之人問之頗知其大槩無擇之所犯大者止以娼人薛希濤及屯田員外郎中任浩等請鑄鐘事臣熟究希濤事皆云無之證左甚明就使有此朝廷不容不過重削官而已請託鑄鐘事無擇亦不知任浩等受賂其餘請射屋地給賣祠部及酒歴予富民錢出息以助公帑造介亭等事此皆前后知杭州者常為之孫沔時人請地至多或連山林以予之造中和堂䨇門號為雄特梅摯造有美堂蔡襄造愷悌堂沈遘率民造南塔土木之費豈特一介亭比賣祠部取贏錢以資寒士此處處皆然給酒歴至今猶有請者至於稱曽祐受賂至萬餘緡臣見轉運司牓通衢募人告祐事卒無告者惟造書􅌮不還十數緡而已不聞納賂者至萬餘緡無擇所犯盖如此若陛下用御史言小則黜官大則廢為民皆可也乃令數千里冒寒雪馳驛就獄無擇官為諫大夫職為龍圖閣學士兼一路鈐轄可謂貴臣矣一日猝就獄與纍囚騈頭辯訊問供荅晝夜不得休息亦嘗卧病不許養疾至今五六十日獄猶未決如聞至京師追其家人以為證驗無擇孤老一身既無正室又無子弟室家之内止有數婢委之京師今若被追而來則是破其家矣罪不至誅而破其一家其如公議何無擇之未就獄客寄僧舍隨行惟一僕一指使家又素貧資用罄竭常將銀唾壺一隻質錢秀民畏恐皆不敢留質日就僧寺假貸數百錢以供朝夕或有憐者為之具饌獄囚見之皆為號泣士大夫及庻民聞之亦為感慟涕下杭民相率或就浮圖設齋㠯祈福祥亦嘗詣臣投訴臣已具事狀馳奏誠使無擇有大惡雖在纍係笞掠亦天下所共嫉然其所坐不至於此所以人心未能厭伏賈誼有言人主之尊如堂羣臣如陛衆庶如地堂高則難攀卑則易陵今無擇僇辱陛㢘隳矣陛下得不念易陵之漸乎今制獄所以稽留者以無擇所坐與言者不同故飜覆根究吹毛不已務欲合御史之言鞭笞之下何求而不得實恐獄成有鍛鍊之失非所以盡獄情者也臣欲乞聖慈特賜省察出無擇令在外供答無擇屈辱既久豈有拒抗惟恐不早得罪去爾至其成按陛下據其所犯雖重黜之無擇何辭如此則處無擇亦有禮矣無擇無子孫無强有力弟姪身在檻穽不見天日誰肯為言者臣不惟痛傷無擇一身之辱而實念陛㢘之廢非所以尊朝廷厲臣下示衆庶也豈敢誣罔陛下私為無擇營救干冒旒扆無任激切俟罪哲宗元祐元年御史中丞劉摯上言曰臣近見詔書以季秋大饗召南京太子太保致仕張方平赴闕陪侍今聞方平已有辭免者臣謹按方平盛徳元老其學誼志藴極高明而盡精微在仁宗時以文學論議居風憲侍從之任啟沃獻替風采􅏮然而尤䝉英祖之知神考之遇熈寧初擢為參知政事未及旬朔以家難去位除服還朝而王安石秉政矣方平論既不合又剛方不肯少屈於是去國在外以至退老平生之才曽未少施天下所惜自陛下臨政以來收進耆舊凡名徳之老皆在朝廷出入陟降有以敦風俗而重廟社化姦慝而鎮遐荒中外翕然復見祖宗人物之盛豈不休哉而於此時獨遺方平未見及之士大夫竊以為疑焉臣載惟國家毎遇郊饗大事必召舊人故老使來侍祠乃君臣之間至恩盛典然從來止舉故事備禮一詔之故其人亦備禮一辭之少有至者上下恩意滅裂施之虗文而已今聖上春秋鼎盛太母簾闈施政於斯時也惟患舊徳之不盡集於朝也況陛下初展帝饗而方平天下之大老臣愚欲望聖慈特遣中使稍加禮數上以大禮陪位詔之則方平不應不至既至召見賜之延問閲其議論考其志識或有可用則留之朝廷以自輔翼亦不必嬰以職事若其無足以當聖心則祠事既畢以禮遣歸而已亦自可以成就陛下貪賢貴齒渇見老成之意臣不勝震越摯又上言曰臣伏見陛下降詔遣使召太師文彦博赴闕惟彦博以勲名之重翊亮四朝可謂社稷元臣宜乎陛下思見其人而加禮起之甚盛事也臣竊觀自古以來莫不貴徳而尚齒然宗工大老遇之必以禮處之必以道故或尊之以為師保或養之以為三老五更或使之朔望一朝或間趨朝廷平章重事或有大政就而咨決考於前載故事具存今彦博之來在聖謀神慮必有以處之將一見其儀形而已耶又將有所咨訪耶將留之朝廷以自輔耶又將任之以政耶今外議但見宰相虗位久未除人皆以謂陛下必將以三省長官命彦博矣雖臣愚意亦不免出於此然臣謂誠若議者所料付以三省之政縁有官則有職有職則有事四海之大萬務之繁大小無所不總日夕裁決朝會陟降殆恐非八十餘年老臣之聰明筋力所能宜也有職事則不能無得失使任其責則傷恩釋而不問則廢法又非所以養元勲而尊舊老也彦博雖老矣然忠厚敦大足以慰士大夫心其氣畧足以彈壓强悍其威望足以鎮服四裔誠宜今日優游佐佑以為朝廷重古之人以老成有過於典刑盖為是也臣欲望聖慈詔彦博以本官朝朔望遇有軍國大事特賜宣召詢以籌䇿不須以官政嬰之夫以三師之尊獨承天子清問獻納以決大議而不勞以事此陛下之所以尊禮舊徳者至矣不親於權以進强君道不疲於職以休養老境而無累於出處之際此亦臣子之可以處而安也恩協義稱無以易此伏望決自聖心使天下無異辭臣不勝區區摯又上言曰臣伏覩制命以布衣程頥為通直郎崇政殿説書者恭以尊儒重道振舉遺逸使天下歸心固聖朝之所宜為也然臣竊惟進退者臣子之大節爵祿者天下之公器進退不失其義則人道立爵祿不輕所與則士心勸二者盖不可不慎也始頥以節行自守不槩意於仕也陛下高其風故以州推官西京教授起之頥既力辭從而赴召而陛下又以宣徳郎祕書省校書郎待之頥既至未即受命而陛下又賜之延對官之以通籍置之於經筵盖頥之遜避不已而陛下恩命每有加焉臣恐頥於出處辭受之際義有難安者也孔子曰如有所譽其有所試矣孟子曰仕有時乎為貧辭尊居卑辭富居貧頥好學求志有君子之行遭際盛世其心豈徒欲以聲名自售哉固願有所就也頥親老家貧兄顥有賢行官不達而死在頥之義當仕也為貧而仕則若孟子所謂居卑者可也今有譽而不試每辭而加進臣於是知頥之不敢受也若夫紛紛之論致疑於頥者非獨如臣之言也直以謂自古以來先生處士皆盜虗名無益於用若頥者特以迂闊之學邀君索價而已天下節義之士樂道不出如頥等軰盖亦不少彼無所援乎上故不聞爾又以謂頥辭免爵命之言曰前朝召舉布衣故事具存是頥之志欲為种放常秩而亟欲得臺諫侍從者爾臣固知論者之或過也然而是非疑似陛下亦不可以不察也聖人自有中道過之則偏天下自有常理背之則亂伏望陛下審真偽重名器聞頥方辭恩制乞降指揮依頥所乞成就其節止授以初命之官既使得以祿養其親又使受之有義免於似是之謗而後日見其可用進擢盖未晩也於陛下尊徳舉遺之道無過不及者不亦休哉又聞頥有所建請數事如欲令經筵侍臣坐講之𩔖又有非所宜言者衆傳以為咲不知有是事乎唯望速降聖㫖依頥辭免但命之以初官試之以西京教授庶幾成頥之志完頥之節以息羣議而亦不害異日擢用也夫㢘耻不立於天下也久矣今幸有一人焉若授受不當於義則使天下靡然益不以㢘隅為事豈不重哉門下侍郎司馬光上奏曰臣伏見皇祐二年陛下親祀明堂曽召前兩府杜衍任布二人陪位及禮畢陛下推恩特賜衍布子男各一人進士出身今陛下再舉希闊之典亦曽召前宰相龐籍陪位臣竊以籍曏守西邊宣力實多懐柔凶渠復歸皇化其在宰府屬蠻寇慿陵震驚二廣翼贊聖謀廓清醜𩔖及告老之年精力猶壯堅辭榮祿去位家居實朝家之碩臣方今之耆俊遇兹盛禮伏望陛下用杜衍任布前例特推恩於籍子男一人以慰其心足以示養老優賢増聖政之美侍御史王巖叟上奏曰臣伏覩近降聖㫖令隔截門下中書兩省諫官别開門出入不得與給事中中書舍人相通傳聞之初臣不敢以為信盖既謂之同省豈有異户而出不相見之理及觀敕文乃是信然臣愚不諭朝廷此舉之意若以謂欲絶漏泄之弊則臣以謂漏泄在人不在門户門户之禁素已甚嚴今更加申敕足矣何必以隔異門墻為事哉所隔異者乃二三諫官而已諌官為陛下耳目陛下每不惜推赤心以與之奈何於其所舍反若置疑也倘其人為可疑也則斥而逺之使勿居其地為可親也則宜與之無間者也陛下不與諫臣為宻而與誰為宻乎臣固知陛下無此意然事行則終累陛下耳自古置諫臣以能彌縫朝廷之闕使不見乎外為美故彌縫不厭早早則為功易而所全者多矣且朝廷之事終能使諫臣不知乎禁之雖嚴不過緩一二日終當聞耳茍有所未善能禁其勿言乎既不能使之不知又不能使之勿言則不若令早知而論之為有補也臣以謂廟堂之上精慮而審發政令一出天下無可得而議此乃所以為宻也今外人皆云非所以嚴制敕院也乃欲以限隔諫官使不聞省中事此聲流傳恐非朝廷美事臣竊為陛下惜之伏以陛下誠心好諫而樂聞有過故一言一動天下莫不歌美以為中理不可誤信此事使天下有疑於聖徳也伏望為國家愛惜大體以慰衆心特罷隔截兩省指揮且令仍舊幸甚五年給事中范祖禹上奏曰臣等伏見元祐元年九月司馬光薨十月降聖㫖勘會司馬康將來在陜州夏縣墳所仰河南府常與照管本家骨肉及園宅等至十一月又降聖㫖司馬光置到西京第宅園池及賜書令司馬康常切照管不得破動今司馬康身亡子植纔十三嵗本家徃陜州夏縣營葬却歸西京居住先有三班借職温景純係司馬康居父䘮日奏留本宅管勾理監當資任合至元祐六年十月任滿縁康妻子孤幼今來居䘮營葬更不比康存日欲乞特再降聖㫖下河南府令常與照管本家骨肉及園宅等幷再降指揮所有西京第宅園池及賜書令本家常切照管不得破動及乞候温景純滿日特再差管勾一次與理監當資任仍乞下西京帖付温景純照會遵守昔唐憲宗時魏徴子孫典宅於人淄青節度使李師道進絹請贖之翰林學士白居易上言太宗嘗輟殿材為魏徴起堂今其子孫貧乏自可官中為之收贖不宜令師道掠美憲宗深然之然則褒恤名臣之後貴其施之於上也今司馬光父子忠賢百姓追思不忘而妻子孤幼已䝉聖恩優恤備至其第宅及賜書本家必當保守更乞降一指揮幷留一使臣再任則其家始終受賜皆出朝廷伏望聖慈特賜矜察祖禹又上乞留文彦博劄子曰臣伏聞陛下已許文彦博求退降詔俟至中春議從所欲者彦博年八十五爵位已極唯是得解重任歸休私第乃其幸也陛下憫其過老以其累請而從之為彦博身計私計則可謂美矣若為朝廷計則臣請試言之彦博為相四十餘年歴事四朝仁宗時平貝州之亂名聞四裔英宗神宗時為樞宻相八九年先帝已加優禮許其致仕陛下嗣位復召而起之盖藉其威名宿望以為朝廷之重也京師及四方軍民久服彦博之名以為在朝廷則朝廷必重向若陛下不復召之則亦已矣今既起之則不可使輕去朝廷彦博雖老精力尚强卧置京師足以為重外則西北二虜必懐畏憚夫以四海之大若常無事則人人皆可為大臣矣豈無萬一非常之慮哉彦博在朝非謂日月有用盖備緩急或有時而用之耳當先帝之時足以容彦博閑退今二聖垂拱委政大臣尤宜得老成之人以服天下之心詩曰雖無老成人尚有典刑言老成之人重於國之典法也盖以其經歴既多但問以累朝之事所知尤勝他人況其别有所補哉今舊老唯彦博一人若去則其餘在朝者皆是後進無復前軰矣老者任用之日不久國家所宜重惜臣自聞陛下許彦博之去朝夕思慮竊謂陛下若欲彦博更得優逸但聽其解軍國重事以太師就第留之京師以備訪問不必再除致仕朝廷有貴老貪賢之美足以繫屬天下人心所得實多陛下進退元老臣不當預論議然臣職在侍從茍有益於國不敢不言惟陛下深留聖思更賜裁擇祖禹又上言曰右臣近準樞宻院錄白高陽闗路兵馬鈐轄兼河北第六將楊永節為母亡乞解官行服續據本路都總管司奏乞不許本官解官行服所貴得人協力勾當奉聖㫖依高陽闗路總管司所奏者臣檢會元祐編勅諸武臣丁憂者若係小使臣及元是軍班換授幷見任管軍或充縁邊路分總管鈴轄都監知州縣城都監寨主都同巡檢雖係大使臣幷不解官其乞解官行服者除縁邊任使奏候朝㫖外餘並聽臣竊以小使臣不解官行服已損孝治之風朝廷恤小官非俸祿無以養不得已而未之改耳自大使臣以上官既升朝祿亦足養而縁邊任使亦不解官其乞行服者又須奏候朝㫖帥臣因而奏留朝廷重違其請循例奪服唯狄詠是狄青之子帥臣為之奏請特許解官當今縁邊無異内地帥臣遭䘮者無不解官自餘將領寄任輕於帥臣非有金革之事而無故奪其䘮服全無義理若言藉才則方今武臣常患貟多豈至無人可使若恤其貧則在内地者均是人也何獨於縁邊恤之若以解官為優恩必待如狄青之子然後許之則父母之䘮無貴賤一也古者庻人有䘮三年不從征役豈可仕至升朝以上而不使執親之䘮臣愚欲乞今後大使臣以上丁憂者雖係縁邊任使並解官行服如遇有邊事即許本路奏留繫自朝廷指揮庻使武臣皆知禮法有益風教而緩急藉才亦不失金革從權之制如以臣言為然乞下有司修立貼黄臣竊以奪服之禮本非古典祖宗時文武官尚少故因襲前代權制不許解官今承平日久吏員益多宜使人知禮教或遇有邊事藉武臣宣力則奪其䘮服無所不可七年十月日龍圖閣學士左朝奉郎守兵部尚書蘇軾狀奏右臣等竊聞仁宗朝趙元昊寇延州危急環慶將官劉平以孤軍來援衆寡不敵姦臣不救平遂戰歿竟罵賊不食而死詔贈侍中賜大第官其諸子慶孫貽孫宜孫昌孫孝孫保孫季孫等七人諸子頗有異材而皆不夀卒無顯者家事狼狽賜第易主獨季孫仕至文思副使年至六十篤志好學博通史傳工詩能文輕利重害練達軍政至於忠義勇烈識者以為有平之風性好異書古文石刻仕宦四十餘年所得祿賜盡於藏書之費近䝉朝廷擢知隰州今年五月卒於官所家無甔石妻子寒餓行路傷嗟今者寄食晋州旅櫬無歸臣等實與季孫相知既哀其才氣如此死未半年而妻子流落又哀其父平以忠義死事聲迹相接四十年間而子孫淪替不蒙收錄豈朝廷之意哉今執政侍從多知季孫者如加訪問必得其實欲望朝廷特詔有司優與賻贈以振其妻子朝夕饑寒之憂亦使人知忠義死事之子孫雖跨歴嵗月朝廷猶賜存卹於勸奬之道不為小補季孫之子三班借職璨見在京師乞早賜指揮哲宗時軾又上奏曰臣近奉聖㫖撰賜文彦博吕公著今後入朝免拜詔書今又准内降指揮撰不允彦博辭避免拜批荅臣謹按禮經八十拜君命一坐再至所謂拜君命者傳命而拜非朝見也然且不免周天子賜齊威公胙曰伯父耋老無下拜公曰天威不違顔咫尺下拜登受所謂無下拜者拜於堂上非不拜也然且不敢鍾繇以足疾乗車就坐疑若不拜然亦無明文君前乗車豈足為法而馬燧延英不拜盖是臨時優禮無今後遂不復拜之文祖宗舊例如吕端之流以老病進對亦止於臨時傳宣不拜今來彦博公著今後免拜指麾自是朝廷優賢貴老度越古今無可議者但是臣有司合守典禮兼恐彦博公著終不敢當以臣愚見不若允其所請若聖恩優閔老臣眷眷不已遇其朝見間或傳宣不拜足以為非常之恩臣忝備侍從懐有所見不敢不盡所有不允批荅臣未敢撰軾為翰林學士上論張方平奏曰臣伏見太子太保致仕張方平以高才絶識博學雄文出入中外四十餘年號稱名臣仁宗皇帝眷遇至重特以受性剛簡論高寡合故齟齬於世然趙元昊反西方用兵累嵗不解公私疲極方平首建和戎之䇿仁宗從之民以息肩書之國史又於熈寧之初首論王安石不可用及新法之行方平皆逆陳其害大節如此其餘政事文學有補於世未易悉數神宗皇帝知人之明擢為執政會丁憂服除為安石等不悦而方平亦不為少屈故不復用今已退老南都以患眼不出灰心槁形與世相忘臣竊以為國之元老歴事四朝耄期稱道為天下所服者獨文彦博與方平范鎮三人而已今彦博在廷鎮亦復用方平雖老杜門難以召致猶當加恩勞問表異其人以示二聖貴老尊賢之義今獨置而不問有識共疑以為闕典願因大禮之後以向者召陪祠不至特出聖意少加恩禮或遣使就問國事觀其所論必有過人臣忝備禁近不敢自外昧冒陳列戰越待罪殿中侍御史吕陶奏曰臣聞三公者上應台階下同元首表正萬邦儀刑四海不必備其官不可名以職委任之重則以論道經邦燮和隂陽為事體貌之隆則御坐為起在輿為下非若六卿庶尹分曹治事而各有常責也漢世以來典章因革與古不同乃以丞相兼三公之事至成帝時始從何武之議特置此官光武中興孝明繼治皆能勵精以親庶政然而不知稽古建官之本意不明道揆法守之異宜乃以吏事課覈三公其人或失而其禮稍薄甚者有至罪斥詰辱之累君臣始終安得不戒今太師文彦博弼亮四世位冠一品才業推高於朝廷威名取敬於四方陛下接見儀刑特降褒召給供饋許肩舁恩數優宻前代莫擬深合古先聖人尊崇元老之義有大論議詢之而後定可也有大措置審之而後行可也經筵講道接之則師範嚴矣敵使在廷望之則國體重矣若乃居以一官責以庻事則臣愚猶以為未安盖三省之務參總萬目巨至於命令機權細至於簿書期㑹紛繷坌並日交於前而丞輔之職無所不統一有闕失責亦隨之雖彦博康寧强健材力裕然獨若閑暇而年過八十無預齋䘮豈可處之以勞惟宜待之以佚且古之養老以祝噎祝鯁居其前後豈為所養之人皆至衰耄而設之盖情之所恤者深則禮之所加者備安可因其康壯則必煩以事哉恭惟先帝考古作法更新官制以三省大臣執國之柄釐治萬務惟師傅之官久虗其位幸而有一人焉以四世輔弼之舊適居此職則固宜以論道經邦責之不必累以官事庶幾上顯朝廷褒崇勲徳之意下副四海具瞻之心臣待罪言路不敢以輕賤自黙惟陛下恕其狂瞽而裁之以義徽宗時陳瓘上奏曰臣伏覩近降聖㫖六曹尚書獨員上殿及文臣帯一路兵鈐及監司職任者朝辭日並須上殿指揮更不施行臣竊惟尚書之職其選甚高自行官制以來多自此官而除執政朝廷所以待之可謂厚矣元豐之末始有不得獨員上殿之法紹聖之初尋即改正所以示優禮而去疑貳也今復罷此指揮其故何哉監司當一路之寄兵鈐受方面之託以人主之好惡達於逺方不使一對清光何由面禀聖訓況先朝之法行之已久别無大害不必輕改臣今欲乞六曹尚書許獨員上殿及文臣帯一路兵鈐及監司職任者朝辭日並須上殿皆依舊施行高宗紹興二年吏部侍郎綦崇禮上奏曰臣聞君使臣以禮臣事君以忠君之視臣如手足則臣事君如腹心施報之道在古如此方今國步囏難需人共濟正陛下任賢使能以圖中興之時收用人材誠急先務然於號召之際或不能致欽盡禮以待之所謂真賢實能將卷懐而去彼屑就者非誘於利祿則迫以威刑欲其盡忠以為腹心之用不可得也臣伏見祖宗舊制凡在外除授内任及被召臣寮若學士以上職任及新舊宰執必降詔書以為赴闕之信至其下則或尚書省給劄吏部給符以聖㫖行下照會催促而已所以别等威示眷禮於貴近之臣也自興兵以來急於除用降詔之禮一切盡廢乃或有如敢遷延當重寘典憲之令矣兹豈所以待賢能之道哉臣愚欲望聖慈舉行故事凡六尚書及翰林端明殿學士以上職任幷新任與曾任宰相執政官若自外除授或被召應赴行在者並令尚書省日下報學士院頒降詔書以示待遇之禮且使外任近臣有所取信以離其官守仰稱陛下任賢使能之意高宗時張浚奏曰臣聞祖宗時優待臺諫之意欲以正紀綱補闕失實天下國家休戚所係不可忽也然祖宗施行賞罰必務覈實每有臣寮章疏論人在外則必委監司體究其大者遣使馳驛審驗在内則必稽考公案研窮取問然後施行責罰縱有不實置言者而不問此祖宗優待臺諫許風聞言事之本意也故當時臺諌所言無非事實未嘗指摘隂私以快已意亦未嘗猥屑言辭致傷國體不過論某事為是某事為非某為君子某為小人某為政有稱某為政無狀而已自崇觀以來大臣各立朋黨援引臺諫去其異巳者每有章疏朝廷不論虗實一切施行以無為有以是為非致有造不根之謗綴滛媟之辭士大夫平生立身一遭㸃汚遂為廢人況其間報宿怨陷正人情意百端難以立辨此最傷和氣敗風俗害教化之大者今陛下選用賢才任處臺諫以革前弊臣愚欲望除二府大臣每有臣僚章疏自合即日引去外餘乞體究指實然後施行至如事屬隂私别無跡狀皆寢而不問庶幾風俗漸厚更乞睿察浚又上奏曰臣聞孟子之言所謂故國者非謂有喬木之謂也有世臣之謂也王無親臣矣臣以為大臣用捨進退天下所視以為重輕古之人君必待以禮貌掩其過失非區區私之也謂不如是則朝廷不尊人望不孚天下不服其用意盖甚深也後世貪利急仕之徒專務指摘謗毁求為速進其自謀則至矣使大臣不韙之聲悉暴露於天下而啟敵人輕視朝廷之心兹豈有國家者之利乎臣仰惟陛下天資神武知畧超越是必欲慨然有為於天下異時江淮之間非並用大臣則不能以鎮撫中原之地非列置大臣則不能以彈壓當平日無事遇之以禮結之以恩殆未可一日忘也臣竊見廣東西路及䖍吉之間寇盜間作今已數年謂宜以大臣判䖍州兼廣西路採訪使判潭州兼湖㐮採訪使各許置親兵將佐明下詔書宣示置使之意民情利病得以上聞盜賊竊發得以處置異時福建兩浙皆大臣總安撫使事陛下進而有為可以忘南顧之憂矣伏望聖慈出自睿斷詳度施行浚又上奏曰先王制祿以代其畊用意深矣盖倉廪實而知禮節衣食足而知榮辱非特百姓為然今使委質而事人者仰無以事父母俯無以育妻子且不有多寡之數厚薄之差以激勸勤勞奬勵才智何以風動在位使自立於無過之地耶夫合天下之衆而君之欲舉得其歡心亦在乎本人情而為之制耳過制則紀綱亂不及則人心離是二者其失均也嗚呼仕宦不為利祿計者鮮矣儻夷齊之操人人為之則天下之士盡為山林之遊人主安得而器使之乎至於左右近習又宜深察而熟究者彼其生長富貴奉養有素日用不給何以責㢘將自營其私耶則有侵漁細民之嫌而怨謗日益生將受遺於人耶則有請求納賄之罪而國體日益損臣謂不若省其員優其俸然後責之以善則其從之也輕兹有天下國家之大計人主不可忽也權尚書禮部侍郎鄭剛中上奏曰臣嘗謂静退㢘耻百吏之所當勉然中人為善之心非聖人養成之無以自進故善治天下者制禮立法崇長禁戒未嘗不有勸沮之意焉臣伏聞祖宗舊制選人闗陞令錄滿六考致仕與初等朝官遇大禮許其封贈即滿六考而有贓罪者止以本官致仕遇大禮無復封贈之榮所以崇長禁戒成就中人而俾之為善也自舊法變廢選人致仕不得陞朝而此道亡矣何以言之郡邑之吏既粗更考第其榮親之念又不能一日忘茍前有致仕陞朝之路則性資静退之人便可恬然自守謹俟掛冠而去寧復干求徼倖為得已不已之事乎有如鄙賤饕竊不自愛重則致仕之法繩於彼陞朝之念動於中審較重輕必知顧惜所謂崇長禁戒成就中人為善之道莫大乎此朝廷靳此一官之後念親求進者數計資品往往欲歸而未能日暮塗逺者望絶朝路有至自棄而貪墨其傷多矣臣愚敢望聖慈下有司講明舊制應闗陞令錄滿六考無贓罪致仕者與通直郎遇大禮得封贈如法上可以崇長廉静之風下可以禁戒貪躁之吏是於朝廷之虗名雖畧有所費而於陛下之風化誠有補焉陸贄有言立國惟義與權誘人惟名與利惟陛下幸察右正言陳淵經筵進故事曰前漢書汲黯傳大將軍青侍中上踞廁視之丞相𢎞宴見上或時不冠至如見黯不冠不見也上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見欽禮如此臣聞汲黯在朝淮南王憚而寢謀世謂黯之忠知無不言言無不力故諸侯將叛畏之而不敢發黯於是為有功於漢矣臣竊以謂黯之忠古今鮮儷然使武帝棄而不用黯言何所發哉淮南寢謀雖曰憚黯亦武帝用之之功也何以言之方武帝欲崇儒術以興禮樂則用公孫𢎞為丞相欲定律令以振紀綱則用張湯為御史大夫欲攘夷狄以强中國則用衛青為大將軍丞相固上所親信御史大夫尤為用事天下重足而立大將軍貴寵無二公卿以下皆卑奉之而黯嘗廷詰𢎞以為齊人多詐始與人建議後皆倍之又責湯不能安國富民何空取高帝約束紛更之為又或説黯以為大將軍尊重不可不拜黯曰使大將軍有揖容反不重耶黯之正直不撓如此以故朝廷一時貴臣莫不憚之盖不特如是而已武帝招延士大夫常若不足然性嚴峻或小有犯法或欺㒺輒按誅之無所寛假當時在位誰不惴恐而黯面折廷諍終無所屈嘗謂武帝陛下内多欲而外施仁義奈何欲効唐虞之治帝為之變色罷朝且以黯為戅又以為愚又以為不學若不能堪者至其與嚴助論黯則必以社稷之臣目之此固武帝之所甚重而深與之也故史載武帝之待遇黯曰大將軍待中上踞廁視之丞相晏見上或時不冠至如汲黯見上不冠不見也盖武帝之欽禮黯其過於丞相大將軍如此則凡為將相大臣者安得而不憚故淮南憚黯由將相大臣憚之也將相大臣憚黯由武帝欽禮之也然則淮南寢謀非武帝之功而何臣又聞人主據天下之利勢生殺予奪唯我所欲其誰敢抗之以其莫敢抗也泰然居於民上無所畏忌則賢者懼禍亦將逺引深藏不復為世用矣賢者不為世用而讒諂面䛕之人得志其不及於危亂者無是道也故如武帝之好兵喜殺窮奢極侈實無足取至其欽禮汲黯以絶未萌之禍後世不可不法也祖宗之設臺諫官所以崇奬之者無所不至亦近於此雖無汲黯其誰敢不憚使常得其人又不亟除而輕去之臣知姦雄自兹屛息矣蘇軾有言曰姦雄之始以臺諫折之而有餘及其盛也以干戈取之而不足故崇奬臺諫莫尚於祖宗之法惟陛下念之淵又上論宰執不和奏狀曰右臣近聞宰相秦檜與參知政事李光因御前奏對互有異同不知所争何事而外議紛紛以為大臣不和有累國體臣身在闕門之外得之傳聞恐非其實以此累日未敢論列今又聞檜以疾在告光亦乞去則是大臣果有不和之迹矣臣職在諫省豈可不言臣聞舜命九官濟濟相遜和之至也衆賢和於朝則萬物和於野故簫韶九成而鳯凰來儀繫石拊石而百獸率舞夫功成作樂寫人心之和而已樂作而物應其理固然然所以感之則出於人心而非樂也子思子曰喜怒哀樂之未發謂之中發而皆中節謂之和致中和天地位焉萬物育焉夫中者和之隐於心而和者中之見於外者也此内外之符也通天下一氣耳動於此應於彼間不容髮矣致之有道則天地安得而不位萬物安得而不育兹其所以為舜之時乎且中無常位以偏而後見中足以召和而偏亦足以生乖和氣致祥乖氣致異各以𩔖應而國之安危繫之盖自古及今未有朝廷不和而能有為於天下者也今陛下躬行孝弟而逺人請盟不以兵車而疆土自復臣雖愚懵亦知其所自矣而朝廷之上一二大臣陛下所與同心協謀以終中興之功者方且各持偏見不能共和以濟國事臣未見其可也且光與檜争其事之小大緩急臣固不得而知之也然事小而緩亦當退而合議進而聽㫖都俞之間一言可喻何至廟堂之上聲色俱厲取笑四方乎昔光為小官已能力抗朱沖及陽朔之貶一時稱之逮守宣城譽望尤著然其性素剛不能下人屢進屢退皆緣難合而檜亦喜其為人引與共事光又謂檜臨難嘗有不奪之節欣然肯來惟上所用亦既踰年矣今者不顧往日之契而驟起異同之論事之輕重有不及慮而分之上下有不暇恤則其意必有在矣恐非一朝夕之積也必欲其再合宜非他人所得與者在陛下訓諭之如何耳若復丁寧告戒以今日之所當務者使之忘私以徇公宜若可合而猶或不能無芥蔕於胷中則其不能相與久處也可見矣縱復可以久處其不能降氣以相從協力以濟務又可見矣夫事有是非理有曲直非獨二人者自知之陛下固已深知之矣大臣去就固自有義進退之際惟明主裁之進士唐文若分教潼川府給事中勾濤薦自代詔赴行在所既至而濤出不得見文若奏書闕下畧曰昔漢高慢士四皓去之而西鄙少㢘耻之人光武禮賢嚴光友之而東都多節義之士陛下屈萬乗之尊駐蹕東南兩宫將歸五路初復正宜市朽骨式怒蛙以來豪傑與之共治寧遽惜此數刻之對耶書奏翌日召對便殿高宗大悦殿中侍御史張守上奏曰臣仰惟陛下勤恤民隐戒勅貪吏至誠惻怛内外具孚徳至渥也國家自真宗皇帝復圭田之制養廉息貪民用不擾伏覩建炎元年六月之詔並權住罷議者之意必謂國歩方艱用度未給然計其所得數亦不多無益邦儲有傷國體竊惟仁宗皇帝朝固嘗議罷范仲淹歴陳其不可慶歴之詔約為等差行之至今未見其害又況州縣小官俸有常格比年以來物價騰貴數倍曩時多藉職田仰事俯育一旦奪之則在官者必絀法以蠧民得替待闕者亦必犯義以奸利清白之吏恐致損節殆非所以厚風俗興廉耻致富强也事雖至㣲為害甚廣伏望聖慈依舊給還庶幾仰稱陛下養亷愛民之意孝宗乾道六年周必大上言曰臣觀漢詔有言吏所以治民也能盡其治則民賴之故重其祿所以為民也今治民之吏莫切於縣令而祿至薄徃徃墮中人於貪吏之域非古誼也按紹興令外縣知縣供給不得過十五貫仰事俯育何以餬口於是撰造名色並縁増加前後相承其數反多自非慕拔葵掛魚之廉安飯疏飲水之儉則或懼違衆或樂用例鮮有能自立者一旦偶因他事為猾胥姦甿所持方且低首下心冀幸茍免望其抑豪强戢吏姦革蠧弊斯亦難矣臣伏見近制堂除知縣許支供給錢四十千夫邑有大小任責則均且以郡守言之有堂除有部闕有大藩有小郡供給之數皆為一等豈於令宰而獨不然臣愚欲望聖慈送重修勅令所將天下知縣縣令供給斟酌近制増其所當得而禁其所不當得既有以養其廉斯可以責其清庻幾人盡其治少副陛下為民之意光宗紹熈四年起居舍人兼中書舍人陳傅良上劄子曰臣聞人主無職事以愛惜人才為職事夫愛惜人才徒貴之以爵位不若養其聲望之為美徒榮之以恩寵不若全其操履之為大凡立乎人之本朝爵位隆而聲望汚恩寵盛而操履闕此公論所甚不與也公論不與將為庸人則是貴之者適所以賤之榮之者適所以辱之也恭惟祖宗承五代之後士風極衰而一旦作興之至過漢唐而無愧三代無他道也養其聲望全其操履而已在仁宗時范仲淹歐陽修余靖尹洙之徒嘗以論大臣除授不當去國矣已而仲淹修等之賢果信於天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖仲淹修不能暴白於世而況不如仲淹修者乎在神宗時司馬光吕公著蘇軾之從亦嘗以争新法去國矣已而光公著等之賢果信於天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖光公著等不能暴白於世而況不如光公著者乎由是觀之愛惜人才必如是而後可不然將淪胥而為庸人夫庸人者一世所棄何鄉而立有臣如此國家何賴焉則亦非上之人之利也以臣所見近代人主覆䕶臣子容忍不棄未有如陛下者然以為愛惜人才則未也既曰覆䕶之而不謂之愛惜之者何也眷之於爵位恩寵之間而不務明其去就之誼故也比者有以臺官察朝士者矣陛下皆出之出之誠是也俄而並召兼用為卿將孰是孰非耶有以後省官駁從班者矣而陛下為罷給事中罷之可也已而並除職名一去為郡一降為王府官然則是均有罪耳有以諫官疏大臣者矣而陛下欲並用之大臣乞去不得請諫官乞去又不得請然則是俱賢耳雖然賢否混殽何以為國猶可解者則皆士大夫也至如臣衰懦攝官詞掖嘗不度踈賤論奏内侍不當為知省官雖䝉陛下納臣之章不行詞不賦祿既而其人至今出入禁闥與見任無異近復有㫖令兼他官則中書後省與黄門相持而不決號令自今可廢此尤不可曉者臣故曰陛下可謂覆䕶羣臣者矣而非愛惜人才之謂也臣不勝拳拳欲望陛下務明人臣去就之誼陛下誠以愛惜人才為職而明其去就之誼請自不肖臣始若以臣為可備使令則當去内侍以臣為不足備使令則當去臣臣之誼明則羣臣亦各務明誼羣臣各務明誼而後聲望不汚操履無闕羣臣之聲望不汚操履無闕是不謂國有人乎然後陛下可以委任而責成則亦非臣之私便也寧宗慶元元年大府寺丞吕祖儉上奏曰臣恭惟國家禍變固在靖康而亂所從生實自宣和之御筆夫黜陟廢置驟從中出而不從外庭是誠可以快意自便然宣和因是而成禍本者盖始因姦臣藉此以鎮壓羣議復因左右假此以盜竊威權由是忠直者獲罪順從者得親言莫予違而一言䘮邦之禍至不旋踵矣若吳幵莫儔之徒與敵為市痛在人心則又靖康覆轍也陛下始政清明講學不倦登用忠直天下盖將日望維新之政今日月曽幾何人之觀聽奚為浸異也首相之去豈為無罪中㫖直下無復體貌固非所以重股肱講席之臣所謂耆艾者片紙罷遣視為常事所謂舊學者論及近倖去之靡疑至或臺諫之官或一旦而並遷或以闕守而補外御筆行下復覺匆匆近者次相亟罷雖因論列然其陳竭忠力不為不多而從臣㣲有開陳者則與郡之㫖曽無留難仰惟陛下始欲威福操柄不假諸人庶可昭示總攬之意然宣和深弊則已莫不懐憂盖以陛下既疑外庭則腹心之謀耳目之用不容無所寄託左右前後地近情親巧伺意指固皆以順從為正然其間豈無其人所説偶合聖心黜陟廢置因而時得闗預怙恃恩寵招勢弄權旁若無人浸無顧忌若使其氣燄増長而威福集於私門則觀望趋附者浸多嚮公盡忠者浸寡臣深恐陛下不得盡聞事理之真實將孰與維持宗社哉伏望陛下鑒觀治體戒在宣和黜陟廢置益務審重體貌大臣以尊朝廷容養忠直以壯士氣有言逆于聖心未宜遽罪有言遜於聖志未宜遽褒凡左右前後過有将順過有激發則又願推原初念初政尤未易遽從法仁祖之規模用公議為予奪庶幾忠直者獲用順從者自踈而左右前後守其常分亦得保全寵祿将見國勢日以尊强實政日以修舉雖有變故菑害亦有所恃而不危矣臣志在愛君不遑他恤唯陛下財赦金宣宗貞祐初丞相高琪立法職官有犯皆的決右司諫許古及左司諫穆延和囉羅上言曰禮義廉耻以治君子刑罰威獄以治小人此萬世不易論也近者朝廷急於求治有司奏請從權立法職官有犯應贖者亦多的決夫爵祿所以馭貴也貴不免辱則卑賤者又何加焉車駕所駐非同征行而凡科徴小過皆以軍期罪之不已甚乎陛下仁恕決非本心殆有司不思寛静可以措安而專事督責故耳且官皆朝廷遴選多由文行武功閥閲而進乃與凡庻等則享爵祿者亦不足為榮矣抑又有大可慮者為上者将曰官猶不免民復何辭則苛暴之政日行為下者将曰彼既亦然吾復何耻則陵犯之心益肆其弊豈勝言哉伏願依元年赦恩刑不上大夫之文削此一切之法幸甚元世祖時東平布衣趙天麟上䇿曰臣聞大易有云天尊地卑乾坤定矣卑高以陳貴賤位矣夫有國之諸侯有家之大夫猶不可闕況於有天下者哉是以本乎天者親上本乎地者親下上有常尊下有常卑如此而已昔者聖人之立法也君以御臣臣以臨民民非君而難安君非臣而孰輔方今内外諸官或班行於玉筍之中或宣化於黄麻之下或為四海之繩墨或為一方之表儀皆國家之所以委治者也皆陛下之所以仰成者也疑而勿用用而勿疑方其欲用則詢於左右暨諸大夫暨國人以盡其誠設其誤用而罪著則或降之下職或屛之逺方或黜之而不齒或賜之以自裁皆可也今國家立統以來百官犯罪上自宰輔下及守令決付之理官而例於小民以鞫訊之有械繫之於市井者有鞭笞之於官署者有梟其首以儆戒遐邇者有醢其軀以薰蒸天地者甚非尊上卑下崇禮厚俗之方也古人有言曰人主之尊如堂羣臣如陛衆庶如地故陛九級上廉逺地則堂高陛亡級廉近地則堂卑是以黥劓之罪不及大夫若令與衆庶同黥劓髠刖笞傌棄市之法然則堂不亡陛乎夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也臣自年十五六時讀漢書至此未嘗不三復其文也此盖係風俗之盛衰邦本之厚薄官吏之廉否天下之治亂非細事也或者以為有罪之人與衆棄之何足以恤以臣意意之彼但得其末節而不得其本者也臣建此議豈欲恤夫有罪之人哉但惜王政之大端也夫中人之心禮之則無地自容而為善之心興矣辱之則自暴自棄而廉耻之維缺矣以不廉無耻之人豈能興化不能興化則害非一端民心不和天灾上應水旱相因下民困苦將何為哉伏望陛下載審方今之務定為悠久之規精選賢能處位居職凡百官有重罪而過誤則量等流之凡大夫以上有罪者不宜令卒徒詈辱之凡大夫以上有死罪者不宜加刑但聽其自裁可也如此則官廉民化之政成而乾坤之分定矣文宗至順二年河南河北道廉訪副使僧嘉努言自古求忠臣必於孝子之門今官於朝者十年不省覲者有之非無思親之心實由朝廷無給假省親之制而有擅離官次之禁古律諸職官父母在三百里於三年聽一給定省假二十日無父母者五年聽一給拜墓假十日以此推之父母在三百里以至萬里宜計道里逺近定立假期其應省覲匿而不省覲者坐以罪若詐冒假規避以掩其罪與詐奔䘮者同科御史臺臣以聞命中書省禮部刑部及翰林集賢奎章閣議之順帝時御史臺臣言故右丞相托克托有大臣之體向在中書政務修舉深懼滿盈自求引退加封鄭王固辭不受再秉鈞軸克濟艱危統軍征進平徐州收六合大功垂成浮言構難奉詔謝兵就貶以沒已䝉錄用其子還所籍田宅更乞憫其勲舊還其所授宣命從之歴代名臣奏議卷二百八十六
