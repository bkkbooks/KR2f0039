body:
  text: 歴代名臣奏議卷一百十二明楊士竒等撰田制後魏文成帝時民困饑流散豪右多有占奪主客給事中李安世上疏曰臣聞量地畫野經國大式邑地相叅致治之本井稅之興其來日久田菜之數制之以限盖欲使土不曠功民罔游力雄擅之家不獨膏腴之美單陋之夫亦有頃畆之分所以恤彼貧㣲抑兹貪欲同富約之不均一齊民於編戸竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世三長既立始返舊墟廬井荒毁桑榆改植事已歴遠易生假冒彊宗豪族肆其侵凌逺認魏晉之家近引親舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑争訟遷延連紀不判良疇委而不開柔桑枯而不採僥倖之徒興繁多之獄作欲令家豐歲儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其徑術令分藝有準力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均扵兆庶如阜如山可有積扵比户矣又所争之田宜限年斷事久難明悉属今主然後虚妄之民絶望扵覬覦守分之士永免扵凌奪矣帝深納之宋太宗時太常博士直史館陳靖上言曰逃民復業及浮客請佃者委農官勘驗以給受田土收附版籍州縣未得議其差役其田制為三品以膏沃而無水旱之患者為上品雖沃壤而有水旱之患埆瘠而無水旱之慮者為中品既埆瘠復患扵水旱者為下品上田人授百畆中田百五十畆下田二百畆並五年後收其租亦只計百畆十收其三一家有三丁者請加受田如丁數五丁者從三丁之制七丁者給五丁十丁給七丁至二十三十丁者以十丁為限若寛鄉田多即委農官裁度以賦之其室廬蔬韭及梨棗榆柳種藝之地每户十丁者給百五十畆七丁者百畆五丁者七十畆三丁者五十畆不及三丁者三十畆除桑功五年後計其租餘悉蠲其課太宗從之哲宗時畢仲㳺上奏曰有人則有田有田則有分田有瘠薄人有衆寡以人耕田相其瘠薄衆寡而分之謂之分分定而以名自占之謂之名田無甚難行者而至今不行則其制未均而恤之太甚故也盖周井田之法一夫一婦受田百畆餘夫二十五畆以至工商士人受田亦各有等而又分之不易一易再易之差以一夫一婦而受百畆無主客之别比今二百畆矣以不易一易再易之相掩而又有餘夫則比今三百畆矣什一而征無他賦斂而又嵗用其力不過三日則比今四百畆矣而何武之制自諸侯王及扵吏民皆無過三十頃以一諸侯王而財七八農夫此所謂制未均者也名田之議起扵董仲舒申扵何武師丹至晋泰始限王公之田以品為差而均田之制起扵後魏至唐開元亦嘗立法而卒皆不行夫名田之不行非下之人不行乃上之人不行也非賤者而不行乃貴者而不行也在上而貴者戴髙位食厚禄官其子孫而賞賜狎至雖田制未均猶當行也而何師之議則革扵丁𫝊董賢晋魏有存則名存而實去此則所謂恤之太甚者也今將議占田之數酌復除之法則周官之書漢魏隋唐之制有可行者有不可行者董仲舒以秦變井田民得買賣富者連阡陌貧者無置錐之地宜少近古限民名田以贍不足塞兼并之路其說雖正而不聞其制度何武之制太狹今日之制太無限宜約周官授田之數與唐世業口分之法参其多少而用之士大夫則因其品秩之髙下與其族𩔖之衆寡無使貴者有餘而貧者不足要之仰足以事父母俯足以畜妻子旁可以及兄弟朋友而不為兼并則善矣昔周官小司徒辨征役之施舍卿大夫國中貴者賢者能者服公事者老者疾者皆舍征秦民耕織致粟帛多與漢之孝弟力田皆復其身而丞相之子返與戍邉為踐更卒則今日之復除亦可因而為法九品者復其身亡品者復其子孫五品以上乃復其家而戍邉之制可易以助今齊民之役雖丞相子必使出泉以助之則下貧之室不困於重煩而在上貴者亦不純於僥倖然田制之未均可以均也非今日之患也廹於富家大室而恤之甚者則自漢已来未有以處之今日之患也夫事稽之於古而不合驗之於今而未見其利害測之於人情未得其中若是者誠難行也今占田之數復除之法稽之於古無不合驗之於今已見其利害測之於人情得其中加之無丁𫝊董賢之用事而今日之議過於何武師丹則無以富家大室為難而行之天下幸甚徽宗時李復上限田劄子曰臣竊見兼并强侈使小民不得安於朝廷愛養仁厚之政者無甚於今日盖小民無知非惟但見目前小利又多不給豪猾髙貲多張術以網羅之率餌其毒良田舊業浸併而盡且如一村昔有數十家為其兼并止有三五家又流而旁侵别村若火始炎勢熾未已是平日數十家盡歸一家心猶未滿又有占田已是中人百餘家之産者夫强者鳴鍾於堂列鼎於庭役保常民千百其指州縣之勢随其低昂弱者日浸以削嵗有不登則有轉徙流散之憂此不可不慮也著令雖有限田之法未嘗推行其法亦踈而未盡臣願詔有司重為講究使之詳宻别為立法官户百姓各為裁抑不敢侵齧貧弱以廣聖朝之仁政髙宗時中書舍人洪遵論限田劄子曰臣恭仰陛下愛民之心至誠惻怛近以臣僚建請行限田之制令臣等看詳行下其法本於抑兼并恤編户寛力役可謂盡善然州縣猾吏因縁為姦至於墓地蔬圃例皆紐計中下之家惟恐頃畞溢格至有貨鬻墳山以避徭役者甚非立法利民之本意而奉行之官不能體國漫弗加省臣愚欲望聖慈命户部行下令品官之家止限見在田産應山林園圃及墳塋地段並行豁除仍乞只以逐縣為率許依新制各計頃畞不通一州之數庶幾田制稍寛不致重擾天下幸甚光宗時知漳州朱熹條奏經界状曰臣準尚書省劄子備奉聖㫖指揮令臣相度漳州先行經界事聞奏者臣衰晩迂踈無所能似猥䝉聖恩畀以郡紱静惟僥冒常懼無以補報萬分今者乃幸遭逢聖朝不忌遐逺推行仁政首於二郡以臣適守是邦使得與討論之列其為慶幸何可勝言臣自早年即為縣吏實在泉漳兩郡之間中嵗為農又得備諳田畞之事竊見經界一事最為民間莫大之利其紹興年中已推行處至今圖籍有尚存者則其田稅猶可稽考貧富得實訴訟不繁公私之間兩得其利獨此泉漳汀州不曽推行細民業去産存其苦不勝言而州縣坐失常賦日朘月削其勢亦將何所底止然而此法之行其利在於官府細民而豪家大姓猾吏奸民皆所不便故向来議臣屢請施行輙為浮言所沮甚者至以汀州盜賊藉口恐脅朝廷殊不知徃嵗汀州累次盜賊正以不曽經界貧民失業更被追擾無所告訴是以輕於從亂其時初未嘗有經界之役也以此相持久無定論不唯汀州之民不能得其所欲而泉漳二州亦復并為所累弊日益深民日益困論者惜之今者議臣之請且欲先行泉漳二州而次及於臨汀既免一州盜賊過計之憂又有以慰兩郡貧民延頸之望誠不可易之良策也臣雖多病精力早衰無以仰副使令然不敢先一身之勞佚而後一州之利病竊獨任其必可行也然今已是仲秋向去十月農隙之時只有兩月之久若䝉聖慈特許施行則所有合行事件欲乞便令監司州郡一面施行若候得㫖方行奏請更俟報可竊恐遲緩不及於事須至條畫并此奏聞今具下項一推行經界最急之務在於推擇官吏臣昨因本路諸司行下詢究嘗具已見申陳欲乞朝廷先令監司一員專主其事使擇一郡守臣汰其昏繆疲輭力不任事如臣等者而使郡守察其屬縣令或不能則擇於其佐又不能則擇於他官一州不足則取於一路見任不足則取於得替待缺之中皆守臣踏逐申差或權領縣事或只以措置經界為名使之審思􅌻慮於其始而委任責成於其終事畢之後量加旌賞果得其人則事克濟而民無擾矣伏乞聖照許賜施行一經界之法打量一事最費功力而紐折筭計之法又人所難曉者本州自聞初降指揮即已差人於鄰近州縣已行經界去處取㑹到紹興年中施行事目及募本州舊来有曽經奉行諸曉筭法之人選擇官吏將来可委者日逐講究聼候指揮但紹興年中户部行下打量攅筭格式印本多方尋訪未見全文竊恐諸州亦未必有欲乞聖慈特詔户部根檢謄録㸃對行事一圖帳之法始於一保大則山川道路小則人户田宅必要東西相連南北相照以至頃畆之闊狹水土之髙低亦須當衆共定各得其實其十保合為一都則其圖帳但取山水之連接與逐保之大界緫數而已不必更開人户田宅之闊狹髙下也其諸都合為一縣則其圖帳亦如保之於都而已不必更為諸保之别也如此則其圖帳之費亦當少減然猶竊慮今日民力困弊又非紹興年中之比此費雖㣲亦恐難以陪備若䝉朝廷矜憐三郡之民不忍使之更有煩費則莫若令役户只作草圖草帳而官為買紙雇工以造正圖正帳専委守倅及所差官㑹計買紙雇工之費實用若干錢物具申漕憲兩司許就本州所管兩司上供錢内截撥應副如此則大利可成而民亦不至於甚病矣又據龍巖縣尉劉壁申經界之行惟里之正長其役最為煩重疆理畎畆分别土色均攤稅賦其在當時動經嵗役出入阡陌妨廢家務固已不勝其勞一有廣狭失度肥磽失宜輕重失當則詞訴並興而督責又随至矣然有産則有役適當重難使出心力以應役使亦無可奈何然彼皆鄉民安知經界書筭則必召募書人以代此役而書人能書筭必嘗為胥史之桀黠者莫不乗時要求髙價執役之人急於期限不免随索則酬而又簿書圖帳所用紙札亦復不貲執役之人安能勝此勞費竊謂經界之在今日不可不行行之亦不患無成若里正里長書人紙札之費有以處之則可舉行若坐視其殫力耗財如曩日恐非仁政之意也臣竊詳此意與臣所奏大指畧同而所陳利害更為詳盡伏乞參照特許施行一紹興經界打量既畢随畆均産而其産錢不許過鄉此盖以筭數太廣難以均敷而防其或有走弄失陷之弊也若使諸鄉産錢祖額素来均平則此法善矣若逐鄉産錢祖額本来已有輕重即是使人户徒然遭此一畨打量攅筭之擾而未足以革其本来輕重不均之弊無乃徒為煩擾而不免有害多利少之歎乎今来推行經界乃是非常之舉不可專守常法欲乞特許産錢過鄉通縣均紐庶幾百里之内輕重齊同實為利便伏乞聖照特許施行一本州民間田有産田有官田有職田有學田有常平租課田名色不一而其所納稅租輕重亦各不同政使坐落分明簿書齊整尚難稽考何况年来産田之稅既已不均而諸色之田散漫參錯尤難檢計奸民猾吏並縁為奸實佃者或申逃閣無田者反遭俵寄至於職田俵寄不足則或撥到諸色官錢以充之如此之𩔖其弊不可徧舉今来欲行經界若更存留此等名字則其有無髙下仍舊不均而名色猥多不三數年又須生弊為今之計莫若將見在田土打量歩畆一槩均産每田一畆随九等髙下定計産錢幾文而緫合一州諸色租稅錢米之數却以産錢為母别定等則一例均敷每産一文納米若干錢若干去州縣逺處逓减令輕米只一倉受納錢亦一庫交収却以到官之數照元分數分𨽻若干為省計若干為職田若干為學粮若干為常平逐旋撥入諸色倉庫除逐年二稅造簿之外每遇辰戍丑未之年逐縣更令諸鄉各造一簿今子午卯酉年應辦大禮寅申己亥年觧發舉人惟此四年州縣無事開具本鄉所管田數四至歩畆等第各注某人管業有典賣則示元係某人管業某年典賣某人見今管業却於後項通結逐一開具某人田若干畆産錢若干使其首尾互相照應又造合縣都簿一扇𩔖聚諸簿通結逐户田若干畆産錢若干文其有田業散在諸鄉者則併就煙㸑地分開排緫結並隨秋科稅簿送州印押下縣知佐通行収掌人戸遇有交易即将契書及兩家砧基照鄉縣簿對行批鑿則版圖一定而民業有經矣但或者尚疑如此則本州産田納稅本輕而今當反重官田納租本重而今當反輕施行之後爭競必多須俟打量了畢灼見多寡實數方可定議其說似亦有理伏乞聖照并與行下俟一面打量了畢别具利害申奏聞次一本州更有荒廢寺院田産頗多目今並無僧行住持田土為人侵占逐年失陷稅賦不少将来打量之時無人照對亦恐别生奸弊加以數年将遂不可稽考欲乞特降指揮許令本州出牓召人實封請買不唯一時田業有歸民益富實亦免向後官司稅賦因循失陷而乂合於韓愈所謂人其人廬其居之遺意誠厚下足民攘斥異教不可失之機㑹也伏乞聖照特許施行右謹録奏聞伏候勅㫖理宗淳祐六年殿中侍御史兼侍講謝方叔上言曰豪强兼并之患至今日而極非限民名田有所不可是亦救世道之微權也國朝駐蹕錢塘百有二十餘年矣外之境土日荒内之生齒日繁權勢之家日盛兼并之習日滋百姓日貧經制日壊上下煎廹若有不可為之勢所謂富貴操柄者若非人主之所得專識者懼焉夫百萬生靈資生養之具皆本於榖粟而榖粟之産皆出於田今百姓膏腴皆歸貴勢之家租米有及百萬石者小民百畆之田頻年差充保役官吏誅求百端不得已則獻其産於巨室以規免役小民田日減而保役不休大官田日増而保役不及以此弱之肉彊之食兼并浸盛民無以遂其生於斯時也可不嚴立經制以為之防乎去年諫官甞以限田為說朝廷付之悠悠不知今日國用邉餉皆仰和糴然權勢多田之家和糴不容以加之保役不容以及之敵人睥睨於外盗賊窺伺於内居此之時與其多田厚貲不可長保曷若捐金助國共紓目前在轉移而開導之耳乞諭二三大臣摭臣僚論奏而行之使經制以定兼并以塞于以尊朝廷于以裕國計陛下勿牽貴近之言以揺初意大臣勿避仇怨之多而廢良䇿則天下幸甚帝從之度宗咸淳三年司農卿兼户部侍郎季鏞上言曰夫經界甞議修明矣而修明卒不行甞令自實矣而自實卒不竟豈非上之任事者每欲避理財之名下之不樂其成者又每倡為擾民之說故寧坐視邑政之壊而不敢詰猾吏姦民之欺寧忍取下户之苛而不敢受豪家大姓之怨盖經界之法必多差官吏必悉集都保必徧走阡陌必盡量歩畆必審定等色必紐折計等姦弊轉生久不迄事乃若推排之法不過以縣統都以都統保選任才富公平者訂田畆稅色載之圖册使民有定産産有定稅稅有定籍而已臣守吳門已甞見之施行今聞紹興亦漸就緒湖南漕臣亦以一路告成竊謂東南諸郡皆奉行惟謹其或田畆未當則令鄉局釐正之圖册未備則令縣局程督之又必郡守察縣之稽違監司察郡之怠弛嚴其號令信其賞罰期之秋冬以竟其事責之年嵗以課其成如周官日成月要嵗㑹以綜核之於是詔諸路漕帥施行焉元世祖時趙天麟上䇿曰臣聞天時地利養萬姓於鴻鈞富户貧家皆一人之赤子理無輕重政貴施行臣謹按井田之法六尺為歩歩百為畆畆百為夫夫三為屋屋三為井井方一里凡九百畆其中為公田八家皆私百畆同養公田公事辦然後敢治私事百畆之糞勿奪其時八口之家可以無飢矣五畆之宅樹墻下以桑五十者可以衣帛矣井百為成成方十里成百為同同方百里同百為畿畿方千里臣甞計方千里之地提封百萬井山川城市等除百分提封之三十六外定六十四萬井為私田五萬一千二百萬畆其井中區除宅居二十畆之餘為公田五千二十萬畆又乘除粟稻等子粒之多寡每畆嵗只率一石五斗而計之則私田子粒可得七萬六千八百萬石公田子粒可得七千六百八十萬石其鰥寡孤獨無告者須先賑惠焉上下相睦貧富相均此隆周所以旁作穆穆迓衡而孟子所以不憚區區告人也自嬴秦變法之後富者田連阡陌而貧者無置錐之地回思古道邈矣哀哉越至於今迫於豪富官貴而不能復也我聖朝東西南北地境無窮國家用費之資僅足下民愁嘆之聲未絶且古者方千里之地得公田子粒七千六百八十萬石方今能得之乎臣知其㫁不能也伏見今王公大人之家或占名田近於千頃不耕不稼謂之草場專用牧放孳畜又江南豪家廣占農地驅役佃户無爵邑而有封君之貴無印節而有官府之權恣縱妄為靡所不至此而弗治化寔難行又貧家樂嵗終身苦凶年不免於死亡荆楚之域至有雇妻鬻子者雖土風之常然亦衣食不足之所致也衣食不足由豪富之兼并故也方今之務莫如興復井田尚恐驟然騷動天下豪富之家宜限田以漸復之伏望陛下一新田制凡宗室王公之家限田幾百頃凡無族官民之家限田幾十頃凡限外退田者賜其家長以空名告身每田幾頃官階一級不使之居實職也凡限田之外蔽欺田畆者坐以重罪凡限外之田有佃户者就令佃户為主凡未甞墾闢者令無田之民占而闢之且全免第一年租稅次年減半第三年依例科徵凡占田不過限凡無田之民不欲占田者聽凡以後有賣田者買田亦不可過限也私田既定乃定公田公田之法凡九等一品者二十頃二品者十八頃三品者十五頃四品者十二頃其以下俱以二頃為差至九品但二頃而已庶乎民獲恒産官足養亷易曰君子以裒多益寡稱物平施此之謂也如是而行之五十年之後井田可以興復矣歴代名臣奏議卷一百十二
