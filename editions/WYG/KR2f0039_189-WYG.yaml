body:
  text: 歴代名臣奏議卷一百八十九眀楊士竒等撰賞罰宋髙宗時龍圖閣直學士汪藻乞重罰贓吏劄子曰臣竊惟東南遭戎馬之禍生靈塗炭城郭丘墟其荼毒可謂甚矣幸於敵去民力稍寛而國家迫於贍飬官兵之須征斂未嘗少息重以羣盜竊𤼵官軍經由所至焚殘甚於敵至朝廷熟視無以制之而民心拳拳尊君親上一如平時陛下所當矜憐而思有以恤之也厥今所謂寛恤之大者莫先於去貪殘之吏自崇寧以来功利之說興士大夫不復知有㢘耻贓汚之人横行州縣非特不憂繩治而挾貲諧結者輙得美官故小人相效於入仕之初即汲汲乾沒以不能俸外經營為耻此風相承至今未殄縁此國家為敵人侵淩束手無計嗚呼亦可以少懲矣比来則又甚焉治州縣者𩔖以賊不入境官軍不至無科率藉手為恨何則平居之時無軍興之警無法外之斂十目所視須粗守三尺一有緩急則假此以掊民官取其一私取其十椎髄剥膚至無可誅求而後已此元元之民所以寃結而無告也臣竊聞祖宗時吏犯贓者無小大皆論棄市故人重犯法官曺為清今縦未能舉祖宗之典如擇其一二大者真決黥配以戒其餘仍令臺諫官以上嵗舉郡守一人保其終身如後姦贓與之同罪不得以自首原減而郡守監司於部内有贓吏不以聞朝廷而為他人所劾者罪亦如之庶㡬斯民漸被實恵藻又上奏曰臣昨論王革等不當因赦復職陛下親䧏徳音以為王革等係恭酌元犯䧏等陞叙今来臣僚論列若全不叙復即不霑登極赦恩可於逐官更行減等䧏職臣狂瞽之言既䝉陛下㽞聽又煩聖訓委曲開諭如此臣雖至愚豈不知幸然臣區區猶有不能已者敢因宋晦再為陛下陳之臣聞慶賞刑威曰君言賞而人不以為慶刑而人不以為威者非人君之道也陛下自臨御以来半年于兹矣宵衣旰食側躬修行非不勵精焦勞是宜天下之人無不畏威懐徳然兵出則叛將用則北士大夫方命偃蹇莫知聽上其何故哉以賞不當功罰不當罪故也其賞罰不當莫甚於因赦復職之人昔齊侯之郭問父老曰郭何故亡曰以其善善惡惡也曰若子之言賢君也何至於亡父老曰郭君善善而不能用惡惡而不能去所以亡自崇寧以来綱紀日紊其兼官據勢者非貲結權倖則權倖之親也非誤國開邊以取賞則奴事閹官以進身也如此等軰皆僕廝之材本非士𩔖乗時誖謬攘取公噐如盜賊然考其平生一無分毫可得之理以此清議不伸搢紳道䘮天下切齒馴致今日之禍幸陛下中興清議亦望稍伸搢紳亦望行志承平之風庶㡬可復彼一時饕竊之人雖盡行削奪適還其素分況名位已極矣家貲已積矣子弟已官矣親戚已顯矣士大夫猶謂有已不可追奪者為國家之恨今陛下亦既深知其非乃徒以赦恩之故復使纍纍然玷汙清貫將使終身保其寵榮一何小人常幸而君子常不幸耶臣恐蹈郭君不能去惡之戒而四方解體也或謂登極赦者人主非常之恩也於此而不復非所謂曠然一新者臣以為赦所當復者復其階官耳職不當復也何以言之階官者積嵗月可至而職名者人主所以待天下英俊一時甄擢之權苟非其人終身莫得而至也且謂之復者言其才足以當此偶縁過失奪之今赦其過失復之耳既止縁僥倖初無當得之理何名為復哉若小人其初得之如此其易既得之後奪之如此其難則英俊之人有以相謂矣曰我何以砥礪為哉正使褒遷不過與此曺等耳欲望風節之强事功之立豈不難哉議者又謂彼職名者朝廷既已與之矣若奪而不還如咨怨何臣以為人主與奪但問其當與不當而已昔管仲奪伯氏駢邑三百飯蔬食沒齒無怨言以其公也李吉甫相憲宗省冗官八百員吏千四百員亦不聞其咨怨也彼管仲吉甫人臣耳猶能使人退聽如此豈陛下以人主權勢之利革數十年名噐之濫而憂此數鄙夫不樂哉臣以為如宋晦軰治之不勝其多何足一一煩朝廷詞命伏望陛下詔有司取㑹凡有職名者自觀文殿學士而下直秘閣而上共若干人每職分為一等每等集為一𩔖各具得職奪職因依及其勞効過惡申三省用祖宗舊法每等止㽞數人無其人則闕其餘取㫖雖未奪者悉行追奪不止於不叙復而已又有雖嘗落職而寄禄官叨竊至銀青或通奉正議正奉者皆前日姦兇邪佞之人非所當得亦乞䧏至中大夫而止臣又聞昨䧏指揮前宰執子弟因恩澤帶貼職及待制以上者並罷而近日鄭修年億年公然以雜學士乞見朝廷亦不問而許之錢盖以誕謾落職初未嘗復也而於奏状擅帶龍圖閣待制而羣臣亦無一言及此者臣竊未喻臣愚欲乞如修年億年並明䧏指揮孰為當罷指定姓名鏤板施行如錢盖者問其何以復職如無所因即重行黜竄庶幾卿士大夫共為陛下守此名噐輔成小大之業章誼乞嚴棄城之罰状曰臣竊見金人自犯中原以来東北諸郡往往堅守逺者累年近者數月然後陷沒然朝廷於死事之人既未必盡録其勞固不足以勸矣而於生逃之人悉貸不問自兹以来淮甸江南守府郡者輙棄其城提軍旅者輙亡其衆平時擇富庶之郡建守禦之䇿飾說要求誓以死守一旦望風奔走不戰而潰上則國家無藩籬之助下則士民受屠戮之苦可謂誤國賊民矣朝廷不正典刑以為將来之戒又䧏詔令聽其退保是奪其自堅之心而教之走也今匹夫睚眦之怨而不能報者必求死友以自助豈有堂堂萬里之土疆巍巍累聖之基業搢紳介胄億兆之衆而無什百死士為朝廷守府郡者乎國家待士大夫専用恩禮而於棄城避敵之人刑不嚴罰不重則僥倖之風不可革效死之士不可致伏望陛下博稽衆論申嚴守禦之制以安宗社不勝大幸誼又乞加旌擢張琮等状曰臣伏見承事郎張琮元是李成幹辦官自李成不肻歸向朝廷琮更不歸李成軍中兼曾獻議收捉李成其謀畫具在近因告事人㢘裳疑是姦細送大理寺勘出前項情節已䝉朝廷諒其無他送吏部與合入差遣臣詳考張琮所為如此委是能眀逆順之理不失尊君親上之節誠使士大夫不幸為盜賊汚染者皆自洒濯如張琮李耆兩人則盜賊誰與共事哉今李成徒黨往往擒獲皆伏其辜而張琮李耆去就之節因獄犴而後眀比之盜賊之人固宜有辨昔魯君在楚季武子取卞遣其大夫公冶致問不告其故追而與之璽書公冶致使退舍而後知之終身不言季氏魯公賞以冕服春秋韙之今李成紿此兩人使之奏事而宻為攻襲之計兩人耻為其用而自歸於朝廷古之君子如魯大夫公冶眀於事君之義者不過如此所有張琮李耆伏望聖慈量加旌擢以為天下臣子莭義之勸不勝幸甚誼又論濫賞色目状曰臣伏覩勅文勘㑹崇寧後来濫賞之人竊取名噐今参酌立定條格量行追䧏許其自新遂措置到濫賞名色二十六項臣反覆熟考参之衆論有大不可者三臣觀朝廷以二十六項白身得官之人遂與元因有官循轉改官之人略為輕重止䧏四官此甚不可也夫無官之人本皆醫巫卜祝工商皁𨽻與夫游謁之小人權門之奴客也附㑹傾巧取媚一時言揚事舉略無可取蕪穢仕塗詎可止䧏四官而従士大夫之後㢤此其不可者一也又經今追䧏之後朝見堂除赴部注擬磨勘舉辟權攝並與無過人等則自兹以往前日敗亂法度㡬危社稷之人内之朝廷侍従外之知通監司皆可為也夫出身冒濫為市井小人之所不齒則列爵於朝得簉在公卿之列求其議論端慤尊主庇民未易得此其不可者二也又指揮到日不以内外見任得替寄居待闕官並限一月自陳其未經批書者不得赴任請給如此則州郡之間来者輻輳日不暇給當此髙秋州郡有貢賦供輸之職有警戒守禦之事何暇紛紛閱此文牒妨費日力哉其不可者三也朝廷自靖康建炎以来所䧏討論指揮論罪之文雖略懲惡之意甚嚴冒犯之流自知見棄公議盖已屏跡而恢恢之網亦不復冥搜上下相安矣今雖有意寛宥然恐蟻穴潰我長堤非立國紀綱之道也若其可行則文武二塗莫非王臣未可偏廢若其可議則前討論之文具在有司且可遵守異時國家閒暇􅁒講明政刑􅁒兼容賢不肖則少俟嵗月不勝幸甚臣觀累日以来朝廷於上件指揮内已數有更改則窒礙可知伏望睿慈更賜斟酌措置以安衆論殿中侍御史張守上奏曰臣聞賞不當功則無功者進功不獲賞則有功者怠比年兵不用命望風奔北凡賞罰失當以致之也自童貫譚稹之流用兵以来第賞之際専徇請託上則權勢次則親舊甚至於賄賂公行相與為市於是膏粱之徒不渉行陣者皆附名其間而被堅執銳冒犯矢石者或不得而預也朝廷惟慿所上功状之等差而班爵秩之輕重一有失當怨歸朝廷於是羣下解體鮮復自效方陛下信賞核實以圖中興而請託欺罔餘風未殄夫為將帥亦豈不欲士卒用命以成大功而故為是哉盖亦迫於權勢親舊之私紐於聞見習俗之弊未易遽革臣區區之愚􅁒於出軍之際委自主將别置軍籍自大將以至属官偏裨隊伍各列姓名量㽞空紙以書功績縂計其數従朝廷印押給付主將凡立功者某月某日獲若干級某月某日俘若干人之𩔖即日著其状于籍䇿勲之際随保奏状上之朝廷参考其實而後行之則冒濫之弊亦十去其六七矣盖置籍之初賞罰未分人有定數固自絶於請求凱還之後按籍論功又不容於增損求其失當盖亦鮮矣欲望睿慈詔三省宻院詳酌㫁而行之守又上奏曰臣聞傳曰善為國者賞不僭而刑不濫賞僭則懼及滛人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利滛是則聖人立國之意每過於厚不使過於薄也故傳又曰賞疑従予所以廣恩勸功也司馬軍法曰賞不踰月欲民速得為善之利也其意皆本於此伏覩靖康元年十一月詔書能率衆勤王或立功聽便宜權行補授文武官資候到闕正授於是四方之士各効所長官司依詔借補以官上之朝廷酌其功之大小而正授之信賞示勸中外具孚近者伏覩二月二十一日指揮應借官人内有委實曾習弓馬或武勇之人委諸路提刑安撫司依弓馬所格法公共比試將合格人兩司擬定合得名目徑申省部給進武進義校尉兩等文帖將元初借補文字毁抹繳申兹盖朝廷愛惜名噐杜絶冒濫之意甚善也然臣愚思之猶有所未盡請試言之一則難槩試以弓馬二則推恩太薄三則試格太峻四則得賞太緩何謂難槩試以弓馬立功之人色目不一或輸家財以助國費或齎躐書而冒險阻或有進士借補文臣皆未必有過人之勇也試之弓馬必無幸中臣愚欲乞借補文臣則試兵書戰䇿以為殿最若輸私財數多齎蠟書已達自無僥倖之理便可驗實免試授官何謂推恩太薄艱危之際有累立功效莭次借補有至陞朝官大使臣者設即試中乃與借初官者同得校尉未為允惬臣愚􅁒乞凡試中人於元借官上䧏三資以次補授無資可䧏人聽補守闕副尉何謂試格太峻弓馬格法乃白身人州縣解發中即補官今来借補之人各已立功若試不中則前功俱廢似於常情有所未安臣愚􅁒乞更於弓馬所試格法小加裁䧏使可通行何謂得賞太緩借補之人𩔖在一二年前及得所属保眀間闗以至行在更經有司問難始達朝廷已是艱滯今又令歸諸路安撫提刑司同共比議擬定然後解赴御營審試而後授官更須經渉年歳方得了畢臣愚􅁒乞且據逐處已保眀到功状就御營使司𩔖聚差官比試便與補授凡此數條實有利害又四方得賞歸鄉者亦已甚多一旦驟革之則有功同而賞異不能無幸不幸也方今敉寧四方正須􅈭賞以勸後来又况孔子以兵食可去而必􅁒存信而成湯之誓亦曰朕不食言若謂諸處保明不實在擇將帥而已行賞之際恐非所當致疑也所謂不幸而過寧僭無濫庻㡬合於古之賞疑従予及賞不踰月之義守又上奏曰臣聞刑賞威福人主之操柄也而朝廷者刑賞威福之所自出也人主之刑賞威福非朝廷則令不行而無以取信其弊至於人得以矯誣朝廷不恃人主之刑賞威福則勢不嚴而無以為政其弊至於人得以􅇒蔑故易曰非一朝一夕之故其所由来者漸矣日者苗傳劉正彦乗陛下駐蹕之初朝廷草昧之際縦兵誅殺至於扣閽脅制天子而刑賞威福遂下移於將帥之手忠義之士仰天扣心慟哭流涕而莫能救也賴天地祖宗之靈勤王之師協助信順曾不閱月而陛下反正既往之事追咎靡及而来者猶可思患而豫防也大抵武人握兵在手以殺戮為能事率意輕發不復知名義之重亦不復思他日誅滅之禍又况艱難以来朝廷微弱假借太甚𩔖皆驕惰怯於公戰而勇於私鬪此皆今日固宜痛懲而申警之伏望陛下眀慎賞刑之宜收還福威之柄皆由朝廷而出使將帥拱手而聴命於上不得假之以行其私則輕重適中而上下悦服仍乞下臣章嚴賜誡諭不特使知尊朝廷亦使之成功名保爵位也臣不勝惓惓張浚論功賞利害狀曰臣去嵗令韓世忠舉淮陽之師竟無成功夙夜震懼恨無以仰副使令伏念臣駑下不才陛下過聴委以兵事臣嘗伏而計之敵之盛強自古未有如今日者今每有舉措必欲戰無不勝攻無不克是責臣以難能之事矣使臣善為身謀不過斂兵自固坐受其弊而臣終不忍為此也世忠以淮陽之役不賞其下二年之間頗無進取之意彼欲擁兵固位自求保全耳而於陛下圖囘中興之䇿則未為得故今之論者莫不皆曰輕易舉兵事必無成虛費功賞朝廷甘聽其言不免且為偷安之計將日益以怠兵日益以老必欲求所謂一舉而勝之盖亦難矣竊譬之解牛頑髀固骨必勞新刃堅節既解無復難者今將求破大敵而欲一毫不挫萬舉有得不亦惑邪臣愚昧之見所陳奏章乞不付外惟陛下知臣之心故敢以瀆天聴伏望聖慈俯加照察御史中丞廖剛論賜圩田劄子曰臣伏覩近日聖㫖指揮將建康府永豐圩撥賜韓世忠士大夫聞之莫不駭愕臣竊契勘本圩計田九百六十頃嵗收米三萬斛它圩未有其比不知此賜出於宸衷抑世忠有請而陛下遂與之乎世忠帶三鎮節度使金玉滿堂􅁎侍列屋買田之資固當不乏若陛下特與是陛下繼封君之富而忘斯民之貧困也若世忠有請是世忠身為重臣曽不念國用艱窘民力殫竭而謀豐已不已也且世忠屏翰王室服勤盡瘁忠勇冠天下而獨此不知此臣所未喻也陛下亦嘗問大農嵗入㡬何而㑹其出乎艱難以来嵗入缺天下三分之二而所費倍於承平之時矧今河南新復勞賚經理用度益廣又非前日之比然則陛下於推恩之際可不重惜而輕出令乎諸將暴露之久其誰不知然而貴極富溢前古所無人主所以待遇之意亦前古所無請無不従求無不得亦前古所無未嘗奏功而寵數洊加亦前古所無此則諸將所當自省也漢髙祖之將無非戰勝攻取與共取天下者事定之後得保首領者無㡬今吾諸大將雖皆有屏翰之勞然坐享富貴未甞有攻城略地之事而恩眷日隆乃復求於人主不已其亦未之思乎江東圩田不知能㡬千頃若諸將人賜千頃所餘亦無㡬矣夫天下者天下之天下人主亦不得而私有之故一爵賞一賜予必有以合天下之心厭天下之公議故受之者不為泰而安且榮焉脫或不然雖莫或敢言然腹非者多矣朝廷舉措使天下皆不以為然則亦安用臣等為哉臣是以不敢避觸犯之誅臣之職也陛下儻以臣言為然欲乞宣示世忠聽其辭避亦所以保全其名節也如謂不然是臣每狂妄負陛下責伏乞賜罷黜施行御史中丞許景衡乞奨錄翟汝文劄子曰臣聞杭州軍人作過伏䝉寛恩特賜招䧏一城生靈咸戴再造之賜不勝鼔舞前此浙東帥臣翟汝文憤疾羣兇敢爾猖狂提兵渡江累以殄滅為請陛下深念横及無辜方示大信如従以䧏招安詔書汝文志雖未就忠則有餘矣臣竊見近世士大夫無首公體國之心懐徇私便文之計雖本職事尚皆滅裂不舉况能及其他哉今汝文聞鄰路兵變奮不頋身自任討賊之責有古方伯連帥之風賢於近世士習逺矣况汝文之在浙東拊循兵民風績可紀一路實賴以安臣愚欲望聖慈嘉其忠勇俯賜褒錄以為四方帥守之勸其於用武之時殆非小補也武義大夫曹勛上書曰臣竊見建炎初置賞功司尋即廢罷恐當時主者兼用他属之吏不得専掌致所行功賞因仍廢怠動經嵗月致獻言者得以藉口遂成無用而倂於他房竊原此司誠為今日之急葢古者賞不踰時又曰賞必以信是烏可以輕廢置哉意欲使掌有專官而亟行亦俾將士知功有專治而不雜信賞之政中興所先也欲乞復置賞功司専行戰陣功賞等事委能吏典治仍置簿月書已收行過某人功賞名件上司季攷其數或多至千百量與官吏推恩以勸其職胡寅上疏曰臣聞臯陶告舜曰天命有徳五服五章哉天討有罪五刑五用哉視天好惡無私於其間而天下治矣古之世仕而有罪則廢黜之甚則流放竄殛之此堯舜之仁政非刻薄也今有罪者自非編置咸得食宫祠之禄夫禄之為物天生之地成之百姓奉於縣官王府賦於諸吏凡以飬民而非飬有罪之用也豈不與天意戾乎臣愚謂縦未能大有變革猶當為之分别使優賢飬老均逸之美意不與得罪斥去者等則凡因得罪斥去而與宫觀者勿與理作自陳仍加權字於提舉主管之上而其俸給人従並當减半庻㡬功罪不淆賞罰不偏人知所勸沮亦足少奉天討之公其於國政已非小補矣如合聖意乞䧏睿㫖立為定制施行周林上奏曰古者賞罰功罪各有所始同於有罪而行罰自貴近始同於立功而行賞自微賤始先其所難也軍興以来推賞者屢矣髙官峻秩先於主將其下士卒雖有立功之人多是沈於微賤艱於條具拙於計㑹積日累月徒費文墨不能速受恩賞遂致勇敢有功之人不無怨望欲望敷奏特䧏指揮今後勝㨗先須􅈭賞戰鬪立功之人已得了畢然後賞大將次及謀機幹議等官實為士之勸亦為將帥之美兩浙西路安撫使葉夢得論招捕倪従慶各官功賞状曰臣竊見昔時方臘作過當朝廷無事一路兵力全備之時將佐盡在所部不乏使令然慿陵州縣如蹈無人之境官兵莫可抵捍例遭殺戮遂致逺近響應陷沒六州二十七縣䝉朝廷遣童貫譚稹將帶西北驍將劉延慶王禀楊惟忠何瓘辛興宗等親總勁兵十萬餘人或䧏或誅方獲平定今来倪従慶等作過乃在金人犯順内外震擾之際州郡三次起𤼵勤王弓兵所在空虚將佐随兵前去使臣材武人又先已盡起赴闕人情驚疑姦宄觀望詹大和等元非當職任事之人偶因臣逐急委請乃能同心國事盡瘁竭力糾集烏合之衆初無制莭之令固守把截使不得衝突猖獗殘害生靈訖至納欵歸䧏保全兩路較之方臘事勢輕重難易數倍不同臣誤當帥閫人微望輕不能預為鎮撫以致盜𤼵部内若非藉此五人無以逃責欲望聖慈詳酌特降睿旨令與等第推恩雖見危致命臣子之常情然有功見知大君之羙意因以風示四方使伏節死難之士皆識聖心恢逺雖逺必聞雖細必錄則人人奮勵各思自效在於今日不為小補狂愚冒犯上瀆天聽無任惶懼孝宗時監察御史周必大上奏曰臣聞天下之事徇其名也易求其實也難漢宣帝功光祖宗侔徳啇周本出於信賞必罰綜核名實然王成以偽增户口賞楊惲以晻昧之語廢葢寛饒韓延夀以盡力之吏誅而黄龍詔書亦曰上計簿具文而已務為欺謾以避其課則宣帝所以見稱於史氏者亦何可盡信也豈不難哉陛下嗣位于今期月未眀求衣日旰坐朝夜分決事可謂勤矣而未能變一時之媮惰舊徳名臣收召殆徧片言小善擢用無遺可謂公矣而未能化一時之阿私意者綜核之政或有所未至歟臣試以賞罰近事明之邵宏淵能還軍中冒濫之恩倂録戰功而除正任觀察使此信賞也而郭振僅一對内殿既無舊勞又無新功亦以觀察使與之則重矣陸㢘以貪黷配流此必罰也至於張耘賊殺士卒乾沒軍資有司當以殊死而亦與㢘同罪則輕矣故臣願陛下大眀賞罰以照臨百官賞罰明則名實辨名實辨則政事可以内修敵人可以外攘夫何求不獲而何治不成㢤趙汝愚上奏曰臣伏讀甲戌詔書仰見陛下聖心焦勞思古哲王之治憫士大夫習俗媮弊是故以訓以戒為之丁寧懇切也臣竊惟陛下即位以来講求治要靡用不至而國家之勢未復乎安彊者誠以一時之人誕謾茍且其弊猶在有如明詔所言也夫天下之事不能自行使任事者則公肆誕謾自為速售之術不事事者則因循茍且指嵗月以待遷然則陛下何賴焉為今之術者必曰深刑重賞可以起媮惰而禁誕謾也夫賞罰者人主之至權執此以御天下頋亦何施不可臣所不知者陛下深居九重之中而羣臣功罪之實必欲人人論得其當亦豈陛下一智一力之所能盡㢤越五日戊寅臣伏讀陛下求言之詔許給舎臺諫於封駮章䟽之外雖事之至微亦毋致忽大㢤言乎臣愚仰見陛下無偏無黨如天地之無不覆載雖太宗之導人使諫不足進於此矣臣愚伏願陛下益選公正敢言之士悉舉而用之於朝使才與行相参可與否相濟陛下不忘終始之戒每虚懐而受之自然四方之利病毋壅於上聞懐姦之徒無所肆其巧然後是非明而賞罰行賞罰行而百工勸矣翰林學士洪遵上奏曰臣聞古者賞不踰時所以勸有功也漢髙帝初得天下定功行封疑若可後方汲汲然趣丞相御史惟軍功是務故反側以之安耦語以之息而漢業益隆用此道也仰惟皇帝陛下以剛明之㫁奮𤼵天威廼者法駕一臨元惡授首此葢天道助順聖徳昭格以濟登兹甚盛舉也竊見川陕淮漢之師暴露益久艱難多事之時冒犯鋒鏑奮不頋死其勞備至昨覩指揮應出戍官兵特與轉資立到功効别行推賞仰見陛下篤於信賞使之趨事赴功可謂善矣然而軍吏計功淹時不下議者云云懼無以勸後臣愚欲望聖慈申飭攸司凡立功將士亟行第賞庶㡬伍符尺籍之中踴躍自奮通知前日指揮不為虛文聖恩浹洽足以作成士氣萬一異時緩急之間有以激勸誠今日先務也貟興宗乞嚴爵賞状曰臣聞爵賞者國家之大紀也自昭其紀則無人不服自紊其紀則無人不輕苟一目稍睽則萬目漸弛或致胥商末流委巷餘子脅肩而冒禄攘臂而市爵雜揉士𩔖士䝉其醜此何義也且軍之有功功之有賞乃國家所恃以責實也三軍所恃以勸後也有司踈怠實已乖戾求以勸後將如之何傳曰非功獲爵則爵輕非罪肆刑則刑褻謂此𩔖也臣竊見比来軍功死事之家以功許補授子孫外並許其親異姓甥壻之𩔖申明受承是乃國家欲感士心荅天意收三軍後日之効可謂恩矣然朝廷雖有元創冒授指揮一一眀具今所在軍將保眀於大將大將保眀於本州本州𩔖申於省部如是則隄防檢押者甚至且宻也然而户為胠篋本以防盜也大盜至則并胠篋而取之人為法制本以防姦也大姦至則并法制以亂之今恩澤一下有力有貨賂取交闗同姓者遷作同房非親者指為近親委巷屠販一日華軒士卒驚頋此豈三尺賞功本旨㢤臣謂自今兵將死事之家既無的親子孫及其近属但當設法與給度牒及不理選限名目之𩔖使其曲折貨售恵滋一家終世飽暖亦無負矣何至紛紛欺隐捐國家之名噐輕授之人乎又近来死事之家多以無力陳乞而有力陳乞者決非死事之家彼有力則百方計㑹事雖虚誕必不沮難無力則事據雖實例䝉退却致使軍中勲力之後雖有正嫡子孫不免低直輕售葢壊陛下徳意者有司也昔康定詔書諸軍將校歿戰陣者並仰逐䖏仔細一一勘會如不實者亦有明科伏望申嚴是禁諸將諸州今後保明被受恩澤之人或不切仔細推考或勘㑹失實朝廷覺察並乞重賜行遣庶㡬爵賞之重有益國體興宗又議功賞状曰臣聞所謂大臣者任法不任私所謂常人者任私不任法葢天下所以治者法也所以擾者私也法既立則下無自而私私既勝則法無自而振國之號令且視此為屈伸矣三代之初因人之功罪以為黜陟當賞而賞當罰而罰故受賞者無不勸受罰者無不懲昔武王之為周躬履天下之籍有未下車而賞之者有始下車而賞之者盖於封墓式閭之餘遂起列爵分土之事使人目擊而心化武王之於功賞何致切切如此彼以鼓舞天下之術誠莫重乎此也是以賞之所在以為則成以化則勸經曰崇徳報功垂拱而天下治若安靖之初而羣功不報臣恐武王未暇垂拱爾此所以經營曲當示天下牢固不拔之具歴世三十載祀八百咸以是也傳曰祿賢不愛財賞功不踰時武王有以得之矣恭惟國家世載明徳太祖太宗之世威福兩柄如春如秋不吝髙爵重賞網羅真材實用如雷有終在蜀尚給功帖七千逮至仁宗皇帝遵而行之若賜曺利用則有據功遷補之詔若賜范仲淹則有空名宣劄之補天下之士皆悉力以衛其上當時非特可以氣使殆可名劫也今陛下天錫智勇之資又傑立於至治之世繩諸將以法度明諸軍以紀律又以賞功為最迩者命有司分為三等凡諸處保明歸義立功將士量功給還其資臣觀聖明威令超卓智者思効其謀勇者樂致其力縦横施設無自而不可此實希世之遇也臣愚尚恐邊逺之地軍吏出入未盡依得朝廷元䧏賞罰之格萬一有淹遲啓倖之人寃抑無告之士乞参以熈寧之詔意示之可也先是陜西宣撫司申諸路將士未依賞格者詔定立功將士應合酬叙之人令主將對衆叙定務従簡速將士有功主將對定既畢明具姓名申奏不得以隨身牙隊及親戚牙隊移換有功之人致抑壓可賞之士如士卒顯有勞績為人移易者為人抑壓者許經諸處自言如是則功者無所寃倖者無所得此賞功之本誼也今陛下明詔在前既盡其凡其餘指頋即定矣臣觀近来陜西死事之卒諸將非不欲優恤而諸司目頋纎末死事未滿旬日有先閣其請受者未滿數月有不受其告訴者彼有司但識斗斛之積為得意不識明主風勵士卒本意也臣愚併望朝廷申明舊禁凡死事之家至半嵗或周嵗然後始住請受仍許家之壮丁或家之至親一名填刺亦庻乎知朝廷徳意寛大也侍御史王十朋乞審核李顯忠等功罪劄子曰臣聞宿州之師不利而反議者皆歸咎李顯忠顯忠身為上將不能於勝敵之後撫存將士以保垂成之功遂致潰散而歸固不能無罪也然前日匈匈之議謂顯忠心懐南北蠱惑中外上貽聖憂今顯忠既還上章請罪亦足以見讒說之無驗矣說者又謂顯忠貪戀金帛欲為己有不分將士遂致離心理或有之恐亦未實兼顯忠亦劾奏統制官周宏等數人無故領兵自回遂致失利欲正宏等罪臣亦未敢以為然昔慶歴間趙元昊叛大將劉平遇賊于延州力戰而死都監黄徳和遁走誣平䧏賊朝廷信其言遽欲戮平之家賴仁宗聖明遣御史出理其事既得其實遂褒平死事之莭而斬誣告之人今正虚實未辨之時臣以為不可不審朝廷不如姑兩存之以安反側却令都督張浚審核虛實聞奏如功可贖過則許其自新責其後效如罪多功少實誤大事則不可不正典刑但審而後行庶使聖朝不致濫罰不勝幸甚中書舍人張孝祥上奏曰臣竊惟國家之所以懲勸天下賞罰而已然賞不當功則不如無賞罰不當罪則不如無罰何也功罪已著而賞罰未行則賞罰之權猶在也功罪著而賞非功罰非罪則為善者不勸為惡者不懼賞罰之柄於是失矣自聞西溪卒伍逃竄之事既兩旬浹其所以不惮死而竄者情之曲折陛下既已知之不待臣之言然二十日之間主帥而下未聞略有黜責外廷之臣不敢以為疑者意朝廷方此圖之而未也今兹則大不然朝廷既已不治其人而成閔乃敢無所忌憚公為劾章歸過隊將乞罷見任仍送吏部夫掊刻軍士役使軍士利入於己怨積於下者閔與統制統領官實為之也閔不為之則統制統領官安敢為之統制統領官不為之則將副部隊將安敢為之朝廷委曲涵容置閔與統制統領官等一切不問乃特用閔之言罷一隊將所謂隊將者何其獨不幸也㢤罰不當罪臣恐浸失賞罰之柄自此此輩愈更恣横輕侮憲章事雖至微闗繫甚重臣愚欲望聖慈將成閔與當来士卒逃竄本軍統制統領將副等官等第䧏黜其本軍統制官仍與罷免庶為餘人之戒或陛下聖意不欲如此行遣即乞將閔今来陳乞罷隊將劄子亦不施行以破小人詭計以慰士卒之心王之望乞旌賞戚方状曰臣契勘自金人諸路入寇兩淮荆襄川蜀敵馬所犯未有一處能抗拒者獨戚方兩次報㨗雖未為大勝亦能挫敵使之奔敗北去追奪所獲牛馬老小若金牛之兵不敗則此一路更無把截去處功亦不小朝廷宜加旌賞以振起士氣臣得三省樞宻院闗戚方兩次奏㨗備見忠勇若能保守不致衝突别立大功當議授以莭鉞縁戚方已係承宣使帶軍職若能保守不致衝突則將来自當授以莭鉞何俟别立大功若俟别立大功方始建莭則是今次兩㨗全無恩賞恐不足以􅈭勵將帥臣謂當再䧏指揮或陛下以御扎奨諭云若能保守闗寨摧折敵勢當議授以莭鉞更能别立大功即不次超擢仍令都督府日下疾速覈實具功状聞奏如此則於事為允乞更與執政議之衛涇上奏曰臣聞賞以勸有功罰以懲弗恪輕重貴乎適中不可有所偏也廼者癸丑之夕夀慈宫火陛下特䧏御筆以上驚慈闈徹樂避殿恐懼脩省夫以一人之尊躬自貶損不遑寧處而本宫官吏儲備無素守䕶不䖍惡得不任其咎陛下欽崇孝飬方務調娱未暇致詰提舉官吴回三人者懐不自安騰章自列旋頒睿旨各従鐫削可謂曲全之恩臣近縁忝冒承攝於詞頭中竊見指揮凡夀慈宫應奉官吏等到宫實及五年各轉一官資放其員數六百三十有四未及五年者又四百二十九人夫以平居無事安坐受賞若此猥衆而失職抵罰不過二三臣固疑之今臺臣有弹䟽乞將應奉官等黜䧏謂當大明典憲以警弛慢而所䧏聖旨王師珪王溶各䧏一官楊旦䧏一官罷幹辦事務人數多寡臣未敢問惟是吴回等自劾尚奪二秩王師珪等皆有論奏楊旦者罪状尤著例止削一階輕重毋乃有所偏乎况前日救火官兵陛下以慈闈之重隨即第賞曽不淹時賞固所以為勸而罰不足示懲頋何以詔四方而厲百辟乎借曰太皇太后聖意寛厚不欲重有誅責然賞罰之行紀綱所繫又安可以恩而廢法乎臣不敢以代庖之蹔有所隐黙欲望聖慈特𤼵睿斷將王師珪王溶照吴回等一體鐫䧏其楊旦再與鐫斥庶㡬少慰輿議儆肅宫臣懲勸之方斯為兩得王師愈上奏曰臣聞爵賞者人主之礪世磨鈍之具賞當功則人必勸或失之濫必害於政不可以不革也伏見紹興之初兩浙提舉市舶申請立定㳂海及近裏州軍税務稅過市舶物貨賞格州委通判縣委知縣與夫監官㸃檢稅過客人引外物貨收及壹千伍百貫減壹年半磨勘累及壹萬貫減四年磨勘可謂賞之濫矣且以經總制無額錢賞言之諸州軍解足經總制錢外而又無額錢及壹萬伍千貫知通只減二年磨勘今稅務收市舶引外物貨及壹萬貫乃減四年磨勘是倍於無額錢之賞矣自通判知縣至于監官被賞者數人豈不為太濫乎況夫文臣有以此賞轉員郎正郎武臣有以此賞轉副使正使遇郊恩或致仕遂可奏補子孫然則稅務獲一萬貫之小利推而言之被賞者豈止數人而已㢤可謂濫之至也臣愚欲望聖慈特䧏睿旨應㳂海及近裏州軍稅務收市舶客人引外物貨自壹千伍百貫至壹萬貫其減磨勘賞並皆減半庶㡬賞不至濫人亦自勸吏部侍郎李椿上奏曰臣聞書曰罪疑惟輕功疑惟重又曰賞當功罰當罪故自古聖賢所以稱治者亦信賞必罰而已伏覩近䧏聖旨指揮舉改官必具實迹臣仰體陛下聖意欲使臣下趨事赴功不為文具也茍有實立勞績而不與依條推賞者豈陛下之意㢤臣竊見吏部法選人有酬賞應循資者不許存留後任收使盖謂别有應循資條法可以循資者不許重疊循資故立此法亦出于省記未必本有此條然則實立勞績豈為冒濫何獨於選人乾沒勞績賞格遂為不信之令縁本部遵守上件條法遇有陳乞者盡是告示不行所以詞訴不絶臣愚欲乞睿慈下𠡠令所刪去吏部侍郎左選此條或重行修立條法使實立勞績之人不致乾沒其賞有以稱國家立法賞従重之意亦有以絶不已之詞光宗時蔡戡上奏曰臣甞讀西漢循吏傳竊恠漢二百年間班固所載循吏六人而止耳孝宣之吏居其五焉何天之䧏才獨盛於此時也及觀班固賛孝宣曰信賞必罰綜覈名實然後知孝宣馭得其道宜其循吏之多也盖賞罰者治天下之具名實者行賞罰之要人有為善之名必迹其為善之實従而賞之人有為惡之名必窮其為惡之實従而罰之人知為善而賞不踰時賞一人而千萬人勸人知為惡而罰不旋踵罰一人而千萬人沮所以勵世磨鈍作其好善之心絶其稔惡之路率天下為君子之歸自古堯舜之治天下不過如此孝宣之時吏稱其職民安其業盖有繇也恭惟陛下勵精為治逺邁漢宣於賞罰名實之際尤所加意天下之吏固當澡心滌慮殫智竭力以承休徳然未聞一人治行卓然可書如龔黄者以臣觀之名實未盡綜覈賞罰未盡信必故百吏未盡稱職也今朝廷欲知守令優劣俾監司第其臧否以聞于朝甚盛典也夫臧者天下之善名也律身以廉莅事以公與夫勤謹無過者皆謂之善也否者天下不善名也貪而徇利暴而虐民與夫弛慢不職者皆謂之不善也彼善與不善在天下不啻如黒白冰炭之殊朝廷惟不知其實故賞罰無自而加焉監司既已第其優劣而為臧否朝廷是宜核其名實而為賞罰臧否之令行之有年矣以臧之最而超擢者誰歟以否之最而黜責者誰歟二者皆臣所未聞也朝廷不過為虚文監司不過應故事而已謂之臧者無所勸謂之否者無所沮臣所謂名實未盡綜核賞罰未盡信必者此也何以起勸慕之心振媮惰之氣乎臣愚欲望陛下每嵗申𠡠監司按所部守令第其臧否以聞臧之最者命大臣審察核其臧之實誠如所舉隨其才而用之否之最者委他路監司體究核其否之實誠如所言則因其罪而罰之如是則君子有所􅈭而勇為善小人有所憚而不為惡昔之貪殘者變而為㢘平昔之弛慢者變而為勤謹人人奮勵以趨事赴功孝宣之治將復見於今日理宗時洪舜俞進故事曰太祖問李承進曰唐荘宗以英武定中原享國不久何也承進曰荘宗務姑息將士每出禁兵衛卒必控馬首告兒郎輩寒冷望與捄接荘宗即隨其所欲給之盖威令不行賞賚無莭也上撫髀歎曰三十年夾河戰争取得天下不能用軍法約束此軰縦其無厭之求以兹臨御誠為兒戯朕今撫飬士卒固不吝惜爵賞苟犯吾法惟有劒耳貼黃臣聞易曰上天下澤履君子以辨上下定民志上下不辨民志何由定民志不定而欲求國勢之安彊是却行而求前也況三軍以紀律為重處不知禮則出不知律犯上之意一萌作亂之機已兆尚何望其敵王愾而伸國威㢤唐自肅宗偷一時之安平盧莭度察軍中所欲立者授以旌莭自是以姑息為常至於偏裨士卒殺逐主帥而不問㢘逺地則堂髙㢘近地則堂卑陵夷之勢何所不至此唐所以亡也後唐荘宗猶襲故態不能以軍法約束而威令不行享國不永竟坐姑息之過我太祖皇帝受天明命為世立極盡革唐季五代禮法蕩析之弊一階一級上下相承川班妄訴必肆顯戮此所以國勢有金城千里之固民生有泰山四維之安也然豈徒以階級之法繩之㢤平時撫飬不吝爵賞苟犯法則有劒爾恩施而後威立宜軍心恱服不敢輕於有犯也秘書郎權尚書郎官許應龍上奏曰臣聞賞罰軍國之紀綱也有功不賞有罪不罰雖堯舜不能以化天下況世變已䧏人心寖不如古法出而姦生令行而詐起苟無賞罰以振肅之則為善者何所勸為惡者何所懲是以聖明之君必以賞罰為先務而不敢有一毫輕重之私善所當賞雖賤必錄使知為善者之無有不賞也惡所當罰雖貴不貸使知為惡者之無有不罰也夫如是則胡禁不止胡法不行苟執之不堅所當得者或刓忍而不予而不當得者乃僥求而濫授所當罪者或經營而苟免而不當罪者反牽聨而併及勸沮不明善惡無别故作之而不應率之而不従因循苟且亦終於委靡而已嗚呼烹阿而封即墨威王能審左右之毁譽而羣臣莫敢飾非齊國大治矧尊為天子居得致之位有能致之資苟於刑賞之際斷在必行則人心振起何事之不可為㢤昔我藝祖肇開洪業雖以仁厚為立國之本而信賞必罰凛乎其不可犯清謹可任擢升宣徽貪墨不法徑寘極典守邊有功厚加賞賜川班妄訴悉行誅戮恩威並用使天下竦然而畏慕故紀綱為之振肅國藝至於尊安成憲昭垂真萬世之龜鑑也共惟陛下仰紹丕基恪遵祖訓厲精思治宵旰忘勞為官擇人將以宣徳意而結民心選將練兵將以壮皇威而銷外患然今之官吏果能究心於恤下乎今之將士果能用命以決勝乎竊觀州縣之間循良者固不乏而暴征横斂峻法嚴刑者未免為民之害中外之兵驍勇者固可用而遇敵則逡廵而不前少衂則倉皇而先遁者未免為敵所輕為弊若此豈倡率之無術耶抑法令之不明耶然㢘吏之舉洊頒於詔令貪墨之罰屢形於奏䟽嚴私役之禁戒陞差之私若是之𩔖無日不討諸國而申訓之而玩習者如故何歟盖徒善不足以為政徒法不能以自行推原其端無亦賞罰之間猶有未信必者乎莭儉正直當賞以勸善也而單寒寡援則誰復薦引貪冒苛刻當罰以懲惡也而稍有牽制則莫敢𤼵擿恩賞自有成法或攀例而放行鐫黜猶未及期已經營而希進陷陣者或隐蔽而不申寄名者反僥冒而受賞掊克有禁而曷甞施行奔潰當刑而隨復招集故人心玩狎雖令不従此吏治之所以未振而軍政之所以未舉也轉而移之其勢甚易惟於勸懲之間力加之意而已葢不以親踈貴賤為輕重則可以行賞罰不闊略於其大而纎悉於其小則可以行賞罰無功同而賞異罪均而罰殊則可以行賞罰執此之政如金石行此之令如四時則以之馭臣當化貪而為㢘以之馭軍當變怯而為勇成效大驗特一指麾之頃耳然按察郡縣則在監司􅈭厲將士則在主帥監司苟賢則不吐茹於剛柔不轉移於勢要貪暴者必刺循良者必舉聞風知懼當有解印綬而去者矣主帥苟公則紀律之必嚴簡閱之必精用命者賞之犯法者誅之則畏威懐徳雖蹈水火而不避矣至於監司主帥則又不可無􅈭揚之術苟賢否不分聽其曠弛則委靡者不失其寛厚而振作者反㡬於生事容貸者自可以逃責而㢘按者或至於召禍如此則人心疑畏孰肻以國事為念㢤臣願陛下明目達聰詳考熟察能舉其職者莫不陟不勝其任者莫不黜則孰不􅈭昂奮厲求以自見登攬澄清號令精明當有如范滂光弼者出矣此又操執綱領之要術也惟陛下與大臣亟圖之李鳴復上奏曰臣比甞因髙沙方城之叛述古人討亂之法以進謂殱厥渠魁脅従㒺治又謂士卒干紀此殆閫帥責耳閫帥不舉其職而輙以上累朝廷朝廷又不審其宜而動即䧏下黄榜何榜之輕也臣無他意大率欲為朝廷正名分振紀綱使不流於姑息耳黄陂之叛與髙沙方城等意謂必知所懲創聞諸道路其為乖誤抑又甚焉淮西討叛而湖北則納叛是自為矛盾也于俊領兵勦賊而王旻則出兵助賊是自相魚肉也孟珙許之以便宜書填防禦使京交十萬官田百頃又聽従各人向某處州郡駐劄是賞盜也賞盜而欲以弭盜可乎王旻先逆之境上給以貲糧助以兵力又謂叛賊委是可嘉欲與轉六七官或陞差路分陞差統制是誨盜也誨盜而欲其不為盜得乎髙沙之叛始雖縦之終能戮之尚有辭也方城之叛國人討之敵人納之猶可諉也今黄陂之叛境内自為胡越國中自為寇讎此何風也叛卒挾外寇以刼制中國邊將挾叛卒以刼制朝廷此何等氣象也臣恐唐末五代之祻自是始矣然則如之何曰脅従者不必治而渠魁不可不殱也異我者不足責而同我者不可不戒也命令自天子出未聞邊將擅書填告命以啗敵也是可慮也尺地莫非王有不聞邊將敢欲割地以遺敵也是可憂也一時之事變雖􅈭萬世之正理不可不存也邊鄙之間輕囂小人雖肆無忌憚廟堂之上任重大老不可不執持公道也若朝廷但欲買静一切風靡欲得官爵即與之官爵欲得便地即移之便地欲索犒賞即為之支犒賞欲逐主帥即為之易主帥戕殺本將之罪不復問刼掠平民之罪不復究討叛者有罰納叛者有賞則名分盡䘮紀綱大壊北軍之久歸附者必縦欲以求逞將帥之當事任者必乗間以自肆他日之祻又不止於今日矣惟陛下與二三大臣亟圖利之鳴復又上奏曰臣聞殱厥渠魁脅従㒺治此古人討亂法也事有不安其常而至于變不循其理而至于亂豈必人人皆有是心㢤鼔而倡之者不一二脅而従之者常八九逆順未分則其勢合利害漸迫則其心離善治亂者臨之以可懼之威開之以自新之路剖分其逆順昭示其賞罰首亂者殺無赦若能痛自改悔領衆来䧏則免其罪脅従者釋勿治若能伺賊動息梟首以獻則厚其賞夫如是則人各有心互相疑忌而賊之黨孤矣賊之黨孤則守必不固戰必不力而賊之首可坐致矣不然一於招納而薰蕕莫辨則有恩而無威其弊也流於姑息一於攻討而玉石俱焚則有威而無愛其弊也過於殘忍姑息豈足以怗强暴殘忍豈所以懐忠義㢤唐州之叛叛者一郭勝耳兵與民未甞叛也全子才等握兵以出老小之在城外者悉舉而殱之故其黨遂牢固而不可破髙郵之叛叛者四百餘卒耳其他未甞叛也既一日而推擇三數人以為首領又一日而執辱郡太守以强其行移制司雖調兵征討而實懐畏怯雖遣人撫諭而實為具文故其賊愈悖慢而不知悔聞諸道路朝廷近已屈意招安䧏下黄榜其為說盖為一郡生靈性命惜耳使黄榜既下而弭耳退聽必須以序支犒是賞盜也賞盜而欲其無盜得乎萬一不然而負固不服或且重有邀索是納侮也納侮而方思所以懲其侮不亦晚乎將卒干紀此殆閫帥責耳閫帥不舉其職而輙以上累朝廷朝廷又不審其宜而動即䧏下黄榜何榜之輕也臣不勝憂憤是用推明古人討有罪之法以進如或可採乞䧏付樞宻院叅酌施行國子監主簿徐宗仁上奏曰賞罰者軍國之綱紀賞罰不明則綱紀不立今天下如器之敧而未墜於地存亡之機固不容髮兵虚將惰而力匱財殫環視四境𩔖不足恃而所恃以維持人心奔走豪傑者惟陛下賞罰之微權在耳權在陛下而陛下不知所以用之則未墜者安保其終不墜乎臣為此懼久矣陛下當危急之時出金幣賜土田授莭鉞分爵秩尺寸之功在所必賞故當悉心効力圖報萬分可也而自斡腹之兵越江踰廣以来凡閱數月尚未聞有死戰陣死封疆死城郭者豈賞罰不足以勸懲之耶今通國之所謂佚罰者不過丁大全袁玠沈翥張鎮吴衍翁應弼石正則王立愛髙鑄之徒而首惡則董宋臣也是以廷紳抗䟽學校叩閽至有欲借尚方劒為陛下除惡而陛下乃釋而不問豈真欲愛䕶此數人而重咈千萬人之心天下之事勢急矣朝廷之紀綱壊矣若誤國之罪不誅則用兵之士不勇今東南一隅天下已半壊於此數人之手而罰不損於毫毛彼方擁厚貲挾聲色髙卧華屋而使陛下與二三大臣焦心勞思可乎三年之在行者豈不憤然不平曰稔禍者誰歟而使我捐軀兵革之間百姓之罹難者豈不羣然胥怨曰召亂者誰歟而使我流血鋒鏑之下陛下亦甞一念及此乎監察御史吴昌裔論李煒状曰臣惟蜀之梓遂夙號巨藩祖宗盛時每髙其選非政府従橐經歴莭旄者不以輕畀近来除授率多非人知遂寧府李煒是也煒心神瞀眊品格平凡得郡文南畏敵不上乃由彭倅徑把州麾惟賄是聞蔑無善状徒以結姻帥閫遂得薦進于朝甫守唐安又易武信升華延閣人謂僥覦况其老病龍鍾心疾交作謂為李赤貽笑于人近聞幕府上功煒亦簉名其列身處内地乃與戰士同科其濫甚矣欲望睿斷將煒罷黜所有功賞不與放行以為僥功冒賞者之戒昌裔又論項容孫轉官加職未當状曰臣惟邊疆多事之時當以賞刑為急鄉人書来皆言曺友聞大安之㨗李安國文州之守董鵬飛之死莭曺萬等之平潰功効最為顯著今朝廷未聞次第行賞近閱邸報知閬州任逢以集英殿修撰奉祠知果州項容孫轉一官加直秘閣臣聞之罔然不知朝廷以其何功而加職増秩耶竊聞去冬潰卒之變果閬二州焚蕩殆盡為守臣者逃避山谷寇退方還若以其無兵與守未加顯謫猶之可也今並邊將士賞典未行而逃難守臣崇資先及將恐三軍之士聞之短氣彼二人者受亦不安臣欲乞睿斷將四將功賞早賜頒下其二人加職轉官指揮並行收回逢仍予祠以遂其請容孫且令安職以責其効庻㡬萬里之外知公朝刑賞平明有功者恱倖賞者懼是轉移人心之一大機也金宣宗興定元年行元帥府事石倫上言曰頃者大兵破太原招民耕稼為久駐之基臣以太原要鎮所當必争遣提控持嘉烏勒忻引官兵義兵共圖収復又以軍士有功者宜速賞之故擬令烏勒忻得注授九品之職以是請于朝而執政以為賞功罰罪皆須中覆夫河東去京師甚逺移報往返不暇數十日官軍皆敗亡之餘鋒銳畧盡而義兵亦不習行陣無異烏合以重賞誘之猶恐不為用況有功而久不見報乎夫衆不可用則不能退敵敵不退則太原不可復太原不可復則平陽之勢日危而境土日蹙矣今朝廷仰而不許不過慮其濫賞耳借使有濫賞之弊其與失太原之害孰重於是詔従其請哀宗在蔡忠孝軍提控李徳不率總帥完顔仲徳縛而杖之帝諭仲徳曰此軍得力方欲倚用卿何不容忍責罰乃爾仲徳曰時方多故錄功隐過自陛下之徳至于將帥之職則不然小犯則决大犯則誅强兵悍卒不可使一日不在紀律盖小人之情縦則驕驕則難制睢陽之禍豈獨官奴之罪亦有司縦之太過耳今欲更易前轍不宜愛克厥威賞必由中罰則臣任其責軍士聞之至于國亡不敢有犯元世祖至元六年帝數以歴代珍寳分賜近侍監察御史崔敬上奏曰臣聞世皇時大臣有功所賜不過槃革重惜天物為後世慮至逺也今山東大飢燕南亢旱海潮為灾天文示儆地道失寧京畿南北蝗飛蔽天正當聖主恤民之日近侍之臣不知慮此奏禀承請殆無虛日甚至以府庫百年所積之寳物遍賜僕御閽寺之流乳稚童孩之子帑藏或空萬一國有大事人有大功又將何以為賜乎乞追囘所賜以示恩不可濫庶允公論趙天麟上策曰臣聞欲逸者臣民之同情臨制者帝王之能事皇天䧏命眷頋神主天下雖大兆人雖衆既畏上天之景命而甘分以従之又服聖人之大徳而竭蹷以趨之於是為君者巍然在上處萬姓之極崇晏然居尊役萬姓以自奉宜乎萬姓厭勞而惡賤也然而不厭且惡者以其非聖人不足以保吾之生非聖人不足以安吾之業故也間生兇黨不揣其宜窺上隙而恣行逆天心而妄僭慿陵國紀揺蕩邊封掠無罪之生靈啟非常之禍亂惟王立統實欲寧人豈可上違帝眷而姑息偷安屑越民生而凝心不慮㢤是以命將興師宣威止殺適以全其生覆之徳也於此猶以為未能息彼邪萌遂立戍兵於郡縣而鎮之庻他日之爰方啓行無回頋卒然之憂故爾此帝王臨制之術之大者也且人情莫不欲逸今則驅之以戰争之事至勞也人莫不欲生今則率之於萬死之地至苦也向不加之以厚犒申之以厚勞則誰有竭力效功之心㢤方今將帥南征北討略無寧嵗已䧏之域縦士卒而暴之已服之人縦士卒而驅之劫之所獲金幣或入將家或奉王府未聞以之賜士卒也抑且見其暴掠驅刼而不之罪焉强者多矣弱者未之有獲也老稚死矣壮者未之承賞也若夫得雋而紀于露布以聞之散于六軍以分之彼六軍乃國家之六軍也散之則是猶置于國家之外府外庫也又能􅈭將来之實効焉若夫寇敵犯罪而伐之既服而舎之彼寇敵皆國家之頑民也而脅従者皆非其本心也又何須以為奴妾牽羈而縦士卒以掠之乎彼寇敵脅従者亦且効吾士卒之忠而刼掠中國之民矣則是四方之民互相驅掠乃復乗威因怒轉戰無休直士不敢以獻言忠臣不敢以納諫健兒繼踵以就死原其所致皆因犒勞或未及莭制或未明以至于是也為今之計莫若守之而不攻按之而不動倘有不臣之國逆亂之徒當令信使再三以諭之持詔以赦之知罪自新囘邪嚮正其或益生驕氣蔑有悛心則明徵其辭以征之簡車馬嚴號令偹粮餉厲戈矛固巢穴防要害氣壮力䧺徳尊義重是惟無戰戰則勝矣杕杜之篇漢皇之駕有灞上棘門細栁之幸湯后之伐夏也耕者不變歸市者不止誅其君而弔其民周武之伐商也散鹿臺之財𤼵鉅橋之粟大賚於四海而萬姓恱服斯皆仁以行之義以宜之勞以感之賞以恩之也伏望陛下探􅄨索隐發政施仁幸従臣所謂設武舉詮大將試嗣將之法則莭制無不明矣復従臣所謂厚勞賞之法則戌卒誓死而無辭矣若其偃兵戈廣屯田之後亦無所事於厚勞賞之法此但防其萬一故云然武宗至大中尚書省賜予無莭財用日耗名爵日濫御史大夫中書平章托克托上言曰爵賞者帝王所以用人也今爵及比徳賞及罔功緩急之際何所賴乎中書所掌錢粮工役選法刑獄十有二事若従臣言恪遵舊制則臣願與諸賢黽勉従事不然用臣何補文宗天歴元年監察御史張士𢎞等上言曰朝廷政務賞罰為先功罪既明天下斯定國家近年自特們徳爾竊位擅權假刑罰以遂其私綱紀始紊迨至泰定爵賞益濫比以兵興用人甚急然而賞罰不可不嚴夫功之髙下過之重輕皆係天下之公論願命有司務合公議明示黜陟功罪既明賞罰攸當則朝廷肅清紀綱振舉而天下治矣帝嘉納之歴代名臣奏議卷一百八十九
