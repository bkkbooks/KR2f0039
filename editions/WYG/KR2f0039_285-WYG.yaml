body:
  text: 歴代名臣奏議卷二百八十五明楊士竒等撰禮臣齊桓公設庭燎為士之欲造見者朞年而士不至於是東野鄙人有以九九之術見者桓公曰九九何足以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自以論而不及君故不至也夫九九薄能耳而君猶禮之況賢於九九乎夫太山不辭壤石江海不逆小流所以成大也詩云先民有言詢子蒭蕘言博謀也桓公曰善乃因禮之朞月四方之士相􅂝而並至詩曰自堂徂基自羊徂牛言以内及外以小及大也魏文侯從中山奔命安邑田子方後太子擊遇之下車而趨子方坐乗如故告太子曰為我請君待我朝謌太子不説因謂子方曰不識貧窮者驕人富貴者驕人乎子方曰貧窮者驕人富貴者安敢驕人人主驕人而亡其國吾未見以國待亡者也大夫驕人而亡其家吾未見以家待亡者也貧窮者若不得意納履而去安徃不得貧窮乎貧窮者驕人富貴者安敢驕人太子及文侯道田子方之語文侯歎曰㣲吾子之故吾安得聞賢人之言吾下子方以行得而友之自吾友子方也君臣益親百姓益附吾是以得友士之功我欲伐中山吾以武下樂羊三年而中山為獻於我我是以得有武之功吾所以不少進於此者吾未見以智驕我者也若得以智驕我者豈不及古之人乎齊宣王見顔斶曰斶前斶亦曰王前宣王不悦左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士與使斶為慕勢不如使王前為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳堯有九佐舜有七友禹有五丞湯有三輔自古及今而能虗成名於天下者無有是以君王無羞亟問不愧下學是故成其道徳而揚功名於後世者堯舜禹湯周文王是也故曰無形者形之君也無端者事之本也夫上見其原下通其流至聖明學何不吉之有哉老子曰雖貴必以賤為本雖高必以下為基是以侯王稱孤寡不榖是其賤之本歟非夫孤寡者人之困賤下位也而侯王以自謂豈非下人而尊貴士歟夫堯傳舜舜傳禹周成王任周公旦而世世稱曰明主是以明乎士之貴也漢孝文帝時綘侯為丞相朝罷趣出意甚得上禮之恭常目送之中郎袁盎進曰陛下以丞相何如人上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王劉氏不絶如帯是時絳侯為大尉主兵柄弗能正吕后崩大臣相與共畔諸吕大尉主兵適會其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下不取也後朝上益莊丞相益畏宣帝時大將軍霍光薨後數月御史大夫魏相上封事曰聖王褒有徳以懐四方顯有功以勸百寮是以朝廷尊榮天下鄉風國家承祖宗之業制諸侯之重新失大將軍宜宣章盛徳以示天下顯明功臣以填藩國毋空大位以塞争權所以安社稷絶未萌也車騎將軍張安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大將軍定䇿天下受其福國家重臣也宜尊其位以為大將軍毋令領光祿勲事使專精神憂念天下思惟得失安世子延夀重厚可以為光祿勲領宿衛臣後數日竟拜安世為大司馬車騎將軍領尚書事扶陽節侯韋賢卒長子𢎞有罪繫獄家人矯賢令以次子𤣥成為後𤣥成深知非賢雅意即陽狂不應召大鴻臚奏狀章下丞相御史按驗𤣥友人侍郎章亦上疏言聖王貴以禮讓為國宜優飬𤣥成勿枉其志使得自安衡門之下而丞相御史以𤣥成實不病劾奏之有詔勿劾引拜𤣥成不得已受爵帝高其節以為河南太守元帝時長安士伍尊上書言臣少時為郡邸小吏竊見孝宣皇帝以皇曽孫在郡邸獄是時治獄使者丙吉見皇曽孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍卧庭上後遭條獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令與郭徴卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫亡詔令時吉得食米肉月月以給皇孫吉即時病輒使臣尊朝夕請問皇孫視省席蓐燥溼候伺組徴卿不得令晨夜去皇孫敖盪數奏甘毳食物所以擁全神靈成育聖躬功徳已亡量矣時豈豫知天下之福而徼其報哉誠其仁恩内結於心也雖介之推割肌以存君不足以比孝宣皇帝時臣上書言狀幸得下吉吉謙讓不敢自伐删去臣辭專歸美於組徴卿組徴卿皆以受田宅賜錢吉封為博陽侯臣尊不得比組徴卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐㣲文奪爵為闗内侯臣愚以為宜復其爵邑以報先人功徳哀帝建平元年䇿免大司空高樂侯師丹為庶人罷歸尚書令唐林上疏曰竊見免大司空丹䇿書泰深痛切君子作文為賢者諱丹經為世儒宗徳為國黄耉親傅聖躬位在三公所坐者㣲免爵泰重識者咸以為宜復丹邑爵使奉朝請唯陛下裁之詔復賜丹爵闗内侯時王嘉坐薦梁相等迷國罔上不道下廷尉詔獄永信少府張猛等十人以為聖王斷獄先必原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖徳重大臣刑辟廣延有司議欲使海内咸服嘉罪名雖應法聖主之於大臣在輿為下御坐則起疾病視之無數死刑則臨弔之廢宗廟之祭進之以禮退之以義誄之以行案嘉本以相等為罪罪惡雖著大臣括髮闗械裸躬就笞非所以重國家褒宗廟也今春月寒氣錯繆霜露數降宜示天下以寛和臣等不知大義唯陛下察焉後漢光武建武九年春祭遵卒於軍中詔大長秋謁者河南尹護䘮事大司農給費博士范升上疏追稱遵曰臣聞先王崇政尊美屛惡昔高祖大聖深見逺慮班爵割地與下分功著錄勲臣頌其徳美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絶嗣丹書鐵劵傳於無窮斯誠大漢厚下安人長久之徳所以累世十餘歴載數百廢而復興絶而復續者也陛下以至徳受命先明漢道褒序輔佐封賞功臣同符祖宗征虜將軍頴陽侯遵不幸早薨陛下仁恩為之感傷遠迎河南惻怛之慟形於聖躬䘮事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔徳之厚者也陵遲已來久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵修行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取畧陽衆兵既退獨守衝難制御士心不越法度所在吏人不知有軍清名聞於海内㢘白著於當世所得賞賜輙盡與吏士身無竒衣家無私財同産兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載䘮薄葬洛陽問以家事終無所言任重道逺死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘爼豆可為好禮悦樂守死善道者也禮生有爵死有諡爵以殊尊卑諡以明善惡臣愚以為宜因遵薨論叙衆功詳案諡法以禮成之顯章國家篤古之制為後嗣法光武時徴周黨為議郎以病去職遂將妻子居黽池復被徴不得已乃著短布單衣榖皮綃頭待見尚書及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏曰臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等䝉受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虗妄之罪而敢私竊虗名誇上求高皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隐居黽池著書上下篇而終邑人賢而祠之馬援前在交趾常餌薏苡實用能輕身省慾以勝瘴氣南方薏苡實大援欲為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譛之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀光武怒援妻孥惶懼不敢以䘮還舊塋裁買城西數畆地槀葬而已權葬故稱槀賔客故人莫敢弔時前雲陽令同郡朱勃詣闕上書曰臣聞王徳聖政不忘人之功採其一美不求備於衆故高祖赦蒯通而以王禮葬田横大臣曠然咸不自疑夫大將在外讒言在内㣲過輙記大功不計誠為國之所慎也故章邯畏口而奔楚章邯為秦將畏趙高讒之遂降項羽燕將據聊而不下燕將攻下聊城人或讒之於燕燕將懼誅因保守聊城不敢歸豈其甘心末規哉悼巧言之傷𩔖也末規猶下計也竊見故伏波將軍新息侯馬援拔自西州欽慕聖義間闗險難觸冒萬死孤立羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉謂投使隗囂也寧自知當要十郡之使徼封侯之福邪八年車駕西討隗囂國計狐疑衆營未集援建宜進之䇿卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民饑困寄命漏刻援奉詔西使鎮慰邊衆乃招集豪傑曉誘羌戎謀如涌泉埶如轉規遂救倒懸之急存幾亡之城兵全師進因糧敵人隴冀畧平而獨守空郡守音式授反兵動有功師進輙克誅鋤先零縁入山谷猛怒力戰飛矢貫脛又出征交趾土多瘴氣援與妻子生訣無悔吝之心遂斬滅徴側克平一州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南度江海觸冒害氣僵死軍士名滅爵絶國土不傳海内不知其過衆庶未聞其毁卒遇三夫之言横被誣罔之讒家屬杜門葬不歸墓怨隙並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑高祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢榖間哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也魯聽季孫之説而逐孔子詩云取彼讒人投畀犲虎犲虎不食投畀有北有北不受投畀有昊此言欲令上天而平其惡惟陛下留思豎儒之言無使功臣懐恨黄泉臣聞春秋之義罪以功除公羊傳曰夏滅項孰滅之齊滅之曷為不言齊滅為桓公諱也以桓公嘗有繼絶存亡之功故君子為之諱也聖王之祀臣有五義禮記曰夫聖王之制祀也法施於人則祀之以死勤事則祀之以勞寧國則祀之能禦大災則祀之能捍大患則祀之若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海内之望臣年已六十常伏田里竊感欒布哭彭越之義前書曰彭越為梁王欒布為梁大夫使於齊越以謀反梟首洛陽詔有收視者捕之布使還奏事越頭下祠而哭之冒陳悲憤戰慄闕庭陳元以父任辟司空府時大司農江馮上言宜令司𨽻校尉督察三公事下三府元上疏曰臣聞師臣者帝賔臣者霸故武王以太公為師齊桓以夷吾為仲父孔子曰百官總已聽於冡宰近則高帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰專操國柄以偷天下況以自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄罔宻法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽盛張耳目陛下宜修文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有司察公輔之名帝從之安帝以陳忠為尚書時三府任輕機事專委尚書而灾𤯝變咎輒切免公台忠以為非國舊體上疏諫曰臣聞君使臣以禮臣事君以忠故三公稱曰冡宰王者待以殊敬在輿為下御坐為起入則參對而議政事出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸久矣臣忠心常獨不安是故臨事戰懼不敢宂見所有興造又不敢希意同僚以謬平典而謗讟日聞罪足萬死近以地震䇿免司空陳褒今者灾異復欲切譲三公昔孝成皇帝以妖星守心移咎丞相使賁麗納説方進自引卒不䝉上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書決事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方員於規矩審輕重於衡石誠國家之典萬世之法也忠意常在褒崇大臣待下以禮其九卿有疾使者臨問加賜錢帛皆忠所建桓帝時有詔公車徴楊秉及處士韋著二人各稱疾不至有司劾秉著大不敬請下所屬正其罪尚書令周景與尚書邊韶議奏秉儒學侍講常在謙虗著隐居行義以退譲為節俱徴不至誠違側席之望然逶迤退食足抑茍進之風夫明王之世必有不召之臣聖朝宏養宜用優游之禮可告在所屬喻以朝廷恩意如遂不至詳議賞罰於是重徴乃到拜太常吳孫權時周𦙍為都鄉侯以罪徙廬陵郡諸葛瑾步隲連名上疏曰故將軍周瑜子𦙍昔䝉粉飾受封為將不能養之以福思立功効至縱情欲招速罪辟臣竊以瑜昔見寵任入作心膂出為爪牙銜命出征身當矢石盡節用命視死如歸故能摧曹操於烏林走曹仁於郢都揚國威徳華夏是震蠢爾蠻荆莫不賔服雖周之方叔漢之信布誠無以尚也夫折衝扞難之臣自古帝王莫不貴重故漢高帝封爵之誓曰使黄河如帯㤗山如礪國以永存爰及苗裔申以丹書重以盟詛藏于宗廟傳于無窮欲使功臣之後世世相踵非徒子孫乃闗苗裔報徳明功勤勤懇懇如此之至欲以勸戒後人用命之臣死而無悔也況於瑜身沒未久而其子𦙍降為匹夫益可悼傷竊惟陛下欽明稽古隆於興繼為𦙍歸訴乞匄餘罪還兵復爵使失旦之雞復得一鳴抱罪之臣展其後效權答曰腹心舊勲與孤協事公瑾有之誠所不忘昔𦙍年少初無功勞横授精兵爵以侯將蓋念公瑾以及於𦙍也而𦙍恃此酗滛自恣前後告喻曽無悛改孤於公瑾義猶二君樂𦙍成就豈有已哉迫𦙍罪惡未宜便還且欲苦之使自知耳今二君勤勤援引漢高河山之誓孤用恧然雖徳非其疇猶欲庶幾事亦如耳故未順㫖以公瑾之子而二君在中間茍使能改亦何患乎瑾隲表比上朱然及全琮亦俱陳乞權乃許之晉惠帝時河間王顒表立成都王頴為太弟為王浚所破挾天子還洛陽征南将軍范陽王虓與東平王楙鎮東將軍周馥等上言曰自愍懐被害皇儲不建委重前相輙失臣節是以前年太宰與臣永為社稷之貳不可久空所以共啟成都王頴以為國副受重之後而弗克負荷小人勿用而以為腹心骨肉宜敦而猜佻洊至險詖宜逺而讒説殄行此皆臣等不聰不明失所宗賴遂令陛下謬於降授雖戮臣等不足以謝天下今大駕還宫文武空曠制度荒破靡有孑遺臣等雖劣足匡王室而道路之言謂張方與臣等不同既惜所在興異又以太宰惇徳允元著於具瞻毎當義節輙為社稷宗盟之先張方受其指教為國効節昔年之舉有死無貳此太宰之良将陛下之忠臣但以受性强毅不達變通遂守前志已致紛紜然退思惟既是其不易之節且慮事翻之後為天下所罪故未即西還耳原其本事實無深責臣聞先代明主未嘗不全䕶功臣令福流子孫自中間以來陛下功臣初無全者非獨人才皆劣其於取禍實由朝廷䇿之失宜不相容恕以一旦之咎䘮其積年之勲既違周禮議功之典且使天下之人莫敢復為陛下致節者臣等此言豈獨為一張方實為社稷逺計欲令功臣長守富貴臣愚以為宜委太宰以闗右之任一方事重及自州郡以下選舉授任一皆仰成若朝之大事廢興損益每輙疇諮此則二伯述職周召分陜之義陛下復行於今時遣方還郡令羣后申志時定王室所加方官悉如舊如此則忠臣義士有勸功臣必全矣司徒戎異姓之賢司空越公族之望並忠國愛主小心翼翼宜幹機事委以朝政安北將軍王浚佐命之𦙍率身履道忠亮清正逺近所推如今日之大舉實有定社稷之勲此是臣等所以嘆息歸高也浚宜特崇重之以副羣望遂撫幽朔長為北藩臣等竭力捍城藩屛皇家陛下垂拱而四海自正則四祖之業必隆於今日月之暉昧而復曜乞垂三思察臣所言成帝咸康四年帝臨軒遣使拜太傅太尉司空儀注大樂宿懸於殿庭門下奏非祭祀宴饗則無設樂之制太常蔡謨議曰凡敬其事則備其禮禮備則制有樂樂者所以敬事而明義為耳目之娛故冠亦用之不惟宴饗宴饗之有樂亦所以敬賔也故卻至使楚楚子饗之卻至辭曰不忘先君之好貺之以大禮重之以備樂尋斯辭也則宴樂之意可知矣公侯大臣人君所重故御坐為起在輿為下言稱伯舅傳曰國卿君之貳也是以命使之日御親臨軒百僚陪列此即敬事之意也古者天王饗下國之使及命將帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也又曰採薇以遣之出車以勞還杕杜以勤歸皆作樂而歌之今命大使拜輔相比於下國之臣輕重殊矣輕誠有之重亦宜然故謂臨軒遣使宜有金石之樂議奏從焉唐太宗貞觀中特進魏徴上疏曰臣聞君為元首臣作股肱齊契同心合而成體體或不備未有成人然則首雖尊極必資手足以成體君雖明哲必藉股肱以致理故禮云人以君為心君以人為體心莊則體舒心肅則容敬書云元首明哉股肱良哉庶事康哉元首藂脞哉股肱惰哉萬事隳哉然則委棄股肱獨任胷臆具體成理非所聞也夫君臣相遇自古為難以石投水千載一合以水投石無時不有其能開至公之道申天下之用内盡心膂外竭股肱和若鹽梅固同金石者非唯高位厚秩在於禮之而已昔周文王遊於鳯凰之􅇕襪系解顧左右莫可使者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝功於垓下若夏桀不棄於伊尹項羽垂恩於韓信寧肯敗已成之國為滅亡之虜乎又㣲子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者禮記稱魯穆公問於子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將墜諸泉無為戎首不亦善乎又何反服之有齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死出亡不送公曰裂地以封之䟽爵以待之有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諫而見納終身不亡臣何送焉若言不見用有難而死是妄死也諫不見納出亡而送是詐忠也春秋左氏傳曰崔杼弑齊莊公晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之為社稷亡則亡之若為己死為己亡非其親暱誰任之門啟而入枕尸股而哭興三踴而出孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如糞土臣視君如寇讎雖臣之事君無有二志至於去就之節當縁恩之薄厚然則為人主者安可以無禮於下哉竊觀在朝羣臣當樞機之寄者或地隣秦晋或業與經綸並立事立功皆一時之選處之衡軸為任重矣任之雖重信之未篤信之未篤則人或自疑人或自疑則心懐茍且心懐茍且則節義不立節義不立則名教不興名教不興而可與固太平之基保七百之祚未之有也又聞國家重惜功臣不念舊惡方之前聖一無所聞然但寛於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之況上啟其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一元下生百端百端之變無有不亂者也禮記曰愛而知其惡憎而知其善若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庻遄沮然則古人之震怒將以懲惡當今之威罰足以長奸此非堯舜之心也非禹湯之事也書曰撫我則后虐我則讎孫卿子曰君舟也人水也水所以載舟亦所以覆舟孔子曰魚失水則死水失魚猶為水也故堯舜戰戰慄慄日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求至理豈可得乎又政貴有恒不求屢易今或責小臣以大體或責大臣以小事小臣乗非其據大臣失其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其辜欲其無私求其盡力不亦難乎小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟咎莫能自明莫能自明則茍求免禍大臣茍免則譎詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣又委任大臣欲其盡力每官有所避忌不言則為不盡力若舉得其人何嫌於故舊若舉非其任何貴於疎逺待之不盡誠信何以責其忠恕哉臣雖或有失之君亦未為得也夫上之不信於下必以為下無可信矣若必下無可信則上亦有可疑矣禮云上人疑則百姓惑下難知則君長勞上下相疑則不可以言至理矣當今羣臣之内逺在一方流言三至而不投杼者臣竊思度未見其人夫以四海之廣士庶之衆豈無一二可信之哉盖信之則無不可疑之則無可信者豈獨臣之過乎夫以一介庸夫結為交友以身相許死且不渝況君臣契合寄同魚水若君為堯舜則臣為稷契豈有遇小事則變志見小利則易心哉此雖下之立忠未能明著亦由上懐不信待之過薄之所致也此豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四五帝可俯而六夏殷周漢夫何足數徴又上疏曰國基於徳禮保於誠信誠信立則下無二心德禮形則逺者來格故徳禮誠信國之大綱不可斯須廢也傳曰君使臣以禮臣事君以忠自古皆有死人無信不立又曰同言而信信在言前同令而行誠在令後然則言而不行言不信也令而不從令無誠也不信之言不誠之令君子不為也自王道休明綿十餘載倉廪愈積土地益廣然而道徳不日博仁義不日厚何哉由待下之情未盡誠信雖有善始之勤而無克終之美故便佞之徒得肆其巧謂同心為朋黨告訐為至公强直為擅權忠讜為誹謗謂之朋黨雖忠信可疑謂之至公雖矯偽無咎强直者畏擅權而不得盡其力忠讜者慮誹謗而不敢與之争熒惑視聽欝於大道妨化損徳今將致治則委之君子得失或訪諸小人是譽毁常在小人而督責常加君子也夫中智之人豈無小慧然慮不及逺雖使竭力盡誠猶未免傾敗況内懐奸利承顔順㫖乎故孔子曰君子而不仁者有矣未有小人而仁者然則君子不能無小惡惡不積不害於正小人時有小善善不積不足為忠今謂之善人矣復慮其不信何異立直木而疑其影之曲乎故上不信則無以使下下不信則無以事上信之為義大矣哉昔齊桓公問管仲曰吾欲使酒腐於爵肉腐於俎得無害霸乎曰不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也晋中行穆伯攻鼓經年而不能下鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一㦸不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若使間倫下之吾不可以不賞若賞之是賞佞人也佞人得志是使晋國捨仁而為佞雖得鼔安用之夫穆伯列國大夫管仲霸者之佐猶慎於信任逺避佞人況陛下之上聖乎若欲令君子小人是非不雜必懐之以徳待之以信厲之以義節之以禮然後善善而惡惡審罰而明賞無為而化何逺之有善善而不能進惡惡而不能去罰不及有罪賞不加有功則危亡之期或未可保上賜手詔褒美曰昔晉武帝平吳之後志竟驕怠何曽位極台司不能直諫乃私語子孫自矜明智此不忠之大者也得公之諫朕知過矣當置之几案以比弦韋徴嘗詣朝堂抗表讓左光祿大夫附崔確奏稱臣在隋朝備經䘮亂如臣流軰死亡畧盡臣得奉太平又特䝉抜擢恩澤既深唯思報效但臣先有眼疾比加風疹轉加増劇天纔隂晦數步之外全不見人倉卒轉動即覺心識悶亂方今天下無事英彦如林無容痼疾之人久在樞近非但不可更加二品仍乞解侍中之職授臣一二品㪚官不離左右足申愚見拾遺補闕非敢虗飾此實臣志願太宗令崔敦禮謂之曰國之安危資於輔弼得其人則日隆日化失其人則敗不旋踵公寛以接下忠以奉上朕每有乖僻公未嘗不言社稷安危唯公是寄假使公全無兩目猶當舁公置於左右朝夕諮詢況公所患非重便欲拂衣高蹈匪獨乖於朕意僉議以為未可時或告大將軍薛萬均平高昌日與高昌婦女有私勅大理卿孫伏伽推鞫萬均不服内出高昌婦女對問魏徴諫曰萬均兄弟誠欵蚤著姦私之事虗實難明若罪狀顯然錄付伏伽自了若事無指約萬均必是有辭遣大將軍與破亡婦女對辨姦穢辭既不伏聽者必疑臣聞君使臣以禮臣事君以忠實則所得者輕虗則所失者重故秦穆公賞盜馬之酒楚莊王赦絶纓之客且楚莊秦穆並夷狄之諸侯列名五伯垂芳千祀況陛下以萬乗之主道高堯舜作之不法何以示逺帝納其言而罷焉帝謂侍臣曰狄人殺衛懿公盡食其肉獨留其肝懿公之臣𢎞演呼天大哭自出其肝而納懿公之肝於其腹中今覓此人而不可得魏徴對曰昔豫讓為智伯報讎欲刺趙襄子襄子執而獲之謂之曰子昔事范中行氏乎智伯盡滅之子乃委質智伯不為報讎今即為智伯報讎何也讓曰臣昔事范中行范中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之在君禮之而已亦何為無人焉諫議大夫張𤣥素少嘗為刑部令史帝對朝臣問之曰云云諫議大夫褚遂良上疏諫曰臣聞君子不失言於人聖主不戲言於臣言則史書之禮成之樂歌之居上能禮其臣臣始能盡力以奉其上近代宋孝武輕言肆口侮弄朝臣攻其門户乃至狼狽良史書之以為非是陛下昨見問張𤣥素云隋任何官奏云縣尉又問未為縣尉已前奏云流外又問在何曹司𤣥素將出閤門殆不能移步精爽頓盡色𩔖死灰朝臣見之多所驚怪大唐創歴任官以才卜祝庸保量能使用陛下禮重𤣥素頻年任使擢授三品翼賛皇儲自不可更對羣臣窮其門户棄昔日之殊恩成一朝之愧耻人君之御臣下也禮義以導之惠澤以驅之使其負戴𤣥天罄竭臣節猶恐徳禮不加人不自勵若無故忽畧使其羞慙欝結於懐衷心靡樂責其伏節死義其可得乎房𤣥齡嘗以微譴歸第遂良諫曰𤣥齡翼贊聖功冒死決䇿選賢立政勤力為多自非罪在不赦不可遐棄若以其衰老亦當退之以禮上然之因幸芙蓉園遂過其第載與還宫張公謹卒上聞而嗟悼出次發哀有司奏言准隂陽書云日在辰不可哭泣此亦流俗所傳上曰君臣之義同於父子情發於衷安避日辰遂泣之𤣥宗開元中廣州都督裴伷先下獄上與宰相議其罪張嘉貞請杖之張説曰刑不上大夫為其近君且所以養㢘耻也盖士可殺不可辱臣嚮巡北邊聞姜皎杖於朝堂皎官登三品亦有微功柰何以皁𨽻待之事徃不可返豈宜復蹈前失上深然之時禮部尚書蘇頲卒帝猶視朝起居舍人韋述上疏曰貞觀永徽時大臣薨輙置朝舉哀成終始恩上有旌賢錄舊之徳下有生榮死哀之美昔晋知悼子卒平公宴樂杜蕢一言而悟春秋載之故禮部尚書頲累葉輔弼奉事軒陛二十餘年今奄忽不還邦人痛嗟惟帷盖之舊股肱之戚宜即廢朝明君臣之誼帝曰固朕意也即日帳次哭洛城南門不朝詔贈右丞相諡曰文憲葬日帝游咸宜宫將獵聞之曰頲且葬我忍自娛哉半道而還徳宗在奉天聞段秀實為賊所害七日不朝宰相以為方多難時不宜壅萬機天下其謂何太常博士陳京曰丞相之言非也夫褒大節卹賢臣天下所以安況卓卓特異者乎帝曰善宋太宗淳化二年左正言謝泌上奏曰臣竊見王禹偁上言請自今宰相樞宻並不得於本㕔接見賔客以防請託有詔從之仍令御史臺宣布中外臣以為如此是疑大臣以私也書云任賢勿貳去邪勿疑張説謂姚元崇外則踈而接物内則謹以事君此真得大臣之體今天下至廣萬機至繁陛下以聰明寄於輔臣茍非接見羣官何以盡知外事若令都堂候見則羣官請見咨事無時是大臣常須候百執事於政事堂無解衣之暇古人有言曰疑則勿用用則勿疑若政在大夫祿去公室國祚衰季强臣檀權當此之時乃可為慮今日陛下鞭撻宇宙總攬豪傑朝廷有直言之士方面無姑息之臣禮樂征伐自天子出書曰無偏無黨王道蕩蕩今日之謂也柰何疑執政之臣為衰世之事乎昔孔光不言温室中木顧雍封侯三日家人不知謝安石對客圍碁㨗書至而客不覺大臣當謹宻如此雖妻子猶不得聞況他人乎使非其人當斥而去之既得其人任之以政又何疑也設若杜公堂謁見之禮豈無私室乎塞相府請託之漸豈無他徑乎此非陛下持赤心以待大臣大臣展四體以報陛下之道也王禹偁識量庸淺昧於大體妄率胷臆以蔽聰明狂躁之言不可行用上覽之嘉歎即追還前詔仁宗天聖二年左正言劉隨乞優禮李允則晁迥状曰臣伏覩近降除書以客省使康州防禦使李允則特授寧州防禦使仍放朝謝與假將治行恩加勲舊事出非常凡居將帥之臣各勵公忠之節竊以李允則素懐韜畧動有機權屢委邊防務期安輯不邀功以生事無縱敵而失謀雖古之名將無以加矣是以行命之日中外皆喜必若制置軍馬經畧亭鄣樞近大臣成筭之外若召而賜對詢以方畧則老將諳練必有所長臣又伏見太子少保致仕晁迥端莊植性沖澹自居歴任三朝垂五十載徊翔兩制踰二十年先帝寵遇便蕃講求典禮議論詳正無不參預加以繼司文柄時謂得人今之臺閣清流州郡循吏迥之論辨所以居多近者引年致政斯為達禮五常五行盖無闕焉文苑指為宗師朝野推為君子有兹儒雅之望未行優異之恩臣亦願兩宫聖慈特同允則近例賜以全俸豐其燕居其或朝廷將行大禮時議大政宰司裁成之外特開延英訪以經史耆儒詳練必有可觀每遇萬機餘閒温凉得所詳延二老賜之從容俾説徃古治亂之因國初經制之務如此則文事武備盡美於昌朝養老乞言有光於古昔尊禮宿舊益厚於時風傳示方來用光史冊臣以為文武班中功名雅望終始一致以至高年者唯此二人允謂時賢恐須旌别景祐二年御史中丞杜衍上奏曰臣聞三公之官至重所以經邦萬事之統實繁貴乎燭理故明主躬親庻政體貌大臣常於進見之間俾盡論思之道盖君臣相遇則可致時雍上下不交則謂之否塞固在倚毗丞弼詢訪善謀使下情必通上澤無壅斯有國有家之大務也臣伏見中書樞宻院之官是皆選自宸衷委之柄用領二事之職佐萬機之劇古所謂坐而論道者也今乃毎遇剛辰得親丹扆外朝始罷延英次對中覆奉行祇循常務以天下之大民事之艱恐非數刻之中可盡研幾之理欲望聖慈當清閒之燕迭召兩府臣僚賜坐便殿俾其極獻替之説酌古今之宜究治亂之源達幽隐之意上以成好問之裕下以申納忠之誠明良之歌上下同體是故平時而論可明其體要之變臨事而辨或近乎遊説之嫌以虞舜之明而云好察邇言以漢文之達亦曰無甚高論此實通國體用衆智之大端也至於米鹽之細務藂脞之末節此特有司之職耳不當取決於宸斷宜詔所司科簡之庻其正大小之分適權義之中延納訏謨開益聖智提綱總要叶大徳之不官造膝虗懐明為善之最樂臣猥以庸望輙罄愚衷干冒威嚴隕越無地皇祐三年知諫院吳奎上奏曰臣伏以國家謹禮法以維君子明威罰以御小人君子所顧者禮法也小人所畏者威罰也繇文武二選為士大夫是皆君子之地也儻不以禮法待之即是廢名器而輕爵祿也七十而致仕載之禮經臣下引年而自陳分之常也君上推恩而固留權之至也自三代以來雖衰㣲之世未有不謹斯禮以塞貪冒聳㢘隅也近者光祿卿勾希仲吏部郎中直昭文館陸軫等並以年高特與分司初欲風動羣倫而在位殊未有引去者乞早以臣前所奏施行至和二年知諫院范鎮上奏曰臣伏覩御史臺告報百官立班郊迎宰相文彦博富弼者誠隆禮也與夫隆之以虗禮孰若推之以至誠任之以實權自陛下用文彦博富弼為宰相中外皆謂得人然近日有詔兩制臣僚不得詣宰相居第百官不得間見宰相是不推之以誠不任之以權而以郊迎虗禮待之也伏乞罷百官郊迎而令兩制百官復得就第見執政以訪天下之事而以達陛下之聰明則御大臣之術兩得之矣嘉祐元年右司諫馬遵上奏曰臣伏覩近制兩省兩制官非公事不得與執政之臣相見及臺諫往來兩地大臣非休假不得接見賔客徒彰陛下有疑臣下之名而實無益於事已曽論列未奉指揮臣歴觀前代以及漢唐之盛小大之臣往來相見並不曽有禁止之文唯唐徳宗之時朝政多僻臣僚或過從多令金吾伺察宻奏故宰相不得於私第見客徒示猜嫌無補奉天之難及憲宗英斷不疑委任裴度遂除其禁得延英俊卒立淮西之功乃知馭臣之體在於明聽斷而不在於設防也陛下聖明必照此理若謂新制已行未欲便改臣請以先朝故事言之淳化二年用右司諫王禹偁奏請令兩府大臣不得於本㕔見客以防請託時有左正言謝泌上疏極陳其不可太宗覽奏即追前詔並令如舊乃知事茍未便何憚而不改邪切緣此事本為大臣若非陛下特賜指揮中書避嫌重於奏覆伏乞早賜聖斷以釋中外之疑遵又上奏曰臣聞推隆耆年則民徳歸厚崇勵高節則薄夫以敦此前籍之通規而先王之逹禮也竊見皇祐中明堂大赦曽召兩府舊臣杜衍任布等陪位雖各人辭疾不預侍祠之列陛下降詔禮遣使軺賜予備厚復恩其子殊榮異禮照耀一時陛下優賢養老之意白於天下而人知勸矣今杜衍且八十徳望愈隆使古禮復行當在更老之位至如近侍致政而歸者張昷之之公直劉䕫之清方如此等皆謂良士今陛下享夀安之福行㳟謝之儀凡在高年正宜加禮臣愚欲乞聖慈指揮中書候將來大慶禮畢檢會明堂恩例特賜施行使衍等黄髮復見太平之事書之史册足為美談庶幾冒榮越禮之人睹而知愧化薄歸厚或出此塗七年知諫院司馬光上奏曰臣聞古之聖王尊禮黄髮屬任以政者盖以其更歴天下之事練習為治之體故也昔鬻熊年九十見文王文王曰老矣鬻熊曰君若使臣捕兎逐麋臣已老矣使臣坐而䇿國事臣年尚少也近嵗以來大臣高年者皆不敢自安其位言事者又欲以擊搏大臣為名從而攻之此豈為臣盡忠至公之道哉凡言事者皆為國家進賢退不肖使其人無可取雖少壯何為果有益於時雖老何傷也臣竊見樞宻副使張昪屢以老疾辭位臣平生與昪迹不相接無絲毫恩分然竊聞其為人忠謹清直不可干以私臣不敢上避聖主之疑下畏世俗之謗隐忠不言以利其身伏望陛下深念宥宻之地不可任非其人先以聖意揣度若未能得賢於昪者則使昪且居其位於事亦未有曠廢也若昪必不可留則願陛下慎選徳望材器為衆所服知王體曉兵畧者以代之不可以不擇其人之可否使循資累叙而為之也光又上奏曰臣等伏見朝廷曏以福州處士陳烈好學篤行動遵禮法樂道養志名聞京師故舉之閭閻之中以為學官烈辭讓未至今聞福建路提刑王陶奏據福州勘到烈為妻林氏疾病廢醜遣歸其家十年不視陶因言烈貪汚險詐行無細完乞盡追奪前後所受恩命臣等素不識烈不知其人果為如何惟見國家常患士人不修名檢故舉烈等以奨勵風俗若烈平生操守出於誠實雖有底滯迃闊之行不能合於中道猶為守節之士亦當保而全之豈可毁壊挫辱疾之如讎書曰不協于極不罹于咎皇則受之古人所以禮九九市駿骨盖以此也若其内懐姦惡虧敗名教外飾詐偽沽釣聲利則朝廷曏者以為有道之士不次用之今乃醜行布於四方其為鬼心亦不細矣其始者薦舉之人安可置其罪而不問臣等欲望陛下委鄰路監司再行體量本人平生事迹善惡虗實或選差公正官吏通儒術識大體者覆勘前件公事若情理不至深重止於夫妻不相安諧則使之離絶而已湔洗其過庻幾復伸眉於後又使四方節行之士不憂横辱得以安恬於閭里若實有醜惡之迹敗亂名教則當嚴賜刑誅幷治舉者之罪以明至公光又奏曰臣聞聖主之教尚忠厚而貴愷悌故詩有鹿鳴伐木既醉行葦美宴好之相樂刺乾餱之失徳禮有幣帛饔餼行於邦國贄獻飲酒施於鄉黨是以風俗純和協氣流通漢景帝詔曰吏受所監臨以飲食免重其更議著令丞相廷尉議曰吏及諸有秩受其官屬所監所治所行所將飲食計償費勿論卓茂為宻令民有言部亭長受其米肉遺者茂曰凡人所以貴於禽獸者以有仁愛也鄰里饋遺此乃人道所以相親汝獨不欲修之寧能高飛遠走不在人間邪民曰然則律何故禁之茂曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝一門之内小者可刑大者可殺也近嵗以來中外有司喜以㣲文刺舉苛細至於宴飲相從酒食相饋皆集累成過詆以峻法曏聞知鎮戎軍曹修受鄰州所送公用酒已而自首法官處以贓罪陜西都轉運使彭思永奏據宻院劄子賈漸起請除舊例送酒食外不得買置金帛作土風贈遺幷省司參詳今後以公使錢買置珍異等物及見錢送與人者並從違制定斷其收受人坐贓論其有公使錢人受還答之物入已准盜論今曹修因陳首雖免書罰尚負贓名使人疑惑乞明立條約朝廷命有司叅議至今未決臣竊詳舊條之意明許以酒食相遺其有公使錢人受還答之物正謂珍異見錢今曹修所受止於樽酒隨而自首已為刻薄法官又以贓罪加之剖析一條以為二事不察人情不顧大體若朝廷因之遂為著令臣恐忠厚之俗益衰媮薄之風遂長百司庶尹無所措其手足虧損聖朝堂堂之化非細故也臣今所言非為曹修除雪贓名欲望朝廷申明舊條應以公使錢及財物贈遺人及受者各坐贓論其監臨之官受所監臨或因使於使所及經過處受取者並准律文處分即贈遺人而受其還答入已者准盜論並須贓滿五疋以上方得科罪其不滿五疋及以飲食之物相饋餉者皆勿論如此則人情有以相接貪吏不能為姦百司有所循守矣仁宗時傳堯俞上奏曰臣聞君之視臣如手足則臣視君如腹心然則上之待下也既重下之報上者必深此古今之通義而人情所必然也如武臣者尤資駕馭雖有典刑可以威制若使臨利害而無變蹈鋒刃而不悔者臣謂非得其心未易論也況威武之令頗或寛弛而勇鷙之性非可遽懐朝廷狃於無患恬於用文武臣職任頗侵奪之數沮其心不能無怨方今灾異浸多民力困竭臣恐文治不常獨崇其他事權未敢論列如提㸃刑獄實為要任文吏不盡稱職武臣不皆曠官一旦不擇能否獨罷武列近又聞臣僚上言乞差文臣知鼎州事臣竊觀之未見其便望陛下以職任還之稍加禮遇但精於選覈必得材實事或瘝闕不容茍貸無狀被黜其心自甘如此則畏威戴恩緩急可使幸陛下不以孤臣棄其言也至於武舉亦宜修復今入仕之門雜而多者無如此時何惜不以十數人恩澤寵四方跅弛不羈之材茍行之有常取之有法亦可以得士且誘人學兵惟陛下留意河南府通判謝絳上論曰唐室麗正史官之局並在大明華清宫内太宗皇帝肇修三館更立秘閣于昇龍門左親為飛白書額作贊刻石閣下景徳中國書寖廣真宗皇帝益以内帑四庫二聖數嘗臨幸親加勞問逓宿廣内者有不時之召人人力道術究藝文知天子尊禮甚勤而名臣高位繇此其選也往者遭遘延燔未遑中葺或引兩省故事别建外館直舍卑喧民櫩叢接太官衛尉供儗滋削虧體傷風莫兹為甚陛下未嘗迃翠華降玉趾寥寥丹府不聞輿馬之音曠有日矣議者以謂慕道不篤於古待士少損於前十無延訪之勤而因循相尚不自激䇿文雅漸弊竊為聖朝惜之願闢内館以恢景徳之制詔可陜西經畧使范仲淹等奏曰臣竊見朝㫖下陜西省罷同解乾耀等九州軍公使錢共一千八百貫文切以國家逐處置公使錢者盖為士大夫出入及使命往還有行役之勞故令郡國饋以酒食或加宴勞盖養賢之禮不可廢也謹按周禮地官有遺人掌郊里之委積以待賔客野鄙之委積以待羇旅凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事廵而比之以時頒之此則三王之世已有廚傳之禮何獨聖朝顧小利而亡大體且今贍民兵一名嵗不下百貫今減省得公用錢一千八百貫只養得兵士一十八人以一十八人之資廢十餘郡之禮是朝廷未思之甚也況今來逐州使命之外各有軍營每年春後邊兵歇泊動經半年軍中人員並無宴犒之具雖條貫有旬設之名逐州每月一次舉行軍員各給得錢壹百文已來官務薄酒二升既無公用更不赴筵亦不張樂豈朝廷宴享將校之意州郡削弱道路咨嗟當全盛之朝豈宜如此或謂有公使錢處收買食物搔擾户民殊不知郡守得人自能約束如非其人更出已俸買物虧民愈甚是見其小而不思其大也伏望聖慈速降指揮下陜西河北河東路轉運司昨來經減廢公用錢處並令依舊庻協典禮稍息物論況朝廷用武之際於此一事尤宜照管臣等久在邊任深知此事近貳樞廷豈當緘黙知諫院包拯上疏曰伏以人臣之義七十致仕著在禮經卓為明訓所以優假老成遂其安逸既不違達尊之教且開知足之端歴代所欽治宜敬切本朝典故尤所重之凡曰引年莫非延世推之半祿待以優恩其於敦勸之方可謂至乎其至也然而近嵗寖成弊風搢紳之間貪冒相尚但顧子孫之計殊愆羞惡之心馳末景於桑榆負厚顔於鐘漏不知其過自以為得誠非朝廷所以待士大夫之意又非士大夫所以遵禮義之常也臣思及此悚然汗下伏望特降指揮御史臺將文武班簿檢會應臣僚年及七十並令臺牒諷其致仕如牒舉後三兩日内未見抗章祈請乞自朝廷降令致仕所貴稍遏趨營之弊頗敦㢘耻之風御史中丞賈昌朝上奏曰臣伏見䕶國軍節度使兼侍中張耆赴河陽武勝軍節度使高化赴相州乞免衙辭河陽節度使楊崇勲復平章事乞免衙謝兼聞上件官等並乞只於後殿見謝辭者按近制臣僚見謝辭並合在前殿仍詣正衙除假故外若事急速或許於後殿或免過正衙並繫臨時特㫖耆等位為節制久去朝闕辭見不由前殿出入不詣正衙或扶以拜君或揖而受賜既稱衰病且冒寵榮雖聖上眷待老臣特推異數猶宜避免以示恪恭豈可輙上奏封自求優便今國家外扞邊寇方任武臣所宜並示恩威不可專用姑息仍恐文武臣僚自此更輕慢朝廷之儀歴代名臣奏議卷二百八十五
