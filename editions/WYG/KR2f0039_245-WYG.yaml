body:
  text: 歴代名臣奏議卷二百四十五明楊士竒等撰荒政宋哲宗元祐元年門下侍郎司馬光論賑濟劄子曰臣竊惟鄉村人户播植百榖種藝桑麻乃天下衣食之原比於餘民尤宜存恤凡人情戀土各願安居茍非無以自存豈願流移它境國家若於未流移之前早行賑濟使糧食相接不至失業則比屋安堵官中所費少而民間實受賜若於既流移之後方散米煮粥以有限之儲蓄待無窮之流民徒更聚而餓死官中所費多而民實無所濟伏覩近降朝㫖令户部指揮府界諸路提㸃刑獄司體量州縣人户如委是闕食據見在義倉及常平米榖速行賑濟仍丁寧指揮州縣多方存恤無致流移失所此誠得安民之要道然所以能使民不流移者全在本縣令佐得人欲使更令提㸃刑獄司指揮逐縣令佐專切體量鄉村人户有闕食者一面申知上司及本州更不候回報即將本縣義倉及常平倉米榖直行賑貸仍據鄉村五等人户逐户計口出給歴頭大人日給二升小兒日給一升令各從民便或五日或十日或半月一次齎歴頭詣縣請領縣司亦置簿照㑹若本縣米榖數少則先從下户出給歴頭有餘則并及上户其不願請領者亦聴候將來夏秋成熟糧食相接日即據簿歴上所貸過糧令隨税送納一斗只納一斗更無利息其令佐若别有良法簡易便民勝於此法者亦聴從便要在民不乏食不至流移而已仍令提㸃刑獄司常切體量逐縣令佐有能用心存恤闕食人户雖係灾傷並不流移者保明聞奏優於酬奬其全不用心賑貸致户口多流移者取勘聞奏乞行停替庶使吏有所勸沮百姓實霑聖澤光又乞趂時收糴常平斛斗劄子曰臣勘㑹舊常平倉法以豐歳榖賤傷農故官中比在市添價收糴使蓄積之家無由邀勒貧民須令貴糴物價常平公私兩利此乃三代之良法也曏者有因州縣闕常平糴本錢雖遇豐歳無錢收糴又有官吏怠慢厭糴糶之煩雖遇豐歳不肯收糴又有官吏不能察知在市斛斗實價只信憑行人與蓄積之家通同作弊當收成之初農夫要錢急糶之時故意小估價例令官中收糴不得盡入蓄積之家直至過時蓄積之家倉廩盈滿方始頓添價例中糶入官是以農夫糶榖止得賤價官中糴榖常用貴價厚利皆歸蓄積之家又有官吏雖欲趂時收糴而縣申州州申提㸃刑獄提㸃刑獄申司農寺取候指揮比至回報動涉累月已是失時榖價倍貴是致州縣常平倉斛斗有經隔多年在市價例終不及元糴之價出糶不行堆積腐爛者此乃法因人壊非法之不善也熈寧之初執政以舊常平法為不善更將糴本作青苗錢散與人户令出息二分置提舉官以督之豐歳則農夫糶榖十不得四五之價凶年則屠牛賣肉伐桑賣薪以輸錢於官錢貨愈重榖直愈輕朝廷深知其弊故罷提舉官令將累年蓄積錢榖財物盡樁作常平倉錢物委提㸃刑獄交割主管依舊常平食法施行今歳諸路除有水災州軍外其餘豐熟處多今欲特降指揮下諸路提㸃刑獄司乗有此糴本之時委豐熟州縣官各體察在市斛斗實價多添錢數廣行收糴如闕少倉厫之處以常平倉錢添盖仍令少糴麥豆多糴榖米其南方及川界卑溼之地有斛斗難以久貯者即委提㸃刑獄相度逐州縣合銷數目抛降收糴纔候將來在市物貨價比元糴價稍増即行出糶不得令積壓損壊仍令州縣各勒行人將十年以來在市斛斗價例比較立定貴賤酌中價例然後將逐色價分為三等自幾錢至幾錢為中等價幾錢以上為上等價幾錢以下為下等價令逐處臨時斟酌加減務在合宜既約定三等價仰自今後州縣毎遇豐歳斛斗價賤至下等之時即比市價相度添錢開場收糴凶年斛斗價貴至上等之時即比市價相度減錢開場出糶若在市見價只在中等之内即不糴糶更不申取本州及上司指揮免有稽滯失時之患仍委提㸃刑獄常提舉覺若州縣斛斗價及下等而不收糴價及上等而不出糶及收貯不如法變轉不以時致有損壊並監官不逐日入場致壅積糶糴人户並取勘施行若州縣長吏及監官用心及時糴糶至得替時酌中價錢與斛斗通行比折與初到任時増剰及十分中一分以上許批書上歴子候到吏部日與升半年名次及二分以上許指射家便差遣一次所貴官吏各各用心州縣皆有儲蓄雖遇洊饑民無菜色又得官中所積之錢稍稍散在民間可使物貨流通其河北州縣有糴便司斛斗見多沿邊州縣轉運司見糴軍糧處更不糴常平倉斛斗若今來指揮内有未盡未便事件委提㸃刑獄司逐旋擘劃申奏施行侍御史王巖叟乞常平不分立三等疏曰臣伏覩昨降朝㫖文雖詳而未通四方來者更言其未便臣按常平舊法但遇年豐物賤即與市價上添錢收糴如年儉物貴即度在市實直價例特減錢出糶此所以為常平今既限以價賤至下等方許收糴價貴至上等始得出糶乃是必待豐歉十分而後行法稍不及等即官司拘文束手坐視而不敢糴糶臣恐久之天下救災之備寡而傷農之患多失常平本意逺矣臣乞依舊法不分立三等仍更不申取本州及上司指揮外餘約新降朝㫖别行修定頒降巖叟又請依舊法賑濟免河北貸糧出息疏曰伏以救災恤患惟恐有所不至以傷其仁先王之用心也隨施以有求乗危以論利盖不忍焉臣按祖宗賑濟舊法災傷無分數之限人户無等第之差皆得借貸但令隨税納原數而己未嘗有息也故四方之人霑惠者溥銜恩者深郡縣倉庾以陳易新者多其後刻薄之吏隂改舊法必待灾傷放税七分以上方許貸借而第四等以下方免出息殊非朝廷本意縁災傷放税多是監司以聚斂為急威脅州縣州縣又承望風㫖不復體心朝廷以災傷的實分數除放若放及七分者災傷已是十分況少肯放七分又六分之與七分相去幾何毫釐之間何以辨别幸而得為七分别有借貸不幸而為六分則無借貸但繫檢灾官吏一言之髙下而被災百姓幸不幸相逺如此不可不察也三等而上均為赤子均遇天灾豈容因灾偏令出息計其所得則甚少論其所損則實多乖陛下平一之心虧朝廷光大之施臣乞復如舊法不限災傷之分數並容借貸不拘民户之等第均令免息庶幾聖澤無間感人心於至和天下幸甚如允臣所奏其河北京西淮南等路昨來水灾州縣乞先次指揮施行二年十二月著作郎范祖禹乞不限人數收養貧民劄子曰臣伏見陛下以今冬大寒異於常年聖心憂軫救恤小民無所不至近又出禁中錢十萬貫以賜貧民此誠博施濟衆堯舜之仁也禮記曰財聚則人散財散則人聚臣知此財一散而人心皆聚於朝廷矣古之聖人未有不矜恤孤貧者堯命舜舜命禹皆以四海困窮為説書稱不虐無告不廢困窮惟帝堯能之盖置而不恤則是虐之矣棄而不養則是廢之矣伊尹稱湯曰先王子惠困窮周公曰文王懐保小民惠鮮鰥寡孟子曰文王發政施仁必先鰥寡孤獨夫聖人養天下之民使貧者不至失所則不貧者自安是故古者為政必先恤困窮之民國朝祖宗以來惠恤孤貧仁政非一毎遇大雨雪則放公私房錢以至糶米賣炭散錢死者則賜錢瘞埋惠及存没近日朝廷無不舉行而又發内帑之錢降非常之恩悳澤之厚無以加矣陛下勤恤小民如此而臣忝在左右竊思有可以少補聖政之萬一者忍黙而不言哉古者鰥寡孤獨廢疾皆有養既養之則不至於凍餒而死朝廷自嘉祐已前諸路有廣惠倉以救恤孤貧京師有東西福田院以收養老幼廢疾至嘉祐八年十二月又増置城南北福田共為四院此乃古之遺法也然毎院止以三百人為額臣竊以為京師之衆孤窮者不止千二百人又朝廷毎遇大冬盛寒則臨時降㫖救恤雖仁恩溥博然民已凍餒死損者衆夫救饑於未饑之時先為之法則人不至於饑死救寒於未寒之時預為之備則人不至於凍死今毎嵗收養與臨時救濟二者等為費用不若多養之為善也臣愚以為宜於四福田院増盖官屋以處貧民不限人數並依舊法收養委左右廂提舉使臣毎至冬月多設方略救濟或給米豆設糜粥不必專散見錢其使臣存活到人數書為課績量與酬奬死損多者亦立殿罰如四廂使臣提舉難遍即委吏部臨時更選差使臣四員相兼提舉量與添給仍理為重難短使存活死損殿最亦依四廂使臣法其天下廣惠倉竊慮州縣不以為急乞更申明成法毎嵗以時舉行委逐路監司丁寧行下所屬州縣及因廵歴案視或於逐州别差官㸃檢使知朝廷掛意令官吏用心振恤須要實惠及貧民不得輕易以為末事畿内諸縣亦乞令擘畫官屋依京師收養無令逺者聚於都下重立條禁以絶主掌支散之人減刻之弊如此則物不虚費而所活益多矣國家富有四海毎歳用係省錢一二萬緡於租賦之入無異海水之一勺而饑窮之人日得十錢之資升合之米則不死矣此乃為國者所當用王政之所先也況朝廷幸不惜費唯更増修舊法推廣祖宗仁政以副陛下慘怛愛民之意夫何難哉臣竊惟陛下近日所行萬萬於此而臣之所陳事乃至㣲然古之聖人莫不以此為先務所以拯生民之性命其法不可不備也如臣言稍有可采伏乞詳酌施行祖禹又論常平劄子曰臣竊以當今天下之患在於公私俱無蓄積無以待水旱凶歉一時不雨則民饑饉流亡昨春夏旱京西陜西艱食尤甚唐鄧人民相食遺棄男女流離道路其存者食犬彘之食饑民羣行刼米坐法配流者係纍相屬幸而得麥民復有生望故大盜不作耳然轉於溝壑與配𨽻逺方者已不可勝數仁聖在上豈不哀憫而為之計慮哉夫以數月不雨適當青黄不接之際民已如此若不幸復有方二三千里之水旱將何以救之自中夏以來雨水不至過多秋成可望諸郡雖有被水災之處然約計之收熟之處必多年榖稍登則公私逋負督迫民間速欲得錢無由貯積必至甚賤此農所以豐凶皆困也自非朝廷廣謀收糴以時發斂則無以平糴濟民今諸路提刑司積常平錢猶多竊恐自罷散青苗錢以來常平之法尚未修復如舊臣愚欲乞速降指揮諸路提刑司乗今秋豐稔榖賤之時盡以所有之錢増價收糴使不至於甚賤傷農來春榖貴則減價出糶使不至於甚貴傷民若止以常平錢收糴恐亦未廣陛下誠能出内庫金帛數十萬以為糴本專以備水旱凶荒發斂以時則官本常存而民被惠澤無窮濟民之命無大於此祖宗置内藏庫本以備軍旅非常之用仁宗嘗出錢一百萬緡以助常平糴本此仁恩所以深結於民心也夫財出於民復以濟民但使民存不至流亡則今年散之明年復有何患乎無財也前年冬大寒陛下出錢十萬緡散之窮民民苦於寒陛下不忍坐視其死捐以與之誠知民為國本不可不愛惜也況糴本常不動而可以利民止是以内庫之錢借之外路又有先朝故事何憚而不為乎如以臣言為然乞早賜施行祖禹又論常平劄子曰臣竊以為國之本在於務農務農之本在於貴榖舜咨十二牧曰食哉惟時洪範八政以食貨為首孔子曰所重民食畜積者邦國之大本生民之大命也臣伏見累年以來天災流行年榖不熟昨春夏之交天久不雨陛下憂勞昃食於上大臣惶恐請罪於下豈非以倉廩空虚民無所食盜賊並起將有不可知之變哉一朝得雨報賽神祗則君臣釋然相慶不復以民食為念矣夫嵗之豐凶天之常也豐年常少凶年常多水旱之災堯湯所以不能免然而國不困民不亡者有畜積以為之備也昨春夏未雨之時民已無復生理幸而得麥出於望外豈可常思僥倖天災之不成也臣訪聞諸路今秋可望大熟民間不唯速欲得錢必至甚賤又小民不為逺慮一熟則輕賤五榖粒米狼戾古之聖王知其如此是故操斂散之術以權之管子曰民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重輕重之權在上則其利不入於兼并之家而農民常得其平此所以家給人足也至於衰世豐不知斂凶不知散故其政荒其民流孟子曰狗彘食人食而不知檢塗有餓莩而不知發如此者其國幾何而不亡也今天下背本趨末民惟視上之所好若朝廷以農為急乃可使民務本黄金珠玉饑不可食寒不可衣然而人貴之者好之者衆也誠使貴五榖而賤金玉則民豈有不以糓為重者哉布帛不可一日而闕亦皆人力所為至於五榖天不生地不長則非人力所能致也昔梁武帝享國幾五十年江南久安風俗奢侈不務畜積侯景之亂連年旱蝗富民皆懐金玉衣錦綺相枕籍而死唐末髙駢亂淮南揚州米斗至直錢五十千皆史册所載古有此事安知來世之必無也今夫夏則畜炭冬則藏氷凡民皆能知之至於豐年則不知為凶歳之備盖以五榖為常有而輕之耳古人旱則備水水則備旱豐登則備凶歉知天時之有必至也惟陛下留意於務農貴榖修常平之政以厚天下六年七月祖禹為給事中又封還臣寮論浙西賑濟事狀曰準中書省録黄臣寮上言竊聞浙西州軍近以灾傷朝廷選差轉運副使岑象求運判楊懐寳仍賜米百萬斛錢二十餘萬緡俾救其患州縣自亦依條發倉廩作粥飯救濟行將少蘇矣細民習為驕虚以少為多其弊已久欲乞明詔本路監司并州縣詳具灾傷分數賑貸行遣次第各行申奏徐考其虚實而懲責其尤甚者候勅㫖又臣寮上言訪聞兩浙水灾惟蘇湖秀三州為甚外常杭二郡絶為輕小其三州之地亦有髙下不等今𫝊言者或謂水灾至大無可種之田或謂髙田無水下田水退有可種之處以謂本因風駕海水江湖壅遏加之雨多遂有漲涌之患風退水落此患自弭可以種作人言異同如此誠不可以不察乞下本路鈐轄轉運提刑及蘇湖等五州令各開具逐州水灾所及凡幾縣幾村有無漂蕩廬舍溺死人口及髙田無水與水退可耕之地各約若干並令詣實申奏不得相關稍涉謬妄即乞重行降黜兼朝廷近日别遣使者支撥斛㪷一百萬見錢度牒約計二十萬貫不為不多若見今未種今秋無穫則向去乏食賑濟之期甚為長逺所差去官當相度事體措置凡此皆繫官吏能否而一有失當其害非輕乞令賑濟官司凡措置稍大事件並申取朝廷指揮其急切不可待報者雖許一面施行亦須便具畫一奏知所貴朝廷察其中否緩急未便可以救止候􅃯㫖七月二十二日三省同奉聖㫖並依奏者右臣謹按唐代宗大歴中霖雨損稼渭南縣令獨稱縣境不損遣御史按實損三千餘頃帝三思久之曰縣令字人之官不損猶應言損何不仁如是乎貶渭南令為南浦尉德宗正元中江淮大水宰相陸䞇請遣使賑恤帝曰聞所損殊少即議優恤恐生奸欺䞇上奏曰流俗之弊多徇諂諛揣所悦意即侈其言度所惡聞則小其事制備失所常病於斯又曰所費者財用所收者人心茍不失人心何憂乏用乃遣使宣撫水災憲宗元和中南方旱饑遣使賑恤將行帝戒之曰朕宫中用帛一匹皆籍其數唯賙救百姓則不計費卿輩當體此意七年又謂宰相曰卿輩屢言淮浙去歳水旱近有御史自彼還言不至為災事竟如何李絳對曰臣按淮南浙東奏狀皆云水旱人多流亡求設法招撫其意似恐朝廷罪之者豈肯無災而妄言有災耶此盖御史欲為奸諛以悦上意耳願得其主名案致於法帝曰卿言是也國以人為本聞其有災當亟救之豈可尚復疑之耶朕適者不思而言耳命速蠲其租賦古之人君聞有災害唯責人不言其救災唯恐人惜費又恐不及於事陸贄李絳賢相也亦專信守臣奏報惡言者之小其事以緩君心之憂也今國家建都於汴實就漕挽東南之利京師億萬之口所食贍軍養民皆出於二浙此乃國之根本豈可不思其所從來今陛下二方之赤子嗷嗷然有倒垂之急如嬰兒之絶乳其死可立而待也方呼天赴訴開口待哺以延朝夕之命為之父母者忍惜力而不救乎臣竊詳臣寮所言朝廷已賜米百萬錢二十餘萬州縣亦自依條發倉廩作粥飯救濟人行將少蘇矣臣竊以作粥救饑最出下策夫民已至相聚食粥則疾疫將起饑困已甚死者必衆此乃災傷之極正當憂慮豈得便為少蘇又言細民習為驕虛以少為多其弊已久臣竊謂常年小有旱澇披訴災傷僥倖之民或容有此今浙西災害甚大民已流散乞食迫於死亡方且疑其習為驕虚而不加信何其忍哉又言乞詔監司州縣詳具災傷分數賑貸行遣次第各行申奏而懲責其尤甚者臣竊謂朝廷以侍從之臣為一路鈐轄又選差監司以往行未及境未及設施朝廷既不憑信鈐轄司之言又戒約監司州縣如此臣恐官吏束手不能有所施為上下觀望各求茍免夫奏災傷分數過實賑濟用物稍廣此乃過之小者正當濶畧不問以救人命若因此懲責一人則自今官司必以為戒將坐視百姓之死而不救矣又臣寮言人言異同下可不察乞下鈐轄提轉及蘇湖等五州各令開具逐州水災所及凡幾縣幾村有無漂蕩廬舍溺死人口及髙田無水與水退可耕之地各約若干並令詣實申奏不得相關稍涉謬妄乞重行降黜臣伏見近日浙西申奏自今年正月大雨至六月太湖泛溢蘇湖秀等州城市並遭水浸田不布種廬舍漂蕩民弃田賣牛散走乞食臣謂朝廷聞此當令官司如救焚拯溺猶恐不及今若降此指揮逐縣逐村須遣人抄劄廬舍人口田土數目饑荒之際此等行遣必為煩擾一事不實即憂及罰闔境皆死未必獲罪如此則賑濟却為閒慢百姓愈無救矣又言近日别遣使者支撥斛斗百萬見錢度牒約二十萬不為不多若見今未種今秋無穫則向去賑濟之期甚逺所差去官當相度事體措置一有失當其害非輕今所差去官與時暫遣使不同若向去賑濟期日長逺此乃本司職事在彼自當任責當且委以措置不須約束免有疑惑觀望臣竊以今水潦方降秋田殊未有望審如臣寮所言今秋無穫本路必更奏請朝廷亦當接續應副則前日所賜未足為多況斛斗止令出糶官不損直常平倉本無給散之法唯廣惠倉許賑濟不足方許通支常平放税及五分處仍不得過所限之數兩倍浙西鈐轄司近方奏乞不限石斗尚未降朝㫖又奏夏田元未放税以此觀之官司守法止有賑救不及之事必無過當之理臣寮又言乞令賑濟官司措置稍大事件並申取朝廷指揮其急不可待報者雖許一面施行亦須便具畫一奏知所貴朝廷察其中否緩急未便可以救止臣伏見英宗時臣叔祖鎮出知陳州辭日英宗宣諭陳州累年災傷卿到彼悉心賑撫臣鎮至州方直春種即發常平倉貸民種糧提刑司奏劾官吏詔釋不問陳州至京不數日可以往返然猶不先奏而行恐不及於事也神宗時西京大水遣郎官一人御藥院内侍一人賑恤多方救濟北京亦然朝廷未嘗先為條約以防之也今兩浙在二千里外事稍大者若須申奏比及得報即已後時雖急切許一面施行若官司畏避事無大小一皆奏請不敢專行則此法豈不為害臣伏覩浙西鈐轄轉運司前後申奏累年災傷今歳大水以至結罪保明奏乞斛斗度牒又云父老言四十年無此水災近奏蘇州饑民死者日有五七百人饑疫更甚於熈寧又湖州奏貧人入城死者相繼遺棄男女官為收養據此則災傷輕重亦可知矣今詳臣寮所言大意唯以朝廷所賜錢斛不少恐災傷不至如所奏故欲考察虚實懲責謬妄然臣之愚慮竊謂朝廷已賜錢斛百二十萬德深澤厚又選監司以往免更臨遣專使今監司方出國門錢斛纔至本路即降此指揮約束百姓必謂朝廷重惜錢斛輕棄人命百二十萬已厭其多將來乏食日逺復何所望所吝者財物所失者人心況本路有鈐轄司轉運提刑司發運司互相監臨而轉運司主財不欲多費故祖宗以來賑濟委提刑司盖恐轉運司惜物也監司州縣有凶年饑饉皆不得已而上聞亦豈肯於無災之地振不饑之民耗散倉廩坐失租税以取不辦之責哉今唯當戒飭官司多為方畧存活人命寛其約束責以成效庶幾餘民早獲安堵唯是給散無法枉耗官廩賑救不及貧弱出糶反利兼并措置乖方所宜約束然此乃監司使者之事朝廷亦難遥為處畫也若監司得人此弊自少誠使有之則人言相𫝊亦豈可掩臺諫足以風聞彈奏朝廷足以考察案効未為晩也今先降此指揮徒能牽制撓亂其所為耳伏望聖慈以逺方生靈性命為念無以官司賑濟過甚為憂其臣寮所言伏乞更不施行所有録黄謹具封還祖禹為翰林學士又上恤民劄子曰臣伏見陛下即位以來惻怛愛民出於誠心一有灾傷則遣使振救倉廩府庫無所愛惜十年之間凡兩出内庫錢十萬緡以賜京師寒凍之民祖宗之時唯是蠲放欠負未聞賜錢如此之多陛下德澤深厚乃古聖帝明王之用心也然而天災流行民食猶難臣訪聞河北諸郡聚饑民所在以數萬若今歳夏秋更一不熟不知國力何以繼之臣願陛下更與執政大臣圖救民之術朝廷政事宜務安靜無所作為專聴於民左右從之未有民安而國不安民和而天不應者也陛下養民如子視民如傷今民方饑困尤當以安之為急唯陛下深留聖思以固邦本天下幸甚元祐二年知潞州梁燾上奏曰臣伏見去冬苦寒今秋大旱被災之民如卧焦灼日望睿澤湔濯瘡痏陛下恐懼天戒惻怛民隱誠意内修政事外飭未損靜治願寛聖憂但當采用公言講求仁術坐致明恩實惠徧及四海則降監昭昭還受嘉福矣臣以謂人已久困歳復洊饑今來凍餒已足深憂向去流離尤為大患正在朝廷衣食拊循固結其意以父母妻子為愛以墳墓閭井為戀相扶而不貳相死而不去不貳則盜賊不起不去則田野不曠固本寧邦其要在此臣聞天下倚閣税賦編敇以限年催理雖催理之令行於豐年而多值災傷間獲小稔官曹執法督迫期㑹縱得十分豐熟亦隨百色分張故民間愁怨紛紜常以欠負為苦官中所入既有限數之内往往不足至有嚴刑峻令僅獲無遺官帑小補而民室大空矣三年一遇大禮竟用赦恩蠲免在公徒有理欠之名在私乃有刻剥之弊是存空名於公家而行實敝於私門也為害如此何益治體臣欲乞聖慈特降指揮勘㑹災傷路分自元祐二年以前有見在倚閣税賦一切除放以救百姓今日目前之急如此則明恩實惠下及幽逺感激歡欣咸歸聖悳若郡縣得人欽體詔㫖更求勞徠安集之方免凍餒流離之苦前接麥熟終保安全和氣既充隂陽自順四時協序百榖用成數年之間税賦之入可以加倍倚閣之數矣陛下必欲救全百姓此事最為切當伏望斷自宸衷無容回奪使中外明知非常之恩出自兩宫則天下幸甚四年二月左司諫劉安世與右諫議大夫朱光庭同乞更張常平之弊疏曰臣等聞國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國盖先王之制三年耕必有一年之食以三十年通之則可以有十年之備故堯湯之水旱至於累歳而無捐瘠之民者用此道也三代而下井田廢缺利民之法無善於常平由漢迄今莫能變易惟自近世有名無實凡所以養民之具月計不足何暇議三年之蓄哉是以歳或不登民輙菜色強者轉而為盗賊弱者不免於餓殍保民之術如此亦以疏矣臣等竊謂自罷青苗錢後來天下州縣皆有積鏹朝廷雖更立常平之制條目甚詳而上下因循未嘗留意既無統屬以糾其乖繆又無賞罰以為之勸沮加之轉運司茍紓目前之急多端借貸日朘月削殊無償足之期非有懲革將不勝弊臣伏望聖慈特降睿㫖取今日以前應干常平敕令嚴責近限專委户部刪為一書付之有司悉俾遵守仍先行指揮將天下見在常平錢乗今秋豐稔之時令五路糴粟一色其餘路分並相度逐處可以久留斛㪷廣行收糴仍以本司錢修盖合用倉廩將一路所有錢衮同應副一路之中不得偏聚一州一州之境不得偏聚一縣各隨户口之多寡以置糴入之大數毎遇凶歉依法出糶糴糶之法常以市價増減如此則官本常存而物價不能翔踴或遇旱乾水溢之災則民有所濟不至流散朝廷之惠澤可繼而無乏絶之患相因日久漸至九年之蓄太平之策莫大於此惟陛下推至誠惻怛之意明詔執政協力施行所有官吏殿最亦乞㕘酌修定將來頒降之後或有違犯州縣委監司監司令户部御史臺覺察奏劾庶使二聖卹民之仁心不為徒然之政𫝊之萬世天下幸甚安世又奏乞振貸鳯翔府界饑民疏曰右臣伏聞京西關陜去歳時糓不登農民艱食兩路郡邑已行賑貸而鳯翔永與實為接境旱災分數大槩畧同物價翔踴民多菜色臣聞秦鳯路諸郡各收五分惟是岐下實所不及然而轉運司牽於隣州之例放税止於五分拘礙常法不該賑濟今方中春民已窮困若候夏麥必致餓殍比聞崔謀鎮白晝驚刼愚民急迫豈有常心與其委於溝壑不若亡命為盜以幸萬一之免竊恐因此饑饉寇賊充斥使關中之民不得安堵非細故也臣愚欲乞朝廷專委秦鳯路提刑司疾速體量若鳯翔境内委實荒歉則一面令本司依永興軍路災傷州縣特行賑貸更不奏候朝㫖如此則非惟千里之人得免轉死之患至於寇盜亦當衰息伏望聖慈詳酌早賜指揮安世又為歳旱乞講荒政疏曰臣伏見去年經冬時雪愆候今春涉夏益苦亢旱二麥將稿秋種未布民已艱食歳事可憂雖兩宫焦勞祠禱備至應祈之澤終未霑足臣嘗觀國朝故事太祖建隆元年以揚泗民多饑死郡中軍儲尚百餘萬斛即命發廩賑貸乾德二年嘗詔諸州長吏視民田旱甚者即蠲其租不必俟報太宗或遇旱歳必蔬食減食品三之二得雨乃復常膳真宗祥符八年以京東物價稍貴令有司出常平粟減價糶用濟貧民九年詔江淮發運司歳留上供米五十萬以備賑濟今來旱勢濶逺事宜前慮至於散利緩刑弛力蕃樂索鬼神除盜賊皆聖人救荒之政亦宜先事而講伏望聖慈上法三聖之意下考成周之典凡可以救災恤民者次第施行五年七月知杭州蘇軾乞預備來年救饑之術上奏曰臣聞事豫則立不豫則廢此古今不刋之語也至於救灾恤患尤當在早若灾傷之民救之於未饑則用物約而所及廣不過寛減上供糴賣常平官無大失而人人受賜今歳之事是也若救之於已饑則用物博而所及㣲至於耗散省倉虧損課利官為一困而已饑之民終於死亡熈寧之事是也熈寧之災傷本縁天旱米貴而沈起張靚之流不先事奏聞但立賞閉糴富民皆爭藏榖小民無所得食流殍既作然後朝廷知之始敕運江西及截本路上供米一百二十三萬石濟之廵門俵米欄街散粥終不能救饑饉既而繼之以疫疾本路死者五十餘萬人城郭蕭條田野丘墟兩税課利皆失其舊勘㑹熈寧八年本路放税米一百三十萬石酒課虧減六十七萬餘貫畧計所失共計三百餘萬石其餘耗散不可悉數至今轉運司貧乏不能舉手此無它不先事處置之過也去年浙西數郡先水後旱災傷不減熈寧二聖仁智聰明於去年十一月中首發德音截撥本路上供斛㪷二十萬石賑濟又於十二月終寛減轉運司元祐四年上供㪷斛米三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既住糴米價自落又自正月開倉糶常平米仍免數路税場所收五榖力勝錢且賜度牒三百道以助賑濟本路帖然遂無一人餓殍者此無它先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此洪惟二聖天地父母之心見民疾苦匍匐救之本不計較費多少而臣愚魯無識但知權利害之輕重計得喪之大小以謂譬如民庶之家置莊田招佃客本望租課非行仁義然猶至水旱之歳必須放免欠負借貸種粮者其心誠恐客散而田荒後日之失必倍於今故也而況有天下子萬姓而不計其後乎臣自去歳以來區區獻言屢瀆天聴者實恐陛下客散而田荒也去歳杭州米價毎㪷至八九十自今年正月以來日漸減落至五六月間浙西數郡大雨不止太湖泛溢所在害稼六月初間米價復長七月初㪷及百錢足陌見今新米已出而常平官米不敢住糶灾傷之勢恐如去年何者去年之灾如人初病今歳之灾如病再發病狀雖同氣力衰耗恐難支持又縁春夏之交雨水調匀浙人喜於豐歳典賣舉債出息以事田作車水築圩髙下殆遍下本已重指日待熟而淫雨風濤一舉害之民之窮困實倍去歳近者將官劉季孫往蘇州閲教臣宻令季孫沿路體訪季孫還為臣言此數州不獨淫雨為害又多大風駕起潮浪堤堰圩垾率皆破損湖州水入城中民家皆尺餘此去歳所無有也而轉運判官張璹自常潤還所言畧同云呉江平望八冊間有舉家田苗没在深水底父子聚哭以船栰撈摝云半米猶堪炒喫青穟且以喂牛正使自今雨止已非豐歳而況止不止又未可知則來歳之憂非復今年之比矣何以言之去年杭州管常平米二十三萬石今來已糶過十五萬石雖餘八萬石而糶賣未巳又縁去年災傷放税及和糴不行省倉闕數所有上件常平米八萬石只了兌撥充軍糧更無見在惟糴米錢近八萬貫而錢非救饑之物若來歳米益貴錢益輕雖積錢如山終無所用熈寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曵羅綺帶金玊横尸道上者不可勝計今來浙東西大抵糴過常平米見在數絶少熈寧之憂􅏮􅏮在人眼中矣臣材力短淺加之衰病而一路生齒憂責在臣受恩既深不敢别乞閒郡日夜思慮求來年救饑之術今來浙西數州米既不熟而轉運司又管上供年額斛㪷一百五十餘萬石兩司爭糴米必大貴饑饉愈速和糴不行來年青黄不交之際常平有錢無米官吏拱手坐視人死而山海之間接連甌閩盜賊結集或生意外之患則雖誅殛臣等何補於敗以此須至具實聞奏伏望聖慈備録臣奏行下户部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合準常平斛斗出糴救饑如合準備即具逐州合用數目臣已約度杭州合用二十萬石仍具逐司擘劃合如何措置令米價不至大段翔踴收糴得足如逐司以謂不須準備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏縁今來已是立秋去和糴月日無幾比及相度往復取㫖深慮不及於事伏乞詳察速賜指揮貼黄臣聞之道路閩中災傷尤甚盜賊頗衆或云邵武軍有強賊人數不少恐是廖恩餘黨轉運司見令衢州官吏就近體訪雖未知虚實然萬一有之不可不預慮也貼黄臣謹按唐史憲宗謂宰臣曰卿等累言呉越去年水旱昨有御史自江淮按察回言不至為灾此事信否李絳對曰臣見淮南浙江東西道狀皆云水旱且方隅受任皆朝廷信重之臣茍非事實豈敢上陳此固非虚説也御史官卑選擇非其人奏報之間或容希媚況推誠之道君人大本茍一方不稔當即日救濟其饑貧況可疑之耶帝曰今後諸道被水旱饑荒之處速宜蠲貸之又按本朝㑹要太宗嘗語宰臣曰國家儲蓄最是急務盖以備凶年救人命昨者江南數州㣲有災旱朕聞之急遣使往彼分路賑貸果聞不至流亡兼無餓殍亦無盜賊之患茍無積粟何以拯救饑民臣近者毎觀邸報諸路監司多是於三四月間先奏雨水調匀苗稼豐茂及至灾傷須待餓莩載塗然後奏知此有司之常態古今之通患也豐熟不須先知人人爭奏災傷正合預備相顧不言若非朝廷廣加採察則逺方之民何所告訴軾又狀奏曰右臣近者伏見二聖遇災而懼憂勞四方所以拯救饑民者可謂至矣兩浙淮南䝉賜度牒六百道而杭揚二州各得百道使民鼓舞歌詠聖澤曽未數日而淮西提刑申户部本路常平斛㪷足用不須上件度牒兩浙轉運提刑亦申本路今年豐熟别無流民是致户部申都省却乞拘收度牒錢斛以備别時支用都省更不奏禀聖㫖便行下本路提刑司依户部所申施行臣勘㑹自來聖恩以灾傷特賜錢物賑濟即無似此中變却自都省行下追收體例深駭物聴淮浙兩路去歳灾傷之甚行路備知便使今年秋榖大稔猶恐未補瘡痍而況春夏之交稻秧未了未委逐路提轉如何見得今年秋熟便申豐稔顯是小臣無意卹民專務獻諂而戸部都省樂聞其言即時施行追寢二聖已行之澤百姓聞之皆謂朝廷不惜饑民而惜此數百紙度牒中路翻悔為惠不終臣忝備禁從受恩至深不忍小臣惑誤執政屯膏反汗虧污聖悳惜毫毛之費致丘山之損是以冒昧獻言伏望聖慈察臣孤忠留中省覧更不降出只作聖意訪聞戒飭執政令速降指揮更不得拘收一依前降聖㫖盡用賑濟所貴艱食之民始終被惠亦免二聖已行恩命反覆追收失信天下臣不勝區區謹録奏聞七年二月軾為龍圖閣學士知揚州又奏曰臣已具積欠六事及舊所論四事上奏臣聞之孟子曰以不忍人之心行不忍人之政若陛下初無此心則臣亦何敢必望此政屢言而屢不聴亦可以止矣然臣猶孜孜強聒不已者盖由陛下實有此心而為臣子所格沮也竊觀即位之始發政施仁天下聳然望太平於朞月今者八年而民益貧此何道也願陛下深思其故若非積欠所壓自古至今豈有行仁政八年而不蘇者哉臣前所論四事不為不切而經百餘日畧不施行臣既論奏不已執政乃始奏云初不見臣此疏遂奉聖㫖令臣别録聞奏意謂此奏朝上而夕行今又二年於此矣以此知積欠之事大臣未欲施行也若非陛下留意痛與指揮只作常程文事降出仍却作熟事進呈依例送户部看詳則萬無施行之理臣人㣲言輕不足計較所惜陛下赤子日困日急無復生理也臣又竊料大臣必云今者西邊用兵急於財利未可行此臣謂積欠之在户部者其數不貲實似可惜若實計州縣催到數目經涉歳月積欠之在户部者累毫何足以助經費之萬一臣願聖主特出英斷早賜施行臣訪聞浙西饑疫大作蘇湖秀三州人死過半雖積水稍退露出泥田然皆無土可作田塍有田無人有人無糧有糧無種有種無牛殍死之餘人如鬼腊臣竊度此三州之民朝廷加意惠養仍須官吏得人十年之後庶可完復書曰制治於未亂保邦於未危浙西災患若於一二年前上下疚心同力拯濟其勞費殘弊必不至若今之甚也臣知杭州日預先奏乞下發運司多糴米斛以備來年拯濟饑民聖明垂察支賜緡錢百萬收糴而發運使王覿堅稱米貴不糴是年米雖稍貴而比之次年春夏猶為甚賤縱使貴糴尚勝於無而覿執所見終不肯收糴顆粒是致次年拯濟失備上下共知而不詰問小人淺見只為朝廷惜錢不為君父惜民𩔖皆如此淮南東西諸郡累歳災傷近者十年逺者十五六年矣今來夏田一熟民於百死之中㣲有生意而監司爭言催欠使民反思凶年怨嗟之氣必復致水旱欲望聖慈救之於可救之前莫待如浙西救之於不可救之後也臣敢昧死請内降手詔云訪聞淮浙積欠最多累歳災傷流殍相屬今來淮南始獲一麥浙西未保凶豐應淮南東西浙西諸般欠負不問新舊有舊官本並特與權住催理一年使久困之民稍知一飽之樂仍更别賜指揮行下臣所言六事四事令諸路安撫鈐轄司推𩔖講求與天下疲民一洗瘡痏則猶可望太平於數年之後也臣伏覩詔書以五月十六日册立皇后本枝百世天下大慶孟子有言詩曰古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇當是時也内無怨女外無曠夫此周之所以王也今陛下膺此大慶猶不念積欠之民流離道路室家不保鬻田質子以輸官者乎若親發德音力行此事所全活者不知幾千萬人天鑒不逺必為子孫無疆之福臣不勝拳拳孤忠昧死一言元祐五年文彦博上奏曰臣於四月二十九日至西京見本京進奏官申狀録報皇帝太皇太后詔書以歴時災旱宿麥既盡秋稼未立上軫聖念引咎歸已特減常膳有以見聖心焦勞得堯湯罪已應天之義然臣向在都下毎見西來使命詢其雨澤稼穡次第多云近已得雨苖稼滋茂臣既出京到洛見縁洛民田宿麥秋稼悉如聖詔所及深慮向去小民艱食即聚為寇盜伏望嚴勅監司覺察守令勤恤民隱勿致煩擾及督責廵檢縣尉屏除賊盜令境内清肅人户安居救荒之政各在疚心諸事預防庶無後患殿中侍御史上官均乞復義倉疏曰臣聞賊盜之多常起於凶歳凶歳不足常生於無備備災卹患常平義倉之設最為良法熈寧十年始講隋唐之舊興置義倉令人户於正税斛㪷一石别納五升準備灾傷賑濟不得移用法頗周宻盖所斂至少所聚至多蓄之郡縣而散之於民斂之少則民易以輸聚之多則上足以施予蓄之郡縣則凶歳有備散之於民則人情無怨此隋文皇唐太宗嘗行於治平之世已試之効也元豐八年指揮諸路義倉一切廢罷議者至今惜之若以為擾民則所出纔二十分之一若患它用則當時已有著令又況水旱不常饑饉間有發倉廩則毎苦不足行勸誘則不免強取與其施之於倉卒不若備之無事今平糴之法既已修復唯義倉之制尚未興舉臣以為義倉貯積在近民居則饑歳賑濟無道路奔馳之勞費而人受實惠隋開皇中就社置倉盖以此也臣欲乞興復義倉之法令於村鎮有廵檢廨舍處建立倉廩以便斂散其餘例令有司更加修整以備饑歳誠非小補哲宗時户部侍郎蘇轍因旱乞許羣臣面對言事劄子曰臣伏見二年以來民氣未和天意未順災沴洊至非水即旱淮南饑饉人至相食河北流移道路不絶京東困弊盜賊羣起二聖遇災憂懼傾發倉廩以救其乏絶獨此三路所散已近三百萬斛矣異時振恤未見此比然而民力已困國用已竭而旱勢未止夏麥失望秋稼未立數月之後公私無繼羣盜蜂起勢有必至臣未知朝廷何以待此臣竊見太皇太后陛下清身奉法與物無私皇帝陛下恭黙靖慎動由禮義皇天后土照知此心而和氣不應深所未喻陛下嘗究其説否臣聞天氣下降地氣上騰隂陽和暢雨澤乃至君廣聴以納下臣盡言以上上下交泰元氣乃和今二聖居幃箔之中所與朝夕謀議者上止執政大臣下止諫官御史不過數十人耳其餘侍從近臣雖六官之長皆不得進見而況其逺者乎臣以謂羣臣識慮深淺不同其心好惡亦異故須兼聴廣覽然後能盡物情而得事實今陛下聴既不廣則所行之事不得不偏聴狹事偏則隂陽亢隔和氣不効必然之理也臣觀祖宗故事百官有司皆得以職事進對從容訪問以盡其情今二聖臨御四方履人主之位而謙恭退託疎逺羣臣不行人主之事遂使百官不敢以職事求見臣謂宜因此時明降詔書許百官面奏公事上以盡羣情之異同下以閲人才之賢否人心不壅天道必從則久旱之災庶幾可息臣䝉國厚恩比聞詔書引咎自責避正殿損饍分命臣僚並走羣望私心踧踖不敢遑寧輙推天意人事影響之應庶幾有補萬一惟陛下恕其愚僭畧賜采擇右司諫王覿奏乞稍貴京師常平倉米疏曰臣伏見在京諸倉糶常平米毎斗六十文至六十五文省有以見朝廷不惜虧損官本而惟以利民為務也然臣竊慮賤糶如此於小民足為一時之利於國計乃非長久之策何以言之夫京師者衆大之居也生齒之繁何可勝計民所食者軍糧之外則皆商賈所運自外而至也今官糶甚賤非所以致商賈也彼商賈所販雖新米其價乃與陳米相視而低昻者也京師之民舊多食麥而今多食米以米賤故也使旁郡之米麥入京師者浸少豈長久之策哉常平米固有限不常糶也雖有時而不糶商賈亦必以為疑而不肯多致恐一旦常平害之也夫物價不獨甚貴之為害而甚賤之亦所以為害故所謂常平者不欲其甚貴甚賤而已今賤常平之米為小民一時之利以疑商賈使民間無髙廩陳粟以為長久之備孰為得計哉臣愚以謂不若稍貴常平之米使無定著以為令而示信於商賈也假如著令曰京師常平米一斗其價以百錢為定毋輙増損糴者若干斗以下勿拒也行之既久商賈信之則稔歳必厚畜以待價使旁郡之米麥入於京師者浸多而京師可實也貼黄京師米價稍貴則不惟可以致四方之米麥又可使京師諸軍所請月糧下出於京城并畿甸諸軍所請月糧不出於畿甸而入於京師也自去歳京東淮南不稔小商爭糴軍糧順流而下以邀厚利豈所以實京師哉夫賤糴有限之米而外拒商賈内虚京師矣一旦罷糶則米必踴貴而益為小民之害其故何也商賈失利而民間無積粟也故去冬已嘗罷糶而價遂騰踴朝廷不得已乃復糶米是其騐也豈有京師生齒之繁如此而必待賤糶官米以為常而後可以致其足則為術亦疎矣故臣以謂不若稍貴常平之米使無甚貴甚賤之弊乃京師長久之利也貼黄勸農莫如貴粟今雖未能貴天下之粟而京師賤糶何可常也臣竊聞京師軍儲僅支三年不可謂有蓄積矣不幸有數千里之水旱三二年之災傷而上供不繼何以為謀方且賤糶常平凶歳之備以虛京師非計也京師自去歳以來民不覺饑饉惟近日河北流民入唐鄧者路由京師已於城門賑濟矣今糴常平米者即非饑饉之民也覿又上疏曰臣伏聞河北水災郡縣民多失業合用義倉及常平斛斗賑濟深恐數少難以遍及闕食人户竊知措置糴便司甚有積粟見已差官變轉乞於上件斛斗内先將陳次堪充喫用斛斗廣行賑濟其賑濟事仍乞指撝提舉司糴便官與轉運提刑司同共管勾所貴那移斛斗之𩔖逓相照應易為辦集兼聞甚有河防城壁合行修築若差急夫稍多即雖非水灾人户亦須困弊臣欲乞朝廷委逐司相度如内有可以召募水灾人户工役之處即亦將上件措置糴便司斛斗優與糧食召募應役其器用等依條官給庶不至多差急夫仍令水灾之民得食其力伏望聖慈詳酌特賜指揮施行覿又奏為河北流民乞指揮賑濟疏曰臣近見道路頗有流民毎令人問當皆是河北百姓往京西逐熟亦有乞丐於路者今春耕是時而民之轉徙者不得耕種則秋成無望況新陳不接之際灾傷之民尤宜存恤臣欲乞朝廷指揮下京城門抄劄流民如委是人數稍多即乞差官就城門量給口食并指揮河北監司多方賑濟及借與種糧免令更有流移致河北人户減耗貼黄流民不自京城中過者亦必不少縁河北百姓既頻經水災又毎年夫役重大故歳稍不稔則輕去田閭無安土樂業之意以此若遇災傷尤宜厚加賑恤去歳朝廷雖累有指揮賑濟臣竊慮郡縣官吏或未能推廣聖恩致流轉者不止伏望聖慈申飭本路監司督察郡縣存恤災傷之民無令失所曽鞏上救災議曰臣聞河北地震水災隳城郭壊廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患於暴露非錢不可以立屋廬患於乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廩與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之言特常行之法非審計終始見於衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廩於上則其勢必不暇乎它為是農不復得修其􅅵畆商不復得治其貨賄工不復得利其器用閒民不復得轉移執事一切棄百事而專意於待升合之食以偷為性命之計是直以餓殍之養養之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來歳麥熟賑之未可以罷自今至於來歳麥熟凡十月一户當受粟五十石今被災者十餘州州以二萬户計之中户以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民猶有無告者也食之徧則當用粟五百萬石而後可以辦此又非深思逺慮為公家長計也至於給授之際有淹速有均否真偽有㑹集之擾有辯察之煩措置一差皆足致弊又羣而處之氣久蒸薄必生疾厲此皆必至之害也且此不過能使之得旦暮之食耳其餘屋廬構築之費將安取哉屋廬構築之費既無所而就食於州縣必相率而去其故居雖有頽墻壊屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽盖流亡者亦已衆矣如不可止則將空近塞之地空近塞之地失戰鬭之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬭之民異時有警邊戍不可以不増爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無俚之計有窺倉庫盜一囊之粟一束之帛者彼知已負有司之禁則必鳥駭鼠竄竊弄鋤梃於草茅之中以扞游徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能晏然而已乎況夫外有邉陲之可慮内有郊祀之將行安得不防之於未然銷之於未萌也然則為今之策下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災之州為十萬户如一户得粟十石得錢五千下户常産之貲平日未有及此者也彼得錢以完其居得粟以給其食則農得備其􅅵畆商得治其貨賄工得利其器用閒民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎它為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石況貸之於今而收之於後足以賑其艱乏而終無損於儲偫之實所實費者錢五鉅萬貫而已此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居茍有頽牆壊屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失況於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則勢不暇乎它為雖驅之不去誘之不為盗矣夫饑歳聚餓殍之民而與之升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安於􅅵畆之中負錢與粟而歸與其父母妻子脱於流轉死亡之禍則戴上之施而懐報之心豈有已哉天下之民聞國家措置如此恩澤之厚其孰不震動感激悦主上之義於無窮乎如是而人和不可致天意不可悦者未之有也人和洽於下天意悦於上然後玉路徐動就陽而郊荒夷殊陬奉幣來享疆内安輯里無囂聲豈不適變於可為之時消患於無形之内乎此所謂審計終始見於衆人之所未見也不早出此或至於一有枹鼓之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之於民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足盖百姓富實而國獨貧與百姓餓殍而上獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之畜足以備水旱之災然後謂之王政之成唐水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨為公家之費而已凡以為民也雖倉無餘粟庫無餘財至於救災補敗尚不可以已況今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有言曰剪爪宜及膚割髪宜及體先王之於救災髪膚尚無足愛況外物乎且今河北州軍凡三十七災害所被十餘州軍而已它州之田秋稼足望令有司於糴粟常價斗増一二十錢非獨足以利農其於増糴一百萬石易矣斗増一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之𩔖佐其虚估不過捐茶荈香藥之𩔖為錢數鉅萬貫而其費已足茶荈香藥之𩔖與百姓之命孰為可惜不待議而可知者也夫費錢五鉅萬貫又捐茶荈香藥之𩔖為錢數鉅萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司越拘攣之見破常行之法與否而已此時事之急也侍御史陳次升奏陜西旱乞行賑濟疏曰臣竊聞陜西路今夏亢旱秋收最薄物價騰踴民食頗闕縁本路州軍并監司先以秋間雨澤得時遂奏年稔今日人户闕食不敢以聞誠為未便且國以民為本民以食為天陜右之民今既闕食豈能安土弱者必散而之它路强者必嘯聚而為盜矧今邊庭未寧宿兵在境沿邊人民若有流亡外寇之敵實深可憂臣欲乞睿㫖下本路勘㑹如人户委是闕食即行賑濟安存無令流移若本路斛㪷不足即多方擘劃轉移它路物斛應副支用不勝幸甚時呉中大饑方議賑恤以民習欺誕敇本部料檢家至户到左諫議大夫鄭雍言此令一布吏專料民而不救災民皆死於饑今富有四海奈何謹圭撮之濫而輕比屋之死乎哲宗悟追止之時大旱著作佐郎司馬康上疏言比年以來旱暵為虐民多艱食若復一不稔則公私困竭盜賊可虞自古聖賢之君非無水旱惟有以待之則不為至害願及今秋熟令州縣廣糴民食所餘悉歸於官今冬來春令流民就食候鄉里豐穰乃還本土凡為國者一絲一毫皆當愛惜惟於濟民則不宜吝誠能捐數十萬金帛以為天下大本則天下幸甚詔從之歴代名臣奏議卷二百四十五
