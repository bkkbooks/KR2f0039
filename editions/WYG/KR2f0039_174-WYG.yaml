body:
  text: 歴代名臣奏議卷一百七十四明楊士竒等撰去邪唐太宗貞觀初上謂侍臣曰朕觀前代䜛佞之徒皆國之蟊賊也或巧言令色朋黨比周若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃故叢蘭欲茂秋風敗之王者欲明讒人蔽之此事著於史籍不能具道至如齊隋間讒譛事耳目所接者略與公等言之斛律明月齊朝良將威震敵國周家每嵗斵汾河氷慮齊兵之西渡及明月被祖孝徵讒構伏誅周人始有吞齊之心髙熲有經國大才為隋文帝賛成覇業知國政者二十餘載天下賴以康寧文帝唯婦言是聽特令擯斥及為煬帝所殺刑政由是衰壊又隋太子勇撫軍監國凡二十年國亦早有定分楊素欺主㒺上賊害良善使父子之道一朝滅於天性逆亂之源自此開矣隋文既淆混嫡庻竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防萌杜漸用絶䜛構之端猶恐心力所不至或不能覺悟前史云猛獸處山林藜藿為之不採直臣立朝廷奸邪為之寝謀此實朕所望於羣公也魏徵曰禮云戒慎乎其所不睹恐懼乎其所不聞詩云愷悌君子無信䜛言䜛言㒺極交亂四國又孔子惡利口之覆邦家盖為此也臣嘗觀自古有國有家者若曲受䜛譛妄害忠良必宗廟丘􅇕市朝霜露矣願陛下深慎之貞觀五年治書侍御史權萬紀侍御史李仁發俱以告訐譛毁䝉引見遂任心彈射肆其欺㒺令在上震怒臣下無以自安外知其不可而莫能論爭給事中魏徵正色而奏之曰權萬紀李仁發並是小人不識大體以譛毁為是告訐為直凡所彈射皆非有罪陛下掩其所短收其一切乃騁其奸計附下㒺上多行無禮以取强直之名誣房𤣥齡斥退張亮無所肅厲徒損聖明道路之人皆興謗議臣伏度聖心必不以為謀慮深長可委以棟梁之任將以言無所避忌欲以警厲羣臣若信狎回邪猶不可以小謀大羣臣素無矯偽空使臣下離心以其齡亮之徒猶不可得伸其枉直其餘踈淺孰能免其欺㒺伏願陛下留意再思自驅使二人以来有一𢎞益臣即甘心斧鉞受不忠之罪陛下縱未能舉善以崇徳豈可進奸而自由乎太宗欣然納之賜徵絹五百匹其萬紀奸狀漸露仁發亦觧出萬紀貶連州司馬朝廷咸相慶賀焉太宗時僕州刺史龎相夀貪濁有聞追還觧任自陳幕府之舊太宗深矜之使人謂之曰爾是我舊左右今取他物祗應為貧賜爾絹百匹即還向任更莫作罪過魏徵進諫曰相夀猥濫逺近所知今以故舊私情赦其貪濁更加以厚賞還令復任然相夀性識未知愧恥幕府左右其數甚多人皆恃恩私足使為善者懼太宗欣然納之引相夀於前謂之曰我昔為王與一府作主今為天子為四海作主既為四海作主不可偏與一府恩澤向欲令爾重任侍臣云爾若任必使為善者皆不用心侍臣所執既是便不得申我私意乃賜物而遣之相夀黙然流涕而去時傅奕為大史令有僧自西域来能呪人使立死復呪即蘇上試之驗以告奕奕曰此邪術也臣聞邪不干正請使呪臣必不能行上命僧呪奕奕初無所覺須臾僧復僵仆遂不復蘇髙宗顯慶元年王義方擢侍御史不再旬㑹李義府縱大理囚婦淳于迫其丞畢正義縊死無敢白其奸義方自以興縣屬不三時拜御史且疾當世附離匪人以欺朝廷内決劾奏意必得罪即問計於母母曰昔王母伏劒成陵之誼汝能盡忠吾願之死不恨義方即上言天子置公卿大夫士欲水火相濟塩梅相成不得獨是獨非也昔堯失之四凶漢髙祖失之陳豨光武失之逄萌魏武失之張邈彼聖傑之主然皆失於前而得於後今陛下撫萬邦而有之蠻區夷落罪無逃罰况輦轂下奸臣肆虐乎殺人滅口此生殺之柄不自主出而下移佞臣履霜堅氷彌不可長請下有司雜治正義死狀即具法冠對伏叱義府下跪讀所言帝方安義府狡佞恨義方以孤士觸宰相貶莱州司戸叅軍調露元年上幸東都司農卿韋元機作上陽宫制度𢎞壯侍御史狄仁傑劾奏元機導上為奢泰免其官左司即中王本立恃恩用事朝廷畏之仁傑奏其奸上特原之仁傑曰陛下何惜罪人以虧王法必欲曲赦本立請棄臣於無人之境為忠貞之戒本立竟得罪由是朝廷肅然武后神功元年来俊臣倚勢貪淫前後羅織誅人不可勝計諸武共發其事繋獄有司處以極刑奏上三日不出王及善上言曰俊臣國之元惡不去之必動揺朝廷吉頊曰俊臣結聚不逞誣搆良善贓賄如山寃魂塞路國之賊也太后下其奏俊臣棄市仇家爭噉其肉聖厯二年太后幸三陽宫有胡僧邀車駕觀葬舎利太后許之仁傑跪於馬前曰佛者戎狄之神不足以屈天下之主彼胡僧詭譎直欲招致萬乗以惑遠近之人耳太后中道而還曰以成吾直臣之氣乆視元年以張易之為奉宸令毎内殿曲宴輙引易之昌宗飲博嘲戯昌宗衣羽衣吹笙乗木鶴扵庭中太后選美少年為奉宸内供奉右補闕朱敬則諫曰陛下内寵易之昌宗足矣而侯祥等明自媒􅃷求入供奉醜慢無恥臣職諫爭不敢不奏太后勞之武后時魏元忠為洛中長史張易之暴奴亂都市元忠杖殺之及為相嘗面奏臣承之宰相不能盡忠死節使小人在側臣之罪也太后不恱由是諸張深怨之乃譛元忠嘗言太后年老不若挟太子為久長太后怒元忠謀反下元忠獄竟坐貶元忠髙要尉元忠入辤上言曰臣老向嶺南十死一生但陛下必思臣言因指易之昌宗曰此二小兒終為亂階時桓彦範為司刑少卿張昌宗引妖人迎占言計不軌宋璟請窮治其奸武后以昌宗嘗自歸不許彦範諫曰昌宗謬横思苞禍心億測天命皇神降怒自擿其咎推原厥情盖防事暴之日得引首以免未敗則候時為逆此凶詭之臣熒惑聖心既自歸露而尚與妖人祈福禳觧則果於必成初無悔意今而宥之誠恐昌宗自謂應運天下浩然從之父在子稱尊為逆子君在臣圖位為逆臣逆而不誅社稷懼亡請付三司考治時来俊臣侯思止舞文法數誅陷大臣人皆懾懼李昭徳每奏其誣㒺不道狀卒搒殺思止其黨稍摧沮然昭德頗怙權為衆指目魯王府功曹叅軍丘愔上䟽曰臣聞魏冉誅庻族以安秦忠也弱諸侯以強國功也然出入自專擊斷無忌威震人主不聞有王張禄一言而卒用憂死向使昭王不即覺悟則秦之覇業或不傳子孫陛下天授以前萬機獨斷公卿百執具職而已自長夀以来厭怠細政擢委昭德秉摠權綱而才小任重負氣强愎聾盲下民芻狗同列刻薄慶賞多所矯䖍聲威翕習天下杜口臣伏見南臺敕目羣臣奏請陛下制已曰可而昭德建言不可制又從之且人臣參奉機宻獻可替否事或便利不豫咨謀而畫可已行方興駮異是陽露擅命以示於人歸美引咎誼不𩔖此一切奏讞皆承風指隂相傅㑹臣觀其膽乃大於身鼻息所衝上拂雲漢夫小家治生千百之貲將以託人尚憂失授況天下之重可輕委寄乎履霜堅氷須防其漸大權一去收之良難願陛下察臣之言時李嶠為内史與監察御史張廷珪薦李邕文髙氣方直才任諌諍乃召拜左拾遺御史中丞宋璟劾張昌宗等反狀武后不應邕立階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏邕出或讓曰子位卑一忤㫖禍不測邕曰不如是名亦不傳中宗立鄭普思以方技幸擢秘書監邕諫曰陛下躬政日淺有九重之嚴未聞道路横議今籍籍皆言普思馮詭惑說妖祥陛下不知猥見驅使孔子曰詩三百一言以蔽之曰思無邪陛下誠以普思術可致長生則爽鳩氏且因之永有天下非陛下乃今可得能致神人邪秦漢且因之永有天下非陛下乃今可得能致佛法邪梁武帝且因之永有天下非陛下乃今可得能鬼道邪墨翟干寳且各獻其主永有天下非陛下乃今可得自古堯舜稱聖者臣觀所以行皆在人事敦睦九族平章百姓不聞以鬼神道治天下惟陛下省察中宗復位時侍中桓彦範上書誡帝曰道路籍籍皆云胡僧慧範託浮屠法詭惑后妃出入禁奥瀆撓朝政陛下嘗輕騎微服數幸其居上下汙慢君臣虧替臣謂興化致治以康乂國家者繇進善而棄惡孔子曰執左道以亂政者殺假鬼神以危人者殺今慧範亂政危人者也不急誅且有變除惡務本願早裁之帝孱昏狃左右不能有所省納神龍元年鄭普思聚黨扵雍岐二州謀作亂事覺西京留守蘇瓌收繫窮治之上抑􅅛而佑普思待御史范獻忠進曰請斬蘇􅅛上曰何故對曰􅅛為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣且普思反狀明白而陛下曲為申理王者不死殆謂是乎魏元忠奏曰蘇􅅛長者用刑不枉普思法當死上流普思於儋州餘黨伏誅景龍元年僧慧範為銀青光禄大夫上庸公於東都作大像府庫為之虚耗上及韋后皆重之無敢指目者侍御史魏傳弓奏曰刑賞國之大事陛下賞己妄加豈宜刑所不及上乃削黜慧範放於家四年以鍾紹京為中書令典朝政紹京縱情賞罰衆皆惡之太常少卿薛稷言於上曰紹京雖有勲勞素無才德出自胥徒超居元宰恐失聖朝具瞻之美出為蜀州刺史中宗時崔日用與薛稷爭於上前稷曰日用傾側附武三思非忠臣賣友邀功非義士日用曰稷附張易之宗楚客非傾側而何上兩罷之睿帝即位時宰相多太平公主之黨劉幽求與羽林將軍張暐謀使中書侍郎王琚言於上曰竇懐貞崔湜岑曦皆因公主得進日夜為謀不軌若不早圖一旦事起太上皇何以得安請速誅之上以為然暐洩其謀上流幽求於封州𤣥宗開元元年詔周利貞及滑州刺史裴談等皆酷吏宜終身勿齒後利貞復授珍州司馬明年授夷州刺史黄門侍郎張廷珪執奏曰陛下英斷聖明四海心服所謂英斷殄凶逆正朝廷是也所謂聖明辨忠邪信賞罰是也利貞宗武舊黨鉏僇桓敬自陛下登宸極布新政奪其班級遷之遐荒以允天下之望義士猶以罰輕為望今錫以朱紱委以藩維是絀奸不必行也䟽入遂寢四年京兆尹崔日知貪暴不法李傑將糾之日知反搆傑罪侍御史楊瑒廷奏曰若糾彈之司使奸人得而恐喝則御史臺可廢矣上遽命傑視事貶日知歙縣丞二十四年張守珪使平盧討擊使安禄山討奚契丹敗績守珪奏請斬之禄山臨刑呼曰大丈夫欲滅奚契丹柰何殺禄山乃更執送京師上惜其才赦之張九齡固爭曰失律喪師不可不誅且其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之徳宗時起盧把為饒州刺史給事中袁髙當草詔見宰相盧翰劉從一曰杞當國矯誣隂賊斥忠誼傲明德反易天常使宗祏失守天下疣痏朝廷不寘以法才示貶黜今還授大州天下其謂何翰等不恱命舍人作詔詔出髙執不下奏曰陛下用杞為相出入三年附下㒺上使陛下越在草莽羣臣願食其肉且不厭漢法三光不明雨旱不時皆宰相請罪小者免大者戮杞罪萬誅陛下赦不誅止貶新州俄又内移今復拜刺史誠失天下望帝曰杞不逮是朕之過朕已再赦答曰杞天資詭險非不逮彼固所餘赦者止赦其罪不宜授刺史願問外廷并敕中人聽於民若億兆異臣之言臣請前死諫官亦力爭帝前帝曰與上佐可乎羣臣奉詔翌日遣使慰髙曰朕惟卿言切至已如奏太子少保韋倫曰髙言勁挺自是陛下一良臣宜加優禮時判度支班宏卒官中書侍郎同中書門下平章事陸贄薦李巽帝漫許之而自用裴延齡贄奏曰臣聞君子小人用舍不並國家否泰恒必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人扵蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠹也眯離婁之目則天地四方之位不分矣充子野之耳則雷霆蠅黽之聲莫辨矣雖后稷之穡禾易長畝而蟊傷其本則零瘁而不植矣雖公輸之巧臺成九層而蠹空其中則圮折而不支矣是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而沮之哉誠以其蔽主之明害時之理致禍之源博傷善之舋深所以有國有家者不得不去耳其在周易則曰大君有命開國承家小人勿用必亂邦也在尚書則曰除惡務本去邪勿疑在毛詩則曰無縱詭随以謹無良曽是掊克歛怨以為徳盜言孔甘亂是用餤讒人㒺極交亂四國在論語則曰惡利口之覆邦家者在春秋則曰聚斂積實不知紀極毁信廢忠崇飾惡言靖譛庸回服讒蒐慝天下之人謂之四凶在禮記則曰小人行險以儌幸長國家而務財用者必自小人矣小人使為國家而灾害並至雖有善人無如之何臣頃因讀書常憤此𩔖不圖聖代目覩斯人戸部侍郎裴延齡者其性邪其行險其口利其志凶其矯妄不疑其敗亂無恥以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譛服讒為盡節總典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下恊放勛文思之徳而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽則天討斯得聖化允孚小徃大来孰不欣幸跡其奸蠹日長月滋隂祕者固未盡彰敗露者猶難悉數今請粗舉數事用明欺㒺大端悉非隠微皆可覆驗陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩願擇左右親信兼與舉朝公卿據臣所言閱實其事倘延齡罪惡無狀即臣之奏議是誣宜申典刑以制虚妄俾四海法朝廷之理兆人戴陛下之明得失之間其體甚大不當復有疑慮使辨之不早以竟失天下之望也前嵗秋首班宏喪亡特詔延齡繼司邦賦數月之内遽􅃷功能奏稱勾獲隠欺計錢二十萬貫請貯别庫以為羨財供御所須永無匱乏陛下欣然信納因謂委任得人既賴贏餘之資稍𢎞心意之欲興作寖廣宣索漸多延齡務實前言且希睿㫖不敢告闕不敢辤難勾獲既是虚言無以應命供辦皆承嚴約茍在及期遂乃捜求市鄽豪奪入獻追捕夫匠廹脅就功以勅索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比於幽囚聚詛連羣遮訴盈路持綱者莫敢致詰廵察者莫敢為言時有致詰為言翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則蕩心於上斂怨於人欺天陷君逺邇危懼此其罪之大者也捴制邦用度支是司出納貨財太府攸職凡是太府出納皆稟度支文符太府依符以奉行度支憑按以勘覆互相闗鍵用絶奸欺其出納之數則毎旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監令旬旬相承月月相繼明若指掌端如貫珠財貨少多無容隠漏延齡務行邪諂公肆誣欺遂奏云左藏庫司多有失落近因檢閱使置簿書乃於糞土之中收得銀十三萬兩其疋段雜貨百萬有餘皆是文帳脫遺並同己棄之物今所收獲即是羨餘悉合移入雜庫以供别勅支用者其時特宣進止悉依所奏施行太府少卿韋少華抗表上陳殊不引伏確稱每月申奏皆是見在數中請令推尋足驗奸計兩司既相論執理須辨鞫是非臣等具以奏聞請定三司詳覆若左藏庫遺漏不謬隠匿固合抵刑如度支舉奏是虚誣誑亦宜得罪陛下既不詳差三司按問又不令檢奏辨明度支言太府隠漏至多而少華所任如舊太府論度支奸欺頗甚而延齡見信不渝枉直兩存法度都弛以在庫之物為收獲之功以常賦之財為羨餘之費㒺上無畏示人不慚此又罪之大者也國之府庫用寘貨財物合入官則納於其内事合給用則出乎其中所納無非法之財所出無不道之用坦然明白何曲何私而延齡險猾售奸詭譎求媚遂於左藏之内分建六庫之名意在别貯贏餘以奉人主私欲曽不知王者之體天下為家國不足則取之於人人不足乃資之於國在國為官物在人為私財何謂贏餘復須别貯是必巧詐以變移官物暴法以刻斂私財捨此二途其將焉取陛下方務崇信不加檢裁延齡既怙寵私益復放肆遂録積久逋欠妄云察獲奸贓總計緡錢八百餘萬聼其言則利益雖大考其事則虚誕自彰或是水火漂焚或縁旱澇傷敗或因兵亂散失或遭寇賊敓􅔯或准法免徵或經恩合放或人戸逃迸無處追尋或綱典拘囚不免填納或没入店宅嵗久摧殘或收獲舟船年深破壊𩔖皆如此難以殫論在人者並無可科徵屬官者悉不任貨賣但存名額虚掛簿書大抵錢榖之司皆恥財物減少所以相承積累不肯滌除每當計奏之時常充應在之數延齡茍稱察獲遂請徵收恢張利門誘動天聽貽誚侮於方岳賈愁怨於烝黎於兹累年一無所得其為踈妄亦曰殆哉陛下姑欲保持曽無詰問延齡謂能蔽惑不復懼思奸威既沮於四方檢態復行於内府由是蹂􅏳官屬傾倒貨財移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲諸州輸送布帛度支不務准平抑制市人賤通估價計其所折即便下徵重困疲甿展轉流弊既彰忍害且示不誠及其支送邊州用充和糴則於本價之外例増一倍有餘布帛不殊貴賤有異剥徵㒺下既以折估為名抑配傷人又以出估為利事多矛盾交駭物情窮邊穡夫痛憤切於骨髓下土編戸寃叫徹於蒼旻而延齡以冒取折估為公忠茍得出估為賸利所謂失人心而聚財賄亦何異割支體以徇口腹哉殊不寤支體分披口安能食人心離析財豈能存此又罪之大者也平原逺鎮扼制蕃戎五原要衝控帶靈夏芟夷榛薉翦逐豺狼﨑嶇繕完功力纔畢地猶夐絶勢頗孤危新集之兵志猶未固尤資贍恤俾漸安居頻勅度支令貯軍糧常使平原有一年之蓄塩州積半年之儲循環轉輸不得缺數近者三鎮告急俱稱絶糧陛下召延齡令赴中書遣希顏宣㫖質問延齡確言饋餉不絶儲蓄殊多嵗内以来必無缺乏希顏懼其推互邀令草狀自陳狀亦如言略無疑畏陛下鑒其所奏翻謂軍吏不誠遂遣中書馳徃檢覆道路無轉運之跡軍城無旬日之儲將卒嗷嗷㡬將不守有如是之顛沛有如是之欺謾按騐既明恩榮靡替其為蠱媚曠代罕聞此又罪之大者也國之憲度㑹府是司位列諸郎猶應辰象任居六事實代天工内總轄於庶官外敷化於列郡舉錯係生靈之命得失闗理亂之源為人軌儀安可容易未有大官弛縱而能使羣吏服從朝典陵遲而欲禁天下暴慢是以天寳將季楊國忠為吏部尚書亟於私庭詮集選士果令逆豎得以為詞史䇿書之足為國恥而延齡放情亂紀又甚國忠􅈈於夙興多缺㑹朝之禮徇其鄙次大隳省署之儀徙郎曹於里閭視公事於私第盡室飲宫廚之膳填街持簿領之書復有諸部參辭四方申請決遣資其判署去就俟其指撝延齡或聚客大誇不令白事或縱酒憑怒莫敢入言至有廹切而来逾旬未省輸納之後累月不歸資糧罄於滯淹筋力困於朝集晨趨夕散十百為羣里中喧闐常若闤闠衢巷列屠沽之肆邑居成逆旅之津離次慢官虐人斁法求之今古鮮有其倫此又罪之大者也總領財賦號為殷繁自非識究變通智權輕重大不失體細能析微濟之以均平蒞之以勤肅近無滯事逺無壅情綱條之下無亂繩鑒照之下無隱匿然後人不困而公用足威不厲而奸吏懲茍或未然則非稱職況延齡以素所僻戾之質而加之狂躁滿盈既懵且驕事何由理遂以國家大計委於胥吏末流當給者無賄而不支應徵者受賕而縱免紀綱大壊貨賂公行茍操利權實竊邦柄近者度支小吏屢為府縣所繩鞫其奸贓無不狼藉通結動連於節將交私匪止於苞苴威福潜移乃至於是職司失序固亦可知此又罪之大者也風教之大禮讓為先禮讓之行朝廷為首朝廷者萬方之所宗仰羣士之所楷模觀而效焉必有甚者是以朝廷好禮則俗尚敬恭朝廷尊讓則時恥貪競朝廷有失容之慢則凌暴之弊播於人朝廷有動色之争則攻鬭之禍流於下聖主知其然也故選建賢徳以為公卿使人具瞻不諭而化昔周之方盛多士盈朝時靡有爭用能俾乂故其詩曰慎爾出話敬爾威儀無不柔嘉又曰有来雍雍至止肅肅相維辟公天子穆穆言羣臣相與事上敬而能和言語動作靡有不善也周徳既衰小人在位務相侵侮以至危亡故其詩曰方茂爾惡相爾矛矣又曰既之隂汝反予来赫又曰涼曰不可覆背善詈言小人得志惡怒是憑肆其褊心以相詬病也陛下勤脩儀式以靖四方慎選庶官以貞百度内選則股肱耳目外選則垣翰藩維濟濟師師咸欽至化庶相感率馴致太和而度支憑寵作威恃權縱暴侵刻軍鎮匱缺粮資將帥每使申論延齡率皆毁訾或指誣隠盜或謗訐隂私或數其出處賤微或憶其心志邪悖詞皆醜媟事悉加諸匹夫見淩猶或生患況將帥素加委遇多著勲庸縱有踰分取求但宜執理裁處茍當其所孰敢不從豈可對彼偏裨恣行侵辱使其慚靦於麾下憤恥於朝廷惟口起羞諒非細故為國聚釁實由斯人而又虐害羣司幸其缺敗蔑彼彛典逞於兇懐氣吞等夷𨽻蓄郎吏時有履道而不為屈撓守官而莫肯由從遭其詆訶事則尤劇或辱兼祖父或毁及家門皆名教所不忍聞叙述所不堪紀其為構陷抑復多端故示兇威使人懾憚人之狂險乃至於斯上虧大猷下扇流俗炰烋禮義之府衊汚清明之朝此又罪之大者也度支舊管牛驢三千餘頭車八百餘乗循環載負供饋邊軍既有畨逓之倫永無科配之擾延齡茍逞近效不務逺圖廢其葺脩減其芻秣車破畜耗畧無孑遺每須載運軍資則令府縣差雇或有卒承别㫖須赴促期遂於街市之間虜奪公私雜畜披猖頗甚費損尤多吏因生奸人不堪命所減者則奏以為利所費者則隠而不論破實狥虚多如此𩔖度支應給宫内及諸司使芻藁薪炭等除稅草之外餘並市供所用既多恒須貯備舊例每至秋穫之後冬收之時散開諸塲逐便和市免費髙價復資貧人公私之間頗謂兼濟延齡悉隳舊制但飾奸情旋計芻薪價錢以為節減剰利及乎春夏之際藁秸已殫霜潦之中樵蘇不繼軍廐輟莝官廚待然告闕頻煩於聖聰徵催絡繹於省署﨑嶇求買何假計量糜捐官錢不啻累倍聮蹇狼狽率以為常此則睿鑒之所明知物情之所深駭事之舛繆觸緒皆然臣愚以謂若斯之流不過嵗費國家百萬緡錢及事體非宜耳其為罪惡未足傾危事之可憂不在於此是以不復詳舉以煩聼覽也至如矯詭之態誣罔之辭遇事輙行應口便發靡日不有靡時不為自非狀迹尤彰足致其禍者又難以備陳也延齡有詐偽亂邦之罪七而重之以耗斁闕遺愚智共知士庶同憤以陛下英明鑒照物無遁情固非延齡所能蔽虧而莫之辨也或者聖㫖以其甚招嫉怨而謂之孤貞可託腹心以其好進讒䛕而謂之盡誠可寄耳目以其縱暴無畏而謂之强直可肅奸欺以其大言不疑而謂之智能可富財用將欲排衆議而收其獨行假殊寵而冀其大成倘陛下誠有意乎在兹臣竊以為過矣夫君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無謬好者不邪安在私託腹心以售其側媚也以天下之耳目為耳目則天下之聰明皆我之聰明也是以明無不鑒聰無不聞安在偏寄耳目以招其蔽惑也夫布腹心而用耳目舜與紂俱用之矣舜之意務求己之過以與天下同欲而無所偏私由是天下臣庶莫不歸心忠讜既聞𤣥德逾邁故虞書云臣作朕股肱耳目又云明四目達四聰言廣大也紂之意務求人之過以與天下違欲而溺於偏私由是天下臣庶莫不離心險詖既行昬德彌熾故商書云崇信奸回大雅云流言以對寇攘式内言邪僻也與天下同欲者謂之聖帝與天下違欲者謂之獨夫其所以布腹心而任耳目之意不殊然於美惡成敗若此相逺豈不求過之情有異任人之道不同哉太宗甞問侍臣何者為明君何者為暗主魏徵對曰君之所以明者兼聼也其所以暗者偏信也又曰秦之胡亥偏信趙髙肆其奸欺卒至顛覆徵之此說理致甚明簡册備書足為鑒戒趙髙指鹿為馬愚弄厥君歴代流傳莫不痛憤陛下每覽前史詳考興亡固亦切齒於斯人傷心於其主臣謂鹿之與馬物𩔖猶同豈若延齡掩有而為無指無而為有陛下若不以時省察得無使後代嗟誚又甚趙髙者乎斯愚臣所以焦慮疚懐以陛下為過者良有所以也夫理天下者以義為本以利為末以人為本以財為末本盛則其末自舉末大則其本必傾自古及今徳義立而利用不豐人庶安而財貨不給因以喪邦失位者未之有也故曰不患寡而患不均不患貧而患不安有徳必有人有人必有土有土必有財百姓足君孰與不足盖謂此也自古及今徳義不立而利用克宣人庶不安而財貨可保因以興邦固位者亦未之有焉故曰財散則民聚財聚則民散與其有聚斂之臣寧有盜臣無令侵削兆庶以為天子取怨於下其有若此者行罰無赦盖為此也殷紂以貪冒失人而亡周武以散𤼵得人而昌則紂之多藏適所以為害己者之資耳尚何賴於財賂哉太宗亦云務蓄積而不恤人甚非國家之計隋氏不道聚斂無厭所實洛口諸倉卒為李宻所利此則前代已行之明效聖祖垂裕之格言是而不懲何以為理陛下初膺寳歴志翦羣兇師旅繁興徵求寖廣𣙜筭侵剥下無聊生是以涇原叛徒乗人怨咨白晝犯闕都邑甿庶恬然不驚反與賊衆相從比肩而入宫殿雖蚩蚩之性靡所不為然亦由徳澤未浹於人而暴令驅迫以至於是也於時内府之積尚如丘山竟資凶渠以餌貪卒此時陛下躬覩之矣而乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋肆圍逼一壘之内萬衆所屯窘如涸流庶物空匱嘗欲發一健步出視賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覓不致竟憫黙而遣之又嘗宫壼之中服用有缺聖㫖方以戎事之急不忍重煩於人乃剥親王飾帯之金賣以給直是時行從將吏赴難師徒倉皇奔馳咸未冬服漸屬凝沍且無薪蒸飢凍内攻矢石外迫晝則荷戈奮迅夜則映堞呻吟凌風飇冒霜霰踰旬而衆無擕貳卒能走强賊全危城者陛下豈有嚴刑重賞使之然耶唯以不厚其身不藏其資與衆庶同其憂患與士伍共其有無乃能使捐軀命而扞寇讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既解諸道稍通賦稅漸臻貢獻繼至乃於行宫外廡之下復列瓊林大盈之司未賞功勞遽私賄玩甚沮惟新之望頗擕死義之心於是輿誦興譏而軍士始怨矣財聚人散不其然歟旋屬蟊賊内攻翠華南狩奉天所積財貨悉復殱於亂軍既遷岷梁日不暇給獨憑大順遂復皇都是知天子者以得人為資以蓄義為富人茍歸附何患蔑資義茍脩崇何憂不富豈在貯之内府方為己有哉故藏於天下者天子之富也藏於境内者諸侯之富也藏於囷倉篋匵者農夫商賈之富也柰何以天子之貴海内之富而猥行諸侯之棄徳蹙守農商之鄙業哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為己有則建中之積又不在矣若謂徇欲不足傷理化則建中之失傷已甚矣若謂斂怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身脩勵之志有罪已悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祗嘉陛下之誠臣庻感陛下之意釋憾廻慮化危為安陛下亦當為宗廟社稷建不傾不㧞之永圖為子孫黎元垂可乆可大之休業懲前事徇欲之失復日新盛徳之言豈宜更縱憸邪復行刻暴事之追悔其可再乎臣又竊慮陛下納彼盜言堕其奸計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大綴所宜慎思夫人主昬明係於所任咎繇夔契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而灾禍不及邦國者乎譬猶操兵以刄人天下不委罪於兵而委罪於所操之主畜蠱以殃物天下不歸咎於蠱而歸咎於所蓄之家理有必然不可不察臣竊慮陛下以延齡之進獨出聖衷延齡之言多順宸㫖今若以罪寘辟則似為衆所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其於改過不吝去邪勿疑之道或未盡善焉夫人之難知著自淳古試可乃已載於典謨陛下意其賢而任之知其惡而棄之此理之常於何不可倘陛下猶未知惡但疑見擠固有象恭挾詐之人亦有黨邪害直之士所資考覈兩絶欺誣陛下以延齡為能愚臣以延齡為罪能必有跡罪必有端陛下胡不指明其所效之能以表忠賢按驗其所論之罪以考虗實與衆同辨示人不私若能跡可稱而罪端無據則是黨邪害直之驗也陛下當繩其傷善以勵事君罪端有徵而能跡無實則是象恭挾詐之驗也陛下當糾其包禍以戒亂邦如此則上之於下釋嫌構之疑下之於上絶偏惑之議何必忠邪無辨枉直莫分薰蕕同藏其臭終勝此則小人道長之象也實時運否泰安危之所係豈但有虧聖徳不利善人而已乎陛下若以必與己同者為忠良自我作者無改變如此則上之所欲莫不諂上之所失莫不從水火相濟不為非金礪相須不為是恥過作非不足戒捨已從人不足稱惟意是行則匡輔或㡬乎息矣匡輔息則理不可致仲尼所謂一言喪邦者在於予之言而莫予違也事闗興亡固不可忽希㫖順黙寖已成風奬之使言猶懼不既若又阻抑誰當貢誠伏恐未亮斯言請以一事為證只如延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品諠諠談議億萬為徒能以上言其人有㡬陛下誠令親信博採輿詞參校比来所聞足鑒人間情偽臣以卑鄙任當台衡既極崇髙又承渥澤豈不知觀時附㑹足保舊恩随衆沈浮免貽厚責謝病黜退獲知㡬之名黨奸茍容無見嫉之患何急自苦獨當豺狼上違懽情下餌讒口良由内顧庸昧一無所堪夙䝉眷知唯在誠直綢繆帳扆一紀于兹聖慈既以此見容愚臣亦以此自負從陛下歴播遷之臲卼覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭懼慮燬室而悲鳴盖情激於衷雖欲罷而不能自黙也因事陳執雖已頻繁天聼尚髙未垂諒察輙申悃欵以極愚誠憂深故語煩懇迫故詞切以微臣自固之謀則過為陛下慮患之計則忠糜軀奉君非所敢避沽名􅃷直亦不忍為願廻睿聼為國熟慮社稷是賴豈唯微臣不勝荷恩報德之誠謹昧死奉書以聞臣誠惶誠恐頓首再拜時裴延齡誣逐陸贄張滂李充等帝怒甚無敢言右諌議大夫陽城聞曰吾諌官不可令天子殺無罪大臣乃約拾遺王仲舒守延英閣上䟽極論延齡罪慷慨引誼申直贄等累日不止聞者寒懼城愈勵帝大怒召宰相抵城罪順宗方為皇太子為開救良乆得免敕宰相諭遣然帝意不已欲遂相延齡城顯語曰延齡為相吾當取白麻壊之哭於廷帝不相延齡城力也憲宗時左神䇿軍吏李昱貸長安富人錢不償亰兆尹許孟容收捕械繫立期使償曰期滿不足當死中尉訴於上上遣中使宣㫖送本軍孟容曰臣不奉詔當死然臣為陛下尹亰畿非抑制豪强何以肅清輦下錢未償李昱不可得上嘉其剛直而許之京城震栗時以栁公綽為京兆尹公綽初赴府有神䇿小將躍馬衝其前導公綽駐馬杖殺之明日入對上怒詰之對曰京兆為輦轂師表今視事之初而小將敢爾唐突乃輕陛下詔命非獨慢臣也臣知杖無禮之人不知其為神䇿軍將也上曰何不奏對曰臣職當杖之不當奏上退謂左右曰汝曹須作意此人朕亦畏之時五坊使楊朝汶妄捕繋人責其息錢轉相誣引近千人中丞肅俛劾之裴度以為言上曰姑與卿論兵事此小事朕自處之度曰用兵事小所憂不過山東耳五坊使暴横恐亂京輦上召朝汶責之曰以汝故令吾羞見宰相遂賜之死盡釋繫者時翰林學士元稹與知樞宻魏𢎞簡深相結求為宰相稹以裴度先達重望恐其復有功大用妨已進取故度所奏軍事多與𢎞簡從中沮之度上表曰逆堅構亂震驚山東奸臣作用撓敗軍政陛下欲掃蕩幽鎮先宜肅清朝廷河朔逆賊秪亂山東禁闈奸臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦滅大者非陛下覺悟㫁制無以驅除臣䝉陛下委付之意不輕遭奸臣抑損之事不少但欲令臣失所而於天下理亂山東勝負悉不之顧若朝中奸臣盡去則河朔逆賊不討自平若奸臣尚存則逆賊縱平無益上不得已罷𢎞簡樞宻稹解翰林而恩遇如故時昭義軍監軍劉承偕太后養子恃恩陵轢節度使劉悟悟執承偕囚之上詔悟送承偕悟不奉詔㑹裴度入朝上問度宜何如處置對曰承偕驕縱不法臣盡知之陛下必欲收天下心止應下半紙詔書具陳其罪令悟集將士斬之則藩鎮之臣孰不思為陛下效死非獨悟也上不得已流承偕於逺州文宗暴感風害語言鄭注始因王守澄以藥進帝少間又薦李訓使待詔帝欲授諫官中書侍郎李德裕曰昔諸葛亮有言親賢臣逺小人先漢所以興隆也親小人遠賢士後漢所以傾頺也今訓小人頃咎惡暴天下不宜引致左右帝曰人誰無過當容其改且逢吉嘗言之對曰聖賢則有改過若訓天資奸邪尚何能改逢吉位宰相而顧愛兇囬以累陛下亦罪人也帝語王涯别與官徳裕揺手止涯帝適見不懌訓注皆怨即復召宗閔輔政拜徳裕為興元節度使武宗㑹昌四年以趙歸真為道門教授先生得幸李徳裕諌曰歸真敬宗朝罪人不宜親近上曰朕宫中無事時與之談道滌煩耳至於政事朕必問卿等與次對官雖百歸真不能惑也德裕曰小人見勢所在則奔趨之旬日以来歸真之門車馬輻湊願陛下深戒之時邢洺磁三州既降郭誼懼謀斬劉稹以降宰相入賀上曰郭誼宜如何處之李德裕對曰劉稹年少懦弱騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃斬之宣宗時京兆尹韋澳既視事豪貴斂手鄭光莊吏恣横積年租稅不入澳執而械之具奏其狀欲寘於法上曰鄭光甚愛之如何對曰如此則是陛下之法獨行於貧户耳臣不敢奉詔上曰然則痛杖而貸其死可乎澳歸即杖之督租數百斛足乃釋後晉髙祖天福間楊昭儉為翰林學士時驕將張彥澤鎮涇原暴殺從事張式朝廷不加罪昭儉與刑部郎中李濤諫議大夫鄭受益抗䟽論列請置之法䟽奏不報㑹有詔令朝臣轉對或有封事亦許以不時條奏昭儉復上䟽曰天子君臨四海日有萬機懋建諍臣彌縫其闕今則諍臣雖設言路不通藥石之論不達於聖聰而邪佞之徒取容於左右御史臺紀綱之府彈糾之司衘寃者固當昭雪為蠧者難免放流陛下臨御以来寛仁太甚徒置兩司殆如虚器遂令節使慢侮朝章屠害幕吏始訴寃於丹闕反執送於本蕃茍安跋扈之心莫恤寃抑之苦願回睿斷誅彥澤以謝軍吏由是權臣忌之宋仁宗天聖五年祀南郊中外以為丁謂復還殿中侍御史陳琰上䟽曰亂常肆逆將而必誅左道懐奸有殺無赦丁謂因縁險佞據竊公台賄賂包苴盈於私室威權請謁行彼公朝引巫師妖術厭魅宫闈易神寢龍岡冀消王氣今禋柴展禮渙汗推恩必慮謂潜輸琛貨私結要權假息遐荒冀移善地李德裕止因用黨不獲生還盧多遜曲事王藩卒無牽復請不原赦帝然之景祐元年監察御史裏行孫沔奏論許申妄薦狂人䟽曰臣聞左道亂政大奸不可逃刑閑邪存誠明哲故能早辨言偽既誅於兩觀德凶必屏於四方俾諸諂佞之臣以絶儌求之路竊見三司判官工部郎中許申乆塵寵禄莫著功名昔居刑獄之司劾無狀而寢命後列尹京之幕起公議以歸班既已黜而復升見多岐而挾詐近者風聞罷官漕運入覲闕庭旋列計司累膺殊用不思展效唯急趨時乃妄薦於狂人妄言精氣俾先容於内寺上瀆威顔而況氣行無間隙不在大毫芒之失為害必深呼吸之中其慮安測古人謂服藥有害微臣謂行氣亦然豈可肆行幻惑栁泌以合煉丹藥終不免誅杜景之求訪異人盡為怪誕茍乆習於左右必貽患於君親衆實有言罪當無赦又聞錫以白金五百兩無名受寵亦駭聽聞忝為人臣不知忠孝接引詭道狂冐天聽盜竊厚恩益長奸弊將巧圖於進用必有玷於觀瞻大紊國綱宜除君側伏望追還所賜免標濫賞之名黜去匪人以杜傾邪之漸景祐中宰相呂夷簡求罷仁宗優詔弗許孫􅃆為陕西轉運使上書言自夷簡當國黜忠言廢直道及以使相出鎮許昌乃薦王随陳堯叟代己才庸負重謀議不協忿爭中堂取笑多士政事寢廢又以張士遜冠台席士遜本乏逺識致隳國事盖夷簡不進賢為社稷逺圖但引不若己者為自固之計欲使陛下知輔相之位非己不可冀復思已而召用也陛下果召夷簡還自大名入秉朝政於兹三年不更一事以姑息為安以避謗為智西州將帥累以敗聞契丹無厭乗此求賂兵殱貨悖天下空竭刺史牧守十不得一法令變易士民怨咨隆盛之基忽至於此今夷簡以病求退陛下手和御藥親寫德音乃謂恨不移卿之疾在于朕躬四方義士傳聞詔語有泣下者夷簡在中書二十年三冠輔相所言無不聽所請無不行有宋得君一人而已未知何以為陛下報天下皆稱賢而陛下不用者左右毁之也皆謂憸邪而陛下不知者朋黨蔽之也比契丹復盟西夏欵塞公卿忻忻日望和平若因此振紀綱脩廢墜選賢任能節用飬兵則景德祥符之風復見於今矣若恬然不顧遂以為安臣恐土崩瓦觧不可復救而夷簡意謂四方已寜百度已正欲因病黙黙而去無一言啟沃上心别白賢不肖雖盡南山之竹不足書其罪也書聞帝不之罪慶歴三年侍讀學士歐陽脩上奏曰臣昨日因奏事於延和殿已曽面論李淑嚮在開封府猶為踈外今拜學士是禁中親近之職竊縁此人不宜在侍從之列其奸邪隂險之迹陛下素已知之今外邊臣寮骨肉同坐者不敢道李淑姓名盖其穢惡醜不可當據外人如此惡之豈合却在人主左右淑自来朋附夷簡在三尸五鬼之數盖夷簡要為肘腋所以援引至此不知今日朝廷如此清明更要此人何用若欲藉其詞業則臣謂才行者人臣之本文章者乃其外飾耳況今文章之士為學士者得一兩人足矣假如全無文士朝廷詔勅之詞直書王言以示天下尤足以敦復古朴之美不必雕刻之華自古有文無行之人多為明主所棄只如徐鉉胡旦皆是先朝以文章著名於天下二人皆以過惡廢棄終身不齒當時朝廷亦不至乏人淑居開封過失極多然止是一府之害今在朝廷若有所為少肆其志則害及忠良沮壊政治是為天下之害故臣不可不言今雖陛下主張正人不信讒巧然淑之為惡出於天性恐不能悛改竊慮依舊譛毁好人伏望聖慈一切不納早與一外任差遣使正人端士安心作事無讒毁之避脩又奏曰臣近日竊聞李淑已有聖㫖令與夀州却知中書不肯便行須得淑自上奏求出方敢差除臣謂李淑奸邪之迹陛下既已盡知若得斷自宸衷則使天下之人皆知陛下聰明神聖辨别忠邪黜去小人自出聖斷如此則今後奸邪險惡之人可使知懼而不敢為害今若如中書之意須待其自求退則是賞罰之柄不由人主自行去住之謀一任臣下取便如此則今後小人皆知雖為奸邪險惡天子欲力去而中書必未肯行若不自退則無人敢差臣恐自此小人轉為得計不肯悛心進賢退不肖者宰相之職也今大臣既自避怨不肯為陛下除去奸邪賴陛下聖明洞分邪正又不能便依聖㫖直與差除更須曲收人情優假羣小三四日来外邊聞陛下欲除李淑夀州人人鼓舞皆賀聖徳盖淑二三十年出入朝廷奸險傾邪害人不少一旦見人主斥去左右莫不欣抃却聞中書如此迂廽自相顧避可惜聖明之斷不盡施行臣欲望更不須候其請郡因兩府奏事之時特出聖㫖處分直除一外郡使天下皆知此奸邪穢惡之人是人主力自除去以彰聖明之德脩知諫院又上奏曰臣竊見去年五月詔勅節文諸路轉運並兼按察使或貪殘老昧委是不治者逐處具狀聞奏若因循不切按察致官吏貪殘刑獄枉濫民庻無告朝廷察訪得知並當勘罪重行黜降竊見近日賊人張海等入金州刼却軍資甲仗庫盖為知州王茂先年老昬昧所以放賊入城及張海等到鄧州順陽縣令李正己用鼓樂迎賊入縣飲宴留賊宿於縣㕔恣其劫掠其李正己亦是年老昬昧之人京西按察使陳洎張昇自五月受却朝廷詔書後半年内並不按察一人如王茂先李正己並顯然容庇不早移換致得一旦賊至不能捍禦及光化軍韓綱在彼殘酷致兵士作亂亦不能早行覺察其陳洎等故違詔書致興盜賊並合依元降詔勅重行黜降中書又不舉行使國家號令棄作空文天下禍亂貽憂君父盖由上下互相䝉庇之罪也其陳洎張昇伏乞依詔勅施行重與黜降若明降詔勅顯有違者並不舉行則今後朝廷號令徒煩虚出伏望出於聖斷以警後来脩又上奏曰臣近曽上言為京西轉運使陳洎張昇違廢詔書並不按察部下官吏致使盜賊縱横貽憂君父其陳洎等合坐此罪名重行黜降此事非是臣自生狂見敢有妄言乃是朝廷元降詔書内指揮自合行遣今諸路轉運使不按察官吏者甚衆然别不至大段生事及部内官吏不甚昬老者亦可且示優容如陳洎等部内顯然官吏昬老貪殘並不舉劾致得盜賊並起事勢可憂此若不行則國家詔勅乃是空文今後號令有誰肯聽臣伏見近日頓易諸路轉運方思改作欲除舊弊朝廷此後政令須要必行今若自廢詔書示人無信則新轉運見朝廷先自弛廢言不足聽則更無稟畏必效因循虚煩更張必不濟事古人扵作事之初尚或借人行法況洎等首自違犯理合舉行宜於革弊之初先行勵衆之事或謂洎等於少人之際且要任使即乞各與降官依舊差遣以責後效徐議復資亦使過之術也尚慮議者謂淮南王倫賊後不曽行遣轉運盖淮南新授詔書未及按察而賊已卒至又部内官吏如晁仲約等本非昬老不比京西慢賊經年不能剪滅直至飬成兇勢又其部内官吏顯是昬老誤事之人授詔半年故違不舉較其事體與淮南不同今若以淮南不曽行遣便捨洎等不問則今後犯者又指洎等以為例是則朝廷命令永廢不行伏惟陛下聰明睿斷惟是則從尚恐大臣務收私恩不顧國體若能不惜暫降洎等一兩資官存取朝廷綱紀以勵中外則庶㡬國威復振患難可平慶歴四年脩又上奏曰臣伏覩朝廷近為王堯臣呉育等爭陳留橋事互說是非陛下欲盡至公特差臺官定奪而王礪小人不能上副聖意挾公徇私妄將小事張皇稱王堯臣與豪民有情弊誣奏慎鉞令兇吏濳行殺害及妄稱真宗皇帝朝移橋不便致民切齒等事及勘出事狀王堯臣元不曽受豪民請囑慎鉞亦不曽令小吏濳行殺害及據先朝日歴内真宗皇帝親諭王旦為陳留損害舟船特令脩換證驗得王礪所言悉是虗妄上惑聖聽賴陛下聖明慎於聽斷不便輕信其言别令呂覺根勘今既勘出事狀方明王礪不公伏以臺憲之職本要糺正紀綱而礪但務挾私欺罔天聽合行黜責其罪有四一曰謗黷先朝聖政謹按日歴書真宗皇帝親諭王旦移橋一事乃是先帝知民間利病移得此橋為便故史官書之以彰聖政為後世法今王礪却稱是真宗朝權臣受豪民獻賂移得此橋不便民間至今切齒若如王礪所說即是真宗誤信權臣移橋致民怨怒乃是當時闕政今國史書橋便利彰先帝聖政王礪言移橋不便是先朝闕政臣不知國朝舊史可信為復王礪之言可憑其虚妄謗黷之罪可誅一也二曰中傷平人使今後勞臣不勸臣見向前三司使不能擘畫錢穀至有強借豪民錢二十萬貫買天下官私物貨至稅果菜之𩔖細碎刻剥自堯臣在三司不聞過外誅求而即今財用不至大闕亦聞南郊漸近諸事亦稍有偹當此窘廹乏用之時而能使民不加賦而國用粗足亦可謂勞能之臣方當責其辦事今因移一橋小事而王礪誣其與豪民有情致興大獄及至勘出並無情弊是王礪不卹朝廷事體當此乏用之際將能幹事之臣因小事妄加傷害其罪二也三曰誣奏平人為殺人賊凡臺官言事許風聞者謂耳目不及之事即許風聞今王礪目見慎鉞所遣小吏别無武勇又無器仗而稱其有殺害之心及至勘出並無迹狀其罪三也四曰挾私希㫖初朝廷本為省府互爭别選不干礙官定奪王礪既知呉育是舉主即合自陳乞别差官豈可謗黷先朝希合舉主且礪言慎鉞是堯臣所舉感惠必深今礪是呉育舉豈不懐感且呉育與王堯臣本無怨恨各為論列本司公事所見異同乃是常事但王礪小人妄思迎合張皇欺誑其罪四也且王礪謗黷先朝聖政之罪若不重責則無以彰陛下孝治之明中傷堯臣若不重責則使勞能之臣不能安心展効其誣奏慎鉞遣吏殺害及挾私迎合舉主之罪若不重責則今後小人恣情妄作獄訟必多事繫朝廷之體臣忝諫諍不可不言其王礪伏乞重行貶黜脩又上奏曰臣近有劄子并曽面奏為臺官王礪特被差委輙敢徇私妄言王堯臣因移橋别有情弊等事欺誑朝廷上賴陛下聖明再令推究勘得堯臣並無私曲已䝉聖恩釋放自王礪妄行彈奏羅織無事之人欲借國威以報私忿立朝之列人各自危及聞堯臣不陷枉刑更䝉陛下恩釋中外之士稍復安心然小人在朝非國之利如礪善惡未辨尚可含容今既試之以事見其傾險之迹則豈可更令濫處臺憲中傷善人伏望聖慈早行黜責以戒在位傾邪之輩兼亦使今後選用之人不敢尚辜委任别造過愆若礪不黜竊慮今後被差委者動皆作過則陛下無由使人此事所繫不細脩又上奏曰臣近日伏覩差郭承祐知邢州臣自䝉朝廷差充轉運按察使已来前後累準宻降不下司宣頭劄子令常用心體量轄下官吏臣細詳朝㫖本為河北於天下諸路最為用武之地曩因北人通和之後弛備多年一旦恐有事宜百事隳廢朝廷悔鑒前弊故先慎擇官吏務欲脩整頺綱昨準宣頭節文一十九州軍擇人乆任外其餘州軍長吏令中書門下樞宻院選差并下轉運司體量大小文武官不堪其任者不得容庇不才因循不切糺舉却致臨事闕悞朝廷留意河北丁寧切至如此加以近自保州兵亂之後至今民尚虚驚軍情未帖相州順安軍瀛州安肅軍衛州通利軍等諸處不住驕兵扇揺結構當此之際臣實不意選差郭承祐為河北長吏承祐頃知澶州引惹脩城兵士㡬至作閙去年差来河北將兵臣在諫院曽極論列㝷罷知相州貪穢之狀狼藉多端又為按察使張昷之奏論罷為北京部署今者移陜西遷延不去又以邢臺委之當河朔多事朝廷丁寧留意之時承祐累任不離河北不審其人果以何能當此慎選承祐庸劣貪穢奴廝之材若以曾効僕使之勞不忍廢棄豈無閒處可畜養之況邢州北連鎮定控扼西山軍馬所屯人民繁富禦戎鎮俗尤須擇吏萬一乏人選差止得中常之材尚勝承祐伏望朝廷顧惜河朔名藩重地不使庸劣小人壞之其郭承祐伏乞特賜指揮罷去邢州别選差人厯代名臣奏議卷一百七十四
