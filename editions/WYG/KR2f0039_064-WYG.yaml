body:
  text: 歴代名臣奏議卷六十四明楊士竒等撰治道宋理宗時丁大全擅國柄以言為諱尚左郎官兼右司諌陳宗禮陛對言願為宗社大計毋但為倉廪府庫之小計願得天下四海之心毋但得左右便嬖戚畹之心願寄腹心於忠良毋但寄耳目於卑近願四通八達以来正人毋但旁蹊曲徑𩔖引貪濁右司郎中趙必愿上疏言陛下英明宻運斷出於獨固欲一切轉移之然而大權若在我或者猶有下移之疑衆正若已開或者猶有旁徑之疑䇿免二相銷天變也去者固難以復留留者恐終於引去虚鼎席以待故老疑者或意其未必来而況在數千里之外次補以任大政疑者或意其不敢專而況於不安其位中書政之本也今果何時尚可含糊意向以起天下之疑乎親擢臺諫開言路也用之未久者何為輕於易去去之未幾何為使之復来召於外服者不知果能用之而必堅除自周行者不知果能聽之而無諱乎朝廷除授軍國賞罰本至公也今有姓名未達於廟堂而遷擢忽由於中出斥逐三衙竟不指名罪狀而人始得以疑陛下矣一除目之頒一號令之出雖未必由於閹宦而人或疑於閹宦雖未必由於私謁而人或疑於私謁雖未必由於戚畹宗邸而人或疑於戚畹宗邸夫天下者祖宗之天下也非陛下所私有也陛下雖有去弊之心而動涉可疑之迹陛下亦何樂於此監察御史洪咨夔上疏曰臣歴考往古治亂之原權歸人主政出中書天下未有不治權不歸人主則㢘級一夷綱常且不立奚政之問政不出中書則腹心無寄必轉而他厲奚權之攬此八政馭羣臣所以獨歸之王而詔之者必天官冢宰也陛下親政以来威福操柄收還掌握揚廷出令震撼海宇天下始知有吾君元首既明股肱不容於自惰撤副封罷先行坐政事堂以治事天下始知有朝廷此其大權大政亦畧舉矣然中書之敝端其大者有四一曰自用二曰自專三曰自私四曰自固願陛下於從容論道之頃宣示臣言俾大臣充初志而加定力懲往轍而圖方来以仰稱厲精更始之意帝嘉納之右丞相兼樞宻使董槐言於帝曰臣為政而有害政者三帝曰胡謂害政者三對曰戚里不奉法一矣執法大吏久於其官而擅威福二矣皇城司不檢士三矣將率不檢下故士卒横士卒横則變生於無時執法威福擅故賢不肖混淆賢不肖混淆則姦衺肆賢人伏而不出親戚不奉法故法令輕法令輕故朝廷卑三者弗去政且廢願自上除之太學博士湯漢轉對言太祖之天下壊其半者蔡京王黼也髙宗之天下壊其半者鄭清之也又曰茍有志焉則其紀綱必先正其根本必先彊其藩籬必先固夫然後心廣體胖伴奐而優游其樂無極矣舎此不務而徒以九重之深一笑之適以為樂樂極而思之吾有朝廷而不能治也吾有黎民而無與保之也起視四境而外侮又至矣雖有鄭衛之音燕趙之色建章之麗瓊林之積亦獨何樂哉文天祥對䇿曰臣恭惟皇帝陛下處常之久當泰之交以二帝三王之道㑹諸心將三紀于此矣臣等鼓舞於鳶飛魚躍之天皆道體流行中之一物不自意得旅進於陛下之庭而陛下且嘉與之論道道之不行也久矣陛下之言及此天地神人之福也然臣所未解者今日已當道久化成之時道洽政治之候而方歉焉有志勤道逺之疑豈望道而未之見耶臣請泝太極動靜之根推聖神功化之驗就以聖問中不息一語為陛下勉幸陛下試垂聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇往古来今之宙其間百千萬變之消息盈虚百千萬事之轉移闔闢何莫非道所謂道者一不息而已矣道之隱於渾淪藏於未琱未琢之天當是時無極太極之體也自太極分而隂陽則隂陽不息道亦不息隂陽散而五行則五行不息道亦不息自五行又散而為人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相為不息然則道一不息天地亦一不息天地之不息固道之不息者為之聖人出而為天地立心為生民立命為往聖繼絶學為萬世開太平亦不過以一不息之心充之充之而脩身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以来以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而道始離非道之離也知道者之鮮也雖然其間英君誼辟固有號為稍稍知道者矣而又沮於行道之不力知務徳化矣而不能不尼之以黄老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽補過時架漏度日毋恠夫駁乎無以議為也獨惟我朝式克至于今日休陛下傳列聖之心以會藝祖之心㑹藝祖之心以參帝王之心參天地之心三十三年間臣知陛下不貳以二不參以三茫乎天運窅爾神化此心之天混兮闢兮其無窮也然臨御浸久持循浸熟而筭計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盜賊之警所以貽宵旰之憂者尤所不免然則行道者信無驗也耶臣則以為道非無騐之物也道之功化甚深也而不可以為迂道之證效甚遲也而不可以為逺維天之命於穆不已天地之所以為天地也之德之純純亦不已聖人之所以為聖人也為治顧力行何如耳焉有行道於嵗月之暫而遽責其驗之為迂且逺耶臣之所望於陛下者法天地之不息而已姑以近事言則責躬之言方發而隂雨旋霽是天變未嘗不以道而弭也賑饑之典方舉而都民驩呼是民生未嘗不以道而安也論辯建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小獲維揚瀘水之雋功無非陛下憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而遽以為道之極功則漢唐諸君之用心是也陛下行帝而帝行王而王而肯襲漢唐事耶此臣所以贊陛下之不息也陛下儻自其不息者而充之則與隂陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而為三紀之風移俗易可也雖充而為四十年圄空刑措可也雖充而為百年徳洽於天下可也雖充而為卜世過歴億萬年敬天之休可也豈止如聖問八者之事可徐就條理而已哉臣謹昩死上愚對臣伏讀聖策曰蓋聞道之大原出於天超乎無極太極之妙而實不離乎日用事物之常根乎隂陽五行之賾而實不外乎仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相傳同此一道由脩身而治人由致知而齊家治國平天下本之於精神心術達之於禮樂刑政其體甚㣲其用則廣歴千萬世而不可易然功化有淺深證效有遲速何歟朕以寡昧臨政願治于兹歴年志愈勤道愈逺窅乎其未眹也朕心疑焉子大夫明先聖之術咸造在庭必有切至之論朕將虚己以聽臣有以見陛下遡道之本原求道之功效且疑而質之臣等也臣聞聖人之心天地之心也天地之道聖人之道也分而言之則道自道天地自天地聖人自聖人合而言之則道一不息也天地一不息也聖人亦一不息也臣請遡其本原言之茫茫堪輿坱圠無垠渾渾元氣變合無端人心仁義禮智之性未賦也人心剛柔善惡之氣未禀也當是時未有人心先有五行未有五行先有隂陽未有隂陽先有無極太極未有無極太極則太虚無形沖漠無眹而先有此道未有物之先而道具焉道之體也既有物之後而道行焉道之用也其體則微其用甚廣即人心而道在人心即五行而道在五行即隂陽而道在隂陽即無極太極而道在無極太極貫顯微兼費隱包小大通物我道何以若此哉道之在天下猶水之在地中地中無往而非水天下無往而非道水一不息之流也道一不息之用也天以澄著則日月星辰循其經地以靖謐則山川草木順其常人極以昭明則君臣父子安其倫流行古今綱紀造化何莫由斯道也一日而道息焉雖三才不能以自立道之不息功用固如此夫聖人體天地之不息者也天地以此道而不息聖人亦以此道而不息聖人立不息之體則斂於修身推不息之用則散於治人立不息之體則寓於致知以下之工夫推不息之用則顯於齊家治國平天下之效驗立不息之體則本之精神心術之㣲推不息之用則達之禮樂刑政之著聖人之所以為聖人者猶天地之所以為天地也道之在天地間者常久而不息聖人之於道其可以頃刻息耶言不息之理者莫如大易莫如中庸大易之道至於乾道變化各正性命保合太和而聖人之論法天乃歸之自强不息中庸之道至於溥博淵泉上天之載無聲無臭而聖人之論配天地乃歸之不息則久豈非乾之所以剛健中正純粹精者一不息之道耳是以法天者亦以一不息中庸之所以髙明博厚悠久無疆者一不息之道耳是以配天地者亦以一不息以不息之心行不息之道聖人即不息之天地也陛下臨政願治于兹歴年前此不息之嵗月猶日之自朝而午今此不息之嵗月猶日之至午而中此正勉强行道大有功之日也陛下勿謂數十年間我之所以擔當宇宙把握天地未嘗不以此道至於今日而道之驗如此其迂且逺矣以臣觀之道猶百里之途也今日則適六七十之候也進於道者不可以中道而廢游於途者不可以中途而畫孜孜矻矻而不自已焉則適六七十里者固所以為至百里之階也不然自止於六七十里之問則百里雖近焉能以一武到哉道無淺功化行道者何可以深為迂道無速證效行道者何可以遲為逺惟不息則能極道之功化惟不息則能極道之證效氣機動盪於三極之間神采灌注於萬有之表要自陛下此一心始臣不暇逺舉請以仁宗皇帝事為陛下陳之仁祖一不息之天地也康定之詔曰祇勤抑畏慶歴之詔曰不敢荒寧皇祐之詔曰緬念為君之難深惟履位之重慶歴不息之心即康定不息之心也皇祐不息之心即慶歴不息之心也當時仁祖以道徳感天心以福祿勝人力國家綏靖邊鄙寧謐若可以已矣而猶未也至和元年仁祖之三十三年也方且露立仰天以畏天變碎通天犀以救民生處賈黯吏銓之職擢公弼殿柱之名以厚人才以昌士習納景初减用之言聽范鎮新兵之諫以裕國計以强兵力以至講周禮薄征緩刑而拳拳以盜賊為憂選將帥明紀律而汲汲以西北為慮仁祖之心至此而不息則與天地同其悠久矣陛下之心仁祖之心也范祖禹有言欲法堯舜惟法仁祖臣亦曰欲法帝王惟法仁祖法仁祖則可至天德願加聖心焉臣伏讀聖策曰三墳以上云云豈道之外又有法歟臣有以見陛下慕帝王之功化證效而亦意其各有淺深遲速也臣聞帝王行道之心一不息而已矣堯之兢兢舜之業業禹之孜孜湯之慄慄文王之不已武王之無貳成王之無逸皆是物也三墳逺矣五典猶有可論者臣嘗以五典所載之事推之當是時日月星辰之順以道而順也鳥獸草木之若以道而若也九功惟叙以道而叙也四夷来王以道而来王也百工以道而熙庶事以道而康光天之下至于海隅蒼生蓋無一而不拜帝道之賜矣垂衣拱手以自逸於土階巖廊之上夫誰曰不可而堯舜不然也方且考績之法重於三嵗無嵗而敢息也授歴之命嚴於四時無月而敢息也凛凛乎一日二日之戒無日而敢息也惓惓乎惟時惟幾之歌無時而敢息也此猶可也授受之際而堯之命舜乃曰允執厥中夫謂之執者戰兢保持而不敢少放之謂也味斯語也則堯之不息可見矣河圖出矣洛書見矣執中之說未聞也而堯獨言之堯之言贅矣而舜之命禹乃復益之以人心惟危道心惟微惟精惟一之三言夫致察於危微精一之間則其戰兢保持之念又有甚於堯者舜之心其不息又何如哉是以堯之道化不惟驗於七十年在位之日舜之道化不惟驗於五十年視阜之時讀萬世永賴之語則唐虞而下數千百年間天得以為天地得以為地人得以為人者皆堯舜之賜也然則功化抑何其深證效抑何其遲歟降是而王非固勞於帝者也太樸日散風氣日開人心之機械日益巧世變之乗除不息而聖人之所以綱維世變者亦與之相為不息焉俗非結繩之淳也治非畫象之古也師不得不誓侯不得不㑹民不得不凝之以政士不得不凝之以禮内外異治不得不以采薇天保之治治之以至六典建官其所以曰治曰政曰禮曰教曰刑曰事者亦無非扶世道而不使之窮耳以勢而論之則夏之治不如唐虞商之治又不如夏周之治又不如商帝之所以帝者何其逸王之所以王者何其勞慄慄危懼不如非心黄屋者之為適也始於憂勤不如恭已南靣之為安也然以心而觀則舜之業業即堯之兢兢禹之孜孜即舜之業業湯之慄慄即禹之孜孜文王之不已武王之無貳成王之無逸何莫非兢兢業業孜孜慄慄之推也道之散於宇宙間者無一日息帝王之所以行道者亦無一日息帝王之心天地之心也尚可以帝者之為逸而王者之為勞耶臣願陛下求帝王之道必求帝王之心則今日之功化證效或可與帝王一視矣臣伏讀聖策曰自時厥後云云亦足以維持憑藉者何歟臣有以見陛下陋漢唐之功化證效而且為漢唐世道發一慨也臣聞不息則天息則人不息則理息則欲不息則陽明息則隂濁漢唐諸君天資敏地位髙使稍有進道之心則六五帝四三王亦未有難能者奈何天不足以制人而天反為人所制理不足以御欲而理反為欲所御陽明不足以勝隂濁而陽明反為隂濁所勝是以勇於進道者少沮於求道者多漢唐之所以不唐虞三代也歟雖然是為不知道者言也其間亦有號為知道者矣漢之文帝武帝唐之太宗亦不可謂非知道者然而亦有議焉先儒嘗論漢唐諸君以公私義利分數多少為治亂三君之心往往不純乎天不純乎人而出入於天人之間不純乎理不純乎欲而出入乎理欲之問不純乎陽明不純乎隂濁而出入乎陽明隂濁之間是以專務德化雖足以陶後元泰和之風然而尼之以黄老則鴈門上郡之警不能無外施仁義雖足以致建元富庻之盛然而遏之以多欲則輪臺末年之悔不能免四年行仁雖足以開貞觀升平之治然而畫之以近效則紀綱制度曾不足為再世之憑藉蓋有一分之道心者固足以就一分之事功有一分之人心者亦足以召一分之事變世道汙隆之分數亦係於理欲消長之分數而已然臣嘗思之漢唐以来為道之累者其大有二一曰雜伯一曰異端時君世主有志於求道者不陷於此則陷於彼姑就三君而言則文帝之心異端累之也武帝太宗之心雜伯累之也武帝無得於道憲章六經統一聖真不足以勝其神僊土木之私干戈刑罰之慘其心也荒太宗全不知道閨門之耻將相之誇末年遼東一行終不能以克其血氣之暴其心也驕雜伯一念憧憧往来是固不足以語常久不息之事者若文帝稍有帝王之天資稍有帝王之地歩一以君子長者之道待天下而晁錯輩刑名之說未嘗一動其心是不累於雜伯矣使其以二三十年恭儉之心而移之以求道則後元氣象且將駸駸乎商周進進乎唐虞奈何帝之純心又間於黄老之清浄是以文帝僅得為漢代之令主而不得一儕於帝王嗚呼武帝太宗累於雜伯君子固不敢以帝王事望之文帝不為雜伯所累而不能不累於異端是則重可惜已臣願陛下監漢唐之跡必監漢唐之心則今日之功化證效將超漢唐數等矣臣伏讀聖䇿曰朕上嘉下樂云云抑化裁推行有未至歟臣有以見陛下念今日八者之務而甚有望乎為道之驗也臣聞天變之来民怨招之也人才之乏士習蠱之也兵力之弱國計屈之也邊陲之警盜賊因之也夫陛下以上嘉下樂之勤夙興夜寐之勞悵嵗月之逾邁亦欲以少見吾道之驗耳俯視一世未能差强人意八者之弊臣知陛下為此不滿也陛下分而以八事問臣合而以四事對請得以熟數之於前何謂天變之来民怨招之也天視自我民視天聽自我民聽天明畏自我民明威人心之休戚天心所因以為喜怒者也熙寧間大旱是時河陜流民入京師監門鄭俠畵流民圖以獻且曰陛下南征北伐皆以勝㨗之圖来上料無一人以父母妻子遷移困頓皇皇不給之狀為圖以進者覽臣之圖行臣之言十日不雨乞正欺君之罪上為之罷新法十八事京師大雨八日天人之交間不容穟載在經史此𩔖甚多陛下以為今之民生何如耶今之民生困矣自瓊林大盈私於積貯而民困自建章通天頻於營繕而民困自獻助疊見於豪家巨室而民困自和糴不間於閭閻下户而民困自所至貪官暴吏視吾民如家雞圏豕惟所咀啖而民困嗚呼東南民力竭矣書曰怨豈在明不見是圖今尚可謂之不見乎書曰怨不在大亦不在小今尚可謂之小乎生斯世為斯民仰事俯育亦欲各遂其父母妻子之樂而操斧斤淬鋒鍔日夜思所以斬伐其命脉者滔滔皆是然則臈雪靳瑞蟄雷愆期月犯于木星隕為石以至土雨地震之變無恠夫屢書不一書也臣願陛下持不息之心急求所以為安民之道則民生既和天變或於是而弭矣何謂人才之乏士習蠱之也臣聞窮之所飬達之所施幼之所學壯之所行今日之修於家他日之行於天子之庭者也國初諸老嘗以厚士習為先務寧收落韻之李迪不取鑿說之賈邊寧收直言之蘇轍不取險恠之劉幾建學校則必欲崇經術復鄉舉則必欲參行藝其後國子監取湖學法建經學治道邊防水利等齋使學者因其名以求其實當時如程頥徐積吕希哲皆出其中嗚呼此元祐人物之所從出也士習厚薄最關人才從古以来其語如此陛下以為今之士習何如耶今之士大夫之家有子而教之方其幼也則授其句讀擇其不戾於時好不震於有司者俾熟復焉及其長也細書為工累牘為富持試於鄉校者以是校藝於科舉以是取青紫而得車馬也以是父兄之所教詔師友之所講明利而已矣其能卓然自拔於流俗者幾何人哉心術既壊於未仕之前則氣節可想於既仕之後以之領郡邑如之何責其為卓茂黄覇以之鎮一路如之何責其為蘇章何武以之曵朝紳如之何責其為汲黯望之奔競於勢要之路者無恠也趨附於權貴之門者無恠也牛維馬縶狗茍蠅營患得患失無所不至者無恠也悠悠風塵靡靡媮俗清芬消歇濁滓横流惟皇降衷秉彛之懿萌蘖於牛羊斤斧相尋之衝者其有幾哉厚今之人才臣以為變今之士習而后可也臣願陛下持不息之心急求所以為淑士之道則士風一淳人才或於是而可得矣何謂兵力之弱國計屈之也謹按國史治平間遣使募京畿淮南兵司馬光言邊臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯願罷招禁軍訓練舊有之兵自可備禦臣聞古今天下能免於弱者必不能免於貧能免於貧者必不能免於弱一利之興一害之伏未有交受其害者今之兵財則交受其害矣自東海城築而調淮兵以防海則兩淮之兵不足自襄樊復歸而併荆兵以城襄則荆湖之兵不足自戰艦列於漢水寃血濺於寶峰而正軍忠義空於死徙者過半則川蜀之兵又不足江淮之兵又抽而入蜀又抽而實荆則下流之兵愈不足矣荆湖之兵又分而䇿應分而鎮撫則上流之兵愈不足矣夫國之所恃以自衛者兵也而今之兵不足如此國安得而不弱哉扶其弱而歸之强則招兵之䇿今日直有所不得已者然召募方新調度轉急問之大農大農無財問之版曹版曹無財問之餉司餉司無財自嵗幣銀絹外未聞有畫一䇿為軍食計者是則弱矣而又未免於貧也陛下自見肝膈近又創一安邊太平庫專以供軍此藝祖積縑帛以易虜首之心也仁宗皇帝出錢帛以助兵革之心也轉易之間風采立異前日之弱者可强矣然飛芻輓粟給餉餽糧費於兵者幾何而琳宫梵宇照耀湖山土木之費則漏卮也列竈雲屯樵蘇後爨費於兵者幾何而霓裳羽衣靡金飾翠宫庭之費則尾閭也生熟口劵月給衣糧費於兵者幾何而量珠輦玉倖寵希恩戚畹之費則濫觴也蓋天下之財專以供軍則財未有不足者第重之以浮費重之以冗費則財始缾罄而罍耻矣如此則雖欲足兵其何以給兵耶臣願陛下持不息之心急求所以為節財之道則財計一充兵力或於是而可强矣何謂邊陲之警盜賊因之也謹按國史紹興間楊幺寇洞庭連跨數郡大將王􅊅不能制時偽齊挟敵使李成寇襄漢么與交通朝廷患之始命岳飛措置上流已而逐李成擒楊么而荆湖平臣聞外之勍敵不能為中國患而其来也必待内之變内之盜賊亦不能為中國患而其起也必將納外之侮盜賊而至於通勍敵則腹心之大患也已今之所謂敵國者固可畏也然而逼我蜀則蜀帥䇿瀘水之勲窺我淮則淮帥奏維揚之凱敵騎縱横固不可以一㨗止之然使之無得氣去則中國之技未為盡出其下彼亦猶畏中國之有人也獨惟舊海在天一隅逆雛穴之者數年於兹􅄓風瞬息一葦可航彼未必不朝夕為趨浙計然而未能焉短於舟踈於水懼吾唐島之有李寳在耳然洞庭之湖烟水沈寂而浙右之湖濤瀾沸驚區區妖孽且謂有楊么之漸矣得之京師之耆老皆以為此寇出没倏閃往来翕霍駕舟如飛運柂如神而我之舟師不及焉夫東南之長技莫如舟師我之勝烏珠於金山者以此我之斃逆亮於采石者以此而今此曹反挾之以制我不武甚矣萬一或出於楊么之計則前日李成之不得志於荆者未必今日之不得志於浙也曩聞山東洊饑有司貪市𣙜之利空蘇湖根本以資之廷紳猶謂互易安知無為其鄉道者一夫登岸萬事瓦裂又聞魏村江灣福山三寨水軍興販鹽課以資逆雛廷紳猶謂是以扞衛之師為商賈之事以防拓之卒開鄉道之門憂時識治之見往往如此肘腋之蜂蠆懐袖之蛇蝎是其可以忽乎哉陛下近者命發運兼憲合兵財而一其權是將為滅此朝食之圖矣然屯海道者非無軍控海道者非無將徒有王􅊅數年之勞未聞岳飛八日之㨗子大叔平苻澤之盜恐不如此長此不已臣懼為李成開道地也臣願陛下持不息之心急求所以弭寇之道則寇難一清邊備或於是而可寬矣臣伏讀聖䇿曰夫不息則乆乆則徴今胡為而未徴歟變則通通則久今其可以屢更歟臣有以見陛下久於其道而甚有感乎中庸大易之格言也臣聞天久而不墜也以運地久而不隤也以轉水乆而不腐也以流日月星辰而常新也以行天下之凡不息者皆以久也中庸之不息即所以為大易之變通大易之變通即所以驗中庸之不息變通者之久固肇於不息者之久也蓋不息者其心變通者其迹其心不息故其迹亦不息游乎六合之内而縱論乎六合之外生乎百世之下而追想乎百世之上神化天造天運無端發微不可見充周不可窮天地之所以變通固自其不息者為之聖人之久於其道亦法天地而已矣天地以不息而久聖人亦以不息而久外不息而言久焉皆非所以久也臣嘗讀無逸一書見其享國之久者有四君焉而其間三君為最久臣求其所以久者中宗之心嚴恭寅畏也髙宗之心不敢荒寧也文王之心無淫于逸無遊于畋也是三君者皆無逸而已矣彼之無逸臣之所謂不息也一無逸而其效已如此然則不息者非所以久歟陛下之行道蓋非一朝夕之暫矣寳紹以来則涵養此道端平以来則發揮此道嘉熙以来則把握此道嘉熙而淳祐淳祐而寳祐十餘年間無非持循此道之嵗月陛下處此也庭燎未輝臣知其宵衣以待日中至昃臣知其玉食弗遑夜漏已下臣知其丙枕無寐聖心之運亦可謂不息矣然既往之不息者易方来之不息者難久而不息者易愈久而愈不息者難昕臨大庭百辟星布陛下之心此時固不息矣暗室屋漏之隱試一警省則亦能不息否乎日御經筵學士雲集陛下之心此時固不息矣宦官女子之近試一循察則亦能不息否乎不息於外者固不能保其不息於内不息於此者固不能保其不息於彼乍勤乍怠乍作乍輟則不息之純心間矣如此則陛下雖欲久則徴臣知中庸九經之治未可以朝夕見也雖欲通則久臣知繋辭十三卦之功未可以嵗月計也蜵蜎蠖濩之中虚明應物之地此全在陛下自斟酌自執持頃刻之力不繼則悠久之功俱廢矣可不戒哉可不懼哉陛下之所以策臣者悉矣臣之所以忠於陛下者亦既畧陳於前矣而陛下䇿之篇終復曰子大夫熟之復之勿激勿泛以副朕詳延之意臣伏讀聖䇿至此陛下所謂詳延之意蓋可識已夫陛下自即位以来未嘗以直言罪士不惟不罪之以直言而且導之以直言臣等嘗恨無由一至天子之庭以吐其素所蓄積幸見錄於有司得以借玉階方寸地此正臣等披露肺肝之日也方將明目張膽謇謇諤諤言天下事陛下乃戒之以勿激勿泛夫泛固不切矣若夫激者忠之所發也陛下胡併與泛者之言而厭之耶厭激者之言則是將胥臣等而為容容唯唯之歸耶然則臣將為激者歟將爲泛者歟抑將遷就陛下之說而姑為不激不泛者歟雖然奉對大庭而不激不泛者固有之矣臣於漢得一人焉曰董仲舒方武帝之䇿仲舒也慨然以欲聞大道之要為問帝之求道其心蓋甚銳矣然道以大言帝將求之虚無渺㝠之鄉也使仲舒於此過言之則激淺言之則泛仲舒不激不泛得一說曰正心武帝方將求之虚無𣺌㝠之鄉仲舒乃告之以眞實淺近之理兹陛下所謂切至之論也奈何武帝自恃其區區英明之資超偉之識謂其足以淩跨六合籠駕八表而顧於此語忽焉仲舒以江都去而帝所與論道者他有人矣臣固嘗為武帝惜也堂堂天朝固非漢比而臣之賢亦萬不及仲舒然亦不敢激不敢泛竊扵聖問之所謂道者而得二說焉以為陛下獻陛下試采覽焉一曰重宰相以開公道之門臣聞公道在天地間不可一日壅閼所以昭蘇而滌決之者宰相責也然扶公道者宰相之責而主公道者天子之事天子而侵宰相之權則公道已矣三省樞宻謂之朝廷天子所與謀大政出大令之地也政令不出於中書昔人謂之斜封墨敕非盛世事國初三省紀綱甚正中書造命門下審覆尚書奉行宫府之事無一不統於宰相是以李沆猶得以焚立妃之詔王旦猶得以沮節度之除韓琦猶得出空頭敕以逐内侍杜衍猶得封還内䧏以裁僥倖蓋宰相之權尊則公道始有所依而立也今陛下之所以為公道計者非不悉矣以夤緣戒外戚是以公道責外戚也以裁制戒内司是以公道責内司也以舎法用例戒羣臣是以公道責外廷也雷霆發蔀星日燭幽天下於此咸服陛下之明然或謂比年以来大庭除授於義有所未安於法有所未便者悉以聖㫖行之不惟諸司陞補上瀆宸奎而統帥躐級閤職超遷亦以夤緣而得恩澤矣不惟姦􅂍湔洗上勞渙汗而選人通籍姦胥逭刑亦以鑚刺而拜寵命矣甚至閭閻𤨏屑之鬬訟皂𨽻猥賤之干求悉達内庭盡由中降此何等蟣蝨事而陛下以身親之大臣幾於為奉承風㫖之官三省幾於為奉行文書之府臣恐天下公道自此壅矣景祐間罷内降凡詔令皆由中書樞宻院仁祖之所以主張公道者如此今進言者猶以事當間出睿斷為說嗚呼此亦韓絳告仁祖之辭也朕固不憚自有處分不如先盡大臣之慮而行之仁祖之所以諭絳者何說也奈何復以絳之說啟人主以奪中書之權是何心哉宣靖間創御筆之令蔡京坐東廊專以奉行御筆為職其後童貫梁師成用事而天地為之分裂者數世是可鑒已臣願陛下重宰相之權正中書之體凡内批必經由中書樞宻院如先朝故事則天下幸甚宗社幸甚二曰收君子以夀直道之脉臣聞直道在天地間不可一日頽靡所以光明而張主之者君子責也然扶直道者君子之責而主直道者人君之事人君而至於沮君子之氣則直道已矣夫不直則道不見君子者直道之倡也直道一倡於君子昔人謂之鳯鳴朝陽以為清朝賀國朝君子氣節大振有魚頭參政有鶻撃臺諌有鐵面御史軍國之事無一不得言於君子是以司馬光猶得以殛守忠之姦劉摯猶得以折李憲之橫范祖禹猶得以罪宋用臣張震猶得以擊龍大淵曽覿蓋君子之氣伸則直道始有所附而行也今陛下之所以為直道計者非不至矣月有供課是以直道望諫官也日有輪劄是以直道望廷臣也有轉對有請對有非時召對是以直道望公卿百執事也江海納汙山藪藏疾天下於此咸服陛下之量然或謂比年以来外廷議論於已有所未協於情有所未忍者悉以聖意斷之不惟言及乗輿上勤節貼而小小予奪小小廢置亦且寢罷不報矣不惟事関廊廟上煩調停而小小抨彈小小糾劾亦且宣諭不已矣甚者意涉區區之貂璫論侵𤨏𤨏之姻婭不恤公議反出諫臣此何等狐鼠輩而陛下以身庇之御史至於乗和事之譏臺吏至於重訖了之報臣恐天下之直道自此沮矣康定間歐陽脩以言事出未幾即召以諫院至和間唐介以言事貶未幾即除以諫官仁祖之所以主直道者如此今進言者猶以臺諫之勢日横為疑嗚呼兹非富弼忠於仁祖意也弼傾身下士寧以宰相受臺諫風㫖弼之自處何如也奈何不知弼之意反啓人君以厭君子之言是何心哉元符間置看詳理訴所而士大夫得罪者八百餘家其後鄒浩陳瓘去國無一人敢為天下伸一喙者是可鑒已臣願陛下壯正人之氣養公論之鋒凡以直言去者悉召之於霜臺烏府中如先朝故事則天下幸甚宗社幸甚蓋大道之行天下為公周道如砥其直如矢自古帝王行道者無先於此也臣来自山林有懐欲吐陛下悵然疑吾道之迂逺且慨論乎古今功化之淺深證效之遲速而若有大不滿於今日者臣則以為非行道之罪也公道不在中書直道不在臺諫是以陛下行道用力處雖勞而未遽食道之報耳果使中書得以公道緫政要臺諫得以直道糾官邪則陛下雖端冕凝旒於穆清之上所謂功化證效可以立見何至積三十餘年之工力而志勤道逺𣺌焉未有際耶臣始以不息二字為陛下勉終以公道直道二說為陛下獻陛下萬幾之暇儻於是而加三思則躋帝王軼漢唐由此其階也已臣賦性疎愚不識忌諱握筆至此不自知其言之過於激亦不自知其言之過於泛冒犯天威罪在不赦惟陛下留神臣謹對牟濚上奏曰臣生長西州叨竊陛下科第垂四十年中更兵火與民俱流茍延餘生至於今日雖嘗兩塵班綴一玷州麾竟坐迂疎動與物忤十年不調自分不復有再覩清光之時公朝不忍終棄繇淮東制幕擢丞奉常今又兼領銓部聖恩如天莫知補報適當陛對遂得一吐微忠於玉階方寸地此臣千載之一遇也抑臣聞之迹疎而言親者危地逺而意忠者忤臣之蹤跡可謂疎逺臣之寸心實抱樸忠惟陛下垂聽焉臣嘗讀孟子至天下之生久矣一治一亂乃知自古天下未嘗無亂更一亂則必有人焉出而治之此蓋天地生生不息之機脉絡未嘗間斷洪水之後有奄㢘天不生周公則無以為生民除害春秋之後有戰國天不生孟子則無以為生民立心禹之後有周公孔子之後有孟子亂不終於亂而歸於治人也亦天也然人皆知四裔之為中國害而不知人心之害甚於四裔蓋四裔雖能為害於一時而人心天理終不可泯沒良心壊則失其所以為人而末流之弊有不可勝言者臣請先言四裔而後及人心中國之所以異於四裔者以其有三綱五常為之主張禮義㢘耻為之維持也而近歳以来貪競成習欺誕成風慨習俗之日媮澟綱常之將墜而遐裔遂得以憑陵中國生靈肝腦塗地而狡焉之謀遂至窺江不有人焉以挫其投鞭之怒則大事去矣天佑聖主為生賢佐以謝𤣥八千之卒破苻秦百萬之師使宗社幾危而復安正統幾絶而復續功不在禹周公下矣臣竊意士大夫更大變故歴大憂患必能懲創悔艾洗心滌慮以歸於正矣而陷溺既深舊染猶在問吏治吏治未醇問士習士習茍且至勤聖主丁寧告戒作之而不應振之而不起消磨軟熟賢者亦不免焉此臣之所甚懼也臣不敢復追咎既往姑以近事明之陛下戢貪有詔蓋歎民生之寡遂而惡貪吏之病民也謂宜懲一勸百而貪鄙之風革矣今幾何時凡所彈劾不過州縣之小吏而當事任取顯官尚多有可議者得無纎悉於其小而闊畧於其大耶此非陛下意也陛下訓廉有詔盖知人性之本善而欲引中人於君子之歸也謂宜舉一勸百而㢘耻之維張矣今幾何時但聞戢貪未聞有以㢘擢用者羞惡之心誰獨無之何至泯沒如是得非孤寒寡與雖亷不能以自見而大吏之好惡與人背馳耶此非陛下意也陛下為千里擇牧守蓋本以為民也而牧民者但知為富貴之圖不復為根本之慮託獻羨之名以蓋其貪酷之迹而失朝廷為民之初意矣陛下買公田以免和糴蓋將以便民也而奉行者不能用一分之寬而行一切之政但欲覬了辦之賞不暇為長逺之謀而失朝廷便民之初意矣貴戚不當任以事此良法也陛下四十年間人不知有貴戚也至於近日而好官要職如取如攜未必皆貴戚也而夤縁攀附亦得以躐取麾節其間豈不有材不學焉知為政失陛下赤子之心塞孤寒進身之路而或者始得以私貴戚議陛下此陛下所親愛負陛下也閹寺聞名非國之福此確論也陛下四十年間人不知有閹寺也乃至於近日而此曹名字稍稍有聞蓋寡㢘鮮耻者往往倚之而進招權納賄者揚揚自以為功雖傳聞未必盡然而其實有以自取或者始得以用閹寺議陛下此陛下親信負陛下也陛下髙爵厚祿以待士大夫望其盡心體國也而中外大小之臣不能體陛下之心而各自以其心為心人心陷溺一至于此陳蕃所謂在朝羣臣如河中木汎汎東西耽祿畏禍曾謂清明之世儀鳯滿朝可容有此耶昔神宗皇帝諭富弼曰君臣須是上下相照盡忠盡節不得有隱弼拜於御座之前曰盡忠無隱只臣一員亦無益於事須是兩府大臣以至在廷臣僚人人盡忠無隱出於衆力方能成天下之務弼之言非今日士大夫之藥石耶今民心方危而易揺士氣難伸而易沮雖有衆多之君子不無窺伺之小人境外之事非臣所得而知境内之事尚多未滿人意天下事變未易俄度萬一有出於聖君賢相智慮所不及者然後追咎賢者之不言而使小人得以藉口曰君子無益於人之國則國事愈不堪言矣此臣所以惓惓為世道慮而以正人心為扶世道之本惟陛下不以疎逺而忽之豈惟微臣之幸實天下之幸理宗在位斥逐權姦收召名德舉朝相慶太常寺丞姚希得以為外觀形狀似若清明之朝内察脉息有𩔖危亡之證乃上疏言堯舜三代之時無危亡之事而常喜危亡之言秦漢以来多危亡之事而常諱危亡之言夫危亡之事不可有而危亡之言不可亡後世人主乃履危如履坦諱言如諱病又言君子非不收召而意向猶未調一小人非不斥逐而根株猶未痛斷大權若操握而不能無旁蹊曲逕之疑大勢若更張而未見有長治久安之道廷臣之所諷諫封囊之所奏陳非不激切而陛下固不之罪亦不之行自古甘蹈危亡之機非獨闇主而明君亦有焉此臣之所甚懼朝廷者萬化所自出也實根於人君之一心夫何大明當天猶有可議者内小學之建人皆知陛下有意建儲也然嵗月逾邁未覩施行人心危疑無所係屬秦漢而下嗣不蚤定事出倉卒或宫闈出令或宦寺主謀或姦臣首議此皆足以危人之國也陛下何憚而不早定大計邸第之盛人皆知篤於親愛也然依馮者衆輕視王法請託之行㨗於影響揚干晉侯弟也亂行於曲梁而魏絳戮其僕晉侯始怒而終悔晉卒以覇平原君趙王弟也不出租稅而趙奢刑其用事者趙王賢而用之趙卒以彊皆足以興人之國也陛下何為而不少伸國法今女冠者流衆所指目近璫小臣時竊威福此皆陛下之心乍明乍晦之所致豈不謂之危乎國有善𩔖猶人有元氣善𩔖一敗一消元氣一病一衰善𩔖能幾豈堪數消消極則國隨之矣陛下明於知人公於用人固無權姦再用之意然道路之人往往竊議此元祐紹聖將分之機也禍根猶伏而未去不幾於安其危乎帝改容曰朕決不用史嵩之度宗時黄應龍上奏曰臣以民事至重略陳于前而切於當世急務非邊境乎廟謨神運草茅小臣何所容喙惟盛明之世採及負薪詩書所載可得而陳柔逺能邇其所謂能必非一事而厚德難任人實蠻夷率服之根本天保以上治内其所謂治固非一端而嘉賓使臣兄弟朋友皆采薇出車之階序蓋邇不能則逺未易柔内已治則外不難御臣竊惟今日之弊莫甚於風俗奢偽有以銷磨士大夫之壯氣理義晦蝕無以洗濯天下之貪習秦昭王臨朝而歎聞楚人鐵劍利而倡優拙鐵劔利則士勇倡優拙則謀逺吾恐楚之圖秦也是以憂之堂堂天朝何事不立區區戰國豈足為道況今除戎器以戒不虞命將帥而授方略樞機周宻孰得而窺然四方仰瞻自京師始所可覩者鐵劔果利乎市井等於兒嬉倡優果拙乎姣媚方且角出古者竒技淫巧有禁今非竒纎巧麗則不售也梵音法皷僧俗雜居環臂􅁫頭男女無别雕墻峻宇豪僭踰度髙冠侈袂貴賤莫分管子曰臺榭相望者上下相怨民無餘積者其禁必不止道有捐瘠者其守必不固管子而愚人也則可管子而少知治體可不寒心叔向言晉道殣相望而女富溢尤歎其以樂慆憂匃奴未滅何以家為霍去病能之而麄人恣金帳之飲酣壯士悲玉關之易老兒郎寒冷誰敢邀求蚤蝨塵衣日禦强敵修劔拄頥有生之樂尚未能親鼓疲卒安得殺愛妾以㗖將士提孤壘抗百萬之師者乎唐魏徵言若君臣之間動存形迹天下安危尚未可知蓋靣從後言帝朝深戒色仁行違聖門不取豈有隨聲是非徇情可否磨礲圭角刋落風稜習故為常若無足恠然恐軟熟之風積成委靡順適不已流入姦回西都銷愞實符命之濫觴前晉風流職亂華之梯禍可不懼乎臣所謂有以銷磨士大夫之壯氣者皆風俗奢偽使然也孟子言不信仁賢則國空虚今尊賢使能俊傑在位而國匱民貧自若又曰上有仁心仁聞而民不被其澤者不行先王之道也今發政施仁愛若赤子而民不被其澤者滋甚其故何也千里之生宅於太守百里之命寄於縣令陛下字民有訓戒貪有箴昭於日星嚴於雷霆近畿列郡選擇精明遐陬偏壘率多饕戾除命伊始神明在前條畫既頒墻壁虚語倚急符之煎迫痛帑庾之枵虚剜肉醫瘡尚云常賦椎肌剝髓動及亡辜貪未嘗不戒而貪夫多得志㢘未嘗不奬而㢘士或埋光得非羽玉飛金脫粟之名可釣飲氷食蘗即墨之毀難封蓋多貲者多助孤植者孤危大臣法小臣㢘國之肥也今朝廷卻貢羨府第絶苞苴而筐篚塞途賂遺絡繹關門既入如水沃焦郡將諸邑之表倡不足示儀則賄令愈肆誅求監司列城之耳目不能端矩則繆守何所忌憚上下交征㢘耻道喪民窮至骨誰實矜憐古學無傳文奸欺世為妻妾宫室貧乏所識失其本心處汙穢而不羞激怨讟以生變先臣李觀有言為貪為暴為寒為飢此而不為盜賊臣不知其所歸臣所謂無以洗濯天下之貪習者皆理義晦蝕之故也然臣聞聖人不能為時能不失時陛下春秋鼎盛德澤有加帥臣精神折衝智慮深逺羣公守理奉法品式具備天下延頸而望太平當乗此時奮發剛斷刷除蠧弊曠然明白洞逹之意軒豁隂幽揜覆之私罷不急之務省無名之費按行祖宗之令典民間疾苦田婦許以席殿而無避猳㹠之失細民得以撾鼓而上聞行衛文大帛之規儲縑將以易敵人之首厲越踐卧薪之志榻外豈容他人鼾睡以藝祖之勤徒步而幸作坊幸染院幸造船場掖庭宫女願歸者加厚賜遣以髙皇之儉棄内侍珠囊於汴水碎螺鈿椅桌於通衢館陶民訴括田不實決縣令流之海島吏部郎監納河陽夏稅收一斛五升之羨黜奪其官鬻鈔者棄市犯法則有劍一遵建隆之制使中外灼知上意四聦四目㒺不明達宫中府中俱為一體若是則法禁嚴而風俗厚黜陟明而吏治興可以富民而錯刑可以强兵而服逺裔矣惟陛下與大臣亟圖之宗社幸甚天下幸甚牟濚上奏曰臣待罪郎潜莫知補報誤䝉親擢俾侍經帷自惟學問空疎無以仰裨聖徳之萬一兹當陛對敢罄愚忠惟陛下垂聽臣聞傅說告髙宗曰非知之艱行之惟艱夫致知力行互相發明而知常在先則知固未易也而傅說獨以行為難何哉蓋髙宗舊學甘盤知道之君也傅說惟勉之以行其所知而已臣恭惟皇帝陛下睿哲由於天禀聖學得之心傳當臨政願治之初日以繼志述事為念所謂志者先皇帝有此心而未及行陛下因而行之此繼志也所謂事者先皇帝已見之施行而未及竟陛下終能行之此述事也復故王之官爵先帝素有此心也陛下體先志而行之而先帝不得已之本心昭白於天下矣去内司之積弊先帝之已施行也陛下述往事而行之而先帝去邪之盛德有光於青史矣信用君子先帝之心也其或厄於小人而去非先帝之志也容受直言先帝之心也其或觸忤姦邪而去非先帝之志也陛下首取公論之所與者特加召擢登之要路而天下知陛下有意於開言路矣白身出官特旨賜第先帝之異恩也謂宜何以上報知遇而乃贓汚狼籍不知自反常懐李振清流濁流之憤不由儒科徑踐二府先帝之殊渥也謂宜何以上答聖知而乃窟穴畿甸老不知退躬蹈聖人患得患失之戒陛下因公論所不與而屏去之而天下知陛下有意於重名器矣絶貢獻以塞僥倖之門尚先帝却長沙羨金之遺意也灑宸翰以明正邪之辨尚先帝親君子逺小人之遺訓也先帝所欲行陛下善繼而行之先帝所已行陛下善述而行之先帝之心惟陛下知之而陛下之心天下亦既知之矣臣猶謂知之而不行猶不知也行之而不力猶不行也自昔君子小人勢不兩立舜用十六相先去四凶明四凶不去則十六相不能悉心以輔治臣願陛下充所知而行之知其為君子則愛之惜之有言焉則用之毋使小人得以乘其間知其為小人則去之逺之自其根萌而絶之毋使君子或至受其禍坤之初六曰履霜堅氷至霜隂之微也氷隂之著也履霜而知其必至於堅氷猶小人不可使長而至於盛當自其微而謹之也古今治亂率由乎此今陽明用事而隂濁無所施其巧衆正彚升而羣小無所容其奸以清明之朝廷行快活之條貫固世道之幸而蒼生之幸然而君子得志小人不願也紹述之說行則元祐變而紹聖矣愛莫助之之圖進則建中靖國轉而崇寧矣是非國家之福也今雖萬萬無是必也聖心清明終始如一嘿察隂陽消長之機而辨之於早焉庶幾無堅氷之慮矣抑臣又有聞憂治世危明主君子所以異於小人也古人日以水旱盜賊奏尚唐虞相與儆戒之意若後世所謂天下已太平則狃於宴安不為逺慮誤人國家必此言也此君子小人之分也昔唐憲宗留心庻政謂李絳等曰凡好事口說則易躬行則難卿等既為朕言之亦須行之勿空陳而已絳奏曰陛下今日處分可謂至言然臣絳亦以為天下之人從陛下所行不從陛下所言願陛下每言之則必行之絳之言尚傅說知行之意也惟陛下留神濚又進故事曰易曰君子以思患而豫防之書曰逺乃猷詩云猷之未逺是用大諫昔聖人之教民也使之方暑則備寒方寒則備暑七月之詩是也今夫市井稗販之人猶知旱則資舟水則資車夏則儲裘褐冬則儲絺綌彼偷安茍生之徒朝醉飽暮饑寒者雖與之俱為編户貧富必不侔矣況為天下國家者豈可不制治於未亂保邦於未危乎詩云迨天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮予孔子曰為此詩者其知道乎能治其國家誰敢侮之迨天之未隂雨者國家閒暇無灾害之時也徹彼桑土者求賢於隠微也綢繆牖户者脩敕其政治也夫桑土者鴟鴞所以固其室也賢雋者明主所以固其國也國既固矣雖有侮之者庸何傷哉臣聞及閒暇明政刑有國之逺慮憂治世危明主臣子之至情方天下以為無事之時而不復思久安長治之策此賈誼所以長太息於漢文之世也昔司馬光上仁宗皇帝五規其三曰逺謀似謂當時有位者狃於升平不為逺慮至論公卿大夫或養交飾譽以待遷或容身免過以待去自非憂公忘私之人大抵多懐茍且之計莫肯為十年之規況萬世之慮乎夫仁宗之時太平極治之時也主聖臣賢相與講明治道未必有闕政而光言如此以今視昔為何如時可不深長思耶先皇帝臨御日久留意人物然而以名取人而名未必副其實也以才用人而才未必真有用也天下大富貴誰實享之而去而國家大患難則相視束手至歸過於君父而諉其責於他人先皇帝晚年閲天下義理至熟更天下事變既多深入聖慮取得罪公論者斥逺之小有才而未聞大道者屏退之敷求碩賢以遺陛下於衆人思慮所不及者獨加意焉舉天下大器付陛下貽謀可謂逺矣陛下聖明天縱學問日新堯言初布天下鼓舞真不負先皇付託而大臣可謂不負先皇簡拔矣今天下雖暫安而以為治安則未也濟濟多士文王以寧而士猶未至於多也事㑹之來無窮而人才亦與之無窮臣願陛下與大臣精思而熟慮之取才不嫌乎廣在精擇而用之耳求言不妨乎博在審聴而行之耳将帥當選牧守當擇士卒當練民生當厚庶㡬制治于未亂保邦於未危為國家立無窮之業而君臣之間亦有無窮之聞此先皇帝所望於陛下與今日之大臣也光前朝元老國之蓍龜所言真有益於治道臣敢以其所以告仁宗皇帝者推廣之以告陛下非但曰應故事而已惟陛下垂聴幼主時祕書郎徐宗仁奏乞察欣瘁休戚之故酌利害損益之宜孰為當因孰為當革孰為可罷孰為可行則折衷泉貨而逺近便開通關梁而商賈行下修身奉法之詔而吏得自新出輸倉助貸之令而民免貴糴窒墨敕之門而無官府黜陟之異止輪臺之議而無疆界彼此之分則氣脉蘇醒意向翕合矣歴代名臣奏議卷六十四
