body:
  text: 歴代名臣奏議卷二百四十六明楊士竒等撰荒政宋徽宗宣和中監察御史許景衡論賑濟差官䟽曰臣伏覩常平令諸灾傷縁賑濟事應差官而州縣闕者聽監司於隣近選差不足則選轄下得替待闕官逐州不得過兩員竊聞淮南東路去歳灾傷應賑濟處其常平司不問州縣官闕與不闕亦不次第選於隣近而槩差得替待闕官逐州兩員夫子惠困窮在有司至誠惻怛為陛下施實德于民今於賑濟萬分未有一而差官先已徇私失陛下良法本㫖矣其所差人自謂監司属官端坐而役州縣無事而費廩禄増置吏卒搔擾行市灾傷之餘尤不堪也臣愚欲望特降睿㫖其淮南東路賑濟所差官並行罷遣如賑濟未畢尚合差官一遵故令施行然臣所聞者淮東一路爾竊恐他路亦然伏望聖慈特賜戒勅其已差官不應法者亦乞並罷髙宗建炎中尚書右丞許景衡乞和糴米劄子曰臣竊見今秋大稔所在米粒狼戾糴價㢘平兹實天相陛下再造區夏以安下民以成中興之業獨未聞朝廷措置廣糴以應天意此有司之過也夫豐歳不可為常幸而一遇而不知實倉廪以為凶荒之備亦可謂失計矣況今逺方不庭盜賊紛作軍興所須尤以糧餉為急欲望聖慈特降指揮所在速行措置和糴使有儲蓄則不難於戰守也紹興七年試中書舎人李彌遜乞寬恤劄子曰臣照對紹興五年七月指揮因江西運判逢汝霖等申請昨因金人殘破羣盜燒刼歸業人户已經放免税賦及五年十料之外並令輸納全税契勘除歸業已經開墾人户自合輸納外其間有累經殘破被害至重未曽開墾去處委是難以出備官吏百姓上下重困人情不安伏覩近降指揮已将夏税合納紬絹今年且依舊數送納自來年令提刑司覈實己未開墾數催理切慮秋税合納全税指揮亦合依此改正施行庶使四方之民霑被實惠髙宗時翰林學士葉夢得奏乞復置常平使者播告中外劄子曰契勘常平之法起自西漢本以惠民祖宗行之已乆熈寧初縁例推廣附以青苖免役市易抵當坊場河渡農田水利等事其意亦在寛恤民力只縁創法之始急於功利委任非人觀望掊克遂致議論不一紹聖初再行修定已稍増損但拘守紹述之説必於盡行故如青苖斂散追呼搔擾市易物貨苛細争奪農田水利之官誕謾欺罔之𩔖明知其弊不能革去所以民至於今以為病其後應奉花石取以資不急之用遂失創法本意僅有存者又縁軍興調發諸司或許借貸於是移易侵漁掃地殆盡建炎霈恩首罷青苗法盖得之矣然未幾併罷常平使者以他司兼領吏無專責漫無統紀舊法雖存不能修舉臣實惜之今朝廷復置常平使者命官討論竊詳聖意非是再欲盡行熈寧本法及别有創立正為法本惠民於此艱難民力困弊之後務欲寛繇役省科斂通有無濟乏絶使得博採羣議與時變通擺去拘礙之議應干害民之事盡行刪除存其經乆利便者使有司專一持守以遺將來實為美意尚慮中外不能究知妄有測度或謂欲根刷已放債欠或謂欲營求非理羨餘為足國之計動揺民聽不無疑礙欲乞明降詔㫖先次播告使上下通知然後於實歴州縣人内慎選通曉世務習知民事篤厚忠信之人以充使者使之奉行官修政舉則上可以廣惠民之實下可以明革弊之意夣得為兩浙西路安撫使奏乞免嚴州遂安等三縣二税和買状曰臣契勘本路見討嚴州兇賊倪從慶賊發係在遂安縣與淳安縣相去不逺其次夀昌縣昨自去年十二月内賊初發本路弓兵兩經起發勤王之後所在揀殘人數多不堪用偶臣自到任即行下所部州縣應係内外居民並團結為伍專一幾察捍禦盜賊倉猝之際遂盡起三縣與賊隣近地分團結之人分布要害出入之路招募土豪部領寅夜守把逺近相援内外限絶因此遁伏巢穴不敢衝突州縣在外四傍姦民亦不敢趨附獲免猖獗防維至今皆三縣保甲之力自去年冬末至今年春初屢經大雪甚扵常年正月半後即隂雨連併兩月之間晴霽不過數日人衆暴露晝夜不得休息備見勤苦今來縁為隂雨未晴進兵猶緩已係耕田養蠶之時兼嚴州産茶浩大居民例以採摘為衣食今亦是時皆失常業雖旦夕賊滅養蠶採茶二事已不能及耕種下秧亦不無妨廢況此兩月餘日守禦之勤臣愚􅀼謂陛下涵養生民天覆地載不欲一物失所今必不忍以此小醜重勞良民反使終嵗衣食所仰過時失業無所優恤欲望聖慈特降睿㫖下本路轉運司取㑹三縣與賊隣近地分把隘保甲人户賊平之後並令特與蠲免今年夏秋二税及和買庶幾深山窮谷之間無知細民皆識陛下勤恤其隠不忘幽逺之意異時或有嘯聚竊發無不竭力自奮可以暗消姦萌懐保善良干冒宸嚴臣無任惶懼激切屏營之至已於二月十六日具録奏聞去訖竊慮道路艱阻或有遺墜夣得為江南東路安撫大使奏乞江北無遏糴劄子曰臣竊見近因人言東州艱食二浙商賈轉販入京東諸州收息數倍又京東桑柘不熟收縑者多皆欲往乞行禁止奉聖㫖依奏告捕獲人支賞錢三千貫白身與補承信郎有官人取㫖推恩犯人並依軍法如廵捕官失覺察令帥臣監司覺察施行契勘京東州軍雖見屬偽境然本吾民也朝廷方議收復必将與天下為一家不可自為爾疆彼界及因其艱食與桑柘不熟遂欲從而困之坐視其飢寒而不救是棄之矣今從偽之人日夜不忘本朝來歸者相繼而我反棄之無乃重失其心乎昔魯飢臧孫辰告糴于齊宋饑諸侯歸宋粟春秋皆以為美而齊小白葵丘之㑹猶曰無遏糴若秦饑而晋閉之糴則君子以為罪矣又況京東聞去嵗種麥自廣未必皆艱食而二浙産絹不多縱令興販亦復幾何未必真能困彼而我亦未見其利徒示不廣扵四方非特有傷王政大體恐敵人或得為辭以激怒吾民則所害為不細矣其餘官吏乗間捕捉阻絶商旅搔擾姦弊利之所在人難遽止重以軍法刑辟滋多此等猶不暇論伏望聖慈更賜詳酌施行夣得又奏乞措置江浙夏旱狀曰臣伏聞江浙夏旱陛下勤恤民隠憂形於色禱祈百神精意備盡至於釋囚禁罷工役廣賑糶止屠宰茍可以得雨者無不至近者臨安雖應而州郡未霑足處尚多大軍之後必有凶年此物理之常惟人事應之者當則饑殍之困流亡之患盜賊之變三者可以預消周官荒政十有二先王成訓具在臣忝帥一道本路饒信等州皆是闕雨地分將來不免須有災傷於法本司合行體量被災輕重措置闗監司施行􅀼攷自古救災之術無他惟慮之於早行之以實二言而已祖宗設法累世講明纎悉皆具雖欲别為措置豈能更加毫末若官吏深憫民病通曉法意先事預備緩急各當其節上下協心不為文具則匹夫匹婦孰有不被其澤今八月将終披訴限滿九月初即當檢放若待諸州申到分數察見輕重然後為之處畫則已晩矣謹參照前後條令所當申嚴與自來州縣沿習舊弊所宜約束者敢昧死條上十事其一曰檢放以實無使抑塞契勘民户披訴災傷陸田以七月終水田以八月終自來多是州郡滅裂不預先採訪漫不知省受訴之後不即差官或不親至地頭容受弊倖虚實相亂或不敢放過分數抑令改易元訴謂之伏熟力農之家先已被困則賑濟百色何由舉行欲乞應災傷路分並委漕臣分行所部閱實覆視具放過分數保明聞奏其應合施行事件即日一併盡行檢舉無令州縣次第申請往來待報有失行後時之弊其二曰預計蓄積無使失備契勘賑濟皆用常平及義倉米自來州縣多不預計兩色實有數目量度災傷輕重户口多寡日用逺近為之措畫災重榖少處往往糶給已盡拱手坐視不敢申陳欲乞下經制常平官候放税分數已定即行審度某州有米若干約度可以出糶若干俵散饑貧及闕食户若干不足而合那移他州者若干又不足而合兊糴封樁上供者若干均攤直至來年當止月分如均攤不及或給官告度牒募民收糴兼用無使隠而不言中輙止絶或臨時申請惠不及民其三曰審度給貸依七分法契勘一縣放税不及七分或失扵披訴者第四等以下闕食户法當依七分法其放税七分以上者賑給通第三等自來放税皆是以槩縣分數比折通計雖有上條多不施用今以一縣論之地勢未有髙下一等大水非例及髙鄉大旱非例及低鄉放税不能均一只如今年歳旱甲鄉髙而十分旱乙鄉低而僅及一二分若将通計比折方及五六分不合賑濟則是甲鄉災重乃因乙鄉災輕而不䝉惠豈法意哉欲乞下經制常平官應放税下及七分而逐鄉逐户有及七分闕食者並依法與賑濟其不及七分或七分以上亦合以上條行之其四曰那容義倉許暫通用契勘法稱賑濟者謂減價出糶借貸種糧勸誘人户糶米之𩔖出於常平而濟其不足也稱賑給者謂闕食貧乏不能自存出於義倉而捐以與之也賑濟用常平等米許那移則有法矣而義倉本非朝廷之物止用賑給盖以豐年民食有餘恐其輕費官為斂藏待其不足還以給之所以甲縣之米不通於乙縣然而水旱代有若大旱之歳髙鄉皆被災支用已竭而低鄉無災積藏尚多豈可坐視髙鄉饑死而不救乎欲乞通一路皆許權宜兊借支用或更寛剰而常平米賑濟闕亦許通用候豐年皆使依數償之其五曰存恤民户無使流移契勘兵火之餘所在殺戮逃避十室九空日近方稍復業識認舊産墾闢荒廢未及成家若復以闕食轉徙何縁更得生齒繁息若或聚為盜賊則為患又不止此欲望嚴戒州縣應災傷地分鄉村闕食户盡行抄劄無致遺漏多方措置但使蠲放以實無輸納之苦展閣以法無催科之擾給貸以時無乏絶之患役使以理無勞困之懼人之常情孰不重遷既有生路自然眷戀鄉土其六曰收輯流亡無使遣逐契勘饑民不能保其不盡遷徙州郡憚於接濟多使地分遣逐至失塗殍死欲乞預戒州縣應他州流移人户到來者皆即納之各令散處無使聚而為一多設官吏使分任其事如或不足不得已權許取之寄居待闕官始為之糜粥終給之見糧柴薪不足則或為之官給室廬不備則或借之寺觀疾病則為之醫藥死喪則為之埋殯遺棄小兒則給以公據使得收養稍能自存則給之劵契使各返其鄉里繫官山林川澤之利權許樵採漁捕自營其生有人承佃者蠲其租仍委長吏躬親施行監司以時檢察其七曰出糶賑給無容姦弊契勘出糶常平米本減價以平糴州縣多是觀望常平司不肯以時登降或不敢過數雖號開場但應故事或長吏不自省察估價雖比市色稍減多為公吏有力之家詭名冒糴又因循請託假之厯頭以為私惠實及闕食户無幾欲乞下經制常平官估價隨時依市色髙下量減常切覺察偽冒重立賞典如有違犯皆計以贓其賑給饑民仍使量人數多寡廣為場分無使争奪踐踏至死俵散以時無使早晚無節坐以待斃其八曰勸誘出糶專以鄉村契勘有米多是力農之家闕食多是㳺手之人承平之時物價均一忽遇荒歉唯米獨貴受害者衆農夫乗此邀索厚利不得不使之有餘補不足自軍興以來百貨皆増不獨米一色㳺手之人雖無所仰食然隨其所業自取倍價雖食貴米未有甚害其當廣糶者惟第三等以下鄉村有田無收闕食者而已自來州縣多是不曉法意凡有勸誘先散遣官吏鄉村抄劄搜檢告訐或受求囑取與不均仍使般輦入州郭出糶反困農民販糶以食㳺手近者販賣米斛已許蠲免力勝商賈通行城郭不患無食其勸誘出糶欲乞止令於鄉村散出文榜召其情願無籍其所有無限以定數無抑以低價城郭有米之家准此人知乗時得利自不肯徒為藏閉糶者既廣穀價亦不約自平矣其九曰蠲展欠負隨宜受納契勘放税七分以上應所催科自有展閣條令被盜遷移復業之人其合起催苖税等亦有前後指揮及赦文而州縣多不切奉行依舊舉催或未應出賦税而抑使出賦税或迯移當除豁而不與除豁其餘更有兵火以來别色窠名根刷在官舉催不一只如本路建康府則有追理户部回易四庫經紀斡運人欠負二十餘萬貫廣德軍則有户部剗刷誤用朝㫖除豁積年上供紬絹綿并錢三十萬貫匹之𩔖若不令特蠲暫展安能常賦之外更可出辦應受納秋苗監專苟逃後患例失太詳篩颺揀簸無所不至仍更多搭耗剰横輸糜費今秋賦所納不過為官吏廪禄與軍儲而已古者凶年雖天子猶減膳不舉大夫不食粱豈可下此而反求精欲乞申嚴應合展閣及催科等事盡令舉行或申明仍戒苖米但非溼惡偽濫皆令隨宜受納支遣其十曰便宜減降無淹刑禁契勘自來災傷放税七分以上饑民犯法至死謂如攘取餅餌之𩔖或因拒捍傷犯變主遂為彊盜坐死等守臣皆得宻奏預降指揮許便宜降等決遣不下有司藏之以時施用所以原情重惜人命近歳小郡守臣多不敢擅請皆俟獄具却於案後開説所犯地分放稅分數雖蒙朝廷原貸不無淹繫兼或因乏食營求生路因縁闘毆至死情有可憫近降指揮復須經提刑司詳覆然後敢奏亦恐有司觀望不敢開陳欲乞應轉運司奏到災傷七分地分合降便宜不候申請朝廷徑以故事宻切行下逐州其他犯有因災歉情理可憫者權令徑具聞奏凡此十事皆祖宗惻怛愛民之實累世保固邦本之具故民政所𨽻監司所主各不同惟災傷皆使通管檢放展閲則責之轉運司糶給借貸則責之安撫鈐轄司然百餘年間每災歉孰不奉行而惟慶歴中富弼在鄆州熈寧中趙抃在越州獨為稱首全活皆數十萬人至今天下以為口實好事者或取其行者載之為書以為後法則知能舉其職不失所委不可多得故臣不敢别申管見區區之愚惟欲官吏奉承德意人人盡心而況兵革始休瘡痍未瘳陛下愛育元元之意如養赤子豈容輙有怠惰不䖍今來雖已逐項檢舉行下所部欲望聖慈少賜省覽如有可採伏乞特降詔㫖告戒諸司凡上所陳各嚴職守夙夜盡力御史察其不如令者候來年事畢較其勤惰為之賞罰以示勸沮臣坐食無補仰愧廪禄妄因所職上瀆天聽無任惶懼激切屏營之至工部尚書廖剛轉對乞禁遏糴奏状曰臣聞昔晉饑使乞糴于秦秦伯以問諸臣百里奚曰天災流行國家代有救災恤鄰道也鄭之子豹在秦有怨扵晉請伐之秦伯曰其君是惡其民何罪扵是乎輸晉之粟故後世莫不以秦伯為有徳於晉而以晉之閉糴為負義夫秦晉敵國也猶貴於通有無以拯其民孰謂一化之内乃欲分彼此耶昨歳旱傷所在髙田多不收今舊榖将沒民且艱食竊慮州縣官吏各私其民胡越相視而不相恤則老弱有溝壑之患而壯者聚為盜賊在朝夕矣欲望聖慈申飭諸路監司使之撿察所部官吏毋得遏糴富民毋得閉廪須價庶幾通融相賙急而國無饑民誠一時之急務也剛又乞預備賑濟劄子曰臣聞金穰水毀木饑火旱此天數也雖堯湯之世有所不免先王惟修人事以備天時是以有荒政存焉不待事至而後圖也比日雨澤愆期聖心焦勞凡可以格天者無所不致其至近闗輔率多得雨旱勢亦不甚廣秋成固有望矣然惟事事乃有其備有備無患臣謂今當為來歳之備者有二事早降米價錢於豐熟州軍及時和糴禁約所在官吏不得遏糴此則賑救之急務也若糴本降遲榖米先為塌家收聚雖欲増價取之民間已無米矣若遏糴無禁則所在各私其人楚越相視而不相救惟聽其有無相通自當不至於闕食不過逺致者價稍髙耳如此則雖有歉歳而無饑民是則先王之政也陛下若不以臣計為迂欲乞睿㫖早賜施行劉行簡轉對奏状曰臣􅀼惟義倉之法論始於隋増廣於唐國朝因焉其意若曰古者三年耕必有一年之蓄九年耕必有三年之蓄國無三年之蓄則國非其國矣當其豐登粒米狼戾俾輸其餘以備凶荒未為過舉不幸有金穰水毀木饑火旱之變則用其私蓄固足以賑之社倉是也隋開皇間長孫平請令諸州百姓勸課同社共立義倉收穫之日各出粟麥藏焉社司執帳檢校多少歳或不登則發以賑之然立法有未備也至唐貞觀間戴胄請自王公以下爰及衆庶計所墾田稼穡畆頃每至秋熟以理勸課盡令出粟各於所在為立義倉國朝乾德間天子哀歳之不登而倉吏不以時出與民於是著發粟之制使不待詔令其後病吏之煩擾而民罹轉輸之困又罷之至神宗皇帝始復舊制民到於今賴焉然而推行之意有未盡合於古者豈得不論且所謂義倉者取粟扵民還以賑之固不可以不均今也置倉入粟止在州郡歳饑散給而山澤僻逺之民往往不霑其利其力能赴州就食者盖亦鮮少而況所得不足償勞流離顛沛有不可勝言者此豈社倉之本意哉恭惟陛下天慈廣覆一視同仁凡政事繫赤子之利害者見於詔令丁寧熟復靡有不至而奉法之吏因習故常憚於改為使上之德澤不克下究臣竊惜之臣愚以謂義倉之粟當於本縣鄉村多置倉窖自始入粟以及散給悉在其間大縣七八處小縣三四處逺近分布俾適厥中若未有倉窖則寄寺觀或大姓之家縣令總其凡以時檢校遇饑饉時丞簿尉等分行鄉村計口給歴次第支散旬一周之庶幾僻逺之民均受其賜不復棄家流轉道路此利害之較然者也伏望聖慈下臣議更賜詳酌儻以為可斷而行之不勝厚幸知福州張守乞放兩浙米舡劄子曰臣伏見本路盜賊兵火之後福泉漳州興化軍雖不經殘破皆以應副軍期公私匱乏復遭今嵗亢旱細民艱食目今正是收成之時米價宜減福州在市每斗已一千省比之夏秋増及三百詢之父老舊來所無縁興化軍而下並來船販不敢遏糴自為一郡之計􅀼慮向去春間青黄不接之際米價必更騰踊饑民或致流移又本路常平斛斗不多賑濟不足雖有降到廣東米應副賑濟並未起發到來臣日夜憂慮雖已節次從帥司行下建劒汀邵等州軍令不得閉糴及約束沿路闗津税務不得邀阻終以所産不多少有客販前來臣體問得福建路山田瘠薄自來全仰兩浙廣東客米接濟食用雖大豐稔而兩路客米不至亦是闕食臣伏覩八月十一日指揮因言臣寮上言福建路利害第三項應本路客販米斛不得收税事奉聖㫖候二浙收糴足備日聽候朝廷指揮臣訪聞兩浙豐稔倍扵常年竊慮收糴至今已見次第欲望聖慈矜念逺方師旅之後饑饉困乏早降睿㫖許令客旅通販浙米入福建路所有米船各於起發州縣出給公憑經過州縣並免收税庶得接濟艱食之民仰稱陛下綏惠多方之意臣不勝大願提舉江東路常平茶鹽洪适奏旱災劄子曰臣仰惟陛下焦勞圖治勤恤黎元講求民瘼不啻饑渴一聞休戚即日罷行患在士大夫畏縮自愛不肯道其實故下情欝而不達聖澤壅而不流古之人雖在畎畆而有封章之獻至或嬰逆鱗而不顧此風乆不聞矣臣不材無取嘗玷宰路非蒭蕘庶人之比也居閒故里目之所覩耳之所接不忍斯民日趨無告流亡捐瘠莫之拯捄若私有遐心茹而不吐尚饕祠宫之禄以自活其妻孥是曽狗馬之不若也故不避譏議不憚譴訶矯首九閽披寫愚戅伏望陛下少垂意焉臣比讀邸報伏見陛下以江西湖南旱暵側身禱祈屏徹葷味又令帥臣監司汰擇守令徳至渥也臣謂江東兩郡之旱亦江西湖南之旱也陛下必不慮逺而忘近恤彼而緩此特未逹于天庭爾及覩七月下旬施行洪潭兩路賑卹指揮猶未及乎江東兩郡豈有司奏牘或未詳盡不能感動天聽耶臣於是不謀於人而謀於心不慮其身而慮其災輙敢犯分言之臣之鄉邦自去夏五月至於今春曽無終日好雨故陂塘所瀦之水甚鮮並水之田僅能車畎播種至於髙仰之田種不入土者四竟之内居三之二自春接夏或累日或盈旬間得小雨尚或不能破塊地龜拆早稻焦枯其瀕水低田有歳收千石米者今有百石之榖若是者盖無幾也通六邑之中百分不穫一二自夏接秋惟六月甲子得數刻之雨既不瀐潤亦不周徧節過白露驕陽轉甚晩稻又復槁矣常歳八月民種蕎麥可充一兩月粮異時饑饉得蘿蔔雜菜和米作糜亦可度日皆以乆乾土硬而不可種自此不雨則來年麰麥將未可望小民艱食或有攜妻子赴井同死者或有聚衆强糴而相殺傷者或有逢縣尉而持刃拒抗致憲司傳以為賊而出兵掩捕者前月提舉官史俣入饒州界親見流民襁負係道俣恨無以留之今去者紛紛至於卒歳将十室九空何以為邦自來水旱未嘗早晚絶粒所闕廪食不過開歳數月饒州去秋已小歉今年早禾不穫自季夏而食闕若秋冬之交有雨澤有人力可以藝麥逆數或熟尚有七八月期士民上户鮮有隔年之儲猶無以自贍其家故耕夫轉徙所不遑恤率是交還牛犁泣辭而後去所留牛犢無水可飲無稈可積不保其存也田家營榖作種尚且艱難若人牛又闕則向去春耕益為可慮盖今歳之旱起于饒州若池之建德東流與饒境相接者亦薄旱饒之德興浮梁安仁數村與徽信相接者則㣲有所收江東之旱惟饒與南康兩郡出境則江洪以往亦旱也父老七十嵗者云自歴年以來所未嘗見今州縣若不免租則有田者無以輸納若放苗不收則州縣何以給遣􅀼聞饒州有前年樁留米三萬石已借充官兵月粮所餘止有萬石朝廷捐以與之不過可支一月見在常平義倉二萬餘石併得去年儲粟賑贍尚不能足盖六邑窮民有藉於官者二十萬户且約一家三口家得石粟僅能飽其一月之腹爾儻官無餘粟野有餓殍歸之天災無可柰何可也不得已有秩者暫閣奉稍亦可也饑餓之民散而之四方不至聚而掠奪為盜幸也數千營卒一月無粮其肯俛首餒死乎臣區區過計非私於鄉邦而然也恐它日重貽旰食之憂故且述凶歉之實以聞不敢妄及臆説伏望聖慈察其心而信其言捄其災而弭其患臣不勝戰汗待罪之至李光進姚崇言按察使故事論卹民狀曰臣􅀼謂方今之患莫甚於州縣之吏盖公㢘之士多不見容而贓貪者或得幸免百姓受弊有不可勝言者廟堂之上欲盡擇刺史縣令誠如姚崇之言而遣使按察尚未必能盡稱其職而觀望迎合雷同欺罔者必衆故堂上逺於百里堂下逺於千里門庭逺於萬里盖言壅隔之祻深也慶歴間歳適旱蝗右司諫范仲淹因間見仁宗曰宫掖半日不食當有病者今數路艱食安可不遣使者勞來安養之於是命仲淹為江淮體究安撫所至除淫祠賑乏絶民有食烏昧草者擷之以進臣伏聞江西湖南因去秋旱荒民多流丐伏望聖慈哀憫兩路生靈選擇臺諫公忠諒直之臣通民情曉吏治者以安撫為名舉行近降詔書察郡縣貪苛之吏以賑救之庶幾陛下徳意志慮孚於四方而失業之民受其實惠不勝幸甚孝宗乾道間兵部侍郎胡銓上䟽曰臣聞春秋傳曰救災卹鄰道也行道有福又曰是宜為君有卹民之心陛下勤卹民隠若保赤子近縁江浙水旱詔令為濟饑而下者十常七八監司郡守為濟饑而行者踵相躡也比詔州縣修築圩田又遣使覈實誠懼官吏徒為虚文而實惠不下究陛下卹民之心可謂至矣盡矣不可以有加矣而臣猶欲極竭毣毣之慮以為陛下獻者誠欲效涓埃扵崇深可笑不自量也謹案國朝故事濟饑之説有三糶常平米一也截撥本路上供及寛減本路上供斛㪷二也給賜度牒三也元祐五年浙西災傷自正月開倉糶常平米臨安倚郭兩縣日糶千石外七縣大縣日糶百石小縣日糶五十石計日糶五百餘石自二月至六月終民無流殍此濟饑之一術也是年十一月中首發徳音截撥本路上供二十萬石賑濟又扵十二月寛減漕司四年上供額斛三分之一為米五十餘萬斛命下之日所至懽呼此又濟饑之一術也蘇軾知杭州日乞給降度牒二百道召募蘇湖常秀人户扵本州闕米縣分入中斛㪷以優價入中減價出賣又元祐五年賜浙西度牒三百道以助賑濟而一路帖然此又濟饑之一術也是三者皆今日之急務然常平之米已不多而截撥寛減之説恐難卒行惟給降空名度牒惠而不費臣愚欲望聖慈特賜給降付逐路轉運提刑安撫司分擘與災傷州軍仍須叅州郡大小户口衆寡及災傷分數品配合得道數依公分擘庶幾實惠及民老弱轉于溝壑者無不被堯舜之澤矣臣復契勘熈寧中兩浙饑饉是時米㪷二百人死大半父老至今言之酸鼻今來行在米㪷已及數百日長駸駸深可憂慮臣愚受知之深且乆素餐無補若不盡言臣之罪大矣銓又上䟽曰臣准御史臺牒契勘今年十月一日視朝月分依條轉對檢准續降指揮合前一日赴閤門投進文書臣仰惟聖學髙妙睿智淵㣲夐出千古猶海嶽崇深而欲以涓埃益之多見其不知量也然臣猶諄諄不已者事陛下首尾九年竊知陛下海嶽之量不拒㳙埃之㣲也是敢極竭毣毣之慮仰瀆天聰惟聖神少加採納臣聞周易既濟之象曰君子以思患而豫防之􅄯錯亦云堯湯不免水旱然民無捐瘠者備先具也盖防患救荒尤不可不豫備謹案本朝㑹要太宗嘗語宰臣國家儲蓄最是急務盖以備凶年救人命昨者江南數州㣲有災旱朕聞之急遣使往彼分路賑貸果聞不至流亡然則太宗皇帝誠得豫備之深意熈寧間浙西災傷而沈起張靚不先事奏聞朝廷是不遵太宗之制也元祐間浙西災傷而蘇軾先事奏乞處置是能遵太宗之制也竊原熈寧旱荒之初縣官立賞閉糴豪户争相儲粟饑民囏食方截浙西上供米一百二十三萬石散糜給米家至户到終不能活垂死之民道殣者至五十餘萬人此不遵太宗豫備之制故雖耗費倉實而無惠民之實元祐災傷之初猶熈寧也四年之冬首發詔書撥浙西上供斛斗二十萬石賑濟又減本路漕計五十餘萬斛盡用糴本錢買上供銀絹官既住糴榖直頓減遂無一人轉溝壑者此盖能遵太宗豫備之制故雖不耗費倉實而惠民之實廣矣恭惟皇帝陛下作民父母愛之如子知民疾苦視之如傷豈惜耗費而不恤民哉而臣戇愚淺見惟知民命為重耗費為輕正猶豪民殖産愛惜耕户本圖牟利非曰愛農然而一有饑荒必須蠲逋已責假貸種贍惟恐耕户逃亡所費小而所失大也今嵗諸路或旱或水方秋成之際米已翔貴日甚一日來春囏食灼然可知儻不先事而圖則乙酉流離之患臣恐不免臣昨在田野竊聞乙酉之歳北闗門外民户流移疾疫五萬餘人以一門外計之則諸門可見是時四方客旅斗米博一婦女半斗易一小兒左右前後之人不以實告致仁聖之澤不被於死徙之民非陛下不卹民也此亦當時謀國者不能先事而圖之過也伏望聖慈行下諸路帥漕提刑提舉守令及總領司都大發運司疾速相度準備來年賑濟米斛以遵太宗豫備之制以元祐五年為準不至如熈寧後時之患則生靈受實惠莫不被堯舜之澤矣切縁今來已入冬孟去來年青黄不交之際無幾比及相度往復取㫖深恐無及於事伏乞睿斷速賜指揮臣屢蒙奬諭謂臣直諒遂敢冒貢悃愊上瀆天威臣無任戰栗待罪之至貼黄臣伏見陛下復置都大發運司本以裕民而愚民無知百端扇惑或謂發運司録奪客旅販糶舟船或謂賤價和糴是致所在豪民毁船藏榖不肯販糶甚乖行旅願出扵塗之義伏望聖慈特詔發運司多出文榜曉諭民間明言本司即不曽賤價和糴亦不曽録奪舟船庶幾客旅流通米價自賤如此則斯民無不被仁聖之澤天下幸甚孝宗時知南康軍朱熹上奏曰臣輙有愚見上瀆聖聦臣竊見本軍去年大旱田畆不收幸䝉聖恩減放秋苗倚閣夏税而又申詔有司發廪勸分前後丁寧勤勤懇懇凡所以加惠扵無告之窮民者至深至厚以故今歳開春以來及今已是七十餘日而閭里細民幸不至於大段闕食又幸目今雨澤以時原野漸潤竊料不過四五十日則二麥可收又四五十日則早稻相繼決不至扵復有流離捐瘠之祻以勤陛下宵旰之憂矣然臣竊以為捄荒之政蠲除賑貸固當汲汲扵其始而撫存休養尤在謹之扵其終譬如傷寒大病之人方其病時湯劑砭灸固不可以少緩而其既愈之後飲食起居之間所以將䕶節宣小失其宜則勞復之證百死一生尤不可以不深畏也今者饑餓之民雖得䝉被聖恩以幸免扵死亡然亦𩔖皆鳩形鵠面薾然無異扵大病之新起若有司加意撫綏寛其財力則一二年間筋骸氣血庶幾可復其舊若遂以為既愈而不復致其調攝之功但見其尚能耕墾田疇撐拄門户而遽欲責以累年之逋負與夫去嵗倚閣之官物則是人者其必無全理矣竊聞乾道七年之旱夏税秋苗亦皆嘗䝉聖恩矣而流殍甚衆迄今不復者正以次年帶納前料稅物者迫之也然考其實所謂帶納者初未嘗大段有人納到以佐有司用度之闕而姦胥猾吏得以並縁搔擾則其害有不可勝言者其後淳熈元年九月四日乃以洊饑始䝉蠲放則三年之間所失已多而無及扵事矣今舊逋未除新稅将起斯人懔懔已有狼顧之憂臣愚欲望陛下赦臣之罪察臣之言亟詔有司凡去年被災之郡盡今年毋得催理積年舊欠及將去年倚閣夏税悉與蠲放其上二等人户當此凶年細民所從仰食其間亦有出粟減價賑糶而不及賞格者欲望聖慈普加恩施許將去年殘欠夏税多作料數逐年帶納則覆載之間幅貟之内當此災旱之餘無有一夫一婦不被堯舜之澤矣臣愚賤踈逺不當妄有陳奏實以誤膺委寄職在牧民竊扵詔令之間有以仰窺陛下子愛黎元之心有加無已大懼無以仰稱萬分是以不敢不盡其愚冒瀆天威臣無任恐懼顛越之至熹提舉浙東常平茶鹽公事上奏曰臣踈繆不才逺跡林野陛下過聽畀以郡符已試罔功復叨使指誤恩横被又忝職名方具辭免之間忽扵九月二十二日恭被改除之命揣分量力尤所不堪本欲控陳懇避之誠庶安愚賤之迹而是時已聞本路紹興府衢婺州水旱饑荒上軫宸慮竊恐遷延或致誤事遂已即日拜命具状申省乞許奏對至十月二十八日方准省劄恭奉聖㫖令臣疾速奏事前去之任臣聞命震惕不敢稽留即於今月二日襆被上道至十一日始入本路衢州界問得本州災傷常山江山開化三縣為甚而西安龍游次之其婺州紹興府則所傳又非衢州之比臣不勝恐懼遂自衢州乘舟取疾以來及節次扵本司及被災州縣㑹到已行事件乃聞陛下間嘗親御翰墨戒飭帥臣詞㫖深切聞者感涕而前後撥賜米斛又已二十有餘萬矣仰見聖心懇惻急扵救民而扵軍國之儲無所愛惜至扵如此甚大惠也臣猥䝉任使自惟踈拙大懼不能有以出斯人扵溝壑仰副陛下焦勞之意今有管見合行申請須至畫一奏聞者一救荒之務檢放為先行之及早則民知有所恃賴未便逃移放之稍寛則民間留得禾米未便闕乏然而州郡多是吝惜財計不以愛民為念故所差官承望風指已是不敢從實撿定分數及至申到帳状州郡又加裁減不肯依數分明除放又早田收割日乆撿踏後時致有無根查者乃是州郡差官遲緩之罪而檢官反謂人户違法不為撿定其有撿定申到者州郡亦不為蠲放就中下户所放不多尤被其害訪聞本路州縣亦有似此去處欲乞候臣將來到任廣行詢究更與從實蠲減一伏覩近降指揮旱傷州縣上户賑糶止令勸諭毋得科抑仰見聖明深察物情恤貧安富兩得其所然竊恐官吏被此指揮之後其間或有便文自營之人必將泛然不以勸諭為意而上户亦有詞説難以勸諭官司米斛不多將來無以接續其害又有不可勝言者欲乞且令州縣将來勸諭者權以去年認數為約已勸諭者權據見認之數為準多方詢訪加意考核不得比同尋常報應空文須管究心體訪得其實數其實不能及數者更與量減實可更多出者則與量添其有鹵莽滅裂徒為煩擾去處將來本司覺察得知具名聞奏庶幾所認之數必得其平而無科抑之患矣一應募獻米合格推賞之人多被官吏邀阻乞覓聞有至今未推賞者近雖已䝉立法約束更乞明詔户部先具見令奏到以未推賞名件進呈將未推賞人日下推賞行下諸路州縣有未申奏者限一月内並到如違許被抑人進状陳訴重作行遣又上户已經去年獻助今年所蓄想已不多若必依舊格方得推賞則恐無復及格之人可以獻助欲乞檢㑹淳熈元年三月二十四日勅户部勘當到㸃撿台州措置賑濟官耿延年所申浙東路賑濟賑糶依湖南江西米數減半紐計推賞指揮謂如四千石合補承信郎今减作二千石之𩔖申明行下庶幾應募者衆得濟饑民仍勒所司立定保明状式及令逐處官司承受應募理賞詞状文帖並要當日行遣如將來依式奏到省部却稱文字不圎及諸處故違程限者官員重加降責人吏並行決配庶幾富者樂輸貧者得食實為兩便一伏覩今歲紹興府已䝉聖慈撥賜米斛十七萬石訪聞昨來本府抄劄饑民户口若自十一月至來年三月約用米八十萬石方可足用其間固不能無冒濫虚數今來本府節次刪減未知將來定作多少户口計度但今所有米數及糴米錢姑以元抄劄數計之不過得四分之一況又州府見闕軍儲竊慮不免却将撥賜米斛暗行借兊則所得糴濟米數愈見不多若州府只據見米掯定人口抄劄糶濟則所及不廣必致人户流離餓殍上勞聖慮又臣經由衢州見得本州旱損雖云不及紹興府婺州兩州然其處水路淺澁冬月尤甚運載錢米極為艱難本州雖已差官往浙西收糴然糴本至少所得不多而所費水脚已不貲矣臣今來欲望聖慈更撥賜豐儲倉米三十萬石應副紹興府三萬石應副衢州如無見管米斛即計目今米價支借内帑見錢令其趂此米價未至騰踴之間前去有米州郡收糴旋次般載回州其上件錢米並乞專責本司差委隣州官吏出納州府不得干預庶免侵兊之弊其已撥賜錢米亦乞令本司選委本州通判一員同共主管不得别作支用仍詔守臣疾速措置收糴軍糧不得誤事其婺州雖䝉撥賜米五萬石尚恐未足賑濟却候臣親到本州相度㑹計别具奏聞貼黄臣竊聞陛下節儉憂勤規恢逺略内庫所積錢帛甚多今既天時未順未可興師而近甸饑荒至扵如此伏願聖慈權其輕重特賜借撥一據紹興府申到撥下諸縣米數總計二十一萬二千餘石除􅌘縣六萬八千餘石係排日糶濟外餘縣十四萬三千餘石係間日糶濟竊恐饑民一日止得半升之米不能存活今欲依􅌘縣例排日糶濟即合更用十四萬三千餘石又聞官吏抄劄不無漏落又慮流民却回復業兼數内所稱摺運乃是三摺之數將來米價日増及有往來脚費風波滯留不無欠折又本府民貧勸諭所得恐亦不多須更備米十五六萬石準備添貼所以約計乞米三十萬石如䝉撥賜今亦未敢盡數般取如是發來糶濟不盡却行回納伏乞睿照一諸郡荒歉人户日有流移一切官物不堪催理其紹興府人户夏税已䝉聖慈等第免閣住催唯衢婺州當來失扵申奏致人户未䝉依例推恩而户部漕司催督州郡亦如平日州郡無所從出其勢必取扵縣縣無所從出則人户必有受其弊者甚失聖主惻怛哀憐之意然計户部漕司所催必是掯定支遣之數有不得而已者其勢又不容直行禁止欲乞朝廷取㑹户部漕司合得諸州觧發錢帛之數且扵内庫支撥應副而詔户部漕司被災州縣所欠新舊官物並且住催直至明年蠶麥熟後却将舊欠逐旋催理寛作料次撥還内庫決然不至敢有欠闕其人户名下新舊上供官物亦乞明詔州縣未得催理其紹興府雖已有前件住催指揮竊恐州縣奉行不䖍及將今年檢放外殘零苗米催督嚴峻亦乞聖慈更賜戒約令其寛限人户輸納貼黄臣續訪聞紹興府雖䝉指揮住催官物而春夏之間官吏多已先期催足民户實未盡霑聖恩今體問得本府人户合納丁鹽錢丁身折帛絹折帛綿本色絹本色綿五項不以有無産業物力一丁並納九百餘錢來春即便起催饑餓之餘實難供納臣愚欲望聖慈將來年合納錢數預行蠲放庶幾官吏無以作弊下户實被聖恩有以慰安民心感召和氣一今年旱地廣濶只有湖南二廣及浙西兩三郡豐熟而廣東海路至浙東為近臣昨受命之初訪聞彼處米價大段低平即嘗印牓遣人散扵福建廣東兩路沿海去處招邀米客許其約束税務不得妄收力勝雜物税錢到日只依市價出糶更不裁減如有不售者官為依價收糴自此向後必多有人興販前來但臣元牓約束本路州縣稅場不得妄有邀阻収稅及力勝一節更乞聖慈申嚴行下有違戾者官吏並比見行條法各加一等坐罪至來年六月却依舊法其収糴本錢乞許行下本路沿海州軍將今年糶過米錢及兊那諸色窠名支撥充應庶幾不失信扵客人向後易為招誘如或更䝉朝廷量立賞格召人興販行下諸路曉示勸誘仍先降空名付身數十道付本司俟有上件販到米斛之人即與書填給付盖縁客人糶貨了畢便欲歸回元處不能等候即與土居上户不同伏乞聖察一救荒之政著扵令甲及近年節次指揮雖已詳悉然而全在官吏遵奉推行然後民被實惠況今年洊饑公私匱竭比之常歲事體不同欲乞聖慈特降指揮戒敕本路守令以下令其究心奉行悉意推廣其故有違慢不䖍之人俾臣奏効一二重作施行以警其餘其有老病昏愚不堪驅䇿者亦許具名奏聞别與差遣却選本路官吏惻怛愛民才力可仗者特許不拘文法時暫差權謂如治獄捕盜官不許差出之𩔖仍依富弼趙抃例選差得替待闕宫廟持服官員時暫管幹事畢具名申奏量與推賞如減磨勘陞名次之𩔖庶幾官吏向前人䝉實利熹又上延和奏劄曰臣比因講求荒政復有二事雖非今日拯救之急而實異時乆逺之利不敢不言今謹别具進呈下項一臣昨任南康軍日適值旱傷深慮檢放搔擾下户偶有士人陳説乞将五斗以下苗米人户免檢全放當時即與施行人以為便本路提舉常平尤袤遂以其法行之諸郡其利甚博近日經由信州則聞玉山一縣亦得檢官如此措置除上三等户隨分減放外下二等户盡行蠲免通計一縣所放亦不過共成五分問之道旁居民莫不稱其平允此最為法之善者而律令未有明文又今年檢踏已畢行之不及欲乞聖慈詳酌特詔有司定著為令自今水旱約及三分以上第五等户並免檢踏具帳先與全户蠲放如及五分以上即并第四等户依此施行其州縣差官後時致得旱損田苗不存根查亦乞立法坐罪其所損田即與相度地形髙低水源近逺比並鄰至分數檢放庶幾貧民永逺利便一臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人户冬間納還臣等申府措置每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大饑即盡蠲之至今十有四年支息米造成倉廒三間収貯已将元米六百石納還本府其見管二千一百石並是累年人户納到息米已申本府照㑹將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一貟監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難彊妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人户有願依此置立社倉者州縣量支常平米斛責與本鄉出等人户主執斂散每石收息二斗仍差本鄉土居或寄居官貟士人有行義者與本縣官同共出納收到息米十倍本米之數即送元米還官却將息米斂散每石只收耗米三升其有富家情愿出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為乆逺之利其不願置立去處官司不得抑勒則亦不至搔擾此在今日言之雖無所濟扵目前之急然實公私儲蓄預備乆逺之計及今歉歳施行人必願從者衆其建寧府社倉見行事目謹録一通進呈伏望聖慈詳察特賜施行謹具如前熹又奏曰臣竊見浙東路和買絹萬數浩瀚而紹興府獨當其半舊例自物力三十八貫五百以上人户均敷人户苦扵輸納多立詭户隠寄物力以避均敷是致見納人户所敷愈重其間又有不該敷納田地之數官司不為除豁其弊非一前後臣僚申請並䝉聖慈施行而一時有司不能奉承徳意牽扵衆説未有定論臣以得之傳聞未知其間㣲細曲折不敢輙有陳請然聞一郡之人無不以此為病猥䝉任使不敢坐視欲望聖慈特降指揮許臣到官與本路帥臣監司同共相度限來年二月内要見定論申奏取㫖從來年夏料為始革去舊弊庶幾饑饉餘民得安生業世世子孫沐浴仁聖之膏澤不勝幸甚歴代名臣奏議卷二百四十六
