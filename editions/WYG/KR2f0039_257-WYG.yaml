body:
  text: 歴代名臣奏議卷二百五十七明楊士竒等撰賦役宋哲宗即位初監察御史王岩叟乞免第四等第五等保丁冬教及罷畿内保甲上奏曰臣伏覩陛下即位之始首發徳音下眀詔免保丁第四第五等之田不及二十畝者使勿教其得免者戴陛下厚恩如獲更生後復下令變保甲月教之法為冬教人人使得安其業又大惠也然臣嘗親其事而見其㣲尚有以為陛下言者凡第四第五等之家田業壠畝之多寡無甚相逺麄糲不充布褐不偹均未免凍餒之憂今若隆冬洌寒使去其家與温飽者同教扵城下盈月而後己豈其所堪伏望聖慈哀憐約祖宗義勇等第之制特詔有司免三路第四第五等保丁冬教以寛貧民但籍其姓名偹緩急出力以從事可也雖不教之戰而教者頼此以共濟耳國家平居能有以知其情則百姓一日樂有以盡其力今雖罷之猶不為無益也臣又按祖宗義勇之法止行三路比者保甲之事乃并王畿之民民皆曰我居近天子之都習知䝉幸以為常也乃督戰鬭之技下與列郡等而又加峻焉安用為王畿之民哉此百姓前日之語也北則韋城白馬西則管城新鄭前為畿内邑則共苦扵教今復而歸鄭滑為京西邑則三冬之教遂不預焉民又曰我畿内之民也顧不如畿外之人暇逸而安樂此百姓今日之意也人情如此豈國家所以親腹心厚根本之計哉臣以謂畿内保甲宜悉罷之便惟陛下采納幸甚巖叟又乞罷青苖免役保甲上奏曰臣聞忠臣之事君猶孝子之事親一家之事知而不言非孝也言而不盡亦非孝也有人扵此為姦言詭説隂蔽善謀以欺其親而幸利焉而其親未之察則當告乎勿告乎孝子不忍以此心事親忠臣不忍以此心事君臣雖至愚慕孝子之心以為事君之法臣昨在外方聞皇帝陛下即政之始太皇太后陛下垂簾之初内批廢罷京師民情不便十餘事及屏出宋用臣等數人中外喧呼交相慶快又協天下之望登用忠賢以為輔弼積年之弊指日可除而七月扵今未聞勇決猶欝天下之望何也葢忠賢少而姦邪衆隂為朋黨沮隔扵其中耳臣誠惜陛下有哀矜庶物之心有愛育羣生之意四方疾苦又盡知之未得曠然以發扵天下也姦朋邪黨既已辜負聖君扵前日又欲欺惑陛下於此時臣切痛心彼見四方之人宻封交進以訴疾苦扵陛下則亦自知為朝廷謀者不忠矣其心顛沛唯恐陛下有所更張盖其事既窮則其過自顯而其身難立不得不多方以自為計也固有與忠賢佯為相親而心實忌惡之以伺其倦厭者有明肆悖戾以侵侮忠賢而欲撓之使去者有黙黙不言是非兩可而茍容扵其間者大抵皆欲以自固其權自盖其惡爾故議者曰姦邪不易去忠賢不易留治亂安危在忠邪去留之間耳此陛下不可不思也陛下知孤忠之難立則定力以主之可也知羣邪之難却則盡意以圗之可也先民之語曰屋漏在上知之在下今在下之人則皆知某人為忠賢某人為姦邪而不知朝廷之上宫闈之中能種種知乎以陛下之聰明宜無不知然臣私憂姦計宻行羣邪浸長則陛下之仁心無復得施左右之忠賢無復能立朝廷之公議無復可伸四海之生靈無復受福天下之勢危矣此臣所以寤寐反側而為陛下憂之也今民之大害不過三五事而已儻陛下如聽政之初直從中批出指揮令罷某事罷某事則姦心自沮而陛下之聖澤行矣臣昨在河北為知縣奉行青苖免役保甲之法親見其害至深且悉非若他人汎汎而知之也如青苖實困民之本須盡罷之百姓乃蘇而近日指揮但令斂散不立額而已則所以困民之本十分之八九猶在此必陛下不知也役錢天下億兆之家所共苦也須如舊来復行差法民乃便安而近日指揮但令減寛剰錢而已億兆之家所共苦者十分之七八猶在此必陛下不知也保甲之害三路之民如在湯火未必皆法之弊葢由提舉一司上下官吏逼之使然而近日指揮雖令冬教然尚存官司所以為保甲之害者十分之六七猶在亦必陛下不知也此皆姦邪遂非餙過而巧辭強辯以欺惑聖聽将至深之弊畧示更張以應副陛下聖意而已非至誠為國家去大害復大利以便百姓為太平長乆之䇿者也此忠義之良心所以尚愆也天下識者皆言陛下不絶害源百姓無由樂生不屏羣邪太平終是難致臣願陛下奮然獨斷如聽政之初行此數事則天下之大體無事陛下髙枕而卧矣臣不勝憤懣納忠之至貼黄如執論者以為青苖免役遽罷之恐國用不足則乞陛下問以治平嘉祐之前國用何以不闕願令講究而行之臣䝉聖恩召自踈逺誓不為朋黨以欺天聰以孤忠上事仁聖言觸衆怨惟陛下力賜主張臣得盡其愚以効萬分宻為聰明之助幸甚朝奉郎禮部郎中蘇軾論給田募役状奏曰臣竊見先帝初行役法取寛剰錢不得過二分以備灾傷而有司奉行過當通計天下乃十四五然行之㡬十六七年常積而不用至三千餘萬貫石先帝聖意固自有在而愚民無知因謂朝廷以免役為名實欲重斂斯言流聞不可以示天下後世臣謂此錢本出民力理當還為民用不幸先帝升遐聖意所欲行者民不知也徒見其積未見其散此乃今日太皇太后陛下皇帝陛下所當追探其意還扵役法中散之以塞愚民無知之詞以興長世無窮之利臣伏見熈寧中常行給田募役法其法亦係官田如退灘戶絶沒納之𩔖及用寛剰錢買民田以募役人大畧如邊郡弓箭手臣知宻州親行其法先募弓手民甚便之曽未半年此法復罷臣聞之道路本出先帝聖意而左右大臣意在速成且利寛剰錢以為他用故更相駮難遂不果行臣謂此法行之葢有五利朝廷若依舊行免役法則毎募一名省得一名雇錢因積所省益買益募要之數年雇錢無㡬則役錢可以大減若行差役法則毎募一名省得一名包役包役既減農民自寛其利一也應募之民正與弓箭手無異舉家衣食出扵官田平時重犯法緩急不逃亡其利二也今者榖賤傷農農民賣田常苦不售若官與買則田榖皆重農可小紓其利三也錢積扵官常苦弊重若散以買田則貨幣稍均其利四也此法既行民享其利追悟先帝所以取寛剰錢者凡以為我用耳疑謗消釋恩徳顯白其利五也獨有二弊貪吏狡胥與民為姦以瘠薄田中官雇一浮浪人蹔出應役一年半嵗即棄而走此一弊也愚民寡慮見利忘患聞官中買田募役即爭以田中官以身充役業不離主既初無所失而驟得官錢必爭為之充役之後永無休歇患及子孫此二弊也但當設法以防二弊而先帝之法決不可廢今日既欲盡罷寛剰錢将来無繼而繋官田地數目不多見在寛剰錢雖有三千萬貫石而兵興已来借支㡬半臣今擘畫欲扵内帑錢帛中支還兵興以来所借錢斛復完三千萬貫石止扵河北河東陕西被邊三路行給田募役法使五七年間役減大半農民完富以備緩急此無窮之利也今弓箭手有甲馬者給田二頃半此以軀命償官且猶可募則其餘色役召募不難臣謂良田二頃可募一弓手一頃可募一散從官則三千萬貫石可以足用謹具合行事件畫一如左一給田募役更不出租依舊納兩税免支移折變一今来雖有一頃二頃為率若所在田不甚良即臨時相度添展畆數務令召募得行但役人所獲稍優則其法堅久不壊一今若立法便令三路官吏推行若無賞罸則官吏不任其責繆悠滅裂有名無實若有賞罰則官吏有所趨避或抑勒買田或召募浮浪或多買瘠薄或取辦一時不顧後患臣今擘畫欲選才幹朴厚知州三人令自辟属縣令毎路一州先次推行令一年中畧成倫理一州既成倫理一路便可推行仍委轉運提刑常切提舉若不切推行或推行乖方朝廷覺察重賜行遣一應募役人大抵多是州縣百姓所買官田去州縣大逺即久逺難以召募欲乞所買田並限去州若干里去縣若干里一出榜告示百姓賣田如係所限去州縣里數内仍及所定頃畝即須先申官令佐親自相驗委是良田方得收買如官價低小即聽賣與其餘人户不得抑勒如買瘠薄田致久逺召募不行即官吏並科違制分故失定斷仍不以去官赦降原減一預先具給田頃畝數出榜召人投名應役第二等已上人户許充弓手仍依舊條揀選人材第三等以上許充散從官以下色役更不用保如等第不及即召第一等一戶或第二等兩戶委保如充役七年内逃亡即勒元委保人承佃充役一每買到田未得交錢先召投名人承佃充役方得支錢仍不得抑勒一賣田入官須得交業與應募人不許本戶内人丁承佃充役一募役人老病走死或犯徒以上罪即須先勒本戶人丁充役如無丁方别召募一應募人交業承佃後給假半年令葺理田業一退灘戶絶沒納等係官田地今後不許出賣更不限去州縣里數仍以肥瘠髙下品定頃畝務令召募得行一係官田若是人户見佃者先問見佃人如無丁可以應募或自不願充役者方得别行召募右所陳五利二弊及合行事件一十二條伏乞朝廷詳議施行然議者必有二説一謂召募不行二謂欲留寛剰錢斛以備他用臣請有以應之富民之家以三二十畝田中分其利役属佃户有同僕𨽻今官以兩頃一頃良田有税無租而人不應募豈有此理又弓箭手已有成法無可疑者寛剰役錢本非經賦常入亦非國用所待而後足者今付有司逐旋支費終不能卓然立一大事建無窮之利如火鑠薪日減日亡若用買田募役譬如私家變金銀為田産乃是久長萬全之䇿深願朝廷及此錢未散立此一事數年之後錢盡而事不立深可痛惜臣聞孝子者善繼人之志善述人之事武王周公所以見稱扵萬世者徒以能行文王之志也昔蘇綽為魏立征税之法號為煩重已而歎曰此猶張弓也後之君子誰能觧之其子威侍側聞之慨然以為己任及威事隋文帝為民部尚書奏減賦役如綽之言天下便之威為人臣尚能成父之志今給田募役真先帝本意陛下當優為武王周公之事而況蘇威區區人臣之孝何足道哉臣荷先帝之遇保全之恩又䝉陛下非次拔擢思慕感涕不知所報冒昧進計伏惟哀憐裁幸謹録奏聞伏候勅㫖元祐三年軾為翰林學士上言差役之法天下皆云未便昔日雇役中户嵗出㡬何今者差役中戶嵗費㡬何更以㡬年一役較之約見其數則利害灼然而況農民在官官吏百端蠶食比之雇人苦樂十倍五路百姓朴拙間遇差為胥史又須轉雇慣習之人尤為患苦尋詔郡縣各具差役法利害條析以聞軾知杭州上言改行差法則上戶之害皆去獨有三等人戶方雇役時戶嵗出錢極不過三四千而今一役二年當費七十餘千休閒不過六年則是八年之中昔者徐出三十餘千而今者併出七十餘千苦樂可知朝廷既取六色錢許用雇役以代中戶頗除一害以全二利今惟狭鄉戶小役者替閒不及三畨方得用六色錢募人以代州役此法未允何者百姓出錢本為免役今乃限以畨次不用盡用留錢在官其名不正又所雇者少未足以紓中戶之勞又投名衙前不足元額而鄉差衙前又當更代即又别差更不支錢若願就長名則支酬重難盡以給之仍計日月除其户役及免助役錢二十千及州役惟吏人衙前得皆雇募此外悉用差法如休役未久三年即以助役錢支募此法尤為未通自元豐前不聞天下有闕額衙前者豈甞抑勒直以重難月給可以足用故也當時奉使如李承之之徒所至已輙減刻元祐改法又行減削既多不支月給如何肯就招募今不循其本乃欲重困鄉差全不支錢而應募之人盡數支給又放免役錢二十貫欲以誘脅盡令應募何如直添重難月給令招募得行乞促招闕額長名衙前刻期須足如合增錢雇募上之監司議定即行役率以二年爲一畨向來尚許一户歇役不及三畨則令雇募是欲百姓空閒六年今忽減作二年幸六色錢足用有餘正可加添畨數而乃減畨添役農民皆紛然妄謂朝廷移此錢他之雖云量畱一分備用若有餘剰數却量減下無丁户及女户所敷役錢此乃空言無實丁口産税開收増減年年不同如何前知來年應用而預爲樁科若亟行減下臨期不足又須増取吏緣爲姦不可勝防矣大抵六色錢以免役取當扵雇役乎盡之然後名正而人服惟有一事不得不慮州縣六色錢多少不同若各隨多少以爲之用則敷錢多處役户優閒太久六色人户反覺敷錢數多欲乞今後六色錢常存一年備用之數而㑹計歲所當用以贏餘而通一路酌人户貧富色役多少預行品配以一路六色錢通融分給令州縣盡用雇人以本處色役輕重爲先後如此則錢均而無弊雇人稍廣中户漸蘇則差役良法可以久行而不變矣元祐元年平章軍國重事文彦博上奏曰臣切聞天下諸路差雇役法朝廷雖已降指揮而至今未定頗聞煩擾臣檢㑹始初司馬光閲天下臣庶奏章多言出錢雇役其法不便遂却復差役之法然司馬光所言甚詳而莭目頗繁恐州縣不一一通曉而又朝廷置局詳定議論不一必難通行臣等以謂差役之法本州縣常事其來久矣皆素有定法及其末流不容無弊故當随時刋改臣曽累具劄子奏乞先令州縣刺史令佐從民利便各議定其法縣申州州申轉運司看詳定奪奏聞如得允當即降下施行盖朝廷大號令必當自上而下州縣常差役理須自下而上則各從民便以天下之廣郡縣之衆不可以一切之法行之行之必亙有妨礙而局官及諸臣僚紛然上言各任己見不同知利害及祗付所司别無與奪以至州縣希望朝廷風㫖至今其法未定益滋狡吏侵擾若如前請且各付逐路郡縣定奪利害各從其便庶幾下民早得息肩殿中侍御史呂陶論保甲二弊䟽曰臣伏見保甲之法雖已更改猶有二弊未便於民其一為罷去二十畒以下免教指揮却令五等户有三丁者皆赴冬教一月縁民之貧富不繋丁之多少而教與不教則有幸不幸令田有百畆家有二丁則免教是謂之幸田有十畆家有三丁則赴教是謂之不幸此貧富力役大為不均況今之教閱官中不給錢米一月之食皆其自辦夫有田二十畆之家終年所收不過二十碩賦稅伏臘之外又令供贍一丁則力亦難給盖昔日推行之始不暇講求利害唯務其多今雖将五等下户精專閱習萬一或有調發雖破竭家産所得幾何裹糧而行豈不重困臣愚欲乞於三等以上或等第雖低而家業及一百貫有三丁者方得差充其二為陕西州郡今秋雨澇髙原之地雖謂順成下隰之田稼亦不善人户有訴灾傷去處而蠲稅不及五分並須赴教官司奉法不敢放免臣竊謂保甲之令行已累年朝廷知其有弊多所釐改欲民休息若須候灾傷及五分方與免教亦恐徳澤未廣臣愚欲乞應係灾傷縣分並特與免冬教以惠畿内三路之名又況郡縣自來撿視災傷多是通計一縣所放立為分數如元管稅一千石放及五百石則謂之五分即非以逐户所傷立定分數其被災既有多少之異而通計一縣大數偶不及五分遂不免教此朝廷之所當察也如䝉聖慈以災傷之故不限分數特免教閱則朝廷武備未為廢缺而生民受惠深矣臣訪聞陜西諸縣人户有為田土絶少雖管三丁陳状乞免教并有訴述本户災傷過多但為一縣緫數不及五分亦乞免教者逐縣拘礙條禁不敢輙行伏乞早賜指揮庶寛民力陶又奏曰天下版籍不齊或以稅錢貫伯或以田地頃畆或以家之積財或以田之受種雖皆别為五等然有稅賦錢一貫占田一頃積財千緡受種十石而入之一等一等之上無等可加遂至稅緡田畆積財受種十倍於此亦不過同在一等憑此差役必不均平雖無今日納錢之勞反有昔時偏頗陪費之害莫若裁量新舊著為條約如稅錢一貫為第一等合於本等中差一役税錢兩倍於一役者併差二役又倍即差三役雖稅錢更多不過三役並聽雇人或本縣户多役少則上户之役不須併差但可次叙休役年月逺近而均其勞逸假令甲充役後可閒五年乙稅錢兩倍於甲可閒三年丙又倍於乙可閒一年具以田土頃畆之𩔖為等并其餘同等多少不侔者並倣此又成梓兩路差役舊專以户稅為差等熈寜初别定坊郭户營運錢以助免役乃在税産之外州縣抑認成額至今不減至有停閒居業移避鄉村猶不得免今方議法坊郭等第固不可偏廢然須參究虚實别行排定以寛民力並送詳定所陶又奏為乞下有司别定坊郭之法以寛民力䟽曰臣伏見成都府梓州路自來只於人户田産稅錢上依等第差役熈寜初施行役法别定坊郭十等人户出營運錢以助免役之費盖朝廷之意本為人户專有營運而無稅産或有稅産而兼有營運故推排坊郭有營運之家仍於田産稅錢之外别令承認營運錢數以助稅户誠為均法然推行之初有司不能上體朝廷本意一切督廹郡縣及差官諭意惟務定得坊郭錢多用為勞効州縣承望風指不問虚實及有無營運但有居止屋宅在城市者估其所直一槩定坊郭等第雖以推排為名其實抑令承認立成年額嵗嵗相仍至今不減訪聞嘉州坊郭人户以至閉户移避於鄉村居住其營運錢亦不減免雖欲轉賣屋業勢不能售其弊至此盖亦極矣今來朝廷講議差役之法坊郭等第固不可偏廢然理須參究虚實别行排定不須循用舊額務在酌中其中有屋宅而别無營運或有營運而物力不多並冝蠲免以寛民力竊慮諸路亦有似此去處伏願聖慈下有司詳議立法施行哲宗時蘇轍上民政策曰臣聞三代之時無兵役之憂降及近世有養兵之困而無興役之患至於今而養兵興役之事皆不得其當而可為之深憂盖古者兵出於農而役出於民有農則不憂無兵而有民則不憂無役五口之家常有一人之兵而二十之男子嵗有三日之役故其兵強而費不増役起而人素具雖有大兵大役而不憂事之不集至於兵罷役休而無日夜不息之費其後周衰井田破壊陵夷至於末世天下無復天子之田皆民之所自有天下之民不食天子之田是故獨責其稅而不任之以死傷戰鬭之患天子有養兵之憂而天下無攻守劬勞之民以為大憂故調其財以為養兵之用而天下之役凡其所以轉輸漕運營建興築之事又皆出於民當此之時民之所以供上之令者三曰租曰調曰庸租者地之所當出調者兵之所當費庸者嵗之所當役也故使之納粟於官以為田之租人入布帛以為兵之調嵗役其力不役則出其力之所直以為役之庸此三者農夫皆兼為之而遊惰末作之民亦不免於庸調運重漕逺天子不知其費而一出於民民嵗役二旬而不役者當帛六十尺民亦不至於太苦故隋唐之間有養兵之困而無興役之患此其為法雖不若三代之兵不待天子之養而天下之役猶有可賴者皆民為之也及其後世又不能守乃變法而為兩稅以至於今天下非有田者不可得而使而有田者之役亦不過奔走之用而不與天子之大事天下有大興築有大漕運則常患無以為使故募冗兵以供力役之急不知撃刺戰陣之法而坐食天子之俸由是國有武備之兵而又有力役之兵其所以奉養之具皆出於農也而四海之遊民無尺寸之庸調為農者常使隂出古者遊民之所入而天子亦常兼任養兵興役之大患故夫兵役之弊當今之世可謂極矣臣愚以為天子平日無事而養兵不息此其事出於不得已惟其干戈旗鼔之攻而後可使任其責至於力役之際挽車船築宫室此非有死亡陷敗之危天下之民誠所當任而不辭不至以累兵革之人以重費天子之廪食然當今之所謂可役者不過曰農也而農已甚困盖嘗使盡出天下之費矣而工商技巧之民與夫遊閒無職之徒常徧天下優游終日而無所役屬盖周官之法民之無職事者出夫家之征今可使盡為近世之法皆出庸調之賦庸以養力役之兵而調以􅂇農夫養武備之士而力役之兵可因其老疾死亡遂勿復補而使遊民之丁代任其役如期而止以除其庸之所當入而其不役者則亦収其庸不使一日而闕盖聖人之於天下不惟重乎茍亷而無求唯其能緩天下之所不給而節其大幸則雖有取而無害於為義今者雖能使游民無勞苦嗟歎之聲而常使農夫獨任其困天下之人皆知為農之不便則相率而事於末末衆而農衰則天子之所獨任者愈少而不足於用故臣欲收遊民之庸調使天下無僥倖茍免之人而且以紓農夫之困茍天下之逰民自知其不免於庸調之勞其勢不耕則無以供億其上此又可驅而歸之於南畆要之十年之後必將使農夫衆多而工商之𩔖漸以衰息如此而後使天下舉皆從租庸調之制而去夫所謂兩稅者而兵役之憂可以稍緩矣轍又言差役復行應議者有五其一曰舊差鄉户為衙前破敗人家甚如兵火自新法行天下不復知有衙前之患然而天下反以為苦者農家嵗出役錢為難及許人添剗見賣坊場遂有輸納不給者爾向使止用官賣坊場課入以雇衙前自可足辦而他色役人止如舊法則為利較然矣初疑衙前多是浮浪投雇不如鄉差稅户可託然行之十餘年投雇者亦無大敗闕不足以易鄉差衙前之害今畧計天下坊場錢一嵗可得四百二十餘萬貫若立定中價不許添剗三分減一尚有二百八十餘萬貫而衙前支費及召募非泛綱運一嵗共不過一百五十餘萬緍則是坊場之直自可了辦衙前百費何用更差鄉户今制盡復差役知衙前苦無陪備故以鄉户為之至於坊場尤無眀降處分不知官自出賣耶抑仍用以酬奬衙前也若仍用以酬奬即召募部綱以何錢應用若不與之錢即舊名重難鄉户衙前仍前自備為害不小其二坊郭人户舊苦科配新法令與鄉户並出役錢而免科配其法甚便但敷錢太重未為經久之法乞取坊郭官户寺觀單丁女户酌今役錢減定中數與坊場錢用以支雇衙前及召募非泛綱運外却令樁備募雇諸色役人之用其三乞用見今在役人數定差熈寜未減定前其數實冗不可遵用其四熈寜以前散從弓手手力諸役人常苦逆送自新法以來官吏皆請雇錢役人既便官亦不至闕事乞仍用雇法其五州縣胥吏並量支雇錢募充仍罷重法亦許以坊場坊郭錢為用不足用方差鄉户鄉户所出雇錢不得過官雇本數詔送看詳役法所詳定擇其要者先奏以行轍再言役法䟽曰臣聞世無不弊之法雖三代聖人之政不免有害故神而明之存乎其人臣切見朝廷近罷免役復行差役小民初免出錢鼓舞相慶士大夫因民之喜以為差役一行可坐而無事矣臣之愚意以為免役之害雖去而差役之弊亦不可不知也是以推言其故而陛下察之國朝因隋唐之舊州縣百役並差鄉户人致其力以供上使嵗月畨休勞佚相代吏若循理不以非法加民則被役之人本無大苦然役人既是稅户家有田産誅求必得吏少亷慎凡有所須不免侵取故祖宗之世天下役人除正役勞費之外上自衙前有公使厨宅庫之苦中至散從官手力有打草供柴之勞下至耆長壮丁有嵗時饋送之費習以成俗恬不為怪民被差役如遭寇虜神宗皇帝昭知此害始議立免役之法前弊雖觧而所取役錢多收寛剰民間難得見錢日益貧瘁今朝廷既已復行差役除見議衙前差募未有成法外其餘耆户長弓手散從等役一切定差貪官暴吏私竊以此相賀何者市井之人應募充役家力既非富厚生長習見官司官吏雖欲侵漁無所措手今耕稼之民性如麋鹿一入州縣已自懾怖而況家有田業求無不應自非亷吏誰不動心妄意朝廷既行差役凡百侵擾當復如舊訪聞見今諸路此弊已行臣恐稍經嵗月舊俗滋長役人困苦必有反思免役之便者其於聖政為損不細頃者朝廷初革衆弊士懐異議多被遷逐睥睨新改幸其不成者非一人也若此弊不除使民有怨言彼立異之人他日必指以為事臣欲乞明降詔書丁寜戒敕監司長吏使知朝廷愛惜鄉差役人與神宗朝愛惜雇募役人無異應係自前約束官吏侵擾役人條貫使刑部録出具委無漏落雕印頒下令一切如舊出榜州縣使民知之仍常加督察有犯不赦應監司所部有犯不能覺察致因事發露者重其坐庶㡬民被差役之利而無差役之害然後天下䝉賜深矣轍又論差役事状曰臣五月二十六日上殿劄子乞明降詔書戒敕監司長吏令知朝廷愛惜鄉差役人與神宗朝愛惜雇募役人無異應係自前約束官吏侵擾役人條貫使刑部録出具委無漏落雕印頒下令一切如舊出牓州縣使民知之仍常加督察有犯不赦應監司所部有犯不能覺察致因事發露者重其坐至今多日未䝉施行伏念臣前作此奏為聞近日諸縣曹吏有因差役致富小民被差充役初參上下費錢有至一二十千者州縣官吏亦有以舊雇役人慣熟多方陵虐所差之人必令出錢作情願雇募又有以新差役人拙野退換别差必得慣熟如意而後止者天下官吏不能皆良如此等事所存不一雖非目見可以意料民被其害如遭湯火竊意此奏朝上聖心惻怛不待終日而行不意遷延至今不以為急臣愚竊恐朝廷始復差役議者妄謂差法一行更無患害聞臣此奏未免不信臣謂改雇為差實得當今救弊之要然使聞害不除見善不徙則差役害人未必減於免役伏乞聖慈撿臣前奏早賜詔書具言所聞差役官吏情弊仍備録前後禁約曉諭中外使知朝廷深意則天下幸甚侍御史劉摯乞置局議役法䟽曰臣伏覩今月七日勅節文天下免役錢一切並罷諸色役人依熈寜元年以前舊制委州縣定差者命令既下中外人情鼓舞歡喜皆謂此一事為害最大從來百姓日夕延望今陛下一旦行之救其困苦天下幸甚臣竊聞令下之後姦邪之人論說紛紛造作浮言意欲揺動其事不知陛下察其然乎盖今日廟堂之上侍從之間其人多由新法而進於外之監司亦皆由新法而選今法既更改則其心皆非所欲故誹議熒惑欲幸其失而不能成爾勅命内固有小節與舊法異同及措置未盡之事縁已帶下指揮許州縣監司申明利害擘畫自可候到日脩正立法今来改免役為差役乃是大體已正大害己革譬如疾患之人病根已去其他氣體未和當徐徐調養之而已臣恐上下觀望之人指小小未圎事件張皇鼓扇伏望皇帝陛下太皇太后陛下堅持此意力行無疑勿為異論所動候臣寮及諸路論列到未盡未便事理乞付三省𩔖聚叅詳為法内如有合先次施行者即乞随事先賜處分摯又論役法䟽曰臣竊以聖人之治雖一道亡敝而道之寓於形名法數者必有偏而不起眊而不行者聖人因時而變之變則通通則久以盡天下之利此五帝所以異制而三王之所以不同禮也國家承唐末五代熟爛之後祖宗創制造法趨時之宜順事之變雖聖聖相繼而其法令日増嵗損或舉或廢未嘗同也至於寜民適治所謂道之亡敝者則未嘗異也神宗以仁智之慮逹因革之數凡政令制度急絃慢軫大觧而更張之故天下䝉其利然至于今殆二十年所謂偏而不起眊而不行者盖復有之矣其事則非一而其大者則役法是也於役法之敝相為首尾而牽連當更者則坊場吏禄是也始者以繇役不得其平農民勞費故命有司議所以均弛之而有司不深惟其故乃一剗祖宗差役舊勅為官自雇人之法率户賦錢以充雇直曰助役又曰免役自上户至於下五等從来無預差役之家一槩斂之盖於賦稅科調百色買納求取之外又生此重斂嵗嵗輸納無有窮期古人有言平地無銅鑛農家無錢鑪今所輸必用錢而地土所出惟是絲帛榖粟幸嵗豐收成而州縣逼廹不免賤價售之無以養其私若嵗凶則破易資産或以倍稱之息舉責於兼并以應期限更無減放之法州縣上户常少中下之户常多自法行以来簿籍不正務欲敷配錢數故所在臨時肆意升補下户入中中户入上今天下往往中上户多而下等户少富縣大鄉上户所納役錢嵗有至數百緡者又有至千緡者每嵗輸納無已至貧竭而後有裁減之期舊来鄉縣差役循環相代上等大役至速者十餘年而一及之若下役則動須三二十年乃復一差雖有勞費比之今日嵗被重歛之害孰為多少也今天下錢日益重貨日益輕民日益困矣若之何坐視而不䘏也哉然則前日有司立法非有意於寛役利民正在聚斂刻剥損下益上為國取謗大失朝廷惠綏生靈本意臣竊見繇役昔者有至于破産而民憚為之者惟衙前一役爾今天下坊場官司收入自行出賣嵗得緡錢無慮數百萬以為衙前雇募支酬之直計一嵗之入為一嵗之出盖優有餘裕則衙前一重役無所事于農民矣農民既除此一重役外唯有散從承符弓手手力耆户長壮丁之𩔖此役無大勞費宜並用祖宗差法自第一等而下通任之比於舊制繇役輕矣治於人者事人古今之通義則安用給錢為哉坊場之法舊制撲户相承皆有定額不許増擡價數輙有剗奪祖宗非不知増價之為公家利也所以不許者知其恱目前之利必有後日之害故也新法乃使實封投状許價髙者射取之於是小人徼一時之幸爭越舊額至有三兩倍者舊百緍今有至千緍者交相囊橐虚構扺本課額既大理難敷辦於是百敝隨起決至虧欠州縣勞於督責患及保任監錮係累終無償納官司䕶惜課額不為減價則誰人復肯承買今天下坊場如此者十五六矣故實封増價之所得於敗闕之所失殆不相補也盖財利可以通之而已不可盡也少捐分數與民共之則公私相濟其利長久臣欲乞罷實封投狀之法應天下坊場委逐路轉運提舉司将見今買名淨利額數與新法以前舊額相對比量及地望緊慢取酌中之數立為永額一用舊法召人庶乎承撲者無破敗之患而官入之利有常而無失也吏禄之法天下吏人舊制諸路及州縣法各不同有鄉户差充者有投名者有鄉差投名雜用者入仕之後既以案司之優重迭相出入以為酬折又積累嵗月有出職之望行之久逺人自以為便此時有司見禮經有庶人在官之禄遂假其說資以掊民殊不知三代已逺其事不可行于今日者多矣夫庶人在官之禄雖有其文而其法與數不可見其詳乃鑿空造端槩斂民錢給為吏禄不重之則不足以募不輕之則不足以給今内外之吏除重法之外其他毎月所給無幾於吏固未足以有濟而官給所積天下盖已不貲無故竭民財而為此費誠何為哉至於所謂重禄以行創法尤非義理夫一錢以上以徒坐之謂之嚴刑可也遂以謂吏懼而不受賕則臣不敢知也今主議者曰禁既嚴則吏必畏故令下以來犯者少臣以謂非犯者少敗者少也非敗者少正其罪者少也網之宻則與者取者藏聲匿跡亦将避之工也故曰敗者少也一錢坐徒誰則忍之誰敢易之故茍有敗者若稍渉疑晦及自非有告人當賞則官司往往遷就平反釋重入輕若外路則雖使者亦或諭意州縣使之如此亦人之情也故曰正其罪者少也借使犯者皆敗敗者皆正其罪固亦先王制刑之所無而聖人所當矜慎之也吏受賄於律自有刑名而曲法者一匹以上至徒則刑亦不為輕矣今變先王之刑而重之又多賦吏禄以買法之行無謂也臣愚欲乞除熈寜以前舊法有禄公人並依舊外應新法所創及増給吏禄並行減罷臣愚誠不識忌諱令衙前之役則待之以坊場價錢弓手等役則均之以祖宗差法利禄非舊法所給則皆罷去應役人糜費私役之𩔖則禁之以熈寜新法茍如是也則所謂免役錢者於是可以一切蠲除矣或謂免役錢籍于常平固非獨以待募役也縣官他費多有𩔖乎此則未可以利害論也臣以謂役錢領于司農非有特勅未嘗以給常費今罷去無損於國用況祖宗以來至於役法未改役錢未斂以前百餘年間不知何以為國也亦曰用之有節則取之有道矣今天下百姓疲筋骨忍飢寒冒鞭笞終嵗急急為公家納錢爾不幸有連年災荒之變實恐窮苦之人流亡轉徙為溝中瘠而强梁者賖死忍命不得為陛下之良民矣然則役錢乃生民性命天下安危之所繋奈何欲以為不刊之令哉古者藏於民誠令百姓賦稅之外有以自養則其贏餘乃國之外府緩急取之而已無事之時坐困竭之非計也臣故以謂役錢冝一切罷之役錢罷則提舉常平官司亦可罷去以見存職事付之轉運司足矣天下既減罷監司數十人則州縣稍得從容上下省事非小補也雖然此大法也顧臣之言盖其畧耳至於法之纎悉或參差抵牾宜有畫一之論欲乞於兩制臣寮選差明於治體深於民事者三兩員置局講議裁立條格而三省執政官典領之以待聖斷施行摯又論保甲䟽曰伏覩近制保甲罷團教朝廷所以惠綏疲氓恩施甚厚民得去其所苦就其所安逺近承風莫不鼓舞然臣竊有私憂過計者夫鄉野之民其性易於轉習臣往見農人或被差役一為弓手手力耆壮之𩔖及罷滿而歸則拱手閒惰已不復能反業于農盖出入公門㳺集市井有所誘怵之使然也今之保甲則又甚焉者衣必華細食必酒肉固已變其向者布麻麄糲之習矣羣聚而笑諠奮臂而矜勇固已移其向者村魯勞苦之性矣其家質田賣屋出錢以濟其所用官司嵗時教試與之金帛寵之名目以養其欲故凡保甲之父母兄弟妻子一家憔悴終嵗困擾而身為保甲者未必不自喜以為樂也今既嵗教止于一月罷其團集省其監督去其羈縻勞費之患則保甲之父母兄弟妻子欣歡休息復其生理而身為保甲又未必不自失以為戚也彼有自失之意而欲使人人俛首甘心盡如平日肯復從事于耕勢盖難矣惡少而失其欲悍强以成其性又挟素所教弓刀刺撃之噐以為之資臣懼其非獨不能從事於耕而已也亦恐其得為陛下之良民者少也臣愚以謂宜有法以斂制之盖保甲之技藝强弱髙下州縣皆有等籍今按取優等之人召其情願刺以為本州禁軍若舊係正長等名色則比𩔖軍中之階級隨其等差對換補之自餘中下藝等亦召願充公人者依近制募以為弓手手力耆户長之役所貴在軍者既團𨽻部督束之有法又使得伸其素習之技能其在役者既不失服職於公家比之召雇浮浪乃得熟事鄉民必賴其用為多伏望詳酌楊繪上言曰助役之利一而難行有五請先言其利假如民田有一家而百頃者亦有户纔三頃者其等乃俱在第一以百頃而較三頃則已三十倍矣而受役月日均齊無異況如官户則除耆長外皆應無役今例使均出雇錢則百頃所輸必三十倍於三頃者而又永無影射之訟此其利也然難行之說亦有五民惟種田而責其輸錢錢非田之所出一也近邊州軍就募者非土著姦細難防二也逐處田稅多少不同三也耆長雇人則盜賊難止四也衙前雇人則失䧟官物五也乞先議防此五害然後著為定制仍先戒農寺無欲速就以祈恩賞提舉司無得多取於民以自為功如此則誰復妄議歴代名臣奏議卷二百五十七
