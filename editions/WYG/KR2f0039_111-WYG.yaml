body:
  text: 歴代名臣奏議卷一百十一明楊士竒等撰務農宋神宗元豐八年門下侍郎司馬光上奏曰臣竊惟四民之中唯農最苦農夫寒耕暑耘霑體塗足戴星而作戴星而息蠶婦治蠒績麻紡緯縷縷而積之寸寸而成之其勤極矣而又水旱霜雹蝗蜮間為之灾幸而收成則公私之債交争互奪榖未離塲帛未下機已非已有矣農夫蠶婦所食者糠籺而不足所衣者綈褐而不全直以世服田畆不知捨此之外更有可生之路故其子弟逰市井者食甘服美日覩盛麗則不復肯歸南畆矣至使世俗俳諧共以農為嗤鄙誠可哀也又況聚歛之臣扵稅租之外巧取百端以邀功賞青苗則強散重歛給陳納新免役則刻剥窮民收養浮食保甲則勞扵非業之作保馬則困扵無益之費可不念哉夫農蠶者天下衣食之原人之所仰以生也是以聖王重之臣不敢逺引前古竊聞太宗皇帝甞逰金明池召田婦數十人扵殿上賜席使坐問以民間疾苦田婦愚戇無所隠避賜帛遣之太宗興扵側微民間事固無不知所以然者恐富貴而忘之也故毎臨朝無一日不言及稼穡真宗皇帝乳母秦國夫人劉氏本農家也喜言農家之事真宗皇帝自幼聞之故為開封尹以善政著聞及踐大位咸平景徳之治有宋隆平之極景徳農田勅至今稱為精當昔周公相成王作無逸曰先知稼穡之艱難乃逸則知小人之依盖以一盂之飯一尺之帛莫不出扵艱難人主既知之則不肯用之扵無益散之扵無功驕侈之心無自而生矣伏惟皇帝陛下富扵春秋自非今者濬發徳音大開言路使畎畆之民皆得上封事則此曹疾苦何由有萬分之一得逹扵天聽哉其文辭鄙俚語言叢雜皆身受實患直貢其誠不可忽也伏望皇帝陛下特賜省覽庶以開廣聦明資益聖性於民間情偽靡不周知異日太平之業由此為始矣哲宗時同知諫院范祖禹論農事䟽曰臣近䝉賜告暫至許昌竊見畿内已苦雨澇詢之村民皆云鄉村安静公私少事無呼召煩擾唯是年嵗未得豐熟不旱則水民常艱食夏麥既薄或全不收秋苖雖茂唯憂澇損臣竊惟陛下哀矜百姓賑恤鰥寡徳之所及可謂至厚然猶和氣未應隂陽隔并欲修政事以應之願陛下推其心而已矣夫天道不逺在君心所以感之人君愛民則天亦愛之人君愛民者在知其勞苦而恤其困窮天下之人至勞苦而常困窮者農民是也周公作無逸戒成王以先知稼穡之艱難又言商之逸王不知稼穡之艱難不聞小人之勞人君不可以不知天生時而地生財自一粒一縷以上皆出扵民力然後人得而用人臣之禄受之扵君故不可不報君人君之奉取之扵民故不可不愛民天子者合天下之力而共尊養之凡宫室車馬服食器用無非取扵天下皆百姓之膏血也其作之也甚勞其成之也甚難安而享之不可不思其所從来思其所從来則愛之而有不忍費財之心憂之而有不忍勞民之心以此之心行此之政而天下不安者未之有也天下之大生民之衆唯繋扵一人之心君心静則天下静君心不静則天下亦不静朝廷唯恭儉節用無所營為常恐煩百姓則天下安息先王豈能人人而食之人人而衣之哉推其仁心修其仁政以及天下則所被者廣矣臣願陛下當食則思天下有飢而不得食者當衣則思天下有寒而不得衣者凡扵毎事莫不皆然唯推至誠以召和氣庶㡬皇天報應降豐年之祥使百姓家給人足則太平矣昔漢昭帝耕于鈎盾弄田其事至微史臣書之盖以昭帝欲知稼穡之艱難與周公戒成王之意同也周世宗留心農事常刻木為耕夫蠶婦置之殿庭欲見之而不忘國朝祖宗以来尤重農穡太宗常謂近臣曰耕耘之夫最可矜憫春蠶既登併功紡績而繒帛不及其身田禾大稔充其腹者不過蔬糲若風雨乖候稼穡不登將如之何真宗扵内殿植稻麥臨觀刈穫欲知田畆之勞至今遵之惟陛下深留意扵農政而常以保恵小民為先則天下幸甚文彦博上奏曰臣聞化國之日舒以長蓋不奪農時不妨民力故日力有餘而嵗收有望臣竊以自春以來時雨愆亢人情惶惶謂必艱食至今月八日大雨霶霈庶民鼓舞急扵田事老幼就功力穡有秋正在今日臣慮州縣親民之官不知農事之急以小小詞訟勾追證逮禁繫淹延至扵随司門留亦皆拘繋頗妨農作臣欲乞下諸路久旱郡縣當此農事急切之時民間小可詞訟鬭争一切且罷追擾除事干人命及刼賊急切公事即依常施行徽宗建中靖國元年左司諫江公望上奏曰臣聞損上者益下之道厚下者安上之義未有不先厚下而上奠居者也未有下不益而上獨有餘者也民為邦本食為民天洪範八政以食為先必曰農用八政者益下之道也詩之公劉以疆埸為先必篤公劉者厚下之義也召康公獻公劉之詩扵成王蒞政之初箕子陳八政扵武王勝商之後以大君初政貴乎知本本立則政舉矣故教生扵既富禮興扵足食操大器者未有不以農為急今天下四民雜處侈靡滛巧之智興轉而為工者皆是倚市罔利之徒熾散而為賈者不可勝數執公府之役一邑之中不知其㡬家焉怠惰㳺手一家之中又不知其㡬人焉故一夫耕十夫待哺十家耕百家仰食豈獨如是軍賦扵是乎出公須扵是乎興賔客冠婚䘮葬扵是乎在一有旱乾水溢雖終嵗勤動糟糠不厭流離轉徙扵溝壑朝廷雖遣使發倉廪以振救之死已十八矣監司郡守雖有勸農之名而無勸課之實設有其實人必指為迂濶而竊笑故不能持久也漢文帝以孝弟力田者同科詔書勸諭謁者賜勞自爾海内富足禮義興而㡬致刑措今郡守縣令以外任之輕安扵茍簡而不究治民不安業澤不下流無足怪也臣伏願行勸課力田之詔發扵惻怛重扵丁寧終以不倦以田疇墾廢多寡之地為守令進退之法其有田疇加闢民安其政雖長子孫勿易扵是久任之道寓焉璽書勉諭加秩賜金須公卿則簡之郡守闕郎選則縣令入補扵是外重之勢舉焉一舉而三得之矣葢外重則久任者安扵圖治不為茍簡因循之政加之惻怛丁寧不倦之詔諭雖有不欲力田之民盖寡矣由是富庶之俗成禮義之教行天下之不治者未之有也伏望陛下少留意焉天下幸甚徽宗時御史中丞王安中請行藉田禮劄子曰臣伏覩陛下肇建明堂既訖嚴配乃以十月之吉首行授厯頒常之禮三代墜典復見今日可謂甚盛之舉矣臣幸以言語待罪禁林扵禮文之事宜因有陳然臣愚懵淺陋不足以仰窺聖學竊甞攷之月令之文盖欽授民時使時以作事者扵農事為尤謹夫農天下之本也親耕之禮事之本也王籍千畆天子三推先農之祀耒耜之載穜稑之獻見扵經者其制甚詳昔我太宗肇行是禮有司告畢猶以不終千畆為恨迄扵仁祖惟稼穡是好明道再藉弁冕舉趾進至十有二跬三公而下咸盡壠焉神考稽古剏法正兹國南之位哲廟繼志述事榜以思文之名恭惟累聖所以敷遺陛下者抑又大備時令之頒此實先務比者迎真慶成臣獲扈清蹕待事郊次嘗寓天田壇壝榛蕪棟宇摧圮殆不足稱陛下重本務農之意恭惟陛下天錫獨智自初臨御立經陳紀全法三代之盛聖治昭格天人同和風雨順序既屢有年而縉紳之士郊甸之老猶欲拭目朱紘黛耜之觀者盖上以無忘列聖之徳下欲元元之衆躋于富夀振古如兹而已臣愚欲望陛下申命有司參具典故斷自聖意順時幸臨若乃仗衛之設賚予之數赦宥之澤則願陛下約文以就質抑末以隆本必于今無所甚費則久逺可以時行損益之宜惟陛下所詔臣言狂瞽或有可採即乞特降處分討論取㫖施行通判李新乞戒飭郡守勸農不以其實劄子曰臣竊聞陛下孟春之月親屈玉趾行幸南郊躬耕籍田以先天下行一墢三推之禮舉百年之墜典示萬世之禮容穜稑之種出自深宫鸞輅之音乃光原野父老動色中外驩呼夫以一人之尊而俯為大農之事則勸農之官其将何以順承聖意臣又聞昔者郡守春秋行縣觀風俗課農桑而暴吏乗時風俗未嘗觀農桑未甞課千騎五馬重擾属邑飾廚𫝊載賔客攜妓效東山之逰逰山寺如潘孟陽之作所以先朝廢罷郡守行縣正為此也今雖帶勸農之名而無勸農之實臣欲乞知州毎春行縣勸農量帶人從所至不得再宿及取索供帳令人除道約束戒嚴厲色悚動輙受饋送從人丐乞錢物其􅂍先坐知州不許以失覺察原免則勸農之官知所畏而農知所勸嵗約有年此富庻之本原也髙宗時章誼上奏曰臣聞禁暴不可以無兵而彊兵莫先扵足食盖定亂則倚兵足食則倚農古今一道也然而古者兵農混而為一茍可籍而為兵者衆則農必多農既多則食必足後世兵農分而為二茍可籍而為兵者多則農必少農愈少則食愈乏觀今日連營列戍之兵則皆昔時耕鑿之民今日蓬蒿荆棘之地則皆昔時稼穡之野地既廣而農稀兵不耕而仰食扵此不恤而欲曠日持久國家安富未見其可也臣近因奏對嘗乞授閒田以給諸軍以裕兵食矣今伏思之曠土尚多閒民猶衆古之民也四􅂉為士􅂉為工􅂉為商而農居其一焉然士則農之秀出而有徳行道藝者也方其未仕也是亦農而已則是古者四民而農居其二也今之民也九盖從仕者衆執兵者多僧道連墻工商接武徒𨽻盈扵官府㳺惰塞扵道塗舉是八等之人其為農者百不一二焉夫人不為農則家不蠶織矣不蠶則無衣不農則無食加以兵革未息賦歛日至設有水旱饑饉将何善其後哉唯陛下執古御今務農重榖設為法制率是八等之人使無不授田而唯農之為勸則王業可興而國勢鞏固矣如臣言可採乞付外廷措置施行李石上勸農䟽曰竊觀漢文帝勸農之詔二十三年之間至扵十數未嘗不掩卷太息且漢興民僅息戰争之苦以歸安扵田畆嵗月未㡬以為不如此不足以招徕勸集以作其㳺手怠惰之氣以趨扵富足衣食之源如文帝者可謂知所本矣仰惟陛下親耕天田以風天下勸農之心切切然矣如江湖兵火焚掠之地今皆化為墾闢禾黍之場大抵勸率之效也今蜀以連年水旱農有種而不得其穫耕而不得其食縣官力役廹之於其前兼并督責驅之扵其後至扵賣牛拆屋棄田里以去野無棲粒田有荒萊者十居五六矣州縣以勸農為官獨不一為陛下省念之乎且以名其官者當思履其事今乃指為不急之務毎以故事具酒食郊次召耆鄰白髮之老強名曰農以勞之特為宴㳺虛文其實無補農務農耕之勤惰與田闢之多少彼不知也䝉其名而怠其事可乎且陛下方求所以裕民為無窮之利者使斯民疾耕力耘自足扵飽暖民足則君足矣不必他求也臣願陛下以農為裕民之本扵詔㫖丁寧及之如文帝焉則水旱之備可無慮也蘇籕上務農劄子曰臣聞王政之先務農為本觀周公豳風所陳后稷以来田畯耜饁斧斨蠶桑重穋滌場黄纁績褐想見先王愛利厚生之叙慨然稼穡艱難小人之咨者思文之粒烝民底于道矣古之治財者非一凡籠貨算緍運米歛積甚勤且裕而周公所陳淵源深矣珠玉泉貨寒不可衣飢不可食有補飢寒而至重者粟帛也二者不充則他財無益盖禾不天降非民力不生縑不地踴非民工不成今陛下帑藏出于租稅毎嵗禄廩軍賔以百萬計五年之蓄九年之備殆其可念自昔承平諸路之賦常不能自給素所仰者東南數十郡今淮南往往為斥候之郊罕復種植賦入惟恃二浙而已吳地海陵之倉天下莫及稅稻再熟貢緜八蠶方今縑綺之美不下齊魯又増以鹺鏹籠𣙜之盛夫復何加白丁工女終身絲榖五符尺籍盡力邉疆行陣者無暇播穡南畆者甘心餉饋二者互相養衛田夫必億兆扵甲士犂牛必百倍扵戰馬而後濟矣嗚呼孰謂温飽天下而富強邦國非農也哉四民之最苦辛三務之最勞劇茍寛裕其生生之業則士商工及末務者亦不匱矣臣竊惟先聖有敦本興王之要道田里之安恃賢守令亦不必其躬行阡陌以為勸課惟科歛正辭惻怛務實使民養生送死無憾人心恱則隂陽和隂陽和而天地平於是風雨時若耕織咸遂殆其庶矣太公言寛民之目曰利之而勿害成之而勿敗生之而勿殺與之而勿奪樂之而勿苦喜之而勿怒夫如是地無遺利家無羨餘縣官豈在加賦侵牟而後足用閭閻困乏則邦本不固矣姑令有司量入為出出納之間不失欽慎嵗計時辦裁抑浮冗累嵗均省必致京坻之豐山嶽之儲帶甲百萬陳錫周洽篚實盈溢民有蓄藏榖縑雖鉅萬不以為家貲數雖公私咸有九年之積可也禮義益敦風化益厚矣陛下待遇守令賞罰以其勤惰扵民才否必由民之謗譽誰敢不盡力哉嘗聞漢人推衍鹽鐵條目之說至數十萬言亦是裨益邦家之術臣為習讀詩書敦本而末茂矣儒家仁富與霸道固異也臣不勝區區越職昧死以聞伏惟聖明裁擇寧宗嘉泰初起居郎虞儔上力田劄子曰臣待罪柱史遲鈍無取䝉陛下畀節報謝北庭所得於詢訪聞見之實者臣以口奏及見扵進呈日録矣臣甞謂守邊莫若務富其民欲富其民莫若務興力田竊見兩淮多曠土官司往時募人營墾聽其占佃今已殆遍謂如佃田百畆往往廣為四至逾千畆者然其所占雖多力實不給種之鹵莽收亦鹵莽大率淮田百畆所收不如江淛十畆況有不及耕種去處以故淮郡雖號佃田殆遍而民間實無蓄積一遇水旱嵗歉人情便覺皇皇況淮上土力壯厚與中原不異特患人力不至耳使如江淛農民耕耨以時灌溉有度務盡地力其為利豈不甚厚臣願朝廷興力田之科詔有司立為條格下兩淮監司守臣勸諭有田之家以来嵗為始候布種畢日委字民之官躬履阡陌如有能招徕客户資給牛種務盡地力可為農民勸率應條格者次第保明申奏特與推恩如占佃數多耕種弗遍檢踏標出只聽給元佃實數籍其餘歸之官别召客户耕種其字民之官亦以力田為殿最賞罰之庶㡬淮民知所激勸而以服田力穡為務不過數年地有羨利官司且與寛其征賦使民户自臻富實豈特水旱之有先具至若民兵兵甲器械皆可以責其修備春秋教閱皆可繩以紀律實守邉之要務也如䝉陛下採擇施行之誠非小補臣不勝惓惓金宣宗貞祐三年濬州防禦使田琢上書曰河北失業之民僑居河南陜州盖不可以數計百司用度三軍調發一人耕之百人食之其能贍乎春種不廣收成失望軍民俱困實繫安危臣聞古之名将雖在征行必須屯田趙充國諸葛亮是也古之良吏必課農桑以足民黄霸虞詡是也方今曠土多㳺民衆乞明勅有司無蹈虚文嚴升降之法選能吏勸課公私皆得耕墾富者備牛出種貧者傭力服勤若又不足則教之區種期于盡闢而後已官司圉牧勢家兼并亦籍其數而授之農民寛其負算省其徭役使盡力南畆則蓄積嵗増家給人足富國強兵之道也宣宗深然之元世祖時趙天麟上䇿曰臣聞稻粱黍稷絲枲布帛極今古以咸資貫人神而並用口非匏瓜終日不可不再食身無毛羽卒嵗不可不製衣一夫不耕天下有受其飢者一婦不織天下有受其寒者若使男不逋畆以盡地利女不下機以盡人力則豈有飢寒不足之人哉我聖朝若稽古道既立司農司又令臨民官兼管内勸農事凡以當務之為急也然天下有無田可耕之家有有田不耕之者所以凍餒之人尚衆乞匄之人尚多臣謂四民之勞苦天下之大本莫過於農家而已夫士人學以居位勤而不勞者也工人作巧成器勞而不苦者也商人通財鬻貨末而不本者也農人之閒暇惟冬而已矣於是晝爾于茅宵爾索綯亟其乗屋以待春陽播厥百榖以趂東作三之日于耜四之日舉趾霑體塗足瘁身龜手面塵不遑洗頭蓬不暇梳丁壯興功老弱饋食披星帶月夜不安眠冒雨衝風晝不啓處耕事未已而蠶事起矣懿筐採桑斧斨伐揚一月之間古人謂如寇盜之至非虚言也至於炎天熾火午日流金耘耨荒蕪用齊嘉種氣如㣲線汗若翻漿以至秋成而登塲築圃尚未知天意之或水或旱或豐或歉如之何也於是父母之仰事妻子之俯畜租稅之科納軍民之差役胥吏之侵漁繇役之費給鄉里之慶贈婚嫁之聘會宿負之還償田具之補置一年之計但望秋成一産之資破散不一故區區稼穡汲汲蠶桑計其經費選善者而鬻之而納之而折之其餘絲絮之荒穢者自衣之榖稻之秕糲者自食之設如年豐則一年辛苦而一時歡樂鷄豚社酒撃壌謳謡尚可道也儻遭水旱則雖號泣旻天孰救之哉将并田宅而鬻之矣雖然上至天子下至庶人不可一日無農家故曰四民之勞苦天下之大本莫過於農家而已也又按豳風有饁彼南畆田餕至喜之語盖皆百姓勸其事而愛其吏自願饎之非督使供食也今之勸農者皆自齎􅟿饟往說于田恐有汙濫之官因勸農而適野遂恣意以宣驕飲食非膏粱先之以怒詈酒醴非多㫖繼之以鞭扑饜其腹於胥吏投其酸於鷹犬名為勸農適所以擾農也臣竊傷農家之勞苦憤官吏之搔擾顧天下之大本伏望陛下軫於睿慮重此農桑躬耕籍田后親蠶以先之凡農家之孝弟力田者鄉三老具實舉之免其人當年所耕田租稅之半凡民恃富無他故而有田不耕有桑不蠶者鄉三老具實舉之就於當年倍科其閒田之租稅凡民老幼有田不能耕有桑不能蠶者令下之後限一年須要雇停客户完置牛具違限者如無故不耕蠶之例凡勸農官管内有田桑無故不耕蠶者委廉訪司察勸農官而罰之凡逃户田桑令下之後限一年官為召人耕蠶違限則委廉訪司察勸農官而罰之凡勸農官皆可自具飲食若以後復有搔擾農家者委廉訪司察之如受賄之罪罪之可也如是則官皆慎勸民皆力耕男有餘粟女有餘布矣天麟又䇿曰臣聞祭祀者人之大端衣食者人之常理上自天子下至庶人據此之務不可闕也今聖朝天開吉慶人沐鴻厖立太常之正卿設司農之大寺職尸三禮望重三農欽乃攸司可謂備矣但以籍田之禮尚未施行公桑之儀似猶虧闕至如郊天祀祖奚為其豐潔之粢盛有事致齊何以得鮮明之衣布則将發倉廩而取粟向坊局而取衣是皆農夫之所樹藝紅女之所繰織雖有籍田而實非陛下之所耕也雖備服物而亦非后宫之所出也以之對越神祇享于祖禰道或未盡禮不徒成陛下之心能無少歉謹按禮經之義逺稽前世之文適三陽交泰之春當是月上辛之日祈榖于太㣲之帝再擇乎吉亥之辰封人壝宫掌舎設祇太僕秉轡保介從行綴黛耜于紺轅冠朱紘之華冕平秩東作爰至南郊具庶府之官僚聳萬民之瞻視天顔咫尺際恭就於三推黎庶三百人遂終于千畆公卿以下随爵秩而亦耕燕飲之宜布龍光于既返内宰獻穜于厥后神倉斂穫于西成一旦用之中心足矣此天子籍田之禮也載按古經之文周逹王后之制衣服不備不敢以祭天子有公桑之地地逼于川築蠶室于其旁建后宫于其上宫髙一丈棘繞垣墉外户扇而掩之逢大昕而崇此禁伐桑柘因其植筐后妃齋戒而臨焉斨斧由斯而動矣浴蠶乎水戾葉乎風蠶卒眠矣嵗既單矣吉婦之勤就矣奉繭獻于后矣后於是而言曰此以為君服與遂副褘而受之因少牢以禮之復詮良日后乃親繰手既三盆事終群下染之以𤣥黄朱緑為之黼黻文章君王致祭從而服之此后妃公桑之制也其文可考厥義甚明舉而行之可謂易矣此禮似輕而實重此制似小而極大盖所以荅祖宗之功徳盡祭祀之至誠知稼穡之艱難先天下以務本也伏望陛下無怒虢公之直諫式同漢帝之親耕于彼天田成兹盛事南瞻北頋三思粟帛之原上化下行一警農民之意於昭文化以迓太平垂諸典章永示嘉範更望中宫協聖傚古親蠶大増助日之月光深盡配乾之坤厚隂功浩浩陽報明明守恒徳以無疆獲泰亨之常定如此則下使田家之赤子傚父母以服勤上獲宗廟之靈神喜真誠而垂祐矣歴代名臣奏議卷一百十一
