body:
  text: 歴代名臣奏議卷二百九十九明楊士竒等撰灾祥宋仁宗天聖五年右司諫劉隨上奏曰臣聞天地定位隂陽運行二氣至和萬物資始且上天不言不能自治遂生聖人以治之聖人至尊不能獨治遂求賢明以佐之苟聖人推誠以御下賢臣盡忠以事上刑罰當其罪爵賞合其宜賦役均平暴横不作天地之間無一夫不獲無一物失所則至和之氣為豐年為祥瑞為安寧為夀考其或刑不當罪賞不當功勞役不時賦斂繁重君子在下而未見進用小人在位而未聞屏黜侵壊綱紀怨讟並興有一於兹足傷和氣氣或繆戾則為凶年為水旱為災沴為疾疫自古常然甚猶影響今則兩宫明聖信任大臣一日萬㡬宵衣旰食刑必審謹恩無偏私誠宜嵗必豐穰物無疵癘而乃去年大水包山襄陵墊溺居民傷害禾稼今年經夏時雨甚愆早苖欲乾晩田未種兼聞磁州大水損壊城池仍知河北數州蟲蝗作孽繆戻若此必有其由竊慮執政大臣措置失所遷除之際或異至公聽受之間或容獻佞或崇不急之務或縱詭隨之情循黙自安彌縫或爽又慮凡關百執官守因循事有依違或公行請託侵剥及於苛細喜怒由於愛憎刑獄之中不無寃枉賦役之内豈盡公平或慮諸路使車州郡守長縱侵漁之吏刻剥下民聽狡獪之胥飜覆事實或支移折變有所不均或配率科須不從出産以容姦爲大體以受欺爲吉人贓濫之徒善承迎而無失清㢘之士踈取奉以致嫌則有互掩瑕疵指爲和睦巧詞詭詐目爲能官詢求若訪於吏人善惡遂乖於審實是以紀綱失序寃訴不伸如此之徒十常五六積其湮欝有傷至和水旱蟲螟殆因此作臣賦性愚昧備位諫官參校古書比方時事上塵聽覽伏竊兢惶伏乞將臣此言宣示兩地究其事𩔖何吝改更拾遺補闕臣之職業六年隨又論星變䟽曰臣聞在天成象在地成形上自帝王降及輔相宰制萬物感應天文是以政教紊於下則躔次變於上自古聖帝明王兢兢業業不敢私縱者畏天命也若政有失而不改天垂戒而不懼者危亡之道也近者天象變異驚駭群情避殿曲赦深叶古典臣雖不知星緯之術備觀史䇿之文謫見於天警誡人主伏自兩宫臨御于兹七年體貌大臣延納直亮觸鱗犯諱者未甞加罪巧言令色者必察其非恭儉仁慈動遵典禮故得上下無壅華夷乂安闕政無聞咎將安在臣晝夜思慮疑者二焉切慮邪佞小人急圖富貴顧其資望未得陞遷致有潜結姦雄宻爲表裏謀傾䧟於端士期進用於明時不思撓敗國家且務致身榮逹稍萌凶慝亦動星辰前史稱太白食昴白虹貫日者皆古人精思宻謀之驗也惟望聖慈深加審察邪謀不入災異自消兼慮三聖在天百孫繁衍定王之外封冊未行雜於庶寮之間班在附馬之下北使每至無以威示逺方聖祖貽謀實欲本支茂盛因循歲乆未舉典章百官固有嗟嘆三聖豈無動念伏望聖慈於皇族中選其賢明依唐朝故事封嗣王郡王三五人以應祖宗之意用固盤石之基其次選用大臣必從公議古者詢於卿士謀及庶民審重之至也至於才髙位下公議所歸或因例合遷乆未陞奬者亦乞申命兩府次第舉行昔者宋景善言祅星乃退商湯自責化爲豐年而況太后聖明皇帝慈儉上天變異不足憂虞臣職在諫垣殊無器識敢陳狂瞽不避靈誅貼黄臣伏見唐堯至聖有四凶在朝大舜繼明方乃誅逐是知小人君子自古並生君子多則小人衰而天下治小人多則君子衰而天下危自古離亂甚多太平甚少其故何也蓋佞言似忠謀身巧計是以小人多獲進用直言正色邪佞憎嫌是以君子多遇讒謗此乃邪正各異故相憎也失於防察禁制漸難故書曰爲君難爲臣不易也今兩宫明聖君子道行小人之心皆不遂志多方求進或受貨財保證姦邪上惑天聽伏乞聖慈特加防察七年玉清昭應宫災太廟齋郎蘇舜欽上䟽曰臣聞烈士不避鈇鉞而進諫明君不諱過失而納忠是以懐䇿者必吐上前蓄寃者無至腹誹則上下之情不鬱教令之出恱隨然言之之難不如容之之難容之之難不如行之之難有能言之則必容之容之則必行之如此則欲治之主三代之迹也願陛下留意焉臣伏覩今歲自春徂夏霖雨隂晦未甞少止農田被菑者幾於十九民情嗷騷如昏墊焉臣以謂近位之失人政令之多過賞罰弗公之所速也天之降災欲悟陛下陛下反謂刑獄濫寃之致故肆赦天下以救之殊不念如此則殺人者不死傷人者不扺罪其爲濫寃則又加甚古者決斷滯訟以平水旱不用赦也故赦下之後隂霾及今前志曰積寃生隂積隂生陽陽生則火災見焉乘夏之氣發洩於玉清宫震雨雜下烈焰四起樓觀萬疊數刻而盡誠非慢於禦備乃上天之深戒也陛下當降服減膳避正寢責躬罪已下哀痛之詔罷非業之作拯失職之民在輔弼無裨國體者去之居左右竊弄威權者去之精心念政刑之失虚懐收蒭蕘之言庶幾變災以答天意辰浹之間不聞有此告諭竊知陛下將計工役再謀興修都下之人聞者駭惑徃徃聚首横議咸謂非宜皆曰章聖皇帝勤儉十餘年天下富庶帑府流衍無所貯藏乃作斯宫及其畢功而海内爲之虚竭陛下即位未及十年數歲連遭水澇雖征賦咸入而百姓頗甚困乏若大興土木之功則費用不知紀極財貨耗于内征役勞于下内耗下勞何以濟矣況天災之已爲之是欲競天無省已之意逆天不祥安已難任欲祈厚貺其可得乎豈天譴告而陛下弗寤邪豈知而固爲之邪豈再造祈天之祐邪臣不得反覆而量也今爲陛下計者莫若采吉士去佞人姑務修德以勤至治使百姓足給而寛其征稅則可以謝天意而安民情矣夫賢君見變能修道以除凶亂君無象天不譴告今幸得天見之變是陛下修道之日豈宜忽哉昔漢宣帝三年茂陵白鶴館災下詔曰廼者火災降於孝武園館朕戰栗恐懼不燭變異罪在朕躬群有司又不肯極言朕過以至于斯將何寤焉夫茂陵不及上都也鶴館不大此宫也彼尚降詔四方以求已過是知古帝王急治如此夫火不炎上之罰正爲是焉臣謹按前漢五行志云賢佞分别官人有叙帥由舊章禮重功勲如此則火得其性矣若信道不篤或耀虚僞䜛夫昌邪勝正則大失其性矣自上而降及濫炎妄起燔宗廟燒宫室雖興師而不能救故魯成公三年新宫災劉向謂成公信三桓子孫之䜛逐父臣之應襄公九年春宋災劉向謂宋公聽䜛逐其大夫華弱奔魯之應也今宫災豈得亦有是乎願陛下共黙而内省之省而既知之願陛下悔過而追革之罷再造之勞役行古先之典法非惟大光基構亦天下之幸甚也臣愚妄之言不足益國體之萬一陛下茍容而行之三代兩漢之風指顧而可致也景祐五年河東地震舜欽詣匭上䟽曰臣昨初到京師聞河東地大震裂涌水壊屋廬城堞殺民畜幾十萬歴旬不止臣始聞惶駭疑惑竊思自編策所紀前代衰㣲䘮亂之世亦未嘗有此大變方今四聖接統内外平寧隣敵交歡兵革偃息固與夫衰㣲䘮亂之際頗異是何災變之作反過之耶且妖祥之興神實尸之各以𩔖告未甞妄也臣以謂必無是事是亦傳言之濫耳歴問一二朝士皆曰有之因退思念天人之應古今之鑒大可恐懼凡朝廷政教昏迷下受其弊積隂欝不和之氣上動於天天於是爲下變異以警戒之使君人者回心省脩翻然向道則民安而災息是故古之王者逢天地之變則必避正寢徹樂省饌詢訪正議考求失德而更去之盖以上帝聦明所作必驗茍弗知懼則非常之孽隨之今此異既告豈徒然哉則王者豈常安於逸豫信任近狎而不省政事乎廟堂之上執事者豈有非賢才或專威福而侵君者乎其所施設之政豈有不便於民者乎深宫之中豈有隂教不謹或以媚道濫進者乎西北二邉豈有竊萌背盟棄信之心者乎念自從逺方來不知近事心雖疑而口不敢道宫禁邉防之事固未可知朝廷已然之失則聽輿論而有聞焉又訝朝廷知此大異殊不脩補闕政以厭天戒而安民心黙然不恠如平常無事時諫官御史亦不聞進牘白見鋪陳災害之端以開上心然民情洶洶聚首横議咸有憂悸之色豈時與古不同今朝不宜倣古以爲事耶又念有天下者未有監古而亂棄古而治也豈上位者務在鎮静不須與民同憂耶則又民爲邦本未有本揺而枝葉不動者豈民愚暗不當憂而憂耶則地之震天之所爲也民雖愚天豈愚哉反復思之不覺驚怛流汗自以世受君禄身齒國命涵濡恵澤以長此軀便欲盡吐肝膽以拜封奏又昨見范仲淹以剛直忤姦臣果罹中傷言不用而身竄謫甚可悲也是時降詔天下不許越職言事臣今茍務激切不避權右必恐横遭傷害無補於時因自悲嗟不知所措既而孟春之初雷電暴作臣以謂國家之失衆臣無有爲陛下言者唯天丁寧以告陛下也陛下極聖至明其肯忽之果能霈發明詔許臣寮皆得獻言臣初聞之踴躍欣抃又謂雖有災異陛下能講求嘉言革去時弊故可變化而召善祥也旬餘日來聞頗有言事者其間豈無切中時病而絶不聞朝廷從而行之是亦示虚言而不根實効也臣聞唯誠可以應上天唯實可以安下民今應天不以誠安民不以實徒布空文増人太息耳將何以謝神靈而救弊亂也豈大臣䝉塞天聽不爲陛下行之豈言事者迂闊無所取不足行也此則未可知今臣竊見綱紀隳敗政化闕失其事甚衆不可槩舉謹條大者二事詣匭以聞伏望陛下少賜觀覽茍有所采乞斷自睿意即時行焉言或狂瞽乞付臣斧鑕以非所宜言罪之一曰正心夫治國如治家治家者先脩於已脩已者先正於心心正則神明集而萬務理也今則民間喧傳陛下數年已來多引俳優賤人於深宫之中燕樂無莭賜予過度燕樂無節則志荒蕩賜予過度則心侈泰志荒蕩則政事不親心侈泰則用度不足臣竊觀國史見祖宗逐日視朝旰昃方罷猶坐於後苑門上有白事者立得召對委曲詢訪少善必納真宗末年不豫始間日視事今陛下春秋鼎盛實宵衣旰食求治之秋而乃隔日御殿此政事不親之効也今又府庫匱竭民鮮盖藏誅斂科率殆無虚日三司計度經費二十倍於祖宗時此用度不足明矣政事不親而用度不足斯大可憂也伏望陛下脩已以御人洗心而鑒物勤於聽斷舍其燕安放棄優諧近習之纎人親近剛明鯁正之良士因此災變以思永圖効祖宗之勤勞惜社稷之廣大則天下之幸甚也二曰擇賢夫明主勞於求賢而逸於任使然盈庭之士不須盡擇在擇一二輔臣及御史諫官而已今陛下用人似不慎擇昨王隨自吏部侍郎轉門下侍郎平章事超越十資復爲上相此乃非常之恩必待非常之才而王隨虚庸邪諂非輔相之器降麻之後物論沸騰故疾纒其身災仍於國此亦天意愛惜我朝陛下必鑒之又石中立頃在朝行以詼諧自任士人或有宴集必置席間聽其言語以資笑噱今處之近輔不聞嘉謀物望甚輕人情所忽使災害屢降而朝廷不尊盖近臣多非才者陛下左右尚如此天下官吏可知也實恐匈奴輕笑中國伏望即時罷免别建賢才臣又竊見方今以張觀爲御史中丞髙若訥爲司諫此二人者皆登髙第本望以詞華進用素復温和軟懦無剛鯁敢言之才斯皆執政引拔建置欲其慎黙不敢舉揚其私時有所言必暗相關說旁人窺之甚可笑也故御史諫官之任臣欲陛下親擇之不令出執政門下臺諫官既得其人則近臣不敢爲過乃馭下之䇿也臣以謂陛下身既勤儉輔弼臺諫又皆得人則天下何憂不治而災異何由而生伏望陛下少留意焉非有難也臣不勝區區之至時玉清昭應宫災繫守衛者御史獄御史中丞王曙恐朝廷議修復上言昔魯桓僖宫災孔子以爲桓僖親盡當毁者也遼東髙廟及髙園便殿災董仲舒以爲髙廟不當居陵旁故災魏崇華殿災髙堂隆以臺榭宫室爲戒宜罷之勿治文帝不聽明年復災今所建宫非應經義災變之來若有警者願除其地罷諸禱祠以應天變仁宗感悟遂減守衛者罪已而詔以不復繕脩諭天下滕宗諒遷殿中丞會禁中火詔劾火所從起宗諒上䟽諫曰伏見掖庭遺燼延熾宫闥雖沿人事實繫天時詔書亟下引咎滌瑕中外莫不感動然而詔獄未釋鞫訊尚嚴恐違上天垂戒之意累兩宫好生之德且婦人柔弱箠楚之下何求不可萬一懐寃足累和氣祥符中宫掖火先帝甞索其𩔖寘之法矣若防患以刑而止豈復有今日之虞哉況變警之來近在禁掖誠願修政以禳之思患以防之凡逮繫者特從原免庶災變可銷而福祥來格也䟽奏仁宗爲罷詔獄知諫院包拯戒興作䟽曰臣伏見十一月初二日夜上清宫火謹按春秋傳例曰人火曰火天火曰災漢書五行志曰人火天火同爲災異皆以朝廷政令參驗得失而勸戒焉說者曰賢佞分别官人有序則火得其性若信道不篤惑耀虚僞則火失其性自上而降濫焰妄起是爲火不炎上今上清宫者乃祖宗修建以崇無爲之德今火燔之者豈焚修之人不務精潔以副陛下嚴奉之㫖乎不然其天意垂誡於陛下乎固宜勵精治道謹修人事以荅天變可也風聞道路云陛下存留道衆似有繕脩之意未辨虚實咸懐危懼況天下多事調發旁午帑藏未實邊鄙未寧豈可先不急之務重無名之率哉且宫觀之興自於唐室非古制也若謂先聖真容理當欽奉則景靈宫會靈觀殿宇宏壯可以奉安願陛下推仁慈之德念疲敝之俗且務安之之理豈忍重困之也然外議紛紜頗甚惑衆欲乞特降詔告諭以安衆心拯又論日食䟽曰臣伏見四月旦日當薄蝕陛下特降德音親决庶獄飭身修政以應天變此誠古之聖后明辟克謹天戒之至意也臣聞漢書云夫至尊莫大乎天天之變莫大乎日蝕蓋日者陽之精人君之象也君道虧爲隂所乗故蝕日者德也月者刑也故聖王日蝕修德月蝕修刑詩云彼月而蝕則惟其常此日而蝕干何不臧說者云月蝕非常比之日蝕固常也日蝕則不臧矣然正陽之月法尤忌之由是有伐鼓用幣之事故人君或遭兹變必避殿徹膳克已責躬明君臣正上下延納衆議以輔不逮如是之至也今正陽之月晻然日蝕而又亢陽益甚火災繼作害孰大焉得非上天有以丁寧垂誡於陛下耶伏望陛下奮乾剛之至惪畏天地之大異發號施令審思乎利害賞德罰罪無間於踈昵聽㫁不惑勤儉爲先抑隂尊陽防㣲杜漸然後日御便殿博延公卿詢訪直言講求古道勵精爲治以荅天戒如此則積異消於上厲階絶於下足以導迎善氣馴致太平惟陛下留神省察拯又論星變䟽曰臣竊見歲星逆犯房宿近鈎鈐之位于今月餘未順按天官云房四宿爲明堂天子布政之宫亦曰四輔股肱將相位也北二小星曰鈎鈐房之鈐鍵天之管籥主閉鍵天心其房心於辰在昴主豫州宋之分野夫五星者五帝司命應王者號令爲之莭度歲主歲事爲其統首好生惡殺安静中度則吉變色亂行則不爲福或有淩犯淹留不去咎在仁德未修誅罰未當若犯房宿亦責在將相之不稱職者伏況國家盛德在火歲火二矅俱爲福星房心又是宋之分野今歲德失度逆守于房復近鈎鍵之次徘徊未退本意亦謂人君指意欲有所爲而未得其節也乃上天之意所以篤佑聖宋丁寧陛下如是之至夫變異之來各象過失以譴告人主猶嚴父之明戒可不寅畏恐懼乎古之明王必正五事建大中以承天心能應以德則咎息不能應以善則災至要在所以應之應之之速非誠不立非信不行伏望陛下奮精剛之德挺獨斷之明内推至誠深思天戒以天下至大祖業至重不可謂承平無事而可以佚豫爲治外則邊防之大戎狄可憂内則機務之煩紀律不振況今政失於寛而敝在姑息官弛於茍簡近下詔命澄汰流品而才者未之進不才者未之退蓋有司務在因循憚於甄選爾且方内治亂在陛下所任經曰亦惟先正克左右未有左右正而百官枉者也中外臣僚其有老懦貪殘苛刻姦佞不當居職者宜以時廢退益選温良惇厚之士寘之於位令海内昭然知本朝之所貴豈不休哉然後掖庭之中簡去幽曠宦豎之内裁抑重任發號施令在乎必行賞德罰罪在乎不濫振舉綱目杜絶萌漸如此則災異消於上禍難息於下五緯循軌四時和順召天地之協氣致邦家於永寧願陛下力行而已臣本以孤危不知忌諱惟陛下不以位踈言賤留神省察則天下䝉幸拯又上謹天誡䟽曰臣竊見近者太白犯月於箕尾之分熒惑犯鎮星於虚危之分而又冬雷震發雨木成冰博詢前聞固不虚發臣謹按歴代五行志曰太白犯月月犯太白熒惑犯鎮星皆外寇之兆雨木成冰者說者謂上陽施不下通下隂施不上逹故雨木爲之氷氷者隂之盛木者少陽貴神卿大夫之象亦曰木氷爲木介介者甲兵之象又曰冬雷者所發之地主兵謂雷以二月出八月入也今季冬而震雷雨雹者陽不閉藏而發泄皆失節之異夫月者太隂之長后妃大臣諸侯之象亦主邉境鎮星所管宋衛陳鄭之分若金火淩犯固不爲福況又箕尾屬燕虚危屬齊設或内非其應則北邊之患山東之憂亦須大爲之防且頃歲有星孛之異近復有巨嵎之震不可忽也今四方災旱流亡未復雖遣使綏撫貸粟賑給而上下困竭濟䘏攸艱此乃天意篤右聖宋丁寧陛下如是之至也書曰厯象日月星辰此言王者當仰視天文俯察地理觀日月消息候星辰躔次揆山川變動叅人民謡俗以考休咎若見災異則退而責躬恐懼修德以應之有不可捄者則蓄儲備以待之故宗社享無疆之福伏望陛下省災異之來驗休祥之應謹奉上天之戒以揆當時之務外則幅員之廣邉警寇盜之可虞内則機政之繁號令賞罰之未信固宜進擢賢傑振張紀律廣闢衆正之路屏絶群枉之門斥逺姦纎眘重聽納近自宫禁逺及邊陲杜漸防微中外協濟如此則庶幾後患可弭惟聖度裁處拯又論地震䟽曰臣近聞登州地震山摧今又鎮陽雄州五月朔日地震北京貝州諸處蝗蝻疊生皆天地先意示變必不虚發也謹按漢五行志曰地之戒莫重於震動謂地者隂也法當安静今乃越隂之職專陽之政其異孰甚焉又四裔者中國之隂也今震於隂長之月臣恐四裔有謀中國者且雄州控扼北鄙登州宻邇契丹今繼以地震山摧不可不深思而預備之也頃歲并代地震尋以昊賊拒命近者廣南英連等州亦震而蠻寇内侵皆必然已應之兆耳臣近曽上言㳂邊將帥尤在得人乞委執政大臣精選素習邊事之人以爲守將俾訓練卒伍廣爲積聚以大警備之不然懼貽陛下之深憂也況災變之作未有無其應者惟陛下特留聖意拯爲户部判官時上䟽曰臣竊見冬春以來天下旱乾爲虐而陛下避殿徹膳累下詔書勤求直言踈理刑獄寛省民力雖古之聖帝明王責躬罪已無此之甚焉故詔音所至甘澤随降和氣應於上民心恱於下天意聖德若合符契當上穹眷佑之如是則陛下尤宜勵精求治以荅殊貺臣聞法令者人主之大柄而國家治亂安危之所繫焉不可不慎縁近歲以來賞罰之典或尚因循且人知法令之不足信則賞罰何以沮勸乎昔唐文宗問宰臣李石天下何以易治李石對以朝廷法令行則易治誠哉治道之要無大於此伏望陛下臨決大政信任正人賞者必當其功不可以恩進罰者必當其罪不可以幸免邪佞者雖近必黜忠直者雖逺必收法令既行紀律自正則無不治之國無不化之民在陛下力行而已亢旱之災天之常數固不足貽陛下深慮惟陛下留神省察天聖中天下水旱蝗起河決滑州通判常州謝絳上䟽曰去年京師大水敗民廬舍河渠暴溢幾冒城郭今年苦旱百姓疫死田穀焦槁秋成絶望此皆天異也按洪範京房易傳皆以爲簡祭祀逆天時則水不潤下政令逆時水失其性則壊國邑傷稼穡顓事有知誅罰絶理則大水殺人欲德不用兹謂張厥災荒上下皆蔽兹謂隔其咎旱天道指𩔖示戒大要如此陛下夙夜勤苦思有以上塞時變固宜䇿告殃咎變更理化下罪已之詔脩順時之令宣群言以導壅斥近倖以損隂而聖心優柔重在改作號令所發未聞有以當天心者夫風雨寒暑之於天時爲大信也信不及於物澤不究於下則水旱爲沴近日制命有信宿輙改適行遽止而欲風雨以信其可得乎天下之廣萬機之衆不出房闥豈能盡知而在廷之臣未聞被數刻之召吐片言之善朝夕左右非恩澤即佞倖上下皆蔽其應不虚昔兩漢日食地震水旱之變則䇿免三公以示戒懼陛下進用丞弼極一時之選而政道未茂天時未順豈大臣輔佐不明邪陛下信任不篤邪必若使之宜推心責成以極其效謂之不然則更選賢者比來奸邪者易進守道者數窮政出多門俗喜由徑聖心固欲盡得天下之賢能分職受業而宰相方考資進吏無敢建白欲德不用之應又可驗矣今陽驕莫解蟲孽漸熾河水妄行循依違之迹行尋常之政臣恐不足回靈意塞至戒古者穀不登則虧膳災屢至則降服凶年不塗塈願下詔引咎損大官之膳避路寢之朝許士大夫斥諱上聞譏切時病罷不急之役省無名之斂勿崇私恩更進直道宣德流化以休息天下至誠動乎上大惠浹于下豈有時澤之艱哉仁宗嘉納之絳又上言蝗亘田野坌入郛郭跳擲官寺井堰皆滿魯三書螟穀梁以爲哀公用田賦虐取於民朝廷斂弛之法近於㢘平以臣愚所聞似吏不甚稱而召其變凡今典城牧民有顓方面之埶才者掠功取名以嚴急爲術或辯僞無實數䝉奬錄愚者期㑹簿書畏首與尾二者政殊而同歸於弊夫爲國在養民養民在擇吏吏循則民安氣和而災息願先取大州邑數十百詔公卿以下舉任州守者使得自辟屬縣令長務求術略不限資考然後寛以約束許便宜從事朞年條上理狀或徙或留必有功化風迹異乎有司以資而任之者焉漢時詔問京房災異可息之術房對以考功課吏臣願陛下博訪理官除煩苛之命申敕計臣損聚斂之役勿起大獄勿用躁人務静安守淵黙傳曰大侵之禮百官備而不制言省事也如此而沴氣不弭嘉休不至是靈意讕而聖言罔惑歟景祐四年太安殿柱生芝草召群臣就觀監察御史鞠詠上言曰陛下新即位河決未塞霖雨害稼宜思所以應災變臣願陛下以㧞進忠良退斥邪佞爲國寶以訓勸兵農豐積倉廪爲天瑞草木之怪何足尚哉右司諫韓琦上奏曰臣近聞西京南京及畿内諸縣遣使䟽決刑獄金明池等亦設齋醮此必司厯者陳垂象之變以獻于上使陛下聖懐欽翼勤懇如是雖古先哲王覩之感悟飭身正事無以過也臣去歲中不曉禁忌嘗進狂瞽以謂上穹譴告惟増修德政可以除患而致福若禮神宥過即伸禳謝殆非方冊所載消伏災眚之義前奏粗悉不敢煩述今又聞金芝産於化成殿柱率詔近列咸覩嘉事臣竊以春秋之法但紀災異至于祥瑞略而不書豈不以君人者閱瑞牒則意安覩災符則心懼意之安則其政怠心之懼則其德修聖人垂誡之深其㫖斯在臣愚伏望陛下開發聖慮特以天戒爲重於政教之間思所未至隨其變以應之亦猶日食修德月食修刑之理是也至如珍祥竒瑞雖陛下仁聖所感亦望日謹一日以雖休勿休爲念則穹昊垂貺荅陛下寅畏之心生靈遂宜浸陛下慈惠之澤自然家給人足時和年豐永獲上瑞之報豈不盛歟琦又上奏曰臣聞動民以行不以言應天以實不以文先儒之讜議也故宋景公以熒惑守心不忍移臣庶之咎子韋稱君有至德之言熒惑必徙三舍此則以實應天之效也唐明皇以太陽虧蝕悉令赦徒𨽻之人宋璟謂可以至誠動天不在德音頻降此則以文應天之弊也載籍所記前範至詳不敢煩陳粗此槩舉臣伏覩近者興國寺災延及開先祖殿不踰數刻但有遺燼伏觀垂象或失經行蓋人事之已形致天災之嗣發其猶影響諒非徒然當是時臣謂陛下宜虚佇以求讜言側身以修庶政有功則賞以絶其徼幸之路有罪則罰以清其姦慝之原旌别賢愚撙節財用抑宴私過度之樂休營造不急之務決獄使之無濫出令斷於必行斯以念祖業之艱難荅天意之警悟也而陛下眷三京以肆赦宥走群望以罄詞祝中自禁掖外及觀寺並設齋醮逮越晦朔今北道數郡繼以地震上聞即命使軺就崇法供矧兹近塞俯接殊邦豈無間諜之人徃道祈禳之事徒彰自恐或誚無稽雖陛下欽順皇天之誠可謂至矣其於銷伏災眚之道則猶未焉夫弛刑網以貸頑悖之民損國貨以奉㳺惰之軰將欲召丕貺感靈心是猶却行以求前揚湯而止沸無益之驗信昭然矣臣茍隠情惜已不能獻忠盡言使陛下常以禮緇黄薦牲幣爲脩德除患之本則臣豈不上負陛下懼災思政之意哉謹按五行傳曰火南方揚光輝爲明者也其於王者南面嚮明而治賢佞分明官人有序率由舊章愛重功勲則火得其性若乃信道不篤或耀虚僞䜛夫昌邪勝正則火失其性自上而降乃濫炎妄起焚宗廟燒宫館雖興師衆不能救也此臣前所謂宜辨賢諂明賞罰謹命令戒奢逸者由此而言也曷有流化興政之若是而天不降福者哉且地震者說者以謂天陽也地隂也陽君象隂臣象君宜轉動臣宜安靜乃女謁用事臣下專政之應此乃飭宫壼禀教臣鄰奉法以當斯變又四裔者亦中國之隂也今震在北或恐上天孜孜譴告俾思邉隅之爲患乎亦望自今而後務在嚴勵守臣宻修兵備審擇才謀之帥悉去懦弱之士明軍法以整驕惰之卒豐廪實以増儲峙之具或曰今敵人守盟誓約甚固奉朝廷有禮初無釁隙保不騷動未可生事以疑戎心此寛陛下宵旰之憂可也爲國計則踈矣臣辭意狂鄙不識禁忌儻陛下聽斷之暇一紆睿覽采而行之少助萬分之一則臣退就鈇鑕死無所恨琦又論星變䟽曰臣近者竊聞星變數見輙貢瞽見備言禳謝之理殆將百日不賜妄言之誅是陛下知臣所陳歸於朴忠而非惑上好訕也然臣意有所未盡更思竭愚區區鄙誠萬一開悟臣近日又聞大慶殿及諸處復建道塲及分遣中使徧詣名山福地以致精禱臣以謂陛下俯從常禮不得已而爲之是亦逹寅亮之深㫖也臣竊以天垂祅象地見災異前世之君覩之感悟以爲祈禳之法則必徹樂減膳修德理刑大則至有下詔以求讜言側身以避正寢是以天意恱穆轉禍爲福臣願陛下法而行之復恐此後宫中或有宴飲之事欲望比於常時稍用減節不獨仰奉於天戒斯實上安於聖躬臣子之心所以昧萬死而獻言者正爲是也且大慶殿者國之路寢朝之法宫陛下非行大禮被法服則未嘗臨御臣下非大慶㑹則不能一至於庭豈容僧道凡庸之人繼日累月喧雜于上非所謂正法度而尊威神也昔髙宗立皇太子將㑹命婦於宣政殿博士袁利諫曰前殿正寢非命婦宴㑹之地望請命婦㑹于别殿自可備極恩私帝納之即命移于麟德殿臣亦望今後凡有道塲設醮之𩔖並於别所安置臣親逢求諫之朝復在可言之職宜推無隠思所爲報願陛下特霽天威一加詳納天下幸甚琦又論星變地震冬無積雪䟽曰臣旬日前竊聞民間傳言星躔示變及京師曽有地震之異亦聞朝廷建置道塲臣自忝諫職數因災變陳事意謂陛下粗記臣言故遷延未敢更獻愚瞽數日來又聞河東忻州地震連日大壞官私舍宇傷損人命臣慮陛下近歲以來頻有災異而常事待之且未足多掛聖念但齋醮道塲而止臣是以不敢無言更思云補臣聞以實應天則天必報以德勝妖則妖自息今上穹頻頻謫見以感陛下蓋欲觀變而懼増修德政則將轉禍而爲福豈其虚發哉若陛下以爲無足可驗不思警悟之理或上天倦而且怒則黙而爲禍矣今躔次之變知星者必具言其事至于地震之理稽于舊史則大臣專政後宫用事陽不足而隂有餘之應也今朝廷凡百行事皆由政府陛下雖知其是非而不加聖斷亦大臣專政之應後宫之事非外臣所知亦望禁其太盛以荅天變臣願陛下每覩災異先詳其理而應之然後省身之所未思而思政之所未至夫崇儉約以訓九族而純德變於天下節宴游以謹萬機而勤政率於天下亦修身之大畧也輔弼得人而庶務協其序賞罰得中而二柄歸於上邊陲廣備而將帥擇其材亦修政之大畧也陛下若舉其要而行之則上天豈不降福而何災沴乎況陛下首相乆病髙卧私室備禮上章無堅退之意安禄固位上不分聖憂下不畏人言假令病愈而出則中書之事必更無倫理蓋才短識暗而然也陛下豈不思求才而代之使修正紀綱亦禳謝之一端也又今冬以來尚無積雪旬浹之間將及春序不惟已覺愆旱兼恐人民疾疫欲望陛下躬行精禱庶獲嘉應今舉朝之人皆以不言爲利無一人爲陛下切直而言者臣非不知直言爲患然選任之恩不欲碌碌雷同衆人故昧死論列不顧鼎鑊之罪惟望少采狂愚天下幸甚琦又論衆星流散月入南斗䟽曰臣竊聞近日司天監上言占見衆星流散又奏月入南斗中臣職在諫列得於風聞不敢隱情惜已容黙於位實願輸盡愚瞽有補萬分之一焉臣聞人事失于下則天變發于上惟明聖之君覩之感悟責躬修德所以除患而福至是猶影響相應之速也而朝廷自去年秋熒惑失度及太平興國寺災乃命䟽理繫囚自大慶殿至諸寺觀並集僧道以爲禳謝之法繼之以地震北郡遣使興建道塲近者又聞太隂失行復詔三京減降罪人於金明池等處亦設齋醮臣屢上封奏極言無益所期庸妄之說少聞聖聦而前月中杭州又奏有大風雨悉壊官司廬舍復有獻謀于陛下者乃降敕本郡崇佛事以禳之外方有識之士必有非笑者焉陛下若以災異數見非政教之失但可竭財以奉僧道寛禁以貸罪惡是謂天戒可荅靈心必回則今日之謫見又何從而致哉今天之譴告孜孜不已者得非陛下未逹警悟之意耶夫赦者前賢以爲偏枯之物非明世之所行也茍行之則小人之幸而君子不幸矣又金銀錢帛出自蒼生膏血取之以供國之用尚宜撙節又況枉費以資㳺惰之僧道乎以陛下之聦明睿智諒乆知其不可今若再舉禳災之術復踵前敝適足誤陛下也臣不敢妄究星緯但取前史所載開陳其端夫月爲太隂之精刑罰之義列之朝廷諸侯大臣之象也故大臣用事兵刑失理則月行乍南乍北又南斗者丞相太宰之位主褒賢進士選授爵祿若小流星百數四面行衆庶流移之象也今天之所戒者恐宰輔之任未副聖心褒賢授祿或失其宜故太隂罰斗以應之夫代天當軸之臣未副聖心則政教浸隳矣政教浸隳則隂陽失和而水旱移時水旱移時則衆庶流移之患亦從而至矣漢史曰宰相上佐天子燮理隂陽戴記曰邇臣守和言近臣調和君事者也今聞政府議事未甚和協互執所見或有違戾即如近斷一大刑名此特有司之事又復别㫖議定於理明白而猶固執紛競上煩聖斷豈大臣之體哉廟堂之上論道之際必有甚於此者固非下臣所知矣如此而望隂陽調君事和政不失于下變不形于上其可得乎方今之宜莫若注意賢宰協輔朝政使其同心一意推用所長然後賞罰二柄更思其中謂名器不可輕授也則賞不加於無功謂紀綱不可寖弛也則刑必行於有罪知財貨之有限也則量用度而裁減之知軍旅之乆惰也則明號令而約束之一令之出必信於人一言可嘉必用其計盡平僥倖之路精辨愛憎之言推此以斷天下之務則陛下髙居穆清垂拱而治太平之基既隆且固矣雖有象緯之變流行之災自當易而爲嘉祥散而爲和氣矣芻蕘賤言不曉禁忌思有報君父甄擢之遇非敢訐上而取直也唯陛下熟察之琦又論石龜䟽曰臣聞通利軍奏衛縣民得石龜一其上䥴刻䜟文略云道士趙永昌於顯慶元年鐫記後至三百六十五年出現時有聖君治世皇后劉氏今有聖子紹位觀其文字鄙俗固不能上惑天聽臣竊計唐髙宗顯慶元年至國朝天禧四年方及三百六十五年蓋是當年造僞人妄求恩倖有此刋刻後恐事迹彰敗是故隱而不言至今又經一十八年方爲縣民所獲即於䜟文自已乖謬陛下至明至聖固已洞鑒其妄即縁却降下本處軍資庫收附乃是未詳真僞猶示秘藏臣恐中外聞知有以來欺詐之漸欲乞特降聖㫖下本軍令知軍當面毁弃訖奏所貴僞端不起群聽無疑臣以其事雖小而於體大故敢上言琦荅詔論地震春雷之異䟽曰臣伏聞陛下以災變頻數已降詔敕敷求讜言此乃陛下警悟天戒憂勞聖心普率之間不勝至幸臣備位諫列近因災變之發累上宻封既愚且忠無敢畏避事頗明白未見裁納臣慮應詔而言者雖不即加之罪而言者亦不用其說則是與詔意相戻而於朝政何益哉臣欲望陛下應有臣寮應詔上言一一親垂聖覽事如可行即望早加聖斷或所見非長及辭渉詆訐亦望寛而不問庶成陛下引咎思政之德以期上穹順道爲福之應臣前數有所陳伏惟陛下以一臣之言所見褊淺未能符合聖意臣愚不勝忠憤再貢狂直更不敢廣有引援煩瀆上聽但直述當今未便陛下可行者凡十事具别狀實封進納又詔書以謂或政教未臻於理刑獄靡協于中在位有壅蔽之人效官有貪墨之吏仰諫官御史搢紳百寮宻䟽以言臣竊以四海至廣非一人耳目所能徧接若只許在朝臣寮論奏實恐言路未廣臣欲乞頒示天下亦許所在官吏依詔言事附逓聞奏琦又上别狀曰臣伏聞降御札求讜言輙有狂鄙之見不敢文飾上瀆聖覽謹直述其事條列如右一政府大臣乞選用忠正有才識之人則紀綱自正陛下仰成而無憂如有不堪其任者望早加聖斷皆從免罷使時政日新天下咸恱一賞罰二柄本君上執之以馭天下若無功者受賞有罪者不罰是猶寒暑相違而望歲功之可成也臣欲乞凡行賞罰務協中道或陛下聽斷之際知其可賞則賞之知其可罪則罪之使畏愛出於宸衷無令國之二柄專爲臣下所持而任其威福一近日戚里之家多因入内之際或無功而望遷轉或無能而求錫賚唯圖僥倖殊無厭足況莊獻太后朝尚曾懲戒豈陛下睿明當宁而不抑其奔競欲望特降詔諭嚴行止絶如有譴犯重加貶責一今之國用不足者敝在於浮費不節所入者有限而所出者無涯遂令内外帑廪皆未充贍臣欲望凡百用度務令儉約及乞差公正才識近臣與三司詳定減省冗費一自茶法改更以來連年將銀絹配率河北人户坐此困竭明出却内庫物帛暗虧却舊額課利欲望選差公正近臣參定酌中之法以濟經用一朝廷備禦之急唯在西北二邊其如牧守將帥多非其材而士卒訓練未至修整亦望宻諭兩府大臣常切體量二邊牧守將帥不堪其任者易之更用才畧武幹之人以壯國威御兵之法務從嚴整無令益其驕惰一竊以陛下萬機之暇當有宴飲之樂所以寛憂勞而慰㳺豫也然頻數則有妨政事無益聖躬亦望節之有度則天下幸甚一宫掖之間女御之衆豈無繁冗徒在幽閉望選其無用之人放令出外以消隂盛之變一臣寮中有以言獲罪貶責者若心本獻忠非挾邪近詐之人欲望復其職任使言路彌廣人思盡誠一消變之法惟修德以禳之則天道感應自古皆然若齋醮道塲實不可恃以求福亦望特賜開悟更思節減太常丞同修起居注判三司鹽鐵勾院直史館葉清臣以京師地震上䟽曰天以陽動君之道也地以隂静臣之道也天動地靜主尊臣卑易此則亂地爲之震乃十二月二日丙夜京師地震移刻而止定襄同日震至五日不止壊廬寺殺人畜凡十之六大河之東彌千五百里而及都下誠大異也屬者熒惑犯南斗治厯者相顧而駭陛下憂勤庶政方夏泰寧而一歲之中災變仍見必有下失民望上戾天意者故垂戒以啓廸清衷而陛下泰然不以爲異徒使内侍走四方治佛事修道科非所謂消復之實也頃范仲淹余靖以言事被黜天下之人齰舌不敢議朝政者行將二年願陛下深自咎責許延忠直敢言之士庶幾明威降鑒而善應來集也康定元年清臣爲右正言知制誥上奏曰臣聞王者上承天之所爲而下以正其所爲君政有治亂天應有災祥蓋天人相與之際繫君德之感通奉天子民義實一體昌治之世未必無災欲治之主能以德應則變災爲福衰亂之世未必無祥庸暗之主德不能堪則反祥爲妖故治亂災祥不可常在德之厚薄耳仲尼脩春秋記災異之大者日食地震爲先班固述漢史記日食之對則變見三朝爲尤異者今月正元日日有食之不幸昌治之辰遂有尤異之變豈合朔之㑹適當然耶意上天譴告有所屬耶伏惟陛下纘隆慶基謹守先訓兢兢業業十八年于兹四方底寧萬物咸遂百工脩輔衆績咸熈信治世矣然而天變如是之大必有申警以啓聖神臣嘗學舊史歴考前志日陽德也君道也月隂德也臣道也薄食必於朔望日月之交㑹也㑹而不食陽勝隂也其在詩曰彼月而食則惟其常此日而食于何不臧是則陽德君道或有所虧則日爲之食又曰敬天之怒毋敢戲豫敬天之渝毋敢馳驅是則天變於上君變於下恬不爲變其禍滋甚臣謂推筴之初逆知當食陛下宜出次徹膳伐鼓用幣百官守司爲營救之禮庶幾天悔其咎隂不爲眚今謫已見救不可追則當亟下責躬之詔開敢諫之路使講求隂所以勝陽所以虧之理後增其所虧損其所勝猶冀萬一可厭天戒其在易曰君子終日乾乾夕惕若厲無咎凡言無者言本有咎以能補過故得無咎然習常茍䛕之人必曰此常數也不足以爲盛德之累茍内朝左右之臣以此安聖慮外廷進對之臣以此紓官責臣恐非敬天之怒而失補過之義前歲河東地震頻年大白晝見考占辨應稍稍著驗今爲此變豈妄發耶伏惟陛下深思災異之大博咨政教之闕舉賢良方正能直言極諌之士待以無諱使之極言言或切至采而行之此之謂能以德勝妖變災爲福者臣幸以譾薄親逢盛旦職在詞掖官居諫省闚管有得敢不罄竭明者之擇庶可錄焉天下幸甚景祐四年侍御史知雜事龐籍上奏曰臣聞應天以實不以文動人以行不以言所以天意順感而人心恱隨也伏惟陛下躬仁聖之至德紹積累之慶基亨嘉式應文武並用邊隅不聳年穀屢登然而秋冬以來雷雪不時流星爲異今又地震并忻之郡傷殞人命甚可駭也推本天戒必有厥由以陛下恭儉寅畏動遵軌範宜不當招致災眚臣竊思之恐在時政有所差失人情有所壅蔽也將欲應乎天而動乎人必當求其實而篤其行誠在陛下與執政之臣力行之也力行之道莫若先正其綱紀恭以祖宗垂業典刑具在守而勿失可臻至治將外制四海當首自京師故三聖以來因事立制凡百司務皆著條敕所以禁踰越塞僥倖也向來或因一時爲例而破之或因臣下營私而廢之法既動揺政或隳紊而欲訓齊諸司規表天下難矣故要在執政大臣持守之也持守之者要在以身律人先國後家以求賢之意爲急以子孫之計爲末至公既立誰敢爲私然後可以守畫一之法使無踰越塞私謁之路使無僥倖施恩必平不以勢地爲異罰罪必當不以惠姦爲寛國之紀綱此實至要在力行之而已至於前代因天地之異莫不廣求厥理而消復之下罪已之詔開直言之路人情暢於下則天理順於上此誠今之切務未聞朝廷行之恐但用釋道齋醮之文無所益也臣迹孤地寒材駑識闇上頼陛下天地父母之恩獲立忠義之地敢冒天威輙陳愚悃者亦犬馬之思報也惟陛下矜憐而察之寶元元年守尚書刑部員外郎直史館同知太常禮院宋祁上䟽曰臣聞王者父事天明毋事地察政合而祥至道失而咎臻自然之應也然至亂之世不能絶祥甚治之代不能無咎僻君以祥自泰故益侈而趣亡賢主以咎脩德故愈畏而䝉祉則祥無必慶咎無固凶視銷伏之如何耳臣伏見頃歲以來災眚數見依𩔖託寓異占同符天本視法而尊乃有躔離流星之變地當安固而静乃有都國震動之占陛下奉承郊丘歲豐月潔當䝉介福翻致大異何哉得非事有召奸法有階隙天於宋室諄諄存顧先幾豫慮以啓聖心欲陛下据易圖難縁微警著奮揚剛德固執主威厭銷未萌以光丕業也臣伏讀前史五行志以驗于今累威重譴不可不察若乃群星流散則民人蕩析之象也月行黄道地震州邑則邊戎窺間臣下擅恣后妃將盛年穀且飢之兆也去年火焚興國寺浮屠延燔藝祖神殿已而盜壊宗廟釦器者再則神不昭格之意也自昔災異之發逺者十數年近者三四年隨方輙應𩔖無虚已陛下何不暫槩清慮推求其端方今典刑設張上下禔穆而臣便論危事必難取信然陛下試一念之假有蕩析以何䇿固安假有飢空以何理振救脫致窺間可任之將謂誰儻令擅恣可防之奸有幾災異不驗國之福也茍使遂驗則陛下禦之之慮得不素具於彀中哉然請先言其要臣聞君以操柄爲重臣以奉命爲恭柄捨之則重者反輕命竊之則恭者更僭伏惟陛下念爵賞之典刑罰之權雖覽群言一決宸慮無委成假借以開貴近牽制之私書稱惟辟作福惟辟作威夫威福者天子之所以固大寶制兆人之術臣有作福作威則害于而家凶于而國古之王者亦何能使刑悉當罪賞皆值功然要之事出于主則納忠者有歸政出於臣則樹私者必搆傳曰倒持太阿言柄之不可失也又曰吐珠必含言失之不可收也若夫後宮戚里祈恩丐賞者日月不乏陛下且當斷而不聽以示至公内省黄門給事左右亦宜數加訓戒使思不出位此皆助陽抑隂之術也臣聞伯禹三王之長逢辜引慝宣王成周之良思患側身故能感徹神祗収還威怒回沴氣爲太和化已衰爲中興陛下覽照今古至詳至熟今變眚日著中外暴聞而罪已之問不形於詔書思患之謀不留於詢逮委遠天戒虚而未荅踰時越月群下黙然間者但引緇黄晨齋夕咀脩不經之細祀塞可懼之大變人且未信天胡可欺臣誠至愚竊恐銷伏之間未爲得計也伏望陛下不以災之未應遂爲宴安不以歲之屢豐便忘荒饉普詔百執各貢所懐庶幾天下條貫粲然先見臣無任瞽狂待罪之至祕書省著作佐郎通判睦州張方平上䟽曰臣伏覩丙午詔書以星文流變坤載震揺先春而雷衆異間作陛下惕然戒懼思所以當天意爰下明詔誕告庶官凡上躬之闕遺政刑之闕失阿枉之黨䝉罔爲姦咸使宻䟽以言悉心無隱約之親覽靡及有司臣伏覩詔書悵然感慨逺惟祖宗造基立法之勤先帝持盈垂裕之意勅天之命撫此下人無疆惟休亦無疆惟恤陛下天資神智英叡聦明紹隆基圖恭承帝事治民祗畏罔自暇逸嚮若僕臣皆正股肱惟良協心弼違將順其美陛下可以髙揖成康之上徐歩唐虞之域惜乎人主有仁明之德人臣乏輔翼之材因循蔽欺偷取一切治而無法弊不謀救沴氣成象變咎洊臻遑遑焉獨貽憂於陛下也臣愚孤逺學識踈陋猥逢詔㫖詢于芻蕘謹稽探天人之情參合古今之論上原厥罰之本下陳致治之方儻日月之明照此心之忠義斧鑕之下免報讎於權强是由陛下至明豈獨微臣受賜惟陛下留神察臣狂言臣伏思詔書曰星文流變者臣鄙儒不通天官之學謹按前志說春秋星隕如雨爲王者失勢臣下專恣之應況紫垣太微上帝之座天子之庭列星布位近臣之象流移失次乃邇臣不恭其職相朋附下懐貳茍容不忠王室之咎也坤載震揺者臣竊考載籍厯世以還地震之異未有若今兹之甚者謹按前志陽伏而不能出隂廹而不能升於是有地震兹謂不隂夫坤爲隂體臣道也妻道也四裔之道也陽薄於隂而不能勝相乘而震且定襄之地直王城西北正在乾位君德所在天之警告夫豈虚發方春雷震者臣謹按前志雷當以二月出其卦曰豫言萬物因雷出地皆恱豫也以八月入其卦曰歸妹言雷復入地則孕育根荄保藏蟄蟲雷本陽氣有人君之象故先時而聲猶陽不閉藏發泄無度也又正月以來日䝉少光輙㦯數日不解臣謹按前志䝉如塵其蒙先大温已䝉日不見行善不請於上兹謂作福䝉微而風解復䝉下專刑兹謂分威䝉濁奪日光公不任職兹謂不出䝉一温一寒風揚塵知佞厚之兹謂蔽此䝉大略也臣聞上天無言示人以象人君省躬應天以實是故考政者必求於天瑞弭災者必推於人事天人之際其應甚明臣謹按春秋之義舉往以明來觀著而思微天地之變國家之事粲然皆見無所疑矣故夫星流而隕地震而裂先春而雷日䝉不解其咎皆由乎陽徳舒緩隂道專縱下爲阿比以蔽聦明者也臣愚不逹道敢因四變推明七事臣聞之書曰無敢伏小人之攸箴蓋言明王求理不遺下言也臣議雖鄙竊以爲今世之切務治道之至要難尚此矣陛下幸加惠不以臣之踈逺而廢其言天下幸甚何謂七事其一曰密機事二曰用威斷三曰廣言路四曰重圖任五曰正有司六曰信命令七曰示戒懼何謂宻機事臣聞之易曰君不宻則失臣臣不宻則失身機事不宻則害成故春秋之義譏君之漏言是以人臣造辟而對詭辭而出人君明以察之斷以行之慎之至也韓子云事以宻成語以泄敗臣比見群下之言事者深言切論陛下或播之於左右囊章宻䟽陛下多付之於有司凡國之庶政得失之跡莫不繫乎二府者故諸臣下之言其有指擿時病及諸治亂者則用事之臣必所不恱而陛下更暴其言而露其章縁是而䝉譴者有之矣此蓋陛下體貎大臣篤其誠於勿貳踈外群下忽其言之未然大臣固不可以忌疑下言固未可以輕信然亦在深思其意㫖徐察其情僞叅諸理道辨其臧否言茍可行自當聽納言之未善置而勿揚使下竭其忠効所見則姦謀僻行不萌于下嘉猷正論日聞于上致理之要何以先此今清問之對封奏之事開言爲怨府灑翰爲禍胎沮忠義之言成忌克之俗人悼後害孰敢獻納下情壅隔國之大禍也臣深願陛下先務此道以爲立政之本凡臣下入告之議宜斷在聖心清問之言姑慎於外泄念大易失臣之誡防春秋漏言之譏則天下有心之人皆爲陛下用也其二曰用威斷何謂也臣聞書洪範曰惟辟作福惟辟作威臣無有作福作威臣之有作福作威害于而家凶于而國故春秋之義譏鄭忽之弱以其挈於權臣也君人之柄惟賞與罰信賞必罰惟斷而已故乾體以剛天行以健故能中正無邪運用不息人君之徳配乾而法天者蓋取乎剛且健也以陛下之英明温叡而濟之以斷天下不足治也往年莊獻晏駕陛下親政革弊去蠧㧞材賞忠斷自淵衷不撓于下典刑立正區極一新天下翕然皆謂陛下天機如藝祖神畧如太宗萬世一時無窮之福也今者道路之言皆謂陛下寛厚敦恕徽柔廣容事存大體動循往例臣竊惑之此蓋怙權之臣摟取邦柄故說陛下以爲人主之孝莫大於奉先志守成規夫祖宗之所以建基圖垂謨訓炳如日星信如四時雖百世其可易諸至于操紀律明賞刑用正人去邪慝治不忘亂安不忘危以和其民人而保其宗廟此孝之大也且政由俗革彼此一時事體權宜各有云設或迹存而理異或法乆而姦生必踐而行以爲無改於祖宗之道尚安足以爲孝乎易曰窮則變變則通通則乆故復而不厭乆而不弊之謂道遵常守故非聖人之事因時損益乃建治之理昔先王之作爲爵禄賞罰臨事而制宜是以爲天下之主見勞授賞則衆譽不能進無功見惡行誅則衆䜛不能退無罪若政無大小人無大小弛張用捨一取諸例是爵禄賞罰不在人主而在簿書也予奪之柄於陛下何有一吏持簿書按例而足矣此蓋用事之臣自謀之慮不才而例進者收恩在已才而例退者歸怨于君人主欲賞抜忠良擢用才俊而用事之臣不恱者輙曰於例不可用事之臣猥引親舊妄援謬庸而人主欲詰其故輙曰於例宜然以致今兹臺閣混淆賢愚糅雜典刑都弛名器益輕于後執時柄者便於引例之說終無發明之言臣甞讀漢書至晁錯之事惟錯謀䇿宏逺逹於權義有致主經世之志戮於姦䜛之口而史氏不能襃其忠更譏以變古易常之說臣竊憤厲痛忠臣之難爲也臣又讀晉書至何曽之事誡其子曰吾每進見未嘗聞經國逺圖但道平生常語此非貽謀之道及身而已且曽爲上公圖之不建誰任其咎而史氏不能貶其罪更美以知幾先識之善臣竊惋悼痛䛕臣之誤國也嗟乎忠䛕之無報淑慝之不顯其已乆矣又可獨長嘆於兹乎臣愚伏願陛下奮乾威發天斷裁正無不忍之愛采拔罔踈賤之隔大稽諸古小度于今使天下之耳目常新萬務之本原必正無曰引例合義而已帝王之制不亦光大乎其三曰廣言路何謂也臣聞書美堯之德曰詢于衆春秋之義大君命譏大夫之專者今天下之士不思結知於人主思見知於貴臣願歸恩於强臣不願受恩於人主何歟得强貴之心者身不渉危而長保富貴䝉陛下之遇者立未及安而已罹禍咎今夫大臣有所薦論陛下重違其意或勉從之陛下之有眷遇者而大臣獨不能以陛下之故姑収其用必排而去之何陛下之待貴臣厚而貴臣之待陛下薄也而又多逐善人指爲鈎黨使陛下腹心無所寄耳目無所託姦無所發惡無所彰九重之深漸成孤立陛下天縱將聖知幾其神此理甚明豈其不悟昔漢魏相白去尚書副封以防壅蔽而宣帝得以知禍變之微爲漢明主唐太宗躬勤政理明於聽受著司馬式云其無門籍人有論奏者皆令監門司馬引對不許關礙又制大臣入論事輙令諫官隨入或對問之言有虧理道即從而諍之此唐文皇致太平之跡也至代宗時元載爲相邪慝不法懼爲人言因議凡群臣奏事皆先聞諸司長官關白宰相而後得上聞時顔真卿奏䟽曰徃日李林甫欺君擅權姦驕用事群下指言者率皆因事隂中傷之猶不敢顯爲條約以絶言路以爲元載之惡過於林甫也惟在陛下開延讜直虚心接納無限卑逺茍造膝而有益雖犯顔而必恕以通天下之志以成天下之務其惟廣言路乎其四曰重圖任何謂也臣聞書曰鄰哉臣哉此帝堯所歎以爲與已宻近之臣必有德也又曰欽四鄰此帝舜所歎以爲在已左右前後之臣必正人也故春秋之義以爲天子之宰通乎天下重之至也夫國之所謂大臣者莫尊乎宰相君爲元首宰相乃其股肱動静休戚義猶一體宰相之職朝夕王所論道官材圖議天下之政者也安有居宰相之位而足不至王庭面不見旒扆言不聞君聽者乎大臣疾病君爲之憂軫上醫治療内使臨問數賜告加恩意禮厚矣若其偃息卧家遂罷其朝謁曠時彌歲則未之有也伏以台司爲具瞻之地廟堂非養疾之所朝廷之儀不可慢社稷之重不可輕況今災釁洊作人心恟懼安危所繫實在柄臣伏願陛下爲宗社之大計畧恩禮之小節髙選德望考慎厥相應譴告於上穹示大公於天下且自災異之作陛下憂勞謙畏誕降德音舉諸闕政致誠罪已而元臣當國莫肯任咎茍安寵禄以妨賢路禮義㢘恥何以訓下自餘三事任政之臣志行忠邪材智深淺必料陛下知臣之明悉存乎聖慮矣其五曰正有司何謂也臣聞夫子曰必也正名乎春秋之義君不尸小事臣不專大名故尊者主要卑者任勞所以正位分明堂陛也人君逸於任使垂拱而治三公論政九卿分職群有司各事其事故端本而影直振領而襟整衆務百職各安其局今夫津官亭吏一命之微米鹽貨利毫秒之細莫不關決衡石煩黷天衷三公不脩其職而猥侵群有司之事群有司茍謀期課莫安所守上下姑息習以爲常偷慢懐安風俗益弊臣愚以爲方今國體所繫政府而下分職之重臺省備矣而豸冠乏匪躬之士蒲規鮮替否之言當衡鑑者循資格而無賢愚之别絶勸賞澄清之義運計籌者張空簿而責錐刀之末無斂散輕重之權政失其本事忘其舊其所召弊由來漸矣臣愚伏願陛下少運神智詳思世務諸如此弊宜有興改撮其機要謹其關柅莫若擇任三吏切摩治本使夫捴百揆者則謀用庶官之長列庶長者則各選衆職之任付之柄而責其効盡其才而要其成官守典司無相侵紊有廢厥職必正于罰如此則陛下優游太紫之上執賞罰之柄而群下莫敢不奔走其職庶務肅然而理矣其六曰信命令何謂也臣聞書曰慎乃出令令出惟行夫命令者以簡爲重以信爲本簡則易從信則必行易從則不犯必行則可乆此之謂爲國之要爲政之經臣比見朝廷出令或尋即衝改或俄復停廢吏易之而奉行不固民忽之而茍慢多違揆大體而論之此害政之深者夫滋彰召乎巧詆文煩所以法輕今條令重累盈乎几閣自明習者不能徧覩況郡縣承用者乎陥愚惷於亡辜羅元元之不逮其咎由乎格令之煩多而不信故姦吏因縁而爲市也臣請今後凡諸臣有請改釐條制審覆勘㑹益加詳慎無稽之言勿聽弗詢之謀勿庸俾萬姓咸曰大哉王言又曰一哉王心自然民無起詐之端吏息侮文之巧祥刑善制咸中有慶矣其七曰示戒懼何謂也臣聞書曰惟天降災祥在德而吉凶不僭在人是故或無災以傾其邦或有災以興其國無災者驕怠所以起有災者戒懼所由生故堯湯遭水旱之期中髙有桑雉之異一則以有備而無患一則以脩德而弭妖今兹之變亦在陛下惟德之脩而已承弼之臣戒其權重者侍從之臣戒其阿䛕者帷幄宻近之任戒其用事之勢掖庭嬪御之嬖戒其燕溺之惑服羞戒其過制優戲戒其蕩心嗇用無小侈費無微念四方惟正之供憫小人作業之勞至于邊防之守兵食之備器乘之用將帥之材臣謂宜皆存乎聖慮矣故臣曰惟備之戒此其槩矣夫脩省之方惕厲之意雖陛下兢兢夙夜不忘于懷然天下之人莫之知也按春秋左氏傳晉梁山崩晉侯召伯宗而問焉對曰山崩川竭君爲之不舉降服乘縵徹樂出次祝幣史辭以禮焉今震讁之異衆變重累何啻乎山川之災臣愚以謂陛下宜於常禮有所降損齋居澄慮深思天意揆隂陽之道察政教之闕其在陛下者臣願陛下勿恡其失必易其度其在臣下者臣願陛下内斷於心明正其罰俾彞倫咸叙以邀天之福則七世之廟傳裕於無窮烝民之生率同於慶賴矣臣位卑而言髙有陵越之尤迹踈而意忠有激訐之咎但使臣言一經聖覽微悟主心幸以㳙塵於國家而有補則雖鼎鑊捐軀命而不辭干冒天威臣無任􅈭切待罪之至方平請因郊廟致誠以謝災異䟽曰伏以禮行于郊乃陛下所以恭事天地嚴配祖宗而對越百神者也故非多儀備物之爲貴在乎外致精䖍内盡誠志而已自景祐五年郊禮之後災異數作三辰失次于上五行作沴于下水旱流災于内盗賊侵寇于外臣伏思陛下自攬寶圖其難其慎恭儉之德率已無懈愷悌之化視民如傷宜乎三靈降休萬國戴仰而天人之際未爲順叙者蓋由左右中外百司庶職不能協心將救輸誠徇公上承聖猷以臻至治臣聞禹湯罪已其興也勃焉禮曰陽感天不旋日陽者君也言人君若發心致誠上感於天其爲響荅速不逾日臣願陛下惟災異之來其必有以因時郊祀齋居穆清上思祖宗付授基業之重下思生民託命賴慶之意逺思前代邦家興亡之故近思朝廷紀綱得失之體内思宫禁帷幄左右之蔽外思西北邊疆侵軼之患捴此六思深存逺念晝則思之於匕筯夜則思之於几席至于入廟與祖宗相見登壇與神祇相接因蠲潔之薦致精䖍之誠引咎在躬祈天永命以示陛下知上天告戒丁寧之意庶乎上天知陛下寅畏修省之心則感應之來必不旋日勃興之福不獨在乎禹湯竊惟宸衷明發攸憲愚陋所見豈能忖度縁臣職在規諫志存禆益近慮所及期必上逹而已慶厯六年方平爲翰林學士權御史中丞又上奏曰臣伏見諸路地震自荆湖川峽山東河北陜西至于嶺表相繼未止比者忻州地震之後兵難及今適當此際登萊山崖摧圮災異所示恐不徒然厯考前志之言蓋地主隂隂者臣道也民也四裔也推之今日凡任内外之重即無權强之臣則今事之可憂者外備蠻夷而内撫民爾西北二邊朝廷以爲大患故於守禦素爲用心至如湖湘之間蠻猺作梗一方塗炭七年未解近日衝突稍及嶺外如或不即平殄事亦不可輕忽而又南海交阯氣燄漸張路接邕容頗連溪峒南方之事理須經畧昔唐室之盛屢有中原之難蕃戎再入京城而王室尋復寧定至懿宗時安南都護李瑑失於撫御蠻寇侵擾遂致用兵度支困於饋食方鎮疲於更戌因而有徐州龎勛倒戈之變天下縁此以至危亂則知事常起於細微禍常成於所忽也至如京東西兩路中國根幹畿甸屏蔽緩急所資常須安静以鎮天下然每患寇賊淵藪其中所幸歲得豐穰必不大至連結若因之以邊警加之以飢饉法不勝於姦宄亂必始於鄉閭何以言之自慶厯初遣朝臣分徃京東西路等招刺强壯弓手宣毅軍俄又聽其傭人自代于時臣知諫院固争此事朝議已行不爲停罷今民力所以大困國用所以一空蓋由此一舉之失也其諸州宣毅悉聚㳺惰不逞之民非有材力技勇之所程選也後縁光化軍賊竊發朝廷條約失體姑息過當如養驕子轉生怨懟臣比在審刑諸州奏到宣毅兵士文案無月不有大則謀官吏刼倉庫小則謀欲刼民户入山林多至三五十人少亦一二十數以告賞之科重故有謀輙被告發間雖教閱乃同兒戯無益軍器坐竭官私不征不役居惟念亂脫乗釁間必有應響之勢此其亂階一也初定强壯已屢經教閱槍刀弓弩各常學習及後招刺之時既聽傭人充代而其强壯本身並無身力例各不劭農業遂樂惰㳺攪擾里閭侵淩細弱趨坑冶以逐末販鹽茶而冒禁儻縁凶歉搆扇流民結爲盜賊必先此𩔖唐之黄巢由此起者此其亂階二也又京東西之民多信妖術凡小村落輙立神祠蚩蚩之氓惑於禍福徃徃奔凑相從聚散逓相蔽匿官不得知惟知畏神不復憚法寖使滋蔓恐益成俗漢中平元年黄巾賊天下同日起凡三十六萬衆各有部帥由積妖而成也晉盧循軰乃厯代常有此事此其亂階三也所謂地震之異儻在民與蠻夷此其最可慮者潭州劉䕫清素士也恐非應務之才邕桂長吏尤宜推擇才畧宣毅冗兵漸謀消汰之術民之先在强壯籍者其干法冒禁謂須别立峻防頗聞民間猶多當時所教兵仗亦合嚴降約束収納入官村落神堂令所在毁折宻加察捕民之習妖者此亦思患豫防之大畧伏冀採納施行劉敞上奏曰臣竊聞朝議以元旦合朔欲自二十一日避正殿臣以謂天明雖有可畏之道然亦當稽古率禮然後爲允按三代之典日食無預避之事左氏傳稱避移時曽子問諸侯入門不得行禮者日食居其一此皆覩有變而戒非蚤備也先王制禮過之者猶不及其制法先時者與不及時者均貴得中而已漢唐素服寢兵却朝㑹不視事及求直言大率皆在合朔之辰未有先時旬日者也兆憂太過春秋所譏今北使入朝逺方觀禮舉措失中或輕爲所覘伏乞詳求舊典折衷於禮厯代名臣奏議卷二百九十九
