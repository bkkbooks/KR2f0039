body:
  text: 歴代名臣奏議卷九十四明楊士竒等撰經國宋孝宗時建康府通判辛棄疾進美芹十論曰臣聞事未至而預圗則處之常有餘事既至而計則應之常不足敵人憑陵中夏臣子思酬國耻普天率土此心未嘗一日忘臣之家世受廛濟南代膺閫寄荷國厚恩大父臣賛以族衆拙於脫身被汙敵官留京師歴宿亳渉沂海非其志也毎退食輙引臣輩登髙望逺指畫山河思投釁而起以紓君父所不共戴天之憤嘗令臣兩随計吏抵燕山諦觀形勢謀未及遂大父臣賛下世粤辛巳嵗金亮南下中原之民屯聚蜂起臣嘗鳩衆二千𨽻耿京為掌書記與圗恢復共籍兵二十五萬納款于朝不幸變生肘腋事乃大謬負抱愚忠填欝腸肺官閒心定竊伏思念今日之勢朝廷一於持重以為成謀敵人利於嘗試以為得計故和戰之權常出於敵而我特從而應之是以燕山之和未幾而京城之圍急城下之盟方成而兩宫之狩逺秦檜之和反以滋金亮之狂彼利則戰倦則和詭譎狙詐我實何有惟是張浚苻離之師觕有生氣雖勝不慮敗事非十全然計其所䘮方諸既和之後投閒蹂躪猶未若是之酷而不識兵者徒見勝不可保之為害而不悟夫和而不可恃為膏肓之大病遂亟齚舌以為深戒臣竊謂恢復自有定謀非苻離小勝負之可懲而朝廷公卿過慮不言兵之可惜也古人言不以小挫而沮吾大計正以此耳恭惟皇帝陛下聦明神武灼見事幾雖光武明謨憲宗果㫁所難比擬一介敵人尚勞宵旰此正天下之士獻謀効命之秋臣雖至愚且陋何能有知徒以忠憤所激不能自已以為今日敵人實有弊之可乗而朝廷上䇿惟預備乃無患故罄竭精懇不自忖量撰成禦敵十論名曰美芹其三言敵人之弊其七言朝廷之所當行先審其勢次察其情復觀其釁則敵之虛實吾既詳之矣然後以其七說次第而用之敵固在吾目中惟陛下畱乙夜之神沈先物之幾志在必行無惑羣議庶乎雪耻酬百王除兇報千古之烈無遜于唐太宗典冠舉衣以復韓侯雖越職之罪難逃野人美芹而獻于君亦愛主之誠可取惟陛下赦其狂僭而憐其愚忠斧鑕餘生實不勝萬幸萬幸之至其審勢曰用兵之道形與勢二不知而一之則沮於形眩於勢而勝不可圗且坐受其斃矣何謂形小大是也何謂勢虛實是也土地之廣財賦之多士馬之衆此形也非勢也形可舉以示威不可用以必勝譬如轉嵌巖于千仞之山轟然其聲嵬然其形非不大可畏也然而塹畱木拒未容於直遂有能迂囬而避禦之至力殺形禁則人得跨而踰之矣若夫勢則不然有噐必可用有用必可濟譬注矢石于髙墉之上操縱自我不係于人有軼而過者抨擊中射惟意所向此實之可慮也自今論之敵人雖有嵌巖可畏之形而無矢石必可用之勢其舉以示吾者特以威而疑我也謂欲用以求勝者固知其未必能也彼欲致疑吾且信之以為可疑彼未必能吾且意其或能是亦未詳夫形勢之辨耳臣請得而條陳之敵人之地東薄于海西控于夏南抵于淮北極于䝉地非不廣也敵人之財簽兵于民而無飬兵之費靳恩於郊而無泛恩之賞又輔之以嵗幣之相仍横斂之不卹則財非不多也沙漠之地馬所生焉射御長技人皆習焉則其兵又可謂之衆矣以此之形時出而震我亦在所可慮而臣獨以為不足卹者盖敵人之地雖名為廣其實易分惟其無事兵刼形制若可糾合一有驚擾則忿怒紛争割據蜂起辛已之變蕭哲伯反于遼趙開反于宻魏勝反于海王友直反于魏耿京反于齊魯親而葛王又反于燕其餘紛紛所在而是此則已然之明驗是一不足慮也敵人之財雖名為多其實難恃得吾嵗幣惟金與帛可以備賞而不可以飬士中原廩窖可以飬士而不能保其無失盖敵政厖而官吏横常賦供億民粗可支意外而有需公實取一而吏七八之民不堪而叛叛則財不可得而反䘮其資是二不足慮也若其為兵名之曰多又實難調而易潰且如中原所簽謂之大漢軍者皆其父祖殘于蹂踐之餘田宅罄於搥剥之酷怨憤所積其心不一而沙漠所簽者越在萬里之外雖其數可以百萬計而道里遼絶資糧噐甲一切取辦於民賦輸調發非一嵗而不可至始金亮南下之時皆是誅脅酋長破滅資産人乃肯從未幾中道竄歸者已不可制則又三不足慮也又況金國今用事之人雜以契丹中原江南之士上下猜防議論齟齬非如前日尼雅滿烏珠輩之叶且骨肉間僭弑成風如聞偽許王以庶長出守於汴私收民心而嫡少嘗暴之於父此豈能終以無事者哉我有三不足慮彼有三無能為而重之以有腹心之疾是殆自保之不暇何以謀人臣抑聞古之善覘人國者如良醫之切脉知其受病之處而逆其必殞之期初不為肥瘠而易其智官渡之師袁紹未遽弱也曹操見之以為終且自斃者以嫡庶不定而知之咸陽之都會稽之㳺秦尚自強也髙祖見之以為當如是矣項籍見之以為可取而代之者以民怨已深而知之盖國之亡未有如民怨嫡庻不定之為酷敵今並有之欲不亡何待臣故曰形與勢異惟陛下實深察之其察情曰兩敵相持無以得其情則疑疑故易駭駭而應之必不能詳有以得其情則定定故不可惑不可惑而聽彼之自擾則權常在我而敵實受其弊矣古之善用兵者非能務為必勝而能謀為不可勝盖不可勝者乃所以徐圗必勝之功也我欲勝彼亦志於勝誰肯處其敗勝敗之情戰於中而勝敗之機未有所決彼或以兵來吾敢謂其張虛聲以耀我乎彼或以兵遁吾敢謂其非匿形以誘我乎是皆未敢也然則如之何曰權然後知輕重度然後知長短定故也它人有心予忖度之審故也能定而審敵情雖萬里之逺可坐察矣今吾藏戰于守未戰而常為必戰之待寓勝于敵未勝而常有必勝之理彼誠虛聲以耀我我以静應而不輕動彼誠匿形以誘我我有素備而不可以乗勝敗既不能為吾亂則固神閒而氣定矣然後徐以吾之心度彼之情吾猶是彼亦猶是南北雖有異慮休戚豈有異趣哉敵人情偽臣嘗熟論之矣蓋其性剽悍心不肯自閒逆之則怒怒而後戰順之則喜喜必致賂蓋怒我者忌我也喜我者狎我也彼何嘗不欲戰又何嘗不言和惟其實欲戰而乃以和狎我惟其實欲和而乃以戰要我此所以和無定論而戰無常勢也尤不可以不察曩者烏珠之死固嘗嘱其徒使與我和曰韓張劉岳近皆習兵恐非若輩所敵則是其情真欲和矣然而未嘗不進而求戰者計出於忌我而要我也劉豫之廢亶嘗慮無以守中原則請割三京亶之弑亮常懼吾有問罪之師則又謀割三京而還梓宫亮之殞褎又嘗緩我追北之師則復謀割白溝河以丈人行事我是其情亦真欲和矣非詐也未幾亶之所割視吾所守之人非其敵則不旋踵而復取之亮之所謀窺吾遣賀之使知其無能為則中輟而萌辛巳之逆褎之所謀悟有班師之失無意於襲則又反覆而有意外之請夫既云和矣而復中輟者盖用其狎而謀勝于我也今日之事揆諸敵情是有三不敢必戰二必欲嘗試何以言之空國之師商監不逺彼必不肯再用危道萬一猖獗特不過調沿邉戍卒而已戍卒豈有能必其勝此一不敢必戰也海泗唐鄧等州吾既得之彼用師三年而無成則我有攻守之士而敵人已非前日之比此二不敢必戰也契丹諸部側目于其後中原之士扼腕于其前令之雖不得不從從之未必不反此三不敢必戰也有三不敢必戰之形懼吾之窺其弱而絶嵗幣則其勢不得不張大以要我此一欲嘗試也貪而志欲得求不能充其所欲心惟務于僥倖謀不暇于萬全此二欲嘗試也且彼試欲戰耶則必不肯張皇以速我之備且如金亮始謀南下之時劉麟蔡松年一探其意而導之則麟逐而松年鴆惡其露機也今誠必戰豈欲人遂知之乎彼誠不敢必戰邪貪殘無義忿不頋敗彼何所卹以母之親兄之長一忤其意一利其位亮猶弑之何有於我況今沿海造艦沿淮治具包藏禍心有隙皆可投敢謂之終遂不戰乎大抵今彼雖無必敢戰之心而吾亦不可不防其欲嘗試之舉彼於髙麗西夏氣足以吞之故於其使之至也坦然待之而無他惟吾使命之去則多方腆鮮曲意防備如人見牛羊未嘗作色而遇虎豹則厲聲奮臂以加之此又足以見其深有忌于我也彼知有忌我獨無忌哉我之所忌不在于敵欲必戰而在于敵幸勝以踰淮而遂守淮以困我則吾受其病矣禦之之術臣具于守淮篇昔者黥布之心為身而不顧後必出下䇿薛公知之以告髙祖而布遂成擒先零之心恐漢而疑䍐开觧仇結約充國知之以告宣帝而先零自速敗薛公充國非有風角鳥占之勝枯莖朽骨之技亦惟心定而慮審耳朝廷心定而慮審何情不可得何功不可成不求敵情之知而觀彼虚聲詭勢以為進退者非特重困吾力且失夫制勝之機為可惜臣故曰知敵之情而為之處者綽綽乎其有餘矣其觀釁曰自古天下離合之勢常係乎民心民心叛服之由實基于喜怒喜怒之方形視之若未有休戚喜怒之既積離合始決而不可制矣何則喜怒之情有血氣者皆有之飽而愉煖而適遽使之飢寒則怨仰而視俯而育遽使之捐棄則痛寃而求伸憤而求泄至於無所控告則怒怨深痛鉅而怒盈服則合叛則離秦漢之際離合之變於此可以觀矣秦人之法慘刻凝宻而漢則破觚為圜與民休戚天下不得不喜漢而怒秦秦人則役繁賦重不卹而漢則寛仁大度務從簡約天下不得不喜漢而怒秦怒之方形秦自若也怒之既積則喜而有所属秦始不得自保遂離而合于漢矣方今中原之民其心果何如哉二百年為朝廷赤子耕而食蠶而衣富者安貧者濟賦輕役寡求得而欲遂今陷于敵彼視吾民如晩妾之御嫡子愛憎自殊不復顧惜方僭割之時彼守未固此訩未定猶勉強姑息以示恩時肆誅戮以賈威既乆稍玩真情遂出分布州縣半其部落分朋植黨仇滅我民民有不平訟之於官則彼常勝而我民則飲氣以茹屈田疇相隣彼人則強而奪之孳畜相雜彼人則盜而有之民之至愛者子孫簽軍之令下則貧富不問而丁壮必行民之所惜者財力營築饋餉之役興則空室以徃而休息無期有常産者困窶無置錐者凍餒民初未敢遽叛者猶徇于茍且之安而怵於積威之末辛巳之嵗相挻以興矯首南望思戀舊主者怨已深痛已鉅而怒已盈也金亮自知形禁勢格巢穴迥遥恐狂謀無成而竄身無所故疾趣淮上僥倖一勝以謀潰中原之心而求歸也此機不一再而朝廷慮不及此中原義兵㝷亦潰散吁甚可追惜也今而觀之中原之民業嘗叛敵敵人必不能釋然於其心而吾民亦豈能自安而無疑乎疑則慮患深操心危是以易動而輕叛朝廷未有意于恢復則已誠有意焉莫若於其無事之時張大聲勢以聳之使知朝廷儼然有可恃之資存撫新附以誘之使知朝廷有不忘中原之心如是則一旦緩急彼将轉相告諭翕然而起争為吾之應矣又況今日中原之民非昔日中原之民曩者民習於治而不知兵不意之禍如蜂蠆作于懷袖知者不暇謀勇者不及怒自亂離以來心安于斬伐而力閑於攻守敵人雖暴有王師為之援民心堅矣馮婦雖攘臂其為士笑之孟子曰為湯武驅民者桀與紂也臣亦謂今之中原離合之釁已開敵人不動則已誠動焉是特為陛下驅民而已惟静以待之彼不亡何待其自治曰臣聞今之論天下者皆曰南北有定勢吳楚之脆弱不足以争衡于中原臣之說曰古今有常理域外之人民不可以乆安于内地夫所謂南北定勢者粤自漢鼎之亡天下離而為南北吳不能以取魏而晋卒以併吳晋不能以取中原而陳亦終斃於隋與夫藝祖皇帝之取南唐取吳越天下之士遂以為東南地薄兵脆将非命世之雄其勢固至於此而蔡謨亦謂度今諸人必不能辦此吾見韓盧東郭㕙俱斃而已臣以謂吳不能以取魏者盖孫氏之割據曹氏之猜雄其徳本無以相過而西蜀之地又分於劉備雖願以兵窺魏勢不可得也晉之不能取中原者一時諸戎皆有豪傑之風晉之強臣方内自專制擁兵上流動輒問鼎自治如此何暇謀人宋齊梁陳之間其君臣又皆以一戰之勝蔑其君而奪之位其心盖僥倖于人之不我攻而所以攻人者皆其自固也至于南唐吳越之時適當聖人之興理固應爾無足恠者由此觀之所遭者然非定勢也且方今南北之勢較之彼時亦大異矣地方萬里而刼於金人之一姓彼其國大而上下交征政厖而軍民相怨平居無事亦規規然模倣古聖賢太平之事以誑亂其耳目是以其國可以言静而不可以言動其民可與共安而不可與共危非如晉末諸戎四分五裂若周秦之戰國唐季之藩鎮皆家自為國國自為敵而貪殘吞噬剽悍勁勇之習純用而不雜也且六朝之君其祖宗徳澤涵飬浸漬之難忘而中原民心眷戀依依而不去者又非得為今日比臣故曰較之彼時南北之勢大異矣當秦之時關東強國莫楚若也而秦楚相遇動以數十萬之衆見屠于秦君為秦虜而地為秦􅇕自當時言之是南北勇怯不敵之眀驗而項梁乃能以吳楚子弟驅而之趙救鉅鹿破章邯諸侯之軍十餘壁皆莫敢動觀楚之戰士無不一當十諸侯之兵皆人人惴恐卒以阬秦軍入函谷焚咸陽殺子嬰是又可以南北勇怯論哉方懷王入秦時楚人言之曰楚雖三户亡秦必楚夫彼豈能逆知其事之必至於此耶盖天道好還亦以其理而推之耳故臣直取古今常理而論之夫所謂古今常理者逆順之相形盛衰之相㝷如符契之必同寒暑之必至今敵人所以取之者至逆也然其所居者亦盛矣以順居盛猶有衰焉以逆居盛固無衰乎臣之所謂理者此也不然遐裔之長而據有中夏子孫又有泰山萬世之安古今豈有是事哉今之議者皆痛懲徃者之事而刼於積威之後不推項籍之亡秦而猥以蔡謨之論晉者以藉口是猶懷千金之璧不能斡營低昻而揺尾于販夫懲蝮蛇之毒不能詳覈真偽而褫魄于雕弓亦已過矣故臣願陛下姑以光復舊物而自期不以六朝之勢而自卑精心強力日與二三大臣講求古今南北之勢知其不侔而不為之惑則臣固當為陛下言自治之䇿今之所以自治者不勝其多也官吏之盛否民力之優困財用之豐耗士卒之強弱噐械之良楛邉備之廢置此數者皆有司之事陛下亦次第而行之臣不能悉舉也顧今有大者二陛下知之而未果行大臣難之而不敢發者一曰絶嵗幣二曰都金陵臣聞今之所以待敵以緡計者二百餘萬以天下之大而為生靈社稷計曽何二百餘萬之足云臣不為二百餘萬緡惜也錢塘金陵俱在大江之南而其形勢相去亦無幾矣豈以為是數百里之逺而遽有強弱之辨哉臣不為數百里計也然而絶嵗幣則財用未可以遽富都金陵則中原未可以遽復是三尺童子之所知臣之區區以是為言者盖古之英雄撥亂之君必先内有以作三軍之氣外有以破敵人之心故曰未戰飬其氣又曰先人有奪人之心今則不然待敵則恃驩好於金帛之間立國則借形勢於湖山之險望實俱䘮莫此為甚使吾内之三軍習知其上之人畏怯退避之如此以為金人必不可敵戰守必不可恃雖有剛心勇氣亦銷鑠委靡而不振臣不知緩急将誰使之戰哉借使戰其能必勝乎外之中原民心以為朝廷置我於度外謂吾無事則知自備而已有事則将自救之不暇向之袒臂疾呼而背金亮之令為吾響應者他日必無若是之㨗也如是則敵人将安意肆志而為吾患今絶嵗幣都金陵其形必至於戰天下有戰形矣然後三軍有所怒而思奮中原有所恃而思亂陛下間取其二百餘萬緡者以資吾飬兵賞勞之費豈不為朝廷之利乎然此二者在今日未可遽行臣觀敵人之情玩吾之重戰而所求未能充其欲不過一二年必以戰而要我茍因其要我而遂絶之則彼亦将自沮而權固在我矣議者必曰朝廷全盛時西北二敵亦不免于賂今我有天下之半而敵倍西北之勢雖欲不賂得乎臣應之曰是趙之所以待秦也昔者秦攻邯鄲而去趙将割六縣而與之和虞卿曰秦之攻趙也倦而歸乎抑其力尚能進且愛我而不攻乎王曰秦之攻我也不遺餘力矣必以倦而歸矣虞卿曰秦以其力攻其力所不能取倦而歸王又以其力之不能攻以資之是助秦自攻也臣以為虞卿之所以謀趙者是今日之勢也且今日之勢議者固以東晉自卑矣求之於晉彼亦何嘗棄金陵輸嵗幣乎臣竊觀陛下聖文神武同符祖宗必将陵跨漢唐撫有中夏然後為稱豈能欝欝乆居此者乎臣願陛下酌古以御今毋惑紛紜之論則恢復之功可必其有成古人云謀及卿士謀及庶人又曰作屋道邉三年不成盖謀貴衆㫁貴獨惟陛下深察之其守淮曰臣聞用兵之道無所不備則有所必分知所必守則不必皆備何則精兵驍騎十萬之屯山峙雷動其勢自雄以此為備則其誰敢乗離屯為十屯不過萬力寡氣沮以此為備則備不足恃此聚屯分屯之利害也臣嘗觀兩淮之戰皆以備多而力寡兵懾而氣沮奔走于不必守之地而嬰敵人逺闘之鋒故十戰而九敗其所以得畫江而守者幸也且今敵人之情臣固已論之矣要不過以邉兵而入寇幸成功而無内禍使之踰淮将有民而撫之有城而守之則始足以為吾患夫守江而䘮淮吳陳南唐之事可見也且我入彼出我出彼入曠日持乆何事不生曩者金人之将曰韓常劉豫之相曰馮長寜者皆嘗以是導之詎知其他日之計終不出于此乎故臣以謂守淮之道無懼其必來當使之兵交而亟去無幸其必去當使之他日必不敢犯也為是䇿者在於彼能入吾之地而不能得吾之戰彼能攻吾之城吾能入彼之地然而非備寡力專則不能也且環淮為郡凡幾為郡之屯又幾退淮而江為重鎮曰鄂渚曰金陵曰京口以至于行都扈蹕之兵其将皆有定營其營皆有定數此不可省也環淮必欲皆備則是以有限之兵而用無所不備之䇿兵分勢弱必不可以折其衝以臣䇿之不若聚兵為屯以守為戰庶乎敵來不足以為吾憂而我進乃可以為彼患也聚兵之說如何敵人之來自淮而東必道楚以趣揚自淮而西必道濠以趣真與道夀以趣和自荆襄而來必道襄陽以趣荆今吾擇精騎十萬分屯于山陽濠梁襄陽三處而於揚或和置一大府以督之敵攻山陽則堅壁勿戰而虗盱眙髙郵以餌之使濠梁分其半與督府之兵横擊之或絶餉道或邀歸途敵併力于山陽則襄陽之師出唐鄧以擾之敵攻濠梁則堅壁勿戰而虗廬夀以餌之使山陽分其半與督府之兵亦横擊之敵併力于濠梁而襄陽之師亦然敵攻襄陽則堅壁勿戰而虗郢復以餌之敵無所獲亦将聚淮北之兵以併力于此我則以濠梁之兵制其歸而山陽之兵自沭陽以擾沂海此正所謂不恃敵之不敢攻而恃吾能攻彼之所必救也臣竊謂觧雜亂紛糾者不控弮救闘者不搏撠批亢𢷬虗形格勢禁則自為觧矣昔人用兵多出于此故魏趙相攻齊師救趙田忌引兵疾走大梁則魏兵釋趙而自救齊師因大破之於桂陵後唐荘宗與梁相持於揚劉徳勝之間盖嘗蹙而不勝其後用郭崇韜之䇿七日入汴而梁亡兵家形勢從古以然議者必曰我知𢷬虗以進彼亦将調兵以拒進遇其實未見其虗是大不然彼沿邉為守其兵不過數萬既已厚屯于三城之衝其餘不容復多兵少而力不足謂能當我全師者又非其所慮也又況彼縱得淮而民不服且有江以為之阻則猶未足以為利我得中原而簞壺迎降民心自固且将不為吾守乎如此則在我者甚堅而在彼者甚瑕全吾所甚堅攻彼所甚瑕此臣所謂兵交而必亟去兵去而不敢復犯者此也嗚呼安得斯人而與之論天下也哉其屯田曰趙充國論備邉之計曰湟中積榖三百萬斛則羌人不敢動李廣武為成安君謀曰要其輜重十日不至則二将之頭可致者此言用兵制勝以糧為先轉餉給軍以通為利也必欲使粮足而餉無間絶之憂惟屯田為善而屯田盖亦難行國家經畫于今幾年而曽未覩夫實效者所以驅而使之耕者非其人所以為之任其責者非其吏故利未十百而害己千萬矣名曰屯田其實重費以斂怨也何以言之市井無賴小人惟其懶而不事事而廹於飢寒故甘捐軀于軍伍以就衣食而茍閒縱一旦警急擐甲操戈以當矢石其心固偃然自分曰向者吾無事而幸飽煖于官今焉官有事而責死力于我且戰勝猶有累資補秩之望故安之而不辭今遽而使之屯田則是無事而不免耕耘之苦有事而又履夫攻守之危彼必曰吾能耕以食豈不能從富民租佃以為生而輕失身于黥戮上能驅我于萬死豈不能捐榖帛以飬我而重役我以辛勤不平之氣無所發洩在畎畆則邀奪民田脅掠酒䏑以肆無稽踐行陣則呼憤扼腕疾視長上而不為用且曰吾自耕自食官何用我焉是誠未覩夫享成之利也鹵莽滅裂徒費粮種祇見有害未聞獲利此未為䇿之善如臣之說則曰向者之兵怠惰而不盡力向者之吏茍且而應故事不如籍歸正軍民釐為保伍擇歸正不釐務官擇為長貳使之專董其事且彼自敵中被簽而來耒耨之事盖所素習且其生同鄉井其情相得上令下從不至生事惟官之計其閒田頃畆之數與夫歸正軍民之目土人已占之田不更動揺以重驚擾歸正之人家給百畆而分為二等為之兵者田之所收則盡以予之為之民者十分稅一則以為凶荒賑濟之儲室廬噐具粮種之法一切遵舊使得植桑麻蓄雞豚以為歲時伏臘婚嫁之資彼必忘其流徙便於生飬無事則長貳為勸農之官有事則長貳為主兵之将許其理為資考乆於其任使得悉心於教勸而委守臣監司覈其勞績奏與遷秩而不限舉主人孰不更相勸勉以赴功名之會哉且今歸正軍民散在江淮而此方之人例以異壤視之不幸而主将亦以其歸正則求自釋於廟堂又痛事形迹愈不加卹間有挾不平出怨語重典已縶其足矣所謂小名目者仰俸給為活胥吏沮抑何嘗以時得嗚呼此誠可憫也誠非朝廷所以懷誘中原忠義之術也聞之曰因其不足而利之利未四五而恩踰九十此正屯田非特為國家便而且亦為歸正軍民之福議者必曰歸正之人常懷異心羣而聚之慮復生變是大不然也且和親之後沿江歸正軍民官吏失所以撫摩之惠相扳北歸者莫計當時邉吏亦皆聽之而莫為制此豈獨歸正人之罪今之畱者既少安矣更為屯田以處之則人有常産而上無重斂彼何苦叛去以甘敵人横暴之誅求哉若又曰恐其竊發且人惟不自聊賴乃攘奪以茍生誠豐飫矣何苦如是飢者易為食必不然也誠使果爾踈而逺之於江外不猶愈于聚乎内而重驚擾乎且天下之事逆慮其害而不敢求其利亦不可言智矣盖今所謂御前諸軍者待之素厚而飬之素優故驕驕則不可復使此甚易曉也若夫州郡之卒異于是彼非天子爪牙之故可以勞之而不怨而其大半出于農桑失業之徒故狎于野而不怨徃年嘗獵其丁壮勁勇者為一軍矣臣以謂可軰徙此軍視歸正軍民之數倍而發之使阡陌相連廬舍相望並耕乎兩淮之間彼其名素賤必不敢倨視歸正軍民而媒怨而歸正軍民視之猶江南之兵也亦必有所忌而不敢逞勢足以禁歸正軍民之變力足以盡屯田之利計有出于此者乎昔商之頑民相率為亂周公不誅而遷之洛邑曰商之諸臣乃湎于酒勿庸殺之姑惟教之其後康王命畢公又曰不臧厥臧民罔攸勸始則遷其頑而教之終則擇其善而用之聖人治天下未嘗絶物固如此今歸正人聚于兩淮而屯田以居之覈其勞績而禄秩以誘之内以節冗食之費外以省轉餉之勞以銷桀驁之變此正周人待商民之法秦人使人自為戰之術而井田兵農之遺制也況皆吾舊赤子非如商民在周之有異念以術使之天下豈有不濟之事哉其致勇曰臣聞行陣無死命之士則将雖勇而戰不能必勝邉陲無死事之将則相雖賢而功不能必成将驕卒惰無事則已有事則其弊望敵先遁臨敵遂奔幾何而不敗國家事人君責成于宰相宰相身任乎天下可不有以深探其情而逆為之處乎盖人莫不重死惟有以致其勇則惰者奮驕者聳而死有所不敢避嗚呼此正鼓舞天下之至術也致之如何曰将帥之情與士卒之情異而所以致之之術亦不可得而同何則致将帥之勇在于均任而投其所忌貴爵而激其所慕致士卒之勇在于寡使而紓其不平速賞而卹其已亡臣請得而備陳之今之天下其弊在于儒臣不知兵而武臣有以要其上故閫外之事朝廷所知者勝與負而已所謂當進而退可攻而守者則朝廷有不及知也彼其意盖曰平時清要儒臣任之一旦擾攘而使我履矢石吾且幸富貴矣豈不能逡廵自愛而留敵以固位乎向者淮上之師有遷延而避敵者是其事也臣今欲乞朝廷於文臣中擇其亷重通敏者毎軍置叅謀一貟使之得以陪計議觀形勢而不相統攝非如唐所謂監軍之比彼為将者心有所忌而文臣亦因之識行陣諳戰守緩急均可以備邉城之寄将帥有可進而攻之便彼知搢紳之士亦識兵家利害必不敢依違養敵以自封而遺國家之患此之謂均任而投其所忌凡人之情未得志則冐死亡以求富貴已得志則保富貴而重其生古人論御将者以才之大小為辨謂御大才者如飬騏驥御小才者如飬鷹犬然今之将帥豈皆其才大者要之飽則飛去亦有如鷹者焉向者虹縣海道之帥有得一邑破數艦而遽以節鉞使相與之者是其事也臣欲乞朝廷靳重爵命齊量其功等第而與之非謂無予之謂徐以予之且欲使之常亹亹然有歆慕未足之意以要其後效而戒諭文吏非有節制相臨者必以資級為禮與左遷人均毋使如正使遥郡者間有趨伏堂下之辱如唐以金紫而執役之𩔖彼被介胄者知一爵一命之可重而朝廷無左右選貴賤之别則亦矜持奮勵盡心于朝廷而希尊榮之寵此之謂貴爵而激其所慕營幕之間飽煖有不充而主将歌舞無休時鋒鏑之下肝腦不敢保而主将雍容于帳中此亦危且勩矣而平時又不與之休息以飬其力至使之舁土運甓以營私室而肆鞭撻彼之心懷憤挾怨惟恐天下之無事以求所謂快意肆志者而邀其上誰肯挺身効命以求勝敵哉兵法曰視卒如愛子故古之賢将有與士卒㝡下者同衣食而分勞苦臣今欲乞朝廷明勅将帥自教閱外非脩營治栅名公家事者不得私有役使以収士卒之心此之謂寡使而紓其不平人莫不惡死亦莫不有父母妻孥之愛冒萬死幸一生所謂竒功折獲者有一資半級之望朝廷較其毫釐而裁抑之賞定而付之於軍則胥吏軋之主将邀之不得利不與敵去師㨗主将享大富貴而士卒有一命又復沮格如此不幸而死妻離子散香火蕭然萬事瓦觧未死者見之誰不生心兵法曰軍賞不踰時而古之賢将盖有為士卒裹瘡卹孤者臣今欲乞朝廷遇有賞命特與差官攜至軍中呼名給付而死事之家申勅主将曲加撫勞以結士卒之驩此之謂速賞而卹其已亡如此則驕者化而為銳惰者化而為力有不守矣守之而無不固有不攻矣攻之而無不克凡兹數事非有難行重費朝廷何惜而不舉以收将卒它日之用哉臣竊觀陛下向嘗訓百官以寵武臣隆恩數以優戰伐是誠有意于激勵将卒矣然其間尚有行之而未及詳已行而旋復弛之事欲望陛下察臣所以得於行伍之說如此而眀付之宰相使之審處而力行之庶幾有以得上下之驩心而急難不至于誤國此實天下之至計也其防微曰古之為國者其慮敵深其防患宻故常不吝爵賞以籠絡天下智勇辯力之士不欲一夫有憂愁怨懟無聊不平之心以敗吾事盖人之有智勇辯力者是皆天民之秀傑者𩔖不肯自已茍大而不得見用於世小而又飢寒于其身則其求逞之志果於毁名敗節凡可以紓忿充欲者無所不至矣是以敵國相持勝負未決一夫不平輸情于敵則吾之所忌彼知而投之吾之所長彼習而用之投吾所忌用吾所長是殆益敵資而遺敵勝耳不可以不察傳曰謹備于其外患生于其内此正聖人所以深致意而庸人以為不足慮也昔者楚公子巫臣嘗教吳乗車射御而吳得以逞漢中行說嘗教單于毋愛漢物而漢有匈奴之憂史傳所載此𩔖甚多臣之為今日慮者非以匹夫去就可以為朝廷重輕盖以為泄吾之機足以増敵人之頡頏耳何則科舉不足以盡籠天下之士而爵賞亦不足以盡縻歸附之人與夫逋寇窮民之無所歸茹寃報恨之無所泄者天下亦不能盡無竊計其中亦有傑然自異而不徇小節者矣彼将甘心俛首守死于吾土地乎抑亦壞垣越栅而求釋于他域乎是未可知也臣之為是說者非欲以聳陛下之聽而行已之言盖亦有見焉耳請試言其大者金亮之南下也海道舟楫則平江之匠實為之淮南惟秋之防而盛夏來伐則無錫之士實惎之剋敵弓弩敵兵所不支今已為之殿司之兵比他卒為驕今巳知之此數者豈小事哉如聞皆其北歸之人叛軍之長教之使然且歸正軍民或激于忠義或廹于虐政故相扳來歸其心誠有所慕也前此陛下嘗許以不遣矣自去年以來敵人間以文牒請索朝廷亦時有曲從其間有知詩書識義分者如觧元振輩上章請畱陛下既已旌賞之矣若俗所謂泗州王等輩既行之後得之道路皆言隂通偽地教其親戚訴諸敵人移牒來請此必其心有所不樂於朝廷者若此曹雖闒冗無能累千百數舉發以歸之固不足卹然人之度量相越智愚不同或其中亦有所謂傑然自異者患生所忽漸不可長臣願陛下廣含𢎞之量開言事之路許之陳說利害官其可採以收拾江南之士明詔有司時散俸廪以優卹歸朝歸正之人外而勅州縣吏使之蠲除苛斂平亭獄訟以紓其逃死蓄憤無所伸愬之心其歸正軍民或有再索而猶言願行者此必隂通偽地情不可測朝廷既無負于此輩而猶反覆若是陛下赫然誅其一二亦可以絶其姦望不然則縱之而不加制玩之而不加卹恐他日萬一有如先朝張源吳昊之西奔近日施宜生之北走或能馴致邉陲意外之擾不可不加意焉臣聞之魯公父文伯死有婦人自殺于房者二人其母聞之不哭曰孔子賢人也逐于魯而是人不隨今死而婦人為自殺是必於其長者薄於其婦人厚議者曰從母之言則是為賢母從妻之言則不免為妒妻今臣之論歸正歸朝軍民誠恐不恱臣之說者以臣為妒妻也惟陛下深察之其乆任曰臣聞天下無難能不可為之事而有能為必可成之人人誠能也任之不專則不可以有成故孟子曰五榖種之美者也茍為不熟不如稊稗何則事有操縱自我而謀之已審則一舉而可以遂成事有服叛在人而謀之雖審亦必持乆而後可就盖自古遐裔為中國患彼皆有争勝之心聖人方調兵以正天誅任宰相以責成功非如政刑禮樂發之自已収之亦自己之易也朝而用兵夕而遂勝公卿大夫交口歸之曰此宰相之賢也明日而臨敵後日而聞不利則羣起而媒糵之曰宰相不足與折衝也乍賢乍佞其說不一於是人君亦不能自信欲求之立事難矣哉臣讀史嘗竊深嘉越勾踐漢髙祖之能任人而種蠡良平之能處事驟而勝遽而敗皆不足以動其心而信之專期之成皆如其所料也觀夫會稽之栖五年而吳伐齊虗可乗也種蠡如不聞又四年吳伐齊虗可乗也種蠡反發兵助之又二年吳伐齊不勝而種蠡始襲破之可以取之種蠡不取又九年而始一舉滅之盖歴二十又三年而勾踐未嘗以為遲而奪其權豐沛之興秦二年漢敗于薛漢元年髙帝厄于鴻門又二年衂于彭城又三年困于滎陽又五年不利于夏南良平何嘗一日不從之計議然未免于齟齬者盖歴五年而始蹶項立劉髙帝亦未嘗以為踈而奪其權誠以一勝一敗兵家常勢懲敗狃勝非䇿之上故古之人君其信任大臣也不間於讒說其圗維大功也不卹于小節所以能責難能不可為之事於能為必可成之人而收其效也敵人為朝廷患如病疽焉病根不去終不可以為身安然其決之也必加炷刃則痛亟而無後悔而其銷之也止於傅餌則痛遲而終為大患病而用醫不一其言至炷刃方施而傅餌移之傅餌未幾而炷刃奪之病不已而乃咎醫吁亦自惑也且禦敵有二道惟和與戰和固非長䇿然太上皇帝用秦檜一十九年而無異論者太上皇帝信之之篤而秦檜守之之堅也今日之事以和為可以安而臣不敢必其盟之可保以戰為不可講而臣亦不敢必其兵之可休惟陛下推至誠踈讒慝以天下之事盡付之宰相使得優㳺無疑以悉力于圗維則可和與戰之機宰相其任之矣唐人視相府如傳舍其所成者果何事淮蔡之功裴度用而李師道遣刺客以緩師髙霞寓敗而錢徽蕭俛以為言憲宗信之深任之篤令狐楚之罷為中舍李逢吉之出為節度皆以沮謀而見踈故君以㫁臣以忠而能成中興之功而頃者張浚雖未有大㨗亦未至大敗符離一挫召還揆路遂以罪去恐非越勾踐漢髙帝唐憲宗所以任宰相之道非特此也内而戸部出納之源外而泉漕緫司之計與夫邉郡守臣屯戍守将皆非朝夕可以責其成功者臣願陛下要成功于宰相而使宰相責成功于計臣守将俾其各得專於職治而以禄秩旌其勞績不必輕移遽遷則人無茍且之心樂于奮激以自見其才一綱既舉衆目自張天下之事猶有不辦者臣不敢信其然也其詳戰曰臣聞鴟梟不鳴要非祥禽豺狼不噬要非仁獸此敵人雖未動而臣固将以論戰何則我無爾詐爾無我虞然後兩國可恃以定盟而生靈可恃以弭兵今彼嘗有詐我之情而我亦有虞彼之備一詐一虞謂天下不至於戰者惑也明知天下之必戰則出兵以攻人與坐而待人之攻也孰為利戰人之地與退而自戰其地者孰為得均之不免於戰莫若先出兵以戰人之地此固天下之至權兵家之上䇿而微臣之所以敢妄論也詳戰之說奈何詳其所戰之地也兵法有九地皆因地而為之勢不詳其地不知其勢者謂之浪戰故地有險易有重輕先其易者險有所不攻破其重者輕有所不取今日中原之地其形易其勢重者果安在哉曰山東是也不得山東則河北不可取不得河北則中原不可復此定勢非臆說也古人謂用兵如常山之蛇擊其首則尾應擊其尾則首應擊其身則首尾俱應臣竊笑之夫擊其尾則首應擊其身則首尾俱應固也若夫擊其首則死矣尾雖應其庸有濟乎方今山東者敵人之首而京洛關陜則其身其尾也由泰山而北不千二百里而至燕燕者敵人之巢穴也自河失故道河朔無濁流之阻所謂千二百里者從枕席上過師也山東之民勁勇而喜亂敵人有事常先窮山東之民天下有變而山東亦常首天下之禍至其所謂備邉之兵較之他處山東號為簡略且其地於燕為近而其民素喜亂彼方窮其民簡其俻豈真識天下之勢也哉今夫二人相搏痛其心則手足無強力兩陣相持譟其營則士卒無鬭心故臣以謂兵出沭陽則山東可指日而下山東已下則河朔必望風而震河朔已震則燕山者臣将使之塞南門而守請試言其說敵人列屯置戍自淮陽以西至於汧隴雜女真渤海契丹之兵不滿十萬闗中洛陽京師三處彼以為形勢最重之地防之為甚深備之為甚宻可因其為重大為之名以信之揚兵於川蜀則曰關隴秦漢故都百二之險吾不可以不争揚兵於襄陽則曰洛陽吾祖宗陵寢之舊廢祀乆矣吾不可以不取揚兵於淮西則曰京師吾宗廟社稷基本於此吾不可以不復多為旌旗金鼓之形陽為志在必取之勢已震関中又駭洛陽已駭洛陽又聲京師彼見吾形忌吾勢必以十萬之兵而聚三地且沿邉郡縣亦必皆守而後可是謂無所不備則無所不寡如此則燕山之衛兵山東之户民中原之簽軍精甲銳兵必悉舉以至吾乃以形聳之使不得遽去以勢畱之使不得遂休則山東之地固虚邑也山東雖虚竊計青宻沂海之兵猶有數千我以沿海戰艦馳突於登萊沂宻淄濰之境彼數千兵者盡分於屯守矣山東誠虚盜賊必起吾誘羣盜之兵使之潰裂四出而陛下徐擇一驍将以兵五萬歩騎相半鼓行而前不三日而至兖鄆之郊臣不知山東諸郡将誰為王師敵哉山東已定則休士秣馬號召忠義教以戰守然後傳檄河朔諸郡徐以兵躡其後此乃韓信所以破趙而舉燕也天下之人知王師恢復之意堅敵人破滅之形著則契丹諸國如鄂斡哲伯之事必有相軋而起者此臣所以使燕山塞南門而守也彼敵人三路備邉之兵將北歸以自衛耶吾已制其歸路彼又虞淮西襄陽川蜀之兵未可釋而去也抑為戰與守耶腹心已潰人自觧體吾又将突出其背而夾擊之當此之時陛下築城而降其兵亦可驅而之北反用其鋒亦可縱之使歸不虞而後擊之亦可臣知天下不足定也然海道與三路之兵将不必皆勇士不必皆銳盖臣將以海道三路之兵為正而以山東為竒竒者以强正者以弱弱者牽制之師而强者必取之兵也古之用兵者唐太宗其知此矣嘗曰吾觀行陣形勢毎戰必使弱常遇強強常遇弱敵遇吾弱追奔不過數十百歩吾擊敵弱常突出自背反攻之以是必勝然此特太宗用之於一陣間耳臣以為天下之勢避實擊虚不過如是茍曰不然必將驅堅悉銳由三路以進寸攘尺取為恢復之謀則吾兵為敵弱乆矣驟而用之未嘗不敗近日符離之戰是也假設陛下一舉而取京洛再舉而復關陜彼將南絶大河下燕薊之甲東逾泗水漕山東之粟陛下之將帥誰與守此曩者三京之役是也借能守之則河北猶未病河北未病則雌雄猶未決也以是䇿之陛下其知之矣昔韓信請於髙祖願以三萬人北舉燕趙東擊齊南絶楚之糧道而西會於滎陽耿弇言於光武欲先定漁陽取涿郡還收富平而東下齊皆越人之都而謀人之國二子不以為難能而髙祖光武不以為可疑卒藉之以取天下者見之明而䇿之熟也由今觀之使髙祖光武不信其言則二子未免為狂何者其言落落而難合也如臣之論焉知不有謂臣為狂者乎雖然臣又有一說焉為陛下終言之臣前所謂兵出山東則山東之民必叛敵以為我應是不戰而可定也議者必曰辛巳之歲山東之變亦大矣然終無一人為朝廷守尺寸土以基中興者何也臣之說曰北方郡縣可使為兵者皆鋤犁之民可使以用此兵而成事者非軍府之黥卒則縣邑之弓兵也何則鋤犁之民寡謀而易聚懼敗而輕敵使之堅戰而持乆則敗矣若夫黥卒之與弓兵彼皆居行伍走官府皆知其指呼號令之不可犯而為之長者更戰守其部曲亦稔熟其賞罰進退之權建炎之初如孔彦舟李成輩殺長吏驅良民膠固而不散者皆此輩也然辛巳之歲何以不變曰東北之俗尚氣而耻下人當是時耿京王友直輩奮臂隴畆已先之而起彼不肯俛首聽命以為農夫下故寜嬰城而守以須王師而自為功也臣嘗揣量此曹間有豪傑可與立事者然敵人薄之而不以戰自非土木之興築官吏之呵衛皆不復用彼其思一旦之變以逞夫平昔悒怏勇悍之氣抑甚於鋤犁之民然而計深慮逺非見王師則未肯輕發陛下誠以兵入其境彼将開門迎降惟恐後耳得民而可以使之将得城而可以使之守非於此焉擇之未見其可也故臣於詳戰之末而備論之左宣義郎祕書省校書郎兼國史院編修官員興宗上書曰臣聞聖人感人心而天下和平盖人心不感則離離則天下之不和不平者将應之矣人心之感不感聖人初不間乎内外也以信示人無人不信以惠懷人無人不懷使天下畢信畢懷是之謂徳感也㳟惟祖宗建置社稷餘二百年永永傳不替之象獨非有以徳感人者乎此不可不稽也臣愚不佞待罪三舘鄉者丙戍之秋嘗入建請北方歸正之士捨氊裘襲冠帯本非前日一都督府力能誘而來之者誠以吾宋有大義中國有至仁北方将士樂歸陛下之徳只也陛下感之亦極矣願幸加意以禮始終之是時國家未萌還俘囚之議而臣之預言如此陛下過聽不以下臣迂愚其後繼用王友直於江上将王宏於歩軍其餘才武以次錄用此聖主至斷至明者也中外率以為是今者敵因盜賊之萌乃起俘囚之請兹事體大應酬若失便關安危臣日夜念此至熟也陛下若曲徇外庭之言不計利鈍不愛歸附姑曰還其十百以緩目前之患臣恐患自此滋矣且王言如日外庭乃欲蝕之使朝廷前日為義今日為不義前日示仁今日為不仁虧敗徳意莫甚於此又況俘囚一揺懼者必衆十可以聚百百可以合千風塵飛揚肘腋為變甚可畏也其性純良者自此生心其慕教化者自此絶望懷反側者自此有詞心剽賊者自此鄉導陛下異時有事北方沿淮以北陛下縱欲募用其人不識誰肯為陛下用乎此臣所以痛心疾首也今欲外圗帖息之計内寛流附之心陛下曷不試臣令畫三䇿於前顧臣之䇿必不為北敵餌為中國羞也用其一則可以破不直之請用其二則可以塞無已之求用其三則可以成乆禦之利唯上所命也謂宜今日因徃來之使或對境之便遺之以書曰近聞侍旺懷異而楚州不知州之罪也夲朝居數千里外其及知之乎比因大國有言然後覺之其楚州官吏並已竄謫沿邉軍民並已戒約則夲朝凡嚴大國之意可謂曲折矣且侍旺自分必死故支離其詞奈何大國聽之萬一本朝獲一姦盜妄分析黨與入北界者本朝亦聽之乎如是則不直之請可破矣此臣䇿之一也又遺之言曰甲申之歲大國議和唐鄧海泗荆淮重地也輒舉以遺大國口血未乾繼有兩淮之役俘取吾民凡數十萬本朝兼愛南北之赤子惠顧前盟不敢求也今俘囚百十奔迸四出死生莫知大國累嵗求之獨何意歟觀此似欲搖動和議曲不在本朝天地鬼神實臨之如是則無已之求可漸塞矣此臣䇿之二也傳曰善用兵者無赫赫之功豈獨用兵處事亦然也臣竊笑前者王琪等經理淮上引見而對朝辭而出道路莫不指目布置張皇竟以泄露諸将所以備敵者近乎虛聲而敵所以疑我者積乎實禍臣未聞事機不宻而可用鷙鳥不伏而能擊者也是乃敵所以數啓紛紜之談歟今皆見之矣臣謂今日之事當卑其禮而長其怠賖其日以寛其詞悠悠以静處之縱不見信必無大侵然後潛正師律黙課農桑隂蓄噐械使事興而衆不知敵如我何則乆禦之利漸成矣此臣䇿之三也彼敵自辛巳及今迭戰迭敗豈真健者哉謂秦無人故直欲以威刼之耳如不出臣三䇿則正墮敵計悔無及也或謂臣之三䇿當矣陛下必審處之矣陛下智勇能逺圗天威能亟決然尚有可慮者太上之意主於和柔故陛下一切委順今者欲出詞拒敵恐不遑也萬一生事如太上何如大孝何臣愚以此正陛下所以事太上而稱大孝者也大孝以安社稷為恱使一旦歸附動揺流人怨憤憂獨不在社稷之間乎昔唐肅宗起師靈武猶不欲以賊遺君父當時以孝與之況陛下至孝萬萬肅宗者乎雖然敵勢實不可保陛下奈何不早為之䇿哉漢七國削亦反不削亦反晋蘇峻召亦反不召亦反今臣度敵之勢和亦變不和亦變特其變有早晚爾而說者謂徑與俘囚則繼今可以免禍是猶抱虎而寢指虎之終不噬已也烏呼亦愚矣曷若整械飾穽求所以禦虎者今廼欲專用抱虎之術哉内外歸附亦必用此潛窺陛下以為榮辱死生之決也措置一失禍猶發機從此殆矣而可無思乎陛下若賜清閒之燕得熟數于玉陛願首試臣三䇿以次畢用之若衆不附敵不怯榮名不成則是臣飾說欺君者也臣請死祕書省正字趙汝愚論恢復奏曰臣竊惟陛下仰承太上付託之重于此九年矣凡祖宗之疆土未復兩世之讎耻未報實惟陛下之責未巳是宜陛下朝不遑食夜不遑寐日積月累勤求所以為天下之道如拯溺救焚而不敢緩也雖然急趨無善迹促柱無和聲又烏可不量事勢茍為一切之計惟速之是務哉臣嘗竊聞或者之言謂陛下銳於圗事惟患兵籍之不多飬兵既多始憂財用之不給内外虛耗軍士怨嗟於是茍有道可以豐財則利害未暇究也茍得人出以任事則能否未暇擇也兩淮城壘土脉膏潤而不暇待也沿江保甲徒擾無用而不暇恤也凡此數者亦由陛下不忘祖宗創業之勤而求之太速耳行之不已臣恐陛下求之愈速而其效愈遲也經曰必有忍其乃有濟又曰小不忍則亂大謀今夫陛下之所為謀者豈細事哉臣愚伏望陛下廣恢廓之度建宏逺之規不以小利動其心不以速成敗厥事求賢為上立政次之事之可為者屢省而後為弊之可去者以漸而後去人事修而天時至區區敵人有不足殄滅者矣汝愚乞撫安歸正人䟽曰臣伏思天下之弊多矣然其大且逼者莫若歸正人彼皆祖宗涵養之餘不勝敵人之暴一旦來歸如脫寇盜而得慈母其所望者深矣朝廷既不能盡滿其意而民間時時訛言咸謂敵人來有所索轉相驚動懐不自安夫以羈旅不自存之人而懐反側不自安之意豈得不深為之慮也為今日計要先求術以安之人情既安雖有姦宄不能動揺矣臣請試言所以安之之術其一換授官資之人並注添差差遣至易得也書鋪以其不知吏部格法百計邀阻所須貨賂數倍常人至有數月不得調者欲望聖慈令吏部措置明立牓約諸歸正人並以到鋪之日為始後兩月不授差遣許至吏部陳訴犯者重置憲典仍詔州縣其合得俸給並須按月支破有積壓不支至一季以上者令監司劾奏其二北方豪傑之士捐親戚棄墳墓間關而來有闔門受戮而不顧者其志豈存升斗之利哉而所在例以傖荒待之無以自達欝欝叛去者亦多矣欲望明詔諸軍管軍統制及縁邉監司守臣依隆興元年薦舉武臣格式有謀略沈雄可任大計寛猛適冝可使御衆臨陣驍勇可鼓士氣威信有聞可守邉郡者不以有無文武官資各薦一二人人以半嵗為限陛下親賜試問擇可用者随才用之雖拔十得五未足以盡其人而雍齒且侯其黨亦粗慰矣其三散在諸軍為兵者人給錢絹不多飢寒切體進退無路情實可矜或者将校非人一切指為北人勞逸異任種種不同遂令忠義之心積成愁怨之氣國家財賦少積縱未能均有所濟猶宜遴選将帥能與士卒同甘苦者俾勤而撫之尚庶幾其可也凡此三者臣日夜念之方時無虞隠伏未見小有風飇之警懼非法令之所能制也惟陛下畱神幸甚汝愚又上自治之䇿曰臣踈賤無取誤䝉陛下恩私選自諸生擢登禁路非惟身荷寵祿且将澤及子孫致命捐軀誓難圗報又念國家靖康之難同姓一時俱北行者盖數千人然則家國之事臣實義同休戚今身雖在逺苟可以效㳙塵之益者誠不當畏避蓄縮以䟽逺自疑也惟陛下畱神幸甚臣伏自去嵗夏中傳聞金人還歸本土縁臣僻居海角無從詢問敵中事體臣仰惟陛下英明獨運威略如神多士盈庭筭無遺䇿使臣空竭肺腑何補毫芒但以世受國恩不無私憂過計竊謂敵情難測未可輕言迹其盜據幽燕比年似亦安静今乃無故妄動其間必有深謀或者謂其嫡庶不分兄弟争立敵君牽制不斷将分國而王之昔趙武靈王既立少子而復愛長子欲兩王之猶豫未決而身及於難漢五單于争立而其國遂衰設如或者之言在彼誠為失䇿然臣竊聞敵君既老而常有敬慕太上皇帝之心故築宫以仁夀為名乆欲為傳授之事使其復愛長子欲裂土而封之亦惟下一紙之令則其事即日可定矣何至捨其已成之業而犯衆情之所難棄中原之奥區而退伏於絶漠苦寒之地彼又豈不知陛下卧薪甞膽志在規恢胡為逺自遁藏深形退屈兵法有進無退義豈其然臣謂朝廷正當深察其情而思所以待之之䇿未可直謂其施為悖謬而遂有輕視強敵之心也臣輒不量淺陋伏而思之而得三說其一臣昨在吏部時聞敵人之長子號許王者強暴不仁專好武事志在傾奪将為亂階臣始聞之常竊私喜其間亦有謂不然者今臣之所治雖在南方而官吏之中多北來人士其間亦有乆在淮南而熟知淮北事體者皆言其人強忍堅志素蓄姦謀接納雄豪收採時譽常至沿淮措置邉事皆乗驛騎奔馳飇去倐來人不知其為敵君之子也且謂其人不死必能大為邉患使敵人善自為計委之南據汴都授以偏師用為藩屏則國家将倍勞戍守邉境未易得安而敵君在燕以重勢臨之彼亦安能篡奪今若隂使其父歸伏舊巢察其姦心用志非小其人盖将挾君父之勢間兄弟之情乗北方士馬之強為併吞其國之舉發遲禍大可為深憂其二敵人自得國以來盖常以北方為根本如漢髙祖與項籍轉戰滎陽京索間而以關中為根本安祿山雖盜據洛陽而以范陽為根本之𩔖是也竊料敵人三世簒奪不能不過為隄備今将立其少子而恐或者議其後也故以其身退居根本之地而壓之以重勢俟其少定徐議後圗然則一時之計雖若煩勞恐其因事制宜亦未為深失也臣又聞方金亮時剪㓕宗室完顔氏多死者獨今敵君佯為有疾退居逺郡若無能為一旦乗海陵之動取其國如探囊逮其即位許時亦絶不生邉事臣觀其人似亦非輕舉妄動者盖恐其間必自有說也其三或者疑其曩時篡弑皆在已年今兹北遷将為厭勝然自敵人得國今已二十餘年盖嘗歴癸巳之嵗矣未聞有厭勝之事何也大抵人之常情安土重遷吉凶悔吝皆生乎動誠使敵人無故妄動别無他謀而違逆衆情勞役百姓中原父老固已不堪其擾矣又聞其随行奴婢甚有逋逃去嵗苦寒人畜多死如是不已孰不怨嗟竊恐其間将有豪傑之士如晉石勒劉聦之徒乗間俟隙崛起自奮弱則請服強則自固亦将重煩朝廷經理也臣竊料敵情為是三說詳觀事勢眹兆已萌逺不踰三年近或止朞嵗事機一發利害萬端不審陛下萬機之餘亦嘗深念及此否孟子曰國家閒暇及是時明其政刑雖大國必畏之矣臣觀自古敵國相對常苦難得閒暇之時惟其預備於無事之先故能患至而無恐臣謂朝廷及今閒暇當亟圗所以自治之䇿不宜視同常務使有後時之悔也臣觀自古國之治亂兵之強弱全在得人然則搜選人材最為當今急務練兵理財盖又次之陛下聖意憂勤盍思一旦用兵之際自東徂西凡備敵者幾處為緫帥者當用幾人将佐中素有威望可以獨當一面者幾人幕府賔賛能知兵家事體緩急可以濟務者幾人兵法曰興師十萬出征千里百姓之費公家之奉日費千金陛下㳟儉焦勞内帑所儲者可支幾嵗自古兵連禍結亦豈可以嵗月計哉惟昔辛巳之役上天垂祐金亮喪師甲申之役敵人實有厭兵之意故兵纔及境不數月而遂觧要不可以是為準也臣觀自古用兵不計勝負惟能持乆者終成帝業陛下復料今日之兵将財力事勢能以持乆而不困乎若曰祖宗徳澤感人甚深中原故老常有謳吟思漢之意一旦北方有變必有簞食壺漿以迎王師者朝廷乗破竹之勢中原遂可傳檄而定矣初不待嵗月持乆也臣仰惟陛下自即尊位于今二十餘年盛徳美意日新一日是宜上符天道下順人情克復之期不俟再舉然臣猶謂取諸已者可信而責於人者難期正須朝廷國勢安彊然後豪傑可收為用若昔晉宋之際盖無日不望中原豪傑之助也然計其功效終成畫餅故臣惟願陛下勤於自治而已兵法又曰知己知彼百戰百勝又曰三軍之事莫親於間賞莫厚於間事莫宻於間又曰愛爵禄百金不知敵之情者不仁之至也非人之将也今敵君北徙國人既知之矣然其所以北徙之意朝廷猶未能深得其情是則諸将用間不宻之過臣聞昔楊存中在紹興諸将中最為不及然其設心措意猶是向公如李顯忠輩方得罪秦檜棄置閒廢之中存中為之傾貲結納故能卒收其用臣聞存中毎遣間諜輒委之數萬緡恣其所徃皆數年而後歸故能深得敵人之情状今之諸将孰可任此臣愚伏望陛下内則親詔大臣選羣材以脩政事外則宻諭将帥厚遣間以覘敵情至於近邉移戍修城凡動人耳目之事皆可少緩而弗為敵人所欲歲幣亦宜如數遣發不必與之深較嚴戒邉吏母得輕輒生事俾其安意肆志不復以我為疑然後飬威蓄銳而徐觀其變則庶幾其可圗矣臣僭越狂妄冒瀆天威不任皇懼待罪之至户部侍郎汪應辰論國用士風軍政䟽曰臣仰惟陛下初即大位羣臣百姓拭目傾耳以觀化聽令其精微逺大雖非見聞可及而動容周旋一以禮法仁孝之行㳟儉之徳惻怛愛民之心謙虛盡下之誠𩔖皆出於聖性之自然者以至收召名士博求直言追録忠烈莫不犁然當於人心中外稱誦以為此聖主也一見決矣孔子曰三代之王也必先其令聞詩曰明明天子令聞不已夫豈有意於求名哉盖昔之有事于四方若卜筮罔不是孚者以其民恱服之有素也誠因始初清明之政中外恱服之心推其所已為求其所未至凡人心之所欲而今日之所當行者舉而措之以幸天下盖沛然若決江河莫之能禦事半古人而功倍之矣臣請言人心之所欲而今日之所當行者惟陛下財擇自用兵以來有司於常賦之外所以搜求征取者名色不一盖十倍於漢唐與祖宗之時而不翅也州郡為之匱乏百姓為之凋敝宜其財聚於上不可勝用矣而大農常有不足之憂則夫今日之國用不可以不理也平居無事将帥之臣坐享貴富一旦警急聞命則遷延而不前望敵則皇遽而自却事平之後益自誇詡論功第賞動以數萬若其名籍之虛實技勇之髙下皆不可得而考核則夫今日之軍政不可以不脩也以便文自營為得計以因循茍且為練事希功者肆意於誕謾而不疑逐利者甘心於奪攘而不耻朝廷所託材噐職業者萃於羣下也而積習如此将何望焉則夫今日之士風不可以不變也以陛下之仁聖而因始初清明之政中外恱服之心慨然欲大有為於天下以此三者為當務之急酌之衆論參以時變先甲三日而究其所以然後甲三日而慮其将然是非之理夲末之序既已參於前矣言之則必可行行之則必可乆任使賢能必盡其人之材賞罰功罪必當其事之實騁浮辭者不得以亂真挾私意者不得以害正㫁之以不惑持之以不倦未有不還至而有效者也國用理則民可裕矣軍政脩則兵可強矣士風變則政事可舉矣内以治吾之國家外以制敵豈不綽綽然有餘裕哉昔漢之文景躬行節儉則有家給人足之效宣帝綜覈名實則有吏稱職民安業之效夫以居得致之位操可致之勢而又有能致之資其於天下之事特患有所不為爾竊惟太上皇帝以天下之大付之陛下夫豈茍然而已哉盖以天下與人易為天下得人難太上皇帝既得其所難矣陛下當思所以任其難者詩曰我日斯邁而月斯征夙興夜寐毋沗爾所生時不可失也微臣不勝拳拳之至直煥章閣王師愈上奏曰臣聞天位於上雷動於下其卦曰无妄以四時言之春夏之發生雷雖震驚人不以為妄所當然也故能成育物之功秋冬之斂藏雷雖隐然而有聲人莫不惕然而駭聽盖其動也妄必有札瘥癘疫之患聖人體天以立極法天而圗治安平之時出入起居罔有不欽發號施令罔有不臧非以其材略智術足以髙天下亦以其動静本於天理之自然不撓乎人為之私也是以濟大業者當艱難之時或速而有成或緩而有成究其所以然皆无妄也漢髙之王漢中未幾而長驅於滎陽京索間不五載而成帝業盖因思東歸之士其動不可以緩也諸葛亮之相蜀國事未定則閉關息民以圗之其動不可以速也臣又聞善圗治者如良醫之療疾固有指日而致效者亦有累月而致效者氣血未衰偶為外邪所乗或汗或下其效立見此豈待累月之乆哉若夫沈痾之餘羸然薾然必在乎固其本元飬其精神强其筋力反欲投瞑眩之劑求指日之效又欲娛之以華麗宴樂之奉其可哉方今天下之患胎於熈豐結於崇觀潰裂於靖康爰自紹興之初上下相維持将復振矣未幾用事之臣又從而弱之幸賴天啓聖明陛下嗣膺大統規恢十年始有蘇息安強之兆實社稷生民之福也伏願陛下逺稽羲經之无妄俯察良醫之治病脩我之備待彼之釁毋欲速而輕動其不能成萬全之勲者臣未之信也師愈為長沙守上奏曰臣聞濟大業者不可畏敵人之盛強亦不可喜敵人之失徳畏其盛强則心必怠喜其失徳則心必驕驕與怠一萌於胷中而能圗維者鮮矣三代而下遇強敵者莫如漢髙祖方項羽席戰勝之威以入關分王諸侯可謂强矣髙祖則未嘗畏焉羽之慓悍猾賊所過殘滅可謂失徳矣髙祖則未嘗喜焉竟趨漢中務寛仁以收民心擴大度以用人傑終能遂其欲東之志五載而成帝業其規模為何如靖康之變亘古所無之耻不共戴天之讎将五十年矣在當時見聞其事者壮者已老老者已死今之年三四十者雖語以當時之事已茫然矣此讎此耻殆将忘之祖宗在天之靈四海忠義之心所望雪此耻復此讎有待於陛下陛下亦以雪耻復讎為己任即位以來宵旰焦勞未嘗不在是也然以强弱之勢論之敵人土地之衆金榖之富車馬之壮雖元魏所不逮自古遐裔之盛未之有也世之畏縮守和議者必持是說焉曽不知强弱盛衰相為消長未有强而不弱盛而不衰者厥今敵勢安知天意不已厭其徳而將罰之乎故其强易弱其盛易衰況加之以嚴威中原之民怨入骨髓以是觀之其可畏乎世之輕狂妄議進取者往往又喜是說謂可以指日恢復曽不思國家素備果何如哉己巳之嵗金亮篡奪辛巳之嵗金亮自敗天授機會如此國家不能進跬歩取尺寸土良由無素備也何謂素備一曰脩己任徳以承天意二曰實惠及民以固邦本三曰廣收英傑以為股肱四曰據要害之地以壮形勢五曰練兵足用以待進取此五者人皆能言之陛下亦飽聞而厭聽人多以為腐儒常談殊不知五榖無異味而能療飢布帛無異采而能禦寒五者雖若常談實圗維之先務要在深思而力行既有素備機會之來斯能乗之何謂機會或骨肉争國或種落離叛或姦雄割據或大盜蜂起或輕動深入皆機會也魏相曰兵應者勝素備已脩或逢機會以應兵乗之而不能成商宗周宣漢光武之業者未之聞也苟為不此之務徒能張虛氣出大言忘逺慮争小利而曰能圗恢復者非臣所知也歴代名臣奏議卷九十四
