body:
  text: 厯代名臣奏議卷二百七十明楊士竒等撰理財宋徽宗即位初通判鳳州馬景夷言陕西自去年罷使銅錢續遣官措置錢法未聞有深究錢幣輕重灼見利害者銅錢流注天下雖千百年未甞有輕重之患獨鐵錢局扵一路所可通交易有無者限以十州之地欲無滯礙安可得乎又諸州錢監鼓鑄不已嵗月増多以鼓鑄無窮之錢而供流轉有限之用更數十年積滯一隅暴如丘山公私為害又倍扵今日矣謂宜弛其禁界許鄰近陕西河東等路特不入京城外凡觧鹽地州縣並許通行折二鐵錢如此則流注無窮乆逺自無輕重之患建中靖國元年給事中上官均上奏曰臣竊聞河北自来不係𣙜鹽地分周世宗初𣙜河北塩世宗北伐父老遮道泣訴􅂅以鹽課均之兩税而弛其禁世宗許之今兩稅鹽錢是也嘉祐中三司使王拱辰乞本路𣙜鹽仁宗皇帝降詔曰朕不欲河北軍民頓食貴鹽詔書既下北京父老感戴聖恩聚僧道作道場七日至今碑刻詔文具在比京紹聖四年因宣徳郎竇訥誣罔朝廷奏請𣙜鹽當時訥妻父宰相章子厚遂従其請施行已及三年臣近縁使事􅀴由河北州縣官吏皆以為自行𣙜鹽官中獲利甚少而民食貴鹽被刑出賞為害不少盖河北淮南諸路如北京澶恩諸郡頗多鹵地既不可耕種係出稅賦又納鹽錢下户貧民取煎小鹽貨賣供官贍家今来官中𣙜買既非竈戸不能剗煎賣却依舊納稅更出鹽錢下戸轉見貧窘往往犯法一人冒禁累及同保共備賞錢州縣督責雖眀貧乏以提舉茶鹽司按簿催促不免􅀴年監錮貧民迫扵衣食不足必至為盗兼詢得州郡自行𣙜鹽官中雖獲息錢然商賈稀少却有虧損稅錢去䖏通計一路就使息錢増多然民間鹽價比昔日倍貴又多伴和泥土烹煎不精至扵犯法被刑督責賞錢為害不細兼河北係黄河行流人使􅀴由道路每年人戸應副工役比扵它路尤為勞費昨因大河移改決溢渰浸田廬又累年飢荒流移餓殍人數不少今年稍得豐稔未便蘇息尤藉州縣官吏協力寛恤伏願陛下深飭有司考究𣙜鹽公私獲利多寡循守仁宗手詔徳音罷去禁𣙜養貧乏寧固根本以副陛下惻怛仁民愛物之意左司員外郎陳瓘進國用須知䟽曰臣伏見仁祖之時臣寮上言曰周制冢宰制國用唐宰相兼鹽鐵轉運使或判户部或判度支然則宰相制國用従古然也今中書主民樞宻主兵三司主財各不相知故財已匱而樞宻院益兵不已民已困而三司取財不已中書視民之困而不知使樞宻院減兵三司減財以救民困者制國用之職不在中書故也臣謂當仁祖之時官制未立自元豐以来制國用之職在三省矣戸部右曺之所掌乃天下財用之根本也神考理財之政所以法先王而慮萬世元祐之臣雖有紛更然天下所積財物朝廷亦不盡取今則一年之間連下五勅凡提舉司所積錢取之殆盡竭天下根本之財壊神考理財之政繼志述事豈宜然哉今具五次朝㫖下項一元符三年九月八日勅府界諸路見管坊場錢除本路一年合支數外将剰數更留一半准備支用餘一半特令起發上京應副朝廷支用一元符三年十一月十九日勅府界諸路見管常平役錢除本路一年合支數外将剰數更留一半准備支用餘一半特令起發上京應副朝廷支用一建中靖國元年二月二十三日勅諸路提舉司将見在抵當息錢並起發上京應副朝廷支用一建中靖國元年三月初一日勅諸路提舉司将見在量添酒錢依抵當息錢已得指揮施行今後支使不盡錢數並封樁准備朝廷支用一建中靖國元年三月初二日勅府界諸路提舉司所管錢物除依指揮起發及除留出本年合支散外餘剰更留一半錢數不多深属闕少糴本今扵元祐年中所納助役錢内撥一半充常平糴本餘一半許𣙜貨務召人入便或計置起發上京兊那往三路添助常平糴本臣竊惟神考立法之意取民之財還以助民故天下諸路州州縣縣各有蓄積将以待非常之用不使有偏乏之䖏故右曹錢物不得與别司交雜違條輙用者徒二年自元豐七年以常平等積剰財物補助邊費嵗取二百萬緡為額只以三年為期盖不欲多費天下民財以資邊用神考愛民之慮可謂深矣逺矣今當紹述此意豈宜取三十年間根本蓄藏之物一切大違成憲而偏用之扵一方乎且上件五項所取之𩔖以天下計之萬數不少扵此𩔖内河東陕西京西三路之撥與提刑司者其數㡬何河北路交撥與措置糴買司者其數㡬何川陜西路具樁管數目關鄰路召人入便乃與茶馬司對數交兊者其數㡬何臣謂凡八路那移兊撥皆主扵邊費而已自餘路分起發入京西飛于塞下者又不知其㡬何然則天下蓄積之物皆運之于邊矣若使一勞而乆佚暫費而永寧則三十年積之而一日用之猶足以濟一時之權成不得已之計今則不然但剔割諸路以補一方之瘡痍而已臣恐一方瘡痍補之未合而天下乏財之患有不可深言者矣臣生長南方不能周知四境之事但為東南之西邊財用匱竭則供億調度必取諸東南東南積剩之物今扵無事之時既巧取而偏用之矣或有東南意外不庭之患又将取之扵何地乎臣竊考唐武徳以後開拓邊境地連西域置都督列州縣開元中置節度以統之軍城戍邏萬里相望然而當此之時糗糧出扵屯田馬牛出扵監牧戍卒繒布取足扵山東而已未甞罄天下之積以従事扵一方也今五勅之所取非嵗嵗常有之數方主議大臣充位之時賴此紓目前之急為廟堂乆逺之慮當如之何制國用者既不卹此議棄地者又執偏見不詢衆庶之論不盡邊臣之說各以利意自復其言因循相仍馴致大患縦以闕乏為憂不過請行鬻爵之𩔖耳神考創法比隆扵三代彼中世之陋法如鬻爵之𩔖乃熈寧初議之所不取也當時條例司臣寮恭議論者今為輔相忍不為陛下一言之乎又況神考自有為之初以至法度之成憂勤不倦非一日之積也所以建子孫萬世之業為四海無疆之慮何意今日繼述先緒乃復遽取中世之陋法而行之者也使財用有餘則朝廷議論自不至此然則神考十九年焦勞之慮特為今日目前之費爾豈不痛哉又聞獻議之臣欲裁損州郡供給減削吏人請受以佐國用樞宻院減罷陕西諸路准備官員數以節冗費此不得已之計非無毫髪之助也然使神考理財之政不為廟堂所壊則臣寮議論亦不至此此等不得已之事不免漸漸為之則筭間架除錢陌貸富人錢穀賣御史告身之𩔖安保其不漸為也主議大臣既去之後設有此事則其斂謗欲使何人當之故凡戸部不得已之下策皆非神考大有為之初意也漸用不得已之策頓改大有為之意名曰建中而偏為過甚之舉名曰繼述而大違神考之緒甚矣其可痛也陛下嗣位之初肆赦天下大弛逋欠此廼真宗之所甞行而神考之所欲為也紹聖役法有一倍三料之文神考素意欲候嵗乆積多則時一弛之所以逺繼成周馭民之法而俯取漢文弛租之政以恱斯民以召和氣以為後嗣之式也夫上之所弛者其數既多則下之所獲者不為僥倖周官八則所謂予以馭其幸者雖非日行之常事是乃馭民之美意陛下式祖宗而行之可謂得繼述之義而人臣之所宜将順者也然方國用匱乏之時而所弛之物其數太多故所謂傾天下之財而使無子遺者言者之所當慮也然赦勅之所放陛下所以廣恩恵五敕之所取大臣所以備邊乏廣恩惠以牧人心有益之事也因邊費而壊成法無益之舉也又赦敕所放其數止扵二千餘萬五敕所取其數不知其㡬萬萬也陛下為有益之事以法祖宗其數又少方乏財之時尚不可以不言大臣為無益之舉以壊先憲其數甚多方乏財之時安可以不慮乎竊惟神考承祖宗乆安之緒熈寧之初國用匱乏而理財之政未脩也王安石曰有天下者豈以乏財為患哉扵是講理財之法立天下之政緝熈増損十有餘年至扵元豐之間法度成就然後州州縣縣皆有蓄積天下無偏乏之䖏将以待非常之用則所謂有天下者不以乏財為患信不誣矣今則不然耗根本之財壊已成之法雖西邊用度目前不乏而天下方匱乏患将由此而作矣盖神考為子孫萬世之慮故政事既立而天下無乏財之患今日壊神考之法則天下之患必自乏財而生此必然之理也且自祖宗以来天下諸路轉運司或有非常之用必須干告朝廷既在􅀴費之外扵理自合應副然自熈寧以前常患無可應副者以理財之政未脩故也由元豐以来根本蓄積之財州州縣縣聚如江海法防堅固内外充溢轉運司􅀴費之外設有干求以此應副不患不足然而神考愛惜民財謹守交雜之法轉運司雖有干求亦不輕與故當時轉運使劉攽之徒妄有乞貸者皆被謫罰今則邊方用度百倍扵昔轉運司匱乏迫窘異扵平時雖有乞貸理合應副然朝廷扵其所請例皆峻拒朝廷豈為愛惜民財謹交雜之法乎良以乏財而已矣諸路誤以乏財廢事為轉運使者安肻受無名之謫乎夫州州縣縣蓄積之物一年之内皆以五敕取之而尚以乏財為患可不慮哉臣􅂅陛下詔宰臣制國用脩戸部右曹之政眀提舉官覆奏之法委官選吏㑹計五敕所起都數若干已到若干未到若干自餘八路那移兊撥以充邊用者若干陜西河東邊費除繫本路錢物及朝廷以錢應副外已用五敕所及外應支五敕所起者其數各若干除已用應支外所餘之數尚有若干凡已往之費不可追究未来之費所宜㑹也前此朝廷遣使㑹計邊費已用之數所得者簿厯盈車不可覆考重有煩費無補扵事今臣所論者右曹根本之財而已不知五敕所取可為西邊㡬年之用否困天下之力壊神考之政而數年之後未免闕絶廟堂之上今亦可以覺悟矣惟陛下熟計之幸甚崇寧中監察御史沈畸奏論當十夾錫錢㝡為剴當畧曰小錢之便扵民乆矣古者軍興用乏或以一當百至于當千此權時之術非可行扵無事之世今當十之議固足紓目前然使游手鼓鑄無故有倍稱之息何憚而不為雖日加斷斬勢不可止恐未能期嵗東南小錢輕錢輕則物重物重則民愈困此盜賊所由起也陕西舊無銅錢故以夾錫為貴一切改鑄則猶前日鐵錢耳今東南方私鑄又将使西北效之是導民犯法也大觀四年張商英為相奏言當十錢為害乆矣舊小平錢有出門之禁故四方客旅之貨交易得錢必太半入中末鹽鈔收買告牒而餘錢又流布在市井此上下内外交相養自當十錢行以一夫而負八十千小車載四百千錢既為輕齎之物則告牒為滯貨鹽鈔非得虚擡之息則不行臣今欲借内庫并宻院諸司封樁紬絹金銀并鹽鈔下令折十錢限民半年所在送官十千給銀絹各一匹兩限竟毋更用俟錢入官擇其惡者鑄小平錢存其好者折三行用如此則錢法鈔法不相低昻可以復舊侍御史毛注言崇寧以来鹽法頓易元豐舊制不許諸路以官船迴載為轉運司之利許人任便用鈔請鹽般載扵所指州縣販易而出賣鹽多寡為州縣殿㝡一有循職養民不忍侵克則指為沮法必重奏劾譴黜州縣孰不望風畏威競為刻虐由是東南諸州每縣二等以上戸俱以物産髙下勒認鹽數之多寡上戸嵗限有至千緡第三等末戸不下三五十貫籍為定數使依數販易以足嵗額稍或愆期鞭撻隨之一縣嵗額有三五萬緡今用為常額寔為害之大者又言朝廷自昔謹三路之備糧儲豐溢其術非它惟鈔法流通上下交信東南末鹽錢為河北之備東北鹽為河東之備觧池鹽為陕西之備其錢並積扵京師随所積多寡給鈔扵三路如河北糧草鈔至京並支見錢號飛錢法河東三路至京半支見錢半支銀紬絹陕西觧鹽鈔則支請觧鹽或有泛給鈔亦以京師錢支給惟錢積扵京師鈔行扵三路至則給錢不復滯留當時商旅皆恱争運糧草入扵邊郡商賈既通物價亦平官司上下無有二價斗米止百餘錢束草不過三十邊境倉廩所在盈滿自崇寧来鈔法屢更人不敢信京師無見錢之積而給鈔數倍扵昔年鈔至京師無錢可給遂至鈔直十不得一邊郡無人入中糴買不敷乃以銀絹見錢品搭文鈔為糴買之直民間中糴不復㑹筭鈔直惟計銀絹見錢須至髙擡糧草之價以就虚數致使官價㡬倍扵民間斗米有至四百束草不下百三十餘錢軍儲不得不闕財用不得不匱如觧鹽鈔每紙六千今可直三千商旅凡入東南末鹽鈔乃以見錢四分鹽引六分𣙜貨務惟得七十千之入而東南支鹽官直百千則鹽本已暗有所損矣臣謂鈔法不循復熈豐則物價無由可平邊儲無由可積方今大計無急扵此薛向昔講究扵嘉祐中行之未㡬榖價遽損邊備有餘逮及熈豐其法始備比年𣙜貨務不顧鈔法屢變有誤邊計惟冀貼納見錢專買東南鹽鈔圖増錢數以僥冒榮賞前鈔方行而後鈔又復變易特令先次支鹽則前鈔遂為廢紙罔人攘利商旅怨嗟臣􅂅明詔執政大臣精擇䏻吏推眀鈔法無以見行為有妨無以既徃為不可復如薛向之法已效扵昔者可舉而行之今之練政事通鈔法不患無人在京三庫之積皆四方郡縣所入不患無備如以三四百萬緡樁留京師随數以給鈔引使鈔至給錢不復邀阻上下交信則人以鈔引為輕費轉相貿易或支請多惟轉廊就給東南末鹽鈔或度牒之𩔖如東南末鹽鈔或度牒敕牒唯許以鈔引就給外餘並令在京以見錢入易樁留以為鈔引之資亦計之得者若舊出文鈔亦當體究立法量為分數支鹽償之自昔立法之難非特造始脩復既廢亦為非易欲興􅀴乆之利則目前微害宜亦可畧惟詳酌可否施行徽宗時李綱論理財以義䟽曰臣伏見朝廷講求理財之術以足邦計議者紛然争獻其說夫以天下之大承平之乆萬物盛多之時􅀴畫財用豈患不足貴扵理之有其義而已易曰何以聚人曰財理財正辭禁民為非曰義財者民之所以相生養者也故人非財無以聚之義者利之本也故財非義無以理之溥天之下莫非王土率土之濵莫非王臣臨之以法度之威何求不獲而先王必以輕賦薄斂為貴者盖知予之為取者政之寳也方今國家用度之廣官吏廪禄之多倍蓰扵前則講求理財之術誠為先務獻議者亦不容無取然臣願陛下必令廟堂之臣叅議以聞蔽自淵衷揆之以義而行之使義然後取人不厭其取上以裕國下以裕民實宗社無窮之利也李復乞置𣙜場䟽曰臣竊見回紇于闐盧甘等國人甞齎蕃貨以中國交易為利来稱入貢出熈河路朝廷察知其情故限之以年依到本路先後之次發遣赴闕而来者不已守待發遣有留滯在本路十餘年者其所齎蕃貨散入諸路多是禁物民間私相交易逺商物貨厚利盡歸扵牙儈臣累次詳問所齎物貨上者有至十餘萬緡下者亦不减五七萬且逺人懐乆客之情平民陷冒禁之法利贏無極盡歸扵牙儈徃来無已每遇發遣徒擾州縣今湟州新復正要措置使商賈奔湊不惟通其有無誠亦厚其根本之勢臣今欲乞扵湟州依雄州火山軍等䖏例置立𣙜場扵湟州别置蕃市以居来者更不發遣赴闕使利歸扵公貨通扵下亦可少補經費復又論錢鈔法䟽曰臣竊見近日言陕西利害者皆言錢輕物重與夫觧鹽鈔法之弊臣甞究其源陜西自康定寳元年間西鄙用兵支費不足遂鼓鐵為錢邊事纔息即時罷鑄至熈寧九年皮公弼主領漕計復奏鑄之迨今二十七八年所鑄不知㡬千萬矣鐵錢不通别路聚積陕西民間既多此錢輕一也陕西百貨皆視榖價髙下近年西邊拓地増築州軍城寨添屯軍馬急扵年計添價糴買兼并巨商蓄榖待價而不出物價愈重錢輕二也若邊事稍息鑄數減少乆而比之今日須重裁抑藏榖之豪榖價稍平百貨自随東南商貨知陕西物重輻湊入關别無回貨皆變轉買鈔而東此鈔價日重平昔鹽鈔常患不行今者價髙乃公家之利異時貨輕則鈔自輕矣臣今欲乞下陕西轉運司有艱扵物料及難般運端閒工匠之䖏可以先次減罷鑄監扵出産斛㪷之䖏結糴一兩次及召人入粟塞下使儲蓄之家不䏻擅價庶㡬榖價畧平御史中丞王安中論妄興坑冶䟽曰臣竊惟自昔神考之世凡山澤之利始掌扵常平仁民愛物之意具諸成憲陛下親政之初諸路坑冶惟舊係轉運司錢本者自属漕司外其餘告發撿踏烹鍊費用等並以常平條令従事官無冗員職有常守後因増廣鼓鑄乃扵河北河東京東西陕西權差措置坑冶官属考扵初令固曰權差又曰候措置就緒即行減罷積嵗于此既無鼓鑄惟陕西河東出自御筆已併歸常平司若河北京東西曽未及省而九路措置之使且復出矣河北之鑿空擾下横及無辜既已考驗陛下沛然親洒神翰令具所費所得来上則官司遷延顧待蠧耗財力之迹臣預知其無所逃扵睿斷若夫京東西與九路之弊獨可弗慮乎京東西之近其無異扵河北陜西河東者固不待臣言而後知至扵九路之事跨地遼逺體勢甚重臣敢不為陛下詳言之頃者朝廷遣徐禋往東南措置銅事其後又益以寳貨禋復命于朝圖繪之數増舊十倍乃奏請分委所部禋盖不虞朝廷使之自行也方禋為此數時峻文移禁錮人吏逼監司守令承認開掘江西洪州有嚴陽山場苖脉乆不興發禋必欲有得不復愛惜人力開掘深入至命官何摭者暴露得疾以斃㝡後禋遣属官監守烹鍛僅得錙銖州縣不得已承認數十兩之額所謂錙銖者人固疑其所自来而數十兩之額人固疑州縣欲取之它也以此一事言之則九路之數豈皆確然可信哉禋既不免自行計窮情得則使事之外别立說以規自免曰若或得希世珍異古之寳器乞納書藝局方陛下聖徳撫運庶邦萬民惟正之供而珎異古器之入自有司存如禋外臣豈其所職盖欲挟此以濟欺誕騷擾之計耳逺方異事初或可為弗窒其源害将甚大今訴訟之詞已有願以田没官者矣矧官属吏額視發運司舟船人従劵給公使之費又不特如河北京東西而已也若夫東南舊来寳藏厲禁嚴宻鼓鑄錢貨又有近降御筆令兩司通融趂辦而青碌之𩔖考扵眀堂第賞之書亦止逐路監司之効設有非泛抛索何必更使禋輩侵官臣愚欲望睿慈加恵天下以今来體究河北銅礦御筆指揮下京東西及禋領九路後来興脩坑冶䖏監司依應體究仍乞檢㑹陕西河東已降御筆叅酌䖏分庶㡬不失政事之體稍去冗官蠧耗之弊逺近幸甚陳次升論中都費用奏曰臣竊觀易曰聖人之大寳曰位何以守位曰仁何以聚人曰財古之聖人非志扵為利而樂扵貨財也以謂理財之道不講則國用不足雖欲聚人守位不可得也臣聞元豐庫昔年所積財帛甚多近嵗關邊支遣殆盡𣙜貨務全藉賣鈔如聞賣鈔之金已是窘乏都商務近来商旅稀少嵗課不登且國家外有邊防之費内有河防之患百官之俸給軍旅之衣糧凡百用度不貲而利源闕乏府庫空虚以至扵此不可不慮伏望朝廷早賜講求利害以通貨財以實倉庫毋使倉卒之間不􅁕扵用以貽國患次升又論收湟州奏曰臣竊以國家今日之患在扵財用不足府庫空虚倉廪匱乏諸路皆然而陕西河北尤甚去秋雖豐登而榖價不減戎兵雖已減省而糧儲不繼方當休兵無事之時尚乃如此萬一敵人犯邊費用百倍将何支梧如聞陕西路新築城寨每嵗所費不貲而湟州一年自費二百八十餘萬未委何䖏糧儲可以供贍有何錢物可以應副臣甞乞措置可守可棄之策不聞如何行遣河北路黄河決溢之後民多流移甚是彫弊敵主新立如聞喜兵好殺盟誓未必可保邊庭難必無虞此二者當今之患要當深思熟講之而不可忽古人有言曰存不忘亡治不忘危然後國家可保也伏望聖慈念古人之言思今日之患勅大臣以理財賦嚴邊吏以謹守禦無使鄰敵乗我之虚猖狂衝突以貽朝廷之憂不勝幸甚次升又奏曰臣竊以國家内外府庫之財祖宗以来生之有道而財常至扵有餘用之有節而財不至扵虚匱是以内外財賦充足而無不給之患近年朝廷知用之而不知所以節之知出之而不知所以藏之戸部不獨左曹財用空匱而右曹亦無餘諸路不獨漕司空匱而常平司亦不足夫天下不能常無事忽有水旱盜賊常賦豈足支梧常平之積實天下根本之財神宗皇帝經畫之意逺矣今天下無事而用之三五年後必甚闕乏一旦水旱盜賊将如之何伏望聖慈嚴勅宰臣講理財之義而常平司錢物不得輕易支費庶使府庫充實良法具存天下之福也左正言任伯雨上奏曰臣竊以今日國家所患莫大不􅁕不􅁕之患非理財無法也用財無節爾貢有常供賦有常取山澤之利莫不兼擅舟車之筭莫不畢入青苗有息免役有剰理財之政可謂有法矣邊隙益廣宿兵益多嵗歉物貴糴價五倍辟名之用乾沒之弊若㑹其數有過常費加之朝廷非泛支賜尋常錫賚之𩔖不惟無名亦且太厚用財之際可謂無法矣取之既悉用之無節諸路上供之外嵗計往往不足椎魯之吏必乞扵朝廷姦巧之吏則多方科折目前取辦不足之患宜救以道臣伏願陛下勅三省下有司㑹計國家一嵗所入與一嵗所出凡有幾支用有餘而畜之或不􅁕而助之凡有㡬内外帑藏之積凡有㡬然後析而三之若干為經費若干為浮費若干為陕西五路邊用之費近質諸元豐逺質諸慶厯孰多孰少孰有餘孰不􅁕寫為一圖以視盈耗目擊心計朝夕在念然後内節浮費如非泛支賜尋常錫賚之𩔖非不得已而不可減者俾有司條陳名件各損其半昔仁宗皇帝甞患支費之冗乃詔自皇后及宗室及輔臣已降南郊賞賜各減其半又甞以齋醮之物須索無度詔中丞劉筠裁減冗費浮費減則經費充矣今年議者謂邊鄙已寧正可偃革省若干戍兵罷若干将佐減若干支用仁宗皇帝甞曰自頃開納夏國本為息民今日邊用猶廣乃詔陕西轉運提刑與經畧安撫使減損邊用併省冗官悉為條目以授監司又甞勅兩川嵗造錦綺改織絹以供邊費邊用節則國用充矣夫以國家太平日乆業大事叢賦入不加多費用日益廣民既不可益賦下既不可更損則愛人足用之要顧有大扵節浮費損邊用㢤此㝡切扵時而易行者臣伏􅂅陛下下三省樞宻院叅議立法留意必行天下幸甚貼黄臣所奏為言天下財用不􅁕乞依仁宗時減浮費損邊用乞下三省樞宻院叅議立法臣伏聞近日文思院扵内藏庫關取銀一千四百兩移用本庫無銀支撥財用乏匱乃至如此慕容彦逢上奏曰臣竊惟神考立常平之法加恵元元意旨深逺著令完具而吏或不䖍便文自營馴致蠧耗出多入寡近因臣寮建言申嚴約束務絶姦弊恵及細民臣愚以謂唯納欠多寡㝡見𣙜行之實使任職者悉心奉法計置及時官無抑勒留難下無詭冒違法之人則良民輸納自無稽違豈有出多入寡之弊臣欲乞應斂常平錢榖逐歲於令佐印紙内批書納欠分數候三考滿日别立殿最之法庶幾知所勸沮罔或偷惰如䝉聖允即乞詔有司施行安燾以學士知河南将行上䟽曰自紹聖元符以来用事之臣持紹述之名誑惑君父上則固寵位而快恩讎下則希進用而肆朋附彼自為謀則善矣未甞有毫髮為公家計者也夫聽言之道必以其事觀之臣不敢髙談逺引獨以神考之事切扵今者為證熈寧元豐之間中外府庫無不充衍小邑所積錢米亦不減二十萬紹聖以還傾竭以供邊費使軍無見糧吏無月奉公私虚耗未有甚扵此時而反謂紹述豈不為厚誣㢤願陛下監之勿使飾偏辭而為身謀者復得行其說欽宗靖康元年御史中丞吕好問乞罷青苖奏曰臣竊見陛下嗣位之初民心仰戴中外胥恱雖敵騎深入人無異意何者天下之人知有休息之日凡所舉動皆順其意所下詔令皆以従祖宗之法為言也今既日乆矣陛下圖治之意雖未少改扵前而徳澤不䏻下究民心歡恱漸不如初何也盖由軍旅未戢祖宗之法未行議論之臣借以為詞而奉法之吏倚以為姦也祖宗之法今雖未得盡行其間有可行之順民心者何為而不為㢤臣請舉其大者青苗斂散之法扵民為害㝡甚扵官都無利益方今州縣常平錢等率無見在每年俵散之時多以虚劵科率逐都保正長等其實請錢者多是州縣官戸公人違法冒名無所不至及送納時只送息錢逐年登帶縣道吏人又因斂散之際恣行乞覓此實無窮之患也民間病此數十年矣今春陛下既降詔旨従祖宗之法用事之臣如此等事自當即罷今乃遷延却避例不敢言其意不過恐異日天下平定復行紹述之說則已受黜責爾遂使朝廷冒虚數斂實怨可為痛心疾首臣願陛下出自聖意将青苗斂法先次改罷眀告天下以固民心其它非祖宗之法逐旋改正行下以息異議無疆之業不勝幸甚諌議大夫楊時乞罷茶鹽𣙜法奏曰臣伏覩陛下屢降徳音欲盡復祖宗之舊崇寧紛更唯是茶鹽二法㝡為民害𣙜茶自唐末始有祖宗盖甞行之矣積年之乆流弊滋甚仁宗詔有司㑹𣙜茶浄利均為茶租戸輸之弛其禁使自興販縣官坐收𣙜茶之利而民得自便無冒禁抵刑之患可謂公私兩利矣當時詔書有曰私藏盜販犯者實繁嚴刑重誅情所不忍是扵江湖數千里設穽以陷吾民也又曰厯世之弊一旦以除著為經常不復更制尚慮喜扵立異之人縁而為奸之黨妄陳奏議以惑官司必寘眀刑以戒狂謬其訓告丁寧至矣固後世子孫所宜守也今茶租錢輸如故而𣙜法愈宻是𣙜之又𣙜也二浙窮荒之民有經嵗不食鹽者茶則不可一日無也一日無之則病矣昔時晚春採造謂之黄茶每斤不過三二十錢故細民得以厭食今買引之直已過數倍未有茶色民間例食貴茶而細民尤被其害行法之初裒刻之吏以配賣引數多為功茍冒恩賞其後以嵗課㝡髙為額上戸有敷及十數引陪費無慮十五六十則人不易供矣諸犯𣙜貨不得根究来厯自祖宗迄于熈豐未之有改也今茶法獨許根究盜販者皆無賴小民一為捕獲則妄引来厯以報私怨官司不敢沮抑追呼枝蔓狴犴充斥經時不䏻決良可憫也𣙜鹽自漢有之非一日也周世宗征河東河朔之民遮道訴鹽法之不便世宗㑹所得息均之人戸従民願也熈寧中有議再𣙜者朝廷不行方神宗大有為之時凡可以益國而利民者知無不為以是為不可行則是終不可也今鹽息敷在人戸者亦輸之如故而又設官置司與它路等其為害深矣江浙有蠶鹽扵春初均與之為蠶繅之用蠶熟以絹償之未為厲民也今蠶鹽不支而償絹不免則鹽之利入官已多矣山谷之民食鹽之家十無二三而州縣均敷鹽鈔民間陪費與茶引等官吏廹扵殿㝡之嚴皆計口授之以充嵗額人何以堪今朝廷不立嵗額不比較嵗課必虧使者持節一路豈肻坐視而恬不加察乎前此定賦之後盖甞不額比較矣而嵗額大虧鹽事監司切責州縣不覺察盜販致有虧欠州縣茍逭譴責不免敷配取辦雖名為不比較而比較之實仍舊也臣竊謂宜一遵祖宗之法罷提舉茶鹽司使之自便無敷配之弊而人始受賜矣往時鹽息諸路所得各無慮數十萬緡以充經費故漕計不乏漕計不乏則横斂不加扵民而上下裕矣議者必謂罷茶鹽二法中都必至乏用臣竊以為不然舊日𣙜貨務所積皆充御前用戸部所得無㡬矣今陛下恭儉節用一毛不妄費焉用此物為㢤兼𣙜貨務在祖宗時鹽鈔自有常數以備經費舉而行之兩無所妨陛下早降睿旨罷此二法以幸天下李光論制國用䟽曰臣伏覩祖宗之制天下財榖悉緫扵三司非條例有㝎數不敢擅支朝廷知其大數量入為出故䏻倉廩充溢用度有餘近年以来政出多門法度浸弛戸部既不得緫天下財賦朝廷亦無縁盡知錢榖大數侵支互用不可幾察名為應奉御前其實般入私室東南財賦盡扵朱勔西北財賦困扵李彦天下根本之財竭扵蔡京王黼自徐鑄蒋彛為常平司官何漸為茶馬司官張琬徐惕燕瑛為市舶官應安道朱彦美玉子獻王復為轉運司官胡直孺盧宗原為發運使王仲閎胡邃為提㸃刑獄宋晦為香塩官劉寄吕岯毛孝立為鹽司属官天下財賦盡歸權倖之家小人乗時無復忌憚今所至匱竭公家無半年之儲百姓無旬日之積加之兵興府庫金帛散用将盡此乃國用危急之時所謂理財經乆之術不可不慮伏望遵依祖宗故事使三省樞宻院通知兵民財利大計與戸部量一嵗出入以制國用仍乞精擇健吏通知財計者置司驅磨諸路應干錢物往来移用過及見在之數其官吏各量添俸給課以功限為之賞罰或專遣使命就所至勾集諸司人吏驅磨庶㡬利源歸一而天下財用可得而理矣髙宗建炎元年知開封府宗澤上奏曰臣竊見京東路青相宻登莱皆産鹽自太府卿鄭僅建請行東北鹽其産鹽州縣並行稅鹽法宣和三年宰相王黼用事始罷河北京東稅鹽其意只欲在京𣙜貨務入納數多應副目前用度遂為東北之害者十年臣亦甞嵗計之行鈔鹽比之稅鹽大段虧少蓋稅鹽不拘錢數多少皆可買販故民易扵得鹽若鈔鹽非富商大賈以千萬計不䏻為也方無事時商賈尚且乗時要利使人食貴鹽況今道路梗澁商賈不行以今嵗春夏觀之官鹽無䖏賈販遂令盜販者專其利其偷竊官鹽又不知㡬何也欲乞特降睿旨将宣和三年以前稅鹽地分並依舊法不惟官收其利以資州縣闕乏亦可止絶私販兼扵鹽法别無妨礙委是經乆可行實有助扵諸州縣糴本且安京東河北兩路人心紹興七年試中書舍人李弥遜上奏曰臣竊惟泉貨之用扵天下猶水之行扵地中其出也有源則其流也不絶一窒其源則竭矣伏覩朝廷多事已来百費叢起其生之也未得其術而用之無窮雖有丘山之積亦日削矣且以一州一月計之不下數萬緫天下一嵗之費可勝計㢤不可不慮也況錢貨之積必有所在不在公家即在私室今國用不足百姓不足公卿之家盡扵盜賊兼并之家盡扵誅求雖比来郡邑所輸悉入諸軍而軍中非積錢之地往往變易輕齎以便攜挈不知何自而往也訪聞多自淮南轉入偽境以資敵國之用兼川陕鐵錢地分近来公然行用銅錢及民間違法銷鑄以為器物如此泄之其患滋甚是欲實漏巵而大其罅也臣願陛下深究此弊申命計臣詳加講議廣所以生之之源思所以積之之術嚴所以泄之之禁誠今日之急務也弥遜又乞置使積粟䟽曰臣聞陸䞇有言晁錯論安邊之策要在積榖充國建破羌之議先務屯田故其扵興元平賊之後猶力請罷嵗運水脚擇人充使委以平糴盖師行之際􅁕食為先不易之理也國家用武十有餘年軍餉日滋終嵗所入才可給目前仰食之衆水旱盜賊之備不預焉一有非常之役不取則不足以濟事功取之則民不堪命長慮却顧者扵此寒心也臣毎扵敷奏之間躬聞聖訓以國用不給為甚患以民力既竭為深憂臣仰體陛下宵旰勤恤之意蚤夜以思祖宗之法有便扵國利扵民可行扵今者發運一司是也其制始扵太宗淳化間而備扵仁宗皇祐之後大槩不過權六路豐凶以行平糴之法灾傷州郡則減價而收之直豐熟州軍則増價而糴以補當輸之數每嵗轉般以實中都亦可謂便扵國利扵民也然今日之宜比昔少異不必盡循舊制當師其意損益以行之臣愚謂當扵經費之外别給糴本數百萬緡復置一司廣行儲積分毫不得取供近用唯以待陛下經逺恢復之須積之一年必見其效三年之間當有一年之蓄加以數年倉廪有豐實之漸田畆有休息之期公私之利不可勝言然方省官之時而欲増置吏員方匱闕之時而欲樁辦糴本方目前仰給之時而效乃在數年之後議者必以為說盖興事者難扵謀始慮逺者不求近功今捐緡錢數百萬増官吏十數人而可以為朝廷長乆無窮之利何憚而不為孟子謂有七年之病求三年之艾茍為不蓄終身不得政可為今日道臣謹條具發運司建置廢罷及今日可以依倣置使之目随此繳進伏望陛下特加聖覽㕘酌利病斷以不疑而力行之不勝幸甚紹興間江西安撫制置大使李綱論財用䟽曰臣竊見自宰臣以下裁減俸禄有以見朝廷財用之闕也陛下臨御以来恭儉憂勤無燕逰玩好之娱六宫簡省無横恩濫賜之費執政常虚侍従多闕省臺寺監之官未甞具員而財用闕乏乃至此者豈非以養兵之費不貲故耶臣切觀近年行在禁衛之兵與夫諸将屯兵扵大江表裏不啻數十萬人日有食錢月有俸料時有激賞犒設凡數倍扵承平無事之時而戸部嵗入常賦無承平三分之一朝廷所資𣙜貨亦頗有入納不如平時之數者然則積月累嵗帑藏遂虚無􅁕怪者戸部調度不足則仰給於朝廷朝廷支降不繼則責辦於州縣雖陛下屢降寛恤之詔不許斂取扵民然勢有不得已者非取扵民曷従而得降官告給度牒理積欠賣戸帖名雖不同取扵民一也方今民力凋弊取之不已物力耗屈人心驚疑非長慮却顧之策易曰何以聚人曰財理財正辭禁民為非曰義財非義不理興師動衆奉辭伐罪非財不行今陛下張皇六師恢復疆土以建中興之業而財用不􅁕将何以克濟大功昔太公佐周而立九府之法管仲相齊而眀取予之權范蠡霸越而用計然之策蕭何輔漢而專轉輸之事近世有唐自天寳而後兵拏不觧肅代徳宗之朝有劉晏韓滉之流皆通扵財計權百貨之低昻籠天下利以佐軍興不斂扵民而國用足載在方冊其術可考臣愚伏望聖慈降旨朝廷委官考劉晏韓滉事跡可行扵今者條具進呈試採其說擇有心計䟽通公亷之臣而推行之庶有補國用扵戸部常賦朝廷𣙜貨外别項封樁專以養兵而佐中興伏惟陛下裁幸髙宗時李光上奏曰臣聞之易曰何以守位曰仁何以聚人曰財理財正辭禁民為非曰義然則善為國者安可不務理財以足用度乎故周室之興厚生民之本則有如公劉齊威之霸富國强兵之術則有如管仲李悝之平糴耿夀昌之常平劉晏之平凖皆䏻斂不及民而用度􅁕其經理財用必有術矣至扵後世聚斂之臣盖非有生財之道不過掊克生靈割剥百姓以欺惑人主冒一旦之寵禄而已豈真䏻為人主興利除害使上下給􅁕乎今軍興之際固宜講究利源以佐國用而自冬春及今朝廷用議者之說巧為名目以斂取財戸帖鬻爵交引給換等法中外騷然逺近疑惑上下愁怨臣恐邦本一揺其祻有不可勝言者伏望聖慈深詔大臣訪求通知財用之士别議生財之術量入為出以制國用如前世數人遺法尚有可施行者古人有言與其有聚斂之臣寧有盜臣盖自古離亂社稷憂危未有甚扵今日者皇天后土眷顧陛下故十年之間强敵偽廷稍稍沮却東南年榖屢登兵力漸振中原赤子矯首望幸庶㡬復覩漢衣冠者恃陛下徳澤有以得人心也昔范祖禹論奉天之難其畧曰徳宗以飢羸之卒守一縣之地而當朱泚十萬之師備禦俱竭危不容喘所恃者人心未去也卒䏻克復宗社不失舊物而況以天下之大億兆之衆守之以道徳用之以仁義其誰䏻敵之故人君苟得民心則不在地之廣狭兵之衆寡王天下猶反掌也湯以七十里文王以百里豈不信㢤臣每每戒陛下以不可行苛刻之政無名之賦務存大體者深慮此聲一出逺近傳播人心動揺也惟陛下察之光又乞廢常平主管官罷發運司䟽曰臣謂今日急務莫切扵理財而理財之政有避其名而因失其實者有無其實而徒存其名者固未易槩舉今姑論其大者其事有二常平之法本扵漢耿夀昌今州縣錢榖有属常平司者名色非一悉揔扵戸部右曹今乃以王安石之故而廢之既使香鹽司兼領又别差主管官一員有司莫之適従錢榖因致失陷豈非避其名而失其實乎發運使本以揔六路財計以漕輓中都餽餉為職兵興以来既無轉輸今乃以糴買事委之其本錢盡従朝廷給降無慮五六百萬緡又以淮南緫制司及諸路失陷囘易市易贍軍等錢嵗亦不下數十萬緡此國用所以益窘也臣愚欲望聖慈特降睿旨廢常平主管官依舊令香鹽官兼領罷發運司其糴買緫制等事令戸部侍郎專領庶㡬名正而事成官省而職舉不勝幸甚戸部尚書章誼上奏曰臣竊惟國家財用轉輸必有心計之臣内外幹旋使山海之藏天地之産通而不竭然後用度不匱祖宗設官理財内則戸部以知天下貢賦盈虚之數外則諸路各有轉運使副以經理一路之財計至扵東南委輸㝡盛則又置發運以督六路供輸之入盖皆有移用補助之法戸部仰以不乏者也今兵革繁興財用為急諸路貢賦或侵奪扵剽攻之盜或乾沒扵貪贓之吏又復州縣之官疲懦者失扵拘催强暴者敢扵擅用戸部不勝其窘間遣郎官分道催督單車所至不過移文終亦索手空歸固無益也而況悍将驕兵各據要害自川廣東西荆湖南北土貢嵗輸不入扵王府者且累年矣王以寧孔彦舟截留扵湖南李允文張用盜取扵鄂岳李山李惇仁奪攘扵䖍吉致此諸路財計散亡之端則皆發運使失職之罪也發運使職緫財計固當竭力奔走上下江湖之間置司形勝要害之地共營中外經常之費今乃坐局一方僅同筦庫之吏豈陛下設官理財之意㢤頃時朝廷㝎都汴京故發運使置司真州泗州兩䖏今朝廷暫駐吴越則發運使當在荆湖南北之間往来督運乃為稱職昔唐韓滉之在東南也當徳宗西狩奉天之日江淮震騷而滉調發糧帛以濟朝廷陸運則勁卒萬人綏靖東南而漕路無梗水運則船置十弩以相捍警而賊不䏻剽當時賴之以成中興今之發運使權重扵昔人而地兼扵數路任非其人䖏非其地宜乎邦計之不裕也伏望睿斷付之外廷討論發運使置司之郡博選䏻臣俾勝其任誼又論發運常平官制因革䟽曰臣伏見戸部掌天下財賦出入在祖宗時則三司使之任也三司使在人主左右緫金榖圖籍之數而諸路各設轉運使以分任一路之責三司使在内諸路轉運使在外其開闔斂散之權有不䏻相通也扵是在三路則有都轉運使在六路則有發運使所以廵行天下周知盈虚之數以制國用自更為戸部以来在本部則有左曹右曹之設在諸路則有轉運司提舉司之異運司則左曹之属也提舉則右曹之属也左曹所入散之以給經常之費右曹所入積之以待不時之須此皆内外相維臂指相應而理財之政宻矣今發運既廢而諸路財賦有無不得以相通提舉既廢而常平財物陷失㡬及扵太半議者乃欲使戸部長貳周行扵郡邑但置主管官以革常平之宿弊誠恐無補治道徒紛紛也臣竊謂今日諸路監司幹官無慮數十人若罷去冗員收其吏禄以復發運司則諸路財用通而不竭矣又今諸路轉運使副率兩員若專委一員撿察常平以應右曹之選則户部財用無陷失矣兩司名實既辨職事所及不敢不盡如䝉睿明灼見因革之原乞付外廷措置施行誼又乞建使名糾察諸路財計䟽曰臣竊惟今日國家財用之乏未有甚於此時也倉廩府庫之儲曾無水旱凶荒之備月營一月嵗營一嵗臣原其所自盖有三焉一則軍旅調發芻糧之費甚廣二則齊民轉徙賦役之度不均三則官吏蠧耗費出之用無節方今外禦邊警内平盜賊軍旅芻糧之費雖欲損節盖未可也至於末作游手填郛溢郭既無榖粟布帛之征又無力役供須之事縣官所取獨在耕織之家陛下海涵天覆視民如傷尺縑斗粟有司不敢擅賦也夫以入者不均而生財之路狹出者難損用財之路多誠使監司州縣撫養凋瘵勸課農桑裁抑浮冗謹毖出納使彊宗大姓肻佐公家之急姦胥貪吏無復乾没之弊則國家每嵗賦入自足支吾今則不然監司州縣翫習茍且財計散亡支費無度朝廷灼見弊端嘗遣郎官奉使福建二廣假以撿察措置之名甚大幸也至於江浙四路尚未付䏻臣使之鈎考臣聞近者四路頗遣催督造船之官若因此使之行委以財用之事而不付以撿察措置之名則臣恐監司州郡未知陛下理財之政將圖恢復足食足兵意有所在或藏匿簿書或移隠財物監司則稱廵厯而逺避州郡則稱去失而難稽甚者宻與行司人吏暗相要結盜換文厯竄易窠名遂致輶軒使者仗節空歸良可惜哉況今郡守監司往往曾厯宰執侍従卿監之任今者單車之使呼喚人吏取索文書當未易折簡致也伏望聖慈崇建使名先賜詔告示諸路以足食足兵之意假使者以亷按糾察之權俟具奏陳大明賞罰庶㡬經常之入得免侵耗正賦之外斂不及民足國裕民於是乎在臣職司邦計不敢隠黙如或可採乞付外廷施行誼又論財賦䟽曰臣契勘朝廷近年用兵以来緣財用闕乏多剏科目以廣生財之路雖名籍甚繁率係於户部之行移而所收財用不入扵户部之帑藏夫名色繁多則有以致議者之紛紜帑藏虚空則無以供軍國之調度此掌邦計者所以難扵稱職也今有條具申稟朝廷乞正本原不然救之末流恐亦無補切見行在與諸路回易庫本用都督府本錢為之而議者謂戸部與百姓争利贍軍酒庫本都督府取江東安撫司酒庫為之而議者謂戸部與建康府争利戸帖錢下及扵細民官告錢徧取扵豪右諸路煑酒各増價直廣西一路剏建𣙜酤其科目如此之多而戸部未甞受一金之入至扵經常之賦又復侵削過半如上供錢帛金銀如茶鹽見錢關引如市舶乳香藥物率經截用計其可見者已輸一千五百萬緡矣已用者固難扵追收未用者尚可以拘集今幸邉陲無事止是供億屯田洎軍馬計一嵗之用已當三千萬緡但倚𣙜貨務所得積日累月以相補助萬一朝廷有所須索以應倉猝之用決不䏻辦伏望朝廷釐正科目各任司存之責拘集見在撥還侵用之數二事既行然後量入為出以儉易奢上􅁕國用下寛民力亦使惟新之政無得而議不勝大幸如䝉採錄乞賜施行戸部侍郎葉夢得上奏曰臣惟方今要務莫急扵兵食二事而食尢為先今地官掌邦財臣之職也古者有生財有節財有理財三者兼備而國用􅁕生財之道比嵗講之已詳所不暇論日近裁損浮費所以節財者亦畧舉矣惟是廢興相因闔散相制以權有無以稽出納者理財之政當在講究竊見兵興以来諸路轉運司及州縣例皆乗時擾攘玩習舊弊凡府藏所當治法令所當行一切滅裂不省至或妄為支費或輕為蠲除以棄其所有遇有緩急反侵取它司斂率百姓上下陵暴彼此紊奪無復綱紀不可不及今早正之臣試畧舉一二如和糴措置扵收成價平之時至翔貴倍蓰乃始科配酒務課額不與之本乃使借貸扵民與之分利公私輸送初不鈎稽至于侵盜因事發露雖加刑辟而無可備償斂散在民初不按視至于欠負拖延嵗月僥倖赦恩而例従蠲免之𩔖所虧折不可勝計甚有畏懦以謀已私則有私立軍伍犒設濫増公吏廪給姑息以邀民譽則擅放兩稅直除和買等公家之入又併侵棄一旦吏按籍告不􅁕乃舉權宜以亂法則侵常平之藏專鹽香之入稱情願以罔民則縦借貸之令申勸誘之法此皆偷安塞責取辦目前不為它人之謀不為後日之計是以上日以匱下日以困若加以數嵗公私其何堪乎臣蒞職之初不敢不因所聞見妄獻其愚伏望聖慈特下明詔申飭諸路漕臣守令使各按法令振舉其職毋得越法守而妄支費毋得矯詔令而輒蠲除毋得斂百姓而濟私謀毋得侵它司而辦已事應䏻以本職自􅁕經費嵗終無陷失拖欠者令戸部察漕臣漕臣察州縣量立員額取其㝡優者指陳實状上之其廢堕者准此特加陞黜眀示勸沮其舊條有當申眀及合立為格法鈎挍撿察者委本部討論措置􅁱立以聞庶㡬當此多事之時人各自奮職思其憂國用民力兩獲兼濟不至遺患它日權戸部侍郎廖剛奏乞宰相兼制國用䟽曰臣竊惟今日國事莫急扵財用嵗入不及承平三之一而費出倍扵昔日所幸頻年無大水旱通泰等䖏鹽額倍増𣙜貨務入納不闕朝廷茍紓目前往往以為如此自可以度日卒嵗不復深慮臣愚竊以為憂也夫水旱飢歉治世數有運鹽請鈔權在商賈官司或有阻莭致其不来則立見虧失然則詎䏻保其長如一日乎古人甞謂國無三年之蓄則國非其國斯言誠不為過為今之計如節用一事一舉措不可忘也如營田屯田二事一日不可忘也此實􅁕財用之本源願陛下毋以言之者多遂以為常談而不加意焉則天下幸甚臣又聞古者冢宰制國用唐制宰相兼領鹽鐵度支戸部國初亦以宰相都提舉三司水陸發運等使盖財用為國之本宰相可不知乎用財之道必量入以為出今也甲主而乙用之主者雖竭而用者若不聞正猶秦人視越人之肥瘠耳臣願陛下速降睿旨下有司討論以宰相兼制國用使得視其盈虚而均節之誠今日之急務也給事中孫覿乞復常平䟽曰臣伏見神宗皇帝􅁱講常平之政置提舉官行其法於天下爾時錢榖充斥府縣大縣至百萬小縣猶六七十萬貫朽粟陳不可勝校臣又聞役法初行取寛剰錢不得過二分以備水旱至元豐八年計所積有三千餘萬貫石元祐二年京東轉運使范純粹欲以此錢米買田舉行熈寧給田募役如邊郡招弓箭手之法是時寛剰錢米尚有此數則常平之積在天下不可勝校可見矣崇寧中始取充學校養士居養安濟漏澤園等費政和以来又取以供花石應奉之資横費三十年所䘮十八邇者議臣追咎熈豐改作遽罷提舉官而常平之財所存十二猶以億萬計一旦斥罷委棄它司争取妄用遂至掃地甚可惜也然而轉運使漕輓軍儲上供之外趣了目前已號稱職無一金之藏它日朝廷有大水旱招集流亡有大舉措繕治宫闕經畫殘破召募軍馬以備不時緩急之須則非轉運使之所䏻辦也方時多事財用為急比見朝廷遣諸路撫諭添置發運副使措置逓馬催發綱運不免差官夫豈得已所謂常平提舉官尤不可已也伏望聖慈眀詔三省選用老成之士追復常平提舉官申講補助之政増廣蓄積之備使它司不得侵而異日有所恃以為萬世無窮之基右正言陳淵上奏曰臣聞商旅不行則有無不䏻以相資而物之有餘者常病扵無用而物之不􅁕者常患乎難得民始有受其弊者矣故舜之懋遷有無周之阜通貨賄不厄商旅乃所以利民而救其弊也自賤夫罔利始有征商之法盖惡夫茍得無厭将使人人棄本而逐末欲以是抑之耳及至後世筭及舟車此何道也而自漢以来未之有改豈非國用待之而後裕耶由是言之古之征商抑其貪所以利民今之征商取其贏所以利國夫利國而不及民已非先王之意況其所征有甚扵異日乎臣觀國家見行條法凡課利場務視元額多寡趂辦不及者罰之若増之過倍即有減年之賞應賞而又有餘者十分之一以給官吏凡所以籠絡而督責之亦可謂盡其術矣而任其事者往往猶以為未足則商旅安得而不困乎故比年以来物價騰踊日甚一日貧民下戸尤為不易皆由征商太重之所致也臣不敢悉以所聞為言姑及近地之可見者只如自衢州至臨安水陸之所經由應稅者凡七䖏使其每䖏止扵三十而稅一不為多矣比及臨安扵其所販已加二分之費而負載糧食之用又不在是是非得三分之息不可為也借使善幹其䏻扵十日之間數百里之内致三分之息乎必不䏻矣如是則所聚之䖏誠不可以賤售所聚之䖏既貴則所出之䖏益不可以賤得此商旅所以不通百貨之直所以乆而不䏻平也雖然此特常用之物而其害已如此至扵用之所急一有不通其害尤甚如今嵗旱乾蘇湖雖不至大歉而衢信所収十無五六若蘇湖之米不移則衢信上下来年必至乏食此又人所甚急者如不早為之慮待其流離旋行賑恤亦恐無及故米麥之稅臣願權與除免使商旅轉販得以私相接濟乆之價平則人人可以備豫不至重貽宵旰之憂矣此聖主所宜留意不可緩者自餘可稅之物縦未䏻盡如祖宗之舊亦當眀諭有司視其所販之直惟務蠲減不求甚増宜􅁕以救目前物貴之弊也萬一臣之愚慮偶合聖心欲乞先下兩浙徧及諸路灾傷去䖏並令依此施行臣不勝過計之至惟陛下財幸詔百官各言省費裕國强兵息民之䇿祠部郎韓肖胄言天下財賦窠名舊悉𨽻三司今戸部惟有上供之目而已問諸路窠名扵戸部戸部不能悉問諸州窠名扵漕司漕司不䏻悉失一窠名則此項遂亡願詔諸路漕司括州縣出納可罷罷之可併併之立為定籍漕司揔諸州戸部揔諸路則無失陷矣經費之大莫過養兵今人亡而冒請者衆願立諸軍覆實之法重将帥冒請之罪則兵數得實餉給不虚省費裕國此其大者生民常賦之外迫以軍期吏縁為姦斂取百端復為冦所迫逐田桑失時冦去復業未及息肩催科之吏已呼其門矣願詔郡邑招集流散官貸之種俟及三年始責其賦置籍書之以課殿㝡强兵息民此其先者王元渤論生財之法䟽曰臣聞王者之理財與私室之理財不同私室之財必待藏扵箧笥王者之財固可寓扵庶民是故以天下之力生天下之財以天下之財養天下之衆未甞以不足為患也近年以来朝廷用度比之異時無事之日奉宗廟祭祀之費十不及一妃嬪禁御之費十不及一百官廪禄之費十不及一然而切切然以不足為患者無它故也興師日滋倉無見儲諸将用財責之省戸而省戸見數無以給之此大可憂者也臣竊觀古者兵民合而為一後世兵民析而為二今欲盡復古制使轅下之夫為執㦸之士有所不可若稍使諸軍漸講屯田之利庶㡬便而易行淮南諸州浙西數郡或連家殺虜致阡陌空閒若選强明之吏俾領屯田差擇行之五年當得勝兵數萬既不乏扵軍紀又可勸扵耕農以是生財若緩甚急至乃欲蘇國計害及民財取之既已再三輸者豈無怨恨逺近結怨本根動揺則非臣所䏻知也李石上奏曰國家莫重扵民莫急扵財既不可以其所急而病其所重又不可以其所重而廢其所急何則重民者天子之職而急財乃有司之事二者有分矣則雖今日之急不患無財也嵗賦所入之外至扵山澤鹽鐵𣙜酟之利有司講之畧具自陛下弭兵息民以来凡前日之過取厚斂者一切罷去又下裕民之詔申命有司捜取寛剰之財以裕吾民陛下得其所以重吾民之職矣然有司吝出納有以所取寛剰為憂方陛下裕民之意日新而無窮有司寛剰之財勉出而有限以有限給無窮有司且病而有言誠如此則言利者得以窺主意而售其術然自臣料之前日多事賦扵民與今日之無事取扵民較之孰多有司之費視前日多事比今日之費孰廣則所謂財者何必藏有司之府庫然後為富㢤十年生聚十年教訓蠶之者疾而衣之者舒耕之者衆而食之者寡此生財之源由民心出也臣願陛下以裕民為財而勿以取民為財執之不改則聚斂之臣語塞而不敢病矣趙元鎮論福建兩川鹽法奏曰臣竊惟國家厯兹厄運頻嵗艱虞遑遑之民雖流離困苦之極而未甞一日忘宋者以祖宗剏業之始結民心為基本故也其扵川廣福建之民尤加優卹以其疾苦赴訴去朝廷特逺而變亂竊發遽難救止故凡鹽酒之利與民同之而不之𣙜近以國用窘急始議𣙜福建之鹽尋欲𣙜福建之酒臺諫臣寮數已開陳其弊言猶未行而近見張浚申眀欲措置四川鹽酒為經乆之利是何中外不謀而同逺方之民亦不容其少安邪浚蜀人也蜀之利病宜自知之願陛下手詔諭浚俾令裁酌及令三省詳議福建鹽法所得所失孰大孰小毋致重失民心斯為盡善惟祖宗肇造艱難欲垂法萬世而一時建立掃地殆盡獨此民心未至離散若併此而失之則大事去矣幸陛下留意厯代名臣奏議卷二百七十
