body:
  text: 歴代名臣奏議卷二百二十明楊士竒等撰兵制宋仁宗時陜西經畧安撫使夏竦論兵政曰臣聞屯師制敵其急有四簡士卒齊號令聚芻粟利器械士卒不簡則陣不成列號令不一則戰不應節芻粟不聚則不能持乆器械不利則不能爭鋒陣不成列則左擊右觧戰不應節則前進後退不能持乆則衆心易離不能爭鋒則兵氣不振不知芻粟器械之計者以卒與敵也不知士卒號令之要者以將與敵也覆軍殺將大事去矣善為將者簡其部伍稽其將校不以腰腹膚革為選而尚其能不以年所乆次為勲而計其庸壯者或困於暴露瘠者或便於馳逐舊者或畏避無勇新者或自奮不顧尚能而用計庸而賞然後為金鼓以節其進退為旌旗以正其行伍金鼔節則聽者專旌旗正則視者審號令不差耳目不惑則勇者不得獨進怯者不得獨退三令五申多多益辦扵是治倉廪以堅其心整武備以揚其氣其心堅則鬬志勵其氣揚則勇心奮治衆如治寡用弱如用彊以是而觀則兵政成矣蔡襄上奏曰臣伏見西鄙用兵以來首尾六年自劉平任福葛懐敏三將覆没亡者十萬餘人沮損國威公私空匱邦賦㸃差之計為患日深今被邉之郡甲兵非不多也歴渉數年訓練非不乆也然而屢戰屢敗何哉臣熟思之盖軍法未立將謀不專也所謂軍法未立者今之都部署及統帥之名其鈐轄路分都監都同廵檢等並是佐属裨校各以賔禮相接主帥等威既不尊異向下官属更無節級相轄之理及至出軍首尾不能相救號令不能相通所以多敗也所謂將謀不專者朝廷每有指揮事件多下逐路並令鈐轄都監都同廵檢等同共􅀙長商量大凡兵事惟大將得以專之秘計深謀豈容衆議乃令僚佐參論短長至有各出意見互相詆毁謀無所主事無不漏所以多敗也臣竊以軍法不立將謀不專而勝敵者無有唐郭子儀李光弼等以九節度之兵攻安慶緒而輙敗者何也子儀光弼名將也九師之師共數十萬也以安慶緒之窮困豈能禦之然而輙敗者盖軍無都帥不相統轄謀議不同所以致敗也太宗朝曹彬潘美興兵北舉而無成功者何也曹彬潘美名將也三路並入大舉也然而無成功者盖臨軍劉文裕王詵貪功立異主將不能奪之所以無功也以古今事理參之未有大將不專而能立大功也或曰今諸路帥臣各得便宜劄子臨事自可處置何必變更軍法乎臣謂若法不素立威不素行雖得便宜豈能使上下必信乎臣請逐路都部署見管兵馬人數列為裨校部曲之差分為前後左右之属管兵臣僚官員並乞改換軍職使名以所領兵多少為等大小相乘節級相轄如有違犯並同階級所以立成一軍自然選揀精審以戰則勝以守則堅此至急之務也襄又上言曰或曰練兵擇馬減省邉郡之糧饋其足以持乆乎曰若欲為持乆計者莫若増置鄉兵有唐之制天下州郡募百姓為府兵府不過一千二百人外折衝果毅府五百七十四而籍名扵官不離其鄉里農隙教習武藝其餘時則居家有警急則集而守備今若置之不費國家之用足為天下根本矣臣竊謂闗中今若召募一年之間可致五十萬人一年教習足以守備則闗中之勢已強矣或曰今募鄉兵則闗中騷動如何曰府兵不黥其面又立名目若折衝果毅之𩔖與兵卒不同擇其鄉里豪武者為總領乘農間則教習有警急則守城不離其居不妨其業則百姓為之何所苦也若然有必置之術頃年靈武用兵陜西般糧草最為勞弊至今老人耳目相接往往皆能言之若先下陜西計度轉般糧草往邉郡次下募兵之制應家有充鄉兵特免轉般如是應募者衆矣或曰兵散在野則如何曰開元之前不聞府兵為亂者盖其勢分犬牙相持雖乆不為患也矣臣今畧陳其大槩國家儻行之乞下大臣詳議條目襄又奏減費用曰臣竊見正月以來發兵馬赴沿邉州郡皆全軍而往未嘗精擇夫全軍而往必有老者武藝不精者此等兵卒皆不可用又邉郡之地多處山險而軍中之馬有老病瘦瘠不堪馳逐者亦随軍而往若有戰鬬亦不可用也況沿邉如鄜延等山路險阻饋運雖今日中糴糧草皆是本處居民積聚之餘若一嵗之後必須外州輦運茍非擔負不可得至是以不可用之軍馬坐費難致之芻粟臣欲乞令邉郡帥臣扵已至兵馬中選武藝精者及馬之強者留之其兵卒老弱者武藝不精者及馬之老病瘦瘠不堪馳逐者皆遣至近裏州軍或罷歸之所貴便扵供給夫兵精馬強以戰則力倍自然臨邉之郡糧儲可節也知諫院司馬光論揀兵䟽曰臣竊聞朝廷近降指揮揀選諸指揮兵士補填近上軍分其主兵之官惟務人多不復精加選擇其間明知羸弱悉以充數臣以耳目踈短聞之後時不能豫陳可否致事已施行然其得失利害之明不可不盡為陛下言之往者不可及來者猶可追也臣竊惟當今國家之患在扵士卒不精故四夷昌盛財用不足故公私窘迫今縱不能澄汰衰老以省大費而又平居晏然非有警急坐増無用之衆以長無窮之患臣不知為國計者果如何也方今天下安樂無虞而府庫之積随得随散曽無羨餘設不幸有螽螟水旱饑饉相仍盜賊猝起戎狄内侵不知陛下將何以待之此不可不為之先慮也臣竊觀自唐室募兵以來果能得武猛材力之士猶為有益若不擇勇怯而養之臣不知其可也唐徳宗以神䇿軍使白琇珪為京城召募使應募者皆市井沽販之人有名無實及涇師犯闕徳宗命琇珪以神䇿軍禦之卒無一人至者徳宗狼狽失據遂幸奉天及五代之際軍政尤紊是以叛亂接迹禍敗相尋周世宗以髙平之戰士卒不精故樊愛能何徽所部先奔歸而大閱諸軍悉簡去老弱選其精鋭以為侍衛親軍由是禁兵之盛近世無比故能南割淮甸北取闗南羣雄畏服所向無敵太祖皇帝受天明命撫有大寳當是之時戰士不過數萬北禦契丹西捍河東以其餘威開荆楚包湖湘卷五嶺吞巴蜀掃江南服呉越太宗皇帝紹丕烈奮神威遂拔晉陽一統四海堂堂之業萬世賴之今天下兵數臣不能盡知竊聞比扵太祖皇帝時其多數倍然元昊羌胡之豎子智髙蠻獠之微種廼敢倔強河西横行嶺表國家發兵討之士卒或望塵奔北或迎鋒沮潰毁辱天威為四夷笑由是觀之養兵之術務精不務多也且今所選之兵升其軍分増其粮賜是宜感戴上恩人人喜悦而竊聞京城之内被選之人往往咨嗟悲怨父子相泣況扵外方兵士違去鄉里訣别親戚其為愁苦不言可知使中外人情遑遑如此豈惟乆逺之害亦不可不以切近之憂為萬一之慮也兵者國之大事廢興之端安危之要盡在扵是臣不知曽與不曽令兩府大臣相與熟議經乆利害然後行之今在京兵士已經揀上分配諸軍者無如之何其未揀及外州軍士伏望朝廷特降指揮下應係揀軍臣僚須是一一躬親子細揀選好人材有膂力及得等様别無羸弱方得揀上如已經㨂中後朝廷别差不干礙官覆㨂得却有不及等樣及羸弱病患之人其元揀軍臣僚伏乞重行貶竄仍自今後每遇大叚招揀兵士並須先令兩府臣僚同共商量度財用豐耗及事之緩急若須至招揀方得聞奏施行并戒約揀軍臣僚務精不務多一如今來指揮取進止蘇舜欽上䟽曰臣謹按周禮牙章以起軍旅漢世發兵皆以虎符所以嚴國命而絶姦端厥後給銀牌以為信五代䘮亂凡奉使調發但樞宻院給牒國朝太平興國中以李飛雄之為詐有詔復用銀牌焉自後又復廢罷臣竊見方今外郡兵馬只是三班使臣齎宣起發而無銀符之制況印文篆刻尋常官吏亦不能盡通姦詐或能為之當用武之際必須大為之防臣欲乞今後起發兵馬及乘逓馬者中給銀牌以復本朝舊制其規矩増減乞詔有司詳定之伏取進止陜西經畧安撫使范仲淹䟽曰臣竊知陜西禁軍廂軍不下二十萬衆防秋在近必須養育訓練以期成功在乎豐以衣食使壯其力積以金帛示有厚賞牛酒以恱之律罰以威之如此則兵有鬬志將以増氣雖二十萬衆合為一心有守必堅有戰必強平寇之期臣可卜也若飢不足其食寒不足其衣出無壯力入無厚賞軍有退志將必䘮氣雖二十萬衆或有二心守則不堅戰則不強平寇之期未可卜也扵弓箭手民兵肯戰守之時事須賞勸所用金帛誠須大備今陜西百姓已虚三軍未振或聞三說之法可以備邉以臣所見今𣙜貨務商客纔有一百來名縱許扵陜西河東路以三說入中即縁商客未多且可少助糧草而已若金銀錢帛則嵗時之内必難􅂶足臣所以請放行向南塩客使客旅入納粮草并金銀錢帛數更有逐處富實之家不為商旅者必須以利勸之臣請逐處勸誘入納上件物色一件納及得萬數除給與向南末塩交鈔外更與恩澤一萬貫者與上佐官三萬貫者京官致仕如曾應舉到省與本科出身除家便官願班行安排或不就差遣者亦聽所貴防秋之期頗有邉備乞朝廷速為大計使百姓樂輸三軍樂戰則敵人不利中外無憂山海之利何足以吝國家安危之計在聖心英㫁天下幸甚知成徳軍宋祁請復唐䭾幕奏曰臣聞唐時出師用兵每十為五䭾法馬牛任従所便其間随行什物鍋幕之𩔖皆具故師行萬里經亘嵗月無所闕乏自五代之亂更相侵擾其兵不出中國弱者輕齎強者因糧遂失五䭾法至今相承不復討尋臣伏見朝廷之制每指揮五百人指揮使得夾幕一具副者得單幕一具馬軍得葉鍋布行槽等若干歩軍得鍋若干自軍貟以下更無帳幕或出次野外雖甚風雨亦無所庇又戰士被甲所將衣衾悉自負荷馬軍則盂杓之𩔖悉在馬上然則行數百里人馬強力皆已先疲脫若逢賊安能挽蹋擊刺與爭勝哉故無幕帟則士卒無所休庇無䭾物則士卒須自負荷此扵軍戎亦非小害臣乞詔近臣檢求唐䭾幕法下殿前馬歩軍司議可復與否明條利害上禀朝廷指揮取進止宋庠上奏曰日者朝廷念承平之久再令河北河東蒐補強壯之籍及諸路創添弓手隂為武備誠大惠也然綱條粗舉防檢未周若弗逺圗懼無實効竊觀諸路唯河北風俗差為習慣若欲立法定制宜􅀙此始謹具利病如左一退虚數近者差㸃強壯之時依先降條貫扵三丁兩丁内以一丁係籍故河北比扵他路民數最多然其間壯老相叅貧富不等每嵗團集訓練之日雖官給糧食而本家亦有齎送之勤又别無優異蠲存之制故兩丁之户一丁在官一丁供給是一家之事廢矣又州縣有諸色公人之役理難減罷今一家有應别役者則權免強壯候其役罷復收而籍之此亦一名之家供兩色之役畨休逓上非人情之樂也臣欲乞委本属長吏躬閱户等應第四等以上户除老弱外實有三丁者取一丁自餘兩丁及第五等户皆免之以備他役仍令州縣將本處諸色公人實數别定合差人户常㽞三畨以相替換不得更充強壯已係強壯者亦不輪充他役如此則人有定業户無兼勞公私之間各得其所一備實用伏詳河北初置強壯之意但欲令鄉土所在自為之守故不責以戰鬬金鼓之事是以昨來再行添差之際明告以不刺手面不離鄉里且為禦盜防城之備臣竊念既已㸃定勁勇數十萬人而不能用誠可惜也且邉朔之地萬一有警則田野之户並將家属入保堅城當此之時無論公私盡可驅而為守何必預籍強壯也臣故欲先簡去貧弱少丁之户取其實力因而用之之術敢舉其例假如大名一府今有強壯四萬餘人其中復免放兩丁貧弱及應州縣色役人外只取三萬實數聞本府常屯禁兵五千則乞差強壯三千留禁兵二千共充五千之數每半年一代則三萬人為十畨畨各五年一上矣其他州皆凖此法常以五分為率二分正軍三分強壯若更有征守随多少復發但許不離本路謂若河北即不差扵河東如此則籍不虚設而軍政成矣然後可以加惠而恱使焉一厚蠲復凡人情有利則趨無利則止今既欲驅以征戍必當因利害而導之伏請應強壯之家除正稅外令本属州縣體量民情扵科調中最所憚者一切免放風聞今河北民最苦折變稅物及和買紬絹河東民最苦和糴斛米上畨者扵免放之例又加厚焉出征者扵加厚之外復優賜焉至河更為一部署凡河北一路強壯分三部署以統焉平寜之時各令本州分畨以習武警急之際則部署随多少聚之扵本路以備戰河北一路先定其制則他路可倣而為法矣若常日在家不上者委本縣令佐或本路别使若令提㸃刑獄使之𩔖專相督察勸以農事有㳺惰不作則嚴刑以糾之又每州别置鈐轄一貟與知州同掌兵籍凡言兵則正軍強壯合以為一如此則舊屯禁軍可並歸宿衛唯留就粮者扵本路用相鎮服俟其耳目漸熟則自成府兵之制其他委曲條貫可使有司因時増借也庠又奏曰臣近覩吕夷簡再述河北強壯乆失訓練等事尋已却委本官就近詳酌者臣竊聞跨河而北元係強壯之籍者踰數十萬皆土著精卒為國扞防官司㸃習條約明具自契丹通好以來而内外共務因循專為嫌避不教民戰三十餘年逃冒流亡但存空簿日復一日識者寒心而吕夷簡欲舉舊章乞加綜覈此誠深計預備國家長乆之業也況兹一事前後上言者至衆而事未果行大抵慮敵人警猜有奸盟好然敢問議者若終不訓習可保北敵永無患乎此乃慮外忘内視蚤蝨而不見太山之論審如此者亦當别為長筭安可捨舊防而待決卧積薪以俟燃邪臣再思依違之端盖由諸臣不敢專任其責常虞鄰邦萬一之隙自廢中國無窮之利務習常態茍圖目前況兩國盟書本無此禁我之政令彼何預焉且聚民教之不過以生事為戒猶有素備之防若弃而弗脩則養禍自貽遂無可救之䇿二者相準利害甚明矧今羌賊背恩邉境騷動臣以為可因此案集聲為援助雖使傳播亦何害扵歡盟哉安危之機理不可緩臣忝聞政事為時未乆言輕體大懼縁人廢欲望聖慈更與張士遜章得象王騣已下老成之人參決可否必謂恐生外釁即乞特差精幹之臣别託他事奉使河朔與吕夷簡及都轉運司宻為規畫將主客二等丁壯如何均濟兼㸃集之後用何術得外無張皇内便教習并望謄寫近日臣僚所上鄉兵利害文字令一䖏商量使行經乆惟陛下留神省察時兵冗用度乏殿中侍御史吕景初奏䟽曰聖人在上不能無災而有救災之術今百姓困窮國用虚竭利源已盡惟有減用度爾用度之廣無如養兵比年招置太多未加揀汰若兵皆勇健能捍寇敵竭民膏血以㗖之猶為不可況羸疾老怯者又常過半徒費粟帛戰則先奔致勇者亦相牽而敗當祖宗時四方割據中國纔百餘州民力未完耕植未廣然用度充足者兵少故也而所征皆克自數十年來用數倍之兵所嚮必敗以此知兵在精不在衆也議者屢以為言陛下不即更者由大臣媮安避怨論事之臣又復緘黙則此弊何時而息望詔中書樞宻院議罷招捕而汰冗濫英宗即位召蘓頌提㸃開封府界諸縣鎮公事頌言周制六軍出扵六鄉在王畿四郊之地唐設十二衛亦散布畿内郡縣又以闗内諸府分𨽻之皆所以臨制四方為國藩衛國朝禁兵多屯京師及畿内東南諸縣雖饋運為便而西邉武備殊闕今中牟長垣都門要衝二鄙驛置皆由此而舊不屯兵閴無防守請置營益兵以備非常治平元年三司使蔡襄上論兵九事䟽曰臣近上國論要目十二篇以謂當今之急務彊兵為第一事富國為第二事欲脩治道自此而始兵不強則國不富國不富則民不安是故始扵強兵而終扵安民本末之論也強兵之說如何一曰消冗謂兵不可以暴減當有術以消之二曰選擇謂老弱疾病不堪戰陣之人即揀擇而去之三曰省兵謂不應置兵處與置之過多者則省之四曰訓練謂兵雖少壯而訓練不得其術與不教同五曰立法謂兵絶無統制故不可用用之則敗此五者備脩則兵少而精矣少則財用饒財用饒則國富矣兵精以戰則勝以守則固而兵強矣其說皆世人常論也然而行之則為治道之始不行則為天下大患是世人之常論乃當今之急務臣故謂之第一事一事中書不與知兵増兵多少不知也樞宻院要兵則添財用財用有無不知也管軍將帥少兵則請增不計校今日兵籍倍多何故用之不足也三司但支辦衣糧日日増添不敢論列謂兵非職事也四者各為之謀以至扵此若通而為一則可以計校兵籍多少財用有無不至扵冗臣欲乞招置増添兵數樞宻院中書共議之先令三司計度衣糧如何足用管軍每乞増置必須詰問其所少之因必不得已方可具奏如此謹重乃省兵之一端也一事近年置諸路安撫鈐轄添屯禁軍自京西江南東西廣南東西兩浙福建等駐泊禁軍皆是北人南方水土異宜水行不知舟檝之利山行不堪阻阨之險一往三年死亡殆半其不便一也只如差二萬人駐泊及至當替又須二萬人常須四萬人可了辦以此屯戍之多軍還到營未及兩三月又復出軍不唯道路勞苦妻奴隔闊人情欝結其不便二也今欲除京東淮南外諸路鈐轄安撫司所管駐泊禁軍候其年滿量留合要人數差補外並只放還本營更不填闕或問南方難用北軍祖宗平定南方盡是北軍今來何故難用曰祖宗之兵誅討大計未有不從中外兵今者南方但當作禦盜賊之計若禦盜賊諸路各有招置禁軍練習精熟可以驅使賊勢大者暫遣北軍不為失䇿此省兵之一端也一事陜西河東自慶歴以來用兵之際置寨柵數多所以添兵寨柵本以通糧道護耕農非有益扵攻守今當先去無用寨柵或只量留兵卒随宜罷遣以寛難置糧草之費亦省兵之一端也一事防邉兵卒老弱病患先須揀選若在邉鄙不唯虚費糧儲兼亦不堪戰鬬千兵若有百人老弱遇敵而先奔即是千人皆廢如此為患須至選揀馬有不堪入陣者而為患與老弱之兵同陜西河東方今無事時若先選揀不唯訓練精熟倉卒有備大可減省糧草以寛國用一事或曰招置土兵如前日陜西弓箭手之𩔖只給與田不費衣糧扵事為便且如河北招置土兵為害深矣土兵一人可給戍兵三人兼又父子相承未嘗出城驕蹇難動故曰為患深矣河北義勇十九萬人昔年差㸃人情驚動今耳目已熟但須整緝訓練緩急得力扵其間更選強壯須及十萬人不費衣糧可與土兵相制屯戍之兵可減也一事養兵之費禁軍一兵之費以衣糧特支郊賚通計一嵗約費錢五十千廂軍一兵之費嵗約三十千通一千一十八萬餘人一嵗約費四千八百萬緡此其大較也若減禁軍十萬嵗減緡錢五百萬减廂軍十萬嵗減緡錢三百萬欲減禁軍先減屯戍欲減廂軍先減綱運此其要也一事諸路廂軍一指揮有六七百人撿尋舊額並無條制盖年嵗既逺亡失舊文今若朝㫖諸軍指揮并將校以下不得過五百人舊額不滿五百人即依舊額今日以前有剩者並令依舊候及五百人一依今來指揮輙敢額外添人並以違制論不在去官原赦之限一事禁軍指揮近年添置軍額名目數多指揮將窠雖全兵卒只有三二百人虚費將窠請受今若逐路軍額先與條約謂若兵士三百人即有將窠三十人見在人數已多者仍舊或移補别軍候及三百人更不補填漸可併省也一事欲減廂軍先減綱運今天下無名綱運最為枉費兵士邉郡兵官替移迎候送還廂軍動皆數百人多者至千人自來明有條制州郡皆以人情不敢禁約此一事也南方替罷官員近由江浙逺自湘潭一舟十人至二十人一嵗往還京師可了一次一舟之費小者五百千大者七百千所載官物不過數千緡之直衣糧所費㡬何此二事也天下州郡自太平以來廨宇亭榭無有不足每遇新官臨政必有改作土木之功處處皆是不唯枉費財用必須多役兵卒此三事也天下特送官物入京如牛皮兵器之𩔖多由陸路若委本路轉運司不急用者罷省之或令水路可以減省兵役此四事也養兵挽船不若和雇則止扵程限之資養兵則終嵗給之其費必倍此五事也大要舉此五事嚴與條約廂軍可省矣右僕射韓琦上奏曰臣伏以三代漢唐以來皆籍民為兵故其數雖多而贍飬至薄所以維制萬㝢而威服四夷又非近所蓄冗兵可及也唐置府兵最為近古天寳已後廢不能復因循至扵五代廣募長征之兵故困天下而不能給今之義勇河北㡬十五萬河東㡬八萬勇悍純實生扵天性而有物力資産父母妻子之所係若稍加簡練亦唐之府兵也陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保㨗正軍及夏國納欵朝廷揀放扵今所存者無㡬河北河東陕西三路當西北控禦之地事同一體今若扵陕西諸州亦㸃義勇止刺手背則又知不復刺面可無驚駭或令永興河中鳳翔三府先刺觀聽既安然後次及諸郡一時不無少擾而終成長利司馬光上奏曰臣近日已二次上言乞罷刺陕西義勇事未䝉朝廷采納臣欲止而不言則不忍坐視一路之民横受困苦而自圖一身之安又恐遷延日乆則無及扵事是以不敢避斧鉞之誅繼上封奏為陛下極陳其害臣比日以來熟思此事誠扵民有世世之害扵國無分毫之利何謂扵民有世世之害臣竊見河北陕西河東自景祐以前本無義勇凡州縣諸般承役並是上等有物力人户知當其鄉村下等人户除二稅之外更無大叚差徭自非大饑之嵗則温衣飽食父子兄弟熈熈相樂自寳元慶歴之間朝廷因趙元昊叛亂契丹壓境遂扵三路鄉村人户之中不問貧富等第但有三丁之家即揀一丁充鄉弓手及強壯其時西邉事宜尤急尋將陕西一路鄉弓手盡刺面充保㨗指揮正軍其河北河東事宜稍緩遂只將鄉弓手強壯刺手背充義勇自此三路之人始騷然愁苦矣其河北河東之民比扵陜西雖免離家去鄉戍邉死敵之患然一刺手背之後則終身拘綴或欲逺出幹事糴賤賣貴或遇水旱凶荒欲分房逐熟或典賣田産欲浮逰作客皆慮官中非時㸃集不敢東西又當差㸃之際州縣之吏寜無乞覓教閱之時軍貟教頭寧無斂掠是扵常時免役之外添此一種科徭也若果如議者之言無害扵民則民皆樂従官中何必更刺手背以防逃竄乎以此觀之義勇為害扵兩路之民也可知矣況陕西扵慶歴年中民家已各䘮一丁刺充保㨗流落不歸今又取其次丁刺充義勇不亦甚乎朝廷近年分命朝臣徧往諸路減放謂之寛恤民力今乃無故一旦刺一路之民十有餘萬以為義勇何朝廷愛之扵前忍之扵後憫之扵小而忘之扵大乎且今日既集之後則州縣義勇皆有常數每有逃亡病死州縣必隨而補之則義勇之身既羈縻以至老死而子孫若有進丁又不免刺為義勇是使陕西之民子子孫孫常有三分之丁為兵也臣故曰扵民有世世之害也何謂扵國無分毫之利太祖太宗之時未有義勇至于正軍亦不及今日十分之一然而太祖取荆湖平西川下廣南克江南太宗取兩浙克河東一統天下若振槁拾遺此豈義勇之力也哉盖由民政脩治軍令嚴肅將帥得人士卒精練故也康定慶歴之間趙元昊負累朝厚恩無故逆命侮慢不恭侵犯邉境朝廷竭天下之力以奉邉鄙劉平任福葛懐敏之師相繼覆没士卒死者動以萬數正軍不足益以鄉兵外府不足繼以内帑民力困極財物殫盡終不能出一旅之衆渉區脫之地以討其罪而不免含垢忍耻假以寵名誘以重賂僅得無事當是之時三路新置鄉兵其數十萬何嘗得一人之力以此觀之義勇無用亦可知矣賈誼有言曰前車覆後車戒康定慶歴禦戎之䇿國家當永以為戒今乃一一檢當時體例而行之是後車又將覆也有難臣者必曰古之兵皆出民間豈民兵可用扵古而不可用扵今乎臣則對曰三代之時用井田之法以出士卒車馬居則為比閭族黨州鄉行則為伍兩卒旅師軍為之者皆卿大夫也唐初府兵各有營府不属州縣有將軍郎將折衝果毅以相統攝是以令下之日數萬之衆可以立具無敢逃亡避匿者以其綱紀素偹故也今鄉兵則不然雖有軍貟節級之名皆鄉黨族姻平居相與拍肩把袂飲博鬬毆之人非如正軍有階級上下之嚴也若安寜無事之時州縣聚集教閱則亦有行陣旗鼓弓弩坐作叫噪真如可以戰敵者彼若聞敵人大入邉兵已敗邉城不守敵騎殺掠蹂踐卷地而來則莫不迎望風聲奔波迸散其軍貟節級將鳥伏䑕竄自救之不暇豈有一人能為縣官率士卒而待寇乎以臣觀之此正如兒戲而已安有為國家計警騷一路之民使之破家失業而為兒戲之事乎臣故曰扵國無分毫之利也凡此利害之明有如白黒伏望陛下不以臣愚賤而忽其言少留聽察其刺陕西義勇事早賜寢罷則一方幸甚光又上奏曰臣近者已曽四次上言乞罷刺陜西義勇别白利害極其懇惻終未䝉省察方今陜西一路之民小大皇皇如在湯火之中而朝廷晏然略無拯救之意臣職在箴諌安可塞黙不敢廣有援引以煩聖聽請以目前顯驗言之今建議以義勇為便者必曰即日河東河北不用衣粮而得勝兵數十萬皆教閱精熟可以戰敵又兵出民間合扵古制臣請言其不然彼數十萬者虚數也教閱精熟者外貌也兵出民間者名與古同而實異也何以言之河北河東州縣既承朝廷之意各揀刺義勇只求數多據帳籍言之誠有數十萬之衆矣若萬一敵人在近官中急欲㸃集之時則一人不可見矣豈非虚數乎平常無事州縣教閲之日觀者但見其旗號鮮明鉦鼔備具行列有序進退應節即嘆美以為真可戰敵殊不知彼皆隊舞聚戲之𩔖若聞敵人之來則瓦觧星散不知所之矣豈非外貌乎古者兵出民間民耕桑之所得皆以衣食其家故處則富足出則精銳今既富斂農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也如此民之財力安得不屈豈非名與古同而實異乎以臣愚見河北河東已刺之民猶當遣放況陜西未刺之民乎陛下欲知利害之實何不試召建議者而問之曰河北河東自置義勇以來敵人凡㡬次深入至腹内州軍用義勇拒戰而敵人敗退今既有義勇之後三路正軍皆可廢而不用乎若果然敵人曽深入因得義勇之力而敗退今來刺義勇之後正軍皆可廢罷此乃萬世之長策也願陛下行之勿疑若自置義勇以來未嘗經陣敵使用今來雖有義勇正軍亦未可廢罷則何忍以十餘萬無罪之赤子盡刺以為無用之兵乎天生聖君以為民也民今如此陛下豈可全不為之動心乎臣之所言盡扵此矣陛下若以為稍有可采即乞早降指揮下陜西令罷刺義勇以救一方之民若以為勅命已行不肯遽改即乞且免刺手背候邉事寕息依舊放散則民有一時搔擾之勞猶免終身羈縻之苦若以臣所言皆孟浪迂闊不可施行則臣之智識愚闇無以勉強變更不可久汚諫諍之列伏望聖慈特賜降黜别擇賢才而代之光又乞罷陜西義勇劄子曰臣傳聞朝廷差陜西提㸃刑獄陳安石扵本路人户三丁之内刺一丁充義勇不知虚實若果如此大為非便臣竊意議者必以為河北河東皆有義勇而陜西獨無近因趙諒祚寇邉故欲廣籍民兵以備緩急使之捍禦也臣伏見康定慶歴之際趙元昊叛亂王師屢敗死者動以萬數國家乏少正軍遂籍陜西之民三丁之内選一丁以為鄉弓手尋又刺充保㨗指揮差扵沿邉戍守當是之時閭里之間惶擾愁怨不可勝言耕桑之民不習戰闘官中既費衣粮私家又須供送骨肉流離田園蕩盡陜西之民比屋凋殘至今二十餘年終不復舊者皆以此也其謀䇿之失亦足以為戒矣是時河北河東邉事稍緩故朝廷但籍其民以充義勇更不刺為軍雖比之陜西保㨗為害差小然國家何嘗使之捍禦戎狄得其分毫之益乎今議者但恠陜西獨無義勇不知陜西之民三丁之内已有一丁充保㨗矣自西事以來陜西困扵科調比扵景祐以前民力減耗三分之二加之近歳屢遭凶歉今秋方獲小稔且望息肩又值邉鄙有警衆心已揺若更聞此詔下必大致驚擾人人愁苦一如康定慶歴之時是賊寇未來而先自困弊也況即日陜西正軍甚多不至闕乏何為遽作此有害無益之事以循覆車之轍也伏望朝廷審察利害特罷此事誠一方之大幸光又乞罷陜西義勇劄子曰臣近曽上言乞罷刺陜西義勇事未審朝廷曽與不曽别為商量臣前次上殿乞陛下留意備邉所謂備者非但添屯軍馬積貯粮草而已在扵擇將帥而脩軍政今將帥不才者未聞有所更改軍政頽弊者未聞有所振舉而忽取腹内州軍之民盡刺以為兵外人聞之無不駭愕今陜西沿邉正軍動以萬數朝廷若能擇有方畧膽勇之人以為將帥使之簡去疲弱選取精銳勤加教習明行賞罰則雖欲取銀夏而稅其地擒趙諒祚而制其命有何所難況但止其鈔盜乎今朝廷不孜孜以將帥軍政為急而無故籍耕桑之民使之執兵徒有驚擾而實無所用臣不知誰為陛下畫此策也昔康定慶歴之間朝廷以元昊犯邉官軍不利己曽籍陜西之民以為鄉弓手始者明出勅牓云但欲使之守護鄉里必不刺充正軍屯戍邉境牓猶未収朝廷盡刺充保㨗指揮令於邉州屯戍當是之時臣丁憂在陜備見其事民皆生長太平不識金革一旦調發為兵自陜以西閭閻之間如人人有䘮户户被掠號哭之聲彌天亘野天地為之慘悽日月為之無色往往逃避扵外官中縶其父母妻子急加追捕鬻賣田園以充購賞暨刺面之後兵貟教頭利其家富百端誅剥衣糧不足以自贍須至取扵私家或屯戍在邉則更須千里供送祖父財産日銷月鑠以至扵盡况其平生所習者惟桑麻耒耜至扵甲胄弩槊雖加教閱不免生踈而又資性戇愚加之畏懦臨敵之際得便即思退走不惟自䘮其身兼更拽動大陣自後官中知其無用遂大加沙汰給與公憑放令逐便而惰㳺已乆不復肯服稼穡之勞兼田産已空無所復歸皆流落凍餒不知所在長老至今言之猶長歎出涕其為失䇿較然可知足以為後來之戒而不足以為法也令朝廷雖云所籍之民止刺手背農隙之時委州縣召集教閱只在鄉里不令戍邉而民間懲往年之事必大興訛言争相驚擾朝廷號令失信前後已多雖州縣之吏徧至民家面加曉諭亦終不肯信逃亡避匿刑獄必繁怨嗟之聲周徧一方足以動揺羣心感傷和氣若使分毫有益扵國亦無所顧此有害無益顯然眀白近在目前設使教習得成一旦諒祚大舉入寇邉臣不能捍禦而使之深入三輔東過潼闗乃欲驅此烏合村民以拒之不亦難乎此適足以取戎狄之笑而已伏望陛下軫念生民深察得失其刺義勇事早賜寢罷光又乞罷刺陜西義勇劄子曰臣累日前方聞朝廷有指揮令陜西路㨂鄉村百姓充義勇臣即時有奏劄子言其非便昨日又上殿具劄子面有敷陳奉聖㫖令送中書樞宻院商量臣到中書樞宻院方知此事擬議已乆勅下本路已近旬日臣耳目踈淺聞之後時不能先事進言是臣之罪然臣聞之易曰不逺復無祇悔元吉說命曰無耻過作非今雖勅命已下若追而止之猶勝於遂行不顧不可避反汗之嫌而蹈迷復之凶也百姓一經刺手則終身羈縻不得左右人情畏憚不言可知康定年中揀差鄉弓手時元不刺手後至慶歴年中刺充保㨗之時富有之家猶得多用錢財雇召壯健之人充當今一切皆刺其手則是十餘萬無罪之人永充軍籍不得復為平民其為害民尤甚扵康定之時也臣竊料即今陜西之民已狼狽驚擾不聊生矣若朝廷晏然坐而視之曽不憫恤使赤子嗷嗷無所告訴為民父母者固當如是乎古者國有大事謀及卿士謀及庶人謀及卜筮今籍一路之民以為兵可謂大事矣而兩府之外朝士大夫無一人知者一旦勅書既下急如星火嚴如雷霆誰暇問其端倪況敢言其非也臣以備位諫官既聞之後不可畏避死亡不為陛下力言之若又棄忽其言不為改更則是今後朝廷號令有過誤者終不可復救也如此則恐非國家之福也臣愚伏望聖慈速降指揮下陜西路其義勇且未得揀刺别聽候朝廷指揮然後博延卿士大夫更熟議其可否果然有利於國無害於民徐復行之何晚之有三年光又言招軍劄子曰臣聞近朝廷扵在京及諸路廣招禁軍其災傷之處又招飢民以充廂軍臣愚以為國家􅀙來患在兵不精不患不多夫兵少而精則衣糧易供公私充足一人可以當十遇敵必能取勝兵多而不精則衣糧難贍公私困匱十人不足當一遇敵必致敗北此利害之明有如白黒不為難知也是以太祖皇帝之時天下兵數不及當今十分之一而猶日加選練簡去羸老專取精銳故能征伐四克混一區夏自景徳以來中國既以金帛綏懐戎狄不事征討至今六十餘年是宜官有餘積民有餘財而府庫殫竭倉廪空虚水旱小愆流殍滿野其故何哉豈非邉鄙雖安而冗兵益多之所致乎此乃天下所共知非臣一人之私言也慶歴中趙元昊叛西邉用兵朝廷廣加召募應諸州都監監押募及千人者皆特遷一官以此之故天下冗兵愈衆國力愈貧近嵗又累次大揀廂軍以補禁軍之數即目係籍之兵已為不少矣何苦更復直招禁軍及招飢民以充廂軍臣不知建議之臣曽與不曽計較今日府庫之積以養今日舊有之兵果為有餘為不足乎此盖邉鄙之臣庸愚怯懦無他材畧但求添兵在朝之臣又恐所給之兵不副所求他日邉事或有敗闕歸咎扵己是以不顧國家之匱乏只知召募取其虚數不論疲軟無所施用此羣臣容身保位茍且目前之術非為朝廷深謀逺慮經乆之畫也諺曰多求不如省費此言雖小可以喻大今以十口之家衣食僅足一旦頓増五口必不能贍若不顧囷中之粟笥中之帛所餘㡬何而唯冗口是貪能無窮匱乎國家之勢何以異此羣臣既不能為陛下忠謀陛下又不自以為憂則誰當憂之臣恐邉臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯不知國家長此沈瘵何時當瘳乎臣又聞即目災傷之䖏軍無見糧煮薄粥以飼飢民猶不能給況刺以為兵將以何物養之終身乎且畎畆農民止因一時飢饉故流移就食若將來豐稔則各思復業今既刺以為兵是使之終身失業也扵官扵民皆為非便謀䇿之失孰甚扵此臣願陛下㫁自聖志速降指揮應在京及諸路並且罷招禁軍但選擇將帥使之訓練舊有之兵以備禦四夷不患不足其災傷之處州縣不得妄招飢民以充廂軍但據所有斛斗救接農民俟向去稍豐使各復舊業則天下幸甚臣自陛下踐祚以來不自知其狂愚見朝廷政令有未便差除有未當屢獻瞽言浼瀆天聦陛下未嘗為之變一政令改一差除如臣者亦可以不言矣然猶區區獻言不已者誠耻居位而不言不耻多言而見厭也英宗時陜西轉運副使范純仁奏曰臣伏見陜西沿邉兵將俱冗城寨亦多倍費供須虧耗財用今來既許西人納􅅃諸路罷兵正宜節省經費漸圖豐實若更因循舊規不務改作豐實之期固無可望年計支用亦將不足萬一再有邉事或值嵗歉倉卒之間何以為計伏望朝廷檢㑹天聖以前陜西沿邉軍馬兵官數目及委帥臣條列今來合留城寨及合減將官冗兵人數叅定中制各令遵行其間或有帥臣不思體國務為冗占者亦乞朝廷特行誡勵如此則不惟西陲漸可完富兼使契丹畏威易為馴服仍乞覺察沿邉希功生事之臣重行責降使契丹知朝廷好生之徳則可省戍守之勞坐致豐實神宗熈寕二年知諫院陳襄論汰冗兵劄子曰臣觀治平二年天下所入財用大數都約緡錢六千餘萬養兵之費約五千萬乃是六分之財兵占其五禁兵之數約七十萬一夫錢糧賜予嵗不下五十千則七十萬人有三千五百萬緡之費廂軍之數約五十萬一夫錢糧賜予嵗不下三十千則五十萬人有一千五百萬緡之費則是廂禁共費五千萬矣惟餘一千萬以備國家百用之費今若裁損廂禁人數五分之一則可以嵗減錢糧之費一千萬以助縣官用度比之常嵗倍増其數百度經費有二千萬足以贍給有餘矣況藝祖朝中外之兵止一十二萬真宗之時三十餘萬章聖之時已號為多然不過五六十萬大抵兵貴在強不在衆今若選擇精悍之士而去其懦弱羸老者凡五分之一則猶有九十六萬精兵不為不足矣御史中丞吕公著上奏曰臣竊以古者兵農不分而耕戰並事平居無不耕之民有事無不戰之家故兵籍雖廣而財力不屈後世唯唐之府衞最為近古開元以後其制復壊國家承五季之亂雖庶事草創未復古然祖宗之初兵不過數十萬故當時未見其害是後招募之數日増而簡練之法益弛平居則常苦扵冗食有事則不足以應敵故建議之臣頗謂民兵可復而正兵可消誠以今之禁兵率以中等校之每人嵗用錢糧衣賜計直五十緡千人則嵗費五萬緡至扵民兵則非有廪給唯是給之土田或只將見今有地人户稍寛其租稅省其力役以正兵千人之費足以得民兵數萬人然今之正兵亦不可驟行減放但當即罷招填益講民兵府衞之法使財力不屈而戰守有備以之強國捍邉實萬世之利也臣欲乞詔輔臣選識治體曉兵法或先曽獻議其言可用者數人使議兵制施行三年司馬光乞不令陜西義勇戍邉及刺充正兵劄子曰臣先任諌官日伏見國家㨂刺陜西義勇臣累曽論列以為徒使百姓愁苦無益扵用近聞環慶路用義勇與西敵戰鬬望風奔潰死傷甚多致主將陥沒此義勇不可用之明騐也臣竊聞議者猶欲教閱義勇以抗西鬬若止令州縣教閱守護鄉土猶扵人情不至大擾若發以戍邉或如慶歴中刺為正兵則衆人覩環慶之敗譬如無罪往就死地恐扵人情大有不安國家既重賦斂以盡其財又逼之戰鬬以絶其命是驅良民使為盜賊也彼為官軍則惜生故望風逺走彼為盜賊則必死自可以一敵百臣恐今日教之挽射擊刺乃他日為盜之資也廟堂之議臣所不得知萬一有之詔下之日臣論列不及況當逺離朝廷故不得不先事而言也光又乞留諸州屯兵劄子曰臣奉勅充永興軍一路兵馬都總管安撫使臣竊聞本路十州所管屯駐禁軍至少大率皆是縁邉就糧兵士常時分為上下畨有一半在逐州或遇邉上稍有警急則盡皆抽去逐州並無守把兵士臣竊惟天下事不可忽必須思患豫防敵人犯邉雖當竭力捍禦然腹内州軍豈可全無武備況逐州皆有軍資甲仗市邑民居萬一敵兵深入間諜内應或盜賊乗虚姦人竊發其本州官吏手下無兵雖有智勇將安所施臣愚以為逐州宜各添一指揮禁軍屯駐内永興軍為闗中根本宜添兩指揮若朝廷别無兵士可以差撥只乞扵縁邉就糧兵士内依此數目撥留在逐州屯駐邉上更不得勾抽所貴緩急不至失備光又乞不揀退軍置淮南劄子曰臣竊聞道塗之言未審虚實或云朝廷欲揀在京禁軍年四十五以上㣲有呈切者盡减下請給并其妻孥徙置淮南以就糧食若實有此議臣竊以為非宜何則在京禁軍及其家属率皆生長京師親姻聨布安居樂業衣食縣官為日固乆年四十五未為衰老㣲有呈切尚任征役一旦别無罪負減其請給徙之淮南是横遭降配也諸軍之内沙汰甚多必恐人情惶惑大致愁怨雖國家承平無事綱紀具張此属恟恟不安亦無能為患然詔書一下若萬一有道路流言驚動百姓朝廷欲姑務省事復為收還則頓失威重向去無以復號令驕兵若遂推而行之則衆怒難犯專欲難成意外之變不可不防梁室分魏博之兵致張彦之亂此近事之可鑑者也故臣願朝廷更當深思熟議未宜遽下此詔也夫水未至而虚為之防水雖不至亦無所害謂水不足憂而不為之防一旦水至則防無所及矣故君子貴扵思患而豫防之也且國家竭天下之財養長征兵士本欲備禦邉陲今淮南非用武之地而多屯禁兵坐費衣食是養無用之兵寘諸無用之地也又使邉陲常無事則已異日或小有警急主兵之臣必争求益兵京師之兵既少必須使者四出大加召募廣為揀選將數倍多扵今日所退之兵舊兵尚請衣糧未去而新兵更添衣糧是棄已教閲經戰之兵而收市井畎畆之人本欲減冗兵而冗兵更多本欲省大費而大費更廣竊恐非計之得者也臣愚伏願朝廷且依舊法每嵗減禁軍有不任征戰者減充小分小分復不任執役者放充百姓聽其自便在京居止但勿使老病者尚占名籍虚費衣糧人情既安扵所習皆無怨嗟國家又得其力用不為虚設冗兵既去大費自省在理甚明扵事為便臣備位近臣兹事繫國安危不敢不言四年樞宻使文彦博奏論兵政曰臣向因進對䝉詢及黥民兵利害臣與呉􅂶即時畧具大㫖上對然而天威之下頃刻之間固未詳悉臣退而復思自陛下臨御以來焦勞庶政以兵者大事尤所垂意三四年前樞宻院檢錄得開寳初至治平中内外兵馬大數頗甚詳備遂議酌中定為永額比至道前即差多方慶歴中即頗減内壯根本外護邉陲去冗留精適用省費蒐補訓練皆有條理又以三路隣扵羌人即有属户畨兵弓箭手之𩔖以至次邉州軍盡置義勇緩急調發以應征防若守將處之得宜經乆必無闕事兼向時諸路郡縣額外増置弓箭手亦欲防虞盜賊如此紀綱臣以謂深協方今之宜頗得備預之理設有未至或有廢墜即當彌縫振舉之可也恭惟太祖太宗之定天下也止用此兵真宗仁宗英宗之守天下也亦用此兵累聖相承而無異道歴年彌乆而無異法故臣以謂協當今之宜得備預之理有未至而廢墜者彌縫而振舉之可也今陛下以睿聖之德承祖宗隆盛之業中原之人不識兵戈者㡬百年歴觀前古致治未有如此之安且乆也故生齒繁息逾扵二漢封疆廣逺過扵三代所謂民不改聚地不改闢施之仁政而不煩擾之則太平之效又何加焉陛下必欲捨此而别求治道以致太平更易兵制以張威武固非臣愚所及況臣備位樞府所主唯兵不能上副盛意委曲經畫尸祿之責所不敢逃伏望聖慈察臣前後累上章奏聽觧樞機之重柄并還將相之印綬得以散秩俾守外郡従愚臣知止之分全朝廷退人之禮臣不勝大幸然臣乆䝉天地之恩敢忘犬馬之報竊謂兵民猶水水能載舟亦能覆舟禁暴戢兵武之七徳不戢自焚自古所戒凡更制維御之方深願慎之重之區區之誠庶補萬一冒犯宸聽臣不任隕越惶懼之至元豐二年河北路轉運判官吕大忠上奏曰臣聞天下之患終在腹心而始在邉鄙邉鄙之患輕在禦敵而重在養兵漢以匈奴千里轉餉而天下困唐以藩鎮耗竭國用而人心離則是今日養兵之弊終為他日腹心之大患不可不察也夫養兵所以制敵將使邉鄙安靖而腹心受其賜也今養之太冗而處之無法朘削腹心以供其費而猶不足雖能勝敵無所用之況不能勝者哉雖然邉不可不防兵不可不養弊之甚者則宜更之患之大者則宜消之必使天下井牧其地伍兩其民無事則耕有事則戰是臣之願也未可遽行如漢之屯田唐之府兵亦足為善法而不能盡用則今日養兵終危道也危道之中又有甚焉以疲弱失教之兵置之極塞不毛之地日耗貴直之粟嵗勞輓饋之力寇小至則不足與校而強校之寇大至則不能以支更求益兵而申其致師之計則是以有限之財供無涯之費非徒費也又將起腹心大患豈非危道之甚者邪為今之計亦可以回顧少思而去其太甚者矣臣謂今日之寨户近扵屯田今日之義勇近扵府兵如廣募而精教之以銷禁兵之弊一寨户之勇過扵禁兵十人五義勇之費不敵禁兵一人以此校之養兵大費已省其半矣臣又聞自古及今有一國當一邉一州當一道者祿賞自足未聞取備扵内也秦漢之際一燕一代自當匈奴本朝之初慶州姚内斌雄州李允則自當一道此無他兵精而無冗食也時使而不乆戍也巖險其壘而不多留兵也通其互市以致州粟也多置屯田以息邉餉也廣募土人以減禁旅也寇不至則吾戒疆吏毋輕犯以致敵也寇既來則吾飭守將不與其幸勝也寇將退則吾度其盛衰雖空壘以襲之可也事既寕則吾計曲直雖益兵而報之亦可也凡此者雖非先王之法不猶愈扵今日之弊哉以臣之愚雖不足以權大事欲望聖慈試以臣言叅問邉臣許其極論是非覆奏如以為非則是邉臣欺㒺陛下終不能銷天下腹心之患或以為是則願陛下不憚一時之勞盡講遺法而行不三四年國力民心庶可蘇矣臣無狀奉使以輓饋為職不能廣謀財利以應一切之急而言及養兵之弊人皆以臣為不善避嫌獨臣之愚志安社稷不忍緘黙以自取容也三年判三班院曽鞏上言曰臣聞古者兵出扵農故三時耕稼一時閱武其扵四時蒐田則又率之従事然則農之用力扵兵以少言之嵗當兩月計其大槩則今之專力之兵一當古之兼農之兵六先王之制天子六軍大國三軍次國二軍小國一軍軍萬二千五百人其餘夫以為羨卒周有天下諸侯之國千有八百以中數率之通有兵二萬五千為兵四千五百萬而羨卒未在其數以今之兵一當其六今有兵百萬為八十倍少扵古以跡言之其專力兼農之勢固異以多少言之其用人之力費人之財今可謂省矣古者兵出扵農故干戈車乗馬牛亦皆取具而國無預焉今兵出扵國故干戈車乗馬牛亦皆取具而民無預焉此今之兵又扵民為便者也秦既開阡陌而亦兵出扵民其干戈屢動則至扵發閭左之戍漢魏而下亦皆以民為兵其轉徙殺戮之禍嘗甚矣至于後周隋唐脩列府衛而兵復近古天寳以後彍騎立而募兵之法行自是之後綱紀大失序天子之勢屈扵方鎮之兵方鎮之勢屈扵所部之兵至其甚也將之廢置出扵兵至于五代而國之廢置出扵兵兵之禍天下未有甚扵此也宋興撥亂世反之正太祖外削藩服而歸之軌道内操師旅而束以法制天下之惡子非鰌之以刑而自列扵行伍非敺之以暴而自就扵䋲墨以鎮城邑以戍疆埸非獨為朝廷之用其扵天下之良民得以樂職而安業者實賴其力況又其費少扵古其便多扵民近世以來制兵之善未有及此者也陛下出衆慮之表起百職之廢其扵常武尤属聖心今連營之士訓練精銳武庫之兵繕治工巧殆古所未有臣誠不自揆計今之事竊以謂西北之宜當擇將率東南之備當益戍兵庶㡬上副陛下威蕃服守四方不世出之大志何以言之昔太祖之世其捍北敵則用李漢超扵闗南馬仁瑀扵瀛州韓令坤扵常山賀惟忠扵易州何繼筠扵棣州其禦太原則用郭進扵西山李謙􅄎扵隰州李繼勲扵昭義其備西戎則用姚内斌扵慶州董遵誨扵環州王彦昇扵原州馮繼業扵靈州大抵如内斌遵誨之兵率不過五六千人皆責之以自守其地今士之精銳兵之工巧無以復加矣在乎得人属之統督之寄而已故臣以謂西北之宜當擇將率付之一州一路任之以戰守之責陛下明考覈信賞罰以馭之而已以此制勝則何求而不得也臣又竊以古者百里之地為千乗之國有兵三萬七千五百人今州小者非特百里而已士徒之衆雖不必盡如古制然今東南之隅地方萬里有山海江湖險絶之勢溪洞林麓深僻之虞而此諸路之兵各不過數千人而已其扵防邏常患不足萬一有追胥討捕之事理必乏人向者邕州之不守盖患扵救援之不繼至扵廖恩之䑕竊而能稽誅扵時月者盖由追討之兵不足恩已自歸而所遣北兵猶在道路則東南之寡弱盖可知也以陛下之明綱理天下無所不備其扵東南之兵計今之宜雖不必如古者千乗之法然稍増兵屯使緩急足用以銷姦萌除患扵未然亦治體之所宜及臣故以謂東南之備當益戍兵區區憂國之心惟陛下之所裁擇神宗時右司諌蘇轍乞禁軍日一教狀曰臣竊見諸道禁軍自置將以來日夜按習武藝劒槊擊刺弓弩斗力比舊皆倍然自比嵗試之扵邉亦未見勝敵之效盖士卒服習止軍中一事耳至扵百戰百勝則自有道不可不察也臣訪聞凡將下兵皆蚤晚兩教新募之士或終日不得休息士卒極以為苦頃嵗西鄙用兵士自内郡往即戰地皆奮踴而去以免教為喜先朝留意軍事每嵗遣官按閱錫賚豐厚遷補峻速士心猶且如此臣觀今日所以厚之者不如先朝而所以勞之者如舊臣竊以為疑也古之名將如李牧王翦將用人之死力必椎牛釃酒聽其佚樂養而不試士皆投石超距踴躍思奮而後用之故所向無敵今平居無事朝夕虐之以教閱使無遺力以治生事衣食殫盡憔悴無聊緩急安得其死力臣請使禁軍除新募未習之人其餘日止一教使得以其餘力為生異日驅以征伐其樂致死以報朝廷宜愈扵前日也鄭獬奏曰臣竊聞朝廷宻有詔㫖令河北繕城塹儲粟藁以支北敵諸郡犇走怵惕以從事至有帥臣躬督役夫以穿濠池殊可恠笑北敵雖强悍其舉動亦顧曲直今無釁隙何縁遽有南牧之計比者黥兩地稅户手背兹雖事生亦未為踰盟之大失臣素知幽燕間鄉民皆黥之非顓以為兵也無屯兵營火伍粮糗器甲之制惟將迎漢使嵗役之三月又其黥之者似聞非其主意乃其酋豪妄為之既已黥之則可移文訊其所以然彼如自屈則宜約以不可再補茍能聽我則又何求議者或謂敵乗我與西羌有嫌欲用此為牽制此亦非也其聲勢不足以為牽制耳西羌之嫌奚與扵彼必未能棄六十年聘好而為弱羌絶盟其利害固可較也今不計其虚實而想像乎沙磧萬里之外風揺草動則以為敵騎已挾弓而群至矣扵是繕城塹儲粟藁奚其易動哉河北嵗連旱既動力役則不免斂率扵民是未見敵人之一迹而先已自擾其民因虚聲而受實弊是豈為静勝者耶而必使敵人真入寇我遂不戰而獨城守乎攻城者非敵伎之長且將直驅而南則柰何乎廟堂之上哉日者廣州妄奏交趾之入而遽為之易帥調兵以驚動南方之民今又無故而備河北無他將帥不擇兵衆不練財力不充直出扵畏怯而已亦何足以明方略之成敗乎臣欲乞陛下宻下河北勿令脩繕務在安養其民如平時而已則我中國之持重不為遼夏所窺亦可以有成筭矣王雱上䟽曰漢宣帝號中興賢主而史稱技巧工匠獨精扵元成之時是雖有司之事而上繫朝廷之政方今外禦邉患内虞盜賊而天下嵗課弓弩甲胄入充武庫者以千萬數乃無一堅好精利實可為備者臣嘗觀諸州作院兵匠乏少至拘市人以備役所作之器但形質而已武庫之吏計其多寡之數而藏之未嘗責其實用故所積雖多大抵敝惡夫為政如此而欲抗威決勝外攘内脩未見其可也儻欲弛武備示天下以無事則金木絲枲筋膠角羽之材皆民力也無故聚工以毁之甚可惜也莫若更制法度斂數州之作聚為一處若今錢監之比擇知工事之臣使專其職且募天下良工散為匠師而朝廷内置工官以總制其事察其精窳而賞罰之則人人務勝不加責而皆精矣聞今武庫太祖時弓尚有如新者而近世所造往往不可用此可見法禁之張弛矣知洋州文同上奏曰右臣竊見本府自三代已來號為巨鎮疆理所属正當秦蜀出入之㑹下襃斜臨漢沔平陸延袤凡數百里壤土演沃堰埭棊布桑麻秔稲之富引望不及西南逾棧道抵劒門下趣成都岐雍諸山遮迾東北深蟠逺跱孕畜雲雨罅道百出相拱如輻逺通樊鄧旁接秦隴貿遷有無者望利而入舊制中州之人不得乆居扵此今復弛禁一切不問故四方來者頗自占業殊習異尚雜䖏閭里天下物貨種列扵市金繒漆枲衣被他所近嵗洮河所仰茶産鉅億公糴私販輦負不絶誠山西浩穰之奥區而朝廷所宜留意之劇地也然而事有未稱體有未備者城與兵而已矣臣嘗度之其縦廣亡慮二十里庳薄毁陥乆不營葺姦窺盜越易如短屏兵雖合聚群戍所數裁滿五百罷病孱弱下軍者半分𨽻他役常非此有近復調赴文州今所留者甫二百餘人爾況一城之中民屋錯比連甍接宇可數萬計生齒雜遝填斥坊閧臣常自顧亡狀誤䝉朝廷采用重委符守班條之暇靜慮及此輙謂以如是不甚堅完之城與如是不甚齊一之兵欲控制遐逺影援邉儌保護井邑衆庶防固官府儲峙若止用此且恐事扵臨時萬一有不副國家所以設城置兵之本意也臣每一念此食輟匕而寢去枕者屢矣伏惟陛下自踐祚已來于今七年曷嘗不一日孜孜安養元元者為政理之急未治者既治之矣已治者復為之立不可廢壊之法補缺綻漏大小咸緝下聽不倦有宜則應臣是以敢持二者之說仰干宸扆伏望陛下不以臣䟽賤而幸録其言願賜參可下詔有司遂俾如事脩累雉堞増屯營伍以赫威靈以壯制度沮邪謀定衆志安固基本萬世不動亦所謂先定應猝豫備不虞之善計者也臣職在守土諸無報稱惟是所見不敢噤嘿臣無任僭易妄越惶恐激切屏營之至許將召為兵部侍郎上䟽言兵措扵形勢之内最彰而易知隠扵權用之表最㣲而難能此天下之至機也是以治兵有制名雖不同従而横之方而圓之使萬衆猶一人車馬有數用雖不同合而分之散而斂之取四方猶跬歩制器有度工雖不同左而右之近而逺之運衆筭猶掌握非天下之至神孰能與此又條奏八事以為兵之事有三曰禁兵曰廂兵曰民兵馬之事有三曰養馬曰市馬曰牧馬兵器之事有二曰繕作曰給用歴代名臣奏議卷二百二十
