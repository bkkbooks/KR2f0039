body:
  text: 歴代名臣奏議卷七十四明楊士竒等撰内治周襄王十七年王降翟師以伐鄭王徳翟人将以其女為后富辰諫曰不可夫婚姻禍福之階也利内則福由之利外則取禍今王外利矣樹利於翟其無乃階禍乎昔摯疇之國也由大任摯疇二國任姓奚仲仲虺之後大任之家也大任王季之妃文王之母把繒由大姒把繒二國姒姓夏禹之後大姒之家也大姒文王之妃武王之母齊許申吕由大姜四國皆姜姓四岳之後大姜之家大姜大王之妃王季之母陳由大􅁎陳媯姓舜後大姬周武王之女成王之姊是皆能内利親親者也昔鄢之亡也由仲任鄢妘姓之國仲任氏之女為䣕夫人宻須由伯姞伯姞宻須之女也傳曰宻須之鼓闕鞏之甲此則文王所滅而獲鼔甲也鄶由叔妘鄶妘姓之國叔妘同姓之女為鄶夫人聃由鄭姬聃姬姓文王之子聃季之國鄭姬鄭女為聃夫人同姓相取猶魯昭公取於吴矣亦其同姓所以亡息由陳媯息姬姓之國陳媯陳女為息侯夫人鄧由楚曼鄧曼姓楚曼鄧女為楚武王夫人生文王過鄧而利其國遂滅鄧而兼之羅由季􅁎羅熊姓之國季􅁎氏之女為羅夫人廬由荆媯廬媯姓之國荆媯廬女為荆夫人是皆外利親親者也王曰利何如而外對曰尊貴明賢庸勲長老明顯也庸用也勲功也長老尚齒也愛親禮新親舊親六親也新新来過賔也舊君之故舊也然則民莫不審固其心力以役上令役為也官不易方而財不匱竭求無不至動無不濟百姓兆民夫人奉利而歸諸上是利之内也若七徳離判民乃􅂝貳各以利退上求不暨是其外利也夫翟無列於王室鄭伯南也王而卑之是不尊貴也南者在南服之侯伯或云南南靣君也翟豺狼之徳也鄭未失周典王而蔑之是不明賢也平桓莊惠皆受鄭勞王而棄之是不庸勲也鄭伯捷之齒長矣王而弱之是不長老也捷鄭文公之名翟隗姓也隗姓奔翟鄭出自宣王王而虐之是不愛親也夫禮新不間舊王以翟女間姜任非禮且棄舊也王一舉而棄七徳臣故曰利外矣書有之曰必有忍也若能有濟也王不忍小忿而棄鄭又登叔隗以階翟翟封豕豺狼也不可厭也王弗聽漢孝文帝幸上林皇后慎夫人從其在禁中常同席坐及坐郎署長布席中郎将袁盎引却慎夫人坐慎夫人怒不肯坐上亦怒起入禁中盎因前說曰臣聞尊卑有序則上下和今陛下既已立后慎夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之陛下獨不見人彘乎於是上乃說召語慎夫人慎夫人賜盎金五十斤宣帝神爵元年王太后數出逰獵京兆尹張敞諫曰禮君母出門則乗輜軿下堂則從傳母今以田獵縦欲為名於以上聞亦未宜也太后乃不復出成帝游於後庭嘗欲與班倢伃同輦載倢伃辭曰觀古圖畫賢聖之君皆有名臣在側三代末主迺有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊􅁎今有班倢伃鴻嘉三年趙飛燕譛告許皇后班倢伃挾媚道祝詛後宫詈及主上許皇后坐廢考問班倢伃倢伃對曰妾聞死生有命富貴在天脩正尚未䝉福為邪欲以何望使鬼神有知不受不臣之愬如其無知愬之何益故不為也上善其對憐閔之賜黄金百斤成帝欲立趙倢伃為皇后先下詔封倢伃父臨為列侯諫大夫劉輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以灾變此神明之徴應自然之占驗也昔武王周公承順天地以饗魚烏之端然猶君臣祗懼動色相戒況於季世不䝉繼嗣之福屢受威怒之異者虖雖夙夜自責改過易行畏天命念祖業妙選有徳之世考卜窈窕之女以承宗廟順神祇心塞天下望子孫之祥猶恐晚暮今迺觸情縱欲傾於卑賤之女欲以母天下不畏於天不媿於人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之朝廷莫肯壹言臣竊傷心自念得以同姓抜擢尸禄不忠汚辱諫爭之官不敢不盡死唯陛下深察東漢光武時郭皇后廢郅惲乃言於帝曰臣聞夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選尚書僕射胡廣與尚書郭虔史敞上䟽諫曰竊見詔書以立后事大謙不自專欲假之籌䇿決疑靈神篇籍所記祖宗典故未嘗有也恃神任筮既不必當賢就值其人猶非徳選夫岐嶷形於自然俔天必有異表宜參良家簡求有徳徳同以年年鈞以貌稽之典經斷之聖慮政令猶汗往而不反詔文一下形之四方臣職在拾遺憂深責重是以焦心冒昧陳聞帝從之以梁貴人良家子㝎立為皇后桓帝延熹中應奉為司𨽻校尉糾舉姦違不避豪戚以嚴厲為名及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居于鄭漢立飛燕成帝𦙍嗣泯絶母后之重興廢所因宜思闗睢之所求逺五禁之所忌帝納其言竟立竇皇后魏文帝黄初三年欲立郭貴嬪為后中郎棧潜上疏曰在昔帝王之治天下不惟外輔亦有内助治亂所由盛衰從之故西陵配黄英娥降媯並以賢明流芳上世桀奔南巢禍階末喜紂以炮烙怡恱妲己是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宫虔奉宗廟隂教聿脩易曰家道正而天下定由内及外先王之令典也春秋書宗人釁夏云無以妾為夫人之禮齊桓誓命于葵丘亦曰無以妾為妻今後宫嬖寵常亞乗輿若因愛登后使賤人暴貴臣恐後世下陵上替開張非度亂自上起也晉武帝寧康三年将納后訪于公卿時王藴女容徳淑令舉以應選中軍将軍桓沖等奏曰臣聞天地之道盖相須而化成帝后之徳必相恊而政隆然後品物流行彛倫攸叙靈根長固本枝百世天人同致莫不由此是以塗山作儷而夏族以熈任姒配周而􅁎祚以昌今長秋将建宜時簡擇伏聞試守晉陵太守王藴女天性柔順四業允備且盛徳之胄美善先積臣等參議可以配徳乾元恭承宗廟徽音六宫母儀天下於是帝始納焉唐太宗貞觀中城陽公主下嫁薛瓘初主之婚帝使卜之繇曰二火皆食始同榮末同戚請晝昏則吉監察御史馬周諫曰朝謁以朝思相戒也講習以晝思相成也燕飲以昃思相歡也婚合以夜思相親也故上下有成内外有親動息有時吉凶有儀今先亂其始不可為也夫卜所以決疑若黷禮慢經先聖人所不用帝乃止太宗謂房𤣥齡等曰長樂公主皇后所生朕及皇后並所鍾愛今将出降禮數欲有所加𤣥齡等咸曰陛下所愛欲少加之何為不得請倍永嘉長公主魏徴曰不可昔漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽前史以為美談天子姊妹為長公主天子之女為公主既加長字即是禮有尊崇或可情有淺深無容禮相踰越太宗然其言入謂文徳皇后曰我欲加長樂公主禮數魏徴不肯文徳皇后聞之大喜遣中使齎錢二十萬絹四百匹詣徴宅宣令謂徴曰比者常聞公中正而不能得見今論長公主禮事不許増加始驗從來所聞信非虚妄願公常保此心莫移今日喜聞公言故令将物相賞公有事即道勿為形迹也上嘗罷朝怒曰會須殺此田舎翁后問為誰上曰魏徴每廷辱我后退具朝服曰妾聞主明臣直今魏徴直由陛下之明故也妾敢不賀上乃恱太宗時隋通事舎人鄭仁基女年十六七容色絶姝當時莫及文徳皇后訪求得之請備嬪御太宗乃聘為充華詔書已出䇿史未發魏徴聞其已許嫁陸氏方遽進而言曰陛下為人父母撫愛百姓當憂其所憂樂其所樂自古有道之主以百姓心為心故君處臺榭則欲民有棟宇之安食膏粱則欲民無飢寒之患頋嬪御則欲民有室家之歡此人主之常道也今鄭氏之女乆已許人陛下取之不疑無所頋問播之四海豈為民父母之義乎臣傳聞雖或未的然恐虧損聖徳情不敢隐君舉必書所願特留神慮太宗聞之大驚手詔答之深自剋責遂停䇿使乃令女還舊夫左僕射房𤣥齡中書令温彦博禮部尚書王珪御史大夫􅅊挺等云女適陸氏無顯然之状大禮既行不可中止又陸氏抗表云某父康在日與鄭家還往時相贈遺資財初無婚姻交渉親戚並云外人不知妄有此說大臣又勸進太宗於是頗以為疑問徴曰羣臣或順㫖陸氏何為過爾分踈徴曰以臣度之其意可識将以陛下同於太上皇太宗曰何也徴曰太上皇初平京城得辛䖏儉婦稍䝉遇寵䖏儉時為太子舎人太上皇聞之不說遂令東宫出為萬全縣每懐戰懼常恐不全首領陸爽以為陛下今雖容之恐後隂加譴讁所以反覆自陳意在於此不足為恠太宗笑曰外人意見或當如此然朕之所言未能使人必信乃出勅曰今聞鄭氏之女先已受人禮聘前出文書之日事不詳審此乃朕之不是亦為有司之過授充華者宜停時莫不稱歎上嘗謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求採無已至於離宫别舘非幸御之所多聚宫人此皆竭人財力朕所不取且灑掃之餘更何所用今将出之任求伉儷非獨以省費息人亦各得遂其情性於是後宫及掖庭前後所出三千餘人禮部尚書王珪子敬直尚太宗女南平公主珪曰禮有婦見舅姑之義自近代風俗弊薄公主出降此禮皆廢主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執巾行盥饋之道禮成而退太宗聞而稱善是後公主下降有舅姑者皆遣備行此禮髙宗将立武昭儀召長孫無忌李勣于志寧及遂良入或謂無忌當先諫遂良曰太尉國元舅有不如意使上有棄親之譏又謂勣上所重當進曰不可空國元勲有不如意使上有斥功臣之嫌曰吾奉遺詔若不盡愚無以下見先帝既入帝曰罪莫大於絶嗣皇后無子今欲立昭儀謂何遂良曰皇后本名家奉事先帝先帝疾執陛下手語臣曰我兒與婦今付卿且徳音在陛下耳可遽忘之皇后無他過不可廢帝不恱翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀昔事先帝身接帷第今立之柰天下耳目何帝羞黙遂良因致笏殿階叩頭流血曰還陛下笏丐歸田里髙宗時王后之廢侍中韓瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輙廢非社稷計不納明日復諫曰王者立后配天地象日月匹夫匹婦尚知相擇況天子乎詩云赫赫宗周襃姒烕之臣讀至此常輟卷太息不圖本朝親見此祻宗廟其不血食乎髙宗将以武氏為后中書令来濟諫曰王者立后以承宗廟母天下宜擇禮義名家幽閒令淑者副四海之望稱神祇之意故文王興姒闗雎之化蒙被百姓其福如彼成帝縱欲以婢為后皇統中微其禍如此惟陛下詳察上元中帝多疾欲遜位武后中書令郝處俊諫曰天子治陽道后治隂徳然則帝與后猶日之與月陽之與隂各有所主不相奪也若失其序上謫見於天下降災諸人昔魏文帝著令帝崩不許皇后臨朝今陛下柰何欲身傳位天后乎天下者髙祖太宗之天下非陛下之天下正應謹守宗廟傳之子孫不宜成國與人以喪厥家中書侍郎李義琰曰處俊言可從惟陛下不疑事遂沮中宗復位以桓彦範為侍中上書戒帝曰詩以闗雎為始言后妃者人倫之本治亂之端也故舜之興以皇英而周之興以任姒桀奔南巢禍階末喜魯桓滅國惑始齊姜伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以隂乗陽違天也以婦淩夫違人也違天不祥違人不義故書曰牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預外政也伏願上以社稷為重令皇后無居正殿于外朝深居宫掖修隂教以輔佐天子景龍中武平一遷考功貟外郎時太平安樂公主各立黨相詆毁親貴離䦧帝患之欲令敦和以訪平一因上書曰病之在四體者跡分而易逐居心腹者候遽而難治刑政乖舛四支疾也親權猜間心腹患也書曰克明俊徳以親九族九族既睦平章百姓詩曰協比其鄰婚姻孔云是知親族以輯睦為義也自頃權貴猜防外和内離怨結姻婭疑生骨肉邀榮之徒詭獻忠欵膏脣之伍茍輸䜛計脅肩邸第之中噤頥媪宦之側故過從絶猜嫌構親愛乖黨與生積霜成氷禍不可既願悉召近親貴人會宴内殿告以輯睦申以恩勤斥姦人塞讒路若猶未已則捨近圗逺抑慈示嚴惟陛下之命帝美其忠切𤣥宗欲立武惠妃為后御史潘好禮上䟽曰禮父毋讎不共天春秋子不復讎不子也陛下欲以武氏為后何以見天下士妃再從叔三思也從父延秀也皆干紀亂常天下共疾夫惡木垂䕃志士不息盜泉飛溢㢘夫不飲匹夫匹婦尚相擇況天子乎願慎選華族稱神祇之心春秋宋人夏父之會無以妾為夫人齊桓公誓葵丘曰無以妾為妻此聖人明嫡庶之分分定則窺競之心息矣今人間咸言右丞相張說欲取立后功圖復相今太子非惠妃所生而妃有子若一儷宸極則儲位将不安古人所以諫其漸者有以也遂不果立妃憲宗時學士李絳奏伏以聖哲之君撫馭之要必順人情以作事感天意以致和從古以來其道由此陛下勵精求理損已推誠風動四方事貞百度作範来代掩美前王後宫之中人數不少離别之苦頗感人心怨曠之思有干和氣伏冀酌量所要矜放其餘使其親戚如初復得宫掖省費上以表大徳如天之思下以成群生遂性之樂道映青史化洽皇風敢竭㳙塵庻裨萬一如䝉聖恩允許便請入徳音後亦更論減放翰林學士白居易上奏曰右伏見大厯已来四十餘載宫中人數稍乆漸多伏慮驅使之餘其數猶廣上則屢給衣食有供億縻費之煩下則離隔親族有幽閉怨曠之苦事宜省費物有遂情頃者已䝉聖恩量有揀放聞諸道路所出不多臣伏見自太宗𤣥宗以來每遇灾旱多有揀放書在國史天下稱之伏望聖慈再加䖏分則盛明之徳可動天心感悦之情必致和氣光垂史册美繼祖宗貞觀開元之風復見於今日矣武宗會昌中李徳裕上言臣等伏見公主上表稱妾李者伏以臣妾之義取其賤稱家人之稱亦要别嫌因循舊章恐未為得臣等商量今日以後公主上表從大長公主以下並望令稱某邑公主第幾女上表仍不令稱族所冀臣子之道因此正名郡主縣主亦望准此宋仁宗天聖中太后崩言事者多暴太后時事右司諌范仲淹奏曰太后受遺先帝調䕶陛下者十餘年宜掩其小故以全后徳帝為詔中外毋輙論太后時事初太后遺誥以太妃楊氏為皇太后叅决軍國事仲淹曰太后母號也自古無因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無毋后之助矣慶厯中仲淹為參知政事上奏曰臣聞唐武徳九年八月十八日詔曰觀省宫掖其數實多憫兹深閉乆離親族一時減省各從娶娉自是宫中前後所出三千餘人又貞觀二年七月二日太宗謂侍臣曰婦人幽閉深宫情實可憫隋氏末年求採無已此皆竭人財力朕所不取掃洒之餘更何所用於是命尚書右丞戴胄給事中杜正倫於掖庭西門揀出之臣不知今来宫中人數㡬多或供使有餘宜降詔㫖特令減放以遂物性又省冗費亦人君盛徳之事可以感動天意明道二年将作監丞富弼上奏曰臣聞右司諌秘閣校理范仲淹以上章諌廢后事貶睦州通判仍差人押出門臣不勝驚駭伏恐陛下行於倉卒未熟思慮輙敢冐天威犯斧鉞一陳愚懇惟陛下裁察之皇后自居中宫不聞有過陛下忽然廢斥物議騰踴自太祖太宗眞宗撫國凡七十年未嘗有此陛下為人子孫不能遵祖考之訓而遂有廢后之事治家而尚不以道奈天下何仲淹為諌官所以極諫者乃其職也陛下何故罪之假使所諫不當猶須含忍以招諫諍況仲淹所諫大惬億萬人之心陛下又縱私忿不頋公議取笑四方臣甚為陛下不取也昔莊憲臨朝陛下受制事體大弱而莊憲不敢行武后故事者盖頼一二忠臣救䕶使莊憲不得縱其欲陛下可以保其位實忠臣之力也今陛下始獲暫安遂忘舊日忠臣羅織其罪而譴逐之陛下以萬乗之尊設廢一婦人甚為小事然所損之體則極大也夫廢后謂之家事而不聼外臣者此唐姦臣許敬宗李世勣諂佞之辭陛下何足取法陛下必欲廢后但可不納所諫何必加責以重已過今匹庶之家或出妻亦須告父母父母許然後敢出之今陛下貴為天子莊憲山陵始畢墳土未乾便以色欲之心廢黜后氏而不告宗廟是不敬父母也今陛下舉一事而獲二過於天下廢無罪之后一也逐忠臣二也此二者皆非太平之世所行臣實痛惜之莊憲太后臨朝以劉從徳死恩典太重臺諫曹脩古等四人連名上章極諫莊憲大怒陛下不得已遂貶此四人然心甚惜其去莊憲􅂊徃陛下立行召命優與恩奬復處憲省脩古雖死厚加贈典如此者盖陛下憐其忠鯁不避夫禍難爾今仲淹所諫又甚於脩古等所陳脩古等追用而仲淹黜棄陛下何所見前後之異也況仲淹以忠直不撓莊憲時論冬仗事大正君臣之分陛下以此自擢用之既居諫列或聞累曽宣諭使小大之事必諫無得有隐是陛下欲聞過失雖古先聖哲之主亦無以過此今仲淹聞過遂諫上副宣諭之意而反及於禍是陛下誘而陷之不知自今後何以使臣雖日加宣諭諫臣以仲淹為戒必不信矣諫臣不諫大非朝廷之福今百執事所為皆一司一局雖常才者皆能幹之是易為也如仲淹者乃為臣之難能者也今幹一司一局者皆坐取遷陟立居顯要而仲淹不惜性命為陛下論事而逺徙外郡臣恐百辟以此皆務為易者而不為難者也陛下一旦有難為之事不知何人為陛下為之居諫官者務要訐直乃號稱職依違者曠職今循黙者已居顯要而訐直者尚居散地茍如是不若廢諫官如不欲廢即循黙者可黜訐直者可用請陛下急圖之今天下凶歉盜賊如麻國用空虚人心惶擾姦雄觀此已有窺覦之心陛下當兢兢惕惕宵衣旰食日與臣寮講論安天下之計猶恐不及而乃自作弗靖廢嫡后逐諫臣使此醜聲聞於四方知陛下不納諫臣朝政不舉則姦雄益喜以謂中外皆亂事勢相符必有變事臣一念至此心寒骨顫此自然之兆固非臣之臆説也望陛下審思之明察之廢后已行雖能悔過臣願陛下急且追還仲淹復其諫職減二過之一庶乎諫路不絶朝綱復振使姦雄不能窺陛下淺深此社稷之慶也殿中侍御史段少連等奏曰臣因義激心以職獲譴天地容載䝉幸何深然理有所未伸情有所未逹欝悒之志敢不盡陳之初聞非時召兩府大臣議皇后入道一日之内都下喧然以為皇后母儀天下固無入道之理翊日又聞兩府列狀乞降后為浄妃臣與孔道輔范仲淹等恐詔命一行難於追復是以群詣殿閣上䟽而執政進説使臣等不獲面對止令就中書商量宰相雖知其誤然猶責臣翻覆率易故道輔仲淹斥守外郡臣等例皆䝉罰伏以陛下親政以来進用直臣開闢言路天下無不懽忻一旦以諫官御史㐲閤遽行黜責中外皆以為非陛下意盖執政大臣假天威以黜道輔仲淹而斷来者之說也望熟思其事使讒愬不行忠邪有别則天下幸甚又伏覩戒諭自今有封章宜如故事宻上毋得羣詣殿門對且伏閤上䟽豈非故事今遽絶之則國家復有大事誰敢旅進而言者況道輔仲淹端正敢言素為姦邪所忌以言事而黜之恐姦邪得志而翺翔方正望風而竄伏矣昔唐陽城王仲舒伏閤以雪陸贄之罪崔元亮叩殿陛理宋申錫之寃當時稱之今陛下未忍廢出皇后而兩府列狀議降為妃諫官御史敢廢伏閤之事而黙黙乎陛下深惟道輔等所言為阿黨乎忠亮乎幸裁赦之少連又奏曰臣聞髙明粹精凝徳無累者天之道也然氛祲蔽翳晦明偶差乃隂陽之沴爾象天徳者君之體也治隂陽者臣之職也陛下秉一徳臨萬方有生之類莫不浸涵徳澤而氛祲蔽翳偶差晦明以累聖徳者由大臣懐禄而不諫小臣畏罪而不言臣獨何人敢貢狂瞽哉誠以秉愛君之心竊痛陛下履仁聖之具美乏骨鯁之良輔因成不忍之忿又稽不逺之復臣是以瀝肝膽披情素為陛下澄清氛祲蔽翳之累易曰夫夫婦婦而家道正正家而天下定矣詩云刑于寡妻以御于家邦若然則君天下脩化本者必自内而刑外也昨者二府大臣忽然晩出民間喧傳皇后被譴而入道矣又傳降為妃而離宫廷矣臣與道輔等皆在言職以謂皇后母儀萬方非有大過而動揺則風教陵遲況聞入道降妃之議出自臣下且妃后有罪出則告宗廟廢則為庶人安有不示之於天下不告之於祖宗而隂行臣下之議者乎且皇后以小過降為妃則臣下之婦有小過亦當降為妾矣比抗章請對不䝉賜召豈非姦邪之人離間陛下邪臣等赴中書時執政之臣備言皇后有妒忌之行始議入道終降為妃兼云有上封者慮皇后不利於聖躬故築脩髙垣置在别舘臣等備言中外之議以為未可願速降明詔復中宫位號以安民心翌日詔出乃云中宫有過掖廷具知特示含容未行廢黜置之别舘俾自省循供給之間一切如故臣未審黜置别舘為后乎為妃乎詔書不言安所取信伏以陛下立后一紀有餘而輔臣倉卒以降黜之議惑於宸聽搢紳循黙無敢為陛下言者臣所謂氛祲蔽翳以累聖徳者盖臣職曠矣夫皇后動揺有大不可者二執政之臣獨不念之且内外臣寮以至戚里皆萌覬覦之心或進女口以希選納或巧事寵愛以結内援則使陛下惑女色而亂紀綱紀綱之亂變故以生社稷可得安乎易曰三人行則損一人一人行則得其友斯大不可者一也陛下舉事為萬世法苟因掖廷争寵遂行廢后則何以書史䇿而示子孫況祖宗已来未嘗有廢后之事詩云無念爾祖聿修厥徳斯大不可者二也臣竊恐姦佞之人引漢武幽陳皇后故事以䧟惑陛下且漢武驕奢滛佚之主固不足踵其行事而為人臣者當致君堯舜豈當致君如漢武哉今皇后置在别舘必恐懼修省且陛下仁恕之徳施於天下而獨不加於中宫乎古人言曰一人向隅滿堂為之不樂今四方凶年民有愁嘆又聞中宫幽廢何啻滿堂不樂乎願詔皇后歸宫復其位號杜絶非間待之如初天地以正隂陽以和人神共歡豈不美哉陛下苟為邪臣所沮不行小臣之議臣恐髙宗皇后之枉必見於他日宫闈不正之亂未測於将来惟聖神慮焉景祐元年開封判官龐籍上奏曰臣前月十一日曽上封奏為内侍韓從禮等傳美人尚氏教㫖令開封府放免工匠單慶等六人本行差遣特䝉悉聽科斷韓從禮等及敕下諸司今後宫闈教㫖並不得施行中外聞之孰不懽快有以見陛下英斷實九廟無疆之休四海永安之福也臣愚更願陛下使宫掖之間上下有序不以恩寵隂啓禍階蠧耗金珠漸困國力通私謁以亂政縱外親而干法上損聖徳次紊朝綱實天下幸甚秘書丞余靖上奏曰臣伏覩景祐元年八月十五日詔敕頃以中闈有虧善道降䖏次妃之位仍從别舘之居郭氏宜令於外宅居止更不入内美人尚氏令於洞眞宫披戴永不入内美人楊氏於别宅安置者此盖皇帝陛下廣示憂勤擯去聲色割情㫁愛以從典禮雖堯舜無以加之天下幸甚詔㫖又云長秋之重隂教是宣頋厥位以難虚必惟賢而是擇将行聘納式助烝嘗臣謹按春秋君舉必書以示後嗣固當謹重用存規法竊以莊獻明肅皇太后預聞朝政託在母儀保佑聖躬安固宗社欽奉慈㫖備盡孝誠先太后登遐方踰祥練陛下雖行易月之制而心喪未除古者三年之喪自天子逹于庶人其禮一也所有納后之禮乞候先太后服紀闋日然後審選世閥登進賢淑興理内教統領六宫必允衆望始議䇿立不宜頻有改易以駭四方乃陛下孝治天下之本也昔者魯文公居喪納幣以娶夫人春秋非之公羊傳曰娶在三年之外此何議爾曰三年之内不圖婚也是皆孔子書之以為世法㐲望陛下謹兹舉措以示後代稍緩其期則臣繾綣之願也慶厯元年孫沔上奏曰臣聞虞舜治家而納麓姬文制寡而御邦周南歌闗雎之徳仲尼刪詩著為三百篇之首魯史先經以紀元妃丘明直書為十二公之始易以風火出為家人之象言號令之行乎外由中正而明于内非嚴風火之威則難以正于家矣禮云身脩而家齊家齊而國治國治而天下平王政之本基乎此矣是知先聖懼昵情之為患而立法於将来者也恭以皇帝陛下仁深溥博明逹照臨好善無厭從諫弗咈紹三朝之謨訓躬萬幾之憂勤旰食在念将二十年雖古之聖帝明王致志行事無以過也今朝無專權之臣上無失道之事然而隂陽未和災變未息法令不行恩威不著者豈治内之道有所未至歟臣不欲迂闊引喻前古願以聞見五事而陳之若以言獲罪臣之職也伏以中宫正位徳配至尊治隂教為天下母三妃九嬪世婦御妾上下分統無使僭差百世不易之論也伏自景祐以来三黜寵闈兩犯宸扆盖所起幽微不勝恩遇身貴則性悍福極則患生退屏繼跡踰僭如舊苟不建立嚴制竊恐漸生厲階昨見上元嘉節内庭出遊美人才人多不隨從飛盖蔽景流車激霆各崇華衞分道争行衆目所觀此非所以示外而垂範者也臣乞今後貴品嬪御等並令脩備禮節戒約奢侈常隨皇后出入不得各排儀衛輙自矜越仍乞選擇端嚴近上夫人一兩員立為宫師以佐内則所冀上下有别而中外不惑矣竊以宫政之設内職是先尚書侍御司記典言一百二十人則為大備故先朝之數侍史不過五百人俸給止于千二十貫皆有紀律不甚奢盈今聞十倍増人已踰二三千十倍添俸或至二十萬私身飬女數復過之百司供億簿書可知一嵗之中所用何極非所以示節儉也臣乞取索宫中諸院宫人及私身養女都大數目呈取進止若非遊幸之所宜令檢勘合用人量留外並放歸本家任從其便請給之數見在者宜節減其半此所以消幽曠之氣而省財廩之費也竊以内侍之職最為親近宣傳國命出納王言常行抑制尚或騰陵今遷秩不踰年賞賜無虚日甲第連坊名園接畛玉帛盈於後房絲竹聞於别院官尊禄厚職重員多若不立之儀式必恐亢於寵榮臣欲乞御藥依舊只用二員御帯押班都知並乞選擇謹重公嚴勤畏舊有心力者充三年一選官不許非次改轉未有嗣者令養䕃一子則上無乆貴之人下有進身之路亦一代之永制也竊以勾陳九重華盖萬乗垣直太紫庭儼雲龍非深嚴不為尊非禁戒不為備䦨入則抵罪誤至則伏誅使内言不出於閫外言不入於閫所以防未然而限中外也今上之起居言語衆無不知帷箔宴遊外無不傳内降斜封坦夷若道免刑要賞響應如神皆由左右之人出入為地邇臣頗邪能伺動静迎合巧中率用斯道若不早辨以防微竊恐長姦而忽變臣欲乞應合入内及聽喚中人並用五十以上十五以下者諸宫院子須限七十以上分定畨次上下不得參雜出入仍令内東門司專切㸃檢其暗祗候非優人及公主院擔子官各放歸本營所有内道場乞今後斷絶此則整肅於宸庭足以輝光於史牒竊以王者所須嵗終不會此天下之財天子用之有司不得而吝也其或出納不謹支費不節豈可容姦不詰其弊今御寳憑由司内東門劄子取諸庫犀玉金銀錢帛一嵗僅三百餘萬貫但有入内之名不知所用之處此數既多不可悉記昨聞胥吏偽取庫金三十兩抵法況御寳是中禁所掌外人何計而詐得之竊恐前後妄用非此一吏也乞差不干礙公幹有心力臣寮置司将寳元後来無御寳憑由及内東門劄子取左藏庫等金銀犀玉錢帛大數對簿帳及謝恩表状造作文厯并内藏庫亦自寳元後来内中支使金寳錢帛都數逐件磨勘即見無涯費用積乆欺弊仍乞今後諸宫閤凡有取索出到憑由劄子先下内侍省都知入内覆奏然後置簿抄上畨換通簽正牒下諸庫藏方得支官物不得直行取索或更别設闗防節減用度亦經乆之利也此五事者實政教之本源昇平之基業也中宫正則内宰之制行于六宫而寵嬖不犯於上矣宫禁嚴則中閫之事絶於衆口而朋黨不結于外矣宫人不減則用度不給怨曠以感隂陽之沴矣内侍不禁則威柄不一引薦以来邪佞之類矣御寳不嚴財貨不計則盜詐公取而無慮矣噫恩能勝威昵可消正甘言令色遜於志先意希㫖會其事仁愛浸深忍情難決非至聖至明不可免也伏望皇帝陛下以公道制私情大日月之輝發雷霆之斷柔媚不干于聦明愛倖盡決于道義則何患天下之不治哉書曰威克厥愛允濟易曰揚于王庭剛決柔也傳曰棖也慾焉得剛非用天之剛健中正則於斷也難矣今昊賊侵軼西鄙攻守臣未敢進一䇿盖儒者不知兵不可預言也若大臣盡心諸将用命恐亦未為大患也夫手足之疾侵於皮膚積為瘡痍發于指掌未有所損也心腹之疾廹於膏盲壅為癰疽潰于頭目不可卒救也此五事措置得冝則有無窮之福此五事因循弗舉恐為不測之慮履霜至于堅冰然火在於積薪非一朝一夕之故也惟斷之在不疑行之恐不及動無失機間不容髪則百世之利萬方之幸此皆陛下家事非人臣所得及也至於政教之綱紀未舉輔相之心徳未同朋黨之邪正未分著位之材愚未辨進賢難於起死去佞過於拔山法令撓於親恩賞及於濫豈不謂根蘖於内而斤斧不施者乎若聖人一慮及此則庶事自正其條例悉數之名俟聦明聽然其說異日為陛下言之也若素非博識惟盡愚誠不歴詆於羣公不專攻於上徳但慮切直速怨貴權不能保身貽憂老母至於事君之心則無所愧矣伏望乙夜之餘再賜詳覽幸甚沔又奏曰臣伏見芳林園南宅見安故豫王靈輿至三月初三日方行攅殯諸宫奠酹慰禮已畢今見大内車蓋出入朝暮往還非全痛戚之情頗渉朋逰之便逍遥窺覘僕御喧譁禁士縱欲嚴呵宫人難於檢察誠為隐暗亦合防微伏恐姦細乗時駭機竊發人之所忽事不可知伏諒陛下以苦切在中周思未及臣叨司視聽須至達聞欲乞指揮故豫王本宫人在彼祗候朝夕祭奠餘並止節勿令輙出深為利便二年知諌院歐陽脩上䟽曰臣近風聞禁中因皇女降生於左藏庫取綾羅八千匹染院工匠當此大雪苦寒之際􅃻冰取水染練供應頗甚艱辛臣伏思陛下恭儉勤勞愛民憂國似此勞人枉費之事必不肯為然外議相傳皆云見今染練未絶臣又見近日内降美人張氏親戚恩澤太頻臣忝為諌官毎聞小有汚損聖徳之事須合力言難避天譴臣竊見自古帝王所寵嬪御若能謹儉柔善不求恩澤則可長保君恩或恣意驕奢多求恩澤則皆速致禍敗臣不敢逺引古事只以今宫禁近事言之陛下近年所寵尚氏楊氏余氏苗氏之類當其被寵之時驕奢自恣不早裁損及至滿盈今皆何在況聞張氏本良家子昨自脩媛退為美人中外皆聞以謂與楊尚等不同故能保寵最乆今日一旦宫中取索頓多恩澤日廣漸為奢侈之事以招外人之言臣不知陛下欲愛惜保全張氏或欲縱恣而敗之若欲保全則須常令謙儉不至驕盈臣料八千匹綾羅必非張氏一人獨用不過支散與衆人而已乃是枉費財物盡與衆人至於中外譏議則陛下自受以此而言廣散何益昨正月一日曹氏封縣君至初五日又封郡君四五日間兩慶封拜又聞别有内降應是踈逺親戚盡求恩澤父母因子而貴可矣然名分亦不可太過其他踈逺皆可減罷臣謂張氏未入宫之前踈逺親戚名皆何在今日富貴何必廣為閒人自招謗議以累聖徳若陛下只為張氏計亦宜如此況此事不獨為張氏大凡後宫恩澤太多宫中用度奢侈皆是汚損聖徳之事繫於國體臣合力言伏望聖慈防㣲杜漸早為裁損皇祐三年知諌院包拯上奏曰臣竊聞舊開礬鋪進納授官人李綬男與故申王宫承俊為親将就婚巹中外傳聞莫不駭愕檢會御史臺編敕節文應皇属議親並令具門閥次第委宗正寺官審覆須的是衣冠之後非闒冗庸賤之伍富商大賈之門差渉不實會赦不原其罪仍仰抨彈之官常加采聽許為親其李綬男正礙條制竊以伉合之序貴於匹敵氏族之選属在名宿盖禮教之重所宜謹嚴人地之華必資參擇按李綬闒冗之餘軒裳所絶曏縁進納已濫寵恩豈可更冒瀆國婚塵鄙公族使天支之貴下偶非類汨紊彛制虧損朝美臣請罷其婚姻别求徳閥仍乞申命有司今後國親並須依敕選定四年知諌院范師道上奏曰臣聞禮以制情義以奪愛常人之所難惟聦明睿哲之主然後能之近以宫人數多出之此盛徳事也然而事有繫風化治亂之大而未經留意者臣敢為陛下言之竊聞諸閤女御以周董育公主御寳白制並為才人不自中書出誥而掖廷覬覦遷拜者甚多周董之遷可矣女御何名而遷乎才人品秩既髙古有定員唐制止七人而已祖宗朝宫闈給侍不過二三百人居五品之列者無㡬若使諸閤皆遷則不復更有貟數矣外人不􅀎詳知止謂陛下於寵幸大過恩澤不節爾夫婦人女子與小人之性同寵幸過則瀆慢之心生恩澤不節則無厭之怨起御之不可不以其道也且用度太煩須索太廣一才人之俸月直中户百家之賦嵗時賜予不在焉況誥命之出不自有司豈盛時之事耶恐斜封墨敕復見於今日矣張方平上論曰臣聞禮始乎大婚詩首於闗雎易曰正家而天下定故帝嚳之立四妃虞舜之嬪二女塗山配禹簡娀啓商周自古公王季姜任太姒世徳相載故文王刑于寡妻以御于家邦夫三代之制后妃嬪御皆所以助釐隂教賛成内治閫外之事非所預聞自秦􅇗后始攝朝事以弟魏冉當國任政故范雎以為秦獨有穰侯天下不知有王也及漢吕氏因恵帝之早世乗間挺起干㩀帝座隂陽錯位根幹倒植末塗淪潰㡬遷運厯孝成即祚委政王氏皇緒中微正統三絶外家昌大執權四世而東朝夀考為之宗主至于新莾遂盜神器逮乎東京孝安之後外立者四帝臨朝者六后地深帷幄禮間外朝莫不衡柄歸於父兄詔令專於閽寺於是有利幼之立忌賢之難邪謀隂䇿以圖自固匪人乗間又牽牛而蹊田正士悼心思投鼠而忌器害家凶國濫觴有漸近如唐時太帝孝和武韋之亂廟社危絶僅續如綫春秋之義君子大居正雖嗣王繼厯幼冲纘服而猶朝政緫聽乎冢宰師傅保乂乎上躬則阿衡專美於有商周公勤勞乎王家其人也故三代之道無后妃預政之理漢自諸吕之亂大臣議所立而先擇外家之賢者以定大計故孝文之入繼抑由薄氏仁良之故及武帝機識超逺深謀獨斷顧命金霍克隆基圖誠雄傑英主哉魏文帝鑒東京之覆轍立後世之長緒亦嘗作為戒誓其事可法夫六宫之位稽諸昏義則有三夫人九嬪二十七世婦八十一女御之数其在周禮則世婦女御職存而數闕盖明君子不茍於色有婦徳則擇以充位無則闕之矣自姬室衰陵諸侯僭縱秦併六國遷其後宫恣用汰心益崇爵號漢自文景務循儉徳奕世累盛而至武元選納益廣嬖幸用煩至乃掖庭三千増級十四是以人君耽娱佚之樂起驕怠之惑倦勤廢政亂是用長唐景龍之孽天寳之敗是皆始於女徳也夫其初皆恃當世之平寧因天下之全盛罔思生民作業之勞不念四方惟正之供沈溺留連漸至蠧弊女謁干乎主度姦微竊乎事權帑藏以滛費而耗盡賞刑以私昵而謬濫召禍當日垂鑒後人良可夷也是故考歴代治亂之迹覽彤史得失之論擇善違失可舉而言若夫戒慎失政之方保全外戚之道則莫若賦之禄而使就第教之學而使循禮傅之以儒雅篤行之士而絶其便僻險偽之交示之以恭譲儉徳之賞而懲其慢游僭汰之好以義節之是謂寵之以恩驕之是謂禍之梁竇無噍類於漢武韋不遺育於唐是可戒矣若夫體乾坤之法正閨闈之治則莫若登選良姓之種採納衣冠之緒屏卑賤之妖色斥猥微之淫行叙進婉順之徳崇近清閒之性雨露均施照臨無頗以資昊天悠乆之無疆以取文王百斯之善慶若夫保邦求理之法節用安人之善則莫若省其品號罷虚授之廪禄放其游冗節徒費之羞服裁用度以寛民力息曠怨以除沴氣是故治世賢王之脩身正家愛民經國之道莫先於此也已謹論六年翰林學士胡宿上奏曰臣今月二十一日草福康公主特進兖國公主制竊聞議行册禮然於事體頗有未便祖宗以来公主長主未有行此禮者昔漢明帝封皇子悉半諸國明徳馬皇后曰諸子食數縣不已儉乎帝曰我子豈敢與先帝子等也唐貞觀中太宗長樂公主將出降帝令有司資送倍於永樂公主魏徴曰不可引漢明帝之言為對且曰天子姊妺稱長公主加長字是有所尊崇或可情有淺深無容禮相踰越太宗然其言入告長孫皇后后遣使賜徴金帛陛下即位以来累曽進封楚國魏國二大長公主亦不曽行册禮今施於兖國公主是與大長公主相踰越兼以貴主之故賢妃亦䝉殊典有㫖令進綸告不行册禮是母子之間一行一不行禮意尤不相稱書於史册後世将有譏議必謂陛下偏於近情虧聖徳之美臣願陛下采漢明之言開文皇之聽遵祖宗舊典如國朝公主曽行此禮行之粗且無嫌如其不曽則宜且罷臣以陛下好忠諌納至言臣職在論思不敢緘黙知諌院司馬光上奏曰右臣近聞有聖㫖令召前管句兖國公主宅内臣二人復還本宅臣與楊畋龔鼎臣同有論列以為非宜未䝉允納臣聞父之愛子教以義方弗納於邪公主生於深宫年齒幼穉不更傅姆之嚴未知失得之理臣謂陛下宜導之以徳約之以禮擇淑慎長年之人使侍左右朝夕教諭納諸善道其有恃恩任意非法邀求當少加裁抑不可盡從然後慈愛之道扵斯盡矣此二人嚮在主第罪惡山積當伏重誅陛下寛赦斥之外方中外之人議論方息今僅數月復令召還道路藉藉口語可畏殆非所以成公主肅雍之美彰陛下義方之訓也臣實憤悒為陛下惜之伏望聖慈察臣愚忠追止前命無使四方指目以為過舉虧損盛徳非細故也七年光又奏曰臣先曽上言為前管句兖國公主宅内臣等過惡至大乞不召還近聞傳宣入内内侍省令押上件内臣梁懐吉赴公主宅依舊句當外議諠譁無不駭異臣聞太宗皇帝時姚坦為兖王宫翊善王有過失坦輙盡言諌正王及左右皆患之左右教王詐疾踰月不朝太宗甚憂之召王乳母入宫問王起居狀乳母曰王本無疾但以翊善姚坦檢束太嚴王舉動不得自由欝欝成疾耳太宗怒曰朕選端士為王僚屬固欲導王為善今既不􅀎納用規諌而又詐疾欲使朕逐去正人以求自便其可得乎且王年少不知出此皆汝輩教之耳命捽至後園杖之數十召坦慰勉之太宗非不愛其子也誠以愛之則莫若納之於善若縱其所欲不忍譴訶適所以害之也齊國獻穆大長公主太宗皇帝之子真宗皇帝之妹陛下之姑於天下可謂貴矣然獻穆公主仁孝謙恭有如寒族奉李氏宗親備盡婦道愛重其夫無妒忌之行至今天下稱婦徳者以獻穆公主為首獻穆公主豈不自知其身之貴哉誠以貴而不驕然後􅀎保其福禄全其令名故也臣謂陛下教子以義宜以太宗皇帝為法公主事夫以禮宜以獻穆公主為法則風化流於四方聲譽施於後世今陛下曲徇公主之意不復裁以禮法使之無所畏憚陷入於惡觸情任性以邀君父憎賤其夫不執婦道将何以形四方之風垂来世之則易曰家人嗃嗃悔厲吉婦子嘻嘻終吝此言家道尚嚴不可專用恩治也伏望陛下斥逐梁懐吉等復歸前来貶竄之處其公主左右之人欲使陛下召還梁懐告等者皆教導公主為不善之人也悉宜治其罪而逐之别擇柔和謹愿者以補其缺仍戒敕公主以法者天下之公器若屢違詔命不遵規矩雖天子之子亦不可得而私庶㡬有所戒懼率循善道可以永保福禄不失善名不然衆人所云甚可畏也英宗即位初侍御史司馬光乞放宫人劄子曰臣伏見前代帝王升遐之後後宫下陳者皆放之出宫還其親戚所以遂物情重人世省浮費逺嫌疑也竊惟先帝恭儉寡欲清約執禮後宫侍左右承寵渥者至少而饗國日乆嵗増月積掖庭之間冗食頗衆陛下以哀恤之初未忍散遣今山陵祔廟大禮俱畢臣愚謂宜舉前代故事應先帝後宫非御幸有子及位號稍貴并職掌文書之人其餘皆給與粧奩放遣出外各令歸其親戚或使任便適人書之史册亦聖朝一美事也光又奏曰臣聞王化之興始於閨門故易基乾坤詩首闗雎前世皆擇良家子以充後宫位號等級各有員數祖宗之時猶有公卿大夫之女在宫掖者其始入宫皆須年十二三以下醫工診視防禁甚嚴近嵗以来頗隳舊制内中下陳之人競置私身等級濅多無復限極監勒牙人使之雇買前後相繼無時暫絶致有軍營井市下俚婦女雜處其間不可辨識此等置之宫掖豈得為便臣嘗念此不勝憤惋今陛下即位之初百度惟新嬪嬙之官皆闕而未備臣謂宜當此之時定立制度依約古禮使後宫之人共為㡬等等有㡬人若未足之時且虚其貟數既足之後不可更増凡初入宫皆須幼年未適人者若求乳母亦須選擇良家性行和謹者方得入宫傳之子孫為萬世法此誠治亂之本禍福之原不可以為細事而忽之光又上皇太后䟽曰臣聞聖人之徳使四海之外編户之民皆輻湊而歸之如孝子之奉父母其故何哉推仁愛惻怛之誠以加之也故詩云愷悌君子民之父母夫四海至逺也編户至微也誠之至也猶可以為之父母况閨門之内血氣之親乎昔漢明徳馬皇后無子明帝使飬賈貴人之子炟以為太子且謂之曰人不必自生子但患愛養不至耳后於是盡心撫育勞悴過於所生及明帝崩太子即位是為章帝章帝亦孝性淳篤恩性天至母子慈愛始終無纎芥之間前史載之以為美談恭惟仁宗皇帝憂繼嗣之不立念宗廟之至重以皇帝仁孝聦明選擢於宗室之中使承大統不幸踐祚數日遽嬰疾疹雖殿下撫視之慈無所不至然醫工不精藥石未效竊聞曏日疾勢稍増舉措言語不能自擇左右之人一一上聞致殿下以此之故不􅀎堪忍兩宫之間微相責望羣心憂駭不寒而慄方今仁宗皇帝新棄四海皇帝乆疾未平天下之勢危於累卵惟恃兩宫和睦以自安如天覆而地載也豈可效常人之家争語言細故使有絲毫之隙以為宗廟社稷之憂哉臣是用日夜焦心隕涕側足累息寧前死而盡言不敢幸生而塞嘿也伏以皇帝内則仁宗同堂兄之子外則殿下之外甥壻自童幼之嵗殿下鞠育於宫中天下至親何以過此又仁宗立以為皇子殿下豈可不以仁宗之故特加愛念包容其過失耶况皇帝在藩邸之時以至踐祚之初孝謹温仁動由禮法況殿下所親見而明知也苟非疾疹亂其本性安得有此過失哉夫心者神明之主也若其有疾則精爽迷亂冥然無知言語動作不自省記不識親踈不擇貴賤此乃有疾者之常不足恠也殿下聦明睿智天下之理無所不通豈可責有疾之人以無疾之禮邪今殿下雖日夕憂勞徒自困苦終何所益以臣愚見莫若精擇醫工一二人以治皇帝之疾旬月之間察其進退有效則加之以重賞無效則威之以嚴刑未愈之間但宜深戒左右謹於侍衛其舉措語言有不合常度者皆不得以聞庶㡬不増殿下之憂憤殿下惟寛釋聖慮和神養氣以安靖國家綱紀海内俟天地垂祐聖躬痊復然後舉治平之業以授之不亦美乎古之慈母有不孝之子猶能以至誠惻隠撫存愛養使之内愧知非革心為善況皇帝至孝之性禀之於天一旦疾愈清明復初其所以報答盛徳豈云細哉臣之愚慮苦言盡此而已乞殿下更賜裁擇臣昧死再拜上䟽治平元年光又上皇太后䟽曰去嵗仁宗皇帝捐棄萬方皇帝嗣統之初憂哀成疾殿下念社稷之重同聽庶政以安群情今聖體復初四方無事殿下推而不居自取安逸動静之節無不合宜率土臣民孰不稱頌臣不自量度欲成殿下之全美猶以螢燭之微明仰裨日月之盛光伏惟殿下稍寛其罪而終聽其辭臣竊以治家之道貴賤雖殊人情一也嘗觀天下士民之家其長幼羣居長者或恩意不備衣食不豐幼者或容貎不恭語言不遜若幼者孝恭而不怨長者慈恵而不責則上下雍睦家道以興若幼者以為怨長者以為責則上下乖離家道以衰其始相失也甚㣲而終為禍也甚大又加以讒人間之於是乎有父子相疑兄弟相疾亂虐並興無所不至者矣凡閨門之内子婦有以孝恭之心至者則尊親當歡然以慈愛之心接之若其有過則當以忠厚之心教之教之備矣而猶不聽則雖責之可也罪之可也及其既改則又當復以歡心接之不可以一忤顔色而終身惡之遂不可觧謝也故骨肉之間有威怒而無憎疾有詰責而無猜忌此自古聖人所以御其親之道也臣竊惟皇帝皇后於殿下兼内外之親幼䝉保育今日為萬民父母享天下富貴孰云非殿下之力臣謂殿下固宜撫存愛念情同所生周旋保䕶以終大恵不可偶以纎芥之失遂蓄乆長之怒棄生成之厚恩取踈絶之深怨愚智所同知也皇帝去嵗得疾之時禮貎言辭誠有可疑得罪於殿下者臣固已嘗言於殿下云不可責有疾之人以無疾之禮也凡醉而有過醒猶可赦況有疾之人不自省知本非意之所欲為豈可追數以為罪咎耶皇后自童孺之嵗朝暮游戲於殿下之懐分甘哺果拊循煦嫗有恩無威今既正位中宫得復奉膳羞盥帨以事殿下其意恃昔日之愛不自踈外猶以童孺之心望於殿下故或有所求須不時滿意則愠懟怨望不能盡如家人婦姑之禮殿下雖怒之責之固其宜也誰曰不可但事過之後殿下若遂棄之不復收恤憎疾如仇讎則臣以為過矣臣在闕門之外無由知禁庭之事竊聞道路之言未詳虚實皆言近日皇帝與皇后奉事殿下恭勤之禮甚加於往時而殿下遇之太嚴接之太簡或時進見殿下雖賜之坐如待踈客語言相接不過數句須㬰之間已復遣去如此母子之恩如何得逹婦姑之禮如何得施所以使之疑惑恐懼不敢自親者盖以此也臣竊惟殿下母儀天下踰三十年柔明之譽洽于中外皇帝龍潜藩邸進徳脩業仁聖之望光于逺邇先帝以至公大義選賢建嗣海内之人皆謂繼統之日慈孝之風必自家刑國誠不意閭巷之民忽有今兹異論推其本原盖由皇帝遇疾之際宫省之内必有䜛邪之人造飾語言互相間構一則欲詐效小忠以結殿下之知僥求禄利二則自知過失素多畏嗣君之嚴有所不容三則欲竊弄權柄惡長君聦明使已不得自恣是以日夜闚覘拾掇絲毫之失無不納於殿下之耳殿下雖至聦哲不能無疑雖至仁慈不能無怒皇帝以剛健之性屈於衆口無以自伸能不憤悒遂使兩宫之間介然相失乆而不觧流聞于外致朝野之士有敢竊議其是非者深可惜也今天誘其衷殿下濬發慈㫖卓然逺覽舉天下之政歸之皇帝此乃宗廟之靈生民之福然竊料䜛邪之人心如沸湯愈不自安力謀離間彼皆自營一身之私非為國家與殿下之計也臣願殿下深察其情勿復聽納斥逺其人勿置左右召諭皇帝以嚮来紛紛皆此属所為自今以後母子之間當坦然無疑皇帝必涕泣拜伏感激摧謝然後兩宫之歡一皆如舊凡皇帝皇后進見之際殿下宜賜以温顔留之從容来往無時勿加限絶􅂉置酒語笑與之欣欣相待一如家人之禮如此則殿下坐享孝養何樂如之心平氣和眉夀無疆國家乂安内外無患名譽光美垂於無窮與其信任䜛慝猜防百端終日戚戚憂憤生疾國家不寧禍亂横生譏謗之言流於後世二者得失相去逺矣且殿下既能以祖宗之業付皇帝又能以大政授之而獨於恩禮之際終不能豁然囬心息怒其故何哉方今宫闈之中殿下骨肉至親止於皇帝皇后長公主及皇子公主數人而已其餘皆行路之人於殿下何有若親者尚不可結以恩信猜而逺之則踈者獨肯受殿下顧遇盡其死力終始無貳乎夫貴莫貴於為天子之母富莫富於受四海之養今殿下有此富貴而不能自樂親其所可踈踈其所可親使受恩之子婦彷徨而不自安踧踖而不敢進雖内懐反哺之心而無以施展臣竊為殿下惜之臣父子皆䝉先帝大恩擢於常調之中置之侍從之列心非木石豈能暫忘今先帝晏駕之後臣唯不避死亡以進忠直之言庶㡬殿下母子和恱國家安寕是臣所以為報効也不勝區區激切之誠展布以聞惟留神幸察臣光昧死再拜上䟽侍御史傅堯俞上奏曰臣聞志於大者必遺其細善乎始者當圖其終夫惟識小大之當迺不惑於衆人之論全始終之分故能成髙世之徳恭惟殿下佐佑先帝母儀萬方世謂雖明徳長孫不可瞻望盛烈可謂善其始矣當先帝晚嵗國本未定殿下竭誠賛翊援皇帝於藩邸以繼大統是挈四海而手維之其功力可勝道哉及再降詔書權同機務内則調䕶聖神有勿藥之喜外則撫鎮夷夏有泰山之安若少留意以圖其全則髙世之徳具矣定䇿安宗廟為國家建不拔之基而収之以静退成就其盛徳以取髙於萬世者大業也捨此皆𤨏末細微固可以脫然遺之矣伏望以四月九日元降指揮施行遂還政事燕䖏清禁從容以就天下之飬身受無前之寵名家享不貲之盛福全具衆美纔一言之易耳況始諭外廷候皇帝康復日今天體清豫漸親萬幾不能知殿下之深者安得無惑惟殿下積行累功於數十年間其勤已甚儻始終之際微有不全他日雖復痛惜何所及哉不審殿下何憚於此而憚一言之易以全大徳而釋羣疑也如前世善惡是非殿下宜講磨已熟臣所以懇懇為言者顧今朝廷之體非便而無益於殿下且慮左右之人不深惟大體務為姑息之愛因循寖乆将累盛徳臣輩不言實負殿下至於佞者騰造異端觧釋疑似不可不察伏惟亮臣悃愊斷之於心則天下幸甚三年殿中侍御史范純仁奏曰臣伏聞皇太后手書追尊濮王為皇夫人為后陛下已降敕命施行竊以追崇濮王之事始因中書不正之謀陛下謙慎未行之間聞皇太后曽降手書切責政府因此權罷今皇太后復降命令追崇為皇始末不同天下将何取信況皇太后自撤簾之後深居九重未嘗預聞外政豈當復降詔令有所建置盖是政府臣僚苟欲遂非掩過不思朝廷禍亂之源耳且三代已来未嘗有母后詔令施於朝廷者自秦漢已後母后方預幼主之政自此權臣欲為非常之事則必假母后之詔以行其志往往出於逼脅而天下之心卒知事由權臣今陛下以長君臨御于兹四年萬幾之務當出宸斷内奉慈闈惟宜竭仁孝之誠盡四海之養而已豈須更煩房闥之命叅紊國章一開其端流弊極大異日或為權臣矯託之地甚非人主自安之計也伏望陛下深察臣言追寢前詔凡繫濮王典禮陛下自可采擇公議而行何必用母后之命施於長君之朝也臣方待罪於家日俟誅竄而區區之誠不能自已者尚冀一悟明主之聼以安宗社臣雖萬死亦復何恨四年知諌院楊繪上奏曰臣竊聞内人景氏者曽在仁宗朝為御侍後出嫁許宗賢近已聽離却召入内者臣竊以文武之政治於衽席家人之道脩於近小而況已經從良豈可復塵於禁掖哉伏乞放之於外以清物議治平間右庶子韓維上言曰臣累日以来傳聞禁中汎至諸臣之家為頴王擇妃審如此者臣竊以為非便臣聞夫婦者居室之大倫将以正家則承宗事以繼萬世之嗣故禮之用惟婚姻為兢兢兢兢者慎之至也坊記曰諸侯不下漁色故君子逺色以為民紀此言諸侯不得自於其國網取容色若捕漁然所以推逺女徳為民之紀法也伏以皇子頴王孝友聦明動履法度方嚮經學以觀成徳今卜族授室其繫尤重臣愚以為宜歴選勲望之家慎擇淑􅈒之媛考古納采問名之義以禮成之不宜苟取華色而已近世簡棄禮教不以為務婚娶之法自朝廷以及民庶蕩然無制故風俗陵靡犯禮者衆賢士大夫未嘗不發憤嘆息竊幸國家有以振之今陛下始初清明為元子求婦而事出苟簡殆非所以矯世厲俗反之雅正且無以示頴王使知室家之道在徳而不在色也傳稱尤物足以移人詩咏淑女㡬以配上此誠智士仁人見微知終逺覽禍福之原為後世戒也陛下不可不加聖意焉臣獲侍宸陛且官王府苟益萬一不敢不言干冒天威臣無任惶懼激切之至歴代名臣奏議卷七十四
