body:
  text: 歴代名臣奏議卷三百七明楊士竒等撰灾祥宋孝宗淳熙四年吏部侍郎周必大上奏曰臣竊見隂雨已踰兩旬甚妨收刈陛下焦心勞思徳音屢下決遣囚繋蠲免房緡申詔有司精加祈禱而雨意未止愈勤宸念臣職在論思恨無愚者之慮少裨萬一輙以三事冐昧陳獻伏聞太祖朝以久雨謂左右曰後宫止三百餘人當更放數十人今禁中給使雖少不知可用太祖故事否此一事也近嵗員多闕少到堂及到部官發洩艱滯不知可詔三省及吏部刷具人數隨宜措置撥遣否此二事也陛下裕民之心甚切而州縣奉行多有不至聞浙中諸郡見催積欠頗急不知可降指揮少寛期限否其餘更有寛恤事件望令三省及户部日下條具取㫖施行此三事也臣誠迂陋然懐不自已親書奏聞或有可採乞賜裁擇庶幾人心懽恱指期晴霽八年朱熹上奏曰臣竊惟皇帝陛下臨御以來夙興夜寐畏天恤民誠敬寛仁格于上下宜其天心克享民物阜安而二十年之間水旱盗賊畧無寧嵗邇者垂象差忒識者寒心饑饉連年民多流殍陛下側席興歎進賢退奸分命朝臣振廪出粟凡所以奉承天意慰恱人心者無所不至又宜若可以少回災沴召致和平矣而間者冬氣太温雷電震激嗣嵗之計尚有可憂臣誠愚昧有不識其所以然者嘗竊推迹前事以深求之意者徳之崇者有未至於天歟業之廣者有未及於地歟政之大者有未舉而其小者無所繫歟刑之逺者或不當而其近者或幸免歟君子或有未用而小人或有未去歟大臣或失其職而賤者或竊其柄歟直諒之言罕聞而諂䛕者衆歟徳義之風未著而汙賤者騁歟貨賂或上流而恩澤不下究歟責人或已詳而反躬有未至歟夫必有是數者然後足以召災而致異今以陛下之明聖則豈有是哉然而天心未豫邦本動揺宸慮雖深旱氣未究是則必有說矣臣竊不自量敢冒萬死伏願陛下聽斷之餘虚心靜慮試以前數條者反之於身驗之於事而深自省焉則淵黙之中無微不照而凡此得失之端孰有孰無孰存孰改皆無所遁其情矣若猶以為未也則願濬發徳音布告中外反躬引咎以圖自新内自臣工外及甿庶有能開寤聖心指陳闕政者無間踈賤使咸得以自通然後差擇近臣之通明正直者一二人使各引其所知有識敢言之士三數人寓直殿門凡四方之言有來上者悉令省閱舉其盡忠不𨼆者日以聞于聰聽則夫天人之際譴告所繇將有粲然畢陳於前者然後兼總條貫稱制臨決畫為科品以次施行使一日之間雲消霧散堯天舜日廓然清明則上帝鬼神收還威怒羣黎百姓無不䝉休矣臣以孤逺受恩過深圖報無階抵冒至此惟陛下寛其斧鑕留神財幸熹提舉浙東常平茶鹽公事乞修徳政以弭天變狀曰臣昨為本路旱傷祈禱不應累曾具奏及申尚書省乞為敷奏早作防備近準省劄已䝉聖慈特從所請支錢於明州置場糴米而又伏覩陛下發自宸衷特遣中使降香祈禱臣有以見陛下畏天恤民之心至深至切不勝感激願效愚忠顧恨官有常守無由瞻望清光罄竭血誠庶裨萬一不勝犬馬螻蟻區區之情竊謂累年之旱譴告已深今日之災地分尤廣非惟官府民間儲備已竭而大農之積亦已無餘又當大禮年分户部催督州縣積年欠負官物其勢不容少緩凡所以為施舍賑恤之恩者竊恐又必不能如去年之厚臣竊不勝大懼以為此實安危治亂之機非尋常小小災傷之比也為今之計獨有斷自聖心沛然發號深以側身悔過之誠解謝髙穹又以責躬求言之意敷告下土然後君臣相戒痛自省改以承皇天仁愛之心庶幾精誠感通轉禍為福其次則唯有盡出内庫之錢以供大禮之費為收糴之本而詔户部無得催理舊欠詔諸路漕臣遵依條限檢放稅租詔宰臣沙汰被災路分州軍監司守臣之無狀者遴選賢能責以荒政庶幾猶足以下結民心消其乘時作亂之意如其不然臣恐所當憂者不止於餓殍而在於盜賊䝉其害者不止於官吏而上及於國家也臣䝉恩至深不知死所敢冒鈇鉞為陛下言之觸犯天威恭俟夷滅十二年地震尚書吏部員外郎楊萬里應詔上奏曰臣聞言有事於無事之時不害其為忠也言無事於有事之時其為奸也大矣昔者賈誼陳治安之策有厝火積薪之喻此文帝最盛時也蘇洵獻審敵之策有弊船深淵之喻此仁宗最盛時也西漢之文帝本朝之仁宗何君也後世堯舜之君也以後世堯舜之君而二子有積薪弊船之喻何也臣故曰言有事於無事之時不害其為忠也今則不然南北和好踰二十年一旦絶使敵情不測而或者曰彼有五單于爭立之禍又曰彼有匈奴困於隣近復困於柔然之禍既而皆不驗或者曰彼將畏我或者曰彼不敢圖使果畏我而不敢圖乎道塗相傳繕汴京之城池開海州之漕渠又於河南北簽民兵增驛騎製馬櫪籍井泉又收彼之海舟入彼之内地葺而新之其意甚祕其禁甚嚴而吾之間諜不得以入此何為者耶今夫千金之家有巨盗焉日夜摩厲以圖行刼而奪之貨為千金之子者方且外户不閉般樂飲酒處之以坦然夫有其備而樂之以坦然可也無其備而處之以坦然可乎而說者以為畏我且不敢圖我也臣所謂言無事於有事之時者一也或以謂彼主北歸可以為中國之賀臣以為中國之憂正在此也何也昔者金人之南侵也空國而盡銳於一舉不知夫他人乘其虚而奪之國今度彼之北歸葢創於昔者之空國而南侵也是彼將欲南之必固北之北之者何或者以身填撫其巢而以其雛與婿經營其南也而說者以謂可以為中國賀臣所謂言無事於有事之時者二也臣竊聞論者或謂緩急淮不可守則棄淮而守江是不然有淮所以有江也淮茍無矣安得而有江哉吾果棄淮乎敵以兵居之居之而不去近則通泰之鹽利為彼所據將無以給吾之財用逺則吳蜀之形勢為彼所裂將無以通吾之脉絡葢昔者吳與魏力爭而得合肥然後吳始安李煜失滁揚二州自此南唐始蹙今曰棄淮而保江既無淮矣江可得而保乎臣所謂言無事於有事之時者三也陛下近日之舉亦可觀矣如曰舉邊帥如曰舉都統其說是也其意未也何也今淮之東西凡十五郡所謂守帥不知陛下將使宰相擇之乎抑將使樞廷擇之乎使宰相擇之宰相未必為樞廷慮也使樞廷擇之則除授不自已出也一則不為之慮一則不自已出緩急敗事則皆曰非我也陛下將責之誰乎至於都統則令侍從勿以見任而必曰未顯者是求他日之將才而非求今日之將才也舉者得以塞今日之責受舉者得以逃今日之責是上下相與為媮而已臣所謂言無事於有事之時者四也且南北各有長技若騎若射北之長技也若舟若歩南之長技也今為北之計者尚收其海舟而繕治之至於南之海舟則不聞繕治焉或曰吾舟素具也或曰吾之舟雖未具而憚於擾也自紹興辛巳南北之戰今幾年矣當時山東之功采石之功不以騎也不以射也不以歩也舟焉而已當時之舟勝則勝矣今幾年矣素具之舟其可復用乎且夫斯民一日之擾與社稷百世之安危孰輕孰重也易曰除戎器戒不虞聖人豈不知其擾哉夫固有大於擾者也而曰素具又曰憚於擾臣所謂言無事於有事之時者五也大抵天下之事有緩急當周公相成王之時其急在於懲荆舒當宣王中興之時其急在於伐玁狁當今之時陛下以為何等時耶金人日逼疆埸日憂而未聞防金人者何策保疆埸者何道但聞某日修某禮文也某日進某書史也是以鄉飲理軍以干羽解圍也臣所謂言無事於有事之時者六也臣聞古者人君不能悟之則天地能悟之今也國家之事敵情不測如此而君臣上下處之如太平無事之時是人不能悟之矣故上天見異相傳異時熒惑犯南斗邇日鎮星犯端門熒惑守羽林臣書生不曉天文未敢以為必然也至於王春正月日青無光若有兩日相摩者兹不曰大異乎然天猶恐陛下不信也至於春日載陽和氣播物復有雨雪殺物者兹不曰大異乎然天猶恐陛下又不信也廼五月庚寅又有戊夜地震者兹又不曰大異乎且夫天變在逺臣子不敢奏也不信可也地震在外州郡不敢聞也不信可也今也天變頻仍地震輦轂陛下豈得不信乎信之矣豈得不懼乎臣聞匡衡云隂變則静者動陽蔽則明者晻曷謂陽曰君也徳也中國也君子也曷謂隂曰臣也兵刑也四裔也女謁近習也今也日而無光春而雪寒地而動揺其為隂之咎徴也昭昭矣而君臣不聞警懼朝廷不聞咨訪人不能悟之則天地能悟之臣不知陛下於此悟乎否乎臣謹按國史本朝宣和五年十月京師地震未幾有尼雅滿寇汴京之役紹興三年八月行在所地震未幾有金人寇淮甸之役宣和遇烖而恬不知懼我是以有靖康之禍光堯知變而詔求直言我是以有韓世忠劉光世之捷此近事之驗也不必逺稽之上古也今或者謂天變不足畏地震不足畏陛下胡不引宣和紹興之事而觀之乎臣所謂言無事於有事之時者七也自頻年以來兩浙最近則先旱江淮則又旱湖廣則又旱一方有旱則民之流徙者相續道殣者相枕常平之積名存而實亡入粟之令上行而下不應静而無事尚未知所以振之救之動而有事將何仰以為資耶昔者漢之伐匈奴必實塞下之粟伐先零必糴湟中之粟今也倉廪府庫非徒無餘也且不足也而或者以為無足慮臣所謂言無事於有事之時者八也古者足國裕民惟食與貨所謂貨者今之錢幣是也今之所謂錢者富商巨賈近習閹宦權貴將相皆盈室以藏之列屋以居之積而不洩滯而不流至於百姓三軍之用則惟破楮劵爾一旦緩急破楮劵可用乎當是之時萬一如唐涇原之師因怒糲食蹴而覆之出不遜語遂起朱泚之亂可不為寒心哉臣之大憂實在於此而或者曰楮劵可以富國臣所謂言無事於有事之時者九也臣聞善為備者備兵不若備糧備糧不若備人古者立國必有可畏非畏其國也畏其人也故苻堅欲圖晉而王猛以為不可謂謝安桓沖江左之望是存晉者二人而已矣異時名相如趙鼎張浚名將如岳飛韓世忠此金人所憚也近時劉珙可用則蚤死張栻可用則沮死萬一有緩急不知可以督諸軍者何人可以當一面者何人而金人之所素憚者又何人耶而或者謂今日文武之才皆有其人人之有才用而後見臣聞之記曰茍有車必見其式茍有言必聞其聲今曰有其人而未聞某人如古之名將某人如古之名相是有車而無式有言而無聲也且夫用而後見非臨之以大安危試之以大勝負則莫見其用也平居無以知其人之能否必待大安危大勝負而後見焉見其成事幸矣萬一見其敗事悔何及耶昔者謝𤣥之北禦苻堅而郗超知其必勝桓温之西伐李勢而劉惔知其必克葢𤣥於履屐之間無不當其任温於蒱博不必得則不為二子於平居無事之日葢必有以察其小而後信其大也豈必待用而後見也哉而今之說者曰文武之才皆有其人人之有才用而後見臣所謂言無事於有事之時者十也願陛下超然逺覽昭然逺悟勿矜聖徳之崇髙而増其所未能勿恃中國之生聚而嚴其所未備勿以天地之變異為適然而法宣王之懼烖勿以臣下之苦言為逆耳而體太宗之導諫勿以女謁近習之害政為細故而監漢唐季世致亂之由勿以今日仇讎之包藏為無他而懲宣政晚年受禍之酷責大臣以通知邊事軍務如富弼之請勿以東西二府異其心委大臣以薦進謀臣良將如蕭何所竒勿以文武兩途而殊其轍勿使賂宦者而得旄節如唐大歴之弊勿使貨近幸而得招討如梁叚凝之敗以重蜀之心而重荆襄使東西形勢之相接以保江之心而保兩淮使表裏脣齒之相依勿以海道為無虞勿以大江為可恃増屯聚糧治艦扼險君臣之所咨訪朝夕之所講求姑置不急之務専精備敵之策平居無事常若敵至庶幾上可消於天變下不堕於戎心詩云迨天之未隂雨徹彼桑土綢繆牖户若曰隂雨既至而後徹桑土則伊尹周公孫武穰苴亦不能為矣雖然天下之事有本根有枝葉如臣前之所陳者皆枝葉而已所謂本根臣請誦之臣嘗讀三國志見杜恕上疏於魏明帝臣以為深有當於人心者如曰陛下憂勞萬機或親燈火而庶事不康又曰今朝臣不自以為不能以陛下為不任也不自以為不知以陛下為不問也又曰每有軍事詔書常曰誰當憂此者耶吾當自憂爾又曰知其不盡力也而代之憂其職知其不能也而教之治其事恕之意葢謂人主不可以自用而人臣之不忠者幸於人主之自用人臣不可以不任責而人臣之無能者患於己之任責細故小物而人主自用人臣不任責若未害也至於軍事而猶曰誰當憂此吾當自憂今日之事將無類此臣聞之易曰乾為君乾之道何道也代有終者坤也行水火山澤雷風之用者六子也乾何為哉君道亦然故孔子曰天何言哉四時行焉百物生焉自堯舜至於文武罔不行此道自六經至於語孟罔不講此言惟漢之晁錯以為不然爾其說曰人主不可以不知術數夫以孝景恭儉之資去成康不能以寸然徳減於孝文變生於七國錯實誤之也陛下之聖舍己如舜從諫如湯毋我如孔子無可無不可如漢髙帝而太平未致中興未開敵國冦讎若未有以備之者得無有如晁錯者惑聖聽而誤聖心者乎傳曰木水有本源陛下聖學髙明惟思其所以本源者臣昧死上愚言惟陛下裁擇萬里又因旱上疏曰臣伏覩三省同奉聖㫖政事不修旱暵為虐可令侍從臺諫兩省卿監郎官館職疏陳闕失及當今急務無有所隠臣仰惟聖主在上徳政􅄎博和氣昭格頻年告豐乃五月以來上天不雨聖心焦然不遑朝夕親御法駕禱于羣望至惻怛也而亢陽為戾時雨未應誕布明詔疇咨在廷臣職在宰掾列在卿監無以報國惟有盡言然臣久不聞聖世求言之詔而驟當聖主下詢之勤竊喜憂民之意足以轉災而為祥又竊歎求言之詔無乃似遲而猶隘也旱及兩月然後求言不曰遲乎上自侍從下止館職不曰隘乎臣請為陛下歴言致旱之由然後精講備旱之策臣聞天地之氣與人之氣貫通而為一者也是氣也常通而不隔則為豐穰為治安一有隔而不通則為水旱為危亂今嵗之所以旱者何也是必有隔而不通者也易曰天道下濟而光明地道卑而上行記曰天氣下降地氣上騰皆言天地之氣相為升降然後相為貫通也今也陽亢於上而不下濟隂伏於下而不上行是必有戾氣隔於其間也然則孰為戾氣斯民歎息之聲此至微也而足以聞于皇天斯民愁恨之念此至隠也而足以達于上帝此戾氣之所從生而天地之氣所從隔也愛民如陛下憂民如陛下而安得愁恨歎息之事哉葢上澤不下流下情不上通而已矣何謂上澤之不下流上有薄賦斂之君而民不被其深仁此臣所謂上澤之不下流也何謂下情之不上通陛下之耳目内寄之於臺諫而臺諫之情有所不盡達外寄之於監司而監司之情有所不盡聞此臣所謂下情之不上通也臣請先言民不受實恵之說陛下之於民田租之課所蠲者不知其幾酒稅之課所蠲者不知其幾茶鹽之課所蠲者不知其幾可謂上有薄賦斂之君矣然民之不受其實恵者何也下之人有以隔之也陛下蠲之版曹督之監司督之州縣督之則是蠲之者言也督之者意也蠲之者名也督之者實也言不掩意實不葢名是罔民也或曰此經常之費也不可得而蠲也若曰經常之費不可得而蠲乎真宗之世嘗因蠲民之賦而出内藏之錢以賜三司以代所蠲矣大臣何不舉此故事以聞於陛下也或曰人主愛民人臣愛官故蠲之者未幾而督之者愈峻也且陛下之愛民令之則必行禁之則必止人臣安得以愛官之故而隔陛下及民之恵也或曰沈復之為秀州葢嘗以獻羨餘而進自此而得樞宻矣錢良臣之為總領葢嘗以巧聚斂而進自此而至參政矣上之人設大官以誘之故下之聚斂者奔而趨之臣竊以為不然陛下之用二臣或以其寸長或以其一能也豈以其獻羨餘巧聚斂而用之哉雖然詩不云乎人之多言亦可畏也願陛下謹其用人之端而勿啓其愛官之源庶乎斯民䝉陛下之實恵也臣故曰上有薄賦斂之君而下不受其實恵者此也臣請次言民不被深仁之說陛下邇者御殿慮囚多從末減非不欽恤又推之於京畿輔郡罔不末減非不欽恤又推之於天下郡縣罔不欽恤可謂上有省刑罰之君矣然民之不被其深仁者何也或曰京畿縣令之獄非有訟也邏者興之也左帑監官之獄亦非有訟也邏者興之也淮商鄭􅗈之獄亦非有訟也中人興之也且夫京畿縣令之罪信有罪矣恕之不可也左帑監臨之官信有罪矣恕之不可也然下無吏民之訟上無官長之劾而邏者興之則不可也天下之事惟公可以服人惟正可以治人所謂邏者豈盡公正乎哉周之監謗秦之偶語其端甚微其禍甚大皆此曹為之也宜其人之不服也至於鄭􅗈之獄其有罪無罪臣不得而知也但聞其發於中人鄧􅚜之請人已不服矣幸而陛下付之於淮西之監司方有開者鞫之果以無罪告陛下赫然震怒貶鄧􅚜之秩此齊威王烹左右者之舉也人已大服矣今又有貴戚近習曰鄭興裔者為淮西之帥再欲實鄭􅗈之罪以快中人之憤以結中人之援詔下再鞫中外􅏮􅏮也邇日復聞鄭􅗈者詣登聞而乞付廷尉矣此葢恃陛下之明而自歸於君父然今之所謂廷尉者其如張釋之乎其如徐有功乎其能不諂附中人而昭洗無罪乎中外􅏮􅏮也漢黨錮之獄唐甘露之禍皆此曹為之也可不杜其漸乎臣故曰上有省刑罰之君而下不被其深仁者此也臣請復言臺諫之情有不盡達之說臣竊見臺臣蔣繼周言及軍中鞭死二婦之事其一軍婦也其一民婦也既而又聞繼周以言事失實求罷所職使其果以軍婦為民婦是失實也然臺諫言事許以風聞此祖宗之法所以防姦雄𨼆伏不測之變也既曰風聞則豈能事事盡實也哉今也以言一事失實而遽罷臺職萬一他日有意外不測之姦欲言則無其迹不言則養其患而臺諫之臣懲於失實之罪是豈可不為寒心哉且言一軍婦而失實其罪微矣未至於罷職也罪不至於罷職而遽罷之中外相顧或曰繼周以觸天威而罷也或曰繼周以言近習而罷也或曰繼周以擊權貴而罷也是三說者初無是事也而天下不可以户曉也無是事而有是說皆非所以章陛下之聖徳而適以損聖徳非所以重天朝之國體而適以傷國體陛下受其名繼周受其榮也繼周受其榮亦繼周受其屈也陛下豈得而知之乎臣故曰臺臣為陛下之耳目而臺臣之情有不盡達者此也臣請復言監司之情有不盡聞之說臣竊見浙東監司朱熹以言台州守臣唐仲友而畀祠祿至今六年朝廷藐然不省亦廢然不用天下屈之或曰熹之經學上祖孔孟下師程顥程頤舉而用之必有可觀臣未論也或曰熹之才器大用之則應變小用之則撥煩置之散地深有可惜臣亦未論也臣獨怪熹以監司而劾郡守郡守廢而不用監司亦廢而不用以郡守為是乎猶當伸監司以養其直也不當廢監司也以監司為是乎則當廢郡守矣今也熹與仲友兩廢而兩不用臣不知此為賞耶為罰耶使仲友而無罪仲友何不請詣廷尉以辨之使熹而舉按之不實朝廷何不聲熹之罪以罰之何直為此憒憒也況於細民之寃而求白乎臣故曰監司為陛下之耳目而監司之情有不盡聞者此也由前之二說而推之則上澤之不下流者非一端由後之二說而推之則下情之不上通者非一事亦姑舉臣之所知者而已抑又有可言者臣聞能節用而後能愛人能不傷財而後能不害民故韓昭侯愛一敝袴以待有功非愛弊袴也一絲一縷皆自寒女出也小民絲粟十百之逋官捕而笞之繫之鞭血流地陛下不得而見也號呼徹天陛下不得而聞也然則財之在官者豈可妄用哉如往嵗之雪寒如邇日之火災陛下皆發帑廩以賜軍民誰不恱服者至於史浩之賜金至以千計焉夏侯恪之賜錢以買宅至以萬計焉塗之人皆曰此民之膏血也是二人者何功而得此也弱者嫉焉强者憤焉此亦召戾氣之一端也臣聞聖人擇狂夫之言且狂夫者喪心無知之人也其言果何足取而聖人擇焉者將以來天下之嘉言也側聞講筵讀貞觀政要至於太宗之導諫而恱從陛下慕焉讀陸贄奏議至於徳宗恥屈於正論陛下譏焉人誰不恃陛下之好諫而争為狂言者然自近年以來如賈偉以妄言兵將而貶自此外之小臣相戒而不敢言事矣許知新以妄引指揮而黜自此内之羣臣相戒而不敢言事矣是二事者必不出於陛下之意也而中外大惑也此亦召戾氣之一端也雖然臣前所言者皆非其大者也臣聞洪範之五事其一曰貌曰恭又曰恭作肅又曰肅時雨若葢恭肅者謙而不自盈卑而不自髙之謂也即易之天道下濟記之天氣下降之理也是以為時雨之證故堯之聖不過於允恭舜之聖不過於温恭商之中宗享國五十九年而猶嚴恭以自度衛之武公享夀百年而猶作抑之詩以自儆皆肅時雨若之理也陛下有睿聖不世之資無聲色盤游之過而又春秋寖髙享國愈久閱天下之義理愈多威徳外洽而無疆埸之虞政教内修而有屢豐之應是以大臣仰其清光而莫望敢於將順而不敢於正救臺諫知其無過之可指事於悟言而無事於拂辭是陛下有堯舜舍己從人之聖而羣臣無禹臯予違汝弼之忠臣恐陛下忽心之易生而驕心之易至也何以望肅時雨若之速應哉今日之旱天意或者以是儆陛下之心而進陛下之徳乎成湯遇旱而禱不在於以身為犧而在於六事自責之一語宣王遇旱而懼不在於靡神不舉而在於側身修行之一事臣之此言聞者以為甚迂而知之者以為甚大也惟陛下毋忽惟陛下毋忽至於備旱之急務則臣復有四說焉曰寛州縣曰核積藏曰信勸分之賞曰賞捄荒之官所謂寛州縣者非寛州縣也所以寛吾民也朝廷近時有拘催之官者是代版曹而行督責之政也此已失朝廷之體矣古者錢榖之問不至廟堂而陳平亦曰陛下問錢榖當責治粟内史葢古之治粟内史即今之版曹也版曹有司也有司峻急則朝廷或解而寛之朝廷所以統有司也有司急矣朝廷復自急焉何以解有司之急哉是上下俱行急政也民何堪焉況當旱嵗而督逋益急州縣將何出哉出於旱荒之民而已臣謂版曹逋欠之多如湖秀之類因此大旱而蠲之以非常之恩可乎拘催所逋欠之數皆有名無實無可催理之物亦因此大旱而蠲之以非常之恩可乎所謂核積藏者常平之粟是也今天下常平之粟不許他用其法至重也然有至重之法而無不用之實何也州縣窮空軍人待哺不幸而省倉無粟則不得不支常平之粟矣故常平之粟往往徒有其數耳今核之者核其盈虚多寡而朝廷預為來嵗救荒之弊不至於臨時而無所錯手足也所謂信勸分之賞者朝廷非無賞格也常患於不信而已如淳熙十一年吉州之旱守臣趙師􅋷設賞以募富民有鍾其姓者出粟萬石以輸之官州聞之朝廷至今無一級之爵今江西又告旱矣來嵗富民之粟肯從官司之勸分乎此可慮也所謂賞捄荒之官者如乾道江西之旱賞小官者四人如淳熙浙西之旱併賞常平使者擢而登朝之類是也是四說者陛下皆嘗行之矣而臣重及之者所以望陛下之力行也雖然備旱之四說抑末矣請修其本臣一介小臣䝉陛下不鄙夷其愚陋而垂清問焉臣空臆盡言不知忌諱席槀私室以待天誅校書郎兼國史院編修官羅㸃以天旱應詔上言曰今時姦䛕日甚議論凡陋無所可否則曰得體與世浮沈則曰有量衆皆黙已獨言則曰沽名衆皆濁已獨清則曰立異此風不革陛下雖欲大有為於天下未見其可也自旱暵為虐陛下禱羣祠赦有罪曾不足以感動及朝求讜言夕得甘雨天心所示昭然不誣獨不知陛下之求言果欲用之否乎如欲用之則願以所上封事反覆詳熟當者審而後行疑者咨而後決如此則治象日著而亂萌自消矣孝宗時虞允文奏西蜀草木之妖措置水旱盜賊之備疏曰臣竊惟陛下四聰之聽無逺不達四方之憂雖微不置盛徳昭升至誠黙感固足以易妖而為祥革咎而致休矣豈獨全蜀之幸天下之幸矣臣照得今年二月間成都府旁近一帶有李實如菜瓜者桃實如豆莢者杏株發葉如紫莧者棗株拆花如牡丹狀者皆木之孽也或以為應在盜賊及大水葢未幾而卭蜀盜作延及旁郡比來嘉眉瀘敘果有水菑事既小應而亟定但春中彭漢懐安三郡雨雹異常禾稼有傷雖即已依條檢放而今日之所當急者諸郡倉庾多虚未有備菑之儲臣先日具奏乞制置司度牒已分給彭漢石泉等州比又奏乞成都府路經總制司年額外餘剰錢欲於卭蜀等州並行措置和糴又下諸郡以常平司錢隨多寡之數糴義倉米以為一旦水旱不可猝辦之用而夏中積雨成都路往往漂壊隄堰臣之寸心日夜不勝皇皇今仰慿陛下格天之徳雨暘順序秋田當大熟儲積之計可遂而蜀憂寛矣其次當略修兵備日者臣與晁公武共議輙差一提舉官鄧安國前去成都府拘收本路係將不係人再行揀汰團結隊伍依大軍格法教習武藝臣亦已應副衣甲之類使聲勢稍張則盜賊自息人心亦安也自古天菑流行治世有所不免而盜賊之禍不作於有備之國臣之愚慮所以急急於此至於積逋虚額之害明知不可徴取而存之於案籍適所以長吏奸者亦已令總領所逐一開具今别劄繳進乞自睿斷施行所有苛目之當損宿弊之當去凡為民蠧者見不任講求須先經理餘財使有實効乃敢議及寛減以副陛下軫念逺方之意若守令不䖍棄法害民如卭州首亂之地臣已即按劾亦已䝉聖斷施行繼今有貪惡不悛之吏臣敢不仰遵睿訓次第以聞伏乞睿照知長沙王師愈上奏曰臣聞天人之際本無二致究觀人事則天意可卜辛巳之冬金人敗盟大舉入冦自謂談笑可以渡江未幾而天怒人怨變生肘腋竟自斃隕明年陛下誕膺景命嗣有丕圖因知卒已之役天所以眷顧陛下光咨中興延我宋萬世無疆之休葢昭昭矣而臣竊有疑者伏自陛下即位以來災異之作無嵗無之始則飛蝗蔽天災見於昆蟲可謂微矣次則敵人復敗盟淮上流血災生於夷狄亦云逺矣既而連年輔郡大水大火旱熯疾疫死徙者不知其幾其為災異也駸駸乎大且近矣又其甚者雷震於郊祀之旦禍及於骨肉之親益可懼矣竊惟陛下修己任徳未嘗少懈何上天眷顧於前而災異洊臻於後或者以謂應天之實恐有所未盡善耳不然何為而若是也昔商髙宗因升鼎之雉周宣王遭旱魃之虐皆能側身修省為商周中興之賢君以是知災異者乃天心仁愛人君之深亦人君恐懼致福之本也陛下天縱聰明逺過髙宗宣王誠能鑒其弭災之由盡其應天之實則商周中興之功不患難致也衛涇上奏曰臣觀董仲舒告漢武帝曰天人相與之際甚可畏也又曰國家將有失道之敗廼先出災害以譴告之又出怪異以警懼之尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也是知天人之際其應若響災異之變良不虚發自昔帝王未嘗無災異惟睹變思懼則災變自弭轉禍為福未聞安於時數之適然而不思所以應天者也仰惟陛下嚴恭寅畏恪謹天戒二十六年之間兢業之誠有同一日人君患不勤儉陛下宵衣旰食菲飲惡衣勤儉根於天性人君患不慈恕陛下勤恤民隠謙恭接下慈恕本於至誠宫室苑囿無所增崇狗馬珍竒無所玩好游心典籍探賾道原凡君徳之所宜有者陛下兼而全之矣每遇災眚側身修行惟恐不至陛下畏天之誠真得聖人之用心矣竊見五月以來恒暘為沴田苗就槁川澤多枯旱暵之災所及浸廣既踰秋序膏澤尚屯寛恵屢施禱祠幾徧而旱氣盤結卒未盪除雲油然而復收雨將降而輙止陛下焦勞於上百姓嗷嗷於下羣臣左右相顧駭愕莫知所為道路傳聞或云諸郡間亦得雨而畿甸之内獨爾愆期此尤足以見天心愛君之仁正陛下恐懼修省之日也借曰君徳全盡無有闕遺陛下亦安可以是自喜也成湯至聖也政之不節使人之疾苞苴之行讒夫之昌女謁之盛宫室之營宜皆所無有也而桑林之禱必舉此六事以自責葢聖人畏天之深為民之切躬自貶損寧過乎厚出於此心之誠非有所勉强不得已而然也況夫庶事之間容有未正上澤壅格而不得下究下情抑鬰而不能上通天意人心不甚相逺以人求天上下不交則為否矣變異之見非為此乎頃者都城喧傳謂陛下内出詔音求言自輔人人踴躍莫不思奮側聽旬日始命都省降㫖言事而責躬之詔尚遲回而未下陛下豈以是為虚文而所以應天者不在此耶如近日避殿減膳徹樂奏告天地宗廟社稷臣知陛下將次第而舉行之矣臣竊惟仁宗皇帝在位四十二年丕烈懿範未易殫敘求其所以致治之盛莫若盡敬天之誠信史昭垂爛然可覩慶歴四年旱謂輔臣曰方嵗旱而飛蝗滋甚百姓何罪黙禱上帝願移災於朕躬七年以久不雨避殿減膳下詔責躬求直言戒勵百官罷免輔臣以答天戒仁祖敬天為民如此其切何災不弭何福不臻太平之盛冠古莫及良有以也臣願陛下逺監成湯近法仁祖謹思天變駿發徳音布宣罪己之辭益廣直言之路陛下所以應天者至矣盡矣為陛下之臣而不能輔宣主徳實恵生民所以傷和氣而致乖異者宜如何自處也然後嚴敕大臣執政侍從以下及州縣之吏更相警懼思所以致旱之由為所以恤災之備封章來上虚心聽納庶幾下情盡達精意感通上天降康災沴銷釋天下幸甚臣充賦館職恩許言事既得面對拳拳愛君憂國之誠不能自已敢無一言先以開廣陛下之心所有政事闕失及當今急務續具條奏臣冒犯天威罪當萬死時集英殿修撰帥福建趙汝愚以地震乞降詔求言疏曰臣不量鄙陋輙有區區螻蟻之誠冒瀆天聽臣所治福州五月初九日丑時地震臣自夢中驚覺悸懼不知所以但覺所卧牀榻動蕩如船在波浪中窗户棟榱互相摩戞皆雜然有聲如是良久方定臣詢問此方父老皆言前此所未嘗有臣實憂懼因詢問得往來士大夫竊聞江浙閩廣數路皆然而本路漳州獨甚時動止經渉五日方定民居官舍頗多摧陷一時居民亦有被壓而致死者臣已行下本州委自知通多方賑救外臣竊惟坤厚載物本以安静為義今耳目所接綿亘數千里同時俱震此其為變異非小臣不敢逺引諸儒之說繁紊宸嚴姑以目前庶事論之今彊敵在外民力困窮盜賊滋多士卒貧悴有志之士無不深憂雖陛下盛徳在躬動天以實然於政事之間委任之際亦豈無可議者臣嘗讀國朝㑹要伏見景祐熙寧及太上皇帝紹興中皆嘗以地震下詔許羣臣言事豈非徇獨見之明者不如盡衆人之智方此弭災消變尤宜引咎責躬屈己從諫也若聖意勿欲張皇顯言其故則乞遵用祖宗故事祗以手詔詢問闕失或開天章閣命輔臣條畫或御迎陽門召侍從臺諫條對或令中書門下頒告在廷之臣許直言過失或宻札賜舊徳名臣詢問機事所冀誠意昭達羣議畢陳惟捨短而用長斯轉禍而為福汝愚又論客星出傳舍疏曰臣聞之知星者曰自今夏六月有客星出傳舎守之既三月矣臣謹按晉書天文志傳舎九星在華葢之上近河賓客之館主邉人入中國客星守之備姦使亦曰敵兵起臣竊惟華葢之上有傳舍又曰賓客之館若以人事參之即今掖門之外閤門客省是其處也臣聞閤門中有用事者陛下委之招接北來人士蹤跡甚祕其間真偽相雜固不可盡知然竊聞之道路之言或謂亦有姦細之人反用之為間而其人莫之寤者臣始疑之不以為信後徐以事考之然亦有可信者葢西北豪傑之士其資性與南方不同彼忠純者極其忠純其狡詐者亦極其狡詐恐非常識淺慮所能窺測故雖堕其計中而未必寤也臣又聞陛下委以將帥之權付之帷幄之任竒謀祕畫世莫得聞然而不見其形當視其影使陛下用之其人能為陛下選擇將帥訓齊士卒俾中國隠然有不㧞之勢顧雖未能勒銘燕然掃清塞北有識之士固自知其可任今數年以來將帥屢易視所居官有同客寄經營掊斂惟恐或後故軍職遷補類不以公選真才實能之士皆屈沈於下無以自見士卒嗟怨盈於道路此非陛下撫之不勤葢為之主帥者無以素服其心故爾然則緩急之際豈不深悮陛下委令之寄哉今者不幸災異屢見人情動揺誠恐一旦狂狡外興姦宄内應蕭牆之事可為深憂臣又伏思上天垂象端不虚發今昭然示戒獨出於傳舍客館之間若明告陛下於其處者葢是天心仁愛陛下誠欲陛下聖心覺寤庶幾改為猶銷鑠於未然也不然則楚莊王何以無災而致懼耶臣世受國恩義同休戚惟望朝廷所行皆善政所用皆忠臣葢決不敢肆為讒毁以陷害忠良亦非敢賣直要名争權取寵實以事關廟社理切安危故敢採諸輿議瀝陳愚欵惟陛下鑒察袁說友應詔上言曰臣今月九日恭承明詔以雷震非時淫雨為災陛下責己求言命臺諫侍從各以朕躬過失朝政闕違條疏以聞俾之無有所隠臣仰見陛下祗畏奉天恐懼修省思欲培厚聖徳講行仁政上銷天變下慰人心雖湯以六事自責宣王遇災而懼殆不過此誠宗廟社稷之休四海蒼生之幸臣叨綴從列身逢不諱之朝所願披瀝肺肝盡言無隠惟陛下財赦臣聞之書曰皇天無親惟徳是輔又曰惟天降災祥在徳又曰咸有一徳克享天心故修徳者聖王應天之實未有徳不修而能格天者也又曰天明畏自我民明威又曰天視自我民視天聽自我民聽又曰天佑下民作之君作之師故安民者聖王奉天之本未有民不安而能事天者也陛下嗣服之初閱時未久舉行初政每軫聖懐如五日一朝以隆孝治恪意講學以基逺圖收召人才愛惜内帑坐朝不倦荒政修明其於修徳安民次第而舉宜若天意人事相為助順廼者天降災異人心憂疑方當十月之交雷已歸地而震電交作大雨隨至浹三晝夜此葢陽氣弗藏隂出用事考之古占其在劉向五行傳則曰冬大雨水而雷電是陽不閉隂出渉危難其在李尋所占則曰冬靁電葢喜怒賞罰不顧時禁二人之占上係君臨下關民治其親切如此則今日之異葢必有致之者以至熒惑犯心宿弗循軌道天目峯斷裂山復移徙中夜地震都邑水災又皆廹近帝城悉非小異陛下其將隠之於心考之於事豈無有上干和氣下拂衆情者乎豈無有施置未當而徳意未孚者乎臣不敢旁舉逺引以事空言敢以陛下所當修徳而安民者摭其今可舉行凡八條伏惟聖慈垂聽焉臣所謂修徳者有四其一曰恭覩太上皇帝安處夀康已逾三月陛下定省之禮風雨弗渝孝誠之專中外歎仰而尚違膝下未浹親歡父子之意未孚軍民之情猶鬱雖陛下自知親意非外庭所得盡聞然而相見之期或更迤邐不惟浸疑觀聽亦恐别起猜端要當力圖調䕶之方宛轉之䇿陛下内有慈母可以日達誠意外有伯祖元舅可以時道聖衷庶幾委曲既深或可一旦感悟兼日來傳夀康聖體微爽節宣雖未敢信然陛下既未一見則凡慈父之意皆所未知至於夀康宫中左右執侍與凡供御百物果能日應所需否今本宫月得俸料與内帑月所貢獻者總不下數萬緡未知職掌為誰支用應副果惬太上聖意否一或不然則慈抱愈鬱無以自娛司馬光言於英宗皇帝曰嚮者皇太后聽政之時左右侍衛之人不敢不恪求須之物無敢不備既委去政柄臣竊慮有無知小人隨勢傾移侍奉懈慢供給有闕則天下之責皆歸陛下此不可不留意朝夕省察者也臣願陛下於未得一見之前尤當日戒宫中官屬等俾之加意供侍凡有聖意委曲順承惟欲上恱慈顔益保康樂少有怠堕必罰無赦則兩宫安懌親侍有期孝道無闕矣臣側聞已降指揮責以限日修整南内陛下急欲還御正朝宻侍慈極此葢孝念之切故為是圖惟是大行之喪今既在殯陛下久留重華以侍喪几今若於發引之前急還大内則是三月侍喪一朝遽捨追念皇祖情若未安况夀康今已安處倦勤而陛下又數行問安之禮若且留喪側以俟發引然後還内情既可安事亦為順其二曰臣竊觀陛下布政之初倚任大臣塞聰蔽明不以自用深得帝王用人之先務垂拱仰成之要道也仁宗皇帝嘗諭諫官韓絳曰朕固不懌自有處分所慮未中於理而有司奉行則其害己加於人故每欲先盡大臣之慮而後行之大哉聖人之謨訓也葢人主處於深宫凡人才之髙下事情之當否安得而盡知故黜己聰明任人以事以朝廷為基本以大臣為腹心進退人才廢置機務寧屈獨斷惟務循公是以黜陟廢興動合衆望其或慮權柄之下移欲威福之自已聽有偏闇慮或不周小有非宜人情必惑甚則左右乘間竊弄國權主勢浸微危亂立至稽之方册可證弗疑臣願陛下念主勢之輕重實係於朝廷而權柄之下移實由於自用上法仁皇之訓深思獨斷之難凡命由中出少留聖慮則陛下盡為君之體而朝廷無失職之憂矣其三曰臺諫者天子之耳目凡論思獻納箴規劘切而關於人主之身者則臺諫為尤重故臺諫之一進一退實係於人主取捨之公端不可以私意邇言而進退之也唐介為殿中侍御史以論事而去仁宗皇帝念之復畀舊官時論者謂天子優容言事之臣近世未有豈非臺諫者上則示人主之好惡下則係中外之觀瞻一有少差事關理亂綱紀紛糾邪正混淆誠不可忽臣願陛下念朝廷之綱紀本於言責而臺諫之用否切於治功取舍進退重之難之勿輕勿易則紀綱立而邪正分朝廷治而主勢重矣其四曰今嵗水旱為災民以饑饉淮浙諸郡無不告歉饑民流離浸以相望陛下日議賑卹捐金發粟毫髪不靳惟是朝廷樁管所積數目已少版曹經常已乏無可更蠲常平義倉支撥殆盡楮幣度牒印賣已多今去來嵗麥熟之期尚踰半嵗接續賑濟已無長策臣竊觀仁宗皇帝景祐元年以淮南嵗饑出内藏絹二十萬代充上供慶歴四年出内庫銀三萬下陜西糴榖麥以濟饑民皇祐二年以河朔水災出内庫銀四十萬紬絹六十萬以助軍儲是三者皆因嵗歉以捐内帑仁宗之意豈特以朝廷州縣之積已不足用而上軫飢荒之念葢欲急以及民故與之再三而不惜也陛下臨御以來儉以足用浮費盡蠲竊聞内帑之儲今已百倍於前中外聞之無不感歎惟是目今賑濟日月尚長所幸江西湖南皆得上熟可以運米東下以及淮浙臣願陛下念淮浙饑民之甚衆知公家事力之已窮特法仁宗故事多捐内庫金帛付之朝廷措置糴米百萬斛接續以充賑濟陛下仁心仁聞浹于億兆生靈格天之徳孰大於此臣所謂安民者有四其一曰民户嵗輸夏稅其間折錢者總曰折帛當時立價既髙州縣浸復增數積嵗既久民困重輸今中産之家已為希有況於兼并者乎比者臺臣嘗及蠲減折帛之價側聞朝廷見議施行此誠損上益下也臣不敢再述惟是丁錢一項尤切於農民葢游手末作不在科丁之數獨民不得幸免頃嵗各因守臣之請有蠲有減今所存第五等身丁丁鹽綿絹四色皆有上供與州用之數為錢則當四十一萬餘緡而上供者計一十一萬耳餘皆州郡自得支用也臣竊謂此錢既切於農民今水旱為災民方艱食田家枵腹不保朝暮若復征以官賦何止太山之壓也今若未能盡以蠲放臣願陛下深念農民饑饉之廹將來年第五等身丁并丁鹽兩色錢共四十一萬一千餘貫盡與除放其今年未足之錢且令住催上供者則户部别議對補州用者則州郡隨宜措置庶幾田家人人各受實恵足以感召和氣矣其二曰頃嵗朝廷兩下蠲減房金之令葢欲取有餘以恵不足細民受賜誠為弗輕再減之後今已八年而有力之家新剏房廊悉皆髙定賃直以備將來裁減都城新屋尤倍他州臣願陛下特降詔㫖應内外房賃已經再減之後其新造賃屋不曾經減者並照前來指揮三分減一則閭閻細民歡聲洋溢立可召和無不均受厚恩矣其三曰天下州縣稅塲雖各有定額而州郡利於贏餘嵗增其數間有租額素重趂辦實難塲務横征商旅被害貿易既艱公私俱困兩浙諸郡其害尤甚殆非細故也嘉祐六年仁宗皇帝詔三司取天下塲務舊額裁減别立新額征稅既寛商賈被恵今兩浙稅額最重而議者指為常事多不以言臣願陛下明詔兩浙轉運司㑹本路各州應干稅務之額取其所收最少年分之數别立新額明示商賈使之收趂上無厚征之數下無横取之擾庶幾商賈以寛雖居者亦受其恵矣其四曰國家刑辟之制具存三尺而近年監司郡守多有逞威棄法悉由己意刺配之罪出於臨時謂之特配畫一之法視為虚文固有黥配相望于道而以特配行者凡十五六甚亡謂也豈不重干和氣哉臣願陛下申嚴見行條法監司郡守毋得輙用特配之例須情法相當照條結録而後可施行内外臺常切覺察亦足以全民生而召和氣也臣仰惟陛下以天縱之資膺付託之重温恭允塞每以誠意為先寅畏嚴恭不敢以位為樂中外愛戴如出一辭其於畏天之威應天以實必已躬行而身履之矣然而自昔天災流行固未嘗以絶夫人也而況人主代天作子以牧斯民天之黙示儆愛之心在人主尤不可忽漢董仲舒之告武帝曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗廼至於此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之陛下試觀仲舒之言則知天之所以眷念人主者其委曲綢繆如此陛下繼統御極甫閱一時而天變甚洪昔所少見感召之自雖未易知然皇天譴告警懼之意以冀陛下自省而知變者其彰彰已如此使陛下内發於畏心外形於仁政有闕必補有善必遷忠言必聽不以切直而惡聞長策必圖不以難行而遽止修徳於己而天變自銷安民於下而天意自恱則仲舒謂天盡欲扶持而全安之者真如桴鼓之應矣臣願陛下終始惟一不替厥初凡臣之所謂修徳者日進而不已臣之所謂安民者日行而不怠則受天之祜而享鬼神之靈宗社緜長而端命于上帝殆將與天亡極矣又何災異之可言哉詩曰維此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國惟陛下深思而力行焉天下幸甚歴代名臣奏議卷三百七
