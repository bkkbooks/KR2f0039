body:
  text: 歴代名臣奏議卷三百四十三明楊士竒等撰四裔宋仁宗康定元年同知樞宻院事陳執中論西邉事宜上奏曰臣伏見元昊乗天下乆不用兵而竊發西陲以㳺兵而困勁卒用甘言而悦守臣一旦連犯亭障延安幾至不保范雍納詭詐之説失扵戒嚴劉平任輕躁之心喪其所部上下紛擾逺近駭驚自金明李士彬族破而㳂邉籬落大壊塞門至金明二百里須列修三城每城屯精卒千人招土民為弓箭手宼大至則入保城壘小至則自可驅逐每城選閤門祗候以上寨主都監别以諸司使為蘆関一路都廵檢以填士彬之闕仍以兵二千人為三寨之援使上下應接左右相顧為不可攻之勢並邉熟羌乆居漢地未嘗逃徙者委邉臣拊存之潜通賊謀反覆者破逐之至扵新附黠羌尤為難信議者欲結西域諸國為天兵之援且戎人貪而無親勝不相下恐徒耗金帛而終誤指蹤涇原康奴滅藏大蟲巉數族乆居内地常有翻覆之情更瞎氈以㳂邉廵檢彼既不孝扵父安肯納忠扵國若交兵之際與賊互出首尾則疆場之憂百倍扵前邉兵小屈皮膚之傷也民力既窮腹心之疾也凡軍需一出扵民夫運而妻供父挽而子荷道路愁歎井落空虚今復徧修城池欲如河北之制及夏須成使神運之猶未及況民力乎當四路用兵之郊列城禦寇之地騎不並轡車不方軌唯涇州鎮戍軍似少平易若不責外守而勞内營誠取笑狂童未為上䇿大役既興春種不入食竭必亡力竭必亂嘯聚千百惡黨相從小則掠道路大則攻縣鎮賊兵外擾群盜内侵臣恐宵旰之憂不在扵一方矣請且修㳂邉城池其次邉如延州之鄜同環慶之邠寜不過五七處量為營葺則科率既減民力稍蘇仍須土兵漸減騎卒盖土兵増則守禦有備騎卒減則轉餉可蠲優爵秩之科以誘兼并寛茶塩之法以邀入中静守以驕其心蓄鋭以挫其鋒更須主張将臣使横議不及則忠臣得以盡莭虎士得以忘生也慶歴三年侍讀學士歐陽脩論廷議元昊通和事上奏曰臣近有奏論今後軍國大事不須祕宻請集百官廷議近聞元昊再遣使人将至闕下和之與否決在此行竊計廟謀合思成筭臣謂此最大事也天下安危係之今公卿大夫愛君憂國者人人各為陛下深思極慮唯恐廟堂之失䇿落敵人之奸謀衆口紛紜互有論議一曰天下困矣不和則力不能支少屈就之可以紓患一曰羌夷險詐雖和而不敢罷兵則與不和元無異是空抱屈就之羞全無紓患之實一曰自屈志講和之後不過退而休息練兵訓卒以為後圗然此亦必不能者只以河朔之事可知盖敵纔和之後便忘發憤因循弛廢為患轉深縱使元昊稱臣西邉減費不弛武備不忘後圗然猶有大可憂者北敵将攬通和之事以為己功過有邀求遂興兵革是暫息小患扵関西復生大患扵河北臣忝為耳目之官見國有大事旁採外論所聞如此異同然大抵皆謂就和則難不和則易不和則害少和則害多然臣又不知朝廷之意其議云何臣見漢唐故事大事必須廷議盖以朝廷示廣大不欲自狭謀臣思公共不敢自強故舉事多臧衆心皆服伏思國家自兵興以来常祕大事初欲隱藏護惜不使人知及其處置乖違豈能掩蔽臣謂莫若採大公之議收衆善之謀待其都無所長自用廟謀固亦未晚其元昊請和事伏乞扵使人未至之前集百官廷議臣只自朝夕已来諸䖏詢訪已聞衆説如此若使並集扵廷各陳所見必有長䇿以禆萬一脩又論元昊来人不可令朝臣管伴状奏曰臣風聞朝㫖欲以殿中丞任顓管伴元昊遣来一行人等臣竊知元昊此来全無好意不肯稱臣索物太多其志不小乃是欲以強相迫脅爾朝廷既不能從則待其来人凡事不可過分至扵禮數厚薄賜與多少雖云事小不足較量然扵事體之間所係者大凡兵交之使来入大國必須窺伺将相勇怯覘察國家強弱若見朝廷威怒未息事勢未削必内憂斬戮次恐拘㽞使其偶得生歸自為大幸則我弱形未露壮論可持今若便損國威過加厚禮先為自弱長彼驕心使其知我可欺則議論愈難合矣必欲成就其事尤須鎮重為先況其議必不成可惜空損事體前次元昊来人至少朝廷只以一班行待之今来漸多遂差朝士若其後次来者漸盛則必須差近侍矣是彼轉自強我轉自弱況聞邵良佐昨来徃彼僅免屈辱而還則彼雖蕞爾不為無謀今其来人必須極騁辭辯以圗相勝若能先薄其禮以折之亦挫之一端也其元昊来人欲乞更不差人管領送置驛中不須急問至扵監視饋犒傳道語言一了事班行足矣臣料今國家若不能曲從其意即不須尊寵来人厚加禮遇元昊不免出兵攻寇逞彼忿心等是不和何必自虧事體不若急修邉備以圗勝筭脩又論西賊議和利害状奏曰臣伏自如定等到京以来竊聞朝議必欲令其稱臣然後許和乃國家大計廟堂得䇿盖由陛下至聖至明不茍目前之事能慮向去之憂斷自宸衷決定大議然數日来風聞頗有不識之人妄陳愚見不思逺患欲急就和臣雖知必不能上惑聖聦然亦慮萬一少生疑沮則必壊已成之計臣職在言責理合辨明伏自西賊請和以来衆議頗有同異多謂朝廷若許賊不稱臣則慮北敵别索中國名分此誠大患然臣猶謂縱使賊肯稱臣則北敵尚有邀功責報之患是臣與不臣皆有後害如不得已則臣而通好猶勝不臣然扵後不免也此有識之士憂國之人所以不願急和者也今若不許通和不過懼賊来寇耳且數年西兵遭賊而敗非是賊皆善戰盖由我自繆謀今如遣范仲淹處置邉防稍不失所則賊之勝負尚未可知以彼驕兵當吾整旅使我因而獲勝則善不可加但得兩不相傷亦足挫賊鋭氣縱仲淹不幸小敗亦所失不至如前後之戰是比扵通和之後别有大患則所損猶少此善筭之士見逺之人所以知不和害小而不懼未和也臣謂方今不羞屈志急欲就和者其人有五一曰不忠扵陛下者欲急和二曰無識之人欲急和三曰姦邪之人欲急和四曰疲兵懦将欲急和五曰陕西之民欲急和自用兵以来居廟堂者勞扵斡運在邉鄙者勞扵戎事若有避此勤勞為欲陛下屈莭就和而自偷目下安逸他時後患任陛下獨當此臣所謂不忠之臣欲急和者也和而偷安利在目下和後大患伏而未發此臣所謂無識之人欲急和者也自兵興以来陛下憂勤庶政今小人但欲茍和之後寛陛下以太平無事而望聖心怠事因欲進其邪佞惑亂聦明大抵古今人主憂勤小人所不願也此臣所謂姦邪之人欲急和者也屢敗之軍不知得人則勝但謂賊来常敗此臣所謂懦将疲兵欲和者也此四者皆不足聽也唯西民困乏意必望和請因宣撫使告以朝廷非不欲和而賊未遜順之意然後深戒有司寛其力役可也其餘一切小人無識之論伏望聖慈絶而不聽使大義不沮而善筭有成則社稷之福也脩又論西賊議和請以五問詰大臣状曰右臣伏見張子奭奉使賊中近已到闕風聞賊意雖肯稱臣而尚有數事邀求未審朝廷如何䖏置臣聞善料敵者必揣其情偽之實能知彼者乃可制勝負之謀今賊非難料難知但患為國計者昧扵逺見落彼姦謀茍一時之暫安召無涯之後患自為削弱助賊姦謀此左傳所謂疾首痛心賈誼所以太息慟哭者也今議賊肯和之意不過兩端而已欺罔天下者必曰賊困窘而求和稍能曉事者皆知賊權詐而可懼若賊實困窘則正宜持重以裁之若知其詐謀則豈可厚以金繒助成姦計昨如定等回但聞許與之數不過十萬今子奭所許乃二十萬仍聞賊意未已更有過求先朝與契丹通和只用三十萬一旦劉六符軰来又添二十萬今昊賊一口許二十萬到他日更来又須一二十萬使四夷窺見中國廟謀勝筭惟以金帛告人則邈川首領豈不動心一旦興兵又須三二十萬生民膏血有盡外裔貪婪無厭引之轉来何有限極今已許之失既不可追分外過求尚可抑絶見今北敵徃来尚在㳂邉市易豈可西蕃絶逺須要直至京師只用此詞自可拒止至如青塩弛禁尤不可從扵我雖所損非多在賊則為利甚博況塩者民間急用既開其禁則公私徃来姦細不分若使賊捐百萬之塩以啗邉民則數年之後皆為盜用矣凡此三事皆難允許今若只為目下茍安之計則何必愛惜盡可曲從若為社稷乆逺之謀則不止目前須思後患臣願陛下試發五問詢扵議事之臣一問西賊不因敗衂忽肯通和之意或用計困之使就和乎或其與北敵連謀而偽和乎二問既和之後邉備果有徹而寛國用乎三問北使一来與二十萬西人一去又二十萬從今更索又更與之凡廟謀為國計者止有此䇿而已乎四問既和之後能使北敵不邀功責報乎敵或一動能使天下無事乎五問元昊一議許二十萬他日保更不邀求乎他日有求能不更添乎陛下赫然以此五事問之萬一能有説焉非臣所及若其無説則天下之憂從此始矣方今急和繆議既不可追許物已多必不能減然臣竊料元昊不出三五年必更别猖獗以邀増添而将相大臣只如今日之謀定須更與添物若今日一頓盡與則他時何以添之故臣願惜今日所求其如西賊雖和所利極鮮若和而復動其患無涯此臣前後非不切言今無及矣伏望陛下留意而思之且可不與彼若實欲就和雖不許此亦可若實無和意與之適有後虞四年脩改右正言論與西賊大斤茶劄子曰臣伏覩昨者西賊来議通和朝廷許物數目不少内茶一色元計五萬斤縁中國茶法大斤小斤不同當初擬議之時朝廷謀慮不審不曽明有指定斤數竊慮西賊通和之後須要大斤若五萬斤大斤是三十萬小斤之數如此則金帛二十萬茶三十萬乃是五十萬物真宗時契丹大舉至澶州只用三十萬物三十年後乗國家用兵之費兩國交爭方添及五十萬今元昊一隅之敵一口便與五十萬物臣請畧言為國家大患一兩事不知為國計者何以䖏之三十萬斤之茶自南方水陸二三千里方至西界當今民力困乏陛下不耻屈志就和本為休民息力若嵗般輦不絶只此一物可使中國公私俱困此大患一也計元昊境土人民嵗得三十萬茶其用已足然則兩榷場捨茶之外須至别将好物博易賊中無用之物其大患二也契丹常與中國為敵國指元昊為小邦若見元昊得物之數與彼同則須更要増添何以應副不過云茶不比銀絹本是麄物則彼必須亦要十數萬大斤中國大貨利止扵茶塩而已今西賊一嵗三十萬斤北敵更要三二十萬中國豈得不困此其大患三也昨與西賊議和之初大臣急欲事就不顧國家利害唯恐許物不多及和議将成契丹語洩兩府方有悔和之色然許物已多不可追改今天幸有此一事尚可罷和臣乞陛下特召兩府大臣共議保得乆逺供給四夷中國不困則雖大斤不惜若其為患如臣所説不至妄言即乞早議定計脩又論乞不遣張子奭使元昊劄子曰臣竊聞昊賊来人議論數日全無遜順之意朝廷又欲遣張子奭復徃賊中仍聞且只在延州伺候賊意待其来迎方敢前進不知果有如此議否若實有之大為不便臣謂方今兩議未決正是各爭名分之時尤不可自虧事體元昊既見朝廷議論不合必料邉防須為凖備其偽以好辭来迎子奭使我望和而少弛然後不意以出攻子奭或被拘㽞或遭虐害以為中國萬世之辱則悔何及焉雖不如此使子奭端坐延州不来省問欲歸則又慮来迎乆待則寂然無報進退不得何耻如之盖元昊已與中國三次商量必知難合子奭之徃又别無議論未盡之事彼不求相見則扵臣二説慮有一焉臣不知朝廷以昊賊為可臣乎不可乎若有可臣則自當以重兵壓境仍選忠厚知謀之士直入賊中説令臣伏如其不可則何必遣人或但欲遷延嵗月不拒絶之則只當因如定之回賜以甘言許其厚賂諭以若能遜順則使通意邉臣俟得其實然後定議乃是未絶其来之意也不可令天子使臣待賊命而進退萬一遭其拒絶或被拘執則扵事無益空損國威為今計者不若速遣范仲淹嚴備邉境徐放如定等還當自為謀以求勝筭脩又論元昊不可稱吾祖劄子奏曰臣伏見如定等来西賊欲稱吾祖嚮聞朝議已不許之今日風聞議却未定不知虚的深切驚憂且吾祖兩字是何等語便當拒絶理在不疑安有未定之説哉夫吾者我也祖者俗所謂翁也今匹夫臣庶尚不肯妄呼人為父若欲許其稱此號則今後詔書須呼吾祖是欲使朝廷呼蕃賊為我翁矣不知何人敢開此口且蕃賊撰此名號之時故欲侮玩中國而已今若得其稱臣則此二字尤須論辨今自元昊以下名稱官號皆與我異若蕃語兀卒華言吾祖則今賊中每事自用彼法安得惟扵此號獨用華言而不稱兀卒且彼扵我稱臣而使我呼為祖扵禮非便故當以此折之可也朝廷自有西事以来處置乖方取笑扵人者多矣未有如此一事最可笑也竊慮小人妄有議論伏乞拒而勿聽脩又論孫抃不可使契丹劄子曰臣伏見差孫抃等充契丹人使臣謂朝廷新遭契丹侮慢陵辱之後必能發憤每事掛心凡在機宜合慎措置及見抃等被選乃知忘忽慮患依舊因循今西賊議和事連北敵中間屢牒邉郡来問西事了與未了今専使到彼必先問及應對之際動関利害一言茍失為患非輕豈可四人之中令抃先徃抃本蜀人語音訛謬又其為性静黙自安軍國之謀未嘗與議凡闗機事多不諳詳臣聞古者遣使最號難才不授以辭許其専對盖取其臨事而敏應卒無窮今抃既不可預教以言則将何以應卒茍一踈脱取笑四夷其孫抃欲乞不令出使或恐中書不能逆抃人情尚執前議即乞别令一人言語分明料知朝廷事者先徃貴不誤事且契丹君臣頗為強黠中國常落其計不可不知今欲雪前耻雖知未能其如後患豈可不慮伏望聖慈早令兩府别議脩知諫院又論乞放還蕃官胡繼諤劄子曰臣竊見朝廷前嵗以延州蕃官胡繼諤因為邉臣所疑移入内地見任亳州都監以子守清悉領父之諸部風聞近為不服亳州水土死亡却家族身又疾病曽有奏陳乞移一京西地凉之處臣謂方今西鄙用兵之際朝廷宜廣推恩信撫御蕃夷既欲守清盡死扵邉疆當厚遇繼諤保全其家族豈有既任其子又疑其父繼諤求遷内地其實異鄉雖曰居官乃是囚繫致其失所身病家亡況彼初心又無顯過在繼諤之身已有幽囚寃枉之嘆扵守清之分又失駕馭豪傑之方萬一繼諤疾病死而不歸守清父子之心豈得無恨反視中國乃為世讎必與邉陲别生患害其餘部族亦必離心國家自用兵以来凡有計謀未聞勝筭尤扵招撫蕃夷之術常失恩威致使離叛者多皆願附賊在扵繼諤䖏置特乖臣欲乞因其有請召至京師與雪前疑厚加禮遇放還本族示以推誠守清得父子復完必思盡莭繼諤感國家之遇必有所施若朝廷猶以為疑即乞先以此意詔問守清計其必無棄父之理若彼自不欲其歸則他日可無後患四年脩又論乞與元昊約不攻嘉勒斯賚劄子曰臣風聞魚周詢余靖孫抃等奉使北敵皆有事宜為北敵中詰問元昊通和之意将来必須因此别與朝廷生患又聞敵人已欲議移界至漸示相侵禍亂之萌其端可見臣自去年春始䝉聖恩擢在諫列便值朝廷與西賊初議和好臣當時首建不可通和之議前後具奏状劄子十餘次論列皆言不和則害少和則害多利害甚詳懇切亦至然天下之士無一人助臣言朝廷之臣無一人採臣説今和議垂就禍胎已成而韓琦自西来方言和有不便之状余靖自北至始知敵利急和之謀見事何遲雖悔無及當臣建議之際衆人方欲急和以臣一人誠難力奪衆議今韓琦余靖親見二邊事宜中外之人亦漸知通和為患臣之前説稍似可採但願大臣不執前議早肯回心則扵後悔之中尚有可為之理昨来許賊之物數已太多然尚有禁青塩還侵地等事非賊所利幸其因此自絶不遣人来朝廷深戒前非慎自持重因而罷議不落賊計則轉禍為福後䇿可為若賊志愈驕貪心未滿復遣人使更有須求則假此為名亦可拒絶今通和之事為中國之患大為二冦之利深萬一西賊貪深利而不惜侵地更無他求急来就和則此時取舍便繫安危陛下宜詔執議之臣定果決之計認賊肯和之意知我害彼利之謀尤須多方以事拒絶臣計西賊無故而請和者不止與北敵通謀共困中國兼欲詐謀欵我併力以吞嘉勒斯賚摩戬轄戬之類諸族地大力盛然後東向以攻中國耳今若未有他計拒其和則當賜以詔書言嘉勒斯賚等皆受朝廷官爵父子為國蕃臣今若講和則不得攻此數族且攻此數族是賊本心所貪聞我此言必難聽約用此為説亦可觧和臣所以區區惟願未和者盖臣愚慮知不和患輕易為䖏置和後患大不可枝梧臣前後奏章論列已備此乃天下安危大計聖心日夜所憂臣為言事之官見利害甚明若不極言罪當誅戮伏望聖慈特賜省覽脩為河北轉運使上奏曰臣伏見契丹宣徽使劉三嘏挈其愛妾兒女等七口向化南歸見在廣信軍聽候朝㫖竊慮朝廷只依常式投来人等依例約囬不納國家大患無如契丹自四五十年来智士謀臣晝思夜筭未能為朝廷出一竒䇿坐而制之今天與吾時使其上下乖離而親貴臣忽来歸我此乃陛下威徳所加祖宗社稷之福竊慮憂國之臣過有思慮以謂納之别恐引惹臣請畧陳納之却之二端利害伏望聖慈裁擇其可徃年山遇捨元昊而歸明邉臣為國存信拒而遣之元昊甘心山遇盡誅其族由是河西之人皆怒朝廷不納而痛山遇以忠而赤族吾既自絶西人歸化之路堅其事賊之心然本欲存信以懐元昊而終至叛逆幾困天下是拒而不納未足存信而反與賊堅人心此已驗之効也其後朝廷悟其失計歸罪郭勸悔已難追矣此事不逺可為鑒戒伏望陛下思之此不可拒而可納一也三嘏是契丹貴臣秉莭鉞兼宣徽可謂至親且貴矣一旦君臣離心走而歸我是彼國中大醜之事必須掩諱不使人聞必不敢明言求之扵我此其可納二也況彼来投又無追者相繼既絶蹤跡别無明驗雖欲索之扵我難以為辭此其可納三也三嘏既彼之貴臣彼國之事無不與知今既南来則彼之動静虗實我盡知之可使契丹日夕懼我攻取之不暇安敢求索扵我自起兵端若使契丹疑三嘏果在中國則三四十年之間卒無南向之患此又納之大利其可納四也彼既窮来歸我若懼而遣之使其受山遇之禍則幽燕之間四五十年来心欲南向之人盡絶其歸路而堅其事敵之心思為三嘏報仇於中國又終不能固契丹之信此為誤計其失尤多且三嘏在中國則契丹必盡疑幽燕之人是其半國離心常恐向背凡契丹南寇常藉幽燕使其盡疑幽燕之人則可無南寇之患此又可納大利五也古語曰天與不取反受其咎此不可失之機也其劉三嘏伏望速降宻㫖與富弼令就近安存津送赴闕惟乞决扵睿斷不惑羣言嘉祐二年脩又上奏曰臣伏見契丹所遣汎使専為御容而来中外之議皆謂前嵗既已許之扵理不可中止失扵不早踐言至彼非時遣使及朝夕以来傳聞頗異或云大臣共議欲遂拒而不與若然則臣恐釁隙之端自此而始禍患之起未易遽言大凡為國謀事者必先明信義審曲直酌人情量事勢四者皆得然後可以不疑茍一有未然尚恐敗事況四者俱失豈可不思契丹與中國通盟乆矣而嚮来宗真特扵信好自表慇懃别有家書繼以畫像聖朝納其来意許以報之而乃遷延至今遂欲食言而中輟是則彼以推誠結我我以不信待之失信傷義甚非中國待外裔之術而又其曲在我使彼易以為辭自南北通和以来信問徃復之際每扵報答常從優厚假借既乆其心已驕況此畵像之来特表慇懃之意是則扵平常之禮厚報以驕之慇懃之来則不報以沮之沮之彼必怒不報彼必耻懐耻畜怒何所不為此人之常情也許其父不許其子厚薄之際此亦人情之難處也臣竊見契丹来書初無寒温問候之言直以踐言孤約為説其意在於必得若此時被沮勢必更来事既再三豈能堅執若待其失扵遜順已成釁隙然後與之則重為中國之辱又使異域謂中國難以恩意交惟可以勢力脅因之引惹别有他求則為後患何可涯哉今彼主雖弱而中國邉備未完廟謀未勝未可生事而欲執我曲彼直之義以起戎而結禍夫察彼事勢必不能中止量我事勢又未能必沮之臣故曰四者俱失也臣又聞北使入境之日地震星殞變異非常先事深防猶恐不及失計招禍豈可自為臣願聖慈出扵獨斷勿沮其善意無失我信言臣今欲乞回諭敵中告以如約直候今冬因遣常使時與之則扵事體稍便伏乞速下兩府商議上繫國家利害臣不敢不言寳元二年吳育論元昊不足以臣禮責上奏曰臣聞聖人統御之䇿夷夏不同雖有荒遐之君向化賔服終待以外臣之禮羈縻勿絶而已或一有背叛来則備禦去則勿追盖異俗殊方置之度外不足以臣禮責之今元昊若止是抄掠邉隅當置而不問若已見叛状必須先行文告以詰其由若是同中國叛臣即加征討大凡兵家之勢征討者貴在神速守禦者利在持重況夏人之性唯事剽急因而偽遁多誤王師武夫氣鋭輕進貪功或陷誘詐之機今但明烽候堅壁清野以挫剽急之鋒而徐觀其勢此乃廟堂之逺筭也仁宗時契丹與元昊搆兵元昊求納欵契丹使来請勿納元昊朝廷未知所荅育為禮部郎中因上疏曰契丹受恩為日已乆不可納一叛羌失繼世兄弟之懽今二蕃自闘闘乆不觧可觀形勢乗機立功萬一過計亟納元昊臣恐契丹窺兵趙魏朝廷不得元昊毫髪之助而太行東西且有烟塵之警矣宜使人諭元昊曰契丹汝世姻一旦自絶力屈而歸我我所疑也若無他者當順契丹如故然後許汝歸欵告契丹曰已詔元昊如能投謝轅門即聽内附若猶堅拒當為討之如此則彼皆不能歸罪我矣扵是召兩制出契丹書令兩制同上對不易育議西鄙厭兵元昊請和議増嵗賜右正言余靖言景徳中契丹舉國興師直抵澶淵先帝北征渡河止捐金繒三十萬與之今元昊戰雖累勝皆由将帥輕敵易動之故數年選将練兵始知守戰之備而鋭意觧仇所予至二十六萬且戎事有機國力有限失之於始雖悔何追夫以景徳之患近在封域之内而嵗賜如彼今日之警逺在邉鄙之外而嵗賜如此若元昊使還益有所許契丹聞之寜不生心無厭之求自此始矣儻移西而備北為禍更深但思和與不和皆有後患則不必曲意俯徇以貽國羞宋祁議西人劄子曰臣伏見元昊遣使進納誓書西人在館以待荅報伏知朝廷議欲降詔遂相開納止㽞冊命未便舉行又聞余靖使回北敵謂本朝若必行元昊封冊勿令使命深入恐契丹兵馬一例殺傷又其答書有俟平定西鄙遣人来報之意此皆含糊未決之辭包姦畜怨之語也臣愚不敏不知大計竊謂機危之㑹理須審思事脱一失悔将難救且西北二冦連兵構難中國之利也方當整勒兵馬隂拱髙視候其大傷小亡乃可以逞今若便許元昊同其誓文則二國要約固已先定不待封冊方正君臣如此則元昊之貢獻必且續至朝廷之金幣亦便頒分假使北兵能勝西則契丹必歸曲朝廷以謂撫彼叛臣逆其来信負力悖慢勢必稱兵而元昊得朝廷誓詔必且取重外鄙市怨耶律肆其狡獪因為間諜得我金幣以救敗亡是乃紓賊禍扵一時嫁冦怨扵中國矣使西能勝北則二冦之怨必深契丹士力更當讎賽則朝廷却與元昊歡盟厚賂安得不動其情哉契丹之怨朝廷益深則元昊之結朝廷益固者非謂與我為金石交也彼賊藉我之賄假我之援全境激敵以誓刼我使吾邉戎束手瞪目熟視流散不得侵略然後從容觀望養成其威斯其謀也臣又料契丹積怨成仇因而遷怒未能得志扵元昊先且取償扵河北避強擊弱有何不可是朝廷免西鄙之小衂結北方之巨釁輕重之擇安得不懐且契丹言恐一例殺傷又云俟平定西鄙此何等語朝廷忽而不計邪臣伏見元昊誓書中要結天地誓及子孫言雖夸險勢亦窘急何者彼盖廹契丹之用兵畏我境之乗便略其邉寨取其老小重復詛誓務在速成必知朝廷已賜開許不肯先違信誓則彼一心捍北永無東顧之虞此賊昊之計事在目前確然可辨臣以為當今計者不如且遣彼使賜以存問詔書詰難誓文更令脩正遷延来徃以賖後期兼令雄州騰報敵帳俟其雄雌之決更議拒納之宜撫西懐北兩得其便伏望略回聖慮一賜財擇知諫院司馬光論環州事宜状曰右臣竊知環州熟户蕃部屯聚攻刼殺傷兵民雖荒遐之衆未易屈服則驕急之則叛固其常性亦由将吏恩不能懐威不能服信不能結勇不能斷平居無事則擾之使亂及其陸梁又不能制是使逺人順服王化則侵苦不安桀驁鴟張則富饒熾大凡邉境所以多事未有不由此也夫以属國小敵背誕不恭而國家不能擒討使西北二冦聞之豈不益有輕漢之心伏望陛下特詔陕西不干礙監司體量蕃部所以叛亂之因若果由将吏撫御乖方所致即乞明行誅責以謝邉民更選良将能吏有方畧者使之鎮遏分别蕃部善惡附順者撫而安之以壊散其黨悖逆者討而誅之使永乆懾服不然臣恐其日月浸深罪惡愈重自知不為朝廷所容将外連西夏内結諸部黨與益衆氣燄益大乃為朝廷旰食之憂非特尋常盗竊而已也英宗即位司馬光為殿中侍御史論夏國入吊劄子曰臣伏聞夏國所遣使人前日不肯門見固求入對朝廷不許勒歸舘舍臣愚竊以陛下繼統之初四夷之人皆欲奉望天表窺覘聖徳又聞曏曽不安意謂未能視朝所以外裔之心敢爾桀黠今若深閉固拒不聽入見則必疑有所隠避益足使之驕慢況即日陛下已御正殿臣謂何惜紫庭數歩之地使之稽首拜伏瞻仰清光庶幾得識陛下神武之姿知必能鎮服四海歸至其國轉相告語使其輕驟之衆心服氣沮不敢窺邉此所謂上兵伐謀不待戰而屈敵者也同知諫院吕誨請重造蕃部兵帳上奏曰臣聞兵家之説國雖大好戰必亡天下雖平忘戰必危此居恒之深戒也國家承平日乆自元昊納欵兵防不葺邉備皆弛臣切謂最可憂者陕西四路熟户蕃部乆失制馭将恐籬落盡隳亭障不固邉事或起必為深患昨聞保安軍蕃官胡守清身死後有弟擦也香扵前年走投夏國乞兵却来本族界上招誘自已手下人馬及扵次年春西界賊馬来攻掠胡守清地界熟户相殺經畧司亦曽差官檢驗戰場胡守清弟守中相繼走投西界保安軍累行公牒取索得守中等雖已䖏斬訖柰何人情攜貳其必有因多是蕃官侵牟或即首領酷暴良亦主管兵官失恩威制馭之然也況胡守清族下從来富庶人馬強壮鄜延倚以為固若朝廷更不為存䘏則人不安居又焉知其他蕃部不有擦也香守中之志萬一倡率皆逃邉城危矣如李金明三十餘族向時失扵存撫盡為元昊以利招誘逐部首領臨陣皆無闘意故李金明失利王師陷没至今邉人以為深痛昔四路所管熟户不下數十萬人自寳元用兵以来相繼陷没十無四五存焉復慶歴以後兵帳未嘗改造二十年間逃亡死損不可勝數忽有調發何憑㸃集足見邉臣因循積弊為日深矣況蕃部雖居漢界自来田業並是父子相承典買住佃但無徭賦此外别不霑恩唯首領薄有俸錢遇戰陣則首當前鋒計其實效勝正兵逺甚居無事之際尤宜存撫逐部族今所存者却有外来散户依附其間或是連親或即庸力混雜居䖏例各年深察其情意未有不願為漢民者是彼有鄉順之心而我失羈縻之䇿爾儻不收附兵籍徒使蕃息扵王土非但緩急不得其用而又容庇在内使徃来作過此必然之事不可不慮也臣欲乞朝廷委自四路帥臣選差有心力官員與逐䖏州縣堡寨勒本部蕃官供析見在人數未附籍者與舊管人一䖏造帳收係或逐䖏更有係官閒田盡令均匀給受候造帳了畢應舊管蕃官及蕃族首領各與轉資酬奨所貴窮邉人衆仰戴國恩樂其效用各盡死莭況蕃族首領自来給俸至薄軍主都虞侯每月不過二貫文以次等級從而可知雖遷轉一二資無所損費推是恩信結之必固兼大段添收得人數庶㡬邉防籬落漸次修葺所有胡守中等逃背因由伏乞指揮下隣路宻切體量詣實本地分主管官貟乞重行責降所貴今後邉臣撫存蕃部不敢懈慢今来因胡守中等逃背㸃檢蕃部整齊兵帳不為生事扵體甚便治平初知桂州陸詵言交州来求儂宗旦男日新及欲取温悶洞等地帝問交趾扵何年割據輔臣對曰自唐至徳中改安南都護府梁貞明中土豪曲承美専有此地韓琦曰向以黎桓叛命太宗遣将討伐不服後遣使招誘始效順交州山路嶮僻多潦霧瘴毒之氣雖得其地恐不能守也治平二年叅知政事歐陽脩論西邉可攻四事上奏曰臣伏見諒祚狂僭釁隙已多不越嵗年必為邉患臣本愚庸不逹時機輙以外料敵情内量事勢鑒徃年已驗之失思今日可用之謀雖兵不先言俟見形而應變然坐而制勝亦大計之可言謹具條陳庶裨萬一臣所謂外料敵情者諒祚世有夏州自彛興克叡以前止扵一鎮五州而已太宗皇帝時繼捧繼遷始為邉患其後遂陷靈塩盡有朔方之地盖自淳化咸平用兵十五餘年既不能剪滅遂務招懐適㑹繼遷為潘羅支所殺其子徳明乃議歸欵而我唯以恩信復其王封嵗時俸賜極扵優厚徳明既無南顧之憂而其子元昊亦壮遂併力西攻回紇拓地千餘里徳明既死地大兵強元昊遂復背叛國家自寳元慶歴以後一方用兵天下騷動國虚民弊如此數年元昊知我有厭兵之患遂復議和而國家待之恩禮又異扵前矣號為國主僅得其稱臣嵗予之物百倍徳明之時半扵契丹之數今者諒祚雖曰狂童然而習見其家世所為盖繼遷一叛而復王封元昊再叛而為國主今若又叛其志可知是其欲自比契丹抗衡中國以為鼎峙之勢爾此臣切料敵情在此也夫所謂内量事勢者盖以慶歴用兵之時視方今邉備較彼我之虚實強弱以見勝敗之形也自真宗景徳二年盟北敵扵澶淵明年始納西夏之欵遂務休兵至寳元初元昊復叛盖三十餘年上下安扵無事武備慶而不修廟堂無謀臣邉鄙無勇将将愚不識干戈兵驕不知戰陣器械朽腐城郭隳頽而元昊勇鷙桀黠之徒也其包蓄奸謀欲窺中國者累年矣而我方恬然不以為慮待其謀成兵具一日反書来上然後茫然不知所措中外震駭舉動倉惶所以用兵之初有敗而無勝也而朝廷用韓琦范仲淹等付以西事極力經營而勇夫鋭将亦因戰陣稍稍而出數年之間人謀漸得武備漸修似可枝梧矣然天下已困所以屈意忍恥復與之和此慶歴之事爾今則不然方今甲兵雖未精利不若徃年之腐朽也城壘粗嘗修緝不若徃年之隳頽也土兵藩落増添訓練不若徃年之寡弱驕怠也大小将校曽經戰陣者徃徃尚在不若徃年魏昭炳夏随之徒膏粱子弟也一二執政之臣皆當時宣力者其㽞心西事熟矣不若徃年大臣茫然不知所措者也盖徃年不知邉事之謀臣馭不識干戈之将用驕兵執朽器以當桀黠新興之徒此所以敗也方今謀臣武将城壁器械不類徃年而諒祚狂童不及元昊逺甚徃年忽而不思今又已先覺可以早為之備茍其不叛則已若其果叛未必不為中國利也臣謂可因此時雪前耻收後功但顧人謀如何爾若上憑陛下神威睿筭係纍諒祚君臣獻扵廟社此其上也其次逐狂徒扵黄河之北以復朔方故地最下盡取山界奪其險而我守之以永絶邉患此臣内量事勢謂或如此臣所謂鑒徃年已驗之所失者其小失非一不可悉數臣請言其大者夫𦍑戎變詐兵交陣合彼佯敗以為誘我我貪而追之或不虞横出而為其所邀或進陷死地而困扵束手此前日屢敗之戒今明習兵戰者亦能知之此雖小事也亦不可忽所謂大計之繆者攻守之䇿皆失爾臣視慶歴禦邉之備東起麟府西盡秦隴地長二千餘里分為路者五而分為州為軍者二十有四而軍州分為寨為堡為城者又幾二百皆須列兵而守之故吾兵雖衆不得不分所分既多不得不寡而賊之出也常舉其國衆合聚為一而来是吾兵雖多分之而寡彼衆雖寡聚之為多以彼之多擊吾之寡不得不敗也此城寨之法既不足自守矣而五路大将軍所謂戰兵者分在二十四州軍欲合而出則懼後空而無備欲各㽞守備而合其餘則數少不足以出攻此當時所以用兵累年終不能一出者以此也夫進不能出攻退不能自守是謂攻守皆無䇿者徃年已驗之失也臣所謂可用之謀者在定出攻之計爾必用先起制人之術乃可以取勝也盖列兵分地而守敵得出而撓扵其間使我處處為備常如敵至師老粮匱我勞彼逸昔周世宗以此䇿困李景扵淮南昨元昊亦用此䇿以困我之西鄙夫兵分備寡兵家之大害也其害常在我以逸待勞兵家之大利也其利常在彼所以徃年賊常得志今誠能反其事而移我所害者予敵奪敵所利者在我則我當先為出攻之計彼疲扵守禦則我亦得志凡出攻之兵勿為大舉我每一出彼必呼集而来拒彼出扵東則别出其西我歸彼散則我復出而又集我以五路之兵畨休出入使其一國之衆聚散奔走無時暫停則無不困之敵矣此臣所謂方今可用之謀也盖徃年之失在守方今之利在攻昔至道中亦嘗五路出攻矣當時将相為謀不審盖欲攻逺鄙方強之國不先以謀困之而直為一戰必取之計大舉深入所以不能成功也夫用兵難事也故謀既審矣則其發也果故能動而有成功也凡用兵之形勢有可先知者有不可先言者臣願陛下遣一重臣出而廵撫徧見諸将與熟圗之以定大計凡山川道路畨漢歩騎出入所宜可先知者悉圗上方畧其餘不可先言付之将帥使其見形應變因敵制勝至諒祚之所為宜先屈意含容而曲就之既以驕其心亦少緩其事以待吾之為備而且嚴戒五路訓兵選将利器甲蓄資粮常具軍行之計待其反書朝秦則王師暮出以駭其心而奪其氣使其枝梧不暇則勝勢在我矣徃年議者亦欲招輯横山蕃部謀取山界之地然臣謂必欲招之亦須先藉勝捷之威使其知中國之強則方肯来附也由是言之亦以出攻為利矣凡臣之言者大略如此然臣足未嘗踐邉陲目未嘗識戰陣以一儒生偏見之言誠知未可必用直以方當陛下勞心西事廣詢衆議之時思竭愚慮備芻蕘之一説耳脩又上奏曰臣近曽上言諒祚為邉患朝廷宜早圗禦備及乞遣一重臣親與邉将議定攻守大計等事至今多日未䝉降出施行臣竊見慶歴中元昊作過時朝廷輕敵翫寇無素定之謀毎遇邉奏急来則上下惶恐倉卒指揮既多不中事機所以落賊姦便敗軍殺将可為痛心今者諒祚以萬騎寇秦渭兩路焚燒數百里間掃蕩俱盡而兩路将帥不敢出一人一騎則國威固已挫矣諒祚負恩背徳如此陛下未能發兵誅討但遣使齎詔書賜之又拒而不納使者羞媿俛首懐詔而回則大國不勝其辱矣當陛下臨御之初遭此狂童威沮國辱此臣等之罪也臣謂陛下宜赫然發憤以邉事切責大臣至扵山川形勢有利有不利士卒勇怯孰可用孰不可用何䖏宜攻何䖏宜守何兵宜屯某地何将可付某兵如此等事甚多皆陛下聖慮所宜及者臣謂陛下宜因閒時御便殿召當職之臣使案圗指畫各陳所見陛下可以不下席而盡在目前然後制以神機睿畧責将相以成功而陛下以萬幾之繁既未及此兩府之臣如臣等日所進呈又皆常程公事亦未嘗聚首合謀講定大計外則四路邉臣自賊馬過後亦不聞别有擘畫臣恐上下因循又如慶歴之初矣近者韓琦曽将慶歴中議山界文字進呈此邉事百端中一端爾盖琦亦患事不講求假此文字為題目以牽合衆人之論爾自進呈後尋送宻院至今多日亦未曽擬議臣以非才陛下任之政府便是國之謀臣若其謀慮淺近所言狂妄自可黜去不疑臣亦昨因目疾懇求觧職曲䝉聖恩未許其去既使在其位又棄其言而不問使臣尸禄厚顔何以自䖏所有臣前来所上奏状欲望聖慈降付中書宻院與韓琦山界文字一䖏商量若其言果不足取棄之未晚英宗時陕西轉運副使范純仁奏乞早遣夏國封冊使臣䟽曰臣近聞朝廷許西人納欵先遣梁交齎賜詔書而封冊之使未聞進發竊以外裔之性荒忽無常惟在朝廷結以恩信今既納其善意賜以徳音則封奨之恩亦宜早下名實相副示我致誠逺人之心感恩必固不可更自稽緩益彼姦心逆詐畜疑恐貽後患又関陕自春少雨邉計未豐難扵此時與較毫末漢祖行封南粤稽首項籍刓印英雄離心況如聖朝不可不慎伏望聖慈指揮夏國封冊使臣速令進發庶得疆場早寜兵民受賜縱彼别懐狙詐固亦曲不在我但使彼國生靈先感朝廷好生之徳則其酋首自無能為治平四年神宗即位御史中丞司馬光上言横山劄子曰臣竊聞陕西邉臣有上言欲招納趙諒祚國内人户漸圗進取者臣竊惟諒祚驕僭之罪宜伏天誅為日固乆今國家新遭大憂陛下初承寳命公私困匱軍政未講恐征伐四夷之事未易輕議也況諒祚雖内懐桀驁而外存臣禮方遣使者奉表弔祭尚未還國而遽令邉臣誘納其亡叛之民臣恐未足以虧損諒祚而失王者之體多矣伏望陛下且以拊循百姓為先以征伐四夷為後速詔邉臣務敦大信勿納亡叛専謹斥候防其侵軼而已俟諒祚咎惡既熟中國兵榖有餘然後奉辭伐罪不為晚也光又論納横山非便上奏曰臣聞王者之扵外裔或懐之以徳或震之以威要在使之不犯邉境中國獲安則善矣不以踰葱嶺誅大宛絶沙漠擒頡利然後為快也竊聞有邉臣趙諒祚部将清諾爾和斯欲以横山之衆攻取諒祚歸命聖徳朝廷已有指揮許令招納臣近者雖曽論列以為非宜尚懼語言踈畧未盡本末不敢不再為陛下陳之今進謀者但言其利不言其害臣請試言其害雖逆盛意願陛下勿遽加棄置略賜省覽與進謀者叅校其是非臣聞外裔之俗自為兒童則習騎射父子兄弟相與羣䖏不專以仁義禮樂為然也而尤以便㨗勇敢相尚焉其民習扵用兵善忍饑渇能受辛苦樂闘死而耻病終此中國之民所不能為也是以聖王能自修徳固不患其相侵與之校力則未能保其必勝也以舜禹之明征三苗而三旬逆命商髙宗之賢伐鬼方而三年乃克漢髙祖之雄傑為冒頓所圍七日不火食國朝以太宗之英武北舉河東南取閩浙若拾地芥加之猛将如雲謀臣如雨天下新平民未忘戰當是之時繼遷背叛太宗以鄭文寳為陕西轉運使用其計䇿假之威權以討之十有餘年卒不能克發関中之民飛芻輓粟以饋靈州及清逺軍為敵所抄掠及經沙磧饑渇死者什七八白骨蔽野號哭滿道長老至今言之猶􅒣欷酸鼻及真宗即位㑹繼遷為潘羅支所殺真宗因洗滌其罪弔撫其孤賜莭鉞使長不毛之地訖于天聖明道四十餘年為不侵不叛之臣関中户口滋息農桑豐富由是觀之征伐之與懐柔利害易見矣及元昊背恩國家發兵調賦以供邉役関中饑渇延及四方東自海岱南踰江淮占籍之民無不蕭然苦扵科斂自其始叛以至納欵纔五年耳天下困弊至今未復仁宗屈已賜以誓誥冊為國主嵗與之物凡二十五萬豈以罪不足誅而功可賞哉計不得已也向者諒祚雖時有偃蹇禮莭不偹或誘掠熟户驚擾邉民然猶稱臣奉貢未敢顯然自絶也今乃誘其叛臣以圗之縱使誠梟諒祚之首復靈夏之土以王者之兵言之猶可耻也況其成敗未可知乎臣恐邉事之興生民之苦由此而始也王者之扵諸侯叛則討之服則撫之是以諸侯懐徳畏討莫不率從去嵗諒祚攻大順城殺掠吏民今春朝貢之使不以時至當是時不能討也今朝廷既赦其罪與其賜物受其使者納其貢獻又從而誘其叛臣激其忿心是常欲其叛而不欲其服也信義賞罰将安在乎議者或以為彼誘我民我誘彼臣何為不可是特閭閻小人之語非知國家大體者也彼僻陋小羌竊誘我民以益其衆乃欲以天子億兆之富而效其所為邪譬如鄰人竊已之財已以正議責之可也豈可復竊彼之財以相報邪臣聞諒祚隂蓄姦謀為日固乆招納不逞之人以為謀主誘脅熟户以撤中國之藩籬常有據関中窺河東之心雖未必能然若縱其横暴亦足以為亭鄣之患未可以小種之羌孱弱之人待之也國家不幸比遭大憂帑藏空虗関中之民自經西事以来仍苦鐡錢財力凋弊熟户屢經殺掠亡失太半縱其在者亦懐二心非復得如景祐寳元之時也當此際陛下深詔邉吏崇信誓保分界嚴守備明斥堠以待之猶懼諒祚包藏禍心不識恩義乗我釁隙侵噬疆埸又況彼不動而擾之不来而召之乎臣又聞夏人間諜所在甚多中國動靜豪髮皆知其和斯自程戡在鄜延時已有聲聞云欲歸降自是至今已經數年朝廷屢召邉臣與之謀議外人徃徃知之亦有邸吏傳報四方安有夏人獨不覺悟寂然無事曽無誅討之意乎臣切疑其内挟詐謀未可信也或者諒祚乆懐逆計以朝廷待之恩禮優厚無因而發故遣其部将詐降以卜之若朝廷受之則将歸曲而責直得以為背叛之名或者使其部将詐言勢孤力微不能獨制諒祚乞朝廷遣将出師為助而隂設伏兵以徼大利此二者皆未可知也若萬一有之則今日受之正堕其計中矣縱使和斯實有降心盖亦私有忿恨或别負罪惡反側不安欲倚大國之威以逼其主其所部之民未必肯盡從也雖其自言權勢之強甲兵之盛有謀善戰為民所附盖欲自誇以求售耳未必然也借令實能舉兵以與諒祚為敵戰而勝之則是滅一諒祚生一諒祚也若其不勝必引其餘衆南奔中國諒祚悉其境内之兵以追之怒氣直辭長驅入塞當是之時非口舌文移所能觧也臣恐朝廷不惟失信扵諒祚又将失信扵和斯也若和斯餘衆無幾猶可以縛而送之以緩諒祚之兵然形迹已露諒祚必叛無疑也若和斯餘衆尚多還北不可入南不受窮無所歸必不肯如山遇束手就死将突據邉城以救其命更為中國之患未有涯也陛下不見侯景之事乎臣聞羽翼未成不可以髙飛近者未悦不可以来逺上自堯舜禹湯文武之王下至齊威晉文之覇未有不先治其内而能治扵外者也故孔子曰善人教民七年亦可以即戎矣又曰以不教民戰是謂棄之今陛下新即大位尚未逾年朝廷之政未盡修也封域之中未盡治也内郡無一年之蓄左帑無累月之財民間貧困十室九空小有水旱即化為流殍承平日乆戎事不講将帥乏人士卒驕惰上下姑息有同兒􅒣教閲稍頻則愠懟怨戾賜與不時則揚言不遜被甲行數十里則喘汗不進遇鄉邑小盜則望塵奔潰此乃衆人所共知非臣敢為欺罔兵法曰知彼知已百戰不殆知彼不知已一勝一負不知彼不知己每戰必殆陛下視今天下如此而欲謀境外之事起兵革之端挑陸梁之衆冀難立之功此臣所為寒心者也為今日之計莫如收拔賢俊隨才受任以舉百職有功必賞有罪必罰以修庶政謹擇監司澄清守令以安百姓屏絶浮費沙汰冗食以實倉庫詢訪智畧察驗武勇以選将帥申明階級剪戮桀黠以立軍法料簡驍鋭罷去羸老以練士卒修整犀利變更苦窳以精器械俟百職既舉庶政既修百姓既安倉庫既實将帥既選軍法既立士卒既練器械既精然後惟陛下之所欲為復靈夏取𤓰沙平幽薊収蔚朔無不可也今八者未有其一而欲納邉吏之狂謀信降將之詭辭臣恐不能得其降者數百而敵騎大至覆軍殺将邉城晝閉朝廷乃為之宵衣旰食焦心勞思興兵運財以救其急使天下愁困如康定慶歴之時已而卒無可柰何然後忍耻以招之卑辭以諭之尊其名以悦之増其賂以来之其為損也不亦多乎斯乃國之大事安危所係非特邉境之憂而已願陛下深留聖思勿為後悔乃天下之福也彼進謀者皆非實為國家斬将搴旗拓土開境進衛霍甘陳之功也但以利口長舌虗辭大言一時誑惑聖聦欲盜陛下之官職耳他日國家有患不預其憂是豈可哉凡邉境有事則将帥遷官士卒受賞無事則上下寂寂無因徼幸此乃人臣之利非國之利陛下不可不察也歴代名臣奏議巻三百四十三
