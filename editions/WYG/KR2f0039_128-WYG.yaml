body:
  text: 歴代名臣奏議卷一百二十八明楊士竒等撰禮樂統言樂宋仁宗慶歴元年翰林學士宋祁上奏曰臣伏覩右司諫直集賢院韓𤦺奏劄子莭文謂曽將景祐廣樂記看詳備見實紀李照所造違古之樂不可以上薦天地宗廟竊聞和峴減定鍾律等見今存在欲乞特降聖旨指揮下太常寺復用舊樂者奉敕已差資政殿大學士宋綬等與兩制同共詳定聞奏伏緣臣自景祐元年中曽䝉差赴太常寺與燕肅等共磨治鐘磬後來親見李照重定律度及相次提舉胡瑗别造鐘磬臣於太常樂器粗知夲末茍有所見不容隱黙謹具畫一于後一李照所造鐘磬當時只是將太府寺布帛尺一靣定法改造比舊樂頓下四律伏縁李照資性詭僻辨論專固莫非出自私意不循古法其尺約長王朴尺二寸其斗法以六百二十黍為一龠六龠為一合自古十龠為合今頓差四合十合爲一升十升爲一㪷謂之律㪷其秤以升水之重爲一斤比今太府見用零官秤一斤零十兩十斤為一秤今太府以十六斤為秤謂之律秤又減鐘磬十六枚爲十二枚自古經史中無十二枚為一架其鐘之形狀並不依典故聲韻遥長掩遏群樂及李照自造大竽大笙亦充大樂行用皆惉懘新韻不依古制及有新降到䨇鳳管樂工吹之並不成聲李照雖自稱曉音律其實與伶官賤工識見無異遂敢敗壊祖宗以來舊樂使朝廷以不法之器薦見天地祖宗四海傳聞莫不竊議只如照所定黃鍾之管乃是南吕倍聲舊黃鍾九寸正聲却降在太蔟夾鍾之間其太蔟商聲君聲君位也今君聲降在臣位羽聲來處尊宫三年有餘於理尤害天災人事不合常禮皆不祥之大也如此數事人無愚智所共明知陛下況深達律吕可以斷自聖慮便改正應于李照曽請添損者並違經背古乞如韓琦所奏一切皆令停罷盡復祖宗舊制一太常寺舊樂本自唐昭宗時雅樂亡散噐無孑遺尋有博士商盈孫叅酌典故更造鐘聲其後五代相傳習而不改至周時王朴重定尺度略加添正太祖朝又詔和峴以景表尺重加磨治稍令聲下昨縁景祐二年燕肅始乞修正樂噐其時只得王朴律準又無王朴所定律尺律管叅騐音韻而燕肅只據律準與鐘聲按定髙下即是此太常舊樂比王朴時已自不同況和峴減定後又經眞宗朝景德中李宗諤一次修飾至燕肅凡經三度磨鑢然俱不先立尺律律管所以後來無處根正法度音律然其舊噐傳自唐宋歴祖宗三聖無人輕議用之薦享八十餘年雖非的然如舜韶周武法度明備要之沿襲夲末實與典禮最近非同李照率意詭妄製作不經今若陛下且以考舊典差近法度即乞先取景表尺裁鑄律管以案王朴律然後和峴當時所定聲律髙下確然可見況舊鐘尚有七百餘枚係夲寺收管畧加磨鑢令與聲律相協所有舊磬為李照定樂時盡底界截破壊無見存者若且將李照所定石磬自太蔟以下刻磨長短亦與舊樂黄鍾以下髴相近及將本寺磬朴二百餘片相兼添補亦可諧合音律與鐘粗得三架即可於將來南郊大禮前一時了畢不過數月便可見功其餘絲竹諸噐只是移正聲調便成雅樂況禮樂之夲出自天子今陛下天縱睿聖通知音律復古順道何所致疑伏乞即下有司速令修復以旌善述之美一景祐三年詔令臣監領胡瑗鑄造鐘磬一架臣伏見胡瑗曉筭法能將先儒所說黄鍾管内八百一十分為方分筭法並與鄭康成周禮注及班固律歴志古法相合自隋唐以來諸儒辨論黄鍾一龠之法皆不及瑗相次於雜物庫請銅鑄之時忽於雜銅内得古鐘三枚即不知甚年及是何州縣納到臣與故翰林侍讀學士馮元即時騐認其鐘古質精妙項鎛皆有亷隅上有三十六乳餘外瑑雲氣為飾有兩欒之制如鈴不圓正與周禮所說形制相符一鐘破損二鐘尚可叩擊遂子細洗滌於鐘上有篆文兩行其亦字體古簡推夲其文不是近代所造乃是漢魏間所用者其文曰越作朕皇祖文考寳和鐘越思萬年子子孫孫永保用享凡二十二字臣與馮元商量此既古器又合經典除三十六乳與鄭康成說小異康成以為鐘毎面三十六乳即一鐘合七十二乳遂畫圖子進呈後一面勒令胡瑗悉依古鐘形狀製造新鐘成一十六枚其胡瑗所定律尺律管比王朴鐘只下半律鐘磬甚得諧韵其時不曽許當靣進呈遂只送太常寺收係即目見在後來又䝉别差官詳定李照胡瑗等律尺管其時議者皆云胡瑗實龠之黍或有小大不同以為未盡合古遂抑而不行至杓八百一十分之法則盡以為然無有非者臣以為胡瑗之尺黍雖有長短大小之差未盡合古然比舊樂又近法度如更使諸儒畧加論討庶可施行而合雅正矣臣又竊謂陛下用心詳定雅樂之日獲此古鐘乃是瑞應因此若便定律尺律管使諸儒極意論難從其長者定為尺法然後作鐘石以聲之有何不可而前來議者固執李照不法之噐以為此樂已經郊祀天地不可輕改更候有知音者然後改之且祖宗舊樂相傳八十餘年經真宗東封西祀一旦李照狂妄率然敗壊却無輕改之憚今欲依據經典裁正律度反以為更俟知音假如今世遂無知音則是李照不經之噐便傳後代取笑千載此亦陛下昭然可判議者之大謬也臣以為陛下既自明律度不須更以知音為言夫知音自古難得非獨今也若世無夔牙則且當以法自據雖有清濁髙下其失不逺故臣願陛下只將胡瑗八百一十方分之法詔取上黨秬黍擇其中者差一二精力宦官及左右一二信臣於宫中重加校定陛下因以餘暇親臨制决黍定求寸寸定求尺尺定則律度量衡四物皆正矣然後依古法將新尺試以推歩晷景若合此一不謬也試以新管埋地候氣氣候若應此二不謬也然後可以遂班天下明告以律度量衡之法因之修定雅樂詔當今稍知音律經術者同加討論事無不濟然此一事雖非朝夕急政陛下能以萬幾之暇慮而定之亦千載不刋之羙也其有先獲古鐘恐禁中忘記當時進呈圖様今再畫到一夲随状進呈右具如前臣以儒史為業合為文辭敷啓又緣臣乆在病假既不獲乞上殿面奏今來事渉辯論不敢修飾文語貴要暢盡事理是敢直說夲末祁乞減編磬事奏曰准中書送下監鑄編鐘所李照狀為乞減編鐘十六為十二事狀後批奉聖㫖送修撰樂書馮某等詳定聞奏者右臣竊以作樂制噐取象非一夲乎律吕播為音均用在極和要歸協雅而短長清濁還相損益諸儒駕說各自名家擾據經師資為辨博較其實至孰有定論昔伶倫命律初無配𩔖后夔典樂唯取克諧䆒理益深後人致惑原聖人立藥之意豈獨執於一方金石設縣屢易其數目鎛縣十二以至編縣二十四葢八音之噐因物制宜歴代相沿遂多創述若絃聲一以至於五十律聲一倍以至於三倍或減半以為得或備數而無害變均度典應和為經工師常員雅鄭無辨不足以備問對擊考之度第循其故獨何曉於是非周朝樞宻使王朴嘗造準以考聲律太常竇儼和峴亦經參校論者以為尺度太短雅聲過髙自此少能知音莫傳其業今止以照素識音律使校定大樂照又調合鐘齊務要和聲察其用心良亦精宻且又請改編鐘十二以為與律數而足但學者多所未閒習周官或乃失傳下議以詢博求至當況禮樂之大典方太平而後備若並采衆說則有㑹禮聚訟之煩若遽更古法則有事不師古之戒臣考視圖載皆有趣義願聖上覽其意而定焉祁論引武舞所執九器各有所用奏曰臣案武舞六十四人左執干右執戚離為八列又别使工人執旌居前次執鼗次執鐸次執錞次執鐃次執相在左次執雅在右各分行夾引至樂作舞入則自鼗而下咸振作之舞工定位而止及舞將退又振作之舞工畢出而止臣竊詳鼗鐸之設義不虚生葢舊史禮經但舉其凡不言其細故輩作旅進無有先後且鼗者所謂導舞也鐸者所謂通鼓也錞者所謂和鼓也鐃者所謂止鼓也相者所謂輔樂也雅者所謂陔歩也夫錞于鐃鐸在周鼓人四金之奏以和軍旅也武舞象功故得以軍器參焉是舞之容節導於鼗通於鐸和於錞止於鐃輔於相陔於雅義可見矣寧有導舞方始止鼓參焉止鼓既揺通鐸亂焉進退不倫終始無别臣雖不習故事竊以私意處之謂當舞入之時鼗鐸以先之錞以和之相以輔之雅以節之及舞之將成也則鳴鐃以進行列築雅以陔歩武各分左右與舞俱出其鼗鐸錞相皆止而不作故司馬職曰鳴鐃且卻斯之謂矣如此則允協樂意庻復舊職祁乞别撰郊廟歌曲明述祖宗積累之業奏曰歌詩之興尚矣自陶虞而上書逸其傳商頌槩有存者而周詩大備竊聞班固之論也以為商周雅頌上夲有娀姜嫄降鳦履敏而卨稷始生𤣥王公劉古公太伯王季姜女太姒作合之德乃洎成湯文武受命武丁成康宣王中興下及輔佐伊尹周召太公申伯召虎山甫之属靡不褒揚既信羙矣聲始歌詠而施及金石洋洋渢渢遂盈塞乎天地之間使後世子孫有以祖述稱頌而攄之無極也孤秦亂剡禮亡樂缺逮漢六世始立樂府采詩夜誦多舉司馬相如之属造為詩賦畧論律吕以合八音之調然其郊廟歌詩未有祖宗之事又不制雅樂有以相變盛德之音寖以失章史官追憤深詆其非南北覇雜音謡哀怒儷篇促節以雕蔚相矜唐家累盛頗憲前烈詔禮於野綴樂於旒然至郊廟詠歌亦止一時之事麗不逮鄭王不入雅累句庸音商周之風衰焉安巢挺亂正聲兼失或入河海或淪坑谷宋興承五運末流繼千載紹業受命之始日不暇給故未遑協律之事而樂正禮官又非夙儒故老制作之懿乆無聞焉雖薦侑大禮别製辭曲然皆襲沿舊體未始改為遂使祖宗耿光盛烈幽伏槁簡天命靡昭以為神羞而武穆文孫春秋助祭但習容典不知王業之艱難誠可畏也臣朴野蒭㣲不逮故實竊惟太祖武皇帝推閏位膺正統撥亂侮亡以黜不端東纓呉馘右攘蜀壘大去荆讎燮伐蕃酋士無離傷邦用底定罷諸道節度以絶僭萌收天下精兵以強京服太宗文皇帝鋪敦武旅遂定并汾分遣良吏綏靖萬國斂才懋官内經百度平租射藉以賙四人貶成譲德卒罷封禪肆我真宗紹休聖功於時匈奴穿塞侮畧邉郡一戎啓行射殪名酋六驘遁去厥角請罪然而不念細故許其歡盟休寧北方於今是頼而又進妙道廸靈篇柴奉髙濟汾河景光瑞福葳蕤翕習臣所不能盡道商之𤼵祥周之監觀方兹蔑矣然而清廟詠歌但紀寅恭淳濯之細不推積德累功之夲千品萬官靡所寄言故臣願陛下萬幾之餘取三聖實錄摭其武功文德在民耳目尤祥極瑞非人力所至者鋪棻發揚作為歌詩别詔近侍畧依生民公劉猗那長發之比裁属頌聲使被金石尚體要而去浮麗根中和而矯淺誣使言質而易曉理懿而行逺俾天下昭然知祖宗造邦濟世之勤子孫無滿假怠遑之志臣下有祖述奉揚之美超唐軼漢遂躋三代寧不盛耶祁論太樂署雷鼓靈鼓路鼓備而不擊及無三鼗奏曰臣案周大司樂之職雷鼓雷鼗奏於圜丘以祀天也靈鼓靈鼗奏於方丘以祀地也路鼔路鼗奏於宗廟以格祖也歴代用焉著為樂令然則小鼓為大鼓先引得作樂之漸故兩施無嫌也國朝崇薦郊廟但各設鼓於樂縣之内備而不擊夫有鼓無鼗於禮已闕設而不用在闕尤甚葢上襲五代杌敝失傳有司持循罔暇論討臣以為可詔夲署稽舊典訪遺法作為三鼗以備大樂祭天之際其鼓若鼗皆使縣工播而擊之用諧音節如此則器備禮完神祇來格矣舊說鼗者如鼓而小以木貫中作柄雷鼗柄各四枚為八靣靈鼗柄各三枚為六靣路鼗柄各二枚為四面旁以結皮為耳揺之還自擊也以通雷鼓靈鼓路鼓掌鼓之工毎靣一人左手播鼗右手擊鼓云祁論大樂署有舂牘之名而無舂牘之噐奏曰臣觀景德中李宗諤所進樂纂革部中著舂牘其說曰周禮笙師掌教舂牘應雅以作裓樂賔醉而出奏裓夏以三器築地為之節三噐謂牘及應雅也明不失禮也大五寸長七尺短者或三尺其端有空漆畫之以兩手築地今並於宫縣舞樂中用臣比徧問樂工言初無此噐及責其樂噐之籍則明著舂牘而說與樂纂相符又景德樂工於今多在詰其所以乃云恐宗諤論著之時止慿夲署簿文誤著於樂纂耳臣謹采三禮圖所畫舂牘之状大畧可曉然檢覈著令及舊史其文武二舞諸工所用但有鼗鐸錞鐃相雅干戚籥翟等噐不著舂牘則知後人誤采古名以為空說矣祁論竽及巢笙和笙奏曰臣奉詔與太常臣燕肅等圖畫太常樂噐以備呈覽至匏部有竽及巢笙和笙共種案舊說竽長四尺二寸三十六簧宫管在中形参差像鳯翼巢笙十九簧和笙十三簧今据大樂諸工以竽巢和三種併為一噐皆取胡部十七管笙為之但以宫管移徙左右用為小異其巢和二笙在景德中李宗諤又奏定二義管悉貫匏中今為十九管臣曽索於樂署得鳯笙一種樂工言此古噐今不可用推驗形製乃古竽也其長四尺有餘三十六管列管參差及曲頸皆為鳯飾其空悉在管外歲乆不治有管無簧今但秘而存之為無用之噐臣以為可募知音者修復古竽以合正聲革易當今署工所用淺俗惉懘之噐勿令亂雅并案竽以合正聲革應舊製𫝊曰放鄭聲謂此物也祁論精選太常樂工及募能知音者備太常官属奏曰昔虞舜命后夔典樂教胄子其言曰詩言志歌永言聲依永律和聲夔亦曰於予擊石拊石百獸率舞自周以上胄子出於公卿聲工皆有明徳其為樂可以道古其為舞可以動容故能來格祖考而同和天地道衰官失政移諸侯制度陵僭音曲縵靡然且晉有師曠魯有師乙判南北之風執商齊之宜援古騐今若符合節其後士人則漢有京房魏有杜夔晉有荀勗隋有鄭鐸唐有張文成祖孝孫雖未能考正中聲以盡善美其推夲律吕有足稱道自梁訖周尋亂不厭猶使王朴竇儼緒求墜韻裒合遺噐累黍定尺造準寫聲求七均叩五音以成八十四調儼又著大周正樂一百二十篇雖廣而不要雜而無𩔖苖莠相敗雅鄭同儕然禮失而求野或有可采而宋興達者尚未聞焉臣謂古之所以為工者皆精敏之人後之所以為工者皆輿廝之賤古之所以總司者材堪則任後之所以總司者官達則遷樂不逮古責於何有比來諸工尤為淆混或坐區賈子或力穡農人茍避乎丁咸求著籍未識所習況責所聞族居州處兀如墻靣雖誨以六樂教以二南亦不能諧神祇和邦國矣朝家丕纂謨烈咸事俊良必不借才無容慙徳顧求之任之未至耳且一日失官尚及於死三年廢樂曽何不壊古有其人則樂舉無其人則樂息昔周官盡在武坐且或失傳漢準具存律家莫能取定又況年禩綿曠噐用淪亡賢者恥而不精鄙夫濫以安處而望樂正雅頌奚由致哉臣願陛下明下詔書且募天下知音之人秩以㣲祿使備太常官属賖其嵗限漫使討論擇其所長以備􅇅典又按舊令太常諸工取年十八以下姿情可教者使滿定員明立章條以判勤惰如此則不過十稔官修事備以須陛下功成作樂矣嘉祐元年知諫院范鎮上奏曰臣伏見國家自廢祖宗舊樂用新樂以來及今四五年日食星變冬雷秋雹風雨不時寒暑不節不和之氣莫甚於此者使樂無所感動則已樂而有所感動則衆異之至未必不由此也去年十二月晦大雨雪大風宫架輒壊元日大朝㑹樂作而陛下疾作臣恐天意以為陛下不應變祖宗舊樂而輕用新樂也不然何以方樂作之時而陛下疾作天意警陛下之深自初議樂時臣嘗論新樂非是其間畫一一通最為詳悉今再具進呈乞下執政大臣參詳臣畫有如可采伏乞且用祖宗舊樂以竢異時别加制作鎮又奏曰臣近奏國家自用新樂以來風雨不節災異衆多乞且用祖宗時舊樂已䝉下兩制及䑓諫官參詳及今兩月未聞奏上伏緣逐時祠祀及九月㳟謝皆所施用不可淹乆不決竊惟衆樂之和以律與金石為夲故律之法曰凡律圍九分凡律者言十二律也故黄鍾徑三分圍九分長九十分積實八百一十分自九十分三分損益之而十二律長短相形矣自八百一十分三分損益之而十二律積實相通矣凡律圍九分則然今黄鍾大吕太蔟夾鍾姑洗仲吕蕤賔林鍾八律皆􅈳三分四釐六毫圍十分三釐八毫夷則南吕二律徑三分圍九分無射徑二分八釐圍八分四釐應鍾徑二分六釐五毫圍七分九釐五毫十二律圍徑不同則積實損益不通外之長短有損益而内之積實無損益此律之法非是也古之鐘有大小則容受有輕重故實黄鍾之重二鈞容二千龠自二千龠二鈞三分損益之而十二鐘大小輕重容受殊矣今之十二鐘一以黄鍾為率而無容受輕重大小之别又古之鐘皆圜制而側繫之所以出其聲也而今之鐘皆褊制又平繫之故其聲鬰而不出古鐘亦有平繫者然空其柄以出其聲然亦非周之制也周禮䟽云應律之鐘状如今之鈴不圜故有兩角謂鐃也按鈴之状夲圜妥其兩角以為鐘故云如鈴而不圜今以褊為不圜以似鐸為如鈴所以聲鬱而不發此鐘之法非是也古之磬以一律為之博二律為之股三律為之鼓謂十二磬各以其律之長短為法也今之十二磬皆以黄鍾為律博九寸股一尺八寸鼓二尺七寸而無長短之别此磬之法非是也律與金石之法非是樂所以不和也乞令筭官考校十二律積實分損益之數并臣今状下兩制及䑓諫官一處參詳所貴易為曉正四年翰林學士王珪上言曰昔之作樂以五聲播於八音調和諧合而與治道通先王用於天地宗廟社稷事于山川鬼神使鳥獸盡感況於人乎然則樂雖盛而音虧未知其所以為樂也今郊廟升歌之樂有金石絲竹匏土革而無木音夫所謂柷敔者聖人用以著樂之始終顧豈容有缺耶且樂莫隆於韶書曰戞擊是柷敔之用既云下而撃鼗知鳴球與柷敔之在堂故傳曰堂上堂下各有柷敔也今陛下躬祠明堂宜詔有司考樂之失而合八音之和於是下禮官議而堂上始置柷敔仁宗時張方平上雅樂論曰臣聞人函隂陽五行之氣有喜怒哀樂之情心術所形随感而動動而無節則必有滛佚詐偽之心勃亂暴慢之事是以聖人立禮以文其外作樂以理其中發於詠歌律吕播於金石管絃調雅正之聲導生氣之和全其天理起其善心而不使邪氣僻情得接焉古之天子諸侯卿大夫無故不徹樂士無故不去琴瑟弦歌雅頌之音洋洋乎流于族黨鄉州之中民共聞之莫不油然有易直子諒之心慈愛肅荘之意是以天下和恱禮義有序故曰移風易俗莫善於樂謂其感人之深也教化治世之要必夲於禮樂焉及自周衰王道䘮敗禮壊樂散諸侯各溺所好國異其俗而鄭衛燕趙秦齊楚越淫過凶嫚傲僻促數之聲作斷棄先王之樂用變亂正聲秦漢已還承習備用魏晉南北兵􅍔煩多雜之以巴呉揉之以胡羯耳目熒潰心志驕放古者所以興理後世更用致亂焉其雅聲金奏雖世議完補然登歌下管既非賔饗所用崇牙樹羽徒為備物之設惟於郊廟擊拊成禮而已間者伏聞朝廷招集諸生考正雅樂葢國家深惟治夲修起頽廢上以尊宗廟下以美風俗者也臣愚鄙不達樂意竊思有以仰賛盛事少裨景化者臣聞昔在帝舜命夔典樂教胄子周官大司樂掌成均之學政至於師胥瞽矇皆用有道徳通教化者世其官業通其精義故能用之祭享而神鬼格施之朝廷而君臣正展之律吕而隂陽和作之庠序而萬民協漢氏敘得人之盛而協律在乎儒雅質直之列又漢制卑者之子不得舞宗廟之酎取二千石至關内侯適子方為舞者歴代而下樂府令丞多用士人臣伏見太常樂工率皆市井閭閻屠販末𩔖猥惡汙濁雜居里巷國有大事輒集而教之禮畢随散則其藝安得而精䙝慢三靈誣黷典禮豈人君䖍奉天地祖宗之意乎今夫執技以事上者歴象則有司天之監醫藥則有翰林之署其琴弈書畫一藝之㣲者莫不厚賦廪稍間䝉好賜聫翩美位朱紫垂章者亞肩于朝其太樂諸工真古者大夫士之職也所習者先王所以風化天下交接天人之具用則天子齋戒被法服儀典咸具而後設之是其於邦國之禮誠重矣而乃蓄養之至薄習𨽻之至簡曽不得齒乎醫卜雜藝之末以霑一命之榮是以人望太常之門徑趨而過矣又何暇一傾耳乎鐘磬之音者歟今幸得朝廷興起古道較定鐘石臣謂宜特立太樂署畧依司天監為之官次秩序補用知鍾律之士以充其選擇衣冠之後或設為官廕若漢太常弟子為立選限如太廟齋郎室長之制領属太常使專𨽻習焉以奉郊廟之饗以盡孝恭之誠其天下有學校庠序之所使得備金石之樂春秋釋奠行射鄉之禮則奏焉以風示天下化民廣教則庶乎神人接洽上下恭順正四氣之和奮至徳之光民知鄉方而人倫清矣謹論蔡襄乞用新樂於郊廟劄子曰臣伏覩朝旨南郊且用舊樂令兩制禮院詳定聞奏臣竊以五代多故大樂淪亡至王朴竇儼始加詳造太祖皇帝毎謂雅樂聲高近於哀思不合中和因詔和峴討論以影表尺比王朴所定尺加四分遂造十二律管校其聲下朴所定樂一律當時雖詔許施行然未甞制作樂器至今所用皆王朴舊物伏惟陛下紹隆祖考精意禮樂博延天下儒者尋繹經義設司制作垂二十年其費鉅萬然周禮史記漢書雖有舊說施於制器自已不合廼者兩制諸儒參議約古制減下一律其功甫就陛下親御便坐按閱侍臣畢與觀聽工作精好聲律和暢陛下審慎再令詳定臣竊謂今來皇祐累黍尺與影表尺同不異古制一也減下一律歌者協聲近於中和二也上符太祖皇帝減下一律之㫖三也前來諸儒或有異論只於形制小大與緣飾之文時有異同至於聲律夲無他說四也以四者之眀騐故可用而無疑也臣聞聖人制禮作樂皆因時垂法必以考周舊典以求古樂自秦漢以来其說已亾況其形制聲律豈能盡傳幸今所存者畧可依倣雖不能盡及於古比之今樂器精而聲和若施之郊廟肄於朝㑹亦一時之盛事臣見前代諸儒議事未始一定多亦制決今南郊甫近若衆論一有未合則屏而不設是陛下二十年精求之心一旦又復捨去必天降秬黍然後定尺此空論也伏望聖斷特許施行英宗時張方平請郊祀用新樂事䟽曰臣前承宣召崇政殿觀新樂近又聞聖㫖以將來南郊且用舊樂令兩制詳定伏以後周律本王朴竇儼之所考正朴旣人傑儼亦通儒制作所傳必貫精義按朴䟽云自秦而下旋宫聲廢自漢至隋垂十代凡數百年所存者黄鍾之宫一調而已十二律中惟用七聲其餘五律謂之啞鐘唐太宗用祖孝孫張文收考定雅樂而旋宫八十四調復見於時唐末之亂二器都盡購募不獲文記亦亡集官詳酌終不知其制度梁及後唐晉漢缺壊尤甚至于十二鎛鐘不復通其音律輒循環而擊之編鐘編磬具儀而已絲竹匏土僅有七聲雖黄鍾之宫一調亦不和備其餘八十三調於是泯絶世宗臨視鐘虡患雅聲淪替乃命竇儼考詳八音粗加和㑹以朴通於律歴宣示古今樂錄令加討論朴遂依周法以秬黍定尺作律準十三絃分尺寸設柱以準十二管之聲十二聲中旋用七聲為均旋宫之聲乆絶由朴而復出遂命太常按習國初因之後太祖以雅樂聲商近於哀思不合中和因詔和峴審詳其理峴言王朴黍尺較西京銅望臬古制石尺短四分樂聲之髙良由於此乃詔依古法創新尺并黄鍾九寸管令工人品校其聲果下於王朴所定管一律遂重造十二管取聲自此雅音和暢景徳中御史上言太常樂器多損音律不調先皇命李宗鍔考較課習既而親臨閱之亦先以律準定鐘石自是樂府寖有制度陛下自景祐已來講求樂事於時李照輩各率所見議論不經製作乖方尋亦廢罷聖心深惟治夲以禮樂為大事故孜孜訪逮必欲盡其精要考音制噐葢已詳備在周王朴雖造律準畧定八音爾時世宗方經畧四方用干戈征伐日不暇給葢但編次舊噐考擊粗諧㑹而已藝祖詔和峴重定律尺亦未嘗有所改造也今陛下既合衆議新作金石試之廣廷聲律又協此乃藝祖之遺意先皇之逺懐夫又何疑成而不用夫樂夲於人心成聲於物聲既和而反感於人心者也先王以是交人神變風俗其用大矣然歴代之審音者常鮮其人又聲音之妙非淺學所及應於耳而通於心然後能達其精㣲之致儒生學者按文泥古跼於形噐制度之間而不能知律吕夲於自然之道音官藝人記其搏拊節奏之序而不能知教化之原臣徃年嘗䝉宣示樂府要畧竊以䝉昧妄為注解即知聖心之於樂律通達夲於天縱也外廷諸臣不足以仰望清光預制作之議今郊祀日近乞令太常勒工人按肄新噐使益精習用之禮天地薦祖宗以伸陛下之孝誠則積年之勤亦不虚設無煩過事謙損以稽盛節神宗元豐二年太常禮院主簿楊傑上言大樂七事一曰歌不永言聲不依詠律不和聲謹按虞書曰詩言志歌永言聲依詠律和聲八音克諧無相奪倫神人以和葢歌以永詩之言五聲以依歌之詠陽律隂吕以和其聲金石絲竹匏土革木八音克諧無相奪倫然後神人以和也若夫歌不永言聲不依詠律不和聲八音不諧而更相奪則神人安得和哉且金聲舂容失之則重石聲温潤失之則輕土聲函胡失之則下竹聲清越失之則高絲聲纎㣲失之則細革聲隆大失之則洪匏聲叢聚失之則長木聲無餘失之則短惟人禀中和之氣而有中和之聲足以權量八音使無重輕高下洪細長短之失故古者升歌貴人聲八音律吕皆以人聲歌為度以一聲歌一言言雖永不可以逾其聲如大善曲肅肅藝祖一句以仲南黄仲四聲歌之聲律最為和協今夫歌者或詠一言而濫及數律如正安曲至誠感神一字兼夷黄四聲或章句己闋而樂聲未終如正安曲已終尚有黄無夷夾大五聲之𩔖兹所謂歌不永言也伏請節裁煩聲以一聲歌一言遵用永言之法且詩言人志詠以為歌五聲随歌故曰依詠律吕協奏故曰和聲先儒云依人音而制樂託樂器以寫音樂夲效人非人效樂此之謂也今祭祀樂章並随月律聲不依詠以詠依聲律不和聲以聲和律非古制也伏請詳定大樂以歌為夲律必和聲也二曰八音不諧鐘磬簫􅇅四清聲事謹按虞書曰簫韶九成鳯凰來儀葢虞樂之成以簫為主也商頌曰既和且平依我磬聲葢商樂和平以磬為依也周官鐘師掌金奏凡樂事以鐘鼓奏九夏葢周樂合奏以金為首也是鐘磬簫者衆樂之所宗為聖帝明王之所貴數十有六其所由來尚矣漢得古磬十六於犍為郡鄭氏注周禮編鐘編磬及大周正樂三禮圖編鐘編磬簫並以十六為數示天子之樂用八鐘磬簫倍之以為十六矣且十二者律之夲聲也四者律之應聲也夲聲重濁應聲輕清夲聲為君父應聲為臣子故其四聲或曰清聲又曰子聲也自景祐中李照議樂以來鐘磬簫始不用四聲是有夲而無應有倡而無和者四十餘年矣八音何從而諧耶今巢笙其管皆十有九以十二管發律吕之夲聲以七管為律吕之應聲用之已乆而聲至和協伏請參考古制依巢笙例用編鐘編磬簫之四子聲以諧八音三曰金石奪倫事謹按大司樂文之以五聲播之以八音八音雖異其所以應律則一也故樂奏一聲諸噐皆以其聲應也既不可以不及又不可以有餘八音克諧無相奪倫此之謂也今大樂之作琴瑟塤箎笛簫笙阮筝筑奏一聲則鎛鐘特磬編鐘編磬連擊三聲戾於衆樂中聲最煩數而掩壓衆噐求其所謂無相奪倫不亦難哉伏請詳定大樂其鎛鐘特磬編鐘編磬並依衆噐節奏不可連擊三聲所貴八音無相奪倫四曰舞不象成謹按樂記曰夫樂象成者也揔干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也又曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子是大武之舞六成象周徳之成矣國朝以謙徳受禪郊廟之樂先奏文舞次奏武舞其於武舞也容節六變一變象六師初舉所向宜北矣二變象上黨克平所向宜北矣三變象維揚底定所向宜東南矣四變象荆湖來歸所向宜南矣五變象卭蜀納款所向宜西矣六變象兵還振旅所向宜北而南矣今夫舞者非止發揚蹈厲進退俯仰不稱成功盛徳差失其所向而又文舞容節殊無法度故曰舞不象成也伏乞參考樂記象成之文詳定二舞容節及改正所向以稱成功盛徳五曰樂失節奏謹按孔子語魯太師曰樂其可知也始作翕如也縱之純如也皦如也繹如也以成始作翕如也始作翕然如衆羽之合縱之純如也節奏明白皦如也繹如也其緒之不窮也夫然後成今大樂之作聲不齊一節奏混殽徃來無叙曷聞所謂翕如純如皦如繹如者乎伏請稽考孔子之言詳定大樂節奏六曰祭祀享無分樂之序謹按大司樂乃分樂而序之以祭以享以祀乃奏黄鍾歌大呂舞雲門以祀天神乃奏太蔟歌應鐘舞咸池以祭地示乃奏姑洗歌南呂舞大磬以祀四望乃奏蕤賔歌林鍾舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖夫金石衆作之謂奏詠以人聲之謂歌陽律必奏隂吕必歌隂陽之合也順隂陽之合所以交神明致精意也今冬至祀天不歌大吕夏至祭地不奏太蔟春享祖廟不奏無射秋享后廟不歌小吕既不能奏律歌吕順隂陽之合以格上神而又無專祀四望山川用樂之制則何以賛導宣發隂陽之氣而生成萬物哉故曰祭祀享無分樂之序也伏請依周禮分樂之序以奉祠事七曰鄭聲亂雅謹按孔子曰惡紫之奪朱惡鄭聲之亂雅樂然朱紫有色而易别雅鄭無象而難知聖人懼其難知也故定律吕中正之音以示萬世揚雄曰中正則雅多哇則鄭又曰黃鍾以生之中正以平之確乎鄭衛不能入也今雅樂古器非不存也太常律吕非不備也而學士大夫置而不講考擊奏作委之賤工如之何不使雅鄭之雜耶伏請審調太常鍾琯依典禮用十二律還宫均法令上下曉知十二律音則鄭聲無由亂於雅也今著大樂十二均圖一卷備載律吕宫調又各取夲宫樂章一首附於篇以圖考聲則雅鄭昭然别矣傑上堂上鐘磬議曰准中書劄子節文詳定郊廟禮文所詳定伏請毎遇親祠宗廟歌者在堂更不兼設鐘磬宫架在庭更不兼設琴瑟匏竹更不寘之於牀其郊壇上下之樂亦乞依此正之有司攝之准此謹按虞書曰戞擊鳴球搏拊琴瑟以詠此有虞堂上之樂也下管鼗鼓合止柷敔笙鏞以間簫韶九成擊石拊石此有虞堂下之樂也正義曰球為玉磬商頌云依我磬聲亦玉磬也大射禮鐘磬在庭今鳴球於廟堂之上者按郊特牲云歌者在上貴人聲也左傳曰歌鐘二肆則堂上有鐘明磬亦在堂上故漢魏以來登歌皆有鐘磬燕禮無鐘磬者諸侯樂不備也是知堂上象朝廷之治堂下象萬物之治堂上堂下八音各備而互見之不可􅇅也又按禮曰升歌清廟詩曰清廟祀文王此有周堂上之歌也大司樂路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣此有周廟中降神之樂也降神之樂既有獻之琴瑟則宫架内琴瑟不可去矣所有祀郊及有司攝事伏乞壇殿之上依舊設鐘磬其宫架下降神之樂亦乞依舊設琴瑟其匏竹不寘於牀即乞依禮文所奏請傑奏請太廟殿上鐘磬状曰右臣伏聞聲音之道與政通堂上之樂所以象宗廟朝廷之治堂下之樂所以象萬物之治堂上堂下用樂雖殊八音克諧各不可􅇅其實一也今太廟之樂堂下具八音萬物之治可謂周矣堂上之樂則􅇅鐘磬在宗廟朝廷之治八音有所未備焉臣職在禮樂不敢不言謹按禮曰鐘聲鏗鏗以立號詩曰既和且平依我磬聲是知樂之號令自鐘聲而立樂之和平依乎磬聲則鐘磬安可􅇅哉臣昨䝉睿旨提轄修製朝㑹殿上玉磬曾於去年具奏乞依虞書戞擊鳴球之義候玉磬成日先用之於太廟殿上以稱陛下稽古奉先之志尋䝉付外未奉朝㫖施行今雖玉磬未成伏遇春陽發生之時太廟孟享之日欲乞出自聖斷依古復用殿上鐘磬所貴發揚至音號令衆樂以格祖考以致和平上自朝廷下及萬物咸被福祐臣不勝大願三年秘書監致仕劉几等上奏曰臣等伏見太常大樂鐘磬凡三等王朴樂一也李照樂二也胡瑗阮逸樂三也王朴之樂其聲太髙此太祖皇帝所嘗言不俟論而後明仁宗景祐中命李照定樂乃下律法以取黄鍾之聲是時人習舊聽疑其太重李照之樂由是不用至皇祐中胡瑗阮逸再定大樂比王朴樂㣲下而聲律相近及鑄大鐘成或譏其聲弇鬱因亦不用於是郊廟依舊用王朴樂樂工等自陳若用王朴樂鐘磬即清聲難依如改製下律鐘磬清聲乃可用益騐王朴鐘磬太髙難盡用矣今以三等鐘磬參校其聲則王朴阮逸樂之黄鐘正與李照樂之太蔟相當王朴阮逸之樂編鐘編磬各十六雖有四清聲而實差黄鍾大吕之正聲也李照之樂編鐘磬各十二雖有黄鍾大吕而全􅇅四清聲非古制也聖人作樂以紀中和之聲所以導中和之氣清不可太高重不可太下使八音協諧歌者從容而能永其和乃中和之謂也臣等因精擇李照編鐘編磬十二參於律者増以王朴無射應鍾及黄鍾大吕清聲以為黄鍾大吕太簇夾鍾之四清聲俾衆樂随之歌工兼清聲以詠之其聲清不太髙重不太下中和之聲可以考矣欲請下王朴樂二律以定中和之聲就太常鐘磬擇其可用者用之其不可修者則定從而别制神宗時大司樂劉昺上言曰五行之氣有生有克四時之禁不可不頒示天下盛徳在木角聲乃作得羽而生以徴為相若用商則刑用宫則戰故春禁宫商盛徳在火徴聲乃作得角而生以宫為相若用羽則刑用商則戰故夏禁商羽盛徳在土宫聲乃作得徴而生以商為相若用角則刑用羽則戰故季夏土王宜禁角羽盛徳在金商聲乃作得宫而生以羽為相若用徴則刑用角則戰故秋禁徴角盛徳在水羽聲乃作得商而生以角為相若用宫則刑用徴則戰故冬禁宫徴此三代之所共行月令所載深切著明者也作樂夲以導和用失其宜則反傷和氣夫淫哇殽雜干犯四時之氣乆矣陛下親灑宸翰發為詔㫖淫哇之聲轉為雅正四時之禁亦在所頒則協氣粹美繹如以成詔令大晟府置圖頒降侍御史陳㐮上䟽曰臣謹看詳古者先王用樂皆有上下之節焉虞書曰戞擊鳴球搏拊琴瑟以詠注舜廟堂之樂也曰下管鼗鼓合止柷敔注堂下樂也曰笙鏞以間注間迭也謂二者迭奏也曰簫韶九成注簫見細噐之備備樂九奏而致鳯凰言其樂之盛也周之樂其節亦有四焉曰升歌曰下管曰間歌曰合樂儀禮燕禮鄉射禮有工歌鹿鳴笙入奏南陔間歌魚麗笙由庚合鄉樂闗雎鵲巢皆三終是也大射禮則有升歌下管而無間歌合樂鄉射禮則有合樂而無升歌下管間歌用於射而其樂故畧也燕禮鄉飲禮四節備者主於君臣之㑹賔客之交故其樂備鄉飲酒禮曰合樂於周禮曰大合樂者天子諸侯禮故有間矣曰大者又加備爾王者以樂致鬼神示宜其以六律五聲八音六舞合而奏之無所遺也故樂之序歌者在上琴瑟和之貴人聲也吹者在下金石次之貴人氣也工歌作而後匏竹興匏竹興而後播鼓鼗擊鐘磬以應之故曰禮交動乎上樂交應乎下和之至也今者升歌堂上乃設編鐘編磬二於前楹以亂人聲匏竹列於堂下而歌者乃坐於鐘磬之間失上下之序矣皇帝升降祼鬯受嘏則止用登歌而宫架不作迎神送神沃盥復位酌獻有司薦爼則止用宫架而工不登歌又皆戾於古矣周禮樂師教樂儀行以肆夏注為人君行歩以肆夏為節又鐘師凡樂事以鐘鼓奏九夏釋者云鐘中得奏九夏謂堂上歌堂下以鐘鼓應之也周禮内宰注薦徹之禮當與樂相應孔頴達云天子薦時歌清廟及徹歌雍明薦徹皆用升歌而已餘樂不作也若迎神之樂則周禮大司樂以黄鍾為宫大吕為角太蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九韶之舞其奏九變及分樂而序之以享先祖則奏無射歌夾鍾舞大武文之以五聲播之以八音是也伏請宗廟之樂皇帝升降沃盥祼鬯酌醴受嘏復位凡行歩之節並升歌堂上而下以鐘鼓應之如奏肆夏之儀有司薦徹則惟用升歌而已其迎神之樂九變宫用鐘歌興安之歌舞文徳之舞猶大司樂九徳之歌九磬之舞和之以琴瑟播之以鼓鼗送神亦如之送神樂雖不經見義可倣此如今制一成可也若三獻之禮則奏無射歌夾鍾舞文舞其樂皆一成猶周舞大武惟薦腥之後則偹上下之奏陳功徳之舞如太祖太宗文武之舞並作諸帝止奏文舞其樂六成庶合乎舜之簫韶周之大合樂也哲宗時殿中侍御史吕陶奏乞不用教伶官為舞郎䟽曰臣聞樂以象徳舞以明功前古尚矣三代之盛憲章繁縟載在傳記可得而詳其屈伸俯仰之容疾徐進退之節皆所以發揮當世之勲烈而昭示無窮也恭惟夲朝制作文典大備而天地宗廟之祀所用八佾尚以教坊伶人為舞郎非極盡䖍敬之義臣愚伏望特詔禮官博士講求漢唐以來典故裁量其宜定舞郎之制勿以教坊伶人濫充其數徽宗崇寧七年三月議禮局言先王之制舞有小大文舞之大用羽籥文舞之小則有羽無籥謂之羽舞武舞之大用干戚武舞之小則有干無戚謂之干舞武舞又有戈舞焉而戈不用於大舞近世武舞以戈配干未嘗用戚乞武舞以戚配干置戈不用庶協古制又言伶州鳩曰大鈞有鎛無鐘鳴其細也細鈞有鐘無鎛昭其大也然則鐘大器也鎛小鐘也以宫商為鈞則謂之大鈞其聲大故用鎛以鳴其細而不用鐘以角徴羽為鈞則謂之小鈞其聲細故用鐘以昭其大而不用鎛然後細大不踰聲應相保和平出焉是鎛鐘兩噐其用不同故周人各立其官後世之鎛鐘非特不分大小又混為一噐復於樂架編鐘編磬之外設鎛鐘十二配十二辰皆非是葢鎛鐘猶之特磬與編鐘編磬相須為用者也編鐘編磬其陽聲六以應律吕既應十二辰矣復為鎛鐘十二以配之則於義重複乞宫架樂去十二鎛鐘止設一大鐘為鐘一小鐘為鎛一大磬為特磬以為衆聲所依詔可八年八月宣和殿大學士蔡攸言九月二日皇帝躬祀明堂合用大樂按樂書正聲得正氣則用之中聲得中氣則用之自八月二十八日已得秋分中氣大饗之日當用中聲樂今看詳古之神瞽考中聲以定律中聲謂黄鍾也黄鍾即中聲非别有一中氣之中聲也考閱前古初無中正兩樂若以一黄鍾為正聲又以一黄鍾為中聲則黄鍾君聲不當有二況帝指起律均法一定大吕居黄鍾之次隂吕也臣聲也今減黄鍾三分則入大吕律矣易其名為黄鍾中聲不唯紛更帝律又以隂吕臣聲僭竊黄鍾之名若依樂書正聲得正氣則用之中聲得中氣則用之是冬至祀天夏至祭地常不用正聲而用中聲也以黄鍾為正聲易大吕為中聲之黄鍾是帝律所起黄鍾常不用而大吕常用也抑陽扶隂退律進吕為害斯大無甚於此今來宗祀明堂緣八月中氣未過而用中聲樂南吕為宫則夲律正聲皆不得預欲乞廢中聲之樂一遵帝律止用正聲協和天人刋正訛謬著於樂書詔可徽宗時李復上議樂䟽曰臣聞治定制禮功成作樂此王者甚盛之舉天下熈洽人心恱豫發為和聲因其人聲之和而播之八音又形容其成功之象也三王不相沿樂豈茍為異哉治世成功各不同也記曰大樂與天地同和樂豈易知乎三代之樂亡已乆矣唐貞觀中命祖孝孫張文收考定雅正粗而未備後累經䘮亂其噐與書今皆不𫝊載籍所言雖皆以黄鍾為夲上生下生隔八相生及其律管徑寸短長但糟粕耳有能遺其舊說脫然識其聲别其音者未之聞也夫黄鍾律之始也半之清聲也倍之緩聲也三分其一而損益之此相生之聲也十二變而復黄鍾之總乃相旋為宫之法也萬物動皆有聲若造樂精㣲之妙凡聞其聲則知是何音合何律是為正音是為變音是為清是為濁如此方為知音可以議樂矣近者陛下有詔選官定樂又博求前代之噐夫前代之噐各一時之用若得漢唐之噐乃漢唐之樂也若得魏晉之噐乃魏晉之樂也且欲求為多見則可矣遽以用為今日夲朝之樂恐未然也晉之荀朂取牛鐸為黄鍾出於獨見果合於古乎樂之作欲動天地感鬼神自漢以還未之聞也朝廷昔嘗定樂矣陛下以謂未盡美善亦不能形容祖宗之功業而又夲朝運膺火德獨祉音未明此固當重為考定也今聞衆議又只依徃昔糟粕而製噐此安足以副陛下所降之詔意夫知音者聞之於耳得之於心自不能𫝊之言遇其應於心方可黙契祉音火南方之音也火性炎上音當象之乃欲就其下而抑之恐非也臣願詔天下廣求天性自能知音者敦遣令赴議樂所多方以試之是誠不謬共為講論庶㡬其可矣若徒以舊說尺寸長短廣狹重輕而製噐此工匠皆能為之矣何足以為樂乎臣愚見如此惟陛下擇之髙宗時布衣韓駒上䟽曰樂壊乆矣昔漢有制氏者獨能紀其鏗鏘而已是時去周未㡬而士大夫已制氏之不如然尚有一宿工以𫝊先王噐自是先王之器匿不復見士不得聞鏗鏘況能識其義乎既不能識其義又何知其成也且自先王之時民已不勝其自欲媮放之心然自淫其聲者矣未有亂其器者也其為淫聲葢亦由乎筦磬琴瑟之中出焉尚且有禁後世乃始増為弹筝擊缶吹竽擿鼓之戲始亂樂之器矣其萌芽時或自閭里或自夷狄至其寖弊則邦國亦用焉又其為器愈陋而愈工愈工而愈濫斯民之不復古意在斯乎永言前載毎用憤歎豈圖今日親逢韶濩之作夫其目厭乎陋噐耳􅍄乎哇聲驟而示之正樂廣大怡愉髙明博備固已茫乎若一㳺虞庭而入闕里也昔之記者以為牙曠之属能使鳥魚下上始徒以為虚語乃今騐其然耳矧今之樂夲明天子自興神物以為之制豈但牙曠之所為哉士雖耳剽目淺比之鳥魚亦靈甚矣玩而習之将必有成於樂者顧非愚之所能也雖然攝衣勾指受業君子之塗亦得議其畧矣夫子有言知之不如好之好之不如樂之孟子亦言樂則生生則烏可已古之樂其器朴其聲簡文侯以之而坐寐而仲尼以之輟肉者意必有朴而文簡而㣲者焉士與乎此則其精㣲獨得於心見於外者不過手舞足蹈而已其妙萬物之學豈可紙上語哉此明天子之所造也㡬於成矣然猶未也夫以顔子之賢必不惑於鄭聲而夫子使之放懼其易以惑也士安得人人如顔子然而入宫則聞正樂出宫則聞哇聲其能成也希矣其能成而乆又愈希矣要使邱井田野賔婚禱祀率用是樂向之陋器一埽蕩之則士無所易惑得以養心盡性而極於道徐出其學為聖時之用無不可者愚終不足以與此秘書正字張孝祥乞更定太常樂章劄子曰臣恭惟陛下飭躬齋精祇見郊廟靡愛圭幣懐柔百神獨聲詩之薦未稱明徳伏觀太常所奏樂章第其篇叙則有詳畧之不同稽之文義則或違牾而弗協三嵗之親祠四時之常祀率用此也而習􅍄所𫝊有司弗議臣甚懼焉恭惟真宗仁宗寔始親製薦饗樂章所以申景鑠宣至和假三靈之驩者炳然與日星較著而當時輔臣翰苑奉詔而作者亦皆依末光垂典冊雅頌所編不足進也臣愚欲望聖慈深詔邇臣取凡太常樂章更定篇次標别部分具以奏御陛下萬幾之暇用列聖故事擇宗廟郊禖親祠所用駿發睿思肆筆而成其餘分命大臣與兩制儒館之士一新撰述裒為成書下之太常以俟來嵗郊見奏焉庶㡬中興追繼韶勺施之無窮金章宗明昌五年詔用唐宋故事置所講議禮樂有司謂雅樂自周漢以來止存大法魏晉而後更造律度訖無定論至後周保定中得古玉斗于地中以造尺律其後牛𢎞以為不可止用蘓綽鐡尺至隋亦用之唐興因隋樂不改黄巢之亂樂縣散失太常博士殷盈孫亦以周法鑄鎛鐘編鐘處士蕭承訓等校石罄合而奏之至周顯徳以黍定律議者謂比唐樂髙五律宋初亦用王朴所制樂時和峴以周顯徳律音近哀思乃作西京銅望臬石尺重造十二管取聲下王朴一律景祐初李照取黍累尺成律以其聲猶髙更用太府布帛尺遂下太常樂三律皇祐中阮逸胡瑗改造上下一律或謂其聲弇欝不和依舊用王朴樂元豐間楊傑參用李照鐘磬加四清聲下王朴樂二律以為新樂元祐間范鎮又造新律下李照樂一律而未用至崇寧間魏漢津以范鎮知舊樂之髙無法以下之乃以時君指節為尺其所造鐘磬即今所用樂是也然以王朴所制聲髙屢命改作李照以太府尺制律人習舊聽疑於太重其後范鎮等論樂復用李照所用太府尺即周隋所用鐡尺牛𢎞等以謂近古合宜者也今最見有樂以唐初開元錢校其分寸亦同則漢津所用指尺殆與周隋唐所用之尺同矣漢津用李照范鎮之說而耻同之故用時君指節為尺使衆人不敢輕議其尺雖為詭說其制乃與古同而清濁髙下皆適中非出於法數之外私意妄為者也葢今之鐘磬雖崇寧之所製亦周隋唐之樂也閱今所用樂律聲調和平無太髙太下之失可以乆用唯辰鐘辰磬自昔數缺宜補辰鐘十五辰磬二十一通舊各為二十四簴上曰嘗觀宋人論樂以為律主於人聲不當泥於其噐要之在聲和而已右統言樂歴代名臣奏議卷一百二十八
