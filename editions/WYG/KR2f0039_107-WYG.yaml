body:
  text: 歴代名臣奏議卷一百七明楊士竒等撰仁民宋徽宗時左正言任伯雨上奏曰臣訪聞永泰陵工役人兵入夏以来天氣向熱漸因疾疫多致死亡竊慮聚衆之所難得醫藥臣伏聞仁祖朝嘗因河北疾疫遣使頒藥諸郡又嘗以湖南蠻猺未平而兵久留戍令醫官院定方和藥遣使給之祖宗愛民之意雖逺不忘而況近在京洛事干泰陵自今以後數月之間暑熱有加工役未已欲望陛下時遣中使頒賜藥餌卹其勞苦問其飲食如此則人情欣恱沴氣必消赴功之人樂於盡力亦可以見陛下致厚於泰陵之意如以臣言為然只乞作聖意訪聞指揮施行陳瓘乞遣使陕西河北河東京西奉行優恤徳音奏狀曰臣伏覩七月初八日徳音應河北京西路被水人户如可以優恤事件令安撫轉運提㸃刑獄提舉司疾速條具奏聞臣竊謂朝廷恩宥徧及天下惟此兩路偏䝉優恤之恵者以逐路有水灾故也今陜西河東自用兵之後加以凶歉公私匱竭人物凋弊甚於水災而徳音優恤之文不及陜西河東臣竊以為不可至如條具優恤事件委之安撫監司此亦文具而已朝廷實恵未必及民也盖安撫監司被受悳音下於諸州州達於縣備禮施行循例報應文移往復動渉時月迨於條具奏聞而優恤之民已填溝壑久矣朝廷優恤之意非不急也而州縣行遣之叙悠悠如此豈非文具而已乎夫持文具以為優恤之政而欲使被災之民得復其所兹固難矣又況天下諸道三路為重均有耗傷而止恤其一未可以為平也臣謂平恤諸路莫如專遣兩使一往河北京西一往陜西河東如治平熙寧故事以安撫察訪為名以陛下初政作朝廷施恵之意達于諸道民之飢饉流亡愁苦疲怨之狀皆得以實入告自帥臣監司而下慰其勞苦而劾其欺繆事有方急而宜緩法有未便而當改者皆得專達至於講究邊防熟圗利害事或干於機宻而非詔之所能該者皆令面禀聖訓而奉行之如此則根本之地均被悳澤人心感恱可召和氣以廣陛下前日所以特降徳音之意謹録奏聞貼黄神考嘗謂近臣曰昨来西師兵夫死傷者不下二十萬有司失入死罪其責不輕今無罪置數十萬人於死朝廷不得不任其咎紹聖邊事兵夫死傷之數倍増於昔今日朝廷安可以不任其咎雖頻推恩恵尚未足以慰陜西河東之民豈可置此兩路而獨恤河北京西乎仁宗時河北路都轉運按察使歐陽修言轉運使専掌金榖而不與兵戎之事然向被朝廷宻㫖令熟圗本路利害隂為邊備今㳂邊知州武臣不過使副通判乃常叅初入京官並得盡聞機事而臣之本司獨不得與臣非欲侵擾邊臣之權盖調用軍儲須量邊事之緩急以至按察將吏亦當知處事之當否請自今許本司與聞機事仁宗從之臣謂承平已久北人可防熟圗本路利害隂為邊備有備無患正今日所當留意也若遣使河北則此事可以委之仁宗時樞宻副使吳奎言邊防武備宜選經畫之士向雖有言者而採擇迷惑朝廷一時處置而未暇講求今兵事已息正當審圗所宜以為永久之計仁宗曰邊事正當以暇時講究乃詔凡所當議者著為條目面奏而行之臣謂朝廷幸於無事因循玩寇數十年矣今雖閒暇正是講究邊防之時也有備無患所宜留意若遣使河北願以此委之也臣所謂事有方急而宜緩者謂解池之役也法有未便而當改者謂鈔法之𩔖也朝廷屢遣官相度修復解州鹽池迨今累年未有成績訪聞孟明橋東張陽濼西興工開河日役夫二萬餘人又自雲鄉縣界東至沙池三十餘里凡二十料合用三十四萬餘人役一月畢方陜西用兵之後復於本路興此大役有思慮者皆知其不可也只此事自合遣使相度盖聞本路近年以来鹽鈔之法極弊物價日増財用彌窘邊計所仰惟在解池勢未可以遽罷此役若先議鈔法今本路諸司分占嵗額鹽鈔各於鈔面元價之外自取贏餘與民爭利積日既久鈔價倍増商賈難通邊儲匱闕若嚴禁諸司占留鈔依舊只依鈔面召人入中見錢粮草如此則商賈復行邊計有備而解池之役因可少緩利害纎悉難以只憑本路諸司之言必須遣使就彼詢究然後可得利害之實也兼通行河北滄鹽經制鐵錢利害皆所謂法有未便而當改者安可以不遣使乎欽宗靖康元年宣教郎臣張九幹上書曰臣聞立政造事而不明乎治亂之原者未足以定天下書曰天佑下民作之君作之師又曰衆非元后何戴后非衆罔與守邦民惟邦本本固邦寧徳惟善政政在養民孔丘曰百姓不足君孰與足孟軻曰無君子莫治野人無野人莫養君子臣嘗叅聖人之言然後知有國家者其安危存亡未始不繫乎民也廼者陛下即位之初敵騎長驅直抵城闕非常變故起自倉卒間本其馴致之禍夫豈一朝一夕所致哉向使海内富實邊用給饒甲兵餉糧種種備設則敵騎何由而南牧也臣請為陛下歴陳之臣竊考祖宗創業之艱難積累之深厚規摹之宏逺垂二百年其防患甚深詒謀甚逺實過於三代中間不幸亂天下者始於王安石成於蔡京頽波末流乃有王黼輩此萬世不易之論也當安石初變舊章時如韓𤦺富弼司馬光之徒力争新法以謂其患必在五十年後顧不驗哉且自宣和間論之王黼之用事也方臘作叛於東南腹心之地福建江淮數路受弊曽不旋踵開拓燕雲調發免夫錢流毒遍於天下遂使盜起山東河朔而桑麻之沃野黍稷之膏腴先鞠為戰場矣外域之窺中原良有以也禍胎釁端誠不在外域今陛下欲靖四方一時之患莫先於征伐而征伐之謀屢奪於割地之議臣以是知未有為陛下思所以致寇而求自固於本本元無者譬猶常人失於衞生平日尫弱乃嬰四時不正之氣疾證在隂非艾闗元不足以起死然則陛下今日烏可不以邦本為急先務亟發善政以涵養天下哉舉所為善政之能博施濟衆者無出於臣所論積欠推割支移折變等弊家至日見之也又況陛下恭儉之徳聞於東宫者十年天下之人所以望於陛下甚厚當布惟新之令與天下更始用休息于斯民憲章祖宗再造區夏以成中興之業若不力去積欠推割支移折變等弊雖數赦無補也何則珠玉金貝雖曰可寳適飢寒之用則不若五榖布帛故稼穡織絍是為農功臣抑嘗見朝廷財賦大計責之省寺而省寺責之部使者部使者責之州縣而州縣責之里正始能辦事是一日不可無野人也百姓果可使有不足哉陛下誠能聽臣下其所奏俾二三大臣叅酌利害窮研隠瘼著為成書觀於乙夜出寛大之詔施厖鴻之澤不與常法同科徳意丁寧母怠母忽天下之幸也臣抑又聞帝徳廣運乃聖乃神乃武乃文奄有四海為天下君恭惟陛下躬聖神武文之資君臨天下必也運四海於胷中俾恢然有餘地無使一夫不被其仁勿以金人之入方且用兵語及此則未遑暇是孟軻所謂不揣其本而齊其末者也臣願陛下蚤夜以思負荷宗廟社稷之重適丁多事之秋非綏萬邦屢豐年恐亦未足以敉寧禍亂保守三鎮則臣之䇿初若迂闊而足食足兵或有取焉幸陛下留神斷而行之冒黷冕旒臣無任昧死拜手稽首謹言許翰乞加恩死事者疏曰臣伏見畿甸戎馬以来戰士僵仆居民流亡今兵既解所宜矜恤陛下聖慈哀痛元元比已詔降度牒召人掩骼埋胔然猶道塗暴露久未盡藏恐傷士卒之鬭心亦損天地之和氣春晴薫蒸化為癘疫昔漢髙祖下令軍士不幸死者吏為衣衾棺斂四方歸心焉此髙祖所以取天下之道也不可不察又近累有雍丘尉氏等縣詣臺訴免和糴方戎馬蹂踐之餘復軍須饋運之後十室九空未有生理而官司遽復督責使之頭㑹箕斂非所以固邦本也矧惟畿邑拱衞都城祖宗加厚以待緩急今不鎮撫使之重困將散之四方則都城孤危臣愚願詔官司選忠良吏令分按田野掩瘞遺骸又願陛下齊心垂哀於清穆之中勅中外寺觀為死事者祈福所在厚恤其家以勸忠義之節於方来戒漕司非具見錢不得和糴於民勞来安集使之復業以昭太平之象而正再造之基左司諌陳公輔論致太平在得民心疏曰臣比縁奏對特䝉聖慈諭臣親自擢用之意令臣協心助成太平臣皇恐感激臣誠何人獲聞此語臣固當展盡底藴以補報萬分之一然臣自媿學術智識皆不逮人但有樸忠而已惟陛下憐之臣嘗詢諸朝士大夫皆謂今日國家兵革之患未除太平之治誠未易致也然以臣觀之所以勝敵人者必在於治中國所以治中國者必在於得民心陛下無以臣言為迂闊而不切於治也孟子嘗曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣然則民心烏可失哉臣嘗原先王所以得民心者無他莫先乎有徳而已盖易感者羣心難忘者盛徳惟聖人躬行於上者既有感民之盛徳故百姓欣戴於下者斯有愛上之誠心非特如此因所欲而與之因所惡而去之皆所以得民之心者也是故善政者民之所欲也虐政者民之所惡也君子者民之所欲也小人者民之所惡也善政行之虐政除之君子用焉小人去焉此因所欲而與之因所惡而去之民心其有不得哉臣不敢逺引前古請以今日觀之陛下養徳東宫十有餘年恭儉出於天性聰明本乎生知愛民之誠未占有孚動民之行不言而應盛徳之至固足以感民心矣及乎一旦即位遂取其政之善者畧施行之政之虐者畧除去之忠良之君子以次召用奸惡之小人以次竄殛於是天下翕然莫不仰戴聖朝如重隂蔽天初見赫日如大暑執熱初濯清風豈有不得其心者故雖金人之兵圍逼京師㡬四十日而都城百姓咸願固守無一人有離心四方援兵不日皆集無一士有叛志以至於州縣之間人情帖然盜賊不敢乗間而起此何以致其然哉實有以得民之心而已陛下誠能效大禹之克勤體文王之節儉至誠以行之不倦以終之檢身不及從諫如流孜孜圗治日謹一日則其徳愈盛而不替矣民心焉徃而不歸哉然後與宰執大臣相與講明求其善政盡舉行之凡所謂虐政蠧國害民者除之惟恐不盡擇其君子盡召用之凡所謂小人蠧國害民者去之惟恐不至則所以得民心者至矣夫民心既得則中國焉有不治中國既治則遠裔焉有不服哉此太平之功所以可圗也昔齊宣王畏諸侯之侵孟子曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也滕文公以小國間於齊楚孟子獨告之鑿斯池也築斯城也與民守之效死而民弗去孰謂陛下以一人之尊有天下之大尺地無非王土一民無非王臣區區以敵人為畏哉臣願陛下勉之但思所以得民之心彼誠不足畏矣李光論百姓失業劄子曰臣聞堯舜在上天下無窮人文王之民無凍餒者盖國以民為本民以食為天自古賢聖之君莫不貴農重榖以裕天下一夫不耕或受之飢一女不織或受之寒飢寒並至而能不為奸邪者鮮矣仰惟陛下臨御海㝢躬修節儉以安百姓涵養生息如天地之無不覆載雨露之無不潤澤每發徳音下明詔未嘗不以寛恤為先懐生之屬罔不欣戴可謂治極乎堯舜而恩深於文王好生之徳浹肌膚而淪骨髄矣邇者朝廷稍務損益時政以適厥中而奉承之吏用意過當不復推廣陛下仁民愛物之心貪殘苛暴公肆掊斂百姓嗷嗷失業者衆監司守宰坐視流亡恬不加恤强者結集為寇盜弱者轉徙乎溝壑是致輦轂之下匄者日滋號呼呻吟枕藉道路此陛下耳目所及至近而易察者然且壅隔而不盡聞況四方萬里之外乎深恐怨嗟之聲干戾隂陽聚為祲癘傷害和氣臣愚伏望陛下流寛大之澤抑煩苛之吏申勅諸路提舉常平官或間遣信使以巡撫四方延問民所疾苦蠲逋負省徭役以仰副陛下愛育元元之意實天下幸甚髙宗時尚書右僕射李綱寛民力劄子曰臣伏以祖宗取於民者有常制供於國者有常數州縣寛裕民力豐饒而國用足崇寧大觀以来興造既多用度浸廣於是設法以取之鹽鈔茶引𩔖多抑配和買均糴無錢可敷至於宣和之間有應奉須索之煩有燕山免夫之役物力大屈人心驚疑如居風濤洶洶靡定靖康之初降寛大之詔將與民休息而兵革未已調發方興州縣官吏不克奉行徒有虚文初無實恵民之憔悴㡬不聊生今日國勢人心比之靖康之初又不相侔自非無名之斂一切罷去與民更始則失業不聊生之民皆將聚而為盜賊天下之勢離矣夫自崇觀以来増上供之數而一路州縣又有養兵給官吏禄廩之費用度百出何自得之於是常賦之外加數以取於民如江東西南北有至於納加耗米四石僅能了常賦米一石者猾胥贓吏又因縁為奸欲民力之不困何可得也登寳位赦書已令勘會上供増數蠲減宜於元額以十分之三留本路為養兵及官吏禄廩之費受納常賦依法加耗外不得輒取犯者重寘於法則民被實恵而有更生之望矣國家前此屯兵於畿甸故嵗漕東南金榖以實中都今京畿屯兵無往日之數而帥府要郡養兵之制興則随時増減以足國用以寛民力不可緩也自餘不急之貢及年例抛買無用之物皆宜蠲減茶鹽不得抑配糴買先給價錢如此然後可以為政夫民猶魚也財猶水也魚恃水以生民恃財以養水日汲而至於涸則魚亡財日取而至於匱則民散故善養魚者蓄之於陂池深渺之間善養民者臨之以寛厚簡易之政審能行此則足以得民心斯得天心矣如合聖意乞降㫖三省措置條具施行樞宻院編修胡銓上奏曰臣聞梁襄王問孟軻天下烏乎定孟軻對曰定於一孰能一之曰不嗜殺人者能一之陛下前日下詔戒諸大帥毋得多殺聞者流涕皆曰是宜為君有恤民之心此誠合孟軻不嗜殺人之意然而武夫悍卒不能上體至仁皆務以暴易暴竊聞向者軍兵有於路中掠人探取其心以祭鬼者往往而是只如太平州火災居民救死無路率皆登城以避而城上軍兵捽而殺之人至蹈火而死者三千餘人怨聲徹天監司郡守畏首畏尾不敢上言實孤陛下任使之意然當塗火厄已不可及至如掠人以祭其禍未已可勝寒心昔邾文公用鄫子于次睢之社春秋悼之以為襄公之不霸在此一舉況今軍兵殺人其害不止於鄫子乎臣愚欲望推明孟軻之說申戒諸軍嚴行禁止以廣陛下不嗜殺之心庻㡬徳澤結人以定大亂冒瀆天聰臣無任戰汗銓又上奏曰臣聞近日言事之臣多以迎二聖復兩宫勸陛下廣孝悌之道而陛下孝悌之至通于神明日夜焦勞痛憤靡已思欲自將待邊以決一戰而不悔是以連年大舉深入敵窟曰吾必申吾孝悌之志而後已然臣竊以謂聖人之孝與匹夫不同匹夫以區區奉顔色為孝聖人以安社稷為孝社稷誠安則二聖可還兩宫可復陛下之孝無加焉如使社稷未安陛下未得髙枕而卧尚何為孝乎臣嘗聞昔有老而患積聚者醫云據病當下一月而愈若不下半年而愈然中年以後一下一衰積聚之患終身之憂也其人信之終不以一月之快而易終身之憂遂用醫言以善藥磨治半年而愈初不傷氣而體力益全因悟近日諸軍渡河是醫者欲下一月而愈者也其勢未必不利然終非萬全之道以陛下聖明相賢將勇往無不克而臣尚以為非萬全者竊見一二年来東南之民困於軍興前嵗大旱人至相食雖親父母手殺其子食之去年雖大豐熟比他嵗所入十倍然官斂其七八民存二三生理蕭然卒有水旱民無一年之儲陛下所恃以為本兵之地者東南爾而民力如此若興師不已不惟勞民必又重賦兵法曰興師十萬則百萬家不得安業今雖給降官告度牒交子名為糴本而民間不得一錢實為白奪州縣官吏又從而因縁為奸官取其一已乾沒十九矣陛下試詢臺諫有異臣言甘伏斧鉞臣愚欲望申戒天下官吏務為寛恤仍詔諸將養銳持勝少息民力一二年間氣力全盛精神可以折衝則積聚之患可不下而愈也聖人之孝尚何以加於斯乎冒犯天聰臣無任戰汗之至銓又上奏曰臣近自南方来經歴州縣不少頗聞民間利害其甚害者莫大於修城比年以来所至紛然調發鄉丁千百為輩方春田作捨耒耜而躬畚鍤怨聲嗷嗷而又科買塼木動至萬計率以軍興為名徙居民壊廬室人少不從身死家破而今之守臣驟遷數易或半年即去或一年即去既知在任不久遂務急於徼功凡所營築急若星火但欲速成不責實效一經積雨随即頽圮設有盗賊如何可憑況自来州軍自有牢城兵卒今皆散為奔走之𨽻而法外役民妨耕擾業陛下前日下詔逺慕黄帝以車為衞不狃於九重之安而冒霜露之苦務在息民故也逺方郡守不能上體陛下徳意乃至勞民費財繕治亭障使其堅固可恃尚曰煩勞況其文具實無補於備禦加又因縁驅迫役夫修葺廨舎崇飾觀臺民窮無訴遂為盜賊欲望詔天下州軍自今母得大興力役或有城築必先計城廣狹毎郡守一任之間修母得過百丈須務堅固難毁其任内有或壊者重寘以法雖已去任必須追坐仍令逐路監司常切覺察敢相容隠者亦與同罪如此則不至大段擾民而每任所修雖少必固三兩任内城遂可全不惟民力稍蘇亦庶㡬城池或可待暴非徒為文具而已臣愚淺識惟陛下憐其過計權吏部侍郎汪應辰轉對疏曰臣聞漢髙祖入闗蠲除苛法秋毫無犯秦民無不欲得髙祖王秦者及其失職之蜀秦民無不恨者夫以秦民之心如此故髙祖以﨑嶇巴蜀之地還定三秦易於反掌既而戰滎陽京索間曠日持久至於發老弱以從軍計戸口以轉漕民無不從者卒以取天下臣以是知民心所歸其所係大矣自艱難以来中原之地陷於敵人而遺黎赤子懐戀有宋歸戴陛下其心未嘗一日而忘彼雖壓之以戰則必勝之威劫之以犯則必誅之法宜其人服從於彼也而終莫之從我方保守和好其歸明者還之其欲来者卻之宜其人之絶望於我也而其望愈確嗚呼此豈可以偽為哉今者淮北之民更相攜持係踵而至殆無虚日如大川之水而强以人力障之一旦隄防潰決沛然東下彼固不能遏其去我亦不能禦其来也伏願陛下察斯民所以不忘國家如此其至宻詔有司厚加撫卹使至者有歸居者有養以不失其所以来歸之意則斯民心說誠服有殞無二惟陛下之所欲用者矣陸贄有言所費者財用所收者人心茍不失人何憂乏用惟陛下留意幸甚張浚議姑息狀曰儒者拘於古義惟知薄賦省用可以得天下之心而不知排大難除大患權一時之宜救四海之急其用心非不本於仁取之於民有不得已者且愛民而姑息之一旦有急不能保䕶使之父子流離生事委棄安在其為仁也況兩宫未歸中原徯望天下之心所以責望於我者至重乎雖然兵興之久生民憔悴益甚矣陛下勉之寸隂是惜至誠有為以恵天下臣請以死効力焉直龍圗閣李光乞遣臺諌按察民病以應天災劄子曰臣猥䝉陛下召自藩方擢置近列職清事簡無以仰裨聖政之萬一當兹多事實愧素餐今者雖幸輪當轉對既非視朝例當投進則又無從瞻望清光臣輒不避僭瀆之罪敢陳狂瞽之說臣聞人君繼天而為之子何所取法哉取法於天而已故天以金木水火土運於上謂之五行人君以貌言視聽思繼於下謂之五事堯舜之時在璿璣玉衡以齊七政七政者日月五星是也箕子為武王陳洪範首言庶徵者雨𤾉寒燠風是也盖人事失於下則天變見於上若影響之随猶桴鼓之應甚哉天心之仁愛人君也一有不至則出災異以譴告之故有道之君天必降鑒若政事差繆則日月有薄蝕之災星辰有孛彗飛流之變五事失當則有常雨常暘常寒常燠常風之變書曰先王克謹天戒臣人克有常憲盖人主之畏天猶人臣之畏法也恭惟陛下聖學日就聰明日躋庶政之間固無大戾但軍興之際不免科斂加以去嵗諸路旱傷江西湖北民不堪命浙東百姓食犬豕之食如聞日来州縣促辦鹽課抵冒者衆囹圄充斥傷天地之和變隂陽之候自冬及春雨雪不已暖氣未效有傷麥苖此災異之大者臣職在論思不敢緘黙臣聞自古創業中興之君必有所因而起故漢祖回闗中光武回河内安集撫養使戸口充實然後轉輸不匱卒成大業今六飛駐蹕東南行已十年江浙非陛下根本之地乎亦將因是而起矣然斯民流亡失其本業又天變如此乃無一人肯為陛下言之者臣非不知隂拱循黙可以竊陛下之寵禄叨陛下之富貴然區區之心有不忍為者臣愚伏望聖慈於臺諫中選擇公忠諒直之士可以委心腹者按察諸路核實以聞如臣言不妄乞詔三省措置施行庶㡬消弭天災召来和氣以仰荅天心所以眷顧陛下之意實天下幸甚光又乞按察諸路財賦劄子曰臣聞知天之天者王事可成不知天之天者王事不成國以民為本民以食為天今兵興之際朝廷方議招納羣冦江淮湖湘之間以次招安人心恱附費用日廣所患者糧食不足爾今行在衞兵無慮數萬而邵清崔増李捧軰皆蜂屯蟻聚仰給於縣官所謂六路發運使者其抛科糴買不過二浙十五六州軍民間積藏雖瓶儲缶蓄捜刷殆盡自二浙之外了不經營頻年以来江南諸路上供物料委為盜資贓貪之吏乗時搔擾侵欺妄用恣為不法無復忌憚臣愚欲望聖慈速詔大臣更選清强通知財榖之人按行諸路見在已支簿歴拖照具實數上之朝廷仍乞檢㑹綱運舊法除逐州每嵗合支用外其餘盡合發赴行在贍養衆軍内有沿江去處亦可那撥分遣就糧庶㡬逺近均平用度給足少寛浙部疲瘵之民不勝幸甚光又乞蠲二浙積欠劄子曰臣伏見近年以来敵人猖獗中原板蕩陛下駐蹕東南乗輿服御悉務減省而百司兵衆皆仰給於二浙加以今日營繕所須一毫以上皆出民力師旅饑饉之後斗米千錢民雖凋弊罔有怨詞深可憐憫臣愚伏望聖慈因今移蹕之後稍流寛大之澤以慰人心應二浙積負一切蠲除臣契勘臨安府九邑科配比他郡最為頻併其折變小麥為害尤甚及去年殘零稅賦見今轉運司責限催納其數至微欲望特與釋放昨縁前知府孫覿將義倉米於正稅外更有折糙米二㪷五勝倉場受納復増至一石又有鈔旁公吏乞覓不下一二千及每嵗和買州縣既不曽支與價錢今聞本府每匹更令納見錢四百文足謂之縻費錢竊慮行之既久遂為永例諸縣因軍馬經由支過係省錢斛多不肯豁除坊場虧欠課利委非侵欺無縁補發而官吏欲假此搔擾時一舉行追呼捕逮謂之干照錢縣官無所從出止是剥民如斯苛細望悉蠲除庶㡬小民䝉被實恵仰副陛下勤卹民隠之意左正言鄧肅上奏曰臣嘗謂巡狩之禮非偶然者春則省耕以補不足秋則省斂以助不給憂勤之心亹亹不已惟恐天下之疾苦不得以上達而九重仁政不得以下布耳崔馹南巡之頌嘗云班雲行之博恵散雨施於庶黎正為此也陛下即位之初首巡睢陽雲行雨施之博當自此邦始使天下引領而望之曰徯我后后来其蘇如是則鑾輿所幸孰非金城乎儻以軍興之際一日二日萬㡬若未暇恤焉則百姓將蹙額而相告矣傳之天下速於置郵萬一他有巡幸當有深可慮者臣竊聞夏四月陛下臨幸之初應天府下諸邑索供奉物至今有不還其直者臣實駭之兵火之後居民離散一得真主如獲再生州郡不能省此復取其膏脂而略不加恤誠忍人哉陛下不及知民間不得訴安於殘忍者又以為不足言此宋都之民所以至今未䝉實恵也且宋都陛下即位之地也民心憂樂天下將取則焉臣愚欲乞陛下峻責當時供奉官吏不還其直者且令朝廷償之大牓諸邑俾仰體聖意庻㡬四方相慶曰天子聖徳如此其巡幸所至又恤民如此民心一定陛下何往而不可哉昔者太王避狄事之以皮幣犬馬以至於棄土地真若不復振者卒能肇基王迹歴年八百其故何也盖當時去於岐山之下民之從之者如歸市民所不能捨則天亦不能違矣此邦之所以興也書曰天視自我民視天聴自我民聴惟陛下察之肅又上奏曰臣竊謂天下之大取諸一身足矣邊鄙有宼若病在四支民心有失若病在元氣凡四支之有疾未有不自元氣之乏者今欲治邊鄙其可輕失民心乎又況京畿近地所賴民力為切此尤不可失者也去年敵人猖獗再干我師京畿近地悉為戰場十口之家九遭屠戮間有脫者亦僅留餘息耳陛下已登九五之位逃民欣然如獲再生然後老弱相扶稍有歸者然昔日所居蕩為煨燼田野之間骸骨相枕豈有餘力復為耕耨之事乎今也京畿漕司尚循舊例日促秋租以為嵗計甚矣謀臣之誤國也昔者周公之相成王必陳王業其詩云三之日于耜四之日舉趾盖以謂于耜舉趾儻失其時則嵗無秋矣且周正建子于耜舉趾之時在今為正二月之間也今年敵騎四月方遁不知正二月間京畿之民何在哉于耜舉趾既失其時今取其租曽不少恕民將如何天不能雨鬼不能輸臣知百姓將復遁矣若使京畿之民其心已失譬之元氣已不復陽四肢有病其能愈乎此正醫國者所當慮也惟陛下審處之章誼乞寛假力田之家禁止州縣邀索疏曰臣竊觀比年以来敵騎侵陵盜賊猖熾編户逃亡人不粒食浙西州軍鎮江為尤甚近聞鎮江府丹陽縣久無縣令又無丞簿殘民之願歸業者有田而官不許種其願種者必先計畝出金官給田帳列頃畝之數然後得施墾闢之力於是貧困之家熟視已業而無貲自占田疇荒蕪坐致殍踣非所以勸農工而安土著也朝廷未嘗有此禁令州縣監司决不敢出此指揮此必猾胥貪吏為之也士民之避地於四方者迫於兵革盜賊之警而致飢寒流離之苦彼其懐土之思豈嘗一日而忘哉今歸視其常業郡縣必有所邀索而後就業則願歸者無㡬矣臣願詔有司嚴行禁止凡荒殘之處田租力役一切蠲除聴民自擇膏腴極力種藝一二年間流移漸歸户口益衆然後計其已耕之地稍定常賦之入盖未晚也近者紹興徳音固有牛租屋稅寛免指揮矣若䝉聖慈更於力田之家特有寛假不勝幸甚趙元鎮上奏曰臣竊見去嵗之秋移蹕浙右嘗詔郎吏以上條具巡幸之宜凡有可以加恵逺方者莫不舉行之徳至渥也今自温台復臨吳會所至郡邑悉經寇攘無聊憔悴之民欲赴訴於陛下者不啻赤子之投父母飢渇之丐飲食嗷嗷之情大非前日陛下懐惻怛之心視兹困弊亦將哀其窮而副其所欲乎願詔有司嚴勅州縣應經殘破之家特蠲今年賦役差率等事及竹木甎瓦米麫之𩔖權與免稅使之營葺生理以漸復業起凋瘵之疾變愁嘆之聲因之弭奸宄以消無窮之患矣敵人長驅肆行殘殺陛下無力以救之固非得已凡兹優卹之事力所可至者謂宜無惜至愚而神孰不欣戴是乃固邦本之術謀恢復之漸也幸陛下誠心至意果於必行要令䝉被實恵不徒為掛牆壁之空文斯為盡善事若緩而急者惟陛下加察李石上奏曰天下事有繁有簡簡則易守繁則難悉且九州四海之廣天子一身安能民民自治哉曷亦取其簡而易守者以為治民之要則其繁而難悉者可馴致也今陛下執其簡且要者以分之於監司守令而民自治矣縣以千計州以百計一道以數十計陛下詔㫖所以憂此民者豈但千條萬端吁亦繁矣監司守令三人者誠有一於此為陛下分其甚繁之憂者誰乎且付之以憂民之柄則必擇其人而授之必欲擇其人則必親出陛下之權衡題品庻可無憾今縣令茍掛名選部者皆可得之郡守則自京朝官以上茍積嵗月者亦得之如監司則係之朝廷矣且以朝廷自選擇者不過數十則必自知其人之賢不肖至於州縣守令號為千百計能保其縣得卓魯州得龔黄人人為賢守令乎陛下既以民為憂又憂其所以治之者其亦勞矣不若以民寄之於守令守令寄之於監司自其簡者視之而寄陛下之憂則所以憂民者可以紓其半矣邇者陛下務於旌别俾監司舉材可為郡守縣令者是亦知所以擇守令之一術至於監司則在朝廷矣誠能思其所以為要者執之於上則堯舜無為之治豈逺乎哉石又上奏曰天下之利皆生於無所用旱之舟水之車此無用之利也夫有用者人知競而急趨之而無用者則不屑而棄之初不知無用乃有用之資㳂邊不耕之田乃無用之利也今之江漢與巴漢乃昔之人所嘗屯兵其地取其不耕者耕之以為食為息兵静重之計寛取民餽餫之勞國家知之置營田之官於其地盖得之矣恐言之未盡行行之而未盡至願陛下詔有司悉意出力而為之今有司所患者不過曰耒耜錢鎛之費耕耘芟築之人耳誠使有司稍借其費又蒐汰兵之老弱不任穿帶者募游手之閒民者雜耕於其地寛以嵗月之力視其嵗人之厚薄而為田官之殿最此誠裕民之一術也且治人之疾則必為之藥而冀其愈也陛下既知民之疾取有司寛剰之財以裕之是知其疾而為之也疾未愈而藥不繼陛下將何以憂之乎然則營田者亦裕民之一術也兩浙西路安撫使葉夢得奏乞禁罷獻納借貸指揮狀曰臣竊惟方今國讎未雪連年用兵外有方張未滅之敵内有乗間竊發之盜然而都城失守㡬月陛下謙遜未即大位奸偽僭亂之人竊居大寳天下内外逺近卒無一人敢懐向背者祖宗徳澤二百年蟠結在人至深至固之效也臣始聞二聖北狩首移檄部内士庻兵民喻以逆順推本國家根本靈長不拔之意使各堅守一心以待陛下之命是時上下方洶洶臣言一出雖武夫悍卒婦人小兒無不感泣憤勵所在聚觀數百人更相𫝊告以死自誓臣以是占之知吾宋之有天下非特天命方永在人心者固不可得而易也陛下既嗣有大統赦令繼下其愛恤元元涵養撫存者無不備至可謂知所本矣應上供之數非祖宗舊制而過取於民者一切盡罷凡欠負之所當輸者不以貫伯名色皆使蠲除民知散利薄征陛下之誠意弛負已責陛下之仁心其歡呼歸戴豈有已哉然臣嘗觀自昔良法行之無不在人使其人守之必先有以戒其漸古之言曰作法於涼其弊猶貪作法於貪弊将若之何去嵗淵聖皇帝繼承之初深監前日政事科擾之弊而力去之其見於詔令者亦無所不盡然在位之臣不明大體未㡬以國用窘匱乃開獻納金帛之令其後金人既迫城下倉卒召勤王兵慮調發不足又使得以借貸於民天下固知二令非出於淵聖皇帝然郡縣被受能推廣上徳者無㡬往往皆挾中㫖肆為誅求愚民慳靳安知公上之急謂之獻納者未有不科敷而得也此例一啟凡急而取於民者無不以獻納為名於是去冬及春有或課以等第或率以貫頭有一邑而出三五萬緡者有一郡而出二十萬緡者至於再至於三不已問之則曰法固有之此出於軍須權宜而民所樂輸也豈其實哉借貸之令初慮官錢不足而勤王之兵不可緩故不得已命之以備萬一然且使償其嵗租之半亦固未有遽取之也而所在不問府藏之有無不論調度之多寡畏監司者恐其劾問為己謀者慮其後乏迫期會而取辦廢經畫而仰成則惟民之求而已入有常數用無常限人得為市髙下在手有上戸釋而下戸及者有此色薄而彼色厚者簿籍不足考劵契不足憑所蠲之租所償之期尚安得而計哉臣耳聞目覩未嘗不為朝廷惜之以謂科率之禁雖嚴而掊刻者猶未戢搔擾之戒雖數而困苦者猶未蘇此雖有司之過然不幾作法於貪者歟昔漢武帝事匈奴卜式願輸家財半佐邊公孫𢎞以為非人情不軌之民請勿許式後復以錢二十萬給河南太守徙民武帝召以為中郎布告天下尊顯以風百姓然卒不聞復有獻者古今人情大抵不相逺唐徳宗討朱滔王武俊用韋都賔陳京請借商錢期得五百萬可以支半嵗乃使趙贊行之約罷兵而償捜督既峻民有自經而死遮宰相訴哭者長安為之罷市然纔得八十萬其後涇原兵亂大呼於市果假此以藉口既不足濟所乏徒以失民得不償失今陛下以聖徳啓中興武帝徳宗之事固萬無有然二令未除慢吏庸人終得以並縁為奸以濟其私百姓何知但見前日之習尚在必将疑陛下之詔以為虚文而奸猾亂民之徒或得因以扇惑其黨則所害為不細伏望聖慈特命有司明示詔㫖以前二令出於有司一時之請自今無得復用凡州縣斂於民而稱情願託軍期而輒借貸者皆重坐之使逺近之民感恩懐徳皆能深信而不疑則捍患扶傾必有見危而思奮孟子謂三代之得天下也得其心斯得民矣此正今日之先務狂愚冒犯臣不勝皇懼激切屏營之至謹録奏聞夢得又奏乞放免嚴衢州諸縣夏稅等狀曰勘會近為嚴州遂安縣兇賊倪從慶作過本州淳安夀昌兩縣及衢州常山等縣皆相連接境自去冬至今諸縣保甲把隘防守暴露實為勞苦方春農蠶是時不無廢其作業嘗具奏請欲候事平特與蠲免夏秋二稅及和買未奉指揮今来倪從慶等已出就降據統領官朝奉郎詹大和條具到應燒劫被害之家與把隘地分人户量地里逺近緊慢随鄉村優重勞佚分為等第參酌合行蠲免分數下項須至奏聞者一應係燒劫被害之家逐戸下更不分等第一等户與免一年夏秋二稅和買一半第二第三第四第五等户並與免一年夏秋二稅及全免和買身丁一應把隘地分逐戸以緊慢分四等第一等户免夏稅三分第二等户免夏稅四分第三等第四等户免夏稅六分第五等户全免夏秋二稅并今年身丁客户同已上各免和買五分第二等第一等户免夏稅二分第二等户免夏稅三分第三等第四等戸免夏稅五分第五等户免夏稅并今年身丁客户同已上各免和買四分第三等第一等户免夏稅一分半第二等户免夏稅二分半第三等第四等户免夏稅四分第五等户免夏稅并今年身丁客戸同已上各免和買三分第四等第一等戸免夏稅一分第二等第三等戸免夏稅一分半第四第五等戸各免今年身丁客戸同已上各免和買二分右臣契勘浙部自嚴州以東山洞最為深險兇頑之民恃以竊發昨方臘作過陷沒六州二十七縣殺戮蹂踐官吏生靈被害不貲至煩朝廷遣發西兵數十萬方能撲滅今来倪從慶結謀實欲放效方臘仍乗州縣起發勤王弓兵之後所在空虚其勢猖獗比方臘尤易幸縁把截防托不敢奔迸出洞及㡬察在外奸細之人無所附從因此窮蹙請降保全一方實兩州諸縣保甲之力若無所優恤無以激勸後来恭惟皇帝陛下紹休聖緒恢復大業方欲盡除天下蠧弊還之太平使懐生之𩔖無一物不得其所則於此毫末之微必預含覆之賜欲望聖慈詳酌許令依所條具等第特賜蠲免施行干冒天威臣無任惶懼激切屏營之至謹録奏聞武義大夫曹勛上保民書曰臣拳拳之忠既願陛下愈勵畏天之實以副天意仰惟陛下嚴恭寅畏昭事恪謹發自淵𠂻光於聖徳躬行有餘矣其見於立政立事與三二大臣同心以明畏天之事者臣願以保民為先臣聞春秋𫝊曰國之將興視民如傷是其裕也福者天之所錫國之將興賴天命爾必視民如傷然後為福是以自昔聖人所言天也人君也民也未嘗不連屬而為辭盖人君者天之所命而民者天之所親也後世為治者每離而三之所以下不為民所懐下不為民所懐則上不為天所福此理豈不昭然哉子貢曰如有博施於民而能濟衆何如可謂仁乎孔子曰何事於仁必也聖乎堯舜其猶病諸保民之事雖堯舜猶以為難也臣伏覩咸平中澶淵之役可謂大得志矣當時若從諸将言何所不可真宗皇帝不為也遣曹利用出使結好交幣行千萬世息民之䇿其形於言曰我為憂民切戎車暫省方聖意安在哉慶歴中北兵壓境遣蕭英劉六符来聘必欲得關南故地乃止可謂輕侮中國矣以當時事力豈不能快意於一戰仁宗皇帝不為也命富弼報聘増幣結約尋前盟而固之其形於言曰朕為兩朝赤子故屈已増幣以圗寧息聖意安在哉二祖之意盖不欲逞一時之志而啓後日之禍保民之大恵也天佑祖宗保民之盛徳所以隆其基業於未艾者顧不在此乎宣和海上之約使謀出於彼在我當曰契丹吾兄弟之國祖宗兼愛南北之民通好結和載書具焉天地鬼神是臨契丹之患我當救之而反共圖之天地鬼神謂何彼聞此言臣知其縮頸而走也儻先自我謀則又何說歟天佑祖宗保民之徳所以隆其基業於未艾者今在陛下諒陛下必能畏天必能保民必能承祖宗積累之基又能光大久逺於其後也又畀陛下為先帝雪恥於天也亦祖宗與先帝在天之靈所以深望於陛下者也遺大投艱在陛下豈不重乎保民之事陛下可不勤乎河南之復一予一奪終嵗而已亦天將以觀陛下保民之力也臣料是時謀臣必有獻言者將因河南之復大舉而取東北又欲深入以雪大恥陛下固未入其言使謀之者不已一旦聖意從之則兵端禍本創立自我天意若曰斯民也針石磔膊於前日非得已也摩拊吹嘘曽未㡬時而更創為兵端禍本生靈餘㡬忍戕之乎兵連禍結又當何時而定乎天亦駭之也故復以河南予敵不予不息也不息不能保民也天意豈不明哉天佑祖宗保民之徳如此所以報宣和之舉如此既予陛下以河南復奪之其速如此皆以保民也陛下頃者宸心獨斷屈己通和以圗休息得祖宗保民之意也今又與同心大臣審定國是以應天定之心皆行保民之大恵臣猶以保民為言者聖人以一夫不獲為辜君子以匹夫匹婦不被其澤為媿恥保民之事不當存其大而略其細有其心而無其實徳今也田疇之不墾闢戸口之不滋益商人販賈之不通工人用器之不廣逃移溝壑之不免愁嘆嗟怨之不除以是為保民可乎陛下寛恤戒告詔㫖屢下掛牆壁訹無用之空文銜命令加出使之重擾譬猶雨露自天而降中間為物所隔潤澤不及於地陛下存其大而臣下不能行其細陛下有其心而臣下不能施其實徳臣所以有言也夫生民之休戚在人材之賢否政事之得失紀綱之廢舉風俗之薄厚陛下前此東西巡幸未有定都和戰攻守未有定計應敵不暇不能以自全自全不暇未能以有立之時也是以人材随所舉而用政事循一切之宜綱紀聴其所分風俗任其所尚保民之事若有所未暇天之責於人者輕也今天下已定自全之時也有立之時也天之責於人者必周也臣仰窺天意下詳民瘼恭望陛下一眂同仁於此時至切也陛下所當留神羣臣所當竭力無出於此愚臣於此所當盡言也伏惟聖慈加察焉不勝天下之幸王元渤論保民疏曰臣聞保民之道無他去其害民者而已矣方今害民之大者有三一曰横賦二曰力役三曰貪吏朝廷固已戒横賦矣然而起横賦之端者莫急於軍無定所朝廷固嘗省力役矣然而重力役之弊者莫大於興作不時朝廷固已懲貪吏矣然而長貪吏之原莫甚於好惡不明且以近事言之劉光世保江州移之鎮江韓世忠保鎮江移之行在張俊衞行在遣之浙部師行所過縣邑為空官廩不支自須横賦横賦之弊未去臣恐保民未有道也州郡傷殘人民凋弊為官吏者或増修城壘或繕治甲兵初無堅守之謀徒飾貪功之說强寇一至委而去之向者民力又復一空臣非謂此不當為也盖當因時之為寛民之力若能頻施恵愛厚結民心則耝耰可以擊賊畫地可以固守如其不然但求文具則貪功之人必興力役力役之政未節臣恐保民未有道也縣邑之所視者州郡也州郡之所視者監司也監司之害莫大於好貨監司好貨則迫脅州郡郡吏好貨則求請縣邑邑吏好貨則誅剥鄉村推原所自蓋縁好惡未明朝廷非不好㢘吏也而㢘吏或未擢非不惡貪吏也而貪吏或器使如此未至耳若於臨事之日常知戒此三者則保民之道庻㡬其可求焉校書郎王十朋輪對疏曰臣聞民為邦本本固邦寧自古人君未嘗不以得民心固邦本為急而尤欲撫綏固結之於動揺疑貳之時我國家有天下二百年矣中遭厄運而宗社復興者良繇四海民心戴宋惟舊陛下即位於今三紀深仁厚澤尤著在天下之心然邇年以来監司守令多不得人為國斂怨民心稍離一曰不宣詔條二曰不卹刑獄三曰不先撫字何謂不宣詔條臣伏覩比年寛卹之詔屢下然而實恵未孚於民皆繇州縣不能奉行之弊昔人謂徒掛牆壁今則初未嘗掛凡遇詔下事有便於民而不便於吏者或宣畢而遂匿或略掛而遽收故上雖有良法美意下不得而知者多矣況欲被其澤耶何謂不卹刑獄臣伏覩陛下慎刑卹獄之意雖堯舜成湯亡以加然措刑之效未逮於古者盖由師帥之任鮮或循良昧者以胥吏為耳目怠者以胥吏為精神貪者以胥吏為鷹犬案牘滿前漫不加省獄情出入動由此曹故富民納賂以買直貧者不能自伸强者劫持以求勝弱者不能自免所望以直其寃者監司也今監司按部動以胥吏數十自随所至州縣唯務誅求茍滿其欲則獄事一切不問而望其有所平反可乎何謂不先撫字國家張官置吏本以為民要當以撫字為先催科次之昔之循吏勞心撫字而民皆樂輸不待催科而常賦自登夫催科自有常法豈在先期而取辦官以未及期為辦事民當未及期而被虐故常賦未入於官府而横費已歸於蠧吏矣悍吏持尺牒走鄉閭噭呼隳突鷄犬不寧而欲民安其業可乎臣又聞邇者邊奏稍警所在以防秋為名拘集舟船團結保伍措置無術州縣騷然至有鬻田宅以充糧草之賦殺耕牛以供筋角之輸斬山林以為兵器撒室廬以營寨柵吏縁為奸民情大擾茍不有以安恤之竊恐民逃其土散為盜賊矣況今敵人外侮國威不振人心揺動正宜撫綏固結時也臣願陛下推溥博之仁下惻怛之詔勤卹民隠動之以誠官吏有害民者必罰無赦仍命宰相慎擇諸道監司以寄休戚以宣明詔條慎恤刑獄撫字黎元為先務如是則四方萬姓罔不感泣人心既恱寧患天意之不我助耶臣以謂固本以寧邦者莫大乎此侍御史中丞許景衡奏乞寛卹東南疏曰臣竊見三路及京東西州縣或為盜賊侵擾或為金人殘破户口減耗賦入無㡬今朝廷經費彌廣軍須亦復不貲當悉仰於東南但東南之民比縁府庫匱乏横斂頻煩官吏貪殘誅剥尤甚今来若非盡革舊弊復加存卹則必破産流亡或盜賊羣起意外驚擾則無復耕桑之民以應公上所須矣豈不誤朝廷之大計哉前日赦令徳音寛大而斯民未被恵澤選易守臣増置尚未就緒今来已是秋深所宜早見辦集臣愚伏望睿明深念國家計用之根本加恵東南之元元應赦書所罷後来上供抛買及違法租賦之𩔖並仰有司疾速報應結絶使實恵及民申戒監司郡守按刻奸贓寛其徭役使得安居盡力耕織以供常賦仍乞特降指揮督責守禦之備限在日近了當凡東南諸路監司郡守尚有闕貟去處並乞精加選擇限日赴官其㳂江近邊控扼處縣令巡檢縣尉見闕未曽注差去處並乞令監司守臣公共選擇差辟及見任人内有不可倚仗者亦乞令選擇逐急對移務在盡公不得偏徇其被移人仍不理為過犯庻使儲糧練卒各務防守如此則東南可以無虞而朝廷之財用可以無匱乏之憂矣知平江府張守上奏曰臣聞國之有民猶魚之有水火之有膏木之有根人之有元氣水深則魚樂膏沃則火明根固則木蕃元氣盛則民人安盖民惟邦本古之誼也艱難以来嵗幸屢豐賦入有常用度僅給葢以陛下愛民如子别無横斂民不至於困乏今年諸路亢旱榖貴人饑惟浙右數州之地為稔故糴數萃於數州無慮百餘萬斛而又被旱州郡連艘以取給公私逋負乗時而責償雖號豐登民實困乏逃移猥多州縣固不易辦矣然軍食所資不得已也民知其不得已其敢有辭州縣亦思竭力促辦而不敢後也然此數州之地屏蔽行朝供應軍須前後不一臣愚伏望睿慈特降明詔今嵗浙西糴買之外不得更有科敷庻㡬一方少獲休息使數州之民不以豐年為不幸仰副陛下仁民之意守知紹興府上奏曰臣伏見陛下憫恤元元至誠惻怛前日稽違詔書之吏痛加懲創徳音昭宣逺近孚信今䝉聖慈不以臣為不才使承乏鎮東必思蠲除民瘼以承休徳臣頃筮仕會稽近又扈蹕久居亦嘗詢究一方利病所在其利害之細者皆不足言而大者惟和買一事民被毒為甚然和買之害固已久軫聖懐亦嘗兩次裁減矣諸路之所同也至於本錢稽違而支散不足絹直翔貴而輸納亦艱亦諸路之所同也惟會稽民貧一嵗和買十七萬餘匹得數太多至今苦之以家業錢計之鄉村人戸率二十千當輸一匹詢之他州未有如是之重也夫以一家之業纔二十千一絹之直當四之一輸納費用又復一兩千殆及三分家業之一矣盖二十千之家必庸販以自資然後能餬口而縣官於賦稅之外嵗取其三之一恐非仁聖之朝所宜有也欲望睿斷将紹興府和買量賜蠲減設或不足於用則臣僚衣賜量行裁損亦未為害庶㡬仰稱陛下仁民之意歴代名臣奏議卷一百七
