body:
  text: 歴代名臣奏議巻二十八明楊士竒等撰治道唐肅宗時元結被召詣亰師自以始見軒陛拘忌諱恐言不悉情乃上時議三篇其一曰議者問往年逆賊東窮海南淮漢西抵函秦北徹幽都醜徒狼扈在四方者幾百萬當時之禍可謂劇而人心危矣天子獨以匹馬至靈武合弱旅鉏彊寇師及渭西曽不踰時摧銳攘凶復兩京收河南州縣何其易邪乃今河北姦逆不盡山林江湖亡命尚多盜賊數犯州縣百姓轉徙踵繫不絶将士臨敵而奔賢人君子遁逃不出陛下往在靈武鳳翔無今日勝兵而能殺敵無今日財用而百姓不流無今日爵賞而士不散無今日朝廷而賢者思仕何哉将天子能以危為安而忍以未安忘危邪對曰此非難言之前日天子恨愧陵廟為羯逆傷汙憤悵上皇南幸巴蜀隠悼宗戚見誅側身勤勞不憚親撫士卒與人權位信而不疑渴聞忠直過弗諱改此以弱制强以危取安之繇也今天子重城深宫燕和而居凝冕大昕纓佩而朝太官具味視時而獻太常備樂和聲以薦國機軍務叅籌乃敢進百姓疾苦時有不聞廏芻良馬宫籍美女輿服禮物休符瑞諜日月充備朝廷歌頌盛徳大業聴而不厭四方貢賦争上尤異諧臣顐官怡愉天顔文武大臣至於庶官皆權賞踰望此所以不能以强制弱以未安忘危若陛下視今日之安能如靈武時何寇盜强弱可言哉其二曰議者曰吾聞士人共自謀昔我奉天子拒凶逆勝則國家兩全不勝則兩亡故生死決于戰是非極于諫今吾名位重財貨足爵賞厚勤勞巳極外無仇讐害我内無窮賤迫我何苦當鋒刃以近死忤人主以近禍乎又聞曰吾州里有病父老母孤兄寡婦皆力役乞丐凍餒不足況於死者人誰哀之又聞曰天下殘破蒼生危窘受賦與役者皆寡弱貧獨流亡死徙悲憂道路葢亦極矣天下安我等豈無畎畝自處若不安我不復以忠義仁信方直死矣人且如此柰何對曰國家非欲其然葢失於太明太信耳夫太明則見其内情将藏内情則㒺惑生下能令必信信可必矣而太信之中至姦尤惡之如此遂使朝廷亡公直天下失忠信蒼生益寃結将欲治之能無端由吾等議於野又何所及其三曰議者曰陛下思安蒼生滅姦逆圖太平勞心悉精於今四年說者異之何哉對曰如天子所思說者所異非不知之凡有詔令丁寧事皆不行空言一再頗𩔖諧戲今有仁卹之令憂勤之誥人皆族立黨語指而議之天子不知其然以為言雖不行猶足以勸彼但勸在乎明審均當而必行也天子能言巳行之令必将來之法雜徭弊制拘忌煩令一切蠲蕩任天下賢士屏斥小人然後推仁信威令謹行不惑此帝王常道何為不及帝恱曰卿能破朕憂擢右金吾兵曹叅軍代宗時左拾遺獨孤及上䟽陳政曰陛下屢發徳音使左右侍臣得直言極諫壬辰詔書召裴晃等十有三人集賢殿待制以備詢問此五帝盛徳也然頃者陛下雖容其直而不録其言所上封皆寢不報有容下之名而無聴諌之實遂使諫者稍稍自鉗口飽食相招為禄仕此忠鯁之人所以竊歎而臣亦耻之十室之邑必有忠信況朝廷之大卿大夫之衆陛下選授之精歟假令不能如文王之多士其中豈不有温故知新可懋陳政要而億則屢中者陛下議政之際曽不採其一說堯之疇咨禹之昌言豈若是耶昔堯設謗木於五達之衢孔子曰以能問於不能以多問於寡然則多聞闕疑不恥下問聖人之心也願陛下以堯孔心為心日降清問其不可者罷之可者議於朝與執事者共之使知之必言言之必行行之必公則君臣無私論朝廷無私政陛下以此辨可否於獻替而建太平之階可也師興不息十年矣人之生産空於杼軸擁兵者苐館亘街陌奴婢厭酒肉而貧人羸餓就役剥膚及髓長安城中白晝椎剽吏不敢詰官亂職廢将墯卒暴百揆􅈥刺如沸粥紛麻民不敢訴於有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子齩骨矣陛下不以此時厲精更始思所以救之之術忍令宗廟有累卵之危萬姓悼心失圖臣實懼焉去年十一月丁巳夜星隕如雨昨清明降霜三月苦熱錯繆顛倒沴莫大焉此下陵上替怨讟之氣取之也天意丁寧譴戒以警陛下宜反躬罪已旁求賢良者而師友之黜貪佞不肖者下哀痛之詔去天下疾苦廢無用之官罷不急之費禁止暴兵節用愛人兢兢乾乾以徼福于上下必能使天感神應反妖灾為和氣矣徳宗時中書侍郎同中書門下平章事陸贄奏曰前日顧少連奉諭宻㫖每於延英對卿縁有諸人言不得盡中間卿所奏去冬薦人實縁對趙憬執論所以有言相拒亦不是阻卿之意若有要便事但依前者意㫖自手䟽宻封進來卿又頻與苗粲進官朕未放過恐卿未知朕意此人即苗晉卿之子晉卿往年攝政曽有不臣之言又諸子皆與古帝王同名意甚不善縁非諸子之過不欲明行斥逐終是不合令在朝廷卿宜宻知此意苗粲兄弟並改與在外閑僻䖏官仍不得令近兵馬者猥䝉天慈屢降深㫖慰眷稠疊誨諭周詳骨肉之恩無以加此士感知已尚合捐軀臣雖孱微能不激勵至於彌綸庶績督課羣官始終不渝夙夜匪懈是皆常分曷足酬恩自揣凡庸之才又無竒崛之効唯當輸罄忠節匡輔聖猷衆人之所難言臣必無隠常情之所易溺臣必不回固然貞心持以上報此愚夫一至而不易者也惟明主矜亮而保容之頃以去冬薦人頻於街衢披訴既是准制許集理合量才授官進擬再三未䝉允許伏慮事轉淹滯所以因對奏陳懵於忖量推理輙發以趙憬與臣並命俱掌樞衡參奉謀猷事當無間不知避忌輕黷宸嚴陛下特宥惷愚曲加奨導寵遇踰等恩私倍常顧惟何人叨幸若此偶有所見敢不盡言是彰無隠之誠以申上報之分臣聞王者之道坦然著明奉三無私以勞天下平平蕩蕩無側無偏所謂三無私者如天之無私覆也如地之無私載也如日月之無私照也其或有過如日月之有蝕焉過也人皆見之更也人皆仰之日月不疾於蔽虧人君不吝於過失虧而能復無損於明過而能改不累於徳昨者臣所奏惟有趙憬得聞陛下以至勞神委曲防護是於心膂之内尚有形迹之拘職同事殊鮮克以濟恐爽無私之徳且傷不吝之明夫元首股肱義實同體諮詢獻納一日萬機宣之使言猶未盡意言若有阻意何由通啓沃既難機務斯壅雖荷綢􅓎之顧實増曠廢之憂仰希聖聦更賜裁處苗粲少以門子早登朝班歴拾遺補闕起居貟外郎中前後二十餘年温恭有加恪慎無怠端敏足以守職文學足以飾身詳其器能堪處近侍陛下以粲先父常有過言名子之方又乖義𩔖不忍明加斥黜但令改授外官伏以理國化人在於奨一善使天下之為善者勸罰一惡使天下之為惡者懲是以爵人必於朝刑人必於市惟恐衆之不覩事之不彰君上行之無愧心兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也奨而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不明而恩倖之門啓中傷則枉直莫辨而讒間之道行此柄一虧為害滋大凡是譛愬之軰多非信實之言利於中傷懼於公辯或云嵗月已乆不可究尋或云事體有妨須為隠忍或云惡跡未露宜假他事為名或云但棄其人何必明言責辱詞皆近於情理意實苞於矯誣傷善售姦莫斯為甚伏惟聖鑒之下必無浸潤之流然於稱毀之言不可不辨賞罰之典不可不明陛下若以晉卿跡實姦邪粲等法應坐累則當公議典憲豈令隂受播遷陛下若察晉卿見誣又知粲等非罪則合隨手奨用不宜降意猜訪今忽不示端由但加斥逐謂之掄材則失序謂之行罰則無名徒使粲等受錮於聖朝晉卿銜憤於幽壤以臣蔽滯未見其宜夫聽訟辯䜛貴於明恕明者在驗之以迹恕者在求之以情跡可責而情可矜聖王懼疑似之陷非辜不之責也情可責而跡可宥聖王懼逆詐之濫無罪不之責也惟情見跡具詞服理窮者然後加刑罰焉是以下無寃人上無􅍝聽苛慝不作教化以興晉卿起自文儒致位台輔能以謙柔自處故為三朝所推當諒闇之辰攝冢宰之任是将備禮豈是擅權安肯露不臣之言招覆族之釁雖甚狂險猶應不為矧伊老臣寜忍及此假有忍人之意其如言發禍随求之以情既無端驗之以跡又無兆宜䝉昭恕理在不疑又自陛下御極已來粲及兄丕皆歴清近若以舊事為累豈復含容至今恐有無良之徒増嫉丕粲兄弟構成飛語務欲挫傷大抵任重勢疑易生嫌謗以周公之聖不免流言霍光之忠亦遭告訐向非成王覺寤昭帝保明則二主之徳美不傳二臣之寃誣莫辯陛下追懐往事得失豈不相逺哉後之視今固亦如此凡所舉措安可不詳伏願少留睿思特加省察斯實羣臣庶免於戾豈唯苗氏一族存歿幸賴而巳乎少連又向臣說云聖㫖察臣孤直猶謂清慎太過都絶諸道饋遺却恐事情不通如不能納諸財物至如鞭靴之𩔖受亦無妨者伏以貨賄之利耳目之娛人間常情孰不貪恱況臣性實凡鄙寧忘顧私家本窶貧安能無欲所以深自刻慎勉脩廉隅者葢由負戴厚恩尸竊大任既不克導揚風教致俗清淳又未能減息征徭濟人窮困若無恥懼更啓賄門是忘憂國之誠仍速焚身之禍由是茍行特操杜絶交私誠知無補大猷所冀免貽深累陛下責臣以清謹太過斯謂皇明陛下慮事之不通有乖理道或恐貪惏之輩務逞無厭之求巧陳異端惑亂聖聽稽諸事實則甚不然夫以胥吏末流苞苴微貺茍或違道臣猶知慙況乎公卿大臣之間方岳連帥之任豈資納賄然後致誠若因財利交歡是以姑息為事既乖直道必有過求遂之則法度浸􅈥阻之則觖望彌甚為害如此國何賴焉髙祖太宗著法垂制監臨受賄盈尺有刑陛下每發徳音敷宥下土大辟之屬皆䝉滌除唯於犯贓往往不赦豈不以貪饕為弊殘蠧最深至於士吏之微尚當嚴禁矧居風化之首反可通行凡上之所為以導下也上所不為以檢下也上所不為而下或為之然後可以設峻防寘明辟若上為之而下亦為之固其理也又可禁乎今吏有受監臨之賄者則以為罪不可容朝廷之制四方所監臨也而宰司公受其賄是亦無恥而不恕者歟孔子曰大臣不可不敬也是人之表也邇臣不可不慎也是人之道也表傾則影曲道僻則行邪若大臣邇臣可以受財則庶長宷寮孰為不可朝廷取之於方鎮方鎮復取之於州州取之於縣縣取之於鄉鄉将安取哉是皆出於疲人之肝腦筋髓耳自大盜猾夏耗斁生人天下常屯百萬之師坐受衣食農夫蠶婦凍而織餒而耕殫力忍死以供十倍之賦日日引頸望覩昇平之化恵恤之恩凡四十九年矣洊屬多故有加無瘳持利權食厚祿者當憂隠忸怩憫愧黎庶而又交通私賄扇起貪風是令巳困之甿重遭過分之擾陛下尚以為鞭靴之𩔖受亦無妨若使天下納賂唯有二三宰臣四方誅求止於鞭靴細物行之不足以傷化絶之不足以利人則臣固巳微抑私心将順睿㫖矣若使國家致理必資饋遺通情辭之足以失天下之心受之足以濟天下之務則臣固亦不避汙行助我聖功矣臣所以未敢奉詔冒昧塵煩者審知此道不唯於無益必有甚損故也亦冀陛下詳察其理普澄其源𢎞清浄無欲之風守慈儉不貪之寳是将感人心而天下服何有事情不通之患乎夫貨賄上行則賞罰之柄失貪求下布則廉恥之道衰何者善惡不分功過無辯以貨賄之多少為課績之重輕守道闕供或時致怨招累求得當欲可以釋罪賈榮忍行刻剥者見謂公忠巧飾玩好者獲稱才智此謂賞罰之柄失也上好利則下思聚斂上求賄則下肆侵蟊不懐愧心但逞私欲遞相企効習以成風閭閻日殘紀綱日壊不可以禮義勸不可以刑法懲此由廉恥之道衰也作法於涼其弊猶貪作法於貪其弊斯亂利於小者必害於大易於始者必悔於終賄道一開展轉滋甚鞭靴不巳必及衣裘衣裘不巳必及幣帛幣帛不巳必及車輿車輿不巳必及金璧日見可欲何能自窒于心巳與交私固難中絶其意是以涓流不止谿壑成災毫末既差丘山聚釁自昔國家敗亡多矣何曽有以約失之者乎臣竊料郡府之不願行賄於朝廷猶鄉閭之不願輸貨於郡府也但以行之者有利不行者有虞故為安身保位之謀不得不行耳夫豈樂而行之哉假如四方俱賂於朝廷朝廷受其三而却其一有所受有所却二端相反則遇却者或有意疑乎見拒而不通焉四方俱賂於朝廷朝廷俱辭而不受則咸知不受者乃朝廷之常理耳適所以服其心而誘其善復何嫌阻之有乎陛下若謂問遺可以通物情絜矩不足敦理化則自建中以來股肱耳目之間葢常有交利行私者矣乃其所也陛下何尤焉陛下嗣位之初躬行節儉郡國無來獻朝廷無私求行李無黷貨之人邇臣無受賂之事四方風動幾致清平旋以刑峻賦繁兵連禍結理功中否至化未凝洎大憝殱夷皇運興復征伐之役頗息於前時清約之風亦虧於往日此則雖革一弊亦喪一美焉曩興師徒人困暴賦今罷征伐人困私求是乃殘瘁之餘永無蘇息之望使萬方黎獻當陛下休明之代不登富夀不洽雍熙追懐前脩寔用心熱而議者反以納賂通情之理以惑陛下斯不亦誣上行私之甚者乎夫天下公器也王綱大權也執大權者不任以小數守公器者不徇於私情任小數而御大權則忿戾之禍起徇私情以持公器則姦亂之釁生故春秋傳曰在上位者洒濯其心以待之而後可以理人言私曲之不可以莅衆庶也又曰國家之敗由官邪也官之失徳寵賂彰也君人者将昭徳塞違以臨照百官百官於是乎戒懼而不敢易紀律言賄利之不可以化百官也又曰長國家者非無賄之難無令名之難諸侯之賄聚於公室則諸侯貳言貪欲之不可以懐諸侯也古之懐諸侯者葢有其道矣唯不務賄然後得之禮記云凡為天下有九經其一曰理亂持危朝聘以時厚往而薄來所以懐諸侯也是知懐撫之道貴徳賤財於往也則厚其贈送之資於來也則薄其贄幣之禮訓人以尊讓示人以不貪始於朝廷行於郡國廉節之風漸廣侵漁之害不萌里閭獲安郡國斯乂朝廷益尊所謂化自上流理由下濟近者恱服而逺者歸懐是皆無賄之致也及夫王綱浸壊徳化陵夷然後滅公議而徇私情盛誅求而崇饋獻故禮記曰天子微諸侯僭於是相覿以貨相賂以利而天下之禮亂矣是知傷風害禮莫甚於私暴物殘人莫大於賂利於絶私去賄者莫先於君主務於愛人助理者莫切於輔臣然則君主輔臣之間固不可語及於私賄矣況又躬行乎臣以受恩特深志欲巨細裨補茍懐疑慮不敢因循亦賴遭逢聖明庶得竭盡愚直所以毎事獻替不以犯忤為虞意懇詞繁伏用慚悚謹奏憲宗元和元年校書郎元稹舉才識兼茂明於體用對策曰臣方病近古之策不行而陛下幸及之是天下人人之福也微臣其敢忍意而不言乎且臣聞之古者以言賦納豈虛美哉葢用之也是以益賛禹而班師說復王而作命斯皆用言之大略也洎漢文帝羞不若堯舜始以策求士乃天下郡國有賢良之貢入焉塞詔者􅄯錯而巳至武帝然後董仲舒出然而卒不能選用條對施之天下夫用其策不棄其人以其利於時也得其人而棄其策又何為乎若此則徒設試言之科而不得用言之實矣降及魏晉朝成而暮敗之不暇又惡足言其策哉我唐列聖君臨策天下之士者多矣異時莫不光揚其名聲寵綏其爵禄然而曽不聞天下之人曰某日天子降某問得某士行某策濟某功抑不知直言之詔屢下而直言之士不出耶亦不知直言之士屢出而直言之策不用耶今陛下肇臨海内務切黎元求斥已之至言責著明之確論實命說代言之盛意也微臣何足以奉承之然臣所以上愚對皆以指病陳術為典要不以舉凡體論而飾詞事茍便人雖繁必獻言茍詣理雖鄙必書固不足以副陛下懇惻之誠庶可盡微臣體用之目伏願陛下以臣此策委之有司茍或可觀施之天下使天下之人曰惜哉漢文雖以策求士迨我明天子然後能以策濟人則臣始終之􅂅畢矣如或言不適用策不便時則臣有瞽聖欺天之罪将寘於典刑陛下固不得而宥之矣亦臣之所甘心焉臣伏讀聖䇿乃見陛下念禮樂之寖微恤黎人之重困責復盛濟艱之術酌推恩寓令之宜斯皆當今之急病也微臣敢不别白而書之昔我髙祖武皇帝撥去亂政我太宗文皇帝鞬櫜干戈被之以仁風潤之以膏露戢天下之役而天下之人安省天下之刑而天下之人夀通天下之志而天下之氣和總天下之賢而天下之衆理理故敬讓之節著和故懽愛之教行是以革三王之所因兼六代之盡美稱至徳者舉文皇以代堯舜豈異事哉有誠信以将之也明皇即位實號中興方其任姚宋而右賢能也雖禹湯文武之俗不能過焉四十年間刑罰不試人用滋殖四海太和於是舉升中告禪之儀則封泰山而秩嵩華念嵗巡時邁之典則去咸鎬而朝洛陽禮既畢行物亦隨耗天寳之後徭戍漸興氣盛而微理固然也曩時之乳哺而有之者一朝為兵殱之兵興巳來至今為梗兵興則戸減戸減則地荒地荒則賦重賦重則人貧人貧則逋役逃征之罪多而𣙜管權宜之法用矣今陛下躬親本務首問羣儒念禮樂之不興慮升平之未復斯誠天下之人将絶復完之日也微臣何幸而對揚之微臣以為将欲興禮樂必在富黎人将欲富黎人必在息兵革息兵之術臣請兩言之夫古之所謂銷兵革者非謂幅裂其旗章鑠鍊其鋒刃而巳也葢誠信著於上則忠孝行於下富夀立於内則夷狄和於外夷狄和則邊鄙之兵息富夀立則爭奪之患銷爭奪之患銷則和順之心作和順之心作則禮樂之道興矣此先王脩政戢兵興禮樂富黎人之大略也陛下必欲責臣以詳究之術臣又請指事以明之夫食力之不充雖神農教天下不能無餒殍之人矣是以古之不農而食之者四而巳吏有斷察之明則食之軍有臨敵之勇則食之工有便人之巧則食之商有通物之志則食之是四者率皆明者勇者巧者智者之事也百天下之人無一二焉茍不能於此者不農則不得食不績則不得衣人之情迫食於中則作業興於外是以㳺食者恒寡而務本者恒多豈强之哉彼易安而此難及也今之是事則不然吏理無考課之明卒伍廢簡稽之實百貨極淫巧之工列肆盡并兼之賈加以依浮圖者無去華絶俗之真而有抗役逃刑之寵假戎服者無超乗挽强之勇而有横擊詬吏之驕是以十天下之人九為逰食惷朴愚謹不能自遷者而後依於農此又非他彼逸而易安此勞而難處也是以㳺惰之戸嵗増而耕桑之賦愈重曩時之十室共輸而猶不給者今且聚之於一夫矣雖有慈恵之長仁隠之吏尚不能存若憯斷擊搏之則将轉移於溝壑矣今之課吏者以賦斂無逋負為上第以臣觀之足陛下之賦者誠所以害陛下之人耳若此則農桑之用既如是㳺惰之衆又如此耕桑之賦重則戀本之心薄逰惰之戸衆則富庶之道乖此必然之理也今陛下誠能明考課之法減冗食之徒絶雕蟲不急之工罷商賈并兼之業潔浮圖之行峻簡稽之書薄農桑之征興耕戰之術則㳺惰之戸盡歸而戀本之心固矣戀本之心固則富庶之教興而貞觀開元之盛復矣若此則既往之失由前将來之虞由後在陛下懲之戒之慎之乆之而已至於主父偃乗七國併吞之後将分裂而矯推恩管夷吾當諸侯爭奪之時先詐力而行寓令皆一時之權術也豈可謂明白四達若日月而懸於聖朝哉臣雖賤庸尚不敢陳王道於帝皇之日況權術乎此臣之所以甚羞也故不及而詳究言之臣伏覩聖策又見陛下以為執契則羣下用情躬親則庶官無黨以漢元尚儒學而衰盛業謂光武課吏職而昧通方以臣思之皆不然也夫委之於下而用其情葢考績之科廢而清濁之流濫矣尚儒術而衰盛業章句之學興經緯之文喪也課吏職而昧通方葢苛察之法行而㑹計之期速也臣請條列而言之夫神農之斵耒耜教闢耨所以墾良田而殖嘉榖也然而不能遏稂莠之滋焉其所以待之者芟夷之而已堯之闢朝廷擇百揆而所以殖舜禹而種臯陶也然而不能遏共工驩兠之逆焉其所以辨之者放棄殛誅之而巳神農不以稂莠滋而廢耒耜之用故能存用器之方唐堯不以四罪進而奪舜禹之任故能終任賢之道若此則陛下之所顧如何耳豈可謂任之必不可哉至於考績之科廢章句之學興經緯之道衰㑹計之期速皆當今之極弊也幸陛下及漢元之事臣請據數以終之今國家之所謂興儒術者豈不以有通經文字之科乎其所謂通經者不過於覆射數字明義者纔至於辨析章條是以中第者嵗盈百數而通經之士蔑然以是為通經通經固若是乎哉至於工文自試者又不過於雕詞鏤句之才搜摘絶離之學茍或出於此者則公卿可坐至郎署可俯求崇樹風聲不由殿最連科者進速累㨗者位髙擯嘿因循者為清流行法莅官者為俗吏以是為儒術儒術又若是乎哉其所謂課吏職者豈不以朝廷有遷次進拔之用乎臣切觀今之備朝選而不由文字者百無一二焉夫施衆網以加一禽尚不能得況張一目以羅萬品而望其飛者走者大者小者盡出乎其間其可得乎哉以此察羣吏羣吏又可察乎哉茍或不可察又可任之而絶其私乎哉此所以陛下将執契而歎用情念垂衣而懼不理葢臣所謂課察之道不明也陛下誠能使禮部以兩科求士凡自唐禮六典律令凡國家之制度之書者用至於九經歴代史能專其一者悉得謂之學士以鐶貫大義與道合符者為上第口習文理者次之其詩賦判論以文自試者皆得謂之文士以經緯今古理中是非者為上第藻繢雅麗者次之凡自布衣達於末𨽻在朝者悉得以兩科求仕禮部第其髙下歸之吏部而寵秩之若此則儒術之道興而經緯之文盛矣吏部罷書判身言之選設三式以任人一曰校能之式毎嵗以朝右崇重者一人與吏部郎校天下羣吏之理最在第一至第三者校定日據其功状而登進之牧宰字人之官籍之為理者則上賞行焉若此則遷次之道明而遲速之分定矣二曰紀功之式毎嵗羣吏之理最在第四者籍而書之滿嵗吏部㑹集而授署之若此則殿最之道存而清濁之流異矣三曰任賢之式每嵗内自僕射至於羣有司之正長外至于㢘問節制者各舉備朝選者一人外自牧守内至于百執事之立於朝者各舉吏郡縣者一人因其所舉而授任之辨其考績而賞罰之不舉賢為不精不精與不察之罪同若此則保任之法行而賢不肖之位殊矣四曰叙常之式其有業不通於學才不應於文政不登於最行不加於人則限以停年課資之格而役任之若此則叙用之式恒而尺寸之才無所棄矣兩科立則羣才遂四式行則庶官當陛下又執左契以御之握樞以正之委庶官如心目之運支體豈支體運而無効於心目乎察羣才如明鏡之形美惡豈美惡形而逃隠於明鑑乎然後陛下闢四門使可言之路通明四目以天下之目視達四聦以天下之耳聽不私其心以百姓心為心端拱巖廊髙居深視以冕旒自蔽而秋毫必察以黈纊塞耳而芥動必聞則彼漢元章句之儒光武督責之術又惡足繁為陛下言之哉且臣聞之聖人在上人不夭札若臣者生未及壮戴陛下為君仁夀歡康未始有極何忽自苦隳肝膽而言天下之事乎誠以國家兵興以來天下之人憯怛悲愁五十年矣自陛下陟位之後戴白之老莫不泣血而話開元之政臣恐此輩不及見陛下功成理定之化而先沒恨於窮泉此臣之所以汲汲於私心也陛下能不憐察其意乎謹對七年春延英奏對畢因問及國朝故事上甚恱宰臣李吉甫希意奏言陛下威徳布洽華夷瞻戴時巳太平可事歡樂上大笑李絳奏曰昔太宗之理天下也房𤣥齡杜如晦輔相聖徳魏徴王珪規諌闕失有温彦愽戴胄以彌縫政事有李靖李勣訓整戎旅故夷狄畏服寰宇大安天下之人仰戴聖徳猶孜孜而求理開導直言旰食宵衣不敢漏溢豈復當時務於自逸乎陛下視今日事何如漢文時上曰安敢望漢文哉且文帝是漢之明主恭儉節用身衣皁綈清净為理刑措不用戎狄面内致干戈偃戢賈誼上言猶以當時如措火積薪之下火未然而以為安其憂危如此今中夏河南北申奏有五十餘州法令所不及徳澤所未加兼西戎侵盜近以涇隴靈寕等州為界去京城逺者不過千里近者數百里烽燧相接邊界屢警此方是陛下燋心涸慮廢寢忘飡之時豈可髙枕而卧也加以頃年水旱廪藏尚虚陛下憂勞頻軫聖念誠是延訪智略之士揀拔賢良之臣精求濟時之規光大中興之業又安可事於歡樂而自縱哉伏惟陛下誡之上欣然曰誠如卿言朕所以一錢不敢妄費一日不敢懈怠者祇為此也卿言正當朕意當與卿等圖之上退朝顧謂左右中官曰適來吉甫奏言時巳太平勸我為樂李綘屢陳今古并言事宜是憂危之事吉甫諂佞恱我顔色李綘忠正骨鯁言必逺大真宰相也中人皆賀十三年丹王府諮議參軍分司東都李勃上言至徳以來天下思致治平訖今不稱者人倦而不知變天以變通之運遺陛下陛下順而革之則悠乆宜乗平蔡之勢以徳羈服恒兖無不濟則恩威暢矣昔舜禹以匹夫宅四海其烈如彼今以五聖營太平其難如此臣恐宰相羣臣藴晦術略啓沃有所未盡使陛下翹然思文武禹湯而不獲也宜正六官叙九疇脩王制月令崇孝弟敦九族廣諫路黜選舉復俊造定四民省抑佛老明刑行令治兵禦戎􅂅下宰相公卿大夫議博引海内名儒大開學館與羣臣叅講據經稽古應時便俗者使切磋周詳作制度合宣父繼周之言史館脩撰臣李翺言臣素陋幸得守職史官以紀録是非為事夫通前古治亂安危之大本者實史臣之大本也臣雖愚敢懐畏罪之心而不脩其職竊見陛下即位以來招懐不廷之臣誅寇賊十餘事刷五聖之憤恥為後代之根本自古中興之盛孰有及者自臣得奉詔朝謁以來親見聖徳之所不可及亦巳多矣至如淄青生口夏侯澄等四十七人皆所宜誅斬者也陛下知逆賊所逼脅質其父母妻子而驅之使戰其陷惡逆非其本心赦而不誅因詔田𢎞正随材任使其欲歸妻子父母者縱而不禁臣竊聞夏侯澄等既得生歸淄青賊兵聞之莫不懐陛下好生寛恵之徳而遂無拒戰官軍之心矣劉悟所以能一夕而擒斬師道者以三軍之心皆以苦師道而思陛下之徳故能不費日而成大功也此聖徳之所不可及者一也今嵗闗中夏麥甚盛陛下哀民之窮困特下明詔放夏稅約十萬石朝臣相顧皆有喜色百姓歌樂遍於草野此謂聖徳之不可及者二也韓𢎞獻女樂陛下不受却又賜之昔者魯用孔子齊人恐懼遺之女樂季桓子受之君臣共觀而三日不朝故孔子去魯陛下超然獨見遂以歸之此聖徳之所不可及者三也出李宗奭妻女於掖廷以荘宅却賜沈遵師聖明寛恕億兆欣感者不可備紀若下詔出令一一皆𩔖於此武徳貞觀不難及太平可反掌而致矣臣以為定禍亂者武功也能復制度興太平者文徳也非武功不能以定禍亂非文徳不能以致太平今陛下既以武功平禍亂定海内能為其難者矣若革去弊事復髙祖太宗之舊制用忠正而不疑屏邪佞而不近改稅法不督錢而納布帛絶進獻以寛百姓稅租之重則下不困厚邊兵以息蕃戎侵掠之患則天下安數引見待制官問以時事以通壅蔽之路則下情達凡此六者政之根本太平之所興陛下既已能行其難者矣又何惜不速其易為者乎以臣伏覩陛下上聖之姿也如不惑近習容恱之詞選用骨鯁正直之臣與之脩復故事而行之以興太平可不勞而功成也若一日不以為事臣恐大功之後易生逸樂而羣臣進言者必曰天下既以太平矣陛下可以髙枕而為宴樂矣若如此則髙祖太宗之制度不可以復矣制度不復則太平未可以遽至矣臣竊惜陛下聖質當可興之時而尚謙讓未為也臣謹條䟽興復太平大略六事别白於後若行此六者五年不變臣必知百姓樂康蕃虜入侍天垂景星地湧澧泉鳳凰鳴于山林麒麟逰於苑囿此無他和氣之所感也詩曰先人有言詢于芻蕘伏惟陛下明聖思博聞天下之事以助政理故臣敢忘其愞愚而盡忠焉無任感恩激切之至謹奉表以聞其一曰用忠正臣聞國之所以興者主能信任大臣臣能以忠正輔主故忠正者百行之宗也大臣忠正則小臣莫敢不為正矣小臣莫敢不為正則天下後進之士皆樂行忠正之道矣後進之士皆樂行忠正之道是王化之本太平之事也今之語者必曰知人邪正是堯舜之所難也焉得知忠正之人而用之邪臣以為察忠正之人葢有術焉能盡言憂國而不希恩容者此忠正之徒也夫忠正之人亦各自有黨𩔖邪臣嫉而讒之而且以為相朋黨矣夫舜禹稷契之相稱賛也不為朋顔閔之相往也不為黨皆在於講道徳仁義而巳邪人嫉而讒之且以為朋黨用以惑時主聽從古以來皆有之矣故蕭望之周堪劉向謀退許史竟為邪臣所勝漢元帝不能辨而終任用邪臣漢室之衰始於元帝此不可不察也故聽其言能數逆於耳者忠正之臣也雖任之雜以邪佞之臣則太平必不能成矣故孔子曰十室之邑必有忠信如丘者焉故忠信之人不難有也在陛下辨而用之各以其𩔖進之而巳臣故曰用忠正而不疑則功徳成其二曰屏姦佞臣聞孔子逺佞人言不可以共為國也凡自古姦佞之人可辨也皆不知大體不懐逺慮務於利巳貪富貴固榮寵而巳矣必好甘言諂辭以希人主之欲主之所貴因而賢之主之所怒因而罪之主好利則獻畜聚斂剥之計主好聲色則開妖艷鄭衛之路主好神仙則通燒煉變化之術望主之色希主之意順主之言而奉承之人主恱其不違已因而親之以至於事失怨生而不聞也若事失怨生而不聞其危也深矣自古奸邪之人未有不如此者也然則雖堯舜為君稷契為臣而雜之以奸邪之人則太平必不可興而危事潛生矣所謂奸邪之臣者榮夷公費無極太宰嚭王子蘭王鳳張禹許敬宗楊再思李義甫李林甫盧杞裴延齡之比是也姦邪之臣信用大則亡國小則壊法度而亂生矣今之語者必曰知人邪正是堯舜之所難也焉得知其邪佞而去之耶臣以為察姦佞之人亦有術焉主之所欲皆順不違又從而承奉先後之者此姦佞之人也不去之雖用稷契為相不能以致太平矣故人主之任姦佞則耳目壅蔽耳目壅蔽則過不聞而忠正不進矣臣故曰屏姦佞而不近則視聽聦明其三曰改稅法臣以為自建中元年初定兩稅至今四十年矣當時絹一匹為錢四千米一斗為錢二百稅戸之輸十千者為絹二匹半而足矣今稅額如故而粟帛日賤錢益加重絹一匹價不過八百米一斗不過五十稅戸之輸十千者為絹十有二匹然後可況又督其錢使之賤賣者耶假令官雜虚估以受之尚猶為絹八匹乃僅可滿十千之數是為比建中之初為稅加三倍矣雖明詔屢下哀恤元元不改其法終無所救然物極宜變正當斯時推本弊同錢重而督之於百姓之所生也錢者官司所鑄粟帛者農之所出今乃使農人賤賣粟帛易錢入官是豈非顛倒而取其無者耶由是豪家大商皆多積錢以逐輕重故農人日困末業日増一年水旱百姓菜色家無滿嵗之食況有三年之畜乎百姓無三年之積而望太平之興亦未可也今若詔天下不問逺近一切令不督見錢皆納布帛凡官司出納以布帛為準幅廣不得一尺九寸長不過四十尺比兩稅之初猶為重加一尺然百姓自重得輕必樂而易輸不敢復望如建中之初矣行之三五年臣必知農人漸有畜積雖有一年水旱未有菜色父母夫婦能相保矣若稅法如舊不速改更雖神農后稷復生教人耕織勤不失時亦不能躋於充足矣故臣曰改稅法不督錢而納布帛則百姓足其四曰絶進獻臣以為自建中以來稅法不更百姓之困巳備於前篇矣今節度觀察使之進獻必曰軍府羨餘不取於百姓且供軍及留州錢各有定額若非兵士闕數不填及減刻所給則錢帛非天之所雨也非如泉之可涌而生也不取於百姓将安取之哉故有作官店以居商賈者有釀酒而官沽者其它雜率巧設名號是皆奪百姓之利虧三代之法公託進獻因得自成其私甚非太平之事也比年天下皆厚留度支錢蓄兵士者以中原之有寇賊也今吳元濟李師道皆梟斬矣中原無虞而蓄兵如故以耗百姓臣以為非是也若選達吏事之臣三五人往諸道與其節度使團練使言每道要留兵數以備鎮守責其兵士見在實數因使其逃亡不補自可以毎年十銷一矣告之以中原無事蕃夷可虞毎道宜配兵若干人取其衣糧以賜邊兵而召戰士使邊兵實則蕃夷不足慮也夫錢帛皆國家之錢帛也宜作明法以取之是也若使通達吏事之臣往使焉雖其将帥之不誠盡者亦不敢有所隠矣今受進獻則節度使團練使皆多方刻下以為蓄聚其自為私者三分其所進獻者一分也是豈非兩稅之外又加稅焉百姓之所不樂其業而父子夫婦或有不能相養矣父子夫婦不能相養而望太平之興雖婦人女子皆知其未可也臣故曰絶進獻以寛百姓稅租之重則下不困其五曰厚邊兵臣以為方今中原無事其慮者蕃戎與北虜而巳議者以為邊備尚虚皆可憂矣兵法有之曰不恃敵之不來恃此之不可勝今國家威武達于四夷其不敢犯邊為寇雖巳明矣然蕃戎不可測也安識禮義而必其不為寇哉且去嵗犯邊足以明矣臣以為使縁邊諸節度使特共召戰士十萬人毎嵗不過費錢一百萬貫則邊備實矣邊上有召戰士之聲達於四夷四夷心服不敢為盜矣四夷不敢為盜邉鄙之人得無兵戰之苦則京師可髙枕而視矣其六曰數引見待制官問以時事原本闕穆宗時甞問貞觀開元治道最盛何致而然中書侍郎同中書門下平章事崔植曰太宗資上聖興民間知百姓疾苦故厲精思治又以房𤣥齡杜如晦魏徴王珪為之佐君明臣忠聖賢相維治致升平固其宜也𤣥宗在天后時身踐憂患既即位得姚崇宋璟此二人蚤夜孜孜納君於道璟甞手寫尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖稍怠于勤左右不復箴規姦臣日用事以致于敗昔徳宗甞問先臣祐甫開元天寳事先臣具道治亂所以然在童丱記其說今􅂅陛下以無逸為元龜則天下幸甚中書舍人柳公權與六學士對便殿帝稱漢文帝恭儉因舉袂曰此三澣矣學士皆賀獨公權無言帝問之對曰人主當進賢退不肖納諫諍明賞罰服澣濯之衣此小節耳非有益治道者異日與周墀同對論事不阿墀為惴恐公權益不奪帝徐曰卿有諍臣風可屈居諫議大夫乃自舍人下遷仍為學士知制誥文宗太和二年劉蕡舉賢良方正能直言極諫䇿曰朕聞古先哲王之治也𤣥黙無為端拱司契陶甿心以居簡凝日用於不宰厚下以立本推誠而建中繇是天人通隂陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎不可及巳三代令王質文迭救百氏滋熾風流寖微自漢以降足言葢寡朕顧唯昧道祗荷丕構奉若謨訓不敢怠荒任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之洪緒而心有未達行有未孚由中及外闕政斯廣是以人不率化氣或堙阨災旱竟嵗播植愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也将以觀治而豪猾踰檢太學明教之源也期於變風而生徒惰業列郡在乎頒條而干禁或未絶百工在乎按度而淫巧或未息俗恬風靡積訛成蠧其擇官濟治也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於治思所以究此繆盭致之治平兹心浩然若涉淵水故前詔有司博延羣彦佇啓宿懵冀臻時雍子大夫皆識達古今志在康濟造廷待問副朕虚懐必當箴治之闕辨政之疵明綱條之致紊稽庶富之所急何施革於前弊何澤恵於下土何脩而古治可近何道而和氣克充推之本源著於條對至若夷吾輕重之權孰輔於治嚴尤底定之䇿孰叶於時元凱之考課何先叔子之克平何務惟此龜鑑擇乎中庸斯在洽聞朕将親覽進士劉蕡對曰臣誠不佞有正國致君之術無位而不得行有犯顔敢諫之心無路而不得達懐憤欝抑思有時而發常欲與庶人議于道商賈謗于市得通上聽一悟主心雖被祅言之罪無所悔況逢陛下詢求過闕咨訪嘉謀制詔中外舉直言極諌臣辱斯舉專承大問敢不悉意以言至於上所忌時所禁權幸所諱惡有司所與奪臣愚不識伏惟陛下少加優容不使聖時有讜言受戮者天下之幸也謹昧死以對伏以聖䇿有思古先之治念𤣥黙之化将欲通天地以濟俗和隂陽以煦物見陛下慮道之深也臣以為哲王之治其則不逺惟致之之道何如耳伏以聖䇿有祗荷丕構而不敢荒寧奉若謨訓而㒺有怠忽見陛下憂勞之至也若夫任賢惕厲宵衣旰食宜絀左右之纎佞進股肱之大臣若夫追蹤三五紹復祖宗宜鑒前古之興亡明當代之成敗心有未達以下情蔽而不得上通行有未孚以上澤壅而不得下浹欲人之化在脩已以先之欲氣之和在遂性以導之救災旱在致精神廣播殖在視食力國廪罕畜本乎冗食尚繁吏道多端本乎選用失當豪猾踰檢繇中外之法殊生徒惰業繇學校之官廢列郡干禁繇授任非人百工淫巧繇制度不立伏以聖䇿有擇官濟治之心阜財發號之歎見陛下教化之本也且進人以行則枝葉安有難辨乎防下以禮則恥格安有不形乎念生寡而食衆可罷斥惰㳺念令煩而治鮮要察其行否博延羣彦􅂅陛下必納其言造廷待問則小臣安敢愛死伏以聖䇿有求賢箴闕之言審政辨疵之令見陛下咨訪之勤也遂小臣斥姦豪之志則弊革于前守陛下念康濟之心則恵敷于下邪正之道分而治古可近禮樂之方著而和氣克充至若夷吾之法非皇王之權嚴尤所陳無最上之䇿元凱之所先不若唐堯考績叔子之所務不若虞舜舞干且非大徳之中庸上聖之龜鑑又何足為陛下道之哉或有以繋安危之機兆存亡之變者臣請披肝膽為陛下别白而重言之臣前所謂哲王之治其則不逺者在陛下慎思之力行之始終不懈而已謹按春秋元者氣之始也春者嵗之元也春秋以元加於嵗以春加於王明王者當奉若天道以謹其始也又舉時以終嵗舉月以終時春秋雖無事必書首月以存時明王者當奉承天之道以謹其終也王者動作始終必法於天者以其運行不息也陛下能謹其始又能謹其終懋而脩之勤而行之則執契以居簡無為而不宰廣立本之大業崇建中之盛徳安有三代循環之弊百偽滋熾之漸乎臣故曰唯致之之道何如耳臣前所謂若夫任賢惕厲宵衣旰食宜絀左右之纎佞進股肱之大臣實以陛下憂勞之至也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危陛下不以國家存亡社稷安危之䇿而降於清問臣未知陛下以布衣之臣不足與定大計耶或萬機之勤有所未至也不然何宜憂而不憂乎臣以為陛下所先憂者宫闈将變社稷将危天下将傾四海将亂此四者國家巳然之兆故臣謂聖慮宜先及之夫帝業艱難而成之固不可容易而守之太祖肇其基髙祖勤其績太宗定其業𤣥宗繼其明至於陛下二百餘載其間聖明相因擾亂繼作未有不用賢士近正人而能興者或一日不念則顛覆大器宗廟之恥萬古為恨臣謹按春秋人君之道在體元以居正昔董仲舒為漢武帝言之畧矣有未盡者臣得為陛下備論之夫繼故不書即位所以正其始也終必書所終之地所以正其終也故為君者所發必正言所履必正道所居必正位所近必正人春秋閽弑呉子餘祭書其名譏䟽逺賢士昵刑人有不君之道伏惟陛下思祖宗開國之勤念春秋繼故之誡明法度之端則發正言履正道杜篡弑之漸則居正位近正人逺刀鋸之殘親骨鯁之直輔相得以顓其任庶寮得以守其官柰何以䙝近五六人緫天下大政外專陛下之命内竊陛下之權威懾朝廷勢傾海内羣臣莫敢指其状天子不得制其心禍稔蕭墻姦生帷幄臣恐曹節侯覽復生於今日此宫闈将變也臣按春秋定公元年春王不言正月者春秋以為先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺専廢立之權陷先帝不得正其終致陛下不得正其始況太子未立郊祀未脩将相之職不歸名器之宜不定此社稷将危也臣謹按春秋王札子殺召伯毛伯春秋之義兩不相殺不書此書者重其專王命也夫天之所授者在命君之所存者在令操其命而失之者是不君也侵其命而專之者是不臣也君不君臣不臣此天下所以将傾也臣按春秋晉趙鞅以晉陽之兵叛入于晉書其歸者能逐君側之惡以安其君故春秋善之今威柄陵夷藩臣䟦扈有不達人臣大節而首亂者將以安君為名不究春秋之微稱兵者以逐惡為義則典刑不繇天子征伐必自諸侯此海内之将亂也故樊噲排闥而雪涕袁盎當車而抗辭京房發憤以殞身竇武不顧而畢命此皆陛下明知之矣臣謹按春秋晉狐射姑殺陽處父書襄公殺之者以其君漏言也襄公不能固隂重之機處父所以及殘賊之禍故春秋非之夫上漏其情則下不敢盡意上泄其事則下不敢盡言故傳有造膝詭辭之文易有失身害成之戒今公卿大臣非不欲為陛下言之慮陛下不能用也忽而不用必泄其言臣下既言而不行必嬰其禍適足鉗直臣之口而重姦臣之威是以欲盡其言則有失身之懼欲盡其意則有害成之憂裴囬欝塞以須陛下感悟然後盡其啓沃陛下何不聽朝之餘時御便殿召當世賢相老臣訪持變扶危之謀求定傾捄亂之術塞隂邪之路屏䙝狎之臣制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不得治其前當治其後不得正其始當正其終則可以䖍奉典謨克承丕構終任賢之效無宵旰之憂矣臣前所謂追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗者臣聞堯禹之為君而天下大治者以能任九官四岳十二牧不失其舉不貳其業不侵其職居官唯其能左右唯其賢元凱在下雖微而必舉四凶在朝雖强而必誅考其安危明其取舍至秦二世漢元成咸􅂅措國如唐虞致身如堯舜而終敗亡者以其不見安危之機不知取捨之道不任大臣不辨姦人不親忠良不逺讒佞也伏惟陛下察唐虞所以興而景行於前鑒秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今綱紀未絶典刑猶在人誰不欲致身為王臣致時為升平陛下何忽而不用邪又有居官非其能左右非其賢惡如四凶詐如趙髙姦如恭顯陛下何憚而不去耶神器固有歸天命固有分祖宗固有靈忠臣固有心陛下其念之哉昔秦之亡也失於彊暴漢之亡也失於微弱彊暴則姦臣畏死而害上微弱則彊臣竊權而震主臣伏見敬宗不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之洪業可紹三五之遐軌可追矣臣前所謂陛下心有所未達以下情塞而不能上通行有所未孚以上澤壅而不得下浹且百姓有塗炭之苦陛下無由而知陛下有子恵之心百姓無由而信臣謹按春秋書梁亡不書取者梁自亡也以其思慮昏而耳目塞上出惡政人為寇盜皆不知其所以終自取其滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也茍百姓不存則雖社稷不得固其重社稷不重則人君不得保其尊故治天下者不可不知百姓之情夫百姓者陛下之赤子陛下宜令慈仁者視育之如保傅焉如乳哺焉如師之教導焉故人之於上也恭之如神明愛之如父母今或不然陛下親近貴倖分曹建署補除卒吏召致賔客因其貨賄假以聲勢大者統藩方小者為守牧居上無清恵之政而有饕餮之害居下無忠誠之節而有姦欺之罪故人之於上也畏之如豺狼惡之如讎敵今海内困窮䖏䖏流散飢者不得食寒者不得衣鰥寡孤獨不得存老幼疾病不得養加以國權兵柄顓於左右貪臣聚斂以固寵姦吏因縁而弄法寃痛之聲上達於九天下入於九泉鬼神為之怨怒隂陽為之愆錯君門萬重不得告訴士人無所歸化百姓無所歸命官亂人貧盜賊並起土崩之勢憂在旦夕即不幸因之以病癘繼之以凶荒陳勝呉廣不獨起於秦赤眉黄巾不獨生於漢臣所以為陛下發憤扼腕痛心泣血也如此則百姓有塗炭之苦陛下何繇而知之乎陛下有子恵之心百姓安得而信之乎使陛下行有所未孚心有所未達固其然也臣聞漢元帝即位之初更制七十餘事其心甚誠其稱甚美然紀綱日紊國祚日衰姦宄日彊黎元日困繇不能擇賢明而任之失其操柄也自陛下即位憂勤兆庶屢降徳音四海之内莫不抗首而長息自喜復生於死亡之中也伏惟陛下慎終如始以塞四方之望誠能揭國柄以歸于相持兵柄以歸于将去貪臣聚斂之政除姦吏因縁之害惟忠賢是近惟正直是用内寵便僻無所聽焉選清慎之官擇仁恵之長敏之以利煦之以和教之以孝慈導之以徳義去耳目之塞通上下之情俾萬國懽康兆庶蘇息即心無不達而行無不孚矣臣前所謂欲人之化也在脩已以先之臣聞徳以脩巳教以導人脩之也則人不勸而自立導之也則人不教而率從君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈立教之㫖未盡其方邪夫立教之方在乎君以明制之臣以忠行之君以知人為明臣以正時為忠知人則任賢而去邪正時則固本而守法賢不任則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則人流法不守則政散而欲教之必至化之必行不可得也陛下能斥姦邪而不私其左右舉賢正而不遺其䟽逺則化浹朝廷矣愛人而敦本分職而奉法脩其身以及其人始於中而成於外則化行天下矣臣前所謂欲氣之和也在遂其性以導之者當納人於仁夀也夫欲人之仁夀也在立制度脩教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化脩則爭競息爭競息則刑罰清刑罰清則人安矣既富矣則仁義興焉既安矣則夀考至焉仁義之心感於下和平之氣應於上故災害不作休祥洊臻四方底寕萬物咸遂矣臣前所謂捄災旱在乎致精誠者臣謹按春秋魯僖公一年之中三書不雨者以其人君有恤人之志也文公三年之中一書不雨者以其人君無閔人之心也故僖致誠而旱不害物文無卹閔而變則成災陛下有閔人之志則無成災之變矣臣前所謂廣播殖在乎視食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與力皆勤矣􅂅陛下廢百事之用以廣三時之務則播殖不愆矣臣前所謂國廪罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴于齊春秋譏其無九年之蓄一年不登而百姓飢臣􅂅斥㳺惰之人以篤耕殖省不急之費以贍黎元則廪蓄不乏矣臣前所謂吏道多端本乎選用失當者繇國家取人不盡其材任人不明其要故也今陛下之用人也求其聲而不求其實故人之趨進也務其末而不務其本臣􅂅覈考課之實定遷叙之制則多端之吏息矣臣前所謂豪猾踰檢繇中外之法殊者以其官禁不一也臣謹按春秋齊桓公盟諸侯而不日而葵丘之盟特以日者美其能宣明天子之禁率奉王官之法故春秋備而書之然則官者五帝三王之所建也法者髙祖太宗之所制也法宜畫一官宜正名今又分外官中官之貟立南司北司之局或犯禁於南則亡命於北或正刑於外則破律於中法出多門人無所措由兵農勢異而中外法殊也臣聞古者因井田以制軍賦間農事以脩武備提封約卒乘之數命将在公卿之列故兵農一致而文武同方以保乂邦家式遏亂畧太宗置府兵臺省軍衛文武參掌閒嵗則櫜弓力穡有事則釋耒荷戈所以脩復古制不廢舊物今則不然夏官不知兵籍止於奉朝請六軍不主武事止於養階勲軍容合中官之政戎律附内臣之職首一戴武弁疾文吏如仇讎足一蹈軍門視農夫如草芥謀不足以剪除姦兇而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵害閭里羈紲藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有蔵姦觀釁之心無伏節死難之誼豈先王經文緯武之㫖邪臣􅂅陛下貫文武之道均兵農之功正貴賤之名一中外之法還軍衛之職脩省署之官近崇貞觀之風逺復成周之制自邦畿以形下國始天子而達諸侯可以制猾姦之彊無踰檢之患矣臣前所謂生徒惰業繇學校之官廢者葢國家貴其禄賤其能先其事後其行故庶官乏通經之學諸生無脩業之心矣臣前所謂列郡干禁繇授任非人者臣以為刺史之任治亂之根本繫焉朝廷之法制在焉權可以御豪彊恩可以恵孤寡彊可以禦姦冦政可以移風俗其将校曽更戰陣及功臣子弟請隨宜酬賞茍無治人之術者不當任此官即絶干禁之患矣臣前所謂百工淫巧繇制度不立者臣請以官位禄秩制其器用車服禁以金銀珠玉錦繡雕鏤不蓄於私室則無蕩心之巧矣臣前所謂辨枝葉者繇巧言以詢行也臣前所謂形于恥格者繇道徳而齊禮也臣前所謂念生寡而食衆可罷斥㳺惰者巳備於前矣臣前所謂令煩而治鮮要察其行否者臣聞號令者治國之具也君審而出之臣奉而行之或虧益止留罪在不赦今陛下令煩而治鮮得非揚之者有蔽欺乎臣前所謂博延羣彦􅂅陛下必納其言造廷待問則小臣其敢愛死者昔􅄯錯為漢削諸侯非不知禍之将至忠臣之心壮夫之節茍利社稷死無悔焉臣非不知言發而禍應計行而身僇葢痛社稷之危哀生人之悔豈忍姑息時忌竊陛下一命之寵哉昔龍逢死而啓商比干死而啓周韓非死而啓漢陳蕃死而啓魏今臣之來也有司或不敢薦臣之言陛下又無以察臣之心退必戮於權臣之手臣幸得從四子㳺於地下固臣之􅂅也所不知殺臣者臣死之後将孰為啓之哉至如人主之闕政教之疵前日之弊臣既言之矣若乃流下土之恵脩近古之治而致和平者在陛下行之而巳然上之所陳者實以臣親承聖問敢不條對雖臣之愚以為未極教化之大端皇王之要道伏惟陛下事天地以教人恭奉宗廟以教人孝養髙年以教人悌長字百姓以教人慈幼調元氣以煦育扇太和以仁夀可以逍遥無為垂拱成化至若念陶鈞之道在擇宰相以任之使權造化之柄念保定之功在擇将帥以任之使脩閫外之寄念百度之未正在擇庶官而任之使顓職業之守念百姓之怨痛在擇良吏以任之使明恵養之術自然言足以為天下教動足以為天下法仁足以勸善義足以禁非又何必宵衣旰食勞神惕慮然後致治哉李石為給事中累進戸部侍郎以本官同中書門下平章事仍領度支它日紫宸殿宰相進及陛帝喟然而歎石進曰陛下之歎臣固未諭敢問所從帝曰朕歎治之難也且朕即位十年不能得治本故前嵗有疾今兹震擾皆自取之夫託億兆之上不能以美利及百姓焉得乆無事乎石曰陛下罪巳當然然責治太早雖十年孜孜養徳適成爾天下治不治要自今觀之且人之氣志雖賢聖猶有優劣故仲尼稱三十而立四十而不惑陛下春秋少非起人間也而知人情偽今自視何如即位時帝曰有間矣石曰古之聖賢必觀書以考察往行然後成治功陛下積十年盛徳日新然尚所以疾戾震驚者天其固陛下之志乎誠務脩将來之政視太宗致昇平之期猶不為晚帝曰行之得至乎石曰今四海夷一唯登拔才良使小大各任其職愛人節用國有餘力下不加賦太平之術也于時大臣新族死嵗苦寒外情不安帝曰人心未舒何也石曰刑殺太甚則致隂沴比鄭注多募鳳翔兵至今誅索不已臣恐縁以生變請下詔慰安之帝曰善又問柰何致太平之難鄭覃曰欲天下治莫若恤人石即賛曰恤之得術尚何太平之難陛下節用度去冗食簿最不得措其姦則百司治百司治天下安矣帝戚然曰我思貞觀開元時以視今日即氣拂吾膺石曰治道本於上而下㒺敢不率帝曰不然張元昌為左街副使而用金唾壺比坐事誅之吾聞禁中有金鳥錦袍二昔𤣥宗幸温泉與楊貴妃衣之今富人時時有之石曰毛玠以清徳為魏尚書而人不敢鮮衣美食況天子獨不可為法乎是時宰相吏卒因内變多死詔江西湖南索募直􅂇召士力石建言宰相左右天子教化若徇正忘私宗廟神靈猶當祐之雖有盜無害也有如挾姦自欺植權黨害正直雖加之防鬼得以誅無所事於召募請直以金吾為衛歴代名臣奏議巻二十八
