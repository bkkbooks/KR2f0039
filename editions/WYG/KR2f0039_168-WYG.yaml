body:
  text: 歴代名臣奏議卷一百六十八明楊士竒等撰選舉宋哲宗時殿中侍御史呂陶上奏曰臣竊以今日任官之弊其輕且濫者惟郡守為甚也封疆千里生聚萬衆休戚所繫而不問能否一以資格用之為半刺兩任有薦者二人則得之矣侮法慢令戕民害物十郡之中常有二三暗塞不治又有一二舉天下億兆之衆十分而言失其惠飬者將半矣承流宣化乂何望焉方今朝廷清明百度講舉優勞元元以固邦本惟恐一夫不獲而牧守之弊紛繷至此甚可痛也昔兩漢盛時政平訟理居安其業者皆循吏之効唐之貞觀開元號為善治太宗亦嘗自擇刺史志其姓名於屏風而用之當時名臣如馬周張九齡輩皆極言刺史不可輕任載在史冊足為龜鑑前日朝廷患監司不得其人乃詔近臣舉用而監司之選稍稍清矣至於郡守尤為親民略而未議是棄民也臣伏請詔内外待制太中大夫已上於通判資序人内嵗舉堪知州二人朝廷更加審察送吏部籍記名氏凡遇有闕先差有舉主者如資任未及即差權知其次方差資序合入人庶幾牧守之職有以庇民循吏之風無愧前古陶又上奏曰臣伏謂朝廷差除之法大别有三自兩府而下至侍從官悉禀聖㫖然後除授此中書不敢專也自卿監而下及已經進擢或寄禄至中散大夫者皆由堂除此吏部不敢預也自朝議大夫而下受常調差遣者皆歸吏部此中書不可侵也法度之設至詳至宻所以防大臣之專恣革小人之僥倖也恭惟神宗在御深究其弊凡堂選奏舉之類並悉罷去以示大公之道始因去年八月中執政申請以繁劇去處重法地分為詞收占吏部所用知州通判知縣并在京庫務寺監丞闕六十餘處並歸中書取㫖選差之後除吏之弊私徇寖多今天下州郡除别京大府并元係堂除處及取㫖選差并元属八路指射外其存於吏部以待常調者數極少而員極多待次之士逺至二三年近須一嵗或有一闕可就則中書取而差他人矣或受一闕而去則中書又奪而惠他人矣處州之胡宗質睦州之李孝廣滁州之陳知新光州之燕介均州之劉斐永州之吳潜此六郡者皆非元係堂除去處而中書取以差也吏部差王照知海州欒子元通判瀛州方䝉知咸平縣皆數月矣中書乃以石麟之知海州胡及通判瀛州孫純知咸平縣是皆奪而惠之也若謂胡宗質李孝廣陳知新自提舉得替燕介係中散大夫石麟之曽任太常官皆非吏部可差之人則當契勘堂除州郡而差不當取吏部見使之闕及奪他人之已受者與也若謂朝廷慎擇庶官執政惟才是用則劉斐曽任知州以失入死罪責降吳潜曽為運判以刻剥苛細罷官皆非所謂才者而近方牽復並先除郡士論諠沸已謂不平然又有甚於此者盖胡及嘗為開封判官以不能檢慎去職纔送吏部便得堂除孫純以受􅂍致罪止縁宰相之妻族乃受畿邑而皆奪他人之有而與之胡及衝欒子元孫純衝方䝉王說前知徐州附㑹吳居厚掊斂害物得替歸部忽除省郡為人所彈乃罷其職今則差知宻州陸師淵前知開封縣稅入中限猶未造簿以弛慢衝替今則差知宿州且胡及送吏部王說罷省郎皆是朝廷顯責詔墨未乾而中書已有選授告命之出不述所因陸師淵與劉斐吳潜均是衝替而師淵又得元係堂除大郡謂知宿州私曲縱横莫甚於此是陛下黜之則執政升之陛下退之則執政進之怨歸於上而恩出於下非今日之所宜有也夫威福者天子之所得專法度者大臣之所當守今大臣進退羣吏一出已意盖不守法度而欲專威福矣臣恐朝廷不尊而紀綱紊亂當此之時宜戒其漸也伏願聖慈將合係堂除闕編為一等今後如有合得堂除之人只於前項去處定差其曽經擢用而非次差替罷或責降牽復不送吏部者於合得堂除人之下别為一等依名次先後與前項差遣並不得於吏部取闕差授及衝已授之人所有元豐八年八月取㫖選差條貫乞賜刪改刑部侍郎王覿上䟽曰臣伏見吏部四選吏員之冗莫甚今日而任使之際欲求乎秉徳守義赴功稱職之人則常患其少論者惑之夫十室之邑必有忠信況今承平之久陳力就列者以數萬計其間藴道義負才能富學術者宜亦多矣然猶以少為患者何耶盖内不足者急於人知彼其賢廉既不汲汲於求知則朝廷之上知之豈易哉孔子曰舉爾所知雖使孔子為政而欲得賢才之多亦不過使在位之人各舉其所知而已今夫舉陞陟改官者徒以應格近嵗十科之薦所薦既衆而朝廷難於必用其科遂輕而縉紳視以為空文其勢然也臣竊謂科格固不可廢若於科格之外間詔中外臣僚素有才望其言可信者使特薦其所知一二人而試以事夫人臣既以特㫖薦士為寵而不敢忽又以其所主而觀其所為主者之能否而賞黜之則應詔者孰不任責庶幾人才之出也覿為右司諫時又上䟽曰臣伏覩今年正月十七日勅節文舉經明行修人委州縣當職官同狀保任申監司再加考察仍於𤼵解前牒報本州與充本州解額臣竊以朝廷設經明行修之舉非徒欲以得其人而任使又將勸後進之士篤於學行也今若以州縣所舉之人充本州解額則臣恐未足以勸學行而先有以敗風俗矣夫古之所謂士者莫不以廉退自重也自以科舉取士而士之不能以㢘退自重亦已久矣今天下州郡應舉者甚多而解額至狹凡挾筴讀書而未免於干禄者莫不有競進之心也使經明行脩而被舉者不在解額之中則後進之士視其鄉之經明行脩者其勢必須出力推薦而人人有君子長者之風矣使經明行脩而被舉者遂奪其解額則後進之士視其鄉之經明行脩者其勢必有内懐忌疾而謗讟詆訐無不為者矣如此則學者之完人益少而經明行脩之舉不幾於廢乎盖必然之理也臣故曰若以州縣所舉之人充本州解額則臣恐未足以勸學行而先有以敗風俗也夫天下之風俗澆薄淳厚不同豈皆其天性哉顧所以道之如何爾臣伏望聖慈指揮於前項勅内改與充本州解額六字作於本州解額外解𤼵庶可以久行而無弊也貼黄臣兼看詳前項勅内逐路所舉各有人數惟不及畿内恐是漏落不可謂王畿之内而無經明行脩之人也亦乞指揮添入覿又上奏曰臣竊以祖宗來臺諫闕一員詔近臣薦二員召對便殿去取選任一出上意執政大臣不得干預盖臺諫所以司察大臣過失若出大臣則朋附之人至忠讜之路塞矣人主雖欲明目逹聰虚心聽納嘉謀嘉猷何縁而至哉近者監察御史闕二員命翰林學士御史中丞共薦六人今聞所召者二人而已未審出於陛下之意為復出宰執之意邪若出陛下之意則可然未應祖宗故事若出宰執進擬則權歸大臣朝政闕失誰復擬議此源既開臣恐異日臺諫皆出大臣之門而陛下孤立矣書曰惟辟作福惟辟作威傳曰慶賞刑威曰君願陛下念兹在兹今後近臣奉詔薦舉臺諫官並須召對親閱人才去取獨出聖斷庶使祖宗故事不廢臺諫得人為多畢仲游上言曰右臣今年三月准宣命入内充進士覆考官及臣自守官以來累䝉差入試院對讀考校熟見舉人科塲文字頗知詩賦經義取士利害之實自朝廷議改科舉欲具奏陳而臣備員府僚事務繁併猝猝無須㬰之暇得盡愚見今臣獲解府事待罪儒館而竊聞士大夫所論科舉之利害猶未有定說尚詩賦者則指經義為易習難考而不言詩賦之名卑於經義尊經義者則指詩賦為雕刻無用而不思經義於取士其實如何詩賦經義之利害固以未決而又匿其所短暴其所長此所以更相不信而無定說也夫詩賦非經義之比易見也使舉子為聲病偶儷之文章以應有司之求而與讀聖人之經原聖人之意而立其說則道之尊卑志之逺近不待言而可明矣然詩賦之行幾五六百嵗而未厭自隋唐以來髙才逹識立功名有道藝者往往出於其間經義之行無二十年天下已有倦色而亟復詩賦豈尊且逺者不足以濟務而卑且近者反宜於世耶盍亦要其本末終始而論之盖經術者古學也可以謀道而不可以為科舉之用詩賦者今學也可以為科舉之用而不足以謀道今若使天下之士不為科舉而治經且如輔嗣之治易康成之治禮安國之治書杜預之治春秋則雖舉隋唐以來詩賦豈能及四人之所治如納四人於今日科舉之間則亦化為舉子之文章矣詩賦經義之利害至此而見臣請明言之揚子曰天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣盖言聖人之經幽深閎逺如天地之髙厚非可以小道治也孔子曰加我數年五十以學易可以無大過矣而漢唐諸儒亦多抱經白首然後名家近世如孫復治春秋居太山者四十年始能貫穿自成一說人猶以為未盡春秋之㫖意而熈寧元豐之進士今年治經明年則用以應舉謂傳注之學不足決得失則益以新說新說不足決得失則益以佛老之書至於分章析字旁引曲取以求合於有司聖人之經術遂但為卜利禄之具要之應舉得第而已豈有正心誠意治經術謀聖人之道者哉臣愚不知以經義為科舉者欲尊經術耶欲卑經術耶欲卑經術固無此理然使舉子分章析字旁引曲取以求合有司而為卜利禄之具則是欲尊經術而反卑之詩賦之學固無益於聖人之經而聖人之經術不為舉子之所亂尚自若也士之有志者不害於科舉之外正心誠意治經謀道若曰治經為佛老之學與分章析字旁引曲取者皆前在位者之所使今而不為何損於經則既以經術為卜利禄之具使求合於有司得失之慮交於目前臣恐後日在位者之所使有甚於前日者矣要之為術不善則己矣豈可逆知其無損此詩賦經義之利害可得論者一也夫舉子之取名第止問得失而已既問得失則不得不趣時所尚故王安石在位則經義欲合王安石司馬光在位則經義欲合司馬光其小者不可勝論臣請論其大者王安石不治春秋熈寧元豐之間經義遂廢春秋一科而學者亦諱春秋不言司馬光治春秋元祐之間經義皆班班傅㑹春秋以為說此可謂正心誠意治經謀道之人乎於聖人之道有損乎有益乎雖然不可以責舉子也彼應舉則必有得失之慮既慮得失則不得不以經義取合於在位之人王安石在位而經義不合安石則有司不敢取知有司不取而應舉則不若勿應而已矣天下應舉者無慮數十萬人而人人皆以經義茍合於在位以卜利禄則風俗傷敗操行陵夷未必不由科舉之致故詩賦雖為無用然作圜丘象天賦則止賦圜丘象天而已矣作堯舜性仁賦則止賦堯舜性仁而已矣雖欲取合於在位之人其路無由而取合固亦無益所以不為難臣者曰廢經義而用詩賦詩賦不可以取合若以策論合於在位則如之何臣應曰以策論合於在位固所不幸而又益以經義使為合豈嫌取合之少乎然科舉之體常以詩賦經義定去留策論定髙下彼於去留之間無以取合則為髙下而取合者必少故治平之前以䇿論合在位者未有如熈寧之後以經義合在位者甚衆也此詩賦經義之利害可得而論者二也夫取士之道古必有之鄉舉里選是也今朝廷若復鄉舉里選方得取士之正是求賢也是求能也如謂鄉舉里選未可猝行則今日之取士非敢必曰求賢亦非敢必曰求能特為科舉不可廢而立法耳若曰求賢則詩賦經義均不知人之賢否若曰求能則詩賦經義均不知人之能不能既賢能不可以科舉得則詩賦經義姑問其為科舉之後便與不便耳盖詩賦雖若無足為者而題目或出於經或出於史或出於諸子百家而習詩賦者必須渉獵九經汎觀子史知其節目精華始可從事而策論之中又自有經義試取舉人未罷詩賦之前策論之中所說經義與既罷詩賦之後專治經義者校之相去㡬何而渉獵汎觀必粗知前言往行治亂得失而聰明特起之士因此自見於世者甚衆由是觀之詩賦雖若無用而其術能使舉人粗知前言往行治亂得失而通於事是其名則卑而施於科舉偶得其術而便耳至於經義則不然為書者不為詩為詩者不為易為易者不為禮為禮者不為春秋是知一經而四經不知也雖有策論而科舉之下論題自見所出易於為文策則人人皆挾策括以待有司不出掌握舉可問者具在其中非所以廣學問也雖多聞博識之士世自不乏而所治之書粗通策問有備遂可以得名第其勢不假留意於其他書史若非常從舊日科舉之人則所謂前言往行治亂得失雖衆所共知者亦或不知至有謂賈山為賈誼以建武為武帝年號者由是觀之經義雖如近古而用經義應舉之人反昧於前言往行治亂得失殆無以自見於世是經義之名則尊而施之科舉偶非其術而不便耳而又自隋唐以來髙才逹識立功名有道藝者往往出於詩賦之科似有成効今朝廷必欲倣古以興賢能則請俟復鄉舉里選如止為科舉不可廢而立法則異日設官分職凡所與天下之治者必多由科舉而進非細事也則詩賦經義之學不識當取施之科舉已見成効與知其術偶得者為之耶當取施之科舉未見成効與知其術之不便者為之耶此詩賦經義之利害可得而論者三也至於詩賦則有聲律而易見經義則是散文而難考詩賦所出之題取於諸書而無窮經義所問之目各從本經而有盡詩賦則題目百變必是自作之文經義則理趣相闗可使他人之作詩賦則雖為預備足見舉人倉猝之才經義則易為牢籠多是舉人在外所撰文字詩賦則唯校工拙有司無適莫之心經義則各尚專門試官多用偏見而去取如此小小利害難以究述今朝廷雖復詩賦以取士而詩賦之上猶存經義是詩賦經義之利害均也若以經義為可行則無事復詩賦若以經義為不可行則既復詩賦而又略存經義不過欲舉人詞賦之外更知經耳雖然又非術也昔科舉之未變也詩賦以觀其詞采策論以觀其經術與時務論題出於六經是經術也策問而及經㫖是亦經術也豈必名為大義則謂之經術不名為大義則不謂之經術盖昔之策論雖非大義而策問論題或出於易或出於禮或出於詩書或出於春秋無所不出則舉人亦無所不留意雖非純於經者而詩書禮易春秋必泛逹也今既詩賦之外人治一經而為大義則策問論題必須避舉人專治而不敢出於五經之中舉人知策問論題不出於五經所以備有司者約矣則亦將為書者不為詩為詩者不為易為易者不為禮為禮者不為春秋是亦知一而四經不知也雖有詩賦而舉人為詩賦留意與為經㫖而留意五經者取舍不同是誘之使淺驅之令狹也為今之䇿莫若專復詩賦以取士而不累於科舉以進治經之人專復詩賦以取士則隋唐以來髙才逹識功名道藝或可以兼至不累於科舉以進治經之人則聖人之經㫖庶不為科舉之所亂若論今之舉子已習經義雖復詩賦而有不能為者則願設嘉祐明經之科以待不能為詩賦之人所取之數與推恩薄厚少増損於嘉祐之制則人無難矣盖明經近於經義而術與今日經義利害不同取明經常少取進士常多則天下之應舉者將自化而為詩賦不以法制而漸復其􅃇術之善者也以經義取士實雖不至而名近於古以詩賦取士實則㡬矣而名不及於經義今區區者徒見朝廷罷經義復詩賦則以為好古而已矣而不知經義之不可累以科舉也既罷之後當詔天下求窮經謀道且如胡瑗孫復石介者置以為博士教官使傳道於諸生則今日之所尚纔得經術之正而無科舉之累道之美者也盖舊政已廢而復之者戒其於暴名近古而改則民疑然則專復詩賦以取士設嘉祐明經之科以待不能為詩賦之人而又詔天下求窮經謀道不累科舉者使傳道諸生雖理之所在亦以為不暴而釋民疑也惓惓之忠唯朝廷裁擇貼黄臣竊見朝廷平日舉事雖事體不大猶多循用故常慎於更改盖慮更改之後恐有意外利害非目前思慮之所能盡不若循用故常之為便也今以詩賦取士所從來逺且以本朝言之如呂端李沆王旦魯宗道王曽韓琦之徒百十年之間凡所與安社稷治天下者多出於昔日進士之科其為故常亦大矣然則凡今之所以論科舉者非止為科舉而已盖知異日亦將求柱石股肱於其間非細事也如度用經義決能取士過於詩賦之所取則今日所論詩賦經義皆是餘事勿恤可也若理難臆度恐誤朝廷久逺用人之計即乞更加審諦以平日舉事慎於更改為意詩賦策論四事之中詩賦最難修習自非超異絶出之才作詩賦兼策論以從科舉未見其有餘力也今既為詩賦策論而又於詩賦之前増大義一塲深慮舉人力所不逮兼自來科塲逼試之時皆息力飬銳入試第一塲詩賦至次日入論文字不多方可第三日却試策今於詩賦之前先以大義一塲困之至次日纔試詩賦不唯塲第太多考校増冗兼舉人就試必所患苦然朝廷復詩賦又試大義者必以大義為經術之故但舉人習詩賦止欲得名第習大義亦止欲得名第皆借以為干利禄之具非真所謂經術也與詩賦何異殿中侍御史陳次升上奏曰臣竊以朝廷之事宰執得以行之䑓諫得以言之上下相維彼此相制以防私徇以杜奸惑祖宗以來選任䑓諫官宰執不得干預若有妨嫌必須囬避所以存大公之道立太平之基矣近來除授多出於大臣去取不縁於聖選切恐相為朋黨相為比周蔽人主之聰明為權臣之肘腋兹事最大實繫治體國家安危之機其要在此臣欲乞今後䑓諫官若有除授罷去三省不得進擬悉出宸𠂻批降指揮所貴言路得人消阿附之風開忠讜之路不勝幸甚李薦上論曰臣聞薦得其人則受賞薦非其人則被罰古之道也必有賞以勸之然後可使舉善必有罰以威之然後可禁朋邪獨賞而已則競獵虚名冀僥倖以自進獨罰而已則雖有真賢皆疑畏而不敢進之鄂秋之於蕭何一言而爵通侯驩兜之於共工一言而放崇山何勸沮之較著也夫人之情喜賞而惡罰國之格難賞而易罰人之所喜國之所難也人之所惡國之所易也可以賞而賞之緩則人必相謂曰慎無舉賢徒勞人爾賢則欲我舉而恩則吝也況無賞乎茍可罰而必罰之則人必相謂曰慎無舉賢徒多累耳賞則未必予人而罰則信也況專用罰乎且古者進賢受上賞蔽賢䝉顯戮貢士之諸侯則至于加九錫不貢士之諸侯至于黜爵地以是推之惟恐有賢而不進也堯求若采而啓明之嚚訟乃被薦於放齊堯求治洪水而伯鯀之方命乃被薦於四嶽即其昧於知人則宜若驩兜之放可也堯則置而不問舜則不復罪之何也盖人實不易知而嚚訟方命其惡在外而易辨静言象恭其惡在心而難知以堯舜之聖猶且憂而畏之則放齊四嶽之過舉豈與驩兜同科以是推之雖或有罰猶當恕之有賢而或進退之未當恕之勿責則是聖人之於天下求賢之意深罪不肖之意淺用賞之意多用罰之意簡願治之意詳施刑之意略故忠厚之化格於民心而天下無遺賢今也於薦舉之制疑若罪不肖之意深求賢之意淺用罰之意嚴用賞之意簡施刑之意詳求治之意略如之何致天下之賢以為吾用哉故有司妄測朝廷之意例以進賢為末𤼵有罪為本𤼵有罪為有功無過進賢為有過無功朝廷授我黜陟之權者本以我為徤吏耳不若峻法以寡恩朝廷俾我薦舉之職者特循故事耳今又無賞而有罰故雖有薦舉之名而無薦舉之實非徒無實而又市之何哉借若甲為長吏於此乙為長吏於彼甲舉乙之所私然後乙舉甲之所私非有意於所舉之人也甲乙自為施報也惟其自施報乃假手自舉其所私非謂市之歟夫薦舉之意豈不欲得有道之士乎有道之士安能容恱以自謙豈不欲得孤寒之士乎孤寒之士其誰憐卹而為援故凡所充舉類皆肉食者締交黨與彌縫倡和之人未嘗聞拔一滯淹擢一豪傑真可用者如是欲羣賢連茹而升有是理乎陛下聦明灼知邪正如别白黒則古之人所謂逹視其所舉又曰觀近臣以其所為主者不待臣言而後喻也為今之計莫若先詔大臣議復薦賢之賞使天下無咎恩之議庶幾勸沮之道人皆信之然後使凡薦舉者必如擿𤼵之詳得以攷稽焉盖今天下之長吏凡所擿𤼵者必鋪陳其罪以聞于上曰某人嘗為某事可以抵罪期必抵罪而後已其所薦舉者則含糊其言假借其實文具而已未嘗鋪陳其事以聞于上曰某人嘗為某事可以任使期必任使而後已雖然固亦有鋪陳以聞上者必曰某人有幹才嘗於某處生財幾十萬某有機略嘗於某處鞫獄幾十次矣茍使薦舉之奏如擿𤼵之奏則下臣之善安有不聞逹者朝廷聞而用之後更器使踐華要必使自言曰非某所薦安能至此陳平封侯而魏無知因以受賞者旌薦之人無忘其功則其徳厚矣彼周行而封列侯自諸侯而加九錫固不可指以為格願視其舉者之髙卑量為舉主之酬奬可也以今之法所舉之人一䧟有罪則凡為舉主者坐之至有削品秩上印綬不少貸令舉主以所舉酬奬又何靳焉臣又竊以一郡論之夫一郡之内文武僚宷不啻百人而部刺史所舉之法嵗才二三而許之擿𤼵者則無員數謂凡可擿𤼵者必擿𤼵也至于薦舉奚獨不然豈使員足矣爾後雖有可舉置而勿恤嗚呼是朝廷許其蔽賢矣故坐席未温已舉所私所私皆畢餘見真可舉者則謂之曰非不知君奈何舉之人數已足矣臣願陛下既下薦賢之賞乃詔天下長吏見可舉者舉之不必限之以數或無可舉則已之又不必充數則庶幾無憾焉古昔逮今長吏以薦舉為恩下吏以犇競為俗或賣交以進已或賂人以借譽或飲食玩好以豢其親信或姑息俯傴以媚其僕御或卑詞以足恭或面柔以求恱吮癰䑛痔曽不以為羞指天誓心曽不以為媿自非宣哲見㡬之士未有不墮其彀中而謬舉矣願詔長吏以阿大夫之所以烹即墨大夫之所以封者為之龜鑑勿妄許人以為國士也必欲公舉則使下吏明具功過於考績之書無崇虚文嵗終則取諸考課之書稽攷而優劣之可舉者書其可舉之行能可黜者書其可黜之過惡揭於公堂使吏民得以議之以為可舉也然後舉之可黜也然後黜之則無僭無濫臣之說無遺慮矣然亦不可不防者天下被薦或多吏部病其難選也臣願以四科第之行同能偶也復以被薦多寡為差況朝廷必使真得其賢則又何多矣或多賢而多薦之無憚其勞此太平之光也王巖叟上言曰臣竊以人得於表裏不疑則可任事出於上下相應則易成此諸府之辟召羣司之表舉所以不可廢也自辟舉之法罷而用選格可以見功過而不可以見人才中材患之於是不得已而有踏逐奏差申差之格踏逐者隂用舉官之實而明削同罪非善法也選才薦能而曰踏逐非雅名也必當擇用之之地而不重用之之道非深計也委人以權而不容舉其所知非通術也臣伏願聖慈特賜指揮復内官司舉官法以暢公議校書郎李昭玘進策曰璆琳琅玕皆美質也彫之琢之至於成器而後可施楩楠豫章皆良榦也長之飬之至於成材而後可用人受天地之中以生性無不善也充其性以至於成人然後可以治人未能成人也雖公綽之不欲冉求之藝聖人猶不取者禮樂不足故也先王能使人必至於成人固有術焉謹學校以教之而已先王之學皆所以明人倫也能明人倫然後可以盡人道盡人道然後可以治人事故入使長之出使治之者還以同民之善而已方其教之也或三嵗賔興或終身不齒雖庶人之子孫積問學正身行属於禮義則歸之卿士大夫雖卿士大夫之子孫不能積問學正身行属於禮義則歸之庶人此所以責人之必成俟人之必至也自離經辨志至於敬業樂羣自敬業樂羣至於博習親師自博習親師至於論學取友自論學取友至於知類通逹彊立而不反謂之大成未能通逹則知不足以應物未能彊立則仁不足以守身先王責人必至於如此之詳者盖人之行已也自非四十而不惑則是非之理去就之義猶不保其往也升於鄉則升於司徒升於司徒則升於學升於學則升於司馬由秀而選由選而俊由俊而造由造而進不躐等不陵節論定然後官任官然後爵位定然後禄先王之取人必至於如此之久者盖聽其言觀其行非一日之察也故士知學之可樂不知學之可已知仕之可欲不知仕之可求進取退捨以俟天命人人安於為學而樂於循理考之則有成徳任之則有成効三代所以成王業者此道素行也自漢武帝開設學校増置博士廣弟子員射策決科勸以官禄學者寖盛異端日滋六經之說人自獻於其君而操以為禽犢性命之理䘮於破道之言聖賢之迹滅於浮名之行利禄使然也陛下嘗詔師儒開廣學校修正經義𤼵古人精微之藴袪百年陳腐之說道徳之義性命之理著見簡策使天下學者一其祈嚮㑹其歸宿足以見天地之純古人之大體不溺於支離蹇淺之弊而又慎選講官開析餘義使疑斯明窒斯通虚而往實而歸其於教人可謂至矣陛下聦明淵懿出於徳性問學智慮𤼵於天縱萬㡬之暇周覽墳籍始稽之以驗物又操之以決事天人之道帝王之業固已自得於成心矣間諭大臣專意學校慨然思得豪傑之士與之都俞經畫以躋時於三代之隆凡試言博士上書公車者躬自考覈或擢之以髙第或官之以不次其於好士可謂篤矣然而承學之士經術未甚明徳行未甚厚志意不修風義不肅未足以應陛下寤寐虚已之求以其好學之志不能勝其祿利之心故也夫軒冕在前韋褐在後雖子夏不能忘交戰之患利動其心故也子張學干禄孔子告之以言寡尤行寡悔祿在其中矣使漆雕開仕曰吾斯之未能信孔子說盖有志於學無志於仕然後可以盡心於聖人之道而成士君子之器今之學者弊在利禄之欲速其為道也茍於日月至焉而已矣故經術未甚明徳行未甚厚志意不修風義不肅良以此也夫聖人之言非如天地之髙逺非如鬼神之不測凡所以明天道治人事者不外吾所性而已故秦焚六經殺學士聖人之言鬱而復明者性之在人不可滅故也今之經術皆出於師儒致一之論剗革俗學𤼵明至􅄨盖天為陛下生其人人為陛下駕其說此士之去聖人千載之逺生於今而幸見者也然而有論然後能議有議然後能辨見近而不及逺聞一而不知二適人之適而不自適其適得人之得而不自得其得由是思索不精爾昔有梓人為鐻者其技甚賤然猶三日而不敢懐慶賞爵禄五日而不敢懐非譽巧拙者致其精也乃若萬物之理萬理之變可以坐觀可以意得必曰思之而已思之所入與神為一非神之使然也精之至也茍能如此利祿不足動也陛下欲取士得人莫若待其教飬之久抑其進取之速使人盡心致志深造而自得然後敷奏以言明試以功庶幾作人與古無愧矣頴昌教授鄒浩上疏曰臣愚伏覩近降貢舉勅凡考進士試卷其習經術者以經術為去留其兼詞賦者以詞賦為去留其餘數塲只以品定髙下所有以四塲工拙通定去留髙下指揮更不施行臣竊惑之自先王賔興之法掃蕩不行而後世所以取天下之士一以空言而已徳行道藝不復誰何以迄于今莫之能改就令此法不行士之所務猶在言而不在實況既行乎臣見天下之士不惟有愧於其實又將有愧於其言矣何則法行之利不勝其害其弊必至於此何謂利兩科之試各以四塲故習經術者不敢忽策論習詞賦者不敢忽大義方其羣居欲無所不工則亦無所不知欲無所不知則亦無所不讀今也專以其科之所主者為去留則士止務其所知者不必雜然並習如前日之擾擾一利也士之取舍一係有司而有司之好惡又各係其所習之如何故尚經術者斥詞賦尚詞賦者斥經術尚策論者乂并二者斥之交相毁譽迄無定論而士之取中直以幸不幸爾今也嚴之以法使有適從則有司雖欲奮私意執偏見以自勝負勢有不可二利也何謂害惟知經然後工於義惟知子史然後工於策論至於詞賦則往往裒諸家之集纂六帖之類左攘右竊以速名第而一時有司固莫之能辨也且以學校兩科取士初無輕重然而不以經術應詔者已十有八九今也重以去留之法導之臣知天下之士自是以六經子史為棄物矣盖士之所急者在去留而髙下非所恤故也一害也士之品有二不待教者上智也不足教者下愚也教之則成不教之則廢中人也而中人之才滿天下今也使之一趨於不該不徧之習則是天下之士將淪胥以廢而莫之振二害也國家自慶厯以來天下州縣遍置學校自熈寧以來天下州學始命教官誠有意於以義理飬天下之才者也今一以去留揺蕩其心雖力以義理强之亦安能勝其所習然則所置學校徒為虚器所命教官徒耗廪禄顧欲化民成俗如古盛時不亦難乎三害也上自輔弼之大臣下迨州縣之小吏皆佐陛下行道者也非欲其若司馬相如枚乘沈佺期宋之問之属以文詞供奉諂頌功徳而已而乃飬之不以其道用之不以其實誰恃以成天下之務哉四害也臣愚伏覩陛下南嚮以來以天地之徳亭育萬物以日月之光别白萬微黜陟羣臣因革政令斟酌人心若合符節至取士之法最急之務者甲以為可乙以為否五六年間不知幾變今又變焉曽未足以厭天下之望臣切惜之陛下誠以其法為善胡不盡罷科塲之文只以經術詞賦試之然而不為者臣知建言之臣慮失天下之士不知有其名而失其實其失猶在也夫舉事有名而無實非朝廷之美也萬一所舉或有與是比者無乃重為聖政之累乎傳曰設教於本其弊且末設教於末其弊若何又曰為君人者謹其所好惡而已矣君好之則臣為之上行之則民從之偏於去留不可謂本已著之令不可謂非所好陛下少察臣之二利四害則得失判矣且四害之中如人才不振無以成天下之務尤為所當慮者陛下視今日之人才果有餘耶果不足耶以為不足則巖廊未嘗無輔弼左右未嘗無侍從諸路未嘗無監司州縣未嘗無守令凡中外之百執事亦未嘗不備其待選次去來吏部者又嘗倍蓰見任之數以為有餘則自任以天下之重輔導陛下與二帝三王比隆爭治者㡬人進退賢否惟其實而不汲引親舊不遺棄䟽逖以誤陛下器使者㡬人正色昌言列百官之功罪論庶事之得失務存大體而不承風㫖以自媒者幾人持舉刺之權以肅清所部而不結權貴以植私不惜孤寒以示公者㡬人承宣詔條勸課農桑使民各安其所而不飲泣於猾胥黠吏之手者㡬人夙夜修職不敢茍且冀指擿之不吾及者㡬人民貧所當富也則曰水旱如之何官冗所當澄也則曰人情不可擾人物所當求也則曰從古不乏才國用所當裕也則曰治世恥言利風俗所當厚也則曰不切於時變邊備所當嚴也則曰在徳不在兵其他覼縷臣不暇悉知要之為國謀不如謀其身為百姓慮不如慮其子孫者衆也陛下端拱一堂之上方以覆載為度固不規規然察臣之私然視朝之餘省奏報聽講讀之暇亦嘗念其所以然之故乎此不明義理之驗也夫以義理飬天下之士士方平時師聖賢談道徳其取舍去就之際若無以易其操者一日用焉猶或幡然無以副朝廷承庸之意況不知所以飬之耶董仲舒曰不素飬士而求賢才猶不琢玉而求文采臣嘗以為知言臣願陛下詔有司追用舊物以四塲工拙定去留髙下庶㡬經術策論之試不為虚名而士亦知陛下所以期之甚厚相與精白以承休徳而人才有餘豈甚難哉孔子不欲去餼羊者非為餼羊也為告朔之禮也孟子不欲毁明堂者非為明堂也為王者之政也餼羊不去則告朔之禮猶可以意推明堂不毁則王者之政猶可以迹考臣之區區實在於此臣寒鄉一鄙人也生長和氣之中沐浴仁厚之澤備員學校為日久矣重念古者工執藝事以諫之義用敢因職事所及輕犯天威冒獻瞽說惟陛下采其一得而赦其萬死則天下幸甚朱光庭上言曰臣竊以聖朝用經術取士冠越前代止是不當用王安石之學使後生習為一律不復窮究聖人之藴此為失矣若謂學經術不能為文須學詩賦而後能文臣以為不然夫六經之文可謂純粹温厚經緯天地輝光日新者也今使學者不學純粹温厚輝光六經之文而反學雕蟲篆刻童子之技豈不陋哉甚非聖朝之美事臣已上封事論列今再以經術取士之法約歸義理之文條列于左一第一塲試諸經大義六道乞令每人各治二經每經各試大義三道仍須先本注䟽之說或注䟽違聖人之意則先具注䟽所以違之之說然後斷以己見及諸家之說以義理通文采優者為上義理通文采粗者為次義理不通雖有虚文不合格一第二塲試論語孟子大義四道論孟各兩道考試之法與經同義一第三塲試論一道乞於荀子揚子文中子韓吏部文中出題一第四塲試策三道内兩道乞問歴代史一道時務省試五道三道乞問歴代史兩道問時務右臣之所陳欲令天下學者不失宗經知根本之學不專用王安石之鑿說各以己見諸家之說窮聖人之藴履之為事業𤼵之為文章下之所以脩身見於世上之所以斂材置之用皆不失道此臣所以區區為朝廷力言也伏望聖慈察臣管見如或可採特賜主張施行徽宗大觀二年翰林學士葉夣得上奏曰臣伏以陛下自親政以來凡擢士皆不以次用人之速古所未有將必得逺業大器以為社稷無窮之計士大夫蒙識擢初何嘗盡知此意其朝夕趨走大臣之門者僅志於得而已夫髙爵厚禄人之所欲得而陛下之所有也一介匹夫崛起畎畝陛下不愛所有而與之人人皆得所欲反自認以為己物爭奪傾覆唯恐其失視國家事曽不一槩於心陛下不負羣臣而羣臣負陛下者如此殆為朋黨者勝也朋黨之患世孰無之而近日為尤甚者其原本於重内而輕外且今自外召入者茍有寸長計日可取貴顯又況阿附趨佞别以智巧得之一居要位非譴謫則不去而居外任者非被罪廢黜則孤寒無援之人也雖嘗為宰相執政者亦然夫以内為榮進之塗則茍可以安于内者人誰不營以外為譴黜之所則茍可以免於外者人誰不避此所以根株連結卒不可破祖宗時宰相罷歸班或補外未㡬皆復召用中世以後乃各帶節鉞崇職至於執政從官更出迭入未嘗有間夫使不慕居内不畏處外内外去來各適其志士大夫茍知自愛則亦何必捨彼而趨此謂之朋黨非大奸邪勢亦不得不自離今欲救之莫先於此然臣既為此言不可不以身先衆人願乞為郡大觀中侍讀兼議禮武選詳議官慕容彦逢上奏曰臣伏覩神宗皇帝聖謨淵逺思患豫防雖天下治安不忘武備自熈寧中特建西學招徠羣材訓以武志凡考選升補之法皆出宸斷士之游於斯者以程文觀其器識以弓馬閱其藝能以規式察其行義其自上舍免省試者積累嵗月速不下十年須程文弓馬數在優等乂其行義可稱乃為應格雖應免省試格又從上共不得過三人其教之如此其備飬之如此其久擇之如此其精逮其授官歴任與夫取一日之長者無甚輕重其非次進拔缺然不聞甚未副建學造士之意伏望聖慈因殿試武舉進士唱名内該上舎免省試以上恩例者命執政審其人材稍加奬擢庶㡬學者嚮風㒺不激勸因以作成其材上稱任使政和中彦逄知貢舉上奏曰臣伏見神宗皇帝既廢明經學究科特設新科明法優為恩例至黄甲擬官俾先進士注諸州司法盖將以變革舊習故其初不得不然紹聖四年朝議以此法行之既久昔人之為新科者十消八九矣㤙例之優宜亦少損乃以司法及其餘判司闕衮同從上差注元符三年十二月中因省部勘當遂罷紹聖指揮更不施行臣契勘新科明法等人徒誦其書未必曉其義若以進士素不習法難以輕授司法職任則其餘判司等官或以治獄或以聽訟亦未嘗待其學而後授之也朝廷取士患不得實材果得實材何施而不可伏望聖慈特降睿㫖將來吏部注新賜及第進士出身等人並依紹聖四年四月二十三日指揮施行所貴徳澤均被上稱陛下造士之意宣和中監察御史許景衡上奏曰臣伏覩瓊䑓郎黄宗源奏乞與文士衮同殿試已降指揮者臣竊惟國家取士雖有數路唯進士一科最為清選每三年一詔天下之士試于有司比至春官奏名來上然後陛下親策于庭賜第錫服而官使之異時為名臣磊落相望皆由此出今宗源廼道家者流雖以程文擢為上舎實應前日道學之格耳今既罷道學則與其科目倂廢之矣尚何殿試之有哉況進士之所學而陛下之所策者乃當世之務禮樂刑政治天下國家之大方非宗源之所習也盖道家以清虚澹泊為宗以無為寡欲為教宜其孤髙自持不與世接今若使之操觚試藝競科甲之髙下以徼榮利則非所謂不見可欲使心不亂者也亦何取其為孤髙絶俗者乎且為黄冠師而與多士同趨大庭不知所服何服既中科目則又不知所賜者何服耶若賜以進士之袍笏則非道官所應服也若止於羽衣則命士森列而衣冠獨異實駭衆目必有竊􅀏於班綴者矣易之同人曰君子以類族辨物夫以宗源之藝業一旦輙與進士同科聮名桂籍而叙同年似非以類辨物之意也孔子曰必也正名乎臣觀陛下稽古建極親御翰墨是正百度復公少宰相之官易武選之稱辨内省六司之職立命婦八等之封名實相當典章一新誠萬世法也今獨以進士科目雜以道家流故議者紛然以為未稱陛下前日制作之意而臣區區之愚亦竊為朝廷惜之其黄宗源許令殿試指揮伏乞睿明詳酌特賜寢罷徽宗時陳次升上奏曰臣恭惟神宗皇帝待大臣有禮相與以誠至於進用人材選推士類其權必常在已而不輕付與自監司以上若闕一員宰執具人才資任合充其選者數人取自聖擇若未當聖意則睿㫖别行除授徳音渙𤼵三省奉行而已及寺監丞而下一切付之吏部用選格差注如有不當䑓察彈治當是之時威福專在乎上差除至公人無間言寒俊之士激昂自奮得人為多自後宰執欲任自己之私專竊威福之柄若有進擬指定一名除授去取不出聖意至於寺監丞而下州郡員闕多歸於堂除大公至正之道罕聞私謁奔競之風寖熾攀附宰執者有進擢之速特立自守者有留滯之嘆除目一下士論沸騰此弊不可不革也伏望聖慈紹述神考之志監司已上差除並取聖擇寺監丞而下一切付之吏部用選格差注如此則大公至正之道開私謁奔競之風息實社稷無窮之福也次升又上奏曰臣伏覩先帝修立官制允釐百工除監司省郎府推判官大藩知州已上係朝廷選差自寺監丞而下以至州縣差除一切付之吏部乂有選格次第其等差有注授優便者必以功能進而不為勢要得已授命者必可之官不為堂除易孤寒之士不附麗之人縁此皆得以自奮差除一出於至公而不縁於私徇元祐以來執政大臣欲擅國權紊亂官制自寺監丞以至主簿既出堂除吏部注授州縣員闕職位乂為朝廷取闕其有已授命之人待闕有及一二年又為堂除别差官改易甚為狼狽當是之時被命公朝拜謝私庭其職任之美者無寒門悉歸於勢要縉紳咸有不均之歎今日朝廷修復先帝政事差除尚乃因循前日之弊未足以成先帝之良法美意也伏望聖慈特降指揮自寺監丞而下一如元豐官制之初不係堂差州縣差注朝廷更不取闕庶使功能不遺於寒微職任不移於權要次升又上奏曰臣近論列乞寺監丞而下除授依官制格一切付之吏部以選格差注至今不䝉施行者臣竊惟神宗皇帝立事必有法立法必有意非茍然而已經畫官制之初必先㑹計昔日官吏俸給所費㡬何既行官制則制禄髙下必以昔日為准故省郎而上出於堂除則支全俸寺監丞而下付於吏部則支折俸今寺監丞而下既係朝廷注授皆給全俸所支既多國用益匱京師財賦窘乏其亦以此侵耗之一端況立法非特如此而已盖將以分宰執之權摧奔競之風而使寒俊之士各得以自奮吏部員闕既當則人人無留滯之嘆至公之道由是開矣今三省曽不以是為意其員闕收歸朝廷惟欲増重其權柄而已其為官擇人誠未見其實也伏望聖慈特降睿㫖令寺監丞而下差注一切送吏部以存官制良法左司諫江公望上䟽曰㢘非士之髙行也衆人好汙而亷有時而為髙退非士之清節也衆人好騖而退有時而為清人君砥礪名教敦厚風俗豈有他塗哉狃衆所好而好之咈衆所惡而惡之好惡不出於在位之私而以在位為之媒故天下翕然觀化而無東漢激揚提拂之弊清議歸上厚徳在下矣臣在鄉曲及出試吏行三十年嘗所見聞於仕宦不言財利不私貨賂不侵蟊百姓百無一二焉監司郡守有嵗薦常員三省樞宻有不次除目内外紛騖門牆如市袖書自媒背語相刺甘言䛕語日陳于前貴公心知其非亦重於謝絶既退騖立廡下折腰俛首呈露肺肝盱盱睢睢為可憐之態士節雕䘮風俗薄惡干分犯義虧名敗教有至於此今日天下所當先慮者也然由士類汙染當以士類浣濯是猶解酲必以酒也欲望朝廷應中外任仕及未該引年自謝事者學行卓然可觀尤於㢘退為多若亷退不足而文采勝者不在選焉許侍從臺省監司各薦所知一人保任終身以備選擢所舉或謬不以自首原免一人為之媒衆人知所嚮矣此激濁鎮浮之要術也伏惟陛下少留神天下幸甚通判李新乞令部使者薦進人才劄子曰臣嘗觀皇華遣使之詩而曰周爰咨諏周爰咨謀周爰咨度周爰咨詢且訪問於善為咨所咨必於忠信使事以忠信為本故也咨諸事為諏既諏矣於是謀之既謀矣度其所宜而言之咨度者以義度之也猶以為未也又徧咨而擇所從焉詢者徧咨之也陛下緫章問道游心巖廊以天下四方之逺上情有未通於下下情有未能逹於上故每道遣㢘訪使者二人分詣郡縣觀察風謡廣求民瘼凡享上不䖍犯法干禁雖遐儌異域有寃抑杜塞及吏之暴横得以直通陛下遣使臣所以寵遇者至厚矣臣愚無知叨遇將明之列奔走盡瘁靡敢遑處日夜焦心勞思所以報陛下者無非忠信之事且州郡薦士各有常格而竒才文士素為一路推稱孤寒無援沈於下僚亦有甘自晦縮不求聞知或不遇知己論薦不及士安義命莫肯競進藴藉博洽難以自暴臣欲望陛下因其奏計願賜聖訓令廣取時譽宻以名聞即乞下所部取其文藝攷察送學士院詳校有可採者陛下自擢而試之菁莪樂育教飬而後用之則真材軰出矣凡使臣廵歴所至許令投獻文字仍不得諷諭州縣沽激薦士之名庶㡬上副陛下旁求雋乂之意而萬里之逺無遺賢之歎天下幸甚歴代名臣奏議卷一百六十八
