body:
  text: 歴代名臣奏議卷一百明楊士竒等撰經國宋理宗時户部尚書真徳秀奏曰臣既以祈天永命之説為陛下獻矣區區愚忠未能自已輒復陳之比者王師深入或者往往議朝廷之過舉臣獨有以識陛下之本心蠢兹女真擾我河洛逾百年矣盛極當衰天命不僣則九廟神靈所當慰安八陵兆域所當省謁媮安不振是以弱示敵撫機不發是以權予敵此陛下之本心也以名則正以義則順議者之言無乃過乎然昔之進取者必先立規模以為一定不移之計故十年生聚十年教訓者越勾踐之規模也閉關息民務農講武三年而後出師者諸葛亮之規模也惟其規模既定確守不易凡二十三年之間非圖敵之事則不為故越師一出而吴不能支亮雖扼於强對亦能自保其國自嘉定四年冬始得北人圍燕之報有識之士知國家異日必與之鄰既與之鄰不能無隙既與之隙必至交兵臣雖愚懵亦嘗屢言於朝使當是時便立一定之畫日夜而圗之如農之有畔如工商之有業則其家計之立也乆矣何至遺陛下今日之憂邪而權臣茍安不為逺慮邉民凋耗而無以生聚邉兵脆弱而無以教訓農政不脩兵備不講而於其間繕官府以文太平受寳玉以侈符貺欺愚上下以固已權陛下一朝聽政環顧内外無一可恃者平居支持猶懼未足况以之圗大事乎且用兵莫急於人才武將能否短長臣久在逺方未之詳也姑以文臣知兵威望已著者言之舉世所屬曽不數人以天下之大而其才可以當制閫者寥寥如此豈天不生才於今代耶髙才自負者𩔖多摧殘而沮䘮中才可勉者未嘗長飬以作成是以凋零蕭索若是極也昔仁宗時賢才最盛而歐陽修猶曰今奔走四方惟一杜把使修在今日又可勝歎乎夫古之用人必有副貳而祖宗故事儲帥材於監司今内而金陵荆鄂外而兩淮襄漢僅求充數已患乏人况於副貳乎以人材之乏臣是以憂進取之難也夫用兵莫急於軍食臣在嘉定中以使事至盱眙歸以告先帝曰間者自揚而之楚自楚而之盱眙經行所及凡數百里平疇沃壤極目無際重湖陂澤渺漭相連而田野之民又皆堅悍强忍亡吴兒驕脆之態迨久住邉城訪聞益審凡兩淮形勢之利如在目中然後喟然歎曰此天賜吾國以為大江之屏障使强兵足食為進取之資也今事變一新政吾更張規模之日謂宜及今亟行經理大修墾田之政顓為一司以領之力本務農如周秦之用西土數年之後積貯充實邉民父子争欲自保因其什伍勒以軍法不待糧饟皆為精兵金湯之勢成磐石之基立則退足以守進足以攻先帝首肯至于再三使權臣有意為國經營選用得人措置有方不數年間可以坐收成效而所用守將大抵非材經理之方未嘗介意塞下之備枵然無有一旦舉兵方逺漕浙米以入江自江而入淮汴既乆湮又須陸運其為勞費甚於登天以軍食之艱臣是以憂進取之難也夫此二難皆權臣玩愒之罪非今日措置之失今日適承其弊爾承三十年之弊欲整治之度非十年不能縱令勤敏兼倍亦非三數年不可以臣觀之此正諸葛亮閉闗息民務農講武之時也願陛下亟與大臣籌之考亮行事而参之以時勢之宜立為規模確然不易其間因敵制變固有活法要當以收斂靠實為主外則張皇聲勢不為敵所輕内則嚴䕶本根不為敵所致臣雖愚懵然向為先帝言莫非恢拓之事今豈自渝素論哉時措之宜聖賢所貴惟聖明裁擇貼黄臣竊惟今日承權臣極弊之餘猶以和扁繼庸醫作壊之後也其證危其力艱若一藥之誤至于害事則人將以責和扁而不責庸醫也是為代庸醫受責也兢業戒謹尤當百倍惟陛下與大臣垂意與其用猛很之藥不若施平稳之劑臣所謂毋為敵所致者盖兵法有致人不致之說王師之出若敵人有謀縱令深入然後據守險要以扼吾之前匿兵設伏以衝吾之中鈔絶餉道以斷吾之後則吾之進退豈不為難此其當慮者一又或陽棄河南若不訾省或一年或二三年吾必大為經略之謀移兵屯運金榖置官吏繕城池竭東南事力以填無窮之壑俟吾緝理之有緒然後傾國而争之當是時欲守則為力孔艱欲棄則前功俱廢此其當慮者二又王師盡起分據諸城而内之守備必虛萬一敵以輕兵綴吾諸城之戍而徑由他道窺我三邉其將還師以自救耶抑姑堅守而勿顧耶根本之重豈容弗思此其當慮者三兵革一興調度繁夥公私之積又極殫虚不取之民將焉從出昔宋元嘉之政冠於江左而用兵曽未幾時既令王公以下至於富民各致金帛之助而科借之數猥及僧尼書之史册後以為􅀏本朝宣和間外内富盛徒以燕山之役令民出免夫錢盜賊縁之而作比年以来民貧至骨聖朝更化方事撫摩常賦猶或蠲除豈忍横有科率而外閫所需例下州縣州縣何從取辦不過責之於民彫瘵之餘豈堪朘削臣昨守温陵見㳂江制司行下收買藤麻所至皆以為苦近至三衢又聞漕司行下收買楮皮衢婺之民不勝愁歎夫籐麻楮皮細事少加抑配人已不堪設或用兵連年所須者廣欲不為科斂勢不可得人窮好亂奸宄乗之憂在腹心良非細故此其當慮者四劉裕伐燕孟昶實賛其决裕既北向内地空虚盧循徐道覆之謀猶豫乆之晉得為備幸而破賊豈曰成謀前事之師不容不鑑此其當慮者五以前二難并此五慮臣是以輒獻收斂靠實之言惟陛下察臣之忠而非茍異者明良會聚早定大計臣不勝懇懇效忠之至恭知政事兼知樞宻院事喬行簡上疏曰八陵有可朝之路中原有可復之機以大有為之資當可有為之會則事之有成固可坐而策也臣不憂師出之無功而憂事力之不可繼有功而至於不可繼則其憂深矣夫自古英君必先治内而後治外陛下視今日之内治其已舉乎其未舉乎向未攬權之前其敝凡幾今既親政之後其已更新者凡幾欲用君子則其志未盡伸欲去小人則其心未盡革上有勵精更始之意而士大夫之茍且不務任責者自若朝廷有禁包苴戒貪墨之令而州縣之黷貨不知盈厭者自如欲行楮令則外郡之新劵雖低價而莫售欲平物價則京師之百貨視舊直而不殊紀綱法度多頽弛而未張賞刑號令皆玩視而不肅此皆陛下國内之臣子猶令之而未從作之而不應乃欲開闢乾坤混一區宇制姦雄而折勍敵其能盡如吾意乎此臣之所憂者一也自古帝王欲用其民者必先得其心以為根本數十年來上下皆懐利以相接而不知有所謂義民方憾於守令緩急豈有效死勿去之人卒不愛其將校臨陳豈有奮勇直前之士蓄怨􅅤憤積於平日見難則避遇敵則奔惟利是顧遑恤其他人心如此陛下曽未有以轉移固結之遽欲驅之北嚮從事於鋒鏑忠義之心何由而發況乎境内之民困於州縣之貪刻阸於勢家之兼并饑寒之氓常欲乗時而報怨茶鹽之寇常欲伺間而竊發蕭墻之憂澟未可保萬一兵興於外綴於强敵而不得休潢池赤子復有如江閩東浙之事其將奈何夫民至愚而不可忽内郡武備單弱民之所素易也徃時江閩東浙之寇皆藉邉兵以制之今此曹猶多竄伏山谷窺伺田里彼知朝廷方有事於北方其勢不能以相及寕不又動其姦心此臣之所憂者二也自古英君規恢進取必須選將練兵豐財足食然後舉事今邉面遼闊出師非止一塗陛下之將足當一面者幾人勇而能鬭者幾人智而善謀者幾人非屈指得二三十軰恐不足以備驅馳陛下之兵能戰者幾萬分道而趨京洛者幾萬留屯而守淮襄者幾萬非按籍得二三十萬衆不足以事進取借曰帥臣威望素著以意氣招徠以功賞激勸推擇行伍即可為將接納降附即可為兵臣實未知錢糧之所從出也興師十萬日費千金千里餽糧士有饑色今之餽餫累日不已至於累月累月不已至於累嵗不知累幾千金而後可以供其費也今百姓多垂罄之室州縣多赤立之帑大軍一動厥費多端其將何以給之今陛下不愛金幣以應邉臣之求可一而不可再可再而不可三再三之後兵事未已欲中輟則廢前功欲勉強則無事力國既不足民亦不堪臣恐北方未可圗而南方已先騷動矣中原蹂踐之餘所在空曠縱使東南有米可運然道里遼逺寕免乏絶由淮而進縱有河渠可通寧無盜賊邀取之患由襄而進必須負載三十鍾而致一石亦恐未必能達若頓師千里之外糧道不繼當此之時孫吴為謀主韓彭為兵帥亦恐無以為策他日糧運不繼進退不能必勞聖慮此臣之所憂者三也願陛下堅持聖意定為國論以絶紛紛之說監察御史吴昌裔論蜀變四事狀曰臣蜀人也每恨三十年間蜀有危證而逺不得聞聞亦不實今臣冒當言責用敢痛哭流涕為陛下悉言之議者皆曰蜀經三變一敗而失四堡者董居誼之罪也二敗而棄五州者鄭損之罪也三敗而委三闗者桂如淵之罪也彼三人者職為厲階固不勝誅矣然前車已覆後車不戒徒知追咎於既徃不校變通於將來綢繆之牖不宻而田甫田洒埽之户不除而營分表北納十三州之欵西結十八族之謀家計不牢外難已至於是掠成破鳳殱沔燬梁金洋階文悉為躪藉劒以外骸骨相枕劒以内室家靡寧居者荷擔而立仕者浮家而下視昔日之變尤極其慘使非青原孤注綴敵之後三泉重屯振敵之前成都援兵應援于中則横決潰流蜀將莽為墟矣嗚呼力疲者弛擔子亂者更局今敵騎稍退之際正吾圉用暇之時所當緊作措置宻為隄備其可因仍舊習虗老嵗時而遂使蜀成不可療之疾哉臣采之公言揆之愚見謹條四事以禆一覽其一曰立規模自昔蜀之所恃専在天險昭烈斂衆拒險而老瞒遁王平實圍守險而曹爽還蕭懿立栅據險而元英走中興諸臣率承此制盖以敵騎我歩敵衆我寡平原曠野易於衝突髙山峻谷難於仰攻頓兵於萬全之地則勝致敵於坦平之處則敗且以近事言之趙彦呐屯駐青野曹友聞控扼大安是據險而守要者也張慶敗于河池何璘退于北谷是舍險而入平者也今土地日蹙事力日窮秦鞏之交不沮自止莫若經理要害收斂規模分責武臣畫地而守如紹興間吴璘在沔楊政在漢郭浩在金皆以戎司兼安撫使有軍市之租以自饒有坊塲之利以自富或立家寨或營屯田或遣正兵以守重闗或調義士以防支徑不拘文法而責以事功其大安一屯却令副戎分守敵撃東則漢軍當之撃西則沔戎當之東西受敵則以大安所屯應之制閫盡䕶於益昌土豪列置於五郡待其表裏牢宻有備無患遲以一二年後而復還承平舊規未為失計也其二曰審功賞兵法曰賞不踰時所以砥礪戰士也然賞不當功則下輕上爵臣每見李綱諸臣論崇觀以來功賞謂隕身鋒鏑之下而不䝉䘏贈竄名權要之門而反被優恩朱勔子壻未嘗從軍而受上賞劉延慶帳下望風先潰而犒銀絹賞典太濫臣竊嘆之近聞蜀之第功亦有此弊麻仲之殁十年而微賞方下田燧之殞六載而幽䘏未行李沖李寔嬰城死守而恩僅及於兩階楊把呼延域力戰陷陣而爵不踰於一級甚至何進孤軍之忠義陳寅舉家之忠節精爽若存而恩榮未稱徃徃與棄城僨軍者同科人皆以是歸咎朝廷報功之太遲而不知端坐外閫上功之不實也大抵功賞之不實有四以賄賂為重輕則不實以親故為髙下則不實以僚属先將領則不實以廝役厠行伍則不實有此四失而又有徇情媢功之患焉鶻嶺闗之㨗或謂逐饑敵耳而幕府上功超陞三級花石峽之戰實則三總管耳而帳前大犒普轉七官軍紀不章何以示勸臣恐自兹退敵之賞平賊之功或以强親愛將充之則愈不得平矣臣謂莫若宻札副閫詳酌等差有首功顯著者即日保明來上或輕重不同者限半月審核以聞仍自朝廷之上專置賞功一司以時放行計程逓發使有家者從官給付無後者召親屬繼絶如此而軍心不恱天命不昭未之有也其三曰討軍實蜀之軍籍消耗甚矣在璘玠時元以十萬為額逆犧一變而逃亡僅餘八萬張莫再亂而消折不滿七萬辛卯以後戰潰尤多東軍最弱最先潰摧踏最勁繼亦潰背嵬選鋒最守紀律又創潰豈前日諸軍利禦寇而今乃利為寇耶茅簷葦屋暑蒸寒凍而兵寨窮蛀麥糙米沙雜水拌而兵食窮破繒敗絮襟捉肘見而兵衣窮平時口眷無以為生脫或臨陣而責其効死難矣哉諸葛亮曰臣到漢中朞年矣䘮曲長屯將七十餘人散騎武騎一千餘人古人於軍實幾若無日不討其數而申儆之今兵籍之散者亡者傷夷者詭冒者臣不知其幾矣核實料簡莫易此時謂宜勅分閫之臣與緫戎之將查核正軍見在之數而以良家忠義足之稍復七萬人之額撥為三大屯之備仍與時其廪給優其衣賜營其寨栅還其老小無使有饑寒内顧之憂萬一狃舊畏敵先奔則用吴玠青谿之法必誅無赦彼視前則知恩顧後則知畏自今蜀軍誰有不用命者哉其四曰儲帥材臣讀國史竊見孝宗皇帝嘗詔蜀去行都萬里人材豫當儲蓄以備緩急令侍從䑓諫各舉忠慤明敏之士周知蜀利害者為都轉運使繼又因廷臣之請諭宰執令於從臣中擇一二人可備制置使之用者為安撫使盖蜀之帥閫實任六十州安危或有疾病危急必自朝廷除授動經年嵗始克到官一去一来之間至為利害之決我孝宗所以留意都漕路帥者皆欲以為制使之儲也矧今事會搶攘人情震蕩如去年帥在原上數月信息不通或欲從中臨遣則以為緩不及事或欲就近選差則未能盡厭人言迫不得已至有衆建便宜而漫差撫諭者帥才不儲其弊至此雖幸敵自退舍帥已下原然四年驅馳者常抱玉闗人老之嘆十連置副者屢上金城乞骸之章若非宿儲豫蓄參錯布置求所以為輪代者則倉猝臨事何以應手乎天生一世人才自足供一世用老成之彦固多後來之俊亦不弱盖有班近星履而風力著聞者身到甘泉而志節慷慨者王遂也舊鎮荆州而得江湖心者乆帥静江而有牧禦才者咸謂其人可當方面陛下倘仰法孝廟宣諭大臣遴選諸人分遣使蜀除以三路連帥或為大藩守臣如張浚召而盧法原自夔帥来吴璘卒而汪應辰以成都帥至取之近地用以顓征其視萬里之遥至自一年之後者盖有間矣凡臣所陳四事雖無驚異可喜之論並皆著實可行之言蜀人未嘗不言而牽於私情言之不盡朝廷未嘗不行而忽於踈逺行之不力臣懇懇欵欵不厭於言者盖以民生之不易禍至之無日不敢欺君上而負父母之邦也臣恐一已之智猶有未周欲乞如淳熈典故令蜀士之在朝者公共聞奏毋以書問䟽宻而移其毁譽毋以親讎厚薄而岐其愛憎破拘攣之說撤私吝之見各盡至公血誠以救鄉國仍乞陛下諭二三大臣精擇而力行之則蜀雖剥爛之後尚有復平之期也不然衣袽未戒而哨騎再來譬彼棲苴將不知所寄矣臣不勝拳拳昌裔又論蜀事催王遂入蜀狀曰臣近者輒上奏章言蜀邉事首條四策次論三人並皆罄竭心思参伍聞見蓄之既乆而後奏陳不敢顧䘏人情欺㒺天聽伏䝉陛下特采臣言命王遂以帥成都除楊伯雨以緫餉事臣與蜀人聞之感至欲泣何者蜀在萬里之外常有遐遺之憂今乃睠西顧如在畿邑此聖人不泄邇不忘逺之盛心也但臣論事一劄幾千百言對證處方乃救蜀之砭劑而側聽累日未見施行豈陛下留中而未曽付出耶抑既付外而大臣不以衡慮耶遂既委以西事即合亟令陛辭趣其兼程前去庶早到一日則有一日之備而巽函屢上内引無期臣恐夏潦一生秋風一起敵騎突至而戎車莫前則是雖臨遣帥臣而無益于事也緫計既已改畀伯雨即合下臣前章俾令疾速之任庻可㸃磨錢物以備急缺支用今伯雨既除而癸仲未聞顯黜臣恐舊者幸脫新者控辭過時失糴軍食乏興則其徒黨必將諉責於易總之非計也臣竊詳遂之遲遲其行者必以專閫勞勩或有易置之疑癸仲之悠悠議罰者必以上下交結曲為廻䕶之地所以言者愈急而聽者愈緩蜀民之痛不啻頃刻千古而朝廷所行視為閒慢常程臣竊惑焉臣近聞北兵破階窺文欲為榦腹深入之計又攻打蕃族徑為間道取蜀之謀姦計日深人危不保得制副丁黼書云蜀人所以助錢助粮者只買一箇不投拜又成都憲張起良書云西州助軍錢百以上萬絹十餘萬且為一路人請命觀此事勢直可寒心若或顧惜顔情互持意見以將危將亡之疾證而作不緊不切之治療將恐夤斷膂絶神離本僵蜀之命脉不至大斃不止也臣憂切家國用敢重瀆聦明欲望聖慈特紓憂顧亟將臣所陳四事宣示二三大臣或行下帥閫令作緊措置早賜遂以内引促其入蜀之期併付伯雨以㸃磨亟求裕蜀之策所有癸仲乞賜䥴職罷黜以慰蜀人公望臣盡言及此遑䘏其他謹録奏聞伏候勅㫖昌裔又論今日病勢六事狀曰臣嘗端居深念細察天下之脉以為方今病勢有積虚之證三瀕危之證二垂亡之證一若其他隨部而換形者難徧以䟽舉今之醫者例曰脉細而氣虚者補脉大而形危者平遂變證以治療而不窮本原以理之至於沈頓促急則諉曰無方藥可為也其不幾於護晉侯之疾而却秦緩之醫哉不信仁賢則國空虛言國以賢者為精神也徃者趣召故老旁招時髦雲聚于朝咸謂必成雨矣閱時未久氣數復離有甫參政路而以殄瘁告者有僅班資殿而以鄉郡歸者有不拜從槖而奉祠還里者有不受美官而引疾卧家者甚至海濱忠清之老屢詔而不來䑓省挺直之彦相繼而引去更化所召其留幾何縱有一二留者又皆愁病沮抑而各有遐心既不能退又不能遂此何等氣象而見於盛時耶無三年之蓄曰國非其國言國以資實為根本也徃者三京之役邉儲一空收楮之令帑金盡耗已事遄徃不可復追若能省穡而用之尚可息補也奈何事變錯出征費無窮督視之行緡以七百萬計襄梱之犒賞以五百萬計㳂江命帥以三百萬計諸將招軍以二百萬計蜀中撫諭亦以一百萬計一兵之遣一鏹之支皆仰朝廷不可枚數而況三緫經費科降非時諸路和糴子本不繼行齎居送在在枵然脫有方千里之旱又何以供餽乎兵不精利與空手同甲不堅宻與袒裼同古人無日不討軍實而申儆之也今士馬物故符籍單虚成淮之兵殱於戰防江之兵死於叛荆楚壯士十䘮七八山西勁卒額僅三萬所招新軍率皆烏合而倚為捍衛者一皆狼子野心加以器甲朽戈矛鈍䝉衝海鰍舊制不存蒺藜拒馬古法不講銳首擊刺之不利克敵年力之不强凡中國長技恬不之習是不幾於以卒予敵乎此臣所謂積虚之證三也北兵深入譬之外邪先侵蜀道九郡丘墟繼犯京湖十州疲敝焚燬我室䖍劉我民野無炊煙路有寃骨甚者河南投拜之户秦鞏羈窮之酋皆假其名交闖吾圉敵来而不知備敵去而不知襲方且泛泛條具悠悠嵗時議恢拓則信喜功之人謀斂戍則靠求成之士蹙國者無所承而退開疆者無所禀而行持散漫不決之謀而欲當飄忽難制之敵臣恐今年所憂又有重於去年矣蟊賊内訌比之惡疢蜀口四戎司之兵遇敵輒潰京西五州之叛見間竊起摧鋒踏白向利禦寇而今乃為寇克敵忠衛昔為王民而今乃殘民近者浙江鹽寇又見告矣長虵封豕洊食四陲而饑虎餒狼乃為蕭墻之禍如此招撫以柔之則長亂剪伐以威之則蹷本若夫徃来不問而縱其横行至以國家儲衛之官而加叛服不常之將豈所以慴天下哉此臣所謂瀕危之證二也然而外患雖危内寇雖迫有民與守則危可安也迫可舒也今内外諸事一切受病惟有民氣縷息尚存然數年以来斵而䘮之者亦多矣六月征伐而困兩淮之民連年科調而困四川之民兩州歸附而困京西之民十乗征行而困㳂江之民舟船結雇而困㳂海之民濠梁浚築而困荆湖之民稅畆折納而困江湖閩浙之民朝廷政令不詳審以遽行州縣姦貪又夤縁以為利故有朘民之膏以進羡剥下之膚以覬遷苞苴之禁漸寛寵賂之風復熾自是牧飬無良吏而田里皆疲氓矣嗚呼國事益急民心愈危今又以貪吏行暴令而速之將恐瓦觧之禍立至不特阽危而已此臣所謂垂亡之證一也臣嘗讀國史竊見靖康初李綱以時望居省府楊時以舊學居諫垣許翰以耆徳為中司胡安國以經術為右掖崔鶠李光余應求以直道為䑓諫种師道劉韐宗澤以威重為將帥一時人才不可謂之不聚京師兵十餘萬諸道兵二十萬河南北兵二十九萬河東北保甲三十五萬延豐倉積粟四十萬碩天駟監戰馬二萬疋宣梱造車千餘兩京師棄砲五百座衲襖棕衫之屬一一皆有樁管則兵儲不可謂之不豐然常勝義勝舉軍迎降宗維宗傑分道入寇河氷一渡而中土横潰遂不可支是豈强隣叛卒果善戰耶盖自花石綱之擾而江淮之民怨造作局之置而二浙之民怨輸燕山米而兩河之民怨科免夫錢而諸路之民怨本實先撥人搖不寧其所由來非一日之故矣今陛下更化願治將有意乎元祐之盛而天下事變膠轕不幸而近𩔖宣靖之時安危樂亡直可澟澟臣謂藥不瞑眩不足以起沈痼醫不倉扁不足以弭外邪欲望陛下去讒逺色以扶植人才克已節用以愛養邦本罷營繕土木之費専以修車備器為事省閒慢文書之務一以備邉禦寇為急而又君臣上下兢兢業業日以小民祈天永命為心凢中外蠧國害民之政一切寢罷如此則可以囬天怒而銷敵祲矣謹録奏聞伏候勅㫖貼黄臣竊見履畆之令朝廷不得已而行之使行之而有益於楮猶可為也今令行已乆而楮價不増則是救弊果何益乎臣訪聞畿輔之間中戸盡數已納而大家徃徃幸免州縣長吏不惟不能體朝廷之意而反以旁縁為私故有促辨催入而乆不解者又有那移他使而規自利者於不得已之中為甚無已之政此則汙暴之責民其何以堪乎臣願陛下明降睿㫖截日住催使六路之民戸知徳意其有守令占吝不以實上者各許本路監司覺察以聞庻幾吏姦可戢民氣可伸實非小補昌裔又論朝廷重輕狀曰臣聞朝廷者天下之榦也朝廷重則天下治朝廷輕則天下危天下之安危治忽不在乎他在乎朝廷之輕重而已矣木之身正然後枝葉可附以立人之表端然後支體可依以行朝廷之榦强然後郡縣邉鄙可恃以無恐表著宗仰之地不先正固立事而欲以運掉天下難矣哉近世以來則榦弱本顛而積輕甚矣蟊賊内訌襄樊失據封守之臣何所承王命而遁偏師出境宿永歸疆北伐之將何所禀朝筭而行自山以南漢為重為帥者以何而退屯漢東之國随為大為守者以何而徙治此帥守之輕朝廷也鄂州戎司節制於㳂江舊矣而懐異志者敢以公牘而數制臣之罪金陵騎帥共事於齊安乆矣而起攘心者至以文榜而聲帥閫之非救襄虓將留以緫戎重事也乃不俟命而歸淮東防海舊戎檄以赴闗厚恩也乃不受令而趨海道此邉將之輕朝廷也以僨軍而謫衡者乃造屋於武昌以殱民而竄永者乃管軍於荆渚丹書未雪者已經營幕府之辟彈墨未乾者或僥覬麾節之求此官吏之輕朝廷也禁營之卒屢出誶語以撼都人江上之軍時肆讙言以譁府寺興沔戰散之士以衣糧而罪狀緫所文龍招收之兵以調遣而抗拒制司此士卒之輕朝廷也甚至窺隙而争見間而起盜賊有輕王官之心戰者自戰和者自和逺裔有輕疆吏之心積此衆輕牢為一病務相遵養茍度嵗時此豈可不反其本哉朝有耆艾魁壘之士則威望重有諫諍輔拂之臣則紀綱重禮樂政刑自天子出則國體重廢置予奪以王柄馭則主勢重令者國之重器審重則君尊國安兵者國之重權居重則本大末小戰守持重不以輕試則天下無殘民名器謹重不以輕授則朝廷無倖位兩河削地直以裴度處置得宜三鎮革心専以徳裕戒敕有體是朝政之重在輔相否則朝廷無人而為亂賊所輕矣汲黯面折廷諍而淮南畏李勉不避彈劾而朝廷尊是國法之重在䑓諫否則國家失士而為天下所輕矣宿衛倡亂而朝廷不復窮治故髙歡還而結客政刑廢弛安知非所以啟姦萌藩臣造朝而朝廷事柄不一故從諫歸而益驕事權錯出安知非所以滋亂象朝有變色之言則下有争鬭之患號令數改則君命輕矣上有自専之士則下有不遜之人政事獨運則主威奪矣上有克勝之佐則下有傷害之心佳兵弗已則國危矣上有好利之臣則下有盜竊之民惟賄是聞則民散矣臣竊謂朝廷者先皇帝之朝廷也若使下之奸上小之加大士卒之陵主帥匹夫之輕量大臣皆非所以慴天下而尊朝廷也陛下若能審於立國而戒臣之所謂六輕强於為善而取臣之所謂八重以此而責廟堂以此而勵䑓諫又以此而儆内外逺近之臣有徳必進不任職必退名器必謹政刑必清威權號令必肅使狙詐有所憚而服逺裔無所侮而動則國家尊安廟社深固危於綴旒之天下將復重於九鼎大吕惟陛下暴臣此章於國中而與二三大臣亟圖之昌裔又論救蜀四事䟽曰臣竊惟蜀冦深矣蜀禍慘矣以藝祖蕩平之境土而今被天下莫強之冦以髙宗涵育之人民而今遭振古所無之禍紹定辛夘敵闖利閬利閬以外本實未盡撥也端平乙未敵侵漢沔漢沔以内生聚未盡空也迨至去冬其禍惨甚盖自越三闗破三泉摧利𢷬閬窺文撓巴而利路虚矣燬潼遂殘果合来道懐安歸擊廣安而東州震矣屠成都焚眉州蹂踐卭蜀彭漢簡池永康而西州之人十䘮七八矣毒重慶下涪􅁜掃蕩忠萬雲安梁山開達而夔峽之郡縣僅存四五矣又況敵所不到之地悉遭訌潰之攪民假為潰潰假為敵而真敵之兵徃徃借我軍之衣裝旗號愚民耳目而卒屠之盖雖荒郊絶島之間無一處而不被燎原沸鼎之毒也今幸敵兵自退境土漸歸將士乘時皆以㨗至然昔之通都大邑今為瓦礫之場昔之沃壤奥區今為膏血之野青煙彌路白骨成丘哀恫貫心瘡痏滿目譬如人之一身命脉垂絶形神俱離僅存一縷之氣息而已陛下乃睠西顧不忘逺民首重樞臣肇建宣閫取一國之望而用之可謂得其人矣然竊惟西事壊爛之極塵氛未撲江路未清更置愆期宣閫悠悠未聞被受但得之親友書問咸謂三邉䖍劉遺黎殱盡而幾於無民諸郡殘破公私赤立而幾於無財軍伍逃亡率皆為敵向導而至於無兵農業轉徙不得以時耕耨而至於無糧以蕩然虚空之事力而當倐然飄忽之敵兵雖百亮復生不能為蜀計矣若非朝廷速調援兵多給軍實大明黜陟通暢事情如藝祖取蜀之規模髙宗保蜀之調度趂急經理以捄顛危則秋深路熟哨騎再來是亦坐待其斃而已臣猥以書生不識時務誤䝉恩命俾賛軍籌凢軍旅之事不可豫度經理綜宻當從其長而行惟事闗于朝廷而脉絡相貫者敢代臣􅌫為陛下告謹具條列于後一蜀兵舊以十萬為額盡皆闗陜五路勁軍中興諸將以抗金人而䕶蜀門者此也開禧之變招填僅及八萬己夘之潰消折不滿七萬端平以後戰散尤多臣參以前年所聞止有三萬之數迨今去冬敵騎深入則赤籍散亡愈不可考矣或望風退走而奔竄於巴山或遇敵奔潰而衝突於内郡有假敵裝束而摽掠於民財有為敵向導而焚燬於仕族大率軍心蠧壊已非一日不潰則叛不叛則降紀律蕩然而幾不能軍也嗚呼國家百年竭蜀膏血以養兵今也不能為國禦寇而反資敵為寇非所謂困民力以養亂耶竊觀昔之帥蜀者當軍政敗壊之後則必取諸道之生兵制一方之死命如李徳裕以安定軍來温造以河中軍来髙駢以天平軍来我之中權力渾氣盛所以驕兵悍將莫不膽寒於心腹況今蜀之兵籍零落無幾而一二存者又皆習為􅇯回則欲制此患其可無本領以勝之乎竊惟髙宗之遣張浚宣撫川陜也付以親兵千五百人騎三百及八字一軍以從而諸將如劉錫趙哲王彦皆在浚軍時東南事勢非不孔棘而猶且那摘調遣者盖以重上流之勢陛下既以命浚之事而命􅐉矣欲乞参稽典故於江淮荆鄂撥一萬兵徃援西蜀以聽宣閫節制則威聲聳動勝氣畢張遺民必曰有天兵来人心可恃以無恐矣諸軍必曰有外兵至吾屬不可以陸梁矣此最捄蜀第一議欲乞睿斷施行一蜀中財用之困始於炎興在趙開時嵗收三千三百四十二萬而所支之數乃多五十二萬有竒在李迨時増收三千六百六十七萬而終嵗所出又多一百六十二萬自是而後入少出多調度轉急臣嘗以紹定一嵗之數計之所收二千四百九十二萬餘緡已減紹興所入之一所支五千一十六萬三千餘引乃過紹興増支之半前後緫餉卒坐乏興每以二千五百二十四萬之數仰給朝廷科降不啻如赤子之仰哺此蜀賦本末也今自敵騎深入根本盡竭又非前日比矣制緫兩司之積蕩於閬州茗漕帥司之藏截於廣郡而公府之財帛空富家中産之金帛席卷於敵都鄙郊邑之窖藏焚棄於盜而私室之民力空最可痛者沃野千里蕩然無民離居四方靡有定所耕疇不闢堰務不修秋不得收春不得種不知兵食將何時辦軍費將於何取給耶有人此有土有土此有財未有無人而有財用者也蜀之所産者茶鹽今道殣相望何有乎食用之家蜀人所仰者酒稅今商旅不行何有乎征𣙜之利經常調度無一可以指擬而況經理殘破去處費用百出欲以赤手取辦抑亦難矣昔趙鼎之為宣撫也乞錢七百萬緡度牒二萬道師號二千五百道金帶二十條絹三萬疋米二萬石當全蜀富實之時而朝廷撥助宣司猶且優厚如此況今事勢窮蹙措手極難若非朝廷於常年科降之外檢照紹興舊比特捐内帑金帛千萬餘緡以為臣􅌫建閫之費併撥荆湖米數十萬石以為今年餉師之用將恐財竭兵饑米盡人散而蜀事去矣此又捄蜀急切之務乞陛下諭二三大臣速賜施行一賞罰者國之綱紀也蜀逺朝廷人心易堕必資刑賞興起精神張浚之宣撫川陜也應有功績合推恩賞必闗宣司審實給告胡世將之盡䕶蜀帥也如遇黜陟待報不及許以一面便宜施行賞罰信而事權專所以役使羣動而訖濟艱難者此也近年事體與此相違僨軍棄城者以有貲而罰不加仗節死義者以無力而功不録猥充廝役者得以掛名而僥倖親冒矢石者反以覆實而沮格黜陟無紀功過不分所以敵騎一來將士解體少有為國用命者且以近事言之如耄帥之棄師䘮地兇童之撓政酷刑狂士之行賕㒺上見於䑓諫所抨其罪彰彰有不容掩者方且覆䕶不加顯黜何以慰百萬之生靈正戎之歿於刼寨副戎之隕於守隘制参之死於城郭封疆見於諸處所報其功俊偉有不容泯者方且遲疑未行優䘏何以勵三軍之死士今蜀大亂之後當以誅賞為先欲乞朝廷大明公道望風退走者雖未盡誅而衆所怨歸者亦合先議謫罰隕身鋒鏑者雖未盡録而死節之明著者亦合亟用褒嘉命徳討罪務令盡合天理以收涣散之心或如李綱所請置賞功一司専令樞属兼領其事如冒賞不實許告推治遇敵不戰按法必誅别立約束行下則士未有不感奮者此亦轉移蜀事之機括也一郵傳軍中之耳目也蜀逺萬里叫呼難聞全藉置郵以通氣脉故吴玠之宣撫川陜置軍期逓凡有警報不過十八日可聞於朝廷丘崇之制置成都創擺鋪逓凡有奏請不過三十五日可徹於都下所以軍情達而民隐伸壅蔽通而報應速也近年以來舊規紊廢軍中之逓不以報邉警而但為交賄之驛川中之逓不以通脉絡而徒為寄書之郵甚至以㳺士為承受以幹僕為通進事勢稍急則曲為覆䕶而不使衆聞私書未辦則動多稽留而不以時發不知軍事呼吸之間有凶有危朝廷應報之際宜速宜急豈可以軍中之耳目而徇人情之私計哉然此特在外之郵傳然也御前金牌向者半月到川今則徃徃幾月而不至夔門宻院雌黄牌向者兩旬至蜀今則徃徃三月而不達諸郡差除之所以壅滯應報之所以稽遲科降之所以愆期功賞之所以沮難上下痞隔而日月淹延皆氣脉之不通然也臣願陛下留意西事還郵傳於奏邸而勿使私人得以執報發之柄考郵置於宻院而勿使諸吏得以愆報發之期又如淳熈間帥臣所請欲以都司官知首尾者専一人報應蜀事凡申請辟差並許畫時擬行此亦通導血脉之樞要也右件四事並皆至切至急之務故臣晝夜思度首進此說而又有事之綱領在於徳意志慮者敢為陛下終言之自昔多難之後必有詔令以凝聚人心如張浚之遣行既親書詔賜之便宜黜陟又有詔賜川陜官吏軍民胡世將之建閫既以親筆賜之者四又有詔戒喻將士者二君臣之間叙情閔勞如父詔子恩意無間所以二臣感奮三軍鼓動并謀合智訖濟中興之功盖有忱辭實意以感人也況今蜀變之餘痛猶未定授任之帥擔荷極難所宜仰體紹興徳音内出一紙一喻蜀之子弟又宜仰遵髙宗手詔親洒宸翰以付宣閫之臣蠲租薄賦以業流徙埋胔掩骼以仁死䘮貸牛借種以勸耕農録善䘏孤以繼絶世生聚教訓還定撫摩少須過冬敵不再至則蜀雖蠱壊剥爛之極尚有否傾復存之理也惟陛下與二三大臣亟圗之貼黄臣竊見仁宗嘗御邇英謂講官曰程琳心行不中時王洙侍讀聞之然上性寛厚琳後竟至政府盖仁宗無宿怒也又見孝宗御朝嘗指周必大曰此人反覆時宰陳應誠進擬聞之然聖度恢廣必大竟䝉柄用盖孝宗能忘人之過也人臣事君各盡職分一時雖被震怒而終至簡眷不衰者豈有他哉君譬則天也譬則父也為人為子雖有過誤在天與親不無譴責然事定則止理乆則回豈終於怒而不解釋哉臣謂朝廷犯顔敢諫之臣即他日仗節死義之臣也更乞以天地父母為心仁祖孝宗為法培養扶持以夀氣脉不勝幸甚起居舍人兼侍講牟子才上疏曰臣聞蜀猶一大棊枰也論蜀於今日將有垂亡之形則救蜀於今日當有急切之著亡形具而無急著以救之則亦亡而已矣蜀與吴相為存亡者也蜀亡吴亦豈能獨存然蜀亡形已具其可坐視無一著以活之乎且漢中前瞰米倉後蔽石穴左接華陽黒水之壌右通隂平秦隴之墟黄權以為蜀之股肱楊洪以為蜀之咽喉四嶽三塗皆不及也今為敵所據則亡形成而人束手矣益昌之南陸走劒而外東西川在焉水走閬果而去適夔峽焉西則趣文龍二州東則會集壁諸郡而烏龍桔柏又在其前歐陽詹以為九州之險司馬光以為秦蜀之衝四會五達不可失也今為汪雛所城則亡形具而人寒心矣夫有垂亡之形而未至於遽亡有欲絶之勢而未至於遽絶萬一遇急著焉則亡可存絶可續蜀尚可為也安可以為遂亡而委之於不可救歟然嘗審觀時機斟量局勢而得其說焉一曰補軍籍之闕蜀口右䕶軍本曲端吴玠闗師古之徒闗西部曲也舊以十萬人為額休兵後有名籍者猶九萬七千餘人安丙帥蜀以錢糧數狹沙汰為八萬人後来事力不及節節減七萬人通忠義之數猶為十四萬人丙申以來逃亡死損所餘無幾今以所聞參之興戎司見管四千六百餘人沔戎司僅及三千人金戎司不及千人利戎司約七八千人此四戎司見管之數也此外有嘉定安撫司所管慶定精銳兩軍及増戍之軍共五千餘人利閬劔諸頭目所部或三四百人或五六百人瀘帥司之軍不及千人巴州所管武進軍今止有二千餘人得漢堡所部三百餘人制司帳下安西保定飛㨗先鋒等共一萬四千餘人夔帥司不及千人緫而計之不滿五萬人之數今四蜀田畆盡入軍屯制緫科名悉歸大閫商賈百貨盡籠于官十年之内乃不能増添一兵以補舊額真可痛恨徃事已矣失今不圗闕短呈露愈見衰颯不振非所以壯吾軍也議者以為當招集新兵三萬人朝夕訓練以為進屯之備且慰安田楊二家嵗以其兵來助亦可大張軍聲或可背城借一以却敵騎如此則蜀尚可為若憚勞惜費慮不及此敵必乗虚攻吾之瑕則備多力分莫能制其死命不出三年蜀之命脉絶矣二曰籍義勇之士四蜀近邉劔閬巴達次邉惟渠蓬六郡租賦所入無幾議者謂莫若舉此六郡之民依向來梁洋義士法照逐戸稅籍髙下或一丁或兩丁以至三丁料揀為兵却與盡蠲輸或每丁與免家業錢三百緡令其自辦衣裝自置軍器每十人為一甲五甲為一隊五隊置一副將十隊置一正將逐縣置一部轄州置一縂轄以統之每嵗春秋教閲至防秋則團結於逐郡城中就令守禦不測聽制司調遣其如錢糧遇守戍則始與支給至放㪚則仍令耕以自飬如此則平時無飬兵之費而緩急有制敵之用如聞米倉之南地名三會去嵗敵兵来侵不循常道惟於此處會合諸兵分入它路一屯向利一屯向巴蓬一屯向渠廣以為當起六郡已籍之民聚為一大屯堅守此地以扼敵衝使先人有奪人之心則蜀尚可為若遲疑不發敵復重尋舊路會兵於此不惟六郡生靈俱屠而為蜀之大計轉見謬誤不出三年蜀之命脉絶矣三曰壯分屯之勢敵據漢中去嵗出兵乃越米倉以南臣以創議欲調六郡義士分屯三會以却之盖欲阻其越險之謀也今敵又城利則劒閬乃其切鄰豈可畧無蔽障哉議者以劒門天險實為戸樞昔守三闗無所事此今既退守險實可因莫若分三戎之兵併三小屯之卒令及萬人阻闗為固而遴選智勇之將申出軍實而訓其不齊以遏敵騎突入西川之路大獲一堡形勢雖斗險然規模窄狹不當要衝止可以作家計不可以禦敵兵莫若於閬州境内踏逐一險要去處大為城築約可安萬人與大獲犬牙相制分調諸戎之屯益以新募之卒令及萬人阻山為固而遴選驍騎之將晝夜閲習以遏敵騎出葭萌之衝兵法又云兵及萬人之屯而後敵不敢過今若依數招募創為東西二屯以相掎角如連栖之雞彼觸則此應如常山之蛇首擊則尾應使敵之後騎進不得抵􅇖於前退不能襲擊於後蜀尚可為若以無兵為觧使敵用此計城利之外又進此屯不出三年蜀之命脉絶矣四曰奮撓擊之威敵進七百里而城利豈曰無謀雖上下以運道艱澁為説然敵日課諸軍人打三升粮以備日食而利以西白水一帶又皆平疇若種麥以待其熟而漕以小舟豈憂乏粮議者以為當及粮道未通之時與二麥未熟之際常出㳺兵以擾擊之困其事力絶其命脉然後徐起而圖之此計之最善者撓擊之地各有方所守閬中者當於葭萌青山木瓜等處撓之守劒門者當於白水隂平階文等處撓之伺其怠而為攻刼之圖乘其機而行掩襲之䇿使取粮之兵不得越足於吾地而耕耨之夫不得施功於彼土曠日持久情見勢屈遂可為我鎡基如此蜀尚可為若置之度外敵反用此計出沒於劒閬之間鈔掠困我不出三年蜀之命脉絶矣五曰固根本之地敵自丙申以來惟知嗜殺以逞威逃難之民值者輒死父母妻子駢首就戮膏血原野可謂慘矣幸而竄伏得免深山窮谷間有存者而孑遺之民生意一髪况十許年來田畆之利盡歸軍屯而科糴軍需之苦反甚於有田時也塩酒之利併歸制司而過數增𣙜之害反甚於無事時也以至黎雅畨貨彰明烏附施黔板木盡入私槖而商旅失業怨聲載道則又人所不忍聞也既不能芘其死又以戕其生彼方計出無聊而敵騎突入不殺之令甫下誘餌之術甫施凡民無知茍逃性命有不獲已相率去之計其數不下二三百萬人由是南畝空虚種𩔖斷絶雖間有脱身來歸之人又皆室閭不存人牛俱䘮雖欲自活其道無由今制臣初至規橅一新若能精選縣令專以招集耕農課其殿最戸口增多者爵之數僅及中者賞之視舊有虧者罰之布宣德意勞來還安分以未墾田疇給以牛犂種子且將目前一切無藝之征諸處科糴之擾分司妄作之弊武臣攝官之害悉皆蠲除使離散之鴈復安於中澤逃潜之魚復止於深淵喘息小定必能為國耕種為國輸利為國貿易相與效死弗去則蜀尚可為若不知愛惜敵用故智盡嗾遺黎以去不出三年蜀之命脉絶矣六曰嚴三城之守重慶為保蜀之根本嘉定為鎮西之根本夔門為蔽吴之根本得人焉而守則金城湯池其勢鞏固萬一有一守闗者異志雖使忠臣義士固守其土亦不能正其行路買門之奸此計若遂守將為其所得軍民為其所屠如辛夘之西和辛丑之成都者有之矣今三城鼎立守備固嚴尤當以腹心之士分守三城之門議者謂關表土豪散居四方若能温言說諭厚募招來官其頭目之人示以功賞之信彼必欣然樂為吾用然相道里之逺近而分撥之其在西州者就令居嘉城其在東城者就令居渝城其在峽外者就令居夔城假以屋廬聽其營運此及秋之際專令各守城門彼山西之人負勢尚義必能感激思奮相與固守彼爱惜人家自為謀計必能盡其死力相與固守一舉兩利此為至謀若棄而不用敵騎薄城必行重賂以買門不待三年蜀之命脉絶矣臣區區愚忠去秋直前甞於貼黄力言韓宣雖守夔張實雖守渝俞興雖守漢嘉而防遏當在上流又謂利閬之間當置一大屯是時敵未有城利之事也若聽臣言稍施行其一二雖不能大有所益或亦可以伐其城利之謀今城已就矣險已盡矣事已無可言矣而臣憂國不能自已猶欲於舉枰未㝎之時進此急著以活曩誤若猶以臣言為迂逺而欲專倚仗於夔門一城以為保護吳楚實在於是此子嚢城郢計也臣見脣亡齒亦寒矣况夔之上流褰裳可渉之處不一而足萬有一踏淺渡江轉戰而南則由施黔而趨鼎澧由鼎澧而趨江南置夔於不顧之地則蜀非吾有矣臣去蜀十又七年日夜憂憤雖力弱才腐不能備戎行致死命以報國家猶幸日覲清光可以吐露胸臆比因進講從容伏蒙陛下憂軫蜀邉賜以清問至於再三臣雖随問随荅言其大槩然積藴未盡謹效魯女之悲徧采蜀人之論條為六策以復清問陛下鑒其愚忠而賜之施行不特臣之私幸將西土之實幸不特西土之幸將東吴之大幸若夫輕觸天威罪當萬坐惟陛下赦之試閣門舍人王霆入對曰恢復之說有二曰規橅曰機會顧今日之規橅安在哉守令所以牧民而惠養之未加將帥所以御軍而拊循之未至邦財未裕而楮劵之敝浸深軍儲未豐而和糴之害徒惨官有土地而荒蕪民因賦役而破蕩獄訟𩔖成寃抑銓曹率多淹留薦舉無反坐貪徒得以引𩔖而通班按刺不徇公微官易以迕意而連譴以言郡計則紛耗於囊槖包苴以言戰功則多私於親昵故舊至如降卒中處養虎遺患輕敵開邉以肉餧虎夫以規橅之切要者而不滿人意如此臣敢輕進恢復之說以誤上聽哉凡臣之所陳者誠播告中外之臣悉懲其舊而圗其新規橅既立然後義旗一麾諸道並進臣力尚壯願效前驅惟陛下堅定而勉圗之帝稱其言可采殿中侍御史李宗勉率合臺上奏曰蜀之四路已失其二成都隔絶莫知存亡諸司退保夔門未必能守襄漢昨失九郡今郢破荆門又破江陵孤城何以能立兩淮之地人民奔迸井邑丘墟嗚呼危哉陛下誠能亟下哀痛之詔以身率先深自貶損服御飲宴一從簡儉放後宫浮食之女罷掖庭不急之費止錫賚絶工役出内帑儲蓄以風動四方然後勸諭戚畹世臣随力輸財以佐公家之調度分上流淮東淮西為三帥而以江淮大帥緫之或因今任或擇長才分地而守聽令而行以公私之財分給四處俾之招潰卒募流民之强壯者以充遊兵以補軍籍仍選㳂流諸郡將士為捍禦之圗猶可支吾不然將水陸俱下大合荆楚之衆擾我上流江以南震蕩矣或謂其勢强盛宜於講和欲出金繒以奉之是抱薪救火空國與敵矣歴代名臣奏議卷一百
