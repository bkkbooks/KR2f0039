body:
  text: 厯代名臣奏議卷八十五明楊士竒等撰經國宋髙宗紹興五年李綱上䟽曰臣竊觀自古中興之主未有不由祖宗積功累徳結于民心者故周宣本於文武漢光武夲於髙祖文景唐肅憲武夲於神堯太宗其植根固其流波逺雖或中微一旦憤起則天戈所揮靡不如志興衰撥亂光復舊物非偶然也恭惟國家膺受天命祖功宗徳聖聖相承重熈累洽幾二百載深仁厚澤滲漉萬物民之戴宋於億萬年何有窮己運遭陽九金人作慝宗社顛危不絶如綫陛下應天順人纉承大統十年于今勵精圖治枕戈嘗膽欲戡大憝迎還兩宫綏安區宇則夫克致中興如周漢唐有不難也臣聞勢有强弱事有成敗雖弱而有可成之㡬雖強而有必敗之兆頋其理之如何耳譬猶醫者之療病不問形之壮羸惟察脉之治否興亡之理何以異此昔髙祖與項籍相持當是時項籍強髙祖弱然天下知髙祖之必興者以其所施為當於人心也是以随何援此以說諸侯多仗劔以㱕髙祖遂成帝業光武起兵以攻王莽當時王莽強光武弱然天下知光武之必興者亦以其所施為當扵人心者也是以王常吳漢耿弇之流一時英俊皆合謀以㱕光武遂致中興然則強弱成敗之理槩可覩矣金人不道為封豕長蛇以洊食中國可謂強也然恃其詐力慘毒無恩神怒人憤其亡必暴此雖强而必有敗之兆者也陛下時乗六龍保據江左遵養時晦可謂弱矣孝悌通於神明仁心結于海㝢應機而發蓄銳而奮其勢必有起而應之者此雖弱而有可成之㡬者也夫普天之下皆吾土也食土之毛皆吾民也被堅執鋭為敵人之所驅役者皆吾将士也垂紳搢笏為敵人之所官使者皆吾士大夫也彼其心曷甞一日忘宋哉頋國家之力未能覆䕶之偷生於僭偽之邦茍免扵虎狼之口而已陛下誠能以天下為度拯之於塗炭之中則一人之心千萬人之心是也豈無感動願復見漢官威儀為中國禮義之人者哉臣願陛下與二三大臣熟計凡所施設務推至誠以當人情親信仁賢以為腹心駕御英傑以為爪牙謹號令使毋數改眀賞刑使當功罪訓練士卒脩除戎器理財以義使斂不及民而用度足積榖以時使雖遇凶嵗而饋餉豐知彼知己因利乗便大振天聲以臨之臣将見四方響應飇舉雲集沛然有不可禦者中興之期已在指掌之中矣伏惟陛下留神幸察綱復論車駕不宜輕動䟽曰臣近因上䟽論淮西事宜甞獻狂瞽竊謂車駕不宜輕動正當静以鎮之諸将重兵不宜抽囬正當分屯要害益為自固之計妄意及此其説畧而未詳今聞朝廷以梁汝嘉知平江剏盖營屋萬餘間及召張俊楊沂中全軍還駐建康如此則是移蹕之謀抽囬軍馬之計皆審如所聞宗社安危生靈休戚繫此一舉敢冒萬死為陛下詳陳之臣聞自昔用兵以成大業者必先固人心作士氣據地利而不肯先退盡人事而不肯先屈是以楚漢相距扵滎陽成臯間髙祖雖屢敗不退尺寸之地既割鴻溝羽引而東遂有垓下之亡曹操袁紹戰於官渡操雖兵弱糧乏荀彧止其退師既焚紹輜重紹引而㱕遂䘮河北由是觀之今日之事豈可因一叛将之故望風怯敵遽自退屈果出此謀六飛囬馭之後人情動揺莫有固志士氣銷縮莫有鬬心敵人乗之誰為陛下堅守苦戰以禦大敵者且建康去平江無數百里之逺非有髙山大川以為限隔健馬疾馳數日可至徒有怯敵之名無益退避之實建康有長江天塹之險不能固守何有扵吳會哉聲勢所逼退而之臨安又退而之閩粤極矣我退彼進使敵軍南渡得一邑則守一邑得一州則守一州得一路則守一路亂臣賊子黠吏姦氓従而附之虎踞䲭張雖欲如前日返駕還轅復立朝廷扵荆棘瓦礫之中不可得也偷取目前之安不頋異時噬臍之悔非䇿之得者借使敵騎衝突不得已而權宜避之猶為有説今幸疆場未有警急之報兵将初無不利之失朝廷正可懲徃事脩軍政審號令眀賞罰益務固守而遽為此擾擾棄前功蹈後害以自趨於禍敗豈不重可惜哉臣故曰車駕不宜輕動正當静以鎮之者此也臣又聞自昔有江表者必以淮南為藩籬屯重兵於江北然後江南可安六朝相繼數百年雖苻堅石勒宇文拓跋之盛不能陵踐凡以強藩巨鎮盡列淮上之故後唐李氏有淮南則足以保國既失江北國勢遂卑由是觀之今日之事豈可因一叛将之故悉罷屯戍遂欲棄置扵度外張俊既去盱眙楊沂中又去廬夀李宏獨以千兵守之使敵挾叛将以来則廬夀必不能守前日酈瓊之叛屋宇倉廪置而不焚豈無深慮使敵得據合淝則舒蘄光黄一帶無兵可禦決須退保是敵無亡矢遺鏃之費以談笑而下淮西也一失淮西與之共長江之利江南可得無患乎州縣無俻人情震駭一患也塩貨不通粮餉皆阻二患也濟渡多端難扵控扼三患也時出兵以擾我疲扵奔命四患也得吾州縣蝟結蟻聚水草有依遂為吾之痼疾五患也昔人有言長江千里當俻者不過數處如人一身腠理為急淮西者今之腠理也敵軍入寇必趣廬夀前日以劉光世全軍數萬人守之猶懼不濟今乃無兵是委重地與敵以為背脇疽根豈不重可惜哉臣故曰諸将重兵不宜抽囬正當分屯要害益務自固者此也前日劉光世一軍以措置失當之故将士攜離捨我㱕敵非細故矣萬一因此翠華移蹕将士召還以致不可勝言之患是措置之失又非前日之比也昔人有言動不詳思輙喜言誤誤不可數也臣觀朝廷自建炎以来每失機會其誤多矣譬猶奕者前著雖差後着猶可救也若著着皆誤何以取勝傍觀者得不為之寒心臣愚竊思所以為今日計願陛下深體漢祖之用心堅忍而勿輕變非有大警急姑少安之丁寧訓戒三四大臣益圖所以自固之䇿遣張俊全軍進屯廬夀而存其家屬於建康以便糧餉命韓世忠兼保盱眙而留楊沂中以衛行在詔岳飛分兵江池以保上流㳂江有􅇱則國勢亦粗定矣前日剙造車船戰艦所費不貲初不聞置軍教閲将安用之謂宜收拾於建康上流州縣如太平江池等州蕪湖繁昌湖口等縣擺泊仍於江湖間募習水善㳺者萬餘人刺手背為水軍差官統領分𨽻教習使金鼓旌旗上連下接以􅇱緩急之用則敵騎雖盛亦豈敢遽窺江右哉使今冬防守無虞則人心自安國勢益固可以徐圖善後之䇿捨此不為而但務退保臣未見其可也抑臣聞之書曰民非后罔戴后非衆罔與守邦又聞之孟子曰保民而王莫之能禦天子作民父母必有保民之心然後衆心欣戴如子之保父母此上下之所以能相固也蜀先主去荆州従之者數萬人曹操逐之或勸捨衆而速行先主曰衆人従我豈忍棄之説者謂其有帝王之度區區偏霸之主猶如此而況扵天下之君乎臣願陛下以保民之憂為先則雖弱必强中興之業不難致矣臣以愚拙毎進狂直之言必蒙褒納有君如此其忍負之故敢扵艱虞之時復進苦口逆耳之説言或可採願陛下與三四大臣熟議利害斷而行之庶㡬有補萬一徒能容納而不用無益也昔漢髙祖開濟大業非無張良陳平之臣出竒畫䇿動必有功然勸為義帝伐項羽者三老董公也勸出武關置軍宛葉者轅生也勸都闗中者婁敬也勸以親子弟王齊者田肯也必有衆謀乃能有濟今臣以孤陋逺在千里之外毎有所聞輙獻臆説仰裨廟謀尚庻㡬於數子伏望聖慈赦其罪而取其忠天下不勝幸甚綱又論和戰劄子曰臣聞戰國之際合從連横皆其國安危存亡之所係而當時六國之君不能深計利害以聽其説従人憑軾結駟説以合從之謀則曰謹奉社稷以従横人憑軾結駟説以連横之説則又曰謹奉社稷以従是其胸次初無一定之計而為羣言之所眩惑宜其無成功而卒至於敗亡也夫合燕趙韓魏齊楚之師恊謀併力以拒秦此六國之利故従約既成投書函谷闗而秦師不敢出關者十有餘年豈非計之得耶其後秦遣横人㳺說以欺六國之君扵是従散約解争割地以賂秦秦有餘力以蠶食天下而六國遂以不振由是言之為六國計従說是也横説非也今之所謂和戰者何以異此古者鄰國交好則有和親聘問往来休息兵革災患相卹慶賛相從夫是謂和金人則不然假和議以行其詐謀割地取賂既已約和則又求釁以戰以此亡契丹而困中國中國為和所誤者多矣十餘年来持和議之説一切苟且希冀萬一者何其紛紛也夫靖康之間彼以敵國待我尚可言和至建炎以来見扵文檄彼其待我者為如何乃欲恃和議以為自安之計其可乎況仇讐之邦不共戴天卑辭重幣祇自取辱何益於事惟當脩政刑明賞罰選将帥治軍旅􅇱器械利甲兵峙糗粮積財用士氣既振乗機大舉以恢復中原是戰之可成中興之業猶合従以拒秦不可易之理也然兵凶器戰危事雖孔子未甞不致其慎故曰臨事而懼好謀而成其可易言哉知彼知已乃可以戰我寔而彼虚我堅而彼危我治而彼亂在我者有一定之規摹有應變之方略有輯睦之将帥有精練之士馬有蓄積之財用榖粟而又敵人有間隙可乗之機㑹然後可以決勝於千里之外宗社安危所繫不可忽也今日為吾患者不在劉豫而在金人軍政既脩欲議恢復正當慮始慮卒預圖善後之䇿得某地當屯某兵用某人可守某地新附之衆如何撫綏将来之事如何措畫使金人来援劉豫當如何以待之此數事者皆有定議則中興之功已在吾掌握中矣夫勝負兵家常勢大計已㝎願無以細故動揺益務自治自強如漢髙祖之堅忍乃可得志倘或且戰且和如六國之朝従而暮横臣愚未見其可也伏望聖慈留神幸察八年綱為江西安撫制置大使論中興之功奏曰臣伏覩車駕以仲春令辰發軔吳門廵幸建康斷自宸衷不貳不疑慨然有恢復土宇掃清中原拯濟烝黎戡定禍亂克翦大憝刷耻復仇之志天下臣子莫不望風跂竦抃蹈踊躍願少須臾無死以觀中興之功誠甚盛之舉也臣竊觀自古建功立事扶持社稷之臣未嘗不以立志為先申包胥聞伍貟有覆楚之言則曰我必存之其後哭秦庭以乞師卒如其志張柬之語武氏於荆南江中其後卒復唐祚垂祀三百一夫發念其烈如此而況以聖眀之資為萬乗之主乎髙祖之志見於不肯鬱鬱乆居漢中而與韓信論定三秦之策光武之志見於披輿地圖於信都城樓上與鄧禹論天下大計此皆志㝎於前功成於後初似落落難合而卒能建大功立大名定大業功施於當年名垂於後世載在典册不可誣也恭惟皇帝陛下天錫勇智運屬艱難遵養時晦之乆應機立斷幡然改圖思欲撥亂興衰光復祖宗之大業故親總六師以臨江表捨去吳越而幸建康漸為北伐之計志慮規模可謂宏逺矣臣願陛下益廣聖志擴而充之與神為謀日新其徳勿以去冬驟勝而自怠勿以目前粗定而自安凡可以致中興之治者無不為凡可以害中興之功者無不去有所規畫措置必以天下為度必以施於長乆可傳於後世為法則中興不難致矣夫中興之於用兵止是一事要以脩政事信賞刑眀是非别邪正招徕人材鼓作士氣愛惜民力順導衆心為先數者既􅇱則士奮扵朝農安於野榖粟充盈財用不匱将帥輯睦士卒樂戰用兵其有不勝者哉方今敵國雖強不仁不義專務變詐暴虐以脅制天下神怒人憤莫之與親自古豈有如此而能久立國者正如隆冬固隂沍寒層氷千里陽和既囬應時消釋此理之必至無足怪也昔者范蠡説越王勾踐以持盈者與天定傾者與人節事者與地勾踐用之國以富強然又必以人事與天時相參然後乃能成功遂以報吳臣竊觀國家去嵗諸路豐穰今春雨暘調適又将豐嵗是在我者得天時矣正當脩人事以應之以我之無釁待彼之有釁則戡亂㝎功役不再籍夫何逺之有臣以固陋自靖康以来與聞國論獨持戰守之策不敢以和議為然今十有二年矣孤危寡與屢遭謗誣仰賴聖眀曲加照察脱身九死之濵今得承之待罪方面恭聞戎輅臨駐江干将大有為以成戡㝎之烈欣幸之情倍萬常品頋雖衰病尚庶㡬未填溝壑間獲觀陛下恢復中原攄憤千古志願畢矣輙罄狂瞽干冒天威綱又論使事奏曰臣竊見朝廷遣王倫使金國奉迎梓宫往返屢矣今者倫之歸與敵使偕乃以江南詔諭為使名四方傳聞無不駭愕何者兩國通使講好息兵以禮為先自敵以上無所不用其至禮之經也今乃不著國號而曰江南不云通問而曰詔諭此何禮也宋有天下㡬二百年祖功宗徳以聖繼聖聲教溢于四表炎運中微世變紛擾馴致靖康之變國祚㡬絶賴陛下總師大河之北入繼大統羣臣推戴克受天命履大寶臨萬邦為神民萬物之主一紀于兹矣敵人遣使乃敢命名如此自古逺裔陵侮中國未有若斯之甚者原其所自皆吾謀慮弗臧不能自治自強偷安朝夕無乆逺之計羣臣誤陛下之所致也臣請試為陛下詳言之方靖康末金人破都城毁宗社逼二聖鑾輿以北遷易姓建號而陛下應天順人光復舊業自我視彼則仇讐也自彼視我則腹心之疾也豈復有可和之理然而朝廷遣使通問冠盖相望於道卑詞厚幣無所愛惜者正以二聖在其域中為親屈已不得已而然猶有説也至去年春兩宫凶問既至陛下抱哀銜恤創鉅痛深雖未能躬率六師以報不共戴天之讐猶當寢罷使者絶不與通以正仇讐之名慎固封守選練将帥以為自保之計觀釁待時動必有功傳曰名其為賊敵乃可服欲正仇讐之名以張恢復之本正在此時而朝廷失策復遣使以迎梓宫亟往遄返帑藏為虚初不得其要約今日敵使洊至廼建詔諭之號公肆陵侮不知朝廷将何以應之夫奉迎梓宫乃陛下孝思罔極在人情不得不如此者然金人狡獪動出計謀我以誠求彼以詐應借此為重成其姦心不知朝廷何所憑信臣恐堕其計中禍難之未艾臣聞忠信為周古者遣使以忠信為主故小雅於皇皇者華君遣使臣之詩諏謀度詢必以周爰為言使不忠信為國之患非淺淺也彼王倫何為者市井駔儈之才左右賣國之伍三尺之童皆知其不足信而朝廷信之此必有甘言以中朝廷之欲臣恐聽虚詞而受實患如楚之信張儀以求商於之地也且倫使事初以奉迎梓宫為指而敵使之来乃以江南詔諭為名循名責寔已自乖戾則其所以罔朝廷而生後患者不待詰而可知臣在逺方雖不足以知其曲折然以愚意料之敵為此名以遣使其邀求大略有五必降詔書欲陛下屈體降禮以聽受一也必有赦文欲朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣禀其號令三也必求嵗賂廣其數目使我坐困四也必求割地以江為界淮南荆襄四川盡欲得之五也此五者朝廷従其一則大事去矣天子之令曰詔臣下則以禀令受詔為事倘屈體降禮權時之宜以聽其詔令則君臣之分㝎矣君臣尊卑如天地相逺降尊就卑以天為地可乎其不可者一也天子之恩曰赦臣民則以遇赦該恩為幸倘朝廷宣布頒示郡縣則天下知朝廷之勢去士民之心離矣其不可者二也履至尊以制六合曰天子謹制度以為諸侯曰藩臣天子出命者也藩臣禀令者也倘奉藩稱臣禀其號令則事不在我國家之勢傾矣其不可者三也朝廷全盛之時嵗賂金人百五十萬猶不能給遂至敗盟今日保據東南財用鮮少又有養兵之費日益窘廹而欲増賂以求全盖亦難矣其不可者四也淮南荆襄江浙之屏蔽也四川天下之上流也不能措畫屏蔽保有上流資天險結人心以為固而欲割要害之地棄民以求安必無之理其不可者五也金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未已也必繼有號召或使親迎梓宫或使單車入覲或使移易将相或使改革政事或竭取賦稅或朘削土宇従之則無有藝極一不従則前功盡廢反為兵端以謂權時之宜聽其邀求可以無後悔者非愚則誣也使國家之勢單弱果不足以自振不得已而為此固亦無可奈何今土宇之廣猶半天下臣民之心戴宋不忘與有識者謀之尚足以有為豈可忘祖宗之大業生靈之屬望弗慮弗圖遽自屈服祈哀乞憐冀延旦暮之命哉昔少康以一旅之衆祀夏配天不失舊物光武騎牛従軍殺新野尉然後得馬率烏合三千破尋邑百萬遂㝎中興之業晋保江左財用匱乏王導至身衣練布誘善賈以濟國用卒延國祚百有餘年今朝廷事力雖不足以望全盛之時然將士如雲帶甲之卒數十萬士馬之盛豈不過扵少康光武榖粟金帛運漕不絶舳艫相銜財用之多豈不過扵東晋有可為之資而陛下又有過人之聰眀何憚不為而欲北靣以事仇讐甘受此屈辱也夫自古創業中興之主多由布衣奮空拳以取天下非吾之兵民財用而吾能因而用之積累以成帝王之業詒謀子孫垂裕無窮今兵民財用皆祖宗之所以遺我者而陛下不思所以用之遽欲委身束手受制於仇讐之手此臣之所不曉也陛下縦自輕奈宗社何奈天下臣民何奈後世史册何且立大事建大㓛者必以作士氣得人心為先而號令賞罰者其具也人心士氣在今日雖已不及建炎之初然審號令眀賞罰以振起之尚為我用陛下一受制於强敵號令賞罰皆不由於已出士氣日索人心日離将士益桀驁而不可馭民庶益泮渙而不可蓄威令一去如神龍之失水為螻蟻所困後雖悔之噬臍何及此臣所以夙夜痛憤而寒心也議者必謂勢有強弱弱者必服于强故大王事狄勾踐事吳孫權事魏皆行權以濟大業藉此以感動聖意臣皆以為不然昔者大王居邠狄人侵之事之以珠玉犬馬皆不得免徙居岐山之下従之者如歸市狄人乃已今陛下能以此已金人之侵乎勾踐身入呉以為臣僕僅得歸國枕戈甞膽卒以報吳今陛下能以此報金人之仇乎孫氏起於江東未能自立故臣魏以俟時今陛下藉袓宗二百年之基業縦使未能恢復土宇豈可不自愛重而怖懼屈服以貽天下後世之譏議哉為此説者但欲求合於朝廷之意而不頋患􅍔之在後臣愚竊以為過矣昔趙欲帝秦魯仲連辭而折之以謂秦帝則諸侯皆為所制不聽命則誅戮随之欲帝秦者知其利而不知其害秦非禮義之國仲連有蹈東海而死耳不忍為之民也新垣衍詘不果帝秦而秦師為之退舍曹操以十萬衆臨荆州勢搖東南雖張昭亦欲迎之周瑜為孫權畫策以謂如臣者何往不可将軍安所容乎權拊案大悟遂有赤壁之戰而鼎足之勢成此二人者其所陳説深切著眀二君聽之遂能反禍以為福轉敗而成功胷中照了明白洞達果㫁而不疑也今敵使之来其用事者未必不以兵随之以為脅制之術頋朝廷所以措置者如何耳措置有􅇱雖苻堅百萬之師不足畏措置無術雖數千百騎便足以為吾擾方危廹之秋無排難解紛之略則無貴扵智者矣朝廷自十數年来議論不一執守不堅無規模素㝎之計玩嵗愒日茍且過時無積累就緒之功倡為和議者紛紛趣度目前而不以後艱為念以致今日之陵侮非偶然也忠義之士懐才抱智不能自達者頋豈乏人臣願陛下特留聖意且勿輕許深詔羣臣講眀利害可以長乆之策悉以上聞陛下擇其善者而従之廣謀兼慮而不偏聽於今日事必有所補臣昨扵建炎元年甞獻國是之説以謂朝廷不能自强自治但欲卑屈以従之雖至於奉藩稱臣敵人之謀勢猶未已又於紹興五年蒙降詔訪問嘗獻乞罷議和之説以謂遣使議和敵人必制我以必不敢為之謀邀我以必不可従之事非徒無益而有害於吾自治自强之計為患甚深區區之忠幸䝉睿察今日之事無他遣使議和不已使敵人得窺伺謀畫皆引惹之所致也臣願陛下為宗社大計萬㡬之餘長慮卻顧覽前古之興亡究今日之利害倘或權時之宜禀其號令之後别有須索如前所陳復禀正朔易服色趣朝㑹擅誅賞盡取鞍馬器甲之𩔖當如何䖏之而吾之士氣既索如何可以復振人心既離如何可以復收國勢既傾如何可以復定今日執和議主事者果能任其責而保其必不然乎逺察大王勾踐之事與今日不同深味仲連周瑜之言與今日相若則利害昭然矣臣世受國恩奉事三朝䝉陛下知遇尤厚常願奮不顧身以徇國家之急今事勢危廹所以應之一失機㑹則祻難相尋為害有不可勝言者又非前日之比區區孤忠願效愚計第恐朝廷不能用之夫用不用在朝廷而臣激於義有不得不言者惟陛下留神幸察臣竊觀國家之與金人勢不兩立而今日之事止在於絶之與通亦不難决也與之通則聽其號令而臣屬之動為所制身危國蹙必至於亡而後已與之絶則圖所以自治自强者選将勵兵待其来則禦之勝負之勢猶未㝎也與其事不共戴天之讐仰愧宗廟俯失士民之心而終歸于亡貽羞無窮曷若幡然改圖正仇讐之名辭順理直以作士民之氣猶可以履危而求安轉亡而為存未為失策也二者利害相去逺矣惟願陛下出自睿斷正王倫誤國之罪而肆諸市朝敵使未入境則卻而弗納已入境則拘留而弗遣降哀痛罪已之詔深咎前日和議之失丁寧反覆其言切至以激勵天下臣民将士之心盡取賂遺敵人金帛以募敢死之士訓練習服以守邉彊以俻不虞以制敵人衝突此計既㝎詔音既頒臣将見人情翕然囬心易慮天地神眀亦當助順敵人之師不戰而自屈矣然後㩀江淮以為固進賢俊退佞䛕脩政事眀賞刑治軍旅積金榖待時而奮以圖恢復此豈可與受制於人甘心屈辱同日而語哉且劉豫者金人之所立八九年間豫之所以奉金人者可謂至矣一旦廢棄如弁髦土梗何則彼為利謀而初不以恩信為事也陛下視金人之於我孰與於豫豫猶如此於我可知彼雖以江南數千里地王我為言猶不足信而況於復故境歸侵地乎惟智者可與料敵惟眀者可與照姦陛下或以臣言為未然願降臣章與羣臣之有智畧者慮而圖之勿為單見之所惑勿為勍敵之所欺勿至将来追悔不及而後悔則宗社生靈之福也傳曰日中必􅡢操刀必割時乎時乎不再来臣言可採陛下㫁而行之勿疑以為議論乖謬而害於今日之至計願先斧鉞之戮以懲妄發夫主憂臣辱主辱臣死國家事勢至此死何足惜惟陛下裁幸臣昨任江西安撫制置大使日因淮西酈瓊之變以已見利害具奏以聞誤䝉聖恩降詔奨諭以疏中論及侍従臺諫以謂侍従者論思獻納之官臺諫者耳目腹心之寄以言為職𩔖皆毛舉細故以塞責所論不過簿書資格守倅令丞除授之失當至於國家大計係宗社之安危生靈之休戚初未聞有一言及之遂犯臺誎之怒厚誣醜詆以無為有群起而攻之伏䝉聖慈洞照非辜力賜保全使得歸休山林養痾藏拙臣之為幸大矣䝉垢忍耻不敢自眀緘口結舌不敢復與世事故芻蕘之言乆不上達然惓惓之心未甞一日不在赤墀之下也今聞使事方亟所係國體非輕存亡之端非獨安危而已臣不勝憤懣敢以狂瞽干冒天聽罪當萬死俯伏俟命綱論襄陽形勝劄子曰臣竊以當今天下形勝在襄陽何以言之四方地勢正猶棊局今車駕駐蹕於吳越是置子於東南隅也宣撫處置司聚兵於川陕是置子於西北隅也湖湘屯重兵以控制是置子扵西南隅也吳越由湖湘以趨川陕如行曲尺之上相去萬有餘里號令未易達首尾不相應一有緩急何以為援惟襄陽地接中原西通川峡東引吳越如行於弓弦之上地里省半而又前臨京畿宻邇故都後負歸峡蔽障上流遣大帥率師以鎮之如置子扵局心真所謂欲近四旁莫如中央者也既逼僭偽巢穴賊有忌憚必不敢窺伺東南将来王師大舉收京東西及陕西五路又不敢出兵應援則是以一路之兵禁其四出因利乗便進取京師乃扼其喉拊其背制其死命之䇿也朝廷近拜岳飛為荆襄招討使其計得矣然駐軍岳鄂未聞前進豈不以自兵火以来襄陽焚毁尤甚野無耕農市無販商城郭隳廢邑屋蕩盡而糧餉難扵運漕故耶臣觀自古有意於為國家立功名之人如劉琨祖逖之徒未嘗不據形勝廣招納披荆榛立官府履艱險攻苦淡積日累月葺理家計然後能成功者若欲坐待其事成必無此理願詔岳飛先遣将佐軍馬及幕府官徑趨襄陽随宜料理脩城壁建邑屋招納西北之民措置營田勸誘商賈之伍懋通貨賄稍稍就緒然後徙大兵以居之旁近諸郡如金房随郢見屬我者可以撫綏如陳蔡許潁見従敵者可以攻取不過年嵗間必有顯效如謂屯兵聚糧運漕為難則漢江出襄陽城下通扵沔鄂漕運之利未有如此之便者當以兵䕶糧船使敵不得抄掠則吾事濟矣今日天下形勝臣愚以謂無出襄陽之右者伏望聖慈特加睿察早降指揮無使緩不及事天下幸甚建炎元年開封尹宗澤上奏曰臣伏見我國家承平幾二百年數世戴白之老不識兵革上下恬熙猶夷度日不復以權謀戰争為念乃以敵人誕謾為可憑信朝廷恬視不少置疑不惟不曽教人坐作進退擊刺挽射之伎俾嚴攻討其間有實欲賈勇思敵所愾之人士大夫不以為狂則以為妄因循茍且以致敵人顛越不恭遂有前日之祻臣不勝憤恨然兹非敵人之能也皆由亡誠寔之士鼓唱驕逸率以歛跡逃避曲辱不耻為智為勇爾萬一有慷慨論列則掩耳不聽别造佞説以相浮動兹無他大抵只欲助敵張皇聲勢直為我祖宗一統基業更不當頋藉宜兩手分付與敵人耳嗟乎何不忠不義之甚也臣每思念涕泗交下繼之以血此天地神明之所昭監臣恭惟淵聖皇帝靖康之初信此和議俾敵大獲而歸去冬與今春夏敵勢猖獗大臣柔邪諛佞蓄縮畏避者不敢略有拒抗語但以詭譎為誠寔包藏為智謀緘黙為沈鷙遂致二聖䝉塵后妃親王與無辜之人流離北去想陛下龍潜濟鄆嘗親聞見張邦昌耿南仲軰所為也陛下入繼大統即将前主和議者竄之嶺外使天下寃抑之氣一旦舒快自後臣竊聞陛下日與二三大臣論思講畫必欲大雪我廟朝之耻激勵卒伍勸率義士俾思勦絶以正華夏不意陛下復聽姦邪之語又浸漸望和迂回曲折為退走計臣願陛下試一思之陛下初陟位何故以講和為非遂逐當時議臣陛下近日又何故只信憑姦邪與敵人為地者之畫營繕金陵迎奉元祐太后仍遣省官迎奉太廟木主弃河東河西河北京東京西淮南陜右七路千百萬生靈如糞壤草芥略不頋恤比敵人遣姦狡小醜假作使偽楚為名来覘我大宋虚寔臣見如是因納諫状與留守范訥乞収彼國奉使之人置之牢狴奏取朝廷指揮庶激軍民士庶懐寃之心俾肯力戰仰賛陛下再造王室中興大宋基業之意今却令遷置别館優加待遇臣奉此詔命憂思涕泣心欲折死不知二三大臣何為於敵人情欵如是之厚而於我國家訏謨如是之薄臣每思京師人情物價漸如我祖宗時若鑾駕一歸則再造之功與中興之烈必赫奕宏大跨商周而越漢唐矣何姦邪之臣尚狃和議皇惑聖聦伏望陛下察之臣之樸愚不敢奉詔以彰國弱此我大宋興衰治亂之機也臣願陛下思之陛下果以臣言為狂願盡賜褫削投之瘴烟逺惡之地以快姦邪賊臣之心不勝痛憤激切之至臣藉藁闕下以俟誅戮澤乞回鑾䟽曰臣聞三代之得天下也得其民也得其民有道得其心也得其心有道所欲與之聚之所惡勿施爾也是則得民之道在察其心之所欲與其心之所惡而已此古所以有天時不如地利地利不如人和之語求民之和豈必家至戸到一一而求之哉應順天人承天下之大順則民不期和而自和矣臣䝉恩差知開封府臣雖衰老無能然乆知開封染習諸統制下皆是招集惡少亡命無檢者臣既領府事更不敢狥身自頋但以正道瀝誠感之不旬浹間彼惡少軰咸知格心爍謀歛迹遁去其閭巷間亦自然悛改上下帖然無復肆横以是人人鼓舞仰陛下之威懐陛下之恵拳拳慕戀不啻嬰孺之愛父母咸思發憤敵其所愾臣每聞王畿内外日乆嘉靖熈熈皥皥将如我祖宗慶祐熈豐時臣觀人心念念徯望者惟願陛下六龍之御警蹕之聲千乗萬騎来歸九重以副萬邦切切繋戀之誠澤又上䟽曰臣聞禹之行水行其所無事所謂無事者非泊然無所為於事也事無事而已夫禹蒙天錫洪範九疇知水有潤下之性且親見堯有洪水滔天績用弗成之患遂因水之性而順道之故天下免于昏墊而奠厥攸居兹無他皆堯用禹之力也臣竊聞将士藉藉皆願陛下歸京師云京師是衆兵駐劄之本根也商旅藉藉皆願陛下歸京師云京師是天下賈販之要區也農民藉藉皆願陛下歸京師云京師是天下首善之地也士大夫懐忠義者藉藉皆願陛下歸京師云京師是陛下朝宗之域也臣前在臨濮兵寨中實憂群臣無逺識見恐替陛下去維揚金陵又見京城有賊臣張邦昌僣竊與范瓊軰擅行威福無所忌憚所以曽暫乞駐蹕南都以觀天意以察人心仰䝉聽従臣誤被宸恩差知開封府事今到五十餘日物價市肆漸同平時每觀天意眷頋清眀每察人心和平逸樂且商賈農民士大夫之懐忠義者咸曰若陛下歸正九重是王室再造大宋中興也臣竊料百僚中唱為異議不欲陛下歸京師者不過如張邦昌等姦邪軰隂與敵人為地耳臣願陛下體堯禹順水之性順将士順商旅農民順士大夫之懐忠義者早降勅命整頓六師及詔百執事示謁欵宗廟垂拱九重之日毋一向聽張邦昌姦邪軰隂與敵人為地者之語不勝幸甚臣之少也猶不如人今年六十九矣眷眷血誠恨其學問荒鄙不能以激忠義之辭仰動天聽臣不勝涕泣痛怛之至澤又上䟽曰臣聞聖人中天下而立㝎四海之民夫中原天下之中也京師又中原之中也我太祖太宗受天景命始基于汴肈造無疆大厯服固欲傳之億萬世偶去冬今春信憑敵人姦詐遂致二聖䝉塵陛下不得已應天順人纂承寳緒四海生靈謳歌抃舞自西自東自南自北罔不率俾以俟庶績咸熈萬邦嘉靖陛下既即位乃宴安南京四方聞之懐疑胥動遞相鼓扇聞諸州縣間有驚劫傷殘之患盖是小民無知因疑致憂因憂致變旋相踐蹂弗奠攸居兹無他由陛下寅畏過當駐蹕别都俯狥姦謀預圖遷幸使狡獪皇惑敢爾横肆盜據竊發罔循跼蹐原本闕三字以歸畎畆以操耒耜鑄劔㦸為農器思不犯于有司耳若陛下勅翠華之御俾千乗萬騎囬復輦轂奠枕九重臣竊謂可以垂衣裳而天下治可以坐視天民之阜王室自然再造大宋可以中興尚何勍敵之足憂盜賊之足慮乎古先哲王凡有大疑必詢之左右又詢之卿士又詢之國人又詢之卜筮臣蒙陛下矜憐頋遇待罪開封臣夙夜思念竊恐陛下所親信左右輔弼之臣於對揚獻納之際不思祖宗創業之艱難與致一統之匪易輕狥臆説有誤國家大計所以狂妄冒死觸犯天威臣不勝憂憤戰慄激切之至澤又上䟽曰臣恭惟我大宋深仁厚徳滲漉方夏幾二百年一旦金人邀迎二聖京師士民皇皇無依嗷嗷無告若窮民無所歸者若嬰兒而失其慈母者忽聞陛下龍潜在濟於是謳歌竭蹷交走道路兹乃祖宗湛徳浹洽得其心故也陛下紹登寳祚尚留南都臣自到京師聞道路藉藉咸曰陛下何不認我宗廟乎何不眷頋我朝廷乎何故使我社稷無所依乎何輕捨我生靈使我未有所仰乎是都人之望陛下也切切如此臣願早囬六龍俾人感翠華之至深慰其心臣前劄具奏以謂得其民當得其心其所欲與之聚之所惡弗施爾也若陛下囬鑾汴邑是人心所欲也願陛下與之聚之陛下聽姦邪畏避強敵之言妄議遷幸是所惡也願陛下勿施爾也老臣血誠言不盡意澤又上䟽曰臣學問膚淺不能式是古訓對揚天休今再瀝悃誠干冒睿聽以臣耳目所親聞見事一二䟽進伏望陛下哀憐特賜俞允伏覩國家甞變更三舍之法以取士意謂臯夔稷卨皆自此塗出卒之廹於月試剽竊時文㒺有稽古者是三舍果不足以取士也又嘗尊崇道教以奉真亦謂神仙荘老皆自此塗出卒之誕謾譎恠汙染成風罔有成就者是道術果不足以奉真也又甞進貢花石以昭享上卒之驕滛矜誇蠧耗財計無有紀極是貢花石果不足以享上也又嘗結好敵人欲以息民卒之邀迎二聖刼掠侵欺靡所不至是守和議果不足以息民也當時行之固有阿意順㫖作為歌頌以叨富貴者其間亦有毅然獨立不相詭隨以鯁亮獲罪者陛下觀之昔富貴者為是乎被罪者為非乎臣每思之宗廟社稷岌嶪如是者盡由姦邪憸人鼓唱四事俾民病弊幾不􅂓生所以致有今日之患詩曰商鍳不逺在夏后之世兹覆轍正陛下蕭墻之鑒今之言遷幸者猶前日之言四事為可行阿䛕諂佞動為身謀翕翕訿訿更相助成今之言不可遷幸者猶前日之言四事不可行而罹其罪者也且我京師是祖宗二百年積累之基業是天下大一統之本根陛下奈何聽先入之言輕棄之欲以遺海陬一勍敵乎臣觀河東河西河北京東京西之民咸懐寃負痛感慨激切想其慷慨之氣直欲掃清宇宙陛下何忍恬聽䛕順而不令剛正之士率厲同心一為整頓乎今東京市井如舊上下安帖但嗷嗷之人思望翠華之歸謁欵宗廟垂衣九重不啻饑渇之望飲食大旱之望雲霓也臣竊謂陛下一歸則王室再造矣中興之業復成矣陛下如以臣為狂率誕妄願延左右之将士試一詢之昔周勃入北軍使左袒右袒以卜劉呂盖非獲已也臣區區誠意願陛下以遷幸大計不獨謀之一二大臣當與億萬之衆同之臣忠憤不勝涕淚交下激切屏營之至澤又上䟽曰伏覩朝廷前遣翁彦國營繕金陵比有詔復欲遣官奉迎太后六宫以往且謂朕當獨留中原臣伏讀詔書私竊疑之此必有進言者勸陛下過江避敵而不思天下大計託為愛君之迹以濟其不忠臣願陛下察其利害之實斷自淵衷早賜㝎論重念本朝提封萬里京師號為腹心以祖宗都此垂二百年宗廟社稷所在而民人依之以居者無慮萬萬計今兩河雖未敉寧猶一手臂之不伸也而乃遽欲去而之他非惟不能療一手臂之不伸并與腹心而棄之豈祖宗所以付託之意與天下睽睽萬目所以仰望之心哉彼進言之臣談何容易且利害之端曉然可見臣乞陛下且駐蹕南都未可輕議舉動臣雖老矣尚當矍鑠鼓勇立辦禦敵之具以圖萬全之舉然後掃除宫禁嚴􅊀扈従奉迎鑾輿謁見九廟非特使神祗祖考安樂之庶幾中原増重不失天下之大勢也不然則是徒為走計爾示人以弱非唯不恤兩河抑又不恤中原且去宗廟社稷而不頋陛下豈忍乎臣重為陛下惜者此爾故敢直輸血誠幸陛下留意無忽昔景徳間契丹冦澶淵警報一聞中外震恐是時王欽若江南人即勸章聖幸金陵陳堯佐蜀人即勸幸成都惟冦準毅然闢之請帝親征卒用成功頋臣庸謬何敢望準然事適相𩔖不敢不以章聖望陛下也臣又自期既已奉迎鑾輿還都即當身率諸道之兵直趨兩河之外蹀血北廷非特復我故地且迎二聖以歸庶雪靖康一再之耻然後舉觴玉殿以為聖天子億萬斯年之賀臣之志願始畢矣竊自謂愛陛下者無如老臣然不知臣者必指臣以為狂妄臣亦非所恤也伏望陛下觀事之宜察臣之心則知臣之忠于為國澤又上䟽曰臣契勘京城四壁濠河樓櫓與守禦器具其當職官吏恊心併力夙夜自公率厲不懈増築開濬起造輯理浸皆就緒臣又製造決勝戰車一千二百兩毎兩用五十有五人一卒使車八人推車二人扶輪六人執牌輔車二十人執長槍随牌輔車十有八人執神臂弓弩随槍射逺小使臣兩貟專幹辦閲習車事每十車差大使臣一員緫領為一隊見今四壁統制官日逐教閲坐作進退左右回旋曲折之陣委可以應用又沿河十六縣與上下州軍相接作聫珠寨以嚴偹禦臣見使王彦曹中正在河西攻撃收復州縣西京河陽鄭滑等州同為一體把截􅊥伺次第敵人畏讋已不敢輕動冒犯自速殄滅臣自到京奉揚陛下仁風布宣陛下徳意今街巷市井人情物態皆已忻悦敉寧嘉靖同祖宗太平時顧臣犬馬之齒六十有九比縁陛下委付之重常患才力不任惕惕憂懼近日頓覺衰瘁萬一溘先朝露辜負陛下眷恤憐憫之意臣死目不瞑倘使臣與官吏士民望翠華回輦之塵瞻仰天顔俯伏百拜然後臣退填溝壑如生之年死骨不朽論語曰為政以徳譬如北辰居其所而衆星拱之京師乃我祖宗基命肇造二百年大一統基業本根之地陛下奈何偏聽如張邦昌軰邪佞之語以廵幸為名輕去其所使四海来享来王之人徜徉道路於偏僻州軍為朝宗之地乎臣果得以此老身俯伏道左迎陛下千乗萬騎垂拱九重奉陛下指揮號令邉塵可以消滅宼盜自然平蕩王室扵焉再造大宋中興可必若誕妄之人言臣欲以海陬餘孽貽君父憂即臣自頂至踵甘俟斧鉞臣已修整御街御廊護道格子平整南薰門一帶御路聞萬邦百姓寓于京師者日夜顒顒望陛下迎奉祖宗之主與隆祐太后皇后妃嬪皇子天眷歸安大内以福天下臣夙夜憂思眷眷念念繼之以泣願陛下憐臣孤忠矜臣衰暮惟恐心力不逮或有誤陛下國家大計今年河流不氷惟陛下斷自淵衷毋惑羣邪之議書曰惟克果斷乃罔後艱臣下情不勝激切之至澤又上䟽曰臣聞易於渙之卦曰渙汗其大號此言人君發號施令如汗焉一出而不可反也臣竊觀陛下踐膺大寳權時之宜駐蹕近甸天下之民延頸企踵日望鑾輿之歸經理中原以建中興之業故廼者親降詔書即将還闕恭謁宗廟延見父老中外聞之莫不鼓舞相慶以謂陛下英斷如此何事不立何功不就何浮言之可惑何勍敵之足憂太平基業正在此舉下詔之後日復一日尚未聞千乗萬騎涓日啓行民心不能無疑焉臣愚竊意陛下乾綱不撓離眀並照洞見安危之機必不肯失信于天下是必有姦臣誤陛下負失信之謗也伏見邇者河陽水漲㫁絶河梁有姓馬人妻王氏者率衆禦敵敵勢窮窘不知所為此天賛我宋之時也夫天與不取反受其咎臣欲因此時遣閭勍王彦各統大兵乗其危孤大振軍聲盡平敵壘伏願陛下亟還京闕以繋天下之心則孰不用命且投機之㑹間不容穂願陛下毋惑於姦臣之言斷自淵衷臣自謂兹舉可保萬全無可疑者也或姦謀蔽欺天聽未即還闕伏願陛下従臣措畫勿使姦臣沮抑以誤社稷大計陳師鞠旅與之決戰掃盡邉塵擴清海宇然後奉迎鑾輿歸還京闕以快天下之心以塞姦臣之口臣蒙陛下知遇誓效死節區區愚忠不能自己伏望聖慈特賜睿斷天下幸甚二年澤又上䟽曰臣聞易曰天下之動貞夫一孟子曰天下烏乎㝎曰㝎于一恭惟京師是我太祖皇帝肇造大一統之本根也奕世聖人繼繼承承於此坐視天民之阜所以自西自東自南自北莫敢不来享莫敢不来王薄海内外㒺不率俾陛下天錫勇智入紹寳緒天下之人竭蹷稽首咸曰一哉王心今既奄有九有實萬世無疆之休陛下奈何不念四海生靈切切徯后之意乃偏聽姦邪之言託為時廵駐蹕淮甸不思我宗廟朝廷祠享報上垂拱視下又不思我二聖后妃親王天屬䝉塵朝夕懐想迎取之志又不思我諸帝諸后陵園廟貎以時祀祭所以貽厥子孫之情臣竊謂陛下若於二月間詔勅回鑾登樓肆赦則天下皆知一人来歸九重强者當革心逺罪弱者當屏迹復業必無憂疑聚為盜賊諸軍将士震奮感激願敵所愾敵勢窮蹙必俯首聽命以歸約束尚何惡之能為乎書曰時哉弗可失臣若有毫髪誤國大計臣有一子三孫甘被誅戮以謝天下臣竊恐州縣狃于搔擾百姓扇揺不能耕桑果耕桑失時則衣食之源盡廢衣食不給使諸大臣中雖有臯夔稷契伊尹周公亦不能善其後矣願陛下以祖宗二百年大一統基業為意不可憂思過計而信憑邪佞自為身謀者之語早勅回鑾則天下幸甚臣犬馬之齒已七十於禮與法皆合致其事以歸南畆臣漏盡鐘鳴猶僕僕不敢乞身以退者非貪冒也寔為二聖䝉塵北狩陛下駐蹕在外夙夜泣血惟恐因循後時使天下自此失我祖宗大一統之緒所以狂妄屢有敷奏非臣好為此激訐恭望睿慈委曲詳察澤又上䟽曰臣聞人主中天下而立㝎四海之民恭惟太祖皇帝肇造區夏以今京師為天下中故創業垂統欲傳之億萬世太宗真宗仁宗英宗神宗哲廟奕世聖人傳以相授皆以京師為本根之地所以高拱穆清坐視天民之阜必於天下之中也惟奠枕于京則自西自東自南自北莫敢不来享莫敢不来王矣偶縁玩習太平之乆文武恬熙狃於驕滛矜誇忘戰守之俻遂致金人横肆殘破州縣圍閉京城刼迎二聖后妃親王與諸天眷䝉塵北去僑寓沙漠此忠臣義士所以夙夜涕泣繼之以血自陛下即位應天四海萬方歡欣鼓舞垂髫鮐背山農野叟咸以手加額仰面謝天曰天下有真主矣萬世永頼寔天祚眀德為無疆之休矣四方帖然若逺若近並無盜賊暨陛下偏聽姦邪與敵人為地者之語移蹕淮甸諸䖏兇惡强盜如蝟毛起如蜂閧聚縦火殺掠所在猖獗㒺有悛懼以謂朝廷在逺無所依歸遽至是爾臣於二月十八日祇授降到黄榜詔勅云遂假勤王之名公為聚寇之患如是則勤王之人皆解體矣臣竊謂自敵人圍閉京城天下忠義之士憤懣痛切感厲争奮故自廣之東西湖之南北福建江淮梯山航海越數千里争先勤王但當時大臣無逺識見無大謀略低回曲折憑信誕妄不能撫而用之遂致二聖北狩諸親骨肉皆為刼持牽聫道路當時大臣不出一語使勤王大兵前往救援凡勤王人例遭斥逐未嘗有所犒賞未嘗有所幇勘饑餓流離困厄道路弱者填滿溝壑强者盡為盜賊此非勤王人之罪皆一時措置乖謬耳比来姦邪之臣方爾横肆盗賊自然得勢强梁惡少無縁殄滅竊念國家聖子神孫繼繼相承湛恩盛徳滲漉人心淪浹骨髄今河東河西不随順畨賊雖為剃頭辮髮而自保山寨者不知其幾千萬人諸䖏節義丈夫不頋其身而自黥其面為争先救駕者又不知幾萬數也今陛下以勤王者為盜賊則保山寨與自黥面者豈不失其心耶此語一出自今而後恐不復肯為勤王者矣噫得天下有道在得其民得其民有道在得其心陛下若駐蹕淮甸俾人顒顒之望皇皇之情未有所慰安此人之心也願陛下勿阻遏之以失人心臣仰詳詔語豈陛下之意皆詞臣失職不能敷繹之過臣願陛下黜代言之臣别降罪己之詔許還闕之期以大慰元元激切之意陛下還京登樓肆赦則天下之人盡皆遷善逺罪不犯于有司豈復更有為盜者王室再造大宋中興在此一舉願陛下睿㫁而力行之若以臣言上咈陛下之意誅之赦之惟陛下命澤又上䟽曰臣聞范仲淹云天下之事有二黨焉一黨曰發必危言立必危行王道正直何用曲為一黨曰遜言易入遜行易合人生安樂何用憂為天下之治亂在二者勝負耳大抵危言危行是欲致君于無過置民于無怨而已天下豈有不治者乎若夫遜言遜行之徒阿䛕曲折隨意所嚮逢迎茍合君施恩于上而下弗被民懐怨于下而上弗知如是天下豈有不亂者乎今之士大夫志氣每下議論卑陬上者不過持禄保寵下者不過便文自營曽不能留心惻怛為陛下思承祖宗二百年大一統之基業為可惜又不為陛下思父母兄弟與至親天眷䝉塵沙漠翹翹徯望大兵救援之意又不曽為陛下思祖宗西京園陵寝廟為敵人所占今年寒食節未有祭享之地又不曽為陛下思京師是天下之本根宗廟朝廷百司倉廩儼然如舊又不曽為陛下思河北河東京之東西陜右淮甸百億萬生靈之衆罹塗炭刼掠殘破之苦但朝進一言暮入一説計較泛舟冒大風險欲南幸湖外此姦邪之謀耳臣甞思之是一欲為敵人方便之計二為姦邪親屬皆先巳津置在南嗟乎為臣不忠不義乃至於此孔子所謂苟患失之無所不至正謂是也臣夙夜痛心泣血瀝竭愚忠為陛下保䕶京城自去年秋冬今春又三月矣農務是時陛下不早回九重則天下靡有㝎止臣不勝憤懣激切再瀆天聽狂妄干冒甘俟鼎鑊歴代名臣奏議卷八十五
