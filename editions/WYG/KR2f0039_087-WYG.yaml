body:
  text: 歴代名臣奏議卷八十七眀楊士竒等撰經國宋髙宗建炎間編脩官胡銓論符離之敗䟽曰臣聞古者或多難以固其國啓其疆宇或無難以䘮其國失其守宇齊有仲孫之難而小白以興晉有里㔻之難而重耳以起漢髙有平城之難而成帝業光武有王郎之難而興漢統唐太宗有渭水之難而大業以昌徳宗有奉天之難而唐祚益固何則以其畏多難而思所以保其國其操心危而慮患深也城濮之役晉無楚􅊀以敗扵邲邲之役楚無晉偹以敗扵鄢衛邢無難敗亦䘮之晉武既平呉何曽知其將亂隋文既平陳房喬知其必亡何則以其恃無難而不思所以固其國其操心不危而慮患不深也故曰或多難以固其國啓其疆宇或無難以䘮其國失其守宇豈不然㢤陛下思復不戴天之大讎䖏心積慮誓與敵人不俱生雖古人枕戈甞膽未能逺過近者淮上之衂盖天以是厲陛下之志使陛下動心忍性増益其所不能臣有以見天心之愛陛下也篤矣臣願陛下益强其志毋以小衂以自沮蒐乗補卒休兵息民期扵身濟大業實宗廟社稷之福紹興元年户部尚書葉夢得上奏曰臣准吏部牒􅇱坐都省劄子臣僚上言邊事未寜乞大詢衆庶􅇱禦之筞聖㫖令行在職事官以上具所見實封聞奏仍限五日者臣以踈拙不才罪戾廢棄之餘仰䝉陛下過聴收召今者􅇱列六官之長恩厚徳大雖在承平無事之時猶當感激奮勵圗報萬一況此中外艱虞陛下焦勞旰食日不暇給之際且復屈已下逮思盡羣筞主憂臣辱義當即死雖其愚陋敢不竭盡犬馬之誠或冀千慮一得竊惟金人不道憑陵中國四年于兹矣所舉無不中所為無不成卒莫能少挫其鋒者豈以荒穢暴起之餘越數千里之地虐用其民二十餘年叛天逆理流毒于我而我合天下之智真不能與之抗乎其患在扵始謀不臧動失機㑹因循橫潰養成其勢是以在彼者日益肆在我者日益困于今救之於末為愈難也夫兵機事也不度時不料敵則不可為故機㑹一失則為之每難於靖康之初矣若以今春視去冬盖又有難者焉去冬所聞出没於陕西河北之間者或曰㳺騎或曰簽軍未知主謀揔衆者何人今聞尼雅滿甞親至相州又至濮州又至開徳府是主兵者在尼雅滿此難者一也去冬以開徳府守河我尚恃河以保南境故敵屢撃橋我輙争得之今開徳既陷河已非我有則河南之地惟敵所欲徃此難者二也去冬河北京東諸郡存者尚衆南倚開徳北倚大名東倚東平此三大鎮者鼎足相峙而滄州又在其北徳博與濮更為脣齒其力猶足以相抗今惟東平巋然獨當宋魏之衝滄州孤絶在後此難者三也南京自古最為南北咽喉闗鍵唐安史之亂張廵許逺以死守之卒全江淮今又京師糧道所寄㳂汴而下距維揚無十日之程視唐利害尤重澶魏既破道途之言皆謂敵騎甞已至楚丘萬一遂薄南京則上可絶京師下可廹楚泗此難者四也京東河北諸郡初固皆欲死守故我力雖不能經紀而一方自為嬰城之計民社各欲保其鄉里者猶有可恃自開徳等陷人情震駭皆無固志聞徳州乃望風迎降而廵社之民亦或反為之用則見存諸郡豈復可保此難者五也只此三兩月之間難易不同又復如此不早為計敵既多得吾地遂擇膏腴利便之所以為巢穴重誘吾民脅之以威駸駸四出今日復振則三兩月復陷一州以漸及於東南取者不復可得陷者不復可振則三兩月之後其救之豈不更難於今日乎又況猖獗之志有不止扵此者臣竊觀敵前年冬去年春先破西京長安而去冬抽還陕西京西軍馬未㡬河北京東諸郡相繼遂陷盖其為謀自有次第是必欲潜窺淮甸而懼京西陜西與河北之民踵躡其後故先去其援今既得志矣則乗間而南不在今春必在今秋若先自單州趨南京次又趨宿州次又自淮陽軍趨楚州則㳂汴一帶皆不可支吾然是特為淮甸慮而已何者我猶可恃江以為之限也若更分兵一自陳潁出和州渡宣化采石以趨金陵一自唐汝出襄陽抵鄂州荆南以處上流則長江之險我亦不得専吾復何以為計哉此臣所以私憂也為今之計必先深戒靖康機㑹之失然後論起􅇱禦之策所為靖康之失者何也固守京師而不知避是也古之帝王一嵗而四廵狩初不以為難後世廵狩之禮雖廢然事有急緩必不得已而従權者未甞有人主跬歩不去王室之義臣在經筵甞因魏恵王遷都扵梁之事論之矣以謂王者無故而遷都則不可因事而廵狩則無不可自昔變難擾攘之際未有不因遷避而存遅疑固守而亡故唐眀皇以安禄山幸蜀代宗以吐蕃幸陜徳宗以朱泚幸梁僖宗以黄巢再幸蜀此五君者雖一時不免奔趨逺適之勞而後日皆保安全無事之福惟晉成帝當蘇峻之變而不避故危梁武帝當侯景之亂而不避故亡此已事之眀驗不待深考而知者靖康主謀之臣不知論此乃合遷都廵狩為一事不料敵之弱彊不度我之勝負徒襲宣和末議以固守京師為得計已大誤矣又復决意謂敵必不再至逺則邊境未甞為防托力拒之謀近則大河未甞為經畫必守之計終嵗分爭扵口舌之間者僅在戰和二說以逞其私緩其所可急急其所可緩逮期至事廹始命李回復蹈何瓘之覆轍以數萬衆守河而旋設四輔回至則盡潰四輔兵未集敵已過河訖束手不能效一戰禍遂至扵不可言此天下所以痛心疾首不能釋也今揚州則京師也東京京西見存諸郡則邊境也長淮則大河也陛下視靖康之失如彼則今日之圗其緩急先後宜何如㢤且天子居而在京師則以京師為家而外以經營四方出而在外則擇外之安存深固之地為家而外以經營四境為家者一定應事之機往来進退而以馬上治之固不以所一定者自為域也漢髙帝起於漢中東向而當項羽故以咸陽為家而蕭何守之咸陽有定而髙帝徃来進退必至於擒羽者未甞有定也光武起於南陽西向而當羣賊故以河内為家而以宼恂守之河内有定而光武之往来進退必至於誅賊者未甞有定也使髙帝不離咸陽光武不離河内不唯天下得失未可必安知無坐困於敵人者㢤臣愚以謂今隆祐太后六宫既在錢塘者陛下之咸陽河内所宜為家者也陛下若㝎家錢塘鑾輿進則負江而北退則阻江而南惟便利之所在不必固守維揚以順動為重陛下與大臣講此宜詳矣今敵猖獗大約已可見臣所不知者朝暮緩急之勢也慎重國體固欲舉措得宜精審敵情亦必機㑹中節伏望陛下博通下情廣逺斥候如勢必至扵過江則願以進退順動之意預㝎其期亟下詔書明喻中外無幸其不来而使得倉猝乗吾不意所處既定扈從臣子之心安矣四方形勢之望彊矣則􅇱禦之策惟吾力行而已臣謂今日之務有當為而未可為者有不可不為者有不得已而預為者臣聞敵雖得吾兩河諸郡然事勢猶未成人心猶未一吾能乗其未成未一之際併兵力戰復過大河以與河北見在諸郡山寨水寨之衆相為表裏因以待釁驅逐使不得安吾境此當為者也然勢未可為先且厚慰撫兩河然後専事京東京西淮南控扼之地謀其藩籬内拒淮為險以塞南牧之路使不得覬覦此不可不為者也則當速為淮狹而難守江闊而易守萬一三路藩籬不􅀎捍而淮不可保必退而守江則鎮江金陵與上㳺荆南襄鄂之地擇其要害抗以舟師此不得已而為之者也然不可不預為請試一二陳之今夫敵之驟强誠天假之連年戰勝之威百倍於我兩至京城如蹈無人之境殘破州郡唯其所欲我之不敵亦已審矣而臣方以可復過河驅逐出境者夫較强弱雖在力而論强弱所由致則在理天下無常弱唯理之所在而已我得其理則其氣伸其氣伸則其勢不激而自强不在力之衆也我失其理則其氣屈其氣屈則其勢不挫而自弱不在力之寡也昔後唐荘宗父事契丹阿保機及荘宗之難阿保機謂其使者姚坤曰吾聞此兒有宫婢二千人樂官千人放鷹走狗嗜酒好色任用不肖不惜人民此其所以敗也我自聞其禍則舉家斷酒解放鷹犬罷㪚樂官我亦有諸部樂官千人非公宴不用由此言之契丹亦人𩔖未可謂㝠然全無知識者也及徳光援石敬瑭破張逹敬瑭問所以速戰而勝者曰吾謂唐兵能守鴈門而扼諸險則事未可知今兵長驅深入而無阻吾知大事必濟且吾兵多難久宜以神速破之此所以勝也然則徳光雖彊亦必視形勢地利度其所可濟而後決勝宣和之末邊臣失計既與敵通又與之来我中國政事之過覘之多矣深謀狡智乗我而重輕之者既已窺於前逮其兩入我所以待之者未甞有一事一為當其節彼復謂我無􅀎為而可侮者又有以察扵後則飽其吞噬之氣以馴致其彊者豈無自而然㢤今陛下若能監宣和致寇之失而一切盡反之屏聲色逺䜛佞抑僥倖戒奢靡簡誅求撫彫瘵凡可以興衰扶危者無不為左右大臣能承陛下之意深求靖康誤國之弊而一切盡矯之收人心作士氣擇將帥練軍伍較地利料敵情凢可以救災捍患者無不舉夫彼既以是覘而乗我亦必以是覘我而知其不可乗既以是察而侮我亦必以是察我而知其不可侮我亦持此以感人而人服率此以用衆而衆従其理一易而氣隨之彼豈終怙其彊我豈終屈其弱乎且周世宗之興中國契丹之勢未有以異也奮然一起以唐晉之兵治唐晉之敵不血刄而復三闗虜遁逃折北之不暇彊弱之易變扵此可見矣竊聞兩河山寨水寨之民動以萬計其怨敵深入骨髓仰懐祖宗二百年徳澤蟠結之久南向號呼以待中國之救者未甞一日而忘我誠能力行前之所陳於内而使人重撫此遺民以收其用於外數月之後徐為大舉臣知大勢一返當如轉圜石於千仞之上王尋之師非不衆而光武破之扵昆陽曹操之師非不彊周瑜敗之扵赤壁苻堅之師非不銳而謝𤣥潰之扵淝水事不至此未可以定中興之期所謂當為而未可為者此也天下之勢在州郡州郡能立形勢者在將與兵祖宗以来處河北河東陜西三邉之術略可見矣緫之有帥命之有將屬之有兵以某郡為帥府則與之將者若干人與之兵者若干人險要之地如何為堡寨捍禦之卒如何為屯戍如是而守如是而戰如是而分如是而合有定法也其自中出者唯選帥命將出師之節而已臣獨怪兵興之後我之境土日蹙則前日號為邉面者皆迤邐次遷於腹裏而朝廷未甞以三邉之法處之除一二大帥之外其餘州郡雖與敵境相接猶一用承平故事吏按籍以書生文吏計資考而為之守朝夕所従事猶在簿書獄訟期㑹往来之間將之有無未甞問也兵之多寡未甞知也忽遇卒變扵内盜賊聚扵外則時出行在之兵為之誅討事已復歸泰然相忘守一定之法而治不急之務與従容無事之時無以異主兵者不過兵官廵尉為兵者不過弓手疲卒幸而隨其守之才或粗能招集軍民或其僚屬間有可用皆各出扵私意自保朝暮帥臣有名無實一旦有事戰守無所取謀合㪚無所聴命勝不相聞敗不相救如向者潁昌蔡州等諸郡棄城逃遁守臣例不過以力不足藉口朝廷亦莫能詰而日近濮州冀州等處雖能固守外無一兵一騎以為之援亦卒至扵陷没而後已以此治邉面敵何懼而不吾侵也臣願亟取淮南京東京西三路要害之郡與敵相近者一以前日三路極邊之法治之東則鄆州徐州南京西則潁州夀州和州南則唐州襄州荆南各隨其逺近立為軍數或使之召募或為之分𨽻而命以大將與其帥叅治中擇近臣眀敏宏毅忠信沈逺者一人為之揔帥以節制之小郡與偏禆聮扵大郡大郡與將聮扵緫帥應州郡常事一皆命之餘官守將専領軍事各條其所為者上之朝廷為擇其可者頒扵緫帥而授扵所部敵未至則如何守既至則如何戰攻某州則某州應援入某地則某州牽制預定成筭日久按習緩急有事舉而盡行必使腹心可以相倚臂指可以相及守者如檀道濟之在夀陽援者如曹景宗之在鍾離撃者如韋叡之在合肥拒者如臧質之在盱眙縦今人才寡少未必皆得如數人然不可不以是求而用之雖未能克敵豈遽以單弱奔潰孤絶陷没乎所謂不可不為而速為者此也保江下策也敵勢既未可測則我亦當為不可測之􅇱去年秋始獲進對即甞論敵或師河洛分兵鼓行直趨襄沔横據荆渚因我舟楫人卒順流進逼江左即王濬等入呉之路以為彼之上策自許蔡而南一出歴陽徑斷采石以趨金陵即蘇峻所従亂晉夲朝曹彬所從下江南以為彼之中策是時河南與京東諸郡尚存敵之去就猶逺姑自河洛言之而已今既不止扵此則尤當過為之防敢終言其詳自古有事扵東南未甞不先以舟師出上流盖所以奪我者以勢不以力也王濬自益州至荆南作大船連舫百二十􅇍受二千餘人以木為城馳馬其上及既進自巴丘十四日至牛渚蘇峻在歴陽即今和州其襲姑孰進慈湖盖今太平州之間由采石而渡我曹彬下李氏亦循用其迹敵騎去春甞已至汝州蔡州矣自汝州入襄州至荆渚自蔡州入光州至厯陽固不難則江之可防非一道也然是猶有可言者濬與彬皆中國人也濬在益州作船七年而後成度敵雖得荆南其勢未必遽􅀎至是然敵多燕人粗能知書或竊取濬之餘意而效之與襲蘇峻之故道則亦未易可當但其驅我人而用之吾固亦可以我人而拒之無足憚者若欲自為之謀則棄鞍馬而事舟楫捨所長而用所短我視平原易地得筭為終多也唯控扼者如何耳臣甞建議欲以鄂州與荆南别為一路置帥府此實上流控扼之要而襄漢之所從出呉孫氏嘗都以拒魏唐始以岳鄂為觀察使後陞為節度其意可見若鎮江金陵韓滉在唐最為近事築石頭五城脩塢壁起建業抵京峴樓雉相望建業即金陵京峴即鎮江之境也造樓船三千柁以舟師由海門大閱至申浦復與揚州陳少㳺以甲士三千臨江㑹于金山當朱泚之亂東南賴以安靜今車駕或駐兩浙則鎮江金陵尤所當先治舟師不講已久去冬雖嘗募海船四百餘艘扵鎮江然而戰陣之習未聞其嚴也鎮江之師止可為鎮江之用未見金陵所以待上流者江東之俻當以江東之舟與人用之又鎮江有子城而無外城未有無城而能守險者今若速以鄂州與荆南各分一路以抗扵上而命鎮江金陵揚州三帥力舉韓滉故事脩之以至於下則彼度地之利害較技之短長必有覘而知畏者所謂不得已而預為者此也恭惟陛下以聖神文武之資誕受中興之業躬履囏勤克己願治其長慮却顧宜無不至今日復以敵勢之廹下詢於衆易曰天地設位聖人成能人謀鬼謀百姓與能夫聖人成天地之能而並立於其間者不過明則謀之人幽則謀之鬼而百姓之安危天下之安危也既盡人謀而同其安危則内可以保一己外有以保天下百姓其誰捨之乎洪範九疇其次七稽疑曰汝有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉謀衆稽疑之道其效盖如此陛下既用是道則不可不求是效若臣所見常智皆所共察利害得失顯然易明竊料陛下亦嘗熟計扵胷中矣今卿士之言亦或宜有與臣同者陛下果嘗計於胷中而臣又言之卿士又同之則願陛下斷而必行耳雖然陛下無乃以方祈請二聖宇文虚中奉使未廻意和議可恃不欲重見兵端乎臣以為不然夫靖康所以曠日持久不力為俻者正以耿南仲持和議墮敵計中而不悟今虚中之請成否未可知安可捨目前之急而待萬里之報盍姑存其説而不廢幸而有成不過虚為之備如其不成固無後悔必欲還二聖非我形勢先彊彼肯遽有順從今但自為備非彼見廹我不交鋒不可謂之兵端臣智識凡陋思慮短狹不足以仰塞明詔不勝拳拳憂國愛君之誠惟陛下垂恵采擇八年夢得提舉臨安府洞霄宫上奏曰右臣今月十八日戌時准尚書省遞伏䝉聖上恩賜臣詔書一道以敵人初退陛下深懐善後之計俯以攻戰之利守偹之宜措置之方綏懐之略特加訪逮臣材質朽鈍識慮褊淺不足上禆大議然念頃嵗擢自閒廢驟承聖知度越稠人濫聞政事雖竒窮闇拙奉事清光之日無㡬而眷遇識拔天地生成之賜實與衆異銘鏤肺腑乆未知報日夕愧負若無所容比者逆臣劉豫敢挾金人稱兵内侮犬馬之誠雖不勝忠憤而職在㪚地朝廷成筭非所預知是以不敢犯分妄言姑因職守所當行竊獻其末議今敵衆敗亡王威始震陛下天縦神武坐制彊敵之餘尚懐謙慎􅀶詢羣議不遺䟱逺曲記孤愚此見陛下戰勝而不矜功成而不有舎己従人至誠樂與之意必將上追堯舜文武之用心以還祖宗之盛扵此不言臣罪大矣敢殫竭底藴試效萬一惟陛下垂恵採擇臣聞洪範言人君三徳曰正直曰剛曰柔天下之變無窮古之帝王御之不過有二茍非平康之世彊弗友則克之以剛燮友則克之以柔而已自陛下即位及今敵凡三入宼其始衝突至扵維揚臨江而不敢渡眀年渡江至扵錢塘四眀歸而立劉豫今遂與豫合謀併兵長驅並至方其臨江不敢渡盖不能無畏扵我棄而不守故眀年復為南渡之計然猶未敢有意中原敵歸之後我不即撫定置而不問者累月故始萌其姦計取而與豫我復委而不與之争遽别為此疆爾界視豫真若吾鄰遷延顧避入宼者不得撃歸順者不敢納豫驕扵上民絶扵下所以偃然自謂得志無復忌憚隂導敵人以圗儌倖我愈退敵愈進我愈怯敵愈彊此其故何㢤殆吾謀臣失計而一於用柔者勝也向使維揚之後有以御之固無錢塘四眀之役錢塘四眀之後有以御之固無今日之役今幸賴陛下睿眀英武赫然獨斷出敵不意決策親征是以兇焰首摧狼狽失措曠日持久卒至於遁歴嵗之失一朝正之天下孰不鼓舞感恱豫計已窮敵氣已懾此乃陛下宏濟艱難反於用剛之時不可不乗此遂定興王之業臣前嘗妄謂克復大統平定中原當自此始者誠有待扵是然為之當有其序盖有進討之策有招納之策數路并進一舉而蕩平之此進討之策也廣敷徳意以次而懐徕之此招納之策也進討而不及招納招納而不及進討皆未免有偏勝何者進討之策非兵强將選財豐食足未可遽動招納之策苟因人心無不可為數年之間欲以郡歸有如海州者欲以縣歸有如宿遷者舉衆内附少者數百人多者數千人亦無時而無陛下察此人心豈嘗一日忘夲朝乎果吾進討之具無不兼俻舉而用之固不為難若猶未也則先招納後進討自不失其序臣請言之臣往年待罪江東得豫情實最詳豫闒冗凡材年踰七十其子璘狂悖惨刻尤不為其下所伏自行什一法重斂扵民外以奉敵嵗㡬三百餘萬又逺事闗中疲竭内地民困貪暴痛入骨髓日夜引領以望王師之至其告於吾人者或曰天兵速来過今年則人心慢或曰我非順畨但能以大兵主張得我我無不歸此言人所共聞也今敵復以十餘萬衆屯聚㡬百日數路騷然彊者簽為簽軍弱者聚而轉餉調度百色必非豫能素辦皆當盡出誅求荷戈帶甲三冬暴露非特民怨兵且怨矣非特豫困敵且困矣若陛下以天地大徳涵覆無外盡洗従偽之民而一新之許其来歸孰敢不從待其昬迷不恭尚懐頋望則臨之以兵孰敢不服臣願陛下與大臣熟議定此二者先下哀痛之詔開喻偽境歴叙日者不即撫定之意深自引咎若曰非民忘我我自失之原其淪陷出不得已使廓然皆知陛下待之與豫父子者異則立為賞格以募之以州降者授以州以縣降者授以縣挺身或舉衆来歸者處之皆勿失其所命邊吏多募信實之人深入傳告或說客辯士因其人而動之必有相繼送欵如海州宿遷者此吾不血刄而坐復境土之道也益戒有司訓練將士儲積糧餉若秋冬之間敵與豫復至不過進則攻戰退則守􅇱而已前日已事之驗固自可見若敵與豫不至而吾民猶有畏敵不即聽者則待吾進討之具􅇱申飭諸路約日齊舉而深入之彼孰肯終捨順從逆捨寛従虐㢤豫孤身獨立衆㪚親離少假嵗月非我擒豫則豫必棄而奔敵或吾民有圗豫而獻者此必至之勢也二議既行陛下詔臣四事自存乎其間所謂攻戰之利者見可攻而攻見可戰而戰不可預言但紀律脩眀士氣奮張將帥樂於為用不懐顧郤勝而不驕不用而不墯則在我有常勝之道今之兵勇鋭視前不侔矣尚恐罷冗者未盡汰驕墯者未甚戢將帥之材猶未甚廣盖自軍興號為兵者皆大將自募與招安之盜賊貴多而不貴精偏禆亦出其選朝廷藉之為用未嘗别自簡擢臣願稍脩軍律以前後號令約束損益立為法制以整齊之徐令自汰其不足用而誅其不律者統制統領官各使上其材能勲閥朝廷更加審覈時抜其􅀎者付之以事或使自當一面兵將無濫法令眀肅開闔在上權不偏重則何往而不勝也所謂守􅇱之宜者防秋防冬之事前此戒嚴則舉解嚴則廢未嘗修之於無事之日是以事至旋謀亦多茍簡文具今要害之地莫大於擇人近嵗或専委武夫或取之負犯之吏或姑録其人不問所長幸而得人或遷徙無常或不與之兵或有兵無食至扵鄰比策應牽制相為掎角皆未嘗預講其尤為大害者斥堠不眀往嵗維揚師在泗州猶疑其非敵今者承州入境而後知之夫以大軍㑹集數月而後興越數千里而後至尚不及知況其他乎臣願應守禦之地亟擇人分任量其守之大小而與之兵與之兵必足其食使各條上方略可自守則如何守自守不足則如何援凡山川險易道里逺近鎮戍䟱宻控扼急緩詳考利害一二規畫朝廷與大將擇其便利必可行者授之以為成法無事則習之有警則行之少假其權以盡其䏻久其任以責其效别立探報之法廣行收募不必拘以一色使敵情虚實進退皆前期而知無出所不及則何守而不固也所謂措置之方者其目不一要莫先於財用今朝廷之兵付之諸路大將者皆非承平之所有而糧餉調度猶以有司之常法責之轉運使否則出内帑之積以濟之設有非常之用則旋為經畫或不免取扵民未有一定之制此豈可久㢤天下之財非不足但嵗久法弊廢而不舉及當因時而為之者未講也唐制諸道貢賦别而為三有上供有留州有送使本朝大略因之上供之外留州者逐州之所用也送使者轉運使之所領也唐制財用通而為一本朝轉運使所領非兩税常入其他皆别為諸司自軍興職守不嚴事多權宜監司一於侵奪州縣一於𨼆蔵苟濟目前寖生欺弊盖上供猶有闕者其餘遺漏失陷雖朝廷不盡察也臣竊以為宜盡取天下諸司所掌㑹其實數稍分别之嚴其上供留州送使之辨應行在支費有定式者以上供責之户部諸鎮大將逐月供億以送使責之轉運使别為一司盡緫其餘財賦一金以上皆使通領周知其數而斡旋之應户部轉運使所不足取以均濟他皆籍之以待非常之用叅較虚實鈎稽出入凡法令所當變通職守所當分合利害所當興變有無所當乗除存而封樁轉而支移非常法所得拘者一以付之朝廷但制其可否之節取與之度事有専責而權不分則緩急可以取辦也所謂綏懐之略者招納之策既行大者固已舉矣更令邉吏未收復者勿輙侵擾以待其至已收復者數下詔令蠲其疾苦以慰其心時遣使命導之温言以通其意阜通商賈濟其乏絶察吏人害民者去之轉徙復業者量借之種糧豫猶敢来争則為出師以捍禦其領衆来歸者隨其多寡授之鄰近逃絶户之田舊有官者復其官有才􅀎者時擢而用之則居者不失其所安来者不失其所歸也論豫之事所以處中國者不過扵是若敵之變詐則不可盡測議者或謂敵黷扵用武二十餘年武竒邁與尼雅滿分國並處自不相制契丹亦有興者其國已衰弱乃天亡之日必不􅀎再舉以仇我或曰彼欲搏噬扵我久矣方藉累勝之資跨有燕晋困獸猶闘豈以一敗遂不復較豫本無功扵敵非有腹心締固之交導之使来無成而歸或懲其輕妄更有廢置或懼而改圗别出竒詭此皆不可知然臣嘗論自古中國與遐裔本不相為盛衰匈奴雄扵北方至冒頓而愈熾漢髙帝以三十萬衆圍扵平城僅以身免然不害其降子嬰誅項籍以有天下至於元成之際五單于争立呼韓邪單于来朝為之改元不復更能窺邉而漢亦自是不振奪於權臣矣突厥當隋末控弦百萬羣盗悉臣尊之唐髙祖藉始畢可汗兵以定亂亦為之屈然不害其父子並興創建數世之業至宣懿之後素所患者吐蕃破散離析以數十州来降者相繼而唐亦廹扵藩鎮而亡矣中外異域天固限之兩盛不能相傾兩衰不能相救誠有漢髙帝唐髙祖父子雖冒頓始畢何害即紛亂如五單于殘滅如吐蕃何補元成宣懿之治自靖康以来常患以敵之盛衰為我之彊弱故事每拘制不得盡為今敵在萬里之外既不可必得其實則亦不必觀彼而後為之所陛下以至誠不息之心日新盛徳作興扵上小大之臣咸懐忠良國爾忘家公爾忘私奔走扵下脩眀庶政共成内治則敵雖彊尚不足畏況扵豫乎二聖未還陛下聖孝純至必有拳拳扵敵者然連年遣使初不得其要領今兵端自彼我固有辭非使有所聳動安能懼而悔禍臣久伏田野不知時事管穴所窺實為迂陋干冒天威無任惶懼􅈭切屏營之至二年布衣呉伸上書曰臣嘗讀太史公叙布衣王蠋状扵田單賛曰昔燕之初入齊聞王蠋賢令軍中環畫邑三十里無入已而使人謂蠋曰齊人多髙子之義吾欲以子為將封子萬家蠋固謝燕人曰子不聴吾引三軍而屠畫邑王蠋聞之曰忠臣不事二君貞女不更二夫余豈助桀為暴㢤遂自經其頸扵木枝自奮絶脰而死臣讀至此未嘗不廢卷涕泣扼腕而太息也何㢤齊一小國也且有慷慨忠義之士今天下之大四海之廣得無其人乎況天下之士自崇觀以来䝉被國家教養雖山林臯壌巖谷海隅靡不承長育而受恩徳者矣可以大國之人不如小國之布衣乎臣固有意扵是今臣至貧且賤初非以富貴為心爵禄為念又非欲以片言幸陛下之用從而求賞揣臣之心實無纎毫覬覦況臣曽立功扵近世者屢矣亦未嘗論功而求仕進則今日之言無意扵爵賞也明矣無意扵爵賞而有言者非它臣恐萬世之下罪我聖宋無忠臣義士故以臣所聞所見盡臣之忠竭臣之愚為陛下陳之伏望天慈畢賜睿覽不惟臣一身之幸將為社稷之福天下生靈之幸也臣竊觀陛下有孝悌之大徳而二帝之問不通陛下有湯武之聖眀而敵國之陵不已陛下有太王之至仁而土地之封日削陛下躬堯舜之節儉而國用之富不饒陛下震雷霆之天威而盗賊之鋒未戢凡此五者非特臣得以疑之使三尺之童有知有識亦將有所惑焉何㢤二帝之問不通者臣竊謂非陛下忘父兄之遷也非大臣忘君父之恩也盖亦人力有所不及思慮有所未至焉臣竊觀趙王之入燕也使者十輩既不􅀎逹國之音又不􅀎全身扵外當時在朝若張耳陳餘之徒非不賢也非不謀也獨不如一廝養能以片言說燕卒與其君俱載而歸今兩國之難未解而鼎峙之形已分使者雖數十軰金帛雖數十萬能免偽齊之盗乎此遣使不如用廝養眀矣敵國之陵不已者臣竊謂陛下忍小耻之太過也示小敵之太怯也盖敵人之性飄忽飛揚若或避之從而陵逼臣竊觀苻堅之陵晉也興師百萬力足以移山岳鞭足以填江河謝𤣥以計沮之敗衂淝水設使當時忍耻示怯奔而避之由江迤南當為秦之屬郡矣故古人有言曰可以計勝難以力屈即此觀之雖得闘將十萬不如一謀士眀矣土地之封日削者臣竊謂陛下視疆埸之太輕任藩屏之太易也臣竊觀越王勾踐之脫於吳也甞膽以苦其心任賢以廣其謀雖一飲一食未甞不以滅呉為念故當時其耻雖大其國雖削數年之間復其疆而雪其耻當今陛下國政之屬如大夫種者誰歟軍旅之託如范蠡者誰歟然陛下移蹕而去之者屢矣百姓從之者如歸市雖太王之仁不過此也昔太王之去邠而之岐山今陛下去汴而之呉越跡實似之謀則異也臣未見陛下有辟土地之心復父兄之讎此臣所以曉夜太息為之不平國用之富不饒者臣竊謂陛下千里寄託之非人四方土地之多曠也臣竊觀司馬宣王之輔魏也先廣田蓄然後為滅賊之計當時鄧艾著濟河之論又陳屯田之利其言以二萬人屯淮北以二萬人屯淮南合四萬之衆且田且守嵗入米五百萬斛十萬之衆可給一年之食臣竊見今日自常潤抵界至于大江極目百里盡成荒墟所謂良田不知其㡬十頃自淮迤南荒蕪之田又不知其㡬千頃疲卒既多冗官不減若於此時且耕且戰則軍食何患不足矣盜賊之鋒不息者臣竊謂陛下姑息之徳太厚而殺戮之威不張也臣竊觀宓子賤之治單父齊寇至魯人不及自刈父老請民出刈宓子不許且曰今年亡麥眀年可種若使不耕者得麥則其民樂有寇也其言雖小可以喻大今之盜賊未戢亦有樂寇之𩔖臣竊謂盜賊不可不滅昔光武中興未甞不以討賊為先故殺之則彼畏而自息招之則彼安而復叛臣以謂用盜賊攻盜賊則草寇無患乎不平矣此五者雖若國之急務然猶未足為陛下輕重臣復見國勢如累卵之危生靈有塗炭之厄臣曉夕為之寒心臣竊聞太祖皇帝之有天下也奄有九有席卷八荒東漸于海西被流沙北極單于南底交趾四方四隅罔不臣服當其四夷未賔之初止有中原錢俶望風納土由是置五王宅以待其自至其後李昱欲以臣屬乞為藩屏遣使請命太祖皇帝曰天無二日殿庭之上豈可容鼾睡者是欲天下一家中國一人也明矣創此基業垂之十帝可謂盛㢤太平日久偶因邉臣失守致使敵人長驅而入賴祖宗之靈社稷之福使兆民有託于陛下當時龍興南都天下之人皆知陛下孝慈不忍父兄之逺播而居其已破之城今此駐蹕久在東南之一隅臣竊為陛下疑之不識陛下欲復祖宗之故業乎止欲為東晉之南據乎臣竊謂復祖宗之故業則陛下有萬世垂統之基若止於東晉之南據則不過有百年之世祚然百年之計尚恐土地日削社稷日危亦未必安於百年也臣聞自淮迤北見屬偽齊自古遐裔不能有中原此金人以中原攻中原者也近世説者必曰朝廷賴偽齊以為藩籬以捍金人臣竊謂不然邊圉之患患在手足中國之患患在心腹不識説者將謂偽齊今不為盜能保其子不為盜乎復能保其孫不為盜乎不識偽齊俟金人既定之後去僭偽之大號還土地之故疆乎為復割據中原久假而不歸乎若曰臣無伐君則武王何為而并天下若曰國可並立則隋髙何為而擒叔寳良由勢不兩立尊無二上者也昔秦齊之强猶不敢久僭帝號今因金人竊我名器不歸他人獨授劉豫則知豫必以姦計為金人謀也既為謀主則無臣子之心眀矣況人臣之位與人君之尊不可同年而語彼肯捨尊而就卑乎則知劉豫無復納欵又眀矣臣甞譬之巨室之家假人以堂室之奥而自處門廊之隅則居堂室者豈無吞門廊之心乎今劉豫所以卑辭自遜者良由人心未歸而羽毛未成爾縦使劉豫止欲割據一方豈不為姦雄開基又況自古南北雌雄之勢但見以北并南未聞以南并北者也臣竊觀國之所重者三昔我神祖留意太學盖欲籠絡天下之英賢而網羅天下之姦雄也陛下駐蹕維揚之時猶有随駕學生今悉罷去而劉豫乃為學校以延多士是誘陛下之英賢可知矣今諸軍士卒皆河北山東之人其初止因金人所苦故偷生南方望陛下升斗之養也前此兩年兵食皆足邇来竊見如劉光世軍中士卒一月之糧或闕其半里巷私語皆曰健兒不如乞兒各懐去心悉有竄志而劉豫大彰聲勢廣示富饒省刑薄歛䘏衆安民彼思鄉之人一有所聞豈不動心是誘陛下之士卒可知矣南北往来商賈如織厚増其利售我物貨闗市無征阜通無禁既闢商賈之路遂雜五間之徒古人夷闗折符使命猶且不通況於往来弗禁者乎臣竊見朝廷内外事無巨細往往皆前期而知此無他從商賈之便者然也從商賈之便則是誘陛下之行旅可知矣誘陛下之英賢則謀謨可得而策矣誘陛下之士卒則戰闘可得而用矣誘陛下之行旅則國之虚實可得而知矣臣竊見中國之士子不由科舉進者往往多不得齒扵仕版至如貧賤之士雖有嘉謨嘉猷非有左右先為之容無因至陛下之前則好名貪禄之士豈不有如齊之心乎臣竊見中國之士卒飽則稍安飢則心離懐鄉樂土人情所同又況丘隴之所繋嗜慾之所趨今移北就南嵗久無歸彼懐土之人豈不有如齊之心乎臣竊見中國之商賈近縁軍興征求百倍為監官者以奉上為心以刻剥為志行旅怨恨痛入骨髄由是百物不通征商又倍至如偽齊取民有制彼貪利亡耻之徒豈不有如齊之心乎凡此三者悉有離心則陛下國勢日以孤危臣又見劉麟猖狂尤甚狠戻居多父子異同悖逆若一僭偽二年鼎勢已立今劉豫不自量力往往自比文王而以其禍付之扵麟陛下若稍緩其嵗月彼將先收民心足食足兵形勢漸固則中原無復為陛下有矣中原既喪則偽齊反得太祖皇帝奄有中原坐收四方之策矣臣又聞金人重兵悉趨陕西志在吞蜀萬一不幸蜀有變動彼將順流而下水陛並進則陛下豈可復有乗桴之行乎臣聞兵法有曰我不欲戰雖畫地而守之彼不得與我戰者乖其所之也臣竊謂先平偽齊則是乖其所之也又況偽齊有聲無實若即伐之如摧枯拉朽爾古人有言曰今不取後世必為子孫憂今之偽齊若不亟平之不特為子孫患臣以為陛下憂也臣伏覩九月有星彗于東南陛下肆赦其文自責可謂上畏天戒之深也臣雖不曉天文疑其非灾何以眀之昔楚將公子心欲與齊戰時有彗星出柄在齊占者曰柄所在者勝齊恃得柄而不為􅊀所以敗績今柄在東南所謂得勝之道也若不因天時而制勝臣恐復如昔之齊也故曰天與不取反受其咎臣觀東南之地本非帝王之都歴考古今未有卜世之久者何㢤西北之地土厚而水深東南之地山秀而水清故土厚者其山髙水深者其流長由古至今卜都扵西北者或過乎十世而僭號於東南者未踰扵百年是亦土地之厚薄流水之淺深者然也又況呉越之地形勢尤薄實非帝王駐蹕之地萬一未復神京而建康古都亦可以暫駐鑾輿臣願陛下整我六師用張天威特回聖駕臨幸秣陵庶漸向於中原無久居於海隅也昔孟子曰王者中天下而立定四海之民故漢髙祖用劉敬之策而唐神堯從太宗之謀所以享國日久也臣竊觀自古帝王之興兵權未甞重假扵人如髙帝光武皆親御六師獨有唐末藩鎮之權太重故有朱全忠之禍今陛下親御之衆不如藩鎮之多也臣竊憂之臣願陛下簡練卒伍繕治器甲親征不庭恭行天罸則擒縦在我而權勢不奪臣竊觀陛下之兵尚有百萬而精鋭之士又有數萬若傾國出師又不知其㡬萬設或併力北伐則父兄之仇可復中興之業可圖臣復願陛下天謀早決如晋之平呉唐之伐蔡斷自宸衷不容衆議又況利於人君者必不利於人臣利於人臣者必不利於人君且人臣趨戰扵敵與坐享於家安危不同是豈棄安而就危乎今遁逃不發逗留嵗月皆人臣自便為安逸之謀然而臣則安矣君將危焉此正所謂利於人臣必不利於人君之謂也古人有言曰兵聞拙速未覩巧之久也今伐齊之策萬一少遲年嵗事必不濟何以言之金人之所利者玉帛子女且如蜀中富庶遐邇共知敵人留意必悉衆共攻東北之地屯兵必少加之既立偽齊必以為恃况彼素欺吾怯斷不為俻此天以中原歸于陛下灼然明矣兵法有曰攻其無俻出其不意此全勝之道也國之安危在此一舉陛下若猶豫不斷金人得蜀必復立僭割據成國陛下土地止有東南雖有智臣知不能善其後也臣聞之為王者可陞而為帝為帝者不可復降而為王萬一止有東南不過為小國之君其去帝業逺矣臣願陛下勿謂力有所未及時有所未至因循茍安以東南自滿恐成大禍當以歸命侯長城公自安之言為戒也臣竊觀周衰之末戰國縦横無敢僭帝位者今此劉豫首為亂階自古首亂者雖不能成事臣恐如湯武驅民者桀與紂也觀其姓名復符南宋此亦可慮陛下雖欲忍而容之獨如宗廟社稷何獨如天下蒼生何況劉光世韓世忠皆擁重兵久在江左坐食糜費於國有損若即北伐正所謂因糧於敵者也伏望陛下痛察臣言上以祖宗創業艱難為念下以生靈塗炭為憂焚舟決戰如勾踐欲殺妻子焚寳器之時誓與三軍觸戰共存共亡則危國可以復安亡地可以復得臣聞之一人有慶兆民咸賴國既傾危百姓雖有糓粟安得而食諸萬一出師糧食稍闕亦可權借扵民斷在一舉明喻利害設使盡百姓之儲以贍軍獨不優金人殺而奪之乎臣聞之古人有言曰有叛卒無叛民盖民有業而卒無生故也況卒之所仰者官給錢粮今既財賦不足則兵食不繼兵食不繼則叛心日生叛心日生正如呉起所謂舟中之人盡為敵國矣今臣伏願陛下重以軍糧為念昔張邦昌僭號之時所幸士卒之心未離而去太平之日未逺人懐祖宗之徳故未為國患今此離亂積嵗士卒暴露日久咸欲息肩正猶水性趨西随所決而流也今若乏食其心必離臣恐大事去矣臣又見近日㳂邉州軍多用武人為守或不識字或不曉法州郡被害莫此為甚而又或起扵卒伍或招扵賊徒毒心不改逆謀猶存或以州叛而順畨或恃守勢而虐民重念祖宗廣土四百餘郡比為敵人割據將去大半今自淮迤南若守臣不得其人則州郡逐時陷没不知陛下㳂邉州郡復有㡬矣臣以謂武人深不可用為郡守至如統兵亦須擇其善者若賀若弼有謀將闘將之辨正此之謂也臣甞觀桞宗元有言曰削尾大之勢者莫如置郡守救土崩之難者莫如建諸侯今之江北可謂土崩矣臣竊見近置安撫大使正如唐之節鎮各有屬郡亦置部曲有分權之勢無補國之威文臣為之則不知兵者有焉武臣為之則貪汚寡謀者有焉設有寇至皆是提重兵以自衛統部伍以奔逃或坐視而不救或伺隙以自便昔唐之割據皆此兆也又況自古以来國破者必易其君國亡者未必易其臣在亡國之為將相者未必不為興國之將相扵人君則有利害在人臣初無損益正如馮道歴事四姓是也去此就彼鑒之前代則有馮道驗之今世則有杜充陛下於此不可不自為之計也臣竊觀周以同姓之親而昌唐任異姓之權而亡不可不戒臣為陛下計之當今之難莫若以㳂邉之郡十州之地建一諸侯以宗室之親者主之彼有人民復有社稷且耕且戰足為屏翰上合天數下安邊庭金枝玉葉布在四方可以伐敵國之謀可以絶亂臣之望臣前言願陛下伐齊者策之上也不得已而建諸侯者策之次也捨此二者復有祕策當俟對天顔而後靣陳非紙筆得以盡也臣竊見近日遣使未出我疆已為賊刼此乃以武臣守邉之禍然所喪雖多似乎天以其策付之陛下矣臣昔見酈食其與唐儉為死間事與今日頗相契合古人用間為上萬一陛下以臣前言可采臣願為食其唐儉出使偽齊說謀將定陛下興師從而伐之臣雖遭偽齊鼎鑊之烹而忠誼可以激礪亂臣賊子臣死之日如生之年也臣竊自料臣死有三陛下怒臣狂愚之言而殺之通衢臣亦死也陛下用臣狂愚之言而遣之死間臣亦死也陛下不聼臣言他日或如王蠋自經扵木枝臣亦死也有此三者必死之道臣豈好死而惡生臣實為忠義所激不頋微軀此心願為聖宋之鬼不忍為偽齊竊國之民也臣又聞主憂則臣辱主辱則臣死竊見大宋未有肯辱肯死者臣復恐為萬世笑故以狂愚一得之慮為陛下陳其梗槩昔比干剖心子胥鴟夷二子皆獲美名而以惡聲歸於其主此又非臣之所欲也今臣不貪爵禄不釣名譽不畏誅戮其所欲者欲陛下静而思之欲陛下聽而行之庶㡬上可以回天意下可以收人心況太平之數在年嵗間陛下不脩太平之業將以太平之業屬扵誰乎臣之愚忠巳貫日月臣自謂無求扵陛下而陛下必有求言扵臣矣臣竊觀世俗之所好者莫好於富貴今臣視之如浮雲故終始以不貪為言況趙孟之貴趙孟能賤之臣萬一得為太平之民豈不優亂世之將相乎臣又見魯仲連談笑而却秦軍平原君欲封之魯仲連笑而謝曰所謂貴於天下之士者為人排患釋難解分亂而無取也即有取者是商賈之士也臣雖不材持此心久矣臣曩扵鄉曲里巷猶且患難相救危厄相助況扵君父艱難之時乎臣竊見近為陛下陳其利害者其志將以求爵禄也其大將以沽名譽也書或再三至于數十往往陛下見之既繁視以為常雖間有竒謀異策想見待遇一槩今臣之書已盡愚衷歴陳扵前無復再上孔子曰用之則行捨之則藏正愚臣之謂也言甚拙直不事雕琢止取其利害之大意或可或否願陛下詳加擇焉三年呉伸新授監廣州寘口場鹽稅上書曰臣聞天無二日民無二王日並出則争光王並立則争强勢不兩立尊無二上者也昔劉項共興争奪相殺卒分雌雄之勢陳隋兩立强弱相陵遂興吞并之師故忠人之國者願殺身以成仁不易朝而事主若商之夷齊齊之王蠋是也今南北有真偽之君淮汴如鴻溝之界忠臣誼士一念及此涕淚交頤臣雖不才而慕夷齊之髙風懐前人之卓行昨居􅅵畆猶存憂國之心今荷宸恩豈忘報稱之効臣頃自布衣陳芻蕘之言者良由忠誠貫日義在􅂢軀而陛下不以臣愚不肖聽其狂瞽采其愚慮臣自顧無左右先為之容獨以片言上逹宸聽䝉陛下知臣於草茅之賤命臣以初品之官臣之遭遇又非特賈生馬周之比也臣上有垂白之母自受命之後豈不能歸拜慈親誇耀鄉曲仰念有君如此之聖如此之賢聽諫納言雖唐虞之主不過如是矣臣當誓報聖恩國爾忘家臣生則願􅂢軀如王蠋以激勵臣子臣死則願為厲祟如張巡以殃祻敵人臣之忠義上徹白昴自謂移孝為忠正在此時故雖過門而不入也其勤勤念念唯興利除害是圖慮危求安是務扵是逰江浙之塗采往来之議視敵人之虛實觀國勢之安危講將帥之賢愚論財賦之得失究士卒之能否瞻天時之變動察人事之従違訂禦侮之後先臣既有所知聞不敢自黙復以管見上干天聽伏望聖慈察臣無覬覦之心憐臣有忠義之節特賜睿覽使臣區區胷臆得以陳前臣雖受僭越之誅赴之鼎鑊亦為快幸臣聞之順天者存逆天者亡邇者金人逞其貪心肆其荼毒驅脅我宋賊殺無辜屠戮生靈發掘墳隴奪其子女攘取金帛雖浮圖佛宇名山神像靡不受害觀夫彼之暴興豈不暴亡又況寃殺之氣上聞于天毒虐之暴幽及鬼神天將悔禍殄滅有期圖䜟所載死亡無日觀其謀謨止扵金帛子女而已今天下殘破兵火㡬遍獨我西蜀富庶有年敵人窺伺盖亦有日適因險阻未及即下故悉驅金人以為蟻附彼既傾衆以西則劉豫孤然而東豫之孤危得不設詭即此觀之敵人虛實不卜而可知也臣聞之中原者天下之根本也四方者中原之枝葉也秦漢之君莫不得中原而後成帝業唐室之亂至于二三如明皇徳宗之時是也其亂之甚不過數月或年嵗間而皇綱復振者無他良由即復中原則四方易定今陛下以聦明睿智之資應命世千載之運承大統扵已危之時振中興扵顛覆之末華夏知圖䜟之有歸符瑞表天人之有證是宜中天下而立定四海之民今乃屈翠華之尊而幸蠻海之隅臣未之曉也昔太王居邠以避狄人今陛下居吳以避勍敵太王之所避者特一狄人耳正如兵法所謂不敵則能逃之陛下之所避者復生劉豫獨不念國削則身危之謂乎況金人得吾土地不能守得吾人民不可用正為貽患害於劉豫昔元帝渡江終晋之世不能有中原當時僭竊皆異域之人猶且不能制矧今劉豫以中原之人而據中原之位乎臣一思及之略無生意萬一劉豫未滅則國之安危不卜而可知也臣聞之將者國之輔也輔周則國必强輔隙則國必弱茍以世胄擇人則趙括為名將之後必能全勝苟以勇鋭擇人則武信君有戰勝之功必能自保今陛下付兵權之重寵爵位之尊不過二三人耳其有道家所忌則趙括之徒可憂也其有戰勝而驕則武信君之禍可戒也又況國恃之為安危民恃之為司命豈可不擇嘗聞古之命將也以謀將為先鬬將為次智將為先猛將為次至扵大將則兼智謀而有之尚欲其通古今知成敗如孫權之命呂䝉就學是矣又觀古之為將者進不求名退不避罪唯民是保唯國是憂故戰則必勝攻則必取後世有異此謀靡不覆敗昔唐之衰也首因黄巢之亂當時諸道節鎮擒一黄巢如摧枯拉朽爾人各坐視留賊邀功卒使唐祚不能支持今劉豫無黄巢之衆而陛下富唐室之兵其如諸將自為之計坐視安危何況夫庸將之見但求利己豈復憂君盖賊滅則將帥無要君之權士卒無頻濫之賞其有包蔵􅍔心者則坐觀成敗恃其主兵漸成跋扈古人師克在和今陛下將士雖衆孰講㢘藺之歡由此觀之將帥賢愚不卜而可知也臣聞之上下征利其國必危今之主將無非營私背公蠧國害民之徒何以眀之居扵市則有回易之庫居扵水則有回易之舟所至擅㩁酤之利則官課為之不登州郡恣無厭之欲則民力為之減耗坐縻廩禄無補事功加之主將利其家則士卒利其身使民無措手足之地孔子曰百姓不足君孰與足古人居則隠兵扵農出則因糧於敵且如羊祜之鎮南夏也初無百日之粮及至季年有十嵗之積曷甞須求國家月費億計止自營田之利以勤羸弱之兵臣觀今之將帥征求市利無所不為止速私家之富靡䘏國用之殫況國家所入止有東南數郡其得既少於昔時而其用復倍於曩日良由諸軍唯慕虚聲不求實效廣收羸弱之兵以益請粮之數觀其一軍之内堪岀戰者復有㡬矣備虚名者又復有㡬矣以有限之物贍無用老弱之卒則財賦之得失不卜而可知也臣聞之人無勇怯唯其所用世之説者必曰呉人怯而汧隴之人勇昔呉王夫差敗齊於艾陵辱晋於潢池兵無敵於天下則呉人安得謂之怯苻堅擁百萬之衆當淮淝之敗草行露宿聞風聲鶴唳而恐則汧隴之人安得謂之勇今國家所賴者止知有西北之兵不知有東南之士古人有言曰勇怯在乎法成敗在乎智怯人使以刑則勇勇人使以賞則死臣觀西北之兵刑不可以威賞不可以勸何㢤良由雜烏合之徒混招安之衆刑之太重則去此而就彼賞之太輕則志惰而心離又況諸軍無非潰亡之黨子女既足金帛亦豐常人之情無子女則以子女為好無金帛則以金帛為貴今二者將既自富士亦不乏彼不待賞而足又將何以勸觀今之士卒當其敵人稍息邉境蹔寜則偷生戎旅以干廪食若或蹔當移屯驟爾行役且興怨謗之辭欲生奔北之志況扵臨敵用命豈不潰亡由此觀之士卒之能否不卜而可知也臣聞之蛇虹彌天東晋所以止於呉而不能有中原故曰天垂象見吉凶聖人則之自艱難已来金人猖獗一陷維揚長驅京邑縦肆殺戮陵虐行在社稷之危甚於綴旒賴歴數之有歸致舊物之不替敵人一去四年不敢加兵盖亦知我宋方興而未艾也奈何滅裂常經悖逆天道竊神器于劉豫分神州為偽齊雖欲使中原自相攻取而天祚我宋億兆攸歸曽無有二故日月齊明星辰順紀上則懸象無差次則雨暘協序古人有言曰天視自我民視天聽自我民聽今謳歌者無不吟諷徽猷獄訟者無不思于聖徳由是天意漸回而中興有兆臣謂天時之得不卜而可知也臣聞之天時不如地利地利不如人和故百姓歸往之謂王百姓去之則為匹夫臣竊觀京畿隕䘮九服崩離天下囂然將帥士卒鮮不背叛忘君親之辱偷一時之安大臣或降扵敵將士或㪚為盗辜負國家蔑存忠誼往往十有八九獨我宋民懐祖宗之徳樂陛下之仁從駕者正猶邠人之歸市太王安業者正猶百姓之謳歌大舜衣帛首飾悉圖二聖之歸凋弊瘡痍欲復戴天之報邇無異言逺無異望咸有一節初無二心今天下但聞卒叛未聞民叛何以驗之臣聞京東之民見屬偽齊劉豫行十一之征可謂取民有制民以為虐痛思宋惪南望王師如旱望雲簞食壺漿家家為偹積糓助粮人人有心巷聞徯后之嗟里有来蘇之望民心如此宋復何憂臣以謂人事之和不卜而可知也臣聞之先發制人後發制於人故事有緩急勢有先後昔東晋之有全呉者以其得淮南故也當苻堅興傾國之衆取孤旅之晋設若恃長江之險退堡江左縦使堅衆未即南渡而對壘淮上相持嵗月則晋豈復有百年之永乎賴謝安之謀謝𤣥之銳迎敵於壽春敗賊於淝水所謂得先發之道也今淮南虚有屯駐之名而無必戰之實重兵皆在江南而輕兵獨當淮右萬一敵人得計奪我上流奄我淮甸掠我州郡對壘江旁勝負雖若未分而雌雄豈逃一决若坐以相持乆扵嵗月使舟車不能通粮食不相及偹前而後寡備左而右寡豈國之利乎今淮南非特脣齒之地實腹心之圖臣聞敵人窺我襄漢則陵侮之萌不卜而可知也今夫知敵人之虚實則制人不可不先也知國勢之安危則圖難不可不豫也知將帥之賢愚則委任不可不擇也知財賦之得失則國用不可不圖也知天時之變動則天與不可不取也知人事之従違則民利不可不興也知陵侮之有萌則敵謀不可不伐也臣觀天下之情當其事緩之時則可因循及其急廹之際則宜力斷今天下可謂急廹矣臣聞之中原者譬如國朝之心西蜀者譬如國朝之腹中原既割據於偽齊西蜀復㡬陷於勍敵如人之身心腹割裂其能活乎向也國家之難止扵安危今也國家之難繋之存亡何哉東南之地不過百郡土地日削形勢日卑於天下無三分之二其地狹一也地傾而人衆山多而物稀居中原之一偏其人貧二也其土地薄而不厚其水清而不深無興王之氣非帝王之州三也有此三者雖陛下謙徳自保於全呉至仁不争扵天下而百萬之師坐糜廪禄一嵗之間國用不貲設有旱乾水溢之年將如之何又況土地日削則財賦日少財賦日少則何以給士卒之費乎臣竊謂中原不取則帝業不恢中興無期危亡有兆何則金人雖强實不足慮劉豫雖微其祻可憂且如金人其来有時其居不久来則避之去則復業此不足慮也明矣且如劉豫以臣竊國因敵僭君素無人望唯多詐謀彼以一旅之衆當孤危之時不一平之設有大扵劉豫復據一方將何以處之嗚呼晋室之亂起於元海繼踵僭竊終不能平没晉之世不復故疆今劉豫恃金人之勢露不臣之心自揣悖逆與我聖宋必不兩立勢無俱存彼若以利害痛誘金人進屯淮右雖不交兵縦未南渡無所不􅇱無所不寡兩軍相持積之嵗月必有存亡將何所逃臣以謂先擒劉豫則金人自定昔羊祜有言曰期運雖天所授而功業必由人而成不一大舉掃滅則衆役無時得安今陛下國勢如彼之危不毅然舉兵以決勝負臣恐因循嵗月大􅍔將至臣嘗譬之病者沈痾積月而藥石自疑服之温則疑其實服之凉則疑其虚雖有醫工議論不同處之無斷既惑藥石遷延嵗月殊不知日月既深病亦彌篤逮至膏肓毉所不及臣以謂今之時勢存亡顯著事理灼然若曰今日未可舉兵不知何時而可也兵法有曰不戰而屈人之兵善之善也今天下之人皆知以不戰為善殊不知力能勝人謀能制人則不戰為善臣竊評天下之議者不過曰金人之强昔苻堅非不强也不過曰金人之衆昔王莽非不衆也以苻堅之强王莽之衆光武東晉避之可也不戰可也唯其勢不可避亦不可不戰因其必危必亡之勢而為死戰却敵之計是以成功臣竊觀自䘮亂之後未甞接戰設或遇敵非因戰敗多由潰亡今無戰勝之功而責人自服不亦難乎又況皮幣不足以塞其貪事之以皮幣則不得免焉犬馬不足以充其欲事之以犬馬則不得免焉金玉不足以厭其求事之以金玊則不得免焉和議不足以必其信求之以和議則不得免焉金人反覆陛下知之詳矣今又割中原以假劉豫其志不特以中原攻中原也將以并吾土地也非特欲吾土地也將以危其社稷也臣竊謂祖宗創業之艱難累聖繼承之不易天下一統垂二百年今鼎足分列於賊臣國勢受制於勍敵雖有大江之南已失祖宗之業回首中原神人共怒尚宜力謀克復以雪大耻況彼吞并之萌已兆而危亡之祻將及豈可不為之計也臣聞金人以劉豫為所愛以中原為所謀臣願先奪其所愛伐其所謀彼必氣讋膽䘮萬一舊惡不悛長驅復来俟其深入誓師血戰痛掃醜𩔖彼必蹈苻堅之覆車而陛下享光武之中興矣昔晉室之强取呉之弱易扵反掌議論異同至於數載設非羊祜謀之於前而張華杜預賛之扵後豈復成功臣以此知能斷大謀者少而樂因循者多也臣嘗聞否終則傾物極必反昔光武以數千之衆當王莽百萬之師謝𤣥以七萬之卒迎苻堅九十七萬之衆强弱固不等矣衆寡固不敵矣卒􅀎敗王尋之衆衂苻堅之師者無他正如兵法所謂投之亡地而後存䧟之死地然後生者也今敵人無王莽苻堅之衆而陛下數倍光武東晉之師加之否終䘮亂危扵光武東晉之時不一大舉其將焉恃又況金人不能自却劉豫不能自滅國論未能僉同將帥未盡樂戰唯陛下有宗廟社稷之重繼統承休之託上則有君父戴天之讎下則有黔首塗炭之厄利害繫乎陛下一人臣前書論馮道杜充詳矣伏望應天順時恭行天罸願宸衷之獨斷毋築室于道謀嗚呼二聖䝉塵扵沙漠豈不朝思暮想望陛下復中原而為歸期宗廟遷移於亂臣豈不幽愁冥忿望陛下復中原以歸祭祀陛下幽眀有此責望豈可安於東南而不為克復計也臣固知陛下天姿純孝懐思二聖屢軫聖憂朔望遥瞻愁慘天地盖亦忍耻含羞以圖後效雖天聦之屢決奈衆議之不回致使稽遅嵗月坐待危亡臣竊觀陛下下求言之詔開忠讜之路可謂有意於中興矣言之悖謬者無罪言之切當者有賞可謂有意扵聽納矣今雖賞可采之言未見行可采之事豈左右之臣以謂計不出已功不在身執一偏之見而惑陛下之英斷歟不然何其能善善而不能用也今臣所陳痛切可見萬一復有議者以臣狂妄沮惑聖㫁伏願膾臣之心以謝不忠之臣臣竊觀回禄之禍嵗嵗為災雖生靈之可傷亦天意之有自然天道幽逺人所難測而臣以臆說敢試明之夫火生於寅其旺於午宋火徳也駐蹕南方正當旺地故其患不在於朝廷而其灾常及扵百姓今上象無變而大灾屢焚豈天亦欲陛下歸中原以正其位乎不然何其屢祻百姓以為警戒陛下誠能垂日月之明奮乾剛之斷念生民之無辜知火徳之獨旺整我六師克復神京上則順於天道下則安扵百姓則今日之灾安知不為成王之雷風宣王之旱魃反為生民之福也臣又聞國使之来問好雖通以臣料之情亦可慮何則金人反覆詭詐萬端可以力勝難以義服今此之来非國有變故則重有須求臣聞道路之言金國近年自相吞噬夫敵人之性反覆不常時則傾心相與時則怒目相視欲其必争可試以利今也子女玉帛富充其國因此争闘亂復何疑萬一果如道路之言則劉豫孤立無所救援必藉来使安此人情緩我嵗月胡不聞唐儉為使而李靖因之食其為使而韓信襲之已驗之祻不可不戒設或無此數謀必將重求割土厚責嵗幣强我所難奪我必争従之則國削身危違之則起瑕生釁其従與違將何以處臣以此思之晝則忘食夜則忘寝痛為陛下惜也今使命將至不可中輟萬一厚有須求臣願陛下陽諾隂違俟其還報乗其不疑一怒親征劉豫可擒臣竊觀天無變象扵上人無離心扵下時哉時哉機不可失陛下不於此時親御六師躬行天討則必有後時之悔也臣竊見陛下設髙爵以寵將而將不加勸竭廪禄以贍軍而軍不加銳彼敢戰之士一嵗驕惰扵一嵗而懐鄉之卒一年離心於一年若曰繕甲治兵養銳待時臣未之聞也臣觀今之兵權委寄太重且如衆軍相呼必曰某姓某家之兵觀其稱呼自相爾汝度其權勢必不統一嗚呼食土之毛莫非王民今不知有陛下但知有將帥者無他良由下權太重而上威不張也平居無事既相爾汝互相招誘認為已軍萬一當敵誰肯相救臣以謂陛下若不收回兵權親御兆衆方且姑息將帥之不暇豈䏻却强敵而取中原乎臣觀今之士卒已無鬭心其論敢戰必不若淮南之民而淮南又不若京東之民臣聞京東之民苦於劉豫思我聖澤猶子懐父大兵臨境彼必倒戈自為攻取有征無戰但當明其政刑戒其士卒弔民伐罪慎無騷擾若使京東之民自戰而勝則吾之士卒豈不懐慚自相激勵軍威既張士氣復振然後躬率勁旅克復故疆夫何難㢤臣聞智者千慮必有一失愚者千慮必有一得臣雖至愚豈無一得古人有負日之暄欲獻於其君者其謀雖拙其忠可嘉今臣以至愚之言而𩔖負暄之獻區區之誠盖亦可見臣非得已而不已者況臣已䝉陛下命之以官夫復何求良由忠唯許國義在救危止知愛君不知斧鉞之可畏也止知憂國不頋微軀之存亡也於是譊譊不已復有所言盖臣之忠義能為人之所不能也今臣所陳或有可采願陛下試臣以難萬一忠義之跡言與行違臣甘膏其斧鉞以戒天下狂生况臣初非自衒亦非躁進實以國家存亡為憂中原䘮亂為念偽齊未滅臣無生理臣恐如夷齊死扵國亡之後無補敗滅故始以天無二日為喻而終以必擒劉豫為請言雖率爾其理甚明伏望陛下聽而納焉天下幸甚五年伸授䖍州信豐縣主簿上書曰臣聞人君之御天下有帝者之徳必為帝者之業有覇者之略必為覇者之事是故覇者之事不可以為帝者之業帝者之業不可以行覇者之事此上天之所以眷頋下民之所以瞻視亙古及今千萬世不能易也恭惟皇帝陛下以天縦上聖之資當艱難顛覆之運國祚中廢扵金人繼體㡬絶於大寳天未厭宋挺生聖人勍敵雖形吞滅之心而上帝復昭繼絶之命維揚追騎㑹稽乗舟去大駕之匪遥何敵騎之自遁灼見天意遺我神宗無疆之休也上考諸天下視諸民非有帝者之徳未易當此今陛下有帝王之徳而行覇者之事臣有所不取焉何謂帝者之徳天下者太祖太宗之天下也社稷者太祖太宗之社稷也以父傳子則上皇多男而天下社稷必不及於陛下以兄傳弟則淵聖多弟而天下社稷亦不及扵陛下不因兵革之亂則陛下無必傳之位不有陛下之聖則我宋無再造之功今陛下以上皇之子而傳上皇之位則異乎光武之繼漢也以淵聖之弟而傳淵聖之位則異乎元帝之繼晉也仰觀諸天而天無變象是天與之也俯察諸民而民無離心是人與之也以太祖上皇之孫子而當天民之向往不謂有帝者之徳可乎何謂覇者之業太伯建國止及七王錢氏據吳不能四世為地則卑去海不逺自古非興王之地於今豈壮帝之居新建太廟營脩内庭此未有去呉之心也車駕親征由蘇返杭此未有歸國之心也居呉則左右之臣皆便去呉則左右之臣不樂但知重遷不為國計殊不知居呉之久便於苟安不思進取土地促而國削百姓貧而財竭稅賦則預借一年度牒則敷及萬户始也剥百姓之膚終焉搥百姓之髓造無用之戰舟耗國家之財賦虚役工匠殃及良民従官則人人兼侍講侍讀之稱在位則録録無脩政攘敵之慮隋煬帝之博學李後主之能文不謂覇者之業可乎今大敵在前賊臣僭君以言其數則我宋今嵗得其數以言乎時則我宋今嵗得其時陛下不於今嵗以帝王之徳而建帝王之業將以帝王之業屬於誰乎臣聞兵法有言曰無恃其不来恃吾有以待之也無恃其不攻恃吾有不可攻也去嵗賊臣犯我邊境忽然而来倏然而去初非大戰亦非小衂將非驟易彼非畏吾之將帥也士非他求彼非怯吾之士卒也何未交鋒一夕而遁以臣料之賊人之謀必欲困我師旅耗我糧食示我以怯誘我以利俟我㢮偹必為衝突觀其夙謀初甞小攻終或大舉京城之圍㑹稽之襲皆用此計度彼今嵗必有異圖聞彼簽軍將為鏖戰萬一来宼何以為備臣聞之將天下之兵者莫如將御天下之將者莫如相今之廟堂但聞取吏部之闕應知識之求起奔競之風使相府如市往往士大夫相遇則曰今日見丞相干某差遣得之者則曰某有夤縁之舊或𤓰葛之親不得者則曰某無一日之雅無根柢之容間有獻一二言者不過目前小利為藉手贄見之禮求其長慮却頋為陛下憂今嵗之事則無有也縦使宰執良明而日應干求之不暇亦何暇為陛下思父兄之仇為久逺之謀也臣甞聞蕭何為髙帝進韓信房𤣥齡為太宗進杜如晦皆以將相之材識之必以將相之材用之今當顛危之時尤宜以此薦人尤宜如此擢用若曰取與未公用舍渉私汨汨扵州縣拘拘扵格法亦何補今日之顛危也昔李吉甫拜平章事泣謂裴垍曰流落逺地十有餘年後進人物罕所知識卿多精鑒今之才傑為我言之垍陳三十餘人數月之間選用略盡當時翕然稱吉甫得人崔祐甫代常衮為相除吏多是親故而當時亦稱允當二子者知識不同而任用合公自心無疑故天下是之嗟乎不知其人則當問之既知其人則當任之豈偹位之久不聞薦一賢士如韓信如晦以驚世俗之耳目乎臣竊見近日雖有擇人之名而無得人之實今日除某監司倅守明日除某臺諫侍従未聞拔一賢士拜之大將如謝安之舉姪呂䝉之薦友為却敵之計今以無益之除擢為急務而忽敵人入寇之大患臣竊為陛下危之兵法有曰先發制人後發制於人此今日之急計也何謂先發制人臣聞古人之言我利春夏彼利秋冬以我利之時出不意之師分遣將士以寡擊衆倍道兼程直趨河朔無擾良民止擒劉豫伐彼隂謀成此大計為萬世之良圖作今日之上策詳觀此時伐齊之謀其利有六一曰震陛下雷霆之威二曰成陛下孝悌之心三曰恢陛下帝王之徳四曰蘇陛下凋瘵之民五曰復陛下祖宗之業六曰省陛下財賦之用萬一猶豫不斷少緩天誅赦而未伐其害有六一曰損陛下雷霆之威二曰失陛下孝悌之心三曰玷陛下帝王之徳四曰困陛下凋瘵之民五曰棄陛下祖宗之業六曰耗陛下財賦之用何謂震陛下雷霆之威自金人猖獗國歩艱難興兵十年車駕屢徙未見敵兵望風逃遁匪由戰敗多以潰亡致彼賊臣因而僭君使萬乗之尊屈臨海甸去滄溟之地逺無百里其國可謂削也為上皇之後唯陛下一人其身可謂危也今以國削身危之時為焚舟却敵之計勝則擒之否則撓之兹不曰震雷霆之威乎何謂成陛下孝悌之心二帝北遷九年不返嵗月易度愁戚難堪不有陛下彼將灰心既立陛下寧不動心念又況久遷遐方混彼異𩔖中原隔闊頓絶音塵陛下雖追思扵深宫而天下有所未知陛下雖感泣扵九重而異域有所未聞孰若以復父兄之仇為辭迎兩宫之還為念使天下曉然臣子感慨知陛下為父兄而取中原知陛下念父兄而為死戰兹不曰成孝悌之心乎何謂恢陛下帝王之徳孝經曰必有尊也言有父也必有先也言有兄也孝悌之至通于神明聖人之徳無以加於孝乎今安於東南雖朝勤夕念思及二聖天下必曰安而忘危存而忘亡將有漢髙分羮之譏今趨兵中原雖未勝敵以向二帝天下必曰聖君思父聖君念兄將有四國順之之美陛下誠能斷然大舉決爾復仇懐思二聖誓迎兩宫身以孝悌率天下而天下必以孝悌為移忠兹不曰恢帝王之徳乎何謂蘇陛下凋瘵之民東南生靈實吾邦本西北赤子亦吾舊氓東南既困於須求西北亦重於力役干戈未息祻患式同西北赤子雖䧟偽齊各思舊君東南生靈雖厭科須亦思一戰若或師舉萬全衆役獲安陛下歸中原而統一師徒渡河朔以因糧救西北於水火拯東南扵溝中瘡痍少息賦斂稍寛兹不曰蘇凋瘵之民乎何謂復陛下祖宗之業中民十金猶世相承祖宗天下豈容自棄又况祖宗得之為至艱累聖守之為不易嗟呼宋祚中微皇天不絶獨留陛下以承天休今天下非金人之天下也中原非劉豫之中原也實我太祖皇帝受天明命億萬斯年天意中缺以警子孫劉豫不量擅為已有今以陛下之睿烈憑祖宗之英靈親御六師恭行天討擒叛臣如驅羊取故壘若拾芥克復神京中天下而立兹不曰復祖宗之業乎何謂省陛下財賦之用祖宗建國奄有四方陛下遷都僻在一隅以四方之官吏糜一隅之俸以四方之軍師􅅙一隅之食國用日費扵一年財賦日少扵一嵗今帑蔵已空民力已竭取之於國而國已乏取之於民而民已窮金帛不能天降榖粟不能地湧若遲嵗月坐食而亡況當財少食乏之時必危必亡之勢思其坐盡與之戰敗等歸危亡孰若誓師血戰併力首圖掃清中原分食天下兹不曰省財賦之用乎臣竊料世之議者必曰取中原非難守中原為難此膠柱調瑟不為國家乆逺之謀也若或得之臣固有守之之術但恐陛下憚扵舉兵惑扵衆議遅其嵗月不能善後爾臣聞去冬車駕親征廵幸平江及其宼退人望移蹕不趨秣陵復還臨安天下失望有識共駭人人皆曰趙鼎能勸陛下親征而不能回姦臣之謀進大駕扵建康天下往往以此罪之何哉進幸建康其得有五稽留錢塘其失亦五何謂五得一曰順隂陽而得時制二曰迎水陸而便舟車三曰因險阻而固其國四曰向中原而絶窺伺五曰近重地而激諸將何謂五失一曰經賊臣之擅廢立二曰曠古今而非帝都三曰逺諸將而防衝突四曰便安逸而忘父兄五曰偏一隅而費挽漕有彼五得有此五失陛下何憚而不為遷都計也臣聞左右之臣居呉日久室廬之盛臺榭之樂飲食之便居䖏之安陳其異論力留聖駕殊不知為臣則安為君則危陛下豈可不自為之謀也臣甞觀農夫之茅廬也擇其地得其時面層巒之秀背長岡之䧺然後耕則遂其求食亦卒其嵗既優㳺扵田桑將永保其康止其或處山之巔臨水之滸前無所迎後無所據則亦榖不足扵晝絲不足扵夜農夫之居猶且相其隂陽況夫萬乗之尊富有天下宜如何㢤今錢塘言隂陽則不順言風水則卑薄不須逺舉夫差錢鏐之國秪以苖傳逆亂言之亦足為陛下忌豈可恬然自安以従左右之便也矧建康古都昔有王氣埋金所鎮方册具載臣以謂居秣陵則速興居錢塘則速祻地勢使然亦不可不軫聖慮也臣向論劉豫必叛今果叛矣甞論親征必勝今果勝矣唯遷都一事陛下未如臣請若従臣言中原克復亦已久矣臣又見近日諸路打造戰船勞民動衆耗國損財往往取笑賊臣見嗤勍敵臣来自豫章道路聞愁歎之聲居民有逃移之患臣請為陛下略陳其要臣聞造舟之害其說有四一曰不合度而費其工二曰不適用而損其財三曰不可戰而費其人四曰致搔擾而妨民時何以言之今之造舟豫章之工已取法扵楊么諸郡之工復取式扵豫章豫章之工猶未洞曉他郡之匠豈能巧述況夫輪軸之轉移髙下之増減若使一舟先成衆所共睹随宜增損棄短取長尚恐臨當機要不中繩墨今十舟並作衆役同興所見不同互有巧拙往往施之江湖必不合度此費工之一也其長則二十餘丈其闊則二百餘尺髙及五尋厚方十寸遇風則不可戰欲速則不得前火攻則易焚砲攻則易破將欲捍江所用不少將欲破賊已出賊計今一舟之費動以數萬若十舟之費不知㡬萬設使可用雖勞民役衆興一時之利小害何嫌若曰長則去遅髙則降風臨戰之日或不可用此損財之二也輪軸之運用卒數旅戰闘之士不容一師今十舟之行須二萬人粗能移動二萬之卒用之老弱則力不及用之强壮則妨戰士古人造樓船作戰舸止以聲為實今以實為聲況夫出戰之士猶慮不足豈宜減戰士以操無用之舟此費人之三也材植不能天降必取之扵州縣州縣不能自俻必取之扵百姓加之督責之官不問有無唯求事集不察可否止欲塞責至如板之大小枋之長短堪兩相接者竭家資以貿求貧者􅂝妻孥而逃竄臣聞江西之民因戰舟致遁者十有二三今農民在田布種當務若造舟既急督責不已豈不騷動此妨民之四也以一路言之其害如此其他諸路往往皆然所造之舟不下百隻所費之直不啻萬金觀今國用不足民力困竭諸軍日費動以千金正宜靳惜財賦薄䘏民力豈可使民因此逃移書曰民為邦本本固邦寧孔子亦曰百姓不足君孰與足願陛下圖之臣又聞近日正字已上各舉守令此又見用事之臣謬用其心胡不聞孟子曰諸大夫皆曰賢未可也國人皆曰賢然後察之國人之言猶且致察況扵諸大夫乎朋黨之風其来久矣諸大夫所知不過識其外貌至扵心腹不可得而知也不過聞其所言至扵所行不可得而知也其或渉扵私恩溺扵親舊不無偏見不無妄聽知識有所不及薦舉由是不公又況賢否溷殽真偽紊雜薦引既多銓擇不暇彼既薦舉不可不用此既量才不能不繁然後廟堂之事愈多而任用之弊愈甚以臣計之莫若許千里之民舉其守百里之民舉其令苟便扵民民願舉之苟有不便民自受害是豈肯以千百里之害而為私舉乎守令既得之至公廟堂亦従而事簡遂使宰臣可以留意破敵専為克復之計今若以事之細者小者盡費經綸雖使周公復生聦明有限亦必敗事況扵中下之才乎臣之愚見痛為執政惜其繁夥之事枉使疲精耗神若提其綱紀緫其凡要分任百辟何事不成臣又見近年宰執之權太重遂使人主之威不震何以驗之臣聞天下里巷之談皆曰結知扵人主者不若結知扵宰相何㢤今之宰執其所引援皆是故舊大則致身侍従次則薦對改官不問人之賢否不究才之短長平日交結者雖貪婪巧佞之徒闒茸鄙薄之軰或居外補或致要途而素昧平生者雖抱伊周之才挾管晏之術功徳加乎百姓聞望振扵朝廷或棄遐方或沈下僚皆不得而進用矣陛下胡不試回聖慮深思其因自建炎已来身居畎畆憂及國家自進讜言上結主知命之以官其人有㡬如車千秋之驟進者有㡬矣如馬周之任用者又有㡬矣若曰言無所補何用命之以官若曰言有可用何為置而不問為復来天下之言為文具官直言之人為虚聲乎抑亦主知雖深而掣肘有人乎抑亦宰臣除吏如田蚡而陛下不得自任乎況一言之合于上心一言之寤于聖意必有大過人者若使之盡其所長施扵有為略試其難有功則進之無功則黜之亦足以見賞罸明而取與當矣今也採忠讜之論而命之以官自官之外不復任用苟無逹官為之薦引必沉百僚之底是使孤寒無容之人特立獨行之士雖有忠義之心何縁自効雖有將相之才何由自試嗚呼隗始之事不可復見今以下僚羈言者之身正猶以爵禄鉗天下之口臣恐為敵人所笑昔晉文公逰獵逐禽而遇農夫老古諫之以獵為過文公受諫而歸告武子曰寡人逰獵失禽而得善言武子曰其人安在文公曰猶在澤武子曰取其言而棄其人者盗也文公使人迎而禮之古人之扵聼言任用尤不忍忽君既知之臣亦助之今君既知之而助之如武子者誰歟況當天下離亂勍敵侵陵不有君子其能國乎今憂國之勤者莫如臣而知臣之忠者莫如陛下竊意左右往往以直言而忌臣而臣往往自負忠誼而疾惡臣若不以敵人未平劉豫未滅為心則將退處林泉老死丘壑陛下雖有安車蒲輪不可得而召矣重惟報國之志大平亂之慮深故譊譊不已今之所陳非敢自薦深以執政之權太重人主之柄不張致天下有結主知不若結知扵宰相之說痛為陛下惜也臣前後三書力圖劉豫誓不與之俱生將與我國家共安共危共存共亡正猶同舟之子渉于大川風濤沉濟患難共之若陛下毅然舉兵親征不庭臣願為前驅雖使之赴水蹈火皆所樂従若曰饑死首陽經死木枝則將悔其死之晩也今臣不知忌諱不頋死亡獻忠陛下人臣之節亦已立矣激切之辭亦已至矣陛下如或不聼恐致危亡不可救藥臣願陛下追臣之官殺臣之身無使偽齊得臣微軀或被杻械未得即死豈不玷臣平生忠誼之行負臣平生忠誼之心興言及此貫日以之席藁待罪唯陛下少加察焉六年伸再上書曰五月二十日右文林郎監潭州南嶽廟臣吳伸謹齋沐昧死百拜獻書于皇帝陛下臣嘗讀五代史至王朴傳觀其為周世宗畫平邉之策其言且曰攻取之道従易者始當時未以為然及我太祖皇帝受天眀命削平僭偽一如朴策臣是以知攻取之道貴夫知難知易知堅知脆不特可用於當時固亦可用於今日何以驗之臣請借王朴之言為喻朴甞以呉為大而脆以并為小而堅盖李氏割據江南其北帶江其東距海其地則廣而可撓其人則輕而易搖雖號大國實脆敵也劉氏割據河東左有常山之險右有大河之固北有契丹之援其人則悍而輕死雖號小國實堅敵也故朴以大而脆者為易攻小而堅者為難取易者宜先難者宜後國初所以先呉而後并迄用有成也難易堅脆之策曉然如是用兵之道不能知此雖使曠日持久必不成功往往敗績若王邑不聼嚴尤之謀至於自斃昆陽是矣臣雖踈逖不才非敢自比王朴然當國歩艱難之時正宜輸忠効芹願裨一二況臣昨在畎畆之中已䝉陛下知遇之深臣曉夕思慮補報之心唯有一死臣軀甚微若捐軀有益國家雖赴湯蹈火亦願自試奈何無左右之容致使臣犬馬之力無所施設而臣傾心勞思未嘗不為國家慮也今日攻取之術正有難易臣輙以管見上干天聼伏望聖慈畢賜睿覽縦使一得之慮未足禆補廟筭亦可以見臣憂國之勤也臣竊見劉豫悖逆天道僭據中原神怒于幽人怨于眀天下之人欲將共起而誅之惜乎取之後時滅之太晩臣以謂在紹興之初擒之極易在今日擒之稍難臣扵紹興之初力乞親征誅鋤僭逆盖恐其滋蔓難圖已而果然何以言之在紹興之初劉豫初僭羽毛未成兵猶未足食亦不繼加之金人方有事於蜀中彼且盡鋭以攻四川其實無備扵東北當是之時若親御六師攻其無備出其不意正如迅雷不及掩耳此萬全之計擒之所以必易在今之日僭偽既久形勢已成又況王師盡屯淮右彼知其力屈勢弱必當死請于金人金人以日得萬緡之利必應力援扵劉豫借使金人不渡大河按兵視兩家之弊正用刺虎之術益堕其計擒之所以必難以難擒之時而為必擒之謀臣恐非先後之術也臣竊覩闗中之地劉豫認為已有彼方待敵扵我西北之備想見弛慢臣欲乞擇一偏師用二萬人𢷬其虚以呉玠應之五路之地可傳檄而定既得五路蜀中民力亦可少蘇此所謂従易者始也又況吳玠坐守四川民力困弊昔諸葛亮且田且守尚不能取中原若田守皆不及亮又如之何萬一不為此謀臣恐年嵗之間蜀中亦非陛下有也今分遣二萬之衆與吳玠㑹於闗中是斷劉豫之臂既得闗中劉豫自危嵗月之間可不戰而擒矣若棄易従難臣謂相持師老勝敗之機皆未可必臣竊料劉豫之謀秋髙馬肥彼强亦来彼弱亦来盖强則以勢恐之弱則以計撓之皆不過為自固之術爾臣以謂不若號令諸將休兵秣馬以佚待勞此又萬全之計也臣竊觀今之士卒亦漸精鋭其為主將間有勇敢諸軍内外謀智之士未聞其人臣聞之易曰天地設位聖人成能人謀鬼謀百姓與能聖人且有謀焉司命所繫豈可無也用兵之在謀主有則勝無則負盖亦可驗昔漢得三傑而興楚失范増而亡曹公跣足迎許攸而破冀州陳餘捨左車而死泜水用與不用灼然甚明何今日而忽諸臣在紹興甲寅固嘗論列張浚可用陛下察其非辜未㡬召還果能平湖外之宼然而張浚自秉鈞軸出揔帥權下士之譽日減一日與古之名將用心大相遼邈臣竊意其無他欲懲前此信任小人之弊而畏慎之殊不知進見一人聞見果寡機㑹果暗物理果乖人情果昧則斥之可也謝絶可也其有通當世之務明道徳之歸謀畫如良平議論如許李若一槩遇之得非懲於羮者吹虀之謂歟昔周亞夫得劇孟喜曰呉楚舉大事不求劇孟吾知其無能為也本朝縦張元而元昊叛留姚嗣宗而邉患息故呉楚成敗繋之劇孟邉陲安危見於張姚匹夫去就所繋不輕則豪傑之士豈可忽哉臣審訂此理不特為張浚惜亦將為陛下惜也何則今天下分裂於賊臣劉豫僭號於中原雖非正君亦似兩國豪傑之士可南可北非猶昔日天下一家之時也將多方以羅之重法以禁之尚恐不能盡為我用況於置而不問縦而弗禁者乎臣昨見杜充為宰相順畨遂帥大郡龔若虚以校尉投敵立作郎曹自可誅夷其族朝廷復下所屬撫存其家臣每念之未曉其義況夫捨此就彼必不我利今反撫存其家是縦天下之人為杜充龔若虚之徒也既有其人而不能用既去其人而不能禁可痛惜哉臣聞之劉豫聲言曰南朝每有一官未闕必三五人共之今我州郡皆以見闕任人不年嵗間南方士大夫當盡歸我審如此言豈可不察古人有言曰已棄之而資敵者敗敵取之而助已者勝在今日不可不慮也臣又見今之都督如張浚者不可多得臣但惜其自任太專待人太薄猜忌太過所謂幕府従事者非親則舊皆闒茸偹貟㑹聚之日不過叙寒温問安否而已其有條陳利害論列可否靣折庭諍咸無其人若然則張浚幕客皆是不如已者又安能策得失之計而協濟於料敵㢤昔韓信非無智謀也見李生則再拜師事之曹公非無智謀也見許子則跣足而迎之今張浚自視與韓曹孰賢果自以為不及則下士之禮豈可怠也臣固欲靣見其人箴規其失重以前年春間衆謗並起獨臣雪其非辜有此小嫌不無疑忌今若緘黙尚恐張浚幕客無一賢士復蹈富平之轍有悞國事臣又安得不為陛下詳言之況臣紹興甲寅曽論張浚忠有餘而智不足言猶在耳今若自恃其賢不任謀士復恐敗績欲望聖慈撿㑹前書及以臣今日所陳明示張浚庶使知其小疵若或改之則韓曹之功不難到也臣聞春秋責偹於賢者今日扶持正有望於張浚臣固責之深矣臣憂國之心不能自已或有難臣之謀以謂臣初所上書乞誅劉豫其言則曰萬一少遲事必不濟今此果然朝廷不用臣言一至於此尚何譊譊未已臣則應之曰臣之存亡與國同其休戚又非其他臣庶之比奮忠竭節尤當先於衆人何以言之臣前後數書皆是乞誅劉豫誓不與之俱生往往劉豫視臣亦為死讎萬一國家安則臣亦安國家危則臣亦危臣非畏死臣恐死於劉豫之手無益國事今臣非貪禄躁進沽名釣譽良為天下之大獨臣一人與國同其安危至如其他臣下事偽事真略無甚大利害況前有馮道歴四姓而不替之鑒伏望陛下痛加察焉不唯臣一身之幸亦將為廟社久長之計也干冒冕旒臣無任俯伏待罪之至臣仲昧死百拜歴代名臣奏議卷八十七
