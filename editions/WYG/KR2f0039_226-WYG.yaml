body:
  text: 歴代名臣奏議卷二百二十六明楊士竒等撰征伐周穆王将征犬戎祭公謀父諫曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之先王之於民也茂正其徳而厚其性阜其財求而利其器用明利害之鄉以文脩之使之務利而辟害懐徳而畏威故能保世以滋大昔我先王世后稷以服事虞夏及夏之衰也棄稷不務先王不窟用失其官而自竄扵戎狄之間不敢怠業時序其徳遵脩其緒脩其訓典朝夕恪勤守以敦篤奉以忠信奕世載徳不忝前人至于文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡于民庶民不忍訢戴武王以致戎于商牧是故先王非務武也勤恤民𨼆而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服夷蠻要服戎翟荒服甸服者祭韋昭曰供日祭侯服者祀韋昭曰供月祀賔服者享韋昭曰供時享要服者貢韋昭曰供嵗貢荒服者王韋昭曰王王事天子也日祭月祀時享嵗貢終王先王之順祀也有不祭則脩意有不祀則脩言有不享則修文有不貢則脩名有不王則脩徳序成而有不至則脩刑於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則増脩於徳無勤民於逺是以近無不聽逺無不服今自大畢伯士之終也犬戎氏以其職来王天子曰予必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹敦樹立也言犬戎之性敦篤也率舊徳而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至魯荘公十年齊師伐我公将戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公将鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公将馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之僖公二十一年邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天維顯思命不易哉先王之明徳猶無不難也無不懼也況我小國乎君其無謂邾小蠭蠆有毒而況國乎哀公十四年齊陳恒弑其君壬于舒州孔丘三日齋而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯将伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳兹益罪也後之人或者將敬奉徳義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反徳為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其户數簡子謂無恤曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸及智宣子卒智襄子為政與韓康子魏桓子宴扵藍臺智伯戯康子而侮段規智國聞之諫曰主不備難必至矣智伯曰難將由我我不為難誰敢興之對曰不然夏書有之曰一人三失怨豈在明不見是圖夫君子能勤小物故無大患今主一宴而耻人之君相又不備曰不敢興難無乃不可乎蜹蟻蜂蠆皆能害人況君相乎弗聽智伯請地於韓康子康子欲弗與段規曰智伯好利而愎不與将伐我不如與之彼狃於得地必請於他人他人不與必嚮之以兵然則我得免於患而待事之變矣康子曰善乃與之智伯恱又求地於魏桓子桓子欲弗與任章問焉桓子曰無故任章曰無故索地諸大夫必懼吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣不如與之以驕智伯然後可以擇交而圖之柰何獨以吾為智氏質乎桓子曰善亦與之智伯又求蔡臯狼之地於趙襄子襄子弗與智伯怒帥韓魏之甲以攻之襄子将出曰吾何走乎從者曰長子近且城完厚襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉廩實襄子曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寛也民必和矣乃走晉陽三家圍而灌之城不浸者三版沈竈産鼃民無叛意智伯行水魏桓子御韓康子驂乘智伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也絺疵謂智伯韓魏必反矣智伯曰子何以知之對曰以人事知之夫從韓魏而攻趙趙亡難必及韓魏矣今約勝趙而三分其地城降有日而二子無喜志有憂色是非反而何明日智伯以其言告二子二子曰此䜛人欲為趙氏游說使主疑二家而懈於攻趙也不然二家豈不利朝夕分趙氏之田而欲為此危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也智伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也智伯不悛趙襄子使趙孟談潜出見二子曰臣聞脣亡則齒寒趙亡則韓魏為之次矣二子乃隂與約為之期日而遣之襄子夜使人殺守隄之吏而決水灌智伯軍智伯軍亂韓魏翼而撃之襄子將卒犯其前大敗其衆遂殺智伯滅智氏而分其地惠文王時秦伐韓軍於閼與王召㢘頗而問曰可救不對曰道逺險狹難救又召樂乗而問焉樂乘對如㢘頗言又召問趙奢奢對曰其道逺險狹譬之猶兩鼠鬭於穴中將勇者勝王乃令趙奢将救之孝成王時秦王齕攻上黨㧞之上黨民走趙趙㢘頗軍長平以按據之齕還攻趙趙軍數敗樓昌請發重使為媾虞卿曰今制媾者在秦秦必欲破王之軍矣雖徃請将不聽不如以重寳附楚魏則秦疑天下之合從媾乃可成也王不聽使鄭朱媾於秦虞卿曰天下之賀戰勝者皆在秦矣鄭朱貴人也秦必顯重之以示天下天下見王之媾於秦必不救王秦知天下之不救王則媾不可成矣既而果然時秦攻趙㧞武安皮牢司馬梗北定太原盡有上黨地韓趙又割地以和趙孝成王之均割地也虞卿言曰秦之攻王也倦而歸乎其力尚能進愛王而弗攻乎王曰秦不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也来年秦攻王王無救矣樓緩曰卿得其一不得其二秦趙搆難而天下說今不割地求和以疑天下慰秦之心則天下將因秦之怒乘趙之弊而𤓰分之矣虞卿曰危哉樓子之計是愈疑天下而何慰秦之心哉且臣言勿與者非固勿與而已秦索六城於王而王以六城賂齊則是王失之於齊取償扵秦也以此發聲臣見秦之重賂至趙而反媾於王矣趙王曰善魏文侯問李克曰吳之所以亡者何也李克對曰數戰數勝文侯曰數戰數勝國之福也其所以亡何也李克曰數戰則民疲數勝則主驕以驕主治疲民此其所以亡也是故好戰窮兵未有不亡者也楚武王侵随使薳章求成焉軍於瑕以待之随人使少師董成鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國随為大随張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師随侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大滛所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力扵神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉徳而無違心也所謂馨香無䜛慝也故務其三時脩其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑脩政而親兄弟之國庶免於難随侯懼而脩政楚不敢伐武王時屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師楚子辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令徳見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖使徇于師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之荘王欲伐晉使豚尹觀焉反曰不可伐也其憂在上其樂在下且賢臣在焉曰沈駒明年又使豚尹觀反曰可矣初之賢人死矣諂䛕多在君之廬者其君好樂而無禮其下危處以怨上上下離心興師伐之其民必先反荘王從之果如其言矣宋人圍曹討不服也子魚言於宋襄公曰文王聞崇徳亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動宋襄公時楚人伐宋以救鄭襄公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已弗聽及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請撃之公曰不可既濟而未成列又以告公曰未可既陳而後撃之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天賛我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛明耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也齊桓公五年伐魯魯将師敗魯荘公請獻遂邑以平桓公許與魯㑹柯而盟魯将盟曹沫以匕首刼桓公於壇上曰反魯之侵地桓公許之已而曹沬去匕首北面就臣位桓公後悔欲無與魯地而殺曹沬管仲曰夫刼許之而倍信殺之愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹沬三敗所亡地於魯諸侯聞之皆信齊而欲附焉景公時将伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不徳而有功憂必及君崔杼諌曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之陳文子見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也況以惡乎宣王欲伐魏淳于髠為齊王曰韓子盧者天下之疾犬也東郭㕙者海内之狡兎也韓子盧逐東郭㕙環山者三騰山者五兎極扵前犬廢扵後犬兎俱罷各死其䖏田父見之無勞勌之苦而擅其功今齊魏久相持以頓其兵敝其衆臣恐强秦大楚承其後有田父之功齊王懼謝将休士威王時魏使龐涓伐韓韓請救於齊威王召大臣而謀之成侯鄒忌曰不如勿救田忌曰不救則韓且折而入於魏矣不如早救之孫臏曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而愬於齊吾因深結韓之親而晚承魏之弊則可受重利而得尊名也王曰善乃隂許韓使而遣之越王句踐元年吳王闔廬聞允常死乃興師伐越越王句踐使死士挑戰三行至吳陳呼而自剄吳師觀之越因襲撃吳師吳師敗於檇李射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越三年句踐聞吳王夫差日夜勒兵且以報越越欲先吳未發徃伐之范蠡諫曰不可臣聞兵者凶器也戰者逆徳也争者事之末也隂謀逆徳好用凶器試身扵所末上帝禁之行者不利越王曰吾已決之矣遂興師吳王聞之悉發精兵撃越敗之夫椒杜預曰夫椒在吳郡吳縣太湖中椒山是也吳王闔閭使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又彊其讎以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同於先王不知天將以為虐乎使剪䘮吳國而封大異姓乎其抑将卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寜吾族姓以待其歸将焉用自播揚焉王弗聽吳子怒問於伍員曰初而言伐楚余知其可也而恐其使余徃也又惡人之有余之功也今余将自有之矣代楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔閭從之楚於是乎始病吳以伍子胥孫武之謀西破强楚北威齊晉南伐越越王句踐迎撃之敗吳於姑蘓傷闔廬指軍却闔廬謂太子夫差曰爾忘勾踐殺而父乎夫差對曰不敢是夕闔廬死夫差既立為王以伯嚭為太宰習戰射三年伐越敗之夫椒越王勾踐乃以兵五千人棲於㑹稽山上使大夫種厚幣遺吳太宰嚭以請和委國為臣妾吳王將許之伍子胥諫曰越王為人能辛苦今王不滅後必悔之吳王不聽用太宰嚭計與越平其後五年吳王聞齊景公死而大臣争寵新君弱乃興師北伐齊子胥諌曰不可勾踐食不重味弔死問疾且能用人此人不死必為吳患今越腹心之疾齊猶疥癬耳而王不先越乃務伐齊不亦謬乎吳王不聽伐齊大敗齊師於艾陵遂與鄒魯之君㑹以歸益踈子胥之言其後四年吳将復北伐齊越王勾踐用子貢之謀乃率其衆以助吳而重寳以獻遺太宰嚭太宰既數受越賂其愛信越殊甚日夜為言於吳王王信用嚭之計伍子胥諫曰夫越腹心之疾今信其游辭偽詐而貪齊譬猶石田無所用之盤庚曰古人有顛越不恭是商所以興也願王釋齊而先越不然将悔之無及也已吳王不聽使子胥於齊子胥謂其子曰吾諌王王不我用吾今見吳之滅矣女與吳俱亡無為也乃屬其子扵齊鮑氏而歸報吳王太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩其怨望猜賊為禍也深恨前日王欲伐齊子胥以為不可王卒伐之而有大功子胥計謀不用乃反怨望今王又復伐齊子胥專愎强諫沮毁用事徼幸吳之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟佯病不行王不可不備此起禍不難且臣使人微伺之其使齊也乃屬其子於鮑氏夫人臣内不意外交諸侯自以先王謀臣今不用常怏怏願王早圖之吳王曰微子之言吾亦疑之乃使使賜子胥屬鏤之劍曰子以此死子胥曰嗟乎讒臣宰嚭為亂王顧反誅我我令若父覇又若立時諸子弟争立我以死争之於先王幾不得立若既立欲分吳國與我我顧不敢當然若之何聽䜛臣殺長者乃告舎人曰必樹吾墓上以梓令可以為器而抉吾眼著之吳東門以觀越宼之滅吳也乃自刺殺吳王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吳人憐之乃為立祠於江上因名曰胥山後十餘年越襲吳吳王還與戰不勝使大夫行成於越不許吳王将死曰吾以不用子胥之言至扵此令死者無知則已死者有知吾何面目以見子胥也遂䝉絮覆面而自刎吳王夫差敗越于夫椒報擕李也遂入越越子以甲楯五千保于㑹稽使大夫種因吳太宰嚭以行成吳子将許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其徳而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大於少康或將豐之不難乎勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讎於是克而弗取将又存之違天而長㓂讎後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長㓂讎以是求覇必不行矣弗聽夫差為邾故將伐魯問於叔孫輙對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則𨼆且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎子張病之王問於子洩對曰魯雖無與立必有與斃諸侯将救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為吳伐我國人懼懿子謂景伯若之何對曰吳師来則與之戰何患焉且召之而至又何求焉吳師戰于夷獲叔子與析朱鉏獻于王王曰此同車必使能國未可望也吳人行成将盟景伯曰楚人圍宋易子而食析骸而㸑猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久将歸矣請少待之弗從吳人盟而還吳王欲伐荆告其左右曰敢有諫者死舎人有少孺子欲諫不敢則懐操弹於後園露沾其衣如是者三旦吳王曰子来何苦沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附取蟬而不知黄雀在其傍也黄雀延頸欲啄螳蜋而不知弹丸在其下也此三者皆務欲得其前利而不顧其後之有患也王曰善哉乃罷其兵夫差将伐齊越子率其衆而朝焉王及列士皆有饋賂吳人皆喜唯伍子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲扵我夫其柔服求濟其欲也不如早從事焉得志扵齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺𩔖焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于兹邑是商所以興也今君易之将以求大不亦難乎弗聽秦惠王時巴蜀相攻俱告急扵秦恵王欲伐蜀韓又来侵司馬錯請伐蜀張儀曰不如伐韓王曰請聞其說儀曰親魏善楚下兵三川攻新城宜陽以臨二周之郊㩀九鼎按圖籍挟天子以令天下天下莫敢不聽此王業也臣聞争名者於朝争利者扵市今三川周室天下之朝市也而王不争焉顧争於戎翟去王業逺矣錯曰不然臣聞之欲富國者務廣其地欲强兵者務富其民欲王者務博其徳三資者備而王随之矣今王地小民貧故臣願先從事於易夫蜀西僻之國而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉㧞一國而天下不以為暴利盡四海而天下不以為貪而又有禁暴止亂之名是我一舉而名實附也今攻韓刼天子惡名也而攻天下之所不欲又未必利也不如伐蜀王從之武王使甘茂約魏以伐韓宜陽茂至魏使人還謂王曰魏聽臣矣然願王勿伐王迎茂息壤而問其故對曰宜陽大縣其實郡也今倍數險行千里攻之難魯人有與曽參同姓名者殺人人告其母母織自若也及三人告之則其母投杼下機踰墻而走臣之賢不若曾參王之信臣不如其母疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊攻中山三年㧞之返而論功文侯示之謗書一箧樂羊再拜稽首曰此非臣之功君之力也今臣羇旅之臣也樗里子公孫奭挟韓而議之王必聽之是王欺魏王而臣受公仲侈之怨也故臣願王之勿伐也王曰寡人弗聽也請予子盟乃盟于息壤昭王時白起㧞楚西陵或㧞鄢郢夷陵燒先王之墓王徙東北保于陳城楚遂削弱為秦所輕扵是白起又将兵来伐楚人有黄歇者游學博聞襄王以為辯故使於秦說昭王曰天下莫强扵秦楚今聞大王欲伐楚此猶兩虎相鬭而駑犬受其敝不如善楚臣請言其說曰物至而反冬夏是也致至而危累棊是也今大國之地半天下有二垂此從生民以来萬乘之地未嘗有也先帝文王武荘王王之身三世而不接地於齊以絶從親之要今王使成橋守事於韓成橋以北入燕是王不用甲不伸威而出百里之地王可謂能矣王又舉甲兵而攻魏杜大梁之門舉河内㧞燕酸􅀥虗桃人楚燕之兵雲翔而不敢校王之功亦多矣王休甲息衆二年然後復之又取蒲衍首垣以臨仁平兵小黄濟陽嬰城而魏氏服矣王又割濮磨之北屬之燕斷齊秦之要絶楚魏之脊天下五合六聚而不敢救也王之威殫矣王若能持功守威省攻伐之心而肥仁義之誡使無復後患三王不足四五覇不足六也王若負人徒之衆恃甲兵之强一毁魏氏之威而欲以力臣天下之主臣恐有後患詩云靡不有初鮮克有終易曰狐濡其尾此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也吳見伐齊之便而不知干隧之敗也此二國者非無大功也沒利於前而易患扵後也吳之信越也從而伐齊遂攻齊人於艾陵還為越王禽於三江之浦智氏信韓魏從而伐趙攻晉陽之城勝有日矣韓魏反之殺智伯瑶扵鑿䑓之上今王妬楚之不毁也而忘毁楚之强魏也臣為大王慮而不取詩云大武逺宅不渉從此觀之楚國援也鄰國敵也詩云他人有心予忖度之躍躍毚兎遇犬獲之今王中道而信韓魏之善王也此正吳信越也臣聞敵不可易時不可失臣恐韓魏之卑辭慮患而實欺大國也王既無重世之徳於韓魏而有累世之怨焉夫韓魏父子兄弟接踵而死於秦者幾世矣本國殘社稷壊宗廟隳刳腹拆頥首身分離暴骨草澤頭顱僵仆相望於境父子老弱係虜相随於路鬼神孤祥無所食百姓不聊生族𩔖離散流亡為臣妾滿海内矣韓魏之不亡秦社稷之憂也今王之攻楚不亦失乎且王攻楚之日則惡出兵王将藉路扵仇讎之韓魏乎兵出之日而王憂其不反也是王以兵資於仇讎之韓魏必攻随陽右壤此皆廣川大水山林谿谷不食之地王雖有之不為得地是王有毁楚之名無得地之實也且王攻楚之日四國必應悉起應王秦楚之兵搆而不離魏氏将出兵而攻留方與銍胡陵碭蕭相故宋必盡齊人南面泗北必舉此皆平原四逹膏腴之地也而王使之獨攻王破楚扵以肥韓魏於中國而勁齊韓魏之强足以校於秦矣而齊南以泗為境東負海北倚河而無後患天下之國莫强於齊齊魏得地葆利而詳事下吏一年之後為帝若未能於以禁王之為帝有餘夫以王壤土之愽人徒之衆兵革之强而注地扵楚詘令韓魏歸帝重扵齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨韓韓必受首王襟以山東之險帯以河曲之利韓必為關中之侯若是王以十萬戍成鄭梁氏寒心許鄢陵嬰城上蔡召陵不徃来也如此而魏亦關内侯矣王一善楚而關内二萬乗之主注地於秦齊之右壤可拱手而取也是王之地一注任兩海要絶天下也是燕趙無齊楚齊楚無燕趙也然後危動燕趙持齊楚此四國者不待痛而服矣昭王攻趙蘇子謂王曰臣聞明王之扵其民也博論而技藝之是故官無之事而力不困於其言也多聽而時用之是故事無敗業而惡不章臣願王察臣之所謁而効之於一時之用也臣聞懐重寳者不以夜行任大功者不以輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊而世不妬其業臣聞之百倍之國者民不樂後也功業髙世者人主不再行也力盡之民仁者不用也求得而反静聖王之制也功大而息民用兵之道也今用兵終身不休力盡不罷怒趙趙怒必於其己邑趙僅存哉然而四輪之國也今雖得邯鄲非國之長利也意者地廣而不耕民羸而不休又嚴之以刑罰則雖從而不止矣語曰戰勝而國危者物不斷也功大而權輕者地不入也故過任之事父不得扵子無已之求君不得扵臣故微之為著者强察乎息民之為用者覇明乎輕之為重者王秦王曰寡人案兵息民則天下必為從将以逆秦蘓子曰臣有以知天下之不能為從以逆秦也臣以田單如耳為大過也豈獨田單如耳為大過哉天下之主亦盡過矣夫慮收亡齊罷楚敝魏與不可知之趙欲以窮秦折韓臣以為至愚也夫齊威宣者世之賢王也徳博而地廣國富而民用将武而兵强宣王用之後破富韓威勁魏以南伐楚西攻秦秦為齊兵困於殽函之上十年攘地秦人逺迹不服而齊為虗矣夫齊兵之所以破韓魏之所以僅存者何也是則伐楚攻秦而後受其殃也今富非有齊威宣之餘也精兵非有富韓勁魏之庫也而将非有田單司馬之慮也收破齊罷楚敝魏不可知之趙欲以窮秦折韓臣以為至誤臣以為從一不可成也客有難者今人有患扵世夫刑名之家皆曰白馬非馬也已如白馬實馬乃使有白馬之為也此臣之所患也昔者秦人下兵攻懐服其人三國從之趙奢鮑佞将楚有四人起而從之臨懐而不救秦人去而不從不識三國之憎秦而愛懐耶亡其憎懐而愛秦耶夫攻而不救去而不從是以知三國之兵困而趙奢鮑佞之能也故裂地以敗于齊田單将齊之良以兵横行於中十四年終身不敢設兵以攻秦折韓也而馳扵封内不識從之一成惡存也扵是秦王解兵不出于境諸侯休天下安二十九年不相攻昭王既息民繕兵復欲伐趙武安君曰不可王曰前年國虛民飢君不量百姓之力求益軍粮以滅趙今寡人息民以養士蓄積粮實三軍之俸有倍于前而曰不可其說何也武安君曰長平之事秦軍大克趙軍大破秦人歡喜趙人畏懼秦民之死者厚𦵏傷者厚養勞者相饗飲食餔餽以靡其財趙人之死者不得收傷者不得療涕泣相哀戮力同憂耕田疾作以生其財今王發軍雖倍其前臣料趙國守備亦以十倍矣趙自長平已来君臣憂懼早朝晏罷卑辭重幣四面出嫁結親燕魏連好齊楚積慮并心備秦為務其國内實其交外成當今之時趙未可伐也王曰寡人既以興師矣乃使五校大夫王陵将而伐趙陵戰失利亡五校王欲使武安君武安君稱疾不行王乃使應侯往見武安君責之曰楚地方五千里持㦸百萬君前率數萬之衆入楚㧞鄢郢焚其廟東至竟陵楚人震恐東徙而不敢西向韓魏相率興兵甚衆君所将之卒不能半之而與戰之扵伊闕大破二國之軍流血漂鹵斬首二十四萬韓魏以故稱東藩此君之功天下莫不聞今趙卒之死扵長平者已十七八其國虚弱是以寡人大發軍人數倍扵趙國之衆願使君将必欲滅之矣君常以寡撃衆取勝如神况以强撃弱以衆撃寡乎武安君曰是時楚王恃其國大不恤其政而羣臣相妬以功䛕謟用事良臣斥踈百姓心離城池不修既無良臣又無守備故起所以得引兵深入多倍城邑發梁焚舟以專民志掠扵郊野以足軍食當此之時秦中士卒以軍中為家将帥為父母不約而親不謀而信一心同力死不旋踵楚人自戰其地咸顧其家各有散心莫有鬬志是以能有功也伊闕之戰韓孤顧魏不欲先用其衆魏恃韓之銳欲推以為鋒二軍争便之力不同是以臣得設疑兵以待韓陣專軍并銳觸魏之不意魏軍既敗韓軍自潰乘勝逐北以是之故能立功皆計利形勢自然之理何神之有哉今秦破趙軍於長平不遂以時乘其振懼而滅之畏而釋之使得耕稼以益蓄積養孤長幼以益其衆繕治兵甲以益其强増城浚池以益其固主折節以下其臣臣推體以下死士至扵平原之屬皆令妻妾補縫於行伍之間臣人一心上下同力猶勾踐困扵㑹稽之時也以今伐之趙必固守挑其軍戰必不肯出圍其國都必不可克攻其列城必未可㧞掠其郊野必無所得兵出無功諸侯生心外救必至臣見其害未覩其利又病未能行應侯慚而退以言於王王曰微白起吾不能滅趙乎復益發軍更使王齕代王陵伐趙圍邯鄲八九月死傷者衆而弗下趙王出輕銳以宼其後秦數不利武安君曰不聽臣計今果如何王聞之怒因見武安君强起之曰君雖病强為寡人卧而将之有功寡人之願将加重扵君如君不行寡人恨君武安君頓首曰臣知行雖無功得免扵罪雖不行無罪不免扵誅然惟願大王覽臣愚計釋趙養民以諸侯之變撫其恐懼伐其憍慢誅滅無道以令諸侯天下可定何必以趙為先乎此所謂為一臣屈而勝天下也大王若不察臣愚計必欲快心扵趙以致臣罪此亦所謂勝一臣而為天下屈者也夫勝一臣之嚴焉孰若勝天下之威大邪臣聞明主愛其國忠臣愛其名破國不可復完死卒不可復生臣寜伏受重誅而死不忍為辱軍之将願大王察之王不答而去范睢言於昭王曰大王之國北有髙泉谷口南帶涇渭右隴蜀左闗阪戰車千乘奮撃百萬以秦卒之勇車騎之多以當諸侯譬若馳韓盧而逐狡兎也覇王之業可致今反閉而不敢窺兵扵山東者是大王之計有所失也王曰願聞失計睢曰大王越韓魏而攻强齊非計也少出師則不足以傷齊多之則害扵秦臣意王之計欲少出師而悉韓魏之兵則不義矣今見與國之不可親越人之國而攻可謂䟽扵計矣昔者齊人伐楚戰勝破軍殺将再辟千里膚寸之地無得者豈齊不欲地哉形弗能有也諸侯見齊之罷露君臣之不親舉兵而伐之王辱軍破為天下笑所以然者以其伐楚而肥韓魏也此所謂藉賊兵而齎盜食者也王不如逺交而近攻得寸則王之寸得尺亦王之尺也今舎此而逺攻不亦繆乎且昔者中山之地方五百里趙獨擅之功成名立利附則天下莫能害今韓魏中國之䖏而天下之樞也王若欲覇必親中國而以為天下樞以威楚趙趙彊則楚附楚彊則趙附楚趙附則齊必懼懼必卑辭重幣以事秦齊附而韓魏可虚也齊孟嘗君怨秦與韓魏攻之入函谷闗秦昭王謂丞相樓緩公子他曰三國之兵深矣寡人欲割河東而媾對曰媾亦悔不媾亦悔王曰何也對曰王割河東而媾三國雖去王必曰惜矣三國且去吾特以三城從之此媾之悔也不媾三國入函谷咸陽必危王又曰惜矣吾愛三城而不媾此不媾之悔也王曰鈞吾悔也寜亡三城而悔無危咸陽而悔也乃使公子他以三城媾於三國秦武安君病使王陵伐趙攻邯鄲少利武安君病愈昭王欲使代之武安君曰邯鄲實未易攻也且諸侯之救日至秦雖勝扵長平然士卒死者過半國内空逺絶河山而争人國都趙應其内諸侯攻其外破秦軍必矣王又使應侯請之終辭不行秦二世時陳勝起山東使者以聞二世召博士諸儒生問曰楚戍卒攻蘄入陳扵公如何博士諸生三十餘人前曰人臣無将将即反罪死無赦願陛下急發兵撃之二世怒漢髙帝初欲以兵二萬人撃秦嶢下軍張良說曰秦兵尚彊未可輕臣聞其将屠者子賈豎易動以利願沛公且留壁使人先行為五萬人具食益為張旗幟諸山上為疑兵令酈食其持重寳㗖秦将秦将果畔欲連和俱西襲咸陽沛公欲聽之良曰此獨其将欲叛耳恐士卒不從不從必危不如因其解撃之沛公乃引兵撃秦軍大破之遂北至藍田再戰秦兵竟敗二年漢王至洛陽新城三老董公遮說王曰臣聞順徳者昌逆徳者亡兵出無名事故不成故曰名其為賊敵乃可服項羽為無道放殺其主天下之賊也夫仁不以勇義不以力大王宜帥三軍之衆為之素服以告之諸侯為此東伐四海之内莫不仰徳此三王之舉也漢王曰善非夫子無所聞三年漢王出滎陽至成臯自成臯入闗收兵欲復東轅生說漢王曰漢與楚相距滎陽數嵗漢常困願君王出武闗項王必引兵南走王深壁令滎陽成臯間且得休息使韓信等得輯河北趙地連燕齊君王乃復走滎陽如此則楚所備者多力分漢得休息復與之戰破之必矣漢王從其計六年人有告楚王韓信反者帝以問諸将皆曰亟發兵坑豎子耳帝黙然又問陳平平曰人言信反信知之乎上曰不知平曰陛下兵精孰與楚上曰不能過平曰諸将用兵有能過信者乎上曰莫及也平曰如此而舉兵攻之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子有廵狩㑹諸侯陛下苐出偽逰雲夢㑹諸侯於陳陳楚之西界信聞天子以㑹出逰其勢必無事而郊迎謁謁而因擒之此特一力士之事耳帝以為然七年韓王信反帝自徃撃之至晉陽聞信與匈奴欲共撃漢上大怒使人使匈奴匈奴匿其壮士肥牛馬但見老弱及羸畜使者十軰来皆言匈奴可撃上使劉敬復徃使匈奴還報曰兩國相撃此宜夸矜見所長今臣徃徒見羸瘠老弱此必欲見短伏竒兵以争利愚以為匈奴不可撃也是時漢兵已踰句注二十餘萬兵已業行上怒罵劉敬曰齊虜以口舌得官今廼妄言沮吾軍械繋敬廣武遂徃至平城匈奴果出竒兵圍髙帝白登七日然後得解髙帝至廣武赦敬曰吾不用公言已困平城吾皆已斬前使十軰言可撃者矣廼封敬二千户為闗内侯號為建信侯十一年淮南王黥布反召諸将問之汝隂侯滕公言之上曰臣客故楚令尹薛公其人有籌䇿可問上乃見問薛公對曰布反不足怪也使布出於上計山東非漢之有也出扵中計勝負之數未可知也出扵下計陛下安枕而卧矣上曰何謂上計薛公對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏㩀敖倉之粟塞成臯之險勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣上曰是計将安出薛公曰出下計上曰胡為廢上計而出下計薛公曰布故驪山之徒也致萬乘之主此皆為身不顧後為百姓萬世慮者也故曰出下計文帝時匈奴强數㓂邊上發兵以禦之太子家令晁錯上言兵事曰臣聞漢興以来北敵數入邊地小入則小利大入則大利髙后時再入隴西攻城屠邑敺畧畜産其後復入隴西殺吏卒大宼盜竊聞戰勝之威民氣百倍敗兵之卒没世不復自髙后以来隴西三困扵匈奴矣民氣破傷無有勝意今兹隴西之吏頼社稷之神靈奉陛下之明詔和輯士卒底厲其節起破傷之民以當乘勝之匈奴用少撃衆殺一王敗其衆而法曰大有利非隴西之民有勇怯廼将吏之制巧拙異也故兵法曰有必勝之将無必勝之民由此觀之安邊境立功名在於良将不可不擇也臣又聞用兵臨戰合刄之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石徑川丘阜草木所在此歩兵之地也車騎二不當一上山丘陵曼衍相屬平原廣野此車騎之地歩卒十不當一平陵相逺川谷居間仰髙臨下此弓弩之地也短兵百不當一兩陣相近平地淺草可前可後此長㦸之地也劍楯三不當一萑葦竹蕭草木䝉蘢支葉茂接此矛鋋之地也長㦸二不當一士不選練卒不服習起居不精動静不集趨利弗及避難不畢前撃後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅宻與袒裼同弩不可以及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此将不省兵之禍也五不當一故兵法曰器械不利以其卒予敵也卒不可用以其将予敵也将不知兵以其主予敵也君不擇将以其國予敵也四者兵之至要也臣又聞小大異形强弱異勢險易異備夫卑身以事强小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射䟽及逺䟽亦濶逺也則匈奴之弓弗能格也堅甲利刄長短相雜逰弩徃来什伍俱前則匈奴之兵弗能當也材官騶發矢道同的則匈奴之革笥木薦弗能支也下馬地鬭劍㦸相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一撃十之術也雖然兵凶器戰危事也以大為小以彊為弱在俛仰之間耳夫以人之死争勝跌而不振則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬来歸􅁩者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明将能知其習俗和輯其心者以陛下之明約将之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆此萬全之術也傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下財擇武帝建元三年閩越發兵圍東甌東甌食盡困且降乃使人告急上問太尉田蚡對曰越人相攻撃固其常又數反覆不足以煩中國徃救也自秦時棄弗屬扵是中大夫荘助詰蚡曰特患力弗能救徳弗能覆誠能何故棄之且秦舉咸陽而棄之何乃越也今小國以窮困来告急天子天子弗振當安所告愬又何以子萬國乎上曰太尉未足與計吾初即位不欲出虎符發兵郡國乃遣荘助以節發兵㑹稽太守欲距不為發兵助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵而去東甌請舉國徙中國乃悉舉衆来處江淮之間六年閩越興兵撃南越南越守天子約不敢擅發兵而上書以聞上多其義大為發兵遣兩将軍将兵誅閩越淮南王安上書諫曰陛下臨天下布徳施恩緩刑罰薄賦斂哀鰥寡恤孤獨養耆老振匱乏盛徳上隆和澤下洽近者親附逺者懐徳天下攝然人安其生自以沒身不見兵革今聞有司将以誅越臣安竊為陛下重之越方外之地􅗴髪文身之民也不可以冠帶法度理也自三代之盛胡越不與受正朔非彊弗能服威弗能制也以為不居之地不牧之民不足以煩中國也故古者封内甸服封外侯服侯衛賔服蠻夷要服戎狄荒服逺近勢異也自漢初定已来七十二年吳越人相攻撃者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也䖏谿谷之間篁竹之中習扵水鬭便扵用舟地深昧而多水險中國之人不知其勢阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里阻險林叢弗能盡著視之若易行之甚難天下頼宗廟之靈方内大寜戴白之老不見兵革民得夫婦相守父子相保陛下之徳也越人名為藩臣貢酎之奉不輸大内一卒之用不給上事自相攻撃而陛下發兵救之是反以中國而勞蠻夷也且越人愚戇􅁿薄負約反覆其不用天子之法度非一日之積也一不奉詔舉兵誅之臣恐後兵革無時得息也間者數年嵗比不登民待賣爵贅子以接衣食賴陛下徳澤振救之得無轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而隃領拕舟而入水行數百千里夾以深林叢竹水道上下撃石林中多蝮蛇猛獸夏月暑時嘔泄霍亂之病相随屬也曽未施兵接刄死傷者必衆矣前時南海王反陛下先臣使将軍間忌将兵撃之以其軍降䖏之上淦後復反㑹天暑多雨樓船卒水居撃櫂未戰而疾死者過半親老涕泣孤子謕號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曽未入其地而禍已至此矣臣聞軍旅之後必有凶年言民各以其愁苦之氣薄隂陽之和感天地之精而災氣為之生也陛下徳配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴扵心今方内無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開鼂不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵彊能難邊城淮南全國之時多為邊吏臣竊聞之與中國異限以髙山人跡所絶車道不通天地所以隔外内也其入中國必下領水領之山峭峻漂石破舟不可以大船載食糧下也越人欲為變必先田餘干界中積食廼入伐材治船邊城守候誠謹越人有入伐材者輙收捕焚其積聚雖百越奈邊城何且越人緜力薄材不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不能其水土也臣聞越甲卒不下數千萬所以入之五倍乃足輓車奉饟者不在其中南方暑溼近夏癉熱暴露水居蝮蛇蠚生疾癘多作兵未血刄而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弑而殺之甲以誅死其民未有所屬陛下若欲来内䖏之中國使重臣臨存施徳垂賞以招致之此必携㓜扶老以歸聖徳若陛下無所用之則繼其絶世存其亡國建其王侯以為畜越此必委質為藩臣世共貢賦陛下以方寸之印丈二之組鎮撫方外不勞一卒不頓一㦸而威徳並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兎逃入山林險阻背而去之則復相羣聚留而守之則歴嵗經年士卒罷倦食糧乏絶男子不得耕稼樹種婦人不得紡績織絍丁壮從軍老弱轉餉居者無食行者無糧民苦兵事亡逃者必衆随而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠睢撃越又使監禄鑿渠通道越人逃入深山林叢不可得攻留軍屯守空地曠日持乆士卒勞倦越乃出撃之秦兵大破乃發適戍以備之當此之時外内騷動百姓靡敝行者不還徃者莫反皆不聊生亡逃相從羣為盜賊扵是山東之難始興此老子所謂師之所處荆棘生之者也兵者凶事一方有急四面皆從臣恐變故之生姦邪之作由此始也周易曰髙宗伐鬼方三年而克之鬼方小蠻夷髙宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵不可不重也臣聞天子之兵有征無戰言莫敢校也如使越人䝉死徼幸以逆執事之顔行厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾人徒之衆足以奉千官之共租稅之收足以給乗輿之御玩心神明秉執聖道負黼扆馮玉几南面而聽斷號令天下四海之内莫不嚮應陛下垂徳惠以覆露之使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也疏逺之地何足以為一日之間而煩汗馬之勞乎詩云王猶允塞徐方既来言王道甚大而逺方懐之也臣聞之農夫勞而君子養焉愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邊境有警愛身之死而不畢其愚非忠臣也臣安竊恐将吏之以十萬之師為一使之任也武帝時田蚡為丞相韓安國為御史大夫匈奴来請和親上下其議大行王恢燕人數為邊吏習邊事議曰漢與匈奴和親率不過數嵗即背約不如勿許舉兵撃之安國曰千里而戰即兵不獲利今匈奴負險阻地懐狡詐心遷徙靡常難得而制得其地不足為廣有其衆不足為强自上古弗屬漢數千里争利則人馬罷虜以全制其敝勢必危殆臣故以為不如和親羣臣議多附安國於是上許和親明年雁門馬邑豪聶壹因大行王恢言匈奴初和親親信邊可誘以利致之伏兵襲撃必破之道也上乃召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盜無已邊境數驚朕甚閔之今欲舉兵攻之何如大行恢對曰陛下雖未言臣固願效之臣聞全代之時北有强鄰之敵内連中國之兵然尚得養老長幼種樹以時倉廪常實匈奴不輕侵也今以陛下之威海内為一天下同任又遣子弟乗邊守塞轉粟輓輸以為之備然匈奴侵盜不已者無他以不恐之故耳臣竊以為撃之便御史大夫安國曰不然臣聞髙皇帝嘗圍扵平城匈奴至者投鞌髙如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗壹擁天下之精兵聚之廣武常谿然終無尺寸之功而天下黔首無不憂者孝文寤扵兵之不可宿故復合和親之約此二聖之跡足以為效矣臣竊以為勿撃便恢曰不然臣聞五帝不相襲禮三王不相複樂非故相反也各因世宜也且髙帝身被堅執銳䝉霧露沐霜雪行㡬十年所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所𨼆也臣故曰撃之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛四裔不與正朔服色非威不能制彊弗能服也以為逺方絶地不牧之民不足煩中國也且匈奴輕疾悍亟之兵也至如猋風去如收電畜牧為業弧弓射獵逐獸随草居䖏無常難得而制今使邊郡乆廢耕織以支胡之常事其勢不相權也臣故曰勿撃便恢曰不然臣聞鳳鳥乗扵風聖人因扵時昔秦繆公都雍地方三百里知時宜之變攻取西戎辟地千里并國十四隴西北地是也及後䝉恬為秦侵敵辟數千里以河為境累石為城樹榆為塞匈奴不敢飲馬扵河置㷭􅥂然後敢牧馬夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣若是則北發月氐可得而臣也臣故曰撃之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舎以待其勞故接兵覆衆伐國堕城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽彊弩之末力不能入魯縞夫盛之有衰猶朝之必暮也今将卷甲輕舉深入長敺難以為功從行則廹脅衡行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也意者有他繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿撃便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言撃之者固非發而深入也将順因單于之欲誘而致之邊吾選䲷騎壮士隂伏而䖏以為之備審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絶其後單于可禽百全必取上曰善乃從恢議宣帝元康中匈奴遣兵撃漢屯田車師者不能下上與後将軍趙充國等議欲因匈奴衰弱出兵撃其右地使不敢復擾西域魏相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加扵已不得已而起者謂之應兵兵應者勝争恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寳者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威扵敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輙奉歸之未有犯扵邊境雖争屯田車師不足致意中今聞諸将軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草菜之實常恐不能自存難以動兵軍旅之後必有凶年言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以謂此非小變也今左右不憂此左右謂近臣在天子左右者乃欲發兵報纎介之忿扵逺夷殆孔子所謂吾恐季孫之憂不在顓㬰而在蕭墻之内也願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可上從相言而止五鳯中匈奴大亂議者多曰匈奴為害日乆可因其壊亂舉兵滅之詔遣中朝大司馬車騎将軍韓増諸吏富平侯張延夀光祿勲楊惲太僕戴長樂問蕭望之計䇿望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐䘮以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟遣使請求和親海内欣然四逺莫不聞未終奉約不幸為賊臣所殺今而伐之是乗亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四逺聞之咸貴中國之仁義如遂䝉恩得復其位必稱臣服從此徳之盛也上從其議歴代名臣奏議卷二百二十六
