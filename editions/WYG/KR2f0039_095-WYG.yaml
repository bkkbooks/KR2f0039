body:
  text: 歴代名臣奏議卷九十五明楊士竒等撰經國宋孝宗時朱熹上奏曰臣竊觀今日之論國計者大槩有三曰戰曰守曰和而已然天下之事利必有害得必有失是以三者之中又各有兩端焉蓋戰誠進取之勢而亦有輕舉之失守固自治之術而亦有持久之難至於和之䇿則下矣而主其計者亦以為屈已愛民蓄力觀釁疑敵緩師未為失計多事以来此三說六端者是非相攻可否相奪於𡨕𡨕之中談者各飾其私而聽者不勝其眩雖以陛下之明蓋未能斷然無惑志於其間也臣竊以為此其所以然者由不折衷於義理之根本而馳騖於利害之末流故也故臣嘗竊妄謂人主之學當以明理為先是理既明則凡所當為而必為所不當為而必止者莫非循天之理而非有意必固我之私也臣請復指其實而明之蓋臣聞之天髙地下人位乎中天之道不出乎隂陽地之道不出乎柔剛是則舍仁與義亦無以立人之道矣然而仁莫大於父子義莫大於君臣是謂三綱之要五常之本人倫天理之至無所逃於天地之間其曰君父之讐不與共戴天者乃天之所覆地之所載凡有君臣父子之性者發於至痛不能自已之同情而非専出於一己之私也恭惟國家之與北人乃陵廟之深讐言之痛切有非臣子所忍聞者其不可與共戴天明矣太上皇帝念此讐之未報雖享天位不以為樂一旦舉而付之陛下者以陛下聰明智勇為必能成此志也然則今日所當為者非戰無以復讐非守無以制勝是皆天理之自然非人欲之私忿也陛下亦既有意於必為矣間者不知何人輒復倡為邪議以熒惑聖聽至遣朝臣持書以復敵帥而為講和之計臣竊恨陛下於所不當為者不能必止而重失此舉也且不知陛下不得已於議者之言而姑為此邪抑真欲和議之成而為此邪以為姑為此也則既為其始必慮其終我既請之彼必報之不可以茍為也且茍而為此欲以何求也哉無補於事徒害於理臣有以知陛下之不為也以為真欲和議之成也則議者所謂屈己愛民蓄力觀釁疑敵緩師未為失計者臣請有以議之夫人以藐然之身位乎天地之間至微也而能與天地並立而為三者以其有仁義之性而與夫隂陽之氣剛柔之體同出乎萬物之一原而無間也古之聖人所以參天地而贊化育者豈有他哉亦順此理而無所逆焉耳今釋怨而講和非屈己也乃逆理也己可屈也理可逆乎逆理之禍將使三綱淪九法斁子焉而不知有父臣焉而不知有君人心僻違而天地閉塞敵讎愈盛而邪慝愈繁是乃舉南北之民而棄之豈愛之之謂哉且不曰愛其君父而曰兼愛南北之民其於輕重之倫緩急之序亦可謂舛矣夫子為政以正名為先蓋名不正則言不順事不成而民無所措其手足今乃欲舍復讎之名而以講好為觀釁緩師之計蓋不惟使上下離心中外觧體緩急之間無以應敵而吾之君臣上下所為夙興夜寐以脩自治之政者亦將因循隳弛而不復振矣正使敵人異日果有可乗而不可失之釁竊恐吾之可憂乃甚於所可喜而信誓之重名分之素彼皆得以歸曲於我蓋不待兩兵相加而吾氣已索然矣且自宣和靖康以来講和之效亦可概見敵之情偽吾之得失蓋不待明者而後知而小人所以好為是說者蓋惟君子然後知義理之所必當為與義理之必可恃利害得失既無所入於其心而其學又足以應事物之變是以氣勇謀明無所懾憚不幸蹉跌死生以之小人之心一切反是其所以専為講和之說者特以便其私耳而謀國者過而聽焉豈不誤哉今使者將還大議將決此亦救過補敗之時也臣􅂅陛下姑置利害交至之說而以窮理為先於仁義之道三綱之本少加意焉體驗擴充以建人極深詔任事之臣亟罷講和之議大明黜陟以示天下使知復讎雪耻之本意未甞少衰雖使敵意效順無所邀索乃是深有包藏尤足疑畏正宜引義拒絶以伐其謀然後表裏江淮合戰守之計以為一使守固而有以戰戰勝而有以守竒正相生如環之無端持以嵗月以必復中原必勝敵人為期而後已雖其成敗利鈍不可逆睹而吾於君臣父子之間既已無憾則其賢於屈辱而茍存固已逺矣臣􅂅陛下以此處心以此立志則仁義之道明於上而忠孝之俗成於下人道既得天地之和氣自當忻合無間而敵雖強悍亦將不得久肆其毒則何事之不可成何功之不可立哉臣草茅微賤不識事宜獨以所學妄論大功惟陛下擇焉熹又奏曰臣聞益之戒舜曰儆戒無虞罔失法度罔遊於逸罔淫於樂任賢勿貳去邪勿疑而終之曰無怠無荒四夷来王周之文武亦以天保以上治内采薇以下治外始於憂勤終於逸樂其後中微小雅盡廢四夷交侵中國衰削宣王承之側身脩行任賢使能内脩政事外攘夷狄而周道粲然復興臣甞以是觀之然後知古先聖王所以制御中外之道其本不在乎威彊而在乎徳業其任不在乎邊境而在乎朝廷其具不在乎兵食而在乎紀綱蓋決然矣恭惟陛下躬履艱難之運而思所以成中興之功者既知當為與所當止之大端矣然而勍敵憑陵包藏不測中外之議咸謂國威未振邊備未飭帑廩未充士卒未練一旦緩急何以為計臣獨以為今日之憂非此之謂所可憂者乃大於此而恨議者未及之也臣竊觀今日諫諍之塗尚塞佞幸之勢方張爵賞易致而威罰不行民力已殫而國用未節以是四者觀之則徳業未可謂脩朝廷未可謂正紀綱未可謂立凡古先聖王所以彊本折衝威制中外之道皆未可謂備是則臣之所深憂也不識議者亦甞以是聞於陛下之聽否乎臣願陛下三復詩書之言以監所行之得失而求所以脩徳業正朝廷立紀綱者必以開納諫諍黜逺邪佞杜塞倖門安固邦本四者為急先之務治其本而毋治其末治其實而勿治其名庶幾人心厭服敵人知畏則形勢自彊而恢復可兾矣臣踈逺賤愚震慴天威未敢罄竭所聞以久稽聖聽而粗舉其端如此伏惟陛下留神裁察王質上言曰臣觀今日事勢訓兵理財先為富强以待天下有變敵國有釁則乗機從事於中原此今日恢復之定規也天下未有變吾能激之使變生敵國未有釁吾能撓之使釁作使就吾之機以行吾之志此今日規恢之竒謀也弋者取禽獵者取獸方其栖深林伏豐草待其偶然自堕於網羅而後取之非弋獵之妙也動之使飛而觸吾之羅擾之使逸而觸吾之網網羅在此若有所不可已而必陷其中此弋獵之妙也自岐亮殞亡葛褎篡立為葛褎者其守國蓋亦得䇿然豈可以其得䇿而遂絶念忘懐以為終不可圗也要當使其不得巳而必捨得䇿就失䇿彼雖明知而無可奈何必當出此臣所謂使彼就吾之機者英雄圗天下之妙訣也與陛下言恢復者衆矣亦有及此者乎正隆之末中原本不欲南向岐亮以勢刼之未至汴而軍已離未渡淮而盜已作未抵江而葛褎已叛中原大亂數年而後定此葛褎覆車之鑒也葛褎鑒岐亮之敗其勢不得不歸於和方陛下堅持不和之論為葛褎者亦罔知攸濟其初欲棄河南啗我以為和其臣力言岐亮之死軍勢甚危我不能襲而止陳蔡之陷汴洛大震我不能進而退隴右之失闗中欲傾我不能取而歸以此三者卜天意之不與我苦勸葛褎勿棄河南已而削臣禮損嵗幣欲就我以為和而陛下難於棄要害之地固執如初已而大臣異議並邊撤兵則乗間進師遂脇我以為和而陛下權宜從之葛褎謀和之序有三勢未安則欲啖我以為和勢稍立則就我以為和勢既振則脇我以為和於是僅乃得成自辛巳至甲申何其欲和之堅謀和之艱也葛褎之被衮服冕其初未敢僥倖久長也至是東南既和中原漸定而其國始可保矣葛褎初年金人已有亡證其能存立漸至康强者和之效也故葛褎欲保今日之和猶秦檜欲保前日之和也成之既艱保之必力茍失和則必用兵用兵則中原之人又復如前而岐亮之患亦將襲後此葛褎之所甚懼也夫中原之與金人其不相安久矣靖康建炎之際宇宙横潰生靈駭散莫知性命之所寄金人得以掃蕩而平吞之然而立偽齊而復廢還河南而復取徘徊展轉欲奄中原而未決欲棄中原而又惜之既見東南之僅欲自全而不能為害也中原之人又久困蹂踐無所歸依其勢已折而不支於是決混一之計大徙五國之衆雜居中原昭然以立法制不從令者蕩盡城邑誅及種族中原既不能以抗金人而又無所望於東南力盡勢窮而始定此尼雅滿烏珠之徒善觀天下之勢而疾徐操縱不失其節以是能成其强然號為相屬而實未甞相安尼雅滿烏珠之徒能變其外而不能變其中天意留此與我若將以待恢復者也岐亮好勝自任以為中原之人食我水土為我臣僕者數十年無有不從而不知中原之人非相服之真心特以風恬浪静難以施其鼉作鯨吞也風濤忽起足以鼓躍而簸掉則平時蓄憾之心至此得以逞矣岐亮之還師未甞為我所得而多為中原百姓所殱闗中隴右山東河南州縣之稍復未甞為我所下而皆為中原百姓所獻岐亮一動而中原之釁作為吾之利也如此為彼之害者如彼葛褎因岐亮之變覺中原之心故其謀欲静以安之中原安則其國安其國安則其身安臣知葛褎永不敢離燕地永不敢興南師何者其身所以得此位因前人之舉此事也我又為之則我身烏知其不為亮他人烏知其不效我也葛褎明見此理堅守此說故十年而中原無變葛褎之說終不移則中原之變終不作中原之變終不作則金人之勢終不傾不知我將坐待以至何時也近者誰為葛褎之謀寛誘中原之衆吾淮南遷徙之民稍復還歸或者以是為憂而臣益以窺見葛褎之心可以行吾之謀也蓋彼務為銷變而吾當激之使變生彼務為省釁而吾當撓之使釁作如人經病後務為調適安和惟慮病之復至則當勞動其精神耗散其氣血不當飬之使其安坐而少病陛下既了然見天下之勢則當斷然随勢而施謀倘移乗輿進幸建康則中原必讙傳親征彼不得不簽刷調發以為之備則木末之風漸起江心之浪随生中原之情固已洶洶而不靖岌岌而不寜將漸逞前日正隆之態岐亮以斷然不移之決持熾然不可向之威方其簽發固已不肯盡從觀葛褎之庸豈可以比岐亮之果銳人不肯盡從亮則不肯盡從褎也必矣不肯盡從則其間必有强黠好争踴躍思動者出而為抗此天下有變之端也間遣一使者復謀園陵其勢決不肯從不從則備我益急備我益急則中原益騷又間遣一使者求減嵗幣其勢亦決不肯從不從則備我愈盛備我愈盛則中原愈擾或者以為鷙鳥將擊而匿形茍欲圖人不當警使為備此未可與權也吾之警使為備者乃欲激之使變生而撓之使釁作彼不如此則無以動中原中原動則彼覆亡之萌而吾恢復之資如此一兩年之間可以漸致中原之閧坐成敵國之亂而吾厲兵秣馬揚欲進之聲而未動飛符走檄作欲往之勢而未行中原一擾則不能遽止寖久則寖多寖廣則寖熾彼方分力以支中原未暇全力以及東南也中原室内之患東南門外之憂彼將孰先則吾雖産其禍而未即受其敵其初隂攪之而未明犯之及其成敗之未決去住之未定分道整軍而前收中原之豪族以為吾爪牙據中原之沃壤以為吾囊索立契丹之主使率契丹之衆歸故部還主渤海諸戎之在中原者各随其主而返其故則女真亦不能獨立於中原今人徒見其外厖然以大而不知其中枵然以空女真之衆曽不當奚契丹渤海韎􅞘等諸國十之一五國之衆又不當河南山東河朔闗隴等諸道百之一措女真於五國之間固已甚微措五國於中原之内蓋益甚𦕈今吾與中原相合而為一則五國不得不散而去女真不得不迸而歸茍為不然則亦自相魚肉決不能相守不貳以與我並争於中原也諸戎與中原相錯世俗所謂猫䑕之相乳蜈蚣蛙蛇之同穴者也烏能久而相安五胡之亂劉氏為匈奴而胡滅之石氏為胡而冉閔滅之鮮卑又滅之慕容氏為鮮卑而氐滅之復興而晉又滅之苻氏為氐而羌滅之復興而羌又滅之姚氏為羌而晉滅之金人殘滅諸戎陵蹂中原假合而為一家凡今相處者非其不共戴天之讎則其不反兵之讎也故不獨中原與金人不相安而諸戎亦與金人不相安也金人常蓄土摧瓦觧之勢於其腹心而吾不思所以謀之亦可謂偷安茍活之計矣使偷而可安茍而可活如是而能久猶云可也太祖太宗相與議汴洛之都太宗以遷為難則決䇿居汴太祖嘆曰不及百年東南之力竭矣未五六十年而東南已以病告蓋重兵宿於京師而供給仰於東南京師之備愈滋則東南之力愈負重今以東南為國西自興梁東至呉越羅兵為守已過承平之大半而未止也不獨飬兵而所以為國之具其取諸東南者又倍重於承平之時今將五十年矣其力日削一日嵗朘一嵗蘇綽之在魏也以國用不足重為征稅之法既而嘆曰今所為正如張弓非平世法也後之君子誰能弛之東南立國之初一時張弓之法至今不弛而更急者多矣近世趙開為鹽酒之法以贍蜀師將死言曰若因循不恢復蜀將大困而我為禍首也此與蘓綽之意無異今張弓之法不弛而更加急恐非可以持久也大抵東南本非久立國之地民力盡則國從之漢自靈帝以後而南北分在南為孫氏晉自愍帝以後而南北分在南猶為司馬氏已而為劉氏為兩蕭氏為陳氏唐自昭宗以後而南北分在南為楊氏已而為李氏惟司馬氏有南最久名為百有二年而其間擁虚器徒有名號者嵗月居多亦可謂國非其國也故在今日不得不注意中原以紓東南迫切之勢以圖宗社堅長之䇿西晉凡五十二年武帝粗安者二十餘年而惠帝懐愍極亂者三十餘年至元帝中興而中原已無情於司馬氏矣何者相恩之日少相毒之日多也故晉人恢復為難然桓温至㶚上劉裕入長安中原猶有戀戀之情所謂長安十陵是公家墳墓咸陽宫殿是公家室宅舍此何之是時闗中相繼為苻姚割據將八十年與劉裕初漠然也而苦邀其留痛恨其返蓋慮北有拓跋西有赫連此華人真情終不安於他役也我自太祖造邦徳澤洽於中原者二百年今相離雖漸久而其情未泯也為我毁族為我毁身不可勝數而終不悔豈可使之帖然受制於人而無所泄其憤闊然相踈於我而無所效其情紹興隆興屢欲恢復而不就蓋謀國大臣握兵諸將之過而非中原之難下也中原難下當在它時日愈久則情愈衰情衰則相視如路人甚則相疾如仇讎此則中原難下之時也宣和取燕山契丹謂吾師曰南人只道燕雲是我故地不道屬我已二百餘年能無許久君臣之情今日但當死鬬故涿易二州之外其餘皆恝然也它時中原故應有此氣象有此氣象則難圖矣政使不與敵人相安則恐當有草萊豪傑起而收之今日雖有豪傑亦未能收何者人情未忘我也人情未忘我則知有我不知有它從我則能行捨我則不能立故豪傑睥睨而不敢輕發必待我而後可動雖使有赤眉王郎亦必託漢為名託漢為名則借漢為重是其權已在漢也權在漢則終當歸漢何者偽不敵真也今陛下握敵人興亡之權制豪傑從違之命而或者以為恢復甚難陛下過聽而未決則足未甞有以的然可指之形判然不可易之理而告陛下者也臣謂今日有事於中原以十分為率而計之六分用中原攻金人一分用諸戎攻金人三分用東南攻金人若十分盡仰東南此晉宋所以多無成也宋文帝謂佛貍曰河南舊是我地今當脩復不干河北不知中原已無情於司馬氏而安得有情於劉氏也故檀道濟王𤣥謨之力易窮佛貍之勢難遏蓋專取力於東南而無所借助於中原此元嘉所以再舉而再屈非今日事勢之比也今日事勢大畧與東漢相同西漢自髙祖以至平帝二百年而奪於王氏十五年光隂未逺風聲相聞故人情思漢為深光武起於中原其勢為便陛下興於東南其勢為不甚便然光武極其力堅其志而期於必成陛下容有所疑容有所憚者必有一擲之語孤注之言以動揺陛下之心而不知天下有全䇿如臣之謀也光武至不樂兵甞言每一發兵頭須為白闗東初平不堪兵間之積苦且欲置隗囂公孫述二子於度外然終不能自已者慮後患之難圖也況陛下守東南難久立之地對女真不並存之敵未易可以安枕髙卧置此敵於度外以隗季孟公孫子陽待之也夫天下之勢至此不變則不觧氣候煩蒸非疾雷迅雨則欝滯之氣不散清明之氣不回當是之時惟英主能與世為雷雨陛下真英主也可惜蹉跎玩時將老陛下齒髪迤邐遺患將殃陛下之子孫凡今所患兵之未精財之未裕陛下試令臣熟數於前然後知兵非難精財非難裕臣雖無似自度與陛下辦此而不難陛下誠能變風俗銷朋黨使淫辭詖行者舉不得作則出與陛下同心圖事協力濟功者將患其多不患其少臣雖不才誠自信與陛下辦此而不難臣非敢自謂能也陛下有英主之髙資一借筯可以轉移天下之安危一躡足可以鈐制英豪之死生故臣敢謂與陛下畫䇿與陛下任事足以取效而無難恃陛下之為英主也如臣區區可惜為斤斧之所傷殘風波之所覆溺生無所成死有遺恨實惟陛下圖之孝宗屢易相國論未定質為太學正上䟽曰陛下即位以来慨然起乗時有為之志而陳康伯葉義問汪澈在廷陛下皆不以為才於是先逐義問次逐澈獨徘徊康伯難於進退陛下意終鄙之遂決意用史浩而浩亦不稱陛下意於是決用張浚而浚又無成於是決用湯思退今思退専任國政又且數月臣度其終無益於陛下夫宰相之任一不稱則陛下之志一沮前日康伯持陛下以和和不成浚持陛下以戰戰不騐浚又持陛下以守守既困思退又持陛下以和陛下亦甞深察和戰守之事乎李牧在鴈門法主於守守乃有戰祖逖在河南法主於戰戰乃有和羊祜在襄陽法主於和和乃有守何至分而不使相合今陛下之心志未定規模未立或告陛下金弱且亡而吾兵甚振陛下即勃然有勒燕然之志或告陛下吾力不足恃而金人且来陛下即萎然有盟平涼之心或告陛下吾不可進金不可入陛下又蹇然有指鴻溝之意使臣為陛下謀會三者為一天下烏有不治哉質又奏曰臣甞論之夫人之為國利至不能不喜害至不能不懼惟其當利害之際喜而不示其喜之之形懼而不露其懼之之迹故其虚實不可得而窺而淺深不可得而測何者慮之素定故不揺飬之素厚故不驚彼其輕喜而驟懼者皆慮之不定飬之不厚故倉卒迫懼之中利得以怵而動害得以脅而遷嗟夫天下之變生於有間而可入善為國者深藏其喜懼之端補綻縫隙以自秘其肺腑使人操之而莫能抵其淵叩之而莫能揣其鑰窮搜曲覽而莫能得其要領當是之時雖有强隣悍敵亦且逡廵退縮而不敢措意於我臣觀自古謀人之國既先誘之以利又倡之以害夫誘之以利而倡之以害所以尋其間也或者不能開其尋之之路而閉其入之之門喜懼之情洋溢於内而表暴於外故墮其計而不知此何異搏人而授之以手足盜在門而自啓其鍵也其亦可謂大惑矣蓋昔者秦人欲以十五城而易趙璧趙人雖吝於子璧而喜於得城璧既入而城不割則倉皇攜璧以歸夫秦人以虎狼之心欲盡吞諸侯而宰天下其志豈在璧也而藉以試趙趙人信之則秦人固已得其肺腑矣是以暴驁陵刼至於加兵而不忌蓋知其無能為也楚子伐宋而宋不服令其師曰入築室反耕楚烏能築室反耕也哉何者越千里以伐人而强晉蠢蠢然又有欲動之勢形孤而心揺必不能久矣而華元不得其情震悼惴慄奔走求盟若不可以終日此其勢不得不折而歸楚是二國者其初未甞有致弱之形而不能自窒其間以至於顛沛而不可自立故臣甞以為善謀國者尋其間而善為國者窒其間近者傳北朝欲歸河南之地臣聞之士大夫以為朝廷至於動色相慶已而聞北朝欲遷汴京之都臣聞之士大夫以為朝廷錯愕而莫知所為夫河南之歸汴京之遷此不待智者而得其是非矣何者古之棄地有三或不能有而弃或無所得而弃或交相易而弃此三者今北朝皆無焉臣固知河南之不歸也然而此言之所以出者臣恐北朝之謀以利誘我而試其喜不喜也古之遷都有三或以兵火殘敝而遷或以隣敵窺伺而遷或以形勢迫隘而遷此三者今北朝皆無焉臣固知汴京之不遷也然而此言之所以出者臣恐北朝之謀以害喝我而試其懼不懼也此正當今窒間之時而喜懼之形烏可輕出哉臣讀東晉謝安傳而詳觀其處利害之際至於苻堅之宼而不為懼謝𤣥之勝而不為喜未甞不咨嗟嘆息以為後世君子之莫及而推原其故則蓋本於慮之素定而飬之素厚是以利不能誘害不能喝夫天下之事縁飾之則以文雅而鎮壓之則以器局就二者而輕重之寜不足於文雅而器局之君子天下國家不可一日無也質又奏曰臣嘗論之曰静而觀利害之變揣其輕重量其多寡而擇其害輕利重害寡利多者為之雖間有所拂於世俗則固當有所勿恤何者天下之利害紛紜反覆於㝠漠之中摶之而不可執其形尋之而不可究其端然輕重有定勢而多寡自有定量甚不難知也今夫以銖兩鈞石而視衡則銖不若兩兩不若鈞鈞不若石以龠合升斗斛而觀其量則龠不若合合不若升升不若斗斗不若斛善處利害者如衡之於銖兩鈞石量之於龠合升斗斛深明於毫忽之間曲辨於勺撮之際惟夫世之君子心不平而氣不定髙則為名所眩下則為利所怵是以輕重之定勢多寡之定量舉皇惑顛倒而莫知晁錯之削七國王深謀之挑李虜朱異之納侯景楊國忠之服安南昔以為利一而害百者利一而害百雖童子亦有所避而不為執天下之柄而不若童子之識亦可謂大拙矣臣嘗歎伏會昌宰相李徳裕之善處事以為非庸材常智所可及烏介可汗饑不能振退渾党項請以部落撃之因天徳軍使田牟以為言徳裕曰不可沙沱退渾不可恃也見利則進遇敵則走誰肯為用邪天徳兵素弱以一城與勁虜角必敗黠戞斯攻安西北庭武宗欲求其地徳裕曰不可安西距京師七千里北庭五千里異時河隴為我郡縣故能緩急調運河隴既入吐蕃則何所興發何道餽輓縱得無用嗟夫有誅虜之便而不進有得地之勢而不取此庸材常智之所謂失機者也而徳裕所以揣輕重者甚明而量多寡者甚精以為誅虜而生釁則不如勿誅得地而耗財則不如勿得故他人以為可徳裕以為不可而今之謀利害者不然近者括沙田籍銅器此其為利之士大夫沙田之數租以石計錢以緍計殆不過十數萬而江淮浙西之民咨嗟憤恨有甚不堪者舉天下之銅器而付之爐冶或者以為風餐土蝕之餘薪烹火化之後頗不利於鑄錢而生民器用一掃而空之此二者皆以毫髪之利而召天下之怨豈非謀利害者不揣輕重不量多寡之過歟臣聞天下之人誰能皆有以順適其意茍使吾事舉而有功功成而有利則雖朝謗夕誹固有不必問者今之所圖者百分之勞曽未有一分之獲而天下已紛紜議論而不可禁臣以為善計利害者不為也質又上固本論其一曰夫所謂重淮者何臣甞論之曰有三鎮然後能守河有兩淮然後能守江江之恃兩淮如河之恃三鎮皆所以藩籬其外而扄鐍於内自渡江以来强鄰悍敵相與隔樊墻而分爾汝葢無嵗而不有疆埸之警然建康未甞聆西北金革之聲而長江未甞染敵人戎馬之氣雖苻堅傾天下之鋒而盡銳於一擲卒阻於淝水而止宋文帝與佛狸相抗彼佛狸之師非脆敵矣衝蕩飄忽一旦而臨瓜歩遂與建康相望然逡廵退避若不可以終日故臣以為晉之所以能保江左者以兩淮有以當其前佛狸之所以不能越瓜歩者以兩淮有以邀其後國家渡江之初跡未著而心未安是故有兩淮而不能守和親之後誓已定而約已明是故有兩淮而不敢守然不能蔽淮終不可以蔽江今沿江之屯有四一軍駐鄂州一軍駐池州一軍駐建寜一軍駐鎮江平居無事形聨氣接可以當衝要而塞孔道一旦有急上下數千里聚之則不徧散之則不多故臣以為蔽江先於蔽淮非以為淮之果可蔽江也綴之於前而待之於後則守之也固而應之也閒葢軍旅之中一夫被重鎧一夫被單鎧被重鎧者一鎧洞則一鎧存而被單鎧者一鎧洞則肌膚切矣然而今日之計有蔽江之實而無蔽江之名有蔽江之實則我得利無蔽江之名則彼不驚此不可以不熟講也今兩浙九州郡之卒亡者不補而在者無幾是故有其籍而無其名所以供官吏衛府庫逓郵傳者舉不能備數如是則莫若舉給役之名而增州郡之卒小州五百人大州倍之今之兩淮地曠人稀而郡縣孤弱是以有冐禁通茶之商出沒乎其間發源於江西而波流於江北蓋甞震動郡縣力不能制如是則莫如以禦盜之名而增廵檢之土兵尉司之弓手小寨土兵二百人大寨倍之小縣之弓手百人大縣倍之一路有幾州一州有幾縣一縣有幾寨誠能皆勇銳悍敏之夫厲之以戈矛弓矢之法而示之以坐作進退之節誘之以賞懲之以罰不出五年則精兵可以所在而有此可謂我得其利而彼不驚者也陛下若以臣之言為然則密諭兩淮之計臣可以損其餽軍之數而留之以為飬土兵之資則兩淮不為無用而緩急可以綴敵長江不為無助而倉卒得以為備蓋天下之事不可使庸夫處之庸夫處之則安坐而待釁不可使褊夫處之褊夫處之則張皇而生變惟夫緩不為庸急不為褊然後能收𡨕𡨕之功是臣之䇿也其二曰夫所謂重蜀者何臣甞論之蜀之常勢非盜賊竊發蠻夷侵擾之為可憂而將帥專制之為可畏自古蜀之盜賊惟公孫述李雄崛起於閭閻草野之中猖狂僭竊以自正朔蓋適當大亂之世自李寳張忠之敗羅尚之死而朝廷不復有一戈一㦸入劍閣縱横飄忽聽其所往而莫之限故此二人者前無所忌後無所顧得以坐成割據之勢其餘如漢之馬相趙祗晉之譙縱本朝之王均李順皆不旋踵而撲滅唐自天寳以後蜀嵗被南詔之擾蓋甞一至成都而不能居又甞再犯而不能入然卒以奔敗而逺遁故臣以為盜賊竊發蠻夷侵擾皆不為蜀憂何者主客之勢然也今夫蜀地險阻而離隔其人柔忍而樸厚惟其地險阻而離隔故盜賊卒然起於其間而首尾肘腋不能以相應故其心揺蠻夷無故而深入則斷續先後不能以相入故其勢孤心揺者易散勢孤者難立可以為一時之擾而不可為久逺之患至於柔忍樸厚之人呼之則來招之則應有姦雄桀勇之夫而專制乎其上浸滛漸漬久而必至於為害故唐之崔寜韋臯皆積累嵗之久遂擁兵擅利以抗朝廷梁之王建後唐之孟知祥亦皆先恢拓其腹心而長飬其羽翼一旦反目而從容談笑坐得數千里之地小而為崔韋大而為王孟凡久而制蜀未有不然者此臣之所以為今日之慮也今之制蜀者其初始有一時之功栽培涵飬而遂有不可拔之勢兄弟之相承支黨之相聮吏之奉承其風㫖民之習熟其名字也蓋已久矣夫平居無事彼猶肯以虚名奉我我得以虚名役彼彼不幸有揺足之變則虚名有不可施而實禍將生蓋臣以為杜鴻漸擇其所畏假之以兵而布之列郡以扼其勢而制其姦重誨納涼師之兵於蜀之腹心以幸其有所憚而不敢動而不知夫圉虎豹於一閑跳踉奮嚙乃所以趣其鬬擬刃於人胷手足不疾應者未之有矣鴻漸之䇿是圉虎豹於一閑而重誨之䇿則擬刃於其胷也故二策之在今日皆有所不可行何者將以銷變而反以生變非朝廷之利也臣愚以謂鎮静而不驚寛緩而不迫久逺而有利者莫若厚恤二川之民於常賦之外時有所蠲除其征需於常傭之外時有所寛簡其力役間遣使者發徳音下明詔丁寜委曲為之訓辭而深恤其疾苦蓋朝廷之待巴蜀必有以大過於江淮閩浙湖廣之民而後有以大慰巴蜀之心使其常有不能忘朝廷之心則緩急之際斯有不忍負朝廷之意夫如是則將帥能有兵而不能有民有兵而不能有民則可以為患而不可為大患今兩川之民外資邉屯内供朝廷以臣度之蓋必有重困者縱而不收恐為專制者資耳袁說友上規恢三事奏曰臣仰惟陛下神功聖武超冠古昔深念列聖二百年之貽謨中原千萬人之思漢粤自踐祚力圖大勲臨朝慨嗟日軫宸慮將帥之能否上厪於主擇士卒之貧窶曲意以加惠繕治器甲修築城堡選練將士儲峙金穀雲屯之分布馬政之蕃息凡是數者陛下已經理而整齊之然臣猶有愚慮以獻陛下其說有三一曰毋露機二曰毋較禮三曰毋輕敵夫帝王之兵貴謀而賤戰智者之謀計定而機不發史臣論光武之復漢而歸之沈幾先物焉蓋機之不沈則事未及舉而迹已布見將物先於我而我烏能先物哉臣􅂅陛下以貴謀為先以沈機為智舉事貴乎漸使彼浸聞而不疑決䇿貴乎神使出其意而叵測戒飭邊吏防姦人之探刺申諭統帥毋生事以張皇凡吾求以勝敵者横斜曲直而彼莫知所終焉此臣所謂毋露機也自古復人之讐必以吾所不足愛而易其所可愛小利不較小屈不恤此其志未可量也越王報呉卑辭厚禮惟呉是徇蓋辭之卑禮之厚於吾固無損也而適足以滋其驕玩之習稔其怙惡之志而重吾國人憤懣不平之氣用是以報烏有弗濟者臣􅂅陛下毋憚言辭毋惜苛禮酬應之儀毋薄於疇昔使命之遣毋惜於稱臣將取故予而飬其貪侈之姦屈己下人而激吾國人之憤謀之如此而待之又如此豈不足以舉事哉此臣所謂毋較禮也夫以有餘者待人而以不敢自足者處已則無玩敵無輕舉將見可而進如破竹矣東漢之初匈奴飢役自相紛争臧宫馬武􅂅得五千騎以立功光武謂傳聞之事常多失實帝非謂其果無是事特欲益稔其惡静觀其變而徐起以取之耳故其後有空朔庭之舉天下之事亦豈在驟忽而亟圖哉臣􅂅陛下幸敵人年来衰亡已兆而愈先自治嘉中原年来思漢正切而益務綏懐常若彼有難圖之形而我未有必取之勢蓄銳飬晦堅意篤志待時而動奮然必為將何往而弗克者此臣所謂毋輕敵也夫是三者固豈區區然求目睫之勝哉飬吾之力以深藏其機安吾之民以姑盡其禮全吾之䇿以熟料其敵皆所以為不可測之計期必發而必中爾惟陛下鑒臣之說以觀今日之勢而不以為迂將不嵗月而復古興周明謨隆漢匹休周宣漢光於千載之上如臣等輩期與中原赤子共覩漢官威儀之盛豈不壯哉說友又上言曰臣甞觀漢髙祖最善慮事方天下未定自闗以西每先固守然後東征西伐得以取勝其自將擊陳豨也非蕭何守闗中則韓信之叛實累其後明年又自將擊布亦回視郤慮常使問蕭相國何為帝之意謂寜使吾之伐人者未克毋寜使吾之境有變焉蓋跋前㚄後以掣吾肘用兵之大忌也臣仰惟陛下神功聖武超冠古昔深念列聖二百年之貽謨中原千萬人之思漢粤自踐祚力圖大勲將率則上廑於主擇卒伍則捐金以加惠器甲城堡士馬金榖凡古人戰勝攻取之具陛下已經理而整齊之夫以天道好還之理祖宗在天之靈而鑒觀陛下復古之念如此固已啓佑大業而開疆拓土之盛復見於今日矣然臣猶有愚慮不識忌諱以獻陛下伏見年来江湖之盜時敢竊發比者廣西李接小宼亦敢為妖此固自投死地何足誅鋤而臣私憂過計以為當清明偃戈之朝區區疥癬随自殄滅固何足道然陛下方篤意復古勲在朝夕它日復㑹東都舉國大進於時江湖閩廣數路萬一有警必有㚄後掣肘之患此豈可以不預為之防也夫江西湖南盜賊固當深慮若閩廣三路尤不可忽蓋地土牽聮團簇又諸郡相望别無險隘譬之岡阜自成一區或有寇盜茍不即滅非若江西湖南路地形斷續隔别分散時有髙下險限之比若不先為之䇿異日必為後累臣輙以管見五說仰溷天聽其一曰乞行下閩廣三路提刑司專一措置諸州禁軍令守臣同本州兵官日務訓閱立為賞罰激厲能否並不得占用一名提刑每嵗循行㸃按不得因而搔擾月具見管禁兵姓名人數申奏其二曰閩廣諸郡城壁頽圮兵器朘削二廣尤甚乞行下三路運司借撥錢本同各州守臣措置日下修築城壁務令堅固打造器甲務為可用具已修打過城壁器甲數目申奏其三曰二廣郡守多係部闕凡以資序而得者率是癃老罷羸之人何以應猝乞命大臣更擇𦂳要州取㫖升作堂闕選材差授許除第二任知縣人内係極瘴去處厚立賞格三路守臣陛辭之日戒以訓兵愛民之事庶使材力有餘可以責任其四曰每遇三路謀帥擇憲必先威望智略足以彈壓鎮服者仍乞同各州守臣皆一一久任毋遽遷易如任滿日部内無竊發事並與遷秩召擢否則取㫖議罰以為懲勸其五曰竊惟聖化旁洽逺民興行年来二廣之士浸多秀頴宜命大臣搜揚薦召擇其一二以漸擢用誠足以收逺郡之心銷姦慝之習亦漢髙慰趙子弟之遺意也臣愚欲望睿斷首以閩廣為重頫鑒臣說以次施行庶幾陛下飬晦蓄銳奮然必為之日可以專意北向無復顧後之憂蓋天下之事惟周防厚慮者為不可敵也惟陛下謹之重之以全大計實宗社幸甚歴代名臣奏議卷九十五
