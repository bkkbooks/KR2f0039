body:
  text: 歴代名臣奏議巻十四明楊士竒等撰郊廟漢惠帝為東朝長樂宫及間往来間道也數蹕煩人乃作複道方築武庫南叔孫生奏事因請間曰陛下何自築複道髙寢衣冠月出㳺髙廟髙廟漢太祖奈何令後世子孫乗宗廟道上行哉月出髙帝衣冠備法駕名曰㳺衣冠三輔黄圖髙寢在髙廟西髙祖衣冠藏在髙寢月出㳺於髙廟其道值所作複道故言乗宗廟道上行孝惠帝大懼曰急壊之叔孫生曰人主無過舉今巳作百姓皆知之今壊此則示有過舉願陛下為原廟渭北衣冠月出逰之益廣多宗廟大孝之本也上迺詔有司立原廟原廟起以複道故孝恵帝曽春出㳺離宫叔孫生曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上乃許之諸果獻由此興景帝元年十月制詔御史盖聞古者祖有功宗有徳制禮樂各有由聞歌者所以發徳也舞者所以明功也髙祖酎正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎㑹諸侯廟中出金助祭所謂酎金也奏武徳文始五行之舞孝恵廟酎奏文始五行之舞孝文皇帝臨天下通闗梁不異逺方除誹謗去肉刑賞賜長老収恤孤獨以育羣生減嗜欲不受獻不私其利也罪人不孥不誅無罪除肉刑出美人重絶人之世朕既不敏不能識此皆上古之所不及而孝文皇帝親行之徳厚侔天地利澤施四海靡不獲福焉明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭徳之舞以明休徳然后祖宗之功徳著於竹帛施於萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具為禮儀奏丞相臣申屠嘉等言陛下永思孝道立昭徳之舞以明孝文皇帝之盛徳皆臣嘉等愚所不及臣謹議世功莫大於髙皇帝徳莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天下宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子嵗獻祖宗之廟請著之竹帛宣布天下制曰可孝武帝時天子郊雍議曰今上帝朕親郊而后土無祀則禮不答也有司與太史公祠官寛舒議天地牲角蠒栗今陛下親祠后土后土宜於澤中圎丘為五壇壇一黄犢太牢具已祠盡瘞而從祠衣上黄於是天子遂東始立后土祠汾隂脽丘如寛舒等議元帝永光四年詔議罷郡國廟丞相韋元成等曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之内各以其職来助祭尊親之大義五帝三王所共不易之道也詩云有来雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下士諸侯臣等愚以為宗廟在郡國宜無脩臣請勿復脩奏可後月餘復詔議立親廟又曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁毁廟之主蔵乎太祖五年而再殷祭言壹禘壹祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親疏之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業制禮作樂功德茂盛廟猶不世以行為謚而已禮廟在大門之内不敢逺親也臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後属盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故大司馬車騎将軍許嘉等一十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不孥不私其利出美人重絶人𩔖賔賜長老收恤孤獨德厚侔天地利澤施四海宜為帝者太宗之廟廷尉尹忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諫大夫尹更始等以為皇考廟上序於昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰髙皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮元帝時丞相韋𤣥成奏罷太上皇寢廟園博士平當上書言臣聞孔子曰如有王者必世而後仁三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承葉二百餘年孜孜不怠政令清矣然風俗未和隂陽未調災害數見意者大本有不立與何德化休徵不應之久也禍福不虛必有因而至者焉宜深迹其道而務修其本昔者帝堯南面而治先克眀俊德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天此聖人之德亡以加於孝也髙皇帝聖德受命有天下尊太上皇猶周文武之追王大王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮上納其言下詔復太上皇寢廟園成帝初即位丞相匡衡言甘泉泰畤紫壇八􅒀宣通象八方五帝壇周環其下又有羣神之壇以尚書禋六宗望山川徧羣神之義紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊紫壇饗帝之義埽地而祭上質也歌大吕舞雲門以祀天神歌大簇舞咸池以祀地祇其牲用犢其席槀稭其噐陶匏皆因天地之性貴誠上質不敢修其文也以為神祇功德至大雖修精㣲而備庶物猶不足以報功唯至誠為可故上質不飾以章天德紫壇偽飾女樂鸞路騂駒龍馬石壇之属宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之今雍鄜宻上下畤本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黒五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當常遵及北畤未定時所立不宜復修天子皆從焉及陳寳祠由是皆罷丞相匡衡御史大夫張譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即隂之象也天之於天子也因其所都而各享焉往者孝武皇帝居甘泉宫即於雲陽立泰畤祭於宫南今行常幸長安郊見皇天反北之泰隂祠后土反東之少陽事與古制殊又至雲陽行谿谷中阸陕且百里汾隂則渡大川有風波舟楫之危皆非聖主所宜數乗郡縣治道共張吏民困苦百官煩費勞所保之民行危險之地難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與羣臣議定奏可大司馬車騎将軍許嘉等八人以為所從来久逺宜如故右将軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴於大壇祭天也瘞薶於大折祭地也兆於南郊所以定天位也祭地於大折在北郊就隂位也郊處各在聖王所都之南北書曰越三日丁巳用牲於郊牛二周公加牲告徙新邑定郊禮於雒眀王聖主事天眀事地察天地眀察神眀章矣天地以王者為主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所饗宜徙就正陽太隂之處違俗復古循聖制定天位如禮便於是衡譚又奏議曰陛下聖德聰眀上通承天之大典覽羣下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從衆則合於天心故洪範曰三人占則從二人之言言少從多之義也論當徃古宜於萬民則依而從之違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著於經傳同於上世便於吏民八人不按經蓺考古制而以為不宜無法之議難以定吉凶太誓曰正稽古建功立事可以永年丕天之大御詩曰毋曰髙髙在上陟降厥士日監在茲言天之日監王者之處也又曰迺眷西頋此維予宅言天以文王之都為居也宜於長安定南北郊為萬世基天子從之哀帝即位丞相孔光大司空何武奏言永光五年制書髙皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗並列子孫雖欲褒大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷並侵玁狁最彊於今匈奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至于太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荆蠻来威故稱中興及至幽王犬戎来伐殺幽王取宗噐宗廟之噐也自是之後南夷與北夷交侵中國不絶如綫春秋紀齊桓南伐楚北伐山戎孔子曰㣲管仲吾其被髪左衽矣是故棄桓之過而録其功以為伯首及漢興冒頓始彊破東胡禽月氏氏讀曰支并其土地地廣兵彊為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無巳甚者興師十餘萬衆近屯京師及四邉嵗發屯備虜其為患久矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大将軍驃騎伏波樓船之属南滅百粤起七郡北攘匈奴降昆邪十萬之衆置五属國起朔方以奪其肥饒之地東伐朝鮮起𤣥菟樂浪以㫁匈奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌婼而􅃒反裂匈奴之右肩單于孤特逺遁於幕北四垂無事斥地逺境起十餘郡功業既定迺封丞相為富民侯以大安天下富實百姓其䂓模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋糓梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而𦵏此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑流謂流風餘福春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰髙宗周公為無逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶将特祀之况於先祖或説天子五廟無見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐邵伯所苃思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親䟽相推及至祖宗之序多少之數經傳無眀文至尊至重難以疑文虛説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰太僕舜中壘校尉歆議可平帝元始五年大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天王者尊其考欲以配天縁考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於眀堂以配上帝禮記天子祭天地及山川嵗徧春秋糓梁傳以十二月下辛卜正月上辛郊髙皇帝受命因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平初起渭陽五帝廟祭泰一地祇以太祖髙皇帝配日冬至祠泰一夏至祠地祇皆并祠五帝而共一牲上親郊拜後平伏誅迺不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不荅也於是元鼎四年十一月甲子始立后土祠於汾隂或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉二嵗一郊與雍更祠亦以髙祖配不嵗事天皆未應古制建始元年徙甘泉泰畤河東后土於長安南北郊永始元年三月以未有皇孫復甘泉河東祠綏和二年以卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠竟復無福臣謹與大師孔光長樂少府平晏大司農左咸中壘校尉劉歆大中大夫宋陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故後漢光武建武初大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同帝亦然之侍御史杜林獨以為周室之興祚由后稷漢業特起功不緣堯祖宗故事所宜因循定從林議武始侯張純以宗廟未定昭穆失序十九年乃與太僕朱浮共奏言陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元年以来宗廟奉祠髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事太宗則降其私親今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔髙帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以眀尊尊之敬親親之恩帝從之二十六年詔張純曰禘祫之祭不行巳久矣三年不為禮禮必壊三年不為樂樂必崩宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再殷漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟㑹始為禘祭又前十八年親幸長安亦行此禮禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也斯典之廢於茲八年謂可如禮施行以時定議帝從之自是禘祫遂定眀帝永平三年八月丁夘公卿奏議世祖廟登歌八佾舞功名東平王蒼議以為漢制舊典宗廟各奏其樂不皆相襲以眀功德秦為無道殘賊百姓髙皇帝受命誅暴元元各得其所萬國咸熈作武德之舞孝文皇帝躬行節儉除誹謗去肉刑澤施四海孝景皇帝制昭德之舞孝武皇帝功德茂盛威震海外開地置郡傳之無窮孝宣皇帝制盛德之舞光武皇帝受命中興撥亂反正武暢方外震服百蠻戎狄奉貢宇内治平登封告成修建三雍肅修典祀功德巍巍比隆前代以兵平亂武功盛大歌所以詠德舞所以象功世祖廟樂名宜曰大武之舞元命包曰縁天地之所雜樂為之文典文王之時民樂其興師征伐而詩人稱有武功樞機銓曰有帝漢出隠洽作樂各與虞韶禹夏湯濩周武無異不宜以名舞叶圖徵曰大樂必易詩傳曰頌言成也一章成篇宜列德故登歌清廟一章也漢書曰百官頌所登御者一章十四句依書文始五行武德昭真修之舞節損益前後之宜六十四節為舞曲副八佾之數十月烝祭始御用其文始五行之舞如故勿進武德舞歌詩曰於穆世廟肅雍顯清俊乂翼翼秉文之成越序上帝駿奔来寧建立三雍封禪泰山章眀圖䜟放唐之文休矣惟德罔射協同本支百世永保厥功詔書曰驃騎将軍議可進武德之舞如故章帝初即位東平王蒼上言昔者孝文廟樂曰昭德之舞孝武廟樂曰盛德之舞今皆祫食於髙廟昭德盛德之舞不進與髙廟同樂今孝眀皇帝主在世祖廟當同樂盛德之樂無所施如自立廟當作舞樂者不當與世祖廟盛德之舞同名即不改作舞樂當進武德之舞臣愚戇鄙陋廟堂之論誠非所當聞所宜言陛下體純德之妙奮至謙之意猥歸美於載列之臣故不敢隠蔽愚情披露腹心誠知愚鄙之言不可以仰四門賔于之議伏惟陛下以至德當成康之隆天下乂安刑措之時也百姓盛歌元首之德股肱貞良庶事寧康臣欽仰聖化嘉羡盛德危顛之備非所宜稱章帝時有司上奏曰孝眀皇帝聖德淳茂劬勞日昃身御浣衣食無兼珍澤臻四表逺人慕化僬僥儋耳欵塞自至克伐鬼方開道西域威靈廣被無思不服以烝庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六藝不舍晝夜聦眀淵塞著在圗䜟至德所感通於神眀功烈光於四海仁風行於千載而深執謙謙自稱不德無起寢廟掃地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣别室天下聞之莫不悽愴陛下至孝烝烝奉順聖德臣愚以為更衣在中門之外處所殊别宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣共進武德之舞如孝文皇帝祫祭髙廟故事制曰可梁太后臨朝以殤帝㓜崩廟次宜在順帝下太常大夫馬訪奏宜如詔書諫議大夫吕勃以為應依昭穆之序先殤帝後順帝詔下公卿大鴻臚周舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事于太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂吕勃議是也詔從之安帝元初六年司空李郃侍祠南郊不見六宗祠奏曰案尚書肆𩔖于上帝禋于六宗六宗者上不及天下不及地傍不及四方在六合之中助隂陽化成萬物漢初甘泉汾隂天地亦禋六宗孝成之時匡衡奏立南北郊祀復祠六宗及王莽謂六宗易六子也建武都雒陽制祀不道祭六宗由是廢不血食今宜復舊制度制曰下公卿議五官将行𢎞等三十一人議可祭大鴻臚龐雄等二十四人議不當祭上從郃議由是遂祭六宗獻帝時左中郎将蔡邕上議曰漢承亡秦滅學之後宗廟之制不用周禮毎帝即位世輒立一廟不止於七不列昭穆不定迭毁元皇帝時丞相匡衡御史大夫貢禹始建大議請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武歴稱世宗中正大臣夏侯勝等猶執異議不應為宗至孝成皇帝議猶不定太僕王舜中壘校尉劉歆據不可毁上從其議古人據正重順不敢私其君若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝眀皇帝聖德聦眀政叅文宣廟稱顯宗孝章皇帝至孝烝烝仁恩博大廟稱肅宗皆方前世得禮之宜自此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而巳臣下懦弱莫能執夏侯之直今聖朝尊古復禮以求厥中誠合禮議元帝世在第八光武世在第九故以元帝為考廟尊而奏之孝明遵述亦不敢毁孝和以下穆宗威宗之􅃅皆省去五年而再殷合食于太祖以遵先典議遂施行魏眀帝景初元年夏有司議定七廟冬又奏曰盖帝王之興既有受命之君又有聖妃協于神靈然後克昌厥世以成王業焉昔髙辛氏卜其四妃之子皆有天下而帝摯陶唐商周代興周人上推后稷以配皇天追述王初本之姜嫄特立宫廟世世享嘗周禮所謂奏夷則歌中吕舞大濩以享先妣者也詩人頌之曰厥初生民時維姜嫄言王化之本生民所由又曰閟宫有侐實實枚枚赫赫姜嫄其德不回詩禮所稱􅁎宗之盛其美如此大魏期運繼于有虞然崇𢎞帝道三世彌隆廟祧之數實與周同今武宣皇后文德皇后各配無窮之祚至於文昭皇后膺天靈符誕育眀聖功濟生民德盈宇宙開諸後嗣乃道化之所興也寢廟特祀亦姜嫄之閟宫也而未著不毁之制懼論功報德之義萬世或􅇅焉非所以昭孝示後世也文昭廟宜世世享祀奏樂與祖廟同永著不毁之典以播聖善之風於是與七廟議並勒金策藏之金匱晉懐帝永嘉元年追復武悼楊皇后尊號别立廟神主不配武帝至成帝咸康七年下詔使内外詳議衛将軍虞譚議曰世祖武皇帝光有四海元皇后應乾作配元后既崩悼后繼作至楊駿肆逆禍延大母孝懐皇帝追復􅃅謚豈不以鯀殛禹興義在不替者乎又太寧二年臣忝宗正帝譜泯棄罔所循按時博諮舊齒以定昭穆與故驃騎将軍華恒尚書荀崧侍中荀邃因舊譜參論撰次尊􅃅之重一無改替今聖上孝思祇肅禋祀詢及羣司将以恢定大禮臣輒思詳伏見惠皇帝起居注羣臣議奏列駿作逆謀危社稷引魯之文姜漢之吕后臣竊以文姜雖荘公之母實為父讎吕后寵樹私戚㡬危劉氏按此二事異於今日昔漢章帝竇后殺和帝之母和帝即位盡誅諸竇當時議者欲貶竇后及后之亡欲不禮葬和帝以奉事十年義不可違臣子之義務從豐厚仁眀之稱表於往代又見故尚書僕射裴頠議悼后故事稱繼母雖出追服無改是以孝懐皇帝尊崇􅃅謚還葬峻陵此則母子道全而廢事蕩革也于時祭於𢎞訓之宫未入太廟盖是事之未盡非義典也若以悼后復位為宜則應配食世祖若以復之為非則譜謚宜闕未有位􅃅居正而偏祠别室者也若以孝懐皇帝私隆母子之道特為立廟者此茍崇私情有虧國典則國譜帝諱皆宜除棄匪徒不得同祀於世祖之廟也㑹稽王昱中書監庾氷中書令何充尚書令諸葛恢尚書謝廣光禄勲留擢丹楊尹殷融護軍将軍馮懐散騎常侍鄧逸等咸從譚議由是太后配食武帝東晉元帝時有事於太廟尚書右丞鍾雅奏曰陛下繼承世數於京兆府君為𤣥孫而今祝文稱曽孫恐此因循之失宜見改正又禮祖之昆弟從祖父也景皇帝自以功德為世宗不以伯祖而登廟亦宜除伯祖之文詔曰禮事宗廟自曽孫以下皆稱曽孫此非因循之失也義取於重孫可歴世共其名無所改也稱伯祖不安如所奏眀帝時宗廟始建舊儀多􅇅或以惠懐二帝應各為世則潁川世數過七宜在迭毁事下太常賀循議以為禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝别立廟寝使臣下祭之此前代之眀典而承繼之著義也惠帝無後懐帝承統弟不後兄則懐帝自上繼世祖不繼惠帝當同殷之陽甲漢之成帝議者以聖德沖逺未便改舊諸如此禮通所未論是以惠帝尚在太廟而懐帝復入數則盈八盈八之理由恵帝不出非上祖宜遷也下世既升上世乃遷遷毁對代不得相通未有下升一世而上毁二世者也惠懐二帝俱繼世祖兄弟旁親同為一世而上毁二為一世今以惠帝之崩已毁豫章懐帝之入復毁潁川如此則一世再遷祖位横析求之古義未見此例惠帝宜出尚未輕論況可輕毁一祖而無義例乎潁川既無可毁之理則見神之數居然自八此盖有由而然非謂數之常也既有八神則不得不於七室之外權安一位也至尊於惠懐俱是兄弟自上後世祖不繼二帝則二帝之神行應别出不為廟中恒有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熈元年告世祖諡於太廟八室此是茍有八神不拘於七之舊例也又議者以景帝俱巳在廟則惠懐一例景帝盛德元功王基之本義著祖宗百世不毁故議以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應别廟也以今方之既輕重義異又七廟七世之親昭穆父子位也若當兄弟旁滿輒毁上祖則祖位空懸世數不足何足於三昭三穆與太祖之廟然後成七哉今七廟之義出於王氏從禰以上至於髙祖親廟四世髙祖以上復有五世六世無服之祖故為三昭三穆并太祖而七也故世祖郊定廟禮京兆潁川曽髙之親豫章五世征西六世以應此義今至尊繼統亦宜有五六世之祖豫章六世潁川五世俱不應毁今既云豫章先毁又當重毁潁川此為廟中之親惟從髙祖已下無復髙祖以上二世之祖於王氏之義三昭三穆廢􅇅其二甚非宗廟之本所據承代又違世祖祭征西豫章之意於一王定禮所􅇅不少武帝太元十二年郎中徐邈議圎丘郊祀繼典無二宣皇帝嘗辯斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安武皇帝建廟六世祖三昭三穆宣皇帝創基之主寔為太祖而親則王考四廟在上未及遷也權虛東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事七之義矣又禮曰庶子王亦禘祖立廟盖謂支𦙍授立則親迎必復京兆府君於今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定耳京兆遷毁宜藏主於石室雖禘祫猶弗及何者傳稱毁主升合乎太祖升者自下之名不謂可降尊就卑也太子太孫隂室四主儲嗣之重升祔皇祖所託之廟世逺應遷然後從食之孫與之俱毁眀堂方圎之制綱領已舉不􅇅配帝之祀且王者以天下為家未必一邦故周平光武無廢於二京也眀堂所祀之神積疑莫辯按易殷薦上帝以配祖考祖考同配則上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常祀同周四主故並言之若上帝是五帝經文何不言祀天旅五帝祀地旅四望乎侍中車𦙍議同又曰眀堂之制既其難詳且樂主於和禮主於敬故質文不同音噐亦殊既茅茨廣厦不一其度何必守其形範而不𢎞本從俗乎九服咸寧河朔無塵然後眀堂辟雍可崇而修之時朝議多同於是奏行所改安帝時太廟䲭尾災掌祠部臧燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毁落而猶列廟饗此其徵乎乃上議曰臣聞國之大事在祀與戎将營宫室宗廟為首古先哲王莫不致肅恭之誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神眀固宜詳廢興於古典循情禮以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之逺廟為祧有二祧享甞乃止去祧為壇去壇為墠有禱然後祭之此宗廟之次親疎之序也鄭𤣥以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣周之祖宗何云去祧為壇乎眀逺廟為祧者無服之祖也又逺廟則有享甞之禮去祧則有壇墠之殊眀世逺者其義彌踈也若祧是文武之廟宜同月祭於太祖雖推后稷以配天由功德之所始非尊崇之義毎有差降也又禮有以多貴者故傳稱德厚者流光德薄者流卑又云自上以下降殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及来孫而上祀之禮不過髙祖推隆恩於下流替誠敬於尊属亦非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖尚在子孫之位至於敬祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之㫖所與太祖而七自是昭穆既足太祖在六世之外非為須滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所謂毁廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其統而不絶也豈如四府君在太祖之前非繼統之主無靈命之瑞非王業之基昔以世近而及今則情禮巳逺而當長饗殷祫永虛太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以淵儒碩學咸謂四府君神主無緣永存於百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所秉小異而大歸是同若宣皇既居羣廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世遷豈可順而不㫁故臣子之情雖篤而靈厲之謚彌彰追逺之懐雖切而遷毁之禮為用豈不有心於加厚顧禮制不可踰爾石室則藏於廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也准傍事例宜同虞主之瘞埋然經典難詳羣言紛錯非臣卑淺所能折中時學者多從燾議竟未施行宋少帝即位初司空徐羨之尚書令傅亮等上䟽曰臣聞崇徳眀祀百王之令典憲章天人自昔之所同雖因革殊時質文異世所以本情篤教其揆一也伏惟髙祖武皇帝允協靈祇有命自天𢎞日静之勤立蒸民之極帝遷眀德光宅八表太和宣被𤣥化遐通陛下以聖哲嗣徽道孚萬國祭禮久廢思光鴻烈饗帝嚴親今實宜之髙祖武皇帝宜配天郊至於地祇之配雖禮無眀文先代舊章毎所因循魏晉故典足為前式謂武敬皇后宜配北郊盖述懐以追孝躋聖敬於無窮對越兩儀允洽幽顯者也眀年孟春有事於二郊請宣攝内外詳依舊典詔可文帝元嘉六年太學博士徐道娱上議曰伏見太廟烝嘗儀注皇帝行事畢出便坐三公已上獻太祝送神于門然後至尊還拜百官賛拜乃退謹尋清廟之道所以肅安神也禮曰廟者貌也神靈所馮依也事亡如存若常在也既不應有送神之文自陳豆薦爼車駕至止竝弗奉迎夫不迎而送送而後辭闇短之情實用未逹按時人私祠誠皆迎送由於無廟庶感降来格因心立意非王者之禮也儀禮雖太祝迎尸于門此乃延尸之儀豈是敬神之典恐於禮有疑謹以議上有司奏下禮官詳判博士江邃議在始不迎眀在廟也卒事而送莭孝思也若不送而辭是舎親也辭而後送是遣神也故孝子不忍違其親又不忍遣神是以祝史送神以成烝嘗之義博士賀道期議樂以迎来哀以送往祭統迎牲而不迎尸詩云鐘鼓送尸鄭云尸神象也與今儀注不迎而後送若合符契博士荀萬秋議古之事尸與今之事神其義一也周禮尸出送于廟門拜尸不顧詩云鐘鼓送尸則送神之義其来久矣記曰迎牲而不迎尸别嫌也尸在門外則疑於臣入廟中則全於君君在門外則疑於君入廟則全於臣是故不出者明君臣之義邃等三人謂舊儀為是唯博士陳珉同道娱議參詳䆳等議雖未盡然皆依擬經禮道娛珉所據難從今衆議不一宜遵舊體詔可孝武帝孝建元年六月癸巳八座奏劉義宣臧質于時犯滔天作戾連結淮岱謀危宗社質反之始戒嚴之日二郊廟社皆已遍陳其義宣為逆未經同告輿駕将發醜徒氷消質既梟懸義宣禽獲二㓂俱殄並宜昭告檢元嘉三年討謝晦之始普告二郊太廟賊既平蕩唯告太廟太社不告二郊禮官博議太學博士徐宏孫勃陸澄議禮無不報始既遍告今賊巳禽不應不同國子助教蘇瑺生議按王制天子巡狩歸假于祖禰又曽子問諸侯適天子告于祖奠于禰命祝史告于社稷宗廟山川告用牲幣反亦如之諸侯相見反必告于祖禰乃使祝史告至于前所告者又云天子諸侯将出必以牲帛皮圭告于祖禰反必告尋天子諸侯雖事有大小其禮略均告出告至理不得殊鄭云出入禮同其義甚眀天子出征𩔖于上帝推其所告者歸必告至則宜告郊不復容疑元嘉三年唯告廟社未詳其義或當以禮記唯云歸假祖禰而無告郊之辭果立此義彌所未逹夫禮記殘缺之書本無備體折簡敗字多所缺略正應推例求意不可動必徵文天子反行告社亦無成記何故告郊獨當致嫌但出入必告盖孝敬之心既以告歸為義本非獻㨗之禮今輿駕竟未出宫無容有告至之文若陳告不行之禮則為未有前准愚謂祝史致辭以昭誠信茍其義舛于禮自可從實而􅇅臣等參議以應告為允宜並用牲告南北二郊太廟太社依舊公卿行事詔可二年正月庚寅有司奏今月十五日南郊尋舊儀廟祠至尊親奉以太尉亞獻又廟祠行事之始以酒灌地送神則不灌而郊初灌同之於廟送神又灌議儀不同於事有疑輒下禮官詳正太學博士王祀之議按周禮大宗伯佐王保國以吉禮事鬼神祇禋祀昊天則今太常是也以郊天太常亞獻又周禮外宗云王后不與則贊宗伯鄭元云后不與祭宗伯攝其事又説云君執圭瓉祼尸大宗伯執璋瓉亞獻中代以来后不廟祭則應依禮大宗伯攝亞獻也而今以太尉亞獻鄭注禮月令云三王右司馬無太尉太尉秦官也盖世代彌乆宗廟崇敬攝后事重故以上公亞獻又議履時之思情深於霜露室户之感有懐於容聲不知神之所在求之不以一處鄭注儀禮有司云天子諸侯祭於祊而繹繹又祭也今廟祠􅇅送神之祼将移祭於祊繹眀在於㽞神未得而殺禮郊廟祭殊故灌送有異太常丞朱膺之議按周禮大宗伯使掌典禮以事神為上職總祭祀而昊天為首今太常即宗伯也又尋袁山松漢百官志云郊祀之事太尉掌亞獻光禄掌三獻太常毎祭祀先奏其禮儀及行事掌贊天子無掌獻事如儀志漢亞獻之事專由上可不由秩宗貴官也今宗廟太尉亞獻光禄三獻則漢儀也又賀循制太尉由東南道升壇明此官必預祭古禮雖由宗伯然世有因革上司亞獻漢儀所行愚謂郊祀禮重宜同宗廟且太常既掌賛天子事不容兼又尋灌事禮記曰祭求諸隂陽之義也殷人先求諸陽樂三闋然後迎牲則殷人後灌也周人先求諸隂灌用鬯逹於淵泉既灌然後迎牲則周人先灌也此謂廟祭非謂郊祠案周禮天官凡祭祀賛王祼将之事鄭注云祼者灌也唯人道宗廟有灌天地大神至尊不灌而郊未始有灌於禮未詳淵儒注義炳然眀審謂今之有灌相承為失則宜無灌通闗八座丞郎博士並同膺之議尚書令建平王宏重參謂膺之議為允詔可大明二年二月庚寅有司奏皇代殷祭無事於章后廟髙堂隆議魏文思后依周姜嫄廟禘祫及徐邈答晉宣太后殷薦舊事使禮官議正博士孫武議按禮記祭法置都立邑設廟祧壇墠而祭之乃為親䟽多少之數是故王立七廟逺廟為祧鄭云天子遷廟之主昭穆合藏於祧中祫乃祭之王制曰祫禘鄭云祫合也合先君之主於祖廟而祭之謂之祫三年而夏禘五年而秋祫謂之五年再殷祭又禘大祭也春秋文公二年大事于太廟傳曰毁廟之主陳于太祖未毁廟之主皆升合食太廟傳曰合族以食序以昭穆祭統曰有事于太廟則羣昭羣穆咸在不失其倫今殷祠是合食太祖而序昭穆章太后既屈於上不列正廟若迎主入太廟既不敢配列於正序又未聞於昭穆之外别立為位若徐邈議今殷祠就别廟奉薦則乖禘祫大祭合食序昭穆之義邈云隂室四殤不同祫就祭此亦其義也喪服小記殤與無後從祖祔食祭法王不祭殤鄭𤣥云祭適殤於廟之奥謂之隂厭既從祖食於廟奥是殤有位於奥非就祭别宫之謂今章太后廟四時饗薦雖不於孫止若太廟禘祫獨祭别宫與四時烝甞不異則非禘大祭之義又無取於祫合食之文謂不宜與太廟同殷祭之禮髙堂隆答魏文思后依姜嫄廟禘祫又不辨祫之義而改祫大饗盖有由而然耳守文淺學懼乖禮𠂻博士王爕之議按禘小祫大禮無正文求之情例如有推尋祫之為名雖在合食而祭典之重於此為大夫以孝饗親尊愛同極因殷薦太祖亦致盛祀於小廟譬有事于尊者可以及卑故髙堂隆所謂獨以祫故而祭之也是以魏之文思晉之宣后雖並不序於太廟而猶均禘於姜嫄其意如此又徐邈所引四殤不祫就而祭之以為别饗之例斯其證矣愚謂章皇太后廟亦宜殷薦太常丞孫緬議以為祫祭之名義在合食守經據古孫武為詳竊尋小廟之禮肇自近魏晉之所行足為前準髙堂隆以祫而祭有附情敬徐邈引就祭四殤以證别饗孫武據殤祔於祖謂廟有殤位尋事雖同廟而祭非合食且七廟同宫始自後漢禮之祭殤各祔厥祖既豫祫則必異廟而祭愚謂章廟殷薦推此可知祠部朱膺之議閟宫之祀髙堂隆趙怡竝云周人祫嵗俱祫祭之魏晉二代取則奉薦名儒逹禮無相譏非不諐不忘率由舊章愚意同王爕之孫緬議詔曰章皇太后追尊極號禮同七廟豈容獨􅇅殷薦隔茲盛祠閟宫遥祫既行有周魏晉從饗式範無替宜述附前典以宣情敬五年四月庚子詔曰昔文徳在周明堂崇祀髙烈惟漢汶邑斯尊所以職祭罔諐氣令斯正鴻名稱首濟世飛聲朕皇考太祖文皇帝功耀洞元聖靈昭俗内穆四門仁濟羣品外薄八荒威憺殊俗南腦勁越西髓剛戎裁禮興稼穡之根張樂協四氣之紀匡飾墳序引無題之外旌延寳臣盡盛德之範訓深劭農政髙刑厝萬物棣通百神薦祉動協天度下沿地徳故精緯上靈動殖下瑞諸侯軌道河清海夷朕仰憑洪烈入子萬姓皇天降祐迄将一紀思奉揚休徳永播無窮便可祥考姬典經始眀堂宗祀先靈式配上帝誠敬克展幽顯咸秩惟懐永逺感慕崩心有司奏伏尋眀堂辟雍制無定文經記參差傳説乖舛名儒通哲各事所見或以為名異實同或以為名實皆異自漢暨晉莫之能辨周書云清廟明堂路寝同制鄭𤣥注禮義生於斯諸儒又云眀堂在國之陽丙巳之地三里之内至於室宇堂个戸牖逹向世代湮緬難得該詳晉侍中裴頠西都碩學詳考前載未能制之以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴紀其餘雜碎一皆除之參詳鄭𤣥之注差有準據裴頠之奏竊謂可安國學之南地實爽塏平暢足以營建其墻宇規範宜擬則太廟唯十有二間以應朞數依漢汶上圗儀設五帝位太祖文皇帝對饗祭皇天上帝雖為差降至於三載恭祀理不容異自郊徂宫亦宜共日禮記郊以特牲詩稱明堂羊牛吉蠲雖同質文殊典且郊有燔柴堂無禋燎則鼎爼彛簋一依廟禮班行百司搜材簡工權置起部尚書将作大匠量物商程剋今秋繕立乃依頠議但作大殿屋雕畫而巳無古三十六戸七十二牖之制九月甲子有司奏南郊祭用三牛廟四時祠六室用二牛眀堂肇建祠五帝太祖文皇帝配未詳祭用㡬牛太學博士司馬興之議案鄭𤣥注禮記大傳稱孝經郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝配五帝也夫五帝司方位殊功一牲牢之用理無差降太祖文皇帝躬成天地則道兼覆載左右羣生則化洽四氣祖宗之稱不足彰無窮之美金石之音未能播勲烈之盛故眀堂聿修聖心所以昭𤣥極汎配宗廟先儒所以得禮情愚管所見謂宜用六牛博士虞龢議祀帝之名推五而所生之實常一五徳之帝迭有休王各有所司故有五室宗祀所主要隨其王而饗焉主一配一合用二牛祠部郎顔奐議祀之為義並五帝以為言帝雖云五牲牢之用謂不應過郊祭廟祀宜用二牛南齊髙帝建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不眀堂亦應與郊同年而祭不若應祭者復有配與無配不祀者堂殿職僚毁置云何八座丞郎通闗博士議曹郎中裴昭眀儀曹郎中孔逿議今年七月宜殷祠来年正月宜南郊明堂並祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜殷廢祀其殷祠同用今年十月右僕射王儉議案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徵曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因縁堯宜以髙帝配天魏髙堂隆議以舜配天蒋濟云漢時奏議謂堯巳禪舜不得為漢祖舜亦巳禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契並云明堂有五室天子毎月於其室聼朔布教祭五帝之神配以有功徳之君大戴禮記曰明堂者所以眀諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭𤣥云周人眀堂五室帝一室也初不聞有文王之寝鄭志趙商問云説者謂天子廟制如眀堂是為眀堂即文廟邪鄭答曰眀堂主祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宫本祭天帝而以文王配配其父於天位則可牽天帝而就人鬼則非義也泰元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位眀堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立眀堂于時亦未有郊配漢又祀汾隂五畤即是五帝之祭亦未有郊配議者或謂南郊之日巳旅上帝若又以無配而特祀眀堂則一日再祭於義為黷案古者郊本不共日蔡邕獨㫁曰祠南郊祀畢次北郊又次眀堂髙廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合嵗功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔晁云言五帝佐天化育故有從祀之禮旅上帝是也至於四郊眀堂則是本祀之所譬猶功臣從饗豈復廢其私廟且眀堂有配之時南郊亦旅上帝此則不疑於共日今何故致嫌於同辰又禮記天子祭天地四方山川五祀嵗徧尚書堯典咸秩無文詩云昭事上帝聿懐多福據此諸義則四方山川猶必享祀五帝大神義不可略魏文帝黄初二年正月郊天地眀堂明帝太和元年正月以武皇帝配天文皇帝配上帝然則黃初中南郊眀堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新絜也鄭𤣥云用辛日者為人當齋戒自新絜也漢魏以来􅂉丁􅂉巳而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通云三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創歴郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷来年正月上辛有事南郊宜以共日還祭眀堂又用次辛饗祀北郊而並無配犧牲之色率由舊章詔可眀堂可更詳有司又奏眀堂尋禮無眀文唯以孝經為正竊尋設祀之意盖為文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應􅇅祀徐邈近代碩儒毎所折衷其云郊為天壇則堂非文廟此實眀據内外百司立議巳定如更詢訪終無異説傍儒依史竭其管見既聖㫖惟疑羣下所未敢詳廢置之宜仰由天鑒詔依舊四年世祖即位其秋有司奏尋前代嗣位或於前郊年或别始晉宋以来未有畫一今年正月巳郊未審眀年應南北二郊祀眀堂與不依舊通闗八座丞郎博士議尚書令王儉議案奏為諸侯雜祀諸畤始皇并天下未有定祠漢髙受命因雍四畤而起北畤始祠五帝未定郊丘文帝六年新垣平議初起渭陽五帝廟武帝初至雍郊見五畤後常三嵗一郊祠雍元鼎四年始立后土祠於汾隂眀年立太一祠於甘泉自是以後二嵗一郊與雍更祠成帝初即位丞相匡衡於長安定南北郊哀平之際又復甘泉汾隂祠平帝元始五年王莽奏依匡衡議還復長安南北二郊光武建武二年定郊祀兆於洛陽魏晉因循率由漢典雖時或參差而𩔖多間嵗至於嗣位之君參差不一宜有定制檢晉眀帝太寧五年南郊其年九月崩成帝即位眀年改元即郊簡文咸安二年南郊其年七月崩孝武即位眀年改元亦郊宋元嘉三十年正月南郊其年二月崩孝武嗣位眀年改元亦郊此則二代眀例差可依放謂眀年正月宜饗祀二郊䖍祭眀堂自茲厥後依舊間嵗尚書領國子祭酒張緒等十七人並同儉議詔可厯代名臣奏議巻十四
