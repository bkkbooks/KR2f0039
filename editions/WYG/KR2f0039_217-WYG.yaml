body:
  text: 歴代名臣奏議卷二百十七明楊士竒等撰慎刑宋徽宗政和中刑部尚書慕容彦逢上奏曰伏覩皇帝陛下矜憫庶獄制為病囚檢察之法以謂愚民犯法雖繫留訊治邦有常憲於其疾也飲食醫藥視之猶赤子也臣等尚慮當職官吏不能深體徳意欲望聖慈令諸路提㸃刑獄司歲終㑹州縣病囚損失分數除依條科罪外取一路最多最少各一處保明以聞特降詔㫖賞罰庶幾知所勸沮以副陛下好生之徳彦逢又上奏曰恭惟皇帝陛下躬建皇極心澄化源徳駿業隆超冠古昔甚盛之舉不可一二數皆彰明較著垂休無窮上帝博臨珍祥紹至方將坐陽館而頒治登介丘以告成時和歲豐家給人足薄海内外歡欣交通如在一堂之上宜其民罔犯法而秋官以廷無留讞稱慶於朝矧天寜密邇蒐講盛儀百辟奉觴異邦欵塞於焉刑措孰不歸仁臣等備數典司獲與擊壤之民上祝億萬歲無疆之夀不勝歡欣鼔舞之至徽宗時中㫖鞫享澤村民謀逆知開封府范純禮審其故上言曰此民入戲塲觀優歸途見匠者作桶取而戴於首曰與劉先主如何遂為匠所擒徽宗問何以處之對曰愚人村野無所知若以叛逆蔽罪恐辜好生之徳以不應為杖之足矣曰何以戒後人曰正欲外間知陛下刑憲不濫足以為訓爾徽宗從之陳瓘進故事曰昔審刑院斷絶公案仁宗喜曰天下至廣而斷刑若此有以知刑訟之至簡有司無稽遲也乃下詔奨法官而付其事於史官臣竊見元豐中開封府獄空神考大喜擢知開封府王安禮為尚書右丞下至胥吏悉獲賚賞自是而後内外有司皆以獄空為悦蓋仁祖以訟簡賞法官而神考以獄空擢府尹所以示仁民之意一也老子曰民常不畏死奈何以死懼之若使民常畏死而為竒者吾得執而殺之孰敢謂祖宗不以刑威懼民蓋有得於老子云瓘又言改正訴理事乞正㸔詳官蹇序辰安惇典刑奏狀曰臣聞周公作立政戒成王曰其勿誤於庶獄庶慎蓋雖成周之盛時亦以誤獄為戒神考熙寜詔曰獄訟非其情歟蓋恐天下治獄之吏有飾辭鍜錬之失也夫周公之於庶獄戒其有誤神考之於獄訟慮失其情先聖後聖豈異意哉臣伏見元符三年六月十八日勅㸔詳訴理所改正過元祐訴理之人依元符元年六月二十五日指揮外其後來接續奏降指揮更不施行其已施行者並依今來指揮除言語不順别作一項外䝉改正者七百餘人其所洗滌可謂衆矣無罪者既䝉洗滌則㸔詳之官如蹇序辰安惇者安可以不加罪乎謹按惇奏曰凡得罪於元豐之間者若特出睿斷以勸沮天下則人臣不當輙為理雪或經有司勘斷必是情法相當上下方敢施行未審當時有司如何理雪臣竊謂鞫獄斷罪而使情法相當若非臯陶作士不能如是周公之戒其有誤神考之慮其非情者正恐情法不能相當故也今曰有司勘斷必是情法相當如此則是元豐之時九州内外為有司者皆臯陶也其為諂誑不亦甚乎且元符有司即元豐有司也去年鄒浩之獄在京及新州所連逮者凡數百人按法定罪則浩為厚誣君父其黨為同惡相濟若言其情則浩為盡忠於朝其黨為厚於親戚朋友其情如此而用法如彼可以謂之相當乎安惇官為執法職在獻替尚且率其僚屬共為誣陷而乃謂元豐有司所勘斷者能使人人情法相當此可以欺天下乎又如司馬光宣訓之語究治劉摯等事或縁凶悖之意或以姦逆之謀按法定罪則㡬至赤族若論其情則盡出誣罔然則元符大臣致人以罪情法相違尚乃如此而謂元豐有司能使情法相當孰敢以為然乎如曰出於睿斷以示勸沮臣下不當輙為理雪以理觀之亦未然也臣請以近事明之熙寜元豐舊例開封府公事㦯情輕法重㦯情重法輕則貼例取㫖㦯封入請寳臨時輕重皆出睿斷自元祐以來知開封府臣僚請改舊法不復貼例喜怒任情高下其手請寳得㫖之事雖經睿斷而故失出入實由開封如此之𩔖若復申明改正又何累聖人之勸沮乎又有司所勘公事依例差官録問有國以来未之改也自紹聖四年正月以後開封府所勘公事一面畫㫖直行奏斷更不録問銜寃之人㦯有枉横既無覆審何由自達雖縁本府取㫖事經睿斷而請不録問者實由有司如此之𩔖若復申明改正又何累聖人之勸沮乎先帝知其然也於是改此二法請寳公事依舊貼例而直行奏斷者依舊錄問自此而後開封不敢越例而有請罪人得因審覆而自訴方此二法未改之時開封公事勘斷有失孰敢以為睿斷之誤乎盖人主變通之道無所膠執事有未便改之而已昔雖未改今亦當改此乃今昔相承之道前作後述之理是以復行審問再行貼例則是哲宗之所自改也召還鄒浩叙復光摯則是先朝之所欲改而今日之所當述也善繼祖宗之緒共述一家之美亦何先後彼此之間乎以今視昔則元豐應世之事㦯因㦯改皆聖人之迹耳迹不可泥何獨有司勘斷之事而必欲保其無誤㢤為此說者不過欲讃譽元豐而自以為盡忠扵神考耳神考盛徳大業髙厚如天地光明如日月非凡愚譏讃所能加損況其所讃譽者元豐有司而已豈不陋㢤𫝊曰善繼人之志善述人之事武王之孝也不改父之臣與父之政孟莊子之孝也若以孟莊子為法則是元豐之事皆不可改非特訴理而已若以武王善述為心而不泥聖人已陳之迹則改正看詳訴理之事可謂合扵公議矣蹇序辰安惇受大臣諷諭意有所在因謂訴理之事形迹先朝必須如此施行方名繼述之義遂使朝廷紛紛之事不已考之公議合正典刑伏望聖慈特示威斷髙宗時張浚上議刑罰狀曰臣竊見前此為帥者皆謂嚴刑重罰可以整治軍旅不察其情不原其心故刑不當罪多怨怒而深恨之者方平居無事時雖上下相制不敢犯分然而人心已離矣一旦有警誰與效命不測之變殆将由是而生焉庸将鮮知此理嗚呼人心不可輕失豈特為将者然㢤為人上者儻不思所以正心脩身事毎謹微一失其心不可追悔也周林奏推司不得與法司議事劄子曰虞舜恤刑文王慎獄陛下用舜文之心賜哀矜之治遣平反之使議殿最之法可謂至矣然而州郡之間刑獄之地尚有循習舊態因仍故事為民大害未能仰稱天地寛厚之徳臣竊惜之獄司推鞫法司檢斷各有司存所以防姦也然而推鞫之吏獄案未成先與法吏議其曲折若非欵状顯然如法吏之意則謂難以出手故於結案之時不無髙下遷就非本情去處臣願嚴立法禁推司公事未曾結案之前不得輙與法司商議重立賞格許人首告臣又見獄吏慘刻動以縲紲捶楚為能常在圜扉毒猶不廣至扵使之預追呼之事則虎而翼矣出入閭里既無忌憚罪無輕重理無曲直例遭侵鑠毎見獄卒追呼必持繩索挾鏁械攜杖箠以示威力用求賄賂且以一夫犯刑干證之人多㦯數十少㦯三四一概被毒無得免者又以入獄之後捶楚為戒無敢告訴故其追呼擾民之患尤非其他走吏之比臣欲令州郡追呼赴獄之人在州則付廂界在縣則委令佐遣詣郡治然後付之獄司庶㡬獄吏不能為惡扵囹圄之外上廣陛下愛惜黎元之意如臣言可採即乞付有司立法施行林又奏疑獄劄子曰書載帝舜之徳曰罪疑惟輕功疑惟重與其殺不辜寧失不經而國家勅令亦以失入之罪為重扵失出先聖後聖用心仁恕其實一也竊見諸路疑獄不應奏而奏者未免科罪之大理寺既厭案牘之多而州郡復慮刑名之累所以不應奏而奏之律至今未除雖有疑似之獄輕重遷就徃徃臨時決遣無繇得被仁聖之澤其可憫之情可疑之罪不從輕貸甚非好生之徳臣􅂅陛下推廣寛恩刪除舊律不應奏而奏者並不科罪使廷尉之官不以簡牘之繁為勞州郡之吏不以請讞之責為慮天地大徳洽扵民心豈勝幸甚刑部郎中鄭剛中奏看定引例劄子曰本部契勘刑部令諸奏獄以格擬上格不該者取裁注謂情法不相當而無格及雖有格而輕重不可比者以此見本部職在檢例擬斷但縁自来獄案雖先付大理寺法官斷定刑名有無可憫次到刑部審詳擬例然罪人情犯亦有與斷例無一般親的者并所斷過刑名亦未必皆是情法相當灼然詳允之例久来拘扵引例必欲牽强相合故增損出入不無差失今欲依臣僚奏請大辟罪人如情理别無可憫自合依法斷上其無情犯一般的例㦯情犯雖同而當来所斷刑名自有差失者更不泛引外有法寺雖不引可憫而情理不至巨蠹者亦乞從本部貼說上朝廷參酌寛貸庶㡬殺人者死過誤者生上副朝廷詳審之意剛中為殿中侍御史又上奏曰臣甞觀古人稱斷獄無寃者謂不使有罪者誤陷扵死爾非謂扵法當死縱之使生而謂之無寃也廷尉天下之平謂死生各得其平爾不應偏倚一隅故釋有罪而可謂之平也聖人謂赦宥之澤如春風時雨出扵造化者固吾所獨至扵付在有司者惟當詳明謹恕一歸諸平而已彼不知此者遂謂解弛禁綱隳􅆸國憲取有罪當死者一切付之生全乃為平反曾不知已死者有恨則固可疹隂陽而干和氣也邇者州郡疑獄𩔖以情理可憫来上夫可憫之情謂被殺者無道殺之者有理聽其獄方惻然可憐乃欲寘之於法故有司列事狀以聞豈有閱案察情無一可念而猥謂情理有疑乎逺近相觀彼此視効獄吏知之教訟者知之犯法者知之具欵自言未甞不以遭罵為解一涉扵此咸脫其罪詈人者死殺人者生世無復讎之法而孝子慈孫日抱戴天之恨豈不重可憐㢤而大理寺約法上部刑部引例為證𩔖多乖錯某事誠重也問吏輕之之由則曰例甞輕矣今其敢重某事誠輕也問吏重之之由則曰例甞重矣今其敢輕扵固執不通之中雜以情偽其害多矣嗚呼殺孝婦固足以致久旱而亨洪羊亦足以得大雨殺不辜雖有大舜之戒而殺人者死亦足以成漢髙之治要當使有罪者死爾􅂅陛下申戒有司益加詳謹務令生死兩平不致招積劉行簡乞令縣丞兼治獄事疏曰臣竊惟治獄之官號為難能責任專一俾得究心猶不能保其不為姦吏所移而況任之不專者乎縣獄是也獄之初情實在扵縣自縣而達之州雖有異同要之以縣獄所鞫為祖利害不輕今所謂縣令者且朝受牒訴暮夜省按牘牒訴之多㦯至數百少者不下數十案牘之繁堆几溢格其間名為强敏者随事剖決不至滯淹已不可多得儻復責其餘力足辦獄事訊鞫得情吏不敢欺民不被害誠恐百人之中未必有一也郡之獄事則有兩院治獄之官若某當追若某當訊若某當被五木率具檢以禀郡守曰可則行至縣則不然令既不暇專察佐官雖名通簽終以嫌疑不敢侵預其追呼訊鞫具名以禀悉出吏手故其事與州郡不同臣恭惟陛下躬好生之徳視民如傷寛詔屢下未甞不以哀矜庶獄為言如此利害較然明白而人莫敢以縣邑專置獄官為請者誠恐增員太多故也臣愚見以謂縣獄之事宜專委丞如州郡兩院之官日入治獄凡追呼枷訊等事丞先以禀令然後得行其餘悉如舊制則丞無侵預之嫌令有同心之助相為可否其得必多借使為丞者未必皆能其事不猶愈扵付之黠吏之手乎伏望聖慈特賜詳酌施行行簡又議斷罪囚疏曰臣契勘州縣凡禁勘大辟公事除深僻幽隠處行刼㦯謀殺外其餘殺人自有一時知見之人自合一面研窮根勘務盡情實其間却有豪强有力之家殺人公事意在變易情節嘱託官司㦯賂承勘胥吏多以知證通說未明為由以幸差官體究而所差官亦止是一到地頭呼集鄰社保甲訊問供析而已然因此得變易情節出入人罪又況豪右之家所居鄉村宗族姻親佃客之属常居其半宛轉為地符合供證致使失實臣除已行下所属州縣約束應今後承勘大辟公事並責令當職官先將犯人根問一時知見之人追取照勘以驗囚辭即不得輒差官體究外深恐州縣不切遵依欲望聖慈特降睿㫖立法施行直龍圖閣李光奏乞令大暑慮囚狀曰臣備數從臣職在論思獻納之地退食之暇閉閤静思念無以仰裨聖政之萬一方兹大暑清宫涼榭不免喘暍而囹圄之間囚人求死不獲其間疾患不肯責出獄吏守視不謹有非重病而致死亡者何所伸訴臣愚伏望聖慈惻然興哀特降詔㫖令諸路提刑司限指揮到日遍行属部躬詣獄司取索見禁罪人姓名其間有大情已具而小節未圓者量情結絶不得滋蔓淹延其見在獄罪人並令檢會條法洒掃牢房刷盪獄具内有荒僻縣分許令選差諸郡清强官案視庶㡬炎酷之際不至横暴以仰副陛下惻怛欽恤之誠光又奏治火灾狀曰臣近權刑部職事今月二日準尚書省劄子備坐臣僚章䟽論臨安府回祿之警一月之内火凡數作焚爇之家通及千餘乞申嚴昨降指揮以􅓸遲處死治放火者仍乞下密院劄付沿流州軍宻行捕捉等事三月十四日三省同奉聖㫖依奏臣之區區竊有可疑者臣聞堯以水為儆予湯以大旱為罪已未聞盡歸之扵他人者自昔火灾之變上應天道盖熒惑裵回斗牛之間久矣牛斗吴分也又南方之性察陛下宜思所以致火灾之變朝政之闕失臣下之姦邪賦役之重民不聊生流亡者多百姓失業州縣之吏或倚法而恣􅂍貪囹圄之間㦯受賕而多枉濫有一扵此皆足致灾今議者曾不卹此方峻刑以治失火之家縁及官司舍屋皆付之極典夫姦細固所當治也而失火之家盖有不幸者臣恐滛刑濫罰横及無辜非陛下遇灾恐懼修省之意兼沿流州軍幾察姦細自有約束今乃使之覺察放火之家則是硫黄彂燭千里而随身矣臣愚伏望聖慈止行下臨安府令督責在城兵官各認地分如有違犯重寘典憲所有今来已得聖㫖指揮臣未敢行出謹錄奏聞伏候勅㫖殿中侍御史張守乞踈決獄囚劄子曰臣伏以國家自祖宗以来哀矜庶獄盛夏之月必御便殿踈決在京見禁罪人以及三京行之積年未始㦯廢比自金人俶擾去嵗陛下即位扵艱難之初不及舉行人雖不能無疑猶以謂陛下龍飛已肆大霈㦯可暫罷至如近日暑氣漸隆囚禁不少祖宗令典不宜􅆸閣雖云鑾輿暫駐淮甸而京師諸夏之本已降詔聚粮以圖還闕徳澤所先宜不可後伏望聖慈撿㑹故事施行縁大理寺獄並在行在所有揚州亦乞權依四京施行試中書舍人李彌遜上奏曰臣伏見州郡近年刑獄待報奏案例皆稽滯近及半年逺至踰年徃徃未下㦯縁刑寺稽違或道路不通遞中違滯所以至此其間多是情輕奏裁合貸命之人縁坐獄日久疾病死亡深可憐憫欲乞朝廷嚴立近限督責刑寺将四方案牘疾速結絶别作號騐附急遞下諸州庶㡬一空囹圄以廣好生之徳亦可収召和氣右司郎中汪應辰論刑部理寺讞決當分職劄子曰臣竊以舜為天子咎繇治士民之犯扵有司者宜乎皆得其情而無所疑罰之施扵有罪者宜乎皆當扵理而無所失然咎繇稱舜則曰罪疑惟輕又曰與其殺不辜寧失不經豈非幽枉之情欺偽之態雖聖人不能以盡察惟其慎之重之猶有所疑而不自以為無失此所以為舜之聖也國家累聖相授民之犯扵有司者常恐不得其情故特致詳扵聽斷之初罰之施扵有罪者常恐未當扵理故復加察扵赦宥之際是以參酌古義並建官師上下相維内外相制所以防閑考覈者纎悉委曲無所不至也盖在京之獄曰開封曰御史又置糾察司以紀其失斷其刑者曰大理曰刑部又置審刑院以決其平鞫之與讞者各司其局初不相闗是非可否有以相濟無偏聽獨任之失此臣所謂特致詳扵聽斷之初也至扵赦令之行其有罪者㦯叙復㦯内徙㦯縱釋之其非辜者則為之湔洗内則命侍從館閣之臣置司詳定而昔之鞫與讞者皆無預焉外之益梓䕫利去朝廷逺則付之轉運鈐轄司而提㸃刑獄之官亦無預焉盖以獄訟之初既更其手茍非以持平彊恕為心則於有罪者㦯疾惡之太甚扵非辜者㦯遂非而不改故分命他官以盡至公此臣所謂復加察扵赦宥之際也迨元豐中更定官制始以大理兼治獄事而刑部如故然而大理少卿二人一以治獄一以斷刑刑部郎中四人分為左右左以詳覈右以叙雪雖同僚而異事猶不失祖宗所以分職之意本朝比之前世獄刑號為平者盖其並建官師所以防閑考覈者有此具也恭惟陛下寛厚慈恵以祖宗之心為心其於庶獄丁寧告戒前後非一惟是中興以来百司庶府務從簡省大理少卿徃徃止扵一員則治獄斷刑皆出扵一人則獄之有不得其情者誰復為之平反乎刑部郎官㦯二員㦯三員而闗掌職事初無分異然則罰之有不當扵理者又将孰使之追改乎欲望陛下明詔執事刑部理寺之官雖未能盡復祖宗之舊亦當遵用元豐定制庶㡬官各有守人各有見參而伍之反覆詳盡以稱陛下欽卹之意亦以為後世法孝宗時朱熹召對延和上奏曰臣聞獄者民命之所繫而君子之所盡心也今天下之獄死刑當決者皆自縣而逹之州自州而達之使者其有疑者又自州而上之朝廷自朝廷而下之棘寺棘寺讞議而後致辟焉其維持防閑可謂周且審矣然而憲臺之所詳覆棘寺之所讞議者不過受成扵州縣之具獄使其文案粗備情節稍圓則雖顛倒是非出入生死盖不得而察也是故欲清庶獄之源者莫若遴選州縣治獄之官今縣之獄委扵令其選固已精矣而未必皆得人其弊未易革也若州獄則今銓格凡選人任滿有舉主闗陞者方注繁難令錄其慮盖已詳矣然注司理者乃不用此令而近制唯進納癃老之人然後不得注擬此外則常調闗陞雖昏繆疾病之人皆得而為之甚至扵流外補官若省部胥史亦得而為之彼以薦舉闗陞者固未必盡得才能公正之人然比之昏繆疾病無善可稱與夫胥史之入官者則有間矣盖昏繆疾病之人苟且微祿唯知自營其扵獄事䝉成吏手漫不加省而胥史之入官者又㦯狃扵故習與吏為徒販鬻走弄無所不至故州郡小大之獄徃徃多失其平怨讟咨嗟感傷和氣上為聖政之累莫此為甚臣愚欲望陛下明詔銓曹更定選格凡州郡兩獄官専注任滿有舉主闗陞人㦯應格不足則次任任滿銓試中第二等以上人其常調闗陞及省部胥史並不得注擬見在任者非舉主闗陞人即令守倅銓量如委昏繆疾病即保明聞奏特與祠禄其未到人候赴上日亦從守倅銓量方許放上若守倅徇私失實即許監司劾奏罷免所有省部胥史雖已注官待次並令赴部别與擬授庶㡬治獄之官其選少清各知任職仰副陛下欽恤之意禮部員外郎范成大上奏曰臣聞獄重事也民之受􅁈不止於捶楚鍛鍊之苦而已其間貧乏之人無家供食干連守待易得淹延空腸枵腹以受捶楚加以雪霜疫癘非時侵之故罪不抵死而斃扵囹圄者極多准令給囚之物許支錢准格在禁之囚許支米錢則許扵􅂍罰頭子運司等䖏随宜撥支米雖立定升數而無顯然名色是致官司循習不問諸䖏縣獄尤無指擬長吏賢者至㦯廵門乞米以為一粥之資吏㦯不賢粥亦不可常得宜其瘐死者衆實奸泰和臣愚欲望聖慈特降睿㫖檢照給囚之物既許支用係省窠名其糧米亦合一體乞令運司行下州縣量度毎嵗所須徑扵苖米截撥有闗米䖏即以合支之錢依數收糴庶㡬狴犴之中接濟飢苦稱罪受刑不夭生命成大又上奏曰臣聞獄者君子之所盡心也求其生而不可得故雖死而不怨殺者使其尚有可生之理而必置之死地則寃矣國家列聖相授哀矜折獄諸大辟刑名疑慮情理可憫者皆許奏裁死而復生十常六七堯舜之徳何以尚兹然而近年以来案牘㦯壅則不得以時聞徹又不能如期行下及至指揮到州間䝉貸宥而在禁之囚等待淹延動閱時序徃徃死扵桎梏之下久矣不及沾被湛恩者甚衆當職官吏捧詔太息付之無可奈何豈不甚傷天地父母好生之心恭惟宸慮必為惻然臣愚欲望聖慈特降睿㫖申飭攸司凡奏讞之牘所經由處並嚴立近限剋期報應覺舉稽違速與行下庶㡬有可宥之理者不置之必死之地嘉生叶氣薰為泰和實彂政施仁之助成大知處州又上奏曰臣聞獄者萬民之命民命莫重扵大辟方鍜鍊時何可盡察故其節目獨在聚録之際盖大情既定成案已結官吏聚扵一堂引囚而讀示之死生之分決此頃刻可謂要㑹矣而獄吏憚扵平反摘紙疾讀離絶其文嘈􅓐其語故為不可曉解之音造次而畢呼囚書字茫然引去指日聽刑人命所干輕忽若此逺方近甸習俗皆然傍觀寒心大傷政體臣竊檢照聚録之法有曰人吏依句宣讀無得隠漏令囚自通重情以合其欵詳此法意盖不止扵只讀成案而已欲望聖慈深詔攸司痛革前弊臣之愚見謂當稽參自通重情以合其欵之文扵聚録時委長吏㸃無干礙吏人先附囚口責狀一通覆視獄案果無差殊然後亦㸃無干礙吏人依句宣讀務要詳明令囚通曉庶㡬伏辜者無憾負枉者獲伸足以稱陛下矜恤之心滋聖朝仁厚之福司農卿兼尹京李椿上奏曰臣甞攷易之言獄者凡五卦曰噬嗑曰賁曰豐曰旅曰中孚噬嗑之為卦離上而震下離者明也震者動也明在上而動在下動者未服之象大象曰先王以明罰勅法故曰利用獄用獄者未必用刑也賁之為卦艮上離下艮者止也離者明也止在上而明在下大象曰君子以明庶政無敢折獄明體在下而上止不動所以姑明庶政而不敢用片言以折之也豐之為卦震上離下上動而下明豐之時大而多故不可淹緩在下之事既明在上者動而必行可以折獄用刑也故大象曰君子以折獄致刑旅之為卦離上艮下在上者髙而明在下者止其所艮之為義時止則止時行則行亦有光明之道是上下皆明獄得其情刑當其罪之時也聖人猶戒之大象曰君子以明慎用刑而不㽞獄中孚之為卦巽在上而兊在下巽入而兊說有孚信而無明體故大象曰君子以議獄緩死盖疑難之獄也獄之為字兩犬中言非謂偏辭也繫辭曰將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭㳺失其守者其辭屈獄之事體不出乎五卦之時囚之口欵不出扵六辭之情有仲由之才得豐之時即可以片言折獄遇賁之時雖仲尼之聖亦有所不敢況凡人乎語曰聽訟吾猶人也必也使無訟乎不得已而用獄審其時而以六辭察之庶㡬乎無􅁈濫也今之治獄者多不然㦯任其喜怒㦯私受嘱託㦯付之獄吏㦯觀望風㫖鍜鍊以成獄者所在有之臣愚􅂅陛下戒飭治獄之官各思聖人之戒盡其公心毋㦯茍且切戒觀望罪有出入必罰無赦庶有以上副陛下欽恤庶獄之意光宗時淮東運副虞儔上奏曰臣竊惟州郡之獄所係甚重刑名有出入之殊人命有死生之判流徒而下其事實繁苟推鞫之際一失其平則寃抑之民何所赴愬然則獄官所係頋不重㢤夫知録司理州郡之獄官也推鞫之責彼實任之上官盖有所不敢問焉非不敢問也慮其有所迎合且將鍜鍊之致輕重其手而髙下其心也昔之賢者仕扵此官固有與上官爭是非曲直者矣竊見近年以来吏部注擬多是特奏名人及吏職補授與夫老扵選調庸繆無能之輩洎到任之後一切聽之吏胥捶楚之下何所不至而新進之敏銳者例不屑就臣至愚極陋陛下以臣粗更民事分符予節六年之間徧歴三輔周旋兩淮所至毎以獄官庸繆為苦雖小大之獄必躬必親然非國家設官分職各有司存之意也臣愚欲望陛下特降睿㫖令吏部今後諸州軍知録司理並不許注恩科吏職癃老等人其任内有能明辨疑似之獄及圄中無瘐死之人扵印紙逐一批書俾郡守保明申奏監司從實考察然後朝廷詳議推恩㦯與之減舉主一員㦯舉員既足許在任改秩㦯任滿與陞擢差遣亦足以明激勵之方則新進之敏銳者孰不􅂅為此官庶㡬推鞫之際不出扵吏胥之手小大之獄得以不寃仰副陛下哀矜庶獄之意天下幸甚理宗時徃徃讞不時報囚多瘐死監察御史程元鳳上奏曰今罪無輕重悉皆送獄獄無大小悉皆稽留㦯以追索未齊而不問㦯以供欵未圓而不呈㦯以書擬未當而不判獄官視以為常而不頋其遲獄吏留以為利而惟恐其速奏案申牘既下刑部遲延日月方送理寺理寺㸔詳亦復如之寺回申部部回申省動渉嵗月省房又未遽為呈擬亦有呈擬而疏駮者䟽駮嵗月又復如前展轉遲回有一二年未報下者可疑可矜法當奏讞矜而全之乃反遲回有矜貸之報下而其人有斃扵獄者有犯者獲貸而干連病死不一者豈不重可念㢤請自今諸路奏獄即以所彂月日申御史臺從臺臣究省部法寺之慢帝從之度宗咸淳九年起居舍人髙斯得上奏曰臣聞帝王治天下之道無他曰仁而已矣夫天地以生物為心人君代天作子受天所付之民固當生而不傷使各全其性命終其天年然後為無負於上天之託然天下之大非一人所能獨治也必張官置吏以分理之薄海内外有方伯連帥郡有守邑有宰皆受宅生之寄以為天子牧養小民者也成周之時自鄉大夫至扵比閭族黨之長莫非仁人吉士民生其時餐和茹徳漸騶虞之澤沐行葦之仁安有武健酷嚴之吏得廁扵其間㢤三代有道之長實基扵此秦漢以来郡縣之吏非有禮義科指化輯其民也獨設刑法以守之網宻而姦不勝刑繁而民愈慢觀前志所載疾吏之風悲痛之辭徒使人扵邑不已其夭閼人命䠞縮國脈如此為人君者可不鋤而去之㢤然漢唐之間刑有世輕世重民未至甚病也乃若五季之時國亂刑峻殘賊之吏連軫而起尤可畏者至有太白經天民一仰觀輙捕而戮扵市者他可知矣范質生扵其時親睹其弊復遇異人勸使救之以為酷吏寃獄甚扵大暑寒暑之威猶可避也酷吏之威其可避乎善乎路温舒之言曰囚人不勝痛則飾辭以示之吏治者利其然則指道以明之上奏畏卻則鍜鍊而周内之盖奏當之成雖咎繇聽之猶以為死有餘辜自古言酷吏情狀未有若此深切著明者范質感異人之言及至為相力以省刑為任今之刑統其所刪定寛嚴適中夲朝用之刑清民服國夀箕翼質有力焉陛下天資仁恕視民如傷獄刑號為平矣然而日者京尹非人芥視赤子辜𣙜其食劋絶其命乃至失入死罪慘具五刑匹婦之寃猶致三年之旱輦轂之下有此豈不上干天和召灾産孽乎昔尹彦明有言殺之為言豈為人上之語㢤小夫俗吏固不足以語此此臣􅂅陛下因弛其禁深詔有司毋輕民命有效尤者致之重辟無但免官庶㡬少回忠厚之風以夀國脉宗社幸甚金章宗時左諫議大夫賈鉉上書曰親民之官任情立威所用決杖分徑長短不如法式甚者以鐵刃置扵杖端因而致死間者隂陽愆戾和氣未通未必不由此也􅂅下州郡申明舊章檢量封記按察官其檢察不如法者具以名聞内庭勅斷亦依已定程式制可元世祖時趙天麟上䇿曰臣聞天降命以興王王法天而立政定隂陽之消息明生殺之樞機事無大扵斯焉道由之而立也兩儀肇判四象爰分天道莫大扵生故春居嵗首而王者法之以立禮部其次莫貴扵長故夏居春次而法之以立兵部又其次方及於殺故秋居夏次而法之以立刑部至如法冬立工部法上立吏部法下立户部上者天也下者地也地乃天中之積塊而其實六者皆法乎天也京府司縣亦設六曹既以彌綸庶政之夥繁又以式體一元之坱圠也此皆正名之事自周公之後名號世變而其理莫之能改方今名已正而其實有未之盡者竊見方今大罪囚徒鞫訊既成司縣具詞以申扵路路覆鞫之以申達扵上司上司遣理官要察既審而後刑之慎之至也㦯有及立春之後所在行刑此亦似乎失天本意也夫罪人繫獄文卷未完未得即決㦯有至扵十餘年而猶繫者其言下招伏事情昭灼又適遇理官出審而不停滯者萬無一二焉繫之已久及一旦決而不能待乎秋冬何前之太緩而後之太急㢤方春之月勾芒御辰萬殊有榮滋舒暢之容而無枯瘁蕭條之理故王者順之扵是乎掩骼埋胔禁止伐樹無覆巢無殺孩蟲胎天飛鳥毋焚山林凡羅網之𩔖餧獸之藥毋出九門但當安萌芽養幼少存諸孤命有司省囹圄毋四掠止獄訟可也以卉草鳥獸之微尚令被澤而況扵人乎以獄訟四掠猶禁止而況扵刑人乎乃所以盡生生之至道慎其始以存終也及乎商風振起少皥司天鷹乃祭鳥霜飛蕭艾於是乎審㫁戮罪乃所以順隂氣之嚴凝助陽律之不逮也如是則天道克常而王猷昭立矣昔丙吉不問横道死傷之人而問牛喘盖以事作乎顯者機達乎微者吉凶現扵顯也且春夏行刑則是春夏二時行秋冬之令灾殃之效具見古書非臣所能盡言也頃者連年變異蔬榖不登㦯隕霜不殺草而桃李開華或地震日月食而動静不一斯皆隂陽反覆而意㦯有以致之也此事革之甚易而所闗甚大天下官吏莫肯啓一言者臣又不知其何也伏望陛下面稽天意載審刑章凡有罪當死以上命省部秋冬遣理官出而報之凡罪不至死及非常之事宜速決者不在此限外依上施行庶㡬休徴洊至氣候相協天人一致而表裏相通體用一源而顯微無間矣天麟又上䇿曰臣聞定磐石之鴻基莫如尊士闡彌天之大義要在輕財彼衡門陋巷之寒士欲希咫尺之功圖針芥之名者尚拳拳以行此而不之失也況乎秉籙握樞夐超乎民物之上者可不務㢤土苴之中芝草生焉鳥獸之内麟鳳出焉瑞昌時耀盛徳非土苴鳥獸之所可辱也周有八議議賢議能故賢能雖父祖子弟之陷罪國家亦不連坐禁錮而棄之也猛虎不飲盗泉之水鷙鳥不棲惡木之枝甘其渴忍其勞非茍且恬愉以失其操也上有常用下有常供故濫物雖萬億及秭之甚豐國家亦不掛念嗜利以収之也誠以用賢能則所利者極博而收濫物則所損者極大故也我聖朝推天地之深仁彂雷霆之大號澤及九有保全羣下之生法約多端爰罷三族之令復先王久廢之舊章行前代所不能行之洪惠彼有罪而當之及無罪而視之者孰不感服而欽念之哉愚臣以為猶有未之盡者也竊見方今陷大罪者除本人已就極刑之外其妻孥親属有投諸逺方而不齒者有繫扵塲冶而應役者有役扵右族而為臧獲者有配扵士伍而就苦地者斯皆盡除惡務本之當然切恐有委沙遺金之餘恨也昔崇鯀之方命圯族王敦之狼頋天邑伯禹乃崇鯀之子茂𢎞乃王敦之弟虞舜殛鯀用伯禹以為司空而不疑晉元罪敦知茂𢎞之忠節而不問故能奠髙山大川之地成九叙之歌以弼虞舜扵無為之休懐􅓸霜貫日之誠愿剪吞沙之寇以致晉帝扵中興之美盖由父子兄弟罪不相及刑賞之施出扵公也由此觀之籍没之人不宜終身禁錮明矣又竊見方今㦯因賍濫㦯陷逆流例皆籍没其財歸諸内府􅄆扵宗室頒扵外家臣伏以金璧之寳貨貝之資所以權輕重通有無而流布扵四方以張王室之柄也饑不可食寒不可衣然而不可一日闕之聖人因其無實用而有大益故賤之賤之者何賤其取之而非義者也彼犯罪之家非刻剥扵下民則兼并扵貧人以得之今而釁彰孽露干我常刑是因利以賈害也若上之人知利之無益而塵翳清潔亦獨何心哉且國家不患無財貨之用右族不患有飢寒之窘豈賴夫籍没貪穢之財以周所用乎然今未免此事者亦因循而不以為意故也伏望陛下留心細慮下令昭陳凡當籍没之家内子孫弟姪若有超然特異足學知政之人聽有司公舉録徳量才而用之不在禁錮之限若然則士知國家之重賢咸自厲身奮志以希寸禄而程功效實矣凡當籍沒之財貯扵一所明立簿記待儲積之多散扵無告之人可也若然則民化國家之㢘仁咸自立操喻義以復本然而遷善移風矣此臣所以謂定磐石之鴻基莫如尊士闡彌天之大義要在輕財也天麟又上䇿曰臣聞化者政事之本也刑者政事之末也民有賢愚有深淺淺者随化而自遷扵善深者非刑而無以制之聖王灼知此故既布化又立刑以治天下之民言其極理則雖有夲末之殊論其設施則當並舉而無先後之異也故守其化而不以刑則奸慝暴亂之徒恃强􅓸弱而上為姑息之小恵矣此舜誅四凶而天下咸服晉戮三罪而左氏美之盖所以備末也故専其刑而不以化則泰和洋溢之氣有所欝滯而上為法家之少恩矣此文王發政施仁而受命漢祖寛仁愛人以肇基盖所以務夲也今國家夲末並全化刑兩具旌義夫節婦孝子順孫之門以厚邦風舉茂材異等不求聞達之士以勵後進濟天民之無告以擴惻隠之心崇郡縣之學校以敦教育之本也凡此皆化也内立刑部外設理問示羣下以告捕之賞儆百僚以風憲之官凡此皆刑也大綱已備小紀未完若夫王化之方已皆詳見扵前篇矣其刑罰之事臣試申之伏見方今殊死者自有常制至扵抵罪而不當死之流㦯有推惡惡之心循街鞭朴以儆乎衆未及還獄遂僵尸扵路隅而人莫之敢稱其􅁈死者或有垂矜憫之念依法施行以全其生未及旬月復抵冒扵嚴禁而官未有思絶其禍根者此両者臣以為胥失之矣夫既犯大罪而寘諸死地宜也非苛也夫一犯薄罪而亦寘諸死地苛也非宜也凡盗賊奸宄之𩔖皆官吏未盡承流宣化之徳以致之昔陳仲弓一閒人爾猶且化一梁上君子而闔境無盜況乎握郡縣之柄者乎既不反求諸已而思有以自責乃復絶頑民自新之路逞無過不測之威不亦不能新民之甚乎又國家之法未有薄罪當死之刑今而郡縣擅為威虐憲職聞之而不察省部視之而不禁豈不傷聖朝之仁化㢤夫罪有故犯者有誤犯者有重者有輕者常以馭故權以馭誤極以馭重薄以馭輕究而詳之莫非中也彼敗常之人其罪雖不及死然以有茍存犬馬之命幸免漏魚之網教之不知導之不移方其始犯之也聖人惻然而憫之小懲而誡之彼猶不悔及其再陷刑網聖人猶曰焉知其不復改邪仍前以治之及乎三陷刑網聖人乃曰此將終無所改矣非惟殘戕良民而抑且累澄清之化也故國家芟夷而不惜犯者雖死而無辭矣今有屢犯刑章而方且坦然自得由然無恥縱情以陵無玷之人者豈不虧聖朝之威刑㢤書曰狃扵姦宄敗常亂俗三細不宥言三犯雖細而亦不之宥也伏望陛下止郡縣之虐除怙終之源凡盗賊細罪一彂覺及再彂覺者邦有常條無得似前循街鞭朴致傷人命凡盗賊細罪三彂覺者明據前後所犯而誅絶之凡所犯雖多而彂覺未及三者不在誅絶之限盖須既懲又懲然後以為真不能改而施之以極刑也凡奸宄之罪未及死者同如是則官吏無擅殺之權而大化可行犯者知將来之不免而有以自新國家除不悛之愚昧而刑罰少措矣世祖駐蹕齊納爾台之地吏部尚書耶律希亮至奏對畢董文用問大都近事希亮曰囹圄多囚耳世祖方攲枕而卧忽寤問其故希亮奏曰近奉㫖漢人盗鈔六文者殺以是囚多帝驚問孰𫝊此語省臣曰此㫖實托爾齊所𫝊托爾齊曰陛下在南坡以語䝉古兒童帝曰前言戲耳曷甞著為令式乃罪托爾齊希亮因奏曰令既出矣必明其錯誤以安民心帝善其言即命希亮至大都諭㫖順帝時蘇天爵上奏曰洪惟聖朝奄有中夏深仁厚澤普洽扵黎元明罰祥刑務存乎寛大然自近嵗伊始有司或不得人以致刑獄滋章重使生靈彫弊無辜者牽連受刑有罪者徼倖獲免舞文弄法悉快于姦貪肆虐逞威尤便于皂𨽻始則因事以織羅次則受財以脫放及聞審囚官將至却稱被罪人在逃縱欲陳告其取受却縁本宗事未絶設計害民無所不至其有結案之囚當使明正其罪今縣未甞申解于州州未甞申觧于路㦯畏刑名之錯㦯因結解之難不問罪之重輕盡皆死于囹圄㫁遣者既未曾有平反者盖所絶無夫廟堂宰輔惟恐一夫失所而州縣官吏輙敢恣意殺人感傷天地之和盖亦莫重于此近因欽奉詔書廵行畿甸詢民疾苦踈滌寃滯念國家治安既久本欲生全其民今中外一嵗之中死者不知其㡬其在江南猶稍知懼結案幸達于中書判送悉歸于刑部議擬方在吏手囚徒已死獄中且重罪飛申先使知事之元彂有司月報又欲考事之施行今皆視為虚文一切置之不問夫朝廷作法如此郡縣慢令可知京畿積弊如此天下之事可知故憤怨藴于人心災異形于天變水旱大損于禾稼生靈日入于貧窮聞者可以傷心見者當為痛哭𫝊曰國家閒暇及是時明其政刑今海宇承平百年正當申明刑政感格和平而乃因循茍且隳􅆸如此欲望禎祥駢臻黎民安乂盖亦難矣宜從都省明白聞奏今後内外輕重罪囚某事一起自某年月日到禁某年月日申解所司㦯斷訖笞杖等罪㦯審復結案待報某事一起自某年月日到禁某年月日因患某病某醫用何藥餌竟因某病身故年終通行開冩略節情犯縁由次年三月以裏申逹省部選委刑部文資正官一員妨職子細披詳如有淹滯刑獄決遣不當妄申急證死損數多皆當驗事重輕依例治罪庶㡬朝廷明其政刑天下知所警畏有司不敢生事擾民罪囚不至􅁈濫死損天爵又上奏曰盖聞刑者輔治之具非恃刑以為治者也欽惟國家列聖臨御其用刑也本之以寛仁施之以忠厚内則論議付之刑曹外則糾察責之風紀故治功表著徳澤涵濡然法之所立㦯有所未周吏之奉行㦯有所未至當職猥以譾材竊食重禄粗有聞見略具敷陳一到選官員年六十五以上者先行銓注此國家優恤臣僚宣力既久恐其年不逮恩徳至渥也照得各處推官専掌刑名夫案牘之冗全藉乎精神審讞之詳悉資乎耳目案牘不差則吏無所欺推審既詳則囚無􅁈抑今路府推官徃徃年老㦯視聽不明㦯神思昏耄茍圖祿俸姑俟引年欲望刑政肅清盖亦難矣夫先行銓注固明時之厚恩而刑罰不中亦聖人之明訓今後各處推官有闕當選吏通儒術儒習吏事材力明敏别無過舉方許為之其年六十五以上者銓注别職如此則庶㡬刑罰得中官無曠職矣一民之犯罪具有常刑茍肆攘奪理宜禁治切見各處人民㦯稱窩藏盗賊㦯言收寄􅂍物㦯因偽鈔攀援㦯為私鹽致訟凡一切刑獄等事有司公吏廵捕人等徃徃因其捕獲乘隙肆為搶奪所犯罪有輕重家貲為之一空甚至取其􅂍杖其家因為得罪盖亦不敢告陳有司亦不受理江淮之南此風尤甚照得舊例諸被囚禁不得告舉他事其為獄官酷已者聽之夫在獄被酷猶許陳告況民之罪狀未明一家已被其虐不亦甚可恤乎今後有犯此者許其家人明立證佐具状陳告合無比依搶奪民財估􅂍定論官吏失扵約束亦合量情究治如㦯挾讎妄告抵罪反坐如此庶㡬愚民不至甚受其害而廵捕之人亦知有所警畏矣一中書省奏准節該除人命重事外偷大頭疋等一切罪犯􅂍仗完備不須候五府官審理令拘該衙門依例歸結夫民之犯刑㦯不得已累朝欽恤具有憲章向者三年一次遣官審理本為罪囚在禁淹滯今次奏准偷大頭疋等罪許令拘該衙門歸結則是人命重事直待三年五府官處決誠恐獄囚繁夥愈見淹延照得立御史臺條畫一􅅃所在重刑毎上下半年親行叅照文案察之以情當面審問若無異詞行移本路緫管府結案申部待報其有翻異及别有疑似者即行推鞫若關人衆卒難歸結者移委附近不干礙官司再行磨問實情若更有可疑亦聽復行推問無致寃枉若有􅁈滯随即改正踈放欽此今後内外重囚擬合照依舊例令㢘訪司審録果無寃抑移牒緫管府結案申覆詳斷其三年一次遣官審理既不得人徒增繁擾並合住罷如此庶㡬獄無淹滯刑政肅清矣一伏覩至元二年宣諭聖㫖節文内外有司官不為用心捕捉盜賊縱有拏獲賊徒取訖招伏􅂍仗明白指以小節不完不行歸斷今後但有捉獲强盜偽造寳鈔賊徒半年之内依例結案偷大頭疋三箇月内須要結案合該杖罪依例斷決違者在内監察御史在外㢘訪司官驗事輕重究治謹按易曰君子以明慎用刑而不留獄盖言獄者不得已而設民有罪而入不可留滯淹久也今各處在禁重囚㦯為賊盜寄􅂍仗于别所㦯印偽鈔藏板具于他鄉㦯指為首同伴在某處居止或稱家属證佐在甚家隠藏果有堪信顯迹事彂官司即須移文勾取不得因時妄指平民彼處官司倚恃不相統攝徃徃不即追捕以致賊徒在逃又令毁棄􅂍仗遷延嵗月虚調文移盖因官吏舞弄作弊萬端以致刑獄淹延不能杜絶江南州郡此弊尤甚今後如有承受各處公文即當劃時追捕若令賊徒展轉在逃􅂍仗亦不到官合無比依不即捕盜等例定立罪名如此庶㡬事得結絶吏知畏懼而州郡亦無留獄矣一法制之立既有成規奸偽之滋理宜嚴禁照得舊例諸保辜者手足毆傷人限十日以他物毆傷者二十日以刃及湯火傷人者三十日折跌支體及破骨者五十日限内死者各依殺人論其在限外及雖在限内以他故死者各依本毆傷法叅詳此法古今遵守别難更易今江淮以南㦯辜限已滿其被毆者身死有司徃徃比依元貞元年孟福被死事例加等科斷若皆如此遵行是辜限為不可用破已成之法開姦弊之門誠恐刑獄日滋深為未便照得孟福事例通制既已不載有司似難奉行今後鬭毆傷人者止合依辜限之制或在限外雖無他故死者合無止依本毆治罪其孟福例擬合遍行禁止如此庶㡬奸偽不滋法制歸一矣歷代名臣奏議卷二百十七
