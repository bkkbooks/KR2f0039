body:
  text: 歴代名臣奏議卷一百八十七明楊士竒等撰賞罰晉悼公時鄭人賂晉以師悝師觸師蠲歌鐘二肆及其鎛磬女樂二八悼公以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之絳辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福祿攸同便蕃左右亦是帥從夫樂以安徳義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來遠人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑㣲子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是乎始有金石之樂禮也宋司城子罕為相謂宋君曰國家之危定百姓之治亂在君行之賞罰也賞當則賢人勸罰得則姦人止賞罰不當則賢人不勸姦人不止姦邪比周欺上蔽主以争爵祿不可不慎也夫賞賜讓與者人之所好也君自行之刑罰殺戮者人之所惡也臣請當之君曰善子主其惡寡人行其善吾知不為諸侯笑矣於是宋君行賞賜而與子罕刑罰國人知刑戮之威專在子罕也大臣親之百姓附之居期年子罕逐其君而專其政魏文侯問李克曰為國如何對曰臣聞為國之道食有勞而祿有功使有能而賞必行罰必當文侯曰吾賞罰皆當而民不與何也對曰國其有滛民乎臣聞之曰奪淫民之祿以來四方之士其父有功而祿其子無功而食之出則乗車馬衣美裘以為榮華入則脩竽瑟鐘石之聲而安其子女之樂以亂鄉曲之教如此者奪其祿以來四方之士此之謂奪淫民也公叔痤為魏將而與韓趙戰澮北禽樂祚魏王說郊迎以賞田百萬祿之公叔痤反走再拜辭曰夫使士卒不崩直而不倚棟撓而不避者此呉起餘教也臣不能為也前脉地形之險阻決利害之備使三軍之士不迷惑者巴寧㸑襄之力也縣賞罰於前使民昭然信之於後者王之眀法也見敵之可也鼓之不敢怠倦者臣也王特為臣之右手不倦賞臣可也若以臣之有功臣何力之有乎王曰善於是索呉起之後賜之田二十萬巴寧㸑襄田各十萬王曰公叔豈非長者哉既為寡人勝强敵矣又不遺賢者之後不能掩士之迹公叔何可無益乎故又賜田四十萬加之百萬之上韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞眀主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者漢髙帝六年始剖符封功臣鄼侯蕭何食邑獨多功臣皆曰臣等身被堅執銳多者百餘戰少者數十合今蕭何未嘗有汗馬之勞徒持文墨議論顧反居臣等上何也帝曰諸君知獵乎追殺獸兔者狗也發縱指示者人也今諸君徒能得走獸耳功狗也至於蕭何發縱指示功人也羣臣皆莫敢言張良亦無戰鬬功帝使自擇齊三萬户良曰臣始起下邳與上㑹留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户乃封良為留侯封陳平為戸牖侯平辭曰此非臣之功也帝曰吾用先生謀戰勝克敵非功而何平曰非魏無知臣安得進帝曰子可謂不背本矣乃賞無知髙帝已封大功臣二十餘人其餘争功不決未得行封帝從複道望見諸將徃徃相與坐沙中語帝曰此何語留侯曰陛下不知乎謀反耳帝曰何故留侯曰陛下起布衣以此属取天下今所封皆故人所親愛所誅者皆平生所仇怨此属畏陛下不能盡封又恐見疑平生過失及誅故相聚謀反耳帝乃憂曰為之奈何留侯曰陛下平生所憎羣臣所共知誰最甚者帝曰雍齒與我有故怨數相窘辱我留侯曰今急先封雍齒則羣臣人人自堅矣於是乃封雍齒為什方侯而急趣丞相御史定功行封羣臣皆喜曰雍齒尚為侯我属無患矣髙帝詔定元功十八人位次皆曰曹叅功最多宜第一鄂千秋進曰叅雖有野戰畧地之功此特一時之事耳上與楚相距五嵗失軍亡衆跳身遁者數矣蕭何常從關中遣軍補其處又軍無見粮何轉漕關中給食不乏陛下雖數亡山東何常全關中以待陛下此萬世之功也今奈何以一旦之功而加萬世之功哉何第一叅次之帝曰善於是乃賜何帶劒履上殿入朝不趨上曰吾聞進賢受上賞封千秋為安平侯十一年梁王彭越以謀反夷三族梟首於洛陽下詔有敢收視者輒捕之欒布祠而哭之吏捕以聞上召布罵曰若與彭越反邪吾禁人勿收若獨祠而哭之與越反明矣趣烹之布曰願一言而死上曰何言布曰方上之困於彭城敗滎陽成臯間項王所以遂不能西走以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢而楚破且垓下之㑹㣲彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今陛下一徴兵於梁彭王病不行而陛下疑以為反反形未見以苛小案誅滅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨於是上乃赦布罪拜為都尉元帝時西域都護騎都尉甘延夀與西域副校尉陳湯使西域矯制發城郭諸國兵車帥戊巳校尉屯田吏士攻斬郅支單于帝内嘉其功而匡衡石顯争之宗正劉向上奏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有㤀西域都䕶甘延夀副校尉陳湯承聖指倚神靈總百蠻之君㩜城郭之兵出百死入絶域遂蹈康居屠五重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭明之功萬夷慴伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賔願守北藩累世稱臣立千載之功建萬世之安羣臣之勲莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延夀湯所誅震雖易之折首詩之雷霆不能及也論大功者不錄小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也盖急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永乆千里之鎬猶以為逺況萬里之外其勤至矣延夀湯既未獲受祉之報反屈捐命之功乆挫於刀筆之前非所以勸有功厲戎士也昔齊桓公前有尊周之功後有滅項之罪君子以為功覆過而為之諱行事貳師將軍李廣利損五萬之師靡億萬之費經四年之勞而僅獲駿馬三十匹雖斬宛王母鼔之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不錄其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延夀湯不煩漢士不費斗糧比於貳師功徳百之且常恵隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功成帝時陳湯下獄當死太中大夫谷永上奏曰臣聞楚有子玉得臣文公為之仄席而坐趙有㢘頗馬服彊秦不敢窺兵井陘近漢有郅都魏尚匈奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也盖君子聞鼓鼙之聲則思將率之臣竊見關内侯陳湯前使副西域都䕶忿郅支之無道閔王誅之不加策慮愊憶義勇奮𤼵卒興師奔逝横厲烏孫踰集都頼屠五重城斬郅支首報十年之逋誅雪邊吏之宿耻威震百蠻武暢四海漢元以來征伐方外之将未嘗有也今湯坐言事非是幽囚乆繫歴時不決執憲之吏欲致之大辟昔白起為秦將南㧞郢都北阬趙括以纎介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告𩔖上帝介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷盖之報況國之功臣者哉竊恐陛下忽於鼙鼓之聲不察周書之意而忘帷盖之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也哀帝時議郎耿育上書言便宜因訟陳湯曰延夀湯為聖漢揚鉤深致逺之威雪國家累年之耻討絶域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下眀詔宣著其功改年􅂷歴傳之無窮應是南郡獻白虎邊陲無警備㑹先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功獨丞相匡衡排而不予封延夀湯數百戸此功臣戰士所以失望也孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曾不深惟本末之難以防未然之戒欲專主威排妒有功使湯塊然被寃拘囚不能自眀卒以無罪老棄敦煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不㤀危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯耳假使異世不及陛下尚望國家追錄其功封表其墓以勸後進也湯幸得身當聖世功曾未乆反聽邪臣鞭逐斥逺使亡逃分竄死無處所逺覽之士莫不計度以為湯功累世不可及而湯過人情所有湯尚如此雖復破絶筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳此臣所以為國家尤戚戚也東漢光武建武二年封功臣為列侯鄧禹呉漢皆食四縣博士丁恭上奏曰古者封諸侯不過百里今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也帝以貴人兄隂識有軍功欲加增封識曰臣幸託属掖庭陛下仍加爵土此為親戚受賞國人計功也帝從之桓帝時恩澤諸侯以無勞受封羣臣不悅而莫敢諫大鴻臚趙典獨上奏曰夫無功而賞勞者不勸上忝下辱亂象干度且髙祖之誓非功臣不封宜一切削免爵土以存舊典帝不從桓帝欲襃崇大將軍梁冀中朝咸稱冀之勲徳宜比周公錫之山川土田附庸司空黄瓊上奏曰冀前以親迎之勞增邑三十又其子𦙍亦加封賞昔周公輔相成王制禮作樂化致太平是以大啓土宇開地七百今諸侯以户邑為制不以里數為限蕭何識髙祖於泗水霍光定傾危以興國皆益戸增封以顯其功冀可比鄧禹合食四縣賞賜之差同於霍光使天下知賞必當功爵不越徳朝廷從之獻帝時曹操上奏曰昔袁紹侵入郊甸戰於官渡時兵少糧盡圖欲還許書與荀彧議彧不聽臣建宜徃之便恢進討之規更起臣心易其愚慮遂摧大逆覆取其衆此彧覩勝敗之機略不世出也及紹破敗臣糧亦盡以為河北未易圖也欲南討劉表彧復止臣陳其得失臣用反斾遂吞凶族克平四川向使臣退於官渡紹必鼓行而前有傾覆之形無克㨗之勢後若南征委棄兖豫利既難要將失本據彧之二䇿以亡為存以禍致福謀殊功異臣所不及也是以先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻㧞之㨗前所賞錄未副彧巍巍之勲乞重平議疇其戸邑西晉武帝時議郎段灼上奏曰昔伐蜀募取涼州兵馬羌人健兒許以重報五千餘人随鄧艾討賊功皆第一而乙亥詔書州郡將督不與中外軍同雖在上功無應封者唯金城太守楊欣所領兵以逼江由之勢得封者三十人自金城以西非在欣部無一人封者茍在中軍之例雖下功必侯如州郡雖下功髙不封非所謂近不重施逺不遺恩之謂也臣聞魚懸由於甘餌勇夫死於重報故荆軻慕燕丹之義專諸感闔閭之愛匕首振於秦庭呉刀耀於魚腹視死如歸豈不有由也哉夫功名重賞士之所競不平致怨由來乆矣詩云尸鳩在桑其子七兮淑人君子其儀一兮臣以為此等宜䝉爵賞時王濬有平呉之勲而為王渾所譖毁帝雖不用無眀賞罰以濬為輔國大将軍天下咸為之怨博士秦秀上言曰自大晉啓祚輔國之號率以舊恩此為王濬無功之時受九列之顯位立功之後更得寵人之辱號也四海視之孰不失望蜀小呉大平蜀之後二将皆就加三事今濬還而降等天下安得不惑乎呉之未亡也雖以三祖之神武猶躬受其屈以孫皓之虚名足以驚動諸夏每一小出雖聖心知其埀亡然中國輒懐惶怖當爾時有借天子百萬之衆平而有之與國家結兄弟之交臣恐朝野實皆甘之耳今濬舉蜀漢之卒數旬而平呉雖舉吴人之財寳以與之本非已分有焉而遽與計校乎恵帝永康初楊駿輔政大開封賞多樹黨援散騎常侍侍中石崇等上奏曰陛下聖徳光被皇靈啓祚正位東宫二十餘年道化宣流萬國歸心今承洪基此乃天授至於班賞行爵優於泰始革命之初不安一也吴㑹僭逆㡬於百年邊境被其荼毒朝廷為之旰食先帝決獨斷之聰奮神武之略蕩滅逋寇易於摧枯然謀臣猛将猶有致思竭力之效而今恩澤之封優於滅吴之功不安二也上天眷祐實在大晉卜世之數莫知其紀今之開制當埀於後若尊卑無差有爵必進數世之後莫非公侯不安三也臣等敢冒陳聞竊謂泰始之初及平吴論功制度名牒皆悉具存縱不能逺遵古典尚宜依準舊事書奏弗納梁武帝時御史中丞任昉上奏曰臣聞將軍死綏咫歩無却顧望避敵逗撓有刑至乃趙母深識乞不為坐魏主著令抵罪已輕是知敗軍之將身死家戮爰自古昔眀罰在斯臣竊尋獯獫侵軼蹔擾疆陲王師薄伐所向風靡是以淮徐獻㨗河兖凱歸東關無一戰之勞涂中罕千金之費而司部懸隔斜臨寇境故使狡虜憑陵淹移嵗月故司州刺史蔡道恭率勵義勇奮不顧命全城守死自冬徂秋猶轉戰無窮亟摧醜虜方之居延則陵降而恭守比之踈勒則耿存而蔡亡若使郢部救兵㣲接聲援則單于之首乆懸北闕豈直受降可築渉安啓土而已哉寔由郢州刺史臣景宗受命致罰不時言邁故使蝟結蟻聚水草有依方復按甲盤桓緩救資敵遂令孤城窮守力屈凶威雖然猶應固守三關更謀進取而退師延頸自貽虧衂疆埸侵駭職是之由不有嚴刑誅賞安寘景宗即主臣謹按使持節都督郢司二州諸軍事左將軍郢州刺史湘西縣開國侯臣景宗擢自行間遘兹多幸指蹤非擬獲獸何勤賞茂通侯榮髙列將負擔裁弛鐘鼎遽列和戎莫效二八已陳自頂至踵功歸造化潤草塗原豈獲自已且道恭云逝城守累旬景宗之存一朝棄甲生曹死蔡優劣若是惟此人斯有靦面目昔漢光命將坐知千里魏武置法案以從事故能出必以律錙銖無爽伏惟聖武英挺畧不世出料敵制變萬里無差奉而行之寔𢎞廟算惟此庸固理絶言提自逆胡縱逸乆患諸夏聖朝乃顧將一車書慜彼司氓致辱非所早朝永歎載懐矜惻致兹虧䘮何所逃罪宜正刑書肅眀典憲臣謹以劾請以見事免景宗所居官下太常削爵土收付廷尉法獄治罪其軍佐職僚偏裨將帥絓諸應及咎者别攝治書侍御史随違續奏臣謹奉白簡以聞後魏孝明帝時行臺左丞辛雄在軍上奏曰凡人所以臨堅陳而㤀身觸白刃而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子明主深知其情故賞必行罰必信使親踈貴賤勇怯賢愚聞鐘鼓之聲見旌旗之列莫不奮激競赴敵塲豈厭乆生而樂早死也利害懸於前欲罷不能耳自秦隴逆節將歴數年蠻左亂常稍已多載凡在戎役數十萬人三方師衆敗多勝少跡其所由不眀賞罰故也陛下欲天下之早平愍征夫之勤悴乃降眀詔賞不移時然兵將之勲歴稔不決亡軍之卒晏然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪此其所以望敵奔沮不肯進力者矣若重發明詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯須廢也賞罰陛下之所易尚不能全而行之攻敵士之所難欲其必死寧可得也臣既庸弱忝當戎使職司所見輒敢上聞惟陛下審其可否北齊文宣帝天保五年制詔問刑罰寛猛秀州長史樊孝謙上奏曰臣聞惟王建國刑以助禮猶寒暑之賛隂陽山川之通天地爰自末葉法令稍滋秦篆無以窮書楚竹不能盡載有司因此開以二門髙下在心寒熱随意周官三典棄之若吹毛漢律九章違之如覆手遂使長平獄氣得酒而後消東海孝婦因災而方雪詔書挂壁有善而莫遵姦吏到門無求而不可皆由上失其道民不見徳而議者守迷不尋其本鍾繇王朗迫怨張倉祖訥梅陶共尤文帝便謂化屍起偃在復肉刑致治興邦無關周禮伏惟陛下昧爽坐朝留心政術眀罰以糾諸侯申恩以孩百姓黄旗紫盖已絶東南白馬素車將降軹道若復峻典深文臣實未悟何則人肖天地俱禀隂陽安則願存擾則圖死故王者之治務先禮樂如有未從刑書乃用寛猛兼設水火俱陳未有專任商韓而能長乆昔秦歸士㑹晉盜來奔舜舉臯陶不仁自逺但令釋之定國迭作理官龔遂文翁繼為郡守科閒律令一此憲章欣聞汲黯之言泣斷昭平之罪則天下自治大道公行乳獸含牙蒼鷹垂翅楚王錢府不復頒封漢獄寃囚自然䝉理後服之徒既承風而慕化有截之内皆蹈徳而詠仁號以成康何難之有後周武帝初平齊之後帝欲賞從官留京者不預司武中士柳彧上奏曰今太平告始賜賞宜眀酬勲報勞務先有本屠城破邑出自聖規斬將搴旗必由神畧若負戈擐甲征扞劬勞至於鎮撫國家宿衛為重俱禀成筭非專已能留從事同功勞須等帝從之於是留守並加品級保定二年三老于謹上言曰為國之道必須有法法者國之綱紀不可不正所正在于賞罰若有功必賞有罪必罰則為善者日益為惡者日止若有功不賞有罪不罰則天下善惡不分下人無所措其手足矣唐太宗時封中書令房𤣥齡為䢴國公工部尚書杜如晦為蔡國公吏部尚書長孫無忌為齊國公並為第一等食實封三千三百戸皇從父淮安王神通上言曰義旗初起臣率兵先至今房𤣥齡等刀筆之人功居第一臣竊不服太宗曰國家大事惟賞與罰若賞當其勞無功者自退罰當其罪為惡者咸懼則知賞罰不可輕行也今計勲行賞𤣥齡等有籌謀帷幄畫定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一叔父於國至親誠無愛惜但以不可緣私濫與勲臣同賞矣由是諸功臣自相謂曰陛下之至公賞不私其親吾属何可妄訴初髙祖舉宗正籍弟姪再從三從童孩已上封王者數十人至是太宗謂羣臣曰自兩漢已降惟封子及兄弟其踈逺者非有大功如漢之賈澤並不得受封若一切封王多給力役乃至勞苦萬姓以養己之親属於是宗室先封郡王其間無功者皆降為縣公侯君集為交河行軍大總管討平髙昌自配没罪人私取珍寳婦女有司劾之太宗詔君集詣獄簿對中書侍郎岑文本諫曰髙昌之罪議者以其遐逺欲置度外唯陛下奮獨見之眀授決勝之畧君集得指期平殄今推勞將帥從征之人悉䝉重賞未踰數日更以属吏天下聞之謂陛下錄過遺功無以勸後且古之出師克敵有重賞不勝䝉顯戮當其有功也雖貪財縱欲尚䝉爵邑其無功也雖勤躬潔已不免鈇鉞故曰記人之功忘人之過宜為君者也昔李廣利貪不愛卒陳湯盜所收康居財物二主皆赦其罪封侯賜金夫將帥之臣㢘慎少而貪墨多軍法曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不計其死是以前聖使人必收所長而棄所短陛下宜申宥君集俾復朝列以勸有功帝寤釋不問桂州都督府李𢎞節以清慎聞及身歿後其家賣珠太宗聞之宣於朝曰此人生平宰相皆言其清今日既然所舉者豈得無罪必當深理之不可捨也侍中魏徴奏曰陛下生平言此人清未見受財之所今聞其賣珠將罪舉者臣不知所謂自聖朝已來為國盡忠清貞慎守終始不渝屈突通張道源而已通子三人來選有一匹羸馬道源兒子不能存立未見一言及之今𢎞節為國立功前後大䝉賞賚居官殁後不言貪殘妻子賣珠未為有罪審其清者無所存問疑其濁者旁責舉人雖云疾惡不疑實亦好善不篤臣竊思度未見其可恐有識聞之必生枉議太宗撫掌曰造次不思遂聞此語方知談不容易並勿問之其屈突通張道源兒子宜各與一官太宗嘗與大將軍藺謩語謩不對太宗怒而繫之後知其聾乃釋不問語侍臣曰我昨𤼵怒藺謩若遂加其罪豈不濫罰魏徴對曰古者帝王多因喜怒遂濫其賞罰今陛下思怒藺謩遂能却更思省若此心不移四海之福也徳宗時翰林學士陸贄上奏曰右冀寧奉宣勅㫖卿及諸學士名銜宜並抄錄進來冀寧又向臣說云聖意以臣等自到奉天書詔填委欲與改轉以奨勤勞者承命竦恧顧慙非宜進退徬徨不知所措臣謬以儒學選居翰林雖職異訏謨而恩參近侍當陛下用兵之㑹乏決勝之籌從陛下避狄之逰靡出竒之計見危闕授命之節知難無伏死之争事君大猷臣則皆曠屑屑供職曾何足云夫君之有臣以濟理也理不失道亂何由生亂之浸興由理乖也君之及難實臣罪也是以主憂則臣辱主辱則臣死今陛下躬罹逼脅露處郊畿園廟震驚斯謂辱矣寇讎宻邇亦云憂矣臣竊謂凡今在位任重者其罪大職近者其責深臣之職司頗亦為近是宜當責安可增榮又聞初到奉天已頒詔命應是扈從將吏一例並加兩階今若翰林之中獨䝉改轉乃是行賞不𩔖命官以私錄㣲勞則臣等遷位過優勸來者則從官加階太薄先後失次輕重不倫凡百具僚誰不解體夫行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺至如徇主㤀家固是臣子常分追陪輦蹕曷足甄稱陛下必以朝官之中有來有否事須旌别以儆不從則望先錄大勞次徧羣品然後以例均被臣亦何敢獨辭殊渥曲臨實傷大體不任靦懼之至謹奉狀以聞苗粲為郎中陸贄欲進粲官徳宗不許曰晉卿徃攝政有不臣之言又名其子皆與帝王同宜與外官贄奏曰王者爵人必於朝刑人必於市言與衆共之奨而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不眀而私幸之門啓中傷則枉直無辨而讒間之道行可不慎哉若陛下以晉卿姦邪粲等應坐則當公議其罪若知見誣亦宜擢粲等以示天下且普卿起文儒致位台輔謙柔敦厚為三朝所推安肯為族滅計雖甚狂險猶不為之況老臣乎帝然之韓愈上奏曰臣伏見六月八日勅以狂賊傷害宰臣擒捕陛下悲傷震悼形於寢食特降詔書眀立條格云有能捉獲賊者賜錢萬貫仍加超授今下手賊等四分之内已得其三其餘兩人盖不足計根尋蹤跡知自承宗再降眀詔絶其朝請又與王士則士平等官八日之制無不行者獨有賞錢尚未賜給群情疑惑未測聖心聞初載錢置市之日市中觀者日數萬人廵繞瞻視咨嗟嘆息既去復來以至日暮百姓小人重財輕義不能深達事體但見不給其賞便以為朝廷愛惜此錢不守言信自近傳逺無由辯眀且出賞所以求賊今賊已誅斬若無人捉獲國家何因得此賊而正刑法也承宗而賜誅絶也士則士平何故與美官也三事既因獲賊獲賊必有其人不給賞錢實亦難曉假如聖心獨有所見審知不合加賞其如天下百姓及後代乆逺之人哉況今元濟承宗尚未擒滅兩河之地大半未收隴右河西皆沒於敵所宜大眀約束使信在言前號令指揮以圖功利況自陛下即位以來繼有丕績斬楊惠琳收夏州斬劉闢收劒南東西川斬李錡收江東縛盧從史收澤潞等五州威徳所加兵不汚刃收魏博等六州致張茂昭張愔收易定徐泗濠等五州創業以來列聖功徳未有能髙於陛下者可謂赫赫巍巍光照前後矣此由天授陛下神聖英武之徳為巨唐中興之君宗廟神靈所共祐助勉强不已守之以信則故地不足收而太平不難致如乘快馬行平路遲速進退自由其心有所欲徃無不可者於此之時特宜示人以信孔子欲存信去食人非食不生尚欲捨生以存信況可無故而輕棄也昔秦孝公用商鞅為相欲富國强兵行令於國恐人不信立三丈之木於市南門募人有能徙置北門者與五十金有一人徙之輒與五十金秦人以君言為必信法令大行國富兵强無敵天下三丈之木非難徙也徙之非有功也孝公輙與之金者所以示其言之必信也昔周成王尚小與其弟叔虞為戱削桐葉為珪曰以晉封汝其臣史佚因請擇日立叔虞為侯成王曰吾與之戲耳史佚曰天子無戱言言之則史書之禮成之樂歌之於是遂封叔虞於晉昔漢髙祖出黄金四萬斤與陳平恣其所為不問出入令謀項羽平用金間楚數年之間漢得天下論者皆言漢髙祖深達於利能以金四萬斤致得天下以此觀之自古以來未有不信其言而能有大功者亦未有不費少財而能收大利者也臣於告賊之人本無恩義彼雖獲賞了不關臣所以區區盡言不避煩黷者欲令陛下之信行於天下也伏望恕臣愚陋僻惷之罪而收其懇欵誠至之心天下之幸非臣之幸也憲宗元和元年左拾遺元稹上奏曰臣聞令之必行於下者信也令茍不信患莫大焉今陛下初臨㝢内務切黎元至於牧守字人之官所宜詳擇茍未得人不當虚授茍或任使不可屢遷臣竊見近除寧州刺史論傪䖍州刺史髙𢎞本通州刺史豆盧靖曾不渉旬並已追制又以杜兼為蘇州刺史行未半途復改郎署臣不知誰請於陛下而授之誰請於陛下而追之追之是則授之非授之是則追之非以非為是者罰必加然後人不敢輕其舉以是為非者罪必及然後下不敢用其私此先王所以不令而人從不言而人信豈異事哉率是道也今陛下如綸之令朝降反汗之詔夕施紛紛紜紜無所歸咎臣竊恐陛下之令未能取信於朝廷而況於取信天下乎臣伏願陛下徴舉者之詞察追者之請若舉者之詞直則請而追之者不得無過若追者之理勝則舉而授之者不得無辜賞罰是非所宜明當況陛下肇臨黎庶教化惟新誥令之間四方所仰少有得失天下必聞臣實庸愚謬居諌列職當言責不敢偷安茍有所禆萬死無恨無任愚迫懇欵之至五年裴垍言於帝曰軍器使承璀首唱用兵疲敝天下卒無成功陛下縱以舊恩不加顯戮豈得全不貶出以謝天下乎李絳奏曰陛下不責承璀他日復有敗軍之將何以處之若誅之則同罪異罰彼必不服若釋之則誰不保身而玩寇乎帝即罷之六年李吉甫言於帝曰賞罰人主之二柄不可偏廢今恵澤已深而威刑未振中外解惰願加嚴以振之帝顧李絳曰何如絳曰王者之政尚徳不尚刑豈可舍成康文景而效秦始皇父子乎帝曰然後于頔入對亦勸上峻刑帝謂宰相曰于頔大是奸臣勸朕峻罰卿知其意乎皆對曰不知也帝曰此欲朕失人心耳吉甫失色退而抑首不言笑竟日七年帝遣使宣慰魏博宰相李絳上言曰魏博五十餘年不霑皇化一旦來歸不有重賞過其所望則無以慰士卒之心使四鄰勸慕請發内庫錢五十萬緡以賜之宦官以為太多帝以語絳絳對曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下奈何愛小費而遺大計不以收一道人心錢用盡更來事機一失不可復追借使國家𤼵十五萬兵以取六州期年而克之其費豈止如此而已乎帝恱曰朕所以惡衣菲食蓄聚貨財正為欲平定四方不然徒貯之府庫何為後唐廢帝清泰初帝賜將士緡錢不給學士李專美夜直帝讓之曰卿名有才不能為我謀此㽞才安所施乎專美對曰臣駑劣陛下擢任過分然軍賞不給非臣之責也竊思自長興之季賞賚亟行卒以是驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不專係于厚賞亦在修法度立紀綱陛下茍不改覆車之轍臣恐徒困百姓存亡未可知也今財力盡於此矣宜據所有均給之何必踐初言乎帝深以為然後晉出帝開運二年帝賞賜優伶無度中書令兼樞宻使桑維翰上奏曰曏者陛下親禦胡寇戰士重傷者賞不過帛數端今優人一談一笑稱㫖徃徃賜束帛萬錢錦袍銀帶彼戰士見之能不觖望士卒解體陛下誰與衞社稷乎帝不聼後漢髙祖初即位議率民財以賞將士夫人李氏上諌曰陛下因河東創大業未有以恵澤其民而先奪其生生之資殆非新天子所以救民之意也請悉出宫中所有以勞軍士雖復不厚人無怨言從之宋太祖時有當遷官者太祖素惡其人不與趙普堅以為請太祖怒曰朕固不為遷官卿若之何普曰刑以懲惡賞以酬功古今通道也且刑賞天下之刑賞非陛下之刑賞豈得以喜怒專之太祖起入宫普随之立於宫門乆不去竟得俞允仁宗景祐四年侍御史知雜事龐籍論近年賞典太優刑章稍縦䟽曰臣聞國家之重先乎紀綱紀綱之要實在賞刑賞不失有功則勞臣勸刑不失有罪則姦人懼二者或失紀綱必隳伏惟皇帝陛下英睿恭勤綜覈羣品博詢下議以裨闕政況臣䝉荷天造粉身無報敢罄愚管少陳時事伏覩近年賞典太優刑章稍縦夫官爵之設所以磨礪群器以成萬務茍無勞而有賞則人不務施勞無徳而祿則人不務修徳近因上殿奏事之際因言及此親聞徳音亦以僥倖為患此聖心固已知矣以陛下欽眀之徳而尚有僥倖之澤臣恐由執事者有失持守典章之故也夫戚里之族親近之臣得至帝座之前皆有求恩之意各徇其請則爵祿之數有限僥倖之求無極然人君以寛仁為徳其哀鳴於前者恐難峻阻則必勉徇其意降㫖於外臣愚欲望陛下眀諭大臣執守規矩無致超越大臣既執之陛下已從之求恩者至於再至於三則僥倖自息紀綱常存㽞此超等之恩以待有功之賞又覩近年刑典太寛漸啓姦路且殺人者死古今通制自朝廷降勅死罪情理可憫者並令奏取勅裁免或有不中明言更不駮勘自此殺人者得設計謀造作情理一行上讞無不容貸者其法不過杖􅆃配軍獲生者雖荷寛恩被殺者幽寃何訴所以天下殺人之獄嵗益多矣實恐自此豪强之民有殺人命者行賂造情以求奏貸無復償其死命此盖欲為寛法以感召和氣臣實以謂不然至於盜賊之黨在制其萌兆小盜不捨則大寇不集前代本因小寇失制遂成嘯聚為天下患者多矣近貴州刼賊何安等六人各執槍杖自稱將軍本處知州譚綜妄作情理奏聞貸却五人逺方之民被此强刼今貸活之臣恐自此盜賊不懼若遇荒嵗群黨必成結聚既多必須加兵峻法以誅之臣謂誅其衆於後曷若戒其事於前欲望今後各處奏到殺人强刼罪人如其情理無可憫之狀即乞依法處正不與容貸臣出於儒生非樂聞深典實恐沈寃無訴弊門公啓兼恐法不勝姦寇盜益熾故宜早絶其萌無使至於難制也所謂熒熒不已炎炎奈何涓涓不已將成江河此之謂也又貪婪之吏唯財是圖常使懐於懼心則不敢侵剥於下先帝深疾􅂍汙如法嚴戒一經黜削不復齒用近年貪吏益衆盖由寛法所致向來以􅂍廢棄者既獲甄叙又降勅不許按察之官召人告首自此貪心益固自謂得時按部之官轉難𤼵舉前嵗太常博士王昌符知循州為政貪濫逺近所悉朝廷令放離任皆謂必獲罪譴到闕轉屯田貟外郎又職方貟外郎沈厚載知南劒州在任貪濁不公祗為勘官非才致其漏􅃠然其曲情枉法事迹灼然洎移知歸州亦轉正郎此所以為過者不惟無懼罪之心兼亦有望恩之意伏乞遵先朝嚴制改近年寛典用威􅂍猾以安黎民又覩軍戎之政稍失防制兵士漸恣不懼都將都將畏罪姑息其下盖由近嵗寛階級之法啓輕慢之心故也夫軍容不入國國容不入軍此明治兵之政與常法異也若都將有誅剥其下虐用其人灼然可罪固不可寛之也若小小曲直亦不須一一量較輕重況都將本出於卒伍豈無小過失若令兵衆持而制之則更無畏憚既不畏都將又安得不恣横為非若必須無瑕方可臨衆則舉天下能有㡬人故在制置其宜無使兵衆輕制都將都將反畏其下也每有兵士論訴都將公案内有小小之過皆亦下獄勘罪結案取裁此亦望朝廷别為經制漸使都將有權則兵不敢驕縱近戎州奏寧逺指揮兵士馮順等一十八人共謀結連逃背徃頼令寨先斬却寨將勾鑒後撥出本寨衣甲器械虜掠守把兵士逓鋪軍人徃資榮州界打刼收拾人馬回來搓破戎州占坐候兵馬到却走入蠻界兼買猪於神廟飲血酒為誓因徒中告首幸而敗獲不然則為一方大患矣此乃不畏都將所致也望朝廷深切戒之速宜改立治軍之法皇祐五年籍又上奏曰臣聞昔太祖時慕容延釗將兵一舉得荆南之地方數千里兵不血刃不過遷官加爵邑錫金帛不用為樞宻使曹彬平江南擒李煴欲求使相太祖不與曰今西有汾晉北有幽薊汝為使相那肯復為朕死戰耶賜錢二十萬貫而已祖宗重名器如山嶽輕金帛如糞壤此陛下所當法也狄青奉陛下威靈殄戮兇醜克稱聖心誠可褒賞然方於延釗與彬之功不逮逺矣若遂用為樞宻使同平章事則青名位極矣寇盜之警不可前知萬一他日青更立功欲以何官賞之且樞宻使髙若訥無過若何罷之不若且與移鎮加檢校官多賜金帛亦足以酬青功矣康定元年監在京樓店務蘇舜欽論賜第䟽曰臣竊以賜第之典於國體至重前朝將相非有勲業則不得賜第京師近劉平血戰亡軀家族無託朝廷方推此恵時謂當然今兹醫卜庸流濫有求請煩瀆天聽侵亂邦經況賞罰二端國之神器所以驅駕豪傑示信四方若死行陣之家與伎術之軰均用此賞臣竊恐輕重失宜矣方今西鄙未寧暴師塞外流傳四出何以勸人伏望特降徳音即時寢罷況柳堯卿自有居第極為華侈若以其醫藥有効自可以金帛賜之上以重恩賞之科使戰伐者盡其死力下以絶僥覬之望俾貪冒者萌其耻心臣事在職司合有獻納盖期賞之不僭非敢文而自營上瀆宸嚴無任懇到之至慶厯三年知諫院蔡襄乞責罰醫官状曰臣竊見近寳和公主及鄆國公主相繼夭傷供藥醫家已聞下開封府取勘者臣切知豫王鄂王薨時醫官亦是取勘只降一兩官未旬月間尋得牽復切慮今來亦只似此行遣乆逺不便況近來小兒醫官不一二年超升官資賞賜無數奏薦異姓恩澤過於兩制官寮賤者立貴貧者立富若以死生有命藥餌難工自來所醫疾病盡是命當痊愈此等何故濫受恩賞恣為僥倖若以從來痊愈因藥合受恩賞今日所醫無騐自當伏就刑罰臣切聞先朝周王薨其時醫官李某杖背逺配廣南陛下一二年間皇子皇女繼亡六人盡在此軰數人之手兼臣聞醫官各是臨病互相推托不肯及時下藥以􅃱病深雖有良醫無由措手其罪至重比於李某合更加刑其術至謬求之今人不為難得伏望陛下念祖宗社稷之重特因此時深行刑法庶使後人知懼藥餌盡心實為乆逺保育皇嗣之計四年知諌院歐陽脩論張子奭勞少恩多䟽曰臣風聞知汝州范祥為相度陜西青白鹽敕差張子奭權知汝州子奭自選人二年内遷至員外郎朝廷之意雖曰賞勞而天下物議皆云僥倖盖以子奭宣勞止兩次而遷官恩賜已數重自古賞功不過一次賞之不已故難弭人言初自選人改京官曰賞勞未及二嵗改秘書丞又曰賞勞賜以章服又曰賞勞秘書丞不乆又曰賞勞合得太常博士超遷員外郎又曰賞勞後行祠部為名曹又曰賞勞作京官合作知縣而作簽判又曰賞勞一任未滿合更有一任知縣又超通判差遣又曰賞勞此所以外人之議不允也況范祥暫出幹當只合交割以次官員或轉運司自差人權今朝廷差人已是失體又於子奭為此僥倖今朝廷待闕在京者甚衆豈無一人堪權知州者朝廷每用一人必當使天下人服今每一差遣則物議沸騰累日不息昔五代桑維翰為普相一夕除節度使十五人為將而人皆服其精今中書差一權知州而不能免人譏議者盖事無大小當與不當而已其張子奭伏乞追寢權差之命仍乞今後外處差出知州只以本路轉運使差官權至於賞罰之柄貴在至公今莫大罪不過一刑而止豈有勞者終身行賞而不已亦今後有勞效之人量其大小一賞而止若有別著能效則拔擢自可不次人亦自然無言伏以朝廷用人惟患守例而不能不次選任但不渉於僥倖實有才藝之人誰敢有言子奭作使西鄙不為無勞但恩賜已優於賞已足可惜令天下指為僥倖之人而掩其前效況又上虧朝政不可不思嘉祐五年脩又上奏曰臣竊以謂治天下在明號令正朝廷在修紀綱號令所行紀綱所振由人主有賞罰之柄也若號令出而不從紀綱弛而不整又不以賞罰臨之而欲正朝廷治天下臣不知其可也今者陛下親祀宗廟不敢獨受其福推恩羣臣遍及中外此聖徳之至深厚也而臣下輙敢有所輕重以謂例恩泛及視以為輕而慢之原其情理其可恕乎方祫享始畢恩典推行命出之日宰相押班百官在列宣揚制誥布告天下而將臣偃蹇不肯受命稽停制書四十餘日有司無所申舉恬然不以為怪是陛下號令不能行於朝廷而紀綱弛壊於武士凡士之知治體者皆為陛下惜也臣謂方今國家全盛天下無虞非有强臣悍將難制之患而握兵之帥輙敢如此不畏朝廷者盖由從前不惜事體因循寛弛有以馴致也今若又不正其罪罰而公為縱弛則恐朝廷失刑自此而始武臣驕慢亦自此而始號令不行於下紀綱遂壊於上亦自此而始夫古人所謂見於未萌者知之眀也若事有萌而能杜其漸者又其次也若見其漸而興之浸成後患者深可戒也臣前日為許懐徳事曾有奏論略陳大槩盖以方今賞罰之行只據簿書法令以從事而罕思治體況如懐徳在法非輕於事體又重故臣復罄愚瞽伏乞聖慈裁擇而行之脩又上奏曰臣聞江淮官吏等各為王倫事奏按已到多時而尚未聞㫁遣仍聞議者猶欲寛貸臣聞昨來江淮官吏或斂物獻送或望賊奔迎或獻兵甲或同飲宴臣謂倫一叛卒放肆猖狂而官吏敢如此者盖知賊可畏而朝廷不足畏也今若更行寛貸則紀綱隳壊盜賊縱横天下大亂從此始矣何以知之昨王倫事起江淮官吏未行遣之間京西官吏亦須輕恕京西官吏見江淮官吏已如此則天下諸路亦指此兩路為法在處官吏皆迎賊棄城獻兵納物矣則天下何由不大亂也臣伏思祖宗艱難創造基圖陛下憂勤嗣守先業而一旦四夷外叛盜賊内攻其致害之由者誰哉皆由前後迂謬之臣因循寛弛使朝威不振紀綱遂隳今已壊之至此而猶不革前非以寛濟寛何以救弊如晁仲約等情法至重俱合深行議者無由曲解或聞以謂自是朝廷素不為備不可全罪外官假如有殺父與兄者豈可只言自是朝廷素無教化而不罪殺親之人又如有人掠奪生人男女金帛不可只言自是朝廷素無禮遜而不罪刼人之賊迂儒不可用可笑如此李熈古豈獨是朝廷素有備之州傅永吉豈獨是朝廷素練之兵盖用命則破賊矣今朝廷素無禦備為大臣者又不責之守州縣者合有罪又寛之天下之事何人任責切緣韓綱是大臣之家父子兄弟並在朝廷權要之臣皆是相識多方營救故先於江淮官吏寛之只要韓綱行遣不重今大臣不思國體但植私恩惟陛下以天下安危為計出於聖㫁以勵群下則庶㡬國威粗振賞罰有倫其晁仲約等乞重行朝典不可寛恕慶厯八年侍御史知雜事何郯上奏曰臣昨訪聞修瓊林苑看池樓兵士經三司論告監官内臣張繼昇盜官材木方下軍廵院勘劾為事連及御藥院祗候何誠用尋奉中㫖釋放臣於十月十日已具劄子論列乞重下有司勘實用辯虚實至今未䝉指揮䖏置緣繼昇所犯情狀於法不輕未正典刑頗渉物議臣既有聞見理當盡言夫聖王御天下其要在刑政齊一而治化興焉莫怨於仇讎而有功必賞莫愛於親戚而有罪必罰賞不以仇讎廢罰不以親暱弛然後綱紀法令莫不粲然而政之廢舉猶有逺近事之利害猶有大小朝廷親暱之臣近也有罪不治其害大天下䟽外之臣逺也有罪不治其害小何則朝廷本也天下末也繩小自其大正末從其本將欲正天下必先正朝廷將欲正朝廷必先正親暱未有親暱正朝廷亂未有朝廷正天下亂也伏以陛下自紹休聖圖刑政之柄修舉不墜臣有犯少所寛假今宥繼昇豈非誠用因方在親侍以累及為請故薄其罪以貸之夫以誠用被陛下恩私故貸其刑是罪均而罰異也或將盡宥則政弛而法隳也此則溺愛之弊越於前而害政之隙開於後也人君制刑罰於親踈無異也非不仁也盖將正一罪則使千萬人懼也今以恩貸一繼昇必將啓百繼昇之犯從而赦之是獲安全者寡而陷戮辱者衆矣昔漢武帝時隆慮公主子坐殺人廷尉請論罪帝不敢以親故誣先帝法遂可其奏唐憲宗時五坊使楊朝汶因理五坊息利錢囚捕平人裴度因對極言上曰欲與卿商量東軍些小之事我自處置度曰用兵小事也五坊使捕平人大事也兵事不理只憂山東五坊使暴横恐亂輦轂上大悟廼罪朝汶推是而觀二主非薄於骨肉親暱示不以私恩害公義也伏望陛下以漢唐二主為監割不忍之恩正罪人之名使中外之人釋然知刑政無所私則天下幸甚臣踈逺而議親近豈不知誠用方被眷遇威權甚盛言𤼵則禍及無所畏及者盖職在言責不忍負陛下奬用也謹錄漢武唐憲宗所行事迹二條進呈伏乞聖慈特賜省察并臣前奏下中書施行皇祐二年知諫院包拯論明堂覃恩䟽曰臣伏覩眀堂敕書應文武百官内臣並與遷轉臣先以風聞曾具論列并乞召對不䝉開可退用憂迫弗遑啓處竊以爵祿者天下之公器而邦國之大柄也惟士之有功與徳所宜䖏之非此二者不可濫與夫人君者固宜慎之惜之茍輕用之則壊公器而失大柄一綱或紊百目皆隳雖善為治者亦末如之何況今吏貟益衆財用益殫為國計者自當澄汰冗雜以寛調度豈可不辯能否普加官爵是於承平之世行此姑息之事但恐賦租之廣不足給其用秩廪之多不足充其欲紀律一弛天下蕩然有不可捄之弊矣臣又伏讀近降詔㫖今後應内降特與恩澤及免減罪犯並仰中書樞宻院并所承受官司具前後詔勅執奏不得施行有以見陛下厲精革弊求治之切至也惟此覃恩頗蠧政之甚伏望陛下上禀祖宗之訓下為社稷之計所有今來遷轉恩澤乞賜特行裁處免千古之下以累聖徳之萬一臣過叨寵擢位踈責重區區之懇不能自已惟陛下㽞神省察天下幸甚拯又乞依賞格酬奨李用和䟽曰臣聞功疑惟重廼國之令規賞不踰時欲人之知勸抑先聖之格訓又馭邦之大柄也伏見朝廷先以軍賊張海等未獲特立賞格召募使臣如捉獲依傅永吉例優加酬奨近聞右侍禁李用和應募而徃不踰數旬果能殺獲張海等四人餘衆並已潰散用和授東頭供奉官閤門祗候中外聞之無不失望似非朝廷開示大信之㫖也且張海一嵗之内恣行殘暴京西四十餘郡幅貟數千里官吏逃竄士民塗炭以至江淮州縣無不震驚前後凡遣使臣悉多敗衂臣竊謂張海之害甚於王倫用和之功優於永吉而永吉左班殿直閤門祗候凡超八資授諸路副使宣事舍人今用和止超四資功同賞異何以激勸將來且有明文豈宜降等況西鄙未定盜賊間起方當責効之際不可失信於人其用和欲乞依準元降指揮比𩔖傅永吉特與優改官秩如此上之出令貴乎必行下之立功樂於自奮嘉祐四年知制誥劉敞上奏曰臣聞人主所謹一嚬一笑誠以衆人所望視天下所倣俲也古者聖王之行賞也服物之章不可幸得府庫之財不以濫予前日朝廷以龍昌期所著書下兩制臣等觀其穿鑿臆說詭僻不經甚者至毁訾周公疑誤後學難以示逺乞下益州毁棄版本未聞朝廷卓然有所施行今忽加賜五品章服及絹百匹臣未知誰主為奸邪崇偽飾虚附下㒺上以誤陛下執政又曾不能謹重政體顧畏公議茍慰藉人情賣弄國恩其失豈特嚬笑之間哉按昌期之書違古畔道所謂言偽而辯學非而博是王制之不聽而誅者也陛下哀其衰老未便伏少正卯之刑則幸矣又何賞之哉昔孔子作孝經以非聖人者無法乃比不孝之罪要君之罰而朝廷顧多昌期之毁周公臣所不曉也且陛下使臣等議之臣等不敢不盡忠既而棄其言焉豈以臣等為蔽賢而害能乎夫蔽賢而害能人臣之大罪也願陛下因正臣等之罪而大表顯昌期之書使天下皆服誦而習尚之則可以釋謗於萬世矣自非然者置臣等之言而不用縱昌期之妄而不誅乃反襃以命服厚以重幣是非貿亂沮勸顛倒使迷國之計行於側而非聖之俗倡於下臣竊為陛下不取也書曰天命有徳五服五章哉夫章服固天所有而財力又民之所出也陛下奈何曲徇大臣之意而茍榮小人之身乎將使逺方寡見淺聞之民奔走於辯偽之學沈没於非聖之論迷而不反非國家之利也伏乞追還詔書㫁天下之疑毋使有識之士窺朝廷之淺深臣不勝拳拳仁宗時張方平上主柄論曰夫人君宅海域之位以據宸極之尊攝天地之政以主名器之重言為法令動為制度其所以藏身之固者賞罰二柄而已故萬邦黎獻共為臣僕義勇投命賢傑效智挾藝能者懐爵祿而畢力暴威武者顧斧鉞而死心巍巍乎南面而臨天下人用畏戴由私有二柄而公用之也謂天之大寳必由受命而得是謂國之利器亦以假人而失故明王誡慎視聼感𤼵寤寐以求道徳之老忠信之臣賢正之才慈恵之士以與居處以與圖議嚴恭祗畏奉若天命官不及私昵惟其能爵㒺及惡徳惟其賢及後佚王荒寧耽慢狎昵邪慝果行喜怒匪勤惟易柄用下失有失之閨閫有失之閽寺有失之廊廟有失之藩方原失之初率由近始雖得於外姦必在中故柄在藩方其耳目必在廊廟柄在廊廟其腹心必在閽寺柄在閽寺其肘腋必在閨閫盖情欵宻者則機隙易伺憑麗重者則指擿難及伏戎於莽中猶可虞伏戎于門不可虞也至乃后族戚里為虺蜴之宅北司内省為豺狼之窟台司公府為穽檻之地庶邦列都為斧鑕之塲四方相仇烝民殄瘁得非由上失其正而下罹其害者哉歴代敗亂覆車一軌觀夫僻君失馭强臣得政盖由厚味腊毒宴安稔慝謂篋櫝已固扄鐍不足嚴謂垣墉既修關楗可以弛倒鐏授盜脫輈自絶及奸㣲竊弄包藏結釁蟻漏壊堤炬遺燎原合抱自毫末之萌履霜為堅氷之漸以我刀鋸而威之以我衣裳而誘之皆其心腹雖平勃之謀無以遏産祿之勢蕃武之重不能正甫節之惡謝安作相弗敢阻南郡之九錫尉迥為將莫可正隋公之受遺矣故周書八柄惟王行爵祿罪誅之事洪範三徳惟王有玉食威福之專是二柄者人主所自固生民所寄命也可不慎也乎故略著前代治亂危亡之迹以為鑒焉方平又論不孝之刑曰臣聞五刑之屬三千其罪莫大於不孝周官司徒以鄉八刑糾萬民一曰不孝之刑不孝於其親有能忠於其君者乎有能睦於族􅊚者乎有能義於朋友者乎夫如是何有於民哉故曰事親孝故忠可移於君詩曰孝子不匱永錫爾𩔖王者張官布憲訓民作極必擇仁義之士慈恵之師所以教育元元導之以善使民莊事而效法之也若其身悖徳禮義愆庭闈忠順兩虧何以事上蒞官行法民何則焉故漢制郡國察舉板其行狀首曰生事愛恭䘮没如禮此漢之取士先其行之道也夫親莫親於父母愛莫愛於妻子臣向覩邸報竊見臣寮至有棄其母而不養聞其沒而不䘮或糟糠之伉儷纔仕宦而遣之傷化敗倫豈有甚此且祿仕貴乎逮養孝思至于終身故累茵而坐更起思親之感三年之䘮未報免懐之重同爨有服緦之恤舊館有出涕之哀況昊天之劬勞受我身之形氣因心所至盖自然之義慈跬歩不㤀豈俟牽於禮律奚衣冠之同䖏曾蠻夷之不如相彼虎狼尚知母子之愛惟是梟蝮不禀隂陽之和傷時人倫汚我王道且律文子罵父母者罪死今夫生不養而没不哀豈特一詈為惡之重乎況不孝之刑十惡之首非赦宥所解臣謂必正叢棘之戮肆諸市朝投不毛之鄉禦乎魑魅及聞乎有司議辟但止乎停官罰金臣竊悵然惜賞刑之失也伏以天下冠裳士人鮮全孝友之行率以宦逰或緣婚媾遂營卜乎田宅輙輕去乎墳墓茍思擇利而䖏㒺念首丘之仁古者氏族各有源流閭里繫乎圖版一則賔舉自乎鄉里一則忠孝考乎閥閱轉徙僑寓盖由亂離方我治朝疑從土㫁豈有無故而去父母之國獨善而委兄弟之親臣實見之比比而是流俗相習弗以怪時議為常不以譏節義所以陵遲民徳所以虧薄此其玷陛下之風教敗理世之體道壊法侵紀其損至大臣伏乞應食祿之人父母在别無兄弟迎養而不養沒而匿不䘮父母在或因仕宦别營田業雖父母亡没而鄉里有宗族墳墓輙於别所立産而居者無問貴卑並當削其官爵投棄遐徼雖經霈澤不在原釋諸當保任者必先列此數條於舉狀同􅂍私法連坐之其父母俱亾未葬而求官雖有明條率多冒犯臣欲乞應居憂服闋叙官日委自本鄉及所居州郡官吏保明委已畢葬即得與除叙如此則中庸之人當循禮而後動不義之子亦畏法而知懼上敦王化下厚人倫固治道之本也侍讀學士宋祁乞專刑賞狀曰臣聞天子之所以能制四海役萬民而臣之者其柄有二曰刑曰賞而已臣操之則淩洪範曰惟辟作福惟辟作威惟辟玉食臣有作福作威玉食則害于而家凶于而國昔宋子罕謂其君曰慶賞賜與者民之所喜也君自行之殺戮刑罰者民之所惡也臣請當之於是宋君失刑後為子罕所劫且子罕纔得一柄已為主患況兩得之哉伏見陛下恭儉仁厚憂勞聽㫁細務小物一更聖心近世守文之主未見其比然而任用臣下主柄外移委棄刑賞不自總攝凡有所進必待臣下之譽而用之凡有所退亦待臣下之毁而黜之夫毁譽行於上則朋黨成於下且黨人所惡能得陛下之法而罪之黨人所愛能得陛下之賞而官之則舉朝之人重私賞而輕公法捨其君而歸其臣雖欲無危不可得矣龍之所以能飛霄漢入淵泉變化不測以風雲為之衛也虎之所以能搏百獸神空山以爪牙為之使也使龍失風雲則鱣鮪等其靈虎廢爪牙則麋鹿角其能君失刑賞則見輕於天下矣況今四夷交侵師不用命財匱民怨吏以苛刻相挻官以黨與相營陛下何不収取二柄而自用之假如罰不當辜人猶知畏賞不值善人尚知恩又況陛下之徳之眀賞必善罰必辜耶魯國政在陪臣春秋為諱之稱之曰盜況擁九五之丕搆揔天下之機矩倒持利劒以資㫁割忽洪範之至戒襲子罕之覆轍輕龍虎之神威抵春秋之所諱召衰促亂何所利哉比年以來日無盛光月行黄道氛霧無時河決地動皆下侵上上失權之應也伏望陛下上揆天刑俯觀人事收威福以在手破群黨於私門奮乾綱擊雷聲行之一日天下廓然矣臣䝉恩深厚不敢愛死輕進瞽言惟垂裁赦參知政事范仲淹上奏曰臣竊見許懐徳在延州為不進兵擊賊及軍民虚驚抛棄随軍粮草遂送永興勘劾該赦釋放授秦州部署近又西賊侵邊破蕩却熟戸一千帳不能保䕶即合重行朝典以其在邊無效降充永興部署郭承祐降知相州為轉運使糺奏充北京都部署此二人一靣責降一靣遷轉天下聞之是朝廷賞罰顛倒取笑四方何以激勸勲臣何以鑒戒惰將如王信狄青實有武勇堪任管軍亦恐未有大功遷轉太速祖宗朝任用邊將賞賜至厚使用度充足委信至重使生殺在己惟惜官職不令滿志恐有懈惰不思立功實前王馭將之術也又朝廷曾降詔所闕都虞候等更不循轉候有邊功除授今却不因功勞衝改此詔而今後國家之命全無信矣惟用兵命將之令尤要取信繫之安危與其他號令不同如須合轉起亦候過郊禮使作該恩方可進爵願陛下再三思之仍乞丁寧指揮兩府今後議論賞罰不可輕易須是有所激勸不招旁議方可施行臣謂國家承五代之弊賴祖宗威徳陛下仁聖保守四海乆無祻難今四夷已動百姓已困倉庫已虚兵旅已驕國家安危實未可保惟賞罰之柄駕馭天下如賞罰頻失將何以保太平之業臣切懼之願陛下裁擇仲淹為陜西經畧安撫使又奏乞重定戰功賞格䟽曰臣等竊見用兵以來戰陣行賞逐䖏起請所見各異或謂須要首級或謂當錄陣前得力之人至於使臣軍貟並不許手下人所獲分數亦與士卒一般校功是以人無適從最害邊事臣等欲乞朝廷將元定賞格并諸䖏起請條貫重行定奪頒下諸路所貴軍中知信第賞無差蔡襄上奏曰臣等竊見河北保州叛卒昨已招降原其致亂之因乃總領之司不能覺察自都轉運使安撫使而下一例奪職降官此盖朝廷督厲天下官吏深思撫養士卒之宜先圖遏絶祻患之本然臣等切謂法令之行必自近始若捨近繩逺雖法令日行人不信服臣聞保州兵士未叛以前數月邊臣曾奏都大廵檢下兵士乞早䖏置恐其生變大臣聞之絶不為意以至殺戮官吏閉城邀命然後蒼黄或招或攻或作曲赦幸其革心不至大害且帷幄之謀臨事先當準備豈有邊臣奏論如此等事都無制置循以成患其誰之咎今張温之等已責降其中書樞宻院大臣與聞軍政者伏乞陛下推邉臣所奏保州兵士事宜因依特與責罰庶乎法令明而天下服襄又上奏曰臣等近以保州叛卒平定之後朝廷以都轉運張温之以下不覺察之罪例皆貶降臣等聞保州兵卒未叛以前邊臣曾有奏請早乞䖏置絶無施行遂至生變臣等伏乞陛下責罰大臣與聞政者伏聞陛下已得邊臣之奏特以輔弼之重屈天威而恕之伏惟陛下專賞罰之柄而所謂罰者已行於逺而不行於近既失之矣所謂賞者又錄其終而不錄其初又重失也邊臣先能探刺叛卒情狀聞于朝廷其時大臣茍能深慮而預䖏置之必絶叛亂之祻及殺殘官吏閉門邀命四面之兵合謀招討中外震駭尚賴朝廷威靈所加即時平定設使偷延時月城堅而不下宿兵於野費用不貲其變豈可量哉今招叛卒閉城門殺賊首者盡皆遷官䝉賞而預言必變之狀者棄而不錄所謂勤於其終而不念其初者也語曰曲突徙薪無恩澤焦頭爛額為上客正𩔖是矣所有邊臣預先數月奏論保州事宜者伏乞陛下出宸㫁特與恩奨庶使守邊之人精心察伺先絶未萌之患較於推恩之術不猶愈於攻城殺賊而後泛行官賞也起居舍人知諌院范鎮上奏曰臣伏見近日月入南斗月属隂南斗主爵祿天意若告陛下將有隂邪小人干冒爵祿者而欲陛下謹爵賞也近日以來在外傳聞皆以謂温成葬事將畢石全斌以下及諸工巧人公然揚言妄冀遷改陛下不可不祗畏天戒以固拒之也夫爵賞之出本於慶喜如緣温成葬事而施爵賞是以慶喜而幸温成之䘮也天意人情俱為不可而外議如此紛紛臣若不先事建言萬一有此而後論列是徒暴朝廷之過於中外而於事為無益也鎮又上奏曰臣伏見自去冬多南風今春多西北風又黒氣蔽日天色沈隂雨而復止者數矣此皆政事不決之應臣兩奏乞與御史辯陳執中事仍乞牓朝堂及今十餘日未見行下臣竊以賞罰當否在於辯是非是非不辯則賞罰随而廢矣陛下向諭臣樞宻院本欲㽞陳執中畏御史之言遂不敢㽞樞宻院以御史之言是而畏之邪將以為非而畏之也以為是而畏之則可以為非而畏之殆非陛下所以任之之意也今陛下不以是非自專而以責中書樞宻大臣中書樞宻大臣又不敢主是非主是非者御史爾而御史是非謬已如此御史中丞知雜御史又左右之夫所謂謬者棄法律而牽於浮議也任私情而不顧公道也務角勝也專於為逆詐也陛下何不勅大臣以法律䖏之以古人所行之事折衷之則是非辨而賞罰當矣漢宣帝時魏相為丞相其傅婢有過自死於是趙廣漢為京兆尹疑丞相夫人妒殺之即上書告丞相罪魏相亦上書自陳妻實不殺婢相自以過譴笞出至外第死而司直蕭望之亦劾奏廣漢摧辱大臣傷化不道廣漢并坐賊殺不辜等數罪腰斬於市吏民守闕號泣者數萬人亦有請代廣漢死者皆不聼宣帝明主也廣漢能臣也吏民守闕數萬人非特御史中丞知雜御史一二之為助也然而卒斬廣漢者以為嚴上下之分戒險薄之俗不得不然也臣言此者非欲陛下斬御史如廣漢比也直欲陛下知古人嚴上下之分戒險薄之俗如此其決也乞以臣章并御史所奏宣示中書樞宻大臣詳正是非如以臣章非是則乞免臣職終身不齒如以御史所奏為非亦乞依公施行所貴賞罰分眀則風雨序而日光復矣歴代名臣奏議卷一百八十七
