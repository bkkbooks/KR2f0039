body:
  text: 歴代名臣奏議卷一百六十二明楊士奇等撰建官宋徽宗宣和中殿中侍御史許景衡上奏曰臣仰惟神考肇新官制凡省䑓寺監之官無有小大閒劇皆極一時之選比年以來其選寖輕間有躐等濫進未足以副仁聖繼述之意者此不可不論也伏覩近降指揮廸功郎李景雲孫恕江大一或以應奉有勞或以擬進御題試䇿各與改合入官除寺監丞主簿驟從初等選人入為寺監之屬命下之日聞者惑焉今士大夫服勤州縣積累考任無慮二三十年僅得為郡守貳然而睥睨寺監丞佐有終身不可得者孰謂初等選人姓名藝能素未有聞考第薦舉猶未應格而遽得為之哉且應奉有勞近例止於改秩未嘗為職事官者而擬試御題乃是在外著撰就使文字稍工亦非多士造庭親奉清問之比也而改官除職度越累朝牓首恩例其夤縁僥倖遷進之速皆前此所未有也乃者卿監尚書郎或出於戚里勢家或係監當資序皆自宸筆簡汰冗濫且詔繼自今非歴寺監丞以上不除郎官少監名器增重士論悦服夫省曹監貳選格之嚴如彼而寺監丞簿冒進之易如此則是今日之冒進又将為他日之當得者矣澄源正本實在今日其李景雲孫恕江大一為寺監丞簿指揮伏望聖眀詳酌特賜詔罷改用真才以待卿監省郎之選且契前日手詔丁寧之意景衡又上奏曰臣竊惟州置通判雖曰佐貳守臣然自祖宗以来選擇畀付目為監郡使州将有所畏憚則任屬之意深矣故雖遐方小壘皆自朝廷命之伏自近年帥臣監司偶縁一時申請例得辟置陛下獨智逺覧以為寖失祖宗之意乃於政和丁酉特降御筆以戒在服今纔㡬何時而冒法觸禁者復作矣若河北轉運司奏辟張恕通判莫州河東經略使乞辟彭作通判平陽府是也然此特其所部之支郡耳至若知河間府詹度奏辟張公濟通判本府則又其甚者也夫漕臣許辟其屬三路帥臣許辟幕府若州縣城寨之官則各有著令至於通判則無明文若為守臣而得辟置則是門下私㤙之士也尚能舉監郡之職乎且為奏辟之言者必曰選才集事乃若他州通判拘於吏部資格容有老病昏懦者今三路並邉之倅悉自朝廷選除豈有朝廷選除之人皆以為不可用而已之親昵黨友乃以為才耶夫狥私引𩔖侵紊祖宗成憲且違專降詔㫖皆近年翫習之弊不可不懲也所有張恕彭作張公濟伏望睿㫁特賜改正施行其詹度等亦乞戒飭以警慢令之吏御史中丞王安中奏曰臣竊觀棫樸之詩言文王能官人有曰勉勉我王綱紀四方盖王者作人而官使之所以立政立事而綱紀之正實自任官始恭惟神考董正治官法完令具陛下以聖徳在御亦惟先志之承則綱紀之立久矣然人懐自便之計事徇一時之求則紊陛下之綱紀者盖未能無也官有定職職有定員名位不同命數亦異此先王之法元豐之制也今有視秩之例非待制而視待制非卿而視卿凡此之𩔖無乃非所謂嚴分守正名實者哉此紊綱紀之一也因勞積賞賞有重輕因事遷官官有大小故寄禄有正法而許回授選人有比𩔖而許循資今乃礙正法者多特轉行合比𩔖者多特轉改故奉直以上可循月取而比比皆是銓曹一命不須保任進而人人妄求名噐濅輕岐轍益衆此紊綱紀之二也朝廷之上見闕而除官居官之吏俟期而受代此事之常然者今乃除吏之際有直替見任令别與差遣者有衝改已差下者有新闕未到且在任待闕者彼或到官日月未㡬或受命待闕已乆遽遭攘奪有至於淹回流離飢餓失所者故稍優之闕勢孤者睥晲而不敢受可進之地援寡者惴恐而不敢安噫才不才不能相逺特相與干禄耳何至紛紛若是哉若乃在任待闕則亦妨後人此紊綱紀之三也祖宗創業監唐末五季藩鎮擅命之弊乃廷授通判外察守臣此萬世之法也今方面之臣有辟置本處或屬部通判者殆失所謂監郡之意借曰選才辦事且猶廢法亂常況亦不過于徇干請恩親舊而已耳陛下比降御筆罷諸路帥辟支郡守矣獨此未之戒何邪此紊綱紀之四也凡兹數事臣願陛下深燭其原斷自宸慮親御翰墨大正綱紀往者縱不可追來者猶可止也如此則人安其職事適于理覬覦之望奔競之風庶㡬少息矣惟陛下裁擇欽宗時御史中丞許翰上言曰臣聞成周以來官不必備故唐建六曹三百年間尚書之見於史者不過數人國家凡中都官亦多闕而不補至崇寜間蔡京用事乃始盡補䑓察之闕當時佞臣稱賀以謂賢才衆多自是省寺之間始備官矣方今當且罷不急之務闕可省之官至於諸道郡縣之吏祖宗所無者皆宜量事定制裁去冗濫庶㡬安民豐財以濟武事且多故時振興蠱壊則有隨事之宜又當増官置吏者非一若不蹔損所緩以赴所急素食猥衆則國将何以給之侍御史李光上奏曰臣等伏見諫官劄子稱䑓諫官均為人主耳目至於正救闕失防㣲杜漸又非䑓官之比縁閤門之班自來先䑓而後諫兼近來又有得㫖及指日引見上殿人致諫官求對有三五日始得班次乞今後宰執班退特留諫官一班閤門遂取㫖定諫官班在䑓官之上臣等竊詳諫官申請止乞宰執班退特留一班未甞乞引班在䑓臣之上兼上殿班次先䑓而後諫係是祖宗法而䑓臣令著止稱言者則正救闕失防㣲杜漸與諫官事體一同所以均為耳目之官今來閤門引班上殿却以䑓臣在諫官之下顯見有違祖宗以來一定之法兼亦非諫官申請之意欲乞今後䑓諫同日上殿以䑓諫雜壓為先後況今三院御史並言事則上殿者多仍乞依諫官已得指揮宰執班退特留䑓臣一班在指日班前庶使䑓諫一體仰稱陛下崇奨之美意髙宗建炎間尚書右僕射李綱上言曰臣竊以承平之際雖無事當備官以張朝廷之容艱難之際雖多故當省官以責事功之實至於禄廪亦當隨宜裁節以濟一時之急盖世方多難財用之入不比於治安之時而用度之廣有過於無事之日非加裁節以協厥中則何以為經乆之制用過乎儉非得已也文臣六曹尚書侍郎事簡者不兼置給事中中書舎人之𩔖可闕其半寺監長貳六曹郎官以繁簡相兼學官舘職之𩔖比舊制減半開封府曹掾依舊改為推判官武臣條具員額除見領軍職及團結新軍置正副統制部隊将外餘並量事減貟如此則中都之官省矣監司彂運使副以兩貟為額屬官減半提舉香塩茶礬司併歸提舉常平司提舉市舶除廣南外餘路併歸轉運司提舉保甲司併歸提㸃刑獄司屬官不得過一貟如此則外路之官省矣通判兩貟處止置一貟以司録依舊為簽書節度判官㕔公事曹掾官依舊為節度觀察軍事推判官録事司户司理參軍添差監當官並罷縣萬户以上置丞不滿萬户者不置如此則州縣之官省矣三省樞宻院人吏員額及轉官正法並依祖宗舊制監司州縣吏貟三分減一如此則吏貟省矣應宰執子弟帶貼職及待制以上並罷如此則職名省矣宰執俸禄及見任宫觀未有差遣待闕京朝官以上俸錢並減三分之一如此則廪禄節矣省冗員節廪禄以濟一時之艱難俟将來恢復天下再安自當依舊則官吏亦豈曰厲已哉此今日不得已之務也如合聖意乞降㫖三省措置施行御史中丞許景衡上奏曰臣訪聞京西州縣累經殘破所在多闕正官並是權攝𩔖非其人瘡痍之民寃抑無所訴且日虞鈔奪誠可憐憫契勘鄧州守臣兼帥京西南路近䝉朝廷就差劉伋議者以為得人正可委以經理一路選辟官吏撫循兵民屏除盜賊且遏邊騎況今已是防秋之時若候本官到任申請則文書往返糜費日月不足以濟緩急臣愚欲望聖慈詳酌速賜行下就委本官前件職事庶㡬存撫一方不致稽緩闕誤景衡又上奏曰臣伏見祖宗之制選人改承務郎以上官者嵗以一百貟為限仍逐月均定人數引見至元豐中稍加至一百三十五貟方是時承平滋乆人材日盛而改官之數止於此者盖吏部闕次有定限故也又承務郎以上一嵗之内致仕罪廢死亡大略須減百餘貟故以新改官人補之是以吏貟不至甚冗而銓部差注不至壅滯俸禄給賜不至闕絶故百餘年間上無失職乆閑之吏而下無被擾受弊之民此法度維持之效也伏自崇寜以來用事者徇私市恩始壊祖宗之法選人改官更不立限一嵗有至數百貟籍名吏部者多至不可勝數計一闕率四五人共之自古官冗之弊未之有也其源皆岀於入流太雜及改官不限人數之故方陛下紹復祖宗之制以成中興之業則官冗之弊所當首加澄革也其限數改官伏乞睿㫖下有司遵依舊法施行祕書省正字洪遵上奏曰臣聞古之盛時文徳懷逺凡四方萬里之外罔不慕義賔服行李往來殆無虚嵗中國所以待之之禮則亦有加既為之郵傳供張以舎之又設官以擯相之故行人典客聞于周秦自漢以來始置大鴻臚兼治祭祀朝㑹封襲道釋之事有國者所不可廢也恭惟陛下以不世之資光啓中興思與生靈休息而清疆場之虞英斷剛明排斥異議獨任一徳之臣結驩北國以建萬世長乆之䇿使南北元元仰父俯子而知有生之樂然其使車脩聘結轍於道雖處之有邸其至如歸而司賔之官猶未及建誠為闕文臣愚欲望聖慈討論舊制復建鴻臚若使人至止則率其屬以主擯賛之事閒平時自可脩舉本職庶㡬逺方知朝廷所以尊崇之意亦今日之先務也胡寅上奏曰臣聞設官分職凡以為民受官蒞職非以為身兵興以來衣冠失所者衆於是開奏辟之路置添差之闕廣宫廟之任増待次之除所以惠恤之者亦厚矣而奔競日昌不安義命方在責籍則乞叙雪已得叙雪則乞祠禄已得祠禄則乞差遣已得差遣則乞改替已得改替則乞近闕已得近闕則乞見任已在見任則乞超擢攀縁進取肩摩輦下士風之弊莫甚此時人以私計不便為言豈有體國在公之念曲徇其意則闕少貟多勢難均及漠然弗顧則造為譏謡有害治道伏見舊法已有差遣未滿任及方在貶謫者不得輙入國門所以杜貪躁清仕路存綱紀也臣愚伏望陛下明詔宰執舉行成憲有馳騖不悛者仍委御史䑓覺察彈奏重懲治之庶㡬澄清選授興崇㢘耻合傅說惟治亂在庶官之戒無子産恵而不知為政之失誠中興急務也寅又上奏曰臣聞昔冉有退朝孔子問其何晏也對曰有政孔子曰其事而已如有政雖不吾用吾必與聞之既譏冉有之以事為政又以明大夫之職當與政而不與事也列國之大夫尚以與政為先務而况天子之大臣乎夫審於音者聾於官明於小者暗於大而以庶事不舉必躬視而行之則於大政必有偏而不起之䖏矣聖人之言後世法也今左右大臣陛下之所委任以圖中興之丕烈而兼緫六曹有司之事至於受詞訴閱案牘走卒賤史一有所求皆得自達窮日之力不得少息皆細故也而政事堂與州縣無以異矣自頃刀筆之吏偷安之人竊據此地勞心畢智於簿書期㑹之間以為稱當無足深恠而餘風尚在乆弊未革此天下所以疑中興之無效也臣愚欲望陛下詔宰相大臣選補六部長吏凡有格法者一切付之使得各舉其職則大小詳要不相奪倫中書之務清有司之事治文移奏報各従簡省廟堂之上可以志其逺者大者乆長之䇿恢復之功庶乎可冀矣寅又奏曰臣竊謂無功而受禄則有功者不服故曰士無事而食不可也今日有之宫觀嶽廟是也臣嘗論之矣夫既以禄養無事之人而磨勘轉官暗理資任與服勤職事積日累勞者無以異是以官爵益濫任子益衆賢事不勤而用人之資格廢矣是弊政之大者豈可不為之限制哉臣愚伏望睿㫁詔大臣立法應宫觀嶽廟人並不許理磨勘月日入官資任庶㡬名器稍重勞逸殊科於今日興事建功之政所補不小大臣侍從以身率之則人知僥冒之不可為而心自帖服矣所有臣前来奏論未䝉采用亦望聖慈指揮檢㑹特賜施行寅又奏曰臣竊見近嵗帥臣監司更易頻數雖使絶人之才居之號令未及信扵民而已報除代矣建官分職皆以為民今二年成資徒欲為人擇官速扵使闕非為民也為政而不為民茍徇士大夫饕禄營私之計則非政矣臣愚欲望陛下明詔大臣凡前宰執侍從官為州郡未滿三年不許除代其庶官知州及轉運副使判官提㸃刑獄候到任一年方差替人其餘凡係堂除者除代以兩人而止仍皆以三年為任如此則官有宿業之志功緒可稽士息競奪之風亷耻可立乃中興急務也寅又奏曰臣竊以州置通判佐守而治廵行屬縣號按察官其任重矣祖宗舊制必兩任知縣無罪犯有保舉然後闗陞通判其難其慎如此近来由判司簿尉初改官人雖為京朝官而實不曽歴親民差遣者例皆不肯叅部便欲直為通判其意以謂一經堂除即是資歴他時可以攀縁越次差遣其人既不安於小吏之分而有驟升半刺之心則必作勢威黷貨賄為民之害無所不至茍徇其欲豈所以為治也伏望睿㫁詔大臣嚴守格法不輕除授其已除未赴者亦乞别作施行庶幾息僥倖之風勵人材之操以稱陛下奉若成憲擇吏而爱民之意寅又奏曰臣竊見比来嵗旱民力已竭而國用方滋縣令近民之官尤宜慎擇而賢才可用合入知縣之人往往禄隠扵宫廟而自以為能者則未必不為民害此國用之所以日屈而民力之所以重困也臣愚謂宜籍中外已為臺省寺監官依倣漢制分宰百里俟有治績不次升擢則又増重事權優假其禮借以服色厚給餼廪凡軍馬屯駐本縣者許其節制其經由者悉從階級則又據今諸路縣分户口賦入分為三等上等自朝廷除授中等自吏部注擬下等令帥臣監司同共辟奏立為定格不得差互則又用宋元嘉致治之法以六朞為㫁革去三年成任両考成資與堂選數易之弊則又立四條為三等縣令考課之法曰糾正稅籍曰團結民兵曰勸課農桑曰敦勉孝弟俟及三年考其績効已就緒者就加旌賞未有倫者嚴行程督皆無善狀則黜汰之則又命從臣各舉二人之能任亦刺舉二人之姦􅂍者皆籍扵中書俟攷按功實以次施行如是則縣令之選重仁人君子有愛民利物之心者屑為之安民固本為中興不拔之基其與用才取辦斵䘮元氣以成膏肓之疾者相去逺矣臣言或有可采伏望睿㫁詔大臣詳酌而行之章誼上奏曰臣契勘尚書六部寔朝廷典則制度之所在其人吏掌行文書奉循法令尤當謹闗防明約束不與他司交通然後人人孤立一意以守職業是以不許諸䖏抽差雖奉特㫖聽奏知不遣著為定令盖有年矣近者官司凡有建請率稱如有一切拘礙且依今来指揮彂遣以是省曹人吏不復安職造請干求唯利是視身在他司而籍居本部當劇曹重案之日則亟去不顧在禄優事簡之地則厯年不還然猶請給自随轉遷如故来往紛紜有同𫝊舎豈朝廷設官置司之本指哉欲望聖明推嚴舊制一切禁絶設有選委特差即乞割移元籍徹去舊請庶塞僥倖之門不勝幸甚如臣所言或有可採乞賜詳酌立法施行孝宗時趙汝愚上奏曰臣竊聞近降指揮令檢正檢詳都司官同議諸軍司馬兵曹參軍胄曹參軍記室參軍資任等事臣輙有區區管見恐或可備採擇之萬一謹條畫如後一臣伏聞所置官屬各有分領職任議者盖謂古者建官分職皆不徒設今既並建衆寮因欲使之分理庶務幸甚幸甚然臣思之天下之事亦當為之有漸使國家蒙實利而令上下不驚不疑故能持乆不壞彼諸軍自和好以来四十餘年不復置參佐軍中庶務惟决於主帥固難以盡拘繩墨今一旦錢榖器械之𩔖朝廷盡責成於參佐主帥束手無復少肆揆之人情固自不堪加之所置官屬人人既有職務則自當盡心守職以仰稱使令然於職事之間必至互有争占賔主乖異易至紛紜将使一夫受疑羣職盡廢究觀事理恐或至此臣愚欲望聖慈且令所置官屬逐日秪赴本軍供職通僉書本軍文字如諸州幕官體例若遇軍中有大政令及更革事件亦許與主帥公共商量但使賔主叶和其間自多裨益故臣謂今日朝廷設官大意本謂長養人材宜且令優㳺在軍中使習知諸軍事體未須驟然責以職事候一二年間人情上下漸漸相安至時朝廷别有委任事件却乞徐議指揮未晚一㳂江諸帥驟聞朝廷建置官屬而初未知朝廷之意将謂别有闗防竊恐妄相傳播人情不安臣愚欲望聖慈特降詔書訓諭諸將使知朝廷本意盖秪欲文武並用如比年武臣既為監司守臣選任非一文臣却欲使之習知軍中事務庶幾緩急必能協濟諸将亦當深體朝廷之意務在協和相與同心共濟國事一臣昨甞面奏諸軍官屬全在選擇得人若用一種剛正有守之人則恐意氣不能相下若用一種和柔易制之人又恐依随不能自立須是得持已公亷接物寛厚知事體有識慮之人方能稱職然則朝廷一時選任誠未易多得也臣愚竊謂今来所議官屬資格宜令稍寛庶幾人材合格者多易扵選擇一自三衙至蜀漢軍屯十餘䖏合置官属四十餘人固不易得又縁東南士大夫憚於逺渉未必肯入蜀而蜀士之能否朝廷又未必深知萬一選用非才地逺尤為非便臣愚竊謂今来所降指揮固當逺近一體至於除用之際且乞就近差置候三両䖏措畫稍成次第又逐旋搜選得人然後迤邐自近及逺非惟人物選擇得精亦使逺方知所視傚不至一時生踈所在紛擾如臣言可採即乞出自聖意指揮施行衛涇上奏曰臣聞賞以勸功國家之所不可廢也然賞當其功則人知所勸倘無功受賞或賞幸而功不稱則人有僥心而不知貴矣此不可不察也臣近者伏見録黄大理少卿陳景俊以招撫使郭倪保舉随軍轉漕有勞與轉一官臣觀其薦詞簡率若因請嘱黽勉不獲已而為之言者臣固已疑之已而吏房送至詞頭稱合轉奉直大夫準令諸朝請大夫正法若以恩賞轉官者以四年為法各計所得磨勘收使縁景俊係一時特恩臣已與撰述詞命繼有詞黄亦止是轉奉直大夫臣亦已書過昨日忽有告院人吏齎告一道令臣書名及取視之乃與詞黄不同徑自書冩朝議大夫逮取索詞黄及㸃對所冩告皆是旋行揩改字跡甚明迫晚又有前項録黄臣實大駭夫國家所恃者紀綱法度張官置吏亦相與維持此物而已若棄法度而自便抉紀綱而壞之其害可勝言哉景俊見任朝散大夫所得轉官賞若用本法自不當轉設有特㫖與轉奉直大夫足矣今又超轉無乃不可乎且景俊将漕淮東僅五閱月師行無功雖非其過然軺車未甞出境不過蹔至盱眙督趣諸縣官吏有何勞能一旦冐轉所不當得之官此不可一也在法有出身人雖許自朝請大夫超轉朝議大夫然須用七年磨勘景俊無出身止合先轉奉直大夫亦須用七年磨勘又七年而后得轉朝議又拘以員數遇闕額方補若因特恩始不拘員闕許之改轉景俊以合得四年磨勘之賞與之轉七年之官已為叨竊今徒以數月之勞而超轉十四年之官毋乃太甚乎此不可二也在法除有岀身人許超轉外雖有帶職人亦許超轉之文盖得此者殊少臣度景俊今不過援此為說臣又以不然凡帶職者必是外任若見帶職外任與之轉行猶之可也景俊任淮漕日常帶直寳謨閣今既歸班謂之寄職不悉元法亦有寄職並許超轉之文乎且重内輕外人之常情在今為尤甚景俊身則欲居朝列以幸速化至於轉官則引用外任帶職條法何其巧於擇利而行乎此不可三也又有甚不可者景俊乆任法官固當守法縱使有寄職亦許超轉之文兼有已行之例亦合伺候吏部申明朝廷退聴可否儻可得之豈不明白何至徇私舞文倉卒營求别降特與轉行指揮影帶引用破壊成法自以為得䇿不思人之視已如見肺肝殆𩔖掩耳盜鍾白晝攫金亦何異登龍㫁以㒺市利之賤丈夫乎且前後朝列寄職者盖多矣未聞因賞典轉官引用帶職之文超轉官資者今使景俊巧計而得則此一倖門實自景俊啓之源源而来夫孰能禦此臣所謂甚不可者也且景俊身居九卿班列不為不高固未暇責以體國之誼㢘靖之節使其稍自愛重循次而進亦奚患不達顧乃因職任諂事軍帥請囑薦進又覬望超轉官資僥求茍得寡㢘鮮恥欺㒺衆聴撓亂朝綱具此四惡非小過也夫以區區循轉一官而所為繆戾至是脫若利害有大於此者其躁競無忌憚亦何所不為乎此非臣之所得盡言也臣與景俊同朝初無纎芥亦非為一官惜所惜者朝廷紀綱法度所繫士大夫風俗所闗廹於職守不容緘黙欲望聖慈特彂英㫁令陳景俊且依法轉行奉直大夫在景俊初無毫髮之損庶於事體稍安臣亦免失職之譏所有録黄臣未敢書行涇又奏曰臣聞武階以横行為重非有功不遷遥領至戎團二級在右列為寵平居無事猶當謹惜以重名器若建功立業之際正所恃以為犇走激勸之具尤不可授非其人也臣近者伏見劉伯震奉聖㫖與換武除環衛官繼而授右武大夫遥郡團練使臣初謂中興諸将之家例許換武已嘗書行退而詢之公論稽之令甲則有甚不然者伯震為劉光世親孫不可謂非名将之後但其人姿禀輕浮趣向凡下不紹前烈習成驕騃識與不識目為劉僥此非美名也伯震偃然居之曽無愧悔嘗得湖州倅即為臣寮繳駮自是由祠禄倅嚴陵夤縁再任前後别無履歴儻其有志事功與之換武使宣勞効亦何不可臣竊攷乾道中重脩中書門下省文臣換官格朝奉大夫遥郡刺史據伯震自稱見該磨勘亦不過得武徳大夫惟帶職朝請大夫以下三階方許換左右武大夫亦止於遥郡刺史即無朝散大夫換右武大夫遥郡團練使條格兼武臣官至武功大夫自礙正法有終身不得轉行者伯震何人輙尓超躐意猶未滿乃援楊文昌為比多見其不知量伯震視文昌階官雖不逺文昌為三丞為郎曽經朝廷擢用玉音嘉奨優示褒除正任刺史是為特恩安得為例至於韓杕亦有聖語褒拂猶正依格換授伯震固不應與二人比矧陛下規恢逺略旌㧞人才正功名之士踊躍思奮之秋方将以是官賞邊功勵将帥顧如伯震者得之非分恐聞之者不以朝廷恩命為重而臨事或觧體矣或言伯震近時稍加收㪘然其市井儇薄之稱喧𫝊中外之乆未聞有所植立以自表見一旦加諸右班之上庸人孺子皆得易而侮之亦何以聳動觀瞻重環尹之寄哉臣用是不避仇怨為陛下别白言之欲望聖慈将劉伯震換官指揮止與依條格換授允叶公論増重横列戎團之選使違法徼求者有所不容庶㡬朝廷益以尊嚴紀綱益以振肅誠非小補所有詞頭臣未敢撰述太子詹事王十朋上䟽曰臣嘗謂官冗之患莫如今日漢唐之時部刺史之職於今為甚簡而事無有不舉者今之監司有漕有憲常平茶塩則有提舉坑冶鑄錢則有提㸃其職甚備而治不加於昔何也監司之職愈多而州縣之擾愈甚於治無益也迩者提㸃刑獄増置武臣臣竊以為贅矣且是官之設臣不知其所為者何事也以詳刑之任耶則一道之使固有其職未見其廢事曰訓練士卒則総管鈐轄路分都監者即武臣之監司也置之而無用廢之而不為闕是官之設豈不為冗哉一監司之建增州縣之大擾也臣竊攷之祖宗雖嘗有武臣同提㸃刑獄矣至嘉祐則罷之其詔之大略以謂武臣或出将閥或由軍功文墨期㑹未必深究監司項背適以為煩夫既置之矣而繼罷之知其無益也昔罷之今復置之在朝廷則冗於官在州縣則擾於民則其置之也甚無謂矣臣愚欲望聖慈斷然察其無用罷去勿置庶㡬官不虚設事得其當而人各安其職矣袁說友上言曰臣嘗觀漢制凡遣丞相史必分刺諸州未聞遽以部刺史任也夫親民之官莫先郡守其視部刺史之職於民事為尤詳盖更治民以考功當自二千石始臣竊見近嵗卿監郎曹凡未典郡而補外者往往以監司之職權重而事簡郡守之任責重而事繁人之情莫不逺責而就權畏繁而嗜簡故自内而乞外者必以監司為首臣竊以為不然監司察人者也郡守受察者也夫受察者然後可以察人今使之一日得外未歴郡守即居澄察之職所察郡縣略無能以制其心志佚氣驕未有不流於苛薄者臣愚欲望睿㫖明詔大臣應在内職事官未曽典郡而乞外者未得遽除監司且只與除郡守豈特更􅊗扵職任為不輕亦使在外之職當以次第而進其扵成就人材似非小補兵部侍朗胡銓上奏曰臣聞官冗者國用之大蠧也臣江西人也且以江西諸州言之如吉州小郡而兵官七八人幕職郡掾六七人酒官稅官四五人贑州雖號劇郡兵官至十餘人幕職郡掾八九人酒官稅官六七人如筠如袁又非贑吉比而兵官亦不下三四人幕職郡掾四五人稅官三四人隆興大府兵官宜倍扵他州而幕職郡掾酒官稅官亦復稱是繁然淆亂徒費廪給今縦未能頓罷宜稍損其數大郡止存二員小郡一員此省官冗之一也如臣言可採乞令給舍更加商㩁倘以為可行望賜行下諸路庶國用稍寛少紓民力天下幸甚寧宗嘉定元年太學博士真徳秀上奏曰臣㳟惟陛下天姿仁恕矜謹庶獄藹然有祖宗之風真祈天永命之本也然臣竊觀四方郡國之間猶有亡辠而致死有辠而逭刑者推原其故豈非典獄之官未盡得其人乎盖天下之獄起扵縣而成於州審訂其情而研覈其實皆州郡獄官之責也獄官而非其人則委成扵吏手變亂扵賕賂何所不有郡守不能盡知也提㸃刑獄不能徧察也繇是而上之朝雖刑寺審詳之憲部讞決之淑問如臯陶不過憑已成之案牘少加攷閱焉耳本源既失救之末流何益哉臣愚竊惟獄官之任匪輕而獄官之選未重有如特奏之授官胥史之補官入粟之拜官其間非亡材且能者然榮進之路既窮茍且之念易啟精明㢘潔者常少昏眊貪黷者常多顧使居典獄之官任民命之寄臣未見其可也且一尉之微近制猶不容以特恩授而百里之宰胥史入粟之流未甞得預其間盖以近民之官當重其選也何獨扵獄官而輕之哉臣願陛下念仁政之當先軫民命之至重明詔銓曹自今差注獄官非進士任子􅊗官無過與闗陞及格之人不許充選其特恩雜流之見為獄官者委監司守臣擇人保奏兩易其任待闕未上者改注他官治獄有稱者監司守臣條其實状以聞與量減舉主之數其􅂍汚不法者令所屬按劾重寘典憲盖注授不輕則人知自重激勸有方則人知自勉庶㡬小大之獄必察以情所以恵民生而召和氣非小補也倘臣言可採乞付有司詳議施行九年袁燮上奏曰臣聞人主不能躬親庶政故必擇忠賢以為之相宰相亦不能盡親庶政故必擇忠賢以為之属然則宰属者朝廷政事靡不闗焉顧不重哉故神宗皇帝嘗謂左右司所以學為宰相洋洋乎真帝王之格言大訓也臣嘗觀周禮天官冢宰之職雖百官群有司無所不統而獨於其為宰屬者表而出之故其序官曰太宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人自小宰以至旅下士合六十有二人皆宰属也其品秩雖不侔然與聞國政足以裨大宰之所不逮者均焉爾大宰以輔佐人主為職而為屬者又以彌縫太宰為職合衆多之謀智講國家之利害豈復有所闕失哉今之宰相古太宰之職也太宰之屬至于六十二人而今之為宰屬者不過數人而止何其多寡之甚相逺哉葢自漢而下寖不如古所謂宰屬者惟曰長史曰司直曰公府掾而已去古益逺法制益隳而堂後官始得以用事我藝祖皇帝知堂史之多姦􅂍也開寳五年詔選令録簿尉為堂後官以士人代之取其究心儒學通知古今足以為宰屬之助與胥吏固不侔也自時厥後任吏如故蔡京秉政隂與交結更相表裏而紀綱日隳矣今陛下更化以來垂意宰屬精選才能之士以戢堂後官之姦可謂盛舉矣然政事不勝其多而宰屬不過數人耳目不能徧察思慮不能周知速則鹵莽緩則壅滯甚非所以彌縫宰輔也而况邊境未寧干戈未息正國家多事之秋有大議論有大更張必得人以共圖之自從臣以下謁見宰輔月不過一再爾豈能如宰輔之無時不見欵宻無間哉當世所切不容少緩伏惟陛下明詔二三大臣増置宰屬雖未能復成周之制亦宜求賢俊秉心公正者共濟國事則所補者多矣惟聖主亟圖之寧宗時彭龜年上奏曰臣竊考監司之官盖源流於秦以御史監郡然漢初猶惡其繁遂以丞相長史分刺諸州不立常貟逮世宗時始置十二部刺史亦不過一部一人而已本朝遵之其始逐路止置轉運使一人唯京東西河東北淮南兩浙乃有使副若糾察刑獄則命轉運司一常叅官掌之自淳化而後逐路置提刑之官然或置或罷猶不為常熈豐以來朝廷命使始紛紛矣蘇軾常論其弊譬之立廐長而馬益癯盖善諭也紹興初間雖未嘗大有所更革然所在監司多不備置或以一貟而兼領亦不聞有所闕敗然則天下之治亂繫乎監司之賢否不繋乎多寡也槩可見矣臣竊觀近日監司皆無闕貟間有一事而分為兩司一司而轄以二人者其間職掌不同好惡亦異外假舉刺内示趣向同一訟也而有是非焉同一吏也而有能否焉號令難於奉行往来疲扵迎送盖不止如蘇軾之所論其為害豈細也哉臣愚欲望陛下考祖宗創立之規監紹興權宜之意将所在監司或省或併間総於一貟或文或武不必於並置庶㡬州縣之吏易於趨向朝廷政令有所総一而貟數不多亦易選賢如姚崇所謂今止擇十使猶患未盡得人此尤當深察也龜年又上奏曰臣照對湖北州軍朝廷向来以經兵火之後土曠人稀民淳事簡縣道佐官多不備置而以縣尉兼主簿又以江湖盜賊出沒不常而差武臣為縣尉盖亦因時施宜初非以為經乆可行不可改之制也近年以来户口寖盛事亦向繁而一縣之間自知縣而下别無文臣為佐官若知縣或有事故即簿尉監務以次攝事而小使臣少知自愛不甚循謹吏民玩狎多致敗闕如本府近日監利縣酒稅姚師言因攝縣日侵夜行刑杖死坊户為提刑司按罷又有監利縣簿尉劉汝翼因攝縣事盜用官錢見具案聞奏此皆跡不可泯不容闊略者也其它生事擾人徃徃而是其弊至此豈容不解而更張之哉臣照得諸縣各有監務一貟雖云酒稅當置專官然一縣酒稅知縣鮮有不任責者酒稅若非知縣任責亦未必能趂辦故所至外縣多令知縣檢察酒稅政謂是爾臣愚以謂若使省罷稅官而以知縣兼酒稅復置主簿差注文臣而以佐知縣則一邑之事宜無不舉倘䝉聖慈以為可行即乞從臣所請下吏部将湖北縣道有未置主簿去䖏復置主簿一貟依格差注文臣却扵本縣省罷稅官一貟令知縣兼管酒稅其見任人令滿今任已授未上人别令改注不勝幸甚理宗時許應龍進故事曰淳化中王化基論冗官之弊曰唐虞建官惟百庶政惟和夏商官倍亦克用乂盖官不必備而惟其人今國家庶官實倍常數蠧國耗財乞相度廢省慶厯中歐陽脩言方今凋殘公私困急由官吏冗濫乞行澄汰若冗官去則科率減吏貟清不過㫷月民必受賜臣聞為官擇人則官雖簡而常若有餘為人擇官則官雖繁而常若不足夫張官置吏所以為民豈使之無功受禄而反以病民哉量能而後授則居其職必任其事而不才者不敢妄覬故官不濫而財不耗循情而輕予則奔競者必至扵僥求故官愈多而費愈廣自漢以来莫不以官冗為病皆由為人擇官而不為官擇人耳今日之官其冗尤甚倅貳添差大藩方置今則或創扵列郡議幕優閑絶無職掌今則㦯増為兩貟諸司之屬添辟無已制領之官同正並置不釐務者㦯給以正官之俸創窠闕者多徇其親故之私至若軍功尤為泛濫不歴行陣以議事為名而推賞初無寸功乃僥冒得官而注闕乃若左選入仕自有成式不應陞等者妄冀陞等法當待郊者求免待郊試銓不中則増年而注授京削尚欠則減貟而改秩自陳勞績未經覈實而濫叨遷秩牽合弊例巧於經營而亦獲循資僥倖之門既開奔競之風滋熾求而不予則恐咈人情執而不行則必犯衆怨夫貪位慕禄誰無倖得之心毁法為通適啟無厭之請為政者安得每人而恱之斷之以至公律之以定法則宛轉營求者自然息念況州縣之吏勞扵從事而廪給㣲薄無用之官反安坐而享厚禄此又所當察者伏讀開寳詔書有曰吏貟冗多而求其治誠難也俸禄鮮薄而責以亷無謂也與其貟冗而重費不若省官而益俸州縣以户口為率差減其貟而舊俸之外悉與増給大哉王言今日所當取法也矧今之楮幣折閱已甚以鏹計之不及元俸三分之一何以養亷若閑曹冗局可併者併之添差創闕可省者省之冒濫得官者澄汰之扳援妄求者杜絶之一遵公法不徇私情則當得者免需乆次姦巧者莫敢攘奪是非之心人皆有之則恱者衆而不悦者寡尚何舊弊之難革哉迩者邉功皆俾從軍冒授功賞嚴行追究欺偽轉官者繳而不行妄求陞等者抑而不予固足以明示意向息絶僥倖尤願守之以堅行之以必為官擇人而不為人擇官則各稱其職事罔不舉冗濫之弊既除俸給之費可省此乃王化基歐陽脩之所已陳而祖宗之所已行也輙敢援此以為獻惟陛下與大臣亟圖之福建安撫使李鳴復上奏曰臣誤䝉聖恩分畀越閫適當去嵗水潦之後庫筦空虚財計耗竭賦入有限支吾不行原其所由多縁近年以来官員添差數多蠧耗甚夥俸給嵗以數萬計米以千計他費不與焉近甞具劄奏陳乞止差正任免放行添差庶㡬郡無横費民得少蘇朝夕俟命今月十九日準省劄添差浙西提刑司幹辦公事黄元直改差浙東安撫司主管機冝文字仍釐務填見闕臣照得帥臣事務最簡舊管正任參議機宜撫幹三員事未甞不辦今添差參議則有蘭徳添差幹辦公事仍釐務則有趙與薇添差幹辦公事不釐務又有趙希䛾添差準備差遣仍釐務則又有史松卿兼準備差遣監贍軍酒庫則又有余紹祖正員居其三而創員居其五已不勝其多矣若更添差機宜一員則是兩倍其數非惟重費俸給又且徒見冗員聞黄元直世居紹興以本郡人任本郡差遣恐於祖宗成法不能無妨朝廷亦何便於此臣愚欲望聖慈特降睿㫖照臣前請與免放行添差黄元直改畀别郡差遣庶祖宗之法不至廢壊而州郡之力亦得少寛不勝莫大之幸元世祖時朝廷録平宋功遷至宰相執政者二十餘人因議更定官制太常少卿王磐奏䟽曰歴代制度有官品有爵號有職位官爵所以示榮寵職位所以委事權臣下有功有勞随其大小酬以官爵有才有能稱其所堪䖏以職位此人君御下之術也臣以為有功者宜加遷散官或賜五等爵號如漢唐封侯之制可也不宜任以職位中統時朝議汰冗官權近私以按察司不便欲併省之磐又上䟽曰各路州郡去京師遥逺貪官汙吏侵害小民無所控告惟賴按察司為之申理若指為冗官一例罷去則小民寃死而無所訴矣若曰京師有御史臺糾察四方之事是大不然夫御史臺糾察朝廷百官京畿州縣尚有弗及況能周徧外路千百城之事乎若欲併入運司運司專以營利増課為職與管民官常分彼此豈暇顧細民之寃抑哉由是按察司得不罷至元七年議立三省侍御史髙鳴上封事曰臣聞三省設自近古其法由中書出政移門下議不合則有駁正或封還詔書議合則還移中書中書移尚書尚書乃下六部郡國方今天下大於古而事益繁取決一省猶曰有壅況三省乎且多置官者求免失政也但使賢俊萃于一堂連署參決自免失政豈必别官異坐而後無失政乎故曰政貴得人不貴多官不如一省便世祖深然之十三年中書左丞許衡上䟽曰國家能汰省冗官則可以重名器抑僥倖厲亷能其為善政無疑也然言之甚易為之甚難盖人之情大抵患扵得失故凡得則喜凡失則怨此所謂已奪者猶可與已與者不可奪正謂此也方其用之之初正當甄别審察不以私親不以賄賂不以權貴量其限而簡用之自無冗長今既濫之於前遽欲黜之於後是恩之在私門者固無恙而怨則歸於上矣其可哉往者既不可復追繼自今後當盡改前失使天下之官有定貟嵗取之人有定數其科舉薦舉考課之法具見前史可考而知也然又必重風憲之權任㢘能之士使廵行天下糾彈黜陟無一不當則前所謂冗官者日減而新進者無積庶乎可補前日之失也衡又上䟽曰兵之於國在古已重在後世為尤重故樞宻之設特與中書對持號為二府兵興則宰相主之事寧則樞宻任事盖宰相平章軍國兵事可知也而兵之籍則不與樞宻兼緫兵馬兵籍可掌也而兵之符則不在體統相維無有偏失制雖近代而意實倣古或者謂樞宻併於中書為合古冢宰総百官之意殊不知古者冢宰止一人而今之為宰輔者動輙數十人此而不古而謂樞宻者獨可以古邪國家切務止在得人人苟未得徒紛更於此無益也趙天麟上䇿曰臣聞車輿之樞要在於管轄衣裳之提綱係扵要領要領不可以兼衽袂之資管轄不可以兼轅衡之用盖噐殊緩急則一無為萬有之宗名限重􅁿則一貴乃群卑之仰軒轅置六相而以風后等為之天乙立二相而以伊尹等充之是時爵分萬國國建諸侯及嬴秦罷侯而丞相號起自是以来累朝相傚其増損之制難以勝言其髙下之秩例皆極品儀刑端禁緫領紀綱掌一人家事之張皇作四海士民之倡率金章紫綬黄閤沙堤非惟詫殊異之丰儀所以示尊榮而委重也既資厚望當振清風我國家内立中書外立行省行省以革藩鎮諸侯之專中書以為公卿大臣之任防㣲之理亦已至矣樹治之法可謂盛矣然猶有未盡輙敢妄陳愚言竊見中書内省宻迩皇宮統餘省於上㳺弼聖君於中域但當坐而論道據槐府以秉鈞寬以宅心守台司而助化今也汴梁以北北京以南西界長安東窮遼海毫釐細務靡不相煩升斗㣲官亦来取決豈非管轄兼轅衡之用要領兼衽袂之資乎伏望陛下載崇都省申以大名諫院𨽻焉六部𨽻焉除烏䑓相府所統之外随朝九品以上亦皆𨽻焉選徳才無玷地望極清者為大中書令其丞相平章丞轄叅政以至府之參議院之諫臣暨郎官都事之司咸冠以左右之號凡宰執朝㑹商確萬機常以諫臣班于厥次有闕斯補有遺斯拾如此而聖徳加明治具張矣凡都省移文於行省以咨付付之行省移文於都省以咨呈呈之凡都省事闗行省及行省一切合禀事務咨呈於都省都省判送六部六部擬而呈之轉咨行省以行凡随朝九品以上及外路受宣命以上官都省注之如此而宰執益崇政事簡矣更望陛下於腹内取中别立一省謂之燕南等䖏行中書省以間汴梁北亰遼陽安西四省之間凡外路受勅牒以下官行省注之然後咨呈都省乞頒勅牒可也凡随朝諸有司當受付身者委都省出之凡外路諸有司當受付身者行省出之如此則上㢘逺地而堂陛愈髙都省増崇而天王益重矣或者以為國家因四逺及蠻荆之新附故立行省以鎮之腹内不湏立也殊不知汴梁有省豈汴梁亦新附之城哉事在不疑惟陛下察其可否而行之天麟又策曰臣聞視乎㝠㝠㝠㝠之中獨見曉焉者眼之神也聽乎無聲無聲之中獨聞和焉者耳之精也用此道以脩身則收視反聽而六通四闢矣移此理於御下則官賢委能而聦眀睿智矣故聖王不窺望而視已明不殫耳而聽已聦言貴委人之周也方今御史䑓官内有監察院以𨽻之外有㢘訪司以承之所以儆肅百僚風憲萬姓張理上下整齊人道也由此觀之御史之職非天子視聽之官而何哉是以霜簡鷺車柏林石室昭其清也援以立秋象以熒惑昭其嚴也鷹擊之諭豸冠之服昭其威也千歩清道王公遜避昭其重也中書門下並為三司昭其貴也五者備矣然後能指佞觸邪彰善癉惡使雄奸巨媚膽破聲消封豕長蛇骨寒心顫則狐狸渺害蠭蠆㣲毒将不治而自息矣今國家令御史臺凡百官之非違諸司之案牘朝㑹祭祀之事理斷失宜之𩔖以至於該載不盡應合糾察者並行糾察之其制可謂恢恢而不漏矣然則朱帷峻位但小節以為先蒼佩崇班視大端而難顧臣請以疇昔騐之阿哈瑪特擅政於前雖齠齓之童亦知切齒而恨也王僧格弄權於後雖牛馬之走亦知側耳而憎也於是䑓官以下察院之屬閉口吞聲見如不見宴居髙坐聞若不聞賴社稷福添曦朗照太原侠客揖聶政之長風大理名卿致臯陶之淑問兇渠遂翦赤子更生羙則美矣未盡善也且我國家建兹御史豈惟計典憲之末儀顧行文之小事哉然而憲䑓之不言本匪憲䑓之所欲由其省府之職秩懸隔而不敢抗衡故也況權臣之計百網千機以崔公並職尚且繩之以極刑以楊子同僚猶且䧟之於死地進而極正則徒遭刑戮而令清朝有殺直之名退而引病則誣以不忠而謂不肯出皇家之力睚眦以禁之艾頂以脇之所以霍光忠厚乃能容延年於宣帝之朝廷梁冀豺狼終亦致文紀於廣陵之賊窟方今百官公正庶務丕平然而弊習不可不防憲䑓不可不重伏望陛下厲憲䑓之風采俾行省以齊階首之以御史大夫一員使與行省首官品秩相同其餘貟位以次升之又宜命監察御史與六部侍郎品秩相同又宜立繡衣使者八貟於中丞之下秩同侍御史使之分使天下專糾行䑓及㢘訪司之不如法者又内䑓或有愆違宜命天下皆得舉發如罪状明白委為故犯重則投諸四裔以禦魑魅輕則免官禁錮放歸里閭如或妄舉反坐其人故聖王之御下也用而不疑疑而不用委任之體貌之及其得罪則是臣下自以罪加乎身也幸従臣言則奸邪難蔽而中外永清矣天麟又䇿曰臣聞設紀張綱莫如清簡建官置吏切戒繁多夫爵者官之尊也階者官之次也品者官之序也職者官之掌也位者官之居也禄者官之給也吏者官之佐也雖則事非位立而不辦亦有事因位多而益生此聖王所以貴寡而不貴衆欲静而不欲躁也唐虞稽古建官惟百夏商官倍亦克用乂周卿分職各率其屬厥後職貟愈多而治愈不及古矣是以漢光廢四百縣而下民業定隋文廢五百部而天下政行皆以官不用多而在乎得賢政不在煩而貴乎省事也今國家立制自王及國王郡王國公以下為爵自特進崇進至将軍大夫校尉郎為階自正一至從九為品掌典當行為職各職所居為位各位養亷之資為禄各司賛佐行文之史為吏其制亦以詳矣然而文武二等分布中外本欲圖寧而似乎難寧也臣伏見京師不急之司院無用之局署及随朝䑓省院部以下諸有司官吏可兼不兼可併不併亦已有之矣畿外行省随省諸有司宣慰㢘訪等司路府州縣倉庫局監等諸衙門及各衙門内官吏亦有冗者矣武臣萬户所管不滿萬人千户所管不滿千人之𩔖亦已有之矣臣竊以冗官之大弊有三一曰選法之弊二曰政事之弊三曰軍民之弊夫文武官吏貟數既多當考滿之時近春秋之選資格之簿擾攘紛紜保薦之文交錯旁午有司行文猶且未暇奚暇顧孰果有才孰果有徳而考校之也哉既不遑考校則取準於籍文薦書之所陳布者矣如此而欲雜流之人不進貨賄之隙不開豈可得乎雜流行賄者得志則人皆可以仕矣以致貟多闕少無如之何經營者早得遷除養髙者坐淹嵗月此選法之弊也夫文武官吏貟數既多有當決之事而不決有當行之事而不行問其職則曰我此職也問其施為則曰僚屬非一豈我之所能獨主哉混齊竽而難辨受王命而自安及乎朝廷聞之遂立稽違期限之罰不亦甚歟此政事之弊也夫文武官吏貟數既多國家用人路廣浮濫亦升遂使臨蒞在下豈能敷政化哉政化不敷而刻剥之苦役使之煩為害良多此軍民之弊也三弊不絶而立法以防之主法者不能旁照貟益增矣貟增而弊亦自有矣況法立而懼法之人姦欺之計愈生乎故湏二弊盡絶而後法方可立也伏望陛下凡亰師不急之司院無用之局署及天下諸衙門可罷者罷之凡行省随省諸有司宣慰㢘訪等司路府州縣等一切諸衙門及萬户千户所管不及數之𩔖可併者併之凡省䑓院部以下有諸司之官吏及天下諸衙門之官吏可減者減之然後以慎名器之法擇人而用之又以考幽明之法順理而考之則典選者易見其人易程其效而選法清矣臨政者事有所歸職有所主而政績成矣在下者省於煩役免於苦刻而民業定矣民者天下之本也民業定而天下太平矣文宗至順二年監察御史陳思謙上言銓衡之弊入仕之門太多黜陟之法太簡州郡之任太淹朝省之除太速欲設三䇿以救四弊一曰至元三十年以後増設衙門冗濫不急者従實減并其外有選法者并入中書二曰宜叅酌古制設辟舉之科令三品以下各舉所知得才則受賞失實則受罰三曰古者刺史入為三公郎官出宰百里盖使外職識朝廷治體内官知民間利病今後􅊗縣尹有能聲善政者受郎官御史􅊗郡守有竒才異績者任憲使尚書其餘各驗資品通遷在内者不得三考連任亰官在外者湏歴兩任乃遷内職績非出𩔖守不敗官者則循以年勞處以常調凡朝闕官貟須二十月之上方許遷除帝可其奏順帝時議罷先朝所置奎章閣學士院藝文監等官學士康里山奏曰民有千金之産猶設家塾延館客豈有堂堂天朝冨有四海一學房乃不能容耶帝深然之厯代名臣奏議卷一百六十二
