body:
  text: 厯代名臣奏議卷五十二明楊士奇等撰治道宋孝宗時樞宻院檢詳文字兼檢正李椿上奏曰臣竊謂國家天下大事有二餘皆細務也何謂大事國之本與國之勢而已耳何謂國之本民是也何謂國之勢兵是也民貴乎富庶兵貴乎精彊民富兵彊則本立勢張國家寧矣今也未然州縣之間多方擾民而致貧困流為盜賊所在之獄充滿盜賊之發也十不獲一今以巳獲之盜計之不知未獲之盜幾何人也江東西湖南北二廣京西兩淮州縣獄罕有無盜者州縣以為常事朝廷之上無由悉知故亦未以為憂臣實憂之仰惟陛下愛民如赤子詔令數下未嘗不以民為意也而民困如此未聞有實恵及民者況陛下聽言不倦豈逺近之臣未有以民困盜多為陛下言者耶惟復有司以事不切巳姑且任之耶臣又甚憂之江上諸軍素稱精勇百戰之士老且去矣新募之軍未諳大敵唯軍中子弟熟見父兄軍律最宜收刺而以揀汰老疾盡隨父兄離軍又亦未免失所重以數易大將號令不一軍士多貧有饑寒之患新人無藉罕有自固之心主將既不為久計軍情觀望何以歸服上下既皆茍且緩急何所倚仗此國家大計臣又實憂之臣願陛下委宰執大臣講論富民彊兵之要遴選監司守臣省其科率寛其徭役凡所以有擾于民無益於國者悉蠲除之仍下諸路監司守臣令各條具本路本州可以減省官吏及可寛民力事件㑹計一路一州所省減財糓數將下户和預買及折科加耗之類指數裁減將減汰不釐務官計其一任所請願給官田者準給之以寛州縣之力今後應減汰人更不離軍庶幾州縣之間可以支吾不致横斂使民漸有富庶之期而免困窮之患自不為盜而國本立矣至于選擇大將想皆陛下親擢臣願陛下既知其可任則久任之既知其可委則專委之委之既專則不致懐疑而不盡心任之既久則不為茍且而士卒馴服如此則得心腹之將任陛下之事其軍中應揀汰之人有子弟家累者雖應揀汰減半請受更不離軍收其子弟充軍不須拘以等仗唯取事藝精彊俾子父相親得其死力以備緩急之用則兵彊可必而國勢張矣天下之事無大於此二者惟陛下留意焉椿為吏部侍郎又奏曰臣嘗謂易之為書言君臣之義深切著眀者也剛健者君之徳柔順者臣之道剛柔隂陽又以别君子小人之分也凡九居五六居二謂之當位剛柔之正也而六十四卦九居五六居二者十六六居五九居二者十六考其辭則九居五六居二者少利六居五九居二者多吉何哉葢聖人之戒也君徳剛健其用貴乎柔中臣道柔順其用貴乎剛中也臣謹以臨遯二卦眀之臨剛浸而長將泰之時也先儒以謂臨民之義上臨下也九二之辭曰咸臨吉无不利象曰未順命也順上之命臣之義也而未順命者非不順命也姑未耳未者有所待也臨者二陽之卦咸者三陽之卦得三陽下交君子道長則初應四二應五則成咸矣茍不知此而及民失臨之義失泰之時尚何吉无不利哉唯六五柔中不居其知而能用二之剛中而任之不責其遽以順命故曰知臨大君之宜言行中之謂也故大象曰君子以教思无窮容保民无疆此五能任二不責其應二能任責不遽應五志在咸感唯保其民所以兼美之也其或剥民以奉上也為辭而圗進用者乃變屯者也豈識咸臨之義哉遯小浸而長將否之時也彖曰小利貞浸而長也不言柔不與其長也六二之辭曰執之用黄牛之革莫之勝說象曰固志也葢六二當位得君志於固位者也執如牛革牢不可破伏兊在下言莫能盡故居中而不言中居正而不言正不言利吉无咎唯此一爻獨不言遯聖人之意可見矣九五當位所賴三剛為助二隂尚微正其志而不與其進故曰嘉遯正吉以正志也然則不免乎遯者遇時者也君子小人之分可不察哉柔中剛中之戒豈不切哉仰惟陛下剛健中正聰眀神武不居其知虚已受人深得知臨咸感之義適當剛長將泰之運臣愚慮内外之臣或有志在咸臨而未即順命者或有志在固位而莫之勝說者臣願陛下悉以易察之使君子小人各得其所將見天地交而萬物通上下交而其志同天下幸甚伏乞睿照椿又奏曰臣竊嘗謂國家天下譬之一身君為元首在上臣為腹體在下故有為腹心之臣有股肱之臣有為手足爪牙之臣有耳目口舌之臣如人之身腹心思慮股肱運動手足舉行爪牙爬囓口舌吐吞耳目觀聽共扶元首一身康强無適不可茍或委視聽於手足責舉行於口舌用吞吐於耳目運思慮於股肱其可乎故聖人之易經推八卦之象則曰乾為君為首坤為臣為腹六子震為足巽為股坎為耳離為目艮為手兌為口故曰近取諸身也體乾之君任用臣子各有攸當如保一身則盡善矣自古人君興致太平莫不用此道也仰惟陛下聖學髙眀洞照萬方乾剛獨斷躬攬百為閱武修文孜孜不倦欽恤庶獄愛養斯民捜求實才深厭虚文恭儉勤誠髙出千古宜乎國富兵彊賢能在職所謀皆遂而每聞陛下有乏才之歎治道未進恢圗之志未遂何哉蓋出令未詳故數改易用人輕易故罕始終命令數改則人不信令人無始終則舉無成事陛下深居九重盡攬天下之務百僚逸豫仰成聖躬焦勞於上百臣觀望於下號令一出或未允衆議則曰出于上意差除命下或未厭輿情則曰命由中出大臣不敢執後省不敢繳臺諫不敢言上下相徇髙爵厚祿固位冐寵俯為身謀則得計矣於國家安危之計其誰念之可謂上下俱失治道不進職此之由也臣愚願陛下觀易經之㫖察取身之喻使腹心股肱手足耳目口舌之臣各盡其道守其職陛下體乾之剛健委任臣子責以成功進忠良之士斥䛕佞之人有功者賞有罪者罰持一定之論為久長之計如是而治道不進績用弗成臣不信也小臣狂瞽之言惟陛下裁擇椿除太平州陛辭又奏曰臣日者入對便殿獲覲清光伏蒙聖慈以臣樸直難得特賜玉音奬諭臣無任感恩戴徳榮幸激切之至臣誤荷異知如此糜􅂢不足以圗報萬分今當逺去闕廷不復再瞻天日之表豈敢忘憂國之心茍有所見不以告君父而含恨入地是臣負陛下特達之知不忠之甚矣臣有管見别具劄子奏陳伏望聖慈特賜采覽一振紀綱臣嘗聞元魏之時張彝之子仲瑀上書求朘削選格排抑武人羽林虎賁相率直造張彞之第曵彝堂下極意捶辱投之火中再宿而死時收兇强者八人斬之大赦以安之仍令武官入選識者知魏之將亂矣髙歡因此傾家貲以結客或問其故曰朝廷懼其亂而不問為政若此事可知也竊見近有揀充軍頭司等子羣集作閙在都城内外公然毆打居民强取錢物街市驚惶奔走駭亂雖送所司其統轄之司不聞行遣又聞先是有軍人因與寺僧争小兒遂羣往毆擊破壊其寺亦不聞盡法行遣軍政如此今降人散居内外豈無髙歡之徒生不逞之心耶朝廷晏然不以為意臣實憂之臣聞太祖皇帝以川班數百人陳訴乞援諸班給賜太祖皇帝悉誅之豈務多殺誅其不服之心耳葢軍法不如是不立也且揀等子其來已久數十人身充禁衞敢肆兇悖如此方且付之刑寺以議其罪僅加移配而已人豈知畏是用姑息之政姑息奚可振紀綱耶今敵國尚彊大讎未報山陵未復盜賊未弭陛下焦勞以圗治道紀綱如是何以上副聖心臣願陛下責大臣留意于紀綱已往之事固難追改而所轄之司不應置而不問易曰君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保臣願陛下以艱難圗治未可以至治忘憂天下幸甚二嚴階級之法臣伏覩太祖皇帝剏立軍制階級之法髙出前古萬世不可易者也有司遵行固亦有年矣臣竊聞近來軍中在上者務為姑息在下者往往陵慢階級之法漸成虚文臣嘗詢訪頗得其由葢緣邏者恣横自號鋪土又曰鋪吐或受囑託或干求兵將官稍不如意則捃摘細事逓相唱說以恐動之又或不滿則撰造事端宻申有司故軍中莫不畏之以至兵將官不敢決罰軍兵大將不敢治將佐軍中不畏軍法而畏鋪吐豈立階級法之意耶臣聞古者命將則曰閫外之事將軍制之大將能制諸軍之命故戰士畏主將而不畏强敵者有節制故也今軍政如此臣所以為國家憂之臣願陛下出自宸斷嚴階級之法戢邏者之弊使軍中紀律整肅此實國之大事望留聖慮三臺諫風聞言事臣竊見臺諫官許風聞言事者葢内外官吏至衆四方萬里之事至多所以防壅蔽也然則其言事於臺諫之官者非有所怨憎則必兇險之徒既不敢公言之故多錄事目以納臺諫謂之短卷其來久矣故臺諫章疏凡施行之間則必曰臣寮上言不顯姓名者亦庶幾無所顧忌敢盡言而不𨼆也然後四方之事官吏之衆悉無壅蔽皆得上達者惟許其風聞故爾然則持短卷而謁臺諫官者決非忠厚之士若悉斷絶則亦無所聞矣在聽其言者審之得其實然後上章則無所失矣近聞言事官以言事去職其納短卷者罪至徒配足以革告訐之風為監司帥守者莫不稱快而服陛下聖眀察見萬里之外至于形於歌頌者甚盛舉也臣愚慮四方萬里監司郡守其間有貪婪害物不卹國事得以自恣無所忌憚者不得聞於上矣有失國家置耳目官之本意臣願陛下令臺諫官今後凡受告人罪犯事目言人重罪如未見端的且委官體究俟得其實然後奏彈如出虚妄則坐告人如是則既足以戢告訐誕妄之人亦使四方萬里官吏有所畏憚不敢恣縱如臣言可采即乞别作聖㫖下有司施行四設險臣嘗論六合東闗等處為必守之計有未盡事理須至再具奏聞六合據滁河湍流之上有瓦梁堰若衆寡不敵則塞瓦梁口真滁之間悉為水渰雖不戰而可保事定之後水淤田疇將有倍收之利東闗去巢縣不逺臣面蒙聖諭巢縣已築城臣竊見巢縣在水之北敬亭山路至險易為守把敵人決不敢取路若取南路平衍之地則可徑至然其地偏僻非敵之所欲呉所以守東闗者東闗透大路不逺兩山隔水相對水北之山突兀一峯使人守之固難攻擊吳又於水北闗灣澳與河相通可以容舟中築堤岸以出兵堤岸之西又築一塢此所謂濡須者利則出戰不利則閉塢此呉之得策也臣愚所見謂宜東闗不可不措置孫呉屯兵于無為而守東闗今若更増一軍在無為東以援東闗北以援舒城尤為利便臣願陛下宻諭郭綱選擇統制官充采石水軍就往措置不必大段彰露也五論兩淮必守之地臣嘗論兩淮有必可守而不可不守之地其六合東闗巢湖皆臣親曽經行相視及考驗古今已然之事事理無疑臣不敢以因求去姑為藉手冐浼聖聽況今軍籍中老舊北人無幾多是南方不經戰陣之人若使平地與敵騎相拒難取必勝萬一蹉跌則兵威頓挫矣向張俊楊存中劉錡以三大軍皆百戰之士猶不敢於廬州以北見陣各退軍至柘臯使敵人越東山口之險方與之戰敵人慮險阻在後故敗而走諸軍有追至濠梁者反為其所敗葢地勢之不同也今諸軍雖多南人未習野戰若使之在舟船之上乃其所長以我之所長當彼之所短所謂立於不敗之地可保萬全者也臣願國家以守為先務恢復之舉須有機㑹圗之未晚六合髙郵東闗皆是以水為固又可以出保江上伏望陛下毋忽臣言特留聖慮六薦劉藩楊獬王藺顔敏行臣竊見前監察御史劉藩本貫冀州事親至孝居官有稱嘗作繁難知縣不勞而治忠賢有守決不負國臣嘗入状薦之於侍御史宋延祖後聞延祖薦於陛下擢在憲臺未幾而以母憂去職臣諒惟陛下必知其為人矣今將服闋伏望聖慈下有司檢舉收召必能為國分憂臣竊見新知永州楊獬博學能文蚤登科第居官有守所至著稱厯繁難縣及知軍壘率皆稱治民有去思其為人眀敏有斷不畏强禦永州小郡未足以展所藴伏望陛下擢之要路必有過人之績臣竊見武學諭王藺剛方自立不随流俗有識有文知時知幾有憂國之誠無茍佞之態生長淮甸深識邊民之情當今有用之實材也願陛下擢之清要必有可觀臣竊見知横州顔敏行將家子也曽為潭州攸縣巡檢捕羣宼親臨矢石以破賊帥司曽令管轄軍馬頗有統御之材頃因大臣論薦遂蒙朝廷擢為路分兵官近因廣西諸司辟置為郡亦有治稱人材難得今逺守瘴癘之地誠為可惜使之統軍或為北邊之郡乃稱其材臣伏望陛下特賜錄用必能稱職唐仲友上奏曰臣聞人主之道清源正本而不從事於末流是以所操彌約而所事彌大所治彌近而所及彌逺臣嘗質諸經訓深探治道之原本竊以為成治功在善風俗善風俗在行直道行直道在去私心箕子之書曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極言私心去而直道行也繼之曰皇極之敷言是彝是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光言直道建而風俗善也終之曰天子作民父母以為天下王言風俗善而治功成也葢私欲公議在方寸間如衡之首尾此重則彼輕如田之苗莠彼消則此長好惡一出於作偏黨反側一萌於中決擇差於毫釐而天下之從風而靡者已不勝其衆治道亦從而隳深可畏哉臣仰惟陛下紹累聖之休緒纂太上之丕業宸心孜孜夙夜勵精以求治功之成葢無所不用其至是宜中外丕應以承休徳然而十年于此僅克小康而未能卓然逺追隆古之盛臣嘗推原其故則搢紳之列奉法循理者雖衆而誕謾茍且之責尚煩於司敗里閭之間利仁樂義者豈無而姦宄詐偽之罪日干於刑書未見聖人在上而風俗之難善如今日者也明詔屢下豈不丁寧懇切而美意未孚臣竊惑之意者直道之有未盡行歟且大公至正之道人心同然不為智有而愚亡亦非昔多而今寡豈直道可行於古而不可行於今哉子曰斯民也三代之所以直道而行也言民無淳漓道有興廢人君亦當求諸已而已臣觀自古直道之行本於正心誠意之間顯於舉賢放佞之際故益之戒舜先以儆戒無虞㒺失法度㒺遊于逸罔滛于樂繼以任賢勿貳去邪勿疑仲虺之告湯先以不邇聲色不殖貨利繼以徳懋懋官功懋懋賞此古之賢臣所諄諄於聖君而聖君不以既知既能而滿假怠忽者也陛下勤勞萬幾清静寡欲正心誠意之道固所躬行剛眀果斷綜覈名實舉賢放佞之道亦所洞曉然區區微臣猶欲以古人之望其君者事陛下惟聖意察臣愚忠少加淵慮防私欲如禦宼仇存公道如䕶元氣内而察諸存心之初勿使一毫或出於嗜好之私而非先王之法度外而察諸用人之際勿使一職獨出於左右之譽而拂天下之公議儻有則斷而去之既去則敬而守之此心既存此誠既著直道猶有不如三代之隆臣不信也詩曰周道如砥其直如矢君子所履小人所視惟陛下念之仲友又奏曰臣仰惟陛下紹太上興復之基念中原陷溺之苦憂勤宵旰于兹十年聖意未嘗一日不在於恢復也荷付託之重既不可畏憚而自怠圖艱難之業又不可果敢而欲速然則建一定之規收萬全之效在陛下先審其本末而已曷謂本治安是也曷謂末富彊是也安者必富富而不安其富易貧治者必彊彊而不治其彊易弱此本末之所由分人君之用心不可以不審也用心於其本則所進者皆道徳仁義之士所行者皆保民治國之術其初若無可喜之迹其終乃有不可勝計之功用心於其末則所任者皆權謀功利之臣所謀者皆攻戰聚斂之事其初似有目前之利其終乃有不可勝救之弊自古人君以此二端而有成敗安危治亂榮辱之異其迹皆可考臣不暇縷數請以唐之三君為陛下畧言之明皇開元之際幾致太平末年乃有天寶之亂徳宗建中之初有貞觀之風未幾而有奉天之難憲宗十餘年間唐之威令幾於復振而亦不克其終彼皆一君之身而治忽若此相反非其材智之殊特以用心之異爾方明皇之勵精政事徳宗之罷還貢獻憲宗欲庶幾二祖之道徳風烈是三君之心在於治安則有姚崇宋璟楊綰崔祐甫杜黄裳李絳之儔相與謀謨所言所行無非納忠直逺讒佞修已任賢節用愛人之事是以三君進其徳天下蒙其澤中興之業所由以成及明皇侈心一動徳宗連年用師憲宗欲積財以復河湟隴右是三君之心在於富彊則有李林甫楊國忠盧把趙賛皇甫鏄程异之徒相與迎合所言所行無非闢土地充府庫剝下附上勦民怒衆之事是以三君受其欺天下被其毒已成之功所由以壊載在信史最前事之可為鑒戒者也陛下天資髙明灼知此理臣言固已為贅然臣猶有私憂過計者竊觀比年以來朝廷之用人先才力而後學術郡邑之布政急催科而緩撫字駸駸乎戰國秦漢之風而於三代之遺意祖宗之家法若不能無異者此臣所以不能自己於言也臣愚無知竊惟中興大業可以道勝非可以智求可以徳致非可以力取伏望陛下逺師三代近法祖宗進用道誼之言抑退功利之說專講治安之策不急富彊之計使徳澤流洽政教脩眀下慰人心上當天意然後總帥天下之賢俊以舉順應之師臣見其摧枯拉朽之易爾不然臣恐功利之說得以熒惑聖聽小人藉此而進非徒無益而又害之則中興之期或非臣所敢知也臣愚不識大體惟陛下裁赦仲友又奏曰臣聞崇儒納諫人主之大利而小人之所甚不利也自古聞以不用儒削未聞以用儒亂聞以不聽諫亡未聞以聽諫危葢法先王隆禮義謹乎臣子而致貴其上莫若儒明是非辨邪正察乎幾微而消於未然莫若諫儒用諫行則國家之根本强固人主之耳目聰眀彼小人方無所容而何利於此哉故必扇為邪說以上惑主聽下沮清議儒者固無非之可指諫者固無罪之可名也然儒者必談王道其論似迂濶諫者必進苦言其迹似矯激小人欲塗人主之聰眀蹷國家之根本未有不以此藉口者也訑訑之聲音顔色拒人於千里之外士止於千里之外而況迂濶矯激之說乎臣仰惟陛下降意儒術虚懐諫諍前古帝王葢未有先之者一時士大夫亦宜知以儒雅忠讜為先然臣復至輦轂已幾二年每聆搢紳之論咸曰毋談王道時將以汝為迂濶毋進苦言時將以汝為矯激臣始聞而駭之以為聖明之時安得斯言至士大夫之間安知不有真儒忠諫聞此而退蔵非朝廷之福也然以臣所親聞質之則二說決不出於陛下之聖意臣之先臣某仕宦三十年不離校官晩蒙陛下擢寘風憲不愛軀命空臆盡言正世俗所謂迂濶矯激者也然而每一進見必蒙陛下温言俯接烏臺章奏十可其九最後論疏雖未即行不踰數月亦已追用此先臣所以抱病危惙猶惓惓於效忠也然則今日搢紳之議其不出於陛下之聖意必矣然而邪說已熾人心已揺非如臣輩世受國恩不能無疑陛下欲決天下之疑使真儒忠諫不憚於進是非號令刑罰之所能及亦修其在我而已臣愚無識竊觀比年經筵之講讀頗稀臺諫之論列罕用妄意邪說之所自起或由於此伏望陛下數御經筵而精其選優容臺諫而聽其言誠意既孚羣疑自判使儒者願立於朝諫者不愛其死實宗社之福生靈之幸豈惟微臣之幸仲友又奏曰臣聞賢聖之言垂訓萬世遵之未有不成違之未有不敗召公之告武王曰不作無益害有益功乃成孔子之荅子夏曰毋見小利則大事必成此經傳之眀訓圗大業者不可不知也臣仰惟陛下夙夜勤勞思復祖宗之洪業聖意固在於立事功也然臣觀比年建議興事之臣鮮為經久逺大之謀易言輕舉數為數改尚多作無益而見小利者是故發運無益於財而害民屯田無益於食而害兵見増租之小利則根括沙田見商賈之小利則議變鹽法此四者未覩一毫之利而有不可勝言之害其他若淮之鐵錢處之銅冶諸郡之甲胄版曹之楮幣徒作而無益利小而害大者又未易以悉數也且當聖主有為之時而有司救過不給將何以共成大功仰稱徳意臣嘗察之其間託公營私假塗求進者誠多有矣然亦豈無持區區之心欲為國家興利者葢其所見止於小者近者故不能權其輕重以務求其逺者大者耳臣聞民惟邦本本固邦寧故國家之益莫大於益民國家之利莫大於利民在易益以興利其象曰損上益下民說無疆益民乃所以自益利民乃所以自利也漢武帝士馬彊盛窮追逺討葢文景務在養民之餘力宣帝推亡固存單于慕義葢昭帝與民休息之成效今之議求益謀利而不本之於民此所以害有益而妨大事也臣愚竊謂勸農治兵具有成憲生聚教訓本無竒策陛下推至誠於上有司奉成法於下雖不多為紛更日積月累為益甚大若百姓滋殖則無求不獲無為不成較之輕為數變卒無所利得失甚明惟陛下留神詳擇天下幸甚薛季宣上奏曰臣聞禮繁則亂易簡而天下之理得有虞之世中外之官二十有二人兵刑共貫樂教為一帝舜無為而治用此道也臣切恠近世治不及古自朝廷至于郡縣皇皇財用弊弊焉常患其不給百姓朘肌及髓而日以益甚雖有卓犖之士遇有為之主得時得位其所施設終無以救其萬分詳求其故則冗官冗兵二事實有以困之也九卿之設古六官之任也自漢政歸臺閣則有尚書六部唐明皇始置内諸司使百官用皆失職至今官中都者遂為養賢之地設官雖多有職葢寡公移囘復祇為文具百度為之隳廢人士得以循黙間者雖省員闕而其官寺仍存置吏之員滯事之患無異於前諸路帥臣古州牧之官也國朝以來置轉運使副判官有提㸃刑獄有提舉常平茶鹽又有總領市舶坑冶茶馬諸司屯駐之軍又别置都統制大抵牧伯之任分為五六而州之知通縣之令佐不相統臨權均勢敵一彼一此各行其意民無適從為害滋甚臣之所謂冗官者此也廂軍之置即唐分鎮之兵是也周世宗及我太祖皇帝増置禁旅則今之禁衞與諸州之禁兵是也神宗皇帝立將兵之法今之帥藩係將禁軍是也太上皇帝收諸將麾下作三衙御前諸軍今之大軍是也四者之外復有􅝟手軍役兵今惟大軍可供戰伐之用將兵而下廢為皂𨽻之役官吏占破無幾則竄名廣破賣工私役者衆適足以為汚吏之資游手之多無法之久干䦨狂歗之事因之而生比雖少加簡閱繩以軍政人情玩習猶無益也臣之所謂冗兵者此也惟今法度之弊臣所知者莫此為大且天施地産之物其出有限所養者衆適用者寡則人才安能不混兵刄安得不刓財賦安得不匱而國欲安强得乎夫事簡則易知易知則易從職任專軍政修則上皆任事之臣下皆可用之兵濫吹者無所容而政猶有未行古無是道陛下必欲仍今日之文弊以圖天下治理非臣所知必欲政修而事舉財豐而兵振則非更絃易調不可也夫事為之有道則人不驚而必辦咈於人情則取衆怒而無所成顧陛下處之如何毋憚其難而重改作也伏願髙聽逺覽詢諸二三大臣詳議而力行之光武併省郡縣百官職員而漢道中興周世宗汰斥老弱増壮禁卒而王室始振皆後事之師也與其張無職之官而紊政養無用之兵而虚驕蠧國人情不卹固當圖之況為之有道將不至此乎惟陛下留神采擇趙汝愚論左右潛窺聖意宻預政機疏曰臣仰惟陛下天縱生知聖徳隆備以奉天則致敬以事親則致孝以接下則有禮以撫民則有恩雖至尊至貴而内不為聲色之奉宫館之華外不為馳騁之娯遊觀之樂以至賞諫臣以開忠讜之路戒近臣以盡獻納之規發積蔵以賑饑窮捐内帑以代租賦凡古之賢君所謂髙世之行者在陛下固已兼脩而並舉安行而優踐之矣猗歟盛哉夫行帝道而帝行王道而王譬如春種則秋穫未有久行而不至者也然而陛下行之積二十年何乃星緯失行於上水旱洊興於下官吏媮薄民用困窮將帥非材士以愁怨忠臣志士朝夕懐憂夫豈陛下所以修諸身者為有未至耶特以所任非其人所繇非其道深負陛下有為之志此微臣孤憤所激所以不避衆怨而思得一鳴於陛下之前也臣竊惟陛下方養徳潛藩之時盖目覩秦檜專權之事陛下博通今古不無懲艾之心逮至即位之初首下求言之詔收召故老布在朝廷亦惟復古之期謂可旦暮而致卒之因循嵗月弗克有成陛下又慮世有遺才陸沈未用故或取諸任子或選自武臣擺脫拘攣推誠委任然亦未聞報徳秖有孤恩陛下求材之道既周而圖任之功莫遂臣伏思陛下聖心於此盖不知其所託矣於是將以兼聽為美而或來膚受之言以分任為功而適啓多門之弊遂至左右潛窺聖意宻預政機假陛下之威靈為大臣之輕重故弱者依違而聽命事有不可而莫敢與之爭黠者締合以養交口雖不言而實行其意陛下雖能不假之權而權實歸之矣此天下之事所以流弊至此雖聖明在上亦不得而盡知之也夫人主深居九重盖與羣下相逺雖云執權在已猶須取信於人彼信之者是為腹心聽之者便為耳目初不在乎位之髙下人之能否凡聖意之所嚮皆是權之所歸彼大臣持禄養交不顧國家利害固已不容誅責若夫能使陛下之大臣甘心俯首一至于此者安得不深懲而力救之也臣愚伏願陛下上謹天戒下順人情務解絃而更張先清源而正本庶幾真材獲用宿弊頓除感召至和導迎景貺實宗社生靈之幸汝愚又論治效遲速疏曰臣伏見陛下踐阼之初登用賢俊容受直言講求治道惟恐不及天下之人皆以為英主不世出莫不延頸企踵以望太平當是之時陛下聖謨經逺豈不謂内修政事外復境土不數年間可以輕徭薄賦與民休息蓋不待如是之久也今陛下宵衣旰食苦心勞思十有五年而治不加進豈天下之事終不可為歟將所由者未得其道歟何為力甚勤而收功甚逺也臣愚欲望陛下萬㡬餘暇夷考古先帝王所以致理之術而深求其故有不合者益解而更張之庶幾乎不逺復之義不然時難得而易失臣誠深為明主惜也惟陛下留神幸甚汝愚又乞與大臣建久安之策疏曰臣一介寒逺陛下不以其愚不肖俾承乏于州縣服勤踐職首尾五年竭其駑馬之智最於民間利病耳聞目覩頗得其實輙試陳其大要惟明主擇焉臣仰惟陛下恭儉本於天性仁厚發於至誠即位以來無非以節用愛人為事是宜下天上施家給人足仰承陛下憂勤之志而比嵗州縣事力單弱財竭於上民困於下法令廢格巧偽實繁盜賊滋多刑辟者衆良由賦役繁重風俗茍媮官太冗而職務不修兵雖多而法制不立士無定志民有幸心委靡陵夷可為深慮臣謂當此之際正宜君臣同體内外一心兼天下之謀合天下之智汲汲然皇皇然如救焚拯溺猶恐不逮而上下循黙處之恬然積習成風寖不自覺尚賴聖徳昭格年榖屢豐屈已和戎境外無事誠恐一旦疆埸有變不幸水旱繼興如人病羸豈任寒暑臣每觀士大夫羣居竊議孰非憂國愛君亦恐獻替之間不無蔽欺之說指陳彊富疑誤聖明誠不可不早辨也伏望陛下念祖宗剏業之艱難顧子孫持守之不易日與二三大臣思所以建久安之策成億萬年不拔之基宗社幸甚生靈幸甚汝愚又論治體及蜀風俗疏曰臣今月初四日準尚書省劄子奉聖㫖令臣將的實被火人户數目及已賑濟支過錢米開具聞奏至十三日準尚書省劄子備坐臣僚劄子奏竊聞蜀帥欲撤百年之堰以從一己之規模民情易揺當以靜治好作為者可得而恃哉當以厚化也善惡太明則無所措矣奉聖㫖令臣審度經久利害及具改作因依費用錢物聞奏臣已遵依聖訓逐一開具奏聞訖伏念臣資禀素輕識見尤陋既無以鎮服浮議又無以取信士友招致物論萃於臣身臣惶懼震懾罪當萬死仰蒙陛下聖徳全度未忍即賜誅責令臣供具本末臣感戴聖恩尤極兢戰臣自惟孤孑一身今邈在萬里之外不知議者為誰用意安在臣豈敢復辨論曲直謹已别具劄子陳乞宫觀差遣外唯是今來臣寮所奏事理其間有實關朝廷治體者臣世蒙恩厚茍懷所見須至冒昧奏陳臣伏觀自漢以來固有以清淨簡易惇厚寛博雍容而致理者然皆在兵革初定之後蓋緣人厭久亂欲相安於無事故明君賢相亦因時而致化如漢曹參之輔恵帝本朝真宗皇帝之用王旦是也是時民俗醇厚中外泰和公卿大夫至口不言人過還淳反樸誠有邃古之風可謂盛矣然人情習於寬縱久則弛玩至寶元慶厯間夏人首亂遼人乗之相視而起朝廷一時憂懼倉猝不知所為於是簡拔忠良更張庶政開天章給筆札以訪問天下之事人主憂勤於上羣賢奔走於下經營數年卒以重幣結好二敵而後始定乃若西晉之時王衍之徒不貴慤勤風俗相師以清談廢務則亂不旋踵矣今國家自渡江以來用吳蜀之力養兵藪十萬日朘月削六十餘年如木將凋根本先病如人既老血氣已衰有志之士懷憂竊歎凡有為國家深謀逺計者咸謂為今之策要當如管仲之治齊勾踐之治呉諸葛亮之治蜀君臣合謀小大畢力選賢任能興滯補弊使兵彊國富截然成不拔之勢然後進可以復祖宗之境土退猶不失太上中興之業也今聖主焦勞恭儉常恐不及而士大夫風俗日益媮敝以循黙為靜厚以容悅為靖共比年以來此風尤甚今論者因事而言又曰靜治曰厚化凡為此論議者亦已多矣其心蓋欲日漸月漬隂移陛下剛健有為之志而成此茍且偷安之俗是皆羣臣目前之利而非國家長久之福陛下於聽言之際誠不可以不深察也昔崔寔作政論仲長統稱之以為凡為人主宜寫一通置之坐側其言曰聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍以今觀之事適相𩔖臣愚竊謂國家治道之隆替風俗之美惡所係在此臣沗綴近臣同國休戚亦不得不因此而瀝陳悃愊也況夫蜀之風俗皆慕文華而棄法令喜議論而樂因循稍違其情易致讒謗自來監司帥守以去朝廷甚逺恐有譏議不能自明往往日夕憂虞務為容忍姦贓不敢按治法令不敢舉行然猶謗讟横生斥逐相望臣乃不自量力輙欲奉行朝廷法令稍裁制其末流區區之誠本無他意但欲官吏稍知奉法循理則逺民得以安業而已今臣到任一年凡所按吏不過數人而或者謂臣善惡太明則無所措此尤非臣之所喻也昔周康王命畢公保釐東郊作冊命曰旌别淑慝表厥宅里彰善癉惡立之風聲齊威公問野人郭氏者曷為􅇕野人曰善善而不能行惡惡而不能去是以為􅇕也臣觀六經之訓諸史所載古今治亂之理莫不以賞善罰惡為先務未聞以為戒也矧朝廷嵗下臧否之令付臣以刺舉之權臣安得而不奉行哉今蜀士大夫既不便於臣而臣資禀戅直前此又數以職事得罪權要内外合勢公肆中傷微臣孤蹤未知死所夫孝莫孝於曾參知莫知於其母然未免於三至之疑況臣之愚身在絶逺而謗者不知其幾至也伏望聖慈憐臣獨立無助仇怨已多察臣自此號令難行無以安跡除臣一在外宫觀或江淮一小郡差遣使後之治蜀者不至以臣為戒則猶蜀民之幸也臣勢逺情迫不得不以情實控告於君父之前乞免以臣此章付外實荷天地父母生全之賜臣昧死汝愚又乞謹天戒順人情圖久安之計疏曰臣仰惟國家稽古建法比隆三代累聖相繼取於民者有制故能上下熙洽風俗歸厚不幸中更變亂有司困於調度始有一時權宜之制然亦不謂因循積習逮至于今遂與常賦無二而有司並緣苛取之數乃復加多於前日也故陛下之赤子日朘月削垂五十年至是蓋不勝其弊矣加之近嵗以來郡縣之間用度彌廣吏之取於民者益以無度遂致賦繁役重人去本業亡聊之民剽掠盈道甚者十百羣聚盜弄兵於潢池尚賴陛下威靈逺加所向綏定然臣區區之愚竊謂民力困弊至此恐未可便謂既往之事皆微孽細𩔖為不足慮而上下恬然遂忘後日之戒也臣比復傳聞江浙數郡已有水旱去處又乾象示異未循軌轍天其或者仁愛陛下將使陛下益謹天戒俯順人情思與執政大臣深圖所以久安之計若謂國家駐蹕東南規模畧定須俟平定之後復行寛大之澤者臣聞兵以民為本其本末先後之理固自有序若夫不量彼己之勢而務以勝人者蓋亦兵家之所甚忌也孟子曰君子創業垂統為可繼也若夫成功則天也夫功之成與否繫乎天而不可知至於創業垂統要使百世子孫為有可繼之道惟陛下留神幸甚汝愚又乞凡事責成於有司疏曰臣聞天之所以為天也其勢髙髙在上不言而四時行焉無為而百物生焉彼天者初亦何心於其間哉是故生以春夏而生者不以春夏為恩殺以秋冬而殺者不以秋冬為怨蓋其一氣之運上下充滿自然之理其順如此仰惟陛下天錫仁智慨然思欲上齊堯舜卑視百王故法天御極而不自以為髙稽古立制而不自以為功猶孳孳然日與天下之士共圖治安之業建宏逺之規利無久而不興害無小而不除宗社幸甚生靈幸甚然臣聞之以道御權者君之體以勞任事者臣之分故君常尊於上而臣服勤於下此天下之大義也近者道路所聞一二有司裁節之事或言亦取決於九重惟恩有所不及則怨亦將至矣此微臣之所甚懼也臣愚伏望陛下覽荀卿好要之說鑒虞書叢脞之戒凡事之所當為者皆責成於羣有司而又備耳目之官重封駮之任俾謹修其職而告于上陛下於是公聽並觀操賞罰之大柄以臨之顧何求而不得哉然則所守甚要所濟甚博惟陛下裁擇汝愚又乞廣聖志選羣才疏曰臣仰惟陛下臨御以來二十餘載憂勤恭儉常如一日凡天下事之利病人之情偽陛下蓋已飽聞而熟見之矣是宜有所不為為無不成有所不謀謀無不獲仰稱陛下規恢之意然而筭計見效邈未可期論人才則偷惰而茍安論風俗則委靡而不振論兵將則懦怯而無勇論民力則困弊而弗支臣謂及今閒暇之時君臣之間朝思夕計圖囘講畫猶恐弗及而朝廷之上乃循循然務安於無事陛下視今日天下豈真無事者耶臣觀諸葛亮之治蜀也開誠心布公道明賞罰信號令有功當錄者雖疎必用有罪宜誅者雖親必戮遂能以區區之蜀制服彊魏毎一出師則中原為之震恐況我今日能兼有呉蜀之地而其勢反困弱不能奮振如臣前所云者其故何耶臣又觀亮出師表曰宫中府中均為一體終篇所載尤諄複於君子小人之際誠以古今出治之道其原皆本諸此陛下聰眀仁聖蓋所宜深留意者也臣竊聞諸道路之言或謂陛下頗懲前日羣臣誕謾之說比年不輕於舉動所謀既多不遂稍有怠於初志夫不輕於舉動善則善矣若稍怠於初志則何異於因噎而廢食也陛下方恢復大業安可使此聲有聞於中外乎臣愚伏願陛下念祖宗創業之艱難思太上中興之不易内則益厲聖志存卧薪嘗膽之心外則精選羣材盡委任責成之道自然不勞而功無為而治矣太常少卿杜範言今日之病莫大於賄賂交結之風名譽已隆者賈左右之譽以固寵宦遊未達者惟梯級之求以進身邊方帥臣黄金不用於反間而以探刺朝廷厚賜不優於士卒而以交通勢要以致賞罰顛倒威令慢䙝罪貶者拒命而不行棄城者巧計以求免提援兵者召亂而肆掠當重任者怙勢而奪攘下至禁旅驕悍難制鹽軍羣聚相剽刼欲望陛下毋以小恩廢大誼毋以私情撓公法嚴制宫掖不使片言得以入於閫禁約閹宦不使讒諂得以售其姦應孟明為詳定一司敇令所刪定官輪對首論南北通好疆埸無虞當選將練兵常如大敵之在境而可以一日忽乎貪殘苛酷之吏未去吾民得無不安其生者乎賢士匿於下僚忠言壅於上聞無乃衆正之門未盡開而兼聽之意未盡孚乎君臣之間戒懼而不自恃勤勞而不自寧進君子退小人以民隠為憂以邊陲為警則政治自修紀綱自張矣陳傅良對策曰臣恭惟陛下發徳音下明詔博考漢唐已然之效下問承學之臣慊然有師古不自用之心顧臣淺陋何以稱塞抑臣聞自古建議之臣赴功之臣翊扶治道之臣𩔖竊嘆曰不遇聖主如遇聖主當不自用則言無難行事業無難就者臣亦稽之漢唐興王雖六七作考論君徳鮮能全美是以規模褊迫而治效凡近陛下寬仁神武對于三王之隆粤自紹堯所以剪除文具脫畧邊幅嘉與羣臣洗凡而破陋以躋至治以迓宏休甚盛甚美臣愚妄自臆度陛下之聖誠具二美何謂二美臣觀比年有大更張有大施設造命之初慮不可奪一旦事状陳露陛下頓悟立改曾無留難天下咸曰陛下之無我自昔所進今不知其幾何人矣其間蓋有違詔令負任使者陛下察見情偽一予一奪動中公議天下咸曰陛下之知人夫以無我之量知人之明於漢唐可俯視焉而臣伏讀聖策曰朕丕承大命司牧兆人寅畏嚴恭懼徳弗𩔖是以順考帝王之憲鋪尋載籍之傳求其可師以濟于治蓋方慊然師古而不自用如此則臣所謂言無難行事業無難就者捨此時尚安須耶然而十有一年于兹而治績未進于古下情猶欝公論猶沮士大夫猶有懷不敢盡獨何歟或者陛下之所以聖亦所以累聖徳歟不自用之心雖能形之於言未能充之於事歟臣竊迹前事曩者創復發運經營移屯當時廷臣亦有疏其非是者而陛下姑惟試之終於無状今謀者有譴將命者有譴矣豈惟朝野誦九重之不吝而服英斷哉雖陛下將自喜矣茍惟自喜是以為累何者有去故之喜不若有圖新之憂抑臣未知來者之獻計果有以異此乎否也以臣叅之輿言揆之事情其誕謾茍且舉是𩔖耳陛下舍彼取此而不察其適相𩔖臣恐後之悔今亦猶今之悔昔無乃以大有為之時徒費而為改過之日月乎夫以天子聖明春秋鼎盛何鄉不立今且一紀厯日彌長嵗復一嵗改過不給可不為惜乎漢元唐徳寵任羣佞不移如山遇主如此政復何恨柰何以虛心大度過不憚改僅足以度越庸主而竟無所施也聽言之道亦於誤者察之耳假如曩者以好邊功誤繼今言邊功者無遽聽可也反而求之愛根本可也曩者以徼近利誤繼今言近利者無遽聽可也反而求之識大體可也且陛下何不一思曩者誰為主張是乎時不再來事且積廢每試不效曾未決捨已乃數悔而頻改之豈所以圖全耶臣是以妄議陛下雖有無我之量而累於自喜也且陛下之所尊信所寵任其果以為皆忠實而無欺乎深謀逺慮而無敗事乎若果待之如此臣知陛下必且舉國以授之矣今乃不然雖已尊信已寵任蓋至於論人論事之際陛下𩔖有執而不從從而不盡者然則尚疑之歟夫尚疑其人則必既見其情而猶待遇如故委寄如故何耶豈非聖明之意自謂吾能知之吾能駕馭之彼雖欲為欺不可雖欲害吾治不可姑亦縱捨而弗問乎以此自恃所患滋大何者聰明所加豈無限極萬機之務烏能徧知陛下之所執拒十不一二而轉移侵竊於冥冥之中殆不可勝數矣夫未知猶可耳既已知之彼且求固凡所以自歸於君上者惟有恭順耳惟有伺候趨利耳惟有養交借譽以蓋前愆耳陛下見其如此因置弗慮豈知面從者皆所以為背違之地乎茍無誠慤豈足憑藉今予之事權假之嵗月足以遂其私矣徒曰駕馭隂受其害此臣所大惑也大抵使貪使詐惟爪牙之賤役可也股肱心膂要須忠良用人之道百王一法不宜以洞見是非易此弗守臣是以妄議陛下雖有知人之明而累於自恃也夫陛下之師古豈不曰吾將不自用也然而陛下以無我之量而累於自喜以知人之明而累於自恃如臣管窺陛下之所以師古是誠不自用耶抑名曰師古而實自用也臣伏讀聖策曰惟七制之明后若三宗之顯王固本培基則有務徳之君振旅治兵則有雄才之主習聞其號亦觀厥成咸有所偏未臻于極夫樂其號而考其成患其偏而要其極誠如所言信陛下有師古之實矣抑臣有疑焉何也臣伏讀聖策曰若孝文之徳則罪不孥宫不女惜露臺之費除租稅之征可謂仁矣然而恬芒刃之施釋斧斤之用惟尚寛厚其威不伸朕以孝文之文也而能厲之以武不亦善乎臣固知陛下慕文帝之寛仁足以富民而所闕者武功也且陛下自度所以富民者何如文帝耶臣觀文帝以錢榖問丞相而陳平不對謂是有司事耳非所以煩廟堂由是漢之計臣得以自盡倉廪之吏得以氏其子孫臣不識今之所謂冢宰制國用於左蔵之外别有南庫者何也且其辭曰經費一領於大農而增羡弊餘之入南庫受之其名顧不甚美乎然而操制國之權與司農孰為輕重增羡者遄有遷擢經賦辦否則莫能黜陟也厥今漕臣守臣𩔖多自營觀此二塗意將安鄉是以比嵗經賦日耗而南庫之積日滋大農告匱時捐數十萬緡以相補足比及奏聞慮有徳色且均之為國用耳虚彼盈此竟何謂耶夫兵廪如昨吏祿如昨凡嵗百須如昨而大農甚匱將安取此陛下信以為版曹諸臣自齎以取辦乎抑甘受闕額擁虚數坐使乏絶被誅譴乎不能為此必且為他謬巧以茍逭嵗月之責是以上不加賦而民生嗷嗷夫暴征横斂出於朝廷則朝廷得以論列細民得以赴愬今也州縣之賦一按故籍無秋毫加益焉而有司巧為斡旋暗相資奉旁緣科色誅求錙銖羣臣欲論列之耶細民欲赴愬之耶而獨無彰彰之名可以指状所以至仁在上惻隠至矣而澤不下流是可不為寒心夫文帝以司農理財至於寡取陛下以宰相理財至於多取臣故曰陛下慕文帝之富民而不由其道所以評文帝者誠善矣而無益於治也臣伏讀聖策曰若孝武之功則選明將討不服匈奴逺遁百蠻鄉風可謂盛矣然而積屍暴骨快心胡越財賄耗而不贍干戈因以日滋朕以孝武之武也而能本之以仁不亦善乎臣固知陛下慕孝武之雄才足以强兵而所不取者薄於仁也且陛下選將厲兵亦嘗用武帝故事乎臣觀武帝操縱將帥最有繩尺一旦乃以愛故欲將貳師夫以帝之威靈寵一偏將其誰敢議而帝也必枚卜諸將貳師最吉然後行之誠不欲以一女子之故弛廢家法抑絶廷議也今天下之兵不屬之三衙與邊帥乎或云近者禁扈之除專閫之寄往往由徑抑臣疏逺未知信否間亦得之防夫走卒街談巷議以為諸將平時所以侵剋廪錢隠占伍籍貿易稱貸以謀聚財大抵將以結交媒進身耳臣竊憤之夫以陛下篤意戎事妙選授鉞雖大臣不得與可否尚安有此日夜思念莫執其咎或者左右朝夕積譽之漸遊談之久亦足以宿留宸聰而宻囘天聽耶患生所忽殆不易知陛下習聞姓名忽不以次用之當是時豈敢有誦言論薦者乎蓋其於簡記之先借助多矣夫斷自宸衷恩顧歸下賂入私室怨在公家凡有愛君之心誰忍聞此況夫將帥素輕士不素附而欲望其立功靖邊不亦難乎且武帝以私選將猶不廢公陛下以公用人奈何不稽于衆顧得以容私耶臣故曰陛下慕孝武之强兵誠得其所長矣而擇將之理未盡臣未見其能强兵也臣伏讀聖策曰文者帝王之利器武者文徳之輔助也文之所加者深則武之所服者大唐之太宗實惟兼之觀其内平禍亂外除夷狄安諸黎元各有生業史氏所以稱其功徳兼隆由漢以來未之有者也臣又以知陛下小漢家之偏尚而想貞觀之獨隆陛下之志豈不大而學豈不博哉然臣據漢鑒今未能無惑而折衷諸唐抑有四未喻焉夫陛下以古問臣臣不敢徒以古對如陛下誠有慕於唐歟臣請言今之所以異於唐者願陛下審擇而更張焉則豈惟如唐將有隆於唐者惟陛下所欲耳太宗諫官入閤之制非以求諫耶而陛下不樂忤意之臣此臣之所未喻者一也太宗幕府學士之選非以崇儒耶而陛下有輕視儒生之名此臣之所未喻者二也太宗感魏徵之言使羣臣不存形迹陛下乃以近名責臣下此臣之所未喻者三也太宗屈意讎臣而不以秦府自衞陛下乃以合黨疑外庭此臣之所未喻者四也臣非但以太宗望陛下者安敢懷所未喻而不試陳于前曩者議除發運議遣泛使論思邇臣一語不合往往罷斥甚或流竄事亦少異矣雖然是尚有可讓者曰是非官守言責也日近除授而臺諫有所彈奏舍人不書黄學士不草詔是不曰官守言責乎蓋職分常事耳而夜半一紙忽從中下或出或罷曾不淹辰而吏卒譏訶不容留輦轂下夫震霆不及掩耳古所以待桀猾也此皆陛下忠愛臣子進退惟命安用若此怱怱惶惑民聽哉夫陛下有混一夷夏之志而不能容一二齟齬之臣將以垂宗社無窮之休而不能少屈須臾之聽省闥臺垣虛位幾月臣竊恠此何景而見於不諱之時也太宗獨不怒諫臣乎宫中無髪之語尚能忍之深知言路開塞乃人主切身利害彼紛紛以口舌爭者果誰為也臣以為陛下誠慕太宗當自求諫始腐儒空談祗亂人聽豈惟人主厭此雖稍知務書生固自厭此陛下不與共事其誰念之哉然而腐儒端不可用而不可有輕視儒生之名何也非所以招徠其𩔖也非所以令衆庶見也脫有真儒亦其儔軰或以取輕為愧而一動歸去來之心陛下安能有之夫燕昭之禮郭隗其虚聲猶足以致士焉有聖人撫御天涵地育而一旦有棄士之名哉且自陛下臨御以來凡所謂陋儒其被戮辱蒙頓挫者誰乎蓋未之見而逺方之士風傳料想往往過當或曰經筵特虚器耳科詔特故事耳賜出身特末混流品耳無乃闕盛美矣乎十八學士豈盡全才間亦無過區區章句文墨淺事而太宗兼取並蓄厥意不獨為緣飾也臣以為陛下誠慕太宗當自崇儒始夫好名之士迹似而心不同如其浮躁剛愎掠美于己而歸過于君誠不足顧惜也以臣泛觀人才無慮數等蓋亦有介直而無隠疎易而寡慮其漏言似掠美其憤悱似歸過者要其存心至拳拳也至不自為計也若以好名槩視無乃非所以全愛之乎且陛下亦知其所以失者乎其器度不宏其所養未厚焉耳夫惟容小所以見大納汚所以成深人主固當有逺過天下之量也儻亦以不推遜為諱不彌縫為嫌不幾於示天下狹耶正使不然而以聖徳洪深責備臣子稍稍矜露亦恐凡百在位俱不足以望清光佐下風矣陛下將誰與共理乎臣以為陛下誠慕太宗惟無以近名責臣下可也獨不觀魏徵請以諫藁付史官乎脫欲爭名將以焚草為賢矣仆碑之讒乃晩節一恨又何足法臣竊考自昔黨議多興於下何者此人臣相傾之私而非君上之願也蓋黨成則大官重權利歸於已誅戮斬殺怨在一人而禍歸社稷若其不成又將沉浮茍免耳由此觀之黨議成否一無便於上者此太宗所以中持衡焉無所偏倚以銷伏其說而和平其心臣愚不識近日詔令何為而合黨之言累累發也以臣觀今羣臣大抵外同内異惟身是計惟家是計何暇相黨假如議一大政疏一大臣甲纔譴訶乙且退縮其餘立而觀之耳甚者反是而迎合耳陛下何不審觀比年亦有諫一事而連章不置如曩時濮議薪法事乎亦有用一人而更數手不奉詔如曩時李定入臺宋敏求李大臨蘇頌之徒乎亦有逐一人而同列乞與俱貶如曩時范仲淹尹洙余靖之徒乎正患人臣不同心耳而陛下方以為黨此人臣私議於國何利而可倡於君上哉臣以為陛下誠慕太宗惟無以合黨疑外廷可也牛李之禍唐之所以亡也豈太宗家法乎臣伏讀聖策曰瞻言清風竊所嚮慕伊欲規其能事跂其成績何修何飾而外户不閉行旅不齎何取何營而斷獄幾刑措米斗直三錢歟家給人足厥道何由仁義功利四者之宜當安所施臣以為太宗能事成績畧盡君道不越數端陛下所以修飾莫若去其不如太宗而就其如太宗者捨是將有所營取焉非臣之所敢知也且陛下試思臣之所未喻者其與太宗異果何由歟豈非恃天資之髙明謂天下可獨運而專斷歟昔貞觀之初蓋有以獨運之說惑太宗者矣而太宗卒莫之聽是以後功利先仁義而收家給人足之效陛下欲比迹焉而顧操其所不用之術臣竊為陛下惜之方今下情猶欝公論猶沮士大夫猶有懷不敢吐而陛下方且顧盻周行𩔖不適用慨嘆當世殆無其人茍非忤㫖而去則曰是腐儒耳則曰是好名耳則曰是黨耳然則陛下臨事腹心將安寄乎於是乎始有棄文尚武親内疎外之心臣豈不知陛下固非好違經常率意改圖而徒犯不韙之議哉誠以一時聞望之士厯試而甚亡具十年以來凡許國者皆不踐言也大功未立萬緒闕然展轉周囘莫適與濟是獨非人臣負陛下至此哉雖然意有所偏則事有召禍詩不云乎無田甫田惟莠驕驕無思逺人勞心忉忉臣竊憂陛下之他有所求將以獨運專斷而去道愈逺徒以勞心也且陛下之所以方武臣未知何以也竊聆近制削下拜之禮升雜壓之序夫操馭英雄亦顧聖畧何如耳安用此瑣瑣為耶是固其細者也彼閨閤賔賛之臣肺腑之戚强名曰武特服飾𩔖焉耳彼實安能而陛下沈繹容與累年之久而再畀之樞筦之地豈惟搢紳煩言韋布喪氣下至於老兵悍卒亦籍籍後議有侮視不平之心方當大有為之時而但曰不必右武誠迂濶矣若陛下但以名取茍服飾爵號僅與文士異輙取而寵之百僚之上罷亦不失旄鉞居不足與謀也出不足與戰也無乃似武而卒非乎夫以似武而非之人躐處民上而曰以作士氣以起戎功臣恐其去腐儒無幾也陛下何不因羣情之共違而察一意之所獨嚮乎且陛下清心寡欲不翫細娯彼侍御僕從之臣凡所以承間而取憐者一無惑焉則陛下豈偏厚内廷者哉或者徒以好事逺畧好察臣下好興利除害之心動乎其中而或為容悅者所中耶何者欲擊射之便則不可與外廷共習欲探伺之宻則不可與外廷共議欲用嘗試之說則不可與外廷共施行勢非此曹安用乎夫陛下用之纔不過此耳而影響氣焰足以傾人不惟容姦殆且生患比年羣臣或以言斥或以事斥者相繼也獨侍御僕從未有聞焉豈在位皆浮偽而彼獨無所蔽欺耶其地宻邇其彌縫之計精也陛下手撓指顧彼因而趨之矣陛下聲嗟氣嘆彼從而和之矣若是而不能幸免將誰幸免耶外議因是謂果親之也患且必至陛下何不因羣情之所共違而察一意之所嚮乎陛下聖策之末丁寧於臣曰子大夫習先聖之術通當世之務合志度義其知之矣其明以啓告朕悉意正論無枉執事朕將親覽焉臣誠淺陋無所稱塞區區之愚獨以為陛下有師古不自用之心而顧至於獨運專斷任一意之所獨嚮忽羣情之所共違是以下情猶欝公論猶沮士大夫猶有懷不敢盡故於卒篇申獻焉而不復他云詩云心乎愛矣遐不謂矣臣不勝拳拳傅良知桂陽軍擬奏事劄子曰臣所謂養兵固難而曾莫為國家任其事者臣嘗思其故矣非必皆羣臣之罪也勢也方今天下之勢以陛下明聖豈不灼見其偏歟其在朝廷有官守者不如文墨議論之寵其在四方有民社者不如監臨案察之專蓋非一日之積也往者給諫館閣與省府之官位望相等而不厯省府往往不至執政夫是以清議行而有司無失職儒雅進而能吏有以自見而朝廷之勢適平自主判廢而職掌分更迭之法改而流品别由今臺省視六曹長貳自為清濁況他有司乎臣故曰有官守者不如文墨議論之寵也往者帥漕望郡事力不分而將相大臣多領藩服夫是以財歸公上而邊郡未嘗不實耳目在監司而守將得立功於繩墨之外而中外之勢適平自以兵係將歸之提刑常平茶鹽歸之提舉大軍之餉歸之總領至今帥臣徒擁空名威望風采不逮監司逺甚況支郡乎臣故曰有民社者不如監臨按察之專也推是二者可以察見天下之勢日趨於偏矣是故煩言勝而事不待其成糾禁苛而人不盡其力今上自臺省下至州邑胥吏執其政長官不能誰何大者三衙小者鎮寨卒伍失色則主將屏氣甚者匹夫單人動揺在位管攝之下操持其長是今日之勢也是以不事事者常無咎而坐觀成敗之俗成臣故曰非羣臣之罪也勢也且以綿地數百州之廣外有夷狄之難内有盜賊之患而執事者皆取具位曽無一人根柢深厚可以託重雖有許國之人欲展布而無繇陛下念此可長恃乎自古事變不於暇豫圖之則俄而至於倉卒不與忠愛臣子共之則或不得已付之一切之人倉卒不如暇豫一切之人孰與忠愛利害甚相遼絶也而每患不果易曰黄帝堯舜通其變使民不倦神而化之使民宜之伏惟念光堯遭變之難鑒藝祖造邦之意推黄帝堯舜宜民之術以正人心以捄天下之勢則宗社幸甚蒼生幸甚歴代名臣奏議卷五十二
