body:
  text: 歴代名臣奏議卷二百三明楊士竒等撰聽言宋神宗即位初御史中丞司馬光上奏曰臣伏以大舜舉賢敷納以言眀試以功漢武帝詳延特起之士待以不次之位終獲其用威加胡越真宗皇帝緫覧羣臣章奏用其言而顯其身以成咸平景徳之治凡察言所以知人知人所以立政自古及今其道一也今陛下即政之初首開言路令中外臣民皆得上封事海内欣欣咸畢精竭思以承休徳若于此際能采其嘉謀舉其賢才而用之則太平之基可指日而望也若徒備外餙廢其言而不用棄其人而不取則天下頽弊之事當何時而振起乎臣與張方平先受詔詳定中外所上封事雖已盡心料簡合于義理可施行者一一奏聞更望陛下擇其精者決自聖意必令行之其有識慮稍出于衆者願陛下特賜召對面加詢訪考其虗實果有可采密籍姓名遇有差遣隨材授任俟其實有顯效然後可以不次抜擢如此則嘉言罔攸伏野無遺賢矣光又上奏曰臣竊見近嵗以来政府言職迭相攻毁分為兩朋有如讎敵所以然者盖由人臣各務逞其私志互争勝負不頋己之是非人主不忍違逆人情兩加全䕶不肯判其得失是以羣下紛紛日鬬于前而朝廷為之多事者也臣伏見陛下天性聰眀仁孝恭儉踐阼之初孜孜求治此誠堯舜之資羣生之福也羣臣幸得遭遇此時不務將順聖徳紀綱治體革政事之久弊救百姓之疾苦而各為私鬭不知窮極誠可罪也臣聞人君之尊與天地同體以剛健為徳以重厚為威照微當如日月𤼵言當如雷霆昔漢武帝謂田蚡曰君除吏盡未吾亦欲除吏又謂衞青曰郭觧布衣權至使將軍言此其家不貧人主之言若皆切當如此羣臣安得不畏服㢤夫心知其非而面循其情口順其説依違兩可此最人君之大患也國家政事未有不先經兩府相與商議然後施行闗防祕密外人莫得而知及詔令已下䑓諫方得聞之若事有未便從而論列陛下還復下之兩府人之常情自非大賢誰肯以己之所謀為非而以他人之言為是㢤必須排擯沮抑以為難從此人主之所以獨取拒諫之名而大臣私得專權之便者也臣愚伏望陛下自今應有臣僚上言朝廷闕失者陛下當清心審慮自以大公至正之道決之若大臣所謀果是不必頋恤言者所陳果當不必曲順大臣之意位無髙下言無先後惟是之從又何紛紜之足患㢤必若其人等固有争執者陛下亦當􅄪加審察更以理道往返與相詰難以盡其情果有可取勿憚改為若漢宣帝之于趙充國則萬事無不當矣必若理道是非顯然在目而其人執迷文過強狠不己者雖加罪黜天下豈以為不可㢤如此則豈惟事得其正亦使威福之柄盡歸帝室矣凡天下之事是非未眀則不可不謹是非既眀則在陛下決而行之臣前日所謂惟道所在斷之不疑姦不能惑佞不能移者正謂此也惟聖明裁察光又請自擇䑓諫劄子曰臣竊見近日䑓諫上言制置三司條例司害民及吕恵卿姦邪者率被責降或更加以惡名如吕公著告辭云乃誣方鎮有除惡之謀中外聞者無不駭愕竊惟朝廷之意無他正欲懲戒来者使不敢復言耳國家置䑓諫以為天子耳目唯恐政事有闕失百姓有疾苦大臣專恣左右姦邪天子深居九重不能得聞故也今䑓諫官稍有懐剛直之志畏天下公議憂念朝廷哀閔百姓忤犯大臣刺譏左右者陛下輙罪而逐之更使大臣自擇所親以代其任萬一又為公論則又逐之是必得庸懦阿諛不知廉耻附下罔上背公死黨之人然後止耳若言路皆此等之人則禁闥之外陛下耳目之所不及者雖有至大之事廹切之禍陛下何從知之如此豈宗廟社稷之福也晏子曰君所謂可臣亦曰可君所謂否臣亦曰否若以水濟水誰能食之今陛下使大臣自擇䑓諫官大臣又取同于己者存之異於己者去之然則陛下獨與大臣為天下足矣何必更置䑓諫官也且條例司之害民吕恵卿之姦邪天下之人誰不知之獨陛下與王安石未之寤耳豈可更為之黜逐䑓諫以長其威福成其氣勢臣竊為陛下寒心今䑓諫官已被逐者臣不敢㽞唯􅂅陛下自擇公正剛直者布之言路以眀四目逹四聰勿使為羣下所欺蔽則天下幸甚臣受陛下近分之㤙不敢塞黙雖死怨讎之手猶賢于竊禄偷生者也熈寧元年翰林學士王安石上奏曰臣竊聞轉對官陳習坐言人罪惡被絀監當習之為人忠邪愿奸臣所不知然陛下施罰如此有未安者二上下之所以相遇者詔令也詔令所以行于天下者信也詔令不信則人主之權廢矣故孔子以為兵與食皆可去而不可以無信今陛下命羣臣使斥言有位之阿私朋比尸素有一人言之則不攷問其虗實而絀之則甚害陛下之信此未安者一也人主之聽天下不可以偏偏則有弊偏于惡言人罪則其弊至于姦慝不聞真宗但惡人潜行交結隂有中傷故詔言事者不得㽞中此未有大失也然在位者遂以為人主厭惡言人之惡者其俗之弊乃至大臣奸邪􅂍汚而真宗終不得聞盖言人之惡者既衆人所不喜而人主又厭惡之則其弊必至于此今有一人為陛下斥言人臣之罪未知其虚實而陛下遂以為大惡則今孰敢為陛下言人之奸者乎奸不上聞則雖大臣復有􅂍汚狼籍者陛下無由知之而天下之政壊矣此未安者二也臣聞人主之聼天下務在公聼並觀而攷之以實斷之以義是非善惡皆所欲聞所不欲聞者誣罔欺誕之言而已即不欲聞人之惡則象恭滔天方命圯族非堯之所得知也堯所以能知共工及鯀之惡而又知舜之善者盖以能公聼並觀不蔽于左右親習之人而攷之以實斷之以義一切斥絶拒塞誣罔欺誕無義之言而已故書之稱堯者以其能疾讒説畏巧言非以其惡言人之惡也人主所以為賞罰者以善惡也􅁒知善而不欲知惡則是欲有賞而無罰也有賞而無罰有春而無秋非天地之道隂陽之理也臣愚以為陛下此舉過矣其作始則小其弊成于後則大不可不察也改過不吝者成湯之所以聖也伏惟陛下不吝改此則天下幸甚二年侍御史陳襄上奏曰臣竊以天下之道常存乎公議公議廢斯道或㡬乎熄矣夫人皆有是非可否之心盖出于理義之性雖聖人無以異也方其是非可否之時苟其心不至乎有所好惡則其言未始不公雖匹夫匹婦之愚猶有可取而況士君子者乎彼君民者凡施一政立一事方且自謂吾思慮之甚精議論之甚熟聞其言而莫之省也且以為流俗之論亦不思之甚矣故天下之公議常起于好惡未𤼵之前而失于是非相勝之後君人者不可不察乎此也己以為是而天下以為非己以為非而天下以為是焉未可知也必待天下之人皆以為非然後捨焉是衆人捨之也故其取于人也無貴賤戚踈賢愚惟恐其謀之者不多論之者不博道之所存議之所從也古者天子聼政使公卿至於列士獻詩瞽獻典史獻書師箴瞍賦䝉誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖厲王暴虐使人監謗召公用是諌之而不聼遂至流亡之患宣王既立用方召以為輔相修文武成康之遺風而雅道復行故其政善者詩人美之若雲漢崧髙之𩔖是也其不善者詩人亦或箴焉庭燎是也或規焉沔水是也或誨焉鶴鳴是也或刺焉祈父白駒之𩔖是也故天下諸侯復宗周而王室中興焉夫言之於人君其取捨興亡如此之明效也伏自陛下享國以来咨嗟求治惟恐一言之不獲一事之未聞親降詔書詢求闕政毎遇便殿延訪羣臣之言至于日昃仍命百寮轉對得以封事上聞求之前王未有若陛下兼收廣聼如此之勤也然而興事改作惟聖其難王安石近置條例一司失于過聼事不由扵宰府謀不及於士民耆艾不與聞臺諫不得議所建議惟門生屬吏而已天下雖有是非之論一切不聼事行之日中外莫不悱然非之謂不可行此由責任太專而不取人言之過也易之蠱曰先甲三日後甲三日終則有始天行也言有事之時人君欲創制申令必先審慮於始當圗成其終猶天道之行四時以成變化柰何獨以一二臣之臆見而議天下之法㢤陛下雖欲從之其如天下何昔者子産相鄭鄭人有逰鄉校以論執政者然明請毁鄉校子産止之曰夫人朝夕退而㳺焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之孔子聞之曰人謂子産不仁吾不信也韓愈為之頌曰誠率是道相天下君旁通交暢施及無垠盖惜其不遇也又曰四海所以不治有君無臣誰其嗣之我思古人盖傷今不復有斯人也伏望陛下復雅道以行宣王之政責近臣以子産之用心無任一人之私言無廢天下之公論舉一事必稽于衆施一政必順于民罷去誅求之法以安人心牽復放斥之臣以開言路使百工羣吏咸得以職事持議箴補主闕則可以無偏係過舉之患矣易曰同人于野亨利渉大川言所同者逺無所係吝則其道光亨可濟大事矣伏惟陛下㽞神聼納則天下之福也襄又上奏曰臣聞君之視臣猶心膂之于股肱耳目也四者相資而成一體則不勞而功用成矣故公卿者人君之股肱而䑓諫為其耳目也故古之人君用諫諍之臣必求方直辯博之士司其視聼而補其闕遺其心諰諰然惟恐不聞切直之言以救其失故舜戒其臣曰臣作朕股肱耳目又曰予違汝弼汝無面從退有後言是也古之人臣諫諍其君苟可以言雖鈇鑕之在前無所忌諱者欲以致君之無過而非所以暴其惡將以効臣之莭而非取其名盖居言責之任其義當耳故易曰王臣蹇蹇匪躬之故書曰斯謀斯猷惟我后之徳是也故君臣之際同心協徳義成一體上之人苟聞一言之善則雍容聼納不以為暴巳而無所疑下之人苟聞一事之失則周旋切争不以為干譽而無所憚此所謂信而後諫者也伏望聖慈少察臣之言則天下幸甚襄又乞免劉述等言事罪状曰臣近者竊聞侍御史知雜事劉述以繳勅被劾前日御史劉琦錢顗又以言事責降尋准同知諫院范純仁牒稱為䑓官劉琦等責䧏有狀奏乞㽞逐官及言參知政事王安石事居家待罪更不供職乞行貶竄牒院照會者臣亦備位諫官端視朝廷上下之情乖戾若此臣實憂之陛下始者知安石之賢擢與大政天下聞之莫不相賀以為陛下有知人之􅈒能任道徳之臣陛下責望安石之意既深則安石論報陛下之心愈急事既傷于欲速人不免乎有言䑓諫耳目之官苟有見聞不敢緘黙事之可否在陛下擇而行之不宜小有忤旨便加譴斥恐非所以通下情来諫諍之道也自陛下享國以来凡五易御史中丞䑓諫之官罷斥相繼以不失職而去固無所損然而天下之人皆謂陛下不能包容聼納窒塞言路訑訑之聲音顔色拒人於千里之外在于聖政不為無損也況今官政因循上下無守述為刑曺繳勅待罪可謂不失其職矣若陛下因此罪之是使天下偷禄苟安之人益隳官守矣況御史之任得以糾正朝綱今琦與顗為言執政之臣雖風聞失實未為深過若以微罪被逐是使言事之官無復敢論柄臣之闕失矣此竊為陛下惜也夫天地之所以為大者以其善覆萬物而不可名善載萬物而不可度聖人之徳亦在容之而已矣書曰必有忍其乃有濟有容徳乃大􅂅陛下不以守職違詔而寘述于法不以言詆近臣而重琦等之罪則天下幸甚監察御史張戩等乞察官依諫官例登對狀曰臣等毎有本職公事􅁒上殿敷奏必候朝旨既許上殿伺候班次動經旬日儻遇朝廷政或闕失及外事有闗係于機速不容後時者如此稽遲則已無所及況使往復待報必由中書萬一事干政府則或致阻抑耳目之司雖欲應急陳聞安可得也伏覩天禧詔書或詔令不允官曹渉私措置失宜刑賞踰制誅求無莭寃濫未伸並委諫官奏論憲臣彈舉是盖䑓諫之職言責既均則進見之期理無殊别何獨憲臣隔絶踈異欲乞朝廷推原天禧詔書之意使依諫官例牒閤門即許登對或所言急速仍乞先次上殿所貴遇事入告無憂失時翰林學士韓維乞不可以直言黜士狀曰臣伏見應賢良方正舉孔文仲對䇿入等以論時政意異詔文仲罷歸仰惟陛下𨗳人使言一有不合便行棄黜此後誰敢有言者陛下嘗嫉言事之人好同流俗沮敗朝廷行事且行事在審理審理在合時變使流言自息乃為善也而欲黜責以止之臣見其無益於行事有損於治道也陛下毋以文仲為一賤士而黜之何損於事古人扵事常戒㣲漸臣恐賢俊由此解體忠良結舌阿䛕苟合之人得窺其間而競進為禍不細文仲可取而逐之臣恐於文仲未有所損而其損頋在陛下也願改賜處分以幸天下九年監察御史彭汝礪論近嵗用言好同惡異䟽曰臣伏以陛下自初政于今㡬十年損益賡續紛紛莫知所止條令數下使車結軌于道郡縣之吏不能勝任言理財著㡬悉矣而公私之用愈屈於不足風俗彫弊徳義陵夷浮虚刻核如無復有所憚者旱蝗水潦飢饉疾疫加之師旅逺方騷然不安矣此固陛下勵精夙夜弥綸以臻厥成之時也臣􅂅陛下加謹焉毋忽于其動思所以安之扵其順思所以寛之于其易思所以難之於其薄思所以鎮之於其貧思所以貸之此今日之至計也夫潜神于一堂而欲以周知四海之逺制法于一時而以施及萬世之久夫豈一耳目手足之力㢤惟在盡人謀而已㣲臣淺陋實無益陛下毫髮之事惟陛下益廣言路以通下情下情通則忠謀日至而利害之迹邪正之實不得隐于天聽矣盖事係于天下則當與天下共之事係扵衆人則當與衆人共之非可以私也臣觀朝廷近嵗用言之道同之則衆譽之以為竒才為知治體而果用之異之則衆愚之以為同俗為不知治體而果廢之夫是非在理不在同異使同而有所附焉雖同乃所以為欺也異而有所取焉雖異乃所以為忠也夫上所好惡民之表也上惟同之為好則民亦以同為貴上惟異之為惡則民亦以異為賤人不能無賢不肖事不能無利害而人人雷同環合以可不可為一則將沮君子而為小人將餙罪而為功虚方欺而為實利方詐而為義末流之弊臣恐不可勝治矣陛下道濟天下而智周乎萬物嚬笑俛仰之間再撫四海之外羣臣涓塵終何足以有益耶惟深為天下屈意聼納以荅天變以同民憂幸甚十年汝礪又論言事不當問所得䟽曰臣近論都檢正俞充及開拆事初十日准中書省劄子奉聖旨具析上言俞充事迹得扵何人聞奏者臣不肖不足對揚陛下之命承詔震恐惶然失次臣伏念天下之才有正則有所謂邪有賢則有所謂不肖人君淵居嚴宻無由自察之也于是有耳目之官御史亦因衆人而問焉凡臣之糾擿姦慝非有毫髮為其身謀也實自陛下使之衆人或為臣言亦非有所欲也廹于臣之誠心而已廹以至誠而得之及有所畏避而暴露之而投諸罟擭陥穽之中而臣乃獲安焉則臣不唯不容于人而且得罪于有司夫廢一官吏非足為朝廷輕重也然官吏以漏言扵䑓諫而廢則衆皆以前車為戒而外之是非得失無復至扵臣軰矣以臣之昏弱不肖而使憲臣盡不得聞知外之是非得失將無以照燭幽闇而弥縫其空缺臣之罪莫甚焉臣寧自刻不敢奉明詔充之材行如陛下知之為詳則臣之罪亦自見矣凡臣所居官職皆陛下所予􅂅并納以易罪若猶未也􅂅益察之縁臣論列非一状御史中丞鄧潤甫裏行黄㢘亦各有䟽乞詢于衆及委官盡公根究如有不實則臣為誣善為殄行竄流荒逺其又何辭臣無任懇切之至汝礪又論聼言未至䟽曰臣幸以不肖得備數憲府與聞朝廷之議論而其學不根屢辱聖訓乃知堯之道無能名孔子之言性與天道不可得而聞而其間有所未達不敢諱匿不陳以負盛㤙惟陛下加察焉臣聞之凡人莫難扵争臣為人臣則不得有己為争臣則不得有隠人君我之所天也能制禍福䏻制貴賤而有過則必正之人臣我之所委也非䏻輕重之非能榮辱之而有姦惡則必言之以至賤應至貴而言其所惡聞之過失以至孤敵至衆而發其所隐之姦惡則危辱怨禍之至如歸焉危辱怨禍不獨其身亦及其子孫夫抱闗擊柝乗田委吏皆可以成業而以儻来之名器舍去天下之至安而投不測之危禍背違衆人之榮譽而召無窮之怨惡則其身其計非為其家亦明矣陛下至誠懇惻􅂅治如臣不肖而優容假借慰藉之良厚則知陛下屈意於天下之賢雖古不能過也聼言之道有所未至者三盖有所疑有所易有所專此臣之所未喻而不敢諱匿者也臣聞之人君之所以交扵天地應于萬物者無所不用其誠也在我者無所不用其誠則人之誠亦至焉臣竊聞陛下勵精扵事纎悉必躬而不能無疑心臣以謂不然周尹言王中正事陛下疑以謂中正不能成就蜀中士大夫然後知說者有以焉夫言國㤙與鄉里孰重必曰國恩重得于人君與得扵人臣孰重必曰人君重違所重而取欺天之罪從所輕而取小人之譽臣子恐不敢如此臣伏思陛下扵百官之中取六七人者為諫官御史使得察百官邪正辯天下利害而言則必以其人為可信也以為可信則任之而不疑以為可疑則去而不任既任之復疑之既疑之復任之非誠之至也盖上以疑待下則下亦以疑事上上下之志不交則不足以有成矣陛下所委者外臺也今外䑓乞罷免黜逐者日夕不絶使陛下以意度之以為某人為某事言某事為某人言某人臣知有所不能徧臣非為尹辯恐陛下以是心待天下則賢才如尹者知有所不言矣臣所論多陛下宣諭及所戒飭者則知陛下之意不以不肖為可惡而將教之也臣雖已銘刻然扵義有所不安則其告之亦不敢後也盖君視臣如手足則臣視君如腹心陛下知足以格天地辯足以彫萬物聖敬日躋方登于堯舜而羣臣區區曽不足以髣髴扵五帝之佐其何能仰望清光哉陛下歸視收聼退藏于深宫羣臣猶且縮慄震懾不敢以盡使以眀為用則熒熒之火必不能為光矣臣毎見陛下之臣稱陛下髙明博厚比扵天地論之扵古則貫穿歴世而不遺以之扵今則周旋萬事而無盡臣下知嗟嘆而已臣獨有疑焉臣前論市易事䝉宣諭以謂不知本末臣誠山野未更扵事然臣所以事陛下其嚴如天凡所欲言稽之古參之今聼之民謀之士大夫反覆至扵無不同而後言少疑則闕之十至扵八九焉則於本末之際不敢言不知也陛下誠盡察之而少賜寛閒之燕使臣得指畫扵前而少容盡其區區之愚則臣之言必有以當聖心者盖天下之人散之則愚合之則智故曰君子之道造端乎夫婦夫婦之愚非足以言扵君子有取焉以其所長而已不以其不足聼而忘之也如臣昏闇未諭指數其言不善固不足道惟陛下以誠心待之則言有善於臣者有不得疑之矣臣嘗言之曰是非在扵衆人則與衆人共之利害繫扵天下當與天下共之盖雖人主有不得專也吕嘉問之姦詐險䛕自大臣以至扵僕圉之賤自朝廷以至扵四海之逺盖無不聞知所以愛憐而不忍去者獨陛下而已夫人君之於人臣固有所謂庸之者能有益扵國而于民為損䏻有利於上而扵民為害皆非先王之所庸也傳曰民功曰庸則先王之所以庸之者以民為主而已夫辟土地以強國實府庫以富國以今言之如所謂才也而孟子以為民賊況嘉問上欺陛下下欺扵民實未有以益國羣臣言之愈切陛下持之愈固臣未知所謂也夫嘉問區區實不足數為陛下道然陛下以是待天下之士是害有甚扵嘉問者陛下有不得知矣有所疑似乎不能毋意有所易似乎不䏻毋我有所專似乎不䏻毋固凡此皆非㣲臣所望扵聖學也有所疑則忠信之士不至有所易則禮法之臣不勉有所専則正直之臣不進忠信之士不至則所與者譎詐而已禮法之臣不勉則所任非所嚴者矣正直之臣不進則過有不得而知矣此不可不戒也臣聞之治國猶治疾不䏻望而知之問而知之亦可矣不䏻問而知之脉而知之亦可矣知疾在一支則治一支在一體則治一體以一支體為不足憂則嵗時日月之變外有𫝊之内小有積而大四支百體病有不可勝治矣臣竊惟陛下剛健不惑日勵精扵事天下指日數月以望唐虞成周之太平今有為十年矣而事功未至扵成就而其弊有加焉凡此疑皆言路不通之過也惟陛下加慎焉神宗時制侍郎以下不許獨對御史中丞黄履上言曰陛下博訪萬務雖逺外㣲官猶令獨前頋于侍從乃弗得願也遂刋其制御史翟思言事有㫖詰所自来履諫曰御史以言為職非有所聞則無以言今乃究其自来則人將懲之䑓諫不復有聞矣恐失開言路之意事乃寢御史中丞鄧潤甫上奏曰向者陛下登用雋賢更易百度士狃扵見聞蔽于俗學競起而萃非之故陛下排斥異論以圗治功然言責之路反為壅抑非徒抑之又或疑之論卹民力則疑其違道干譽論補法度則疑其同乎流俗論斥人物則疑其訐以為直故敢言之氣日以折而天下事變有不得盡聞曩變法之初勢自當爾今法度已就緒宜有以来天下論議至於滛辭詖行有挟而發自當屛棄如此則善言不伏而真大治也􅈒宗即位初門下侍郎司馬光上奏曰臣今月一日夜䝉降到吕公著劄子一道付臣看閱所陳更張利害有無兼濟之才直書當與未當具悉奏来者臣自公著到京止扵都堂衆中一見自後未嘗私相見及有簡帖往来今公著所陳與臣所欲言者正相符合盖由天下之人皆欲如此臣與公著但具衆心奏聞耳臣聞書曰有廢有興出入自爾師虞庶言同則繹言國家政事欲有所改更必先謀於衆人所言皆同然後行之則無失也傳曰上酌民言則下天上施言為人上者當采酌民言從其所欲則在下之人戴上如天受其恩施也伏望陛下察公著所陳參以臣民所上實封奏狀若與之同者斷志行之勿復有疑臣見太平之功不日可成矣公著一言而天下受其利可謂有兼濟之才所言無有不當惟有保甲一事欲就農隙教習臣愚以朝廷既知其為害扵民無益於國便當一切廢罷更安用教習容臣續具劄子奏聞次其公著劄子謹同封上光又上奏曰臣伏見陛下詔開言路至今已渉旬月必有臣僚民庶上言朝政闕失民間疾苦奏状已多見有付外令三省或樞宻院商量施行者如此則徒煩聼覧何所裨益昔漢昭帝時吏民上書言便宜有異輙下杜延年正處復奏先帝初即位詔中外上言得失亦令臣與張方平同詳㝎選擇可取者與元奏状同進入内或降付三省樞宻院施行臣竊計今来臣民所上文字其間是非臧否雖錯雜嘉謀長䇿不可謂無以睿明所燭諒毫髮無遺豈可一概棄置全不采用欲乞選其可從者䧏出施行或以萬機之繁未暇遍加施覽即乞依臣前奏䧏付三省及執政官分取㸔詳擇其可取者用黄紙簽出再進入或㽞置左右或䧏付有司施行光又上奏曰臣聞古人有言謀之在多斷之在獨陛下寛仁委政羣下或政有大疑議論難壹儻陛下不決其是非則争辯紛紜無時而息事功何由可成臣謹按蔡邕獨斷叙漢制有疑事公卿百官會議若䑓閣有正處而獨執異意者曰駮議其合扵上意者文報曰某官某甲議可此所以各盡羣下之所見而人主亦不失操柄也今執政之臣雖相與竭力同寅協恭若萬一有議論必不可合者欲乞許令各具劄子奏聞望陛下精察其是非可否以聖意決之或於簾前宣諭或扵禁中批出令依某人所奏若羣臣猶有固争執者則􅂅陛下更加審察若前来處分果非則勿憚改為若灼然無疑則決行不移耳如此再思而行庶㡬得盡衆心事亦少失矣監察御史兼殿中侍御史吕公著上奏曰臣聞古者天子聼政命百官箴王闕近臣盡規親戚補察然後事行而不悖故孔子曰天子有諍臣七人雖無道不失其天下唐太宗以髙世之資親㝎大業然猶克已從諫以致太平正觀初孫伏伽始諫太宗悦而賞之有言賞太厚者答曰朕即位以来未有諫者故特賞之爾他日嘗怒苑西監而皇太子驟諫太宗喜曰朕始得魏徴朝夕進諫徴亡而劉洎岑文本褚遂良馬周繼之兒在膝前見吾悦諫熟矣故太宗始以納諫致治而又以恱諫教其子孫宜乎功烈甚髙而鮮及也然至其裔孫徳宗惡諫諍之臣以為賣直取名當時北省閉闥累月南䑓唯一御史不聞過失終致亂亡由是觀之好諫者帝王之髙致可不務㢤恭惟太皇太后陛下自親庶政盛徳日新皇帝陛下臨朝恭黙未有過事然而天下至大萬務至廣方始初清明之際正是求言納諫之時况先帝新定官制設諫議大夫司諫正言之官其貟數甚備伏乞申敕輔弼選忠厚骨鯁之人正直敢言之士徧置左右使掌諫諍無空要職益廣言路又御史之官號為天子耳目而比年以来專舉六察故事廢國家治亂之大計察官司簿領之細過況唐制湮沒已久别無分明稽據臣在樞府日常見先皇頗已厭其煩碎特因近臣獻言聊試其法耳伏乞盡罷察按只置言事御史四人或六人仍詔諫官御史並須直言無諱規主上之過失舉朝政之紕謬指羣臣之奸黨陳下民之疾苦言有可用不以人微而廢言令或未便不為已行而憚改所言無取姑亦容之以示明盛之世終不以言罪人若緘黙巽懦畏避不言者明正其罰如此則左右前後不䏻壅蔽嘉言罔伏庶績咸熈天下幸甚監察御史孫升上奏曰自二聖臨御登用正人天下所謂忠信端良之士豪傑俊偉之材俱收並用近世得賢之盛未有如今日者君子日進而小人日退正道日長而邪慝日消在廷濟濟有成周之風此首開言路之效也願于耳目之臣論議之際置黨附之疑杜小人之隙疑間一開則言者不安其職矣言者不安其職則循黙之風熾而壅蔽之患生非朝廷之福也元祐元年升為殿中侍御史又乞令䑓諫專對䟽曰臣竊觀嘉祐治平之間䑓諌風莭悚動天下比年以来苟容持禄飬交之俗成而臺諫風莭掃地盡矣伏以陛下臨御以来登用正人開廣言路𤼵徳音以告中外下明詔以諭四方自古聖帝明王欲治求諫之意不過如此也臣竊惟陛下深居九重所與共天下之事者大臣而已大臣皆至公而無私處事無一不當扵理猶當博延羣議杜漸防微若䑓諫難於請對忠言不獲面陳樞機之發既虞扵失身犬馬之心徒懐扵嚮主下情未達壅蔽或生非社稷之福也臣近覩詔㫖許令臣察請對此實盛徳之舉矣然條制未免曲為防阻者臣愚不避僣越之誅為陛下言之陛下隔日一視朝而一月之間休假居半聼政不過十數日日引一班而䑓諫必待長官同對且䑓諫之官十有餘員待其議論相同又須無不得次之日方一獲對若日有不得次之人而或議論各異則是有終不獲對者矣夫區區踈逺之臣竭誠欲望簾幃披瀝肝膽不亦難㢤有唐御史蕭至忠號為稱職嘗謂䑓中無長官論事不須闗白當時以為知言今法式若出于故事則自當隨宜増損若出扵陛下之意則陛下方且至誠聼納乃為是形迹妨嫌何示天下不廣也若出於大臣之議則䑓諫之對本為大臣而設而乃自下制上曲為防阻此尤大不可也伏望聖慈特出睿斷指揮許令䑓諫専對如遇當日有不得次之人仍特引䑓諫一班不獨章陛下至誠聼納之徳且以廣達聰眀消除壅蔽之患則天下幸甚四年升又乞依舊制引對臣寮䟽曰臣愚不肖伏䝉誤恩再玷言職夙夜思念恐無以塞責而孟子以謂敬其君莫如陳堯舜之道伏䝉二聖臨御以来仁厚之澤結于人心微如蠢動逺暨幽荒莫不愛戴鼓舞自三代以来未有如今日之治臣竊以謂至治之世銷患扵無形居安慮危防㣲杜漸正在今日夫堯舜以聦眀文思濬􅈒文明之徳而必曰眀四目達四聦又曰稽于衆舍己從人者廣耳目以防壅蔽也壅蔽之傷國其患為大陛下深居九重仰成輔弼一日萬㡬之㣲四海九州之廣天下之利病生民之休戚安危治亂之所係茍睿智未達則耳目安得不廣而壅蔽之患安得不防也天聖垂簾聼政未久臣寮上殿並如常儀今二聖臨御五年矣而此制缺未講中外竊有疑焉士大夫懐忠拘義欲望簾幃披瀝肝膽有不可者四海九州之利病休戚陛下有不得聞者壅蔽之患不可不防治忽之機不可不戒伏惟太皇太后睿智燭理可洞判扵羣言皇帝陛下聖徳日躋宜習聞扵庶務收天下之耳目以為聦眀兼四海之見聞以資聼覽此堯舜之所先而聖政之不可後也伏乞眀詔有司依天聖舊制引對臣寮並如常式實堯舜之所先眀目達聦之舉也伏望聖慈少㽞聼焉天下幸甚元祐元年右正言劉安世上奏曰臣近被聖恩擢寘諌列内惟譾薄媿無以稱尋具辭免不䝉俞允竊伏思念陛下所以不次用臣者豈徒備二省之員為朝廷美觀而已盖授之以名者必求其實任之以職者必責其効故臣拜命之初未敢指陳政事而首論治亂之本原人君之大體庶有以副公朝圖任之誠意盡愚臣平昔之所學惟陛下毋憚煩而試聼之臣聞書稱堯之徳曰稽于衆舍己從人舜戒其臣曰予違汝弼汝無面從退有後言伊尹之告太甲曰有言逆於汝心必求諸道有言遜于汝志必求諸非道傳説之復于髙宗曰惟木從䋲則正后從諌則聖然則古之聦眀睿智之君所以能大過于人者未有不以求諫為先務也今陛下居久安之時乗不拔之勢崇起教化修舉法度粲然追跡于三代之隆者豈有他㢤特以陛下至誠虚己首開言路故人人自竭樂告善道而天下之情無不通也然臣尚有疑者自去嵗以後屢罷言事之官中外臣民不知其詳往往竊議以為陛下好賢之志稍異于初年納諫之心漸怠於昔日臣竊憂之恭惟祖宗以来尤以䑓諫為重雖所言者未必盡善所用者未必皆賢然而借以彈擊之權養其敢言之氣者乃所以制姦邪之謀于未萌防政令之失扵未兆也今陛下深居九重政在大臣之際固宜開廣聡眀㽞意採納而前日䑓諫數人相繼罷去甚者至扵不究其所論之是非不察其所争之當否陽餌以美遷隂奪其言責使忠正之臣憤懣而不能發修潔之士愧赧而不敢受若果出于陛下之意邪則虧損聖徳不可不戒若出于大臣之計邪則陛下宜察其用心不過欲排天下之公議以快其私意而已臣竊謂姦人用事之始任䑓諫足以折其謀至扵禍胎既成雖聖賢不能救其害陛下視今日何如祖宗之朝而乃一聼大臣之所為蔽耳目之任而挫忠義之氣非所謂慎終如始者也臣之所以先獻此言者非謂忝列諫垣乃敢要君以固位也實以上闗宗廟社稷安危之機下繫君子小人消長之漸是以反復論列期有以感動宸衷若夫世俗之人指以為嫌疑者臣固有所不避也伏望萬㡬之暇詳覽瞽言奨進端良容受直諫參之以公議持之以誠心所愛者必知其惡所憎者必知其善使臣下不能窺伺間隙以售其私則忠言嘉謀将繼此而進矣臣天賦愚直不識忌諱惟陛下察其愛君憂國之誠少賜㽞聼不勝幸甚安世又乞籍錄䑓諫章䟽状曰臣嘗觀唐李綘之對憲宗以謂君尊如天臣卑如地加以日月之照雷霆之威小臣晝夜思度本欲陳諫十事至時已除五六逮于緘封上進又削其半得上達者盖無二三以此推之則人臣之所以獻于天子之前者莫非精思熟慮而自以為不易之言也雖人之才智逺近小大之不齊而其所論未必皆至于盡善要在君相推至公之心擇所長而行之則天下無遺䇿矣今二聖臨御委任大臣方此之時尤宜開廣言路以防壅塞臣愚欲望陛下深鑒前古之弊務通天下之情應䑓諫官有所論奏别于内中置籍先錄事目然後付外若三省聚議以謂可行即扵章疏之後具已施行次第繳奏或議論少理決有難從者亦具不可行之状封進以聞伏乞陛下更加參酌苟執政與奪已得允當並候注籍訖却以真本䧏付三省或宸衷以為不然即大臣奏事之際更可面加詢訪所貴忠言讜議盡闗聖覽取捨至公為後世法户部郎中曾肇乞復轉對状曰臣伏覩令文臣下得言時政闕失公私利便者臣聞帝王即位之初必有以順天下之心荅中外之望其為之有序在知其要而已伏惟皇帝陛下仰承頋命而履天下之尊太皇太后陛下俛徇權宜而議軍國之務此正華夏蠻貊洗心注目顒顒觀聼之時也端本謹始實在今日臣愚輙不自揆敢布腹心伏惟㽞神聼察幸甚臣伏覩先帝嗣位以来憂勤恭儉日謹一日神功聖徳充塞天地固非臣言所能髣髴也陛下繼之承之任大責重然四海之廣萬事之煩億兆之衆不可家至而人接之則欲達天下之情成天下之務豈有他㢤在廣言路爾言路廣則人人得盡其情人人得盡其情則上無不聞之事下無不通之志政令之得失百姓之休戚羣臣之忠邪賢不肖雖在四方萬里之外陛下不出户庭不降几席可以周知而備見矣然後察政令之得者則力行之彌綸未至者則損益之百姓之所願欲則與之百姓之所疾苦則除之顯忠而去邪任賢而退不肖夫然故上澤得以下及下情得以上聞百官有司奉法遵職貴者不以崇髙而敢肆賤者不以踈逺而敢欺陛下深處法宫之中端拱無為而天下治矣夫任己聦眀則其察愈詳其蔽愈甚因衆之聦眀則所視者逺所聴者周故先王設進善之旌立敢諫之鼓陳誹謗之木又使瞽獻書師箴瞍賦矇誦工諫近臣盡規親戚補察彼豈聦眀之不足哉知任己不如任衆也舜之繼堯所守一道然舜初受命則闢四門眀四目達四聰以謂繼治世者耳目尤不可以不廣故也三代以還咨詢訪納固非一途然近世之所嘗行祖宗之所己試則命百官轉對實今日之要務也昔唐太宗初即位延見羣臣或論往古成敗或究民間利病毎言及稼穯艱難則上下相規務遵勤儉言及閭閻疾苦則君臣感歎議息征徭故能創業垂統成貞觀之治下至代宗毎於紫宸聼朝常限三人奏事敢言者賞其盡規不言者責其隠黙故陸贄以謂諫雖未從且不深忤情茍有阻終獲上通周世宗即位之始亦延羣臣使陳當世之務故能外強兵威内修政事而顯徳之政獨髙五代先帝熈寧之初亦詔百官咸以次對故事不逺行之非難此臣愚惓惓所以有望于陛下也今學士大夫布滿周行人有所懐皆願自竭但慮詢求之未廣聼納之未至爾陛下沛然發徳音下惻怛之詔使之極言無有忌諱則孰不踴躍奮勵各罄所知以補聦眀之萬一㢤陛下察其言之當者納之用之而勸之以賞言而未當或過扵訐直者寛裕包涵而不加以罪非但舉空文循故事而已如此則四海之内知陛下有好問之美有聽言之實忠謀讜論日聞于上而阿䛕壅蔽之私不得行矣天下之情孰有鬰塞而不伸天下之務孰有怠廢而不起者㢤故臣愚過計以謂今日之要務未有易此者也至於廣收骨鯁敢言之人充耳目之任敕左右侍從之官責以論思獻納是皆朝廷之所素講不待臣言而悉者也伏惟聖慮深逺無所不周如臣賤微不識大體頋以世荷國㤙兄弟皆䝉先帝不次收採不勝犬馬之私貪于自效愚者千慮冀有一得冒進狂瞽干犯典刑惟陛下察其用心而赦其僣易不勝幸甚三年肇為中書舍人又上奏曰臣伏見陛下臨政以来開寛聦眀大闢言路雖拂意逆耳詆訐狂妄常人之情所不能容者莫不虛心克己温辭䧏色以受之天下之人歌詠頌歎以謂古之聖帝明王不過如此一二年来不唯朝廷政事人情以至四方萬里幽深隠伏之利病莫不畢聞于上者言路無壅故也是以在廷之臣人人勇扵自効至不以出位為嫌而以不能盡言為耻振起天下敢言之氣始自今日如王覿者身在言責有所聞見不得不為陛下盡言而無隠也陛下未以其言為然猶當寛大含容未宜遽棄何則以言賞人猶有觀望畏縮而不敢進者以言罪人人將鉗口結舌望望然去矣其肯以身陥禍而覬萬一之聼㢤故覿之一身出入内外不足以為輕重而陛下言路之通塞人情之伸屈在此一舉此臣不得不為陛下慮也陛下寄腹心于大臣寄耳目于䑓諫二者相須不可闕一今覿一言論及執政即去之是何異愛腹心而塗耳目豈不殆哉且執政大臣朝夕在人主左右據利勢國柄人情之所難言者也導之使言猶或不聞其過今一言及之遂至逐去臣恐在廷之臣以覿為戒依違頋望莫肯正論執政大臣雖有罪惡陛下亦將不得聞矣此可為寒心者也陛下臨政以来何獨至于覿一言之入遽不能容示天下以不廣也覿以小官不二三年㧞擢至此今以言獲罪猶補便郡於覿何損臣所惜者于聖政不為無累爾伏望陛下深念祖宗付託之重愛惜朝廷䑓諫之體不以容納狂直為難而以壅塞言路為懼以覿所論質之公議茍其言可取固當行之如無足採亦願陛下容之度外使天下之人知朝廷不罪人言終始如一而執政大臣有所畏忌增益陛下虛心納諫之眀是一舉而數美從之也其可忽哉臣備位侍從首尾三年常恨不能補報萬一今輙縁職事冒進狂瞽惟陛下㽞神省察幸甚所有制辭未敢修撰元符三年肇又上奏曰臣伏惟給事中龔原以妄議政事罷職降官差知南康軍臣初聞之意謂原資性山野不善為辭觸犯天威自取黜逐陛下寛仁大度容納直言初雖震怒終必矜赦傾聼數日未聞别有指揮臣愚竊有所懐不敢隠黙苟止惟陛下㽞神聼察臣伏見陛下即位之初深懲前日羣臣阿䛕壅塞之弊収錄廢錮召還朝廷又命近臣選舉䑓諫官以補闕貟仍下詔書許人直言時政闕失中外喧呼以謂堯舜之治指日可待故四方之士聞風踴躍争獻所聞以裨聖教況于朝廷之内有官守言責之臣孰不激勵自奮􅁒以仰副陛下虛心納善之誠㢤是以朞月之間近者獻其眀逺者通厥聦其有官守言責之臣則遇事輙發無所頋避比之前日論事之人其多何啻百倍非皆好黙于前而好辯于後其所以誘之者然也古人所謂主聖臣直豈非信哉矧如原者素以學行知名頗識事君之義昨䝉陛下取於踈逺之中驟置侍從之列其設心以謂非傾竭忠誠有犯無隠不足以當陛下㧞擢委任之意是以自入東省數有論列雖未必皆當聖意然比之前日偷安茍容以保禄位者則有間矣以陛下之眀聖豈不察其用心以陛下之寛仁豈不容其冒瀆遽然出逐實駭衆聽況當獨斷之初而近臣以言得罪臣恐在位之臣自此以言為戒蹇諤之風浸微阿䛕之俗滋長小人觀望復萌僥倖之心所繫甚重不可忽也臣受陛下厚㤙而以論思為職茍有所見輙以上聞每䝉優容未賜誅斥今兹所論非獨為一龔原實以上繫國體伏望陛下少霽雷霆之威俯納芻蕘之議萬一可采乞出自中批寛赦原罪或令降官供職以責後効或别移在京差遣使之自圗去就庶免朝廷有因近臣論事遽行出逐之名不勝幸甚􅈒宗時蘇軾乞依舊制許臣寮上殿疏曰臣謹按唐太宗著司門令式云其有無門籍人有急奏者皆令監門司與仗家引奏不許闗礙臣以此知明主務廣視聼深防蔽塞雖無門籍人猶得非時引見祖宗之制自兩省兩制近臣六曺寺監長貳有所欲言及典大藩鎮奉使諸路出入辭見皆得奏事殿上其餘小臣布衣亦時特賜召問非獨以通下情知外事亦以考察羣臣能否情偽非苟而已伏見陛下嗣位以来唯執政日得上殿外其餘獨許䑓諫官及開封知府上殿不過十餘人天下之廣事物之變決非十餘人者所能盡若此十餘人者不幸而非其人民之利病不以實告則陛下便謂天下太平無事可言豈不殆㢤其餘臣寮雖許上書言事而書入禁中如在天上不加反覆詰問之因而斥有位之阿私糾在朝之朋比推至誠来讜議追夏禹拜言之美此甚盛徳非羣臣所能當然自降詔書四年于兹轉對者固多矣未聞有一言能開悟聖聼一事有推行于時者豈言盡不足采其事皆不足行耶昔之人君有謀事而當羣臣莫能及退而有憂色曰以吾議于朝而羣臣莫能及吾國其殆㢤今在廷之臣言事四年而卒無可采者其為朝廷所宜憂逺矣使萬一其言有可收錄而不見省焉則所以丁寧而求者恐乖至誠之道也陛下萬機之繁百官封事固難悉覽頃令館閤臣寮分閱屬近臣㸔詳而緫擇其可否此乃陛下謹于聼納不以獨見為眀然議者猶以為可否羣臣之言當在人主宜非臣下所得預也今又不然罷近臣㸔詳而悉付中書執政之大臣中書執政之大臣未必得暇盡覽則屬之掾屬掾屬又未必能詳擇乃問委外廷之臣使之可否迭為重輕羣臣誠淺薄不足以仰望清光在陛下聼言之體為輕矣古之聖王詢于芻蕘而擇狂夫之言者豈謂芻蕘狂夫其慮有過于聖王㢤所以博詢兼聼而来善言者也夫善言者非言之為難得其所以言為難也故信而後諫可以言而後言誠使自處如此者轉對扵廷其言有深切至當而陛下聼覽有所未至例出其封章可否于公府之掾屬下及外廷之小臣則彼以為愧悔莫甚為後来者孰肯勵精竭誠輸切至之言㢤且人臣進言莫不希人主一省而有懼後患之心如知陛下不必親覽而悉送中書則孰可以盡利害之實而況天下事有不可以書載者心之精㣲口不能盡而況書乎恭惟太皇太后以盛徳在位每事抑損以謙遜不居為美雖然眀目達聦以防壅塞此乃社稷大計豈可以謙遜之故而遂罕與羣臣接㢤方今天下多事飢饉盜賊四夷之變民勞官冗將驕卒惰財用匱乏之弊不可勝數而政出帷箔決之廟堂大臣尤宜開兼聼廣覽之路而避專斷壅塞之嫌非細故也伏望聖慈更與大臣商議除䑓諫開封知府已許上殿外其餘臣寮舊制許請間奏事及出入辭見許上殿者皆復祖宗故事則天下幸甚監察御史王巖叟乞養誠心以来諫諍状曰臣伏以社稷有安危天下有治亂羣生有憂樂繫人君措之何如耳夫以一身之寡而應萬機之繁以九重之深而察萬里之逺非諫諍以寄聦眀于萬有使人人為我視物物為我聼則何以遂羣生之樂成天下之治保社稷之安㢤然而聼諫非難来諫為難来諫非難在誠心以好之誠心以行之而已矣百姓至愚也誠心則可以感四海至廣也誠心則可以達鬼神至幽也誠心則可以通天地至大也誠心則可以動而況扵其餘乎人主苟誠心于好諫而誠心以行之則天下之人皆願以誠心告之惟恐其後耳惟恐其不至耳好名之君盖亦未嘗不自以為好諫也然天下之善不至于前而天下之美不歸焉者何也無誠心以将之也無誠心以將之者患在蔽于有所偏好耳有所偏好則小人得乗間以進而君子之論逺矣小人固亦自以為能諫也特順其所好而補助之以為說豈諫也㢤然其君自以為忠于我而日加親近曾不知所以説已而成己之惡也君子之于諫直拂其意以攻其偏好而勉之於大道然其君或以為異已而惡之甚者至以為謗己而害之此安危治亂憂樂之所以分也臣以謂養誠心有道守之以至静處之以至虛持之以至平行之以至公而不置毫釐他意于其間則誠心得矣誠心得則明明則是非不亂而忠邪判矣忠邪一分天下之治可坐而致也伏惟皇帝陛下始初清眀聖徳方進願養誠心以来天下之善不立偏好以杜小人乗間而使君子之論日聞于前天下幸甚社稷幸甚巖叟為右司諫又乞令䑓諫專對疏曰臣竊以納忠之道貴乎盡論事之體貴乎宻不盡則不足以感動聖心不宻則不足以成就機事人主待臣下雖無間而臣下自立不能無不同既不同則不能無忌礙而言有所不盡事有所不宻言之不盡事之不宻非有益于朝廷之道也古之人有以告于君者雖父子之間不以相語況可使他人聞之㢤伏望聖慈察臣之言特賜指揮依久来故事䑓諫官只令一人上殿庶使各盡其忠而無不宻害成之失且䑓諫官天子耳目之任當使各盡其見聞以告主上豈可却使互相窺察常得志同道合之人則可若有懐私意持異見者如何與之共論于上前此不可不察也故事䑓諫官論事不相通議亦不關白官長盖欲以各盡其忠豈可上殿却使兩人同也六曺開封有司之事皆有定法所以官長與屬官同奏對今䑓諫官須二人同上則似與六曺開封相𩔖恐非體要如䝉允臣所奏只乞作出自宸衷批出指揮巖叟又論安反側不必降詔状曰臣前日以風聞欲降詔書安搢紳之心輙犯天威論奏不便乞收詔勿下深慮言之未切聖心未加采納竊縁此事出于陛下舉動所繫國體至重臣不敢苟且自安便為俛黙負陛下平日待遇之意伏覩陛下即位以来惟以求言為盛徳納諫為聖功天下風聞莫不鼓舞雖前代英主有所不及正宜日進此道不倦以終之以副天下之望今方踰年而遽下此詔雖名為安慰罪人其實乃約束言者竊恐四方流聞疑朝廷厭言而拒諫有損陛下盛美臣謂此詔之出上無益於聖徳中無益于治體下無益于忠言惟是挫端良之心增姦邪之氣耳不獨如此而又將有人睥睨朝廷以為可以窺測侮易政令以為可以動揺自古欲治之主惟患言之不多天下之善惡有所不聞以塞其聦眀未聞禁言者使之不言也言者言之陛下擇可行者而行之仰不累陛下之眀俯不失言者之職則言雖多而何傷臣初為諫官對于簾下親聞徳音丁寧諭臣等曰天下之事無大小一一言来當一一主張臣感激至㤙恨不傾瀝肝膽以為補報今日詔書臣所未諭陛下求言如此之切不應厭言如此之早也近古好諫莫如唐太宗敢諫莫如魏鄭公太宗一日問曰今日所行與往時何異鄭公曰貞觀之初恐人不言導人使諫三年已後見人諫諍恱而從之一二年来不悦人諫雖勉以聼受然終有難色太宗曰扵何事如此鄭公遂一一陳之太宗曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論説過失甚驚公但存此心朕終不違公臣讀之至此每歎美太宗之服義景仰魏公之盡忠願陛下慕太宗貞觀之初心導人使諫羣臣亦當有希魏公事君之大莭以報陛下者以詔書未宣布間惟陛下斷自清衷早賜収還天下幸甚巖叟為侍御又論張舜民罷言職状曰臣謹按張舜民䟽中引文彦博照管劉奉世之語非出自譔乃是收采衆論聞之朝廷此盖言事常體復有何罪若聞外議心知其非而不告陛下得為忠乎況外人之議亦有所以縁奉世是彦博門下之人待遇最厚今封冊夏國既屬重事外人不知出于執政同奏但傳以為彦博照管亦不足恠舜民據所聞而言乞朝廷裁察别有何意詩曰言之者無罪聞之者足以戒正謂此也果是則有益於聦眀果非則何傷于彦博書曰狂夫之言聖人擇焉況舜民非狂言皆有理行與不行在陛下擇之而已遂加之罪臣恐而今而後居言職者以言為諱他日大臣有大惡陛下欲聞亦不得聞矣此非社稷之福也今朝政闕失猶許盡言豈有大臣不受一言之觸國家置御史正欲警察權強雖有過論亦當優容今舜民以一言獲罪臣疑非陛下本意必有誤聖聼者矣此事扵舜民殊無所損所惜者朝廷之事體陛下之舉動天下之觀望也伏望特迴聖意還舜民言職使忠臣義士得盡其心以事陛下而衆庶之情不壅于上聞不勝幸甚巖叟又上状曰臣連上封奏乞復張舜民言職尚未䝉指揮施行臣以舜民志在盡忠雖一言失當而無可罷之罪清議沸騰以為過舉義不敢安理當極論惟陛下少賜采納幸甚臣讀汲黯𫝊毎切歎息其為人憃直好諫遇事輙發如公孫𢎞張湯軰懐詐餙智以阿人主他人所不敢言黯常面觸之故不獨漢庭之臣知所畏憚至淮南王欲謀叛以黯在朝為之寢謀直臣之于國家戢姦慝消禍亂其益如此故天下之愛其君者莫不願得而用之愚臣區區之衷實在於此今日之論非私于舜民也為陛下惜一敢言之臣也非争一屬官也為陛下惜言路也言路重則朝廷尊言路輕則風憲陵遲國體隨弱皆必然之理也陛下于此幸加反思非好臣之説勝也好人主之道勝也臣以言為職言而見用與言而得罪皆所以報陛下唯知而不言則為負徳耳舜民得敢言之名朝廷被罪言之謗臣竊恨之伏望聖慈檢會臣等前章早賜付外施行使怨歸言路而美在朝廷臣不勝大願巖叟又上奏曰臣累上章言張舜民罷職非罪乞令還䑓未䝉采納施行此事所繫不在一張舜民而在人主在國家臣所以夙夜憂懼不知所處陛下開言路之初言事官多與權臣為敵怨仇不易當毎徳音丁寧既慰藉之又嘉賞之謂朝政闕失大臣私邪百姓疾苦事無小大一一但言欲賜一一主張言事之臣恃陛下照鑒如此故敢遇事必言無所回隠然古今之公患患在執政大臣多不便之而隂為巧説以害其忠必使主信之而不覺終至于忠言不用而權臣得以行其志所以人之言曰寧觸人主怒莫忤權臣意盖人主無心雖怒必觧權臣私意一忤不忘此人情不得不畏也苟非守莭死義之士誰能忘其家而遺其身以取權臣之怒㢤陛下雖加奨激未必便得其人今又罪而斥之臣恐忠義知難而退藏佞邪乗間而進取隂附大臣為自安之計不復以陛下之事為事矣前日御史中丞黄履殿中侍御史劉次莊隂附蔡確為姦方確用事陛下何由得知確去而其姦始敗使確且在位履與次莊進用盖不可量今日舜民忠嚮陛下因論邉事偶有一言旁及大臣又無所傷遽以大臣不説而罷之是附人主不若附權臣也事在耳目非臣妄言臣伏覩陛下初降出舜民論封冊䟽必不以彦博照管奉世之言為毁傷彦博亦未必須欲朝廷逐御史臣恐執政大臣有忿舜民攻其所諱而增飾老臣之言以動聖心而擠舜民以快其私忿者陛下不可不察又非獨擠一張舜民也其意乃欲以盡傾言路也盖知舜民之罷䑓諫必争封奏紛紜言詞憤激必拂聖意聖意不喜則言路皆可揺而去矣此其姦謀陛下又不可不察也姦人以此惑陛下一事既行後必有甚于此士大夫之所以為朝廷憂也臣度聖心豈不欲復舜民言職恐不能􅇺彦博意故兩難耳臣切伏思陛下特屈公議黜御史以為老臣者亦足矣今以公議不可奪而復還之非陛下得已也老臣豈不亮陛下之心㢤尚何以為憾乎由此而言臣以謂陛下處之不兩難耳臣聞君子之愛人也以徳而不以姑息願陛下以徳愛老臣勿使受姑息之議則陛下所以待之者厚于黜御史矣誠䝉陛下幸聼臣言則朝廷過舉反而為盛徳老臣謗議變而為美談破姦謀于欲肆激忠義于已銷社稷之福多矣非臣之利也臣傾盡肝膽以告陛下今日遂死無所恨矣惟聖主㽞意毋忽巖叟又請廣言路叅用四方之士䟽曰臣以謂天下之事度而知之不如耳聞其説耳聞其説不如目覩其真今四海之大萬里之逺民情之利害不可以槩言風俗之美惡不可以凡舉人材之賢不肖不可以互知切以陛下所頼以察四方之事達四方之情者言路數人而巳而專用一方之人非所以廣聦眀于天下也臣願陛下常于言路參用四方之士天下􅄑甚歴代名臣奏議卷二百三
