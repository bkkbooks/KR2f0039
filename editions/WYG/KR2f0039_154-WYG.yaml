body:
  text: 歴代名臣奏議卷一百五十四明楊士奇等撰知人齊桓公末管仲病公問羣臣誰可相者管仲曰知臣莫若君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如對曰倍親以適君非人情難近公曰豎刁何如對曰自宫以適君非人情難親管仲死公用三子三子專權公卒易牙入與豎刁因内寵殺羣吏而立公子無詭宋伐齊齊人殺無詭立孝公孝公卒公弟潘因開方殺孝公子而立潘魯哀公問於孔子曰當今之時君子誰賢對曰衛靈公公曰吾聞之其閨門之内姑姊無别對曰臣觀於朝廷未觀於堂陛之間也靈公之弟曰公子渠牟其知足以治千乗之國其信足以守之而靈公愛之又有士曰王林國有賢人必進而任之無不達也不能達退而與分其禄而靈公尊之又有士曰慶足國有大事則進而治之無不濟也而靈公說之史鰌去衛靈公邸舎三月琴瑟不御待史鰌之入也而後入臣是以知其賢也衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹其將不免詩云敬慎威儀維民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之則而象之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也故君子在位可畏施舎可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也楚荘王時有善相人所言無遺策聞於國王見而問其情對曰臣非能相人能觀人之交也布衣也其交皆孝悌篤謹畏令如此者其家必日益身必日安此所謂吉人也官事君者也其交皆誠信而好善如此者事君日益官職日進此所謂吉人也主明臣賢左右多忠主有失皆敢分爭正諌如此者國日安主日尊天下日富此之謂吉主也臣非能相人能觀人之交也荘王曰善於是乃招聘四方之士夙夜不懈遂得孫叔敖將軍子重之屬以備卿相遂成覇功詩曰濟濟多士文王以寜此之謂也魏文侯謂李克曰先生甞教寡人曰家貧則思良妻國亂則思良相今所置非成則璜二子何如李克對曰臣聞之卑不謀尊踈不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿譲李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣文侯曰先生就舍寡人之相定矣文侯與田子方飲酒而稱樂文侯曰鐘聲不比乎左髙田子方笑文侯曰奚笑子方曰臣聞之君明則樂官不明則樂音今君審於聲臣恐君之於官也文侯曰善敬聞命漢文帝立召田叔問曰公知天下長者乎對曰臣何足以知之上曰公長者也宜知之叔頓首曰故雲中守孟舒長者也是時孟舒坐虜大入塞盜刼雲中尤甚免上曰先帝置孟舒雲中十餘年矣虜曾一入孟舒不能堅守毋故士卒戰死者數百人長者固殺人乎公何以言孟舒為長者也叔叩頭對曰是乃孟舒所以為長者也夫貫髙等謀反上下明詔趙有敢随張王罪三族然孟舒自髠鉗随張王敖之所在欲以身死之豈自知為雲中守哉漢與楚相距士卒罷敝匈奴冒頓新服北夷來為邉害孟舒知士卒罷敝不忍出言士争臨城死敵如子為父弟為兄以故死者數百人孟舒豈故驅戰之哉是乃孟舒所以為長者也於是上曰賢哉孟舒復召孟舒以為雲中守武帝征和元年趙王彭祖卒彭祖所幸淖姬生男號淖子時淖姬兄為漢宦者上召問淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌曰無咎無譽上曰如是可矣遣使立昌為趙王漢昭烈皇帝領益州牧時以諸葛亮為軍師將軍以蒋琬為廣都長不治大怒亮請曰蒋琬社稷之噐非百里才也其為政以安民為本不以修飾為先願主公重加察之帝雅敬亮乃不加罪許靖為蜀郡太守成都將潰靖謀出降薄之不用法正曰天下有獲虚名而無其實者許靖是也然今始創大業天下之人不可戸說宜加敬重以慰天下之望乃禮而用之魏明帝景初二年詔中都侯孫資曰吾年稍長又歴觀書𫝊中皆歎息無所不念圖萬年後計莫過使親人廣據職勢兵任又重今射聲校尉缺久欲得親人誰可用者資曰陛下思深慮逺誠非愚臣所及書傳所載皆聖聼所究向使漢髙不知平勃能安劉氏孝武不識金霍付屬以事殆不可言文皇帝始召曹真還時親詔臣以重慮及至晏駕陛下即祚猶有曹休内外之望賴遭日月銜勒不傾使各守分職纎芥不間以此推之親臣貴戚雖當據勢握兵宜使輕重素定若諸侯典兵力均衡平寵齊愛等則不相為服不相為服則意有異同今五營所領見兵常不過數百選授校尉如其軰𩔖為有疇疋至於重大之任能有所維綱者宜以聖恩簡擇如平勃金霍劉章等一二人漸殊其威重使相鎮固於事為善帝曰然如卿言當為吾逺慮所圖今日可㕘平勃侔金霍雙劉章者其誰哉資曰臣聞知人則哲惟帝難之唐虞之聖凡所進用明試以功陳平初事漢祖絳灌等謗平有受金盜嫂之罪周勃以吹簫引彈始事髙祖亦未知名也髙祖察其行跡然後知可以付與大事霍光給侍中二十餘年小心謹慎乃見親信日磾降人以至孝質直特見擢用左右尚曰妄得一降人而重貴之平勃雖安漢嗣其終勃被反名平劣自免於吕須之䜛上官桀桑𢎞羊與霍光爭權幾成祻亂此誠知人之不易為臣之難也又所簡擇當得陛下所親當得陛下所信誠非愚臣之所能識别帝問司徒陳矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望社稷未之知也後魏髙祖引見王公已下於皇信堂髙祖曰政雖多途治歸一體朕毎䝉慈訓猶自昧然誠知忠佞有損益而未識其異同恒懼忠貞見毁佞人便進寤寐思此如有隠憂國彦朝賢休戚所共宜辨斯真偽以釋朕懐尚書㳺明根對曰忠佞之士實亦難知依古爵人先試之以官官定然後禄之三載考績然後忠佞可明尚書中書監髙閭曰竊謂袁盎徹慎夫人席是其忠譛殺晁錯是其佞若以二人言之望之為忠石顯是佞髙祖曰自非聖人忠佞之行時或互有但忠功顯即謂之忠佞迹成斯謂之佞史官據成事而書於今觀之有别明矣朕所問者未然之前卿之所對已然之後閭曰佞者飾智以行事忠者發心以附道譬如玉石皦然可知髙祖曰玉石同體而異名忠佞異名而同理求之於同則得其所以異尋之於異則失其所以同出處同異之間交換忠佞之境豈是皦然易明哉或有託佞以成忠或有假忠以飾佞如楚子綦後事顯忠初非佞也閭曰子綦諫楚初雖随述終致忠言此適欲幾諫非為佞也子綦若不設初權後忠無由得顯唐太宗貞觀六年謂魏徴曰古人云王者須為官擇人不可造次即用朕今行一事則為天下所觀出一言則為天下所聽用得正人為善者皆勸誤用惡人不善者競進賞當其勞無功者自退罰當其罪為惡者戒懼故知賞罰不可輕行用人彌須慎擇徴對曰知人之事自古為難故考績黜陟察其善惡今欲求人必須審訪其行若知其善然後用之設令此人不能濟事只是才力不及不為太害誤用惡人假令彊幹為害極多但亂代惟求其才不顧其行太平之時必須才行俱兼始可任用十一年徴又上䟽曰臣聞為人君者在乎善善惡惡近君子而逺小人善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政逺小人則聽不私邪小人非無小善君子非無小過君子小過盖白璧之㣲瑕小人小善乃鉛刀之一割鉛刀一割良工之所重重片善不足以掩衆惡也白玉㣲瑕善賈之所棄棄小疵不足以妨大羙也小人之小善謂之善善君子之小過謂之惡惡此則蒿蘭同嗅玉石不分屈原所以沉江卞和所以泣血也既識玉石之分又辨蒿蘭之臭善而不能進惡而不能去此郭氏所以為墟史魚所以為恨也陛下聦明神武天資英睿志存汎愛引納多途好善而不甚擇人疾惡而未能逺佞又出言無隠疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之明猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣聞善或疑則君子之道消矣為國者急於進君子退小人乃使君子道消小人道長則君臣失序上下相隔亂亡不卹將何以求夫以善相成謂之同徳以惡相濟謂之朋黨今則清濁共流善惡無别以告訐為誠直以同徳為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不給於下臣忠所以不達於上大臣不能辨正小臣莫之敢論近逺承風混然成俗非國家之福非為治之道適足以長姦邪亂視聽使人君不知所信臣下不得相安若不逺慮深絶其源則後患未之息也今行之而未敗者由乎君有逺慮雖失之於始必得之於終故若時逄少墮徃而不返雖欲悔之必無所及既自失以傳諸後嗣復何以垂法将來且夫進善黜惡施於人者也以古作鑒施於已者也鑒貎在乎止水鑒已在乎哲人能以古之哲王鑒於已之行事則貎之妍媸宛然在目事之善惡自得於心無勞司過之史不假蒭蕘之議巍巍之功日著赫赫之名𢎞逺為人君可不務乎徴論人臣有六正六邪上疏曰臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寜一人有慶必藉惟良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功周召光煥乎之美然則四岳九官五臣十亂豈惟生之於曩代而獨無於當今者哉在乎求與不求好與不好耳何以言之夫美玉明珠孔翠犀象大宛之馬西旅之􅋙或無足也或無情也生於八荒之表塗遥萬里之外重譯入貢道路不絶者何哉盖由中國之所好也况從仕者懐君之榮食君之禄率之以義将何徃而不至哉臣以為與之為忠則可使同乎龍逢比干矣與之為孝則可使同乎曾參子騫矣與之為信則可使同乎尾生展禽矣與之為亷則可使同乎伯夷叔齊矣然而今之群臣罕能貞白卓異者求之不切勵之未精故也若勗之以公忠期之以逺大各有職分得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所受賤則觀其所不為因其材以取之審其能以任之用其所長掩其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故說苑曰人臣之行有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌芽未動形兆未見昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎榮顯之處如此者聖臣也二曰虚心盡意日進善道勉主以禮義諭主以長策将順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱徃古之行事以厲主意如此者忠臣也四曰明察成敗早防而救之塞其間絶其源轉祻以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺辭禄譲賜飲食節儉如此者貞臣也六曰國家昏亂所為不諛敢犯主之嚴顔靣言主之過失如此者直臣也是謂六正何謂六邪一曰安官貪禄不務公事與代浮沈左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隠而求主之所好而進之以快主之耳目偷合苟容與主為樂不顧後害如此者諛臣也三曰内實險詖外貎小謹巧言令色妬善嫉賢所欲進則明其美隠其惡所欲退則明其過匿其美使主賞罰不當號令不行如此者奸臣也四曰智足以飾非辯足以行說内離骨肉之親外搆亂於朝廷如此者䜛臣也五曰專􅁠擅勢以輕為重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也六曰諂主以邪佞陷主於不義朋黨比周以蔽主明使黒白無别是非無門使主惡布於境内聞於四隣如此者亡國之臣也是謂六邪賢臣處六正之道不行六邪之術故上安而下理生則見樂死則見思此人臣之術也記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可誣以圓方君子審禮不可誣以奸詐然則臣之情偽知之不難矣又設禮以待之執法以御之為善者䝉賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉盖言之是也行之非也言之是則出乎公道行之非則渉乎邪徑是非相亂好惡相攻所愛雖有罪不及於刑所惡雖無辜不免於罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有罪免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺疎逺罰不阿親貴以公平為規矩以仁義為準䋲考事以正其名循名以求其實則邪正莫隠善惡自分然後取其實不向其華處其厚不居其薄則不言而化期月而可知矣若徒愛美錦而不為人擇官有至公之言無至公之實愛而不知其惡憎而遂忘其善循私情以近邪佞背公道而逺忠良夙夜不怠勞神苦思将求至理不可得也書奏太宗甚嘉納之刑部尚書張亮坐謀反下獄詔令百官議之多言亮當誅唯殿中少監李道裕奏亮反形未具明其無罪太宗既盛怒竟殺之俄而刑部侍郎有闕令宰相妙擇其人累奏不可太宗曰吾已得其人也徃者李道裕議張亮云反形未具可謂公平矣當時雖不用其言至今追悔遂授道裕刑部侍郎二十一年太宗在翠㣲宫授司農卿李緯戸部尚書房𤣥齡是時留守京都會有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰𤣥齡但云李緯大好髭鬚更無他語由是改授緯洛州刺史太宗甞從容問揚州都督長孫無忌曰朕聞君聖臣直人常苦不自知公宜面攻朕得失無忌曰陛下神武聖文冠卓千古性與天道非臣等愚所及誠不見有所失帝曰朕冀聞過公等乃相諛恱朕當評公等可否以相規何如皆拜謝上曰髙士㢘心術警悟臨難不易節所乏者骨鯁耳唐儉有辭善和觧人酒杯流行發言可意事朕二十年未甞一言國家事楊師道性謹審自能無過而懦不更事緩急非可倚岑文本敦厚文章論議其所長也謀常經逺自當不負於物劉洎堅正其言有益不輕然諾於人能自補闕馬周敏鋭而正評裁人物直道而行所任皆稱朕意禇遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛無忌應對機敏善避嫌求於古人未有其比揔兵攻戰非所善也太宗以王珪善人物且知言因謂曰卿標鑒通晤為朕言𤣥齡等材且自謂孰與諸子賢對曰孜孜奉國知無不為臣不如𤣥齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彦博濟繁治劇衆務畢舉臣不如胄以諫諍為心恥君不及堯舜臣不如徴至激濁揚清疾惡好善臣於數子有一日之長帝稱善而𤣥齡等亦以為盡已所長謂之確論肅宗乾元元年張鎬聞史思明請降上言思明凶險因亂竊位人面獸心難以徳懐願勿假以威􅁠又言滑州防禦使許叔冀狡猾多詐臨難必變請徴入宿衞時上已寵納思明㑹中使自范陽及白馬來皆言思明叔冀忠懇可信上以鎬為不切事機罷為荆州防禦使代宗大厯十三年上召李泌入見詔以元載事曰與卿别八年乃能除此賊不然幾不見卿對曰陛下知羣臣有不善則去之含容太過故至於此上因言路嗣恭初平嶺南獻琉璃盤徑九寸朕以為至寳及破載家得嗣恭所遺載盤徑尺當議罪之泌曰嗣恭為人小心善事人精勤吏事而不知大體昔為縣令有能名陛下未暇知之而為載所用故為之盡力陛下誠知而用之彼亦為陛下盡力矣且嗣恭新立大功陛下豈得以琉璃盤罪之邪上意乃觧以嗣恭為兵部尚書徳宗興元元年議者或言韓滉聚兵修城隂蓄異志上疑之以問李泌對曰滉公忠清儉貢獻不絶鎮撫江東盜賊不起所以修城為迎扈之備耳此乃人臣忠篤之慮奈何更以為罪乎上曰外議洶洶卿弗聞乎對曰臣固聞之其子臯為郎不敢歸省正以謗語沸騰故也退遂上章請以百口保滉徳宗常從容言盧把清介敢言然少學不能廣朕以古道人皆指其姦而朕不覺也中書侍郎同中書門下平章事李泌對曰陛下能覺把之惡安致建中祻邪李揆和蕃顔真卿使希烈其害舊徳多矣又楊炎罪不至死杞擠陷之而相闗播懐光立功逼使其叛此欺天也帝曰卿言誠有之然楊炎視朕如三尺童子有所論奏可則退不許則辭官非特把惡之也且建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞善罰惡矣桀曰我生不有命自天武王數紂曰謂已有天命君而言命則桀紂矣帝曰朕請不復言命時議者多以李勉大梁失守不應尚為相李泌言於上曰李勉公忠雅正而用兵非其所長且大梁不守将士棄妻子而從之者殆二萬人足以見其得衆心矣且劉洽出勉麾下勉悉衆以授之卒平大梁亦勉之功也上乃命勉復位翰林學士陸贄奉天論觧蕭復状奏曰右冀寜奉宣聖㫖縁國家賦稅多出江淮既未收復京城恐逺路傳說過甚所以欲得遣一大臣徃彼宣慰以安逺近之情初欲簡擇此使並先共宰相商量皆云蕭復久任江外刺史諳彼事宜又就宰相之中名望最重令其徃彼宣慰人必望風恱服其時蕭復亦自見此商議更無異同朕猶不能自㫁遂喚諸朝士班次對見一一親向說宣慰之意問其穏便已否皆云至要並無異詞朕所以更不疑惑已與擇得發日及其臨行從一等却論奏欲得且留蕭復又頻有朝官上封事亦與從一等意同朕忽見此翻覆非常悵恨數日思量不測其故意者必是蕭復計㑹遣其論奏蕭復又有何事苦欲得住其意深不可會卿比來諳此人性行否兼與朕子細思料若不肯去其意何在者蕭復往年曾任常州刺史臣其時寄住常州首尾二年閱其理行及到京邑多與往來嵗月滋深情意相得復之志性臣則備諳本是貴門又聨戚屬痛自脩勵慕為清貞矯枉太深時或過當論經義則以守死善道執心不囬為本議人物則以魏元忠宋璟為師已之所行皆欲盡善故渉好名之累亦無應變之才用雖不周行則可保至如二三爽徳飜覆挾姦復之為人必不至是安有親承計議退自變渝私誘官僚曲令干說是同兒戲非近人情雖甚狂愚猶應不敢若稍恭慎固當不為況乃見稱名流獲踐清貫備股肱之任承渥澤之私何心何顔忍至於此假令蕭復之意或欲逗留在於從一之徒寜肯附會臣縁自到行在常居禁中向外事情視聽都絶忽承顧問莫測端由陛下必欲研窮斯理不為難察初舉蕭復充使本是從一等商量後請蕭復不行又是從一等論奏一矛一楯理必有歸或遣或留意将安在但垂睿詰孰敢面謾蕭復若相屬求則從一等何容為隠從一等儻自廽互則蕭復不當受疑陛下奚憚而不辯明乃直為此悵恨也夫明則罔惑辯則罔寃惑莫甚於逆詐而不與明寃莫痛於見疑而不獲辯是使情偽相揉忠邪靡分兹實居上御下之要樞惟陛下留意幸察謹奏憲宗御延英殿與宰臣言向外人言朋黨頗甚如何武元衡李吉甫未對而李絳奏曰朋黨之稱為臣也臣歴觀自古及今帝王最惡者是朋黨奸人能揣知上㫖非言朋黨不足以激怒主心故小人譛毁賢良必言朋黨尋之則無迹言之則可疑所以搆陷之端無不言朋黨者夫小人懐私常以利動不顧忠義自成朋黨君子以忠正為心以懲勸為務不受小人之佞不遂奸人之利自然為小人所嫉譛毁百端者盖縁求無所獲取無所得故也忠正之士直道而行不為諂諛不事左右明主顧遇則進疑阻則退不為他計苟安其位以此常為奸邪所搆以其無所入也夫聖賢合跡千載同符忠正端慤之人所以知奨亦是此𩔖是同道也非為黨也豈可使端良之人取非僻之士然後謂非朋黨也陛下親行堯舜之道髙挹禹湯之徳豈謂上與數千年堯舜禹湯為黨是道徳同也孔子聖人也顔囬已下十哲希聖者也更相稱賛為黨乎是道業同也仲尼祖述堯舜憲章文武又曰吾不復夢見周公逺者二千年近者五百年豈謂之黨是聖人徳行同也後漢末名節骨鯁忠正儒雅之臣盡心匡國盡節憂時而宦官小人憎嫉正道同為搆陷目為黨人遂起錮黨之獄以成亡國之禍備在史䇿明若日月豈不為誡乎詩人嫉䜛佞之人曰取彼䜛人投畀犲虎可謂三覆也上曰朕無疑卿等意況言朋黨未至公之道爾絳又對曰趍利之人常為朋黨以同其私故守正之人常遭搆毁以違其私故也小人多詐譛言常勝正人少機直道常不勝伏希陛下監其事情而察其言行則可矣上御浴堂北廓召學士李絳對顧問畢上曰有一事甚異朕比來未能言之鄭絪身為宰相事朕不盡心朕與宰相商量欲詔盧從史却歸潞府續追入朝鄭絪輒漏洩我意先報從史令其陳奏潞府無粮三軍且請山東就粮為人臣豈合有此事耶故事合如何處置絳對曰若實有此事雖以誅族於陛下未足塞責復曰陛下從何得之計鄭絪必不自洩從史必不自言陛下先知何以得之上曰吉甫宻奏絳對曰臣與鄭絪先後懸殊不相徃來臣約其事體必無此理鄭絪甚讀書頗識事體時稱佳士素有美名雖不知其才術如何至於君臣大義不合不知去就若身居宰叅陛下宻謀便敢洩之於奸臣雖術同犬彘性如梟獍亦不合至此況絪頗知古今洞識名節事出萬端情有難測莫不同列有不便之勢專權有忌前之心造為此亂冀其去位若不過陳危事安得激怒上心伏望陛下深賜詳熟無令人言陛下惑於䜛佞也上良久曰亦應如此朕幾誤為處分至是遂已憲宗時京兆少尹裵武銜命使鎮州令諭王承宗割徳棣兩州歸朝廷武飛表上言一如朝廷意㫖遂除承宗所署徳州刺史薛昌朝為徳棣節度令中使齎旌節授之而魏博田季安得飛報先知之遽報承宗言昌朝與朝廷通遂星夜追昌朝徳棣州節度及旌節至魏州又為季安留連得為宴樂停七八日而昌朝尋已追到鎮州朝命遂不行比及武使囬事宜與先上表參差并有人譛傷武云使囬宿宰相裵垍宅遲明方見憲宗大怒乃召學士李絳因顧問奏對畢上顔色甚震怒曰裵武誷我苟求脫祻於賊中上言不實令我制除薛昌朝今果不受又使回未見先宿裵垍宅須左除嶺南逺處絳奏言裵武甚諳練時事徃陥在河中李懐光賊中事跡可稱今所銜命不合絶有乖錯大底賊多變詐難得實情以臣愚慮思度王承宗恐國家必有征討請割徳棣兩州且得安全尚有四州之地亦足保其富貴求安之計必是此心然鄰道魏博東平范湯與王承宗勢同事等恐他時亦為朝廷所割必是為鄰道所搆兼以利害鼔動之不得守其初心此必然之理也伏望且尋訪之裴武所上表只得上承宗初時意便且奏來後必恐鄰境脅制誘動遂有後變計裵武不敢不盡其心今陛下擇裵武使兇逆悖亂之邦一不如意便有貶責臣恐今後奉使賊中無復得誠實其後奉使者皆以武為誡依阿可否之間必曰其言及表章則如此其深心則臣不可保不可􅂋言是非陳列事状若朝廷不得實状别處置或有乖錯非國家所利也若受賊中財賂言語不實則須重責以懲姦欺又言先於裵垍宅宿且裵武久為朝官具諳制度裵垍身為宰相特受恩私必無未見而便宿宰相家固無此理昧劣於此兩人猶不敢至是況皆是詳練時事之人計必無此事必有搆傷裵垍裵武陛下不可不察上良久曰誠有此理事合從寛更不用問武得守其位武宗立召淮南節度使李徳裕為門下侍郎同中書門下平章事既入謝即進戒帝辨邪正專委任而後朝廷治臣甞為先帝言之不見用夫正人既呼小人為邪小人亦謂正人為邪何以辨之請借物為諭松栢之為木孤生勁特無所因倚蘿蔦則不然弱不能立必附他木故正人一心事君無待於助邪人必更為黨以相蔽欺君人者以是辨之則無惑矣又謂治亂繫信任引齊桓公問管仲所以害覇者仲對琴瑟笙竽弋獵馳騁非害覇者惟知人不能舉舉不能任任而又雜以小人害覇也太𤣥徳憲四宗皆盛朝其始臨御自視若堯舜寝久則不及初陛下知其然乎始一委輔相故賢者得盡心久則小人並進造黨與亂視聽故上疑而不專政去宰相則不治矣在徳宗最甚晚節宰相惟奉行詔書所與圖事者李齊運裵延齡韋渠牟等訖今謂之亂政夫輔相有欺罔不忠當亟免忠而材者屬任之政無他門天下安有不治先帝任人始皆回容積纎㣲以至誅貶誠使雖小過必知而改之君臣無猜則䜛邪不干其間矣會昌中徳裕論侍講奏孔子門徒事状上言曰今月十三日於延英殿陛下謂臣等云侍講稱孔子其徒三千亦可謂之朋黨臣等自元和以來甞聞此說幸因聖慈下問輒敢覼縷而言西漢劉向云昔孔子與顔囬子貢更相稱譽不為朋黨禹稷與臯陶轉相汲引不為比周何則忠於為國無邪心也臣常以鯀共工讙兜與舜禹雜處堯朝共工讙兜則為黨舜禹則不為黨何者共工讙兜相與比周迭為掩蔽也如賢人君子則不然忠於國則同心聞於義則同志退而各自行已不可交以私是以趙宣子随㑹繼而納諫司馬侯叔向比以事君不為黨也公孫𢎞毎與汲黯請間黯先𤼵之𢎞推其後武帝所言皆聽汲黯雖與公孫𢎞並進然廷詰云齊人少情譏其布被為詐則知先發後繼不為黨矣國史稱太宗甞與房𤣥齡圖事則曰非杜如晦莫能籌之及杜如晦至竟從𤣥齡之䇿此又同心圖國不為黨也何者為黨漢書稱朱博陳咸相為腹心背公死黨東漢周福房植各以其黨相傾議論相軋故漢朝朋黨始於甘陵二部及其甚也謂之鈎黨繼受誅夷以王制言之非不幸也魏朝何晏丁謐依附曹爽祖尚浮虚使有魏風俗由兹大壊此皆為朋黨也略舉數節以明其𩔖至於歴代朋黨不可殫言仲尼知季路之不免子㳺識子張之未仁曾子罪卜商䘮親無聞夫子咎宰我鑚燧為久惡既不掩善固宜稱此又不為黨也班固稱周室既微由是列國公子魏有信陵趙有平原齊有孟甞楚有春申抵掌而㳺談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣此四豪者各有門客三千而謂之黨仲尼三千則不為黨盖仲尼之徒惟務仁義不以爵禄為貴四豪之門惟務譎詐常以勢力相髙今侍講欲以奔走權勢之徒攫挐名利之軰比方孔門上哲實㒺聖聦臣未知元和以來所謂黨者為國乎為身乎若以為國則随會叔向汲黯房𤣥齡之道可得行矣不必聚黨成羣以臣觀之今所謂黨者進則誣善蔽忠附下罔上歙歙相是態不可容退則車馬馳驅唯務權勢聚於私室朝夜合謀清美之官盡須其黨華要之選不在他人隂附者羽翼自生中立者抑壓不進孔門顔冉豈有是哉陛下以此察之則姦偽自見臣恐更有小人妄陳此說輒舉事例庻裨聦明伏望陛下留臣此狀時賜覽閱所冀小臣瞽說免惑聖心臣不任懇激之至謹録奏聞宋真宗咸平六年右諫議大夫田錫乞詢求将相狀曰臣甞讀唐太宗實録見李靖文武材畧隋将韓擒虎即其舅也靖毎與擒虎論兵未甞不稱善撫之曰可與論孫吳之術也初事隋為殿内直長吏部尚書牛𢎞見而重之曰李靖王佐才也今國家自先帝平晉之後與突厥結隙将相舊人相次薨謝邉鄙間州縣屢為突厥所陥皇威不振久矣時議乃以将相無人亦久矣即不知今來朝廷公卿大夫間有如韓擒虎與李靖論兵否有人如牛𢎞知李靖有王佐才否若有人能論兵有人負王佐才未審陛下知之否有人善論兵有人負王佐才乃是帝王合先知之矣自來皇城司差人探事又别差探皇城司探事人如此察探京城民間事無鉅細皆達聖聦近又差朝臣為廵撫使及差朝臣以㸃檢酒務名目出外採訪所採訪之事不􅂈民間利病不過官吏能否而已即未聞委公卿大夫察訪善論兵之人詢求有王佐之才者也由是見所求者瑣屑而所忽者逺大也陛下若以宗廟社稷為憂以生靈為念即宜以逺大為務求将相急也臣毎奉聖謨令陳鄙見仰祈英睿特賜披詳仁宗時叅知政事范仲淹奏辯滕宗諒張亢䟽曰臣聞議論太切必取犯顔之誅保任不明豈逃累已之坐彛典斯在具寮式瞻臣自邉陲誤膺奨擢授任不次遇事必陳竊見故監察御史梁堅彈奏滕宗諒於慶州用過官錢十六萬貫有數萬貫不明必是侵欺入已及邠州宴會并涇州犒設諸軍乖越不公至聖慈赫怒便欲罷去臣緣在彼目擊雖似過當别無切害不曾有一兵一民詞訟至於處置邉事亦無踈虞臣遂進諫乞聖慈差官勘逐具與辯明未銷挫辱恐誤朝廷賞罰又有上言張亢驕僭不公臣亦乞根勘辯明或無深過如有大叚乖越侵欺入已臣甘同受貶黜臣所以激切而言者非滕宗諒張亢勢力能使臣如此竭力也盖為國家邉上将帥中未有曾立大功可以威衆者且遣儒臣以經畧部署之名重之又借以生殺之權使彈壓諸軍禦捍大寇不使知其乏人也若一旦以小過動揺則諸軍皆知帥臣非朝廷腹心之人不足可畏則是國家失此機事自去爪牙之威矣唐末藩鎮多殺害逐去節度使於軍中自立帥臣而當時不能治者由帥臣望輕易於揺動之故也今燕度勘到滕宗諒慶州一界所用錢數分明並無侵欺其毁却涇州前任公用厯勘到干連人只稱有送官員等錢物亦不顯入已又是元彈奏状外事件所有張亢借公用錢買物事未發前已還納訖又因移任借却公用銀却留錢物准還皆無欺隠之情其餘罪狀多未摭實其干連人當盛寒之月久在禁繫皆是非辜若令燕度勘問二人既事非確實必難伏辯或逼令認罪又是陛下近臣不可辱於獄吏或至録問有辭即須差官再勘其合干人當轉不聊生兼邉上臣寮見此深文謂朝廷待将帥少恩於支過公用錢内搜求罪戾欲陥邉臣且塞下州郡風沙至惡觸目愁人非公用豐濃何以度日豈同他處臣寮優㳺安穏坐享榮禄陛下深居九重當須察此物情知其艱苦豈可使獄吏為功而勞臣抱怨臣欲乞聖慈據燕度奏到事節特降朝㫖差使臣二人齎去取問滕宗諒張亢如實是已犯便仰承認當議量情親㫁如别有緣由亦具分析聞奏候到見得别無枉抑便可取㫖㫁遣如有異同即乞朝廷别選官勘鞫免致寃滯其干連人且乞指揮放出知在臣則已有不合保此二人罪狀乞聖慈先賜貶黜免令臣包羞於朝受人指笑儻聖慈念臣不避艱辛尚留驅使即於河東河北陜西乞補一郡臣得經畫邉事一一奏論或補三輔近州臣得為朝廷建置府兵作諸郡之式以輔安京師臣之此請出於至誠願陛下不奪不疑況臣久為外官不知輔弼之體本是麄材秖堪犬馬之用若令臣待罪兩府必辱君命且畏人言臣無任祈天望聖請命激切屏營之至仲淹又奏雪張亢䟽曰臣昨日見樞宻院進呈張亢所奏曾将公用錢囬易到利息買馬及交鈔乞與逰索之人自甘伏罪乞不追䆒逰索之人取㫖下燕度結案聞奏臣伏覩編勅指揮若将公使錢囬易到别物公用但不入已更不坐罪其張亢所奏二事若未有發露乃是自首縱已發露亦不入已合該上項編勅指揮臣昨與韓琦在涇州同使公用錢曾為慶州簽判祕書丞馬倩身亡本人家貧親老與錢一百貫文又涇州保定知縣大理寺丞劉襲禮丁父憂家貧起發不得與錢一百貫文又號州推官監環州入中陳叔度丁父憂家貧無依與錢五十貫文又進士黄通來涇州相看與錢五十貫文並是一面将公使庫錢囬易到利息相兼使用即不曾侵使着係省官錢自來邉上有公使錢處為有前項條貫及有回易利息但不入已各是從便使用今來若依編勅施行則張亢自首與逰索人錢不曾入已又是燕度元勘外事節朝廷自可指揮不須却送入案兼恐追尋元逰索之人或在逺方何時結絶若不用上件編勅指揮則臣與韓琦亦有上件與人錢物罪状須至自劾昔人有言曰法者聖人為天下畫一一不以貴賤親疎而輕重也伏望聖㫖送樞宻院依詳編勅及将臣與韓琦用錢事状井張亢所奏二事一處定㫁以正典刑慶厯四年十二月知潞州尹洙論公論朋黨繫於上意䟽曰臣聞知賢而不能任任之而不能終於治國之道其失一也去年朝廷擢歐陽脩余靖蔡㐮孫甫相次為諫官臣知數子之賢且久一旦樂其見用又慶陛下得賢而任之所慮者任之而不能終爾以陛下知臣之明脩等被遇之深豈有任之而不能終哉盖聞唐魏元成既薨文皇親為撰碑文以賜之後有言其阿黨者遂仆其碑近世君臣相得未有如唐文皇與魏元成者間言一入則存殁之恩不終臣未甞不感憤嘆息而不能已也以是而論則知任之為易終之實難可不慮哉屬聞歐陽脩領使河北臣以邉任之重故不復以内外為疑今又聞蔡㐮出知福州未審㐮以親自請為以過斥若以過斥豈當進其官秩若以親請則㐮在京師不三四年已再省其親士大夫去逺方而仕京師者孰不思其親豈獨㐮得遂其私恩哉則㐮之不當出明矣陛下優容諫臣在唐文皇上脩等之才雖不愧古人然所施為未能少及於魏元成則間毁之言不必待其殁而後發也伏惟念知之之已明任之之已果而終之之甚難則天下幸甚然臣愛脩等之賢故惜其去朝廷而不盡其才如陛下待脩未改於初則臣有稱道賢者之美如其恩遇已移則臣負朋黨之責矣夫今世所謂朋黨甚易辨也陛下試以所進用者姓名詢於左右曰某人為某人稱譽必有對者曰此至公之論異日其人或以事見踈又詢於左右曰某人為某人營救必有對曰此朋黨之言昔之見用此一臣也今之見踈亦此一臣也其所稱譽與營救一也然或謂之公論或謂之朋黨則公論之與朋黨常繫於上意不繫於忠邪此御臣之大弊也臣既為陛下建忠謀豈復顧朋黨之責但懼名以朋黨則所陳之言不䝉見采此又臣之深慮也惟聖明裁察焉樞宻使副陜西安撫使韓琦乞别白朋黨状奏曰臣竊聞已降詔書申誡朋黨此盖陛下恢善治勸薄俗之深意也臣輒有管宂之見少思開助聖明竊以自古迄今人臣在朝有忠賢有奸邪有好公之人有挾私之黨既為性之不同則各以𩔖而相附大凡忠賢與好公之人建一事補一官則必公其是非盖是者言是非者言非唯在於公故政化可興而邦家是賴此乃善者以𩔖而進不可謂朋黨若奸邪與挾私之人建一事補一官則必私其是非盖是者言非非者言是唯在於私致使白黑不分而上蔽主聽者真所所謂朋黨也在聖君審而察之決而行之若有此等朋黨必望陛下重加貶責不可務寛俾其忠賢興好公之人以𩔖而進奸邪與挾私之人以黨而退則朝廷清明朋黨自息也若但行詔諭未賜别白臣恐天下搢紳自今而後欲建一善事稱一善人必再三思之曰得無渉朋黨之迹乎則中道而止矣縱有忠義之人不顧形迹建一善事稱一善人若惡之者譛于上曰此朋黨之為耳則善事與善人皆廢而不用矣惟陛下熟察而必行之天下幸甚五年河北都轉運使歐陽脩論小人欲害忠賢必指為朋黨上奏曰臣聞士不忘身不為忠言不逆耳不為諫故臣不避羣邪切齒之祻敢干一人難犯之顔唯賴聖明幸加省察臣伏見杜衍韓琦范仲淹富弼等是陛下素所委任之臣一旦相繼罷黜天下之士皆素知其可用之賢而不聞其可罷之罪臣雖供職在外事不盡知然臣竊見自古小人䜛害忠良其說不逺欲廣陥良善則不過指為朋黨欲動揺大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一一求瑕唯有指以為黨則可一時盡逐至如大臣已被知遇而䝉信任則難以他事動揺唯有專權是上之所惡故須此說方可傾之臣料衍等四人非有大過而一時盡逐弼與仲淹委任尤深而忽遭離間必有以朋黨專權之說上惑聖聦者臣請試辨之昔年仲淹初以忠言讜論聞於中外天下賢士皆争稱慕當時奸臣誣作朋黨猶難辨明自近日陛下擢此數人並在兩府察其臨事可以辨也盖杜衍為人清脩而謹守規矩仲淹則恢廓自信而不疑琦則純正而質直弼則明敏而果銳四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹則力争而寛之仲淹謂契丹必攻河東請急脩邉偹富弼料以九事力言契丹必不來至如尹洙亦號仲淹之黨及争水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙也數事尤為彰著陛下素已知此四人者可謂天下至公之賢也平日閑居則相稱美之不暇為國議事則公言廷諍而不私以此而言臣見衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下之得專也然臣切思仲淹等自入兩府以來不見其專權之迹而但見其善避權也夫權得名位則可行故好權之臣必貪位自陛下召琦與仲淹於陜西琦等辭至五六陛下亦五六召之至如富弼三命學士兩命樞宻副使毎一命未甞不懇辭懇辭之者愈切陛下用之愈堅此天下之人所共知臣但見其遜避太繁不見其好權貪位也及陛下堅不許辭方敢受命然猶未敢别有所為陛下見其皆未行事乃開天章召而賜坐授以紙筆使其條事然衆人避遜不敢下筆弼等亦不敢獨有所述因此又煩聖慈特出手詔指定姓名專責其條列大事而行之弼等遲囬近及一月方敢略陳數事仲淹老練世事必知凡事難遽更張故其所陳志雖逺大而多若迂緩但欲漸而行之以久冀皆有效弼性雖銳然亦不敢自出意見但舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事便行更無推避臣方恠弼等䝉陛下如此堅意委任督責丁寧而猶遲緩自疑作事不果然小人巧譛已曰專權者豈不誣哉至如兩路宣撫國朝常遣大臣況自中國之威近年不振故元昊叛逆一方而勞困及於天下北人乘釁違盟而動其書辭侮慢至有貴國祖宗之言陛下憤恥雖深但以邉防無偹未可與争屈意買和莫大之辱弼等見中國累年侵淩之患感陛下不次進用之恩故各自請行力思雪恥緣山傍海不憚勤勞欲使武偹再脩國威復振臣見弼等用心本欲尊陛下威權以禦四夷未見其侵權而作過也伏惟陛下睿哲聦明有知人之聖臣下能否洞見不遺故於千官百辟之中親選得此數人驟加擢用夫正士在朝羣邪所忌謀臣不用敵國之福也今此數人一旦罷去而使羣邪相賀于内四夷相賀於外此臣所以為陛下惜之也伏惟陛下聖徳仁慈保全忠善退去之際恩禮各優今仲淹四路之任亦不輕矣惟願陛下拒絶羣謗委信不疑使盡其所為猶有裨補方今西北二陲交争未已正是天與陛下經營之時如弼與琦豈可置之閑處伏望早辨讒巧特加圖任則不勝幸甚臣自前嵗召入諫院十月之内七受聖恩而致身兩制常思榮寵至深未知報効之所今羣邪争進讒巧而正士繼去朝廷乃臣㤀身報國之秋豈可緘言而避罪敢竭愚瞽惟陛下擇之至和元年侍御史趙抃論邪正君子小人上言曰臣聞欲治之主得人其昌左右前後皆盡賢正也謀謨讜言皆盡延納也忠厚鯁亮之士日益招來便佞詭姦之徒日益摧縮號令風化日益流布朝廷中外日益尊安若然富壽之域坐躋太平之象立見噫左右前後一日不得賢正之人而為之輔翼雖堯之癯瘠舜之孜孜夏禹之克勤文王之不暇食末如之何也已漢劉向謂正臣進者治之表正臣陥者亂之基誠哉是言也在易君子道長小人道消於卦為泰其繇云上下交而其志通也正臣非君子歟反是則於卦為否矣否之繇則曰上下不交而其志不通内小人而外君子邪臣非小人歟此言為天下者宜進君子而退小人也明矣谷永所謂帝王之徳莫大於知人者其有㫖哉夫南面而聽天下也公卿百執事雜然滿前孰為正孰為邪孰為君子孰為小人在聖人明眎而聦聽之精擇而慎柬之真偽明白人焉廋哉大抵輔相樞機之任得正人也得君子也然後同徳而同心也則其下所謂邪者小人者靡然相與俛首帖耳以去而徘徊所留亡幾矣鑒觀古昔信史偹存有虞大聖人也任十六相世躋徳美檮杌饕餮流竄四裔民至于今稱之亡窮周成哲王也善有旦奭則倚之不貳惡有管蔡則誅之勿疑故年七百而世三十也始皇惑髙斯之佞不能奪忽叔孫之才不能與秦嬴之敗曾不旋踵元帝知恭顯之姦不能擯愛蕭望之之賢不能用炎漢之運從而衰下唐太宗納房杜王魏之切議誅侯君集張亮之兇僻遂成貞觀之治天皇聴敬宗之附會戮無忌之忠良終有易姓之祻其後元振朝恩之擅權元載盧把之竊位代徳之勢其危殆相繼不絶如綫兹誠用人之得失莫不繫國之安危間分兩塗不可不辨恭惟陛下以上聖之姿御神噐之重開納忠讜繼承祖宗數路以取人一徳以求治然而邇來日星謫見聖衷焦勞蝗潦為災民力彫弊帑庾空窘敵國窺覦官冗兵驕風俗奔競今将治其弊安其危豈一人獨運於巖廊之上而能致之哉當此時也謂宜博選忠直方正能當大任世所謂賢人端士者速得而亟用之位于丞疑輔弼之列朝夕獻替得嘉謀嘉猷發為號令使天下耳目聞見太平之政在今日爾臣不勝大願願陛下宸㫁不疑舉正以却邪􅕾君子而黜小人有為於可為之時無因循後時之悔則天下幸甚宗廟之靈社稷之福此其時也臣逺賤之迹愚亡所能唯思死節一誠上報陛下採擢覆幬之徳萬分一二臣無任許國竭忠激切待罪之至至和二年知制誥劉敞論吕溱等補外上奏曰臣伏以馭臣之道在分别邪正正臣當親而近之邪臣當踈而逺之至於天下之人亦皆以此窺朝廷若正臣聚於朝則姦雄屏息治平可望若邪臣聚於朝則僥倖競進頓敗可待者不可勝察也臣伏覩朝廷太平積久賢能衆多然其間邪正亦雜有之或愛君憂國公正發憤或朋黨比周背公植私亦有循黙自守不能為善又不敢為惡陛下臨御三十餘年矣以上聖之資監羣下所為固無遁形固無隠情然有可戒謹者在此而已凡正臣常難進而易退邪臣常易進而難退何以言之正臣者惟義所在言則逆君之耳是所以難進也言或不用不欲自顯因事而去是所以易退也邪臣者惟利所在言則逄君之欲是所以易進也行雖惡不顧禮義名雖醜不知愧恥患失之耳是所以難退也此兩臣者願陛下參伍觀之毋使當親者踈當踈者親則朝廷尊榮而社稷安矣近者翰林侍讀學士吕溱樞宻直學士蔡㐮繼出典郡今又聞御史中丞孫抃翰林學士歐陽脩知制誥賈黯韓絳並乞補外此六人等皆有直質無邪心論議不阿執政有益當世者也誠不宜許之使四方有以窺朝廷而姦佞僥倖之雄因而競起此則邪正分别之一端也臣以孤拙忝侍從日夜思惟無以少禆聦明恐陛下忽於正臣之易退而忘左右前後直道之不容也臣不勝其愚謹献所聞惟賜采擇言事御史馬遵論欲用忠賢當去左右之私言上奏曰臣聞自古人君皆欲求忠以自助求賢以自為然而治少而亂多者盖其所謂忠者不忠而賢者不賢也故知人則哲堯舜其難今陛下至仁求治堯舜之用心也其於知人亦不為易必欲得忠賢而用之莫若去左右之私言采中外之公議則其人可知矣知而用之則朝廷無事而天下太平矣狂言聖擇或補萬分英宗眷遇右司諫同知諫院𫝊堯俞甞問曰多士盈庭孰忠孰邪堯俞曰大忠大佞固不可移中人之性繫上所化英宗納其言神宗初立以吳奎為參知政事時已召王安石辭不至帝顧謂侍臣曰安石歴先帝朝召不赴頗以為不恭今又不至果病耶有所要耶曾公亮曰安石文學噐業不敢為欺奎曰臣甞與安石同領郡牧見其䕶前自用故為迂闊萬一用之必紊亂綱紀乃命知江寜奎又甞進言陛下在推誠應天天意無他合人心而已若以至誠格物物莫不以至誠應則和氣之感自然而致今民力困極國用窘乏必候順成乃可及他事帝王所職惟在於判正邪使君子常居要近小人不得以害之則自治矣帝因言堯時四凶猶在朝奎曰四凶雖在不能惑堯之聰明聖人以天下為度未有顯過固宜包容而不可使居要近地爾帝然之帝召問集賢校理開封府推官滕元發治亂之道元發對曰治亂之道如黑白東西所以變色易位者朋黨汨之也帝又曰卿知君子小人之黨乎曰君子無黨辟之草木綢繆相附者必蔓草非松栢也朝廷無朋黨雖中主可以濟不然雖上聖亦殆帝深以為名言太息久之熈寜初王安石為翰林學士一日講席羣臣退帝留安石坐曰有欲與卿從容論議者因言唐太宗必得魏徴劉備必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下誠能為堯舜則必有臯夔稷卨誠能為髙宗則必有傅說彼二子皆有道者所羞何足道哉以天下之大人民之衆百年承平學者不為不多然常患無人可以助治者以陛下擇術未明推誠未至雖有臯夔稷卨傅說之賢亦将為小人所蔽卷懐而去爾帝曰何世無小人雖堯舜之時不能無四凶安石曰惟能辨四凶而誅之此其所以為堯舜也若使四凶得肆其讒慝則臯夔稷卨亦安肯苟食其禄以終身乎熈寜元年安石論孫覺令吏人書寫章䟽上奏曰臣今日䝉宣諭以孫覺令吏人書論列大臣章䟽臣初亦怪其不能謹宻但疑此朋友所當誨責非人主所當譴怒既又反覆思惟陛下以覺為可聽信故擢任諫官進賢退不肖自其職分所當論列雖揚言於朝以廸上心於義未為失也但令吏人書寫章䟽誠不足以加譴怒凡人臣當謹宻者以君子小人消長之勢未分言有漏泄或能致禍如其不宻則害将及身若遭值明主危言正論無所忌憚亦何謹宻之有乎唯有姦邪小人以枉為直懼為公論之所不容則惟恐其言之不宻若得此軰在位陛下何所利乎若陛下疑覺有交朋黨之私招權之姦則恐盛徳之世不宜如此魏鄭公以為上下各存形迹則國之興廢或未可知若陛下不考察邪正是非而每事如此猜防則恐善人君子各顧其迹不敢盡其忠讜之言而姦邪小人得伺人主之疑以行䜛慝也若陛下恐陳升之聞此或不安臣亦以為不然漢髙祖雄傑之主也然鄂千秋論相國蕭何功次而髙祖不疑乃更加賞亦不聞蕭何以此為嫌陛下聖賢髙逺自漢以來令徳之主皆未有能企及陛下者每事當以堯舜三代為法奈何心存末世褊吝之事乎書曰任賢勿貳去邪勿疑不明知其賢而任之以為賢不明見其邪而疑之以為邪非堯舜三代之道也陛下以臣為可信故聖問及之臣敢不盡愚今日口對未能詳悉故謹具劄子以聞上甞從容語及知人之難右正言供諫職孫覺曰堯以知人為難終享其易盖知人之要在於知言人主用臣之道任賢使能而已賢能之分既殊任使之方亦異至於所知有限量所能有彼此是功用之士也可以處外而不可以處内可以責之事而不可以責之言陛下欲興太平之治而所擢數十人者多有口才而無實行臣恐日浸月長彚征墻進充滿朝廷之上則賢人日去正人日逺其為祻患尚可以一二言之哉願觀詩書之所任使無速於小利近功則王道可成矣覺又上奏曰臣前日獲奉清光親承聖諭以知人為難臣時倉卒以對不盡所懐退竊私喜聖諭及此則以同符帝堯天下幸甚夫堯以神明之徳睿聖之資而以知人為難故四凶舜禹雜處其朝而終能辨之知所信任盖天下之事難之則易易之則難堯以知人為難故終享其易而成巍巍之功季世之君易於知人信任偏蔽以致祻敗者不可勝數臣竊惟孔子曰不知言無以知人中庸曰取人以身脩身以道然則知人之要在於知言知言之方在於修身而務學群臣進見者其言亂雜而不一其情隠伏而難知倉卒須臾之間未可以試之而見也人主茍能貫乎聖人之道通乎天下之理則言出而知其所指事至而要其所歸譬之權衡不可欺以輕重法度不可欺以長短茍為不學而燭理不明物來則眩矣尚何人之能知哉陛下躬上聖之資兼孔孟之業固足以燭萬務而察群下之情臣願陛下益聞所未聞見所未見使天下之理明白昭晰心如定鑑不将而不迎則賢不肖判然君子小人辨矣惟留神財幸二年覺又論不當召對小臣詢兩府䑓閣人物上奏曰臣聞近者召對臣僚雖或踈逺微賤陛下亦霽天威賜以清問此固聖主好問盡下推誠不疑甚盛之徳也或聞進對之間陛下時時論及人物上自兩府大臣下至䑓閣新進使之區處題品此雖陛下廣其聰明不專一人之言以為信但欲周知羣下之智能長短情状曲折然臣竊以謂知人堯舜所難孔子亦曰不如鄉人之善者好之其不善者惡之得對之人未必皆賢而公其好惡就令才識可采亦未必盡知人之明問答之際陛下不能不微見聖懐流俗之情多事容恱度所喜者飾其賢觀所惡者詆其醜或陛下少加酧對必漏其所言大臣聞之必懐顧慮小臣聞之必事朋黨臣以謂人主不得不知羣臣之忠邪人才之髙下苟於侍臣從官之中忠信篤實而好惡不私材資敏明而鑒裁不眩者時賜考察參伍其人亦不至於失士知諫院楊繪上奏曰臣竊以人君之所難者其惟知人乎人藏其心非察其言之可采必觀其行必試其事然後其才能可得而用矣虞書曰萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸此之謂也恭以百寮轉對不行者十數年陛下即位首復其事此真明目逹聡兼視廣聽之術也然而止取其名乎将取其實乎如取其名則書之史冊傳之四方亦足以為美矣如取其實則今之轉對者前一日入奏于上閤至其日再拜於上前而退則所奏之事有可採者或假手於人若因而進用之則偽濫者何由而旌别乎欲乞先觀其言設有可采即於轉對之時召而訪以事閱其能否真偽之状既審其可用仍未可以言而遽進之先命之以事而觀其才用之實而擢於位如此則敷奏以言明庶以功車服以庸之典復行於今日四年繪權御史中丞又上奏曰臣竊以知人之難雖聖人不免有失如堯之為君可謂聖人矣禹曰知人則哲能官人惟帝其難之能哲而恵何憂乎驩兜何遷乎有苖何畏乎巧言令色孔壬此言堯亦難乎知人也如孔子之為師可謂聖人矣曰以言取人失之宰予以貎取人失之子羽則孔子亦難乎知人也夫知人之道古聖人以為難而不免有失則今之人不逮於古聖人者其得自謂無難無失乎然在察於衆而不以一已之愛憎而定人之賢否則知人庶乎其無失者矣恭惟陛下聖徳天縱負知人之哲茍知之則用之無不當然天下百官之衆豈能盡出於聖知乎則必責在宰相也今居宰相之任者獨王安石臣謂其人之文章之徳行之政事信為宰相唯於知人之道或恐不能無失焉以臣之愚而觀之其得失在於以一已之愛憎而定人之賢否而已臣請以既徃之事明之只如吕公著者王安石始而愛之遂力薦之以為天下之賢也一旦言青苖不便終而憎之遂力排之以為天下之不賢也陳升之者王安石始而愛之遂力薦之以為天下之賢也一旦言乞罷條例司遂力排之以為天下之不賢也韓絳者王安石始而愛之遂力薦之一旦於陜西捲助役錢榜終而憎之遂力排之以為天下之不賢也薛向者王安石始而愛之遂力薦之以為天下之賢也一旦言助役錢不便終而憎之已沮之劾之矣非逺必将力排以為天下之不賢也至於李常之𩔖不可勝紀其始徇我則愛之薦之以為賢其終違我則憎之排之以為不賢知人之道豈若是哉然既徃之事不足復議臣之所憂者在於将來也安石之位今已為宰相則尊於徃時矣其勢也漸而專矣人知徇之者得路則刻薄者望風而進矣人知違之者得怒則阿諛者登門而附矣以阿諛而被用者唯富貴是圖必無正人之理以刻薄而受知者唯沽激是務必無愛人之道戾之者日去順之者日衆戾之者日去則其間或有守之君子也順之者日衆則其間或詭随之小人也陛下之任安石也如此而安石不能知人愛人之徇已也而憎人之違已也如此雖陛下保安石必不作過若萬一有擅權專恣之事既附之者衆而無敢違之者則陛下何由而知乎縱安石實不作過若萬一有思慮不及之政事而行之有害於時者何人敢與安石言之乎觀其愛人之狥已而力薦之憎人之違已而不肯用雖有敢言之者安石其肯舍已而廽乎上孤而下執臣之所憂在乎将來者此也臣願陛下體察安石於知人之道未盡凡百除注無只信其愛憎而更參之於衆人則天下幸甚臣未受命為御史中丞以前未甞敢以一言上聞誠知陛下信之之篤徒以取憎於執政也今既受命為御史中丞矣則不憚誅謫而言之乃其職爾臣每聞其門下人議論但稍有違安石意者遂相與呼為流俗之議也以今觀之流俗之議安可忽諸無使将來之視今日或有如今日之視去年也邉事外也民政内也外憂如皮膚内患如心腹可得謂之必無矣臣謂今日之後只有順之者而無復有忤之者不同於既徃也乞陛下以宗廟社稷為念以天下生靈為念而無重違安石一人之意凡百除注或有未得知人之美者乞參之於衆人或出於聖㫁裁正之三年知開封府鄭獬上奏曰臣比者進對伏䝉陛下稱臣攝尹京府為治甚好百姓便之臣内惟承乏纔四十餘日實無善状可副陛下褒諭之意故不敢祗拜以謝又以隆暑日旰不敢久對是以私懐欝塞恐慄而不安臣才能朽下安能治劇夙夜勉强粗免罪戾若曰百姓便之萬無此理且所謂便之者盖知其閭里之疾苦除弊興利使元元之衆去愁歎而就安佚庶乎可也今臣於此未有毫髪則百姓何便之有然不識陛下從何而得之陛下聦明好問繇逮訪於下多言者或以此譽臣此妄譽也當其進言時陛下何不使條臣所行便民之事彼必窮而無對設使有對且實則陛下亦當深察之然後以為信今臣無是而陛下遽信之如有以臣不肖而毁之者陛下亦必聽之矣何則善惡之來不考其實既容妄譽必亦容妄毁此臣不敢喜而有懼也昔者列子居鄭客有言之於鄭子陽子陽遺之粟列子再拜而辭曰君非自知我也以人之言而遺我粟至其罪我也亦必以人言則吾所以不受也臣雖至愚安知陛下不以妄毁而黜臣哉故帝王聽納之際不可不察不察其實則天聽可得而欺姦臣乘之以逞其欲於是以白為黑以是為非附己者進背己者斥分布朋𩔖彌縫其失使朝廷之上惟聞黨人之論而不知有天下公議善乎孟子之言左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可然後去之如此則當進者無苟得之幸當退者無私歎之恨進退各當其分又孰有致疑於其間者哉伏願陛下髙視逺照毋牽私言使天下曉知毁譽之不能亂政則非獨臣之願實天下之願伏候進止獬又奏曰日者陛下陞黜大臣出於獨斷二府不得與謀中外聞風莫不震動伊欝之士至有通夕不寐拊髀而起躍者以為自天禧已來五六十年間未有此等事攄祖考之宿憤快四海之公議則孤立特出之臣可以出氣以髙眡於天地間矣然而慶於始者未必不憂於後見於微者未必不昧於著今進退之柄在於宰相無雄傑跋扈之志竊取其柄以植私家故陛下一日攝而歸已此不為難而所以為難者乃在知人昔堯之聖猶曰知人惟帝其難之則自堯而後愈為難矣今賢不肖雜然以進深情厚貎言與行違陛下雖聦明焉能探其肝膽而辨其真偽乎辨之術則莫若試之凡陛下所得士未宜便賜褒擢如曰我能治民則且試之治民如曰我善治財則且試之治財如曰我善為禮則且試之為禮如曰我善為樂則且試之為樂凡其所長者宜從其長而用之用之有效群臣以為然未也大臣以為然亦未也陛下察之見其有效然後賞之如其不然則宜黜之賞罰明而人自勸雖堯舜不踰於此則其知人者豈不為難乎既用其賢矣時以不肖者參焉既用其智矣時以愚者參焉於是黒白淆亂邪正倒置則天下之事去矣昔者秦始皇自侈以為天下無賢及漢祖之起蕭張韓黥乃秦之棄士也隋煬帝自大亦以為天下無賢及唐宗之起而房杜英衛乃隋之棄士今天下之廣豈無賢者惟無棄士以資後人乃幸矣然陛下既得士宜用其所長在三司者則宜擇錢穀吏尹京者宜擇通政事之臣在御史宜擇强毅之臣在侍從宜擇文學通古今之臣如此則才盡其所藴而官宿其所業天下之事不舉者未之有也故舜之命夔典樂則不復典禮命禹作司空則不復作司徒命稷播農則不復作士以夔禹之賢而不能兼二事況以庸庸之材而欲兼天下之任可乎故今世不為官擇人而為人擇官惟履踐之多則為大臣不問其治與不治此天下所未能沛然也今天下之士如有自薦或因大臣所舉且試召之使論其事而觀其藴然後命之以職試其所為如此則焉廋哉御史知雜劉述乞假監司之權令察守令狀曰臣甞謂天下守宰如一一得人則和氣可以立召太平可以力致不為難也何以言之朝廷若差除守宰多限以資級不能周知其人善惡及臨事之際方見其才之短長徳之良否耳能周知而習見者必也監司之官乎設有一人其資性既醇謹其持身亦清亷奈何才識短謬不能燭知義理區别淑慝而使之居守宰之任則下得侵其權吏得縱其姦蚩蚩細民受弊而無告矣復有一人狡猾貪汚而能屬託吏胥彌縫上下隂為姦􅂍不見其迹斯二人者人皆知其不可以長民矣而為監司者雖欲發擿而斥逐之而無實状可得且復懼為反噬隠忍而不敢為間或能直以不才貪猥之說聞于朝廷萬一聽而罷黜之旋踵之間則寃愬之聲已聞於上矣醜言巧詆随而加諸朋姦之人互為梯援無幾何則職任復舊矣彼監司者懲其若是既不能有所裨益不若苟簡循黙之為宜也為監司計則得矣為朝廷計則非天下之福也伏望聖慈深鑒此弊少假監司之權使得竭忠悉慮精察守宰有如前所謂二人者為衆所惡當深譴而痛繩之投諸四裔可也終身不齒可也而其事權可不假借之乎監司得其權則郡縣綱紀既舉而民受其賜矣然則監司事權朝廷既假借之則推擇之間不可不審也願陛下深詔政府精選轉運使提㸃刑獄唯人是求不必限以資序即得其人矣可以責之力振風教審覈官吏使弱不勉者不敢怠其職剛暴失中者不敢肆其情農桑勸而孝悌興徭賦均而獄訟息然後間下特㫖令於守宰中擇有豈弟之政吏畏而民愛事状灼然者三兩人宻加薦拔特與増秩賜金使之再任或陞擢任使如此則郡縣有中和之政監司有澄清之功行之不疑當見其効元豐間以司徒致仕富弼論辨邪正上奏曰臣伏䝉聖造擢冠宰司雖􅇍履尚艱稍稽入覲屢得寛告跧跼私門然不敢安居常思當今切務欲伸報塞而事頗紛綜固非筆墨可盡今且以一事最大者仰塵天聽伏惟聖慈更賜裁察夫君臣之道本是一體君者元首也執政者股肱心膂也諫臣御史侍從論思者耳目也内外羣有司者筋肌支節血脉也體若具備方能成人為君者上下之官亦具而無闕方能成國者正如為人之體也人之體一脉不和則為疾矣君之國一官不和則為害矣體之不和為疾最大者股肱心膂也國之不和為害最大者執政也夫執政者輔賛萬機為國大臣日至君前議論天下大事賞善罰惡進賢退不肖喜怒繫乎人情之舒慘邪正繫乎朝廷之盛衰是執政者天下之所觀望羣有司之所師表也執政不和則羣有司安得而和哉群有司不和則萬務安得而治哉萬務不治則天下之民受其弊矣民既受弊則國家衰亂随之此萬萬必然之理也是故為國者欲求治且安非天下人和不可也欲天下和非執政先和不可也執政者乃朝廷教令之所出而天下治亂之所繫也安得不和也尚書臯陶曰同寅協恭和衷哉周武王曰紂有億兆夷人離心離徳予有亂臣十人同心同徳康王曰三后協心同底于道夫三后皆當時聖賢此足見聖賢若不和亦不能同致其道也且夫執政者和則𩔖無猜嫌所論皆合事必極其理盡其善然後行下人固恱服而禀從之承流宣化風動草偃遂使天下䝉其利則豈有不治而安者乎及其至也乃能致昇平而令國家享祚於數百年者矣昔西漢陳平為右相周勃為左相既誅諸吕平以勃功髙遂以右相推勃及平對文帝決獄治粟事有條理勃自知能不如平復推平為右相也唐太宗召宰相房喬以杜如晦能斷大事如晦復謂喬善嘉謀而太宗卒用喬策兹四相者非用心至和以天下為任安肯互相推薦為國逺慮如是其切而不自争勝耶此乃臣前所謂執政者和則致時昇平使國家享祚數百年之明効也若執政者不和則議事之間動有疑貳或忿争於官府或辨列於君前咸蓄不平之心必無至當之論假使强自牽合終成乖戾互相厭苦終致傾擠門下賔朋助為揺撼彼此窺伺是非紛拏忿逞私憾之讎何卹公家之事既行於下人不恱服而不肯禀從淪胥展轉遂至天下受其弊則豈有不衰而亂者乎其甚者至有賈禍召亂為國大患而不可救者矣昔唐憲宗相裴度時方鎮跋扈度勸帝用兵諸道叛亂者悉皆歸服憲宗遂成中興之業王室大振既而悮用李逢吉大姦邪嫉度功業令門下朋黨號八關十六子者興造謗訕百般中傷以至撰作謡䜟謂度有天分憲宗既惑度遂罷去尋致河朔徐汴再陥賊庭王室復弱矣僖宗用鄭畋盧攜為相争黄巢邀請節旄事攜以畋語至切遂拂􅃑投硯而起喧於都下然衆議畋語為是攜議為非時又用宰相王鐸為都統出討黄巢攜大不恱益固執不與巢節旄只授以率府其意欲􅈭黄巢之怒使鐸不成以快己志殊不以天下安危為慮而僖宗不明終用攜議巢果大怒擁衆百萬自嶺表横行天下是時大亂無一州一縣不用兵者俄而兩京陥没僖宗幸蜀生民塗炭之極自古無比久之巢雖漸敗而朱温自巢軍投來終移唐祚自號大梁兹二相者營私徇已用心不公擠陥忠良敗壊時政或翦弱王室或覆亡宗社為臣至此隕族何償此臣前所謂賈禍召亂為國大患而不救者之明效也以此足見執政者和與不和實繫乎天下治亂之本存亡之機也如人股肱心膂之病可以䘮其生也至於諫官御史侍從論思及内外羣有司者亦不可謂其職小而容有不和也苟有不和則如人耳目筋肌支節血脉之疾安得為其小而不治之使和平哉周武王曰紂有臣億萬惟億萬心予有臣三千惟一心夫三千者舉其内外官也成王曰庶官惟和不和政厖禮曰和者天下之逹道也漢劉向亦曰衆賢和於朝則萬物和於野昔賢又以烹調鼎鼐更張琴瑟操執轡馭合煉藥石設於方以為諭者或大或細未有不以和為主也為君者不可不察也不可不審其所擇也夫内外大小之官所以致其不和者何哉止由乎君子小人並處其位也盖君子小人方圎不相入曲直不相投貪㢘進退不相侔動静語黙不相應如此而望議論協和政令平允可得邪安可幸而致邪易泰卦君子道長小人道消則時自泰矣否卦小人道長君子道消則時自否矣若使君子小人並位而處其時之否泰必無兩立之理君子常寡小人常衆則小人必勝君子不勝君子不勝則奉身而退樂道無悶萬一小人不勝則隂相交結互為朋蔽駕虚鼓扇白黑雜揉千岐萬轍眩惑主聽必得其勝而後已小人既勝則益復肆毒梟心虺志無所不為所以自古泰而治世少否而亂世多者亦止乎小人常勝君子常不勝之所致也小人但能亂不能致治若小人或能致治則易更九聖必不於小人道長之時謂之為否也凡六十四卦三百八十四爻大抵諸聖以意象配君子小人而為善惡至多不可悉數也易曰小人不耻不仁不畏不義不見利則不勸不見威則不懲夫小人者聖賢無不鄙而惡之故易曰小人而乘君子之噐盜思奪之矣詩曰憂心悄悄愠於羣小此皆聖賢鄙惡小人之甚者也書曰君子在野小人在位民棄不保天降之咎此謂用小人則民叛而天降災也仲尼曰君子中庸小人反中庸荀子亦曰君子小人相反也夫小人所為既與君子相反戾則安可使之並處哉所議安能得其協和哉夫天子無官爵無職事但能辨别君子小人而進退之乃天子之職也自古稱明王明君明后者無他惟能辨别君子小人而用舍之方為明矣至於煩思慮親細故則非所以用明之要也夫前車者後車之所望也古事者今事之所鑒也仲尼删書於堯舜大禹皆稱曰若稽古傅說戒髙宗亦曰事不師古以克永世匪說攸聞恭惟皇帝陛下禀上聖之資嗣累朝之業纉服未久勤勞已至更望考前世盛衰治亂之迹近代安危存亡之機凡於選求力辨邪正所喜者未可遽用所怒者未可遽棄之禮曰愛而知其惡憎而知其善者是也又人所毁者未必為惡人所譽者未必為善仲尼曰衆惡之必察焉衆好之必察焉者是也孟子尤於進退之說至詳齊宣王問曰吾何以識其不才而捨之孟子對曰國君進賢如不得已将使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之夫一國之人皆曰賢皆曰不可亦不可以謂之出於衆議而不可不從之也孟子尚以謂未可信而進退之猶復躬自察焉直俟王親見其果賢則用之親見其果不可則去之此所以大防姦人朋比毁正譽邪也亦所以防偏見者以丹素甘辛而好惡之差也盖恐用捨或爽則所損多也實慎之至也苟如是而失之者尚恐不免然亦鮮矣陛下君臨天下必不得如孟子之辭盡聞天下所議論若夫左右之說及在廷諸人之語則皆可聞之矣然固未可遽信而遽行更在博詢而參校之也所詢者須詢於可詢者也詢之必不肯誤陛下也若詢及姦險浮薄不正之人則向所謂愛憎毁譽偏見者皆有焉有之則邪正錯亂是非混淆陛下至英至睿亦莫得而辨之也兹事雖自古聖王亦以為至難臯陶曰在知人在安民禹曰惟帝其難之帝謂堯也仲尼獨取堯舜比之如天尚以知人安民為難況自堯而後者哉由是而語陛下可不慎之慎之又慎之大抵有天下者得人則治而安不得人則亂而危至甚則又繫乎存亡也臣前所援據特一二而已但且欲證臣狂瞽非臆說也其有在方策者比比皆是不可殫引陛下開卷則見之矣惟望慎之慎之又慎之也臣昨䝉陛下召從僻左之外起於衰病之中秪是念其舊人授以國柄辭不獲免夙夜驚惶若非傍假衆賢共成大政則臣虚薄老朽立見敗事況夫四海至廣萬機至煩更藉天下之才以濟天下之務所以不避煩瀆之罪願陛下持古鑒今選賢與能者乃犬馬之至誠也惟聖情開納則非臣之幸乃宗廟之慶生靈之福也臣死罪死罪彭汝礪論列樂士宣等奏曰臣伏覩禹戒舜曰慎乃在位帝曰俞禹曰安汝止臣竊惟舜在深山之中聞一善言見一善行沛然行之若決江河堯歴試諸難登陟帝位聦明睿智足以有臨禹猶訓戒之安其好惡之所止盖雖聖人未能無過頼左右正人昌言嘉謀以補闕失恭惟陛下聽政之初與大臣論大行太皇太后盛徳自古無也諡法數字豈能盡有以知陛下以儉素為髙行以愛民為先務權知開封府錢勰持䟽決上前陛下乃問災傷審盜賊詢禁繫有以知陛下明治道之大體吏部侍郎引見改官選人内有決殺人者乃命展一任有以知陛下存好生之徳意聖語一出疾於郵置之傳中外臣庶罔不恱服實社稷之長福天下之至願也近聞樞宻院劄子發遣左藏庫副使京東西路都監樂士宣供備庫副使滑州管勾浮橋黄經左藏庫副使催促装缷石叚王臨西京左藏庫副使山陵修奉所勾當蘇珪等赴闕並特與入内内侍省東頭供奉官寄資供職方陛下獨覽萬機九州四海羣黎百姓拭目傾耳以俟陛下之施為以窺陛下之好惡宫闈洒掃之臣内外侍省豈乏是哉臣俯伏思惟明道年中章獻明肅皇后上仙七日仁宗皇帝召見李廸起復章得衆聽政五日詔内外毋得進獻以祈恩澤及縁親戚以通章表若𫝊宣有司實覆奏内降除官及與差遣即未得行裁抑僥倖中外大恱未御正殿召宋綬于河南還范仲淹于重州黜内侍江徳明羅崇勲等于外仁宗臨治之始能安其好惡之所止動則天下丕應在位四十二年以昭受上帝之休陛下勉聽羣臣之請躬臨正宁未聞褒召賢徳旌顯端士亟還頗僻已試之内臣非所以示美徳於天下臣竊為陛下惜陛下留神大禹戒舜之言若稽仁祖聽治之意令士宣等各歸本任仲虺稱湯之徳曰改過不吝故能聖敬日躋為百世之盛王惟陛下財擇幸甚臣謬職從官與侍經幄茍有所見豈宜緘黙僭冒上陳冀聖徳萬一之助臣無任惶懼戰越待罪之至謹録奏聞汝礪再論列樂士宣狀奏曰臣今月初五日論列樂士宣等事理未聞指揮施行臣俯伏惟念大行太皇太后奄棄大養陛下初攬政事唯登進正直斥逺姦邪講求國弊咨究民瘼是朝廷之先務天下之願望也陛下曾未及此亟召士宣等赴闕及王穀之徒入内殆非仁宗皇帝聽政家法中外臣庶為之太息陛下好惡之端輕發於此纎猾小人将投間而亂政此天下治亂之幾社稷安危之漸不可不深思而熟計之臣所以不避鉞斧之誅冒聞天聽書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道伏望聖慈特留睿念廣堯帝捨已從人之量虚商湯從諌弗咈之心早賜指揮檢㑹臣前奏付外施行臣不勝大願干冒宸嚴臣無任惶懼戰越待罪之至元豐元年知樞宻院事吕公著乞選用前日議論之人不終遺棄上奏曰臣聞臯陶陳謨以知人為難孟子論道以知言為要所謂知人則哲能官人何憂乎驩兜何畏乎巧言令色孔任者知人也詖辭知其所蔽滛辭知其所陥邪辭知其所離遁辭知其所窮者知言也故曰帝王之徳莫大乎知人而成敗之機在於察言是以堯舜在上明目逹聦詢四岳以難任人命納言以堲讒說使惡直醜正者不能亂天下之俗服讒蒐慝者不能遷人主之意然後四門穆穆而朝廷清明權歸於上而天下無事臣向䝉陛下擢在樞府中謝曰不敢􅈁陳細務輙論及判别忠邪之道甞謂陛下勵精為治十年不懈小大政事日欲增葺而朝廷之間邪説尚勝大抵小人之害君子必求要切之語以中之使之不能自解方朝廷修改法度之初凡在朝野孰無論議陛下聖度兼包豈嘗記録而小人賊害指目未已茍昔有異同之論而今不為言者所容則必指以為沮壊法度之人不可復用非陛下加意省察則端人良士𩔖遭排格當時粗陳此語陛下頗賜開納近日除顧臨開封府推官程顥判武學縉紳聞之皆以為顥昔任御史嘗有所言陛下不以為過有稍用之意朝廷用人不終遺棄必料傳之四方士人無不欣仰然命下數日復因言者而罷去則知臣前所陳者其風猶未殄也臣實不佞嘗為一二識者私道陛下盛徳竊以為陛下春秋鼎盛履崇髙之位操生殺之柄而記人之功忘人之過極天地山海之量此羣下以愛戴而人人願立於朝也小大之臣雖姦囬頗僻如鄧綰者猶降責不踰年遽復侍從授以方面則是盛明之世本無棄絶之人邪正賢不肖亦未易以一言而定也臣愚以謂今日公卿士夫嘗於朝廷法令有所可否然其愛君許國之心愈久而益明者甚衆其唱和雷同承迎附㑹而姦言汙行卒為陛下所照者盖亦不少然則人固未易知而士亦不可忽也況如顥者陛下早自知之其立身行已素有本末講學論議久益䟽通且其在於言路之日時有論列皆辭意忠厚不失臣子之體使得復見用於聖世其奮身報國未必在時軰之後兼所除武學差遣亦未為仕宦之要津而小人斷斷必以為不可者直欲深梗正路廣沮善人其所措意非特一二人而已臣區區所慮者䜛說殄行之徒日以熾盛則守正向公之士愈難自立其於聖政不為無損臣受恩與常人不同茍有所當言不敢顧避緘黙以負陛下優遇惟陛下幸察歴代名臣奏議卷一百五十四
