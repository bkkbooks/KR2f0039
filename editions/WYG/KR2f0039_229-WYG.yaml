body:
  text: 歴代名臣奏議卷二百二十九明楊士竒等撰征伐後魏宣武帝初祕書令程駿上表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恒弑君宣尼請討雖欲晏逸其得已乎今廟筭天囘七州雲動將水蕩鯨鯢陸掃凶逆然戰貴不陳兵家所美宜先遣劉昶招喻淮南若應聲響悅同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸茍江南之輕薄背劉氏之恩義則曲在彼矣何負神明哉直義檄江南振旅囘斾亦足以示救患之大仁揚義風於四海且攻難守易則力懸百倍不可不深思不可不熟盧今天下雖謐方外猶虞拾夤僥倖於西南强敵伺釁於漠北脫攻不稱心恐兵不卒解兵不卒解則憂慮逾深夫爲社稷之計者莫不先於守本臣愚以爲觀兵江滸振曜皇威宜特加撫慰秋毫無犯則民知德信民知德信則襁負而來襁負而來則淮北可定淮北可定則吳寇異圖宼圖異則祸釁出然後觀釁而動則不晚矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英筭神規彌綸百勝之外應機體變獨悟方寸之中臣影頺虞淵昏耄將及雖思憂國終無云補不從宣武帝即位齊蕭寳卷遣將軍陳伯之冦淮南司徒彭城王勰鎮夀春以拓跋英爲鎮南將軍率衆討之英未至賊已引退勰還詔英行揚州後英還京師上表曰臣聞取亂侮亡有國之常道陳師鞠旅因機而致𤼵竊以區區寳卷罔顧天常凴恃山河敢抗中國今妖逆數亡驕縱日甚威侮五行怠棄三正淫刑以逞虐害無辜其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衞此則皇天授我之日曠載一逢之秋事易走丸理同拾芥此而不乘將欲何待臣乞躬率步騎三萬直指沔隂據襄陽之城㫁黑水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵其路旣近不盈五百則三楚之地一朝可收岷蜀之道自成㫁絶又命揚徐二州聲言俱舉縁江焚毁靡使所遺建業窮蹙魚遊釡内士治之師再興孫皓之縛重至齊文軌而大同混天地而爲一伏惟陛下暫闢旒纊少垂聽覽獨決聖心無取疑議此期脫爽并吞未日事寢不報英又奏曰臣聞乘虚討弱事在速舉因危攻昧徼捷可期今寳卷亂常骨肉相賊蕃戍鼎立莫知所歸義陽孤絶宻邇天境外靡粮援之期内無兵儲之固此乃臨焚之鳥不可去薪授首之寇何容緩斧若此行有果則江右之地斯爲經略之基如脫否也非直後舉難圖亦或居要生疾今豫州刺史司馬悅已戒嚴垂邁而東豫州刺史田益宗方擬守三關請遣軍司爲之節度世宗遣直寢羊靈引爲軍司以軍功拜吏部尚書以前後軍功進爵常山侯時車騎大將軍涼州大中正源懐奏曰南賊遊魂江揚職爲亂逆肆厥淫昏月滋日甚貴臣重將靡有孑遺崇信姦回昵比閹豎内外離心骨肉猜叛蕭寳融僣號於荆郢其雍州刺史蕭衍勒兵而東襲上流之衆已逼其郊廣陵京口各持兵而懷兩望鍾離淮隂並鼎峙而觀得失秣陵孤危制不出門君子小人並罹灾禍延首北望朝不及夕斯實天啓之期吞并之㑹乘厥蕭墻之釁藉其分崩之隙東據歴陽兼指𤓰步縁江鎮戍達於荆郢然後奮雷電之威布山河之信則江西之地不刃自來吳㑹之鄉指期可舉昔士治有言皓若暴死更立賢主文武之官各得其任則勍敵也若蕭衍克就上下同心非直後圖之難實亦揚境危逼何則夀春之去建鄴七百而已山川水陸彼所諳利脫江湘無波君臣效職藉水憑舟倐忽而至夀春容不自保江南將若之何今寳卷邑居有土崩之形邊城無繼援之兆清蕩江區實在今日臣受恩旣重不敢不言帝命大將軍髙肇伐蜀肇諫曰臣聞逺人不服則修文德以來之兵者凶器不得已而後用當今治雖太平論征未可何者山東關右殘傷未復頻年水旱百姓空虛宜在安靜不宜勞役然往昔開拓皆因城主歸款故有征無戰今之據者雖假官號真偽難分或有怨於彼不可全信且蜀之地險隘稱之自古鎮戍晏然更無異趣豈得虚承浮說而動大軍舉不慎始悔將何及討蜀之略願俟後圖梁秦二州刺史邢巒表曰揚州成都相去萬里陸途旣絶唯資水路蕭衍兄子淵藻去年四月十三日發揚州今歳四月四日至蜀水軍西上非周年不達外無軍援一可圖也益州頃因劉季連反叛鄧元起攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是羣劇少年未洽治務及至益州便戮鄧元起曹亮宗臨戎斬將則是駕馭失方范國惠津渠退敗鏁執在獄今之所任並非宿將重名皆是左右少年而已旣不厭民望多行殘暴民心離解三可圖也蜀之所恃唯劍閣今旣剋南安已奪其險據彼界内三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維爲佐鄧艾旣出綿竹彼即投降及苻堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓温西征不旬月而平蜀地昔來恒多不守況淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脱軍剋涪城淵藻復何宜城中坐而受困若其出鬪庸蜀之卒唯便刀矟弓箭至少假有遥射弗至傷人五可圖也臣聞乘機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐阼之初夀春馳款先歳命將義陽剋闢淮外謐以風清荆沔於焉肅晏方欲偃甲息兵候機而動而天賛休明時來斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇拔臣以不才屬當戎寄内省文吏不以軍謀自許指臨漢中惟規保疆守界事屬艱途東西寇竊上憑國威下仗將士邊帥用命頻有薄㨗藉勢秉威經度大劍旣剋南安據彼要險前軍長邁已至梓潼新化之民飜然懷惠瞻望涪益旦夕可屠正以兵少粮匱未宜前出爲爾稽緩懼失民心則更爲寇今若不取後圖便難輒率愚管庶㡬殄剋如其無功分受憲坐且益州殷實戸餘十萬比夀春義陽三倍非匹可乘可利實在于茲若朝廷志存保民未欲經略臣之在此便爲無事乞歸侍養㣲展烏鳥詔曰若賊敢闚􅎿觀機剪撲如其無也則安民保境以悅邊心平蜀之舉更聽後勅方將席卷岷蜀電掃西南何得辭以戀親中途告退宜勗令圖務申髙畧巒又表曰昔鄧艾鍾㑹率十八萬衆傾中國資給裁得平蜀所以然者鬭實力故也況臣才絶古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可剋今王足前進已逼涪城旣得涪城則益州便是成擒之物但得之有早晚耳梓潼已附民户五萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬五千所增無㡬又劍閣天險古來所稱張載銘云世亂則逆世清斯順此之一言良可惜矣臣誠知征戎危事不易可爲自軍度劍閣以來鬢髪中白憂慮戰懼寧可一日爲心所以勉彊者旣得此地而自退不守恐辜先皇之恩遇負陛下之爵禄是以孜孜頻有陳請且臣之意筭正欲先圖涪城以漸而進若剋涪城便是中分益州之地㫁水陸之衝彼外無援軍孤城自守復何能持乆哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大剋不得則自全又巴西南鄭相離一千四百去州迢逓恒多生動昔在南之日以其綂綰勢難故曽立巴州鎮静夷獠梁州藉利因而表罷彼土民望嚴蒲何揚非唯五三族落雖在山居而多有豪右文學箋啓往往可觀冠帶風流亦爲不少但以去州旣遠不能仕進至於州綱無由廁迹巴境民豪便是無梁州之分是以鬱怏多生動靜比建議之始嚴𤣥思自號巴州刺史剋城以來仍使行事巴西廣袤一千户餘四萬若復立州鎮攝華獠則大帖民情從墊江已還不復勞征自爲國有世宗不從時中山王英乘勝攻鍾離詔尚書邢巒帥衆㑹之巒又表曰奉被詔㫖令臣濟淮與征南掎角乘勝長驅實是其㑹但愚懷所量竊有未盡夫圖南因於積風伐國在於資給用兵治戎須先計校非可抑爲必敗幸其無能若欲掠地誅民必應萬勝如欲攻城取邑未見其果得之則所益未幾不獲則虧損必大蕭衍傾竭江東爲今歳之舉疲兵喪衆大敗而還君臣失計取笑天下雖野戰非人敵守城足有餘今雖攻之未易可剋又廣陵懸遠去江四十里鍾離淮隂介在淮外假其歸順而來猶恐無粮艱守況加攻討勞兵士乎且征南軍士從戎二時疲弊死病量可知已雖有乘勝之資懼無遠用之力若臣之愚見謂宜修復舊戍牢實邊方息養中州擬之後舉又江東之釁不患乆無畜力待機謂爲勝計詔曰濟淮掎角事如前勅何容猶爾盤桓方有此請可速進軍經畧之宜聽征南至要巒又表曰蕭衍侵境乆勞王師今者奔走實除邊患斯由靈贊皇魏天敗寇豎非臣等弱劣所能剋勝若臣之愚見今正宜修復邉鎮俟之後動且蕭衍尚在凶身未除螳蜋之志何能自息唯應廣備以待其來實不宜勞師遠入自取疲困今中山進軍鍾離實所未解若能爲得失之計不顧萬全直襲廣陵入其内地出其不備或未可知正欲屯兵蕭宻餘軍猶自在彼欲言無粮運船復至而欲八十日粮圖城者臣未之前聞且廣陵任城可爲前戒豈容今者復欲同之今若往也彼牢城自守不與人戰城壍水深非可塡塞空坐至春則士自斃若遣臣赴彼粮何以致夏來之兵不齎冬服脫遇氷雪取濟何方臣寧荷怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有内應則所不知如其無也必無剋狀若其不復其辱如何若信臣言也願賜臣停若謂臣難行求回臣所領兵綂悉付中山任其處分臣求單騎隨逐東西且俗諺云耕則問田奴絹則問織婢臣雖不武忝備征將前宜可否頗實知之臣旣謂難何容彊遣孝明帝時襄威將軍李苖上書曰昔晉室數否華戎鼎沸三燕兩秦咆勃中夏九服分崩五方圮裂皇祚承歴自北而南誅滅姦雄定鼎河洛唯獨荆揚尚阻聲教今令德廣被於江漢威風遠振於吳楚國富兵强家給人足以九居八之形有兼弱攻昧之勢而欲逸豫遺疾子孫違髙祖之本圖非社稷之深慮誠宜商度東西戍防輕重之要計量疆埸險易安危之理探測南人攻守窺覦之情籌筭卒乘器械征討之備然後去我所短避彼所長釋其至難攻其甚易奪其險要割其膏壌數年之内荆揚可并若捨舟檝即平原斂後疎前則江淮之所短棄車馬游飛浪乘流馳逐非中國之所長彼不敢入平陸而争衡猶我不能越巨川而趣利若俱去其短各恃其長則東南未見可滅之機而淮沔方有相持之勢且夫滿昃相傾隂陽恒理盛衰逓襲五德常運今以至彊攻至弱必見吞并之理如以至弱禦至彊焉有全濟之術故明王聖主皆欲及時立功爲萬世之業去髙而就下百川以之常流取易而避難兵家以之恒勝今巴蜀孤懸去建業遼遠偏兵獨戍泝流十千牧守無良專行刼剥官由財進獄以貨成士民思化十室而九延頸北望日覬王師若命一偏將弔民伐罪風塵不接可傳檄而定守白帝之阨據上流之險循士治之迹蕩建業之逋然後偃武修文制禮作樂天下幸甚豈不盛哉孝明帝正光末二秦反叛侵及三輔時承平旣乆民不習戰襄威將軍李苖以隴兵彊悍且羣聚無資又上書曰臣聞食少兵精利於速戰粮多卒衆事宜持乆今隴賊猖狂非有素蓄雖據兩城本無德義其勢在於疾攻日有降納遲則人情離阻坐受崩潰夫飆至風起逆者求萬一之功髙壁深壘王師有全制之䇿但天下乆泰人不曉兵奔利不相待逃難不相顧將無法令士非教習以憍帥御惰卒不思長乆之計務竒正之通必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則二秦遂彊三輔危弱國之右臂於斯廢矣今且宜勒大將深溝髙壘堅守勿戰别命偏師精兵數千出麥積崖以襲其後則汧岐之下羣妖自散於是詔苖爲綂軍北齊昭帝皇建元年中庶子盧叔虎請伐周曰人衆敵者當任智謀智謀鈞者當任勢力故彊者所以制弱富者所以兼貧今大齊之比關西彊弱不同貧富有異而戎馬不息未能吞并此失於不用彊富也輕兵野戰勝負難必是胡騎之法非深謀遠算萬全之術宜立重鎮於平陽與彼蒲州相對深溝髙壘運粮積甲築城戍以屬之彼若閉關不出則取其黄河以東長安窮蹙自然困死如彼出兵非十萬以上不爲我敵所供糧食皆出關内我兵士相代年别一畨榖食豐饒運送不絶彼來求戰我不應之彼若退軍即乘其弊自長安以西民距城遠敵兵來往實有艱難與我相持農作且廢不過三年彼自破矣後主武平初開府儀同三司王紘上言突厥與宇文男來女往必當相與影響南北寇邊宜選九州中男彊弩多據要險之地伏願陛下哀忠念舊愛孤恤寡矜愚嘉善舎過記功敦骨肉之情廣寛仁之路思堯舜之風慕禹湯之德克己復禮以成美化天下幸甚後周武帝建德四年志在平齊鄖國公韋孝寛上疏陳三䇿其一曰臣在邊積年頗見間隙不因際㑹難以成功是以往歳出軍徒有勞費功績不立内失機㑹何者長淮之南舊爲沃土陳氏以破亡餘燼猶能一舉平之齊人歴年赴救喪敗而反内離外叛計盡力窮傳不云乎讎有釁焉不可失也今大軍若出軹關方軌而進兼與陳氏共爲掎角并令廣州義旅出自三鵶又募山南驍銳沿河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募關河之外勁勇之士厚其爵賞使爲前驅岳動川移雷駭電激百道俱進並趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其二曰若國家更爲後圖未即大舉宜與陳人分其兵勢三鵶以北萬春以南廣事屯田預爲貯積募其驍悍立爲部伍彼旣東南有敵戎馬相持我出竒兵破其疆埸彼若興師赴援我則堅壁清野待其去遠還復出師常以邊外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境熬然不勝其弊以此而觀覆亡可待然後乘間電掃事等摧枯其三曰竊以大周土宇跨據關河蓄席卷之威持建瓴之勢太祖受天明命與物更新是以二紀之中大功克舉南清江漢西戡巴蜀塞表無虞河右底定唯彼趙魏獨爲榛梗者正以有事三方未遑東略遂使漳􅇭遊魂更存餘晷昔勾踐亡吳尚期十載武王取亂猶煩再舉今若更存遵養且復相時臣謂宜還崇隣好申其盟約安人和衆通商惠工蓄銳養威觀舋而動斯則長䇿遠馭坐自兼并也武帝建德四年鮑宏爲麟趾殿學士帝嘗問宏取齊之䇿宏對云我彊齊弱不相侔齊主昵近小人政刑日紊至尊仁惠慈恕法令嚴明事等建瓴何憂不剋但先皇往日出師雒陽彼有其備毎不剋㨗如臣計者進兵汾潞直掩晉陽出其不虞似爲上䇿帝從之帝謀伐齊命邊鎮益儲峙加戍卒齊人聞之亦増守禦柱國于翼諫曰疆埸相侵互有勝負徒損兵儲無益大計不如解嚴繼好使彼懈而無備然後乘間出其不意一舉可取也上從之時詔伐齊將出河陽内史上士宇文㢸諫曰齊雖無道藩鎮有人今出師河陽精兵所聚恐難得志如出汾曲戍小山平則攻之易拔矣民部中大夫趙煚曰河南洛陽四面受敵縱得之不可守請從河北直指太原傾其巢穴可一舉而定開府驃騎將軍宇文忻從武帝伐齊攻拔晉州齊後主親馭六軍兵勢甚盛帝憚之欲旋師忻諫曰以陛下之聖武乘敵人之荒縱何往不克若使齊人更得令主君臣恊力雖湯武之勢未易平也今主暗臣愚兵無鬭志雖有百萬之衆實爲陛下奉耳帝從之戰遂大克及帝攻陷并州先勝後敗帝爲賊所窘左右皆殱帝挺身而遁諸將多勸帝還忻勃然而進曰自陛下克晉州破髙緯乘勝逐北以至於此致令僞主奔波關東響振自古行兵用師未有若斯之盛也昨日破城將士輕敵㣲有不利何足爲懷丈夫當死中求生敗中取勝今者破竹其勢已成奈何棄之而去帝納其言明日復戰遂拔晉陽隋文帝開皇七年問取陳之䇿於髙熲熲對曰江北田收差晚江南水田早熟量彼收穫之際㣲徴士馬聲言掩襲彼必屯兵守禦廢其農時彼旣聚兵我便解甲再三如此彼以爲常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍江南土薄舎多茅竹儲積皆非地窖當宻遣人因風縱火待彼修立復更燒之不出數年財力俱盡矣帝用其䇿陳人始困時光州刺史髙勱上取陳五䇿又上表曰臣聞夷凶剪暴王者之懋功取亂侮亡徃賢之雅誥是以苖民逆命爰興兩階之舞有扈不賔終召六師之伐皆所以寧一㝢内匡濟羣生者也自昔晉氏失馭天綱絶維羣兇於焉蝟起三方因而鼎立陳氏乘其際運拔起細㣲蒨頊縱其長蛇竊據吳㑹叔寳肆其昏虐毒被金陵數年已來荒悖滋甚牝雞伺旦昵近姦回尚方役徒積骸千數疆埸防守長戍三年或㣲行暴露沈湎王侯之宅或奔馳駿騎顛墜康衢之首有功不賞無辜獲戮烽燧日警未以爲虞耽淫靡嫚不知紀極天厭亂德妖實人興或空裏時有大聲或行路共傳鬼怪或刳人肝以祠天狗或自捨身以厭妖訛民神怨憤災異洊發天時人事昭然可知臣以庸才猥䝉朝寄頻歴藩任與其隣接宻邇仇讎知其動靜天討有罪此即其時若戎車雷動戈船電邁臣雖駑怯請效鷹犬髙祖覽表嘉之荅以優詔時虢州刺史崔仲方上書論取陳之䇿曰臣謹案晉太康元年歳在庚子晉武平吳至今開皇六年歳次丙午合三百七載春秋寳乾圖云王者三百年一蠲法今三百之期可謂備矣陳氏草竊起於丙子至今丙午又子午爲衝隂陽之忌昔史趙有言曰陳顓頊之族爲水故歳在鶉火以滅又云周武王克商封胡公滿於陳至魯昭公九年陳災禆竈曰歳五及鶉火而後陳亡楚剋之楚祝融之後也爲火正故復滅陳陳承舜後舜承顓頊雖太歳左行歳君右轉鶉火之歳陳族再亡戊午之年嬀虞運盡語迹雖殊考事無别皇朝五運相承感火德而王國號爲隋與楚同分楚是火正午爲鶉火未爲鶉首申爲實沈酉爲大梁旣當周秦晉趙之分若當此分發兵將得歳之助以今量古陳滅不疑臣謂午未申酉並是數極盖聞天時不如地利地利不如人和況主聖臣良兵彊國富動植迴心人神叶契陳旣主昏於上民讟於下險無百二之固衆非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謨但芻蕘所見兾申螢爝今唯須武昌已下蘄和滁方吳海等州更帖精兵宻營渡計益信襄基郢等州速造舟楫多張形勢爲水戰之具蜀漢二江是其上流水路衝要必争之所賊雖流頭荆門延洲公安巴陵𨼆磯夏首蘄口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非德無以爲固徒有三吳百越之兵無恩不能自立上覽而大悅煬帝大業八年帝親伐遼東合水令庾質徴詣行在所至臨渝謁見帝謂質曰朕承先㫖親事髙麗度其土地人民纔當我一郡卿以爲剋不質對曰以臣管窺伐之可剋切有愚見不願陛下親行帝作色曰朕今總兵至此豈可未見賊而自退也質又曰陛下若行慮損軍威臣猶願安駕住此命驍將勇士指授規模倍道兼行出其不意事宜在速緩必無功帝不悅曰汝旣難行可住此也及師還授太史令九年復征髙麗又問質曰今後復如何對曰臣實愚迷猶執前見陛下若親動萬乘麋費實多帝怒曰我自行尚不能剋直遣人去豈有成功也帝遂行旣而禮部尚書楊𤣥感據黎陽反兵部侍郎斛斯政奔髙麗帝大懼遽而西還謂質曰卿前不許我行當爲此耳唐髙祖時議討王世􅂶判農圃監大理司直韋雲起上言京師初平人未堅附百姓流離仍歳無年盩厔司竹藍田谷口盜賊羣屯京都椎剽乘夜竊發重以梁師都嫁情北部隂計内鈔爲腹心患釋此不圖而窺兵函洛姦人乘虚一旦有變禍且不細臣愚以爲不若戢兵務農須關中妥安士氣餘飽然後議討伐一舉可定從之太宗爲秦王時宋金剛戰敗北走王乘勝逐北一晝夜行二百里戰數十合總管劉𢎞基諫曰大王逐北深入不已不愛身乎且士卒飢乏宜留壁於此俟兵糧畢集復進未晚也王曰金剛計窮而走衆心離沮功難成而易敗機難得而易失必乘此勢取之若更淹留使之計立備成不可復攻矣吾竭忠徇國豈顧身乎遂䇿馬而進將士不敢復言秦王以薛收判陜東大行臺金部郎中是時方討王世充竇建徳來援諸將爭言斂軍以觀賊形勢收獨曰不然世􅂶居東都府庫盈衍其兵皆江淮選卒正苦乏食爾是以求戰不得爲我所持今建德身總衆以來必飛轂轉糧更相資哺兩賊連固則伊洛勝負未可歳月定也不若勒諸將嚴兵締壘浚其溝防戒毋出兵大王親督精銳據成臯厲兵按甲邀建德路彼以疲老當吾堂堂之鋒一戰必舉不旬日二賊可縛致麾下矣王曰善遂禽建德降世􅂶貞觀初嶺南諸州奏言髙州酋帥馮盎談殿阻兵反叛詔將軍藺謩發江嶺數十州兵討之祕書監魏徴諫曰中國初定瘡痍未復嶺表瘴癘山川阻深兵遠難繼疾疫或起若不如意悔不可追且馮盎若反即須及中國未寧交結遠人分兵㫁險要破掠山縣署置官司何因告來數年兵不出境此則反形未成無容動衆陛下旣未遣使人就彼觀察即來朝謁恐不見明今若遣使分明曉諭必不勞師旅自致闕庭太宗從之嶺表悉定侍臣奏言馮盎談殿徃年恒相征伐陛下發一單使令嶺外恬然太宗曰初嶺南諸州盛言盎反朕必欲討之魏徴頻諫以爲但懷之以德必不討自來旣從其計遂得嶺表無事不勞而定勝於十萬之師乃賜魏徴絹伍百匹貞觀四年有司上言林邑國蠻表疏不順請發兵討擊太宗曰兵者凶器不得已而用之故漢光武云每一發兵不覺頭鬚爲白自古以來窮兵極武未有不亡者也苻堅自恃兵彊欲必吞晉室興兵百萬一舉而亡隋主亦欲必取髙麗頻年勞役人不勝怨死於匹夫之手至如頡利往歳數來侵我國家部落疲於征役遂至滅亡朕今見此豈得輒即發兵但經歴山險土多瘴癘若我兵士疾疫雖克剪此蠻亦何所補言語之間何足介意竟不討之十七年上欲自討遼東諫議大夫禇遂良曰陛下之兵度遼而克固善萬分一不得逞師必再興再興爲忿兵安危不可測兵部尚書李勣曰不然曩薛延陀盜邊陛下欲追擊魏徴苦諫而止向若擊之一馬不生返後復畔擾至今爲恨帝曰誠然但一慮之失而尤之後誰爲我計者帝意遂決東遂良懼上言臣請譬諸身兩京腹心也四境手足也殊裔絶域殆非支體所屬髙麗王陛下所立莫離支殺之討其逆夷其地固不可失但遣一二慎將付銳兵十萬翔旝雲輣唾手可取昔侯君集李靖皆庸人爾猶能撅髙昌纓突厥陛下止發蹤指示得歸功聖明前日從陛下平天下虓士爪臣氣力未衰可驅䇿惟陛下所使臣聞涉遼而左或水潦平地淖三尺帶方𤣥莬海壤荒漫決非萬乘六師所宜行是時帝銳意蕩平不見省十八年太宗以髙麗莫離支賊殺其主殘虐其下議將討之諫議大夫禇遂良進曰陛下兵機神筭人莫能知昔隋末亂離克平冦難及北狄侵邊南蠻失禮陛下欲命將擊之羣臣莫不苦諫惟陛下明畧獨㫁卒並誅夷今聞陛下將伐髙麗意皆熒惑然陛下神武英聲不比周隋之主兵若渡遼事須剋㨗萬一不獲無以示威遠方必更發怒再動兵衆若至於此安危難測太宗然之太宗將親征髙麗開府儀同三司尉遲敬德奏言車駕若自往遼左皇太子又監國定州東西二京府庫所在雖有鎮守終是空虚遼東路遥恐有𤣥感之變且邊隅小國不足親勞萬乗若剋勝不足爲武儻或不勝恐爲所笑伏請委之良將自可應時摧滅太宗雖不從其諫爲識者是之太宗謂侍臣曰盖蘇文弑其主而奪其國政誠不可忍今日國家兵力取之不難朕未能即動兵衆且令契丹靺羯擾攪之何如房𤣥齡曰臣聞古之列國無不彊陵弱衆暴寡今陛下撫養蒼生將士勇銳力有餘而不取之所謂止戈爲武者也昔漢武帝屢伐匈奴隋後主三征遼左人貧國敗實此之由惟陛下詳察太宗曰善二十二年將重討髙麗是時司空房𤣥齡寢疾増劇而謂子曰當今天下清謐咸得其宜惟欲再討髙麗方爲國害主上含怒意決臣下莫敢犯顔吾乃知而不言可謂銜恨入地遂上表諫曰臣聞兵惡不戢武貴止戈當今聖化所覃無遠不暨上古所不臣者陛下皆能臣之所不制者陛下皆能制之詳觀古今爲中國患害無過突厥遂能坐運神䇿不下殿堂大小可汗相次束手分典禁衛執㦸行間其後延陀䲭張㝷就夷滅鉄勒慕義請置州縣沙漠已北萬里無塵至如髙昌叛換於流沙吐渾首鼠於積石偏師薄伐俱從平蕩髙麗歴代逋誅莫能討擊陛下責其逆亂殺主虐人親總六軍問罪遼碣未經旬日即拔遼東前後虜獲數十萬計分配諸州無處不滿雪徃代之宿恥掩崤陵之枯骨比功校德萬倍前王此聖主之所自知㣲臣安敢備說且陛下仁風被於率土孝德彰於配天覩殘㓂之將亡則指期數歳授將帥之節度則決機萬里觀風雲氣候視景而望書符應若神筭無遺䇿擢將於行伍之間取士於凡庸之末遠夷單使一見不忘小臣之名未嘗再問箭穿七扎弓貫六鈞加以留情典墳屬意篇什筆邁鍾張辭窮賈馬文鋒既振則宫徴自諧輕翰蹔飛則花葩競發撫萬民以慈遇羣臣以禮褒秋毫之善解吞舟之網逆耳之諫必聽膚受之愬斯絶好生之德禁障塞於江湖惡殺之仁息鼓刀於屠肆鳬鶴荷稻粱之惠犬馬䝉帷盖之恩降尊吮思摩之瘡登堂臨魏徴之柩哭戰亡之卒則哀動六軍負填道之薪則情感天地重黔黎之大命特盡心於庶獄今臣心識昏憒豈足論聖功之深遠談天德之髙大哉陛下兼衆美而有之靡不備具㣲臣深爲陛下惜之重之愛之寳之周易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡而不失其正者其惟聖人乎由此言之進有退之義存有亡之基得是喪之理老臣所以爲陛下惜之者盖謂此也老子曰知足不辱知止不殆臣謂陛下威名功德亦已足矣拓地開疆亦可止矣彼髙麗者邊夷賤𩔖不足待以仁義不可責以常禮古來以魚鱉畜之宜從闊畧若必欲絶其種𩔖深恐獸窮則搏且陛下每決死囚必令三復五奏進素食停音樂者盖以人命所重感動聖慈也況今兵士之徒無一罪戾無故驅之於戰陣之間委之於鋒刄之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望轊車而掩泣抱枯骨而摧心足以變動隂陽感傷和氣實天下之寃痛也且兵凶器戰危事不得已而用之向使髙麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也乆長能爲中國患而陛下除之可也有一於此雖日殺萬夫不足爲愧今無此三條坐煩中國内爲舊主雪怨外爲新羅報讎豈非所存者小所損者大伏願陛下遵皇祖老子止足之戒以保萬代巍巍之名發沛然之恩降寛大之詔順陽春以布澤許髙麗以自新焚淩波之船罷應募之衆自然華夷慶賴遠肅邇安臣老病三公朝夕入地所恨竟無塵露㣲增海嶽謹罄殘魂餘息豫代結草之誠儻䝉録此哀鳴即臣死且不朽太宗見表歎曰此人危篤如此尚能憂我國家雖諫不從終爲善䇿貞觀十九年伐髙麗白巖城復請降上將受之李世勣諫曰士卒所以爭冒矢石不顧其死者貪虜獲耳今城垂拔奈何更受其降孤戰士之心上下馬謝曰將軍言是也然縱兵殺人而虜其妻孥朕所不忍將軍麾下有功者朕以軍物賞之庶因將軍贖此一城世勣乃退上受其降二十一年上將復征髙麗朝議以爲髙麗依山爲城攻之不可猝拔前大駕親征國人不得耕種大半乏食今若遣偏師更迭擾其疆埸使彼疲於奔命釋耒入堡數年之間千里蕭條則人心自離鴨緑以北可不戰而取矣上從之髙宗龍朔元年大募兵拜置諸將天子欲自行蔚州刺史李君球建言髙麗小醜何至傾中國事之有如髙麗既滅必𤼵兵以守少𤼵則威不振多𤼵則人不安是天下疲於轉戍臣謂征之未如勿征滅之未如勿滅亦會武后苦邀帝乃止乾封中詔伐髙麗及侍御史賈言忠計事還帝問軍中云何對曰必克昔先帝問罪所以不得志者虜未有舋也諺云軍無媒中道回今男生兄弟䦧狠爲我鄉導虜之情僞我盡知之將忠士力臣故曰必克且髙麗祕記曰不及九百年當有八十大將滅之髙氏自漢有國今九百年李勣年八十矣虜仍洊飢人相掠賣地震裂狼狐入城蚡穴於門人心危駭是行不再舉矣儀鳳三年上將討新羅侍中張文瓘臥疾在家自輿入諫曰今吐蕃爲寇方發兵西討新羅未嘗犯邊若又東征臣恐公私不堪其弊上乃止時蘇定方討賀魯中郎將薛仁貴上疏曰臣聞兵出無名事故不成明其爲賊敵乃可服今泥熟不事賀魯爲其所破虜係妻子王師有於賀魯部落轉得其家口者宜悉取以還厚加賚遣使百姓知賀魯爲暴而陛下至德也帝納之遂還其家屬泥熟請隨軍効死武后時將仕郎守麟臺正字陳子昂諫雅州討生羌書曰臣子昻昧死上言竊聞道路云云國家欲開蜀山自雅州道入討生羌因以襲擊吐蕃執事者不審圖其利害遂發梁鳳巴蜒兵以徇之臣愚以爲西蜀之祸自此結矣臣聞亂之生必由怨雅州邊羌自國初已來未嘗一日爲盜今一旦無罪受戮其怨必甚怨甚懼誅必蜂駭西山西山盜起則蜀之邊邑不得不連兵備守兵乆不解則蜀之祸搆矣昔後漢末西京喪敗盖由此諸羌此一事也且臣聞吐蕃桀黠之虜君長相信而多姦謀自敢抗天誅爾來向二十餘載大戰則大勝小戰則小勝未嘗敗一隊亡一卒國家往以薛仁貴郭待封爲虣武之將屠十萬衆於大非之川一甲不歸又以李敬𤣥劉審禮爲廊廟之宰辱十八萬衆於青海之澤身爲囚虜是時精甲勇士勢如雲雷然竟不能擒一戎馘一醜至今關隴爲空今乃欲以李處一爲將驅顦顇之兵將襲吐蕃臣竊憂之而爲此虜所笑此二事也且夫事有求利而得害者則蜀昔時不通中國秦惠王欲帝天下而并諸侯以爲不兼賨不取蜀勢未可舉乃用張儀計飾美女譎金牛因間以啖蜀侯蜀侯果貪其利使五丁力士鑿山通谷棧褒斜置道於秦自是險阻不關山谷不閉張儀躡踵乘便縱兵大破之蜀侯誅賨邑滅至今蜀爲中州是貪利而亡此三事也且臣聞吐蕃貪黠愛蜀之珍富欲盜之乆有日矣然其勢不能舉者徒以山川阻絶障隘不通此其所以頓餓狼之喙而不得竊食也今國家乃亂邊羌開隘道使其收奔亡之種爲鄉導以攻邊是乃借寇兵而爲賊除道舉全蜀以遺之此四事也臣竊觀蜀之西南一都㑹國家之寳庫天下珍貨聚出其中又人富粟多順江而下可以兼濟中國今執事者乃圖僥倖之利悉以委事西羌地不足以稼穡財不足以富國徒殺無辜之衆以傷陛下之仁糜費隨之無益聖德又況僥倖之利未可圖哉此五事也夫蜀之所寳恃險者也人之所安無役者也今國家乃開其險役其人險開則便寇人役則傷財臣恐未見羌戎已有姦盜在其中矣徃年益州長史李崇真將圖此姦利傳檄稱吐蕃欲寇松州遂使國家盛軍以待之轉餉以備之未二三年巴蜀二十餘州騷然大弊竟不見吐蕃之面而崇真􅂍錢已計巨萬矣蜀人殘破幾不堪命此之近事猶在人口陛下所親知愚臣意者不有姦臣欲圖此利復以生羌爲計者哉此六事也且蜀人尫劣不習兵戰一虜持矛百人不敢當又山川阻曠去中夏精兵處遠今國家若擊西羌掩吐蕃遂能破滅其國奴虜其人使其君長係首北闕計亦可矣若不到如此臣方見蜀之邊陲不守而爲羌夷所横暴昔辛有見被髪而祭伊川者以爲不出百年此其爲戎乎臣恐不及百年而蜀爲戎此七事也且國家近者廢安北拔單于棄龜兹放疎勒天下翕然謂之盛德所以者何盖以陛下務在仁不在廣務在養不在殺將以此息邊鄙休甲兵行乎三皇五帝之事者也今又徇貪夫之議謀動兵戈將誅無罪之戎而遺全蜀之患將何以令天下乎此愚臣所不悟者也況當今山東飢關隴弊歴歳枯旱人有流亡誠是聖人寧靜思和天人之時不可動甲兵興大役以自生亂臣又流聞西軍失守北軍不利邊人忙動情有不安今復驅此兵投之不測臣聞自古國亡家敗者未嘗不由黷兵今小人議攻狄之利非帝王之至德也況弊中夏哉臣聞古之善爲天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然後能長享福祿伏願陛下熟計之陳子昂又諫曹仁師出軍書曰臣伏見詔書發懷遠軍令郎將曹仁師部勒以征匈醜臣聞古之天子方建大禮必先振兵擇旅以告成功故漢孝武皇帝將封禪乃徴精卒十萬北巡朔方略地而還此盖遵古先哲王之禮也今神皇陛下應天受籙將欲郊祭天地巡拜河洛建明堂朝萬國斯邁古之盛禮也誠合式遵舊典耀武塞上畢境而還臣猶恐曹仁師未識典禮肆兵長驅窮極砂磧不恤士馬專以務得爲利不以全兵爲上今朝廷百僚雖有疑者無敢言之臣誠愚昧不識忌諱曽聞事君之道所貴盡心心以爲非安可不言臣料仁師到雲内城發兵之日合至九月初到突利城迴兵之日合至十月初北地隆冬草枯泉涸南中士馬不耐祁寒計仁師所將士馬從靈惟當時所發之處却迴到雲内城已行四千餘里雲内城中又先未支度馬旣疲瘦經冬無粟以臣愚笇十不存二若送南中散就諸州路程益遠疲瘦更極以臣愚笇十不存五紫䝉之軍𩔖例相似且仁師此行計遲發速至於應㑹不甚精備以臣計料恐未成功脫若功未克成士馬先喪盡中土求市卒又難得且自古與匈奴戰非士馬相資不可臣恐馬旣虚用致盡賊又竄遠未平但慮後之謀臣悔於今事且古來絶漠多喪士馬非臣抑度輒敢陳聞昔漢室以衛青出塞是時漢馬三十萬匹旋師之日馬唯餘四萬四十年不得事匈奴盖由此也臣願陛下考驗前古取臣愚誠望與三公大臣審更詳議𤣥宗開元中王琚持節巡天兵諸軍方還復詔行塞下議者皆謂將襲回紇黄門侍郎張廷珪陳五不可且言中國步多騎少人齎一石糧負甲百斤盛夏長驅晝夜不休勞逸相絶其勢不敵一也出軍掩敵兵不數萬不可以行廢農廣饋飢歳不支二也千里遠襲其誰不知賊有斥候必能預防三也敵人逺居磧漠譬之石田克而無補四也天下無年當養人息兵五也帝然之時吐蕃盜邊諸將數敗敵益張秣騎内侵帝怒欲自將兵討之知制誥蘇頲諫曰古稱荒服取荒忽之義非常奉職貢也故來則拒去則勿逐以荒逺待之羈縻御之譬若獵然羽毛不入服用體肉不登郊廟則王者不射也況萬乘之重與荒裔頑梗語負勝哉逺方之人不足以辱天子亦可見矣雖然兵法先聲後實陛下如班親征之詔而勅虓將謀夫投會濟師則吐蕃不日崩破亦無待躬致天討也臣謂岐隴凋弊積年若千乘萬騎供億不涯誠恐徭役内興寇掠外虞斯人不堪一也塞外之人驟往倐來敗不恥奔勝不讓成若大軍一臨邊怖震鳥散彼出多方我受其誤二也太上皇聞陛下身對寇場不能無憂烝烝之思何以自安三也漢蒯成侯諫髙帝曰上嘗自勞豈謂無人使哉髙帝以爲愛我今將相大臣豈無爲陛下宣力者何親行之遽邪不省復上言王者之師有征無戰藩貢或闕王命征之於是乎治兵其郊獲辭而止非謂按甲自臨敵人畏之莫敢戰也古天子無親將惟黄帝五十二戰當未平之時自阪泉功成則修身閒居無爲無事陛下撥定祸亂方當深視髙居制禮作樂禪梁父登空峒何至厭天居袵金革爲一日之敵今吐蕃遣渠領干犯國令軍吏一不勝而陛下屈至尊爲之敵雖朝鼎夕砧猶未可以夸四夷安足勞聖躬哉敵之入唯盜牛馬發窖褫衣未嘗殺略邊人其罪易原也臣恐虜情狼顧牽連北狄聞六師之行入幽并犯靈夏南動京師太上皇一致憂勞是陛下以天下之安不能寧其親也臣固曰居中制勝䇿之上者若夫擇良將募重而約嚴違律必誅殺敵必賞多出金以購酋長虜亡無日矣願稍遷延以須西音亦會薛訥大破吐蕃俘獲不貲由是帝止不行肅宗嘗從容問行軍司馬李泌以破賊期泌對曰賊掠金帛子女悉送范陽有苟得心渠能定中國耶華人爲之用者獨周摯髙尚等數人餘皆脅制偷合至天下大計非所知也不出二年無寇矣陛下無欲速夫王者之師當務萬全圖乆安使無後害今詔李光弼守太原出井陘郭子儀取馮翊入河東則史思明張忠志不敢離范陽常山安守忠田乾真不敢離長安是以二地禁其四將也隨禄山者獨阿史那承慶耳使子儀毋取華令賊得通關中則北守范陽西救長安奔命數千里其精卒勁騎不踰年而弊我常以逸待勞來避其鋒去剪其疲以所徴之兵會扶風與太原朔方軍互擊之徐命建寧王爲范陽節度大使北並塞與光弼相掎角以取范陽賊失巢窟當死河南諸將手帝然之會西方兵大集帝欲速得長安曰今戰必勝攻必取何暇千里先事范陽乎泌曰必得兩京則賊再强我再困且我所恃者磧西突騎西北諸戎耳若先取京師期必在春關東早熱馬且病士皆思歸不可以戰賊得休士養徒必復來南此危道也帝不聽憲宗元和初左拾遺元稹上奏曰臣伏見賊劉闢有不庭之罪陛下尚覆露以待之此誠陛下罪已泣辜之仁也㣲臣何足以識之哉然臣聞之天之所以爲天者以其能化物也物之性不一故天之道有和煦震曜之異焉始其生也動之以幽伏被之以春陽扇之以仁風潤之以膏雨則百果草木之柔者順者油然而生矣及夫勾曲角觡堅本頑心凝者滯者幽者蟄者扇之以和煦而不出潤之以膏雨而不滋則必迅之以雷霆曜之以威赫然後頑滯之心改幽蟄之氣宣豈天之道仁於彼而厲於此乎化與不化之異也是以蚩尤之亂作黄帝鑄五兵以殺絶之共工之行惡虞舜揭五刑以放死之豈不欲夢華胥舞干羽而躋之於仁夀哉盖不可化也及夫舞干而適至因壘而來歸此又物之可化者也豈黄帝虞舜文王之德有優劣哉盖蚩尤共工苖人崇人罪有深淺也今陛下法天之德與物爲春凡在生成孰不柔茂而蕞爾㣲醜天將棄之寘蟊賊於其心假螻蟻以爲聚忠臣孝子思得食其肉而快其心乆矣陛下猶聳之以名爵導之以訓誥崇之以寵章而不至假之以旄鉞而益驕戕賊我忠貞損汚我仁義人人不勝其憤有司不忍其威是以違陛下匿瑕含垢之仁順皇天震曜殺戮之用此誠天下快憤激怒之日也陛下猶思因壘以降之舞干以化之善則善矣其如天下之憤何其如天下之憤何臣願陛下可有司之奏法皇天之威與公卿大臣議斬叛弔人之師以快天下人人之憤實天下幸甚㣲臣無任懇悃嫉惡之至翰林學士白居易請罷恒州兵事宜狀曰縁討伐恒州事宜前者已具奏聞此事至大至切臣不合一奏便休伏願聖聰再賜詳省臣伏以河北事體本不合用兵旣已用兵亦希萬一所以人意或望成功今㸔事勢保必無望何者陛下本用兵之初第一倚望承璀第二准擬希朝茂昭今承璀自去已來未敢苦戰已喪大將先挫軍威至今與從史兩軍入賊界下營未得從史雖經接戰與賊勝負略均況奏報之間又事恐非實遷延進退貴引日時不唯意在逗留兼是力難支敵希朝茂昭数月已來方入賊界據所奏到賊新市城一鎮便過不得又奏深澤縣令却被賊打破則其進討之勢想亦可知劉濟親領全軍分圍樂夀又奏賊城堅守卒不易攻師道季安元不可保今㸔情狀似相計會各收一縣便不進軍如此事由陛下具見據其去就豈有成功未審聖心何如更有所望以臣愚見速須罷兵若又遲疑其害有四可爲陛下痛惜者二可爲陛下深憂者二何則若保有成功即不論用度多少旣的知不可即不合虚費貲糧悟而後行事亦非晚今遲校一日有一日之費更延旬月所費滋多終須罷兵何如早罷臣伏見陛下比來愛人省用發自深心至於聖躬每事節儉今以府庫錢帛百姓脂膏資助河北諸侯轉令富貴强大臣每念此不勝憤嘆此所爲陛下痛惜者一也臣伏恐河北諸將見吳少陽已受制命必引事例輕重同詞請雪承宗若章表繼來即議無不許請而後捨模樣可知轉令承宗膠固同𩔖如此則予奪皆由鄰道恩信不出朝廷實恐威權盡歸河北臣每念此實所疚心其爲陛下痛惜者二也今天時已熱兵氣相蒸至於飢渴疲勞疫疾暴露衣甲暑溼弓箭瘡痍上有赤日前有白刄驅以就戰人何以堪縱不惜身亦難忍苦況神䇿官健又最烏雜以城市之人例皆不慣如此忽思生路或有奔逃一人若逃百人相扇一軍若散諸軍必揺事忽至此悔將何及此其爲陛下深憂者一也臣伏聞迴鶻吐蕃皆有細作中國之事小大盡知今聚天下之兵唯討承宗一賊自冬及夏都未立功則兵力之彊弱資費之多少豈宜使西北二陲一一知之忽見利生心承虚入寇以今日之勢力可能救其首尾哉兵連祸生何事不有萬一及此實關安危臣毎思之憂入骨髓此其爲陛下深憂者二也伏惟詳臣此狀察臣此心審賜裁量速有處分如此則是陛下社稷宗廟之福不獨天下幸甚元和七年蕃寇徑至州城西門驅掠人畜而去朝廷憂之宰臣李絳因延英奏陳曰今邊上空虚兵非實數守將貪濫背公徇私虚人旣多實兵須少力旣不敵坐受傷殘今府藏未􅂶國力猶闕未得廣添兵馬且須即目處置就其易行得効速者今京西京北並有神䇿軍鎮兵本置此者祗防蕃寇侵軼俾其禦難戰鬭也不使其鮮衣美食坐費衣糧爾今寇賊爲患來如飄風去如驟雨兩京節度使本兵旣少須與鎮軍合勢掎角驅逐鎮軍須倍道急趨同力剪撲而牽屬左右神䇿須申狀取處分夫兵不内御須應機合變失之毫釐差以千里蕃寇方驅掠煞戮之際百姓塗於草莽方云入京遠取中尉處分何異暍渇而穿井待水餒饉而耕粟俟食豈可及事機乎縱其將領諳識事體星言應接縁是禁衛將士無懼節使之心進退前却號令不及旣行刑不得則與無兵同今須便據所在境兵馬及衣糧器械割屬當道節度使法令畫一豐約齊同赴急如發機前戰不旋踵則兵威必振賊氣自消陛下無驚急之憂生靈亡驅掠之患若安處無事之地坐仰厚賜之恩寇至以申狀爲名不曾禦敵節將以禮管成例待以平交徒有鎮遏之聲都無討逐之力聖恩便此處分豈爲乆遠之制九年彰義節度使吳少陽卒其子元濟匿喪自領軍務李吉甫言於上曰淮西非如河北四無黨援而國家常宿數十萬兵以備之勞費不支失今不取後難圖矣上將討之張𢎞靖請先爲少陽輟朝贈官遣使弔贈待其有不順之迹然後加兵上從之十年中書舎人韓愈論淮西事宜狀曰臣伏以淮西三州之地自少陽疾病去年春夏已來圖爲今日之事有職位者勞於計慮撫循奉所役者修其器械防守金帛糧畜耗於賞給執兵之卒四向侵掠農夫織婦攜持幼弱餉於其後雖時侵掠小有所得力盡筋疲不償其費又聞畜馬甚多自半年以來皆上槽櫪譬如有人雖有十夫之力自朝及夕常自大呼跳躍初雖可畏其勢不乆必自委頓乗其力衰三尺童子可使制其死命況以三小州殘弊困劇之餘而當天下之全力其破敗可立而待也然所未可知者在陛下斷與不斷耳夫兵不多不足以必勝必勝之師必在速戰兵多而戰不速則所費必廣兩界之間疆埸之上日相攻刼必有殺傷近賊州縣徴役百端農夫織婦不得安業或時小遇水旱百姓愁苦當此之時則人人異議以惑陛下之聽陛下持之不堅半塗而罷傷威損費爲弊必深所以要先決於心詳度本末事至不惑然可圖功爲統帥者盡力行之於前而叅謀議者盡心奉之於後内外相應其功乃成昔者殷髙宗大聖之主也以天子之威伐背叛之國三年乃剋不以爲遲志在立功不計所費傳曰斷而後行鬼神避之遲疑不㫁未有能成其事者也臣謬承恩寵獲掌綸誥地親職重不同庶僚輒竭愚誠以效裨補詳條次平賊事宜一一如後一諸道𤼵兵或三二千人勢力單弱羇旅異鄉與賊不相諳委望風懾懼難便前進所在將帥以其客兵難處使先不存優恤待之旣薄使之又苦或被分割隊伍𨽻屬諸頭士卒本將一朝相失心孤意怯難以有功又其本軍各須資遣道路遼遠勞費倍多士卒有征行之艱閭里懐離别之思今聞陳許安唐汝夀等州與賊界連接處村落百姓悉有兵器小小俘刼皆能自防習於戰鬭識賊深淺旣是土人䕶惜鄉里比來未有處分猶願自備衣糧共相保聚以備寇賊若令召募立可成軍若要添軍自可取足賊平之後易使歸農伏請諸道先所追到行營者悉令却牒歸本道據行營所追人額器械弓矢一物已上悉送行營充給所召募人兵數旣足加之教練三數月後諸道客軍一切可罷比之徴發遠人利害懸隔一繞逆賊州縣堡栅等各置兵馬都數雖多毎處則至少又相去闊遠難相應接所以數被攻刼致有損傷今若分爲四道每道各置三萬人擇要害地屯聚一處使有隱然之望審量事勢乘時逐利可入則四道一時俱𤼵使其狼狽驚惶首尾不相救濟若未可入則深壁髙壘以逸待勞自然不要諸處多置防備臨賊小縣可收百姓於便地作行縣以主領之使免散失一蔡州士卒爲元濟迫脅勢不得已遂與王師交戰原其本根皆是國家百姓進退皆死誠可閔傷宜明勅諸軍使深知此意當戰鬭之際固當以盡敵爲心若形勢已窮不能爲惡者不須過有殺戮喻以聖德放之使歸銷其兇悖之心貸以生全之幸自然相率棄逆歸順一論語曰欲速則不達見小利則大事不成比來征討無功皆由欲其速㨗有司計筭所費苟務因循小不如意即求休罷河北淮西等見承前事勢知國家必不與之持乆併力苦戰幸其一勝即希冀恩赦朝廷無至忠憂國之人不惜傷損威重因其有請便議罷兵徃日之事患皆然也臣愚以爲淮西三小州之地元濟又甚庸愚而陛下以聖明英武之姿用四海九州之力除此小寇難易可知泰山壓卵未足爲喻一兵之勝負實在賞罰賞厚可令亷士動心罰重可令凶人喪魄然可集事不可愛惜所費惮於行刑一淄青恒冀兩道與蔡州氣𩔖畧同今聞討伐元濟人情必有救助之意然皆闇弱自保無暇虚張聲勢則必有之至於分兵出界公然爲惡亦必不敢宜特下詔云蔡州自吳少誠已來相承爲節度使亦㣲有功效少陽之殁朕亦本擬與元濟恐其年少未能理事所以未便處置待其稍能輯綏然後許其承繼今忽自爲狂悖侵掠不受朝命事不得已所以有此討伐至如淄青恒州范陽等道祖父各有功業相承命節年嵗已乆朕必不利其土地輕有改易各宜自安如妄自疑懼敢相扇動朕即赦元濟不問迴軍討之自然破膽不敢妄有異說十三年田𢎞正請自黎陽度河討李師道裴度奏曰魏博軍旣度河即當仰給度支或與光顔互相疑阻則必益致遷延與其度河而不進不若養威於河北宜且使之秣馬厲兵俟霜降水落自楊劉度河直指鄆州則賊衆揺心矣上從之穆宗時蕭俛進門下侍郎吐蕃寇涇州調兵䕶邊帝因問兵法有必勝乎俛曰兵凶器聖人不得已用之故武不可玩玩則無震夫以仁討不仁以義討不義先招懐後掩襲故有不殺厲不禽二毛不犯田稼其救人如免水火此必勝術也若乃以小不忍輕任干戈師曲而敵怨非徒不勝又將自危是以聖王慎於兵帝重其言長慶二年守中書舎人白居易上狀論行營五事其一請專委李光顔東面討逐委裴度四面臨境招諭臣伏見自幽鎮有事已來詔太原魏博澤潞易定滄州等五道節度各領全軍又徴諸道兵馬計七八十萬四面圍繞已逾半年王師無功賊勢猶盛弓髙已失深州甚危者豈不以兵數太多反難爲用節將太衆則心不齊莫肯率先逓相顧望又以朝廷賞罰近日不行未立功者或先封官已敗衂者不聞得罪旣無懲勸以至遷延若不改張必無所望今李光顔旣除陳許節度盡領本軍伏請抽諸道勁兵通前約與三四萬人從東速進開弓髙糧路合下博諸軍解深邢重圍與元翼合勢令裴度領太原全軍兼招討舊職四面壓境觀釁而動若乗虚得便即令同力剪除若戰勝賊窮亦許受降納􅅃如此則鎮州夾攻以分其力招諭以動其心未及誅夷自生變改況光顔乆諳戰陣素有威名裴度爲人忠勇果決加以明懸賞罰使其憂責在身事勢驅之自須死戰若比向前模樣用命百倍相懸破賊責功無出於此況太原興王之地天下勁兵今旣得人足當一面以此計度無如二人其二請抽㨂魏愽澤潞易定滄州四道兵馬分付光顔伏請詔光顔於前件四道揀選馬步精銳者每軍各取三四千人並令光顔專綂一則藉其兵力討襲鎮州二乃每軍抽人不爲不用其餘放去理亦無妨況令守疆亦足展効或聞澤潞魏博兵馬同討淮西之時素諳光顔勤恤將士必樂爲用可望成功今光顔得到下博後即陳許先有八千人昨又發三千人光顔又領鳳翔馬軍一千三百人加以徐泗鄭滑河陽等軍悉皆勁銳堪用況兼魏博等四道所抽兵馬約有三四萬人盡付光顔足以成事其襄陽陜府東都汝州等道兵馬仍委光顔揀擇可否若不堪用不如放還豈唯虚費資糧兼恐撓敗軍陣今旣只留東西二帥請各置都監一人諸道兵馬監軍伏請一時停罷如此則衆齊令一必有成功其三請勒魏博等四道兵馬却守本界伏以朝廷本用田布之意以𢎞正遇害令報父讎望其感激衆心先立功効今領全師出界供給度支數月以來都不進討非田布固欲如此抑有其由或聞魏博一軍累經優賞兵驕將富莫肯爲用況其軍一月之費計實錢貳拾㭍捌萬貫今天下百計求取不足充其數月衣糧若且依前將何供給則不如使退守本境自供給衣糧省費之間利害明矣其澤潞易定等雖經接戰勝負略均且昭義全軍收臨城一縣不得則其兵力亦可知矣滄州新經敗挫叔良又乏將謀勢不支任必無可望今請魏博等四道各歸本界嚴守封疆如此則不獨減無用之兵亦可以省有限之費就中魏博尤要退軍虚費貲糧最可痛惜其四請省行營糧料伏以行營最切者豈不以國用將竭軍費不充更至春夏已來實恐計無所出今若兩道共留六萬其餘退食本道衣糧即每月所費僅減其半一月之用可給兩月唯供六萬所費無多旣易支持自然豐足責其死戰敢不盡心臣以爲當今至切無過於此其五請因朱克融授節後速討王庭湊克融庭湊同惡相濟物情事理㫁在不疑今朝廷特赦克融新授節鉞縱終助援必恐遲疑當逗留克融之時是經營庭湊之日遲則心固乆則計成三數月間須有次第延引入夏轉難用兵今正是時時不可失以臣等所見謹具如前伏以行營今日事宜真可謂急危極矣其間變故遠不可知但恐如今救已遲晩若猶可及無出於斯何者茍兵數不抽軍費不減食既不足衆何以安不安之中何事不有伏料陛下覽臣此狀必有二疑一者以臣等悉是儒生不諳兵事縱知誠懇的未信行臣亦以此自疑乆未敢奏今旣事切不敢不言若攻戰機宜非臣所習而軍國利害雖愚亦知況察羣情兼聽衆議與臣此奏所見多同伏望不以儒生輕而不用也二者伏恐行營事勢奏報不真皆云賊徒計日合破又陛下以制置旣乆難於改移前事若得其宜即合旋有成績至今旣無次第安得不務改圖古人云收之桑榆事猶未晚若因循且過即救療轉難臣又切有過憂敢不盡吐肝肺實恐軍用不濟更須百計誅求日引月加以至困極今天下諸色錢内每貫已抽減三百茶鹽估價有司並已増加水陸關津四方多請率稅不許即用度交闕盡許則人心無憀自古安危皆繫於此伏乞聖慮察而念之不以重難改移忽於大計也臣等又憂深州乆圍救兵不至弓髙新陷糧道未通下博諸軍致於窮地光顔兵少欲入無由外即救援不來内即餱糧罄竭各求生路難向死門無可奈何忽然奔散即聖心雖悔其可及乎其鑒不遥在貞元中韓全義五樓之敗是也伏望陛下詳臣此狀思臣此言若以爲然速賜裁㫁臣等受恩日乆憂國情深志在懇切言無方便伏望聖鑒俯察愚𠂻武宗旣數討叛有功司徒李德裕慮忲于武不可戢即奏言曹操破袁紹於官渡不追奔自謂所獲已多恐傷威重養由基古善射者栁葉雖百步必中觀者曰不如少息若弓撥矢鉤前功皆棄陛下征伐無不得所欲願以兵爲戒乃可保成功帝嘉納其言後梁末帝貞明四年敬翔上疏曰國家連年喪師疆土日蹙陛下所與計事者皆左右近習豈能量敵國之勝負乎李亞子繼位以來攻城野戰無不親當矢石近者攻楊劉身負束薪爲士卒先一舉拔之陛下儒雅守文宴安自若使賀瓌輩敵之而望攘逐寇讎非臣所知也宜詢訪黎老别求異䇿不然憂未艾也疏奏趙張之徒言翔怨望梁主遂不用後唐莊宗引兵屯朝城梁將康延孝來奔唐主問以梁事延孝對曰梁朝地不爲狹兵不爲少然主既暗懦趙張擅權内結宫掖外納貨賂段凝智勇俱無專率斂行伍以奉權貴梁主不能專任將帥常以近臣監之進止可否動爲所制近又聞欲數道出兵令董璋趨太原霍彦威寇鎮定王彦章攻鄆州段凝當陛下決以十月大舉臣竊觀梁兵聚則不少分則不多願陛下養威蓄力以待其分帥精騎五千自鄆州直抵大梁擒其僞主旬月之間天下定矣唐主大悅莊宗初聞梁人欲大舉數道入寇深以爲憂召諸將㑹議李紹宏等皆以爲鄆州難守請以易衞州及黎陽與梁與之約和休兵息民更圖後舉唐主不悅乃獨召郭崇韜問之崇韜對曰陛下不櫛沐不解甲十五餘年欲雪國家讎恥今已正尊號始得鄆州尺寸之地不能守而棄之臣恐將士解體將來食盡衆散雖畫河爲境誰爲陛下守之臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機決在今歳梁今悉以精兵授段凝決河自固恃此不復爲備凝非將材不足畏降者皆言大梁無兵陛下若留兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴僞主授首則諸將自降矣不然今秋不登軍糧將盡大功何由可成諺曰當道築室三年不成帝王應運必有天命在陛下勿疑耳唐主曰此正合朕志丈夫得則爲王失則爲虜吾行決矣後漢髙祖初集羣臣議進取諸將咸請出帥井陘攻取鎮魏漢主欲自石會趨上黨郭威曰虜主雖死黨衆猶盛各據堅城我出河北兵少路迂傍無應援若羣盜合勢共擊我軍糧餉路絶此危道也上黨山路險澁粟少民殘無以供億亦不可由近者陜晉相繼款附引兵從之萬無一失不出兩旬洛汴定矣漢主曰卿言是也後周世宗即位比部郎中王朴獻平邊䇿曰唐失道而失吳蜀晉失道而失幽并觀所以失之由知所以平之術當失之時君暗政亂兵驕民困近者姦於内遠者叛於外小不制而至於僭大不制而至於濫天下離心人不用命吳蜀乗其亂而竊其號幽并乘其間而據其地平之之術在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民俟其倉廪實器用備人可用而舉之彼方之民知我政化大行上下同心力彊財足人安將和有必取之勢則知彼情狀者願爲之間諜知彼山川者願爲之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今惟吳易圖東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必奔走以救其弊奔走之間可以知彼之虚實衆之彊弱攻虚擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我師入其地必大𤼵以來應數大𤼵則民困而國竭一不大𤼵則我獲其利彼竭我利則江北諸州乃國家之所有也旣得江北則用彼之民揚我之兵江之南亦不難平也如此則用力少而收功多得吳則桂廣皆爲内臣岷蜀可飛書而召之如不至則四面並進席卷而蜀平矣吳蜀平幽可望風而至唯并必死之寇不可以恩信誘必須以彊兵攻力已竭氣已喪不足以爲邊患可爲後圖方今兵力精練器用具備羣下知法諸將用命一稔之後可以平邉臣書生也不足以講大事至於不達大體不合機變惟陛下寛之歴代名臣奏議卷二百二十九
