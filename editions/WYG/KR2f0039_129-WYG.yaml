body:
  text: 歴代名臣奏議卷一百二十九明楊士竒等撰用人商湯問伊尹曰三公九卿二十七大夫八十一元士知之有道乎伊尹對曰昔者堯見人而知舜任人然後知禹以成功舉之夫三君之舉賢皆異道而成功然尚有失者況無法度而任已直意用人必大失矣故君使臣自貢其能則萬一之不失矣又問王者何以選賢對曰夫王者得賢材以自輔然後治也雖有堯舜之明而股肱不備則主恩不流化澤不行故明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官尊其爵重其祿賢者進以顯榮罷者退而勞力是以主無遺憂下無邪慝百官能治臣下樂職恩流群生潤澤草木昔者虞舜左禹右臯陶不下堂而天下治此使能之效也周武王問太公望曰得賢敬士或不能以為治者何也望對曰不能獨斷以人言斷者殃也武王曰何為以人言斷望曰不能定所去以人言去不能定所取以人言取不能定所為以人言為不能定所罰以人言罰不能定所賞以人言賞賢者不必用不肖者不必退而士不必敬武王曰善其為國何如望曰其為人惡聞其情而喜聞人之情惡聞其惡而喜聞人之惡是以不必治也武王曰善武王又問太公望曰舉賢而以危亡者何也望對曰舉賢而不用是有舉賢之名而不得真賢之實也武王曰其失安在望曰其失在君好用小善而已不得真賢也武王曰好用小善者何如望曰君好聽譽而不惡䜛也以非賢為賢以非善為善以非忠為忠以非信為信其君以譽為功以毁為罪有功者不賞有罪者不罰多黨者進少黨者退是以群臣比周而蔽賢百吏羣黨而多姦忠臣以誹死於無罪邪臣以譽賞於無功其國見於危亡武王曰善吾今日聞誹譽之情矣齊桓公立發兵攻魯心欲殺管仲鮑叔牙曰臣幸得從君君竟以立君之尊臣無以増君君將治齊即髙徯與叔牙足也君且欲覇王非管夷吾不可夷吾所居國國重不可失也於是桓公從之乃佯為召管仲欲甘心實欲用之管仲知之故請徃鮑叔牙迎受管仲及堂阜而脫桎梏齋祓而見桓公桓公厚禮以為大夫任政桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治桓公曰何故管仲對曰貧不能使富桓公賜之齊國市租一年而國不治桓公曰何故對曰䟽不能制親桓公立以為仲父齊國大安而遂覇天下孔子曰管仲之賢不得此三權者亦不能使其君南靣而覇矣桓公問於管仲曰吾欲使爵腐於酒肉腐於爼得毋害於覇乎管仲對曰此極非其貴者耳然亦無害於覇也桓公曰何如而害覇管仲對曰不知賢害覇知而不用害覇用而不任害覇任而不信害覇信而復使小人參之害覇桓公曰善管仲有疾桓公徃問之仲父若棄寡人䜿刁可使從政乎對曰不可豎刁自刑以求入君其身之忍将何有於君公曰然則易牙可乎對曰易牙觧其子以食其君其子之忍將何有於君若用之必為諸侯笑及桓公殁豎刁易牙乃作難桓公問於寗戚曰筦子今年老矣為棄寡人而就世也吾恐法令不行人多失職百姓疾怨國多盜賊吾何如而使奸邪不起民衣食足乎寗戚對曰要在得賢而任之桓公曰得賢奈何寗戚對曰開其道路察而用之尊其位重其祿顯其名則天下之士騷然舉足而至矣桓公曰既以舉賢士而用之矣㣲夫子幸而臨之則未有布衣屈竒之士踵門而求見寡人者寗戚對曰是君察之不明舉之不顯而用之疑官之卑祿之薄也且夫國之所以不得士者有五阻焉主不好士諂諛在傍一阻也言便事者未嘗見用二阻也壅塞掩蔽必因近習然後見察三阻也訊獄詰窮其辭以法過之四阻也執事適欲擅國權命五阻也去此五阻則豪俊並興賢智求處五阻不去則上蔽吏民之情下塞賢士之路是故明王聖主之治若夫江海無不受故長為百川之主明王聖君無不容故安樂而長乆因此觀之則安主利人者非獨一士也桓公曰善吾将著夫五阻以為戒夲也景公問於晏子曰寡人從夫子而善齊國之政對曰嬰聞之國具官而后政可善景公作色曰齊國雖小則何為不具官乎對曰此非臣之所復也昔先君桓公身體墮懈辭令不給則隰朋侍左右多過刑罰不中則弦章侍居處肆縱左右懾畏則東郭牙侍田野不修人民不安則寗戚侍軍吏怠戎士偷則王子成父侍徳義不中信行衰㣲則筦子侍先君能以人之長續其短以人之厚補其薄是以辭令窮逺而不逆兵加於有罪而不頓是故諸侯朝其徳而天子致其胙今君之失多矣未有一士以聞者也故曰未具景公曰善景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂之不祥也晏子曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥也所謂不祥乃若此者也今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也景公伐宋至于岐隄之上登髙以望太息而歎曰昔我先君桓公長轂八百乘以覇諸侯今我長轂三千乘而不敢乆處於此者豈其無管仲歟絃章對曰臣聞之水廣則魚大君明則臣忠昔有桓公故有管仲今桓公在此則車下之臣盡管仲也晉臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸晉文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祇兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以爲下軍大夫晉師敗歸桓子即荀林父請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶闘況國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其毋乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削縫賔胥無善純縁桓公知衣而已亦其臣之力也師曠侍曰臣請譬之五味管仲善斷割之隰朋善煎熬之賔胥無善齊和之羮以􅍄矣奉而進之而君不食誰能強之亦君之力也衛君問於田譲曰寡人封侯盡千里之地賞賜盡御府繒帛而士不至何也田譲對曰君之賞賜不可以功及也君之誅罰不可以理避也猶舉杖而呼狗張弓而祝雞矣雖有香餌而不能致者害之必也荆齊燕代四國為一将以攻秦秦王召羣臣賔客六十人而問焉曰四國為一将以圖秦寡人屈於内而百姓靡於外為之奈何群臣莫對姚賈對曰賈願出使四國必絶其謀而安其兵乃資車百乗金千斤衣以其衣舞以其劍姚賈辭行絶其謀止其兵與之為交以報秦秦王大說賈封千户以為上卿韓非知之曰賈以珍珠重寳南使荆吳北使燕代之間三年四國之交未必合也而􅈿珠重寳盡於内是賈以王之權外自交於諸侯願王察之且梁監門子嘗盜於梁臣於趙而逐於世監門子梁之大盜趙之逐臣與同知社稷之計非所以勵群臣也王召姚賈而問曰吾聞子以寡人財交於諸侯有諸對曰有王曰有何靣目復見寡人對曰曾參孝其親天下願以為子子胥忠於君天下願以為臣貞女工巧天下願以為妃今賈忠王而王不知也賈不歸四國尚焉之使賈不忠於君四國尚焉用賈之身桀聽讒而誅其良将紂聞讒而殺其忠臣至身死國亡今王聽讒則無忠臣矣王曰子監門子梁之大盜趙之逐臣姚賈曰太公望齊之逐夫朝歌之廢屠子良之逐臣棘津之讎不庸文王用之而王管仲其鄙人之賈人也南陽之敝幽魯之免囚桓公用之而覇百里奚虞之乞人𫝊賣以五羊之皮穆公相之而朝西戎文公用中山盜而勝於城濮此四士皆有詬醜大誹天下明主用之知其可與立功使若卞随務光申屠狄人主豈得其用哉故明主不取其汙不聽其非察其為己用故可以存社稷雖有外誹者不聽雖有髙世之名無咫尺之功者不賞是以羣臣莫敢以虚願望於上秦正曰然乃復使姚賈而誅韓非秦王拜李斯為客卿㑹韓人鄭國來閒秦以作注溉渠已而覺秦宗室大臣皆言於王曰諸侯人來事秦者大抵為其主游閒於秦耳請一切逐客李斯議亦在逐中斯乃上書曰臣聞吏議逐客竊以為過矣昔繆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋來丕豹公孫支於晉此五子者不産於秦而穆公用之并國二十遂覇西戎孝公用商鞅之法移風易俗民以殷盛國以富强百姓樂用諸侯親服獲楚魏之師舉地千里至今治彊惠王用張儀之計拔三川之地西并巴蜀北收上郡南取漢中包九夷制鄢郢東據成臯之險割膏腴之壌遂散六國之從使之西靣事秦功施到今昭王得范雎廢穰侯逐華陽强公室杜私門蠶食諸侯使秦成帝業此四君者皆以客之功由此觀之客何負於秦哉向使四君却客而不内䟽士而不用是使國無富利之實而秦無強大之名也今陛下致崑山之玉有随和之寳垂明月之珠服太阿之劔乘纎離之馬建翠鳯之旗樹靈鼉之鼓此數寳者秦不生一焉而陛下說之何也必秦國之所生然後可則是夜光之璧不飾朝廷犀象之器不為玩好鄭魏之女不充後宫而駿良駃騠不實外廐江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娯心意說耳目者必出於秦然後可則是宛珠之簮傅璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也夫擊甕叩缻彈筝搏髀而歌聲嗚嗚快耳目者真秦之聲也鄭魏桑閒昭一作韶虞象武者異國之樂也今棄擊甕叩缻而就鄭衛退彈筝而取昭虞若是者何也快意當前適觀而已矣今取人則不然不問可否不問曲直非秦者去為客者逐然則是所重者在乎色樂珠玉而所輕者在乎人民也此非所以跨海内制諸侯之術也臣聞地廣者粟多國大者人衆兵強則士勇是以太山不讓土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其徳是以地無四方民無異國四時充美鬼神降福此五帝三王之所以無敵也今乃棄黔首以資敵國却賔客以業諸侯使天下之士退而不敢西向裹足不入秦此所謂藉宼兵而齎盜糧者也夫物不産於秦可寳者多士不産於秦而願忠者衆今逐客以資敵國損民以益讎内自虚而外樹怨於諸侯求國無危不可得也秦王乃除逐客之令漢髙帝為漢王時陳平自楚歸漢因魏無知求見漢王漢王召入是時萬石君石奮為中涓受平謁平等十人俱進賜食王曰罷就舍矣平曰臣為事來所言不可以過今日於是漢王與語而說之問曰子居楚何官平曰為都尉是日拜平為都尉使參乗典䕶軍諸将盡讙曰大王一日得楚之亡卒未知髙下而即與共載使監護長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引師而還收散兵至滎陽以平為亞将属韓王信軍廣武絳灌等或讒平曰平雖美丈夫如冠玉耳其中未必有也聞平居家時盜其嫂事魏王不容亡而歸楚歸楚不中又亡歸漢今大王尊官之令䕶軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝已之行而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進竒謀之士顧其計誠足以利國家耳盜嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去今又從吾遊信者固多心乎平曰臣事魏王魏王不能用臣說故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有竒士不能用臣居楚聞漢王之能用人故歸大王臝身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為䕶軍中尉盡䕶諸将諸将迺不敢復言王又謂陳平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之亷節好禮者多歸之至於行功爵邑重之士亦以此不附今大王慢而少禮士亷節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢誠各去其兩短襲其兩長天下指虞則定矣然大王恣侮人不能得亷節之士顧楚有可亂者彼項王骨鯁之臣亞父鍾離昧周殷之属不過數人耳大王誠能捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必内相誅漢國舉兵而攻之破楚必矣王以為然髙帝即位五年置酒雒陽南宫帝曰列侯諸将毋敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰陛下慢而侮人項羽仁而愛人然陛下使人攻城略地所降下者因以予之與天下同利也項羽妒賢嫉能有功者害之賢者疑之戰勝而不予人功得地而不予人利此所以失天下也帝曰公知其一未知其二夫運籌策帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餽饟不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信此三者皆人傑也吾能用之此吾所以取天下也項羽有一范増而不能用此其所以為我擒也羣臣恱服文帝拜張釋之為謁者僕射從行上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對嚮應亡窮者文帝曰吏不當如此耶尉亡賴詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曽不能出口豈効此嗇夫喋喋利口㨗給哉且秦以任刀筆之吏争以亟疾苛察相髙其弊徒文具亡惻隱之實以故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡争口辯亡其實且下之化上疾於景響舉錯不可不察也文帝曰善乃止不拜嗇夫時季布為河東守人有言其賢者文帝召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷季布因進曰臣無功竊寵待罪河東陛下無故召臣此必有以臣欺陛下者今臣至無所受事罷去此必有毁臣者夫陛下以一人之譽而召臣以一人之毁而去臣臣恐天下有識聞之有以窺陛下也帝黙然慙良乆曰河東吾股肱郡故特召君耳布辭之官宣帝五鳯三年丙吉病篤上自臨問吉曰君即有不諱誰可以自代者吉辭謝曰羣臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不寃太僕陳萬年事後母孝惇厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉時蕭望之上䟽曰陛下哀愍百姓恐徳化之不䆒悉出諫官以補郡吏所謂憂其末而忘其夲者也朝無争臣則不知過國無達士則不聞善願陛下選明經術温故知新通於㡬㣲謀慮之士以為内臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶㡬乎外郡不治豈足憂哉書聞徴入守少府益州刺史王襄奏蜀人王襃有軼材廼徴襃既至詔襃為聖主得賢臣頌於是襃對曰夫荷旃被毳者難與道純綿之麗宻羮藜含糗者不足與論太牢之滋味今臣僻在西蜀生於窮巷之中長於􅅫茨之下無有遊觀廣覽之知顧有至愚極陋之累不足以塞厚望應明㫖雖然敢不畧陳愚而抒情素記曰共惟春秋法五始之要在乎審已正統而已夫賢者國家之噐用也所任賢則趨舍省而功施普噐用利則用力少而就效衆故工人之用鈍噐也勞筋苦骨終日矻矻及至巧冶鑄干将之樸清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革忽若彗汜畫塗如此則使離婁督繩公輸削墨雖崇臺五層延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝䇿而不進於行胷喘膚汗人極馬倦及至駕齧䣛驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如歴塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之凉者不苦盛暑之鬱燠襲貂裘之煗者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海内也是以嘔喻受之開寛裕之路以延天下英俊也夫竭知附賢者必建仁䇿索人求士者必樹伯迹昔周公躬吐握之勞故有圄空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠則上不然其信進仕不得施效斥逐又非其愆是故伊尹勤於鼎爼太公困於鼓刀百里自鬻寗子飯牛罹此患也及其遇明君遭聖主也運籌合上意諫諍即見聽進退得闗其忠任職得行其術去卑辱奥渫而升夲朝離䟽釋蹻而享膏粱剖符錫壤而光祖考傳之子孫以資說士故世必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀竢秋吟蜉蝤出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊乂将自至若堯舜禹湯文武之君獲稷契臯陶伊尹吕望明明在朝穆穆布列聚精㑹神相得益章雖伯牙操鍾逄門子彎烏號猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載一合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行化溢四表横被無窮遐夷貢獻萬祥畢臻是以聖王不徧窺望而視已明不單傾耳而聽已聦恩從祥風翺徳與和氣游太平之責塞優游之望得遵遊自然之勢恬淡無為之場休徴自至夀考無疆雍容垂拱永永萬年何必偃仰詘信若彭祖呴嘘呼吸如喬松𦕈然絶俗􅄐世哉詩云濟濟多士文王以寧葢信乎其以寧也成帝河平二年御史大夫張忠奏京兆尹王尊罪尊坐免官吏民多稱惜之湖三老公乘興等上書訟尊治京兆盡節勞心夙夜思職撥劇整亂誅暴禁邪皆前所希有今御史奏尊傷害隂陽為國家憂靖言庸違象恭滔天原其所以出御史丞楊輔素與尊有私怨外依公事傅致奏文臣等竊痛傷尊修身潔已砥節首公刺譏不憚将相誅惡不避豪強功著職修威信不廢昨以京師廢亂選用為卿賊亂既除即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉願下公卿大夫博士議郎定尊素行審如御史章尊乃當伏觀􅇅之誅放於無人之域不得茍免及任舉尊者當獲舉之辜不可但已即不如章飾文深詆以愬無罪亦宜有誅以懲讒賊之口絶欺詐之路於是復以尊為徐州刺史成帝時御史大夫于永卒谷永薦用薛宣上䟽曰帝王之徳莫大於知人知人則百僚任職天工不曠故皋陶曰知人則哲能官人御史大夫内承夲朝之風化外佐丞相統理天下任重職大非庸材所能堪今當選於群卿以充其缺得其人則萬姓欣喜百僚說服不得其人則大職墮斁王功不興虞帝之明在此一舉可不致詳竊見少府薛宣材茂行潔逹於従政前為御史中丞執憲轂下不吐剛茹柔舉錯時當出守臨淮陳留二郡稱治為左馮翊崇教飬善威德並行衆職修理姦軌絶息辭訟者歴年不至丞相府赦後餘盜賊什分三輔之一功效卓爾自左内史初置以來未嘗有也孔子曰如有所譽其有所試宣考績功課簡在兩府不敢過稱以干欺誣之辠臣聞賢才莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節無私黨游說之助臣恐陛下忽於羔羊之詩舍公實之臣任華虚之譽是用越職陳宣行能唯陛下留神考察哀帝初立欲匡成帝之政多所變動丞相王嘉上䟽曰臣聞聖王之功在於得人孔子曰材難不其然與故繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也累世尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯徃者致選賢材賢材難得拔擢可用者或起於囚徒昔魏尚坐事繋文帝感馮唐之言遣使持節赦其臯拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁内史而骨肉以安張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自寃使者覆獄劾敞賊殺人上逮捕不下言使者上奏請逮捕敞而天子不下其事也會免亡命數十日宣帝徴敞拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下𫝊相促急又數改更政事司𨽻部刺史察過悉劾發揚隂私吏或居官數月而退送故迎新交錯道路中材茍容求全下材懐危内顧一切營私者多二千石益輕賤吏民慢易之或持其㣲過増加成辠言於刺史司𨽻或至上書章下衆庶知其易危小失意則有離畔之心前山陽亡徒蘇令等從横吏士臨難莫肯仗節死義以守相威權素奪也孝成皇帝悔之下詔書二千石不為縱二千石不以故縱為罪所以優之也遣使者賜金尉厚其意誠以爲國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏有章劾事留中會赦一解故事尚書希下章爲煩擾百姓證驗繫治或死獄中章文必有敢告之字迺下唯陛下留神於擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊畧令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢拜爲諫大夫遣之今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛修等皆故二千石有名稱天子納而用之時傅太后始與政事右將軍傅喜數諫之由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽為大司馬賜喜黄金百斤上将軍印綬以光祿大夫飬病大司空何武尚書令唐林皆上書言喜行義修絜忠誠憂國内輔之臣也今以寝病一旦遣歸衆庶失望皆曰傳氏賢子以論議不合於定陶太后故退百僚莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玊輕重魏以無忌折衝項以范増存亡故楚跨有南土帯甲百萬隣國不以為難子玉為将則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間亷頗漢散萬金以䟽亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月廼徙師丹為大司空而拜喜為大司馬封髙武侯後漢光武為蕭王時以河内險要富實欲擇守者而難其人問於鄧禹禹對曰宼恂文武備足有牧民御衆之才非此子莫可使也乃拜恂河内太守謂曰昔高祖留蕭何関中吾今委公以河内當給足軍糧率厲士馬防遏他兵勿令北度王引兵而北恂調糇糧治械噐以供軍未嘗乏絶建武十一年郭伋為并州牧過京師帝問以得失伋曰選補衆職當簡天下賢俊不宜専用南陽人是時在位多鄉曲故舊故伋言及之光武時武陽侯朱浮上䟽曰陛下清明履約率禮無違自宗室諸王外家后親皆奉遵繩墨無黨執之名至或乘牛車齊於編人斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然天道信誠不可不察竊見陛下疾徃者上威不行下專國命即位以來不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加免退覆案不関三府罪譴不䝉澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平決於百石之吏故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虚以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積乆則吏自重吏安則人自静傳曰五年再閏天道乃備夫以天地之靈猶五載以成其化況人道哉臣浮愚戇不勝惓惓願陛下留心千里之任省察偏言之奏南陽太守杜詩上䟽薦陽都侯伏湛曰臣聞唐虞以股肱康文王以多士寕是故詩稱濟濟書曰良哉臣詩竊見故大司徒陽都侯自行束脩訖無毁玷篤信好學守死善道經為人師行為儀表前在河内朝歌及居平原吏人畏愛則而象之遭時反覆不離兵凶秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望徳義微過斥退乆不復用有識所惜儒士痛心臣竊傷之湛容貎堂堂國之光暉智畧謀慮朝之淵藪髫髪厲志白首不衰實足以先後王室名足以光示逺人古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懐區區敢不自竭臣前為侍御史上封事言湛公亷愛下好惡分明累世儒學素持名信經明行修通逹國政尤宜近侍納言左右舊制九州五尚書令一郡二人可以湛代頗為執事所非但臣詩䝉恩深渥所言誠有益於國雖死無恨故復越職觸冒明帝時驃騎将軍東平王蒼上䟽薦呉良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國呉良資質敦固公方亷恪躬儉安貧白首一節又治尚書學通師法經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絶矣憂責深大私慕公叔同升之義懼於臧文竊位之罪敢秉愚瞽犯冒嚴禁章帝時韋彪以世承二帝更化之後多以苛刻為能又置官選職不必以才因盛夏多寒上䟽諫曰臣聞政化之夲必順隂陽伏見立夏以來當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郎官超升此位雖曉習文法長於應對然察察小慧𩔖無大能宜簡嘗歴州宰素有名者雖進退舒遲時有不迨然端心向公奉職周宻宜鑒嗇夫㨗急之對深思絳侯木訥之功也徃時楚獄大起故置令史以助郎職而𩔖多小人好為姦利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徴試輩為大夫又御史外遷動㨿州郡並宜清選其任責以言績其二千石視事雖乆而為吏民所便安者宜増秩重賞勿妄遷徙惟留聖心書奏帝納之司徒第五倫薦用鉅鹿太守謝夷吾上䟽曰臣聞堯登稷契政隆太平舜用臯陶政致雍熈殷周雖有高宗昌發之君猶頼傅說吕望之䇿故能克崇其業允協大中竊見鉅鹿太守會稽謝夷吾出自東州厥土塗泥而英姿挺特竒偉秀出才兼四科行包九徳仁足濟時知周萬物加以少膺儒雅韜含六籍推考星度綜校圖録探􅄨聖秘觀變歴徴占天知地與神合契據其道徳以經王務昔為陪𨽻與臣從事奮忠毅之操躬史魚之節董臣嚴綱朂臣懦弱得以免戾寔賴厥勲及其應選作宰惠敷百里降福彌異流化若神爰牧荆州威行邦國奉法作政有周召之風居儉履約紹公儀之操尋功簡能為外臺之表聽聲察實為九伯之冠遷守鉅鹿政合時雍徳量績謀有伊吕管晏之任闡𢎞道奥同史蘇京房之倫雖宻勿在公而身出心隠不殉名以求譽不馳騖以要寵念存遜遁演志箕山方之古賢實有倫序採之於今超焉絶俗誠社稷之元龜大漢之棟甍宜當拔擢使登鼎司上令三辰順軌於歴象下使五品咸訓於嘉時必致休徴克昌之慶非徒循法奉職而已臣以頑駑噐非其儔尸禄負乘夕惕若厲願乞骸骨更授夷吾上以光七曜之明下以厭率土之望庻令㣲臣塞咎免悔安帝時尚書陳忠論薦劉愷上䟽曰臣聞三公上則台階下象山岳股肱元首鼎足居職協和隂陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾属具知其能倀能說經書而用心褊狹遷嚴毅剛直而薄於蓺文伏見前司徒劉愷沈重淵懿道徳博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣頻歴二司舉動得禮以疾致仕側身里巷處約思純進退有度百僚景式海内歸懐徃者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以厭衆望書奏詔引愷拜太尉御史中丞樊準薦用龎參上䟽曰臣聞鷙鳥累百不如一鶚昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守匈奴不敢南向夫以一臣之身折方靣之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉髙才武畧有魏尚之風前坐㣲法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟明詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成效宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯先零羌豪僭號北地詔龎參将降羌及湟中義從胡七千人與行征西将軍司馬鈞期㑹北地擊之參兵至勇士城東為杜季貢所敗引退鈞等獨進參既已失期乃詐病引兵還坐以詐疾徴下獄校書郎馬融上書請之曰伏見西戎反畔寇鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文匈奴亦畧上郡而宣王立中興之功文帝建太宗之號非惟兩主有明叡之姿抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫﨣﨣載於漢䇿竊見前護羌校尉龐參文武昭備智畧𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼将軍梁慬前統西域勤苦數年還留三輔功効克立間在北邉單于降服今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位孟明視䘮師於崤秦伯不替其官故晉景并赤狄之土秦穆遂覇西戎宜逺覽二君使參慬得在寛宥之科誠有益於折衝毗佐於聖化書奏赦參等順帝時當會茂才孝亷太尉龐參以被奏稱疾不得會上計掾廣漢段恭因㑹上䟽曰伏見道路行人農夫織婦皆曰太尉龐參竭忠盡節徒以直道不能曲心孤立羣邪之間自處中傷之地臣猶冀在陛下之世當䝉安全而復以讒佞傷毁忠正此天地之大禁人主之至誡昔白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難夫國以賢化君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黄門視參疾太醫致羊酒尚書史敞等薦胡廣曰臣聞徳以旌賢爵以建事明試以功典謨所美五服五章天秩所祚是以臣竭其忠君豐其寵舉不失徳下忘其死竊見尚書僕射胡廣體貞履規謙虚温雅博物洽聞探􅄨窮理六經典奥舊章憲式無所不覽柔而不犯文而有禮忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏宻勿夙夜十有餘年心不外顧志不茍進臣等竊以為廣在尚書劬勞日乆後母年老既䝉簡照宜試職千里由寧方國陳留近郡今太守任缺廣才畧深茂堪能撥煩願以參選紀綱頺俗使束脩守善有所勸仰永和中李固遷将作大匠上䟽陳事曰臣聞氣之清者為神人之清者爲賢飬身者以練神為寳安國者以積賢為道昔秦欲謀楚王孫圉設壇西門陳列名臣秦使戄然遂為寝兵魏文侯師卜子夏友田子方軾段干木故群俊競至名過齊桓秦人不敢窺兵於西河斯葢積賢人之符也陛下撥亂龍飛初登大位聘南陽樊英江夏黄瓊廣漢楊厚㑹稽賀純䇿書嗟嘆待以大夫之位是以岩穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖徳厚等在職雖無竒卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然為時惜之一日朝會見諸侍中並皆年少無一宿儒大臣可顧問者誠可嘆息宜徴還厚等以副群望瓊乆處議郎已且十年衆人皆怪始隆崇今更滯也光祿大夫周舉才謨髙正宜在常伯訪以言議侍中杜喬學深行直當世良臣乆托疾病可勅令起是日有詔徴用喬厚等而以固為大司農桓帝延熹二年尚書令陳蕃僕射胡廣等上䟽薦徐穉等曰臣聞善人天地之紀政之所由也詩云思皇多士生此王國天挺俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐穉彭城姜肱汝南袁閎京兆韋著潁川李曇徳行純備著于人聽若使擢登三事協亮天工必能翼宣盛美增光日月矣桓帝乃以安車𤣥纁備禮徴之時合浦太守孟甞以病徴還隱處窮澤尚書郎楊喬上書論薦曰臣前後七表言故合浦太守孟甞而身輕言㣲終不䝉察區區破心徒然而已甞安仁𢎞義耽樂道徳清行出俗能幹絶群前更守宰移風改政去珠復還飢民䝉活且南海多珍財産易積掌握之内價盈兼金而甞單身謝病躬耕壟次匿影藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寳棄於溝渠且年歳有訖桑榆行盡而忠貞之節永謝聖時臣誠傷心私用流涕夫物以逺至為􅈿士以稀見為貴槃木朽株為萬乘用者左右為之容耳王者取士宜拔衆之所貴臣以斗筲之資趨走日月之側思立㣲節不敢茍私鄉曲竊感禽息亡身進賢嘗竟不見用延熹九年李膺等以黨事下獄考實太尉陳蕃上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也伏見前司𨽻校尉李膺太僕杜宻太尉掾范滂等正身無玷死心社稷以忠忤旨横加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異昔武王克殷表封閭墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉㓙之效存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何況髠無罪於獄殺無辜於市乎昔禹廵狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人故其興也勃焉又青徐炎旱五糓損傷民物流遷茹菽不足而宫女積於房掖國用盡於羅紈外戚私門貪財受賂所謂祿去公室政在大夫昔春秋之末周徳衰微數十年間無復灾眚者天所棄也天之於漢􅈤􅈤無已故殷勤示變以悟陛下除妖去孽實在修徳臣位列台司憂責深重不敢尸祿惜生坐觀成敗如䝉採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非其人遂䇿免之時徐州從事臧旻上書訟第五種曰臣聞士有忍死之辱必有就事之計故季布屈節於朱家管仲錯行於召忽此二臣以可死而不死者非愛身於須臾貪命於茍活隱其智力顧其權畧庶幸逄時有所為耳卒遭髙帝之成業齊桓之興伯遺其亡逃之行赦其射鉤之讎拔於囚虜之中信其佐國之謀勲效傳於百世君臣載於篇籍假令二主紀過於纎介則此二臣同死於犬馬沈名於溝壑當何由得申其補過之功建其竒奥之術乎伏見故兖州刺史第五種傑然自建在鄉曲無苞苴之嫌歩朝堂無擇言之闕天性疾惡公方不曲故論者說清高以種為上序直士以種為首春秋之義選人所長棄其所短録其小善除其大過種所坐以賊盜公負筋力未就罪至徴徙非有大惡昔虞舜事親大杖則走故種逃亡茍全性命冀有朱家之路以顯季布之㑹願陛下無遺須臾之恩令種有持忠入地之恨種會赦出獻帝時公車司馬令謝該以父母老託疾去官欲歸鄉里㑹荆州道斷不得去少府孔融上書薦之曰臣聞髙祖創業韓彭之将征討暴亂陸賈叔孫通進說詩書光武中興呉耿佐命范升衛宏脩述舊業故能文武並用成長乆之計陛下聖徳欽明同符二祖勞謙戹運三年乃讙今尚父鷹揚方叔翰飛王師電鷙羣凶破殄始有櫜弓卧鼓之次宜得名儒典綜禮紀竊見故公車司馬令謝該體曽史之淑性兼商偃之文學博通羣蓺周覽古今物來有應事至不惑清白異行敦恱道訓求之逺近少有儔匹若乃巨􅇧出呉隼集陳庭黄熊入寝亥首有二非夫洽聞者莫識其端也雋不疑定北闕之前夏侯勝辯常隂之驗然後朝士益重儒術今該實卓然比跡前列間以父母老疾棄官欲歸道路險塞無由自致猥使良材抱璞而逃踰越山河沈淪荆楚所謂徃而不反者也後日當更饋樂以釣由余剋像以求傅說豈不煩哉臣愚以為可推録所在召該令還楚人止孫卿之去國漢朝追匡衡於平原尊儒貴學惜失賢也書奏詔即徴還拜議郎融又論薦處士禰衡上䟽曰臣聞洪水横流帝思俾乂旁求四方以招賢俊昔孝武繼統将𢎞祖業疇咨熈載羣士響臻陛下叡聖纂承基緒遭遇戹運勞謙日昃惟岳降神異人並出竊見處士平原禰衡年二十四字正平淑質貞亮英才卓礫初渉蓺文升堂覩奥目所一見輙誦於口耳所瞥聞不忘於心性與道合思若有神𢎞羊潛計安世黙識以衡準之誠不足怪忠果正直志懐霜雪見善若驚疾惡若讎任座抗行史魚厲節殆無以過也鷙鳥累百不如一鶚使衡立朝必有可觀飛辯騁辭溢氣坌涌觧疑釋結臨敵有餘昔賈誼求試属國詭係單于終軍欲以長纓牽致勁越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫㣲垂光虹蜺足以昭近署之多士増四門之穆穆鈞天廣樂必有竒麗之觀帝室皇居必畜非常之寳若衡等輩不可多得激楚揚阿至妙之容臺牧者之所貪飛兔騕褭絶足奔放良樂之所急臣等區區敢不以聞曹操薦荀彧表曰臣聞慮為功首謀為賞夲野績不越廟堂戰多不踰國勲是故曲阜之錫不後營邱蕭何之土先於平陽珍策重計古今所尚侍中守尚書令彧積徳累行少長無悔遭世紛擾懐忠念治臣自始舉義兵周游征伐與彧戮力同心左右王略發言授策無施不效彧之功業臣由以濟用披浮雲顯光日月陛下幸許彧左右機近忠恪祗順如履薄氷研精極銳以撫庶事天下之定彧之功也宜享髙爵以彰元勲歴代名臣奏議卷一百二十九
