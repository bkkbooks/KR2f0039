body:
  text: 歴代名臣奏議卷一百六十七明楊士竒等撰選舉宋哲宗元祐元年平章軍國重事文彦博上奏曰臣聞於詩思皇多士生此王國濟濟多士文王以寧從古來為國治民者多士則興乏賢則衰此理之必然也士所以多由飬育有素故有秀選俊造之目等級升之漸至於官得其人國無不治臣以朝廷育才取士之法數十年來有所未至向時應進士舉者自執卷為儒便知自重謂之應将相科亦曰白衣公卿登科之後其在髙等者知朝廷必將不次進用率皆益自奮勵進修徳業以副時望所以至於公卿將相為名臣者多是其人近嵗以來稍異於是登甲科者搢紳罕聞其名朝廷罕得其用盖由士子脩藴無素朝廷勸奬未周臣亦聞禮部别定貢舉條貫然慮於激勸士行儒風猶有未至臣欲乞先時降詔開諭使人人知朝廷育才取士之道使各自勉勵向去科選得士必多濟濟以寧當由於此彦博又上奏曰臣觀六典三銓之法以三類觀其異優者擢而升之否者量而退之所以正權衡明賞罰抑貪昌進賢能今之典選一守定格選格中有以多舉主有軍功者為上多舉者或善請求有軍功者或容妄冒如近時買人頭得賞官者極多有同配官故多失才亦容濫進臣欲乞委吏部尚書侍郎大畧依三類之法定本選之人合入知州通判知縣縣令考其才徳功效為上中下三品送中書門下覆驗可否定訖判銓官引對一經聖鑑物無遁形更有去留孰不激勸又判銓之官亦當上體朝廷委付之重以衡鑑自任處之不疑間或以人才髙下絶異者特以名聞而進退之乃為稱職尚書左僕射司馬光上疏曰臣竊惟為政之要莫如得人百官稱職則萬務咸治然人之才性各有所能或優於徳而嗇於才或長於此而短於彼雖臯夔稷契止能各守一官況於中人安可求備是故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人茍隨器授任則世無可棄之士臣誤䝉甄擢備位宰相遴選百官乃其職業而知識淺短見聞褊狹知人之難聖賢所重寰宇至廣俊彦如林或以孤寒遺逸被褐懐玉豈能周知若專引知識則嫌於挾私難服衆心若止循資序則官非其人何以致治莫若使在位達官人舉所知則克協至公野無遺賢矣臣不勝狂愚欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人此科亦許鈐轄已上武臣舉四曰公正聦明可備監司科舉知州以上資序人五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科有官無官人皆可舉七曰文章典麗可備著述科有官無官人皆可舉八曰善聽獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能斷情讞科舉有官人應職事官自尚書至給舍諫議寄禄官自開府儀同三司至太中大夫職自觀文殿大學士待制每嵗須得於十科内舉三人非謂毎科各舉三人謂各隨所知某人充某科舉共計三人其狀云臣竊見某人有何行能並須指陳事實不得徒飾虚辭位在上者得舉在下之人位在下者不得舉在上之人臣今保舉堪充某科如䝉朝廷擢用後不如所舉謂如舉行義純固而身犯名教節操方正而佞邪憸險智勇過人而愚懦致敗公正聦明而私曲昏闇經術精通而不能講讀學問該博而空疎牆面文章典麗而鄙拙紕繆善聽獄訟而􅁈滯失實善治財賦而病民耗國練習法令而屢致出入及犯正入已􅂍臣甘伏朝典不辭候奏狀到日付中書省擇勤謹吏人專切收掌仍每科各置簿書時抄録年月日某官姓名别置合舉官臣寮簿嵗終不舉及人數不足按劾施行或遇在京外方有事須合差官體量相度㸃檢磨勘剗刷催促推勘定奪則委執政親檢逐簿各隨所舉之科選差令試管幹上件差使若能辦集即時别置簿記其勞績遇本科職任有闕謂若經筵或學官有闕即用行義純固經術精通學問該博等科人臺諫有闕即用節操方正科人之類則委執政親檢逐簿選名實相稱或舉主多或有勞績之人補充仍於本人除官勅告前盡開坐舉主姓名於後或不如所舉其舉主從貢舉非其人律科罪犯人正入已􅂍舉主減三等科罪者因受賄徇私而舉之罪名重者自從重法期在必行不可寛宥雖見為執政官朝廷所不可輟者亦須降官示罰即朝廷臨時因事特詔舉官謂若舉知河渠馬牧等之類不在十科之内者有不如所舉亦同此法所貴人人重惜所舉官皆得人光又上科塲劄子曰臣伏覩朝廷改科塲制度第一塲試本經義第二塲試詩賦第三塲試論第四塲試策試新科明法除斷案外試論語孝經義奉聖㫖令禮部與兩省學士待制御史臺國子監司業集議聞奏臣竊有所見不敢不以聞凡取士之道當以徳行為先文學為後就文學之中又當以經術為先辭采為後是故周禮大司徒以六徳六行賔興萬民漢以賢良方正孝㢘質樸敦厚取士中興以後取士尤為精慎至於公府掾屬州從事郡國計吏丞史縣功曹鄉嗇夫皆擇賢者為之茍非其人則為世所譏貶是以人人思自砥礪教化興行風俗純厚乃至後世陵夷雖政刑紊於上而節義立於下有以奸回巧偽致富貴者不為清議所容此乃徳化之本原王者所先務不可忽也熹平中詔引諸生能文賦者待制鴻都門下蔡邕力爭以為辭賦小才無益於治不如經術自魏晉以降始貴文章而賤經術以詞人為英俊以儒生為鄙樸下至隋唐雖設明經進士兩科進士日隆而明經日替矣所以然者有司以帖經墨義試明經專取記誦不詢義理其弊至於離經析注務隠爭難多方以誤之是致舉人自幼至老以夜繼晝腐脣爛舌虚費勤勞以求應格詰之以聖人之道瞢若面墻或不知句讀或音字乖訛乃有司之失非舉人之罪也至於以賦詩論策進士及其末流專用律賦格詩取拾過落擿其落韻失平側偏枯不對􅉕腰鶴膝以進退天下士不問其賢不肖雖頑如跖蹻茍程試合格不費髙第行如淵騫程試不合格不免黜落老死衡茅是致舉人專尚辭華不根道徳渉獵鈔節懐挾勦剽以取科名詰之以聖人之道未必皆知其中或遊處放蕩容止輕儇言行醜惡靡所不至者不能無之其為弊亦極矣神宗皇帝深鑒其失於是悉罷賦詩及經學諸科專以經義論策試進士此乃革歴代之積弊復先王之本典百世不易之法也但王安石不當以一家私學欲盖掩先儒令天下學官講解及科塲程試同己者取異已者黜使聖人坦明之言轉而陥於竒僻先王中正之道流而入於異端若已論果是先儒果非何患學者不棄彼而從此何必以利害誘脅如此其急也又黜春秋而進孟子廢六藝而尊百家加之但考校文學不勉勵徳行此其失也凡謀度國事當守公論不可希時又不可徇俗宜校是非之小大利害之多少使質諸聖人而不謬酌於人情而皆通稽於上古而克合施之當世而可行然後為善也今國家大議科塲之法欲盡善盡羙以臣所見莫若依先朝成法合明經進士為一科立周易尚書詩周禮儀禮禮記春秋孝經論語為九經令天下學官依注䟽講說學士博觀諸家自擇短長各從所好春秋止用左氏傳其公羊榖梁陸淳等說並為諸家孟子止為諸子更不試大義應舉者聽自占習三經以上多少隨意皆須習孝經論語於家狀前開坐習某經某經又每嵗委升朝文官保舉一人不拘見在任不在任是本部各舉所知若係親戚亦於舉狀内聲說其舉狀稱臣竊見某州某縣人某甲有何行能臣今保舉堪應經明行脩科於後不如所舉臣甘當連坐不辭候奏狀到朝廷下禮部貢院置簿各分逐路抄録本人姓名注舉主官位姓名於其下仍下本州出給公據付本人收執及令本州亦如貢院置簿抄録准備開科塲日考驗公據其舉狀既上之後若所舉之人犯􅂍私罪至徒已上情理重及違犯名教候斷訖仍收坐舉主奏乞朝廷取勘施行其人未及第者減五等已及第者減三等坐之一如舉選人充京官法臣竊料此法初行其奔競属請固不能免若朝廷必坐舉主毋有所赦行三五人後自皆慎擇其人不敢妄舉如此則士之居鄉居家獨處闇室亦立身行已不敢不慎惟懼玷缺有聞於外矣所謂不言之教不肅而成不待學官日訓月察立賞告訐而士行自美矣每遇開科塲其有舉主者自稱應經明行脩舉仍於所投家狀前開坐舉主官位姓名有司檢㑹簿上合同方許收接其無舉主者只稱應鄉貢進士舉如常法每舉人三人以上自相結為一保止保委是正身及是本貫不曽犯真刑無隠憂匿服此外皆不保其本州及貢院考試並依舊法差封彌謄録監門廵捕官程試之日嚴加檢察如舊試經學諸科法各令求已毋得移坐位相從托商量相聚傳義傳本懐挾代筆違者扶出第一塲先試孝經論語大義五道内孝經一道論語四道先須備載正文次述注疏大意次引諸家異義次以已見評其是非以援據精詳理長文優者為通其次為粗援據疎略理短文拙者為否三通以上為合格不合格者先次駮放合格者榜引次塲就試如舊試經學諸科法或合格人數太少則委試官臨時短中求長詳酌放過次塲試尚書次塲試周禮次塲試儀禮次塲試禮記次塲試春秋次塲試周易大義各五道令舉人各隨所習經書就試考校過落如孝經論語法次塲論二道一道於儒家諸子書内出題一道於歴代正史内出題次塲試策三道皆問時務考策之日方依解額及奏名人數定去留編排髙下以經數多者在上經數均以策論理長文優在上其經明行脩舉人並於進士前别作一項出榜解發及奏名至御前試時務策一道千字以上封彌官於號上題所明經及舉主人數候考校詳定畢編排之時亦以經數多者在上經數均以策理長文優者在上文理均以舉主多者在上其經明行脩舉人亦於進士前别作一項編排先放及第其推恩注官比進士特加優異他時選擇清要官館閣臺諫等並須先取經明行修人其舉主姓名常於官告前聲說如此則舉人皆務尊尚經術窮聖人指趣不敢不精旁覽子史不敢不博又不流放入於異端小說講求時務亦不敢不知所得之士既有行義又能明道又能博學又知從政其為國家之用豈不賢於今日之所取所有今來乞復詩賦者皆向日老舉人止習詩賦不習經義應舉不得故為此說欲以動揺科塲制度為已私便朝廷若不欲棄捐舊人假將來科塲進士有特奏名者令試詩賦隨其優劣等第推恩亦無傷也不可以此輕改成法復從弊俗誤惑後生若以為文章之士國家所不可無即乞許人於試本經合格日投狀乞試雜文於試論次塲引試或古詩或律詩或歌行或古賦或頌或銘或讃或四六表啓臨時委試官出題目試某文定篇數字數共須及五百字以上取辭采髙者為合格候得觧及奏名及第日編排姓名髙下各在經數同等人之上如此則文章之士亦不乏矣至於律令勅式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道義自與法律􅁳合若其不知但日誦徒流絞斬之書習鍜鍊文致之事為士已成刻薄從政豈有循良非所以長育人材敦厚風俗也朝廷若不欲廢棄已習之人其明法曽得解者依舊應舉未曽得解者不得更應則收拾無遺矣臣愚所見如此伏乞以臣所奏及禮部等官所議榜國子監門及編下諸州有州學處榜州學門令舉人限一月内投狀指定何法為善仰本州附遞以聞候到京齊足更委其他執政看詳參酌從長施行光為門下侍郎又上奏曰臣先上言乞毎嵗委陛朝文官保舉一人應經明行修科與進士並置程試一如進士惟於及第後推恩優異以勸勉天下舉人使敦修士行昨已有朝㫖來年科塲且依舊法施行竊聞近有聖㫖其進士經義並兼用注䟽及諸家之說或已見仍罷律義先次施行臣竊詳朝廷之意盖為舉人經義文體專習王氏新舉為日已久來年科塲欲兼取舊學故有此指揮令舉人預知而習之臣所乞置經明行修科者欲使舉人知向去科塲朝廷敦尚行義不專取文學所以美教化厚風俗比於經義文體尤為要切冝使舉人豫知欲乞亦降朝㫖先次施行况與進士舊法兩不相妨光又上奏曰臣竊見御史韓川上言諸路監司不當拘限資格專任舉主當令宰相自加選擇竊縁常調之人不可不為之立資格以抑躁進塞倖門若果有賢才朝廷自當不次遷擢豈拘此制凡年髙資深之人雖未必盡賢然累任親民歴事頗多知在下艱難比於元不歴親民便任監司者必少勝矣朝廷執政止八九人若非交舊無以知其行能不惟渉徇私之嫌兼所取至狹豈足以盡天下之賢才若采訪毁譽則愛憎毁譽情偽萬端與其聽遊談之言曷若使之結罪保舉故臣奏設十科以舉士其中一科公正聦明可備監司誠知請屬挾私所不能無但有不如所舉者嚴加譴責無所寛宥則今後自然慎擇不敢妄舉矣至如楚潜等雖無聲名安知其無實用俟其到官無狀廢職并舉主坐之亦未為晚大學博士呂大臨論選舉六事䟽曰臣竊惟古之長育人才者以士衆多為樂今之主選舉者以士衆多為患古之以禮聘士常恐士之不至今之以法抑士常恐士之競進古今豈有異哉盖未之思爾夫為國之要不越得人以治其事而已如為治必欲得人則唯恐人才之不足不患乎衆多也如治事皆任其責則惟恐士之不至不憂乎競進也今也取人而用不問其可任何事任人以事不問其才之所堪故入流之路不勝其多然為官擇士則常患乏才待次之吏歴嵗不調然考其職事則常患不治此所謂名實不稱本末交戾如此而欲得人而事治未之有也今欲立士規以養徳厲行更學制以量才進藝立貢法以取賢歛才立試法以試用飬才立辟法以興能備用立舉法以覆實得人立考法以責任考功其事目之詳具于後一士規州縣皆立學皆立士籍學官正録掌之凡士人不以僑寓土著已仕未仕已仕至升朝官未冠及年及七十皆不籍并居學不居學應舉不應舉皆委自鄉郭隣里博訪以姓名申州縣長吏再加審覈無遺與學官參考行實無濫然後書于籍皆供本貫三代年齒其在學及應舉者皆任所習舉業已任者供出身歴任除居學者自有學制外别立士規略如學規禁過條目其大過如兼為工商所遊非僻博賭闘訟之類其小過如遊非其人非義干求之類皆禁之簿二道一道記善凡有善可記皆記之一道書遇凡犯士規者皆書之委州縣學正於學外士人中推擇為衆所服者為外學正州城内量郡大小自二人至六人分坊總之自一人至三人分坊及鄉緫之凡預籍者又月輪一人主書善記過謂之直月毎月約日群集于學釋菜于先聖退而食于堂直月以所記過之狀白于外學正外學正與衆評其可否而書之而告其人凡善行許衆採之告于直月直月審其實而記之有過則准許直月察之至㑹人悉告于學正過亦立罰如犯大過既書許其改過不願改及終不悛者去其籍不得與士齒不得服士衣冠先定士及庶人衣冠以别之朝廷考察徳行皆質于此其學行素髙為衆所推者别加尊禮不與衆同如出逰它所皆具所以遊之事告古者四民不雜處士所習皆有業今也農工商賈尚各有事惟士一職多容遊手罷惰之流士風淪䘮人才不興皆原於此自祖宗以來州縣立學惟守令留意者僅能勸督應舉課業而已鄉里服士衣冠而與士大夫遊皆名為士而賢不肖混淆莫之能辨徳學之進者既無以旌别無行之人又無忌憚欲望羙風俗育人才難矣然比見所立學制多欲士人居學日久此極有害大抵為士者莫不有家仰事父母俯育妻子皆人之大倫飬道安有可闕今必使捨此而居學先廢人之大倫縱博聞多識將安用之此失其本不可不革況古之至學亦不在乎朝夕羣聚課試誦讀然後為學盖必立明師使時往請教有所矜式可矣今之議立士規所以防其失月書善惡所以進善改過非其人者不得與士齒所以清士流此為之兆矣兆足以行則潤澤之方更繫善治者措置如何耳二學制凡學之制皆立大學小學課讀誦訓詁習少儀十年以上至于十九皆入小學二十以上擇業成者旬一試之十試中格者始得入大學方許應舉未中格者且居小學未得應舉大學分四科一曰徳行二曰學術三曰文辭四曰政事徳行之科居縣者縣之令佐與學官令衆推擇察得其實以其名薦于州其學行畧道其故州之長吏與學官再加審察得其實以禮聘之縣令津遣赴州學命學官舘之數與議論以察其學識旬月而歸以簿籍其姓名俟科塲州長吏及學官以參求可以應者貢于朝如居州學者惟學官薦之州長吏察之學術之科以多聞博識明義理辨節文考典故為業一曰明經經無多少自一經至于六經經為易詩書春秋禮樂如禮兼明三禮如樂雖無經亦參取六經所言而求之凡明經必兼治孝經論語孟子二曰習史究量歴代治體安危成敗及典故沿革文辭之科皆習雜文為業如制誥章奏文檄書問碑銘詩賦之類如唐制政事皆務究知利害本末及措置之法如吏文條陳利害如法令脩立條約不必文辭惟取措置議論優長為善已上惟徳行一科皆從推擇禮聘外自學術文辭政事三科並依科塲法許人應舉亦自逐縣官以格陞之州學學官又選其能者籍之每有科塲學官以其名聞于州州申轉運司轉運司選官考試如舊法額定中選人數貢于尚書禮部其課試髙下之法以所習之髙下多少為等凡學術文辭之科皆兼習史及文辭為上所兼習或史或文辭者次之止習三經者又次之止習二經者又次之止習一經或習史者又次之習文辭者次之習政事者為下明經者一經為一塲試義三道習史者試策三道文辭者試雜文二塲毎塲問目五道如兼習文辭政事止各試一塲已上徳行科比制舉學術文辭科比進士政事科比諸科古者四十始仕今則成童以上皆得應舉故人之子弟不務積學蓄徳自稍有知己奔馳仕進之門又為學之序未嘗分别大小往往躐等以進羣應有司其藝稍中有司之格者十無二三使人才不成實原於此故今立學制分大小學之法自十九以下皆居小學二十以上其藝可升大學者方升之大學始得應舉則童子必能安業所習有序不致有違越之心庶幾成才可得而取乂或以徳進或以事舉或以言揚未嘗一科取之自漢唐之盛雖未能方古亦數路設科以收人才今專以進士一科取之其所試者止於經義策論而已及其中選則百官之事皆得而任之就其素學而論盖欲明義理而習文辭也當官決事則所知義理莫知所以施為一有辭命則所習之文不足以應用謂之賢歟而不知其徳之可任謂之能歟而不知其才之可使盖所飬非所求所求非所用飬才取人之失無甚於此議更改科舉復用詩賦此特少濟有司考校之末無益朝廷育才用人之實若明立四科以籠人才則庶幾有得又古之仕者莫非上之人取之非下有求而後予也故上有下賢之美士無失己之恥今一切使之投牒自進無以異於市井臣僕非所以飬士之廉其本已䘮則為士者輕為士者輕則雖有美才令徳不足任也今欲悉命學官採擇然後州長吏召而試之少厲士風不為無補三試法試法者凡初入仕人如初及第人奏薦未出官之類在京委開封府及府界提㸃司在外委監司郡守蕃察人才可當何等職事先令權攝管局或差委定奪公事以識其才滿嵗考定分為四等政迹可觀為上等職事粗舉為中等職事不廢為下等職事曠廢為劣等除劣等且令守選習學外餘皆保明即依所定等所任官差注所定等為各次髙下所任官各分差注其第一任謂之試官於銜中帶試字任滿如前法監司郡守考定四等上等者注優便官中等者注合入官下等者再試一任劣等者勒令守選習學凡守選習學者皆滿三年方令再試一年雖係上等遷一資中等不遷改優便官下等如故劣等降一資禄官亦合守選不給俸錢次任依此考定優劣遷降四辟法辟法者官長皆許辟屬官一員以自助内則尚書侍郎卿監尚書侍郎許辟郎中員外卿監許辟丞簿各一員外則帥臣監司郡守帥臣監司各舉二員郡守舉職官或曹官一員各辟所知所辟者去官則從而罷所辟非其人許御史録奏學官同此五舉法舉法者内則諫官御史郎中祕書博士外則監司郡守縣令學官監局皆得舉受内官及監司許待制以上舉郡守許監司及待制以上舉縣令許監司郡守舉外學官許監司及兩省官御史郎中司業待制以上舉外監局許監司舉係課利及萬者凡内官及監司郡守學官皆云舉者籍其名有闕則擇而用之縣令及監局許監司指名指闕奏舉政迹在優劣等者舉主皆有賞罰六考法考法者先立所蒞職事主意所在以為責任之詞如守令則曰政平訟理民足士勸恤困窮止姦盜辦賦役之類如監司則曰察舉愆違而不入苛細長財足用而不渉掊克薦滯才舉廢事申無告去積弊之類獄官則曰必得情無久繫寃者得伸有罪者不可茍免學官則曰長育人才必有成就激厲風俗無使媮薄如此類例脩立百官殿最之目而有司條格略立大法餘皆聽其自為嵗終一考則定其殿最而升黜之雖無顯過但不如所責者皆在所黜凡授官者如自度不足以當責任許自陳改授他官此四法於選官庶幾盡知盖試法之立足以區别能否不致多容濫進辟法之立使官長自擇僚佐足以深任其責舉法之立使在上者多知人才緩急之用不患乏人考法之立使非才者不敢幸進無功者不可茍容仕路之清無越於是今之入仕亦有試法止於經義斷案而已所試經義方欲酬對有司非能究逹義理固未適於實用如律義斷案但可粗施於法官然亦泥文執法不可常行不若實試以事自見其才舊格惟帥臣監司及朝廷專使許辟一二属官而已近制復亦罷去大抵闗防朋比私謁之弊然自漢唐以來僚属皆官長辟除所以深責治効雖不能無請求私徇之意茍朝廷責任之嚴人人欲得僚吏以為己助亦安肯多取不才之人如果得其人雖舉子夫復何恤此法不行止可革其小害而失其大利非計之得也舉非其人既立彈奏之法又孰敢以非才充選乎竊見朝廷毎有除授常患乏才此盖未嘗素求人物以備一旦之用緩急之際選擇不審則授任失當殊非用人之法莫若立法使各舉所知而籍之又命執政大臣及吏部更審訪其才應與不應所舉一官有闕擇而用之以其人之殿最為舉者之賞罰則濫進者寡矣今之選曹所患者員多闕少按其治行則舉職者寡而不職者衆此乃全無考法責任不精之所致夫樂貴而惡賤樂富而惡貧人之情也如使居髙位者責重居下位者責輕則才薄之人必不敢冀其髙位矣有祿者有責無禄者無責則無才之人亦不敢徼幸於寵禄矣無他責之以實之効也監察御史上官均上奏曰臣聞為國之道莫急於任賢求賢之術必資於薦舉所薦既博則所得者多而四方之英才皆為國家之用天下豈憂不治哉自陛下臨御講修百度夙夜求賢以康庶務始詔侍從舉堪為諫官者各二人繼乂詔薦中外之臣以充監司之選詔命始下從官人人皆務蒐擇端方謹厚之士以副朝廷旁求之意中外翕然號為得人近又詔侍從兩省左右司内外臺薦公明廉幹才堪理劇者俾治多盜縣邑其於求才可謂博而詳矣然而愛憎好惡者天下之常情也好則相譽而忘其不善惡則相毁而忘其所可稱人情之所同也自侍從以及外臺固朝廷一時之選然捐私尚公以薦賢報國為已任者未必皆然也方陛下臨御之初人情未敢營私繆薦以取咎戾竊恐法久弊生背公徇私之意作故舊則以情相望權勢則以力相軋薦舉之人唯權與舊則公路塞而真才棄矣昔仁宗嘗興孝廉之舉未幾薦者牽於私徇多非其人遽詔寝罷議者惜之檢㑹元豐令受勅特舉官者奏訖且以所舉官報御史臺近來報者絶少臣等不盡聞之考薦不實無由彈奏臣欲乞今後令章奏房及内外舉者奏狀到𤼵限三日内闗報本臺庶幾臣等得以盡知薦舉非才職事隳廢與本臺監司考核有實者從中書籍記顯加譴罰毎人三薦不實者特勅舉官不得參預如此則人人顧義畏法以妄薦為恥真才實行可坐而得而疎逺寒畯之士無不用之歎庶㡬并謀合智以成太平之治實非小補均又上奏曰臣竊見前日勅令太中大夫諫議待制以上每嵗以十科薦士兹見陛下博收羣才因能任官之意自三代以來設官分職雖多寡不同然取人大要不過或以徳行言語政事文學而已今以十科取人其於徳行言語政事文學之選固已兼取然論政事止於治財賦聽獄訟斷請讞三事而已竊恐政事之目有所未盡何則能治財賦者未必長於聽獄能聽獄者未必長於斷讞能行三者未必寛信敏惠足以長人今之所謂長人之官者守令是也今之守令雖有累嵗月用薦舉闕陛之法然至於劇郡大邑若止循資序不加選擇恐未必得人有傷士敗材之弊不獨如是自比年以來郡縣考課之法文具而不行未聞擢一良守進一賢令以聳動天下故郡縣之吏亦務為碌碌細謹守繩墨治簿書督租賦而已未聞諄諄慈良以治人為務盖自非豪傑自信之士未有不待賞而後勸也若褒賞不加薦舉不及天下守令長於理劇者豈復有亹亹樂進之心哉臣欲乞於十科外更益以才堪治人能撥煩者别為一科劇郡大邑有闕因以除授如此則人無遺才而天下之守令莫不勸矣守令勸則郡縣之政理天下之民被朝廷之徳澤而太平之功立矣均又上奏曰臣昨於七月二十二日甞具奏論太中大夫諫議待制以上毎嵗以十科薦士外更益以才堪治人能撥煩者别為一科至今未䝉施行臣竊以為治天下之道以民為本朝廷之政令法度加於四方者莫不在民而治民之親者實在守令之能否守令能否實係政令之廢舉生民之休戚自漢及唐號為至治者如孝宣太宗明皇未嘗不孜孜選任以守令為急當是之時徳澤流暢逺近乂安無疾苦愁嘆之聲者誠郡縣得人之助也今天下列郡三百為縣千餘其守令治績章章可稱者罕見其人則朝廷徳澤之壅閼逺近民庶之未安盖有由矣兹豈人材之不迨曩昔耶由奬勸選任之術未至耳奬勸之術無他在夫使貴臣薦之而朝廷旌用之而已彼天下之士大夫雖均為守令有以才見稱為逹官之薦使治劇郡大邑則才者樂於在上之見知而四方之守令莫不觀望而勸進故薦舉拔用不過數十人而天下郡縣之吏靡然鄉風矣不過數十年而天下之良守賢令彬彬布於州邑逺近之民豈憂不治哉又郡縣之政訟有聽斷聽斷有得失民有賦役賦役有當否至於政有寛猛獄有繁簡民有喜怒守令之能否較然彼薦舉之官恐有不稱之責且不敢妄薦則薦舉不得人非所患也今以十科薦士下至理財斷獄請讞皆得預選彼寛厚明敏長於治人者獨不備數郡縣之吏必以為朝廷輕守令之選而不以民事為重也夫賞之則勸沮之則惰者人之常情也薦舉不及奬勸不加而責天下之守令銳意於治民而奉朝廷之法令臣愚竊恐其未能也夫守令之職以愛飬安治為本清心治已為要自非寛厚明敏學道愛人者鮮能及之盖春秋長於治人由求孔門之髙弟僅能宰千室之邑治千乘之賦況其下者乎今十科薦士下至理財讞獄之細皆得被選至於寛厚明敏善於民事者獨不及之是取小而遺大畧本而詳末天下郡縣之吏將且怠惰茍且不復勸勵朝廷之徳澤志慮誰與宣而奉行歟盖朝廷出一令立一法實繫四方之觀聴百官之趨向不可不審其𤼵也願陛下詳覽臣之愚言若粗闗治體不為無益乞増薦條以備遺缺中書舍人曽肇上奏曰臣奉詔詳議三省所定科舉條制其經義詩賦等科已與吏部尚書孫水等連狀詳定奏聞外有經明行修舉人一項臣竊有愚見須至别議臣伏以國家取士之制人材之盛衰風俗之羙惡繫焉今設經義詩賦等科施之一時則可矣然皆取人以言而不本其行方之於古臣竊以為未也至於詔内外官舉經明行修之士中第之日稍優其禮則不獨取之以言又本其行其意庶乎近古然徒使舉之而不繇鄉里之選又無考察之實與斯舉者隨衆投牒試於有司糊名謄録校一日之長則不唯士失自重之誼且於課試之際無以别異於衆人則所謂本其行者亦徒為虚文而已恐未稱所以命官薦舉優其恩典之意也竊觀三代兩漢人材之盛風俗之美後世所以不能及者取士以行不專以言故也今雖未能盡復古制故經義詩賦等科未可盡廢然馴致先王之治亦宜有漸則經明行修謂宜别立一科稍倣三代兩漢取士官人之法因今之宜斟酌損益要之無失古意而已至於投牒乞試糊名謄錄之類非古制者一切罷之待遇恩數盡居經義詩賦等科之上庶使學者知尊經術篤行誼人人勉於自脩自一鄉推之以至一縣一縣推之以至一州一州推之以至一路一路推之以至天下則四方之士莫不知尊經術篤行誼以待上之求應上之用如是而人才不盛風俗不美未之有也人材既盛風俗既美則所謂經義詩賦等科非以行誼進者人將恥為之不期於廢而自廢矣如此則經明行修之舉有得士之實不為虚文而已也或謂以行取人則有浮偽矯詐之弊盡去防檢則有交通請謁之私臣以謂此殆論者之私憂過計也夫左道亂衆色取仁而行違者固聖人之所深惡然必有以察之試之於利害得䘮之地則可見矣凡人之情孰不好善朝廷誠能正心誠意進任正人明義利之分辨榮辱之境以示天下則雖蚩蚩之民莫不用情以應上況於士哉然則所謂浮偽矯詐之弊非所憂也明考察之方公進退之法以任人之得失為舉者之賞罰行之以信持之以久風俗日入於厚則交通請謁之私又非所憂也三代兩漢之治去今逺矣然臣猶惓惓以此為言者幸遇朝廷欲得經明行修之士故臣欲繇此而充之以至於復先王之制以成朝廷之美意其言雖迂其効雖逺然有志於古者恐不能以彼而易此也伏望聖慈特加詳察如臣言萬一可採其設科舉士之制願詔有司取三代兩漢之法見於今者叅時之宜裁定其當樞宻直學士王存上奏曰臣准尚書禮部牒准勅尚書侍郎學士待制兩省御史臺官國子監長貳詳議科舉事臣已與孫永等所議外有制科一項云依舊制此為未安臣竊見近世制科所試論策題目務出於僻隱難知是以應此科者競為記誦名數之學非所以稱方正之舉先朝深知其弊遂行廢罷今議復置儻䝉允降若並依舊制即不免襲前日之弊無補治道欲乞下有司重行詳定制科考格所取務先識畧不專責以記誦名數之學至於取人多寡推恩厚薄並乞裁定二年吏部尚書蘇頌諭制科取士疏曰臣伏覩今年四月戊申及七月乙卯詔書復置賢良方正能直言極諫科並立定策入三等四等次推恩條制有以見陛下勤求俊良樂聞讜論士之抱術略懐憤懣者當繼踵而赴詔矣然臣竊觀本朝故事制科程式太嚴取人太窄自真宗以來每舉中第者多不過三人少或一人至有全不放者使豪傑之士有老於科舉而不預甄擢恐非朝廷聽言求士之意臣謹按漢文二年始詔舉賢良時對策者百人而晁錯為上第武帝元光五年詔舉對策者亦百人而公孫𢎞為第一歴代沿襲廢置不常至唐而特盛每遇親策賢良等科中等者常不下一二十人建中元年姜公輔等二十五人貞元元年韋執誼等一十七人四年崔元幹等一十七人十年裴垍等一十七人元和三年牛僧孺等一十五人長慶元年龎嚴等一十五人寳歴元年唐伸等一十九人太和二年裴休等二十二人自餘幽素將相等幾數十科取人亦衆其得士若蘇􅅛蘇頲父子張說張九齡韓休裴垍楊綰崔羣韋處厚姜公輔牛僧孺元􅍬裴休輩皆出此選卒為輔弼名臣此外竒才博識之士垂名于後者不可勝數信乎制科親策可以收攬英俊有補於治道也而當時應詔之人或命州郡薦舉或許上書自陳被召者徑赴御試其推恩等第則第三等中書門下超資與處分第四優與處分第五等即與處分由是言之程式盖不甚嚴而推恩亦不甚厚至周顯徳四年始詔逐處州郡依貢舉人式例别試解送尚書吏部量試策論三道共三千字内取文理俱優者方得解送上都本朝之制又加以六論或試於中書或試於祕閣合格方得赴御試其所試論題務求深奥毎舉轉加艱難致合格者少盖以推恩過厚故取人益艱況國家承平日久天下學士陶染風教競習藝文而應此科者尤號該洽其程文縱非優長未合上等亦皆於古今義理潜心有素若䝉采收施之為政必須優於專經之人不為無益於朝廷也臣竊謂今來既立定策第推恩有厚薄則所取亦宜稍加人數臣愚欲望將來或請應人稍多即乞優加分數如合格人少即乞更加第五等分為上下入此等者只依進士第二甲第三甲注官亦不為徼倖若恐更添入流之人即乞以進士諸科御試不合格人數留充制科數目彼此通融俱無所礙如此則四方特起之人咸有榮進之望聖世捜揚之路蔑有壅蔽之嗟矣三年翰林學士朝奉郎知制誥蘇軾等上奏曰臣等伏見從來天下之患無過官冗人人能言其弊而不能去其害惟往年韓琦富弼等獨能裁減任子及展年磨勘𤼵議之初士大夫相顧莫敢以身當之者以為必致謗議而琦等不顧既立成法天下肅然無一人非之者何則私欲不可以勝公議故也流弊之極至於今日一官之闕率四五人守之爭奪紛紜㢘恥道盡中材小官闕逺食貧到官之後求取漁利靡所不為而民病矣今日之弊譬如羸病之人負千鈞之重縱未能分減豈忍更添臣等自入貢院四方免解舉人投狀稱本来是龍飛榜乞為敷奏法外推恩者不可勝數臣等一切不行兼不住有經朝省下狀蒙送下本院只是坐條告示近准聖㫖依逐舉體例下第舉人各以舉數特奏名已約計四百五十人今日又准尚書省劄子取前來聖㫖特奏名外各逓減一舉人數若依此數則又添數百人雖未知朝廷作何行遣不當先事建言但恐朝命已行即論奏不及臣等伏見恩榜得官之人布在州縣例皆垂老别無進望惟務黷貨以為歸計貪冒不職十人而九朝廷所放恩幾千人矣何曽見一人能自奮勵有聞於時而殘民敗官者不可勝數以此知其無益有損不言可知今之議者不過謂即位之初宜廣恩澤茍以恱此僥倖無厭數百人者而不知吏部以有限之官待無窮之吏戸部以有限之財禄無用之人而所至州縣舉罹其害乃即位之初有此過舉謂之恩澤非臣所識也伏乞斷自聖意明勅大臣特奏名舉人只依近日聖㫖指揮仍詔殿試考官精加考較量取一二十人委有學問詞理優長者即許出官其餘皆補文學長史之類不理選限免使積弊之極増重不己臣等非不知言出怨生既沗近臣理難緘黙四年御史中丞傅堯俞上奏曰臣等伏以天子親策貢士自漢以來未之有改唐之進士雖試詩賦然有司奉行而已國朝開寳六年太祖始召進士親試於廷當時公卿不知建明易以策問而唯詩賦之用因沿著令莫之能改神宗皇帝以為非天子臨軒所以延見貢士詢求治道之體熈寧三年始改問策迄于元豐五賜策矣廼者陛下遵先帝之舊親策進士所問災異夷狄官冗財費之類皆今日急務不可以已而議者獨疑以為定例之可預造且韋布草野之士脩於家肄於學日夜講說之道固所以待問於上也誠能攄其藴蓄應問如響不失所對雖預備而貫穿之何害於得士若夫知捃掇陳說充以蕪語無當於對問而弗加汰擇荒唐濫中佞諛希合以異為瑞之類而弗加糾絀皆考官之過非策之訾也議者徒知對策之宿造預作不知辭律之學亦有記誦編集之患知進士之能備問不知賢良茂材之備問尤詳也臣等以謂學校教諸生州郡𤼵解禮部考貢士今已悉用詩賦足審其辭所有御前進士宜一依先帝故事試策合於古義於體為允其御試對策雖有文采而於問義不相當若詞渉䛕媚及文理疎淺者宜約舊制量定分數取㫖絀落不得雷同入等如此則士無濫中而考官不敢率意升降矣貼黄稱制策所問安有定制或古今政務或天下名數疑難之類如漢董仲舒對符命性情文質之異杜欽以經對六事繫自臨時取㫖非踈逺所能一一預度不當偶以前日隂雪衆人所知而謂皆可宿造也殿中御史孫升上奏曰臣聞太平之基必在得賢大臣之功莫如薦士天下未嘗無材搢紳之士如林而朝廷每以人材乏用為患大臣有志於天下者必以人材為先人主有意於太平者當以飬士為急古人謂士不素飬而欲求賢譬如不琢玉而求文采也祖宗置三館圖書之府聚四海英俊之材優其禄賜異其資任試以内外要劇之務觀其進退去就之節待其噐業之成以為廊廟之用此實致太平之本也世固有知道不茍之士懐難進自重之節知之匪易薦之甚難若僕僕然自鬻於權門惟恐其不售者雖得千百何補於國哉祖宗登用大臣必俾之薦一二名士朝廷内外由是以知大臣之賢否而下及後世推此可考其人知識之淺深富弼韓琦功在社稷名光後世者薦士之力也陳執中王珪身死名滅為天下戮者蔽賢之罪也盖不以天下為心專為持禄固位之計自待不厚則以薦士為嫌恭惟陛下臨御之初首詔大臣各薦異材以試館閣可謂急所先務矣此舉寂寥今復已久為國者徒知人材乏用為患不以薦賢飬士為急願陛下明詔大臣各依近制首薦名士既觀今日之所舉可考平日之所存則濟濟多士不獨見於周也八年侍御史楊畏上言曰風憲之任人主寄耳目焉御史進用宰執不得預顧令兩省属官舉之非是遂寢前命武臣薦舉立格有枚别職任而舉之者有槩名材武而入之銓格者又其上則謀略膽勇可備統衆諳練兵事可任邊寄之類惟邊要任使𨽻樞宻院餘則審官西院三班院按格注之其後雖時有更易而薦舉之所重輕選用之所𨽻属多䂓此立制哲宗時劉摯上言曰臣伏覩近制升朝官各舉進士經明行修一人及升等推恩理為舉主過犯同罪等事臣竊原朝廷之意患程試考校徒得文詞故更立此制以進行實天下幸甚臣退而熟計及考學士大夫之議以謂法則善矣然使常朝官舉之不若使郡守以上舉之便臣謹條上利害按國家舊制臣寮任通判知州乃得舉官盖知人實難非行已慎閱事久誠未可責以保任今升朝官無􅂍罪若私罪重此外不計資任不察能否門調諸科刀筆之吏一切得薦士此不可一也經術深淺問而可知也至於行義汙潔非鄉里庠序羣居久處毁譽素著誰能知之今不拘路分但非有服親皆得奏舉臣恐流離之人虚偽見售此不可二也天下升朝官無慮㡬二千人則所薦士亦如之積累嵗月不被薦者無幾矣人人升等推恩無以示勸此不可三也議者謂朝士固皆選擇可任使之人然入流不一員品猥衆今勢利相市必有受賕構訟以撓陛下之法者臣誠淺薄不敢億度朝士大夫以為必然亦不敢以為不然然則舉選之利未見而奔競之俗先成此不可四也傳曰十室之邑必有忠信計今天下之士一郡一邑隨其衆寡必有善士考鄉里之行詢庠序之論其勢親其事察無如州郡之吏至於監司則朝廷所任以按察臺諫侍從亦朝廷所倚以議論故臣願每遇科塲詔下委逐州長吏奏舉經明行修進士一名仍以應舉實二百人為率不滿二百聽舉一名每二百人加一人至三人止監司轉運判官以上於本路在京臺諫以上於開封國子監各許奏舉一名非鄉貫及不經學校或無可應詔並聽勿舉自餘升等推恩理舉主同罪犯等事並依元降朝㫖臣愚以謂三代鄉舉之制未易遽復欲少放古則諸侯嵗貢之法莫此為近伏望詳酌施行摯又建明貢舉條制其一曰臣伏見國朝以來取士設科循用唐制進士所試詩賦論策行之百餘嵗號為得人熈寧初神宗皇帝崇尚儒術訓發義理以新人才謂章句破碎大道乃罷詩賦試以經義士儒一變皆至於道夫取士以經可謂知本然古人治經無慕乎外故其所自得者内足以美已而外足以為政今之治經以應科舉則與古異矣以隂陽性命為之說以泛濫荒誕為之辭專誦熈寧所頒新經字說而佐以莊列佛氏之書不可詰之論爭相夸髙塲屋之間雖羣軰百千而混用一律主司臨之珉玊朱紫困於眩惑其中雖有真知聖人本指該通先儒舊說茍不合於所謂新經字說之學者一切在所棄之而已至於蹈襲它人剽竊舊作主司猝然亦莫可辨盖其無所統紀無所隠括非若詩賦之有聲律法度其是非工拙一披卷而盡得之也詩賦命題雜出於六經諸子歴代史記故重複者寡經義之題出於所治一經一經之中可為題者舉子皆能類集裒括其數預為義說左右逄之纔十餘年數牓之間所在義題往往相犯然則文章之體貢舉之法於此其敝極矣詩賦之與經義要之其實皆曰取人以言而已也人之賢與不肖正之與邪終不在詩賦經義之異取於詩賦不害其為賢取於經義不害其為邪自唐以來至於今日名臣鉅人致君安民功業軒天地者磊落相望不可一二數而皆出於詩賦則詩賦亦何負於天下或取一詩賦或取一經義無異道也但有司攷言之法有難有易有難易故有利害有利害故去取或失其實而所繫者大矣然則法不可以不改也臣愚欲乞試法復詩賦與經義兼用之進士第一塲試經義第二塲試詩賦第三塲試論第四塲試䇿經義以觀其學詩賦以觀其文論以觀其識策以觀其材前二塲為去留後二塲為名次其解經仍許通用先儒傳注或已之說而禁不得引用字解及釋典庶可以救文章之敝而適乎用革貢舉之敝而得其人亦使學者兼通他書稍至博洽其二曰臣伏見漢唐之制因天見災異或政有闕失則詔郡國及在位舉賢良文學之士天子親策以求其言至於國朝沿襲故事於是置為賢良茂材科目隨貢舉召試其於得人視古為盛近時之制遂罷此科臣竊以為國之道得士欲廣故取之非一塗謂常選不足以致異人故設制科以收超絶之才而每舉中等不過一二人而已今夫官人之法入流門戸日益増多未有澄汰而於三年取一二非常之人則廢其科不用此何謂也臣愚欲乞復置賢良方正及茂材異等科每遇貢舉詔近臣依舊制舉試所以廣言路求人材繼祖宗之制也其三曰臣伏見近制明法舉人試以律令刑統大義及斷案謂之新科明法登科者吏部將司法員闕先次差注在進士及第人之上臣竊以先王之治天下以禮義為本而刑法所以助之者也唯君子用法必傅之以經術法之所治理之所在也故惡有所懲而常不失忠恕之道舊制明法最為下科然其所試必有兼經雖不知其義止於誦數而先王之意猶在也今新科罷其兼經專於刑書則意若止欲得淺陋刻害之人固滯深險之士而已又所取之數比舊猥多調擬之法失其次序臣以謂宜有更張欲乞新科明法並加論語孝經大義登科之額裁減其半及注官之日並依科目資次所貴從事於法者稍不逺義而士之流品不失其分伏望聖慈裁酌如賜開允即乞今年降詔並自元祐五年秋賦為始御史中丞蘇轍上䟽曰臣近准勅與孫升同舉監察御史二人尋准尚書省劄子以一員不曽實歴通判令别舉官聞奏臣檢㑹元祐三年六月八日聖㫖左右司諫左右正言殿中侍御史監察御史並用升朝官通判資叙實歴一年以上人舉官准此臣竊詳上條本為朝廷除授而設後來朝廷所除諫官如吳安詩劉唐老司馬康三人皆未曽實歴遂再奏乞比附施行尋又䝉尚書省劄子令依條别舉臣退復思念豈以除諫官皆出聖意故得不依條法舉臺官出於有司故不得援例邪竊惟前件三人惟司馬康故相光之子光被眷任最深康亦素有清譽或為二聖所知至於吳安詩劉唐老此二人者何縁得被聖眷若非大臣進擬或宻有薦導陛下何縁知之竊謂本臺所舉亦合依例施行況朝廷前後所用百官亦多不應格豈固違法盖不得已也若獨於臺官固執近法中外必以為疑伏乞檢㑹前奏早賜施行轍又上䟽曰臣頃權吏部尚書竊見京朝官以上皆使一年以上闕大小使臣及選人皆使二年以上闕雖闕少員多事不得已而待闕之人已不免咨怨近者復見堂除人亦有待闕及一年以上者人情驚駭昔所未見盖祖宗朝堂除舊例皆見闕然後差除因事然後超擢所除既有限量故用闕不至久逺近嵗監司以上員數至多而猥更擢人以至衍溢所擢未必勝舊徒使監司闕額不足以應副来者而已至於知州以下舊人未減新人日増盖由干謁成風除授無法雖稱以才擢用其實未免縁故至於待闕久近所任閑劇衆口譏評皆為之說只如開封司録舊用歴知州人頃自郭晙之後未及三年而迭用陳該張淳陳元直三人率皆資望輕淺政績未聞新故相代輕用堂除於此可見及諸寺丞例亦如此臣欲乞今後謹守祖宗故事凡堂除皆竢有闕方差且將見今堂除人輪環充補其新擢用者皆須功譽顯著然後得差盖用人之法要須員闕相當未聞無闕添人謂之擢才濟用者也如此數嵗若見闕稍多然後量闕選才理無不可庶使堂除官吏不復待闕與四選稍異亦旌勸之義也轍乞改舉臺官法劄子曰臣伏見唐制御史属官皆大夫中丞自舉及本朝舊法亦皆丞雜及兩制舉人盖以人主耳目之官不欲令執政用其私人以防壅蔽近自元祐三年六月八日聖㫖指揮殿中侍御史監察御史並用陞朝官通判資序實歴一年以上人自是以來雖時復令本臺及兩制舉官而終無一人應格可用何者古自選人改官經兩任知縣一年通判若稍有才名多為朝廷擢用其餘碌碌無取難以復堪臺官雖或間有沈淪未見知賞然盖亦已少矣今法限取此人已傷苛細而又縁此祖宗舉臺舊法久廢不用而執政以意選用舊人之例遂以成風近日雖聖意開悟復令臣等舉官然弊法尚存方人物衰少之時實患難以應法伏乞檢臣前奏稍改近制令臺官得舉陞朝第二任知縣及通判以上各半若謂知縣資淺乞依尚書侍郎例許權監察御史所貴稍存祖宗故事不至執政自用臺官雖方今君臣相信法度可畧而朝廷紀綱不可不思久逺臣職在臺長臺中典章義當固守轍為右司諫又言科塲事状曰臣伏見尚書禮部㑹議科塲欲復詩賦議上未決而左僕射司馬光上言乞以九經取士及令朝官以上保任舉人為經明行修之科至今多日二議並未施行臣竊惟來年秋賦自今以往嵗月無幾而議不時決傳聞四方學者知朝廷有此異議無所適從不免惶惑懣亂盖縁詩賦雖號小技而比次聲律用功不淺至於兼治它經誦讀講解尤不可輕易要之來年皆未可施行臣欲乞先降指揮明言來年科塲一切如舊但所對經義兼取注䟽及諸家議論或出已見不專用王氏之學仍罷律義令天下舉人知有定論一意為學以待選試然後徐議元祐五年以後科舉格式未為晚也彭汝礪上奏曰右臣頃以不肖任中書舍人嘗論列用詩賦之弊前後累經臣僚議論用四塲通考六經雖絀猶有存焉者如今所議盡廢矣竊縁詩賦科久不用學者實未之習今或以一聮一句可取即超躐並進而治經之人竭精罷力窮深極逺有至於皓首而偶遇不習聲律遂取屏廢不得與浮靡之士望分寸之禄此議者所以紛紜而有志之士或至於太息流涕而不知止也臣竊以為聖人不為已甚今朝廷􅂭尚詩賦詩賦既尊矣通經之士雖未能皆是然其口之所誦心之所懐皆所以治心治身治國治天下而議者過計欲一切掃除屏棄而獨以無益之辭未成之文理超拔而尊寵之臣不知所謂也臣以謂國家取士將欲得人才也經義策論可以得人才詩賦亦可以得人才何必紛紛為此異同也臣今起請且欲如元祐勅施行如詩賦在優等經義策論雖不善亦取之所以示朝廷以文詞為貴也經論在優等詩賦雖不善亦取之所以示朝廷以儒術為貴也策在優等詩賦雖不及亦取之所以示朝廷以知時務者為貴也如此則有文詞者得騁其辭有學者得盡其藴有知識者得竭其慮上無損國體下不失士心今開試日廹未敢深盡本末欲望聖慈特賜詳酌施行汝礪又上奏曰右臣伏念自井田之制壊學校之教廢弛鄉舉里選之法不行朝廷取士一切非古其弊至於用賦極矣先皇帝受天明命悼道之鬱滯奮於獨斷􅀄用經術造士以革數百千載之弊中自京師外薄四海無有逺近貴賤小大莫不變易思慮奉承至教士既知本人且向方而議者獨病辭說之不工欲踵隋唐之弊法卑玩經文耗蠧道真靡知所􅃕夫六經之說更伏犧堯舜禹湯文戒周公孔子數十聖人而後備大窮天地之變㣲盡萬物之理其要則在人心而已古之君子所以治身所以治天下國家未有出不由户何莫由斯道也周衰典籍不用漢興始求遺書立博士置弟子員策賢良求經術以䆒當世得失公卿大夫以儒雅飾吏事是時文章温厚號令爾雅最為近古其流至於東漢㣲矣而餘風遺烈猶足以動當世士以節義自髙不為死生禍福屈折漢亡而存猶更數世自普訖唐又不能及漢治亂厚薄推源可知詩賦不經可以無辯是猶滑稽俳優之戲而已是猶閭里嘔唱之辭而已而議者欲以此教人欲以此取士欲以此致太平臣考之于心騐之于人稽之於古合之於今反覆曲折終未見其可天之生夫斯人也其聡明智慮皆可以有為也惟上之所飬而已昔者以詩賦取人故人應之以言辤其文浮而無實以經術取人故人應之以義理其言辨而在道使取之以徳行亦將為徳行矣姑罷詩賦從經術是將引而髙之以至於徳行也如復用詩賦是所謂下喬木而入幽谷也先皇帝聰明博文所以造士立政固非臣下所能窺測淺深髙下如罷詩賦孰不知其為甚幸法之未完或久有弊變而通之推而行之繼志述事實待陞下豈易於改負謗議於天下後世臣愚以謂今學校選舉宜一用先帝故事因今經明行脩賢良方正之科而稍加損益焉雖未能復古盖亦庶幾矣如詩賦決不當復用臣淺陋信不足以單辭獨見咈衆人之所同好議朝廷已行之法度必未能齊一伏乞下學士大夫詳議可否使臣得上下反覆庶幾是非好惡有所歸宿貼黄臣伏自朝廷有復詩賦議論學士大夫知其不可者難遂施行比見指揮催督太學即用此考校又有乞試用三題者朝廷亦不為罪乃知復詩賦不疑夫天下之所待者人材人材惟上之所養而己天下治亂廢興是繫風俗成壊盛衰是繫今制為名聲列為章句引之以雕蟲篆刻無用之文其所以敗壊人材為甚臣以事所係者大故不敢隱黙不言尚庶幾捄止萬一也惟陛下裁幸歴代名臣奏議卷一百六十七
