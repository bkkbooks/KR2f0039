body:
  text: 歷代名臣奏議卷二百七十四明楊士竒等撰崇儒東漢章帝元和二年春帝東巡還幸闕里以太牢祠孔子及七十二弟子作六代之樂大會孔氏命儒者講論蘭臺令史孔僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯使校書東觀和帝永元十二年帝召見諸儒魯丕等相難數事特善丕説賜以衣冠丕因上疏曰説經者傳先聖之言非從已出若規矩權衡之不可枉也難者必明其據説者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自説師法博觀其義無令幽逺獨有遺失也魏明帝初即位廷尉髙柔上疏曰臣聞尊道重學聖人洪訓褒文崇儒帝者明義昔漢末陵遲禮樂崩壞雄戰虎爭以戰陳為務遂使儒林之群幽隱而不顯太祖初興愍其如此在於撥亂之際並使郡縣立教學之官髙祖即位遂闡其業興復辟雍州立課試於是天下之士復聞庠序之教親俎豆之禮焉陛下臨政允進睿哲敷𢎞大猷光濟先軌雖夏啓之承基周成之繼業誠無以加也然今博士皆明經行修一國清選而侵遷除限不過長吏懼非所以崇顯儒術帥勵怠惰也孔子稱舉善而教不能則勸故楚禮申公學士鋭精漢隆卓茂搢紳競慕臣以為博士者道之淵藪六藝所宗宜隨學行優劣待以不次之位敦崇道教以勸學者於化為𢎞帝納之唐太宗貞觀二年帝謂侍臣曰為政之要惟在得人用非其才必難致理今所任用必須以德行學識為夲諫議大夫王圭曰人臣若無學業不能識前言往行豈堪大任漢宣帝時有詐稱衛太子聚觀者數萬人衆皆致惑雋不疑斷以蒯聵之事宣帝曰公卿大臣當用經術明於古義者此則固非刀筆俗吏所可比擬太宗曰信如卿言太宗又謂中書令岑文夲曰夫人雖稟定性必須博學以成其道亦猶蜃性含水待月光而水垂木性懷火待燧動而焰發人性含靈待學成而為美是以蘇秦刺股董生垂帷不勤道藝則其名不立文夲曰夫人性相近情則遷移必須以學飾情以成其性禮云玉不琢不成器人不學不知道所以古人勤於學問謂之懿德懿宗咸通中著作郎皮日休上疏曰臣聞聖人之道不過求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至于吾唐乃策王號七十子之爵命自漢至隋或卿大夫至於吾唐乃封公侯曽參之孝道動天地感鬼神自漢至隋不過乎諸子至於吾唐乃旌入十哲噫天地久否忽泰則平日月久昏忽開則明雷霆久息忽震則驚雲霧久鬱忽廓則清仲尼之道否於周秦而昏於漢魏息於晉宋而鬱於陳隋遇于吾唐萬世之憤一朝而釋儻死者可作其志可知也今有人身行聖人道口吐聖人言行如顔閔文若遊夏死不得配食於夫子之側愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至於文中子文中子之末降及貞觀開元其傳者醨其繼者淺或引刑名以為文或援從橫以為理或作詞賦以為雅文中子之道曠百祀而得室授者惟昌黎文公之蹴楊墨於不毛之地蹂釋老於無人之境故得孔道巍然而自正夫今之文人千百士之作釋其卷觀其詞無不裨造化補時政繄公之力也公之文曰僕自度若世無孔子僕不當在弟子之列設使公生孔子之世公未必不在四科焉國家以二十賢者代用其書垂於國胄並配享於孔聖廟堂者其為典禮也大矣美矣苟以代用其書不能以釋聖人之辭箋聖人之義況有身行其道口傳其文吾唐已來一人而已不得在二十一賢之列則未見其典禮為備伏請命有司定其配享之位則自兹已後天下以文化未必不由夫是也後周太祖廣順二年帝謁孔子祠將拜左右曰孔子陪臣也不當以天子拜之帝曰孔子百世帝王之師敢不敬乎遂拜之宋真宗嘗謂諫議大夫陳彭年曰儒術汙隆其應實大國家崇替何莫由斯故秦衰則經籍道息漢盛則學校興行其後命歷迭改而風教一揆有唐文物最盛朱梁而下王風寖微太祖太宗丕變弊俗崇尚斯文朕獲紹先業謹遵聖訓禮樂交舉儒術化成實二后垂裕之所致也人君之難由乎聽受臣之不易在乎忠直其君以寬大接下臣以誠明奉上君臣之心皆歸于正直道而行至公相遇此天下之達理先王之成憲猶指諸掌孰謂難哉彭年對曰陛下聖言精詣足使天下知訓伏願躬演睿思著之篇翰真宗為製崇儒術為君難為臣不易二論示之彭年復請示輔臣刻石國子監焉仁宗天聖八年直集賢院謝絳乞開內館恢景德之制疏曰臣聞唐室麗正史官之局並在大明華清宫內太宗肇造三館更立祕閣于升龍門左親飛白題額作贊刻石于閣下景德中圖書寖廣大延天下英俊之士乃益以內帑西庫二聖因數臨幸親加勞問遞宿廣內有不時之召人人力道術究藝文知天子尊禮甚勤而名臣髙位繇此其選也往者延燔之後簡編略盡訪求典籍是正疑文而筆工坌集有司引兩省故事别創外館以從繕寫考校之便然直舍卑喧民櫩叢接太官衛尉供擬滋削非先朝所以隆儒育才之本意陛下未嘗迂翠蓋降玉趾寥寥册府不聞輿馬之音曠有日矣議者以謂慕道不篤於古待士少損於前士無延訪之勤而因循相尚不自激發文雅漸弊竊為聖時惜也願開內館以恢景德之制至和二年太常博士祖無擇上奏曰臣伏見至聖文宣王四十七代孫孔宗願襲封文宣公乃是其人未死已賜諡矣臣切觀前史孔子之後襲封者衆在漢魏則曰褒成褒聖宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封以鄒國唐初曰褒聖或為君或為侯為公為大夫使奉祭祀唯漢平帝追諡孔子為褒成宣尼公遂以均為褒成君至唐開元二十七年追諡為文宣王又以其後為文宣公是皆以祖之美諡而加後嗣生而諡之不經甚矣欲乞明詔有司詳求古訓或封以小國或取尊儒褒聖之義别定美號加以封爵著于令式使千古之下無以加於我朝之盛典也神宗熙寧七年判國子監常秩等上奏曰切惟孔子之道萬世帝王所宜師法歷代之主雖知慕其名而不能行其道雖嘗崇其號而不能盡其實今陛下發明經術陶成天下之士至於作新百度又未嘗不推原其意可謂能行孔子之道矣然其爵號猶襲唐制臣等聞皇以道帝以德若孔子可謂道德之至者也宜因盛時追諡帝號以盡聖人之實以稱尊崇之意其冕服祠事乞下有司詳定制度又言孔子之後能明聖人之道者莫如孟軻揚雄而歷世以來未嘗加以爵號又不載之祀典欲乞於孔子廟庭建立像貌加以爵號嵗時從祀以稱陛下崇尚儒術之意帝詔兩制與國子監禮院官詳定以聞於是翰林學士元絳等上言曰恭詳自生民以來莫盛孔子雖當時無位不得以有行然其載之後世者上自天子下逮黔首莫不師用其道則其德業盛大不待論之而後著也中間有唐雖嘗加以王號在於後世尚為臣爵誠不足以仰稱先聖道德之實欲乞依國子監所請尊加帝號委得允當所有冕服祠祭等乞下有司别詳定制度孟軻揚雄出於孔子之後能明其道以闢邪説其於後世誠為有功各乞封以公爵欲並依國子監所請孔子舊號有所未盡乞别賜改諡時判太常寺李清臣奏曰臣伏準批送下判國子監常秩等劄子奏為乞追諡孔子帝號及乞於孔子廟庭建立孟軻揚雄像貌加以爵號嵗時從祀等事送臣等詳議者臣聞堯舜用道以治天下孔子明道以傳後世堯舜君也孔子臣也同為聖人道德同也堯舜聖人也孔子亦聖人也而或為君師位號不必同也故道德存於人而所歸常同位號受於天而所遭常異此事理之固然而名分之所不能齊也然則孔子雖無位豈害孔子之聖哉故歷代尊之廟貌薦奠服被衮冕弟子侍配自天子以下皆北靣師事之或封其子孫世世不絶今陛下以不世出之聰明有堯舜之位而用孔子之道德以制作法度養育天下其於二三聖人之業可謂兼之矣而左右之臣推原道之所自建畫大義謂宜追諡孔子而帝之意義甚美然臣愚惓惓切有未同者昔子路欲使門人為臣孔子之所不與今無位而帝之慮非先聖之本意且孔氏雖聖異姓也究考古今自非推五嶽之天神及追諡祖宗之同體而以異姓為帝號於故事亡有若以之顯號發策動觀聽於天下臣誠以為未安也陛下若深採儒老從官尊廣道德之意折衷其論發自聖斷特詔有司升先聖釋奠為大祀使列於郊廟日月天神之次禮樂祠事皆增而大之及封爵孟軻揚雄賜諡立像侑坐配食卓然異於武成之祀亦足以示陛下興儒隆師修德明道之大旨臣愚職為禮官獲奉明詔使得預兹議不敢回隱所見以苟免違異之罪惟聖神裁幸元豐七年雄州防禦推官知秀州崇德縣事充州學教授陸長愈上奏曰臣竊聞朝廷近降敕命追封孟軻為鄒國公長愈幸蒙推擇備數外學以督州徒遭遇聖世崇嚮儒術推原道德發明之由以孟氏為有功於聖人特加爵號不惟錫土封賁廟祠而已將使天下學者知所尊尚而不失其指歸此當今甚盛之舉往者之所未嘗及也天下幸甚然長愈猶有管見伏覩每嵗春秋釋奠于先聖至聖文宣王以先師兖國公顔子配享近制十哲皆得分獻長愈切以謂朝廷既封孟軻為鄒國公則亦宜從祀蓋爵位既加禮數必異躋之於先師則為已隆班之於十哲則為已殺惟與顔子並配為得其宜至於序坐則非長愈所敢議也孔子之得顔回則回也見而知之孟軻之學孔子則軻也聞而知之見而知之而為聖人之亞聞而知之而為聖人之徒其時雖殊其道則一此長愈所以謂並配為得其宜也論其知覺之先後居世之近逺則門人為親而顔必處孟上以其聞先聖之道距楊墨之言後世為有功而孟不在顔下此長愈所以謂序坐則非所敢議者也欲乞今後春秋釋奠並以兖鄒二公配享帝詔太常寺定奪本寺看詳以謂先聖文宣王先師顔子配享以次從祀皆其門弟子也孟子之道固當尊禮然於孔子異代難與顔子並行配享於是禮部侍郎林希奏曰臣伏見古者配享及從祀但取著德立功其道有以相成者不必皆用同時之人如蠟之祭也主先嗇而祭司嗇先農之祠則以后稷配農勾芒為少昊氏之子祝融為髙辛氏之子今春秋之祭則勾芒配伏羲祝融配大庭迎氣之日又為之從祀是異代之人得為配享明矣唐貞觀二十一年詔以伏勝髙堂生杜預范寧之徒二十一賢與顔子俱配享孔子廟堂至今猶為從祀孟子於孔聖之門當在顔子之列至於荀況揚雄韓愈皆發明先聖之道有益學者久未配享誠為闕典伏請自今春秋釋奠以鄒國公孟子配享文宣王設位於兖國公之次所有荀況揚雄韓愈並以世次先後從祀於左丘明等二十一賢之間所貴上稱聖朝褒崇儒賢備修祀典之意哲宗元祐元年翰林學士范百祿乞循祖宗故事視學狀曰臣伏惟二聖臨御以來朝廷清明海內乂安邉隅弭兵革之災田里無狗吠之警耄老倪稚咸樂其生德之休明治古何逺原其所以誠由舉措施設率循祖宗典故而然人無智愚莫不共知此説豐功美實何可殫陳獨有視學之行缺而未舉臣伏見太祖皇帝建隆元年正月二月四年四月太宗皇帝端拱元年八月淳化五年十一月真宗皇帝咸平二年七月皆幸國子監仁宗皇帝天聖二年八月幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇賜龜符三品服恭惟祖宗隆儒師古躬化天下之意如此今陛下天縱將聖日進於道光明緝熙體合自然聖學之積可謂勤而不倦矣然方領矩步之士挾書觀光者四方萬里竭蹶而來逰於京師分處庠序未嘗一聞鑾輿之音而望屬車之塵意者陛下専事講筵遊心經史而祖宗以來至天聖故事猶有未遑暇者乎臣愚伏望陛下特詔有司檢舉祖宗視學故事以待萬機之暇而賜臨觀焉令耆儒博士橫經進説以示天下文明之化豈不盛哉伏惟聖慈留察恕其狂僭天下幸甚二年崇政殿説書程頥上奏曰臣近言邇英講讀漸熱乞移就寬涼處貼黃稱如别無穩便處所只乞就崇政殿或延和殿竊聞給事中顧臨有言以延和講讀為不可臣夲謂邇英熱恐於聖體非宜今聞修展邇英苟得寬涼則臣志願遂矣於臨之言在臣自不必恤然有所甚害不得不為陛下辨之若臨之止於移惑太皇太后聖意臣官非諫諍不辨尚可也今以臨言為是則誤主上知見臣職當輔導安得不辨臣謂自古國家所患無大於在位者不學在位者不學則人主不得聞大道朝廷不得致善治不聞道則淺俗之論易入仁義之言難進人君功德髙下一繫於此臣非敢以諛言恱陛下竊聞陛下博覽前史請陛下歷觀簡策前世母后臨朝有不壞紀綱者乎以至公為心孜孜為治為英主之事如陛下者乎此陛下所自知也陛下有簡䇿所無之盛德則天下亦望陛下為簡策所無之功業不止維持嵗月俟人主長大而已蓋望陛下致海內於治安詒孫謀於久大詒謀致治之道當使聖德日躋善功日新進德在於求道圖治莫如稽古道必詢於有道之士古必訪諸稽古之人若夫世俗淺士以守道為迂以稽古為泥適足惑亂人主之聽近年以來士風益衰志趣汚下議論鄙淺髙識逺見之士益習以成風矣此風不革臣以為非興隆之道乃陵替之勢也大率淺俗之人以順從為愛君以卑抑為尊主以隨俗為知變以習非為守常此今日之大患也茍如是者衆則人君雖有髙世之見豈能獨任哉臣不知進道德之言足以增益聖德者有幾而損陛下之逺圖移陛下之逺意則有矣如顧臨之言是也臣料臨之心不過以講官不可坐於殿上以尊君為説爾夫殿上講説義理之意古昔所常行也臣不暇逺引只以夲朝故事言之太祖皇帝召王昭素講易真宗令崔頥正講書邢昺講春秋皆在殿上當時仍是坐講立講之儀只始于明肅太后之意此乃祖宗尊儒重道之盛美豈獨子孫當以為法萬世帝王所當法也而臨以為非臨謂講官不可坐殿上則昭素布衣之士其不可更甚矣邇英講讀只自仁宗時亦從便爾非是避殿上也若避殿上則不應置崇政説書之職雖以殿名設職不必須在本殿説書然亦不肯於不可講説之處置説書官也臣每進説未嘗不規勸主上以祖宗美事為法如臨之意則是禁止主上不得復為優禮昭素之事及有崇政設職之意祖宗美事而使主上獨不得為若主上信以為然所損豈不甚大殿上説書亦是常事人主崇儒之道甚有重於此者臣今口未敢言然中心惟欲輔養主上重道之心如前代明王光輝史册不止此一事而已臨之見與臣之心何其異也且講經與飲宴孰重真宗仁宗時皆宴講讀官於崇政殿從來侍宴者皆在殿上而講經獨不得在殿上臣未諭其義也臨之意必曰彼一時之事爾曰常則不可夫於義茍當曰常何害義或不可一時亦不可也臣始言之執政大臣未以為非也及臨一言則是而從之以臣度之以臨之言為是者亦或有之若謂四五大臣皆以為是則必不然蓋非難知之事不應四五人所見皆如是也特以陛下信臨之言而又迫於尊君之意故不敢言爾恐非以道事君之義今世俗之人能為尊君之言而不知尊君之道君唯道德益髙則益尊若位勢則崇髙極矣尊嚴至矣不可復加也過禮則非禮強尊而不尊漢明帝於桓榮親自執業可謂謙屈也周宣帝自比上帝羣臣齋戒清身數日方得朝可謂自尊矣然以理觀之漢眀帝賢明之君百世所尊也周宣帝昏亂之主百世所賤也如臨之見則必以桓榮為不能尊君以周宣之臣為能尊君矣不知道之人益進不合理之言日聞雖人主聖明習熟見聞亦恐不能無損爾後世功業益卑先王粹美之道不復見於世者正由淺俗之論易信而得行爾夫先王之美雖未能盡行然稽古之心不可無也猶學者於聖賢之事業雖未能盡行然希慕之心不可無也此乃進學求益之道今臨之意則以古先之事為不足法今日之事足矣不可更有進也此乃塞進善之門絶稽古之路方主上春秋之富進德之際其所獻納如是勸講官稍思職業敢不辨乎若陛下以臣言為非則狂妄之誅不敢避也萬一以臣言為是則願陛下明示好古求道之意使朝廷在位皆知之雖鄙見之人見陛下聖慮髙明不喜淺近亦將勉思義理不敢任其卑俗之見懼獲鄙於聖鑒矣誠如是則將見道學日明至言日進弊風日革為益孰大於此臣職當辨明義不敢默臣無任懇切惶懼待罪之至禮部貟外郎顔復上奏曰臣聞二帝三王之道至孔子而大明百家之辨不能誣萬世之逺不能晦有天下國家者既有其教思隆其報故與社稷並祀自古皆有土邦無化不立有生皆欲食俗無禮不成由是論之其功輕重又可喻矣歷代致治之君又爵其後使襲美號以昭聖人之澤賜田給廪以豐其享然制度未立聖人之祀容有時而不振度今之可行者其要有五一曰専其祠享二曰優其田祿三曰復其廟幹四曰司其法則五曰訓其子孫専其祠享者漢魏以來皆以嗣侯専宰祠事國朝乾德以來嘗詔其後宜延世祚任曲阜官使嚴時享又詔襲封人令常任近便官不得逺去家廟近世孔氏雖紹孔聖公爵多任外官違離陵廟名實乖異無主祭之官則俎豆之事勢難精虔欲乞今後襲封之人並理所入資序留奉祭祀如有卓異才行為朝廷採擢及通判以上並擇以次當承襲人權主廟事子孫未立通擇近屬漢孔霸元帝即位為帝師錫爵關內侯食邑八百戶號褒成君上書求奉孔子祭祀詔以所食八百戶祀孔子故霸還長子福于魯奉夫子祀乃其故事優其田祿者前代褒成褒聖崇聖奉聖侯食至千户唐增給百户為采邑國朝太平興國二年免其家租賦至真宗朝又增賜田至二百頃後因京東監司奏官為制僕嵗課甚薄欲乞賜增良田俾其家自墾庶仰祀俯養僅得封公之祿復其廟幹者自漢以來孔子之廟或以吏卒百户守衛或又增户以備灑掃國朝祥符中給近便戶以奉塋廟又給守兵後定差鄉兵五十人謂之廟戶以備庶役熙寧役法之更此制漸削今差使仍舊欲乞復差廟戶五十人以守衛灑掃師廟及充主祀者白直其約束並用役人之法則人不知勞悅乎輸力不悖聖師使民之義司其法則者孔氏祭享恭怠財賦均滯使人勤逸皆繫一時主家之人使刻薄之吏得以托闕而為言致緣其小故以廢其大者由無立法防弊之素也欲乞置官一員或就擇本邑佐掌其祭祀之式財用之例役使之科郡縣以時鈎考而懲勸焉則弊消于未然而師門益尊矣訓其子孫者祥符初賜曲阜宣聖廟九經書疏釋文史集令本州選儒生講授祖宗錫聖人之裔又如是之深厚後人不能茂明以及廢失是可惜矣欲乞朝廷命有經行官或選儒生而秩以祿俾講授闕里誨勵孔氏及其鄉黨則能者成才罷者逺罪鄒魯之風教易復行不止能保其祭祀而已五者並用則聖朝崇儒報本之實淳粹悠久度越前代逺矣四年秦鳯路提點刑獄張舜民乞追贈張載疏曰臣伏覩鳯翔府橫渠鎮居住故崇文院校書張載學際天人誠動金石義之所在白刃可蹈心有不厭萬鍾何加口如不能言體若不勝衣議論感激凜如秋霜雖萬軍之將不足言其勇也平居與人言退然若不知讀書者坐而講貫剖判是非談辨如流雖滔滔江漢不足方其廣也著書萬言名為正蒙隂陽變化之端仁義道德之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎如荀況輩不足望於載也關中學者靡然就之謂之橫渠先生一登其門言行皆知孝悌仁義有如夙成雖去載千里之逺十年之久不敢一蹈非義常若載之臨其左右前後也自此西土學者灑然知先聖賢之學乃知鄉者誦説之富組繡之文特小道爾在熙寧中纍薦朝廷召至闕下授以崇文院校書未幾以疾辭歸熙寧末年再至闕下神宗方將任用使行其所言其疾再作謁告西歸死於道路當時議者以謂載身逢明天子緣飾禮文修明治具之時再至朝廷竟不能伸其一言以終此載之短薄則不幸也有士如此當年不能興舉舉於老疾垂死之時治國者亦不得無慊然于心也載之死于今十有五年中外臣僚猶録其平生以言於朝廷者略以十數或乞賜田或録其子或乞降諡然天聽髙邈未蒙響答今載止有一妻一子衣食不足寄託親友日來月往人情憒煩飢寒之憂其勢甚迫若不干告朝廷何所赴訴且君子平日修身謹行固不為身之與子孫也朝廷褒賢録善豈特為其賢者之後乎如孟軻荀卿揚雄於今千有餘年學者徒能讀誦其書而已至於禮貌寂寥孰肯來括大朝一旦列之封爵血食廟堂使後世觀之賢於孟軻荀卿揚雄乎賢於本朝乎故知臣今日之言非為載也伏乞朝廷檢會纍次臣僚奏陳於録子賜田追諡三者之間凡可以厚載者舉一而足庶使褒賢之典獨見於本朝為善之風不墜於今日五年諫議大夫朱光庭上奏曰臣聞聖王之治天下以教育人材為先務教育之道在學得乎正而已學得其正則始於誠意正心而終於致君澤民足以成君子之事業然則所謂正者何也乃堯舜禹湯文武周公孔子孟軻之正道非釋老莊列申韓之他道也學者茍得其正則幼而誦習長而講解久而入心成德至於終身踐履不離乎正則養就美才皆此塗也伏自陛下臨御之初患天下學者狃習異端未能純一向道嘗下明詔申敇有司不得於莊老出題又引用釋氏申韓之説此可謂教天下學者適正之本也今來科場詔已降竊聞學者狃習異端未至悛革兼有司將來考校自當遵前日之詔進退多士臣愚欲乞朝廷申明前詔內自大學之官外至諸州教授俾告諭學者一意遵守正道不得依舊狃習異端不唯自可以應科舉之選庶幾從此人人適正養就美材隆太平基址伏望聖慈特賜施行光庭又乞定子思封爵疏曰臣切詳孔若蒙陳乞孔子之子鯉孫伋封爵事伏緣古者封爵之及或以德或以功或以言如鯉雖孔子之子然始聞詩聞禮德未著見而早世伋字子思嘗學於曽子得聖道之傳著為中庸一書垂之萬世君臣父子兄弟夫婦朋友盡斯道者可以造聖賢之域至於窮性命之理究中和之致講天德之微旨論至誠之妙用孟子師之然後得其傳固非荀揚韓之可企荀揚韓尚蒙聖朝茅土之封而獨未及子思誠闕典也伏乞朝廷特下禮官定子思之封爵以顯朝廷尊隆聖道之意乃盛德之舉也伏乞聖慈特賜施行八年侍講學士范祖禹乞改正先聖冠服奏曰臣伏見禮部貟外郎楊傑上言曰唐開元中追諡先聖為文宣王內出王者衮冕之服以衣之今乞用唐故事衣以衮冕之服臣竊惟祖宗褒崇先聖比之前代禮意加隆而冕服未用王者之制此蓋有司之誤誠為闕典陛下欽明稽古聖德日躋臣愚欲乞因駕幸太學酌獻之日親覩先聖服章特降聖旨命有司改正用三代王者之禮以彰陛下尊師重道崇儒之意此乃一朝之盛典聖學之美事也哲宗時畢仲遊奏黜異端疏曰上古之書皆所以為治也然聖人不為之斷則異端出於其間而不可以為治必雜異端為治是不若無書而治也故聖人深懼所以然揔其可以常行之大者為六經六經定而異端不得出於其間是萬世為治之本也周衰不任經術聖人為治之書既已少廢秦為大無道又重燔之聖人為治之書遂至大廢漢承二廢之後講求訪失六經僅得其完其術雖不全取以為用亦不全廢以為不用故循吏能以飾治而酷吏能以輔刑飾治者貴輔刑者進是以公孫𢎞治春秋而為丞相望之通經術而位在九卿張湯補能傅古義之士以決大獄吕步舒執春秋之法持莭專斷此皆飾治輔刑貴進已然之效也然博士之官自武帝以五經而立後益以家法而進家法進而五經之術支離故如施孟之易嚴顔之春秋各立博士而不相廢是非能為易春秋之大道而為施孟嚴顔之家法也故有以教子弟者而不見孝順之化有以三公舉者而不見知治之人有增多其員者而不見補於訓道有變更其名者而不見稱其職是皆未能恤其實也今朝廷樂以經術取士以古義決獄而欲置博士之官定博士之員課功册書以説天下則可謂治博士之職而非治決獄取士之路也如朝廷內以經術為意外以經術為用則天下之人皆將以經術為任夫博士之廢興又何纍於治亂哉愚聞儒者之道帝皇立治之道也帝皇不稱為儒而立治後世稱為儒而立治其稱不稱雖殊而立治之道一也説者不知儒道根源之久逺乃以道德隂陽名法之類分而為九以謂道德之流出古之史官得於清虛卑弱而失於放隂陽之流出古羲和之官得於順天授時而失於拘法家之流出古之理官得於信賞必罰而失于刻以至名墨農𨽻縱橫小説之流莫不皆有得失短長然以儒道為治之至大所出之久逺而謂出古司徒之官得於仁義而失於惑為此説者至塞不通之學也夫儒備天下事而為有道焉有異趨之長而可相尚哉所謂道德法家隂陽者偏得儒一端之美爾而強謂所長不出於儒所短不損於道非所以輔經術而施教化也若夫談六家之論以道為無所不宜以儒為寡要少功則其悖甚又奚足數於此哉欽宗時起居郎胡安國論伊川學狀曰臣忝預從臣職當次對雖嬰疾疹尚竊祠宫苟有見聞自當論奏庶逃尸素之責以酬隆厚之恩伏見元祐之初宰臣司馬光吕公著秉政當國急於得人首薦河南處士程頥以為言必忠信動遵禮義實儒者之髙蹈聖世之逸民乞加召命擢以不次遂自韋布超居講筵而臺諫臣僚朱光庭等又奏頥道德純備學問淵博有經天緯地之才有制禮作樂之具實天民之先覺聖代之真儒也而頥之見知於當世至矣自頥之司勸講不為辨辭解釋文義所以積其誠意感通聖心者固不可得而聞也及當官而行舉動必由乎禮奉身而去進退必合乎義其修身行法規矩準繩獨出諸儒之表門人髙弟莫獲繼焉雖崇寧間曲加防禁學者向之私相傳習不可遏也其後頥之門人如諫議楊時右史劉安莭舍人許景衡殿院馬伸待制吳給等稍稍進用於是傳者浸廣士大夫爭相淬礪而其間志於利祿者託其説以自售學者莫能别其真偽傳者既失之河洛之學幾絶矣壬子年臣嘗至行闕有教授仲并者言伊川之學近日盛行士大夫將轉而為伊川矣臣語之曰伊川之學不絶如線可謂孤立而以為盛行何也豈以其説滿門人人傳寫耳納口出而以為盛乎自是服儒冠者以伊川門人妄自標榜如喻樗輩又益甚焉或者又言非伊川門人却皆進用樗真其人也乃不見知近臣亦有信之而稱歎者故樗之改官入館舍人王居正命其辭曰頃窮西洛之淵源遂見古人之大體夫西洛淵源古人大體雖其髙弟謝良佐遊酢楊時諸人尚難言之而況樗等曷為者也乃敢託於詞命妄加褒借識者有憂之士大夫所學各分黨與互相排擊自此起矣紹興五年省試舉人經都堂陳狀乞不用元祐人朱震等考試蓋從於新學者耳目見聞既已習熟安於其説不肯遽變而傳河洛之學者又多失其本真妄自尊大無以屈服士人之心故衆論洶洶深加詆誚夫有為伊洛之學者皆欲屏絶其徒而乃上及於伊川臣竊以為過矣夫聖人之道所以垂訓萬世無非中庸非有甚髙難行之説離世異俗之行此誠不可易之至論也然中庸之義不明久矣自頥兄弟始發明之然後其義學者可思而得也不然則或謂髙明所以處已中庸所以接物本末上下析為二途而其義愈不明矣士大夫之學宜以孔孟為師庶幾言行相稱可濟時用此亦不可易之至論也然孔孟之道不傳久矣自頥兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資以干利祿愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頥之學是入室而不由户也不亦誤乎夫頥之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微旨而知求仁之方入德之序然則狂言怪語淫説鄙喻豈其文也哉頥之行其行已接物則忠誠動於州里其事親從兄則孝悌顯於家庭其辭受取捨非其道義則一介不以取與諸人雖祿之千鍾必有不顧也其餘則亦與人同耳然則幅巾大袖髙視闊步豈其行也哉昔者伯夷栁下惠之賢微仲尼則西山之餓夫東國之黜臣耳本朝自嘉祐以來西都有邵雍程皓及其弟程頥關中有張載此四人者皆以道學德行名於當世公卿大夫之所欽慕而師尊之者也如司馬光吕公著韓綘吕大防等莫不論薦之會王安石當路重以蔡京得政曲加排抑故有西山東國之厄而其道不行深可惜也今雍所著有皇極經世書六十卷載有正蒙書一十七篇頥有易春秋傳一十卷皓雖未及著述而門弟子質疑請益答問之語存于世者甚多又有書疏銘詩並行於世而傳者多失其真臣愚伏望陛下特降指揮下禮官討論故事以此四人加之封號載在祀典比於荀揚之列以見聖世雖當禁暴誅亂奉詞伐罪之時獨有崇儒重道尊德樂義之意仍詔館閣裒集四人之遺書委官校正取旨施行便於學者傳習羽翼六經以推尊仲尼孟子之道使邪説者不得乘間而作而天下之道術定豈曰小補之哉髙宗時胡寅上疏曰臣竊見建國公出就外傅陛下選儒學老成之士充輔導之職固將使國公近正人見正事聞正道涵養器質薰陶德性以副陛下茂建宗支之意凡有舉措可不慎哉臣謹考古帝王教世子之法莫備於周其在禮記文王世子篇曰始入學者必釋奠于先聖先師立太傅少傅以養之欲其知父子君臣之道也夫父子君臣之性人同稟之於天先聖先師則盡其道載之於六經語孟之書以示萬世者也故始入學者必釋奠于先聖先師欲其知道之所本故也若老佛二氏之説則毁父子無君臣泯亂民彛為世大害自前代有國家者溺心於此無不致亂亡之禍今置其像設於資善堂而不以先聖先師為矜式非所以訓示國公也若謂福祐護持俗所不免則鄙俚尤甚君子不道伏望陛下詢之范沖朱震必亦以此舉為非縱國公未冠未能行釋奠之禮且當崇飾先聖先師之像於資善堂中使晨朝瞻仰以生恭欽之心是亦勸學之一助也今士大夫家訓誨童蒙未有不然者誠以人之趣習罔不在初曽謂初建資善而可輕有過舉乎所有録黃內緣有此畫一一件未為允當臣未敢書行右正言陳淵上奏曰昔者孟軻著書七篇其末章歷敘堯舜至於孔子有見而知之者有聞而知之者而其終繼之以去聖人之世若此其未逺也近聖人之居若此其甚近也然而無有乎爾則亦無有乎爾其意以謂道之在天下自古至今無適不然必有人焉發明而推行之然後傳之萬世而無弊是數聖人者道之所賴以傳者也道固不窮傳亦無盡由孔子而來至於軻猶可以耳目接也得其傳者非軻而誰故自漢迄唐知道之士如揚雄韓愈莫不推尊孟氏而世之言道者亦必曰孔孟孔孟云者明其無二致也豈諸子百家之所可擬歟近者陛下詔天下學者當以孔孟為師無所偏執此誠萬世不可易之論也然孔孟之言載在方册昭如日星有目者之所共睹有心者之所共知其要焉在豈非所謂大中至正之道乎大中至正之道則孔孟之所以為孔孟也若夫諸子百家之學或蔽於人而不知天或蔽於天而不知人或蔽於為我而不足以及物或蔽於兼愛而不足以成已幽明殊歸內外不合於是詼詭譎怪之論興詖邪淫遁之辭勝而大中至正之道始不行矣今欲學者以孔孟為師則必使之知大中至正之道自更科以來天下學士無所適從若朝廷尚不免以文章取人謂宜明詔有司審所去取毋溺於諸子百家之説唯大中至正之道是從俾堯舜禹湯文武周公之志復行於今豈唯今日學者之幸將天下後世實幸淵又上奏曰臣聞古人有言曰為治者不在多言顧力行如何耳夫言而不能行自古所病譬之欲之燕者北首而趨不舍朝夕雖有遲速終必至燕若坐而説燕亦何能至此傅説所以言行之惟艱而孔子所以貴夫躬行也雖然知之者不如好之者好之者不如樂之者好而樂之所以行也而必先於知之則知其可已乎蓋不知而必行譬之適燕而南轅縱復疾馳心幽并而足吳越必不至矣臣觀墨子之道取茅茨土階之儉悅手胼足胝之勤摩頂放踵利天下為之則其所行宜若於儒者無異矣然孟子闢之以為兼愛無父作於其心害於其事作於其事害於其政不可以訓是豈儒者之所為乎故是堯舜而非桀紂儒墨之所同乃若堯舜之所以為堯舜墨固有所未知也未知堯舜而託於堯舜以行其私意此孟子所以正名其為邪説而闢之歟由是言之行之惟艱而知之亦未易也自王氏之學達於天下其徒尊之與孔子等動之以卓詭之行而矜之以華麗之文如以錦繡蒙覆陷穽悅而從之鮮不墜者行之六十餘年其禍已見今可以改矣而人之所知初無以異於昔也方此之時欲使天下學者背邪以歸正棄舊以圖新非反其所知以知聖人其能一變而至於道乎孟子曰學則三代共之皆所以明人倫也又曰聖人人倫之至也又曰堯舜之道孝弟而已矣夫學所以明人倫而人倫之至不越孝弟此固王氏以為淺近而不足知者而不知同天人通物我合內外之道有在於是是之不知其何以行之哉今陛下躬堯舜之孝弟行之既久至誠感神而干羽自格其效已著豈非有以深知之耶然陛下既知而行之亦當使天下皆知之知而行之者衆則吾道不期而已至矣前年之詔諭天下學者當以孔孟為師是固然矣然王氏之説未即禁止朝野紛然莫知所適謂宜明示好惡一切罷黜使學者膠口不敢復道庶幾各舍其故而天下之真知出矣臣不勝區區之心惟陛下裁察孝宗時國子司業劉爚上奏曰宋興六經微旨孔孟遺言發明於千載之後以事父則孝以事君則忠而世之所謂道學也慶元以來權佞當國惡人議己指道為偽屏其人禁其書學者無所依嚮道義不明趨向汙下人欲橫流廉耻日喪追惟前日禁絶道學之事不得不任其咎望其既仕之後職業修名莭立不可得也乞罷偽學之詔息邪説正人心為宗社之福寧宗初即位侍講彭龜年論復經筵坐講疏曰臣竊見本朝藝祖開寶四年召王昭素賜坐講易自是纍聖相承凡有講讀無不賜坐乾興間孫奭坐講時仁宗尚幼跂案而聽之奭因請立講論者不以為是熙寧元年吕公著等請復坐講之舊制詔太常禮院詳定於是韓維等言列侍之臣尚得環坐執經而講者顧使獨立事體輕重誠為未安請如天禧舊制以彰陛下稽古重道之意時龔鼎臣等以為不可遂不復行恭惟陛下留心學問增置講讀當講之日早晚兩講固已有光祖宗早間御殿一循近例講者立侍不廢君臣之禮晚御後幄又復舊制講者坐侍且盡君臣之情情禮兩盡古今所難識者無不竊歎聖性髙明區處有道既有施行而議者乃以坐講為非執後世尊君卑臣之見而失先王好善忘勢之誠雖知陛下不得已而從之然使陛下聖德不明祖宗舊制不復誠為可恨臣今檢到程頥與顧臨辨殿上不講書奏劄繳連進呈頥之本意但欲因此輔養人主重道之心實為可采儻蒙睿覽便見近曰坐講罷行為是為非如臣不學固不足廁勸講之列若此禮一復天下通經學古之士必有聞風而起副陛下之意者矣臣不勝拳拳願忠之至龜年為吏部侍郎又論經筵講讀不當以官職雜壓為序疏曰臣輒有誠懇仰干淵聽臣素無學術叨侍經幄朝夕􅏮􅏮大懼無以稱塞伏見中書舍人陳傅良煥章閣待制朱熹並除侍講而臣忝為吏部侍郎班著偶在二臣之上臣之學問委是不如二臣經帷講讀政當以學問髙下為差不當以官職雜壓為序兼臣照得傅堯俞任吏部尚書兼侍讀之日以翰林學士承旨蘇頌兼侍讀班序在堯俞之下堯俞以頌國之雋老學識貫通非堯俞比遂乞邇英進見居頌之次且以並侍經幄事異外廷崇德尚齒足以風勵天下為説臣愚欲望聖慈許臣如堯俞之請當講之日今臣班傅良熹之下非特使臣愚分少安亦於公議為允嘉定八年轉運判官魏了翁上議曰臣猥以晚學誤被柬注擢司祥刑既服攸司會漕挽空官復令共二顧職分所係其於教學立師崇化善俗所不當後因惟國朝盛時先正巨公多仕於蜀其生有顯秩沒有恤章載在史册者臣既不復贅陳然其間有道德隆重為世師表而爵位弗稱未舉易名之典則臣職在勸學所當敷陳臣竊見故虞部郎中周頥嘗為合州僉書判官州事不經其手吏不敢決治下之民不敢違傳謂蜀之賢人君子莫不喜稱之其流風所漸迄今未泯士競講學民知嚮方春秋奉嘗有永無替臣始到官嘗遣吏即其祠而用幣焉退復惟念是特頥所以施諸一方見諸行事之一二焉耳蓋自周衰孔孟氏沒更秦漢魏晉隋唐學者無所宗主爽離判渙莫適與歸醇質者滯於占畢訓詁雋爽者溺於記覽詞章言理則清虛寂寞之歸論事則功利智術之尚誣民惑世至於淪浹肌髓不可救藥斯民也堯舜三代之所以治也涉秦而後千數百年治之日少亂之日多寧不以此而頥獨奮乎百世之下乃始探造化之至賾建圖著書闡發幽祕而示人以日用常行之要使誦其遺文者始得以曉然洙泗之正傳而知世之所謂學者非滯於俗師則淪于異端有不足學者矣又有河南程皓程頥親得其傳其學益以大振雖三人者皆不及大用於時而其嗣往聖開來哲發天理正人心其於一代之理亂萬世之明暗所關繫益甚不特以命秩弗崇其莭惠之文未有能發明之者紹興之初侍講胡安國嘗有請於朝乞爵程皓兄弟使得從食於先聖先師之廟其後乾道間太學録魏掞之又嘗白宰相請祠程皓兄弟于學會不果行如周頥則又程皓兄弟親炙而師事之者安國掞之亦未及以為言誠為闕典臣愚欲望聖慈詳臣所陳如以為可采乞下之禮官如先朝邵雍徐積等故事將周頥特賜美諡使海內人士咸知正學之宗其於表章風厲誠非小補如程頥兄弟並得在易名之典則尤足以章明時崇儒重道之意臣本為蜀人致甘棠之思而儳言及此越職踰分臣知罪矣惟陛下財幸寧宗時袁説友乞留朱熹狀曰臣等竊聞陛下近降御筆直付侍講朱熹與之外祠此命一傳舉國疑駭館學皆有章奏給舍臺諫相繼論駮似聞聖意已即開悟而未見收回成命人心皇皇深為國家惜此事體臣等備位從列不敢自默竊謂人主初政莫急於收人望其虧盛德莫大於拂人心朱熹之賢海內共知陛下踐祚之初首加聘召置之經筵莫不傳誦以為盛德之舉未及再月無故棄逐非惟遂失講學之助而前日之美意天下亦不復信之矣其拂人心孰大於此熹自入朝以來凡所論奏無非愛君憂國之言今一旦遽去莫曉所謂皆以謂陛下憚其説之髙大若強人以所難者然尊嚮於疇昔而棄置於頃刻樂聞於軟熟而嚴憚於切直此人主之所深戒陛下好賢樂善當不出此臣等竊見朱熹抱負聖賢之學纍聘不起幡然為陛下一出有以見君臣道合相得之誠心熹平日歸潔其身蓋其素志成命既出熹必不肯復留臣等區區所論實以國體所關非止為一朱熹而已蓋命令之出雖自九重至於施行當由中書故唐人云不經鳯閣鸞臺何名為敕祖宗之朝未有以御筆直付某人者如此是無用中書廢壞綱紀他日援此為故事者必以為自今日始陛下豈不重惜於此哉臣等欲望聖慈收回前日直降御筆俯從給舍臺諫之請雖朱熹決不肯留而陛下崇儒禮賢改過從善之意尚可以暴白于天下不勝厚幸干犯天威無任震懼俟命之至元太宗時中書令耶律楚材上奏曰制器者必用良工守成者必用儒臣儒之事業非積數十年殆未易成也帝曰果爾可官其人楚材曰請校試之於是隨郡考試雖儒人被俘為奴者亦令􅈬試憲宗即位髙智耀入見言儒者所學堯舜禹湯文武之道自古有國家者用之則治不用則否養成其材將以資其用也宜蠲免徭役以教育之帝問儒家何如巫醫對曰儒以綱常治天下豈方技所得比帝曰善前此未有以是告朕者詔復海內儒士徭役世祖時侍講學士圖克坦公履欲奏行貢舉知帝於釋氏重教而輕禪乃言於上曰儒亦有教有禪科舉類教道學類禪帝怒召姚樞許衡與宰臣廷辨奉訓大夫董文忠自外入帝曰汝日誦四書亦道學者文忠對曰陛下每言士不治經講孔孟之道而為詩賦何關修身何益治國由是海內之士稍知從事實學臣今所誦皆孔孟之言焉知所謂道學而俗儒守亡國餘習欲行其説故以是上惑聖聽恐非陛下教人修身治國之意也事遂止嵗戊申春釋奠致胙於世祖世祖曰孔子廟食之禮何如張德輝對曰孔子為萬代王者師有國者尊之則嚴其廟貌修其時祀其崇與否於聖人無所損益但以此見時君崇儒重道之意何如耳世祖曰今而後此禮勿廢始曲阜孔子廟歷代給民百户以供灑掃復其家世祖時尚書省以括户之故盡收為民太常少卿王磐上言曰林廟户百家嵗賦鈔不過六百貫僅比一六品官終年俸耳聖朝疆宇萬里財賦嵗億萬計豈愛一六品官俸不以待孔子哉且於府庫所益無多其損國體甚大時論韙之布衣趙天麟上䇿曰臣聞聖人之立教也暢達情性而言詩條理紀綱而定書因天理人文以制禮宣國風民俗以作樂參天兩地發揮於隂陽而為易尊上卑下嚴示於名分而為春秋自上古洪荒之時莭文雖未分而此理未嘗不具也統言之為道分之為五常散之為百行可以修身可以齊家可以治國可以平天下此之謂真儒昔者聖人之學有諸內而形諸外得於心而應于口藴之為靈明現之為英華出言啓語莫非文之自然也後世輕才淺見之徒拾古人糟粕之餘瀝以文章為極致乃有聚螢積雪孜孜汲汲窮一經而皓首成一篇而歷年粵自詩變而騷騷變而漢魏六朝至於唐末儒風掃地矣其間耀名千載卓然不群者皆三都兩京大人長楊之流春草池塘楓冷吳江之類自以為儒者之宗師而不知其已陷於俳優之小技矣夫儒文同宗而異派舉世莫之肯辨也孔門四科之中文學子遊子夏臣嘗就魯論而考之子遊之為言曰本之則無如之何子夏曰雖曰未學吾必謂之學矣此之所謂文學適所以務其本也豈後世趨末失本之文哉聖人以其文勝猶抑之於政事之下則知夫聖門文不可絶而亦未嘗貴之也故因文傳道道傳而文為筌蹄矣道衰以來昧道之人競相推重以文不加點為顔孟以咳唾珠璣為曽閔懵公政而弗精委大猷而莫顧比之窮一經之流又出乎其下矣選曹據之而採人時議欽之而緘口及其身居要職家食豐祿處事罔然權歸吏手飽千古之書泥無決之論拘一介之廉滯當時之政事條叢脞治迹紛優雖復才同司馬廉若范丹秀而不實清而不幹將安用哉遂使狼戾兒曹反脣而相稽曰儒者之道我知之矣聽其名則徹于清霄之上考其實則例於黃泉之下矣臣以為此非真儒也皆文學俗士辱聖人之門曠國家之職盜竊天下之名濫齒四民之首使歐陽論之決為之嗚呼使賈誼聞之決為之痛哭聖人曰女為君子儒又曰天之未喪斯文也今國家車同軌書同文臣以為莫如用真儒亦未宜遽棄文人之類也伏見方今內本京師外覃庶境皆設學校以易風俗張皇化紀伏望陛下載宣天旨令有司䇿問科舉限人數以權衡天下才德之人則儒文兩無遺矣凡對䇿超等堪以從政者據三德八才量入政事流品凡詳習禮義文學富贍者許令試課閲實其等授以教官凡教官考滿不限人數許令對䇿䇿中纍階與官不然則止於教官內流轉凡已進政事之官者則有考幽明之法在焉庶乎官無曠官儒無庸儒且使家孰黨庠術序國學莫不究極於道器之妙研精於政化之源幼而學之壯而行之潤當代之憲章綿社稷之福祚安黎庶之生資壯名教之元氣一舉而四便立矣歷代名臣奏議卷二百七十四
