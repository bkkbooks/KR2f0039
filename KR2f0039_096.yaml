body:
  text: 歷代名臣奏議卷九十六明楊士竒等撰經國宋孝宗時太學博士葉適上奏曰臣竊以今日人臣之義所當為陛下建明者一大事而已二陵之讎未報故疆之半未復此一大事者天下之公憤臣子之深責也或不知所言或言而不盡皆非人臣之義也敵并兼强大而難攻故言者皆曰當乘其機積久堅固而不可動故言者又曰當待其時夫究極本末審定計慮而識所施為之後先然後知機自我發非彼之乘時自我為何彼之待今之率易茍且習聞卑論而無復振起之實意則固以為當乘機必當待時以緩嵗月而誤大事是必然矣且敵知其不可以羈制中原久矣尼雅滿之立僞楚僞齊達蘭之還五路河南今君之立又議割白溝以南而定盟好蓋其本謀未嘗欲於河東河北之外越而有之也金亮雖威脅天下而北方起事以歸命者固已係踵我之偏師雖浪戰無律亦能搗陜虢搖關輔得其要郡而守矣然則敵之所謂難攻者豈真難而不可動者豈真不可哉此姑未論可也方今之敵正以我自有所謂難我自有所謂不可耳夫我自有所謂難而不知變其難以從其易我自有所謂不可而不知變其不可以從其可於是力屈氣索甘為退伏常碩和好抽兵反戍拱手奉敵而暫安於東南臣以為此今日之大患所當先論者也陛下感念家禍始初嗣位葺兩淮理荆襄慰綏蜀道安集歸正人立忠毅忠鋭等軍教民兵弩手新城壁造器械講馬政糴米儲貨處處樁積臣誠愚陋竊計陛下志望廣逺中夜太息何止一事哉然而二十六年於此終未能奮發明詔有所舉動者積今之所謂難者隂沮之積今之所謂不可者默制之而然也蓋其難有四其不可有五臣請得為陛下條陳之夫重誓約畏先事以金幣啖敵本景德以來立國之素規耳既隳於契丹復成於女真以至於浮海再三而謀夾攻費數百萬以買空燕則又宣和之所畫也故斡哩雅布之始至也不過責納張覺紛亂元約而已尼雅滿復至又不過責悔割三鎮及間結余覩而已青城之辱忍復陳之則又不過以為當如誓書而已是三役者可謂變起非常中外不測之大禍也然敵自以彼直我曲用兵有名而國家遂為之包容垢耻恬受竒禍竄逐議臣降詔謝過建炎未和則祈請不絶紹興既和則絀損不較册命行於至尊陪𨽻施於宰輔賴陛下威靈逺暢始得以匹敵往來耳置不戴之讎而廣兼愛之義自為金弱既已久矣陛下欲尚加回護隂俟他隙則憤怒未昭固不足以激使授命之士若流涕行誅顯示決絶而國信所藏典故具在亦恐天下之大義未足以易有司之常守此則國是之難一也國之所是既然矣而士大夫之論何獨不然故不以敵人為可怒而反咎平北之不當不責主和之致寇而反罪守京之非䇿棄三鎮則同議者皆是割大河則簽書者不疑至於秦檜遂行其南自南北自北之論湯思退從而效之撤守棄地開門納敵幾危於隆興之初王之望尹穡翕然附和更為務實黜虛破壞朋黨趨赴事功之說相承至今況守已撤矣地已弃矣和親成矣尚何實之可務何事功之可赴哉雖然此猶小人之論耳至若為竒謀祕畫者則止於乘機待時忠義決策者則止於親征遷都沈深慮逺者則止於固本自治髙談者逺述性命而以功業為可略精論者妄推天意而以中外為無辨小人之論如彼君子之論如此陛下欲詢衆謀則流言成市互為廢興若斷以獨志則慮之不盡事難輕發此則議論之難二也女真方之前世非徑敵也然而童貫逃師於始至种師道玩寇於被圍李綱失守於太原李回掃迹於河上黃潜善倉皇南渡杜充未戰迎降趙鼎持重迄無定算張浚經略屢致奔潰此皆國家付託委心腹之大臣也賢佞雖異敗事豈殊陛下遍覽往策當艱難鼎峙之時豈無傑材異禀克就勳績者乎今環視諸臣前者後者迭進迭退其知此事本而可以反覆論議者誰乎其抱此志意而可以䇿厲期望者誰乎以奔趨官簿為閥閲以勾校朱墨為詳練能縛一姦民遂自許為有智能斬一黥卒遽自負為有勇其懷利尚同毁傷善類隂塞正路謀以力據要津者充滿內外陛下欲倚賴此徒責驥足於蹇步固無可言若出意收拾拔於度外則又孟浪欺謾無足憑仗此則人材之難三也國家規模特異前代本緣唐季陵夷藩方擅命其極為五代廢立士卒斷制之禍是以收攬天下之權銖分以上悉總於朝上獨專操制之勞而下獲享其富貴之逸故內治柔和無狡悍思亂之民不煩寸兵尺鐵可以安枕無事此其得也然外網踈漏有驕橫不臣之敵雖聚重兵勇將而無一捷之用卒不免屈意損威以就和好此其失也論者方偏樂安靖以為寧有外虞而無使內變課其功效固已過於漢唐逺矣且靖康之事未聞我有一城一邑敢為叛命而坐視敵人長驅深入惕息待死屠戮之慘與五代何異則得失之算豈不明哉夫徒鑒五代之致亂而不思靖康之得禍故李綱請裂河南為藩鎮范宗尹嘗割邉面為鎮撫皆隨以廢格陛下循守舊模而欲驅一世之人以報君仇則形勢乖阻誠無展力之地若順時增損則其所更張其所動搖關係至重豈得易言此則法度之難四也雖然是四難者特其精華景象而已計其事實又有甚不可者焉古者以民為兵不以兵為民因事以飬兵不飬兵以待事兵聚則求戰不聚而不敢戰今食錢自日一百以上家小口纍仰給於官國力不供而常有饑寒之色是以兵為民也北方無事二十餘年終不解甲是飬兵以待事也飬兵如故和親亦如故是聚兵而不敢戰也合營屯廂禁見卒至六十萬羣校貴將廪祿無算外虛州縣內困朝廷蓋兵以多而遂至於弱矣此舉天下以為不可動者也昔固有以乏財為患矣未有皇皇汲汲取之無度如今日之甚者也自漕司造船督撫犒軍而酒價十倍和買折帛行而民有二賦免役錢起供而役法弊鹽袋錢增添而鹽策盡頭子勘合免丁牙契無不增錢而州縣之間益以苛碎大抵經總制錢為州之害月樁板帳為縣之害而西蜀折估青草水腳對減激賞隔槽名色其患苦又為特甚天下之錢嵗入於官者八千萬緡而支費常不足蓋財以多而遂至於乏矣此舉天下以為不可動者也夫誅討仇讎修立大事使不愆素是人主宰相之任也整挈綱目振舉小治使不失時是百官羣有司之任也未有以百官羣有司之任付之吏胥而能治者今自檢正都司六部列屬以及寺監皆綱目之所在也受成吏手能否莫辨賄賂公行關節交市民寃不直事滯不決小治若此況大事乎蓋不信官而信吏使之然耳此舉天下以為不可動者三也夫以官聽吏疲耎之名人情之所避也然而不免焉何也國家以法為本以例為要其官雖貴也其人雖賢也然而非法無決也非例無行也驟而問之不若吏之素也暫而居之不若吏之久也知其一不知其二不若吏之悉也故不得不舉而歸之吏官舉而歸之吏則朝廷之綱目其在吏也何疑夫先人而後法則人用先法而後人則人廢不任人而任法則官失職而吏得志矣此舉天下以為不可動者四也法雖用矣人雖廢矣然人材之定品孰堪為某官孰不堪為某官孰宜為小孰宜為大其可用之實猶在也今也任職則以人為可廢擇官則為人之餌學科舉掛名䕃計級而取循塗而進無不可為者何賢何不肖何君子何小人之有哉亷耻日缺名實日喪風俗大壞而不可救蓋不任人而任法之弊遂至於不用賢能而用資格耳此舉天下以為不可動者五也是之謂不特四者精華景象之難變而五者事實之尤不可動者也夫國是難變議論難變人材難變法度難變加以兵多而弱不可動財多而乏不可動不信官而信吏不可動不任人而任法不可動不用賢能而用資格不可動故期之以功名而志愈惰激之以氣節而俗愈偷右列未能登進勇爵而儒生或以見薄為愧信臣未足承接密㫖而外庭或以見踈為疑公卿大夫私竊告語咸以今之事勢舉無可為者姑以美衣甘食老身長子自足而已豈非今之實患深害一大事之殘賊者歟㳂習牽制非一時矣其利害當講其虛實當明其是非當斷其廢置當決不講不明不斷不決陛下之志雖欲有為將何恃而獨行哉一世之人維縶手足塗塞耳目失正性矣豈知君仇之當報而為陛下盡死力哉臣故曰二十六年於此終未能奮發明詔有所舉動者積今之所謂難者隂沮之積今之所謂不可者默制之而然也然則其難者豈真難乎其不可者豈真不可乎蓋自古人君有雖居天下之尊位而不得制天下之利勢以卒於無成者矣陛下則不然陛下之聖之武之勤之明博學逺覽絶識獨睿漢之宣帝光武唐之太宗皆不及也講利害明虛實斷是非決廢置在陛下所為耳大義誠立則國是之難者先變矣陛下之國是變則士大夫議論之難亦變矣羣臣之在內者進而問之在外者舉而問之其任是事者親用之其不任是事者斥逺之則人材之難亦變矣變國是變議論變人材所以舉大事也其所當順時而增損者某事耳非輕動而妄更易也則法度之難亦變矣四難既變則兵以多而弱者可使少之而後强也財以多而乏者可使少之而後裕也然後使官與吏相制而不制於吏使人與法相參而不役於法使賢能與資格並行而不屈於資格皆無不可動之患矣期年必變三年必立五年必成二陵之讐必報故疆之半必復不越此矣臣故以為機自我發而非彼之乘時自我為而何彼之待者也若置而不論因而不改則我之所謂難者真難矣敵豈復有易攻之機我之所謂不可者真不可矣敵豈復有可動之時亶之廢亮之殞斡魯之叛皆彼之機也我何乘焉彼之時也我何待焉臣故以為率易茍且習聞卑論緩嵗月而誤大事者也臣晝誦夜思審觀天意稽考人事十五年矣今日始得對清光發緒論陛下如聽之願反覆詰難以究其始末非獨臣之幸天地祖宗之靈所以望於陛下也適又上始論其一曰有天下之大必盡天下之慮不盡天下之慮鮮無患矣太祖太宗受天命身自剪平者七國盡有漢唐之天下惟燕薊前入契丹力未能復而趙保吉兄弟亂西方靈夏繼陷其後耶律浸驕繼遷始自立邉益警備矣當國事者不復深究始末直以中國既大也道德既富也患不能保境土息人民而已豈不足於二陲之區區哉非惟不務討伐二方以定西北之疆域而乃反行聘使封冊以申百年之誓信屈意而奉幣帛專力而守和好同此者為正論異此者為浮薄方其盛時南北相為兄弟而天下無兵安寧久於前世自以為天下之慮盡於此矣然而憑侮不除芽蘖終在小人因其間隙倡復北之謀前釁始鋤後患隨出民心未變而國家之守離矣始也誤委三鎮而兩河諸城猶以死而固拒太原之帥猶力竭而就擒建炎嗣統獨已失者河東耳其他固在也大臣怯懦不能常日夜以謀退卻於是二年始盡失河北紹興元年又失京東西三年又失五路此非有叛將亂臣據而與我爭衡者也劉豫乃自女真援立之耳及尼雅滿死僞齊廢敵用事厭兵舉數千里之地以還我夫不戰而得數千里地天誘之也然一旦烏珠背盟苦戰則所為分畫者才江以北淮以南而我亦莫敢較焉至金亮身亡北方潰亂歸義之民處處屯聚京東西秦鳳熙河州縣相次而復中國之威庶幾振矣然宰輔無狀踵失䇿繼舊盟卒亦黽俯割四要郡畀之徒使中原遺黎飲泣內恨絶望於我夫我不能守則民雖不為變而終以分裂我不能守則地雖嘗已得而終以失之其故豈有他哉始慮事之不盡而其患至此也慮事不盡使百七十載之天下不因民之怨叛而直失其大半隘處江浙以為南北之成形六十年矣嗟夫是已往之事不可追而悔者也方來之慮不盡則天下之患又將有甚於此豈可坐而講堯舜三代之舊洋洋焉熙熙焉而不思中外之分不辨逆順之理不立讐耻之義一切聽其為南北之成形以與宋齊梁陳並稱而已者乎成敗瞬息也得失反覆也何常之有慮不盡則昔之天下雖大而不能守慮之盡則今之天下豈惟能守之而反可以取之矣故以一取百帝王之慮也以一取十霸强之慮也以一取一必至之慮也加以思中外之分辨逆順之理立讐耻之義又取吾之所失而非冒彼之所得也愈於必至之慮也夫以一取百以一取十其難明矣然取之者慮之盡也以一取一其易明矣然不取之者慮之不盡也今將盡天下而慮之而後以一取一者可得而見故不可以泛辭舉不可以偏說定不可以逺事言也其二曰不盡天下之慮而終失天下之大計此最大事不可不極論也古之所謂忠臣賢士者竭力以行其所知言欲少行欲多言之若粗行之必酬故人莫敢多言而精於力行今世議論勝而用力寡大則制策小則科舉髙出唐虞下陋秦漢傅合牽連皆取則於華辭耳非當世之要言也雖有精微深博之論務使天下之義理不可踰越然亦空言也蓋一代之好尚既如此矣豈能盡天下之慮乎有大利必有大害為國者不敢專大利而分受其大害以人參之使其害消昔之帝王莫不然國家因唐五代之極弊收斂藩鎮權歸於上一兵之籍一財之源一地之守皆人主自為之也欲專大利而無受其大害遂廢人而用法廢官而用吏禁防纎悉特與古異而威柄最為不分雖然豈有是哉故人才衰乏外削中弱以天下之大而畏人是一代之法度又有以使之矣宜其不能盡天下之慮也自趙元昊反重之遼人求關南地天下之士始稍憤發深思逺慮以為之說然而內墮好尚之多言外狃法度之自利未能得其中也不幸熙寧改法之事起自是以迄於宣和之末靖康之初士大夫爭法之新舊辨黨之邪正鼓為烈焰漲為洪流而已過此何暇言之是又熙豐以來困於世故之紛更而不能盡天下之慮也靖康之難至痛極憤此上下深謀不知寒暑寢食之時也而茍目前忘大辱者為南自南北自北之論視宗廟君父之讐如疥癢之在身忍而不搔無害也明示禍褔以劫脅衣冠舉俯首而奉敵故二十餘年未有出思慮於飲食刀筆之外者況其逺者乎是又紹興以來為小人之所挾制而不能盡天下之慮也陛下總權綱執樞要責功能課勤怠崇實用退虛名審於考察謹於遷叙破流品以求人才右武官以率勇敢天下靡然知上意而承之矣然而懷欲為之心者以無所施而消縮負妄作之纍者以有所托而回容利惟謀新害不改舊取民者已困矣猶以為仁政趨事者已弊矣猶以為良法國無駿功常道先喪士無竒節常心先壞俗衰時迫誰與謀長是又隆興以來不能盡天下之慮也是非深觀逺覽遍知前失而不諱堅志强力獨行所難而不惑當為則為毋以為昔未嘗有當改則改毋以為今方循用除百年之宿蠧開興王之大道計嵗月之舉措求日新之功效明發慷慨同於饑渴焉能盡天下而慮之乎故臣碩條列前後之源流疏陳當今之本務成敗得失皎然而不亂所以佐聰明之一二者也適又上親征論曰將求今世之實謀必先息今世之虛論虛論有二一曰親征二曰待時何謂親征天下方有事君臣不得安寧以身鬭於兵革災傷危苦而後定蓋常事耳太祖太宗未嘗不自總戎真宗之初固已幸大名矣澶淵之役於時頗有異論傳者以為王欽若請之江南陳堯叟請之蜀寇準決䇿扈從渡河六師歡動用命王達蘭斃於遊矢而契丹請和自此而上下始以親征為祕䇿矣且契丹自岐溝以來無嵗不得志大名澶淵之役大將擁兵閉城而不敢出契丹鼓兵行入無人之境達蘭第偶死耳其約和金幣之力耳豈可謂將士俱不用命必待人主親履行陳然後可以為功哉使寇準以此自衒可謂無識之甚者而虛論既成當靖康中亦有謂當如真宗故事親征者亦有謂今日强弱異勢不可復用親征者建炎間深入兩浙紹興初趙鼎回建康而劉豫遁去於是論者真以為前日之所以屢敗者為不親征耳一親征而敵退舍故秦檜二十年之和而或之罪秦檜者非能知其所以不和之說也意在親征而已亮氏之來而光堯又嘗一出建康雖名為勞師其實亦用親征也故陛下初即位亦嘗下勞師親征之詔其後以約和而止夫今日之為謬論者曰久和好也以茍安而已其不以茍安為正論者問其說則曰親征而已矣嗚呼謀國如是殆矣兵强可也財富可也將能而禽敵可也若此者分畫明紀綱正法度修君臣上下一心同力以致之者也豈親征可以致之哉百不一講而委人主以臨危事曰天子所在兵無不勝書生之虛論未見危於此久而不能變則利害之定形未可決也適又上息虛論曰何謂待時此今論者所常以為言也夫時有未可而待其至昔之謀國固皆如此而今之所言特似之而非也越之報吳也范蠡文種以必在二十年之外而二十年之內勾踐欲不忍其憤而一決則二人者出死力以止之至其成功也果在於二十年之外此豈非所謂待時者耶然二十年之內越人日夜之所為皆報吳之具也故時未至則不動時至則動而滅吳若二十年之內無所為而欲待時於二十年之外可乎自古兩敵之爭髙者修德行政下者蓄力運謀皆有素治之術先定之形然必順其時而因勢之可為則勝違時而求以自為則敗若此者曰待時可也陛下二十餘年之間接乎光堯二十餘年之事聞待時之論而行待時之說熟矣待時之說轉而為乘機此羣臣之欵大事而誤陛下以自寬也亮氏斃殞北方請命女真亂離其時豈不至耶及陛下按甲兵而休之玉帛交使由乾道元年以迄今日不知何時可待而何機可乘乎時若是之久而當待機若是之逺而未可乘則昔之所謂楚漢隋唐多事之時所以奮起而立功名者豈必若是之泯泯默默使少壯至於耆老而終不見耶蓋待時之虛論其誤天下國家審矣臣請決今日之論時自我為之則不可以有所待也機自我發之則不可以有所乘也不為則無時矣何待不發則無機矣何乘陛下姑自為其時而後自待之毋使羣臣相倚相背徒玩嵗月前者既去後者復來不過如此而已也昔之為國者兩敵相形而時出焉極逺者數年而近者不終日其君臣起而從時每患其迫促而不及待不患其悠逺而不可待也悠逺而不可待未有甚於今日也若此者非真有可待之時也乃姑為待時之說而已適又上實謀論曰何謂求今世之實謀今壤地半天下兼三國之吳蜀比南北之宋齊梁又財利之淵也北方地雖敵半計其賦入十分之二三耳地大財富足以自為也然而五六十年不足以自為而聽所為於敵者則有故焉蓋自昔之所患者財不多也而今以多為纍自昔之所患者兵不多也而今以多為纍自昔之所患者法度疏闊也而今以密為纍自昔之所患者紀綱分雜也而今以專為纍姑請言四事之最急者今天下之財其為緡錢者茶鹽𣙜貨以二千四百萬矣經總制以千五百萬矣上供和買折帛以千餘萬矣又别計四川之錢引以三千三百餘萬矣古無有也不特古無有也宣和以前無有也是財多也而用之亦如是其多今略計户部之經費為千五百餘萬此祖宗盛時一倍之用也至於以六千餘萬供四屯駐之兵此開闢以來所未有也故財以多為纍而至於竭今天下之兵惟其在內之三衙名曰宿衛京師是其雖可議而猶不可廢也四屯駐之大軍何其多也諸州之廂兵禁兵土兵又有小小控扼所屯之兵併兵之數亦且百萬亦古所無有也雖然大則歷數十嵗與敵人和親而不敢鬬一日之兵也小則草竊窮寇數百人忽而不能制又古所未見也故兵以多為纍而至於弱今內外上下一事之小一罪之微皆先有法以待之極一世之人志慮之所周浹忽得一智自以為甚竒而法固已備之矣是法之密也雖然人之才不獲盡人之志不獲伸昏然俯首一聽於法度而事功日隳風俗日壞貧民愈無告姦人愈得志此上下之所同患而臣不敢誣也故法度以密為纍而治道不舉自今邉徼犬牙萬里之逺皆上所自制命一郡之內兵一官也財一官也彼監此臨互有統屬各有司存推之一路猶是也故萬里之逺嚬伸動息上皆知之是紀綱之專也雖然無所分畫則無所寄任天下泛泛焉而已百年之憂一朝之患皆上所獨當而羣臣不與也夫萬里之逺皆上所制命則上誠利矣百年之憂一朝之患皆上所獨當而其害如之何此勍敵所以憑陵而莫禦讐耻所以最甚而莫報也故紀綱以專為患而至於國威不立陛下雖朝思夕慮薄滋味逺聲色執權明道欲有所為而終不可為者四事之纍也然則奈何財以多為纍則莫若少之故四總領為戶部之害經總制折帛錢為諸州之害板帳月樁為諸縣之害則不可以不更也兵以多為纍則莫若少之故四屯駐大軍耗總領之財計廂禁土兵耗諸州縣之財計則不可以不更也法度以密為纍則莫若踈之故兵財民政分任而不一者不可以不更也紀綱以專為纍則莫若分之故四邉無所付外無郛郭則內無堂室故處不可以守出不可以取者不可以不更也更之則慰民心蘇民力解纏起痼興滯補弊則一二年之間可以抗首出北而取北之慮在掌握矣然非先盡其害則不能得其利害盡去則利見矣故四者之害又當條列而言之於後使知害者盡則去害者果去害誠果則有可言之利矣故言其所以為利者又在於條列四害之後也適又論紀綱其一曰紀綱法度一事也法度其細也紀綱其大也古人之為國豈能盡正蓋或得其大或得其細有失其一必得其一若細大俱失而欲煩文細故以維持其國家可靜而不可動易屈辱而難尊崇則本朝之事是已雖然法度之失未至如紀綱之失此古人之所甚諱也自堯舜以來外有嶽牧內有九官一以制度頒以文告觀以巡狩諸侯雖國異家殊莫有敢不相率而朝者治兵如治刑治夷狄如治中國此唐虞夏商之紀綱也至周參以宗室維以功臣其制加密矣秦則破壞封建而為郡縣削弱黔首禁制將相自天子以外無尺寸之權一尊京師而威服天下是時北胡亦始合為一國則築長城以限隔之重緣邉之兵攘却其要地而丐奴遁迹自屏不敢爭衡然人主恣睢太甚而下不堪命不旋踵而敗亡後世皆以秦之紀綱為失雖然秦之紀綱則誠失也然而以强為失而不以弱為失以大為失而不以小為失夫强大之勢易為也秦特不知為而已亦未可以深罪秦也漢因秦制二邉各自備內郡專刑賞丞相御史雖統攝天下刺史司𨽻雖督察郡國而守相皆得自為兵其兵也民其民也財其財也極其所治無不可者有進而授首無退而掣肘兩漢之治所以獨過於後世者豈非其操之簡而制之要哉當其盛時攘夷闢地至數千里至其衰也尚能係服單于而臣妾之豈夫蹙縮凡儒之論所可疵病其失哉此漢之紀綱也三國分裂雖科禁嚴密民無所措手足本不足以言治然邉方鼎立彼此窺伺一有蹉跌而禍敗隨之其所以皆自立於窘匱喪亂之餘不可動搖者豈非其分人以地任人以兵功有所望罪有所歸截然自用而不相拘制哉西晋使外制內以成諸胡之亂及其征鎮固守以忠義相奬激虛聲遺號猶為一統海內之具至王導為東晉重上流之柄壯揚州之勢石勒苻堅皆竭天下之力無嵗不戰而晉卒賴以立其後北則魏晉周隋南則宋齊梁陳皆循用之是則紀綱之所在患乎授任之非人而不以人為不當授任患乎分畫之無地而不以地為不當分畫患乎外敵而不患乎內侮其事蓋昭然矣唐用周隋府兵之法揀擇天下之民聚為强兵內則諸衛將軍外則節度總管四夷臣屬萬里請命雖常困於征伐而唐之威令又過於漢矣州郡削小分置益多而辟置生殺之權視前世皆已稍損至於中年邊將權重遂成末大之患無以抗之而內地亦皆裂為蕃鎮殽雜混并不分緩急不辨內外百世相承之紀綱由此墜失卒至五代以成本朝懲創之說而紀綱不可復振矣其二曰唐之中世既失其紀綱而藩鎮橫及其後也藩鎮復不能自有其威令而士卒驕五代之亂帝王屢易者非藩鎮也士卒也雖然藩鎮居士卒之上而士卒依藩鎮以為名見者不察而以為其患專在於藩鎮藝袓思靖天下以為不削節度則其禍不息於是始置通判以監統刺史而分其柄命文臣權知州事使名若不正任若不久者以輕其權監當治𣙜稅都監總兵戎而太守者塊然徒管空城受詞訴而已諸鎮皆束手請命歸老宿衛昔日節度之害盡去而四方萬里之逺奉尊京師文符朝下期會夕報伸縮緩急皆在朝廷矣其時契丹强盛太原未服西有諸戎之遺種所以備守之者猶倚邊將至太宗則又漸收之雖邊庭亦如內地矣蓋民困於唐末五代之久亂一日能使强藩悍將退聽而天下安息安得不自以為制馭宇宙之善謀遵用而不易哉雖然為天下之紀綱則固有常道譬如一家藩籬垣墉所以為固也堂奧寢處所以為安也固外者宜堅安內者宜柔使外亦如內之柔不可為也唐失其道化內地為藩鎮內外皆堅而人主不能自安本朝反其弊使內外皆柔雖欲自安而有大不可安者焉故自端拱雍熙以後契丹日擾河北山東無復寧居李繼遷叛命四方不解甲諸將不能自奮於一戰者權任重而法制密從中制外而有所不行也咸平之末真宗幸大名傅潛王超以畏懦敗圮王繼忠以輕進被擒景德初復幸澶淵幸而迄成和議不然當日之規畫而欲久與敵校犯闕之危不俟靖康而後見矣夫恃敵之已和而茍天下之無事割四方以封殖趙德明至其治具則日密法令則日煩禁防束縛日不可動爵祿恩意豢飬羣臣狃於區區文墨之中於是僥幸之習勝而志氣日銷削節義日隳敗矣論者或非之其追言太祖之事如姚內斌董遵誨郭進馮繼業之流皆守一郡官卑兵少然而豐財厚祿久任責成邊警無虞而太祖能以其力內平僭僞蓋雄略如此而竊歎後之不能不知此固昔者為國之本然曩以懲創五季太甚之故削損已多隄防已嚴此特其未能去者而至其後則盡去之耳自景德以後王旦王欽若以歌誦功德撰次符瑞為奉上之意以為守邦之大猷當百世而不變蓋古人之未至而今世之獨得也奚暇他議哉紀綱之失猶其粗者耳併與人材皆壞人之智慮不能自出於繩約之內歷考載籍非不燦然明備而皆未有能援昔以證今者但於煩文細故加增之使不可復脫而已此豈不為大可歎哉其三曰天下之弱勢歷數古人之為國無甚於本朝者真宗之末仁宗之初契丹守和約者三十八年趙德明亦三十年文恬武嬉舞蹈太平不見其為弱也及元昊始叛章得象之徒毅然憤其小醜欲剪滅之立論必於不赦既而屢出屢敗潼關以西人無固志而契丹遂擁兵境上以邀索周世宗故地使富弼重為解之然後乃已於是形勢大屈而天下皆悟其為弱證矣仁宗亦慨然思欲整治用弼與范仲淹韓琦為兩府論議前卻施行舛謬小人交鬬其間三人逐去而前規故習遂不可破當時議者以為三人不能循致治功而欲嵗月成天下之事其意太鋭故至於此嗟乎此三人者正坐不能以嵗月成大事耳弼與琦相繼當國其懲前之禍愈深而循致之說愈用矣雖然循致者卒不能有所致也弼相四年琦相七年所循致者何事哉於是財用耗乏人才頽弛天下玩弊愈甚而士以虛名相髙故王安石佐神宗欲一反之而安石不知其為患在於紀綱內外之間分畫委任之異而以為在於兵之不强財之不多也使安石知之正其紀綱明其內外分畫委任而責成功然後取賦斂之煩者削之本學校隆經術以新美天下豈復有洶洶之論不惟無成而反有所喪乎以神宗之厲志有為終於舉措衡決變法則為傷民開邉則為生事力圖靈武連以失利亦悔用兵之無益者不知改弱勢而為强勢而欲因弱勢以為强勢也夫改之與因由始論之一言之殊耳及其力行堅執乃成黨錮更紹聖崇寧而天下大病凡青苗凡保甲凡兵財之政所為欲因弱勢以為强勢者至宣和末年掃地無有昔日弱勢之可守者又皆廢壞而其弱勢之不可反者遂為膏肓不可療之危疾雖分四總管以固捍禦委長安建康之守以募勤王天下氷解雲散一城一池劫制於敵而號令不能及矣當是之時割地以與人使自為守猶且不可況能自守而禁人也哉然則本朝之規畫其始終本末之際蓋可覩矣自周德威失榆關之險繼以雲中燕山兩道歸於契丹敵在長城之內而大河以北已有不可守之勢為天下者不按九州之圖籍略其四旁規其中央左顧右望以盡天下之大形堅外柔內分畫委任羣臣合力功罪有歸以正天下之常勢第因其所有掩絶前後而欲以人主之一力守之豈可得乎此天下之患所以二百年而常在論今天下之事所以窮數十百萬言而不能決也其四曰建炎初載李綱用事議分京東河北用唐藩鎮之法使自守其地諸道各置要郡次要郡以一兵馬之權綱所措畫則已陋矣括馬斂財騷動天下議者蜂起不得旋踵卒以逐去於是汪伯彥黃潛善無所施為以為稍徙近南安常守舊命使祈請自足以茍延嵗月既而有維揚之禍牽連奔走東極海嶠始委張浚以川陜而宣撫處置之名立焉便宜行事之命出焉范宗尹相繼建請而江淮亦各分裂為鎮撫使於時盜賊充斥僞齊擁挾敵人連兵內向上流又置鎮撫大使文武參用犬牙相維復遣執政督視以一威望浚雖狂踈竟失關陜然節制諸將保有全蜀張俊韓世忠嶽飛亦次第平殄羣寇江左所以粗定而敵肯和者亦任人之效也雖然分畫無法寄任不専張浚趙鼎泛然於事機之會言戰不敢請和不欲費日纍月師老糧匱上下厭倦而秦檜以為權不可外假兵柄不可與人故屈意俯首唯敵所命以就和約廢誅諸將竄逐名士使兵一歸於御前督府結局收還便宜使州郡復承平之常制檜方矜其功伐自比趙普以為經國之長算莫能及也且祖宗之天下無故而失其大半遷劫之讐百世不可忘矣乃以撫定江左為大功何哉戊申至辛巳二十年矣女真一旦出不遜語聞於殿陛朝野喧然搏手無措相對駭愕無可為者而葉義問汪徹出矣及陛下嗣服以來張浚總統於江淮虞允文王炎之屬相繼宣撫於漢中蓋四五十年時用分畫之法稍以事權付託臣下為國之紀綱終不可廢者亦巳粗見於此然而不明其地則不可以任其人不任其人則不可以要其功內治不定則夫仇讐者誰與謀之今百計裒取竭東南之力以供餽四駐劄者而兵不知用因任舊將之子弟部曲以決得為統帥而將不知兵除授更易一出內庭報發承受名為機密而大臣不聞諸州禁兵零細纎弱専使路鈐教閲訓練而守臣不預防遏內江虛徹沿淮紀綱所立錯繆無序然則有民誰治有兵誰用有地誰守嵗遷月易孰為可見之效而陛下規恢之圗終將邑邑不試而已乎天下非可以私智為也方略非可以私術驗也勝敗興廢古今一途轍而已唯本朝之論則欲私為而私驗之是以頺弊委靡至於今日而莫曉其故此臣之所謂必盡知天下之害而後能盡天下之利也適又上終論其一曰今天下之大害其膠固而不能解攣縮而不能伸宿患積蠧臣已盡言之矣解之伸之豈無其道乎陛下始初出令必有以大慰天下之心必先罷去經總制錢之半今州縣睽睽不能安息人之精力消耗疲竭不可復有所為者盡坐此錢而已罷去其半稍稍蘇息天下然後州縣之月樁板帳罷矣然後民之頭子蹙零勘合牙契之額皆寬減矣然後罷和買罷折帛和買折帛罷則民所謂不正之斂皆無矣三者罷而天下之心慰喜滿足然則國用安所取給臣以為二年之後分畫既足則朝廷之經費比今日必十去其五六所罷者足以當之有餘而二年之前則未也陛下會計二年所罷之費為六千萬緍盡斥內帑封樁以補助之夫此內帑封樁者以之罷減三者之苛斂而以代戶部四總領之用度其明德光耀新美觀聽自兩漢以來未有此舉動也然則乘此以革去朝廷百年之宿弊無不可者以之減進士入官可也以之減任子入官可也以之破資格可也以之重銓選可也以之廢吏胥可也百年以來世論所謂動衆而召亂惴惴然不敢舉如臣所言之害者今皆並舉而為之無難也如此則朝廷清矣然後分兩淮江南荆湖四川為四鎮以今駐劄之兵各以委之所謂四鎮者非盡舉此百餘郡地以植立之也於中各割屬數州使兵民財賦皆得自用而朝廷不加問焉餘則各屬之而已而又専擇其人以各自治其一州所謂兵民財賦皆得自用則朝廷平日所置四總領餽其軍輸者二年之後皆可無復與彼以數州之財足以飬之矣如此則彼之任専吾之費輕矣雖然以兵與人以地與人此今日異常之大事然其為之不驚世不動衆陛下一日命之則成矣成則久久則安之以為常然若此者內以朞月之內盡去民之所患苦外以二年之外兵厲士奮可用之於死而大功可舉矣陛下不惜財不吝權念吾之所大欲者解膠固伸攣縮易於舉動果於責成以立大功而已則減輕總制和買折帛以先慰天下之心而後朝廷所謂煩密不可變之法度者盡變之以共由於疏通明達之塗矣分江淮川蜀之地與之兵民財賦以重人臣之任而後朝廷所謂専閫不可分之紀綱者盡分之以各合於外堅中柔之術矣若此者兼兩漢之長而不襲兩漢之失待之以成功而終之以禮樂則三王之治不難進也雖然為此者官非難也而士為難士非難也而民為難民非難也而圖兵為難誠今世之大事也圗兵之難者定則天下之利盡矣其二曰致今日之治無他道上寬朝廷下寬州縣而已竭朝廷之力使不得寬者四駐劄之兵也竭州縣之力使不得寬者廂禁軍弓手土兵也然則何以治四駐劄之兵而寬朝廷今既減經總制罷和買折帛蜀之折估青草而內出二年之費以供餽四總領矣宜任四人者由郡守攝統制召舊帥歸宿衛鉤考其隱冒乾沒請給不盡及軍人之罪聲而治之然後俾四人者一聽其所為而吾無問焉所問者欲精其軍使各不過三四萬吾欲用士之鋭而不併富其家小夫厲士而飬之將用之於死地以求勝也乃為之立家是兵為民也古者民為兵今者兵為民宜其消惰孱弱而不可制也昔者之論曰欲一當百又曰欲一當十夫百十何可當也姑得以一當一則精兵也夫一人得一人之用則固已十四五萬人矣用之必死誰敢敵者女真之來南也雜以奚契丹渤海漢兒前才五六萬後亦不滿十萬而已夫用兵者用其氣也多兵以自困氣先索耳吾之所問者如此又有所問更其敝政行其新令吾欲其無歡無動以疑於亂若此者在用人而已各與之數州地使自食而餘州得寬焉此二年之內所得為而二年之外收其效者也若是則朝廷寬矣然則何以治廂禁軍弓手土兵而寬州縣宜先擇一二十州畀之使散雜役之廂軍今之廂軍盡𨽻官下無在營者併與之以一二年之衣糧使各自為其子本以權給之而州無復給又散禁軍夫廂軍可散也禁軍散且為亂奈何曰禁軍之可畏者為有以禁切州郡使不得私役且上教故也今不上教散而雜役如廂軍焉彼欣然自幸耳然則散禁軍如散廂軍弓手之費稍輕土軍差少不急散也久將稍盡要以必散而止夫廂禁土兵弓手皆散何以守其地自三等以上籍其家一人以為兵蠲其稅役大州二千人而止下州八百人而止州縣各為之所將校率用其人秋冬而教春夏則否有警呼召不用常法然其為兵也必在州縣四方三十里之近家者此三四年之內所得為而三四年之外收其效者也若是則州縣寬矣朝廷寬則凡所以取州縣者皆不用而食租稅之正矣州縣寬則凡所以取民者皆不用而斂租稅之正矣且又非特此也朝廷寬則羣臣有暇而人材多矣不若今之乏也州縣寬則民有暇而善良多矣不若今之薄也上多人材下多良民兵省而精費省而富五年之內二年之外合其氣勢用其鋒鋭義聲昭布竒䇿並出不用以滅敵而何所用哉雖然為此者無他也力行而已按其嵗月在乎二年之外五年之內今日行此事去此弊某日此弊去此效見效不見則易其人加之意而必行之以日月計而實效致矣其三曰臣前所論者皆國門內事也夫門外事難論也自陛下嗣位以來士大夫莫敢有言及門之外者陛下嗣位以後始爭以門外事為言幾成俗矣言門外事既孟浪茫廣多虛寡要而門內事皆不及知故臣欲先盡門之內而及門之外今其將帥不知主名控禦不知地利則指事而言者妄矣臣請先論女真之始所以得者蓋每怪士大夫過於譽敵而甘為伏弱者何也其譽之也謂阿固達尼雅滿烏珠三人者敵人之雄傑皆古所無有故本朝之被禍最深此大妄也阿固達豪其部中延禧煩擾既過不堪囚執起而自叛此亦常理也不幸延禧政亂未嘗交鋒輒以敗亡女真者用其兵食其糧取其遺戈委甲而因收其土地披靡逃遁而坐獲其國都而謂阿固達之雄傑如石勒慕容雋之流以智力百戰屢僨屢起卒以得之可乎阿固達死武竒邁立不能主令而斡哩雅布尼雅滿分之其後烏珠來江南三酋者之奮而我之所以布陳立敵而復不勝者何故也自其始入而吾國已空千里無當之者矣彼蕩然而來也夫未嘗與之戰而敗則尼雅滿烏珠何以能獨過於古之諸傑而遂取吾之中原如是其酷哉蓋吾上下之人莫有用命拱手譽敵甘為伏弱而至此耳且彼之所欲必得者河北河東耳山東河南之地先以與張邦昌後以與劉豫又後以歸我張邦昌不敢抗而吾不能守也退而遷維揚耳劉豫見廢以歸我而吾不能守也退而割江北淮南耳彼真見吾之不能守也然後取而據之然至今日猶有不自安之心焉夫過於譽敵而不能自守當其始也乍見駭聞倉皇擾攘容有此論矣今安定久矣然而譽之不已何也故譽彼之兵則精鋭而吾則疲弱然則何不易吾之疲弱而譽彼之精鋭何也譽彼之威令則明信而吾則玩侮然則何不易吾之玩侮而譽彼之威信何也譽彼之規畫則審當而吾則茍簡然則何不易吾之茍簡而譽彼之審當何也譽敵以脅國人而因為偷安竊祿之計此風俗不忠之大而無有知者方靖康艱難時唯宗澤不平此論如澤者未足以論古之立功立事者然使澤得用二聖不終北狩矣固可一戰而敗也蓋天下之禍有大可痛者不戰而敗不守而亡此則自古以來未見有如靖康者矣不追議此而為可以戰可以守之事反謂自古未有如三酋之雄豪者臣謂此論亦自古所未有天地之理久鬱不伸必有待於陛下也夫尼雅滿與斡哩雅布同出而獨圍太原者一年既破都城盡取中國之輜重徐行而去烏珠生長極北夢寐不知江湖舟楫為何物也空行問津至於四明而後返使古之兵法皆盡廢而不可用則彼之雄傑誠若可信矣使兵猶有法則彼之所為乃違常失律僥幸以邀功者也何乃譽違常失律僥幸邀功之人以為古之雄傑皆莫過也哉其四曰請言女真所以守之者夫阿固達尼雅滿者生於東北窮小之地固非素有兼天下之志也契丹久安而政悖一朝起於不顧死命之中屢敗遼人楊朴者因教以稱帝改元至盡併契丹而燕人為之用及郭藥師導以南下其後遂破都城而據中原蓋昔之所謂劉石鮮卑氐羌皆嘗生長中國奮其雄心公起窺伺而尼雅滿烏珠本無其志也特以敢於決鬬而二國皆自莫敢較其故臣亡虜相與為之立其國家文法制度參以本朝及遼之大略繁劇牽制若乃聚重兵憑堅城衣食嗜好極於精善非復北人之本質矣始者我以二聖顯仁之故使命百請以講和好驕不見從酈瓊之叛擁全衆以歸劉豫敵疑有間且合從困彼也遂急廢之以河南關陜來而罷兵烏珠再出大敗於順昌柘臯始稍懼我而盟約遂定且以女真種落而兼中原契丹為之主其勢不順其心不服而保守至今六十餘年者以中原積怯懦不自振之氣且無有為天下倡者雖或倡之而居文法牽制之地亦決不能堅壁而窮鬭故也自紹興十一年以後不惟我之所欲者専在和好而女真之族類亦皆以和為利亮氏弒君殺母志平區夏移都舊汴南臨江淮鼓聲所震水波騰湧然發足未幾而今君自立於後矣方變昔日之君臣而為敵國又嘗聲以還故疆為言范成大之使湯邦彥之使中間屢較禮文矣自其向者平視我師投袂賈勇及此開隙足以取怒而敵卒不動今嵗退入其國傳聞多端難可信據然而上京蕭條從行死喪思燕之樂既而復返此不可誣也然則女真失其故部與契丹之地而以燕為家其君臣上下文法制度所以守其國者皆以中國為法而又碩和而不碩戰喜靜而惡動是雖六十年積纍之久而與此二國之人終非有手足肺腑之託也其與劉石鮮卑氐羌之勍對不侔也明矣然則其事在一大戰而勝之耳夫一大戰而勝敵之心搖不復留中原當以燕為固耳吾之始一大戰而勝其求中原也固易及其終於勝而不可禦使併燕得之此則難矣雖然事豈有不難而後成也哉今姑未言其終於勝而不可禦者姑求其一大戰而勝之之道焉勝之之道盡去吾之弊政用必死之帥必死之將必死之士決壞二百年糜爛不可通之說真以必死敵之則勝矣若今世之言兵出某䇿張某陳用某人以竒立功者豈可賴哉在以實勝虛以志勝氣以力勝口而已矣其五曰請言前日之所以謀為恢復者趙鼎書生自附於問學收拾文義之遺說與其一時士大夫共為貴中國賤逺裔之論此說春秋者所嘗講也不可以為不美雖然中國之不可以徒貴逺裔之不可以徒賤也所謂女真者豈口舌講論析理精微之所能致耶張浚之始用也少年狂踈恩信未足以感士智勇未足以服人蹙迫强項玩命之將一舉而失關陜蜀之全者幸耳鼎既泛然於事機之間不戰不守敵來則進而拒名曰親征敵去則退而安名曰駐蹕而浚尤為無統光堯四顧無所倚仗以言孝思之迫切則佑陵之梓宫未歸顯仁之鑾輅未返以言圖功之敉寧則治兵講武不休而彼此之分決迄無期度於是秦檜南自南北自北之論衡入其中堅不可破而鼎與浚均逐矣及乎紹興之末檜死敵動而隆興之初浚専以恢復之說自任號召天下名為忠義自喜者和而從之其實無措手足之地聚兵淮上則祖述范仲淹之舊說欲與敵帥往返以定和議為兩國生靈請命一則欲結合北方大姓故家契丹遺種相率響應以謀大功至其一取符離師徒潰散人情摧沮異論交興而湯思退王之望尹穡力主割地以盟而中原再失望矣浚不成而敗事及其徠歸正歸朝之人散滿內地窮困州縣冗雜銓部至今無根柢者上書論事自謂能知敵情畫策出竒以干差遣而度嵗月者大抵皆浚所為也蓋浚與鼎乃前日言恢復者之首而其方略可考矣昔者南北兩立南欲反城而歸北北欲奪地而來南無義之人志念不靖未始不如此為將帥者啖致之而不敢絶豈真以此為立功實驗哉今南北雖復為兩立之勢而北本吾故都故南之思北也少而北之望南也多大姓舊家常思歸順其理必然無足怪者特患吾威不立而戰不勝耳威立而戰勝可使中原之士奮梃逐敵而迎我然吾之真能恢復者不専在此況於契丹遺種豈可誘致此與童貫用郭藥師伐燕拒女真何異耶浚少年為將相困躓白首忠義不衰而其所經畫者止於如此光堯聖訓謂浚終不可用豈非知人之明哉今鄉曲之畸士志在邀利取寵復取浚門下巳陳之說更互藩飾以為北方之事可䇿而専任小吏以土物相饋遺竊問廝飬而謂得敵密事以相衒耀㳂淮守臣思為進用計布心腹於跳河之曹越淮未幾撰造虛事以為間探之明若此者紛然繼踵而恢復之說遂與舉子習程文以媒課試者無異而國事真無所考據矣碩陛下一掃盡去勿留聖思力行今日之實事以實勝虛以志勝氣以力勝口用必死之帥必死之將必死之士以二年之外五年之內責其成功可也其六曰請論今之所當分畫者敵以得中原為守而不以備我為守其戰妄進而已其守嚴兵而已昔人南北對壘之形彼不及也我無對壘之勢故也然而吾以其無對壘之形而戰則欲效彼之妄進守亦欲效彼之嚴兵是所謂無對壘之勢者也符離之戰是妄進也雖使得宿得亳得徐遂至汴郊將何為乎彼之所以由淮而妄進者明我之不敵耳而我亦效之何哉駐劄之軍是嚴兵也不度其必守而宿兵焉宿兵於無用之地將何為乎故我之當進而置兵者四興元一也襄陽一也合淝一也㳂海制置司一也我之當守而置兵者二建康一也鄂州一也當進而置兵其必進者二興元也襄陽也其不必進者則合淝也㳂海制置司也何謂必進襄陽之出宛洛興元之出秦鳳二者我之所必當有事據中州按關隴形勢之最先古今之同論決不可易者也何謂不必進從淮以出亳宋大梁地散而難一且敵之所必爭也敵所必爭吾能拒之使不可進而安江南之心其功多而大矣海竒事也危道也其進所以取齊也使關洛事濟四方響合朐山復來則可用矣不然則練而待之耳何謂當守夫建康鄂州當守也然為國必分內外其四外也其二內也內之不可不置兵皆所以安江南也雖然置兵無多必一人得一人之用則合淝最多也興元襄陽其次也建康鄂州又其次也制置司又其次也不盡二十萬兵足以滿之矣夫謀天下之大事成天下之大功非可以攻人之無備出人之不意也必有堂堂之陳正正之旗攻堅排深之力而後可我以此進彼亦以此進昔者謂彼能而我不能也今無謂彼能而我不能故我能彼亦能盡我之所能以較彼之所能短長相形而勝負分矣一再勝則霸王之資也夫天下之功難成也天下之事難謀也晉宋之間耀威河南常事耳枋頭灞上滑臺虎牢洛陽皆得至焉獨其不合天下之勢所以南北分裂而南之土地日削既失蜀復失淮復失江北故隋并陳也紹興十一年之前中原之號令猶或可接後始截然矣末年潰亂而諸將亦或有所至今也復不能望見襄廬以北論者方囂然以取中原為希世之事不知中原雖可得而北方猶未可圗也況其不能望見襄廬之北而欲坐䇿中原者乎陛下宜執分畫之要謹命帥臣立為至難不可動之實以對堂堂之陳正正之旗生其人之氣勢而不務出於無備不意以為立說之觀美而實不可用此則今世謀事立功之始也其七曰蓋今之所謂分畫者以一當一而以一取其一適得半焉以蜀當秦亦以取秦以荆襄當韓魏以淮當梁汴而未取梁汴也又以㳂海制置司不當齊而志取齊焉如是而長江之內深入吳越旁極閩廣而我之所以為國者又當在分畫之外其自守猶為有餘至於人徒兵械財穀而我之所以為具者不待收聚經營而可以自足則是非必奮於微弱立於艱危以小取大以寡取衆若昔者越之於吳燕之於齊也又非若女真之於遼與我也而又中原者我之地中華者我之名是則我於一當一一取一之外又有所謂易焉者雖然我之所有亦非彼之所無也我之所易亦非彼之所難也力均者必以力勝而我又有所謂難者自宣和以前以弱論行弱勢百二十餘年矣宣和以後又非止弱而已我之人氣奪心懾不能自主其命而今也抗首奮勢大正其綱紀欲必以二年之外五年之內而有大功天下之人或以竊笑或以驚視或以疑之或以非之或以沮之異論四出解體不前且復人材未嘗素練識不足以信其志意不足以行其力則兵之欲少者未必不激其變財之欲少者未必不因而乏此必致之勢而君臣相與之間不能泰然自保以要其成者也雖然事決有不可不然者在陛下深信力行而已蓋昔者其人所行之事與其人所立之論尚為不逺論立於此若射之有的也或百步之外或五十步之外的必先立然後挾弓注矢以從之故弓矢從的而的非從弓矢也今日之論先揣其人之不能行與其勢之不可行而論因以立是引的自近以成射者之無能而已自東晉王述蔡謨始有量時度時之論而殷浩諸庾屢謀北方桓溫事力尤盛謝安時會最捷然皆勞民動衆無所成立而敗喪隨之故王述蔡謨之論勝而今世偷惰無能之人竊取其說以疑亂當世所以國威久不振而陛下欲為之志久而無所為也故臣碩陛下究觀古今之變盡其利害之情而得其難易之實解膠固伸攣縮先有以慰天下之心天下之人方傾耳張目聳動四顧而莫知陛下之說安從出也然後立堅定之論而講分畫之規警䇿羣臣生其志力以終從陛下之論如射之立的而不使羣臣一前一却懷詐飾非以疑沮陛下之所立譬如引的自近以成射者之無能也此天下之大決安危興壞之大端陛下之所先知者也知此者定則臣雖微且陋得以其說為羣臣之倡承望聖意而敷暢於下誅賞可用功罪可分而人材出矣知桂陽軍陳傅良擬奏事劄子曰自古帝王之興未嘗不因天下之變或草昧之初或叔季之後皆可以成大功而熙鴻號於無窮載籍所稱創業中興之君是也往者外有方張之敵內有交叛之將關河海岱羣盜雲擾光堯太上皇帝﨑嶇馬上撫定東南以康世屯以繫國祚遭變之難自古所無而天命復集於宋蓋時無不可為者矣恭惟陛下睿知神武之略寬仁恭儉之德憂勤惻怛之意自纘丕緒以恢復為已任可謂對天地而不漸質鬼神而無慊者然而遷延稽故至今二紀比者賢士大夫類曰時不可為而以恢復為諱雖臣至愚竊所未喻且隆興用事之臣雖以朴忠竟無成功天下不與其才而與其心乾道用事之臣雖以大言亦無成功天下不與其心而與其名孔子曰必也正名乎今顧以恢復為諱果何名歟論說定則習俗成習俗成則人心不起人心不起則賞刑不足以懲勸是王業往往遂已也孟子以禹抑洪水周公兼夷狄孔子誅亂臣賊子凡以正人心也聖賢事業以人心為本靖康之禍諸夏陸沈而人不耻君父播遷而人不怨天地易位三光五嶽之氣分裂而人不懼是尚為有人心乎馴至於今晏如平時不念國辱私相恩讐但為身謀患在得喪自非陛下有以再造彞倫一新士氣臣恐此義寖微寖滅或有後憂也方今敵主春秋甚髙志不在動庶子嫡孫未知誰立一傳之後必非今日所覩矣以血氣方剛之君一時新進大抵生事儻無逺略且有內爭兵端其可禁乎就使敵無動夫以祖宗相傳之天下至沉淪五六十載北不足懷南不能令厭亂思治豈無其人聞之道路河決非常擾及關陜神怒民怨其兆見矣卒有特起何以待之就使敵無動中原無特起以臣過計千乘萬騎介在東南禮樂庶事比擬全盛地氣不能勝民力不能支亦豈子孫萬世帝王之業乎恭惟陛下睿知神武之略寬仁恭儉之德憂勤惻怛之意宜為中興盛帝顯王而以人心不起至於憂在子孫臣實未喻孟子曰得百里之地而君之皆能以朝諸侯而有天下未聞以千里畏人者也是在陛下而已臣不勝拳拳戶部侍郎王之望奏曰臣伏聞金人改圗碩修舊好遣使叩關將至闕下近陜西僞都統者亦揭榜令其將士毋得交戰以待講解察其上下之意和議甚切蓋和議不定則必有內憂不獨懼我師之致討而已國家以生靈為念固應許其自新其自新有如三事所宜審處一正名分二減幣聘三畫疆界竊料金人之議必出兩端一則欲仍用舊儀更增嵗賂而以河南故地盡歸本朝一則欲復請侵疆各守舊境而以契丹故事求為敵國二者皆未可遽也女真本窮荒小姓貢獻於我海上之盟以契丹之故約為兄弟契丹既滅便尋釁端以宣和為渝盟靖康為失信劫遷二帝淪陷中原聖主中興懷柔備至而狃於常勝必欲兼并兵力既窮始通和好天子不較稱謂屈已從權者正以彊弱之勢有未敵耳其後東昏正隆屢盟屢變至敢傾國大舉直窺濟江其渝盟信視我宣和靖康孰輕孰重我可以為辭矣今其立者素非人望以孱庸之故得自全於正隆之朝完顔一宗誅屠略盡見在近屬惟有葛王僭盜之謀起於羣下非有受命之符遏亂之略也威福大柄必在權彊內外乖爭覆亡可待故即位未幾已有兄弟之變觀其纍世骨肉自相翦除此豈安固之基靈長之運哉則彊弱之勢與靖康以後事體不侔逺甚若欲通好必尋海上之盟復敵國之禮然後可許名分既正嵗幣自輕凡此二事彼必不敢固執惟分畫之議恐費商𣙜耳大河以南彼知終非所有或當輕以與我而别有所邀然淮漢之北人稀土廣都無險厄汴都殘破徒有虛名雖或得之未易經理發兵戍守少則不足多則不堪措置一乖腹心罹患此敵人反覆已試之䇿而我向來受欺覆車之明戒也豈可保哉厥今天下之勢惟陜西為可復其地去敵最逺控帶關河內有四川為之根本我已得其十餘州若摧散關鳳翔之衆則其餘風靡矣今日之議設以大河為界固中國之福猶當深圗利害以拯後艱若以此更有邀求豈容墮其計中彼或降尊損幣自同契丹而靳吝土疆不肯分割則陕西之地決不可失宜以我所得陳蔡唐許潁嵩洛并他路諸州兩相換易如尚不可則寧稍增幣期於必從獨留南陽以通武關我若并梁雍荆揚之區保江漢秦蜀之險平居無事積糧固圉敵雖猖獗亦無能為若有釁可乘北方不足圗也此事至重非片言所決必一再往復而後可了惟少忍之而已陕西既得則置宣撫使司於階成和鳳之間而分布將帥據和尚方山仙人等原以臨制關中各用土人保其郡邑如熙秦京兆要害之處量出蜀兵戌之使以其力自全而不為蜀纍邂逅有警則下甲而出征萬一不虞則回戈而固守進可逐利退無後憂撫綏數年形勢自壯不煩糧饋不耗金錢惟稍出蜀縑增印錢引以募糴於陕西便足以了辦經費天下之利莫大於此百世之業也昔楚靈王窮兵桀虐民不堪命取陳蔡取不羮又將伐吳為乾溪之役楚人立子干以入郢王師於訾梁縊於申亥之家子干微弱亦不能自立卒為弃疾所圖弃疾既篡未獲所安乃盡反陳蔡不羮之封其國始定五年而後能出師金人今日之勢正類於此仰惟朝廷必有成謨狂瞽之言豈足觀采顧大議未定不厭詢謀用敢竭其區區之愚惟陛下裁擇幸甚司農卿李椿上奏曰臣竊謂國家創業以兵為重承平百年之後軍兵習惰一自南渡中原流離之民始為羣盜終得其用蓋有劉張韓嶽於江淮之上二吳於西蜀之險統馭有方故能立軍制拒彊敵國家之勢復振者委任得人故也自權臣當路挾敵謀和誅有功沮大將逐端人用佞士崇聚斂奬進獻汰戰士困州縣為固位之術二十年間軍勢銷鑠士風委靡不復有忘身徇國之士為長久之計惟知逢迎以圖富貴者比比皆是天祐宗社權臣殞命賴太上皇帝聖明洞察姦計雪寃抑逐邪佞奬戰士優農民四方萬里歡欣相賀諸軍將士其氣復振未幾敵人叛盟百萬之寇竟無所施者人心不離故也孟子以為得民心斯得天下者於此可見人心之不可失也仰惟陛下自臨御以來凡下詔令未嘗不以愛民恤軍士為急故軍民感戴聖恩銘肌刻骨莫或忘也凡百政事陛下未嘗不經聖慮一歸於公當盡善而後已天下固已幸矣臣自逺方來目擊之事有可疑且憂者不敢𨼆默臣請言之軍心未和是也國家所以保疆宇固宗社惟諸大軍是仰今將難其材故馭衆無術士不溫飽故其氣甚衰加以揀汰去其百戰之士離軍失其父子之彊寄招非碩故不入紀律待之不均故舊人失望近者鄂州大軍三千人捕數百之寇半年之間亡失過半內有病患寄留者無可奈何臨陳戰歿者猶為盡力惟是避征逃竄對敵退怯小寇尚爾遇大敵將如何臣嘗詰問差來兵將官但云絶無舊人新人不經戰陳其馭衆無術不能自知也新招之人所請日不過百金鄂州食用皆貴如遇泥雨日費草履已用其半又況有隨身器甲時須修整伏臘之費一身尚不能給有妻孥者不得溫飽無可疑也臣嘗與老將郭振議論振以謂使舊人但執梃隨軍亦勝新人堅甲利刃以其諳練與否耳況離軍之人又帶去子弟甥姪之屬軍中無相保之情新招游手但可充數在教場閲習固與人等一旦遇敵方知其不堪用蓋徒得其表而不得其心故也今諸處寄招人額既是束以罪賞州郡所費不資不敢稍辭或勒軍營招收則軍營陪費或勒保伍招收則保伍陪費就招之人多非情碩發遣之際必須關防起發三五十人即别差管押三五十人借請劵食之外又多雇舟裝載以虞途中逃逸如防罪𨽻軍中得之又亦關防目為殃害昔年嶽飛一軍紀律最嚴隱然如長城今乃無異諸路廂禁軍矣解彥詳等所將之兵戰歿者不過百十人而竄逸者不下數百臣得江西提刑辛棄疾書云彥詳所帶二千人今但有九百餘人臣計其陳歿及疾病寄留之外餘皆竄逸不啻數百此李川所以不得不按其罪也此兵乃王琪選差之人則其它軍兵皆可知矣臣密訪諸軍亦多類此豈不誤國家緩急之用至如待之不均者臣竊聞軍中舊人有嗟歎之言曰我自靖康建炎間從軍身經百戰豈意至今反不如後來歸正之人我輩揀汰離軍之後一任添差又或不得請給任滿之後便有饑寒之憂在軍之人將來離軍不過如此歸正人則任任添差三年為任每䝉優恤歸正從軍之人亦嗟歎曰我輩本是國家赤子偶緣阻隔多年後乃仗義來歸反不如俘四血讎離任轉官特支路費又給居屋優恤甚厚事屬倒置此舊人失望之因也以是數者觀之軍士之心略可料矣臣慮內外之臣不以實告陛下政府大臣或未之知使大臣知之陛下聞之決不忍坐視必有以收其心矣此臣所以憂也臣愚庸衰老初無可取誤䝉陛下知遇有所憂不入以告陛下則臣之罪負大矣所以不避溷瀆聖聽冒昧奏聞伏望睿慈毋忽臣戅直之言遴選大將久任之以馭其衆講究屯田以富軍士揀汰不離軍以全父子之情多收軍中子弟寄招軍免立額以收情碩之人待軍士以一體以收其心庶幾軍聲振國勢張不誤陛下倚仗臣民無復憂疑矣天下幸甚吏部尚書陳良祐奏曰陛下恢復之志未嘗忘懷然詞莫貴於僉同不可不察博訪歸於獨斷不可不審固有以用衆而興亦有以用衆而亡固有以獨斷而成亦有以獨斷而敗今遣使乃起釁之端萬一散騎犯邉則民力困於供輸州郡疲於調發兵拏禍結未有息期將帥庸鄙類乏逺謀對君父則言效死臨戰陳則各求生有如符離之役不戰自潰瓜洲之遇望敵驚奔孰可仗者此臣所以未敢保其萬全且今之求地欲得河南曩嵗嘗歸版圖不旋踵而又失如其不許徒費往來若其許我必邀重幣經理未定根本內虛又將隨而取之矣向之四郡得之亦勤尚不能有今又無故而求侵地陛下度可以虛聲下之乎況止求陵寢地在其中曩亦議此觀其答書幾於相戲凡此二端皆是求釁必須遣使則祈請欽宗梓宫猶為有辭內視不足何暇事外邇者未懷豈能綏逺中書舍人張孝祥論謀國欲一奏曰臣居鄉時鄰之富者有二子焉一欲坐而商一欲行而賈而父莫之決也而使之俱為之二子之始謀非不善也為其徒者以二子之不協則各幸其業之無成相非而相殘相戾而相傾居無何其家卒以大困又有貧者亦二子焉以貧故汲汲焉相與營致所以飬其親者均衣而節食內䦧牆而外禦侮朝於斯夕於斯期豐其家而已是人者訖致千金之資夫富之與貧圖功之難易相去逺矣以其謀或一而或二貧者以富富者以貧甚矣謀不一之為患也書曰惟精惟一又曰德惟一動罔不吉又曰豫有臣三千惟一心夫惟不一則天下之事雖至小而無成況夫濟艱難之運起非常之治也臣不勝憂國愛民之誠惟陛下留神裁察孝祥又上奏曰臣竊惟金人不道縶我行人中外同憤聖意堅決申飭邊備以全制勝如臣不肖䝉被使令感激隆知誓當效死顧受任之初有當為陛下言者敢布一二伏惟陛下神聖英武得於天縱永念祖宗創業之難太上皇付託之重兢兢業業不自暇逸將以刷無窮之耻復不共戴天之讎天地鑒觀神靈孚祐茍充是心何求不獲然臣區區之愚獨碩陛下益務逺略不求近功而已夫所謂務逺略者碩陛下盡舍拘攣掃除積弊去其所以害治者而行其所當為者起居飲食不忘此志而已夫所謂不求近功者碩陛下多擇將臣激厲士卒審度盈虛躊躇四顧不見小利而動圖功於萬全而已昔我太祖皇帝既得天下諸藩跋扈初未服從我太祖皇帝規橅已定不動聲氣磨以嵗月皆為我有臣碩陛下以太祖皇帝所以平僭亂者為今日恢復中原之䇿臣不勝幸碩校書郎熊克奏曰金人雖講和而不能保於他日今宜以和為守以守為攻當和好之時為備守之計彼不能禁吾不為也邊備既實金人萬一猖獗必不得志於我退而乘我曲不在我矣且今日之守莫重淮東金犯淮西負糧自隨其勢必難若犯淮東清河糧船直下易耳然則守淮之䇿以墾田修堰教民兵為先援淮東之䇿莫若即江隂建水軍緩急可相應然驟立一軍慮敵生疑當託以海道商賈之衝多奪攘置一巡檢警督之自此嵗增兵不出十年隱然一軍矣中興之際不患兵不可用而患將權難收今日之弊不患將不可馭而患軍情易動往時諸大將拊士卒如家人自罷諸將兵權御前主帥更徙不常凡軍中管權之利所以飬士卒者今皆轉而為苞苴矣又朘其餘以佐之得無怨乎宜嚴戒將帥毋縱掊削帝嘉其有志屯田員外郎林栗上封事曰前日之和誠為非計然徽宗梓宫慈寧行殿在彼為是而屈猶有名焉今日之和臣不知其說也宗廟之讎而事之以弟姪其忍使祖宗聞之乎無唐鄧則荆襄有齒寒之憂無泗淮則淮東之備逹於真揚海道之防遍於明越矣議者皆言和戎之幣少飬兵之費多不知講和之後朝廷能不飬兵乎且非徒無益而已與之嵗幣是畏之矣三軍之情安得不懈弛歸正之心安得不攜二為今計宜停使勿遣遷延其期比至來春别無動息徐於境上移書諭以兩國誓言敗之自彼信不由衷雖盟無益自今宜守分界休息生靈不煩聘使之往來各保疆場之無事焉用疲敝州縣以奉敵人之使乎知處州范成大上疏曰臣聞自古建功業者必有一定之規摹規摹既定則以其力之所能及者日夜淬厲以赴之而不可分其力於規摹之外所謂力者有三一曰日力寸隂是也二曰國力資用是也三曰人力思慮智術之所及者是也世事無窮而三力有限豈可分之於不急之地哉臣雖疵賤去國未久固嘗仰窺陛下神謨聖䇿將大有為竊計復古之心規摹已定然而風俗宴安期會倥偬稽古禮文之事太繁承平虛費之習未除日力窮於不急之務國力耗於不急之須人力疲於不急之役皆非所以副陛下規摹之所欲為者非曠然大有以損益之恐不免於志勤道逺之歎碩陛下與共政之臣自治三力専用之於所欲為之地凡規摹之外一切稍緩俟大欲既濟復之未晚昔越勾踐未得志也蚤朝宴罷非謀吳之䇿則不講自古能用三力無出其右者故功業卓然此雖陳迹可以驗今臣故併以為陛下獻取進止時言事者議欲戍守清河口左驍衛上將軍陳敏上言曰金兵數出清河必遣人馬先自上流潛渡今欲必守其地宜先修楚州城池蓋楚州為南北襟喉彼此必爭之地長淮二千餘里河道通北方者五清汴渦潁蔡是也通南方以入江者惟楚州運河耳北人舟艫自五河而下將謀渡江非得楚州運河無緣自逹昔周世宗自楚州北神堰鑿老鸛河通戰艦以入大江南唐遂失兩淮之地由此言之楚州實為南朝司命碩朝廷留意歷代名臣奏議卷九十六
