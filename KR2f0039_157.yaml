body:
  text: 歷代名臣奏議卷一百五十七明楊士竒等撰知人宋孝宗時敷文閣待制四川置制使范成大論知人劄子曰臣聞古今未嘗有不生才之世而君子常患於無知人之明今有知人之明則天下之人無不才者無知人之明而徒起乏才之嘆是亦厚誣天下而已不知其知兵而使之治財不知其知財而使之治禮及其不集事也則均受不才之名一旦各以其所長易地而使之三人者猶前日之人也而各以其才稱一動其機才否為之變是機也非智力之所能為天與之明道與之妙其於人也交際密庸於精神視聽之表固不可以言語筆舌諭也文王之立政克知三有宅心灼見三有俊心是以有能官人之名夫謂之克知謂之灼見此豈有諭而可𫝊哉今不先究知人之明而但起乏才之嘆不謂誣可乎臣嘗謂錢榖甲兵萬事之統皆可以立說惟人才不知不可以置論何者知人之明在人君心術之微而非變政易令之所及故也嗚呼知人之明尚矣其次莫若公公雖非明而可以生明去胸中之私喜怒用天下之公是非以進退天下之才雖不䏻皆當要亦十得七八伏惟聖明省臣激切而加意焉左諌議大夫王之望上奏曰臣愚不肖陛下過聽擢長諫垣臣未知所以稱塞竊聞唐魏鄭公以諫諍為心恥君不及堯舜平居歆慕以為人臣如斯可以無愧矣然賢人君子立人之朝孰不欲堯舜其君至於得行其志者宰相之外獨諫官耳臣今謬當其職敢不以鄭公之心為心乎或者以堯舜為不可及欲致君堯舜者謂之責難于君臣以為不然堯舜之道甚大而易行堯舜之政甚簡而易為顧後世不之察耳堯舜之道行於其躬者惟孝施於其下者惟仁陛下既允蹈之一無所難信乎甚大而易行矣堯舜之政則在於官人而官人之道在於敷奏以言眀試以功而已堯告舜曰詢事考言乃言底可績禹於臯陶亦云此所謂敷奏以言者也舜命禹作司空曰汝平水土成允成功稱臯陶曰汝作士眀刑弼教民協于中時乃功此眀試以功者也陛下於羣臣中敷奏之以言歟言發於前而底績於後者何人也眀試之以功歟功作於始而克成於末者何事也以此察之則虛名不足以惑衆聽橫議不敢以搖至公姦欺不容真僞判矣共工靜言庸違象共滔天而歡兜乃嘆美其方鳩僝功欲堯之用之而堯竟不從此言之不驗者也四嶽薦鯀治水堯曰咈哉方命圯族九載績用弗成此功之不效者也舜既承堯首正四凶之罪天下咸服堯舜之政豈不甚簡而易為乎陛下以聰眀睿知之資承光堯付託之重屬時多事未嘗一日以位為樂憂勤庶政三年於茲宜其治效崇成而未有云獲者非道之不洪政未舉耳臣伏見今朝廷之上妨功固位之習未殄背公死黨之論日聞以妄誕為才能以凶悖為堅正各執偏見而不求天下之通論各私所主而不恤公家之大計大抵圖國甚拙而為其身謀則工愛君不専而附其交黨則力孔子曰鄙夫不可與事君未得之患不得之既得之患失之苟患失之無所不至此風不革陛下雖欲彊兵富國為治安之計臣固知有所不能也伏願陛下眀詔在庭各厲節操平其心于論議之際端其趣於向背之間使廉恥興行風俗丕變訪之以言者必要其驗試之以功者必核其實若附下罔上造為弗靖怙終而不變則虞舜四凶之罪在陛下其得已乎如是則朋比自破功罪不誣而天下可運於掌矣此帝王致治之要術御􅕊之至權也惟陛下留神宗社幸甚王十朋除知湖州上疏曰臣嘗謂君子小人常相為消長人君未嘗不欲進君子而退小人也然小人常見用君子每見疏者蓋君子小人之難知雖堯舜猶以為病君子目小人為小人小人亦指君子為小人當孔顔桀跖相閧於前左右佩劎彼此相笑之際人君以一人之聰眀誠有不易辨者況君子直而疏小人巧而佞直則動多忤意踈則不能無過故人主反疑君子為小人巧則能以智術自將佞則動能迎合上意故人主反以小人為君子自古所以治少而亂多蓋由君子小人之不辨也恭惟陛下禀聰眀絶人之資行帝王正大之道歷古興亡治亂之迹皆洞然在聖學中君子小人之情狀固已備知之矣然天下所謂君子者或未能盡用或暫用而卒棄之所謂小人者或未能盡去或暫去而復合得非知人之哲亦猶堯舜之難乎夫君子小人雖不易知而亦有可知之理君子孤立如松柏小人附麗如蘿蔓君子進必由直道小人進必由邪徑往者潜藩二使令之臣竊弄陛下之威福士大夫無恥而好進者莫不奔走其門陛下赫然震怒奮自英斷斥而逺之天下莫不鼓舞聖德然附麗而進者猶未正典刑唐憲宗既誅王叔文并斥八司馬之徒終身不用元和威令復振號稱中興蓋由此舉今之附麗者初無八司馬之才而惡則過之附叔文者官止為郎未有若今之竊髙位達官者小人朋比之迹固不逃聖鑒宜擇其一二之尤者薄正其罪又取其能自卓立不附炎于炙手可熱之時與常言其罪惡者稍進用之如是則君子小人知所勸懲矣語曰君子喻於義小人喻於利君子之進必以道誼自奮小人之進未有不以利求合者前日朝廷以財賦不足為憂小人遂獻羡餘以求進朝廷不惜名器以美官要職處之諸路監司郡守翕然胥效為剝下益上計州縣騷然民不聊生近者臣僚論列陛下嘗罷一監司固足以為後來之戒然其尤者方進用未已全其大而治其細又何足以懲耶臣所謂君子小人有可辨者陛下第觀其自何門而來以何術而進因可以灼知其為人矣宰執大臣天下之選固不可使小人雜處其間侍從之臣以論思獻納為職即異日之宰執大臣也又其可使小人居之耶治道在知邪正然邪正難於盡知陛下宜於宰執侍從臺諌之臣精加識擇自卿監而下與外之監司帥守責之宰相可也臣言狂妄惟陛下察之乾道六年祕書少監周必大論漢儒上言曰臣愚不肖䝉陛下過聼擢在班列又取漢宣帝之言親製贊書眀示好惡使知所趨向在臣榮遇可謂至矣敢因訓詞所及推廣聖意冒陳一二惟陛下察焉臣聞儒有君子有小人孔子嘗以是告子夏不可以不辨二帝三王之時稷契伊周道德隆備功業光眀此君子儒也春秋戰國之際以詐謀相髙以功利相傾此小人儒也雖然二者是非黑白猶易辨也至西漢則不然所謂社稷臣者乃在乎周勃之鄙朴汲黯之少文霍光之不學至於服儒衣冠持祿保位則公孫𢎞蔡義韋賢輩實為之是非白黑貿易如此宣帝察而嫉之故曰俗儒不達時宜好是古非今使人眩於名實不知所守何足委任蓋有激而云爾雖然漢儒多僞髙帝固有以啓之也當創業之初叔孫通以儒服降彭城知帝憎之乃變服服短衣所守如此是託儒以希進耳帝遽信之毋怪乎魯兩生之不至也臣故曰漢儒多僞髙帝啓之也使宣帝而知此且將求真儒用之何至雜霸哉我藝祖皇帝則不然創業于初者一趙書記也混一于後者亦趙書記也規模不易廪廩乎帝王之佐豈嘗如叔孫通輩希世用事以為進取之資乎纍聖以來卿相多名儒者太祖任人之效也臣願陛下以漢為監以太祖為法則名實決不能眩而士大夫趨嚮一歸於正矣乾道間國子祭酒胡銓論禮及知人疏曰臣嘗於經筵恭聞聖訓有及於惟禮可以已之之說臣退竊嘆曰大哉王言如不欲平治天下則已如欲平治天下捨禮何以哉如不欲恢復天下則已如欲恢復天下捨禮何以哉何謂禮禮即道也道者適治之路也有言逆於汝心必求諸道有言遜於汝志必求諸非道可謂善言禮矣陛下聽朝之暇反復思之今日某人言逆耳可憎也然憎而知其善豫豈不念戴記之言乎豫豈不念魏徴之言乎豫豈不念唐明皇之有取韓休乎一言可以興邦豫豈不念仲尼之言乎是謂求諸道今日某人言順㫖可愛也然愛而知其惡豫豈不念戴記之言乎豫豈不念魏徴之言乎豫豈不念唐明皇之不悅蕭嵩乎一言可以喪邦豫豈不念仲尼之言乎是謂求諸非道夫求諸道而知其果善也此必端人也此必非佞人也則記其姓名於座右徐而察其行事誠端人也然後斷然用之求諸非道而果惡也此必壬人也此必非端人也則記其姓名於座右徐而察其行事誠壬人也然後斷然逺之此堯舜三王之用心而陛下獨得於惟禮可以已之之說大哉禮乎所以平治天下者此也所以恢復天下者此也顧明皇何足道哉臣祗進其厭飫者亦可謂不自量矣吏部侍郎韓元吉進故事曰唐書魏徴𫝊徴見太宗頓首曰願陛下俾臣為良臣毋俾臣為忠臣帝曰忠良異乎曰良臣稷契咎陶也忠臣龍逢比干也良臣身荷美名君都顯號忠臣已嬰禍誅祗取空名此其異也帝曰善臣聞唐初諸臣徴為善諫者也徴之此言第欲激昂太宗俾躋於無過之地而已至於忠良之别講之猶或未盡也徴之意正以輔佐為良諌諍為忠爾然孔子之語忠以孝事君者也故揚雄亦以言合稷契謂之忠今觀典謨之書則稷契咎陶何嘗不獻言於堯舜之世唯其言之而可行諌之而悉用君臣之際泯然其無迹而天下臻於極治非必激訐矯抗以犯雷霆之威觸鈇鉞之怒然後以為忠也自徴為是說後世遂以良臣或不事於諌諍忠臣殆將殺身以成名不可不辨也臣則以為正直謂之良不欺謂之忠皆人臣所當為之事有不必分爾當可諌而諌不害其為良當可從而從不害其為忠是未可以一偏議也然徴之事太宗反復於君子小人之際最為詳盡且謂太宗輕䙝小人禮重君子夫輕小人而重君子顧不美哉繼之則曰重君子也恭而逺之輕小人也狎而近之近之莫見其非逺之莫見其是莫見其是則不待間而疏莫見其非則有時而昵皆人情之所難言者其為忠亦至矣特於忠良之别雖有激而云反有所未盡故臣表而出之以俟上聖之擇焉厯代名臣奏議卷一百五十七
