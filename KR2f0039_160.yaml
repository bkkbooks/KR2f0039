body:
  text: 歷代名臣奏議卷一百六十明楊士竒等撰建官宋仁宗皇祐元年知諫院錢彥逺上奏曰臣以侍讀待制職名乃漢文學諸吏唐常侍給事之官清貴嚴近職在侍從獻納規諷謀謨非資重才周文華兼美不授非以恩例敘遷可得國朝揀任精極先帝時待制張知白自參知政事方除翰林侍讀學士出外及祥符中特置待制四員令更直祕閣以備顧問則聖人求賢擇才之意深矣而近歲除授頗多凡任使稍重例帶此職邉防列鎮印綬纍纍不惟名數益輕兼恐奬擢有濫夫爵祿品秩其選謹則職事修舉其流雜則賢愚混淆一失本源沮勸何賴臣欲乞今後自翰林侍讀樞密直龍圖閣等學士及龍圖天章閣待制並依翰林學士知制誥故事各限定員數遇有闕方許除授其三路帶安撫使臣僚並乞别除職名所貴內外流品有殊朝廷之官益重二年侍御史知雜事何郯上奏曰臣伏見朝廷以文武官入流無限審官三班院流內銓皆除注不行故嘗詔羣臣博講利害以求省官之策今選人改官已增立年考胥吏出職又議塞他岐惟貴勢奏薦子弟不加裁損則除弊之源有所未盡臣檢㑹文武臣寮奏薦親屬條制文臣自御史知雜已上武臣自閣門使已上每嵗遇乾元節得奏親屬一人諸路轉運使提㸃刑獄三司判官開封府判官推官郎中至帶館職貟外郎諸司使至副使遇郊禋得奏親屬一人總計員數上自公卿下至庶官子弟以䕃得官及他橫恩每三年為率不減千餘人舊制須以服紀親踈等降推恩然未立年月遠近為限所以恩例頻數臣寮䕃補近親外多及踈屬遂致入仕之門不知紀極漢法保任唐制資䕃本止及子孫他親無預又不著為常例今本朝霈恩至廣人臣多繼世不絶恩固甚厚然事久則弊亦當改張以救其失臣欲乞今後文武臣寮官序合每嵗遇乾元節得奏薦親屬之人除子孫依舊外朞親候遇郊禋許奏一人其餘親屬再遇郊禋許奏一人其官序每遇郊禋得奏薦親屬之人除子孫依舊外朞親候再遇郊禋許奏一人其餘親屬候三次遇郊禋許奏一人如此等級裁減一年內可省入官數十人積年而計所省漸多則仕路之冗不澄汰而自清矣朝廷向來已曾更改資䕃條制然而親子孫亦以限年釐革是致人心怨嗟遂即復故臣今所請以奏薦親踈為等降皆緣人情蓋人情于近親則恩甚厚於踈屬則恩漸薄今既許近親依舊制其踈屬止以年月逺近為限不盡隔絶酌于衆心計亦無怨惟聖明斷而行之則官濫之源庶或可塞其邉臣及路分合得恩例即乞依舊如許施行仍乞候過今秋大享後為始嘉祐元年知諫院范鎮上奏曰臣謹按唐制五品以上䕃孫三品以上䕃曾孫而無䕃兄弟叔姪之文今文官自知雜御史以上嵗奏一人自帶職員外郎以上三歲奏一人武官自橫行以上嵗奏一人自諸司副使以上三嵗奏一人又無兄弟叔姪曾孫之品限而旁及踈從所以入流寖廣仕路益雜臣欲乞見任兩府聽䕃兄弟叔姪見任學士止任團練使以上比唐三品得䕃曾孫知雜御史正刺史以上比唐五品得䕃孫帶職員外郎諸司副使以上專得䕃子兄弟叔姪降曾孫一等曾孫降孫一等孫降子一等又嵗奏一人與三嵗奏一人自有京官試御齊郎之别武官亦如此欲乞嵗奏一人者亦令三嵗奏一人于所得官上遞加一等或二等以優異之若得奉禮郎大祝者與大理評事諸寺監丞之類議者若曰今自學士而下捨兄弟叔姪而專任子孫非所以廣親愛之道臣竊以為不然兄弟叔姪于公則刑不相及於私則財不相及著令因官置到資産不及兄弟叔姪至於朝廷爵賞則輕加之為不可也臣欲乞除品合得䕃外朝廷必欲徇其私愛加惠旁宗且令依舊奏補無使入流如有才藝自隨科目貢舉課試中科目者比類白身人優與推恩其無子孫者特聽奏旁親一人入流如此則下不失私親之愛上無冗官濫賞之弊仁宗時宋庠奏曰聖詔曰承平寖久仕進多門人浮政濫員多闕少滋長奔競糜費廪祿者臣等聞欲影之正者必端其表欲流之潔者必澄其源此雖老生之常談然實治道之要術朝廷設官取士固有成規三年一開舉場九品盡由銓選其餘資䕃入仕流外出身或依託權臣謂之門客或因緣酬奬不纍年勞攀例承恩詭名希寵人浮政濫抑有由來臣等以謂取士者政之表也補吏者官之源也近嵗舉人殿試有老榜之目但論舉數無取藝能釋褐雖被朝恩參選已登暮齒縱分職任盡昧廉隅臣等欲乞將來科場罷兹一事又每嵗百司人吏出官甚衆羣臣子弟增年就祿員多闕少不得不然今審官院流內銓例許成資便令除替雖守闕者暫時為利罷任者赴選益多茍且因緣不能盡舉以上三事欲乞各付所司審加詳議委中書門下裁酌以聞如此施行似堪經久參知政事范仲淹上疏曰臣謹按三代之制皆立三公建六卿太公周公召公周之三公也以論道經邦為師傅又天官冢宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司寇掌邦禁冬官司空掌邦土此周之六卿也各帥其屬以佐王理邦國大事從其長小事則專達亦以三公兼六卿之職取其重也周用此制而王道大興世祚綿久至八百年我國家有周之天下未能行周之制亦當約而申之以治天下則可卜長世之業矣今中書乃天官冢宰之任樞密院乃古夏官司馬之任其地官春官秋官冬官之職各散於羣有司皆無六卿之正又無三公兼領之重而兩府間惟進擬差除多循資級評論賞罰各遵條例之外上不專三公論道之職下不專六卿佐王之業雖庶政不修天下不理咎將安歸臣請朝廷於百職中選其務之重者命輔臣兼領其綱要體周之三公下兼其六卿法周之六卿各帥其屬以佐理邦國唐貞元中詔宰相齊映判兵部李勉判刑部劉滋判吏部崔造判戶部工部又嘗命宰相兼諸道鹽鐵轉運使是宰相下兼其職以重其事也其不修舉者朝廷得以責之輔臣任責則庶政之弊可救天下之治可期惟陛下裁擇一審官是京朝官所集之府固當區别善惡黜陟幽明使賢者知勸嵗終書其一嵗黜陟之數以何等功而進者幾人以何等罪而退者幾人各分其類具目進呈一吏部流內銓條詔程式頗聞煩碎權勢之與孤寒優便之與遠惡在乎均平惻隱方協至公況羣材所聚倚在銓品亦天官冢宰之任也臣請命輔臣兼判每至嵗終書其一嵗之黜陟以何等功而進者幾人以何等罪而退者幾人各分其類具目進呈一國子監又諸道郡學聚天下之士講議詩書服習禮樂長養賢俊為國器用此地官司徒之職也臣請命輔臣兼判以總天下郡學每遇科場開日或有德行文學之士鄉里所推重者不以應舉不應舉許郡學士衆舉履行善狀詣所屬薦舉逐處官員更體量名實相副者保眀聞奏當議别行敦遣以勸天下之士一三司天下金榖之府今窘於財用經費以艱刻剝既深生靈重困宜疏通利源以救天下之弊此地官司徒之政也臣請命輔臣兼判此當今之急務每至嵗終書其減省冗費之數增息財利之數蠲放困窮之數具目進呈一司農寺管天下常平倉本欲凶嵗用濟生民今逐處弛慢不為急務倉廪漸虛灾傷無備赤子之命委于溝壑又勸農之政新頒詔令其天下官員勸課勞績並合委本寺考較以聞此亦地官司徒之政也臣請命輔臣兼判每嵗終以諸道常平倉增損之數并親民官勸課功狀之優者具目進呈一太常禮院用歷代之禮或不謹於典法隨時綿蕝綱紀寖壞制度日隳太常寺用歷代之樂或八音失序慢於大祀則神祗不享禍罰可召此春官宗伯之職朝廷之所重也臣請命輔臣兼判至嵗終具禮樂有所損益或廢墜有所修舉畫一進呈一三班院使臣數千人其品流至雜難於區别磨勘差遣日有榮悴臣請命輔臣兼判常選可用於邉陲或可委以錢榖或可付以親民或可任以殄寇至嵗終以所選人數具目進呈一殿前馬步軍司總轄諸軍其體最大更戍邉鄙要在均平揀擢材勇貴其精當至於戰陳之法號令之要皆須服習此夏官司馬之政也臣請命輔臣兼判至每嵗終以將校選擢之數軍旅服習之效具目進呈一審刑大理寺評天下之法生死榮辱繫於筆下禍及非辜怨動天地二帝三王盡心此道即秋官司寇之政也臣請命輔臣兼判每至嵗終具天下斷案中大辟流罪以特恩減放并法寺辨明出入數進呈一刑部一司詳覆天下已斷文案凡天下訴寃之奏盡委刑部辨之此亦秋官司寇之政也今官屬寡弱與審刑大理寺勢不相敵豈敢盡行駮正故沈寃之人十無一雪臣請命輔臣兼判至每嵗終具天下斷案詳覆到差失公事并辨雪過負寃人數進呈右伏望聖慈各委輔臣兼判前件職司其創置新規更改前弊官吏黜陟刑法輕重事有利害者並令兼判輔臣與奪其大體者别具奏呈令中書樞密院更從僉議然後奏取敕裁其逐司常務即主判官員依舊兼行仲淹又上疏曰臣謹按唐初內開十六衛以聚武臣外開折衝果毅府五百七十四以屯兵伍使三時務農一時習武無事則武臣居內以奉宿衛有事則武臣居外以統軍旅自武德至開元百三十年天下府兵無逆亂者及開元末倚安忘危乃廢府兵天下遂亂其後兵伍皆市井徒驕蹇怨叛終喪唐室國家今於河北㸃得義勇鄉兵二十萬亦如唐之有府兵也然所置官屬及揀㸃法制即與唐未類且逐處官非其人不能以恩撫綏以威制服臣恐一旦倉卒不為國家之用既教以弓矢馭之失道則寇亂之資已先成矣今河北州縣部內各管義勇其長吏中才可馭衆或智可防亂或威攝衆望者有幾人哉臣料按察使奏黜者不過老昧貪猥之人存留者不過勤謹畏懼之士其馭衆防亂恩威得所者必未多也由此觀之是陛下河北二十萬之衆未有統領而無所倚賴也今北敵方盛河朔千里無陜西關山之險又官軍數少難當大敵或更增置官軍即財力已困無以供億如此則陛下將何為必安之計不可不思也豈易百十員官吏為難而不以統二十萬兵伍為重然國家恐北敵之疑必未欲多置兵伍臣請且選逐處州縣長吏須命一二才臣專往河北與轉運使安撫使令行按察逐處知州知縣縣令內有才智不長非可統理兵衆者雖無過犯並等第列名聞奏內近成資者差人承替未近成資者與移諸路州縣却將諸處舉到知州知縣縣令人內揀選有材幹者先差往河北填替仍授以訓兵之要其知州並别授宣命專管勾義勇兵甲公事知縣並帶都監監押其縣令中有願換班行充知縣兼監押者並聽亦乞於武臣中選堪知縣者前去如此則得人稍多必能統領教習使行軍陳之序金鼓之節賞罰之約緩急遣就統領可戰可守不誤大事又良吏撫馭恩威得所雖有饑饉不為寇亂其河東路即乞續次依此施行此國家大計非臣之敢輕言也時張方平上論曰臣聞周制大國三卿命於天子自大夫羣士皆命於其君王卿士之官屬亦各自選用故穆王命伯冏為太僕正曰慎簡乃僚其惟吉士漢之藩國朝廷獨為遣傅相其中尉千石而下得自署置三府各擇掾吏州郡從事列曹衆職悉任之于刺守魏晉始建九品官人之法中正核人材於外吏部銓授于中而辟署之制仍行不廢隋開皇中內外庶官罔論大小悉歸選曹無復外補唐氏雜考古法稍復其制採訪節廉之官屬判官而下皆自延請其已就署徐乃上聞未奉報者稱攝既王命者同正肅代之後嶽牧權重或自除支郡刺史專戮二千石凡諸辟用悉兼臺省皇朝興國初始罷假攝而重臣近職出臨方面自介倅賔佐逮諸掾吏得自王官請辟相承惟舊於政殊無損者而頃議者復為過論以為多引交舊或容請托又慮孤平之人才上被代使奔命之不暇且郡縣送迎之洊勞由是復上奏辟之制臣聞書戒任賢之二易美彚征之吉傳褒舉善詩貴蒸髦且朝廷官人之法大體以保任論薦為選擢之路位登朝列職分半刺固可以舉其所知矣況大臣者上所尊禮而信用者膺共理之寄求自助之良設令引交舊而得賢容請托而不失才其亦何愆乎義凡所謂善知人者必審其善惡察其器能非交舊則何從知之既無交舊之素則必求於長者之譽善人之論採清議訪鄉評而取之是故涉乎請託矣魏盧育曰夫名不足以致異人而可以得常士畏教慕善而後有名是不猶愈於殊無善而稱者乎而議者迎事端以設防蔽滯俗情而虧大體使大臣知善而不得用知濫而不得去是何取乎理哉臣愚以為宜復舊制稍為條約遂其援能之善塞其過分之請論辟之始當依遷次而補除贊助有聞自用常科而奬薦誠有人乖物論非可掩之瑕事出幸私有駭衆之迹自可使憲署彈劾外臺察廉暴其妄舉之愆示以必行之典如此則當薦延者有顧慎之意勵名行者有伸知之望吏皆勸向事斯修舉翹楚必刈白駒可縶上為掄拔以漸之道下免滯淹不調之歎干旄好善雖紀浚郊之美棫朴官人終歸周朝之盛矣方平又上論曰臣伏以今外權之重惟轉運使一道百城號令千里官吏之黜陟財賦之弛斂恩澤之流壅民政之慘舒郡縣觀聽其風稜國朝倚辦乎外務提衆職之綱轄實方面之師表蓋漢刺史之職而唐度支諸道巡院留後之任也漢制刺史掌以六條督察二千石而不主金榖貨利之事其主金榖貨利之事者則大農有部丞州一人而郡國有均輸鹽鐵之官唐世亂後急於兵食而計臣始兼轉運諸管𣙜之名而諸路置巡院官掌賦調之式委輸之藏而不總州郡之政吏民之事其總州郡之政吏民之事者則有按察採訪黜陟之使今之外臺乃兼其任授國寄用勢望甚雄小大之政無所不統夫其捃拾勾剝錐刀毫忽之計損餘補寡給報調度之算正一胥史可辦者爾轉運使之大體在乎訪視風俗革正其因循之弊廉實官吏周知其否臧之才此固水木之本源衣服之冠冕矣是之弗圖而猥事乎米鹽芻秸之微株效乎圭勺星銖之謬而宿姦大猾據都占郡府署為豺狼之窟州縣為虺蜴之宅以至暴于天聽達于四方而外臺猶莫之舉也此豈所以與天子共理之意歟比者朝廷議郡長吏之罪而轉運使坐纍左遷斯見乎朝㫖務澄肅乎外政者也夫聖人立法所重成俗習見既久回革已難今天下之俗樂和易而惡堅介貴循常而重改作建一功利必䝉生事之名免一惡慝已落所怪鳥衆噪乎早飛故雖綱膺之䝉寄任于今猶頗牧之當漢文之世也臣又詳轉運之名蓋以賦輿為主似非專為舉賢黜惡而設也子曰必也正名乎則其居是職者先聚斂而後民政又不可多譏也昔在兩漢雖有刺史督州而又時遣使四出察郡吏之治故前漢則有繡衣直指傳行郡國得專戮二千石後漢則有美俗清詔之名分行四方唐雖有採訪按察之職而亦時遣郎官御史訪事得失臣愚以為宜舉漢唐之典精選臺閣之臣才識深眀風度方重者銜命分道參考民謡以升聞亷正劾免庸暴必列疏其能否之迹實録其善惡之狀以行誅賞之法以立褒厲之道至于有可興之功利有可蠲之疾苦草萊有幽潜之士閭巷有節義之人因得搜揚以輔政道數年輒一遣而勿限于常如此則吏知沮勸常懷戒懼之意民有侵枉益開辨理之途利害上達而不遺恩澤下流而無壅矣知制誥胡宿上奏曰臣等昨奉敕為翰林學士韓絳上言國家奄有四海承平百年官制未修方古為陋欲望討論有唐官制及本朝官制品秩事任量加裁定正其名體等事奉聖㫖差臣等同共詳定臣等纍曾懇辭不䝉允許尋其劄子陳乞且未置局容臣等取前代官制將今日官位職任商度可改正者可裁損者可申明者各條三兩事先送中書門下更加商量若果可施行即置局辟官次第刪定奉聖㫖依奏臣等今詳定到事件如左一漢置丞相其後改置三公官皆有府辟召掾屬唐制以尚書門下中書三省長官為宰相尚書令僕射侍中中書令是也官品未至者同中書門下三品今平章事即其比也參知政事唐初亦是正宰相崔溫等嘗為之國朝之制下宰相一等若用唐制正其名體則四輔之任當悉用平章依漢制即須立丞相府一唐制御史大夫一人中丞二人國朝之制大夫不置以中丞為臺長他官或以給事中諫議大夫權之若欲改正官制置丞相府則大夫當復輕重乃等一唐制無公卿為樞密使五代用兵始與中書對掌機密即欲改正官制當以院事還中書及尚書兵部一尚書省二十四司既為虛名所以官冗員衆即欲正官制當罷三司復二十四司及九卿官使有定員其郎官不在本省治職事者並以前資及散官處之其蒞外任者或依唐制置上中下等州刺史及别駕之類隨官品任之或欲輕其權則曰知某州刺史之類一文武散官及檢校兼官勳爵實封等在開元已前頗有實事於今惟散官猶叙服色粗繫輕重其餘悉皆虛名無益治體即欲改正官制當例行省罷若以假虛名而佐實職兼存亦可已上所謂改正者也略舉一隅若於今可行即推此類具正之一大理寺決天下獄刑部覆之於事已足又加審刑院則為駢衍即欲裁損官制當以院事官屬還刑部一吏部尚書侍郎分領銓事則當差以輕重分别流品今審官院掌京朝官磨勘差遣而流內銓惟典州縣幕職官體制不倫即欲裁損官制當以審官院職事歸尚書銓州縣幕職官歸侍郎銓一群牧司提舉司糾察司之類皆古無此職即欲裁損官制悉當省罷還屬尚書九卿已上所謂裁損者也略舉一隅若於今可行即推此類具正之一左右史並當隨宰相入立仗下以記言動今史官之任不及聞前殿政事故德音善政多失紀録今欲申眀復此舊制一中書出制敕唐制並經門下審覆然後尚書出告身經歷三省比來惟於中書發敕虛署三省官名今欲申明復此制國朝令文具載一國朝近制觀文殿大學士惟待舊相自資政殿大學士至天章閣待制已上其間多有無貟數除授浸廣者繇邉幅不立也諸舊有員者宜依舊數未有者宜差定其員著為久制以革溢員之濫一唐制舍人六人分判尚書六曹事所以佐丞相謹政令欲乞申明此制一舊制九卿之職不𨽻尚書今卿監職事三司關領者宜取還寺監亦省侵官之類一唐制左右丞判尚書省事給事中判門下省事中書舍人判中書省事國朝門下省權用近臣判之中書省即舍人年深者判與唐制略同准昨上言者稱近臣判省太重考按唐制似不如此惟常衮自以同中書門下事即當兼判中書省是時崔祐甫以舍人判省謂衮侵官士論由此不平衮也一一班自供奉官至殿侍差借之類唐制武選皆無此名目宜徙置於外以區别華冗一朝廷若欲從改正之說即候改正之後設官分職如周唐乃可約六典著書垂之後世若未能如此而欲著書惟可將㑹要及諸司編敕并格令刪繁取要因今日官名粗書職分而已已上所謂申明者也略舉一隅若於今可行即推此類具正之時知諫院包拯上疏曰臣謹按唐制御史府其屬三十人所以重風憲之職國朝以來選任尤劇天禧中御史六員蓋朝廷紀綱之地為帝王耳目之司必在得人方為稱職自非端徑特立之士不當輕授近嵗知雜中丞不專奏辟或命兩省臣寮參舉而條制約束罕得應詔雖素有才望又限以資考推擇之際頗慎其選臣竊見頃年添置御史裏行二員緣所舉之人秩序差淺用之不次必無畏避自後因循而罷物議惜之方今臺官員數最少抨彈之任所繫尤重欲乞令中丞知雜依舊例於升朝親民官內保奏堪充御史裏行二貟如稍不稱職並嚴坐所知時劉敞上議曰臣伏見故事諸讓官者或一讓或再讓㦯三讓皆有品秩非不欲人人讓也讓之迹近名則容僞而為禮者惡煩煩近於䙝故設中制有所止之也昔舜命九官䕫龍不讓其他伯益之徒一讓而止此則治世之法也竊見頃來士大夫每有除命不問高下例輒纍讓雖有出其至誠恬於勢利然亦已逾典制過夔益矣若習俗遂巧流風稍敝必且挾僞采名要上迷衆更以此為進取之捷徑奔競之祕䇿甚可惡也豈獨煩於禮哉夫讓雖美道君子所有餘小人所不足然非其真則醜亦甚昔鄭公孫段辭為卿退則又使太史命己子産惡其為人其後卒為亂故飾僞之敝至於此非國家之福也公孫段尚其小者耳子之擅燕王莾代漢其始皆以善自名已而稍入於邪也臣謂賢者之節難進而易退難進而易退者非茍讓一官之謂也謂其能擇於義不犯非禮也故雖不多讓其節猶可見衆人之情好得而惡失好得而惡失者亦非勉受一職之謂也謂其不擇於義越禮而動也故雖復飾讓其情亦弥險讓與不讓一以故事舊典為準無使釣利者要君采名者售僞不幸而不值子産之精識則公孫段之徒紛然競於朝矣臣言似迂而慮實逺望賜財幸英宗治平三年知制誥韓維上奏曰臣昨日聞御史知雜吕誨等以言事被黜至今不見敕至封駮司訪聞乃是中書直封送本家臣竊以封駮司給事中之任也凡制敕必由此而下有所不便得以封還論奏古今之通制也今罷黜御史事關政體而遂不使有司預聞紀綱之失無甚于此臣伏思王者建立官局張設法度擇人守之所以防檢繆失共成治道而朝廷自壞其法不知為此將以何利也伏望聖慈指揮中書追誨等敕命令由本司使臣得申論議以正陛下之官法維又上奏曰臣近以御史知雜吕誨等降黜敕命不由門下封駮司直送本家嘗具論奏乞追還以正官法至今纍日未見施行臣伏思古者並建庶官各有法式所以共成治體逺防禍敗雖王者不得而私也況大臣乎淳化中命樞密直學士向敏中張詠㸃檢看讀發放敕命其實封敕文並仰中書房候印押下送向敏中等看讀㸃檢了却實封發放祖宗所以審重號令防檢繆失如此其至今朝廷一旦騁私意以壞聖王之法快目前而忘後世之慮獨何謂也方今官失其法人怠其職百事隳廢日就衰靡臣愚竊謂宜有以力振頽敝而陛下君臣方共為此事臣竊為國家憂之伏望聖慈以臣此奏并前所上章早付中書施行臣懦不能為陛下守官伏待譴黜維又奏曰臣近以降黜吕誨等敕命不由銀臺司纍具論奏今又聞罷傅堯俞等敕亦是直送本家臣竊以法制者天下之公器非天子所得私而亦臣下所不敢輒廢也故法有不便事則易之未有設而不行者人有不稱職即去之未有存而不用者也陛下才畢亮陰即降詔戒厲臣下曰內外因循惰職者衆未聞推利及民盡心憂國者又訓以易慮孳孳各修厥職詔下以來未及一年不聞群司有所進益而公卿大臣乃自壞法度違戾詔文臣雖區區為陛下愛惜此事章三四上不䝉省察京都之內禁門之中尚且如此而欲以風勸天下推利及民豈宜可得哉孟子有言曰有官守者不得其職則去有言責者不得其言則去今有言責者既不得其言而去矣不得其職者尚且胡顔茍處乎況臣兩還詔㫖今又不能仰遵聖訓為官守法罪戾仍重豈久玷侍從尚竊封駮之名伏望聖慈特賜罷黜所有銀臺司等職事臣更不敢僉書見居家待罪英宗時翰林學士張方平上奏曰伏以知制誥之職所以代王言為誥令由此召入禁林充學士非才譽允洽何以當其選比來朝廷率以體例次補日近誥命或有鄙淺傳為口實前代國家有事之際或以單劄之辭折衝千里之外使三軍感勵萬方悅勸背逆凶醜或以革心逺方異類或以向化故知文辭書命有足以助國威宣王澤也祖宗之世有自州縣之職拔處辭禁有自兩禁黜為管庫者蓋惟才而是用豈為人而擇官其修起居注史館修撰即次除知制誥之資序也今朝士不修廉恥至冒憲章法座之前輒自干請竊謂若此除授宜詳加推擇必其人流才地辭學器識他日可以備大臣之用而後擢處其職文物盛於本朝光華照於天下使名器以重堂陛以隆天下幸甚右正言劉安世建言祖宗之待館職也儲之英傑之地以飭勵其名節觀以古今之書而開益其聰明優其廪不責以吏事所以滋長德器養成名卿賢相也近嵗其選寖輕或緣世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂獲貼職多開幸門恐非祖宗德意望眀詔執政詳求文學行誼審其果可長育然後召試非試毋得輒命庶名器重而賢能進矣神宗熙寧二年御史中丞吕公著上奏曰臣竊以三代聖王之政至於久則不能無弊在審所救云爾國家享天下逾百年凡當世舉可以修舊起廢興利除害者固非一日至於近日改更宗室法度省罷銀臺奏白減外親奏薦處置疲癃官吏之類中外之論孰曰不然惟是制置三司條例一司本出權宜名分不正終不能厭塞輿論蓋以措置更張當責成於二府修舉職業宜倚辦于有司若政出多門固非國體宰相不任其責則坐觀成敗尤非制世御下之術兼臣昨來已曾論列所有制置條例一司伏乞罷歸中書其間事目有可付之有司者即付之有司公著又上奏曰臣近具劄子言乞罷制置條例司歸中書至今未䝉施行臣聞孔子曰名不正則言不順言不順則事不成今來制置一司上既不關政府下又不委有司是以從初置局人心莫不疑眩及見乎行事物論日益騰沸蓋朝廷大事無不出於二府惟是今來制置條例實係國家安危生民休戚而宰相不得與聞若宰相以為可自宜與之共論以為不可亦不當坐觀成敗但事書敕尾而已至於倉場庫務瑣細利害又恐不必執政大臣然後能集臣又聞聖人之政貴乎顯仁藏用管仲霸者之佐耳及其為令猶曰法成而鄰國不知今朝廷處置實未能有利及民然而先置一司使天下疑惑愁怨至今不定恐非策之得者也乞檢㑹臣前奏施行公著又奏曰臣近為降下司馬光等告敕到封駮司尋以為不便遂具封駮聞奏竊知已直降光等告敕付閣門臣伏以祖宗置封駮之職蓋以朝廷政令不能一一盡當故使有司得各竭其意以補闕遺臣既繆當官守茍有愚見誠不敢自默以失祖宗置司之意是以即有論列今來朝廷既以臣言不當自當顯行黜責其所降敕告亦須經由本司蓋臣雖可罪而此職終不可廢若因臣一言不當遂使今後封駮之司不復能舉正職事則是祖宗法度由臣而壞伏望聖慈正臣封駮不當之罪特加顯黜以振綱紀熙寧三年右正言李常上奏曰臣伏聞近差諸路提舉常平廣惠倉僚敕㫖不由封駮司中書以為係是舉差臣竊以為過矣國朝因唐故事置門下封駮司自是非機密宣敕皆使詳讀然後頒下其或失當得以釐正所以謹出制命之意亦已至矣故祖宗以來多選方正望重之臣典領是職緣於朝廷所補非輕其為責任甚重今遣使四出得興利除害舉察州縣使事之重與監司略等而不付之有司參考能否墮廢綱條理實未順兼封駮之任雖人主親所選任皆得以其職言今曰舉差臣所未諭臣恐朝廷典則寖得緣事廢紊伏望聖慈特賜指揮並依舊制庶命令所加務於詳審有司職業貴以修舉元豐中判三班院曾鞏上言曰右臣伏見聖恩以新雕印唐六典頒賜近臣以及館閣竊以唐初以尚書中書門下三省參領天下之事以今僕射侍中為宰相之任然選士用人出兵授田刑罰禮樂至於工官所主則一本於尚書尚書侍郎分為六官郎員外郎各有攸司又分為二十有四所以彌綸庶務至微至密其大則以永業口分之田制民之産以租庸調制民之賦以諸府十二衛制民之兵三代以來其政最為近古太宗所以致治者蓋出於此其事至衆而舉之有條其體至大而統之有要可謂得建官制理之方明皇之世乃考尋舊章著之簡册以六卿所總領則象周官名其書曰六典而開元十四年張說罷中書令為尚書右丞相不知政事自此政事歸中書而尚書但受成事而已亦其書之所記也則當是之時尚書已不得其職其所著者蓋先代之遺法也其本原設官因革之詳上及唐虞以至開元其文不煩其實甚備信可謂善於述作者也臣向在館閣嘗見此書其前有序明皇自撰者而其篇首皆曰御撰李林甫注及近得此書不全本其前所載序同然其篇首不曰御撰其第四一篇則曰集賢院學士知院事中書令修國史上柱國始興縣開國子臣張等奉敕撰蓋開元二十二年張九齡實任此官然則此書或九齡等所為歟不敢以疑說定也伏惟皇帝陛下神智聖性夙成自天方革敝興壞以修太平之業繼唐虞之跡而稽古不倦旁及此書乃自禁中鏤版傳之以賜在位豈不以其官儀品式去今未逺而行於今者尚多將使學士大夫得而求之其于就列皆知其任其于治體開益至多非聖慮所存規模宏逺則何以訓勵群臣委曲至此臣備數內閣以文學為職宜略知典故不可以衰退駑鈍怠惰茍止故敢昧冒以請伏望聖慈依例賜臣一部使得伏玩思索萬一得奉清閒尚可牽強以備訪問不勝犬馬區區之誠貪冀恩私不知僭越其于罪戾所不敢逃干冒宸嚴臣不任戰栗之至鞏又上言曰臣伏以陛下稽古正名修定官制今百工庶務類别以明其於講求經畫皆出聖慮彌綸之體固已詳盡然推行之始去故取新竊恐百執事之人素未諭於其心習於其耳目一日之間或未盡知其任群吏萬民聽治於上者或未盡知所趨待夫問而後辨推而後通則必有煩阻之患留滯之虞若圖之於早定之於素則一日之間官號法制一新於上而彛倫庶政叙行於下內外逺近雖易視改聽而持循安習無異於常此臣所以區區之愚庶有補於萬一也今百司庶務既已類别若以所分之職所總之務因今日之有司擇可屬以事者使之區處自位叙名分憲令版圖文移案牘訟訴期㑹總領循行舉明鈎考有革有因有損有益有舉諸此而施諸彼有捨諸彼而受諸此有當警於官有當布於衆者自一事已上本末次第使更制之前習勒已定則命出之日但在奉行而已蓋吏部於尚書為六官之首試即而言之其所總者選事也流內銓三班東西審官之任皆當歸之誠因今日之有司擇可屬以事者使之區處自令僕射尚書侍郎貟外郎以其位之升降為其任之煩簡使省書審決之某當屬員外郎某當屬尚書侍郎某當屬令僕射各以其所屬預為科别如此則新命之官不煩而知其任矣曹局吏貟如三班諸房十有六諸吏六十有四其所别之司所𨽻之人不必盡易惟當合者合之當析者析之當損者損之當益者益之使諸曹所主因其舊習如此則新補之吏不諭而知其守矣憲令版圖文移案牘訟訴期㑹總領循行舉眀鈎考其因革損益之不同與其舉諸此而施諸彼有捨諸彼而受諸此有當警於官布於衆者皆前事之期莫不考定如此則新出之政不戒而知其敘矣夫新命之官不煩而知其任新補之吏不諭而知其守新出之政不戒而知其敘則推行之始去故取新所以待之者備矣其於選事如此旁至於司封司勳考功當隸之者內服外服庶工萬事當歸之者皆推此以通彼則禮部之任不待政出之日問而後辨推而後通也推吏郡之事以通於百工庶職如此則體雖至大而操之有要事雖一變而處之有素一日之間官號法制鼎新於上而彛倫庶政叙行於下內外遠近雖改視易聽而持循安習無異於常區區之愚庶有補於萬一者在此而臣愚淺薄不知治體貪於傾盡而不知其言之妄採掇增損實待聖斷惟陛下之所財幸鞏又言曰臣竊以周制六卿各率其屬皆有分職見於禮經至唐自三省而下分命庶官亦各以其職事見於六典今陛下講求化原更定官制蓋作憲垂法繇古以來其於大體有不可易者雖唐虞三代未嘗易也至於緣人情因世故斟酌損益有不可不易者故雖唐虞之際極盛之時凡巡狩四方則皆修五禮而周人治象之法亦嵗有更革況於時異事殊而可以膠於一方之說泥於一篇之跡哉故陛下更制改作其彌綸大意則逺體周官而近因唐制此所謂於其大體有不可易者也至於從宜應變則解縱拘攣獨出聖謀不牽常算此謂斟酌損益有不可不易者也夫能審其不可易者而因之斷其不可不易者而更之惟當而已然後可以明制作之體惟陛下聖性之卓故能處之無疑此非群臣之所能望也今更定官制其所先者在於使群臣庶位皆明知其職分職分既明然後在事者得各因其名以效其實而考察者欲核其實則必推其名此作法之大要所謂不可易者也今庶尹百工分位既定宜有新書如周官六典明白之文使內外上下曉然究悉以熙庶績而康萬事臣適典明命亦得各以百執事所分之職載於訓詞以飭戒在列以稱陛下董正治官循名責實之意其書宜以時頒布以幸天下如體重事巨其不可不易者文字論次尚有未周則百司所守小大之務亦宜先有條具委曲章明施於列位使人人皆知其任勸於赴功而臣亦得討論演暢見於王者之訓以副聖君勵精求治為世作則之心鞏又言曰臣伏以陛下發德音正官號法制度數皆易以新書太平之原實在於此今論次已定宣布有期四方顒顒跂足而望臣切恐施行之際新舊代易之初庶工之間或吏屬因循或簿書緣絶其於督察漏略檢防散逸彌綸之體不可不早有飭戒欲乞明諭有司架閣有未備者備之版籍有未正者正之凡憲令圖牒簿書案牘皆當次比整齊斂藏識别以至於官寺什器凡物之屬公上者亦皆當鈎考詳於簿録庶於新舊更易之間得無漏略散逸之敝非獨警當今典領之懈且以絶異時追究之煩戶部尚書韓忠彥侍郎蘇轍韓宗道言文武百官宗室之蕃一倍皇祐四倍景德班行選人胥吏率皆增益而兩稅征𣙜山澤之利與舊無以相過治平熙寧之間因時立政凡改官者自三嵗而為四嵗任子者自一嵗一人而為三嵗一人自三嵗一人而為六嵗一人宗室自袒免以上漸殺恩禮此則今日之成法乞檢㑹寶元慶厯嘉祐故事置司選官共議詔户部取應干財用除諸班諸軍料錢衣賜賞給特支如舊外餘費並裁省神宗時鄭獬上奏曰臣竊見言者患官入之冗故有省任子之議臣輒條其一二者昔之兩制至宰相正刺史至節度使嵗補一人出入特恩不預焉今二府郊祀則補二人兩制及正刺史而上一人是省於舊三之二矣帶職員外郎至諸司使已上舊郊祀一人今兩郊祀一人是省於舊已半矣昔之遷官以三年今遷以四年及其至可以任子時已六七十矣人而至六七十其心覬一子承家豈不惓惓可憐哉今誠再省之恐太刻薄有以傷陛下仁愛之心其猶有可省者嬪御而已或有一二而不在此也雖然患入官之冗者奚不擇焉而後仕今無黑白一槩以入官雖有司試以格詩類皆倩人兹與不試同如欲省任子則莫若有擇焉凡任子已補欲出身仕者從其所能而試之或以一經或以禮學或以法律或以文辭武臣則試武伎或以䇿略每嵗二月集于有司如試進士武舉法差官糊名較實中程乃得仕如此則得仕者必少而所取者材子弟各相勉強於學又有勸焉如有不能文墨而獨可以才幹者則請家一人不試而得入官此所以盡人之能而且不絶其世祿也至於俱無能焉則終身不得仕是不才而已又何憾焉臣又以臣下至病眊不欲去者顧祿而已至不得已乃求宫觀留臺監𣙜是終無去意臣欲乞分司致仕官其俸錢皆勿奪俾終其身病眊者有所養則必有相引而去彼居閭里待次纍年俸錢亦不絶也縣官何惜一二千錢俾之得以禮而引退且有優遇老臣之恩至於貪贓酷吏一有所犯此可終身勿令仕兹亦有省官之術焉臣誠不欲陛下初即位德澤未及宣究而遽有刻薄之更制此臣所惜也如臣議可采欲乞付中書與衆人之奏論定其可者焉獬又上奏曰臣近䝉降到詞頭除東上閣門使果州團練使李定為遙郡防禦使臣雖已進草竊怪議者籍籍不已熟究其然誠為濫寵何則諸司使副在祖宗朝例無磨勘天聖中方許四年一遷至昭宣使止閣門使副四年一遷至客省使止皇祐中橫行始有定員不得溢數近時橫行遷者以謂貟既有定則更授以遙郡及諸司使遷至皇城使者又惜昭宣使不除亦授以遙郡但恐數十年間帶遙郡防禦觀察者比比皆是則所顧者小而所失者更大正任團防有十餘年不遷者觀察使有終身不遷者心覬其遷則謂非有戰功則不可平時息兵從何而求戰功哉朝廷愛惜名器如此之重何為遙郡則接踵而授人計之自刺史纍十二年便可至觀察使一日有橫恩解其使名即為真拜豈重於彼而獨輕於此耶屬者劉永年為團練使十餘年以邉任方除防禦使既除而言者指為非是於時即行追罷今定為團練使才四年以磨勘轉遙郡防禦使又四年則遂為觀察使非濫寵而何宜議者之不已也此弊不可遂長於此猶可以為救宜詔兩府更定武臣遷官條例使淹速各得其叙以革前失如欲定之此授亦宜追還庶幾清朝官無幸位知諫院陳襄上奏曰臣近有劄子以銓選吏貟冗雜縣令最為親民之官欲乞稍加銓擇以手實之優劣縣政之繁簡各分為兩等選循良幹敏之吏使治其劇其次等縣亦並以奏舉人及常調縣令歷任有三人舉主者充注嚴其保任之責而優其奬待之數使賢能者有所勸激而勉充其選亦銓衡選任之光務也留中多日未䝉頒降施行竊意陛下重其更張不欲使常調入令之人别無差遣因兹濡滯注擬不行臣竊以為不然契勘銓司常調令録大率不過九百人除見任録參或監臨場務及自該入等差注人固已三分之二矣其餘得替守選注官待闕又已過半則逐時在銓守候差遣常無一二百員今所汰去者盡是舉官不足或無勞效莫非貪耄不職之人雖由此罷之其害猶小或付之百里之命使民倒植其為患豈不大哉臣今相度欲乞將諸路州軍係主户三萬已上縣分主簿及節鎮判司員闕與理令録資序許常調令録不該入等人注填如願折資差遣亦從其便則員闕足以相當而無留滯之患矣臣又觀天下京朝官知縣員闕其間甚有户口浩穰獄訟繁劇號為難治之處有纍政而以事去官或曠嵗而人無授者如南劒州之尤溪邵武軍之邵武建之浦城信之上饒洪之分寧䖍之雩都如此之類天下甚多審官院雖有指定繁劇兩等選差條貫然多該說未盡如前數邑率皆不預其數欲乞下諸路轉運司别令體訪定奪轄下自來最為煩難不治之邑凡有若干將合入本路分入揀選腳色舉主多有勞績或曾係臣寮奉敕奏舉素有才望之人不依名次保明超授謂之繁劇選差其次雖有難治之邑但封疆闊遠主户及三萬以上者並於以次腳色內銓擇謂之選差內有圭田優厚號為善闕如秀之華亭明之鄞縣常之無錫之類凡有若干並升為通判差遣謂之優選其係繁劇選差人候任滿日别無遺曠許先次指射更與優選一次仍與通判合入人相兼選擇合關升通判者與理通判資序其係選差者除兼兵與中等已上圭田處依舊條無酬奬外其餘不以路分遠近但能振職量其績效亦並與先次或優選一次已上如逐任內治迹稱最當與優加奬擢其有繆濫不職者主判官稍涉私徇情亦乞特行黜降如此則髙才良吏知有聳勸而樂親民政天下繁難不治之邑莫不均被仁澤矣如有可采伏望并臣前狀降付中書特賜詳酌施行襄又上奏曰臣竊謂縣有知令最為親民之官不可一日虛其位而或任非其人也臣所領審官東院契勘近日合入親民資序官七十餘員知縣闕次八十餘處全然差注不行自新法已來縣道事繁督責嚴密被纍者多故雖有廉良之才稍知自重則莫不畏罪規避無敢就者至有折資願就間局此人情可知也今來任知縣人不減五十餘員并正任監當人又自有九十餘員其監當闕次只有十處不惟縣道闕人兼監當待次人無由發遣臣愚欲乞詔諸路監司長吏今後縣道官員除庸繆不職及委是故違新法合行衝降外自餘若非違越不職偶因過不逮之人少加容貸原情薄責使不至於黜降則人人樂居其職無或規避也仍乞今後於元係親民降充監當人內選擇腳色如公罪及私罪杖已下情理不至深重歷任曾有舉主十人以上者許申中書審察與依合入遠近權指射知縣硬闕并無人願就過滿見闕理監當人資任請受仍不許不依常制奏辟如此則縣道不至闕員而微纍之人免於留滯可以責其後效矣襄又奏曰臣竊以諫臣司衮職之闕格君心之非臺官糾正朝綱繩百官之失明其職之各異也伏覩近年臺官侵諫諍之職諫臣言風憲之事此孔子所謂名不正而言不順也臣今欲乞諫臣惟司人君言動之過補時政闕失之事若夫百寮之愆繆臺綱之不振則有御史在焉庶幾臺諫之任皆得專職而言責不紊矣襄又奏曰臣竊以封駮一司乃朝廷慎出命令之關防也故凡宣敕之出莫不由於門下者蓋慮政令有所未便刑賞有所未中差除有所未當則有司得以看詳而舉駮是非亦補朝政之一也近者翰林學士知通進銀臺司兼門下封駮事范鎮奏為差提舉廣惠倉官員敕不下封駮司事中書檢㑹為係舉官更不下封駮司以臣觀之夫舉官任人國之大典萬一有不當義當駮奏豈可與間慢文字一例直降不由所司上廢朝綱下失官守此近年已失之事豈可按以為法哉臣欲乞今後中書樞密院除間慢機密事依例直發外自餘事關朝政有所可否者其宣敕並令降付封駮施行庶不失祖宗之成憲也襄又奏曰臣竊以審官東院之職自少卿監知州軍至京朝官而下不減三千餘員注擬升改所繫非輕事目尤衆宜其法式詳備乃可遵行而見用一司編敕自熙寧八年頒行以來中間續降節文屢有衝改已非舊文蓋立法之初失於簡略吏員既衆發遣不行動多窒礙條約事理不能周盡或輕重失當於義未安有司動須申明士人時有訴述裁決辨理上煩朝廷臣自䝉恩領職嵗月頗久考求利害粗有條理臣今欲乞將審官東院一司敕依國子司天監例許從本院看詳删去煩文補其闕略凡前後申明所得朝㫖可立以為法者並行編定其事理未盡未便者並具奏陳或申中書詳酌刪成審官東院令敕式庶幾著為定法可以久遠施行起居舍人同知諫院范純仁上奏曰臣聞古者天子有諍臣七人所以廣聰明而益治道也昔在章聖之朝開廣言路置諫官六員仁皇慶厯之初亦嘗增置員數近年以來止及三員又自吕誨改御史中丞其闕至今未補當陛下求治之際耳目之官正宜多設伏望聖慈檢㑹慶厯故事增補諫官員數庶使言路得人上裨聖政純仁又上奏曰臣近曾上言乞添置諫官員數未䝉朝廷施行伏緣諫官乃天子耳目之臣設之不可不備當陛下眀目達聰之際尤藉群才協力況有吕誨員闕久而未補陳襄至今未到惟臣獨員當此責重進無同寅協恭之助退無商議講求之益以臣暗拙實懼曠闕伏望聖慈指揮檢㑹臣前來劄子早賜施行歷代名臣奏議卷一百六十
