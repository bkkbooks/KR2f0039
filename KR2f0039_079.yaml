body:
  text: 歷代名臣奏議卷七十九明楊士竒等撰經國晋武帝時議郎段灼假還鄉里臨去遣息上表曰臣受恩三世剖符守境試用無績沈伏數年犬馬之力無所復㻣陛下𢎞廣納之聽採狂夫之言原臣侵官之罪不問干忤之愆天地恩厚於臣足矣臣聞忠臣之於其君猶孝子之於其親進則有欣然之慶非貪官也退則有戚然之憂非懷祿也其意在於不忘光君榮親情所不能自已者也臣伏自悼私懷至恨生長荒裔而久在外任自還抱疾未嘗覲見陛下竟不知臣何人此臣之恨一也遭運會之世值有事之時而不能垂功名於竹帛此臣之恨二也逮事聖明之君而尫悴羸劣陳力又不能當歸死於地下此臣之恨三也哀二親早亡隕兄弟並凋喪孝敬無復施於家門此臣之恨四也夏之日忽以過冬之夜尋復來人生百歲尚以為不足而臣中年嬰災此臣之恨五也慙日月之所養愧昊蒼而無報此臣之所以懷五恨而歎息臨歸路而自悼者也語有之曰華言虛也至言實也苦言藥也甘言疾也臣欲言天下太平而靈龜神狐未見仙芝萐莆未生麒麟未遊乎靈禽之囿鳯凰未儀於太極之庭此臣之所以不敢華言而為佞者也昔漢髙祖初定天下于時戍卒婁敬上書諫曰陛下取天下不與成周同而欲比隆成周臣竊以為不侔於是漢祖感悟深納其言賜姓為劉氏又顧謂陸賈曰為我著秦所以亡而吾所以得之者賈乃作新語之書述叙前世成敗以為勸戒又田肯建一言之計非親子弟莫可使王齊者而受千金之賜故世稱漢祖之寬明博納所以能成帝業也今之言世者皆曰堯舜復興天下已太平矣臣獨以為未亦竊有勸焉且百王垂制聖賢吐言來事之明鑒也孟子曰堯不能以天下與舜則舜之有天下也天與之也昔舜為相堯崩三年之喪畢舜避堯之子於南河天下諸侯朝覲獄訟者不之堯之子而之舜舜曰天也乃之中國踐天子位焉若居堯之宫逼堯之子非天所與者也曩昔西有不臣之蜀東有僭號之吳三主鼎足並稱天子魏文帝率萬乘之衆受禪於靡陂而自以德同唐虞以為漢獻即是古之堯自謂即是今之舜乃謂孟軻荀卿不通禪代之變遂作禪代之文刻石垂戒班示天下傳之後世亦安能使將來君子皆曉然心服其義乎然魏文徒希慕堯舜之名推新集之魏欲以同於唐虞之盛忽骨肉之恩忘藩屏之固竟不能使四海賔服混一王化而于時羣臣莫有諫者不其過矣哉荀卿曰堯舜禪讓是不然矣天下者至重也非至彊莫之能任至大也非至辨莫之能分至衆也非至明莫之能見此三至者非聖人莫之能盡由此言之荀卿孟軻亦各有所不取焉陛下受禪從東府入西宫兵刃耀天旌旗翳日雖應天順人同符唐虞然法度損益則亦不異於昔魏文矣故宜資三至以强制之而今諸王有立國之名而無襟帶之實又蜀地有自然之險是歷世奸雄之所窺𨵦逋逃之所聚也而無親戚子弟之守此豈深思逺慮杜漸防萌者乎昔漢文帝據已成之業六合同風天下一家而賈誼上疏陳當時之勢猶以為譬如抱火厝於積薪之下而寢其上火未及然因謂之安此言誠存不忘亡安不忘亂者也然臣之慺慺亦竊碩居安思危無曰髙髙在上常念臨深之義不忘履氷之戒盡除魏世之弊法綏以新政之大化使萬邦欣欣喜戴洪惠昆蟲草木咸蒙恩澤朝廷詠康哉之歌山藪無伐檀之人此固天下所視望者也陛下自初踐祚發無諱之詔置針諫之官赫然寵異諤諤之臣以明好直言之信恐陳事者知直言之不用皆杜口結舌祥瑞亦曷由來哉臣無陸生之才不在顧問之地蓋聞主聖臣直義在於有犯無隱臣不惟疏逺未信而言敢歷論前代隆名之君及亡敗之主廢興所由又博陳舉賢之路廣開養老之制崇必信之道又張設議者之難凡五事以聞臣之所言皆直陳古今已行故事非新聲異端也辭義實淺不足採納然臣私心誠謂有可發起覺悟遺忘碩陛下察臣愚忠愍臣狂直無使天下以言者為戒疾痛增篤退念桑梓之詩惟狐死之義輒取長休歸近墳墓顧瞻宫闕繫情皇極不勝丹欵其一曰臣聞善有章也著在經典惡有罰也戒在刑書上自逺古下洎秦漢其明王霸主及亡國暗君故可得而稱至於忠謇賢相及佞諂姦臣亦可得而言故朝有諤諤盡規之臣無不昌也任用阿諛唯唯之士無不亡也是有國者皆欲求忠以自輔舉賢以自佐而亡國破家者相繼皆由任失其人所謂賢者不賢忠者不忠也臣謹言前任賢所由興任不肖所以亡者堯之末年四凶在朝而不去八元在家而不舉然致天平地寧四門穆穆其功固在重華之為相夏癸放於鳴條商辛梟於牧野此俱萬乘之主而國滅身擒由不能屬任賢相用婦人之言荒淫無道肆志沈宴作靡靡之樂長夜之飲於是登糟丘臨酒池觀牛飲望肉林龍逄忠而被害比干諫而剖心天下之所以歸惡者也大甲暴虐顛覆湯之典制於是伊尹放之桐宫而能改悔反善三年而後歸于亳既已放而復還殷道微而復興諸侯咸服號稱太宗實賴阿衡之盡忠也周室既衰諸侯並爭天王微弱政遂陵遲齊桓公淫亂之主耳然所以能九合一匡之功有尊周之名誠管夷吾之力及其死也蟲流出門豈非任豎刁之過乎且一桓公之身得管仲其功如彼用豎刁其亂如此夫榮辱存亡實在所任可不審哉秦本伯翳之後微微小邑至秦仲始大有車馬禮樂侍御之好焉自穆公至於始皇皆能留心待賢逺求異士招由余於西戎致五羖於宛市取丕豹於晋鄉迎蹇叔於宋里由是四方雄俊繼踵而至故能世為彊國吞滅諸侯奄有天下兼稱皇帝由謀臣之助也道化未淳崩於沙丘胡亥乘虐用詐自誤不能𢎞濟統緒克成堂構而乃殘賊仁義毒流黔首故陳勝吳廣奮臂大呼而天下響應於是趙髙逆亂閻樂承指二世窮迫自戮望夷子嬰雖立去帝為王孤危無輔四旬而亡此由邪臣擅命指鹿為馬所以速秦之禍也秦失其鹿豪傑競逐項羽既得而失之其咎在烹韓生而范增之謀不用假令羽既距項伯之邪說斬沛公於鴻門都咸陽以號令諸侯則天下無敵矣而羽距韓生之忠諫背范增之深計自謂霸王之業已定都彭城還故鄉為晝被文繡此蓋世俗兒女之情耳而羽榮之是故五載為漢所擒至死尚不知覺悟乃曰天亡我非戰之罪甚痛矣哉且夫士之歸仁猶水之歸下獸之走曠野故曰為川驅魚者獺也為叢驅雀者鸇也為湯武驅人者桀紂也漢髙祖起於布衣提三尺之刃而取天下用六國之資無唐虞之禪豈徒賴良平之竒謀盡英雄之智力而已乎亦由項氏為驅人也子孫承基二百餘年逮成帝委政舅家使權勢外移安昌侯張禹者漢之三公成帝保傅也帝親幸其家拜禹林下深問天災人事禹當惟大臣之節為社稷深慮忠言嘉謀陳其災患則王氏不得專權寵王莽無緣乘勢位遂託雲龍而登天衢令漢祚中絶也禹佞諂不忠挾懷私計徒低仰於五侯之間茍取容媚而已是以朱雲抗節求尚方斬馬劒欲以斬禹以戒其餘可謂忠矣而成帝尚復不悟乃以為居下訕上廷辱保傅罪死無赦詔御史將雲下欲急烹之雲攀殿折檻幸賴左將軍辛慶忌叩頭流血以死爭之若不然則雲已摧碎矣後雖釋檻不修欲以彰明直臣誠足以為後世之戒何益於漢室所由亡也哉然世之論者以為亂臣賊子無道之甚者莫過於莽此亦由紂之不善不如是之甚也傳稱莽始起外戚折節力行以要名譽宗族稱孝朋友歸仁及其輔政成哀之際勤勞國家動見稱述然于時人士詣闕上書薦莽者不可稱紀內外羣臣莫不歸莽功德遭遇漢室中微國嗣三絶而太后壽考為之宗主故莽得遂䇿命孺子而奪其位也昔湯武之興亦逆取而順守之耳向莽深惟殷周取守之術崇道德務仁義履信實去華僞施惠天下十有八年恩足以感百姓義足以結英雄人懷其德豪傑並用如此宗廟社稷宜未滅也光武雖復賢才大業詎可冀哉莽即位之後自謂得天人之助以為功廣三王德茂唐虞乃自驕矜奮其威詐班宣符䜟震暴殘酷窮凶極惡人怨神怒冬雷電以驚人耳目夏地動以惕其心腹而莽猶不知覺悟方復重行不順時之令竟連五之刑佞媚者親幸忠諫者誅夷由是天下忿憤內外俱發四海分崩城池不守身死於匹夫之手為天下笑豈不異哉其所由然者非取之過而守之非道也莽既屠肌六合雲擾劉聖公已立而不辨盆子承之而覆敗公孫述又稱帝於蜀漢如此數子固非所謂應天順人者徒為光武之驅除者耳夫天下者蓋亦天下之天下非一人之天下也殷商之旅其會如林矢于牧野維豫侯興又曰侯服于周天命靡常由此言之主非常人也有德則天下歸之無德則天下叛之故古之明王其勞心逺慮常如臨川無津涯於是法天地象四時隆恩德敬大臣近忠直逺佞人仁孝著乎宫墻𢎞化洽乎兆庶為平直如砥矢信義感人神雖有椒房外戚之寵不受其委曲之言雖有近習愛幸之豎不聽其姑息之辭四門穆穆闢而不闔待諫者而無忌恆戰戰栗栗不忘戒懼所以欲永終天祿恐為將來賢聖之驅除也且臣聞之懼危者常安者也憂亡者恆存者也使夫有國之君能安不忘危則本枝百世長保榮祚名位與天地無窮亦何慮乎為來者之驅除哉傳有之曰狂夫之言明主察焉其二曰士之立業行非一概吳起貪官母死不歸殺妻求將不孝之甚然在魏使秦人不敢東向在楚則三晋不敢南謀曽參閔騫誠孝子也不能夙夕離其親豈肯出身致死涉危險之地哉今大晋應期運之所授齊聖美於有虞而吳人不臣稱帝私附此亦國之羞也陛下誠欲致熊羆之士不二心之臣使奮威淮浦震服蠻荆者故宜疇咨博采廣開貢士之路薦巖穴舉賢才徴命考試匪俊莫用今臺閣選舉塗塞耳目九品訪人唯問中正故據上品者非公侯之子孫則當塗之昆弟也二者茍然則篳門蓬户之俊安得不有陸沈者哉其三曰昔田子方養老馬而窮士知所歸況居天下之廣土立天下之正位行天下之大化乎昔明王聖主無不養老老人衆多未必皆賢不可悉養故父事三老所以明孝宗事五更所以明敬孟子曰吾老以及人之老吾幼以及人之幼今天下雖定而華山之陽無放馬之羣桃林之下未有休息之牛故以吳人尚未臣服故也夫饑者易為食渴者易為飲天下元元瞻望新政碩陛下思子方之仁念犬馬之勞思帷蓋之報發仁惠之詔廣開養老之制其四曰法令賞罰莫大乎信古人有言人而無信不知其可況有養人以惠使人以義而可以不信行之哉臣前為西郡太守被州所下己未詔書羌胡道逺其但募取樂行不樂勿彊臣被詔書輒宣恩廣募示以賞信所得人名即條言征西其晋人自可差簡丁彊如法調取至於羌胡非恩意告諭則無欲度金城河西者也自往每興軍度河未曽有變故刺史郭綏勸帥有方深加奬厲要許重報是以所募感恩利賞遂立績效功在第一今州郡督將並已受封羌胡健兒或王或侯不蒙論叙也晋文猶不貪原而失信齊桓不惜地而背盟況聖主乎其五曰昔周漢之興樹親建德周因五等之爵漢有河山之誓及其衰也神器奪於重臣國祚移於他人故滅周者秦非姬姓也代漢者魏非劉氏也於今國家大計使異姓無裂土專封之邑同姓並據有連城之地縱復令諸王後世子孫還自相并蓋亦楚人失繁弱於雲夢尚未為亡其弓也其於神器不移他族亦始祖不遷之廟萬年億兆不改其名矣大晋諸王二十餘人而公侯伯子男五百餘國欲言其國皆小乎則漢祖之起俱無尺土之地況有國者哉將謂大晋世世賢聖而諸侯之𦙍常不肖邪則放勛欽明而有丹朱瞽叟頑凶而有虞舜天下有事無不由兵而無故多樹兵本廣開亂原臣故曰五等不便也臣以為可如前表諸王宜大其國增益其兵悉遣守藩使形勢足以相接則陛下可髙枕而卧耳臣以為諸侯伯子男名號皆宜改易之使封爵之制祿奉禮秩並同天下諸侯之例臣聞與覆車同軌者未嘗安也與死人同病者未嘗生也與亡國同法者未嘗存也況夫巍巍大晋方將登太山禪梁父刻石書勳垂示無窮宜逺鍳往代興廢深為嚴防使著事奮筆必有紀焉昔伊尹耻其君不為堯舜此臣所以私懷慷愾自忘輕賤者也書奏帝覽而異焉擢為明威將軍魏興太守卒于官武帝將滅吳以羊祜為征南大將軍開府儀同三司初祜以伐吳必藉上流之勢會益州刺史王濬徴為大司農祜因表留濬監益州事加龍驤將軍密令修舟楫為順流之計祜繕甲訓卒廣為戎備至是上疏曰先帝順天應時西平巴蜀南和吳會海內得以休息兆庶有樂安之心而吳復背信使邊事更興夫期運雖天所授而功業必由人而成不一大舉掃滅則衆役無時得安亦所以隆先帝之勳成無為之化也故堯有丹水之伐舜有三苖之征咸以寧靜宇宙戢兵和衆者也蜀平之時天下皆謂吳當并之自此來十三年是謂一周平定之期復在今日矣議者常言吳楚有道後服無禮先强此乃諸侯之時耳當今一統不得與古同諭夫適道之論皆未應權是故謀之雖多而決之欲獨凡以險阻得存者謂所敵者同力足自固茍其輕重不齊强弱異勢則智士不能謀而險阻不可保也蜀之為國非不險也髙山尋雲霓深谷肆無景束馬懸車然後得濟皆言一人荷㦸千人莫當及進兵之日曽無藩籬之限斬將搴旗伏尸數萬乘勝席卷徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠力不足相抗至劉禪降服諸營堡者索然俱散今江淮之難不過劒閣山川之險不過岷漢孫皓之暴侈於劉禪吳人之困甚於巴蜀而大晋兵衆多於前世資儲器械盛於往時今不於此平吳而更阻兵相守征夫苦役日尋干戈經歷盛衰不可長久宜當時定以一四海今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並向秣陵鼓斾以疑之多方以誤之以一隅之吳當天下之衆勢分形散所備皆急巴漢竒兵出其空虛一處傾壞則上下震蕩吳緣江為國無有內外東西數千里以藩籬自持所敵者大無有寧息孫皓恣情任意與下多忌名臣重將不復自信是以孫秀之徒皆畏逼而至將疑於朝士困於野無有保世之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩㦸楯不如中國惟有水戰是其所便一入其境則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吳人戰於其內有慿城之心如此軍不踰時尅可必矣帝深納之咸寧中淮南相劉頌在郡上疏曰臣昔忝河內臨辭受詔卿所言悉要事宜小大數以聞恆苦多事或不能悉有報勿以為疑臣受詔之日喜懼交集益思自竭用忘其鄙碩以螢燭增暉重光到郡草具所陳如左未及書上會臣嬰丁天罰寢頓纍年今謹封上前事臣雖才不經國言淺多違猶碩陛下垂省使臣微誠得經聖鑒不揔棄於常案如有足採冀補萬一伏見詔書開啓土宇以支百世封建戚屬咸出之藩夫豈不懷公理然也樹國全制始成於令超秦漢魏氏之局節紹五帝三代之絶跡功被無外光流後裔巍巍盛美三五之君殆有慙德何則彼因自然而就之異乎絶跡之後更創之雖然封幼稚皇子於吳蜀臣之愚慮謂未盡善夫吳越剽輕庸蜀險絶此故變釁之所出易生風塵之地且自吳平以來東南六州將士更守江表此時之至患也又內兵外守吳人有不自信之心宜得壯王以鎮撫之使內外各安其舊又孫氏為國文武衆職數擬天朝一旦堙替同於編户不識所蒙更生之恩而灾困逼身自謂失地用懷不靖今得長王以臨其國隨才授任文武並叙士卒百役不出其鄉求富貴者取之於國內內兵得散新邦乂安兩獲其所於事為宜宜取同姓諸王二十以上人才髙者分王吳蜀以其去近就逺割裂土宇令倍於舊以徙封故地用王幼稚須皇子長乃遣君之於事無晚也急所須地交得長主此事宜也臣所陳封建今大義已舉然餘衆事儻有足採以參成制故皆并列本事臣聞不憚危悔之患而碩獻所見者盡忠之臣也垂聽逆耳甘納苦言者濟世之君也臣以期運幸遇無諱之朝雖嘗抗疏陳辭汜論政體猶未悉所見指言得失徒荷恩寵不異凡流臣竊自愧不盡忠規無以上報謹列所見如左臣誠未自許所言必當然要以不隱所懷為上報之節若萬一足採則微臣更生之年如皆瞽妄則國之福也碩陛下缺半日之閒垂省臣言伏惟陛下雖應天順人龍飛踐阼為創業之主然所遇之時實是叔世何則漢末陵遲閹豎用事小人專朝君子在野政荒衆散遂以亂亡魏武帝以經略之才撥煩理亂兼肅文教積數十年至於延康之初然後吏清下順法始大行逮至文明二帝奢淫驕縱傾殆之主也然內盛臺榭聲色之娛外當三方英豪嚴敵事成克舉少有愆違其故何也實賴前緒以濟勳業然法物政刑固已漸頽矣自嘉平之初晋祚始基逮于咸熙之末其間纍年雖鈇鉞屢斷翦除凶醜然其存者咸蒙遭時之恩不軌於法泰始之初陛下踐阼其所服乘皆先代功臣之𦙍非其子孫則其曽𤣥古人有言膏粱之性難正故曰時遇叔世當此之秋天地之位始定四海洗心整綱之會也然陛下猶以用才因宜法寬有由積之在素異於漢魏之先三祖崛起易朝之為未可一旦直繩御下誠時宜也然至所以為政矯世衆務自宜漸出公塗法正威斷日遷就肅譬猶行舟雖不橫截迅流然俄向所趣漸靡而往終得其濟積微稍著以至于今可以言政而自泰始以來將三十年政功美績未稱聖㫖凡諸事業不茂既往以陛下明聖猶未反叔世之弊以成始初之隆傳之後世不無慮乎意者臣言豈不少概聖心夫顧惟萬載之事理在二端天下大器一安難傾一傾難正故慮經後世者必精目下之政政安遺業使數世賴之若乃兼建諸侯而樹藩屏深根固蒂則延祚無窮可以比跡三代如或當身之政遺風餘烈不及後嗣雖樹親戚而成國之制不建使夫後世獨任智力以安大業若未盡其理雖經異時憂責猶追在陛下將如之何碩陛下善當今之政樹不拔之勢則天下無遺憂矣夫聖明不世出後嗣不必賢此天理之常也故善為天下者任勢而不任人任勢者諸侯是也任人者郡縣是也郡縣之察小政理而大勢危諸侯為邦近多違而逺慮固聖王惟終始之弊權輕重之理包彼小違以據大安然後足以藩固內外維鎮九服夫武王聖主也成王賢嗣也然武王不恃成王之賢而廣封建者慮經無窮也且善言今者必有驗之於古唐虞以前書文殘缺其事難詳至於三代則並建明德及興王之顯親列爵五等開國承家以藩屏帝室延祚久長近者五六百歲逺者僅將千載逮至秦氏罷侯置守子弟不分尺土孤立無輔二世而亡漢承周秦之後雜而用之前後二代各二百餘年揆其封建不用雖强弱不適制度舛錯不盡事中然跡其衰亡恆在同姓失職諸侯微時不在彊盛昔吕氏作亂幸賴齊代之援以寧社稷七國叛逆梁王捍之卒弭其難自是之後威權削奪諸侯止食租奉甚者至乘牛車是以王莽得擅本朝遂其姦謀傾蕩天下毒流生靈光武紹起雖封樹子弟而不建成國之制祚亦不延魏氏承之圈閉親戚幽囚子弟是以神器速傾天命移在陛下長短之應禍福之徴可見於此又魏氏雖正位居體南面稱帝然三方未賔正朔有所不加實有戰國相持之勢大晋之興宣帝定燕太祖平蜀陛下滅吳可謂功格天地土廣三王舟車所至人迹所及皆為臣妾四海大同始於今日宜承大勳之集及陛下盛明之時開啓土宇使同姓必王建久安於萬載垂長世於無窮臣又聞國有任臣則安有重臣則亂而王制人君立子以嫡不以長立嫡以長不以賢此事情之不可易者也而賢明至少不肖至衆此固天理之常也物類相求感應而至乂自然也是以暗君在位則重臣盈朝明后臨政則任臣列職夫任臣之與重臣俱執國統而立斷者也然成敗相反邪正相背其故何也重臣假所資以樹私任臣因所藉以盡公盡公者政之本也樹私者亂之源也推斯言之則泰日少亂日多政教漸頽欲國之無危不可得也又非徒唯然而已借令愚劣之嗣蒙先哲之遺緒得中賢之佐而樹國本根不深無幹輔之固則所謂任臣者化而為重臣矣何則國有可傾之勢則執權者見疑衆疑難以自信而甘受死亡者非人情故也若乃建基既厚藩屏彊禦雖置幼君赤子而天下不懼曩之所謂重臣者今悉反忠而為任臣矣何則理無危勢懷不自猜忠誠得著不惕於邪故也聖王知賢哲之不世及故立相持之勢以御其臣是以五等既列臣無忠慢同於竭節以徇其上羣后既建繼體賢鄙亦均一契等於無慮且樹國茍固則所任之臣得賢益理次委中智亦足以安何則勢固易持故也然則建邦茍盡其理則無向不可是以周室自成康以下逮至宣王宣王之後到于赧王其間歷載朝無名臣而宗廟不隕者諸侯維持之也故曰為社稷計莫若建國夫邪正逆順者人心之所繫服也今之建置宜審量事勢使諸侯率義而動同忿俱奮令其力足以維帶亰邑若包藏禍心惕於邪而起孤立無黨所蒙之籍不足獨以有為然齊此甚難陛下宜與逹古今善識事勢之士深共籌之建侯之理使君樂其國臣榮其朝各流福祚傳之無窮上下一心愛國如家視百姓如子然後能保荷天祿兼翼王室今諸王裂土皆兼於古之諸侯而君賤其爵臣耻其位莫有安志其故何也法同郡縣無成國之制故也今之建置宜使率由舊章一如古典然人心繫常不纍十年好惡未改情願未移臣之愚慮以為宜早創大制遲回衆望猶在十年之外然後能令君臣各安其位榮其所蒙上下相持用成藩輔如今之為適足以虧天府之藏徒棄榖帛之資無補鎮國衛上之勢也古者封建既定各有其國後雖王之子孫無復尺土此今事之必不行者也若推親疏轉有所廢以有所樹則是郡縣之職非建國之制今宜豫開此地令十世之內使親者得轉處近十世之逺近郊地盡然後親疏相維不得復如十世之內然猶樹親有所遲天下都滿已彌數百千年矣今方始封而親疏倒施甚非所宜宜更大量天下土田方里之數都更裂土分人以王同姓使親疏逺近不錯其宜然後可以永安古者封國大者不過土方百里然後人數殷衆境內必盈其力足以備充制度今雖一國周環近將千里然力實寡不足以奉國典所遇不同故當因時制宜以盡事適今宜令諸王國容少而軍容多然於古典所應有者悉立其制然非急所須漸而備之不得頓設也須車甲器械既具羣臣乃服綵章倉廪已實乃營宫室百姓已足乃備官司境內充實乃作禮樂唯宗廟社稷則先建之至於境內之政官人用才自非內史國相命於天子其餘衆職及死生之斷榖帛資實賞慶刑威非封爵者悉得專之今臣所舉二端蓋事之大較其所不載應在二端之屬者以此為率今諸國本一郡之政耳若備舊典則官司以數事所不須而以虛制損實力至於慶賞刑斷所以御下之權不重則無以威衆人而衛上故臣之愚慮欲令諸侯權具國容少而軍容多然亦終於必備今事為宜周之建侯長享其國與王者並逺者僅將千載近者猶數百年漢之諸王傳祚暨至曽𤣥人性不甚相逺古今一揆而短長甚違其故何耶立意本殊而制不同故也周之封建使國重於君公侯之身輕於社稷故無道之君不免誅放敦興滅繼絶之義故國祚不泯不免誅放則羣臣思懼𦙍嗣必繼是無亡國也諸侯思懼然後軌道下無亡國天子乘之理勢自安此周室所以長在也漢之樹置君國輕重不殊故諸王失度陷於罪戮國隨以亡不崇興滅繼絶之序故下無固國下無固國天子居上勢孤無輔故姦臣擅朝易傾大業今宜反漢之弊修周舊跡國君雖或失道陷於誅絶又無子應除茍有始封支𦙍不問逺近必紹其祚若無遺類則虛建之須皇子無以繼其統然後建國無滅又班固稱諸侯失國亦猶網密今又宜都寬其檢且建侯之理本經盛衰大制都定班之羣后著誓丹青書之玉版藏之金匱置諸宗廟副在有司寡弱小國猶不可危豈況萬乘之主承難傾之邦而加其上則自然永久居重固之安可謂根深華嶽而四維之也臣之愚碩陛下置天下於自安之地寄大業於固成之勢則可以無遺憂矣今閭閻少名士官司無髙能其故何也清議不肅人不立德行在取容故無名士下不專局又無考課吏不竭節故無髙能無髙能則有疾世事少名士則後進無準故臣思立吏課而肅清議夫欲富貴而惡貧賤人理然也聖王大諳物情知不可去故直同公私之利而詭其求道使夫欲富者必先由貧欲貴者必先安賤安賤則不矜不矜然後亷耻厲守貧者必節欲節欲然後操全以此處務乃得盡公盡公者富貴之徒也為無私者終得其私故公私之利同也今欲富者不由貧自得富欲貴者不安賤自得貴公私之塗既乖而人情不能無私私利不可以公得則恆背公而橫務是以風節日頽公理漸替人士富貴非軌道之所得以此為政小在難期然教頽來既久難反一朝又世放都靡營欲比肩羣士渾然庸行相似不可頓肅甚殊黜陟也且教不求盡善善在抑尤同侈之中猶有甚泰使夫昧適情之樂者損其顯榮之貴俄在不鮮之地約已潔素者䝉儉德之報列于清官之上二業分流令各有蒙然俗放都奢不可頓肅故臣私慮碩先從事於漸也天下至大萬事至衆人君至少同於天日故非垂聽所得周覽是以聖王之化執要而已委務於下而不以事自嬰也分職既定無所與焉非憚日昃之勤而牽於逸豫之虞誠以政體宜然事勢致之也何則夫造創謀始逆暗是非以别能否甚難察也既以施行因其成敗以分功罪甚易識也易識在考終難察在造始故人君恆居其易則安人臣不處其難則亂今陛下每精事始而略於考終故羣吏慮事懷成敗之懼輕飾文采以避目下之譴重此政功所以未善也今人主能恆居易執要以御其下然後人臣功罪形於成敗之徴無逃其誅賞故罪不可蔽功不可誣功不可誣則能者勸罪不可蔽則違慢日肅此為國之大略也臣竊惟陛下聖心意在盡善懼政有違故精事始以求無失又以衆官勝任者少故不委務寧居日昃也臣之愚慮竊以為今欲盡善故宜考終何則精始難校故也又羣官多不勝任亦宜委務使能者得以成功不能者得以著敗敗著可得而廢功成可得遂任然後賢能常居位以善事暗劣不得以尸祿害政如此不已則勝任者漸多經年小久即羣司遍得其人矣此校才考實政之至務也今人主不委事仰成而與諸下共造事始則功罪難分下不專事居官不久故能否不别何以驗之今世士人決不悉良能也又決不悉疲軟也然今欲舉一忠賢不知所賞求一負敗不知所罰及其免退自以犯法耳非不能也登進者自以纍資及人間之譽耳非功實也若謂不然則當今之政未稱聖㫖此其徴也陛下御令法為政將三十年而功未日新其咎安在古人有言琴瑟不調甚者必改而更張凡臣所言誠政體之常然古今異宜所遇不同陛下縱未得盡仰成之理都委務於下至如今事應奏御者蠲除不急使要事得精可三分之二古者六卿分職冢宰為師秦漢已來九列執事丞相都揔今尚書制斷諸卿奉成於古制為重事所不須然今未能省并可出衆事付外寺使得專之尚書為其都統若丞相之為惟立法創制死生之斷除名流徙退免大事及連度支之事臺乃奏處其餘外官皆專斷之歲終臺閣課功校簿而已此為九卿造創事始斷而行之尚書尚書主賞罰繩之其勢必愈考成司非而已於今親掌者動受成於上下之所失不得復以罪下歲終事功不建不知所責也夫監司以法舉罪獄官案劾盡實法吏據辭守文大較雖同然至於施用監司與夫法獄體宜小異獄官唯實法吏唯文監司則欲舉大而略小何則夫細過微闕謬妄之失此人情之所必有而悉糾以法則朝野無立人此所謂欲理而反亂者也故善為政者綱舉而綱疏綱舉則所羅者廣網疏則小必漏所羅者廣則為政不苛此為政之要也而自近世以來為監司者類大綱不振而微過必舉微過不足以害政舉之則微而益亂大綱不振則豪彊橫肆豪强橫肆則百姓失職矣此錯所急而倒所務之由也今宜令有司反所常之政使天下可善化及此非難也人主不善碎密之案必責犯彊舉尤之奏當以盡公則害政之姦自然禽矣夫大姦犯政而亂兆庶之罪者類出富彊而豪富者其力足憚其貨足欲是以官長顧勢而頓筆下吏縱姦懼所司之不舉則謹密網以羅微罪使奏劾相接狀似盡公而撓法不亮固已在其中矣非徒無益於政體清議乃由此而益傷古人有言曰君子之過如日月之食焉又曰過而能改又曰不二過凡此數者皆是賢人君子不能無過之言也茍不至於害政則皆天網之所漏所犯在甚泰然後王誅所必加此舉罪淺深之大例者也故君子得全美以善事不善者必夷戮以警衆此為政誅赦之準式也何則所謂賢人君子茍不能無過小疵不可以廢其身而輒繩以法則愧於明時何則雖有所犯輕重甚殊於士君子之心受責不同而名不異者故不軌之徒得引名自方以惑衆聽因名可亂假力取直故清議益傷也凡舉過彈違將以肅風論而整世教今舉小過清議益穨是以聖王深識人情而逹政體故其稱曰不以一眚掩大德又曰赦小過舉賢才又曰無求備于一人故冕而前旒充纊塞耳意在善惡之報必取其尤然後簡而不漏大罪必誅法禁易全也何則言法在犯尤而謹搜微過何異放兕豹於公路而禁鼠盜於隅隙古人有言鈇鉞不用而刀鋸日弊不可以為政此言大事緩而小辜急也時政所失少有此類陛下宜反而求之乃得所務也夫權制不可以經常政乖不可以守安此言攻守之術異也百姓雖愚望不虛生必因時而發有因而發則望不奪事變異前則時不可違明聖逹政應赴之速不及下車故能動合事機大得人情昔魏武帝分離天下使人役居户各在一方既事勢所須且意有曲為權假一時以赴所務非正典也然逡巡至今積年未改百姓雖身丁其困而私怨不生誠以三方未悉蕩并知時未可以求安息故也是以甘役如歸視險若夷至於吳平之日天下懷靜而東南二方六郡兵將士武吏戍守江表或給京城運漕父南子北室家分離咸更不寧又不習水土運役勤瘁並有死亡之患勢不可久此宜大見處分以副人望魏氏錯役亦應改舊此二者各盡其理然黔首感恩懷德謳吟樂生必十倍於今也自董卓作亂以至今近出百年四海勤瘁丁難極矣六合渾并始於今日兆庶思寧非虛望也然古今異宜所遇不同誠亦未可以希遵在昔放息馬牛然使受百役者不出其國兵備待事其鄉實在可為縱復不得悉然為之茍盡其理可靜三分之二吏役可不出千里之內但如斯而已天下所蒙已不訾矣政務多端世事之未盡理者難遍以疏舉振領總綱要在三條凡政欲靜靜在息役息役在無為倉廪欲實實在利農利農在平糴為政欲著信著信在簡賢簡賢在官久官久非難也連其班級自非才宜不得傍轉以終其課則事善矣平糴已有成制其未備者可就周足則榖積矣無為匪他却功作之勤抑似益而損之利如其斯而已則天下靜矣此三者既舉雖未足以厚化然可以為安有餘矣夫王者之利在生天地自然之財農是也所立為指於此事誠有功益茍或妨農皆務所息此悉似益而損之謂也然今天下自有事所必須不得止已或用功甚少而所濟至重目下為之雖少有廢而計終已大益農官有十百之利及其妨害在始似如未急終作大患宜逆加功以塞其漸如河汴將合沈萊茍善則役不可息諸如此類亦不得已已然事患緩急權計輕重自非近如此類準以為率乃可興為其餘皆務在靜息然能善算輕重權審其宜知可興可廢甚難了也自非上智逺才不幹此任夫創業之美勳在垂統使夫後世蒙賴以安其為安也雖昏猶明雖愚若智濟世功者實在善化之為要在靜國至夫修飾官署凡諸作役務為恆傷過泰不患不舉此將來所不須於陛下而自能者也至於仰䝉前緒所慿日月者實在遺風繫人心餘烈匡幼弱而今勤所不須以傷所憑鈞此二者何務孰急陛下少垂恩回慮詳擇所安則大理盡矣世之私議竊比陛下於孝文臣以為聖德隆殺將在乎後不在當今何則陛下龍飛鳯翔應期踐阼有創業之勳矣掃滅彊吳奄征南海又有之矣以天子之貴而躬行布衣之所難孝儉之德冠于百王又有之矣履宜無細動成軌度又有之矣若善當身之政建藩屏之固使晋代久長後世仰瞻遺跡校功考事實與湯武比隆何孝文足云臣之此言非臣下褒上虛美常辭其事實然若所以資為安之理或未盡善則恐良史書勳不得逺盡𢎞美甚可惜也然不可使夫知政之士得參聖慮經年小久終必有成願陛下少察臣言東晋元帝為琅琊王在江南并州刺史劉琨冀州刺史段匹磾上書曰臣聞天生蒸民樹之以君所以對越天地司牧黎元聖帝明王鑒其若此知天地不可以乏饗故屈其身以奉之知黎元不可以無主故不得已而臨之社稷時難則戚藩定其傾郊廟或替則宗哲纂其祀所以𢎞振遐風式固萬世三五以降靡不由之臣琨臣匹磾頓首頓首死罪死罪伏惟髙祖宣皇帝肇基景命世祖武皇帝遂造區夏三葉重光四聖繼軌惠澤侔於有虞卜年過於周氏自元康以來艱祻繁興永嘉之際氛厲彌昏宸極失御登遐醜裔國家之危有若綴旒賴先后之德宗廟之靈皇帝嗣建舊物克甄誕授欽明服膺聰哲玉質幼彰金聲夙振冢宰攝其綱百辟輔其治四海想中興之美羣生懷來蘇之望不圖天不悔祻大災洊臻國未忘難寇害尋興逆胡劉曜縱逸西都敢肆犬羊陵虐天邑臣等奉表使還仍承西朝以去年十一月不守主上幽劫復沈虜廷神器流離再辱荒逆臣每覽史籍觀之前載厄運之極古今未有茍在食土之毛含氣之類莫不叩心絶氣行號巷哭況臣等荷寵三世位厠鼎司承問震惶精爽飛越且悲且惋五情無主舉哀朔垂上下泣血臣琨臣匹磾頓首頓首死罪死罪臣聞昏明迭用否泰相濟天命未改歷數有歸或多難以固邦國或殷憂以啓聖明齊有無知之祻而小白為五伯之長晉有驪姬之難而重耳以主諸侯社稷靡安必將有以扶其危黔首幾絶必將有以繼其緒伏惟陛下𤣥德通於神明聖姿合於兩儀應命代之期紹千載之運夫符瑞之表天人有徴中興之兆圖䜟垂典自京畿隕喪九服崩離天下嚻然無所歸懷雖有夏之遘夷羿宗姬之離犬戎蔑以過之陛下撫寧江左奄有舊吳柔服以德伐叛以刑抗明威以懾不類仗大順以肅宇內純化既敷則率土宅心義風既暢則遐方企踵百揆時序於上四門穆穆於下昔少康之隆夏訓以為美談宣王之興周詩以為休詠況茂勳格于皇天清輝光于四海蒼生顒然莫不欣戴聲教所加碩為臣妾者哉且宣皇之𦙍唯有陛下億兆攸歸曽無與二天祚大晋必將有主主晋祀者非陛下而誰是以邇無異言逺無異望謳歌者無不吟詠徽猷獄訟者無不思惟聖德天地之際既交華裔之情允洽一角之獸連理之木以為休徴者蓋有百數冠帶之倫要荒之衆不謀而同辭者動以萬計是以臣等敢考天地之心因函夏之趣昧死以上尊號願陛下存舜禹至公之情狹巢由抗矯之節以社稷為務不以小行為先以黔首為憂不以克讓為事上以慰宗廟乃顧之懷下以釋溥天傾首之望則所謂生繁華於枯荑育豐肌於朽骨神人獲安無不幸甚臣琨臣匹磾頓首頓首死罪死罪臣又聞尊位不可久虛萬機不可久曠虛之一日則尊位以殆曠之浹辰則萬機以亂方今鍾百王之季當陽九之會狡寇窺窬伺國瑕隙齊人波蕩無所繫心安可以廢而不恤哉陛下雖欲逡巡其若宗廟何其若百姓何昔惠公虜秦晋國震駭吕郤之謀欲立子圉外以絶敵人之志內以固闔境之情故曰喪君有君羣臣輯穆好我者勸惡我者懼前事之不忘後代之元龜也陛下明並日月無幽不燭深謀逺慮出自胸懷不勝犬馬憂國之情遲覩人神開泰之路是以陳其乃誠布之執事臣等各忝守方任職在遐外不得陪列闕庭共觀盛禮踊躍之懷南望罔極元帝初作相引熊逺為主簿時傳北陵被發帝將舉哀逺上疏曰園陵既不親行承傳言之者未可為定且園陵非一而直言侵犯逺近吊問答之宜當有主謂應更遣使攝河南尹按行得審問然後可發哀即宜命將至洛修復園陵討除逆類昔宋殺無畏莊王奮袂而起衣冠相追於道軍成宋城之下況此酷辱之大耻臣子奔馳之日夫修園陵至孝也討逆叛至順也救社稷至義也恤遺黎至仁也若修此四道則天下響應無思不服矣昔項羽殺義帝以為罪漢祖哭之以為義劉項存亡在此一舉羣賊豺狼弱於往日惡逆之甚重於丘山大晋受命未改於上兆庶謳吟思德於下今順天下之心命貔貅之士鳴檄前驅大軍後至威風赫然聲振朔野則上副西土義士之情下允海內延頸之望矣元帝使人齎印板進張駿為大將軍自是每歲使命不絶後駿遣參軍麴護上疏曰東西隔塞踰歷年載夙承聖德心繫本朝而江吳寂蔑餘波莫及雖肆力修塗同盟靡恤奉詔之日悲喜交并天恩光被褒崇輝渥即以臣為大將軍都督陜西雍秦涼州諸軍事休振寵赫萬里懷戴嘉命顯至銜感屏營伏惟陛下天挺岐嶷堂搆晋室遭家不造播幸吳楚宗廟有黍離之哀園陵有殄廢之痛普天咨嗟含氣悲傷臣專命一方職在斧鉞遐域僻陋勢極秦隴勒雄既死人懷反正謂季龍李期之命曽不崇朝而皆纂繼凶逆鴟目有年東西遼曠聲援不接遂使桃蟲鼓翼四夷喧譁向義之徒更思背誕鉛刀有千將之志螢燭希日月之光是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懷目前之安替四祖之業馳檄布告徒設空文臣所以宵吟荒漠痛心長路者也且兆庶離主漸再經世先老消落後生靡識忠良受梟懸之罰羣凶貪縱橫之利懷君戀故日月告流雖時有尚義之士畏逼首領哀歎窮廬臣聞少康中興由於一旅光武嗣漢衆不盈百祀夏配天不失舊物況以荆揚慓悍臣州突騎吞噬遺羯在於掌握哉碩陛下敷𢎞臣慮永念先績敕司空鑒征西亮等泛舟江沔使首尾俱至也哀帝隆和初寇逼河南太守戴施出奔冠軍將軍陳祐告急桓溫使竟陵太守鄧遐率三千人助祐并欲還都洛陽上疏曰巴蜀既平逆胡消滅時來之會既至休泰之慶顯著而人事乖違屢喪王略復使二賊雙起海內崩裂河洛蕭條山陵危逼所以遐邇悲惶痛心於既往者也伏惟陛下禀乾坤自然之姿扳羲皇𤣥朗之德鳯棲外藩龍飛皇極時務陵替備徹天聽人之情僞盡知之矣是以九域宅心幽遐企踵思佇雲羅混網四裔誠宜逺圗廟算大存經略光復舊亰疆理華夏使惠風陽澤洽被八表霜威寒飇陵振無外豈不允應靈休天人齊契今江河悠闊風馬殊邈故向義之徒覆亡相尋而建節之士猶繼踵無悔況辰極既回衆星斯仰本源既運枝派自遷則晋之餘黎欣皇德之攸慿羣凶妖逆知滅亡之無日騁思順之心鼓雷霆之勢則二豎之命不誅而自絶矣故員通貴於無滯明哲尚於應機介如石焉所以成務若乃海運既徙而鵬翼不舉永結根於南垂廢神州於龍漠令五尺之童掩口而歎息夫先王經始𤣥聖宅心畫為九州制為九服貴中區而內諸夏誠以晷度自中霜露惟均冠冕萬國朝宗四海故也自彊胡陵暴中華蕩覆狼狽失據權幸揚越蠖屈以待龍申之會潛蟠以俟風雲之期蓋屯圮所鍾非理勝而然也而喪亂𬗟邈五十餘載先舊徂沒後來童幼班荆輟音積習成俗遂望絶於本邦宴安於所託眷言悼之不覺悲歎臣雖庸劣才不周務然攝官承乏屬當重任願竭筋骨宣力先鋒翦除荆棘驅逐豺狼自永嘉之亂播流江表者請一切北徙以實河南資其舊業反其土宇勤農桑之務盡三時之利導之以義齊之以禮使文武兼宣信順交暢井邑既修綱維粗舉然後陛下建三辰之章振旗旗之旌冕旒錫鑾朝服濟江則宇宙之內誰不幸甚夫人情昧安難與圖始非常之事衆人所疑伏願陛下決𤣥照之明斷常均之外責臣以興復之效委臣以終濟之功此事既就此功既成則陛下盛勳比隆前代周宣之詠復興當年如其不效臣之罪也褰裳赴鑊其甘如薺穆帝升平四年慕容暐僭位時外則王師及苻堅交侵兵革不息內則暐母亂政慕容評等貪冒政以賄成官非才舉羣下切齒尚書左丞申紹上疏曰臣聞漢宣有言與朕共治天下者其唯良二千石乎是以特重此選必妙盡英才莫不拔自貢士歷資內外用能仁感猛獸惠致羣祥今者守宰或擢自匹夫兵將之間或因寵戚藉緣時會非但無聞於州閭亦不經於朝廷又無考績黜陟幽明貪惰為惡無刑戮之懼清勤奉法無爵賞之勸百姓窮弊侵賕無已兵士逋逃乃相招為賊盜風頽化替莫相糾攝且吏多則政煩由來常患今之見户不過漢之一大郡而備置百官加之新立軍號兼重有過往時虛假名位廢棄農業公私驅擾人無聊生宜并官省職務勸農桑秦吳二虜僻僭一時尚能任道捐情肅諧僞部況大燕纍聖重光君臨四海而可美政或虧取陵奸寇哉鄰之有善衆之所望我之不修彼之願也秦吳狡猾地居形勝非唯守境而已乃有吞噬之心中州豐實户兼二寇弓馬之徑秦晋所憚雲騎風馳國之常也而比赴敵後機兵不速濟者何也皆由賦法靡常役之非道郡縣守宰每於差調之際無不舍越殷彊首先貧弱行留俱窘資贍無所人懷嗟怨遂致奔亡進闕供國之饒退離蠶農之要兵豈在多貴於用命宜嚴制軍科務先饒復習兵教戰使偏伍有常從戎之外足營私業父兄有陟岵之觀子弟懷孔邇之顧雖赴水火何所不從節儉約費先王格謨去華敦朴哲后恆憲故周公戒成王以嗇財為本漢文以皂幃變俗孝景宫人弗過千餘魏武寵賜不盈十萬薄葬不墳儉以率下所以割肌膚之惠全百姓之力謹桑後宫四千有餘僮侍廝養通兼十倍日費之重價盈萬金綺縠羅紈歲增常調戎器弗營奢玩是務令帑藏虛竭軍士無襜䄖之賚宰相侯王迭以侈麗相尚風靡之化積習成俗卧薪之諭未足甚焉宜罷浮華非要之役峻明婚姻喪葬之條禁絶奢靡浮煩之事出傾宫之女均商農之賦公卿以下以四海為家信賞必罰綱維肅舉者溫猛之首可以懸之白旗秦吳二主可以禮之歸命豈唯不復侵寇而已哉陛下若不逺追漢宗弋綈之模近崇先帝補衣之美臣恐頽風弊俗亦革變靡途中興之歌無以軫之絃詠又拓宇兼并不在一城之地控制戎夷者懷之以德今魯陽上郡重山之外雲隂之北四百有餘而未可以羈服塞表為平寇之基徒孤危託落令善附內駭宜攝就并豫以臨二河通接漕轂擬之丘山重晋陽之戍增南藩之兵戰守之備衒以千金之餌蓄力待時可一舉而滅如其䖍劉送死俟之境而斷之可令匹馬不反非唯絶二賊窺𨵦乃是戡殄之要惟陛下覽焉暐不納宋少帝在位多愆失范泰上封事極諫曰伏聞陛下時在後園頗習武備鼓鞞在宫聲聞于外黷武掖庭之內喧譁省闥之間不聞將帥之臣統御之主非徒不足以威四夷秪生逺近之怪近者東寇紛擾皆欲伺國瑕隙今之吳會寧過二漢關河根本既搖于何不有如水旱成灾役夫不息無寇而戒為費漸多河南非復國有羯虜難以理期此臣所以用忘寢食而干非其位者也陛下踐阼委政宰臣實同髙宗諒暗之美而更親狎小人不免近習懼非社稷至計經世之道王言如絲其出如綸下觀而化疾於影響伏願陛下思𢎞古道式遵遺訓從理無滯任賢勿疑如此則天下歸德宗社惟永詩云一人有慶兆民賴之天髙聽卑無幽不察興衰在人成敗易曉未有政治於上而人亂於下者也臣䝉先朝過遇陛下殊私實欲盡心竭誠少報萬分而惛耄已及百疾互生便為永違聖顔無復自盡之路貪及視息陳其狂瞽陛下若能哀其所請留心覽察則臣夕殞于地無恨九泉歷代名臣奏議卷七十九
