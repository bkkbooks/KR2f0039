body:
  text: 歷代名臣奏議卷九十一明楊士竒等撰經國宋高宗時秦檜力主和議刑部侍郎陳槖上疏曰金人多詐和不可信且二聖逺狩沙漠百姓肝腦塗地天下痛心疾首今天意既回兵勢漸集宜乘時掃清以雪國耻否亦當按兵嚴備審勢而動捨此不為乃遽講和何以繫中原之望既而金人厚有所邀議久不決將再遣使槖復言金每挾講和以售其姦謀論者因其廢劉豫還河南地遂謂其有意於和臣以為不然且金之立豫蓋欲自為捍蔽使之南窺豫每犯順率皆敗北金知不足恃從而廢之豈為我哉河南之地欲付之他人則必以豫為戒故指以歸我往歲金書嘗謂歲幣多寡聽我所裁曽未淹歲反覆如此且割地通和則彼此各守封疆可也而同州之橋至今存焉蓋金非可以義交而信結恐其假和好之說騁謬悠之辭也包藏祻心變出不測願深鑒前轍益嚴戰守之備使人人激厲常若敵至茍彼遵和則吾之振飭武備不害為立國之常如其不然決意恢復之圖勿循私曲之說天意允協人心響應一舉以成大勳則梓宫太后可還祖宗疆土可復矣兵部侍郎張燾上言曰自昔有為之君未有不先定規模而能收效者臣紹興初首以是為言今七年矣往者進臨大江退守吳㑹未朞月而或進或却豈不為敵所窺乎今陛下相與斷國論者二三大臣而已一紀之間十四命相執政遞遷無慮二十餘日月逝矣大計不容復誤願以先定規模為急燾為吏部尚書上言曰陛下信王倫之虛詐發自聖斷不復謀議便欲行禮群臣震懼罔措必已得梓宫已得母后已得宗族始可議通好絰久之禮今彼特以通好為說意謂割地講和而已陛下之所願欲而切於聖心者無一言及之其情可見奈何遽欲屈而聽之一屈之後不可復伸廷臣莫能正救曽魯仲連之不如豈不獲罪於天下萬世端明殿學士權邦彥獻十議以圖中興大略謂宜以天下為度進圖洪業恢復土宇勿茍安於東南駕御諸將當威之以法而限之以爵命講讀之臣取纍朝訓典及三代漢唐中興故事日陳于前以裨聖學又監觀傷善妨賢之讒偷安茍容之佞市恩立威之姦懷讒罔上之欺聽其言察其事則忠邪判愛民先愛其力寬民先節其用朘已奉以佐國當自執政始分閫而屬大事類非偏裨之所能為必得賢臣大將然後可制置一官可省宜令沿江州縣各備境內總以漕帥上自荆鄂江池下至采石京口委任得人乃防秋上䇿宗室中豈無傑然有人望可以濟艱難贊密勿留宿衛者願求其人置諸左右人事盡則天悔祻不可獨歸之數吏部員外郎廖剛奏曰臣伏見廟堂近因江南探報事宜頗懷疑慮謀畫方深臣輒有愚見仰瀆聖聰伏候採擇臣嘗考唐德宗之在奉天徒以飢羸之卒守一縣之地當朱泚十萬之師危殆極矣惟人心未去出死者衆卒能戡定暴亂恢復大業今吾甲兵猶可以決戰取勝非若彼之寡弱也北有重江之阻重兵又當其前非若彼之窮蹙也聖德日躋人心愛戴天之眷佑斷可識矣顧豈不足恃邪羣臣往往以維揚之事為戒無敢任其責者故未見端倪而遽為遷徙之謀臣竊謂動靜之間亦在審其緩急而已何謂所當急周防要害之津申嚴斥堠之法重賞必罰使之疾於飛鳥此為事機最要者顧可緩邪鑾輿或須順動則所幸之地預當經理使如天之不可升萬萬無窺伺之理然後可此為事體最重者顧可緩邪而自得報以來未聞朝廷有急切措畫指揮此臣所未諭也建康鄱陽勢未暇議自㑹稽而南惟永嘉與福唐所當留意永嘉之險可恃與否臣所不知如閩之四境三面皆重山峻嶺稍加人力不復可犯東南則大海形勢之勝殆是天設永嘉固順便若論逺險恐多不知也臣碩速降指揮下本路增修寨柵以備不時之巡所有盜賊未息臣碩曲賜赦宥因遣一重臣往宣德音使潢池赤子得以自新彼且感恩激義悉為我用大抵閩之風俗重義尚氣君臣父子之心雖為盜而不變此臣所知也何謂所當緩易曰吉凶悔吝生乎動故古人有言利不百不變法功不十不易器又況動而有安危之機乎今所在民物凋弊不堪重擾盜賊竊發多是乘時若非事勢有大急迫詎可輕動臣碩陛下熟計而審處之期於不失機㑹而已有如不得已而至於幸閩則凡供億之事必責他路致於海上而出戰之兵亦環駐於鄰境閩人無所困苦則宗社所寄安於泰山矣然後恢復之計徐可圖也將臣相臣經略四國少須有成進撫中原正位布命如日麗天亦何傷於往者之虞淵乎雖然臣愚竊料今歲敵騎勢分必無南渡之事伏望聖慈姑寬憂念以慰天下臣前所陳固慙下䇿猶如孝子操瞑眩之藥厥疾已瘳無所用之則志願得矣惟聖慈察其區區幸甚周林上奏曰孟子曰君子創業垂統為可繼也若夫成功則天也聖人之順乎天常以時觀之聖人之因乎時常以事觀之時者天之所為也事者人之所為也事之未至先時而起其失也過事之已至後時而縮其失也不及視其事之所在則知時之所可而天之所與也上穹悔祻神贊令圖敵人之來侵者既遁盜賊之竊發者既除士氣振躍而不驕兵食給足而不乏事之如是時可占矣傳曰時哉不可失伏願陛下奮乾之剛發離之明乘時競辰應機而作中興之功指日可待以副上天平治天下之意不勝幸甚右正言陳淵奏曰天命雖周公不敢知然今日之事以理觀之天之眷宋未有艾也何則祖宗之德澤在人未竭而民之戴宋無有窮已故也臣請試言之昔我太祖皇帝市不易肆而得天下太宗繼之四方僭僞不勞而服真宗仁宗視民如傷屈意和戎以安赤子不殺之德入人心髓後更五世以至今日中間姦臣繼執國命百姓征徭無所措其手足故逺裔得以侵侮中國自古王室遽爾敗壞遂至於不可支持者未有酷於此時然民心猶未離也豈非祖宗德澤在人未竭而民之戴宋無窮乎觀民之從違則天意可得而知矣方淵聖入繼大統雖兄弟之間不能無疑而獨於陛下親厚此有以見天意也當是時大臣如耿南仲之徒茍可以獻疑於淵聖者無所不至及其奉陛下為大元帥莫有阻遏之者陛下雖欲不去京城不可得也此又有以見天意也使北之行未果敵已大入方圖引還而二聖逺狩皇族內外莫不扈駕以往而陛下適逺父兄之側故王室陵夷而宗廟社稷賴陛下復存此又有以見天意也天留陛下以興我宋其意之篤蓋如此當此之時但當欽承天意以追復祖宗之舊而已蓋天之所以付陛下甚重而其責亦不輕若二聖未歸宗社未復天下未一金人之仇未報則祖宗之業因循而不復振而陛下之責亦不能塞矣此宜朝夕黽勉坐薪嘗膽而以為憂然以今日之勢觀之蓋有未能遽如陛下所欲者蓋大江之南荆湖之間與夫閩廣之寇尚為內患故也夫歸二聖復宗社一天下以報金人之仇而內患不除若出師北向以窮逺略則鼠竊狗偷近生肘腋亦足以牽制我矣故當先靜其內然後外亂可弭也諸葛亮必擒孟獲然後出師蓋為是爾往者朝廷嘗命宰執副以大將先由福建以次及江東西湖南北之盜蓋有意先平內患也臣以謂既有以平之必圖所以守之慎擇守令毋拘以常制而使之以愛民為本豈獨施於內而已哉雖削平僣亂鞭撻敵人而臣之亦可也章誼上奏曰臣聞近日諸軍有招安到諸處頭項人馬頗不寧帖雖重兵彈壓將臣措置固已别無他虞然事欲經久理須可行臣詢之衆論謂其說有三蓋自來招安之人必須裂其隊伍易其將佐異其居處今新招之人關防有所未至者一也又行在諸軍月糧口食料錢食錢並從一例今新招之人日支食錢百錢省口食二升半别無衣食自營之資迫於老幼糊口之計其撫養存恤有所未盡者二也朝廷旁近郡如錢塘溫明等處物價高下比之越土大段不同並無戍卒若分就錢塘近便去處時暫駐劄則士卒薪芻日資之物決無高價倍用之費即有警急朝召而夕至必無闕事今新招之人放縱既久乍從儉約已自不堪加之百物踴貴日用益廣是以不能安處其屯泊暫戍之地有可議者三也臣伏望聖慈速與大臣商量經畫此三事者以安反側不勝大幸若使之迫於飢窮令其愁苦雖法制日嚴刀鋸積下終不能禁其潰亂之心何敢望其征役之用哉誼又上奏曰臣竊觀陛下繼承大統號稱中興而險阻艱難實同創業中外臣子豈無英才肯為陛下圖事揆䇿闢國彊兵出死力抗勍敵者乎雖有此人陛下深居九重誰聽誰受陛下何不定都東南深固根本擇一二大臣俾之居守然後親御六飛練兵選將巡荆楚之郊用關陜之衆結羌夷之歡引蜀漢之利攘却撫綏以見武節則深謀至計竒材猛士將雲集而景附矣方陛下春秋鼎盛之時鬱鬱於此而不兼收羣䇿成馬上之功蓋執事者未之思也臣不勝區區之願誼又上奏曰臣竊見國家軍兵之散在州郡者不可勝數平時虛費錢糧復邀犒設將來明堂大禮決須恐迫州郡希望給賜朝廷若不預行措置必生變亂以臣耳目之所剽聞者可舉而言也自來大禮未有藩鎮今藩帥之安於本鎮者與州郡一等其軍兵之數給豫之物朝廷不必措置也若夫藩帥之被兵而素仰給於縣官者將來軍兵賜豫之物取辦於本鎮乎仰給於朝廷乎此其可慮者一也張用已降指揮鎮撫舒蘄而未能就職孔彥舟雖罷鎮撫而所領部曲實在湖南嶽飛留老幼於徽州劉綱寓次舍於溧水四人者將來軍兵賜豫之物其誰辦之此其可慮者二也自餘統兵之官謂之盜賊則有恭順之名謂之將帥則無攻守之效或屯方州或據縣鎮尺籍伍符不登於樞府列營移戍不由於信宣如韓世清之在宣城邵青之在太平楊勍之在臨江吳全之在洪府張忠彥之在吉州韓京之在茶陵劉紹先之在江西大者有衆數萬小者不下數千將來軍兵賜豫之物其誰辦之此其可慮者三也朝廷大帥如吕頤浩劉光世張俊辛企宗所統之衆見今有司經營應副已自費力將來軍兵賜豫之物其誰辦之此其可慮者四也四者之外州郡各有𨽻將不𨽻將禁軍與夫土軍廂軍又復不住招刺以填闕額自來大禮運司州郡各有樁辦僅能免責今者在處官司往往空匱將來本路本州軍兵賜豫之物縱能辦集而前項軍兵之寓其境上者何以給之與之則虛張軍數而難周不與則侵陵官吏而為變若非朝廷預有措置深恐臨時别有喧競伏望睿明深詔執政大臣早賜經畫誼又奏曰臣竊惟朝廷暫駐江左以避金人蓋非得已當為攘却恢復之圖以振大業然金人纍歲南侵朝廷亦纍歲奔走此豈金人計數之得哉蓋謀國之臣誤陛下也頃歲駐蹕揚州是時陛下有兵數十萬可以一戰而斥堠不明金人奄至卒以奔走踰江而東此宰相之過也前歲移蹕建康是時兵練將勇食足財豐據長江不測之險當敵人疑懼之秋可以守矣而舟師不設二相異意金人未至先已奔走遵海而南此宰相之過也往者不可諌來者猶可追不知陛下今年守戰之䇿安所從出執政大臣誰為陛下任此事者陛下幸守東南以固根本瞰臨江海憑據險阻兵將不乏糧賦未匱不乘此時講明守戰之䇿外遏敵人之侵而僥幸無警萬一事起倉猝大臣復欲弃陛下之土疆遺陛下之人民委陛下之府庫脫身奔走此豈安國家定社稷之謀乎臣愚以謂有江海則必資舟楫戰守之具有險阻則必資郡縣防守之力有兵將則必駕馭馴擾不可為將帥自衛之資有糧賦則必漕運轉輸不可為盜賊侵據之用四者各付能臣分路自辦然後陛下親帥徑兵健將宅中指授分遣信使往來督察重賞以勸功嚴罰以懲罪其誰敢不用命哉若以江左地狹不足有為則金人之師必不盛於苻秦金人之謀亦不踰於曹操苻秦敗於東晉曹操銼於全吳當是之時江東之勢何如哉伏望聖主考古驗今委任大臣早賜措畫不勝大幸誼又奏曰臣竊觀自古創業之君與夫中興之主必能屈羣策以為智合衆力以為彊因山川之險阻以為固然後守位以仁故無敵於天下今智能籌略之士或上章公車或侍從交薦陛下固嘗官使之矣未聞試用其言此制敵所以無䇿也今中原雖失而淮甸江東戶口百萬多力敢死之士不可勝數陛下不合而用之此國勢所以不彊也水有江海之險而樓船戰士楫師沒人有所不具陸有山林之阻而民兵土豪地形厄塞無人統理此山川之險阻所以不足恃也陛下承纍聖付託之重號稱中興實同創業專用太王去邠之仁以當金人內侵之勢日朘月削何時已乎陛下誠能奮乾剛屈羣䇿合衆力因山川之險阻且戰且守北向而收天下則金人不足滅也惟陛下財幸誼又奏曰臣聞唐德宗幸奉天兩稅度支使包吉寓揚州儲財賦八百萬緡將輸京師而淮南節度使陳少游悉脅取之度支使蠟表以聞時祻難煽結帝未能制乃曰少游國守臣取度支財防他盜耳庸何傷逺近咸稱帝得其機少遊聞之果不自安即羞悸上表請償由是觀之多難之世事有守正而危從權而安者矣臣竊見宣撫處置使司屬官李允文挾降將張用之兵擾江湖兩路之境輒用便宜擅更守宰虛張戰功覬冒官賞罪狀明白朝廷既得其情俾之歸司恩貸厚矣允文徘徊鄂渚尚以張用不肯放行為解近者張用騰表有碩聽節制之言滕膺奏陳有耆老借留之請高衛懼其豪暴難制至今不敢之官如此則鄂州但留假守未有帥臣又復馬進之兵相望咫尺蘄黃之盜止隔一水若朝廷堅執前降指揮深恐人情别生向背設使别授守臣又須遷延日月內不足以安張用反側之心外無以杜盜賊窺伺之意此正安危之幾所宜審訂之日也昔漢祖悟淮隂假王之請躡足行封卒定帝業臣觀今日祻難煽結不減於有唐而陛下恢宏大度同符於漢祖投機之㑹豈不以少遊淮隂為念哉伏望少留聖慮更與宰執商度容此小醜俯徇鄂州士庶所請徐為後圖不勝大幸武義大夫曹勛論和戰劄子曰臣竊惟天下大器宗廟社稷大計四海生齒大本皆繫於國之安危在今日利害不出於和戰之間議國事者當先審所尚而定國是國是者天之所與時也時之所行事也當戰則戰當和則和先後緩急不容無一定之論必措國於至安然後天下大器定於不傾宗廟社稷隆於鞏固四海生齒保於輯寧雖必世百年守之不易可也不審所尚而逐紛紜之論僥幸於萬一名曰嘗試之說天下之禍莫大於以國徇嘗試之說可為寒心者也且國之安危與已之進退得失孰輕孰重已之進退得失與人之毀譽好惡何損何益人臣而能辨此然後可以議國事茍惟以己之進退得失為心則必以人之毀譽好惡為重彼以謂人之毀譽好惡與其己之進退得失實相妨也故言戰則人朋而隨之者多譽之者亦多其心非一一明乎戰有必勝之道也特以謂主戰者不失為尊主強國之說今日言之譽之者必多固無害於己之進他日雖和亦無害於己之進蓋和亦不可忘戰是今日之言與他日之言皆無害於己之進而當戰與不當戰於國之安危不問也言和則皆睥睨而不敢隨者以和難保也今日言和固不妨己之進一旦有異焉則必大得罪而去不若言戰之兩無害於己之進也而當和與不當和於國之安危亦不問也況言和則主戰者惡之惡之則毀至矣於己之進豈不大為害乎二者皆不以國之安危為心而惟以己之進退為心以人之毀譽好惡為心此今日之風俗紛紜之論所自起也陛下所與圖回天下不過宰執數人而紛紜之論亦足以眩數人之聽是以廟堂之上主戰者陽為尊主強國之言以收小人之虛譽其中未必真有善善之策也陛下不用其言則以拒諫竊議於陛下以弱國騰謗於同列浩然引去亦不失髙爵厚祿而小人之虛譽愈歸之主和者亦不知固執其所見往往惑於尊主強國之言而求免乎卑主弱國之謗進則迎合主意退則雷同衆人所謂國是果安在哉臣所謂以國徇嘗試之說可謂寒心者也上天崇正統於中國保固祖宗積纍之基純佑陛下之聖德眷命纘承將以光大久長於其後故周旋調護成此安定之期若曰人謀恐未易致是臣不得不辨者惜天意與陛下聖德混於紛紜之論而不知所分也臣聞強弱異勢不可期也人身不能無病能不諱病則可以全身國不能無弱能不諱弱則可以圖強弱而為強自欺可也欺人可乎欺人可也欺天可乎春秋時吕甥為王城之盟謂秦伯曰晉國之小人不憚征繕以立圉君子則不然曰必報德有死無二納而不定廢而不立以德為怨秦必不然秦伯曰是吾心也歸晉侯而成盟國復強晉君子可謂能審所尚也方其弱則言弱能不諱弱則足以養強也能養強則足以成強也使人臣之謀皆如晉之君子國何患哉陛下察今日紛紜之論如晉君子之言乎抑皆晉小人之言乎君子小人不能逃陛下聖鑒則陛下刑賞行矣單于嫚侮議兵樊噲請以十萬橫行胸奴季布曰噲可斬朝錯發七國之難吳楚兵起錯乃居守而勸景帝親征又方與調兵食身斬東市非袁盎私意也人臣自為紛紜進說而不可用不加罪焉且誤國矣亦不加罪焉孰不以嘗試之說售其身乎其言不行又無所加罪是以肆為紛紜而無所憚也臣觀今日之事非前日之比者以天定故也申包胥曰人衆者勝天天定亦能勝人臣解之曰祻福無不自己求之人衆者衆之所為凶德已極自求祻者也天豈樂祻乎人之所為凶德已極祻必自至天不能庇故曰人衆者勝天前日之事也天之於人祻終不悔乎其報已極復圖安寧是為天定人何以勝之故曰天定亦能勝人今日之事也臣請以東晉宋武帝驗之東晉之渡江也謀復中原之臣如劉琨祖逖庾翼桓溫之徒皆可以有立而卒不能成功者天定也苻堅為江左之舉以百萬之師一敗於謝𤣥劉牢之身死國亡計不旋踵豈謝𤣥劉牢之勇過於苻堅乎天定而堅欲以人勝自取祻也宋武帝得關中棄而不守知赫連之必來也宋武棄關中赫連即取之由是南北舉安知天定而不敢為不定天祐之也故天定則人主之意不可不定主意定則人臣之意不可不定君臣之意定則天下自定定不定祻福如彼之明可不畏哉今陛下與腹心大臣酌天意之大定以斷國是以今日已有成策已見定效尚可復容紛紜之論崇虛名而令國受實祻乎敵欲求安易於保安者守邊不動為長久之計則敵保安之策也我欲求安難於保安者恃敵不動則我保安之䇿也彼既不動我非特保安而已因得自治焉則千百之安在我也臣之所望於陛下者此也萬一為紛紜之論所惑以蹈至危則臣所望於陛下者未易就也此臣之所甚憂也願陛下毋忽臣言奉二儀之無私揭日月之大明聳山嶽之不動行四時之信令則陛下之所欲為者自是無不可為者矣臣不勝至願中書舍人周麟之論守應之䇿曰臣聞為國者必有一定之計大計已定斷然無疑非徇一已之見也而千萬人之說莫能搖非茍一時之利也而數百世之議莫能易此其為利害亦豈必天知神略而後知之惟所見者審而通乎事機所持者要而當乎人情所言者順而合乎天道所操執者彌固則所成就者愈大古所謂聰明賢聖大有為之君建功立事類如此仰惟皇帝陛下察問如虞舜憂勤如文王總攬權綱綜核名實則又與漢之宣光比立國於此固自有一定之計而近之言時事者乃紛紛而不一軍旅之言厲閭巷之言戚士大夫之言惑厲有所憤戚有所憂此其常態耳未至於大害治也惟惑之為害蓋有不可勝言者此無它鋭與怠之謂也鋭者言兵而欲用怠者諱兵而不言言兵而欲用是喜功也諱兵而不言是偷安也自講和以來九廟寧矣東朝安矣赤子休息矣成功著見昭昭可知陛下方且慎遣重臣厚將信幣以堅永好以釋羣疑而汨之以喜功之說其可乎渝盟弃好陛下之所不為也當朝廷閒暇修明政刑振舉綱紀簡練將士此不可一日忘者陛下方且頒明詔飭庶工懲緘默之風革驕怠之弊欲人人相與協濟國是而委之於偷安之說又可乎視漏忽傾陛下之所不取也如臣所見粗有確論曰守曰應兩言而盡之耳當無事則思所以守有不虞則思所以應思所以守自治之謂也思所以應不得已之謂也守之者在我應之者在彼在我者有常者也惟其有常則雖信睦交通不能廢吾之所以守在彼者不測者也惟其不測則雖事變猝至不能逃吾之所以應今夫千金之家固其垣墉常人之所及也若曰吾與親黨為鄰不吾害也至慢易其固守之具而弗之理豈不備它盜哉所謂自治者如此詩曰逮天之未陰雨徹彼桑土綢繆牖戶今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之此言自治之為可畏也獸蹂于田荷戈而逐孺子之所知也若曰吾將委肉而飼之不汝驅也而獸且噬人矣雖欲不逐其能安乎所謂不得已者如此漢元康中乘胸奴之衰議欲擊之魏相不可曰救亂誅暴謂之義兵兵義者王敵加於己不得已而起謂之應兵兵應者勝爭恨小故不忍憤怒謂之忿兵兵忿者敗非但人事乃天道也亦言應敵之不得已也蓋能守者能應之道也守之無不固則應之無不勝矣守之既固則銷盟折衝人莫豫侮且將無敵之可應焉昔人所謂善之善者理固如此臣碩陛下增修德政厚施於民蓄材俊廣儲峙敦本而抑末去華而務實明賞罰而一於信振威令以致其嚴考將帥之能否而為摩勵之方察士卒之勤惰而求飬用之實凡可以為守國之具者靡不恢張而遍舉如此守無不固矣度山川之逺近視道途之險易孰當其阻孰當其衝孰為之聲援孰為之掎角孰為之統一凡可以為應敵之機者靡不素定而默諭如此應無不勝矣守國之具皆可以熟議而應敵之機不可以豫言惟在陛下力行之心識之執中自信而已矣書曰人心惟危道心惟微惟精惟一允執厥中夫人心危而易動易動者浮言之所以興道心微而難知難知者至理之所以隱君人者不過屏衆多之慮致精一之思執中自信則聖人之能事畢矣堯舜禹之治天下相傳以一道不外乎此數語者伏望陛下睿斷不移操一定之計圗守應之䇿以為執中自信之道而毋惑於喜功偷安之說則千萬人之衆莫能搖數百世之逺莫能易徵諸人事質諸神明臣之斯言庶或無愧惟陛下留神省察天下幸甚提㸃成都路刑獄公事馮當可上書曰臣竊以陛下臨御以來遭時多艱再造宗社不憚屈己修好息民然謙損過中寖成卑弱弱形著見然後强敵生心夫濟寬以猛濟弱以強猶救火必以水救寒必以溫不得不然善為強者先強其志意志意強然後舉事以著其强形強形見則弱形銷矣陛下審知敵盟之必敗也兵必不可弭也當赫然慨憤移蹕建康示天下有為下罪己之詔感動中外願與社稷俱為存亡天下聞之孰不投袂而起此舉事以著其強形之一端也且君為元首所以率先天下鼓動萬化自古未有人主退而能使天下進人主怯而能使天下勇惟陛下勵其強志著其強形赫然有一怒安天下之心忠臣義士無不感應人心一奮士氣百倍何所往而不可昔真皇澶淵之役陳堯咨勸幸蜀王欽若勸幸江南惟冦凖決䇿親征國家太平之基一戰再定當時果幸蜀果幸江南則靖康建炎之事已在此時矣今之形勝又不比全盛之時車駕已在江南無復可往之地福建二廣陛下可到彼亦可到蜀雖險阻形勢迫促如鼠入牛角必不能久今匹夫舉措猶知吉凶悔吝由動而生何況萬乘而不深思一動之間變故莫測將士觀望忠義之氣沮喪散而為盜賊大事去矣其與移蹕建康使天下增氣皆憤然北向為陛下爭先死敵萬萬相逺又沿江備禦朝廷雖已措置然尚多闊踈臣自蜀出峽凡有兵將所在必親見其人問其䇿略審其虛實以備陛下詢採大江數千里諸軍屯營不一不能盡言姑以湖北言之荆南鄂渚上流要衝荆南兵力甚弱雖添循贛萬卒不帶家口日夜思歸統制官不伏李宏節制無事之時猶慮變出不測緩急豈能為用問其戰守之方惟恃壅水護城水口在城外與敵共之敵得水口塞之可以灌城決之可以攻城李宏本田師中部曲今自為一軍田師中疾之恐緩急必不相為援田師中又老且病借有忠義之心已不能躬擐甲胄出入戎行矣然則上流要地已不可保彼田師中者二十年講和靜無所事髙堂大厦玉帛子女富貴安佚至矣及今有事豈不自知度其心亦願退避終保富貴然難於自言惟陛下急擇忠勇壯健如李宏李顯中之徒易之上流之地可恃以保而田師中亦必銜荷聖恩矣又㳂流諸軍無所總統譬如有指無臂筋骨脫落安能擊搏攫拏屈伸如意今敵使既還恐兵端便開望陛下急擇文武大臣有威望衆所畏信者屬一人於荆襄屬一人於江淮有威望衆所畏服莫如張浚劉錡則陛下既用之矣然猶有說借其譽望不當便置之前行勝負兵家之常萬一小跌搖動諸軍今使之總統諸將諸將自當前列錡獨任指蹤利害差逺亦致重之道也張浚嘗誤陛下事陛下不以為賢然方今天下皆以為當用日夜跂踵願陛下用之孟子曰國人皆曰賢然後察之願陛下捨一已之好惡以天下為心勉用張浚以副人望一日之間決能使軍民回心踴躍鼓舞其效亦非小補張浚憂患頓挫更歷耆老已無少年輕鋭之氣惟陛下深察之兵不徒用必資財賦財賦非自天降出於民力軍興已來三十餘年賦斂煩重民之津脉竭矣蜀民冠昏喪祭之禮盡廢風俗急迫愁嘆無聊荆湖盜賊正晝攻劫田野蕭條州縣上供月摏無所從出往往多仰征稅所在稅務持弓挾矢要遮船舫名曰征商其實劫奪貧商小賈至有棄舟逃遁者長江上下人不敢行臣不知福建二廣然以此較必不能獨豐裕也平居無事諸軍之費月給一月常懼不繼一旦用兵費必十倍國無所藏民不可取惟陛下痛自撙節惡衣菲食輟內庭之費以佐軍用自古克濟艱難未嘗不由恭儉勤勞陛下誠能至誠克已蠲損切身之奉以養戰士自被堅執鋭之夫豈不知感激奮勵捐其軀以報陛下者內而公卿大臣外而監司郡守下而富商巨賈州縣兼并之家雖使分其家財之半以佐軍用亦將甘心誠以陛下率之以身也兵有衆寡擇將統臨整齊訓練朞月可振惟財用在今日最為難事版曹司㑹計之臣當日夜精思省官吏減州郡冗卒精核當否無一毫妄費者庶或可以應辦州郡冗卒充守倅白直之外一無所用一路監司凡三四員間有闕官止一員而兼數職者略不聞有廢事然則官亦可省矣必官闕而事廢乃可建置然則雖從省併自不廢事大抵精微㑹計委曲周旋必不取於百姓然後根本不搖此今日之大務也又人主當艱難之際圖回事功聽言用謀當聽而不聽當用而不用當有為而不為當速而緩與當緩而速如發機括差之毫釐利害立見惟人主清心靜慮公聽逺覽然後能隨宜應變願陛下踈逺閹寺絶去便佞使私意無所干擾取舍無所熒惑專一誠意與賢士大夫骨鯁謀議之臣同心戮力共濟大事臣前所言望陛下移蹕建康選將練卒用張浚劉錡總統諸軍節用損己以充軍費餘皆末事也非事之本也惟陛下逺便佞踈近習清心寡欲以臨事變此興事造業之根本洪範所謂皇建其有極者也今日之所當為者必能以次而舉無不切當然後命大臣留守宫闕陛下如建炎之初馬上從事以數千騎往來循撫諸軍江淮荆襄無有定處使敵莫能知測臣知雖未及戰敵已知畏矣夫敵人雖強其強易弱非誠得天下之心其實強驅而南陛下與之抗衡不必大勝粗足支敵一二年間彼釁隙自開幽燕兩河當有起而斃之者陛下有半天下帶甲三十萬非奮空拳者又長江巨澤地利在我何所畏哉然今日之事誠急迫矣如救焚拯溺須㬰不及便繫存亡臣料敵使既還朝廷必有大措置一新天下耳目旬日之間寂然無聞臣恐廟堂之議猶欲遣使祈請冀和議可以遷延以臣計之萬無此理三年前敵焚𣙜場南牧之計已定矣雖云遷都其實意欲自臨行陳雖千百祈請徒自貽羞決不能回今年未動不過明年幸其早動陛下恐懼修省整頓條綱猶能及事其動愈遲則祻愈大不可及也臣於紹興八年嘗䝉陛下召對是時適敵使請和臣以為疑陛下不以臣為踈逺微賤與之反覆數四至煩聖喻以為親屈己之意其後太上梓宫歸葬中華太母還就東朝之養天下幾年不見兵革不可謂無得於講和然無以善其後臣之愚言猶有驗於今日臣今又被召㫖敵人適欲敗盟臣又以其狂愚冒瀆聖聰望陛下特垂聖覽採而用之無使狂瞽之言又驗於異日也臣被病昏塞語言無次干冒宸嚴罪當萬死惟陛下裁赦祕書省正字汪應辰上疏曰和議不諧非所患和議諧矣而因循無備之可畏異議不息非所患異議息矣而上下相蒙之可畏金雖通和疆場之上宜各戒嚴以備他盜今方且肆赦中外褒寵將帥以為休兵息民自此而始縱忘積年之耻獨不思異時意外之患乎此因循無備之所以可畏也方朝廷力排羣議之初大則竄逐小則罷黜至有一言迎合則不次擢用是以小人窺見間隙輕躁者阿諛以希寵畏懦者循默以備位而忠臣正士乃無以自立於羣小之間此上下相蒙之所以可畏也臣碩勿以和好之可無虞而思患預防常若敵人之至疏奏秦檜大不恱應辰為戶部侍郎應詔言事曰臣準尚書省劄子三省樞密院同奉聖㫖以防秋不逺事貴預􅍯足食足兵宜有長䇿可令臺諫侍從各以所見條具聞奏者臣伏見上天助順元惡殄滅其主新立畏天之威遣使通和辭意勤篤陛下方且不自暇逸而預為防秋之備不自賢聖而博盡群臣之謀天下幸甚蓋自近日以來傳報不一或以為其主寬厚能得衆者或以為懦弱不立者或以為急於和親欲復還河南地者或以為彼方厚立賞格以勸戰士如唐鄧陳蔡之類失而復取其志蓋未已者或以為河朔羣盜擾其南而契丹之遺種攻其北者昔漢光武初定天下臧宫馬武皆以胸奴衰亂時不可失光武答以北敵尚彊而屯田警備傳聞之事常多失實古今通患實在於此要之為國計者不當問敵國之盛衰顧吾自治如何爾東晉之季苻堅以百萬之師戰勝之威長驅入寇自謂投鞭於江足斷其流晉人凛凛有吾其左衽之歎至於淝水之戰虜衆奔潰首尾不支卒以亡國然則敵人雖盛未足為我之患也晉之謀臣皆欲乘苻氏敗亡開拓中原王師一出盡得兖青徐豫之地然而君臣宴安無復顧慮以謝安之勳勞猶不見容而道子元顯之流出而用事晉之不振實自此始然則敵人雖衰未必為我之福也臣故曰不當問敵國之盛衰顧吾自治如何爾今詔㫖以足食足兵為慮此二者皆自治之要也臣請先言足食之說昔人以為縣官當食租衣稅然漢文景之盛或賜民田租之半或盡除之或三十稅一武帝征伐四方窮極奢侈於是有鹽鐵酒酤之禁昭帝即位一切罷之至於後世或用或否唐至德宗用楊炎之說盡取軍興以來暴斂橫賦合而為兩稅又用張滂之說始有茶禁凡漢唐之所征取𣙜禁者今皆不能易矣然劉晏號為善𣙜鹽其始至也鹽利歲才四十萬緡至大歷末乃六百餘萬天下之賦鹽利居半宫闈服御軍餉百官祿俸皆仰給焉今止以淮浙計之歲收一千三百四十萬貞元八年𣙜茶歲得四十餘萬緡今則歲收二百四十萬矣世固未有善理財之人也獨不知劉晏復生其於今日財利尚能有所增加否乎至於其他所取名色猥衆曰經制曰總制曰無額上供曰折帛曰州郡寬剩曰僧道免丁曰寺觀寬剩曰大軍月樁曰贍軍酒息曰糴本總其所得又十倍於兩稅而不翅也然則今日利入之厚漢唐之時與吾祖宗之盛皆所不及也宜其財聚於上不可勝用矣而大司農無經旬之儲至於仰貽宵旰之慮此其故何也臣嘗以謂取之多則宜有餘而或以不足取之寡則宜不足而或以有餘以文景輕徭薄賦而貫朽粟陳以武帝籠天下之財而用度常不繼唐王仲舒觀察江西奏罷𣙜酤錢九十萬既三年錢餘於庫粟餘於廩孔戣節度嶺南盡除它名之稅免屬州負逋之緡錢二百萬而公藏私蓄上下與足由此觀之不在乎取之多而在乎用之有節也今日財賦自其外而言之左藏一歲所出比於紹興之初其多已增倍矣臣不敢逺引前古姑以陛下之初政為率則其間所當裁節者固不少矣仁宗至和中諫官范鎮乞明詔中書樞密大臣考求祖宗朝及天聖中官吏兵數與天下賦入之數斟酌損益立為條章上下遵守則國用有常而民力有餘矣此亦微臣所望於陛下也凡百官有司浮冗之費可以參酌舊制一切減省惟是軍旅之用日以增廣因循浸久遂為成例一旦更革固亦未易然而賞典之冗濫獨不可以甄別乎尺籍之僞冒獨不可以考核乎此特在陛下指麾之間爾又自用兵以來中外爭言便宜往往多出於希功徼幸之意如措置營田如結集民兵如招納歸附之類錢糧器械一皆取足於朝廷曽無毫髮之效亦莫知其何用也熙寧間韓絳以大臣宣撫陜西所費十八萬緡終無成功衆議沸騰以為大咎今所謂十八萬緡不知其幾矣況其事行之初議者固疑其有不可故臣碩朝廷之上有所興為與衆共之使可否之論畢陳於前然後擇而從之如漢宣帝使公卿議屯田利害反復詳盡庶幾無輕舉妄費之失矣雖然此特言其外者而已至於內府之財則有非外廷所知者周官太宰以九式均節財用有匪頒之式好用之式然則王之用度雖曰不㑹要不出乎式也太府掌九賦九功之二受其貨賄之入其頒財則以式法授之而式貢之餘財則以共玩好之用元豐更定官制以金部左藏案主行內藏之出納而奉宸庫則𨽻于太府所以示天子至公無內外之異也自紹興十三年始詔內庫不隸戶部太府有司輒敢㑹問與供報者皆坐之中外之人不知所以然者何也疑詞異說無所不有臣竊觀陛下清心省事仁民愛物一皆出於天性宫掖使令既已不備又從而出之教坊音樂既已不聽又從而罷之此豈以外物為樂哉比以戎士暴露備邊犒師招軍市馬率從中出此豈以多藏為利哉而臣猶有不能已者竊恐賜豫之間或過為豐厚而失於撙節出納之際或習為寬縱而失於考察雜色供奉冗食無用之人或雖澄汰而未盡也今陛下恭儉於上而左右近習與夫貴戚之家第宅池館窮極華美田園邸舍連亙阡陌此固不能使人之無疑也夫有不忍人之心必有不忍人之政有仁心仁聞而民不被其澤者蓋有之矣願陛下推其所為損之又損始自宫掖次及外廷如此則聖德日新人心說服而實惠及乎天下矣先王所不可儉者祭祀也至於當損之時則二簋可用享況於匪頒好用之類乎且臣聞之有國家者未嘗不以民心為安危惟我祖宗覆育天下斯民愛戴有隕無二尤見於艱難之時陛下試以東晉觀之方晉之國於江左中原分裂夷狄自相攻擊故邉境僅得以少寬而變故內起岌岌乎無終日之安所患者王敦也敦既死而蘇峻祖約連衡犯順所患者桓溫也溫既死而王恭商仲堪稱兵內向所患者孫恩也恩既死而盧循徐道覆相繼擾亂蓋其基本尚淺人心易搖故姦邪得以肆行而無所畏也自建炎以來金人之祻甚於東晉然而戶口雖或流離而無背畔之志盜賊雖或竊發而無響應之助彊悍之將不能以使其下之為非暴虐之敵不能以禁其民之向化此皆祖宗德澤之所固結陛下仁心之所感動相與扶持扞蔽以至今日豈曰小補之哉趙簡子使尹鐸為晉陽請曰以為繭絲乎以為保障乎簡子曰保障哉尹鐸損其戶數既而智伯攻晉陽决水灌之沈竈産蛙民無叛志凡今日之所以取諸民者臣已具陳於前矣願陛下思民心所係之甚重閔方今民力之已竭而求所以振救之惟有節省無益之費使財用充足然後賦斂之不得已者可以次第蠲除庶幾疲瘵之民得以蘇息則其為國家之保鄣者豈有已哉臣請言足兵之說昔陸贄有言克敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不可恃操失其柄者將雖材不為用兵不足恃與無兵同將不為用與無將同固不在益兵以生事加賦以殄人也至和中朝廷招募新兵諌官范鎮以為財用不足民力凋敝而又欲募兵是何異欲救火而益以薪流之濁而復撓其源也兵不在衆在練之與將何如耳方儂智高寇嶺南之後遣將不知幾輩遣兵不知幾萬死亡奔北不可勝紀然狄青所以取勝者畨落數百騎爾此兵不在衆近事之效也臣以為陸贄范鎮之說切中今日之病自講和以來諸將坐擁重兵初無尺寸之功而高爵厚祿極其富貴安享優佚養成驕惰無復激昂奮厲之志兵籍雖多初不閲習或拘之以為工匠或驅之以為商賈或抑之以為僕廝之役既虐使之以不當為之事又侵奪其所當得之食行路之人皆知其不可用也已而敵騎奄至曽不一戰望風遁逃浹辰之間而兩淮之地蹂踐幾遍方且恬不忌憚恣為誕謾列上戰功誑惑羣聽危急之際被㫖應援乃或游辭詭計顧望不進陛下雖嘗取其不用命者治之終未足以震服中外且鈞是罪也而罰有輕重人猶不能無詞況於或罰之或賞之乎故其免於罪而䝉賞者不知愧怍而反謂朝廷之可欺偃蹇傲睨日以滋甚陛下捐金帛以賜士卒適以資其刻剝之計至於怨讟並興無以自解乃復奏功第賞超越資級動以數萬唐李訴平淮西奏請將佐以下官凡百五十員憲宗謂裴度曰訴誠有竒功然奏請過多使如李晟渾瑊又何如哉遂留中不下以此校之今日之事無乃太甚乎方無事時朝廷有所使令率以詔㫖行下或隂為遷延或公肆欺玩或直抗執而不行不知一旦有急能惟命是聽以循國家之難乎四方之人何所觀望三軍之士何所勸沮雖有貔虎百萬將誰用之故臣之所憂不在乎兵之不足而在乎軍政之不修也且今中外之兵其老弱強壯不可得而分也其逃匿死亡不可得而見也然則雖欲益兵亦不知其所以益矣諸葛亮出師無功或勸以益兵者亮曰大軍在祁山箕谷皆多於賊而反為賊所破者則此病不在兵少也在一人耳今欲減兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今以後有忠慮於國者但勤攻吾之闕則事可定賊可死功可蹻足而待矣由此觀之亮非徒不肯益兵也又欲減省之蓋勝敗在將不在兵兵多而冗不若少而精也臣碩陛下內自省察以前日之失為在已奮發英斷力行大公至正之道而不牽於異說之私賞善罰惡無偏無黨示天下以好惡所在使人皆洗心易慮以聽陛下所為然後兵籍之多寡人材之高下皆可以按見其實謹其訓練之法號令必行等級必嚴技藝必精心志必一周旋進退將無所不可者矣昔人論兵蓋有一可以當十者亦有十不當一者此顧用之何如耳竊聞朝廷方簡閲州縣之兵取其半以待不虞之備此誠有不得已者去冬固嘗發諸郡弓弩手什之七矣彊之使行驚擾狼顧州郡有調發之費室家有離散之怨既至軍中大率奴虜使之初不藉以為戰鬪之用也大敵在前何嘗得一夫之力且所謂正兵者技止於此況其下者乎而又有甚不便者夫盜賊之作常生於細微州縣之兵雖不可施之於大軍而追胥討捕防護鄉井蓋所以銷患於未萌也晉武帝罷州縣兵山濤陶璜皆以為不可及永寧以後盜賊羣起州郡不能制此往事之鑒也去冬既取所謂弓弩手者州郡無備則或發諸縣尉司弓手以守衛城郭縣又無備則或押差編戶以代弓手之乏貪猾之夤緣為姦無所不至或差或否均被其擾夫天下之事順人情而行之則如水之就下拂人情而行之則有挾山超海之難故聖王之政山者不使居川而渚者不使居中原此非有神竒巧妙也亦曰順之而已今民之在田里者則拘之以縣縣之巡捕者則執役於州州之守衛者則分隸於諸軍豈所以為順哉議者患州縣之空虛也則請各置四隅之官而以其土人為之強宗富室平日挾其財力以武斷於鄉曲今又假以尺寸之柄公行賄賂明報仇怨有甚於盜賊者朝廷知其不便尋即寢罷蓋凡所以開闔動搖至于數四公私煩費騷然不寧而訖不得其道理者皆起於州郡之無兵也今者詔㫖止令選其強壯就各州教閲則固未必調發也惟陛下精思熟慮於不得已之中有所裁酌使州縣不至於無備田里不至於重擾則州縣安寧而朝廷安矣臣仰惟陛下臨政碩治于茲有年國宜益富兵宜益強而顧以不足為憂凡在臣子孰不皇恐臣竊以為自古人君當艱難之際其能積微而致著革弊而為治者要必以至誠為本以力行為要不尚虛文專取實效用其人必責以功聽其言必驗以事使欺僞者有所不敢為而忠臣義士皆得自盡以奉其上則天下無不可為之事矣詩曰秉心塞淵騋牝三千又曰思無邪思馬斯徂夫馬之蕃息何預於人君之心思蓋物無小大茍非以誠心持之則所行之事其施於外也必茍簡所用之人其應於上也必滅裂又安能還至而有效乎今日之事特在陛下加之意而已臣竊觀今之風俗大率以欺罔為尚夔路帥臣自謂訓練精兵二萬及監司核實初無一卒東南鑄錢祖宗時嵗不下百萬緡比來止以四十萬為額又盡收天下之銅有司以為可鑄三十萬則是七十萬也去年所納僅及五萬而乃以六萬為羡餘而獻夫以欺罔如此既不以為罪又或從而賞之人亦何憚而不為欺罔乎此風不革則天下之事所以仰勞聖慮者何時而已耶臣不勝惓惓獻其愚忠惟陛下裁赦幸甚直祕閣喻汝礪上裕蜀䇿曰論天下形勢必資之秦論秦雍軍須必資之蜀秦與蜀壤界之國也擁四川之饒據五路之強而中興之大勢定矣仰惟陛下至明旁燭而用之以晦大德丕冒而用之以恭於是結二國之信致諸侯宗祧徼上帝之福錫之天下綏靖河洛澄一崤渭天下胸腹也今已據其胸腹則號令之施足以掩天下矣光復大業紹開中興千載一時也臣竊謂蜀宿重兵嵗月淹久一嵗供億無慮千萬緡玉壘豐腴燥於轉輸西海羽毛燼於器甲而蜀人之力日以殫矣仰賴陛下惻怛晨興念慮逺方慨蜀漢宿兵之久憐岷峨飛餉之勞乃詔樞臣徙兵關右全蜀父兄亟蒙福祉自謂可以少燕一日之閒矣然臣竊念之其弊猶在者官冗是也水濁則魚困官冗則民亂事要則易從法簡則易行且蜀之力何以困兵蠧之也非特兵蠧之冗官病之也蓋自軍興以來於是有制置司之官於是有都漕司之官於是有州縣酒官及催撥運米官之流煩擾乎供須崇侈乎饋問公私焦然物力耗竭囷簏空寡老弱罷病而蜀之人益以瘠矣伏願陛下伸之以訓辭裁之以紀極省官併局則益利罕不急之負薄賦緩征則潼夔有息肩之日如是則蜀日以肥可以餉秦秦日以徑可以遮蜀中興之業永為萬世無疆之休汝礪又上恢復䇿曰嘗考荆楚之區北臨漢沔南薄夏廣東界吳會西瀕巴蜀諸葛孔明以為用武之國者是也外帶江漢內據巖阻魯肅以為金城之固者是也孫權都武昌黃龍之元徙都建業以陸遜輔其子鎮焉豈非以其地形得上流之勢依荆州之險足以為國之隱蔽故耶又使步隲守西陵程普守江夏吕蒙守陸口朱然守南郡而魯肅甘寧之徒亦復經營於資水益陽之間是數公者皆天下魁桀竒偉豪爽萬人之英而權悉付之以上流之任其意蓋以為先據夏口則上流之形勢可全又據楚關則南夏之勢彌廣夫孫權雖威行江東據有八州騁技賈力不足以駕二方之雄而劉備曹公天下強對也陸遜非劉備對周瑜非曹公對卒能窘劉備於西陵䠞曺公於赤壁破壞摧辱退步千里夫豈有異故哉誠以楚關為城長江為池而得上流之便故也仰惟陛下受命中興恢復疆宇大縣數百名都十二自河而南悉主悉臣光復舊業系隆我宋世之議者棘欲跖孔明跨有荆益之言誦杜甫江陵望幸之句以謂中原父老虛心注目願望陛下朝服濟江駐蹕諸宫臣愚則謂其說是矣而時則未可也臣自岷江拏小舟漾夔峽泛荆渚浮夏口倚泊九原廬阜督草郡守例兼田官已而徜徉四顧迥眺千里獸蹄鳥足寂無人聲正念戈兵斬刈歲月汚久穡人雕傷牛畜肆玩則地何由闢糧何由積將何以奉萬乘供百官哉取諸岷益則岷益鮮耗而無窮竭諸鄢郢則鄢郢養求之未給伏願陛下少復俟之加以數年地益增治糧益得藏然後振斾以臨三楚清蹕而朝諸侯可也更復俟之歷歲滋久河潼囂庶許洛昌大然後復皇輿於舊京旋古鼎於大邑可也臣書生駑弱僭論國事輕觸宸嚴惟陛下赦其愚尚熟一計之監察御史劉行簡論人主不憚改為疏曰臣竊觀自古人主處非常之時建非常之業謀無遺䇿事靡不濟者無他焉機變敏速不憚改為而已臣請以漢高帝之事言之始高帝聽酈生撓楚之計封六國後且將刻印付之聞張良之說旋悟其非亟命銷印群臣勸都雒陽議既定矣聞婁敬之說即日徙都何其易改耶處非常之時建非常之業不得不如此也方今盜據中原四郊多壘軍旅洊興國用耗竭可謂處非常之時矣陛下所與群臣早夜圖回者無非安朝廷定社稷弭難銷兵足國裕民之事可謂建非常之業矣然而機事之來間不容髮謀不能皆密也知其疏則改之舉不能皆當也知其非則改之機變敏速正在此耳臣伏覩陛下近降詔㫖以謂承中否之運不啻創業之難自非陛下既知其難聰明宏達思慮至到惡能知其難若此哉臣謂陛下既知其難則當以前古創業之君如漢高帝者為法凡群臣論議於前陛下固當審思然知其可用則敏而行之無憚改作如是乃可以濟功如其循習拘攣若可若否則雖平居閒暇且猶不可況今日之事哉伏惟留神財幸歷代名臣奏議卷九十一
