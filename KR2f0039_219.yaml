body:
  text: 歷代名臣奏議卷二百十九明楊士竒等撰兵制趙孝成王時荀卿與臨武君議兵於王前王曰請問兵要臨武君對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也荀卿曰不然臣所聞古之道凡用兵攻戰之本在乎一民弓矢不調則羿不能以中六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵也故兵要在乎附民而已臨武曰不然兵之所貴者勢利也所行者變詐也善用兵者感忽悠暗莫知所從出孫吳用之無敵於天下豈必待附民哉荀卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也路暴露亶讀為袒謂上下不相覆蓋君臣上下之間滑然有離德也故以桀詐桀猶巧拙有幸焉以桀詐堯譬之以卵投石以指撓沸若赴水火入焉焦沒耳故仁人上下百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之捍頭目而覆胸腹也詐而襲之與先驚而後擊之一也且仁人之用十里之國則將有百里之聽聽猶耳目也用百里之國則將有千里之聽用千里之國則將有四海之聽必將聰明警戒和傳而一故仁人之兵聚則成卒散則成列延則若莫耶之長刃嬰之者斷兊則若莫耶之利鋒當之者潰圜居而方正則若盤石然觸之者角推案角鹿埵隴種東籠而退耳且夫暴國之君將誰與至哉彼其所與至者必其民也其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讎人之情雖桀跖豈又肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也故仁人用國日明諸侯先順者安後順者危慮敵之者削然反之者亡詩曰武王載發讀為斾有虔秉鉞如火烈烈則莫我敢遏此之謂也孝成王臨武君曰善請問王者之兵設何道行之而可荀卿曰凡在大王將率皆末事也臣請遂道王者諸侯強弱存亡之效安危之勢君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者強亂者弱是強弱之本也上足卬古仰字則下可用也上不足卬則下不可用也下可用則強下不可用則弱是強弱之常也隆禮效功上也效驗也重祿貴節次也上功賤節下也是強弱之凡也好士者強不好士者弱愛民者強不愛民者弱政令信者強政令不信者弱民齊者強民不齊者弱賞重者強賞輕者弱刑威者強刑侮者弱械用兵革攻完便利者強械用兵革窳楛不便利者弱重用兵者強輕用兵者弱權出一者強權出二者弱是強弱之常也齊人隆技擊其技也得一首者則賜贖錙金無本賞矣是事小敵毳則偷可用也事大敵堅則渙焉離耳若飛鳥然傾側反覆無日是亡國之兵也兵莫弱是也是其去賃市傭而戰之幾矣魏氏之武卒以度取之謂取其長短材力中度也衣三屬之甲上身一髀禪一脛繳一凡三屬屬之欲切操十二石之弩負矢五十箇置戈其上胄帶劒胄與胄同謂著兜牟又帶劒也贏三日之糧日中而趨百里中試則復其户利其田宅是數年而衰而未可奪也改造則不易周也改造更選擇也是故地雖大其稅必寡是危國之兵也秦人其生民也狹隘其使民也酷烈劫之以勢隱之以厄忸之以慶賞鰌藉也不勝則以刑罰陵藉之之以刑罰使天下之民所以要利於上者非鬬無由也厄而用之得而後功之功賞相長也五甲首而𨽻五家是最為衆強長久多地以正故四世有勝非幸也數也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也諸侯有能微妙之以節則作而兼殆之耳微妙精盡也莭仁義也作起也殆危也故招近當作延募選隆勢詐尚功利是漸之也禮義教化是齊之也故以詐遇詐猶有巧拙焉以漸遇齊辟之猶以錐刀墮太山也非天下之遇人莫能試故王者之兵不試湯武之誅桀紂也拱挹指麾而強暴之國莫不趨使誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵若夫招近募選隆勢詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳夫是之謂盜兵君子不由也故齊之田單椘之莊蹻秦之衛鞅燕之繆是皆世俗之所謂善用兵者是巧拙強弱未有以相若也若其道一也未及和齊也掎契司詐權謀傾覆未免盜兵也契讀為挈持也掎挈猶掎托司讀為同詐誑也皆謂困其危弱掩襲之也齊桓晉文椘莊吳闔閭越勾踐是皆和齊之兵也可謂入其域矣然而未有本統也故可以霸而不可以王是強溺之教也孝成王臨武君曰善請問為將荀卿曰知莫大乎棄疑行莫大乎無過事莫大乎無事至無悔而止矣不可必也故制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固處舍營壘也收藏財物也徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵決戰必道吾所明無道吾所疑夫是之謂六術無欲將而惡廢無怠勝而亡敗無威內而輕外無見其利而不顧其害凡慮事欲熟而用財欲泰夫是之謂五權所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡受命於主而行三軍三軍既定百官得序羣物皆正則主不能喜敵不能怒夫是謂之至臣慮必先事而申之以敬慎終如始終始如一夫是之謂大吉凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守行如戰有功如幸敬謀無壙與曠同敬事無壙敬史無壙敬衆無壙敬敵無壙夫是之謂五無壙慎行此六術五權三至而處之以恭敬無壙夫是之謂天下之將則通于神明矣臨武君曰善請問王者之軍制荀卿曰將死鼓馭死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之令不進而進猶令不退而退其罪惟均不殺老弱不獵禾稼服者不禽格者不赦奔命者不獲凡誅非誅其百姓也誅其亂百姓者也百姓有捍其賊則是亦賊也以故順刃者生蘇刃者死奔命者貢蘇讀為傃向也微子開封於宋曹觸龍斷于軍殷之服民所以養生之者也無異周人故近者歌謡而樂之逺者竭蹶而趨之無幽間辟陋之國莫不趨使而安樂之四海之內若一家通達之屬莫不從服夫是之謂人師詩曰自西自東自南自北無思不服此之謂也王者有誅而無戰城守不攻兵格不擊上下相喜則慶之不屠城不潛軍不留衆師不越時故亂者樂其政不安其上欲其至也臨武君曰善趙王破原陽以為騎邑牛贊進諌曰國有固籍兵有常經變籍則亂失經則弱今王破原陽以為騎邑是變籍而棄經也且習其兵者輕其敵便其用者易其難今民便其用而王變之是損君而弱國也故利不百者不變俗功不什者不易器今王破卒散兵以奉騎射臣恐其攻獲之利不如所失之費也宋文帝元嘉二十八年普責百官讜言建平王宏議曰臣聞建國之道咸殊興王之政不一至於開諫致寧防口取禍固前正同軌後主共則秦殷之敗語戮刺亡周漢之盛謗升針顯陛下以至德神臨垂精思治進儒禮而崇寬教哀獄法而黜嚴刑表忠行而舉貞節辟處士而求賢異修廢官而出滯賞撤天膳而重農食禁貴逰而弛𣙜酤通山澤而易關梁固已海內仰道天下知德今復開不諱之塗奬直辭之路四海希風普天幸甚舉蒙採問敢不悉心謹條鄙見置陳如左辭理違謬伏用震讋夫用兵之道自古所慎頃干戈未戢戰備宜修而卒不素練兵非夙習且戎衛之職多非其才或以資厚素加或以祿薄帶帖或寵由權門恩自私假既無將領虛尸榮祿至于邉城舉燧羽檄交馳而望其擐甲摧鋒立功閫外譬緣木求魚不可得矣嘗謂臨難命師皆出倉卒驅烏合之衆𨽻造次之主貌踈情乖有若胡越豈能使其同力拔危濟難故奔北相望覆敗繼有今欲改選將校皆得其人分臺見將各以配給領護二軍為其總統令撫養士卒仗恩信先加農隙校獵以習其事三令五申以齊其心使動止應規進退中律然後蓄鋭觀釁因時而動摧敵陷堅折衝于外孫子曰視卒如赤子故可與之共死所以張弮效爭先之心吮癰致必盡之命豈不由恩著者士輕其生令明者卒畢其力考心迹事如或有在妄陳膚知追懼乖謬唐太宗時簡點使出右僕射封德彛等並欲令取中男敕三四出魏徴執奏不可德彛重奏稱今見簡點使云中男內大有壯者太宗怒乃出敕中男雖年十八身形壯大亦取徴又不肯署敕太宗召徵作色讓之曰男若實小不點入軍若實大是其詐妄依式點取於理何妨耶如此固執不解卿意徵正色曰臣聞竭澤而漁非不得魚明年無魚焚林而畋非不獲獸明年無獸若中男以上盡點入軍租賦雜徭將何取給然比年來國家衛士不堪攻戰豈為其少耶但為禮遇失所遂使人無鬬志若多點取人還充雜役其數雖多終是無用若精簡壯健遇之以禮人百其勇何必在多陛下每云我之為君以誠信待物欲使官人百姓並無矯偽之心自登極以來大事三數皆是不信復何取信于人太宗愕然曰所云不信是何等也徴曰陛下初即位詔書云逋租宿債欠負官物並悉原免即令所司列為事條秦府國司亦非官物陛下自秦王為天子國司不為官物其餘官物復將何有又關中免二年租賦關外給復一年百姓蒙恩無不欣悅尋更有敕云今年白丁多以役訖若從此放免便是虛荷國恩若已折已輸並令總納所免皆以來年為始散還之後方更徵收百姓之心不能無怨已徵得物便點入軍來年為始何所取信又共理所寄唯在縣令刺史年常檢閲並悉委之至于簡點即疑其詐偽望下誠信不亦難乎太宗曰朕向見卿固執疑卿蔽於此事今論國家不信乃是人情不通朕不審思過亦深矣行事往往如此天下若為致化乃停取中男賜金甕一口太宗帝範曰夫兵甲者國家凶器也土地雖廣好戰則人凋邦國雖安忘戰則人殆凋非保全之術殆非擬寇之方不可以全除不可以常用故農隙講武習威儀也三年治兵辨等列也是以勾踐軾蛙卒成霸業徐偃棄武終以喪邦何也越習其威徐忘其備也孔子曰以不教人戰是謂棄之故知弧矢威以利天下此用兵之機也髙宗麟德元年熊津都督劉仁軌上言曰戍兵疲羸者多衣服貧弊唯思西歸無心展效臣問以往時百姓應募或請自辦衣糧何為今日士卒如此咸言今日官府與曩時不同曩時沒王事者敕使弔祭追贈官爵回授子弟凡度遼者皆賜勳一轉自顯慶五年度海者官不及記録死者無人誰何州縣發兵壯而富者行錢得免弱而貧者被發即行海東苦戰之時許以勳賞及達西岸唯聞推禁奪賜破勳州縣追呼無以自存是以被發之日已有逃亡自殘者其有勳級亦不免挽引之勞無異白丁又初發時唯令備一年資裝今已二年未有還期自非有所更張厚加慰勞明賞重罰以起士心恐師衆疲勞立效無日上深納其言髙宗御武成殿問兵家有三陳何謂邪衆未對武陟尉貟半千進曰臣聞古者星宿孤虛天陳也山川向背地陳也偏伍彌縫人陳也臣謂不然夫師以義出沛若時雨得天之時為天陳足食約費且耕且戰得地之利為地陳舉三軍士如子弟從父兄得人之和為人陳捨是則何以戰帝曰善武后時欲季冬講武有司不時辦遂用明年孟春檢校左庶子王方慶曰按月令孟冬天子命將帥講武習射御角力此乃三時務農一時講武安不忘危之道孟春不可以稱兵兵金也金勝木方春木王而舉金以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入今孟春講武以隂政犯陽氣害發生之德臣恐水潦敗物霜雪損稼夏麥不登願陛下不違時令前及孟冬以順天道手制褒允代宗時左拾遺獨孤及奏言減江淮山南諸道兵以贍國用陛下初不以臣言為愚然許即施行及今未有沛然之詔臣竊遲之今天下唯朔方隴西有吐蕃僕固之虞邠涇鳯翔兵足以當之矣自此而往東洎海南至番禺西盡巴蜀無鼠竊之盜而兵不為解傾天下之貨竭天下之榖以給不用之軍為無端之費臣不知其故假令居安思危以備不虞自可厄害之地俾置屯禦悉休其餘以糧儲屝屨之資充疲人貢賦嵗可以減國租半陛下豈遲疑於改作逡巡於舊貫使大議有所壅而率土之患日甚一日是益其弊而厚其疾也夫療癕者必決之使潰今兵之為患猶癕也不以漸戢之其害滋大大而圗之必力倍而功寡豈易不俟終日之義耶德宗貞元二年上與常侍李泌議復府兵泌言府兵平日皆安居田畝每府有折衝領之農隙教戰有事徴發則以符契下州府參驗發之至所期處將帥按月有不精者罪其折衝甚者罪及刺史軍還則賜勳加賞行者近不踰時逺不經嵗髙宗以劉仁軌為洮河鎮守使以圗吐蕃於是始有久戍之役又牛仙客以積財得宰相邉將效之誘戍卒使以所齎繒帛寄於府庫而苦役之利其死而沒入其財故戍卒還者什無二三然未嘗有外叛內侮者誠以顧戀田園恐纍宗族故也自開元之末張説始募長征兵兵不土著不自重惜忘身徇利禍亂遂生嚮使府兵之法不廢安有如此下陵上替之患哉上以為然宋仁宗景祐元年三司使程琳上疏論兵在精不在衆河北陕西軍儲數匱而召募不已且住營一兵之費可給屯駐三兵昔飬萬兵者今三萬兵矣河北嵗費芻糧千二十萬其賦入支十之二陕西嵗費千五百萬其賦入支十之五自餘悉仰給京師自成平逮今凡二邊所增馬步軍指揮百六十計騎兵一指揮所給嵗約費緡錢四萬三千步兵所給嵗約費緡錢三萬二千他給賜不預合新舊兵所費不啻千萬緡天地生財有限而用無紀極此國用所以日屈也今同華沿河州軍積粟至於紅腐而不知用沿邉入中粟價常踊貴而未嘗足誠願河北陕西募住營兵勿復增置遇闕即遷廂軍精鋭者補之仍漸徙營內郡以便糧餉無事時番戍于邉緩急即調發便近嚴戒封疆之臣毋得侵軼生事以覬恩賞違令者重置之法如此則疆埸無事而國用有餘矣帝嘉納之康㝎元年知制誥富弼上奏曰臣聞天下大器也非法制綱維不可以守矣生民重畜也非智力控禦不可以保矣是故先王兢兢業業日謹一日唯恐失大器而喪重畜也臣伏見西戎僭叛屢寇邉境本道不足以支朝廷悉發京東京西淮南江南荆南湖南兩浙福建廣南東西凡十一道兵以屯關中十一道兵素寡弱又罹此調發故關中得之未足以克而十一道之兵已盡矣朝廷獨念京東鄰河朔京西次關陕此二道不可以無備遂遣使閲鄉民俾習武以代軍兵東南九道則不之省臣未諭也伏思朝廷用度如軍食幣帛茶鹽泉貨金銅鉛銀以至羽毛膠漆盡出此九道朝廷所以能安然理天下而不匱者得此九道供億使之然爾此九道者朝廷所仰給也固宜保守之今盡取其兵是不加保守一日乘虛盜起梗其津要則京師無故而坐困矣凡姦賊好窺覬者無世不有今西鄙用兵天下兵與將皆集於西方力必不能及他道則就無備而作焉以臣觀此九道州軍或一豪傑率數十夫伺州官朔望行香畢集持鋤耰白挺群呼奮擊可盡殺之誰復禦者然後開府庫復劫取豪家物散施召募必應者如雲一日可得千計鼓行而前處處無兵又城壘不修諸郡縣鎮所至必陷俟奏至朝廷即時發兵亦不減三兩月方至則其徒必及萬數何可破耶臣又慮陛下以謂巨寇必不能猝至臣不敢逺稽前古略引隋唐以來東南為寇者以明之隋大業年中劉元進起餘杭朱燮管崇起吳各擁數十萬寇江浙諸州朱粲起譙郡擁兵數十萬寇宏起鄱陽蕭銑起羅縣各衆數萬攻陷諸郡唐咸通年中桂林戍卒五百人殺其將以判官龐勛為都頭剽掠湘潭後陷徐宿等州又乾符年中海賊王郢江賊栁彥章各聚徒數萬餘光化年中魯景仁起連州黃岫起桂陽沈行收起邵陽各擁兵萬餘攻本郡邑殺戮守長其甚盛者則江西鍾傳廣南劉隱湖南馬啇福建王潮皆割據焉臣謂東南九道負山阻水為寇者足以倔強故自古為寇淵藪唯王者能鎮撫之則寇不能生於其間不然則亂之必矣今九道大小一百三十餘郡若每郡皆宿兵固不可得也臣欲乞於九道中擇要害約十餘郡如泗揚升吉潭荆桂廣福杭越之類按地理相去均者於本處募兵大郡五千小郡三二千以多補少不過四五萬人以東南百三十郡之富豈不能贍飬哉訓為精兵勿復差役每郡置二督護專領之每道别置一都護經略之九道又置一總管者居中以節制之如此則欲為寇者知朝廷有備豈不顧憚耶設有盜起則發兵有所濟師有地乘其未盛熾而撲滅之不為難矣臣前所謂天下生民宜網羅而控制之者以此道也臣伏念京東京西雖置鄉兵而軍兵絶寡亦未見久安之理夫鄉兵無營壘散處村堡又各持兵仗其部伍上下終不得如軍兵之肅也或因飢饉為姦傑倡之安能使必不為盜又宜得軍兵兩相制禦況山東自古尤多寇盜隋大業年中韓進甄寶起濟北張金稱起清河竇建德格謙孫宣雅起渤海孟襄杜伏威起齊逐郡各擁衆十餘萬人劫掠諸郡唐乾符中王仙芝起濮州聚衆亦十餘萬轉攻河南十五郡以至黃巢起宛胊擁衆百萬陷覆兩京橫行天下雖然觀芝初起草莽蓋亦甚微當時制禦失䇿遂至滋漫今亦乞擇要害數郡募兵立帥如東南之制則可無虞矣議者或謂財用不足恐難成此夫以天下安全之業尚患財窘而不能立久長之䇿不幸小有寇聚則如之何伏惟陛下以宗社為憂以生民為念裁制私欲損節橫費則數萬之衆不日可募此無疆之基也知連州林槩上封事曰古者民為兵而今兵食民古馬寓于民而今不習馬此兵與馬之大患也請附唐府兵之法四斂一民部以為軍間耕田里被甲皆兵因命其家咸得畜馬私乘休暇官為調習則人便干戈馬識行列又行陳無法而出于臨時將無素備而取于倉卒軍不豫權而監以宦侍若是者雖得古之材使循今之法亦必屢戰而屢敗二年河東轉運使文彥博奏曰臣于去年二月初曽上言乞于河東路每三丁點一丁充強壯緩急為守禦之備自後朝廷差吳遵路等于河東路點差到強壯共一十四萬三千餘人內一十三萬三千餘人是主户九千餘人是客户皆兩丁內點一丁充強壯臣今遍歷到諸州軍竊見所點到強壯太多而不精兼頗妨奪農事臣檢會咸平中曽降敕點差強壯本路除晉絳慈隰麟府六州不點差外共點差到強壯四萬四千餘人今來雖添晉絳慈隰四州點差強壯即比咸平舊數幾及三倍況本路主客人户共三十一萬勘會才及陕西人户之半昨來陕西所點弓手只十萬人以此況之即河東所點集太多而妨農也臣欲乞依陕西體例每三丁點一丁充強壯猶可得八萬餘人所貴務農作者不致妨廢習武事者頗得精專如允臣所奏更不鈔點據丁口數目而去留之並不騷擾動衆慶歷元年知諫院張方平上奏白臣伏見宣差朝臣分路往陕西河東京東西路於前來點差強壯弓手內招募願充軍人分配宣毅保捷指揮者臣竊思此舉事繫安危敢竭微衷上禆國論謹列不便事件及臣愚所見如左一自去嵗初降敕命點差強壯弓手之時民間喧然皆言此時點差雖以強壯弓手為名實欲黥補軍藉敕旨屢下丁寧再三諭以朝廷點差之意只要各護縣鄉必不起從征戍郡縣又多方安輯民猶猜譁及經去冬教習尋放歸業鄉閭竊語方以少定然名在弓手之籍者居常猶恐不能自安每聞一使出行州縣輒相扇動謂來調發今此命忽下果如民所素料此後命令無復可信此其不便一也一宣命雖令使人招召情願緣先來點差弓手多是髙資之家例皆衣食無闕豈有情願充軍之人臣聞所差朝臣已相與議云此來受命朝廷意在倚辦若至郡縣無人應募須與逐處官吏迫致之爾竊惟所差使臣蓋皆期于集事尋常淺見之人復思郡縣官吏材術足任者無幾今既設以賞利唯知用心若其謀之匪臧或致變生不測姦猾乘釁相激譟聚萬一驚擾更成厲階此其不便二也一所差使臣既與郡縣官吏抑迫百姓令伏充軍即須團練結甲赴京師充軍之人既非情願若其上路因與親戚離訣更有悔心中道逃散安能防遏既不敢各歸本土聚依蒲澤逺近相應展轉結連或姦豪之有謀乘郡縣之無備其勢一擾必勞安輯此其不便三也一今京東西路頗為飢歉民既艱食居常猶為寇盜一夫首難奔赴必多此其不便四也一強壯弓手各在郡縣未去農業若朝廷用漢代更之術因唐防秋之法入耕出戰遞為防戌則是農不去業兵不乏備不因帑廪之積常得丁壯之人今既籍為正兵處之連營則其衣食財用終身仰給縣官此其不便五也一已降御札冬至將行郊禮逺近郡縣尤宜肅靜夫愚而不可欺弱而不可勝者百姓也綏之斯和動之斯危武有七德安民為本事規未兆敝猶不救若又迫之是啓亂也則朝廷之憂不在四鄙夫禍起所忽慝生有階秦之勝廣漢之黃巾唐之巢勛是皆始于烏合之衆此其不便六也右凡此六患昭然在目不可不深慮不可不過防臣以一介賤微見識淺近誠不足以參國論贊聖謀但以職在諫曹義當有犯無隱故陳愚管上祈裁擇臣謂陕西河東其近裏州郡乞將前來點差強壯弓手等中分其半戍邉每九月防秋至二月放歸嵗一更代留其半防守本州以時訓練當就戍之時依出軍人官與裝費冬給衣賜日支口食蓋民所以懼乎籍之為兵者不唯前冒鋒刃矢石之難且重去其土終身與親愛姻族永相隔别此其大戚也今若畨休遞戍終是不離本鄉冀望邉事漸寧即當息肩安業昔太宗皇帝籍兩河之人以為鄉兵于時識者亦悼其失業蓋不若因兩河強壯使之扞邉壯者入籍衰者出役不衣庫帛不食廪粟邉不闕戍民不去農河在乎蓄之營堡而後為官軍也又聞于時籍鄉兵之際因大軍方興之威猶恐其亂乃密誡諸州郡尅期一日而事畢故民雖姦謀相動不復及矣今朝廷既惜強籍之名為必籍之事命兩朝臣分使一路周環三二十郡幅員三數千里或未能親到但行文移州縣官吏方且各率所見異同紛起但恐使人一出民心一搖後雖悔之或所難及願朝廷審加圖議事不憚改追還所下逐路轉運司宣命停所差官勿遣實天下幸甚國家之福也慺慺丹誠切冀昭納方平又奏曰臣近覩宣命差官往陕西等四路募強壯弓手之充軍者事甚不便已于十九日具狀奏論未蒙朝廷别有處分臣不勝憂疑敢奏論其事至諸召募之狀已具條陳今但言其必不可之理有二若召人情願充者而後籍之臣料必不集事今此遣使徒使朝廷失大信于天下州縣惶惑人心驚擾而已必欲集事則非強致之不可果強而致之喧譁相動禍變不測故此召募寬之則事不集急之則促亂臣前言所謂必不可之理有二此之謂也臣雖愚淺忝居諫列非不知邉陲勢急戎備事大衛兵禁旅調發不足今日之舉蓋朝廷非所獲已臣愚深思募人所以防禍難若今日之為人未必為國家用適所以致禍難者但恐朝廷之憂不在邉鄙而在四郊之外向者群盜竊發潛匿山谷發卒數十倍捕之猶不能即擒久乃幸得自潰近日州郡奏報比有姦盜相聚又京東西旱潦相仍民方艱食正月向盡麥種未入朝廷尚須留意安輯振其不足更下此令民心謂何凡民之籍者四路不啻三十萬人今各不自保于去留之間此其相扇唱和可不過為防慮萬一不逞之輩乘隙嘯動臣恐郡縣官吏不棄城而遁即拱手就擒雖以墨翟之智不能以無備守也以陛下神聖威德而宗廟之靈天贊神助則臣非所敢知者若專以人事料之但見危形未見安理往者唐氏自髙祖至懿宗傳十九主矣其間戎狄侵軼數至畿甸大盜滔天輿駕出狩屢矣而卒全大業者所恃民心不去根本未搖信令尚行也及懿宗之世南蠻陷交州大起天下兵轉貨食以事之徐方戍卒相率回戈連陷江淮遂啓仙芝黃巢之寇生民塗炭因此遂危社稷今日之舉唐鑒未逺矣夫賢智之謀事有萬全之形而後有一缺之虞猶不以僥幸為之今天下猶古也陛下奈何處成敗之計如是之易乎伏願陛下更與大臣從容講求至如京東西州郡見管廂禁諸軍亦不少比州郡患于乏人每使命揀不無留占若量逐處民兵隨其衆寡分畨于本州防守盡代見軍赴邉此亦人情所便也朝廷機事非臣詳之揣摩以言精切未盡屢展螳蜋之臂上冒雷霆之威蓋惟大義之所存故于蕞軀而無愛不勝宗廟之憂區區激切之至方平又上疏曰三代而下言治國者惟漢唐至我朝焉天下其猶故也以言乎蠧則益多矣漢以兼并唐則釋老我朝加以兵馬蠧出于一百姓有不足者蠧出于二國且虛乏三蠧並生若之何而冀上下之豐給也蓋天生五材世所並用必有武備邦之大經夫兵國之衛也何蠧之云乎以夫置兵之法與古已異是以謂之蠧焉亦自三代而下逮于唐兵農一本故周氏因州里以起師旅齊人修內政以寓軍令漢法調民代更以充邉戍唐制案籍科發以備府兵故其人耕則為農戰則為兵未有平處安坐仰衣食于帑廪者也案用兵之法馳車千駟革車千乘帶甲十萬計其財用日費千金故兵貴拙速不以久為巧者懼其屈力殫貨以弊國搔民也故善用兵者役不再籍糧不三載取用于國因糧于敵今自禁衛通于州郡之冗卒不啻百萬恣口而食舒臂而衣數日為期以取賜賚是日有萬金之奉無時休息天下供待安得勿困夫用兵之術考之前世惟唐氏最為無數凡起徒役集藩鎮之兵出于其境則食于度支故驕將悍卒隂相連衡緩師養寇邀寵圗利國力不能給輒罷釋而更厚姑息之然猶師解則費有時而息矣初天寶中廢折衝府立武士帳而兵農始判代德之後內外多難益設禁衛始立名號而有天威神䇿之軍至于有大征討起大徒衆必發諸侯之師故寶應建中國雖多故其所漕引江淮之粟以給關中以供兵食才四十萬斛猶莫登焉今者運于東南輸之太倉十倍唐氏猶常若不逮也京師之民口億萬計太半仰食軍稍之餘故在稻粟之鄉耒耜之民寒耕暑耘常無餘粒中人已下率亡蓋藏強家之儲鮮及新榖罄地之力窮農之功悉卷而西都為兵食故臣數為一蠧為其置之之法與古已異矣然則奈何若夫上不關武備下不耗國財則臣嘗有民兵之説足食足兵不廢訓練則臣嘗有屯田之論儻見採于廊廟之上潤澤而試之不十年而精兵皆在南畞矣然後寬徭薄賦勸農務本損上益下民説必以無疆捨禁去幾國用自當周贍家給人足禮義興行洋洋乎頌聲盛德軼乎三代矣方平又上兵器論曰臣聞鑠金為刃弦木為弧古之聖人以威天下故國之重器厥惟五兵歷代寶之以為神物是以周官六職工居一卿其治兵之工則桃氏為刃函人為甲冶氏為戈戟廬人為殳矛弓人為弓矢人為矢其典兵之官則有司甲司兵司戈盾司弓矢之職掌辨其物受而藏之以待軍事故天有時地有氣材有美工有巧合此四者然後為良夫寒溫異宜隂陽異齊此天時之節也剛柔殊性堅脆殊理此地氣之分也燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也粵之鏄燕之函秦之廬胡之弓車此工之巧者也古者百工之伎必皆世守監長日號戒其不良物勒工名識所精濫而有司乘其事考其器以上下其食而誅賞之是故預備不虞古之善政不忘武備邦之大經臣竊見今諸州郡所上兵物徒有名數實皆濫惡不足為用蓋天下承平長久兵未嘗試上吏視為冗務監長安能盡心選占善工為家治具又州郡率少軍匠借役民工以次姦侵茍求速就及輸上中府而王吏因緣為市惟貨是問閲數而已其為弓也角筋無液治之法故其引之必撓縱其為去也笴羽無深厚之數故其發之必翔俯其為刃也金無煎和之齊安得敝盡而不惡其為函也革無豐約之制安得長圍而便利夫介胄不完士如袒戰器械不精卒猶手搏是以古者兵有三制視人形之大小甲為兩旅權服者之上下故井賦之法車甲各出于丘甸焉若其合軍交和鼓驅而進以命爭命以首爭首而弓折刃卷甲裂鐏敗是乃委人于死地而奪其自救之具也不教民戰尚謂棄之投人于死豈仁之謂管子曰致天下之精材者五而六之九而十之來工三倍不逺千里矣又曰聚天下之精材論百工之鋭器不課不用不試不藏記曰日省月試餼廪稱事所以勸百工也臣謂宜嚴立新條務釐此弊外使州郡守倅通領工作而委提點刑獄總檢之厚匠手之稍食寬日課之役力材取乎精不取乎豐工務乎盡不務乎速器求乎良不求乎多吳殳越戟之利燕弓代革之徑因地之産就民所工設為監司厚價募取則雖田閭之下匠煆之巧一人一藝咸歸官府矣而內選重臣掌其守藏司其頒入凡州郡所上必有試焉工有不當必行其罪如此則府皆善兵國有重備以待武事無誤他時夫害起乎甚微患生乎所忽兹事雖小所繫極大故獻鄙議冀裨冬官氏之闕政焉方平又上民兵論曰臣聞周典因井田而立軍賦稽民數而起兵役約比閭族黨州鄉之法為伍兩卒旅師軍之制乘馬器甲皆隨而具搜苗獮狩因訓練之辨其鼓鐸鐲鐃旗物號名之用教其坐作進退疾徐疏數之節示以號令之信習以陳列之容故其民趨耕則為農起戰則為兵居處同樂死生同憂服容相别音聲相辨自三代至于隋唐兵農之業未離也隋則諸衛領乎鄉團唐則諸府備乎衛士初文皇貞觀中因踵隋制內為十二衛將軍之號外立折衝府都尉之名其府兵分置于畿甸及諸州而名𨽻諸衛天下衛士向六十萬人成丁入籍六十出役每嵗十一月以衛士帳上于兵部以備調發後天下承平漸久武事不修天寶中府兵無復存者遂停折衝府立武士帳而兵農始判矣郡國無備索然虛邑及盜起范陽并河朔獵留鄭衝鞏洛突函潼如踐無人之境焉肅代已降干戈日尋帑藏不足以贍軍士爵位不足以賞勳勞拔用聚斂之臣廣為斂剝之計生民膏血滴瀝亡餘悍將驕兵未厭所欲而跋扈藩鎮之帥睥睨朝廷之隙招置亡命募集姦凶至乃撫息詬濡育為假子取其爪牙之效為厥子孫之謀故大歷中李正已擁青兖十五州之地養兵十萬李寶臣據趙冀七州之地養兵五萬田承嗣有魏博七州之地養兵五萬梁崇義有襄鄧六州之地養衆二萬皆因叛亂得位各擅土宇盤根結固輔車相依上不供乎職貢下竭盡乎民力以奉軍給各圖自固時李抱貞觀察澤潞當山東之兵衝土塉賦重人皆困匱無以贍軍抱真乃籍户丁男三選其一有材力者免其租徭給弓矢令之曰農之隙則分曹角射嵗終會而校焉及期按簿集試示以賞罰比三年則皆善射抱真曰軍可用矣于是舉部內之鄉得成卒二萬前既不費廪給府庫益實乃繕甲兵為戰具遂雄視山東時稱昭義步兵冠天下于時朱滔在薊李納反鄆武俊亂趙田恱擾魏乘纍世之巢穴為藏姦之淵藪相為影援合勢同率然而上黨孤軍獨稱忠義奮擊河朔傑賊憚走由是觀之蓋養卒要乎姑息民兵可以訓練姑息之卒難用訓練之兵易使也我太宗之北征也亦嘗制為鄉軍之法獨取乎三晉之民而得十萬之衆是時北鄙繹騷國兵再衄義軍奮拒號為強鋭夫界邉之郡民多習鬬結曹分伍挽強拔距裹糧淬刃惟敵是求習其川原識其形勢以戰則力以守則固不食廪粟不衣藏帛不邀上賞不利寵名郡縣相維聚落相護鄰里相任刑罰相及故民兵之與營卒利害常百倍也伏願逺採周唐之法近考太宗之制謹修民政寓行軍令若夫十鄉之縣鄉之户千為户一萬老者疾者鰥寡孤獨困窮無告者去其半存者為户五千貴者賢者能者服公事者去其半餘得一師五縣之州為一軍諸郡縣之大小視其民之衆寡設為團隊理如軍法嵗終農事之隙縣大夫親誓其衆頒官府之鼓鐸旗物兵器教習其坐起驟趨擊刺之法州長巡行部縣察其精慢而誅賞之農事既興命歸鼓鐸旗物兵器于官府各使執事于田如此則兵農之勢再合營聚之軍可省國用必積民力必寬臣竊見今之郡縣非邉戍之地者郡卒才足給徭役縣直不足供追捕聚無完纍兵無繕器數夫攘臂勢且奔擾百人譟突立可潰亂且秦之顛也以陳項漢之危也以黃巾唐之覆也以巢寇此皆烏合于倉卒計非其素定無決全之算非訓練之鋭奮梃為戟揭竿為旗而躒郡夷都如摧枯破竹瓦解土散瀰漫莫遏雖乘朝之有釁抑由郡縣之無備也今民兵誠設搜練以時戰士服于田疇部伍存于軍籍兵仗貯于官府粟帛實于帑庾寬其苛斂復其他徭調發立集事平隨散外則郡國武備得常訓整內則禁衛驕兵可漸消減雖戎虜有冒頓之雄叛將有蚩尤之強匪民有勝廣之姦且亦不能自外而起變矣顧議者以為何如方平又上論曰臣聞善為國者不師善師者不戰善戰者不敗若夫文德修于兩階聲教被乎八垠兆庶懷仁愛之如父母夷狄慕義親之若君師愷悌之化行暴亂之端戢是謂善為國者不師帷幄之中几筵之上指顧之際得失起焉蘖折其牙厲平其階其為理也有不可亂之勢其為備也有不可犯之形此謂善師者不戰合軍聚衆交和而舍將誠勇智衆誠精練天地誠得法令誠信而我之廟算必勝矣此謂善戰者不敗雖然兵者死地而戰危事也故昔之為國者先為不可勝以待敵之可勝不可勝在我可勝在敵故為國者能為不可勝不能使敵之必可勝不可勝者備也可勝者戰也故曰善用兵者無智名無勇功備于無形䇿于無聲攻其心于未合伐其謀于未成故不待交綏而敵已屈夫如是又何智名勇功之有乎易曰重門擊柝以待暴客蓋取諸豫又況宅天下之大而可以忘武備乎故預備不虞古之善政不教民戰是謂棄之昔周氏因提封之地立乘馬之法天子六軍兵車萬乘比年簡車三年簡徒五年大簡車徒春振旅以搜夏茇舍以苖秋治兵以獮冬大閲以狩皆于農隙以講事焉漢制京師則有兩軍七校郡國則有材官樓船皆嵗時𨽻習武事未嘗廢也後晉武帝既定吳會講武于宣武場時山濤與盧欽論用兵之本以為不宜去州縣武備帝雖稱善而不能用永嘉之後寇難蜂起方郡皆以無備不能制天下遂成戰國至隋文平陳始通王統內置十二衛棲功臣于散地外分折衝府備兵籍于調發唐因其制凡三百七十四府散于諸州而名𨽻諸衛後承平漸久中國安寧于是逃者不捕亡者不補衛士無實籍衛將為虛名至天寶中遂停折衝府而幽陵之師堂堂焉在咸鎬之郊矣于後章武削平郡盜恢復兩河而植頴無成務之才旋致判渙昌俯建銷兵之術更取孤危本弱末強漸成顛拔強藩內侮王室其頽今我治朝丕迪皇道海寰一統神旗無指伐之行邊境稱和齋鉞息受成之命化平治定三紀于兹是以衣冠搢紳不道軍旅之事貔貅士卒罔知戰陳之容天下安于隆平郡國頗以無備夫天生五材民並用之廢一不可誰能去兵故兵可無用不可無備善師不戰備之謂也故國之大事在祀與戎政之本經惟文與武禮樂制度文之施也禁暴戢亂武之用也今朝廷所言大事必曰軍國是知兵者時之大務邦之重柄臣陋愚諸生不達兵事今所論著皆參校前史舊迹得失之狀可施于今者冀上贊廟堂之餘論焉八年右司諫錢彥逺上奏曰臣伏以今天下兵卒最為冗多較于祖宗三朝數增十倍然皆老弱羸怯混淆其間堪戰精鋭百才三四而國家竭民力以贍之日困一日何以取濟其已在軍籍者誠未可立行措置求折衷之策則莫若窒其源本欲乞天下除禁軍已有指揮住招填外餘諸路本城不係披帶諸軍且未得招填其有名額空存而人數不滿一百者並撥併入本州諸軍及遇㨂選半糧剩員之時並委自逐州當職官吏審驗六十五上如堪執役即且存留七十以上一例放停不得竊主恩而為已惠收小人之妄譽所有在京除見幹當職事文武官吏合依敕破兵士當直外並不得妄作名目占留陳乞在他幹當見有者仰逐處一面抽下其本城諸軍候及三年逐州具計減得多少人數今來約令留多少人數申奏委大臣議定經久措置所貴軍政益修國財稍給禁軍若久不招填又恐不可乞以即今見在為額轉旋揀去老弱者招少壯者填之皇祐四年河北都轉運使包拯請那移河北兵馬疏曰臣聞屯兵備邉古今常制所患民賦有限兵食不充必須廣為經度以給用度或嵗有凶歉或寇至益兵則暴斂橫取何所不至民既困矣敵何禦焉此亦必然之事也河北自失山後六州之險無以固守則蓄兵積粟常患不足只如頃年敵忽生變雖復請和終非經久之計兼沿邉沃壤又盡為陂塘租稅既無所入皆仰給縣官雖竭天下之財以贍一隅當無事之時日常窘迫無數嵗之備若少有屯集如何求濟豈可坐觀其敝而不務救之之䇿哉欲望聖慈特出宸斷宣諭執政大臣應沿邉及近裏州軍兵馬除合留防守外其屯駐駐泊諸軍或令歸營就糧諸軍即分屯于河南兖鄆齊濮曹濟等諸州況逐處地利富實糧儲易致率三年一代遇有警急即時起發不旬日可到豈有後期不及者耶且前代防邉之兵三時務農一時教戰公私自足未有冗而且衆坐糜廪食虛困疲民如今之甚者然執干戈禦戎狄固不可闕在養之教之得其宜則上下無困乏之患緩急用之則沛有餘力矣議者若以戎兵不可全減即有往年義勇強壯十八萬餘人以充其數緣河朔之民稟性徑悍生習邉鄙之利害素請敵人之情偽校之南兵絶為精鋭一則不費供饋二則羣情樂為其訓練之法則有舊制存焉若謂兵食粗足鄰好方堅趣過目前以為成算憚于更張措置臣恐日削月朘中外益以殫竭一旦用武即暴加重斂民心怨叛則肘腋之下皆為仇怨豈暇禦外寇哉此國家根本之患若不表裏協心鋭意而速圖之臨事無及矣惟聖慮財擇不任懇迫之至仁宗時拯又奏曰臣聞京師者天下之本也王畿之內列營屯衆此強本之兵也而國家近年以來邉陲有警乃一例調發則衛兵日削恐非固宗社制戎狄之長䇿也臣以為畿兵雖有大故不可多調發前所謂京師者天下之本也強本者畿兵耳本固且強繇中制外則天下何患焉若調發不已則耗其財力而弱其根本不惟隳祖宗之制獨不念李唐天寶建中之事乎善馬精兵悉出于外扈衛驍鋭為之一空卒以重其後害此朝廷尤宜深慮也今河北河東沿邉兵寡財匱卒有急難惟有民兵可用往年嘗籍之矣籍之未甚長策又從而釋之緣河朔之民皆稟氣徑悍飬勇奮發矧又生習邉鄙之利害素諳敵人之情偽他路校之不逮逺矣且向時點閲捨客取主又責以户之上下以是籍之所得幾向竊見唐李抱真民兵之制事頗相近故當時招義一軍雄視山東將適今之宜可如抱真之制約而行之不以户下田足田不足悉以丁力衆寡登降其數而籍之不及數者即捨之取其中稍富實者令差出榖帛錢貨以給籍丁之貧家如此得兵可倍往嵗亦可以少抑兼并而貧悴之户有所仰矣一則供饋不費二則群情樂為其處置訓練之法即有祖宗之舊制焉河朔民兵既壯而禁軍留實京師則內外安矣今北敵詭詐萬狀聲言西討修築城柵點集軍馬乘此之際沿邉亦宜密令繕完而議者但恃盟約殊不設備萬一邀求不已稍不如意伺釁而發曷以禦之此亦必然之兆得無熟思乎況邉上武將未甚得人且將者人之司命而邦國安危所繫擇之不可不審審將之道不當限以名位但辨其能之可否茍得實材則擢而用之專而委之必有成功若不素為之具緩急旋圖之則無所及矣伏望陛下少留聖意特賜省察拯又請添河北入中糧草臣伏讀前漢趙充國傳充國謂大司農耿夀昌曰于金城湟中糴榖三百萬斛羌人不敢動矣夀昌請糴百萬斛乃得四十萬一失此䇿羌人故為逆失之毫釐差之千里事既然矣若四夷猝有動搖相因而起雖有智者不能善其後也是知糧儲有備則邉患不足恤矣臣竊見河北沿邉州郡軍糧未備屯兵少處約及二年如定州屯兵稍衆只及一年有餘況中山最是控扼之所若非次添屯軍馬不支數月緩急如何取濟雖朝廷財用窘迫力所未及然河朔根本之地自黠敵講好觀釁而動詭詐萬狀固不可信其虛聲怠其實備孫子曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也今若計度糧草處置邉事且循舊制不務施為臣恐日甚一日有不可救之患矣故曰金城湯池帶甲百萬非粟不能守可不熟慮乎欲望聖慈特降指揮令三司應河北沿邉州軍且令依舊入中若以倍費官錢即乞支撥見錢百萬貫趂今夏二麥豐熟之際于近便處及時收糴却自御河輦運往沿邉州軍以實儲廪比之貴價入中其利甚厚仍乞速賜指揮施行皇祐元年侍御史知雜事何郯上奏曰臣伏見陜西路頃嵗邉鄙用兵之際朝廷指揮以諸州新弓手刺面充保捷指揮用備戰守一路之兵僅增十萬緣當時倉卒不暇精擇其間甚有疲弱不堪征役之人驅之行陳固難得力自休兵至今嵗月已久尚未聞一加選汰所費廪食不可勝計況其人並是郡縣等第之家係在軍籍甚非所願伏望敕本路諸州令告諭應係新置保捷兵士除人員節級外其餘年五十以上及短小不及等之人如願不在軍者許令自陳委監司長吏相度減放歸農此等久習武藝今若放歸亦須置籍拘管仍乞以所居鄉社相近處如河北義勇團作指揮置人貟節級管轄其邉郡每以此軍畨遞防守處亦令比舊減數非特邉上或有警急其罷放之人尚可追集守城却代精兵出戰于事又無廢缺方今財力大屈所患在于冗兵竭天下所出之物僅能供應陛下幸聽臣言特行處置一路之內可減三數萬人乃亦省費之一端近包拯被命往陜西制置解鹽伏乞下臣此議使其就近覆驗所冀審擇利害然後施行五年御史中丞孫抃上奏曰臣伏見兵家征行守禦之法其所用士旅以知人情者為先熟地里者次之諳土風者又次之何則知人情則強弱先辨熟地里則險易先知諳土風則寒暖先備故臨事也便而取效也速是以所安者平原易地置之險阻則懼矣所習者大陵髙阜移之溪澗則危矣古聖賢確論皆然國朝有天下所置州郡必招置本土人充軍或三兩指揮名額各異比年以來逐處凡有緩急此等人號為得力非他知人情熟地里諳土風故也然而軍數寡少月給微薄防托之際事功難集臣欲乞應沿邉州郡密邇蕃夷部落溪澗去處元有本土軍分者望朝廷相度稍益其數目量增其請受以時而練習之一則團結部伍漸成次第鄰近蕃夷寇賊不敢作過二則衣糧差足可以收其盡瘁之報至和二年知諫院范鎮上奏曰臣比奉使河北伏見河北連嵗招兵未已皆是坊市無賴及隴畝田力之人冒為軍營子弟誠是軍營子弟則今日詔下明日便當投牒豈有及今一年尚未盡至其為坊市無賴隴畝力田之人明矣況今田甚曠民甚稀賦役甚重國用甚不足所以然者正由兵多也先朝用兵時兵才四十餘萬今不用兵而兵已倍之臣不知大臣以何見而為此議也必以為備契丹也今塘水東西三百餘里多于先朝也嵗豫金繒五十萬禮聘又十餘萬亦多于先朝也以多于先朝之塘水多于先朝之金繒以備契丹而與之和也宜省兵以息民而益多兵以困民者臣所以深惑也契丹自知顧塘水之限貪金繒之利而不敢動者五十年于今矣方契丹貪利而不敢動之時其民宜富貴而反日以困國用宜饒足而反日以蹙此無他兵多而民稀田曠與賦役重也使契丹而有一日之警將何以繼之哉大臣終不知念此而但以多兵為有備此臣所以深惑也今契丹五十年不敢南入為寇者貪金繒之利厚也就使棄利為寇則大河以北婦人女子皆是乘城之人其坊市無賴隴畒力田者又將焉往況契丹貪利而不敢動而預畜養之以困斯民乎夫取兵于民則民稀民稀則田曠田曠則賦役重賦役重則民心離寓兵于民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固與其離民之心以備契丹契丹未至而民力已先困國用已先匱孰若固民之心以備契丹契丹雖至而民力有餘國用有備其利害若視白黑若數一二大臣以為難者臣所以深惑昔漢武兵困天下者用兵以征胸奴也欲以得所欲也今陛下以兵困天下者不用兵以至是也非以快所欲也何苦而為是乎五口一家尚知量入以為出況天下大計其可以不校出入其可以無經制乎臣伏見今之世有失入徒罪若流若死者陛下必加罪有司其在選人必加停殿後雖用之不得遷改此所以見陛下恤民之心至矣今大臣舉天下之民而困之豈特失入徒流死罪之比而陛下略不加問是捨所大而急所細也臣愚豈得默焉陛下誠能罷今招兵敕大臣使具太祖時賦入若干兵若干官若干太宗時賦入若干兵若干官若干真宗時賦入若干兵若干官若干陛下天聖中賦入若干兵若干官若干約今賦入之數兵數官數酌取中道立為經制以賦入之數十分為率以七分給郊廟宫省諸費三分留備水旱及緩急非常為之十年僅可以言治古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄則國非其國今自京師至天下州郡大率無二年之蓄邉城甚者或三數月耳不幸有連二年之水旱將何以飬此兵乎此兵不足以飬則其憂不在契丹也此臣所謂言責也陛下所宜留念大臣所宜盡心悉力之時也伏乞下臣章中書樞密大臣并臣前奏看詳若不以臣非才而信用其言先罷招兵然後量今天下賦入以為國用使上下寬裕非獨臣之幸也乃天下之幸也鎮又論益兵奏曰臣去嵗八月言方今官冗兵多民力不堪乞下中書樞密大臣條理究行及今纍月不報退自伏念當世之務莫急于此而大臣恬然不以為怪此臣區區不得隱默而再以冒聞也夫慮之有素為之有備事至而應則安靜而詳實慮之無素為之無備事至而應則倉猝而乖牾大抵近事多失于倉猝而不安靜者慮之不先而備之不豫也前日契丹使至虛言紛紛朝廷自顧國用之不足民力之凋弊無以待之也大臣不知計之所從于是乎募兵以自塞責是何異欲救火而益以薪流之濁而復撓其源也景德中契丹內寇靈夏不臣是時兵不滿五十萬西備北禦沛然有餘今兵倍之矣而尚苦不足者臣不識所謂也敵才遣一介之使至而增益者又數萬及其去也中外相慶謂為無事殊不知新兵之費嵗增已百萬貫矣百萬貫之費非出于天非出于地非出于建議者之家一出于民也方今愁苦之時又重賦之以為備預計者未見其可也此所謂倉猝而乖牾也夫兵不在衆在練之與將何如耳去年儂智髙寇嶺南前後遣將不知幾輩遣兵不知幾萬亡死奔北不可勝紀陛下親遣狄青然而卒能取勝者蕃落數百騎爾此兵不在衆近事之效也陛下何不持此説以詰大臣之欲益兵者臣愚以為備契丹莫若寬河北河東之民備靈夏莫若寬關陜之民備雲南莫若寬兩川湖嶺之民備天下莫若寬天下之民民力寬則知自愛知自愛則雖有外虞人人可用為兵用人人自愛之兵以禦外虞何往而不克何征而不服哉古人所謂猶手臂之捍頭目子弟之衛父兄者用此兵也臣所謂慮之有素為之有備者此也今夫官所以養民者也兵所以衛民者也養民衛民者反殘民矣而大臣不知救臣恐朝廷之憂不在四夷而在冗兵與窮民也近年以來地數震動河不軌道日月星辰謫見于天皆民怨之感也伏乞陛下明敕大臣求今所以息民之術以應天地之變而為宗廟社稷計臣不勝大願愚直之罪伏惟裁赦鎮又論河北河東兵奏曰臣竊聞契丹新立其叔領兵盤桓山後召不肯赴深恐邉臣緣此張皇更請益兵今河東養兵三十餘萬五十年矣又益以義勇三十萬是常有六十萬兵積于兩路正為緩急非常而塞下每一小警即奏疏旁午以搖朝廷者亦五十年矣廟堂議臣邉鄙謀將中外狃習安為故常所以兵益多糧益匱民力益困國用益不足而不知所以營救此臣懇懇而不能已也今義勇三十萬為稍近古禁軍三十餘萬皆仰縣官就三十餘萬中皆半老弱怯懦老弱怯懦之人遇敵則先自敗亡非獨先自敗亡適所以為驍壯之纍是驍壯者不可不柬練而老弱怯懦者不可不抑去也老弱怯懦不抑去則費廣費廣則民罷民罷則不自愛養治兵以衛不自愛之民臣恐朝廷之憂不在塞外而在塞內也臣竊計慮契丹新主嗣立遂定則與故主無殊盟好亦必堅久就使其叔爭立國中有變待蕃漢懷服其勢不五七年不得平定朝廷乘五七年之間懲前之失謀柬練驍壯抑去老弱怯懦使民力得紓國用得饒以待寇至必勝之道也古人請三萬兵橫行胸奴中今以六十萬衆重之以髙城深池惴惴然常恐不足者殆將相不任責也陛下誠能專責將相委以經略非特邉鄙無事將見天下得復太平也臣前所上兵民事伏惟敕大臣平章如不以臣愚而廢其言必有萬一之補歷代名臣奏議卷二百十九
