body:
  text: 歷代名臣奏議卷二百三十眀楊士竒等撰征伐宋太祖乾德元年侍中平章事范質諫伐河東奏曰臣氣疾發動近將兩月不面天顔攀戀聖慈深負憂責臣今有芻蕘上聞睿聽內量僭越甘伏罪譴後來臣雖疾病在假便聞陛下有親征河東之意半月以來顯然外議皆云必行固無改易臣切料河東劉鈞自潞州奔敗之後乃數年遭天軍討蕩即日困蹙兼肘腋之間自有翻變契丹削弱不能援助鑾輿若到城下攻取少時必是成功然須十分之中七八分則料其必取三二分料其未得者何若大軍三數月間在賊城下料草不接即須抽退雖無損軍勢且虛困自家一二十州百姓枉費朝廷事力近聞般運糧草才第一轉所在鄉村甚有逃户蓋是晉絳蒲陜汝洛懷孟及沿山諸州人民頻年以來秋夏不熟陛下八年令免供輸尚自逃走若是更有差遣自然難為駐足百姓般運艱難更不一一敷陳又聞所般運糧草且至潞府晉州將來又駕到河東城下三五十萬糧草潞府晉州百姓無多不知更差何人津置此事須挂宸衷請陛下子細勘算軍馬糧草準備之數必若有備則更復何憂臣竊見七八處大藩方皆要害之處即日並未有主帥皆是儒士懦弱權輕力小若是四方無事之時大駕不離京闕則必無憂慮若是兵戈稍動烽煙未弭之間須憂凶豪不逞之徒生心冀望緣此輩無識無知不算道理遇便即發視死如間萬一有之陛下出軍在外爭得安心中間世宗親征河東之時近畿小小兵士亦有姦謀者賴尉氏兵馬監押擒獲事雖不大人心可知願陛下稍挂宸衷臣切見河東物力軍勢百倍不及大朝窮困危迫日憂亡滅乃是本分朝廷強盛軍馬天下無敵北至燕東至海南至五嶺西至隴右百六七十州之地無不懾服陛下即位四年有此基址以前開基創業之主三五十年尚未如此又何必須為河東六七州險阻窮困之地虛躁聖懷更俟三二年時歲稍熟收拾糧草諸事有備賊界漸困此時動未為遲晚臣切料河東六七州孤危如是不計幾時必無霸盛且劉崇乘世宗即位之初假契丹雄盛之力全軍南來一戰大敗將校軍士十分去九此天不助一也陛下初有天下李筠以方州之地歸投河東陛下才登太行立平寇賊劉鈞愴忙奔走不暇拋棄兵刃甚於髙平此天不助者二也天意人事不言可知即日尸居餘氣茍乃嵗月之命必無與大朝爭衡願陛下以生靈為念所貴資洪福益聖夀以社稷為重端坐鎮靜不輕舉動則天下幸甚臣位居上相受國深恩國家大事動繫安危茍或不言是辜天地惟陛下詳察開寶二年太祖親征太原夜半傳呼壁外劉繼元降太祖令衛士擐甲將開壁門八作使趙璲曰受降如受敵詎可中夜輕出太祖使伺之果諜者也太常博士李光贊上言曰臣竊惟陛下應天順人體元御極戰無不勝謀無不臧四方恃險之邦僭竊帝王之號者昔日與中國為鄰今日與陛下為臣蠢爾晉陽豈須親討重勞飛挽結怨黔黎況天之命天子也猶父之任子也其或不由父命奪我以時則必有非常之災陛下豈不畏天命乎且大原得之未足為多失之未足為少國家貴靜天道惡盈所慮向來恃險之邦近日歸眀之國聞是役也竭府庫之財盡生民之力其心踴躍各有覬覦傳曰鄰之厚君之薄也豈若回鑾浚都屯兵上黨使夏取其麥秋取其禾既寬力役之勞便是蕩平之䇿惟陛下裁之況時屬炎蒸候當暑雨儻或河津泛溢道路艱阻輦運稽遲恐勞宸慮太宗太平興國四年始議伐太原宰相薛居正曰昔周世宗舉兵太原倚契丹之援堅壁不戰以至師老而歸及太祖破契丹於雁門關南盡驅其民分布河洛之間雖巢穴尚存危困已甚得之不足以闢土舍之不足以為患願陛下熟慮之太宗曰今者事同而勢異彼弱而我強昔先帝破契丹徙其人而空其地者正為今日事也朕計決矣卿勿復言五年翰林學士李昉諌北征奏曰臣等竊以北敵微么自古為寇乘時犯塞往往有之一昨輒率其衆來擾疆埸陛下櫛風沐雨衝冒嚴凝親御戎衣以攘民患蠢兹醜類畏威而逃因而翦之易於拉朽況幽薊之壤久陷匪人慕化之心倒垂斯切今若擁百萬橫行之衆弔一方徯后之民合勢而攻指期可定其如大兵所聚轉餉是資且河朔之區連嵗飛挽近經蹂踐尤極蕭然雖洊偶於豐穰恐不堪其調發屬兹寒冽益復罷勞況今敵騎宵奔邉陲寧肅若親巡塞下震耀威容固是懼彼殘妖亦恐勞於大舉伏望申戒羽衛旋斾京都善飬驍雄精加訓練嚴勑邉郡廣積軍儲講習武經繕修攻具俟府藏之充溢洎閭里之富全期嵗之間用師未晚雍熙三年參知政事李至諌親征奏曰臣伏以幽州早陷敵塵久隔皇化方屬混同之運獨為叛渙之方國家士馬精強戈甲犀利府庫羡饒厫粟紅腐以陛下文武雄略聖謨天討雖太山壓卵烈火燎毛未足以喻其易也然而兵者凶器戰者危事用之之理必務萬全且幽陵之邦敵之右臂王師既擊彼必拒張攻城之人不下數萬兵多費廣必須大備糇糧假一日剋平必作十旬準擬未知邉庾可充此乎又敵城之傍坦無陵阜去山既逺取石尤難金湯之堅非石莫碎未知飛炮之用將安得乎儻有闕如臣願陛下且務繕修更資訓練蓄威以飬鋭觀釁以伐謀縱涉嵗年未為稽晚所冀長鯨之戮斷在不疑封豕之誅義無再舉必也聖心獨斷睿算已成則京師天下之根本願陛下不離京闕恭守宗廟示敵人以間暇慰億兆之衆多䇿之上也大名河朔之咽喉或暫駐鑾輿揚聲自將以張兵勢壯軍威䇿之中也至於逺提師旅親幸邉陲北則戎援可虞南則中原可慮則曵裾之懇切斷鞅之狂愚臣雖不才亦恥在二賢之後也武勝軍節度使趙普乞班師奏曰臣自二月中伏覩忽降使臣差般糧草及詳敕命知取幽州既奉指揮尋行科配非時舉動莫測因由爾後雖聽捷音未聞成事稍稽剋復俄及炎蒸飛芻挽粟以猶繁擐甲持戈而未已民疲師老漸恐有之臣自此月以來轉增疑慮潛思陛下萬機在念百姓為心聖略神功舉無遺算至于平取浙右力取河東垂後代之英竒雪前朝之憤氣四海咸歸於掌握十年將致于雍熙唯彼蕃戎豈吾敵對蓋遷徙無常自古難得制之前代聖帝眀王無不置於化外任其隨逐水草皆以覆載容之此際官家何消挂意必是有人扶同諂佞誑惑聰明因興不急之兵稍涉無名之議非論曲直且覺淹延將成六月之征頻有千金之費以此忖度深抱憂虞竊念臣雖寡智謀粗親墳典千古興亡之理得自簡編百王善惡之由聞於經史其間禍淫福善莫不如影隨形煥若丹青眀如日月常為大訓歷代寶之臣讀史記見漢武帝時主父偃徐樂嚴安輩所上長書及唐明皇時宰相姚元崇直奏十事可以坐鎮患害立致升平唯慮至尊未能留意醫時救弊無出於斯又聞前事為後事之師古人為今人之則據其年代雖則不同量彼是非必然無異輒思抄録專具奏呈伏望聖慈特垂披覽伏念臣謬以庸材叨居顯位幸偶千年之運深承二聖之知從白屋而上青霄非由智略出卑寮而登極品只是遭逢恩私何啻於豚魚報荷不知於犬馬粗懷性識常積兢皇所恨者齒髮衰殘精神減耗既不能獻謀闕下又不能效命軍前唯有微誠書章上奏今者伏自朝廷大興禁旅逺伐山戎驅百萬之生靈咸當輦運致數州之土地半失耕桑則何異為鼷鼠而發機持明珠而彈雀所得者少所失者多只於得少之中猶難入手更向失多之外别有關心全未見於便宜可重興於詳酌臣又聞聖人不凝滯於物見可而進知難而退理貴變通情無拘執故前書所謂事苦則慮易兵久則變生臣之愚誠深懼於此秦始皇之拒諫終纍子孫漢武帝之回心轉延宗社若或遲晚恐失機宜而況旬朔之間便為七月切慮內地先困邉庭早涼北敵則弓硬馬肥漸難擒制中國則民疲師老應悮指平臣今獨興沮衆之言深負彌天之過輒陳狂瞽抑有其由竊以臣暮景殘光能餘幾日酬恩報義正在今時恐勞宵旰之憂寧避僭踰之罪虔希聖聽早議抽軍聊為一縱之謀别有萬全之䇿伏望皇帝陛下安和寢膳惠飬疲羸長令外户不扄永使邉烽罷警自然殊方慕化率土歸仁既四夷以來王料契丹而焉往又何必勞民動衆賣犢買刀有道之事易行無為之功最大如期弔伐是為萬全臣又竊料陛下非次興兵恐因偏聽其奈人多獻佞事失防微大凡小人難保始終但務身謀誰思國計或承宣問皆不實言盡解欺君寧憂敗事得之則姦邪為利失之則社稷懷憂昨者直取幽州未審誰為謀者必無成算俱是狂言其於虛實之間此際總應彰露臣緣不知頭主無以指射姓名伏望官家尋其尤者特正姦人之罪免傷聖主之明所貴詐偽悛心忠良盡力共畏三千之法同堅八百之基臣此時欲吐肺肝先寒毛髮驚疑猶豫數日沈思往哲臨終尚能尸諌微臣未死爭忍面諛眀知逆耳之言不是全身之計但緣恩由卵翼命直鴻毛將酬國士之知豈比衆人圖報投荒棄市甘當此日之誅竊祿偷安不造來生之業唯祈明聖特賜察量更有細微别具劄子條奏冒犯旒冕臣無任傾心瀝懇憂國忘家涕泗倣皇激功屏營之至一臣以濫守藩方聊知稼穡見當州界承前多是荒涼户少民貧程遙路僻量其境土五縣中四縣居山驗彼人家三分內二分是客昨來差配甚覺艱辛伏緣在此直至莫州來往四千餘里或是無丁有稅須至雇人般糧每斗雇召之資賤者不下五百元配二萬石數約破十萬貫錢直如本戶自行費用無多所較乃是二萬家之貧戶出此十萬貫之見緡所以典桑賣牛十間六七其間兼有鬻男女者亦有棄性命者仍如善誘偶赴嚴期自從起發去來已及二十餘日近知內有人户衷私却到鄉村皆云裝起軍糧未有送納去處緣無口食再取盤纏既莫辨其真虛又難行於考覆訪問街坊竊議前後説得多般稱彼契丹圍却軍都兼被劫却糧草及令尋勘皆却隱藏蓋緣臣無以知軍前事宜只聽得外靣消息況九重嚴密事應不泄於朝廷奈百姓流言已相傳於道路詳其住滯必有艱難伏望聖慈早令停罷更或遲久轉費糧儲潛思今日人情不可再行差配如或再行徭役決定廣有逃移假令收下幽州轉慮干戈未恩忽然生事未見理長必因潛濫之徒姦邪之黨但説契丹時逢暗主地有災星以此為詞曲中聖旨殊不知蕃戎上下幽州俱置生涯土宿照臨外處不可征討若彼能同衆意縱幼主以難輕不順羣情無災星而亦敗誠宜守道事貴無私如樂禍以貪功慮得之而不武此蓋兩省少昌言之士憲臺無有勢之人而況補闕拾遺合專思於規諌天文歷算須預定於吉凶成兹誤失之由各負疏遺之罪若無懲誡何戒後來一臣緣久居近職備見人情至於後殿三班前朝百辟文武雖異是非略同才奉委差便思僥幸難詢利害各避嫌疑而況毁譽生心貪求恣意狀同誑妄率以為常其間久歷事者眀知而佯作不知初為官者不會而仍兼詐會多非當實少得純良而又凡關宣敕委差便是帝王心腹方資視聽切要精詳就中用軍不同間事必料曽使沿邉相度往彼參詳不知能有幾人應得當時言語如今比較並見直虛乞誅罔上之輩流便作抽軍之題目自此則潛銷媚佞免誤朝廷唯此區分以為激勸一唯有勾抽不同舉發一則我無鬭志一則彼有讎心而況契丹懷猛獸之情恃健馬之力乘兹恕捨即慮追奔須作過防免輸姦便伏乞皇帝陛下密授成算遐宣睿謀但令硬弩長槍周施禦捍前歌後舞小作程塗縱遇交鋒何憂乏力只應信宿尋逺城池便可使戰士解鞍且作防邉之旅耕夫歸舍重為樂業之人是多難興王已垂芳於往昔從諫則聖宜頌美於當今此事施行天下幸甚一臣今將本末細具敷陳常思發迹之由實有殊常之幸其於際會近代無倫伏自宣祖皇帝滁州不安之時臣蒙召入卧內昭憲太后在宅寢疾之日陛下喚至床前念以傾心皆曽執手溫存撫諭不異家人唯懷竭節輸忠以至變家為國慙虧德望有以遭逢先皇開創之初尋居密地陛下纂承之日將入中書蒙二聖之深知當兩朝之大用不唯此世應係前生禮雖限於君臣恩實同於骨肉是以凡關啓沃罔避危亡蓋緣每思陛下本是天人暫來塵世是以生知福業性稟仁慈潛聞內裏看經盤中戒肉今者願忍一朝之忿常隆萬劫之因如或未止干戈必恐漸多殺害即目民愁未定戰勢方搖仍於夢幻之中大作煩勞之事是何微類誤我至尊乞明驗於姦人情不容於首惡興言及此涕淚交流又念臣雖寡智謀實同榮辱都緣意切不覺詞繁冒犯宸嚴不勝戰越淳化初帝遣使至定州密諭觀察使李繼隆若契丹復入寇朕當親討繼隆上奏曰自北邉肆孽邉邑多虞陛下不知臣不材任以疆事臣敢不講求軍實震耀戎容奉揚天聲以遏外侮然臣奉辭之日曽瀝愚衷誠以蜂蟻之妖必就鯨鯢之戮臣子之分死生以之望不議於親巡庶靡勞於天步今聆聖誨將決親征且一人既行百司景從次舍驅馳郡縣供饋勞費滋甚殄此微妖當責將帥臣雖駑弱誓死為期是歲契丹不入邉議遂止淳化中吕蒙正入相因對論及征伐上曰朕比來征討蓋為民除暴茍好功黷武則天下之人熸亡盡矣蒙正對曰隋唐數十年中四征遼碣人不堪命煬帝全軍陷沒太宗自運土木攻城如此卒無所濟且治國之要在內修政事則逺人來歸自致安靜上韙之真宗咸平四年張齊賢乞進兵解靈州之危奏曰臣伏見遷賊包藏凶逆招納叛亡建立州城創置軍額有歸明歸順之號務且耕且種之基仍聞潛設中官全異羌夷之體曲延儒士漸行中國之風覩此作為志實非小況靈州自遷賊為逆以來危困殊甚五鎮連陷姦威益張道路阻難音耗逮絶當城鎮堅全之日磧路未梗之時大凡中外常人言合棄者已衆矧清逺軍近遭攻陷青岡寨輒自焚燒兵勢人心傷沮數倍即今來所議棄者甚多靈州斗絶一隅旁無援助南去鎮戎約五百餘里東去環州僅六七日程如此畏途不須攻奪則城中之民何由出城中之兵何以歸欲全軍民理須應援少發兵則復虞邀劫多發兵則廣費資糧與其應援以出兵曷若用竒而取勝小勝則軍民可出大勝則形勝復全匪惟禽討之有方抑亦進退而獲利與其虛勞甲卒枉殺齊民示弱稔姦萬萬相逺也果能更益精兵合西邉見屯田卒雜以對替之衆使其兵力有餘量分師徒與原渭鎮戎合彼中與山西熟户從東亦擇穩便處入界若嚴約師期兩路齊進茍或繼遷敢來援助彼則分兵而應敵我則乘勢而易攻且奔命道途首尾難衛千里趨利不遁則禽臣謂兵鋒未交靈州之危自解矣因取靈州軍民置於蕭關武延以來據險就水建立一寨僑置靈州羈係蕃漢土人之心裁候平寧却歸然後縱蕃漢之兵伺便奮擊我則按重兵而觀利度賊勢以設謀臣謂破賊成功十有八九矣五年侍御史知雜事田錫論輕用兵奏曰臣竊惟國家斷徒以上罪皆須勘鞫子細案牘圓備斷官録問然後行刑其大辟罪將決斷即給與酒食命他官監決慮有稱寃及斷訖即録案申奏奏下大理寺寺司點檢送至審刑院院吏披詳如案未圓理未盡即罪有司所謂王者之心重用刑而惜人命也及至北部騷邉西戎犯境不先計而後出兵不先謀而後決戰失利則士卒陷歿者既多人民俘虜者不少不知斷徒以上罪至用刑於大辟一何用心精密之如彼而不先計而後出兵不先謀而後決戰致陷歿士卒者衆俘虜人民者多一何用心粗疏之如此用心精密之如彼者是帝王重人命也用心粗踈之如此者由將帥輕人命也州郡戮一死罪不當即罪州郡大理寺審刑院點檢披詳漏落各罪官吏洎至士卒陷歿人民俘虜則宰相不過罷免歸班為尚書將帥不過黜降其官為庶人此乃朝廷用刑輕重之相逺也景德元年契丹大入急書一夕凡五至兵部侍郎同平章事寇準不發飲笑自如明日同列以聞帝大駭以問準準曰陛下欲了此不過五日爾因請帝幸澶州同列懼欲退準止之令候駕起帝難之欲還內準曰陛下入則臣不得見大事去矣請毋還而行帝乃議親征召羣臣問方略既而契丹圍瀛州直犯貝魏中外震駭參知政事王欽若江南人也請幸金陵陳堯叟蜀人也請幸成都帝問準準心知二人謀乃陽若不知曰誰為陛下畫此䇿者罪可誅也今陛下神武將臣協和若大駕親征賊自當遁去不然出竒以撓其謀堅守以老其師勞佚之勢我得勝算矣奈何棄廟社欲幸楚蜀逺地所在人心崩潰賊乘勢深入天下可復保邪遂請帝幸澶州及至南城契丹兵方盛衆請駐蹕以覘軍勢準固請曰陛下不過河則人心益危敵氣未懾非所以取威決勝也且王超領徑兵屯中山以扼其吭李繼隆石保吉分大陳以柅其左右肘四方征鎮赴援者日至何疑而不進衆議皆懼準力爭之不決出遇髙瓊於屏間謂曰太尉受國恩今日有以報乎對曰瓊武人願效死準復入對瓊隨立庭下準厲聲曰陛下不以臣言為然盍試問瓊等瓊即仰奏曰寇準言是準曰機不可失宜趣駕瓊即麾衛士進輦帝遂渡河御北城門樓逺近望見御蓋踴躍歡呼聲聞數十里契丹相視驚愕不能成列時準議澶淵事宜狀曰臣伏奉聖旨擘畫河北邉事及將來駕起與不起如起當至何處者一臣伏覩邉奏敵人遊騎已至深州以來竊緣三路大軍見在定州魏能張凝楊延昭田敏等又在威虜軍等處東路深趙貝冀滄德等州别無大軍駐泊必慮敵騎近東南下寨輕騎打劫不唯老小驚騷兼便賊盜團聚直至天雄軍以來人户驚移若不早張軍勢必恐轉啓戎心臣欲乞先那起天雄軍兵馬一萬人往貝州駐泊令周瑩杜彥鈞孫全照部轄若是敵騎在近即仰近城覓便掩殺兼令間道將文字與石普閻承翰照會掩殺蕃戎及召募強壯入敵界燒蕩鄉村劫殺人口仍乞照管南北道路多差人探報蕃戎次第聞奏及報天雄軍一則貴安人心二則張得軍勢以疑敵人之謀三則石普閻承翰等聞王師北來壯得軍威四則與邢洺地里不逺張得犄角之勢一隨駕兵士衛扈宸居固不可與敵人交鋒原野以爭勝負天雄軍至貝州兵馬車駕未起以前不過三萬人萬一敵人至貝州已南下寨遊騎漸更南來即須那起定州兵馬三萬人騎令呼延贊等結陳南來鎮州及令河東雷有終手下兵士出土門路與定州兵馬會合相度事勢緊慢那至洺州以來方可聖駕順動假萬乘之天聲合數路之兵勢更令王超等在近城排布照應魏能張凝楊延昭田敏等處兵馬令作會合次第及前來纍降指揮牽拽候抽移得定州河東兵馬附近始得幸大名一或恐萬一定州兵馬被敵人於鎮定間下寨抽那不起邢洺之北遊騎侵掠天雄軍東北縣分老小大段驚移須是分定州三路精兵差在彼將帥等會合及令魏能張凝楊延昭田敏等兵馬漸那向東傍城下寨牽拽如此則敵人必有後顧之患亦未敢輕議引軍深入若是車駕不起轉恐蕃戎殘害生靈或是鑾輅親征亦須過大河即且幸澶淵就近易為會合兵馬兼控扼津梁右臣叨列宰司素無竒略即承清問合罄鄙誠伏覩皇帝陛下睿智淵深聖猷宏逺固已坐籌而決勝尚猶虛己以詢謀兼彼敵人頗乏糧糗唯恃屯集之衆必懷首尾之憂豈敢不顧大軍但圖深入然亦慮其凶狡須至過有防虞煩瀆天聽伏增戰懼真宗時議親征契丹樞密使王顯言盛寒在序敵未犯塞鑾輿輕舉直抵窮邉寇若不逢師乃先老況今繼遷未滅西鄙不寧儻北邉部落與之結援則中國之患未可量也議者乃於此時請復幽薊非計之得也凡建議大事上下叶力舉必成功今公卿士大夫以至庶人尚有異同未可謂為萬全之舉若能選擇將帥訓練士卒堅城壘而繕甲兵亦足以待敵矣必欲復燕薊舊地則必修文德飬勇鋭伺時之利以奉行天討而後可也顯徙知天雄軍府又言祖宗以來多命近臣統領軍旅今後宣徽使宜於文武羣臣中擇曉逹邉事者為之蓋位髙則威名著識逺則勳勞立故也武臣以罪黜者宜加容貸不以一眚遂廢茍用之有恩必得其死力故曰使功不如使過也至若臨敵命將則貴專任出師應敵則約束將校使相應援全是數者則軍威倍壯人心增勇矣既而上表請赴行在從之既遣還鎮契丹入寇上議親征顯復陳三䇿謂大將軍方在鎮定契丹必不南侵車駕止駐澶淵詔鎮定出兵會河南軍合擊之可也若契丹母子虛張聲勢以抗我師潛遣鋭兵南攻駕前諸軍則令鎮定之師直衝戎帳攻其營寨則沿河遊兵不戰而自屈矣否則遣騎兵千步兵三千於濮州渡河橫掠澶州繼以大軍追北掩擊亦可出其不意也已而契丹請盟趙德明遣使修貢稱藩朝廷加賞鍚且許通青鹽以濟邉民從顯之請也仁宗慶歷元年陜西路經略安撫判官田况上奏曰臣伏見昨夏竦等為纍奉詔以師老費財慮生他變令早為經畫以期平定故韓琦等入奏畫攻守二䇿以稟聖算其守䇿最備可以施行不意朝廷便用攻䇿今一旦稟命不敢持兩端非有夙定之謀必勝之勢倉卒牽合殊無紀律昔繼遷屢擾邉陲太宗親部分諸將五路進討或遇賊不擊或戰衄而還又嘗令白守榮馬惟忠護送糧餉於靈州諸將多違詔自奮浦洛之敗死者數萬人今將帥士卒素已懦怯未甚更練又知韓琦尹洙所建之䇿恐未遑稟復臨事進退有誤大舉請以事驗之且行師有期便須協力今鄜延路總管司葛懷敏等須索百端料必不能應副足以為辭此不可者一也議者以謂賊嘗併力而來我嘗分兵以禦衆寡不敵多貽敗衄今若全師大舉必有成功此思之未熟爾夫三軍之命係於將帥之材材有小大智有逺近以漢祖之善將不若淮隂之益辦況庸人乎茍徒知大衆可以威敵而不思將帥之材否此禍之大者也兩路之入十餘萬人庸將驅之若為舒卷賊若據險設伏邀截衝擊首尾前後勢不相援則奔潰可憂今邉臣所共奬者朱觀葛懷敏爾近於鎮戎軍界劉璠定川等兩川西賊境中生聚牛羊皆遷徙逺去惟空族帳守者二三百人輒來抗敵諸將奔走駭亂幾不自免部隊前後不復可齊兵甲械用大為攘奪今兩路齊入併擊劇賊若有不利則邊防莫守别貽後患安危之計決于一舉此不可者二也自西賊叛命以來雖屢乘機會然不敢深寇郡縣以饜其欲者非算之少也蓋以中國之大賢俊之盛甲兵之衆未易可測今我師深入若無成功大國威靈益為彼輕況或别墮姦計以至它虞此不可者三也議者又云將帥之間雖未足倚下流勇進或有其人自劉平石元孫陷沒士氣挫怯未易勇奮今兵數雖多疲懦者衆以庸將驅怯兵入不測之地獨下使臣數輩干賞圖利欲邀竒功未見其利此不可者四也議者又云非欲深絶沙磧以窮祅巢但淺入山界以挫賊氣如襲白豹城之比臣謂乘虛襲掠既不能破戎首拉凶黨但殘戮孥弱以厚怨毒誠非王師吊伐招徠之體然事出無䇿為彼之所為亦當雷震電逝往來輕速以掩其不備今興師十萬鼓行而西賊已巧為計謀盛設隄備清野據險以待我師何襲挫之有此不可者五也自其寇邉人皆知其誅賞眀計數黠今未有間隙之可窺而暴為此舉計事者但欲決勝於一戰幸其或有所成否則願自比王恢以待罪勇則勇矣其如國事何此不可者六也昨延州范仲淹奏乞朝廷開包荒之量存此一路令諸將勒兵嚴備賊至則擊但未行討伐容示以恩意歲時存問或可招納令尹洙到延州商量仲淹堅執前奏未肯出師若使涇原一路獨入則孤軍進退憂患不淺今諸處採到事宜多言昊賊俟我師諸路入界則併兵一處以拒敵與招來人杜文廣所説一同此正陷賊計中此不可者七也以臣所見夏竦韓琦尹洙同獻此䇿今若奏乞中罷則是前後自相違異殊無定算欲果決進討則又仲淹執議不同或失期會乞召兩府大臣定議但令嚴設邉備若更有侵掠則須出兵邀擊以摧賊勢如復怯懦容賊殺掠當以軍法從事或探得賊界謹自守備不必先有輕舉恐落姦便如此則全威制勝有功而無患也然自議攻討以來賊中呼集醜類廣為防守遷移勞擾未嘗少安至今却有通欵意亦不為無益至於驢畜軍須之物虛煩調發却欲罷兵亦是事之小者臨時分擘處置亦不為難所願者安危大計爾乞密降朝旨下總管司陜西轉運使龎籍論出界攻討未便奏曰臣伏以元昊父子受國大恩一朝反叛今朝廷定議討伐以正逆順實合大義然此時興舉須為萬全之䇿臣謂用兵之道必先度我將既良我士既鋭然後料敵之虛實乘其釁隙而一舉滅之去秋鎮戎之戰依城壁據根本以主待客而諸將或傷中而退或閉城不出其士卒既無用命赴敵之心使賊殘毒人命剽劫財物從容進退如入無人之境可謂將不良士不鋭矣元昊君臣之間未有釁隙又間諜阻絶無由知其虛實而便出界攻討此不可不為朝廷憂也去春劉平等陷歿之後邉城人心日久惴栗幸即時更張軍政比來士卒之氣漸振儻復一出不利則衆意愈懾必難再奮也況出界之後山川道路我軍素未經涉須以蕃部為鄉導則其姦詐不可不防若至險隘之處部伍輜重尾首遙逺忽有伏兵鈔掠則必至潰散況黃德和敗手下潰兵不少至今招集未獲若數萬衆更潰而散不敢歸益生邉患不細臣切度廟謨以大兵屯聚已久上費國力下困生民欲決於攻取之計其餘將佐士卒未能如意或且為嵗月持守之備汰去冗兵只留精鋭在邉數少則費用日寬兵精則足禦捍賊地所産之物嚴法以絶之使不得與邉人市易既劫掠無所得兼貨利無所通其勢必日蹙如更益練將卒俟其釁隙可乘然後大舉庶幾有萬全之䇿也慶歷間趙元昊僣號議出兵討之羣臣曰元昊小醜也旋即誅滅矣供諫職吳育獨建言元昊雖稱藩臣其尺賦斗租不入縣官且服叛不常請置之示不足責且已僭輿服勢必不能自削宜援國初江南故事稍易其名可以順拊而收之不報育又言漢通西域諸國斷胸奴右臂諸戎內附雖有桀黠不敢獨叛唐太宗嘗賜回鶻可汗并其相手書納其貢奉厚以金帛真宗命潘羅支攻殺李繼遷而德明乃降元昊苐見朝廷比年與西域諸戎不通朝貢乃得以利啖鄰境固其巢穴無肘腋之患跳梁猖獗彼得以肆而不顧矣請募士諭嘉勒斯賚及他蕃部離散其黨與使併力以攻而均其恩賜此伐謀之要也蔡襄請誅保州叛卒奏曰臣伏見保州兵士近為罷却沿邉巡檢發怒逐殺官吏閉城而叛以邀朝廷議者更去他謀便用招安之䇿方今天下處處兵驕若健兒殺官吏而叛朝廷即日招安則今後主將性命生死全由健兒國家威令干戈不行境內矣朝廷茍要籍將吏守城捍邉則叛卒更無可赦之理若只茍保州目下無事臣恐自此有兵之處叛亂日生是顧一州之茍安而不慮天下之皆亂今招榜既出已不可追然叛卒尚有可誅之理臣今願乞速降勑旨與王果令以徑兵數千伏於保州之側俟招榜入城隨而突入除百姓外逢兵即殺彼二三千叛卒方得朝廷姑息乘其疑惑懈怠之間我兵卒至擊其不意可以盡誅仍宜先諭軍中每一首級錢賞十千以我器甲被具貪賞之兵而擊倉皇空手懈怠之卒乘此機便無不勝之理若慮其燒劫倉庫殺戮人民此乃閉城之所為耳今既開門我兵卒至彼將救死不暇安能復為劫殺之謀朝廷若必為過慮更當别用救兵隨後䇿應縱使拒死而鬬傷人民乃是一城之患以天下叛亂之禍較之則又不足顧矣朝廷深念安危之本力絶禍亂之萌當此事機決於睿斷翰林學士胡宿論征蠻奏曰臣竊見前代征討蠻寇所以為難者以其保據巢穴略害邉境興師深入則有山林之阻久屯則有瘴霧之毒兵不得戰人多疫死此其所以為難也今者雍土蠻賊盡率支黨逺棄窟穴頓於廣州堅城之下平地之上已六十餘日矣退則歸路至逺進則大軍已集以臣料之賊氣必沮或聞廣州雖有山林不至深險賊久留不去者此天亡之機也今涼風方至瘴氣已息賊處平壤官據堅城士衆相依弓弩得用天時肅殺宜行誅討江西等路雖苦水旱計其小熟及兹西成猶足以調發贍軍助國討賊臣以此觀天時地利人事之形王師誅逆宜及秋冬不可逗留更無機會楊畋謙默不伐深沈有算兼其忠孝出於天性誠堪屬以南伐總兹師律陛下宜申敕諸將稟其節制則軍衆有所統一號令得以施行令因賊亡之機與天時之利參定滅賊之䇿勿貪一時之功戒之以在和訓之以持重多方設巧燒其船艦使賊不得下海賊若下海攻陷瓊管以為窟穴即介在海外王師無由致討矣乘間竊發入寇腹心則嶺南諸州被害無有已時更復遷延使至春夏或誘合鹽賊或扇動羣蠻則江西諸路疲轉漕之役失耕稼之業大軍有疫死之懼懷思歸之心久則變生一切可慮當發生之候用誅伐之威則逆天時虧地利失人和三者舉事之忌也臣愚狂妄輒謂方今之計宜先料賊之多少計兵之衆寡若賊有萬人王師須有三倍之勢料擇精卒習用長技品配其衆畨休與戰彼寡我衆彼勞我逸利則督士苦戰不利則斂兵且止如此者三四待其衰困各懷去就乃可申購募之典赦脅從之罪則人思效順衆必離散然後合勢大舉以圗殄滅若失機會恐逆黨愈盛而後患滋大昔者食藿之人猶憂疆場負薪之語或益廊廟狂夫之言聖人擇焉嘉祜元年知制誥劉敞請罷五溪之征奏曰臣聞舜為天子禹為司空伯益贊之君臣之盛自古未有也以伐三苖曽不能得咫尺之地因班師振旅而歸晉郤缺率諸侯之師八百餘乘挾公子捷災以攻邾婁斥候不設城門不閉以韋帛通語言諸侯皆罷故曰非吾力不能攻義實不爾克也此二者皆不可謂善戰矣然舜禹不以其故貶聖伯益郤缺不以其故損賢理有逆順義有曲直也今武溪諸彭父子結怨而邉臣輕發兵為子討父得非春秋王伯之略乎臣以謂過矣智者欲騁其巧勇者欲用其力矯箭纍弦勵劒負戟以深入為事甚非治天下之大體臣聞古者三王之征伐不貢討不朝今彭氏父子所以爭一旦之命者乃自以失職不得朝貢也臣以謂可聽以休邉民此舜禹之䇿益郤之義所以眀於典謨春秋也往年嵗星在鶉尾則宜厚仁義以應之而始誅五溪逆父子之節難以得天今盛夏動衆下潦上霧多毒蛇惡草之害難以得地天地之道者自古五帝三王之所以務通而順也雖有聖辨莫之能變其説而況縱欲貪功徼一時之勝者乎恐此為人臣之利而非國家之福也臣願朝廷謹之熙寧元年知雜御史劉述論不可伐喪疏曰臣伏覩夏國諒祚死亡遣使人來告哀朝議損其恩禮以其納欵之後曽犯大順城及擅殺傷楊定等所以貶之也今風聞欲遣使責問其國不修賀登極并正旦等事及聞邉臣建議欲乘其喪禍飢困之際以重兵深入討敵不知果然否以臣愚思之恐非所以哀喪恤災綏懷逺人之道也夫逺人者豈可以禮義責之哉弱則畏服強則侵叛從古以然也今諒祚既死將責何人不若因而撫之為得䇿也真廟景德初繼遷死其子德明尚幼因邊臣奏報即降詔慰諭由此德明遣使奉誓書歸順爾後邉事寧敉垂三十年關右之人無科率轉餉之勞安耕織生飬之業公私富實朝野歡娛當是時真宗皇帝非不知乘其喪禍微弱之際用兵窮討蓋以金革之事勝敗不常匪唯耗蠧貨財亦復殺傷士卒于是推天地父母之心務以德懷不以力伏是以終德眀之身不敢有負朝廷乃前事之眀驗也以當時之事力視今日之虛實萬相逺矣當時尤不欲為而今日復欲為之豈不悖哉臣伏願陛下追鑑前世用兵和戎之利害深察今日兵威財力之強弱愛惜生靈之命保固祖宗之業叮嚀二府撿詳景德年趙德眀故事仍先遣一介之使慰撫其國人存問其嗣子仍諭之云如朝廷推封爵之恩即須别納誓欵方可乞行制命彼既孤弱且貪賜豫則欣然聞命矣乃可以救前日种諤擅興之失使知非朝廷之意則曲不在我矣若用邉臣之言以重兵壓境乃為權謀之事欲彼懼而速盟可也若作深入之計則為無䇿矣今諒祚之斃不在先後而適在今日乃上天之靈擁佑聖德俾於斯時除去邉患昭然可議矣陛下可不順承天意撫柔逺人以安中國乎事之機會正在此時一失其宜蕩不可救惟陛下留神省覽天下幸甚三年武寧軍節度使富弼諌西師奏曰臣竊知陜西用武諸路入討至今已是數月調發輸斂不無勞費陛下躬親萬務勤於訪逮臣所恨未能一效死力少寬陛下西顧之憂且念靈夏數州自太宗割賜之後幾百年所存者惟是空壘而已今所得城壁切恐未償所費既已克下又須守禦自此勞費卒無已時伏緣西夏與北敵常為掎角之勢蓋北敵山前後十八州每恐朝廷有復取之意慶歷初因元昊叛仁宗不免討伐而北敵遂有嫚書興割地之隙其書大意自謂我與西夏是甥舅之國南朝不合加兵臣不能盡記其辭惟記一句云殊無忌器之嫌此大可見其意也臣其時兩使敵廷每見元昊遣人在彼密令詢問云來借兵此皆臣始末親經目覩不是剽聞以昔校今不敢謂必無此事今北敵亦須疑朝廷既平西夏即移兵北伐必有借助西夏之謀不可不過慮及此也設或二敵相應兩邉起事即國用人力如何枝梧其間軍情民心須常加防察不可使至于此極也况今天威已振王師已捷或且令退修邉備講守禦之䇿更俟表裏安集别圖後舉以為萬全之計亦為未晚伏乞陛下特賜詳擇而審處之四年司馬光諫西征疏曰臣以不材誤承朝廷委用待罪長安兼領一路十州兵民大柄朝辭之日伏蒙陛下靣諭以凡邉防事機及朝廷得失有所聞見令一一奏聞臣受命以來且愧且懼所愧者聖知深厚責任至重所懼者智識淺短無以堪稱夙夜疚心不敢寧居臣自入境以來見流移之民道路相望詢訪閭里皆云今夏大旱禾苖枯瘁河渭以北絶無所收獨南山之下稍有所存而入秋霖雨經月不霽禾雖有穗往往無實雖有實往往無米雖有米率皆細黑一斗之粟舂簸之後不過得米三四升榖價踴貴民間纍年困于科調素無積蓄不能相贍以此須至分房減口就食西京襄鄧商虢等州或傭賃客作或燒炭採薪或乞丐剽竊以度朝夕當此之際國家惟宜鎮之以靜省息諸事減節用度則租稅自輕徭役自少逋負自寬科率自止四患既除民力自足民財自饒閭里自安流亡自還固不待陛下憂勤於中宰相劬勞於外然後人人得其所也苟或不然國家雖欲輕租稅寬逋負其所費之財何由可得雖欲少徭役止科率其所營之事何由可成四患不除雖日下恩澤之詔民猶不免於流移轉死也蓋欲止沸者莫若絶薪欲安民者莫若省事此目前之驗非難知也臣到官以來伏見朝廷及宣撫等司指揮分義勇作四畨欲令以次於緣邉戍守選諸軍驍鋭及募閭里惡少以為竒兵造乾糧皺飯布囊力車以備饋運悉取嵗賜秉常之物散給緣邉諸路又竭內地府庫甲兵財物以助之且以永興一軍言之所發人馬甲八千副錢九萬貫銀二萬三千兩銀碗六千枚其餘細瑣之物不可勝數動皆迫以軍期上下相驅急於星火官吏狼狽下民驚疑皆云國家將以今春大舉六師長驅深入以討秉常之罪臣以疏賤不得預聞廟堂之議未知兹事為虛為實昨者親承德音以為方今邉計唯宜謹嚴守備俟其入寇則堅壁清野使之來無所得兵疲食盡可以坐收其弊臣退而思念聖謀髙逺深得王者御逺人之道實天下之福及到關中乃見凡百處置皆為出征調度臣不知有司在外不諭聖意以致有此張皇將陛下默運神算不令愚賤之臣得聞其實也臣不勝惶惑晝則忘食夜則廢寢心寒股栗竊為陛下危之夫兵者凶器聖人不得已而用之自古以來國家富強將良卒精因人主好戰不已以致危亂者多矣況今公私困竭將愚卒懦乃欲驅之塞外以捕狡悍之敵其無功必矣豈惟無功兼後患甚多不可盡言也若朝廷初無出征之意則何為坐散府庫之財疲生民之力訖無分毫之事萬一將來敵騎入寇府庫已竭民力已困將何以禦之臣先任御史中丞日朝廷將興綏州之役臣曽上言國家先當舉百職修庶政安百姓實倉庫選將帥立軍法練士卒精器械八事皆備然後可以征伐四夷今此八事未有一者勝於曩時而況關中飢饉十室九空為賊盜者紛紛已多縣官倉庫之積所餘無幾乃欲輕動大衆橫挑猛敵此臣之所大懼也或者又云國家未討秉常先欲試兵誅一小族若果如此尤為不可何則今者竭關中之財力大興師衆乃捨有罪之強寇誅無辜之小種勝之不武不勝為笑將無以復號令逺方矣此二䇿者皆為不可伏望陛下深鑒安危之機消之於未萌救之於未形速下明詔撫諭關中之民以朝廷不為出征之計其義勇更不分畨於緣邉戍守亦不選募竒兵凡諸調發為餽運之具者悉令停罷愛惜內地倉庫之儲以備春深賙救飢窮之人如此豈惟生民之幸亦社稷之福也臣不勝憂迫直輸赤誠惟陛下裁察十年蘇軾代張方平諫用兵書曰臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆出於不得已故其勝也享安全之福其不勝也必無意外之患後世用兵皆得已而不已故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金內外騷動怠於道路者七十萬家內則府庫空虛外則百姓窮匱飢寒逼迫其後必有盜賊之憂死傷愁怨其終必致水旱之報上則將帥擁衆有跋扈之心下則士衆久役有潰叛之志變故百出皆由用兵至於興事首議之人冥謫尤重蓋以平民無故緣兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得已不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇既平六國復事胡越戍役之患被於四海雖拓地千里逺過三代而墳土未乾天下怨叛二世被害子嬰被擒滅亡之酷自古所未嘗有也漢武帝承文景富溢之餘首挑胸奴連兵不解遂使侵尋及於諸國嵗嵗調發所向成功建元之間兵禍始作是時蚩尤旗出長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗班固以為太子生長於兵與之終始帝雖悔悟自克而歿身之恨已無及矣隋文帝既下江南繼事逺方煬帝嗣位此心不衰皆能誅滅強國威震萬里然而民怨盜起亡不旋踵唐太宗神武無敵尤喜用兵既已破滅突厥髙昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得已而用其後武氏之難唐室淩遲不絶如線蓋用兵之禍物理難逃不然太宗仁聖寬厚克己裕人幾至刑措而一傳之後子孫塗炭此豈為善之報也哉由此觀之漢唐用兵於寬仁之後故其勝而僅存秦隋用兵於殘暴之餘故其勝而遂滅臣每讀書至此未嘗不掩卷流涕傷其計之過也若使此四君者方其用兵之初隨即敗衄惕然戒懼知用兵之難則禍敗之興當不至此不幸每舉輒勝故使狃於功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可不察也昔仁宗皇帝覆育天下無意於兵將士惰偷兵革朽鈍元昊乘間竊發西鄙延安涇原麟府之間敗者三四所喪動以萬計而海內晏然兵休事已而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得已之實故也今陛下天錫勇智意在富強即位以來繕甲治兵伺候鄰國羣臣百寮窺見此指多言用兵其始也弼臣執國命者無憂深思逺之心樞臣當國論者無慮害持難之識在臺諫之職者無獻替納忠之議從微至著遂成厲階既而薛向為橫山之謀韓絳效深入之計陳升之吕公弼等隂與之協力師徒喪敗財用耗屈較之寶元慶歷之敗不及十一然而天怒人怨邉兵背叛京師騷然陛下為之旰食者纍月何者用兵之端陛下作之是以吏士無怒敵之意而不直陛下也尚賴祖宗積纍之厚皇天保佑之深故使兵出無功感悟聖意然淺見之士方且以敗為恥力欲求勝以稱上心於是王韶構禍於熙河章惇造釁於橫山熊本發難於渝瀘然此等皆戕賊已降俘纍老弱困弊腹心而取空虛無用之地以為武功使陛下受此虛名而忽於實禍勉強砥礪奮於功名故沈起劉彛復發於安南使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送資糧器械不見敵而盡以為用兵之意必且少衰而李憲之師復出於洮州矣今師徒克捷鋭氣方盛陛下喜於一勝必有輕視四夷陵侮敵國之意天意難測則臣實畏之且夫戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦屠於白刃筋骨絶於餽餉流離破産鬻賣男女熏眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美死者甚苦使陛下見其號呼於挺刃之下宛轉於刀几之間雖八珍之美必將投筯而不忍食而況用人之命以為耳目之觀乎且使陛下將卒精強府庫充實如秦漢隋唐之君既勝之後禍亂方興尚不可救而況所在將吏罷軟凡庸較之古人萬萬不逮而數年以來公私窘乏內府纍世之積掃地無餘州郡征稅之儲上供殆盡百官俸廪僅而能繼南郊賞給久而未辦以此舉動雖有智者無以善其後矣且飢疫之後所在盜賊蜂起京東河北尤不可言若軍事一興橫斂隨作民窮而無告其勢不為大盜無以自全邉事方深內患復起則勝廣之形將在於此此老臣所以終夜不寐臨食而歎至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗蓋天心向背之迹見於災祥豐歉之間今自近嵗日蝕星變地震山崩水旱癘疫連年不解民死將半天心之向背可以見矣而陛下方且斷然不顧興事不已譬如人子得過於父母惟有恭順靜思引咎自責庶幾可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下逺覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安靜無為固社稷長久之計上以安二宫朝夕之飬下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則出謝絶之言此二帝者非不知兵也蓋經變既多則慮患深逺今陛下深居九重而輕議討伐老臣庸懦私竊以為過矣然人臣納説於君因其既厭而止之則易為力迎其方鋭而折之則難為功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特逹度量過人未有能勇於奮發之中含已從人惟義是聽者也今陛下盛氣於用武勢不可回臣非不知而獻言不已者誠見陛下聖德寬大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必將哀痛悔恨而追咎左右大臣未嘗一言臣亦將老且死見先帝於地下亦有以藉口矣惟陛下哀而察之軾於元豐五年又代滕甫論西夏書曰臣素無學術老不讀書每欲披竭愚忠上補聖明萬一而肝肺枯涸卒無可言近者因病求醫偶悟一事推之有政似可施行惟陛下財幸臣近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之終不以一日之快而易終身之憂遂用其言以善藥磨治半月而愈初不傷氣體力益完因悟近日臣僚獻言欲用兵西方皆是醫人欲下一日而愈者也其勢亦未必不成然終非臣子深愛君父欲出萬全之道也以陛下聖明將賢士勇何往不充而臣尚以為非萬全者俗言彭祖觀井自係大木之上以車輪覆井而後敢觀此言雖鄙而切於事陛下愛民憂國非特如彭祖之愛身而兵者凶器動有存亡其陷人可畏有甚於井故臣願陛下之用兵如彭祖之觀井然後為得也臣竊觀自古善用兵者莫如曹操其破滅袁氏最有巧思請試為陛下論之袁紹以十倍之衆大敗於官渡僅以身免而操斂兵不追者何也所以緩紹而亂其國也紹歸國益驕忠賢就戮嫡庶並爭不及數年而袁氏無遺種矣向使操急之紹既未可以一舉蕩滅若懼而修政用田豐而立袁談則成敗未可知也其後北征烏桓討袁尚袁熙尚熙走遼東或勸操遂平之操曰彼素畏尚等吾今急之則合緩之則自相圖其勢然也遂引兵還曰吾方使公孫康斬送其首已而果然若操者可謂巧於滅國矣滅國大事也不可以速譬如小兒之毁齒以漸搖撼之則齒脫而兒不知若不以漸一拔而得齒則毁齒可以殺兒故臣願陛下之取西夏如曹操之取袁氏也方元昊強時謀臣猛將盡其智力十年而不敢近今者主弱臣強其國內亂陛下使偏師一出斬名王虜偽公主築蘭會等州此真千載一時天以賊授陛下之秋也兵法有之同舟而遇風則胡越相救如左右手今秉常雖為母族所篡以意度之其世家大族亦未肯俯首連臂為此族用也今乃合而為一堅壁清野以抗王師如左右手此同舟遇風之勢也法當緩之今天威已震臣願陛下選用大臣宿將素為賊所畏服者使兼帥五路聚重兵境上號稱百萬搜乘補卒牛酒日至金鼓之聲聞於數百里間外為必討之勢而實不出境多出金幣遣間使辨士離壞其黨與且下令曰尺土吾不愛一民吾不有也其有能以地與衆降者即以封之有敢攘其地掠其人者皆斬不出一年必有權均力敵內自相疑者人情不逺各欲求全及王師之未出爭為先降以邀重賞陛下因而分裂之即用其酋豪命以爵秩棊布錯峙務使相仇如漢封呼韓邪通西域故事不過于要害處築一城屯數千人置一將以護諸部可使數百年面內保境不煩城守餽運豈非萬全之至計哉臣願陛下斷之於中深慮而逺計之夫為人臣計與為人主計不同人臣非攘地效首虜無以為功為陛下計惟天下安社稷固耳陛下神聖冠古動容舉意皆是功德但能措太山之安與天地等夀則竹帛不可勝紀而堯舜禹湯不足過也議者不知出此爭欲急於功名履危犯難以勞聖慮臣竊不取古人有言省功不如省事省事不如清心劉洎諫唐太宗曰皇天以不言為貴聖人以不言為德老子稱大辨若訥莊子言至道無文且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛人臣愛君未有如洎之深切者也臣竊慕之雖謫守在外不當妄言然自念舊臣譬之老馬雖筋力已衰不堪致逺而經涉險阻粗識道路惟陛下哀愍其愚而憐其意不勝幸甚元豐三年時伐夏不得志李憲又欲再舉帝以訪輔臣王圭曰向所患者用不足朝廷今捐錢鈔五百萬緡以供軍食有餘矣尚書左丞王安禮曰鈔不可噉必變而為錢錢又變為芻粟今距出征之期才兩月安能集事帝曰李憲以為已有備彼宦者能如是卿等獨無意乎唐平淮蔡唯裴度謀議與王同今乃不出公卿而出於閹寺朕甚耻之安禮曰淮西三州爾有裴度之謀李光顔李訴之將然猶引天下之兵力歷嵗而後定今夏氏之強非淮蔡比憲材非度匹諸將非有光顔訴輩臣懼無以副聖志也帝悟而止歷代名臣奏議卷二百三十
