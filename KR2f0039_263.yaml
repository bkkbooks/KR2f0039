body:
  text: 歷代名臣奏議卷二百六十三明楊士竒等撰理財唐憲宗即位後因德宗府庫而性儉約節用四方進奉并破劉闢李錡沒入及于頔王鍔進獻錢帛盈溢充積內藏學士李絳嘗從奏諫曰臣聞王者積之于人霸者積之于國尋常之君積于府庫陛下以超邁英姿嗣膺寶歷蠻夷納貢山澤效珍固當事冠百王德垂萬代可書之事成不諱之朝今內藏積財來者必納唯願進入之數不問聚斂之由方鎮皆裒刻于人以進獻為號因緣姦盜半入私家百姓積怨兆人興謗殆非今日聖政所宜行也又錢是通流之貨居之則物以騰踴帛是衣著之物貯之則嵗轉損爛此皆出於人力匪從天生積難得之財成無用之幣聖心所宜留念伏乞天慈量恩澤頒賜之所要校制作移用之所費三倍已外悉付所司倘經用者有餘即租稅寬於外以令疲人蘇息內以表聖政光昭存之策書足示後嗣上喟然曰朕豈不知積財貨為不急之務受進獻非至聖之事顧祖宗理化之所法令賞罰不行今兩河州郡之殷是中夏貢賦之地四五十郡國力不及朝覲久廢征討未加又河隍郡縣沒於蕃醜列置烽候逼近郊圻朕方欲練智勇之將刷祖宗之恥惡所用不徴於人儲蓄之由蓋在于此朕所以身衣浣濯不妄破用親戚賜與才表誠意而已且漢明帝云我為天下守財爾豈得妄用耶誠哉是言卿當深悉此懷元和六年上問户部侍郎李絳曰故事户部皆進羡餘卿獨無進何也對曰守土之官厚斂于人以市私恩天下猶共非之況户部所掌皆陛下府庫之物給納有籍安得羡餘若自左藏輸之內藏以為進奉是猶東庫移之西庫臣不敢踵此弊也上嘉其直益重之元和中翰林學士白居易論和糴狀曰右臣伏見有司以今年豐熟請令畿內及諸處和糴令收賤榖以利農人以臣所觀有害無利何者凡曰和糴則官出錢人出榖兩和商量然後交易也比來和糴事則不然但令府縣散配户人促立程限嚴加徴催茍有稽遲則被追捉迫蹙鞭撻甚於稅賦號為和糴其實害人倘依前而行臣故曰有害無利也今若有司出錢開場自糴比于時價稍有優饒利之誘人人必情願且本請和糴只圖利人人若有利自然願來利害之間可以此辨今若除前之弊行此之便是真得和糴利人之道也二端取捨伏惟聖㫖裁之必不得已則不如折糴折糴者折青苗稅錢使納斛斗免令賤糴别納見錢在於農人亦甚為利況度支比來所支和糴價錢多是雜色匹段百姓又須轉賣然後將納稅錢至於給付不免侵偷貨易不免折損所失過本其弊可知今若量折稅錢使納斛斗既無賤糶麥粟之費又無轉賣匹段之勞利歸於人美歸於上則折糴之便豈不昭然由是而論則配户不如開場和糴不如折糴亦甚明矣臣久處村閭曽為和糴之户親被迫蹙實不堪命臣近為畿尉曽領和糴之司親自鞭撻所不忍覩臣頃者常欲疏此人病聞于天聽踈逺賤微無由上逹今幸擢居禁職列在諫官茍有他聞猶合陳獻況備諳此事深知此弊臣若緘默隱而不言不唯上辜聖恩實亦內負夙願猶慮愚誠不至聖鑒未廽即望試令左右可親信者一人潛問鄉村百姓和糴之與折糴孰利而孰害乎則知臣言不敢茍耳或慮陛下以敕命已下難於移改以臣所見事又不然夫聖人之舉事也唯務便人唯求利物若損益相半則不必遷移若利害相懸則事須追改不獨於此其他亦然伏望宸衷審賜詳察謹具奏聞監察御史元稹上錢貨議狀曰奉進止當今百姓之困衆情所知減稅則國用不充欲依舊則人困轉甚皆由貨輕錢重徴稅暗加宜令百寮各陳意見以革其弊右閏正月十七日宰相奉宣進止如前者臣以為當今百姓之困其弊數十不獨在於錢貨徴稅之謂也既聖問言之又以為黎庶之重困不在於賦稅之暗加患在於剝奪之不已錢貨之輕重不在於議論之不當患在於號令之不行今天下賦稅一法也厚薄一槩也然而廉能蒞之則生息貪愚蒞之則敗傷蓋得人則理之明驗也豈徴稅暗加之謂乎自嶺已南以金銀為貨幣自巴已外以鹽帛為交易黔巫溪峽大抵用水銀朱砂繒綵巾帽以相市然而前人以之理後人以之擾東郡以之耗西郡以之贏又得人則理之明驗也豈錢重貨輕之謂乎自國家置兩稅已來天下之財限為三品一曰上供二曰留使三曰留州皆量出以為入定額以給資然而節將有進獻以市國恩者有賂遺以買私名者有藏鏹滯帛以貽子孫者有髙樓廣榭以熾第宅者彼之俸入有常也公私有分也此何從而得之又國家置度支轉運已來一則管鹽以易貨一則受財以經費近制有年進月進之名有正至三節之獻彼之管鹽有常也受財有數也此又何從而得之且百姓國家之百姓也貨財國家之貨財也不足則取之有餘則捨之在我而已又何必授之重柄假之利權徇彼之徼恩成我之怨府哉今陛下初臨億兆首問羣寮誠能禁藩鎮大臣不時之獻罷度支轉運别進之名絶賂遺之私節侈靡之俗峻風憲之舉深贓罪之刑精核考課之條慎選字人之長若此則不減稅而人安不改法而人理矣至於古今言錢幣之輕重者熟矣或更大錢或放私鑄或龜或貝或皮或刀或禁埋藏或禁銷毁或禁器用或禁滯積皆可以救一時之弊也然而或損或益者蓋法有行不行之謂也臣不敢逺徴古證竊見元和已來初有公私器用禁銅之令次有交易錢帛兼行之法近有積錢不得過數之限每更守尹則必有用錢不得加除之榜然而銅器備列於公私錢帛不兼於賣鬻積錢不出於牆垣欺濫遍行於市井亦未聞鞭一夫黜一吏賞一告訐壞一蓄藏豈法不便於時耶蓋行之不至也陛下誠能採古今救弊之方施賞罰必行之令則聖祖仁宗之法制何限前賢後智之議論何窮豈待愚臣盜竊古人之見自稱革弊之術哉行尚書職方員外郎韓愈上錢重物輕狀曰右臣伏准御史臺牒準中書門下帖奉進止錢重物輕為弊頗甚詳求適變可以便人所貴緡貨通行里閭寬息宜令百寮隨所見作利害狀者臣愚以為錢重物輕救之之法有四一曰在物土貢夫五榖布帛農人之所能出也工人之所能為也人不能鑄錢而使之賣布帛榖米以輸錢於官是以物愈賤而錢愈貴也今使出布之鄉租賦悉以布出綿絲百貨之鄉租賦悉以綿絲百貨去京百里悉出草三百里以粟五百里之內及河渭可漕入願以草粟租賦悉以聽之則人益豐錢益輕榖米布帛益重二曰在塞其隙無使之泄禁人無得以銅為器皿禁鑄銅為浮屠佛像鐘磬者蓄銅過若干斤者鑄錢以為他物者皆罪死不赦禁錢不得出五嶺五嶺買賣一以銀盜以錢出嶺及違令以買賣者皆坐死五嶺舊錢聽人載出如此則錢必輕矣三曰更其文貴之使一當五而新舊兼用之凡鑄錢千其費亦千今鑄一而得五是費錢千而得五千可立多也四曰扶其病使法必立凡法始立必有病今使人各輸其土物以為租賦則州縣無見錢州縣無見錢而榖米布帛未重則用不足而官吏之祿俸月減其舊三之一各置鑄錢使新錢一當五者以給之輕重平乃止四法用錢必輕榖米布帛必重百姓必均矣穆宗長慶二年户部侍郎張平叔上疏請官自賣鹽可以富國強兵陳利害十八條詔下其說令公卿詳議兵部侍郎韓愈論變鹽法事宜狀曰右奉敕將變鹽法事貴精詳宜令臣等各陳利害可否聞奏者平叔所上變法條件臣終始詳度恐不可施行各隨本條分析利害如後一件平叔請令州府差人自糶官鹽收實估匹段省司準舊例支用自然獲利一倍已上者臣今通計所在百姓貧多富少除城郭外有見錢糴鹽者十無二三多用雜物及米榖博易鹽商利歸於已無物不取或從賒貸升斗約以時熟填還用此取濟兩得利便今令州縣人吏坐鋪自糶利不關已罪則加身不得見錢及頭段物恐失官利必不敢糶變法之後百姓貧者無從得鹽而食矣求利未得斂怨已多自然坐失鹽利常數所云獲利一倍臣所未見一件平叔又請鄉村去州縣逺處令所由將鹽就村糶易不得令百姓闕鹽者臣以為鄉村逺處或三家五家山谷居住不可令人吏將鹽家至户到多將則糶貨不盡少將則得錢無多計其往來自充糧食不足比來商人或自負擔斗石往與百姓博易所兾平價之上利得三錢兩錢不比所由為官所使到村之後必索百姓供應所利至少為弊則多此又不可行者也一件平叔云所務至重須令廟堂宰相充使臣以為若法可行不假令宰相充使若不可行雖宰相為使無益也又宰相者所以臨察百司考其殿最若自為使縱有敗闕遣誰舉之此又不可者也一件平叔又云法行之後停減鹽司所由糧課年可收錢十萬貫臣以為變法之後弊隨事生尚恐不登常數安得更望贏利一件平叔欲令府縣糶鹽每月更加京兆尹料錢百千司録及兩縣令每月各加五十千其餘觀察及諸州刺史縣令録事參軍多至每月五十千少至五千三千者臣今計此用錢已多其餘官典及巡察手力所由等糧課仍不在此數通計所給每嵗不下十萬貫未見其利所費已廣平叔又云停鹽司諸色所由糧課約每嵗合減得十萬貫錢今臣計其新法亦用十萬不啻減得十萬却用十萬所亡所得一無贏餘也平叔又請以糶鹽多少為刺史縣令殿最多者遷擢不拘常例如闕課利依條科責者刺史縣令職在分憂今惟以鹽利多少為之升黜不復考其治行非唐虞三載考績黜陟幽明之義也一件平叔請定鹽價每斤三十文又每二百里每斤價加收二文以充腳價量地逺近險易加至六文腳價不足官與出名為每斤三十文其實已三十六文也今鹽價京師每斤四十諸州則不登此變法之後祗校數文於百姓未有厚利也腳價用五文者官與出二文用十文者官與出四文是鹽一斤官糶得錢名為三十其實斤多得二十八少得二十六文折長補短每斤收錢不過二十六七百姓折長補短每斤用錢三十四則是公私之間每斤常失七八文也下不及百姓上不歸官家積數至多不可遽算以此言之不為有益平叔又請令所在及農隙時併召車牛般鹽送納都倉不得令有闕絶者州縣和雇車牛百姓必無情願事須差配然付腳錢百姓將車載鹽所由先皆無檢齊集之後始得載鹽及至院監請受又須待其輪次不用門户皆被停留輸納之時人事又别凡是和雇無不皆然百姓寧為私家載物取錢五文不為官家載物取十文錢也不和雇則無可載鹽和雇則害及百姓此又不可也一件平叔稱停減鹽務所由收其糧課一嵗尚得十萬貫文今又稱既有巡院請量閒劇留官吏於倉場勾當要害守捉少置人數優恤糧料嚴加把捉如有漏失私糶等並凖條處分者平叔所管鹽務所由人數有幾量留之外收其糧課一嵗尚得十萬貫此又不近理也比來要害守捉人數至多尚有漏失私糶之弊今又減置人數謂能私鹽斷絶此又於理不可也一件平叔云變法之後嵗計必有所餘日用還恐不足謂一年已來且未責以課利後必數倍校多者此又不可方今國用常言不足若一嵗頓闕課利為害已深雖云明年校多豈可懸保此又非公私蓄積尚少之時可行者也一件平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富士農工商道士僧尼并兼遊惰因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曽輸稅若官自糶鹽此輩無一人遺漏者臣以此數色人等不糴鹽而食官自糶鹽即糴而食之則信如平叔所言矣若官自糶與不自糶皆常糴鹽而食則今官自糶亦無利也所謂知其一而不知其二見其近而不見其逺也國家𣙜鹽糶與商人商人納𣙜糶與百姓則是天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也一件平叔云初定兩稅時絹一匹直錢三千今絹一匹直錢八百百姓貧虛或先取粟麥價及至收穫悉以還債又充官稅顆粒不殘若官中糶鹽一家五口所食鹽價不過十錢隨日而輸不勞驅遣則必無舉債逃亡之患者臣以為百姓困弊不皆為鹽價貴也今官自糶鹽與依舊令商人糶其價貴賤所校無多通計一家五口所食之鹽平叔所計一日以十錢為率一月當用錢三百是則三日食鹽一斤一月率當十斤新法實價與舊每斤不校三四錢以下通計五口之家以平叔所約之法計之賤於舊價日校一錢月校三十不滿五口之家所校更少然則改用新法百姓亦未免窮困流散也初定稅時一匹絹三千今只八百假如特變鹽法絹價亦未肯貴五口之家因變鹽法日得一錢之利豈能便免作債收穫之時不被徴索輸官稅復有贏餘也以臣所見百姓困弊日久不以事擾之自然漸校不在變鹽法也今絹一匹八百百姓尚多寒無衣者若使匹直三千則無衣者必更衆多況絹之貴賤皆不緣鹽法以此言之鹽法未要變也一件平叔云每州糶鹽不少長吏或有不親公事所由浮詞云當界無人糴鹽臣即請差清强巡官檢責所在實戶據口團保給一年鹽使其四季輸納鹽價口多糶少及鹽價遲違請停觀察使見任改散慢官其刺史已下貶與上佐其餘官貶逺處者平叔本請官自糶鹽以實百姓令其蘇息免更流亡今令責實户口團保給鹽令其隨季輸納鹽價所謂擾而困之前意也百姓貧家食鹽至少或有淡食動經旬月若據口給鹽依時徴價辦與不辦並須納錢遲違及違條件觀察使以下各加罪譴茍官吏畏罪必用威刑臣恐因此所在不安百姓轉致流散此又不可之大者也一件平叔請限商人鹽納官後不得輒於諸軍諸使覔職掌把錢捉店看守莊磑以求影庇請令所在官吏嚴加訪察如有違犯應有資財並令納官仍牒送府縣充所由者臣以為鹽商納𣙜為官糶鹽子父相承坐受厚利比百姓實則校優今既奪其業又禁不得求覓職事及為人把錢捉店看守莊磑不知其罪一朝窮蹙之也若必行此則富商大賈必生怨恨或收市重寶逃入反側之地以資寇盜此又不可不慮也一件平叔云行此策後兩市軍人富商大賈或行財賄邀截喧訴請令所由切加收捉如獲頭首所在決殺連狀聚衆人等各決脊杖二十檢責軍司軍戶鹽如有隱漏並準府縣例科決并賞所由告人者此一件若果行之不惟大失人心兼亦驚動逺近不知糶鹽所獲幾何而害人蠧政其弊實甚以前件狀奉今月九日敕令臣等各陳利害者謹録奏聞伏聽敕㫖宋太宗太平興國二年樊若水上言曰江南舊用鐵錢於民非便今諸州銅錢尚六七十萬緡虔吉等州未有銅錢各發六七萬緡俾市金帛輕貨上供及博糴穀麥於升鄂饒等州産銅之地大鑄銅錢銅錢既不渡江益以新錢則民間錢愈多鐵錢自當不用悉鎔鑄為農器什物以給江北流民之歸附者除銅錢渡江之禁從之端拱二年户部郎中張洎乞罷𣙜山行放法奏曰臣伏奉中書宣諭聖意令訪聞茶法其𣙜山通商各有何利害者臣才識鄙陋預聞天㫖退就衡泌惶悚實深謹略具𣙜山放法利害仰對天問惟聖明察之伏以茶貨之興其來尚矣資民豐國利潤之功博焉𣙜山放法損益之制肇自有唐創兹茶法流行天下無異米鹽兆姓所須逺近同俗今獻議者言貨茶利害蓋有二焉一曰𣙜山一曰放法歷代制置雖或不同舉要而言則𣙜山之害深放法之利廣也然而幹司邦計之臣必曰朝廷𣙜山大獲厚利倘從放免徒利茶商此蓋老生之常談近世之弊法徒傷大體豈務通經者乎今請一二而言之夫南國土疆山澤連接逺民習俗多事茶園上則供億賦租下則存活妻子營生取給更絶他門及其官𣙜茶山利歸公室衣食之源日削採造之役嵗增課額既漸虧刑罰又屢及以至貼田賣屋力辦課程物産既空死亡寧救所以出茶之處郡縣凋殘民不聊生職由于此其弊一也禁𣙜之地法令斯嚴銖兩之茶即該憲網公私追擾獄訟繁興大則破族亡家小則身填牢户州縣公事大半為茶朝禁夕刑繫縲相繼户口由兹減耗田野為之汙萊蠢爾蒸民墜於無告獄連祻結莫甚於斯其弊二也茶貨在山同夫五榖事持愛養即獲滋豐及夫朝廷𣙜山鄉原失業茶户逼於寒餒日有逃亡者茶園陷於姦幸嵗有荒廢者年華漸久殘破益深眷彼靈苖鞠為茂草追呼覺察已失課程雖欲改張噬臍安及其弊三也謹按唐史穆宗朝宫中營造臺觀國計不充王播希恩請增茶稅李珏上疏曰𣙜率救弊起自干戈厚斂於人殊傷國體嵗終上計其利幾何未見阜財已云斂怨矣至大和九年鹽鐡使王涯始奏行𣙜茶之法江淮間百姓茶園官自造作分命使者主之百姓公言曰果行是法止有盡殺使臣入山叛耳其後甘露事發涯竟就誅故史臣謂王涯欲希恩幸重困蒸人然而竄身姦邪之間與其謀而危其國豈非鬼瞰神奪駕斯祻以懲之乎前史書之以為鑒誡國家膺圖御極子育黎元澤浹窮荒仁及行葦唯兹茶法未叶大中改絃更張正在兹日今若罷𣙜山之制行放法之條益國便民其利有五夫先王創制貴在通行規利竭民政斯濫矣𣙜山弊法舉而棄之則委頓者獲全流庸者盡復東南郡縣百萬遺氓送死養生得安舊業其利一也造茶之户既專物産必能經營地利愛養茶園封殖窠條防護山澤十年之內茶貨大興通商惠農王賦增集其利二也𣙜山既放密網減除愛人而義在必行畫象而民將不犯普天之下實省刑章利用厚生莫先於此其利三也比來般運盡出公家涉歷江湖按漕河洛方舟巨艫經途萬里風濤沒溺官吏姦偷陷失茶綱比嵗常有若行放法此患自除其利四也國家𣙜買茶貨嵗入無窮堆貯倉場充積州郡及乎出賣之際則大半陳腐積年之後又多至焚燒今若許放𣙜山任民貿易則國中永無棄貨天下咸喫新茶惠潤公私實為要道其利五也或曰國家制置茶法蓋有嵗年一旦通商大虧國計贍用不足其將奈何對曰聖后當陽政先惠下將建無窮之策非急一時之利況兹變法未見虧官𣙜放便宜謹條件如後𣙜山一天下郡國所出茶貨品類至繁且以湖南一道所出茶貨約度為準訪聞湖南山色茶每斤官中推買用本錢二百二十文輦運支費約破錢一百文輦運之稍逺即不啻一百文道途稍近即不及一百文今將道途逺近尅折算計一槩且以百錢為準官中於地頭出賣計收錢九百六十文除算出本錢并纏裹錢共三百二十文外合收淨利錢六百四十文其淮南兩浙江南等道茶貨雖出賣價例或小有不同其所收淨𣙜茶貨利大約不踰於此國家所𣙜茶貨嵗月漸深即有減價出賣者逺年陳惡不堪支用即有逐時燒棄者今請朝廷且將天下一年所納茶貨較算其元使用本錢及輦運錢都合計若干於地頭出賣所收淨利錢都合得若干却於淨利錢內剋折出逐年減價出賣及官中燒棄茶貨外其所有的實淨利合有若干如兹算撲即所賣茶貨除剋折外每斤價錢又恐不能及六百四十文放法一國家若放𣙜山任民買賣理財之道宜通規天下諸道州府出茶之處請各於緊要地置立務局其茶貨離山場之日不計多少每一大斤茶户納錢一百文茶商納錢三百文茶商出賣地頭更納錢二百文其茶商所齎博買茶貨金銀匹帛等經歷舊買茶處向外州郡其州郡又依例納稅統而言之即官入茶租與𣙜山之日所獲淨利不相懸矣或曰朝廷改變茶法貴要利民若茶商茶户所納之錢過為繁重豈惠下之道也答曰𣙜山之時商客買官茶一斤計用錢九百六十文改法之後且約將錢四百文為茶本四百文納官都計八百文若更將一百六十文剩錢納官方只得𣙜山之時買茶舊額況放法之後民皆取便既絶官司上下侵擾又免官中陳茶就山場買賣得一色新茶商販之人獲利誠厚更令納鏹尚為輕賦況見出茶本以𣙜山之日猶未登舊額者乎又茶户賣茶入官甚為艱苦或將逺年陳惡雜物折給或得低價一色見錢然而經歷官司動遭刻削茶稍低下即被焚燒逮于住場僅同白納今既改法將茶貨賣與商客且約得價錢四百文除將一百文納官尚有三百文見鏹比𣙜納之日所獲利潤不亦復饒乎或曰官中所取茶租若加重厚民於茶價須至增添茶價既增於人便否答曰茶為食物天下所資日用於人同夫鹽酒雖價例增長非有害於時焉在昔有唐宰相令狐楚嘗奏茶法云賦率之時既節級增價商人轉賣必價稍貴即是錢出萬國利歸有司既無害茶商又不擾茶户詳楚之所奏理甚顯明茶價雖增實有利而無害矣今國家大更茶法式洽民心所慮者賦入不登或虧邦計今兹放𣙜其利昭然舉而行之實久長之計也一𣙜山之時商販艱阻今既放法民皆自便普天之下茶貨流通利入公門必當增倍商人所到州郡賣茶納錢此則率賦二百錢非常行稅賦宜令本處稅院别置文厯逐時收管俟年終上計考校課程一國家贍用之茶不可令闕宜計度逐年所支費多少據合留數目令折稅茶户依舊𣙜納或慮折稅茶數目浩瀚逐年𣙜納不盡即可據都額分為畨次令茶户三年一次輸納庶均苦樂永冀通行切以理財聚衆聖人之大業興利除害有國之常規國家受命上天光宅中土交修庶政歷載于兹大道汙而復隆墜典缺而咸補唯財貨一節未行寬簡豈不以覆燾至大贍用攸廣將安區夏須資物力者乎臣以為司計之臣失於經度所致也何則普天之下中外資用四海九州之租賦關市山澤之稅率𣙜山煮海之宜利一歲所入其數幾何郊廟社稷之嚴奉少府中禁之支費六軍羣吏之資贍一嵗所出其數幾何司計之臣茍能按經常調虛實量入以為出則國內財貨可得而均節矣天下利病可得而明察矣其或聖朝嵗時支費未能放行計度但掊克以困黎元貨殖程財未見其可也況茶貨害政為日滋久倘從變法孰匪至公舉而行之又何疑也太宗留意金榖召三司吏李溥等二十七人對於崇政殿詢以計司利害溥等言條目煩多不可以口占願給筆札以對太宗遣中黃門送詣相府限五日悉條上之溥等共上七十一事詔以四十四事付有司行之其十九事下陳恕等議可否遣知雜御史張秉中使張崇責監議令中書籍其事專檢舉之無致廢格賜溥等白金緡錢悉補侍禁殿直領其職太宗謂宰相曰溥等條奏事頗有所長朕嘗語恕等若文章稽古此輩固不可望若錢榖利病彼自幼至長寢處其中必周知根本卿等但假以顔色引令剖陳必有所益恕等剛強終不肻降意詢問吕端對曰耕當問奴織當問婢寇準曰夫子入太廟每事問乃以貴下賤先有司之義後數日太宗又曰國家嵗入財數倍于唐唐中葉以降藩鎮擅命征賦多不入公家下陵上替經制隳壞若前代為得即已致太平豈復煩朕心慮也因召恕等責以職事曠廢恕等對曰今土宇至廣庶物至煩國用軍須所費浩瀚又遇諸州凡有灾沴必盡蠲其租臣等每舉利權朝廷必以侵民為慮皆尼而不行縱使耿夀昌桑𢎞羊復生亦所不逮臣等駑劣惟盡心簿領終不足上禆聖治太宗曰卿等清而不通專守繩墨終不能為國家度長潔大剖煩析滯只如京城倉庫主吏當改職者簿領中一處節目未備即至十年五年不决以致貧無資給轉徙溝壑此卿等之過豈不傷和氣哉恕等頓首謝真宗即位西京左藏庫使楊允恭言川峽鐡錢之弊曰凡民田之稅昔輸銅錢之一今輸鐡錢亦一而吏卒奉舊給銅錢之一今給鐡錢五行用交易則鐵錢之十為銅錢之一且民入田稅以一為十官失其九矣吏卒奉給增一為五官又失其四矣吏卒得五用十復失其半矣臣在先朝嘗陳其事願變法以革其弊先帝方議行之㑹賊順叛擾而止今陛下繼成先烈可遂建其法使民不失所且饒信之銅積數千萬若遣運于荆逹于蜀蜀素多銅俾䕫益遂各置監鼓鑄嵗用均給不十年悉用銅錢矣咸平四年祕書丞直史館孫冕請令江南荆湖通商賣鹽緣邊折中糧草在京入納金銀錢帛則公私皆便為利實多設慮淮南因江南荆湖通商或至年額稍虧則國家折中糧草足贍邊兵中納金銀實之官庫且免和雇車乘差擾民户冒寒涉逺借如荆湖運錢萬貫淮南運米千石以地里腳力送至窮邊則官費民勞何啻數倍詔吏部侍郎陳恕等議恕等謂江湖官賣鹽蓋近鬻海之地欲息犯禁之人今若通商任賣官鹽立乏一年課額冕議遂寢真宗時三司鹽鐡判官俞獻卿上言天下榖帛日益耗物價日益髙欲民力之不屈不可得也今天下榖帛之直比祥符初增數倍矣人皆謂稻苖未立而和糴桑葉未吐而和買自荆湖江淮間民愁無聊轉運使務刻剝以增其數嵗益一嵗又非時調率營造一切費用皆出於民是以物價積髙而民力積困也陛下誠以景德中西北二邊通好最盛之時一嵗之用較之天禧五年凡官吏之要冗財用之盈縮力役之多寡釋道之增減較然可知其利害也況自天禧以來日侈一日又甚于前夫巵不盈者漏在下木不茂者蠧在內陛下宜知其有損於彼無益於此與公卿大臣朝夕圖議而救正之帝納其言仁宗天聖八年上書者言縣官禁鹽得利微而為害博兩池積鹽為阜其上生木合抱數莫可較宜聽通商平估以售可以寬民力詔翰林學士盛度御史中丞王隨議更其制度因畫通商五利上之曰方禁商時伐木造船輦運兵民不勝疲勞今去其弊一利也陸運既差帖頭又役車户貧人懼役連嵗逋逃今悉罷之二利也船運有沉溺之患綱吏侵盜雜以泥沙硝石其味苦惡疾生重膇今皆得食真鹽三利也錢幣國之貨泉欲使通流富家多藏鏹不出民用益蹙今嵗得商人出緡錢六十餘萬助經費四利也嵗減監官兵卒畦夫傭作之給五利也明道二年參知政事王隨建言淮南鹽初甚善自通泰楚運至真州自真州運至江浙荆湖綱吏舟卒侵盜販鬻從而雜以沙土涉道愈逺雜惡殆不可食吏卒坐鞭笞徒配相繼而莫能止比嵗運河淺涸漕挽不行逺州村民頓乏鹽食而淮南所積一千五百萬石至無屋以貯則露積苫覆嵗以損耗又亭戶輸鹽應得本錢或無以給故亭户貧困往往起為盜賊其害如此願權聽通商三五年使商人入錢京師又置折博務於揚州使輸錢及粟帛計直豫鹽鹽一石約售錢二千則一千五百萬石可得緡錢三十萬以資國用一利也江湖逺近皆食白鹽二利也嵗罷漕運糜費風水覆溺舟人不陷刑辟三利也昔時漕鹽舟可移以漕米四利也商人入錢可取以償亭户五利也時范仲淹安撫江淮亦以疏通鹽利為言即詔知制誥丁度等與三司使江淮制置使同議皆謂聽通商恐私販肆行侵蠧縣官請敕制置司益漕船運至諸路使皆有二三年之蓄復天禧元年制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽在通楚泰海真揚漣水髙郵貿易者毋得出城餘州聽詣縣鎮毋至鄉村其入錢京師者增鹽豫之并敕轉運司經畫本錢以償亭户詔皆施行景祐中葉清臣上疏曰山澤有産天資惠民兵食不充財臣兼利草芽木葉私不得專封園置吏隨處立管一切官禁人犯則刑既奪其資又加之罪黥流日報踰冒不悛誠有厚利重資能濟國用聖仁恤隱矜赦非辜猶將弛禁緩刑為民除害度支費用甚大𣙜易所收甚薄刳剝園户資奉商人使朝廷有聚斂之名官曹滋虐濫之罰虛張名數刻蠧黎元建國以來法弊輒改載詳改法之由非有為國之實皆商吏協計倒持利權幸在更張倍求竒羡富人豪族坐以賈贏薄販下估日皆朘削官司之際俱非逺䇿臣切嘗校計茶利所入以景祐元年為率除本錢外實收息錢五十九萬餘緡又天下所售食茶并本息嵗課亦秪及三十四萬緡而茶商見通行六十五州軍所收稅錢已及五十七萬緡若令天下通商秪收稅錢自及數倍即𣙜務山場及食茶之利盡可籠取又況不費度支之本不置𣙜易之官不興輦運之勞不濫徒黥之辟臣意生民之弊有時而窮盛德之事俟聖不惑議者謂𣙜賣有定率征稅無彛準通商之後必虧嵗計臣按管氏鹽鐡法計口受賦茶為人用與鹽鐡均必令天下通行以口定賦民獲善利又去嚴刑口數出錢人不厭取寶元二年三司度支判官宋祁論三冗三費奏曰臣伏見西賊叛逆未即梟截申命將校警飭邊陲陛下日昃憂勤特軫調發內經聖慮旁咨羣謀臣誠不肖竊用感憤以為勇夫扞外儒者計內合為威略以行天誅則跳梁小醜指期烹醢故敢妄陳愚見以佐萬一臣聞兵以食為本食以貨為資在易聚人在書八政誠聖人所以一天下之具也以天下取之以天下用之量入為出故天子不得私焉傳曰足食足兵民信之矣今左藏無積年之鏹太倉乏三嵗之儲南方冶銅匱乏不發承平如此已自凋困其故何哉良由取之既殫而用之無度也臣不能悉知朝廷之經費且以臣素所見者言之何者大有三冗小有三費以困天下之財財窮而更欲興數十萬衆以事開邊無謀甚矣陛下誠能超然逺覽燭見根本去三冗節三費專偹西北之屯尚可曠焉髙枕無匱乏之患何謂三冗天下有定官無限員一冗也天下廂軍無征戰而耗衣食二冗也僧尼道士日益多而無定數三冗也不去不可為國今陛下下詔於此斷自今日僧尼道士已受戒具者且使如舊其在寺帳為徒弟子者悉還為民勿復嵗度而州縣寺觀留若干所僧尼道士定若干人且令後來之數不過此此䇿一舉可得耕織夫婦五十萬人則一冗去矣今天下廂軍不擇孱小尫弱悉皆收配本不知兵亦且月費廪糧嵗費庫帛數口之家不能自庇於是相挻逃匿化為盜賊者不可勝算朝廷每有夫役更藉農民以任其勞假如廂軍可令驅以就役方且别給口劵間望賜錢二端相率不便明甚陛下若敕天下廂軍今日以後除州軍須要防托别留三百人自餘更不收補已在籍者許備役作如此則中下之家悉入農業又得力耕者數十萬則二冗去矣國家郡縣素有定官譬以十人為額常以十二加之遷代罪謫足以無乏今則不然一官未缺十人競逐紆朱滿路襲紫成林州縣之地不廣於前而官五倍於舊吏何得不茍進官何得不濫除陛下誠能詔三班審官院內諸司流內銓明立限員以為定法自今以往門䕃流外貢舉之色實置選限稍務擇人俟有闕官計員補吏內則省息奉廪外則靜一浮華則三冗去矣何謂三費一曰道場齊醮無日不有若七日若一月若四十九日各挾主名未始暫停至於蠟蔬膏麵酒稻錢帛百司供億不可資計而主者旁緣利於欺攘故奉行崇尚峻於典法皆以祝帝夀奉先烈祈民福為名欲令臣下不得開說臣愚以為陛下上事天地宗廟次事社稷百神醴酪粢盛犧牲玉幣使有司端委而奉之嵗時而薦之足以竦明德於天極介多福於黔庶何必道場齊醮屑屑之報哉是國家抱虛以考祥小人誣神而獲利耳陛下若斷自聖慮取必不可罷者使略依本教以奉薰修開啓有時賜與有度則一費節矣二曰京師寺觀或多設徒卒或增置官司衣糧所給三倍他處帷幄謂之供養田産謂之常住不徭不役坐蠧齊民而又競飾神祠爭修塔廟皆曰不費官帑自募民財此誠不逞罔上之尤者夫民藏於國國藏於民財不天來而由地出也役不使鬼而待人作也捨國取民其傷一焉伏望陛下切敕州縣普令罷止則二費節矣三曰使相節度不𨽻藩要貪取公用全濟私家跡夫節相之建或當邊鎮或臨師屯公用之設所以勞衆而饗賔也今則不然罷黜大臣率叨使相安民都邑普䝉公用取生人資力為無功之奉養坐糜邦用莫此為甚伏望陛下寶惜名器使授受唯才自今地非邊要州無師屯者不得建節度已帶節度不得留近藩及京師則三費節矣三冗已去三費已節用度必饒臣又聞之人不率則不從身不先則不信陛下若能躬服至儉風示四方衣服醪膳無溢舊規請自乘輿始錦綵珠玉不得妄費請自後宫始然後天下響應民業日豐人心不搖師役可舉雖使風行電照飲馬西河蠢爾不庭可玩之股掌中矣寧與今日誅求財用課鹽𣙜茗為戚戚之計者同年而語哉臣誠狂妄不曉禁忌輕進愚䇿惟陛下赦其辜寶元間户部侍郎夏竦議國用疏曰臣聞四代而下莫隆乎漢漢莫盛乎文景觀乎國用亦以足矣古者什一而稅漢氏行田或三十稅一而錫賚勳戚動以萬計牛酒布帛米肉之賜屢至民間是時子弟分食租稅罕入縣官胸奴寇邊諸侯連祻兵革數起飛挽不絶官無鹽鐡之利門無舟車之算而民不告勞國用滋豐京師之錢貫朽難校太倉之粟腐敗不食阡陌之馬成羣守閭閻者食粱肉其故何哉國家開拓疆宇幅員億萬東南漸海西北暨戎內無列侯之國嵗無民間之賜茶鹽金鐡之利水陸關市之征履畝而稅𣙜酒而酤即山鑄錢臨海市舶一嵗之入十倍漢初而用度區區未能豐羡非事勢不足抑取與之未至蓋夫民樂負販俗尚奢泰十夫里居遊手大半仙釋之蠧巫覡之耗并兼之害吏胥之暴旦夕而有故元元爭欲採山煮海執技列肆以邀美利怠棄隴畝未始禁之及其俗弊將若之何夫文景之世賤商賈通關梁上敦儉素之化下無佛老之弊去肉刑舉賢良削父子相坐之律除誹謗妖言之罪耕籍田以勸農業降惠令以開民利減服御損郎吏惜十金於露臺施瓦器於霸陵伐馳道填蘭池人無禁錮之律馬無食粟之幸采金銀珠玉者坐以贓盜論故人人自樂趣本去末服勤嗇事百姓足矣君孰不足皇家休息四海五十年間遭遇陛下天意淵默聖政日躋承二帝之基當文景之辰四夷拭目仰觀太平伏願鑒漢興之事隆聖宋之業去無益禁遊惰擇良吏敦稼政儉以率下簡以御物儉則用足簡則文寬用足則生厚文寬則俗阜春秋之義王者體元以居正體元足以御大中居正足以簡嗜欲建大中則簡自至矣節嗜欲則儉自至矣倣文景之治體春秋之義孜孜為善雖休勿休不十年間則國用充牣風俗敦厚仁義可行法令可措猶將與三代相上下豈止於漢氏之比哉竦上量支費疏曰伏以年有上下禮亦隆殺先王正其版圖經其稅賦以民體國以時計用王制曰冡宰制國用必於嵗之杪視年之豐耗量入以為出故雖有兵革之費旱蝗之變上無闕供廢事之虞下無卒賦暴斂之患治天下者宜乎念之國家體古立制裁義創規愛育元元思臻至治而兵戈肆擾洊食邊陲比年以來國用滋耗至於鬻官爵於豪右市縑素於州郡滯榖之家競竊薦紳之號行濫之輩爭為翔踴之價貪夫之志益驕吾民之生滋薄雖為倉卒之權頗誤太平之德況太祖經始太宗緝熙陛下纂嗣王澤下流五十年間萬國無事山海之利桑榖之賦日以萬數月以億計若何邊騎之塵才動塞垣而錢榖之吏便設權宜臣切為陛下惜之於戲天下皆知取之為取而不知與之為取夫民逐利如水投下當登榖之日載績之時貴更其直五分益一則稻粱山積豈須善選布帛雲委何待彊率圖難於易豈不在兹誠當各詔司存預謀用度量國之出入視年之豐凶削冗事而正彛倫去權宜而就經久無使漢道有雜霸之名則萬世幸甚竦為三司使又上平管𣙜疏曰伏以齊桓彊主夏盟始議鹽鐵漢武外事開邊乃興管𣙜魏晉周隋㳂革非一唐氏因之兼增𣙜數貞元之際復行茶稅山海之饒盡於國矣夫天地之利與民共之藏財於民非欲盡取故曰民之不足君孰與足又曰百姓足矣君孰不足蓋君以民為心民以君為體未有心勞而體逸支瘠而身壯者也國家富有征稅充牣府藏雖君王之心務推寬大而聚斂之臣競為苛細刻取羡餘不知紀極至於海濵之民食無鹽滋山居之人飲無茶味若有負販必與吏共是網密於平民而法寬於姦猾𣙜酤之制近年尤急或增見在之課或追已亡之額或明下詔條募相剗奪所入至微而爭端鋒起州縣之獄自此滋豐切為陛下惜之夫管𣙜不可廢可以平其法法不必急急則民望於上亦不必緩緩則利歸於下在任廉平之官使喻朝廷之意削除冗制務存大體上不虛國下不迫民則政在其中矣孟子曰文王之囿七十里人以為小蓋與民共之也夫以利共之以道取之以禁防之以籍正之遍行而不盡雖禁山錮海而民不為怨矣慶厯三年右正言余靖論河北𣙜鹽疏曰臣切聞臣寮上言禁𣙜河北鹽貨以收遺利者臣切以前嵗事宜已來河北之民揀㸃義勇強壯及諸色科率數年之間未得休息臣常痛幽薊之地陷於敵人幾百年而民忘南顧之心者敵國之法大率簡易鹽麴俱賤科役不煩故也昔者太祖皇帝特推恩意以惠河朔故許通鹽商止令收稅今若一旦𣙜絶價必騰踴民茍懷怨悔將何及伏緣河朔土多鹽鹵小民稅地不生五榖唯刮鹻煎之以納二稅今若禁止便須逃亡鹽價若髙犯法必衆邊民怨望非國之福伏乞且令仍舊通商無輒添長鹽價以鼓民怨侍讀學士歐陽修上奏曰臣風聞轉運使吕紹寧才至淮南便進見錢十萬貫不知是否臣見兵興以來天下困弊者非獨備邊之費半由官吏壞之今三司自為闕錢纍於東南剗刷及以榖帛回易則南方庫藏豈有剩錢閭里編民必無藏鏹故淮甸近嵗號為錢荒不知紹寧才至淮南用何術於何處得此錢以進若將官庫錢上進則逐州合使錢處甚多必致闕乏若於民間科率則人力豈任且十萬緡錢國家得之所益至微外處取之為害不細往年李定王逵輩皆刻剝疲民進奉至今南方嗟怨況今年江淮王倫大驚劫後繼以蝗旱為孽民間困窘尤要撫存而紹寧欺罔朝廷妄有進獻伏乞别降㫖揮下别路選差一精强官將淮南一路見管錢帛磨勘大數取見紹寧所進何處得來茍涉欺妄乞賜重行朝典其所進錢伏乞聖慈拒而不受以彰朝廷均恤外方防禦姦吏刻剝之意嘉祐五年修又上奏曰臣伏見朝廷近改茶法本欲救其弊失而為國誤計者不能深思逺慮究其本末惟知圖利而不圖其害方一二大臣鋭於改作之時樂其合意倉卒輕信遂決而行之令下之日猶恐天下有以為非者遂直詆好言之士指為立異之人峻設刑名禁其論議事既施行而人知其不便者十蓋八九然君子知時方厭言而意殆不肯言小人畏法懼罪而不敢言今行之踰年公私不便為害既多而一二大臣以前者行之太果令之太峻勢既難回不能遽改而士大夫能知其事者但騰口於道路而未敢顯言於朝廷幽逺之民日被其患者徒怨嗟於閭里而無由得聞於天聽陛下聰明仁聖開廣言路從前容納補益尤多今一旦下令改事先為峻法禁絶人言中外聞之莫不嗟駭語曰防民之口甚於防川川壅而潰傷人必多今壅民之口已踰年矣民之被害者亦已衆矣古不虛語於今見焉臣亦聞方改法之時商議已定猶選差官數人分出諸路訪求利害然則一二大臣不惟初無害民之意實亦未有自信之心但所遣之人既見朝廷必欲更改不敢沮議又志在希合以求功賞傳聞所至州縣不容吏民有所陳述直云朝廷意在必行但來要一審狀爾果如所傳則誤事者在此數人而已蓋初以輕信於人施行太果今若明見其害救失何遲患莫大於遂非過莫深乎不改臣於茶法本不詳知但外論既喧聞聽漸熟古之為國者庶人得謗於道商旅得議於市而士得傳言於朝正為此也臣切聞議者謂茶之新法既行而民無私販之罪嵗省刑人甚多此一利也然而為害者五焉江南荆湖西浙數路之民舊納茶稅今變租錢使民破産亡家怨嗟愁苦不可堪忍或舉族而逃或自經而死此其為害一也自新法既用小商所販至少大商絶不通行前世為法以抑豪商不使過侵國利與為僭侈而已至於通流貨財雖三代至治猶分四民以相利養今乃斷絶商旅此其為害二也自新法之行稅茶路分猶有舊茶之稅而新茶之稅絶少年嵗之間舊茶稅盡新稅不登則頓虧國用此其為害三也往時官茶容民入雜故茶多而賤遍行天下今民自買賣須要真茶真茶不多其價遂貴小商不能多販又不暇逺行故近茶之處頓食貴茶逺茶之方向去更無茶食此其為害四也近年河北軍糧用見錢之法民入米於州縣以鈔算茶於京師三司為於諸場務中擇近上場分特留八處專應副河北入米之人翻鈔算請今場務盡廢然猶有舊茶可算所以河北和糴日下未妨切聞自明年以後舊茶當盡無可算請則河北和糴實要見錢不惟客旅得錢變轉不動兼亦自京師嵗嵗輦錢於河北和糴理必不能此其為害五也一利不足以補五害今雖欲減放租錢以救其弊此特寬民之一端爾然未盡公私之利害也伏望聖慈特詔主議之臣不護前失深思今害黜其遂非之心無襲弭謗之跡除去前令許人獻說亟加詳定精求其當庶幾不失祖宗之舊制臣冒禁有言伏待罪責慶厯六年監察御史張方平論河北𣙜鹽奏曰臣伏見河北諸州所産鹽貨自太祖開寶年降詔罷禁通商止令收稅于今多年民享其利昨聞臣寮擘劃欲𣙜買滄濵鹽入官召商旅入中邊上糧草算請且欲𣙜滄濵鹽即須禁止諸州小鹽不禁則侵官中課利若禁則十數州軍從此民必受弊何者河北一路除滄濵出鹽外其深冀邢洺等十數州地多醎鹵不可耕植民唯以煮小鹽為業衣食賦稅皆仰於此若禁斷一旦窮民失業散而為盜則所虞非細近因朝廷指揮下本路都轉運司相度事雖未行民心已致疑惑況本路諸色鹽官中久來各已定起稅額每年所入課利數亦不少今雖改用𣙜法或商旅未信不來算請所得年額未必增兼聞都轉運使魚周詢己條具利害論列亦云𣙜法不可行而止乞增稅臣切謂此舉於事體利害最大其臣寮所請𣙜鹽且乞停罷如朝廷已議不行猶恐彼處民或未知亦乞指揮下本路諸州軍告諭人民以朝廷今來比用舊例不復行禁𣙜之意使一方之人各安生業方平又論民力大困起於兵多奏曰臣昨曽約計天下財利出入之籍知天下之所以困本於兵因勘㑹自寶元慶厯後內外增置禁軍嵗給錢帛糧賜等數進呈乞朝廷圖議其事有以弛張之伏以太祖皇帝取荆潭收巴蜀廣南江南備晉寇禦西戎契丹計所蓄兵不及十五萬國初得周兵十二萬後平蜀揀其精兵止留一百二十人及乾德中選揀中外之兵止存十萬蓋極精鋭也後乃益增及十五萬兵爾太宗皇帝平太原備逆賊禦契丹科簡軍旅增修兵備志在收取燕薊然蓄兵不過四十萬人先皇咸平中備逆賊禦契丹搜募戰士至五十餘萬人及契丹請和祥符以後稍稍銷汰弛牧馬地給耕民先帝嘗語宰臣曰天下兵馬之數雖不少精鋭者鮮且今之兵與古不同古者三時務農一時教戰民即兵矣今皆坐得衣食國家經費至廣不可不謹於選練向敏中曰軍額漸多農民轉耗近准詔㫖已住召募斥去疲老退減冗食矣帝曰卿等常宜講求務為經久之要邊將占兵自固者輒罷之先帝常詔環慶路減神勇兵還營周瑩言當路兵數非多未敢便減上曰西邊雖得芻糧每嵗役民輸運瑩無心惜民亦可知矣即以曹緝代之至於寶元幾四十年可謂乂安矣向因夏戎阻命始籍民兵俄命刺之以補軍藉遂於陜西河北京東西增置保捷武衛宣毅等軍保捷一百八十五指揮武衛七十四指揮宣毅二百八十八指揮此其尤多者他不具載既而又置宣毅於江淮荆湖福建等路淮南三十二兩浙二十二江東十三江西十七湖北十七湖南十一福建十二指揮凡內外增置禁軍約四十萬餘人通朝舊兵且百萬其鄉軍義軍州郡廂軍諸軍小分半分剩員等不列于數連營之士日增南畝之民日減邇來七年之間民力大困天下耕夫織婦莫能給其衣食生民之膏澤竭盡國家之倉庫空虛而此冗兵狃於姑息寖驕以熾漸成厲階然且上下恬然不圗正救惟恐招置之不多也且太祖訓兵十萬人以定天下今以百萬人為少此無他耳各茍及身之安莫為經久之慮也夫茍且者臣下及身之謀經久者陛下國家之計今負販之家猶汲汲於儋石之備安有慮不經久而可以保天下者哉比嵗以來三路入中糧草度支給還價錢常至一千萬貫上下邊費如此何以枝梧臣較今大計加之百萬不為益減之百萬不為損而比來鬻官六千緡者與簿尉萬緡則殿直諸監管場務官準課程以立賞格收贏至三二千緡即以次遷陟不知賣官遷官幾何員數可供三路一嵗糧草之費是謂聚畎澮之微供尾閭之泄也淺陋之人更言遺利以裨經用未已夫財計盈虛國事安危繫之而已矣景祐以前兵五十萬三司財用無餘及今而加一倍則何以得足臣近約度今年在京支計前已進呈只是準擬常程用度圓融變轉僅以有備過此以往若更因之以橫費加之以饑饉雖有智者亦恐難以善其後矣況臣之愚敢期克濟惟社稷之福祖宗之靈陛下至仁盛德有以感格天地降之以善祥報之以有年則兆民之所賴也若觀諸人事臣愚切甚寒心伏望令中書樞密院檢書臣前奏審知計議裁於聖斷早為之所猶須效在纍年之後如救焚溺緩則益不及矣歷代名臣奏議卷二百六十三
