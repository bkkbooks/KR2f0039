body:
  text: 歷代名臣奏議卷二百十明楊士竒等撰法令宋太祖時大理正髙繼申上言刑統名例律三品五品七品以上官親屬犯罪各有等第減贖恐年代已深不肖自恃先蔭不畏刑章今犯罪身無官須祖父曽任本朝官據品秩得減贖如仕于前代凡有功惠及民為時所推歷官三品以上乃得請從之時竇儀進刑統表曰臣聞虞帝聰明始恤刑而御物漢髙豁逹先約法以臨人蓋此丹書輔于皇極禮之失則刑之得作於涼而弊于貪百王之損益相因四海之準繩斯在如銜勒之持逸駕猶郛郭之域羣居有國有家其來尚矣伏惟皇帝陛下寶圖攸屬駿命是膺象日之明流祥光於有截繼天而王垂洪覆于無疆乃聖乃神克明克類河圖八卦惟上德以潛符洛書九章諒至仁而默感哀矜在念欽恤為懷網欲自密而踈文務從微而顯乃詔執事明啓刑書俾自我朝彌隆大典貴體時之寬簡使率土以遵行國有常科吏無敢侮伏以刑統前朝創始羣彥規為貫彼舊章采綴已從於撮要屬兹新造發揮愈合于執中臣與朝議大夫尚書屯田郎中權大理少卿桂國臣蘇曉朝散大夫大理正臣奚嶼朝議大夫大理寺柱國臣張希遜等恭承制旨同罄考詳刑部大理法直官陳光乂馮叔向等俱效檢尋庶無遺漏夙宵不怠綴補俄成舊二十一卷今并目録增為三十一卷舊疏議節略今悉備文削出式令宣敕一百九條别編或歸本卷又編入後來制敕一十五條各從門類又録出一部律內餘條準此四十四條附名例後字稍難識者音于本字之下義似難曉者并例具别條者悉注引於其處又慮混雜律文本注並加釋曰二字以别之務令檢討之司曉然易逹其有今昔浸異輕重難同或則禁約之科刑名未備臣等起請捴三十二條其格令宣敕削出及後來至今續降要用者凡一百六條今别編分為四卷名曰新編敕凡釐革一司一務一州一縣之類非干大例者不在此數草定之初尋送中書門下請加裁酌盡以平章今則可否之間上繫宸鑒將來若許頒下請與式令及新編敕兼行其律并疏本書所在依舊收掌所有大周刑統二十一卷今後不行臣等幸偶文明謬參憲法金科奧妙比虧洞逹之能丹筆重輕徒竊討論之寄將塵睿覽唯俟嚴誅太宗端拱初廣定軍民安崇緒𨽻禁兵訴繼母馮與父知逸離今奪資産與己子大理當崇緒訟母罪死太宗疑之判大理張佖固執前斷遂下臺省雜議徐鉉議曰今苐明其母馮嘗離即須歸宗否即崇緒準法處死今詳案內不曽離異其證有四況不孝之刑教之大者宜依刑部大理寺斷右僕射李昉等四十三人議曰法寺定斷為不當若以五母皆同即阿滿雖賤乃崇緒親母崇緒特以田業為馮強占親母衣食不給所以論訴若從法寺斷死則知逸何辜絶嗣阿滿何地托身臣等議田産並歸崇緒馮合與滿同居供侍終身如是則子有父業可守馮終身不至乏養所犯並準赦原詔從昉等議真宗時龎籍擢群牧判官因轉對上言曰舊制不以國馬假臣下重武偹也樞密院以帶甲馬借內侍楊懷敏群牧覆奏乃賜一馬三日乃復借之數日而復罷樞密掌機命反覆乃如此平時百官奏事上前不自批章止送中書樞密院近嵗璽書內降寖多于舊無以防偏請杜幸門矣往者王世融以公主子毆府吏法當贖金特停任近作坊料物庫主吏盜官物輒自逃避以宫掖之親三司遽罷追究今日聖斷乃異于昔臣竊惑焉祥符令撿下稍嚴胥吏相率空縣而去令坐罷免若是則清強者沮矣久之出知秀州三司使丁謂上奏曰臣準詔開封府民吳遂違制造蹙金服已決訖準别敕配𨽻令三司申明舊禁者切以儉以制用有國之彛典奢則不遜庶民之大防國家撫育黎元務厚風俗而輦轂之下㕓肆相望競造金箔用求厚利況山澤之寶所得難致儻縱銷鎔實為虛費今約天下所用嵗不下十萬兩惜此上幣棄於下民雖王者居尊不貴難得之貨而有司守職須條革弊之方自今金銀箔線貼金銷金泥金間金蹙金線金裝貼什器土木玩用之物並請禁斷非命婦不得用為首飾冶工所用器悉送上官違者所在捉搦許人糾告並以違制論告者給賞錢仍以犯人家財充仁宗時知洪州夏竦上奏曰臣聞左道亂俗妖言惑衆在昔之法皆殺無赦蓋以姦臣逆節狂賊失規多假鬼神搖動耳目漢之張角晉之孫恩偶失防間遂至屯聚國家宜有嚴制以肅多方竊以當州東引七閩南控百粵編氓右鬼舊俗尚巫在漢欒巴已嘗翦理爰從近嵗傳習滋多假託禨祥愚㺯黎庶勦絶性命規取貨財皆於所居塑畫魑魅陳列幡幟鳴擊鼓角謂之神壇嬰孺襁褓已令寄育字曰壇留壇保之類及其稍長則傳習祅法驅為僮𨽻民之有病則門施符篆禁絶往還斥逺至親屏去便物家人營藥則曰神不許服病者欲食則云神不聽飱率令疫人死于飢渴洎至亡者服用又言餘祟所憑人不敢留規以自入若幸而獲免家人所資假神而言無求不可其間有孤子單族首面幼妻或絶户以圖財或害夫而納婦浸淫既久習熟為常民被非辜了不為怪奉之愈謹信之益深從其言甚於典章畏其威重于官吏竒神異像圖繪嵗增邪籙祅符傳寫日夥小則雞豚致祀斂以還家大則歌舞聚人餕其餘胙婚葬出處動必求師劫盜鬬爭行須作水蠧耗衣食眩惑里閭設欲扇搖不難連結在於憲典具有條章其如法未勝姦藥弗瘳疾宜頒峻典以革祅風當州師巫一千九百餘户臣已勒令改業歸農及攻習針灸方脈所有首納到祅妄神像符籙神衫神杖魂巾魂帽鍾角刀笏紗羅等一萬一千餘事已令焚毀及納官訖伏乞朝廷嚴賜條約所冀屏除巨害保宥羣生杜漸防萌少裨萬一竦為刑部侍郎奏曰臣聞易曰乾以易知坤以簡能易知則有親易從則有功易簡而天下之理得矣得天下之治者莫長於堯而盛於舜聖政所躋其易簡乎易則可親可親則大簡則可守可守則久政大而久則皇極建矣國家觀天制法省風設教五十年間致民富夀但俗虧畫一之法官微長守之規因事頒條隨時立制規利之政細析秋毫管𣙜之法如束溼薪或令出未暮而復罷詔下踰嵗而復更或因徼幸之民妄言利害披米鹽之事擲銖兩之姦每煩詔條頒下郡國或連三司衆官之議列前後貫約之文接簡連牘動盈傳置吏得因緣為姦上下其手以是而觀恐非至治漢初約法三章治定而益其六文景循守幾至刑措武昭之後逮漢之東制度滋繁刑無定罪新魏之釁自此而生蓋國不可多制多制則法網紊煩政不可頻易頻易則民意疑二先王利不百則不變法蓋示民以久大也書曰無作聰明亂舊章老𥅆曰法令滋彰盜賊多有誠哉是言也伏願陛下觀堯舜之治推易簡之政分詔能吏刋一制度垂之萬世永為著定若民有不便事須更張則詔曰某事可如此某事可如彼枝辭繁議一切勿用表公朝之大體示聖功之可久令法家無出入之弊下民知嚮背之方率土溥天于焉康阜竦又議刑書狀曰臣聞先王象震耀而行殺戮法五材而用法辟刑書之設有自來矣虞舜定五流之罪皋陶制三尺之法禹刑興於有夏湯刑作於商世吕命陳三千之屬李悝創六篇之制衛鞅之行變法鄼侯之約九章漢景之定箠令應劭之習駮議陳群之著魏法賈充之刋晉律陳氏則徐陵之因損元魏則伯泉之校核後周則拓拔之詳定隋室則髙熲之評議李唐損益其科多所釐革皆以恢張憲綱表正隄防欲姦吏盡絶于析言齊民不憂于誤陷蓋念刑難復續死不更生獄成兩造律正五刑欵辨既周杳不可變哲王所以惟恤良臣所以疚心但棘木無夜哭之魂則四海受蓼蕭之惠國家號令天下條憲咸逹法家之文或未評定律令格式之科刑統編敕之條棼類相雜矛楯不同姦吏有市法之門丹筆有悮書之罪由是或刑因勢放獄以賄遷稍關科條多從比附或因循宦路不習憲章但記不應得為之條以決下民故失之罪貧則從重富則從輕以是而觀刑多出入况鄉閭嚚訟始自縣廷而琴堂頗闕於刑書報罪致乖于準的未契皇朝好生之化有辜陛下恤刑之德誠宜聚刑憲之書求讞議之士詔擇能臣督其詳定疑者正之二者一之闕者備之繁者省之輕者加之重者減之總制書禁止之事會刑統起請之條及格式律令聚為一書罪必定刑科無虛設明分條目同其差異命工繕寫重加考核名之宋律遍下州縣令開卷無可疑之罪結獄絶舞文之路為皇家畫一之法垂萬代不刋之典惟聖作則兆民賴之故書曰惟刑惟法其審克之禮曰悉其聰明致其忠愛以盡之易曰君子以明慎用刑而不留獄其是之謂矣竦為吏部尚書又奏曰臣聞帝德法天地號令象四時八世之君靡不攸行春夏去桎梏無肆掠挺重囚出輕繫秋冬征不義嚴號令察阿黨校田獵蓋陽德發生長育在候靜事無刑以順景風商氣肅殺閉塞成功論獄報罪以準隂德漢制春夏不論重刑新莾盛夏殺人于市萬方怨咨不勝其虐蓋王者不可忤天時忤天時則民怨民怨則和氣戾和氣戾則旱蝗妖眚無所不至矣易曰仰觀乎天俯察乎地禮曰應乎天而順乎人語曰唯天為大唯堯則之詩曰不識不知順帝之則書曰欽若昊天歷象日月星辰皆謂王者法天之道也國家應運承統光啓三聖布和行惠澤潤幽遐但論決之科有殊經義下臣愚昧私心疑惑伏願陛下隆守成之規議變法之惠詳觀六籍取法四時頒詔郡國著為定式應立春以後立秋以前不報死刑式符時令俾萬方知好生之德天和無傷戾之妖世而後仁誠在斯日右司諫劉隨乞禁夜聚曉散及造儀仗事神狀曰臣聞好生惡殺往聖之大猷先德後刑前經之令範成兹盛美允屬公朝臣近知侍御史李應言等制勘京東李定祿等公事干連甚衆具獄聞奏兩宫聖慈特加欽恤除首四人悉從寬典所謂好生之德洽於民心朝野聞之無不相賀臣久歷外任粗知其由閭閻之中似此多矣不食葷血迷謬相傳誘之以天堂怖之以地獄夜聚曉散謂之修善無識之民多陷邪僻原其本情皆為妄求佛果也目為不軌恐涉非辜愚迷者不知國法所禁捕盜者但以發姦為公卒逢捕掩之期遂求奔竄之路計窮拒捍或騁凶粗捶拷及身詿誤不少聖情軫念昭雪至多足以見泣辜推仁感召和氣也臣又伏見京東羣民間有拜嶽大會率斂財物千百為群造作王者儀仗及有真假兵器結束人物私自推補僣侈相尚搔率户民原其本情皆為妄求福祐也若不嚴行禁制深慮别長姦凶或因捉搦送官恐將指為叛逆既有乘輿之物獄官何以申明若遂置于深刑實慮成于枉濫各宜曉諭庶絶澆訛且夜聚曉散之徒為其虧損風教已有條制頭首及強梁者處死造乘輿兵器祀神者慮其凶黨竊發所宜特降明文臣欲乞似此違犯其頭首及強惡者並從違制本法科罪率從者勿治仍乞以此二事散下諸道令鄉村要路粉壁書寫重新曉諭使民知禁不陷刑章庶明善教之方用廣率人之化宋庠上奏曰臣竊見當今正稅之外雜賦至繁詭制異科醜名暴斂原其所自由來甚邇蓋自唐室解紐五朝挺災孱王僣侯盜據方國壞合徹之典取一切之宜掊剋無厭禁令自出於是有身丁地頭之賦農具牛皮之征鬻酒則户出麴錢煮海則家增鹽價雖與民更始而弊制尚存官司因循憚于改作故使堯舜之代無桀貉之中雖臣之愚竊以為過今縱不能蕩滌橫賦以寬民財猶當釐易舊名少近王道臣愚以謂可取雜名稅錢及沿納之色不移舊數合為一號削去季世剝害之品作為我朝較畫之法示之于民則耳目易曉委之于吏則條貫難欺録於官曹則文籍不煩供乎財用則稱謂差美比舊入無秋毫之損作新規有指掌之易丕變訛謬垂于經常實天下之幸如允臣所見乞下三司令子細勘會見今天下諸雜稅錢外沿納錢名目貫百聞奏然後取其實數併為一號逐年折變自從舊法斯皆防患制法遭時垂統者也臣伏見國朝以來詔數下而建條比牒連名充曹牣府煩科碎目與日而滋每罰一辜斷一事有司引用皆連篇纍牘不能遍舉率不數嵗則别加論次謂之編敕蓋欲條貫飭盡綱目畢張大可含元細不容髮而抵冒未絶風流寖濫一令之下則姦生令表一禁之出則罪出禁先示於人則若教猱施於事則如凝網此皆不徇其本而求之于末將欲措刑辟躋仁夀者不亦難乎夫恢恢有條重而必罰者本也事事曲制輕而易犯者末也本不舉則巨猾僥幸末專任則細民罹災今之詔條病在于此陛下幸加大惠惜皇猷之未暢深詔執事精核舊文欲因盛時遂定丕律臣以謂不一勞者不永逸無逺慮者必近憂今雖定之後必復改何則制度不立而賢愚雜議故也為之計者莫若盡取見行詔敕與律文相校律有本條而敕意小異者則改而入律律無本條而名項别立者則編而為敕況唐律之內廢條已多若擲去舊文益作新例亦前王損益之常也人情不能無過王道禁乎太察其約束之煩語官司之小禁宜一除蕩蓋去之不足害治體存之徒以飾罪梯法輕不能繩姦豪文密足以汚良善臣又聞王者之制揭若日月動如雷霆其言易而文其禁切而廣伏見今之編敕者繁長猥俗與府縣文移無異用字乖舛遣辭重復寧所謂明白溫醇之旨耶實由不專任逹識大儒而多用執法之吏夫法吏者奉行其法可也寧制法之人哉古人有言治國如治家耕當問奴織當問婢今欲與法吏謀致治之本是猶使奴織而婢耕要其成功不可得也臣欲乞專委鴻博之老及輔弼大臣商較敕條略依律文為體裁其辭句第其輕重約其義明其文布四海使識朝廷之尊傳萬世俾知文雅之盛仍自今以往有臣庶上言欲釐改舊法建設條禁者願陛下慎其俞旨必先付之兩府參之羣吏若前條確見其短今文率以為便可行于經久者即下兩制令以所陳之狀去其蕪雜取其精意倣約律令著為章程若事止苛文不足發明利害者皆寢而勿報如此則法不數變而民知所措矣多言者必難臣曰今若依律令以為敕天下官吏必不能曉臣對曰今天下所頒律令曹局小吏猶能引用則似律之敕獨不能曉耶此膠柱之論也又必難臣曰夫詔敕者多先帝所定而不當改作臣對曰凡詔敕之設本臣庶上陳之見耳寧一出先帝之口哉況聖人以便利萬物為至仁不因循陳迹為至孝且太宗皇帝改建隆之敕真宗皇帝革興國之法是皆不可乎此守株之談也臣又聞事不師古商典實譏必也正名魯堂攸訓雖文質異尚沿襲有宜至于辨尊卑分職業其實一也竊見國朝故事自使相及左右僕射以上出典州郡者皆曰判六尚書節度使以下者皆曰知蓋以謂僕射而上品秩隆重藩鎮之任地望卑逺故以尊臨卑者判其事以小任大者知其職及除佐官則例曰同判之職自京官以上皆可任焉今六尚書知州于上京官判州于下名既不順理亦無稽而又朝廷之儀臺省為重近緣苟且寖失典刑尚書都省尚書令之職也今兩省五品以上皆得權判刑部流內銓皆尚書侍郎之職今或以知雜御史判銓事或以升朝官判刑曹自餘卿監之司小官判者多矣夫下邦支郡大臣不得判天臺帝省小臣得判之是重諸侯之藩而輕天子之吏臣竊以為過矣又府史者二人之名也故自周禮至唐令有其任者皆曰府若干人史若干人今寺監見有其人則併稱府史此雖小吏而名不師古亦朝廷之所惜焉幸陛下詔有司案前典謬者正之顛者序之而已雖未能復治古之法亦一時之制也右臣所懷狂瞽悉已條述惟陛下財幸蘇舜欽上疏曰臣謹按前志曰白事之吏民之仇讎又云急吏緩民則是吏不可縱政之大防也臣竊見州縣之吏多是狡惡之人窺伺官寮探刺旨意清白者必多方以誤之貪婪者則啖利以制之然後析律舞文鬻獄市令上下其手重輕厥刑變詐竒邪無所不作茍或敗露立便逃亡稍候事平復出行案設有強明牧宰督察太嚴則締連諸曹同日亡命或獄訟未具遂停鞫劾賦稅起納無人催驅近年已來習成此弊官長務從姑息恐失大計見其邪濫不敢以法繩之況此輩凶人惟利是嗜每糾以嚴憲尚不悛心何況縱之使亂正法實政理之巨蠧黎民之害焉人雖切齒無可奈何蓋緣國家别無敕條以加檢束臣欲乞今後州縣曹司有闕並于第二人户上選差仍令每五人互相為保或逃亡者立差官籍其家財量取充賞募人收捉或遇赦首身亦乞流配别郡如此則不敢公然作過以紊政經舜欽又上疏曰臣聞巨壑雖深獸知所避烈火至猛人無蹈死故厯塊而蹶者皆是玩水而溺者有之古垂此言以諭刑辟昔者聖人惡殘賊之害良民也故明設嚴刑大張憲網必使易避而難犯防微而杜原約之不至煩苛威之以令畏懼姦凶之輩翻然革心固而行之自然刑省苟務矜貸則冒禁者繁竊見官吏多犯贓汚乃由朝廷法制稍寬貪鄙因緣為弊凡中人之性本非大凶皆以禁約不嚴是為貨利所沒手提刑憲人不敢言心恣誅求下受其困夫殺人者死傷人者刑古今之制也殺傷之害不過數人今貪吏在官民皆受苦雖有轉運提刑位皆尊崇罕與民接詢訪官吏鮮得實情茍無訟端莫可發摘知者或欲陳告又非干己臣欲乞今後官典犯入己贓許諸色人陳論得實者以其贓充賞如此則必畏多言之人亦防十目之視荀卿所謂威厲而不誡刑嚴而不用此其得之矣右正言吳育乞禁匿名文字狀曰臣伏見近年以來多有造作讖忌之語疑似之文或不顯姓名暗貼文字恣行毁謗以害讎嫌或密聞朝廷自謂忠赤若是公直無隱何不指事明言若憑虗造作必藴邪謀更與隱祕姓名正使姦人得計臣恐自今忠良立身易為傾陷國家舉事便欲動搖惑君害時無大于此在古之法皆殺無赦雖然陛下聰明必不熒惑亦不可使聖朝長此風俗右司諌韓琦乞止絶內降狀曰臣竊以國家祖宗以來躬決萬務凡于賞罰任使必與兩府大臣于外朝公議或有內批指揮皆是出于宸衷凡自章獻明肅皇后垂簾之日有奔競之輩貨賂公行假託皇親因緣女謁或于內中上表或只口為奏求是致僥幸日滋賞罰倒置法律不能懲有罪爵祿無以勸立功唐之斜封今之內降臺綱寖壞為害至深陛下聖德日新厲精為治惟此久弊沿而未除臣竊謂固非陛下聖恩聽其妄請必謂付外之後自有攸司執奏而止其如中旨或至再三不容一一論正臣欲乞特降詔今後除諸宫宅皇族有己分事方許于內中奏陳自餘戚里之家及文武臣僚或有奏請事件並于閣門及合屬去處進狀更不於內中批旨輒敢因緣請託及自于內中請乞特批旨揮即望降出姓名并為奏求人送有司勘劾重行貶責犯者斷在必行如此則聖政無私朝規有敘右正言孫沔乞詔令先定議而後行狀曰臣竊聞景德中知制誥朱巽上言以所降命令不可屢改應合更張請先定議如經久可守者行之不可者止之真皇謂宰臣曰此甚識治體卿等志之故景德祥符之間每下詔令皆可遵守竊見近來臣僚凡有起請或陳利害隨即頒布略無詰難或未踰時或方經月有稱未便又復衝變去嵗暴收錢稅今春權罷度僧之類是也故使如綸之言渙汗之號民未嘗以為必信恐非國家致治之道也臣欲乞今後中外臣僚有所見聞陳請者若言禮樂即下太常禮院言刑名即下審刑院言天下錢榖即下三司言民間利害即下轉運司小事半月中事一月仰所屬衆官將前後敕條詳定奏上如係制度大事即下兩制尚書省集議委中書門下更加省察然後施行亦朝廷謹重之意也知諫院歐陽修乞禁止無名子詩傷毁近臣狀曰臣竊見前年宋庠等出外之時京師先有無名子詩一首傳于中外尋而庠罷政事近又風聞外有小人欲中傷三司使王堯臣者復作無名子詩一篇略聞其一兩句臣自聞此詩日夕疑駭深思事理不可不言伏以陛下視聽聰明外邊事無小大無不知者竊恐此詩漸廣須逹聖聰臣忝為陛下耳目之官不欲小人浮謗之言上惑天聽合為論列以杜姦讒況自兵興纍年繼以災旱民財困竭國帑空虛天下安危係於財用虛實三司之職其任非輕近自姚仲孫罷去之後朝廷以積年蠧弊貧虛窘乏之三司付與堯臣仰其辦事乃是陛下委信責成之日堯臣多方展效之時臣偹見從前任人率多顧惜祿位寧可敗事于國不肯當怨於身如堯臣者領職以來未及一月自副使以下不才者悉請換易足見其不避嫌怨不徇人情竭力救時以當身事今若下容讒間上不主張則不惟才智之臣無由展效亦恐忠義之士自兹解體臣思作詩者雖不知其姓名竊慮在朝之臣有名位與堯臣相類者嫉其任用故欲中傷只知爭進于一時不思沮國之大計伏自陛下罷去吕夷簡夏竦之後進用韓琦范仲淹以來天下欣然皆賀聖德君子既蒙進用小人自恐道消故只喧然務騰讒口欲惑君聽欲沮好人不早絶之恐終敗事況今三司蠧弊已深四方匱乏已極堯臣必須大有更張方能集事未容展效已被謗言臣近日已聞浮議紛然云堯臣更易官吏専權侵政今又造此詩語搖惑羣情若不止之則陛下今後無以使人忠臣無由事主讒言罔極自古所患若一啓其漸則扇惑羣小動搖大臣貽患朝廷何所不至伏望特賜詔書戒勵臣下敢有造作言語誣訐隂私者一切禁之及有轉相傳誦則必推究其所來重行朝典所貴禁止讒巧保全善人修又上奏曰臣伏見前知光化軍韓綱近為酷虐兵士致兵士等作亂攻劫州縣驚動朝廷上貽君父之憂下致生民之患而又不畏法棄城遁走其罪狀顯著便合誅夷朝廷慎于用刑尚令勘鞫至今多日未見施行竊以斷獄之議不過兩端而已有正法則依法無正法則原情今韓綱所犯法有明文情無可恕謹按律文主將守城為賊所攻不固守而棄者斬此韓綱於法當斬有明文也綱不能撫綏士卒致其叛亂但其棄城而走情最難容當初亂兵未有器械韓綱手下自有六十餘人不亂兵士又有官庫器甲既不能盡力禦捍又不能閉城堅守公然將手下兵士津送全家上船便棄牌印城池而去致兵之亂起自綱身臨難逃身而不死國方今盜賊可憂之際若使天下州縣皆效韓綱見賊便走則在處城池皆為賊有陛下州縣誰肯守之此韓綱之情又無可恕也綱之一死理在不疑外人但見拖延多日未行斷決皆謂朝廷好行姑息漸有恩貸之意又緣綱是大臣家子作如此大過生如此大患犯如此大刑名若曲法不行即不知孤寒有罪者何以行法其韓綱伏望聖慈出於睿斷早賜依法施行修又上奏曰臣風聞大理寺近奏斷德州公案一道為一班行王守度謀殺妻事止斷杖六十私罪其守度所犯情理極惡本因踰濫欲誘一求食婦人為妻自持刃杖恐逼正妻阿馬令其誣以姦事髠截頭髮又自以繩索付與阿馬守度持刀在旁逼令自縊阿馬偶得生逃臣略聞此大槩其他守度凶惡之狀備于案牘人不忍聞阿馬幽苦寃枉如此而法吏止斷誣姦降以杖罪竊以刑在禁惡法本原情今阿馬之寃于情可憫守度所犯其惡難容若以法家斷罪舉重而論則守度誣姦不實之罪輕迫人以死之情重原其用意合從謀殺凡謀殺之罪其類甚多或有兩相爭恨理直之人因發忿心殺害理曲之人者死與未死須被謀殺之刑豈比守度曲在自身阿馬本無所爭備極陵辱迫以自裁虐害之情深於謀殺逺矣臣嘗伏讀真宗皇帝賜諫臣之詔曰寃枉未申賞刑踰度者皆許論列今之寃婦臣職當言者也豈有聖主在上國法方行而令強暴之男而敢逼人以死臣恐守度不誅則自今強者陵弱踈者害親國法遂隳人倫敗矣其王守度一宗公案伏望聖慈特令中書細詳情理果如臣之所聞即乞行刑法以止姦凶修又上奏曰臣竊見近日盜賊縱橫張海等二三百人未能敗滅光化軍宣毅又二三百人作亂臣謂朝廷致得盜賊如是者不惟中外無備蓋由威令不行昨王倫賊殺主將自置官稱著黃衣改年號事狀如此乃是反賊使其不敗為患如何既敗之後不誅家族凡小人作事亦須先計成敗今使其事成則獲大利不成則無大禍有利無害誰不欲反只如淮南一帶官吏與王倫飲宴率民金帛獻送開門納賊道左參迎茍有國法豈敢如此而往來取勘已及半年未能斷遣古者稱罰不踰時所以威激士衆今遲緩如此誰有懼心遂致張海等官吏依前迎奉順陽縣令李正己延賊飲宴宿于縣廳恣其劫掠鼓樂送出城外其人敢如此者蓋為不奉賊則死不奉朝廷則不死所以畏賊過如畏國法臣恐朝廷威令從此遂弱盜賊凶勢從此轉強臣聞刑期無刑殺以止殺寬猛相濟用各有時伏望陛下勿採迂儒所説婦人女子之仁尚行小惠以誤大事其宣毅兵士必有家族伏乞盡戮于光化市中使逺近聞之悚畏以止續起之賊其李正己仍聞已有臺憲上言亦乞斬于鄧州使京西一路官吏聞之畏恐知國法尚存不敢奉賊從來只被迂懦之人因循不斷誤陛下事壞得天下事勢已如此不可更循舊弊有失威斷惟陛下力行之修又論葛宗古等不當減法劄子曰臣伏見近日贓吏葛宗古王克庸滕宗諒等相繼贓汚事發內葛宗古情理尤惡臣伏覩去年朝廷命賈昌朝等減省天下冗費上自陛下供御之物至於皇后宫嬪飲食已來盡皆減節蓋謂調度至多公私已乏故陛下以身先天下自行減刻要供軍費凡為邊將者所得一錢一帛宜思此物自生民困苦之中取其膏血陛下憂勞之際減自聖躬如此得之宜作如何用今乃盜朝廷賞勞蕃夷之物贍養求食婦人全家骨肉及供自己家口并營造工作私家冗用之類量其如此用心豈是愛君憂國忘身破賊之人何足愛惜若律文已重即乞盡行更不減法若舊法尚輕仍望特加重斷其滕宗諒王克庸若事分明亦望早賜勘鞫正行國典竊慮議者為宗古等方任邊陲宜從寬貸臣非不知駕馭英雄難拘常法如太祖委用李漢超能捍寇戎不為邊患功大過小理可優容諸將守邊未有尺寸之效而先已踰違不法外恃敵在而欲望朝廷屈法姑息今朝廷未曽行寬假之惠而此三人不法如此若更寬之則今後邊臣不復可以法制矣臣思邊上公使必欲使將臣不拘常法者若用之隂養死士招延布衣利啖敵人賞勞將校如此之數皆不必問其出入可恣所為或其性本闊略偶不點檢誤用於私家原其本情亦可輕恕若宗古等故意偷謾減刻宴犒蕃夷軍士之物入己者有何可恕之理特減從輕有何可贖之功得以屈法若此三人不行重斷則邊臣知元昊常在則可以常為不法臣恐玩寇㺯兵事無了日今取進止修又上奏曰臣伏以朝廷每出詔令必須合于物議下恱民情真宗皇帝初置諫官詔書內條列六事首言詔令不便者許諌官論列蓋朝廷慎于出令之意也近聞詔書褒美陜西轉運使卞咸風聞咸在陜西為買百姓青苗及轉般大麥此兩事大與西人為患逃移却人户極多至今西人怨謗不已賴吳遵路減得轉般一事人獲稍寧今所降詔書兩人一時褒美善惡不分無所激勸使陕西人見者必謂朝廷咫尺絶不恤念西人不知西事誤下詔書美此與民為害之人必轉生怨謗臣竊料朝廷必因邊臣奏舉咸等能積糧儲故賜奬諭蓋失於採訪不知咸處置乖方之事致西民流移怨謗之因欲乞今後戒此失誤慎出詔令及戒勵羣臣今後薦舉人不得妄有稱美其已出之詔既不可追臣又恐朝廷因此遂待卞咸為材吏别有任用却致敗事臣職在諫諍不可不言修又上奏曰臣等風聞朝廷近降指揮與諸路轉運使令體量州縣官吏酷虐軍民者臣料朝旨如此必是因韓綱酷虐近致光化兵士作過故有此指揮竊以昨來光化兵變雖因韓綱自致其如兵亦素驕處置之間須合中道韓綱自當行法驕兵亦合討除如此兩行方始得體今若明行號令遍約官吏則驕兵增氣轉更生心長吏畏避無由行事其所降與轉運司文字竊慮朝夕之間傳播中外扇動羣小引惹事端然已失之令既不可追伏乞速降指揮與諸路轉運使令密切稟行不得漏泄所貴别不生事修又乞執奏干求內降并根究因緣干請之人狀曰臣伏見諌官陳升之起請僥求內降之人委一府劾奏干請者之罪蒙朝廷依奏施行尋聞李璋因內降責罰自後罕聞敢求內降以希恩賞者以此見至公之朝必信之法可以令行而禁止也然升之所謂恩賞一端而小人之僥求無所不至臣自權知開封府未及兩月之間十次承準內降或為府司後行或為宫院姨㜮或為內官及干繫人吏等本府每具執奏至於再三而干求者內降不已至于婢妾賤人犯姦濫等事亦敢上煩聖聰以求私庇閹官小臣自圖免過反彰聖君曲法之私雖有司執奏終許公行然小人干求未有約束止絶臣今欲乞今後應有因事敢干求內降者依舊許本府執奏外更乞根究因緣干求之人奏攝下府勘重行責罰如本自行干請者亦乞一就勘鞫加原犯本罪二等斷遣其情理稍深及干求不已者亦許本府一面牒報御史臺彈糾勘劾施行所貴止絶小人干亂公朝敗紊綱紀修又論內臣梁舉直事封回內降狀曰臣勘會本府見勘內官梁舉直公事兩曽執奏三準內降特與放罪臣伏見近年權幸之臣多是公然作過不畏憲法特干求內降紊亂綱紀所以前後臣寮纍具論述陛下特降明詔許承受官司執奏不得施行布告天下著為信令今梁舉直纍煩睿聽干求不已本府遵依前後詔赦再具執奏未許公行伏以曲庇小臣撓屈國法自前世帝王茍有如此等事史册書之以著人君之過于中外舉直此重于元犯罪今縱未能法外重行以戒小人干求內降其元犯本罪豈可曲恕舉直茍為愛身之計不思愛君之心乃是小人全無知識爾如臣忝恩寵列于侍從職在獻納合思裨補豈可阿意順旨為陛下曲法庇縱小臣以彰聖君之失其內降臣更不敢下司謹具狀繳進納樞密副使富弼上奏曰臣歷觀自古帝王理天下未有不以法制為首務法制既立然後萬事有經而治道可必也宋有天下八十餘年太祖始革五代之弊創立法度太宗克紹前烈紀綱益明真宗承兩朝太平之基謹守成憲近年紀綱甚紊隨事變更兩府執守便為成例施於天下咸以為非而朝廷安然奉行不思剗革至使民力殫竭國用乏匱吏員冗而率未得人政道缺而將及於亂賞罰無準邪正未分敵人交侵寇盜充斥師出無律而戰必敗令下無信而民不從如此百端不可悉數其所以然者蓋法制不立而淪胥至此也臣今欲選官置局將三朝典故及討尋久來諸司所行可用文字分門類聚編成一書置在兩府俾為模範庶幾頺綱稍振弊法漸除此守基圖救禍亂之本也知諌院余靖乞宣敕並送封駮司審省劄子曰臣聞國家之興必先於綱紀號令所出必正其源流古者以四海之廣萬務至衆專己臨斷慮其闕失故羣司設官以相維制示至公于天下也唐制凡有制敕命令則中書宣行進內畫可以付門下門下審省申覆以付外施行若有不便並令封駮改正今之官誥編書三省官位各結題年月則皆古之制也國朝淳化中始自樞密院分出銀臺通進二司兼領門下封駮事令兩制已上主判凡制敕有所不便者準故事封駮張詠向敏中咸領此職此時宣敕無不經歷門下近年以來舊制坐廢唯選人黃甲猶準故事其餘宣敕百無一二到彼則是官有封駮之名曽無改正之實臣今欲乞凡有宣敕除處分邊事機宜依舊實封入遞祭祀行事敕仍舊差人送付本官外其餘遷免官資升降差遣及斷遣刑名改更敕令應是告身宣頭敕牒並令中書樞密院準故事進內發付門下封駮司審省申覆如有授官非稱斷刑失中及未便于事者則令封駮改正如此則官司之守各有綱條詔令所頒克正根本紀律可振無有過舉矣其門下封駮司乞差剛正公平大臣主判庶其舉職無可畏避參知政事范仲淹奏贖法疏曰臣數日前面奏三代帝王子孫綿逺蓋由積德之深臣請陛下日修至仁之德下及民庶以感動天地此聖嗣無疆之本也今有劄子一道為議贖法事即乞降出臣近覩詔書令御史臺審刑院大理寺修編敕所同議贖刑此陛下至德深仁被于億姓天下幸甚今諌官孫甫上言乞令大臣定奪施行臣欲乞特降聖旨令中書樞密院同與見議官員疾速定奪聞奏仍乞且贖杖罪已下情理輕者所貴易行户部判官包拯上奏曰臣聞法令者人主之大柄而國家治亂安危之所繫焉不可不謹緣近嵗以來賞罰之典尚或因循且人知法令之不足信則賞罰何以沮勸乎昔唐文宗問宰臣李石天下何以易治李石對以朝廷法令行則易治誠哉治道之要無大于此伏望陛下臨決大政信任正人賞者必當其功不可以私進罰者必當其罪不可以幸免邪佞者雖近必黜忠直者雖逺必收法令既行紀律自正則無不治之國無不化之民在陛下力行而已拯為天章閣待制知諌院上奏曰臣竊見天聖中凡有內降莫測夤緣盡由請託蓋傾邪之輩因左右之容假援中闈久瀆聖化洎陛下親覽庶政首革兹弊僥榮濫賞人不能以幸求頃年以來此路寖啓妨公害政無甚於此臣欲乞今後應中外人隂有交結冒請勞效以圖榮寵或比緣罪犯茍希橫貸伏望聖慈特降指揮止絶如更妄有陳乞並令中書樞密院三司開封府等處詳定先降指揮依公執奏毋得阿徇上纍明聖拯又論詔令數改易疏曰臣竊見朝廷凡降詔令行之未久即有改張故外議紛紜深恐于體不便且詔令人主之大柄而國家安危之所繫焉可無慎乎緣纍年以來此弊尤甚制敕才下未逾月而輒更請奏方行又隨時而追改民知命令之不足信則賞罰何以沮勸乎臣欲乞今後朝廷已處置事宜申明制度不可不慎重或臣僚上言利害並請先下兩制集議如可為經久之制方許頒行于後或小有異同非蠧政害民者不可數有更易如此則法存畫一國有常格伏望少留聖意天下幸甚拯又乞不用贓吏狀曰臣聞廉者民之表也貪者民之賊也今天下郡縣至廣官吏至衆而贓汚摘發無日無之洎具案來上或橫貸以全其生或推恩以除其釁雖有重律僅同空文貪猥之徒殊無畏憚昔兩漢以贓私致罪者皆禁錮子孫矧自犯之乎太宗朝嘗有臣僚數人犯罪並配少府監𨽻役及該赦宥謂近臣曰此輩既犯贓濫只可放令逐便不可復以官爵其責貪殘慎名器如此皆先朝令典固可遵行欲乞今後應臣僚犯贓抵罪不從輕貸並依條施行縱遇大赦更不録用或所犯若輕者只得授副使上佐如此則廉吏知所勸貪夫知所懼矣侍御史知雜事何郯上奏曰臣伏聞禁中自盜發以來逐月分布內臣坐甲宿直以至伐木拆屋結繕修垣墻增置關鍵其于備豫之方固亦甚至然臣以事體酌之恐為陛下計者誤也夫體有尊卑事有小大尊者繫于君卑者繫於臣君而尸小事則失所稱臣而專大名則非所宜以人君之舉所務必博大所謀必經逺崇位號以習民之奉修政刑以防民之踰不廢禮以杜僣逼之萌必行法以除暴亂之本使邇莫敢犯逺莫敢陵如此則等威辨而上下無邪心然後知天子之所以尊也今夫衛士生變事出非意皆由朝廷恩過而不知感官司令寬而不能禁也為今之宜其在一震威怒以示誅罰正大法以絶其慢舉大刑以討其姦斥邪偽附下之類先絶其萌芽究賊亂犯上之徒務去其根本不恕無良而與衆棄不漏有罪而示之公法令既行紀綱既正以此御下孰敢不虔雖不增宫闈之警而其備修不加省户之衛而其守固與夫區區從細末之事者不可同年而語矣臣況聞陛下從頃年來過自警戒中宫之樂工已盡罷後苑之獵具已盡除其於謹天戒以飭聖躬雖詩書所稱遇災修德之君逺不能逮然于禁防之設所舉者近而所忽者逺所謹者小而所遺者大臣切惑焉伏乞聖慈以臣愚言命公卿大夫當廷公議一舉法令威刑之柄以除邪偽賊亂之階庶主威益尊國命益振內患既弭外虞自除則天下幸甚同知諫院吳奎上奏曰臣伏見陛下十數年以來每降詔令及所行事為橫議所移或姦謀所破中外不甚為信以此皆謂陛下言之雖􅋀而不能行行之雖鋭而不能久也自明堂下詔杜絶內降忠賢莫不增氣羣小莫不革心願陛下謹守前書堅於金石雖甚寵愛之人如敢私撓必加之罪如是則太平之風有望於兹矣知諫院范鎮上奏曰臣伏見近降指揮今後傳宣除依得法律賞罰外餘並仰中書樞密及所屬官司執奏今月十八日一日之中內臣無名改轉者凡五六人俱是過恩不合法律中書樞密院大臣並不執奏臣竊謂陛下近降指揮可謂萬世法曽未一月而大臣輒廢不行大臣在陛下左右號稱執政而廢法如此欲法行四方安可得哉夫天子之言出而為令大臣廢令在法不赦伏乞明正中書樞密大臣之罪以示天下使人知陛下之法不可輕廢鎮又論法令數變狀曰臣伏見今月十三日殿直寄班鄧維一為私役兵士修屋致屋倒壓死兵士進呈特勒停京西路編管經恩未得敘用十五日傳宣與免編管其法令數變如此又道士李可夀本初與三司吏人陳知深善及陳知深犯贓李可夀轉托鐡佛寺僧初不知情已從重斷李可夀因緣內降遂不問罪其法令不當如此所有鄧維一乞依前降指揮依前編管李可夀亦乞依法施行以絶姦幸今一殿直一道士至微賤者而能關通中禁變陛下法令大臣不能奏論後有大於此者將如之何伏乞陛下與大臣更相飭厲設張紀律無使小人數變法令則天下幸甚鎮又論御史論陳執中失實狀曰伏以陛下置御史以逹聰明非使其亂聰明也以防讒慝非使其為讒慝也今御史以死罪中傷大臣為讒慝以亂陛下聰明陛下置而不問何以使風俗不為險薄也臣請以一二言之初御史言陳執中騶從毆殺人失實又言阿張毆殺女使亦失實自顧二事皆失實業已觸大臣無以解也於是乎構大臣隂事必不自明者以聞於陛下以為陛下疑此所謂御史為讒慝以亂陛下聰明也若如御史所言禽獸有不為者況國相乎陛下謂御史言必可信耶請以騶從及阿張事卜之御史言騶從毆殺人者開封府鞫勘乃是某人非騶從也言阿張毆殺女使者乃是執中指揮非阿張也初執中以女使付外時親封押是執中指揮明矣此二事於人情或有者而御史皆已失實何况于人情無有禽獸所不為者加諸大臣而以疑陛下者乎其疑固可決矣今御史言諌院無人者不過謂不言執中騶從毆殺人阿張毆殺女使及執中隂事也其騶從與阿張固已虛妄非諌院所宜言也執中隂事尤非所宜言也而御史言之以為才以為稱職以為直此等事果為直邪果為稱職邪果為才邪皆為險薄之習也臣之所耻言也言之非陛下任臣之意也陛下降詔以戒險薄若置御史而不問是徒以文告而不以實責之也臣恐詔旨雖日下而險薄日以益也陛下誠能以臣前所上四狀并今狀降付御史使之自覽知自覺悟然後下詔斬決御史以示天下庶幾風俗可變而險薄可戒也右司諫馬遵上奏曰臣竊聞有內降指揮差臺官吳中復往澶州取勘張懷恩李仲昌修河不公等罪事從中出不知所來內外聞之無不疑駭何則從來仲昌等妄違朝旨輕壞河事枉費財力罪固不輕朝廷雖行降責而臺官纍有彈奏乞實重典尋有指揮止令經赦未敘而已各人降官已經數月未知今者陛下聖聽得於何人而有此特旨向者臺官力言而不用今以或者之言而行之既差臺官推勘而又監以內臣是臺官未足取信於陛下也中書者陛下執政之司事無不總疑則勿用用則勿疑今差臺官置詔獄出于內降而中書奉行文書初不與議執政之任豈如是乎是中書亦未能取信於陛下也中書者陛下腹心之地臺官者陛下耳目之司所以倚責而成治也若陛下外疑耳目內疑腹心內外交疑而無所倚責臣恐聖慮日勞而多門之弊或生于其間矣然則刋章飛語之事或可緣間隙而興優遊無為之治未可以嵗月期也可不惜哉李仲昌等雖法外重行正合臺官前日之論無可議者臣今所言蓋為國家政體惟陛下財擇遵又奏曰臣近為朝廷差臺官置獄一出內降指揮國柄動搖物議騰沸臣以當職兩具奏封尋以齋宿行事未敢繼陳章削干黈旒之嚴如聞內臣傳宣催促繼有降文字付吳中復等中外聞之寖以喧駭何則朝廷賞罰自當公行禮曰爵人於朝與士共之刑人於市與衆棄之皆謂公也今仲昌等二小臣犯法非急切幾事若陛下聞之語言見之文字即宜付外施行若謂已經中書則宜移之密院何煩內降文字駭物情而損國體哉緣內降之弊害政之大者皇祐明堂之後嘗有特詔止絶天下歌舞流為頌聲今陛下享夀昌之慶行恭謝之儀肆赦改元新天下之耳目豈可却行弊事壞皇祐之成憲取吏民之深譏哉若習以為常行之不已臣恐事日多聖心日勞非所以成簡易之法取康寧之福也然則威權可易紀律可隳自古亂階由此途出漢唐不逺厥鑒甚明不可不深思不可不熟慮伏望陛下博采公議特出英斷追改前敕以李仲昌等文字付外施行若謂已經中書即乞改付樞密院仲昌等茍有深犯自存嚴科如此則獄合乎大公而一代之典可用權綱歸乎至正而多門之弊不生制治保安實由此路殿中侍御史趙抃論內降指揮疏曰臣昨自四月至七月纍次論奏李仲昌等修河敗事乞重行貶黜雖朝廷量與責降然亦未快羣議陛下采收下情憫傷重役將窮究仲昌等罪狀正國家之典刑宣諭中書輔臣行之可也若事有干涉付樞密院治之可也奈何一旦事從中出差一臺官以訊劾之遣四內臣以監視之才及數日之內三出內降文字張皇大獄中外驚駭外議以謂初發二小臣之罪者誰為奏陳今起二小臣之獄者孰與評議所可惜者國體之重不詢於公卿大臣政事之權乃付之宦官女子至於政府見如此等事始不預議終無執持將順奉行焉用彼相臣恐斜封墨敕之弊不足罪於昔時告密羅織之風復基禍于今日矣臣愚伏望陛下特賜指揮追還內降之命檢會臺官并臣前後論奏仲昌等章疏詳酌重行貶竄如此則朝廷綱紀不遂隳壞人情物論庶無憂疑也知諫院吕誨乞禁止臣寮上封章告人之罪狀曰臣竊以著令臺諫官許風聞言事蓋欲廣其採納輔益聰明邇來中外臣寮密上封章告人之罪既非職分實亦侵官而又事多不根言無指實理非干己情緣報怨甚至詆訐平素之實暴揚曖昧之事朝廷既難明辨善人無以伸寃刻薄之徒寖成風矣況禮貴徙善法許自新日月既已經久赦降自當洗滌事儻涉于厚誣理固宜于反坐臣伏乞今後非在言職輒以章奏指訐他人日前過犯及事非干己者即以所上文字付有司鞫勘在外則置院推勘所貴止絶狂妄紊煩旒扆仍乞詔示中外嚴行遵守知諫院司馬光上奏曰臣等伏以祖宗開基之始人心未安恐有大姦隂謀無狀所以躬自選擇左右親信之人使之周流民間密行伺察當是之時萬一有挾私誣枉者則鈇鉞隨之是以此屬皆知畏莫敢為非今海內承平已踰百年上下安固人無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉被此屬量其過失廣作威福私受貨賂所愛則雖有大惡掩而不問所憎則舉動言語皆被捃托臣等嘗病國家擇天下英材以為公卿大夫而猶不可信顧任此厮役小人以為耳目豈足恃哉今乃妄執平民加之死罪使之幽繫囹圄橫罹楚毒幸而不自誣服僅能辨明若更不聽有司詰問元初巡察之人少加懲誡臣恐此屬無復畏憚愈加恣橫使京師吏民無所措手足豈合祖宗意哉韓琦論驕卒誣告將校乞嚴軍律疏曰臣近聞虎長行武贇引見日唐突告論本指揮使關元部轄嚴緊及將人口上京下軍頭司取責並送開封府勘鞫竊如本府勘得武贇各從杖一百定斷臣竊以軍中之法最為嚴重茍從寬弛為害匪輕其武贇既陳告部轄將校不公自有殿前馬步軍司合屬去處引見之際咫尺天威固非軍人論事之所及將辨訊又多誣罔之辭蓋近年兵卒驕縱類率如此國家屯置師旅衆踰百萬一營只委將校數員若鈐制稍嚴便即捃拾小過於引見之際唐突論訴朝廷不以大體斷之兩皆獲罪必恐此後兵卒將校漸廢階級之制但務姑息以求無過若一旦邊境有急使其亡軀命而赴湯火必不能為陛下用也陛下誠宜於泰寧之辰深戒有司凡百軍旅之事常以訓戢為意有違犯者時以重法行之其將校苟非大過止因部轄嚴峻兵士所怨求細事以致其罪者亦當捨而不問所謂懲一卒而警萬衆去小慈而行大仁惟陛下熟賜財詳天下至幸三司使張方平論中使傳宣諸司煩數狀曰臣竊聞近日中仗傳宣諸司頗為煩數其至三司日或數次臣聞王言惟作命百官承式洪範五事言曰從從作乂故王者之言是謂號令令出惟行不行則權剛虧矣今夫屑屑冗微之事皆賤者之所親責在攸司各有程式發輸督促動煩宣下所司既被受其有不可奉行者又須稟復或却寖罷下成廢命上為損威習以為常恬弗之怪欲乞今後除有指揮中書樞密院事特降中旨外自餘細務合下三司提舉司開封府等處者只乞傳宣中書樞密院劄下逐處有司或敢違慢自應合行勘責即事干急速不容留滯即乞宣付入內內侍省相度事體緩急須即施行者具録宣旨報下所司所冀出納有章上下得體方平上刑法論曰臣聞昔在成周惟厥文王克明德慎罰武世忿生亦式謹由獄周公制六典蓋以禮正其本刑防其末弼成五教民協于中爰及成康乃至措而不用夫子曰齊之以刑民免而無耻齊之以禮有耻且格又曰禮樂不興則刑罰不中故叔向以為三辟之興皆叔世也漢自文景之後朝廷立大制度行大誅賞輒會諸儒斷以經義亦能議事以制尊君卑臣辨是與非其論優大故三王而下漢道為粹東都之後法稍煩密南北異俗不勝其敝噫世失其道民散久矣其本先弱勢安得長故世雖平而易危國雖盛而易敗由乎制度不素立禮義不在人譬諸大廈巋然而柱石不固豈支久之勢萬目參然而綱維不緝固必紊之道為國而禮法不修其何以致理近在唐時禮刑煩雜禮既頻年而數革法或一代而再修貞觀顯慶遽立異同之制永徽開元則有前後之格諸儒立異互出胸臆法吏迎合旋為輕重竒請它比盈於几閣自明習者不能遍睹是以郡縣承用者駮陷愚蠢於亡辜羅元元之不逮其咎由乎格令之煩多故姦吏得以因緣為市也我太祖皇帝既大一統恤刑辟之多濫始制郡國立司寇之官太宗更置審刑衆職以覆天下之獄先皇復置提點刑獄之任以分部四方申下民之枉察群吏之違是皆聖人竭情盡心哀矜軫恤之旨也自陛下臨御區極欽恤庶慎急深故之罪寬縱出之罰宣室決事明過漢宣大官減膳仁勝唐文有慘怛之愛有忠利之教其可謂盛德矣子曰如有王者必世而後仁善人為國百年可以勝殘去殺我有宋之在宥天下逾八十年一統無外清寧治平德教加于蒸人其陶化深矣然刑未能措獄繫尚蕃其故何由蓋禮失于正本令急于防末上之籠貨物漁財利之路多管𣙜封占之門衆間之以權豪富人依公法為私姦侵剝黎民吏務因循或引贓賄不能抑強扶弱獄姦不平是以小民業蹙窮而思濫為盜賊窳偽以偷免飢寒子曰古之知法者能省刑本也今之知法者不失有罪末矣夫不原民之所以獲罪而賞吏之能發姦而得其情是猶大開欄牢髙張罻羅舉鳥獸之獲而歸功於弋獵之師者也故夫吏者舉法令而檢非違牧民而導之以善者也而乃苛刻者巧弄而髙下其心簡放者忽略而鄙俗其事不才固為猾吏所賞才者或為豪人所買求進者微文曲致以附會上意養望者宥故末減以取恱衆心家自為評人執所見至有罪均而輕重殊罰科同而淺深異比一􅋀之弊皆歸乎民誠願朝廷觀法周漢之舊深議禮刑之中損遊商兼并之業益節其靡汰之費稍寬利路以優齊人刪定律令芟其蕃異詆欺文致毛細之法一皆蠲除務從省約使易遵守為大宋一典頒用乎天下豈徒當世之利固亦無疆之法也臣言雖闊略不該時術豈不近乎清源正本之論歟其時所尤急繫朝政之得失人倫之厚薄者略舉于末冀正其大紀焉方平又上奏曰伏見近嵗臺諫及按察官等多發人積年罪狀及有奏劾之事輒請不以赦降原減作法于涼甚非治道赦書之文云敢以赦前事言者以其罪罪之所以省刑本而著至信也人之多僻其亦久矣在于中人孰能無過若以一眚之故而為終身之纍臣恐舉世無全人矣既經赦宥許之惟新忽復追論誰將自保快一時之小忿失天下之大信相沿弊迹寖成險俗棄瑕録善義則不然伏望特降詔書明諭中外今後言事及按察官等不得發人纍經赦宥之事及乞不以赦降原減上資忠厚之風允穆大公之化歷代名臣奏議卷二百十
