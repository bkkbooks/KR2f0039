body:
  text: 歷代名臣奏議卷七十八眀楊士竒等撰經國晋侯假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晋不可啓寇不可玩一之謂甚其可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也公曰晋吾宗也豈害我哉對曰太伯虞仲大王之昭也大伯不從是以不嗣虢仲叔王季之穆也為文王卿士勳在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不惟逼乎親以寵逼猶尚害之況以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨眀德惟馨又曰民不易物惟德其物如是則非德民不和神不享矣神所馮依將在德矣若晋取虞而眀德以薦馨香神其吐之乎秦饑使乞糴于晋晋人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於寇不如勿與慶鄭曰背施幸災民所棄也近猶讎之況怨敵乎弗聽退曰君其悔是哉魏王以秦救之故欲親秦而伐韓以求故地公子無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戻好利無信不識禮義德行茍有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積德也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而況於仇讎之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不眀羣臣莫以聞則不忠今韓氏以一女子奉一弱主內有大亂外交强秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁鄰王以為安乎王欲得故地今負强秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻强趙是復得閼與之事秦必不為也若道河內倍鄴朝歌絶漳滏水與趙兵決於邯鄲之郊是知伯之祻也秦又不敢伐楚道涉山谷行三千里而攻冥厄之塞楚之險塞也所行甚逺所攻甚難秦又不為也若道河外倍大梁左蔡召陵與楚兵決於陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懷茅邢丘城垝津以臨河內河內共汲必危有鄭地得垣雍決滎澤水灌大梁大梁必亡王之使者過而惡安陵氏於秦秦之欲誅之久矣秦葉陽昆陽與舞陽鄰聽使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危國無害已夫憎韓不愛安陵氏可也夫患秦不愛南國非也異日者秦在河西晋國去梁千里有河山以䦨之有周韓以間之從林鄉軍以至于今秦七攻魏五入囿中邊城盡拔文臺墮垂都焚林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平監所亡於秦者山南山北河外河內大縣數十名都數百秦乃在河西晋去梁千里而祻若是矣又況於使秦無韓有鄭地無河山而䦨之無周韓而間之去大梁百里禍必由此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦撓之以講識亡不聽投質於趙請為天下鴈行頓刃楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海內必不休矣是故臣碩以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必效之此士民不勞而故地得其功多於與秦共伐韓而又與强秦鄰之祻也夫存韓安趙而利天下此亦王之天時已通韓上黨於共寧使道安成出入賦之是魏重質韓以其上黨也今以其賦足以富國韓必德魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衛大梁河外必安矣今不存韓二周安陵必危楚趙大破衛齊甚畏天下西鄉而馳秦入朝而為臣不久矣蘇秦西至秦秦孝公卒說惠王曰秦四塞之國被山帶渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王曰毛羽未成不可以高蜚文理未眀不可以并兼方誅商鞅疾辨士弗用乃東之趙趙肅侯令其弟成為相號奉陽君奉陽君弗說去遊燕嵗餘而後得見說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有滹沱易水地方二千餘里帶甲數十萬車六百乘騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府者也夫安樂無事不見覆車殺將無過燕者大王知其所以然乎夫燕之所以不犯寇被甲兵者以趙之為蔽於南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯寇也且夫秦之攻燕也踰雲中九原過代上谷彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦眀矣今趙之攻燕也發號出令不至十日而數十萬之衆軍於東垣矣渡滹沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重千里之外計無過於此者是故碩大王與趙從親天下為一則燕國必無患矣文侯曰子言則可然吾國小西迫强趙南近齊齊趙强國也子必欲合從以安燕寡人請以國從於是資秦車馬金帛以至趙而奉陽君已死即說趙肅侯曰天下卿相人臣及布衣之士皆髙賢君之行義皆碩奉教陳忠於前之日久矣雖然奉陽君妒君而不任事是以賔客遊士莫敢自盡於前者今奉陽君捐館舍君乃今復與士民相親也臣故敢進其愚慮竊為君計者莫若安民無事且無庸有事於民也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭斷絶人之交也碩君慎勿出於口請别白黑所以異隂陽而已矣君誠能聽臣燕必致旃裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可以受封侯夫割地包利五霸之所以覆軍擒將而求也封侯貴戚湯武之所以放弒而爭也今君髙拱而兩有之此臣之所以為君碩也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則效宜陽宜陽效則上黨絶河內割則道不通楚弱則無援此三䇿者不可不熟計也夫秦下軹道則南陽危劫韓包周則趙氏自銷鑠據衛取淇卷則齊必入朝秦秦欲已得乎山東則必舉兵而嚮趙矣秦甲渡河踰漳據畨吾則兵必戰於邯鄲之下矣此臣之所以為君患也當今之時山東之建國莫强於趙趙地方二千餘里帶甲數十萬車千兩騎萬匹粟支十年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也秦之所害於天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍蠶食之𫝊國都而止韓魏不能支秦必入臣於秦秦無韓魏之隔則祻必中於趙矣此臣之所以為君患也臣聞堯無三夫之分舜無咫尺之地以一天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故眀主外料其敵之强弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形于胸中矣豈掩于衆人之言以冥冥決事哉臣竊以天下之地圖案之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國為一并力西鄉而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人也臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以豫秦秦成則髙臺榭美宫室聽竽瑟之音前有樓闕軒轅後有長姣美人國被秦患而不與其憂是故夫衡人日夜務以秦權恐喝諸侯以求割地故碩大王熟計之也臣聞眀主絶疑去讒屏流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一齊楚韓魏燕趙之從親以畔秦令天下之將相會於洹水之上通質刳白馬而盟要約曰秦攻楚齊魏各出鋭師以佐之韓絶其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師而佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞其道趙涉河漳博關燕出鋭師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海韓魏皆出鋭師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉清河燕出鋭師以佐之諸侯有不如約者以五國之兵共伐之六國從親以擯秦則秦甲必不敢出於函谷以害山東如此則霸王之業成矣趙王曰寡人年少立國日淺未嘗得聞社稷之長計也今上客有意存天下安諸侯寡人敬以國從乃飾車百乘黃金千鎰白璧百雙錦繡千純以約諸侯是時周天子致文武之胙於秦惠王惠王使犀首攻魏禽將龍賈取魏雕隂且欲東兵蘇秦恐秦兵之至趙也乃激怒張儀入于秦於是說韓宣惠王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬天下之强弓徑弩皆從韓出溪子少府時力距來者皆射六百步之外韓卒超足而射百發不暇止逺者括臂洞胸近者鏑掩心韓卒之劍㦸皆出於𡨕山棠溪墨陽合賻鄧師宛馮龍淵太阿皆陸斷牛馬水截鵠鴈當敵則斬堅甲鐵幕革抉㕹芮無不畢具以韓卒之勇被堅甲跖徑弩帶利劍一人當百不足言也夫以韓之徑與大王之賢乃西面事秦交臂而服羞社稷而為天下笑無大於此者矣是故碩大王熟計之大王事秦秦必求宜陽成臯今兹效之眀年又復求割地與則無地以給之不與則棄前功而受後祻且大王之地有盡而秦求無已以有盡之地而逆無已之求此所謂市怨結祻者也不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今西面交臂而臣事秦何異於牛後乎夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之於是韓王勃然作色攘臂瞋目按劍仰天太息曰寡人雖不肖必不能事秦今主君詔以趙王之教敬奉社稷以從又說魏襄王曰大王之地南有鴻溝陳汝南許郾昆陽召陵舞陽新都新郪東有淮潁煮棗無胥西有長城之界北有河外卷衍酸棗地方千里地名雖小然而田舍廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊料大王之國不下楚然衡人怵王交强虎狼之秦以侵天下卒有秦患不顧其禍夫援疆秦之勢以內劫其主罪無過此者魏天下之强國也王天下之賢主也今乃有意西面而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王耻之臣聞越王勾踐以散卒三千人禽夫差于遂武王卒三千人革車三百乘制紂於牧野豈其士卒衆哉誠能奮其威也今竊聞大王之卒武士二十萬蒼頭二十萬奮擊三十萬廝徒十萬車六百乘騎五千匹此其過越王勾踐武王逺矣今乃聽於羣臣之說而欲以事秦夫事秦必割地以效實故兵未用而國已虧矣況羣臣之言事秦者皆姦人非忠臣也夫為人臣割其主之地以求外交偷取一時之功而不顧其後破公家而成私門外挾强秦之勢內劫其主以求割地碩大王熟察之周書曰綿綿不絶蔓蔓奈何毫釐不伐將用斧柯前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力一意則必無强秦之患故敝邑趙王使臣效愚計奉眀約在大王之詔詔之魏王曰寡人不肖未嘗得聞眀教今主君以趙王之詔詔之敬以國從因東說齊宣王曰齊南有泰山東有琅琊西有清河北有渤海此所謂四塞之國也齊地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉渤海也臨菑之中七萬户臣竊度之不過户三男子三七二十一萬不待發於逺縣而臨菑之卒固已二十一萬矣臨菑甚富而實其民無不吹竽鼓瑟彈琴擊筑鬪雞走狗六博踏鞠者臨菑之塗車轂擊人肩摩連衽成帷舉袂成幕揮汗成雨家殷人足志高氣揚夫以大王之賢與齊之强天下莫能當今乃西面而事秦臣竊為大王羞之且夫韓魏之所以重畏秦者為與秦接壤界也兵出而相當不出十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛晋陽之道徑乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虛喝驕矜而不敢進則秦之不能害齊亦眀矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有强國之實臣是故碩大王少留意計之齊王曰寡人不敏僻逺守海窮道東境之國也未嘗得聞餘教今足下以趙王詔詔之敬以國從乃西南說楚威王曰楚天下之强國也王天下之賢主也西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也夫以楚之强與王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝章臺之下矣秦之所害莫如楚楚强則秦弱秦强則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武關一軍下黔中則鄢郢動矣臣聞治之其未亂也為之其未有也患至而後憂之則無及已故碩大王早熟計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之眀詔委社稷奉宗廟練士厲兵在大王之所用之大王誠能用臣之愚計則韓魏齊燕趙衛之妙音美人必充後宫燕代槖駝良馬必實外廄故從合則楚王衡成則秦帝今釋霸王之業而有事人之名臣竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讎者也夫為人臣割其主之地以外交虎狼之秦以侵天下卒有秦患不顧其祻夫外挾强秦之威以內劫其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩䇿者相去逺矣二者大王何居焉故敝邑趙王使臣效愚計奉眀約在大王詔之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫於秦患不可與深謀與深謀恐反人以入於秦故謀未發而國已危矣寡人自料以楚當秦不見勝也內與羣臣謀不足恃也寡人卧不安席食不甘味心搖搖如縣旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從於是六國從合而并力焉蘇秦為從約長齊閔王時蘇秦說王曰臣聞用兵而喜先天下者憂約結而喜主怨者孤夫後起者藉也而逺怨者時也是以聖人從事必藉於權而務興於時夫權藉者萬物之率也而時勢者百事之長也故無權藉倍時勢而能事成者寡矣今雖干將莫邪非得人力則不能割劌矣堅箭利金不得弦機之利則不能逺殺矣矢非不銛而劍非不利也何則權藉不在焉何以知其然也昔者趙氏襲衛車舍人不休傳衛國城割平衛八門土而二門墮矣此亡國之形也衛君跣行告訴於魏魏王身被甲抵劍挑趙索戰邯鄲之中騖河山之間亂衛得是藉也亦收餘甲而北面殘剛平墮中牟之郭衛非强於趙也辟之衛矢而魏弦機也藉力魏而有河東之地趙氏懼楚人救趙而伐魏戰于州西出梁門軍舍林中馬飲於大河趙得是藉也亦襲魏之河北燒棘蒲墜黃城故剛平之殘也中牟之墮也黃城之墜也棘蒲之燒也此皆非趙魏之欲也然二國勸行之者何也衛眀於時權之藉也今世之為國者不然矣兵弱而好敵强國罷而好衆怨事敗而好鞠之兵弱而憎下人地狹而好敵大事敗而好長詐行此六者而求伯則逺矣臣聞善為國者順民之意而料兵之能然後從於天下故約不為人主怨伐不為人挫强如此則兵不費權不輕地可廣欲可成也昔者齊之與韓魏伐秦楚也戰非甚疾也分地又非多韓魏也然而天下獨歸咎於齊者何也以其為韓魏主怨也且天下遍用兵矣齊燕戰而趙氏兼中山秦楚戰韓魏不休而宋越專用其兵此十國者皆以相敵為意而獨舉心於齊者何也約而好主怨伐而好挫强也且夫强大之祻常以王人為意也夫弱小之殃常以謀人為利也是以大國危小國滅也大國之計莫若後起而重伐不義夫後起之藉與多而兵徑則是以衆强適罷寡也兵必立也事不塞天下之心則利必附矣大國行此則名號不攘而至伯王不為而立矣小國之情莫如僅靜而寡信諸侯僅靜則四鄰不反寡信諸侯則天下不賣外不賣內不反則稸積朽腐而不用幣帛矯蠧而不服矣小國道此則不祠而福矣不貸而見足矣故曰祖仁者王立義者伯用兵窮者亡何以知其然也昔吳王夫差以强大為天下先襲郢而棲越身從諸侯之君而卒身死國亡為天下戮者何也此夫差平居而謀王强大而喜先天下之禍也昔者萊莒好謀陳蔡好詐莒恃越而滅蔡恃晋而亡此皆內長詐外信諸侯之殃也由此觀之則强弱大小之禍可見於前事矣語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋骨力徑非賢於騏驥孟賁也何則後起之藉也今天下之相與也不並滅有案兵而後起寄怨而誅不直微用兵而寄於義則伯天下可局足而須也眀於諸侯之故察於地形之理者不約親不相質而固不趨而疾衆事而不反交割而不相憎俱强而加以親何則形同憂而兵趨利也何以知其然也昔者燕齊戰於桓之曲燕不勝十萬之衆盡胡人襲燕樓煩數縣取其牛馬夫胡之與齊非素親也而用兵又非約質而謀燕也然而甚於相趨者何也形同憂而兵趨利也由此觀之約於同形則利長後起則諸侯可趨役也故明主察相誠欲以伯王為志則戰攻非所先戰者國之殘也而都縣之費也殘費已先而能從諸侯者寡矣彼戰者之為殘也士聞戰則輸私財而富軍市輸飲食而待死士令折轅而炊之殺牛而觴士則是路窘之道也中人禱祝君翳釀通都小縣置社有市之邑莫不正事而奉王則此虛中之計也夫戰之明日尸死扶傷雖若有功也軍出費中哭泣則傷主心矣死者破家而葬夷傷者空財而共藥完者內酺而華樂故其費與死傷者鈞故民之所費也十年之田而不償也軍之所出矛㦸折鐶弦絶傷弩破車罷馬亡矢之大半甲兵之具宫之所私出也士大夫之所匿廝養士之所竊十年之田而不償也天下有此再費者而能從諸侯寡矣攻城之費百姓理襜蔽舉衝櫓家雜總身窟穴中罷於刀金而士困於土功將不釋甲期數而能拔城者為亟耳上倦於教士斷於兵故三下城而能勝敵者寡矣故曰彼戰攻者非所先也何以知其然也昔智伯瑶攻范中行氏殺其君滅其國又西圍晋陽吞兼二國而憂一主此用兵之盛也然而智伯卒身死國亡為天下笑者何謂也兵先戰攻而滅二子患也日者中山悉起而迎燕趙南戰於長子敗趙氏北戰於中山克燕軍殺其將夫中山千乘之國也而攻萬乘之國二再戰比勝此用兵之上節也然而國遂亡君臣於齊者何也不嗇於戰攻之患也由此觀之則戰攻之敗可見於前事今世之所謂善用兵者終戰比勝而守不可拔天下稱為善一國得而保之則非國之利也臣聞戰大勝者其士多死而兵益弱守而不可拔者其百姓罷而城郭露夫士死於外民殘於內而城郭露於境則非王之樂也今夫鵠的非咎罪於人也便弓引弩而射之中者則善不中則愧少長貴賤則同心於貫之者何也惡其示人以難也今窮戰比勝而守必不拔則是非徒示人以難也又且害人者也然則天下仇之必矣夫罷士露國而多與天下為仇則眀君不居也素用强兵而弱之則察相不事彼眀君察相者則五兵不動而諸侯從辭讓而重賂至矣故眀君之攻戰也甲兵不出於軍而敵國勝衝櫓不施而邊城降士民不知而王業至矣彼眀君之從事也用財少曠日逺而為利長者故曰兵後起則諸侯可趨役也臣之所聞攻戰之道非師者雖有百萬之軍北之堂上雖有闔閭吳起之將禽之户內千丈之城拔之尊爼之間百尺之衝折之衽席之上故鍾鼓竽瑟之音不絶地可廣而欲可成和樂倡優侏儒之笑不乏諸侯可同日而致也故名配天地不為尊利制海內不為厚故夫善為王業者在勞天下而自佚亂天下而自安諸侯無成謀則其國無宿憂也何以知其然佚治在我勞亂在天下則王之道也鋭兵來則拒之患至則趨之使諸侯無成謀則其國無宿憂矣何以知其然也昔者魏王擁土千里帶甲三十六萬恃其强而拔邯鄲西圍定陽又從十二諸侯朝天子以西謀秦秦王恐之寢不安席食不甘味令於境內盡堞中為戰具竟為守備為死士置將以待魏氏衛鞅謀於秦王曰夫魏氏其功大而令行於天下有十二諸侯而朝天子其與必衆故以一秦而敵大魏恐不如王何不使臣見魏王則臣請必北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行於天下矣今大王之所從十二諸侯非宋衛也則鄒魯陳蔡此固大王之所以鞭箠使也不足以王天下大王不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚心而從天下之志則王業見矣大王不如先行王服然後圖齊楚魏王說於衛鞅之言也故身廣公宫制丹衣柱建九斿從七星之旟此天子之位也而魏王處之於是齊楚怒諸侯奔齊齊人伐魏殺其太子覆其十萬之軍魏王大恐跣行按兵於國而東次於齊然後天下乃舍之當是時秦王垂拱受西河之外而不以德魏王故衛鞅之始與秦王計也謀約不下席言於樽爼之間謀成於堂上而魏將已擒於齊矣衝櫓未施而西河之外入於秦矣此臣之所謂北之堂上擒將户內拔城於樽爼之間折衝席上者也楚懷王時秦欲伐齊患其與楚從親乃使張儀說楚王曰大王誠能閉關而絶約於齊臣請獻商於之地六百里使秦女得為大王箕帚之妾楚王恱而許之羣臣皆賀陳軫獨弔王怒曰何弔也對曰夫秦之所以重楚以其有齊也今絶齊而楚孤秦奚貪夫孤國與之商於之地六百里哉儀至秦必負王是王北絶齊交而西生患於秦也兩國之兵必俱至矣王曰碩子閉口母復言以待寡人得地乃厚賜張儀而閉關絶約於齊使一將軍隨張儀至秦儀佯墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士宋遺借宋之符北罵齊王齊王大怒折節而事秦齊秦之交合儀乃朝見楚使者曰子何不受地自某至某廣袤六里使者還報楚王大怒欲發兵攻秦陳軫曰軫可發口言乎攻之不如賂以一名都與之并兵而攻齊是我亡地於秦而取償於齊也今已絶齊而又責欺於秦是我合齊秦之交而來天下之兵也國必大傷矣王不聽使屈丐帥師伐秦秦亦發兵使庶長章擊之後秦惠王使告楚懷王請以武關之外易黔中地楚王曰不願碩得張儀而獻黔中儀請行秦王曰楚將甘心於子奈何儀曰秦彊而楚弱大王在楚不宜敢求臣且臣善其嬖臣靳尚尚得事幸姬鄭袖袖言王無不聼者遂往楚王囚將殺之尚謂袖曰秦王甚愛張儀將以六縣及美女贖之王重地尊秦秦女必貴而夫人斥矣於是袖日夜泣於王曰臣各為其主耳今殺張儀秦必大怒妾請子母俱遷江南母為秦所魚肉也王乃赦儀而厚禮之儀因說曰夫為從者無異於驅羣羊而攻猛虎不格眀矣今王不事秦秦劫韓驅梁而攻楚則楚危矣又自巴蜀治船積粟浮岷江而下一日行三百餘里不十日而距扞關扞關驚則黔中巫郡非王之有又舉甲而出武關則北地絶矣秦之攻楚危難在三月之內而楚待諸侯之救在半嵗之外此臣所為大王患也大王誠聽臣請令秦楚長為兄弟之國楚王已得儀而重出地乃許之儀遂說韓王曰韓地險惡山居國無二嵗之食見卒不過二十萬而秦兵百餘萬山東之卒被甲冒胄以會戰秦人捐甲徒裎以趨敵此無異垂千鈞於鳥卵之上必無幸矣大王不事秦秦下甲據宜陽塞成臯則王之國分矣為大王計莫如事秦而攻楚以轉禍而恱秦韓王許之儀歸報秦封以六邑號武信君復使東說齊王曰從人說大王者必曰齊蔽於三晋地廣民衆兵彊士勇雖有百秦將無奈齊何大王賢其說而不計其實今秦楚嫁娶韓獻宜陽梁效河外趙割河間大王不事秦秦驅韓梁攻南地悉趙兵指博關臨菑即墨非王有也齊王許之儀西說趙王曰大王收率天下以擯秦秦兵不敢出函谷關者十五年唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周守白馬之津秦雖僻逺然而心含忿怒之日久矣今有敝甲凋兵軍於澠池願渡河踰漳據畨吾會邯鄲之下碩以甲子合戰正殷紂之事謹使使臣先聞左右今楚與秦為昆弟韓梁稱藩臣齊獻魚鹽之地此斷趙之右肩也夫斷右肩而與人鬪失其黨而孤居求欲無危得乎今秦發三將軍塞午道軍成臯澠池約四國為一以攻趙趙服必四分其地臣竊為大王計莫若與秦約為兄弟之國也趙王許之儀北說燕王曰趙已事秦大王不事秦秦下甲雲中九原驅趙攻燕則易水長城非王之有矣燕王請獻常山之尾五城以和儀歸報未至而惠王薨子武王立武王自為太子時不說儀諸侯聞之皆畔衡約而復合從楚頃襄王十八年楚人有好以弱弓微繳加歸鴈之上者王聞召而問之對曰小臣之好射鶀鴈羅鸗小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道德五霸以弋戰國故秦魏燕趙者鶀鴈也齊魯韓衛者青首也鄒費郯邳者羅鸗也外其餘則不足射者見鳥六雙以王何取王何不以聖人為弓以勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也王朝張弓而射魏之大梁之南加其右臂而徑屬之於韓則中國之路絶而上蔡之郡壞矣還射圉之東解魏左肘而外擊定陶則魏之東外棄而大宋方與二郡者舉矣且魏斷二臂顛越矣膺擊郯國大梁可得而有也王綪繳蘭臺飲馬西河定魏大梁此一發之樂也若王之於弋誠好而不厭則出寶弓碆新繳射噣鳥於東海還蓋長城以為防朝射東莒夕發浿丘夜加即墨顧據午道則長城之東收而太山之北舉矣西結境於趙而北逹於燕三國布􅢄則從不待約而可成也北逰目於燕之遼東而南登望於越之會稽此再發之樂也若夫泗上十二諸侯左營而右拂之可一旦而盡也今秦破韓以為長憂得列城而不敢守也伐魏而無功擊趙顧病則秦魏之勇力屈矣楚之故地漢中析酈可得而復有也王出寶弓碆新繳涉鄳塞而待秦之倦也山東河內可得而一也勞民休衆南面稱王矣故曰秦為大鳥負海內而處東面而立左臂據趙之西南右臂傅楚鄢郢膺擊韓魏垂頭中國處既形便勢有地利奮翼鼓􅢄方二千里則秦未可得獨招而夜射也欲以激怒襄王故對以此言襄王因召與語遂言曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫有怨尚有報萬乘白公子胥是也今楚之地方五千里帶甲百萬猶足以踊躍中野也而坐受困臣竊為大王弗取也於是頃襄王遣使於諸侯復為從欲以伐秦越王勾踐自會稽歸七年拊循其士民欲用以報吳大夫逄同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之擊也必匿其形今夫吳兵加齊晋怨深於楚越名髙天下實害周室德少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越乘其弊可克也勾踐曰善秦昭王時客卿范睢說王曰秦韓之地形相錯如繡秦之有韓也譬如木之有蠧也人之有心腹之病也天下無變則已天下有變其為秦患者孰大於韓乎王不如收韓王曰吾固欲收韓韓不聽為之奈何對曰韓安得不聽乎王下兵而攻滎陽則鞏成臯之道不通北斷大行之道則上黨之師不下王一興兵而攻滎陽則其國斷而為三夫韓見必亡安得不聽乎若韓聽而霸事因可慮矣王曰善三十六年穰侯為秦將欲越韓魏而伐齊綱壽以廣其陶封雎乃上書曰臣聞眀主立政有功者不得不賞有能者不得不官勞大者其祿厚功多者其爵尊能治衆者其官大故無能者不敢當職焉有能者亦不得蔽隱使以臣之言為可碩行而益利其道以臣之言為不可久留臣無為也語曰庸主賞所愛而罰所惡眀主則不然賞必加於有功而刑必斷於有罪今臣之胸不足以常椹質而要不足以待斧鉞豈敢以疑事嘗試於王哉雖以臣為賤人而輕辱獨不重任臣者之無反復於王耶且臣聞周有砥砨宋有結緑梁有縣藜縣藜一曰美玉楚有和璞此四寶者土之所生良工之所失也而為天下名器然則聖王之所棄者獨不足以厚國家乎臣聞善厚家者取之於國善厚國者取之於諸侯天下有眀主則諸侯不得擅厚者何也為其割榮也良醫知病人之死生而聖主明於成敗之事利則行之害則舍之疑則少嘗之雖舜禹復生不能改已語之至者臣不敢載之於書其淺者又不足聽也意者臣愚而不概音溉於王心邪無乃言臣者賤而不可用乎自非然者臣願得少賜遊觀之間望見顔色一語無效請伏斧質昭王謂左右曰今日韓魏孰與始强對曰弗如也王曰今之如耳魏齊孰與孟嘗芒卯之賢對曰弗如也王曰以孟嘗芒卯之賢帥强韓魏之兵以伐秦猶無奈寡人何也今以無能之如耳魏齊帥弱韓魏以攻秦其無奈寡人何亦眀矣鍾期推琴對曰王之料天下過矣昔者六晋之時智氏最强滅破范中行又帥韓魏以圍趙襄子於晋陽決晋水以灌晋陽城不沉者三板耳智伯出行水韓康子御魏桓子驂乘智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑絳水利以灌平陽魏桓子肘韓康子康子履魏桓子躡其踵肘足接於車上而智氏分矣身死國亡為天下笑今秦之强不能過智伯韓魏雖弱尚賢其在晋陽之下也此乃方其用肘足時也願王之勿易也漢元年髙帝為沛公時至髙陽傳舍酈生食其入謁因言六國從橫時沛公喜賜酈生食問曰計將安出酈生曰足下起糾合之衆收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五逹之郊也今其城又多積粟臣善其令請得使之令下足下即不聽足下舉兵攻之臣為內應於是遣酈生行沛公引兵隨之漢王數困滎陽成臯計欲捐成臯以東屯鞏洛以拒楚廣野君酈食其因曰臣聞知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海內搖蕩農夫釋耒工女下機天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜太行之道距蜚狐之口守白馬之津以示諸侯效實形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田閒將二十萬之衆軍於歷下諸田宗彊負海阻河濟南近楚人多變詐足下雖遣數十萬師未可以嵗月破也臣請得奉眀詔說齊王使為漢而稱東藩上曰善乃從其畫項羽立沛公為漢王而三分關中地王秦降將以距漢王漢王怒欲謀攻羽周勃灌嬰樊噲皆勸之蕭何諫曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為周書曰天豫不取反受其咎語曰天漢其稱甚美夫能詘於一人之下而信於萬乘之上者湯武是也臣碩大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相漢王拜韓信為大將信已拜上坐王曰丞相數言將軍將軍何以教寡人計䇿信謝因問王曰今東鄉爭權天下豈非項王邪上曰然信曰大王自料勇悍仁彊孰與項王漢王默然良久曰弗如也信再拜賀曰唯信亦以為大王弗如也然臣嘗事項王請言項王為人也項王喑啞叱咤千人皆廢然不能任屬賢將此特匹夫之勇也項王為人恭謹言語姁姁人有病患涕泣分食飲至使人有功當封爵刻印刓忍不能豫此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城又背義帝約而以親愛王諸侯不平諸侯之見項王逐義帝江南亦皆歸逐其主自王善地項王所過亡不殘滅多怨百姓百姓不附特劫於威强服耳名雖為霸實失天下心故曰其强易弱今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服以義兵從思東歸之士何不散且三秦王為秦將將秦子弟數嵗而所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬人唯獨邯欣翳脫秦父兄怨此三人痛於骨髓今楚强以威王此三人秦民莫愛也大王之入武關秋豪亡所害除秦苛法與民約法三章耳秦民亡不欲得大王王秦者於諸侯之約大王當王關中關中民户知之王失職之蜀民亡不恨者今王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計三年項羽急圍漢王於滎陽漢王憂恐與酈食其謀撓楚權撓弱也酈生曰昔湯伐桀封其後把武王誅紂封其後宋今秦無道伐滅六國無立錐之地陛下誠復立六國後此皆爭戴陛下德義碩為臣妾德義已行南面稱伯楚必斂衽而朝漢王曰善趣刻印先生因行佩之酈生未行張良從外來謁漢王漢王方食曰客有為我計撓楚權者具以酈生計告良良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前著以籌之昔湯武伐桀紂封其後者度能制其死命也今陛下能制項籍死命乎其不可一矣武王入殷表商容閭式箕子門封比干墓今陛下能乎其不可二矣發巨橋之粟散鹿臺之財以賜貧窮今陛下能乎其不可三矣殷事以畢偃革為軒倒載干戈示不復用今陛下能乎其不可四矣休馬華山之陽示無所為今陛下能乎其不可五矣息牛桃林之野示天下不復輸積今陛下能乎其不可六矣且夫天下遊士左親戚棄墳墓左者言其乖避而委離之以從漢也去故舊從陛下者但日夜望咫尺之地今乃立六國唯無復立者既立國後土地皆盡無以封功勞之人故云無復立者唯者發語之辭遊士各歸事其主從親戚反故舊陛下誰與取天下乎其不可七矣且楚唯無强六國復撓而從之唯當使楚無强强則六國弱而從之陛下焉得而臣之其不可八矣誠用此謀陛下事去矣漢王輟食吐哺罵曰竪儒幾敗乃公事令趣銷印四年項羽自知少助食盡韓信又進兵擊之羽乃與漢約中分天下割洪溝以西為漢以東為楚九月羽歸吕后太公解而東歸漢王欲西歸張良陳平諫曰今漢有天下大半而諸侯皆附楚兵罷食盡此夭亡之時不因其幾而遂取之所謂養虎自遺患也漢王從之五年冬十月漢王追項羽至陽夏南止軍與韓信彭越期會擊楚至固陵不會楚擊漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不從奈何良曰楚兵且破二人未有分地其不至固宜君王能與共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至榖城皆以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易敗也於是漢王發使使韓信彭越至皆引兵來六年冬十月人告楚王韓信謀反上用陳平計僞逰雲夢十二月會諸侯于陳楚王信迎謁因執之詔曰天下既安豪傑有功者封侯新立未能盡圖其功身居軍九年或未習法令或以其故犯法大者死刑吾甚憐之其赦天下田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有渤海之利地方二千里持㦸百萬縣隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者上曰善賜金五百斤劉敬從胸奴來因言胸奴河南白羊樓煩王去長安近者七百里輕騎一日一夜可以至秦中秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫能興今陛下雖都關中實少人北近胡寇東有六國之族宗强一日有變陛下亦未得髙枕而卧也臣碩陛下徙齊諸田楚昭屈景燕趙韓魏後及豪傑名家居關中無事可以備胡諸侯有變亦足率以東伐此强本弱末之術也上曰善乃使劉敬徙所言關中十餘萬口髙后崩諸吕謀危劉氏丞相陳平太尉周勃朱虛侯劉章等共誅之謀立代王遂使人迎之郎中令張武等議皆曰漢大臣皆故髙帝時將習兵事多謀詐其屬意非止此也特畏髙帝吕太后威耳今已誅諸吕新蹀血京師以迎大王為名實不可信碩稱疾無往以觀其變中尉宋昌進曰羣臣之議皆非也夫秦失其政豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下絶望一矣髙帝王子弟地犬牙相制所謂磐石之宗也天下服其强二矣漢興除秦煩苛約法令施德惠人人自安難動搖三矣夫以吕太后之嚴立諸吕為三王擅權專制然而太尉以一節入北軍一呼士皆袒左為劉氏畔諸吕卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使其黨寧能專一耶內有朱虛東牟之親外畏吳楚淮南琅邪齊代之彊方今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也東漢光武初起兵主簿馮異因間進說曰天下同苦王氏思漢久矣今更始諸將從橫暴虐所至虜掠百姓失望無所依戴今公專命方面施行恩德夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬循行郡縣理寃結布惠澤光武納之鄧禹聞光武起兵安集河北即杖䇿北渡追及於鄴光武見之甚歡謂曰我得專封拜生逺來寧欲仕乎禹曰不願也光武曰即如是何欲為禹曰但碩眀公威德加於四海禹得效其尺寸垂功名於竹帛耳光武笑因留宿間語間私也禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸將皆庸人屈起屈音求勿反志在財幣爭用威力朝夕自快而已非有忠良眀智深慮逺圖欲尊主安民者也四方分崩離析形勢可見眀公雖建藩輔之功猶恐無所成立於今之計莫如延攬英雄務恱民心立髙祖之業救萬民之命以公而慮天下不足定也光武大恱因令左右號禹曰鄧將軍常宿止於中與定計議及王郎起兵光武自薊至信都使禹發奔命得數千人令自將之别攻拔樂陽從至廣阿光武舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內殽亂人思眀君猶赤子之慕慈母古之興者在德薄厚不以大小光武恱之光武北至薊會王郎兵起和成太守邳彤與帝會信都帝以兵衆未合議欲因信都兵西還長安彤廷對曰議者之言皆非也吏民歌吟思漢久矣故更始舉尊號而天下嚮應三輔清宫除道以迎之一夫荷㦸大呼則千里之將無不捐城遁逃虜伏請降自上古以來亦未有感物動民其如此者也又卜者王郎假名因勢驅集烏合之衆遂震燕趙之地況眀公奮二郡之兵揚嚮應之威以攻則何城不克以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若眀公無復征伐之意則雖信都之兵猶難會也何者眀公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也帝善其言而止光武為蕭王時諸將上尊號不許至南平棘固請又不許諸將且出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳳翼以成其所志耳今大王留時逆衆不正位號純恐士大夫望絶計窮則有去歸之思無為久自苦也大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗召馮異問四方動靜異曰更始必敗宗廟之憂在於大王宜從衆議會儒生彊華自關中奉赤伏符來詣王曰劉秀發兵捕不道四夷雲集龍鬪野四七之際火為主羣臣因復請乃即位于鄗南光武謂大中大夫來歙曰今西州未附子陽稱帝道里阻逺諸將方務關東思西州方略未知所在奈何歙曰臣嘗與隗囂相遇長安其人始起以漢為名臣願得奉威命開以丹青之信囂必束手自歸則述自亡之勢不足圖也帝然之令歙使於囂蜀漢先主屯新野徐庶薦諸葛亮先主遂詣亮凡三往乃見因屏人曰漢室傾頽姦臣竊命主上䝉塵孤不度德量力欲信大義於天下而智術淺短遂用猖獗至于今日然志猶未已君謂計將安出亮答曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為强者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權據有江東已厯三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得眀君將軍既帝室之胄信義著於四海總攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫夷越外結好孫權內修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆以出秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密諸葛亮留鎮荆州龎統隨先主入蜀益州牧劉璋與先主會涪統進䇿曰今因此㑹便可執之則將軍無用兵之勞而坐定一州也先主曰初入他國恩信未著此不可也璋既還成都先主嘗為璋北征漢中統復說曰隂選精兵晝夜兼道徑襲成都璋既不武又素無預備大軍卒至一舉便定此上計也楊懷高沛璋之名將各杖强兵據守關頭聞數有箋諫璋使發遣將軍還荆州將軍未至遣與相聞說荆州有急欲還救之並使裝束外作歸形此二子既服將軍英名又喜將軍之去計必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也退還白帝連引荆州徐還圖之此下計也若沈吟不去將致大困不可久矣先主然其中計即斬懷沛還向成都所過輒克先主以龎統為軍師中郎將統說先主曰荆州荒殘人物殫盡東有吳孫北有曹氏鼎足之計難以得志今益州國富民强户口百萬四部兵馬所出必具寶貨無求於外今可權借以定大事先主曰今指與吾為水火者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱攻昧五伯之事逆取順守報之以義事定之後封以大國何負於信今日不取終為人利耳法正說先主曰曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮而力不足也必將內有憂逼故耳今䇿淵郃才略不勝國之將帥舉衆往討則必可克之克之日廣農積榖觀釁伺隙上可以傾覆寇敵尊奬王室中可以蠶食雍涼廣拓境土下可以固守要害為操久之計此蓋天以與我時不可失也先主善其䇿乃率諸將進兵漢中正亦從行後主建興五年丞相諸葛亮伐魏率諸軍北駐漢中臨發上表曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽茍全性命於亂世不求聞逹於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之眀故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姧凶興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也碩陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之慢以彰其咎陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言亮聞孫權破曹休魏兵東下關中虛弱又上表曰先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之眀量臣之才故知臣伐賊才弱敵强也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左高帝眀並日月謀臣淵深然涉險被創危然後安今陛下未及髙帝謀臣不如平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰眀年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗伯山殆死潼關然後僞定一時耳況臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝每稱操為能猶有此失況臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年耳然喪趙雲陽羣馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之內所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虛圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下以定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之眀所能逆覩也七年吳孫權稱尊號其羣臣以並尊二帝來告議者咸以為交之無益而名體弗順宜顯眀正義絶其盟好諸葛亮上言曰權有僭逆之心久矣國家所以略其釁情者求掎角之援也今若加顯絶讎我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯穆未可一朝定也頓兵相持坐而須老使北賊得計非䇿之上者昔孝文卑辭胸奴先帝優與吳盟皆應權通變𢎞思逺益非匹夫之為分者也今議者咸以權利在鼎足不能并力且志望以滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼髙當分裂其地以為後規下當略民廣境示武於內非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦已深矣權僣之罪未宜眀也乃遣衛尉陳震慶權正號魏眀帝時太尉華歆上疏曰兵亂以來過踰二紀大魏承天受命陛下以聖德當成康之隆宜𢎞一代之治紹三王之迹雖有二賊負險延命茍聖化日躋逺人懷德將襁負而至夫兵不得已而用之故戢而時動臣誠碩陛下先留心於治道以征伐為後事且千里運糧非用兵之利越險深入無獨克之功如聞今年徴役頗失農桑之業為國者以民為基民以衣食為本使中國無饑寒之患百姓無離土之心則天下幸甚二賊之釁可坐而待也臣備位宰相老病日篤犬馬之命將盡恐不復奉望鑾蓋不敢不竭臣子之懷唯陛下裁察帝報曰君深慮國計朕甚嘉之賊憑恃山川二祖勞於前世猶不克平朕豈敢自多謂必滅之哉諸將以為不一探取無由自弊是以觀兵以窺其釁若天時未至周武還師乃前事之鑒朕敬不忘所戒吳孫權時蜀先主往見之周瑜上疏曰劉備以梟雄之姿而有關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙備置吳盛為築宫室多其美女玩好以娛其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨終非池中物也權以曹公在北方當廣攬英雄又恐備難卒制故不納曹操新破袁紹兵威日盛下書責孫權質任子權召羣臣會議張昭秦松等猶豫不能決權意不欲遣質乃獨將周瑜詣母前定議瑜曰昔楚國初封於荆山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荆陽至於南海傳業延祚九百餘年今將軍承父兄餘資兼六郡之衆兵精糧多將士用命鑄山為銅煮海為鹽境內富饒人不思亂泛舟舉帆朝發夕到士風徑勇所向無敵有何逼迫而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往便見制於人也極不過一侯印僕從十餘人車數乘馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂兵猶火也不戢將自焚將軍韜勇抗威以待天命何送質之有權母曰公瑾議是也公瑾與伯符同年小一月耳我視之如子也汝其兄事之遂不送質吳之羣臣步隲朱然等上疏云自蜀還者咸言欲背盟與魏交通多作舟船繕治城郭又蔣琬守漢中聞司馬懿南向不出兵乘虛以掎角之反委漢中還近成都事已彰灼無所復疑宜為之備權揆其不然曰吾待蜀不薄聘享盟誓無所負之何以致此又司馬懿前來入舒旬日便退蜀在萬里何知緩急而便出兵乎昔魏欲入漢川此間始嚴亦未舉動會聞魏還而止蜀寧可復以此有疑邪又人家治國舟船城郭何得不獲今此間治軍寧復欲以禦蜀邪人言若不可信朕為諸君破家保之蜀竟自無謀如權所籌周瑜薦魯肅才宜佐時權即見肅與語甚恱之衆賔罷退獨引肅還合榻對飲因密議曰今漢室傾危四方雲擾孤承父兄餘業思有桓文之功君既惠顧何以佐之肅對曰昔髙帝區區尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興曹操不可卒除為將軍計惟有鼎足江東以觀天下之釁規模如此亦自無嫌何者北方誠多務也因其多務勦除黃祖進伐劉表竟長江所極據而有之然後建號帝王以圖天下此髙帝之業也權曰今盡力一方冀以輔漢耳此言非所及也張昭非肅謙下不足頗訾毁之權不以介意益貴重之會劉表死肅進說曰夫荆楚與國鄰接水流順北外帶江漢內阻山陵有金城之固沃野萬里士民殷富若據而有之此帝王之資也今表新亡二子素不輯睦軍中諸將各有彼此加劉備天下梟雄與操有隙寄寓於表表惡其能而不能用也若備與彼協心上下齊同則宜撫安與結盟好如有離違宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及說備使撫表衆同心一意共治曹操備必喜而從命如其克諧天下可定也今不速往恐為操所先陸遜拜定威校尉軍屯利浦權以兄䇿女配遜數訪世務遜建議曰方今英雄棊跱豺狼窺望克敵寧亂非衆不濟而山冦舊惡依阻深地夫腹心未平難以圖逺可大部伍取其精鋭權納其䇿嘉禾三年太子登臨終上疏曰臣以無狀嬰抱篤疾自省微劣懼卒隕斃臣不自惜念當委離供養埋胔后土長不復奉望宫省朝覲日月生無益於國死貽陛下重戚以為哽結耳臣聞死生有命長短自天周晋顔回有上智之才而尚夭折況臣愚陋年過其壽生為國嗣沒享榮祚於臣已多亦何悲恨哉方今大事未定逋寇未討萬國喁喁係命陛下危者望安亂者仰治願陛下棄忘臣身割下流之恩修黃老之術篤養神光加羞珍膳廣開神眀之慮以定無窮之業則率土幸賴臣死無恨也皇子和仁孝聰哲德行清茂宜早建置以繫民望諸葛恪才略博逹器任佐時張休顧談謝景皆通敏有識斷入宜委腹心出可為瓜牙范慎華融矯矯壯節有國士之風羊衜辨捷有專對之材刀元優𢎞志履道真裴欽博記翰采足用蔣修虞翻志節分眀凡此諸臣或宜廊廟或任將帥皆練時事眀習法令守信固義有不可奪之志此皆陛下日月所照選置臣宫得與從事備知情素敢以陳聞臣重惟當今方外多虞師旅未休當厲六軍以圖進取軍以人為衆衆以財為寶竊聞郡縣頗有荒殘民物凋弊姦亂萌生是以法令繁滋刑辟重切臣聞為政聽民律令與時推移誠宜與將相大臣詳擇時宜博采衆議寬刑輕賦均息力役以順民望陸遜忠勤於時出身憂國謇謇在公有匪躬之節諸葛瑾步隲朱然全琮朱據吕岱吾粲闞澤嚴畯張承孫怡忠於為國通達治體可令陳上便益蠲除苛煩愛養士馬撫循百姓五年之外十年之內逺者歸復近者盡力兵不血刃而大事可定也臣聞鳥之將死其鳴也哀人之將死其言也善故子囊臨終遺言戒時君子以為忠豈況臣登其能已乎碩陛下留意聽采臣雖死之日猶生之年也烏程侯寶鼎二年徐陵亭侯華核上疏諫曰臣聞漢文之世九州晏然秦民喜去慘毒之苛政歸劉氏之寬仁省役約法與之更始分王子弟以藩漢室當此之時皆以為泰山之安無窮之基也至於賈誼獨以為可痛哭及流涕者三可為長嘆息者六乃曰當今之勢何異抱火積薪之下而寢其上火未及然而謂之安其後變亂皆如其言臣雖下愚不識大倫竊以曩時之事揆今之勢誼云復數年間諸王方剛漢之傅相稱疾罷歸欲以此為治雖堯舜不能安今大敵據九州之地有大半之衆習攻戰之餘術乘戎馬之舊勢欲與中國爭相吞之計其猶楚漢勢不兩立非徒漢之諸王淮南濟北而已誼之所欲痛哭比今為緩抱火卧薪之喻於今而急大皇帝覽前代之如彼察今勢之如此故廣開農桑之業積不訾之儲恤民重役務養戰士是以大小感恩各思竭命期運未至早棄萬國自是之後强臣專政上詭天時下違衆議忘安存之本邀一時之利數興軍旅傾竭府藏兵勞民困無時獲安今之存者乃創夷之遺衆哀苦之餘民耳遂使軍資空匱倉廪不實布帛之賜寒暑不周重以失業家户不贍而北積榖養民專心東向無復他警蜀為西藩土地險固加承先主統御之術謂其守御足以長久不圖一朝奄至傾覆脣亡齒寒古人所懼交州諸郡國之南土交址九真二郡已沒日南孤危存亡難保合浦以北民皆搖動因連避役多有離叛而備戍減少威鎮轉輕常恐呼吸復有變故皆海虜窺窬東縣多得離民地習海行狃於往年鈔盜無日今胸背有嫌首尾多難乃國朝之厄會也誠宜住建立之役先備豫之計勉墾殖之業為饑乏之救惟恐農時將過東作向晚有事之日整嚴未辦若舍此急盡力功作卒有風塵不虞之變當委版築之役應烽燧之急驅怨苦之衆赴白刃之難此乃大敵所因為資也如但固守曠日持久則軍糧必乏不待接刃而戰士已困矣昔太戊之時桑榖生庭懼而修德怪消殷興熒惑守心宋以為災景公下從瞽史之言而熒惑退舍景公延年夫德修於身而感異類言發於口而通神眀臣以愚蔽誤忝近署不能翼宣仁澤以感靈祗仰慙俯愧無所投處退伏思惟熒惑桑榖之異天示二主至如他餘錙介之妖近是門庭小神所為驗之天地無有他變而徴祥符瑞前後屢臻眀珠既覿白雀繼見萬億之祚實靈所挺以九域為宅天下為家不與編户之民轉徙同也又今之宫室先帝所營卜土立基非為不祥又揚市土地與宫接連若大功畢竟輿駕遷往門行之神皆當轉移猶恐長久未必勝舊屢遷不可留則有嫌此乃愚臣所以夙夜為憂灼也臣省月令季夏之月不可以興土功不可以會諸侯不可以起兵動衆舉大事必有大殃今雖諸侯不會諸侯之軍與會無異六月戊巳土行正王既不可犯加又農月時不可失昔魯隱公夏城中丘春秋書之垂為後戒今築宫為長世之洪基而犯天地之大禁襲春秋之所書廢敬授之上務臣以愚管竊所未安又恐所召離民或有不至討之則廢役興事不討日月滋蔓若悉並到大衆聚會希無疾病且人心安則念善苦則怨叛江南精兵北土所難欲以十卒當東一人天下未定深可憂惜之如此宫成死叛五千則北軍之衆更增五萬若到萬人則倍益十萬病者有死亡之損叛者傳不善之語此乃大敵所以歡喜也今當角力中原以定彊弱正於際會彼益我損加以勞困此乃雄夫智士所以深憂臣聞先王治國無三年之儲曰國非其國安寧之世戒備如此況敵强大而忽農忘畜今雖頗種殖間者大水沈沒其餘存者當須耘穫而長吏怖期上方諸郡身涉山林盡力伐材廢農棄務士民妻孥羸小墾殖又薄若有水旱則永無所獲郡見米當待有事冗食之衆仰官供濟若上下空乏運漕不供而北敵犯疆使周召更生良平復出不能為陛下計眀矣臣聞君眀者臣忠主聖者臣直是以慺慺昧犯天威乞垂哀省書奏不納建衡二年陸抗都督信陵西陵夷道樂鄉公安諸軍事治樂鄉抗聞都下政令多闕憂深慮逺乃上疏曰臣聞德均則衆者勝寡力侔則安者制危蓋六國所以兼并於强秦西楚所以北面於漢髙也今敵跨制九服非徒關右之地割據九州豈但鴻溝以西而已國家外無連國之援內非西楚之彊庶政陵遲黎民未乂而議者所恃徒以長川峻山限帶封域此乃書𫝊之末事非智者之所先也臣每逺惟戰國存亡之符近覽劉氏傾覆之釁考之典籍驗之行事中夜撫枕臨餐忘食昔胸奴未滅去病辭館漢道未純賈生哀泣況臣王室之出世荷光寵身名否泰與國同戚死生契闊義無茍且夙夜憂怛念至情慘夫事君之義犯而勿欺人臣之節匪躬是殉歷代名臣奏議卷七十八
