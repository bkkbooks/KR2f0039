body:
  text: 歷代名臣奏議卷九十三明楊士竒等撰經國宋孝宗時張浚論和戰利害疏曰臣今月二十五日恭被御筆處分臣已即日具奏去訖臣雖愚陋中有所懷敢不盡言伏惟聖慈俯賜矜察今之議者孰不以戰守為説其次則就遵舊轍重講前好以臣觀之戰守之説是也然而爭城爭地罪不容誅城髙池深兵甲堅利委而棄之地利不如人和則是戰守之中尚有可得而論者焉臣竊以為戰守之道本以廟勝君天下者誠能正身以正朝廷正朝廷以正百官正百官以正萬民用之戰則克守則固理有決然者矣如是而後可以言戰守仰惟陛下以神聖恭儉之資受太上委任之重即位以來孜孜治道然而德政未洽于人心宿弊未革於天下揆以廟勝猶有可疑臣愚碩陛下發乾剛奮獨斷於旬月之間大布詔旨一新內治盡循太祖太宗之治使南北之人知有大治於後人心既孚兵氣必振臣衰暮之景精力有限理當退間以全晚節豈肯分毫更有覬念獨以事機迫切治亂安危斷在今嵗臣若尚懷顧畏他日身名具喪辱國辱家悔之無及伏碩陛下深軫宸慮早定至計事或二三終恐無成臣愚干冒聖聰俯伏俟罪起居郎胡銓上疏曰右臣準樞密院劄子十一月十四日三省樞密院同奉聖旨令於後省限一日集議當與不當議和合與不合遣使禮數之後先土疆之取與條具聞奏仍令各舉所知以備小使者臣竊惟國家自紹興初與金人講和竭民膏血而不恤忘國大讎而不報上下偷生茍安嵗月以為盟好可恃蕩然決去藩維之守一旦完顔亮變生肘腋宗廟社稷幾不血食天下寒心陛下即位以來乾剛獨斷奮然圗任張浚及二三大臣力謀恢復符離之師兵不血刃而故疆復得使李顯忠盡忠於國不貪小利以成大舉之功則中原響應勢若破竹恢復之期可指以俟矣雖然功雖不成事雖不立自京都播遷之後垂四十年未有如符離之舉也敵人緣此震懾知陛下有大有為之志知廟謀有出不意之竒知邉鄙有折衝敵愾之人知臺諫有眀目張膽之臣知朝廷有面折廷諍之士以為中國有人遂有乞和之意兵法曰無故而求和者謀也敵人詭計端在於此昨來京都失守本於大臣耿南仲主和二聖劫遷本於宰相何栗主和維揚失守本於宰相汪黃主和完顔亮之變本於權臣主和自汴京板蕩以來四十年間敵人用鋭師徑卒長驅入國何嘗不以和哉暴蔑我二聖汙衊我兩宫殘毁我宗廟陵夷我社稷發掘我陵寢皇天后土實聞此言今欲與不戴天之讎講信修睦三綱五常掃地盡矣就令和好可成金人可信決不叛盟孝子順孫寧忍為之況萬萬無可信之理前車覆後車戒陛下若不深思逺慮力修政事力修守備力任將相力圗恢復而苟目前之安臣恐後車又將覆也議者乃曰姑與之和而隂為之備外雖和而內不忘戰此向來權臣誤國之言陛下聞之熟矣嗚呼燕安鴆毒不可懷也一溺於和則上下偷安將士解體終身不能自振尚又安能戰乎其為鴆毒多矣可勝寒心冒犯天威臣無任戰懼之至銓又進故事曰冒頓既立時東胡強使使謂冒頓曰欲得頭曼時號千里馬冒頓問羣臣皆曰此胸奴寶馬也勿豫冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏與東胡東胡王愈驕西侵與胸奴中間棄地莫居千餘里各居其邉為甌脫甌脫境上候望之處東胡使使謂冒頓曰胸奴所與我界甌脫外棄地胸奴不能至也吾欲有之冒頓問羣臣或曰此棄地豫之於是冒頓大怒曰地者國之本也奈何豫人諸言與者皆斬之臣謹案春秋以地為重凡書取地皆惡之也成二年取汶陽田則齊以戰敗而賂我宣元年齊人取濟西田則我以不義而賂齊夫齊以戰敗而賂我非我取之也而必書取専惡我也我以不義而賂齊非齊取之也而必書取專惡齊也取汶陽田雖專惡我然齊亦與有罪焉何者為人子孫不能守先祖之土地而輕以與人得無罪乎取濟西田雖專惡齊然我亦與有罪焉何者為人子孫不能守先祖之土地而輕以與人得無罪乎夫春秋書法重地如此以為萬世守國者之戒也嗚呼冒頓夷狄也且能知地者國之本而不以與人可謂深得春秋重地之旨矣可不鑑哉銓為敷文閣直學士乞規恢逺圗疏曰臣頃坐異議竄斥嶺海者垂三十年自謂老於窮荒絶域不復齒搢紳之列豈意天假之年陛下登大位首賜收召臣獲保首領盡室生還復見天日之清明平昔區區之私鬱結而不得伸者碩畢之於旒扆之前指天誓心有死無二故兩參華禁首尾九年每一賜對臣未嘗不洗髓滌慮極其精誠期有以感動天聽誠以今日國讎未報陵寢未歸故疆未復臣所以夙夜痛心誓不與敵人共天者也伏惟皇帝陛下天錫勇智退託以不能惟兼聽是務每聞臣言曲賜優容稱其直諒臣摩厲此心日復一日不知老之將至迫於七十致仕之禮懇祈再三陛下委曲保全又復寵以延閣之美臣雖碎身粉骨不足以報天地父母之恩輒敢極竭愚衷少裨國論之萬一伏望陛下體堯蹈舜轔禹轢湯規恢逺圗委任賢哲植正黜邪理財訓兵濟師練將逮鰥恤孤然後布告中外大明君臣父子之義必報國讎必歸陵寢必復故疆混一區夏以副太上付託之重臣雖在畎畝死無所憾臣既陛辭即出修門無復再瞻日表臣不勝惓惓愛君憂國之誠楊萬里上疏曰臣聞有天下之憂有君子之憂天下之憂憂其君之不為也君有為矣天下之喜而君子之憂也蓋不為之君其心遲天下之所不快有為之君其志鋭天下之所甚喜雖然喜者憂之所由寓也鋭者遲之所由伏也夫何故鋭則速不以速而成則以速而折天下之事有百全之成而無一折者乎求其成則必有以忍其折不忍其折則無務於速也速而折折而不忍則鋭安得不變而為遲哉一朝之有為必至於終身而不為是故君子見其初而憂其終古之君子得有為之君而輔之以求立天下之大功則必有以飬其君之志而古之君子亦必有以自飬其志詳其發而重其舉非詳其發也恐發之踈則一發足以廢百發非重其舉也恐舉之輕則一舉足以廢萬舉君臣之間其立也堅而其謀也老夫是以有成老則不欲速堅則雖可折而不可沮勝而不勇敗而不怯得而不喜失而不挫優遊容與以待天下之隙而徐制其要領蓋昔者晉文之圗霸也二年而欲用其民子犯曰民未知義民知義矣又欲用之子犯曰民未知信民知信矣又欲用之子犯曰民未知禮蓋文公之志踊躍奮迅而欲有為者一也而子犯三遏之越王之報吳也四年而召范蠡問曰伐吳可乎曰未可也又一年又問曰伐吳可乎又曰未可也又一年又問焉又一年又問焉則皆曰未可也蓋越王之志踊躍奮迅而欲有為者四也而范蠡四拒之夫二臣者舉其君踊躍奮迅之氣而納之於抑鬱憤悶之地使朝夕咨嗟求逞而不得逞則無乃過乎蓋二臣者深知所以養其君之志懼其速而折折而沮也及其國力已強兵氣已振事機之來而不可失勝形之見而不可禦則破楚滅吳了此事不終朝爾唐之德宗其志有一日不在於平藩鎮者乎然不勝其憤鋭於遣三將而一伐一伐而生朱泚之變也則不敢言及於藩鎮者終其身求節度則與節度求宰相則與宰相故藩鎮之禍始於肅宗而成於德宗至於亡唐藩鎮亡之也德宗豈真成藩鎮之禍者哉速而折也折而沮也使德宗而不速則不折折而不沮則豈不猶可為也何遽至於晚年之姑息哉文宗之志有一日不在於誅宦官者乎然不勝其憤鋭於任訓注而一決一決而生甘露之禍也則不敢言及於宦官者終其身專制則聽其專制詆辱則甘其詆辱故宦官之禍始於明皇而成於文宗至於亡唐宦官亡之也文宗豈真成宦官之禍者哉速而折也折而沮也使文宗而不速則不折折而不沮則豈不猶可為也何遽至於飲恨而沒哉二君之志本以求天下之大功而反以得天下之大禍則不飬其志之患也頃者新天子即位之初春秋鼎盛聖武天挺超然有必報不共戴天之心剋復神州之志天下仰目而望庶乎中興之有日也然親征之詔朝下而和議之詔夕出元戎之幕方開而信使之軺已駕紛紛擾擾以至於今而國論卒歸於和此其病安在哉蓋兆今日之和者符離之役也事不極則反不生勢不激則變不形暄甚則雨冬窮則春理固然也戰豈與和期哉和者戰之變也非求變也激而不得不變也且是役也天子之志固在於取中原也抑嘗熟䇿之詳議之耶議之不詳也䇿之不熟也得城而不能有也成功而不能善後也是故前日之勇一變而為怯前日之鋭一變而為鈍安得而不歸於和哉當其師之出也臣固知有今日之和也何則天子即位之初雖以堯舜為之亦不能以一日而洽威德於天下也威德未有以洽乎天下而欲一舉以求非常之功是非有成心也有幸心爾成乎心猶未必成乎外也心則幸矣獨能成乎外耶今日之事臣所大懼者懼天子之志沮於一折而敵人有以窺吾之沮而天下之禍所從生也唐之二君蓋可鑒矣人有未富而先急於作大屋者屋未成而家已貧則他日一墻之頽一籬之缺而不敢議於補葺夫一墻易補也一籬易葺也其費與屋大不同也勇於屋之大而怯於藩墻之細則其志之沮也臣嘗讀蜀志至於劉昭烈三見諸葛亮之事則為之太息蓋昭烈以漢之裔欲誅曹操以復漢室此昭烈之雅志也然得徐州則失徐州得豫州則失豫州敗於吕布又敗於曹操奔走狼狽於荆楚之間而無所於歸宜其憊而不復自振也而其見亮曰孤不度德欲信大義於天下而智術淺短遂用猖獗至于今日然志猶未已嗟乎昭烈者是時已老矣衰敗屢折而志猶未已此亮之所以樂於委身而願效其謀者也彼其徒手而成鼎峙之業其以此哉今天子以天下之半帶甲百萬表裏江淮安坐而指揮天下之豪傑以圗恢復祖宗之業而澡靖康之耻進則成混一之功守則成南北之勢何至於以一小折自沮而汲汲以議和哉臣願天子堅昭烈之志而毋以唐之二君自處則中興之功天下未絶望也萬里又論國勢曰臣聞善立國者以人成天而不以天敗人蓋國之所以廢興短長者天也而所以使其廢興短長者非天也人也惟人為能成天惟天亦能敗人非天之敗人也人實恃天以自敗而天亦不能如之何也且夫國於天地有與立焉古之國蓋有至弱而存有至強而亡者蓋有一再傳十餘年而遂滅有三四十世七八百年而不絶者夫強者宜其不可亡一再傳者皆艱難創業之君宜其不可滅而乃至於滅亡何也弱者宜其朝不及夕傳世至於二三十君之後大抵不驕則怠宜其無以自立而乃至於長存又何也求之而無其形究之而無其端故曰天也國一國也有昨廢而今興有既亡而復存君一君也有朝弱而暮強有前衰而後盛夫豈不以人乎哉故夫善養身者能延既絶之年善謀國者能延既衰之祚人之所至天亦至焉故曰人也自堯舜禹湯文武之為國計與孔子孟子之徒為世主言者大抵言人多於天而言天寡於人則憂夫有國者之以天敗人也臣竊觀天眷我國家已往之驗以卜方來之祚則知商周歷年之數未足為國家喻也臣蓋喜而憂之喜者天也而所憂者人也方敵人為靖康之役彼謂天下無復國家有也而民心依依戴其舊君我是以有南京之立方敵人為維揚之役彼謂深入窮侵之計不淺也而風潮效靈一隔千里我是以有海道之安方金亮為江上之役彼謂投鞭於江可以利涉也而千艘一炬敵人遂敗我是以有江海之捷則天之維持全安我國家者屢危而屢不危愈搖而愈不拔其眷何如也則國家子孫萬世帝王之業了了在人目中矣雖然天之所以為天者盡矣而人之所以為人者果盡也耶臣不得而知也果不盡耶臣不得而知也臣獨怪夫赤白囊一至則廟堂騷然而失措某所未有備某所未有兵募市人招武勇以為臨時應卒之計講解之議一許則君臣欣然而相慶罷戎幕散舟師徹邉防息憂顧以享安逸無為之樂既君臣欣然矣而邉塵又動也則騷然之色復見既廟堂騷然矣而和議又集也則欣然之心復生此何為者耶千金之家不幸而大盜為之鄰前有父兄不共戴天之讐而後盡盜吾千金之産之意彼大盜者日夕聚惡少治兵刃伺間隙以圗我而未有以乘也則陽謂我曰吾與若為好也所謂千金之主人者將遂毁藩墻投梃刃晏然盤樂飲酒而不為之慮乎抑將外姑與之好而隂益為之備也嗟乎千金之子能不忘於盜而為天下國家者不能不忘於敵天下之憂復有大於此者乎則所謂以人成天而不以天敗人者臣所不敢知也蓋臣聞之古之敵國對壘而未有息肩之期者其處之大略有四一曰謀二曰備三曰應四曰墮何謂謀書不甘食夜不安寢君臣日夜蹙頞相顧以敵讎未滅為大憂以天下未一為大耻以宗廟社稷未有萬世不可亡之實為大懼收召豪傑選馬勵兵深謀密計期於必取所謂卧榻之側豈容有鼻息雷鳴者太祖皇帝所以建一統之大業也何謂備謀人而羽翼未成也機會未至也釁隙未生也則遂不謀人也耶我不彼謀彼必我謀是故防之也豫而備之也周修政刑求人才深溝髙壘積粟治兵恐懼警戒常若一日而敵三至也夫是以屹然有不可犯之堅動則可以制人靜則可以不制於人為客則可以百全為主則可以萬全矣孫仲謀之所以走曹操也何謂應欲為謀人而不能舉欲為備人而不能勞政事紀綱守其常兵甲士馬因其舊其國不至於大治而亦不至於大亂敵不至則不慮其至敵至則徐應其至夫不慮其至而徐應其至者非有萬全之素也盡於一決以幸一勝爾故其勝也幸也非計也宋文帝之所以支佛狸也何謂墮既不能謀又不能備既不能備又不能應茍於安而不知危伏於其中偷於樂而不知憂寓於其間狎於敵人之詐而不悟墮於敵人之計而不疑至於覆亡其國則曰天也吳之所以誤於越也謀人者其國興備人者其國安應人者其國僅存而墮於人者其國必亡有國者可不深懼而謹擇於此四者乎臣竊觀朝廷今日之大計而深所未喻也謀耶備耶應耶墮耶蓋亦不出於應而已矣敵至而能應愈於不能應非不可也而未善也何則餒而始學稼渴而始浚井得為善理家者乎且平居不為萬全之䇿而緩急乃幸於一勝之功可以勝也而不可以必勝也可以幸也而不可以數幸也臣懼朝廷今與敵人講解之後輕信其情而不防其詐也歷下之兵一解而淮隂之師至鴻溝之境一分而垓下之禍作此往事明也臣願朝廷深為之備以待不測之警而後立國之大計臣得次第而歷陳之其二曰臣聞聖人不幸而當天下分裂之際者有所謂萬世之業有所謂數百年之業國無兩存無兩亡非有北無南則有南無北爾有能舉天下之二而一之此萬世之業也畫地以相俟據險以相拒攻則不足守則有餘此數百年之業也今聖天子既懲於一舉而折則萬世之業其成未有形而其發未有候也而數百年之業亦獨擾擾而未求所定岌岌而未見所立則亦可謂不能也已非不能也能而不為也非不為也為而不果也果則為為則能矣昔司馬晉內有王敦蘇峻之亂外有劉石之敵晉宜不能乎晉也而無病乎江左十葉之基劉宋之初譙縱梗蜀盧循逼都下而姚氏慕容氏拓跋氏沸中原宋宜不能乎宋也而無害乎南朝數百年之祚晉宋之君何人哉使朝廷當此時將不為國乎雖然此猶有天下之半也至於七十里而興商百里而造周湯文何人哉朝廷當此時將不為國乎雖然此猶有土也至於漢髙帝一劒之外無餘物光武一牛之外無餘資而以創業以中興二君何人哉朝廷當此時又將不為國乎嗟乎以髙光為之能以無國為有國也以湯文為之能以一國為天下也以晉宋為之能以危國為安國也然則天下豈有不可為之國哉亦存乎其人如何爾今也內無敦峻譙盧之猖獗外無劉石之英雄而獨當一未亡之金人而又以全楚為家吳越為宫此楚莊吳闔閭子胥種蠡之所以強霸用武之國也西控全蜀南擁荆襄北據長淮此髙帝先主孫仲謀楊行密之所以興起之根本也巨海限其東而三江五湖繚其南北此古之六朝所恃以為不拔而不可兼得者也引巴蜀之饒漕江淮之粟市西戎之馬而號召荆楚竒材劒客之精鋭此漢唐之所仰以為資者也奄是數者而有之而日夕惴焉不能以自存常若敵人之制其命是挾千金而憂貧有孟賁之力而憂弱者也故曰非不能也能而不為也非不為也為而不果也使聖天子一日斷自一心不惑羣議卓然挈吾國而大有所建立則萬世之業為之有餘也而况數百年之業哉獨患乎因循頽墮忘其我之所可惜而徹其敵之所可忌者而已矣蓋吾之所可惜而吾不惜則凡所可惜者無所往而惜無所往而惜者亡之所從開也彼之有所忌而吾不示之以其所忌則凡所可忌者無所往而忌無所往而忌者寇之所從召也昔者秦之滅六國非秦能滅六國也六國實自滅也不思久長之計而苟一日之安爭先割地以求和於秦地朝割而兵夕至蓋六國之君臣其初以為尺寸之地不足惜也不知夫國之亡乃自不惜尺寸始非尺寸之地能亡國也尺寸之不惜則不至於亡國則不止頃者敵人求唐鄧則與唐鄧求海泗則與海泗此何為者耶人有禦寇而不禦之垣之外乃毁垣以納之曰吾將拒之户是得為善禦寇者乎夫室以户存户以垣存也垣毁是無户也室其得存乎蜀失漢中而劉禪降唐獻淮南而李景蹙朝廷獨不見之耶此臣所謂患乎忘其我之所可惜者也漢髙帝之西入關也兵之所至迎刃而解如此其鋭也以仁義之師乘暴秦之亡如此其易也以髙帝自將而子房為之謀如此其全也而不敢越宛擊秦非宛之能重秦也能病漢也蓋宛者漢之後顧之病也宛一下則漢何病焉使秦人先得漢之所忌遣一將固守而不下則秦未易以歲月入也異時朝廷舉長淮數千里而視之如隙地不葺一壘不置一卒使寇之去來如入無人之境此何為者耶議者猶曰是時敵之創痍未盡瘳而勢力未全盛也而今者狠然有窺吾淮甸南下牧馬之意朝廷儻復如前日置淮於度外則天下之大禍至矣虎之所以不可捕者穹崖深林入者凜然而又羆遊乎其前豹伏乎其左此人之所以甚忌也使羆與豹皆去而虎立於途人孰不操戈以制之哉臧質壁盱眙而佛狸亟還劉仁瞻堅守夀春而周師未得志朝廷獨不見之耶此臣所謂患乎徹其敵之所可忌也大抵敵人之求可以與可以無與天下之地可以無守可以守可以與者貨也可以無與者地也可以無守者已失之地也可以守者未失之地也可以無與而與焉可以守而不守焉今之大患不在此耶蓋海陵嘗求漢淮之地矣而光堯不與之地而與之戰臣願朝廷以光堯之塞海陵而塞敵之貪如蜀如荆襄如武昌如沿江朝廷固嘗嚴守備矣臣願今日以待沿江之工而待淮凡淮之要害之地敵之所必攻者巨鎮如廬夀廣陵者則各擇一大將委以一面而付之重兵至於其它州郡則多其壁壘而葺其城池城池堅則可攻而不可下壁壘多則寇有牽而不敢越有大將重兵以居要則沿淮之州有所恃而無所懼兵法所謂常山之蛇者此也蓋固國者以江而不以淮固江者以淮而不以江而今之説者或曰淮不可守而江可恃嗟乎不恃江者江可恃也恃江則江不可恃矣昔者陳後主盡召江北之諸將以朝正而韓擒虎賀若弼掩其虛以至江上陳之君臣猶曰天塹必無可濟之理且引周齊之兵五來皆敗以待隋言未既隋師濟矣甚矣夫江之誤南國也非江誤人之國也恃之者誤之也宫之竒曰虢虞之表也脣亡則齒寒江者淮之虞也淮者江之虢也朝廷其勿恃江而恃淮勿恃淮而備淮則數百年之業可得而議矣不然臣恐未可以一朝居也或者又曰守淮善矣其如淮地之空曠何若夫江者紀涉所謂備之不過數處直差易爾是不然有淮而後江者吾之江也無淮則江者非獨吾之江也亦敵之江也全而有之猶恐失之而況分之哉且吾之有淮以為空曠也使吾不有而敵有之彼以為空曠耶彼將居而耕耕而守守而伺則吾之一喘而彼聞一動而彼見人惟有所不可測而後不可圗引寇以自逼而日夕與之相目於一水之間則國尚何可為而敵尚何可備哉故夫江者誤人之國而紀涉之論又誤人之江者也且吳人者欲淮而不得也非得淮而不欲也吾則有吳人之所無而又可棄吾之所有耶臣是以流涕而極言至此其三曰臣聞有為者必為其全何謂全不福其福不利其利是謂全夫為國者何嚮非福何擇非利而曰不福其福不利其利何也非不福其福也不福其禍中之福也非不利其利也不利其害中之利也夫何故貴乎福者貴其福而無禍貴乎利者貴其利而無害曰福焉而禍之所寄曰利焉而害之所藏是無福賢於福而不利賢於利也故曰有為者必為其全不福其福不利其利是謂全今夫徑寸之珠潛於驪龍之頷而襲於萬仞之淵人將語我曰珠可得也其信者智乎其不信者智乎宜若信之者之智也殊不知身與珠孰重陸與淵孰安捐吾身而珠可得猶不為也況身可捐而珠不可得耶今士大夫孰不曰中原吾之舊物可取而不可棄雖然意則忠矣言則快矣而為國計則未也䇿今者不以今而以古料後者不以後而以今古者今之鏡也今者後之柢也盍觀之東晉乎蓋嘗有幽并矣至王浚劉琨亡而幽并亦亡又嘗有河南矣至祖逖亡而河南亦亡非數子之死而始亡幽并河南也數子之未死而幽并河南已亡矣蓋其存者名也其亡者實也盍觀之劉宋乎蓋嘗得關中矣至髙祖還而失關中又嘗得淮北矣至明帝北討之敗而失淮北非髙祖之還明帝之敗而始失關中淮北也髙祖之未還明帝之未敗而關中淮北已失矣蓋其得者名也其失者實也聞之曰雖鞭之長不及馬腹何則功視時為成毁時視天為盈虗天之所至時亦至焉時之所至功亦至焉未聞時先天而得功先時而就者也是故天與時相遭則以百敗之漢髙帝取百勝之項羽天與時相違則以劉葛之雄傑熟視孱弱之曹丕靖康之初金人之北歸也河北嘗為吾有矣紹興之間金人割地見還也河南長安嘗為吾有矣金亮之敗也海泗唐鄧又嘗為吾有矣隆興之舉也符離又嘗為吾有矣有則有矣而卒不有焉何也時也非時也天也然則古之舉亦足以為今之懲今之事亦足以為後之規矣是故為今之計和不如戰戰不如守和則懈戰則力故曰和不如戰戰則殆守則全故曰戰不如守昔吳大帝時諸將各欲立功多陳便宜帝以問顧雍雍曰兵法戒於小利此等欲邀功名非為國也茍不足以損敵所不宜聽蜀將薑維每欲大舉伐魏費禕曰吾等不如諸葛丞相丞相猶不能定中原不如保國治民無決成敗於一舉嗟乎吳其以雍為懦而蜀其以維為壯矣雖然未見其害雍信懦而維信壯也及諸葛恪以輕動無功而民怨薑維屢出黷武而國亡則顧雍費禕之言猶信噫宋德當天卜世萬億天不佑敵亡不及夕不待智者而後喻也然日有中昃月有盈缺天之道也而況國乎天之於我國家蓋必有時矣可以俟不可以躁蓋聖人之於時所不能者二曰去曰來所能者二曰待曰乘臣願朝廷盡人事以周其待待其來而決其乘不以小利而輕試吾之大技不以小鈍而中怠吾之大計則中興之全功不在今日在何日耶燕嘗欲圗苻堅慕容農曰取果於未熟與自落不過旬日然其難易美惡相去逺矣金人之強不過苻堅其君臣萬萬不及堅朝廷盍少待哉參知政事史浩奏曰臣聞古之得天下者皆由小以致大若湯以七十里文王以百里是也湯之一征天下始信故東征西怨南征北怨怨者徯其來而不至也是故師至其國若時雨降非謂使四方之民先歸湯之國也文王三分天下有其二者有其心也是故至武王時始因商之旅其會如林非謂使天下之民先歸文王之國也若使民先歸其國則七十里之亳百里之豐何以容東西南北之人而所謂亳與豐之地方且疲於贍飬日益窮蹙又何暇修文德以格逺人之心耶今陛下北有徑敵日為姦謀以撓我日縱流民以困我沿邉守臣由之不知方且日以招徠為事自去冬用兵以來歸正之官已滿五百皆髙官大爵動欲添差見闕歸正之民不知其數皆竭民膏血唯恐廩之不至數年之後國家之蓄積竭於此役東南之士夫久不得調東南之農民身口之奉不得自用安保其不起為盜賊而求衣食之資乎不於此時有以救之駸駸不已布滿東南蠶食既多國用益乏已來者不獲優恤必有悔心方來者待之愈薄必有怨心夫剝膚椎髓以奉之意者望其知恩而欲其為我用也若使怨悔之心生終亦何所濟此為國逺慮者莫不寒心也今説者必曰不如是不足以繫中原人心夫內修政事教化既明風俗既厚百姓家給而人足使彼之士民願立於朝願為之氓而不可得然後一旦興師恢復土宇皆為王臣則其心乃大恱如湯之后來其蘇武王之一怒而安也若吾之政化未施財力先屈國尚未可保安能繫中原之心乎凡為此論者皆慕古人之虛名失當今之實利者也臣願陛下密敕沿邉守臣其有襁負而至者諭之以久逺之計曰國家議戰與和皆為汝輩久此陷沒欲圗拯濟若為戰計則他日得我故地汝皆吾民又何必捨墳墓棄親戚而來若為和計朝廷亦豈遂忘汝等宜各安本土以俟議定則彼必感我恤之之意深念之之心切將無所歸怨而敵聞之亦必知我國有人矣於是葺藩籬保形勢寬民力以固邦本募勇士以益軍籍政修而教興國富而兵強機會之來豈有窮已一舉而得中原大開明堂受朝賀此成湯文王已試之明效也夫未至此時而先為計以自蹙此敵之願後雖噬臍其無及矣利害得失之機較然可見陛下不可不深察也儻未以臣言為然欲望聖慈斷自宸衷上取太上之訓下盡近臣之議以歸至當然後定其規撫使沿邉守臣有所遵守浩又上奏曰臣聞棄實而務名捨近而謀逺見利而忘害此三者天下之大弊古今之至戒也臣比者極論招納歸正人之非雖荷聖慈已賜開納尚慮議者或有異同臣請得申言其詳夫自淮泗之北燕趙以南幅貟萬里皆我故疆若使朝廷根本已立人材已衆功無僭賞罪無佚罰兵強國富事力有餘以陛下英武之資乘中原愛戴之心一舉而取之宅中圗大以復舊物則天下之議孰敢以為非今既未能乃區區然招集逋逃之人以為繫中原之心此臣所謂棄實而務名一弊也自去嵗金人南下之後兩淮蕩然驅虜殺戮不可勝計井堙木刋積骸如山慟哭之聲至今未已調度日繁江左重困屯戍雖遣藩籬未固此皆當如飢渴如焚溺日夜圗之者今未見大有措畫而廟堂之上率常以太半日力整會歸正人某人乞官某人援例以廟堂猶如此則宣撫司沿邉諸軍帥司州郡又可知矣此臣所謂捨近而謀逺二弊也北人初來扶老攜幼莫不皆言去虎狼歸父母嗚噫流涕以手加額不知者觀之真若可喜然此輩小人何常之有廪給祿賞少不厭其無涯之心則怨詈並作未必不刺取國事歸報敵境況又其間往往有夲心為間探而來者此臣所謂見利而忘害三弊也以此三説反覆究繹招納利害可以立決加之敵情難測譎詐萬端今北人將片紙來者即與官僧道雖無度牒但持戒牒來者即與度牒若敵人設計多作偽告偽牒源源而來上則竭國力以祿養歸正官下則隂壞度牒之法我尚為有謀也哉且中國士大夫雖身登科第家世公侯一有去失坐廢終身而歸正官則一切不問是仕於敵人者何其幸而仕於天朝者何其不幸耶中國士民欲為僧道者由買度牒以至書填受戒非四五百千不可而歸正僧道則一切不問是生於敵界者何其幸而生於王土者何其不幸耶臣惓惓之實欲望陛下棄名取實以集大勳先近後逺以安邉鄙見利思害以杜亂萌異同之論一以理決之昔吐蕃欲取唐維州隂遣婦人嫁守閽者生子長大守閽而吐蕃入寇遂開關納之宣和中郭藥師入朝請擊鞠牟陀岡乃默視可作營壘之地其後金人大入果集于此則招納之事豈可忽哉豈可忽哉伏惟留神采擇川陜宣諭使虞允文上言曰臣以孤逺之蹤曲蒙陛下親擢聖恩不一實為非常之遇但以才力凡微未有豪髮報效愧懼并心敢因使令輒以今日不可失之機仰干四聰之聽伏惟陛下聖智默運成算不遺規模之逺固已素定用敢冒昧禆萬分一臣既聞敵中之亂敵兵在中原者不多實天相陛下恢復之時而形勢便利莫如陜西蓋得兵得馬得糧可以壯國威可以足軍餉欲守則有險可恃欲戰則有資可憑自古進取天下固有次序而莫先於此臣嘗所憂者大將相與因循無一肯出力為國家任責兩日來吳拱出示吳璘三書謹録進呈臣觀其書意知敵為甚怯知其兵為可用知民心為已歸知糧道可以取足於西人又知其疾之已去老之可憂而自勉於一舉而臣所不知者朝廷怯於立事和戰未決尚以為疑也自敵使及境而去或以為敵中方亂有所未暇或以為敵人未肯歸疆將有所要致於我以臣愚慮二説皆可置不問所當急者今日之機如因璘之意而用其機此在陛下與二三大臣斷以一言而已臣博采輿論謂中原之敵不多必無深入之憂若且令董庠以本管兵守淮東郭振以四統制兵守淮西趙撙駐信陽李道迫新野唐鄧之間各因其險而固守勿與敵戰因得息兵以待用先令吳拱選精兵二萬人從鄧州路與王彥會於商州以萬人守潼關使河南之敵不能進兵以援長安又以萬人與彥合力進討而吳璘姚仲擁大兵而出西人知朝廷大舉倡義而應者必甚於今日官軍聲震關輔則寶雞之敵知其無援又為西人之所共棄若不請降亦必引兵渡河而去國家得於此時收兵籍馬因長安之糧而取河南因河南之糧而會諸軍以取汴則兵力全而可以省諸道之運至如兩河之地因民之心可傳檄而定矣臣聞兵好合而惡分時難得而易失欲望陛下與二三大臣察納其説而熟計之潛以一定之説分命諸將使戮力以收不世之功天下幸甚臣迫於愚忠抵冒天威伏深震懼允文又上言曰臣竊惟藝祖皇帝創業之初削平諸國首會襄陽之兵以取荆南蓋天下勝勢所在先得之則雄視吳蜀一統之祚實始於此今陛下留神於襄漢之上遊控吳蜀之全壤規摹𢎞逺得藝祖之遺意天開聖哲先後同符而議者謂自古以來蜀以重山為險吳以長江為險而荆襄之地平原廣袤無一山一水之限隔故三國之後以至南北之分凡皆以兵為險良將徑卒聚為重鎮方册可考也道路錯出不可以數計而其大者有六自陜虢出盧氏可以直抵歸州自光化出茨湖可以直抵夷陵自汝州出新野可以直抵襄陽自唐州出棗陽可以直抵郢州自蔡州出信陽之三關可以直抵德安府自陳州出宛丘新息可以直抵光黃彌亙數千里實為坦塗皆當以兵為險之地也兵厚則險固理之自然而今之備兵反薄於守吳守蜀之數一失支梧敵勢橫潰吳蜀之形釐而為二屯兵雖多首尾莫應甚可慮也伏願陛下曲軫淵衷下臣之章於腹心大臣議所以益兵之䇿庶幾不失藝祖所以先重荆襄之意為陛下恢復之基天下幸甚歷代名臣奏議卷九十三
