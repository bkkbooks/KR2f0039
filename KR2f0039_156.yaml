body:
  text: 歷代名臣奏議卷一百五十六明楊士竒等撰知人宋徽宗立左司諫陳祐狀奏曰臣面奉聖旨計會左正言任伯雨同商量論列宰臣韓忠彥援引元祐臣寮事勘會元祐臣寮刑部岑象求賈易工部豐稷趙睿太常張耒楊康國吏部黃庭堅朝補之考功劉唐老司勳陳察人才均為可用特迹近嫌疑而已今若論列付之三省不免改易既非利害所繫徒有分别黨類之名天下之人且妄意朝廷逐去元祐之黨復興紹聖之政事議論蜂起愛惡相攻必復為異時之患目今紹聖人才比肩於朝一切不問元祐臣寮才十數人便輒攻擊是朝廷之上公然之黨也中書舍人曽肇上奏曰臣聞治天下在於正朝廷正朝廷在于辨邪正朝廷之上邪正不分而欲有為于天下難矣蓋正者君子邪者小人君子在上小人在下君子在內小人在外則君子道長小人道消而朝廷尊天下治矣小人在上君子在下小人在內君子在外則小人道長君子道消朝廷不得其尊天下不得而治矣君子小人之不並立猶氷炭之不可同器鑿枘之不能相入也何則君子所鄉者公正小人所鄉者私邪也君子所知者逺且大小人所知者近且小也君子所趨者義小人所趨者利也君子所守者一定而不可移小人則觀望希合隨時上下而未嘗一也是以君子之道常直而難合小人之言常遜而易入自非明智不惑之君未有不屈彼而伸此者故以堯之聖而曰畏巧言令色孔壬以舜之聖而曰堲讒説以孔子之聖而曰逺佞人善為國者必使君子小人兩得其所而不能相參然後君子有以御小人小人不能害君子茍朝廷之上忠佞並進賢不肖雜處則其于圖事揆策任賢使能取舍必有不同取舍不同則主聽惑主聽惑則君子有時而屈小人有時而伸矣君子見絀則君子之類不得立小人見伸則小人之類更相援引充塞要路以是為非以白為黑蒙蔽欺罔無所不為禍亂之源甚可畏也夫自昔為人君者豈樂屈君子伸小人以啓禍亂之源哉蓋小人聽其言則似辨任之事則似材又能先意承志以逢人主之好姦言曲學以避人主之惡浸淫滋蔓日漸月磨故能使人主甘心而不悟也然則何以辨之亦在虛心正志以察之而已昔者舜禹共兜雜處堯朝堯能賢舜禹而退共兜故大治孔子與季孟皆仕於魯魯公賢季孟而退孔子故大亂由是觀之君子小人豈能自消長哉在人主取舍何如爾昔者劉向嘗為漢元帝好儒而優遊不斷故向以謂執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消元帝不能用向言而委政恭顯漢室繇是而衰諸葛亮嘗與蜀先主論親賢臣逺小人先漢所以興隆親小人逺賢臣後漢所以傾頽君臣相勉卒成三分之業至如齊威公任管仲隰朋則九合諸侯一正天下任寺貂易牙則身蒙其禍為世大僇唐明皇用姚崇宋璟則有開元之治用李林甫楊國忠則有天寶之亂一人之身而前後成敗之效如此然則邪正果可不辨哉臣故以為治天下在于正朝廷正朝廷在於辨邪正惟陛下留神省察右正言崔德符上乞辨忠邪書曰臣聞諫諍之道不激切不足以起人主意激切則近訕謗夫以人臣而有訕謗之名此讒邪之論所以易乘而世主所以不悟天下所以卷舌吞聲以言為戒也臣嘗讀史見桓帝以災異數見博求直言及劉儒上書則不能容又觀曺鸞訟黨人而被誅李少良論元載而見戮未嘗不掩卷興歎矯然有山林不返之意比聞國家以日食之異詔求直言蚍蜉區區欲報萬一而詔有言之失中朕不加罪又曰尚悉乃心無悼後害則感極而繼之以泣蓋陛下披至情廓聖度以來天下之言如此而私祕所聞不肯一吐是天下臣子負陛下也伏讀詔書曰凡朕躬之闕失左右之忠邪政令之臧否風俗之美惡朝廷之德澤有不下究閭閻之疾苦有不上聞咸聽直言臣以謂方今政令煩苛而民不堪擾風俗險薄而法不能勝德澤非不厚而施設不得其當疾苦雖欲聞而詢求不得其人此時未暇為陛下一二陳之而特以左右之忠邪為本忠邪判天下無餘事惟其有忠不能明有邪不能去則陛下之闕失莫大乎此賤臣於草萊不識朝廷之士特以陛下左右之人有指元祐之臣以為姦黨者此必邪人也昔侯覽曹節嘗以黨人之論藉口誅李膺杜密捕夏馥為黨魁指范滂所用為范黨海內塗炭二十餘年廢錮誅徙者不可勝計漢自此亡李宗閔牛僧孺李德裕各植黨與更相報怨縉紳之禍不解者四十餘年唐亦自是不復振以本朝社稷之靈宗廟之福而憸人乘間以黨人為名掃除天下善士漢唐衰亂之禍將復見於今日甚可駭也夫毁譽者天下之公論臣竊惟朝廷毁譽與天下大異故責受崖州司戶參軍司馬光陛下左右之人以為姦而天下皆曰忠今宰相章惇陛下左右之人以為忠而天下以為姦此理何也臣請略言姦人之迹而陛下試以是觀之夫乘時抵巇以盜富貴探微揣端以固權寵専營一己之私不顧國家成敗者謂之姦可也變亂是非傾移主意懷道德者必加誣染負髙名者志在翦除謂之姦可也苞苴滿門私謁踵路隂交不逞密結禁庭謂之姦可也以竒技淫巧蕩上心以倡優女色敗君德然後獨操刑賞自報恩讐者謂之姦可也蔽遮主聽排逐正人微言者造以刺譏直諫者陷以指斥以杜天下之言以掩滔天之罪謂之姦可也凡此光有之乎惇有之乎皆惇之所有而光之所無也夫有其實者名隨之無其實者而與之名天下其誰信之傳曰謂狐為狸則非特不知狐亦不知狸是故以佞為忠則必以忠為佞於是乎有謬賞濫罰謬賞濫罰行而佞人倘佯矣如此為國不亂者未之有也夫光凡事四朝以忠信長者聞於天下危言正色奮不顧身雖古名臣無以逺過而謂之姦欺天下也欺後世也夫一人可欺也朝廷可欺也天下後世不可欺也昔周勃木強敦厚故屬大事安劉氏非勃不可汲黯好直言面折人短故能寢淮南之謀輔少主守成賁育不能奪由是言之姑欲周旋奏事便佞捷給則人人皆可為公卿必期於利害安危之際無負於國家非正人不可臣孤生晚輩平生不識光而光又已死何所愛惜所惜者國家為姦邪報仇而負天下之謗耳至如惇狙詐險賊臣不能盡知可怪天下士大夫呼曰惇賊昔李栖筠為御史大夫天下尊之不敢名呼為贊皇公侯僅一布衣之士西河之人尊之而不敢名呼曰侯公今惇貴為宰相人所具瞻天下以名呼之又指以為賊何也辜負主恩盜竊國柄忠臣痛憤義士不服故賤而名之又指其實而名之以賊也且以一事中外所共知者言之惇指元祐之臣盡以為黨而投之必死獨蘇頌無恙固天下之賢者然所逐皆頌等夷以謂不預政事則頌元祐時宰相此何理也惇竊國柄也自陛下承天寶命入紹大統海內翹然日跂新政故京師人曰大惇小惇殃及子孫又曰大惇小惇無地安身大惇謂章惇小惇則御史中丞安惇也夫百姓至愚而神此言雖小可以見天下之心也公議所在借使陛下史臣不書而天下之人必有書之者昔晉侯一國耳六官之長皆用民譽而無謗言於是乎能霸陛下廣有四海選擇一二臣顧反若此臣恐傷天地之鑒纍日月之明失天下之心貽後世笑夫小人譬之蝮蛇毒蝎其凶忍害人根於天性隨遇必發天下無事國勢安強不過賊害忠良破碎善類至緩急危疑之際則必有反覆賣國之心跋扈不測之變何以知之蓋自古欲盡去正人者非姦臣則逆子殺蕭望之張猛蘇建京房賈捐者石顯也逐韓瑗來濟褚遂良長孫無忌上官儀者許敬宗也逐張九齡誣王忠嗣殺李適之者李林甫也貶杜佑陷李揆殺顔真卿者盧杞也殺孔融楊修荀彧者曹操也誅戮關中舊族者董卓也盡去中朝名士者栁粲也夫正人者君之羽翼姦賊患之必翦其翼然後得志惟陛下前知詭計密挫姦謀力收骨鯁之臣自為羽翼其所以消災變于無形守太平于長久也夫宰相者使百官各任其職者也比年以來諫官不聞論得失御史不聞劾姦邪門下不聞封駮詔令共持喑默主事婀娜非宰相使之而誰也昔李林甫以其罪大滅頂惡極通天則招天下邪人佞夫布在言職脅以禍福無敢上言由是竊相位十有九年罪大惡盈而人主不知此可以為後世戒也其以一事言之漢成帝欲立趙昭儀為皇后太中大夫劉輔上書以忠切得罪而師丹谷永辛慶忌之徒交章請救夫以漢緒中衰猶有清議主張爭臣頃者諫官鄒浩以言事得罪先朝左右大臣拱而觀之諫垣同列無一語者又從而擠之去夫左右大臣股肱心膂而言官其耳目也皆天下安危之所係而一切姦諛若此則陛下亦欲柬拔忠藎圖回太平孰為陛下言之孰為陛下行之姦詞互至邪説沓進陛下亦有堯舜之聰明不得行朝進一人而復止暮逐一佞而再收是非紛紜邪正參錯而天下之事敗矣共惟陛下躬睿聖之資體溫文之德皇天眷睞宗廟顧享畀付神器今欲欽承上帝慰答祖宗之靈而國勢若此此臣所以為陛下慮也夫日者陽也陽為君子食之者隂為臣為小人日有食之臣侵君小人勝君子也且四月正陽之月陽極盛隂極衰之時而隂且侵陽故其變為大其所以消復之道臣不敢曲牽異説旁取雜家姑以經傳所陳聞於陛下十月之交日食之詩也刺四國無政不用其良上至卿士司徒下至趣馬師氏咸非其人左氏傳曰國無政不用善則自謫於日月之災弭災之道有三一曰擇人二曰因民三曰從時唐宋璟曰日食修德使君子道長小人道消止女謁放讒夫所謂修德也此言播于詩著于傳可以覆視惟陛下畏天威聽明命獨運乾剛大明邪正毋違經義毋欎衆心則天意解矣若夫伐鼓用幣素服徹樂而無修德善政之實則非所以應天也傳曰應天以實不以文惟陛下至誠毋忽建中靖國元年殿中侍御史尹洙乞戒朋黨之弊狀曰臣嘗聞自古朋黨之論既起未有不為朝廷患臣不敢逺引漢唐敗亂之迹為今日戒臣竊觀紹聖元符間朋黨之説互作豈朝廷所欲為哉亦有傾危變詐之士日以飛箝捭闔為術奔走一二權臣之門陳謀獻計以意求合務希寵利遂使搢紳之禍幾半朝廷而班列為之一空五六年間海內多故君臣無間暇之日此陛下所親見也伏自陛下即位以來治尚簡靜以與天下休息更革庶事惟務便安進用羣臣不間新舊任賢以勿二去邪以勿疑由是朋黨之論不攻而判天下士大夫始得安枕而寢比下明詔以謂為政取人無彼時此時之别又以建中靖國元年為紀年之號則陛下切於致治之意蓋可見矣然臣竊聞近士人中或有乘時射利之徒伺候府第出入權門或巧締讒言以中人或妄生虛譽以舉類或倡異同之論以潛惑上聽或騰反覆之説以隂動柄臣或執異見欲以混淆人物之正邪或騁曲辨欲以變更朝廷之好惡假浮議以奪正任私意以亂公轉是作非駕虛為實豈顧紛紜之害理唯期協輔以進身黨與漸成必壞風俗不行禁飭曷砥靜安臣願陛下聽覽之際聖慮先及仍詔中書門下特行戒勵及出榜朝堂庶以少慰中外士大夫危疑之心知朝廷深惡朋黨之弊使善人君子可以存立則大中之道何患不建惟陛下察之徽宗時校書郎陳瓘奏曰臣聞為善者可愛為惡者可憎禮曰愛而知其惡憎而知其善則是可憎者有可愛也可愛者有可憎也此乃聖人經世大公之法人主用之兩平之術非兩可也前日朝廷之上深疾兩可凡安石之所可而神考之所謂不可者必改神考之不可以從安石之可執一而廢百其為乖譎也甚矣然則一可者偏兩可者平平者之言必有可採臣故曰兩可可問孔子曰我則異於是無可無不可無所不可其可多矣況兩可乎此正是聖主制變之所當務也殿中侍御史何鑄上疏論士大夫心術不正徇虛以掠名託名以規利言不由中而首尾向背行險自售而設意相傾者為事君之失懷險巇之謀行刻薄之政輕儇不莊慢易無禮者為行已之失乞大明好惡申飭中外各務正其心術毋或欺誕蓋有所指也左司諫江公望薦人材上疏曰臣親奉睿旨俾臣論奏人物臣退竊思之此固臣之所當告正陛下之所欲急聞也臣聞之孟軻曰是非之心智之端也充是心是是而非非則足以知人矣臯陶曰在知人惟帝其難之苟以為難則靡所不咨矣堯躬明德在上賢不肖宜若白黑之不可亂如歡兜之黨姦猶且咨之蓋盡人所知然後能無所不知陛下勇智天錫聖敬日躋廣覽逺聽巖穴側微無所不逮故於人物如鑑無心妍醜不能逃其質若權衡應物輕重未嘗失其平猶下咨微臣以廣耳目真帝堯之用心也若臣涉世甚踈經國有志二十年間世味無一經心粗知靜趣傳曰心靜天地之鑒心茍靜天地猶可鑒況人物乎臣之所知或得所稱或觀於已試或為寮友而知其所趣或於孤逺而見其持守不厚族姓不問黨與不間親讐不挾權幸采之公議僉以為允陛下廓天地之度無物不容晦神明之用有瑕必匿搜羅包括咸在其中遺其所短用其所長不求其備隨器而使故人無不盡之才才無不濟之治因臣一人之所知以類而求臣之所知才不可勝用矣求之一人且如是矧公天下而求之乎易曰拔茅連茹以其彚征吉以言君子泰亨之時拔其一則各以類從矣此正今日之所急陛下不間疏逺如臣者尚且咨之孰不為陛下盡焉伏乞更賜咨訪以驗臣之不妄謹列姓名于左公望又論哲宗紹述上疏曰自哲宗有紹述之意輔政非其人以媚於己為同忠於君為異一語不合時學必目為流俗一談不侔時事必指為橫議借威柄以快私隙必以亂君臣父子之名分感動人主使天下騷然泰陵不得盡繼述之美元祐人才皆出於熙寧元豐培養之餘遭紹聖竄逐之後存者無幾矣神考與元祐之臣其先非有射鈎斬袪之隙也先帝信仇人而黜之陛下若立元祐為名必有元豐紹聖為之對有對則爭興爭興則黨復立矣陛下改元詔旨亦稱思建皇極蓋嘗端好惡以示人本中和而立政皇天后土實聞斯言今若欲渝之奈皇天后土何殿中侍御史龔夬乞明忠邪劄子曰臣聞好惡未明人迷所嚮忠邪未判衆聽必疑臣頃在外服側聞朝廷聖政日新逺邇欣戴及被命詣闕又聞進退人材皆出睿斷此固甚盛之舉也然而姦黨既破則彼將早夜為計以謀自安不可不察或遽欲革面以求自入或申邪説以拒正論或妄稱祻福以動朝廷或託言祖宗以迫人主或巧事貴戚或隂結左右大抵姦人之情其計百出不可盡舉其要則欲變亂是非混淆曲直以疑朝廷將幸其既敗復用已去復留而已矣君子直道而行不為機變則必墮姦人之術內若然則天下之治忽未可知也故必在朝廷洞察忠邪斷而行之若小不忍則害大政恭惟先皇帝聰明聖神臨政願治臣昔蒙賜對親被聖訓勿為阿附以期自守今臣不言則為上負厚恩下廢所守朋姦罔上自取犯義之罪惟陛下深察臣言以示好惡以明忠邪而陟降多士使逺近皆知進賢退姦之意將天下鼓舞聖化太平之治不難致也欽宗靖康元年侍御史李光論王氏及元祐之學奏曰臣愚昧朴拙當陛下初政偶承乏使擢置言路每因進對偹聞德音未嘗不以紹復祖宗法度為説忠臣義士莫不歡欣鼓舞日須德化之成也臣今月十七日入臺伏覩三省降到黃榜一道臣寮上言以王安石為名世之學發明要妙著為新經天下學者翕然宗師又言熙寧元豐間內外安平公私充實法令偹具賦役均平其意専以王氏之説為是公肆誕慢無復忌憚以陛下聖明未可遽欺既以司馬光與安石俱為天下之大賢又云優劣等第自有公論觀言者之意必不肯以光為優以安石為劣夫光與安石行事之是非議論之邪正皎若白黑雖兒童走卒粗有知識者莫不知之當熙寧元豐間如韓琦富弼歐陽修之屬尚皆無恙安石惡其議已皆指為因循之人擯斥不用卒以憤死恭惟太祖太宗創業之艱難真宗仁宗守成之不易規模宏逺矣安石欲盡廢祖宗法度則為説曰陛下當制法而不當制於法欲盡逐元老大臣則為説曰陛下當化俗而不當化於俗蔡京兄弟祖述其説五十歲間搢紳受祻生靈被害海內流毒而祖宗法度元老大臣掃蕩禁錮幾無餘藴矣幸賴宗廟社稷之靈上皇悔悟以祖宗不拔之基全付陛下今言者又創為熙豐之説以安石為大賢臣恐此説一出流聞四方鼓惑民聽人心一失不可復收非朝廷之福也諫議大夫楊時乞分别邪正消除黨與狀曰臣嘗考漢唐之所以亡其始皆自於朋黨善乎歐陽修之言曰始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉所謂一言喪邦者其是之謂歟自蔡京用事始進朋黨之説以斥逐異已者使無敢言然後肆意無所不為以馴致前日之祻上皇晚悟其非以搢紳賢能陷於黨籍形之詔旨而追悔不及此陛下之所宜深監而奉承之者也近聞士大夫間復有為朋黨之説以欺聖聽者或指為蔡黨或指為王黨或指為李黨夫以二十餘年之間而是數人者實秉國政天下之士不仕則已其仕於朝者皆其薦引也非蔡則王非王則李若盡指以為黨而逐之是將空國無人矣此言果行則搢紳之祻未有已時而國之安危未可知也然臣竊謂所以致黨論之興者抑有由矣蔡京之罪甚於王黼而李邦彥動為身謀首畫遁逃之計割地捐金質親王以主和議罷李綱而納誓書其悮國亦與京黼不殊今王黼伏誅而京父子止竄湖外邦彥猶未黜責公議未厭此論者所以疑有其黨也臣伏望睿斷取京父子與邦彥大正典刑投之嶺海庶允公議其間為蔡氏邦彥所用之人當一視之察其賢而用不賢而去分别邪正消除黨與則天下幸甚茍無事實槩以黨附為言者是必姦人欲中傷善類不可不察也朋黨之祻昔人論之多矣唯歐陽修所撰五代史書其言最為詳切謹録進呈伏乞詳覽監察御史余應求論朋黨宜辨之於早狀曰臣嘗觀李德裕李宗閔各分朋黨互相傾軋因小以至大因私以害公終成牛李之祻文宗患之而不能去每歎曰去河北賊易去朝廷朋黨難臣謂君子小人其勢不兩立猶如氷炭薰蕕之不可並也故君子得位則斥小人小人得路則排君子勢之必然無足怪也惟明君能辨其人為賢為不肖其事為公為私其言為實為虛其心為忠為邪則君子小人自判而朋黨不足患矣文宗暗君也不知察此而患不能去之豈不謬哉國家自元祐紹聖以來起朋黨之論幾四十年然猶假政事之異同以名之也近嵗尤甚不問人之賢否功罪何如凡為執政所引用者皆指為某黨故有蔡黨王黨之目更相非毁迭為進退不復顧國家之大體唯恐其黨之不進也又其甚者蔡京一門父兄子弟之間自分黨與果何理哉此弊不除為患甚大陛下稟英睿之資奮剛斷辨忠邪進賢退不肖必無疑二此君子道長而小人退聽之時也自今羣臣誰敢為黨者然而考之師言揆之物情咸謂一二新進大臣與前此用事者議論不能無不協趨向不能無少異已有紛爭之語暌間之迹浸浸不已怨隙日深非特不能用心輔陛下維新之政臣恐小人之黨日盛而君子獨立寡助朋黨之祻又甚於前矣伏惟陛下辨之於早壞植散羣無使滋蔓不勝幸甚靖康中起居郎胡安國上殿劄子曰古者人君南面向明而治蓋取諸離離為日至明之象也日食常數耳春秋每食必書何也日者人君之表茍有食之則暗而不明矣臣子倍君父則暗而不明妾婦乘其夫則暗而不明政權在臣下則暗而不明邊陲不能守則暗而不明故春秋每食必書所以為南面之大戒也昔漢元帝即位之初更制七十餘事以公田及苑振業貧民減樂府員罷黃門狗馬除甘泉宫衛息角抵齊三服官節用愛民其稱甚美然紀綱日紊國祚日衰姦宄日強黎元日困以知人不明失其操柄耳蕭望之社稷之臣而恭顯譛令引決於私室張猛忠正之士而自殺於公車劉向宗室之英也排擯詆毁令不得進用至於許史宦官則信任不疑大本既失雖有恭儉之小節何足以正紀綱隆國祚抑姦宄救黎元之困厄乎至如昭帝以齒則不逮孝元之長以文學則不如孝元之博雅以奉身調度又未必如孝元之莭儉也然能辨上官桀之詐信任霍光漢祚復安黎元按堵誠得君人之本耳陛下有溫恭之德有儉約之行有憂勤願治之誠有好謀納諫之善過於漢元逺矣抑未知群臣之邪正已皆明白於胸中而不惑乎亦有疑焉而未之決也如其不惑則固善矣倘有疑焉而不決之於早則君子必逺小人必親天下之事去矣小人善窺人主之指意以求合君子則唯義之從而不茍是故古之明德於天下者先正其心有所忿懥則不得其正有所好樂則不得其正有所憂患則不得其正有所恐懼則不得其正四者不除親小人逺君子必矣陛下誠能格物致知誠意正心而鑒於春秋所書侵蝕之咎洞察正邪灼知忠佞如日中天臨照萬物則君人之本立而天下之事定矣髙宗建炎間尚書右僕射李綱上言曰臣昨日奏事論及人主之職在知人雖堯舜猶以為難誠能别白邪正使君子小人不至於混淆然後天下可為伏蒙宣諭知人亦非難事但考其素行則知之竊仰聖訓誠得知人之要然臣竊謂國家艱難之際圖回事業雖材智兼用然帷幄腹心非君子不可何哉君子愛君而不謀身憂國而不謀家以公忘私以義忘利而小人則反此自昔人主信小人而任之其國未嘗不至於危亡夫小人豈不欲安存而惡危亡哉然使之謀人之國必致於此者以其無逺見而操術然也彼方以謀家保身營私趣利為得計而於國事恬不加恤非不加恤也以謂必不至於危亡而不知恤也唐天寶末楊國忠既激安祿山叛以信其言又促哥舒翰出兵潼關恐其不利於己動為身謀不顧社稷計及遭陳元禮之變刃加於頸而後知蓋亦晚矣是其所以求全者乃所以自族也范祖禹有言夫避害就利者小人之常也利於己而不利於人則為之害於國而不害於家則為之自以為得計矣而不知害於國則亦害於家不利於人則亦不利於己是以自古小人之敗必至於家國俱亡而後己此聖人所以戒小人之勿用也然而為人主者曷嘗不欲用君子而退小人哉卒之君子多不能安其身於朝廷而小人常得志者君子行道直自信篤去就輕好惡正故也行道直則不能阿諛以取容自信篤則不能過防以逺害去就輕則不為爵祿之所纍好惡正則不為姦邪之所喜自非人主明足以察誠足以任則君子雖欲有為於當世不可得已齊小白之任管仲信而弗疑此所以成霸業故曰有人而弗能知害霸也知而弗能用害霸也用而弗能信害霸也信而以小人參之害霸也霸猶如此況欲圖天下之事業以起中興之功哉陛下既得知人之要矣更願致察於君子小人之間天下不勝幸甚紹興間綱為江西安撫制置大使論朋黨劄子曰臣觀自昔論朋黨者無如歐陽修之為詳盡其言曰夫欲空人之國而去其君子者必進朋黨之説欲孤人主之勢而蔽其耳目者必進朋黨之説欲奪國而與人者必進朋黨之説夫為君子者固常寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交遊執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽則謂之朋黨得善者必相薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善于下矣見善不敢薦則人主之目不得見善人矣善人日逺而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之説也一君子存群小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志于無所不為則漢魏唐梁之際是也故曰可奪國而豫人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之説人主可不察哉修之言如此誠為切當臣以謂人主之所至惡者朋黨也小人之所以陷害善良者朋黨也為國家患有不可勝言者朋黨也人主操天下之利勢端居九重之中惟恐人之相與朋比以為欺罔故曰其所至惡者朋黨也君子汲引善類以其彚征而小人指為朋黨可使盡去不為己害故曰所以陷害善良者朋黨也黨錮之祻起而漢室以傾牛李之黨熾而唐室以微故曰其為患有不可勝言者朋黨也嘉祐間韓琦范仲淹富弼之流用於朝廷其所薦引類多君子小人不恱指為朋黨欲盡斥去賴仁宗皇帝有以察之故小人之言不用而韓琦范仲淹富弼之德業得以光明于時此宗社無疆之福也劉向有言曰執狐疑之心者來讒賊之口持不斷之意者開群枉之門漢元帝優柔不斷故蕭望之周堪劉向之徒不容於朝唐文宗優遊不斷故曰破河北賊易去此朋黨難人主之德剛健如天光明如日辨是非察邪正則小人道消君子道長愚智賢否各當其分尚何朋黨之足患哉臣竊見近年士人中尚有乘間投隙造為險詖之言以惑陛下之聽者一時名士皆指為朋黨賴陛下有以察之不用其説而善類得所依怙剛明盛德可以無愧於仁宗矣然小人之情譬如穿窬之盜稍失隄防有隙可乘則必復出為惡伏望聖慈考歐陽修之言而察仁祖之用心消小人而進君子早建中興之業以致太平天下幸甚紹興四年張浚論君子小人之辨上言曰臣昨奉清光竊見陛下於君子小人之際反覆詳究退自慶幸以為治道之本莫大於辨君子小人之分聖意孜孜于此宗社生靈之福也昔唐李德裕言於武宗曰邪者正者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松柏特立不倚邪人如藤蘿非附他物不能自起臣嘗以類推之君子小人見矣大抵不私其身慨然以天下百姓為心此君子也謀身之計甚密而天下百姓之利害我不顧焉此小人也志在於道不求名而名自歸之此君子也志在於利掠虛美邀浮譽此小人也其言之剛正不撓無所阿徇此君子也辭氣柔佞切切然伺候人主之意於眉目顔色之間此小人也樂道人之善惡稱人之惡此君子也人之有善必攻其所未至而掩之人之有過則欣喜自得如獲至寶旁引曲借必欲開陳於人主之前此小人也難進易退此君子也叨冒爵祿蔑無廉恥此小人也臣嘗以此求之君子小人之分庶幾其可以槩見矣小人在位則同於己者譽之以為君子異於己者排之以為小人不顧公議不恤治亂不畏天地鬼神是以自崇觀以來至於今日異於己者而稱其為君子乎臣以為必無之也彼其専為進身自營之計故好惡不公至於亡身亡家亂天下而莫之悔惟陛下親學問莭嗜欲清明其躬以照臨百官則君子小人之情狀又何隱焉浚謝賜御書否泰卦因陳卦義上言曰臣昨日特蒙聖慈頒賜臣御筆親書周易泰否二卦臣以愚庸之質叨竊相位絲毫無補俯仰實慙不謂聖恩有隆疇昔賜之寶翰許以珍藏感荷私心非言可盡臣竊惟自古小人之傾陷君子莫不以朋黨為言夫君子引其類而相與並進志在於天下國家而已其道同故其所趨向亦同曽何朋黨之有焉小人則不然更相推引本圖利祿詭詐之蹤莫可迹究或故為小異以彌縫其事或內外合符以信實其言人主於此何所決擇而可哉則亦在夫原其用心而已矣臣嘗考泰之初九拔茅茹以其彚征而象以為志在外蓋言其志在天下國家非為身故也否之初六拔茅茹以其彚征而象以為志在君則君子連類而退蓋將以力守善道而未始忘憂國愛君之心焉觀二爻之義朋黨可以破矣臣又觀否泰之理起於人君一心之微而利害及於天下百姓方其一念之正畫而為陽泰自是而起矣一念之不正畫而為隂否自是而起矣然而泰之上六三隂已盡復變為陽則否之所由而生焉否之上九三陽已盡復變為隂則泰之所由生焉當今時適艱難民墜塗炭陛下日新其德正厥心於上臣知其將以致泰矣異時天道悔祻幸而康寧願陛下常思其否焉區區臆説敢併以為獻不自知其妄陋也惟陛下裁赦浚乞别邪正上言曰方今士大夫之賢者莫不欲主張清議發明正道以為萬世人臣之戒誠以有天下國家要在夫得人以維持之故忠義大節不可不明茍使持祿保身隨時俯仰者得行其志則馮道之徒復見於後日矣豈人主之利耶然臣嘗謂天下自有要道隨時舉措則盡得天下之心而致治不難也且圍城之役明受之變當時從邦昌而為侍從徇苖傅而有所施為其罪固大厥後乃繼踵作相持握化權果何以勸忠義示風俗耶若夫論者必欲正其罪而暴白之則又失中矣何者士大夫之不能死節義則無所不為而死者人之所甚難未可人人而責之也今正名其罪則有過者無以自新非其本心者無以自見附偽之人知其無所逃於天地之間將與我為死敵矣非國家之善計也臣願陛下戒忠義之不可不勸思有以發揚而榮顯其身至於不幸而得罪於名教則亦優容涵覆特逺而去之不委以心腹之任則取天下定國家明教化之術盡於此矣浚議君子小人上言曰朋黨之論起而君子小人之名紛然交作莫知其孰是孰非自古患之矣夫志在天下國家此君子也志在一身此小人也然而託君子之言行小人之志其事甚微其情難辨人主當留意焉然自昔帝王之用心惡聞人之有過而喜人之改過其小人也特使之退聽自省而已幸而改過猶復用之於外焉若必曰某為君子某為小人一二别之又未知真能辨之否也加人以不善之名則人必報之以至惡之實朋黨交傾端自此始然則人主宜如何哉知之于心待之以權使上下內外各當其分真為小人者方且化而遷矣使其言者之悮而吾未嘗以此名加之人心豈不恱服乎浚又曰臣竊聞真宗皇帝嘗著忠臣良臣及權臣姦臣論臣以為忠類權良類姦何以言之忠則任事任事則多怨豈不幾於擅權乎良則委曲委曲則不暴豈不幾於為姦乎然則人主於此如之何而辨之哉則亦視其志之所存而已矣彼其志在天下國家切切然以身任內外之責是之謂忠志在納君為善將順其美是之謂良若乃營私立黨蔽欺君上茍利於身以死力行則為權矣逢君之惡事每阿徇反覆變詐隂肆讒間則為姦矣臣故别白而具論之髙宗時趙元鎮除宣撫處置使朝辭上奏曰臣疏逺之迹荷陛下特逹知遇恨無死所圖報大恩方國家多事中外乏人乃委臣揔師逺戍邉鎮主憂臣辱其何忍辭然自惟念渡江以來遭逢器使揚歷臺諫再叨樞管與聞政事趨走殿陛密勿冕旒拙誠獲伸無復顧惜雖聖主全度見謂朴忠而萬目睽睽指為迂闊今乃以竒孤寡偶之身將使於萬里之逺曽無一毫之善可辱記憐安得不少陳悃愊以瀆聰聽臣竊見自古人君善用人者莫不專其委任假以事權任専則媢嫉必生權重則嫌謗立至唐之賢臣勳業如郭子儀猶困於魚朝恩程元振之謗傷名德如裴度亦被沮於元稹魏洪簡之朋比子儀明哲自將僅免危疑之纍而度辨論激切卒隳幽鎮之功況勳名寵眷未及兩人求其成功亦已難矣向者陛下當建炎圖治之初遣張浚出使川陕國勢事力百倍於今浚於陛下有補天浴日之功陛下待浚有礪山帶河之固君臣相信內外相資委任之篤今古無有而終致物議以就竄逐臣頃在紹興人或指臣黨浚故浚之責不敢以一言及其是非今考究其用心推尋其情實喪師失地錯繆之迹則有之未必盡如言者之甚也大率専黜陟之典受不御之寄則小人不安於分義謂名器可以虛授爵賞可以茍求一不如意便生觖望川蜀之士至於醵金募士詣闕陳論展轉相傳以無為有一經指摘何以自明是以有志之士雖欲冒犯死亡為國立事而每以浚為鑒戒也雖然浚固有罪矣臺臣抨彈之可也諫官論列之可也人君赫斯震怒雖誅殛之浚亦無憾今乃下至草澤布衣之士行伍冗賤之流凡有求浚而不得者上書投牒人人詬罵肆言醜詆及其母妻甚者指為不臣跋扈極人間之大惡皆歸之於浚嗚呼一何甚哉夫以浚之功與陛下之信也而謗者至此則明君不能自信矣今臣無浚之功陛下之信臣無如浚以有功而見知也乃當此重責逺去朝廷臣恐好惡是非行且紛紛於聰明之下昔樂羊一篋之謗幾陷誣蔑賴文侯之明乃成中山之功魏尚數級之失遂致吏議唯文帝晚悟後有雲中之效伏望睿明鑒古今之得失念事功之難成憫臣孤直曲加庇覆使得展布四體竭志畢慮少寬陛下西顧之憂非特臣之幸也意迫情切干犯明畏臣不勝恐懼俟罪之至劉行簡進故事曰魏文侯謂李克曰先生嘗有言曰家貧思良妻國亂思良相今所相非成則璜二子何如對曰卑不謀尊踈不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓克曰君弗察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍吾之相定矣臣嘗聞前修之言以謂知人無法臣心疑之夫知人堯之所難也故臯陶為舜陳九德之事曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞強而毅此知人之法也而謂之無可乎及求之孔孟之書而得其説者有二曰視其所以觀其所由察其所安人焉廋哉一也聽其言也觀其眸子人焉廋哉二也然後知是道也不可以言可言者其迹而已至於曉然獨得於心者豈言之所能盡哉謂之所以也所由也所安也與夫言辭眸子之間不知何者為是何者為非何者為君子何者為小人皆未嘗言其狀而大佞似聖大智似愚亦未易以此辭辨察則知人之難也雖聖人不敢易言之然則知人之道非內明而無所蔽惑又惡能曉然獨得於心哉惟明也一見而得之眉睫之間為有餘如其不然則終日與之言而不知其人之心由是論之所謂知人者謂之無法可也臯陶之陳九德特言其所可言者與其成德之事而已其不可言者不在是焉魏文侯謀相而未定也問諸李克克以居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之文侯之意遂決其故何哉公子成與翟璜皆賢也文侯固知之深矣其得於所親所與所舉之間豈一日之積哉不然不如是之決也臣獨喜李克之言誠有助於後世知人之道雖所謂獨得於心者不在於是而於吾聖人之説亦無所戾云行簡為監察御史上殿論用君子小人之説疏曰臣聞天下之治衆君子成之而不足一小人敗之為有餘何者君子雖衆其道則孤小人雖寡其勢易蔓君子之憂在於天下國家小人之憂在於一身君子之於法度紀綱必欲正之故為之也難小人之於法度紀綱必欲亂之故為之也易自古賢聖之君未嘗不欲近君子而逺小人也小不加察而小人已至故立政之書曰繼自今立政其勿以憸人其惟吉士又曰時則勿有間之所謂間之者非君子小人並進也衆君子而一小人亦足以為間而敗政臣請以易之説明之夬之為卦以五陽決一隂陽為君子隂為小人故繫辭曰夬決也剛決柔也君子道長小人道憂也夫以五君子決一小人不曰小人道消而曰道憂何也蓋上下交而志同如泰之時然後小人之道不行若乃以五君子臨一小人徒能使之憂而已矣惟其有憂則將圖之無不至矣恭惟陛下躬天縱之聖懋日新之學通逹古今洞照治體日者好惡既明黜陟既允矣臣猶以是為言者誠以事之幾微小不加察則小人者乘間伺隙而入其害至於敗政不可不懼也臣以一介之賤驟對清光謂天下事無急於君子小人之説故首用為獻伏惟留神幸察直龍圖閣李光乞辨君子小人劄子曰臣竊謂君子小人相為消長而治亂因之蓋用君子則治用小人則亂未有兩存而可以有為者也易曰開國承家小人勿用象曰小人勿用必亂邦也故內陽而外隂內健而外順內君子而外小人則為泰內隂而外陽內柔而外剛內小人而外君子則為否自古聖君賢臣立言垂訓未嘗不以小人為戒本朝仁宗皇帝専任韓琦富弼范仲淹故四十二年之間天下大治夷夏乂安海內生靈蒙福至今蓋不使小人參其間也夫邪正之不兩立猶薰蕕之不可同器而藏梟鸞之不可接翼而處也非正去邪則邪必害正此必至之理也陛下即位于今五年延見士大夫多矣君子小人之情狀固難逃於聖鑒臣請為陛下略言其槩君子者難進而易退孤立而無朋人主任用不疑則秉公心由直道其所舉措必欲合天下之公論而後已其事上也則進思盡忠退思補過獻其可而退其否逆所順而強所劣道合則幡然而來不合則奉身而退如斯而已小人則不然方其未得之也則枉道而求之及其既得之也則固寵保位惟恐失之於是內結近幸外交權臣傍引小人傷害善類故詩曰營營青蠅止于榛又曰躍躍毚兔遇犬獲之又曰萋兮菲兮成是貝錦蓋小人讒間之言能變白為黑則如青蠅伏慝詭詐則有若狡兔而文致人之罪惡則無異於貝錦也蘇軾有言曰君子之難致如麟鳳色斯舉矣翔而後集況可麾而却之乎小人之易進如蛆蠅腥羶所聚瞬息千萬況可招之使來乎神宗皇帝嘗問滕甫曰卿知君子小人之黨乎甫曰君子無黨譬之草木綢繆相附者必蔓草非松柏也朝廷無朋黨雖中主可以濟不然雖上聖不治神宗歎息以為名言臣願陛下以此觀之則邪正分矣方今艱難之際國勢之危若綴旒然可言之事未易悉數所謂端本清源之術臣願陛下辨君子小人而已書曰任賢勿二去邪勿疑蓋任賢而使不肖間之之謂二見邪而不能剛決以去之之謂疑臣愚伏望陛下持大公至正之道以撫御海宇法天地簡易之德以照臨百官知其忠賢則任而勿二察其姦宄則去之勿疑奮乾剛以明黜陟隆委任而責成功天下幸甚右正言陳淵論考實上奏曰臣聞人主之道在乎知人而知人之要莫若考實不考其實而欲以耳目之所聞見心志之所測度期於得人雖堯舜不能也今夫騏驥之於駑駘其技固不相侔矣使之同一皂櫪羈縻而飲食之雖騏驥亦何以自别乎故必待歷塊超澗奔逸絶塵然後知其異於凡馬也堯舜號為知人而書之所稱曰明試以功車服以庸夫明試以功考其實也車服以庸因其實而用之耳若舜之在下堯既聞其聰明矣又歷試之至於用鯀亦然四嶽舉之堯曰方命圮族既而曰試可乃已自今觀之若舜者宜不待試而若鯀者又不必試然且云爾者考其實而已唯考其實故舜之聖終有以砥績而鯀之不肖不能逃其罪於九載之後也乃者朝廷進用人才間有異於是者雖陛下明於知人處之莫不曲當無可議者然臣嘗謂人之才智隱於無為若功業則遇事而後見方其無為非識者莫能辨逮遇事之後雖庸人亦得而可否之故用人之際唯在考實考實之法非固尚勞績而略志節也所以審衆情而核真偽者不得不然也況庶官之於侍從如霄壤之不相侔百官之於臺省如涇渭之不相似若不待其經歷既久名稱流聞人人皆以為宜遷然後授之亦恐艱難之際終不足以厭人望矣臣故以堯舜考實之道為獻位卑言髙惟陛下裁赦歷代名臣奏議卷一百五十六
