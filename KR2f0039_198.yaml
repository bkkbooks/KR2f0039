body:
  text: 歴代名臣奏議卷一百九十八明楊士竒等撰謹名器宋哲宗元祐元年殿中侍御史孫升上䟽曰臣竊以人主持利勢以兼制天下役使羣衆者有法制而已朝廷以一言而寵辱臣属風動四方者布命令而已故法度紀綱上下維持不可有毫釐過失法制失則人主之勢去命令過則朝廷之言輕自古天下國家之所以亂亡未有不由此也近日朝廷除安燾知樞宻院事因給事中封駮不當奉聖㫖更不書讀門下侍郎並不執奏直送吏部施行吏部具事理申尚書省僕射左右丞並不執奏遂以不全告命降出且陛下私一非才除知樞宻院事臣且置而未論豈有朝廷維持紀綱執守法度大臣乃依違茍且不為陛下守法使朝廷出不全告命宣示於外棄絶公道虧損聖德廢壊典法不足以傳示後世龜玉之毁過當在誰居朝廷紀綱之任不能糾劾大臣尚何面目出入陛下禁庭稱為御史伏望聖慈先正門下侍郎尚書省僕射丞不守法之罪或安燾有登用以來建明啓沃之謀猷廟堂帷幄之功業臣所不知者宣示臺諫布告在廷付門下省書讀省審而後行使陛下法制不失命令獲全然後坐臣妄言逆㫖重行黜削庶臺諫風節稍復嘉祐治平之時則臣雖被斥逐棄委溝壑死永無恨二年升又上奏曰臣聞爵禄天下之砥石人主所以礪世磨鈍也故忠信爵禄所以勸士而唯名與器不可假人士夫忠義風節豈生而有之在陛下砥礪成就之耳茍爵禄不及於忠信而名器竊假於非人則天下之士孰知所勸而相勉為忠信節義之事乎臣嘗謂給事中門下之職法度號令所從出論思獻納之為先非偷合茍容養交安禄之所何以言之法度命令差失過當可以論議獻替於未下而諫官御史止能諫諍追救於已行命未下則其意易回事已行則其勢難奪理固然也則給事之任豈可輕付非其人哉唐呂元膺自給事中除同州刺史及入謝憲宗問以時政得失元膺論奏甚激切上嘉其剛正翌日謂宰相曰呂元膺讜言直氣且欲留在左右使言得失卿等以為何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請元膺復為給事中以備顧問上恱而從之若李藩裴垍可謂不負大臣之責矣今顧臨張問為給事中顧臨慨然論議封駮聳動中外既以河事之重遣使北道侍臣有欲留之者大臣既不克從又不獲時選補忠鯁端良之人以慰士望而張問老繆無耻茍容尸禄為朝士大夫指笑御史論其不職乞與閒散以養衰殘而大臣姑徇人情恱其阿意既留而不去又使專給事之職備員素餐無所獻納則是可留者去之可去者留之使朝廷爵祿名器不足以礪世而忠信節義之人無以知勸執政大臣豈不負陛下委任責成之意有愧於李藩裴垍乎伏望聖慈詳察檢會臣前奏出自聖斷罷張問給事中别選有德有識者任之以慰中外之望右諫議孫覺等上䟽曰臣等伏見朝廷差安燾知樞宻院給事中以為不當駮正封還陛下未信其言遂不送本官書讀施行臣等竊為朝廷惜之夫安燾之才不才差除之當與否自有天下之公論臣皆置而未議所惜者朝廷之法度爾且三省之設事相表裏勢相始終凡命令之出先自中書省一人宣之一人奉之一人行之次由門下省一人讀之一人省之一人審之茍有未當則許駮正然後由尚書受付施行紀綱程式其宻如此蓋以出命令而尊國體也或闕其一則於制敕不為全中外難以取信近日除呂公著為門下侍郎不由本省而下給事中范純仁力辨其事是也夫國家所以維持四海而傳之萬世者惟守法度而已況當陛下諒闇之日簾聽之時正宜謹守法度不可毫釐差失今安燾之命不送給事中書讀施行乃是封駮一職遂為虛設制敕不全命令不重而法度不存矣斜封授官恐漸於此臣等所以為朝廷深惜也臣等竊度聖意必謂己行之命難於追改且與序遷則是一舉而兩失矣為安燾者豈可受不全之制敕而處具瞻之地哉莫若因其辭免寢罷新命則君臣之際授受皆得其宜而法度不廢也況朝廷差除因臣下辭免或臺諫論奏而罷與改者多矣豈得於燾獨不改伏望聖慈追還安燾告命及詳覽臣等論列安燾文字别降指揮施行陛下遷進大臣若合公道何故不令給事中依條書讀臣等所論乃繫國體若陛下不賜改正臣須至再三論奏不敢自已殿中侍御史呂陶上奏曰臣伏見安燾之命不送給事中書讀大於法非便臣與摯等已嘗論奏拳拳之誠諒煩聖覽臣今為陛下反覆思慮此事實繫國體有不可者四須至再具奏陳冒浼天聽夫給事中之職主讀制敕許駮正奏覆陛下不使之讀是廢其職也朝廷設官任人而自廢其職無以訓四方示萬世今門下省録黄於給事中字不書臣某之名而書曰奉聖㫖不送給事中書讀尚書省遂受而付於吏部吏部出告亦如此書臣不知合何法式成何制命此一不可也小人之情巧偽險詐善窺朝廷之釁隙欲逞其志雖防閑禁約謹嚴周宻而猶有撓亂法度以僥倖者陛下儻謂此事已行難於更改不恤人言而遂行之他日或有權臣女謁干請希求非分之事攀援此例乞不付門下省施行臣恐陛下無以却其説盖以開之於前則難塞之於後此二不可也夫三省大臣皆與國家維持紀綱而同其休戚者今朝廷出令未合於法度而門下侍郎不駮正尚書僕丞亦不論奏唯黙奉行以付有司若萬一更有失事處置之間或不中機會則誰為陛下救其失誤此三不可也自陛下臨政以來開廣言路臺諫所奏盡䝉聽納萬分有一可裨治道今以安燾之故獨不允從深恐言事之臣上畏天威自今以去不敢極論得失陛下聦明亦或因壅蔽此四不可也夫舉一事而有四不可在陛下處之甚難以臣思之甚易何則改過不吝明王之盛德恥過作非古人之深戒故曰人誰無過過而能改善莫大焉又曰君子之過如日月之蝕過也人皆見之更也人皆仰之且萬機之繁親緫獨斷不容無失能知其失而正之則為得矣其於聖政殊不為累今臺諫論列未已士大夫之議紛紛二人者必不敢受命陛下若令閤門繳納安燾范純仁告身續降指揮述其辭免之意除二人者皆為同知院事由門下省施行則臺諌更不條奏士大夫之議帖然二人者不敢不拜上全國體下允公論此所謂甚易而不難處也況反汗之嫌小而廢法之失大願陛下權其輕重而行陶又上奏曰臣聞邪正必辨則國體尊用捨至當則士論定百直而一枉則枉可以害直百真而一偽則偽可以亂真方肅紀綱宜慎名器臣伏見起居舍人曽肇操履偏詖藝文淺浮當吕惠卿用事時肇兄布亦在要路表裏專縱公為私徇臣僚承迎風㫖薦肇充學官既進所業中書考為第一縁此朋比遂除館職晩因張璪汲引備位左司會史職有闕乃以次補且仕宦不歴民政而領都司學問不知本統而遷右史固已不厭公議無補盛朝今乃擢居西掖尤駭羣聽夫中書舍人之任職清地峻非他官可擬外則典司誥命以文章議論潤色帝猷内則分押諸房以智識才慮參決幾政前世推重謂之宰相判官豈可因其序遷輙爾虛授況小人之進亦以彚征肇既忝冒此選渉歴貴權則必援舉其徒布列要地消長之變安得不慮此時進用疑邪徑之忽開他日朋姦恐横流之難遏伏願陛下深防事始早罷詔除上以清侍從之塗下以慰搢紳之望陶又上奏曰臣近嘗論奏除曾肇中書舍人不當狂言無補未䝉聽納臣再三為陛下忖度此事極有未安盖任人當否實繫治亂正臣進則足以寧邦邪士用則遂能害政古今可監理勢必然自陛下繼統以來拔擢端良罷黜回枉用捨之際務合至公然小人餘黨尚在朝廷既未能盡力屏除豈可使開端倖進防微杜漸正在此時且肇之姦回出於天禀兩端難信其迹甚明當呂惠卿用事之時則朋比阿䛕競為非義至司馬光當國之日則矯偽脩飾欲作善人推此而行何所不至陛下可保其不徇私乎執政可信其不行險乎既保之信之則臣言殊不足取罪在譴斥若猶未也則中書舍人之職參議大政不可輙委肇矣況肇之兄布長於變詐濟以彊悍冒據要地近二十年蠧政害民毒流天下今雖出領藩鎮其心常有不平肇於其兄豈能忘愛一旦攀援而至則必攄發素懐引類結徒兇焰復熾此不可不思也然議者謂肇粗有浮文素無顯過進升西掖資地宜然臣愚竊謂此言出於茍媮之意非為國深慮之説也夫中材之士牽於勢利而過有隠顯害有淺深或一事之誤或一節之缺如邢恕之乖檢慎滿中行之附舒亶林希之結張璪則人皆得而知之指為顯過若乃肇之包藏縁節善持兩端原始要終大槩邪險人皆不可得而知非若一事一節之誤缺而可指名者其過雖不顯而為害則大此又不可不察也伏願陛下以隂長陽消為戒以舉直錯枉為心博采公言收還新命使小人無彚征之漸則明主有極治之功臣之區區敢以愚請謹再具彈劾以聞侍御史劉摯上論安燾奏曰臣等近以安燾除命未當及因給事中封駮遂不令書讀行下累具論列并彈劾門下尚書省經歴官司至今未䝉追改施行臣等待罪風憲見朝廷綱紀隳弛命令乖失茍不竭盡死力以救補之則陛下何用置言路臣等何顔在官次自陛下臨御以來以至公為心直道為政故凡見于旋為者皆足以服天下之心今忽然行此一事驚駭物聽與從來政事大異甚非所望於陛下者且安燾德薄望輕不自卓立朋附章惇依阿其間今度越衆人無故進位已失公議而又制敕不循典故蹈襲斜封以避官司封駮不意聖明為此過舉此必有姦邪之論以誤陛下殊不知中書之宣奉行門下之省審讀乃歴代典章一有不備則不成王命燾等亦安敢受之哉夫聖人善於取人不能無過故六經不美堯之任已而美其舍己不稱湯之無過而稱其改過今陛下追正此事無甚難也於閤門取燾告身罷燾新命且令依舊同知外范純仁自從别制宣下其門下侍郎尚書僕丞及吏部等經歴奉行官屬皆不能建明執奏詿誤聖朝各付有司明正其罪使中外釋然知朝廷尊嚴典憲振肅以銷壓僥倖之望杜絶私邪之謀而成就陛下聽納之盛德在陛下頥㫖一言而已何遲遲而不為邪臣等不勝聽命待罪激切之至摯又上言乞罷文及都司䟽曰臣伏見昨者五月四日勅命除文及為右司郎官韓宗師直袐閣尋聞臣僚論列兼宗師父絳繼有辭免遂罷直閣之㫖而及之除命未賜指揮臣竊以都司職任上副丞轄下緫二十四司之事而館閣設官以文學為職皆號為清望之選固當無間寒俊不宜專用子弟此所以招言者之論而不能服衆人之心方及與宗師差除之日適在文彦博入朝韓維進用之始故議者咸謂執政臣僚見二人進拜所以擢其子姪迎恱其意以立私恩此亦陛下之所宜察也國家名器本待才德但用之以公則人無不服今宗師既罷則及之新命亦望追寢不湏更俟其遜避所貴稍伸公道以息羣議若以及父彦博在朝欲及便於侍養即在京甚有職任可處兼平章重事乃是朝廷執政正與都司相干亦合回避以此罷之不傷陛下恩禮也摯論三省樞宻院差除䟽曰右臣准吏部牒十月十六日三省樞宻院同奉聖㫖唐淑問除左司諫等事又牒十月二十八日三省樞宻院同奉聖㫖陸佃等罷侍講事臣竊暏自來朝制及近降官制格凡差除有中書進擬者有樞宻院者有三省者有三省樞宻院同進者盖建官分職各有所治法無相參也三省樞宻院同取㫖者似止於差除帥臣邊鎮大吏内臣近上差遣而已今來差諫官罷侍講不委樞宻何為而預也外言籍籍皆以三省容縱宻院侵紊政體莫不疑異臣竊以國家所以恃者在綱紀大臣所宜守者在名分綱紀正於上則下無邪志名分治於下則政無多門一有奪移何患不起況朝廷今日正當尊强君道謹守祖宗法制嚴臣下之分以消壓權僭之心今廢置官吏陛下大政而三省之事也樞宻院干非其職逾法出位横造議論公然犯分臣恐積微至著交亂官守漸行私意以害政事上則陛廉之等慢下則傾奪之患生杜漸防微實繫國體欲望聖慈特降詔㫖戒諭三省樞宻院臣僚凡以差除擬進者各依自來條制班次取㫖所貴正名宿業事無侵逾以尊朝廷以正在位臣又慮上件差除諫官等事曾降聖㫖特許樞宻院同進借有特㫖乃是聖恩優禮執政欲合同衆論之意而大臣之節自當引義辭免惜朝廷綱紀以安分守不應乘便冒進漸恐隳失體制摯又上論執政轉官䟽曰臣伏覩近降麻制執政臣僚各特轉一官聖恩優厚中外聳動及臣伏讀麻制之詞乃以山陵寢廟奔走職事加臣子之異恩於是臣切疑焉夫應奉山陵寢廟奔走職事乃臣之分也若欲以醻勞則應不止於執政若旌其送往則執政未嘗俱行授受之間未有名義伏聞所司檢會嘉祐年體例進入依應施行伏縁嘉祐八年英宗皇帝既推即位之恩臣僚各已覃轉後來以弗豫進藥而輔導調護鎮寧中外以至聖躬康復親決庶政誠天下之慶謂輔臣實與有勞故又命各人進一官然當時臣僚再三辭避累日不敢受命至遣近臣趣令以新官入謝不降坐以待之方敢祗受又治平之末神宗皇帝嗣位覃霈改官之後適值韓琦以山陵使回懇求去位尋以兩鎮外補然猶虛上宰之位自曾公亮而下並不逓遷故與特轉一官以補轉㕔之恩考求兩朝故事各有因依則今來遷官别無義説惟過賞踰僭在聖人不足以廣恩而於義未安恐臣下終難於冒處伏望謹重國體愛惜名器授之以道則廉耻之風行欲望聖慈照會兩朝故事不同如執政臣僚辭免新命伏乞特賜允從無傷事體區區臣言庶幾有補諫議大夫劉安世上奏曰臣伏見自行官制後來一切以寄禄名官至於流品無復旌别乃者朝廷以為未盡始詔吏部因其舊名分為左右自是清濁有辨衆論稱允後來竊聞新士大夫之犯贓者並改右字法既未備人以為疑且有出身之人茍以贓汚抵罪左降於右自可示懲縁無出身者自合稱右今若一旦混淆於貪墨之徒彼將以仕宦為耻非惟失先王礪世磨鈍之術亦恐本帶右階之人或有犯者朝廷以何名處之臣愚欲乞今後贓汚之吏並與削去左右量其所犯之輕重而制為貶降之歲若限内别無他罪仍有舉主即與約經赦叙用之法許以牽復如此則名器自正而負罪者通改過自新之路勸懲之道可得而行矣伏乞睿明亟追前令别加修改庶協政體安世為右正言時上奏曰右臣伏見朝廷立法内外臣僚保薦之員嵗有定數而兩制侍從以上又得用十科之目使之引類其於求才之道固已備矣乃自近歲以來漸開巧進之路屢見近臣連名薦士臣聞名器爵禄人之所趨使之積勤而後遷則衆各知難而守分今若多為㨗徑使之躁求人懐覬覦何所不至而況被舉之士未必皆賢朝廷不復銓量往往即加擢任遽離常調遂得美官後進小生不安義命奔競相効無復廉耻非有懲革将敗風俗伏望聖慈特降睿㫖今後除依法舉官之外不許近臣列薦所貴少抑僥倖之徒上裨忠厚之化安世又上奏曰右臣伏見祖宗以來執政大臣親戚子弟未嘗敢授内外華要之職雖有合得陳乞差遣亦只是數處閒慢監當局務原其深意盖謂父兄已居柄任而京師之官多是要劇為大臣者既不能人人為朝廷推至公之心振拔滯淹提奬寒素而貪權好利多為子孫之謀援引親屬並據高勢根連蔕固更相朋比絶孤寒之進路增膏梁之驕氣寖成大弊有不勝言是以祖宗立法務加裁抑上下遵奉莫敢或違自王安石秉政以後盡廢累聖之制專用親黨務快私意二十年間廉耻掃地陛下踐阼之初厲精求治革僥倖一本至公躬行法度不欲有毫髮之累此天下之人所共聞見而在位之臣化上之德宜盡忠交儆務為正直而廟堂之上猶習故態子弟親戚布滿要津此最當今之大患也臣條列其弊屢欲面奏偶以秋暑尚熾伏恐乆煩聽覽因此未敢請對然近來差遣尢多不協物論是以不避煩瀆聖聽須至具章䟽論列臣伏見太師文彦博之子及為光禄少卿保雍将作監丞孫永世少府監丞妻族陳安民近遷都水監丞女婿任元卿堂差監商税院孫婿李慎田堂差監左藏庫或用恩例陳乞而此兩處皆非陳乞之所當得也司空呂公著之子希勣今年知頴州纔及成資召還為少府少監希純去年自太常博士又遷宗正寺丞女壻范祖禹與其婦翁共事於實務院前此盖未嘗有而次婿邵䶵為開封推官公著纔罷僕射即擢為都官郎中外甥楊國寳自初改官知縣又堂除太常博士未幾又擢為成都路轉運判官楊瓌寳亦自常調堂差知咸平縣妻弟魯君貺今年自外任擢為都水監丞姻家張次元堂除知洺州胡宗炎擢為將作少監馬傳慶自冗官得大理寺主簿其間雖或假近臣論薦之名皆公著任宰相日抜擢除授也宮教之職舊係吏部依法選差近方收為堂除而公著首用其孫壻趙演宰相呂大防任中書侍郎日堂除其女壻王讜京東排岸司妻族李括知洋州李機知華州范純仁拜相之初即用其姻家韓宗道為户部侍郎妻族王古右司員外郎王毅近自常調堂差知長垣縣門下侍郎孫固之子朴判登聞檢院臣聞鼓檢院乃天下訴寃之地豈可使執政子弟為之熈寧初甞以宰相子曾孝寛判鼓院是時言者以此論奏即令罷免而公亮陳乞監皮角塲此近例也孫固及左丞王存右丞胡宗愈姻家歐陽棐除館職未及一月又授職方員外宗愈之弟宗炎近除開封推官然王存除歐陽棐外未聞其人及中書侍郎劉摯亦未見所引私親而二人者依違其間不能糾正雷同循黙豈得無罪臣之所陳皆彰明較著士大夫之所共知其所不知者又不可以悉數臣竊謂二聖臨御於兹四年未嘗以名器少私於宗族外家而大臣所為乃反若此上下恬然不以為恠此臣之所甚懼也昔崔貽孫為相未踰年而除吏八百員不避姻故之嫌後之大臣欲引其私親者多假此以藉口而欺罔世主臣常疾之今考其傳盖亦有説且唐自至德乾元以來天下兵興政事紛亂官賞差繆永泰之後稍稍平定而元載用事賄賂盛行剗塞公路綱紀大壊常衮當國力懲其弊凡奏請一切杜絶而矯枉過正賢愚同滯及崔貽孫之相則薦舉者惟其人推至公以行之故除吏八百莫不諧允後之大臣能如貽孫之盡公則搢紳之間自無異論惟其執心偏黨所用匪人排斥孤寒專引親戚而乃竊其緒餘文過飾非及致人言又從而尤之亦已過矣今上等知州通判在京寺監宮教畿内知縣之類號為優便者盡屬堂除雖資任未至甚高固若不足寘於議論而常調之人一蒙選用即今後每任例得朝廷差除不復更歸吏部以此較之僥倖不細況有司員多闕少四方寒士覊旅京師待次選部往往踰歲未得差遣及其注授又守二年遠闕則世禄權要之家何幸而踈遠平進之士何獨不幸也臣伏見自來畿内知縣皆選試吏能之地近聞以宣德郎王毅知長垣縣士大夫皆謂毅素號闒茸亡狀特甚止縁范純仁妻族之故遂有此命中外傳播莫不駭笑欲望聖慈特令追寢外其間人材粗堪或到官已乆未至曠職固難追改臣亦不敢上煩朝廷必令盡罷但以執政大臣不避親嫌不畏公議衆論喧然為之不平者乆矣竊恐陛下九重深遠不能盡知故敢畧具所聞上補聦明之萬一伏惟機務之暇留神省覽仍願陛下出臣此章徧示三省俾自此以往厲精更始庶幾不廢祖宗之法而示天下以至公之道豈勝幸甚中書舍人曾肇乞禁止請謁奏曰臣伏見太皇太后陛下皇帝陛下自臨御以來正身率下杜絶請謁裁抑恩倖凡自内出無非德政未嘗以私撓公以人亂法親戚近習斂袵安分退就繩墨朝廷清明紀綱肅然論者以謂秦漢以來母后共政未有若斯之懿非二聖一心秉誼克己何以致此謂宜終始守之貽則萬世而近日以來頗有干求内降特與差遣者雖其事至微未足仰累二聖大公至正之盛德然竊恐僥倖之人乘間伺隙轉相抜援煩瀆聖聽雖二聖天地之度坦然無私但慮左右干祈逼切不免曲徇其意杜漸防微宜自今日此臣之惷愚竊抱惓惓愛君之心傾竭肺肝庶有補於萬一也臣竊觀前史伏見仁宗在位四十餘年下詔書約束臣下干求内降令中書樞宻院如内降與臣僚遷官及差遣者並具條執奏以聞推劾干請之人明正其罪下御史臺閣門牓諭仍著為法丁寧懇至出於誠心當時羣臣亦每以禁止内降為言輙見納用故一時朝廷號為肅清雖間有干請而不能虧損聖政者上下維持之力也大抵人情茍務便私樂於僥倖此門一開浸滛不止始自一二至於三五六漸無紀極則國家名器繇此輕矣朝廷百度繇此隳矣其源至小流弊至大此臣之所大懼不得不為陛下極言之也且朝廷爵禄有限人之私欲無窮茍不持之以公因縁請託将至於不勝其煩陛下亦将厭之矣伏望聖明不以臣言為狂妄試加省察若有人材可用或聨近親出自聖意欲與恩澤者自可明諭輔臣度其所宜公行除授其餘一切禁止無得私請仍詔輔臣如有内降與臣僚遷官及差遣者並執奏以聞推劾干請之人明正其罪下閣門御史臺常加覺察牓諭朝官使人明知上意如此則聖德日新朝無粃政邪枉之門塞公正之路開逺繼祖宗之明實社稷無疆之福也臣備位侍從以論思為職竊有所懐不敢隱黙謹并録上仁宗朝縁内降戒飭詔書事迹凡八條别為一通伏乞置之座右少助省覽徽宗時陳次升上奏曰臣聞天下雖安有可危之理天下雖危有可安之道安危之機不在乎他人在人主所操而已夫福威者人主所操之柄也權歸乎上而不移於下此操之得其道者也得其道則安失其道則危稽之已往其迹班班可見矣如漢武帝外勤師旅内耗黎元非有厚德以結民心五十年間中外無事者特以威德歸乎上姦臣不敢專國命故也唐明皇初無失德非有甚過惡卒有播遷之禍者以李林甫專權故也夫以漢武之於唐明皇其德不甚相遠而安危如此其異者豈非在所操乎昔陳夷行嘗對唐帝曰無以權屬人又論用人則曰茍自聖擇無不當者誠以至治之要在此有天下者所宜先也恭惟陛下臨御以來去太甚用中道遠聲色崇節儉進忠良斥姦佞弛兵革寛刑罰徹無用之臺榭罷不急之工巧蠲宿逋以恤窮民省探報以防寃濫治天下之具何以加諸若行之不息終之不倦可謂全善矣然今日之所急要在收還威福之柄以立主威以尊主道臣叨沐誤恩擢於諫省輙敢引此以為龜鑑伏願陛下留神無使大臣干權任其喜怒之私以害大公之義實天下之福也社稷無窮之休也次升又上奏曰臣竊以君者制命者也臣者行君之命者也君唱之於上臣和之於下然後君臣之分正矣君唱而臣不和上行而下不隨則名分紊亂紀綱不立危亡之基實始於此箕子所以垂戒曰惟辟作福惟辟作威臣無有作福作威臣之作福作威害於而家凶於而國盖謂是也臣訪聞近日睿㫖差除三省多方執奏肆行沮格三省欲有進擬冀聖意之必從除目之必下倒置如此臣竊憂之至如前給事中龔原以罪去國之日御批嘗犯贓私每議政事遂行重責未至貶所即移壽州未幾又除待制移知杭州前日聖語墨迹未乾今日除授如此其峻何以示信天下又如中大夫王説年已七十有餘所至素無善狀今乃特轉太中大夫移帥青州原等遷升未委何名如聞皆出三省進擬不出陛下之意臣聞日者陽也君道也君正於此則天應見於彼故日常明臣侵於君隂侵於陽則日有薄蝕之患近者大史預奏四月朔日有蝕之竊謂三省之權大盛君上命多阻而不行日蝕之應殆以此歟伏望聖慈收攬乾剛以正名分睿㫖所降要在必行三省進擬或可或否悉由聖斷龔原王説除命特行改正如此則日蝕之異自消太平之基可致次升又上奏曰臣竊以治天下之道在乎正名分而已名分正則君道尊而無可陵之漸臣道卑而無逼上之强茍失其正尊卑之序亂上下之分虧此不可不慎也今三省專威福之柄侵人主之權睿㫖則沮格而不行進擬則堅執而必下乾剛坤柔之道未正堂陛高卑之勢未分忠臣義士夙夜以此為憂姦纎巧佞之徒乘此射利大臣之權既重賓客輻湊其門環坐其馬廐而不以為辱奴事其子弟而不以為羞良可歎也況龔原進職移守錢塘王説轉官移守青社既繫兩省從官事干大體命下之日羣聽驚駭三尺之童皆知其非若不改正則作福作威專在於臣陛下孤立誰肯為國者乎伏望聖慈檢會臣前奏早賜施行以正上下之分以息奔競之風次升又上奏曰臣近嘗論奏三省大臣專權威福睿㫖差除則沮格而不行三省進擬則堅執而必下上下之分未正乞收還威福以定名分訪聞三省大臣日近肆為詭計但避專權之名而陛下每有差除則陽為承行若非所欲則陰諭屬官繳駮上以侵淩主道下以竊弄國權朋比之風漸成威福之柄倒置若不辨之於早則易之履霜堅氷之患至矣伏願陛下攬乾剛之威奮神明之斷一出令則渙而必發一除授則審而必行敢有不存名分肆為横議者特行黜責如此則主威可立朋比之風可去宰執專權之弊可革矣次升又上䟽曰臣竊觀易以乾況君以坤況臣乾天也正位乎上坤地也正位乎下尊卑之勢既分則乾坤之位定矣上下之分既正則君臣之道明矣是以勢位不可陵名分不可犯蹙君之路馬芻者有誅齒君之路馬者有誅況君父之名天下之所共諱其可稱道之乎訪聞尚書右丞范純禮近准朝命押敵使筵燕賓主語言輙再及御名頗虧臣節甚累國體遂使中國禮義之邦為人臣者失尊君之道取笑敵人其為辱命莫甚於此若純禮故犯顯屬不臣設或有誤則是昏耄大臣如此安可叅預機務臨蒞百官伏望聖慈特行黜責以明君臣之分無使敵人輕視中國殿中侍御史許景衡上奏曰臣伏見國朝踵唐故事制勅並用黄紙為之所以嚴天子命令示朝廷之尊崇非百司庶府文移之比也其赦令制書播告天下者有司行下所屬仍用素紙以為符檄連附於後盖其所從來舊矣近者開封府被受御筆詔書民間有合通知者並不依令録副本連於牓前輙純用黄紙謄寫掲示通衢見者愕然以為黄紙勅牓尚書省之出也開封府亦得為之哉臣方欲論列乞賜懲誡而近降指揮頒下道僧度牒紫衣師號體式仍用黄紙印造幾與開封同失矣夫道僧度牒紫衣師號自有舊法今欲革前弊立新式以表異之固無不可者而必以黄紙為之恐非所以重朝廷之體制也今爵命多士出自天子著其姓名於勅牒宰相執政官簽書其用黄紙宜矣至於道僧度牒之屬乃是有司印造非出於尚書省也禮部官屬書字而宰相執政不預焉又空其姓名臨時書填盖與爵命多士制書異矣亦烏用黄紙為哉夫名之必可言言之必可行此為政之大要也今以有司文牒而僭朝廷之命令以禮部官屬而擬宰執之簽書非所以正名公朝垂法後世也在昔大臣有官兼將相者獨以不得於黄紙書字為恨今若使禮部郎官為之則前後重輕弗倫不已甚乎所有近降道僧度牒紫衣師號指揮内用黄紙印造一節伏望睿明特賜詔罷如欲更易舊式則乞以綾紙印造如吏部所給奏蔭補牒之類亦足以表異新書其開封牓示御筆亦乞戒飭依令施行庶幾不廢祖宗之故事增重朝廷之制書杜絶有司之僣忒天下幸甚欽宗時侍御史李光上奏曰臣聞人主有大權威福之柄是也治國有要道因任之術是也洪範曰惟辟作福惟辟作威惟辟玉食臣之有作福作威玉食其害於而家凶於而國此言威福之柄不可假之於臣下也荀卿曰明主好要闇主好詳主好要則百事詳主好詳則百事荒言人君自有職事不當侵細務也臣恭覩陛下天姿英明開納無倦伏自即位以來勵精圖治延見羣臣洞示好惡則端本清源之術不可不察臣訪聞近者頗有進言於陛下尚復徇縁耳目之習所謂大權要道渾為一説此乃治亂安危之機不可不察臣請為陛下言之夫爵祿廢置生殺予奪此所謂權不可不自陛下而出至於進退人材委任而責成功可也陛下豈得而親之哉前日姦倖當國三省大臣固寵保位至不得行其職事凡御筆除授皆曰朕所自用朝廷紀綱從此廢壊而人主威權下移於近習矣尚復忍聞之乎夫人主之職在於論相茍能擇賢相而任之為相者又能擇百官而使之内則省臺寺監外則郡守監司治出於一政無多門如挈裘振領若網在綱順者不可勝數也臣愚伏望陛下體剛健之德推委任之誠執其權綱而尊卑之分嚴秉其要道而詳畧之理得足以法天地簡易之理致虞舜無為之治實天下幸甚光又上奏曰臣聞唐德宗狩奉天自發洋州以來百姓進獻𤓰果欲各與散官陸贄以為不可且曰爵祿天下之公器而國之大柄也惟功勲才德所宜處之夫散官虛名也贄猶力爭至數千百言而不已誠以所系者重也臣伏聞上皇東廵州縣供饋無闕此乃臣子之常分何足為功兼供饋之物自一毫以上皆出行人及坊郭鄉村有物力之人非出供饋者之家也供饋愈辦則剥民愈深臣訪聞其間巧於謀身者多是交結近習縱其請求須索無藝往往縁此得其歡心揄揚賛美逹之上皇遂致增秩賜金行宮如市有再任者有進三官者有召赴都堂審察者恩賞僭濫非散官之比也陛下修明百度抑絶奔競如此而士大夫冒犯廉隅僥倖茍得如彼況上皇鑾輿還闕将士冒行陣突銛鋒以衞護社稷者或横尸原野或暴露邊陲未聞少加恩典而首及州縣猾邪之徒非所以示天下之公也所有已降遷官進職等指揮伏望聖慈特賜寢罷以安人情光又上奏曰臣嘗謂文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑高以陳貴賤位矣言君臣之位猶天地之不可易也先王因制天下使尊尊相高貴貴相承名以命之器以别之四方仰視朝廷之尊羣后翊戴人主之勢故能消患折衝姦人無窺覬之意昔漢髙祖以馬上得天下韓彭輩論功議賞至拔劒擊柱漸不可制叔孫通制禮儀諸侯王以下莫不震恐肅敬於是髙帝曰吾乃今日知為皇帝之貴也陛下踐阼之初强鄰侵侮國勢搶攘執政大臣議事喧閧於上士民伏闕詬詈於下士大夫一旦習為茍簡三省六曹百司庶府官吏因循不復治事伏望陛下俯從羣臣之請申敕有司擇日御殿欵謁宗廟然後告戒列位各揚乃職有不奉法者御史臺閣門覺察以聞庶幾隆主勢而正朝綱實天下幸甚髙宗時張浚上言曰論者曰方今名器猥濫宜有以更張而貴重之此意誠是也然臣嘗觀漢髙祖有天下起於匹夫分土列爵以收天下之豪俊而卒成帝業其後光武中興布衣之交並列三公小大功臣以千百計豈有他哉定天下之大難救百姓之塗炭非有以振動皷作之未易得其死力也夫賞幸予私徇情納賄此可為名器之濫至於激厲将士緫攬英豪寧失之過方今逆豫盜有中原神人共憤彼方且假吾爵祿以欺詐其下在我者當如何耶右正言陳淵上奏曰右臣伏覩十一月十一日奉聖㫖莫将奉使宣力特除徽猷閣待制京畿都轉運使兼主管奉迎梓宮一行事務臣聞祖宗朝慎重名器未嘗輕以假人至於次對之官尤所吝惜惟德是命不以賞功異時有嘗為侍從帶權字者雖復積年或遷外任猶不以是予之則下於侍從之列從可知矣自崇觀以來蔡京用事專市私恩敢違舊制凡被此選者非京之親則其黨與也至今人無賢愚皆知其非方陛下中興之初舉偏救弊大振頺綱如此等事豈宜不改臣謹按莫将昨自司農卿出将使命曾未累月遽有此除近例所無實駭觀聽臣初與将不相識但聞外議籍籍皆以将為乘時射利之徒未必有守陛下灼見其才足以倚辦斷而用之正須假以歲月俟其績效稍著粗厭人望然後以次命之似或未晚況聖主用人顧眄所及人自知德豈特美遷方肯盡力若使事有前比固非令猷如其不然庸可以一将之故遂廢萬世可行之法哉臣職在言路創見此舉事干政體不敢緘黙伏望聖慈特寢已行之命以允公議或不得已於近下職名中處之不獨使朝廷恩賞有名亦使將輩知美官難得安於分守以待任使不至過有僥倖淵又上奏曰臣聞人主用人其情出於喜怒之初而其事見於予奪之後喜而未予人猶以為榮怒而未奪人猶以為懼盖榮之者榮其方來未巳之恩懼之者懼其後日必至之患今陛下棄法而用将㧞擢之意人皆知之雖復改命而用将之意猶在也将其有不知耶故䟽恩以示情吝予以應法稍就近下之職處之無損於将又合公論可謂兩得之矣臣章未降外議沸騰臣縱緘黙不言以固初寵亦何以上副陛下廣開言路之意哉臣惟往者尹焞亦自卿聨命以次對之職盖焞先除從班續以疾辭至於十數朝廷惜其老不可留以此寵之所以命有德也於将何有焉将固非焞之比借使其才可用亦須俟其有功然後加以此名庶厭人望自古才有餘而德不足者饑則為用飽則揚去先為之極何以使人陛下必以奉迎梓宫使之應辦欲重其事與之以其所宜得者不復盡奪已為過於厚矣将復何求臣所惜者非分之恩所畏者衆多之口事干政體豈可雷同伏望聖慈念臣職事之所當言察臣忠朴之所宜守必賜俞允以示聽從臣不勝俯伏待命之至殿中侍御史鄭剛中上奏曰臣聞人主之恩天也含容包覆混貸惟一故人無不恱人主之威雷霆也摧壓震曜超忽變化故人無不畏有如偏廢則是猶太虛廓廓而不示以風雷之象生物之功無造化矣矧其駕馭桀黠延接雄雋之際所以籠絡控制收其心而折之氣者宜又如何臣伏聞陕西二三大帥被㫖入覲旦夕且至陛下髙官顯服煥寵其身者既無不周祥風慶澤蕩其意者又無不盡彼方䝉戴懲省感激悼懼之不暇陛下引見之日所以勞徠撫存推誠意而收其心者雖不可後至於釋罪宥過責以後效而折其氣者正宜摧壓震曜示以風雷之象不然位極則賤恩極則慢恐有不知朝廷之尊者英布之歸漢也髙祖踞床見之布大怒悔來欲自殺出就舍又大喜過望夫淮南亦亂世之竒傑不背楚則漢取天下未有萬全之䇿功亦大矣然髙祖所以見之之禮尊嚴如是曾不以半言摩拊誠以詐力權變之士初拔身以歸安知無恃功矜德廣已造大之心故髙祖先求所以折服之者而徐以厚意慰藉之爾非特如此光武之受赤眉也陳兵臨洛水而問盆子曰汝知當死否其衆請命則又曰得無悔降乎吾不强服汝也衆皆屈服然後陳其三善而釋之人賜田宅各使以妻子居洛陽又聞太祖皇帝一日飲王審琦等酒而與之語明日相率乞罷兵權奉朝請嗚呼是必有以感動其心者今日入覲之臣朝廷所以待遇之者聖心自有恩威之度臣敢以區區之説為陛下言之者盖亦狂瞽之愚有不能自已也胡寅上䟽曰臣取會到吏部内侍轉官格法昭宣使轉宣政使係礙止法如以功轉即合回授初無轉行之文今來馮益見任昭宣使則有止法況皇城司親從官堆垜子配填班直及幹辦本司職務即是提舉禁衛職分之常也有何功績乃欲憑恃舊恩轉行所不當轉之官而為宣政使乎臣竊謂今日遷轉超躐惟荷戈北伐斬将搴旗收復境土者可以當之如馮益服事禁内智效一官茍能稱職以免於罪戾不啻足矣乃欲揚已論功角逐於被堅執鋭舍爵䇿勲之際小心謹節者知不為也倖門一啓他日必有求為節度使者矣不若止之於其漸之為易既於格法無所損且使馮益免致僥倖又以示羣臣使知陛下不輕予人以官自左右親近始彼不當得而志於得者亦少有以窒其浸淫之慾矣一舉而四善得焉豈不美哉所有馮益詞命臣未敢撰行校書即王十朋上劄子曰臣聞惟辟作福惟辟作威者盖人主攬權之術得之於此失之於彼者又人主攬權之弊臣請借唐以論唐自髙宗中宗以來權移房闥明皇親平内難懲孽后驕主之禍挈大柄而掌握之可謂能收之於此矣承平既乆怠於聽斷内則移於姦臣外則移於蕃将是又失之於彼也肅宗再造王室代宗平亂守文而權稍歸朝廷亦可謂能收之於此矣然君臣茍安𤓰分土壤以授叛将繼以德宗之姑息自是而後權歸藩鎮矣是又失之於彼也憲宗剛明果斷削平僭叛而權復歸朝廷可謂能收之於此矣晚節任用非人禍生所忽自是而後權歸閹寺矣是又失之於彼也陛下比懲大臣之盜權收還威福之柄朝廷清明皆謂陛下為不世出之英主邇者衆口籍籍謂權雖歸於陛下政復出於多門是一秦檜死百秦檜生也其間最甚者如三衙管軍輩與北司深交固結盜陛下之大權養成跋扈之勢不可制遏昔漢之禍起於恭顯王氏之相為終始唐之禍起於北軍藩鎮之相為表裏今禍胎於内而亂形於外臣竊為陛下憂之夫權之大者莫如名器與財與兵今以管軍而位居三公是盜名器之極矣古之時無有也祖宗之時無有也又天下之利源財路皆入其門掊克聚斂不知紀極國用日蹙而私室愈富三家擅魯田氏擅齊殆不過此且身緫禁旅乆而不代陰結諸將以為之黨深忌元功宿将之功名者不容其進自恃兵柄在手有輕視朝廷心夫樞宻者號本兵之地號令節制天下之諸将者也今殿廷立班管軍傲然居前樞宻甘心其後而不自以為耻事勢倒置如此不奉行其意㫖者幾希其能節制號令之耶又其子弟親戚咸盜清要之職臺諫有論列之者朝廷必委曲庇護俾其言卒不得行昔唐大将管崇嗣背闕語笑李勉劾其不㳟肅宗謂吾有勉乃知朝廷之尊李祐有入蔡縳吳元濟之功違詔進馬温造正衙抨劾祐自謂膽落於温御史今臺諫言及侍從大臣隨即罷斥而風憲獨不行於管軍之門其何以為國耶不獨此也至若清資横加於噲伍高爵濫及於醫門諸軍置承受福威自恣甚於唐之監軍皇城置邏卒旁午察事甚於周之監謗内外将帥剥下賂上結怨於三軍道路之間捕人為卒結怨於百姓皆非治世事也陛下自揔攬以來聖政不可勝紀如前日竄逐猾閹天下尤服陛下之英斷惟此數事臣所謂得於此而失於彼者可不深懲而痛革之耶臣願陛下慨然發憤斷自宸衷杜邪枉之門塞僥倖之路鑒漢唐之禍而斥近習懲齊魯之患而抑强臣不惟尊嚴朝廷亦所以保全此𩔖不然臣恐大阿倒持日甚一日天下之憂不特在敵國而已此臣所以不避斧鉞之誅為陛下痛哭流涕言之也祕書省正字洪遵乞塞僥倖劄子曰臣聞書曰天命有德五服五章哉王者代天爵人尤所宜慎然害政之大者莫急於徼幸徼幸之路不塞雖善為國者有所不能措手矣使徼幸之路塞則士絶奔競名器重矣㳟仰陛下以上聖之姿勵精圖治日與二三大臣核考名實未嘗輙以一官虛授非材故雖既出之詔令已命之爵秩諫官御史有一言其未當則寢之不疑誠得致治之綱領矣臣誠不佞尚慮或不自重枉已冒進致陛下名器有假人之嫌此臣夙夜私憂過計而不能自已唐蔣伸嘗為宣宗言近日官頗易得人思徼幸宣宗驚曰如此則亂矣伸曰亂則未亂但徼幸多亂亦非難宣宗稱為名言臣區區之愚惟陛下回聦明之聽一采蔣伸之言使治體烜赫超出五三之上如唐宣宗何足為陛下道哉孝宗隆興中起居郎胡銓進故事曰唐上元元年八月二十一日勅文武官三品以上服紫金玉帶十三銙四品服深緋金帶十銙六品服深緑七品服淺緑並銀帶九銙八品服緑九品深青並鍮石帶八銙庶人服黄銅鐵帶六銙景雲二年太和六年並同開元二年三品以上帶飾以玉四品以上帶飾以金五品以上帶飾以銀與上元元年小異臣謹按周世宗嗣位命衞士習射苑中馬仁瑀善射彎弓二百斤弓力最勁所發多中獨賜錦袍銀帶開寳二年太祖皇帝親征太原李漢超為北靣行營都監其子守恩從父在軍中會契丹遣兵援河東衆至定州西嘉山将入土門守恩領牙兵數千與戰敗之斬首三千級隨漢超見行在賜戎服金帶夫六品七品帶飾以銀唐制也馬仁瑀奚為得之以其善射也四品五品帶飾以金亦唐制也李守恩奚為而得之以其善戰也且一帶何足道哉而古之有天下者必區區謹守其制不輕以與人者得不以礪世磨鈍之具有在此耶夫惟善射者乃得之不善射者不得焉則人莫不勸而進乎射矣善戰者乃得之不善戰者不得焉則人莫不勸而勇於戰矣假如善射者得之不善射者亦得焉則人莫不解體而怠於射矣曰僥倖者可以得之吾何以射為哉善戰者得之不善戰者亦得焉則人莫不解體而賤於戰矣曰僥倖者可以得之吾何以戰為哉欲求礪世磨鈍之術盡於此而已矣今也與之甚輕得之甚易與之也輕則夫人與之而人不以上之賜為重得之也易則夫人而得之而人不以受上之賜為貴如此則礪世磨鈍之具遂為虛文人主之大柄廢矣臣願陛下愛惜名器必若世宗非善射者不與焉必法太祖非善戰者不與焉則人知貴上之賜得者以為榮而不得者有所勸矣若果行是道臣見南山之竹不足紀陛下之盛德矣磨崖之石不足頌陛下之偉績矣陛下其無以為狂而幸聽之淳熈二年敷文閣待制周必大上奏曰臣聞爵祿以馭富貴在乎虛實之相參服飾以定尊卑在乎輕重之相權三代兩漢遠矣近而可稽者莫若有唐按唐之命秩有四曰職事官曰散官曰勲官曰爵號惟職事官居其位食其祿餘則别資蔭辨章綬而已是謂虛實之相參又按車服志緋為四品之服五品則淺緋緑為六品之服七品則淺緑深青為八品之服九品則淺青流外及庶人又以黄别之其帶銙名數皆有等差是謂輕重之相權雖然慕實而棄虛取重而捨輕天下之常情也有道於此使其出無窮其用不偏則繫乎上之人所以處之何如爾觀德宗嘗欲以散試官賞獻𤓰果者陸贄力言不若賜以錢帛則人不失利國不失權故當時皆以空名為貴宣宗時有司常具緋紫衣數襲從行以備賞賜或半歲不用其一故當時皆以緋紫為榮然則守此以為公器操此以為大柄固有天下國家者之急先務也本朝自元豐間盡罷文武散官政和以來又罷文武勲官惟爵號僅存而與否多出吏手是以人不之貴所謂賞格唯寄祿官及貼職遥郡而已一有微效例加遷授徒捐實利悉廢虛名往往勤勞之士未勸而僥倖之心先啓非所以馭富貴也文臣中大夫與通直郎之有年勞者班秩固遠矣而同服一色之緋朝請郎任大卿監與諸州助教百司胥長流品固殊矣而同服一色之緑武臣正使帶遥郡而為知州鈐轄路分者其視修武郎監當固有間矣而佩服無别從義郎而下或為将領兵官或任場務城寨視州縣胥吏固異轍矣而等威無辨盖由三代冠冕不可施於常服兩漢印綬又難一旦復行歴代以來日趨簡便因循混淆乃至於此非所以定尊卑也臣願陛下深詔有司博加討論縱未能盡如古法猶當畧用唐制虛實相參輕重相權使官秩不冗而善者勵命服有章而能者勉其於緫覈之政不為無補必大為叅知政事時又上奏曰臣竊見著作郎佐郎各二人雖有定員紹興以來未嘗官備盖以職任清髙實為左右史之儲惟真才實能乃可處之近來館職多未歴監司郡守既不可為郎往往直遷卿監其用既驟尤不當泛泛而進茲者著作郎宇文子震帶本職出為淮東緫領見今郎佐已有三員自不為少正宜虛位以待竒士縁近歲士風奔競遇有一闕即干求騰那失涵養之本指況今在館之人並非乆次姑令安職少厚士風有何不可先事而言少裨聖主作成人才愛惜爵秩之意臣之職也冒昧宻陳仰乞睿照寧宗時著作郎任伯起上奏曰爵禄所以厲世名器不可假人盖高官重禄茍加於無功則能者怠施於䟽属則近者怨若是而曰廣親親之恩豈不戾乎竊見南班官有十年一轉者固常法也而宗室至觀察使以上則具奏聽㫖盖官卑者可以令其叙進故立十年之限若觀察使以上則官穹禄厚雖歴十年其所以予之也必有其説或居近親或長属籍或著賢行或有勞能必令臨時取自聖斷其降㫖也又必曰有某勞係某親理宜優異而後予之非可以按閥簿若執左劵而攫取也立法之意可謂善矣今多能以族属則僅綴袒免以行能則初無可稱以在班則免奉朝請官至廉車亦已過矣進狀陳詞必欲陞轉其所引例皆非其倫而族属一等在多字行亦未有轉至是官者況承宣秩亞旄鉞昔之節度留後也祿廪之豐非他官比若巧計求請而得之在多能幸矣如朝廷之紀綱何仰惟陛下自臨御以來遵列聖之宏規示大公於羣辟寳愛天官惟善是授豈肯無名遽加異數雖臣之愚必知其非出於聖意也故敢冒昧縷縷言之照得大中祥符詔在班及十八年者具名取㫖至和熈寧始取覃恩後及十年者皆出特恩不為永例非限有司考績之法是乃國朝會要明文尤足以見祖宗朝未嘗輕畀也臣愚欲望聖慈将多能乞轉官依奏㫖揮特賜寢罷以塞僥倖之原莫此為大天下幸甚伯起又上奏曰臣聞天下之事有若甚微而所當深絶者僥倖之門是也盖王者之政有常小人之心無厭茍一人得其妄求則效之者踵至名器僭濫可不謹乎夫醫官之遷進有序成法具在茍增秩無名倖門一啓他日瀆煩聖聽可勝計哉昔者㳟聞真宗皇帝朝醫官趙自化嘗有干請真宗以自化居太醫之長不當復有請求令樞宻院召自化戒之又聞髙宗皇帝朝嘗有求為診御脉者即令罷内宿以為妄亂干請之戒兩朝聖訓炳如日星仰惟皇帝陛下更化以來恪守成憲日益加謹裁抑濫恩未嘗妄予一官天下欽戴陛下之公追配祖宗之盛以故亦莫敢有犯分干謁者今兹忽聞内批之命莫不以為駭盖王師尹者初無勞效之可言若只云應奉有勞則凡以伎術庀職者皆在應奉之列豈不視效干請以冀僥倖之得竊恐爵賞之濫或自此始欲望聖慈特回宸聽如王師尹果有勞效加之賜予足示上恩所有轉官㫖揮特賜寢罷以重命令以謹名器以昭至公於天下臣不勝幸甚伯起又上奏曰一定而不可易者法也況成命已行具孚衆聽若以一人萌僥倖之心得遂其求請之私則紛紛靡止將何恃以為紀綱乎夫右階之轉官有止法之拘此盖成法之一定比者寶訓會要成書㳟覩明詔提舉諸司承受各轉一官内礙止法人許回授此又近令之昭然今來忽准内批鄧彭年特與轉行遥郡仰惟懋賞之行非止一彭年也今獨求内批踰越條制不惟欲轉階官又欲轉行遥郡其輕視陛下法令若此使其僥倖得行則一定之法由是而遂廢其餘沾賞者又将援是以為例豈陛下謹命令惜名器之意雖臣之愚亦知陛下必不為一人而廢祖宗之法棄已行之令也竊意彭年必姑以是為嘗試之計謂陛下終不加之罪故敢妄冒若此臣愚欲望聖慈将彭年轉遥郡指揮特賜寢罷如曾為承受應格合行轉官只令依條回授庶幾羣聽不駭而倖門可塞誠非小補也理宗淳祐中安南國王陳日照傳位其子求封太上國王下省官議祕書省正字歐陽守道議曰太上者漢高帝以尊其父累朝未之有改若賜詔書稱太上國王非便南越尉佗嘗自稱蠻夷大長老正南夷事也禮方伯自稱曰天子之老大夫致仕曰老自稱亦曰老自蠻夷言之則有尉佗之故事自中國言之亦方伯致仕者之常稱漢亦有老上單于之號易太以老無損或去上字存其太字太王則有古公三太三少太宰少宰太所以别於少也謂父為太則子為少矣太以尊言則太后太妃太子太孫以卑言則太史太卜太祝樂太師太固上下所通用也侍御史鄭宷䟽言比年以來舊章寢廢外而諸閫不問勲勞之有無而爵秩皆得以例遷内而侍從不問才業之優劣而職位皆可以例進執政之歸休田里者與之貼職可也而凡補外者皆授之矣故自公侯以至節度有同序補自書殿以至祕閣錯立周行名器之輕莫此為甚無功者受賞則何以旌有功之士有罪者假寵則何以服無罪之人矧事變無窮而名器有限使名器常重於上則人心不敢輕視於下非才而罔功者不得覬幸於其間則負慷慨之氣懐功名之願者陛下始可得而鼓舞之矣徐元杰上奏曰臣聞慶賞刑威曰君君人制命而為義紀綱所在􅏮不可渝為人臣子能致其身職分然也生殺予奪惟上之命利患亦何可以自擇哉自一命而上食君之祿者皆當惟君命是聽況於高爵穹位出而任國邊寄之重胡可貪愛其身逆計它日之去就無王命而私相授受恬不以為恠此有識無識所以痛哭流涕而不容一朝居者也臣切觀前日兼給事中趙希塈繳奏邊臣李曾伯褒寵恩數及閲李曾伯之奏已擅分職事付之張竽田文虎欲輕自脱去臣不勝驚愕曾伯早以才而自負為聖主之見知凡前此備禦功過之半陛下畧其過而録其功已至文昌八座為曾伯者食息念此其將何以自誓仰報天地罔極之恩況聖政作新事任因襲曾伯控辭雖屢而陛下勉留孔切錫賚恩狎初何他嫌大臣與之書問絡繹所以諭之究心備禦者未嘗不懇懇惻惻曾伯又何所疑而輕於擲印一至於此乎今陛下與大臣告諭深切而曾伯輕舉妄動以駭觀聽又何為而不以賢臣之所以主爾忘身國爾忘家者終始自信乎張竽權漕運者也田文虎職監州者也皆文臣之選也皆知書之士也無君者臣子之大罪春秋之所必誅今曾伯無王命而私授之於二人二人亦無王命而私受之於曾伯雖武臣稍知事體者亦不敢如此雖内地守令尋常被論而罷未得省劄亦當守待必得命而後交印今曾伯身當邊閫兩道之重盖非小小事任也何乃未之思乎況張竽田文虎皆擅攬印但知有曾伯之為長何不知陛下之為尊也趙希塈封駁尚是恕典胡為未䝉付出因念邊任至重陛下勉留再三曾伯不當輕去聖恩寛大不以罪之而又以恩數加之此固足以見聖明深意之所在殆如漢吳王不朝而賜之以几杖誠欲使曾伯愧悔自反而後已今聞曾伯亦頗省咎仍欲引疾丐去以此觀之則前日希塈所駁且與曾伯收還前項恩命盖知曾伯既動愧悔之心必不敢受此非望之恩也恩數既不敢受前日已付印於二臣矣今兹尤當分明使之收回以任職事臣於此欲望聖慈亟從學士降詔諭曾伯以人道至大之綱常不得輕為去就以揺物情以弛邊備所有田文虎張竽既不曽準朝廷指揮輙自交管牌印之𩔖併乞如希塈所陳重與追斥施行如是則尚可整頓凡任邊寄者必不至轉相效尤吾國猶可以自立於天地矣洪舜俞進故事曰唐貞元中宣武都知兵馬使李萬榮逐節度使劉士寧上聞之使問陸贄贄上奏士寧見逐雖是衆情萬榮緫軍且非朝㫖願審之謹之上復謂贄曰今議除一親王充節度使令萬榮知留後贄復上奏曰夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之夷地則平才如負焉唯在所授踰其力則踣為國之道以義訓人將敎事君先令順長若使傾奪之徒便得代居其任利之所在人各有心此源潜滋禍必難救非徒長亂之道亦開謀逆之端上不從竟以萬榮為留後臣聞名分者天下之大閑植之則治隳之則亂唐自天寳以宴安兆釁君失其尊肅宗復國宜思挈皇綱於既墜扶大分於寖隳乃就平盧軍中察所欲立者授以旄節自此廢置之權在軍士而姑息之弊開至代宗專事姑息僅止覊縻德宗加甚焉李萬榮逐劉士寧而自緫宣武陸贄以傾奪長亂為諫曾莫之聽夫姑息者陵夷之本姑且也息止也茍圖一時之靜急求目前之紓而莫計其窮是以强藩悍将敗國事者不敢問冒國禁者不敢討屈情抑勢俯而就之以順適其意所求必從所請必獲倨傲偃蹇莫知禀承始則節度不知有朝廷乆則将校不知有節度更相睥睨見便則奪犯上者必好亂德宗亦安能禁萬榮之自為留後乎然使當時君德脩明朝綱振肅不以猜忌踈臣下不以聚歛苦民生禁兵非市井之富兒軍政非宮庭之嬖倖以至在列皆陸贄而非盧把皆李泌而非張延賞則朝廷之勢重於九鼎藩鎮安得而輕視之藩鎮之敢於干名犯分朝廷輕故也自昔安有朝廷輕於上亷傾級圯而能措大器於安者哉度宗咸淳三年署昭慶軍節度掌書記劉黻上論内降恩澤曰治天下之要莫先於謹命令謹命令之要莫先於窒内批命令帝王之樞機必經中書叅試門下封駁然後付尚書省施行凡不由三省施行者名曰斜封墨敕不足效也臣覩陛下自郊祀慶成以來恩數綢繆指揮煩數今日内批明日内批邸報之間以内批行者居其半竊為陛下惜之出納朕命載於書出納王命詠於詩不專言出而必言納者蓋以命令繫朝廷之大不能皆中乎理於是有出而復有納焉祖宗時禁中處分軍國事付外者謂之内批如取太原下江南韓琦䄂以進呈英宗悚然避坐此豈非謹内批之原哉臣日夜念此以為官爵陛下之官爵三省陛下之三省所謂同奉聖㫖則是三省之出命即出陛下之命也豈必内批而後為恩縁情起事以義制欲某事當行某事當息具有條貫何不自三省行之其有未合於公論者許令執奏顧不韙歟金宣宗興定間徐州行樞宻院參議官鈕祜禄仝周上章言惟名與器不可假人自古帝王靡不為重今之金銀牌即古符節也其上有太祖御畫往年得佩者甚難兵興以來授予頗濫市井道路黄白相望恐非所以示信於下也乞寳惜之有所甄别御史中丞李英奏言名器不可以假人上恩以難得為貴此來醲於用賞實駭聞聽帑藏不足惟恃爵命今又輕之何以使人伏見蘭州西闗堡將王格爾向以微勞既蒙甄録頃者堅守關城誘殺賊使論其忠節誠有可嘉若官之五品命以一州亦無負矣急於勸奨遂擢莭鉞加階二品賜以國姓若取蘭州又将何以待之陜州名將項背相望曹記僧包長壽東永昌圖克坦徹爾郭禄大皆其著者格爾藐然賤卒一朝處衆人之右為統領之官恐衆望不厭難得其死力也元世祖時趙天麟上䇿曰臣聞道真無迹斡衆有之樞機神用無方皷羣生於橐籥無實統有有盡關無無者道之體也有者名之分也是以下民澆弊亦存天地之先上古鴻龐即在乾坤之末及乎一元洪化萬象爰分動植林林榮枯滚滚達人之所大受中下之所甚迷體用䨇全嗚呼大矣夫首體髪膚榮衞骨肉口鼻耳目心意性情莫不昭乎其可知冥乎其易辨然而吾身果安在邪故曰無也豈惟身哉大而天地小而塵芥亦皆如是故混之為一物貫之為一理止之為一心齊之為一槩儒者謂之無老者謂之虚釋者謂之空其實一也惜乎蒸民好德日用不知是以聖人立兹名教太極之理分而為五曰木火土金水五行一太極而本無其極但以有名名之也大道之體分而為五曰仁義禮智信五常一大道而本無其道亦以有名名之也道即太極也有名皆道也非有名不足以定蒸民之心非有名不足以立烝民之極昧全理而執偏迹者皆異端之流有上達而無下學者皆亂人之𩔖故名教之源曰天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以𩔖聚物以羣分吉凶生矣在天成象在地成形變化見矣此名敎之源也由是言之天下者皇天之天下也人君者皇天之子也天子之職代天理物溥覆在下執一機而庶彚咸興出一言而兆人聳聽方其神威髙駕大造旁馳風雲不可喻其迅鬼神不能耀其靈賁育不敢程其勇聖愚莫不禀其命者何哉皆由名分以制御之也名以分而後彰分須名而可辨有名無分謂之虛名有分無名亦為虛分此名分所以若形影之未嘗相離也今聖朝官分九品職治四民正名之政亦已先矣正分之事亦已行矣欽惟陛下繼天開統光祖承基願使愚臣載陳常道夫五典之敎父子有親也君臣有義也夫婦有别也長幼有序也朋友有信也夫五等之服一曰斬衰之服二曰齊衰之服三曰大功之服四曰小功之服五曰緦麻之服斯皆人紀之當然天秩之大節禮經昭立邦典常行臣竊恐方今上自王公大人下及諸色士庶猶未有能悉其制者伏望陛下令有司大昭儀則爰定徽猷使内外諸色士庶皆習其義備探其真亦不須泥瑣碎之煩文庶可識聖賢之大體如是則尊者盡臨制之道卑者傾承奉之心上下相安大小皆定更望陛下無分者宜惜其名無名者弗許其器盖名以出信信以守器器以藏禮故也如是則名分先正而政事無不正者矣天麟又上䇿曰臣聞方圓並轉則圓者易流邪正同行則正人多滯方正有丈夫之志圓邪皆妾婦之倫言至於斯每招怊悵得其綱則一舉而衆紀皆從壅其流則竭力而病源常在是以無思也無為也暫煩於立法之時愼守之勉行之享逸於法成之後因而見效易以收功我國家設官分職以來政迹彬彬寖成文化比屋有遂生之樂敷天無失所之人凡以得人故也自至元十四年新破宋區權臣行海放之法使負販屠沽之輩臧獲廝役之才或受皇宣或膺勅劄填街塞市車載斗量望江淮而去者皆懐刼掠之心就閩廣而官者罕有公清之德行臺在上而不能禁按察嚴令而不能絶豈非瘡痍之地生蚊蚋之蟲牛羊之羣縱豺狼之獸哉及乎考滿申上移除貪叨者不知紀極益思營取而甘宦蠻方懼險者已致不貲寧降等級而還官腹内於是東西南北濫子交行漢劒未加朱雲暗嘆十餘年間選法大壊或者以比齊鷹開府衞鶴乘軒臣猶以為未也夫鷹鶴雖禽鳥而豈嘗害民也哉近年以來舊弊猶有存者仰頼聖朝之福賢相之力下皆稱職但恐病源未塞當立法以防之臣以為選用之法莫貴於德莫急於才才德兼全者大丈夫也德勝才者君子也才勝德者豪英也有德無才者淳士也有才無德者小人也才德兼無者愚人也故明明德於天下者淳士以上四德皆所當用也小人愚人皆所當棄也於是辨三德分而為九科簡八才分而為二十六等所謂三德九科者一曰正直之三科直而温也亂而敬也擾而毅也二曰剛德之三科剛而塞也强而毅也簡而廉也三曰柔德之三科柔而正也愿而㳟也寛而栗也翕受敷施九德咸事臯陶告舜詳具虞書所謂八才二十六等者一曰賛化之才三等文史也禮官也樂官也二曰銓選之才三等知人也敬賢也考校也三曰風憲之才二等糾察也廉訪也四曰戎事之才六等宿衞也籌計也督領也鎮防也屯田也芻養也五曰政事之才四等使臣也决斷也農桑也董役也六曰監守之才二等關津也營造也七曰錢穀之才二等明利也算數也八曰方術之才四等僧官也道官也醫官也陰陽也八才之等以德為基臣又以太陽下照恩賜雲來有當賞者寧多賜錢幣而名器不可以假人也伏以方今俳優之戲具見喜之庸人間有腰金莭衣紫服者竊恐臣下或有勤勞将士或有當賞而覆盆難照者聞斯事則不能不啓悵悵之心而解其體焉此馬周所以恥騶豎倡子鳴玉曵履同立於朝而上䟽以諫文皇也伏望陛下以三德九科八才二十六等之説明諭選曹使之從事於斯凡未嘗進而初進者㨿此法而置之於所宜之方凡已進而考滿當流轉者據此法而就改於當然之地更望陛下惜名器之重勿以假於人如是而行之何患弊之不革乎何患官之不稱乎官稱而政成政成而民安民安而國慶矣順帝至正末朝命除鄭玉翰林待制奉議大夫遣使者賜以御酒名幣浮海徴之玉辭疾不起而為表以進曰名爵者祖宗之所以遺陛下使與天下賢者共之者陛下不得私與人待制之職臣非其才不敢受酒與幣天下所以奉陛下陛下得以私與人酒與幣臣不敢辭也歴代名臣奏議卷一百九十八
