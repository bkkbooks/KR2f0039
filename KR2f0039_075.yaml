body:
  text: 厯代名臣奏議卷七十五明楊士竒等撰内治宋神宗熈寧元年殿中侍御史裏行錢顗上奏曰臣伏以厯代聖明之君臨御四海之初必有甚美之事以順人情必竭至誠之心以感天意陛下紹膺大寳憂勤庶政有弊必去聞善必行然猶隂陽未和災異數見豈聖化有所不洽者耶臣竊伏思其一端臣恭聞仁宗及英廟兩朝之間見在宫人尚多幽閉掖庭豈無怨隔之思以汨和氣臣伏乞陛下特軫宸衷沛然下詔法祖宗開寳祥符之制量數放出務令徔便無曠怨之苦有遂性之樂上足以感天意下足以順人情哲王懿範莫過於此也侍御史知雜事劉述上奏曰臣竊以方今之患在乎官冗官冗由乎入流之衆所以賢不肖混淆耗蠧帑廪而困弊生靈者也今不早為裁節日引月長將如之何伏見皇族郡縣主出嫁其夫並白身授殿直内有閭閻之人但富於財者往往認他人三代有官職者冒為婚姻紊亂國經塵穢天属莫斯為甚近制亦許就文資恩澤參以士人漸復唐制亦救弊之一端也以臣愚管見今後欲乞秪於見任文武官僚中元非進納出身者選擇為親内京朝官武臣與不隔磨勘特轉一官幕職官三考以上於銓格不妨磨勘者與轉京官州縣官令録資序與兩使職官判官簿尉齋郎監簿之類與初等職官該說不盡者乞從朝廷比類相度指揮所冀稍塞濫源漸清仕綴三年右諫議大夫御史中丞吕誨上奏曰臣竊聞去年下京東買黄金數萬兩本路科率太暴民頗怨之又廣南新錢監許買真珠上京傳說將備宫中十閤用度盖愚者無知因其民言造為端意謂陛下春秋富盛祥禫既除將邇聲色漸求暇逸此其惑也臣有以知聰明睿智以天下為心必不留神於此爾然重思之天下有道庶人不議明盛之朝不當使民如是而議似亦啓之有因不可不卹也臣職在言責敢不為陛下一一而陳之臣聞宫禁職位自有班序十閤創置非古儀也或云仁廟晩年欲廣繼嗣諛言闚間遂成其事英宗踐祚因循舊制真作無益害有益也何則既名閤分則異嬪御供具之外仍置官𬋩幹増長事勢動有踰僭且禮之所設本防其漸作法於儉其敝猶奢今日之為實繫聖慮而況陛下尊奉兩宫與仁宗事體不同且虞倖進之臣漸陳無益之計臣愚欲乞陛下沈機慮始臨事制宜俯畢三年之喪首罷十閤之制徳音遂發人心自恱矧復舉動之間使人窺伺莫及豈止成一時之盛美將見垂萬世之休光區區之誠所願至矣哲宗元祐間御史中丞傅堯俞上奏曰臣伏見近除韓忠彦為尚書左丞繼又以其弟嘉彦尚主物議藉藉以為未當臣不敏不敢臆度其是非臣竊謂李徳裕實唐之名相建言舊制駙馬都尉與要官禁不往来開元中訶督尤切今乃公至宰相及大臣私第是等無他直洩漏禁宻交通中外耳請白事宰相者聽至中書無輙詣第當時防禁如此今乃萃於一門議者之言良可取也況君舉必書而書事必謹其始陛下自臨御以来勵精政事未有過舉而首開此塗異日援以為比其弊將深且書於史冊云始於陛下使後世指為譏議顧不惜哉願陛下深思之陛下用臣軰為聦明臣茍知而不言負陛下之罪不容誅矣哲宗方選后太皇太后曰今得狄諮女年命似便然為是庶出過房事須評議樞宻直學士王巖叟進曰按禮經問名篇女家荅曰臣女夫婦所生及外氏官諱不識今者狄氏將何辭以進議遂寢哲宗選后既定太皇太后曰帝得賢后有内助功不是小事巖叟對曰内助雖后事其正家須在皇帝聖人言正家而天下定當慎之於始太皇太后以是語哲宗者再中書舎人彭汝礪奏曰臣竊以古者能治其國非獨修諸已者備内亦有助焉后妃夫人能輔佐君子非獨天性然也教亦有素焉后妃人君之配也天下國家安危治亂宗廟社禝之禍福子孫之賢不肖是係豈特其身哉此可謂甚重以天下之責以聖人之事望於一未笄之女子此可謂甚難然則擇可不慎乎擇之必知所以教之自寒而暑非一日之積也則教之所以成物亦必有漸矣禮女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆菹醢禮相助奠詩曰后妃在父母家則志在於女工之事恭儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以婦道也古之人其教之也素故其成也至詩曰誰其尸之有齊季女祭祀婦事齊母道自其幼時婦事母道非其教之素曷能與於此周南之治盛矣其志為卷耳其效為桃夭其化為兔罝為漢廣觀原反本固有所在臣以謂皇帝陛下春秋富宜蚤擇淑徳之女以定后妃之位以正天下之本以對天之丕顯休命立師傅保姆擇姬媵嚴宫室車服制環珮之節陳圗史之戒非正之聲音顔色使不得亂其視聽非正之玩好使不得致其前及其歸也凡所欲皆其所嘗聞之者也凡所享皆其所嘗安之者也凡所惡皆其所戒焉者也此可謂善矣以陛下之神明博大得賢妃之助其治天下國家何有詩曰天監在下有命既集文王初載天作之合文王嘉止大邦有子天立厥配受命既固周既受命至配立而後言固則人主所以待内助如此也然則擇之豈可不慎教之豈可不早夫教之非豫也使得其人幸而已矣幸非可以為法也茍非其人禍莫甚焉凡臣之言其稱辭小稽其事則甚大其事若緩察其微則甚切惟太皇太后陛下留意毋忽五年給事中范祖禹論立后上太皇太后䟽曰臣伏奉詔㫖皇帝納后六禮令翰林學士御史中丞兩省給舎與禮部太常寺官同共詳議臣竊伏思此國家大事萬世之始福祚所繋風化所先自古聖王重之今陛下宜先知者有四不可不慎也臣謹稽之上古參之後世為陛下悉數而詳言之一曰族姓二曰女徳三曰隆禮四曰博議所謂族姓者臣聞古之帝王所與為婚姻者必大國諸侯先聖王之後勲賢之裔不然則甥舅之國也不以微賤上敵至尊故其福祚盛大子孫蕃昌昔者黄帝娶於西陵之女是為嫘祖嫘祖為黄帝正妃其子孫皆有天下五帝三王皆黄帝之後也髙辛娶陳鋒氏之女是生帝堯虞舜娶帝堯之二女釐降於媯汭遂有天下大禹娶于塗山是生夏啓天下歸之子孫享國四百七十餘年成湯娶于有莘氏子孫有天下六百餘年周之先祖后稷生於姜嫄世有賢妃太王娶太姜是生王季王季娶太任是生文王文王娶太姒其禮尤盛大雅歌之曰文王初載天作之合言文王之初有識天已生賢女為之配也又曰大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光自古昏禮未有如文王之盛也太姜炎帝之後也太任太昊之後也太姒大禹之後也太姒生十子武王周公皆聖人也其餘皆為顯諸侯周之子孫徧于天下太姒之徳也詩人美文王之聖本由太任其詩曰思齊太任文王之母思媚周姜京室之婦太姒嗣徽音則百斯男又曰刑于寡妻至于兄弟以御于家邦言文王之化自家及國以正天下也周南關雎后妃之徳人倫之始風化天下皆美太任太姒也武王亦娶于姜是生成王周有天下三十餘世八百餘年其基本盖由此也故族姓不可不貴所謂女徳者臣聞禮本夫婦詩始后妃治亂因之興亡繋焉三代之興皆有賢妃其亡也皆有孽女夏之興也以塗山其亡也以末喜商之興也以有娀其亡也以妲己周之興也以姜嫄其亡也以襃姒此皆聖賢所紀詩書所載垂之後世以為永鑒者也秦漢以後昏姻多不正無足取法惟後漢顯宗明徳馬后唐太宗文徳長孫后憲宗懿安郭后皆有后徳出於勲賢之家其餘敗亂足以為戒而已恭惟本朝太祖皇帝以来家道正而人倫明歴世皆有聖后内徳之助自三代以後未有如本朝家法也皇帝聖徳明茂睿質純粹天監在下必生聖女以佑皇家惟陛下逺觀上古近鑒後世上思天地宗廟之奉下為萬世子孫之計選卜窈窕以母儀萬國表正六宫非有徳孰可以當之然閨門之徳不可著見必視其世族觀其祖考察其家風參以庶事亦可知也昔漢之初大臣議欲立髙帝子齊王皆曰王母家駟鈞惡戾虎而冠者也代王母家薄氏君子長者乃立代王是為文帝文帝為漢之賢主亦由其母家仁善也故女徳不可不先所謂隆禮者臣聞天子之與后猶天之與地日之與月隂之與陽相須而後成者也禮曰天子聽男教后聽女順天子理陽道后治隂徳教順成俗内外和順國家理治此之謂盛徳又曰天子修男教父道也后修女順母道也孔子對魯哀公曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也是故君子興敬為親捨敬是遺親也弗愛不親弗敬不正愛與敬其政之本歟哀公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎又曰天地不合萬物不生大昏萬世之嗣也君何謂已重焉盖深非之也孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬歟禮又曰元冕齋戒鬼神隂陽也將以為社稷主為先祖後其可以不致敬乎又曰敬而親之先王之所以得天下也今臣與衆官討論講議皆約先王之禮參酌其宜不為過隆願陛下勿以為疑進言者必曰天子至尊無敵於天下不當行夫婦之禮而荀卿有言天子無妻告人無匹也如此則是周公之典孔子之言皆不可信而荀卿之言可信也臣謹按禮冠昏唯有士禮而無天子諸侯之禮故三代以来唯以士禮推而上之為天子諸侯之禮盖以成人之與夫婦自天子至於士則一也臣竊聞親王宗室之間娶妻殊無齊體之禮敬而親之之義天下豈有獨尊而無偶配者哉至於鄙慝之禮或雜戎狄之俗或習委巷之風下自士族上流宫禁有涉於此者碩陛下一切屏絶之以正基本以先天下故禮不可不隆所謂博議者臣聞古者天子聘后上公逆之諸侯主之故春秋書祭公来遂逆王后于紀夫國有大事大臣不容不預聞也昔慈聖光獻之立也吕夷簡定其議故其詔曰覽上宰之敷言其冊曰宗公鼎臣誦言于朝先是茶商陳氏女亦預選擇王曾宋綬皆以為言大臣繼有言者遂罷陳氏仁宗所以為聖者能從衆也進言者必曰此陛下家事非外人所預自古誤人主者多由此言也天子以四海為家中外之事孰非陛下家事大臣無不可預之事亦無不當預之人且陛下用一執政進一近臣必欲協天下人望況立皇后以母天下乎臣恐陛下一日降詔云立某氏為皇后則大臣雖有所見亦難乎論議矣今陛下之所選擇莫若出其姓氏宣問大臣若聖志既定而衆議僉同則卜筮協從鬼神其依天人之意無不同矣故議不可不博臣幸備勸講其職在以帝王之事裨益聖徳故敢獻其所聞臣之愚誠惟中宫正位之後四海之内室家相慶則宗社之福也狂瞽之言惟陛下留聽干冒宸嚴臣無任惶懼俟罪之至七年祖禹又奏曰臣近以權住經筵久不進講陛下今月一日已御邇英又先降聖㫖過端午未住講讀此見陛下好學之至也而臣自五日以後北郊奉祠未獲入侍伏覩中宫初建將行嘉禮實為正始之道王化之基恭惟本朝祖宗家法自三代以還盖未之有由漢以下皆不及也今陛下納后以承天地以奉祖宗内盡孝養外美風化將以為萬世法臣愚竊為陛下重之謹按周易家人之卦乃聖人所以定天下之端本臣輙不自揆敢撰集所聞先聖先賢之言為觧義一篇謹録上進以代奏事伏望聖慈少賜省覽臣無任惶懼激切之至臣祖禹曰家人之道以内為主女正則家正矣故其利在女之正彖曰家人女正位乎内謂六二也男正位乎外謂九五也六二以柔得位而居中九五以剛得位而居尊男子居外女子居内男不言内女不言外男女之正莫大於此此天地之義隂陽之分也禮曰天子聽男教后聽女順天子理陽道后治隂徳天子聽外治后聽内職教順成俗外内和順國家理治此之謂盛徳故天子之與后猶日之與月隂之與陽相須而後成者也其可以不正乎天子者天下之君也諸侯者一國之君也父母者一家之君也君不可以不嚴天子則天下之所嚴也諸侯則一國之所嚴也父母則一家之所嚴也故家人有嚴君焉父母之謂也父得父之道則慈子得子之道則孝兄得兄之道則友弟得弟之道則恭夫得夫之道則義婦得婦之道則聽如此然後家道正推而行之以治天下故正家而天下定矣舜文王是也舜事父母瞽叟底豫而天下之為父子者定象憂亦憂象喜亦喜而天下之為兄弟者定釐降二女于溈汭嬪于虞而天下之為夫婦者定文王孝扵王季太任刑扵太姒友于兄弟以御于家邦大學曰心正而後身修身修而後家齊家齊而後國治國治而後天下平象曰風自火出家人何謂也離火也巽風也火在内而風在外家人之道由内以相成故文中子曰明内而齊外也君子之居家也言必有物行必有常所以為家人法也孔子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之所以動天地也可不慎乎初九曰閑有家悔亡何謂也處家之初治家之始故必防閑之然後悔可亡王弼曰凡教在初而法在始當治之扵未變嚴之扵未瀆也既變而後治之既瀆而後嚴之則悔矣孟子曰身不行道不行扵妻子君子言有物行有常無僻志無滛好所以閑家也昔者桀惑於末喜故夏亡紂惑於妲己故商亡幽王惑扵褒姒故周亡晉獻公惑於驪姬三世大亂唐髙宗制於武后唐祚中絶中宗制於韋后身陷大禍皆不䏻閑之於初也閑之在於人心未變之時故象曰閑有家志未變也六二曰無攸遂在中饋貞吉何謂也坤之文言曰地道也妻道也臣道也地道無成而代有終也隂不為倡陽不為和故坤道柔順承天而時行妻道無攸遂在中饋則正而吉矣古者女子十年不出姆教婉娩聽從執麻枲治絲繭織絍組紃學女事以供衣服觀於祭祀納酒漿籩豆葅醢禮相助奠后妃在父母家則志在於女工之事恭儉節用服澣濯之衣尊敬師傅故關雎美后妃之徳其職在扵供荇菜備庶物以奉宗廟又當輔佐君子内有進賢之志而無險詖私謁之心關雎之化行則諸侯之夫人采蘩于沼沚用之公侯之事大夫之妻亦采蘋藻盛之箱筥湘之錡釜以供祭祀之用皆無攸遂在中饋之事也三代之亡皆以孽女亂政不修其職而預外事故武王數紂曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用詩人刺幽王曰哲夫成城哲婦傾城婦有長舌惟厲之階亂匪降自天生自婦人又曰赫赫宗周襃姒烕之皆反此者也九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝何謂也以陽處陽居下卦之上為家人之長剛嚴者也王弼曰行與其慢寧過乎恭家與其瀆寧過乎嚴故家人嗃嗃至於有悔雖危猶不失吉婦子嘻嘻言笑無節終必有吝凡家之道主扵嚴敬故象曰家人嗃嗃未失也婦子嘻嘻失家節也六四曰富家大吉何謂也以隂處隂體柔居巽少長有禮各得其序以聽於上故象曰順在位也富者非富扵財而已家之富猶人之肥也禮曰父子篤兄弟睦夫婦和家之肥也其大吉不亦宜乎九五曰王假有家勿恤吉何謂也陽居君位以家道治天下者也聖人以天下為一家以中國為一人故視天下如家視百姓如身愛人如愛身治天下如治家孔子曰身以及身子以及子妃以及妃君行此三者則愾乎天下矣太王之道也如此國家順矣孟子曰天下之本在國國之本在家家之本在身修身所以治人正家所以治天下也舜舉八元使布五教于四方父義母慈兄友弟恭子孝内平外成此以家道治天下而四海之内莫不交相愛也詩曰之子于歸宜其家人大學曰宜其家人而後可以教國人先王欲正天下必自家始此家人之盛也故勿恤而吉王弼曰王至斯道以有其家古之人有行之者舜文王是也上九曰有孚威如終吉何謂也以陽居上處家之終誠發扵中而著扵外人皆信之故曰有孚治家之道初則閑之終則嚴之故曰威如閑之者制扵未變也嚴之者所以常久也孔子曰君子不重則不威傳曰有威可畏謂之威揚雄曰貌重則有威又曰或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏與見侮無不由已又曰人必其自敬也然後人敬之君子之道本諸身故治家者始於修身終則及諸其身其身正而天下歸之矣身䖏威敬人亦畏敬之夫如是豈有不終吉者乎故象曰威如之吉反身之謂也元祐六年太常丞吕希純上奏曰臣竊以天子之與后猶日之與月隂之與陽相須而後成是以自古聖主有婚姻之始皆博訪令族㕘求有徳然後昭告宗廟成以昏禮其敬謹重正如此詩人推原周家受命之本上陳姜嫄周姜太任太姒之賢皆聖賢之後大邦之子其盛徳不回其徽音可繼故輔其君子世世修徳昭受天命歴年長久未聞以聘納之際參以隂陽數術者也三代禮文雖不盡見然禮記及周禮儀禮述大昏之義列媒妁之職載六禮之儀稍為詳備略無男女年命勘婚文以至漢唐而下史䇿所載亦無此制本朝制司天之官雖有婚書然自祖宗以来每建中壼皆采用徳閥不專以勘選為事且宣祖皇帝方在側微天作之合固未嘗集太史而議年命也然而昭憲太后實生太祖太宗為萬世福是豈勘婚之力㢤其婚書詞義鄙淺及日官元不自信臣所慮者自降選后指揮已是逾嵗誕聖年月其誰不知除日前供到家狀猶或可信外若今日以後更令餘家供析安知不改易女命以求附會雖盡合書法豈復可憑則恐論議遲遲徒為過謹曠日持久無益而已皇帝於后妃之議方當謙抑不言太皇太后推慈愛之念固欲盡衆美以副宸心然則股肱大臣亦宜以身任其責況即今公卿士大夫之家例不勘婚人雖有貴賤之殊其於親愛盖亦同爾乃敢斷然不用者豈非以勘合年命為難信畧去拘忌為安便邪為人臣者固當推已之所安以事君上不可如卜祝之論姑以逃責而已故臣敢因縁職事輙貢瞽言伏惟聖慈少賜裁擇元符元年翰林學士鄒浩上奏曰臣聞禮曰天子之與后猶日之與月隂之與陽相須而成者也天子理陽道后治隂徳天子聽外治后聽内職然則立后以配天子安得不謹今陛下為天下擇母而所立乃賢妃劉氏一時公議莫不疑惑誠以國家有仁祖故事不可不遵用之耳盖皇后郭氏與美人尚氏争寵致罪仁祖既廢后不旋踵并斥美人所以示公也及至立后則不選於妃嬪必選於貴族而立慈聖光獻所以逺嫌也所以為天下萬世法也陛下以罪廢孟氏與廢郭氏實無以異然孟氏之罪未嘗付外雜治果與賢妃争寵而致罪乎世固不得而知也果不與賢妃争寵而致罪乎世亦不得而知也若與賢妃争寵而致罪則并斥美人以示公固有仁祖故事存焉若不與賢妃争寵而致罪則不立妃嬪以逺嫌亦有仁宗故事存焉二者必居一於此矣不可得而逃也況孟氏罪廢之初天下孰不疑賢妃必為后及讀詔書有别選賢族之語又聞陛下臨朝慨歎以廢后為國家不幸又見宗景有立妾之請陛下怒其輕亂名分而重賜譴責於是天下始釋然不疑陛下立后之意在賢妃也今果立之則天下之所以期陛下者皆莫之信矣載在史冊傳示萬世不免上累聖徳可不惜㢤且五覇者三王之罪人也其葵丘之會載書猶且曰無以妾為妻況陛下之聖髙出三王之上其可忽此乎萬一自此以後士大夫有以妾為妻臣寮糾劾以聞陛下何以處之不治則傷化敗俗無以為國治之則上行下效難以責人孔子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所錯手足名之不正遂至民無所錯手足其為害可勝道㢤尤不可不察也臣伏覩陛下天性仁孝追奉休烈惟恐一毫不當先帝之意然先帝在位動以二帝三王為法斥兩漢而下不取今陛下乃引自漢以来有為五伯之所不為者以自比是豈先帝之論乎是豈繼志述事所當然者乎此尤公議之所未喻也臣觀白麻内再三言之者不過稱賢妃有子及引永平祥符立后事以為所咨之故實臣請論其所以然者若曰有子可以為后則永平中貴人馬氏固未嘗有子也所以立為后者以徳冠後宫故也祥符中徳妃劉氏亦未嘗有子也所以立為后者以鍾英甲族故也又況貴人之系實馬援之女徳妃之時且無廢后之嫌其與賢妃事體迥然異矣若曰賢妃冠徳後宫亦如貴人鍾英甲族亦如徳妃則何不於孟氏罪廢之初用立慈聖光獻故事便立之乎必遷延四年以待今日果何意邪必欲以此示天下果信之邪兼臣聞頃年冬享景靈宫賢妃實隨駕以往是日雷作其變甚異今又宣麻之後大雨繼日已而飛雹又自告天地宗廟社稷以来隂霪不止以動人心則上天之意益可見矣陛下事天甚謹畏天甚至尤宜思所以動天而致然者考之人事既如彼求之天意又如此安可不㽞聖慮乎夫成湯聖君也仲虺不稱其無過而稱其改過不吝髙宗賢君也傅說不告以拒諫而告以從諫則聖臣雖至愚不足以方古諫者常念唐太宗猶有恥君不及堯舜之臣況直可以為堯舜如陛下之聖而於身親見之乎是以不敢愛身冒犯天威圗報陛下親自識㧞天恩之萬一而區區血誠盡於此矣惟陛下俯徔而改之不以為吝則萬世之下所以誦陛下之聖者亦將在成湯髙宗之上矣豈不美哉伏望聖慈深賜照納不以一改命為甚難而以萬世公議為足畏追停册禮别選賢族如初詔施行庶㡬上荅天意下慰人心為宗廟社稷無疆之計不勝幸甚哲宗時右諫議大夫范純仁論太皇太后冊禮疏曰臣近聞將来太皇太后冊禮並依明肅太后故事於文徳殿受冊縁自太皇太后同政以来至仁盛徳髙掩前古所行典禮為萬世尊仰不必專稽明肅伏望特自太皇太后聖意指揮更令禮官子細詳定務合中制以副聖意臣以受恩殊常固當知無不言以伸補報㒺避僭易之罪伏望聖慈矜察易謙卦稱天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙一謙而四益徔之又曰謙尊而光尚書曰滿招損謙受益此皆經典之法言在聖明正所當務臣不勝區區犬馬之誠乞賜采録陳次升奏曰臣伏覩詔書以皇后孟氏旁惑邪言隂挾媚道迨從究驗證左甚明而陛下㫁以大義不牽私恩奉承兩宫慈訓廢皇后孟氏為華陽教主降詔以告中外命下之日士庶惶惑謂后無可廢之罪而陛下廢之咸相與為之咨嗟彈指良可歎也盖以所治之獄不經有司雖聞追驗證左而事迹秘宻朝臣猶不預聞士庶惶惑固無足怪臣竊謂后之廢立事體至重若臣下一言一眚廢之逐之不足深恤自古推鞫獄訟皆付外庭未有宫禁自治髙下付閹宦之手陛下但見案牘之具可安知情罪之虚實萬一寃濫為天下後世譏笑臣欲乞陛下親選在庭侍徔或臺諫官公正無所阿附之人專置制院别行推勘庶得實情如后之罪在所不容雖廢之人自無言今事不經有司獄成閹宦此天下人心不能無疑也伏望聖慈特降睿㫖施行徽宗時任伯雨上言曰臣近具封章論瑶華事前日得對清光面奉聖訓知宸𠂻之所慮合天下之公心事可施行理當將順然而臣竊以謂天下大事無過此者前日之廢既出於率易今日之復安可以怱遽以母儀之動静而定是非於獄辭此前日之所以為率易也古人有言曰獄者天下之大命也人情安則樂生痛則思死箠楚之下何求而不得故奏牘之成雖使臯陶聽之皆以為死有餘罪何則鍛鍊者衆文致之罪明也故天下之患莫深於獄敗法亂正離親塞道莫甚扵治獄之吏又況掖廷祕獄治世所無婦人柔弱豈勝箠楚遂以文致之罪因動母儀之尊此固非所以習天下而崇堂陛也然以訓出兩宫則先帝當時不得不從事干泰陵則陛下今日豈可輕改若言近經大赦恩霈普霑豈唯瑶華獨不昭雪臣尤以此論為不然也盖朝廷赦宥為罪人而設耳昔以為有罪斷之於獄辭今以為無過均之以赦宥則是廢興動静與衆同科慢而不嚴於體未順臣故以為不然也瑶華得罪於先帝見棄於兩宫此前日詔令之本㫖也而外議藉藉皆以為先帝有常悔之言兩宫無堅確之命若審如此則皇太后下一詔書明白其事陛下奉付外廷使議典禮縱令遂非之人託扵繼述自護其短又安敢以先帝嘗悔之言為不然乎雖然詔書之文當有體要必熟議而後可發廢者之復當考故事必如禮而後可動如是則事正體嚴始終無礙臣故曰不可以怱遽也且五年安於寂靜豈有數月而不能待乎事之大者尤當以欲速為戒伏望聖慈上禀慈闈詳擇施行髙宗紹興三十二年張浚奏曰臣恭覩進奏院報已降制書令有司㳙日冊賢妃為皇后乾道當陽坤儀配極神人協慶海㝢同歡竊讀易家人彖辭曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣是知致治之道必自内始臣復考其象辭風自火出為家人風之譬則化也火之譬則禮也禮修於身化行於外是為風自火出仰惟皇帝陛下聖學髙明而事親以孝撫下以仁御事以斷凡有所為無一不合於禮方將正身以刑家刑家以齊國克謹細微以先天下治化之隆指日可俟四海幸甚臣欽聞詔命無任欣躍鼓舞之誠光宗時李皇后寖預政倪思進講姜氏會齊侯于濼因奏人主治國必自齊家始家之不能齊者不能防其漸也始於䙝狎終於恣横卒至於隂陽易位内外無别甚則離間父子漢之吕氏唐之武韋㡬至亂亡不但魯莊公也上悚然起居舎人彭龜年上奏曰臣聞書曰監于先王成憲其永無愆古之哲王出而照臨萬國必有宏綱大紀以貽憲厥後然其道不過自内以刑外正本以及末而所謂刑名度數政事法制有不在察察然也自秦以来唯務以法制下凡治人之具求之已詳而分内之事所謂刑于寡妻至于兄弟以御于家邦者悖謬特甚盖有不忍道者也三代以後唯漢唐號為小康其間賢君猶愧於此然則治道之不如古無責耳矣唯我祖宗受天明命拯亂傾否具有本末越中古不止一事而先民推其所以致豐大之業者必以家法言之范祖禹曰自三代以後未有若本朝家法者也吕大防當元祐時嘗侍邇英講讀因進曰本朝百三十年中外無事盖由所立家法最善前代宫闈多不肅宫人或與廷臣相見唐入閤圗有昭容位本朝宫禁嚴宻内外整肅此治内之法也前代外戚多預政事常致敗亂本朝母后之族皆不預事此待外戚之法也前代宫室皆尚華侈本朝宫室止用赤白此尚儉之法也前代人君雖在宫闈出輿入輦祖宗皆步自内廷出御後殿豈乏人力哉亦欲步歴廣廷稍冒寒暑爾此勤身之法也前代人主在禁中冠服茍簡祖宗以来燕居必以禮此尚禮之法也至於虚己納諫不好畋獵不尚玩好不用玉器飲食不貴異味止用羊肉此皆祖宗家法足以致太平者臣嘗因二臣之言欲採摭祖宗家法類為一書而遐方賤吏不見國史傳聞小説不敢盡信抱此志願半世莫伸昨䝉陛下官之成均成均舊有國朝會要及李燾續資治通鑑長編録本因得竊讀於是祖宗修之身刑之家者可以略見一二遂妄編次以成一書取監于先王成憲之義名曰内治聖鑒其目則畧循會要之舊其事則多本長編之書一時名臣奏請有足裨補聖治者亦復採録間有愚見輙復論著遺逸差繆不敢謂無然而區區二臣憂國愛君之心竊庶㡬焉謹繕寫成編投進以備乙夜之覽金熈宗時翰林待制兼右諫議大夫程寀奏曰虞舜不告而娶二妃帝嚳娶四妃法天之四星周文王一后三夫人嬪御有數選求淑媛以充後宫帝王之制也然女無美惡入宫見妒陛下欲廣嗣續不可不知而告戒之又曰臣伏見本朝富有四海禮樂制度莫不一新宫禁之制尚未嚴宻胥吏健卒之軰皆得出入莫有呵止至淆混而無别雖有䦨入之法久尚未行甚非嚴禁衛明法令之意陛下不可不知而必行疏奏上嘉納之歷代名臣奏議卷七十五
