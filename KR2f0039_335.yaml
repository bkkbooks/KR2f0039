body:
  text: 歷代名臣奏議卷三百三十五明楊士竒等撰禦邊宋髙宗紹興十二年廣西漕臣胡庭直上言雍州之左江永年太平等寨在祖宗時以其與交址鄰壤實南邊藩籬重地故置州縣籍其丁壯以備一旦之用規模宏逺矣比年邊民率通交址以其地所産鹽雜官鹽貨之及減易馬鹽以易銀忽而不防恐生邊釁所宜禁戢髙宗時馮當可上劄子曰臣竊聞敵使往來講修和好即其往事何足信憑此必緣廢偽齊人心未固深恐陛下乘其機會則殄滅有期知奉迎梓宫在陛下之心至切至痛以是為辭延引嵗月待其撫循既定狡計既立然後率其卒徒送死逺來陛下可不逆照其情深為之偹臣竊見江前備禦尚或闊踈自建康以屬海臣非親見不敢妄陳自西蜀以至江東臣請論之吳玠一軍在梁洋之間凡五千餘里至鄂州始有嶽飛又三千餘里至建康始有張浚陛下雖以玠為屏幛然東南形勝實有長江今嶽飛屯鄂渚實欲兼備江池襄陽有警比嶽飛得聞往返三千里束裝辦嚴非一月不至襄陽而敵兵近在京師輕軍疾馳不數日遂涉江漢萬一舉偏師向江池連綴嶽飛而以大軍向襄陽中斷吳蜀當是時吳玠不能離梁洋而下嶽飛不能捨江池而上敵兵盤泊荆南可以指顧上流震驚吳會或徑趨潭鼎橫涉饒信可以直乘空虛擾我心腹備禦如此似亦踈矣臣愚願陛下先事制勝選知兵大臣分重兵以鎮荆襄使倉卒有警荆襄併力足當一面嶽飛得専於江池間若兵有統屬不可遽分亦宜嚴戒嶽飛及兹無事預思方略審度事宜重益荆襄之戍直龍圖閣李光乞措置防江劄子曰臣伏覩建康古號帝都非獨取其形勢之勝而已蓋大江天險可以限隔敵騎戰不足而守有餘也自六朝以來歷年數百雖元魏北齊之強竊據中原橫行天下而不能加兵窺境者豈其力不足哉魏文帝至廣陵臨江觀兵見波濤洶湧歎曰嗟乎固天所以限南北也紀陟使魏晉文王問吳之戍備道里甚逺難為堅固陟曰疆界雖逺而其險要不過數四猶人雖有八尺之體靡不受患其護風寒不過數處耳易曰王公設險以守其國孟子亦以天時不如地利今濁河長淮已入敵境所恃者獨大江耳若又不守専主避敵之謀可謂無䇿矣陛下駐蹕會稽江浙今為根夲之地進足以戰退可以守者莫如建康臣不敢逺及上流姑以耳目所經江南所當守者言之自建康至姑熟凡一百八十里其隘可守者有六曰江寧鎮曰䃃砂夾曰采石曰大信口其下則有蕪湖繁昌皆與淮南對境其餘皆蘆篠之場或崎岸斗絶水勢湍悍難施舟楫為今之計莫若預於諸隘屯兵積粟分命將吏使各總地分調發傍近鄉夫使州縣各自部轄併力守禦多埋鹿角廣置炮架遇有警急強弓徑弩矢石俱發出竒以撓其議堅守以老其衆勞逸之勢我得勝算矣如此事勢尚有可圖者臣愚伏望聖慈更下臣章付三省密院大臣參稽衆議或以為可行乞精選大使那移將兵就建康屯駐據險守要衛護王室經略淮楚庶幾緩急之際不至仰貽君父之憂人心固而士氣振矣實天下幸甚李彌遜乞募土人守禦劄子曰臣契勘自淮以南與偽境相接地分守之即多事棄之即資敵當緩為計以圖之訪問諸將下各有逐處土人願為朝廷招集鄉民耕種田畝置立堡寨以守一方如劉綱孫暉之類者甚多若因所欲更加選擇可委之人其上使之守州其次使守縣鎮不必須保故地但使自擇要害可守之所處之仍委逐地分將帥時出輕騎巡掠境上以為衛護萬一寇至則避寇退復保其所事初朝廷量行應副稍加就緒即使自給漸次措置人兵别無大假費用目前雖未見其利數年之後增一藩籬之固為利非輕伏乞聖慈更加詳酌可否施行監察御史鄭剛中論邉郡上奏曰臣竊謂張官置吏皆以為民而治外之官尤重於郡守承流宣化莫先於太守而今日之勢尤急於邉郡甚矣邉郡之欲得人臣請為陛下詳言之也在內諸郡簿書獄訟户口農桑財賦盜賊是數者有一不治皆足以為害然患小勢緩而所係猶輕至於邉郡則維持控扼與國勢常相關撫綏不至則生齒凋而力孤備禦不嚴則罅隙開而釁入巡徼不謹則姦偽容而謀泄關市不修則物貨艱而錢陷朝廷非可謾委以付人得一人亦非可輕以更易也三國魏據中原自廣陵夀春沔口之屬皆其東邉也而吳亦以所抵為鄰南安祈山陳倉之屬皆其西邉也而蜀亦以所抵為鄰大率曩之為魏者今多在北敵曩之為吳蜀者今皆在朝廷如楚泗通泰以至滁濠江鄂接連襄鄧關陕之地為今邉郡者大略不過二三十郡委以與人誠不可忽臣碩陛下詔大臣詳閲吏瑣將諸處見任及已除未到之人精加審察訪求材術之士略其細行但平時績效著聞實可任用者精選二十餘輩布之邉郡使其講究利源招徠士卒種殖牧養蕃息疲瘵分委既定時遣朝廷官吏按行省察取其無狀者復更易之俟其處處得人則須以持久增秩賜金之事可行也朝廷亦何惜數闕必欲以資任終更亦何輕數郡但欲作尋常委付耶昔韓延夀善為郡所在置正長閭里阡陌有非常吏輒聞知姦人莫敢入界又朝錯為文帝陳守邉備塞之説甚詳大要欲使著業安居家室田作為久逺之計所用之吏存恤老弱善遇壯士和輯其心而無侵刻之苦由是觀之陛下用以守邉者宜加審擇既得其人宜加久任無可疑者或謂臣曰朝廷和議既成之後故地可還今日所謂鄰邉者却為內郡勢若可緩此大無理也人君立國惟在因時夲無定勢借使故地果因通和而還則要當以江淮為根夲所謂故地者却是新民根夲殖立於內護之當益工新民屏蔽於外倚之當以漸更須數年經理力強勢重始可望其通一所謂江淮者在今日尤當愛重也故臣切切以邉郡守臣為言望陛下與二三大臣留意選擇特賜施行不勝幸甚殿中侍御史張守論守禦劄子曰臣伏見陛下上念宗社之重逺懷二聖母后思還京都形之詔音中外感悅然而西京未靜糧餽未充千乘萬騎難遽啓行而防秋之期才一兩月秋高馬肥長驅深入其控扼之地其守禦之方所當聚兵所當積粟蓋非一途雖廟謨密議未易測知而臣區區之私憂不能自巳日夜念慮敢復貢其狂瞽之説臣聞兵法曰無恃其不來恃吾有以待之也無恃其不攻恃吾之不可攻也況金人乘勝勢焰尚熾有必來必攻之理則為備可少緩乎臣竊謂其來犯淮甸凡有四路其一中路自西京趨東京沿汴河由天長以來則衆人常行之路凡一千七百八十里可以控扼守禦者南京宿泗天長軍是也其一東路自滄濵趨京東由淮陽軍絶淮入楚州而來則自北直南大路凡一千九百里可以控扼守禦者青沂淮陽楚州是也其一西路自西京趨潁昌蔡州順昌府廬滁真州而來則自西北而至東南凡一千八百一十五里可以控扼守禦者順昌廬滁真州是也其一上流自西京潁昌唐州至于襄陽凡一千一十里絶襄江而至荆南則一千二百九十五里自西京潁昌蔡光州而至黃州則一千三百六十里皆可沿江順流而下可以控扼守禦者襄陽荆南江之北則漢陽黃蘄和滁真州江之南則嶽鄂興國江池太平州是也四路之中又有要害之地中路則泗州據淮天長據險為可禦東路則青州據穆陵關楚州據淮隂為可禦西路則廬夀為可禦上流則襄陽荆南蘄黃為可禦不幸順流而下則沿江諸州各據地利以臨之合從共禦庶乎其可也然當今之勢欲控扼守禦則無人欲聚兵積粟則無財仰給漕計而漕計不足橫取民力而民力已困然亦豈以此而坐待其至邪伏望陛下詔諭大臣取四路守倅帥臣銓擇能否易其尤不才者然後於要害之郡各賜緡錢視大小為等差責之募戰士責之儲芻粟責之繕甲兵使明斥候公賞罰進相援退相保陛下親降手詔委曲鐫諭許以便宜使之夙夜盡力扞蔽效死而不辭如俟緩急臨時指揮決難辦集書曰惟事事乃其有備有備無患伏願陛下思惜寸隂之義而早圖之天下幸甚守再論守禦劄子曰臣恭惟陛下時巡四方駐驆淮甸還闕之意屢形詔旨然而鞏洛未清糧儲未廣兵力未強國勢未振雖遣馬悌應援河北竊恐烏合之衆未能必其有功雖遣信使相繼祈請竊恐強敵之心未能必其退聽臣昨論奏四路防秋擇其險厄以偹守禦然猶恐兵民之心望風畏怯亦未必其能截然堅守以為扞蔽也又況揚州四達之衝城不若京都之髙厚池不若京都之深廣旁無髙山大河之阻近無強藩重鎮之援而六宫在行百司扈蹕以至府庫倉廪輜重甚多動靜之間利害相絶設或一旦有意外之警前禦強敵後逼大江臣恐良平之謀賁育之勇或無以善其後欲望睿慈詔督四路帥守監司措置把隘事宜條具以聞鐫諭切責使之合縱連衡扼其要害遏其奔衝不止為嬰城自守之計然後稍可恃也仍詔大臣審度事機如六宫百司與夫府庫之積預行區處以圖萬全而陛下與羣臣専俟守禦徐為後圖則進退周旋庶幾簡易而不煩從容而不迫矣臣愚戇不足以䇿大事惟陛下留神天下幸甚守又應詔論備禦劄子曰臣準御史臺承都省劄子臣寮上言邉事未寧乞大詢衆庶備禦之䇿奉聖旨行在職事官具所見聞奏者臣竊以金人自去冬以來破澶濮德魏側聞遊騎及于濟鄆未有退師之期聖心焦勞主憂臣辱敢不自竭圖裨補於萬分臣觀今日強弱之勢理難與之決一旦之勝負雖已遣范瓊韓世忠會師東北固已盡國之勢力以事備禦不過如此矣然謂二將之兵可恃以無恐則非臣所敢聞也是宜廣詢計䇿以圖萬全臣竊謂今日莫先於逺斥候使平安警急之報速聞於朝廷昔三國時烽火一夕行於萬里而前日北京失守二十餘日而後知之臣謂更宜措置探報使之速聞然後在我之計可得而用也今日之計有二而已一曰防淮二曰渡江然二者固有利害臣試為陛下陳之何謂防淮利害使敵由常道而來則可防者有三自南京宿州而來則泗州為可防自東平青沂入海州而來則楚州為可防自青沂入淮陽而來則楚之淮隂為可防三路皆須渡淮則凡淮北舟船盡拘留淮南我屯重兵據地利臨之敵未必能遽渡而維揚可以茍安此防淮之利也然而有三患焉一則我師惰驕勇於私鬭而怯於公戰久矣萬一敵騎抵淮則望旌旗而變色聞鉦鼓而失聲其不潰散者幾希而勝敗蓋不論也則今日之防淮猶向日之防河矣此一患也二則淮北舟船不能盡收斬木繫筏亦或能渡此二患也三則敵或偵知有備出吾不意由間道而來或以精鋭先絶吾渡江之路則坐受危困此三患也何謂渡江利害大約三倍於河而五倍於淮金人之所不測而勞師襲逺又非其利我宿重兵於建鄴鎮江亦據地利以臨之則敵未必能遽來此渡江之利也然亦有患焉一則鑾輿南巡去中原益逺而中原之民易以動搖此一患也二則行在之兵多西人也未必樂於南去恐或肘腋生意外之事此二患也三則行在之兵不多鑾輿既動則必宿兵於淮上亦必宿兵於揚州又必有扈蹕而行者兵分勢弱一有緩急何以禦敵此三患也惟其利害相形故搢紳之論遂不能決若為保守中原之計而幸其不至則防淮之䇿為得也若為宗廟社稷之計而出於萬全則渡江之䇿為得也今權輕重之宜緩急之勢而不得已則姑為南渡之計庶乎其可也然而所謂三患不可不預為之謀當權輕重緩急别擇重帥鎮守維揚則中原動搖未足憂也先詔諸將以利害禍福強弱之説遍諭將士使上下之情通然後啓行則西兵不樂非所憂也建鄴鎮江亦各擇重帥使當一面則兵分勢弱亦非所憂也今渡江以圖萬全非捨淮而不防也特以淮不可恃而已若止防淮而不為渡江之計則不可蓋或淮不能遏猝有三患亦不免於避地將見爭舟競渡而指可掬矣又況千艘相銜出入兩閘渡非數日不能盡若加促迫必使畢於朝夕之間亦恐舟未脫而漕河涸矣則所謂渡江亦非倉猝所能辦也欲望睿慈詔大臣將帥預行區處渡江利害使之盡善以俟探報臣故曰探報速聞然後在我之計可得而用也或謂彼能渡淮則亦能渡江矣臣以為不然昔魏文帝以十餘萬衆欲渡江見波濤洶湧歎曰嗟乎固天所以隔南北也遂歸則金人未必能遽渡理恐或然也守為御史中丞論守禦劄子曰臣伏讀詔書其略以謂隆祐太后以及六宫前去江表百司庶府並令從行與二三謀臣宿將士庶軍人戮力同心以備寇敵進援中原念社稷之與存蹈鋒鏑而罔避逺近感悅以為陛下志存宗社先民後已顒顒之望遂得所屬今則六宫百司啓行半月防秋之事未甚就緒而淮甸之間凶渠未靖貽將來之憂輦轂之下人心動搖無保聚之意竊謂陛下行欲移蹕以避敵鋒逺近憂疑殊無固志臣固知廟堂之議未必然然而士庶之情不能户曉悠悠之談牢不可破蓋以但見江上守禦未有措置雖已點集民兵恐不可恃也建康城池未甚深峻雖已夲府修治恐不能成也兼謂江北冦路不一而一杜充不能盡禦也以此三者便謂六飛不為固守之計前日之詔恐成虛文臣亦私憂備禦之䇿亦有未至今日已迫矣姑舉其簡易可行者願早為之所臣聞兵有先聲而後實者今日官兵微弱盍亦大振起之行在之兵不計多少宜於建康府城之外以至江下分置營寨多設旗鼓星列棊布責之將領撫循訓練早晚教閲使鉦鼓之聲常聞於數百里外仍又間為虛寨疑兵以助聲勢則大江之北偵我有備默銷姦謀日遣御營使副一貟躬行按閲事藝稍精立加旌賞小不如令必正軍法每旬日則陛下一親臨按閲而又大賞罰之則士氣激揚人自賈勇必有可用之實豈惟先聲而已哉所有沿江防托即乞先用夲州縣廂禁土軍弓手如或不足則益以民兵庶不専恃不教之民以捍方熾之敵也所有建康府修築城壁樓櫓即乞暫那諸軍併力修治責以旬日畢工庶不以輦轂之重而同州縣之役也如此則行在軍民必有為陛下效死弗去之意如有緩急徐為進退然而所向之方當亦預定以防襲逐之患尤所不可忽者今日之事大且急無以加此其他瑣瑣皆不足為陛下道如有可采即乞睿斷早賜施行守乞以大河州軍為藩鎮劄子曰臣伏見昨者車駕倉卒南渡駐蹕錢塘席未及暖又遭肘腋之變天人協佑陛下復正大位蓋厲精以圖中興之時然越在江南地勢褊狹脫或一騎絶江而南則立致顛沛今宜汲汲措置以期萬全防秋之期不逺三兩月間忠臣義士所為寒心伏見向來被兵州郡往往堅守近則一兩月逺至數月或至踰年而不能下比年敵騎不至則已至則不過三數日輒破一郡又或望風棄城或開門投拜未嘗接刃取如拾遺此在今日最為可憂臣以謂與其委城於敵不如委之於守帥今乞將大河州軍並倣唐藩鎮慎擇守帥而土地人民一以付之許一切便宜從事凡經畫財賦廢置官屬治兵調發皆得自便使之扞禦外寇屏蔽中原如敵騎侵軼而能殺敵退師固守無虞則許世襲其地庶幾人自為戰中原可得而保也以至近裏州軍見為畨人占據之處能進兵剋復者亦乞凖此若或因其退師罔冒功賞即乞朝廷嚴立罪賞施行所有沿江凡可渡處皆築堡壘量屯人兵使旌旗相望鉦鼓相聞仍遣大將一員先為防淮次為保江之計守又應詔論防秋利害劄子曰臣準夲臺牒準尚書省劄子奉聖旨防秋在近朝廷雖已措畫尚慮未盡令行在侍從職事官條具利害實可施行事聞者臣伏覩朝廷措畫防江利害止是江南一岸事宜臣以謂江北先為之防然後江南可守何以言之江北諸州類經殘破無兵可用無糧可食他日敵至官吏遁逃則敵據城市修器械具船筏與我對壘磨以嵗月為患實大臣故曰江北先為之防然後江南可守也然而江流綿逺南自荆南而至平江北自漢陽而至通泰當國家傷殘之餘兵有所不足力有所不逮而又髙郵楚泗寇攘未靜誠亦難矣今日之計當併力招捕淮南之寇一面措置防托以為限隔且示朝廷不以江北之地置度外也夫江流雖逺古人以謂猶人之一身皆可受病而備禦風寒不過數處蓋亦先其所急後其所緩耳使敵由襄陽荆南順流而來則南岸之兵及水軍戰船如今所畫之䇿可以禦之矣若由京東而來則當禦於楚泗若由京西而來則當禦于廬夀光濠以拒其衝次於蘄黃舒和以斷其渡此皆所急之地也仍各差兵將量給錢糧付兩路制置使同守倅監司參以民兵相地形之險易隨宜措置務要眀逺斥堠預知敵情然後在我之計可行矣古之都江南者豈専阻大江之險而能却敵哉亦必有制勝之道而強弱衆寡蓋不論也苻堅以百萬之師而窺晉室自謂投鞭於江足斷其流可謂強矣晉令謝玄兵才八萬乃絶淝水決戰而勝之今使敵由京東西淮南為南渡之計則當效東晉之距苻堅然後為得也曹操入荆州得船步兵數十萬而下吳會水陸俱進可謂強矣吳遣周瑜才精兵三萬逆戰於赤壁而勝之今使敵由漢江荆南上流為南下之計則當效孫權之距曹操然後為得也若止區區自守江岸不為進取之謀竊恐未為得䇿又況敵人長技唯是鞍馬彼捨鞍馬從舟楫已非所利我以舟師禦之則以我所易攻彼所難擊於上流誠為至計若廬夀光楚泗蘄黃舒和不能防遏或不幸而渡江則亦當急擊於中流使不得濟若其及岸則勢力十倍矣昔魏文帝以十餘萬衆欲渡江見波濤洶湧而嘆曰嗟乎固天所以隔南北也遂歸則江亦未易渡也所可深慮者將驕卒惰望風畏怯敵人未至曵兵而走則雖大江之險亦不足恃也今必上自御營使下委制置使督厲將士三令五申上下連接左右應援一有逃避不問大小衆寡必正軍法然後此弊庶可去也且以前日諸處郡守或望風棄城或開門投拜皆當正典刑也今雖至甚者不過貶官二等極止放罷竊恐他日敵至皆不復固守矣前日所遣將帥或不戰而遽返於中途或無功而徘徊於他路皆當正典刑也今既置而不問又從而超加爵秩極於尊崇竊恐它日遣將亦不復拒戰矣此在今日最為可憂臣愚欲望陛下詔諸路帥守及防秋所遣將帥諭以前日逃遁失守逗遛無功之人蓋緣朝廷已前號令不明失於申警聊示寬恩以責後效自今以往復蹈前轍必誅無赦亦復三令而五申之庶使玩法廢職之人有所警懼防秋利害莫大於此狂愚之言惟陛下裁擇守又論大臣當講究防秋劄子曰臣伏見陛下駐蹕建康已四十日敵師止于東平防秋近在旬月而經畫設施未見端緒中外憂恐不知所出近嘗頒降防秋之䇿十有六條人未以為然內外臣寮駁論甚多臣亦嘗條上其失特蒙開納未聞施行而前日指揮布在逺邇擾而無補恐必誤事兼又江北未有措置官吏兵民莫不疑沮以為朝廷置之度外矣臣竊惟今日保有江南宜圖萬全一有蹉跌覆水不救非若前日維揚尚有南渡之計也訪聞大臣在政事堂雖窮日力頗亦困於文書之冗賔客之勞不得専意於經濟之務蓋所謂文書者多常行細事所謂賔客者率干求差遣敝精神於無補使其少休僅容食息而已豈復更能有所經畫日月逝矣臣竊惜之臣欲望睿慈詔諭大臣撥置常行文書付之都司或六曹長二一靣行下除授差遣則更加考核引用恬退之士以息奔競庶得凝神靜慮思所以備禦之䇿若之何而拒戰若之何而固守若之何而將士用命若之何而資糧不乏朝夕講究以次施行不然則與去年秋冬無以異也昔漢王吉言於宣帝曰欲治之主不世出公卿幸得遭遇其時未有建萬世之長䇿舉明主於三代之隆其務在於簿書期會斷獄聽訟非太平之基也唐太宗謂房玄齡杜如晦曰比聞聽受詞訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞惟大事應奏者乃關僕射此皆前世之明法又況今日艱難多故尤當急所先務惟陛下留神天下幸甚參知政事同提舉修政局翟汝文應詔條具敵退利害狀曰臣正月二十四日準尚書省遞到詔書一道令臣條具敵退利害以聞臣伏見皇帝陛下駿發德音咨訪羣臣憤金人之強雄悼中原之顛覆使羣臣各效計䇿又恐臣愚不得盡言也復詔之曰君臣之間期於無隱豈非悔東隅之已失念覆車之當戒此堯舜禹湯文武之用心也顧臣敢無辭而對謹昧死上三䇿恭惟朝廷已事之失無逺略無定論無腹心三者國之大事其餘不足陳也臣聞自古兵革之禍未有如今日之酷昔西晉之亂元帝建都江左復興晉祚雖苻堅石勒數雄之強不能睥睨以守長江設險之固用一時人物之傑故能保有疆土傳祚纍世自金人渡江飲馬以至于海躤躪中國肆意所欲乘輿逺狩越在裔土雖西晉亂離之禍不至於此唐安史相繼為亂其禍亦云極矣改元至德收復兩都不二年間相繼底定自建炎於今九年矣頓師南方卑溼之域唯恐深入逺引之未至陵夷以至今日雖唐安史之亂不至於此每嵗防秋則相顧先擾謀避敵之地至春事定則泰然安肆如無事之日此將相誤國之罪臣故曰無逺略謂是也其次曰無定論臣聞古之為國者必先有立國之規模御世者必先有役一世之術秦人欲并六國則悉國人趨於耕戰秦人非耕無所得食非戰無所得爵是故國以富強卒并諸侯且非獨秦也勾踐之取吳隋文帝之取陳必勝之計已定料敵之謀已審以次而行之自建炎以來天下日苦於兵生人塗炭而朝廷無一定之論禦敵無堅決之䇿乞盟於強敵者冠蓋相望已甚屈辱矣而裹糧坐甲兵未嘗得釋養兵數十萬竭民力以供億可謂困矣而每嵗講和兵未嘗出戰攻守之計紛然未決事之珠玉曽不得免臣故曰無定論謂是也又其次曰無腹心臣聞創業中興之君必有謀主腹心之臣相與朝夕論議圖事揆䇿如出一心如左右手昔晉武帝平吳舉朝以為不可唯張華羊祜杜預贊成其計夫舉天下不可而不能易三人之可則所謀與所聽審也唐憲宗伐淮蔡舉朝以為不可而憲宗所恃以裴度武宗伐澤潞舉朝以為不可而武宗所恃以李德裕朝廷茍有腹心謀慮之臣人主恃以為固天下恃以不恐自兵興以來陛下之所取計者誰也所任事者誰也所與朝夕進見而納誨者誰也前此非不委任將相矣敵至與衆同懼敵退與衆同喜如斯而已臣聞以天下與人易為天下得人難必欲為天下得人此前世之君所以日夜焦心勞思而求也今羣臣泛泛如河中之木則陛下孰與圖今日之事乎臣故曰無腹心謂是也陛下誠能選任大臣責以恢復拔用能將隨所指顧誰敢不力合天下英豪之智力以禦有勇無謀之小敵豈其難哉伏讀詔語敵勢既屈潛師遁逃念茲卻敵之功圖為善後之計臣愚以此知陛下未嘗一日忘經略也向非陛下赫然獨斷親出總戎指授諸將控扼江表則敵人徑卷甲渡江如往嵗久矣此上天助順而宗社之福也然臣聞今者敵騎之退以國主之亡非諸將力戰而勝敵騎折北而逃也向使其主不亡使劉豫竭山東之粟以轉輸敵壘敵人濟師驅犀兕之衆以分守淮甸百姓之財屈於賦斂力已窮矣諸將之兵久於暴露師已老矣欲進不能何後之善哉此臣之所甚懼而憂也臣料今日之廷臣必因敵人自退而誦言誅討因詔旨詢訪而爭言用兵夫善後之計莫急於兵將財三者先有一定之論必然之畫付之得人而後可為也臣愚不識忌諱謹昧死上封事惟陛下省察紹興三十一年吏部侍郎汪應辰進故事曰唐杜牧追咎長慶以來朝廷措置無術復失山東作罪言曰若欲悉使生民無事其要在先去兵不得山東兵不可去是兵殺人無有巳也今者上䇿莫如自治法令制度品式條章果自治乎障戍鎮守干戈牛馬果自治乎井閭阡陌倉廪財賦果自治乎如不果自治是助敵為虐環土三千里植根七十年復有天下隂為之助則安可以取故曰上䇿莫如自治中䇿莫如取魏最下䇿為浪戰臣竊以天下之事變化百出不可以勝窮然自其夲求之則一言而足杜牧所謂自治是也茍捨其夲而訊其末則雖千萬言訖無益也戰國之際亦多故矣孫吳之攻戰儀秦之縱橫奔走旁午天下為之騷然時君用之利不償害孟軻居其間獨曰盍亦反其夲矣軻之反夲則牧之自治之説也物有夲末事有終始蓋自開闢以來至于今未有不自治而能治人者牧之之説則雖聖人復起不能易矣而臣猶有疑焉何則自治之外無它䇿矣今以自治為上䇿而又有中䇿下策是未始有定論也是謂其君不能也若軻則不然曰國家間暇及是時明其政刑雖大國必畏之矣詩云逮天之未隂雨徹彼桑土綢繆牖户今汝下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之今國家間暇及是時般樂怠傲是自求禍也禍福無不自巳求之者夫不能治其國家則已矣豈復更有中䇿下䇿者哉臣竊惟今日所以待敵人者曰戰曰守曰和然此三者皆末也要當以自治為夲吾之國家治矣以戰則勝以守則固以和則久所謂修其夲而末自應不然未知其説也孝宗隆興元年同知樞密院周麟之上封事曰臣聞為天下立事要當順天下之心明天下之勢然後能易亂為治轉敗為功古聖王所以安中夏御逺人也莫不皆然舜之格有苗禹之敘西戎高宗之伐鬼方文王之事昆夷宣王之平玁狁率用斯道也下至漢唐其迹異其理同在高文則結和親在武皇則事攻討在宣帝則受朝賀在武德之初則詭臣突厥在貞觀之盛則生擒頡利夫豈樂為是異同哉視人心之所向度國勢之所宜有不得不然者耳由是言之聖人應世初無私心也立國本無定勢也因人心之所喜為之喜故樂民之樂而天下不以為驕因人心之所怒為之怒故一怒而安天下不以為暴因國勢之強有以成吾強故日闢百里而天下不以為貪因國勢之弱有以處吾弱故以大事小而天下不以為怯拱揖指麾之間衆心樂歸大勢堅定而國計成矣世之懷偏見執異議者又烏能伸其喙以撼吾之所守哉紓一時之急收百世之利凡以此也金人之為中國患數十年矣自阿固達之起繼之以武竒邁又繼之以東昏王亶又繼之以岐國王亮逮今葛王蓋五世矣時異事變勢亦隨之阿固達一舉而吞遼人武竒邁再舉而蹙中原當是時也掩中國之無備乘民心之久安長驅搗虛所至輒下猝然有回山倒海之勢其孰能當之亶之立也命將興師入寇屢矣踰江南瞰海上而終不得志于我烏珠之歸師徒耗傷僅以身免士馬物故者大半用兵連嵗所失益多敵知事力之屈可以圖休息也亶與烏珠等謀則曰吾國天下大讎也使吾子孫一不振宋必報焉則吾國覆矣不若以恩解之此和好之所以通也和好既通則許我納幣屈我稱藩畫淮為界然後慈寧就養永祐復土南北生靈各安其業聘問往來情文周密自締好以來講信修睦無若此時之歡者使亶不被禍凡我有求無不見聽雖列聖諸陵白溝故地皆可以次第而得之惜乎不十年間肺腑之禍起而亶戕矣至今北人類能言之是則和好之通豈非勢使然乎亮之立也大惡昭著內懷危疑握兵重臣多不受詔朝夕惴惴焉惟恐討伐之師四面而至也我方遣朝賀之使以安之於是遂偃然南面號令諸國而侈心肆矣狂愎自用以殺為嬉勳戚諸王翦滅殆盡彼之汰虐日甚我之順事日嚴休兵嵗深生齒蕃息敵知事力之全可以肆強橫也亮與馬欽等謀則曰吾國天下大讎也使吾子孫一不振宋必報焉則吾國覆矣不若以力取之此和議之所以變也和議將變則罷𣙜場詰私渡邉釁橫生敵謀遽發遂欲割我兩淮要我近輔而又拒我行人一不如意掃境南下王室震蕩危若贅斿自交兵以來生民被害無若此時之慘者使亮不見殺則投箠濟江蓋無難焉顧其積惡天地之所不容神人之所共憤變生肘腋腹敗枝披卒徒奔逃惟恐王師之躡其後也是則和議之變亦豈非勢使然乎太上皇帝仁天智神臨御三十六年躬履多難洞照事幾其於禦敵之道固嘗深思熟計歷試而兼行之矣陛下以大有為之資光奉慈訓嗣守天位治民事神恭儉遜慤德無不周明無不燭惟疆場未靖上貽宵旰之憂抑嘗有以天下之心天下之勢告陛下者乎自踐阼以來建議之臣有為陛下言戰者矣必曰金鼓一動雷厲風飛則兵不血刃可以收疆土復陵廟活萬姓然王師所至城邑一空破蔡州則殺蔡州之民入海州則殺海州之民奪宿州則殺宿州之民京西陕右往往皆然非所謂拯民於水火之中也繼之以士無鬪志棄甲來歸中原寸地了不可得烏在其為戰有為陛下言和者矣以厚禮將幣以卑屬寓書休兵息民庶乎兩得然使命數遣有延至於國中而不得伸其志者矣有見止於境上而不得通其辭者矣以此欲和不啻如方枘圜鑿之不相入也烏能必其和有為陛下言守者矣以增陴浚隍遏其衝以積粟聚兵固其夲來則勿與角去則勿與通然長淮東西延袤千里兵少則戍不周民貧則用不給比者築城壁修堰埧皆取辦於兩淮之人凋郡遺黎不堪其擾而守未必能固也設欲固守非經營數年不能就緒大敵忽至其何以支守雖長䇿亦未易以一朝集也故欲戰者以和為姦謀為辱國之舉欲和者以戰為危道為殘民之徒而欲守者又以戰為邀功和為怯敵謂和戰皆非萬全之策三説紛然互相矛盾得此則失彼舉一則廢二國論未定主聽未専斯民盻盻然不能自保嗚呼胡不觀天下之心審天下之勢參三説而用之乎昔亶之請盟也太上皇決策講好遣使以先之而邉鄙遂定知其勢可與通也非用兵之時也及亮之敗盟也太上皇出不得已發兵以應之而敵亮自斃知其勢不可與通也非遣使之時也以此論之和戰守三策善用之皆足以收功不善用之皆足以敗事使勢可戰也雖樊噲以十萬橫行李靖以三千蹀血吾亦為之無不勝者勢可和也如魏絳之五利可致賈誼之三表可施吾必為之無不諧者勢可守也如宣帝之罷兵留田光武之閉關謝質吾必為之無不濟者又胡可外天下之心忽天下之勢區區焉操一説而自以為得乎臣頃嵗出疆至河朔見所過州縣全盛如故入則人物繁夥閈廛充溢出則耕桑彌望牛馬被野然後知二十年息兵之效不為無益於斯民一旦敵人叛盟赤子又復塗炭前冬敵退淮甸白骨如山迹其殺人之禍皆起於金人一念慮之間而流毒至於如此豈不甚可戒哉今敵勢虧矣敵計窮矣兩軍相角而所喪均兩國相持而其患等欲戰者少不欲戰者多蓋兩軍之心也欲和者衆不欲和者寡蓋兩國之勢也臣聞之北人則曰敵中簽發人丁其下莫肯聽命又聞之士大夫則又曰近敵帥移書于督府致問于廟堂甚有通和之意陛下視人心之所向度國勢之所宜不知所以應之何如哉臣願陛下因天下之心乘天下之勢特遣信使諭以至理告以誠心與之委曲評議使知和好之不可以虛辭合又知和好之不可以舊例拘則吾事濟矣或曰比嵗兩遣使矣其如不諧何其如不見納何臣應之曰使之不諧非使者之過也使之不見納非使者之願也顧當時所以遣使者失其序耳何謂遣使失其序曰遣使一也而所以遣使則不一也有和議未定而遣者有和議已成而遣者和議未定則以未定之辭與之通慶賀有所未修也報諭有所未及也如紹興之初遣韓肖胄孫近之類是也和議已成則以已成之禮與之接名分有定論也書辭有定式也如講和之後遣何鑄之類是也自金人渝盟和好絶矣和好既絶今始通焉故遣使以議之則是和議未定之時也我方有所議而損益之未可必又安可遽為賀慶報諭而遣乎其曰賀登寶位則是和議已成矣往年以賀為使者有舊例焉彼復以舊例取必於我又焉得而見納哉今臣之所謂遣使則不然當以審議為名以韓肖胄孫近為例審也者欲審而後交議也者欲議而後定和其夲於誠心乎在所審也其出於詭謀乎在所審也名數有未安者乎在所議也疆界有未正者乎在所議也禮幣之厚薄有未齊者乎在所議也為此遣使彼安得不納舉此詳議彼安得不諧和議成矣然後有所賀則賀之有所報則報之此之謂遣使得其序或曰遣使得其序遂可去兵乎撤備乎臣應之曰遣使所以議和也和雖可必亦當待之以不可必使者出境朝廷申命諸將各整其師淬礪鋒刃振飾旗鎧蓄鋭待敵常若兩陳相當者則是使者之行自不妨治戰具也大軍列屯分據要地修障隧正營部逺斥候力控江淮之險則是使者之行自不妨繕守備也夫戰和守固相須而並用者也善為國者可戰則戰不為戰而廢和也可和則和不因和而忘戰可守則守不膠於守而絶和戰之利合而論之則一析而言之則三胡可忽哉昔唐之平賀魯也駱宏義獻計曰安中國以信馭邊人以權理有變通也噫斯言豈為一時設哉惟陛下博覽兼聽詳究利害觀人心審國勢與時變通權以濟事允執厥中而行之天下幸甚張浚回奏楚泗等處守禦事宜劄子曰臣二十七日宿平原鎮至晚統制官左祐齎到御筆處分一通臣謹已祗領契勘楚泗守禦利害臣纍具奏聞去訖泗州係緊要控扼去處陳敏一軍在彼幾年已成家計見自陳敏下至士卒盡般家屬節次來居蓋以此城必可倚恃兼臣近閲此軍人材強勇事藝精熟施放便捷行陳齊一少見其比向之兵將竊笑指議者今皆心服臣愚以為敏可責以守泗無疑若城池之險糧粟之便在我得計為多更乞聖慈詳酌劉寶身任淮東之責建議欲築甘羅城先立家計其城直臨淮岸在兩清河之間居海泗兩州中寶親握大兵應援却令副都統吳超以舟師守清河蓋此處以舟為便若河口有備則楚州正在腹內而捍禦之計盡仰甘羅城其楚州即合作第二重家計寨惟是陳敏一軍通一萬二千餘人至九月中理須益兵所有淮西戰備之要容臣至和州條列以奏淮東真州一帶以六合為重於茲固守其敢輕入兼廬之巢縣及和州列屯大兵正乘其後絶糧邀擊計皆可施淮西之兵山立不動敵人豈敢輕捨此兵直犯淮東六合當其前淮西襲其尾進退實難況值奔敗定致狼狽敵用兵日久必不出此臣竊惟兵者國之大事聖人生物之德本於兵臣行年將七十雖在遷謫朝思夜度不敢輒廢凡幾微曲折調發先後常恐誤失而近世文武之士徒事空言竊聽道塗靡有實用是非顛倒莫可究詳自非陛下神武天付得之于心臣之區區何所布露三司兵積弊尚有可議者統制以下多未得人今此歸休陛下一大料理之將來髙秋親總此數萬之旅嚴賞罰示恩信觀敵兵勢重去處遣王琪輩疾趨取利似為得宜孝宗時蔡戡乞修江陵府城上奏曰臣竊謂南北既分荆州最為重鎮自古必爭之地北得之則據吳楚上流以制南土南得之則據襄漢要地以圖北方故曹操平荆州於是乎有睥睨長江之心乃多修船舫遣書孫權曰今治水軍八十萬衆方與將軍會獵於吳及周瑜鎮江陵於是乎有長驅中原之志乃説權取蜀得蜀固守其地北與馬超結援瑜與將軍還據襄陽以蹙曹操北方可圖也權嘗以荆州資劉備而周瑜力爭操聞大懼為之墜筆備果藉以取蜀遂成鼎峙之勢其地自古不輕而重眀矣粵自鑾輿南渡以來號為襟喉之地陛下聖謨神略經理淮漢規圖中原餘二十年朝廷之上帷幄之中朝講夕論左計右數慮之熟矣向者城襄陽而戍之所以為江陵之蔽譬之人焉襄陽手足也江陵襟喉也京師腹心也手足所以為一身之衛若執其手足則襟喉何恃扼其襟喉則腹心危矣今襄陽有城可守有糧可資有器甲可用然戍兵不過萬人況自隨郢間道可以直趨江陵敵以一軍牽制襄陽而輕兵取江陵襄陽之戍既不能分兵而為之援又不得乘間而搗其虛僅足嬰城自保而已江陵城壁頽圮戍兵寡弱將何以禦之是不戰而自屈不攻而自破也江陵失利吳蜀斷而為二長江與我共之順流而下如髙堂之建瓴水豈不殆哉蓋自辛巳北敵敗盟海陵狂悖視長江猶襟帶之水直欲長驅而來但遣偏師劉蕚以十萬衆耀兵江漢以疑我師初無意於荆襄荆襄逺於兩淮輦運難於轉漕故敵人去難而即易舍逺而就近今既不利於兩淮矣豈無謀臣策士為之畫計而改圖此不可不憂者也故善守者恃我有以待之無恃其不來恃我有所不可攻無恃其不攻為今日之計莫若修江陵之城增襄陽之戍扼隨郢之險增戍扼險不過移東實西裒多益寡在陛下一頥指之頃耳唯江陵之城非一朝夕所能辦要當早圖之蓋略修則無益守禦大修則不免勞費天下之事當計其利害之輕重無問其工役之多寡茍有利於國有補於民雖傾國帑竭民力可也如其不然雖役十夫費百金亦有所不可今也城要害之地為悠久之圖小費而大利暫勞而永逸亦何憚而不為乎臣嘗計之竹木取於山磚灰取於陶工役取於軍費可省半不過糜三十萬緡耳萬二千人更休日役六千人用工不過百萬半年可成臣區區之愚欲望聖慈斷自宸衷給降行在會子三十萬道擇將帥之材者委之工役材料則責之戎司錢穀出入則付之總司事干州縣者則屬之帥司使之互察而協濟自今以始預辦竹木磚灰應用之物一一備足來嵗十月鳩工次年三月可以訖事凡樓櫓雉堞高下濶狹與夫防守之具悉如襄陽之制庶幾可以堅久荆襄二城巋然相望足以壯上遊形勝之地絶敵人窺伺之心不特陛下髙枕而無西顧之憂抑亦國家萬世之利也若夫玩嵗愒日循常守故憚勞惜費因陋就簡以茍目前之安事至而圖之何嗟及矣臣冒貢狂言罪當萬死惟陛下留神省察不以人廢言天下幸甚臣無任惓惓憂國之至戡又乞備邉奏曰臣恭惟陛下即位以來宵衣旰食思中興之治于兹一紀建議之臣莫不以恢復為己任玩嵗愒日未聞成功陛下固已厭之故外堅和好以休士卒內修政事以待機會可謂得上䇿矣臣聞之書曰惟事事乃其有備有備無患傳曰不備不虞不可以師是故於無事之時必先為有事之備事至而備正猶已雨而徹桑土大寒而索衣裘不亦晚乎向者秦檜當國十餘年間幣聘交馳邉烽不警南北之民得以休息乃制禮作樂粉飾太平示天下不復用兵及其金人敗盟長驅而來如入無人之境踐蹂淮甸睥睨長江人心驚惶國勢迫蹙幸而上天垂祐敵亮授首凶徒亦潰棄甲而歸自非九廟威靈兩宫神聖德動天地恩結人心則安危之機未可知也然而天幸不可以為常和好不可以為安貪婪變詐之敵不可以為誠不思所以先備而預防之萬一敵人出吾不意掩吾不備然後徐為之圖將有後時之悔臣所領州密邇敵境憂邉思職是亦臣所當言也臣愚以為防秋在即欲望陛下戒諭大臣申飭邉郡凡常嵗所以為備者悉舉而行又當講求其所以未至者隂為之防或有緩急則吾有所恃而不恐矣如是則以守則固以和則久惟陛下留神幸甚戡又論守邉奏曰臣恭惟藝祖皇帝以聖謨神略掃除僭亂平定四方北敵西畨不敢犯塞雖非後世所能管窺蠡測然而制置邉事最為得宜駕馭諸將最為得體載在方册斑斑可考其大要則遴選名將猛士以守二邉假以事權優以帑廪久其任責其效當是時郭進控西山何繼筠領棣州前後二十年李漢超守關南十七年董遵誨屯通逺十四年賀守忠在易州李謙溥在隰州姚內斌在慶州王彥升在原州皆十餘年不易其任一郡管𣙜之利悉以與之又縱其回圖貿易以佐軍費許其召募驕勇以為爪牙凡軍中事得從便宜只帶沿邉巡檢之名不立行營部置之號有邉功者厚加錫賚位或不過觀察使位不髙則朝廷易制久不易則邉事盡知帑有餘財得以養死力使為間諜二邉動息必能先知預為之備設伏掩擊所向皆捷二十年中邉塞肅清兵力強盛武功蓋世近古未有伏自國家罷兵講和以來緣邉守臣非書生文法吏則右選子弟不二年而一易之國家間暇之時使之撫摩凋瘵安集流亡或其所長責以禦侮折衝安邉固圉則不勝任矣往往來者僥幸無事以茍嵗月敵至則倉皇奔竄以逃一旦之命間有忠義之士不過一死而已於國家何補哉臣愚欲望陛下仰遵藝祖皇帝故事行下總領都統制同薦曉文墨識義理可以親民統制統領分守夲地界極邉州郡賜對便殿察其能否然後除授諭以久任無為茍且一時之計使量帶夲軍人馬隨行仍許招募勇敢以益軍伍經理財賦以備犒勞又擇通判為之佐少寬文禁厚給廪祿無事之時責之儲芻粟繕甲兵修城壁明斥候以為有事之備出則擊寇入則自保緩急之際不待調發而兵四集可以互相應援以戰以守必能成功惟陛下財幸戡又論唐鄧間道奏曰臣恭惟陛下一視同仁兼愛南北外修和好以待可乘之機內固吾圉以為不虞之備故禦守之䇿尤關聖慮且如分江陵之戍葺襄陽之城凡所以備敵者纎悉具備仰見聖謨雄略折衝萬里之外然臣猶有愚見敢為陛下言之夫朝廷之所以城守襄陽者豈特為襄陽計蓋欲以捍荆鄂而保吳蜀也今襄陽環以堅城戍以重兵樊城以為阻漢水以為限自可奠枕其如唐至郢自鄧至荆皆有間道相去不五六百里騎兵馳疾三日可到緩急之際不唯襄陽戍兵應援不及亦恐牽制欲進不能郢有城不固荆無城可守豈不殆哉臣愚欲乞東修蔡陽古城西修光化舊城各戍兵千人以扼唐鄧要路或只於棗陽榖城戍兵千人亦足以守禦仍乞分委荆鄂都統司徐議修築荆郢城壁以漸為之期以數年之後一如襄陽之制既有城可恃有兵可守庶免敵人窺伺之患陛下可以寬西顧之憂矣伏望聖慈特賜詳酌密切行下京西安撫荆鄂都統司公共相度利害保明聞奏歷代名臣奏議卷三百三十五
