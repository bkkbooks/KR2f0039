body:
  text: 歷代名臣奏議卷十五明楊士竒等撰郊廟南齊武帝永眀元年當南郊而立春在郊後世祖欲遷郊尚書令王儉啓案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易說三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭𤣥云建寅之月晝夜分而日長矣王肅曰周以冬祭天於圜丘以正月又祭天以祈穀祭法稱燔柴太壇則圜丘也春秋傳云啓蟄而郊則祈榖也謹尋禮傳二文各有其義盧王兩說若有合符中朝省二丘以并二郊即今之郊禮義在報天事兼祈榖既不全以祈農何必俟夫啓蟄史官唯見傳義未逹禮㫖又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世眀例不以先郊後春為嫌若㦯以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齊行之不疑今齊內合朔此即前准若聖心過恭寧在嚴潔合朔之日散官備防非預齊之限者於止車門外别立幔省若日色有異則列於省前望實為允謂無煩遷日從之二年祠部郎中蔡履議郊與眀堂本宜異日漢東京禮儀志南郊禮畢次北郊眀堂髙廟世祖廟謂之五供蔡雍所據亦然近世存省故郊堂共日來年郊祭宜有定准太學博士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議漢元鼎五年以辛巳行事自後郊日略無違異元封元年四月癸卯登封泰山坐明堂五年甲子以髙祖配漢家郊祀非盡天子之縣故祠祭之月事有不同後漢永平以來明堂兆於國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有說則從經禮無文難以意造是以必算良辰而不祭寅丑且禮之奠祭無同共者唯漢以朝日合於報天爾若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於眀堂以文王配故宋氏創立眀堂郊還即祭是用鄭志之說也蓋為志者失非𤣥意也𤣥之言曰未審周明堂以何月於月令則以季秋案元注月令季秋大饗帝云大饗遍祭五帝又云大饗於明堂以文武配其時秋也去啓蟄逺矣又周禮大司樂凡大祭祀宿縣尋宿縣之㫖以日出行事故也若日暗而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云天郊夕牲之夜夜漏未盡八刻進熟眀堂夕牲之夜夜漏未盡七刻進熟尋明堂之在郊前一刻而進獻奏樂方待郊還魏髙堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審于時㝎制是則周禮二漢及魏皆不共日矣禮以辛郊書以丁巳辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於眀堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂司徒西閣祭酒梁王議孝經鄭元注云上帝亦天别名如鄭㫖帝與天亦言不殊近代同辰良亦有據魏泰和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則巳行之前准驍騎將軍江淹議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日不共者義在必異也元始五年正月六日辛未郊髙皇帝以配天二十二日丁亥宗祀孝文於明堂以配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年巡狩岱宗柴祭翌日祀五帝於明堂柴山祠地尚不共日郊堂直異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲逺五祀紹統五供與忠此奏皆為相符髙堂隆表二郊及明堂宗廟各一日摯虞新禮議明堂南郊間三兆禋天饗帝共日之證也又上帝非天昔人言之巳詳今眀堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二今祠明堂不應大駕尚書令王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂唯據自郊徂宫之議未逹祠天旅帝之㫖何者郊壇旅天甫自詰朝還祀眀堂便在日昃雖致祭有由而煩黷斯甚異日之議於理為𢎞春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉泰寧有詔未及遵遂咸和八年甫得營繕太常顧和秉議親奉康皇之世巳經遵用宋氏因循未遑釐革今宜親祠北郊眀年正月上辛祠昊天次辛瘞后土後辛祠明堂御並親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕衮冕之服諸祠咸用詔可永眀十年詔故太宰禇淵故太尉王儉故司空栁世隆故驃騎大將軍王敬則故鎮東大將軍陳顯逹故鎮東將軍李安民六人配饗太祖廟庭祠部郎何諲之議功臣配饗纍行宋世檢其遺事題列坐位具書贈官爵諡及名文不稱主便是設板也白虎通云祭之有主孝子以繫心也揆斯而言升配廟庭不容有主宋時板度既不復存今之所制大小厚薄如尚書召板為得其衷有司攝太廟舊人亦云見宋功臣配饗坐板與尚書召板相似事見儀注鬱林王隆昌元年有司奏參議明堂咸以世祖配國子助教謝曇濟議案祭法禘郊祖宗並列嚴祀鄭𤣥注義亦據兼饗宜祖宗兩配文武雙祀助教徐景嵩光祿大夫王逡之謂宜以世祖文皇帝配祠部郎何佟之議周之文武尚推后稷以配天謂文皇宜推世祖以配帝雖事施於尊祖亦義章於嚴父焉左僕射王晏議以為若用鄭𤣥祖宗通稱則生有功德沒垂尊稱歷代配帝何止於郊今殷薦上帝允屬世祖百代不毁其文廟乎詔可眀皇帝建武二年通直散騎常侍庾曇隆啓伏見南郊壇員兆外內永眀中起瓦屋形製宏壯檢案經史無所准據尋周禮祭天於圜丘取其因髙之義兆於南郊就陽位也故以髙敞貴在上昭天眀旁流氣物自秦漢以來雖郊祀參差而壇域中間竝無更立宫室其意何也政是質誠尊天不自崇樹兼事通曠必務開逺宋元嘉南郊至時權作小陳帳以為退息太始薄加修廣永眀初彌漸髙麗往年工匠遂啓立瓦屋前代帝皇豈於上天之祀而昧營搆所不為者深有情意記稱掃地而祭於其質也器用陶匏天地之性也故至敬無文以素為貴竊謂郊事宜擬休偃不俟髙大以眀謙恭肅敬之㫖庶或仰允太靈俯愜羣望詔付外詳祠部郎何佟之奏曰案周禮大宗伯以蒼璧禮天黃琮禮地鄭𤣥又云皆有牲幣各放其器之色如禮天圎丘用𤣥犢禮地方澤用黃牲矣牧人云凡陽祀用騂牲隂祀用黝牲鄭𤣥云騂赤黝黑也陽祀祭天南郊及宗廟隂祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢鄭云地隂祀用黝牲與天俱用犢故連言之耳知此祭天地即南北郊矣今南北兩郊同用𤣥牲又眀堂宗廟社稷俱用赤有違昔典又鄭𤣥云祭五帝於眀堂勾芒等配食自晉以來并圜丘於南郊是以郊壇列五帝勾芒等今明堂祀五精更闕五神之位北郊祭地祇而設重黎之坐二三乖舛懼虧盛則前軍長史劉繪議語云犂牛之子騂且角雖欲勿用山川其舍諸未詳山川合為隂祀不若在隂祀則與黝乖矣佟之又議周禮以天地為大祀四望為次祀山川為小祀周人尚赤自四望以上牲色各依其方者以其祀大宜從本也山川以下牲色不見者以其祀小從所尚也則論禮二說豈不合符參議為允從之有司奏景懿后遷登新廟車服之儀祠部郎何佟之議曰周禮王之六服大裘為上衮冕次之五車玉輅為上金輅次之皇后六服褘衣為上褕翟次之首飾有三副為上編次之五車重翟為上厭翟次之上公無大裘玉輅而上公夫人有副及褘衣是以祭統云夫人副褘立于東房也又鄭云皇后六服唯上公夫人亦有褘衣詩云翟茀以朝鄭以翟茀為厭翟侯伯夫人入廟所乘今上公夫人副褘既同則重翟或不殊矣況景皇懿后禮崇九命且晉朝太妃服章之禮同於太后宋代皇太妃唯無五牛旗為異其外侍官則有侍中散騎常侍黃門侍郎散騎侍郎各二人分從前後部同於王者內職則有女尚書女長御各二人棨引同於太后又魏朝之晉王晉之宋王並置百官擬於天朝至於晉文王終猶稱薨而太上皇稱崩則是禮加於王矣故前議景皇后悉依近代皇太妃之儀則侍衛陪乘並不得異后乘重翟亦謂非疑也尋齊初移廟宣皇神主乘金輅皇帝親奉亦乘金輅先往行禮畢仍從神主至新廟今所宜依准也從之永泰元年東昏侯嗣位有司議應廟見不尚書令徐孝嗣議嗣君即位並無廟見之文蕃支纂業乃有䖍謁之禮左丞蕭琛議竊聞祇見厥祖義著商書朝于武宫事光晉冊豈有正位居尊繼業承天而不䖍覲祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭於祖考告嗣位也又篇曰閔豫小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之喪將始即政朝於廟也則隆周令典煥炳經記體嫡居正莫若成王又二漢由太子而嗣位者西京七主東都四帝其昭成哀和冲五君並皆謁廟文存漢史其惠景武元眀章六君前史不載謁事或是偶有闕文理無異說議者乃云先在儲宫巳經致敬卒哭之後即親奉時祭則是廟見故無别謁之禮竊以為不然儲后在宫亦從郊祀若謂前虔可兼後敬開元之始則無暇復有配天之祭矣若以親奉時祭仍為廟見者自漢及晉支庶嗣位並皆謁廟既同有蒸嘗何為獨修繁禮且晉成帝咸和元年故號以謁廟咸康元年加元服又更謁夫時非異主猶不疑二禮相因況位隔君臣而追以一謁兼敬宜逺纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國奏可東昏侯永元二年何佟之建議曰案祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯周人禘嚳而郊稷祖文王而宗武王鄭𤣥云禘郊祖宗謂祭祀以配食也禘謂祀昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於眀堂曰祖宗郊祭一帝而眀堂祭五帝小德配寡大德配衆王肅云祖宗是廟不毁之名果如肅言殷有三祖三宗並應不毁何故止稱湯契且王者之後存焉舜寧立堯頊之廟傳世祀之乎漢文以髙祖配泰畤至武帝立眀堂復以髙祖配食一人兩配有乖聖典自漢明以來未能反昔故眀堂無兼配之祀竊謂先皇宜列二帝於文祖尊新廟為髙宗並世祖而泛配以申聖主嚴父之義先皇於武皇倫則弟為季義則經為臣設配饗之坐應在世祖之下並列俱西向國子博士王摛議孝經周公郊祀后稷以配天宗祀文王於眀堂以配上帝不云武王又周頌思文后稷配天也我將祀文王於眀堂脫武王之文唯執競云祀武王此自周廟祭武王詩彌知眀堂無矣何佟之又議孝經是周公居攝時禮祭法是成王反位後所行故孝經以文王為父祭法以文王為祖又孝莫大於嚴父配天則周公其人也尋此㫖寧施成王乎若孝經所說審是成王所行則為嚴祖何得云嚴父邪且思文是周公祀后稷配天之樂歌我將是祀文王配眀堂之樂歌若如摛議則此二篇皆應在復子眀辟之後請問周公祀后稷文王為何所歌又國語云周人禘嚳郊稷祖文王宗武王韋昭云周公時以文王為宗其後更以文王為祖武王為宗尋文王以文治而為祖武王以武定而為宗欲眀文亦有大德武亦有大功故鄭注祭法云祖宗通言耳是以詩云昊天有成命二后受之注云二后文王武王也且眀堂之祀有單有合故鄭云四時迎氣於郊祭一帝還於眀堂因祭一帝則以文王配眀一賔不容兩主也享五帝於眀堂則泛配文武泛之為言無的之辭其禮既盛故祖宗並配參議以佟之為允詔可國子助教徐景嵩議伏尋三禮天地兩祀南北二郊但明祭取犧牲器用陶匏不載人君偃處之儀今棟瓦之構雖殊俱非千載成例宜務因循太學博士賀瑒議周禮王旅上帝張氈案設皇邸國有故而祭亦曰旅氈案以氈為牀於幄中不聞郊所置宫宇兼左丞王摛議掃地而祭於郊謂無築室之議並同曇隆驍騎將軍虞炎議以為誠慤所施止在一壇漢之郊祀饗帝甘泉天子自竹宫望拜息殿去壇場既逺郊奉禮畢旋幸於此瓦殿之與帷宫謂無簡格祠部郎李撝議周禮凡祭祀張其旅幕張尸次尸則有幄仲師云尸次祭祀之尸所居更衣帳也凡祭之文既不止於郊祀立尸之言理應關於宗廟古則張幕今也房省宗廟旅幕可變為棟宇郊祀氈案何為不轉製檐甍曇隆議不行梁武帝天監元年北中郎司馬何佟之上言曰案周禮王出入則奏王夏尸出入則奏肆夏牲出入則奏昭夏今樂府之夏唯變王夏為皇夏蓋緣秦漢以來稱皇故也而齊氏仍宋儀注迎神奏昭夏皇帝出入奏永至牲出入更奏引牲之樂其為舛謬莫斯之甚請下禮局改正周捨議以為禮王入奏王夏大祭祀與朝㑹其用樂一也而漢制皇帝在廟奏永至樂朝㑹之日别有皇夏二樂有異於禮為乖宜除永至還用皇夏又禮尸出入奏肆夏賔入大門奏肆夏則所設唯在人神其與迎牲之樂不可濫也宋季失禮頓虧舊則神入廟門遂奏昭夏乃以牲牢之樂用接祖考之靈斯皆前代之深疵當今所宜改也時議又以為周禮云若樂六變天神皆降神居上𤣥去還恍忽降則自至迎則無所可改迎為降而送依前式又周禮云若樂八變則地祇皆出可得而禮地宜依舊召逆神並從之又以眀堂設樂大略與南郊不殊壇堂異名而無就燎之位眀堂則遍歌五帝其餘同於郊式焉初宋齊代祀天地祭宗廟准漢祠太一后土盡用宫懸又太常任昉亦據王肅議云周官以六律五聲八音六舞大合樂以致鬼神以和邦國以諧兆庶以安賔客以悅逺人是謂六同一時皆作今六代舞獨分用之不懕人心遂依肅議祀祭郊廟備六代樂後魏孝文帝時詔百寮集議眀堂制度國子博士封軌議曰眀堂者布政之宫在國之陽所以嚴父配天聼朔設教其經構之式蓋巳尚矣故周官匠人職云夏后氏世室殷人重屋周人眀堂五室九階四戶八窗鄭𤣥曰或舉宗廟或舉王寢或舉眀堂互之以見同制然則三代眀堂其制一也案周與夏殷損益不同至於眀堂因而弗革眀五室之義得天數矣是以鄭𤣥又曰五室者象五行也然則九階者法九土四戶者逹四時八窗者通八風誠不易之大範有國之恆式若其上圎下方以則天地通水環宫以節觀者茅蓋白盛為之質飾赤綴白綴為之戶牖皆典籍之所具載制度之眀義也在秦之世焚滅五典毁黜三代變更先聖不依舊憲故吕氏月令見九室之義大戴之禮著十二堂之論漢承秦法亦未能改東西二京俱為九室是以黃圗白虎通蔡雍應劭等咸稱九室以象九州十二堂以象十二辰夫室以祭天堂以布政依天而祭故室不過五依時布政故堂不踰四州之與辰非所可法九與十二其用安在今聖朝欲尊道訓民備禮化物宜則五室以為永制至如廟學之嫌臺沼之雜袁準之徒巳論正矣遺論具在不復須載宣武帝景眀二年夏六月祕書丞孫惠蔚上言曰臣聞國之大禮莫崇眀祀祀之大者莫過禘祫所以嚴祖敬宗追養繼孝合享聖靈審諦昭穆遷毁有恆制尊卑有定體誠慤著於中百順應於外是以惟王創制為建邦之典仲尼述定為不刋之式暨秦燔詩書鴻籍泯滅漢氏興求拾綴遺篆淹中之經孔安所得唯有卿大夫士饋食之篇而天子諸侯享廟之祭禘祫之禮盡亡曲臺之記戴氏所述然多載尸灌之義牲獻之數而行事之法備物之體蔑有具焉今之取證唯有王制一簡公羊一冊考此二書以求厥㫖自餘經傳雖時有片記至於取正無可依攬是以兩漢淵儒魏晉碩學咸據斯文以為朝典然持論有深淺仗義有精浮故令傳記雖一而探意乖舛伏惟孝文皇帝合德乾元應靈誕載𤣥思洞微神心暢古禮括商周樂宣韶濩六籍幽而重昭五典淪而復顯舉二經於和中一姬公於洛邑陛下睿哲淵凝欽眀道極應必世之期屬功成之㑹繼文垂則實惟下武而祫禘二殷國之大事蒸嘗合享朝之盛禮此先皇之所留心聖懷以之永慕臣聞周宗初開致禮清廟敢竭愚管輒陳所懷謹案王制曰天子犆礿祫禘祫嘗祫蒸鄭𤣥曰天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常魯禮三年喪畢而格於太祖眀年春禘於羣廟自爾之後五年而再殷祭一祫一禘春秋公羊魯文公二年八月丁卯大事於太廟傳曰大事者何大祫也大祫者何祫祭也毁廟之主陳於太祖未毁廟之主皆升合食于太祖五年而再殷祭何休曰陳者就陳列太祖前太祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆又曰殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也禘猶諦也審諦無所遺失察記傳之文何鄭祫禘之義略可得聞然則三年喪畢祫祭太祖眀年春祀遍禘羣廟此禮之正也古之道也又案魏氏故事魏眀帝以景初三年二月崩至五年正月積二十五晦為大祥太常孔美博士趙怡等以為禫在二十七月到其年四月依禮應祫散騎常侍王肅博士樂詳等以為禫在祥月至其年二月宜應祫祭雖孔王異議六八殊制至於喪畢之祫眀年之禘其議一焉陛下永惟孝思因心即禮取鄭捨王禫終此晦來月中旬禮應大祫六室神祏合食太祖眀年春享咸禘羣廟自兹以後五年為常又古之祭法時祫並行天子先祫後時諸侯先時後祫此於古為當在今則煩且禮有升降事有文節通時之制聖人弗違當祫之月宜減時祭以從要省然大禮久廢羣議㦯殊以臣觀之理在無怪何者心制既終二殷惟始祫禘之正實在於斯若停而闕之唯行時祭七聖不聞合享百辟不覩盛事何以宣昭令問垂式後昆乎皇朝同等三代治邁終古而令徽典赧於昔人鴻美慙於往志此禮所不行請所未許臣學不鈎深思無經逺徒閲章句蔑爾無立但飲澤聖時銘恩天造是以妄盡區區冀有塵露所陳䝉允請付禮官集㝎儀注正始間修眀堂辟雍豫州中正袁翻議曰謹案眀堂之義今古諸儒論之備矣異端競搆莫適所歸故不復逺引經傳近採紀籍以為之證且論意之所同以酬詔之問耳蓋唐虞巳上事難該悉夏殷巳降校可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽案周官考工所記皆記其時事具論夏殷名制豈其紕繆是知眀堂五室三代同焉配帝象行義則眀矣及淮南吕氏與月令同文雖布政班時有堂個之别然推其體例則無九室之證既而世衰禮壞法度淆弛正義殘隱妄說斐然眀堂九室著自戴禮探緒求源罔知所出而漢氏因之自欲為一代之法故鄭𤣥云周人眀堂五室是帝一室也合於五行之數周禮依數以為之室而施行於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室略可知矣但就其此制猶切有懵焉何者張衡東京賦云乃營三宫布教班常復廟重屋八逹九房此乃眀堂之文也而薛綜注云房室也謂堂後有九室堂後九室之制非巨異乎斐頠又云漢氏作四維之個不能令各處其辰就使其象可圗莫能通其居用之禮此為設虛器也甚知漢世徒欲削滅周典捐棄舊章改物創制故不復拘於載籍且鄭𤣥之古訓三禮及釋五經異義並盡思窮神故得之逺矣覽其眀堂圗義皆有悟人意察察著眀確乎難奪諒足以扶微闡幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易𤣥之妙矣魏晉書紀亦有眀堂祀五帝之文而不記其經始之制又無坦然可準觀夫今之基址猶或髣佛髙卑廣狹頗與戴禮不同何得以意抑必便謂九室可眀且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難眀故有一屋之論並非經典正義皆以意妄作茲為曲學家常談不足以範時軌世皇代既乘乾統歷得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏放篇之浮說徒損經紀雅誥之遺訓而欲以支離橫議指畫妄圖儀形宇宙而貽來葉者也又北京制置未皆允帖繕修草創以意良多事移禮變所存者無幾理茍宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易何為宫室府庫多因故迹而眀堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輒輕率瞽言眀堂五室請同周制郊建三雍求依故所庶有㑹經誥無失典刑識偏學踈退慙謬浪宣武帝時太常卿劉芳以所置五郊及日月之位去城里數於禮有違又靈星周公之祀不應隸太常乃上疏曰臣聞國之大事莫先郊祀郊祀之本實在審位是以列聖格言彪炳緯籍先儒正論昭著經史臣學謝全經業乖通古豈可輕薦瞽言妄陳管說竊見所置壇祠逺近之宜考之典制或未允衷既曰職司請陳膚淺孟春令云其數八又云迎春於東郊盧植云東郊八里之郊也賈逵云東郊木帝太昊八里許慎云東郊八里郊也鄭𤣥孟春令注云王居眀堂禮曰王出十五里迎嵗蓋殷禮也周禮近郊五十里鄭𤣥别注云東郊去都城八里髙誘云迎春氣於東方八里郊也王肅云東郊八里因木數也此皆同謂春郊八里之眀據也孟夏令云其數七又云迎夏於南郊盧植云南郊七里郊也賈逵云南郊火帝炎帝七里許慎云南郊七里郊也鄭𤣥云南郊去都城七里髙誘云南郊七里之郊也王肅云南郊七里因火數也此又南郊七里之審據也中央令云其數五盧植云中郊五里之郊也賈逵云中兆黃帝之位并南郊之季故云兆五帝於四郊也鄭𤣥云中郊西南未地去都城五里此又中郊五里之審據也孟秋令云其數九又曰迎秋於西郊盧植云西郊九里郊賈逵云西郊金帝少皥九里許慎云西郊九里郊也鄭𤣥云西郊去都城九里髙誘云西郊九里之郊也王肅云西郊九里因金數也此又西郊九里之審據也孟冬令云其數六又云迎冬於北郊盧植云北郊六里郊也賈逵云北郊水帝顓頊六里許慎云北郊六里郊也鄭𤣥云北郊去都城六里髙誘云北郊六里之郊也王肅云北郊六里因水數也此又北郊六里之審據也宋氏含文嘉注云周禮王畿千里二十分其一以為近郊近郊五十里倍之為逺郊迎王氣蓋於近郊漢不設王畿則以其方數為郊處故東郊八里南郊七里西郊九里北郊六里中郊在西南未地五里祭祀志云建武一年正月初制郊兆於雒陽城南七里依採元始中故事北郊在雒陽城北四里此又漢世南北郊之眀據也今地祗準此至如三十里之郊進乖鄭𤣥所引殷周二代之據退違漢魏所行故事凡邑外曰郊今計四郊各以郭門為限里數依上禮朝拜日月皆於東西門外今日月之位去城東西路各三十竊又未審禮又云祭日於壇祭月於坎今計造如上禮儀志云立髙禖祠于城南不云里數故今仍舊靈星本非禮事兆自漢初専為祈田恆隸郡縣郊祀志云髙祖五年制詔御史其令天下立靈星祠牲用大牢縣邑令長得祠晉祠令云郡縣國祠稷社先農縣又祠靈星此靈星在天下諸縣之眀據也周公廟所以别在洛陽者蓋姬旦創成洛邑故傳世洛陽崇祠不絶以彰厥庸夷齊廟者亦世為洛陽界內神祠今並移太常恐乖其本天下此類甚衆皆當部郡縣修理公私於是禱請竊惟太常所司郊廟神祇自有常限無宜臨時斟酌以意若遂爾妄營則不免淫祀二祠在太常在洛陽於國一也然貴在審本臣以庸蔽謬忝今職考括墳籍博採羣議既無異端謂粗可依據今𤣥冬務隙野罄人閒遷易郊壇二三為便詔曰所上乃有眀據但先朝置立已久且可從舊孝眀帝即位三月甲子尚書令任城王澄太常卿崔亮上言秋七月應祫祭于太祖今世宗宣武皇帝主雖入廟然蒸嘗時祭猶别寢室至於殷祫宜存古典案禮三年喪畢祫於太祖眀年春禘於羣廟又案杜預亦云卒哭而除三年喪畢而禘魏武宣后以太和四年六月崩其月既葬除服即吉四時行事而猶未禘王肅韋誕並以為今除即吉故特時祭至於禘祫宜存古禮髙堂隆亦如肅議於是停不殷祭仰尋太和二十三年四月一日髙祖孝文皇帝崩其年十月祭廟景眀二年秋七月祫於太祖三年春禘於羣廟亦三年乃祫謹準古禮及晉魏之議并景眀故事愚謂來秋七月祫祭應停宜待年終乃復祫禘詔曰太常援引古今並有證據可依請澄亮又奏曰謹案禮記曽子問曰諸侯旅見天子不得成禮者幾孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝㑹孔子應云五而獨言四眀不廢朝賀也鄭𤣥禮注云魯禮三年喪畢祫於太祖眀年春禘羣廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年五月大祥七月釋禫公㑹劉子及諸侯于平丘八月歸不及於祫冬公如晉明十四年春歸祫明十五年春乃禘經曰二月癸酉有事於武宫傳曰禘於武公謹案眀堂位曰魯王禮也喪畢祫禘似有退理詳考古禮未有以祭事廢元㑹者禮云吉事先近日脫不吉容改筮三旬尋攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無疏怠之譏三元有順軌之美既被成㫖宜即宣行臣等伏度國之大事在祀與戎君舉必書恐貽後誚輒訪引古籍竊有未安臣等學缺通經識不稽古備位樞納可否必陳冒陳所見伏聼裁𠂻熙平二年三月癸未太常少卿元端上言謹案禮記祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭元注大禘郊祖宗謂祭祀以配食也有虞氏以上尚德禘郊祖宗配用有德者自夏以下稍用其姓代之是故周人以后稷為始祖文武為二祧訖於周世配祭不毁案禮嚳雖無廟配食禘祭謹詳聖朝以太祖道武皇帝配圓丘道穆皇后劉氏配方澤太宗明元皇帝配上帝眀密皇后杜氏配地祇又以顯祖獻文皇帝配雩祀太宗明元皇帝之廟既毁上帝地祇配祭有式國之大事惟祀與戎廟配事重不敢専决請召羣官集議以聞神龜初靈太后父司徒胡國珍薨贈太上秦公時疑其廟制太學博士王延業議曰案王制云諸侯祭二昭二穆與太祖之廟而五又小記云王者立四廟鄭𤣥云髙祖已下與始祖而五明立廟之正以親為限不過於四其外有大功者然後為祖宗然則無太祖者止於四世有太祖乃得為五禮之正文也文王世子云五廟之孫祖廟未毁雖為庶人冠娶妻必告鄭𤣥云實四廟而言五廟者容髙祖為始封君之子明始封之君在四世之外正謂太祖乃得稱五廟之孫若未有太祖已祀五世則鄭無為釋髙祖為始封君之子也此先儒精義當今顯證也又喪服傳曰若公子之子孫有封為國君者則世世祖是人也不祖公子鄭𤣥云謂後世為君者祖此受封之君不得祀别子也公子若在髙祖已下則如其親服後世遷之乃毁其廟爾明始封猶在親限故祀止髙祖又云如親而遷尤知髙祖之父不立廟矣此又立廟明法與今事相當者也又禮緯云夏四廟至子孫五殷五廟至子孫六注云言至子孫則初時未備也又顯在緯籍區别若斯者也又晉初以宣帝是始封之君應為太祖而以猶在祖位故唯祀征西已下六世待世世相推宣帝出居太祖之位然後七廟乃備此又依準前軌若重規襲矩者也竊謂太祖者功髙業大百世不遷故親廟之外特更崇立茍無其功不可獨居正位而遽見遷毁且三世已前廟及於五𤣥孫已後祀止於四一與一奪名位莫定求之典禮所未前聞今太上秦公疏爵列土大唘河山傳祚無窮永同帶礪實有始封之功方成不遷之廟但親在四世之內名班昭穆之序雖應為太祖而尚在禰位不可逺探髙祖之父以合五者之數太祖之室當須世世相推親盡之後乃出居正位以備五廟之典夫循文責實理貴允當考創宗祊得禮為美不可茍薦虛名取榮多數求之經記竊謂為允又武始侯本無采地於皇朝制令名準大夫案如禮意諸侯奪宗武始四時蒸嘗宜於秦公之廟博士盧觀議案王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三士一自上已下降殺以兩庶人無廟死為鬼焉故曰尊者統逺卑者統近是以諸侯及太祖天子及其祖之所自出祭法諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠去墠為鬼至於禘祫方合食太祖之宫大傳曰别子為祖喪服傳曰公子不得禰先君公孫不得祖諸侯鄭說不得祖禰者不得立其廟而祭之也世世祖是人者謂世世祖受封之君不得祖公子者後世為君者祖此受封之君不得祀别子也公子若在髙祖巳下則如其親服後世遷之乃毁其廟耳愚以為遷者遷於太祖廟毁者從太祖而毁之若不遷太祖不須廢祖是人之文明非始制故復見乃毁之節何以知之案諸侯有祖考之廟祭五世之禮五禮正祖為輕一朝頓立而祖考之廟要待六世之君六世巳前虛而蔑主求之聖㫖未為通論曽子問曰廟無虛主虛主唯四祖考不與焉明太祖之廟必不虛置禮緯曰夏四廟至子孫五殷五廟至子孫七見夏無始祖待禹而五殷人郊契得湯而六周有后稷及文王至武王而七言夏即大禹之身言子謂唘誦之世言孫是迭遷之時禹受命不毁親湯為始君不遷五主文武為二祧亦不去三昭三穆三昭三穆謂通文武若無文武親不過四觀逺祖漢侍中植所說云然鄭𤣥馬昭亦皆同爾且父子逆加二祧得并為七諸侯預立太祖何為不得為五乎今始封君子之立禰廟頗似成王之於二祧孫卿曰有天下者事七世有一國者事五世假使八世天子乃得事七六世諸侯方通祭五推情準理不其謬乎雖王侯用禮文節不同三隅反之自然昭灼且文宣公方為太祖世居子孫今立五廟竊謂為是禮緯又云諸侯五廟親四始封之君或上或下雖未居正室無廢四祀之親小記曰王者禘其祖之所自出以其祖配之而立四廟此實殷湯時制不為難也聊復標榜略引章條愚戅不足以待大問侍中太傅清河王懌議太學博士王延業及盧觀等各率異見案禮記王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五並是後世追論備廟之文皆非當時據立神位之事也良由去聖久逺經禮殘缺諸儒注記典制無因雖稽考異聞引證古誼然用捨從世通塞有時折𠂻取正固難詳矣今相國秦公初構國廟追立神位唯當仰祀二昭二穆上極髙曽四世而巳何者秦公身是始封之君將為不遷之祖若以功業隆重越居正室恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐數滿便毁非禮意也昔司馬懿立功於魏為晉太祖及至子晉公昭乃立五廟亦祀四世止於髙曽太祖之位虛俟宣文待其後裔數滿乃止此亦前代之成事方今所殷鑒也又禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神仍依昭穆之序要待子孫世世相推然後太祖出居正位耳逺稽禮緯諸儒所說近循晉公之廟故事宜依博士王延業議定立四主親止髙曽且虛太祖之位以待子孫而備五廟焉又延業盧觀前經詳議並據許慎鄭𤣥之解謂天子諸侯作主大夫及士則無意謂此議雖出前儒之事實未允情禮何以言之原夫作主之禮本以依神孝子之心非主莫依今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想象若存上自天子下逮於士如此四事並同其禮何至於主准謂王侯禮云重主道也此為理重則立主矣故王肅曰重未立主之禮也士喪禮亦設重則士有主明矣孔悝反祏載之左史饋食設主著於逸禮大夫及士既得有廟題紀祖考何可無主公羊傳君有事于廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往今以為攝神斂主而已不暇待徹祭也何休云宗人攝行主事而往也意謂不然君聞臣喪尚謂之不懌况臣聞君喪豈得安然代主終祭也又相國立廟設主依神主無貴賤紀座而已若位擬諸侯者則有主位為大夫者則無主便是三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位懌又議曰古者七廟廟堂皆别光武以來異室同堂故先朝祀堂令云廟皆四袱五架北廂設坐東昭西穆是以相國構廟唯制一室同祭祖考比來諸王立廟者自任私造不依公令或五或一參差無準要須議行新令然後定其法制相國之廟已造一室實合朝令宜即依此展其享祀詔依懌議孝明帝時議建眀堂多有同異衛尉卿賈思伯上議曰按周禮考工記云夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則夏殷之世已有明堂矣唐虞以前其事未聞戴德禮記云明堂凡九室十二堂蔡雍云明堂者天子太廟饗功養老教學選士皆於其中九室十二堂按戴德撰記世所不行且九室十二堂其於規制恐難得厥𠂻周禮營國左祖右社眀堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配享五帝故耳又王制云周人養國老於東膠鄭注云東膠即辟雍在王宫之東又詩大雅云雍雍在宫肅肅在廟鄭注云宫謂辟雍宫也所以助王養老則尚和助祭則尚敬又不在明堂之驗矣按孟子云齊宣王謂孟子曰吾欲毁明堂若明堂是廟則不應有毁之問且蔡雍論明堂之制云堂方一百四十尺象坤之策屋圓徑二百一十六尺象乾之策方六丈徑九丈象陽隂九六之數九室以象九州屋髙八十一尺象黃鍾九九之數二十八柱以象宿外廣二十四丈以象氣按此皆以天地隂陽氣數為法而室獨象九州何也若立五室以象五行豈不快也如此蔡氏之論非為通典九室之言或未可從竊尋考工記雖是補闕之書相承巳久諸儒注述無言非者方之後作不亦優乎且孝經援神契五經要義舊禮圖皆作五室及徐劉之論同考工者多矣朝廷若獨絶今古自為一代制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可準信鄭𤣥云周人明堂五室是帝各有一室也合於五行之數周禮依數以為之室施行于今雖有不同時說然耳尋鄭此論非為無當按月令亦無九室之文原其制置不乖五室其青陽右個即眀堂左個明堂右個即總章左個總章右個即𤣥堂左個𤣥堂右個即青陽左個如此則室猶是五而布政十二五室之理謂為可安其方圓髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之說裴逸一屋之論及諸家紛紜並無取焉學者善其識侍中領軍將軍江陽王繼表言臣功緦之內太祖道武皇帝之後於臣始是曽孫然道武皇帝傳業無窮四祖三宗功德最重配天郊祀百世不遷而曽𤣥之孫蒸嘗之薦不預拜於廟庭霜露之感闕陪奠於階席今七廟之後非直隔歸胙之靈五服之孫亦不霑出身之叙校之墳史則不然驗之人情則未允何者禮云祖遷於上宗易於下臣曽祖是帝世數未遷便踈同庶族而孫不預祭斯之為屈今古罕有昔堯敦九族周隆本枝故能磐石維城禦侮於外今臣之所親生見隔棄豈所以植幹根本隆建公族者也伏見髙祖孝文皇帝著令銓衡取曾祖之服以為資䕃至今行之相傳不絶而况曽祖為帝而不見録伏碩天鑒有以照臨令皇恩洽穆宗人咸叙請付外博議永為定準靈太后令曰付八座集禮官議定以聞四眀小學博士王僧竒等議案孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝然則太祖不遷者尊王業之初基二祧不毁者旌不朽之洪烈其旁枝逺胄豈得同四廟之親哉故禮記婚義曰古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教于宗室又文王世子曰五廟之孫祖廟未毁雖庶人冠娶必告死必赴不忘親也親未絶而列於庶人賤無能也鄭注云赴告於君也實四廟言五者容顯考為始封君子故也鄭注别其四廟理協二祭而四廟者在當世服屬之內可以與於子孫之位若廟毁服盡豈得同於此例乎敢竭愚昧請以四廟為斷國子博士李琰之議按祭統曰有事於太廟羣昭羣穆咸在鄭氏注昭穆咸在謂同宗父子皆來古禮之制如是其廣而當今儀注唯限親廟四愚竊疑矣何以眀之設使世祖之子男於今存者既身是戚藩號為重子可得賔於門外不預碑鼎之事哉又因宜變法禮有其說記言五廟之孫祖廟未毁為庶人冠娶必告死必赴注曰實四廟而言五者容顯考始封之君子今因太祖之廟在仍通其曽𤣥侍祠與彼古記甚相符㑹且國家議親之律指取天子之𤣥孫乃不旁準於時后至於助祭必謂與世主相倫將難均一夀有短長世有延促終當何時可得齊同謂宜入廟之制率從議親之條祖祧之裔各聽盡其𤣥孫使得駿奔堂壇肅承禘礿則情理差通不宜復各為例令事事舛駮侍中司空公領尚書令任城王澄侍中尚書左僕射元暉奏臣等參量琰之等議雖為始封君子又祭統曰有事於太廟羣昭羣穆咸在而不失其倫鄭注云昭穆謂同宗父子皆來也言未毁及同宗則共四廟之辭云未絶與父子眀崇五屬之稱天子諸侯繼立無殊吉凶之赴同止四廟祖祧雖存親級彌逺告赴拜薦典記無文斯由祖遷於上見仁親之義疏宗易於下著五服之恩斷江陽之於今帝也計親而枝宗三易數世則廟應四遷吉凶尚不告聞拜薦寧容輒預髙祖孝文皇帝聖德𤣥覽師古立政陪拜止於四廟哀恤斷自緦宗即之人情冥然符一推之禮典事在難違此所謂明王相沿今古不革者也太常少卿元端議禮記祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧而祖考以功重不遷二祧以盛德不毁失遷之義其在四廟也祭統云祭有十倫之義六曰見親疏之殺焉夫祭有昭穆昭穆者所以别父子逺近長幼親踈之序而無亂也是故有倫注云昭穆咸在同宗父子皆來指謂當廟父子為羣不繫於昭穆也若一公十子便為羣公子豈待數公而立禰乎文王世子云五廟之孫祖廟未毁雖為有所援引然與朝議不同如依其議匪直太祖曽𤣥諸廟子孫悉應預例既無正據竊謂太廣臣等愚見請同僧竒等議靈太后令曰議親律注云非為當世之屬籍歷謂先帝之五世此乃眀親親之義篤骨肉之恩重尚書以逺及諸孫太廣致疑百僚助祭可得言狹也祖廟未毁曾𤣥不預壇堂之敬便是宗人之昵反外於附庸王族之近更疏於羣辟先朝舊儀草創未定刋制律憲垂之不朽琰之援據甚允情理可依所執孝明帝不親視朝過崇佛法郊廟之事多委有司諫議大夫張普惠上疏曰臣聞明德恤祀成湯充六伯之祚嚴父配天孔子稱周公其人也故能馨香上聞福傳遐世伏惟陛下重暉纂統欽明文思天地屬心百神佇望故能敦崇祀禮咸秩無文而告朔朝廟不親於明堂嘗禘郊祀多委於有司觀射逰苑躍馬騁中危而非典豈清蹕之意殖不思之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿逺邀未然之報昧爽之臣稽首於外𤣥寂之衆遨逰於內愆禮忤時人靈未穆愚謂從朝夕之因求秪劫之果未若先萬國之欣心以事其親使天下和平灾􅊣不生者也伏願淑慎威儀萬邦作式躬致郊廟之䖍親紆朔望之禮釋奠成均竭心千畝眀發不寐潔誠禋祼孝悌可以通神明德教可以光四海則一人有喜兆民賴之然後精進三寶信心如來道由禮深故諸漏可盡法隨禮積故彼岸可登量撤僧寺不急之華還復百官久折之秩已興之構務從簡成將來之造權令停息仍舊亦可何必改作庶節用愛人法俗俱賴臣學不經逺言多孟浪忝職其憂不敢默爾孝莊帝時追崇武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后將遷神主於太廟以髙祖為伯考尚書令拓跋彧表諫曰漢祖創業香街有太上之廟光武中興南頓立舂陵之寢元帝之於光武疏為絶服猶尚身奉子道入繼大宗髙祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣蓋以大義斯奪及金德將興宣王受寄自茲而降世秉威權景王意存毁冕文王心規裂冠雖祭則魏主而權歸晉室昆之與季實傾曺氏且子元宣王冢𦙍文王成其大業故晉武繼文祖宣景王有伯考之稱以今類古恐或非儔又臣子一例義彰舊典禘祫失序著譏前經髙祖德溢寰中道超無外肅祖雖勳格宇宙猶曾奉贄稱臣穆皇后禀德坤元復將配享乾位此乃君臣並筵嫂叔同室歷觀墳籍未有其事歷代名臣奏議卷十五
