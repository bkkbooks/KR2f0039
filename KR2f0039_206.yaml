body:
  text: 歷代名臣奏議卷二百六明楊士竒等撰聽言宋孝宗時兵部侍郎胡銓論從諫疏曰臣聞從諫人主之髙致古之賢王以從諫稱者未易僂指書稱成湯以從諫弗咈為美梅福稱漢髙祖以從諫若轉圜為美魏徴稱唐太宗以恱而從諫為美成湯格天之功由從諫而致也漢髙祖開四百年之基由從諫而致也唐文皇創三百年之業由從諫而致也猗歟偉哉人主之髙致端在於此陛下自登大位虛懷受嬰鱗之言兼聽盡天下之美有不善未嘗不知知之未嘗復行有不知未嘗廢言言之未嘗不聽凡獲賜對者人人皆以為得盡其忠中外翕然咸謂恢復之期指日可冀然臣愚竊以謂靡不有初鮮克有終以漢光武之聖明而大司徒韓歆用直諫死唐文皇晚莭殺劉洎而魏徵有勉强從諫之規故春秋傳曰終之實難而先正司馬光重為世祖惜臣愚伏望陛下置臣章於座右永鑑漢光唐宗之失則社稷之福也祕書少監周必大論聽言責實疏曰臣三日之間再望清光敢陳瞽言致惓惓之誼臣聞政莫衰於隋而功莫隆於唐文皇亂莫極於五代而治莫速於我藝祖一言以蔽之文皇善於聽言藝祖善於責實故也仰惟陛下厲精政事無聲色之娛無畋游之好無便嬖之私好問聽言惟治道是求綜核名實惟祖烈是繼然而中外之臣鮮有助陛下大有為者謇諤之莭無聞而諂諛之習故在激勵之風未著而闒茸之俗彌勝平居尚爾緩急何賴夫文皇所以革隋季之政而身致太平藝祖所以變五代之俗而坐臻上治其施設次第具載史册臣願陛下詔經筵官擇當時聽言責實之要條上其目以今準古勉而行之庶幾風俗一變不負陛下孜孜為政之意則功何患於不隆而治何患不速哉權吏部尚書韓元吉進故事曰唐書王圭𫝊太宗召圭為諫議大夫謂之曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安朕雖不明幸諸公數諫正庶致天下於平圭進曰古者天子有爭臣七人諫不用則相繼以死今陛下開聖德采芻言臣願竭狂瞽佐萬分一帝可圭推誠納善每存規益帝益任之遷侍中帝使太常少卿祖孝孫以樂律授宫中音家伎不進數被譙圭與溫彥博同進曰孝孫修謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下罔上為人遊說耶彥博懼謝罪圭不謝帝默然明日語房𤣥齡曰自古帝王納諫固難矣朕夙夜庶幾于前聖昨責圭等痛自悔公等勿懲是不進諫也臣聞君臣相須猶手足之衛頭目也有是君也而其臣不足以輔之有是臣也而其君不足以使之則失其所以相須者矣故君在審擇其臣而臣在忠事其君未有君臣之志不同其德不合而能成天下之治者也太宗之說可謂知此矣然君之患常在於不能納諫臣之患常在於不能盡言以太宗之明且聖其於兵機將略戡定祻亂足以比迹湯武其於躬行仁義力致太平足以庶幾成康其大者既已安定天下自餘行事固亦無甚過舉也猶汲汲然導圭等使諫如此則朝廷之上一日萬幾之間何慮其闕失哉夫譙責孝孫以教宫中音伎之不進豈亦太常協律之職實人君過舉之細管仲所謂未能害霸者也而圭與彥博過慮而言便有輕士之憂太宗始亦怒之終則悔之又詔𤣥齡輩勿懲是而不諫當時責成大臣納誨以輔台德可謂無隱情矣其至貞觀之治也宜哉臣以是知君臣皆正之明驗也且太宗之說固正矣使其臣不正其肯為太宗盡言乎一事之不諫則天下之事將有不聞者矣故臣下之邪正在於言與不言之間明君不可以不察也元吉又進故事曰唐書李絳𫝊絳見帝浴堂殿帝曰比諫官多朋黨論奏不實皆陷謗訕欲黜其尤者若何絳曰此非陛下意必憸人以此熒誤上心自古納諫昌拒諫亡夫人臣進言於上豈易哉君尊如天臣卑如地加有雷霆之威彼晝度夜思如欲陳十事俄而去五六及將以聞則又憚而削其半故上達者才十二何哉干不測之祻顧身無利耳雖開納奬勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知諫之益臣竊以謂綘之言何其盡哉當憲宗之初豈有失德諫官論奏不實者果何事意其必有過甚之語難行之議以帝之聰明而亦謂之謗訕則非不可黜也綘直以進言之難十事去其五六為帝激切言之將以開天下敢言之路懼或黜之則正直之士畏罪而不敢言耳然帝雖欲黜之而以聞綘是亦意有所未安不果於黜也綘能開導主意致憲宗翻然感悟知諫之為益而不罪其過後世且不知諫者其為誰君臣之間納誨輔德可謂泯然而無跡矣然自古小人之害言者莫甚於謂其植黨而好名蓋植黨則欲去其衆好名則使人君怒其謗已是二者古今之論多矣唯植黨之疑猶為易辨好名之譏最為難知夫天下之所趨者名與利而已人臣之事君以其有爵祿之利也好名之人不顧爵祿之利而欲慕正直之名則何惜不以其名與之蓋利之與名均為御世之物人君於此既設官而謂之諫將以名與之也若不與之名而又欲加之罪則吾之御世者亦狹矣就使狂妄之士濫夫正直之名而忠實之言將亦由是而得也豈足以傷吾之治哉故臣因論綘事而敢以為陛下獻恭惟聖學髙妙知此久矣而絳之言誠有取焉者也元吉又進故事曰國史薛居正傳太祖嘗謂居正曰自古為君者鮮克正已為臣者多無逺略蓋君臣之道不得其所吾觀唐太宗受人諫疏直抵其非而不耻以朕所見不若自不為之使人無異詞也又吕䝉正傳太宗謂䝉正曰古所謂君臣道合者情無間爾故事必無隱而言皆從之今既列於位得以獻可替否雖言未必中度朕亦當共議而更之俾協于道朕固不以居尊自恃使人不敢言也臣聞人君之德莫大於納諫而後世稱納諫之盛者無如唐文皇其臣王圭魏徵之徒號善諫諍至於無言不從無事不聽可謂至美惟太祖皇帝聖見髙逺不以文皇納諫為難而以自不為之使人無可諫為善大哉言乎前世帝王所不逮也昔書稱成湯猶曰改過不吝是不能無過也若吾太祖將無之矣本紀又載太祖一日罷朝不樂內侍有問者上曰爾謂帝王可容易行事耶早來前殿乘快處分一事有失史官必書之所以不樂也蓋太祖皇帝常以乘快處分為悔為戒兢兢業業罔敢怠忽宜其周旋卻顧當時無可諫之事矣臣又聞之事君之義有犯無隱所謂犯者不過觸威嚴冒忌諱其用心則忠至夫有隱則見利而不陳遇害而不指挾姦導諛務為身謀人臣之罪莫越是也惟太宗皇帝聖見髙逺於二三大臣既欲其情之無間且欲其事之無隱猶曰不以居尊自恃而使人不敢言也大哉言乎亦前世帝王所不逮也書所謂啓乃心沃朕心爾無面從退有後言實是道也故太宗又謂宋琪曰朕周旋欵曲商確時事蓋欲通上下之情無有壅蔽卿等但直道而行絶其私請無得有所顧避也蓋太宗皇帝每慮羣臣不由直道而交通私請戒之使無所顧避宜當靡不盡其情矣仰惟皇帝陛下至仁大度同符祖宗謀猷施設罔不諏于故實而憲于謨訓臣願陛下兼聽廣覽以太祖之訓益隆聖德好問察言以太宗之訓深勵羣臣夫使會朝清明而常無可諫之事人臣皆知直道事君而舉無不盡之情則治功何患不成中原何患不復哉此臣區區日夜以冀也中書舍人崔敦詩論聽言疏曰臣嘗謂人臣獻言靡不盡其誠人君聽言要當考其效是以漢髙祖嘉婁敬之諫唐太宗思魏徵之言是皆利害雖一時所陳忠邪乃悠久方見此不可不察也臣嘗觀東漢盜賊之原惟劉陶楊賜嘗言之其後事作始閲故事得陶與賜所上章奏皆行封侯之賞臣恭聞神宗皇帝諭開邊之非右丞蒲宗孟曰臣嘗言之神宗曰卿何嘗有言在內惟吕公著在外唯趙卨言之爾乃知臣下之言不可無記也臣仰惟陛下隆寬盡下屈已受言歷觀自古帝王未有能及聖德之萬一然而論思獻納臣下雖盡其忠考擇審觀人主當謹其術昔唐太宗嘗諭史官曰羣臣言事朕行與不行皆當記之真宗皇帝嘗詔中書置籍記諫官御史言事行與不行歲終具奏臣愚欲望睿㫖特詔中書凡降出朝臣章奏行與不行並置簿録上歲終仍以副本進入禁中于以考其是非而究獻言之情于以驗其成否而要聽言之效又使羣臣知其有此懷忠者得以盡言懷私者不敢妄言將見言必可復不為文具此於聖政實非小補袁說友上奏曰臣仰惟陛下虛心以求言和顔以受諫固常有進言以遷秩未聞有納忠而得譴者也然而在廷之臣不聞諤諤以抗莭惟知唯唯以取容昔之敢言者雖有斧鉞之誅而猶且不顧豈今之世有爵賞之勸反有所不敢臣有以知士大夫氣莭之不立也蓋士大夫之氣莭養之則鋭挫之則懾方其鋭也雖有斧鉞之誅而不懼及其懾也雖誘以爵賞而不為惟養之於無事之時斯可用於有事之際無事之時茍不先有以養之欲其用於有事之時難矣方今天下外無邊鄙之憂內無盜竊之虞雨暘以時倉廩粗足正天子養尊士大夫養諛之時也陛下不以此時有以養士大夫之氣莭臣恐風俗自此日委靡矣養氣莭以厲風俗當自朝廷始朝廷臺諫給舍之官所以糾官邪而杜姦慝也朝廷之風采繫焉天子執政以為可臺諫給舍以為不可於是有彈劾之章有繳駮之奏所以示至公也陛下既已信其人則不可以不信其言其人既是則其言不得而非其人既非則其言不得而是陛下既信之於未用之始不當難之於已用之後故臺諫給舍之所與是公議之所共與也雖陛下不得以不與臺諫給舍之所不與是公議之所不與也雖陛下亦不得而與之陛下非徒從言責之臣也從公議也士大夫亦非畏言責之臣也畏公議也陛下當使天下畏公議不當使天下畏言責天下畏公議則為正直天下畏言責則為私邪臣謂欲尊朝廷當養士大夫之氣莭欲養士大夫之氣莭當使臺諫給舍得以行其言百里奚愚於虞而智於秦裴矩佞於隋而忠於唐蓋不以氣莭作之雖智者不免於愚茍以氣莭作之雖佞者可使之忠也臣願陛下許大臣用人其有可否當與大臣辨之許臺諫言事其有可否當與臺諫辨之許給舍繳駮其有可否當與給舍辨之辨之而是從亦何傷辨之而非不從亦何損都俞吁咈見於明良之盛時可否獻替是謂君臣之合德直道行於上公議伸於下士大夫之氣莭立矣氣莭既立惰者必勤私者必公貪者必廉怯者必勇方是時也陛下何為而不成何欲而不濟哉實天下幸甚觀文殿大學士兼侍讀史浩論褒賞諫官劄子曰臣比者入對內廷以衰病乞歸田里䝉賜之坐問臣以何如唐太宗臣對曰陛下聖德髙出百王宫中止聞孝儉太宗閨門之內尚多慙德豈敢望陛下萬分之一徒以其聰明知前代帝王之髙致在於從諫降意屈志以來言者從而賞之以收美名以起至治史官謂功德兼隆得此道也是故魏徵諫發兵則以五百縑賞之孫伏伽諫死刑則以蘭陵公主園賞之李大亮諫求鷹則以漢紀胡瓶賞之髙馮言得失則以鍾乳賞之今諫官有意為陛下開闢公道無所阿私誠可與唐臣並駕願下有司亟議褒賞使萬世之下贊陛下之功巍巍太宗之上豈不美哉浩又乞免臺諫侍從當日條具劄子曰臣昨夜伏覩御扎賜侍從臺諫不允三日條具之請臣竊思之陛下為此將以得天下之弊而更新之庶可立萬世之基業何為欲速如此夫鐘之扣也待其從容然後盡其聲人之言也畀以閒裕然後盡其藴今若促之使不得盡他日或有弊不革則必有辭曰倉猝不暇及也將何以責之臣未敢奉行聖㫖者誠以陛下今日之舉真可追配仁宗書之信史足以光萬世於此而促迫之使不得盡其藴則人皆付之文具矣所有御札謹俟少選進入乞賜俞允俾遂三日之請浩又上奏曰臣恭領聖訓至於諄諄曲折臣以賤微冒犯天威罪宜萬死臣當退就斧鉞不可復言然臣區區猶不能自已者誠以陛下聖性純明德量寬大今日忽為此舉乃與平昔不類是以疑之張燾之言覬陛下取弊事而革去非欲陛下以一日之力困諸儒於筆札之下臣意侍從臺諫遊學校取科第欲其答策持論固所優為然非陛下前日求言之本意也夫言之必可行貴乎考察事情周知物態民之利病國之安危籌度于心筆之于紙聖君用之則天下咸被膏澤無一物之失所若陛下欲令援筆而書不切於事如舉子之在場屋侍從臺諫何至不能而飾詞以求展限哉今天下三歲科舉舉子未嘗有曵白者而謂立朝之士不能此左右之人欲用此以為戲使陛下有輕士之心其與祖宗開天章閣求直言豈不甚相戾耶昔仁宗開天章閣使大臣條對姦臣欲困同列故請一日而畢其間所說有得其大體者衆不能奪竟許退而條具兹故事也陛下若不聽臣言馴此而行則將流於薄而忠厚之氣象不見矣此臣所以雖有白刃在前不敢避而欲救陛下之失也樞密院檢詳文字李椿上奏曰臣聞求言非難用其言實難何則蓋用言不審則言之者必多輕舉妄議非唯不足以裨一人之聰明適所以惑四方之觀聽臣切惟陛下虛懷屈已聽言不倦真堯舜之用心也近臣嘉謀嘉猷孰不罄竭以告而百執事之間日有輪對使得盡言猶以為未也監司郡守罷授之際皆得奏事凡國之休戚民之利病惟恐纎悉有遺此陛下盛德事也臣切見比年以來凡臣僚申請建明利害其間不無輕易而朝廷聽信施行或未經審詳故有頒降之㫖未孚而改易之令已下不唯逺方觀聽深有疑惑切慮緩急有誤朝廷命令臣愚願陛下於聽納之際凡臣僚有所申請建明必先付兩省照應前後指揮及見行事理參酌其可否或令與言事之人商榷而辨明之如其灼然可行然後取㫖施行庶幾令下可行可以悠久不失信於四方萬里所繫非輕伏乞睿察蔡戡進諫録疏曰臣聞人君以納諫為聖人臣以進諫為忠三代以還善納諫之君無若唐太宗善進諫之臣無若魏徴太宗以英武不世出之資取孤隋攘羣盜平定天下皆其餘事然而貞觀之治庶幾成康似非太宗所能自致所以致此者徴進諫之力也徴所以敢諫者太宗導之使諫也故太宗嘗曰魏徴勸我偃武修文中國既安四夷自服朕用其言徴之力也徴亦曰陛下開臣使言故臣得盡其愚若拒而不受臣何敢數犯顔色乎蓋君能納諫故臣能進諫君臣相須從古以然恭惟陛下聰明冠倫上參堯舜勤勞稽古下慕太宗有以見陛下求治之切臣聞木從繩則正后從諫則聖太宗所以成正觀之治者一本於納諫而已陛下欲還太宗致治之隆必求當時致治之本欲知太宗納諫之效必觀當時進諫之言臣嘗夷考其人魏徴固號善諫而在廷之臣有若王圭馬周劉洎褚遂良虞世南岑文本輩以諫名者又不可一二計內則閨門至親乘間進說外則蕃夷武將因事納忠想其當時瞽為詩工誦針諫士傳言大夫規誨駸駸乎有治古之風自非太宗導之何以至此臣念羣臣諫語散在史册不可類舉謹用裒切於治道者凡百事聚成一書繕寫進呈如䝉陛下萬機之餘特賜一覽不唯忠言嘉論有裨聖學之明而日就月將可成貞觀之治臣不勝惓惓之誠戡又乞優容言者疏曰臣聞國之士氣如人之元氣元氣猶存必康寧而夀考及其已耗則顚仆隨之古之人君愛惜士氣如護元氣涵養作成使天下之士激昻奮勵人人懷不能自已之意故無事之時則有犯顔敢諫之士多難之世則為伏莭死義之臣治亂安危實係於此我祖宗保養士氣二百餘年未嘗深罪言者一事過舉議論鋒起章奏交上往往以死爭之縱有忤㫖不過薄責旋即超升仁宗皇帝蓋嘗斥逐臺諫究其端由皆出於當時大臣之意帝反嘉其忠直後多大用之如范仲淹歐陽修唐介之類是也蓋人主一時雷霆之怒譴責言者雖明君有所不免儻能幡然而寤改過不吝適所以成聖德也近者給舍臺諫相繼罷去縉紳之士莫不為朝廷惜而臣猶有所喜者以元氣尚存故也夫諫行言聽膏澤下於民此人臣之所願欲也髙爵厚祿以榮其親以肥其妻子亦人臣之所願欲也大則竄逐小則罷斥艱難困苦流離凍餓上纍其親下纍其妻子如此而得區區之虛名飢不可食寒不可衣將焉用之蓋忠義所激不得不然捨實利而求虛名甚非人情之所得已此魏徴所以不願為忠臣者也又況人臣之進言言之而是君能聽之則君有納諫之名人臣何自而得名哉言之而非君不之聽臣有妄言之過亦何自而得名哉惟其諫不行言不聽天下之人惜其不見用於世於是以名歸之然實非人臣之所欲也為人君者要當不憚屈已以來忠諫不愛厚賞以旌直臣則君都顯名臣獲實利兩得所欲豈不美歟臣願陛下深察臣下之情非樂於求名愛惜士氣優容言者力振委靡之風作成忠義之莭則天下之士感慨發憤以圖報效實惟宗社無疆之休天下幸甚中書舍人林光朝上奏曰臣聞唐虞之世內有百揆四嶽外有州牧侯伯逺近相參有如一體又且時巡于方嶽諸侯各朝于方嶽之下是當時諸侯歲一見天子皆以為職分之當然者觀其一時戒飭之辭有曰敷奏以言明試以功車服以庸此為導之使言也言不徒發是必有可指之效則賜之車服所以寵異之也車服有數天子以是御羣下惟有功者得之則人人有歡心茍為無功偶然得此則人皆有幸心一或有幸心則車服亦不足貴矣故其曉然告之使之敷奏以言而又試其言之當否臯陶嘗提是說以為不如是則敷同日奏罔功則是說為一日不可廢於天下也陛下修明庶政搜取實材每於羣牧部使者守臣各令奏事而後丁寧告戒此於唐虞之事不約而合然而自他處得郡或丞郎補外或執政侍從均勞佚而去者當有一二說歷陳之於上前雖陛下有所可否然不終計其效驗如何耳臣竊觀神宗皇帝於百司所奏無不遍覽又嘗作功過簿以稽其言之當否臣願陛下酌祖道以養天下每於州牧侯伯入對宸旒言有可聽者當計以歲月考其言之當否如功過簿則田萊可闢水利可修流人可集盜賊可去其大者可以厚民俗起士風其次可以講鐵酒酤利原豐耗之所出是天下萬務皆可以周知而悉數之也昔文帝見賈生於宣室偶於受釐之際所問者鬼神而賈生之對不敢及他事今州牧侯伯一日見天子得以極言郡國之事此為導之使言已如唐虞之時苟無以考其言之當否臣恐敷同日奏罔功也臣前謂天下之大非耳目所可及在唐虞盛時謂此說為不可廢是必為簡易之法陛下試一關宸慮使天下復見唐虞之治薛季宣上奏曰臣聞人主之為天下莫大於天下不可得而欺夫使天下皆不可得而欺則欲無不遂為無不成自昔號有志之君其所欲為非不甚盛甚美然卒有齟齬之歎蓋欺之者多耳夫欺者之情狀天下皆知之而人主獨不知之是豈人主不欲察之而甘於受之耶近者為之地則逺者有盤錯之堅大者為之助則小者有彰露之援其察之豈曰甚易乎守令之所臨治不過一郡一邑之間旦暮坐于㕔事之中豪家巨駔敢於欺侮而不懼者恃有胥吏為之囊橐也人主萃天下之責而以一身臨之爵祿利勢足以動人小人而不為欺何以有僥竊冨貴之望而罪之根本則在於左右之囊橐致使人主無從而察之也夫左右之為欺甚於天下彼其伺候詞色之工窺見意向之密捭闔迎逢殆難以狀其巧也故有托正以行其邪假廉以濟其貪僞直以售其佞薦退人才不於有所升黜之時而遊揚中傷於平居無事之日一旦升黜之際雖人主自以為出於獨斷而喜怒氣焰已歸於囊橐者之門矣然則左右之為欺人主又何從而察之亦曰兼聽無我收骨鯁弃軟熟而已且可以利來可以使懼有見而不敢言或言而不敢盡皆軟熟之人也骨鯁之士惟其胸中耿耿不能與世推移急危存亡之秋乃可望以伏莭死義平時軟熟自為身謀而欲望以急難非所聞也借使舉朝之士無非軟熟之人其為墨墨大矣於人主何利焉若乃骨鯁之士世多以好名疑之夫名天地之美物不易以與人而亦天下之公論不可以冒得舉事進言果出於為君上為社稷也然後可以得名不然將誹謗隨之矣故在臣子自為學問之計不可存好名之心人主為社稷計惟恐不得好名之士人人皆好名畏義則人主所欲為者無不濟矣故欲絶天下之欺惟在於收骨鯁收骨鯁在於兼聽兼聽莫難於無我入者先主縱有他說不能復入何以鑒擇其是否乎骨鯁之言非無我則誠難於受之也忠言逆耳利於行良藥苦口利於病此漢初之謀臣所以事英略大度之主而使屈羣䇿之用者其言如此齊威之霸其機不在乎阿即墨大夫之誅賞而係乎毁譽不公使齊威之刑賞不行焉則為欺者殆無以禁之矣恢復之功獨可日月冀乎此臣所以冒昧而獻兼聽無我之說也陛下靜觀而熟察之儻有驗於微臣之言功業成否反掌間爾季宣又上奏曰臣聞唐太宗之戒王圭曰人心所見互有不同茍論難往來務求至當舍巳從人亦復何傷隋末內外務相阿順皆自謂智及天下大亂家國兩亡卿等各當徇公去私母雷同也魏鄭公告太宗曰人主兼聽則明偏聽則暗昔堯清問下民故有苗之惡得以上聞舜明四目達四聰故共鯀歡兜不得蔽是故人主兼聽廣納則下情得以上通大哉言乎其君臣致治之美庶幾成康有由矣夫和之與同疑若相似聖人之論則有君子小人之分善乎晏嬰之言和如鹽梅相濟同如以水濟水人心不同如其面焉强而同之非回於利弗能也向令仕者舉回於利則凡時之利病政之得失何自而知之君子不為利奪往往輕為去就藉此以治萬無是理間自權臣柄國斫喪忠良內外之臣無小無大相與諛說合若一人幾於楊氏無君其於國家何有流風遺俗溺陷人心同而不和至今為梗以陛下之剛明聖武髙視唐宗即政以來每欲一湔前弊其如無君之習革之良難舉世為同則有入而不自知者臣懼邦之政俗將日非而莫之救也凡處天下之事不當心有所主惟處身於利害之外乃知利害之實故見利者不知其害見害者不知其利誠使言利害者畢陳所見則利害之情無餘藴矣合天下聽無不聰合天下視無不明鹽梅相濟何以易此不然自塗耳目同異不聞雖臣下盈庭自成孤立矣人情誠不易見然而指意可知大抵勉君以容受讜言要為忠愛之至導之拒諫寧為體國之心由此觀之邪正無遁情矣臣不敢逺引三代姑以所學稽於唐之君臣致治之美為陛下獻惟聖神留慮而圖之社稷蒼生幸甚直煥章閣王師愈論聽言之要疏曰臣竊惟陛下躬上聖之資勵大有為之志孳孳圖治聽納如流欲以來天下之言然而進言者不能皆昌言多為虛誕一偏之說仰欺天聰其名則是其實則非聽之則可喜行之則可駭或有利少而害多者或有利於此而害於彼者或有斷然不可行者行之未久雖不憚於輟或從而變更其弊已甚矣原其用心不過茍持一說以取容恱欲為干利祿之階而不顧上誤朝廷之施行下貽生民之大病此何謂也陛下明目達聰欲周知而廣覽進言之路固不可不闢自今凡有陳利便者誠能先隱之於聖心次付之於大臣侍從臺諫參酌詳審擇其灼然可行者行之庶幾事功可濟利興而害除矣光宗紹熙二年起居舍人黃裳上奏曰自古人君不能從諫者其蔽有三一曰私心二曰勝心三曰忿心事茍不出於公而以已見執之謂之私心私心生則以諫者為病而求以勝之勝心生則以諫者為仇而求以逐之因私而生勝因勝而生忿忿心生則事有不得其理者焉如潘景圭常才也陛下固亦以常人遇之特以臺諫攻之不已致陛下庇之愈力事勢相激乃至於此宜因事靜察使心無所係則聞臺諫之言無不恱而無欲勝之心待臺諫之心無不誠而無加忿之意矣三年御史臺主簿彭龜年論聽言以講學明理為本疏曰臣聞天地以虛為德聖人所以能贊天地之化育而與之參焉者亦虛而已矣恭惟陛下受天明命臨照萬國自御極以來天下之事一切以虛心應之執政大臣日有闓陳無一事之不下侍從論思給舍繳駮臺諫劾奏無一言之不聽內而百執事外而監司郡守一遇奏對無不自以為稱愜上意雖舜之舍已從人禹之聞善言則拜何以過此然臣區區之愚猶願有陳于陛下者蓋以天下之理有所謂可亦有所謂不可夫虛者豈一於可之謂哉無可不可者虛也有可不可者理也試觀之天地之化何嘗有所偏倚其無所偏倚者天地之虛也然隂陽寒燠之氣動植飛潜之性長短小大之形亦何嘗有所變易哉所不可變易者天地之實理也夫是非邪正此實理之在人而不可變易者若是謂是非謂非邪謂邪正謂正物各付物而吾無一毫私意介乎其間豈不如天地之虛哉儻是非邪正未嘗辨析而徒曰吾虛心應之吾之應之者若其人正其言是則是虛也達而為堯舜不難也若其人邪其言非則是虛也反而為祻亂亦不難也孔子曰君子之於天下也無適也無莫也義之與比夫無適無莫豈不甚善然非義之與比則有所不可故無適無莫而義則為從善如轉圜無適無莫而不義則為用賢如轉石矣是可不察哉臣觀陛下數月之間用人納諫聖心愈虛盛德彰明天下歡喜太平之期指日可冀而臣之私憂過計益不自已者誠願陛下於是非邪正之間深加聖心焉臣非敢議陛下今日虛心以為非是誠以是非邪正未易判别異時不幸有不肖者竊陛下虛心之機而用之或誤陛下陛下儻懲今日為監戒則將猜忌關防表裏不應其患又有不勝言者此臣所以有狂僭之言也抑臣之言猶有未盡者臣聞之能明理然後能使心之虛能講學然後能使理之明夫天下之事紛紜淆雜日至乎前利害之相形賢否之相䝉千變萬化不可窮詰而陛下以一人之聰明酬之可不謂難哉陛下隨事而應雖無不聽之言事過而思豈無既往之悔萬一有之陛下亦嘗察夫悔之所以然乎是必於理有所未明所以於事不能無誤臣是以知講學之不可緩也恭惟陛下自得聖學之髙明多閲天下之義理是非邪正固已瞭然然而理本無窮學斯不足若絲毫有所不察則祻亂或從而生臣愚欲望陛下精考聖賢之言多親儒學之士公好惡以合天道辨義利以察人情常使聖心昭明了無蔽惑如水鑑之清而妍醜自見如尺度之公而長短自形此聖人之所謂虛而與天地相參者也唯陛下留神四年龜年為祕書郎又論羣臣進言早賜處分疏曰臣以非材備數三館月糜廪粟無所補報嘗伏自念三館之士在祖宗時許以議政比偕同列僭上封章待罪旬浹未聞報罷竊知聖德優容必無訶譴然而所論之事亦無施行訶譴不加不敢自喜從違未卜實切私憂臣仰惟陛下自即位以來隆寬盡下虛已受人聽納之勤前古無有只因近日二三差除大臣執奏給舍繳駮臺諫論劾未合聖心反覆月餘尚無豫決羣臣既不肯背理而徇陛下陛下復不肯屈勢而聽羣臣君臣之間齟齬既久情意不通易成睽阻一日二日萬機沓來設於其間又有同異展轉激作或貽威怒則豈特羣臣之罪不勝誅夷而已哉陛下父母也羣臣臣子也子事父母只欲其喜豈欲其怒父母怒則一家不寧陛下怒則天下不寧此臣所甚懼也陛下聖度如天萬萬無此臣但見羣臣屢批逆鱗恐其至是是以願為陛下先事言之然臣亦非敢以臆說欺陛下也臣嘗讀周公旦無逸之書至篇之終曰自商王中宗及髙宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身旦之此言真萬世帝王龜鑑也夫所謂小人怨汝詈汝者乃後世指斥乘輿之類其犯上瀆尊與抗疏陳議者蓋不可同年而語矣而四君聞之反取之以為德任之以為愆然則怒安從而生哉儻不如四君之能聽則譸張為幻之人必指其言曰此怨吾君之詞也此詈吾君之詞也人君不察從而信之則失為君之道無寬裕之德其弊至於亂罰無罪殺無辜者蓋有之矣陛下慈仁覆物謙虛無我固當上擬四君然臣猶不免以譸張為幻之人為懼者誠不為無見也劉向曰執狐疑之心者來讒賊之口持不斷之志者開羣枉之門羣臣之言陛下既疑而不聽則譸張為幻者可以投間而起矣臣逆料其說不過有三必曰陛下之命羣臣執之不行是天下之事盡由羣臣不由陛下為此說者是以唐明皇待陛下非忠臣也昔明皇欲加牛仙客尚書張九齡以為不可又欲加實封九齡又以為不可李林甫揣上意曰仙客宰相才也何有於尚書明皇信之復以仙客實封為言九齡固執如初明皇曰事皆由卿耶自是林甫進九齡罷而唐之治亂分矣此豈陛下所欲聞乎又必曰羣臣為此不過欲歸過於上邀名於已耳為此說者是以唐德宗待陛下亦非忠臣也德宗欲為唐安公主造塔姜公輔表諫德宗曰唐安造塔其費甚微非宰相所宜論止欲指朕過失自求名耳夫不善之事行之則為過改之則為名人君能改則名在人君人君不能改則名在諫者德宗終守改過之吝竟失從諫之名褊心忌克此豈陛下所欲聞乎又必曰號令已行不可復反是又以反汗之小嫌傷從諫之盛德亦非忠於陛下之言也臣請復以慶厯元祐之事辨之慶厯三年仁宗既除夏竦樞密使後用御史中丞王拱辰諫官歐陽修等十一疏追竦樞密使敕元祐元年哲宗除安燾知樞密院給事中王巖叟封駮竟因燾辭免之章令依舊職此皆大臣也尚不憚於改除又何取號令之不可反乎且羣臣獲仕清時固欲陛下躋祖宗之盛際邁帝王之極功身荷美名主都顯號偶有違拂誠非得已陛下諒其忠則局蹐恐悚猶不自安陛下不諒其忠則流移轉徙何所不至寧肯不顧妻子故犯君父之怒乎陛下今日雖未有怒羣臣之意臣恐譸張之說萬一不解則必有觸此機而動者矣蓋人君胸中當如清水明鏡一毫不留乃得其正四君之所以不敢含怒蓋謂是也臣愚欲望陛下恢廓聖懷和平宸慮以天下之理察羣臣之言酌其是非早賜處分或罷召命或與外除毋使譸張之說能惑聰明忠藎之臣或罹擯棄實天下幸甚宗社幸甚龜年又論優遷臺諫沮抑忠直之弊疏曰臣聞言路通塞天下治亂繫焉言路通則雖亂易治也言路塞則雖治易亂也仰求前監方册昭然臣敢不為陛下縷縷陳之臣伏見陛下自登大寶隆寬盡下廣覽兼聽揆之於古未見其比而近日臺諫之官稍稍抗直者多不得久於其職大率優遷其官以去之臣不知其故何也夫假遷官以逐言者此近世最弊之法陛下奈何數出而用之乎消耎精鋭沮抑忠直莫甚於此且臺諫之官皆朝廷選擇而後除使其言可行則為稱其職當留而不當遷言不可行則為不稱其職不當遷而當去而乃舉措倒置是非易位臣不知陛下所以勸懲天下果何術也恭惟治朝崇奬臺諫列聖相承視為家法傅堯俞嘗謂言事之官許令風聞祖宗之詔曲全過當許風聞則豈皆責實全過當則欲其盡言如此求之猶恐未至臣觀南渡以來臺諫忠鯁大率不逮祖宗盛際每有所言極不過三數章而止安有二十三章劾胡宗愈十九章劾章惇如劉安世者乎全臺彈劾不聽亦已安有上章不報率同列進見列拜於御座之側如孫抃論溫成典禮者乎聞有宣諭唯唯禀承安有召赴都堂宣諭而論列如故如傅堯俞之論張舜民不當罷者乎言有不合茍得美官奉身而去安有以去為諫幾上感寤如程皓之不受提刑司馬光之不受樞密傅堯俞之不受吏部侍郎者乎臣不知先正諸臣剛決勇敢一至于此以為無上耶則近世愛君未有過於諸臣者也以為沽激好名邪則忠實􅈤惻亦未有過於諸臣者也而祖宗容受聽納若恐傷之得非以朝廷紀綱之地不容不重為社稷宗廟大計自當爾耶陛下試取先正諸臣奏議反覆詳觀然後知祖宗寬大人無不盡之言今日臺諫略無先正之直陛下儻舍己從人如舜改過不吝如湯不唯聽人之言而又且導之使言不唯容人之直而又且激之使直臣尚懼士氣消靡已久不能頓然作興而況從而沮之耶臣是以知士氣不可以不伸夫姦宄之人何世無之唯藉臺諫嚴重有以折其萌芽而臺諫之士所以能震懾姦宄唯藉人主聽納其言假以聲勢今臺諫之士消沮如此臣恐在內之姦宄乘此隙以蠧其內在外之姦宄執此隙以搖其外陛下雖欲髙枕而臥不可得也且臣嘗熟察臺諫所以數忤陛下者蓋有由矣非以陛下身有失德惡人正救如前代拒諫之主也特不過攻擊權幸不協聖意耳夫權幸恩寵不行不過一夫怨而怨歸臺諫臺諫言論不行能使天下怨而怨歸陛下陛下奈何不忍一夫之怨而獨任天下之怨乎此臣所以痛心疾首欲一言於陛下之前不能自已也臣反覆思惟今日陛下唯有導人使諫足以救此臣猶慮聲勢已動未易頓回政須陛下開廣聖心掃除芥蒂遵用仁廟召還唐介故事柬别向來以諫去國不由人言之人擢用一二示天下以聽納之機登對臣僚議論忠讜者稍旌别之示天下以聽納之實庶幾聖德昭明羣疑解釋不勝幸甚光宗時監登聞鼓院楊大全上奏曰臣之志憂君者不畏義死不榮幸生不以言而獲罪為耻而以言不聽從為耻自古諫之不效其大者身膏斧鑕其次亦流竄四裔其小者猶罷免終身未有若今日不勉於聽從亦不加於黜逐徒餌之以無所譴呵之恩使皆叨富貴甘豢養以消靡其風莭平居皆貪祿懷姦之士則臨難必無伏莭死義之人陛下自夏秋以來執政從官之死者皆不信卒之果然乎不然乎建康趙濟死武興吳挺死今尚不以為然則事有幾微於朕兆者可諫陛下乎萬一變起蕭墻祻生肘腋陛下必將以為不信坐受其危亡矣盜滿山東而髙斯弄權二世不知也蠻寇成都而更奏捷明皇不知也此猶左右聾瞽爾今在朝之士瀝忠以告而陛下不聽是陛下自壅蔽其聰明也今外間傳聞以為夀皇將幸越幸吳興此愛陛下之深欲泯其迹也陛下當亟圖所以解夀皇之憂趙汝愚論聽言疏曰臣仰惟陛下天縱聖明寬仁盡下凡臺諫之論奏給舍之封駮微及一介踈逺之士雖寸長片善陛下未嘗不聽而受之無有難色臣每與羣臣竊窺陛下盛德全度恢乎有容如天之髙如日之升光明廣大不可尚已若守之以誠行之以久使義理習熟是非著明不為邪說所轉移則三王不足多五帝不足進矣然臣嘗觀自古納諫之君未有如唐之太宗者當時魏徴號為善諫帝嘗曰人言魏徴舉止踈慢我視之更覺嫵媚至徴陳十漸則尤加奬歎為列諸屏障朝夕瞻仰君臣之際相得深矣及其怒也則曰會須殺此田舍翁及徴之亡乃復有停昏仆碑之事夫以太宗之明魏徴之賢而終不能免此何耶又帝嘗止于木下愛之宇文士及從而譽之不已帝正色曰魏徴嘗勸我逺佞人我不知佞人為誰意疑是汝今果不謬士及叩頭謝而帝亦不加罪大抵人之情喜順而惡逆方其始初清明也聞善言則喜聞惡言則懼凡君子忠藎之言雖甚拂其意然未必不䝉信用小人阿順之語雖初若可喜亦未必不加察也及其久也君子今日論某人明日論某事積其違忤之意則終將壓之矣若小人則善伺人主之意阿諛順㫖終無所違逆故人主雖知其佞而卒以難去從古以來人主皆欲治而惡亂皆欲進君子而退小人然卒之君子逺而踈小人近而親危亂之日常多治安之日常少者惟在乎違道而任情喜順而惡逆爾書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道斯言也誠萬世人主聽言之法惟陛下留神幸甚軍器少監兼權侍左郎官劉光祖論言事本末疏曰臣聞古之事君者必曰忠必曰直忠則有所不欺直則有所不避忠直者人臣之大本也進則觀望人主之顔色退則顧慮一身之安危如此者必有所不盡於其心其於忠也逺矣設為關防以為能避逺形迹以為智如此者必有所不盡於其言其於直也逺矣然而忠直非有素則不信忠而君不以為疑直而君不以為忤惟有素者能之臣雖愚魯竊慕斯義平生所受教於父師者蓋終其身而不能變平日所交際於朋友者亦盡其心而無所隱而況於事君乎而況於任陛下耳目之寄乎陛下往歲育德春宫臣備數小學教授陛下察臣盡心於嘉王而無所茍是以䝉簡記於夀皇召臣之日臣到闕際會舜禹親傳䝉恩引見所奏悉荷開納未幾又值輪對略嘗效其愚忠以為當今人才衰而肯論事者益少勸陛下長養收拾崇奬其直言陛下御批依奏即日付出而大臣反若有所顧畏不敢報行然臣自念區區之誠已獲信於陛下久矣又未幾陛下遣臣迓送使客三得瞻望清光臣所奏楚州城壁絶無一詞之欺陛下卒采臣言減省工役過半臣以事無大小皆可盡忠官無髙卑悉當圖報今也陛下擢臣以風憲之任其為感激又當如何報效耶所以承命以來不遑寧處朝惟夕究如是纍日即自斷曰惟初念純一可以對上帝可以事君父不可二也不可疑也是故道學朋黨之論人不敢言而臣言之為其不消此名即必貽將來之患故也左右近習之勢人不敢及而臣及之為其不窒此門則必喪士大夫之莭故也臣在小學時曽為日記其間記陛下一日因臣進見問曰曽識吕祖謙否臣對識之陛下再三稱誦其賢而悼嘆其不幸臣今思之使祖謙而尚在人將目為道學之首則陛下亦不得而用之矣又記一日臣得進見陛下諭臣曰近日主上付下骨鯁集令看皆先朝元老議論讀之甚有補臣對云自范仲淹以下奏疏皆在可見祖宗以來容納直諫如此陛下曰中間所論新法自是必為民害斷不可行又曰當時同已者即以為是異已者即以為非所以後來遂將司馬溫公蘇文忠及黃庭堅各目為黨魁臣對云只緣王安石引用小人卒亂天下陛下曰如蔡卞蔡京之徒是也又曰陳東亦不易得臣每誦陛下東宫之語以為淵衷所見一一與祖宗之意同符是以昨者敢進借朋黨以害君子之說皆臣數年之內中心所懷如此臣自信言公而語平故乞陛下降出以消未然之患至於士大夫納交於近習臣自立朝以來心誠鄙之目覩陛下愛重名器不為小人所竊弄於是乃昌言之而無所避曰忠曰直臣雖未能望古人之萬一然其不為姦回之人決矣臣於職事踈則有之欺則無也於議論不及則有之過則未也臣無言責之時尚勸陛下用賢納諫諄復而不已豈今居言責而反不言乎是以相繼封入奏疏乞先收召人才而大臣但進呈而無所議臣既非今日之言則言而不行不能以自已也何則人才者國家基本之所繫生民休戚之所關乏則養之有則用之慶厯之所以盛者豈一日之積乎惟其非一日之積是以為數世之用事之最大無以過此臣所願陛下體至公之道開衆正之門又乞早用愚言兼收人物必獲安靜之福而無一旦之憂如臣所言異時有誤國是臣甘竄殛寧宗慶元元年大府寺丞吕祖儉上奏曰臣近者䝉恩輪對不度狂愚嘗僭論奏陛下聖孝純篤猶未得一見上皇將何以慰聖心而修人紀又嘗以敵情難測欲得備豫不虞貴幸市權欲得防制有莭及御筆施行傷於快易且進退臣下復多匆匆莫不展竭懇欵以致願忠之義聖度隆寬溫詞慰納臣退而感泣莫知圖報指心誓日以為他日或有事繫國體義所當言可以仰禆聖明者茍得竭盡則雖退就黜責靡敢自愛竊聞國子祭酒李祥比因宰相趙汝愚論罷心有所懷不能自已嘗有封事上徹宸聰自以所見與諫臣不同居家待罪陛下既豫之以寬告又復寵之以職名畀之以使莭使以禮而去中外之論莫不以陛下博盡羣議不貴茍同此蓋治世盛德之事而明主之所取以為先務者也臣竊嘗妄論本朝治體蓋以崇養議論氣莭為立國之根本自王安石用事好同惡異天下從風而靡逮至崇觀間復倡為豐亨豫大之說虛美熏心實禍蔽塞遂使習俗日變馴致靖康之禍如吳开莫儔之徒與敵為市痛在人心其始固止於順從其終乃至於此極為人上者詎可不知所崇養而以好同惡異為深戒哉今諫臣抗疏論罷李祥新任仍禠其職顧惟諫臣所言陛下自應聽納其在庶僚亦豈容妄有條陳苐以陛下含𢎞之美意因是不能無虧而人有懼心精鋭銷耎議論氣莭必愈陵夷凡事理利害之真實顧望愛惜多為身謀誰肯為陛下明言之其所關繫蓋治忽所從分非一目一事之可比也仰惟陛下初政清明收召人望登用忠直天下之士莫不欣欣然精白以承休德然曾未踰時朱熹老儒也有所論列則亟使之去彭龜年舊學也有所論列亦亟許之去其他侍從臺諫之臣以言事而去者尚多有之夫人才固未易得而盡莭竭忠之士寧復有幾長育奬勵猶懼其有所畏縮今士氣似少沮矣如李祥老成篤實非有偏比蓋衆聽之所共孚者今又終於斥遂臣恐自是而後天下或有當言之事必多相視以為戒鉗口結舌之風一成而未易反是豈國家之利邪矧今國勢甫定人心猶搖歲事可慮未可保其無害邊報屢警未可保其無他又自去秋以來災異相繼殊為駭常而天象昭昭尤為可畏白虹貫日陽精示變皆適當淫雨之開霽近者太白經天金木失次立夏之日風起艮方此為何景胡可少安政是陛下厲精為治明目達聰之時今能言之士指陳災變所以助成陛下抑畏之心者亦不為少然終未克致消弭之實而於其所甚當言者雖陛下以聰明臨照之未必皆得而聞是安可不思其故哉蓋天下之事所宜指陳者固非一端然言有淺深勢有難易今之所難非在於得罪於君父而在於忤意於權勢姑以臣所知者言之難莫難於論災異然言之不諱猶未以為難者以陛下有容受之德而其事不關於權勢也難莫難於論綱常然言之不諱猶未以為難者以陛下有誠孝之心而其事亦不關於權勢也若乃御筆之降初豈盡却僉謀然廟堂不敢重違臺諫不敢深論給舍不敢固執蓋以號令出於獨斷而事體多關貴幸深慮左右乘間過有激發而重得罪也臣蓋嘗面奏從昔而來凡勸導人主事從中出者夫豈意在尊君蓋欲假人主之聲行之於外使莫敢爭執而可以漸竊威權所當深加省察旬日而來復聞有一二中批指揮給舍繳駁僅得一再而止其自為謀則善矣儻事有當論而又切於此者望其致閉邪之敬盡面折庭爭之莭未必有也子思有言羣下同聲則善安從生今士大夫之習俗蓋近於是不知陛下亦何便於此臣比日又竊聞之道路左右暬御於黜陟廢置之際間得與聞者車馬輻湊其門如市恃權怙寵搖撼外庭聲焰所及類莫敢言所賴素有望實不畏强禦者正色朝端盡言宸扆有以折其鋒而殺其勢茍惟不然歲月荏苒事勢浸淫腹心耳目愈失委寄政權將歸幸門而不在公室凡所薦達皆其所私凡所傾陷皆其所惡豈特側目畏憚莫敢指言而阿比順從內外表裏之患必將形見前史所載其鑒甚明親愛之道全之為上若或不加抑損是乃所以害之惟在陛下加念而已臣所以因李祥獲罪而深及此者是豈病狂喪心欲為矯激而自取罪戾也哉實以士氣頽墮之中稍有所言與諫臣忤意則去不旋踵而邇者尊君之論播於朝行皆欲習為謹畏而不知盡責難之恭雖知貴幸市權無由敢言於陛下之前或有志在忠愛能言其難者皆將目之以出位犯分不恭不遜之罪臣之私憂過計豈獨以搢紳之士遭罹讒謗而已其所深慮者陛下之勢孤而相與維持宗社者浸寡也伏望陛下深惟天下之勢在於以言為諱渙命重申復還李祥職名新任雖若稍咈諫臣之說然可以通壅蔽之情朝廷美意既得因此開明而天下有難言之事在朝在野必將聞風欣慰願竭忠藎於王朝陛下躬受四海之圖籍兼聽臣庶之邪言開公正之門絶私幸之路委信大臣以正朝綱容納忠直以强國勢中心無為銷平偏論以涵養天下和平之福則宗社幸甚生靈幸甚臣世受國恩不遑他恤發言狂瞽罪在不赦惟陛下財幸慶元間將作監陳貴誼因轉對上言曰言路雖開觸犯忌諱者指為好名切劘時政者指為玩令利害關於天下是非公於人心一人言之未已或至纍十數人言之則又指為朋黨是非易位忠佞不分又言婉順巽從者是美疢也非愛我也宜屏之外之矯拂救正者是藥石也愛我也宜用之聽之嘉定三年祕書郎真德秀上奏曰臣聞天下有不泯沒之理根本於人心萬世猶一日者公議是也自有天地以來雖甚無道之世破裂天常隳壞人紀敢為而弗顧者能使公議不行於天下不能使公議不存於人心善乎先正劉安世之論曰公議即天道也天道未嘗一日亡顧所存何如耳熙寧之世以新法為不可行者公議也雖以王安石之愎諫遂非而不能遏士大夫之口紹興之際以和好為不足恃者公議也雖以秦檜之擅權專殺而不能弭君子之論卒之新法行而民力屈和好就而敵情驕甚哉此理之在人信可畏也與其拂之以取敗孰若順之以為安近年托胄用事以區區私意小智扞天下公議之衝能顛倒是非於一時終不免為當世大僇何者公議天道也托胄違之則違天矣天其可違乎故善為國者畏公議如畏天則人恱之天助之何事功不立之憂哉陛下以還至公之理蓋嘗少伸於久鬱之後矣臣愚伏願朝廷之上兢兢保持勿失初意用人立政一以天下公議為主而不纍於好惡黨偏之私盡公極誠如對上帝則天人胥恱治效可期海內之幸也惟陛下留神反復愚臣之言六年德秀為起居舍人又上奏曰臣伏觀陛下更化之始首下明詔求直言又詔近臣請對論事薦紳士夫如聞震霆如覩白日臣時備官太學竊語同列以為自今言路大開將復見祖宗盛時氣象矣而五六年來士風選愞無以大異前日臣竊惑焉蓋嘗歷觀往昔言路壅塞之由大抵起於人主好自用大臣好自專而已自用則視天下之人皆莫已若而惡人之言自專則舉天下之事唯所欲為而忌人之言今陛下恭已責成未嘗有自用之失大臣虛心無我未嘗有自專之私而羣臣觀望莫敢盡言者陛下亦嘗察其故乎蓋自權姦擅政十有四年諛佞成風日以浸甚然其始也朱熹彭龜年以抗論逐吕祖儉周端朝之徒以上書斥當時近臣猶有爭之者正如始病之人氣血雖傷而未至甚憊也其後吕祖泰之貶非惟近臣莫敢言而臺諫且出力以擠之則嘉泰之疾已深於慶元矣又其後也盜平章軍國之名起邊陲干戈之釁非獨舉朝莫敢言雖布衣韋帶之士求一如祖泰者亦不可得是開禧之疾又深於嘉泰矣風俗至此已成膏肓救藥扶持豈易為力誠使更化之初一時羣賢皆得以忠言自奮則精神風采猶可漸還而曽未兼旬遺補之官以言罷職是疾方小愈而遽以酒色伐之矣若是而欲起嘉泰開禧之沈痼其可得乎自時厥後傅伯成以諫官論事去蔡幼學以詞臣論事去鄒應龍許奕又繼以封駁論事去方其去也陛下皆華之以美職畀之以大藩視昔斥逐言者之時固大異矣然人之常情易偷難勉彼見是數人者非能大有所矯拂已皆不容於朝未免妄疑陛下真有諱言之意故寧默默以自全不肯譊譊以賈禍且侍從之臣以已見求對故事也今或曠歲彌年而不一舉職者矣集議各貢所聞亦故事也今或閣筆相視而不措一詞者矣設有大安危大利害羣臣喑默如此豈不殆哉臣今欲為陛下言者三一曰勤訪問臣自獲侍清光每見陛下延納羣臣溫恭有禮然從容咨訪罕聞玉音記注所書寂寥無幾豈皆不足以上承清問乎又間遇兩班多從隔下既進復卻或至再三陛下雖未必厭聞人言羣臣或得以妄議聖德臣願自今昕朝賜對時出聖訓訪以民生疾苦朝政闕遺仍詔賔贊之臣雖有兩班皆令宣引則下情可通而上聽無壅矣二曰廣謀議臣聞古者大事謀及庶人翕然大同乃底元吉比年政令之間或有更革往往過為祕密不暇參酌羣言計慮固曰精詳本末豈無未究有如楮幣鹽鈔尤為民命所關而更張獨決於廟謨獻替靡聞於羣下儻凡皆若此欲事無遺䇿其可得哉臣願陛下以帝堯稽衆為心以漢廷雜議為法俾人得自竭則令無不臧矣三曰明黜陟昔唐憲宗以忠直用李藩以循默去鄭絪迄成中興之烈而宰臣裴垍尤能奬勵盡言拾遺獨孤郁等因遷致謝垍獨責嚴休復曰君異夫二人孜孜獻納者休復大慙故論者至今稱憲宗為盛君而裴垍為賢相間者一二小臣以奏對剴切旋被奬拔亦足以明示好尚矣臣願推廣此意凡向以言事去國者察其用心之忠勿使久外左右近臣盡誠獻替者當如憲宗之擢李藩媕阿茍容者如裴垍之責嚴休復使人知忠鯁可尚而諛恱可羞則元和之盛何難致之有臣以孤生䝉陛下擢掌內命四年于兹近叨塵誤恩進侍螭陛有懷弗吐臣罪奚逃故於進對之初不敢毛舉細故以塞責輒冒昧極陳其愚惟陛下垂聽歷代名臣奏議卷二百六
