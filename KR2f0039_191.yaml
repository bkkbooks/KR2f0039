body:
  text: 歷代名臣奏議卷一百九十一明楊士竒等撰節儉齊桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今君之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所奢大也詩云不躬不親庶民不信君欲禁之胡不自親乎桓公曰善於是更制練帛之衣大白之冠朝一年而齊國儉也秦穆公問由余曰古者明王聖帝得國失國當何以也由余曰臣聞之當以儉得之以奢失之穆公曰願聞奢儉之節由余曰臣聞堯有天下飯於土簋啜於土瓶其地南至交址北至幽都東西至日所出入莫不賔服堯釋天下舜受之作為食器斬木而裁之銷銅鐵修其刃猶漆黑之以為器諸侯侈國之不服者十有三舜釋天下而禹受之作為祭器漆其外而朱畫其內繒帛為裀褥觴勺有彩為飾彌多而國之不服者三十有二夏后氏以沒殷周受之作為大器而建九傲食器雕琢觴勺刻鏤四壁四帷茵席雕文此彌侈矣而國之不服者五十有二君好文章而服者彌侈故曰儉其道也由余出穆公召內史廖而告之曰寡人聞鄰國有聖人敵國之憂也今由余聖人也寡人患之吾將奈何內史廖曰夫戎辟而遼逺未聞中國之聲也君其遺之女樂以亂其政而厚為由余請期以疏其間彼君臣有間然後可圖君曰諾乃以女樂三九遺戎王因為由余請期戎王果見女樂而好之設酒聽樂終年不遷馬牛羊半死由余歸諫諫不聽遂去入秦穆公迎而拜為上卿問其兵勢與其地利既以得矣舉兵伐之兼國十二開地千里穆公奢主能聽賢納諫故霸西戎西戎淫於樂誘於利以亡其國由離質朴也晉平公為馳逐之車龍旌衆色挂之以犀象錯之以羽芝車成題金千鎰立之於殿下令羣臣得觀焉田差三過而不一顧平公作色大怒問田差爾三過而不顧何為也田差對曰臣聞説天子者以天下説諸侯者以國説大夫者以官説士者以事説農夫者以食説婦姑者以織桀以奢亡紂以淫敗是以不敢顧也平公曰善乃命左右曰去車漢武帝末年天下侈靡趨末百姓多離農畝上從容以問太中大夫給事中東方朔曰吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歷久逺臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劒莞蒲為席兵木無刃衣緼無文集上書囊以為殿帷以道德為麗以仁義為準於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳳闕右神明號稱千門萬户木土衣綺繡狗馬被繢罽宮人簮玳瑁垂珠璣設戲車教馳逐飾文采叢珍怪撞萬石之鍾擊雷霆之鼓作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣之計推甲乙之帳燔之於四通之衢却走馬視不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里願陛下留意察之元帝即位徴貢禹為諫大夫是時年歲不登郡國多困禹奏言古者宮室有制宫女不過九人秣馬不過八匹牆塗而不雕木摩而不刻車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡他賦斂繇戍之役使民歲不過三日千里之內自給千里之外各置貢職而已故天下家給人足頌聲並作至髙祖孝文孝景皇帝循古節儉宫女不過十餘廄馬百餘匹孝文皇帝衣綈履革器亡雕文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效衣服履褲刀劔亂於主上褲古袴字主上時臨朝入廟衆人不能别異甚非其宜然非自知奢僭也猶魯昭公曰吾何僭矣今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂方今宫室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥三服官主作天子之服在齊地笥盛衣竹器音先嗣反方今齊三服官作工各數千人一歲費數巨萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬三工官謂少府之屬官考工室也右工室也東園匠也東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宮見賜杯案盡文畫金銀飾非當所以賜食臣下也東宫之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死死又不葬為犬豬所食人至相食而廄馬食粟若其大肥氣盛怒至乃日步作之日日行步而動作之以散光溢之氣王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫及棄天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也故使天下承化取女皆大過度取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫及衆庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之罪也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二子産多少有命審察後宫擇其賢者留二十人餘悉歸之及諸陵園女亡子者宜悉遣獨杜陵宮人數百誠可哀憐也廄馬可亡過數十匹獨舍長安城南苑地以為田獵之囿舍置也獨留置之其餘皆廢去自城西南至山西至鄠皆復其田以與貧民方今天下飢饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也故詩曰天難諶斯不易惟王上帝臨女母二爾心當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也若其阿意順指隨君上下上下猶言髙下謂茍順從也臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食榖馬水衡減食肉獸省宜春下苑與貧民田又罷角抵諸戲及齊三服官禹又言諸離宫及長樂宫衛可減其大半以寬繇役又諸官奴婢十萬餘人戲遊亡事稅良民以給之歲費五六巨萬宜免為庶人稟食令代關東戌卒乘北邊亭塞候望又欲令近臣自諸曹侍中以上家亡得私貶賣與民爭利犯者輒免官削爵不得仕宦哀帝時龔勝居諫官數上書求見言百姓貧盜賊多吏不良風俗薄災異數見不可不憂制度泰奢刑罰泰深賦斂泰重宜以儉約先下東漢章帝時馬廖代趙喜為衛尉時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宫以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政風移必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有功事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉朂法太宗之隆德戒成衰之不終易曰不恆其德或承之羞誠令斯事一竟則四海誦德聲薰天地神明可通金石可勒而況於行仁心乎況於行令乎願置章坐側以當瞽人夜誦之音太后深納之靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦樂安太守陸康上疏諫曰臣聞先王治世貴在愛民省徭輕賦以寧天下除煩就約以崇簡易故萬姓從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從苟欲故黎民吁嗟隂陽感動陛下聖德承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圗夫十一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡主之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望魏明帝時百姓凋匱而役務方殷閺鄉侯衛覬上疏曰夫變情厲性強所不能人臣言之既不易人主受之又艱難且人之所樂者富貴顯榮也所惡者貧賤死亡也然此四者君上之所制也君愛之則富貴顯榮君惡之則貧賤死亡順指者愛所由來逆意者惡所從至也故人臣皆爭順指而避逆意非破家為國殺身成君者誰能犯顔色觸忌諱建一言開一説哉陛下留意察之則臣下之情可見矣議者多好恱耳其言政治則比陛下於堯舜其言征伐則比二虜於貍鼠臣以為不然昔漢文之時諸侯強大賈誼纍息以為至危況今四海之內分而為三羣士陳力各為其主其來降者未肯言舍邪就正咸稱逼於困急是與六國分治無以為異也當今千里無煙遺民困苦陛下不善留意將遂凋弊難可復振禮天子之器必有金玉之飾飲食之肴必有八珍之味至於凶荒則徹膳降服然則奢儉之節必視世之豐約也武皇帝之時後宮食不過一肉衣不用錦繡茵褥不緣飾器物無丹漆用能平定天下遺福子孫此皆陛下之所親覽當今之務宜君臣上下並用籌䇿計校府庫量入為出深思句踐滋民之術尤恐不及而尚方所造金銀之物漸更增廣工役不輟侈靡日崇帑藏日竭昔漢武信求神仙之道謂當得雲表之露以餐玉屑故立仙掌以承髙露陛下通明每所非笑漢武有求於露而猶尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也吳烏程侯寶鼎元年時居武昌揚州民泝流供給甚苦之又奢侈無度公私窮匱左丞相陸凱上疏曰今無災而民命盡無為而國財空臣竊痛之昔漢室既衰三家鼎立今曹劉失道皆為晉有此目前之明驗也臣愚但為陛下惜國家耳武昌土地險瘠非王者之都且童謡云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居此足明民心與天意矣今國無一年之蓄有露根之漸而官吏務為苛急莫之或恤大帝時後宮女不滿百景帝以來乃有千數此耗財之甚者也又左右率非其人羣黨相扶害忠隱賢此皆蠧政病民者也願陛下省百役罷苛擾出宫女清選百官則天恱民附而國安矣吳主雖不恱以其宿望特優容之時吳俗奢侈中書丞華核上疏曰今民貧俗奢轉相倣效兵民之家內無甔石之儲而出有綾綺之服上無尊卑等級之差下有耗財費力之損求其富給庸可得乎晉武帝太康三年中護軍羊琇後將軍王愷散騎常侍石崇三人皆富於財競以奢侈相髙車騎司馬傅咸上書曰先王之治天下食肉衣帛皆有其制奢侈之費甚於天災古者人稠地狹而有儲蓄由於節也今土廣人稀而患不足由於奢也欲時人崇儉當詰其奢奢不見詰轉相髙尚則無有窮極矣後魏宣武帝時散騎常侍邢巒奏曰臣聞昔者明王之以德治天下莫不重粟帛輕金寶然粟帛安國育民之方金玉是虛華損德之物故先皇深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務竒綺至乃以紙絹為帳扆銅鐵為轡勒訓朝廷以節儉示百姓以憂務日夜孜孜小大必慎輕賤珠璣示其無設府庫之金裁給而已更不買積以費國資逮景明之初承升平之業四疆清晏逺邇來同於是蕃貢繼路商賈交入諸所獻賀倍多於常雖加以節儉猶歲損萬計珍貨常有餘國用常不足若不裁其分限便恐無以支歲自今非為要須者請皆不受宣武從之秦主苻堅自平諸國之後國內殷實遂示人以侈懸珠簾于正殿以朝羣臣宮宇車乘器物服御悉以珠璣琅玕竒寶珍怪飾之尚書郎裴元略諫曰臣聞堯舜茅茨周卑宮室故致和平慶隆八百始皇窮極奢麗嗣不及孫願陛下則采椽之不琢鄙瓊室而不居敷純風於天下流休範於無窮賤金玉珍榖帛勤恤人隱勸課農桑捐無用之器棄難得之貨敦至道以厲薄俗修文德以懷逺人然後一軌九州同風天下刑措既登告成東嶽蹤軒皇以齊美哂二漢之徙封臣之願也堅大恱命去珠簾以元略為諫議大夫後周武帝保定間豪富之家競為奢麗外史下大夫黎季明上書曰頃者亢旱踰時人懷望歲陛下爰發明詔廣求六瘼同禹湯之罪已髙宋景之守正澍雨應時年穀斯稔剋己節用慕質去華此則尚矣然而朱紫仍耀於衢路綺縠猶侈於豪富短褐未充於細人糟粳未厭於編户此則勸導之理有所未周故也今雖導之以禮齊之以刑風俗固難以一矣昔漢文帝集上書之囊以作帷帳惜十家之産不造露臺後宮所幸衣不曵地方之今日富室之飾嘗不如婢𨽻之服然而以身率下國富刑清廟稱太宗良有以也臣聞聖人久於其道而天下化成今承魏氏衰亂之後貞信未興宜先尊五美屏四惡革浮華之俗抑流競之風察鴻都之小藝焚雉頭之異服無益之貨勿重於時虧德之器勿陳於側則人知德矣唐太宗貞觀四年上謂侍臣曰崇飾宮宇逰賞池臺帝王之所欲百姓之所不欲帝王所欲者放逸百姓所不欲者勞弊孔子云有一言可以終身行之者其恕乎己所不欲勿施於人勞弊之事誠不可施於百姓朕尊為帝王富有四海事皆由己誠能自節若百姓不欲必能順其情也魏徵曰陛下本憐萬姓每節己以順人臣聞以欲從人者昌以人樂己者亡隋焬帝志在無厭雖好奢侈所司每有供奉營造小不稱意則有峻罰嚴刑上之所好下必有甚競為無限遂至滅亡非惟書籍所傳亦陛下目所親見為其無道故天命陛下代之陛下若以為足今日不啻足矣若以為不足更萬倍過此亦不足太宗曰公所奏對甚善非公朕安得聞此言太宗嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾邪諫議大夫禇遂良對曰雕琢害力農纂繡傷女工奢靡之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得開及夫橫流則無復事矣帝咨美之玄宗時天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事中書舍人常衮以為漢文帝還千里馬不用晉武帝焚雉頭裘宋髙祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆淫侈不急而節度使刺史非能男耕而女織者類出於民是斂怨以媚上也請皆還之今軍旅未寧王畿户口十不一在而諸祠寺寫經造像焚幣埋玉所以賞賚若比邱道士巫祝之流歲巨萬計陛下若以易芻粟減貧民之賦天下之福豈有量哉穆宗嘗問侍臣曰司馬遷言漢文帝惜十家之産而罷露臺身衣弋綈履革舄集上書囊為殿帷信乎何太儉邪中書侍郎同中書門下平章事崔植對曰良史非貌言漢承秦侈縱之餘海內凋窶文帝從代來知稼穡艱難是以躬履儉約為天下守財景帝遵而不改故家給户足至武帝時錢朽貫穀紅腐乃能出師征伐威動四方然侈靡不節末年户口減半稅及舟車人不聊生乃下哀痛詔封丞相為富民侯然則帝王不可以不示儉而天下足帝曰卿言善患行之為難耳敬宗立侈用無度詔浙西上脂盝粧具觀察使李德裕奏曰比年旱災物力未完乃三月壬子赦命常貢之外悉罷進獻此陛下恐聚斂之吏緣以成姦雕窶之人不勝其敝也本道素號富饒更李錡薛蘋皆𣙜酒於民供有羡財元和詔書停𣙜酤又赦令禁諸州羡餘無送今存者惟留使錢五十萬緡率歲經費常少十三萬軍用褊急今所須脂盝粧具度用銀二萬三千兩金百三十兩物非土産雖力營索尚恐不逮願詔宰相議何以俾臣不違詔旨不乏軍興不疲人不斂怨則前敕後詔咸可遵承不報方是時罷進獻不閲月而求貢使者足相接於道故德裕推一以諷他又詔索盤絛繚綾千匹德裕又上奏曰臣昨緣宣索已具軍資歲計及近年物力聞奏伏料聖慈必垂省覽又奉詔旨令織定羅紗袍段及可幅盤絛繚綾一千匹伏讀詔書倍增惶灼臣伏見太宗朝臺使至涼州見名鷹諷李大亮令獻之大亮密表陳誠太宗賜詔報云有臣若此朕何憂再三嘉歎事載史書又玄宗令中使於江南採鵁鶄諸鳥汴州刺史倪若水陳論玄宗亦賜詔嘉納其鳥即時皆放又令皇甫詢於益州織半臂背子琵琶銲撥鏤牙合子等蘇頲不奉詔書輒自停織玄宗皆不加罪欣納所陳臣竊以鵁鶄鏤牙至為微細若水等尚以勞人損德瀝款效忠當聖祖之朝有臣如此豈明王之代獨無其人蓋有蔽者弗言非陛下拒而不納又伏覩四月二十三日德音云侯伯有位之士無或棄余謂不可者其有違道傷理徇欲懷安面刺廷爭無冇隱諱則是容納善道增光祖宗不盡忠規過在臣下況立鵝天馬蹙豹盤絛文彩珍竒只合聖躬自服今所織千匹費用至多臣愚亦所未曉昔漢文衣弋綈之衣元帝罷輕纎之服仁德慈儉至今稱之伏乞陛下近覽太宗玄宗之容納逺思文帝孝元之恭已以臣前表宣示羣臣酌臣當道物力所宜更賜節減則海隅蒼生無不受賜文宗嘗見中書舍人栁公權於便殿舉袖示之曰此衣已三浣矣衆皆美上儉德公權獨無言上問其故對曰陛下貴為天子富有四海當進賢退不肖納諫諍明賞罰乃可以致雍熙服浣濯之衣乃末節耳南唐嗣主保大中太常博士陳致雍上奏曰臣聞尊卑有倫貴賤有序下及黎庶車輿服馬宫室飲食嫁娶喪祭之分事有宜適物有節文若無制度何以防其淫侈救其雕敝者哉臣且覩保大以來條約庶民居止舍宇間架無過大衣服車馬各有彰别至今撙節上下不渝猶有市廛閭閈之間銷金畫繒為婦人裙衣中被之屬奢溢者爭浮競偽循法守正之士猶未能素厚自處何況中庸之人出見紛華盛麗心意蕩恱老氏不云乎不見可欲使心不亂由是漸漬失教被服成俗既而正金銷盡朽壞同歸數年之中奢蠧尤甚臣又聞國奢則示之以儉國儉則示之以禮其或從上化下而民焉敢踰越伏以皇帝陛下絶素為治偷薄者聞之而自革正明宣化貪叨者知之而自懲于今十有三載躬行節儉未嘗怠佚而於有司之官法度不考憲式不彰其致姦色而流成弊故也臣叨禮職無禆聖政輒斯陳露上逹聰明伏乞宣下所司特頒嚴敕條約世人不得踵前更有造作銷金衣服如有故違重以法繩之其王公之室卿士之家並禁斷所冀率其庶民以次漸變頽風自然修本宋太宗太平興國中鹽鐵判官張觀嘗因奏事白上曰陛下務敦淳化殿宇采飾皆徹去之惟尚朴素天下幸甚然於服御器用臣願亦從純儉上曰朕庶事簡約至於所服多用絁絹皆經浣濯爾卿言甚善觀頓首謝真宗咸平中都官劉蒙叟上疏曰陛下已周諒暗方勤萬務望崇儉德守前規無自矜能無作奢縱厚三軍之賜輕萬姓之徭使化育被於生靈聲教加於中外且萬國已觀其始惟陛下慎守其終思鮮克之言戒習性之漸則天下幸甚上嘉之仁宗明道二年殿中侍御史龎籍上奏曰臣近者伏見傳降聖旨差雇玉工真珠匠小臣踈賤不知所造服用然而職在耳目之官茍有愚見不敢緘默恭惟陛下自纂位以來積德修道日謹一日近無耽好之玩逺無追求之勞古之聖明未易能過然今水旱相仍公私俱困北有林胡之抗敵西有元昊之凶狡尤宜恭儉齊紀律惜國用以豐實制兵威而震耀臣愚以謂不急之服玩近奢之器物悉宜屏絶以勸天下書曰不矜細行終纍大德禮曰無作淫巧以蕩上心願陛下視珍竒為棄物以奢侈為覆車籍為右司諫時上奏曰臣昨到太平州界體量安撫本處檢會廣德軍判官錢中孚當塗縣主簿兼嘉祥縣尉溫宗賢等狀稱往諸鄉檢旱竊見貧民多食草子名曰烏昧并取蝗蟲曝乾摘去翅足和野菜合煮食别無虛妄者臣竊思之東南上供糧米每歲六百萬石至於府庫物帛皆出於民民於飢年艱食如此國家若不節儉生靈何以昭蘇臣今取前件草子封進伏望宣示六宫藩戚庶抑奢侈以濟艱難仍乞密下裁造務後苑文思院糧料院檢祖宗之朝每歲用度之費數目比於今時則奢儉自見伏望聖慈特降進止則天下幸甚籍調陜西轉運使時又上奏曰臣伏見連年災異天久不雨臣謂弭災消禍在朝廷自修比年費用奢廣倉廪出納不嚴內中須索既多有司以慿申除破無緣鈎較虛實臣竊為凡乘輿所用宮中所費宜取先朝為則今宿師西鄙力戰重傷方獲功賞而內官醫官樂官無功時享豐賜故天下指目謂之三官願少裁損無厚賚豫專勵戰功邉鄙不足平也寶元元年天章閣待制賈昌朝上奏曰臣伏見西夏僭妄出師命將以貽朝廷之憂臣竊謂此固不足慮而國家用度素廣儲蓄不厚民力頗困是則可憂自天聖以來屢詔有司節省用度以至于今未聞有所施行古者四方無事則修政令務稼穡倉廪有積穀府庫有羡財節用愛人以戒不虞卒有水旱寇攘之至而無所憂自三代而下稱王業盛者唯漢爾文景以恭儉故風俗厚財用足至于武帝務勤征伐始算緡錢𣙜酤以助軍旅之給而天下蕭然矣至昭帝議鹽鐵罷𣙜酤省徭役篤耕種凡侵蠧民利者一切寬貸之時賜租賦使民得以足衣食內則省宰夫樂工希文景之風以厚儲蓄數百年間四夷咸服百姓不厭漢德者無他道也節用愛人崇本抑末之所致也宋受命八十載可謂治平矣然節愛之術有所未至邊陲雖寧而兵備不省徭役雖簡而農務不篤外厚幣聘而內豐廪藏自餘虛用冗費難以悉數天下諸道若京之東西財可自足陜右河朔歲須供饋所仰者淮南江東數十郡爾故田稅不足重以𣙜禁凡山澤市井之利靡有厚薄悉入於公上而民不得售加以不耕不織遊惰之俗蠶食為害都人士女燕安太平忘衣食艱難之患習尚奢侈重傷民力農所以困國之儲蓄所以不厚者職此之由夫國財民力靡於無用之日故當其有事不得不憂臣嘗治畿邑有禁兵三千而留萬户賦輸僅能了足其三年賞給仍出自內府況他郡邑兵不啻此推是可以知天下虛實矣臣又嘗掌京廪計江淮歲運糧六百餘萬以一歲之入僅能充朝廷之用三分二在軍旅一在冗食所蓄聚不盈數天下太平已久而財不藏於國又不在於民儻有水旱頻仍之災軍戎調度之急計將安出哉願陛下鑒已往之失察當今之務取景德已來迄于景祐凡百用度靡有巨細校其所入所出之數約以祖宗舊制其不急者皆省罷之二年右司諫韓琦上奏曰臣準敕以御史王素上言乞依賈昌朝所奏取景德至景祐年凡百用度靡有巨細較計所入所出之數省罷不急等事蒙差張若谷任中師并臣與三司同共詳所奏定奪減省聞奏竊以臣先監左藏庫日朝廷亦曽差官於三司令將咸平景德天聖景祐年支費比附其時三司已撿尋天聖已前帳案不足遂下在京諸司庫務差人監勒撿尋亦是多不存在甚為騷擾臣輒上言若檢前項年分帳案得全比附見今來支費數多朝廷若不節用乃是徒托空文或勘會近年帳案但見得冗費即行減罷亦不須見逺年文字蒙下三司撿尋終不齊足只將近年帳案勘會絶結了當今陛下崇恭儉之本沛然垂詔以經費有度復議均節斯乃陛下興化致理愛養元元之深意也天下黎民實蒙惠福若又須將景德至景祐年逐月用度較計必是依前虛有勞費淹滯無成況今西鄙設備聚財實邊之費所宜移兹冗用以助兵須豈可遷延歲時不求速效臣欲乞將三司逐案景德年後來帳籍及照證文字勘會不必年分整齊但見得官中支用顯有虛費即定奪減省聞奏臣伏覩古先哲王興儉以勸天下必以身先而後臣庶省分有司率職從上之令猶風靡而響應之也雖有僥幸覬覦之徒抑制其欲亦不敢興造怨語動惑衆心何則上躬行而下之所勸也臣愚欲望陛下飭宮掖之間先務節儉凡奢靡之飾竒巧之玩無名之賜無度取索一切罷之仍詔三司與臣等計會入內內侍省御藥院內東門司取先朝及今來賜豫支費則例比附酌中定奪減省等定奪之後或有飛語流謗斷在宸𠂻屏而不聽如此則縣官之用可期充足且內藏宜聖景福等殿庫蓋纍蓄聚以備非常今或外用既節而不絶內帑支取即與外庫供億縻費一同亦望陛下深思祖宗經久之制更務謹節臣又以出納之用各有攸司冗費之敝必能知悉仍乞特降敕命下三司委諸路轉運副使發運司逐處知州通判在京諸司庫務管當官員除官吏兵馬請給則例自來已有定制不在起請外如有諸般用度顯有虛費可以省減者即具利害擘劃聞奏降下依敕定奪三司人吏有所見亦聽經三司具狀陳述如顯然大假減省得官中錢物其起請官吏即乞特行酬奬臣備員諫列誤被聖選不避衆怨罄竭上陳唯冀裁擇早賜進用慶厯六年張方平上言曰伏以天下承平為歲深逺而國用不贍民力益困今聚師境上調費寖廣倚於經入則財不給加以橫賦則人不堪救兹交急特在陛下身先於率下惟事事乃其撙約而已臣竊惟陛下躬勤節用克自抑畏凡諸服御殊為菲薄而兹中外之論皆言用度之過臣竊疑之蓋宮闈嬖昵左右近習假威恣橫敢為欺誣仰恃仁慈緣為姦弊且禁中呼索輒稱聖旨有司應奉皆為上供故外不知其詳而譏議纍乎盛德國家帑藏之困乃羣下侵牟之蠧也伏願陛下上念宗社之計下以生民為心彼婦人宦者何煩過為姑息超然逺慮斷自天心試取先帝之世及陛下臨御以來天聖之初官司帳籍如內東門之類比較近年支費金帛則知增損豐儉之數以一言裁減之恩為萬方富庶之本兆民所賴為幸實深先朝已前事恐難繼若天聖初體例夫豈逺哉因降詔書諭天下以陛下憂邊之心愛民之故則將卒聞之孰不奮勵以投命士民聞之孰不鼓舞以稱仁至于外諸司庫務凡百橫費乞特置司局選用公平通敏諳曉時務之士三兩員條理之而以大臣一人監領其事其不便者惟是左右主當之人爾誠陛下斷之不疑無容沮撓則上可以資德美下可以施恩惠內可以集國計外可以成武功效速而利多事近而德逺此當世之切務也方平又論減省財用事曰臣近受敕同賈昌朝等定奪減財費竊聞淵旨先自宮禁裁損一切用度至于聖躬奉給緡錢亦令罷供此蓋陛下身先勤儉為生靈計夫減省所為者自下而議上則於體不順由上以率下則於名為正臣願以禁中所行之事擇其大者三數節宣示外廷因發明詔使天下共知聖意憂邊愛人之深則中外臣庶得不體國家之急上成德美者乎特在陛下斷之清衷不屑細言則成效可冀也其有徇已之利與則喜奪則怒此女子與小人之情怨謗所由生也臣輩敢不竭精盡慮上副天心皇祐元年右司諫錢彥良上奏曰臣伏見真宗皇帝詔書以塗金冗費上自宮掖下及庶民一皆禁止三十年間不敢有犯陛下奉以儉約遵守祖宗舊章雖申明塗金之敕歲下而近日戚里諸親權要族黨並以塗金衣服首飾相尚日增盛麗以至三朝慶會被服入宮蔑視刑典習為慣事且此巧偽之物蕩昏心目無益飢寒風俗所以趨競者禁雖立而法不行故好之愈甚況真宗皇帝崇本沖素講求制度欲為萬世之戒豈可使之廢墜此乃國家守成大要屬在陛下今欲乞嚴禁約塗金匠人依舊條處斬如情理稍輕刺面決配千里外牢城臣僚之家用使造作並科違制皇親戚里即不支俸錢一年其失於紏察賞罰並依先朝之舊仍乞指揮內東門司使臣如有諸親命婦郡縣主等入內輒服金衣首飾者並畫時禁止不令入內一面具姓名申奏勘責如本非私情别因事彰露亦與同罪所貴先朝之制遵行天下嘉祐六年知諫院何郯上奏曰臣等竊見今歲以來災異屢臻日食地震江淮騰溢風雨害稼民多菜色此正陛下側身克己未敢擅恣之時而道路流言皆云天子近日宫中燕飲微為過差賞賚之費動以萬計耗散府庫調斂細民況酒之為物傷性敗德禹湯所禁周公所戒殆非所以承天憂民輔養聖躬之道也陛下恭儉之德彰信兆民議者皆以為後宫奢縱務相誇尚左右近臣利於賞賚陛下重違其請屈意從之夫天以剛健為德君以正固為事奈何徇後宫左右之欲上忽天戒下忘民病中不為宗廟社稷深自重惜臣等愚惑竊為陛下不取伏望陛下當此之際悉罷燕飲安神養氣後宮妃嬪進見有度左右小臣賞賚有節及厚味臘毒之物無益奉養者皆不宜數御以傷於和乃可以解皇天譴告之威慰元元窮困之望保受命無疆之休也八年知諫院司馬光上劄子曰臣伏覩聖恩頒賜羣臣以大行皇帝遺留物如臣所得已近千緡况名位漸髙必霑賚愈厚舉朝之內所費何啻巨萬竊以國家用度素窘復遭大喪纍世所藏幾乎掃地傳聞外州軍官庫無錢之處或借貸民錢以供賞給一朝取辦逼以捶楚當此之際羣臣何心以當厚賜況將來山陵所須全未有備國信往來又當供億萬一更有水旱軍旅之虞不知朝廷何以處之若國用不足必重斂於民民已困窮何以供命飢寒所驅必為盜賊此乃安危之本願陛下深思熟慮勿以為細事而忽之也臣誠知乾興之際曽有此例亦恐當時所賜不至如此之多況當時帑藏最為富實今事力耗竭十無一二豈可但云舊例不思損益況委質為臣共圖國事股肱耳目譬猶一體安則俱安危則俱危豈待多得金珠然後輸忠盡力恐非所以遇士大夫之道也今天崩地坼率土哀摧羣臣各遷一官不隔磨勘恩澤已厚誠不忍更受賜物因公家之禍為私室之利伏望聖慈許令侍從之臣各隨其意進奉金帛錢物以助供山陵之費如此則君恩下流臣誠上逹上下相愛洽於至和既可以少紓民力又不至有傷國體光又上劄子曰臣於今月十五日曽具劄子上言乞詳令侍從之臣進奉金銀錢帛以助山陵之費至今未聞降出臣亦曽與同輩具狀詣客省進物蒙批降指揮以乾興年中無此例不令收接其事理本末臣已於前來劄子內一一奏陳今更不敢重復有言竊以方今國家多虞人心危懼正是朝廷斟酌時宜損益變通之際豈可不究利害但詢舊例而已況所賜羣臣之物比舊例過多幾倍而羣臣有所進獻則云舊例無之雖聖恩務在優隆然羣臣有廉耻之心者何面目以自安又州縣鞭撻平民逼取錢物以濟一時之急不知乾興年中何嘗有此例也以此見國家虛實緩急逐時不同豈可專執舊文不加裁損今大喪之後內外困窮几百在位之臣皆當焦心刻己以救其患若受此非常之賜恬然有之曽不為愧則士衆必曰我輩勞苦而所得微薄羣臣安坐而享厚利其心安得不怨百姓亦曰我輩剝膚椎髓以供賦斂而浩浩入羣臣之家如泥沙不惜其心安得不怒近者怨逺者怒為國計者可以不深思逺慮乎是以臣輩區區欲輸此物非謂可以增帑藏之富助用度之急也其意蓋以通上下之情慰逺近之心塞無厭之怨解重斂之怒伏望朝廷留心省察知其為安危之本非臣誇小廉競小忠也臣今來并前來所奏劄子共二道並乞早降付中書樞密院同共商量施行光又上奏乞制國用曰臣近曽上疏以即今公私財用率皆窮窘專奉目前經費猶汲汲不足萬一有大水大旱飢饉相仍敵人侵邊盜賊羣起發兵誅討不時克定倉庫已空百姓又竭其憂患不細必當早為之謀以救斯弊乞隨材用人使久於其任務農通商以蕃息財物節省賜豫裁損浮費又以宰相領總計使之職凡天下金帛錢穀屬於三司不屬三司者總計使皆領之歲終則校其出入之數若入少而出多則思其所以救補之術奏而行之常使歲餘三分之一以備飢饉軍旅非常之費其內外錢穀官之長皆委總計使察其能否考其功狀以奏而誅賞之此誠當今之急務伏望陛下與公卿大臣定議早賜施行仁宗時陜西用兵權度支判官宋祁上疏曰臣伏見西賊叛逆未即梟截申命將校警飭邊陲陛下日仄憂勤特軫調發內經聖慮旁咨群謀臣誠不肖竊用感憤以為勇夫行外儒者計內合為威略以行天誅則跳梁小醜指期烹醢故敢妄陳愚見以佐萬一臣聞兵以食為本食以貨為資在易聚人在書八政誠聖人一天下之歸之具也以天下取之以天下用之量入為出故天子不得私焉傳曰足食足兵民信之矣今在藏無積年之鏹太倉乏三歲之儲南方冶銅匱而不發承平如此已自雕困其故何哉良由取之既殫而用之無度也臣不能悉知朝廷之經費且以臣素所見者言之何者大有三冗小有三費以困天下之財財窮用褊乃今更欲興數十萬衆無謀甚矣陛下誠能超然逺覽燭見根本去三冗節三費專奉西北之屯尚可曠焉髙枕無匱乏之患何謂三冗天下有定官無限員一冗也天下廂軍不任戰而耗衣食二冗也僧尼道士日益多而無定數三冗也三冗不去不可為國今陛下詔於此斷自今日僧尼道士已受戒具者且使如舊其在寺帳為徒弟子者悉還為民勿復歲度今日已後州縣寺觀留若干所僧尼道士定若干人且令後來之數不得過此此䇿一舉可得耕織夫婦五十萬人則一冗去矣今天下廂軍不擇孱小尫弱悉皆收配才圖供役本不知兵亦且月費廪糧歲費庫縑數口之家不能自庇於是相挻逃匿化為盜賊者不可勝算朝廷每有夫役更藉農民以任其勞假如廂軍可令驅以就役方且别給口劵間望賜錢二端相準不便明甚陛下若敕天下廂軍今日以後除州軍須要防捉别留三百人自餘更不收補已在籍者許備役終身如此則中下之家悉入農業又得力耕者數十萬則二冗去矣國家郡縣素有定官譬以十人為額常以十二加之遷代罪謫足以無乏今則不然一位未缺十人競逐紆朱滿路襲紫成林州縣之地不廣於前而陛下官五倍於舊吏何得不茍進官何得不濫除陛下誠能詔審官院內諸司流內銓明立限員以為定法自今已往門廕流外貢舉之色實置選限稍務擇人俟有闕官計員補吏內則省息奉廪外則靜一浮華則三冗去矣何謂三費一曰道場齋醮無日不有若七日若一月若四十九日各挾主名未始暫停至於蠟蔬膏麵酒稻錢帛百司供億不可資計而主者旁緣利於欺撥故奉行崇尚故干典法皆以祝帝壽奉先烈祈民福為名欲令臣下不得開説臣愚以為陛下上事天地宗廟次事社稷百神醴酪粢盛犧牲玉幣使有司端委而奉之歲時而薦之足以竦明德於天極介多福於黔庶何必道場齋醮希屑屑之報哉是國家抱虛以考祥小人誣神而獲利耳陛下若斷自聖慮取必不可罷者使略依本教以奉薰修開啓有時賜與有度則一費節矣二曰京師寺觀或多設徒卒或增致官司衣糧所給三倍他處帷幄謂之供養田産謂之常住不徭不役坐蠧齊民而又競飾神祠爭修塔廟皆曰不費官帑自募民財此誠不逞罔上之尤者夫民藏於國國藏於民財不天來而由地出也役不使鬼而待人作也捨國取民其傷一焉伏望陛下切敕州縣普令罷止則二費節矣三曰使相節度不𨽻藩要貪取公用全濟私家迹夫節相之建或當邊鎮或臨師旅也公用之設或以饗賔也今則不然罷黜大臣率叨使相安居都邑普蒙公用取生人之資力為無功之奉養坐縻邦用莫此為甚伏望陛下寶惜名器使授受惟才自今地非邊要州無師屯者不建節度已帶節度不得留近藩及京師則三費節矣三冗已去三費已節數年之內用度必饒臣又聞之人不率則不從身不先則不信陛下若能躬服至儉風示四方錦綵金玉不得妄費請自後宫為始衣服醪膳無溢舊規請自乘輿為始然後天下嚮應民業日豐人心不搖師役可舉雖使風行電照飲馬西河蠢爾戎酋可玩之股掌中矣寧與今日誅求財用課鹽榷茗為戚戚之計者同年而語哉臣誠狂妄不曉禁忌輕進愚䇿惟陛下裁赦其辜知諌院包拯上奏曰臣伏見景德祥符中文武官總九千七百八十五員今內外官屬總一萬七千三百餘員其未授差遣京官使臣及守選人不在數內較之先朝才四十餘年已逾一倍多矣切以唐虞建官惟百夏商倍之周設六官僚屬漸廣秦併六國郡縣益衆降及漢魏以至隋唐雖設官寖多然未有如本朝繁冗甚也今天下州郡三百二十縣一千二百五十而一州一縣所任之職素有定額大率用吏不過五六千員則有餘矣今乃三倍其多而又三歲一開貢舉每放僅千人復有臺寺之小吏府監之雜工蔭序之官進納之輩總而計之不止於三倍是食祿者日增力田者日耗則國計民力安得不窘乏哉臣謹案景德中天下財賦等歲入四千七百二十一萬七千匹貫石兩支四千九百七十四萬八千九百匹貫石兩在京歲入一千八百三十九萬二千匹貫石兩支一千五百四十萬四千九百匹貫石兩慶歷八年天下財賦等歲入一萬三百五十九萬六千四百匹貫石兩支八千九百三十八萬三千七百匹貫石兩在京歲入一千八百九十九萬六千五百匹貫石兩支二千二百四十萬九百匹貫石兩況天下稅籍有常數矣今則歲入倍多者何也蓋祖宗之世所輸之稅只納本色自後以用度日廣所納並從折變重率暴斂日甚一日何窮之有且天下田土財用比之曩時虛耗漸以不逮豈於今而能倍之乎非天降地出但誅求於民無紀極爾輸者已竭取者未足則大本安所固哉臣以為冗吏耗于上冗兵耗于下欲救其弊當治其源在乎減冗雜而節用度若冗雜不減用度不節雖善為計亦不能救也方今山澤之利竭矣征賦之入盡矣幸而西北無事乃是可為之時若不鋭意而改圖但務因循必恐貽患將來有不可救之過矣伏望上體祖宗之成憲下恤生靈之重困謂設官太多也則宜艱難選舉澄汰冗雜謂養兵太衆也則宜罷絶招募揀斥老弱土木之工不絶者悉罷之科率之出無名者並除之省禁中奢侈之僭莭上下浮枉之費當承平之代建長久之治願陛下留神省察申命宰執條此數事而力行之則天下幸甚拯又上奏曰臣竊見中外臣僚士庶之家衣服首飾之類多用銷金工匠於闤闠之中任意制造殊不畏憚臣復詳編敕節文除大禮法物外上從中禁下暨庶邦但係衣服裝著之類土木玩用之物並不得以金為飾如違並科違制之罪其元業匠人輒更造作犯者當行處斬此蓋真宗皇帝躬行儉德以化天下故自中禁以及庶邦凡衣服玩用以金為飾者一切禁斷工匠置於極典致數十年間中外絶無犯者而近年以來時俗相尚銷金之作寖以公行近日尤甚其戚里及臣僚士庶之家衣服首飾並用銷金及生色內間金之類並無避懼蓋是匠人等故違條制厚取工錢上下相蒙無敢言者若不速行禁止切慮糜壞金寶扇長澆風競事浮華大損聖化欲乞嚴賜指揮申明舊制上以遵先帝崇儉之意下以絶臣庶好奢之漸英宗治平元年侍御史吕誨上奏曰臣竊以祖宗之有天下也削平諸國所聚財貨皆歸於內府數十年中區宇乂寧誠國富兵強之致也所謂內藏奉宸諸庫非有司關掌故外臣莫得知其登耗但慮歲月久支費寖廣不復當時之盛比來先帝樁留之物賜及小臣過越乾興之例拜賜者干今震恐蓋知祖宗艱難收聚之意非所以容其虛受爾如聞禁中取用尚亦無節加之近幸因緣侵漁以有限之積供無窮之費一旦四方有事何以枝梧陛下踐阼之初當謹持守修葺府庫謹嚴出納兹其時也臣欲乞今後內庫非旌賞功勞貸助經費一切浮用無俾仰給出入之籍亦行會計應禁中取索財寶不限內外庫所降合同須具支使者名目俾歲中會計知其過當則可以裁損及後苑創造服玩器用並付文思院所造之物工畢别差朝官點檢則官物無由枉破侵欺之路可以杜絶是亦節儉愛民之一端也唯聖神留意天下幸甚二年知諫院司馬光乞節用劄子曰臣竊見國家公私窮窘固非一日今兹復遇大災畿內秋田蕩無孑遺倉廪儲蓄率多敗壞府庫財帛散用將盡必恐今冬飢饉甚於去年軍民嗷嗷無以賑救經費不足重以郊禮此乃國用危急之時不可不早以為憂今取之於內帑則內帑已虛收之於外方則外方已盡斂之於下民則下民已竭不知朝廷將何以為計臣愚以為若非陛下側身克己痛自莭約則無以應答天意感慰民心使昏墊者忘其悲愁餒死者無所怨嗟也臣聞節用之道必自近始伏望上自乘輿服御之物下至親王公主婚嫁之具悉加裁損務從儉薄勿信主者以舊例為言出六宫冗食之人使之從便罷後苑文思院所造淫巧服玩止諸處不急之役然後命有司考求在外凡百浮費之事皆一切除去羣臣非有顯然功效益國利民者勿復濫加賞賜將來南郊自非犧牲玉帛供神之物其餘青城儀仗之類止於奉車駕備外飾者亦令有司與禮官同共參詳減省臣聞國有凶荒則殺禮事天者貴於內誠而賤外物是故器用陶匏席用藁秸況於青城儀仗之類何為不可減乎凡此數者唯在聖意斷而行之固不可與庸俗之人執文泥例者謀之也四年御史劉述上奏曰臣竊觀方今天下之事可謂困弊之極矣如久疾之人肢體羸薾氣息奄奄不能自持所可恃者脈理未憊而已誠得良醫而救藥之輔其氣血調其飲食時其寒溫庶幾可以復全也陛下有明德嘉道孳孳庶政醫之良者也所謂輔其氣血者輕徭薄賦以寬民力以固民心俾無怨畔是也調其飲食者道民務本教之儉約雖有水旱之困而無捐瘠之患是也時其寒溫者為擇良守宰以撫綏之利有可興者興之害有可去者去之是也百姓習於久安競以侈靡相尚居處服用率多僭差婚姻喪葬不計其費而以不若人為耻因而破産者有焉其致非他繇禁令不設故也管子曰倉廪實而知禮節衣食足而知榮辱若禁令不設人得自恣則倉廪奚由而實衣食奚由而足欲望其知禮節榮辱不可得也教化之行率自上起臣愚欲望陛下躬行莭儉以化天下臣聞太祖皇帝常服浣濯之衣乘輿服用皆尚質素寢殿設青布葦簾宫闈施布幕無文錦之飾嘗出麻履布裳以賜左右曰此我舊所服者也真宗皇帝嘗謂輔臣曰國家所務儉約為先當須節用愛人以富庶天下張齊賢對曰書稱大禹克儉于家老氏三寶儉居其一上好儉則國有餘財下不僭則家有剩資如此則天下自然富壽矣大哉聖人之德皆能抑情損欲而以身率人也如是經曰下之事上也不從其所令從其所好上好是物下必有甚者也臣固願陛下躬行莭儉以化天下也至於賜豫之事非有功德可以激勸於人者不可輕為也昔韓昭侯使人藏弊袴侍者曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰非爾所知也吾聞明主愛一嚬一笑嚬有為嚬而笑有為笑今夫袴之與嚬笑逺矣吾必待有功者而與之善哉人君之不妄賞人也如是古人有言人主不妄賞非徒愛其財也賞妄行則善不勸不妄罰非徒矜其人也罰妄行則惡不懲賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣陛下誠能以身先之然後敕下有司設為科條以絶僭侈之弊仍戒飭長吏使傳諭朝廷之意務崇約素以厚風俗若是則民之生業日益厚矣雖遇水旱之困而有儲蓄以禦之矣民財既充國用復省則徭賦之事自然輕薄矣兹實太平之基而萬世之利也在陛下勤而行之固而執之耳臣不勝惓惓之愚歷代名臣奏議卷一百九十一
