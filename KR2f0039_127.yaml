body:
  text: 歷代名臣奏議卷一百二十七明楊士竒等撰禮樂統言樂周景王二十三年王將鑄無射而為之大林單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼若積聚既喪人鮮其繼生何以殖且夫鐘不過以動聲若無射有林耳不及也夫鐘聲以為耳也耳所不及非鐘聲也猶目所不見不可以為目也夫目之察度也不過步武尺寸之間其察色也不過墨丈尋常之間耳之察和也在清濁之間其察清濁也不過一夫之所勝是故先王之制鐘也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出故聖人慎之今王作鐘也聽之弗及比之不度鐘聲不可以知和制度不可以出節無益於樂而鮮民財將焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉夫耳目心之樞機也必聽和而視正聽和則聰視正則明聰則言聽明則德昭聽言昭德則能思慮純固以言德於民民歆而德之則歸心焉上得民心以殖義方是以作無不濟求無不獲然後能樂夫耳內和聲而口出美言以為憲令而布諸民正之以度量民以心力從之不倦成事不二樂之至也口內味而耳內聲聲味生氣氣在口為言在目為明言以信名明以時動名以成政動以殖生政成生殖樂之至也若視聽不和而有震眩則味入不精不精則氣佚氣佚則不和於是乎有狂悖之言有眩惑之明有轉易之名有過慝之度出令不信刑政放紛動不順時民無據依不知所力各有離心上失其民作則不濟而求則不獲其何以能樂三年之中而有離民之器二焉國其危哉王弗聽問之伶州鳩對曰臣之守官弗及也臣聞之琴瑟尚宫鐘尚羽石尚角匏竹利制大不踰宫細不過羽夫宫音之主也第以及羽聖人保樂而愛財財以備器樂以殖財故樂器重者從細輕者從大是以金尚羽石尚角瓦絲尚宫匏竹尚議革木一聲夫政象樂樂從和和從平聲以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以贊之革木以節之物得其常曰樂極之所集曰聲聲應相保曰和細大不踰曰平如是而鑄之金磨之石繫之絲木越之匏竹節之鼓而行之以遂八風於是乎氣無滯隂亦無散陽隂陽序次風雨時至嘉生繁祉人民和利物備而樂成上下不罷故曰樂正今細過其主妨於正用物過度妨於財正害財匱妨於樂細抑大陵不容於耳非和也聽聲越逺非平也妨正匱財聲不和平非宗官之所司也夫有和平之聲則有蕃殖之財於是乎道之以中德詠之以中音德音不愆以合神人神是以寧民是以聽若夫匱財用罷民力以逞淫心聽之不和比之不度無益於教而離民怒神非臣之所聞也王不聽卒鑄大鐘二十四年鐘成伶人告和王謂伶州鳩曰鐘果和矣對曰未可知也王曰何故對曰上作器民備樂之則為和今財亡民罷莫不怨恨臣不知其和也且民所曹好鮮其不濟也其所曹惡鮮其不廢也故諺曰衆心成城衆口鑠金今三年之中而害金再興焉懼一之廢也王曰爾老耄矣何知二十五年王崩鐘不和東漢章帝時上以太常樂丞鮑鄴等上樂事下車騎將軍馬防防奏言建初一年七月鄴上言王者飲食必道須四時五味故有食舉之樂所以順天地養神明求福應也移風易俗莫善於樂樂者天地之和不可久廢今官樂但有太蔟皆不應日律可作十二月均各應其月氣乃能順天地和氣宜應明帝始令靈臺六律候而未設其門樂經曰十二月行之所以宣氣豐物也月開斗建之門而奏歌其律誠宜施行願與待詔嚴崇及能作樂器者共作治考工給所當詔下太常太常上言作樂器直錢百四十六萬請太僕作成上奏寢今明詔下臣防臣輒問鄴及待詔知音律者皆言聖人作樂所以宣氣致和順隂陽也臣愚以為可順上天之明特因歲首令正發太蔟之律奏雅頌之音以立太平以迎和氣魏明帝青龍中大治殿舍西取長安大鐘散騎常侍髙堂隆上疏曰昔周景王不儀刑文武之明德忽公旦之聖制既鑄大錢又作大鐘單穆公諫而弗聽伶州鳩對而弗從遂迷不反周德以衰良史記焉以為永鑒然今之小人好說秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也是日帝幸上方隆與卞蘭從帝以隆表授蘭使難隆曰興衰在政樂何為也化之不明豈鐘之罪隆曰夫禮樂者為治之大本也故簫韶九成鳯凰來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以隕大鐘既鑄周景以弊存亡之機恆由斯作安在廢興之不階也君舉必書古之道也作而不法何以示後聖王樂聞其闕故有針規之道忠臣願竭其節故有匪躬之義也帝稱善宋順帝升明二年王僧虔為尚書令僧虔好文史解音律以朝廷禮樂多違正典民間競造新聲雜曲時齊太祖輔政僧虔上表曰夫懸鐘之器以雅為用凱容之禮八佾為儀今總章羽佾音服舛異又歌鐘一肆克諧女樂以歌為務非雅器也大明中即以宫懸合和鞞拂節數雖會慮乖雅體將來知音或譏聖世若謂鐘舞已諧重違成憲更立歌鐘不參舊例四縣所奏謹依雅條即義沿理如或可附又今之清商實由銅爵三祖風流遺音盈耳京洛相髙江左彌貴諒以金石干羽事絶私室桑濮鄭衛訓隔紳冕中庸和雅莫復於斯而情變聽移稍復銷落十數年間亡者將半自頃家競新哇人尚謡俗務在噍殺不顧音紀流宕無崖未知所極排斥正曲崇長煩淫士有等差無故不可去樂禮有攸序長幼不可共聞故喧醜之制日盛於廛里風味之響獨盡於衣冠宜命有司務勤功課緝理遺逸迭相開曉所經漏忘悉加補綴曲全者祿厚藝妙者位優利以動之則人思刻厲反本還源庶可跂踵事見納梁武帝初樂緣齊舊武帝思𢎞古樂天監元年遂下詔訪百寮曰夫聲音之道與政通矣所以移風易俗明貴辨賤而韶濩之稱空傳咸英之實靡託魏晉以來陵替滋甚遂使雅鄭混淆鐘石斯謬天人缺九變之節朝宴失四懸之儀朕昧旦坐朝思求厥㫖而舊事靡存未獲釐正寤寐有懷所為歎息卿等學術通明可陳其所見於是散騎常侍尚書僕射沈約奏答曰竊以秦代滅學樂經殘亡至于漢武帝時河間獻王與毛生等共採周官及諸子言樂事者以作樂記其內史丞王定傳授常山王禹劉向校書得樂記二十三篇與禹不同向别録有樂歌詩四篇趙氏雅琴七篇師氏雅琴八篇龍氏雅琴百六篇唯此而已晉中經簿無復樂書别録所載已復亡逸案漢初典章滅絶諸儒捃拾溝渠牆壁之間得片簡遺文與禮事相關者即編次以為禮皆非聖人之言月令取吕氏春秋中庸表記防記緇衣皆取子思子樂記取公孫尼子檀弓殘雜又非方幅典誥之書也禮既是行已經邦之切故前儒不得不補綴以備事用樂書事大而用緩自非逄欽明之主制作之君不見詳議漢氏以來主非欽明樂既非人臣急事故言者寡陛下以至聖之德應樂推之符實宜作樂崇德殷薦上帝而樂書淪亡尋案無所宜諸生分令尋討經史百家凡樂事無大小皆别纂録乃委一舊學撰為樂書以起千載絶文以定大梁之樂使五英懷慙六莖興愧大同二年侍中蕭子雲以梁初郊廟未革牲牷樂辭皆沈約撰至是承用子雲始建言宜改啓曰伏惟聖敬率由尊嚴郊廟得西鄰之心知周孔之迹載革牢爼德通神明黍稷蘋藻竭誠嚴配經國制度方懸日月垂訓百王於是乎在臣比兼職齊官見伶人所歌猶用未革牲前曲圜丘視燎尚言式備牲牷北郊諴雅亦奏牲云孔備清廟登歌而稱我牲以潔三朝食舉猶詠朱尾碧鱗聲被鼓鐘未符盛制臣職司儒訓意以為疑未審應改定樂辭以不敕答曰此是主者守株宜急改也仍使子雲撰㝎敕曰郊廟歌辭應須典誥大語不得雜用子史文章淺言而沈約所撰亦多舛謬子雲答敕曰殷薦朝饗樂以雅名理應正採五經聖人成教而漢來此製不全用經典約之所撰彌復淺雜臣前所易約十曲惟知牲牷既革宜改歌辭而猶承例不嫌流俗乖體既舉令㫖始得發矇臣夙本庸滯昭然忽朗謹依成㫖悉改約制惟用五經為本其次爾雅周易尚書大戴禮即是經誥之流愚意亦取兼用臣又尋唐虞諸書殷頌周雅稱美是一而復各述時事大梁革服偃武修文制禮作樂義髙三王而約撰歌辭惟浸稱聖德之美了不序皇朝制作事雅頌前例於體為違伏以聖㫖所定樂論鐘律緯緒文思深微命世一出方懸日月不刋之典禮樂之教致治所成謹一二採綴各隨事顯義以明制作之美覃思纍日今始克就謹以上呈敕並施用後魏孝明帝神龜元年陳仲儒請依京房立準以調八音奏曰夫準本以代律取其分數調校樂器而調聲之體宫商宜濁徵羽用清若依公孫崇止以十二律聲而云還相為宫清濁悉足唯黃鍾管最長故以黃鍾為宫則往往相順若均之八音猶須錯采衆音配成其美若以應鍾為宫蕤賔為徵則徵濁而宫清雖有其韻不成音曲若以中吕為宫則十二律中全無所取今依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕為宫猶用林鍾為徵何由可諧但聲音精微史傳簡略舊志準十三絃隱間九尺不言須柱以不又一寸之內有萬九千六百八十三分微細難明仲儒私考準當施柱但前却柱中以約準分則相生之韻已自應合其中絃粗細須與琴聲相類施軫以調聲令與黃鍾相合中絃下依數畫六十律清濁之節其餘十二絃須施柱如筝即於中絃案盡一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器然後錯采衆聲以文飾之若事有乖此聲則不和尚書蕭寶寅奏仲儒學不師受輕欲制作事遂寢永安末樂器殘闕莊帝命尚書左丞拓跋孚監儀注孚上表曰昔太和中中書監髙閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請别營造久而方就復召公卿量校合否論者沸騰莫有適從登被㫖敕並見施用往歲大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宫懸四箱簨簴六架東北架編黃鍾之磬十四雖器名黃鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太蔟編於西北蕤賔列於西南並見器象差位調律不和又有儀鍾十四虛懸架首初不叩擊今便刪廢以從正則臣今據周禮鳬氏修廣之規磬氏倨句之法吹律求聲叩鍾求音損除繁雜討論實録依十二月為十二宫各準辰次當位懸設月聲既備隨用擊奏則會還相為宫之義又得律吕相生之體今量鍾磬之數各以十二架為定奏可孝武帝永熙二年春録尚書長孫稚太常卿祖瑩表曰臣聞安上治民莫善於禮移風易俗莫善於樂易曰先王以作樂崇德殷薦之上帝以配祖考書曰戞擊鳴球搏拊琴瑟以詠祖考來格詩言志律和聲敦叙九族平章百姓天神於焉降歆地祗可得而禮故樂以象德舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祗饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復沿革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅四海義合天經德符地緯九戎洊舉五禮未詳太宗世祖重輝纍耀恭宗顯祖誕隆丕基而猶經營四方匪遑制作髙祖孝文皇帝承太平之緒纂無為之運帝圖既逺王度惟新太和中命故中書監髙閭草創古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳以崇所作體制差舛不合古義請更修營被㫖聽許芳又釐綜久而申呈時故東平王元匡共相論駮各樹朋黨爭競紛綸竟無底定及孝昌已後世屬艱虞內難孔殷外敵滋甚永安之季叛賊入京燔燒樂庫所有之鐘悉畢賊手其餘磬石咸為灰燼普泰元年臣等奉敕營造樂器責問大樂前來郊丘懸設之方宗廟施安之分太樂令張乾龜答稱芳所造六格北廟黃鍾之均實是夷則之調其餘三廟宫商不和共用一笛施之前殿樂人尚存又有姑洗太蔟二格用之後宫檢其聲韻復是夷則於今尚在而芳一代碩儒斯文攸屬討論之日必應考古深有明證乾龜之辨恐是歷歲稍逺伶官失職芳久殂沒遺文銷毁無可遵訪臣等謹詳周禮分樂而序之凡樂圜鐘為宫黃鍾為角太蔟為徵姑洗為羽若樂六變天神可得而禮函鍾為宫太蔟為角姑洗為徵南吕為羽若樂八變地示可得而禮黃鍾為宫大吕為角太蔟為徵應鍾為羽若樂九變人鬼可得而禮至於布置不得相生之次兩均異宫並無商聲而同用一徵書曰於豫擊石拊石百獸率舞八音克諧神人以和計五音不具則聲豈成文六律不備則理無和韻八音克諧莫曉其㫖聖道幽𤣥微言已絶漢魏已來未能作者案春秋魯昭公二十年晏子言於齊侯曰先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也服子慎注云黃鍾之均黃鍾為宫太蔟為商姑洗為角林鍾為徵南吕為羽應鍾為變宫蕤賔為變徵一懸十九鐘十二懸二百二十八鐘八十四律即如此義乃可尋究今案周禮小胥之職樂懸之法鄭注云鐘磬編縣之二八十六枚漢成帝時犍為郡於水濵得古磬十六枚獻呈漢以為瑞復依禮圖編懸十六去正始中徐州薛城送玉磬十六枚亦是一懸之器撿大樂所用鐘磬各一懸十四不知何據魏侍中謬襲云周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者又云樂制既亡漢成謂韶武武德武始大鈞可以備四代之樂奏黃鍾舞文始以祀天地奏太蔟舞大武以祀五郊明堂奏姑洗舞武德巡狩以祭四望山川奏蕤賔舞武始大鈞以祀宗廟祀圜丘方澤羣廟祫祭之時則可兼舞四代之樂漢亦有雲翹育命之舞罔識其源漢以祭天魏時又以雲翹兼祀圓丘天郊育命兼祀方澤地郊今二舞久亡無復知者臣等謹依髙祖所制及周官考工記鳬氏為鐘鼓之分磬氏為磬倨之法禮運五聲十二律還相為宫之義以律吕為之劑量奏請制度經紀營造依魏晉所用四廂宫懸鐘磬各十六懸塤箎筝筑聲韻區别蓋理三稔於兹始就五聲有節八音無爽笙鏞和合不相奪倫元日備設百僚允矚雖未極萬古之徽蹤實是一時之盛事竊惟古先哲王制禮作樂各有所稱黃帝有咸池之樂顓頊作承雲之舞大章大韶堯舜之異名大夏大濩禹湯之殊稱周言大武秦曰夀人及焚書絶學之後舊章淪滅無可準據漢髙祖時叔孫通因秦樂人制宗廟樂迎神廟門奏嘉至皇帝入廟門奏永至登歌再終下奏休成之樂通所作也髙祖六年有昭容樂禮容樂又有房中祠樂髙祖唐山夫人所作也孝惠二年使樂府令夏侯寬備其簫管更名安世樂髙祖廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德者髙祖四年作也以象天下樂已行武以除亂也文始舞者舜韶舞髙祖六年更名曰文始以示不相襲也五行舞者本周舞秦始皇二十六年更名曰五行也四時舞者孝文所作以明天下之安和也孝景以武德舞為昭德孝宣以昭德舞為盛德光武廟奏大武諸帝廟並文始五行四時之舞及卯金不祀當塗勃興魏武廟樂改六韶武用虞之大韶周之大武總號大鈞也曹失其鹿典午乘時晉氏之樂更名正德自昔帝王莫不損益相緣徽號殊别者也而皇魏統天百三十載至於樂舞迄未立名非所以聿宣皇風章明功德贊揚懋軌垂範無窮者矣案今后宫饗會及五郊之祭皆用兩懸之樂詳攬先誥大為紕繆古禮天子宫懸諸侯軒懸大夫判懸士特懸皇后禮數德合王者名器所資豈同於大夫哉孝經言嚴父莫大於配天宗祀文王於明堂以配上帝即五精之帝也禮記王制庶羞不踰牲燕衣不踰祭服論語禹卑宫室盡力於溝洫惡衣食致美於黻冕何有殿庭之樂過於天地乎失禮之差逺於千里昔漢孝武帝東巡狩封禪還祀泰一於甘泉祭后土於汾隂皆盡用明其無減普泰元年前侍中臣孚及臣瑩等奏求造十二懸六懸裁訖續復營造尋䝉㫖判今六懸既成臣等思鐘磬各四鈲鐏相從十六格宫懸已足今請更營二懸通前為八宫懸兩具矣一具備於太極一具列於顯陽若圜丘方澤上辛四時五郊社稷諸祀雖時日相礙用之無闕孔子曰周道四達禮樂交通傳曰魯有禘樂賔祭用之然則天地宗廟同樂之明證也其升斗權量當時未定請即刋校以為長準周存六代之樂雲門咸池韶夏濩武用於郊廟各有所施但世運遙緬隨時亡闕漢世唯有虞韶周武魏為武始咸熙錯綜風聲為一代之禮晉無改造易名正德今聖朝樂舞未名舞人冠服無準稱之文武舞而已依魏景初三年以來衣服制其祭天地宗廟武舞執干戚著平冕黑介幘𤣥衣裳白領袖絳領袖中永絳合幅袴襪黑韋鞮文舞執羽籥冠委貌其服同上其奏於廟庭武舞武辨赤介幘生絳袍單衣練領袖皂領袖中衣虎文畫合幅袴白布襪黑韋鞮文舞者進賢冠黑介幘生黃袍單衣白合幅袴服同上其魏晉相因承用不改古之神室方各别所故聲歌各異今之太廟連基接棟樂舞同奏於義得通自中原喪亂晉室播蕩永嘉已後舊章湮沒太武皇帝破平統萬得古雅樂一部正聲歌五十曲工伎相傳間有施用自髙祖遷居世宗晏駕內外多事禮物未周今月所有王夏肆夏之屬二十三曲猶得擊奏足以闡纍聖之休風宣重光之盛美伏惟陛下仁格上皇義光下武道契𤣥機業隆寶祚思服典章留心軌物反堯舜之淳風復文武之境土飾宇宙之儀刑納生人於福地道德熙泰樂載新聲天成地平於是乎在樂舞之名乞垂㫖判臣等以愚昧參廁問道呈御之日伏增惶懼詔其樂名付尚書博議以聞其年夏集羣官議之瑩復議曰夫樂所以乘靈通化舞所以象物昭功金石播其風聲絲竹申其歌詠郊天祠地之道雖百世而可知奉神育民之理經千載而不昧是以黃帝作咸池之樂顓頊有承雲之舞堯為大章舜則大韶禹為大夏湯為大濩周曰大武秦曰夀人漢為大豫魏名大鈞晉曰正德雖三統互變五運代降莫不述作相因徽號殊别者也皇魏道格三才化清四宇奕世載德纍葉重光或以文教興邦或以武功平亂功成治定於是乎在及主上龍飛載造景命惟新書軌自同典刑罔二覆載均於兩儀仁澤被於四海五聲有序八音克諧樂舞之名宜以詳定案周兼六代之樂聲律所施咸有次第滅學以後經禮散亡漢來所存二舞而已請以韶武為崇德武舞為章烈總名曰嘉成漢樂章云髙張四懸神來燕饗宗廟所設宫懸明矣計五郊天神尊於人鬼六宫隂極體同至尊理無減降宜皆用宫懸其舞人冠服制裁減同舊式庶得以光贊鴻功敷揚大業録尚書事長孫稚已下六十人同議申奏詔曰王者功成作樂治定制禮以成為號良無間然又六代之舞者以大為名今可準古為大成也凡音樂以舞為主故干戈羽籥禮亦無别但依舊為文舞武舞而已餘如議後周孝閔帝時太常長孫紹逺廣召工人創造樂器以八為數故黃門侍郎裴正上書以為昔者大舜欲聞七始下洎周武爰創七音持林鍾作黃鍾以為正調之音詔與紹逺詳議往復於是遂定以八為數焉及髙祖讀史書見武王克殷而作七始又欲廢七而懸八并除黃鍾之正宫用林鍾為調首紹逺奏云天子懸八肇自先民百王共軌萬古不易下逮周武甫修七始之音詳諸經義又無廢八之典且黃鍾為君天子正位今欲廢之未見其可隋文帝開皇九年平陳獲宋齊舊樂詔於太常置清商署以管之求陳太樂令蔡子元于普明等復居其職由是牛𢎞奏曰臣聞周有六代之樂至韶武而已秦始皇改周舞曰五行漢髙帝改韶武曰文始以示不相襲也又造武德自表其功故髙帝廟奏武德文始五行之舞又作昭容禮容增演其意昭容生於武德蓋猶古之昭也禮容生於文始矯秦之五行也文帝又作四時之舞故孝景帝立追述先功采武德舞作昭德舞被之管絃薦於太宗之廟孝宣采昭德舞為盛德舞更造新歌薦於武帝之廟據此而言遞相因襲縱有改作並宗於昭至明帝時東平獻王采文德舞為大武之舞薦于光武之廟漢末大亂樂章淪缺魏武平荆州獲杜夔以為軍謀祭酒使創雅樂時散騎侍郎鄧靜善詠雅歌樂師尹胡能習宗祀之曲舞師馮肅曉知先代諸舞總練研精復於古樂自夔始也文帝黃均改昭容之樂為昭業樂武德之舞為武頌舞文始之舞為大昭舞五行之舞為大武舞明帝初公卿奏上太祖武皇帝樂曰武始之舞髙祖文皇帝樂曰咸熙之舞又製樂舞名曰章斌之舞有事於天地宗廟及臨朝大饗並用之晉武帝泰始二年遣傅𤣥等造行禮及上夀食舉歌詩張華表曰按漢魏所用雖詩章辭異興廢隨時至其韻逗曲折並繫於舊一皆因襲不敢有所改也九年荀朂典樂使郭夏宋識造王德大豫之舞改魏昭武舞曰宣武舞羽籥舞曰宣文舞江左之初典章堙紊賀循為太常卿始有登歌之樂大寧末阮孚等又增益之咸和間鳩集遺逸鄴沒胡後樂人頗復南渡東晉因之以具鍾律太元間破符永固又獲樂工楊蜀等間練舊樂於是金石始備尋其設懸音調並與江左是同慕容垂破慕容永於長子盡獲苻氏舊樂垂息為魏所敗其鍾律令李佛等將太樂細伎奔慕容德於鄴德遷都廣固子超嗣立其母先沒姚興超以太樂伎一百二十人詣興贖母及宋武帝入關悉收南度永初元年改正德舞曰前舞太武舞曰後舞文帝元嘉九年太樂令鍾宗之更調金石至十四年典書令奚縱復改定之又有凱容宣鄴之舞齊代因而用之蕭子顯齊書志曰宋孝建初朝議以凱容舞為韶舞宣業舞為武德舞據韶為言宣業即是古之大武非武德也故志有前舞凱容歌辭後舞凱容歌辭者矣至於梁初猶用凱容宣業之舞後改為大壯大觀焉今人猶喚大觀為前舞故知樂名雖隨代而改聲韻曲折理應常同前克荆州得梁家雅曲今平蔣州又得陳氏正樂更傳相承以為合古且觀其曲體用聲有次請修緝之以備雅樂其後魏洛陽之曲據魏史云太武平赫連昌所得更無明證後周所用者皆是新造雜有邊裔之聲戎音亂華皆不可用請悉停之制曰制禮作樂聖人之事也功成化洽方可議之今宇內初平正化未洽遽有變革我則未暇晉王諱又表請帝乃許之十四年三月樂定祕書監竒章縣公牛𢎞祕書丞北絳郡公姚察通直散騎常侍虞部侍郎許善心兼內史舍人虞世基儀同三司東宫學士饒陽伯劉臻等奏曰臣聞蕢桴土鼓由來斯尚雷出地奮著自易經邃古帝王經邦馭物揖讓而臨天下者禮樂之謂也秦焚經典樂書亡缺爰至漢興始加鳩採祖述增廣緝成朝憲魏晉相承更加論討沿革之宜備於故實永嘉之後九服崩離燕石符姚遞據華土此其戎乎何必伊川之上吾其左衽無復微管之功前言往式於斯而盡金陵建社朝士南奔帝則皇規粲然更備與內原隔絶三百年於兹矣伏惟明聖膺期會昌在運今南征所獲梁陳樂人及晉宋旗章宛然俱至曩代所不服者今悉服之前朝所未得者今悉得之化洽功成於是乎在臣等伏奉明詔詳定雅樂博訪知音旁求儒彥研校是非定其去就取為一代正樂具在本司於是并撰歌辭三十首詔並令施用開皇間𢎞又請依古五聲六律旋相為宫雅樂每宫但一調唯迎氣奏五調謂之五音縵樂用七調祭祀施用各依聲律尊卑為次髙祖猶憶何妥言主𢎞奏下不許作旋宫之樂但作黃鍾一宫而已於是牛𢎞及祕書丞姚察通直散騎常侍許善心儀同三司劉臻通直郎虞世基等更共詳議曰後周之時以四聲降神雖采周禮而年代深逺其法久絶不可依用謹按司樂凡樂圜鍾為宫黃鍾為角太蔟為徵姑洗為羽舞雲門以祭天函鍾為宫太蔟為角姑洗為徵南吕為羽舞咸池以祭地黃鍾為宫大吕為角太蔟為徵圜鍾為羽舞韶以祀宗廟馬融曰圜鍾應鍾也賈逵鄭𤣥曰圜鍾夾鍾也鄭𤣥又云此樂無商聲祭尚柔剛故不用也干寶云不言商商為臣王者自謂故置其實而去其名若曰有天地人物無德以主之謙以自牧也先儒解釋既莫知適從然此四聲非直無商又律管乖次以其為樂無克諧之理今古事異不可得而行也按東觀書馬防傳太子臣鮑鄴等上作樂事下防防奏言建初二年七月鄴上言天子食飲必順于四時五味而有食舉之樂所以順天地養神明求福應也今官雅樂獨有黃鍾而食舉樂但有太蔟皆不應月律恐傷氣類可作十二月均各應其月氣公卿朝會得聞月律乃能感天和氣宜應詔下太常評焉太常上言作樂器直錢百四十六萬奏寢今明詔復下臣防以為可須上天之明時因歲首之嘉月發太蔟之律奏雅頌之音以迎和氣其條貫甚具遂獨施行起於十月為迎氣之樂矣又順帝紀云陽嘉二年冬十月庚午以春秋為辟雍𨽻太學隨月律十月作應鍾三月作姑洗元和以來音戾不調修復黃鍾作樂器如舊典據此而言漢樂宫懸有黃鍾均食舉太蔟均止有二均不旋相為宫亦以明矣計從元和至陽嘉二年才五十歲用而復止驗黃帝聽鳯以制律吕尚書曰豫欲聞六律五聲周禮有分樂而祭此聖人制作以合天地隂陽之和自然之理乃云音戾不調斯言誣之甚也今梁陳雅曲並用宫聲按禮五聲十二律還相為宫盧植云十二月三管流轉用事當用事者為宫宫君也鄭𤣥曰五聲宫商角徵羽其陽管為律隂管為吕布十二辰更相為宫始自黃鍾終於南吕凡六十也皇侃疏還相為宫者十一月以黃鍾為宫十二月以大吕為宫正月以太蔟為宫餘月放此凡十二管各備五聲合六十聲五聲成一調故十二調此即釋鄭義之明文無用商角徵羽為别調之法矣樂稽耀嘉曰東方春其聲角樂當終於夾鍾餘方各以其中律為宫若有商角之理不得云宫於夾宫也又云五音非宫不調五味非甘不和又動聲儀宫唱而商和是謂善本太平之樂也周禮奏黃鍾歌大吕以祀天神鄭𤣥以黃鍾之鐘大吕之聲為均均調也故崔靈恩云方樂十二調亦不獨論商角徵羽也又云凡六樂者皆文之以五聲播之以八音故知每曲皆須五聲八音錯綜而能成也禦寇子云師文鼓琴命宫而總四聲則慶雲浮景風翔唯韓詩云聞其宫聲使人溫厚而寬大聞其商聲使人方廉而好義及古有清角清徵之流此則當聲為曲今以五引為五聲迎氣所用者是也餘曲悉用宫聲不勞商角徵羽何以得知荀朂論三調為均首者得正聲之名明知雅樂悉在宫調已外徵羽角自為謡俗之音耳且西涼龜兹雜伎等曲數既多故得𨽻於衆調調各别曲至如雅樂少須以宫為本歷十二均而作不可分配餘調更成雜亂也其奏大抵如此帝並從之𢎞又上議曰謹案禮五聲六律十二管還相為宫周禮奏黃鍾歌大吕奏太蔟歌應鍾皆是旋相為宫之義蔡雍明堂月令章句曰孟春月則太蔟為宫姑洗為商蕤賔為角南吕為徵應鍾為羽大吕為變宫夷則為變徵他月倣此故先王之作律吕也所以辨天地四方隂陽之聲揚子雲曰聲生於律律生於辰故律吕配五行通八風歷十二辰行十二月循環轉運義無停止譬如立春木王火相立夏火王土相季夏餘分土王金相立秋金王水相立冬水王木相還相為宫者謂當其王月名之為宫今若十一月不以黃鍾為宫十二月不以大吕為宫便是春木不王夏土不相豈不隂陽失度天地不通哉劉歆鍾律書云春宫秋律百卉必雕秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲以斯而論誠為不易且律十二今直為黃鍾一均唯用七律以外五律竟復何施恐失聖人制作本意故須依禮作還相為宫之法上曰不須作旋相為宫且作黃鍾一均也𢎞又論六十律不可行謹按續漢書律厯志元帝遣韋𤣥成問京房於樂府房對受學故小黃令焦延夀六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南事六十律畢矣十二律之變至於六十猶八卦之變至於六十四也冬至之聲以黃鍾為宫大蔟為商姑洗為角林鍾為徵南吕為羽應鍾為變宫蕤賔為變徵此聲氣之元五音之正也故各統一日其餘以次運行宫日者各自為宫而商徵以類從焉房又曰竹聲不可以度調故作准以定數准之狀如瑟長一丈而十三絃隱間九尺以應黃鍾之律九寸中央一絃下畫分寸以為六十律清濁之節執始之類皆房自造房云受法於焦延夀未知延夀所承也至元和中待詔候鍾殷肜上言官無曉六十律以准調音者故待詔嚴嵩具以准法教其子宣願召宣補學官主調樂器太史丞𢎞試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為准施絃嘉平年東觀召典律者太子舍人張光問准意光等不知歸閲舊藏乃得其器形制如房書猶不能定其絃緩急故史官能辨清濁者遂絶其可以相傳者唯太𣙜常數及候氣而已據此而論京房之法漢世已不能行沈約宋志曰詳按古典及今音家六十律無施於樂禮云十二管還相為宫不言六十封禪書云大帝使素女鼓五十絃瑟而悲破為二十五絃假令六十律為樂得成亦所不用取大樂必易大禮必簡之意也又議曰案周官云大司樂掌成均之法鄭衆注云均調也樂師主調其音三禮義宗稱周官奏黃鍾者用黃鍾為調歌大吕者用大吕為調奏者謂堂下四懸歌者謂堂上所歌但一祭之間皆用二調是知據宫稱調其義一也明六律六吕迭相為宫各自為調今見行之樂用黃鍾之宫乃以林鍾為調與古典有違晉內書監荀朂依典記以五聲十二律還相為宫之法制十二笛黃鍾之笛正聲應黃鍾下徵應林鍾以姑洗為清角大吕之笛正聲應大吕下徵應夷則以外諸均例皆如是然今所用林鍾是朂下徵之調不取其正先用其下於理未通故須改之上甚善其議詔𢎞與姚察許善心何妥虞世基等正定新樂文帝時令國子博士何妥考定鍾律妥上表曰臣聞明則有禮樂幽則有鬼神然則動天地感鬼神莫近於禮樂又云樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也臣聞樂有二一曰姦聲二曰正聲夫姦聲感人而逆氣應之順氣成象故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧孔子曰放鄭聲逺佞人故鄭衛宋趙之聲出內則發疾外則傷人是以宫亂則荒其君驕商亂則陂其官壞角亂則憂其人怨徵亂則哀其事勤羽亂則危其財匱五者皆亂則國亡無日矣魏文侯問子夏曰吾端冕而聽古樂則欲寐聽鄭衛之音而不知倦何也子夏對曰夫古樂者始奏以文復亂以武修身及家平均天下鄭衛之音者姦聲以亂溺而不止獶雜子女不知父子今君所問者樂也所愛者音也夫樂之與音相近而不同為人君者謹審其好惡案聖人之作樂也非止茍恱耳目而已矣欲使在宗廟之內君臣同聽之則莫不和敬在鄉里之內長幼同聽之則莫不和順在閨門之內父子同聽之則莫不和親此先王立樂之方也故知聲而不知音者禽獸是也知音而不知樂者衆庶是也故黃鍾大吕弦歌干戚僮子皆能儛之能知樂者其唯君子不知聲者不可與言音不知音者不可與言樂知樂則幾於道矣紂為無道太師抱樂器以奔周晉君德薄師曠固惜清徵上古之時未有音樂鼓腹擊壤樂在其間易曰先王作樂崇德殷薦上帝以配祖考至于黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作大韶禹作大夏湯作大濩武王作大武從夏以來年代久逺唯有名字其聲不可得聞自殷至周備于詩頌故自聖賢已下多習樂者至如伏羲減瑟文王足琴仲尼擊磬子路鼓瑟漢髙擊筑元帝吹簫漢髙祖之初叔孫通因奏樂人制宗廟之樂迎神于廟門奏嘉至之樂迎神于廟門奏嘉至之樂猶古降神之樂也皇帝入廟門奏永至之樂以為行步之節猶采齊肆夏也乾豆上薦奏登歌之樂猶古清廟之歌也登歌再終奏休成之樂美神饗也皇帝就東廂坐定奏永安之樂美禮成也其休成永至二曲叔孫通所制也漢髙祖廟奏武德文始五行之儛當春秋時陳公子完奔齊陳是舜後故齊有韶樂孔子在齊聞韶三月不知肉味是也秦始皇滅齊得齊韶樂漢髙祖滅秦韶傳於漢髙祖改名文始以示不相襲也五行儛者本周大武樂也始皇改曰五行及于孝文復作四時之儛以示天下安和四時順也孝景采武德儛以為昭德孝宣又采昭德以為盛德雖變其名大抵皆因秦舊事至於魏晉皆用古樂魏之三祖並制樂辭自永嘉播越五都傾蕩樂聲南度是以大備江東宋齊已來至于梁代所行樂事猶皆傳古三雍四始實稱大盛及侯景篡逆樂師分散其四儛三調悉度僞齊齊氏雖知傳受得曲而不用之於宗廟朝廷也臣少好音律留意管絃年雖耆老頗皆記憶及東土剋定樂人悉返訪其逗遛果云是梁人所教今三調四儛並皆有手雖不能精熟亦頗具雅聲若令教習傳授庶得流傳古樂然後取其㑹歸撮其指要因循損益更制嘉名歌盛德於當今傳雅正於來葉豈不美歟謹具録三調四儛曲名又製歌辭如别其有聲曲流宕不可以陳於殿庭者亦悉附之於後書奏别敕太常取妥節度於是作清平瑟三調聲又作八佾鞞鐸巾拂四舞先是太常所傳宗廟雅樂數十年唯作大吕廢黃鍾妥又以深乖古意乃奏請用黃鍾詔下公卿議從之唐太宗貞觀元年春正月宴羣臣奏秦王破陳樂上曰朕昔受委專征民間遂有此曲雖非文德之雍容然功業所由不敢忘也封德彞曰陛下以神武平海內文德豈足比乎上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣十四年十二月癸丑太常少卿祖孝孫奏請所定新樂上曰禮樂之作是聖人象物設教以為撙節治政善惡豈此之由御史大夫杜淹對曰前代興亡實由於樂陳將亡也為玉樹後庭花齊將亡也而為伴侣曲行路聞之莫不悲歎所謂亡國之音以是觀之實由於樂上曰不然夫音聲豈能感人歡者聞之則恱哀者聽之則悲悲恱在於人心非由樂也將亡之政其人必苦然苦心所感故聞之則悲耳何有樂聲哀怨能使恱者悲乎今玉樹伴侣之曲其聲具存朕當為公奏之知公必不悲耳尚書右丞魏徵對曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂在人和不由音調上然之十七年太常卿蕭瑀奏言今破陳樂舞天下之所共傳然美至德之形容尚有所未盡前後之所破劉武周薛舉竇建德王世充等臣願圖其形狀以寫戰勝攻取之容上曰朕當四方未定因為天下救焚拯溺故不獲已乃行戰伐之事所以人間遂有此舞國家因兹亦制其曲雅樂之容正得陳其梗槩若委曲寫之則其狀易識朕以見在將相多有曽經受彼驅使者既經為一日君臣今若重見其被擒獲之勢必當有所不忍我為此等所以不為也蕭瑀謝曰此事非臣思慮所及武后載初元年后謂內史邢文偉曰移風易俗莫善於樂伯牙鼓琴鍾期聽之知意在山水是人能移風易俗矣何取樂耶文偉曰聖人作樂平人心變風俗末世樂壞則為人所移后喜賜帛中宗時宴兩儀殿酒酣伶人襪子何懿等唱合生歌言淺穢因倨肆考功員外郎武平一上書諫曰樂天之和禮地之序禮配地樂應天故音動於心聲形于物因心哀樂感物應變樂正則風化正樂邪則政教邪先王所以逹廢興也伏見胡樂施于聲律本備四夷之數比來日益流宕異曲新聲哀思淫溺始自王公稍及閭巷妖伎伶人街童市子或言妃主情貌或列王公名質詠歌舞蹈號曰合生昔齊衰有行伴侣陳滅有玉樹後庭花趨數驁僻皆亡國之音夫禮慊而不進即銷樂流而不反則放臣願屏流僻崇肅雍凡胡樂備四夷外一皆罷遣況兩儀承慶殿者陛下受朝聽訟之所比大饗羣臣不容以娼優媟狎虧汙邦典若聽政之暇茍玩耳目自當奏之後庭可也𤣥宗時涼州獻新曲帝御便坐召諸王觀之寧王憲曰曲雖佳然宫離而不屬商亂而暴君卑逼下臣僭犯上發於忽微形於音聲播之詠歌見於人事臣恐一日有播遷之祻帝默然及安史亂世乃思憲審音云周世宗顯德六年帝以王朴素曉音律詢之朴上疏曰禮以檢形樂以治心形順於外心和於內然而天下不治未之有也蓋樂生於人心而聲成於物物聲既成復能感人之心昔黃帝吹九寸之管得黃鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律旋相為宫以生七調為一均凡十二均八十四調而大備遭秦滅學歷代罕能用之唐祖孝孫考正大樂其法始備安史之亂什亡八九至于黃巢蕩盡無遺時有博士殷盈孫鑄鎛鐘十二編鐘二百四十處士蕭承訓校定石磬今之在縣者是也雖有鐘磬之狀殊無相應之和其鎛鐘不問音律但循環而擊編鐘磬徒懸而已絲竹匏土僅有七聲名為黃鐘之宫其存者九曲考之三曲協律六曲參涉諸調蓋樂之廢缺無甚於今臣謹如古法以秬黍定尺長九寸徑三分為黃鍾之管與今黃鍾之聲相應因而推之得十二律以為衆管互吹用聲不便乃作律準十有三弦其長九尺皆應黃鍾之聲以次設柱為十一律及黃鍾清聲旋用七律以為一均為均之主者宫也徵商羽角變宫變徵次焉發其均主之聲歸乎本音之律迭應不亂乃成其調凡八十一調此法久絶出臣獨見乞集百官校其得失詔從之南唐嗣主時太常博士陳致雍奏曰臣聞羽籥干戚所以調八風也金石絲竹所以正五音也古先哲王致人神協和彞倫攸序者鮮不由之髙皇帝再造丕基顯登大寶修三代之禮正八佾之儀未及下車遽命置舞童令樂師導之以節奏教之以升降特備大禮于今二十年矣近者兵戎來侵王師出討言便宜者或以舞童食積年之儲為無用之具請並用充士伍以從討伐此皆臺𨽻之言非聖賢之教也禮樂者國之本安可無之而又或衣冠之子或韋布之人荷戈㦸以禦戎執鼓旗而捍冦非其能也具其數不過百十人而已加之以教習積年成功一旦棄之後無傳者存之未必減太倉之粟廢之豈益國家之師哉臣竊惜之仲尼曰爾愛其羊我愛其禮蓋亦此也伏惟皇帝陛下酌聖王之盛典特降聰明許從仍舊宋仁宗景祐三年右司諫韓琦上奏曰臣伏聞樂音之起生於人心是以喜怒哀樂之情感於物則噍殺嘽緩之聲隨而應非器之然也故孔子曰樂云樂云鐘鼓云乎哉者其言斯有在孟子之對齊宣王亦有今樂猶古樂之說言能與百姓同樂則古今一也唐太宗聽祖孝孫新樂乃謂樂之作蓋聖人緣物設教治之隆替亦不由此魏元成對以樂在人和不由音調此皆聖賢述樂之大方以臣識暗藝薄素非知音陛下誤賜甄采使待罪諫列首被詔㫖令與丁度等詳定胡瑗阮逸鄧保信所造鍾律事臣粗考前志參驗今古二家之說差舛未盡逸瑗之圍方分保信之用長黍質之典據皆無所聞伏自藝祖造邦仁宗接統縟禮具舉熙事咸備通用王朴之樂悉無更易以至黎庶康乂兵革銷戢天下無事垂八十載為樂之用非不和也頃因燕肅獻規妄加磨鑢適㑹李照赴闕謂非克諧陛下發天縱之能留日昃之聽精加練核許之改作逮於成功即薦郊廟暨逸瑗繼至盛言照樂穿鑿再令造律即又圍徑未合保信續上新法亦乃長廣乖古竊以祖宗舊樂遵用斯久屬者徇一士之偏議變數朝之㝎律賜金增秩優賞其勞曽未周朞又將易制臣慮後人復有從而非者不惟有傷國體實則虛費邦用歷觀前代議樂古之管尺尚存而猶是非紛紜纍年方就未見今之速而易也臣竊計之不若窮作樂之原為政治之本使政令平簡民物熙洽海內擊壤鼓腹以歌太平斯乃上世之樂可得以器象求乎既達其原又當究今之急以佐隆業國家方夏寧一朝廷晏清西北兩垂久弛邊備敵人之性豈能常保弱則卑順强則驕逆渝盟背約何代而無必思密備不虞未可全推大信此陛下之與左右弼臣宵旰所慮宜先及之緩兹求樂之誠移訪安邊之議急其所急在理為長臣欲乞詔下攸司盡記二家律法及所造管尺鐘磬權量存而未行再命天下有精曉音律者俾之詳正然後施用候一二年間訖無至者則將王朴逸瑗保信三法别召稽古近臣取其中多合志者以備雅奏固亦未晚今之定奪權且停罷萬一財擇不勝至幸寶元元年琦知諫院上奏曰臣先於景祐三年秋曽奉聖㫖令與丁度胥偃髙若訥同共定奪阮逸胡瑗鄧保信等所造鍾律尋將歷代典志文字及將漢錢分寸較量得王朴舊樂於太祖朝曽令和峴以司天監景表尺減定與漢唐尺度差近其胡瑗阮逸鄧保信并李照等鍾律俱不合古遂具聞奏再奉聖㫖令將漢錢分寸及景表尺别造律管參校臣與丁度等各陳述不曉音律乞再訪知樂者俾令詳定後䝉寢罷其時臣曽將景祐廣樂看詳備見實紀李照不依古法出意制造律度之事今來南郊在近陛下躬行大禮不可以李照所造違古之樂上薦天地宗廟臣竊聞和峴減定王朴舊樂鐘磬等見今並存欲乞特降聖㫖下太常寺將來郊禋用舊樂所貴國容咸備神聽惟和景祐四年祕閣校理余靖議李照所定樂奏曰臣聞道路傳言已降㫖揮今月十六日皇帝御後殿令中書樞密院及修樂書臣寮同於上前詳議李照胡瑗所定雅樂是非事臣竊謂樂者因聲以布其和聲者因器以宣其用故假金石以為器然後聲得而和分宫商以為音然後樂可以審今李照之說形器可辨胡瑗之議音聲未傳以此異同欲定優劣不亦難乎又況言有辨訥意有巧拙又安能頃刻之間定之乎臣又以為古之作樂者知聲有清濁故吹律以制其中恐久而失傳故纍黍以存其法後世增損不能識其本聲若以古法求之尚或得其佛疑古而不用未知慿何可從況胡瑗所陳頗有經據何不試令造鍾磬一編與李照之樂更考迭奏取其絲竹之聲諧和而不相奪者定以為優而後行用彼時集議亦未為晚臣頃聞談者云云並言李照學無師法自傳損益又挾閻文應以為內助故得紛然恣其偏見而律度踈長鐘聲震掉不守古制不可垂法察於衆言照未全是若以樂為政之大者當謹重改作則宜謹於李照未改之前今既改而未定又宜詳考律吕審的制度以防其失臣故謂當令胡瑗作為鐘磬而與照樂兩辨其聲然後是非灼然如在衡鑑不辨而可知也臣不任區區瞽言待罪之至歷代名臣奏議卷一百二十七
