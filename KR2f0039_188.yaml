body:
  text: 歷代名臣奏議卷一百八十八明楊士竒等撰賞罰宋英宗治平元年知諌院司馬光言兩府遷官疏曰臣伏覩去嵗陛下即位之初兩府臣僚已各遷官今兹甫及期年一例又加恩命雖陛下褒優大臣務從豐厚而朝野竊議以為近來國家官爵易得恩賞太頻柱石之臣當勠力同心共救此弊今若連年之內寵數便蕃恬然有之自以為宜則何以率正他人抑塞僥幸因此恐大失天下之望然為陛下愛之適所以傷之也臣竊料大臣亦不敢自當亦當辭避願陛下因而聼之以成其美光又上奏曰臣近曾上言兩府臣僚遷官太頻恐失天下之望乞陛下聼其辭避以成其美未蒙采納臣非憎此數人嫉其遷官乃是欲全其令名使之輔佐陛下重惜大柄耳先帝親選聖明傳以天下今陛下乃欲歸功大臣臣固知其人必不敢當也借使當日實曾贊成先帝聖意乃是欲安宗廟社稷若今日受賞則是豫邀非常之福罪孰大焉然則陛下賞之是掩其盡忠之心使為徇利之人何榮之有臣所謂欲全其令名者此也夫爵位者人主所以御羣臣之大柄也然品秩髙下本皆虛名但以難得之故為人所貴若其易得則為人所賤譬如金玉珠璣茍或道路階庭處處有之則與瓦礫無異矣近嵗以來官冗賞濫兩府大臣豈不素知今遇陛下即政之初所宜開導聖聰以懲革斯弊今陛下以纂紹之際及聖體未安之時中外平寧為兩府之功加以厚賞則宿衛將帥宗室外戚四方藩鎮內侍近臣皆有冀望若一一稱滿其意則國家官爵賤於泥土將無以役使羣臣若抑而不與則人不自知更生觖望是始於推恩而終於聚怨也且輔佐之臣自於期年之間連併遷官而欲禁止他人之幸進誠亦難矣臣所謂欲使之輔佐陛下重惜大柄者此也或者陛下以為曹佾無功尚加之使相況輔弼大臣當國家艱難之際輸力盡瘁不可不賞臣愚以為不然陛下所以賞曹佾者非以為功也乃以皇太后之德至深至厚無以為報故褒崇元舅以慰母心今若緣此推恩次及后族次及兩府次及他人則是曹佾隨衆遷官不為優異於皇太后之心何所慰哉然則陛下虛捐盛恩而衆人皆以大例遷官何足為喜也臣豈不知陛下欲褒賞大臣而臣區區不量其力以橫議干之非身之利然為朝廷忠謀無恤其他惟陛下察之光又乞罷近臣恩命上殿疏曰臣昨者上言近嵗官冗賞濫兩府大臣遇陛下即政之初宜開導聖聰以懲革斯弊今陛下以紹纘之際及聖體未安之時中外平寧為兩府之功加以厚賞則宿衛將帥宗室外戚四方藩鎮內侍近臣皆有冀望若一一稱滿其意則國家官爵賤如泥土將無以役使羣臣且輔弼之臣自於期年之間連併遷官則難以禁止他人之幸進伏蒙陛下靣諭臣以兩府大臣皆有大功所以遷官他人無功何敢輒望臣再三敷奏以陛下若寢兩府恩命則他人自然不敢僥求若見兩府遷官則誰肯自謂無功不求榮進恐至時陛下亦不能裁抑兩府亦不敢執奏當時陛下聖意確然終不開納今兩府才受恩命竊聞入內內侍省都都知任守忠等已一例遷官臣竊料向去其餘臣僚互相形比繼續遷官卒無窮盡蓋官爵者人主之利器所以驅䇿羣臣制御四海今陛下曾不愛惜容易與人一至於此臣竊惜之凡政令之行必自貴近為始前者濫恩已施之於貴臣不可復收若止之於近臣猶可救其大半所有任守忠等恩命伏望聖慈特賜追還以塞向去僥幸之路英宗時趙瞻上奏曰世之大患在賞罰焉賞以微文牾賢罰以定令幸姦則是國代賢者辭而法為姦人地也有吏於此齎閥閲詣考課曹曹必曰某在斯職事若干年當遷某官某在斯課最若干數當增某秩斯人大賢大不肖雖朝廷王公不得擅輒議其存捨動搖者或迹狀白著有非常不在詔令則以問故事與令有所差駁突兀亦不為舉夫以賢者難進易退廉耻謙服之心詎非代之辭者歟若爾伊尹太公常齒匹夫傅説箕子常編縶囚冀缺寧戚常伍耕農管仲五羖常沒虜獲尚屑與時爭盆鼓之逋賦列時刻之積效而邀遷次邪又或以罪付理官曹曹必曰以甲令當某罰以乙紹當某科有輕重疑則為奏以請上上之所進退亦旁法律三尺爾夫以姦人狡獪窺幸之備詎非為之地者歟且唐虞流共工放歡兜湯誅尹諧文王誅潘正太公誅華士管仲誅傳里乙子産誅鄧析史傳孔子誅少正卯商書有三風十愆禮經有四誅無赦孟軻以楊朱墨翟邪説之無君親者拒之荀卿以宋鈃公孫龍衆惑之亂名實者禁之故若晉羊舌鮒以掠美尸齊阿大夫以虛譽烹彌子瑕佞幸似忠孝而得罪郭解豪俠似仁義而蒙戮皆姦雄桀黠傷蝕風教之尤者然以之示有司則罪無所當矣非勉寬仁之治也非保賊亂之黨也徒律令無所處焉也賞與罰如是馳步帝皇之塗而未底者所以趣之之轍異也或謂若之所贊者古也今之所用者時也若居今時而用古殆不可與權矣張選舉之程法補調之品目猶曰未也況以堯舜之所病與三代之明哲而責有司哉又若前主律後主令附麗驗治劾讞鍛成猶曰未也況以難明之狀可惑之事而亟致大戮哉正爾如賞僭及淫人刑僭及善人何此大不然且責難於君謂之恭吾君不能謂之賊彼曷獨不欲舉縣官於堯舜三代之隆乎夫人之辭行技能號為搜索而置朝廷矣才具器識號為量度而縻爵位矣斯豈他術哉視必得賢者而後任之有司爾真賢實廉不次求索則有司之明也上之察也任人大姦赫然誅殛亦有司之明也上之察也豈他術哉上如不察有司不賢雖區區於秩次事事於律令顧益資其窺測者豈有補邪但古用此亦治今用此亦治不能用則皆末如之何也又安在權不權使今得一伊尹太公而賞之天下非乎不也得一歡兜共工而罰之天下非乎不也若賞伯夷而問盜跖罰窮竒而咨叨餮惡可吕誨請罷韓琦等轉官疏曰臣伏覩宰臣韓琦等轉官制辭皆賞先議建儲之功於體似未為便宜儲二者國家之根本根本未立大臣不言誰其言之蓋其職爾豈得為功言之者是公於天下而賞之者私於己也且漢史載文帝豫建太子但云有司所請不顯其人訖景帝世不聞賞建言者誠有旨哉自至和而後先帝服藥文武官請建儲副者無慮百十人可盡録其功賞之耶去嵗賞定䇿之功今日賞建儲之議恩寵便蕃乃前世未聞之事也大庭宣揚是以爵祿誘人佞者因事以言必思後福其可得乎陛下自幼鞠育宫中乃先帝之意天命所屬保護者皇太后之功也羣臣何力之有借使臣下不言歷數何所歸乎貪天之功以為己力古人羞之琦等豈無是思臣所以願陛下不賞者為國家無窮之計唯聖智察焉神宗時御史中丞司馬光敕充山陵儀仗使上辭賜金劄子曰臣前日蒙恩賜金五十兩并銀合臣以所賜過厚尋問永昭陵禮儀使范鎮知舊例所無不敢當受遂具奏陳乞許令回納伏蒙聖慈特降中使宣諭令受臣上荷恩遇至深至重螻蟻微命不足為報愧懼流汗無所容措然臣竊聞昔韓昭侯有敝袴命藏之侍者曰君仁君也不以賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者彼一敝袴猶不可以與無功之人況數十兩之金乎魏太祖之為政有功宜賞不吝千金無功妄施分毫不與我太祖太宗之御臣下亦然故能驅駕英豪光啓大業夫明主之不妄賞賜非吝之也誠以賜一無功則天下無功之人皆有徼覬之心有功之人皆懷怨望故也借使一人有功而人主賜之一金無功者不得有功者必喜何則衆人不得而我獨得之是人主知我之功也其榮多矣如是則智者獻其謀勇者竭其力雖使之赴湯火猶將甘而樂之若有功者賜千金無功者亦賜千金其有功者必不説何則彼無功而我與之鈞是人主待我無以異於彼也其辱深矣如是則有功者莫不解體誰肯竭其智力觸冒死亡以徇國家之急哉故官爵金帛者人主所以鼓舞羣情使之奔走左右而不自知者也然則眀主愛一嚬一笑豈為過論哉仁宗皇帝天性寬仁承纍世餘烈府庫充實身雖節儉而好施於人羣臣左右貪求無厭賜豫之例因兹寖廣府庫之積日益減耗不幸又於五年之中再遭大喪左藏內藏奉宸等庫率皆空竭當此之時舊例所有猶宜鐫減以救其弊況可以例外橫賜無功之人乎且陛下以國用不足之故永厚陵猶遵遺制比永昭陵事事裁減而所賜羣臣之物乃更多於永昭陵之時臣雖小人貪昧財賄揣循此理能自安乎此臣所以夙夜憂惶無以自處者也況府庫之物乃天下萬民之物也自非有功於民者皆不宜得之臣所以仰違詔命堅辭賜物至于再三者非自以飾小廉也乃欲助陛下成治道伏望聖慈察其誠懇依臣前奏許令將所賜金并銀合回納入庫光又論王廣淵章服職名疏曰臣纍言廣淵姦邪乞盡奪去職名與逺地監當今聞廣淵帶職知齊州仍賜章服如此乃是賞之非黜之也嚮使廣淵自改京官以來謹身守分不為姦諂以至今日不過作第二任通判今所得乃如此豈可謂為姦諂無益哉孔子稱唯器與名不可假人今之章服所謂器也職名所謂名也二者皆無用之物然而天下貴之者為其非賢材則不能得之故也唐宣宗重惜章服不輕以與人有司製緋紫衣以備賜與經年不用三兩領故當時服緋紫者人以為貴夫名器者譬如珠玉若使之易得如瓦礫尚安足貴乎近嵗兩次覃恩服緋紫者已為泛濫今又如陳鑄王廣淵輩皆賜章服是使今後受賜服者皆以為耻不以為榮也且陛下使廣淵出補外官者心已知其姦邪之迹也今又復以職名章服寵之是勸人使效廣淵所為也臣竊恐非國家之福伏望聖斷依臣前奏盡奪去廣淵職名并所賜章服與逺地監當使賞善罰惡皎然明白彭汝礪上奏曰聖人在上不能使人不為過惡有過惡則治之而已當堯之時洪水未平堯使鯀治之不克有成鯀不免殛死堯不失聖人臣伏詳王孝先反覆不信熒惑中外誕謾無懼愚弄朝廷耗蠧國財死折人命其事見於案牘甚具見於人言甚不可欺非待臣言也今朝廷為之蓋覆為之遷徙譬猶愛惜兒女不忍以一指彈治臣恐朝廷綱紀自此廢弛矣賞罰者朝廷之綱紀也綱不綱紀不紀雖有智力不能善其後矣陛下自履大位于今五年好惡循理是非以道􅉏御無過與宗室無假借近親貪功廢之終身而不齒乳媪弄權一日棄之如涕唾命於朝廷達於四海詠蹈鼓舞稱為神明今於孝先而疑之臣以為過矣書曰刑故無小又曰怙終賊刑孝先於清議非不知而為之也及姦詐窮露猶敢肆意誕言以朝廷為無足畏所謂怙終雖堯舜在上不能容矣夫是非非我也是天下之公器也雖大臣有不得擅焉賞罰非人也是天之成命也雖人主有不得而私焉易曰文不當故吉凶生焉治亂禍福之來一嚬一笑之間而已況如此其大者耶惟陛下上畏天威俯同天下之議正孝先等之罪以解中外之惑以存朝廷之紀綱臣雖得罪蓋所安也起居舍人同知諌院范純仁論吕誨薛向疏曰臣備位諌垣職在針補時政凡是賞罰之失必須竭力陳論臣曾任陜西親見某人之姦迹豈敢偷安茍祿結舌保身況居聖神之朝當盡枉直之説愚臣自叨近職固亦上體聖心無非奬善旌能去邪黜枉深欲眀示好惡將使天下風從而乃執政之臣喜人承順故昧分别邪正以致賞罰不平使天下之人有疑於陛下必謂督責君子太重崇奬小人太深委近習則務優容而來其言用臣寮則因違忤以沮其志蓋以近事明之不得不謂之如此且如吕誨是御史中丞詔許風聞言事才有失實即坐左遷此則責君子之太重也薛向外官固合守法而敢違條罔上罪迹顯聞不獨曲被優容而復驟加奬用此則奬小人之太深也陛下間或遣內臣走馬承受輩體訪外事固已不使臣寮得知其或言不審詳必為隱而不責又況肯使與罪人對辨而反坐其言者哉此則務優容而來其言也且薛向在陜西壞法已七八年張靖一旦往彼體量不能盡見根柢詢訪之際容有不詳先被黜辱此則因違忤以沮其志也責君子太重則忠臣難立奬小人太深則姦邪易滋優假以來之則近侍之言皆進違忤者沮之則中人之性盡移如此而望風俗之不偷聰明之不惑不可得已陛下天資睿聖超越前古臣之遭遇千載一時微臣尚耻於枉尺直尋陛下固不可啓寵納侮豈止爵及惡德實亦有害邦家伏望聖慈捨己從人勿憚改作近者二人之命悉賜追還不唯賞罰均平實亦天下幸甚哲宗元祐三年翰林學士知制誥兼侍讀蘇軾上奏曰臣今日邇英進讀寶訓及雍熙淳化間事太宗皇帝每見時和嵗豐雨雪應時輒喜不自勝舉酒以屬羣臣又是日熒惑與日同度太史奏言當旱既而雨足嵗豐臣讀至此因進言水旱雖天數然人君修德可以轉災為福故宋景公一言熒惑退三舍元豐八年熒惑守心逆行犯房又逆而西垂欲犯氐氐四星后妃之象也方是時二聖在位發政施仁惟恐不及臣視熒惑退舍甚速如有所畏不敢復西以此知天人之應捷於影響太宗皇帝親致太平而每遇豐年若獲非常之福喜樂如此者豈非水旱不作自是朝廷難得之事乎書曰天聰明自我民聰眀匹夫匹婦有不獲其所猶能致水旱而況政令之失小及一方大及四海其為災沴理在不疑自二聖嗣位于今四年恭儉慈孝至仁至公可謂盡矣而四年之中非水則旱日月薄蝕五星相淩淫雨大雪常寒久隂之類殆無虛月此豈盛德之報也哉臣愚無知竊謂陛下身修而政未修故監司守令多不得人百姓失職無所告訴謡怨上達以傷隂陽之和所以致此者蓋由朝廷賞罰不眀舉措不當之咎也臣請略而言之去年熙和諸將力戰以獲鬼章此竒功也故增秩賜金涇原諸將閉門自守使賊大掠而去若涉無人之境此罪人也亦增秩賜金賞罰如此何以使人廣東妖賊岑探反圍新州差將官童政救之政賊殺平民數千其害甚於岑探朝廷使江西提刑傅燮體量其事燮畏避權勢歸罪於新州官吏又言新州官吏却有守城之功乞以功過相除愚弄上下有同兒戲然卒不問岑探聚衆搆謀經年乃發而所部官吏茫不覺知使一方赤子肝腦塗地然亦止於薄罰童政凶狡貪殘非一日之積而監司乃令將兵討賊以致數千人無辜就死亦止降一差遣近日溫杲誘殺平民十九人寃酷之狀所不忍聞而杲止於降官監當蔡州捕盜吏卒亦殺平民一家五六人皆婦女無辜屠割形體以為丈夫首級欲以請賞而守倅不按監司不問以至臣寮上言及行下本路乃云殺時可與不可辨認白日殺人不辨男女豈有此理乃是預為凶人開茍免之路事如此者非一臣不敢盡言特舉其甚者耳如此不過恩庇得無狀小人十數人正使此等歌詠愛戴不知有何補益而紀綱頽弛偷惰成風則千萬人受其害此得為仁乎大抵為國要在分别是非以行賞罰然後善人有所恃賴平人有所告訴若不窮究曲直惟務兩平則君子無告小人得志天下之亂可坐而待此臣所謂賞罰不眀之咎也紹聖三年監察御史蔡蹈上奏曰臣伏覩近降聖旨指揮以金眀池修龍舟了畢特支度牒十五道賜供備庫副使楊琰者按琰本木工止緣技巧馴致使名祿養豐厚特有加賜近代以來以工巧被寵遇者未有如琰比也而琰之圖效非有搴旗斬將之勞而操規矩執繩墨以指撝庶工正其責也龍舟之役其費不資朝廷不責其過侈以傷太府之財幸也復以度牒賜之未為允當且今度牒直金二百千以十有五牒計之凡三千緡非不多矣舉而授琰曾不計校甚亡謂也若謂其功可賞耶設或運機精思殫盡竒巧以窮耳目之玩不過百工何足多尚朝廷賞之過厚內外籍籍不無議論凡賞罰所以存勸沮也賞當乎功則天下勸而赴功者有之矣罰當乎罪則天下沮而逺罪者有之矣今以一龍舟之勞而命賞過厚不知意果何在耶若謂其勞不可以不賞則邉陲用命國爾忘家之人緩急不同假令邉陲之士為陛下臨危拒敵而致其死不知何以為賜豫臣等竊聞諸路州郡每有興修河渠水利官府祠廟等干朝廷乞降度牒不唯重惜未即應副而詰問勘當十不得五其重如此而獨於賞琰不以為意何耶臣等愚陋欲望聖慈特賜裁減天下幸甚哲宗時監察御史常安民奏种誼擒鬼章賞未稱功疏曰臣聞邉功有二王者之德如天之覆如地之載微至昆蟲草木逺而戎夷蠻貊皆被其澤無彼疆此界之異而因利乘便入其土地俘其人民奪其城壘此求利之功也雖不賞可也賞之不可厚厚則生邉患若夫背德負義玩威入寇焚毁民居殺掠生聚強據州郡脅誘部族結從連衡窺伺中華一旦竊發噬臍何及而能先敵鼓勇出其不意使敵不及拒計不及施此去害之功也安可不賞賞之不可薄薄則沮士氣往嵗西蕃董氊大將鬼章青宜結桀黠有智數熙寧中於踏白城誘陷洮西安撫四方館使景思立全軍漆其頭顱為飲酒器人怨神怒先帝嘗下募賞之令厚捐金帛命李憲圖之凡十餘年未有能稱詔旨者元祐中乃敢隂連西夏誘結蕃首約為內應從之者十已八分遂犯疆土殺虜蕃户燒蕩其廬舍掘發其窖藏蹂踐其苗稼斬伐其材木遂據洮州屠戮酋豪無敢誰何方是時种誼守岷州鬼章之兵已逼岌乎如挂虎口誼稟命於經略司求出師者數矣而劉舜卿以朝廷方休兵息民恬不為意其後朝廷遣遊師雄使熙河而趙醇忠郎結氊包順包誠之徒灑淚泣訴推心痛恨師雄乃趣舜卿然且猶豫纍日卒用誼謀誼師既出先命焚飛橋以斷蕃兵之路把衝隘以絶傳報之音卒能雍容靜密生擒鬼章獻之闕下西夏五十萬之衆及境聞之遂皆遁去勳烈煌煌誰與倫比而廟堂之議乃欲不崇邉功為安靜之䇿不問其有去害竒功非求利之比槩薄其賞臣愚竊謂擒獲鬼章誼忝謀首親冒鋒鏑功居第一師雄不辱君命能趣舜卿俾用誼謀功又次之舜卿觀望勉從功宜居下而當時推賞師雄自宣德郎軍器監丞改奉議郎陜西轉運判官繼除校理固不為過舜卿自龍神衛四廂都指揮使髙州刺史遂擢為殿前都虞候寧州團練使其崇峻如此而种誼乃自莊宅使北遷西上閣門使康州刺史未足以稱其勳烈先帝詔令具在殺獲鬼章者未仕人授諸司使今朝廷正宜信賞而酬誼止此豈先帝詔令可以閣乎抑賞可以不行乎以為邉功不足崇尚乎則何以奏告裕陵鬼章擒獻之日百官聚見四方馳表稱賀也臣訪聞阿里庫四溫錫沁以附西夏有吞併熙河之志蕃部一搖足則熙河非中國所有蜀道亦有受敵之憂矣人材之乏未有甚於今日而將帥之有威名者唯种氏為最著臣愚竊謂宜於此時申白种誼前日之功優加褒進以勵將帥則人皆知勸而邉境無虞矣侍御史劉摯上奏曰臣竊以聖人之運天下也其政事大要在於賞罰賞罰之令堅於金石信如四時使有功者不逾時而蒙賞失職者不旋日而被罰故天下凡待賞罰而後勸沮者莫不奔走從事趨上之令此天下之所以治也然則賞罰之施於天下不可以不信而臣以謂施於盜賊者尤不可以緩也方民之被盜也田里閭巷晝夜惴恐縣官惻然開告捕之科不愛厚賞提官爵抱金帛恨不即得有功者付之幸而賊得矣而有司不能推奉詔旨乃苛以文法考詰稽留使人不得亟蒙有勞之利臣竊以為後日憂也伏見元豐七年澶滑之間保甲有為劫盜者其首曰單安曰王乞驢又曰張謝留離合出入凡數十人往來二州間虜掠平民焚蕩村落殺人取財以至傷殺官吏屠害軍兵又嘗轉入衛州界一方不安朝廷督責捕盜官司至於自京遣使募衆而州郡調發將兵及降專賞指揮是年逐賊皆於澶滑次第掩獲各正其罪而推賞之典至今逐司不為保明首尾二年矣夫奮不顧死冒矢石以與亡命者格雖莫不有職然要之趨賞之意多也今失信而後時誠恐緩急不足以率厲此其為患有不勝言伏乞指揮根究住滯官司特賜詳酌重行黜責以眀賞罰以戒違慢右正言劉安世論開封官吏冒賞事狀曰臣伏見御史臺舉劾開封官吏將大辟罪人寄廂妄奏獄空致朝廷誤推賞典如聞已降指揮錢協止令贖銅出知越州林邵范子諒並與小郡其餘官吏特免改正雖門下省嘗具封還續準朝旨惟展磨勘此乃陛下至仁至厚不欲窮治而協等所犯情實欺君考之公論皆謂責之太薄而名且不正事關國體須至論列臣聞人主所以鼓動天下制馭臣民之柄莫大於賞罰使賞必及於有功罰必加於有罪則四海之內竦然向風而無不心服者矣惟其無功者虛受有罪者幸免遂容僭濫而其弊將至於無所勸懲然則為天下者安可不以至公而慎用之乎今開封官吏以大辟之囚權令寄廂敢肆誕謾謂無一人之獄朝廷信用其奏亟推厚賞進官錫服幾二十人下至胥吏亦霑恩賜播傳天下書之史册何可掩也繼而臺臣抗章彈其繆妄陛下付之執政按見實迹縱不欲論以全罪猶當奪其誤賞之官少為天下誣罔之戒而乃一切仍舊復得名藩使協善去不過如此今實有罪何以示懲陛下若眀正刑典則虛偽之迹固在協等茍謂已行之命憚於追改則好名之謗遂歸朝廷傳之後世實纍聖德伏望陛下特徇公議追協誤賞之官黜之小郡其餘官吏亦令改正使天下知公朝之名器不可幸以得非惟塞小人奔競之路亦助成陛下無私之政所以詳論之者蓋欲救正國家之大體非特區區為一錢協而發也伏惟留神省察早降指揮安世又論趙卨無名進職等事狀曰臣伏見朝廷近除知延州趙卨為樞密直學士博考僉言極有異論輒據公議上煩天聽臣歷觀祖宗以來待遇帥臣之體或以其久在方面夷人畏服或以其征伐捍禦績用彰著再委蕃宣之任方行進職之典禼治鄜延未滿三嵗考其行治無以過人伏讀誥詞又非再任方朝廷進拜執政而卨獨無名同日遷陟中外傳播皆謂失體兼臣風聞卨嘗遣使與西夏納稅反為羌人執而戮之審如傳者之言則挫國宋之威靈沮塞垣之士氣守邉無狀孰甚於此賞不當賢則無以勸善罰不當罪則無以懲惡而況無功受賞有罪不罰欲持此道以治天下臣竊惑焉伏望聖慈特加考驗若卨果有上件事迹不惟收還新命亦乞明正典刑庶使貪功邀利之徒有所戒懼右司諫郭知章上奏曰爵祿慶賞以勸天下之善願無以假借大臣使行私恩刑罰誅戮以懲天下之惡願無以假借大臣使快私忿忠於陛下者必見忌大臣黨於大臣者必上負陛下惟眀主裁察徽宗即位初御史中丞王覿上奏曰臣竊以賞罰者大公之器也重輕與奪之間不可以不慎茍重輕不倫與奪失當則非所謂大公而無以示懲勸於天下詩云周道如砥其直如矢君子所履小人所視謂均平而無偏曲也臣伏見向者東南郡縣緣根究逃絶戶而增稅受賞者朝廷察知其弊故李琮降黜而今年七月十三日敕應因李琮奏請被差根稅官更不酬賞已酬賞者吏部根究追奪此有以見朝廷深恤民隱不忍使貪競欺罔之吏盜取恩賞以蠧害無辜之民也然臣所未諭者彼緣市易冒賞之人朝廷亦察知其姦矣乃獨吕嘉問降知淮陽軍而其餘冒賞者並無追奪指揮竊聞言事官亦頗有論列而久未行遣公論深以為疑夫根稅之患止於東南而所增之稅皆入於縣官可以還於民也其賞大率不過堂除優便先次差遣之類而已有得以轉官循資者少矣市易之患被於天下破民之産而利皆歸於牙儈胥徒不可以復還於民也其賞至於轉官升任分取息錢者莫知其數矣夫為患之狹且淺而冒賞之少者即行追奪為患之廣且深而冒賞之多者即置而不問其輕重不倫與奪失當者如此則果何以示懲勸於天下哉或謂今年七月八日詔書既宣示中外以蕩滌隱疵闊略細故矣今冒賞者復行追奪則豈詔書之意哉臣竊以為不然夫前日詔書之所恕者隱疵故而已今市易之患遍於天下凡富商大姓破家竭産而棄妻鬻子者道路相望也賴聖慈矜憐無辜蠲放逋欠濵於死亡之民復有生意其虛增息錢欺罔之吏緣詔書而不治其罪可矣至於冒受爵賞豈詔書之所恕耶假如有詔書之前妄冒取官俸詐欺取民財者今日發露而有司治之則豈可引詔書而不行追理也今年七月十三日敕根稅官酬賞追奪係七月十二日聖旨指揮亦在七月八日手詔之後即是追賞與詔書兩不相妨事理眀白臣伏乞朝廷指揮有司緣市易而冒賞者依根稅官體例追奪以慰公議大觀三年御史中丞翁彥國上奏曰臣伏以慶賞之柄人主所以礪世磨鈍也仰惟陛下勵精致治未眀求衣旰食聼事以詔多士士之起以赴功底績者不可勝計於是醲於用賞以示勸焉甚盛之舉也然禮有常數事有勢極過則為濫臣請托所聞而論之伏見比年以來臣僚有被眷異者不惟官職之超躐錫賚之便蕃多遂賜第者臣聞蒙賜之家則必宛轉計會踏逐官屋以空間為名或請酬價兊買百姓物業實皆起遣居民大者亘坊巷小者不下拆數十家一時驅迫扶老攜幼暴露怨咨殊非盛世所宜有況太平嵗久京師户口日滋棟宇密接略無容隙縱得價錢何處買地瓦木毁撤盡為棄物縱所得地何力可造所失者固已多矣既而鳩工市材一出公上請托營繕務極壯麗糜費不資陛下知其為恩未知其為害羣臣莫為陛下言者得無惡於害已歟設將相大臣有大勳大業非尋常賞典所可報賜第可也邇者用為從官一無可紀已聞賜第矣恩幸技術憑藉寵遇攀援僥求漸不可長陛下以天下為度於臣僚慶賞略不少靳此天下所共惜之臣願為之藝極而已臣僚所得月俸以其終身計之幾何哉至於賞格最厚者不過數百匹兩使嵗月之中比比受賜亦幾何哉奈何嚬笑之頃頓損十百萬為一第之費及斂數十百家之怨為一家之惠陛下何取於此天下之財入之有經用之有節將積如丘山公私富藏可跂而待也入之有經用之無藝江河之流不能實漏巵矣伏望睿慈少賜留神萬一可採請自今以始非有大勳大業暴著天下者弗復賜第雖已得旨許三省執奏臺論諫爭庶以下息覬覦之心仰稱聖眀愛民節用之意宣和元年中書舍人許翰上奏曰臣聞兵家之法使貪者為我爭使愚者為我死夫若是者非他有利以導之也則賞固不可以不厚雖然爵祿顯設於朝維其得之難也是以人危身而取之使其欲而易得得而已充則人孰復肻輕身冒矢石陷堅拔敵為國行此危事而求竒功哉故無功而賞則有功者怠效薄而賞厚則人無志於極功而國不收其偉績是賞不可以不審也昔景德間契丹犯澶淵真宗皇帝親駕征之自是強虜請盟至今不復窺邉然而師還賞功如大帥李繼隆等不過進階次加食邑雖周文質身督所部射撻覽而殪之酋帥既亡虜衆遂潰然亦不過小遷其秩而已又熙寧用兵安南郭逵為帥大破賊兵於富良江自是交址不敢復動神宗皇帝猶以師無大功斥其賞是時燕達最有功不過進秩二等蓋故時邉賞若斯之艱者將復有以用之故也比者西師賴陛下神眀威武羌戎震懷屈膝請服然其桀黠反覆尚未可以保其往則將吏之賞不可不留其未滿之意以待復用也臣自蒙恩使得待罪掖垣與兵房事月餘日間伏見西師賞功凡行一百七十餘人積除二百五十餘官其間轉行遙郡者凡二十餘減磨勘者不復數計距臣領事之前則所賞者不知其幾何也雖臣之愚不足以權戎事之大計然願陛下參諸景德熙寧審賞之意稍謀所以酌損此者故臣輒敢因董成郭寧之事而推言之非特為此二人惜數官而已也謹按周官六功之賞戰功曰多所謂多者非特貴夫多算古者振旅則飲至於廟以數軍實計所獲多以為勝焉今二人之兵以其所獲除其所亡猶不足也則是得不酬失功不補過而亦蒙厚賞於朝臣欲遂行其詞則不知所以為説是以冒昧而請之徽宗時御史許景衡上奏曰臣伏覩近降指揮捕獲方臘赴闕統制官楊惟忠於京兆府賜官田十頃官宅一所臣竊惟蕩平浙寇生獲渠魁肇自聖謨授成將帥其間偏裨佐屬各有勤勞凱旋之初第功行賞髙爵厚祿皆以為意外之獲也彼惟忠者已該賞典超轉五官今來宣撫司保眀再有陳請度越衆人賜以田宅竊以謂一夫僥幸雖未足言誠恐同時立功之人各懷觖望之意蓋朝廷既開此例則無以杜絶後來若偏裨皆冒橫恩則在官田宅將不勝其求矣古者惟有大勳勞則錫田賜第而祖宗以來將相大臣功德卓越者亦止於賜宅而已今睦賊就禽豈獨惟忠之力奈何特異諸將冒此踰分之賞哉前日王師撫定燕山近者勦絶奚賊將佐皆立竒功慶賞亦既行矣彼視惟忠所獲豈不歉然皆有不滿之意耶臣愚以為破請囑之姦革濫賞之弊使後來者不敢攀援妄有僥求宜自惟忠始所有賜田宅指揮伏乞睿斷特賜寢罷御史中丞王安中上奏曰臣竊以慶賞之柄人主所專故書曰惟辟作福而周官太宰特以爵祿之事詔王至於馭富馭貴則惟王之聽而已以是知人臣之分勞固不可自言賞固不可先啓也臣伏覩陛下親灑宸翰申戒濫賞凡不以勞能定等其保明官吏并受賞者以違御筆論又因眀堂巨典告成推恩度越常格申戒官司毋得攀援陳請然則賞無輕重惟務當功朝廷守于上臺臣察于下聖慮一定其誰敢干臣尚願稍因近事申警一二比者陛下修祖宗以來太平盛事臨幸西池而雅飾池苑東西八作事材等官十三員輒援例乞推賞恩將作監遂為取旨收接敷奏夫官以繕完為職若每事邀賞臣恐朝廷官爵有限不足以待之又中山府路帥臣河北路轉運使以深州濬壕先事奏請指期上功其役甫休干澤之書亟至深州數里之城耳所保奏者官三十七員使臣胥吏三十二人又詆大名五十餘里之隍池為不足比陛下灼見池苑因舊雅飾深州壕功不大并出宸斷更不推恩此誠足以杜僥幸之原破經營之計矣然既曰更不推恩是乃無足賞者則官吏攀援將作監取旨收接帥司漕臣先事奏請獨可無罔功之罰乎方今懷利之臣造端興事廣辟置以來賕請偷嵗月以糜添給官資積纍遽至顯列財用耗屈復擾齊民將懲此風盍自此始臣愚欲乞特降處分併賜行遣仍乞申戒有司自今非戰多軍勝不許申眀收接陳乞恩賞事及凡營繕去處不許先事乞候功畢保奏其如顯有功效在所優賞即乞臨時出自聖裁降旨取索旌一勸百用尊主勢如此則下安分義時無濫恩操柄不移名器隨重裕民足用其本諸此惟陛下裁擇左正言任伯雨上言曰臣伏以人臣罪惡無大於為逆朝廷誅赦莫先於正名名曰姦凶則永不可赦設負寃抑則合辨眀若惡名未辨而遽以恩數加焉人所竊議非朝廷之體也臣伏見司馬光等皆已復官但聞三省同奉聖旨依稟行下而中外不知所以遽復其官者以何名也竊惟光等昔以姦凶悖惡無人臣之義厥罪貫盈已死難置子孫親屬所得恩例亦皆追奪天下皆知其所以得罪之名矣罪名如此雖該大赦豈在敘復之限其家子孫寧有再仕之理今朝廷恩典逮於存沒而有罪有寃終未辨眀授以美官惡名猶在使光等魂魄有知豈敢以姦凶悖惡之身偶因赦宥而濫受無名之賜乎臣謂光等前犯若有實狀不當引赦原罪如涉寃枉則朝廷昭雪之惠不可不發於訓詞也昔用言章行遣非先帝之本心今以公議辨眀乃聖人之善述事無嫌礙理可施行伏望聖慈特賜詳酌指揮欽宗時侍御史李光上奏曰臣竊惟聖主制世御俗之方莫大於賞罰所以行賞罰者莫先於至公古者爵人於朝與衆共之刑人於市與衆棄之明不敢以己之私恩廢天下之公議也臣伏見金人內寇都城危逼士大夫委職而去者五十二員近緣臣僚論列有旨令吏部具職位姓名送大理寺根勘約法斷罪陛下示大公之道可謂盡矣命下之日士論紛然或謂罪同罰異致陛下有失刑之譏大臣負黨姦之謗不可不察如衛仲逹張勸馮溫舒蔡行兄弟皆從官也林虞劉燾袁植皆致仕也在仲逹勸則除名勒停虞則追五官除名勒停行兄弟及溫舒燾植則置而不問或旋求名目如蔡績蔡續者或妄托假故如許仔宋時者種種姦欺莫究虛實其為擅去官守一也今詐冒者反得輕典孤拙者多陷深文陛下既已付之有司法者天子所與天下公共也原情定罪不容有所輕重況得而私之哉伏望聖慈將大理寺定斷到應干逃避臣僚係在去年十二月十七日已後不問有無事故盡作擅去官守一等坐罪庶幾公道昭眀人言弭息不勝幸甚髙宗建炎元年尚書右僕射李綱上奏曰臣聞運會之厄何代無之為臣子者不幸而遇其時則伏節死義有死而已國家涵養士類垂二百年適遭金人之變劫質二聖擁鑾輿而北遷逼立臣僚易姓建號而近臣百官忘朝廷之厚恩惜性命於俄頃稽顙屈膝奉命稱臣有為金人之股肱驅逼道君太上皇帝皇太子后妃及搜捕宗室戚屬者有為金人之喉舌傳命令廢本朝而建偽楚者有因為姦利汙染國戚者有為偽楚之輔翼揔其政事者有受偽楚之官爵與聞議論者有肆為惡言以辱本朝以諂邦昌者或為之草勸進之表或為之定册立之儀視之恬然不以為怪夫節義者正所以責士大夫也至於武夫則當濶略昔李唐有安祿山之亂大臣如達奚珣陳希烈之流皆相賊用事而其餘受偽命者肅宗反正以六等定其罪然後唐之威令申以有中興之功今宜倣此考核其罪之輕重以為之用事者為一等以受偽官遷職者為一等以北面而臣事之者為一等其有致仕及曾乞致仕而不許者猶有羞惡之心並與旌别應以忠義為敵所殺如李若水等皆追贈而優恤其家則善者知勸惡者知戒天下之士風丕變矣夫節義者天下之大間也近年以來士知利而不知義故平居無事之時惟以保家謀身為得䇿而一經變故坐視君父如行路之人自非一振國威大變其風天下未易理也伏望陛下斷而行之以扶持節義之教天下幸甚綱又上奏曰僭逆偽命乃今日政刑之大者張邦昌當道君朝在政府者十年淵聖即位首擢為相方國家禍難金人為易姓之謀邦昌如能以死守節推明天下戴宋之義以感動其心敵人未必不悔禍而存趙氏而邦昌方自以為得計偃然正位號處宫禁擅降偽詔以止四方勤王之師及知天下之不與不得已而後請元祐太后垂簾聼政而議奉迎邦昌僭逆始末如此而議者不同臣請備論而以春秋之法斷之夫都城之人德邦昌謂因其立而得生且免重科金銀之擾元帥府恕邦昌謂其不待征討而遣使奉迎若天下之憤嫉邦昌者則謂其建號易姓而奉迎特出於不得已都城德之元帥府恕之私也天下憤嫉之公也春秋之法人臣無將將而必誅趙盾不討賊則書以弒君今邦昌已僭位號敵退而止勤王之師非特將與不討賊而已劉盆子以漢宗室為赤眉所立其後以十萬衆降光武但待之以不死邦昌以臣易君罪大於盆子不得已而自歸朝廷既不正其罪又尊崇之此何理也陛下欲建中興之業而尊崇僭逆之臣以示四方其誰不解體又偽命臣僚一切置而不問何以厲天下士大夫之節綱又上奏曰臣竊以戰危事也驅之於萬死一生之地蹈白刃冒矢石以首爭首以力搏力而求勝於一日之間非有賞刑之信何以要結其心鼓作其氣使之犯難忘死而效命哉古者賞必先士卒而不踰時欲其知勸也誅不舍貴近而無幸免欲其知懼也近年賞罰與此相違賞之所行皆權貴囑託與親隨廝役之流而士卒履行陳以立功者未必賞將帥提兵以自衛見敵不戰望風遁走者又不加誅而士卒潰散亦以轉山迷道為名而招集之則彼何所勸而力戰何所憚而不走以求生哉臣頃在樞密院見童貫推燕山賞案沓及於朱勔父子并其壻如知秀州周審言皆未嘗從軍則其餘所賞者推類可知而西兵陳狀乞賞皆十數年前未施行者詰其所以則當時帥司既上功狀復送下保眀經隔嵗時將帥移易則保眀不至而賞不行今雖欲行亦無所考據矣又賞功散於諸房既無程限又不委官點檢人吏得以髙下其手使有功者憤歎然則欲士卒之知勸何可得也又聞燕山之役劉延慶擁精兵十五萬於盧溝河燕山縱間言且將劫寨延慶信之遽焚積聚以中軍先遁而十五萬衆一夕俱潰童貫不能誅而反以銀絹招潰兵然則欲士卒之知懼何可得也積習之久將士玩以為常靖康之間雖驟賞力戰如鄒處節之軍斬梁方平張帥正王從道之徒猶未足以革前日之弊故金人再犯都畿將帥奔走士卒潰散者不可勝計今日之䇿非大變此風不能有濟欲乞令三省樞密院同置賞功司專差人吏承行應有戰功者並令將帥所轄官畫時條具結罪保眀申奏賞功司置籍承據功狀次第取旨推賞人吏承行量事立程限委左右司郎官樞密都承旨點檢違限者黜罰因而受賂者依軍法即有冒賞而不實者許人告推治改正元保眀官司重行竄責其遇敵不戰輒逗撓奔北之人必誅别立約束行下庶幾士心孚信舊弊漸革紹興間綱為江西安撫制置大使又上奏曰臣伏見祖宗舊制軍功賞格以首級為法每獲一級或轉官資或支銀絹是以當時賞功核實無偽濫之弊自近年以來納級計功之法廢全軍推賞之制行諸將告捷皆以棄頭不斫橫尸滿野推墮崖谷沉溺江湖不可計數為言遂使有司不得核實朝廷無所考據一軍千人則千人推賞一軍萬人則萬人計功殫官爵不足以褒寵竭府庫不足以錫賚嵗用之廣百倍往時罄百姓之脂膏耗朝廷之根本日益月增殊無藝極臣未見其可也今者車駕巡幸建康將定恢復中原之䇿則所以懋賞報功使將士知勸節以制度使國用不匱不可不深為之慮也臣愚伏望聖慈特降睿旨今後諸將告捷並計級數不得以棄頭不斫橫尸滿野推墮崖谷沉溺江湖為言除保眀驗實計級推賞外其有摧鋒陷陳強弩破敵立致竒功之人雖不獲級别許保奏優異推恩庶幾實立功效之人有所激勸而朝廷無濫賞之費戡亂定功不難致也綱又上奏曰臣竊思國宋近年以激勸將士之故每一戰勝則不計首級全軍推賞習以成例帑藏為虛今者諸將咸捷當行慶賜欲廣其施則懼物力之不給欲少其賜則懼士心之未厭此尤所當慮者也夫人情感激有不待賞而勸者推賞先後有未下車而封者臣願陛下降哀痛之詔憫將士罹兵革之苦凡死於戰陳先加封爵厚給賻贈收恤其家死者褒則生者勸矣然後眀詔統帥審定功狀俟防冬解嚴慶賜併行其誰曰不然昔勾踐厚養死士而士卒思奮漢祖先封雍齒而反側者安急先務也臣愚不達大體惟陛下裁察塵瀆天威無任惶懼戰越之至建炎元年知開封府宗澤上奏曰臣聞情生於愛愛生於見見生於目之所遇與左右之所接所遇所接果順於己則喜喜則賞之賞之者非懋其功也賞其順己而已耳所遇所接果逆於己則怒怒則罰之罰之者非罰其罪也罰其逆己而已耳如是則賞罰出於喜怒喜怒出於逆順可謂之公無私乎賞罰私徇其何以礪世磨鈍大有為於天下乎聖人無我故忘情忘情故忘逆順忘逆順故忘喜怒故賞一善而天下之為善者勸知其非私喜也罰一惡而天下之為惡者沮知其非私怒也一賞一罰歸之至公而我無容心焉人其不心恱而誠服者乎陛下所以號令天下使人知所趨知所避知所行知所止者賞罰而已昔文王一怒而安天下之民武王亦一怒而安天下之民是怒也豈發於目之所遇於左右之所接哉彼敵人橫肆凶暴侵犯我王室臣願陛下如文王武王亦一怒而安天下之民有賞有罰惟平惟一至於應酬萬機進退取豫之際斷之至公以慰天下之望三年趙元鎮上奏曰臣竊謂國家武功之不立以軍政之不修軍政之不修以勸賞之不眀也自崇觀用兵以來積為斯弊至有殞身鋒鏑之下而不蒙恤贈執役權要之門而反被優恩進退取捨無復公道勸賞如此何以責人死力玩習之久今猶未除遂使轅門之士扼腕竊議憤憤不平實祻亂所由興也雖然賞不患乎吝患乎濫賞至於濫與無賞等蓋賞以待有功以功被賞人則為榮樂事赴功率為我用今也有功者賞無功者亦賞得之固不為榮亦何必有功而可得幸門百出賄賂相髙臨敵當先果誰用命奏功來上人得挂名淆亂其間公私相半受賞者則懷恩於私室無賞者則歸怨於朝廷是皆冒濫之弊有以致之不可不察也前此固不可以槩舉昨勤王之賞最為有法髙下品第人無間言雖朝廷立意盡公不容少紊而有司受情作弊豈得無私竊聞常州通判梁汝嘉之弟身在衢州常州推官林達卿之弟身在福建挂名功狀隨例補官足迹未嘗及軍將士不識其靣與臨陳效死之人同被戰功之賞此物論所以未免紛紛也然臣所知者止此二人而已其所不知可勝計哉臣愚欲望特降指揮别作措置今後將帥及應干有司保眀功狀未嘗立功而輒敢挂名者重立賞錢許人告捉有官人奪所有之官無官人奪所冒之官盡以授之量事大小更與推恩保眀官吏及冒賞之人重置於法所給賞錢亦令均備稍革弊病以勸忠勤是乃君天下役使羣動之術也建炎中左正言鄧肅上疏曰臣嘗備員鴻臚主簿因敵人須道釋板籍以職出拘於敵中凡五十日敵人之情已備知之自尼堪以下至於步卒分朝廷所賜之絹人得五十有五匹計朝廷所出之數以千萬為率則盡敵人之數不過十六萬有餘而已況有陳亡者有疾病者有以事還敵者有隨軍以供戰具者其得絹亦與尼雅滿等以諸色人所占之數當與戰卒中分則敵人正兵固不過八萬耳因得朝廷所與綾錦等敵人謂之表段當時分散其數雖同其物不等金人得錦勃海得綾契丹得緙織之類而九州所得者雜色而已一日忿然欲起相攻則敵人之心亦不齊矣忽一日有敵人遇臣泣下臣問之對曰某兄弟三人荷戈而來伯亡於真定季亡於京城今聞元帥之兵大集而南方兵馬動連數州某豈復得見鄉曲耶臣初不信其語及見敵中士夫道釋各有餉飰之人其皇恐之語皆如臣所聞則敵兵亦何嘗不怯也夫敵兵之數既不甚多又加之以其心離其氣怯儻合天下之力以攻之若無足畏者然敵兵未嘗少挫而中國之勢陵遲至此其故何也蓋敵無他長惟信賞必罰不假文字故人各用命不以死為畏耳朝廷則不然有同時立功而功又相等者或已轉數官或尚為布衣輕重上下止在吏人之手賞既不明人誰自勸此正朝廷之大病也臣愚欲望聖慈專立賞功一司用重祿法使凡立功者人人自陳若功狀已明輒踰旬日而不得告者有所立之功同而賞有輕重者有立功之時等而賞有後先者並重置之法常赦不原又專委臺諫官二員提點其事若臺諫不知覺察亦置之法如是則寸功無不録矣夫寸功畢録人孰不樂赴功名之會乎若天下人人有樂赴功名之心而使之攻八萬已驕之敵則社稷生靈又何患哉惟陛下留神肅又上論嚴賞罰曰太祖太宗之時法嚴而令速事簡而官清未嘗旁搜曲引以稽賞罰故能以十萬精兵混一六合自時厥後羣臣無可論者今日獻一䇿明日獻一言煩冗瑣碎惟恐不備此文書所以日煩而政事所以益緩也今兵戈未息豈可揖遜進退尚循無事之時欲乞限以旬日期於必至庶幾法嚴事簡賞罰之權不至濡滯紹興四年王之道論賞罰不當疏曰臣觀今日天下之大患不在夫強敵與盜賊而在夫賞罰不當蓋賞罰人主之大柄也人主髙居深拱而能使四方萬里鼓舞震動忽然如神日以奔命赴功而天下若不足為者恃有此耳使其不當則賞非特不足以勸能而能者且怠矣罰非特不足以懲惡而為惡者益得以自肆矣然則天下何由而治乎古人善用兵者莫如孫武其言曰主孰有道將孰有能天地孰得法令孰行兵衆孰強士卒孰練賞罰孰明吾以此知勝負矣夫論兵家之勝負而始乎主孰有道終乎賞罰孰眀其言有深意也伏望皇帝陛下慨然奮發以賞罰為中興之要務夙寤晨興思所以求其當賞自賤始必欲當其賢罰自貴始必欲當其罪何者為當賢賞一人而千萬人恱曉然咸知為善之利者斯當賢也何者為當罪罰一人而千萬人畏曉然咸知為不善之害者斯當罪也賞當賢罰當罪而天下自治矣天下既治而敵人之不寧盜賊之不滅未之有也九年右正言陳淵上奏曰比年以來恩惠太濫賞給太厚頒賚賜豫之費太過所用既衆而所入實寡此臣所甚懼也周官唯王及后世子不會説者謂不得以有司之法治之非周公作法開後世人主侈用之端也臣謂冢宰以九式均節財用有司雖不會冡宰得以越式而論之若事事以式雖不會猶會也臣願陛下凡有錫賚法之所無而於例有疑者三省得以共議戶部得以執奏則前日之弊可息矣淵又論鄭億年狀曰臣伏覩正月二十八日指揮鄭億年復資政殿學士依舊提舉醴泉觀行在居住仍奉朝請臣聞賞罰者國之綱紀也聖人用之有萬世之公有一時之權萬世之公可常而不可變一時之權可暫而而不可久故能賞當其功罰當其罪而國之綱紀立矣今者忘萬世之公而任一時之權用賊豫之所以恱億年者以寵億年將使為善者不勸而為惡者不懼無益於綱紀而有害於中興之政臣固不得不論也臣謹按億年故相居中之子雖嘗為從官無他技能而有從賊之醜夫陷於賊固非人之所欲然從之而得美官必有取非其道者因赦而復之是以賊豫之所恱而與之者為正也其可乎且去嵗大霈所謂權也凡有官者不奪亦所以安反側耳而又有褒而遷之者以其不辱僭叛其義不可掩也又有遷而用之者以其明習將略其才不可廢也億年名在侍從之列其可自同於反側者乎其義果可褒而其才果可用乎此不待臣言也然則用權以廢公非所以待億年亦明矣而其所以可恕者宰輔之世身為從官不幸而陷於賊為不足誅耳然居中之秉政無狀天下所共知者億年夤緣以取兩制使無他過以至今日猶在討論追削之域而況於已嘗從賊不奪舊官而加之以職名乎夫以從官所宜得之職名億年其可與乎且資政隆名賊豫之所竊而與之者也固不可以言復矣陛下必以復為言者則已著其從賊之罪矣使億年粗有知識必不敢受強而授之則彼以義而獲褒如􅓸唐佐李亘之黨必曰億年以仕賊亦褒矣吾屬何榮彼以才而見用如李顯忠趙彬之輩必曰億年以負國亦用矣吾屬何安由是而推之必又謂嘗為賊豫將相者他日來歸未必不以將相處之也此聲一傳誰不解體是以一時之權寵一億年初無所補徒使為善者不勸為惡者不懼自壞賞罰之綱紀而更為今日中興之纍也此而不改民將失望後必難悔矣伏望斷自聖心將億年所帶職名特賜追寢使之在外居住庶幾逺去班列少息紛紛之論臣不勝幸甚髙宗時虞允文上奏曰臣竊聞晉守卿以監𣙜易院增課當賞太宗諭之曰通事舍人改官須為閣門副使若以利而進此職則守邉宣力之臣何以為勸嗚呼祖宗閣門貼職所以奬勵邉功而惜名器不以妄豫蓋如此載惟陛下聰明睿智既不惑於私謁慶賞刑威又足以以動化天下而兢兢業業一以祖宗為法臣所親聞而親見之也用敢抵冒天威裨萬分一謹按金鼐以財豪東南因納粟命官交結故相秦檜以看閣子為名專任南畝出納之責四為國信所三節人皆以納賂得之纍官至正使在廷百僚舊所不齒今一旦授以上閣之秩羣議籍籍不置臣竊以為決非陛下本意伏望睿慈特賜追寢尚書右丞許翰論吳敏疏曰臣聞春秋之義揚善伐惡垂著王道以詔萬世然晉文公乘惠懷之無親得反其國髙梁之禍天下之大惡也而春秋不書周襄王出居于鄭晉文為之誅子大叔以定其位陽樊之師諸侯之極功也則又不書而書晉文斷自伐曹侵衛之後是何故也聖人之意以謂晉侯既有大惡亦有極功絶此補彼使得相除是以皆沒不書一與之新而後踐土之勳爛然獨著於春秋使王道而不本忠恕如此則晉侯入國之惡不除蓋誅絶之不暇豈復有此霸業之偉哉傳曰記人之功忘人之過宜為君者也其義蓋出春秋臣伏見宣和之季金人始亂上下大震不知所為吳敏以給事中伏閣請對首建內禪之䇿以堅外禦之心是時太上皇帝久懷沖挹然而外無朝廷之助內有左右之沮堯舜之志未有以發也會敏白發其端擊節歎息遂定大議淵聖皇帝自在東宫恭儉聞天下及嗣位祚萬方相慶乖離之心一變歸往至今天下固不可解夫使人君以天下傳此古今之所至難言也而敏以孤臣眇然冒雷霆之威忘家族之禍而建明之此天下之竒節而去嵗秋唐恪聶昌耿南仲陳過庭等用事百計誣衊竄之涪川傷忠義之心折蹇諤之氣非所以視天下觀臣子也陛下龍興四海蒙澤當此時始望生還而坐城下之盟復竄嶺表使其垂白重親泣血萬里臣誠傷之且城下之盟自有主其議者敏於是時未為宰相衆説眩曜依違其間至於金人已還敏為宰相遂決意追襲但為已失事機斯敏之罪云爾得譴不當與衆人等以是遂廢定䇿之功則已重矣今録其過因廢其功臣竊謂非仁聖本意當時議者不詳失於建明而已謂宜眀詔還之赦智謀之不逮著忠力之無忘以勸事君非小補也且臣當去嵗之春數詆朝廷專和議則於敏非敢私也當彼隆盛之時臣與之爭及此斥逐而為之言區區何心其間端為國體而已矣中書舍人洪遵經筵進故事曰周世宗親征劉旻戰于髙平兵始交樊愛能何徽退走世宗躬督戰士士皆奮命爭先旻遂敗世宗休軍潞州大宴將士斬敗將樊愛能何徽等七十餘人軍威大振臣聞人君不難於用兵而難於御將其要無他賞罰而已方其摧鋒陷陳奮不顧身必謹録之所以為勸也及乎巽懦退縮偷生自營則誅之殛之在所不赦誠如是則人人自勵安得不致死於敵哉周世宗當五季之末干戈日尋國威不振髙平之役一日而誅敗將七十人上下懾服至於奮命戮力莫敢內顧遂能變弱為強因敗為功五六年間取秦隴平淮甸復三關雄武之聲聳動夷夏向使世宗優遊少斷循姑息茍且之政二將奔命不能明正典刑方且覆亡之不暇欲其征伐之克紀綱之行難矣哉夫天有時以生有時以殺故雨露以潤之雪霜以肅之二者相須以成嵗功人君持賞罰之柄亦猶是矣臣謂駕御將帥強兵克敵大要無出於此遵又乞皇太后慶八十增恩數劄子曰臣仰惟陛下睿孝生知皇太后聖德茂盛天錫純嘏新嵗八十溥天之下孰不欣恱恭審宫中講慶賀之禮仍許宰臣率百官稱賀甚盛舉也臣側聆欲以正旦降詔加恩士庶八十以上及宗室恩數不聞其他臣竊謂非常之慶當有非常之恩而郊祀肆眚未逺若復舉行徒為小人之幸耳臣愚欲乞於詔書中增益數事如升朝官有父母者並與加封一次命官服緑服緋及年八十以上與改賜服色民庶八十以上略如漢制賜以米肉酒紹興平江府湖州被水人户明年夏稅不以多寡並與放免仍乞下户部檢會二十九年州縣合納和買紬絹無拘等第蠲除其半庶幾錫類之澤遍於敷天而實惠浹洽和氣歡聲蒸為太平則皇太后膺億萬年之夀與天無極不為小補臣誠固陋竊不勝狗馬心冒犯天威無任戰栗遵又上奏曰臣伏見陛下總攬權綱之初憤秦檜專政時所用臺諫皆鷹犬傅麗排抑忠良辜負耳目之寄故丙子之冬詔書首下用以申飭在列聖德昭明灼見姦偽無毫髮錙銖之隱然則一時朋附之人因兹以得髙位者所宜旋踵竄逐以為萬世之戒臣謹按故端明殿學士李文會凡下妄庸奴事秦檜獻諛售佞交濟其惡遂自選調得編修官既而改秩即為御史考其平日所為未有不迎檜之指意者以故曾不三年躐登政府繼雖斥去猶得守遂寧帥瀘南士大夫合辭惋歎以為失刑往嵗陛下親政以輔臣之舊例遣人頒以茶藥文會自知罪大專用媚竈之術摩足奉溺無所不至及為成都貪毒弛繆動為民害吳援在綿州肆其苛暴千里重足而立文會不惟坐視至於剡章論薦仰欺聖君俯負全蜀凶慝彰露鬼得而誅文會之死蜀人交口相慶使其茍生以至今日必蒙放殛之刑然則四官之贈遺恩之及盡用前執政禮臣所未諭臣愚欲望聖慈特賜睿斷暴文會之惡罷其恤典上以應明詔中以慰蜀人下以全公議歷代名臣奏議卷一百八十八
