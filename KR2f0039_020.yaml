body:
  text: 歷代名臣奏議卷二十明楊士竒等撰郊廟宋神宗熙寧元年知諫院吕誨論青城勞費乞建齊宫奏曰臣伏覩纍降詔敕裁減煩費有以知講求治體崇儉為先中外共聞莫不慶抃臣切謂裁約用度事體至輕有司奉行當有條理唯南郊青城所須數十萬緡勞費至廣無益奉祠之大者謹按周禮掌次之職旅上帝祀五帝則張大次小次居止於壇壝之外蓋所以示虔恭之至矣近世制作無度禮意俱失虛設梁棟純被繒綵規摹宸居極其華麗甚者山亭水池蟲魚之戲綵花交映禽物萬狀逰觀之勝無不具焉前期旬浹縱士庶嬉遊其間是豈蠲潔事神之謂哉徒成侈靡夸大一時臣雖至愚甚為聖朝惜之且大禮尚質猶懼不稱乎天德而華觀所居恐非得以清乎齊戒儀衛之盛今古不同大次之位豈須幄帟不若營建齊宫以圗永久臣嘗觀太廟齊宫制度儉約事神之體得為中禮臣欲乞規此憲度創建郊宫中潔齊居外嚴宿衛非特事祀克循簡易庶幾國用大省勞費我朝興隆一百餘年未暇改為陛下一旦經始人心必恱有益聖德於事易行伏望留神省察天下幸甚翰林學士承㫖王圭奏曰正月二十三日敕奉聖㫖令兩制待制以上至臺諫官與太常禮院同詳定今年冬至當與未當親行郊禮臣等謹上議曰按王制喪三年不祭唯祭天地社稷為越紼而行事傳謂不敢以卑廢尊也是則居喪而可得見天地也春秋僖公三十三年傳凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟杜預以謂新主既特祀於寢則宗廟四時常祀自當如舊是則居喪而可得見宗廟也周公稱商髙宗諒暗三年不言子張疑之以問仲尼仲尼答云何必髙宗古人皆然髙宗不云服喪三年而云諒暗三年者杜預又謂古者天子諸侯三年之喪既葬而服除諒暗以居心喪不與士庶同禮也然則服除之後郊廟之祭可勿舉乎南齊以前代人君嗣位或仍前郊之年或别自為郊下有司議而王儉乃援普宋以來皆改元即郊而不用前郊之年又自漢文以來皆即位而謁廟至唐德宗以後亦踰年而行郊況本朝景德二年真宗居明德皇太后之喪既易月而服除明年遂享太廟而合祀天地於圜丘臣等伏請皇帝將來冬至躬行郊廟之禮其服冕車輅儀物音樂緣飾事者皆不可廢臣等謹議天章閣待制孫固議僖祖祧遷奏曰臣聞先王之禮本之人情而為之莭文者也故不慕古而違時措之宜不因文而失沿情之實親有踈戚世有同異此禮之所以損益變正之不一也伏惟太祖皇帝受天命一四海創業垂統為宋立萬世無窮之基其為宋始祖而配天受饗理在不疑今聞乃欲以僖祖為始封之祖復其祧主夫既以僖祖為始則遂當受東向配天之饗此臣竊所以未安也七世之廟親盡而祧此萬世大公之通法未聞有以易之者也故僖祖之主於陛下世以親盡而祧在禮適為得正而今議者以謂人必本乎祖太祖既已追尊僖祖則今日當以僖祖為本始之祖是未推夫王者興起有殊異而所當之世各不同也夫開國者先嘗有功而受封則後之子孫有天下而推以為始祖可矣若未有膺受天命特起而得天下者為太祖亦宜矣此實先王之禮人情之所順而前世之所已行也今為議者乃鄙絶漢唐之所行而純取三代之制以為法故有僖祖之廟與契稷無異之說臣竊以為過矣夫本朝之興與商周異商周之政本由契稷故自湯武而上其流有源皆可推而考之契布五教民以知禮其統緒略與周同而猶不若周之懿也周自后稷公劉以來教化流行以至太王王季世世修德益茂逮於文武受命奄有天下則源流之來豈無自哉故仲尼曰郊祀后稷以配天宗祀文王於明堂以配上帝則周公其人也夫周而上堯舜禹湯之世非不美也其祭之禮仲尼不談而獨舉周者豈非其德與世獨為備哉故曰周公其人也言惟周公能備此禮爾夫稷當堯民阻飢之時始播百穀使萬世粒食其為功大矣詩曰思文后稷克配彼天言以其德能配天也夫以文王之德而不得預配天之祭者特以后稷之功大矣使周無后稷之祖則周公之祀宜不得舍文武而他及且後世之興其先既無周之后稷而郊天之配不先創業之君乃逺取追尊之祖此豈先王之禮而近於人情者哉今之議者又以祭法禘郊祖宗之禮言商周非絶嚳以其自有本統承之本朝自僖祖以上世次不可得知則必以僖祖為始祖臣又以謂不然矣自秦滅學六經皆被焚棄不復為全書而禮經尤為殘蕩其後漢之諸儒髣佛聖人之餘委曲加意而編綴之故多駮雜不經之說附以鄭康成牽合之言而聖人之意益不明若祭法之禘郊宗祖者是其一矣其言曰商人禘嚳而郊冥祖契而宗湯信斯言也則禘祭宜無易嚳者今商頌之長發大禘之詩也其曰有娀方將帝立子生商又曰𤣥王桓撥受小國是達受大國是達者乃專歌述契之功德一篇之間了無及嚳之語則祭法之言禘嚳者臣亦未敢取以為信也雖然就其說而考之亦自非大有功德者不可以郊天取配何則鯀障洪水雖疏導失宜而禹因之以成功身被殛死故夏人郊之冥業其官而死於水故商人郊之后稷粒食之功被於萬世故周人郊之今未見冥稷之功而欲同冥稷之祀臣竊以為非宜也漢髙之得天下與商周異故太上皇不得為始封而光武之興不敢尊舂陵而祖髙帝且景帝唐室始封之君而元皇帝乃神堯之父髙祖之時以景皇帝為配而太宗之初已奉髙祖於圜丘景皇帝不得預郊天其後杜鴻漸等復請以景皇帝郊配天地黎幹力詰其非禮而正之夫景皇帝親受唐國之封且不得配天則未嘗啓有土宇而欲以為始祖臣亦慮其難矣恭惟太祖皇帝削平􅍔難功格上天百餘年間天下之人涵泳生養而安樂於無事者太祖之恩德也今天下唯知尊奉太祖而乃欲替其親郊配天之祀豈厭於人情哉今議者遂將斥絶唐漢上法商周此臣所謂慕古而違當世之宜者也太祖皇帝受周禪僖祖始被追尊而建隆之郊配以宣祖僖祖不得預焉夫以太宗真宗仁宗英宗之世未嘗郊配僖祖而陛下一日隆而祀之蓋有所隆者未有所替今使太祖之禮有替於四宗之時此豈孝思之心哉此臣所謂因文而失沿情之實者也夫非所居而祀之則神有所不受非所宜而配之則天有所不饗所謂郊而配天者以天於萬物其德不可形容故人君之大有功德被生靈而施後世者謂足以配之而已今僖祖之德不昭見於生民不明被於後世乃欲以齊后稷之廟當始祖之禮臣恐僖祖之神非所居而不受上帝之靈非所配而不饗非陛下所以尊祖事天之意也陛下為太祖子孫繼太祖基業據南面之尊而饗四海九州之奉皆太祖皇帝之所授也則今日之所尊事宜莫加於太祖矣或曰禮别子為祖契稷皆帝嚳之子而得姓者故商周以為祖而奉之今宋自僖祖為始祖臣曰是又不然也若以得姓者為祖則趙之得姓逺矣自造父封於趙城而趙衰始得姓今若必欲推考其先世則遂欲上祖趙衰其可乎其不可明矣或又曰今朝廷欲存僖祖為始祖爾至於祀天為配亦不輕議也臣曰是不可也今既以僖祖為始祖是必配天僖祖配天則太祖之祀替矣此臣以為不可者也或又曰今毁僖祖之廟藏其主夾室而下祔子孫可乎臣曰是亦一堂夾室在西祧主藏室中而居順祖之右固以順矣蓋非所謂下祔子孫之室而替其尊也必猶以為不可者臣今欲乞特為僖祖立室置祧主其中由太祖而上親盡迭毁之主皆藏於僖祖之室當禘祫之時以僖祖之主權居東向之位太祖之主順昭穆之列而從之取其毁廟之主而合食焉則僖祖之尊自有所伸此韓愈所謂祖以孫尊孫以祖屈之義也以僖祖立廟為非則周人别廟以祀姜嫄不可謂非禮今以陛下之時因情立禮取聖人之制為萬世法不亦美歟事與商周有殊禮文從而亦異此臣所謂先王之禮本人情而損益變正之不同者也如曰不然臣恐違古今之義逆天人之情而天地祖宗之神靈有所不饗也伏惟陛下聰明仁孝以宗廟重事恐其於禮有所乖違故令下兩制臣寮議陛下茍以臣言為可用伏乞裁自聖斷如或猶以為疑乞送禮院參詳臣竊惟宗廟祧配朝廷大禮反覆思慮於心有所未安不敢茍立異說伏望陛下力加採納判太常寺張師顔等議僖祖祧遷奏曰臣等伏以天下大禮莫重於宗廟崇孝事神以臨照四海是以聖王重之必務極其至當伏惟僖祖神主祧藏夾室於禮不順有司失之矣宜其輔臣建立明詔訪逮而垂為萬世法然議者因其藏主有失遂欲推為始祖臣等敢以此為議昔者商周之興本於契稷考諸前載其指有二曰因其始封也䝉其功德也契有大功始受封國十有餘世世祀不失至湯而有天下修其世祀因其封國舉天下之大而謂之商者由契以致之也稷有大功始受封國十有餘世世祀不失至武王而有天下修其世祀因其封國舉天下之大而謂之周者由稷以致之也然則契稷為商周之祖其傳已久其禮素定後世固無得而易之矣奉之為太祖以主廟祀有以盡一時之宜也詩之長發言商家興廢之久歷夏之世其來長逺昊天有成命言后稷已有王命生民思文皆歌后稷之功傳稱禹稷躬稼而有天下不可謂為祖不因功德也後世受命之君功業特起不同先代則親廟迭毁身自為祖鄭康成云夏五廟無太祖自禹與二昭二穆而已唐張薦云夏后以禹始封遂為不遷之祖是也若始封世近上有親廟則始祖上遷而太祖不毁魏祖文帝則處士迭毁晉祖宣帝則征西迭毁唐祖景帝則洪農迭毁此前世祖其始封之君以法契稷之明例也既以法契稷矣則上之親廟不得不毁勢當然也借使魏晉欲不祖武宣而越取處士征西不惟上推世數未知更當及於何人且其如始封何唐有天下因以為法韓愈有言事異商周禮從而變臣等取之矣要之始封世近則親廟不可不立若特以親廟及逺便為始封而抑之則前古未嘗聞也晉琅琊王德文曰七廟之義自由德厚流光饗祀及逺非是為太祖申尊祖之祀其說是也禮天子七廟太祖之逺近不可以必故但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家治平四年以僖祖親盡而祧之奉景祐詔書以太祖皇帝為帝者之祖自以别子之故非以有功與封國為輕重是不然也别子之法自謂公子不繼世故子孫為大夫士者祖之百世不遷非天子諸侯之禮也使湯武但為諸侯則尚不祖此别子況天下之君而可用大夫士之法乎若夫禹不先鯀則所謂子雖齊聖不先父食自以正文公之逆祀非尊祖之論也唐仲子陵所謂安知非夏后廟數未足之時而言禹不先鯀邪伏惟宋之為宋由太祖皇帝應天受命首創洪業建大號於天下異乎商周之為商周可知也僖祖雖為聖裔之先而有廟直由太祖親盡則遷合之正義今欲以有廟之始為說援而進之以為始祖臣等固疑其與契稷異矣使契稷本無功德初不受封引以為據庶其或可若其不然臣等不得判然無疑也設欲必據此論則臣等又有可言者焉蓋三昭三穆是不刋之典一定之論也國初張昭任徹之徒不能逺推隆極之制因緣近比請建四廟遂使天子之禮同諸侯若使廟數備六則更當上推兩世而僖祖次在第三亦不可謂之始祖也若謂世次不可推則斯言也詔㫖所不著史臣所不録歷百餘年莫知當時之實不敢以私意逆推而言也謹按建隆四年親郊崇配不及僖祖開國已來大祭虛其東向斯乃祖宗已行之意也自祖宗巳來不以太祖之位易之今而易之恐失祖宗之意矣巍巍太祖如神如天垂祚萬世無以云報奉之以為帝者始祖於禮無不宜者或謂儀禮諸侯及其太祖天子及其始祖之所自出今謂始祖為太祖乃諸侯制也臣等以為逺祖受封子孫世襲親雖盡而廟不毁是謂諸侯及其太祖也若始封之君既以為國之祖矣後世子孫自諸侯而為天子則始祖不易理勢自然是謂天子及其始祖也若必求太微之精神靈之感謂為始祖之所自出將見遷就生說寄譎無已彌失聖人之意矣唐神龍初議云既立七廟須崇始祖而張齊賢云始祖即太祖太祖之外更無始祖此前儒講之熟矣大抵契稷不以功德為祖無必然之論特起之君自為一代之祖無不可之理若乃藏主未順宜必改定蓋夾室者子孫廟之正也或者謂神道尚右失其㫖矣然則僖祖之主必有所歸按周禮守祧掌守先公先王之廟祧其廟則有司修除之其祧則守祧黝堊之所謂廟者后稷文武諸廟也祧者所藏先公先王之遷主也先公遷主藏於后稷之廟僖祖猶周之先公也宜有藏主之祧雖無始封逺祖上為之主而先主之祧不可以闕臣等參詳乞略倣此制築别廟以藏之大祭之嵗祀於其室太廟則依舊制虛東向之位郊配之禮仍舊無改事之宜而情之順也魏晉及唐嘗議逺廟之主矣魏鍾繇髙堂隆衛臻皆當世名儒並云處士當遷故景初之制三祖不毁其餘四廟親盡則遷一如后稷文武廟祧之禮晉永和中尚書議云周人之王太祖世逺故遷有所歸今晉廟宣帝為主而四祖居之是屈祖從孫也祫祭在上是代太祖也范宣謂可别築一室以居四主四主迭遷則宣帝位正矣自虞喜劉詡韋泓王松子蔡謨之徒並同其議唐陳京議請據魏晉舊制改築别廟以藏憲懿柳冕王詔等七十餘人亦同其說雖卒藏於興聖然本無異於别室也惟顔真卿引蔡謨權東向之一句而不本其改築之議獲議於時此前世之論皆有考據本於經意不敢謂後世之史而一切黜之也記曰禮雖先王未之有可以義起又曰亡於禮者之禮况有前人商𣙜盡理之論乎或曰夾室非便當為别廟則既正其大節矣合食要皆孝饗之道但以於屬既尊不可置昭穆之列依准前代祭之别廟得禮之變復何嫌哉云不可分食當合於太廟不惟永虛東向且使下從子孫孰為得失是則僖祖别藏列聖不動神靈安妥情文皆得其於義也合矣恭惟陛下仁孝天成尊事宗廟古之盛王所不逮也臣等學術淺陋討論非長徒能述遵朝廷正失之意别白議者未通之論冀以稱上聖因情制禮之道焉惟陛下幸留神詳擇熙寧中翰林承㫖張方平等議同堂八室廟制已定僖祖當祧合於典禮乃於九月奉安八室神主祧僖祖及后祔英宗罷僖祖諱及文懿皇后忌日五年中書門下言僖祖以上世次不可得而知則僖祖有廟與商周契稷疑無以異今毁其廟而藏主夾室替祖考之尊而祔于子孫殆非所以順祖宗孝心事亡如存之義請以所奏付兩制議取其當者時王安石為相不主祧遷之說故復有是請翰林學士元絳等上議曰自古受命之王既以功德享有天下皆推其本統以尊事其祖故商周以契稷有功於唐虞之際故謂之祖有功若必以有功而為祖則夏后氏不郊鯀矣今太祖受命之初立親廟自僖祖以上世次既不可知則僖祖之為始祖無疑矣儻謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也傳曰毁廟之主陳于太祖未毁廟之主皆升合食于太祖今遷僖祖之主藏于太祖之室則是四祖祫祭之日皆降而合食也請以僖祖之廟為太祖則合於先王禮意判太常寺韓維議僖祖廟狀曰准敕准中書門下奏准治平四年閏三月八日敕遷僖祖廟主藏之夾室臣等聞萬物本乎天人本乎祖故先王廟祀之制有疏而無絶有逺而無遺商周之王斷自契稷以下者非絶嚳以上而遺之以其自有本統承之故也若夫尊卑之位先後之序則子孫雖齊聖有功不得以先其祖考天下萬世之通道也竊以本朝自僖祖以上世次不可得而知則僖祖有廟與契稷無以異今毁其廟而藏其主夾室替祖考之尊而下祔於子孫殆非所以順祖宗孝心事亡如存之義求之前載雖或有然考合於經乃無成憲因情制禮實在聖時伏惟皇帝陛下仁孝聰明紹天稽古動容周旋惟道之從宗祏重事所宜博考乞以所奏付之兩制詳議而擇取其當敕㫖准今月三日詔中書門下廟祧之制蓋有彛典所以上承先王下法後世朕嗣宅大統寅奉宗祀而世次遷毁禮或未安討論經常屬在哲輔於以佐朕不逮而仰稱祖宗追孝之心朕覽之嬰然敢不祗服宜依所請施行故兹詔示想宜知悉牒奉詔書如前牒至准詔書者伏惟親親之序以三為五以五為九上殺下殺旁殺而親畢聖人制事存送終之禮皆以此為限是衆人之所同也若其不與衆人同者則又因事之宜斷之以義而為之節文也昔先王既有天下迹其基業之所由起奉以為太祖所以推功美重本始也蓋王者之祖有繫天下者矣諸侯之祖有繫一國者矣大夫士之祖繫其宗而止矣亦其理勢然也荀卿曰王者天太祖諸侯不敢壞大夫士有常宗所以别貴始貴始德之本也蓋有天下之始若后稷有一國之始若周公大夫士之始若三桓所以貴者配天也不祧也有常宗也此其所以别也今直以契稷為本統之祖則是下同大夫士之禮非荀卿之所謂别也或曰湯文武之去契稷皆十有餘世其間子孫衰微奔竄者非一湯文武之有天下契稷何與哉曰南宫括曰禹稷躬稼而有天下孔子曰君子哉若人禹之有天下則然矣稷諸侯也而曰有天下何哉豈非積纍功德至文王而興乎孟子曰王不待大湯以七十里文王以百里然則小國亦王之所待也所謂七十里百里者非契稷所受以遺其子孫之國乎由是言之商周所以興契稷不為無所與也則正考父作頌追道契湯髙宗商所以興子夏序詩稱文武之功起於后稷豈虛語也哉國語亦曰契勤商十有四世而興后稷勤周十有五世而興榖梁曰始封必為祖南宫適孟軻卜子夏左丘明榖梁赤生於周代其所言皆親聞而見之者其學問又俱出於孔子宜若可信則尊始祖以其功之所起秦漢諸儒亦有所受之也後世有天下者皆特起無所因故遂為太祖所從來久矣伏惟太祖皇帝孝友仁聖睿智神武兵不血刃坐清大亂子孫遵業萬世䝉澤功德卓然為宋太祖無少議者僖祖雖於太祖髙祖也然仰迹功業未見其有所因上尋世系又不知所以始若以所事稷契奉之竊恐於古無考而於今有所未安也臣以為均之論議未有以相奪仍舊便若夫藏主合食則歷代常議之矣然今之廟室與古殊制古者每廟異宫今所以奉祖宗者皆在一堂之上西夾室猶處順祖之主考之尊卑之次似亦無嫌至于禘祫自是序昭穆之祭僖祖東嚮禮無不順所謂子雖齊聖不先父食者也孔子曰於其所不知蓋闕如也如臣絳等議非臣所知臣所以闕而不敢同也元豐元年樞密直學士陳襄論天地合祭為非禮上奏曰臣伏承聖意以天地合祭於圜丘為非禮之正詔令更定臣謹按周禮大司樂以圜鍾為宫冬日至於地上之圜丘奏之六變以祀天神以函鍾為宫夏日至於澤中之方丘奏之八變以祭地示夫祀必以冬日至者以其陽氣來復于上天之始也故宫用夾鍾于震之宫以其帝出乎震也而謂之圜鍾者取其形以象天也三一之變圜鍾為宫三變黃鍾為角大簇為徴姑洗為羽各一變合陽竒之數也祭必以夏日至者以其隂氣潜萌于下地之始也故宫用林鍾于坤之宫以其萬物致養于坤也而謂之函鍾者取其容以象地也四二之變函鍾為宫大簇為角姑洗為徴南吕為羽各二變合隂偶之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭貍沈辜疈祭其在地者而以黃琮禮之皆所以順其隂陽辨其時位倣其形色而以氣類求之此二禮之不得不異也故求諸天而天神降求諸地而地示出得以通精誠以逆福釐以生蒸民以阜萬物此百王不易之禮也去周既逺先王之法不行漢元始中姦臣妄議不原經意附㑹周官大合樂之說謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歷唐千有餘年之間而以五月親祠北郊者惟四帝而巳如魏文帝之太和周武帝之建德隋髙祖之開皇唐睿宗之先天皆希濶一時之舉也然而隨得隨失卒無所定垂之本朝未遑釐正恭惟陛下恢五聖之述作舉百王之廢墜典章法度固已比隆先王之時矣豈襲後世一切之禮乎是以臣親奉德音俾正訛舛之禮首宜正其大者大者不正而末節雖正無益也況天地嵗祀今亦不廢顧惟有司攝事而巳誠未足以上盡聖神恭事之意也臣以謂既罷合祭則南北自當别祀伏請陛下每遇親祀之嵗先以夏至祭地示於方丘然後以冬日至祀昊天於圜丘此所謂大者正也然議者或謂先王之禮其廢也久不可復行古者齊居近古者致齊路寢儀衛省用度約賜豫寡故雖一嵗遍祀而國不費人不勞今也齊居逺儀衛繁用度廣賜豫多故雖三嵗一郊而猶或憚之況一嵗兩祀乎必不獲已則三年而迭祭或如後漢以正月上丁祠南郊禮畢次北郊或如南齊以正月上辛祀昊天次辛瘞后土不亦可乎臣竊謂不然記曰祭不欲疏疏則怠夫三年迭祭則是昊天大神六年始一親祀得無已怠乎記曰大事必順天時二至之郊周公之制也捨是而從後王之失禮可謂法歟彼議者徒知茍簡之便而不睹尊奉之嚴也伏惟陛下鑒先王已行之明效舉曠世不講之大儀約諸司之儀衛損大農無名之費使臣得以講求故事參究禮經取太常儀注之文以正其訛謬稽大駕鹵簿之式以裁其繁冗唯以至恭之意對越大抵以迎至和以格純嘏庶成一代之典以示萬世襄知諫院又上禘祫不廢時祭奏曰臣等看詳大宗伯之職曰以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王則六享並行而天子禘祫與諸侯異未嘗廢一時祭故毛詩傳曰諸侯夏禘則不礿秋祫則不嘗惟天子兼之孔頴達正義以為天子夏為大祭之禘不廢時祭之礿秋為大祭之祫不廢時祭之嘗則王禮三年一祫與其禘享更為時祭所以别於諸侯所謂其治辨者其禮具也國朝沿襲故常禘祫之月不行時享久未釐正非古之制伏請每遇禘祫之月雖已大祭仍行時享以嚴天子備禮所以丕崇祖宗之義其祫禘雖與時享先後經無明說以臣等考之司尊彞曰凡四時之間祀追享朝享祼用虎彞蜼彞先鄭云追享朝享謂禘祫也在四時之間故曰間祀明禘在礿祭祫在蒸祭之間不在其後也故後鄭謂天子先祫而後時祭其郊禮親祠准此如允臣等所議乞賜指揮施行襄為侍御史又上祭天用樂奏曰臣謹按禮祀天以冬日至取微陽洞開天之始也兆於南郊就陽位也即上之圜丘因天事天也燔燎而升煙求陽以氣也玉奠蒼璧牲幣如其色肖洪覆之自然也樂用圜鍾為宫以其上應房心有天地明堂之象也宫聲三奏角徴羽各一奏者合陽竒之數欲神之聽之也祭地以夏日至取隂德潜萌地之始也坎于北郊從隂義也就澤中方丘因地事地也瘞埋順其性之含藏也方琮而黃幣倣形色也樂用函鍾為宫以其生於未之氣未坤位也宫聲與角徴羽各二奏者合隂偶之數所以八變則地示出焉夫先王求神之意可謂盡矣以為天時者乾坤因之而闔闢陰陽繫之而消長鬼神亦由是而利用出入者也故作大事必順天時又擇其位也為髙必因丘陵為下必因川澤以至於器幣樂舞至纎至悉無不從其類以此事神則神無不饗也漢元始間不原禮意附㑹周官大合樂之文謂之合祭復以正月三陽在下息卦受泰於是諏上辛之日合祭天地于南郊觀其時位與夫器幣樂舞之設是徒寓地祇於綴食之列而意不在焉後漢以正月上丁祠南郊禮畢次北郊下逮南齊又以正月上辛祠昊天次辛瘞后土雖得其位不得其時誠不至而禮不専是亦主為禮天而發耳竊有一證焉記曰御同於長者雖二不辭偶坐不辭鄭氏曰盛饌不為已也王者事父孝故事天明事母孝故事地察豈可以后土富媪之靈載物無疆之德而事之僅如偶坐之賓乎深恐柔祗未之饗也臣謹再詳儀注合祭天地於一壇之上其為非禮明甚固當改正然今古異宜沿革殊致三嵗一郊漢唐成憲祖宗以來莫能易也今罷合祭則北郊唯使有司攝事於理未安謂宜以親郊之嵗用夏日至先有事於方澤蓋祭者薦其時也近人而親者無如地取財於地故先祭以明親親之仁逺人而尊者無如天取法於天故後祠以正尊尊之義若青城若張法駕儀物一從簡易務稱尚質之意其扈衛錫與可於郊賞數中豫給五分之一或量加特賜繫自上恩所貴奉事天地不失禮意惟朝廷財幸三年翰林學士張璪論夏至祭地遣冡宰攝事奏曰臣伏見天地合祭議者不一而臣竊謂陽生於十一月隂生於五月則隂陽之生天地致用之始先王於是順隂陽之義以冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘以至牲幣器服詩歌樂舞形色度數莫不效其象類故天神地示可得而禮由此觀之則夏日祭地於方丘而天子親涖之此萬世不可易之理也議者以謂當今萬乘儀衛加倍於古方盛夏之時不可以躬行乃欲改用他月不唯無所據依又失所以事地順隂之義必不得已臣以謂宜即郊祀之嵗於夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶幾先王之遺意猶有存焉判太常寺陳薦上奏曰臣竊惟議者以天地合祭始於王莽稽之典禮有所未合故罷之臣竊有疑謹按周頌曰昊天有成命郊祀天地也前漢志載郊祀歌十九章其七章曰惟泰元尊媪神蕃釐說者曰泰元天神也媪神地神也第八章言㳙選休成天地並況此天地同祀可以槩見恐非自王莽始也夫國之大事莫大於天地宗廟之祀有其舉之莫能廢也古者祀事皆天子親行降及後世事與古異或因或革各從其宜故多遣官攝事今聖朝郊廟之際三嵗一親行必先朝饗景靈宫薦太廟然後合祭天地於圜丘蓋參用舊章得禮之中而議者又謂親郊之嵗夏之時不可躬行宜遣冢宰攝事而罷冬至天地合祭臣亦謂夏至方丘之祀決不可躬行雖大備禮樂上公攝祭亦恐此議未能合古終不若天地合祭之日親執圭幣誠志內盡禮容外重也況天子父事天母事地既親禮天神而不親禮地祗質之情文深恐未安陛下聰明睿智聖學深博古今萬事無一不昭其本原其三嵗親郊天地合祭之禮伏乞且循舊制以昭恭事三神之意知太常禮院趙君錫乞惟設昊天上帝一坐奏曰臣謹按周禮掌次職曰王大旅上帝則張氈桉祀五帝則設大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異矣則孝經所謂宗祀文王於明堂以配上帝者非可兼五帝也考之易詩書所稱上帝非一易曰先王作樂崇德薦之上帝以配祖考詩曰昭事上帝聿懷多福又曰上帝是祗書曰以昭受上帝天其申命用休又曰惟皇上帝降𠂻于下民如此類者豈可皆以五帝而言之自鄭氏之學興乃有六天之說而事非經見至晉泰始初論者始以為非遂於明堂設昊天上帝一坐而已唐顯慶禮亦止祀昊天上帝於明堂今大饗在近議者猶以謂上帝可以及五帝臣等請如聖詔祀英宗皇帝於明堂惟以配上帝至誠精禋以稱皇帝嚴父之意四年詳定郊廟奉祀禮文陸佃上議曰臣看詳冕服有六而周官辨師云掌王之五冕則大裘與衮同冕矣故禮記曰郊之日王被衮以象天戴冕璪十有二旒則天數也又曰服之襲也充美也禮不盛服不充是故大裘不裼此明王服大裘以衮衣襲之也先儒或謂周祀天地皆服大裘而大裘之冕無旒非是矣蓋古者裘不徒服則其上必皆有衣故曰緇衣羔裘黃衣狐裘素衣麑裘如郊祀徒服大裘則是表裘以見天地表裘不入公門而乃欲以見天地可乎且先王之服冬裘夏葛以適寒暑蓋未有能易之者也郊祀天地有裘無衮則夏祀赤帝與夏至日郊祭地示亦將被裘乎然則王者冬祀昊天上帝中裘而表衮明矣至於夏祀天神地示則去裘服衮以順時序周官曰凡四時之祭祀以宜服之明夏必不衣裘也或曰王被衮以象天此魯禮也臣以為記曰周之始郊日以至王被衮以象天則豈得以為魯哉或曰祭天尚質故徒服大裘王被衮則非所以尚質臣以為謂之尚質則明有所尚而巳不皆用質也如蒼璧以禮天黃琮以禮地旗有十二旒龍章設日月此豈用質也哉故曰祭天掃地而祭焉於其質而已矣牲用騂尚赤也用犢貴誠也王被衮以象天戴冕璪十有二旒則天數也旗有十二旒龍章而設日月以象天也夫理豈一端而已亦各有所當也今欲冬至禋祀昊天上帝服裘被衮其餘祀天及祠地示並請服衮去裘各以其宜服之如允臣所議乞賜施行佃又上昭穆議曰臣伏覩中書省批送下張璪何洵直所論宗廟昭穆欲以宣祖為昭翼祖為穆真祖為昭太祖太宗為穆英宗為昭仁宗為穆尊卑失序非禮意也竊謂昭穆者父子之號昭以明下為義穆以恭上為義方其為父則稱昭取其昭以明下也方其為子則稱穆取其穆以恭上也豈可膠哉謹按祭法曰去祧為壇去壇為墠議者以為壇立於右墠立於左臣以周制言之太王親盡去右壇為墠王季親盡去左祧為壇左右遷徙無嫌則洵直謂昭常為昭穆常為穆左者不可遷于右右者不可遷于左之說非矣璪謂四時常祀各於其廟不偶坐而相臨武王進居王季之位而不嫌尊於文王反乎合食于祖則王季文王更為昭穆不可謂無尊卑之序臣竊以為古者合食毁廟之主有不皆祫者則璪之說非矣大傳曰大夫士有大事省于其君干祫及其髙祖干者與也言大夫士本無祫祭唯其有功善於其君進使干祫則毁廟之主不皆合食特自髙祖而已假令大夫昭穆以世次計曽祖適為昭髙祖適為穆父適為昭祖適為穆同時合食則將偶坐而相臨義不得以卑而踰尊則璪等將令昭常為昭穆常為穆乎如此則曽祖居尊髙祖居卑父居尊祖居卑矣非所謂父昭子穆昭以明下穆以恭上之義許慎曰父為昭南面子為穆北面大夫干祫若使曽祖覆為昭髙祖更為穆則是子為昭南面父為穆北面大傳曰旁治兄弟合族以食序以昭穆則是生而居處同室合食亦序昭穆假令甲於上世之次為穆今同堂合食實屬父行乙於上世之次為昭今同堂合食實屬子行而偶坐相臨則甲宜為昭乙宜為穆豈可逺引千嵗以來世次覆令甲居右穆乙居左昭紊同堂父子合食之序乎璪又謂既為昭矣又有時而為穆是亂昭穆之名臣竊以為昭穆父子之號耳茍為昭者不復為穆為穆者不復為昭則是昔嘗事父為之子者今雖有子不得為父茍復為父則以為是亂父子之名可乎祭法曰天子立七廟曰考廟曰王考廟曰皇考廟曰顯考廟有二祧焉則天子立廟自親始矣初立考廟於是立王考廟其次立皇考廟又其次立顯考廟猶以為未也於是立二祧焉與太祖之廟而七顯考廟王考廟與左祧為昭皇考廟考廟與右祧為穆所謂三昭三穆如曰成王之世武王為昭文王為穆則武為父不入考廟而入王考廟矣故臣竊謂八廟之制當以僖祖居中翼祖為昭宣祖為穆太祖太宗為昭真宗為穆仁宗入王考廟為昭英宗入考廟為穆是為父昭子穆稱情順理尊卑協序而議者蔽於所見與臣未同伏乞斷自聖學一正羣議不勝幸甚佃又上廟祭議曰臣放古度今詳定八廟之祭廟各三獻同日而畢蓋約其禮務為可行欲以施於春祠而巳至於夏礿秋嘗冬蒸當如古制合食于祖蓋古有宗廟之事一日而畢止於祫祭餘祀廟各一日少牢饋食禮曰來日丁亥用薦嵗事于皇祖伯某以某妃配則是丁亥一日才祭祖妣而巳賈公彥謂大夫三廟少牢筮日止於丁亥則明祭無尊卑廟數多少皆同日而畢設矣蓋祭祀卜日卜其首日而已若大夫丁亥有事于祖廟則其昭廟以戊子祭穆廟以巳丑祭理宜然也且大夫室事不裸又無朝踐之事其禮固略矣然而薦腥饋熟品其籩豆奉其尊彞修其簠簋遷其鼎爼陳其巾冪升降進退侑尸獻酬賓主百拜餕徹之序品節衆多假令逮暗而祭繼之以燭奔走趨事三廟一日而遍則雖有强力之人不能支矣又況天子禮具樂備品節之多乎然則先王之時各祠其廟無有一日而畢者也謹按王制曰天子犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫嘗祫蒸祫鄭氏謂天子言犆礿諸侯言礿犆互明其文則天子言祫嘗祫蒸諸侯言嘗祫蒸祫亦互明而已也然則古者天子七廟四時之祭春祠各於其廟而夏礿秋嘗冬蒸則三昭三穆皆升合食于祖故用旅酬六尸而仲尼燕居曰嘗禘之禮所以仁昭穆也若夫諸侯春亦犆礿蒸嘗皆祫于祖而禘則一年犆一年祫下天子也明堂位曰夏礿秋嘗冬蒸天子之祭也夫礿祠蒸嘗諸侯類有之今魯更以為王禮又不言春祠者春祠特祭天子諸侯同故也其夏礿秋嘗冬蒸則天子與諸侯異故曰諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿又曰禘一犆一祫由是觀之雖周春祠特祭而三時亦祫非特夏商之制雖然天子時祫才及未毁廟之主而已至於三年一祫於是毁廟之主皆合食于太祖故謂之大祫言大以有小故也按文公二年八月丁卯大事于太廟公羊曰大事者何大祫也毁廟之主陳于太祖未毁廟之主皆升合食於太祖榖梁亦謂大事者何大是事也著祫嘗蓋著猶别也三年一祫大於祫嘗祫嘗秋祭也今魯合祠太廟亦以秋祫故言大以别之也且天子七廟日祭月祀各就其廟三時皆合食于祖其毁廟之主則三年然後大祫亦禮之殺也由是觀之先王之祭有祫又有大祫明矣此自漢以來論者未之知也陛下聖學髙妙德蹈堯禹以操為驗以稽為決復千嵗之墜典實在聖時今欲八廟既立春祠各就其廟而夏礿秋嘗冬蒸皆升合食于祖既應典禮又與舊儀四時八室並饗少近獨為合古之制宜若可行亦其七廟之主會於祖廟委蛇從祀優而不迫盛禮大樂得以備舉如允臣所議乞下有司參定儀注施行佃又上先灌議曰臣看詳陽祀自煙始隂祀自血始宗廟之饗自灌鬯始灌鬯所以求之然後作樂以致其神今儀注先作樂後灌鬯非禮之正說者或謂祭祀宜先作樂以降其神然後灌鬯蓋所以祭之也臣竊以為不然宗廟之祭灌鬯以求諸隂焫蕭以求諸陽猶以為未也故又詔祝於室坐尸於堂詔祝於室求之內也坐尸於堂求之外也猶以為未也故又納牲於庭升首於室納牲於庭求之下也升首於室求之上也猶以為未也故又直祭祝于主索祭祝于祊直祭祝于主求之近也索祭祝于祊求之逺也猶以為未也明日於是又有繹祭焉蓋孝子不知神之所在於彼乎於此乎是以求之如此其至也禮器曰納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位蓋道求之而未之得也由是觀之祭者孝子之所以自致其誠也故齊必見其所祭者而求神不於一處或以祼或以樂或在朝踐或在饋食或在明日之繹無所不至豈所謂奏樂獨能致之宜先於灌而自灌而後皆祭之而已也謹按大宗伯曰以六玉禮天地四方牲幣各放其器之色鄭氏云禮謂告神時奠於神坐書曰周公植璧秉圭是也蓋凡樂圜鍾為宫冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫夏日至於地中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鍾為宫於宗廟之中奏之若樂九變則人鬼可得而禮矣禮謂告神時以六玉與牲幣禮之則禮神固在灌鬯之後奏樂不得在其先矣經曰殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也周人尚臭灌用鬯臭既灌然後迎牲致隂氣也殷人先求諸隂今宗廟祀事文物大備放周之盛而說者或欲更用商人尚聲之說先樂而後灌臣亦以為不然蓋商人先求諸陽故焫蕭在前灌鬯在後周人先求諸隂故灌鬯在前焫蕭在後經曰二端既立報以二禮建設朝事燔燎羶薌覸以蕭光以報氣也薦黍稷羞肝肺首心覸以夾甒加以鬱鬯以報魄也凡此灌鬯在焫蕭後蓋商禮也又曰鬱合鬯臭隂達於淵泉蕭合黍稷陽達於牆屋凡此焫蕭在灌鬯後蓋周禮也說者如欲更用商人祭地尚聲之說則焫蕭當在前灌鬯當在後矣宗廟儀注緣習故常所宜講正當矣何獨先樂後灌不可改也且既灌於是奏九變之樂以致其神非特應禮易行又其舊無朝踐之獻今既增置此禮而未有樂焉以灌獻舊樂移之朝事蓋兩得之如允臣所議乞更儀注庶協典禮神宗時彭汝礪上南北郊合祭議曰臣准敕節文與兩制尚書侍郎等集議南北郊合祭事是非蓋有定犬馬之誠竊不自勝嘗恐緣諸儒一偏之說紊國家莫大之禮廢朝廷已行之命輒殫悃悰庶禆萬一惟陛下裁幸右臣聞禮者體也體不備君子謂之不成人設之不當猶不備也故先王之交於神明也既祭之以禮又求之以類其時日牲幣器服聲音顔色無或非其類者或非其類謂之非禮非禮之祭鬼神不饗此其言似迂緩而難知然其理甚切至而必驗臣謹以一事明之春為陽故以正月迎於東郊秋為隂故以七月迎於西郊使迎春則在西郊而用秋之時迎秋則在東郊而用春之時雖樵夫野叟猶怪以駭而況於鬼神乎夫天之與人非有異也今應祭方澤也而合於圜丘應用夏至也而用冬至蓋何以異此夫前日之議論非是行之而不至安便昔人蓋有變之者矣先皇帝欽若稽右承順天心罷黜邪說是正太常行之歷年中外禔福聖作明述神明所愜今何疑何恤而欲紛更之也家人小祀尚慎廢舉天地重大豈容輕議臣聞之神無常饗饗于至誠天無私親親于有德朝廷誠能富民阜財明道崇義致帝者之用成天地之化使粒食之民晏也粲也則上帝是祐而諸福之物皆可畢致務改祀命實非所願惟朝廷慎之重之反復之務求至當以稱先帝所以尊奉聖靈之意焉又曰合祭之議臣等謂不可者二十二人謂可者八人揚子曰人各是其所是非其所非將誰使正之曰萬物紛錯則占諸天衆言淆亂則折諸聖在則人亡則書周禮聖人之言也合祭肇於漢末時其言甚不經朝廷制度考文方告之宗廟行之天地布之天下以憲萬世或委聖言而從不經不可也或曰合祭歷世行之莫之改也夫莫之改者猶行之不可也先帝既改之善矣欲變之不可也或曰親祠未能且從合祭可乎曰親祠非不可行以有事而攝焉亦禮也合祭非禮也舍禮不用而從非禮不可也夫規矩誠設不可欺以方圓繩墨誠陳不可欺以曲直今議祭祀而不從禮議禮而不從經則是非並起終無所歸是猶舍規矩而察方圓舍繩墨而觀曲直不可也先帝留意經術曲折皆有稽據固非羣臣所能窺見髙下小大惟太皇太后陛下皇帝陛下明詔執事質於衆是無從一偏之論決於大公無安順從之說如此則是非可決而經正矣孫洙上奏曰臣嘗考洪範五行傳曰簡宗廟廢祭祀則水不潤下國家比年以來京師仍嵗大水百川暴溢變異甚大臣伏思之竊恐陛下承事宗廟之禮及四時之祭有未合古制者也臣聞古者宗廟四時之祭礿祠蒸嘗禘祫皆天子所自親享不使有司攝事也蓋聖人內自竭盡以承其親者惟祭祭非自外至由中出生於心也古者宗廟之祭君親牽牲執鸞刀以割冕而總干以樂皇尸其躬自力以致其誠心如此之盡一也及周衰禮壞樂崩典籍皆滅棄漢興草創禮之存者才一二三事而宗廟之禮蓋闕如也然猶四時車駕間出享廟及八月飲酎以盡孝思繼漢而下荒乎無以禮樂為也唐之盛時可以制作矣而宗廟之祀亦踵習舊常開元之禮雖有天子四時親享太廟之制而行之蓋闊帝王之親享廟者一世不過再三焉豈三代祭法終不可復也而百世莫之相循而失也今國家宗廟之事每嵗四孟及季冬凡五享三年一祫五年一禘皆有司侍祀而天子未嘗親事也唯三嵗親郊一行告廟之禮而已而五神御殿酌獻一嵗遍焉是失禮經之意而相循近世之失也夫四時宗廟之祭大事也神御别殿酌獻小禮也大事不正其本而委之有司小禮煩而車駕數出不合禮意矣夫王者卜宅都邑營建神位而左立七廟誠宜世世子孫嚴祗而奉承之瞻視梁棟而時思之以永念王業之艱難也今春秋霜露之感禘祫昭穆之序禮之最所重者一諉於祠官矣而神御酌獻三嵗告謁禮之輕者而天子躬焉非嚴祖尊考之義也非事神訓民之意也嗚呼宗廟之事王者不自親由漢氏以來失之矣而百世之君曽不知復也陛下起百王之廢典紹三代之墜禮使大孝塞乎天地而橫乎四海又以答塞洪範傳大水之異何則四時親享廟前世未有行者由陛下而立制使萬世子孫承之是天下之盛福也王安禮論明堂配帝第一劄子曰臣伏觀詔書將來祀英宗皇帝於明堂惟以配昊天上帝餘從祀羣神悉罷以臣所聞郊祀后稷以配天宗祀文王於明堂以配上帝蓋圜丘則遍及於天之羣神明堂則弗遍也祭上帝而已所謂上帝者則昊天上帝與五帝是也何以知之肆師之職既曰類造上帝又曰封于大神則是以上帝兼及五帝故又以大神别之也司服之職祀昊天上帝則服大裘而冕祀五帝亦如之若上帝専謂昊天上帝則何故不止曰祀上帝又加以昊天者何也由此觀之則上帝之不専為昊天上帝明矣以周官一書考之其别於五帝則稱昊天上帝其别於昊天上帝則稱五帝其合昊天上帝與五帝而並則稱上帝前後參驗無一不合於此者蓋自昔言禮者皆以明堂専祭五帝不及昊天上帝康成之徒既已乖謬歷代沿襲朝廷方欲是正典禮以革前世之弊雖祀昊天上帝而今又悉廢五帝之祀則是其失與前世等也記曰凡祭有其舉之莫敢廢也接神之際其謹如此況於輕絶五帝之饗違經變古著一代非禮之舉失孰大焉方陛下祗畏天戒此事尢宜加審伏望聖慈以臣所言廣延博聞彊識之士更賜論議第二劄子曰臣近曽論列明堂配帝事竊聞禮官所定有與臣言不同者朝廷已從其議緣臣所陳並因周禮正經前後參驗皆有稽據不知禮官復用何說欲變易此論伏以陛下講希闊之典追合先王宗祀嚴配之意此甚盛莫大之事也今欲除前世久行之饗必須當義中禮然後上帝居歆時罔時怨理或未安悔將何及此臣所以夙夜惓惓忘冒昧之誅不能自已者伏望聖慈以臣所論付兩制近臣與太常禮官令以所見異同各據經㫖具議狀聞奏陛下擇其可否第三劄子曰臣近因請對曽再論列配帝事伏聞聖論臣以迫於日旰未盡所陳今輒敢援引古義洊瀆宸聽周禮掌次王大旅上帝則張氊案設皇邸朝日祀五帝則張大次小次設重帟重案肆師類造上帝封于大神蓋大旅上帝者以上帝兼昊天故下文以五帝别之則掌次所謂張大次小次設重帟重案者専為五帝而言也類造上帝者以上帝兼五帝故下文以大神别之則肆師所謂封者専為昊天而言也掌次設文正與肆師互相發明則上帝兼昊天與五帝尤為明白矣其謂之昊天上帝者何也夏曰昊天氣之主也而所御者萬物相見之時易曰帝出乎震齊乎巽相見乎離又曰離也者明也萬物皆相見南方之卦也蓋帝體物者也萬物皆相見而帝亦於是與萬物相見故兆昊天於南郊以禋祀祀之也其謂之大神者何也神之為神無乎不在在地則維嶽降神由祖有神之類是也在人則乃聖乃神聖而不可知之謂神之類是也在鬼則神保是饗神具醉止之類是也此以道言之也地則謂之示人則謂之鬼唯天則謂之神者此以禮言之也禮者我無加損焉正其名而已矣故周禮一書在天者皆謂之神唯昊天者則謂之大神若地示人鬼則無有謂之神者蓋以正名為書則不得不爾雖與他經所稱不同其理一也故其稱昊天上帝也五帝也亦各正其名已至於郊祀國祀之說臣已粗陳大略矣臣智識淺昧學術無取被䝉聖問不敢不盡其說干冒天威死有餘恐唯陛下斷其可否不勝大幸宇文昌齡為太常少卿詔議郊祀合祭論者不一昌齡曰天地之數以髙卑則異位以禮制則異宜以樂舞則異數至於衣服之章器用之具日至之時皆有辨而不亂夫祀者自有以感於無自實以通於虛必以類應類以氣合氣合然後可以得而親可以冀其格今祭地於圜丘以氣則非所合以類則非所應而求髙厚之來享不亦難乎後竟用其議神宗嘗詢天地合祭是非知諫院黃履對曰國朝之制冬至祭天圜丘夏至祭地方澤每嵗行之皆合於古猶以有司攝事未足以盡於是三嵗一郊而親行之所謂因時制宜者也雖施之方今為不可易惟合祭之非在所當正然今日禮文之失非獨此也願敕有司正羣祀為一代損益之制詔置局詳定命履董之北郊之議遂定歷代名臣奏議卷二十
