body:
  text: 歷代名臣奏議卷二百五十八明楊士竒等撰賦役宋哲宗元祐四年右司諫劉安世乞罷畿內保甲疏曰臣竊惟祖宗深鑒五代外重之弊聚天下之兵寓之畿內制馭四海如臂使指可謂盡善矣然而河北河東陜西之地密接敵境居常宿師以為戰守之備尚恐兵威未振不足以壯中國之勢乃籍民丁謂之義勇雖未嘗使冒鋒鏑蓋資其虛聲以奪敵人之心爾熙寧中先帝欲廣其法于天下始命排之為保甲以習武事陛下踐阼之初既罷長上教閲止令農隙之月倣祖宗義勇之制專委州縣以次集教平居無事之日俾民服力南畝而又順時講武以張軍勢深得禦外治內之策然臣所有未諭者竊謂自古王畿之名異於郡國所任之事嘗務輕簡蓋休飬其力以重根本也今府界正兵既多固非三路之比而千里之內亦置保甲勞民示弱且有未安雖連嵗災傷依例免教而此名尚在終纍人心使比屋之間不得坦然為自安之計亦何益也伏望聖慈深賜省察應畿縣保甲悉令廢罷所貴民力舒緩人情安泰逺近輕重不失國體五年左諫議大夫劉安世論役法之弊疏曰臣伏見朝廷欲變役法今將四年選官置局講求利病天下之議悉使折𠂻而承詔立法之意惟以仁民愛物為務謂嘉祐差役之制已便矣然當時嘗見其害者今則損而去之元豐約束之制民以為利者今則取而益之至于風俗之殊尚南北之異宜本諸人情裁以國論隨方立條罔不具備而又申以明詔諭旨郡縣若施行之際或窒礙而未通節文之間或疏略而未盡更俾建明為之增損有以見陛下至仁至厚重恤民事之深意也新書之下輿情慰恱中外恬息初無間言而姦邪之人內懷顧望造播橫議必欲沮毁遂致一二小臣敢執偏見妄進邪説欲罷差役依舊募雇當職官吏不能為朝廷固守法度而依違遷就屢有變更天下人情莫不疑惑此最當今之大患也臣聞自古取民之道止于粟帛與民力而已三者皆生之無窮取之不竭故堯舜三代已來皆不能廢議者以為不役其身止令輸錢則公私兩便而可以久行臣請有以折之國家泉貨經費所資設官鼓鑄嵗有定額民或盜為罪至論死今棄其易出之力而責其難致之錢固已非理又使上户止納數千則優遊卒嵗日益兼并下户自來無役者例使加賦日朘月削寖以窮困損九分之貧民益一分之上户輕重倒置孰甚于此臣竊謂以一家一嵗觀之則輸錢若省而易給以終身纍世計之則所出不資而難供今聚斂之臣惟欲誅剝生民不為天下久長之慮其可信哉議者又謂人户輪差不及三畨處恐役次太重臣亦有以折之且治平之前天下户口一千二百七十餘萬而舊法役人五十三萬六千餘人元豐之後户口一千八百三十五萬九千有竒較之治平已增五百六十餘萬而新定役人止于四十二萬九千餘人比之舊法却減十萬七千之額謂之輪差不足亦已過矣然而天下州縣或有連值凶嵗人户流移畨次不足之數則在有司通融補助必不可以小節而廢大法也臣伏觀國家受命以來百有餘年差役之法已更六聖隨時損益既皆中理考觀已試之效固可行之不疑而纍年于兹尚容移奪臣竊謂知法之未良改之不可不速知法之已善守之不可不固今差法已善陛下正當信而守之執政大臣尤宜協心體國拒堲邪説而乃縱使姦慝倡為異論動搖人情惑亂天下故議者謂今日紛綸之患不在于無知之庶民而特在于挾邪之士大夫也臣聞執狐疑之心者來讒賊之口持不斷之意者開羣枉之門願陛下特奮乾綱力主差役深詔執政固守初議毋使輕徇浮言妄有變易庶幾祖宗之成法不為姦人之所奪天下幸甚哲宗時同判司農寺曾布條奏役法疏曰畿內上等户盡罷昔日衙前之役故今所輸錢比舊受役時其費十減四五中等人户舊充弓手力承符户長之類今使上等及坊郭寺觀單丁官户皆出錢以助之故其費十減六七下等人户盡除前日冗役而專充壯丁且不輸一錢故其費十減八九大抵上户所減之費少下户所減之費多言者謂優上户而虐下户得聚斂之謗臣所未諭也提舉司以諸縣等第不實故首立品量升降之法開封府司農寺方奏議時蓋不知己嘗增減舊數然舊敕每三年一造簿書等第嘗有升降則今品量增減亦未為非又況方曉諭民户茍有未便皆與釐正則凡所增減實未嘗行言者則以謂品量立等者蓋欲多斂雇錢升補上等以足配錢之數至于祥符等縣以上等人户數多減充下等乃獨掩而不言此臣所未諭也凡州縣之役無不可募人之理今投名衙前半天下未嘗不典主倉庫場務綱運而承符手力之類舊法皆許雇人行之久矣惟耆長壯丁以今所措置最為輕役故但輪差鄉户不復募人言者則以謂衙前雇人則失陷官物耆長雇人則盜賊難止又以謂近邉姦細之人應募則焚燒倉庫或守把城門則恐潛通外境此臣所未諭也免役或輸見錢或納斛斗皆從民便為法至此亦已周矣言者則謂直使輸錢則絲帛粟麥必賤若用他物準直為錢則又退揀乞索且為民害如此則當如何而可此臣所未諭也昔之徭役皆百姓所為雖凶荒飢饉未嘗罷役今役錢必欲稍有餘羡乃所以為凶年蠲減之備其餘又專以興田利增吏祿言者則以謂助錢非如稅賦有倚閣減放之期臣不知昔之衙門弓手承符手力之類亦嘗倚閣減放否此臣所未諭也兩浙一路户一百四十餘萬所輸緡錢七十萬爾而畿內户十六萬率緡錢亦十六萬是兩浙所輸才半畿內然畿內用以募役所餘亦自無幾言者則以謂吏緣法意廣收大計如兩浙欲以羡錢徼幸司農欲以出剩為功此臣所未諭也賈蕃為令不受民訴使趨京師喧譁其意必有謂也誠令用心無他亦可謂不職矣蕃之不職不法其狀甚衆皆趙子幾所不得不問御史之言欲舍蕃而治子幾是不顧陛下之法陛下之民宜莫如蕃與御史也畢仲遊論役錢疏曰古之為政雖隨時適變間有損益至于推強撫弱抑富恤貧而惡兼并則不可易之理也自商鞅變田即有兼并之家富者連阡陌貧者無立錐之地自古及今痛心疾首同以為患者也限田之法既不行于天下而富家大姓終無亷恥厭足之心唯有祖宗差徭能裁制兼并雖其立法本不為兼并設而推數循理觀之乃有可以裁制兼并之道蓋舊法雖分等差而實以田産富貧定為上下有千金之産者支千金可任之徭役有五百金之産者支五百金可任之徭役今有千金之産與五百金訟其役之先後輕重則千金者居其先五百金者居其後或千金者任其重五百金者任其輕既有千金之産而又欲兼五百金則憚徭役之加重欲取而中己者多矣其心非不欲兼并懼加重而不敢進也其至有隱寓田産于他人以避徭役而朝廷亦有隱寓田産之禁則是祖宗差法雖不為兼并設而裁制兼并之道寄在其間自改差為募富家大姓不知徭役而但輸緡錢則兼并之患已多于差法何者差役之法大姓不利而下貧以為利募役之法下貧不利而大姓以為利今者一邑上者輸緡錢十萬中者輸七萬下者輸五萬既以等級輸緡錢蠲其徭役則斥廣田産兼并下貧唯恐力之不逮自中户斥廣田産兼并下貧數十家至升而在上不過加緡錢三二萬爾而富家大姓其等既已在上則雖增半邑之田猶不加緡錢也故治平以前大姓有破家之患而天下之人不至窮困熙寧以來大姓無破家之患而天下之人往往窮困不能自立蓋治平以前大姓破家者雖為不幸而破一大姓則變為十中民或百下户于損上益下之道未有害也熙寧以來雖有破家不幸之人而大姓輸緡錢之外無復徭役斥廣田産兼并下貧曾無忌憚故大姓兼中民中民兼下户流離散亡轉徙于四方所以然者斥廣田産恣為兼并大姓之家所難遇而嵗損一萬二萬或三五萬緡錢則大姓之家所易為也仲遊又論役局疏曰役書之所未定者非無定法也無定心也熙寧之初改差為募天下之人言令不便者幾千萬數至元豐之初欲復耆長户長之役士大夫之聞者喜見于顔色及其卒不能復也莫不咨嗟慨歎如有求而不得則願差法之復者豈一日也今朝廷鑒成敗攬是非為萬世之慮修復差法而士大夫反有意差法之未善者為法一豈未復之時則為善而既復之後則不善蓋嘉祐之間固嘗謂其法有可更者矣輸將繁重而勞費不及貨賂公行而貧富無别熙寧之初得其可更之論而并其不可更者更之顧令人出緡錢以私其贏餘是以言不便者千萬數今差法雖復而所謂可更者猶在則亦主嘉祐之書增損之則差法定矣而十人十議百人百議以旬浹之功而爭至于期年之外既不知主嘉祐之舊書又不敢論熙寧之新法泛泛然如人遊于江湖未有歸宿不知其後將如何邪故曰役書之未定者非無定法也無定心也左正言孫諤上言曰役法之行在官之數元豐多元祐省雖省未嘗廢事則多不若省雇役之直元豐重元祐輕雖輕未嘗不應募則重不若輕今役法優下户使弗輸而盡取諸上户意則美矣而法未善也夫先帝建免役之法而熙寧元豐有異論元祐有更變正惟不能無弊爾願無以元豐元祐為間期至于均平便民而止則善矣御史中丞傅堯俞上奏曰臣伏見今嵗諸路蠶麥並熟處甚多其價隨而過賤風聞逐處監司將積年逋負並行催督不惟虛費鞭撲亦徒長公人貪暴乞取之弊必不能以一熟之力了納積年之欠至使民聲愁歎謂豐稔不如災傷蓋才有水旱則舊欠俱閣若稍獲豐稔則使宿逋並納欲乞朝廷指揮諸路監司且令帶納一料候秋成更令帶納庶幾疲瘵頗獲安濟監察御史陳次升上奏曰臣伏覩元豐八年四月二十三日樞密院奏請保甲上教其下等人户土地既少不免效力為生并止有兩丁其間有疾病者雖依條未該破丁若不能營作顯難應副保甲色役三省同奉聖旨府界三路保甲除見教人外本家止有兩丁病患未該破丁而委的不堪營作并第五等以下土地不及二十畝者並免推行之後人以為便況當時奏請得旨施行乃是今日一二大臣修先帝法度之人非是故為增損而壞法者也今年六月二十四日却有指揮衝改土地不及二十畝之家免冬教全條更不行用及老疾羸弱者選以次人承替緣貧下之人其田不及二十畝效力以求日給若令上教則廢為生之道官中雖給口食不足以償所費其家無以養兼老病羸弱之人既難以筋力從事其飬生必賴于壯者若是兩丁之家一丁老病而又令壯丁代教則老病者必致失所竊聞此法既行人欲避免保丁有賣盡土地者有分析生産者或稱父母年老或分房向外或令女壻出外乞破丁者人情如此理當安存蓋民為邦本本固則邦寧民既賣土地不為長久之計窮則斯濫必流而為盜恐貽朝廷之憂臣伏乞睿旨令保甲土地不及二十畝兩丁病患者並依元豐八年指揮施行以安存貧下老弱之民不勝幸甚右正言王覿奏為乞添差詳定役法官疏曰臣伏見朝廷以役事至重故差官置局詳定其法今詳定官吏部尚書孫永吏部侍郎傅堯俞户部侍郎趙瞻皆素有名德縉紳之選也然户吏劇曹専治其職者尤憚其繁而使之兼領役事豈得盡意于其間哉今役事久而不定天下之猾胥貪吏得以搖動人情而郡縣等第户及招差人欲求安靖未得也夫諸路通法當出朝廷者講求何可以不偹也四方疑事日望指撝者施行何可以不速也況諸路役書已有到者遞限月日皆次第將滿其役書必相繼而集矣非劇曹日力之餘可得而省閲也臣愚以為臣僚中當更有通曉民政而本職稍簡者若添差一二人使得專在本局以治其事庶免滯留之患徽宗即位初工部侍郎王覿奏乞重定差役人户等第疏曰臣竊聞諸路州縣頗有役人數多而鄉村等第人户數少差役不足者目今雖以次等人户相兼差足將來役人年滿難得人户承替及雖有人户可作三兩畨更休充役之處亦是經隔年嵗不多其中等人户應役既頻則其力必困議者患之臣竊以為不然其弊有自來矣議者或未之知也伏緣差役之法本朝行之百餘年未嘗患人户少而不足以充役也至今日而患之蓋助役免役法推行之初天下州郡皆先會一年雇役及寬剩錢之數然後賦之于民也賦于民者不可無法而且欲其均又必會其民家業之多寡為緡錢而率之其法大槩曰一州差役及寬剩嵗用錢若干一州之民家業錢若干即家業錢每貫嵗出免役錢若干而嵗計足用矣法雖如此而民財卒不可以得其實必欲得其實則必至于搔動而民情之所甚不恱者如手實之法是也故州縣之吏莫不以謂雖盡得家業之數其賦于民者足乎嵗計而已耳徒致民情之不恱也雖少得家業之數其賦于民者亦足乎嵗計而止焉乃可持虛名以恱民故天下之所謂家業錢者或十得其一二或十得其三四寬于此者固不可勝計密于此者未之有也不惟如此而已州縣又有先集等第人户使各承認逐户合納免役錢數既足嵗計矣然後令供通家業而告之曰家業錢每貫當納免役錢若干今某人嵗納免役錢若干即當家業錢若干貫矣彼人户乃具狀供析家業以取合所納免役錢之數則家業十得其一二者又加少也既用家業錢以定免役錢之多少則所謂等第者無所用之而等第之名又不可廢故郡縣之吏皆于家業帳內率意立説曰自家業若干貫以上為第一等户若干貫以下為第二等户至五等十等皆然也其等第既公私皆以為虛名矣然小民之情終惡為近上等第則州縣之吏亦何惜更以虛名而恱民故天下州縣之等第除上等户物力顯著難以退減之外其自中等而入下等者可勝數哉此臣所親見也今州郡徒用前日不實之等第而差役則人户之可以應役者至少又何足怪耶臣愚以為欲天下鄉村應役人户稍多得以更休而不困即須告詔天下郡縣使重定等第令頗得其實則力役均而論者之所患者不足以為患矣惟聖慈詳酌施行貼黃免役法根究人户家業以緡錢率之又官司有故為假借之意故難得其實今鄉村人户只是分為五等推排家業之大槩易得其實也兼等第亦不須特行排定緣著令鄉村三年一次造簿只可申戒州縣遇依條造簿年嵗子細推排等第不可漏落堪任充役之人隱在下等以致中等以上人户數少差役不均庶幾等第漸次得實不為差役之害徽宗時左司諫江公望上言曰為民必有役奉公上之通義也免役必輸布取民力之中制也會一嵗之用以為斂其寬剩不過十之一二以備凶荒之不足也此神考立法之本意而奉行之吏于十二外别立封樁子或過母元祐之政得以藉口先帝遹追神考之志一切罷去可謂善繼然隨時損益之美有待陛下今日臣訪聞府界提舉常平祝朋劄子乞復行封樁以備不給此何異于獻羡餘者也職董農政當講求神考立法之意俾德澤下逮黎庶而乃啓厚斂之路天下必以府界先偵得指希風迎意翕然各私售其説變亂故常斯害政之尤大者也陛下即政踰年膏澤美利未聞有以及天下而天下之人拭目傾耳日望堯舜之治不啻若飢渴朋以厚斂之説開新政之隙是欲陛下隳神考之良法當天下之怨議復見詆毁成法之人駢首屬耳切切私議將乘間而發也其背陛下繼述之意有如此者若朋别將使指臣未知其如何決不可以董常平之政蓋常平所董皆神考所立法度其一如此類皆可知陛下方因時損益酌其中道力救元祐紹聖過與不及之弊使天下後世好為異論之人無得而議故造端不可不謹也髙宗建炎三年司諫趙元鎮論役法疏曰臣竊惟免役之法起于熙寧之初當時中外臣寮論列利害不可槩舉大率優上户斂下户優富民斂貧民雖單丁女户以至僧道皆不獲免以其所斂飬吏之餘謂之寬剩是謂一稅之外更起一稅大失祖宗寬民之意行之六十餘年今則由之而不知其害也陛下灼見紛更之弊既不能復循舊制今乃于元額之外重增三分官户更不減半其于祖宗之意益逺矣又如鈔旁等錢乃前日殘民之術靖康初即以罷之近降指揮雖不賣鈔而猶隨鈔納錢賣鈔得錢規圗苛細已非朝廷美事乃令隨鈔納錢是何名目凡取于民亦須有名取之無名不得無辭矣今國勢微弱強敵未和髙城深池不足恃堅甲利兵不足恃臣知所恃者惟民而已安可橫斂加賦重失其心邪比來州縣用度不足雖知此法之弊而不以為言者幸其所斂以資闕乏獨京畿運判上官恪能言之仍乞諸路依此施行其意甚善雖奉聖旨權免京畿而諸路未罷也臣願陛下如恪所請遍行諸路且使斯民知此二事昨因臣寮建言而行今因臣寮申請而罷皆非朝廷本意則心恱而歸之此堯舜得民之道也祖宗得天下之術也幸陛下毋忽髙宗時夔州通判虞允文奏論四川差科科約之弊曰臣竊惟陛下躬好生之盛德恤民之疾苦以幸海內頻年下詔大蠲蜀賦之苛恩施之隆與天無極而廣詢博訪尚勤不已之心凡食一命之祿者其何以報稱而州縣之間差科之數不實科約之外輒復别取為民隱害終不可去者民愚而無知吏姦而無所不至民豈能與吏敵也謂如一郡合起和買絹一萬匹郡管稅錢一千貫即是人户管稅錢一百文方合科一匹若州縣以八十文科一匹則多取二千匹矣自和買而類推之差科之數不實不勝其多也又如大禮助賞合用轉運司科約內係省錢計置若州縣將本色錢妄用以大禮助賞為名别行科取其為銀絹之數不下數千萬緡自助賞而類推之科約之外别取亦不勝其多矣吏以民之不知故取之無藝用之不恤或以事土木不急之費或以奉臺府無名之取或以應親朋干索之求甚者遂掠為己資無所顧憚間有敗露為民所訴則州縣相通改換赤歷方行收附其獄或成止從公坐仇視其民而禍愈酷矣今約束之詔甚明而吏之所行敢與詔戾者以書罪之法未立也臣嘗觀唐憲宗元和之初立為條制凡兩稅應留錢外加率一錢一物州縣長吏並以枉法贓論令出使御史訪察其後又遣詳覆使按治一十六郡梓遂郡守嚴礪等皆抵于譴案籍具存也憲宗中興威令復振者實本諸此臣愚欲望陛下特出睿斷將州縣賦外大科别科之錢從枉法贓定罪明詔諸州長吏限以一嵗許令改正别造科約具逐縣差科則例均給五等之家及以蠲除之數申轉運司仍乞于諸路轉運司官選差清強通練者專任施行稽考之責訖事具數以聞以俟陛下異時遣使詳覆庶幾州縣知所畏戢百年隱害一旦可去仰副仁天子宵旰斯民之意右正言陳淵論薄斂奏曰哀公問于有若曰年飢用不足如之何有若對曰盍徹乎公曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足夫夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也夫取民以什二用之猶不足而告之以什一之法不亦迂乎此儒者之論所以多不見聽于時君而商財𣙜利之臣所以常得行其計也然世之患不足者始則多取于民民既不足又從而暴斂之掊刻屢興于是有轉徙流散去而為盜賊者終于不足雖加之以刑戮財何自而得乎非特如此而已因之以致大亂者是不反其本之過也由是言之雖若甚迂宜在其中矣中書舍人洪遵論被水人户折科疏曰臣竊聞平江府湖秀州去年積潦之後農民流離失所今春蠶麥頗登得以續食施工南畝日覬秋成而近來大雨連綿無異去嵗田不沒者無幾皇皇哀號無以善後而州縣不能以拊摩凋瘵為意但知依例預將秋苖折科大麥每米一碩令民倍以麥輸方今麥價不下于米積困之民朝賑暮貸猶懼不濟奈何指夏以為秋衍一以為二使之剝膚椎髓終擠于溝壑乎臣聞飬馬所須本不至此姦吏因緣無所不至欲望聖慈特賜睿旨下户部會計馬料見在實數當用幾何只令合科借處如數敷折須以苖一碩折麥一碩五斗庶幾民户可以輸納仍乞先次行下三州被水人户盡免折科免致重困吾民不勝幸甚章誼乞委通判均平稅役奏曰臣叨蒙器使職在牧民夙夜以思其可以布宣陛下惠澤者莫如為百姓除患臣伏觀平江今日百姓之患在公者莫甚于催科之無法在私者莫甚于賦役之不均夫逃亡户荒之田地不耕桑而二稅具在監司守令拘于省額而不敢除姦胥猾吏利于誅求而不肯白每嵗拘催責任都保有不備償笞辱隨至此臣所謂催科無法者也至于富家巨室阡陌相望而多無稅之田貧民下户破家竭産以償不割之稅田無稅則科斂之數寡稅不割則户籍之等髙此臣所謂賦役之不均者也今欲救此二弊若責之監司則不過移文于郡守責之郡守則不過移文于縣令是三人者吏課叢委酌應多方雖有敏強之吏功不能專力有餘暇況吏不盡才則又非徒無益也伏望聖慈明降詔音専委通判一員均平稅役詳舉告陳之令先開首原之路責以期限賞信罰嚴如此則二弊可去貧富皆安公私共濟矣不勝幸甚試中書舍人李彌遜上奏曰臣伏覩朝廷比以兩浙江東西等路因被盜賊燒劫逃移人户秋夏二稅並皆倚閣纍年之間漸次復業仰見陛下仁厚之政惠飬元元之意天下幸甚近因中外臣僚之請已降指揮夏稅兩浙路並復元額餘以紹興四年欠數為率江東權閣三分江西權閣五分餘數依限起發秋稅已經放免及五年十料之數並令輸納全稅臣契勘曽經燒劫逃移人户如已自復業開墾了當自合依今來指揮輸納緣諸路被害州縣輕重不等其間有大段深重全未歸業雖已歸業未曽開墾去處若一槩立定分數及全復舊額委是無所從出切慮百姓虛被追擾致逃避流為盜賊而官司徒有虛數不濟實用若緣此一例與展年限又恐其間不無僥幸臣愚欲乞依今來檢放災傷條法令逐州委官同逐縣知縣遍詣元被劫人户檢視田畝已未開墾數目詣實本州保明申轉運司差官覆實保明申朝廷其已開墾數目即依舊額輸納稅賦其未曽開墾去處並權倚閣委自令佐知通多方招誘歸業開墾逐年開墾到數申朝廷考其殿最而賞罰之庶幾數年之間民得安業而公家實得稅賦之利殿中侍御史張守上奏曰臣伏自陛下踐阼以來詢求民瘼德音屢下丁寧惻怛凡擾于民者一切蠲罷所以固結人心而建中興之大業也近復有臣僚上言州縣于百姓户下科率金銀錢米已蒙聖慈令監司按劾重置典刑臣竊聞淮西提刑司緣夀春府霍邱縣屯駐髙武略人馬公行文移于夀春府廬光濠州每人户家業錢一千貫逐人月納錢一貫米一石前去霍邱縣送納其小貼子云如本縣不即均敷必定分撥髙統制人馬于本縣駐劄雖至小縣亦令每月認定千緡千石臣契勘今之家業及千緡者僅有百畝之田稅役之外十口之家未必糊口今更使之嵗别出錢一十二千米一十二石而送納腳剩之費因緣乞取之弊又在數外理難供輸供輸不前必亡而為盜矣又況淮西數州皆遭丁進及羣盜經過民力已乏而重困之體國愛民者固如是乎初無朝旨擅行科率德音踵至恬不為念奉法遵職者固如是乎且州縣科率為監司者即當奏劾而躬自為之何以廉按一路既自知非法慮州縣不從乃欲移屯人馬以恐制之又豈部使者所以待部屬之理也欲乞聖慈特賜究治施行竊慮諸路更有似此去處亦乞申嚴戒約所有霍邱縣髙武略人馬聞亦係招安賊徒亦乞早賜措置分屯庶幾不至姦吏因緣侵擾良民而陛下之德意實惠不為虛文也孝宗時太學博士虞儔輪對劄子曰臣恭惟國家聖聖相承法令明具無非以惠民為本若州縣官吏悉能奉行則何弊之有今州縣之弊多矣惟賦役不均為甚非法有所未盡也蓋官吏奉行不虔之過也諸縣稅租夏秋造簿及已受納對鈔朱銷凡所以關防之法非不嚴且密也近來諸縣推割造簿之時豪右之家計囑鄉書只用白狀不述保分人丁住止將一户稅力分立詭名減免等第却與下户暗增色額當職官略不留意點對便以造簿為定赴州審印下縣起理開數給帖付户長催科其詭名挾户既無人丁保分住止雖間有潛行送納甚者至于偽作逃亡挂欠官司多是抑勒户長代輸以致户長受害愈難充應又民户輸納二稅除給户鈔外官司自有縣監住鈔可以照應鄉書不即與朱銷主簿又不書押或去失官鈔則反追索户鈔至有不行照用勒令再納以致下户重困其弊乃爾豈非官吏奉行不虔之過乎常平免役自有專法非不詳且備也近來諸縣所差保正長雖以稅力髙下為則然姦民利在規避役次于未點差已前先行計囑鄉書將所管稅力虛立典賣文契及詭名走寄官司不究情偽往往將無力下户抑逼承認或經一季或經半年並不依限與奪緣官司不曾置籍具姓名明注入役年月前期定差致已滿人未得抵替間有保分不測煙火盜賊枉受連纍破壞家業其弊乃爾豈非官吏奉行不虔之過乎臣愚欲望陛下詔有司檢坐見行條法申敕州縣務在必行不為文具仍委知通常切覺察監司巡歷點檢如有違戾去處重作施行庶幾成法所在官吏奉行罔有不虔賦役以均民受實惠天下幸甚長沙守王師愈上奏曰臣伏見州縣間民之所苦者在于充役官之所難者在于差役陛下髙拱九重之上明燭四方萬里之逺民之利病罔不周知比頒詔旨告戒大臣欲均役法甚大惠也臣嘗承乏長沙叨民社之寄豈敢不仰體聖意貢其狂愚伏見長沙前政劉椿創為集議帳臣既到官損益而行役不差而人樂充三年之間絶無爭訟者百姓以為便官吏亦以為便鄰邑如善化安化瀏陽倣效而行又以為便請為陛下試言其大槩一鄉各有都一都必有富豪可充保正者多者十餘户少亦不下五户其物業之髙下人丁之衆寡歇役之久近咸具于帳俾見役保正將替兩月之前持此帳備酒食會其充役之人衆共商議公選一名充應承代其間雖有情偽曲折官不得而知者此曹盡知之纎息無隱案吏鄉司不能曲為輕重故善良之民樂從而無訟或有富強頑猾不循理者巧飾詞説規圗避免則令見役保正押帳內人至于縣庭長官折衷衆人之議以理曉諭之鮮有不聽者間有頑然不服不免臨之以威必欲如衆人之議而後己其或衆議挾私窮究見實必為懲挾私之罪如是則富強豪猾之徒亦願從而不敢訟蓋係衆人之公選官吏無所用其心此集議之大槩也臣抑嘗原其必爭之端由科敷重而費用多耳于是都內凡有科敷一切罷去利可興則興之害可除則除之數月之後逺近孚信故集議尤易為力所有集議帳式輒具進呈然而此帳易行于湖廣而難行于江浙江浙官户多詭户多其民猾也湖廣官户少詭户少其民淳也欲望聖慈頒臣此帳于湖廣州縣與見行常年役法兼行聽從民便則民無充役之苦官無差役之難惟陛下留神幸甚唐仲友上奏曰臣仰惟陛下軫念元元患苦役法數年以來數採議臣之請損益斟酌期歸至當德意蓋深厚矣臣誤被臨遣愚管之見不忍自默以負陛下臣初任縣僚嘗歷考役法之本末久伏田野又熟察民情之利病乃知法惟畫一而情有萬殊法可以通乎人情而不能自周乎人情顧行法之人如何耳得其人則法行而民情安非其人則法廢而民情擾比年以來民情所以厭苦於差役者蓋有由矣縣令惰弛贓汙委政胥吏吏緣為姦蠧害百出其始差也甲當充役或先差丁導使論丙轉以及甲故民破産於爭訟其既差也峻刑於追呼巧法於科率須索誅求溪壑無藝故民破産於搔擾二弊不去陛下雖有良法美意民之困苦固自若也臣愚竊謂縣得賢令雖以簡要之法行之而民猶安縣無賢令雖以周密之法行之而民猶擾令固不能皆賢則考察勸沮誠不可緩臣願陛下申敕監司守臣謹察縣令之賢否稽其差役訴訟之多寡搔擾之有無以為殿最取其甚者條奏一二賞罰焉庶幾官知奉法吏不敢肆欺民被實惠輕於從役實郡邑之急務也陸遊上奏曰臣聞天下有定理決不可易者飢必食渴必飲疾必藥暑必箑豈容以他物易之也哉臣伏觀今日之患莫大於民貧救民之貧莫先於輕賦若賦不加輕别求他術則用力雖多終必無益立法雖備終必不行以臣愚計之朝廷若未有深入逺討犂庭掃穴之意能於用度之間事事裁損陛下又躬節儉以厲風俗則賦於民者必有可輕之理緩急之備固不可無姑以嵗月徐為之可也如是則和氣浹洽必無水旱之災歡聲洋溢必無盜賊之警何慮國用之不足耶設使裔夷弗賔侵犯王略所謂率其子弟攻其父母直可舞干羽而格之爾頃者建炎紹興戡定變亂之日一切賦斂有非承平之舊者髙宗皇帝宵旰焦勞每欲俟小定而悉除之故詔令布告天下曰惟八世祖宗之澤豈汝能忘顧一時社稷之憂非豫獲已止俟捍防之隙首圖蠲省之宜臣幼年親見民誦斯詔至於感泣雖傾資以助軍興而不敢愛旋屬國家多故敵國畔盟雖所蠲已多終未仰稱聖意壽皇聖帝臨御以來所以節用裕民者皆繼承髙宗蠲省之指也則陛下今日豈可不以為先務哉臣昧死欲望聖慈恢大度明逺略詔輔臣計司博盡論議量入而用量用而取可蠲者蠲可省者省富藏於民何異府庫果有非常孰不樂輸以報君父淪肌浹髓之恩哉若有事之時既竭其財矣幸而無事又曰儲積以為他日之備也雖恢復中原又將曰邊境日廣矣屯戍日衆矣則斯民困弊何時而已耶瀆犯天威罪當萬死惟陛下裁赦袁説友上奏曰臣竊見州縣小民有産去稅存之害官吏非不盡知朝廷亦纍嘗戒諭而終無成説以革其弊此由得産富民規避官物惟幸緩於過割隱漏稅賦官司既未割稅而追呼催督止及鬻産之民彼方以産售人固甚不得已今又無此産而納此稅蹊田奪牛其毒滋甚縱使鬻者赴官陳訴而追逮出官之費已不少於代納之數矣是豈不為重困哉此最賊夫民之大者也在法每三年一推排此正祖宗欲以革産去稅存之弊蓋一經推排則凡某産已去某家及某産已歸某户一一盡知産業既明稅賦自定豈復更為小民之害今縣道例皆前後避免或以災傷為辭有經十年二十年而不一推排者此而不治而譊譊曰吾病夫産去而稅存也豈不暗哉臣愚欲望睿慈自今立為定制凡天下諸縣並須三年一推排候知縣任滿日州府於本官印紙該載任內曽與不曽推排結罪保明批上如在任三年不曽推排者候到部日取旨若今來尚有兩年為任之人只總以三年一推排為率各於任內計年分可見雖災傷年分須及八分以上然後免庶幾一行此法産稅自明鬻産小民不至重困提舉浙東常平茶鹽公事朱熹奏義役利害疏曰臣巡歷到處州竊見本州昨奉聖旨依布衣楊權所請結立義役此見陛下愛民之切雖草茅之言茍有便於民者無不采納施行天下幸甚然本州目今奉行却有未盡善者如令上户官户寺觀出田以充義田此誠善矣而本州却令下户只有田一二畝者亦皆出田或令出錢買田入官而上户田多之人或却計會減縮所出殊少其下户今既被科出田將來却不充役無緣復收此田之租乃是困貧民以資上户此一未盡善也如逐都各立役首管收田租排定役次此其出納先後之間亦未免却有不公之弊將來難施刑罰轉添詞訴此二未盡善也又如逐都所排役次今日已是多有不公而况三五年後貧者或富富者或貧臨事不免却致爭訟此三未盡善也所排役次以上户輪充都副保正中下户輪充夏秋户長上户安逸而下户陪費此四未盡善也凡此四事是其大槩目下詞訴紛然何況其間更有隱微曲折未可猝見若不兼採衆論熟加考究竊恐將來弊病百出詞訴愈多改之則枉費前功不改則反貽後患將使義役之名重為異議者所笑無復可行之日誠有未便臣昨見紹興府山隂縣見行義役只是本縣勸諭人户各出義田均給保正户長各有畝數具載砧基其保正户長依舊只從本縣定差更不别置役首亦不先排役次而其當役之户既有義田可收自然樂于充應不至甚相糾訐但其割田未廣去處未免尚仍舊弊若更葺理增置便無此患竊謂其法雖似闊踈然却簡直易明無它弊病又且不須衝改見行條法委實利便故嘗取其印本砧基行下州縣然以未經奏請畫降指揮州縣往往未肯奉行臣愚欲望聖慈詳酌行下處州止令合當應役人户及官户寺觀均出義田罷去役首免排役次止用山隂縣法官差保正副長輪收義田仍令上户兼充户長俟處州行之有緒却令諸州體倣施行庶幾一變義風永息爭競須至奏聞者熹又上奏曰臣昨蒙聖恩待罪南康小壘自惟短拙無以補報萬分到任之初即以本軍星子縣稅錢偏重民不聊生條具奏聞乞賜蠲減總計不過納絹一千五十餘匹錢二千九百餘貫伏蒙聖慈開納即賜施行而有司不能仰體德意輒引議臣對補之説以拒其請臣于今年得替之前久嘗具奏冀卒蒙恩而逮今纍月未奉進止竊意有司尚守前説然臣之愚亦有不能自已者謹以前奏之內最明白者二條復為陛下陳之按本縣所管廬山一帶多是髙巖峭壁穹石茂林其間雖有些小田段類皆磽瘠寒冷所入不多而經界官吏起細稅錢數目浩瀚難以輸納以故紹興年中守臣徐端輔者因寺院之請減去一百四十餘貫減之誠是也然初不請命于朝而輒私減之既又慮夫經稅之或虧也則妄引經界以前不明文帳將人户下田升作中等中田升作上等亦有徑自下等而升上等者按籍履畝而橫加其稅計錢一百四十餘貫以隂補所免廬山稅錢之數中間常有漕臣按臨人户陳訴漕司為之張榜約束改正而本軍不復奉行其後又有人户曾經户部陳訴而亦不能正也臣竊惟國家子愛黎元憂勤懇惻常賦之外一毫不忍有所多取而下小臣率情妄作乃敢以一百四十餘貫之稅無故而妄加于人雖其除之于山粗若得宜而增之于田則悖謬甚矣故臣前奏欲乞將端輔所減山稅明降指揮特與蠲減而其所增田稅却與改正依舊等色均稅其為事理曉然無可疑者而所蠲之數亦不甚多不謂有司不顧大體而惜小費乃欲限以對補之説則是使臣又為端輔之所為而後已爾未興一利而先起一害臣雖至愚有所不忍為也今雖已去官守然于此縣疲瘵之民有未能忘者故敢不避斧鉞之誅復以上聞欲望聖慈矜閔明詔有司將此兩條先次減免改正其餘項目臣亦未敢便乞施行悉祈蠲免且乞專委本路監司一員子細相度俟其奏報别賜指揮至于淳熙六年十月十九日議臣對補之説其言吝細鄙狹不逹大體無以將順陛下克己愛民聽言革弊之美意而程奏顯言頒布海內非所以宣德意而廣仁聲于天下也欲望聖明并賜追寢自今以來四方內外或有以蠲除為請者究其虛實而一以法義裁之則彼固不得以肆其僥幸茍免之計亦何必逆為之限以傷逺近祈恩望幸之心哉抑古人亦有言曰百姓足君孰與不足百姓不足君孰與足此乾坤廣大之心聖賢親切之訓臣願陛下于此深加聖意則彼妄庸淺俗之言自將深藏逺屏不敢以陳于陛下之前矣臣進越妄言犯非其分不勝恐懼戰栗之至司農卿李椿上奏曰臣乾道四年春蒙恩擢守鄂州陛辭之日得旨召募開墾荒田立三限通九年而後全起稅賦臣自到任之後措置召募請佃人户投狀者數千户尋已具數申省部訖自臣離任之後申請不一事多衝改或限一年或限半年或不通檢止納元稅或許逺年逃户歸業以致爭奪詞訟不絶州縣莫之適從臣巡歷諸郡以目所見惟常德府已耕墾及九分以上澧州及七分以上其餘州郡亦五分以上下以請佃之數計之則全未及分若行根括則佃户必又逃棄不耕却致荒廢非徒無益況半年一年之限大迫民户愈疑若不通檢止納元稅又多無元稅數目亦成虛文若令逺年逃户歸業則經官給佃已施工力之家豈得無詞官司何以取信于民臣欲乞檢照臣元奏獲指揮及申省部畫一及後來臣僚陳請續降指揮類聚看詳從長歸一施行仍乞預先寬約年限聽令自陳不須根括立定苖稅視田肥瘠為三等上等每畝不過六升中等四升下等三升役錢計料不得過數科敷重立罪罰其夏稅令諸州取每畝兵火以前租額不得過數自轉運司類聚申朝廷從輕定數候得指揮方許行下曉諭庶使耕佃之家預知稅賦不重安心著業耕布曠土漸闢伏乞睿照椿又上奏曰竊謂養兵所以衛社禝講好所以息鬭爭皆所以保國安民也然當以理財為要然後能濟二者之急務所謂理財當知生財之道生財之道取之于民而已民力有餘則取之不竭民反本而知節用則力有餘矣今荒田尚廣民多遊手用度不節貧困者多甚者轉而為盜賊安能上濟國家之急務哉然則民之情孰不願安其業而輸常賦也耶當窮其逐末而不反本之原有以救之可也人生所藉以生者穀帛也穀帛出于民者也民能力農桑而不失其時則榖帛不可勝用矣錢者所以平百貨使輕重適均者也錢鑄于官而不出于民也官能精于鼓鑄而不致流毁商𣙜無弊用之有節則錢不可勝用矣今賦稅多折見錢是取不出于民烏得不棄本而逐末耶如曰朝廷用度至廣若不賦錢于民無從應辦是未知思也今有𣙜貨商稅之利不為不廣當革其弊原除其冗食固自浩瀚又況既賦布帛應請錢者量與布帛孰為不可又民競奢僭不知節儉是以首致貧困謂如閭巷之婦有以一冠一領厥價數千奴皂之徒競衣羅綺皆當有以風化之使男力稼穡女工蠶織奢僭之風既息則貧困之人自有生理也傳曰未有民富而國貧者也是豈虛語愚謂當遴選漕臣以均賦稅常賦不折變盡輸本色隨稅不納錢禁戢奢僭除去冗食量入為出勤課農桑使田野盡闢盜賊消弭百姓富庶則所以上濟國家之急務者可不勞而辦矣伏乞鈞照椿為吏部侍郎上奏曰臣伏覩近降指揮撥錢付諸軍回易以贍請少口衆軍兵仰見陛下存恤戰士德意甚厚軍人莫不感戴恩惠凡天下事有利必有害且回易以惠軍此利也何害之有臣請預言之今江上諸州自歸峽荆嶽鄂黃蘄江池太平十州皆仰商稅以充利源今軍中回易之物則失所收之稅州郡皆窘此其一也商賈憚于重征則必夾帶于軍中場務併客稅失之紛爭必多此其二也軍中前此不許回易猶且以收買軍須為名役使戰士今明開其端將來占破回易必益多矣此其三也回易所以圗利也物價低昂非人所能為或有折閲侵欺失陷將來必有征驅鞫勘之擾此其四也然則謀其成不謀其敗姑以惠軍士為急況已出黃榜軍中亦望此惠不可已也臣願以中道處之使不為害莫如軍中回易物貨並與減半收稅則州郡所失不多軍中亦可獲利並令總領所出給歷頭具載回易物色及所差人數稅務照例減收又檢察人數其歷外之物並依格收稅如回易軍人有犯聽稅務具申總領所下本軍根究仍嚴戒稅務合干人不得分文乞覓如是則三害非所慮惟折閲失陷一事則繫乎幸不幸耳當置之度外如臣愚瞽之言或有可採乞别作聖旨施行員興宗議征稅奏曰臣聞上世之法簡後世之法繁前世之吏朴後世之吏姦上世法非欲簡也民純吏朴有令即從有義即服法不得不簡也後世法非欲繁也民訛吏姦令之未必從聞義未必服法不得不繁也夫以朴吏而奉至簡之法一有不行行之必易為力也以姦吏而奉至煩之法終嵗欲行行之亦難為功也昔者有周之初關市譏而不征澤梁無禁天下日用之物不征不禁故物易通流而國易足用此文王造周之始其國非特輕其征稅且又無征稅也至成周之時吏亦少簡民亦少繁故當時太宰之職有九賦以斂財其中有曰關市之賦及山澤之賦及幣餘之賦此即近世州縣商稅一切用物所存物額之類也當是時周公相周知民吏益于前世其法不得不繁其吏不得不選故周公之于周官雖文武關譏不征之事有不能行者相時之宜經略世務故也且周公之時已不能盡行文王之法而欲後世盡行周公之法可乎但漢唐之世多不能遵用中制以法周公之遺意科目煩多漸成橫斂故有稅算緡稅雜物稅間架稅六畜之類見于前記以為世戒臣亦不敢并舉也惟我國家創業之初一洗前代之弊是以太祖皇帝動守經常凡為國苛賦橫稅尋即停罷聖子神孫守為一定至天聖中有司以乏用請稅緡錢仁宗皇帝謂泉貨之利欲流天下今輒稅之可乎是則祖宗之于民稅不特常慮之又常欲輕之也今陛下志勤道大節用簡取無日不行恤民之詔無時不下此即祖宗用心文王用心也然今日郡縣稅務多與州府通同尚皆不遵憲度自為一已而殃物不為朝廷而愛物臣敢以荆湖三峽論之荆襄三峽皆邉大江自當百貨流通而近年以來蜀物少出南貨少往四逺之利未敷用物稍致闕乏何也蓋稅務之六弊未去也三峽荆湖所遇稅務不問商客稅物之多少輒欲加等重稅敷攤逋負此一弊也沿道千里武夫小吏以為監官豪奪暴取設弓羅箭如待寇至此二弊也本無稅物監欄一面虛喝謂之花喝商客辨爭則不可欲去則不能拘留旬月自然聽命此三弊也商客類至專欄預行資覓多得則稅輕少得則稅重輸官之物未至而私遺之物先逹此四弊也監專有私取之數異乎赤歷之數僻鎮外縣卒難考稽所得在私所虧在官此五弊也在州則知州以稅務為鷹犬在縣則縣令以稅務為肘腋百色呼須暗行陪填是致稅務苛刻州縣不問商旅無訴此六弊也夫此六弊之不去則稅額未敷其坐此乎今臣之愚欲望朝廷明詔荆湖三峽諸路申嚴法禁大革前之六弊仍令諸州遞差清強官兼行伺察離軍武吏未曾親民及經諸司保舉者願勿補衝要監稅之官專欄暗覓及輒以弓箭恐嚇商旅者乞罪不貸行人稅物並許依約國家元法如稅務敢以少為多以輕為重被客人告首者亦乞坐之如是則物易流轉郡縣遍蒙其利矣陛下德髙天下此言雖小在陛下聖世一事之可察度聖量如天必兼納而博採也歷代名臣奏議卷二百五十八
