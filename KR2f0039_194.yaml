body:
  text: 歷代名臣奏議卷一百九十四明楊士竒等撰戒佚欲唐德宗時翰林學士陸贄上奏曰右德亮承旨并録先所散失內人名字令臣撰詔書以賜渾瑊遣於奉天尋訪以得為限仍量與資裝速送赴行在者頃以理道乖錯禍亂洊鍾陛下思咎懼災裕人罪已屢降大號誓將更新天下之人垂涕相賀懲忿釋怨煦仁戴明畢力同心共平多難止土崩於絶岸收板蕩於橫流殄寇清都不失舊物實由陛下至誠動於天地深悔感於神人故得百靈降康兆庶歸德茍不如此自古嘗有擲棄宫闕失守宗祧繼逆於赴難之師再遷於蒙塵之日不踰半歲而復興大業者乎今渠魁始平法駕將返近自郊甸逺周寰瀛百役疲瘵之氓重傷殘廢之卒皆忍死扶病傾耳竦肩想聞德聲翹望聖澤陛下固當感上天悔禍之眷荷列祖垂裕之休念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復言為急損之又損尚懼汰侈之易滋艱之惟艱猶患戒慎之難久謀始盡善克終已稀始而不謀終則何有夫以內人為號蓋是中壼末流天子之尊富有宫掖如此等輩固繁有徒但恐傷多豈憂乏使翦除元惡曾未浹辰奔賀往來道路如織何必自虧君德首訪婦人又令資裝速赴行在萬目閲視衆口流傳恐非所以答慶賴之心副惟新之望也夫事有先後義有重輕重者宜務之於先輕者宜措之於後故武王克殷有未及下車而為之者有下車而為之者蓋美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大於斯誠宜速遣大臣馳傳先往迎復神主修整郊壇展禋享之儀申告謝之意然後吊恤死義慰犒有功綏輯黎蒸優問耆耋安定反側寬宥脅從宣暢鬱堙褒奬忠直官失職之士復廢業之人是皆宜先不可後也至如崇飾服器繕緝殿臺備耳目之娛選巾櫛之侍是皆宜後不可先也宜後而先則為君之道喪宜先而後則理國之義差古之興王必慎於此陛下將務興復又安可不慎乎且散失內人已經纍月既當離亂之際必為將卒所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因寇亂喪亡頗有大於此者一聞搜索懷懼必多餘孽尚繁羣情未一因而善撫猶恐危疑若又懼之於何不有昔人所以掩絶纓而飲盜馬者豈必忘其情愛蓋知為君之體然也以小妨大明者不為天下固多美人何必獨在於此易曰危者安其位者也亂者有其理者也故君子安不忘危理不忘亂是以身安而國家可保也春秋傳曰或多難以固其國或無難以喪其邦誠以處危則思安之情切遭亂則求理之志深切於思安深於求理國之固也不亦宜乎及夫居安而驕恃理而怠驕則縱肆其奢欲怠則厭惡於忠言奢欲日行忠言日梗國之喪也不亦宜乎昔衛獻出奔久而復國大夫迎於境者執其手而與之言迎於門者頷之而已言其驕怠之易生也齊桓將圖霸功管仲戒之以無忘在莒懼其情志之易變也今臣亦願陛下企思危固國如不及懲忘亂喪國如探湯以在莒為書紳之規以衰衛為覆車之鑒則德為帝範理致時雍與夫貪逸欲而踐禍機其利害亦云逺矣所令撰賜渾瑊詔未敢承旨伏惟聖裁憲宗元和七年延英奏對畢因問及國朝故事上甚恱宰臣李吉甫希意奏言陛下威德布洽華夷瞻戴時已太平可事歡樂上大笑李絳奏曰昔太宗之理天下也房玄齡杜如晦輔相聖德有魏徵王圭規諫闕失有溫彥博戴胄以彌縫政事有李靖李績訓整戎旅故四逺畏服寰宇大安天下之人仰戴聖德猶孜孜而求理開導直言旰食宵衣不敢滿溢豈復當時務於自逸乎陛下視今日事何如漢文時上曰安敢望漢文哉絳曰文帝漢之明主恭儉節用身衣皂綈清淨為理刑措不用逺人賓服致干戈偃戢而賈誼上言猶以當時如措火積薪之下火未燃而以為安其憂危如此今中夏河南北中蔡有五十餘州法令所不及德澤所未加兼西戎侵盜近以涇隴靈寧等州為界去京城逺者不過千里近者數百里烽燧相接邊界屢驚此方是陛下燋心涸慮廢寢忘餐之時豈可髙枕而卧也加以頃年水旱廩藏尚虛陛下憂勞頻軫聖念誠是延訪智略之士揀拔賢良之臣精求濟時之規光大中興之業又安可事於歡樂而自縱哉伏惟陛下誡之上欣然曰誠如卿言朕所以一錢不敢妄費一日不敢懈怠者祗為此言卿言正當朕意當與卿等圖之上退朝顧謂左右中官曰適來吉甫奏言時已太平勸我為樂李絳屢陳古今并言事宜是憂危之事吉甫諂佞恱我顔色李絳忠正骨鯁言必逺大真宰相也絳為翰林學士上奏曰臣等先奉進止令撿尋歷代至國朝已來聖帝明王忠臣義士君臣合體事迹可觀者撿五十條進呈欲於御座置屏風觀覽者伏以自古聖王皆憂勤庶政未嘗不取鑒於前代致理於當時昔太宗亦命魏徵等博採歷代事迹撰羣書政要致在坐側常自省閲書於國史著為不刋今陛下以天縱聖姿日慎一日精求道理容納直言猶更參驗古今鑒試美惡朝夕觀覽取則而行誠列祖之用心必致貞觀之盛理臣等謹依撰録都五十條賢愚成敗勒為兩卷隨狀進上其羣書政要是太宗親覽之書其中事迹周備伏望聽政日新成不諱之朝致無為之化憲宗喜武功且數出遊畋吏部郎中柳公綽奏太醫針以諷曰天布寒暑不私於人品類既一髙卑以均人謹好愛能保其身清靜無瑕輝光以新寒暑滿天地浹肌膚於外好愛在耳目誘心知於內端潔為隄奔射猶敗氣行無間隙不在大謂天髙矣氛蒙晦之謂地厚矣橫流潰之飲食資身過則生患衣服稱德侈則生慢唯過與侈心必隨之氣與心流疾乃伺之畋遊恣樂流情蕩志馳騁勞形叱吒傷氣不養其外前修所忌人乘氣生嗜欲以萌氣離有患氣完則成巧必喪真智實誘情醫之上者理於未然患居慮後防處事先心靜樂行體和道全克施萬物以享億年聖人在上各有攸處臣司太醫敢告諸御天子髙其才遣使謂曰卿言氣行無間隙不在大愛朕深者當置之坐隅穆宗初即位不恤國事數荒昵吐蕃方強諫議大夫鄭覃等廷諍曰陛下新即位宜側身勤政而內耽宴嬉外盤遊畋今吐蕃在邊狙候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜與願節用之以所餘備邊毋令有司重取百姓天下之幸也帝不懌顧宰相蕭俯曰是皆何人俯曰諫官也帝意解乃曰朕之闕下能盡規忠也因詔覃等曰閣中殊不欵欵後有為我言者當見卿延英時閣中奏久廢至是士相慶穆宗荒於遊畋內恣酣蕩昕曙不能朝諫議大夫崔郾進曰十一聖之功德四海之大萬國之衆其治其亂繫於陛下自山以東百城地千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴畜積無有願陛下親政事以幸天下帝動容慰謝主客郎中知制誥白居易以穆宗好畋遊乃獻續虞人針以諷曰唐受天命十有二聖兢兢業業咸勤厥政鳥生深林獸在豐草春搜冬狩取之以道鳥獸蟲魚各遂其生民野君朝亦克用寧在昔玄祖厥訓孔章馳騁畋獵俾心發狂何以效之曰羿與康曾不是誡終然覆亡髙祖方獵蘇長進言不滿十旬未足為歡上心既悟為之輟畋降及宋璟亦諫玄宗溫顔聽納獻替從容璟趨以出鷂死握中噫逐獸於野走馬於路豈不快哉銜橛可懼審其安危惟聖之慮敬宗即位視朝常晏數遊畋失德左拾遺劉栖楚諫曰惟前世王者初嗣位皆親庶政坐以待旦陛下新即位安卧寢內日晏乃作大行殯宫密邇鼓吹之聲日聞諸朝且憲宗及先帝皆長君朝夕恪勤四方猶有叛者陛下以少主踐阼未幾惡德流布恐福祚之不長也臣以諫為官使陛下負天下譏請碎首以謝遂額叩龍墀血被面李逢吉傳詔毋叩頭待詔旨栖楚捧首立帝動容揚袂使去栖楚曰不聽臣言臣請死於此有詔慰諭乃出敬宗時李德裕上言曰臣聞道之髙者莫若廣成玄元人之聖者莫若軒皇孔子昔軒皇問廣成子理身之要何以長久廣成子云無視無聽抱神以靜形將自正神將自清無勞子形無搖子精乃可長生慎守其一以處其和故我修身千二百歲矣吾形未嘗衰又云得吾道者上為皇而下為王玄元語孔子云去子之驕氣與多欲態色與淫志是皆無益於子之身吾所告子者是已故軒皇發謂天之歎孔子興猶龍之感前聖於道不其至乎伏惟文武大聖廣孝皇帝陛下稽玄祖之訓修軒皇之術凝神間館物色異人將以覿冰雪之姿屈順風之請恭惟聖感必降真仙若使廣成玄元混迹而至語陛下之道授陛下之言以臣度思無出於此臣所慮赴召者必怪迂之士茍合之徒使物淖冰以為小術衒耀邪僻蔽欺聰明如文成五利無一可驗臣所以三年之內四奉詔書未敢以一人塞詔實有所懼臣又聞前代帝王雖好方士未有服其藥者故漢書稱黃金成以為飲食器則益夀又髙宗朝劉道合玄宗朝孫甑生皆成黃金二祖竟不敢服蓋以宗廟社稷之重不可輕易此事炳然具載國史以臣微見儻陛下睿思精求必致真隱惟問保和之術不求藥餌之功縱使必成黃金止可充於玩好則九廟靈鑒必當慰恱寰海兆庶誰不歡心臣思罄愚𠂻以裨玄化輒陳懇欵伏積兢皇文宗時御史中丞李孝本宗室子坐李訓事誅死其二女沒入宫右拾遺魏謨上言陛下即位不恱聲色于今十年未始採擇數月以來稍意聲伎教坊閲選百十未已莊宅收市亹亹有聞今又取孝本女內之後宫宗姓不育寵幸為纍傷治道之本速塵穢之嫌諺曰止寒莫若重裘止謗莫若自修惟陛下崇千載之盛德去一旦之玩好帝即出孝本女詔曰乃祖在貞觀時指事直言無所避每覽國史朕與嘉之謨為拾遺屢有獻納夫備灑掃於內非曰聲妓恤宗女之幼不為漁取然疑似之間不可户曉謨辭深切其惜我之失不亦至乎謨雖居位日淺朕何愛一官增直臣之氣其以謨為右補闕武宗數出畋遊暮夜乃還門下侍郎同中書門下平章事李德裕上言人君動法於日故出而視朝入而燕息傳曰君就房有常節惟深察古誼毋繼以夜側聞五星失度恐天以是勤勤警戒詩曰敬天之渝不敢馳驅願節畋遊承天意後唐莊宗嘗畋中牟踐民稼中牟令當馬前諫曰陛下為民父母奈何委其所食使轉委溝壑乎唐主怒叱去將殺之優人敬新磨追擒至馬前責之曰汝為縣令獨不知吾主好獵邪奈何縱民耕種以妨吾天子之馳騁乎汝罪當死因請行刑莊宗笑而釋之又嘗獵于近郊洛陽令何澤遮馬諫曰陛下賦斂既急今稼穡將成復蹂踐之使吏何以為理民何以為生願先賜死莊宗慰遣之明宗初好畋獵都官員外郎張昭疏諫曰太祖初鎮太原每年打鹿於北鄙先帝在位暇日射鴈於近郊此蓋軍務之餘畋遊自適洎先帝膺圖啓祚嚮明御宇則宜易彼諸侯之事肅乎萬乘之儀而猶因習舊風失其威重馳逐原獸殆無虛日臣愚以為事有可畏者四焉洛都舊制宫城與禁苑相連人君宴遊不離苑囿御馬來往輦路坦夷不涉荒郊何憂蹶失今則驅馳驂服涉歷榛蕪此後節氣嚴凝徑塗凍滑萬一有銜橛之變陛下縱自輕奈宗廟社稷何所可畏者一也又陛下新有四海宜以德服萬邦今則江嶺未平淮夷尚梗彼初聞陛下革先朝之失政還太古之淳風御物以慈節財以儉有典有則不矜不驕彼必有三苖率服之心七旬來格之意如聞陛下暫遊近甸彼即以為復好畋遊所可畏者二也臣又聞作法於涼其弊猶貪作法於貪弊將如何且打鹿射鴈之事新敗軌傾輈之轍在常宜取鑒不可因循所可畏者三也臣又聞作事可法貽厥孫謀若以陛下齊聖廣淵之機聰明神武之量其可以宴遊搜狩之事少纍聖明所謂城中好廣眉城外加半額為法之弊靡不由茲所可畏者四也伏望陛下居髙慮逺慎始圖終思創業之艱難知守成之不易念老氏馳騁之戒樹文王忠厚之基約三驅之舊章定四時之遊幸始出有節後不敢違疏奏明宗嘉納之明宗時敕解縱鷹隼內外無得更進馮道曰陛下可謂仁及鳥獸明宗曰不然朕嘗從武皇獵時秋稼方熟有獸逸入田中遣騎取之比及得獸餘稼無幾以是思之獵有損無益故不為耳宋仁宗嘉祐四年翰林學士知開封府歐陽修上奏曰臣伏以上元放燈不出典禮蓋自前世習俗所傳皆俯徇衆心欲同民樂勉出臨幸非為嬉遊若乃時和歲豐民物康富以為樂事亦是人情今自立春以來隂寒雨雪小民失業坊市寂寥寒凍之人死損不少薪炭食物其價增倍民憂凍餓何暇遨遊臣本府日閲公事內有投井投河不死之人皆稱因為貧寒自求死所今日有一婦人凍死其夫尋亦自縊竊惟里巷之中失所之人何可勝數昨日聖恩差官俵錢正為如此目下隂雪未解假使便得晴明坊市不免泥淖聖駕所歷衝冒風寒況方以日食之災避殿減膳聖心畏憂中外所知欲乞特罷放燈所有常年酌獻之禮若至日未得晴明亦乞差大臣攝事所有見今供擬遊幸及修道路寒凍兵士並乞放罷庶幾上副陛下畏天憂民之心判太常禮院吕公著上奏曰臣切以帝堯之聖始於明俊德以親九族然後協萬邦致時雍斯誠制治之道次序之節然也伏見舊制敵使到闕曲宴紫宸殿及上元節當遊幸諸宫觀御樓觀燈臣愚以為贈中書令濮王在殯雖天子絶期然宴樂以早則於情理有所未安昔智悼子未葬殯于絳晉平公飲酒以樂杜蕢譏之此蓋異姓之臣爾況濮王於宗戚之中親尊莫二若陛下出於恩厚北使朝宴日特命去樂將來上元觀燈遊宴並從寢罷如此則親親之道可以率下而篤俗矣慶厯七年殿中侍御史何郯上奏曰臣竊以古者天子具四時之田所以講威武而勤逺略不徒事遊戲而玩小娛載之䇿書具有典法前日伏聞法駕將獵近郊中外之人聽者頗惑良以去歲車駕已嘗出畋羣臣抗言隨即停罷忽兹再舉未諭聖心伏以陛下繼統以來動遵法度不喜弋獵不數豫遊恭儉之風足邁前古而今之舉事固必有因豈陛下以宇內有年方隅無事故於農隙以講武經欲為都邑遊觀之盛乎抑有獻議者謂田獵之事具有禮文行之以時蓋舉墜典則嚮者諫止之言不足顧乎若聖意果然如是先定則非愚臣之所敢議也然其中事有切於利害者尚可得而言焉恭自真宗皇帝即位之後遂下詔書罷放五方鷹鷂獵事不講踰四十年校聮之籍率非宿時士卒久不便習其事官司又不素詳其義倉卒而行必多曠闕竊聞去歲乘輿之出往返甚勞一日之間殆馳百里而又兵衛不肅警蹕不嚴從官不及侍行有司不暇供億逮於暮夜始入都門此豈非士不習其事官不詳其儀而致然歟而況以騎乘而有疾馳之勞在原野而弛嚴衛之備或御者蹉跌變生銜橛愚民迷誤犯及車塵臣子之罪將何贖焉雖則仁聖之資固有神靈之衛然不可不備非常且西北二隅變故難測豈無姦偽雜於稠人廣衆之中由是而言益可深慮傳曰千金之子坐不垂堂矧於萬乘之尊乎賈誼曰射獵之娛與安危之機孰急今不獵猛敵而獵田彘不搏強寇而搏蓄兔玩細娛而不圖大患非所以為安也伏望陛下罷省出遊無重過舉遵列考詔書之旨念前人警誡之規優遊養神樂過從獸拱揖在御慮無乘危則宗廟生靈實有慶賴臣職當言責理合開陳罔逃嚴誅貴少云補蘇轍登進士科又䇿制舉時仁宗春秋髙轍慮或倦於勤因極言得失而於禁廷之事尤為切至曰陛下即位三十餘年矣平居靜慮亦嘗有憂於此乎無憂於此乎臣伏讀制䇿陛下既有憂懼之言矣然臣愚不敏竊意陛下有其言矣未有其實也往者寶元慶厯之間西夏作難陛下晝不安坐夜不安席天下皆謂陛下憂懼小心如周文王然自西方解兵陛下棄置憂懼之心二十年矣古之聖人無事則深憂有事則不懼夫無事而深憂者所以為有事之不懼也今陛下無事則不憂有事則大懼臣以為憂樂之節易矣臣踈逺小臣聞之道路不知信否近歲以來宫中貴姬至以千數歌舞飲酒優笑無度坐朝不聞咨謨便殿無所顧問三代之衰漢唐之後女寵之害陛下亦知之矣久而不止百蠧將由之而出內則蠱惑之所以汙以傷和伐性外則私謁之所以亂以敗政害事陛下無謂好色於內不害外事也今海內窮困生民愁苦而宫中好賜不為限極所欲則給不問有無司會不敢言大臣不敢諫執契持敕迅若兵火國家有養士養兵之費外有契丹西夏之奉陛下又自為一阱以耗其遺餘臣恐陛下以此得謗而民心不歸也仁宗時起居舍人同知諫院司馬光上奏曰臣等竊見今歲以來災異屢臻日食地震江淮騰溢風雨害稼民多菜色此正陛下側身克己眚禮蕃樂之時而道路之言皆云陛下近日宫中燕飲微為過差賞賚之費動以萬計耗散府庫調斂細民況酒之為物傷性敗德禹湯所禁周公所戒殆非所以承天憂民輔養聖躬之道也陛下恭儉之德彰信兆民議者皆以為後宫奢縱務相誇尚左右近臣利於賞賚陛下重違其請屈意從之夫天以剛健為德君以正固為事奈何徇後宫左右之欲上忽天戒下忘民病中不為宗廟社稷深自重惜臣等愚惑竊為陛下不取也伏望陛下當此之際悉罷燕飲安神養氣後宫妃嬪進見有度左右小臣賞賚有節及厚味臘毒之物無益奉養者皆不宜數御以傷太和乃可以解皇天譴告之威慰元元困窮之望保夀命無疆之休天下羣生不勝幸甚光知諫院時又上奏曰臣等伏見今歲以祈穀改日之故車駕併以十三十四日幸諸寺觀臣等竊惟上元觀燈本非典禮正以時和年豐欲與百姓同樂為太平之榮觀而已去歲四方諸州多罹水旱鰥寡孤獨流離道路伏計陛下念此未嘗去心竊恐有司不明大體務循故事無所減損不稱陛下子愛元元之意又連日遊幸在於聖體亦為煩勞伏望陛下比之每歲特減遊觀之處以閔恤下民安養聖神天下幸甚光又上奏曰臣竊聞今月十八日聖駕御宣德門召諸色藝人各進技藝賜與銀絹內有婦人相撲者亦被賞賚臣愚竊以宣德門者國家之象魏所以垂憲度布號令也今上有天子之尊下有萬民后妃侍旁命婦縱觀而使婦人裸戲於前殆非所以隆禮法示四方也陛下聖德溫恭動遵儀典而所司巧佞妄獻竒技以汙瀆聰明竊恐取譏四逺愚臣區區實所重惜若舊例所有伏望陛下因此斥去仍詔有司嚴加禁約今後婦人不得於街市以此聚衆為戲若今次上元始預百戲之列即乞取勘管勾臣寮因何置在籍中或有臣僚援引奏聞因此宣召者並重行譴責庶使巧佞之臣有所戒懼不敢導上為非禮也英宗時殿中侍御史范純仁上奏曰臣伏見今月二十二日秋宴竊以京師昨因大水之後軍民壓溺死者甚衆哀痛之聲至今未已陛下為民父母憂樂與天下同之加以連日以來隂鬱未解民相傳恐復有大雨暴露之衆憂懼方深若聞陛下鐘鼓之音必有疾首蹙頞而相告曰君臣宴樂似非其時伏望聖慈特降指揮權罷今來秋宴只令支散酒食庶幾上承天戒下順人情示聖君修省之誠消兆民災沴之氣神宗熙寧二年直史館權開封府推官蘇軾上奏曰臣嚮蒙召對便殿親奉德音以為凡在館閣皆當為深思治亂指陳得失無有所隱者自是以來臣每見同列未嘗不為道陛下此語非獨以稱頌盛德亦欲朝廷之間如臣等輩皆知陛下不以踈賤間廢其言共獻所聞以輔成太平之功業然竊謂空言率人不如有實而人自勸欲知陛下能受其言之實莫如以臣試之故臣願以身先天下試其小者上以補助聖明之萬一下以為賢者卜其可否雖以此獲罪萬死無悔臣伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見已盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟纍日何者竊為陛下惜此舉動也臣雖至愚亦知陛下遊心經術動法堯舜窮天下之嗜欲不足以易其樂盡天下之玩好不足以解其憂而豈以燈為恱者哉此不過以奉二宫之歡而極天下之養耳然大孝在乎養志百姓不可户曉皆謂陛下以耳目不急之玩而奪其口體必用之資賣燈之民例非豪民舉債出息畜之彌年衣食之計望此旬日陛下為民父母唯可添價貴買豈可減價賤酬此事至小體則甚大凡陛下所以減價者非欲以與小民爭此毫末豈以其無用而厚費也如知其無用何必更索惡其厚費則如勿買且內庭故事每遇放燈不令過內東門雜物務臨時收買數目既少又無拘收督迫之嚴費用不多民亦無憾故臣願追還前命凡悉如舊京城百姓不慣侵擾恩德已厚怨讟易生可不慎歟可不慎歟近日小人妄造非語士人有展年科場之説商賈有京城榷酒之議吏憂減俸兵憂減廩雖此數事朝廷所決無然致此紛紛亦有以見陛下勤恤之德未信於下而有司聚斂之意或形于民方當責己自求以消讒慝之口而臺官又勸陛下以嚴刑悍吏捕而戮之虧損聖德莫大於此而又重以買燈之事使得因緣以為口實臣實惜之方今百冗未除物力凋弊陛下縱出內帑財物不用大司農錢而內帑所儲孰非民力與其平時耗於不急之用曷若留貯以待乏絶之供故臣願陛下將來放燈與凡遊觀苑囿宴好賜豫之類皆飭有司務從儉約頃者詔旨裁減皇族恩例此實陛下至明至斷所以深計逺慮割愛為民然竊揆其間不能無少望於陛下惟當痛自刻損以身先之使知人主且猶若此而況於吾徒哉非惟省費亦且弭怨昔唐太宗遣使往涼州諷李大亮獻其名鷹大亮不可太宗深嘉之詔曰有臣若此朕復何憂明皇遣使江南採鵁鶄汴州刺史倪若水論之為反其使又令益州織半臂背子琵琶捍撥鏤牙合子等蘇許公不奉詔李德裕在浙西詔造銀盝子粧具二十事織綾二千匹德裕上疏極論亦為罷之使陛下內之臺諫有如此數人者則買燈之事必須力言外之有司有如此數人者則買燈之事必不奉詔陛下聰明睿聖追迹堯禹而羣臣不以唐太宗明皇事陛下竊嘗深咎之臣忝備府僚親見其事若又不言臣罪大矣陛下若赦之不誅則臣又有非職之言大於此者忍不為陛下盡之若其不赦亦臣之分也十年監察御史裏行彭汝礪上奏曰臣體問今年上元遊宴例皆依舊臣伏念獨樂樂不若與人之樂與少樂樂不若與衆之樂故古者於荒政則蕃樂於大札大災則弛樂蓋能同天下之至憂則能同天下之至樂也臣伏思乾德之禍廣西殱焉官吏屠戮遺骸未斂頻年京淮江浙東西死於飢疫者至數十萬病者未興流散者未還集而道路村落有蕭然為狐狸豺狼之墟矣威茂之師未勞洮隴之役復新十萬之兵宿於煙瘴其以戰及疾死者甚衆孤寡泫涕惸獨悲啼相號於路而招魂於萬里之外災害變故莫大焉古人於此不敢私燕樂於一食之間而陛下供張不節愚以謂此非樂以天下之意也臣知陛下有堯舜之仁愛恭儉園囿無非時之遊幸倡優無過誤之寵一朝之樂決非陛下所固欲也亦將同民欲而已然吏民死於凶札死於兵役死於瘴癘皆陛下所子者宜與之同其憂而與同其樂臣終疑之臣欲乞上元自祖宗神御殿酌獻外特賜寢罷其餘遊觀而明以此意詔天下臣知窮民戰卒當有聞而感泣知陛下所以哀矜之者無一飲食不在其衷而使天下吏知陛下所以愛惜其民如是也釋宴樂之私而慰中外之民望致勤畏之誠以答因仍之天變其為計甚亦昭昭然明白矣老子曰殺人衆多以悲哀泣之戰勝以喪禮處之蓋不欲以戰屈人故也孟子曰鼓樂於此百姓聞鍾鼓之聲管籥之音舉欣欣然有喜蓋與民同樂故也惟陛下念之臣愚不知忌諱惟陛下裁察哲宗元祐四年右正言劉安世上奏曰臣伏見去冬以來時雪愆亢詢問四方亦多旱暵關陜淮浙民已艱食物價翔踴日益增甚雖朝廷廣行賑貸而歲事失望洊飢可憂臣嘗觀周禮大司徒荒政之目十有二品救民之道最為詳備其九曰蕃樂蓋歲有凶歉人君閔恤元元為之閉藏樂器而不作也禮曰雖有凶旱水溢民無菜色然後天子食日舉以樂先王之制具在方册聖明之主所宜留心伏惟陛下繼天奉元仁民愛物有年之瑞宜不絶書而雨雪失時人且狼狽雖兩宫憂勞軫念無或少忘而逺方之民未見陛下至誠惻怛之意今上元密邇有司舉行常例猶欲張燈臣愚欲望聖慈明諭執政特以歲旱俾罷遊宴使四海之內莫不戴陛下勤恤之德庶幾天人感通風雨時若天下幸甚安世改為左諫議大夫又上奏曰臣伏自前月末聞傳聖旨權罷講筵是時近興龍節意謂將有燕饗是以暫輟邇英之幸用成慶禮今復半月别無政事亦非有前歲大雪苦寒之故而勸講之臣久不得望見清光臣固已疑之矣乃者民間喧傳禁中見求乳母臣竊謂陛下富於春秋尚未納后紛華盛麗之好必不能動蕩淵衷雖聞斯議未嘗輒信近日傳者益衆考之頗有實狀臣忝被言職當諫其漸伏惟皇帝陛下天錫睿聖纂成大業太皇太后陛下慈仁正順保佑備至覆載之內莫不傾耳拭目以望風化而或者之諭乃謂陛下稍踈先王之經典寖近後庭之女寵此聲流播實損聖德昔者堯之受命惟以天下為憂而不敢以位為樂成湯不邇聲色不殖貨利著之方册萬世稱誦皇帝陛下不可以不勉太皇太后陛下不可以不勸也伏望聖慈為宗廟社稷之大計清間之燕頻御經帷仍引近臣與之論議前古治亂之要當今政事之宜悉俾開陳以助聖學無溺於所愛而忘其可戒天下幸甚著作郎兼侍講范祖禹上疏曰臣伏見陛下嗣位以來端拱淵默專意學問臣侍經席於纍年陛下天縱生知聖德純茂接對臣下日日如一未嘗小有差失此實上天眷佑皇家保育生民宗廟社稷無疆之福也恭惟太祖皇帝肇造區夏櫛風沐雨削平僭亂以立子孫萬世之基傳之太宗至于真宗遂致太平仁宗年十三即大位章獻明肅太后安定邦家調護聖性是以四十二年之間德澤深結於民天下至今思慕不忘英宗自藩邸入繼大統四海之內同心愛戴先帝勵精求治宵衣旰食躬勤萬事十有九年不幸早棄天下陛下年始十歲嗣登大位當此之時人心凛凛憂危萬端幸賴太皇太后保佑扶持勤濟艱難斥退凶邪登進忠良詔令所至百姓歡呼鼓舞數年以來中外晏安西北二隅無不從順此皆太皇太后之德也臣不知陛下將何以報之臣竊思陛下所以報之唯在於進德愛身而已陛下進德則為太平髙世之主光顯祖宗之烈發揚文母之訓使天下之人皆欣欣然曰祖宗之德太皇太后之力如此則豈惟皇天祖宗嚮祐陛下太皇太后亦不虛勤勞矣陛下愛身則無疾疢不貽太皇太后之憂子夏問孝孔子曰父母唯其疾之憂夫父母之憂莫切於子孫之有疾疢他日陛下有子當自知之陛下若不進德不愛身雖極四海九州之養亦未足為孝也臣自今秋聞外人言陛下於後宫已有所近幸臣初聞之不以為信數月以來傳者益多或云已有懷娠將誕育者言之所起必有其端臣誠至愚不能不惑故敢先事懇切言之陛下內承慈訓外勤聖學方當祇畏以事天地誠孝以奉宗廟思六聖之勤勞念帝業之艱難四方之人無不延頸舉踵注目傾耳觀聽陛下德業之光名譽之隆以想望太平陛下可不慎哉今陛下未建中宫而先近幸左右好色伐性虧傷太早有損聖德不益聖體此臣之所甚憂也孔子曰君子有三戒少之時血氣未定戒之在色言人少時血氣未定而先傷伐根本則損夀考之福故君子戒之陛下今年十四歲而生於十二月其實猶十三歲也此豈近女色之時乎陛下上承天地宗廟社稷之重守祖宗百三十年基業為億兆之人父母豈可不愛惜聖體哉孟子曰事孰為大事親為大守孰為大守身為大守身所以事親也愛身所以愛天下也陛下上有太皇太后皇太后皇太妃休戚皆繫於陛下之一身豈可不愛惜聖體哉中庸曰君子之道本諸身未有不先愛身而可以進道者也陛下方嚮學問躬儒術欲為堯舜禹湯文武成康之君堯舜禹湯文武成康之君未有不勤而成者也昔先帝年十五六講學東宫一言一動天下傳之是以多才多藝羣臣莫及今陛下聖學天下未有所聞而先以嗜欲聞於天下此臣之所甚憂也陛下有上聖之性必行上聖之事有上聖之位必求上聖之名豈可不愛惜聖體哉方今羣臣之心萬民之情正望朝廷如天聖以來所願陛下法則仁宗而已祖宗天下百三十年如寶器之無缺陛下行純德備如美玉之無瑕臣竊為陛下寶之惜之愛之重之陛下豈可不愛惜聖體哉臣聞仁宗未納皇后以前未嘗近幸後宫是以氣體康實在位最久臣今觀陛下氣怯恐不能如仁宗少時豈可不愛惜聖體哉前世人君多所經歷乃能周知天下之情今陛下生長深宫稼穡艱難未知也人之情偽未見也國家政事未習也六經聖人之言未盡讀也前世興亡之戒未盡閲也天下至大萬事至衆何所不關聖慮豈可不愛惜聖體哉古人有言後宫盛色則賢者隱處佞人用事則諍臣杜口陛下春秋鼎盛方當崇經術邇端士敦尚素朴屏去紛華不宜先留意女色使天下失望以啓小人之心何則陛下如好德則賢人皆動其心欲助陛下之德而圖天下治安故於陛下有益陛下如好色則小人皆動其心欲奉陛下之欲而圖一身富貴故於陛下有損賢人進則治小人進則亂人君所好不唯繫一身損益實繫天下治亂不可不慎也陛下於此二者將何擇焉昔漢成帝自為太子時以好色聞其後逸欲無節終為漢室昏亂之主漢之基業由成帝而壞豈可不慎其細哉唐太宗欲納鄭仁基女魏徴諫而止之憲宗時教坊使稱密詔選良家子納禁中李絳上疏乃悉還之文宗沒李孝本女入宫魏謨諫即出之古之忠臣愛君必拂其邪心防其嗜欲置君於無過之地使天下莫得而非議也人君所愛莫切於身人臣亦莫切於愛君之身臣濫備勸講以輔導聖德為職懷此憂慮已二三年不能言於未然致陛下已有聲聽流聞於外此臣之罪也臣今若猶不言他日陛下或專意聲色委權臣下紀綱壞亂政事荒僻使天下以陛下為逸欲之主則臣之罪豈可勝責雖悔恨萬狀何所及哉伏望陛下察臣之言専精一意強於學問日新德業無時逸豫事親則思孝居處則思敬動作則思禮祭祀則思誠服用則思儉養民則思仁使人則思恕心則思道視則思正當食則思天下之飢當衣則思天下之寒陛下每思及此而強學不已則將以道德為麗以仁義為美豈聲色之可移哉惟陛下抑情制欲以愛養聖體為先則動植之類無不蒙福生靈幸甚祖禹又上宣仁皇后疏曰臣伏見陛下臨御天下于今五年昧爽聽朝親斷萬事所以勞心竭力者凡皆為祖宗社稷億兆人民將以太平天下付之皇帝也臣愚竊謂陛下憂勤天下之事必先憂天下之本愛養四方之民必愛一人之身夫一人之身天下之本也孟子曰天下之本在國國之本在家家之本在身天下安危繫於人君之一身身安則天下安天下治亂出於人君之一心心正則天下正欲安天下必先安身欲正天下必先正心此二者當今之急務久逺之計慮也陛下內保佑聖躬調護起居外成就睿德勉進學問前此未嘗聞有纎毫之失今之所聞則異於前外議籍籍皆謂皇帝已近女色後宫將有就館者有識聞之無不寒心皇帝今年十四其實猶十三歲耳千金之家有十三歲之子猶不肯使近女色而況於萬乘之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日淩雲若戕伐其根豈不害哉臣嘗見司馬光言章獻明肅太后保護仁宗皇帝最為有法自即位以後未納皇后以前仁宗居處不離章獻卧內所以聖體充實在位歷年長久章獻於仁宗此功最大臣考之國史仁宗在乳褓章獻使章惠太后護視章獻臨朝仁宗起居飲食章惠必與之俱所以保佑扶持恩意勤備然則章惠保護仁宗乃章獻太后之意今陛下臨朝日有萬幾至於左右護視皇帝臣不知有如章惠者乎若未能如章惠則陛下豈得不留聖意也陛下以朝事責宰相以邊事責將帥人君闕失羣臣邪正責諫官御史皇帝學問責講讀官若朝事不治宰相之罪也邊鄙不寧將帥之罪也人君闕失不知羣臣邪正不分諫官御史之罪也皇帝學問不進臣等之罪也至於皇帝早夜起居之節嗜欲之際此最切身之事豈可無任其責者乎陛下博覽史册洞知古今古之帝王何嘗不以女色損夀考之福惟傷於太早敗於無節耳思之至此可為切骨之戒臣所以不避誅戮為陛下言之伏望陛下與皇太后太妃詳論此事有損聖德不益聖體宜戒敕保傅令以章惠為法今聖心已有所知雖不能防於未形猶可以止其將然俟中宫既建然後漸廣繼嗣之路則陛下亦可以不勞聖慮矣今若不知止節女色爭進數年之後敗德亂政無所不有陛下雖欲悔之豈可及乎臣竊觀皇帝天質純粹有上聖之資年益長則宜德益進方當嚮學以養聖功天下引領以望輝光之新傾耳以聽名譽之隆聰明之開發睿智之深逺皆繫於十五六之時不可失也陛下必欲皇帝氣體康強德性成就以為宗社無疆莫切於今日矣不宜先以好色聞於天下失衆庶之望臣所以拳拳而不能已也惟陛下深思逺慮察臣狂瞽之言祖禹又奏曰臣伏見今月一日以後羣臣纍拜表請聽樂所請愈數而批答愈緩以此見太皇太后陛下皇帝陛下仁心孝性深逺無窮發於至誠有所未忍今已批答允許臣竊恐有司請置宴開樂不敢不先言之臣愚以為居喪則行喪禮在吉則行吉禮除喪之後如遇吉禮即可聽樂不當特置一宴以開樂為名君子之於喪服以為至痛之極不得已而除之若以開樂故特設宴則似除服而慶賀非君子不得已而除之之意也臣伏請雖至七月其開樂宴亦更不作唯因事則聽樂庶合先王禮意徽宗時左司諫江公望上奏曰臣聞理無隱而不彰事無晦而不顯言君子之樞機故不可不謹居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎惟君為風下民為草草上之風未有不偃者也故有所不言言無不彰有所不為為無不顯君唱之下民未有不應者也陛下居九重之中可謂崇深閟逺臣民耳目之所不接一有出言未嘗不彰一有所為未嘗不顯蓋民離之則愚合之則神合衆論則崇深閟逺者皆得而知之皆得而議之臣側聞陛下邇來政事之暇蓄能鳴善鬭之禽籠竒羽佳喙之鳥以資賞玩之習使誠有之亦未足以害治也然臣讀書至於五子之歌知太康之失邦不過內作色荒外作禽荒而已所謂禽荒不必馳騁畋獵然後為荒也心有欲而不禁則志荒志荒則政怠矣昔唐太宗之時臺使有諷李大亮以名鷹為獻而大亮密表以陛下絶畋獵久矣求鷹必非陛下意而太宗恱其正諫玄宗遣使求鵁鶄鸂鶒於南方而倪若水上言以賤人貴鳥非所以望陛下而玄宗賞其説向使二君縱欲而無度拒諫而不改豈復有貞觀開元之盛治乎若以為資房闥之恱豈不聞華陽后樊姬之所為乎秦王好淫聲而華陽后為不聽鄭衛之樂楚嚴好畋獵而樊姬為不食鳥獸之肉口非惡味也耳非惡聲也抑所好以率二君於無過之地爾中宫淑質徽音母儀天下未聞有過舉事出於陛下為之中宫當以華陽后樊姬之事以相警戒矣若事出於中宫以資戲樂陛下當以關雎求賢葛覃尊傅以相規正故刑于二女所以為大舜刑于寡妻所以美文王歟惟陛下財幸公望又上言曰臣邇日傳聞道路之言有姓賈中貴人臂鷂鶻入後苑捕逐禽鳥臣未之信豈有禁籞之中雖是近習之人敢肆猖獗一至於此徐思之必偵得聖意然後敢爾再思之陛下未應至此然終疑而不釋也陛下所以得天下者以仁而已豈有仁者之君而務遊畋者乎又況陛下即政方踰年未明求衣日昃不食刻意勵志好賢樂善聽言從諫期底于道尚恐負宗廟社稷之靈無以慰天下蒼生之望豈復有暇逐禽獸為樂乎春搜冬狩特重於祭祀之禮毁卵拆巢尤戒於生誕滋育之時豈有仁者之君不因奉先祭祀顧於生誕滋育可戒之時為毁卵拆巢之虐乎千金之子尚有垂堂之戒萬乘之主豈無犯車之虞和鸞而節清道而行猶意於銜橛之變況馳騁驅逐與禽獸爭道於萬死一生之地豈不殆哉豈有仁者之君不自愛重而為虞人之所為乎得一禽則喧呼號歡分賜金帛不恤其費豈有仁者之君輕百姓之膏血以重微禽之軀乎臣以此揆之陛下必不然也雖然以其後事而引悔孰若先事而知戒此臣所以不惜萬死雖得之傳聞之不審亦為陛下道而不敢隱也五子之歌曰內作色荒外作禽荒有一於此未或不亡老𣆀曰馳騁田獵令人心發狂心狂志荒何事不亡莊周曰用志不分乃凝於神志分於外神亦隨之神志不一何事不失王者之治斷可識矣夫鳥托深林獸育豐草魚鱉不亂於網罟草木不夭於斤斧人不苦於苛政斯乃仁者之君所以治天下之道也昔文王有靈德故麀鹿白鳥在其囿而有濯濯翯翯之態魚在其沼而得充牣跳躍之樂陛下不大苑囿之奉數畝之地蠢動飛走恃陛下天地之仁德依陛下日月之末光生誕滋育得性之樂不異於文王之囿今反張喙橫羽延喘假息於馳騁啅噪之間碎首快心飛毛灑血於猛鷙爪翮之下數畝之地依陛下尚不得保全其生況四海九州山林川澤之廣逺何以逃無辜夭折之禍哉蠢動雖微與人同一性也生植雖逺與人同一理也以強并弱以貴吞賤以其不能告訴殺之若無罪豈不思易所謂信及豚魚詩之仁及草木果何理也嘗聞荆文公得如黃之狗􅙪簬之矰畋於雲夢一月不反聽保申之諫受束矢之笞務治乎荆兼國三十非師保之訓則國亡矣唐玄宗嘗獵苑中必視左右曰宰相韓休知否已而疏輒至非宰相之言則社稷計已矣司馬相如賦上林以諷漢武帝揚雄作羽獵以諫成帝言近而旨逺詞婉而意迫孰謂詞臣無補於國也詩有刺虞有針皆以遊畋之無益於治祇取亂亡爾今陛下師保不陳訓宰相不抗疏詞臣不獻賦書無歌詩無刺虞人無針所賴以知過失者諫臣爾臣或不言陛下如宗廟社稷何如天下蒼生何臣言縱不實亦足以為異日之鑒唐髙祖喜走馬射帖孫伏伽進諫以謂此直少年諸王務爾既為天子尚行之乎齊威公以酒腐于尊肉腐于爼得無害霸乎管仲以此固非善然無害霸也夫從禽正少年諸王務也陛下一日為之未足以言王政苐以天子為諸王少年之務何自輕乃爾非萬乘取重於天下之道也傳有之耕道而得道獵德而得德臣願陛下驅騖於仁義之場遊觀於六經之囿網多士弋羣凶天宇掃清王道砥平天下之望也社稷宗廟之福也上干天威自速誅戮陛下矜其以諫為職少貸狂易天下幸甚欽宗靖康元年右司諫陳公輔上奏曰臣竊惟陛下以孟享景靈東西二宫遂幸陽德伍神觀臣誠淺陋不熟本朝故事不知享親之後退而遊幸祖宗有是例邪但近世為之若近世為之自不可為法設或祖宗之例亦有可議焉夫誠心齋戒以薦祖廟仰瞻英靈如在其上退而思之不忘乎心豈容於此日擁嬪御具聲樂肆遊幸之樂耶臣恐此舉不足以示孝也臣又觀陛下自初即位恭謝之時輿服朴素儀衛簡少與夫供帳什物伶倫宦侍皆少如今日而百姓見之莫不歡欣感戴以手加額謂陛下恭儉之德過乎仁祖矣至于今日之出輿服鮮明儀衛衆多與夫供帳什物伶倫宦侍皆盛如前時而百姓見之已有相顧駭歎竊議之者安知其不腹誹心謗謂陛下恭儉之德不及仁祖仰惟陛下聖性淵懿聰明勤儉自養德東宫以至即位未嘗少變臣料今日之事必左右近習之臣以謂陛下有崇髙富貴之勢當務為光榮盛大以夸耀一時之觀聽夫貴為天子富有四海區區於此示天下以不廣也況今寇難未平民力未裕財用未饒臣下之奢僭未革風俗之侈靡未除全在陛下躬儉節用如大禹文王以救今日之弊豈可漸為奢靡異乎初即位時使百姓議之乎臣竊為陛下不取也太上皇帝奉養素厚陛下不可薄於親必須損己所有以供奉之若陛下不自過為儉約而供奉上皇又欲豐厚天下財用何以給之哉臣愚欲望陛下今後孟享既畢即詔車駕還宫其餘遊幸除龍德寧德二宫外皆願暫罷臣又慮上皇既深居外宫非時不出恐陛下亦自不當遊幸仍望鑾輿之出務令簡儉但如初即位時可也此臣得於百姓之言不敢不冒死以聞然陛下無以百姓之言為非彼見陛下自初即位簡儉如此今不兩月儀物稍多自此若天下無事後豈不復肆侈靡之好邪非獨百姓憂之臣固以為深憂也傳曰有始有卒者其惟聖人乎伏惟陛下謹終如始俾盛德大業逺跨唐虞三代實宗廟社稷之福而天下之幸也歷代名臣奏議卷一百九十四
