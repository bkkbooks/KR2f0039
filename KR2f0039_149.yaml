body:
  text: 歷代名臣奏議卷一百四十九明楊士竒等撰用人宋寧宗時衛涇論人才六事上奏曰臣聞人材盛衰繫國隆替國之將興則朝多雋良精神可以折衝及其將卑士氣銷弱緩急不可倚仗此為國逺慮者所當憂也然材之盛衰不同非天之生材有時其所以壅閼摧傷之者固非一端也書稱用人必詢於僉謀孟子論用賢必斷之國人蓋人材至多非一人所能盡知所可信者天下之公議也公議所與從而與之公議所非從而去之豫奪去取一本乎公議則人之賢不肖曉然而易辨矣若捨公議之所在信任左右以為耳目則愛惡毁譽或行其間浸潤膚受有不自覺左右所謂賢未必為公議之所與也公議所謂賢未必不為左右之所忌也其言亦間有合於公議者矣蓋欲取信於人主而為他日不肖者之地也如是則諂諛阿附之徒僥幸獲用而孤立獨行之士無自而進矣此人材所由衰者一也人主之德莫大於虛心無我舜之所以大不過曰舍己從人夫惟虛心無我則可以翕受衆正舍己從人則能取人以為善茍或蔽有我之纍無舍己之誠則愛憎任情不得其正鯁亮者未必非忠也而終惡其忤已諛悅者未必非佞也而終喜其順已任政事者據誼執正則以為好異遵守成模則以為稱職任言議者論奏無隱則齟齬難合少所建明則馴致進用抑不思鯁亮者果為愛君乎諛説者果為愛君乎此人才所由衰者二也序進賢能大臣之職也人主不能自用天下之才故舉而屬之大臣大臣進用乖方裁量失平則易其人可也逹賢進能之柄不可奪也大臣欲避主疑以為自安之計遂不以明揚士類收拔人物為己任用捨進退惟奉成旨不敢平章至使衡柄旁出進取多門大臣失職此人才所由衰者三也人材固未易遍識伏於疏逺者尤不能知􅋵柄者茍平心應物廣詢博採以為賢則用以為不賢則棄借未盡當十得六七矣奈何平居為親故擇官之意常多為國求材之意常少好趨進者以昵已而亟用樂安恬者以疏已而見遺權力多助者不能沮止孤寒寡援者不能薦進守格法則賢愚同滯務甄拔則槩量無準此人材所由衰者四也士大夫之資稟不能皆齊而其趨向亦各異亮直者或易至過抗而安於循默者必指以為沽名剛正者或少所涵蓄而便於容悅者必指以為矯激私相詆訾浸淫不已遂致人主入其言亦疑其為沽名疑其為矯激也而疾之彼固未免於或偏也就其偏而論之世之容默者常多而剛直者常少人主又不能為之保持所以多者常勝而少者常見沮也此人才所由衰者五也士大夫所以重於朝廷者以去就不茍也有官守者不得其職則去然後可以守其職有言責者不得其言則去然後可以行其言夫義所當去聽其去非特足以全士大夫進退之節亦所以重朝廷之職守也若漫然欲去而不力泛然止之而即止去就義乖亷恥道喪是人材之與紀綱上下交壞之也士大夫愈見薄矣此人材所由衰者六也由此觀之人材盛衰曰君曰大臣曰士大夫皆不能無責焉方今明盛之朝固無棄材之嫌而未免有乏人之憂者其來非一日也臣願陛下深惟國家之安危憫惜人材之衰少先斷自宸衷公視兼聽照臨壅蔽捐去愛憎奬納忠讜然後明詔大臣不私於進退士大夫不私於論議使羣材並進無摧傷壅閼之患則朝廷之基本鞏固賢雋輩出建功立業無不如意矣此尤當今之急務也惟陛下財幸涇奏舉王觀之狀曰臣聞報國之道當舉賢才舉賢才之道當考實迹臣承乏江西閫寄首尾已是三年前此並未敢輕於舉賢蓋欲遲之於久參之於衆密加考察庶得其實今蒙恩易鎮行且去此一道官吏之政績敢以實聞竊見承議郎江南西路轉運司主文字王觀之家學淵深天資夷粹往年編入宣幕守荆諭蜀者率賴其助試邑江州德化善政尤多今為江西運管處事極有條理然未嘗矜能以求名持論主於正大而尤知潔已以律下識者皆以為逺器朝請郎撫州通判趙時通公族之英自致名第揚歷州縣俱以材稱二政天府遇事不茍垂滿而罷或者惜之通守撫州就攝郡事邦人既服其明允又稱其廉平驗之行事允有實政承議郎江南西路安撫司主管機宜文字洪徯風度端凝吏能整密生於相閥克守儒風自為漢陽簽幕諸司已交薦其才及至試邑黃陂治辦之外又有學道愛人之政今為本司機幕每事明審無不合宜雍容撥煩廉介可敬陸沈幕屬未盡其長朝奉郎筠州通判孫格七閩之秀早拾儒科明習條章老成端介昨來宰泉之同安殊有能聲今兹通判筠陽凡所關決未始留滯宣教郎知建昌軍新城縣何遲䇿名太學擢第一科初為隆興節推當路交薦其材且繼任成都撫幹諸司亦表其廉能試邑新城盡起宿弊催科不勞而辦田里無不安之通直郎知撫州崇仁縣彭耕名父之子克世其美其才足以強濟其心主於寬平崇仁當纍政玩弛之餘耕到官數月治聲藹然獄訟既清財賦亦裕推其餘力猶能廣學校築堤岸以惠邑人通直郎知臨江軍新淦縣趙公括學古入官修飭亷謹早年甘守逺次務師先逹以為文及壯試吏所至去思新淦縣邑素多豪滑公括亷介守法不畏強禦苖耨而髮櫛之吏不能欺邑以大治奉議郎知隆興府新建縣桂如箎儒行吏能俱有足取安於平進亷不近名服勤邑事行且受代臣察其聽斷之間並無過舉通直郎知筠州髙安縣潘熏生長名家習熟文獻持心近厚律已以廉其在高安安靜不擾而邑事整整有理閭里安之文林郎贑州瑞金縣丞陳景仁奮身上庠遂䇿名第再轉而為丞劇邑每事健決不避權豪洊攝邑寄無不辦治州郡材之從政郎隆興府武寧縣丞連元撡守端溫學術該洽贊毗邑政潔已奉公靖共自將不事奔競迪功郎臨江軍軍學教授徐玠經學修明文詞贍麗能謹庠序之教務崇義理之文教導有方士類多之已上十二人臣始得之於衆言未敢深信及驗之行事委有實績仍其間多是前後纍經監司守臣論薦非特臣一己之私言欲望朝廷特賜審察擢用他時必能效尺寸於事功誠非小補涇又奏舉滕璘等狀曰臣誤蒙聖恩分閫江右一道十二州之官吏雖不能遍觀盡識然其間學以從政居官可紀者采諸公論密加考察今得七人知而不舉臣則有罪竊見朝奉郎隆興府通判滕璘天資靖重學術淹該早為省殿試前名不肯輒干捷徑盤旋州縣逾三十年晚簉班行未究所藴今通守本府蒞職公勤叶贊為多從事郎江南西路轉運司幹辦公事趙師秀操尚清修詞章典麗一第二十七年未脫選曹師秀怡然不以介意自參漕幕處事正平持身潔廉贊畫平允承議郎知隆興府奉新縣潘景伯器度髙雅政術疏通三仕於隆興邦人稱之無間言試邑奉新留心撫字剖決滯訟平易近民奉新之人無不賢之宣教郎知隆興府武寧縣趙善璙資性宏達材諝端良既由門蔭以登門第又中法科以試廷評出宰武寧曾未數月催科不擾而辦獄訟不察而明武寧之人無不德之迪功郎贑州州學教授蔣日宣稟資重厚行已端良自收科名益進學問分教章貢士譽日隆其誨人以行義為先不專以文詞為上迪功郎建昌軍軍學教授黃宜履行粹夷文學醇茂奮從舍選復取甲科初仕旴江嵗月未久然其教人必以規矩士類服之迪功郎袁州分宜縣尉鄭魏挺學問老成典刑詳練登名前列自當注擬教授魏挺乃能不卑小官屈就尉職出入阡陌戢盜安民廉勤強濟邑人稱之以上七人不惟文學可采亦有政績足觀料名皆在人前職位猶在人後欲望朝廷他時特賜旌擢以為一道官吏之勸涇又奏舉徐範等狀曰檢準淳熙十六年七月十六日敕節文臣寮奏乞令監司帥守各舉其所知不必列銜同薦只乞令監司各公共按舉又準嘉泰二年三月二十四日指揮節文乞如後來增創所薦科目所知亷吏等名目悉行罷去又準嘉定六年八月一日敕中書門下省臣寮奏節文邇者從臣奏請欲復所知之舉嚴臧否之法乞頒示監司帥臣繼自今凡所舉部內人才與夫所知臧否科目之薦務在公心採訪取其才行卓絶績用彰著者指實聞上八月一日三省同奉聖旨依臣伏覩從政郎南安軍大庾縣令徐範名父之子家有史材試邑大庾究心撫字居多可紀之績宣教郎知筠州新昌縣事沈鏜名臣之孫修謹好學洊更民社留心聽斷殊有亷平之稱修職郎南安軍南安縣令楊洽學問淵深文詞藻贍為令南安平易近民迪功郎筠州軍事推官俞機生長名家優有才具贊幕筠陽事不辭難迪功郎筠州司法參軍詹栗學問醇正父子世科政術通明守以廉介人稱其賢宣教郎知撫州樂安縣董仁澤早擢儒科兼通世務樂安最為荒陋仁澤興仆植僵民懷其政宣教郎知江州德化縣事林杲克守家法極有吏能究心撫摩令修於庭户之間民皆便之宣教郎知隆興府分寧縣事陳元衡奮身名第有志事功律己奉公撫民戢吏百里安之迪功郎監江南西路轉運司造船場溫良輔識度和平幹才整密處事謹審而有辦集之能如範等者實臣所知欲望聖慈更加考察特賜旌擢臣今所舉徐範等九人充所知涇又奏舉蕭舜咨狀曰臣近者不度疏外輒以一道屬吏之實績冒昧上聞繼而博加採訪密致參考猶有未盡與其避再瀆之嫌而有遺材之愧不若冒三獻之恥而效勿欺之忠竊見宣教郎知撫州金溪縣事蕭舜咨成均髙選尋䇿名第材猷膚碩操守端方禔身無瑕臨政不茍金溪凋弊陋邑實賴其撫摩寬平之實人甚安之從事郎撫州軍事判官彭去非奮由門蔭遂取世科學識醇明器資鯁亮行已有恥守法不阿臨川前後守臣多資其贊畫廉潔之實人尤稱之迪功郎江州湖口縣尉陳韡夙有師承蚤收科級務為實學不事空言志尚既髙識趣亦逺儻及其華而用之必能以事業表見今仕湖口適丁歲飢救荒有術邑人德之已上三人去替各已不逺輿論既無間言諸司亦嘗交薦驗之行事誠可旌擢欲望朝廷特賜甄録以風厲一道之官吏使居官廉平行已忠實者有所激勸誠非小補涇又奏舉章瑑甄世光乞賜軫録狀曰臣竊惟用人之道猶之用器擇人之術比之擇材器不可不及鋒而用材不可不及時而擇及鋒則多利器及時則多良材臣前後薦士已成屢瀆今於所部又得二人其材與器皆堪煩使涵養更久必大可觀然知其可使辦事又當及其英鋭早加收拾竊見承務郎監潭州廣積倉兼衙倉章瑑材力強濟識度精明博通舊聞練逹世務本州倉官前此並緣久例不免侵漁瑑能持身潔廉遂絶此弊郡有亡金之獄纍月不得主名臣委之考鞫數日卒得其實使之剖析滯當無留難迪功郎潭州醴陵縣尉甄世光奮自儒科曉暢民事出入阡陌未始辭勞而又不事詭隨能自植立醴陵之治理效世光之助為多已上二人欲望朝廷特賜軫録他日或有繁難任使必能辦治惟幸朝廷及鋒及時而採取之涇又列薦徐筠朱著留筠乞賜甄擢狀曰臣等誤蒙聖恩付以一道耳目之寄凡所部官吏之庸濁苛刻者不敢避怨具以實聞悉蒙朝廷施行不勝遠民之幸至於良二千石治行表表衆所共睹者若知刺而不知舉何以勸功竊見朝請郎權知全州軍州事徐筠學古好修謹身率下不事表暴力行撫摩刑役清平田里安帖餘事著書有補後學又能崇教化以厚風俗築城壁以固藩籬其他善政不一而足朝請大夫權發遣道州軍州事朱著持身潔廉蓄學醇正居家孝友賦政中和到郡之期雖未為久而豈弟之實信服於民財賦獄訟色色整辦加之志趣端靖不為茍合人品既髙政術亦茂朝散大夫權發遣邵州軍州事留筠存心簡靖臨事寬明雖出相門實通吏道到官以來能於整辦之中不失拊循之實已上三人臣等參之頗審若蒙朝廷特賜甄擢決不上孤使令涇又列薦薛洽等狀曰臣等竊惟承流宣化其責在守令揚清激濁其責在長吏監司臣等誤膺委寄既以一路郡守之有治行者冒昧奏聞若及守而不及令何以為字民者之勸竊見奉議郎知潭州長沙縣薛洽持身清潔涖事醇明謹儉自將不事形迹每月催科僅足則止能藏富於田里不窮民以自豐考之近時可為廉吏通直郎知潭州安化縣趙崇模胄出相門學有家法明練而不好察公亷而務近民安化民獠錯居崇模以豈弟行之無不馴服用之他日當為逺器宣教郎知潭州醴陵縣羅嬴為學醇正臨事寬明能於催科之中不廢撫字之政終日孜孜主於愛人考之行事允有賢業通直郎知潭州湘鄉縣趙伯駿恬靜有守廉介無華剖決得宜不事苛察相鄉邑大事叢伯駿從容治之若有餘地參之輿論委有能稱宣教郎知道州營道縣蔡師仲性資融明器度開爽逹於政術每事練詳而又持身廉勤御下有方若試之事任實為通材從事郎知衡州耒陽縣趙彥飭奮由屬籍自致儒科練逹吏能不廢學業往時帥臣朱熹亦嘗舉之今為耒陽居多惠政已上六人臣等互加參稽頗為詳審欲望朝廷特賜旌擢以為作邑之勸他日設不如所舉則繆罔之罪臣等所不敢逃涇又奏舉李鼎等狀曰臣竊惟國家分道置帥許以察吏臣子以身報國未若薦賢臣承恩守藩因循閲嵗得於考察宜有薦揚竊見宣教郎知潭州益陽縣李鼎資性和平學業醇茂初任宜春簿領繼為臨賀教官皆以修潔受知當路循次改秩試邑益陽適承雕弊之餘力行撫摩之政能修學校以勸士寬期會以安民獄訟不察而明催科不擾而辦平易近民於鼎幾之從政郎邵州州學教授陳覿賦資靖共持身端介平昔安分未始干進舊從朱熹講學尤以名義氣節為重分教邵陽極力作成不専事於文辭能誨人以廉恥恬退有守於覿似之從事郎郴州桂東縣令黃龜鼎材諝疏通器能肅給三仕于桂陽民懷其惠今為桂東縣令乃昔洞寇所巢龜鼎雖務懷柔亦不姑息革暴而良漸有端倪還定安集龜鼎有力焉從政郎道州江華縣令莫價志氣好修文采亦富見於議論每事正平江華之在舂陵號為難治價力行撫字之政不忍鄙夷其民學道愛人價有志焉已上四人在臣部內具有實迹可采欲望聖慈特賜褒擢以厲其餘庶見九重不忘逺之意涇又奏舉朱端常等狀曰臣蒙恩任使一路雖職不專於刺舉至官吏能否亦嘗考察以備器使今所部守二有能名者采之公言才得四五知而不舉是謂蔽賢伏見朝請郎知南劒州朱端常才具優長儒雅飾吏曩宰長洲縣事整辦諸司列薦其能朝廷嘗加擢用今守延平尤有治效撙節郡用置惠民倉庫糴米儲積以助常平閲習禁軍月有按試等第支賞以厲士卒考其施設實有可觀朝奉郎通判泉州何松性資明逹政術亦優一試劇邑以辦治稱兩為郡丞以循良著溫陵浩穰民夷錯雜屯戍軍兵供億以時彌縫關決賴以協濟承議郎通判邵武軍趙善稌宗室近屬能自奮勵強明敢決所至有聲通守齊安牙稅增羡十餘萬緡盡數起解無所欺隱殆為諸郡之最今倅昭武合發上供亦不擾而辦宣教郎通判建寧府張國均性質篤誠遇事不茍奉議郎通判汀州樓鐩才華茂美所至有聲富沙大府民物繁夥臨汀偏州俗習獷悍皆能協贊其守政化大行此五人者考察已久並著能名委有政績欲望朝廷特加表用以為官吏之勸涇又奏舉陳嗣宗等狀曰臣聞進賢受上賞蔽賢蒙顯戮在上之令則有勸懲為臣之義第知體國臣誤蒙聖恩付以一路玩嵗愒日無補毫分惟有薦賢是為報效近則親所目擊逺或采之公言既得其人不敢隱默伏見儒林郎福建路提刑司檢法官陳嗣宗天資靜重學問深醇斷獄議刑持平守正處置明允人無異詞文林郎前汀州州學教授孔夢符文學著稱議論英發曾為從臣列薦中書籍記選用從事郎西外宗學教授林士遜風猷醖藉經學淵源訓導有方麟趾化洽宣教郎前知福州寧德縣王克恭學問正醇器識宏逺究心撫字遺愛在民繼之者宣教郎郭伯良器質純厚才識茂明平易近民催科不擾奉議郎前知泉州同安縣章太蒙學術醇正操履端方政尚中和民惜其去久淹州縣未盡其才承務郎知福州長溪縣江潤祖聽訟有方催科不擾濬河以便民耕修學以養士類具有實政非敢溢美承務郎知福州懷安縣趙師玘以宗室子能自飭修撥煩剸劇綽有餘刃宣教郎知建寧府建陽縣黃千里舍法優等擢第乙科文學議論可備館閣承奉郎知建寧府崇安縣趙必願克紹家學奮取儒科抱負不凡實為逺器從政郎建寧府左司理參軍吳端忠稟資仁恕遇事詳明盡心平反獄無寃濫承務郎知福州長溪縣丞黃以大操尚剛潔政事通明剖決民訟無不平允修職郎泉州安溪縣主簿王仲龍名臣之後學有本源簿領卑官未究其用迪功郎福州侯官縣主簿黃佾詞學優贍論議有餘迪功郎福州閩縣主簿鄧樞履行端潔通曉事情皆限於特科無以自見此十有五人或懷才抱藝或立事建功片善寸長悉有可録量能授任不厭其多伏乞朝廷特加旌擢涇又奏舉陳孔碩狀曰臣叨竊寵榮遂延災疾蒙恩從欲俾奉叢祠縱使危喘獲全不復可為世用拳拳報國之忠猶於薦賢或可自見臣伏見朝散大夫福建路安撫司參議官陳孔碩學得師承行推介潔有志斯世不事空言以其才術無施不可臣頃玷從班被旨薦士初未識面得之士友即嘗薦聞已而朝廷博採公言旋加甄擢將漕廣西職事修舉措置溪洞漸有倫緒再蒙召用以病力辭遂得鄉部講幕官間無事誠足優賢朝廷方修內治且防外禦如孔碩之才處以間曹誠為可惜臣與之同僚首尾一年益熟其人不能自默欲望聖慈特賜改除若內若外隨所委任必有以上副隆指見於事業臣疊犯天威下情無任涇又奏蔡汝揆等狀曰臣誤蒙聖恩再畀江右閫寄已五閲月日夕搜訪官吏之有實政者已得六人焉知而不舉近於蔽賢竊見朝散郎通判筠州軍州事蔡汝揆受材膚碩遇事精明昔宰貴池諸司嘗合薦其政今為髙安通守公心關決郡無留事吏民一詞稱之朝奉大夫前通判隆興軍府事史復祖優有吏材動守法律三為郡佐所至有聲隆興滿歸人惜其去考其行事具有條理宣教郎知隆興府豐城縣事汪綬奮自名門留心官業材雖強毅政甚平和本府日放詞狀豐城邑大而訟獨少田里相安俱無間言承奉郎知建昌軍南城縣事黃以大家世良吏復親名儒律己廉平示民安靜昔丞長溪臣嘗舉其政績今南城邑政過長溪逺甚行且書滿民憂其去宣教郎知撫州樂安縣事孫起豫儒學吏能皆有足稱一第三十六年人歎其滯樂安獷俗而起豫反著學道愛人之美承事郎知袁州宜春縣事黃應酉有政有文精力英發初登名第鄉黨稱之宜春劇邑而應酉兼有催科撫字之譽是六人者臣不惟觀諸文移之申明而又考諸案牘之剖決不惟采諸士大夫之公論而又訪諸詞訟之細民委得其實故敢冒言欲望朝廷特賜旌擢涇又奏舉留丙楊恕等狀曰臣誤蒙聖恩再分江右之閫玩愒罔功日夕懼惕惟念事君以人薦賢報國尚可少效萬分故於一道之官吏孳孶搜訪其為政有實績者敢不悉為陛下言之臣竊見朝請大夫知撫州軍州事留丙稟資重厚賦政和平雖生相門諳練民事撫之郡計堇堇丙到官五月不趣迫而事以辦鎮靜不撓田里安之年事以迫若速加擢用猶足以得其數年之力朝散郎擢知臨江軍事楊恕器識沈靜學術醇明備更繁難曉暢吏事到郡逾年臨政不事察察力行撫摩崇尚教化財計昔迫而今寬訟諜先繁而後簡軍民相安人稱其賢朝奉郎添差通判隆興軍府事葉澄文行粹夷資性誠慤不以館閣清流而不屑吏事不以耆儒宿齒而簡略訟牘每事詳審精力強明有德有才人愛而敬之朝奉郎通判隆興軍府事俞遷克守家學卓有能聲昔宰溧水其政已為諸邑之最今倅是邦一力禆贊郡事多賴之搜剔蠧弊而吏不敢肆灼知情偽而民不敢欺施於內外繁劇之任必有可紀通直郎通判南安軍張清臣生自名門習於吏事揚歷州縣安於平進南安斗壘自溪洞挺變以來民産失耕冒佃而經總制欠額數多幾於束手清臣於關決平允之餘能條理財賦以無乏供人所甚難者承議郎通判隆興軍府事許祓胄出世家持身清謹存心職業不事表暴到官方及數月其見於關決者已多可觀吏民信之略無間言從事郎充江南西路安撫司幹辦公事徐清叟學業醇茂奮身甲科分教當塗鄰境士類從之如歸今兹婉畫悉皆可行之實守正不阿足為逺器從事郎充江南西路轉運司幹辦公事方大琮志氣好修文采亦贍早為南宫亞選士論稱之主畫漕幕剖決詳明考其行事允有賢業已上八人者在本路守二幹官之內考察頗審誠未多得其間率皆纍經監司論薦欲望聖慈特賜甄擢涇又奏舉范應鈴狀曰臣竊謂國之根本在乎民民之休戚在乎令臣邇者不揆疏外以一道官吏之政有實績者冒昧敷奏而縣政之卓然可稱者猶未殫舉也宣教郎知撫州崇仁縣事范應鈴持身清介遇事精明初任尉於吉之永新屢與郡太守爭辨是非而守常屈崇仁當積弊難治之後應鈴嚴於吏而寬於民苦節非泛之費蠲罷亡藝之取私謁不行豪猾屛迹不畏強禦實可大用奉議郎知隆興府南昌縣事趙師陶稟資粹溫持心平正六年嶺外休譽藹然得邑南昌仍在舊所遊學人情至稔之地師陶善待故舊屛絶請託凡民間爭訟親自體訪必欲盡得其情而獲罪者皆服而不怨平易近民允有賢業承議郎知袁州萍鄉縣事趙彥章文學優長論議公正一第三十五年安恬自若前任本路提刑司幹官以所得京削遜與别司母老之人今為萍鄉無非學道愛人之政搢紳樂道之宣義郎知筠州髙安縣事余圭襟度溫雅政術詳明生於相家宛若寒素初入浙西倉幕已有令譽今於髙安雕瘵之邑不事敲朴月解自辦撫摩小民而獄訟平息上下皆安之奉議郎知隆興府新建縣事邵應祥為學醇正處事寬明分教於衢於徽皆穆士論改秩作邑飾以儒雅能於催科之中不廢撫字之政參之公議委有能稱宣教郎知撫州臨川縣事趙崇尹賦姿開爽遇事直前犯險潢池以脫迒阱臨川頗號繁劇崇尹到官未久聲譽甚休能於整辦之中不失和平之政考之行事可謂通材承事郎知建昌軍廣昌縣事滕仲宦生長名族服習典刑平進宦塗多所揚歷廣昌僻在山谷風俗頑獷仲宧一以無事理之獄訟簡寡政譽翕然從事郎知吉州永新縣事潘復擢自儒科精曉吏事前者分教蘄春大得士譽今永新鄰接溪洞加以豪户盤結復調娛得宜強者伏而弱者愛之刑役清簡剛紀肅然此八人者皆作邑有善狀字民有實政為一道所稱欲望朝廷特賜甄録涇又奏舉吳軫等狀曰檢準淳熙十六年七月十六日敕節文臣寮奏乞令監司帥守各舉其所知不必列銜同薦乞令監司各公其按舉又準嘉定六年八月一日敕中書門下省臣寮奏節文邇者從臣奏請欲復所知之舉嚴臧否之法乞頒示監司帥臣繼自今凡舉部內人才與夫所知臧否科目之薦務在公心採訪取其才行卓絶績用彰著者指實聞上八月一日奉聖旨依臣竊見迪功郎撫州州學教授吳軫文學俱優恬退有守始到官舍訪問郡之宿儒率學之諸生親登其門請為學正提點刑獄孫德輿聞之謂此風不行久矣不待有求即騰升陟之薦考其教育動有成法從政郎隆興府府學教授梁致恭學術醇正質直無華奮自膠庠以取科第留意教養每考察士子於文詞之外孤寒無媒諸臺自舉之於其垂滿人惜其去從事郎筠州軍事推官李伯賢生長名家自有植立持身勤恪遇事詳明筠之郡政多其區畫井有條理士論材之修職郎隆興府武寧縣丞趙公珊奮身屬籍卓有吏能律己公平持心寬厚武寧巖邑公珊一以和平佐其長財賦辦治人情安之迪功郎江州德安縣主簿周艮學有源流行無瑕玷德安邑計雕弊不可為邑宰為之引去艮被檄越丞職以攝邑事整治半年不鞭朴而財計蘇民稱其賢從事郎建昌軍南豐縣主簿趙希楚服習家訓通曉吏道臨事不茍諸臺多所委任本司凡有差檄究心了辦不表暴而聲譽著人誦其能迪功郎隆興府奉新縣主簿黃之望材具優長器能肅給蚤嵗志學有聲場屋奮身名第留意職業委以事任皆得其當迪功郎建昌軍南城縣尉黃師稷天資端謹材諝通明於職事所當為者莫不修舉而猶能禆贊其長以分任邑事求之下寮未易多得修職郎興國軍永興縣尉趙崇畏材識優長政事勤恪奮身科第抗志髙騫出入阡陌戢盜字民境內肅清邑人德之如軫等九人實臣所知欲望聖慈特賜褒擢涇又奏舉趙汝誡等狀曰臣近舉撫州教授吳軫等充所知而一路官吏猶有四人焉與其取蔽賢之罪寧受再瀆之譴敢盡為公朝言之臣竊見奉議郎通判建昌軍兼管內勸農使趙汝誡器資峻拔政術詳明為丞為宰當路交薦今倅盱江關決平允財計辦治人稱其能通直郎知隆興府奉新縣主𬋩勸農公事趙希普賦性開爽遇事雋明揚歷寖多政譽且媺催科撫字皆究其心一邑相安人器其業承奉郎知隆興府武寧縣主管勸農公事兼兵馬監押趙師巖智不執方材無滯用雖生屬籍實事儒素租賦趣辦縣務簡寡田里歡然民安其政迪功郎贑州司法參軍鄭斯立經學通明操行端潔手不釋卷月評所推自是館閣之器淹汨州縣士論惜之以上四人者今舉充臣所知後不如所言甘坐謬舉之罰涇又應詔舉真德秀等充廉吏狀曰臣伏準尚書省劄子并吏部牒中書門下省八月十八日三省同奉御筆可令侍從兩省臺諫卿監郎官及在外前執政侍從諸路帥臣監司各舉廉吏可以為表勸者三人疏名聞奏以備選擢者右臣衰病退老不與世事相接然有朋舊來訪生死因及一二竊聞近來貪吏稍多裒民剋軍一切聚斂民之膏血竭矣民惟邦本本固邦寧民心一搖關係甚大聖天子初政軫念及此特降御筆令舉廉吏以表勸之愛護邦本此意切矣臣知陛下非應故事為觀美而已臣竊謂今日一州一路惟大吏貪黷為甚小吏固有貪者然民之被害尚狹若大吏貪黷民之被害有不可勝言者小吏之廉亦豈無人但泛泛枚舉恐未足為表勸非明詔之意若大吏之貪者非臣所當言敢以大吏之廉足以表勸風俗者三人為陛下言之臣竊見前知泉州真德秀章棶二人者天資潔廉操守純固泉南多舶貨賢士大夫間有不免而二人者前後為泉皆於舶貨毫髮無取去泉之日舶商擁道攀送以大香炷餞其行二人者皆卻不受商人無以效其勤持香至郡治曰此吾欲獻使君而使君皆不受吾安可復留以大爐注香於郡之門香聞闔府相與涕泣而祝之何施而得此於人也傳曰臨財毋茍得司馬遷薦李陵云臣見其臨財廉士大夫平居暇日未嘗不曰能廉至臨財未免有可議而二人者臨財如此可謂忠信行乎蠻貊矣又見前知汀州趙崇模廉介有守不自表暴臨汀大禮年分進奉本色銀二千兩及支犒諸軍八千餘貫兩項共為一萬五千緡例取之縣縣敷之民崇模到任即自於州家抱認嚴戢諸縣敷鹽民咸德之又諸寨土軍久不補刺崇模任內刺百餘人二年所支錢糧自當萬五千緡皆州郡撙節支遣於民間賦稅日前所欠並與倚閣邦人翕然以為前此守臣蓋未嘗有大槩汝愚諸子皆能守家法而崇模賢譽益髙此三人者皆大吏之廉足以為表勤者今德秀已蒙公朝擢至禁從章棶見蒙收召崇模今為輔郡公朝已皆奬用似不待臣言者然臣區區竊謂使大吏之廉者皆如此三人則斯民蒙福邦本益固實萬世無疆之休故特述此三吏之廉節風厲天下庶大吏之貪者茍有羞惡之念必知愧悔若小吏之貪者聞大吏之廉必皆化而為廉所謂中人以上可以語上也其關係風俗之樞機實非細事是敢冒昧奏聞涇又應詔舉李燔等狀曰今月二十三日準尚書吏部符承嘉定六年正月十八日敕中書門下省臣寮劄子奏節文乞明詔內外之臣各舉所知在內侍從臺諫兩省官在外帥守監司立以期限不拘資格不拘統屬各許於文臣常調之中舉實才之士二三人其有言行可稱事功可述並條列聞奏以其所薦藉之中書精加審核次第選掄儻或欺誣必與連坐正月十八日三省同奉聖旨依自指揮到日限十日聞奏臣伏見文林郎添差江南西路轉運司幹辦公事李燔經術精博趣操剛方早從師友多士推服分教襄陽為帥臣鄭挺挾私奏劾自是杜門刻志學問不屑意祿仕堂審掌故列屬寺廷皆辭不就尚淹選調未厭師虞宜加崇奬以勵廉退奉議郎前荆湖南路安撫司主管機宜文字陳元勳文彩髙華吏能強濟素安平進有志事功方洞冦搶攘宣勞幕府剸裁區處曲盡事宜帥臣曹彥約嘗以功狀聞於朝廷今已書滿以其才力使任劇煩優有餘裕承直郎差充江淮荆浙福建廣南路坑冶鑄錢司幹辦公事鄭準性資邁爽學術淹該䇿名儒科通練世故陸沈州縣未究所藴若蒙選擇必有以自見於時臣誤蒙聖恩俾分閫寄自揆疏拙無以補報祇承明詔許之薦舉敢以所知三人者冒昧以聞如燔之學行實堪臺閣之選若元勳若準俱可備中外職任將來不如所舉臣甘坐謬舉之罰涇又奏舉趙崇度等狀曰臣等誤蒙聖恩分職臺閫深圖報國莫急薦賢今於部內得一二人敢用條陳以備器使臣等伏見宣教郎知桂陽軍趙崇度家法嚴整吏事詳明推其惻怛忠誠之心施於拊摩愛利之政桂陽為郡地險而僻民健以嚚崇度臨之以至廉行之以不擾人自感服舉無異詞即其操履允是逺器文林郎知郴州宜章縣趙彥圠沉浸詩書被服儒素其父公説在孝宗朝為賢監司遺愛去思今滿蜀道彥圠克濟前美不墜家聲今宰山邑政有條理申嚴舊制結集土丁邑境有備故洞冦之擾止在旁邑而獨不犯其境百姓以此感之從事郎邵州新化縣令徐簡出自儒家邃於講學文墨議論能世其傳故施於邑政藹有循良豈弟之風險俗頑民安其政教善怙惡懼百里知懷是三人者分處郡邑皆能為陛下牧養小民培植國本泛崇度乃故相忠定公汝愚之子陛下念其父之忠勳諸子多蒙録用豈待臣等以為軒輊特以職守所在不敢蔽賢如彥圠如簡則沈淪下僚無蚍蜉子之援若不論薦何由自達伏望聖慈特賜擢用則三人者必能有所植立仰益明時後或不如所舉甘坐謬舉之罰涇又奏舉封彥明充將帥狀曰準行在尚書吏部符承嘉定五年十月二十八日都省劄子臣寮奏節文諸路帥憲許每嵗奏舉可備將材及堪充鈐將以上任使者各兩人於奏內聲説或不如所舉甘同罪罰隨以姓名籍之宥府候將帥有闕參以衆薦次第除用如經録用有悮使令撿照元舉官重加責罰以革徇私覓舉之弊十月九日奉聖旨依臣竊惟養之當有素而不可取具於臨時者將才也自頃用兵江淮諸將遇敵輒敗蓋望風奔潰者多有之豈非蓄養無素而取具臨時之過歟臣伏見降授成忠郎封彥明奮身行伍有志事功項在兵間粗著勞效方和議未成時制置大使丘崈嘗薦於廟堂臣於是時實備位政府崈謂其人材武勇若奬勵作成之他日必為朝廷之用頃因洞寇猖獗自殿司統制移飛虎軍本以才選偶不諳地利失於輕動遂致敗衄因此罪斥然其御下整肅能與士卒同甘苦軍中至今思之謫居秭歸未蒙湔祓憂患頓挫當益增其所未能廢棄之久實為可惜臣一向退間少與兵將官交接敢以所知上塞明詔伏望聖慈棄過匿瑕特賜甄録以備邊場之儲亦激勵將才之一術也臣今舉封彥明係嘉定六年第一員之數後不如所舉臣甘坐謬舉之罰涇又奏舉布衣胡大壯乞賜褒録狀曰檢準嘉定五年十一月十三日近降指揮臣寮上言節文方今收用人材非止一塗然山林畎畝之間懷德抱道不求聞逹者豈無其人願俾監司守臣博加採訪具以名聞無為文具朝廷審察其實以禮招致從而尊顯之庶幾上有得賢之實下無遺材之嘆三省同奉聖旨依臣聞君以求賢致化臣以選賢報國古之道也恭惟陛下聖化日新上法乎祖宗崇儒重道博選賢俊之意比者明詔有司加惠遺逸責之搜訪俾以名聞且欲考察其實以禮招致而尊顯之雖堯舜之用心大禹之勤求不是過也臣濫分符閫逺在湖湘欽承德音夙夜惟謹廣求精選幸得其一詎敢忘報國之誼干蔽賢之典而不以上逹哉臣伏見潭州布衣胡大壯故寶文閣直學士諡文定安國之孫右承務郎宏之子也抗志髙逺制行介潔自其少時已著孝友之稱既長受其祖安國之學於父宏研究經術博通墳典其持論以明義利為本其立已以尚誠實為要冠歲學成即不事科舉隱居衡嶽之下躬耕自給讀書自娛爵祿外慕一毫不以嬰其心深藏固匿足迹未嘗至城市州縣官必禮於其廬然後得見於是行成於身理於家信於鄉黨達於逺邇邦人敬愛咸慕其道德尊之曰西園先生平日著述雖多而封建論數篇尤為先達推重近時如前帥臣曹彥約提舉樂章咸嘉其行相繼剡上本州以嶽麓書院堂長虛席嘗遣官吏以禮延致至今力辭未就臣觀其學識節行足以師表後進蓋亦古之所謂逸民也臣竊聞孝宗朝嘗有詔舉遺逸於是福建諸司芮煜等以魏掞之之名來上則掞之自布衣召對賜第命為學官又嘗與監察御史謝鍔論郭雍之學皆本於易則雍自沖晦處士加封頥正先生此皆近事彰彰在人耳目者矧自陛下更化以來動遵孝宗成憲至於奬進恬退尤所急先今大壯年踰六十雖曰無求於世而體力康強亦非無用於世者若使朝廷試加表異俾如魏掞之郭雍輩得以齒下士被光寵於朝不至與草木俱腐則興起人心轉移風俗視孝宗時亦何難焉是以臣愚輒體古人報國之誼不敢泛然論薦而以大壯應詔欲望聖慈特降睿旨下之三省斟酌典故將大壯量才褒録或畀之一命而授以在外學官之職或錫之綸誥而假以處士之名庶幾山林巖穴之棄材悉為時用可以仰副陛下求賢致化之意矣臣不勝惓惓涇又奏舉黃學行等狀曰臣聞事君以人者臣道之大端薦人於天子者諸侯之職分臣通班祕殿分閫遐藩圖報國恩所當薦士知賢不舉臣竊恥之臣竊見從事郎前全州州學教授黃學行識度髙華學業醇茂蚤優舍選復占儒科分教清湘留意樂育鄰境士類從之如歸餘日著書進而未巳守臣曾松徐筠嘗薦其政績文學近者提刑樂章提舉林行知亦薦其文行俱髙臣參酌公言允有實迹從政郎永州零陵縣令劉用行器資沈靜趣向端方決科效官尤精吏事初任真州楊子縣尉克舉其職備著公勤制帥黃度守臣潘友聞皆嘗露章薦其材美今為零陵令勞心撫字已著善聲稽之輿論允謂通材迪功郎潭州寧鄉縣主簿李劉學問深粹器識醇明更化之初於貢闈對䇿論事剴切知舉樓鑰等得其文以為洋洋朝董公孫之對可為清朝得人之賀既而從臣曾㬇何異黃疇若又以其學問淵源文詞秀發可配古作薦之於朝今為寧鄉簿領臣每試之以事見其剖決詳明議論平正表裏無瑕足為逺器已上三人資歷雖淺文學俱優在臣部內考察頗審況前後各有論薦欲望聖慈特賜甄擢以為館學臺閣之儲設他日不如所舉臣敢辭謬舉之罰涇又奏舉張聲道張履信廖視乞賜甄擢狀曰臣蒙恩分閫尸位逾年職在藩宣責兼刺舉欲率其屬當簡乃僚竊見朝請郎改權發遣永州軍州事張聲道早擢儒科嘗丞册府文采學問士論所推自去班行洊更麾節今為永州留心郡政剖決民訟發擲吏姦撙節非泛之資罷去非義之取如零陵舊有竹稅久已無竹而稅額尚存聲道到任採訪即為蠲放客旅舊苦重征多不入城市井蕭條聲道寬其認額民旅遂通又能捐俸助學勤身率下豈弟之政田里安之識者謂其材堪臺閣不當淹恤逺外朝請郎通判潭州軍州事張履信賦資清謹臨事強濟昨宰巖邑已著能聲帥守監司屢嘗論薦通判本州過滿三考凡事任責未始辭難起發經總制錢數目浩瀚稱提新會協贊為多其他關決舉無淹滯持身廉潔始終如一試以內外劇繁之任必有可觀朝奉郎前通判衡州軍州事廖視器質端方克守家法嘗任理掾以直去官兩為劇縣治狀稱最衡陽二郡備著賢勞承攝永道二州首尾年餘剔除姦弊愛惜財賦一毫不以妄用代者賴之近雖蒙朝廷差知房陵然其材術操行宜在激濁揚清之選已上三人者在本路守二之內不易多得欲望聖慈特賜甄擢他日必能各以所長見於世用涇應詔舉人才舉遊九言等狀曰臣承尚書吏部牒準今月十二日都省劄子節文七月十二日三省同奉聖旨在內令侍從臺諫兩省卿監郎官不拘文武臣各舉人才三兩人某人有某才堪辦某事某人有某能堪任某責並須明著實迹結罪保明仍限三日具奏者臣伏覩通直郎主管建昌軍仙都觀遊九言資材剛實不專意於文藝淳熙間知靜江府張栻嘗露薦章於孝廟朝稱其臨事有斷留意軍伍間事今已三十年更嘗既多其才益老近任江東撫幹贊畫帥閫區處事務軍民至今思之但其人過於自許幾有亢訐之纍如朝廷棄瑕録用置之幕府或邊鎮任使必能盡瘁報國有所植立朝奉郎主管台州崇道觀錢文子器識𢎞毅不以科目自居頃繇幕僚改秩宰邑醴陵不卑其官刻意民事撫摩善良鋤治姦惡盜賊為之屏息豪傑望風戢斂縣計上供之外沛然有餘及試郡天台振厲風采治民馭軍寬猛得宜偶嘗處事少差未免矯枉之失如朝廷湔祓簡拔處以繁劇州郡或經理財賦必能彈壓斡旋不至乏事承議郎前通判慶元軍府黃宜世事精練吏道敏強嘗為劇縣財計不擾而辦獄訟咸得其平吏畏民愛前後少見其比嘉泰二年有旨令宰執論薦邊郡守臣謂宜才學優長邑政有聲足以充選緣其資格未及且俾實歷通判得倅四明郡政多所裨補海道利便講之尢熟兼曾在淮郡守官諳悉事體議論可聽儻蒙朝廷照已降指揮擢用或别有繁難職任其才蓋所優為臣竊惟朝廷興舉事功方貪才使過之時此三人者皆有可用之實不宜置之間地今或嘗因廢黜見處祠祿或任滿替罷未有差遣是敢冒昧上塞明詔如將來不如所舉臣甘坐謬舉之罰涇又奏舉蕭遵等狀曰臣蒙恩分閫自揆罔功惟念薦賢可以報上今有當官可紀居鄉有譽察識已熟詎敢壅蔽弗以名聞臣伏見朝請大夫充荆湖南路安撫司參議官蕭遵材識優長政事勤恪克守家學蔚有文名前宰臣侍從皆舉充著述之選嘗以倅得郡而有恬退之心兩為湖南帥幕深知利便軍民相安人誦其德朝請郎通判潭州軍州事施梮器度恢閎材識明達留意官業備著勞能嘗為淮東倉屬荒政賴其經理為邵陽倅善拊蠻猺再二長沙關決平允不事苛擾闔郡稱之朝奉郎通判潭州軍州事薑注稟資溫粹持心正平濟美故家飾以儒雅其試邑贊幕俱有聲稱當路交章至于再四今倅是邦稱提錢會公私流通人蒙其惠承議郎充荆湖南路安撫司主管機宜文字謝孫復天資廉謹識見疏通出自名門精於吏事昨任建寧庾屬能區畫茶利及宰浦城能字民發姦今贊機幕曉暢軍務措畫犒賞裨助為多從事郎全州州學教授謝興甫文行華美氣質粹和謹重好修學術甚正為殿試第五名十年不調今始分教清湘到官以來嚴於教養士子賴其作成從事郎新廣南西路提點刑獄司幹辦公事郤夢祥學識該通詞章炳蔚議論守正孝友可稱奮由甲科不自矜耀嘗分教郴陽兼攝倅職隄防盜賊動中事機今待逺次鄉黨稱其材業此六人者皆當官可紀居鄉有譽前後帥守監司屢有薦舉材之有用於此可見欲望聖慈隨其所長特加録用他日必能展效不負選掄涇又奏舉趙綸等狀曰臣竊謂國之根本在乎民民之休戚係乎令令得其人政無不舉知而不薦何以勸功伏見通直郎知潭州益陽縣事趙綸相門濟美具有典刑天資粹和學識明邃近方更選試邑益陽綸到官之初寬以牧良善嚴以御強梗民訟以時剖決曲直各得其當催科先出信由並無重疊追擾一邑之政整然可觀從事郎知潭州善化縣事趙彥搢屬籍老成儒科自奮持心寬厚律已廉平善化為潭州附庸爰自前官縱弛之後繼以貪吏裒斂之餘彥搢區畫有方鈎索蠧弊不事鞭朴財計自裕一郡之人皆以為能從政郎衡州耒陽縣令祝夢良上庠秀發材學優長吏事詳明有如素習耒陽為衡外邑自比嵗盜起鄰境實調發屯駐之衝民不奠居正資安集夢良到任未久一意拊摩平易近民推為循吏此三人者皆作邑有善狀不負字民之選臣愚欲望聖慈特與甄擢俾就器使以勸循良不勝幸甚涇又奏辟宋億充潭州通判狀曰臣契勘潭州管縣十二獄訟繁多事緒叢委全藉倅二相與協力濟辦其有久贊畫諾備宣賢勞廉潔著聞士論推服就俾關決允為公舉臣伏見宣教郎武安軍僉判宋億資稟粹美學問深醇奮身科目雅安平進三任九考始脫選階今為僉幕已遂過滿凡擬斷民訟共稱公平臣自到任以來見其處事明審不為詭隨持身廉勤不自表暴一郡僚屬少出其右臣今照得通判潭州軍州事張履信合在今年十月滿替已辦取接下政鮑華據張履信繳申鮑華回書稱以地逺艱於涉歷别求便利闕次欲望聖慈就差宋億抵替鮑華見闕已差下馬相改替宋億不特倅二得人郡事賴以協濟亦使本路官吏知廉平有守如億者得見知於公朝庶幾寡廉鮮恥之人聞風知慕洗心易慮以趨事赴功所謂崇靖退以抑躁競厲廉隅以革姦貪激揚勸沮之方莫此為急涇再奏舉宋億狀曰臣二年分閫初乏寸長僅免曠瘝實賴僚佐臣伏見奉議郎前僉書武安軍節度判官廳公事宋億學有師承行無玷闕靜重能守廉潔不私奮由甲科雅安平進用舉主考第始獲更選以年制所拘遂授僉幕臣在鄉里已知其賢及來長沙適同王事朝夕相與識察益熟凡擬斷獄訟悉得其平區處職事皆協於理清不矯亢和不詭隨一郡賔僚少出其右臣嘗乞以倅二奏辟後準回降以不曾作縣難於施行臣實愛其人不容但已乞令再任仰荷俞允首尾四載操守如一臣之拙政蒙助甚多近日滿替咸惜其去而臣又誤叨改畀之命若不再以億之人材政績洊瀆天聰則實有蔽賢之罪其何以勸來者欲望聖慈察臣斯舉出於公論特降睿旨試以內外升擢之職俾盡所長庶幾明時無失士之嗟在下免陸沈之歎扶持世道豈曰小補歷代名臣奏議卷一百四十九
