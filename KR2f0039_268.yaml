body:
  text: 厯代名臣奏議卷二百六十八明楊士奇等撰理財宋哲宗元祐初蘇轍論青苗狀曰臣伏以青苗之害民朝廷之所悉也罷而不盡廢而復講使天下之人疑朝廷眷眷於求利此臣之所深惜也向者朝廷申明青苗之法使請者必以情願而官無定額議者以為善矣然以臣觀之無知之民急於得錢而忘後患則雖情願之法有不能止也侵漁之吏利在給納而惡無事則雖無定額有不能禁也故自今年春諸縣所散青苗處處不同凡縣令曉事吏民畏伏者例不復散其暗於事情為吏民所制者所散如舊蓋立法不善故使猾吏得依法為姦監司雖知其不便欲禁而不可得天下既已病之矣今朝廷復修夏料納錢減半出息之法此雖號減息而使天下曉然知今日朝廷意仍在利雖有良縣令臣恐其不能復如前日自必於不散矣且自熙寧以來吏行青苗皆請重祿而行重法受賕百錢法至刺配然每至給納之際猶通行問遺不能盡禁今吏祿已除重法亦罷而青苗給納不止臣恐民間所請錢物得至其家者無幾矣伏乞追寢近降青苗指揮别下詔㫖天下青苗自今後不復支散不勝幸甚轍再論青苗狀曰臣近奏乞罷支青苗錢兼訪聞臺諫官皆有文字論列至今並不䝉降出施行臣伏見熙寧之初王安石吕惠卿用事首建青苗之法其實放債取利而妄引周官泉府之言以文飾其事天下公議共以為非是時韓琦富弼司馬光范鎮等皆昌言其失恨不能救今二聖在上照知民間疾苦解去弊法既已略盡兼近日責降吕惠卿數其罪惡亦以創行青苗為首然天下俵散青苗其實至今未止民間疑怪以為朝廷仍有好利之意臣博采衆論云近有臣僚獻議以國用不足為言由此聖意遲遲未决臣雖至愚竊為陛下深惜此計何者自古為國率皆祿養官吏廪給士伍崇奉郊廟鎮撫四夷然而食租衣稅未嘗有闕今陛下力行恭儉前代帝王所有浮費一切不為今日之計但當戒飭天下守令使之安集小民若能稍免水旱之灾復無流亡之患則安靖之功數年自見榖帛豐羡將不可勝用何至復行青苗以與民爭利也哉伏惟陛下聖性仁厚凡利民之事知無不為若非左右搆此危語動搖聖聽則何至為之廢格羣言以成邪說然臣竊恐中外不知本末但見臺諫之言皆留中不出妄意陛下甘於求利不恤細民逺近傳聞所損不細臣欲乞陛下盡將臣僚前後所上章疏付三省詳議施行以弭斯謗轍三乞罷青苗狀曰臣等屢有封事乞罷青苗皆不䝉付外施行伏以王安石吕惠卿創行此法以來天下之士惟王吕黨人欲以青苗進身者則以其法為是其他士大夫上自韓琦富弼中至司馬光吕誨范鎮下至臣等輩人未有一人以為便者方安石惠卿用事忠言壅塞不得施用小民無告飲泣受害今者二聖臨御盡革衆弊天下欣欣日望青苗之去而近日刪立舊法益更滋彰中外狐疑不曉聖意竊聞近日左右臣僚有以國用不足欲將青苗補其闕乏者聖心未察是以為之遲遲臣等雖愚以為自古為國止於食租衣稅縱有不足不過輔以茶鹽酒稅之征未聞復用青苗放債取利與民爭錐刀之末以富國强兵者也藝祖太宗之世四方未平中國土狹嵗嵗用兵其費不資及真宗東封西祀逰幸亳宋造立宫室仁宗結好契丹平定西戎翦滅南寇此皆非常大費而常賦之外無大增加未聞必待青苗以濟國用今二聖恭儉安靜無為四海之富與祖宗無異何憂何慮而欲以青苗富國乎臣等以為皇帝陛下富於春秋未嘗接見多士太皇太后陛下覽政帷幄未能博聽羣議聽納之道於斯實難竊謂臣下每有獻言宜一切折以公議彼既欲散青苗而臣等以為不可陛下受其所言而臣等封事遂留中不出臣等不知陛下何以斷其是非而信之如此之篤乎陛下必欲決此深疑即當盡出臺諫所言付之三省使之公議得失不當隱忍不辨是非而隂用其言也如衆議必以罷之為是即乞早賜裁斷以慰民心必以罷之為非亦乞顯行黜謫以懲臣等狂妄轍為戶部侍郎上疏曰准御史臺牒五月一日文德殿視朝臣次當轉對臣待罪地官以財賦為職朝夕從事於今半年耳目所接或干利病敢緣虞人守官之義庶幾百工執藝以諫謹條具本職三事昧死上獻一臣伏見本部一月出入見錢之數率皆五十餘萬貫罄竭所得僅給經費而已稍加他用輒干求朝廷方能辦事有司惴惴常有闕事之懼臣聞古之為國皆食租衣稅而足降及近世始有鹽鐵酒稅之利凡郊廟朝廷祿士養兵捍邊睦鄰百色取具於此蓋天之所生地之所産足以養人自三代漢唐至於祖宗之盛未有舍此而外求者也今四海萬里耕稼相屬而以不足為憂臣實怪之孟子有言無政事則財用不足臣愚無知意者朝廷之政豈有所未立故耶臣觀諸道監司自近嵗以來觀望上下無復厲精之實妄意朝廷以不親細務為髙以不察姦吏為賢於是巡厯所至或不入場務不按有罪郡縣靡然承風懦者頽弛權歸於吏貪者縱恣毒加於民四方嗷嗷幾於無告其他害理而傷化者非臣之職臣不敢議也若夫兩稅征商𣙜酤無故虧缺者比比皆是此臣之職也欲乞陛下特降指揮令本部左曹具諸路去嵗三事增虧之數其非因水旱灾傷特以寬弛不職而致虧缺者擇其最甚黜免轉運使副判官罰一以勸百上意所向下之所趨也如此施行庶幾財賦漸可治矣一臣聞漢以九卿治事唐以六曹為政漢非無尚書而唐非無卿寺也蓋事不在耳先帝法唐之故専任六曹故雖兼置寺監而職業無幾量事設官其間蓋有僅存者矣頃元祐之初患尚書省官多事少始議併省郎曹所損才一二耳而寺監之官如鴻臚將作舊不設卿丞者紛紛列置更多於舊中外之議以此疑惑以為朝廷為人設官非為官擇人此言一出為損非細其於治體非臣所當議也而至於京師廪給之厚出於本部故臣願眀詔有司減去寺監不急之官以寬不資之費而已一臣聞財賦之源出於四方而委於中都故善為國者藏之於民其次藏之州郡州郡有餘則轉運司常足轉運司既足則戶部不困唐制天下賦稅其一上供其一送使其一留州比之於今上供之數可謂少矣然每有緩急王命一出舟車相銜大事以濟祖宗以來法制雖異而諸道蓄藏之計猶極豐厚是以斂散及時縱捨由己利柄所在所為必成自熙寧以來言利之臣不知本末之術欲求富國而先困轉運司轉運司既困則上供不繼上供不繼而戶部亦憊矣兩司皆困故內帑别藏雖積如丘山而委為朽壤無益於算故臣願陛下舉近嵗朝廷無名封樁之物歸之轉運司蓋禁軍闕額與差出衣糧清汴水腳與外江綱船之類一經擘劃例皆封樁夫闕額禁軍尋當以例物招置而出軍之費罷此給彼初無封樁之理至於清汴水腳雖損於舊而洛口費用實倍於前外江綱船雖不打造而雇船運糧其費特甚重復刻剝何以能堪故臣謂諸如此比當一切罷去況祖宗故事未嘗有此但有司固執近事不肻除去惟陛下斷而與之則轉運司利柄稍復而上供有期户部亦有賴矣轍又論户部三弊疏曰臣以愚拙待罪户部右曹俯仰幾嵗訖無云補竊嘗以祖宗故事考之今日本部所行體制既殊利害相逺恐合隨事措置以塞弊原謹昧死具三弊以聞其一曰分河渠案以為都水監其二曰分胄案以為軍器監其三曰分修造案以為將作監前件三監皆𨽻工部則本部所專其餘無幾出納損益制在他司頃者司馬光秉政知其為害嘗使本部收攬諸司利權然當時所收不得其要至今三案之事猶為諸司所擅深可惜也祖宗參酌古今之宜建立三司所領天下事幾至大半權任之重非他司比推原其意非以私三司也事權分則財利散雖欲求富其道無由蓋國之有財猶人之有飲食飲食之道當使口司出納而腹制多寡然後分布氣血以養百骸耳目賴之以為眀手足賴之以為力若不專任口腹而使手足耳目得分治之則雖欲求一飽不可得矣而況於安且夀乎今戶部之在朝廷猶口腹也而使他司分治其事何以異此自數十年以來羣臣不眀祖宗之意每因一事不舉輒以三司舊職分建他司利權一分用財無藝他司以辦事為效則不恤財之有無戶部以給財為功則不論事之當否彼此各營一職其勢不復相知雖使戶部得才智之臣終亦無益於算矣能否同病府庫卒空今不早救後患必甚昔嘉祐中京師頻嵗大水大臣始取河渠案置都水監置監以來比之舊案所補何事而大不便者河北有外監丞侵奪轉運司職事轉運司之領河事也凡郡之諸掃掃之吏兵儲蓄無事則分有事則合水之所向諸掃趨之吏兵得以併功儲蓄得以併用故事作之日無暴斂傷財之患事定之後徐補其闕兩無所妨自有監丞據法責成緩急之際諸掃所有不相為用而轉運司始不勝其弊矣近嵗嘗詔罷外監丞識者韙之既而復故物論所惜此工部都水監為戶部之害一也先帝一新官制並建六曹隨曹付事故三司事多𨽻工曹名雖近正而實非利昔胄案所掌今內為軍器監而止𨽻工部外為都作院而止𨽻提刑司欲有興作戶部不得與議訪聞河圵道頃嵗為羊渾脫動以千計渾脫之用必軍行乏水過渡無船然後須之而其為物稍經嵗月必須蠧敗朝廷無出兵之計而有司營職不顧利害至使公私應副虧財害物若使專在轉運司必不至此此工部都作院為戶部之害二也昔修造案掌百工之事事有緩急物有利害皆得專之今工部以辦職為事則緩急利害誰當議之朝廷近以箔場竹箔積久損爛創令出賣上下皆以為當指揮未幾復以諸處修造嵗有料例遂令般運堆積以分出賣之計臣不知將作見工幾何一嵗所用幾何取此積彼未用之間有無損敗而遂為此計本部雖知不便而以工部之事不敢復言此工部將作監為戶部之害三也凡事之類此者多矣臣不能遍舉也故願眀詔有司罷外水監丞而舉河圵河事及諸路都作院皆歸之轉運司至於都水軍器將作三監皆兼𨽻戶部使定其事之可否裁其費之多少而工部任其功之良苦程其作之遲速苟可否多少在戶部則凡傷財害民戶部無所逃其責矣苟良苦遲速在工部則凡敗事乏用工部無所辭其譴矣利出于一而後天下貧富可責之戶部而工部工拙可得而考矣事在本職在臣不得不言如果可采伏乞付外施行元祐二年平章軍國重事文彥博奏曰臣以戶部尚書乃昔之三司使之任專掌邦計財賦出入無不周知則國用取濟今當以昔之三司使之任悉歸戶部財賦盈虛可以經制不誤大計自尚書侍郎以下慎選而久用之庶幾集事尚書侍郎即是三司使副之職郎中員外乃昔之判官之職此國之大計乞早留聖意五年戶部郎中黃廉上奏曰臣奉被使旨所至訪求利害至熟榷茶之法實有害於川陕之民蓋官司不原朝廷立法本意希功幸賞以得為多於是禁網滋繁百姓受弊陸師閔立法最虐故取利最多上纍國體下斂民怨中外臣僚所言茶事害民六科皆有事實若遽論之不若盡以豫民使園戶自賣商賈自販官收稅引及歇馱錢並復熙寧以前博馬之䇿無交易之煩無腳乘之勞抉去故敝一從私便無復可議若致詳於公私之際則先當議民其次商賈其次邊計利害各有所在也蜀民通患幣輕錢重商旅齎攜息不償費若捐榷茶盡豫商賈則百貨未能通流腳乘未能猝備非唯園民之貨鬱滯絶其資生之路若蕃市交易萬一不繼亦足以害經久之法今若捐十一州之茶與商賈仍以川陕四路及關中諸路與之則受茶之地宜若可以盡泄川茶以補蜀民久困而官以善價取雅州興元府所産以贍熙秦諸州酌中法以為邊備於理為可六年給事中范祖禹封還解鹽專置使狀曰凖中書省録黃尚書省送到白劄子勘㑹陕西制置解鹽司元專設官總領後來方令轉運使一員兼管是致職務不專有害抄法契勘茶事司河圵糴便司已罷轉運司兼領七月八日得畫三省同奉聖旨依舊差官專充制置解鹽使更不令轉運使副兼領者右臣伏見仁宗慶厯中以范宗傑為制置解鹽使行禁𣙜法公私大受其弊於是范祥請變鹽法至八年乃以祥為陕西提㸃刑獄兼制置解鹽事盡革宗傑之弊課入亦增祥初建議當時論者爭以為非而韓琦包拯等皆以祥法為便請久任祥以專其事乃擢祥為陕西轉運使及李參代祥官課遂損嘉祐中張方平包拯請復用祥祥之鹽法至今稱之及祥卒薛向繼其後祥與向皆號為能言利豐財之臣然皆以提轉兼領祥之再使雖嘗專領後卒歸之轉運司由此觀之鹽事修舉在於得人不在置使也今誠得如祥向者而主之亦何必專若不得人雖專無益自仁宗嘉祐以來不置此使已數十年今一旦復之設官置吏别為一司公私先有勞費權輕則不足以動州縣重則是又增一監司州縣承禀不無煩擾又提轉之外别置使者以主財利無不好相侵奪各求自便此人情之常也神宗熙寧中留意馬政置監牧使數年而罷又置提舉常平司官陛下即位而罷蓋監司之外又置使則為冗長事理不安故不能久且治道貴於簡便綱領尤不欲衆多也東南海鹽不為不多然提刑司亦兼鹽事解池鹽在陕西轉運司止一事爾若須置使則東南鹽亦當設官矣若每事專設官則轉運司遂無所用尚何以主錢穀為職哉茶事司本起於李把劉佐陸師閔之徒征利而為之議者皆以為非朝廷以熙河邊用不得已而存之此不足為法也夫解鹽利害非臣所知止以祖宗之舊及事理言之恐不必專設官今陕西有都轉運使轉運使副判官提㸃刑獄皆可以隨資序用人若選擇知鹽事者一人為監司使之兼領亦豈敢不舉職若在轉運司於抄法有害則提刑司兼領亦范祥故事雖增監司一員猶愈於别置使之煩也古者利不百不變常朝廷方欲省官惜費苟無大利害則不若且如其故便臣愚切謂作事謀始所宜慎重故未敢行下伏望聖慈更與大臣詳酌所有録黃謹具封還祖禹為諫議大夫時論封樁劄子曰臣伏見近遣戶部郎官往京西㑹計轉運司財用出入之數自來諸路每告乏朝廷詳酌應副其餘則責辦於外計今既遣郎官㑹計必見缺少實數若其數不多則朝廷可以應副若其數浩大不知朝廷能盡應副邪或止如常嵗量事與之也若量事與之則朝廷既見其闕少之實而不盡與無以為說若盡數與之則恐他路援而為例朝廷視天下如一無有厚薄欲􅊖應副則或有所不逮不悉應副則轉運司無以為計不刻剝百姓何所取之如此則陛下赤子必受其弊不可不深慮也又朝廷既委轉運使副以一路財計而不信其所言虛實必遣郎官然後可信是使諸路使者人人有不自信之心每遇缺少則倚望朝廷遣官㑹計愈不任責臣以為此不可為後法欲乞自今諸路凡有告乏只委轉運司官㑹計保眀聞奏如有不實即重行黜責其誰敢妄臣竊謂今諸路經費所以不足者由提刑司封樁闕額禁軍請受錢帛斛斗萬數不少此乃戶部轉運司本分財計先帝特令封樁以待邊用蓋恐倉猝調發不及故為此權宜之制今朝廷方務安邊息民則封樁之法宜悉蠲除欲乞自熙寧十年初封樁以來已起發上京及今日已前未起發上京數目盡以賜尚書戶部諸路轉運司以佐經費今天下諸路例多窮乏而畜其財於無用之所坐視困竭而不為救濟非均通有無足用裕民之政也緣自封樁至今已十餘年一旦撥還諸路必稍舒緩其利害較然無疑伏乞早降指揮施行貼黃臣恐議者或謂先帝以此備邊今不當變改臣恭聞先帝嘗有弛張之議蓋自古權宜之法多不可久行時異事殊則後人必有更張三代以來無不如此若張而不弛不唯無以濟國家之急亦非先帝聖意祖禹再論封樁劄子曰臣近上奏乞以熙寧十年以來諸路提刑司封樁闕額禁軍請受錢帛斛斗悉歸之尚書戶部諸路轉運司以佐經費以紓困急臣竊以當今之患在於天下空虛朝廷不可不為之計封樁之與經費均出於民皆陛下一家之財也苟可以利國何所愛焉譬如移之於東而還之於西出之於內而歸之於外也昔唐之制天下財賦皆納於左藏庫太府四時以數聞尚書比部覆其出入至代宗之時租賦悉進入大盈內庫以中人主之天子以取給為便遂不復出以天下公賦為人君私藏有司不得窺其多少國用不能計其贏縮殆二十年及德宗即位宰相楊炎頓首於上前曰夫財賦邦國之大本生人之喉命天下理亂輕重皆由焉是以前代厯選重臣主之猶懼不集往往覆敗大計一失則天下搖動先朝權以中人領其職豐儉盈虛雖大臣不得知則無以計天下利害請出之以歸有司如此然後可以議政德宗乃詔凡財賦皆歸左藏庫炎以片言移人主意議者美之以炎知為相之體德宗知為國之務也今封樁之法未至如唐之大盈陛下聽言納諫逺過於唐之德宗若大臣有楊炎之請陛下豈有不從之者乎昔先帝有經略四夷之志是故别貯以待用今陛下垂拱守成志於無為畜聚於此將安用之昔漢髙祖創業老於兵間日不暇給文帝躬修儉節勸課農桑則髙祖之政文帝有所不用也武帝驅攘戎狄無嵗不征昭帝輕徭薄賦與民休息遂罷鹽鐵議榷酤宣帝總核名實選用郡守則武帝之法昭帝宣帝有所不用也臣前所謂時異事殊則後人必有更張自三代以來無不如此非獨漢唐也今諸路窘乏不可不救若其計窮豈免掊克是奪之於此而取之於民也惟陛下無疑於改先帝權宜之制則天下之民幸甚紹聖初寶文閣直學士知成都府王覿上殿劄子曰臣元祐六年承乏刑部嘗因轉對言諸路監司移易頻數習為因循茍簡以幸替去弊事無所革汙吏不知畏長久之策置而不講故轉運司財用日耗提刑司常平坊場之政浸以隳壞此不可以不恤也伏望朝廷立監司久任之法近者待罪戶部亦嘗具劄子上殿奏陳監司數易之弊今監司趣辦目前不為逺慮見大利在三二年之外吝小費而不為圖近效於一兩月之間貽後患而不恤欲職事無廢財力有餘難矣欲乞今後監司皆慎擇其人而久任之信賞必罰而勸沮之朝廷必欲久任即須眀詔諸路以久任之意使講求一路生財足食之利害條例以聞而朝廷隨宜應副責以逺效不求近功如此則異能之士必罄竭以奮庸中才之人亦勉強而舉職矣其劄子送三省未䝉施行臣愚竊謂近嵗計司財用窘闕日甚一日理當深為之慮今欲不傷財不害民而使經費足備儲蓄饒衍非慎擇監司而久任之更無上策伏望聖慈詳酌特賜旨撝檢㑹前奏早賜施行覿又劄子曰臣聞國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也臣竊見京師之民素無蓄積日糴軍糧以充食而比嵗軍糧僅有三年之備蓋發運司上供年額雖名六百二十萬石每遇灾傷除破或賑貸等借用之外多不及額故倉廪日耗非所以實京師為逺慮也伏緣發運司見今雖有本錢一百五十萬貫其所以糴米麥獨可以准備諸路額斛未到間先次起發即不能補完實闕之數臣伏望聖慈詳酌更以封樁錢二三百萬貫付發運司於豐稔路分旋次收糴遇歉嵗除破及他司借用過額斛即以所糴補其所闕使每嵗上供常滿六百二十萬石候倉廩充盈軍糧數多却裁減上供之數如允所奏乞旨撝下有司立法施行哲宗時覿為右正言上奏曰臣聞河東陜西諸路經略司舊有封樁錢斛甚多只自元豐四年用兵靈武之後邊計窘急遂將經略司錢斛盡歸轉運司支用由此經略司倉庫空虛近年雖因逐處帥臣奏請稍得錢斛封樁并為常平本錢而其數至少不足為緩急之備非計也蓋轉運司經費至廣郡縣等租賦僅充嵗計而已何暇更為逺慮臣聞上件諸路今夏二麥甚有豐稔之處近仍頻得雨澤秋成有望臣欲乞朝廷出內帑金帛每帥路各賜三五十萬匹兩令變轉收糴斛斗依舊法封樁轉運司不得干預以廣邊儲伏望聖慈特賜㫖撝施行貼黃守邊之大計惟患積粟不多近者河圵措置糴便司斛斗議者省以變轉為難矣今來本路水灾甚廣其斛斗之助豈為小補何患變轉之難也況陕西河東地髙苦寒積粟可以經久當邊事未寧之際尢須廣為准備若稍有灾傷及添屯兵馬即糧草便貴雖比平日增數倍多方糴買亦難遽集也內藏庫錢帛祖宗蓄積本要淮備兵費若但倚辦於漕司待其邊計窘急難得糧草之後方行支賜不惟恐不及事兼見錢既不可津般所得金帛猝難變轉且斛斗又貴則費用雖多為補至少若於平日支賜金帛令逐路帥臣得以旋次變轉乘賤收糴斛斗其利十倍臣兼聞榷貨務封樁錢物亦多與其間置於此不若分減量給帥路以廣邊計惟聖慈詳酌覿又上疏曰臣聞糶甚貴傷人甚賤傷農古今之通患也故李悝耿夀昌為平糶常平之法以救其弊不惟當時人以為便而後世有賴焉神宗臨御之初柄臣建議廢常平舊法以散青苗錢縉紳之公論莫不以為非而主議者持之甚堅先帝聖眀心知其故雖重違之而至於數年之後乃奮然獨斷令常平錢斛存留一半遇斛斗價貴減市價出糶收成時添市價收糴此有以見先帝知常平舊法之不可廢也然青苗錢未遂全罷者以建議之大臣猶在而附㑹者膠固其說未可以遽破而已今二聖臨御善政無不行弊事無不革宜有以成先帝之志矣今年二月九日敕節文提舉官錢榖委提㸃刑獄交割主管依舊常平倉法命下之日四方歎頌以陛下聖德隆厚前古之良法先帝之素志信可以行之於今日矣曽未數月遽復變易而所謂青苗錢者方且著為新令以重其事物論深以為駭而莫知其故臣竊料議者不過謂青苗既不立額而取人情願坐而得息有利而無害云爾果如此議臣請言其不然也夫取債出息貧下無知之民所甚欲也初無故而得錢孰非情願逮乎收斂之際即須追呼督促脅以鞭笞威以枷棝而後本息可得也且又將新蓋舊積纍浸多則以逃亡自捐之而虐及妻孥纍及同保者相望於道路矣當太平無事之時而使其民無辜陷溺有至於此可不為之痛惜哉然則青苗之所謂利者果在於利民耶非民之所利則其說既見於前矣如曰利國則厯古以來利不及民而國能獨利者未之有也必民利而後國利焉此惟常平舊法有之而非青苗錢之所能致也夫糶甚貴傷人甚賤傷農人傷則離散民傷則國貧乃必然之理也人果傷而離散矣區區青苗之錢能使之不離散乎農果傷而國貧矣瑣瑣二分之息能使之不貧乎故不若榖賤不至於傷農而民敦本民敦本則田野闢而賦稅增也榖貴不至於傷人則民樂業民樂業則百貨出而無求不得也夫如是則下何假於借貸之物而上何慕於二分之息乎故曰民利而後國利惟常平舊法有之而非青苗錢之所能致也臣竊惟先帝存留常平一半錢斛以行舊法誠務在於平榖價矣然今天下郡縣猶不免樂嵗粒米狼戾價甚賤而不售凶年榖價騰踴民阻饑而死亡者何耶蓋郡縣之吏妄意朝廷之法惟急於為利故於青苗新令則競務力行於糶糴舊條則僅同虛設而又常平錢斛既分以為青苗之本則可充糶糴者自己不多是以榖價低昻而終未見其平也臣伏望朝廷罷散青苗錢依今年二月九日敕行舊常平倉法以成先帝之素志無使郡縣之吏以利心期朝廷而廢善法也惟聖慈詳酌蚤賜旨撝施行覿為户部侍郎論財用疏曰臣聞何以守位曰仁何以聚民曰財理財正辭禁民為非曰義夫仁義大矣而理財在其間然理財之尤急者莫甚於食故洪範八政一曰食二曰貨古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也國家承平之久宜蓄積之充牣矣今天下郡縣倉廩多空至有不能具三二月之儲者若加之以師旅因之以饑饉雖有智者不能為謀矣夫西圵宿兵之重地也物價翔踴十倍數嵗之前東南食貨之淵藪也糴買上供僅足一年之計常平之物散在民間者歉嵗亦難收斂士大夫習以為常而不知憂或憂之而不能言或言之而不足聽故弊日益深公私之積日益耗焉昔賈誼言之於漢文曰生之者甚少而靡之者甚多天下財産何得不蹶漢之為漢四十年矣公私之積猶可哀痛安有為天下阽危若此而上不驚者夫積貯者天下之大命也茍粟多而財有餘何為而不成何招而不至文帝感誼言始開籍田躬耕以勸百姓乃至衣弋綈示敦朴為天下先宫室苑囿無所增益有不便輒弛以利民遂有貫朽粟陳之效臣伏望聖慈留神於節用理財之道熟講而深圖之以消未然之患以固無窮之業覿為刑部侍郎上疏曰臣伏見東南諸路曩嵗財用最為充足故自祖宗以來軍國之費多出於東南大中祥符三年九月江淮發運使李溥言今春運米六百七十九萬石諸路各留三年支用更留准備上供及賑糶等米萬數至多天禧元年正月赦江淮等路上供米特罷今年春運一次臣竊思祥符中諸路上供之外既有三年之蓄矣至天禧赦書又特罷春運一次者又有以見真宗皇帝深思逺慮不惟閔漕運之勞而亦欲東南諸路蓄積常多也今東南財用窘耗日甚郡縣鮮有兼嵗之儲兩浙今嵗蘇湖秀三州水灾本路轉運司及常平之物不足以充賑糶近取於江淮逺糴於荆湖然後僅能稍蘇三州之民則無備可謂甚矣淮南去嵗今嵗皆無大灾傷而轉運司以軍糧急闕訴於朝廷每年冬借發運司米二十萬石以充軍糧不幸有方數千里之水旱則何以為謀臣近者備員發運使在職嵗餘所領六路以上供錢糧不應期限而轉運司官吏該勘劾者凡四路非獨今嵗也前此逐路缺數亦多彼轉運司官吏寧不以失期冒法為懼哉蓋力既不足雖重得罪無以避也緣此諸路但務為逃責淺近之計而不暇及生財長久之道深可嗟惜臣所見者雖止於東南諸路傳聞其他路分亦多類此臣亦嘗詢訪轉運司財用日耗之因雖不能盡究其本末然有灼然易見者逐路用度浸廣而朝廷封樁浸多也且以數事言之選人添俸逐路添將兵諸州添指使埸務監官添員外置准備差遣添大使臣凡此雖政事所係適時之宜不得不爾然若計其費則皆祖宗時所未有也用度浸廣既如此又所謂封樁者浸多若賣鹽寬剩錢闕額禁軍請受減省造船錢之類名目甚多本皆轉運司之物而一切封樁歸於朝廷者浸多則轉運司安得而不窘乎臣固知封樁之物非以奉逰宴廣宫室飾苑囿侈輿馬也不過欲蓄積稍多而有以待軍國緩急之用而已然所謂蓄積者經費之外有餘然後可以為蓄積豈可輟有司之經費使不足用而名之蓄積乎今所謂封樁者有司不得輒用彼經費既闕及致嵗額上供之物公然負缺而不可詰又借貸於朝廷者雖經違限勘劾而竟亦不能償此豈長久之計耶臣伏望朝廷熟講而深圖之凡上供封樁之物前日祖宗所不取者皆付之轉運司使諸路轉運司稍得自足乃天下之幸也劉涇上疏曰臣聞財用空荒失助必有以所致空荒失助之處不困於費出必起於陷失此兩者浮沈財用之海也朝廷講此熟矣然知以遺利失財為憂而密網之置先及百姓此何道耶今內有計司市易外有撥運轉運更相龍斷迭相征取開闔之權歸柄于上而天下之利盡矣尚何疑百姓之私蓄以抗國者哉天子仁聖賜民寬大此日為盛則理財之術但當究費出與失陷兩者之源而已比年已前財用充阜求無不厭者非有真理財之意如今日也特無所事因循曠闊積稔告餘而已自大興廢之後官曹以倍費徒吏以傭費田以修治費水以疏決費軍械以預備費府寺以土木費蠻夷以問罪費於非常河瀆以防虞費於不測此數者費出之源也敢妄謂陛下以宫廷犬馬臺池之故而費國毫髮乎是則費出以民雖有智者無為奈何然臣意此數者容有可裁省消壞之實而未之盡得也夫城防百里潰於蟻壤太倉千斯匱於鼠穴朝廷雖廣入之亦廣出之雖日理之亦日費之尚何望陳腐貫朽之髣佛乎議者亦以謂朝廷急財如水火而不愛惜如塵糞事未有形跡而志於必成亡財失力又輒弗治故小人之姦亦敢率易舉事而朝廷亦自恱從焉審誠如此則十口之家不能保貧況九州乎今朝廷內所儲者具不能知外所儲者惟坊場之入而已不亦太窶哉陛下毋忽銖銖之少有積而至於鈞石者矣毋忽拳拳之微有積而至於邱山者矣則日朘月削使飽食無事之身不致於苦肥斯可也此費出之源所宜究也若陷失之害則無處不有然名舉之則似不足言實考之則又不可廢且以臣所見稽焉州郡理缺之職固陷失之權衡也彼居是職者有肻為朝廷一經意乎今折納之法在州郡特理缺之一事爾自非重朝廷之遣使則名存實亡文具而已果誰咎哉至於坊場走利之幸胥史占傭之冗贓罰細故也積及無算而弗收情輕贖金可得也壞至萬分而不斂稅商不均而公私無據賦農不足而纍嵗無所歸監司雖才力不及則棄為殫殘郡邑畏事而意不經則以為汗漫以類推之則遺利失財無端緣而自沈者可赦也非不能為而鹵莽滅裂不肻為者可誅也此陷去之源所宜究也天生有時地生有限人用之無窮而費出不塞其㳙㳙陷失不尋其浸浸則期國之富強可得乎殿中侍御史吕陶奏乞罷榷名山等三處茶以廣德澤亦不闕備邊之費疏曰臣伏見朝廷察知蜀中茶法貽害數路生靈受弊之深特遣使者按視本末意欲更張與民休息今黃廉遍詣諸郡及山場等處尋究弊端盡見其實纍具奏列皆有條緒蜀茶之害十去七八疲民延􅖪日望弛禁過於饑渴之待飲食而朝廷尚遲遲其决者蓋為邊費巨萬仰給於茶慮或闕用不敢遽然與奪臣愚以謂持此說者知其一未知其二也夫陸師閔增嵗課為百萬貫而又獻羡餘百萬貫者豈皆茶息哉蓋勇為屠儈之事扼民之喉刮剔骨髓攘奪百貨公為販易其極至於典米豆鬻衣服虛為茶利以欺朝廷爾今日陛下忍為此事乎恭惟深仁博愛惠養萬物惟恐一夫或失其所必不忍為此也既不忍為師閔之事則禁可以盡廢利不可以過取雖黃廉之說猶未能盡副朝廷之意焉故臣願少變其議廣陛下之德澤以慰人望至於邊備又豈敢闕而不計哉且黃亷所以欲榷名山油麻埧洋州三處者猶利榷買之賤覬出息之多爾然諸場不榷而此獨榷則民有幸不幸榷法猶在則嚴刑濫賞隨時復作譬如治病不去根本未可以言愈也為今之計莫若稍髙三處之直如郡縣和糴米榖民間交易之類就彼和買及其起綱運致比於榷法須費一倍每嵗約以五萬䭾應副熙河仍設秦鳳涇原兩路賣茶之禁並如黃廉之請則自可得一百萬貫以助邊計以權馬法亦不闕少又何必獨榷三處以貽斯民之憂乎其他諸路所入素薄宜一切捨之以與商旅庶為招來之漸也又況蜀茶嵗約三千萬斤除和買五百萬斤入熙河外尚有二千五百萬斤皆屬商販流轉三千里之內所謂住稅翻稅過稅者亦可得五十萬貫自𣙜法之行茶有牙稅息腳頭子籠索等錢皆為無名之斂今既解去羅網一切不問苐以一貫之茶納長引錢百文則人情簡便必亦樂輸又有十餘萬貫仍於六十餘萬貫中三分捐一以為未必皆然之數則四十萬貫乃有其實而茶商諸貨之稅復在此外總計其數則邊防之費粗可足用三郡之茶不必禁榷利害愈明矣陶又奏為乞放坊場缺錢事疏曰臣伏見近嵗以來四海之利多歸公上官司之積動計巨萬私室之有十已九空恭惟聖政日新德澤流霈窮深極逺䝉被生成其勢如大病之後偶得良藥以活其命有望更生然而腹腸空虛支體瘁弱喘息之氣所存無幾固宜調護撫養俾就安完天下之肥然後可得是以堆垜市易義倉抵當免行之類凡為聚斂者一切廢罷此誠德惠及民之深而與之休息也獨有出賣坊場一事最為深害亦願體恤以慰其心其立法之初蓋為官司事無紀極百費浮冗貪吏從而侵漁州郡衙前既勤力役而所得酒榷之利盡以奉於公家有至竭財破産而死於凍餒朝廷知其如此於是拘收坊場官自出賣所得淨利一以募人執役二以給公家之用行之漸久弊從而生蓋小人之情競利而不慮患實封投狀務在必得既妄添所買之直又虛增抵産之數適值民間錢幣闕乏酒貨不售課利淨利抽貫稅錢供給不足才出季限又有罰錢或委保百姓管押綱運其押綱之人往往盜竊官物走竄失陷則須勒保人陪填或元買價髙界滿無人交割轉更拖缺緣此數事坊場多有破敗乃至出賣抵産以償官錢或抵産價髙出賣不行則強責四鄰承買或四鄰貧乏承買不盡則攤及飛鄰望鄰之家抑令承買或本戶抵産罄盡尚缺官錢則勒保人代納亦須破壞産業或虛指債負妄起訟端昏賴論索郡縣急於官課更不問有無逋缺遂使平人承認械􅖪受箠道路相望囚繫坐獄殊無虛日其甚者至於自經溝瀆鬻及男女而猶不能免大率一縣之內中戶以上因買坊場或充壯保而破散者十常四五官方如此百計督責極力掊聚而逐界所得實錢十分只及五六一則因元買價髙虛張其數二則為物輕錢重酒無厚利三則日趨困窮難於償納以此天下坊場錢積壓少缺其數極多神宗皇帝深知其弊曽於元豐三年明堂大赦并八年正月赦文纍行蠲放及與展限送納詔令所至人皆鼓舞歌頌以謂天地大恩莫過於此除已蠲放外至今缺錢不下八九百萬貫簿書之內雖有見缺之名刑獄之下必無可足之理方當陛下布政之初聚斂刻剝之事大半罷去天下臣庶欣戴稱頌以為仁宗復生尤宜廣霈德澤以慰其望臣愚伏願陛下特降睿旨凡係今日已前因買坊場拖缺課利淨利并抽貫稅錢及過月罰錢之類見勒買人或保人送納并破賣抵産者並與除放庶幾窮困之人普沾大惠復遂餘生況皇帝陛下太皇太后陛下恭儉慈仁出於天禀內無土木華靡之費外無兵戈攻戰之賞四海所入國用豐盈雖放免數百萬貫逋缺如去泰山之一塵何闕於事且天下之務固有是非輕重惟聰眀聖智能權而行遂中於理今放釋逋負以安生靈與督責收斂以廣用度何者為是何者為非何者為輕何者為重權而行之正在此日又況冬春以來雨雪愆候祈禱備至未聞沾足則除放缺負俾民免於凍餒亦可以感天地之祐召隂陽之和使風雨時若也臣又聞真宗皇帝嘗御便殿親閲三司逋缺放八萬三千數蓋真宗以逐次降赦放缺多為有司廢格不行或根究追逮益為煩擾故按籍引對而釋之臣願陛下逺法真廟之恤民近倣神宗之布惠斷自聖意特行蠲放坊場缺錢天下不勝幸甚陶又奏為天下缺坊場錢為害最大乞行蠲放疏曰臣伏謂天下凋瘵之端其一起於逋缺之弊天下逋缺之弊其大者莫如坊場蓋始有實計增價虛估抵産之欺中有出限罰錢界滿不替之患終有壯保納官錢鄰人買産業之禁期㑹迫切條例煩苛不惟酒戶緣此困窮抑亦平民因而破蕩或縲繫或鞭撻或轉徙道路或自經溝瀆臣嘗厯陳其弊以聞於朝廷矣大率一縣之內中戶以上因買坊場及充壯保而失業破産者十常四五多者缺至數千貫少者亦有三五百貫以四海計罹此疾苦者凡幾千家每家以十口為率凡幾萬人失所矣朝廷亦宜為之惻然也神宗皇帝深恤其弊曽於元豐三年眀堂大赦并去年正月赦文纍次蠲放及與展限送納德澤之流非不深厚一則為有司廢格詔令巧求過遏幸其少戾於法遂不蠲除二則為物輕弊重錢貨乏絶又有灾傷去處或因征役相仍衣食尚且不完官錢何暇供納嵗月愈久逋負愈多虛掛簿書枉費刑箠鉤考之際雖有見缺之名憔悴之餘必無可足之理況陛下涖政以來以除弊恤民為急大至市易小至義窘皆䝉哀憐多為罷去獨此一事其害最深赤子之心旦夕傾望伏願特降睿旨霈發渙恩應今日已前天下坊場拖缺及保人代納并出賣抵産填陪不足及破賣抵産未得者盡與蠲放仍令逐路轉運司限一月具已放數目奏聞如此則朝廷實惠不為有司之沮抑天下疲俗盡知皇上之撫養下可以結人心之欣戴上可以感天地之太和倘䝉聖慈開允臣奏其見缺河渡錢亦乞依此施行陶又奏乞詔有司再行裁定六曹人吏庶節冗費狀曰臣聞尚姑息則不可革小人之僥幸長僥幸則不可節朝廷之冗費今日公患正在於此臣敢舉一端而議之夫六曹吏人者始官制舉行以三司審官東西院流內銓等處胥吏分𨽻諸部創法之初事未有叙曹局既廣不免冗占朝廷知其如此嘗差王震删定條𠡠欲議裁損震不能推至公舉職事究繁簡之實立衆寡之限輒任私意罔掠浮譽祿少者則減祿多者則添上以虛數欺昧朝廷下以實費牢籠羣小蓋所謂行案手分者一人之食或四倍於貼司震減貼司雖多而添手分亦不少以舊校新一嵗之費又數萬緡乃是陛下欲省吏震則增之陛下欲損費震則益之懷情罔上何所信據震之罪雖可以赦原而朝廷法度不可以妄作伏請申詔有司再行裁定六曹吏人之數無或循仍故態滋長弊端庶幾國家橫費稍稍裁莭陶又奏乞相度逐界坊場放免缺錢疏曰臣伏見朝廷德惠及生民多矣臣下聚斂之態亦已悛革惟坊場一事根株深固條約交紊猶有餘弊未盡蠲除蓋纍界放賣至今凡十五年其始則有實封投狀競利爭占虛增估直詐通抵産之欺其中則有淨利過重月納不足出限罰錢年滿不替之患其終則有正名已敗壯保納官錢餘缺尚存鄰人買産業之禁期㑹嚴迫莭目煩多不惟酒戶緣此困窮抑亦平民因而朘削或繫獄或受箠或轉徙道路或自經溝瀆天下郡邑無處無之大率一縣之內上中等戶因買坊場及充壯保而失業破産者十常四五多者缺至數千貫少者亦三五百緡以四海總計凡幾千家罹此疾苦矣每家以十口為率凡幾萬人失所矣恭惟陛下至仁博愛亦宜為之動心矣昔者神宗皇帝通知此弊加意救恤於元豐三年眀堂降赦及八年正月赦文纍行蠲免外仍與展限二年送納去嵗大饗肆赦亦有權住催理指揮委監司保眀聞奏當議等第蠲放德澤之流非不廣厚然而此弊終未盡去者一則為有司違慢詔旨忘失法意少有疑似遂不保眀二則為物輕幣重錢貨乏絶或灾傷所困或兵役相仍衣食之費尚且不完至於官錢何有以納蓋緣第一界至今已十五年第二界今亦十二年往往生業蕩盡子孫淪散虛載簿書枉費刑撻嵗月愈久重不聊生憔悴之餘必無可得臣愚伏望陛下推廣先志霈發異恩以逺近之差為輕重之序應第一第二界見缺者並與除放其第三第四界亦乞量立分數蠲免如此則大法簡易不為官吏之沮遏聖澤寬深遂除生靈之疲瘵諫院官右正言劉安世論陕西鹽鈔鐵錢之弊疏曰臣伏見陕西鹽鈔鐵錢之弊莫甚今日向者鹽鈔沿邊及近裏州軍轉賣至京隨處價直增損不過三五百文是故鹽貨通行商賈獲利今則關陕每鈔一席價錢僅及十千才至西京所賣不及六貫或就解池請鹽一席腳乘之費通約一十二千般至西京止賣七貫已上鹽鈔與般鹽所折皆十分之四五此鹽鈔之弊也舊制大鐵錢之法每一文當小銅錢二文今則用鐵錢一貫五六百文換易銅錢一貫往往乘時尚或增長此鐵錢之弊也二者弊源皆在官司自求贏餘以補支計不詳法度與民爭利且鈔法本欲㳂邊召人入中錢物給鈔支鹽以實邊備隨處或賤或貴客人趂時往來販易公私兩獲其利今則官司自契勘價錢州軍收買却於價髙處出賣是以商賈不行有無不通陕右素無出産道路附帶錢物之人惟用鹽鈔故不免競添髙價收買此鹽鈔與民爭利也鐵錢銅錢舊日相兼一等行用更無輕重之别止自近嵗以來陕西官司計較鼓鑄鐵錢獲利稍厚諸處錢監罷鑄銅錢是以民間稍稍難得或須用銅錢出入即以鐵銅加息一分換易日近官司又令應係支給請俸及買賣等只支一色鐵錢依民間分數加息出換公私相競漸次添價始自一分今至六七分矣此銅錢與民爭利也陕西鹽鈔鐵錢之法素號經久之利而今日之弊至於如此況陕右京西二路疆境相接每於界首計其米麥金帛之價僅爭一倍皆以此也久而不革為害浸深權時之宜在所損益為今之計惟使陕西官司罷買鹽鈔止令民間販易其解州鹽池支給鹽貨並用熙寧以前舊法仍將諸司見在樁管銅錢盡數兊撥與轉運司自今後應係支用並依舊日衮同鐵錢中半支給其官中加息換易銅錢亦行禁山諸州錢監舊鑄銅錢去處亦令興復如此則鹽鈔與鐵錢之法必行商旅復通公私共利亦理財裕民之道也伏望聖慈詳酌特賜指揮施行畢仲遊上奏曰財用之不足者世無能用財之人也論事之小者當諭之大論事之大者當諭之小一家之所入猶昔日也一家之所出亦猶昔日也昔乃富今乃貧鄰里鄉黨必以為不善用財矣今天下之所生猶昔天下也今天下之所費亦猶昔天下也昔乃有餘今乃不足而莫有知其不善用財者殆未之思爾雖二邊之嵗賜大河之隄防兵屯之廪食宗室戚里之奉養頗有異於昔日而賦斂之厚力役之多鹽鐵酒榷征商之利凡增於昔日者亦足以當之矣而天下諰諰然常患財用之不足則財之理在得知財計者用之爾所謂用財者非特斂於公者可用凡天下之財我皆能用之雖非我用而實用之也饑穰天行也我能使之不饑匱乏時有也我能使之不匱左能使之右右能使之左逺能使之近近能使之逺所謂用財之人也三代之制漫不可考然冡宰制國用量入以為出通三年餘九年之儲而堯湯水旱國無捐瘠也則用財之大計亦可見矣蓋漢興接秦之弊天子不能具鈞駟將相或乘牛車而孝文之時賈誼以謂公私之積猶可哀痛至朝錯開說使民入粟塞下得以拜爵得以除罪曽不數年遂盡除天下之田稅回哀痛之貧為富厚之俗豈天之生財獨私於孝文之世而多邪亦能左右逺近而用之故耳今試以一事求之天下衙前之繁重如公帑齊厨酒醪將輸及使於逺道之類既皆禁之矣其不免於費者𣙜酤工作三二事而已夏秋榖米布帛之稅與和買征商祠廟廂鎮之利州縣皆有之以其利而對繁重殆以二而對一又積之嵗月可以為身計則衙前之役不難議矣衙前之役既有定議則坊場河渡單丁女戶之所入足以廪他役之重而支送迎之費然所謂坊郭者獨無所與則可用之財良在於此昔漢髙帝之時徙齊諸田椘屈景之族以實關中武帝之世又大徙富人於茂陵而羌胡之難不輕侵也今舉天下坊郭之役錢無慮數十百萬計捐而不取則太幸積於州縣則無名如倣西漢遷徙之大意使以役錢入粟塞下及為大河之芻茭十取其二三而以其餘為道路之費要之比前日之役錢省其半則彼亦無所怨矣如是而採朝錯之說令進納之家與富民而罪可贖者亦皆入粟塞下已實則移之郡國郡國已實則移之京師三司之經費則自用周冡宰量入為出之法必使有餘以備水旱而朝廷內外宗室戚里皆減於制度以適時變推此類而行之左右逺近唯我之所欲用民不知所由豈惟國家無不足之患而富庶之俗太平之䇿必始於此事非甚難而近世以來莫有思之者故曰財用之不足無用財之人也仲遊又奏曰昔嘗有興作之說動朝廷朝廷信之而患財之不足也故散青苗置市易斂役錢變鹽法凡政之可以得民財者無不舉凡吏之可以得民財者無不用蓋散青苗置市易斂役錢變鹽法者事也而欲興作患不足者情也苟未能杜其興作之情而徒欲禁其散斂變置之事是以百說而百不行然則事之與情可不察哉今欲廢青苗罷市易蠲役錢去鹽法凡號為財利而傷民者一掃而更之則自嘗用事於新法者必不喜矣不喜之人必不曰青苗不可廢市易不可罷役錢不可蠲鹽法不可去必探其不足之情修不足之說伺不足之隙而言不足之事以動上聽夫以一家之計父子之親欲安田里逺市井從耕稼之常業辭商販之末利而說以不足則猶相視扼腕而中止況以天下之廣臣民之衆有郊廟朝廷祭祀賔客之奉有內外上下官吏廪稍之費有重兵宿衛邊城守禦之計有大河隄塞邊方餽賜之勞前古之君固常患不足而又探不足之情修不足之說伺不足之隙而言不足之事則雖致石人而使聽之猶將動也如是則青苗廢而可復散市易罷而可復置免役蠲而可復斂鹽法去而可復存使禹稷復出為天下爭將無奈何為今之䇿當大舉天下之計深眀出入之數曰天下之不足其弊安在弊在邊境轉輸之多也則棄無用之地省轉輸之繁其省幾何弊在造作修營之多也則止造作輟修營其省幾何弊在新法官吏廪給橫費之多也則廢吏祿行舊法其省幾何弊在掖庭永巷婦人資用之多也則定職掌私身之數非先帝御幸者一出之其省幾何天下之可已者無不已其省幾何今諸路常平免役坊場河渡戶絶莊産之錢粟無慮數十百巨萬如一歸地官以為經費可以支二十年之用則三司嵗入之常半為贏餘以天下之大而三司嵗入半為贏餘則數年之間府庫之財倉廪之粟亦將十倍於今日而既省之後濟之以恭儉則將如邱山河海之不可盡以此眀言於中而精計乎外俾朝廷曉然知天下之餘於財也則不足之情不生不足之事不起不足之隙不可伺而不足之論不得陳於前矣然故青苗免役市易鹽法凡所謂新法者如可永罷而不復如既飽之人強以芻豢猶不肻進況藜藿菽黍乎問者曰患不足而新法興何以實之曰曩者并軍搜卒封樁其錢糧又懼兵之少也故行保甲之法籍民為兵數年以來農夫去南畝者太半盜賊公行守令不得為治則保甲之利害無可言者而保甲之名至今未除豈非患兵之不足邪以兵不足而存保甲則知財不足而新法之患可以復興也侍御史劉摰上奏曰臣伏覩陛下即位聽政以來嘉與天下休息於安治凡法令之弗宜于民者疏通損益之官吏之弗良于政者罷免放黜之中外欣戴人人如被大賚然事猶有在逺方重地為害尤甚者則河北江湖之鹽法福建川蜀之茶禁是也數路之害同而河圵江湖福建已䝉朝廷遣使亷治之獨蜀之茶害未聞詔旨臣切嘗博訪於知其事者槩得其說曰蜀地陋而狹茶之所出不過十數州而已始時人賴以為生今茶司盡榷而市之大約園戶有茶一本而官市之額已至數十斤矣官所給錢反以糜耗於公者名色不一如預借息錢驗引錢頭子錢打角錢稅錢之類費去常已過半每嵗春官司預以劵給借錢糧必以牙儈保任之及輸入之日引驗交稱又牙儈主之故其費于牙儈者又不知幾何則是官于園戶名為平市而實奪之也園戶有逃以免者有投死以免者已而其害猶及鄰伍欲伐茶則有禁欲增植則加市故其倍謂地非生茶也地實生􅍔也茶場以茶為息始者息一出於茶也其後市之價愈下取之息愈多園戶不勝為之也故作茶日少裁足以應官額而已於是主茶息者議不獨賴茶而又為博易以充之也博易之事他貨百物貿販苛刻錐刀瑣屑無不為者依茶為名通曰茶息商稅務坐視漏失嵗課而不敢有所論也至於商賈請算者平時便私散之州郡茶地今則一集于成都之都場髙其估以與之又總計平時所之州郡逺近道里之費入之故都場之取息又如此此商旅之所以難行也官吏以息為功以功第賞既進官減年矣又以息額之餘錢使與胥吏牙儈分取入已曰用市易法也市易之賞固非法也然其取息猶曰與民和市而茶之取息一用嚴刑重禁網羅致之亦為功異矣奈何均用一法賞之也今一任有分錢少者至數千緡而減年磨勘至有三十餘年者此何理哉法亦可謂敝矣而朝廷遣使未之及者豈非以蜀之茶法與熙河蘭㑹之經制相為用者歟蜀茶之利以給熙河蘭㑹者天下十之三熙河蘭㑹之費不止而蜀茶之害未可息也然熙河蘭㑹之費今昔宜有不同昔者事邊之外前有王韶後有李憲提兵革財用之大權朝廷捐金帛市租莫知紀極聽其自用不領於有司無所㑹計非徒私二家也於是依倚茍合之客罔功興事以利相市之徒公取公豫莫見其跡則熙河蘭㑹大費外又有以泄之者如此也今既制之於有司無二人者之橫蠧若又於邊計外凡冗名濫費一切大為之節約則蜀之茶雖未可以弛其禁而所謂十之三者殆必可損矣伏望聖慈選遣使指考茶法之敝欺者㑹計緣茶公家之所費與實息之數大減嵗市之額稍增斤直之價削納茶無名之錢以完養園戶裁官吏之員牙儈之數以省冗給罷息賞之濫分錢之敝以革欺幸而以事與轉運司通治之如此則蜀民之困苦庶乎可以蘇也臣待罪言路既有得於人之言敢不亟以上聞然此其大略至於利害纎悉則願敕使者詳究焉厯代名臣奏議卷二百六十八
