body:
  text: 歷代名臣奏議卷二百八十八明楊士竒等撰外戚漢髙后立諸吕為三王擅權用事朱虛侯劉章年二十有氣力忿劉氏不得職嘗入侍髙后燕飲高后令章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進飲歌舞已而曰請為太后言耕田歌髙后兒子畜之笑曰顧而父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田章曰深耕穊種立苖欲疏非其種者鋤而去之吕后默然惠帝元年太后稱制議欲立諸吕為王問右丞相王陵王陵曰髙帝刑白馬盟曰非劉氏而王天下共擊之今王吕氏非約也太后不恱問左丞相陳平絳侯周勃勃等對曰髙帝定天下王子弟今太后稱制王昆弟諸吕無所不可太后喜罷朝王陵讓陳平絳侯曰始與髙帝喋血盟諸君不在耶今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝地下陳平絳侯曰於今面折廷爭臣不如君夫全社稷定劉氏之後君亦不如臣王陵無以應之宣帝即位霍光薨封光兄孫山雲皆為列侯以光子禹為大司馬霍氏諸壻親屬頗出補吏山陽太守張敞上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其官邑延及子孫終後田氏篡齊趙氏分晉季氏専魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳大將軍二十嵗海內之命斷於掌握方其隆時感動天地侵迫隂陽月朓日蝕晝𡨕宵光地大震裂火生地中天文失度妖祥變怪不可勝記皆隂類盛長臣下顓制之所生也朝臣宜有明言曰陛下褒寵故大將軍以報功德足矣間者輔臣顓政貴戚大盛君臣之分不明請罷霍氏三侯皆就第及衛將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非策之得者也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路無由夫心之精微口不能言也言之微眇書不能文也故伊尹五就桀五就湯蕭相國薦淮隂纍嵗乃得通況乎千里之外因書文諭事指哉唯陛下省察上甚善其計然不召也後禹山等謀不軌事覺禹腰斬夫人顯及諸女昆弟皆棄市與霍氏相連坐誅滅者數十家皇后霍氏廢處昭臺宫封告者皆為列侯初霍氏奢侈茂陵徐福曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也霍氏秉權日久天下害之而又行以逆道不亡何待乃上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞至是人為徐福上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人不應俄而失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪無恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福獨不蒙其功惟陛下察之宣帝思報大將軍霍光德乃封光兄孫山為樂平侯使以奉車都尉領尚書事魏相因許廣漢奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之専權皆危亂國家自後元以來祿去王室政由冢宰今光死子復為右將軍兄子秉樞機昆弟諸壻據權勢在兵官夫人顯及諸女皆通籍長信宫或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散隂謀以固萬世之基全功臣之世成帝時王鳳専政災異寖甚劉向以宗室遺老遂上封事諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄然後田氏取齊六卿分晉崔杼弒其君光孫林父寧殖出其君衎弒其君剽季氏八佾舞于庭三家者以雍徹並専國政卒逐昭公周大夫尹氏管朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗録禍福如此類甚衆皆隂盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅勢上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢言而秦復存二世委任趙髙專權自恣壅蔽大臣終有閻樂望夷之禍秦遂以亡近事不逺即漢所代也漢興諸吕無道擅相尊王吕産吕祿席太后之寵據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宫之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷遊談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與己分權數稱燕王蓋主以疑上心避諱吕霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也雖周皇甫秦穰侯漢武安吕霍上官之屬皆不及也物盛必有非常之變先見為其人微象孝昭帝時冠石立於泰山仆栁起於上林而孝宣即位今王氏先祖墳墓在濟南者其梓樹生枝葉扶迹出屋根垂地中雖立石起栁無以過此之明也事藝不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皂𨽻縱不為身奈宗廟何婦人內夫家外父母家此亦非太后之福也孝宣皇帝不與舅平昌侯權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜逺外戚毋授以政皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以褒睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不早慮易曰君不密則失臣臣不密則失身幾事不密則害成惟陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚哀帝少在國見成帝委政外家王氏僭盛常內邑邑即位多欲有所匡正封拜丁傅奪王氏權師丹自以師傅居三公位得信於上上書言古者諒暗不言聽於冢宰三年無改於父之道前大行尸柩在堂而官爵臣等以及親屬赫然皆貴封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縱不能明陳大義復曽不能牢讓爵位相隨空受封侯增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理隂陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至德以壯年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖德當合天人之功也臣聞天威不違顔咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之從化天下者陛下之家也肺附何患不富貴不宜倉卒先帝不量臣愚以為太傅陛下以臣託師傅故亡功德而備鼎足封大國加賜黃金位為三公職在左右不能盡忠補過而令庶人竊議災異數見此臣之大罪也臣不敢言乞骸骨歸於海濵恐嫌於偽誠慙負重責義不得不盡死書數十上多切直之言哀帝少而聞知王氏驕盛心不能善以初立故優之後月餘司𨽻校尉解光奏曲陽侯根宗重身尊三世據權五將秉政天下輻湊自效根行貪邪贓纍巨萬縱橫恣意大治室第第中起土山立兩市殿上赤墀户青瑣逰觀射獵使奴從者被甲持弓弩陳為步兵止宿離宫水衡供張發民治道百姓苦其役內懷姦邪欲管朝政推親近吏主簿張業以為尚書蔽上壅下內塞王路外交藩臣驕奢僭上壞亂制度案根骨肉至親社稷大臣先帝棄天下根不悲哀思慕山陵未成公聘取故掖庭女樂五官殷嚴王飛君等置酒歌舞捐忘先帝厚恩背臣子義及根兄子成都侯況幸得以外親繼父為列侯侍中不思報厚恩亦聘取故掖庭貴人以為妻皆無人臣禮大不敬不道於是天子曰先帝遇根況父子至厚也今乃背恩忘義以根常建社稷之策遣就國免況為庶人歸故郡哀帝欲封祖母傅太后從弟商鄭崇諫曰孝成皇帝封親舅五侯天為赤黃晝昏日中有黑氣今祖母從昆弟二人已侯孔鄉侯皇后父髙武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極弱逆隂者厥極凶短折犯人者有亂亡之患犯神者有疾天之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克夀故衰世之君夭折蚤沒此皆犯隂之害也臣願以身命當國咎哀帝時鮑宣上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之微陛下所親見也今奈何反覆劇于前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動衆心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省户下陛下欲與此共承天地安海內甚難今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄為姦羣小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊嵗增于前凡民有七亡隂陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也寃陷亡辜三死也盜賊橫發四死也怨讎相殘五死也嵗惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重祿豈有肯加惻隱于細民助陛下流教化者邪志但在營私家稱賔客為姦利而已以茍容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益毫毛豈徒欲使臣美食大官重髙門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒藿肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天説民服豈不難哉方陽侯孫寵宜陵侯息夫躬辨足以移衆強可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歷三公智謀威信可與建教化圖安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦可大委任也陛下前以小不忍退武等海內失望陛下尚能容亡功德者甚衆曾不能忍武等邪治天下者當用天下之心為心不得自専快意而已也上之皇天見譴下之黎庶怨恨次有諌爭之臣陛下茍欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受祿賜美食大官廣田宅厚妻子不與惡人結仇怨以安身邪誠迫大義官以諫爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣呐鈍於辭不勝惓惓盡死而已平帝時申屠剛仕郡功曹時王莽専政朝多猜忌遂隔絶帝外家馮衛二族不得交官剛常疾之及舉賢良方正因對策曰臣聞王事失則神祗怨怒姦邪亂政故隂陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也今朝廷不考功校德而虛納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之鋭殆乖建進善之旌縣敢諫之鼓闢四門之路明四目之義也臣聞成王幼少周公攝政聽言下賢均權布寵無舊無新惟仁是親動順天地舉措不失然近則召公不恱逺則四國流言夫子母之性天道至親今聖主幼少始免繦褓即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親迹相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪久廢不録或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其勢不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有纍何況事失其衷不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀三十餘世霍光秉政輔翼少主修善進士名為忠直而尊其宗黨摧抑外戚結貴據權至堅至固終沒之後受禍滅門方今師傅皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎持滿之戒老氏所慎蓋功冠天下者不安威震人主者不全今承衰亂之後繼重敝之世公家屈竭賦斂重數苛吏奪其時貪夫侵其財百姓困乏疾疫天命盜賊羣輩且以萬數軍行衆止竊號自立攻犯京師燔燒縣邑至乃訛言積弩入宫宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於纍卵王者承天順地典爵主刑不敢以天官私其宗不敢以天罰輕其親陛下宜遂聖明之德昭然覺悟逺述帝王之迹近遵孝文之業差五品之屬納至親之序亟遣使者徴中山太后置之别宫令時朝見又召馮衛二族裁與冗職使得執戟親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅內和親戚外絶邪謀東漢光武時蔡茂為廣漢太守時隂氏賔客在廣漢郡界多犯吏禁輒糾案無所回避會洛陽令董宣舉糾湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致教必由進善康國寧人莫大理惡頃者貴戚椒房之家數因恩勢干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積日寃魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其蒙宥天下拭目今者外戚憍逸賔客放濫宜敕有司案理姦罪使執平之吏永申其用以厭逺近不緝之情光武納之章帝初立以明德太后故尊崇舅氏馬廖兄弟並居職任廖等傾身交結冠蓋之士爭赴趨之司空第五倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表書曰臣無作威作福其害于而家凶于而國傳曰大夫無境外之交束修之饋近代先烈皇后雖友愛天至而卒使隂就歸國徙廢隂興賔客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絶又譬諸外戚曰苦身待士不如為國戴盆望天事不兩施臣嘗刻著五藏書諸紳帶而今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以不應經義惶恐不敢以不聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家冀蒙省察及馬防為車騎將軍當出征西羌倫又上疏曰臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纎介難為意愛聞防請杜篤為從事中郎多賜財帛篤為鄉里所廢客居美陽女弟為馬氏妻恃此交通在所縣令苦其不法收繫論之今來防所議者咸致疑怪況乃以為從事將恐議及朝廷今宜為選賢能以輔助之不可復令防自請人有損事望茍有所懷敢不自聞及諸馬得罪歸國而竇氏始貴倫復上疏曰臣得以空虛之質當輔弼之任素性駑怯位尊爵重拘迫大義思自策厲雖遭百死不敢擇地又況親遇危言之世哉今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆煦飄山聚蚊成雷蓋驕佚所從生也三輔議論者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也詖險趨藝之徒誠不可親近臣愚願陛下中宫嚴敕憲等閉門自守無妄交通士大夫防其未萌慮于無形令憲永保福祿君臣交歡無纎介之隙此臣之至所願也元和三年太尉鄭𢎞病篤上書曰竇憲姦惡貫天達地海內疑惑謂憲何術以迷主上近日王氏之禍昞然可見陛下處天子之尊保萬世之祚而信讒佞之臣不計存亡之機臣雖命在晷刻死不忘忠願陛下誅四凶之罪以厭人鬼憤結之望和帝永元二年以竇憲為車騎將軍詔使者為憲弟篤景並起邸第興造勞役百姓愁苦御史何敞上疏諫曰臣聞胸奴之為桀逆久矣平城之圍慢書之耻此二辱者臣子所為捐軀而必死髙祖吕后忍怒還忿舍而不誅伏惟皇太后秉文母之操陛下履晏晏之姿胸奴無逆節之罪漢朝無可慙之耻而盛春東作興動大役元元怨恨咸懷不恱而猥復為衛尉篤奉車都尉景繕修館第彌街絶里臣雖斗筲之人誠竊懷怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也宜且罷工匠専憂北邉恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知昔鄭武薑之幸叔段衛莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也伏見大將軍竇憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言以深至天下聞之莫不恱喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景總宫衛之權而虐用百姓奢侈僭逼誅戮無罪肆心自快今者論議洶洶咸謂叔段州吁復生于漢臣觀公卿懷持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫褒申伯之功如憲等陷於罪辜則自取陳平周勃順吕后之權終不以憲等吉凶為憂也臣敞區區誠欲計策兩安絶其綿綿塞其涓涓上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免於嚴怒臣伏惟纍祖蒙恩至臣八世復以愚陋旬年之間歷顯位備機近每念厚德忽然忘生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懷默茍全駙馬都尉瓌雖在弱冠有不隱之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福時樂恢為尚書僕射見憲兄弟放縱亦上疏諫曰臣聞百王之失皆由權移于下大臣持國常以勢盛為咎伏念先帝聖德未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖互衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠策之上者也四年大將軍竇憲誅河南尹張酺上疏曰方憲等寵貴羣臣阿附唯恐不及今嚴威既行皆言當死不復顧其前後臣伏見夏陽侯瓌每存忠善檢敕賔客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄宜加貸宥以崇厚德帝感其言瓌遂得全安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權尚書翟酺上疏諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自迹其君時不可也臣荷殊絶之恩蒙值不諱之政豈敢雷同受寵而以戴天履地伏惟陛下應天履祚歷值中興當建太平之功而未聞致化之道蓋逺者難明請以近事徴之昔竇鄧之寵傾動四方兼官兼紱盈金積貨至使議弄神器改更社稷豈不以藝尊威廣以致斯患乎及其破壞頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人此最安危之極戒社稷之深計也夫儉德之恭政存約節故文帝愛百金於露臺飾帷帳於皂囊或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可校今自初政已來日月未久費用賞賜已不可算斂天之財積無功之家帑藏單盡民物雕傷卒有不虞復當重賦百姓怨叛既生危亂可待也昔成王之政周公在前邵公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年已來災譴頻數地坼天崩髙岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞恤研精致思勉求忠貞之臣誅逺佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷宴私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏不省而外戚寵臣咸畏惡之永初中鄧太后兄大將軍隲以母憂上書乞身太后不欲許以問班昭昭因上疏曰伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽言納芻蕘之謀慮妾昭得以愚朽身當盛明敢不披露肝膽以效萬一妾聞謙讓之風德莫大焉故典墳述美神祗降福昔夷齊去國天下服其亷髙太伯違邠孔子稱為三讓所以光昭令德揚名于後者也論語曰能以禮讓為國于從政乎何有由是言之推讓之誠其致逺矣今四舅深執忠孝引身自退而以方垂未靜拒而不許如後有毫毛加于今日誠恐推讓之名不可再得緣見逮及故敢昧死竭其愚情自知言不足采以示蟲蟻之赤心太后從而許之于是隲等各還里第焉質帝本初元年益封梁冀萬三千户又封其子弟及宦者劉廣等皆為列侯太尉杜喬諫曰陛下即位不急忠賢之禮而先左右之封梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言茍遂斯道豈伊傷政為亂而已喪身亡國可不慎哉桓帝元嘉中郎中汝南袁著年十九見梁冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位又有能致之資而和氣未應賢愚失序者勢分權臣上下壅隔之故也夫四時之運功成則退髙爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵懸車之禮髙枕頥神傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見拔故敢忘忌諱昔舜禹相戒無若丹朱周公戒成王無如殷王紂願除誹謗之罪以開天下之口晉武帝太康中遷裴頠為尚書左僕射侍中俄而使頠專任門下事固讓不聽頠上言賈模適亡復以臣代崇外戚之望彰偏私之舉后族何嘗有能自保皆知重親無脫者也然漢二十四帝惟孝文光武明帝不重外戚皆保其宗豈將獨賢實以安理故也昔穆叔不拜越禮之饗臣亦不敢聞殊常之詔又表云咎繇謨虞伊尹相商吕望翊周蕭張佐漢咸播功化光格四極暨于繼體咎單傅説祖已樊仲亦隆中興或明揚側陋或起自庶族豈非尚德之舉以臻斯美哉歷觀近世不能慕逺溺於近情多任后親以致不靜昔疏廣戒太子以舅氏為官屬前世以為知禮況朝廷何取於外戚正復才均尚當先其迹者以明至公漢世不用馮野王即其事也東晉明帝即位以明穆皇后兄庾亮為中書監上疏讓曰臣凡庸固陋少無殊操昔以中州多故舊邦喪亂隨侍先臣逺庇有道爰容逃難求食而已不悟徼時之福遭遇嘉運先帝龍興垂異常之顧既眷同國士又申以婚姻遂階親寵纍忝非服弱冠濯纓沐浴芳風頻煩省闥出總六軍十餘年間位超先達無勞受遇無與臣比小人祿薄福過災生止足之分臣所宜守而偷榮昧進日爾一日謗讟既集上塵聖朝始欲自聞而先帝登遐區區微誠竟未上達陛下踐阼聖政惟新宰輔賢明庶僚咸允康哉之歌實存于至公而國恩不巳復以臣領中書臣領中書則示天下以私矣何者臣於陛下后之兄也姻婭之嫌與骨肉中表不同雖太上至公聖德無私然世之喪道有自來矣悠悠六合皆私其姻人皆有私則天下無公矣是以前後二漢咸以抑后黨安進婚族危向使西京七族東京六姓皆非姻族各以平進縱不悉全決不盡敗今之盡敗更由姻昵臣歷觀庶姓在世無黨于朝無援于時植根之本輕也薄也茍無大瑕猶或見容至于外戚憑託天地連勢四時根援扶疏重矣大矣而或居權寵四海側目事有不允罪不容誅身既招殃國為之敝其故何耶由姻媾之私羣情之所不能免是以疏附則信姻進則疑疑積于百姓之心則禍成于重闥之內矣此皆往代成鑒可為寒心者也夫萬物之所不通聖賢因而不奪冒親以求一寸之用未若防嫌以明至公今以臣之才兼如此之嫌而使內處心膂外總兵權以此求治未之聞也以此招禍可立待也雖陛下二相明其愚欵朝士百僚頗識其情天下之人安可門到户説使皆坦然邪夫富貴榮寵臣所不能忘也刑罰貧賤臣所不能甘也今恭命則愈違命則苦臣雖不達何事背時違上自貽患責邪實仰覽殷鑒量己知弊身不足惜為國取悔是以悾悾屢陳丹欵而微誠淺薄未垂察諒憂惶屏營不知所措願陛下垂天地之鑒察臣之愚則臣雖死之日猶生之年矣疏奏帝納其言而止成帝時蘇峻平護軍將軍庾亮上疏曰臣凡鄙小人才不經世階緣戚屬纍忝非服叨竊彌重謗議彌興皇家多難未敢告退遂隨展轉便煩顯任先帝不豫臣參侍醫藥登遐顧命又豫聞後事豈云德授蓋以親也臣知其不可而不敢逃命實以田夫之交猶有寄託況君臣之道義貫自然哀悲眷戀不敢違距且先帝謬顧情同布衣既今恩重命輕遂感遇忘身加以陛下初在諒暗先后親覽萬機宣通外內臣當其地是以激節驅馳不敢依違雖知無補志以死報而才下位髙知進忘退乘寵驕盈漸不自覺進不能撫寧外內退不能推賢宗長遂使四海側心謗議沸騰祖約蘇峻不堪其憤縱肆凶逆事由臣發社稷傾覆宗廟虛廢先后以憂逼登遐陛下旰食踰年四海哀惶肝腦塗地臣之招也臣之罪也朝廷寸斬之屠戮之不足以謝祖宗七廟之靈臣灰身滅族不足以塞四海之責臣負國家其罪莫大實天所不覆地所不載陛下矜而不誅有司縱而不戮自古及今豈有不孝不忠如臣之甚不能伏劍北闕偷存視息雖生之日亦猶死之年朝廷復何理齒臣于人次臣亦何顔自次于人理臣欲自投草澤思愆之心也而明詔謂之獨善其身聖旨不垂矜察所以重其罪也願陛下覽先朝謬授之失雖垂寬宥全其首領猶宜棄之任其自存自沒則天下粗知勸戒之綱矣隋文帝仁夀二年兵部尚書栁述尚蘭陵公主怙寵使氣帝問符璽直長韋雲起以外問不便事述時侍側雲起曰栁述驕豪未嘗經事兵機重要非其所堪臣恐物議以為陛下官不擇賢専私所愛斯亦不便之大者帝甚然之唐太宗貞觀七年蜀王妃父楊譽在省競婢都官郎中薛仁方留身勘問未及豫奪其子為千牛於殿廷陳訴云五品以上非反逆不合留身以是國親故生節目不肯決斷淹留嵗月太宗聞之怒曰知是我親戚故作如此艱難即令杖仁方一百解所任官魏徴進曰城狐社鼠皆微物為其有所憑恃故除之猶不易況世家貴戚舊號難理漢晉以來不能禁禦武德之中以多驕縱陛下登極方始蕭條仁方既是職司能為國家守法豈可枉加刑罰以成外戚之私乎此源一開萬端爭起後必悔之將無所及自古能禁斷此事惟陛下一人傋豫不虞為國常道豈可以水未橫流便欲自毁隄防臣竊思度未見其可太宗曰誠如公言向者不思然仁方輒禁不言頗自専擅雖不合重罪宜少加懲肅乃令杖二十而赦之武后已持政稍自肆於是武承嗣請立七廟追王其先中書令裴炎諫曰太后天下母以盛德臨朝宜存至公不容追王祖考示自私且獨不見吕氏事乎后曰吕氏之王權屬生人今追崇先世在亡迹異安得同哉炎曰蔓草難圗漸不可長后不恱而罷中宗神龍元年立韋氏為后贈后父玄真上洛王左拾遺賈虛已上疏曰異姓不王古今通制今中興之始萬姓仰觀而先王后族非所以廣德美於天下也且先朝贈后父太原王殷鑒不逺須防其漸玄宗開元中皇后父王仁皎卒將葬用昭成皇后家竇孝諶故事墳髙五丈一尺侍中宋璟等請如著令帝已然可明日復詔如孝諶者璟還詔曰儉德之恭侈惡之大也僭禮厚葬前世所戒故古墓而不墳人子於哀迷則未皇以禮自制故聖人制齊斬緦免衣衾棺槨各有度數雖有賢者斷其私懷衆皆務奢獨能以儉所謂至德要道者中宫若謂孝諶踰制初無非者一切之令固不足以法貞觀時嫁長樂公主魏徴謂不可加長公主太宗欣納而文德皇后降使厚謝韋庶人追王其父擅作鄷陵而禍不旋踵國家知人情無窮故為制度不因人以搖動不變法以愛憎比來人間競務靡葬今以后父重戚不憂乏用髙冢大寢不畏無人百事官給一朝可就而區區屢聞者欲成朝廷之政中宫之美爾儻中宫情不可奪請準令一品陪陵墳四丈差合所宜帝曰朕常欲正身紀綱天下於后容有私邪然人所難言公等乃能之即可其奏又遣使賚綵絹四百匹憲宗時宰臣延英奏事畢因言及前古外戚專寵害政上曰朕每以此為監外戚不惟止于無權未嘗假其顔色正為此也宰臣李絳等曰鑒往古之失立當今之制事光千古道冠百王今妃后家外戚之勢向外都不知有祇畏恭慎常恐有違至於職位賜與賔客聚會豈惟無敢踰制實亦不逮常人所以自陛下臨御已來后族戚里之家無一人有犯法懲責蓋制於未然之所致也上甚恱曰今豈得如此乎若有踰越朕必寬捨此却是安全外戚之道也宰臣陳賀曰陛下檢抑外戚之道從古帝王無及今者聖旨逺引睿政光昭可垂萬代之法也文宗開成三年以郭􅌈為邠寧節度使上問栁公權以外議對曰郭􅌈除邠寧外間頗以為疑上曰旻尚父之姪太后叔父自金吾作小鎮外間何尤焉對曰非謂旻不應為節度使也聞陛下近取􅌈二女入宫有之乎上曰然入參太皇太后耳公權曰外間不知皆云􅌈納女後宫故得方鎮上曰然則奈何對曰獨有自南內遣歸其家則外議自息矣上即日從之歷代名臣奏議卷二百八十八
