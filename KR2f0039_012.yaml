body:
  text: 歷代名臣奏議卷十二明楊士竒等撰孝親宋光宗紹熙間權戶部侍郎袁説友乞過宫上奏曰臣等伏見會慶莭在即十二日禮合進香都人顒望翠華忽又得旨免過宫無不失望既而十三日內教十六日十七日孟饗皆聖躬親臨中外益望陛下必躬上玉巵之夀伏計聖心素篤仁孝知此禮至大至重決意必出固無待臣等再三之請政緣進香之前已有定論旋復反汗是以不免過慮須至溷瀆臣等竊惟人子事親朝夕定省自天子逹于庶人其禮一也五日一朝已為希簡今陛下自三月恭請之後至今八閲月矣皆以夀皇聖旨而免至於生辰上夀恭想夀皇聖意必欲陛下一來此人之至情也竊聞今日嘉王以生朝無以報劬勞之恩專就禁中置酒以夀二親陛下重明聖莭既受羣臣萬年之觴不曾過宫已是失禮今日嘉王夀親之際父子歡洽陛下寧不動心上念兩宫延望之意且臣等料度聖意所以久不過宫者或謂陛下有所疑有所畏父慈子孝本於天性夀皇既以神器親授聖子方且頤神沖淡凡軍國之事悉不與聞五年之間初無纎芥斷無可疑斷無可畏苐恐猶有左右小人妄生離間撰造言語惑亂聖聽全在陛下深思洞察斷然勿疑臣等竊見今年夏秋之間太白晝見至於經天九月七日金星掩心大星而又黑祲亘天萬目駭觀熒惑見入太微垣逼近內屏房心為明堂正屬宋分太微內屏切近帝座此皆天變之大者也所在洪水為災衡嶽山頽正逼祠宇劍門峯墜塞斷谷口今月十六日夜當陛下齋宿之時行都地震有聲如雷夫衡嶽南方之鎮行都駐蹕之所此皆地變之大者也至於人情下而閭閻衆而三軍近而禁衛以陛下久闕定省之禮口語籍籍謗讟紛紜所不忍聞自廟堂大臣至于百辟數進苦言徒勞容受竟不施行莫不憂懼愁苦不能自存此則人情之所甚不安者也陛下乘輿一駕如反掌之易則天地之變異必銷人心之憂疑立解陛下何憚而不為若聖意固執又復遲疑則天地之變決非虛設人心動搖必至叵測又非去嵗之比矣臣等蒙陛下擢置從列感恩至深目擊事勢可畏如此不忍上負聖知是敢罄竭血誠控告君父伏望聖慈斷然一出不勝宗社之福如臣等所言更不能感悟聖心則臣等皆為失職實難茍安不免引去以俟罪譴激切之衷傾盡于此伏乞睿照説友又上奏曰臣輒瀝危衷干犯天聽臣淺才末學本無他長自淳熙十五年陛下一見臣於議事堂遽蒙特逹之知賜以簡記迄今六載號召晉擢盡出親除今叨誤恩濫綴從列天地父母之恩至隆至厚臣竊自惟念臣子報君無路可見惟有盡忠竭誠仰禆聖德或可少露萬一然時平無事臣下不過奉職惟謹而已儻人情事變一有叵測不能刳瀝肝膽罄竭忠誠以效古人正救之義是有負於天地父母之恩也臣竊見近者中外人情惶惑憂懼皆以陛下久闕慈闈定省之禮自宰相而下至于百執事數數控奏無慮數十企望翠華一出何止以日為嵗自今月十二日進香日分已不過宫百官君民惕惕惶懼且臣自積日以來親聞都人私語籍籍是以十九日臣同衆從官趙彥逾等亟具奏劄控告陛下乞於會慶聖節日必駕乘輿以安人情以弭不測臣亦竊意陛下必須上以聖父欲得相見之切中以臣子控奏􅈤惻之誠下以軍民惶惑偶語之疑必翻然一出不謂又降免過宫之旨臣今日五更隨百官詣重華宫拜表稱賀親見外而居民內而禁衛上而縉紳下而走𨽻相顧嘆息形之言語所不可道又緣既廢玉巵奉觴之禮重華殿下御幄在側設而弗用鼇山前列不聞三呼大樂弗陳夀儀俱廢人情憂愧無不咨嗟閭巷所傳尤為不一陛下深居九重必不聞此臣既叨從列略不以告則臣之罪誅戮有餘若於此時陛下不急為之改圖實恐他有上關聖慮者臣願陛下以聖父聖子初無疑隙斷以獨見亟於二十四日至二十六日三日之內選定一日就今日先降過宫之旨所有百官錫宴候過宫了日施行陛下此令一下便足以填紛紛多端之橫議弭皇皇不測之衆情解外夷傳聞輕視之玩心安危利害實關宗社毋奪於聞言毋變於臨時惟陛下曲信臣所奏而亟行之臣不勝扣頭瀝血之至臣孤逺一身蒙陛下親賜拔擢至此豈不願仰承聖意貪榮戀祿實以過宫一事至大至重臣若茍容取悅隱而不言萬一事出非意驟撓聖懷臣之孤負聖恩萬死不足敢望陛下鑒臣之忠非敢張皇事勢非敢一語有欺掠譽取名非敢飾辭矯激即賜降旨施行臣區區大願臣雖巳同趙彥逾等以論思無補具劄子奏聞外然父子之道天性也理之順與逆事之利與害陛下天資仁孝固自洞察豈待臣言臣自念既不忍上負陛下親擢之恩又不忍目擊人情憂皇之變復不忍躬蹈欺君容身之罪是用忘其誅斥再此􅈤控幸陛下諒其愚忠而赦之臣無任百拜昧死説友又上奏曰臣一介孤逺誤蒙聖恩連嵗拔擢叨塵從列竊惟臣子報君惟有盡忠竭節雖使鼎鑊在前猶當挺身自奮況陛下崇奬忠鯁容受直言臣於此時儻懷顧避之心則有蔽欺之罪臣早隨從臣同班奏事懇奏迫切乞早過宫天語再三曲加領略面諭臣等定以十七日必駕乘輿臣爵躍鼓舞不勝慶幸惟是臣粗有悃愊欲得面奏屬綴班末不敢躐次兹幸玉音確許定日用敢敷陳萬一以冒聖聽今至十七日止三日耳既非過宫日分須合預降指揮又緣自纍月來久闕定省常禮中外臣子引領俟命今陛下既以定日面許從臣俄頃之間外已傳播皆謂十七日聖駕必定過宫逺近翕然相傳無不以手加額若不預行降旨臨期又至變易豈特陛下失信臣下愈使中外謗讟益深而從列小臣亦無顔面可見君父兼夀皇聖帝愛子之念日動聖懷顒望陛下一來何止以日為嵗今日從臣同班合奏陛下面許十七日一出夀皇必已聞知恭想喜溢慈抱指日以俟翠華若更中輟其行外謗又不止此竊恐軍民百姓紛紛籍籍交口橫議别生事端以至伏闕上書鼓衆倡亂事起叵測何所不有臣願陛下堅守十七日過宫之旨毋奪於臨時無故之疑即於今日速降指揮風雨不渝決然一出庶幾少掩外觀稍息羣謗消弭不測之禍慰安兩宫之心一安一危或禍或福只在陛下頃刻可否間耳可不畏哉可不謹哉臣適又親聆玉音以謂中有離間欲得調護臣竊惟凡父子兄弟親戚骨肉雖富貴貧賤各有不同必須先有可以離間之事然後小人得以肆其離間之術夀皇之於陛下親父親子慈孝兩盡將五十年聖意倦勤親授神器命禹之旨出於誠心頤神重華相忘天下何所形迹而謂可疑既無纎芥之嫌必無離間之事豈非陛下事父過謹生於憂畏畏心既重疑則乘之左右小人窺見聖心浸生事端暫於離間因惑聖聽以壞綱常此理曉然無可疑者臣願陛下深念父子出於天性夀皇與子根於至誠盡釋往事之疑速講問安之禮調護之䇿無出於此臣適又親聆玉音頗及唐玄宗肅宗之事臣竊惟唐二宗舊事與今日大不相同肅宗即位靈武懷自立之嫌今陛下以禹繼舜揖遜授受其視肅宗何止萬萬不侔肅宗內則溺於張后之愛外則墮於李輔國之謀故父子之間竟成終天之恨今以聖父聖子兩宫歡愈夀皇果斷剛眀姦人誰敢肆其志陛下聰明英睿左右孰得逞其私雖小人欲有離間之心在今日自無可入之隙陛下正當痛戒肅宗之失深慮禍胎之萌曲意慈闈力盡子道亟下詔旨定用十七日過官鸞馭順動人情帖然了無浮言久撓聖聽儻或事有可疑果如聖慮臣甘受誅斥所不敢辭如蒙聖斷勿忌勿疑命駕如期一洗羣惑豈特陛下身享無窮之慶而宗廟社稷永保無疆之休臣不勝至榮大願臣仰溷宸嚴罪當萬死惟陛下矜其愚忠而赦之説友又上奏曰臣今月二十二日迫於愛君憂國之切輒具奏劄干犯天威罪在不赦雖未蒙亟賜施行而陛下優容其言未加誅譴臣不勝感極涕零之至臣兹者復以事勢迫切非前日比備位從列職在論思豈可憚於再三不以亟告君父惟陛下賜之詳覽蓋自會慶聖節之後今四日矣宰執控瀝懇告百官奏疏痛切恭聽過宫指揮以時刻為嵗至今既未聞警蹕又未先降指揮人情愈更憂皇口語沸騰雜出如宰執百官皆是陛下親任委使之臣當此急難之時上則不過竭力苦口百拜控告下則不過上章奏疏懇切俟命而已最是百姓譁言軍人偶語扇搖驅衆思倡亂端人情至危陛下豈不略動宸慮兹又傳聞即有伏闕上書者必須羣衆而來萬一先有此事已是鼓動衆情馴致姦人相繼扇亂豈是細事陛下聖明如天豈忍使朝廷事勢宫闕氣象一至於此此臣所以惶懼股栗不避三瀆痛哭復為陛下言之也為今之計極易為力在於反掌間耳何者若陛下自有所疑仍舊固執不肯一出則臣所奏紛紛之事中外鼓倡俄頃而生使朝廷誅之則其所言乃是順天之理以告人主坐之何罪以行誅戮茍以此而誅一人則禍變愈不可救矣陛下聰明神聖豈不曉此若陛下以臣之言為信以未過宫之事為終非所安以目即軍民譁謗之言萬一生變即日決然過宫則臣前所奏紛紛俄頃而定了無一事可慮者此其安與危利與害只在陛下反掌間耳臣所謂極易為力者此也陛下何惜而不為哉變生不測豈可逆料臨時倉卒必難撫定陛下豈可不動心也臣竊料聖意非不知過宫為必當行之事非不知目前人言可畏人情已搖為可憂所以猶豫未出者必自有所危疑或以久不過宫自知非便外議紛煽猝難撫定因此宸衷未決愈難一出然臣今有一䇿以告陛下仰惟親父親子了無纎芥可疑夀皇聖節今將七十年來於朝廷萬事愈更毫髮不與父之愛子天下一同陛下因何所見而起危疑之隙若因浸潤之言左右之譛此則小人大誤陛下耳烏有親父親子可以浸潤左右而離間我者哉此決然斷無可疑也陛下觀前日夀皇批答侍從之言有云自秋涼以來每欲與皇帝相見此語切切愛子急急欲見之意陛下可以灼然無疑矣今臣之䇿以謂陛下尚懷此疑未肯即過宫欲乞陛下先密以宸翰一緘如家人之語其間及陛下以久不得一侍夀皇欲得即行朝禮今幸已經會慶聖節翌日願侍慈闈之意夀皇得此宸翰必喜悅欣愈當須賜答力求招請然後陛下降指揮云來日過宫其重華宫禁衛等人并隨駕禁衛等人並兩倍支給當日食錢陛下即時命駕如此而出不惟陛下安心肆意愈無他疑而又宛轉委曲益見聖父聖子相與周旋之盛願陛下信臣之言即賜灑翰亟遣中使奏逹慈扆過宫才畢萬事悉定歡聲四騰無一可為陛下憂者自此兩宫欣慶父子交歡中外翕然夷狄妥服陛下於此之時可以適聖意可以安聖躬必無橫議以擾聖聽如今日矣豈不樂哉豈不樂哉兼慈福册寶之禮冬至上表元日舉册皆須陛下親詣重華然後禮成目今若更不出則是時陛下前日降詔播告天下謂朕當親率羣臣恭上册寶若此禮不成則詔書之言失信天下何以立國此尤大非便者陛下必不肯至此極也陛下今能一出自此以後時時可以過宫至上册寶之日則翠華之出自如頓足易耳臣荷陛下親賜拔擢事陛下如事天地如事父母竭誠瀝血以冒天聽死有餘罪惟陛下鑒其忠誠亟賜矜從而速行之宗廟社稷無任幸甚説友又上奏曰臣等比以車駕久不過宫乞宣引同班奏事伏蒙聖慈俾並進於玉階方寸之地臣等於初七日至東華門伺候宣引間續準傳旨改用今日臣等今區區之誠正以過宫一事欲得面控悃素臣等竊謂父子之道天性也以夀皇至慈陛下篤孝顧何待臣等譊譊冒溷聖聰苐以近日之事觀之陛下朔望不出許以進香進香不出許以上夀上夀又復不出明降指揮二十八日必出萬姓歡呼踊躍以望翠華又復中輟重失人心莫此為甚旋聞展用月旦今又聞欲用十五日仰惟陛下臨御萬方以信為本成王翦桐為戲周公遂封康叔以為天子無戲言況過宫美事孝治所繫四方所仰而反汗至于再三實恐因此朝廷命令無以行于四方載惟陛下容納直言雖小臣忤旨亦不加罪然言雖容而不行事欲濟而復輟日復一日寖為常事關係非輕今來欲望聖慈確然不易則社稷幸甚臣等幸甚萬一聖心未決姑示順從使臣等無辭可措至臨期不出則又失信於中外良可惜也臣等前此居家俟罪本不敢供職既蒙許以宣引故黽勉就列以兾望一瞻清光如又未決臣等何顔尚在班行非敢數忤雷霆自取誅斥誠以三軍萬姓不知宫禁中事不知聖父聖子慈孝本自無他怨讟橫生至不忍聞恐自此不已馴致叵測非敢以引退為髙以合班為美正欲感悟聖心以消弭未然之患也冒犯天威臣等無任惶懼俟命之至説友又上奏曰臣近以事勢迫切常貢封章乞早過宫以弭外變雖小臣狂僣宜在譴訶然父子之道本由天性仰惟陛下天資誠孝聖度髙明當此憂危之時豈無感動之念庶幾俯鑒愚慮或可少回萬分而側聽旬日警蹕未鳴人言嗷嗷日以滋甚事勢岌岌不勝憂虞臣才非中人位叨從列悉由親擢大恩未報目擊人情之已迫誠恐禍變之鼎來豈當固位謀身不以盡告君父自古人主所恃以長久者惟在於結人心人主君臨天下雖貴為無敵富為無倫然得人心則安失人心則危安危之間不在富貴在於人心之得失然耳故人主自稱曰孤自稱曰寡人曰孤曰寡蓋言富貴之不足恃而此身之常可憂也是以得人心者則天助順人助信致宗社靈長富貴長久失人心者則土崩瓦解日銷月亡使社稷為墟身危國滅理之必然無可疑者今夫人心秉彛之同然無出父子之至愛雖在襁褓之內皆知父子之親閭閻小人街談巷議或以不孝而指目皆欲忍死而力爭其間悖逆之果萌則必衆人之共棄蓋其義最易見而其道最易知其事為大逆而其名甚不美何況君上師表萬民其他闕失尚可自文或蹈此名豈復可立儻不念人心之同欲或有乖父子之大倫雖使無知之童皆有不平之念其事至此於心何安今天下之人皆知事夀皇而陛下豈不能事也然自新嵗僅一行禮自春徂夏四閲月矣未聞再講也日復一日氣候向炎而定省愈闕人謂陛下何心哉方春和時御苑競秀未聞恭請也玉津近地乘輿獨出而過宫不講人謂陛下何心哉人言必曰陛下怠於事夀皇則人心自是亦將怠於事陛下矣夫衆怒難犯衆言難一向也心自私怒今也勃勃然怒形於色矣向也口自私言今也嚚嚚然傳於道矣有父子然後有君臣此天地之大經古今之通誼也陛下能以子道事夀皇天下必以臣道事陛下今衆而羣臣次而多士次而六軍又次而百姓家有家喙市有市閧莫不怨嗟流涕疾視不平皆有為夀皇太息之意無復察陛下過愆之迹設或一夫鼓倡指目問罪大義所迫千百從之頃刻之間人心瓦解覆亡禍變倐在目前陛下雖欲安處九重之內必不可得也所謂夷狄之窺伺盜賊之嘯聚者不與焉陛下果何所利而聖意乃安然不移哉臣願陛下念人心背違之甚易維持之實難深鑒將來之憂以為亟圖之計翻然知悔即日過宫則人心怡然而定聖德愈久愈新既兩宫之交歡無一事之可慮矣豈不樂哉豈不樂哉今天下謂陛下非不知父子之至愛骨肉之至情朝夕親闈歡娛膝下而陛下每依違而不決畏縮而不敢者謂有所疑而不得行也執政大臣朝夕奏對冀陛下天理之復明良心之復返釋去往咎以新是圖陛下每齟齬而難言迫急而後應者皆有所疑而不自決也不審陛下疑於夀皇者果何事歟而陛下知夀皇之有他意者果得于誰歟恭惟夀皇聖帝所以愛陛下者可謂至矣姑言其實有二説焉陛下亦嘗躍然默動於心乎亦嘗油然自覺於中乎臣請為陛下言之陛下之在王邸也魏王兄也猶無恙也夀皇聖帝斷以獨見不惑羣議度越魏王而正陛下於儲宫非夀皇愛陛下而然歟陛下之在儲宫也春秋漸髙多閲義理髙宗皇帝仙馭上賔夀皇雖在衰絰之中而即授神器曽不肯少遼緩也非夀皇愛陛下而然歟夫以夀皇之愛陛下如此陛下獨何疑於夀皇哉借曰夀皇懷不足於陛下則已事之驗不待今日始見矣況夀皇之愛子惟陛下一人非若漢唐之他母諸王也夀皇之倦勤軍國之事一不預知非若唐室之父子嫌隙也親父親子揖遜授受何疑何忌乃有二心必因左右之小人務欲狂惑於天聽故立異論蕩搖上心使父子之暌離則姦邪之得志小人情狀豈不易知料聖心無故而致疑必邪論浸淫之已甚設或夀皇聖帝義方加篤威顔過嚴陛下執禮恐違小心多畏尤宜勉竭以盡歡愈豈可因循以圖避免非惟貽謀於後世亦將少掩於外觀今若徒懷自疑不信正論則父子之愛無乃截而為二乎宋繆公父子自言曰生毋相見鄭公母子自誓曰不及黃泉毋相見也此皆亂世召變非常聖明之朝豈宜有此且夫怨岔曰仇角勝曰敵仇敵二字言於交遊施於鄰里客氣所使萬一有之兄兄弟弟猶以為諱孰謂父子可與仇敵相似哉舜之父瞽瞍至難言也而夔夔齋栗瞽瞍底豫陛下之蒙愛夀皇者非曰與舜並言也果何所事而為自疑疑心一生必至怨忿怨忿既深遂成兩敵夀皇何負於陛下而言笑不接定省久違幾於怨忿角勝之為乎臣願陛下觀夀皇愛子之切至體夀皇遜位之誠心釋去外疑速講定省翠華甫駕喜溢慈懷既成父子相見之歡即驗彼此無可疑之實尚何疑哉尚何疑哉臣學問荒蕪語言失緒雖屢騰於奏牘曽未契於聖聰然而職在論思有犯無隱故為陛下首陳結人心之説以防禍變次述毋自疑之説以開聖懷欲乞陛下亟用初一日告朔之禮速賜過宫天下之人見者目悅聞者心喜以銷旱變以召和氣一反覆間轉禍為福聖德彰大流傳無窮若陛下視為常事安於無虞茍免因循恬不加悟則不美之名愈播不平之心愈激立召一朝之患遂成終身之憂社稷傾危生靈隕潰禍變之至不待瞬息雖欲悔之將何及矣臣忠於愛君迫於憂國不避誅斥盡瀝所陳惟陛下勿以常言而忽之説友又上奏曰臣仰惟陛下聰明仁哲超邁古昔臨御以來勤恤民隱勵精庶務以開有宋無疆之業歷年將久聖德昭聞皆由天縱之聖非矯拂勉強所能為也夫以陛下天縱如此至於事親思孝人道大倫宜在陛下所躬行而允蹈者夀皇為天子父陛下必曰吾所當敬事也重華逺于南內陛下必曰吾所當問安也事親之道要是陛下天性之生知聖德之餘事耳而近者定省闕禮過宫愆期宰從百執抗疏昌言甚而排闥引裾扣頭􅅹血愛君之誠出於切至臣雖愚陋亦嘗四貢封章以冒天聽然而清蹕未聞日復一日人心搖動中外憂皇臣幸進玉階方寸之地不敢為危言以驚動聖聽膚寸管見惟陛下少留意焉臣位列從班出入禁闥比因羣臣奏對嘗聞聖語二三曰孝為百行之先又曰朕欲得與夀皇相見又曰終須過宫天理昭晰良心渾全陛下知所以事父蓋甚不忘也而趦趄未行欲駕復輟者聖心殆有所疑也仰惟聖心所向非外庭小臣所可測識然事之曉然明白斷無足疑則如臣輩可以逆料臣兹有四説以釋聖懷陛下往嵗固嘗有疑矣遷延猶豫凡八閲月羣臣封章抗疏不知其幾聖度優容盡釋疑慮竟納羣臣之論奏遂回父子之良心仲冬既望長至元日而過宫者三焉册寶禮成兩宫胥慶雨雪應瑞羣氛消除四方萬姓歡欣鼓舞當是時也夀皇天意欣愈欵留竟日方陛下娛侍膝下凡夀皇歡然相接之意陛下所身親也夀皇拳拳愛子之實陛下所目擊也則凡前日所謂自疑者聖心尚何疑哉夫後之視今亦猶今之視昔以前日徒為無故之疑而終於無可疑之事則今日之有疑者亦猶前日無故之疑矣此臣所謂無可疑者一也自古父子之間固有嫌且隙者矣諸子有嫡庶則毁譽不同諸母有先後則愛憎隨别或有讒言毁間而易所愛者或有他母浸潤而易所愛者不幸當此之際則父子誠有難言若夫夀皇之於陛下則異是矣夀皇聖子有三惟陛下在非有諸母諸王之隙也夀皇斷自聖意早正陛下於儲宫髙宗上賔夀皇亟禪陛下於帝位揖遜授受誠與堯舜禹並行則夀皇之愛陛下可以於此而自信矣今也聖意懷疑牢不可破此必小人邪言仰惑聖聽夫以聖度髙明小人之言必自洞見然而姦人巧計欲為亂階往往遊談之間浸潤之力陛下聞其言之時雖不覺其有意然日漸月漬夙留宸𠂻先入固已多矣陛下一入其言聖意豈得無惑惟願陛下體父子之至情察小人之邪志靜思默慮判然無惑此臣所謂無可疑者二也夀皇聖體違豫今已彌月竊聞聖恙始苦泄㵼遂成虗弱灼艾纍至數百丹劑不絶供進當此長夏飲食減少後生壯嵗猶費調治何況春秋既髙豈宜久抱疢疾醫官日申一一可考陛下當此之時非與平居之時同也非惟人子之心所宜急於視疾兼夀皇尤欲一見陛下夫當疾病之未愈思見骨肉之至親才侍慈顔必寬慈抱慈抱寬則疾自愈于此時也安有纎毫異意於陛下哉此臣所謂無可疑者三也臣竊聞二十四日陛下命嘉王詣重華宫問安雖陛下過宫少愆而皇子將命以往中外軍民以手加額皆曰陛下過宫有期矣嘉王問安之後當有復命之奏必曰夀皇之疾猶未安也臣竊意陛下於此必動心矣又曰夀皇之意欲見陛下也臣竊意陛下於此必興念矣嘉王陛下親子非若羣臣之踈逺也陛下因嘉王傳道之語即可信夀皇欲一見陛下之心矣此臣所謂無可疑者四也臣竊惟自古忠良之臣所以舌弊脣腐譊譊而不肯置者皆欲吾君無過共入於堯舜三代之域今日過宫愆期本於陛下自有所疑耳如使臣子不識事幾倡為駭論當果有可疑之時而妄為無可疑之説以誤陛下一行遂成後悔則臣子之罪誅戮有餘惟今日之事凡夀皇之愛陛下陛下之事夀皇父子至情了無一事一物見於實迹之可疑者臣子於此儻不能百口祈哀冒死不顧以告君父其誤陛下雖萬死莫贖也兹幸自兩三日來夀皇聖體稍就向安此蓋祖宗在天之靈宗社無疆之福願陛下亟於此時不俟羣臣奏請不俟過宫日分斷自聖意即日過宫當夀皇稍安之時而見陛下修問安之禮慈抱必大歡愈天顔必大喜悅聖體餘恙自然頓減則翠華一出豈不勝於良藥美劑萬萬哉孝道以明聖德以著以收人心以息譁謗以弭禍機凡此數者甚非末節細故也臣愚瑣碌碌以朴忠自信蒙陛下連年親擢叨塵法從大恩如天無路以報用敢不避天誅控布一得之慮以感動聖念迫於愛君言不知諱惟陛下諒其忠悃而赦之臣不勝叩頭􅅹血戰灼待罪之至説友又上奏曰臣等竊見今月十八日權刑部尚書臣京鏜奏事乞早過宫面奉玉旨令與部中同官審實二十六日權户部侍郎臣袁某奏事乞早過宫靣奉玉旨令與部中同官商量臣鏜臣某即以聖語宣諭臣點等竊惟過宫之禮本是陛下常行之事止緣愆期纍月事親之道全然墮廢是以臣等冒死祈哀控告君父雖極其懇切而清蹕終未一行今聖意所嚮猶曰審實又曰商量則是尚懷疑豫而未決也夀皇聖帝聖體愆和逮今浹月醫官日申歷歷可考尚何審實車駕過宫問安視疾陛下行之自是常禮尚何商量恭聞夀皇聖體數日來疾勢進退飲食全少後生壯年尚費調治何况春秋既髙豈宜久此抱疾兼聞慈抱以未見陛下朝夕不樂不肯服藥事體憂危莫此為甚陛下儻於此時即駕乘輿少修定省非惟夀皇當疾疢之中得見陛下必大喜悅不藥自愈而陛下闕禮之久才得過宫亦可少息軍民之憤兼自旬日以來居民搖亂遷徙大半居城內者則移居村落居近郊者則移居旁郡富家競藏金銀市價為之倍長甚而兩宫閣分囊櫜潛歸私室自謂亂釁只在目前此皆亂世亡國氣象聖明之時豈宜有此陛下雖深居九重豈不聞知竊料聖意必謂過宫少愆未足致亂然父子之道絶是謂逆天孩提之童無不知愛其親若不知愛親是謂悖人自古逆天悖人禍亂未有不作誠恐一夫問罪或有響應陛下豈得不寒心也臣等實以今來事體止在陛下一過宫之頃外此實無可以審實可以商量之事惟望翠華一出大勢自定以收人心以遏禍萌莫此為急儻陛下遷延猶豫尚求審實商量之説則臣等實未知死所也迫於愛君再三干犯天威罪當萬死惟陛下裁赦説友又上奏曰臣等連日號泣五上奏牘以大行至尊夀皇聖帝奄棄萬國陛下為人之子既不臨喪又不視斂既不舉哀又不成服中外憤怨萬口一辭乞速賜過宫少回子道少弭禍機鑾輿寂然天理盡絶不知臣等所奏陛下略賜睿覽否凡數日來三軍怨謗之語百姓駭愕之憤皇天后土譴怒必深臣等已具載于纍奏矣雖陛下自知於理悖逆欲得少文其過遂降指揮託疾未往然民心至愚而神豈能罔以虛語纍日外傳陛下宴飲如故宣喚俳優託疾之言人固不信又聞聖心懷歉親挾弧矢欲以自防不知陛下何所利益而自危其身一至於此臣等實為陛下痛惜之也夫避害就利違禍向福誰無是心陛下天縱聰明而纍月以來因不過宫自基禍本今又聞喪不赴子道盡廢天下訩訩神人交憤何苦自欲捨利就害背福取禍而繆戾若是哉臣等實所未曉也今夀皇之喪已八日矣藉使果有疾病尤當力疾奔赴今陛下安處深宫歡宴自如使閭巷之間有父之喪為其子者涉八日而不一奔慟陛下見此等人必當深嫉之而陛下貴為天子豈可躬蹈而身履之耶今事至此已極矣軍民之怨憤已深矣天地之怒氣已見矣十三日成服之夜白虹亘天古人以為兵象陛下觀此天變觀此人心儻陛下不憂不懼不悔不悟臣等將肝腦塗地陛下雖欲君臨天下臣恐不止於寡助之至親戚畔之而已陛下豈可不略為之寒心哉臣願陛下痛念慈父罔極之恩少盡人子哀慟之戚速嚴法駕慟哭梓宫之前以謝前愆以銷禍本如更不然臣等與百姓三軍皆未知死所矣危亂已迫不復忌諱惟陛下以宗廟社稷為重而亟圖之説友又上奏曰臣痛哭泣血以言今月初九日大行至尊夀皇聖帝奄棄萬國天崩地拆禍變非常內外百官三軍萬民誰不痛心􅅹血號慟之聲逺近相接陛下聞喪之初謂當痛咎前日久不過宫遂成終天之訣不俟命駕便當如嚮來夀皇聖帝初聞髙宗大漸之時以小轎便路急趨宫闈雖不得父子一見猶當括髮哭於斂床留宿喪側親視百官有司辦集後事以俟舉哀成服尚未足以贖前日久不過宫之過不謂陛下皆大不然凶訃初傳從容御朝廷見臣下雖對宰執及羅點玉音有便當過去之語而陛下一自退朝至今八日安坐深宫起居服御並如常時視父之喪如他人事略不少介聖意喪禮並不舉行臣子軍民驚愕駭異怨憤謗讟不可聽聞從官羅點等同臣皆是蒙陛下厚恩忽見陛下人倫天理棄滅皆盡人子之道毫髮不存外議沸騰惡名太過已不可掩不忍陛下一旦自陷不義至於此極自初九日連貢封章控告陛下乞早過宫使陛下俯聽臣等所奏即駕乘輿猶未足以塞中外之責而陛下一切不聽更為杜絶草奏之計明示不肯執喪之迹不知陛下何所利益而甘心受此大不美之名耶臣不勝日夜痛哭哀苦號天扣地深為陛下惜之也陛下貴為天子天縱聰明而子之事父與父之既死子之執喪皆是目前易曉之事閭閻三尺之童誰不知之不知陛下何獨懵然於此而略不知也假如市井之間有父之喪其子異居於百步之內父疾不問父死不往號哭之聲不聞衰絰之服不舉行路交詈鄰里共攻陛下若聞此等之人竊意聖心必亦深不平之今陛下乃安然蹈此殊無顧避憚恤之意陛下試思軍民萬姓寧無痛心疾首於陛下此舉者乎寧無懷憤積怒於陛下此舉者乎寧無不為夀皇伸氣復怨於陛下此舉者乎陛下不此之思但欲自信前日無故之疑欲快今日恣為之志不恤慈父不顧天理不畏人言惟意所欲自為得䇿軍民萬姓無若我何夫使人主而可以為此則是自古亂亡之君傾危之世皆可以獨恃此説無亂以至於今矣天下安有是理哉今陛下既不臨喪又不舉哀既不成服又不過宫軍民之憤已不可遏雖是前日太皇太后降旨謂皇帝以疾而陛下亦降指揮謂痰眩未能過宫此固欲少寬三軍萬姓之責然誰不知借疾病之説以文其過若降指揮之後或一日兩日間隨即過宫尚可略弭禍機自十三日成服之後傳陛下欲以十五日過宫盡行喪禮今又不然愈覺人情交憤禍萌益張國勢之危過於纍卵陛下何苦於無事無故之中而輕為危亂滅亡之事乎臣不勝哀苦痛極重為陛下惜之也未審聖意竟欲何日過宫唯復候事稍定而後命駕或候人情稍安而後一出抑終於永不過宫耶若候事定而後行今成服既畢喪事種種朝廷皆已節次施行事初未嘗不定人情訩訩正緣陛下有父之喪泰然安處所以人懷憤怒若清蹕一行人情自然浸定若謂永不過宫則是陛下不復以祖宗社稷為重矣夫自天地開闢以來國家滅亡社稷傾喪亡慮數十陛下觀史之際豈不洞見所謂滅亡傾喪皆因無道不義不知悔過以至於此陛下毋謂宗廟社稷可以任意肆志而能長守永有者也十三日成服至夜二更白虹貫天自東而西連亘不散都人皆見之臣謹按漢鄒陽傳言白虹貫日釋者謂白虹兵象也陛下觀此天象豈可略不知懼今最可憂者三軍之士感夀皇之厚恩一旦聞喪朝晚哭聲震動營寨見夀皇方疾陛下久闕定省之禮親侍湯藥曽不一講諸軍已懷憤怨又見夀皇既崩陛下聞喪不顧喪禮既廢孝子常禮並不舉行纍日以來偶語訛言真有疾視其上之意前日白虹亘天之象陛下豈可不略動聖念為之寒心耶陛下豈不見近日北方猶能為其祖持三年之喪乎北方者草昧初開文物之未備制度之未詳尚能知莫我夀皇三年終喪之孝慕德鄉義以為一方盛美今陛下為中國之主統人道之教何為甘心不能為他人之所能為者乎陛下儻念慮及此臣竊料聖意必赧然顔汗而心愧也況目即已差賀生辰使人又差告哀使二使既到敵境或敵中館迓使者或其酋主皆問及陛下不持父喪之事不知二使何以答之貽笑逺人輕侮中國萬一遂為問罪之目有南下牧馬之意不知陛下又何以應之此臣子所以尤心悸而股栗者也兼陛下安處宫中更不成服又不知命駕登輦之時所服何服宰執奏事之頃以何服見若猶用吉服則陛下是全不以天地祖宗父母為念矣竊恐重得罪於天下陛下將何以君臨億兆鎮撫夷狄哉夀皇未上賔之前陛下不肯過宫猶曰自有所疑恐夀皇有所加於陛下也是以趦趄而不敢往今日之事與前日已大不同哀哉痛哉夀皇已棄陛下而仙矣陛下前日之虛疑今尚何有不知何所疑畏而復如前日猶豫而不行耶中外之人嗟嘆駭愕深不曉聖意之所在臣願陛下鑒臣之言略加聖慮以亂亡為可畏以社稷為可危即降指揮過宫行禮念慈父罔極之恩盡人子哀號之苦聖駕一行易危為安變禍為福不勝宗廟社稷四海蒼生之幸臣今來拳拳所奏豈為身謀止緣受國厚恩蒙陛下親擢愛陛下至切憂陛下至深欲陛下為至孝至賢之君願陛下有順天得人之美自四月以來臣所以自嘗三上奏劄乞早過宫兹復控􅅹肝膽直言禍亂以犯天聽惟陛下財幸而亟圖之臣雖就鼎鑊死亦榮幸光宗時朝散郎祕閣修撰權發遣潭州軍州事兼管內勸農營田事主管荆湖南路安撫司公事馬步軍都總管借紫臣朱熹謹昧死百拜上疏皇帝陛下臣近者竊聞陛下過宫一事多有論諫未蒙採納屢降指揮尋復寢罷觀聽惶惑傳聞駭異如臣孤賤踈逺竊伏草茅不聞外廷末議初不敢妄有開説塵瀆聖聰特以今此蒙恩起當藩屏之任靜思所職上關國體若朝廷正綱紀立主德修人心悅則守土之臣雖極駑鈍尚可憑藉威靈勉自驅䇿以稱任使儻根本動搖腹心蠱壞大勢傾壓無復可為則中外之臣雖有竒材逺略亦無所施况如迂愚雖欲捐軀報國亦何所用其力哉是以不能自已有不容不為陛下言者然臣所讀者不過孝經語孟六經之書所學者不過堯舜周孔之道所知者不過三代兩漢以來治亂得失之故所講明者不過仁義禮樂天理人欲之辨所遵守者又不過國家之條法考其歸趣無非欲為臣者忠為子者孝而已今者取此以為言則在廷之臣言之悉矣陛下聼之亦熟矣捨此以為言則自古天下國家未有可以外此而為治者臣今亦不敢廣引前言備禮上疏以釣敢言之名而歸過於陛下請獨以父子天性之説為陛下流涕而陳之臣聞人之所以有此身者受形於母而資始於父雖有強暴之人見子則憐至於襁褓之兒見父則笑性何為而然哉初無所為而然此父子之道所以為天性而不可解也然父子之間或有不盡其道者是豈為父而天性有不足於慈亦豈為子而天性有不足於孝者哉人心本明天理素具但為物欲所昏利害所蔽故小則傷恩害義而不可開大則滅天亂倫而不可救假如或好飲酒或好貨財或好聲色或好便安如此之類皆物欲也清明之地物欲昏之則父或忘其為慈子或忘其為孝然後造為讒慝者指疑似以為真實毫髮以為丘山譛之於其父則使施之於其子者不無少過譛之於其子則使施之於其父者寖失其常然後巧為利害之説以劫之蓋謂如此則必受其利不如此則必蹈其害利害既有以蔽其心此心日益猜疑今日猜疑明日猜疑猜疑不已子一舉足而得罪於其父父一出言而取怨於其子父子之情壞而禍亂作矣試於暇時或於中夜或於觀書之際或於靜坐之頃捐去物欲之私盡祛利害之蔽默觀此心之本然則父子之間固未嘗不慈且孝也臣竊觀陛下天資仁孝初政清眀進退人才動合公論一言之善天下誦之豈獨於天性至親反用其薄況備物之養無大虧闕政事之間無大更革過宫定省本非難行猶豫遲回動踰時月亦獨何也無乃事起於纎微情阻於踈闊方間隙之將萌羣臣不能救之於早及形迹既著又不能察陛下事親之本心且無以和陛下父子之情往往語言拙直援引過當其心雖忠於陛下而不足以感悟陛下之聽徒以激怒陛下故近日臨欲過宫而復輟者陛下未必不曰身為萬乘之主乃不得一事自由乎故不肯屈獨斷之權為羣論所迫耳而陛下父子之情所以至此者臣竊料陛下即位之初便有姦人造為邪説離間陛下之父子如一飲宴之失夀皇慮陛下或怠於為政一言動之愆夀皇憂陛下或至於成疾此皆愛陛下之至切故或形於言而不自以為嫌其意惟欲陛下遷善改過正心修身以奉天地以承祖宗為有宋萬年無強之休而已曷嘗有纎芥忿恨如浚井塗廪之意哉而姦人因之造為危語往來間諜以誤聖聽不唯使陛下之身常懷疑懼而使陛下之宫中亦皆嚴憚重華而不敢親近日逺月踈間隙愈大天下之人但見夀皇慈覆天下而於陛下為尤篤陛下所以事夀皇者乃不以孝聞而以失禮聞又不知其為羣小之姦而直以為陛下之失街談巷議偶語族談至有臣子所不敢聽者臣恐不惟如此一旦上帝震怒匹夫流言草野僣亂將仗義而起又致外侮興問罪之師當是時六軍之情能使之親附乎萬姓之心能使之固結而不解乎讒邪之人雖復臠而食之其能有及於國家之敗乎如臣之愚雖百千輩咸欲粉身赤族為陛下死其能有補於社稷之存亡乎又聞夀皇聖躬比者小愆和豫雖未必因此而天下後世寧不曰意念鬱鬱而至此乎夫事固有失於毫釐之間而遂至於不勝悔者臣子之所不忍言而忠於事君者亦不敢隱也昔漢文帝徙淮南王少失思慮而尺布斗粟之謡終身病之夫以兄而不能容其弟雖賢主不敢自恕其過也況以天下之大而不能容其父乎為今之計先遣大臣謝罪於重華次發明詔告諭在廷言前日之所以不能無疑者以讒邪惑亂之故誅此姦人以謝天下屏斥餘黨還始初之清明即日駕過重華問安侍膳以盡父子之歡如此則天下歌舞四夷尊仰書之信史以為美談反危而安特在陛下反覆手之間耳今愛陛下之切者中宫也嘉邸也忠陛下之至者二三大臣也願出臣章與之參訂必有以知臣之惓惓於君父而其言雖陋實宗社之至計也限守逺郡無由請對而忠憤所激不能自已是以冒死拜疏痛哭流涕而極言之唯陛下赦其狂瞽臣冒犯天威無任震懼殞越之至醴泉觀使周必大上奏曰臣聞自天子至於庶人無不以孝為本漢以火德而興本朝亦用火德王天下按五行火主孝故兩漢帝號自孝惠而降皆冠以此字至本朝亦然今陛下受天眷命光宅中夏太上皇帝皇后春秋鼎盛而得陛下之聖子就天下之至養無疆之慶自今以始又有慈福太皇為曽祖母重華皇后為祖母宫闈鼎立自古簡册所載人主奉三世之親如今日之盛者鮮矣凡定省之誠奉養之勤充陛下天性之孝光于祖宗使火德蕃昌照臨萬方在聖德固優為之何待贊也臣偶有愚見輒冒言之漢百官公卿表皇后有詹事而皇太后亦有長信詹事景帝中六年更名大長秋或用中人或用士人夫以椒殿深嚴猶參用士人典領宫掖況太上皇帝居東宫者踰二十年即帝位者已五六載用人多矣其間豈無久被簡知可備顧問者今娛侍左右不過中貴數人誠能若稽古昔乘間奏請稍沿漢事於太上舊臣中遴擇一二人入則侍清間出則從逰幸談論賡歌以樂聖懷斯亦養志之大端也若謂古誼不可遽行臣請引近事為證靖康初徽宗內禪之後首命中書舍人談世績等以顯謨閣待制主管龍德宫甚被顧遇至今以為美談髙宗內禪夀皇亦嘗命錢端禮使德夀宫惟重華移御日淺未暇及此況纍朝止奉母后比近世事體不同惟陛下與大臣熟議酌古今之制而行之吏部尚書趙汝愚上奏曰臣竊惟人君以一身而居兆庶之上其能使四方萬里環拱內向奔走服從而不敢少慢者夫豈一人之力能勝四海之衆哉必有至德要道能以素服其心爾夫父子之道天性也非獨賢者有之愚者亦有之非獨貴者知之賤者亦知之也故一人孝敬於上則千萬人感悅於下所敬者寡所悅者衆蓋以天性之所同也人君於此一或有闕則上自縉紳士夫下及庸夫販婦逺至四夷蠻貃皆得以議已非若其他一言行之失一政事之差其利害所能比擬也故經曰聖人之德無以加於孝至論天下之治亦莫尚於孝人君能以孝治天下則能得萬國之歡心以事其親而其效至於天下和平災害不生禍亂不作茍異於此則將失萬國之歡心矣萬國之歡心既失則將譴告出於天而災害生於上怨讟興於人而禍亂作於下如是而能享國長久者臣未之見也臣愚伏望陛下熟復先聖之言深惟治亂之本日遣信臣謹問安視膳之禮時乘法駕修五日一朝之儀凡羣臣有贊陛下早過重華使兩宫慈孝者是皆為陛下忠謀而有補於聖德臣願陛下信之聽之而勿疑凡有為離間之詞使兩宫疑阻者是皆姦人私自為計以誤陛下聖聽臣願陛下察之逺之而勿惑自今父子歡然中外悅懌四夷聞之必自敬畏姦宄聞之必自退伏宗社幸甚生靈幸甚汝愚又上奏曰臣等伏見陛下自三月過宫之後至今半年有餘不到重華慈福兩宫此月十二日故事進香最為盛禮前數日陛下既許臣等過宫甚確臣等亦謂陛下尊為萬乘體貌大臣浚發玉音蓋無不信之理縉紳傳聞朝夕顒望方以為慶至期又以免到宫為辭車駕不出羣情愈大失望今會慶聖節近在兩日人心憂疑羣情鼎沸臣等雖聞已有指揮二十二日車駕詣重華宫上夀然人情尚恐臨期或至反汗未免疑懼竊惟陛下父子天性豈待臣等多言苐恐有離間之人誤陛下過為疑畏陛下胡不以已行之事驗之乎去年會慶節及冬至日皆是有司夙戒法駕在庭陛下雖一時中輟不行然夀皇慈愛不介意方是時陛下固不無疑畏之心矣逮十一月二十二日車駕一到重華則父子歡然終日燕樂直至迫暮秉燭而歸陛下前疑無不頓釋臣等竊觀比日事體與去年初無小異陛下果何憚而不行乎今夀皇春秋益髙人子之心所當喜懼正是陛下愛日之時定省之禮豈宜久廢萬一夀皇有微爽四時之和陛下將何以避此名乎會慶聖節湛恩錫宴上自朝廷下及郡縣官吏自一命以上無不鳴鐘擊鼓飲食醉飽盡終日之歡設若陛下是日復以他事為辭臣等竊料北內淒涼殊無聊賴惟夀皇一人而已陛下誠思及此亦豈能恝然不動於心乎臣等竊觀季秋以來近則太白犯心熒惑入太微黑祲並起地如雷震逺則水旱交作延及數路郡縣空乏無以救恤天意人情咸大可畏臣等選懦誠有旦夕之憂陛下聖學髙明能晏然不以為慮乎伏望睿慈深鑒古昔有治有亂有安有危斷自宸心翻然悔悟以天命為可畏以人心為難保以事親為至德以讒言為商鑒恪守昨日已降指揮勿復更易以成陛下之信躬率羣臣奉觴稱夀退即宫中慈孝兩盡用家人之禮以成陛下之孝兩宫吏卒都城百姓歡喜望幸人得所欲以成陛下之仁陛下一舉而三善從之自然輿情感悅景貺繁臻宗社延長生靈慶幸冒瀆威尊臣等不任惶懼隕越之至汝愚又上奏曰臣伏見今月二十二日會慶聖節百執班庭有司夙戒都人夾道徯望清光而俟立久之忽傳重華恩旨令免到宫一時群臣相顧駭愕初不知其所以兩三日來道路之間妄興訛謗傳播多端然臣等備數邇聨初亦疑是陛下是日晨興微有感冒故未能出蓋甚不得已也今早臣據講筵所關報來日開講臣甚喜聞聖躬即日無他以得瞻天顔為幸然妄意竊謂會慶盛禮千載一時今法駕猶未至重華而先視朝開講非惟事體未順亦恐無以解都人之疑伏望聖慈特降睿旨權住來日開講幸今節日未逺尚可先到重華略舉玉巵為夀之禮實為家國大慶或聖體畏寒猶未能出雖少遲三數日視朝蓋亦未晚臣久荷恩私誼圖補報惟欲增益聖德不敢茍為身謀輒貢瞽言死有餘罪惟陛下幸赦其愚汝愚又上奏曰臣等仰惟大行至尊夀皇聖帝奄棄天下天崩地裂海內摧痛而陛下聞喪纍日猶未奔訃六軍萬姓尤切痛心伏觀古者有喪必有主若無後者猶以朋友州里舍人為之今陛下親為夀皇之子承付託之重而有喪無主何忍至斯臣等屢乞宣封面陳悃愊又繼入文字陳説利害而天聽髙邈殆如不聞今有司卜用十三日大斂成服陛下若失此時不出則是永無可出之時矣遺詔皇帝成服三日聽政今陛下既未成服不知何時遂可聽政耶禮法蕩然綱紀盡壞開闢以來所未嘗有臣等適備員輔近痛心疾首無地自容兩日以來市井之間興訛造謗無所不有千怪萬狀不可聽聞臣等一身不敢愛死所可恨者太祖太宗創業艱難髙宗中興十年力戰今勢如纍卵誠可痛爾伏望聖明早賜開悟速降指揮來日過重華宫大斂成服庶幾可以收拾人心少延國祚若更失此機會則陛下之事去矣臣等蒙國厚恩不避誅戮控瀝血誠冒瀆威聽不任哀號隕越之至汝愚又上奏曰臣等纍日不獲瞻望清光兼有合奏稟事件昨日乞詣後幄引對承御藥院傳旨别日引緣其間有一事尤為急切不敢不奏知臣等昨日初議緣十三日已奉太皇太后聖旨皇帝以疾聽就宫中成服依故事合請聽政臣等已奏知及具表文將詣後殿門外拜發而禮部太常及侍從臺諫下至學官皆有文字以為陛下嘗有指揮候疾稍愈日過宫燒香行禮百官有司以此延頸顒望車駕先一過宫於大行梓宫前衰服哭臨行祭奠之禮臣等亦得於素幄之前面致慰禮退而三上表請聽政及將來釋服御殿皆可次第舉行則於事體無有不順伏望速降指揮俯從典禮臣等量度事勢鑾輿暫出萬無他虞其於聖德實非小補臣等無任􅅹血竭誠哀懼祈請之至汝愚又上奏曰臣等伏見今月初三日大行夀皇聖帝大祥初五日遂終易月之制羣臣例當釋服而百官有司紛起論議咸謂陛下自宫中成服之後至今未曽一詣几筵哭臨成禮羣臣亦未曽於素幄面慰綱常盡廢何以為國衆議爭執未肯釋服臣等朝夕慚懼無以鎮壓伏乞陛下勉為宗廟社稷之計俯徇羣臣輸忠之請特降指揮於初三日早詣重華行大祥之禮猶足以少慰人心稍存典禮古所謂失之東隅而收之桑榆者也臣等不任哀痛激切祈天俟命之至蔡戡上奏曰臣聞人主之孝莫大於安社稷非若衆人之孝區區致養而已蓋人主貴為天子富有天下不患無以為養使親安於至養乃為孝之大者唐之太宗明皇掃除禍亂身致太平治定功成尊歸於父髙祖睿宗猶及見之二君之孝亘古莫及故為三宗之冠近者太上皇帝聖躬違豫有虧典禮人情訩訩社稷幾殆陛下上迫太皇之命下徇臣民之請光履帝位君臨萬邦詔令一頒中外欣戴軍民帖然頓還舊觀不動聲色而宗社再安慈闈萬年永享天下之養陛下之孝如何當是時太皇猶豫而不決大臣逡巡而不發陛下退托而不敢當禍變不測宗社得以安乎三宫得以安乎陛下得以髙枕而卧乎以是知陛下功在社稷孝備三宫過於唐二宗逺矣陛下天性仁孝兢兢業業猶以不得朝夕奉親深軫聖念陛下既能盡其大者其小者在陛下不足為也臣竊謂外庭之禮五日之朝不可廢闕萬一聖父尚未康復雖不獲瞻望慈顔然陛下子職盡矣都人見之逺方聞之豈不仰戴陛下聖德以至泰安供奉之物不可不厚奉承之禮不可不至給侍之人不可不擇護衛之人不可不嚴庶幾人子之間不生疑間曲盡孝道終始如一如此則可以格天地通神明加於百姓刑於四海上天佑之下民歸之聖子神孫享億萬斯年之祚天下幸甚戡又上奏曰臣聞孝者百行冠冕孝行一虧它美莫贖夫孝出於人心之所同然可以動天地感鬼神閭里無知之人莫不知有父母孝誠所格天為之降甘露地為之産芝草人君為之旌表門閭里巷相傳咨嗟歎息以為美事儻不順於父母天地之所不佑震之以雷霆王法之所不赦加之以誅殛人倫之所不齒幾無所容於覆載之間蓋父母子之天地父母生育之天地覆載之父母之恩天地等耳中人之家父母遺之以百金之産猶且飲食不忘窶人之子父母無一金之遺亦思此身之所從來身體髮膚皆父母所授其敢一日忘乎矧貴為天子富有天下所得何啻百金人主一嚬一笑九州四海之所觀瞻一言一動天地鬼神之所降鑒治亂之分禍福之應有不期然而然者又況德莫大於孝罪莫大於不孝其所感召疾於影響吁可畏哉去嵗災異屢見人情訩訩朝不謀夕陛下一枉法駕親朝北宫天意頓回瑞雪隨降人心遂定舊觀復還自春以來不躬定省又復四閲月矣所在闕雨種不入土早禾無及旱勢已成若至芒種雨澤愆期必有赤地千里之憂萬姓惶惶口語籍籍咸謂陛下孝行有虧所以致此孝經曰事父孝故事天明事母孝故事地察傳曰仁人事親如事天事天如事親未有不能事親而能事天者也今郊祀不逺陛下事親如此何以望上天之感格乎陛下臨御初載郊禋之夕風雨暴至不能成禮聖心震驚因而違豫纍月方愈是時陛下未有失德竊料父子之間疑二之心已萌上天所以不享今孝行既虧大非昔比人心已失天意可知萬一有風雨之變千乘萬騎百司六軍倉皇俶擾呼吸之間何所不有人無愚智私竊寒心臣區區之愚欲望陛下回心易慮思念夀皇鞠育聖躬傳受之重莫重於天位付與之大莫大於天下此恩此德比隆天地雖盡萬物不足以為毫髮之報陛下當推孝敬之誠心釋疑似之小憾幡然而改趣駕過宫二聖重歡融融泄泄少盡人子事親之道積此誠意以之事天必獲自天之祐以之示人必得百姓之歡上以弭災異下以銷禍變在陛下一頤旨一舉足之勞耳陛下少屈於夀皇一人而天下億兆之人盡屈於陛下此非特為陛下計為宗廟社稷無窮之計臣位卑言髙觸犯忌諱罪在不赦惟陛下財幸光宗欲幸玉津園祕書郎曽三聘上疏言今人心既離大亂將作小大之臣震怖請命而陛下安意肆志如弗聞知萬一敵人諜知馳一介之使問安北宫不知何以答之姦宄窺間傳一紙之檄指斥乘輿不知何以禦之望急備法駕朝謁不然臣實未知死所也孝宗病革復上疏言道路流言洶洶日甚臣恐不幸而有狂夫姦人托忠憤以行詐假曲直以動衆至此而後悔之則恐無及矣帝意為動寧宗即位初彭龜年上奏曰臣等竊思今日事體最重最宜先致力者莫如陛下往朝太上皇及太上皇后為第一事父母與子既得相見知前日太母册立之因軍民擁迫之意出於倉忙非陛下之本心此心既明父子無疑則天下事以次可施行矣今議者所以遲遲未敢從聖駕之行者但恐有死生不測之憂耳此一種議論害道理賊天性世豈有為人之子而疑父母圖已致不敢見者如此即與前日太上與重華之事何異此理甚近不難見也為陛下計但只一心一德盡所以事父母之道焉有不感動者哉願明詔大臣急決此事勿以外物利害憂迷動其心則議論自定矣龜年又上奏曰臣至愚極陋無益世用幸獲攀附誤辱眷知一旦拔之庶僚之中置之法從之列恩深力小恨無補報惟有區區朴忠知無不言庶以仰禆聰眀俯酬悃愊惟陛下實哀憐之仰惟陛下自即阼以來聽言納諫不啻如流雖臣狂愚亦荷採攬獨移御南內一事臣凡五次口奏始若開肯終於不從如臣過計似不足聽然採之公朝無不疑惑若徒徇聖意泯默不言則臣負陛下多矣臣竊謂陛下此舉於義不安者有二於國不安者有一謹條列如左陛下前日臨踐大寶天下曉然知陛下之心政以重華無喪主也今發引有期而陛下遽有即安南內之意異時攢宫既畢虞主既還几筵之奉誰復主之陛下謂朔望之奠乘輿必出足以安此心乎陛下若以此為孝未足以慰天下之望也夀皇聖帝忍棄天下而不忍委三年之喪而不服斯足以為孝矣故臣謂陛下不終喪不可以移御不然於義不安者一也陛下移御之舉臣固知陛下為父母故爾陛下今日移御之事固便於事父母然為其父母而捨其祖於義安乎古人但云父為祖屈不聞祖為父屈陛下既承大統則當以祖為重比者陛下日侍重華之喪而月為南內之朝於事祖事父疏數中節輕重得宜天下咸服陛下之孝今陛下既欲移御不知亦嘗思夀皇虞主所奉之地乎亦嘗思慈福太皇太后夀成皇太后所處之宫乎若夀皇虞主止居重華則二太后當不離此二太后既奉夀皇几筵於此則陛下不當捨而之它矣陛下若捨而之它則不特夀皇几筵無主而二太后亦孤然於外是為父母而捨其祖此於義不安者二也臣仰惟太上皇帝臨御六年輕徭薄賦仁覆天下不得罪於百姓禁戢掊剋優恤將士不得罪於諸軍接納臣下無大斥謫不得罪於諸臣而天下之心一旦渙然離者陛下抑嘗思其所以然乎今日陛下移御南內以親父母固懲太上皇失事親之禮矣而天下之心猶以為未知懲太上皇失事親之實也陛下今日既為天下之主則當察天下之心向日太上皇之於重華天下之心誰怨誰懟今日陛下之於父母天下之心誰疑誰惑陛下亦嘗知之否耶既知之豈得而違之陛下儻不近訪之諸臣逺察之衆論而獨斷之聖心臣固知其危也臣妄議陛下君臣之隙骨肉之禍將恐在此此於國不安者一也臣言至此痛裂心膂自知辭戅意切必犯威怒斧鑕之誅所不敢逃萬一陛下採納其言以幸宗社臣雖受死亦無憾焉臣此奏欲望陛下付與廟堂大臣反覆熟議若以臣言為是乞賜聽納若以臣言為非乞賜竄逐伏候進止慶元元年三月大府寺丞吕祖儉奏曰臣聞天下之勢久於無事之為可畏本朝立國規模最為長久然治忽消息百六十載而猶有靖康莫大之禍國家中興駐蹕江左揖遜授受使斯民得以奠居者將七十年亦可謂之久於無事矣然於可喜之中而遽有深憂無虞之中而遽生多故事體疑阻人心睽乖皆發於綱常根本之地有非意料所能及矧復乖氣致異可駭可畏是豈可不深察其故而思所以為轉移之方也自紹熙二載初郊之夕風雨暴至禮不克成太上皇帝聖體違豫中外惴恐由是而後問安視膳浸闕常儀臣民之心固已不遑寧處天降大禍孝宗皇帝奄棄萬國侍疾臨喪之志竟莫能伸於斯之時軍民恐讟訛言浸興衆心皇皇人思逃難流傳駭異邉鄙生心國勢阽危至是亦云極矣太上皇后因上皇詔旨順人心定大䇿爰命陛下以元子而承大統主孝宗之喪蓋天祚我宋變不失正故天下無改容動色之虞然邅變居憂寧親為急陛下嗣位已閲三時天性至情固莫能間而躬致色養猶未有期雖貴為天子富有四海將何以解此憂乎此憂未解根本愈虧茍因循度日而祗付之無可奈何則臣恐天人之心必愈咈戾而弗順矣何以言之陛下初政非有愆闕然自去秋以來大風震電殊為駭常而天目諸山水涌石裂其變尤甚畿內千里非旱則潦春霖為害二麥復傷上辛祈榖行禮之際狂飈忽起不克升壇重以雷雪相繼祗在一二日之內天之示戒必有所以孟軻氏有言不得乎親不可以為人不順乎親不可以為子必至於親心底豫而天下之為父子者定上皇既以感疾不得見孝宗抱終天之痛陛下又以事勢齟齬未得見上皇以少慰聖心纍年之間綱常根本墮壞如此則在今日戒懼齋栗感悟親心以和召和轉災為福實難少緩伏願陛下深惟天下之勢久於無事之為可畏重念綱常根本未能植立之為可憂親心未豫則天意未和天意未和則人心弗順一有災變便難支持寢食起居誠不可以自安燕逰逸豫誠不可以自縱一念一慮一舉一措皆以未得乎親為深憂有如親心未怡未得承歡膝下則庶幾遙望顔色以通此情徘徊倣徨不忍遽去左右前後必皆感孚真積力久聖父慈懷又必自有不能已者或上皇氣體猶未和豫陛下未得遂嘗藥之念則起敬起孝尤難自同於常時儻上皇氣體日就康寧既得時展定省之禮以慰天人之心復得同過重華以弭萬世之議臣雖至愚必知天災可息於上外患可銷於下自成祈天永命之功也茍或嵗推月移竟成否隔使綱常根本終於淪斁則天下久安之勢難保而易危災害之生未知所極臣世受國恩情迫意切發言狂瞽不識忌諱惟陛下財幸寧宗時起居郎兼侍講劉光祖上疏曰臣仰惟陛下誕膺天命纂紹皇圖聽政行宫凡五閲朔逮于烈祖梓宫發引然後徐蹕移御大內都城萬姓爰瞻爰仰載感載欣而臣之拳拳竊料聖心有正位凝命之思有臨朝願治之意見於始至之日而未嘗以萬乘之貴宫室之崇為安且樂也何以知其然也方陛下之踐阼於素幄也倉卒之際不得不逹權以安宗社當時聖心蓋亦憂禍亂之生於俄頃故於此而執喪焉於此而聽政焉夫豈得已乎哉暨大行因山有期廣內清宫以俟陛下之臨御人情豈逺事理自然而廷臣或者猶有隱憂勸陛下且視朝於行宫則蓋有三説烈祖之靈雖畢虞祔而几筵一朝閴寂陛下孝心詎忍忘之乎一也太皇太后耄期之傷皇太后淒涼之感晨夕定省豈得不關聖懷二也况外人竊議太上神明未復禁中皆不敢深言已定嗣君而今也宫墻咫尺恐太上未能沖淡於物初往往虛疑過傳播在羣聽太上皇后以母臨子或旨命有所難從則陛下何以處之三也凡廷臣之忠於陛下者人人懷此三説而陛下有所不能從者豈陛下之得已哉臣竊意聖心亦有三説即位相將半載而五日一朝之禮未得一靣親顔今而咫尺宫闈勢必得見一也行宫內外淺隘周廬徼道無所設供奉百司無所處九重如寄二也况廣內未還則名體不正名體不正則疑議妄生疑議妄生則敵人窺伺三也廷臣欲陛下且居行宫者則有如彼之三説而陛下聞之憮然有所不能從者又有如此之三説臣故曰非得已也非得已則必當使此六説者毫髮無可窺議在陛下於還宫之初凡事好為之而已矣陛下還宫之後為事事皆好然後廷臣之三憂俱釋而聖心之三説始明臣請詳陳其故且陛下初臨大內其憂畏之心當如初踐大位不可忘也久而憂畏之心又當令始終如一不可怠也陛下憂畏不忘不怠常如一日則宫中三年之禮有同朝夕臨對几筵人謂陛下居烈祖之喪無有不盡此事實好一憂釋矣陛下憂畏不忘不怠常如一日則慈福夀成必交相慶慰曰吾孫今日能不替其烈祖不謂老年憂患有賴聖孫人謂陛下奉曽祖母祖母無有不盡此事實好二憂釋矣陛下憂畏不忘不怠常如一日則純意所感天猶臨之而况於父子之至親豈不相愛母子之至愛豈不相憂而何至有它疑之可慮旨命之難處乎陛下於父母能盡其道於政令能盡其公人謂陛下事親無有不善此事實好三憂釋矣如其不然陛下憂畏茍忘茍怠不能常如一日則子之於父雖曰密邇而情未必通母之於子或至牽制而事有難處方且涉外人之所疑而不能如陛下之初意則陛下之一説始無以明於天下矣陛下憂畏茍忘茍怠不能常如一日則宫室之盛百司之富嬪御之備九重之安皆足以移陛下之本心則陛下之二説又無以明於天下矣陛下憂畏苟忘茍怠不能常如一日則名體雖正而疑議方生疑議方生近且不服如逺人何則陛下之三説亦無以明於天下矣臣故曰使六説者無一事之不善無一毫之可疑在陛下好為之而已矣而好為之則不過憂畏之念常存而已矣憂畏之念常存然後陛下不得已之意始暴白於天下而天下不議何况今日之社稷乃髙宗皇帝再造之社稷孝宗以憂勤而社稷安太上以少忘憂勤而社稷幾危今日之宫室乃髙宗皇帝中興之宫室孝宗以憂勤而宫室安太上以少忘憂勤而宫室幾危則陛下可不深念而切鑒之歟陛下入宫室而思社稷則雖欲不憂畏不可得也夫謹於始至後猶易怠若始至而遂安且樂之後將如何哉是則陛下新御大內乃政令之美惡所從出志意之勤怠所從生心之畏肆所從分身之奢儉所從定嗜欲之厚薄所從見愛惡之取舍所從知生民之休戚所從關家國之安危所從系也陛下天資明哲悉慮悉知而况目覩艱危克自抑畏移御之始寧不有感於聖懷而臣官當記注職預論思心乎愛君寧免過計輒忘罪觸仰瀆淵聽雖出至愚亦人臣事主之分當然也惟陛下留神省察歷代名臣奏議卷十二
