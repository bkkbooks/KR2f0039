body:
  text: 歴代名臣奏議卷二百五十五明楊士竒等撰賦役唐徳宗時中書侍郎同中書門下平章事陸贄論度支令京兆府折稅市草事狀曰度支奏縁當年稅草支用不充諸塲和市所得又少所以每至秋夏常有欠缺請令京兆府折今年秋稅和市草一千萬束便令人户送入城輸納每束兼車脚與折錢二十五文既利貧人兼濟公用希顔奉宣進止宜依者伏以制事之體所貴有常順人之情尤重改作革而能當尚恐未孚動且非宜曷由無擾臣等每承睿旨常以百姓為憂審知事不可行安能黙而無述每年蓄聚芻藁所司素有恒規計料稅草不充即便開塲和市既優價直復及農收人皆樂輸事不勞擾陛下追想往年之事豈嘗有縁草不足上關宸慮者乎延齡欲衒已能頗隳舊制茍收經費之用以資贏羨之功遂使儲備空虗支計寥落廐圉告闕頻煩聖聦去歳已然今夏尤甚此乃不遵舊制之過也舊制何害而變之哉臣等謹檢京兆府應徴地稅草數每年不過三百萬束其中除留供諸縣館驛及鎮軍之外應合入城輸納唯二百三十萬而已百姓般運已甚艱辛常逼春農僅能得畢今若更徴一千萬束仍令並送入城即是一年之間併徴三年稅草計其所加車脚則又四倍常時物力有窮求取無藝其為騷怨理在不疑甸服且然四方安仰假使時當豐稔家悉阜殷有草可輸有車可載然於途程往復理須淹歴歳時牛廢耕犁人妨播植東作既缺西成曷期況烝黎之間貧富不等收穫之際豐耗靡均今忽併役車牛雇車傭必騰貴併徴稅草買草價必倍髙是使豪富之徒乗急令以邀其利窮乏之輩因暴斂以毁其家非所謂均節財物準平賦法之術也臣等又勘度支京兆比來雇車估價及所載多少大率每一車載一百二束每一里給傭錢三十五文百束應輸二束充耗今京畿諸縣去城近者七八十里逺者向二百里設令逺近相補通以百里為程則雇車載草百束悉依官司常估猶用錢三千五百文即是一束之草唯計般運已當三十有五文買草本價又更半之而度支曾不計量自我作估徑以胷臆斟酌限為二十五文謂之加徴則法度廢隳謂之和市則名實乖反儻可其奏人何以觀豈如官自置塲要便收市欲少市則平其估以節費欲多市則優其價以招人買賣既和貧富俱便有餘者趨加饒易售之利不足者免轉求貴賃之資比之抑徴固不同等幸有舊制足可遵行何必舍易而即難棄利而從害臣誠暗滯未見其宜伏望戒勅度支令依舊例和市承前既有恒用以後不得闕供稍峻隄防使知懔懼妄作但不施用歳計必免愆違陛下若以軍廐之中馬畜漸衆度支所營藁芻纔可供給當年或慮水旱不虞别須蓄積為備今属歳稔亦是其時但要收斂有方不宜科配致擾若度支併市延齡必復辭難須有區分使之均濟望委京兆尹勾當别和市草五百萬束以充貯備其所和市並随要便官自置塲每塲貯錢旋付價直時估之外仍稍優饒交易往來一依市利勿令官吏催遣道路遮邀但不抑人自當趋利其市草價直並於年支留府錢數内以給用不盡者充每市滿十萬束一度聞奏便以府司郵遞車牛并更雇脚相添轉徙塲所般載送付苑中輸納如蒙聖恩允許臣即依此宣行既免擾人又不增費以資儲蓄足禦凶灾度支謹守恒規亦自不闕常用臣等問度將為合宜謹録奏聞伏聽進止時防秋兵大集國用不充李泌上奏曰自變兩稅法以來藩鎮州縣聚斂𣙜率以為軍資自懼違法匿不敢言請赦其罪但令革正自非於法應留使留州之外悉輸京師其官典逋負可徴者徴之難徴者釋之敢有淪沒者罪之上喜曰卿䇿甚長然立法太寛恐所得無幾對曰寛則人喜於免罪而樂輸所得必多而速急則競為蔽匿非推鞫不能得其實財不足以濟今日之急而皆入於姦吏所得必少而遲矣上曰善上畋於新店入民趙光竒家問百姓樂乎對曰不樂上曰今嵗頗稔何為不樂對曰詔令不信前云兩稅之外悉無他徭今非稅而誅求者殆過於稅又云和糴而實強取之曾不識一錢始云所糴粟麥納於道次今則遣致京西行營動數百里車摧牛斃破産不能支愁苦如此何樂之有上命復其家穆宗時鹽鐵使王播增茶稅十之五以佐用度右拾遺李珏上疏謂𣙜率本濟軍興而稅茶自貞元以來有之方天下無事忽厚歛以傷國體一不可茗為人飲與鹽粟同資若重稅之售必髙其敝先及貧下二不可山澤之産無定數程斤論稅以售多為利若價騰踊則市者稀其稅幾何三不可陛下初即位詔懲聚歛今反增茶賦必失人心帝不納後唐明宗初金部郎中張鑄上言曰國家以務農為本守令以勸課為先廣闢田疇用資倉廪竊見所在鄉村浮户方事墾闢甫成生計種田未至二頃植木未及十年縣司已定色役民畏責歛捨之而去殊乖撫恤之方徒設招攜之令望令諸州應有荒田縱民墾蒔俟及五頃已上三年外始聽差科從之後晉髙祖天福三年金部郎中張鑄上奏曰鄉村浮户種木未盈十年墾田未及三頃似成生業已為縣司收供徭役責之重賦威以嚴刑故不免捐功捨業勇思他適乞自今民墾田及五頃已上三年外乃聽縣司徭役從之宋太宗太平興國中張觀拜監察御史㑹三司言劔外賦稅輕詔觀乗𫝊按行諸州因令稍增之觀上䟽言逺民不宜輕動撓因而撫之猶慮其失所況增賦以擾之乎設使積粟流衍用輸京師愈煩漕輓之力固不可也或以分兵就食亦非安存之䇿徒歛怨於民未見國家之利太宗深以為然太宗時五路進兵討西夏令左諫議大夫張鑑乗𫝊徃環州與李繼隆議䕶送芻糧入靈州及還上䟽曰關輔之民數年以來併有科役畜産蕩盡室廬頓空加以浦洛之行曾經剽刧原州之役又致遷延非獨令之弗從實縁力所不逮況復先棄糧草見今逐處追科本户稅租互遣他州送納往返千里費耗十倍愁苦怨歎充塞路岐自春徂冬曾無暫息糇糧乏絶力用殫窮顧此疲羸尤堪軫恤今若復有差率益致流亡縱令驅廹必恐撓潰願陛下特垂詔㫖無使重勞因茲首春俾務東作況靈州一方僻居絶塞雖西陲之舊地實中夏之蠧區竭物力以供須困甲兵而援送蕭然空壘祗益外虞不若以賜繼遷使懐恩奉籍稍息飛輓之役事當深慮理要預防若待川決而後防火熾而方戢則焚溺之患深矣雖欲拯救其可得乎真宗祥符元年江南轉運使陳靖論江南二稅外㳂征錢物䟽曰臣聞為國之本重乎烝黎致理之先存乎教化烝黎泰而國祚永教化行而理道昌前古哲王光宅天下未有不由是而能君兆庶保宗祧享奕世綿綿無疆之休也然則烝黎之所以奉者必在衣給食足賦均歛平使安得其居樂得其業無非辜而陷法無為盗而憎主故曰民惟邦本本固邦寜是也教化之所以行者必在刑簡政亷徳廣信篤使禮有所設樂有所施無宻法以害人無違分而取利故曰徳惟善政政在養民是也今國家奄有萬國垂五十年聲教所及遐邇必至然臣學非博物材不逮人罔能周知四方是非休戚唯敢極言本職利病根源伏願聖慈子細詳覽而留意焉臣今年正月内准勅差充淮南轉運副使兼同發運事於二月四日到任方欲求民疾苦報國寵光計未遂心治且移所自受江南轉運使僅踰半年俗病民疵十得七八其小者乃當官而行固不避事其大者實干邦計非可自專然或隠不言誠恐得罪且江南偽命日於夏稅正稅外有元征錢物曰鹽博紬絹加耗絲棉户口鹽錢耗脚斗面鹽博斛斗醖酒麹錢率分紙筆錢析生望户錢甲料絲鹽博綿公用錢米鋪襯蘆蕟米麺脚錢等凡一十四件悉與諸路不同乃煜父子僭竊江淮糜費爵禄㝷納朝廷之琛賮又失淮海之土田物力不充征歛苛暴太祖恭行天罰誠欲弔民而自克復之初舊弊不去者盖樊知古始怨偽朝不與名第擔簦去國獻䇿復仇属天運之有歸遂甘心於故土然小人之見無大畧於時既任轉輸罔思鼎革而輙怨怒其主流毒其民使我皇朝只得伐罪之名未見弔民之實因仍舊貫以至于今又其㳂征數内醖酒麹錢鹽博紬絹鹽博斛斗者江南舊日許人私下造酒等第科納麹錢及嘗散與官鹽博換紬絹斛斗歸復之後酒則禁斷鹽則不支上件㳂征准前輸納其次耗脚斗面加耗絲綿詰其所由亦皆𩔖此前後廵撫採訪制置茶鹽承受體量發賑貸等皆承委寄不察疲羸不唯不察疲羸而復益之瘡痏遂使貨家鬻産償積疊之征科去土離鄉入逋亡之簿籍目擊堪嘆天髙莫聞加以累年􅥐饑甚不堪命今歳雖稔亦罕寜居實病本之轉滋致仁化而未洽矧夫否極則泰感而遂通通泰之期計在今日伏惟陛下應圗受籙繼業承祧念太祖丕變之實難省太祖治平之不易恭黙思道期庶績以咸熙惕厲為懐畏一物之失所故臣得以有犯無隠者誠謂陛下必能澄流於源也又臣嘗觀周書兼之漢史見文王髙祖開國創業勞苦艱辛無所不至武王孝恵纘功述徳而猶天下多故域中未寜洎乎成周漢文治定刑措者非文王武王不及成王之英睿髙祖孝恵不及文帝之智畧盖開國創業之際定霸争雄也纘功述徳之時去愚取賢也誠雄霸之未分賢愚之相半果斷靡暇舉置惟艱故顯忠遂良然後治定刑措萃於成王文帝之世也我皇朝太祖東掃江浙西克巴岷南平越裳北掃澤潞非定霸争雄歟太宗殄三晉之昏迷斥兩河之㓂擾黜羣邪於荒服採多士於草萊非去愚取賢歟夫如是太祖則文王髙祖之時太宗則武王孝恵之日陛下則成王文帝之世太祖太宗已無愧文武髙恵於前陛下必超邁成王文帝於後也今江南州郡民物凋殘太祖太宗未果安輯非獨二聖遺善以貽嗣君抑亦周漢治平悉在三世噫周祚八百載漢祚四百年歴代延洪無出於是陛下得不動心哉臣所貢芻蕘盖當職任陛下倘允愚計確賜主張則顯忠遂良治定刑措起於此而成於彼亦將不逺矣陛下果賜主張無令沮難則臣願竭忠亦復得為陛下剖析而别白也矧江南歸命二十有七載賦歛闗市山澤𣙜酤至於百貨之珍竒庶物之巨細每嵗所入有增無虧執事於外者得以叙為勞能坐邀恩爵㑹計於内者得以資為績用固保隆崇只謂財帛之繁食貨之富足以實國足以供軍殊不知物貨悖取人民之受弊人民受弊盜賊之必興盜賊必興干戈之不戢干戈不戢郡邑之罔寜郡邑罔寜農桑之失業農桑失業則國食無所出貨帛無所求然後欲圗潤昌不唯不克全有抑亦庶幾于亂則蜀川事商鑒未逺也臣雖甚狂瞽亦識便宜輓粟飛芻誠為本事聚財積榖敢不用心然或踐彼常途昧於至理不過每到州府長索事分接問刑獄之清濫拘檢錢榖之盈虚降次小大之務塲稽考出納之文簿孜孜㸃算一一㸔詳有欺罔則㝷究元由有錯誤則責撻胥吏遇羨剰之額録為己功擅𣙜易之財奪其民利茍且随時之譽希求進秩之榮待至官滿歸朝動不失所如此亦為稱職亦可安身其或有暗君親無益政教臣所不忍也臣今所陳前項㳂征一十四件者並偽朝舊弊也其順歸之後亦更有甚於此者臣未敢輙言陛下睿哲聰明孜孜求理茍或審其子細必是大惻聖懐臣終俟他時盡布愚欵又上件㳂征數内亦有可永且仍舊亦有可易而從新亦有可推作國恩亦可就為民便若微臣專擅擘畫料朝廷必未施行何者供億尚煩儲蓄未備衆人不知别有微㫖或相排沮故也願陛下察此愚管且許留中然後宻抽微臣赴闕質問倘事可采擇則繫於否臧如理渉虗浮則甘俟典憲復慮陛下以臣欲歸京闕别有希求且臣自是逺人所得已踰始望崇階貴秩非敢有心但恨天賦性靈不能茍循時俗致此喋喋煩瀆聖明仁宗天聖九年侍御史劉随上奏曰臣伏覩去年十一月十九日赦書千里之畿四方取則如聞賦租之式倍於郡國之名積有歳年動成逋負豈外臺之俗乆賜輕徭而甸服之民仍供重歛求之於古詎若是乎將救烝民所宜寛恤開封諸縣人户夏秋稅賦及㳂納錢物選差清強官與本縣令佐具逐縣稅數聞奏當議體量減放者伏自太祖開基因仍五代建都汴水是為東京當時江浙淮南荊湖交廣川峽四路并汾一隅各擅土疆不禀正朔國家弔民伐罪二十餘年輓粟飛芻畿内居首但是降國盡去煩苛惟有王畿旋增賦歛昨者徳音濬發歡聲四馳朝廷務在均平將欲絶其僥倖遂令逐户自供地盤嚴切指揮不令隠漏罪及鄰保非不丁寜然自降勅以來頗聞疑懼以為校定此畆必是增添稅租蚩蚩之民多不曉㑹縣胥誑惑窺圗貨財縁而為姦無以禁止然則本欲䘏而安之翻成勞而擾之前史云事有招禍法有起姦好事難行居常如此況畿内之民去秋不熟重遭驚擾益成困窮伏望聖慈體念愚民且令停罷候一二年間大段豐熟民間盡信却乞施行其已載赦書不欲權住即乞更不檢責田段只令為見管夏稅額一例普減分數如此則獄訟不興春農無廢司吏不能作弊鄉村亦自安寜時雨所霑民乃受賜慶歴二年知諌院歐陽脩論方田均稅劄子曰臣竊見近有臣寮上言均天下賦稅已送三司商量施行臣嘗聞自前諸處亦曾有均稅者多是不知均定之術或嚴行刑法或引惹詞訟或姦民欺隠或官吏誅求稅未及均民已大擾臣前任通判滑州日有秘書丞孫琳與臣同官其人言先差往洛州肥鄉縣與郭咨均稅剏立千歩方田法括定民田並無欺隠亦不行刑罰民又絶無詞訟其時均定稅後逃户歸業者五百餘家復得稅數不少公私皆利簡當易行其千歩均田法自有制度二十餘條臣在滑州時因聞此事遂畧行體問隣近州軍大率稅賦失陷一半方欲陳述乞行琳等均田之法今來已有臣寮上言均稅事竊慮未得千歩方田簡當之法其孫琳見任滑州職官郭咨為崇儀副使在外欲乞召此二人送三司令一處商量脩又上義勇指揮代貧民差役奏狀曰右臣準中書批下送二狀河東都轉運司準康定九年九月十四日勅節文河東路強壯應見充指揮使内雖係第一至第三等户者州縣更不得輪次别差色役竊縁義勇指揮使各是鄉村第一第二等力及有家活産業人户今來一年之内只是一季上畨多在本家管勾農業兼當司體量得正副指揮使等俱是上等人户揀充最属僥倖其餘等第人户丁數稍多亦是一半㸃充義勇祇應仍更不免州縣差役所有軍員已是優便仍更依條免放州縣色役頗見影芘却鄉縣重難差役却差下等義勇人户充州縣重難里正或衙前等差役計其勞逸深為不便欲乞朝廷早賜特降指揮下諸處義勇正副指揮使乞依其餘義勇體例各依等第户例輪次差定州縣色役庶得均濟臣勘㑹河東一路鄉兵除係籍強壯不勾追教閱外所有刺手背義勇見管七萬二千八百七十二人每年秋冬上畨官閱州縣因而諸雜役使常於秋冬邉地支移稅賦和糴逺納之時復有上畨之役凡一家三兩丁者一人上州教閱一人供送一人或在州縣執役或逺地輸納稅租所存但有衰老或有全無倚托者廢業忘家不勝其苦其間惟有正副指揮並是州縣中最有物力上等人户常有勞役最豪富者獨得寛優兼自兵事已來州縣差役頻併素來力及之户累世勤儉積蓄只扵三五年重疊差役例各減耗貧虛逃亡破敗而州郡事多差役難減往往將第三等第四等人差充第一等色役亦有主户小處差稍有家活客户充役勾當如此上下窘乏之際惟義勇正副指揮使豈容獨免兼自差管轄義勇以來已避免却數年色役當衆人苦於勞耗之際獨獲寛優之幸已多兼臣累過州軍體問得逐處義勇指揮使等家業例皆物力不減人丁又多若令一例差役可以貧富兼濟稍寛已困之民其都轉運司起請伏乞朝廷特賜允許施行今具奏聞伏候勅㫖嘉祐五年脩為樞宻副使又上奏曰臣為諫官時嘗首言均稅事乞差郭諮孫琳䝉朝廷依臣所言起自蔡州一縣以方田法均稅事方施行而議者多云不便尋即罷之近者伏見朝廷特置均稅一司差官分往河北陜西均稅始聞河北傳言人户虛驚斫伐桑棗尚不為信次見陜西州郡有上言歳儉民饑乞罷均稅者稍已疑此一事果為難行言者遂不能入近者又見河北人户凡千百人聚訴於三司然則道路傳言與州郡上言雖為不足信其如聚集千人於京師此事不可掩蔽則民情可知矣盖均稅非以規利而本以便民如此民果便乎竊知朝廷本只以見在稅數量輕重均之初不令其别生額外之數也近聞衛州通利軍括出民冒佃田土不於見在管催數内均減重者攤與冒佃户却别生立稅數配之此非朝廷本意而民所以喧訴也又聞澶州諸縣見今實額管催數外將帳頭自來樁坐有名無納及開閣將行兩項逺年稅數並係祥符景徳已前以至五代長興年樁管虛數並攤與見今人户又聞以地肥瘠定為四等其下等田有白鹻帯醎地并醎鹵沙薄可殖地死沙不可殖地並一例均攤與稅數謂此雖不可耕種尚可煎鹽且河北之民自祖宗以來䝉賜恩䘏放行鹽不禁只令據鹽斤兩納稅今煎塩者已納鹽稅又令更納田稅豈祖宗所以恵河北之民意又聞河南不殖之地係禁鹽地分者亦均攤與稅又不知使民何以納也澶衛去京師近偶可聞知者如此其餘逺方謂所均稅悉便於民其可得乎以此見朝廷行事至難小人希意承㫖者言利而不言害為國歛害於民朝廷不知則已茍已知之其可不為救其失哉欲望聖慈特賜指揮令均稅所只如朝廷本議將實催見在稅數量輕重均之其餘生立稅數及逺年虛數却與放免及未均地分並且罷均且均稅一事本是臣先建言聞今事有不便臣固不敢緘黙慶歴三年右正言余靖論兩稅折納見錢䟽曰臣切聞三司計度預於淮南江淮浙荆湖等路今年夏秋稅内折納見錢四百貫傳聞道路不知信否臣聞治國之要安民為本地有常産不外其求民有定賦不盡其力男耕於野女蠶於家各輸所有以待國用自堯禹以來守為彛制先期而輸古無此法況累年之間科率頻併當今天下錢貨至少江淮之地名為錢荒謂宜改制泉刀以救其弊而乃令百姓盡委田野蠶絲之利一之於錢必將倍棄其物以就所售百貨既輕兆人嗸嗸力屈財盡散為盗賊雖有噬臍之悔將無及矣臣又聞竭澤而漁明年無魚百姓不足君於何取伏乞聖慈特賜矜允裁減其半令納本色其第四第五等貧下人户願納本色並聽仍各依每年夏秋期限送納於國家賦稅亦無所損而江淮之民不至流散則朝廷之大恵也七年通判蔡州劉敞論折變當随土地之宜䟽曰臣聞聖王之處民也順其性是故居山者不使居川居渚者不使居中原其取民也任其宜是故山虞不以魚鼈為賦川衡不以材木為貢盖順其性者知天者也任其宜者知地者也聖王之功不變天地是以其養易足其教易成其求易供其取不匱今之時善言政者莫不欲富民欲富民而常患奪其財者由有司取之反其性而戾其宜於是或以糓為金或以芻為帛非精也而求之不舍民是以困窮是以流亡是以盗爭朝廷豈不恤哉葢不得已也臣以為方今用度不足之時欲盡如古葢亦未可且勅有司毋責魚鼈於山毋索材木於川則百姓亦庶幾矣臣非敢虛言也臣所治州十縣其五皆種穜稑而有司乃使以糯與粳為賦一不如約吏當坐之若此者上則不順於天下則不因於地中則不恱於人去聖王之功逺矣惟陛下哀憐之臣幸備執事以治民為職詔書問可以寛民者臣切疑莫先於此夫賦稅固自古有之臣願勅諸路轉運使必不得已而折變變其所有毋變其所無變其所可得毋變其所不可得則民疾不困矣仁宗時户部侍郎夏竦上均賦歛奏曰臣聞禹貢之典九州異賦周官之制五地殊征相其土宜平其斂法輕重等則民樂輸逺邇一而國章立夏后氏五十而貢商人七十而助周人百畆而徹雖皆什一之通制盖有公田之定式國家疆治萬國敷同聲教務推恵育休息元元而地征之法未盡均一或同郡鄰邑髙下不等接畛聫疆桀貊有殊或地廣而稅鮮賦多而田寡或不腆受沃衍之征上腴當淳鹵之賦植稻粱而課菽麥無桑柘而責繭稅官府由是生姦豪右于焉得志無告之民積於罷弊伏願陛下霽雷霆之威采狂狷之辭申命有司特著稅令辨肥瘠之地定輕重之法分科列目第為九等上田十頃當賦若許下田百畆當稅幾何分詔能臣頒行天下履其地力裒多益寡斷長補短陸耕水耨並正其征沃野弊田各平其斂標列版圖百世不易垂之後嗣聖法可觀下民之患自除猾吏之欺斯絶易所謂聖人作而萬物覩者也監察御史傅堯俞乞罷均稅奏曰臣伏覩諸路均稅未見其便知河南府王屋縣事髙本嘗有奏陳乞行寢罷其論頗為詳備朝廷不賜允從事行後來勞擾詞訟皆如本言本所論者今不復云以臣所見實難均定借如今日粗得平均富者擇地以兼併貧者薄稅以圗售賣買數年復不均矣兼稅户割移舊有條制縱使逐户開㭊諸色稅數令賣買之日對簿書鑿而州縣鮮得能吏一付胥史依舊為奸況終無必得均平之理若加科條以嚴按括徒更增弊必恐無益今四方多被水旱雖豐稔一二年未便完復又加騷擾重為困苦此乃民所嗟怨臣皆摭實而言伏乞一切罷之以寛疲瘵臣聞先皇帝嘗與宰臣王旦言及此事然訖不見施行以先皇帝之聖王旦之賢夫豈不思必有意也惟陛下留神天下幸甚張方平上論曰臣聞理人之道地著為本分民之要平土為大故古者井田之制必先立歩畆以正經界夫受私田百畆公田十畆是謂什一之法夏氏五十而貢商人七十而助周百畆而徹皆什一也故春秋傳曰什一者天下之中正者也其山林藪澤原陵淳鹵之地準肥磽以為差随厚薄而收入是以春秋譏宣公初稅畆謂履畆而稅擇其善者取之故君子惡公以為於民已悉矣自廬井之壊而王制大亂民生失平稅賦之法不齊矣漢初接秦之暴務安殘氓約用省禁益薄田租至文景之際乃或三十而收一時更盡除勿收可謂寛約矣於時網䟽而民富百姓安樂知重禮義天下之刑獄幾措焉夫厚斂則民困困則姦盗起而刑辟重輕賦則民足足則禮義興而刑罰簡刑辟重則民愁怨而思亂禮義興則民安樂而思治思亂者視其君如仇讐雖箕㣲之仁不能使之安而久思治者愛其君如父母雖蚩尤之孽不能使之動而危盖厚斂起乎荒汰薄賦由乎節用秦自暴政之并天下侈心無極恢大封域北拓邉地南開越境扵是發閭左之戍掃天下之命飛芻輓粟萬里轉餽暴骸露骨積於邉荒内興功事窮極力役創阿房之宫備六國之制胡亥發徒百萬以營驪山及山東兵興聚師待餉此所以收大半之賦而不足也漢初定天下生人困瘁量吏禄度官用以賦扵民孝文躬脩儉節仁愛清静宫室苑囿車馬服御無所增飾有不便輙弛以利民身衣弋綈後宫親幸衣不曵地帷帳無文繡惜百金之費罷露臺而不為匈奴背約犯塞令守邉備不發兵深入無動勞百姓治霸陵因山不增髙器用瓦物不藏金銀又親行耕籍之禮以勸農事務廣儲蓄以備灾沴此所以三十而稅一或盡除勿收而國用足也自後漢叔世吳魏三分司馬氏之南渡中原剖裂外備疆事百役之費内則間以昏僻驕滛之主急征横斂科調雜出是故漢有虐政而作田畆之賦齊有淫政而重休調之租隋有亂政則有先期逆征之暴唐有弊政則有青苖地頭之稅舊弊不革新名日生侵刻疲人自取孤弱是何異割肌膚而滋口腹事枝葉而剔根心反裘負薪徒有惜毛之意斃人以梃不知罪歳之非剥斂之名可謂窮矣國家接衰唐之頽綱經五代之亂軌平四方之僭閏立一王之法式其横出之算無名之征革其弊者多焉比在先朝定民田之租考地之肥瘠制賦之重輕裁使平均本扵寛約利人奉國誠為中典夫古之田制有賦有稅稅以待郊社宗廟百神之祀天子奉養百官禄食之給賦以供車馬甲兵士徒之役充實府庫賜予之用今夫車馬甲兵之資士徒之衆皆縣官素具不復藉於民大率中田畆收一石輸官一斗畿甸之外歳供兩稅無他課調則是今制賦之法抑已簡而有經矣至如山原之地或入稻秔之物陂澤之鄉或有縑綈之稅捨其所有責其所無農人供之其費自倍有者半賈而賣亡者倍稱而取使乗利估販者得操其竒贏此商人所以兼并農人農人所以重困也誠依古制均定壤賦随地所産因民所工省其雜名專為糓帛除折準之令去錢刀之目如此則國之經入如故民之輸出有常利歸扵耕農權奪於富人上之徳澤加扵百姓民之頌聲興扵天下可以制梃而鞭撻歴世之暴君汙吏矣謹論方平又上論曰臣聞王都者天下之根本九州之樞㑹譬之一人之身則京畿為之腹心而四方乃其支末腹心宜泰支末處勞飬身之道也先安京畿後康四方理國之體也今所為租稅之法更徭之制而王畿最重品色尤煩力耕時穫無水旱蟲螟之害田賦適辦銖收毫聚累以歳月生業甫立敺就一役随復破散故甸内之民鮮有盈室昔者明王保邦預備之道惟於平世始可為謀及其已弊救日不暇雖有賢智豈遑經久今内外無事賦入有經而民家壁立野無青草設有横出之調緩急之率不及均逺應近求具則必扶老攜㓜轉死溝壑雖峻刑嚴禁不能止流亡播潰之患矣夫致理之本在乎制度制民之産在乎均平子曰不患寡而患不均盖均亡貧且都城之内大商富賈坐列販賣積貯倍息乗上之令操其竒利不知稼穡之艱難而粱肉常餘乗堅策肥履絲曵綵羞具居室過於侯王淫侈之俗日以輕僭賦調所不加百役所不及優㳺逸豫專事驕靡而農人侵冒寒暑服田力穡以供租稅以給繇役仰不足以飬父母俯不足以畜妻子同為王民而都門内外勞逸之殊如此此豈抑末敦本之道乎又凡國家發徳音布恩令必首及輦轂或曲有所被重罪者末減輕繫者踈宥姦邪桀慝踰軌亂常草竊偽濫不經之民咸霑渙澤而農人積逋舊負錐刀之末不蒙蠲除侵肌斷髓連錮妻孥此豈推恩布恵之道乎兼并之族姦宄之人以幸近於天日故特䝉於庇照而此農人澤不下及臣愚疑其未周也誠天子哀此疲人霈然加恵除其雜調變折之目寛其租入庸役之令採其孝悌力田節義之人賜復其家以勵風俗因制王畿之内嚴立占田之限無使權豪侵併貧弱上以為國備下以勸農功使本業之人得自比於兼并姦宄同被上之恩澤此不亦強幹優本之道歟謹論方平又請減省河北徭役䟽曰伏以國家通好于契丹三十七年于兹矣邉人不知有戰爭之患餉餽之勤保其父子室家安于耕桑畜牧宜乎生業益殖事力加裕而比屋彫瘁率無盖藏一榖不登莫能自濟臣愚竊思其故其弊有三一曰厨傳二曰徭役三曰河防自和好已來邉將無所事惟以酒食宴樂苞苴問遺名聲相傾惟恐不逮公錢不足則取于百姓百姓不足則賈以求贏賈又不足則有傾私槖以繼之者羊豕不得擾于闌雉兔不得安于野行販者不得共其利擔負者不得寜其居此厨傳之弊也又民之大害惟在更徭有才觧州役即被縣差家無兼丁自身營業故凡役事率以雇傭二年一更傭金不減千萬中人之家耗矣夫如是百姓安得不困臣獨竊歎邉陲無事逾四十年不能使公私充實備於無患而竭民之財産於不急之役及官吏口腹逸欲之費一旦倉卒蕭然無所恃彼河防猶為國事所不得已者欲乞朝廷選官與河北轉運使盡取一路郡縣凡民之籍以較徭役之數益減節之所有州郡厨傳餼贈之弊深料此事亦非官吏所願然盖體例相習彼此相形雖有愛民節用之心勢不可獨異臣謂宜明為條約事為之制則雖往來使客亦自絶過望之心至於毁譽愛憎亦當漸自消弭然後裁損用度以充公私之備詢考名實以觀郡縣之政三數年庶乎民之富庶必有加也神宗即位初御史中丞司馬光論衙前劄子曰臣伏見近者陛下特下詔書以州郡差役之煩使民無敢力田積榖求致厚産至有遺親背義自求安全者令中外臣庶條陳利害委官詳定以聞此誠堯舜之用心生民之盛福也臣竊見頃嵗國家以民間苦里正之役廢罷里正置鄉户衙前又以諸鄉貧富不同東鄉上户家業千貫亦為里正西鄉上户家業百貫亦為里正應副重難勞逸不均乃立定衙前人數每遍有闕於一縣諸鄉中選物力最髙者一户補充行之到今已逾十年民間貧困愈甚於舊議者以為一州一縣利害各殊今一槩立法未能盡善又里正只管催稅人所願為衙前所管官物乃有破壊家産者然則民之所苦在於衙前不在里正今廢里正而存衙前是廢其所樂而存其所苦也又嚮者每鄉止有里正一人借使有上等十户一户應役則九户休息可以晏然無事專意營生其所以勞逸不均盖因衙前一槩差遣不以家業所直為準若使直千貫者應副十分重難直百貫者應副一分重難則自然均平今乃將一縣諸鄉混同為一選物力最髙者差充衙前如此則有物力人户常充重役自非家計淪落則永無休息之期矣有司但知選差富户為抑強扶弱寛假貧民殊不知富者既盡賦役不歸扵貧者將安適矣借使今日家産直十萬者充衙前數年之後十萬者盡則九萬者必當之矣九萬者盡則八萬者必當之矣自非磨滅消耗至扵困窮而為盗賊無所止矣故置鄉户衙前以來民益困乏不敢營生富者反不如貧貧者不敢求富日削月朘有減無增以此為富民之術不亦踈乎臣嘗行於村落見農民生具之㣲而問其故皆言不敢為也今欲多種一桑多置一牛蓄二年之糧藏十疋之帛鄰里已目為富室指抉以為衙前矣況敢益田疇葺廬舍乎臣聞其言惄焉傷心安有聖帝在上四方無事而立法使民不敢為久生之計乎凡為國者患在見目前之利不思永久之害故初置鄉户衙前之時人未見其患及今然後知之若因循不改日益久則患益深矣臣愚欲望聖慈特降指揮下諸路州縣相度上件里正衙前與鄉户衙前各具利害奏聞隨其所便别立條法務令百姓敢營生計則家給人足庶幾可望矣熈寜三年光又乞免永興軍路苖役錢劄子曰臣奉勅差充永興軍一路安撫使臣竊見陕西百姓自珹綏州以來供應諸般科配及支移稅賦往近邉州軍日近復有環慶事宜加之今年亢旱五稼不熟人户流移者已聞不少國家所宜汲汲存恤使人户安集臣伏見先所散青苖錢貧破百姓為患不細臣已曾累次上言不敢重煩聖聽今又聞議者欲令州縣將諸色役人一時放罷官為雇人祗應却令人户均定免役錢随二稅送納乃至單丁女户客户寺觀等並令均出若果行此法其為害必又甚扵青苖錢何則上等人户自來更互充役有時休息今歳歳出錢是常無休息之期也下等人户及單丁女户等從來無役今盡使之出錢是孤貧鰥寡之人俱不免役也若錢少則不足以雇人若錢多則須重斂於民雇人不足則公家闕事重斂於民則衆心愁怨自古以來繇役皆出於民今一旦變之未見其利也且受雇者皆浮浪之人使之主守官物則必侵盗使之幹集公事則必為姦事發則挺身逃亡無有田宅宗族之累建議者亦自知其不可乃云若雇召人不足即依例輪差支與逐處所定雇錢足了役事則自當有人應募今既無人應募必是錢少不足充役是徒有免役之名而役猶不免但無故普增數倍之税也彼青苗錢以債與民而取其息已是困民之法今又使横出數倍之税民安有不困蹷者哉以富庶之域猶不能堪況陜西累嵗奉邉民力彫弊豈可復為無益之事以擾之乎伏望聖慈特免永興軍一路青苖免役錢以愛惜民力專奉邉費其餘路分則繫自朝廷裁酌四年御史中丞楊繪論助役䟽曰臣竊以堯舜之為君禹臯陶之為臣可謂至治矣然考之於書臯陶之所以矢謨扵舜而禹亦稱惟帝其難之者在知人在安民二者而已安民則恵豈非治道之先哉又況乎畿甸之民也臣竊見日近有東明等縣百姓約千百人詣開封府告訴為超陞等第出助役錢事本府不肯接狀却稱不曾受得朝㫖及司農寺關報百姓既無所訴遂突入相府宰臣王安石諭云此事相府元不知特與指揮不令超陞等第仍問汝等來時知縣知否並言不知至十五日聚來御史臺前臣為本臺無例收接訴狀㝷諭令散去退而訪聞得司農寺超陞等第因依乃是不依逐縣元定户活等第却從司農寺將見管户口品量等第均定助役錢數抛降與逐名令管認户力次第陞降重别造成牋簿依條限曉示人户知悉須管於農務前了當臣今舉一縣以言之只如酸棗縣鄉村第一等元申一百三十户今司農寺抛降却要二百四户即是陞起七十四户第二等元申二百六十户今司農寺却抛降三百六户乃是陞起四十六户第三等元申三百三十九户今司農寺却抛降四百五十九户乃是陞起一百二十户臣竊謂凡等第陞降盖視人户家治髙下須憑本縣本縣須憑户長里正户長里正須憑鄰里自下而上乃得其實今來却自司農寺畫下數目令本縣依數定簿豈得民心甘服哉譬如所以為帯者為腰也所以為履者為足也帯之長短須随腰之豐瘦履之闊狹須準足之小大今若帯長而有餘則增腰以滿之履狹而不足則削足以就之可乎超陞等第以就多出錢何以異此況京畿者天下之根本不可不掛聖慮據此次第人户紛擾詞訴卒急未了雖欲委府界提㸃脅以止之竊恐川壅而潰其傷必多可不念哉自來措置民事何嘗不自州及縣豈有文字下縣州府不知之理竊詳司農寺不闗報開封府之意顯是自知所行之事扵理未安指望諸縣畏威不敢異議若闗京尹或致爭執則事體稍重有礙施行所以公然不顧直行下縣兼今來已是農務之月如何農務前定要了當欲随夏稅起催乎臣又訪聞得中書見差孫迪張景温下諸縣體量仍令諸縣將不願出錢人户别作一項開坐臣竊恐特將不願出錢人户困以重役以此威脅誰敢不從臣願陛下沈思熟慮畿内之民從來驕飬有同赤子今來已被團保之法行之猝暴惶駭未已若又不住陵虐所憂不細書云民惟邦本本固邦寜民可近不可下詩云商邑翼翼四方是則春秋内中國而外諸夏可不務安之乎今判司農寺乃鄧綰曾布一為都檢正非臣言之誰敢為陛下言之者監察御史裏行劉摯論助役十害䟽曰臣聞孟子曰徒善不足以為政言人君雖有仁心仁聞茍不因先王之道為良法度以行之則亦不免扵民不得被其澤恭惟陛下至誠好治憂念元元謂天下役法久失其平故慨然有意其大均之也然有司建議立法頗無以上副詔旨而下協人情者臣請言之其法曰率錢助役官自雇人臣謂其事不可勝言而畧陳其十害天下户籍均為五等然十七路三百餘州軍千二百餘縣凡人之虛實役之重輕𩔖皆不同今斂錢用等以為率則所謂不同者非一法之所能齊若随其田業腴瘠因其所宜一州一縣一鄉一家各自立法則紛錯散殊何所緫統非所謂畫一者其害一也新法患等籍之不得其實故令品量物力别立等第以定錢數然舊籍既不可信則今之品量何以得其無失不獨騷擾生弊亦使富者或輸少貧者或輸多其害二也上户常少中下之户常多上户之役數而重故或以今之助錢為幸下户之役簡而輕故皆以今之助錢為不幸優富苦貧非法之意其害三也新法所以令品量立等不取舊簿者意欲多得雇錢而患上户之寡故臨時登降升補髙等以充足配錢之數疲匱之人何以堪命近日府界其事已騐其害四也嵗有豐凶而役人有定數助不可闕則是助錢非若賦稅有倚閣减放之期其害五也夏秋二熟農人唯有絲絹麥粟之𩔖而助法皆用見錢故須随時貨易逼於期㑹價必大賤借使許令以物代錢亦復有退揀壅滯及夤縁乞索之患其害六也兩稅及科買貨責色目已多使常無凶災猶病不能了公私之費又起庸錢竭其所有恐斯人無恱而願為農者天下户口日當耗失小則去為商賈為客户為惰㳺或父母兄弟不相保抵冒法禁析而入下户大則聚而為盗賊其害七也徼幸之人又能寅縁法意虛收大計如近日兩浙科起一倍錢數欲自以為功而使國家受聚斂之謗其害八也夫既為之民而服役扵公家廼所謂治扵人者事人天下之通義也況鄉縣定差循環相代上等大役至速者猶須十餘年而一及之至扵下役則動須一二十年乃復一差今使槩出緡錢官自召雇盖雇之之直不重則不足以募不輕則不足以給輕之則法或不行重之則民不堪命其害九也夫役人必用鄉户盖其有常産則必知扵自重性愚實則罕至扵欺公舊法雖有替名鄉人自任其責今既雇募恐止得輕猾浮浪姦偽之人則所謂帑庾場務綱運凡所以主財者不唯不盡心扵幹守亦恐縣官之物不勝其盜用而抵冒法令罪獄日報至扵弓手耆壯承符散從手力胥史之𩔖職在捕察賊盜發行文書追督公事者則恐遇寇有畏逸之患因事有騷擾之姦而舞文鬻事無有虚日其害十也夫民可安而不可動財可通而不可竭以臣之淺聞寡見而所列如此其沸扵民口有大扵此而臣未敢言者其又何窮然臣亦嘗為陛下博訪而深計之盖天下差役莫重扵衙前今司農新法一項云鄉户衙前更不抽差其長名人等並聽依舊將天下官自出賣到酒稅坊場并州縣坊郭人户助役錢數以酬其重難臣謂此法有若可行然坊郭十等户自來已是承應官中配儥之物及饑饉盜賊河防城壘緩急科率郡縣頼之今亦難為使之均出助錢外舊來官中將場務給與衙前對折役過分數然多是估價不盡虧却官中實數今既官自拘收用私價召賣則所入固多又應係衙前當役去處事件官為財省使無舊日糜費而支酬之際稍優其數則人情必當樂為可寛鄉户重役而似無害民之事臣乞陛下將此一法詔有司講求其詳若逐路坊場錢數可以了得本路召雇衙前酬奬則乞詳具條目行而觀之以三二年間若見其利則其他役法更革無難矣所是助錢之法伏望早賜睿斷一切寢議以幸天下夫更令創制可以漸而不可以暴況欲内自畿甸外至海隅一槩率錢可謂重斂又欲廹急而成之使生靈何以自全陛下安得不慎重其事哉摯又奏曰臣近曾上言論助役之法其害有十今奉聖㫖批送下司農寺曾布劄子條件詰難奉聖旨令臣分析者竊以助役之法有大臣主之扵中書有中書之属官及御史知雜者講畫扵司農寺有大臣所選擇監司提舉官行之扵諸路上下布置其勢若此可謂易行矣然曠日彌年未有定論可以為法者其故何也不順乎民心而已矣民之所不欲古今未有可以勢力強而成者也故雖命使者奔馳道路禀之扵内而刼之扵外然其擬議参差條制殊異紛然自不知其可行之計則此法利害明若觀火矣臣有言責也是故前日采中外士民之說敷告扵陛下今司農之辯說既如此陛下以臣言為是耶則事盡於前奏可以覆視陛下以臣言為非耶則貶黜之而已雖復使臣言之亦不過所謂十害者是以不復條陳不唯費辭文過煩紊天聽而風憲之官豈與有司較是非勝負交口相直如市人之詬競者則無乃辱陛下耳目之任哉謂臣等險詖欺誕則上有陛下之聦察而下有中外之公議所謂中有向背則臣所向者公所背者私所向者義所背者利所向者君父所背者權臣今方辨助法之利害而無故立向背之論以朋黨之意教誘天下此可駭也所謂曾無畏忌則陛下之法臣所畏也陛下容受忠直臣為御史實不敢隠情自為忌諱今司農欲使臣畏忌權臣則誠臣之所不能者也伏望陛下將臣前後所論助役章奏與司農之言宣示二府大臣中外百官以考是非若臣言有所取則乞速罷助議以安天下之心若稍有欺罔則乞重行竄逐以謝專權之人而戒妄言者歴代名臣奏議卷二百五十五
