body:
  text: 歷代名臣奏議卷二百五十明楊士竒等撰水利宋仁宗時知陳州宋祁乞開治渒河奏曰臣知壽州日伏見本州安豐縣有芍陂自古所傳元引龍穴山水及渒河水入陂每歲灌田萬頃近年多被泥沙淤淀陂池地漸髙畜水轉少龍穴山一𣲖水源既小今來只藉渒河注水入陂後來渒河一道水渠本縣又不修開遂致水道咽塞陂水淺涸臣自到任後併值二年乾旱去年自六月放竭陂水只是救灌得側近一二千頃是以壽州米價踴貴官私妨闕臣切聞得壽州正是出米之地全藉此一陂舊來陂水若滿常無乾旱是以縣名安豐蓋取此義臣欲乞朝旨直下本州委知州通判親往陂上相度開治渒河令水渠深快於渒河內其堪闌水入渠注滿陂內髙築陂岸及重開撅陂內於淀之處令稍深闊其工亦不甚多只乞就來春農隙之時少借鄰縣并本縣人夫三五千人約功一月可見次第如陂水滿足則溉田萬頃永無凶年兼得陳潁至京都一路官私米斛有可供應神宗熙寧二年司馬光乞優賞宋昌言劄子曰臣聞國家大政在於賞罰若賞罰明當功無不成臣去冬奉敕與張茂則相度二股河及生隄利害當時都水監丞宋昌言建議欲於二股河口西岸新灘上置立上約劈欄水勢令入東流候向去東流漸深北流於淺即閉塞斷北流放出御河胡蘆河下流以除恩冀深瀛以西諸州軍水患臣等因得其言尋具此利害奏聞蒙朝廷聽許令修置上約自後昌言同列提舉修生隄者以䇿非已出百端沮毁以為二股河必不可成不如併力修生隄及李立之赴闕上殿所言陛下所親聞也賴陛下聖明斷在不疑必使之修置上約今秋劈攔得水勢一併入東流其北流尋已閉斷雖頗漂溺損近東滄德等州民田廬舍然恩冀深瀛以西州軍蒙利亦為不少其宋昌言不可謂之無功今若與同列稱二股河不可成者一例受賞臣竊恐當官之人覩之無所沮勸況昌言因去嵗職當在外河決棗強獨奪一官今若止復舊官則是衆人受賞而昌言獨不得賞也設使嚮者修置上約不成或背了二股併入北流其同列豈肻分昌言之罪伏望聖慈察昌言建議之功特與復舊官外更與董役之人等第别加酬奬庶使向去用心向公者朝廷必不負之也四年開修漳河役兵萬人袤一百六十里帝因與大臣論財用文彥博曰足財用在乎安百姓安百姓在乎省力役且河久不開不出於東則出於西利害一也今發夫開治徙東從西何利之有王安石曰使漳河不由地中行則或東或西為害一也治之使行地中則有利而無害勞民先王所謹然以佚道使民雖勞不可不勉會京東河北大風三月詔曰風變異常當安靜以應天災漳河之役妨農來歲為之未晚中書格詔不下尋有旨權令罷役五年發運使羅拯欲自洪澤而上鑿龜山裏河以逹于淮帝深然之會發運使蔣之竒入對建言上有清汴下有洪澤而風浪之險止百里淮邇歲溺公私之載不可計凡諸道轉輸涉湖行江已數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肋為復河取淮為源不置堰閘可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑嘗言開河之利其後淮隂至洪澤竟開新河獨洪澤以上未克興役今既不用閘蓄水惟隨淮靣髙下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦博矣祐甫曰異時淮中歲失百七十艘若捐數年所損之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之竒撰記刻石龜山後八年程昉與劉璯言衛州沙河湮沒宜自王供掃開濬引大河水注之御河以通江淮漕運仍置斗門以時啓閉其利有五王供危急免河勢變移而别開口地一也漕舟出汴橫絶沙河免大河風濤之患二也沙河引水入于御河大河漲溢沙河自有限莭三也御河漲溢有斗門啓閉無衝注淤塞之弊四也德博舟運免數百里大河之險五也一舉而五利附焉請發卒萬人一月可成從之九年秋昉奏畢功中書欲論賞帝令河北監司案視保明大名安撫使文彥博覆實十月彥博言去秋開舊沙河取黃河行運欲通江淮舟楫徹於河北極邊自今春開口放水後來漲落不定所行舟筏皆輕載有害無利枉費功料極多今御河上源止是百門泉水其勢壯猛至衛州以下可勝三四百斛之舟四時行運未嘗阻滯隄防不至髙厚亦無水患今乃取黃河水以益之大即不能吞納必致決溢小則緩漫淺澀必致淤澱凡上下千餘里必難歲歲開濬況此河穿北京城中利害易覩今始初冬已見阻滯恐年歲間反壞久來行運儻謂通江淮之漕即尤不然自江浙淮汴入黃河順流而下又合於御河大約歲不過一百萬斛若自汴順流經入黃河達于北京自北京和雇車乘陸行入倉約用錢五六千緡却於御河裝載赴邊城其省工役物料及河清衣糧之費不可勝計又去冬外監丞欲於北京黃河新堤開置水口以通行運其策尤疏此乃熙寧四年秋黃河下注御河之處當時朝廷選差近臣督役修塞所費不資大名恩冀之人至今瘡痍未平今奈何反欲開口導水耶都水監雖令所屬相視而官吏恐忤建謀之官止作遷延回報謂俟修固御河堤防方議開置河口況御河堤道僅如蔡河之類若欲吞納河水須如汴岸增修猶恐不能制蓄乞别委清強官相視利害并議可否又言今之水官尤為不職容易建言僥幸恩賞朝廷便為主張中外莫敢異議事若不效都無譴罰臣謂更當選擇其人不宜令狂妄輩橫費生民膏血已而都水監言運河乞置雙閘例放舟船實便與彥博所言不同十二月命知制誥熊本與都水監河北轉運司官相視本奏河北州軍賞給茶貨以至應接沿邊𣙜場要用之物並自黃河運至黎陽出卸轉入御河費用止於客軍數百人添支而已向者朝廷曽賜米河北亦於黎陽或馬陵道口下卸倒裝轉致費亦不多昨因程昉等擘畫於衛州西南循沙河故迹決口置閘鑿堤引河以通江淮舟楫而實邊郡倉廪自興役至畢凡用錢米功料二百萬有竒今後每歲用物料一百一十六萬廂軍一千七百餘人約費錢五萬七千餘緡開河行水才百餘日所過船筏六百二十五而衛州界御河淤淺已及三萬八千餘步沙河左右民田淹浸者幾千頃所免租稅二千貫石有餘有費無利誠如議者所論然尚有大者衛州居御河上遊而西南當王供向著之會所以捍黃河之患者一堤而已今穴堤引河而置閘之地才及堤身之半詢之土人云自慶厯八年後大水七至方其盛時遊波有平堤者今河流安順三年矣設復礬水暴漲則河身乃在閘口之上以湍悍之勢而無隄防之阻泛濫衝溢下合御河臣恐墊溺之禍不特在乎衛州而瀕御河郡縣皆罹其患矣夫此河之興一歲所濟船筏其數止此而萌每歲不測之患積無窮不資之費豈陛下所以垂世裕民之意哉臣博采衆論究極利病咸以謂葺故堤堰新口存新閘而勿治庶可以銷淤澱決溢之患而省無窮之費萬一他日欲由此河轉粟塞下則暫開亟止或可紓飛挽之勞十年八月河決鄭州滎澤文彥博上言曰臣正月嘗奏德州河底淤澱泄水稽滯上流必至壅遏又河勢變移四散漫流兩岸俱被水患若不預為經制必溢魏博恩澶等州之境而都水略無施設止固護東流北岸而已適纍年河流低下官吏希省費之賞未嘗增修堤岸大名諸掃皆可憂虞謂如曹村一掃自熙寧八年至今三年雖每計春料當培低怯而有司未嘗如約其掃兵又皆給他役實在者十有七八今者果大決溢此非天災實人力不至也臣前論此并乞審擇水官今河朔京東州縣人被患者莫知其數嗸嗸籲天上軫聖念而水官不能自訟猶汲汲希賞臣前論所陳出於至誠本圖補報非敢激訐也熙寧中監察御史裏行劉摯上奏曰臣伏見內臣程昉大理寺丞李宜之於河北開修漳河功力浩大凡九萬夫所用物料本不預備需索倉猝出於非時官私應急勞費百倍除轉運司供應稈草梢樁之外又自差官採漳堤榆柳及監牧司地內柳株共十餘萬皆是逐州自管津般河北難得薪柴村農惟以麥秸等燒用及經冬泥補而昉等妄奏民間不用已料一萬餘工差本司兵士散就州縣民田內自行收刈所役人夫莫非虐用往往逼使夜役蹂踐田苗發掘墳墓殘壞桑柘不知其數愁怨之聲流播道路傳至京師而昉等妄奏民間樂於功役無不恱喜民夫既散役兵尚衆本路廂軍剗刷都盡諸處無不闕事而昉等奏陳不已形迹州縣淩侮官吏仍乞於洺州調起急夫又欲令役兵不分番次其急功擾攘至於如此本路監司畏昉之勢不敢言其非而上下以目臣不知昉之為是役其利安在或聞欲泄邢州大名等處積水今使此水如昉之意通行而北緣下流狹無所容受不免泛溢乃是移此就彼易地為患今來朝廷既令權罷則利害姑置之如聞昉為見罷役忿恚偃蹇有退休之請朝旨又令總領淤田司事臣謹按程昉李宜之將命興事初不以事之可否實聞于朝貪功幸進擾民殘物前後奏報事皆欺罔而昉又敢邀君肆慢在於典憲可誅無赦若尚令昉以都水丞領事河上伏恐生事興患未有窮已伏乞明布昉等罪狀重行貶竄以慰一方殘弊之民使天下皆知此役之害非朝廷意且以戒徼幸希賞罔上賊民之人謹具彈效以奏元豐元年五月西頭供奉官張從惠言汴口歲開閉修堤防通漕才二百餘日往時數有建議引洛水入汴患黃河嚙廣武山須鑿山嶺十數丈以通汴渠功大不可為去年七月黃河暴漲水落而稍北距廣武山麓七里退灘髙闊可鑿為渠引洛入汴范子淵知都水監丞畫十利以獻又言汜水出五仙山索水出嵩渚山合洛水積其廣深得二千一百三十六尺視今汴流尚贏九百七十四尺以河洛湍緩不同得其贏餘可以相補猶慮不足則旁堤為塘滲取河水每百里置木閘一以限水勢兩旁溝湖陂濼皆可引以為助禁伊洛上源私引水者大約汴舟重載入水不過四尺今深五尺可濟漕運起鞏縣神尾山至士家堤築大堤四十七里以捍大河起沙谷至河隂縣十里店穿渠五十二里引洛水屬于汴渠疏奏上重其事遣使行視元豐中河決小吳北注界河東入于海詔東流故道淤髙勿塞乃開大吳以護北都都水王令圖請還河故道同知院事趙瞻議曰自河決已八年未有定論今遽興大役役夫三十萬用木二千萬臣竊憂焉朝廷方遣使相視若以東流未便宜亟從之若以為可回宜為數歲之計以緩民力議者又謂河入界河而北則失中國之險昔澶淵之役非河為限則北兵不止瞻曰王者恃德不恃險昔堯舜都蒲冀周漢都咸鎬皆歷年數百不聞以河障外國澶淵之役蓋廟社之靈章聖之德將相之智勇故敵帥授首豈獨河之力哉後使者以東流非便水官復請塞北流瞻固爭之卒詔罷役如瞻所議神宗時郟亶奏曰臣準中劄莭文奉旨令臣候到兩浙相度利害即詣司農寺商量臣今已到池州切緣臣所言蘇州水利與自來建議之人不同蓋自來建議不知古人治田之法但循目今決水之末合小務大略近治遠求效欲速而久逾無功糜費雖多而水災仍舊臣擘畫以治田為先決水為後由小以成大自近以及遠要利雖久而收功甚速用工雖大而為役不勞所以與自來建議者不同也臣今欲再乞先詣司農將臣元所上文字地圖與今再陳利害及將來合行事件曲折辨析子細陳白則利可盡於一食之頃工可定於數月之內小效可見於一年大效可成於五歲臣今往真州聽候朝旨先具到治田利害大槩畫一聞奏所有將來合行擘畫事件容臣前路撰成文字至司農日供上謹具所陳利害一論古人治低田髙田之法昔禹時震澤為患東有堽阜以隔截其流禹乃鑿堽阜疏為三江東入海而震澤始定然環湖之地尚有二百餘里可以為田而地皆卑下猶在江水之下與江湖相連民既不能耕植而水面又復平闊足以容受震澤下流使水勢散漫而三江不能疾趨於海其沿海之地亦有數百里可以為田而地皆髙仰反在江水之上與江湖相遠民既不能取水以灌溉而地勢又多西流不得畜聚春夏之雨澤以浸潤其地是環湖之地常有水患而沿海之地每有旱災如之何而可以種藝耶古人遂因其地之髙下井之而為田其環湖之地則於江之南北為縱浦以通於江又於浦之東西為橫塘以接其勢而棊布之有墟田之象焉其塘浦闊者三十餘丈狹者不下二十餘丈深者二三丈淺者不下一丈且蘇州除太湖之外江之南北别無水源而古人使塘深闊若此者蓋欲取土以為堤岸髙厚足以禦其湍悍之流故塘浦因而闊深水亦因之而流耳非專為闊其塘浦以使決積水也故古者堤岸髙者須及二丈低者不下一丈且如塘靣闊三十丈底闊二十五丈深一丈積土二萬七千五百尺分為兩岸則每岸積土一萬三千七百五十尺故岸基可闊五丈面可闊一丈而髙二丈已上然其間塘浦亦有淺狹處并所取之土未必盡能為岸故曰髙者二丈低者不下一丈也今蘇州水田之岸髙者不過四五尺低者三二尺而已塘浦闊者六七丈狹者止三五丈而欲禦湍悍之水其可得乎借令大水之年江湖之水髙於民田五七尺而堤岸髙出於塘浦之外三五尺至一丈故雖大水不能入於民田既不容水則塘浦之水自髙於江而江水亦髙於海不須決泄而水自湍流矣故三江常浚而水田常熟其堽阜之地亦因江水稍髙得以畎引灌溉此古人浚三江治低田之法也所有沿海髙仰之地近於江者既因江流稍髙可以畎引近於海者又有早晚一潮可以灌溉故亦於沿江之地及江之南北或五里七里而為一縱浦又五里七里而為橫浦其塘港之闊狹與低田同而其深往過之且堽阜之地髙於積水之處四五尺七八尺遠於積水之處四五十里至百餘里固非決水之道也然古人為塘浦闊深若此者蓋欲畎引江海之水周流於堽阜之地雖大旱歲亦可車畎以溉田而大水之年積水或從此而泄之耳非專為闊深塘浦以決低田之水也至於地勢西流之處又設堽門堰門斗門以瀦畜之是雖大旱堽阜之地皆可耕以為田此古人治髙田畜雨澤之法也故低田常無水患髙田常無旱災而數百里地常獲豐熟也二論後世廢低田髙田之法古人治田髙下既皆有法方是時也田各成墟墟必有長每一年率逐墟之人修築隄防治浦港故低田之隄防常固旱田之浦港常通古之田雖各成墟然所名不同或謂之段或謂之圍今崑山低田皆沈在水中而俗呼之名猶有野鶴段大泗段湛段及和尚圍盛墩圍之類至錢氏有國而常撩清指揮之名此其遺法也開河之卒而名之為撩清者隄防常存而逐年撩治之謂若今之河清然洎乎年祀綿遠古法隳壞其水田之隄防或因田户行舟及安舟之便而破其墟古者人户各有田舍在田墟中因以為家欲其行舟及安舟之便乃鑿為小涇小濱即臣昨來所陳某家涇某家濱之類是也説者謂濱安泊船也涇濱既小堤岸不髙遂至壞却田墟為白水也今崑山柏家灢水底之下尚有民家階甃之遺址此古者民在墟中住居之舊迹也今崑山富戶如陳新顧晏陶湛等田舍皆在田圍之中每至大水年亦是外水髙於田舍數尺此今人在田墟中作田舍之驗也或因人户請射下腳而廢其堤塘浦久不浚治故肥泥增漲人户不顧久遠之利請射為田官中利於租稅或因請托逐墟給付始作小堤於外終無大堤於內萬一小潦遂蕩然隳壞或因官中開淘而減少丈尺每州縣擘畫乞開浚塘浦不知古人闊其塘浦髙其堤岸之意乃謂只欲行舟決水不須如此深闊兼恐上司及朝廷不從多是小破工料少計日月比至興役則將一條塘變為三條塘也自小虞浦至和塘並闊三二十丈纍經開淘今小虞浦只闊十餘丈至和塘止闊六七尺此目所睹也或因田主只收租課而不修堤岸蘇州租米上田每畝一石下田只五六斗又輸納苖稅借使年年遇熟每畝不過剩得三五斗若一次做岸每畝約用錢三二百文故田主寧肻沒田不肻做岸或因租戶利於易田而故要淹沒吳人以一易再易之田謂之白塗田所收倍於常稔之田而所納租亦依常數而租户樂於間年淹沒也或因決破古堤張捕魚蝦而漸致破損或因邊墟之人不肻出田與衆做岸一墟之內既是衆人之田邊墟之人往往侵削邊墟之田以為已田及其墟岸既壞邊墟之人豈肻更出已田與衆人做岸所以無由完復舊堤矣或因一墟雖完旁墟無力而連延隳壞或因貧富同墟而出力不齊或因公私相吝而因循不治百姓既無力浚塘修岸官司又謂本是民田不肻調發夫役與之修治上下因循遂成白水故隄防盡壞而低田漫然復在江水之下也每春夏之交天雨未盈尺湖水未漲二三尺而蘇州低田一抹盡為白水其間雖有堤岸亦皆狹小沈在水底不能固田唯大旱常潤湖秀之田及蘇州堽阜之地並皆枯旱其堤岸方始露見而蘇州水田幸得一熟耳蓋由無隄防禦水之具也民田既不能容水故水與江平而潮直至蘇州之東一二十里之地各反與江湖民田之水相接故水不能湍流而三江不浚臣伏睹昨議狹汴河者謂汴闊處水靣散漫不至深決湖汴河淤澱今蘇州水靣動連一二百里而太湖水不可及黃湍迅而欲三江不淤不可得也今二江已塞而一江又淺倘不完復堤岸驅低田之水盡入於松江而使江流湍急但恐數十年之後松江愈塞則震澤之患不止蘇而已矣此低田不治之由也其髙田之廢始由田法隳壞民不相率以治港浦港浦既淺地勢既髙沿於海者則潮不應沿於江者又因水田隄防隳壞水得瀦聚於民田之間而江水漸低故髙田復在江水之上至於西流之處又因人户利於行舟之便壞其堽門而不能畜水故髙田一望盡為旱地每至四五月間春水未退低田尚未能施工而堽阜之田已乾枯矣唯大水年湖秀二州與蘇州低田淹沒淨盡則堽阜之田幸一大熟耳此蓋不浚浦港以畎引江海之水不復堽門以畜聚春夏之雨澤也此髙田廢田也蘇州不有旱災即有水患但水田近城郭為士人所見而稅復重旱田遠城郭士人所不見而稅輕故議者止論治旱也亶又奏曰臣已於五月二十日罷廣南東路安撫司機宜文字職任六月十九日起離廣州今已於韶州出陸前去兩浙次切緣臣所陳水利委實浩大蓋蘇州之水田東南美利而隄防不立溝洫不通二三百年間風波蕩蝕僅若平湖議者見其如此乃謂舊本澤國不可使之為田上偷下安恬不為怪至如堽身之田皆肥衍豐厚每遇大水一熟其收倍蓰於水田只因隄堰隳壞不能瀦水而歲為旱地深可痛惜夫天生時而地生財人者承天之時順地之宜作為衣食以自資也今乃不能承時順宜而止欲隨天之水旱任地之髙下幸其自成為民者既不知所以承順之方為吏者又不施所以教導之力而欲吾民富庶不可得也臣籍係崑山家居太倉正在水田旱田之間備知利害伏見自來治水者不過取其舊所開所治者隨曲直闊狹浚決之而已臣之所陳殊異於此方欲順地形髙下之宜求古人蓄泄之迹髙其隄防大其溝澮曲者使直狹者使廣通民之往來而害田者塞之雖民田而可為溝澮者決之如此僅可治水若夫依隨故道而茍免一時之勞切恐空費公私終非經久之利臣今欲乞先詣司農司陳白利害然後往兩浙運司倉司提刑司同商量謹具狀奏聞伏候敕旨右司諫蘇轍論京西水匱狀曰臣三月中奏乞令汴口以東州縣各具水匱所占頃畝及每歲有無除放二稅仍具水匱可與不可廢罷如決不可廢即當如何給還民田以免怨望尋蒙朝旨令都水監差官相度到中牟管城等縣水匱元舊浸壓頃畝及見今積水所占及退出數目應退出地皆撥還本主應水占地皆以官地對還如無田可還即給還元估價直聖恩深厚棄利與民無所靳惜所存甚遠然臣訪聞水所占地至今無官地可以對還而退出之田亦以迫近水匱為雨水浸淫占壓未得耕鑿知鄭州岑象求近奏稱自宋用臣興置水匱以來元未曽以此水灌注清汴清汴水流自足不廢漕運乞盡廢水匱以便失業之民臣愚以為信如象求之言則水匱誠可廢罷欲乞朝廷體念二縣近在畿甸民貧無告特差無干礙水部官重行體量若信如象求所請特賜施行不勝幸甚哲宗元祐二年左司諫朱光庭上奏曰臣竊以君論一相相擇百官各任其職而天下治古今不易之道也今日朝廷內外無事唯治河為大役竊緣河之所以可治朝廷難以遙度責在水官任職而已其所用物料所役兵夫水官既任責則朝廷自合應副將來成功則當不惜重賞設或敗事亦當必行重責如此則上有所取信而不致過舉下不敢欺罔而以實從事臣今日所聞則異於此朝廷只知河之當竭財力以應副而水官不任其責僥幸成功則自稱已力以冀重賞以至敗事則推過朝廷茍免重責此不可之甚者也伏見此役非小役也其所責物料所役兵夫萬數不少若水官自不任責則朝廷何所取信而興此大役伏乞朝廷指揮下修河司取責水官委實可以回復大河結罪狀庶使身任其責以實從事不至朝廷有所過舉所繫事體甚大伏望聖慈早賜指揮右司諫王覿上言曰河北人户轉徙者多朝廷責郡縣以安集空倉廪以振濟又遣專使察視之恩德厚矣然耕耘是時而流轉於道路者不已二麥將熟而寓食於四方者未還其故何也盍亦治其本矣今河之為患三泛濫渟滀漫無涯涘吞食民田未見窮已一也緣邊漕運獨賴御河今御河於澱轉輸艱梗二也塘泊之設以限南北濁水所經即為平陸三也欲治三患在遴擇都水轉運而責成耳今轉運使范子竒反覆求合都水使者王孝先暗繆望别擇人時知樞密院事安燾深以東流為是兩疏言朝廷久議回河獨憚勞費不顧大患蓋自小吳未決以前河入海之地雖屢變移而盡在中國故京師恃以北限強敵景德澶淵之事可驗也且河決每西則河尾每北河流既益西決固已北抵境上若復不止則南岸遂屬遼界彼必為橋梁守以州郡如慶厯中因取河南熟户之地遂築軍以窺河外已然之效如此蓋自河而南地勢平行直抵京師長慮却顧可為寒心又朝廷捐東南之利半以宿河北重兵備預之意深矣使敵能至河南則邈不相及今欲便於治河而緩於設險非計也尚書王存等亦言使大河決可東回而北流遂斷何惜勞民費財以成經久之利今孝先等自未有必然之論但僥幸萬一以冀成功又預求免責若遂聽之將有噬臍之悔乞望選公正近臣及忠實內侍覆行按視審度可否興工未晚庚子三省樞密院奏事延和殿文彥博吕大防安燾等謂河不東則失中國之險為契丹之利范純仁王存胡宗愈則以虛費勞民為憂存謂今公私財力困匱惟朝廷未甚知者賴先帝時封樁錢物可用耳外路往往空乏奈何起數千萬物料兵夫圖不可必成之功且御契丹得其道則自景德至今八九十年通好如一家設險何與焉不然如石晉末耶律德光犯闕豈無黃河為阻況今河流未必便衝過北界耶太后曰且熟議存宗愈亦奏昨親聞德音更令熟議然纍日猶有未同或令建議者結罪任責臣等本謂建議之人思慮有所未逮故乞差官覆按若但使之結罪彼所見不過如此後或誤事加罪何益臣非不知河決北流為患非一淤沿邊塘泊斷御河漕運失中國之險遏西山之流若能全回大河使由孫村故道豈非上下通賴但恐不能成功為患甚於今日故欲選近臣按視若孝先之説決可成則積聚物料接續興役如不可為則令沿河踏行自恩魏以北塘泊以南别求可以疏導歸海去處不必專主孫村此亦三省共曽商量望賜詳酌存又奏自古惟有導河并塞河導河者順水勢自髙導令就下塞河者為河堤決溢修塞令入河耳不聞斡引大河令就髙行流也於是收回戊戍詔書侍御史王岩叟乞詔大臣早決河議奏曰臣伏以朝廷知大河橫流為北道之患日益以深故遣專使命水官相議便利欲順而導之以拯一路生靈於墊溺甚大惠也臣竊意朝廷默有定論必欲紓患矣然昔者專使未還不知何疑而先罷議洎致專使反命不知何所取信而議復興既敕都水使者揔護役事調兵起工有定日矣已而復罷數十日間而變議者再三何以示四方他日雖有命令真不可易誰將信之夫利害之際自古以來不能無二三之説必朝廷之上力主一議斷而必行乃克有濟不容一人言之輒興一人言之輒廢大事大議而易興易奪臣恐天下有以窺朝廷也今有大害者七焉不可不早為計爾北塞之所恃以為險者在塘泊若河堙沒勢雖退流猝不可濬浸失此塞險固之利一也使百萬生靈居無廬耕無田流散而不復二也乾寧孤壘危絶不足道而大名深冀腹心郡縣皆有終不自保之勢三也滄州扼北邊海道自河不東流滄州在河之南直抵京師無有限隔四也并吞御河邊城失轉輸之便五也河北轉運司歲耗財用陷租賦以百萬計六也六七月之間河流交漲占沒西路阻絶敵使進退不能兩朝以為憂七也非此七者之害則委之可也緩而未治之可也且去歲之患已甚於前歲今歲之患又甚焉則將奈何伏惟陛下深拱九重此事之可否必以仰大臣大臣固當為陛下審慮謹發而謹持之以救大患不可坐視而無所處也伏望聖慈深詔執政大臣早決河議而責成之實廟社生靈之幸臣不勝愚忠尚書右僕射范純仁論回河乞付有司熟議疏曰伏覩內降指揮黃河未復故道終為河北之患王孝先等所議已嘗興役不可中罷宜接續功料向去決要回復故道者臣聞聖人有三寶曰慈曰儉曰不敢為天下先此言三道人君當保而持之不失者也又曰惟天為大惟堯則之蓋天不言而四時成所以堯舜垂衣拱手而天下大治者用此道也且君心欲如盤水常使平正而無所趣則免偏側傾覆之患蓋天下大勢惟人君所向羣下競趨如川之流如山之摧小失其道則非一言一力之可回故居上者不可不慎也臣今竊詳所降指揮謂決要回復故道似聖意已有所向而為天下先矣臣聞先朝因人建議以謂夏國微弱若不早取必為北敵所兼偶先帝不出建議者之名但以御批令邊臣相度而希旨生事之徒以為萬全之勝剋日可得遂興靈武之師至今疲耗未復此陛下所親見不可不為深鑑也臣乞面諭執政前日降出文字卿等已見但一面商量却使進入若别有所見亦須各自開陳如此則免希合之臣妄測聖意輕舉大役上誤朝廷所有黃河利害乞付之羣臣有司子細商量以求必當此則聖心不勞而堯舜之治可致矣切見自來邊事陛下多委樞密院及邊帥典禮亦委執政并禮官今來河事正與此同況利害尚在久逺不至倉卒可容詳熟商量純仁再論回河畫一疏曰臣伏見昨日議論河事大臣各有所見聖心慎於裁決天下幸甚臣輒更陳一二仰禆宸聽具畫一如左一大河為中國之險此乃人所共知今欲改移須先審驗河勢所向地形髙下可為則為固不可以人力國財強與水爭前來執政輕信事不預慮已枉用過人功物料不少今來又欲不度可否決要施功只恐將來用過財力漸多朝廷欲罷不能財匱人勞别生它事則設險之利未成而疲耗之弊難救矣昨來止用兵卒二萬亦聞逃亡至多若下諸州取蒙放減生還人數便見的實一凡欲舉事雖小亦必預計財料先備人工然後度力可為方議下手豈有大河之役繫半天下生民休戚未曽計定的確人工物料便欲興工將來事至垂成水勢壅遏上下危急之際方却旋有增添公私既無預備倉卒科率於民何由可辦擾人害國莫此為大所以宜加深慮也一河役所費既廣則既回之後亦要數年安流若水小之時僅能閉塞至水大之後更復橫流及恐壅住北流或東向舊河吞納不快却致别處決溢則為害愈甚此事須當建議相度之臣審度保明然後定議如此則民力國財不至耗用朝廷所舉不為天下竊議一議者本欲回復黃河今見議論不同已自不敢執守却稱來年且先開減水河以試探水勢若些小工料猶可茍為試探若大段費耗豈得不先審度便從舉事及云將來若河有改易不罪水官此是姦人希賞逃罪之本兼黃河北流今已數年未曽别為大患而議者先事回改恐失中國之利正如西夏本不曽為邊患而好事者以為不取恐失幾會遂興靈武之師所以臣言與向時邊事正同望聖意深察純仁為觀文殿大學士知潁昌府又論回河利害疏曰臣聞堯舜之治不過知人安民知人則不輕信安民則不妄動緣小人之情希功好進行險生事於聖明無事之朝則必妄説利害覬朝廷舉事以求爵賞朝廷若輕信其言則民不安矣國家之弊常必由斯臣不敢遠引古昔只以近事言之國家自仁宗以前天下無事百姓安樂雖有元昊曽叛獨陜西應副不易未聞四方匱乏百姓有嗟嘆之聲也自王安石輕信小人之言勸先皇更改法令而後乘間妄作者紛然矣主用兵之謀至於勸興靈武之役而生民被害衆矣且以先帝聖明舉動固欲詳審然小人利口欺誤執政而致執政復誤朝廷也其勸更法令者則曰君臣千載一遇時不可失及勸興靈武之師者復曰將為北敵所并時不可失臣前在政府又見欲回復大河者又曰河勢方東恐變改不定時不可失臣以前車之戒是以深畏其言故嘗屢有奏陳以謂百姓久勞方賴陛下安養不急之務不可遽興蒙陛下專遣范百祿趙君錫相度歸陳回河之害甚明蒙宸斷宣諭大臣令速罷修河司臣預奉行詔旨深以復見堯舜知人安民為慶三兩月來却聞孫村有溢岸水自然東行議者以謂可因水勢以成大利朝廷遂捨向來范百祿趙君錫之議而復興回河之役臣觀今之舉動次苐是用時不可失之説而欲竭力必成臣更不敢以難成及雖成三五年間必有決溢為慮只且以河水東流之後增添兩岸隄防鋪分大段數多逐年防守之費所加數倍則財用之耗蠧與生民之勞擾無有已時更望聖慈特降睿旨再下有司預約回河之後逐年兩岸掃鋪防捍工費比之今日所增幾何及逐年錢物於甚處出辦則利害灼然可見若利多害少尚覬徐圖茍利少害多尤宜安靜臣受陛下不次拔擢之恩雖養痾補外不敢自同衆人坐視成敗所以罔避僭越之愆而伸補報之萬一區區愚誠惟聖聰憐察戶部侍郎蘇轍論開孫村河疏曰臣為戶部右曹兼領金倉二部任居天下財賦之半適當中外匱竭不繼之時日夜憂惶常慮敗事竊見左藏見緡一月出納之數大抵皆五十餘萬略無贏餘其他金帛諸物雖小有羡數亦不足賴臣之愚怯常恐天災流行水旱作沴西羌旅距邊鄙繹騷河議失當賦役橫起三事有一大計不支雖使桑羊劉晏復生計無從出矣而況於臣之駑下乎今者幸賴二聖慈仁恭儉大地垂貺諸道秋稼稍復成熟雖京西陜西災旱相接而一方之患未為深憂羌人困窮旋聞𣢾塞惟有黃河西流議復故道事之經歲役兵二萬人蓄聚梢樁等物三千餘萬方河朔災傷困敝之餘而興必不可成之功吏民竊歎勞苦已甚而莫大之役尚在來歲天啓聖意灼知民心特召河北轉運司官吏訪以得失近聞回河大議已寢不行臣平日過憂頓然釋去然尚聞議者固執開河分水之策雖權罷大役而兵功小役竟未肻休如此則河北來年之憂亦與今年何異今者小吳決口入地已深而孫村所開丈尺有限不獨不能回河亦必不能分水況黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理哉縱使兩河並行不免各立隄防其為費耗又倍今日矣臣聞自古聖人不能無過過而能改善莫大焉故君子之過如日月之食過也人皆見之更也人皆仰之朝廷舉動義當如此今議河失當知其害人中道而復本何所愧雖使天下知之亦足以明二聖憂民之深為之改過不吝今乃顧惜前議未肻曠然更張果於遂非難於遷善臣實為朝廷惜之然臣聞議者初建開河分水之策其説有三其一曰御河堙滅失饋運之利其二曰恩冀以北漲水為害公私損耗其三曰河徙無常萬一自敵界入海邊防失備凡其所以熒惑聖聰沮難公議皆以三説藉口夫河決西流勢如建瓴引之復東勢如登屋雖使三説可信亦莫如之何矣況此三説皆未必然臣請得具言之昔大河在東御河自懷衛經北京漸歷邊郡饋運既便商賈通行今河既西流御河堙滅失此大利誰則不知天實使然人力何及若議者能復澶淵故道則御河有可復之理今河自小吳北行占壓御河故地雖使如議者之意自北京以南折而東行則御河堙滅已一二百里亦無由復見矣此御河之説不足聽一也河之所行利害相半夏潦漲溢浸敗秋田濵河數十里為之破稅此其害也漲水既去淤厚纍尺宿麥之利比之他田其收十倍寄居丘冡以避淫潦民習其事不甚告勞此其利也今河水在西勢亦如此遠為隄防不與之爭正得漢賈遜治河之意比之故道歲省兵夫梢芟其數甚廣而故道已退之地桑麻千里賦稅完復為利不資安用逆天地之性移西流之憂為東流之患哉此恩冀以北漲水為害之説不足聽二也河昔在東自河以西郡縣與敵接境無山河之限邊臣建為塘水以捍敵馬之衝今河既西行則西山一帶敵馬可行之地已無幾矣其為邊防之利不言可知然議者尚恐河復北徙則海口出敵界中造舟為梁便於南牧臣聞敵中諸河自北南注以入於海蓋地形北髙河無北徙之道而海口深浚勢無徙移臣雖非目見而習北方之事者為臣言之大略如此可以遣使按視圖畫而知此河入敵界邊防失備之説不足聽三也臣願以此三説質之議者則開河分水之説誠不足復為矣又臣訪聞今歲四五月間河上役兵勞苦無告嘗有數百人持板築之械訪求都水使者意極不善賴防邏之卒擁拒而散盛夏苦役病死相繼使者恐朝廷知之皆於垂死放歸本郡斃於道路者不知其數若今冬放凍來歲春暖復調就役則意外之患復當如前臣不知朝廷何苦而不罷此役哉今建議之臣恥於不效而堅持之於上小臣急於利祿不顧可否隨而和之於下上下膠固以罔朝廷其間正言不避權要才一二人耳然事非本職亦不敢盡言臣以戶部休戚計在此河若復緘默誰當言者惟斷自聖心盡罷其議則天下不勝幸甚轍再論回河疏曰臣頃聞朝廷議罷回河來年當用役兵開河分水臣以為天下財賦匱竭河朔災傷之後民力未復未堪此役輒奏言不便既而採察衆議聞河北轉運使謝卿材到闕昌言於朝曰黃河自小吳決口乘髙注下水勢奔快上流隄防無復決怒之患而下流湍駛行於地中日益深浚朝廷若以河事付臣臣請不役一夫不費一金十年之間保無河患大臣以其異已罷歸本任而使王孝先俞瑾張景先三人重畫回河之計三人利在回河雖言其便而亦知其難成故於議狀之末復言若將來河勢變移乞免修河官吏責罰都下􅍅􅍅傳笑以為口實蓋回河之非斷可知矣然近日復聞內批降付三省如云若河流不復故道終為河朔之患外廷踈遠不知此説信否然衆心憂懼深恐羣臣由此觀望不敢正言得失臣職在財賦憂責至深不敢畏避誅戮願畢陳其説方今回河之策中外講之熟矣雖大臣固執亦心知其非無以藉口矣獨有邊防一説事係安危可以竦動上下伸其曲説陛下深居九重羣言不得盡逹是以遲遲不決耳昔真宗皇帝親征澶淵拒破契丹因其敗亡與結歡好自是以來河朔不見兵革幾百年矣陛下試思之此豈獨黃河之功哉昔石晉之敗黃河非不在東而祥符以來非獨河南無烽警河北亦自無兵患由此觀之交接敵國顧德政何如耳未聞逆天地之性引趨下之河升積髙之地興莫大之役冀不可成之功以為設險之計者也昔李垂孫民等號知河事嘗建言乞導河西行復禹舊迹以為河水自西山北流東赴海口河北諸州盡在河南平日契丹之憂遂可無慮今者天祚中國不因人力河自西行正合昔人之策自今以往北岸決溢漸及敵境雖使異日河復北徙則敵地日蹙吾土日紓其為憂患正在契丹耳而大臣過計以為中國之懼遂欲罄竭民力導河東流其為契丹謀則多為朝廷慮則踈矣議者或謂河入敵境彼或造舟為梁長驅南牧非國之利臣聞契丹長技在鞍馬舟楫之利固非所能且跨河繫橋當先兩岸進築馬頭及伐木為船其功不細契丹物力寡弱勢必不能就使能之今兩界修築城柵比舊小增輒移文詰問必毁而後已豈有坐視大役而不能出力止之乎假設敵中遂成此橋黃河上流盡在吾地若沿河州郡多作戰艦養兵聚糧順流而下則長艘巨纜可以一炬而盡形格勢禁彼將自止矣臣竊怪元老大臣久更事任而力陳此説意其謀已出口重於改過而假此不測之憂以取必於朝廷耳不然豈肯於天下困弊河朔災傷之後興數十萬夫費數千萬物料而為此萬無一成之功哉夫大役既興勢不中止預約功料有少無多官不獨辦必行科配官出其一民出數倍公私費耗必有不可勝言者矣茍民力窮竭事變之出不可復知飢餓相逼必為盜賊昔秦築長城以備邉城既成而民叛今欲回大河以設險臣恐河不可回而民勞變生其計又出秦下異日雖欲悔之不可得也陛下數年以來休養民物如恐傷之今河已安流契丹無變而強生瘡痏以擾之非計之得也故臣願陛下斷之於心罷此大役唯留神察之自河決小吳於今九年不為不久矣然敵情恭順與事祖宗無異陛下誠重違大臣姑復以三年觀之事久情見大臣之言與天下公議可以坐而察也臣不勝區區憂國之誠干犯斧鉞死無所避輒三論回河疏曰臣近者聞有內批降付三省言黃河若不復故道終為河北之患初聞此旨中外無不驚愕以為黃河西行已成河道大臣橫議欲壅令復東異同之論方相持未決而此旨復降臣下觀望誰敢正言方衆心憂疑之際旋聞復有聖旨收入前降批語羣臣釋然咸知陛下虛已無心欲來公議深得古先聖王改過不吝之美正人端士始有樂告善道之意然臣竊聞近又降敇以北京封樁京東新法鹽錢三十五萬貫指揮河北收買開河梢草繼又商量調發來歲開河役兵二事既出中外復疑何者朝廷近遣范百祿等按行河事利害若開河之議可行無疑則安用遣使若猶遣使則開河之議尚在可疑今使未出門而一面收買梢草調發役兵則是眀示必開之形欲令使者默喻欲開之旨臣雖愚暗竊恐非陛下虛已無心欲來公議之意也伏乞速降指揮收回買梢發兵二事使范百祿等明知聖意無所偏係得以盡心體量不至阿附大臣以誤國計今中外財賦匱竭見錢最為難得新法鹽錢不屬户部要是百姓膏血不可輕用況河北災傷之餘明年大役決不可興雖如今歲止用役兵如臣前奏所言役苦財傷為害已甚將來若范百祿等以開河為便猶當計校利害寬展歲月調兵買梢皆非今歲所急范百祿等以開河為不便則聚兵積梢梢草輕脆稍經歲月化為糞壤皆非計也況所用梢草動計千萬一時收買價必踴貴若止令和買則所費不資必非止三十五萬貫可了若令配買則河北災傷之餘民間大有陪備或生意外之患不可不慮也臣受聖恩至深至厚位下力微竊不自量再三干與國論罪當萬死不敢逃避歷代名臣奏議卷二百五十
