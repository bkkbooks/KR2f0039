body:
  text: 歷代名臣奏議卷二百三十三明楊士竒等撰征伐宋髙宗時直龍圖閣李光乞車駕親征劄子曰臣聞能扶天下之危則據天下之安能除天下之憂則享天下之樂能救天下之禍則獲天下之福故聖人不畏多難畏無難蓋多難之世懷戒懼怵惕之心無難之世有宴安鴆毒之纍自昔有為之君或開基創業或撥亂中興身遭艱厄而能奮然特起者未易槩舉以漢髙之英雄身居項王掌握中數矣然城破復收兵散復合彭城之敗至推墮二子而不顧窘亦甚矣卒能滅楚以有天下者忍小恥以成大功也光武北徇燕薊困於王郎蒙犯霜露面皆破裂惶惑不知所之然卒能破郎以興漢祚者因危難以恢帝業也恭惟陛下以慈儉之德當艱厄之運維揚之變起於倉卒人心緣此而震恐將士因是而驕惰近年以來議論之臣各懷顧避上下一律莫肯慨然以持危扶顛為己任者今翠華駐蹕會稽首尾三載自去秋迄今敵騎無復南渡之意淮甸咫尺了不經營長江千里不為限隔惴惴然日為乘桴航海之計謂之萬全臣所未諭也以區區晉元草創建國於基緒既絶之際猶能立宗社修宫闕興學勸農保有江浙劉琨祖逖與敵人拒戰於并冀兖豫司雍諸州未嘗陷沒也以石季龍之強大兵叩歷陽命王導都督中外諸軍事以禦之周世宗當五代之末取淮南攻隴右下三關皆御軍親行威震敵國未聞専主避敵之謀如今日也況陛下英武命世以真主之勢而臨偽邦以中國之尊而抗邉鄙天人助順軍人士庶孰肯甘心委質屈膝敵庭終身為外國絶域之人哉今將非不武兵非不衆陛下儻整兵順動則簞食壺漿以迎王師者袂相屬也患在陛下無其志耳臣愚欲望陛下明詔三省密院大臣分命將士守禦江津力為保境之謀徐決親征之䇿庶幾經略中原漸謀興復以副海內生靈顒顒之望天下幸甚光又論守禦大計狀曰臣以孤蹇無能之身蒙陛下起之流落放棄之中更歷內外浸冒器使十稔于兹布衣衡茅之士遭遇如臣者果幾人哉顧惟天地父母之恩雖碎首屠肝豈能稱塞臣到任未幾恭逢大駕移蹕平江府將親御戎輅誓師兩淮此臣捐軀效命之秋念方拘縻郡紱留滯海濵上之不能吐竒䇿以佐軍謀下之不能執干戈以衛宗社乞扈從則貽干進之譏獻謀議則興空言之誚夙夜憂憤莫知計之所出臣聞忠臣不以出處二其心正士不以險夷易其守臣豈敢預憂小人不根之言遽有所畏避哉況臣陛辭之日陛下嘗許臣以言儻有所見其忍緘默臣伏覩關報劉光世張俊捍禦大敵三捷繼聞海宇流傳孰不慶幸然臣聞強敵擁兵淮陽宿亳之間坐觀勝敗此其志不淺趙充國之擊敵以殘滅為期孫權每戒江上諸將不貪小利臣是以未敢以諸將奏捷為喜而方以金人大隊深入為憂昔楊珉問朱伺曰將軍前後擊賊何以每勝伺曰兩敵共對惟當忍之彼不能忍我能忍以是勝耳漢祖與項羽對壘晉宣與諸葛亮相持方形勢未便孤軍逺來未嘗與之爭鋒周亞夫深壁以却吳軍光武堅營以降銅馬此皆已事之驗臣觀今日敵兵布置必有主謀願陛下勿輕此敵今朝廷所恃獨一韓世忠彼必以精鋭當之而劉麟輩出沒光黃廬夀間以牽制諸將而分吾力金人必自淮陽以入楚泗若社稷之靈世忠足以禦之則無復事矣萬一衆寡不敵便有瓦解之勢昔楚屈完謂齊公曰楚國以方城為城漢水為池雖君之衆無所用之魏文帝至廣陵見波濤洶湧歎曰此天所以限南北也兵法謂善守者敵不知所攻今陛下已據東南形勝之勢敵人萬里逺來投兵死地利於速戰而不利於遲久今不務重而誇一時之功決一旦之命臣恐正墮敵計非䇿之得也臣狂瞽之言曩備數從列方燕間進對造膝之語所謂萬全之䇿者嘗為陛下陳之矣金人往年南牧無所得去冬又無所得而去士馬折傷固已大半異時雖欲復驅強暴之衆以犯我孰肯為用者此乃坐制強敵之術臣愚伏望陛下或敕諸將各務持重不過隱忍三兩月間彼師老食盡然後廣設方略出兵追擊或邀其歸途我得勝算矣偽地恃敵為強敵騎既退則劉豫父子豈能立國乎復祖宗之故疆還二聖於沙漠當在此舉惟陛下特加聖慮光又進裴度平蔡故事曰臣聞古之善用兵者必有正有竒是也唐太宗問李靖曰曹公云竒正旁擊卿謂若何靖曰臣愚謂大衆所合為正將所自出為竒烏有先後旁擊之拘哉臣觀李訴之入蔡蹈不測之險以邀非常之功可謂用竒矣當是時吳元濟徑兵鋭卒多屯洄曲宰相裴度為宣慰招討使馬總副之韓𢎞為都統李光顔烏重胤為大將軍賊兵雖衆勢足以抗之訴之勝敗不係朝廷之安危也訴自文城柵襲張柴疾馳二百里夜半到蔡黎明擒元濟其摧大敵不啻反覆手之易一何神哉今議者不盡歸功於訴曰平淮蔡者裴度也不盡歸功於度曰成蔡功者憲宗也蓋訴雖出竒其實功狗耳而排衆論以主伐蔡之謀者度也度雖主謀議而獨斷不疑者憲宗也故韓愈頌曰凡此蔡功惟斷乃成嗚呼社稷之計安危之機有間不容髮者與衆智慮之一庸人足以擾之故謀之欲廣斷之在獨斷而後行鬼神避之非人主灼見禍福利害之源孰能成其功哉章誼乞親征奏曰臣觀金人之侵中國七年於兹矣陵廟都邑殘毁殆遍衣冠士庶殺虜無遺神怒民怨負幽明之責窮凶黷武召自焚之災然猶溪壑貪殘未有止極戈甲紛紜時作不靖此誠天心厭亂之時也陛下以聰明英武之姿承祖宗積纍之業傾否以泰代虐以寬克定禍亂不為難能然勤勞以久而大功未集者竊意陛下謙沖退避未能應天順人決機兩陳之間是以敵勢縱橫得以輾轉憑陵遷延歲月之久以臣觀之陛下兵將非不多財用尚未匱士大夫可以奉令承教者亦不乏於時也陛下誠能因任羣臣之材控扼險阻嚴設守備簡練卒伍選任將臣水有舟師陸有鬭士一朝有警舉江南之衆為百姓請命於天則未勝之敵垂手可平泰定之期指日可復陛下無憚乎金人之強而莫之抗也昔光武以昆陽數千之衆破尋邑百萬之師晷刻之間大業遂定使光武怯於大敵不能躬擐甲胄以寡制衆則漢祚未易興也唯我真宗澶淵之役黃繖登陴人百其勇坐制強悍流慶萬年前事不逺實可鑒哉陛下若不躬自指授而委之將相大臣則士氣不振兵力必分號令不嚴賞罰不信掃蕩邉疆未有日也陛下時於暇日總帥六師親御近郊嚴金鼓之奏勒步騎之數按勤惰勇怯之實以明黜陟誅賞之政則知軍事之可為矣唯陛下留神大幸誼乞息兵愛民奏曰臣聞帝王之師有征而無戰如堯攻叢支胥敖啓攻有扈皆國為丘墟身為刑戮蓋救民於水火之中不得而緩是以奮揚武怒而天威立決豈復有戰哉若夫虎狼之狠鯨鯢之暴令之則不從懷之則不服必欲輿尸血刃殃民於鋒鏑以幸一日之戰則聖人有所不忍故舜之格有苖髙宗之伐鬼方皆裴回退避增修於德而後有之所以兼愛乎吾民也今陛下當偽齊叛亂之餘恢祖宗積纍之業德施既普政事既修武備既嚴然而奉辭伐罪之師屯於境上者纍捷矣而昏迷者未從舊國舊都之民疲於奔命者纍年矣而徭役之未已彼其神怒人怨偷生假息亦何待戰而後取之乎若申飭邉吏益戒不虞宣布詔音稍緩師期明示息兵愛民之意以待應天順人之舉此詔既下逺邇俱安然後回鑾浙右勸耕兩淮收攬羣䇿為徯后之民請命于上帝如是則盛德愈隆而大業易集矣有征無戰宜在於此誼乞遣將助張俊掎角李成奏曰臣聞用兵之法正如獵獸或角其前或掎其後則獸雖善逸無所逃矣比者李成怙亂於淮北馬進猖獗於江南陛下指授將臣一舉而破馬進收筠州捷書來上士氣百倍威罰行矣然李成方據江州之險外恃淮南之援而聞張俊欲提孤軍就攻其營旁無掎角之助又無首尾之應乃一頓兵堅城之下相持未決情見力屈則賊復得志矣伏望睿斷乘張俊破竹之勢更遣一二將臣搗其巢穴出其不意攻其無備一舉而疾決實萬全之䇿也古語有之兵聞拙速未覩巧之久也伏惟聖主留神幸甚誼又上奏曰臣近聞金人正月有南渡之意已嘗略具事情及乞朝廷俯從臨安守臣李光所請參用諸州土豪以為備禦疏奏纍日未聞施行議者決以陜西宣撫使司屢有收復關陜之報兼諸處探報金人困於契丹之兵呼索酋領前去自衛決無南渡之事遂欲奠枕臣伏思之審如所傳則來年正月決須南渡蓋劉豫既以貪生失節盜據京東河北之地則金人必與之紀綱之僕付以侵襲之事劉豫來春若不遣兵南渡何以塞責然而兵則非金人之兵乃驅劫中國之民也騎則非金人之騎乃中國駑弱之馬也其侵也決無必進之心其戰也決無死鬭之志此最易與也朝廷誠因此時作勵將士參用土豪諭以金人敗亡之端明言劉豫易與之狀除去州郡退保之令有能斬首捕敵者重為賞格使人有忿心士有鬬志則江南將吏效死自奮唯恐敵兵之不相遇也中興之業在此一舉今不設備萬一有警又復奔走前有盜賊之虞後有追兵之急雖有智勇不能為謀矣且敵兵徘徊江北又已數月若築室反耕浚隍堅壁尚恐自為持守之計今乃按兵不動潛備舟楫其情豈易測哉願陛下不以臣言為可忽撿會前奏併賜施行不勝大幸誼又上奏曰臣竊見近者淮南探報金人發兵聲言前去漢上與李橫牛臯相攻擊其前後相繼傳聞不一其人馬頭項頗多觀此事勢不止為襄漢而起必為川峽興師明矣今李橫所鎮之地正在金房川峽之間使李橫可破則金人必盛兵歸峽入四川若四川擾則王似盧法原控制關陜之間決望風自潰矣使李橫不可破則金人必分兵以綴李橫而盛兵由金房趨梁洋安行而入蜀矣觀此二端則救李橫乃可以存川陜若棄而不恤非唯四川立破關陜亦不可保也又況襄陽重鎮中國得之可以扞蔽江淮全上流之勢敵人得之可以窺伺荆湖有建瓴之順萬一李橫不守而襄陽為敵人所據則荆湖江浙之禍未有既也近者探報隨州已破行及德安則是李橫方且自救之不暇其不能庇他郡明矣使隨郢德安諸郡盡為敵人所有則襄陽孤城不攻而自破李橫全軍不戰而自屈天下事勢將如之何竊謂李橫不可以不援也朝廷近者劄付王􅊅解潛使援李橫夫解潛見治荆南去李橫為最近然不聞有可發之兵王􅊅見捕楊么雖有兵萬餘然與李橫疆界絶不相接無指臂之勢此二人者兵力孤逺不能應援李橫必矣朝廷知其不能救而漫為此言以張李橫之軍聲則可也使李橫不解此意而日夜與敵人相持恃應援以守孤危之城豈不殆哉湖南去襄陽不至甚逺有韓京任士安吳錫孫儀湯尚之孫澤步諒七項兵共二萬三千餘人湖北亦有杜湛一將淮蔡之兵誠就江西湖南北選一重臣總帥諸軍水陸並進駐師荆南則李橫之勢振矣李橫自十月中旬有出兵之報是時已與敵人相接今之援兵比至其地固己後時然此非救急之兵自是扞邉之䇿耳度朝廷果為日下發兵亦須兩月而後及其境當是時李橫戰勝則可以相與追躡敵人入蜀之兵李橫不勝則此兵自可進據襄陽以固吾圉比之坐視而不救豈不相逺哉誼又上奏曰臣伏聞舒蘄鎮撫使李成之將馬進圍犯江州屯兵廬山劫掠南康軍朝廷見遣池州安撫大使吕頥浩統兵討擊臣竊惟李成稔惡基禍自干天誅大兵問罪有征無戰自宜奉命之將計日奏功悔過之人稽首請服無可疑者矣唯是師行即次賊當授首而震怖斧鉞之誅貪戀朝菌之命敢舉螳臂以抗我師破竹之勢迎刃未解則廟堂之上又將不得快意於此賊矣臣輒條陳六事奪賊腹心冀收不戰之效一曰要結四鄰之援以破其輔車之勢二曰多遣撫諭之使以收其將士之心三曰密用間諜以離其同惡之黨四曰廣備舟師而絶其往來之援五曰壓以重兵而受其來歸之人六曰逺設伏兵而禦其奔衝之患伏望聖慈留神聽察臣謂要結四鄰之援以破其輔車之勢者今淮西有趙霖史康民淮東有嶽飛劉綱王林郭仲威湖北有解潛陳規湖南有孔彥舟京西有馮長寧各宜遣使奬以溫詔告以馬進侵叛之事使之慎守封疆屯據要害繕甲治兵勿與交通若有師期相為掎角其或交通資給坐視越逸當受同惡之罰如此則四鄰之援絶矣臣謂多遣撫諭之使以收其將士之心者今李成所以不敢自歸者以其擁兵自衛遷延不朝歲月已久以范瓊為戒也若其將士則皆吾人何罪之有朝廷數遣重使絡繹撫諭哀其流離憐其暴露恤其老幼失業之久而許其分屯就食之所明其忠義自堅之意而别其不與盜賊同惡之情形於溫詔許其來歸如此則將士感奮知君臣之義而畏服李成之心可奪矣臣謂密用間諜以離其同惡之黨者今李成身在淮西而侵盜之兵間在江左朝廷罪其侵盜則曰叛將實然伐其叛將則隂為濟師是李成雖有為盜之心而猶知惡其名也臣願明降詔書使訓督馬進收奪其兵而隂遣辨士説客諭其黨與寵以髙爵啖以厚利許之分鎮使得自歸如此則李成部曲必生疑異而黨與離矣使李成能制叛將而休兵息戰則我之命令行矣又將何求使其不能制叛將或陽收其兵而隂督之戰則我之間謀可用也李成豈能久安哉臣謂廣備舟師而絶其往來之援者李成受命為淮南鎮撫自蘄黃越一江至南康自南康又越一江乃至池饒今其將馬進之兵實在南康屯於廬山則既越一江矣彼必朝暮往來探伺應援互為聲勢以恐我師願密詔江西湖南多為戰艦教習水軍分遣智將聽候師期順流而下斷其歸路則南康廬山之賊絶無後援可不戰而擒矣擒其前軍則淮西之師震恐敢不聽命哉臣謂壓以重兵而受其來歸之人者馬進之兵將本皆朝廷之兵將豈願拒抗王師哉特劫於威強服耳又況彼方乏食我飽而彼飢我逸而彼勞與其事李成而取危亡孰若歸朝廷而就安逸若遣重兵與之對壘而不接戰曠日持久馬進之兵必扶老擕幼棄甲投戈來歸者衆撫而用之善而養之隨其才而官使之李成不走則擒矣臣謂逺設伏兵而禦其奔衝之患者今李成見在淮南與南康池饒對境將來問罪之師進至江東近壓賊壘若湖南有舟師之備則下流諸州太平建康宣州等處皆宜設備以防奔逸蓋自大江而下此數州者風利水駛數日而至彼將出竒以搗我虛則腹背驚顧江浙繹騷賊得志矣今若密令數郡戒嚴設伏待其衝至則成擒矣此六事者如有可採伏乞斷自宸衷與執政大臣議其緩急密賜施行髙宗時幸建康起居舍人吕本中奏曰當今之計必先為恢復事業求人才恤民隱講明法度詳審刑政開直言之路俾人人得以盡情然後練兵謀帥增師上流固守淮甸使江南先有不可動之勢伺彼有釁一舉可克若徒有恢復之志而無其䇿邦本未強恐生他患今江南兩浙科須日繁閭里告病倘有水旱乏絶姦宄竊發未審朝廷何以待之近者臣庶勸興師問罪者不可勝數觀其辭固甚順考其實不可行大抵獻言之人與朝廷利害絶不相侔言不酬事不濟則脫身而去朝廷施設失當誰任其咎鷙鳥將擊必匿其形今朝廷於進取未有秋毫之實所下詔命已傳敵境使之得以為備非䇿也提舉臨安府洞霄宫葉夢得上奏曰臣伏見逆臣劉豫侵犯淮南久未退師中外憤扼莫不願效忠欵共圖剪滅臣嘗忝近輔久尸榮祿雖屏伏田野莫詳事宜敢不以管穴所窺少陳萬一竊惟敵自陛下即位以來遊兵南牧於今七年前此皆當中國全盛之時州縣俱未殘破師出其境即因糧於我金帛子女足以誘其衆人民器械足以資其用故所向無不濟今自河以南瘡痍未復豫既不量力妄興吾民以求援於彼則調度百色皆自為之所今出沒境上已五十餘日秋毫未見獲而先已坐困豈計之得哉度其用意但以久負僭逆之罪懼我見討纍年聚兵種糧私自為計未知我所欲為故妄意先發憑藉金人假其酋帥張大凶威以觀我應之者如何有間可乘則衝突過江以冒前日之利無間則規取淮南之地次第侵陷至江以為藩籬然敵如前日長驅自來以圖搏噬於我與今為豫來為之形援其勢萬萬不同今陛下赫然力鑒遷避之失不憚親撫六師二三大帥布列在前出賊不意固已壞散本謀顛沛失措而議者或謂大隊在後以俟之或謂請師於敵而未至臣以謂敵前能迫我者皆以倉猝遽至如飄風驟雨之不可禦也其肯以偏師先見其形使我得以為備理無是矣若其濟師則越數千里入人之國見敵而旋為謀就令有之亦豈能為必勝豫之情實臣往時待罪江東粗得其要領豫年踰七十初無逺略其子璘狂悖輕躁素不為其下所伏自行什一法重斂於民外以奉金歲幾三百萬緡又逺事關陜疲竭內地金所留兵散處諸郡通不滿萬人所用以為爪牙者王彥充胡斌皆屠沽黥卒民困貪暴怨入骨髓日夜引領以望王師之至其告於吾人或曰天兵速來過今年則人心慢或曰但以大兵主張得我無不歸順況又稔惡至今而方騷然挾豺狼無厭之徒以重虐之其誰以為然古者審敵之形而後可應敵盡敵之情而後可制敵豫之形已略可見陛下深伐其謀其應之者亦可謂得其道則制而斃之在深察其情而已臣度豫計不過有四果濟師逺來必以精騎間道兼行徑至江上一也散掠舟船創造排筏雜出沿流以疑駭我衆二也以輕兵侵掠郡邑分我勢以縱其詭謀三也知其無所可施但隨所得固為城守徐以窺我四也今去中春尚有三月敗滅之期當圖萬全臣愚竊謂賊之重兵既聚而南畿內必空淮南京東兩浙壯者為兵弱者科斂其志必怨倘擇健將勇而有謀者卷甲疾趨直抵京師攻所必救以震蕩其心亟下明詔慰撫淮甸之民厚推德意以招徠之降以州者授以州降以邑者授以邑以擕二其心趣大將過江各據要害使為三䇿以待之若賊鋒尚強士心猶固則堅壁勿動明逺斥堠勿與之爭無取近利無貪竒功以損威重若審見間隙則兩路迭進或入承楚以搗其左或入濠夀以鏖其右乍出乍入更為掎角使奔命不暇若師老財匱進無所得退未有歸腹心內離肘腋外弊則兼督兩路一舉而驅逐之以我之三待彼之四更命鎮江建康帥臣各團結其舊嘗為山寨水寨之人使分守其地時出於瀕江以為大將聲援盡集諸將水軍専立董領布列兩州而日習之應沿江舟師所可至處皆嚴設控扼仍為遊軍往來䇿應以示之警備南北相望聲實並著茍吾將帥協和士卒奮勵謹守成算不為前却臣未知豫終將何為昔晉石勒遽入夀春元帝集諸將相持三月勒幾不得還其下至有勸之降者而王導畏怯不能察其虛實縱之使去苻堅以百萬之師舉國來寇謝安分授諸將逆於淝水一舉而敗之制敵之道前事可見恭惟陛下睿明英武果斷不疑含容妖孽亦既有日屈伸操縱之道宜無遺䇿臣衰鈍淺陋何足少裨塵露徒以身荷大恩圖報無路分義所迫不能自己干冒天威臣無任惶懼隕越之至夢得乞下劉錡等討賊奏曰臣近以敵騎侵犯河南二十四日嘗具管見奏陳伏覩手詔顯暴敵渝盟失信之罪困虐中原無已之惡一伸王威宣逹衆憤中外呼舞逺近同辭相繼大號起劉光世招撫三京以壞散敵謀攜二其黨劉錡復立功順昌軍聲士氣鼓勇百倍天下幸甚臣濫守陪都外當一面主憂臣辱不敢不盡死節少佐旰食數日來博採人情以聽輿論皆以敵詭詐憑陵人人懷怒蓄鋭有北向殄滅之意與前數歲不同此乃天啓中興敵勢陵夷自取敗衄之日非人力所能為也錡既首挫其鋒其兆已見議者皆謂錡孤軍逺立將士用命所以能先諸將立功須朝廷極力主張激勵使得盡其心不惟可令敵望風沮屈國勢當亦自此遂振竊聞朝廷己遣李世輔王德往應援世輔敵所深怨如其用李成酈瓊等誠為得䇿兼其人驍勇沈厚深逹敵情儕類多所推稱以為朝廷用之得人但頗願多與之兵略與錡相當使與錡更為形勢錡駐順昌世輔駐泗州夾淮東西掎角相望更敕韓世忠張俊各以精騎巡所部境上以為之殿王德一軍往來遊擊於錡世輔之間敵近所下諸郡皆不過百餘騎傳檄得其降書即去百姓向背無所與責如景祥王彥充輩前此本非歸我皆敵留為腹心潛相窺覘者故聞變盡甘心敵命其所守既無備王德可以坐擒敵固不能發兵往救又不能分兵並守則故疆自已收復我擒其守長厚撫其民亦可就食糧斛絶其後計敵所保者惟在京師據探報敵兵至京師者不滿三萬人非叛兵即簽軍正兵無幾若錡世輔斥堠明逺伺得其便即命鼓行而前世忠後繼之直薄城下自不妨劉光世一面招撫凶悍者誅滅柔順者歸附敵無所恃必懼而遁去若閉城固守旋追兵國中當此時暑疾驅逺來人疲馬困我迎擊河上可以必得敵乃在吾腹中此萬世一時不可失之機會也少有稽緩使敵得整兵而來或劉錡力不能持退舍則敵復得志計將難諧臣衰懦不武素不嫺習軍事歷考載籍自古用兵凡大勝敗未有不因士氣所向士氣所向未有不順人心所欲臣前所論奏以敵犯境之初未見其兵厚薄我未整飭軍伍故且乞奪其儲積無守舊轍矯前日畏避之過張皇六師過為隄備以待其釁今敵形已見正乘機定計之時此之所陳蓋得於人心同欲非臣狂妄之私不敢隱默伏望聖慈更命大臣參考熟議少留聖聽夢得論漢髙帝破秦項三䇿劄子曰臣伏見陛下赫然威斷盡改和議分命三將進討兩河聖謀深逺誠非羣臣所能及夫兵無常勢敵無常形非逹古今之變者不能察成敗之機非盡彼已之情者不能決勝負之實今成算既定宜圖萬全臣不自揆度嘗參考敵情究觀時事敢借秦漢之事以論今日之計願有獻焉秦自孝公以來雄視中國合六諸侯相與連衡不能抗始皇卒有天下而漢髙帝起沛中收子弟三千人振臂一呼遂以滅秦誅項羽此其故何也六國當強暴興起之初望風畏栗而不敢爭髙帝處亢滿怨憤之極決䇿必取而無所憚也雖勢所當然而髙帝所以必成其志者蓋有三而兵強不預焉一曰善誘降二曰善用間三曰善制敵非此三者秦雖有必亡之隙漢雖有決勝之勇未易以歲月定也何以言之夫敵衆不可以力相加人各為其主守者未必皆誠心向背惟利所在而已始髙祖入關南陽守齮堅保宛其舍人陳豨説髙帝與約降因封而與之郡髙祖從之齮果降封為商侯於是引兵而西無不下者其後取關東遂為令使將掠地拔隴西以萬人若一郡降者封萬戶故隋何説英布以九江叛楚酈食其説田廣罷守兵與漢和此髙祖之善誘降者也兵不出於一則心不齊本非其所有則信不固項羽初興其所與謀者一范增爾函谷既破不能用增計髙祖知其可撓故與陳平金四萬斤間楚君臣增果疑不用則其腹心必有從而反側內自攻者內無與為主則外惟我所欲為故有紀信之詐而不知有周苛之辱而不悟雖拔滎陽髙祖得以跳去此髙祖之善用間者也兩軍相當必以力相較則久必弊惟多方以謀之使不得専則我可以全勝滎陽之圍髙祖亦甚危矣及入關再收兵而東項羽之力尤強勝敗未可知也髙祖用轅生計舍滎陽出武關以致羽深壁相持而使韓信輯河北趙地連燕齊以裂其肘臂用鄭忠計使盧綰劉賈渡白馬進入楚地佐彭越焚楚積聚下楚十七城羽果奔命不暇兵少食盡為中分之約而張良陳平得定大業此髙祖之善制敵者也此三者髙帝非皆以力得之也今金人不道雖荐食上國不強於秦項陛下智勇憂勤席祖宗二百年之業四分天下有其三則過於漢豈髙帝能滅秦項而吾將帥反不能為陛下取金敵乎今日之舉正髙祖入關滅秦復出東向與羽決戰之時也比者特降詔旨立為賞格自使相節鉞而下以求竒功不待飲至䇿勳不拘遷轉正法雖足以激三軍之士而不及於敵人臣愚竊有疑焉願復下令應投拜附敵者能各殺其守長以縣降者授以縣以州降者授以州山寨與河北之民若盜凡自相結集不從敵人願歸我者千人則授某官萬人則授某官其昏迷不恭恃敵而不悛者軍至皆討焉則孰不革心而效順此髙祖誘降之道也敵今所驅用者皆我之叛將亡卒其初皆非仇我而慕敵蓋亦有迫不得已僅以逃死既絶於我則不得不用於彼然酈瓊始奔敵嘗散其衆不用則今客主未必終相信上下未必皆相服權勢相軋嫌隙易生茍能使以身歸我者授以舊官以衆歸我者加以顯秩能殺併敵人而歸我者隨其多寡而為之等差益募辨士重與金帛口舌遊説其間以動搖其心而眩亂其聽則必紛然自相屠戮以幸一時之獲此髙祖用間之道也自淮而東韓世忠主之自淮而西張俊主之劉錡王德李世輔雷仲之徒擇形勢便利往來遊擊於兩間敵兵分則不能並立合則我四面俱至即使嶽飛出漢上以搗陳蔡之虛敵兵若盡窺兩淮飛繞出其後期同會於京師彼腹背受敵欲當前則後必困欲拒後則前必弱指日可使坐斃此髙祖制敵之道也夫攻而破一邑不過得一邑戰而擒一將不過得一將孰若無攻而拓地不戰而屈人乎區區之愚惟陛下擇焉夢得又乞休兵養鋭奏曰臣聞兵不盡其威故能有餘武而天下無以敵其威將不盡其勇故能有餘力而天下無以敵其勇自古帝王之師百戰百勝以保萬全此道也伏見敵人敗盟陛下赫然獨斷一伸王怒命三大將討兩河中外歡呼士氣百倍無不盡欲彎弓北向擒烏珠以致闕下傳檄兩河盡還故疆今劉錡首能以順昌孤城拒烏珠數萬衆前後五戰無不勝烏珠即敗走軍聲遂大振相繼淮東西湖北三大將捷書繼上凡從偽州縣或殺或降以次效順自中興以來未有今日之舉也凶焰既挫其技已窮理宜遁伏然詭詐不測竊恐尚懷姦謀以圖後舉今暑氣方盛去秋涼尚逺我師雖屢捷不無暴露傷殘之困若更乘勝攻取不已竊恐敵得暫休撫養其衆濟師於七八月之間盡力復來則我師勞疲或恐不能相當昔唐武宗既用李德裕討回鶻平澤潞無不如志德裕即以曹操破袁紹官渡自謂所獲已多恐傷威重為言援養由基之事請以兵為戒以保成功臣愚願詔諸將亦且令還屯益勵士卒今夏多雨暑溼之餘乘此秋氣瘧痢將作使過為調護明逺斥堠當度機會預為定計相為掎角因時乘間一舉直前役不再籍仰稱陛下恢復土宇報雪深讐之意不勝幸甚臣備員守藩輒敢妄議軍事仰恃眷豫之重區區小忠不能自己越職犯分罪當萬死惟陛下矜照夢得又乞下諸大帥臨陳審度敵情無落姦便奏曰臣自去歲以來體探得敵人用兵之謀與前不同務要出我不意以取竒效皆云其兵見分為三等其一等淮甸京畿之民當先多用鮮潔衣服及偽以鉛錫作器物梢帶亦有婦女在其間其次即用河朔簽軍少給兵器裝列隊伍先以兩軍當我若初為我師所敗必爭取器物婦女鞍馬即其次河朔之兵再進俟我師轉戰力疲然後以真畨兵甲馬一併向前以取必勝乘勢衝突過江人言頗同契勘以我下駟與彼上駟以我上駟與彼中駟以我中駟與彼下駟此孫臏之馬説也而周訪討杜曾亦嘗分其兵為三甄先以兩甄餌之始用精鋭出其後遂以破曾若敵或出於此竊慮諸將不知落其姦便伏望聖慈特賜詳酌密切行下大帥更令審度敵勢不可欲速見小利乘鋭貪功若果前脆後堅難與爭鋒則須謹守險隘或且阻江務以持重不戰困之以伐其謀使彼無所用其巧然後我徐觀變而進庶幾可保萬全也御史中丞張守乞措置捕戮李成劄子曰臣竊見朝廷紀綱未立威令不行將士惰驕盜賊猖獗乃欲制禦四夷其不可豈不明甚李成近在泗州前後叛服不常最為桀黠名為附順實肆姦謀非他賊之比也今聞舉兵輒犯郵楚其包藏之意己復露見不可不討者有五臣試為陛下陳之成謂泗州形勢要害為咽喉之地故必欲得之則其用心固可知矣朝廷不得已而授之遂據要害扼吾咽喉不可不討者一也昨史亮之破宿州實出其謀聲言亮叛自行襲逐而實助其虐然猶鼓行而西不敢南牧今據淮堧遂逼行在略無忌憚之意不可不討者二也或謂姓名合於圖讖或謂相貌異於常人脫或乘吾微弱之勢逞其窺伺之謀不可不討者三也或謂金人已與之通許以淮南授以封爵審或如此秋冬敵至與為道地則吾中國豈復枝梧不可不討者四也防秋在邇淮南為要衝而賊盜未除何所設備治兵積粟成必沮撓不可不討者五也有此五事使其未叛亦當圖之況其迹狀已著可復緩乎或謂彼衆我寡未能必捷臣以為不然師以順為武以直為壯在和不在衆顧所以用之如何耳朝廷昨遣劉光世擊之奏功甚衆第賞甚厚今日之事光世當任其責儻或光世兵少不能辦此賊則朝廷亦當悉吾重兵北結杜充併力剪除又況此去淮甸不過數舍固非勞師以襲逺也剪滅此賊然後一意以防外侮庶幾宗社可保而中原可復伏望睿斷早賜施行虞允文上奏曰臣起自寒鄉技能淺薄陛下一見賜以不凡之遇清班顯級夤緣冒居日夜憂懼不能自立有玷陛下知人之明日者采石之捷皆明天子威令諸將士功力臣伏自惟念不能身先卒伍亟俘金帥以獻實有餘恨敢謂陛下隆天地之施命宰相賜臣以書以嘉歎之旨曲垂宣諭臣下拜恩私敢不九殞以報比者臣嘗面奏自古用兵好合而惡分蓋合則力厚厚故多勝分則力薄薄故多敗自然之理也臣既力微而羣議不一未有以效其平生之忠今日伏準處分差成閔淮東制置使李顯忠淮西制置使如此不患兵力不合既合不患敵兵不破聖神之算酌見今日事宜宗廟生靈不勝幸甚臣自到鎮江措置上下流掘塹築隄橫鋪鹿角皆已就緒但鎮江戰船不多比與諸將共議改修馬船使用臣已措置到江上及軍中木筏十萬餘條并鐵炭之類並已足用見令鎮江及馬軍司併工力籠裹應副防托庶幾官軍之力有餘可取必勝臣照得諸處間探及活捉到人稱敵帥於十二月一日遣發人馬取三日渡江臣今日同諸軍詣江口踏行戰場見得沿江水落其岸口泥沙深闊丈餘假令敵船及岸步騎登戰即是天亡之日官軍極力勦除在此時矣臣見又措置於泥沙盡處廣立木柵以為官軍之蔽又為敵兵奔突之防敵知我守禦得人豈肯輕犯臣竊料若得瓜洲一戰之後敵必遁去兩淮必可收復嘗於前劄纍具奏知臣日夜更竊廣詢羣䇿與諸將共議續具畫圖進呈決不致稍失機會欲乞陛下特寬憂顧臣不勝惓惓之誠允文又論江上事宜奏曰臣伏惟陛下孝德仁恩逺希堯舜之聖天意順助避殿之詔初下將士無不感泣思奮況臣孤蹤實叨希世非常之遇欲報之心神實臨之方江介多憂陛下宵旰未復常膳臣仰首霄漢之上豈勝憤惋此身如葉恨不縻捐比者采石之戰臣與統制官大破敵軍俘斬既衆遂走完顔亮而盡焚其舟實皆宗社之休陛下威令神算之所及臣不勝幸甚嘗兩具本末奏知必已仰塵睿覽及臣還建康沿江之北百餘里無復一人騎敵之氣索矣臣在采石探知敵帥引兵會於淮東見開河於第二港決艾陵之水通出船筏以窺京口因李顯忠到軍即與之商量令移時俊軍於馬家渡而顯忠兼守之輟李捧一全軍又分采石戈船百艘來援京口督府又留楊存中邵宏淵同力防托庶保萬全蓋臣以諸處探報知敵兵不多於官軍但彼合而我分故強弱之勢遂若相異自敵得兩淮其兵力漸分而糧草乏絶人馬多病死故急急於采石之戰既已大敗又將徼幸於瓜洲今我之精兵聚於京口持重以待之一戰而勝敵帥遁歸無疑矣臣每聞士夫之論謂采石渡碙砂夾馬家渡大城堽皆為可憂臣因親行江上知其説有不然者蓋敵自和州可以出舟於大江者止有一楊林河與采石河相對而已餘皆下流别無河道可與大江相通近李顯忠遣人深入探得楊林河中見今别無敵船又官軍戰艦皆守河口則下流諸渡非所憂也方敵帥住和州窮日夜之力以造船意謂必有大過人者故采石初戰時官軍所用船才五之二以其三置上流及天色垂暮敵敗而走又不敢大段追襲者防其戰艦或出於不測也今乃止百十小舟殊無籠蓋遮掩如州縣渡口所用者便欲以當官軍戈船臣知其伎倆已盡無能為矣初敵涉淮不旬日直抵大江之北臣詢之將士質之道路之言皆云劉錡王權未嘗敢與大敵相接逡巡引避有一日走數百里者非戰而不勝之罪也以此月八日之戰當諸軍扶傷奪氣之餘而舊將已去新將未至正人情危疑中尚能大破彼軍亟走敵帥使建康蕪湖間民皆奠居者士卒竊倚王人為重得以肆力於一戰也自李顯忠到軍臣與之欵知其忠義敢前無彼我心往時見士夫憂其反覆以臣觀之能立大功以報陛下者必此人也臣願以身保之今淮西之地雖云不守而廬濠等州山水寨民兵多存近又漸復無為軍巢縣一帶已令池州官軍分屯守之則裕溪大信口無敵船可入池黃之境可固而采石上下必保無虞臣竊料之只得京口一捷則江介之憂可去而兩淮之復度可不至甚費兵力矣臣聞千金之子尚不垂堂況於萬乘之尊而可履險臣嘗兩次面奏乞車駕且駐臨安亦蒙聖慈采録其説今願陛下特審宸慮少緩六飛之發以須金帥之奔北而徐圖之天下幸甚臣不勝惓惓憂君之誠惟陛下財察允文又上奏曰臣竊見敵人自采石大敗奔遁之後徑往瓜洲為渡江之計臣以江上事勢急迫忘其踈逺於今月十二日再具事宜敷奏抵冒宸聰日俟誅斥今準入內內侍省公文坐奉聖旨特許收接臣遞角投進臣伏惟聖恩不以臣狂僭采納其言顧未知所以報塞臣於十三日自采石回至建康以敵帥駐維揚敵兵進據瓜洲探報不一當日起發於十六日午後再到京口與諸將共議防托之䇿除第二港探得敵所開河以沙漲不成已罷開掘之役見止量留官軍人馬巡綽外有三處河道與大江相通最為緊要合行隄備一滁河口自真州下連瓜步敵兵最多河口亦寬通大船出入已行措置於南岸一帶開三重壕疊三重隄橫鋪三重鹿角有民兵萬餘人防守緣官軍不多竊慮未可倚仗與楊存中等商量於二十日那移下蜀張深人馬於滁河口南岸青沙夾等處駐劄夾在近南岸水中可以射敵使不得登岸不利於出船却差苖定人馬於下蜀駐劄以為䇿應決保萬全一瓜洲渡敵見築塞渡口造三閘以儲水探得目今水深數尺又探得於洪澤役人力從陸路扛船入運河伎倆百出然度其船必不大不足以當官軍戈船比又蒙朝廷追回成閔人馬今成閔單騎於二十日已到鎮江將帶鄂州戰船二十隻前來我師既大會京口可以必勝但泰州兵薄敵見今有遊騎到城下今日本州亦來告急臣與楊存中商量於十九日再發王剛兩將人馬先行二十一日又令王剛以所管兵親往敵見官軍既到必是不敢深入其餘上下流無河口可通大江處亦與諸將議逐日分馬軍往來巡綽防慮不測以臣料之敵必不敢輕動動即破之無疑矣臣初抵鎮江親到劉錡家卧內見之氣息奄奄乍醒乍迷即與其家子弟醫官説令於臍心著艾兩日來稍納粥藥其安與否特未可必而今時戰守所用諸將不可不素定臣聞倉扁不世出天下未嘗廢醫韓彭不世出天下未嘗廢將自古中興之君如夏少康有衆一旅如漢先武起於側微其所用之將何嘗皆有素望臣於今年夏因直前奏事嘗以此説仰塵睿聽亦蒙聖慈深賜嘉納臣之區區欲望陛下不以劉錡存亡為憂但審擇人材分授諸軍使之各當其地戮力戰守不患大功不立臣觀完顔亮采石大敗之後其氣已索雖名為聚兵維揚窺我京口而實欲遁歸必不出臣所料臣見留鎮江措置守江先為不可勝之計仍與楊存中等共議若一旦敵退亟圖興復不令少失機會臣雖書生陛辭之日嘗面奏決不敢以敵遺君父憂臣伏惟陛下特寬逺顧無輕為避敵之計天下幸甚權中書舍人張孝祥進故事曰曹操苻堅狃數勝之勢擁百倍之衆因利乘便長驅而前偃然有吞并之心然吳與晉卒能以單寡之士談笑走敵操堅號為善用兵者及兹智勇俱困鳥駭鼠竄僅以身免而其國遂以不競者何也吳晉之君臣能以靜制動以逸待勞以直應曲而又有周瑜謝玄為之將帥也夫兵不欲多也兵多而不精則志不一而易潰曹操苻堅之衆是也是故兵不可以不練將欲専也將得其人則兵雖不多亦足以取勝赤壁合肥之役是也是故將不可以不擇夫兵已練而將已擇則吾飭邉備逺斥堠峙糗糧省不急籌於帷幄以待之而已耳雖敵計反覆不義而強吾何畏焉右正言陳淵論用兵必先修政奏曰用兵中興之一事耳然事有相待而後成者不一而足而今之言兵者勇於必進不恤其他然不得不為之慮也臣嘗讀詩至周之小雅觀文武成王所以致太平之效與夫宣王所以成中興之業其迹可得而言者蓋自鹿鳴以至魚麗文武之詩也自南有嘉魚以至菁菁者莪成王之詩也自六月以至無羊宣王之詩也孔子嘗以其世之先後而次第之其意若曰作於前者不如是不足以為文武繼於後者不如是不足以為成王後之為君者得此則治失此則亂六月之序曰小雅盡廢四夷交侵中國微矣則失乎此者也車攻之序曰宣王能內修政事外服逺人復文武之境土則得乎此者也夫自文武至於成王其詩亦多目矣一詩廢則一事闕茍有所闕已不純乎文武之政而況於綱紀文章蕩然大壞乎彼宣王中興非能舍文武之政以自為也補其闕而已自六月至於無羊補其闕之道也蓋復境土必本於服逺人服逺人必本於修政事政事既修然後兵可用未有政事不修而先於用兵者也臣故曰事有相待而後成者不一而足為是故耳今姑以兵之一事言之而明其所以相待者如器械之備餽餉之煩賞給之費與夫修城浚池選將練卒之故是皆不可闕者一有不至兵不可出矣亦安得不為之慮乎蓋古者用兵能發之必思所以勝之能勝之必思所以守之發而不勝不如不發勝而不守不如不勝故臣願陛下上思祖宗之所畀付下念生靈之所愛戴大修政事使在我者無可乘之隙而在彼者有來蘇之願則天戈所指宜無不承順者矣宣王中興之道蓋出於此是謂萬全之䇿惟陛下留意幸甚曹勛議淮上事宜狀曰嘗謂主當持重而客利急攻亦兵法也今敵攻兩淮殆踰一月我之諸將屢報小捷而敵全師實未嘗動客當務速反若無意於戰疑敵以羸兵驕我而伺我之怠且耗吾之軍鋒然其驅烏合猋起之衆不能乘鋭氣數道並進俾我不暇為謀乃遷延復却曠日持久師行千里情狀易見我之諸將得以從容成備既經纍捷膽氣益壯聚謀蓄力務以全制其後敵之敗北在理不疑所慮諸將持重太過反類畏怯或貪少利不顧大計今若令淮東堅壁不戰以扼其膺淮西由廬夀搗睢亳以攻其背舒蘄二將連旗深入朝廷方追馬軍之師俾佐兩淮宜促其期以速其至自光入蔡去汴最邇宜出其不意急詔鄂渚由此進兵以傾其巢穴水軍自淮入海以邀其餉道是皆昔人師行捷徑矧諸將皆朝廷素所寵厚臨危宜無愛死今敵騎充塞江北實繁有徒屢折不退有盤據淮右之意願朝廷毋輕此敵毋惑不根之言號令之出務加積密前代漏泄禁中語猶不免其死況成敗安危所繫乎儻能堅守此䇿斷然不疑非獨可以卻敵而已敵將懲艾可數十年無疆埸之憂僭易干冒惟在威斷翰林學士汪藻乞分張俊軍馬䇿應狀曰臣昨自三月末得之傳聞云金人在建康築城為度夏計臣雖幸其不然然心竊憂之以為中國困於兵革而得少休息者正賴其不能觸熱故常以寒方至未暑先歸吾於半年間汲汲措畫猶每歲奔命不暇今若縱其度夏則長為巢穴無所忌憚不知朝廷何以枝梧洎到行在聞韓世忠列戰艦江中遮其歸路日有所獲且言金人窮蹙之狀臣竊欣幸以為三月所傳誕妄耳續觀黃榜備録韓世忠捷奏又以為朝夕必可掃除今近二十日矣其耗寂然議者頗疑世忠奏報未必皆實兼數日人自常潤來者皆云敵於蔣山雨花臺兩處各劄大寨抱城開河兩道以護之及冗山作小洞子以為逃暑之地陸增城壘水造戰船而采石金人已渡復回者纍纍不絶今且五月矣比常年去已月餘乃反去而復回其欲留建康明甚如此則與三月所傳又似符合臣聞金人動設詭詐尤喜為窮蹙之狀以欵我師我師墮其計中者前後非一今安知其本為度夏計而陽為窮蹙者特以欵誤我師耶建康為東南咽喉國之門戶也天下委輸朝廷號令未有不由此而通者若金人果據此為巢穴則東南饋餉遂絶如此人扼其咽喉守其門戶果得髙枕而卧乎不知羣臣日至上前亦嘗有反復及此者否豈遂以為無事而所當講者承平之先務乎抑揣陛下非所樂聞而不以聞也不惟是而已人既扼我咽喉守我門戶則羣盜亦將視我緩急以為向背國家果有力能使之退聽屏息乎況又有意外之憂所難言者不得不慮臣愚以為此事所係非細廟堂若救焚拯溺然朝夕在念及五六月間我師便利之時會諸將與韓世忠一舉掃除非特去目前之患將使懲創終身不敢復南其利害豈不相萬哉雖聞近遣張俊提兵過江節制浙西人馬迤邐前去以為䇿應此固陛下長算也不知張俊果能為陛下有慨然立功之意乎臣愚欲乞専差得力使臣數人齎陛下宸翰星夜兼程自襄鄧荆湖以來迎張俊軍令分數萬人順流而下仍於上流自計置糧斛載以自隨彼張俊軍既皆新人必精鋭可用且敵人見上流之師突然而至莫知其數必破膽奔潰此制敵之竒也如其不然八九月間氣候稍涼彼得時矣幾會一失雖悔何追伏望睿慈不以臣言為愚輕此敵忽此事特加採納不勝幸甚金人犯塞上召宰執對便殿將浮海避之左僕射陳康伯持不可楊存中言敵空國逺來已闖淮甸此正賢智馳騖不足之時臣願率先將士北首死敵帝喜遂定親征之議下詔進討有欲遣使詣敵求緩師者集英殿修撰曽幾上疏言增幣請和無小益有大害為朝廷計正當嘗膽枕戈専務節儉經武外一切置之如是雖北取中原可也且前日詔諸將傳檄數金君臣如叱奴𨽻何辭可與之和也帝壯之紹興三十一年王之道上奏曰臣昨奉聖旨令諸路都統制并沿邉帥守監司照應今來事體隨宜應變疾速措置務要不失機會仍先具知稟聞奏不下所司并録白到備劄內事件臣讀之痛憤感泣莫能自己至於寢食俱廢以為敵人南牧逮今三十七年専用詭詐愚弄朝廷求無不獲而皇帝陛下天性仁孝上念父兄下憐赤子不憚屈已講和雖中外臣庶有所不堪而陛下篤於守信冀與天下休息德至渥也而敵計多端邇來離其巢穴狂奔浪走直抵西京今使人之來所奏不一包藏非淺其用意殆與苻堅之寇晉無異揆之以天時人事似是滅亡之日而況淮北之民蒙被國家二百年涵養之賜昨自淪陷塗炭且復苦於殘虐其謳吟思漢不翅飢渴之望飲食蓋前後間探類言彼民日夜延頸跂踵以待王師北來倒戈內應觀其所為如此實今日之機會也臣愚欲乞因今來使人之請特賜宸斷仰承天心俯順人心下哀痛罪已之詔以叛盟之意明告中外使天下之人扼腕切齒咸起不共戴天之憤然後舉兵北伐將見自淮以北必有馘其首以獻者豈特簞食壺漿以迎我師而扶老攜幼望風降附哉臣某以踈逺小臣輒緣忠憤所激採輿人之言上干天聽死有餘責歷代名臣奏議卷二百三十三
