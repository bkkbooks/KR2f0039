body:
  text: 歴代名臣奏議卷二百三十八明楊士竒等撰任將宋英宗時知諫院𫝊堯俞上奏曰風聞有朝㫖令中外臣僚選舉班行漸擇堪充將領者實朝廷經逺禦備之急務也臣輒有短見庶裨萬一惟陛下詳擇臣伏以小廉小謹或非壯夫所長使貪使愚固亦兵家舊説故古人取跅弛之士信史紀不羈之材若使論薦者保其清廉深慮豪勇者有所遺落欲望將來所降指揮只取材武縱有痕累不甚重者皆得充舉仍但云若不如舉狀甘當降黜更不云如犯正入已贓甘當同罪則採擇益廣而可以盡人之材力或有可取乞賜施行堯俞又上奏曰臣聞有備無患古之善經今則不然直患至而後為之耳臣向聞涇原路數奏邊事於是易置官吏為備頗急近日書奏稍止即不聞更有張皇邊徼之心顧不窺揣輕重向若諒祚猝然長驅又豈容遽為之備哉況其姦詭未易可量今朝廷之慮轉而在鄜延矣臣竊料敵人若不遂為患者亦將威脅邊吏以逞其無厭之欲其所以待之者茍為未具則又將徇其求矣臣謂宜及其未然講脩戎備凡將吏之輕易老疾罷騃未更事者一切換去度敵至足以恃而無恐有請得以拒而不疑則庶幾其可矣儻因循且已他日又或倉黄猝遽恐遺悔遂大至於臨事易帥兵家常忌昨知渭州施昌言之罷人不謂之非者以為猶愈於必敗事耳此豈獨昌言之過固亦付授之失宜今慶州孫長卿頗知錢榖材非將帥輕易寡識西道共知平居固已乖方緩急豈能辦事未敢畫一條其跡伏望陛下置之他處姑任其長毋俾異時為邊防之誤臣又聞董氈諒祚屢有解仇之約賴天之力姦好未成傳聞相政莫審虚實見利忘義逺人之常萬一翻然改圖合從東向則為患不測惟陛下數謀於大臣思所以間離之而務為維御之術則天下幸甚神宗熙寧元年殿中侍御史裏行錢顗乞擇將久任狀曰臣竊以朝廷之患莫患於無將帥也蓋承平日久中外臣寮唯能孜孜講及文法不及於武備豈所謂安不忘危之意也而況北敵猶梗西戎未賔非朝廷無事之時也陛下試環視中外可為將者誰耶可為帥者誰耶陜西河東河北三路九十餘州軍見邊任有謀略有果勇威望可以壓服西北者復何人哉此宜為國者預謀而深慮也臣聞祖宗之時外多名將皆委之久任而責其成效若李漢超之守關南趙贊之守延安皆十餘年倚若長城著立功勲無西北之患者將帥得人也國家求將之心雖切選將之路不廣近臣雖曾奉詔舉將領奈何限以資品武勇智略之在下位者無由而進雖有頗牧之才焉得而用之今之命帥則唯用侍從貴官遣將則多以閥閲子弟素不諳練兵術一旦委之要地授以重柄前日横山之謀為國生事蓋失於不久任也臣願陛下詔二府大臣兩制近侍及中外文武監司知州已上各舉堪充將領者二人不以官職高下果敢有武勇者為一等沈厚有方略者為一等籍其名而用之分布三路法祖宗之久任責其成效有功則不次遷擢厚加賞賚激將帥之心沮蠻夷之氣天下久安之策不過此也朝廷裁擇施行哲宗元祐元年侍御史劉摯論祖宗不任武人為大帥用意深逺狀曰臣昨者去年十一月二十四日訪聞有㫖除劉昌祚知渭州臣竊聞劉昌祚嘗以小功先朝用之管軍知延州中外不以為允先朝升遐召入宿衞物議稍以慰惬今者渭州之命羣議復駭臣竊聞祖宗之法不以武人為大帥專制一道必以文臣為經略以總制之武人為總管領兵馬號將官受節制出入戰守唯所指揮國家承平百有二十餘年内外無事以其制御邊臣得其道也臣常伏念禦邊禦戎深得上策所以為後世者久而不可以改此其一也唐先天開元中薛訥郭元振張嘉正王晙張説蕭嵩杜暹李適之自節度入相李林甫疾儒臣以邊勞至大任欲杜其漸以固已權説明皇曰以陛下雄才國家富强而西北未靖者由文吏為將憚矢石不身先不如用蕃將彼生長鞍馬矢石間陛下用之必盡死力明皇然之以安思順代李林甫領節度擢安禄山高仙芝哥舒翰等為大將林甫利其武人無入相之資故安禄山得兼三道勁兵卒稱兵蕩覆天下唐室遂微臣竊謂祖宗之法不任武人為大帥用意深逺非淺見者所能測之如昌祚人材未為難得誠使卓然過人可以付屬而祖宗之法由此廢矣伏願選内外文臣從官可以守邊者使之帥守則祖宗之法常存而不廢不幸後世有引此時為比使武人帥邊而不虞之禍如前世之甚者豈可不預防其漸乎右諫議大夫孫覺乞熙河選將如折氏世守狀曰臣竊聞熙河困陜西以及天下幾十五餘年矣臣聞其歳費數百萬略以十年計之為四千萬以朝廷本為熙河舉西師不能斷羌人之臂徑可以復靈夏而包賀蘭前日大舉西師不得羌人一級而坐費數百萬於黠羌兵馬䭾乘死者不可勝數器仗弃捐如山邊人至今為國寒心自朝廷開熙河以來負罪官吏無賴游客冒名入仕與擁高資為富人者不知其幾百家矣吮啜生靈之膏血以厭飫無賴之人何歟臣愚習聞祖宗時河西折氏置之最為得策今天下一百三十餘年而折氏祖父子孫相繼皆忠順勁勇為國捍守此實措置得其道也今熙河之地使帥守得人為朝廷無窮之計蕃將之中如折氏者得一人或兩人漸為措置三五年後擇其可付屬者付之計朝廷不愛官爵以寵之但為我守能捍外寇則世世如折氏可也其他經營乆逺之策密院臣寮必有能為朝廷謀者二年孫覺為給事中又論帥臣當使便宜行事狀曰臣竊聞陜西諸帥臣皆朝廷夙所選擢及被邊稍有警急事事聞於朝廷從來倉猝又須應副臣恐委任帥臣之道為未盡也臣以為諸路帥臣之中唯陜西五路朝廷之所留意萬一有警帥臣自有所處則朝廷無事矣今御帥臣之法太急不敢以便宜行事故帥臣凡邊事不以大小悉聞於朝廷臣謂宜稍略其法使帥臣便宜於邊境之間然後責以邊事事之小者不以聞於朝廷稍習用祖宗禦邊之道則帥臣悉心朝廷無事矣貼黄臣聞定州韓忠彦時有請於朝廷不敢以邊事為任帥臣之中不任責朝廷又不責之如此則帥臣虚設矣五年中書舍人王岩叟論不可以走馬一言輕易元帥狀曰臣伏覩初六日除目延安趙卨太原滕元發皆進職臣當行制忽得指揮收還臣不知所以固已疑之今日乃以頴昌范純仁易元發竊聞用本路走馬奏章遂有此除臣謂朝廷進退大帥固當重謹不可輕用一人之言而行之或其言出於愛憎喜怒之私意而欺罔公議豈不損主上之明誤國家之事果若可疑自當令本路監司公共體量信如其言行之未晚況聞元發在河東頗有顯效為士大夫所稱按本路毎歳入秋即自近裏州發馬兵往戍河外涉春乃還坐耗芻粮於難得之地不知幾萬計前此帥臣度知無事未有敢不遣戍者去秋元發獨能不遣為國惜費其利甚博蓋其明見事機以身任責故為之不疑衆論莫不嘉元發有大帥之略臣計陛下必不知之知之宜不遽易也今言者蔽其所長而不以告摘其所不足而暴之則其愛憎之情自己可見夫有顯效不録而言亟行四方聞之又誰為陛下盡心者既以走馬一言易元帥元帥將人人畏憚此曹有不自保之憂此曹將人人侵侮其帥有驕横之勢陛下不可不察也此風浸長非朝廷美事昔季布為河東守孝文常召至京師留邸一月而罷還布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者矣陛下以一人譽召臣一人毀去臣恐天下有識者聞之有以窺陛下孝文謝焉臣願陛下思季布之言察元發之事勿蹈孝文之失以為識者歎惜臣愚忠不勝惓惓貼黄一元發不足惜所惜者朝廷進退帥臣之事體爾如臣言可採伏望指揮少留告命速召大臣别加詳議施行陛下以方面屬人毀譽之聽不可不審善惡之實不可不考若其人材畧足以當事雖小有疾何苦害於卧理如其無能雖壯安用八年御史中丞李之純上奏曰臣伏以西戎未附邊鄙用兵守土之臣不宜屢易蓋欲責其實效必須假以歳月況帥臣總握中權指授規畫日久而後士心信服料敵折衝立威制勝日久而後敵心知畏未有歳月淺近施設尚疏而可立武事也近者慶渭二帥召還移替皆未成資若以護邊有功猶宜增秩以久任若以備敵亡狀豈當免過而優遷欲望精選才臣付以閫外應機制變得以專行明示三載考績之限非以功進以罪黜更不先期除代庶幾邊事整備而戎人􅍁服紹聖三年陜西路轉運使張舜民請内外臣寮各舉堪任將帥狀曰臣伏見近年以來宿將凋零今歳為甚雖詢其人才固有精粗是皆自英考神宗識㧞切磨收養出生入死之人也使其分有脩短何獨至於今日摧頽剥落之為甚也臣雖愚昧隂以為懼臣竊觀自古守邊選將未必專以攻戰為事要在精神折衝而已如必欲戰而取勝則是兵家之下策故有中朝而興歎側席而為憂在趙則强秦不敢加兵在漢則鮮卑不敢南牧者此豈皆戰之功其聞望精神有以服人者也其聞望精神有以服人豈一朝一夕之事哉必有素養乃可至此方今邉孽未殄疆埸屢騷天怒未加而爪牙先缺此何理也傳云内無良將外有敵國此秦之君臣猶以為憂況以天下之大者乎臣竊惟天之降才地之生物其杶幹栝栢何時而乏然自毫末以至凌雲培之植之以充梁柱又非一朝一夕之事也唯其先幾有備之實能免倉卒不及之患臣今欲乞聖慈詳酌指揮内則侍從臺諫管軍臣寮外則帥臣監司各舉所知堪任帥者三兩人不限出身要在人才實有謀勇然後朝廷面加審擇其所降指揮乞嚴立條式以示朝廷必用之意非若常舉之汎汎臣之瞽言若䝉采聽然其驗猶在十數年之後貼黄臣今所言若䝉朝廷采納其所舉人已經選任若路分都監已上更不在奏舉之限所貴人才在下者皆得上達近日蘭州种宜身亡臣常黙計其代者兩日而無所得竊惟廟堂遴選之際亦已為難矣當平時擇一邊州守臣猶爾難得況一旦應急任人從而可知臣所以出位進言其在於此哲宗時翰林學士范祖禹論曹誦劄子曰臣伏見樞宻副都承㫖曹誦權馬軍司事候姚麟回日依舊雖非正授止是暫權然於事理有二不可祖宗制兵之法天下之兵本於樞宻有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權上下相維不得專制此所以百三十餘年無兵變也自唐室衰季以及五代樞宻之權偏重動為國患由手握禁旅又得興發也今副都承㫖為樞宻屬官權任管軍是本兵之地又得握兵合而為一非祖宗制兵之意其不可一也自英宗以來不用外戚管軍蓋以管軍之臣止有三人而外戚素非將領又無勲勞止縁恩澤遂為統帥豈得將士心服哉神宗時曹佾雖為中書令封郡王止奉朝請而已今陛下初聽政而開外戚管軍之漸示人以私非所以為後法其不可二也臣無言責然備位侍從國家事有未便無所不當言與其言之於大不若言之於小言之於著不若言之於微伏以先太皇太后九年之中内外無毫髮之私天下未嘗有間言陛下總攬庶政四海方屬耳目臣之愚誠不欲使有識之人指某事不善曰此先太皇太后時無之今陛下有之思某事善曰此先太皇太后時有之今陛下無之所以拳拳而不能已也伏望聖慈特降指揮改正庶不違祖宗故事時御史中丞蘇轍論張頡不可用疏曰臣伏見朝廷以置渠陽軍為不便議欲棄之者久矣然自去年以來欲棄而不得羣蠻猖獗南邊至今為梗者何也任非其人而棄之無術故也唐義問文俗吏耳無他才略昔被朝命直入羣蠻之中欲棄此城既為蠻衆所圍用胡田之計詐欺羣蠻茍脱性命既歸不敢以其實聞凡有寇盜皆指揮邊城不得申報朝廷不察其實而任之不替則既一失之矣及今夏以來蠻寇大作以至覆軍殺將臣屢以為言而朝廷屬任義問之意不衰訪聞大臣但以臨敵不可易將為詞終欲庇義問不卹邊人肝腦塗地之苦及今已將半年則既再失之矣今者朝廷除張頡知荆南頡自瀛徙荆誠不為超遷然近降朝㫖令單馬赴任外人始知朝廷欲以頡代義問蓋義問之所以敗者闇而自用狼而失衆今頡猜嶮闇愎又甚於義問而朝廷復加委任則又三失之矣臣竊悲湖北之人外遭羣蠻騷擾不安其居内䝉用人三失未知息肩之所是以不避煩瀆冒進瞽言昔元祐二年朝廷除頡户部侍郎臣時為諫官前後具頡罪惡八事乞行罷免時雖不從然用頡未逾年知其不可卒黜之外任及今未幾而遂付以邊事邊事重害又與户部不同蓋臨敵統衆兵民性命所係不可不慎竊聞大臣謂頡本貫鼎州意其習知蠻事是以遣之然不知人才各有短長未必生於其鄉必善其事臣但恐頡任情恣行出於天性老而不改必致敗事頡昔為桂州經略使始因靳吝小費終以措置乖方遂致宜州夷人背叛賊殺本州兵官頡尋遣費萬王竒二將繼往攻討率皆陷没先帝震怒差官取勘遂落職奪官降知均州又元豐三年除頡知熙州是時臣僚上言頡天資褊躁動多猜忌頃在廣南忿爭互論州郡官吏為之不安乞賜追寢新命尋奉聖㫖令依舊知滄州然則頡之不可付以邊事著自先朝非獨今日臣言之矣所有臣昔具頡八事皆非虚言並有案據謹别具開録奏聞乞令大臣看詳罷頡新命或但無令預聞邊事别㨂諳練用兵之人責之成效貼黄張頡資任已深除知荆南不為過當臣今所言但以頡為性猜嶮所至不得衆情不可令管邊事李薦上論曰臣聞牛羊欲其茁壯也必其善牧車馬欲其習服也必其善御矧軍旅之事將帥之職畀之以師律付之以疆塲内欲重吾國外欲克吾敵顧不慎哉不可以三軍之元帥姑且備其員兩國之民命聊且試其技不攷其可必為國禍不求其良必為民殃故當築壇告廟之始必觀是人果足以稱此禮乎至推轂授鉞之際又觀是人果足以勝吾任乎昔在戰國之紛紛不惟君可以擇臣而臣亦可以擇君當時英雄挾其長游眎諸侯能用我者然後仕之故欲求將不可遽得今天下為家四海為畿罔匪臣僕英雄盡入於彀中多士咸在衆技自獻惟君王所擇所謂能稱築壇告廟之禮能勝推轂受鉞之任者固亦有之在所選而已昔之論將者其材有五曰勇曰智曰仁曰信曰忠將何以貴乎勇蓋直以養氣威以克愛剛以致其敢義以致其必蔑視敵國而砥礪三軍吾之所指曷敢不從死吾之所麾曷敢不從移非勇則不可犯矣將何以貴乎智蓋使貪使愚各求其所須使勇使智各効其長技俾敵常為客而不足我常為主而有餘我常致人而人必應人不可致我而我自如為勝敗之政如神人黙運制竒正之術如環無端非智不能也智則不可亂將何以貴乎仁蓋以慈養其惠以惠養其威寛以御衆衆罔不盡其心悦以使民民罔不盡其力忘勞而供武服犯難而圖戰多欲與之可赴深溪必自我視之如嬰兒欲與之可俱死必自我視之如愛子則非仁何以懐之仁則能愛人故也人不可無信而將之信為重蓋方其蒞師也國不自外理國容於是乎不入軍軍不從中御軍容於是乎不入國將軍之權專矣如之何交厥孚於上下布至誠於逺邇故貴乎信信則不欺人故也事君皆以忠而將之忠為大蓋方其用師也上不制於天中不制於地下不制於人將軍之志自用矣如之何惟君是圖而忘其身惟國是憂而忘其家故貴乎忠忠則無二心故也夫有爵有僇士心所屬可安可危君慮所隨士心所屬以賞刑之柄繫焉賞刑之所繫成敗如轉掌君慮所隨愛憎之變會焉愛憎之所會禍福如發機惟信惟忠乃為建立勛名之權輿杜塞危疑之關鍵也以是五材泛觀於朝如持度以揆長短如操量以較多寡其分别差等殆無遺形大材如罍小材如盃以盃受罍過則溢以罍受盃綽乎兼容故古之人論將有妻子之將有十人之將有百人之將有千人之將有十萬人之將有百萬人之將其材相去逺甚然不離乎五者之間也雖然材必適其用用必適其宜執方而無權守一而不變雖用良材覆為累徳故太公之論將有十過孫武之論將有五危觀其過之所生究其危之所自其初皆五材之良其失皆五材之蔽有材而不能用至於軍敗國辱家殘身僇吁可哀也故為將之道既有五材以御三軍欲攬英雄之心則又當行之以三禮斷之以三至欲重廟堂之勝算則又當持之以五慎審之以五權達事宜則有九變能通九變則寘敵于全囚泥法制則有九拘毋執九拘則立我於全勝古之人論良將有曰剛則法天可望而不可干柔則像淵可觀而不可玩去如収電可見而不可追留如丘山可瞻而不可動有將如此則築壇告廟之禮推轂受鉞之任為不愧矣故初作三軍欲謀元帥惟郤縠説禮樂而敦詩書於是用於晉秦伐阿鄄而燕侵河上惟穰苴文附衆而武勝敵於是用於齊孫武十三篇之説闔閭試之以婦人卒以强呉呉起七十六戰之功魏武始於論兵器卒以强魏先軫以下軍之佐而超將中軍不以卑踰尊為疑郤氏狐氏以族人從軍不以親同職為間韓信奮於亡虜魏尚㧞於囚徒充國自舉任之而不違伏波求用試之而不拒謝安薦姪而不沮其挾親竇憲請行而曲聽其補過所用者材也材可用焉不當牽左右近習之好惡不當狥士卒國人之議論挺然不疑斷以已意夫賢將之徒𩔖皆英雄豪傑之士觀人君用已如此其重當如之何圖報哉谷永曰楚有子玉得臣文公為之側席而坐趙有㢘頗馬服强秦不敢窺兵井陘國有賢將所恃如此惟陛下注意焉陸賈曰天下安注意相天下危注意將必至天下危然後注意將則不亦晚乎惟天下安乃注意將之時是謂治不忘亂安不忘危李廌又上言曰臣聞有君子將有小人將君子將天下之將也小人將亡國之將也古之賢將原兵之意可以為仁術察武之用可以廣徳心故以殺止殺非所以好殺以戰去戰非所以好戰司馬法曰殺人安人殺之可也攻其國愛其民攻之可也孫子曰全國為上破國次之全軍為上破軍次之何古人終始以愛存心歟故君子之將能師古人之意不以戰屈人兵為心小人之將違古人之意以嗜殺人為事以不戰屈兵之為心以天下為心者也非天下之將乎以嗜殺人為事亡國而不卹者也非亡國之將乎夫尉繚當梁惠王之時為兵之説曰善用兵者能殺士卒之半其次殺十之三其次十之一能殺其半者威加海内能殺其十之三者力加諸侯能殺十之一者今行士卒信此説也則興師二十萬可自誅其十萬興師十萬可自誅其五萬矣且夫將軍心也士卒支指也心誠則支指應心危則支指衞士樂附則將威今敺無罪之人以犯難悦以使之猶恐不得其心忍羅置罪罟以快意於刑戮乎誅其半欲其半之用命孰若全軍撫愛皆使之親其上死其長乎殺半用半雖勝何益孟子曰不仁哉梁惠王也糜爛其民而戰之爭地以戰殺人盈野爭城以戰殺人盈城嗚呼慘酷至此尉繚有以啓之歟臣於是於古之君子善撫士卒而愛之者私竊慕焉其惟戰國之李牧蜀之諸葛亮唐之李靖乎臣請言其用兵之意夫李牧之居鴈門也罄軍市之租以養士力椎牛犒燕以養士心謹烽燧多間諜以養嚴入保示怯佯伏致人以養氣謀熟勇於全皆願一戰於是選車餘千選騎餘萬百金之士五萬彀者十萬一舉而滅襜襤走單于破東胡降林明向使自殺其士卒之半則莫不怨毒矣孰肯自獻其勇以求一戰乎諸葛亮之禦張郃郃之衆號四十萬而亮之衆不滿一軍衆寡既不敵而强弱又相逺兩軍既陣而幡兵適交亮以用兵行師大信為本乃悉遣之且曰去者束裝以待期妻子企踵而計日則原其情而閔其勞懐以仁而厲以義可謂周矣故去者感激願留一戰住者憤怒人百其勇殺郃走懿以成其功向使自殺其士卒之半則聞聲而還矣孰肯忘死銜恩以決一戰乎李靖之與太宗論兵也太宗以嚴刑峻法使人畏我不畏敵為疑靖以卒未附而罰不行不可用為説太宗以愛克威威克愛為問靖以愛設於先威設於後為對則君臣之心何視卒如嬰兒乎又曰頃討突厥總蕃漢之衆出塞千里未嘗戮一楊干斬一莊賈夫衞公於艱難草創之初剪刈兇渠以掃欃槍備延陀於關内伐突厥於定襄盪吐渾於西海夷蕭銑於江陵向使自殺其士卒之半則危國亡師之不暇況宣威信於異域乎嗚呼安得今日守邊之將愛育士卒如此三子者乎夫天子之兵以仁為本以義為御天下之將以慈為主以勇為決卻視尉繚之説非亡國之兵小人之將乎秦以殘忍虎狼之思務殺伐屠戮以强天下又有殘忍虎狼之將能殺伐屠戮以快其意䝉驁王剪之父子世為秦人之民賊攻城克敵固已衆矣然未若白起之甚夫白起之為將也戰必勝攻必取誠莫可及以書考之凡攻某國拔之伐某所取之不言斬首若干坑卒若干者置而勿論論其直書斬首若干坑卒若干而計之凡殺敵國之兵八十四萬人然起戰卒死於敵者又當幾十萬總兩國供軍之民其誅求裒斂因以失業而死者又當幾十萬矣何晏曰白起降趙卒而坑豈徒酷暴之謂乎後亦難得志矣又曰裁四十萬之命而適足以强天下之戰要一日之功而更堅諸侯之守又曰殺降之禍大於劇戰然則兵勝未幾而被戮國强未幾而為墟良以此乎臣於是乎求於古之君子能制閫外而懐柔者私竊慕焉其惟戰國之荀呉晉之羊祜唐之郭元振乎臣請言其用兵之説夫荀呉之伐鮮虞而圍鼓也鼓人欲叛其君而附已矣曰吾不可以欲城而市姦所喪滋多鼓人請降而有食色呉曰吾焉用邑以賈怠不如完舊食竭力盡克鼓而還不戮一人賢哉羊叔子之為荆州也慨然有平呉之心開布大信專修徳義縱俘釋虜以示至仁歸禽償榖以示不擾潘景來寇追斬而厚葬之美其死節陸抗對壘抗病而饋之藥抗飲不疑内則授良謀於張華外則付成算於杜預卒能平呉賢哉郭元振之鎮西域也撫馭諸蕃專尚忠義走吐蕃之衆開涼州之圍會兵百萬以集湟川分兵十道以進青海贊普屈膝而請和突厥畏威而入貢跪質勒而至於霣身吊婆葛而為之流涕賢哉嗚呼安得今日守邊之將綏撫敵國如此三子者出乎夫天子之兵至信為主至公為輔天下之將附衆以文威敵以武卻視白起之功非亡國之兵小人之將乎夫為政至用兵棘矣用兵至於殺人可哀矣以可殺而以殺為事乃嗜好也嗜殺人者其心何如孟子曰始作俑者其無後乎為其象人而用之也懼後世以象人為未足有徇之以人者矣故必推原其理而深罪之奈何尉繚之法使後世藉口以殘忍乎孟子曰盡信書不如無書吾於武成取其二三策而已何其流血之漂杵也懼後世以漂杵則忍心於屠殄矣故必推原其書而深詆之奈何白起之事誘後世快意於殺伐乎陛下以仁政為重孝治為先則將之心術亦可戒矣彼一夫向隅而泣滿堂為之不樂東海殺一孝婦天降累年之旱以罰之惟人命為可重也陛下念哉徽宗時左正言任伯雨上言曰臣風聞外議皆言朝廷以西北諸帥闕人議欲益以武臣紛紛累日事雖未詳臣為諫官敢不先慮萬一果如此行今日雖未有害異日便為禍階此唐室方鎮之患所由起也唐自開元以前諸邊帥多用儒將緝綏懐附内外帖然及至李林甫作宰相欲久其位惡儒臣有勞入為輔弼乃建議悉用蕃將武人遂召禄山之亂肅代以後大盜略平武夫悍將皆已有力强藩巨鎮以次分授既有其土地又有其人民又有其甲兵重權在手脣齒相依䟦扈自恣遂不可制終唐之世以此亂亡本朝太祖太宗時四方未平西北未服乃用武臣分主要地時勢所係不得不然及至太宗已後迤邐悉用儒將至於並邊小郡始用武人此祖宗深思逺慮鑒唐室藩鎮之弊以為子孫萬世之計也今若因闕帥臣遂用武人自此以後人人皆有作帥之望茍其才不相上下功不相先後有得有不得則内有怨心外有慙色悻悻不服以朝廷輕已及其臨事豈肯用心如其已得則位尊權重奓然自大有貪功名之心則生事邀功有黷貨財之心則侵剥夷漢䟦扈驕蹇不循法度朝廷若不體問則養成其惡為禍愈深若便體問則畏禍懼罪必不順命或有移徙非其所欲脅衆留已以干朝廷從之則損威違之則生亂彼此視效結黨相庇伸縮進退莫不掣肘翫習既久人人以為當然則方鎮之患自此成矣況朝廷闕帥自可於省寺卿少郎官外路轉運使副有才望資序深者權試其才平時守邊苦無大事萬一不任亦止一時外患若用武臣漸成方鎮之勢則國家内患非止一朝一夕之故也或謂朝廷盛强雖用武臣未必為患前此間有武臣為帥矣臣謂不然且前此雖有乃卓然有才非同軰所敢比者是以人不僥倖且規事建議必圖萬世之固預防未然之禍方李林甫建議不用儒將豈知後世有方鎮之患耶臣願陛下深思逺慮鑒前代之事遵祖宗之制慎所處置以安萬世無窮之基天下幸甚中書舍人兼崇政殿説書袁甫經筵進講論李允則疏曰臣聞帥閫以真才為重以善謀為主有才而無謀不足以為真才矣李允則之守邊也胷中之謀愈出愈竒懼敵人疑已而揚言護嶽祠修城築也引水作石梁聚舟為競渡寓水戰也撤樓夷阬而植榆塞下設險固也上元舊不然燈特結山張樂使民縱遊陷敵將也不救火災宻運器甲以補所焚安衆心也此猶易能耳未足以見允則之竒謀敵遣間諜刺我兵數而能使諜者轉為我用此一竒也敵敺吾民將以為質驗而我能反其鋒而用之又一竒也雲翼卒伍之逃敵以不知所在為辭而允則指言某處運智如神又一竒也天下多事之秋使得任閫外之寄者善謀如此可以寛顧憂矣雖然設謀易用謀難自信易為上所信難李牧縱匈奴數侵趙邊而終不肯出戰謀則善矣然其迹似乎養寇陸抗與羊祜邊境交和謀亦善矣然其迹似乎賣國必也上之人寛洪大度聽其所為而無掣肘之患則謀成而功立不然信任不專讒間入之則所以撓其謀者多矣臣是以深取李允則之善謀而又三嘆真廟之善聽也欽宗靖康元年中書舍人胡安國論四道置帥狀曰臣准中書省兵房送到録黄一道臣僚上言天下之勢治平則宜重内遭變則宜重外乞分置四道帥臣以都總管為名付之一面為衞王室禦强敵之計以臣愚見自古及今内外之勢適平則安偏重則危昔東漢季年王室多故劉焉建議以為四方兵寇由刺史威輕宜改置州牧及焉求益郡劉表出襄陽袁紹得冀曹操取兖爭相割據自此不復有王室矣唐僖宗時黄巢入寇用高駢為都統急令討賊及巢入長安詔駢舉兵而駢恃甲兵財賦之强終不奉詔自太祖鑒觀前弊削奪藩鎮之權行至於今州郡太輕理宜通變然一旦遽以數百州之地二十三路之廣分為四路各統一面事得專決財得通用吏得辟置兵得誅賞其事權太重又非特州牧之比也使此四人者果皆盡忠君父心在王室倉卒之際合從救援則固善矣假令萬一抗衡䟦扈號召不至如劉焉表操紹高駢之所為又何以待之乎五大在邊古人所戒以身使臂於理乃宜臣之愚計欲乞只據見今二十三路所置帥司選擇重臣付以都總管之權專治軍旅之事毎歳終按察其部内或有警急京城戒嚴即各帥所屬守將逐急應援如此則既有擁衞王室之勢又無尾大不掉之虞一舉兩得伏望聖慈更賜裁酌特降聖㫖施行右諫議大夫楊時上疏曰臣比聞尼雅滿三月中自太原分兵入汾州界至四月復還太原往來二州之間如在無人之境所經縣鎮焚劫屠戮殆無孑遺王師坐視不救若非已事至四月半敵離汾州還太原統制林良器等四人方至汾州入城十餘日坐糜廪粟無敢向敵者姚古節制諸將擁重兵躬自逗遛不進宜諸將皆無肯用命也臣嘗論姚古逗遛以軍法從事久未䝉施行今太原圍閉累月危急甚矣訪聞大兵尚在威勝軍無一人一騎入太原境者惟范瓊不受姚古節制獨能引兵稍進諸將逗遛古實為之也奈何惜一姚古不誅坐視要害之地而不救乎萬一太原之民以王師不救必謂朝廷棄之别生異心則禍起肘腋非金人之比不可不慮也自金人殘滅契丹人人知其必有南窺之意郭藥師逆賊也包藏禍心亦人人知其必反王安中見禍亂已形覬幸脱歸不復以告蔡靖抗章論奏而白時中李邦彦蔡攸蔡懋等蔽䝉茍安恬不加恤浸成大患今太原危急如此朝廷當以前事為監不可緩也一失太原則大事去矣臣願陛下明詔大臣悉力措畫速正姚古逗遛之罪誅之以肅軍政遴柬有武畧可任者代之偏裨猶有不用命者一以軍法從事庶幾士氣稍振使敵人有所忌憚若朝廷未欲遽誅大將姑用唐故事盡行削奪使白衣從軍以責後效猶之可也不爾則秋冬之交風勁草衰强敵長驅而南益無忌憚悔無及矣惟陛下留神而幸聽之御史中丞許翰上言曰臣伏見宣制罷樞宻宣撫使种師道提舉中太乙宫中外聞之悵然失色按師道名將沈毅有餘山西將士人人信服臣以臺制不得身見師道然素聞其賢如此兵興以來臣所詢訪數十百人皆言師道雖已老疾智慮不衰而獨聞諸朝廷以為老無計策不可復用異於國人臣考古進賢之法在易之晉其六三曰衆允之志上行也夫人各有私合衆則公故必衆允其賢也而後可進此孟子所謂國人皆曰賢而後察之者人君之所聽察如此可謂較且易矣是以用無不當後世不稽於衆而欲恃一已之明以周知人之所藴是以抜十得五尚曰比肩謂其黯闇艱難失人之多也陛下欲求知人之術則觀諸易象而質諸孟子其亦可矣臣恐左右諸大夫之一旦論种師道不如國人素信之審也昔秦始皇老王翦而用李信兵辱於楚乃自馳見王翦謝之曰將軍雖病獨忍棄寡人乎其後王翦卒以持重破楚軍略定荆地漢宣帝老趙充國使問充國誰可將者對曰無踰於老臣者矣充國與羌相拒堅守不戰羌豪相數責曰語汝無反今天子遣趙將軍來年八九十矣善為兵今請一鬭死可得耶後終漢之世無西戎之患者充國之力也前世自吕望以來用將收功如此者難一二數至於趙用趙括蜀用馬謖宋用王𤣥謨皆見其平日論兵智略從横使之當敵制變卒皆折北不救以古揆今則師道之老而木訥未當謂不可用也今師道復統河朔之師委制閫外之重將吏素服士卒素信敵國素畏易以定功此上策也處之樞府選將將兵威名方略可以折衝此次策也今無故解其兵權委之道館使士氣消沮民心疑惑臣竊恨之金人此行存亡所繫令一大創使失利去則中原可保四夷可服失此機會則非特方來再舉必有不救之憂臣恐西戎南夷共知中國大弱爭圖深入為金人之所為則我困於奔命必不支矣廷臣間憒憒不曉者固不足道至於僅有識者多能知之然知之者莫肯力言言之者莫肯疏奏是何人也人為身謀畏執其咎一有疏奏形迹可接不如容容成敗不與鄙夫事君自古而然臣遭陛下休明之運銜陛下知遇之恩自頂至踵已許國矣又當言責不敢不盡竊聞臺臣諫官屢劾宇文虚中朝廷重去虚中而輕罷師道此非特臣所不喻也或謂師道足不良行害於馳驅朝謁奏事此與國之安危孰為重輕若孫臏坐輜車中為齊軍師田千秋得小車至漢殿貪賢尚能古有之矣伏望聖慈哀臣拳拳憂國之計更與大臣參之不憚改命天下幸甚許翰又上言曰臣聞耕當問奴織當問婢老馬識道巢鳥知風此言物各有所習也是以金革之事必資宿將臣累言种師道知慮未衰邉疆素畏藉其威名猶可折衝今縱未能置之樞府謂宜使之領制置司示不閒廢俾得盡心虎豹在山藜藿不採非虚語也臣既論兵之不可不用故遂論將不憚喋喋上瀆聖聰者誠以為兵待將而後勝又謂方多故時國之虎臣未宜投閒急而求之非所以明朝廷也今敵行已逺遣議三鎮之使尚未發軫臣恐將帥牽制使指曠日持久遂失事機今日之勢當如救火不得少緩緩則無及望先明告將帥使得閫外便宜制勝委任而責成功此自古用將之法也兵交使在其間盟亦何害且料兵威未振敵情未讋遣使禮請未易下也故今日之事恃兵之力多而恃使之謀少乃可為矣翰又言曰臣伏見艱難以來用將不專禀命朝廷故使大帥節制難一機會屢失敵勢益張欲茍無事而變更愈繁欲姑休息而息肩無日此忠憤憂國之士所以中夜慨歎撫枕而興也今既明示天下以弱是以河東之兵深入而不忌陝西之寇内侮而方興情勢至此亦已棘矣若不一大變前所為恐不復可濟為今計者獨有起种師道聽以大計朝廷但責成功而已昔漢高帝取魏但問大將騎將步將為誰知非韓信等敵遂決不疑以是知用兵之法要在論將而議者以种師道姚古有怨故罷師道而用古然臣竊觀漢高祖始用陳平護軍諸將不服更使盡護諸將諸將乃不敢言韓信初拜大將一軍皆驚高祖不恤也光武之時賈復常欲手殺寇恂光武躬譬解之曰天下未定兩虎安得私鬭今朕分之卒使二人結歡而去今陛下欲正天下則宜如高祖欲和調將帥則宜如光武方乏材時諸將臣至少豈得使之一廢一植至於勤王之師雖已罷遣今恐事棘不免復召但使河朔敵破則河東敵勢自絀要之非一大勞恐無休息之時伏願陛下更與大臣反覆熟慮早定大計今日之事已難於前日安知後日不又難於今日也而議者猶欲循前之姑息前之得失亦可鑑矣高宗紹興四年王之道上奏曰臣聞自古良將用兵其謀定於數年之前其功成於數年之後與其始之所言所為莫見少異者故在國無屈力殫貨之患在已有料敵制勝之名若漢之趙充國晉之羊祜可謂得此道矣充國之制先零也專以先計後戰為事今年上書曰善戰者致人而不致於人明年上狀曰帝王之兵以全取勝故先為不可勝以待敵之可勝其後乃以屯田金城益積蓄省大費而遂破先零羊祜之討孫皓也專以開布大信為事今年有略呉二兒為俘者遣而歸之明年有禽獸先為呉人所傷而為晉兵所得者封而與之其後呉遂罷守石城故祜得以分其戍卒墾田八百餘頃而遂禽孫皓不知今日之所用以待敵者果出何策其所委以制敵人之命者果屬何人惟陛下日夜焦勞不忘嘗膽以刷二帝北狩之恥固當有萬全之至計然以臣觀諸將之所施設未見其髣髴也為今之策莫若擇三大將寘之三路東屯揚楚中屯廬壽西屯襄漢俾其勢如常山之蛇擊其首則尾應擊其尾則首應擊其中則首尾俱應一切取法趙充國之制先零羊祜之討孫皓屯田境上務在先計後戰開布大信期於一舉而空朔庭然後為勝傳曰隂陽不和㧞士為相疆埸不寧㧞卒為將臣前所謂擇三大將寘之三路者要不可以文武資格為限其詔中外侍從將帥之臣有才略絶倫者各舉二人以聞召赴都堂命二三大臣窮之詭道以觀其謀試之危事以觀其勇然後陛下親擇而用之曰誰為我守揚楚誰為我守廬壽誰為我守襄漢如漢高之用韓信晉武之用馬隆授以方略令其自効如是將見人人輸忠奮力為國家用陛下垂拱仰成而中興之功可日月以冀矣紹興間張浚議堅忍立事曰臣嘗觀漢祖因思歸之兵與項籍力戰滎陽成臯間大小七十餘戰身困兵潰者數矣然則良平之計謀曾不預其敗乎是不然也夫高祖東嚮以爭天下良實啓之平多竒畫高祖數賴之以免至於不幸而用兵未利則亦上下同心姑為善後之圖耳何至紛紛然自為離間乎此其所以能終有天下也燕退樂毅秦用孟明可以為鑑而況不為樂毅孟明者耶浚又上言曰論者謂人主之御將當結之以恩待之以禮此固是也然臣竊以為服將帥之心莫若一循理道而加以至誠則何事不濟若一有不歸於正彼雖遜順伏從而其心已窺測懐望矣唐自肅宗之後藩鎮跋扈終至於亡豈非有以啓其心者乎張浚又上言曰甚矣明皇之於禄山愛寵而親信之也雖妃子之貴為之執爵以飲之豈非欲得其誠心而託其捍禦疆塲耶然其終也不能免其不叛至使六龍䝉塵四海肇亂其故何哉御之不以心也嗚呼人主以一身而臨億兆衆庶之上所恃以承祖宗之業建百世之基者惟道理所在耳得之則治失之則亂儻惟此之行如圭玉之純略無瑕汚如日月之明曾無掩蔽王道不難成也夫今日之為將帥者忠義之質出於所性蓋天實生之以佐陛下中興且久與書生從處於古是非得失之計亦耳聞而心熟之臣願陛下待之以正禮遇之以直道不復少有間隙俾之或得而窺伺則君臣享福垂美無窮豈不為千載之盛事乎浚又上言曰臣契勘韓世忠毎以恢復自任慷慨負氣不許同軰之出其右今諸帥列屯並進實自世忠發之欲望陛下因召問之際曲加撫勞以駐軍承楚始自世忠淮東鹽利之贍給諸軍者歳不下千萬向非世忠力為此行則諸帥因循玩日安肯渡江自來凡遇敵兵率多望風而遁惟世忠力破精鋭以少擊衆異時中興之功當責望世忠臣毎與之欵言世忠亦深以此自負故願陛下委曲及之干冒天威不勝惶懼之至浚又上言曰臣嘗謂握重兵被隆委者其過失常聞於天下而事不任責言可惑衆者未有不獲美名此何故耶人情惡人之在已上而患已之不能有所成立凡有血氣者皆然也是以紛紛之論莫可究正豈獨將帥哉然則人主何從而辨之要當學古之道酌今之情茍於吾心未見有所見之實勿輕以畀付也知之而後用之用之而勿疑天下之事可不勞而定矣浚又上言曰臣輒具危懇上瀆聖聰區區至情仰祈睿照再念事干大計利害非輕臣而言之惟恐違拂朝廷之意微臣孤逺之蹤無所逃責臣而不言終致上誤國家非臣捐身以事陛下之意也臣近奉聖㫖差王似充宣撫處置副使臣伏思聖意高逺所以為天下之計者至厚慮臣一有犬馬之疾或誤使令逺方無副將士失歸此蓋甚善計也然臣熟知王似平生最詳鎮重寛厚於民不擾似之所長於駕御將帥裁處機事不為身謀以圖事功緩急之間恐未可仗若臣䝉陛下聖恩得請而去事有不可勝言者矣此其一也臣又伏思陛下之意欲委似招徠未附之人臣竊惟天下之患獨在金人金未退聽難將不已何暇撫叛又況似任環慶日嘗為制置使行檄諸路皆不奉從如張中孚之徒昔有深隙今又安能懐之使來乎此其二也臣被命川陝外而劉子羽呉玠之徒蹈萬死一生之地與敵為讎内而張深程唐日夜謀議此軰皆以侍從高選嘗立破敵之功其意各望陛下天日照知寖加任用今事將就緒一旦以無功侍從驟處副任人情謂何此其三也臣去歳差似知興元府兼節制呉玠王彦彦與玠各有論列遂復以劉子羽代之今似為副使必不安職此其四也臣最單微獨荷陛下知遇屢經大謗悉荷保全凡所委任莫非親付今似未嘗得對天日之表有此除擢恐自此臣之過失日聞於陛下之前矣此其五也臣之區區肝膽畢露於此伏乞陛下念臣嘗有微績曲賜保全俾之退歸遂養疾臣之未死尚當圖後日之報臣無任祈懇之至貼黄契勘臣所陳事理上干國家臣非不知含糊茍且自為身謀特慮劉子羽張深程唐呉玠王彦之徒必自引去而似之才能庸常終至敗事臣雖萬死無以塞責兼事之利害又有至切者伏見蜀之士大夫及流寓侍從官以下貽書至臣及朝廷執事皆以自守安靜為言彼非為陛下國家計乃自為家屬及一身計者也曾不知將士所以捨偽從正數至十五餘萬彼於臣何有哉特以上念祖宗恩徳之厚次戴陛下養育之仁各欲奮力以求平定今若按兵自固能保其不離散而為亂乎此特其一耳又況敵為不道必欲傾揺我社稷翦除我民人而我乃委靡自困終必為敵所滅為此説者蓋不思之甚也臣毎與劉子羽呉玠王彦等日夜治兵儲糧食備器械其一蓋欲張大聲勢使敵知我必與為敵不敢萌意南行其二亦欲激勵將士講明戰陣為陛下興大利除大害奉迎車駕以福中原而或者區區獨為身謀遂起怨謗相為朋黨求撓臣權在臣去就利害甚輕而國家之計恐有未便伏望陛下謀之於心斷之於已以惠天下臣之此言天日鬼神實所照知伏望陛下留臣章疏於中恐大臣不安其職求為進退益煩聖慮臣無任懇切之至江西安撫制置大使李綱上言曰臣伏覩陛下駕馭將帥恩禮兼隆至有不逺千里召赴行闕者燕射錫與優渥此誠足以得其心而用其力也將帥荷眷遇之厚爭先望天光而聆玉音竭蹷造朝惟恐居後此亦臣子之至情然臣聞古之善為將帥者非有大事不去屯所文帝欲勞棘門灞上細柳之軍則親臨之凡以三軍之命係於主帥機事之來間不容髮使帥不在軍敵人覘而知之卒有警急何以應敵今將帥既輕千里而入覲又有進對燕犒之留連邊境有虞誠不可不慮伏望聖慈留神深念自今非有大謀議不必逺召將帥如有燕賜之恩遣近臣即其軍中可也庶幾將帥得以畢精盡慮為陛下敵愾禦侮以圖恢復將來武功告成中國乂安之後念功賞勞出於曲賜朝夕進見體貌有加鐘鼓不作則遣使以訪之惟陛下所幸耳愚慮所及冒昧以聞死有餘罪惟陛下裁察知洪州趙元鎮上奏曰臣契勘襄陽府在江淮上流當川陜襟喉之地自三國用武之際未嘗不先留意於此晉武帝平呉羊祜杜預亦由此以成大功昨以李横為襄陽府路鎮撫使蓋因其衆據此要害增重荆襄之勢誠為得策縁朝廷方遣使和議已曾戒飭邊臣不得用兵今據探報李横牛臯約起兵往東京以來收復州縣又聞偽齊亦會合金人及遣李成領衆西去竊慮縁此紛擾不定遂有并吞之意是時豈李横烏合之衆所能備禦不能備禦則襄陽決至失守襄陽不守則川陜路絶荆湖震動自江以南皆順流可至之地其利害有不可勝言者近有人自襄陽來臣因詢訪横用兵之狀云止是軍中闕乏兼冬寒在近欲擘畫些少冬衣然則横之出兵固非得已臣竊思朝廷既以襄陽為上流要害之地以横忠義曾有勞効遂付以一路鎮撫之權不可使窘急如此以至引惹重生邊患臣愚欲望陛下特詔有司時有以資給之使横衣糧足備不假他圖即嚴降詔㫖丁寧約束責其謹守疆埸繕脩城壘休兵牧馬養鋭待敵為持久之計自非敵人侵犯及奉朝廷指揮不得輒因小利出兵生事臣以不才誤䝉委寄而上流利害實有相關者今兹所陳亦臣之職併乞聖聰加察吏部侍郎洪遵薦劉汜狀曰臣准紹興二十九年四月十九日勅節文令侍從各歳薦智謀深逺鎮靜嚴明兼通儒學可充將帥者武藝超絶驍勇猛鷙爭先敢死可率士衆大小使臣以上貳員臣伏見閤門宣贊舍人充荆湖北路兵馬副都監兼荆南駐劄御前効用統領劉汜西州將種克副家聲勇鷙能謀濟以儒雅使當一隊必有可觀處之偏裨未究其用欲望聖慈特賜陞擢遵為中書舍人又薦李寳狀曰臣等伏見武功大夫貴州團練使兼閤門宣贊舍人兩浙西路兵馬副都監李寳尺籍奮身屢書功最雙刀賈勇冠出軰流仁足以撫摩師徒嚴足以訓齊紀律置之散地實為非宜欲望聖慈特賜陞擢遵又薦劉澤奏狀曰臣竊見武功大夫侍衞馬軍司後軍統制劉澤昨從劉錡在順昌立功最多馭衆有恩治軍有律公忠廉直無毫釐取於下繼在太平州屯駐縁都統制王進忌其能遂罷兵職離軍之日部曲不忍其貧欲斂衆供億澤誼不肯受獨與其子徒步造朝徑赴吏部注擬會侍衞馬軍辟為統制其治軍馭衆與在順昌太平等不置回易以剥下裒利所部窘乏割已俸賙之為之下者感悦誓死樂為之用中外士大夫皆知其賢不獨於武夫之聞而已臣於今年五月内嘗與給事中周麟之等列銜保薦乞賜擢用續於六月間面奉聖訓欲遣往江州將屯未䝉施行間今來又准前項詔㫖臣與劉澤素不相識而聞其為將著績章章可考高可以為萬夫之長下可以當一隊之用於上二者擇一處之方太平無事固不失為安邊良將一有緩急決可倚伏伏望睿慈特加旌擢以示明詔求人不為虚設則英傑之士為時而出將不可勝用實為今日急務歴代名臣奏議卷二百三十八
