body:
  text: 歷代名臣奏議卷三百三十六明楊士竒等撰禦邊宋孝宗隆興元年顯謨閣直學士虞允文論唐鄧不可棄兩軍守禦之策上奏曰臣伏蒙聖恩賜臣御札睿明旁燭察臣區區之心於數千里之逺奬訓有加臣下拜伏讀九殞此身不足以報益當自盡以副陛下任使作成之意臣契勘唐鄧二州雖非形勢所在而足以為襄陽之藩籬藩籬存則襄陽固襄陽固則上流一帶可奠枕而安矣是唐鄧不可以輕棄而無險可恃又不可勞兵逺爭臣故與三將共議以兩軍重兵聚於唐鄧之間因新野古城壘為勝勢則唐鄧重而敵不敢進兵深入為必取必守之計也蓋唐鄧不可以兵守但以兵勢守之爾敵知官軍之力聚於新野而深溝堅壁不與之戰當清野之後無可因之糧草又多出忠義之兵抄略其糧道以臣料之敵未必能為旬日之留又豈能必守吾唐鄧二州也官軍少而敵兵衆要當以智算勝之使之深入而不能以久留則唐鄧終為我有襄陽以固而上流自安此臣得於羣策以為當然者如用趙撙之說以鄂州兵保湖陽用王宣之說以荆南兵保順陽相去既逺兵力又分唐鄧中虛無可恃之兵勢敵何所顧忌舍唐鄧而不堅守也兵有機變更須臨事以應之但比來諸將為國致命者少謀身自便者多臣今未敢以二城置度外之說與二將言之蓋恐二將知陛下已許臣棄唐鄧志氣遂怠不為邉面之用也伏乞陛下垂察又今日軍政之弊陛下數語之間無不曲盡聖德明逺諸將敢不心服膽落革其故習以答明訓臣先日所奏止是兩軍屯於襄陽之數分戍之兵不在焉臣據王彥申到兩軍總數今具别劄進呈臣究其甲軍凡四萬二千人而輕兵輜重火頭凡二萬六千四百七十九人是輕兵輜重火頭占破之數過於甲軍之半不可不略行整治今明詔所謂上下征利兵力單寡平居冗費緩急誤事其明效大驗臣竊於兩軍親見之此臣之所甚憤有心於革去而恐事未一就謗已四馳萬里難明亦臣所甚憂也臣先日既委曲以交其歡心又明白以示其好意使各自為謀而自救其過虛額者補之老弱者刪放之占破強壯者拘集之期於甲軍之數加多以待國家之用而已若久之而有不去之弊臣當隨宜從長行之别具奏知伏乞睿照允文又論措置唐鄧一帶為必守計上奏曰臣伏惟陛下聰明睿武出於天授當和戰二議羣言紛亂中獨運聖斷不惑不疑去取是非咸歸於當不獨覆載之下一草一木皆有嘉生之意而敵之情僞無不逺燭敵之氣亦奪矣臣比聞已遣胡昉等先往議四州之地而二使人後發且留淮上以待則聖謨既已堅決據探報敵帥留昉等馳騎吏往燕京臣料敵人亦無不從非久當有的報況近日屢報境上敵兵名為東南行而其實東北去近有女真契丹人來歸其說亦合識者以此為中國恢復之機顧恐弗用爾敵何敢深入與我爭此四州地也今敵中多事臣竊見陛下不棄此四州已著於施行之迹則唐鄧兩城不可以不措置為必守之計臣嘗密委官屬前去相視而鄧州城多頽圮樓櫓守禦之具亦未備臣今日已令王宣親往審度凡當計置費用臣從夲司一面酌量應副惟唐州城初未修築若既和之後當於二三月以後兵戍解嚴農事未興之際量行營治若自硯瓦坡方城大成山各依險要為小堡而唐州有城濠為戍兵家計則襄陽之藩籬固而國家上流之勢有泰山之安矣臣詢之羣議以為當然況泌河之運可以直抵唐州城下無飛挽調發之勞而可以積粟異時朝廷有進取之圖此道路之所從出也蓋不獨守而已少須和戰有定論别具奏禀所有兩軍人馬見不住增數教强弓弩手雖正旦亦令就教場拍試小人志於得利不以為勞互相激勸以希賞不待入教場自習事藝一有出入必能為陛下用也至如絶邉戍守之兵亦令兩都統分差統制官前去按教整治隊伍量加激犒以慰勉之矣伏乞睿照允文又論親臨唐鄧措置修城之役上奏曰臣奉聖㫖目今荆襄别無事宜可令虞允文趙撙王宣依舊回襄陽府仍措置兩軍官兵更畨休息臣恭依聖訓契勘荆鄂兩軍人馬統制將副等係分作兩畨休息第一畨自四月二十三日以後節次各歸夲寨亦已參照諸軍體例量支起發犒設外其唐州第二畨修城官兵亦已回襄陽依舊入教臣於五月初二日趙撙王宣於初六日各回襄陽去訖臣自去年秋初到襄陽詢訪邉防利害凡士大夫之知兵者皆言湖陽小邑無二三十家又無城壁非必守之地比鄂州軍開東北一靣壕亦無尋丈之廣意在緩急退保襄江可危可慮惟唐州之方城有大山林木可戰可守實古之楚塞俗亦謂之方關今郡無城池諸軍無家計可保又糧運盡仰民力嵗有不給之憂諸將每以此藉口臣他日從容問之諸將亦云形勢之地當在方城而果以艱食為辭臣既審知如此時敵兵臨邉日夜訓習將士以待戰用力未可議其後臣寮上言修築邉州城壁十月二十七日奉聖㫖令制置司措置臣以和戰未分施行未得而城唐之舉未嘗敢忘於今年正月初三日初九日兩具奏知大略只俟和戰有定論方興工役至三月十一日金字牌遞御前降到都督府黃榜乃敢遣趙撙親往唐州規畫計度工料至三月末間回議定分軍為兩畨乘四月內暑氣未盛時興築於一月內訖事蓋五月以後大暑大雨八月以後又迫防秋不可使戰士更就他役也當趙撙城唐之日雖據探報敵兵內徙逺去而出我不意乘我士卒疲勞倉卒之間薄我軍於城下不可不深慮故王宣以輕甲屯方城名修方城赭陽陂為屯田之用其實逺斥堠謹防托絶敵奔衝之患其他要害去處亦遣偏裨設伏所以固安城唐之軍心潜消意外之變故也臣既先奉御札令臣每事親臨又兩大將臨邉而臣獨居內郡必謂臣怯他日寇至有見輕之心又見陛下分命兩宣諭往淮東西措置臣何敢偷安懼極邉之危憚暑中一行也臣至唐州撙宣得探報敵帥聞官軍大將㑹於唐敵中奔走驚擾頗怨富森之械我使人而憂我師之襲之也引兵又退數舍而蕭定逺者遂以四千騎走汴衆謂敵之弱勢至於如此而臣竊自笑者能料其來攻不能料其遁去也大抵無事之時職思其憂不敢怠忽所以為有事之用如自以為無事因循度日則一旦事至雖窮晝夜之力有不及為者矣今唐鄧二城及樊城皆已畢工餘小小敵棚炮座之類當戍之兵旋旋為之而泌河之糧船相銜而上終嵗可以不役一夫逮至秋中或戰或守必為萬全之利如朝廷必欲棄此二州臣已具申乞别遣官矣況臣之羈蹇百病交攻食飲日減憔悴骨立不能盡其報國之志展尺寸之力於後日以備陛下使令之命也莊周曰知其不可奈何而安之若命臣已纍具奏仰干天聽乞賜罷免令蚤歸蜀以便醫藥餘年可保而晚節獲全敢忘陛下今日生全之造臣已力疾行次郢州伏望睿慈檢照前奏特賜施行允文又論唐鄧州必不可棄上奏曰臣至孤逺叨被二聖非常之知始終異等之眷日夜念所以報神明實臨之今者唐鄧二州名為空城其實繫上游之存亡甚重臣不敢言其形勢之扞蔽地里之廣袤户口之蕃庶與異時進復中原之涂轍獨有一事利害至切不敢不奏禀臣去秋抵漢上防托之兵雖薄所以不至於憂危謂必可寬北顧者敵在潁昌襄郟為家計去襄陽為逺使其引兵深入則糧道回逺必以人力車乘而運勢不容久留也若棄唐鄧而敵人以唐鄧為家計去襄陽為近聚兵積糧一旦進發可半日抵城下其糧道自唐州之泌河順流而下直抵漢江可以與官軍久相持而漢江之險我且與敵共之矣漢江在春冬之月可以踏淺徑度之處凡三十有二臣欲親行漢江比乘五月漲水其襄郢間坐舟尚有著淺不能行處郢州又在江之北見有積糧十餘萬碩敵若於此分兵駐守則官軍隔越於外真有德順往年之憂況京湖餉道遂絶秦蜀馬路不通又敵兵東可以入隨西可以窺荆南其勢橫潰我之兵力有不能支矣此皆兩路士夫軍民之所共憂而臣一一親歷其地知其事之果不可不慮也臣非不知陛下許臣棄此二郡則臣之責輕又非不知臣棄此二郡與時宰合可以保位而希進臣不此之為而區區然必進其自危之說者後日之憂繫宗廟社稷至大臣今於此事若尚畏避時宰緘默不言則臣負陛下而祖宗在天之靈必不祐臣矣臣前後論奏莫不委曲詳盡伏願陛下審思而徐行之臣見亦一靣遣官屬詣朝廷子細禀議次重念臣病已沈痼決不能支梧嘗於今春奏云或棄地請和臣即挂衣冠而去不敢先負陛下臣今敢墜此言哉扶力親書姑以見臣垂死不敢忘君之義惟陛下哀矜深察之允文又論固守唐鄧州方略上奏曰臣比准金字牌遞御前封降到三省樞密院劄子奉聖㫖令臣同趙撙王宣計議將來敵人侵犯唐鄧合作如何備禦條具聞奏臣契勘襄陽為吳楚上流襟喉之地而唐鄧二郡實襄漢之藩籬臣不敢引古為辭姑以近事證之當紹興議和之時割此二州以遺敵襄陽之疆封才數十里無一山一水一城一池之限至三十一年金人叛盟劉蕚之兵出唐鄧官軍無一戰之地一旦便自光化順流薄我軍於襄陽城下是時亮之意不在襄漢但分兵為犄角相持之勢㑹亮死蕚引兵去唐鄧之民開門以納官軍遂能復此二郡為上游之藩籬此天也敵入寇之路雖云不一如蔡之確山徑出比陽汝之鴉路徑出南陽嵩之船平商虢之峽口徑出內鄉然自潁昌以至襄郟今為敵之家計自襄郟至方城實敵入寇之大路昔唐州無城又無積糧趙撙不得已開湖陽之壕一以備敵騎衝突一以就倉底之糧倉底地名然湖陽無城可保壕又淺隘非與敵相持必守之地今趙撙修唐城既堅髙與鄧州之城表裏相為蔽援又泌河可以舟運直至唐城之下城中既有儲積官軍有糧可食有城可保家計固而諸軍之心亦固矣若敵自襄縣來窺我唐鄧不獨糧道回逺又以人力車乘而運則餽餉之給視我為艱若以少兵而至必不能進攻吾城官軍之守城者足以破之若以重兵而至則官軍之守城者可堅壁不戰以待援兵之至蓋湖陽大兵進可為唐城之援荆南之軍出新野南陽而與之合則敵腹背受敵曠日相持敵糧盡力屈引兵而却豈不為官軍追襲之利也或曰敵兵之來他路錯出不止於唐鄧而不思二城堅守我之官軍合勢持重而不戰勝負未分敵敢從他路徑至襄陽城下萬無此理也況他路險隘去處各分偏師以保之緩急又遣神徑弩手為之助而全吾大軍之力因地利以致敵敵至而不能與我速戰我之輕兵與忠義兵又抄絶其糧道敵豈能久留以與我必爭此二城使爭而得之不知其何以為必守之計也駐兵六七萬以上則無糧以自給若三二萬人官軍可談笑破之矣士大夫之憂但以或棄二郡敵得以為家計積兵積糧嬰城自固一旦竊發襄陽之城未必可保爾至二郡之糧以臣觀之自今以往必不煩諸將之憂試以去年春及今年春較之已有明效可釋羣心之疑臣嘗檢照案踏去年春調兵二萬人至唐州以應敵不過旬日間而起七郡之夫運糧諸軍紛紛猶曰乏食今春以二萬兵城唐積二十五萬工前後踰月諸軍飽食之餘尚有三萬餘碩見在蓋措置水運比陸運有間矣雖敵之來路未可前料而兵之機權亦難執一至於形勢所在有兵以禦敵有城以保兵又有糧以給兵之食皆足以為守唐鄧之根夲也趙撙王宣各具到守禦之策與臣之說大抵亦相類謹具進呈欲望睿慈采臣今來所奏更賜詳酌以方略授諸將俾得以悉力奉行不致誤事伏候睿㫖允文又論固守唐鄧兵勢糧運上奏曰臣伏蒙聖恩賜臣及趙撙王宣御劄一封聖謨閎逺聖訓坦明而聖恩不遺曲示始終之眷下拜感激顧犬馬一死誠不足以報也臣伏讀聖訓以臣所奏堅守唐鄧而諸路有可入寇處别未見條畫此獨於二郡而全勝之策未盡此臣愚暗淺識近慮有所不逮皇懼載心無以自容而先日三省樞密院指揮但問將來敵人侵犯唐鄧合作如何備禦故臣所對止於二郡為詳而不能廣引餘路併論之此臣之罪也臣自去年秋至漢上以諸將言兵力單薄臣與之共議悉收諸屯散漫之兵聚之襄陽以為家計坐觀敵入寇之路以應之已嘗具奏知矣至戍守唐鄧之兵但仍其舊以二將云敵來之正路也按舊籍唐州屯一千三百餘人方城屯二千餘人各以一統制或一統領主之而湖陽減宋受軍五千人於郢州就糧惟屯鄂州軍二千四十餘人而已緩急救應已有成規大抵如朝廷今所具守唐鄧之上䇿也但去年有可憂者唐州之運以人力車乘而無城可嬰敵騎一旦猝至所謂一統制三千之兵無以自固而湖陽及新野援兵恐不相及則那回潰散甚可慮爾去年湖陽之屯趙撙之兵不過二千而王宣之兵在鄧州者亦不過二千人未有一兵留戍新野者臣前奏云官軍之守唐城者可堅壁不戰以待援兵之至蓋湖陽大兵進可為唐城之援荆南之軍出新野南陽而與之合則敵腹背受敵是與趙撙之奏所謂於湖陽唐州一帶接連屯布軍馬緩急奔赴爭利與臣之奏亦無甚異也趙撙奏云敵自方城入寇則荆鄂兩軍固當㑹合則王宣分兵應之其路自當出新野南陽無疑則是撙宣之意大略亦相一也自去冬三人守唐鄧之䇿既已素定先日三人之奏又已互見自是無大假異同但臣等拙於文辭不能互逹其意以致上煩朝廷之疑此又臣之罪也至泌河之運河道隘而舟小所載不多又自三月至七月而止其方城唐州湖陽前所具長年守戍之兵與比陽之戍六百餘人亦合自唐州陸運應副嵗凡用糧一十一萬四千六百餘碩去年以前無城以積糧又月積人力以陸運故諸軍之食有足有不足將士每以此為憂臣今嵗措置泌河之運亦不過年計合用之數而緩急遞遣應援之兵便有糧可食徐計已食之數議補發而已不至倉卒調兩路數萬丁夫也糧既十一萬有畸而馬料又凡六萬六千五百餘碩泌河水力尚未敢必其盡如數安得有大蓄積以資寇也襄漢既逺事之條目至多紙上所陳得一遺二備後闕前若非朝廷疏列下問臣亦不自覺其言之不達其意而今奏又不得不與朝廷明辨也伏奉御批唐州勿輕棄陛下深居九重之中而明見萬里之外嗚呼盡之矣臣尚何辭少須趙撙王宣具到今次合報事宜一一别具奏知伏乞睿照允文又論荆鄂兩軍分戍唐州積糧免差夫運上奏曰臣伏准金字牌遞御前封到三省樞密院劄子奉聖㫖於四月初將出戍軍兵到軍日久住營最逺之人先次發回其餘令更畨休息日下措置聞奏仍預修兩軍寨屋等事聖恩溥博德意昭明軍士歡聲不約而㑹臣除已遵依施行外契勘唐州最為極邉又敵兵入寇之衝而城壁頽毁不惟諸軍戰守無以固其志而逐年糧運亦無隄防以至不免逐時調夫往來於湖陽陸運委是重困民力而軍糧不繼臣自今年三月泌河水生即措置舟運見今已起發二萬四千餘碩若折運不已至七八月間於將來防托進取之用既為便利又免人户長年差役比自御前降到黃榜臣即與趙撙商議因夲州子城舊基稍加開拓自今月二十九日為頭修築分萬人為兩畨每畨十日第一畨工畢即令有家纍人歸鄂州歇泊第二畨亦如此施行若城身畢工其餘乳口樓櫓泥飾之類就令當戍之兵徐徐下工庶幾諸軍不久於役不至困苦其荆南軍亦將有家纍人分畨休息其無家纍人見亦措置令修築樊城以為漢江之外襄陽藩蔽須家計固則於進取可免後憂也惟是殿前司兩軍見屯郢州臣已移文招統制官宋受王公述候到當靣議定别具奏知伏乞睿照孝宗時允文又論收復鞏州分兵守險上奏曰臣竊見鞏州以孤城諸軍攻打閲四箇月不下或慮因循敵生巧計節次與吳璘商量分那官軍共力必取已於六月二十一日七月一日兩具劄子以曲折事因奏知去訖今日得璘捷報實自陛下以聖德嗣位威靈遐暢諸將得以成功天下不勝慶幸今熙河路一帶人民可以安業商旅可以通行馬政可以復舊又抽那得官軍及弓箭手忠義人二萬餘人以分戍秦隴德順之險向西一靣吳璘以身當之可以堅守無疑獨南山駱谷諸關隘並各損壞戍守之兵各不過老弱十數人羣士夫之慮皆以為憂臣已與璘商量於利州東路人馬數中量留一千五百人今日已令傅忠信前去措置臣體訪得南山以北向化者甚衆就委傅忠信前去招收以壯軍勢以弭盜賊又興元重地不可略無人馬為諸軍聲援臣見委忠義統領官關寶結集義士搜揀伉健之人教習神臂弓以為戰守之備雖據吳璘探報敵中日添生兵必欲從朝廷乞一二萬人應援臣深慮襄漢江淮之兵萬一抽那不行臨時有誤指準却致失措故且隨事廣作隄備庶決保蜀境觀釁而進仰寬陛下顧憂允文又論襄陽一靣為必守之備上奏曰臣近者竊聞外廷之論謂盱眙探報率多安好襄陽探報率多急切咸以為疑臣尋繹其言質之兩處所報不為無據然纍日細思殆非二守臣有佞有直特敵於淮北京西為謀用力有不同爾據探報且以聚糧一事言之宿泗不過二三萬碩而唐鄧之積乃數十萬碩兵與器甲之數大抵相類則我之上流不可不過為之防也今王宣已致仕員琦初到凡襄陽一靣當議所以為必守之備者不一陛下既輟遣王炎付託得人中外交慶臣愚謂炎一到荆南便不可輕動如因其赴官令自鄂州取道襄郢凡邉防機要處親得與將帥守臣審議定以聞則後日成算淵衷前定可無北顧之憂而炎之此行將帥亦可少見陛下委付之意矣狂瞽之言不能自巳乞自聖裁允文又乞措置清河口防托敵中糧戰船上奏曰臣據陳敏申坐奉聖㫖令密切措置清河口防托戰守事臣有以仰見陛下得守江淮之襟要聖算無遺矣詳敏所申謂敵人舟船動以千百順流而下凡稍泊去處即是登岸之路我軍雖欲阻之形散勢分終莫可禦其說既當然以劉錡劉寶用十數萬之衆不能捍清河謂莫若益兵五萬人守楚州或城池芻粟未辦又謂莫若益兵二萬人守髙郵分兵屯喻口鹽城興化黃浦四處此其意在守髙郵而已所謂圖其易不圖其難不可不辨也敵纍年以來打造戰船教習水戰皆在山東拘收糧船多積芻粟亦在山東出山東而為兩淮之用者獨有清河口爾一出清河不獨順流而下皆是梢泊登岸去處如敏之說也使溯流而上沿楚泗濠州而至於安豐則淮西之兵亦可以足食海陵南寇其糧山積於盱眙濠州皆從清河出隆興癸未甲申之間江東路運米亦從淮河而上沿楚泗濠州至安豐夀春給淮西官軍今若不於用力少處措置却欲增兵五萬人而後守楚州增兵二萬人而後守髙郵為計亦左矣假令朝廷有兵可增如敏所請而敵之糧出清河者上而盱眙以給軍食則天長一帶敵兵可以持久又自盱眙上而至安豐則淮西之兵亦可以為久屯之計是增兵以守楚髙郵名為捍通泰維揚則可而非絶糧道使敵不得久之上䇿也趙李左車善知兵者也欲扼井陘之口以絶漢糧道使野無所掠鹵雖韓信不敢遽進兵臣愚謂左車之策今用之於清河口敵兵雖衆決不敢輕動動亦不敢深入可必也臣到鎮江見戚方說亦必欲守清河口畫到圖子欲於河口之南因甘羅城舊基築小堡藏車戰船以待用韓彥直欲沈船打撞必爭於敵人叛盟出船之初與戚方之說亦合又引周明韓貴見臣謂深知清河口地利者二人見責夲軍自效故願效死力也彥直以總計事當赴奏欲乞聖慈面賜宣問如有可采即乞速賜裁酌施行或専委彥直同戚方共力措置庶兩淮襟喉早得預備利害至切臣敢昧冒言之伏乞睿照允文又論德順守戰之利不可輕棄上奏曰臣自秦州同吳璘商量措置促王彥楊從儀合兵以圖鳯翔又德順四十里內並令清野及調發人馬以助軍勢已於九月二十日奏知去訖近據楊從儀申喀齊喀走入渭州及據探事使臣伏宏申敵於九月二十五六間再以游騎於剝馬嶺一帶抄略無所得至晚歸寨臣於三十日到河池伏見近降指揮令吳璘退守蜀口此固根夲而後進乃自古不易之至論也臣初與吳璘約只令分兵守德順之險身以重兵居秦亭為不可測之勢正謂如此已嘗兩具始末奏知然璘之往德順先留兵二萬人在蜀口以萬人在殺金平以萬人守大蟲嶺之天池天池在大散關之前與和尚原相對山形尤峻阻有水草之利又界於入蜀二大路之間可以腹背當敵璘云和尚原止可以扼一路以前措置有未盡者今年五月親行大蟲嶺始得之殆天賜也至如德順之險自今春用盡兵力然後得之勢須必爭理當固守若一旦棄去不獨失三路之地而三路之兵三路之糧盡資於敵蓋弓箭手二萬乃土著之人不肯徙家於近裏州縣而官軍所因之糧盡仰給於新邉自去嵗九月用兵出秦州未嘗自河池運一粒米出關以給軍食而諸州縣城寨日下所管見在尚三十餘萬碩而就糴之數不與焉所以七月間身往德順方擇地利捍防適與敵值不免須用兵力摧敵之鋒以爭北山東山堡之勝勢今濠塹深固敵多死傷德順可以必守但每恨兵力不足不能大破敵軍成大功爾璘與臣說如此臣博采輿論酌以愚見在今日之勢誠不可輕棄德順退守蜀口且璘自八月末與敵相持已近七十日三大戰之後敵不能有吾丈尺之地自璘回河池今又半月敵之智力又不能有所逞則是璘規摹措置可以固守已有明效必能上寬西顧之憂今士夫之論以謂一棄德順則敵復收三路兵糧而窺蜀口之路愈多矣自德順至仙人關下皆平慢土坡見盡耕種而路皆方軌敵兵可以長驅當甲寅之春敵至仙人關才住十二日而成都之民已奔逃山谷不能一日安居往事尚可鑒也數年以來吾所以有階成西和州恃南北之要約爾今兩界堠在秦州之皂郊平川中無一水一阜之可憑有目者皆可見也臣比者親行此數郡見士夫之論誠為不誣若朝廷必欲棄新復之地臣嘗具申乞别選官付以此事臣決不敢賣國為茍容之計念自陛下嗣位未嘗得一望清光遽蒙睿慈察臣孤忠不肯徇大臣意賜以庇覆生全之恩尚付以夔之方靣感極涕零愈當誓死以報方其解去不敢緘默為一身謀伏惟陛下聖明録臣萬里惓惓不勝大幸允文奏論秦隴軍馬錢糧不可棄新復之地上言曰臣竊嘗考諸葛亮用蜀之日每嵗出師皆以糧餉不繼不能大有所為遺恨百世者以不得秦隴之地也亮之兵一出散關而渭南千里無仰給之糧方且課軍民雜耕為持久計今春吳璘至大蟲嶺亦以艱食而退古今尚一轍也亮之兵一出祁山其所築營堡在今西和州之北平川中二十餘里既無險可恃又無糧可因而欲以木牛流馬之運取給於蜀之內郡其不能成功無足怪也今天下欲為恢復之圖臣以為從秦隴一帶而進蓋得兵得馬得糧盡古人之所不足者而兼之今吳璘議更戍為長久之計其守德順之規摹如守殺金平若繕修搜集於年嵗之間必可以大舉無疑陛下先日賜璘手札有云新復之地一有差軼則敵勢益張邉事未有寧日羣士夫一辭贊嘆以為大哉王言明見於萬里之外而出衆人智慮之表今咸願陛下守之以一密以手札諭璘凡德順蜀口之守俾璘得以自擇而責其成功則璘必能以身任陛下之責日夜圖所以報者臣福薄才短當逺使之初自知危殆陛辭太上皇帝之日奏云臣之此行謗書不止於三篋臣不意今日保全生成之恩乃遽出於陛下二聖合德自然同符臣子寸心如何可報用敢密布腹心少致其感天荷聖之誠而實非敢與論事者較是非也身在萬里不啻纍卵之危惟陛下憐其愚忠豈任幸甚允文奏陜西事宜狀曰臣自去年十二月二十七日以後三次據利州西路都統司及鳯州一帶屯戍主兵官發下所司緊要文狀稱敵人集於秦隴鳯翔之間積粟既多已一兩次打圍聲言以重兵犯西和州分兵從小路入寇皂郊𣙜場亦有禁閉客旅文榜兵將官多言敵有前件情狀舊以為舉事之候即具急奏上瀆聰聞因而張皇逺近震恐臣雖書生至愚至暗竊料敵兵必不輕動止緣去年泗上敵使坐索俘囚陛下神算所運敵已奪氣只如陜西之敵已紛擾數月金銀木牌相屬於道凡增兵積糧增築堡塞為自防之計蓋不得不如此其張為先聲亦欲吾境內自相紛擾爾況今已入春時敵之事力未充和好之利必不肯輕失決無可憂者又臣自到蜀如西和成鳯極邉闊逺平夷守臣之病廢者既采衆議易以良將次邉統制統領官之老或病者亦行銓量選有謀略驍勇之人代之又㸃揀之後入隊皆少壯之兵臣支撥令射小貼子錢分授都統司以激勵入教諸軍臣在利州又於小貼子內造一兩金錢分日令逐將弓弩手爭射初無射中者踰月之後諸軍人自精習近日逐將各有三四箭中金貼子者小人嗜利不待督責笞捶皆有必爭敢戰之意而兵氣作矣又忠義歸正人以數萬計纍年在疑忌弃置中懷不自安豈免怨望若盡行收拾則事力有未能遽辦但擇有材武知名敵中置臣左右為帳前提舉一行事務之類士大夫以其反側難保多為臣危之不知臣示以不疑而反側者自定也況憔悴憂危之人方惴惴度日臣一旦信而用之有請給以養其家有厚賞以固其志亦必肯為臣出死力矣敵如不動誠為敵之福使天奪其魄敢為禍首則以正兵當其前與之相持從間道分遣忠義首領潜入敵地各連其黨潰敵腹心當有必勝之機可乘而用反側之效可見也臣今約諸將靜以待之萬一敵用狂謀出於不測一犯吾境臣即日引道身臨邉衝糾率三軍願以一死少答陛下天地莫報之施臣已擺布馬遞傳送探報約成鳯西和至利州不過兩日夜可至決不致少失機㑹臣既籌今日之敵止是虛聲尚慮諸軍探報或有達天聽者急具此奏乞陛下特寬西顧之憂天日至明察臣肝膽不勝臣子之幸允文論敵政衰亡宜益自治上奏曰臣先日伏蒙聖恩特遣中使以姚憲等奏劄宣示令臣留看今日降出敵庭報書其辭意繆悠神人共憤凡曰臣子義當如何臣之至愚獨願陛下外示優容內益自治而已無令機㑹卒至而我有未備不足之歎則事可以萬全臣嘗詢之有識之士謂今敵政衰矣敵之亡證具矣而惟我之所謂未備不足者非兵與財也古之議師一起附我者皆兵應我用者皆財也然非大有為之君堅誠念隆德夲上順天意下固人心則無以為恢復之體又非定規摹一議論嚴兵律立主威則無以為恢復之用惟體用備而大統可集也老臣病悴暗昏豈能知當世務姑因識者之言效其卷卷之忠而已惟陛下方經營之始未順動之前日新而不倦焉天下幸甚允文又奏曰臣於今月初五日奏敵帥留胡昉等敵騎數入我境內嘗妄論其必不敢深入今寇退果七八日矣據諸處探報雖云增兵運糧於襄郟間比來寖多其不能深入終恐不出臣所料也臣自去年秋到襄陽守邉之規摹既定惟鎮之以靜諸軍各安其屯飽食安眠以習熟事藝為樂敵兵數犯境撾鼓發喊至于三四亦未嘗輕為之動視去年春調發蓋免四萬餘兵奔走出入而兩路減餽運之夫亦以三萬餘計臣區區之意謂敵情既得則當以靜困之彼動而我不為之增兵彼去而我不為之撤備外示以不可測之勢內得以安全吾兵民之力使之常有餘以待一旦之用庶幾兵氣振而民心不怨不離自古萬全之舉有在於此也今仰憑陛下道德安强之威春事已畢防秋將戒嚴而臣之所自憂者衰病日加聰明日塞負聖恩而妨賢路速大譴於盛明之時夙夜危懼有不能自已者伏乞睿照知建康府洪遵論采石水軍劄子曰臣聞易曰王公設險以守其國聖人筆之以為天下後世戒其可忽諸臣竊惟南方以水為險所恃以立國者長江爾中興以來以兩淮為藩籬以長江為門户我之所必防而敵之所必窺者曰京口曰采石曰九江曰鄂渚就數處中惟采石為要且重何則湍流雖猛而江靣實狹所以北方每每覬覦而僥幸也跡之前事隋韓擒虎以五百人宵濟縛其醉卒而陳弗之覺五季時樊若水引繩絶江請造浮梁以濟師我太祖皇帝用其䇿而下池陽金人入寇也而采石受敵最力幾為不可藥之憂臣待罪當塗屢至江上目閲而心計之竊謂守長江之策全藉可信之人與禦敵之器爾天祐我宋而吳蜀為一無王濬樓船之虞萬一北人習熟水戰是長江之險與我共之得不為之寒心哉今采石所屯其人其器未為盡善公占破而私役使以為當然夫不専其任又烏能責其所習哉舳艫尾銜鱗次江滸徒為觀美而已異時差官閲視不過朱艧其外耳甚者釘斷板缺輪軸剜敝舉而置之抵觸決驟之地是能保其必勝哉臣愚欲望聖慈特降睿㫖遴選稗校之良者専一董統其衆時張水嬉自為一軍無令他屬間遣信臣按試重加賞罰而殿最之器用精而徒卒専使奮躍淬礪常若寇至誠為今日先務王之望論兩淮鎮戍要害上奏曰臣伏準三省樞密院劄子備錢端禮奏內稱昨來敵人纍次侵犯皆自西路入寇蓋濠夀之地徑捷而糧船多自清河以入滁今西路部分要害已得其宜若嚴切固守無致侵犯東路滁州一帶最為上策設若透漏奔衝則郭振全軍與西路軍馬夾擊甚為利便及今劉寶郭振互相照應臨機制勝遇有兩路連接事機星火關報協力一心無致差誤奉聖㫖劄與淮西宣諭司臣觀錢端禮所陳甚合事宜契勘兩淮屏蔽大江利害一體尤不可以東西分朝廷既差兩宣諭遂有界限勢使然也且如以前宣撫都督通管兩路則如何分得東西淮南形勢淮水殊不足恃而大江狹處最是采石敵人每來由巢縣和州一帶徑至江上最為要害其次方到六合揚州蓋江道闊而路稍背也今西路措置修石湖亭昭關等處關隘使敵不得至采石則是兩淮最要害處西路已獨當之矣其餘光黃桐城等處孔道甚多皆須隄備六合雖𨽻淮東而地鄰西路臣所以欲兩路相關措置設有緩急自合兩路相應此事臣與錢端禮所言一同乃今日措置兩淮之上策也若要固守濠夀等州使敵不犯滁州一帶則必無是理臣前奏廬夀光州決不可守濠州若敵大入亦須保橫澗山而兩路中間接近去處即合相關措置蓋緩急分東西不得敵奔衝東路六合必須西路夾擊若欲固守濠夀使不犯東路滁州則西路亦豈能獨任其責滁州不可守也滁州之不可守而守六合則夀濠之地其可責西路之保守使敵不透漏乎今東路劉寶一軍把遏水道外殿前一軍人數甚衆將來屯在揚州郭振軍在六合所以備此一帶平闊然不過一二百里之間而西路疆界闊逺邉靣千里地平如掌又無城池之固若不據險不知用幾人雖有大衆終不足以當敵人之騎兵見今張守忠一軍屯巢縣與時俊保石湖嶺王彥屯和州保曠口昭關戚方屯桐城保北峽諸關敵兵不犯去處方可抽那應援假令敵人分兵一犯西路昭關一犯東路六合則各處僅能自保而已此所以備禦之不可不嚴也故臣曰西路當據諸山之險以控其兵鋒東路當扼清河之口以斷其糧道淮西若不扼諸山之險而守濠夀以蔽障滁州此乃劉錡王權輩前車之覆轍也若西路敗於濠夀之間則將何兵馬與東路夾擊於六合乎西路既敗非徒無可以應援東路而東路六合揚州之衆亦恐不復能枝梧矣若吾據關守險非徒可以自保其處敵知吾有備亦未必便敢深入使其送死則吾以逸待勞以飽待飢正墮吾計中可以得志故臣以謂今日措置兩淮之上策無以加此臣與錢端禮所論大抵相同只恐淮東指準淮西固守濠夀欲其不犯滁州將來却成相誤臣愚欲望聖慈預戒兩路諸帥遇有侵犯兩路相近要害去處互相策應不得坐觀成敗臨時朝廷更嚴賜指揮蓋此非兩宣諭之力所能獨辦也仍乞降臣此劄行下照㑹庶幾不致疑誤之望又上言曰臣今月初五日戍時準御前金字牌降到三省樞密院關臣僚劄子奏伏見敵人侵軼淮甸其意止欲復得四郡而已緣在我者首尾應接不得要領遂至無所忌憚目今淮甸所屯王師無慮二十餘萬不為不多矣但星分棊布不相襟帶相望有在數百里外者所以人人但覺彼衆我寡既不敢奮然獨進又不能批亢搗虛日引月長徒為身謀竟不能成尺寸之功致敵騎益無畏懼徐徐南嚮而不已者正以此耳臣愚欲望朝廷特於將帥之任不間踈逺采聽衆議精加審擇而易置之且留戚方於桐城時俊於巢縣以備敵人分兵乘虛之衝其餘兵帥盡行㑹合以臨敵人重兵之所更遣辨說之士持捭闔之說直造其師以搖其腹心儻為此舉將不待交鋒彼必稽顙辨說既行彼必少懈出竒掩襲彼必奔潰縱之擒之此萬舉萬全之策候敕㫖閏十一月二日三省樞密院同奉聖㫖臣僚所論委見今日利病可令楊存中王某疾速從長措置施行臣契勘自敵人入寇奪城殺將無不如志我惟謹守而略未有以侵害之故少即三二十人多即數百人公肆出沒無所忌憚使我不知所備坐以自困非持久之道也臣愚欲下諸大帥各於所部選擇材武膽勇有方略統制統領將官一二十貟不得以人情冒濫每人各與錢一二萬或數千緡不以是何部曲募驍鋭少壯兵校一二千人或數百人出竒擇利分頭迭出翦其游軍晝攻夜劫擾其營寨可進即進不責其必往如此則敵備者多小隊不復敢出無虜掠之利失樵蘇之便其勢必窘不容久留當有可乘之隙若遇大敵則以為軍鋒有功者優其賞擢不過費三五十萬緡而軍聲大振矣鼓作士氣變怯為勇無以加此如䝉聖慈以為可采乞速降指揮施行仍乞撥樁錢一百萬貫以専充此用要使諸軍知不徒為文具庶幾人有奮心趙汝愚論邉防上奏曰臣仰惟陛下以英睿不世出之資慨然有恢復中原之志朝謀夕計留意邉防宗社幸甚然臣竊觀今日規模大槩蓋是循用渡江一時權宜之制而實非祖宗纍聖固守之法惟守備既非素定則勝負決於臨時臣實憂之而願獻其狂愚之說臣伏觀自古用兵正如奕者之奕其法不過以多算勝少算而已祖宗西北邉靣凡所用之人所守之地所養之兵纍聖講畫成法具備自近及逺節節皆有次第如極邉要害去處則有堡寨其次有城守堡寨則有巡檢有寨主城守則有守將三路有大帥如韓琦范仲淹輩皆極天下之選其所辟寮佐如田況孫沔尹洙張方平輩亦無非一時名士故士大夫皆習知邉鄙間事其後往往盡為時用其兵健則有夲城禁軍廂軍有堡寨土兵有蕃漢部落有義勇弓箭手自足以為鎮守之備甚不得已則時出禁旅以助之蓋未嘗以舉國之師而决於一戰也故百餘年內外無事中間如李元昊父子傑黠凶狡其志非不欲窺伺中國雖屢戰屢勝而卒不能得吾尺寸之地者邉備素嚴故也今自西徂東邉防數千里所在空虛朝廷所置帥守所養兵士秪與內郡無異姑先以兩淮論之緩急之際所恃以為禦敵之計者不過以建康之師守淮西鎮江之師守淮東而已此正臣前所謂渡江權宜之計而非祖宗固守之法者也方太上渡江時長淮赤地千里蓋無藩籬之衛當時所恃以禦敵者張韓劉嶽數大將而已故一時權宜之計不容不出於此今國家中興六十年南北之勢既分沿淮之地皆為極塞敵人猶且墾闢田土暗增戍卒以為我備然則朝廷安可不講明舊制而為固守之計耶且建康鎮江之師家屬皆在江南若不深察其情而驅之於並邉之地前有彊敵後無繼援勝負之命如爭一擲臣恐矢未及發而已有保固妻子之心矣辛巳之役王權以數萬衆在合淝不戰而渡江甲申之役劉寶亦以數萬衆在楚州不戰而退保此蓋前日之明驗也陛下視今日諸將孰能用衆如王權劉寶者乎不以此時預為規畫誠恐長淮千里非復國家所有而唇亡齒寒將不可以為國矣此臣所以日夜私憂過計不能自已者也伏願陛下講明祖宗纍聖之法於邉防要地崇建帥府增置土兵漸葺諸城遴選守將假以嵗月使之優游暇裕積榖訓師隂為備禦之計而勿使敵人知之一旦有事則使守將與土兵當其前而主帥與大軍繼其後俾敵人望吾之境愈進而愈難則陛下以守則固以戰則克進可以復祖宗之境土退可以保大宋之基業矣汝愚乞嚴戒沿邉官吏禁戢邉民生事疏曰臣近據金州都統司及金州上津縣申自正月初四日以後有京西路鄖鄉縣及利州路土津縣沿邉人户將帶老小驚移不知其意續據探報有州界人馬深入鄖鄉縣界約十餘里驅掠稅户解成張四龐博張博等家口前去未知的實或傳是京西路邉民爭理地界或傳是均房州有人入州界行劫是致州界遣人搜捕臣各據逐處申到事狀備録申樞密院訖臣契勘得所爭地界係屬京西路不𨽻州界外惟是盜賊一事深繫利害輒有管見合具奏陳臣伏見從前州界如理索歸正人等州縣自合只循舊例迤邐回報外至於本界無賴之人擅入州界為盜作過生事即與前項歸正人等事體不同或遇州界移文其間若有贓證明白者州縣自合酌量事體輕重物色追究依法行遣庶幾邉頭無賴之人各知畏懼不敢越界生事州界之人若聞得夲朝曽為如此行遣亦自心服臣訪聞得沿邉官吏多務蔽藏雖明知有纍經作過之人亦不敢舉覺窮治或者吏人受賂肆為囊槖無所忌憚又有不識事體之人互爭勝負務相報復以彊取勝却致州界之人或以巡綽為名或以搜捕為說擅入夲界驅掠人口而州縣官吏隱諱不言上司既不問知其人無由理索竊恐馴致釁隙事關邉境不可不防本司昨纍承州界移文根究盜賊事或將作過徒伴押回本界臣即時酌量輕重密諭本處官吏盡情追究依法行遣如或因採樵誤入州界或被北界人自因讎隙驅虜前去夲非為盜者候見得著實情節即已備牒州界官司照㑹去訖如蒙聖明見得夲司前項行遣别無違礙伏乞特降指揮嚴戒沿邉官吏禁戢邉民不得越界生事如有違犯約束之人仰州縣官常行覺察如法根治重作行遣臣聞鷙鳥將擊必匿其形況夫邉境之間尤宜務存大體臣近據邉報北界僞主已殂其孫嗣立從此事體恐有更張臣愚伏願陛下逺法文王遵養時晦近同勾踐嘗膽㑹稽厚禮卑辭不憚屈已使彼君臣偃然肆志不復以我為懼然後徐觀其變起而圖之是陛下能屈於一時而獲伸於萬世也惟陛下留神幸甚中書舍人張孝祥論衛卒戍荆州劄子上奏曰臣仰惟陛下軫念上遊既以荆州付之劉錡而又倚信聽從無一不至伏觀比來詔㫖為錡而下數踰二十如嚴制節備官屬頒緡錢增鎧仗之類是已顧中外之論猶謂錡之所急實在兵少欲出衛卒往戍錡所夫自吳至荆州山川阻逺調發數千與其孥俱則是數萬不惟經行煩擾亦非所以外示安靖也臣愚竊欲效計以謂取之於逺不若取之於近所謂夔路是也今諸路將兵往往有名無實臣嘗詢之惟蜀為盛成都萬人潼川六千夔路四千夔之去荆道路無幾若以夔兵二千益荆州轉潼川之卒以補夔闕而下成都之甲如夔之數戍潼川或嵗時踐更或一定不易如是則內無遷徙之為勞外無疑間之可開周旋几席之上而形勝之强成矣議者必曰夔當蜀後夔守虛則蜀以危臣謂不然自荆入蜀取道峽中地勢險絶人必魚貫而進荆在平衍之地據吳蜀之衝使荆果强則孰敢踰荆而窺蜀是夔雖有兵實置于無用之地徙之於荆則上可經蜀下控沔鄂蜀既無慮而上遊亦固一動兩得有利無害伏惟陛下留神財幸辛棄疾論阻江為險須藉兩淮上疏曰臣竊惟自中興以來駐蹕臨安阻江為險然江之為險須藉兩淮自古南北分離之際蓋未有無淮而能保江者然則兩淮形勢在今日豈不重哉臣仰惟陛下垂意邉防規恢逺略沈幾先物慮無遺策然臣偶有管見慮之甚熟誠恐有補萬一唯陛下寬聽蓋兩淮綿地千里勢如張弓若敵騎南來東趨揚楚西走和廬茍吾兵無以斷隔其中則彼東西往來其路徑直如走弦上蕩然無慮若吾兵斷隔其中則彼淮東之兵不能救淮西而淮西之兵亦不能應淮東設使勢窮力蹙之際復由淮北而來則走弓之背其路迂逺懸隔千里勢不相及入吾重地兵分為二其敗可立而待古之為兵者謂其勢如常山之蛇擊其首則尾應擊其尾則首應擊其身則首尾俱應然後其兵立於不敗之地今以兩淮地形言之則淮東為首而淮西為尾淮之中則其身也斷其身則首尾不能救明矣三國之時吳人以瓦梁堰為身築壘而守之而魏終不能勝吳者吳保其身而魏徒能擊淮西之地也五代之時南唐慮周師之來蓋嘗求吳人故迹而守之功未成而周兵至然猶遣皇甫暉姚鳯以精兵十五萬扼定逺縣負清流關而守世宗亦以藝祖皇帝神武之兵當之敵騎之來也常先以精騎由濠梁破滁州然後淮東之兵方敢入寇其去也唯滁之兵為最後由此觀之自古及今南兵之守淮北兵之攻淮未嘗不先以精兵斷其中也況今敵人之勢一犯吾境其所以忌我者非戰也忌吾有兵以出其後耳一出其後則淮北之民必亂而淮北之城亦可乘間而取如向之海泗唐鄧是也今陛下城楚城揚於東城廬城和於西金湯屹然所以為守者具矣然臣以謂兩淮之中猶未有積甲儲粟形格勢禁可以截然分斷敵人首尾之處以臣愚見當取淮之地而三分之建為三大鎮擇沈鷙有謀文武兼具之人假以嵗月寬其繩墨以守之而居中者得節制東西二鎮緩急之際敵攻淮東中鎮救之而西鎮出兵淮北臨陳蔡以撓之敵攻淮西中鎮救之而東鎮出兵淮北臨海泗以撓之敵攻中鎮則建康悉兵以救之而東西鎮俱出兵淮北以撓之東西鎮俱受兵則彼兵分力寡中鎮悉兵淮北臨宿亳以撓之此蘇秦教六國之所以為守而秦人聞之所以不敢出兵於函谷關也比之紛紛紜紜自戰其地者利害不侔矣如臣言可採乞下兩府大臣并知兵將帥詳議建立三鎮去處措置施行棄疾又上疏曰臣聞事不前定不可以應猝兵不預謀不可以制勝臣謂兩淮裂為三鎮形格勢禁足以待敵矣然守城必以兵養兵必以民使萬人為兵立於城上閉門拒守財用之所資給衣食之所辦具其下非有萬家不能供也往時敵人南寇兩淮之民常望風奔走流離道路無所歸宿饑寒困苦不兵而死者十之四五臣以謂兩淮民雖稀少分則不足聚則有餘若使每州為城每城為守則民分勢寡力有不給茍斂而聚之於三鎮則其民將不勝其多矣竊計兩淮户口不減二十萬聚之使來法當半至猶不減十萬以十萬户之民供十萬之兵全力以守三鎮敵雖善攻自非掃境而來烏能以嵗月拔三鎮哉況三鎮之勢左提右挈橫連縱出且戰且守以制其後臣以謂雖有烏珠之智傾國之力亦將無如之何況其下者乎故臣願陛下分淮南為三鎮預分郡縣户口以𨽻之無事之時使各居其土營治生業無異平日緩急之際令三鎮之將各檄所部州縣管拘夲土民兵户口赴夲鎮保守老弱妻子牛畜資糧聚之城內其丁壯則授以器甲令於夲鎮附近險要去處分據寨柵與敵騎互相出沒彼進吾退彼退吾進不與之戰務在奪其心而耗其氣而大兵堂堂整整全力以伺其後有餘則戰不足則守敵雖勁亦不能為吾患矣且使兩淮之民倉卒之際不致流離奔竄徒轉徙溝壑就斃而已也棄疾又論荆襄上流為東南重地上疏曰臣竊觀自古南北之分北兵南下由兩淮而絶江不敗則死由上流而下江其事必成故荆襄上流為東南重地必然之勢也雖然荆襄合而為一則上流重荆襄分而為二則上流輕上流輕重南北之所以為成敗也六朝之時資實居揚州兵甲居上流由襄陽以南江州以西水陸交錯壤地千里屬之荆州皆上流也故形勢不分而兵力全不事鄰敵而國勢安其後荆襄分而梁以亡是不可不知也今日上流之備亦甚固矣臣獨以為緩急之際猶泛泛然未有任陛下之責者臣試言之假設敵以萬騎由襄陽南下衝突上流吾軍倉卒不支陛下將責之誰耶責襄陽軍師則曰敵以萬騎衝突臣以步兵七千當之襄陽戍兵入隊可戰之人猶未滿此數大軍在鄂聲援不及臣欲力戰衆寡不敵是非臣之罪也責鄂諸軍則曰臣朝聞警夕就道卷甲而趨之日且百里未至而襄陽不支矣是非臣之罪也責襄陽守臣則曰臣守臣也知守城而已軍則有帥戰而不支敵騎衝突是非臣之罪也責荆南守臣則曰荆與襄兩路道里相去甚逺襄陽之不支敵騎衝突是非臣之罪也彼人人者以是辭來朝廷固無辭以罪之也然則上流之重果誰任其責乎陛下胡不自江以北取襄陽諸郡合荆南為一路置一大帥以居之使壤地相接形勢不分首尾相應専任荆襄之責自江以南取辰沅靖澧常德合鄂州為一路置一大帥以居之使上屬江陵下連江州樓艦相望東西聮亘可前可後専任鄂渚之責屬任既專守備自固緩急之際彼且無辭以逃責如此上流之勢固不重哉外不失兩路之名內可以為上流之重陛下何憚而不為雖然臣聞之天下之勢有離合合必離離必合一離一合豈亦天地消息之運乎周之離也周不能合秦為驅除漢為合之漢之離也漢不能合魏為驅除晋故合之晉之離也晉不能合隋為驅除唐故合之唐之離也唐不能合五季驅除吾宋合之然則已離者不必合豈非盛衰相乘萬物必然之理乎厥今敵人物夥地大德不足力有餘過盛必衰一失其御必將豪傑並起四分五裂然後有英雄者出鞭笞天下號令海內為之驅除當此之時豈非天下方離方合之際乎以古準今盛衰相乘物理變化聖人處之豈非栗栗危懼不敢自暇之時乎故臣敢以私憂過計之切願陛下安居慮危任賢使能修車馬備器械使國家屹然有金湯萬里之固天下幸甚社稷幸甚王十朋代人上疏曰臣聞居家者必謹藩籬置皂𨽻以為寇盜之防建國者必保山海之險選嶽牧之臣以禦外敵憑陵之患今朝廷以江淮為蔽障以守帥為長城江淮守臣比他處為尤重宜於文武臣中擇其材勇智略可為爪牙者付之陛下親加敦遣勉以忠義資之以糧假之以兵俾其守死勿去則我有所恃而不恐敵有所憚而不敢窺茍非其人則必為敵所輕誤事非少除授之際尤不可不謹又川蜀之地去朝廷最逺尤為敵所窺伺緩急之際勢必不能相應在兵法有攻東南備西北者敵情難測深恐虛聲在此而屬意在彼臣以為宜增重四川帥臣之權俾其便宜從事遇臨機應敵之際不必請而後行仍選大將屯重兵于外以為急難之援如是則陛下可以寬西顧之憂矣敷文閣待制四川制置使范成大奏論文州邉事劄子曰臣伏見四蜀沿邉蠻夷自政和以前雖時有侵犯邉境當時朝廷鮮曽容貸旋即舉兵問罪固未必皆有大功然夷人終是畏憚不敢無時輕發比年以來如成都府路嘉黎雅三州等處屢有邉事時議以外備大敵姑務含忍又以方市戰馬不欲阻絶夷人狃習謂中國終不能報復來則有虜掠之利退則無追躡之憂甚者反得犒賞財物過於未叛之時是以泰然無所顧忌蜀之諸邉蓋未嘗得數嵗無事邇者利州西路文州界內有蕃部侵犯寨堡殺掠人兵訪聞常年如此官司每是隱忍蔽覆終於和斷而已契勘今來作過蕃部據邉吏張皇關申其衆亦不過三四百人初無雄傑酋長為之謀又無堅甲利兵為之用國家屯戍大軍密邇其處蕞爾小蕃乃敢跳踉如此者政以習見近事故也若不惜暫勞小費併力討蕩期於不貸則豈獨文州蕃戎讋懼其他種落自此懲創知中國不可輕犯此西陲數十年安靜之長算也臣已榜下文州止告諭非作過蕃部且許自通貿易以解散其締結又聞蕃寇之來稍不得利即依林箐以自固官軍深入易落姦便臣亦已行下乘風焚山嚴兵清野徐用鄉道搗其巢穴惟是議者或以為文州係買馬地分恐不即和斷或至阻隔臣再三詢究茶馬司所買馬數文州不當十之一二又其品凡下非宕昌比兼今來作過主首止是一族雖加攻討自不妨餘族互市政使緣此而所買馬數少減於常年權邉防利害之重輕亦恐自有先後緩急之序或又謂朝廷方以備北敵為急此等癬疥合且姑息臣竊謂不然大敵未平尤當先除腹心之患諸葛亮豈一日忘中原哉然五月渡瀘深入不毛以定南中者蓋出此也不然方今關外寧肅而蠻夷敢擾動如此使岐雍有警則此等窺伺侵寇將何所不至臣暫此攝事實有不敢以茍紓嵗月為心而妄為西土畫息肩之策若萬分有一偶合睿指欲乞出自聖斷更賜行下興州都統制吳挺廣設方略討蕩施行其措置催督之類臣雖庸虛不敢不任其責所有文州數百匹之馬或不及嵗額亦乞暫置度外俟邉防安靜不患馬額之不復臣區區狂率干犯天威伏地戰越陸游上奏曰臣聞天下有無窮之變而有必然之理惟默觀隂察能得其理則事變之來雖千態萬狀可以坐制而無虞矣天下之變最幽眇倉卒不可測知者莫如雷霆鬼物然雷霆冬伏而春作鬼物晝隱而夜見則其理之必然有不待智者而知之矣今朝廷內無權家世臣外無强藩悍將所慮之變惟一金人蓋在彼也譎詐反覆雖其族類有不能測而臣竊以謂是亦有可必知者夫何故寬猛之相繼如寒暑晝夜之必相代也故自金人起釁以來靖康建炎之間兵連禍結則有紹興之和通和既久則有辛巳之寇寇而敗亡則又有隆興之和今邉陲晏然枹鼓不作逾二十年與紹興通和之嵗月略相若矣不知此敵終守和約至數十百年而終不變耶將如晝夜寒暑必相代也且敵之為國也以分則不肅以恩則不親惟制之以力劫之以威則粗能少定今力憊勢削有亂而已其亂不起於骨肉相殘則起於權臣専命又不然則姦雄襲而取之耳三者有一焉反敵酋之政以恱其國人且何為哉雖陛下聰明英睿自有所處然臣竊觀士大夫之私論則往往幸敵之懦以為安不知通和已二十餘年如嵗且秋矣而謂衣裘為不必備豈不殆哉大抵邉境之備方無事時觀之事事常若有餘一旦有變乃知不足伏望陛下與腹心之臣力圖大計宵旰弗怠繕修兵備搜拔人才明號令信賞罰常如羽書狎至兵鋒已交之日使敵果有變大則掃清燕代復列聖之讎次則平定河洛慰父老之望豈可復如辛巳倉卒之際斂兵保江􅏮然更以宗社為憂耶臣世食君祿且䝉陛下省録姓名已二十餘年念無以報天地父母之大恩故其陳於陛下者惟懼不盡而不知狂愚之為大罪也乾道中猺蠻為亂吏匿不以聞儒林郎李大性上言比年猺蠻為亂邉吏慮妨賞格往往匿不以聞遂致猖獗使一方民命寄於猺人之手誠可哀憫近如梁牟等寇沅州劫墟市殺戮齊民州縣告急於兩月之後比調官軍討捕俘降其賊而人之被害已酷矣宜戒州縣或遇猺人竊發畫時以聞違者論罪仍命監司帥臣常加覺察庶幾先事備禦俾猺人亦知畏懼不致侵軼以傷吾民也七年前知辰州章才邵上言辰之諸蠻與羈縻保靜南謂永順三州接壤其蠻酋嵗貢溪布利於回賜頗覺馴伏盧溪諸蠻以靖康多故縣無守禦犵狑乘隙焚劫後徙縣治於沅陵縣之江口蠻酋田仕羅龔志能等遂雄據其地沅陵之浦口地平衍膏腴多水田頃為猺蠻侵掠民皆轉徙而田野荒穢㑹守倅無逺慮乃以其田給靖州犵狑楊姓者俾佃作而課其租所獲甚微楊氏専其地將二十年其地當沅靖二州水陸之衝一有蠻隙則為害不細臣謂宜預為之備靖康前辰州每嵗䝉朝廷賜錢七萬貫細絹布共八千一百匹綿一萬七千兩是時夲州廂禁軍一千四百餘人沿邉一十六寨土兵六百餘人皆可贍給其後中外多故今嵗賜止得一萬二千緡而夲州財復匱乏無以充召募之費禁軍止二百一十餘人諸寨土兵止一百五人甚至寨官有全無一兵而徒存虛名者其於邉防豈可不為深慮若嵗增給民錢一萬俾夲州募强壯禁軍或效用二百人分屯盧溪等處以防諸蠻庶使邉患永消可免異時調遣之費書奏詔湖北帥臣詳議以聞八年知貴州陳義上疏言臣前知靖州時居蠻夷腹心民不服役田不輸賦其地似若可棄然為重湖二廣保障實南服之要區也或控制失宜或金榖不繼或兵甲少振蠻獠則乘時竊發勤勞王師朝廷當重守臣之選崇寧初戍兵三千人建炎以來每於都統司或帥司摘兵二百人以備屯戍其凶悍者以州郡不能制遂慢守臣反通猺蠻以撓編民州郡非白主帥不敢治比得報已晚矣故戍兵敢肆其惡一旦有警復安能為用臣以為宜聽守臣節制便帝嘉其言十年四月全州上言夲州密邇溪峒邉民夲非姦惡其始朝廷禁法非不嚴密監司州郡非不奉行特以平居失於防間故馴致其亂又兼溪谷山徑非止一途如靜江興安之大通虛武岡軍之新寧盆溪及八十里山永州之東安皆可以徑達溪峒其地綿亘郡邑非一州得専約束故游民惡少之棄夲者商旅之避征稅者盜賊之亡命者往往由之以入萃為淵藪交相鼓扇深為邉患如武岡楊再興桂陽陳峒相繼為亂實原于此為今計者宜徙間地巡檢兵及分遣士卒屯諸溪谷山徑間俾湖南北廣西帥憲總其役庶幾事權有歸號令可行也李椿奏邉備利害狀曰臣竊見朝士大夫每嵗敵使欲來未至之際則皆憂其變故及至敵使既還則以謂一嵗無事便作安享逸樂國家久逺之計不復關心直待明年秋冬之交方知憂慮日復一日嵗復一嵗更無一定之論天下之勢益就委靡不振臣實痛之且如淮甸守備之計臣嘗具奏乞堅守之地四處臣今至江上詢訪利害無過于前奏者敵或渝盟四處固守決不敢至江上雖至江上亦不敢住蓋兵行以糧草為重敵騎雖多而知巢湖東關等處據險糧草必不敢行兵馬闕食不待戰而必走無疑矣李陵之言曰步馬之勢固自懸絶今諸軍馬少全仰步兵敵則盡馬勢固不同加以衆寡不等平原淺草勝負難量若圖全勝之計惟守而已守備已堅自生勇志見利然後可以圖戰若輕用僥幸萬一之勝是棄其兵也如葉義問之用劉汜是也足以為戒矣且吾之所長以水為固必在于舟楫兵乘船艦利則登岸否則據水無令敵人有船則是萬全之計此守四處之大槩敵所恃者衆與騎耳我若必以騎圖勝萬無是理當思有以制其騎斯可矣臣嘗見諸所以禦敵騎者多用拒馬二人共舉其一手不能别執兵器所以拒敵比車之為用不相侔矣臣又見兵官陳敏造車數樣皆不適用韓世忠造蝦䲈車以衝郭振止用商旅羊頭車許贇造車亦相類而稍華歸正人徐清三等車樣向來必曽進呈而宋武用車四千乘以布為幕下山東滅慕容超又用大槌發短矛于車上以數千人破元魏數萬騎于河北馬隆用偏箱車以數千人救西州虜不能近以是言之車之為用可以禦馬明矣臣謂宜委曉事兵將官討論戰車之製試閲以為制馬之具則軍勢必振然則車戰之圖尚俟守備堅固之後堅固之圖必用我之所長水戰為上水戰利害臣謹别具劄子奏陳臣願陛下于閒暇之時責宰執大臣與侍從之官朝夕講究圖治之道上下一心共執定論措宗社于磐石不致事至而憂天下幸甚歷代名臣奏議卷三百三十六
