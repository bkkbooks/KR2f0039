body:
  text: 歴代名臣奏議卷三百八明楊士竒等撰灾祥宋光宗紹熙二年春雷電交作有㫖訪時政闕失殿中侍御史林大中以事多中出上疏曰仲春雷電大雪繼作以類求之則隂勝陽之明驗也葢男為陽而女為隂君子為陽而小人為隂當辨邪正毋使小人得以間君子當思正始之道毋使女謁之得行太學博士彭龜年論雷雪之異疏曰臣伏覩尚書省劄子備奉聖㫖云云臣官為博士不當越思然自二月庚辰忽見此異即嘗博考經史推驗天人徒積憂惶不敢論奏及見朝廷訪求讜直已至館職啓沃之論當亦不少舉而行之天意自回及今旬日沴氣未散辛卯之夕狂風大作已復為雪逮至壬辰日光已見暖氣已效而雪猶不止隂盛侵陽一至於是聖心憂惻必倍於前臣履陛下之朝食陛下之祿則安得不憂陛下之憂憂而不告是謂欺君越職而言亦為犯上勿欺而犯前訓具明敢假便文之辭以負事君之義又况秦置博士掌通古今逮及漢朝亦承疑問然則采摭古今之事以裨國家之闕乃臣職分所當然也臣謹先取經史所載雷雪之異開列如后一按春秋隠公九年三月癸酉大雨震電庚辰大雨雪公羊傳曰大雨震電何以書記異也何異爾不時也庚辰大雨雪何以書記異也何異爾俶甚也何休注曰此桓將怒而弑隠之象胡安國傳曰震電者陽精之發雨雪者隂氣之縱周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也夫隂陽運動有常而無忒凡失其度人為感之也今陽失節而隂氣縱公子翬之讒兆矣鍾巫之難萌矣一按西漢書五行志隠公九年三月癸酉大雨震電庚辰大雨雪大雨雨水也震雷也劉歆以為三月癸酉於歴數春分後一日始震電之時也當雨而不當大雨大雨常雨之罰也於始震電八日之間而大雨雪常寒之罰也劉向以為周三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異一按晉書五行志吳孫亮太平二年甲寅大雨震電乙卯雪大寒按劉向說此時不當大雨常雨之罰也於始震電之明日而雪大寒又常寒之罰也劉向以為既已震電則雪不當復降皆失時之異也天戒若曰為君失時賊臣將起先震電而後雪者隂見間隙起而勝陽弑逆之禍將成也亮不悟尋見廢又元興三年正月甲申霰雪又雷雷霰同時皆失節之應也四月丙午江陵雨雹是時安帝䝉塵右臣開具在前並是經史本文别無刪潤其中雖多忌諱之語不當陳於盛大之時然若不摭前世之禨祥何以助陛下之警懼但天之降災本各有證而證之在人亦復不齊難執一條以盡天意自春秋書魯隠公雷雪之變說者以為公子翬之應繇兹以降大率皆依據其說以驗其災證雖不虚意則未廣質之聖訓殆不如斯書曰天有顯道厥類惟彰故求天者必以類而推又曰惟先格王正厥事故應天者必隨事而正臣觀雷震而復雪只由隂盛而侵陽儻悉求隂盛之由始可見陽微之變臣嘗俯察近事仰驗天災得其大綱者有三推其條目則有十三何謂大綱有三一曰陽徳不修二曰小人道長三曰兵端有形何謂陽徳不修臣聞天以剛故能首出庶物君以剛故能宰制羣動而所謂剛者非以獨擅威福不可沮撓之謂也無所牽制之謂剛無所耽惑之謂剛無所回枉之謂剛無所縱弛之謂剛陛下自登大寶二年于兹寛仁如湯懿恭如文而裁制事物似少剛斷得非於前數者有不足乎臣近聞羣臣以剛斷之說勸陛下者矣臣不知其說果如何也臣但見陛下近日臨決機務自任太過未免其間有得有失如斥逐李隶不由人言此剛斷之得者也大臣有罪臺臣一章而徑罷降人建節全臺論之而不回此剛斷之失者也夫大有剛健必本於明中庸三徳知先於勇必知其賢然後可任之勿貳必知其邪然後可去之不疑是以先正司馬光曰聞人之言而能别其是非故謂之聰見人之行而能辨其邪正故謂之明是非既辨邪正既分姦不能惑佞不能移故謂之剛取是而捨非誅邪而用正確然無所疑故謂之斷然則所謂剛斷者豈以獨擅威福不可沮抑之謂哉此臣所謂陽徳不修之目一也國家崇奬臺諌以為耳目政恐人情下壅姦軌内萌若非剛正之臣必重仇怨之慮責之以言尚恐顧望既言復沮誰復切摩陛下優容直臣固為盛徳而諱忌鯁論尚有疑形臣觀近日臺諫之言稍稍不効雖聽用固亦不少然或不行或訓飭或宣諭而止者亦不一事也至於全臺彈擊近時罕聞假使發之之輕尤當勉彊以受所以存朝廷之綱紀植抗直之風聲垂裕之謀莫便於此豈可但欲令行不反人不我違深恐臺諫之輕甚非國家之福此臣所謂陽徳不修之目二也竊惟經筵講讀之官實任古者保傅之責所以程頤謂天下之重任唯宰相與經筵天下治亂繫宰相君徳成就在經筵然其輔養聖躬之方豈止講論數刻之久故輪夜直欵侍燕閒不獨共究義理之微亦欲潛移逸豫之隙竊聞近日宣召夜直多在詰朝臣不知蜵蜎遊息之時何以為存養夜氣之道陽明升則徳性自用隂濁盛則物欲必行保䕶清明孰如義理臣聞唐宦官仇士良嘗教其徒曰天子不可令閒常令以奢靡娛其耳目使日新月盛無暇及他事則吾輩可以得志切勿使親近儒生彼見前代興亡心知憂懼則吾輩踈斥矣要知小人陷君於惡亦自有術然則人主欲逺小人安可不知昔者禹惡㫖酒而好善言㫖酒既踈善言方邇深思大禹之策政反士良之謀葢此重則彼輕此消則彼長安可徒徇一日之樂反易終身之憂此臣所謂陽徳不修之目三也臣聞賤貨貴徳然後可以為天下昭徳塞違然後可以臨百官臣近得之道路封樁下庫所藏寶器陛下已宣取入内夫藏之内府與藏之外府本亦何間但前朝所以並寘於外者葢有說焉似聞象簟之類則沒入之器也四圭有邸則祀天之器也此豈容寘内府哉往者藏之外府葢崇貴徳之義踐塞違之訓而陛下一旦納之宫中其為損豈細也耶至如封樁庫錢始創之法非軍事不得支用夀皇聖帝在位之時間有宣取葢以閱武内庭欲備犒賞故實以犒賞之數取之非託以為名也今陛下沿例以取而人以為言者葢取之惟有此名用之則無是實古者天子無私財至漢雖有少府之藏已不敢侵大司農之費政如今日州郡有軍資公使之别公使而用軍資之錢則為礙條法陛下既為天下之主豈可不以身率天下内帑之費不加裁損而但取足於封樁乎陛下雖曲從近臣之請更不取撥然前日陛下所以為此者必以内帑錢乏故也今若欲留封樁之錢必須痛節内帑之費費儻不節錢必不繼則陛下能保後日之不撥乎萬一不免取撥臣下又復執奏則陛下能必從其請如今日乎此臣所謂陽徳不修之目四也天子禁衛上應天象所以周防詳密葢示名分尊嚴若以式律言之夜開宫殿及城門者皆須墨勅魚符其受勅人具録所開之門并出帳送中書門下自監門衛士將軍以下俱詣閤覆奏既聽即請合符開鎖監門官司先嚴門仗所開之門内外並立隊燃炬火對勘符合然後開之誠以王者所居體當持重祖宗立法自有逺謀竊聞近日水門之禁啓閉不時此非常開之門尤當謹守其節有何緩急自弛隄防臣聞仁宗朝兖國公主深夜入宫吕誨即奏劾公主宅使臣及皇城司經歴門户管當人乞行取勘以謂宫鑰謹嚴以時啓閉葢備非常此而不禁後有竊發何以備禦先臣憂國深逺如此以公主君父之至親非時入内猶被按劾況下於此者乎況踈於此者乎此臣所謂陽徳不修之目五也何謂小人道長臣觀今日之勢正人與邪人較則邪者必勝朝臣與倖臣較則倖臣必勝士大夫與吏人較則吏人必勝臣請得别白言之夫事君當以道也則曰不如隨俗御事當以法也則曰不如從例士大夫固知俗不可以違道例不可以違法然卒之守道者困隨俗者顯徇法者閡用例者行以至議論有是非則非常勝是事理有義利則利常勝義人情有公私則私常勝公細察閭閻之間上至朝廷之際往往皆然不知世變何以至此是宜上感於天變殆非一人之所為然陛下尊據崇髙宗主神民則不得不自任其責故曰正人與邪人處則邪者必勝此臣所謂小人道長之目一也臣聞人君以法守天下士大夫以法守官職人君所為少出乎法則士大夫悉力争之非為身也為法也非為法也為國也周昭一醫官耳何致煩陛下破法而令其臣曰一切違礙並免夫既謂之違礙則是法不可也給舎執而争之是官當然也而陛下不從其說何周昭能使陛下屈法而給舎不能屈陛下守法此門既啓後孰窒之故曰朝臣與倖臣較則倖臣必勝此臣所謂小人道長之目二也吏道之盛無如今日州縣之吏止能制百姓中都之吏乃能制官員臺省之吏至能制朝廷州縣之吏所以能制百姓者與監司之吏通也中都之吏所以能制官員者與臺省之吏通也臺省之吏所以能制朝廷者與權倖通也臣請得以近事明之陛下為㑹計録所裁損者特毫末耳其間裁損之目緣及省吏事猶未行即倡言于外曰減諸軍雪寒錢葢欲藉此以動揺軍情爾幸而事狀顯著不能惑衆卒之心怨謗之言上徹聖聰似聞陛下亦悔此舉不知今日困匱如此若不撙節何以理財小者如此大者不復可議矣故曰士大夫與吏人較則吏人必勝此臣所謂小人道長之目三也何謂兵端有形今日士大夫遊談族議特慮北朝耳北朝不足慮也所可慮者彼有邊鄙之警則或恐有豪傑從中起耳萬一有此不特為彼之禍亦將為我之禍也葢為彼禍首者必假我以為詞當是之時我將何以處之受之則與北朝為敵而吾亦無以處彼攻之則是為㓂讎除災而吾終不獲其利此臣所謂兵端有形之目一也國家所以能自固於東南者以有蜀耳蜀之所以能自固者以有劍外之兵耳今劍外之兵何啻如賈誼所謂股大於腰又苦􅏓盭然亦無如之何也為今之策止有寛兩蜀之民為彊本之計而今日兩蜀事權四分五裂制置主民總領主財戎帥主兵茶司主馬兵不可闕食馬不可無本則總領不可無財而制置司不可不恤其民亦其勢然也聞之蜀士兩蜀之民貧至骨矣民貧既甚禍亂易興此臣所謂兵端有形之目二也二廣鹽筴其法屢更大要不過官搬客販兩說爾官搬則利於廣西客販則利於廣東廣東之鹽専靠販入西路今廣西既用官搬則廣東之鹽必發泄不行使朝廷催逼賣鈔任事者稍稍營財禍將起矣葢廣東自來有私販之害祖宗時江西客販未通官鹽少至贑上贑州諸縣並食廣東私鹽朝廷甚費區處今日淮鹽既通固無向者之害然而贑州僻逺諸縣如龍南安逺等處食廣東私鹽如故廣東摧鋒一軍及大奚山一帶人皆以販鹽為活官鹽既不流通必歸罪於私販萬一禁防稍宻盜賊便興此臣所謂兵端有形之目三也蜀之黎雅廣之宜融湖北之辰沅靖俱有戎獠之患唯蜀之黎雅朝廷留意鎮撫諸戎又經敗衂近頗安靖不足深憂如宜融南丹之族辰沅羅鬼之族皆嘗深入省地揺動邊陲而數州邊防聞甚茍簡至空有寨柵之名而無卒徒以守倉卒有變何以支吾唐李綘謂受降城兵籍舊四百人及天徳交軍止二十五人器械止有一弓以今槩之往往如此是豈可不慮哉此臣所謂兵端有形之目四也近日㑹子流通勝於見錢官私便之似覺無敝然杞人慮短嘗熟憂之夫㑹子不過數寸紙耳而乃與衆貨埒權者此無他官司許作見錢入納而市井兊便者稍衆也有如緩急富人收兊便之鋪私下無換易之地則臣恐倉卒之際未必不擾近日湖北稍稍見矣縁湖北㑹子當來止於湖北京西界内行使襄漢戍卒月得料錢全靠客旅貿易然其㑹子止到鄂州便着兊換而官司無以權之總司入納又止視市價不同見錢每一貫㑹子止可作五百左右㑹子既輕商旅不行商旅不行軍人所得㑹子愈難變轉而㑹子愈輕矣諸軍洶洶頗以為言特未有征行未敢發耳是豈可不預計哉此臣所謂兵端有形之目五也推是求之特不止此姑舉大者條列以上仰惟陛下踐臨天位以來五榖順成四方無虞仰觀乾象俯察地理災異絶少而人情初不以為喜今忽有此異才數日耳而人情莫不以為憂不論賢愚不間貴賤各隨所見推歩隂陽天動于上人憂乎下是何故也得非志不足以勝氣乎以臣觀今日之勢政如衰弱之人天和氣燠左右顧忌猶恐不免忽遇風寒雨濕之變使有所感觸其為疾疢豈不易耶當是之時猶不謹審服食精調起居以為保養身體之䇿臣不知其可也臣愚欲望陛下修身以徳修徳以人親近儒生以講治原奬進君子以御小人大明公道以正風俗增重臺諫以彊朝廷節用愛人以厚天下選擇守令以起内治博求將帥以固疆圉然後天變可塞人情可紓保國寜家政在今日臣之區區猶有未盡夫人君之道莫先於修徳莫切於愛身人臣納忠於君亦莫如修徳愛身之為急恭惟夀皇聖帝勤勞天下二十餘年精神未衰志氣尚彊即以大位付之陛下葢欲親見聖子身致太平陛下既即大阼四方之人莫不延頸舉踵望陛下徳業日新名譽日隆以仰荅夀皇聖帝付託之重而道塗流言皆謂陛下宫中宴飲稍失節度其事信否固未可知然萬一有此則於修徳愛身之道無乃虧乎夫酒之為物傷性敗徳莫加於此匹夫溺之尚且足以殞身喪家而况人主乎側聞仁宗皇帝在御之日災異屢臻日食地震江淮騰溢風雨害稼司馬光奏疏以為燕飲過差所致因乞悉罷宴飲以解皇天譴告之威夫日食地震江淮騰沸風雨害稼以隂陽感應之理推之何預乎燕飲而光直指以為言葢人君之身上與天通光之所言即洪範庶徴之微㫖然則臣之所謂以類而推每事而正者非臆說也唯陛下念上天警戒之切念祖宗創造之艱念夀皇委寄之隆念天下屬望之深側身應災改過不吝人情天意本不相逺陛下今日儻能擇一二過舉之事繫人耳目者先與改圖然後命兩府大臣悉更敝政内外聞之孰不歡喜如此則何災不弭何變不消永保生民丕享大福臣命輕螻蟻言渉乘輿席槀待誅不敢望赦龜年又上奏曰臣伏讀詔書喜至於泣臣官為侍從義則世臣不能遇事而論思致勤詔㫖之訪問退揣私分甘受重誅儻復略舉細微而言何以仰稱懇惻之意謹昧萬死條列以上唯陛下留神臣聞雷者陽精之發雪為隂氣之凝雷震於驚蟄之前陽已不固雪作於震雷之後隂又太彊唯隂縱而不收故陽微而受制驗之古昔具有證祥春秋所書晉漢所志雖人事感召之類不一而隂氣過盛之證則同故自一家而言則男為陽而女為隂自一朝而言則君為陽而臣為隂自羣臣而言則君子為陽而小人為隂自天下而言則中國為陽而四裔為隂隂或侵陽故為此變志壹動氣實在乎君然欲尋災異之源必致精微之察儻惟人事少有不盡是於天理猶未為純宜殫聖心廣求其類故在内則陽教不可以不立在外則君道不可以不明言路不通則小人或得以蔽欺折衝無人則邉庭必至於侵侮何謂陽教不可以不立夫姤卦以五陽之盛猶畏一柔之牽成湯無聲色之娛尚有女謁之戒私情難制自古則然儻有隙之可投雖一毫而可畏且如崇飲尤懼傷和若禁門啓閉之不時有緩急憂虞之當慮冀因警戒少屈皇明何謂君道不可以不明夫賞必有功罰必有罪操此二柄是為大君若賞罰無所勸懲則善惡何由分别且如近日廷臣之補外多因中㫖而徑除若以為有罪而可懲何不明言其過若以為有材而可任何不因事而除惟舉直錯枉之道不能昭明故乗間抵巇之徒竊以賣弄遂使人各解體士不盡心茍且偷安緩急難保君臣之情如此天人之際昭然可不明示過功公行黜陟庶免賞刑之過可召隂陽之和何謂言路不通則小人得以蔽欺竊惟臺諫之臣乃寄耳目之責儻無事之不達雖有姦而莫容陛下聽受直言超邁前古質之近日之事似有拒人之疑蕭鷓巴節鉞之除全臺論之而不聽周昭遥刺之命給舎繳之而不回雖能申令出不反之威然殊非改過不吝之道恐致姦宄遂輕朝廷私託横行公議漸廢欲令沴氣之消弭當務奸慝之掃除盡窒私門大開正路何謂折衝無人則邉庭必致於侵侮近聞警報之至狄有它族之兵雖啓攻人之謀未免懼我乗其後或於境上略示疑形可不審詳遽作煩擾有兵不練又復招兵兵多不精重以蠧國臣聞御敵之法莫若擇帥為先茍得其人付以統御之寄俾久其任自為攻守之謀一聽所為無從中制課之嵗月必有成功豈比今日泛然之圖祇為諸將自潤之計如此等事殆非一條以次推求敢擇大者以瀆陳庶幾萬一之有補臣尚有瞽見上裨聖明嘗以今日之災考之五行之傳唯劉歆以為常寒之罰在洪範是為聰之不謀陛下既盡求言之誠乃得應天之道然嘗聞景祐之五載止因雷震於春初亟出明綸博求直諫首及聖躬之闕失盡令百辟以箴規今雖故事之循尚有未盡之㫖止憂庶政未及反躬僅逮館臣不能盡下求之既已不廣用之豈可不誠葢言不難求其難在聽言不難聽難於必行若不能行徒文無補陛下自逐遺補之後屢出言論之臣雖皆假以它辭授之美職人終以其忤上而去故大率皆以盡言為懲況兹明詔之頒旋有渝古之責事雖中輟聲已四馳伏願亟取封章之言擇其剴切之論重加開奬與之施行以開天下疑沮之心以荅蒼穹仁愛之意反禍為福如響應聲臣識淺言狂命輕意切俯伏私室敬竢大刑三年龜年為御史臺主簿又上奏曰臣聞四方有敗必先知之此之謂民之父母矣後世唯魏相稍識此意每敕掾史按事郡國令白四方異聞或有逆賊風雨災變郡不以上相輒奏之相與趙充國議擊匈奴乃曰今年計子弟殺父兄妻殺夫者凡二百二十二人非小變也夫風雨變異天之災子弟惡逆人之變天人變動而朝廷不聞尚安足以圖治乎今之州縣每遇災異自非水旱例不以上頃年江湖閩浙同日地震唯建昌軍因言失火併以上聞前年福建江西間有地震去處唯漳州守臣上章自劾至於子弟惡逆時亦有之縁法中有守令量事貶降之文用是例不舉按是不可以為尋常而不問也夫至和之氣感於人事大順之治積於閨門若天示警戒而上不聞則徳不修人反天常而上不治則政不舉如此而欲求天下之治不可得也臣愚欲望聖慈明詔州縣凡有災異而輒不以聞有惡逆而匿不舉按者令監司覺察又令御史臺察監司之不舉按者上之略加懲罰庶幾上下警懼各思有以消弭災變感召至和不勝幸甚紹熙中監察御史虞儔上奏曰臣聞警懼譴告上天所以仁愛人君側身修行人君所以對越上天稽之往古驗之當今精祲之交殆若符契近者太白經天謫見垂象六月不雨咎證常暘人皆以為憂微臣獨以為喜何者葢知陛下道超象外識照幾先必能謹言行以動天地之大修政事以導隂陽之和於是焉轉禍而為福散沴而為祥殆猶反手焉耳未幾太白漸復常度一雨遂蘇羣槁人皆以為喜微臣反以為憂何者葢以人之常情既得天時之助必忘人事之修謂天不怒乃敢戲豫謂天不渝乃敢馳驅於是焉患生於所忽變起於不圖可不為寒心哉故明君見變能修道以除凶若其無象是不譴告傷敗所由而至也然則當憂而喜當喜而憂臣非求異於衆人抑亦具聞於往訓書曰惟上帝不常作善降之百祥作不善降之百殃又曰惟天無親克敬惟親又曰天難諶命靡常又曰皇天無親惟徳是輔夫天不言所以昭然示人者不過日月星辰之象雨暘休咎之證而已人君承天意以從事必即此而觀之臣竊詳太白之應志在晉史雲漢之旱詠於周詩皆非小變也陛下銷變之道捷於桴鼓況又自初即位曰雨而雨曰暘而暘年榖順成百姓和樂天之眷顧葢不偶然其必有以致之者矣昔唐太宗既得天下元年關中饑二年天下蝗三年大水方之陛下固不可同日而語然太宗因天之戒勤撫其民變饑饉為豐穰致貞觀之盛治若陛下每存陟降左右之念愈加悠久不息之誠天其申命用休當與堯舜比隆矣大抵天之於人君其眷顧之既厚則責望之必嚴凡其念慮之萌嚬笑之發當宁焦勞之際退朝宴樂之時鑒觀在上莫顯乎微一或不至則非天意故天意所與則三光全寒暑平風雨時五榖熟草木茂天意所否則為災異為凶年為水旱為繆盭為疾疫如響應聲如影隨形事之必至理之固然者也臣伏願陛下仰順天意俯修人事庶幾我之所以對越上天者始終而無愧天之所以仁愛我者愈久而無窮社稷之福生靈之幸也詩曰惟此文王小心翼翼昭事上帝聿懐多福在陛下强勉之而已儔又應詔上封事曰臣近奉聖㫖以隂陽不和雷雪交作可令侍從臺諫兩省卿監郎官館職各條具時政闕失聞奏顧臣至愚極陋待罪臺察已逾一年自惟無所補報日負憂責今陛下虚心求言以荅天變若猶有所隠避臣罪大矣謹條具昧死上獻一臣聞陽奮則為雷為電隂凝則為雹為雪方隂陽之相薄則雷雹皆至及陽為隂所勝則雷止而雪作魯隠公九年三月自癸酉大雨震電至庚辰大雨雪凡八日劉向以為周三月今正月也雷電未可以發既發則雪不當復降皆失節也故謂之異吳太平二年三月甲寅大雨震電至乙夘大雨雪纔二日耳史臣以謂先震電而後雨雪隂見間隙起而勝陽其後禍亂之應有若符契往牒具載吁可畏也今正嵗之始建寅之月三陽用事於卦為泰自戊寅至庚辰雷電雪雹俱作於三日之間視魯則數視吳則踈臣願陛下以往事之驗為方來之鑒警懼修省以荅上天仁愛之意則災意塞於上禍亂息於下在陛下一念之頃耳一臣聞朝廷者陽也宫禁者隂也日昱乎晝月昱乎夜而寒暑成天子理陽道后治隂徳而後國家理若宫禁之中宴飲之不節則非所以崇毖皇躬賜予之不省則將至於空虚内藏女謁行乎内則勢行乎外尤不可不防其微而杜其漸也有一于此則雷雪之變乃上天之所以丁寜陛下之意也不求之身是無應天之實天怒愈深矣至於勲戚貴近時有排當倡優伎藝每䝉宣引水門啓閉多不以時豈所謂嚴等威肅宸居哉臣願陛下畏上天之威謹正始之道宗社幸甚一臣聞君子者陽也小人者隂也自古君子小人勢不兩立君子在内小人在外於卦則為泰小人在内君子在外於卦則為否今朝廷清明多士濟濟有官守者修其職有言責者盡其忠廼建寅之月三陽在内宜泰而否何也意者得無在外小人交結黨與潛謀進用如某人輩者歟且將源源而來矣啓大姦之隙動上天之威無足怪者昔漢元即位之初蕭望之周堪張猛等與夫恭顯許史之徒雜然並立於朝是非相攻邪正相激當時日青之變反以為堪猛用事之咎未幾堪以病卒猛自殺於公車無乃與天意戾乎漢業之衰自是基矣臣願陛下觀㧞茅連茹之象以進君子戒履霜堅冰之漸以防小人毋使鴞鸞並棲薫蕕共器則天意解矣一臣聞中國者陽也外裔者隂也自古外裔之强弱常係中國之盛衰今國家南渡甲子已逾一周敵運將終朝野咸意中原可復近者邊報傳聞信否雖未可知苐講和日久邊備廢弛意者將有姦雄漸萌不肖之心窺伺間隙或恐讎耻未復而脣齒先寒矣侯景之事可為深慮臣願陛下明詔大臣遴選逐路帥臣俾之先事經理以備不虞一臣聞人主進退臣下必曉然示人以勸沮之意故進一人而人皆以為當進退一人而人皆以為當退舜舉臯陶不仁者逺四罪而天下服用此道也若朝逐一人焉而使人疑暮逐一人焉而使人懼此何為者哉葢自余端禮趙彦逾石宗昭徐元徳之去而朝士大夫莫不疑且懼焉何者一旦遽然命從中出去者閔黙莫測其端倪居者彷徨每憂於讒毁日懐去計莫有固志臣恐自此無有為陛下興事造業者無有為陛下以身任怨者陛下孤立於上將何利焉臣願陛下守至正以照臨百官有善則進有過則退明示之以好惡以堅其事上之心與之共天位治天職以荅天變一臣聞明主不惡切諫以博觀忠臣不避重誅以直諫言路之開社稷之福也葢自楊萬里徐柟之徒去國之後朝士大夫多不敢竊議時政於心有所不然者不過相視太息而已此豈盛世氣象耶如萬里之輕率妄發暗觸忌諱柟之强聒不置似不安静雖皆不能無過然其平日亦在能言之流中道弃之失古人市骨求駿之意矣夫敢言之氣作之尚不能起況沮之耶近又有狂妄庸人上書不實陛下止令聽讀可謂寛恩但四方萬里不知其說云何傳聞不審將謂朝廷以言罪人覆巢毁卵鳯鳥不至無乃與求言之㫖戾乎惟陛下赦之漢世每有災異必詔賢良文學之士直言得失兹誠得應天之實也一臣聞之書曰天命有徳五服五章哉又曰官不及私昵惟其能爵罔及惡徳惟其賢又傳曰爵人於朝與衆共之此言人君爵賞之施必賢與能而後足以上當天心下協人意近者朝廷侍從之選或以交結而得節鉞之重或以無功而授後省繳駮之職間不經由臺諫論列之言乃䝉宣諭不唯名器既輕遂使紀綱不立豈爵人於朝之義天命有徳之意乎上天至明不虚見異臣願陛下奮發乾剛收回渙汗茍物論惟允則天變可回矣一臣聞淳化二年大旱太宗延近臣問時政闕失樞宻直學士冦準對曰天人之際應若影響大旱之證葢刑有所不平頃者祖吉王淮皆侮法受贓吉既伏誅家且籍沒而淮以參知政事沔之弟止杖于私室用法輕重如此亢暵之咎不虚發也太宗大悟明日召沔切責之近者銓試代筆事覺有司觀望不特有官宗室不行推治至於與之干渉者則又故作遷延止將餘人具案奏斷用刑如此無乃不平怨讟交興有傷和氣臣願陛下特降睿㫖令臨安府催追未到之人速具奏案一體施行以荅天變起居舎人劉光祖上書曰臣近奉聖㫖以隂陽繆盭雷霆非時淫雨為災朕心甚懼推尋厥咎未知其繇凡朕躬有過失朝政有闕違可令臺諫侍從各條疏以聞無有所𨼆者臣猥以虚庸日侍左右詔㫖所及敢不罄竭其愚誠伏念國家遭值厄運方昨者五六月之内人情離阻天理乖暌其時社稷已是傾覆陛下之身危莫自保萬姓塗炭三宫受禍揆以事勢間不容髪上賴祖宗徳澤未泯天命厯數有歸大器既傳中外遂定此陛下目所親見心所親憂固無俟於臣言也而陛下踐阼踰月洪水發于近畿天目之山湧裂而出者幾數百道陂塘決溢流屍千計蕩産狼狽者不知其幾陛下覩此災變憂惶儆戒亦嘗存於聖心否乎明堂禋祀之前日過熾而氣蒸衆謂風霆雨雹之兆已見而陛下潔誠寅畏將事之夕雨僅濡塵足昭上天響荅甚邇然羅㸃以股肱之良前期一夕而卒黄裳以保傅之忠相踵不幸皆非細故也陛下臨御未幾併奪兩賢之助此於天命尤所當思何況禋祀之後雨淫不已穡夫告病以為稻不傷於旱者則敗於水不敗於水者則害於雨饑年愁苦而半月以來米價倍蓰人不聊生怨咨之聲逺近如一剽盜漸起流離已多方且雷發非時震電駭異雨既隨注天復翳昏雷雨暴風兩晝三夕陛下詔㫖責躬求聞闕失僅得一日晴霽而寒氣驟至連雨重隂勢不少解日甚一日上天威怒莫測端倪陛下即是數事觀之其為憂惶儆戒雖欲不存於聖心不可得也臣竊意陛下憂惶儆戒之念未甚勤切是以求言之初天色頓開已而謂陛下姑應故事隂雨復作繼晝連夜凡七八日而未止也漢大儒董仲舒嘗曰國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也古今言災異最近理者無若仲舒仲舒之學純於經而切於理陛下所宜深味其言然後見天心仁愛陛下之至不可不因其譴告而自省也臣不敢復引諸儒之說及它占書以瀆聖聽請質諸六經以言之易震卦曰洊雷震君子以恐懼修省洊者其震不一也言雷之震不一必有其故是以君子恐懼而修省焉無妄之卦曰天下雷行物與無妄言聞雷而懼物物皆無妄念也益卦曰風雷益君子以見善則遷有過則改言君子觀風雷之象遷善改過以為已之益也書洪範九疇論八庶徴曰休徴者五謂肅時雨若乂時暘若哲時燠若謀時寒若聖時風若曰咎徴者五謂狂恒雨若僭恒暘若豫恒燠若急恒寒若䝉恒風若也人君之於貌言視聽思五者茍惟能肅能乂能哲能謀能聖則五氣和而為休徴其或反之為狂為僭為豫為急為䝉則五氣乖而為咎徴其感應之理自然如此也臣前所為謹始五箴獻諸陛下葢慮是也人之一身本與天通天人相與之際可不畏哉書金縢之篇又載成王周公之事王初惑於流言而疑公時秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐及王悔過執書以泣曰今天動威以彰周公之徳不敢復有疑於公天乃雨反風偃禾盡起嵗仍大熟成王之心疑信周公而天之所應速於反掌又以見天人之際其近如此也詩曰天方薦瘥䘮亂孔多民言無嘉憯莫懲嗟薦瘥謂疾苦不一也疾苦䘮亂之多而曽莫之懲則可嗟也又曰曄曄震電不寜不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲言天地之變異乃爾胡為而曽莫之懲是令人之可哀也又曰旻天疾威弗慮弗圖言天降災疾威怒而弗慮圖則亦䘮敗而已矣又曰敬天之怒無敢戲豫敬天之渝無敢馳驅渝變也言天怒天變之不可不敬也幽王厲王無道之君故當時之卿士作詩以刺之語多及於災異謂其睹災異而不戒是以為幽厲也春秋雖魯史然實孔子之書其書日食地山崩星隕晝㝠晦雨木冰大雨雪大雨震電水早饑蝝螽螟不一而足皆所以示儆戒之意使後世之君考之彼遇災而不懼則往往至於失國也禮記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐皆所以敬天之怒也周禮保章氏之職志星辰日月之變動辨其吉凶觀天下之妖祥與夫水旱豐荒之祲象察天地之氣或和或乖以詔救政訪序事詔救政者謂預告其所當救之政訪序事者謀其事之所施先後之序也凡兹六籍之言足為萬世之訓今陛下當法易之恐懼修省正念無妄遷善而改過當思書之敬用五事以致休徴及傚成王因天變而信周公當誦周人災異之詩鑒幽厲之失道當畏春秋災異之書懲衰世之失國當如禮記中夜起而衣冠以敬上天之威怒當體周官覩祲祥則講修政事以救之如此乃可謂之應天以實而不以文也本朝大儒歐陽修曰天人之際影響不差未有不召而自至之災亦未有已出而不應之變此名言也陛下可不念之乎且陛下即位有大事三父子之情久而猶未通宫闈之處久而猶未善山陵之議久而猶未安下多浮言人鮮固志然則休徴協氣何自而生又況號令不常羣隂用事風雷之變所以見號令之不常也淫雨之災所以見羣隂之用事也何則大臣之進退太輕臺諫之用捨無定此非號令不常之大者乎進退大臣用捨臺諫事從中出頗傷急遽此非羣隂用事之著者乎宜其天人之相應宻若影響之不差陛下無謂外人之妄言試反求之於陛下之心亦必自知其有所未安但業已為之而欲遂其事是以雖有言者一切拒而不受臣請因陛下遇災而懼諮訪闕失為陛下别白而言之夫退留正未為非也何必更易臺諫擢黄度可謂善也未幾而出之何哉其所以致陛下號令之不常者實自羣隂之用事故也而陛下猶為之隠諱以為大權當自已出威柄不可下移然則小人之謀其意將以隂制今日之相臣而動揺之也陛下所宜早悟無使大臣懐疑畏之心大臣懐疑畏之心則四體不展羣議易揺朝綱日隳政令錯出而國不可為矣今陛下有獨斷之意乃是小人隂竊主權之梯媒而陛下未之思也且陛下以為前日倉皇即位為得已乎為不得已乎大臣不得已而立陛下為社稷計也陛下不得已而從大臣之決策亦為社稷計也君臣俱為社稷計不知方今之社稷為已安乎無乃猶未安乎而陛下與大臣不圖其始而善其後使天災如此臣恐陛下之君臣異時俱無以辭天下後世之議也臣每謂方今當禍變憂危之後上下内外決能盡心相與扶持再造家國乃今不然人各異趣事乖始謀身謀則急國謀則緩良可恨也陛下試因臣言而静察之且如陛下出令茍見未可施行大臣所當面奏給舎所當封駁臺諫所當論諍侍從所當救止今皆畏避形迹不敢少忤陛下左右之臣則又何賴於公卿大夫士哉是非急身謀而緩國謀也哉雖然人臣肯以實告人主者誠少陛下試思上皇深居九重終不盡知大統已傳大號已正自太上皇后而下皆務彌縫而䝉蔽之至使陛下父子久不相見是皆起於彌縫䝉蔽之故也陛下於庶事茍不加察則内外之臣彌縫䝉蔽陛下者亦如此爾非人主聰明剛健能主張正論能親君子逺小人能别白是非未易使人臣之盡言也臣至愚之性於事無所阿私茍有所懐當其可言不復更事形迹願陛下察臣之赤心納臣之苦口勿忘天災一切與大臣審修其政至如陛下孝敬在心宫庭之内屋漏之間凡所躬行有外人不得而知者陛下毋使一毫有愧於天可也臣草奏之際更為陛下反復思之雷霆之怒小人妄謂上皇前日孝行之愆然事既往矣今日之責付於陛下矣陛下今日之孝心恐亦有所未至臣謂宜竭誠盡道篤事於三宫贖上皇既往之愆慰烈祖在天之望若是則雷變可得而消也至若淫雨為災乃是羣隂用事陽氣微而君道弱之證所宜専責之大臣以朝廷之事勿以左右近習參之昭明紀綱以正内治選任牧守以撫斯民但使陽長則隂消即能反剥而為泰事理明白了無可疑臣數日來聞陛下數出寛恤之令若軍若民若刑獄之淹延若宿衛之暴露無不介意其間如捐内帑錢以代赤子和買身丁之重賦此最帝王盛徳之舉而曽未足以消弭天災則陛下不可不知其故也既知其故而陛下之意亦未決書曰今天其命哲命吉凶命歴年斯言葢憂天命之未知所終也曰其者葢未可必之辭也人主或哲或昏國家或吉或凶運祚或短或長皆未可以前知則所謂憂之至也陛下毋信諂䛕之言而乃歸之於時數以怠其敬天之心有災無災其敬如一則天命之休祥可得而必也臣之拳拳請以是塞明詔干冒宸聰伏惟留神省察天下幸甚權户部侍郎袁說友上奏曰臣竊惟天人之際自三代以來已不勝其說矣至漢董仲舒則曰災異譴告是天心之仁愛人君也葢天心君徳實同一體災異譴告所以時示儆戒非惟亂世而治世亦然人君茍能因災而修省觀變而兢懼事合其宜政得其理則天心昭格帝祚靈長有不待祈而自至者考之古昔成湯六事自責而造商宣王側身修行而興周其所感召昭然不誣可不信哉可不畏哉恭惟陛下神聖文武有不世出之英姿仁慈睿哲有君天下之大徳俯視漢唐誠有餘矣然而受列聖積累之祚承光堯中興之業膺夀皇付託之命憂深逺慮莫切於此固有以奉天心荅天貺也廼者熒惑失次太白晝見金星掩心火星行都地震亦廣甚者太陽中天而黑子摩盪黑祲亘天而赤氣乗之旬月之間變至五六甚非所以安上而全下也逮于望日陛下肅駕乗輿展禮慈極都邑之内耋老稚幼瞻望翠華無不鼓舞變憂懼為和氣易譁謗為歡聲曽不信宿而瑞雪時至又不兩日而太陽復明以至羣隂消伏星軌浸順夫以前日如彼而今日如此豈非災祥之機關於陛下一舉動之頃耶何其響應之速如此也臣懐不自已輒盡愚衷深惟天意之難諶端係人主之一念無曰髙髙在上靡所聽聞常使兢兢在心罔敢失墜自今以往臣願陛下修省戒警愈久愈篤堅志詳慮細大必謹勤兩宫定省之奉念萬務安危之機倚信大臣開廣言路撙節財用日積而嵗贏省覽章奏朝入而暮報皆君人之實徳治國之大本也陛下天資英睿即是數者而加之意則天心喜恱帝命眷顧和氣致祥何事不立豈惟前日災異倏然無之而天道好還必有助大業成大功者豈不偉歟臣本踈庸誤被簡擢以論思為職用敢盡言不隠以答天地之造惟聖慈留神茍臣言不忤於宸心即聖徳仰當於天意干犯旒扆隕越不勝寜宗即位充金國弔祭接送伴使彭龜年上奏曰臣伏覩詔書節文以雷震非時淫雨為災推尋厥咎未知其繇凡朕躬有過失朝政有闕遺令臺諫侍從各條疏以聞臣官為侍從職在論思不待訪對而可言況有詔書之罪己儻有所隠寜不負恩臣不知陛下此詔果實事邪抑止虚文邪果為實事則陛下即位之初嘗詔求直言矣今四方之言已交公車其間及陛下之過失朝政之闕遺者必多有之未聞略加採擇見之施行則今日此詔臣恐未免如前日之虚文爾若以虚文事天天豈可感乎臣聞慶厯中災異數見一時宰執嘗謝過上前仁宗諭之曰不須謝過但自行事時范仲淹為參知政事退而條具應災四事以上皇祐中又以星變内出手詔十二條令中書門下樞宻院於軍國庶務中推求實事有合更張振舉者宻具以聞於是文彦博等請日舉兩條合更張振舉者委曲面奏所冀言之必行行之必當祖宗應天以實如此臣謂陛下今日先當博採應詔之言取其條上之事責之大臣以次施行如皇祐故事則自可應天而消變雖不為此舉臣亦以為可也劉敞嘗謂三公之職主和隂陽議臣之任主明天人陛下當責三公以其職使之陳隂陽不和之理當責議臣以其學使之明天人相與之際此誠知治體之論也陛下儻責實如此則臣安敢以虚文應詔陛下儻徒事虚文則臣雖以實對亦無益爾是以臣先以責實望陛下而後敢言焉臣聞之宋祁曰災異之發政教之本在朝廷君臣之間耳其他𤨏𤨏細故誠不足以當隂陽之不和議天人之相與今明詔所及止於上躬過失朝政闕遺葢知當務之為急臣敢據是二者參之災變為陛下陳之夫天之鼓舞萬物者雷風也君之鼓舞萬民者號令也天有雷風之變乃為人君號令之應雷為天地之動物最為不測而難信者然發以二月收以八月人事候之以為節未嘗爽也故萬物因之以動蟄而無病焉若當收而發則誤物多矣陛下亦嘗因雷之非時而反求之號令之間乎陛下與大臣恐不能辭其責陛下自即位以來好出御筆陞黜之間多為不測若示人以聰明威斷者其慰人心者固時有之而動人心者亦不少矣陛下抑思人君據天下之利勢一喜一怒繫萬物休戚而使人不可得而測則人其能自安乎當人情求安之時而反使之有不自安之意殆非初政之美也司馬光嘗告神宗皇帝曰陛下好於禁中指揮外事非公卿所薦舉牧伯所糾劾或非次遷官或無故廢罷外人疑駭不知所從夫公卿牧伯所糾劾或謂之賢而不賢或謂之有罪而無罪皆有迹可見責有所歸故不敢大為欺罔若姦臣宻白陛下令陛下自為聖意以行之則威福集於私門怨謗歸於陛下此光體要疏中語也陛下向在潛邸固最愛此疏豈今日乃忘之邪陛下誠以光之言平心熟誦反而思之則今日之舉為是為非可以坐決矣臣故以號令不測為陛下之過者此也夀皇聖帝因山之舉國之大事也始卜稽山大臣以為土薄復卜赤山太史又以為不吉復令卜下宫又以下宫為不可遷也日月已廹而神穴未定有司應辦蔑知所向此非朝廷之過乎太上皇移御之所又國之大事也至三易其處使天下聞之莫不疑惑此又非朝廷之過乎隨龍人推恩陛下即阼之二日固嘗有宣諭矣已而大臣擬進至于一再必欲施行陛下持之不下臣嘗親聞玉音謂朕尚未見父母而先推恩隨龍人孰為重孰為輕有識聞此訓也莫不感歎陛下聖明而大臣復請下之使陛下誠心實徳不孚於天下此又非朝廷之過乎惟廟議無一定之規故出令有二三之惑臣故以號令不信為二三大臣之責者此也雷震不時應或在是孟冬之月六隂過盛而謂之陽月者以隂盛則衰陽當生爾今乃淫雨為災葢隂勝也推之人事則君弱臣彊隂勝也内侵外治隂勝也小人害君子隂勝也盗賊病平民隂勝也蠻夷謀中國隂勝也陛下受天明命大臣雖有翊戴之勲而威福之柄實在陛下前日大臣蔽一大吏出一臺臣而陛下覺之罷大臣而進臺臣人已服陛下之英斷君弱臣彊之病宜無有也陛下自在潛邸不邇聲色及登大位親灑宸翰以聲色及酒為戒既已無所耽溺則亦無所牽制内侵外治之患宜無有也唯是陛下思見太上朝夕不忘而中有間阻絶不得通求之愈切閡之愈固使陛下彷徨無策經營南内將有移御之意若果如此陛下念親可謂至矣然於宗廟社稷之計不審熟慮之否乎此恐未免動隂勝之應也天道雖逺固未易知人心匪遥氣到自見自古未有不召而自致之災亦未有已出而不應之變陛下固不可逆料以為不然而不慮之也推之已事亦可監矣陳瓘嘗謂承顔養志當以大舜武王為法入修家人之禮則恭順無缺出治朝廷之事則威柄不分此乃大舜武王之所謂孝也臣願陛下如瓘之言以事其親則内侵外治之患庶乎他日可以免矣陛下踐祚之日即以收召人物諭臣及召命之出莫非負天下物望者今在朝之士彬彬固多君子矣然臣嘗宻察縉紳之間則多猜防顧忌之心無安舒閑雅之意葢君臣之情未洽而邪正之路未分陛下信重君子之意未孚於人而昵比小人之跡已見於外君子告陛下之言小人或得與聞而小人誤陛下之意君子或不能知正道恐消邪道恐長此亦未免動隂勝之應也當六七月之間淮浙大旱剽掠之徒所至蚋集今雖小弭然飢寒漸近雖朝廷多方軫卹而州縣在在無米失今不圗向後盜賊安保其不作此亦未免動隂勝之應也湖南蠻獠今年侵擾内地已費調䕶粗得平帖似聞敵人復求疵於言語文移之間我方内虞饑饉之廹豈可外有兵革之釁備禦之䇿茫如捕風此亦未免動隂勝之應也淫雨為災應或在是臣素無學術不善推歩因災求類以薦所聞願陛下思所以致災之由求所以弭災之道事事責實不以虚文大要君臣之間各自反已則轉災為福反沴為祥直反掌之易耳唯陛下留神念之臣以使事在途輒因詔書驛置以聞言語狂妄甘竢顯戮慶元中大旱下詔求言知贑州興國縣莊夏上封事曰君者陽也臣者君之隂也今威福下移此隂勝也積隂之極陽氣散亂而不收其弊為火災為旱蝗願陛下體陽剛之徳使後宫戚里内省黄門思不出位此抑隂助陽之術也權禮部侍郎兼侍講許奕亦應詔上言曰國家當以實意行實政活民于死不可責償于禱祠之間而已也蝗至都城然後下禮寺講酺祭孰非王土顧及境而懼偶不至輦下則終不以為災乎又曰權臣之誅也下至閭巷讙聲如雷葢更化之初人有厚望久而無以相逺也此謗讟之所從生又曰内降非盛世事也王璿進狀不實而經營以求倖免裴伸何人驟為帶御器械時應詔者甚衆奕言最為剴切國子博士張虙亦應詔上疏曰上天之心即我祖宗之心數年以來葢有為祖宗所不敢為者凡祖宗之時幾舉而不遂已行而復寢始以人言而從終以國體而回者今皆處之以不疑矣凡祖宗長慮卻顧所以銷惡運遏亂原兢兢相與守之者皆變於目前利便快意之謀矣議者惟知衰靡之俗不可不振起也圯壊之風不可不整刷也抑不知振起整刷之術最難施於衰靡圯壊之後何者元氣已傷而不可再擾人心方蘇而不可駭動也且造楮初欲便民朝廷既以一切之政駴其聽復以一定之價廹之從郡縣之間遂騷然矣監司郡守老成遲鈍者悉屏而不用而取夫新進喜功名者為之見事則風生臨事則痛快事未果集而根本已朘國未有益而民生已困矣凡此皆有累於祖宗仁厚之徳此旱勢之所以彌甚也歴代名臣奏議卷三百八
