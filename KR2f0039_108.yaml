body:
  text: 歴代名臣奏議卷一百八明楊士竒等撰仁民宋孝宗乾道元年施師為臨安府教授用陳康伯薦賜對言歴年屢下詔恤民而恵未加浹陛下軫念惟恐一夫失所郡邑捜求惟恐財賦不集毋惑乎日降絲綸恩不霑被細民既困於倍輸又困於非泛重以嵗惡室且垂罄租不如期積多逋負今明堂肆赦户自四等以下逋自四年以前願悉除免上曰非卿不聞此言詔從之六年汪應辰論愛民六事劄子曰臣竊以自昔人君大有為於天下雖醻酢事變不一而足然皆以畏天愛民為本盖天視自我民視天聴自我民聴愛民乃所以畏天也未有不得乎天而可以成天下之務亦未有不得乎民而能得乎天也自王者之迹熄戰國之君務相傾奪於是孫吳之戰伐儀秦之縱横申韓之刑名法術紛起更進天下為之騷然不寧孟子於此時獨力持仁義之說以救民濟世齊大國也宣王一時賢君也宣王欲辟土地朝秦楚蒞中國撫四夷其志亦大矣孟子乃曰以若所為求若所欲盡心力為之後必有災其所以告宣王者則在於反其本養其民而已夫以天下並争詐謀竒計之所不能下長㦸勁弩之所不能克區區養民之說不㡬於拱揖而救焚乎故當時例以孟子為迂闊而莫之用言既不用則亦莫見其效驗然而後之能一天下者漢髙祖光武也髙祖所任者蕭何何之言曰願大王王漢中養其民以致賢人還定三秦天下可圗也光武所任者鄧禹禹之言曰方今人思明君如赤子之慕慈母古之興者在徳厚薄不以大小蕭何鄧禹之言即孟子之言也世但見髙祖光武征伐四克而不知其得天人之心盖在此而不在彼也恭惟陛下宏規逺畫将以紹復大業底綏四方而於愛養斯民尤致意焉發於詞令見於政事勤勤懇懇無所不用其至固已合乎天矣臣輒不自揆思所以将順聖徳之萬一者其一曰陛下雖有愛民之誠而良法美意推而行之者則在監司郡守今之監司郡守多不實選是以民未必皆被其澤願陛下精擇其人久任其職考覈其課而進退之其二曰獻言進計之人𩔖多捨循常而好紛更盖循常之功未必有可見之迹可喜之事而紛更之說聴其言則美施於事則悖民受其弊常在於此故昔人以謂康濟小民率自中詳乃視聴罔以側言改厥度也其三曰𣙜貨之利今皆數倍於前代州縣或科斂以取辦雖未能蠲減不宜有所増加以重困民力其四曰州縣費用比承平時不翅十倍豈復更有羨餘貪猾之吏往往刻剥進獻頃雖禁止未能盡革自今有犯令者願陛下必行絀罰以明示好惡其五曰收糴糧儲繕修器械之𩔖諸所費用悉宜計其實直給降本錢無使州縣於百姓重賦之外復有此等陪備或更並縁肆為奸利其六曰民竭其財力以養兵矣而又欲以民為兵恐其不足以禦盜而適以為盜也今雖已籍定若免其教閲而約束州縣毋或非時追集違法率斂庻㡬疲瘵之民得以安業凡臣所陳皆係斯民之休戚為甚切臣之見聞思慮所不及者蓋亦不少惟陛下特留聖念使士之誠實之言民之疾苦之狀皆得畢陳於前次第而罷行之以固邦本以承天意天人協應相與為一則為之而成動之而功将無不可者矣應辰知平江府辭朝論養民疏曰臣聞孟子曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也三代之得天下也以仁固已然矣自三代以後分裂擾亂無所不有其能得天下而保守之者亦未有不先得其民也可以見孟子之言為萬世不易之理矣恭惟本朝累聖相承皆以仁恩義澤涵養天下治安久長雖三代有所不及中更變故而民心愛戴有隕無二以能復建中興之業得民之效有如此者陛下以聖徳撫世仁民誠意未嘗不以斯民為念然臣竊謂養民之政雖在今日為甚切而在今日亦為甚難昔周公作無逸以為文王不敢盤于逰田以庶邦惟正之供又曰繼自今嗣王則其無滛于觀于逸于逰于田以萬民惟正之供言上無妄費則下無横斂民之供於上者皆正也今陛下勤勞恭儉固未嘗有逸豫之事惟是艱難以来事緒百出費用數倍是以賦斂煩重禁𣙜嚴宻而國用猶且匱乏雖欲以萬民惟正之供其勢有未可者此養民之政在今日所以為甚難也然而事固有不得已者亦有可已而不已者伏見比年以来進言獻計之人往往不究事之是非不卹民之休戚茍欲以取新立異矜智飾辯徒使凋瘵之民騷動疲敝而其實於國無毫髮之益若此𩔖者蓋未易以一二數陛下試取已行之事夷考而省察之皆無逃於聖鑒矣昔元祐宰相范純仁以為堯舜之治不過知人安民知人則不輕信安民則不妄動小人之情希功好進行險生事妄說利害覬朝廷舉事以求爵賞朝廷若輕信其言則民不安矣國家之敝常必由斯臣竊謂純仁之言明白簡當切於治道伏望陛下於聴言舉事之際審其是非計其輕重而究其本末之叙成敗之效庶㡬事不至於輕發民不至於重困亦以使天下之人知聖主惻怛之意如此而其所不得已而取於民者特勢有所不免爾以陛下之勤勞恭儉至誠不息力行不倦天意益順國勢益强必将併與今日所不得已者次第而蠲減之以幸天下矣臣不勝至願八年權禮部侍郎周必大上奏曰臣竊見陛下以幣券太輕日夜憂之一旦内出積鏹以百萬計為權之之術旬日来軍民既被實恵懽呼之聲徧於行都推是心也豈止以羊易牛而已臣請因聖徳之所及而推廣之臣聞愛民仁也理財義也二者相須初無二說而中外之臣不能深體上心用意或有未善且如中興以来駐蹕二浙踰四十年盖今日根本之地也平時當愛養其力緩急乃深得其心而賦稅供億反重於他路盖四方州縣近則畏監司之刺舉逺則懼上臺之詰責審於舉措莫敢輕發惟近甸官吏則不然或陳其利而掩其害或徇其名而蔽其實凡有獻明稱奉㫖行之吏民以其出於朝廷莫敢違者如近日越婺諸郡以隠漏為名増無實之稅是也竊料陛下特未詳知知則必有以更之矣臣雖書生豈不思邦計未裕而徒為空談然而日侍清光竊歎陛下有養民之徳而有司無體國之風也敢冒昧言之願陛下深詔執事愛惜民力譬如子弟富實他日父兄有不時之須雖竭其囊橐以濟用度夫復何怨不必平居無事驟増科調使懐戚戚也詩曰恵此京師以綏四國惟陛下念焉孝宗時朱熹上奏曰臣竊見諸路提刑司所管拘催州縣經総制錢盖前代之所無而祖宗盛時亦未之有特起於宣和末年倉卒用兵權宜措畫當時建議之臣方且自以為功而其兄聞之乃為哭於先廟以為作俑之禍且及子孫渡江以後雖知其弊然費出愈繁遂不能罷復有増加以至於今乃為大農之經賦有司不復敢有蠲除之議然其始者亦但計其出納多寡之實數而随以取之則事雖失體而未有甚害及紹興中推行經界之法民間違限契約悉出投印故一二年間此錢之額倍於常嵗逮其畢事則便復常數而無復前日之羨矣而一時乃有憸佞掊克之人輒為比較之說以誤朝聴使凡嵗入經総制錢悉以經界之年為額其後雖或知其非義而小變之然猶必使趂及一年所收最多之數至其甚無藝者則雖或災傷年分檢放倚閣苖米稅錢已無所入而所謂經総制錢者版曹総所猶不肯與之蠲除上下相臨轉相逼迫下吏無所措其手足則其勢必至於巧為名色取之於民以求幸免司察之官雖知其然然既利其嵗額之盈則亦不容有所何問顧猶不足以及數則遂不過将新葢舊轉後為前嵗月愈深逋負日積大郡所欠十數萬緡小郡亦不下一二萬數官吏操切日益嚴峻而莫有知其事之本原者臣愚不知州縣之煎熬局促果何日而少紓斯民之歎息愁怨果何時而少息也陛下厚徳深仁愛民如子疾痛苛癢無細不知抑搔按摩無逺不及顧偶未聞此法之弊而已故臣輒敢冒昧以聞伏望聖慈深照本末特詔有司先将災傷年分檢放倚閣苖稅數内所收經総制額盡依分數豁除然後别詔大臣深圗所以節用裕民之術討論經総制錢合與不合立額比較之利病而罷行之以幸天下臣不勝大願禮部貟外郎范成大上奏曰臣伏見比者臣寮有請以福建等路有不舉子之風乞支錢米以濟貧乏陛下推天地好生之徳特從其請恩至渥矣然其間尚有委曲臣請續終其說姑以臣前任處州言之小民以山瘠地貧生男稍多便不肯舉女則不問可知村落間至無婦可娶買於他州計所夭殺不知其㡬檢准紹興八年指揮貧乏姙娠支常平米四斗十五年指揮改支常平米一石又着令殺子之家父母鄰保與收生之人皆徒刑編置賞罰具著如此而此風未殄者盖州縣以常平積欠救過不暇決不敢以此非時發倉支賜既不復行罪名亦不復問臣伏覩去冬聖㫖将諸路常平義倉漏底折欠十七萬八千餘石盡行除放若以此數救不舉之子當活十七萬八千餘人而典吏巨蠧陷失如此陛下尚且置而不問臣決知陛下無所惜於貧乏之家也昔蘇軾知宻州盤量寛剰得數百石專儲以養棄兒是時初無常平給賜之令使軾在今日則推廣上恩當如何哉臣愚欲望聖慈申飭諸路提舉司并州縣長吏有似此風俗之處依累降指揮勘會貧乏如數支賜又須申嚴法禁與之並行并窮山僻縣常平義倉所管數少不了支給定成空文乞令運司倣蘇軾遺意措置寛剰量撥助之每嵗各具支過錢米活過赤子數目奏聞於以滋聖朝仁夀之福衍清廟靈長之休抑又得十年生聚之義惟宸慈軫念成大為敷文閣待制四川置制使又上奏曰臣聞民惟邦本本固邦寧帝興王成未有不得民而能立邦家之基也得民有道仁之而已省徭役薄賦斂蠲其疾苦而便安之使民力有餘而其心油然知后徳之撫我則雖天不能使之變而況蠻夷盜賊水旱之作安能揺其本而輕動哉此甚易知易行而後之論治者往往過計謂天下之大将人人而濟之安得力而給諸於是輕言功利而重言道徳卒之道徳不建而功利亦無聞焉雖然論治者皆以仁民為難而臣今敢以為非難者誠有得於聖主躬行之效小臣将命實親見之者請略詳其目廼者四蜀酒估之患人不聊生陛下睿㫁嵗捐錢五十萬以代之償此令一下五十餘郡驩呼祝聖者沸天隱地旬日皆徧士大夫舞手相慶以謂吾蜀當有數十百年之安臣於是知民之易徳有如此者又如關外和糴之困詔㫖下詢有司未知所出陛下睿斷先免階成和鳳一年之糴異時嵗雖大熟不足輸官淳熙三年免糴令下秋旱薄收而四州粒米狼戾充箱溢筥排門求售較之穰嵗物價反平漕臣行部過之邊氓遮道誦說東向感恩或至涕下臣於是知民之易徳有如此者恭惟聖主端委穆清之上一動其念加諸逺民而萬里之外覿徳丕應㨗如影響微臣不佞愚心了然見王道之易易焉孟子謂保民而王易若折枝而非挾山超海之難不為過論臣拳拳之誠更願帝徳廣運益加聖心深詔内外執事曉然知陛下仁民固本之指凡吾民疾苦悉以上聞茍有可以恵利便安之者勿牽故常臨以睿斷使光天之下至于海隅蒼生罔有不被堯舜之澤如是則衆心成城道徳有威推恩以保四海天下可運諸掌矣其何大欲之不濟哉此陛下躬行之效證於孟軻之言非臣臆說惟聖神財幸李椿通判㢘州未赴召上奏曰臣竊以國家天下譬之一身朝廷腹心也州縣四肢也百姓膏血也使膏血和暢四肢康强腹心寧靜則身安可保矣茍傷其膏血瘁其四肢而曰吾耳目腹心無恙臣不信也孟子有之曰得天下有道得其民斯得天下矣得其民有道得其心斯得民矣仰惟陛下䕶國如䕶元氣愛民如愛赤子今大農不參諸路之虚實監司不卹州縣之匱乏州縣不卹百姓之困窮致百姓心不服縣縣心不服州州心不服監司實有以使然也州縣常賦固有定數非法科敷固有約束諸州有合起月椿大軍錢合椿窠名已自不足又經総制許増不許虧既曰無額上供而復立額州縣官兵諸路上司未嘗計度此州所以心不服監司者也州督財賦於縣或立帳或掛圗或掲貼具縣之合解色目不復問其所自出驅督嚴急縣既被督則亦巧作名色取之於民民或有訴州縣監司不得不公行此縣所以心不服州者也縣道唯財賦辦者為能吏愷悌之政㡬希民之疾苦誰復過而問焉此百姓心不服縣者天下皆是也臣不敢覼縷以溷聖聴且以諸軍揀汰人論之自累年諸軍揀汰使臣軍貟不知㡬何人矣添差分在諸州月増費錢米不審省部監司曽有取會其數奏陳計度者乎建議揀汰疾老者必曰可以減省総領所支遣諸州不必卹此誠建議者存心決非念陛下赤子者也何異殘其膏血四肢自謂無恙者安得卹民心之義哉然則兵老不揀可乎百戰之士不存卹可乎存卹老疾戰士顧念無術今揀汰使臣扶老攜幼近者數百里逺者數千里道路飢困狼狽之狀見者憐之所在州軍闕乏不得請受者十六七既滿之後赴部參選扼以呈試格法久之有所授者闕不下五七年何以為待闕之資不得差注者亦又多矣其所謂存卹徒有其名官司兩受其弊耳已添差在諸州者盖無如之何矣臣愚欲望聖斷令百官集議自今諸軍揀汰人所以存卹久逺可行之理庶㡬有功戰士被其實恵州郡亦可支梧不為小補王質上奏曰臣嘗論之古之為吏者無所忌於民而為民者無所忌於吏吏民不相忌故其情通而氣協情通則無乖阻而氣協則無鬬争古者郡邑之間吏不猜民民不疾吏懽忻怡愉如父子之相信兄弟之相愛平時追呼號召未嘗及於民之門而鞭扑笞箠亦未嘗切於民之肌膚間則出之阡陌勞来相勸以勉其耘耔蠶織之事然其色怡和而不厲其辭委曲而不徑若有以傷民之情者故民之於吏依依切切常有慕戀感恱之意出力以供其衣食雖甚勞而不辭及其無事之時則又為補葺其宫室以庶㡬無虞於風雨鳥鼠之害盖嘗讀詩而至七月之篇則見其吏民之情相親豈弟慈祥無纎毫齟齬扞格之態故曰三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜又曰春日遲遲采蘩祁祁女心傷悲其情亦可見矣以為未也七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘績以為己裳而公子則以𤣥黄貉以為己裘而公子則當以狐狸盖其不敢自愛其身而愛其吏也如此當是時為吏者優游泮渙得以盡其志而為民者謹朴勤厚得以安其生雖有狼戾無親之人咸有恱慕而不肯疾視其上盖自秦商君設法以鬭吏民而其情遂泮渙離散而不可復合而平居吏之視民惴惴然如覩其仇讎故吏得間則肆其忿以毒民而民得間則泄其憤以毒吏盖嘗思之至於秦皇二世之際郡縣之吏屠人之父戕人之子暴虐慘酷假天子之法令以濟其凶及夫劉項勝廣之變則紛然剚刃於郡縣之吏者不可勝數盖其勢之相激不得不然者故臣以為吏民不可使相忌忌則争争則必至於交讎而不可止而後之於天下者不能揉其争之之心而反校以争之之具以趣其鬭其初欲制奸吏而不知其弊或至於長奸吏奸吏未必可制而良吏先受病矣今夫民之訟長吏者使其誠無辜而濫罪則不得不自伸其寃誠過制而横斂則不得不自訴其抑然其間或啗童僕以伺其隂或結胥吏以制其失或陽與之往来而餽遺他日則持之以為不法雖狡猾者未有不墜其計也此其端生於豪强兼并之家恃勢以暴民挾私以屈法多不便於能吏是故必欲擿法捜求而使之去且今之為郡縣之吏者盖亦甚難矣監司不卹郡縣故嘗有不時之須稍緩則符檄紛紜逼切則責急星火權要不卹郡縣故嘗有難應之求稍不如所欲則怒罵陵拂以至於侵淫揺撼以快其志而又加之兼并豪强之民持其短長以逞其詐以肆其横殆非所以保䕶能吏也嗟夫郡縣之間烏能事事盡善而人人無失哉臣愚以謂非有大奸大慝一號令之不審一措置之失當不甚害民而蠧國者則包涵掩覆有以略其過責其效而盡其才使豪民不至於縱其奸而能吏不至於沮其志如是則嵗月而吏民之争庶乎其可息也中書舎人崔敦詩論州郡掊克疏曰臣仰惟陛下聖謨廣大睿略英明雖非淺識所可窺測猶有愚誠庶㡬禆益竊惟國家閒暇之日正是愛養基本之時譬之養身若平居保固氣力使之渾厚則臨事可以支疲勞譬之植木若常時培壅本根使之牢固則一旦可以待風雨此盖理之自然事之必至者也臣竊觀當今州縣之吏頗成掊克之風雖皆以添差歸正増多為言乃實以干寵取民聚斂為事不能體國但務取民徒見强濟之吏因而得名者固多不知奸貪之夫藉以遂私者不少不加痛革浸累至仁臣今略具三事下項一籍沒家財固有成法近来州縣利其所入遂有桀黠之人妄亂指陳以投其意或稱為强盜窩藏或稱非嫡嗣戸絶或侵折場務之本或負欠豪强之財不問何如便皆拘籍朝為富室暮為窮民且人之得罪豈能無寃資財既為官司之破除田産亦為勢力之賤售後雖辨雪難復再還縱使多詞終成無益子孫窮困骨肉散亡干隂陽之和害忠厚之政臣愚欲望睿㫖今後雖於法令合行籍沒除已結正罪犯施行外所有籍沒一節具申提刑司看詳施行仍候一年外方許支用其田産許收利入亦候限滿方許出賣一科罰之禁前後具明近来州縣乃出巧謀其有富室豪家懦子弱弟既捃拾以負犯遂恐嚇以刑名徐令有司開道所欲或倉庫城隍之未備或舎館學校之未全逼使繕修悉令出備𩔖多竭産僅得賠償實出脅持俾稱情願破上戸為下戸壊富民為貧民何嘗朝廷一毫擾民皆是州縣倚法以削臣愚欲望睿㫖今後州縣不許因事逼勒出備修造等事許被苦人越訴将違戾官吏重作施行一受納之弊今日已極徒縁費用之廣須資賦入之贏縱有寛容寧無藝極今乃年年増長第第加添不卹過多悉期取足當受納差官之際須利害切已之人或資考已足許以薦貟或禄廩素微啖之厚利惟知極力豈復顧民既足須求又獻出剰且州既明取其贏以供州縣又明取其贏以供縣兹猶為可復有不然至乃贓吏作邑貪夫主藏同謀一心作弊百計装綱運則可以支多而私收於出境變圭租則可以多糶而傾入於私家是以公私規圗上下剋剥合入米一石今有至二石而可輸合用錢一文或有至兩文而未已更遲以久将又如何况今年嵗豐登榖米狼戾一畆之入不給官輸終嵗之勤尚乖一飽不加措置重困農民臣愚欲望睿㫖今後州縣受納並從轉運司将逐州交互差官仍令所差官依常加耗受納如有過數重取從轉運司覺察按劾許人户越訴其不覺察官司一例重作施行敦詩又論蠲放丁錢米夏稅疏曰恭惟陛下勵精政治仁愛黎元近者嘗有指揮議蠲月樁或折帛錢博謀近臣未有定論致陛下深仁厚澤未即下流臣嘗究其說主月樁者則曰月樁出於州縣寬州縣則是寛百姓然月樁名色實為不一其間亦多州縣合取以供經常固非盡是横斂於民其有常入不足始為一切之計違法經畫求足其額此乃不可盡見今一舉而蠲之此利悉歸州縣使州縣守令一一得人固不患不以寛民然而州縣亦安能一一而居之其間乗其寛裕濟其奸私貪者卷以自歸侈者殖以自豐其黠者則盛苞苴飾厨𫝊以作聲譽何有恵利及於吾民哉此議者又謂月樁之不可蠲也主折帛者則曰和買之不予錢已非其舊今復令折帛夏稅之輸絹固其所有今乃令輸錢此名不正言不順民共苦之其来已久今稍蠲年嵗誠足以紓困窮之民然州縣依法科敷折帛止及上中等户間有違法科至下户者亦少雖所在不齊難以槩論儻一舉而蠲之則誠慮上中等戸僥倖寛恩而下户未盡䝉利此議者又謂折帛之不可蠲也臣嘗謂土地不同議論随異昔熙豐間議役法者不一大率吳蜀之民以雇役為便秦晉之民以差役為宜是時諸臣不能周知四方風俗各執所見迭為勝負今議月樁折帛其意亦然仕江西者親見月樁之害民故以月樁為可蠲仕江東兩浙者親見折帛之害民故以折帛為可予然終非齊一之論也臣竊謂陛下天地父母之恩愛養基本此心之發止欲寛民爾然寛民之道寛小民為上壅水以起横堤之魚不若輸之涸澤以活無窮之鱗投食以飼卧道之虎不若散之窮林以飽無數之羽是故寛小民則所捐者少所利者衆臣竊見諸路身丁錢米及第四第五等人户夏稅皆取之小民者也臣欲望睿慈斷自宸衷取見諸路身丁錢米及第四等或止第五等人户合納夏稅酌量蠲放此不待考核不須詢訪詔㫖一行恵利便及徑截明快無復可議難者或曰如一户有身丁錢米又蠲夏稅却有無身丁錢米處止蠲夏稅良為未均臣謂如一户有身丁錢米又有夏稅許從一多蠲放有何不可乎難者又曰夏稅放至第四等或止放第五等以為利及小民然今有别置户名分寄田産詭為第四等第五等者未必盡皆小民也臣謂國家布恵施仁大為之限若須一一推究極盡殆至不行今就使詭為下戸者不能無之要是及於小民者多矣豈不愈於蠲月樁則利専於公家蠲折帛則幸止於上中戸乎臣竊以國家乂安邊鄙寧静譬如養生寒暑未侵正當護愛於真元又如養木風雨未至尤宜培固於根本是以臣每念恩榮之報多陳恵利之言雖近常談實為切務今誠見陛下仁心徳意廣大宏逺欲卓然施非常之恩而遲徊既久未見布宣是以敢不自揆罄竭所聞伏乞睿慈併下臣章付三省參議施行翰林學士承㫖洪遵乞放免崑山縣隠戸田賦劄子曰臣恭仰陛下以文武剛眀之姿中興大業號令之下無非以元元為念四方萬里涵泳聖徳至深至渥臣竊見平江府管下崑山縣苖米六千五百石有畸頃縁經界逃民隠戸之田皆籍以為數自兹迄今積十九年監司省部前後差官覈實舉知其弊因仍未之革人以為病重惟陛下慈仁為治下之疾苦唯恐不聞聞而行之唯恐不及況朝廷經費固不以數千斛為輕重凡此虚數嵗無斗升之獲奸吏因縁文移督促其害不可勝言欲乞聖裁特為減免以恵一方若或下之中書中書行之户部不過看詳而已則民瘼未易除去伏望睿慈亟賜施行免致重困吾民而實恵溥博誠非小補楊萬里上民政疏曰臣聞民者國之命而吏之仇也吏者君之喜而國之憂也天下之所以存亡國祚之所以長短出於此而已矣且吏何惡於民而仇之也非仇民也不仇民則大者無功而其次有罪罪驅之於後功啗之於前雖欲不與民為仇不可得也是故一政之出上有意而未決則吏贊之上有命而未行則吏先之吏所以贊上之決而先上之行者非贊其便民者也贊其不便於民者爾曷為不贊其便民而贊其不便於民者耶贊其便民者無功而贊其不便於民者則有功也是故政之不便於民者未必皆上之過也朝廷将額外而取一金以問於某土之守臣必曰可也民曰不可不以聞矣不惟不以聞也從而欺其上曰民皆樂輸又從而矜其功曰不擾而集上賦其民以一則吏因以賦其十上賦其民以十則吏因以賦其百朝廷喜其善而不知有破家鬻子之民賞其功而不知有願食吏肉之民吏之肉不足食也功歸於臣怨歸於君利於國者小害於國者大此可悼爾古之人君所以漸致於民散國亡而不悟者皆吏誤之盖夫賦重而民怨此奸雄敵國之資也可不懼哉唐趙贊為一切聚斂之䇿徳宗盡用之及涇卒之變都民散走而賊大呼曰汝曹勿恐不奪汝商貨僦質矣不稅汝間架陌錢矣徳宗亦聞此也乎奉天之圍危於一髮而猶庇趙贊若愛子然夫愛一趙贊而不愛社稷之重忍於圍逼之辱而不忍於誅聚斂之臣其入人之深如此至於反國可以戒矣然趙光竒訴之以和糴害民則不信蘇弁欺之以官市利民則信焉且夫朝廷之政雖聖人豈能盡善惟其思以出之詢以審之見不可而更之斯聖人而已矣何徳宗之難悟也國家軍旅再動盖有不得已而取之於民者然譬之張琴動則急之静則緩之盖動必有静静之則其動必調急必有緩緩之則其急不絶以動繼動以急増急則雖以黄帝五十絃之瑟亦無全絃矣聞之道路往嵗郴寇之作亦守臣和糴行之不善之所致也嘗有以告陛下者乎天下皆知朝廷有意罷此等之役矣雖然臣嘗有聞焉江西之郡盖有甲郡以絹非土産而言於朝乞市之於乙郡者此何謂也民所最病者與官為市也始乎為市終乎抑配是以聖人謹其始也今乙郡之諸邑已有論稅之髙下而科之者矣無一錢償民也民之不願者官且治之名為督責於正租實為隣郡之横斂且有所謂和買者已例為正租矣又有所謂淮衣者亦例為正租矣今又求隣郡之絹是三者之絹與正租之絹為四倍而取之矣民何以堪而吏不以聞惟朝廷亟罷之庶不為斯民不拔之疽根也且無使民言曰此絹自陛下始若曰其如甲郡軍士之寒何然則前乎此者士皆冬而不裘耶且甲郡欲市乙郡之絹何不遣吏私市之何必假朝命而官市之哉此必有奸焉甲郡則出大農之錢且書之曰某日出某錢以市某郡之絹也然某錢不及乙郡之民也此必有私之者矣民何從而訴哉盖民訴於朝廷朝廷下之於州縣州縣執訴者笞之以誣其服又呼其民强使之書於紙曰官有錢償我矣州縣以訴者之所服與民之所書而復於朝廷無以詰也罰一懲百誰敢復言者民有飲恨而已矣晉女叔齊曰何必瘠魯以肥杞聖天子在上而有司不平如此萬里又上疏曰臣聞聖人之於天下惟其有所甚疑是故有所不疑天下㡬路一路㡬州一州㡬邑而聖人以一身臨乎其上以百吏分乎其下夫所謂守令者豈郡龔黄而縣卓魯者耶聖人者将遂以為吏皆能愛吾赤子而吾民皆無疾苦愁嗟者耶欲不疑而不得也聖人則有所不疑者矣盖人不可以盡信亦不可以盡不信盡信則天下之奸有所蔽盡不信則天下之人皆無可寄者聖人者擇天下之有可寄以察天下之有所蔽是故深居九重而見民之肥瘠於四海之外優游岩廊而聞民之歌哭於大山長谷之間唐虞之牧西京之部刺史唐之十道使今之提轉刺舉之監司皆天子之所寄以不疑者雖然今之監司疑則不疑矣無乃太不疑耶臣聞之先儒蘇軾曰養猫以去鼠不可以無鼠而養不捕之猫養犬以防奸不可以無奸而養不吠之犬夫不捕不吠之猫犬不過無功而已未有大害也然已在所不養今則不然猫與鼠同乳而犬與盜揺尾矣欲望其止於不捕不吠而不可得也朝廷亦嘗留意乎盖監司之於州縣有所不敢問有所不暇問有所不復問某郡之守嘗為侍從也則監司幸其復為侍從而有所求某郡之守嘗為臺諫也則監司懼其復為臺諫而有所撃至於縣令之與在朝某官有姻有舊者皆不敢問民訴某守則執其人封其辭以送某守民訴某令則下其牒以與某令是為守令報讎也守令從而甘心焉後有寃者夫誰敢自言此之謂不敢問朝廷舊嵗免和糴而江西之州有因秋租而每斛敷和糴十之二者朝廷罷兵再嵗而舊嵗江西之縣有督馬榖如星火者大旱不粒而不末減飢民流徙而不知恤監司視之亦如秦越也此之謂不暇問郡縣之胥憑守令之寵以暴吾民民訴之者若拔山然盖監司既庇其守令則併庇其胥此之謂不復問朝廷以監司為可信安知其不可信聖人之為天下不使民有所怒而不洩則其怒有當之者怒而不洩者惟無發也一發則必極於大亂而不可止君相之於監司盍亦如唐開元之精擇採訪使而又專責臺諫以督察之嵗取其功罪之尤者明著之以示天下而不次陞黜一二人焉以聳其懦臺諫急則監司警監司警則郡縣肅庶㡬民怒之少洩不至於一旦如潰洪河洪蟻壤也蔡戡乞戒諭守令恤民疏曰臣觀周官大司徒之職以保息六養萬民曰恤貧曰安富夫單産貧民固在矜恤富家大室猶欲全安之者盖君民相通富藏於民故也今州縣之間一嵗所入可自供一嵗之費茍能吝出納謹閉藏察奸弊何至匱闕庸繆者既失於理財能者又急於生財理財之政不修則用度乏生財之說一行則民力斃故大則搏噬富家小則漁獵細民以此為能更相𫝊授恬不為怪富家大室一麗於法喜動顔色如得竒貨詞所連染追逮係纍捜摘隠微强伏其罪輕者出金以贖動輒千緡重者詆以深文籍其貲産或幸免於戾不復興詞或已破其家無力控訴為守令者方且自謂得計比年以来所在富家大室衰替無㡬職此之由縣令又以催科為名侵擾下戸常賦既足猶以為逋一吏持片紙列戸數十皆斗升尺寸之餘比屋誅求殆無遺者盖一履公門其費數倍罪責且及人以所取微細惟命是承一嵗之中或至於再積其所入盖亦不貲以至受納加耗率二石而可足一石科買物色直千金而僅支百金沮格詔書催理已蠲之租違戾法令預借将求之賦日朘月削富者反貧貧者愈困斯民愁恨歎息有不忍聞夫聚財斂怨以供公上之求以給縣官之費猶且不可而況飾廚傳事苞苴興無益之工縱無厭之慾貪者或席卷而歸郡守縣令所望於承流宣化愛養元元乃反為民害如此而謂之能得乎夫所貴於能者以其有非常之用而賦不益辦難能之事而人不知儻以聚斂為能人孰不能哉今之所謂能吏古之所謂民賊也可不痛戒而深懲之乎欲望聖慈因郡守陛辭丁寧訓諭使之布宣徳意以恤民為先仍詔諸路監司常切體察茍有違戾許之越訴重寘典憲如是則陛下赤子得安田里而家給人足之風可以馴致戡又論擾民四事疏曰臣聞昔者趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保鄣乎簡子曰保鄣哉尹鐸損其戸數若鐸者可謂知所本矣盖邦以民為本本固則邦寧善治之君不求所以保邦之術而盡吾所以恤民之道未有民不寧而邦寧者也横賦重斂剥其肌膚殫其膏血民力斃矣其如邦何況陛下欲恢圗中原東南根本之地尤當愛恤民力常賦之外不宜以毫髪擾之比年以来擾民之事盖非一端夫造甲所以修戎器也要當優給其費少寛其期不唯工役暇裕自然製作堅好今也日課一甲何乃急迫如是況一甲之費大約五十千而縣官所給止十五千則州郡日費三十五千以嵗計之為錢一萬二千六百緡大郡事力尚可支持兩淮彫弊之郡川廣淺陋之邦何所從出不過州責之縣縣科之民又況程限督促甚於星火或有愆期追逮纍繫捶掠繼之民安得不困乎此造甲之擾一也夫和糴所以備先具也要當官自為場視時直之髙下而稍增之痛戢吏胥侵漁之奸則人将負擔而至矣今也量立價直半以楮幣州郡知其不相若也於是並縁為奸次第而敷之民中人之家輸賦償逋之餘盖亦無㡬欲為卒嵗之計乃盡取之貧者剔屋起債轉糴以輸不酬其直不恤其有無名曰和糴其實强取民安得不困乎此和糴之擾二也瀕江沙田所産微細自来人戸以為已業輸納稅錢一昨朝廷委官根括盡行起租比之曏者之數不啻數倍富家破壊他産不足以償貧者唯有流徙而已陛下灼知其弊嘗因肆赦俾民自陳如其已業即以還之州縣觀望建議之臣往徃沮格不行民無所訴此沙田之擾三也沿江十郡拘籍鄉民教閲逺者来自數百里近者百里留滯數月妨廢農務而人置軍装造兵噐房賃屝屨之資動費百千𩔖多少年不逞之輩乗時詐取父兄財物嬉逰城市數月而去一旦緩急必不為用無補於事徒傷民力此鄉兵之擾四也以至州縣不時之須無名之斂不可悉數水旱流離之餘何堪以此重擾乎今堯舜在上而恩澤不得下流民情不得上達由功利之臣征求不已偷惰之吏奉行不䖍故也欲望陛下愛惜民力以固根本發徳音下明詔戒飭州縣之吏使之上體陛下徳意以愛養斯民為先造甲未辦者少寛其期和糴未足者多與之直沙田則漸行起租鄉兵則權罷教閲凡有擾民之事日求而去之東南之民得以息肩根本既固陛下一意外攘庻㡬無南顧之慮集英殿修撰帥福建趙汝愚論福州便民事疏曰準淳熙重修令諸守臣到任及半年以上具的實民間利病或邊防事件須至奏聞者一契勘本州元有西湖在城西三里迤邐並城南流接大壕通南湖瀦蓄水澤灌溉民田事載閩中記甚詳父老相傳舊時湖周回十數里天時旱暵則發其所聚髙田無乾涸之憂時雨泛漲則泄而歸浦卑田無渰浸之患民不知旱勞而長享豐年之利後来人戸夤縁請射嵗納些小課利謂之池戸官中但見其絲毫之入而不知其民戸永逺之害嵗月浸久填淤殆盡各立封畛以為已物或塞為魚塘或築成園圃甚至於違法立券相售如祖業然西湖南湖不復相通而古人積水利民之地盡為豪民猾戸所有雖有潮水不住往来而上下阻隔無由通濟臣照得本州地狹人貧全仰嵗事豐登田疇廣殖小有荒歉難以支吾況此並湖彌望盡是負郭良田自從水源障塞之後稍遇旱乾則西北一帶髙田凡數萬畆皆無從得水至春夏之交積雨霖淫則東南一帶低田發泄遲滯皆成巨浸致使一方人户白納稅租而所謂池户者公然坐享重利第以圭撮償官其為利害大不相侔矣今来若不申明朝廷誠恐向後轉見湮廢難以興復並湖之民永被其害欲乞聖慈特降指揮行下本州告示有田之家許於農事之隙稍循舊跡開浚令附城為壕上下流注雖未能盡復古来丈尺庶㡬西湖與南湖通接負郭之田盡沾水利而長享有年之效兼照得本州舊無放生池如䝉朝廷許從今来所請仍乞将上件西湖至南湖一帶盡充本州放生池禁止採捕仰祝兩宫無疆之夀其每嵗不過捐本州公使庫所入池戸花利錢數百緡而為一方人戸無窮之利且與戸部諸司錢物全不相妨無損於公有濟於私誠非小補一竊見比年瀕海去處間多盜賊臣嘗推究其原皆縁州縣官吏相承趣辦財賦不復究心寛卹細民致彼衣食不充冒法輕生無所不至臣照得本州管下場務稅額重處福清縣有海口鎮務長溪縣有黄﨑鎮務二鎮皆僻在海隅數十年前人煙繁盛舟船凑集故二鎮稅額不勞而辦自海口鎮為海賊劉臣興焚爇之後居人星散市井蕭條而黄﨑鎮尤號迂僻民物皆非其舊然而二鎮稅額尚存無縁登足臣因考究簿書見二鎮比年收趂本州及諸司錢數𩔖皆不及元額然其督責追呼無時無之夫以昔時商賈之盛則凡所稅者皆當稅之物民力尚可堪耐今以蕭條焚爇之餘而欲辦往時之稅彼若不肆意一切誅取何以逭一時之責臣歴詢海濵之地皆前臨大壑背負髙崖土多斥鹵難於種藝惟藉魚鹽採捕以為生業今二鎮官吏以上司督責之切故誅取例在此曹凡日用瑣碎譏察殆盡此曹平時寃憤無告一旦偶有桀黠者出而號召之則彊力者皆盜賊其弱而無能者皆耳目也且如今春海賊吳郎嘯聚成黨凡㳂海捕盜官司莫或遑處贏糧發帑惟恐乏興今若不窒其源他時意外生事課其所費與稅額所得孰多孰寡臣今欲乞将海口黄﨑二鎮稅自淳熙五年至九年凡五年所收到課利酌中立為定額免致過有追呼責辦然後從本州嚴行約束開具曉示不令搔擾庶㡬海濵細民稍獲安業儻不為蠲減舊額而虚行檢束之令亦恐徒為文具無以取信於民如䝉聖慈矜允即乞行下本州與諸司通議不惟細民仰沾聖徳而區區徙薪曲突之䇿庶有取焉汝愚乞告戒監司郡守求裕民之術疏曰臣仰惟陛下臨御以来甚重刺史縣令之選凡所以加恵元元為國家深長之計非獨使之趣辦於一時也比嵗州縣之間調度滋廣為吏者不能仰體陛下選任之意日汲汲焉惟以巧取横斂為事年増嵗益名數非一至於民之休戚利病則一切視為不急之務雖一旦之訟有積十數嵗而不決者問其故則曰方治財賦奚暇他事為監司郡守者亦曰彼郡彼邑財賦既辦尚何求哉上下相師恬不為怪然則陛下何賴焉生民何望焉孟子曰善政得民財善教得民心又曰無政事則財用不足信斯言也其為本末先後之序盖必有道矣臣愚欲望陛下特降詔書丁寧告戒諸道監司郡守俾各勤求所以裕民之術具奏来上陛下擇其可者次第行之申飭刺史縣令有不以詔書從事者必罰無赦庶㡬疲俗可甦和氣可召天下幸甚汝愚又乞免除拆居民屋宇疏曰臣去嵗䝉恩賜對嘗論君人之道惟務廣恩人臣之義以勞任事是時頗䝉陛下開納其後都城内外相繼有拆屋事人情擾擾然在當時百姓皆知秪是吳淵韓彦質所為及韓彦質移知平江所至人情感恱意謂朝廷灼知其害不復更議除拆今五閲月矣若因臨安府陳乞展限朝廷明降指揮更與展兩月限雖自陛下寛恩然自此行下本府便須徧行曉諭道路相𫝊數郡之民不無擾動恐非朝廷事體深為未便臣愚伏望聖慈特與收還成命當此青黄未接之際惟以慰安人情此實國家中興之本若夫除道路治橋梁盖是有司之職異時因事為之固未為晩臣一介孤逺仰䝉陛下深知惟思補報茍懐所見不敢不盡惟陛下裁察幸甚幸甚汝愚又乞置総首統轄金洋州歸正人疏曰臣近據通判遂寧府張亨劄子稱金州上津縣管下鄉村有忠義歸正人戸散漫居止昨来朝廷以其忠義来歸給撥官田佃種各令養贍其家若夏秋豐稔可以養生即自安業稍有飢饉便致流亡盖縁無人為之摠統或有飢貧失所各去州縣遥逺何由伸訴乞從本司行下本縣敦請内有信義衆所推服之人數名為之總首當官勸諭因今来賑濟之際各将諸村人戸姓名住止去處以地里逺近合係某人為總首如各處人戸遇有荒歉貧乏不給之家并有合伸訴事件即仰就本總首陳訴即自本總首具申州縣優加存恤不令失所候将来取見合充忠義總首人數乞從本司先次支給犒設一次併令本州按月量與支破食錢庶㡬人肯盡心統轄所有洋州真符縣亦乞準此勸諭如或可行乞行下兩州施行臣詢訪得金州上津縣洋州真符縣多有歸正人在兩縣管下近邊去處散漫居止縁所居處乃古商於之地其地險逺其土荒瘠設遇雨暘時順所收已自不多小有水旱之災其人便覺狼狽又縁邊頭去州縣絶逺百姓殆與官吏相忘下情無以上通上恩不得下達或有飢饉便自流移去就之間事闗利害臣今據張亨前項劄子所陳利害頗合事宜兼臣照得張亨亦是北来歸正之人久在金州居住熟知彼中人情事體又其人忠信慤實臨事審詳臣見委本官前去兩州㸃檢賑濟事臣因就委本官同兩州守臣相度措置候到别具奏聞外伏望聖慈特賜處分如以其言可採伏乞指揮行下本司以憑施行汝愚為江西轉運判官上疏曰臣昨陛辭日親奉處分令臣到江西日講究裕民事件候到任半年後奏来兼看民力比之紹興三十二年以前如何臣恭聞聖訓不勝震懼深惟綿薄顧無以仰承徳意夙夜惟念畢竭愚慮竊謂自昔堯舜三代歴秦漢魏晉隋唐以迄於今其間所遇之主昏明愚聖雖各不同要之未有得民心而弗永厥世不得民心而能享國長久者也我國家列聖相承所以固結人心者至深至厚故上天眷命篤生聖主日孳孳然咨訪民瘼惟恐不至顧如臣輩一介微陋猶丁寧訓戒俾得自竭况道徳名位踰臣數等者乎臣深自慶幸以為我宋億萬年之基業實積於陛下宸衷方寸之地是為宗社之福天下生靈之幸也況臣賤職有守其或效涓塵之助者臣敢不昧死以聞臣伏自到任以来不住詢訪民間利害及今来巡歴所至有可以寛裕民力者本司随事斟酌輕重次第罷行獨有諸縣措置月樁錢物其間名色𩔖多違法最為一方細民之害臣試舉其大者則有曰麴引錢白納醋錢賣紙錢戸長甲帖錢保正牌限錢折納牛皮筋角錢兩訟不勝則有罰錢既勝則令納歡喜錢殊名異目在處非一臣嘗詢究盖已累經朝廷指揮及前後監司約束住罷矣大扺𩔖能力制於一時而不能保無於後日其弊正如鼠穴左固則右逸也至詰其所從出入則首以月樁無科名循例措置為辭甚者奸贓之吏又並縁掊刻以濟其私預於簿書之間隂為抵讕之計有司熟視不可稽考其間設有能自植立整齊紀綱者則往往窘於調度拘攣牽制困不得逞其豪宗大姓因得持是數者挟持官吏以漁獵細民流弊萬端不可殫述其原則始於月樁太重而已臣不勝忿懣因盡考諸縣月樁出納之數及其初科降之目與夫前後因革之制觀之其始盖縁江淮用兵供億數萬朝廷深恐一時乏事遂令本路計月樁辦大軍錢物而月樁之名始立然其時降到旁通式内猶許先取無額經制錢不足方取上供錢又不足則取諸司封樁錢其後又増置贍軍七分酒息錢其餘不以有無拘礙錢物皆許移用甚至急闕則朝廷以時支降茶引度牒之𩔖以濟之是時兵火之初所在皆有餘積公私未告病也今諸司封樁固不得用而無額經制錢州縣皆有定額不盡分𨽻月樁此外所存名目惟上供錢及七分酒息錢二種而已其餘盖盡以取足於州縣也況夫比年以来州縣用度日廣財賦日蹙所以予之者嵗益加少謂如諸州科撥二稅與諸縣贍用之𩔖而取之者嵗益加多謂如増收頭子錢勘合錢閏月坊場錢之𩔖非作法以取諸民則何以哉臣嘗略計本路月樁之數每嵗為緡錢七十萬而格外所人者半之雖其間亦有𫝊致文法者大抵法外之斂什常三四也今朝廷縱未能大有蠲除以盡掃宿弊臣謂宜令有司擇其間最重者稍振恤之且袁與筠接壤也其地望同其賦入同而月樁輕重不齊至於五倍筠一州三縣嵗額之數曽不及袁之一邑之多也故袁之麴引錢嵗取於民者為緡三萬而㳂納旁取之數不與焉今夫天子明聖憂民如此而民之困於征斂如彼故臣以謂陛下不聞則已誠使陛下聞之盖如赤子匍匐将入井之時其必惻然動於中矣臣伏觀陛下即位以来焦勞勤儉雖乗輿服御未嘗有毫髮妄費至於減租蠲賦之令為民而下者盖前後相望也即位之六年減福建鹽課為緡錢數十萬七年減折帛之半為緡錢三百餘萬十四年減四川酒課重額為緡錢四十七萬以至減饒之天申金徽之上供絹臣所不知者又不知其㡬千萬也顧江西十一郡之民生齒數百萬獨以月樁之故重困如此是豈陛下愛民之本意哉臣愚伏望聖慈特賜詳酌行下本路取見諸州軍縣月樁最重去處随其事力輕重量與蠲減然後重禁官吏之妄取横斂者将一二人重置於法以厲其餘孰敢不退聴也是誠拔本塞源之計惟陛下斷自宸𠂻指揮施行幸甚幸甚歴代名臣奏議卷一百八
