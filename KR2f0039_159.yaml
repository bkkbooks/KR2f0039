body:
  text: 歷代名臣奏議卷一百五十九明楊士竒等撰建官商湯問伊尹曰三公九卿大夫列士其相去何如伊尹對曰三公者知通於天道應變而不窮辨於萬物之情通於天道者也其言足以調隂陽正四時節風雨如是者舉以為三公故三公之事常在於道也九卿者不失四時通於溝渠修堤防樹五榖通於地理者也能通不能通能利不能利如此者舉以為九卿故九卿之事常在於德也大夫者出入與民同衆取去與民同利通於人事行猶舉繩不傷於言言之於世不害於身通於關梁實於府庫如是者舉以為大夫故大夫之事常在於仁也列士者知義而不失其心事功而不獨專其賞忠政強諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道德仁義定而天下正凡此四者明王臣而不臣湯曰何謂臣而不臣伊尹對曰君之所不名臣者四諸父臣而不名諸兄臣而不名先王之臣臣而不名盛德之士臣而不名是謂大順也湯問伊尹曰古者所以立三公九卿大夫列士者何也伊尹對曰三公者所以參五事也九卿者所以參三公也大夫者所以參九卿也列士者所以參大夫也故參而有參是謂事宗事宗不失外內若一漢成帝綏和二年丞相翟方進等奏言春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準臣請罷刺史更置州牧以應古制從之乃置州牧秩二千石哀帝建平二年丞相朱博又奏言部刺史秩卑賞厚勸功樂進前罷刺史更置州牧秩真二千石九卿缺以高第補其中材則茍自守而已恐功效陵夷姦軌不禁臣請罷州牧置刺史如故從之東漢桓帝延熹中宦官方盛任人充塞司空周景與太尉楊秉上言內外吏職多非其人舊典中臣子弟不得居位請皆斥罷帝從之于是條奏牧守以下五十餘人或死或免天下肅然靈帝中平五年太常劉焉見王室多故建議以為四方兵寇由刺史威輕且用非人所致宜改置牧伯選清名重臣以居其任會刺史郤儉賦斂煩擾謡言遠聞而耿鄙張懿皆為盜所殺朝廷遂從焉議選尚書列卿為州牧各以本秩居任州任之重自此始魏齊王嘉平中時校事放橫黃門侍郎程曉上疏曰周禮云設官分職以為民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴於是並見聖哲樹之風聲明試以功九載考績各修厥業思不出位故欒書欲拯晉侯其子不聽死人橫於街路丙吉不問上不責非職之功下不務分外之賞吏無兼統之勢民無二事之役斯誠為國要道治亂所由也遠覽典志近觀秦漢雖官名改易職司不同至於崇上抑下顯明分例其致一也初無校事之官干與庶政者也昔武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然撿御有方不至縱恣也此霸世之權宜非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察宫廟下攝衆司官無局業職無分限隨意任情惟心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以􅢽詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚群姦以為腹心大臣恥與分勢含忍而不言小人畏其鋒芒鬱結而無告至使尹模公於目下肆其姦慝罪惡之著行路皆知纎惡之過積年不聞既非周禮設官之意又非春秋十等之義也今外有公卿將校總統諸署內有侍中尚書綜理萬機司𨽻校尉督察京輦御史中丞董攝宫殿皆高選賢才以充其職申眀科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠校事區區亦復無益若更高選國士以為校事則是中丞司𨽻重增一官爾若如舊選尹模之姦今復發矣進退推算無所用之昔桑𢎞羊為漢求利卜式以為獨烹𢎞羊天乃可雨若使政治得失必感天地臣恐水旱之災未必非校事之由也曹恭公逺君子近小人國風託以為刺衛獻公舍大臣與小臣謀定薑謂之有罪縱令校事有益於國以禮義言之尚傷大臣之心況姦回暴露而復不罷是衮闕不補迷而不返也於是遂罷校事官晉武帝時議省州郡縣半吏以赴農功光祿大夫荀勗議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之於本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化篤義行崇敦睦使昧寵忘本者不得容而偽行自息浮華者懼矣重敬讓尚止足令賤不妨貴少不陵長逺不間親新不間舊小不加大淫不破義則上下相安遠近相信矣位不可以進趣得譽不可以朋黨求則是非不妄而明官人不惑於聽矣去竒技抑異説好變舊以徼非常之利者必加其誅則官業有常人心不遷矣事留則政稽政稽則功廢處位者而孜孜不怠奉職司者而夙夜不懈則雖在挈瓶而守不假器矣使信若金石小失不害大政忍忿悁以容之簡文案略細苛令之所施必使人易視聽願之如陽春畏之如雷震勿使微文煩撓為百吏所黷二三之命為百姓所饜則吏竭其誠下悅上命矣設官分職委事責成君子心競而不力爭量能授任思不出位則官無異業政典不姦矣凡此皆愚心謂省事之本也茍無此愆雖不省吏天下必謂之省矣若欲省官私謂九寺可并於尚書蘭臺宜省付三府然施行歷代世之所習是以久抱愚懷而不敢言至於省事實以為善若直作大例皆減其半恐文武衆官郡國職業及事之興廢不得皆同凡發號施令典而當則安儻有駁者或致壅否凡職所臨履先精其得失使忠信之官明察之長各裁其中先條上言之然後混齊大體詳宜所省則令下必行不可搖動如其不爾恐適惑人聽比前行所省皆須更輒復或激而滋繁亦不可不重也宋文帝元嘉末議省録尚書揚州治中從事史沈懷文上議曰昔天官正紀六典序職載師掌均七府成務所以翼平辰衡經贊邦極設總屬之原著夫官典和統之要昭于國言夏因虞禮有深冢司之則周承殷法無損掌邦之儀用乃調佐王均緝亮帝度而式憲之軌𢎞正漢庭述章之範崇明魏室雖條録之名立稱于中代總釐之實不愆于自古比代相沿歷朝罔二及乎爵以事變級以時改皆興替之道無害國章八統元任靡或省革按台輔之職三曰禮典以和邦國以統百官四曰政典以平邦國以正百官鄭康成云冢宰之于庶僚無所不總也考于兹義備于典文詳古準今不宜虗廢不從後魏宣武帝時黃門中正甄琛上表曰詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盜竊世祖太武皇帝親自發憤廣置主司里宰皆以下代令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都以來天下轉廣四遠赴會事過代都五方雜沓難可備簡寇盜公行劫害不絶此由諸坊混雜釐比不精主司暗弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之今擇尹既非南金里尉鉛刀而割欲望清肅都邑不可得也里正乃流外四品職輕任碎多是下才人懷茍且不能督察故使盜得容姦百賦失理邊外小縣所領不過百戶而令長皆以將軍居之京邑諸坊大者或千戶五百戶其中皆王公卿尹貴勢姻戚豪猾僕𨽻蔭養姦徒高門邃宇不可干問又有州郡俠客蔭結貴遊附黨連羣陰為市劫比之邉縣難易不同今難彼易此實為未愜王者立法隨時從宜改絃易調明主所急先朝立品不必即定施而觀之不便則改今間官靜任猶聽長兼況煩劇要務不得簡能下領請取武官中八品將軍已下幹用貞濟者以本官俸恤領里尉之任各食其祿高者領部尉中者領經途尉下者領里正不爾請少高里尉之品選下品中應遷之者進而為之則督責有所輦轂可清也隋文帝初即位時天下州郡過多河南行臺兵部尚書楊尚希上表曰自秦并天下罷侯置守漢魏及晉邦邑屢改竊見當今郡縣倍多於古或地無百里數縣並置或戶不滿千二郡分領具寮以衆資費日多吏卒入倍租調歲減清幹良才百分無一動雖數萬如何可覓所謂民少官多十羊九牧琴有更張之義瑟無膠柱之理今存要去間併小為大國家則不虧粟帛選舉則易得賢才敢陳管見伏聽裁處帝覽而嘉之唐太宗貞觀七年時尚書省詔敕稽壅桉成復下彌年不能決治書侍御史劉洎言尚書萬機本貞觀初未有令僕職併務繁左丞戴胄右丞魏徵應事彈舉無所回撓百司震肅不敢懈比者勳親在位品非其任功勢相傾雖欲自強先懼囂謗故郎中默奪惟事咨稟尚書依違不得專裁管轄玩弛綱紀不振今宜精選左右丞兩司郎中使皆得人非惟救曠滯之弊固當矯拂趨競也上嘗謂房玄齡等曰致理之本惟在於審量才授職務省官員故書稱任官惟賢才又云官不必備惟其人若得其善者雖少亦足矣其不善者縱多亦奚為古人亦以官不得其人比于畫地作餅不可食也詩曰謀夫孔多是用不集又孔子曰官事不攝焉得儉且千羊之皮不如一狐之腋此皆載在經典不能具道當須更併省官貟各當所任則無為而理矣卿宜詳思此理量定庶官員位玄齡等由是所置文武總六百四十員太宗從之因謂玄齡曰自此儻有樂工雜類假使術逾儕輩者只可特賜錢帛以賞其能必不可超授官爵與夫朝臣君子比肩而立同坐而食遣諸衣冠以為恥纍時故事軍國重事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黃門侍郡駁正之至是上謂王圭曰國家本置中書門下以相檢察正以人心所見互有不同茍論難往來務求至當捨己從人亦復何傷比來或護已短遂成怨隙或避私怨知非不正順一人之顔情為兆民之深患此乃亡國之政煬帝之世是也當時羣臣如此必自謂有智禍不及身及天下大亂家國兩亡其幸免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也後又謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比來惟睹順從不聞違異若但行文書則誰不可而何必擇才也房玄齡等皆頓首謝肅宗時諸州悉帶團練使中書侍郎同中書門下平章事楊綰奏刺史自有持節諸軍事以掌軍旅司馬古司武所以副軍即今副使司兵參軍今團練判官官號重復可罷天下團練守捉使詔可又減諸道觀察判官貟之半復言舊制刺史被代若别追皆降魚書乃得去開元時置諸道採訪使得專停刺史威柄外移漸不可久其刺史不稱職若贓負本道使具條以聞不得擅追及停而刺史亦不得輒去州詣使所如其故闕使司無署攝聽上佐代領帝善其謀于是高選州上佐定上中下州差置兵貟詔郎官御史分道巡覆德宗建中初河朔兵拏戰民困賦無所出戶部侍郎判度支杜佑以為救敝莫若省用省用則省官乃上議曰漢光武建武中廢縣四百吏率十署一魏太和時分遣使者省吏員正始時并郡縣晉太元省官七百隋開皇廢郡五百一貞觀初省內官六百貟設官之本以治衆庶故古者計人置吏不肯虛設自漢至唐因征戰艱難以省吏員誠救弊之切也昔咎繇作士今刑部尚書大理卿則二咎繇也垂作共工今工部尚書將作監則二垂也契作司徒今司徒戶部尚書則二契也伯夷為秩宗今禮部尚書禮儀使則二伯夷也伯益為虞今虞部郎中都水使者則二伯益也伯冏為太僕今太僕卿駕部郎中尚輦奉御間廄使則四伯冏也古天子有六軍漢前後左右將軍四人今十二衛神䇿八軍凡將軍六十貟舊名不廢新資日加且漢置别駕隨刺史巡察猶今觀察使之有副也參軍者參其府軍事猶今節度判官也官名職務直遷易不同爾詎有是實哉誠宜斟酌繁省欲致治者先正名神龍中官紀蕩然有司大集選者既無闕員則置貟外官二千人自是以為常當開元天寶中四方無虞編戶九百餘萬帑藏豐溢雖有浮費不足為憂今黎苖凋瘵天下戶百三十萬陛下詔使者按比才得三百萬比天寶三分之一就中浮寄又五之二出賦者已耗而食之者如舊安可不革議者以天下尚有跋扈不庭一省官吏被罷者皆往託焉此常情之説類非至論且才者薦用不才者何患其亡又況顧姻戚家産哉建武時公孫述隗囂未滅太和正始太元時吳蜀鼎立開皇時陳尚割據皆羅取俊乂猶不慮失人以資敵今田悅輩繁刑暴賦惟軍是恤遇士人如奴固無范睢業秦賈季強狄之患若以習久不可以遽改且應權省别駕參軍司馬州縣額內官約戶置尉當罷者有行義在所以聞不如狀舉者當坐不為人舉者任參常調亦何患哉如魏置柱國當時宿德盛業者居之貴寵第一周隋間授受已多國家以為勳級才得地三十頃耳又開府儀同三司光祿大夫亦官名以其太多回作階級隨時立制遇弊則變何必因循憚改作邪議入不省德宗立鋭于治建中三年詔中書門下兩省分置待詔官三十以見官故官若同正試攝九品以上者視品給俸至稟餼幹力什器館宇悉有差𣙜公錢收子贍用度史館修撰沈既濟諫曰今日之治患在官煩不患員少患不問不患無人兩省官自常侍諫議補闕拾遺四十員日止兩人侍對缺員二十一員未補若謂見官不足與議則當更選其人若廣聰明以收淹滯先補其缺何事官外置官夫置錢取息有司之權制非經治法今置員三十大扺月費不減百萬以息準本須二千萬得息百萬配戶二百又當復除其家且得入流所損尤甚今關輔大病皆言百司息錢毁室破産積於府縣未有以革臣計天下財賦耗斁大者惟二事一兵資二官俸自他費十不當二者一所以黎人重困杼軸空虛何則四方形勢兵未可去資費雖廣不獲已為之又益以間官冗食其弊奈何藉舊而置猶可若之何加焉事遂寢時李泌請復所減州縣官上曰置吏以為人也今戶口減于承平之時而吏員更增可乎泌對曰今戶口雖減而事多于承平且十倍故吏不得不增且所減皆有職事而冗官不減此所以為未當也至德以來置額外官敵正官三分之一若聽使計日得資然後停加兩選授同正貟官如此則不惟不怨兼使之喜矣又請諸王未出閣者不除府官上皆從之憲宗元和六年檢校兵部尚書兼中書侍郎同中書門下平章事李吉甫疾吏員廣繇漢至隋未有多于今者乃奏曰方今置吏不精流品厖雜存無事之官食至重之稅故生人日困冗食日滋又國家自天寶以來宿兵八十餘萬其去為商販度為佛老雜入科役者率十五以上天下常以勞苦之人三奉坐待衣食之人七而內外官仰奉廩者無慮萬員有職局重出名異事雜者甚衆故財日寡而受祿多官有限而調無數九流安得不雜萬務安得不煩漢初置郡不過六十而文景幾三王則郡少不必政紊郡多不必事治今列州三百縣千四百以邑設州以鄉分縣費廣制輕非致化之本願詔有司博議州縣有可併併之歲時入仕有可停停之則吏寡易求官少易治國家之制官一品奉三千職田祿米大扺不過千石大厯時權臣月奉至九千緡者州刺史無大小皆千緡宰相常衮始為裁限至李泌量間劇稍增之使相通濟然有名在職廢奉存額去間劇之間厚薄頓異亦請一切商定乃詔給事中殷平仲中書舍人韋貫之兵部侍郎許孟容户部侍郎李絳參閲蠲減凡省冗官八百員吏千四百員敬宗寶厯五年上以太廟兩室破漏踰月不葺罰將作度支宗正俸命中使帥工徒葺之補闕韋溫諫曰國家置百官各有所司茍為墮曠宜擇能者代之今曠官者止於罰俸而以其事委之內臣是以宗廟為陛下所私而百官皆為虛設也上善其言即命有司葺之武宗會昌中李德裕請增諫議大夫等品秩狀曰臣據大唐六典隋氏門下省置諫議大夫七人從四品下今正五品上自大厯二年升門下中書侍郎為正三品兩省遂闕四品建官之制有所未備謹按左氏傳云衮職有闕惟仲山甫補之能補過也仲山甫則周之大臣漢書汲黯稱願出入禁闥補過拾遺後漢書張衡為侍中嘗居帷幄從容諷諫拾遺左右此皆大臣之任故其秩峻其任重則君敬其言而用其道況謇諤之地宜有老成之人秩不優崇則難用耆德其諫議大夫望依隋氏舊制升為從四品分為左右以備兩省四品之闕向後與丞郎出入迭用以重其選德裕又請復中書舍人故事狀曰伏見天寶以前中書舍人六員除幾密遷授之外其他政事皆得商量宰臣姚崇奏云事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣既是官長望于狀後略言事理優劣奏聽進止自艱難以來務從權便政頗去於臺閣事多係於軍期決遣萬幾專在宰弼伏以陛下神武功成昧旦思理精核庶政在廣詢謀詩云不愆不忘率由舊章前漢魏相好觀故事以為古今異制方今務在奉行故事而已數條漢興以來國家便宜行事奏請施行臣等商量今日以後除幾密及諸鎮奏請戎事有司支遣錢榖等外其他臺閣常務關於沿革州縣奏請系于典章及刑獄等並令中書舍人依故事商量臣等詳其可否聞奏後普出帝開運末御史中丞顔衎上言才除御史者旋授外藩賔佐復有以私故細事求假外拜州郡無參謁之儀出入失風憲之體漸恐四方得以輕易百辟無所準繩請自今藩鎮幕僚勿得任臺官雖親王宰相出鎮亦不得奏充賔佐非奉制勘事勿得出京自餘不令出釐雜務後周世宗時詔中外臣僚有所聞見並許上章論議翰林學士竇儼上疏曰設官分職授政任功欲為政之有倫在位官之無曠今朝廷多士省寺華資無事有員十乃六七止於計月待奉計年待遷其中廉幹之人不無愧恥之意如非歷試何展公才請改兩畿諸縣令及外州府五千戶以上縣令為縣大夫升為從五品下畿大夫見府尹如赤令之儀其諸州府縣大夫見本部長如賔從之禮郎中貟外郎起居補闕拾遺侍御史殿中侍御史監察御史光祿少卿以下四品太常丞以下五品等並得衣朱紫滿日準在朝一任約舊官遷二等自拾遺監察除授回日即為起居侍御史中行貟外郎若前官不是三署即罷後一年方得求仕如此則士大夫足以陳力賢不肖無以駕肩各繫否臧眀行黜陟利民益國斯實良規宋太宗淳化四年同知給事中事柴成務等上奏曰臣等昨奉敕命差臣等同知給事中事制敕如不便依故事封駮臣等尋檢會到門下省故事并合起請事件具劄子進呈繳送付中書續準敕命自今後應除職官勳爵不以廢置封贈並下畫敕其刑政損益并起請釐革制置公事並不正宣宜令魏庠已下候到省詳依令敕施行駮正追改者臣等考求舊典具有眀文封謂封還詔書不即行下駮謂駮正臺議然後奏聞蓋王者謹出令重改作之制也今若詔書已行方勒追改稽諸故事頗異前聞而況設官居方是為著位職司其事必有正言茍名實之相違慮典章之斯廢詔敕輕行之失請以近事眀之中間竊覩敕下西路釐革青白鹽法又覩差使制置江湖諸茶鹽皆聞妨害公私尋並停罷比行追改已紊成規蓋于經度之初而闕討論之理臣等欲乞起今後除職官勳爵不以廢置封贈祇下畫敕外其有上章起請釐革制置公事並望且下中書議其可否候議定令門下省審覆奏請付外施行公當者量與旌酬妄誕者眀加懲戒賞罰並舉浮競悛心如此則詔敕無追改之名官曹有陳力之地稍符典故用叶彌綸至道二年祠郡員外郎主判都省郎官事王炳上言曰尚書省國家藏載籍典治教之府所以周知天下地理廣袤風土所宜民俗利害之事當成周之世治定制禮首建六官漢唐因之自唐末亂雜急於經營不遑治教故金榖之政主于三司曹名雖存而其實亡矣謹按吏部四司天官之職掌文官選舉周知天下吏功過能否考定升降之類戶部四司司徒之職掌邦五教周知天下戶口之數禮部四司宗伯之職掌國五禮辨儀式制度周知天下祠典祠祀之類兵部四司司馬之職掌武人選舉周知天下兵馬器械之數刑部四司司寇之職掌國法令周知天下獄訟刑名徒𨽻之數工部四司司空之職掌國百工周知天下封疆域圻山澤草木川瀆津渡橋船陂池之數凡此二十四司所掌事務各封圖書具載名數藏之本曹謂之載籍所以周知天下事由中制外如指諸掌今職司久廢載籍散亡惟吏部四司官曹小具祠部有諸州僧道文帳職方有諸州閏年圖經刑部詳覆諸州已決大辟案牘及旬禁奏狀此外多無舊式欲望令諸州每年造户口稅租實行簿帳寫以長卷者别寫一本送尚書省藏于户部以此推之其餘天下官吏民口廢置祠廟甲兵徒𨽻百工疆畎封洫之類亦可以籍其名數送尚書省分配諸司俾之緘掌俟期歲之後文籍大備然後可以振舉官守興崇治教望選大僚數人博通治體者參取古今禮典及諸令式與三司所受金榖器械簿帳之類仍詳定諸州供送二十四司載籍之式如此則尚書省備藏天下事物名數之籍如祕閣藏圖書太學藏經典三館藏史傳皆其職也太宗覽奏嘉之詔尚書丞郎及五品已上集議吏部尚書宋琪等上奏曰王者六官法天地四時之柄百官之本典教所出望委崇文院檢討六曹所掌圖籍自何年不繫都省詳其廢置之始究其損益之源以期恢復既而其議亦寢太宗時下詔求讜言著作郎羅處約應詔上奏曰伏覩今年春詔旨責以諫官備員未嘗言事雖九寺三監之官亦得盡其讜議陛下虔恭勞神厲精求理力行王道坐致太平聖先天而不違德生民而未有所以散玄黃之協氣為動植之休祥而猶不伐功成屢求獻替此真唐堯虞舜之用心也臣纍日以來趨朝之暇或于卿士之內預聞時政之言皆曰聖上以三司之中邦計所屬簿書既廣網條實繁將求盡善之規冀協酌中之道竊聞三省上言欲置十二員判官兼領其職貴各司其局允執厥中臣以三司之制非古也蓋唐朝中葉之後兵寇相仍河朔不王軍旅未弭以賦調管𣙜之所出故自尚書省分三司以董之然國用所須朝廷急務故僚吏之屬倚注尤深或重其位以處之優其祿以寵之黽勉從事者姑務其因循盡瘁事國者或主於睚眥因循則無補于國睚眥則不協于時或淺近之人用指瑕於心計深識之士以多可為身謀蠧弊相沿為日已久今若如十二貟判官之説亦從權救弊之一端也然而聖朝之政臻乎太平當求稽古之規以為垂世之法臣嘗讀説命之書以為事不師古匪説攸聞又二典曰若稽古帝堯若稽古帝舜皆謂順考古道而致治平以臣所見莫若復尚書都省故事其尚書丞郎正郎員外郎主事令史之屬請依六典舊儀以今三司錢刀粟帛管榷支度之事均在二十四司如此則各有司存可以責其集事今則金部倉部安能知儲廪帑藏之盈虛司田司川孰能知屯役河渠之遠近有名無實積久生常況此却復都省之事下臣猶能僉知其可況陛下聰眀睿哲乎然議者以為不行已久難于改更若斷自宸心下於相府都省之制故典存焉上令下從孰為不可蓋人者可與習常難與適變可與樂成難與慮始在周易有之天地革而四時成此言能改命創制及小人樂成則革面以順上矣況三司之名興于近代堆案盈几之籍何嘗能省覽之乎復就三司之中更分置僚屬則愈失其本原矣今三司勾院即尚書省比部尤為勾覆之司周知內外經費陛下若欲復之則制度盡在逮及九寺三監多為冗長之司雖有其官不舉其職伏望陛下當治平之日建垂久之規不煩更差使臣别置公署如此則名正而言順言順而事成省其冗員則息其經費故書曰唐虞稽古建官惟百夏商官倍亦克用乂伏望法天地簡易之化建洪範大中之道可以億萬斯年垂衣裳而端拱矣時皇子益王元傑改封吳王行揚州潤州大都督府長史領淮南鎮江兩軍節制張洎當草制因上疏議曰謹按前史皇子封王以郡為國置傅相及內史中尉等佐王為治自漢魏以降所封之王如不之國朝廷命卿大夫臨郡即稱內史行郡事東晉永和泰元之際有琅邪王會稽王臨川王故謝靈運王羲之等為會稽臨川內史即其事也唐有天下以揚益路幽荆五郡為大都督署長史司馬為上佐即前代內史之類也其大都督之號非親王不受其揚益等郡或有親王遙領朝廷命大臣臨郡者即皆長史副大使知節度事臣請質之前代段文昌出鎮揚州云淮南節度副大使知節度事兼揚州大都督府長史李載義鎮幽州云盧􅊞軍節度副大使知節度事兼幽州大都督長史即其例也今益王以揚潤二郡建社為吳國王居大都督之任又已正領節度使豈宜却加長史之號乃是國王自為上佐矣若或朝廷且以長史拜受其加銜內又無副大使知節度使之目儻或他日别命守將俾臨本郡即不知以何名目而除授也臣草制之夕便欲上陳慮奏報往反有妨明日宣降兹事有關國體況吳王未領恩命尚可改正乞付中書門下商議施行權御史中丞王化基獻澄清略言時事有五其一復尚書省曰國家立制動必法天尚書省上應玄象對臨紫垣故六卿擬喉舌之官郎吏應星辰之位斯實乾文昭著故事具明方今省署名實未稱夫三司使額乃近代權制判官推官勾院開拆磨勘憑由理欠孔目勾押前後行皆州郡吏局之名請廢三司止於尚書省設六尚書分掌其事廢判官推官設郎官分掌二十四司及左右司公事使一人掌一司廢孔目勾押前後行為都事主事令史廢勾院開拆磨勘憑由理欠等司歸比部及左右司如此則事益精詳且盡去州郡吏局之名也六卿如闕即選名品相近有才望者權之郎官如闕則於兩省三院選名幹有清望者依資除之其二十四司公事若繁簡不同望下本省官屬參酌其類均而行之其二慎公舉曰朝廷頻年下詔以類求人但聞例得舉官未見擇其舉主欲望自今先責朝官有聲望者各舉所知其舉到官員則置籍并舉主名姓籍之所舉之官實著廉能則特旌舉主若所舉貪冒敗事連坐舉主陛下自登寶位十年于兹七經選掄得人多矣然下僚逺官不無沈滯望令採訪司及州郡長吏察廉以聞籍以待用則下無遺材矣其三懲貪吏曰貪吏之於民其損甚大屈法煩刑徇私肆虐使民之受害甚於木之受蠧若乃用非其人而不繩以法雖夷齊顔閔不能自見蓋中人之性如水之在器方員不常顧用之者何如爾望令諸路轉運使副兼採訪之名責以覺察州府軍監長吏得失俟其澄清部內則待以不次之擢置於侍從之間所貴周知物理能備顧問且足為外官之勸也其四省冗官曰古人建官初不必備者惟得其人也國家封疆雖踰前世而分設庶官實倍常數意欲盡籠天下之利而民物轉加凋弊二十年前江淮諸郡揚楚最居要衝務穰事衆地廣民繁然止設知州一人署領官事其餘通判判官推官及州官等悉皆分管𣙜務倉庫當時事無不集兼少獄訟其後十年臣任揚州時朝廷添置監臨使臣等職實踰本州官數諸州冗員似此非一今以朝官諸色使臣及縣令簿尉等高卑相折而計之一人月費不啻十千以千人約之歲計用十餘萬千更倍約之萬又過倍使皆廉吏止縻公帑設或貪夫參錯其間則取於民者又加倍焉望委各路轉運使副與知州同議裁減若縣令簿尉等官自前多不備置可兼者兼之如此則冗官汰矣其五擇逺官曰負罪之人多非良善貪殘凶暴無所不至若授以遠方牧民之官其或怙惡不悛恃逺肆毒小民罹殃卒莫上訴甚非撫綏逺人之意也若自今以往西川廣南長吏不任負罪之人則逺人受賜矣書奏太宗嘉納之真宗咸平二年舉入閣故事孫何次當待制乃獻疏曰六卿分職邦家之大柄也有吏部辨考績而育人材有兵部簡車徒而治戎備有戶部正版圖而阜貨財有刑部謹紀律而誅暴強有禮部祀神示而選賢俊有工部繕宫室而修隄防六職舉而天下之事備矣故周之會府漢之尚書立庶政之根本提百司之綱紀令僕率其屬丞郎分其行二十四司粲焉星拱郎中員外判其曹主事令史承其事四海九州之大若網在綱唐之盛時亦不聞别分利權創使額而軍需取足及玄宗侈心既萌召發既廣租調不充於是蕭景楊釗始以地官判度支而宇文融為租調地稅使始開利孔以構禍階至于肅代則有司之職盡廢而言利之臣攘臂於其間矣於是叛亂相仍經費不充迫於軍期切於國計用救當時之急率以權宜裁之五代短促曾莫是思今國家三聖相承五兵不試太平之業垂統立制在此時也所宜三部使額還之六卿慎擇戶部尚書一人專掌鹽鐵使事俾金部郎中員外郎判之又擇本行侍郎二人分掌度支戶部使事各以本曹郎中員外郎分判之則三使洎判官雖省猶不省也仍命左右司郎中員外總知帳目分勾稽違職守有常規程既定則進無掊克之慮退有詳練之名周官唐式可以復矣兹事非艱在陛下行之爾咸平四年左司諫楊億奏曰臣位列朝行次當轉對輒傾鄙見上瀆宸聰退省狂愚伏增恐栗臣竊以朝廷之所貴者惟班爵是先君人之所重者惟名器為急是以籩豆之事各有司存樽俎之間不相踰越思不出位君子稱其守官必也正名先王以之經國恭惟國家克遵舊制並建群司公卿大夫表著咸設臺省監寺曹局畢陳然而徒有其名不舉其職只如尚書會府上法文昌治本是資政典攸出條目皆具可舉而行今之存者但吏部銓擬秋曹詳覆自餘租庸管𣙜由别使以總領尺籍伍符非本司而校定職守雖在或事有所分網領雖存或政非自出丞轄之名空設而無違可糾端揆之任雖重而無務可親周之六官於是廢矣且如寺監素有於掌執臺閣咸著於規程昭然軌儀布在方䇿昔者漢行故事宣帝以之中興魯為長府閔子譏其改作臣以為國家慮命擬之未允故置審官之司憂議讞之或濫故設審刑之署恐命令之或失故建封駮之局臣以為在於紀網之不舉不在於琴瑟之更張若辨論官材歸於相府即審官之司可廢矣詳評刑辟屬於司寇即審刑之署可去矣出納詔命關於給事中即封駮之局可罷矣至於尚書二十四司各揚其職寺監臺閣悉復其舊按六典之制度振百司之遺墜在我而已夫豈為難如此則朝廷益尊堂陛益峻典故益舉品流益清端拱而天下治者由兹道也臣又以唐虞之時建官惟百夏商官倍秦漢益繁施及有唐典䇿咸在自三公之極貴九品之至微著于令文皆有貟數傳云官不必備惟其人蓋闕之斯可矣若乃貟外加置任非其才故竈下羊頭形於嘲誚斗量車載播厥風謡國體所先尤須慎重臣竊覩班簿貟外郎及二百餘人郎中亦及百數自餘太常國子博士殿中丞中舍洗馬俱不下數百人率預常參皆著引籍不知職業之所守多由恩澤之序遷臣竊以昔館陶公主為子求郎以為上應列宿以至更直建禮伏奏明光含香握蘭雍容侍從又嘗讀唐朝故事益知省郎之貴三院御史歲滿願遷者多拗項以望省署因而名橋或次補綸闈或便除給諫出刺大郡猶謂左遷今乃百十為群殆非為官擇人之旨臣欲乞按唐制應九品以上官並定貟數臣又念昔者秦之開郡置守漢以天下為十三部命刺史以領之自後因郡為州以太守為刺史降及唐氏亦嘗變更曾未數年又仍舊貫今國家多命省署之職出為知州又設通判之官以為副二此權宜之制耳豈可為經久之訓哉臣欲乞諸州並置刺史以戶口多少制其俸祿分下中上緊望雄之等級品秩之際率如舊章與常參官比視階資出入更踐省去通判之目但置從事之員建亷察之府以統臨按輿地之圖而區處昔者興國初詔廢支郡出於一時十國為連周法斯在一道置使唐制可尋至若號令之行風教之出先及於府府以及州州以及縣縣以及鄉里自上而下由近及逺譬如身之使臂臂之使指提綱而衆目張振領而羣毛理由是言之支郡之不可廢也明矣臣欲乞復置支郡𨽻於大府量地里而分割如漕運之統臨名分有倫官業自舉臣又覩唐制內外官俸錢之外有祿米職田又給防閣庶僕親事帳內執衣白直門夫各以官品差定其數嵗收其課以資於家本司又有公廨田食本錢以給公用自唐末離亂國用不充百官俸錢並減其半自餘别給一切權停今羣官於半俸之中已是除陌又於半俸三分之內其二分以他物給之鬻於市鄽十才得其一二曾糊口之不及豈代耕之足云昔西漢張敞蕭望之上言以為倉廩實而知禮節衣食足而知榮辱今吏俸不足者常有憂父母妻子之心雖欲為亷其勢不能於是宣帝下詔云吏皆勤事而俸祿薄欲其無侵漁百姓難矣遂加吏俸著於策書臣竊見今之結髮登朝陳力就列其俸也不能致九人之飽不及周之上農其祿也未嘗有百石之入不及漢之小吏若乃左右僕射百僚之師長位莫崇焉月奉所入不及軍中千夫之帥甚可駭也豈聖朝稽古之意哉臣欲乞今後百官俸祿雜給並循舊制既豐其稍入可責以廉隅官且限以常員理當減於舊費冗食悉罷周行自清臣又念唐虞之制也凡預品官各設資考課其最殿歸於有司或歷階以升或越次而補國朝多以郊祀覃慶因而稍遷考功之黜陟不行士流之清濁無辨陛下深鑒其弊姑務惟新昨有事於禋燔但遍加於階爵雖矯前失未振舊規臣欲乞依舊內外官各立考限復令考功修舉其職每嵗置使校考以表盡公資秩改遷賞罰懲勸一遵典故以振滯淹臣又念昔者成周之制也公侯子男皆列土以建國大夫卿士並受田而無征西漢已來用秦武功之爵唯列侯啓封或踰萬户至關內侯或有食邑不過數百家自是因循以至唐室但食邑者率為虛設言實封者嵗入有差逮及聖朝並無所給至於除拜之際猶名數未移空有食采之稱真同畫餅之妄臣欲乞依元和中所定實封條貫支給削去虛邑但行實食以寵勳臣臣又念國家每屬嚴禋即覃大慶敘封追贈罔限彛章乃至太醫之微司歷之賤率荷蓼蕭之澤亦疏石窖之封恩雖出於殊常事不循於經制臣又以勳散之設名品實繁律文以勳官為二官已經刪定故事加散官至五品必以上聞今朝散銀青猶關命服護軍柱國全是虛名臣欲乞自今後常參官勳散俱至五品者許封贈官階勳俱至三品者許立戟每遇慶澤令有司準式施行既禮秩之昭彰固名品之分别臣又以五等之爵施之于今雖有啓封之稱曾無胙土之實苴茅建社固不可以遽行翼子貽孫亦足徵于舊典臣欲乞內外官封至伯子男者許廕子至公侯者許廕孫别封國公者許嫡子嫡孫一人襲封並令有司考求前制所冀國朝無虛授之寵臣下知延賞之恩臣又以今之加功臣之稱始于唐德宗幸奉天扈蹕將士並加奉天定難功臣之號因一時之賞典為萬世之通規近代已有將相大臣有加至十餘字者尤非經據不可遵行所宜削除以眀憲度昔者講求典禮晉國以清考核名實漢朝稱治當至化誕敷之際是舊章咸秩之時跂見太平正在今日臣學術素淺文理未明輒述狂言以塞眀詔殞越于下啓處不遑干冒天聰臣無任省循戰汗激切屏營之至大中祥符四年龍圖閣待制知審官院張知白上奏曰臣竊覽方册見唐虞之制立四嶽十二牧百工允釐百揆時敘又曰三載考績三考黜陟幽明漢史載宣帝為名盛之主美其任人責成知王道之根本常曰與我共治者其惟良二千石乎斯言也傳示不朽後之人孰不稱頌哉國家受命上穹光啓鴻業順考古道增崇慶基陛下聽政之初愛民在念煥彼宸範垂為政經授之守臣俾治黔首斯固踵唐虞之盛而稱首于百王矣昔唐李嶠常云安人之方須擇郡守竊見朝廷重內官輕外任每除牧伯皆避命致訴比遣外任多是貶纍之人風俗不澄實由於此望于臺閣妙選賢良分典大州共康庶績臣請輟近侍率先庶僚鳳閣侍郎韋嗣立因而請行遂令以本官出領州郡伏見江浙州郡方切擇人茍有闕員俾之承乏臣雖不肖願繼前修矧唐年非遙州郡故事仍在倘以為允乞舉而行真宗時右正言夏竦進䇿曰臣聞古爵五等裂地受封各命陪臣咸思俾乂秦滅六國分為郡縣百世因仍遂廢古制天下之治歸州縣州縣之治歸庶官歷代以來所難其選設吏部之曹張銓品之官鑒裁不同處置各異自非毛玠之尚苦節陳群之建九品山濤之識量任愷之忠直王泰之接待辛術之正眀高孝恭之藻鑒裴行儉之博識欲其材器無遺與奪惟允雖悉誠竭力猶將不逮唐室之制入仕多門選調之間轉為繁總格式既冗貨賄滋豐九流遂失澄清官序遽成陵替國家因天成命司牧元元分命庶官共治天下銓衡劇地公朝急務長定之格選集之期考課之規各有攸敘奈審核注擬出入多途請求之賂交午如雲令史之門衣冠若市貪夫優遊于常調亷吏憤悱於選門能材且患于循資庸器自安于久次以至州僚縣佐頗有廢事曠官一吏失循千民失所蓋吏部不勤慎擇多士有曠精求負乘貽災維鵜致誚紓民濟物諒在伊人誠當委注賢眀專幹銓選並稽往制擇善而從但人數衰少則題品易至賄賂不通則轉遷易當如其不逮抑之散地若有上材擢之非次無使恩出私門權歸吏手則精粗可别勞逸自分但衆官懷黽勉之心即萬國有治平之狀竦又進䇿曰張官設吏求材審能官職攸敘百姓允治古者旁求雋彥周制論辨材能六國談説授官嬴秦農戰入仕漢則孝亷有道之舉方正秀茂之科上計之制任子之令魏晉而降取士多門制度云繁官途益雜唐革隋命因損舊儀置勳品九等自諸録事及諸省令史始焉謂之流外由是府胥獄掾垂帶拖紳器名忽矣陵遲官府莫之統一國家經始尚循唐制百司伎藝皆收之選網守當之名勒留之號歸司出職頗繁有徒一命親民多乖治狀濟其私弊抑有成規蓋府寺之吏書算之工因循久次不曉藝文及預官常何知政要可令申命司屬各限通經選集之期量加試難少識前言往行必知樂善嚮方不惟文德慶誕由是蒼生受賜願觀狂瞽以適時宜竦又進䇿曰今之牧守當古諸侯權有生殺祀有社稷其人存則王澤下流天時無害庶官各守其序四民不遷其業其職廢則旱蝗肆孽瘡痏遍野政出于吏胥獄成于賕賂故國之股肱莫先其任漢宣帝有言曰與我共治者其惟良二千石乎國家之制貴尚州牧在顯忠遂良于斯惟盛而求賢審官或未純一頗有因緣久次出分符竹結託貴要遂領藩條或得用於虐刑或成名于厨傳以是奉法各異為政差殊強者失于猛寬者失於縱謹者失於凝滯敢者失於造次和者弊於黨狠者弊于戾或貪而有能亷而無材眀於法令拙於化育喜于慈惠踈于防戒雖材不求備難以適中而任官惟賢固宜慎選然則罪莫大于貪暴愚莫甚于暗懦去此而往其失可追伏願陛下委注台司議新其制眀考課之令重刺舉之權自非該通學術熟習政事者不得除授仍嵗詔尚書省上其殿最眀示賞罰若為治有狀則即郡進爵但有善化不渝何必三年而代無使人弊于迎送官弊于數易惟陛下念之夫隆守文之業增太平之基不在斯人誰塞其責仁宗景祐四年蘇舜欽上疏曰臣聞事不師古傅説所譏必也正名仲尼之訓臣竊以國之寺監乃卿佐之局南省諸曹皆尚書之任近朝多差京朝官或員外專判於理不順且遠方一州一郡惟使相及僕射以上方得言判豈京朝小官得判省寺重地臣欲乞今後非有本官者但稱權及勾當不令專判庶合前規慶歷元年吏部尚書夏竦議職官疏曰臣聞官必正名職惟守器稽考古道職官惟稱自雲紀火師之立龍名鳥氏之設則有司存各供王事堯命羲和分掌四嶽舜陟帝位官名攸序司空以宅百揆司徒以遜五品士典刑服虞掌上下秩宗以主三禮典樂以諧八音垂若豫工龍允朕命夏商官倍其名罕見五長分治方國六卿咸主軍事官告陳於左相百官聽於冢宰姬旦踐阼憲章昭備太宰授之以治法地官責之以教象宗伯主禮司馬布政秋官主典刑之任冬官以考工之職凡百有司皆正服位春秋列國陪臣命秩亡秦尚首商君立爵祖龍姱詫多設官名劉氏因緣遂成典故若漢官之制定名於祿百石而上差等十六或中或比頗正序列魏文盜漢乃設九品拓跋亂華爰分階從梁氏置戎號之官隋室廣殿中之任其間南北離割羌人猾亂兵革洊仍禮樂無度官以漸替職亦旋失有唐啓祚創置相因逮其末齡官號滋雜姑息將帥多加使領五代因循官次相忤國家削除前弊稽考故實損益沿革時謂適中但百執承事理有可疑建官分職職與官殊量材受爵爵與材異或𨽻官棘寺翻司太倉之粟繫職青宫乃主關市之征或呼為博士不通章句之學號為著作罔知筆削之事或終年典禮未聞因損之議連嵗執法詎有彈劾之疏或眀於科律不登讞獄之司長於規刺難希諫諍之列或寺人命秩於方牧降附受寵於通籍位以資升或過其材官以久遷或非其事人皆謂官為請俸之具位乃稱呼之號名實相違不可以訓語曰必也正名禮曰各司其局傳曰惟器與名不可以假人又曰一日失職則死及之故宣尼嘉虞人之守官仲康罪羲和之離次蓋官不易方守不假器陳力就列臣無虛授沐猴非戴冠之物方枘非圎鑿之偶函矢之業不同庖祝之任有殊傳曰其人存則其政舉其人亡則其政息又曰國家之敗由官邪也任官之道可不慎歟誠當稽堯舜之事行三代之法正其官司辨其職掌使上下之位無或僭差彼材彼技授之彼官此職此位付之此事位不以資惟其人遷不以久惟其材寺人可以厚祿而不可以峻權降虜可以巨賜而不可以華資若守帑藏倉庾之物主監𣙜督責之局可别制官號畀之典守隆皇宋之禮法敞守文之功業傳曰名位不同禮亦異數周官曰以儀辨等則人不越蓋任官惟賢不可不擇名以出信不可不正擇其賢則職舉職舉則政成正其名則事順事順則禮備禮樂之制自官始惟陛下采念狂簡寬貸萬死則天下幸甚三年二月知制誥田況上疏曰臣聞有唐兩省自諫議大夫至拾遺補闕共二十人每宰相奏事諫官隨而入有所闕失即時規正其實皆中書門下之屬官也今諫議大夫無復職業自司諫正言知諫院皆違補之任而朝廷責其言如大夫之職矣而地勢不親位序不正在朝廷則與衆人同進退非所以表顯而異其分也今管庫冗散之吏尚赴內朝豈諫諍之臣不得日奉朝請臣前任諫院每聞一事皆諸處采問比及論列或至後時今若令諫官得奉內朝之事兼王素歐陽修蔡襄皆以他官知諫院居兩省之職而不得預其列於體未便欲乞今後並令綴兩省班次所貴名體相稱副陛下選求之意知諌院歐陽修論舉館閣職劄子曰臣伏見國家近降詔書條制館閣職事有以見陛下慎於名器漸振紀綱然而積弊之源其來已久僥幸之路非止一端今於澄革之初尚有未盡其甚者臣竊見近年外任發運轉運使大藩知州等多以館職授之不擇人材不由文學但依例以為恩典朝廷本意以其當要劇之任欲假此清職以為重然而授者既多不免冒濫本欲取重人反輕之加又比來館閣之中大半膏梁之子材臣幹吏羞與比肩亦有得之以為恥者假之既不足為重得者又不足為榮授受之間徒成兩失臣欲乞今後任發運轉運知州等更不依例帖職若其果有材能必欲重其職任則當升拜美官優其秩祿况設官之法本貴量材隨其器能自可升擢豈必盡由儒館方以為榮一臣竊見近年風俗澆薄士子奔競者多至有偷竊他人文字干謁權貴以求薦舉如丘良孫者又有廣費資財多寫文册所業又非絶出而惟務干求勢門日夜奔馳無一處不到如林槩者此二人並是兩制臣寮奏乞召試內丘良孫近雖押出而林槩已有召試指揮舊來本無兩省以上舉館職明文尚猶如此奔競今若明許薦人則今後薦者無數矣臣欲於近降詔書內兩省舉館職一節添入遇館閣闕人即朝廷先擇舉主方得薦人仍乞别定館閣合存員數以革冗濫一臣竊見近降詔書不許權貴奏廕子弟入館閣此蓋朝廷為見近年貴家子弟濫在館閣者多如吕公綽錢延年之類尤為荒濫所以立此新規革其甚弊臣謂今後膏粱子弟既不濫居清職則前已在館閣者雖未能沙汰尚須裁損欲乞應貴家子弟入館閣見在人中若無行業文詞為衆所知則不得以年深遷補龍圖昭文館并待制修撰之類所貴侍從清班不至冗濫修又乞置諸路按察使疏曰臣自初忝諌官於第一次上殿日曾建言方今凋殘公私困急全由官吏冗濫者多乞朝廷選差按察使糾舉年老病患贓汚不才四色之人並行澄汰仍具呈按察之法條目甚詳如臣之議本欲使使者四出而天下悚然知朝廷有賞善罰惡之意然後按文責實其惡者黜其善者升中才之人盡使警勵凡臣所言者乃所以救民急病澄革四十年蠧弊之事若非遭逢聖主鋭意求治之時上下力行之不可也奈何議者憚於作事惟樂因循秪命諸路轉運使兼其職尋亦再具論奏其論格而不行按察空文遂至寢廢生民蠧病日益可哀伏見陛下聖德日新憂心庶政近發手詔督勵宰輔然天下之事積弊已多如治亂絲未知頭緒欲事事更改則力未能周而煩擾難行欲漸漸整緝則困弊已極而未能速效臣謂如欲因功少為利博及民速於事切則莫若精選強幹朝臣十許人分行天下盡籍官吏能否坐而升黜之如臣前所陳然後可臣聞治天下者如農夫之治田不可一槩也蒿萊蕪穢久荒之地必先力行芟闢然後以時耘耨今特遣之使如久荒而芟闢也轉運兼按察乃以時而耘耨者爾寬猛疾徐各有所宜也漢之刺舉唐之黜陟使考課使之類每嵗遣出祖宗朝亦有考課院蓋按察升黜古今常法非是難行之異事也方今言事者多以髙論見棄或以有害難行如臣所言只是選十餘人眀幹朝臣察視官吏善惡灼然有迹易見者著之簿籍朝廷詳之黜其甚者耳臣自謂於論不迂行之有利無害然尚慮議者未以為然謹别條具冗官利害六事以眀利博效速而可行不疑伏望聖慈特賜裁擇如有可采乞早施行一曰去冗官則民之科率十分減九臣伏見兵興以來公私困弊者不惟賦斂繁重全由官吏為姦每嵗科率一物則貪殘之吏先於百姓而刻剝老繆之人恣為群下之誅求朝廷得其一分姦吏取其十倍民之重困其害在斯今若去此四色冗官而代以循良之吏事隨便宜絶去騷擾使民專供朝廷實數科率免却州縣分外誅求故臣謂於民力十分減九也比於别圖減省細碎無益者其利博矣二曰不才之人為害深於贓吏國家之法除贓吏困民先發者乃行之其它不才之人大者壞州小者壞縣皆眀知而不問臣謂凡贓吏多是強黠之人所取在於豪富或不及貧弱不才之人不能馭下雖其一身不能乞取而恣其羣下共行誅剝更無貧富皆被其殃為害至深縱而不問故臣尤欲盡取老病繆懦者與贓吏一例黜之三曰內外一體若外官不澄則朝廷無由致治今朝廷雖有號令善者降出外方若落此四色冗官之手則或施設乖方不知朝廷本意反為民害或留滯廢失全不施行而又無糾舉多作空文若外邉去却冗官盡得良吏則朝廷行下之令雖有乖錯彼亦能回改或執奏更易終不至為大害是民之得失不獨上賴朝廷全賴官吏善惡以此而言冗官豈可不去四曰去冗官則吏員清簡差遣通流今天下官有定員而入仕之人無定數既無退黜冒濫者多差遣不行賢愚同滯每有一闕衆人競爭得者無廉恥之風不得者騰怨嗟之口濫官之弊近古無之今若擇四色冗官去之則待闕之人可無怨滯五曰去冗官則中材之人可使勸懼今天下官吏豈必盡是不才蓋為朝廷本無黜陟善惡不分若見國家責實求治人人旌别則中材之人皆自勉強不敢因循雖有貪殘亦須斂手六曰去冗官則不過期月民受其賜方今朝廷雖有憂念恤民之意然上下困乏必未有餘力廣惠及民若但去冗官則民受速賜蓋臣嘗見外處州縣每一繆官替去得一能者代之不過數日民已歌謡今若盡去冗官之吏而以能吏代之不過期月民必受賜此臣所謂及民速於事切者也修又上疏曰臣曾上言為天下官吏冗濫者多乞遣使分行按察昨日竊覩降敕下諸路轉運使司令兼按察使竊以轉運使自合按察本部官吏今若特置使名更加約束則于常行之制頗為得宜必欲救弊于時則未盡善且臣初乞差按察使者蓋欲朝廷精選強眀之士竊聞朝議以所選非人故不遣使今所委轉運使豈盡得人乎其間昏老病患者有之貪贓失職者有之此等之人自當被劾豈可劾人其間縱有材能之吏又以斡運財賦有米鹽之繁供給軍須有星火之急既不暇遍走州縣專心察視則稽遲鹵莽不能無之故臣謂轉運使兼按察使不才者既不能舉職又不暇盡心徒見空文恐無實效在于事體不若專遣使人伏自兵興纍年天下困弊飢荒疲瘵既無力以振救調斂科率又無由減省徒有愛民之意絶無施惠之方若但能逐去冗官不令貪暴選用良吏各使撫綏惟此一事及民最切茍可為人之利何憚選使之勞況自今年纍遣安撫豈于今日頓以為難今必恐三丞至郎中內難得其人即乞且依前後安撫于侍從臣僚臺官館職中選差十數人少處路分兼察兩路其侍從臣僚仍各令自辟判官分行採訪用臣前來請事件施行其轉運兼按察使若能精選其人亦乞著為今後常行之制臣伏思從來臣僚非不言事朝廷非不施行患在但著空文不責實效故改更雖數號令雖煩上下因循了無所益今必務日新求治革弊救時則須在力行方能濟務臣所言者生民之急務也天下之利也不但略言一二以塞言責而已伏望留意詳擇修論大臣不可親小事疏曰臣伏見兵興纍年天下多故樞密之職事任非輕雖典兵戎體均宰輔至于大小機務其繁又倍於中書所以國家舊制都副承旨皆用士人位比屬僚事參謀議祖宗之制尤慎擇材或取其歷職詳練者以為副使自承平以來綱紀隳廢惟用人使備員而已當四方無事之時兩府檢例行事上下尸曠恬然不怪自兵戎既動中外事繁猶務因循致多敗誤今承旨不親職事惟署文書凡百行遣皆委諸房小吏使副大臣不免親臨細事既不得精心思慮專意廟謀至于碎務繁多又不能躬自檢察遂使邉防急奏多苦滯留軍國密謀動成漏泄凡關事體不便處多皆由樞臣難自躬親而承旨不能舉職也臣今欲乞依祖宗舊制承旨特用士人如武臣中難得其人即請於文官中精選材能換與合入官資責其舉職仍令樞密使副條列常行事目有可以分職責成者悉以委之使大臣專意廟謀屬吏分行職事時參國論庶有裨補既復朝廷之舊制又於事體而合宜伏望聖慈特賜裁擇至和二年修為翰林學士上奏曰臣竊以學士待制號為侍從之臣所以承宴間備顧問以論思獻納為職自祖宗以來尤精其擇茍非清德美行藹然衆譽高才博學獨出一時則不得與其選用至艱員數至少官以難得為貴人以得職為榮搢紳之望既隆則朝廷之體增重其後用人頗易員數漸多往時學士待制至六七十員近年以來稍謹除拜即今猶及四十餘員臣謂愛惜名器不輕授人朝廷既已知之矣而為國家計者宜於此時創立經制今惟翰林學士中書舍人知制誥各有定員其餘學士待制未有員數臣今欲乞檢詳前史及國朝故事自觀文殿大學士至待制並各立定員數遇有員闕則精擇賢才以充其選茍無其人尚可虛位以待如允臣所請乞賜詳議施行修兼判三司院時又上奏曰臣勘會本班見管使臣八千一百一十二員自古濫官未有如此之多也臣遂將簿籍根磨增添數目只自皇祐二年終至今實四年半之內自借職以上增添二千八十五員於中近日增添并多只自皇祐五年終至今年六月一年半之內增四百九員殿侍猶不在數蓋由曲恩濫賞臨時無節以日計月所積遂多率計一嵗常增四百五十員若不塞其濫源則更三五年後不勝其弊矣于今裁損已為太晚若更增添則四海之廣不能容濫官天下物力不能給俸祿矣臣今略舉入仕僥幸者二事乞先賜指揮釐革其餘見在者既不可減損惟其入仕之源欲乞令當政大臣早賜擘畫所貴不為將來之患所有臣擘畫二事今具畫一如後一自來諸皇親宅前勾當人除郡王宫殿侍年深有例送三班院差使外其餘宫院殿侍及客司書表宅案等别無恩例只自慶厯八年創立年限上自郡王下至觀察使以下應緣皇親宅前殿侍客司書表宅案等並只勾當五年便送三班差使等第年限轉充借奉職此入仕之源最為僥幸者臣今欲乞應郡王已下宅前殿侍客司書表宅案勾當及五年者更不送三班只令在宅依舊勾當所有合轉殿侍至借職年限並依慶厯八年密院劄子指揮如此則皇親勾當人不妨恩澤只是免得諸宫院送納三班後續補人數兼諸宫院若得依舊勾當並是諳熟委使之人又三班減得人數甚為利便一百司人吏舊來出職皆有職名年限近年多候轉及職名及年限未滿多乞情願就近下恩澤或僥求因人奏帶及抽差勾當敘勞酬奬及合作選人者情願就班行之類今乞一切止絶右臣所起請只是因述濫官略陳此一事如允臣所請乞下三班院與勾當臣僚同共鋪陳條貫立定新制奏乞朝廷降下施行歷代名臣奏議卷一百五十九
