body:
  text: 歷代名臣奏議卷六明楊士奇等撰聖學魯哀公問子夏曰必學而後可以安國保民乎子夏曰不學而能安國保民者未嘗聞也哀公曰然則五帝有師乎子夏曰有臣聞黃帝學乎大真顓頊學乎緑圗帝嚳學乎赤松子堯學乎尹夀舜學乎務成跗禹學乎西王國湯學乎威子伯文王學乎鉸時子斯武王學乎郭叔周公學乎太公仲尼學乎老聃此十一聖人未遭此師則功業不著乎天下名號不傳乎千世詩曰不愆不忘率由舊章此之謂也夫不學不明古道而能安國家者未之有也晉平公問於師曠曰吾年七十欲學恐巳暮矣師曠曰何不炳燭乎平公曰安有為人臣而戲其君乎師曠曰盲臣安敢戲其君乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎平公曰善哉東漢和帝富於春秋侍中竇憲自以外戚之重欲令少主頗涉經學上疏皇太后曰禮記曰天下之命垂於天子天子之善成乎所習習與智長則切而不勤化與心成則中道若性昔成王幼小越在襁褓周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歲即位大臣輔政亦選明儒韋賢蔡義夏侯勝等入授於前平成聖德近建初元年張酺魏應召訓亦講禁中臣伏惟皇帝陛下躬天然之姿宜漸教學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮崇尚繼傳父業故再以校尉入授先帝父子給事禁省更歷四世今白首好禮經行䔍備又宗正劉方宗室之表善為詩經先帝所褒宜令郁方並入教授以崇本朝光示大化由是郁遷長樂少府復入侍講永元十一年中散大夫魯丕上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明衣服之賜誠為優過臣聞說經者傳先師之言非從已出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之旨意察雅頌之終始明舜禹臯陶之相戒顯周公箕子之所陳觀乎人文化成天下陛下既廣納謇謇以開四聰無令芻蕘以言得罪既顯巖冗以求仁賢無使幽逺獨有遺失十五年鄧太后臨朝尚書郎樊凖上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖德孳孳為善成王賢主崇明師傅及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啓處然猶投戈講藝息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬機無不簡心而垂情古典游意經藝每享射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言孔子闕里人也禮記云孔子射於矍相之圃蓋觀者如堵墻也又多徴名儒以充禮官如沛國趙孝琅邪承宫等或安車結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老皤皤白首貌也音步河反書曰皤皤良士華首謂白首也每宴㑹則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而備問小大隨化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆百數開門謂開一家之說化自聖躬流及蠻荒胸奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者蓋少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭諓諓諂言也音踐前書曰昔秦穆公說諓諓之言也文史則去法律而學詆欺鋭錐刀之鋒斷刑辟之重德陋俗薄以致苛刻昔孝文竇后性好黃老而清淨之化流景武之間臣愚以為宜下明詔博求幽隱發揚巖冗寵進儒雅有如孝宫者徴詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道魏髙貴鄉公正元元年司馬師上書曰荆山之璞雖美不琢不成其寶顔冉之才雖茂不學不𢎞其量仲尼有云豫非生而知之者好古敏以求之者也仰觀黃軒五代之主莫不有所禀則顓頊受學於緑圖髙辛問道於柏招逮至周成旦望作輔故能離經辨志安道樂業夫然故君道明於上兆庶順於下刑措之隆實由於此宜遵先王下問之義使講誦之業屢聞於聽典謨之言日陳於側也甘露元年四月丙辰帝幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之為六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周易易之書其故何也易博士淳于俊對曰包羲因燧皇之圖而制八卦神農演之為六十四黃帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出內氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰若使包羲因燧皇而作易孔子何以不云燧人氏歿包羲氏作乎俊不能答帝又問曰孔子作彖象鄭𤣥作注雖聖賢不同其所釋經義一也今彖象不與經文相連而注連之何也俊對曰鄭𤣥合彖象於注者欲使學者尋省易了也帝曰若鄭𤣥合之於學誠便則孔子曷為不合以了學者乎俊對曰孔子恐其與文王相亂是以不合此聖人以不合為謙帝曰若聖人以不合為謙則鄭𤣥何獨不謙邪俊對曰古義𢎞深聖問奧遠非臣所能詳盡帝又問曰繫辭云黃帝堯舜垂衣裳而天下治此包羲神農之世為無衣裳但聖人化天下何殊異尓邪俊對曰三皇之時人寡而禽獸衆故取其羽皮而天下用足及至黃帝人衆而禽獸寡是以作為衣裳以濟時變也帝又問乾為天而復為金為玉為老馬與細物並邪俊對曰聖人取象或逺或近近取諸物逺則天地講易畢復命講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為長帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇開義以明聖德而舍其大美稱其細豈作者之意邪峻對曰臣奉遵師說未喻大義至於折中裁之聖思次及四嶽舉鯀帝又曰夫大人者與天地合其德與日月合其明思無不周明無不照今王肅云堯意不能明鯀是以試用如此聖人之明有所未盡邪峻對曰惟聖人之𢎞猶有所未盡故禹曰知人則哲惟帝難之然卒能改授聖賢緝熙庶績亦所以成聖也帝曰夫有始有卒其唯聖人若不能始何以為聖其言惟帝難之然卒能改授蓋謂知人聖人所難非不盡之言也經云知人則哲能官人若堯疑鯀試之九年官人失敘何得謂之聖哲峻對曰臣竊觀經傳聖人行事不能無失是以堯失之四凶周公失之二叔仲尼失之宰豫帝曰堯之任鯀九載無成汨陳五行民用昏墊至於仲尼失之宰豫言行之間輕重不同也至於周公管蔡之事亦尚書所載皆博士所當通也峻對曰此皆先賢所疑非臣寡見所能究論次及有鰥在下曰虞舜帝曰當堯之時洪水為害四凶在朝宜速登賢聖濟斯民之時也舜年在既立聖德光明而久不進用何也峻對曰堯咨嗟求賢欲遜已位嶽曰否德忝帝位堯復使嶽揚舉側陋然後薦舜舜之本實由於堯此聖人欲盡衆心也帝曰堯既聞舜而不登用又時忠臣亦不進達乃使嶽揚仄陋而後薦舉非急於用聖恤民之謂也對曰非臣愚見所能逮及於是復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之時以德化民其次報施謂三王之世以禮為治也帝曰二者教化薄厚不同將主有優劣邪時使之然乎照對曰誠由時有朴文故化有薄厚也時上賜宴羣臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾育給事中中書令虞松等並講述禮典遂言帝王優劣之差帝慕夏少康因問顗等曰有夏既衰后相殆滅少康收集夏衆復禹之績髙祖拔起隴畝驅帥豪雋芟夷秦項包舉宇內斯二王可謂殊才異略命世大賢者也考其功德誰宜為先顗等對曰夫天下重器王者天授聖德應期然後能受命創業至於階緣前緒興復舊績造之與因難易不同少康功德雖美猶為中興之君與世祖同流可也至如髙祖臣等以為優帝曰自古帝王功德言行互有髙下未必創業者皆優紹繼者咸劣也湯武髙祖雖俱受命聖賢之分所覺縣殊少康殷宗中興之美夏啓周成守文之盛論德校實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異耳少康生於滅亡之後降於諸侯之𨽻崎嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至德𢎞仁豈濟斯勳漢祖因土崩之勢仗一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身沒之後社稷幾傾若與少康易地而處或未能復大禹之績也推此言之宜髙夏康而下漢祖矣諸卿具論詳之翌日丁巳講業既畢顗亮等議曰三代建國列土而治當其衰弊無土崩之勢可懷以德難屈以力逮至戰國强弱相兼去道德而任智力故秦之弊可以力爭少康布德仁者之英也髙祖任力智者之雋也仁智不同二帝殊矣詩書述殷中宗髙宗皆列大雅少康功美過於二宗其為大雅明矣少康為優宜如詔㫖贊育松等議曰少康雖積德纍仁然上承大禹遺澤餘慶內有虞仍之援外有靡艾之助寒浞讒慝不德于民澆豷無親內外棄之以此有國蓋亦有所因至於漢祖起自布衣率烏合之衆以成帝者之業論德則少康優課功則髙祖多語資則少康易校時則髙祖難帝曰諸卿論少康因資髙祖創造誠有之矣然未知三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功漢祖功髙未若少康盛德之茂也且夫仁者必有勇誅暴必用武少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘闕故勳美闕而罔載惟有伍貟粗述大略其言復禹之績不失舊物祖述聖業舊章不愆自非大雅兼才孰能與於此向令墳典具存行事詳備亦豈有異同之論哉於是羣臣咸恱服中書令松進曰少康之事去世久逺其文昧如是以自古及今議論之士莫有言者德美隱而不宣陛下既垂心逺鑒考詳古昔又發德音贊明少康之美使顯於千載之上宜録以成篇永垂于後帝曰吾學不博所聞淺狹懼於所諦未獲其宜縱有可采億則屢中又不足貴無乃致笑後賢彰吾暗昧乎於是侍郎鍾㑹退論次焉唐太宗嘗謂中書令岑文本曰夫人雖禀定性必須博學以成其道亦猶蜃性含水待月光而水垂木性懷火待燧動而熖發人性含靈待學成而為美是以蘇秦刺股董生垂帷不勤道藝則其名不立文本曰夫人性相近情則遷移必須以學飾情以成其性禮云玉不琢不成器人不學不知道所以古人勤於學問謂之懿德太宗又謂房𤣥齡曰為人大須學問朕往為羣凶未定東西征討躬親戎事不暇讀書比來四海安靜身處殿堂不能自執書卷使人讀而聽之君臣父子政教之道具在書內古人云不學面墻蒞事惟煩不徒言也却思少小時行事大覺非也太宗又詔羣下曰朕比尋討經史明王聖帝曷嘗無師傅哉前所進令遂不覩三師之位意將未可何以然黃帝學大顛顓頊學緑圖堯學尹壽舜學務成跗禹學西王國湯學威子伯文王學子斯武王學郭叔前代聖王未遭此師則功業不著乎天下名譽不傳乎載籍况朕接百王之末智不同聖人其無師傅安可以臨兆民者哉詩不云乎不愆不忘率由舊章夫不學則不能明古道而能政致太平者未之有也可即著令置三師之位唐髙宗顯慶元年立子𢎞為皇太子受春秋左氏於率更令郭瑜至楚世子商臣弒其君喟而廢卷曰聖人垂訓何書此邪瑜曰孔子作春秋善惡必書褒善以勸貶惡以誡故商臣之罪雖千載猶不得滅𢎞曰然所不忍聞願讀他書瑜拜曰里名勝母曽子不入殿下睿孝天資黜凶悖之迹不存視聽臣聞安上治民莫善於禮故孔子稱不學禮無以立請改受禮太子曰善穆宗嘗坐延英與門下侍郎𢎞文館大學士鄭覃論詩工否覃曰孔子所刪三百篇是巳其非雅正者烏足為天子道哉夫風大小雅皆下刺上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝特能詩之章解而不知王術故卒歸於亂章什諓諓願陛下不取也帝每言順宗事不詳實史臣韓愈豈當時屈人邪昔漢司馬遷與任安書辭多怨懟故武帝本紀多失實覃曰武帝中年大發兵事邉生人耗瘁府庫殫竭遷所述非過言李石曰覃所陳因武帝以諫欲陛下終究盛德帝曰誠然靡不有初鮮克有終覃曰陛下樂觀書然要義不過一二陛下所道是矣宜寢饋以之穆宗嘗問朕欲學經與史何先刑部侍郎薛放曰六經者聖人之言孔子所發明天人之極也史記道成敗得失亦足以鑒然謬於是非非六經比穆宗曰吾聞學者白首不能通一經安得其要乎對曰論語六經之菁華也孝經人倫之本也漢時論語首立於學官光武令虎賁士皆習孝經元宗親為注訓蓋人知孝慈則氣感和樂也穆宗曰聖人以孝為至德要道信然宋仁宗慶歷四年趙師民上勸講針曰若帝之元於稽古先將以其道格于皇天格天如何謹徽舊典惟聖時憲乃克盡善在帝宅中亮章溫雅將以其文化成天下化成如何順考正道席上之珍兹惟國寶天下有帝體元創制非先聖之舊章不足以秉同文而執司契日中為市以熭四方非先聖之遺法不足以舉大義而正國常帝度其身郁郁乎文彰禮施樂以副皇墳帝出其言穆穆厥聲含仁吐義式諧羣情自天降祥我民既康不觀于經懼先猷之寖忘四夷效命有嚴誓令不觀于經慮大功之未定無以方隅之多事而謂經籍之宜息虞舜征苖誕敷文德無謂宸居之至尊而忽右文之為貴西伯造周天經地緯無以陳久之可替乃謂迂闊而難行先哲之言雖無老成無譏鄙生之窶陋而略愚儒之淺昧先師之談不以人廢無以世治之或殊而謂陳言之可侮商弼之諫事不師古無玩嵗月之其除而謂寸隂之巳速周王之戒惟日不足有以見世主之御圖或萬機紛然不酌于古道則風化有時而弗宣有以見人君之居極或百度差忒不斷於古義則權制有時而弗克昔令王之經世必去害而稱利眀主觀其書可以效財成于萬事昔賢臣之事君有謀猷而必陳明主觀其書可以示軌度于羣倫正朝之上法宫之中非贊襄雅奧不足以興嗜欲于清躬神麗之遊光眀之處非啓迪深厚不足以立正事於古語是故可以上文可以立武可以奉天地可以為宗主匪止玩其辭而釋其詁可以觀道可以行仁可以對萬物可以臨兆人不止明其舊而知其新靖恭乙夜總覽羣書夫聖人之至德何以加諸從容晏朝紬繹微㫖非天下之至精孰能與此臣初聞始元之間儒風寖還待問之臣賜以清閒臣伏觀永平之烈經術未缺羣儒議前稱制以決桑乾之后來自幽陵束髮右袵斯文有承金陵之君越于夷裔雖則講習其文巳弊李唐之興賢君挺生貞觀初治開元既平東壁羣山儒風墨卿侍從之臣官有佳名在我太祖神武披攘親駕辟雍真儒有光有赫太宗文武並運經臣師師以承帝問於穆真皇講求多藝以其人文發為盛際陛下即位纂承天祿肇開賢扃以延儒服西臨邇英北啓延義曕仰皇明彌綸聖智成天下之務昔游焉而穆清陳天下之謨頃於兹而講肄帝坐甚明天章不祕願以議道願以出治下臣執經敢告中侍師民又嘗講詩如彼泉流奏曰水之初出喻王政之發順行則通通故清潔逆亂則壅壅故濁敗賢人用則王政通而世清平邪人進則王澤壅而世濁敗幽王失道用邪黜正正不勝邪雖有善人不能為治亦將相牽而淪于汙濁也帝曰水何以喻政對曰水者順行而潤下利萬物故以喻政此于比興義最大後講論語問修文德曰文者經天緯地之總稱君人之道撫之以仁制之以義接之以禮講之以信皆是帝曰然其所先者無若信也曰信者天下之大本仁義禮樂皆必由之此實至道之要復問鑽燧改火曰古之聖王舉動必順天時所以四時變火隨木色近世漸務茍簡以為非治具而遂廢之至其萬事皆不如古又問子夏子張所言交道孰勝曰聖哲之道含覆廣大與天地參善者有以進德惡者俾之改行子張之言為優他日讀漢記問長安城衆莫能知共推師民因陳自古都雍年世舊址所在若畫諸掌帝恱曰何其所記如此嘉祐五年右司諫趙抃上言曰臣竊以人主之御天下也其聰明必欲廣聰明廣則禍福之鑒逺矣其尊威必欲重尊威重則上下之理明矣伏惟陛下承祖繼宗體堯蹈舜睿聖仁厚固四海稱頌之不暇何闕遺之有焉然臣備位諫垣朝慮夕思不敢循默者庶幾有補於未至萬分之一耳夫易之吉凶詩之美刺禮之汙隆樂之治亂春秋之善惡以至史漢之書先代得失存亡無不紀述今經筵侍講者講吉不講凶講治不講亂侍讀者讀得不讀失讀存不讀亡臣愚以謂陛下非所以廣聰明之義也伏望發德音命經筵臣僚臨文講誦無隱諱至於吉凶治亂得失存亡之所由兆尤宜詳究鋪陳之使禍福之鑒日聞宗廟社稷無窮之福也夫帝王文章天子翰墨真圗書之祕寶實聖神之能事今夫輔弼左右之臣宦官近戚之家碑名挽詞佛榜僧號或上求御製或仰覬宸翰咸出非望多遂其請臣愚以謂陛下非所以重尊威之道也伏望惜堂陛之崇祕奎壁之彩慎重命賜杜絶幸望上下之理從而益明朝廷中外莫大幸也二者惟陛下留神察焉臣無任激切納忠待罪之至仁宗時王拱辰為學士承㫖帝於邇英閣置太𤣥經蓍草顧曰朕每閲此卿亦知其說乎拱辰具以對且曰願陛下垂意六經旁采史策此不足學也英宗即位天章閣待制知諫院兼侍讀司馬光上奏曰臣伏覩講筵所告報依乾興年故事講論語讀史記續奉聖㫖直候來春臣聞傅說曰王人求多聞時惟建事學于古訓乃有獲又曰念終始典于學厥德修罔覺然則學者帝王之首務不可忽也况今陛下初臨大寶所宜朝夕延訪群臣講求先王之至道覽觀前世之成敗以輔益聖德緝熙大化不可但循近例以寒暑為辭如此使下情何以上通四方何以觀望殆非所以廣聰明宣令名也伏乞依前降聖㫖擇日開講筵治平元年光又奏曰臣伏覩講筵所告報奉聖㫖令自九月初五日後逐日開講筵至重陽節住講候將來開春别選日開講筵臣竊以國家本設經筵欲以發明道誼禆益聖德先帝時無事常開講筵近嵗因聖體不安遂於端午及冬至以後盛暑盛寒之時權罷數月今陛下始初清明方宜鋭精學問之時而五日開講八日巳罷臣恐議者以為陛下非有意於求道但欲循故事備外飾而已群臣非有意於明道但欲塞職業求錫賚而已若果如此臣竊為朝廷羞之且陛下近增置諸宮教授仍下詔戒勗宗室使之向學儻陛下不以身先之則宗室安肯奉詔哉臣愚以為陛下若别有所為未暇開講則且俟他時亦未為晚若既開講筵則恐數日之間未宜遽罷光又奏曰臣伏覩經筵所講說論語將畢竊以尚書者二帝三王嘉言要道盡在其中為政之成規稽古之先務也陛下新承大統留意萬機欲求楷模莫盛於此臣不勝區區欲望陛下更以聖意裁酌將來論語既畢令講說尚書二年光又上乞經筵訪問疏曰臣以駑朽得侍勸講竊見陛下天性好學孜孜不倦然於經席之中未嘗發言有所詢問臣愚意陛下欲護群臣之短恐於應對之際倉猝失據不能開陳稠人之中受其愧怍此誠聖心仁恕之極群臣捐軀無以報塞然臣聞易曰君子學以聚之問以辨之論語曰疑思問中庸曰有弗問問之弗知弗措也有弗辨辨之弗明弗措也以此言之學非問辨無由發明今陛下若皆默而識之不加詢訪雖為臣等踈淺之幸竊恐無以宣暢經㫖禆助聖性伏望陛下自今講筵或有臣等講解未盡之處乞賜詰問或慮一時記憶不能詳備者許令退歸討論次日别具劄子敷奏庶幾可以輔稽古之志成日新之益治平間起居注韓維上言曰臣幸得以史官侍左右記言動竊見每開邇英閣召近臣講讀經史陛下未嘗一發德音有所詢問遂使執經者不得極其說秉筆者無所載其美巳事而退莫不俯默有不自得之意臣竊惑之臣聞傅說有言王人求多聞惟以建事事不師古以克永世匪說攸聞蓋治天下者必先於建事欲建事者莫重於師古欲師古者莫急於求多聞然則今之所謂講筵者陛下之所以求多聞也堯舜聖帝必先稽古三代令王皆有師傅之官坐論道義爾後德薄不能如古然至於欲治之主亦莫不以此為急漢髙祖初得天下感陸賈之言知不可以馬上治之每奏新語篇篇稱善光武數引公卿郎將講論經理夜分乃寐唐太宗命學士杜如晦等十八人更直閣下降以溫顔與之討論經義此數君者豈樂勤苦而徇虛名哉誠以治天下之要莫不出此故功業隆於當時聲名流於後世非其幸也其道以致之也朝廷自宰相以及羣司率以職事進退所言皆目前常務而又迫景晷不得詳盡其理邇英閣者陛下燕閒之所也侍於側者皆獻納論思之臣陳於前者非聖人之經則歷代之史也御燕閒則可以留漏刻之永對侍臣則可以極咨訪之博論經史則可以窮仁義之道究禍敗之原起而行之則上可以為堯舜三代之君下猶不失為漢髙光武唐太宗也然非從容降接則無以盡臣下之情非往復研究則無以見聖人之奧非力而行之則不足以追前古之治陛下於此三者似未盡之此臣所以不得不惑也至於群臣亦皆惑之議者以為陛下嚮在亮隂惟于咨決政事有不得巳而言耳其餘可得而略也今禮制終畢臣下傾耳以聽玉音語曰時然後言陛下之言此其時也臣雖不敏請秉筆以俟干冒天威臣無任惶懼戰栗懇激之至張方平上言曰荀子曰聖王有百吾孰法焉欲觀聖王之迹則於其粲然者矣禹湯有傳政而不若周之政也非無善政也久故也傳者久則論略近則論詳當今之世而君必談堯舜臣必稱禹稷是迂儒拘生之論非適時濟用者也伏以唐氏有天下三百年其間治亂得失詳矣朝廷立國之紀典刑制度因於唐者也故觀今之政唐氏最近臣以不敏忝職諫司思有以薦乙夜之親程廣觀文之典學欲乞今後莭略唐書紀傳中事迹令可施行有益治道者間録一兩條上進伏乞萬機之暇特賜開覽善者可以為準的惡者可以為鑒戒兹亦賈誼眺錯借秦以喻漢事之意也神宗初詔侍臣講讀監察御史唐淑問言王者之學不必分章句飾文辭稽古聖人治天下之道歷代致興亡之由延登正人博訪世務以求合先王則天下幸甚熙寧元年右正言供諫職孫覺論人主有髙世之資求治之意在成之以學上奏曰臣聞人主患無髙世之資有有其資而無求治之意有有其意而無好學之實三者之備而治效不成者未之有也然此三者常若不可以兼備何也聰明睿智博達而疏通者髙世之資也然或矜其才以天下之萬事為不足為若此者必無成蚤朝晏罷選用群臣孜孜而不懈者求治之意也然或蔽於一曲而不見聖人之全因陋就寡而不本先王之意若此者雖安易危雖强易弱可以偷安於一時而不可傳之後世人主欲無此患其惟學乎夫學非䔍好而審問謹思而力行則不足以覽道德之粹精極性命之微妙人主之學茍不深造於道德性命之際則無以應萬務之變知羣下之情以堯舜之聖而稱之曰若稽古夫古者人主之所當若又當稽也以孔子之聖而孟子稱之曰學不厭誨不倦夫已誨人矣然猶不忘於學學可以巳耶陛下以髙世之資求治甚力好學而不倦可謂不世出之主矣然臣獨以為未者竊觀朝廷之政未盡得先王之意而先後之序未盡合聖人之道也臣非以謂朝廷無賢臣左右無端士顧恐陛下於學問之道未能極髙明而道中庸政事之間未能先本務而後末業也陛下幸聽臣言以聽政之暇特召兩府大臣或從官之中素所親倚者虛心克巳問以上躬之所不逮時政之所過差使之具以條對必有能言之者矣陛下增益其所未至勉强其所不能救其所偏解其所蔽則臣將見陛下之治度越漢唐而比隆於三代矣二年監察御史裏行程皓上疏曰臣伏謂君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駮雜之政所牽制一作滯不為流俗因循之論所遷惑自知極於明信道極於篤任賢勿二去邪勿疑必期致世如三代之隆而後已也然天下之事患常生於忽微而志亦戒乎漸習是故古之人君雖出入從容閒燕必有誦訓針諫之臣左右前後無非正人所以成其德業伏願陛下禮命老成賢儒不必勞以職事俾日親便座講論道義以輔養聖德又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聽如是則聖智益明王猷允塞矣今四海靡靡日入偷薄末俗嘵嘵無復廉耻蓋亦朝廷尊德樂道一作義之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一一作正心誠意體乾剛健而力行之則天下幸甚知明州陳襄被召修起居注進誠明說曰臣竊以帝王之德莫大於務學學莫大於根誠明之信而蹈乎中庸之德也生而不動之謂誠知而有為之謂明正而不邪之謂中故誠者立善之本也明者致道之用也中庸者常德之守也三者立天下之能事畢矣聖人者先得乎誠者也因誠而後明必資乎學全盡以居之神固以行之酬酢萬物而無失於曲當此之謂誠則明矣賢人者思誠也因明而後誠者必擇乎善所謂善者可欲之謂也性也正而公者也所謂惡者有所不可為之謂也情僞者也邪而私者也存其所謂正而公者而去其所謂邪而私者此之謂擇善矣精一以守之中正以養之持循戒懼於不聞不覩之際此之謂慎獨而固執之矣久而不息則形形而不息則明明而不息則動動而不巳則化化而不已則神髙明博厚而配乎天地此之謂明則誠矣子思曰溥博淵泉而時出之溥博如天淵泉如淵言其誠之篤也誠之者篤則其為之者至是以其政不肅而行其教不言而諭其事不勞而成舉而措之天下之民無不從服而不知為之者故曰凡為天下國家有九經所以行之者一此之謂也是之謂誠明之學伏望留神聖覽通判越州曽鞏上言曰准御史臺告報臣寮朝辭日具轉對臣愚淺薄恐言不足采然臣切觀唐太宗即位之初延羣臣與圖天下之事而能絀封倫用魏鄭公之說所以成貞觀之治周世宗初即位亦延羣臣使陳當世之務而能知王朴之可用故顯德之政亦獨能變五代之因循夫當衆說之馳騁而以獨見之言陳未形之得失此聽者之所難也然二君能辨之於羣衆之中而用之以收一時之效此後世之士所以常感知言之少而頌二君之明也今陛下始承天序亦詔羣臣使以次對然且將歲餘未聞取一人得一言豈當世固乏人不足以當陛下之意與抑所以延問者特用纍世之故事而不必求其實歟臣愚竊計殆進言者未有以當陛下之意也陛下明智大略固將比跡於唐虞三代之盛如太宗世宗之所至恐不足以望陛下故臣之所言亦不敢效二臣之卑近伏惟陛下超然獨觀於世俗之表詳思臣言而擇其中則二君之明豈足道於後世而士之懷抱忠義者豈復感知言之少乎臣所言如左臣伏以陛下恭儉慈仁有能承祖宗之德聰明睿智有能任天下之材即位以來早朝晏罷廣問兼聽有更制變俗比跡唐虞之志此非羣臣之所能及也然而所遇之時在天則有日食星變之異在地則有震動陷裂水泉湧溢之灾在人則有飢饉流亡訛言相驚之患三者皆非常之變也及從而察今之天下則風俗日以薄惡紀綱日以㢮壞百司庶務一切文具而已內外之任則不足於人材公私之計則不足於食貨近則不能不以盜賊為慮逺則不能不以夷狄為憂海內智謀之士常恐天下之勢不得以久安也以陛下之明而所遇之時如此陛下有更制變俗比迹唐虞之志則亦在正其本而巳矣易曰正其本萬事理臣以謂正其本者在陛下得之於心而已臣觀洪範所以和同天人之際使之無間而要其所以為始者思也大學所以誠意正心修身治其國家天下而要其所以為始者致其知也故臣以謂正其本者在得之於心而巳得之於心者其術非他學焉而已矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而傅說周公之輔其君未嘗不勉之以學故孟子以謂學焉而後有為則湯以王齊桓公以霸皆不勞而能也蓋學所以成人主之功德如此誠能磨礱長養至於有以自得則天下之事在於理者未有不能盡也能盡天下之理則天下之事物接於我者無以纍其內天下之以言語接於我者無以蔽其外夫然則循理而巳矣邪情之所不能入也從善而巳矣邪說之所不能亂也如是而用之以持久資之以不息則積其小者必至於大積其微者必至於顯古之人自可欲之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道哉由是而巳矣故曰念終始典于學又曰學然後知不足孔子亦曰吾學不厭蓋如此者孔子之所不能巳也夫能使事物之接於我者不能纍其內所以治內也言語之接於我者不能蔽其外所以應外也有以治內此所以成德化也有以應外此所以成法度也德化法度既成所以發育萬物而和同天人之際也自周衰以來道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切茍簡溺於流俗末世之卑淺以先王之道為迂逺而難遵人主雖有聰明敏達之質而無磨礱長養之具至于不能有以自得則天下之事在於理者有所不能盡也不能盡天下之理則天下之以事物接於我者足以纍其內天下之以言語接於我者足以蔽其外夫然故欲循理而邪情足以害之欲從善而邪說足以亂之如是而用之以持久則愈甚無補行之以不息則不能見效其弊則至於邪情勝而正理滅邪說長而正論消天下之所以不治而有至於亂者以是而巳矣比周衰以來人主之所以可傳於後世者少也可傳於後世者若漢之文帝宣帝唐之太宗皆可謂有美質矣由其學不能逺而所知者陋故足以賢於近世之庸主矣若夫議唐虞三代之盛德則彼烏足以云乎由其如此故自周衰以來千有餘年天下之言理者亦皆卑近淺陋以趨世主之所便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又逺矣臣之所言乃周衰以來千有餘年所謂迂逺而難遵者也然臣敢獻之於陛下者臣觀先王之所已試其言最近而非逺其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸漬於道義之日又不為不久然臣以陛下有更制變俗比迹唐虞之志則在得之於心得之於心則在學焉而已者臣愚以謂陛下宜觀洪範大學之所陳知治道之所本不在於他觀傅說周公之所戒知學者非明主之所宜巳也陛下有更制變俗比迹唐虞之志則當懇誠惻怛以講明舊學而推廣之務當於道德之體要不取乎口耳之小知不急乎朝夕之近效復之熟之使聖心之所存從容於自得之地則萬事之在於理者未有不能盡也能盡萬事之理則內不纍於天下之物外不纍於天下之言然後明先王之道而行之邪情之所不能入也合天下之正論而用之邪說之所不能亂也如是而用之以持久資之以不息則雖細必巨雖微必顯以陛下之聰明而充之以至於不可知之神以陛下之睿知而積之以至於從心之不踰矩夫豈逺哉顧勉强如何耳夫然故內成德化外成法度以發育萬物而和同天人之際甚易也若夫移風俗之薄惡振綱紀之㢮壞變百司庶務之文具厲天下之士使稱其位理天下之財使贍其用近者使之親附逺者使之服從海內之勢使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而變異不消者也如聖心之所存未及於此內未能無秋毫之纍外未能無纎芥之蔽則臣恐欲法先王之政而智慮有所未審欲用天下之智謀材諝之士而議論有所未一於國家天下愈甚無補而風俗紀綱愈以衰壞也非獨如此自古所以安危治亂之幾未嘗不出於此臣幸蒙降問言天下之細務而無益於得失之數者非臣所以事陛下區區之志也輒不自知其固陋而敢言國家之大體惟陛下審察而擇其冝天下幸甚元豐間鞏知福州又上言曰伏以陛下聰明睿知天性自然可謂有不世出之姿自在藩邸入承顔色出奉朝請怡怡翼翼不自暇豫至恭極孝聞於天下及踐大位內事兩宫外嚴七廟仁被公族德刑閨門嬪御備官不淫於色音樂備數不溺於聲食菲衣綈務遵莭儉臺卑囿小無所增飾近習無便嬖左右無私謁未嘗出遊幸未嘗從畋漁其於憂憫元元勤勞庶政則念慮先於兆朕祗慎盡於纎芥晝而訪問至於日昃夕而省覽至於夜分每群臣進見接之禮篤而情通凡四方奏事莫不朝入而暮報雖大禹之勤于邦文王之不暇食無以加此其淵謀逺略必中事幾善訓嘉謨可為世則者傳聞下土雖僅得其一二已足以度越衆慮非可窺測可謂有君人之大德其髙深閎逺則憫自晚周秦漢以來世主不能獨見於衆人之表其政治所出大抵踵襲卑陋因於世俗而已於是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在已可謂有出於數千載之大志變革因循號令必信使海內觀聽莫不震動羣下遵職惟恐在後可謂有能行之效蓋刻意尚行不差毫髮縉紳之士有所不能及憂勞惕勵無懈須臾又非羣臣之所能望可謂特起於三代之後非常之主也愚臣孤陋熙寧二年出通判越州因轉對幸得論事敢據經之說以誠意正心修身治國家天下之道必本於學為獻逮今有十一年始得望穆穆之清光敢别白前說而終之臣以謂陛下有不世出之資有君人之大德與出於數千載之大志又有能行之效特起於三代之後然顧以治國家天下之道必本於學為獻於陛下何也蓋古之聖人雖出乎其類拔乎其萃然至其成德莫不由學故堯舜性之也而見於傳記則皆有師其史官識其行事則皆曰若稽古至於湯武身之也則湯學於伊尹武王學於太公見於詩禮孟子在商髙宗得傅說為相其命說之辭曰豫小子舊學于甘盤而傅說告之則曰學于古訓乃有獲又曰惟學遜志務時敏厥修乃來又曰惟斆學半念終始典于學蓋髙宗既巳學于甘盤矣及傅說相之乃更丁寧反復勉之以學其要歸則以謂當終始常念于學明學蓋不可一日而廢也至於孔子之自敘則自十有五而志於學至于七十而從心所欲不踰矩夫以孔子之聖必志于學其學之漸每十年而一進至于七十矣其從心也蓋不踰矩則傅說所稱當終始常念于學者雖孔子之聖不能易也故揚子曰學之為王者事久矣堯舜禹湯文武汲汲仲尼皇皇其已久矣聖賢之篤於學至於如此者蓋樂而不亂復而不厭者道也測之而益深窮之而益逺者聖人之言也知不足與困者學也方其始也求之貴博畜之貴多及其得之則於言也在知其要於德也在知其奧能至於是矣則求之博畜之多者乃筌蹄而已所謂多聞則守之以約多見則守之以卓也如求之不博畜之不多則未有於言也能知其要未有於德也能知其奧所謂寡聞則無約寡見則無卓也子貢稱孔子之學識其逺者大者則於言也能知其要於德也能知其奧然後能當於孔子之所謂學也審能是則存於心者有以為主於內天下之事雖其變無窮而吾所以待之者其應無方古之大有為於天下者未有不出於此也堯舜湯武所以為盛德之至孔子所以從心而不踰矩或得其行者未得其所以行得其言者未得其所以言孟子之所謂聖而不可知之謂神在是而已矣陛下萬幾之餘日引天下之士推原道德而講明其意陳六藝載籍之文而紬繹其說博考深思無有解倦其折衷是非獨見之明老師宿儒所不能到此臣之所聞也有不世出之資與君人之大德又有出於數千載之大志特起於三代之後此臣之所知也則陛下之學已可謂至矣然臣區區敢誦經之陳言以進於左右者誠將順陛下之聖志采傅說始終典學之言觀孔子少長進學之漸以陛下之明智知言之要知德之奧皆陛下之所素畜誠以陛下之樂道而繼之以不倦以陛下之稽古而加之以不已使天性之睿智所造者益深所積者益厚日日新又日新其於自得之者非徒足以待萬事無窮之變而應之以無方天下之人必將得陛下之行者不得其所以行得陛下之言者不得其所以言堯舜湯武所以為盛德之至孔子所以從心而不踰矩孟子所謂聖而不可知之謂神不在於陛下而孰在哉繇是斂五福之慶以大賚庶民享萬年之休以永綏方夏德厚於天地名昭於日月惟聖意之所在而已臣愚不敏蒙恩賜對不敢毛舉藂細之常務而於國家之體冒言其逺且大者此臣所以愛君區區之分也伏惟留神省察元豐八年守門下侍郎司馬光上哲宗孝經指解奏曰臣竊惟自古五帝三王未有不由學以成其聖學者所謂學者非誦章句習筆札作文辭也在於正心修身齊家治國明明德於天下也恭惟皇帝陛下肇承基緒雖年在幼冲而執喪臨朝率禮弗越體貌尊嚴舉止安重顒顒卭卬有老成之德華夷瞻仰無不愛戴此乃聖性自然不聞亦式實天祐皇家宗廟社稷生民之盛福也然玉不琢不成器人不學不知道儻復資學問以成之則堯舜禹湯文武何逺之有伏見近降聖㫖過冬至開講筵臣竊以聖人之德無以加于孝自天子至于庶人莫不始於事親終於立身揚名於後世誠為衆所宜先也臣嚮不自揆嘗撰古文孝經指解皇祐中獻於仁宗皇帝竊慮歲久遺失不存今别繕寫為一册上進伏乞聖明少賜省覽侍御史劉摯上奏曰右臣竊以聖人之德其聰睿神智固天性之所自有然孔子曰吾非生而知之好古敏以求之者也孟子亦謂人皆有是四端猶火之始然泉之始達在乎充之而巳茍不充之將失其本然則性雖聖人方其始也學問以達之範圍以成之者其可少哉昔者周成王幼冲踐阼其師保之臣傅之德誼道之訓教者周公召公太公其人也夫左右之人既如此則成王雖幼其耳目所入蓋無有不正者矣我仁宗之初亦以盛年嗣服用李維晏殊為侍讀馮元孫奭為侍講惟兹數人皆名儒宿德極天下之選是時方親庶政聽斷之暇每於雙日召使入侍講說經典或讀祖宗故事盛明之政慶澤無窮恭惟皇帝陛下紹膺天命傳序統業夫以異禀之質夙成之善而又上有太皇太后陛下之至仁厚德保護開佑所以成就者罔不備至矣然方春秋鼎盛在所資養左右前後宜正人與居語默見聞宜正事是接所以起善養源保微慎始尊德美而長智習致廣大而熙光明則勸講進讀輔導之官其可不慎擇也哉伏見兼侍讀給事中陸佃蔡卞皆新進少年越次暴起論德業則未試語公望則素輕使在此官衆謂非宜伏請罷其兼職以允公議仍欲望聖慈于內外兩制以上官內别選通經術有行義忠信孝悌淳茂老成之人以充其任遇非聽政之日便殿燕坐時賜延對使之執經誦說陳天下之義理古今君臣父子之道以廣睿志仰副善繼求治之意臣不勝愚欵神宗時王安國上師友策曰書曰能自得師者王詩之序曰自天子至於庶人未有不須友以成者然則師友之於人其不可以無也如此夫養父母畜妻子而衣食出於其力者庶人之事盡此矣其所以慮於憂患之際甚微而猶曰須友以成況士大夫守宗廟朝廷之事甚衆則不可以無友士大夫尚然又況諸侯守一國之大乎至於天子之勢大於諸侯則猶不可以不學無師友也湯之於伊尹文武之於太公望髙宗之於甘盤皆上盡悃愊以求於下而下之自重不可以詘者豈以其道德足以驁上哉蓋以為所以望於吾者以道德而其求也不勤則其聽也不一故君之於臣也忘其貴臣之於君也忘其賤論道德於君臣之際而無貴賤者此天下國家之所以治也記曰取人以身修身以道夫修身至於足以取人者學之效也而果可以不學於師友乎夫以四海九州之民屬於一人之治聰明不足以當萬事之視聽操天下之要者取人而已果可以不學於師友乎自先王之澤竭而禮義詘乎戰國之俗權使天下之士而君臣之際形隔勢絶師友之道遂湮滅不聞於後世雖有學於其臣者豈復有懇惻之心哉夫治亂之幾出乎此而世俗之談者不能推見本末徒以其事之末者甚淺而易見而安知夫效於本者如此有天下者可不戒哉哲宗元祐元年崇政殿說書程頥上宣仁皇后書曰臣愚鄙之人自少不喜進取以讀書求道為事于兹幾三十年矣當英祖朝暨神宗之初屢為當塗者稱薦臣於斯時自顧學之不足不願仕也及皇帝陛下嗣位太皇太后臨朝求賢願治大臣上體聖意搜揚巖穴首及微賤蒙恩除西亰學官臣於斯時未有意於仕也辭避方再而遽有召命臣門下學者促臣行者半勸臣勿行者半促臣行者則曰君命召禮不俟駕勸臣勿行者則曰古之儒者召之則不往臣以為召而不往惟子思孟軻則可蓋二人者處賔師之位不往所以規其君也巳之微賤食土之毛而為王民召而不至邦有常憲是以奔走應命到闕䝉授以館職方以義辭遂蒙召對臣於斯時尚未有意於仕也進至簾前咫尺天光未嘗敢以一言及朝政陛下視臣豈求進者哉既而親奉德音擢置經筵事出望外惘然驚惕臣竊內思儒者得以道學輔人主蓋非常之遇使臣自擇所處亦無過於此矣臣於斯時雖以不才而辭然許國之心實巳萌矣尚慮陛下貪賢樂善果於取人知之或未審也故又進其狂言以覬詳察曰如小有可用則敢不就職或狂妄無取則乞聽辭避章再上再命祇受是陛下不以為妄也臣於是受命供職而來夙夜畢精竭慮惟欲主上德如堯舜異日天下享堯舜之治廟社固無窮之基乃臣之心也臣本山野之人禀性朴直言辭鄙拙則有之矣至於愛君之心事君之禮告君之道敢有不盡上賴聖明可以照鑒臣自惟至愚蒙陛下特達之知遭遇如此願效區區之誠庶幾毫髮之補惟陛下留意省覽不勝幸甚伏以太皇太后陛下心存至公躬行大道開納忠言委用耆德不止維持大業且欲興致太平前代英主所不及也但能日慎一日天下之事不足慮也臣以為今日至大至急為宗社生靈久長之計惟是輔養上德而已歷觀前古輔養幼主之道莫備於周公周公之為萬世之法也臣願陛下擴髙世之見以聖人之言為可必信先王之道為可必行勿狃滯於近規勿遷惑於衆口古人所謂周公豈欺我哉周公作立政之書舉言常伯常任至於綴衣虎賁以為知恤兹者鮮一萹之中丁寧重復惟在此一事而巳書又曰僕臣正厥后克正又曰后德惟臣不德惟臣又曰侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽是古人之意人主跬步不可離正人也蓋所以涵養氣質薰陶德性故能習與智長化與心成後世不復知此以為人主就學所以涉書史覽古今也不知涉書史覽古今乃一端爾若止於如是則能文宫人可以備勸講知書內侍可以充輔道何用置官設職精求賢德哉大抵人主受天之命禀賦自殊歷考前史帝王才質鮮不過人然而完德有道之君至少其故何哉皆輔養不得其道而位勢使之然也伏惟皇帝陛下天資粹美德性仁厚必為有宋令主但恨輔養之道有未至爾臣供職巳來六侍講筵但見諸臣拱手默坐當講者立案傍解釋數行而退如此雖彌年積歲所益幾何與周公輔養成王之道殊不同矣或以為主上方幼且當如此此不知本之論也古人生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薰聒使盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意偏好生於內衆口辨言鑠於外欲其純完不可得也故所急在先入豈有太早者乎或又以為主上天資至美自無違道不須過慮此尤非至論夫聖莫聖於舜而禹臯陶未嘗忘規戒至曰無若丹朱好慢遊作傲虐且舜之不為慢遊傲虐雖至愚亦當知之豈禹而不知乎蓋處崇髙之位警戒之道不得不如是也且人心豈有常哉以唐太宗之英睿躬歷艱難力平禍亂年亦長矣始惡隋煬侈麗毁其層觀廣殿不六七年復欲治乾陽殿是人心果可常乎所以聖賢雖明盛之際不廢規戒為慮豈不深遠也哉況冲幼之君閉邪拂違之道可少懈乎伏自四月末間以暑熱罷講比至中秋蓋踰三月古人欲旦夕承弼出入起居而今乃三月不一見儒臣何其與古人之意異也今士大夫家子弟亦不肯使經時纍月不親儒士初秋漸涼臣欲乞於內殿或後苑清涼處召見當日講官俾陳說道義縱然未有深益亦使天下知太皇太后用意如此又一人獨對與衆見不同自然情意易通不三五次便當習熟若不如此漸致待其自然是輔道官都不為力將安用之將來伏假既開且乞依舊輪次直日所貴常得一員獨對開發之道蓋自有方朋習之益最為至切故周公輔成王使伯禽與之處聖人所為必無不當真廟使蔡伯希侍仁宗乃師古也臣欲乞擇臣僚家子弟十歲巳上十二巳下端謹頴悟者三人侍上左右上所讀之書亦使讀之辨色則入昏而罷歸常令二人入侍一人更休每人擇有年宫人內臣二人隨逐看承不得暫離常情笑語亦勿禁止唯須言語必正舉動必莊仍使日至資善堂呈所習業講官常加教導使知嚴憚年才十三便令罷去歲月之間自覺其益自來宰臣十日一至經筵亦止於默坐而已又間日講讀則史官一人立侍史官之職言動必書施於視政時則可經筵講疑之所乃燕處也主上方問學之初宜心泰體舒乃能恱懌今則前對大臣動虞有失傍立史官言出輒書使上欲逰其志得乎欲發於言敢乎深妨問學不得不改欲乞特降指揮宰臣一月兩次與文彥博同赴經筵遇宰臣赴日即乞就崇政殿講說因令史官入侍崇政殿說書之職置來巳久乃是講說之所漢唐命儒士講論亦多在殿上蓋故事也邇英迫狹講讀官內臣近三十人在其中四月間尚未甚熱而講官巳流汗況主上氣體嫩弱豈得為便春夏之際人氣蒸薄深可慮也祖宗之時偶然在彼執為典故殊無義理欲乞今後只於延和殿講讀後楹垂簾簾前置御座太皇太后每遇政事稀簡聖體康和時至簾下觀講官進說不惟省察主上進業於陛下聖聰未必無補兼講官輔導之間事意不少有當奏禀便得上聞亦不可煩勞聖躬限以日數但旬月之間意適則往可也今講讀官共五人四人皆兼要職獨臣不領别官近復差修國子監太學條制是亦兼他職也乃無一人專職輔導者執政之意可見也蓋惜人才不欲使之閒耳又以為雖兼他職不妨講讀此尤不思之甚也不敢言告君之道只以告衆人言之夫告於人者非積其誠意不能感而入也故聖人以蒲盧喻教謂以誠化之也今夫鐘怒而擊之則武悲而擊之則哀誠意之感而入也告於人亦如是古人所以齊戒而告君者何謂也臣前後兩得進講未嘗敢不宿齊豫戒潛思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭說徒以頰舌感人不亦淺乎此理非知學者不能曉也道衰學廢世俗何嘗聞此雖聞之必以為迂誕陛下髙識逺見當䝉鑒知以朝廷之大人主之重置二三臣專職輔導極非過當今諸臣所兼皆要官若未能遽罷且乞免臣修國子監條制俾臣夙夜精思竭誠專在輔道不惟事理當然且使天下知朝廷以為重事不以為閒所也陛下擢臣於草野之中蓋以其讀聖人書聞聖人道臣敢不以其所學上報聖明竊以聖人之學不傳久矣臣幸得之於遺經不自度量以身任道天下駭笑者雖多而近年信從者亦衆方將區區駕其說以示學者覬能傳於後世不虞天幸之至得備講說於人主之側使臣得以聖人之學上沃聖聰則聖人之道有可行之望豈獨臣之幸哉如陛下未以臣言為信何不一賜訪問臣當陳聖學之端緒發至道之淵微陛下聖鑒髙明必蒙照納如其妄僞願從誅殛臣愚無任懇悃惶懼待罪之至頥又奏曰臣頥傾竭愚誠冒聞天聽狂妄之誅非所敢避伏念臣草萊賤士蒙陛下拔擢置之勸講之列夙夜畢精竭慮思所以補報萬一昨於去年六月中嘗有奏陳言輔道人主之事巳踰半年不䝉施行一事臣愚切思所言甚多如皆不可用其狂妄亦甚矣雖朝廷寬大不欲以言罪人然主上春秋方富宜親道德之士豈可以狂妄之人置之左右臣倣徨疑慮不能自巳況臣所言非出已意皆先王之法祖宗之舊不應無一事合聖心者臣竊疑文字煩多陛下不能詳覽或雖䝉覽而未察愚意臣不敢一一再言止取一事最切者復為陛下陳之臣前上言乞於延和殿講讀太皇太后每遇政事稀簡聖體康和時至簾下觀講官進說不惟省察主上進業於陛下聖聰未必無補兼講官輔道之間事意不少有當奏禀便得上聞臣今思之太皇太后雙日垂簾聽政隻日若更親臨講讀亦恐煩勞聖躬欲乞只就垂簾日聽政罷聖體不倦時召當日講官至簾前問當主上進業次第講說所至如何開益使天下知陛下於輔養人主之道用意如此延對儒臣自古以為美事陛下試從臣言後當知其不謬此一時之事且非定制如其無益罷之何晚自來經筵賜坐啜茶蓋人主崇儒重道之體今太皇太后省察主上進業雖或使之講說亦無此禮臣所以再言此一事者蓋輔道之間有當奏知之事無由上達若得時至簾前可以陳說所繫甚大陛下必謂主上幼冲間日講讀足矣更無他事此甚不然蓋從前不曽有為陛下極陳輔養少主之道者故陛下未深思爾願陛下聖明不以臣之微賤而忽其言察臣區區之心豈有他哉惟欲有補於人主爾臣披瀝肝膽言盡於此伏望聖慈采納天下幸甚頥又奏曰臣昨日上殿面奉德音除臣崇政殿說書臣雖瀝懇辭遜不蒙俞允臣輒有愚誠昧死上聞天聽竊以知人則哲帝堯所難雖陛下聖鑒之明然臣方獲進對於頃刻之間陛下見其何者遽加擢任今取臣於畎畝之中驟置經筵蓋非常之舉朝廷責其報效天下之所觀矚茍或不當則失望於今而貽譏於後可不謹哉臣未敢必辭只乞再令臣上殿進劄子三道言經筵事所言而是則陛下用臣為不誤臣之受命為無愧所言而非是臣才不足用也固可聽其辭避如此則朝廷無舉動之過愚臣得去就之宜伏望聖慈特賜俞允其一曰臣伏觀自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養昔者周公輔成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者亦必延明德端方之士與之居處使之薰染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天禀而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諫也在涵養薰陶而已大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就欲乞朝廷慎選賢德之士以侍勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝習讀之暇游息之間時於內殿召見從容宴語不獨漸摩道義至於人情物態稼穡艱難積久自然通逹比之常在深宫之中為益豈不甚大竊聞間日一開經筵講讀數行羣官列侍儼然而退情意略不相接如此而責輔養之功不亦難乎今主上冲幼太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大抵與近習處久熟則生褻慢與賢士大夫處久熟則生敬愛此所以養成聖德為宗社生靈之福天下之事無急於此其二曰臣聞三代之時人君必有師傅保之官師道之教訓傅傅其德義保保其身體後世作事無本知求治而不知正君知規過而不知養德傅德義之道固巳踈矣保身體之法復無聞焉伏惟太皇太后陛下聰明睿哲超越前古皇帝陛下春秋之富輔養之道當法先王臣以為傅德義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏慎之心臣欲乞皇帝左右扶侍祗應宫人內臣並選年四十五巳上厚重小心之人服用器玩皆須質朴一應華巧奢麗之物不得至於上前要在侈靡之物不接於目淺俗之言不入於耳及乞擇內臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之有剪桐之戲則隨事針規違持養之方則應時諫止調謢聖躬莫過於此其三曰臣竊以人主居崇髙之位持威福之柄百官畏懾莫敢仰視萬方承奉所欲隨得茍非知道畏義所養如此其惑可知中常之君無不驕肆英明之主自然滿假此古同患治亂所繫也故周公告成王稱前王之德以寅畏祗懼為首從古巳來未有不尊賢畏相而能成其聖者也皇帝陛下未親庶政方專問學臣以為輔養聖德莫先寅恭動容周旋當主於此歲月積習自成聖性臣竊聞經筵臣僚侍者皆坐而講者獨立於禮為悖欲乞今後特令坐講不惟義理為順所以養主上尊儒重道之心二年頥又乞遇六參日許講讀官上殿奏曰臣竊以朝廷置勸講之官輔導人主豈止講明經義所以薰陶性質古所謂承弼厥辟出入起居者固宜朝夕納誨以輔上德自來暑熱罷講直至中秋方御經筵數月之間講讀官無由進見夫以文武之齊聖欲旦夕承弼今乃數月不接儒臣甚非先王輔導養德之意方主上春秋之富輔養之道豈可踈略如此臣欲乞未御講筵間每遇六參日宰臣奏事退許講讀官上殿問聖體數日一對儒臣不唯有益人主在勸講之臣禮亦當然伏望聖慈特賜俞允歷代名臣奏議卷六
