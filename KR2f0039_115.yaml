body:
  text: 歴代名臣奏議卷一百十五明楊士竒等撰學校宋徽宗初即位御史中丞王覿奏乞太學冬季補試䟽曰臣伏見太學外舎生以二千為額每嵗四季補試前後試中之人逾額雖多而入學者少故逐季補試不已今科詔在邇外舍生入學者漸衆遂已及額四方學者既不知在學諸生額足又以朝廷逐季補試之法行之已久未甞中廢故来就冬試者道路相望也竊聞太學收接到諸生家保狀已是六百餘人本學申禮部乞補試而都省以額足不許本學已曉示罷試六百人者既不得試能無怨嗟若詔告有素則咨怨固所不恤緣太學既未甞先期告諭四方學者更不冬試及學者如期限到闕之後方指揮罷試即是朝廷著令誤四方就學之人奔走道路也豈所以信天下哉況孤寒之士有不逺數千里而至者不得試而使歸顯於事理非便臣欲乞朝廷指揮太學今年冬季依舊補試其試中人候學中生員有闕以資次撥入仍令本學契勘如來年春夏季委要更不須試補即預先移文諸路州軍曉喻學者令知若将來生員額闕合行補試亦先期曉告施行所貴不誤四方學者崇寧初左司諫慕容彦逢上奏曰臣竊謂諸路學校州有正録縣有長諭廼至其餘掌事之人皆奉行貢士法令書攷陞選之詳盖根本於此而逺方諸生尚循積習之弊廼或持其短長糾率學衆輙興訴訟以至發其舊愆以快私忿以此職掌𩔖多畏黙求全鮮克振職臣愚伏望聖慈特降睿㫖編修學制嚴立法禁不唯整肅學政亦以敦厚士風大觀中湖北提舉劉才邵乞頒聖學下太學劄子曰臣聞天佑下民作之君作之師惟其克相上帝寵綏四方盖治之之謂君教之之謂師治之教之之功天不能以自為必付之帝王帝王以盛徳履尊位克稱君師之任用能相天而成其能四方之民賴以寧謐唐虞三代之盛見於詩書之所傳率由此道其後去聖既逺無所折衷異論肆行而道統益微漢興百年稽古禮文之事乃克修舉孝宣增光前烈㽞意藝文爰詔諸儒講論五經同異於石渠且使平奏其議躬自臨決章帝建初間復修石渠故事因著其說為白虎通議雖未能方駕前古而發揮聖道豈云小補兩漢之文於斯為盛載在方冊光華至今恭惟國家膺受駿命聖聖相承雲章奎文光耀相燭非若前代歴世十數而好文之主纔一二見也陛下躬濬哲之資緝熙光明之學紹開興運纂修列聖之丕緒萬幾之餘無所嗜好獨玩意編簡考觀前言凡妙㫖所寄精微浩博昔人之所未覩者皆獨得於心術之妙雖堯舜禹湯文武汲汲以成帝王之極功何以遇此豈留意於章句之同異者得以望清塵哉天相斯文世道交興宗社再安兵革偃息而聖謨經逺首以育材為務爰頒詔㫖崇建太學以幸教多士導民設教之意勤勤如此君師之任可謂兼全之矣夫學者以聖王為師親逢斯時千載之遇也搢紳韋布之士豈無望於餘光哉兩漢之事不足為今日獻臣愚不勝區區大願欲望聖慈於清燕之間凡微言奥㫖自得於聖心者頒之儒館學宮俾承學之衆得以味道真而泳聖涯莫不精白以承休德仰副陛下恢崇至道開明羣心之意天下幸甚徽宗時通判李新上奏曰臣伏覩大觀學令斷自聖知制為成書頒降郡國知所遵守者累年于兹矣昔游夏不能賛孔子一辭則學令之設詎容擬議者邪自三代已来未有如此之詳且明也如挾書代筆之禁奉行者失於不嚴州學季試已不能杜絶其弊而縣學補試嵗升假手尤甚轉透題目出外終日塊坐撫弄筆硯以待文字之来其間翻錄至句語字畫錯繆雖差官監門例不敢搜索稍加誰何則必紛争詬詈公肆觝突傳出送入傍若無人一𨽻名學籍便以保庇門户有繫空名行食身未甞一躡學圃者有假故逾限已經除籍再託人補試者臣欲乞諸生補試入縣學嵗升入州學許教授當面試經義一道試日牒本州有出身官一員監如文義不通字札不同全然踈繆根究元試之弊則學者知所畏而州縣學無濫進叨冒之人矣李復上取士劄子曰臣恭覩神宗皇帝憫士弊於俗學之久慨然作新造之以經術發明聖人之遺言使講求義理之所歸庶知乎修身行已上以事君内以事親涖官接物弗畔於道而今之學者曽不思此平日惟是編𩔖義題傳集海語又大小經題目有數公試私課久已重疊印行傳寫其義甚多無不誦念公然剽竊以應有司之試終身之學止於如此甚者至於所專之經句讀不知音切不識茍誤中選入仕平生所學皆無可用非惟鄉閭無一善可稱雖有甚不齒者亦更不問朝廷建學立師設館給食而偷墯茍且若是安能副上教養之意哉欲責其移孝資忠臨民應務之效必不能也古者鄉舉里選非但取其浮文必皆考其素行臣欲乞立法取士以博學行義為先試言為次抑亦絶其干託奔競之私察其器識材術之異庶㡬所養可取所取可用聖朝有得士之實趙鼎臣乞駐蹕府學劄曰臣恭以陛下樂育人材建庠序開封府實輦轂畿甸之域天子所自治之地首詔執事並興府縣之學而有司推遷殆且十年博士弟子僑寄他所甚不稱明詔意致煩陛下申以程督曽不踰年之頃黌舎完成生徒四集秋某月有金芝二本産于大成殿之木上而本學生楊汶等一千一百五十八人相與踊躍誦歎合辭而言以謂乗輿方躬郊丘之饗吾學乃輦路所經從今芝實挺生殆先聖先師蒸出瑞物以報吾皇之德兹甚盛之舉謂臣黙不以聞何也臣竊以謂郊祀慶成之日千乗萬騎扈蹕還宮雖道出府學之南懼非所以仰勤天歩之臨也然而諸生伏清道之左聆屬車之音奏名通謁抑有著令如䝉天慈矜其懇誠示以恩意少緩六龍之驅一紆重瞳之顧如古式閭以寵新學則多士仰德孰不競勸四方聞風得以矜式以副陛下隆儒重道之意不勝幸甚臣待罪京邑職事所及有所見聞不敢緘黙謹昧死以聞給事中俞㮚上言曰學校三代之學也然崇寧四年以前議者以為是五年則非之大觀三年以前議者以為是四年則非之豈學校固若是哉觀望者無定說爾必使士有成才人無異論事之不美者不出於學校然後為得言頗見行髙宗時胡寅上疏曰臣竊謂孔子孟子皆生於列國戰争之時衛靈公問陳而孔子以爼豆為對滕文公問為國而孟子以庠序為言聖賢之謀必非迂闊究觀治亂可驗不欺自軍興以来布衣韋帶之士儒風掃地下無學賊民興此先哲之所深憂非國家之美事也方陛下潛心道奥日就月將發明經世之書以幸當世而承學之士未有可以仰副聖懷者豈亦教導之法有所未至哉臣愚謂諸州教授宜慎擇老成名士以充其選仍詔守臣留意學校則凡鄉舉游學之科居處飲食之制生徒多寡之額師儒殿最之法皆在所議如合聖心即乞睿斷詔大臣施行刑部侍郎知漳州廖剛上奏曰臣聞學術之邪正道之所由以廢興天下之所由以治亂是以自古為天下國家欲化民成俗以興帝王之治者未有不審乎此盖學必以堯舜禹湯文武周孔為師而外乎此者皆他道也異時王安石以該洽辯給輘轢一世自以前無古人後無来者然其學博雜無統頗僻失中乃至分文析字傍引曲證以行其臆說殆孟軻所謂邪說淫辭之害正者也盖說枝於正道則為邪辭溢於正理則為淫豈徒不足以明道而已哉如安石之學術大抵尊功尚利輕改作而廢典常樂軟熟而賤名節使天下靡靡日入於偷薄而莫之悟其為害亦深矣陛下天日之鑒灼見其弊悉罷黜之以幸天下誠斯文千載之遇也比詔名儒之能闢其說者以書来上竊意已經乙夜之鑒儻合聖意臣願頒之學官鏤板以傳使學士大夫曉然皆知是非當否之所在庶㡬邪淫之說不勝而人心皆歸於正豈小補哉李石上奏曰臣聞六經者帝王之心術也其實見於行事而其文見於成書因其文以考其實因其實以推其心之所傳則堯舜禹湯文武周公孔子之德業可概見也漢人之於垂絶之經勤矣賴其收秦人之餘燼振起遺音使其有傳而復續專門名家之學未易及也如武帝之表章元帝之牽制二君者雖於經甚勤泥於成書與行事之迹不能推明六經心術之所自所謂讀堂上之書反有愧於推輪之妙故也仰惟陛下之心則堯舜禹湯文武之心術也充之以惠利四海散之以潤澤萬物無一不有是心既有是心雖忘書亦可然猶儲精道奥灑為宸編以流布學校俾六經之文得附雲漢之章相為昭回矣頃者令取士通習六經與詩賦並行恐學者之習有所偏也則又下詔有司優取二禮之學其尊尚之意臣竊有以窺陛下欲託六經以逹其心於天下也不知士子所以仰副今日教育所得於經之盛能如漢人之專門名家者乎抑止為剽章獵句誦習科第計而已乎且聖人之經有資於金口木舌者駕說之師是也今世之儒非必一一金口木舌然所以為倡導之師者不可廢也今之六經誠有所偏廢而不舉者無師傳之過也臣願陛下立六經博士於太學俾四方學者各得以其經相授受州郡學校精擇其師如逐經學諭之𩔖如是則無偏廢之經矣韓駒上論曰臣聞方今陋儒之論以為人主之治天下直以禮樂刑政而為士者亦務明於道德性命而已文章不足尚也臣竊以為過矣昔者堯舜三代之世文章煥然周公仲尼聖人之在下者文章亦深逺矣今陋儒以已不能之故而曰不足尚則是六七聖人者皆不足法乎且夫堯舜三代距今㡬千嵗矣其風俗之盛衰尚可考者以其書知之也故周之噩噩不如商之灝灝而商之灝灝不如虞之渾渾周之衰也禮樂刑政尚未大壞而其文章獨先潰爛無復渾灝之氣後世言治者不過稱漢唐誦其詩讀其書則亦皆差賢於後世盖自古未有盛德之世而文章骩骳不振者也是以聖人尚之太祖皇帝時天下初定未遑文學之事太宗皇帝數與侍臣論文由是風俗翕然而變甞喜而謂侍臣曰近時文物漸盛它日必有著名者其後累聖臨御皆以叡文神學超軼百王又皆崇儒表善盖自端拱淳化之後天下乂安士得篤於文事磨礱綴緝以副上意百餘年間異人間出矣臣甞思之此豈一朝夕力哉是殆累聖奬勵激勸之所致也臣聞太宗始尚文教則士有王禹偁蘇易簡倡其風真宗敦好詞學則有晏殊楊億為之冠仁宗時則有若歐陽脩在神考時則有若王安石此數公者其文皆不愧於漢唐而其餘以文擅於一時者尚不可一二數也朝廷之上文物之盛至今耆老以為美談真太平之偉觀治世之休光也陛下天縱明智肆筆成書虞歌湯銘播示海内自有書籍以来未之有也臣竊度之雖有相如之典䇿終嚴之奉對常揚之制誥尚未足以仰望清光必有賡歌之臯陶陳謨之大禹効伎於周衛之内而後為稱方今雖不乏人然而數年之後壯者已老老者已耄則陛下所取以為侍從者𩔖皆今之少年進士也臣為進士顧所謂時文者其體格曾漢唐之不如則陛下它日所望以賡歌陳謨者誰乎意者奬勵激勸之道有所未盡而後生小儒承陋儒之說以為無事於此是以日靡靡也陛下廣庠序之教置師儒之官進士之髙選者不惜好爵以尊顯之不可謂不奬勸而士未有深於文者雖臣亦疑之進士之髙選者或幸得之而未必深於文也至體格卑弱者又曾不屏黜此固宜其不勉者矣謂宜稍變其體間求四方之能文者不問踈賤而尊顯之則不十年必有能賡歌陳謨者出焉使夫堯舜之主而有臯陶大禹之臣以繼今日之盛且陛下它日功成治定亦當得此等紀太山之封鏤白玉之牒與詩書並傳而不愧宜不為無益故臣欲破陋儒之論而先言治天下者文之不可廢也如此駒又上論曰臣聞古之人其仁義充于内則其文不期而自工是故讀易春秋則知周公仲尼之道為閎深要𦕈矣此必然之符也有木於此枝披葉落而曰吾本根茂則天下莫之信士皆曰吾知行仁義而其言漫汗繁雜無一言當於理則其所謂仁義者亦無乃非其實乎陋儒之論其不可聽亦明矣臣請遂論時文之弊昔者神宗皇帝既罷詞賦始立經義之科意以謂詞賦非古也而六經之作皆本於聖人學者如通其大義則其文章亦將漸復於三代今之學者既以講究道德發揮章句六經之㫖亦畧明矣獨其文章未能復古後生小儒皆為偶儷之詞漫汗之文纂錯以為工繁雜以為美昔李翺言六經之文不拘於儷也詩曰憂心悄悄慍于羣小則不偶儷矣其曰遘閔既多受侮不少則偶儷矣惟晉宋之間始拘於偶儷故劉子元以謂可一言而足者必衍以為二言可三句而成者必增以為四句然而偶儷之作近世尤甚是以至於纂錯繁雜而漫汗不可考嗚呼臣不知始變斯文之體者誰歟甚乎不仁者也臣丱角時從鄉先生問為大義鄉先生曰童子記之大畧如為賦而無聲韻耳已而臣游塲屋視同列者果皆如此因退而歎曰此豈神宗皇帝罷詞賦之意耶譬猶女工不欲作錦而壞其機退而相與刺繡夫錦之與繡則固不同矣然其為纂錯繁雜則一也陛下萬幾之暇亦甞取今進士之文觀之乎其偶儷漫汗三代有之乎六經有之乎陛下聖學淵奥博稽上古此固無逃於聖鑒矣夫文之偶儷始於東漢而詞之漫汗盛於東晉至其纂錯繁雜則又前世所未有也臣竊惟神宗皇帝罷詞賦立經義陛下崇學校以三代之風期天下之士而士止為漢晉之文以待天子之選甚可羞也恭惟陛下奎文宸章超軼堯禹學者雖無以測知其萬一然而昭回之光固萬物之所仰睹也又近嵗黜異端之後士非三代之書不讀誠可謂知本矣其朝夕之所誦捨六經則孟軻揚雄莊周列禦寇之書而已六經何可及也然詩之道志書之述事尚當取為法焉至於孟軻之醇揚雄之深莊周之辯列禦寇之不華皆曩之工文者所採取也今徒剽其語而不能學其文是獨何歟往者初立經義時士以王安石為師至今有司頒其書於天下數十百卷可取視也亦豈獨偶儷漫汗之體哉則是學者不能上陶風化以復渾灝之氣而次亦未能希王安石立言之萬一也豈不陋哉士方狃於素習見有不偶儷漫汗者則衆指為異端而有司亦不敢取必若所云則是六經孟軻及王安石亦皆為異端乎此亦積習之大弊也願下明詔使為文者上窮六經之體以為質中取孟軻諸子之作以為支下如王安石義解之𩔖以為義至於漢晉之弊則使痛刮而深鉏之然後游於璧池之上不負吾聖天子教育矣駒又上論曰臣甞謂學者之病在名實之不相副庠序之士所慕者三代今其文愧於三代矣其所陋者漢晉今其文不幸𩔖之矣是猶躬行顔閔之行而服盜跖之服曰無傷也此豈可不革其弊哉前日陛下制詔多士詞尚體要使復三代之盛甚大惠也臣時聞之踊躍太息謂將立見渾灝之氣詔書懇切然無士君子之深於文者倡其風士因陋就寡不能逺希作者徒為淺易之文以應有司之選煩言碎詞刋落不盡違明詔失聖意臣甚為諸儒不取也陛下即聽臣言詔革文弊則當慎擇有司而嚴其法臣甞計今天下郡國之士不翅數十萬人既已講解義理發明經傳為其所難矣豈無軼羣超俗之才足以輔弱扶微而庶㡬於三代之文者乎特以有司非是不取也不敢自騁於繩墨之外凡臣之所患者獨恐有司升黜之際未盡别白則士專已守殘其弊未可以猝除也國家初乗五季之亂文章盖掃地矣以太宗真宗歴年之久聲明文物之盛然僅能革五季之風而已及仁宗時益務復古是時綴文之士不為不衆而士亦未甚勸也其後歐陽脩執文柄以度量多士凡僻裂輕豔者掲其名而辱之惟重厚典直者取焉由是風俗一變熙寧之初僻裂輕豔之文既不復作而雕蟲篆刻之技猶在也士君子亦皆知其弊而不能自還以上之所取者惟是而已會王安石白罷詞賦神考從之而安石布其書於天下使以新義從事士乃始去雕蟲篆刻之技向令仁宗神考雖有復古立經之意而無良有司以升黜繼之臣知其有所必不能矣夫上言所好惡而以升黜繼之雖欲變天下之至難可也仁宗之復古風神考之立經義比於陛下之欲詞尚體要可謂難矣士猶勉力以副科舉而順上之好惡何則利之所在固衆之所趨也今荆廣閩蜀之間去京師數千里學者無所取師而都下鬻書者嵗取進士髙選之文集為版本傳播四方謂之義格後生小儒何識之有徒見為是文者例得髙選則皆揺脣燥吻焚油繼日誦讀以為師法此豈可不澄其源而欲清其流乎故其要莫若慎有司之選陛下欲民之不散則必擇導民之官欲農之不惰則必擇勸農之吏欲士之深於文則亦擇司文者而已必得如脩及安石者足以風動天下而又諭以升黜之㫖仍大臣自太學博士及郡國教授每嵗謹察其升黜之當否以為賞罸士雖未能遽復三代之風然少須假之不一二年必有可觀者駒又上論曰臣聞士為科舉之文其工拙若無所繫於國家而臣諄諄為陛下言之者不獨以格氣卑弱負陛下教育之意且陛下立政造事皆將復三代之盛臣愚以謂典謨訓誥所以播之四方傳之萬世亦當盡如六經而後為稱士生於此時不能自振拔於頽波之中使至治之世文事缺然此賤臣所深惜也夫文章雖小技而古人未有不苦心勤力而後僅能工者甚非可以一旦把筆而學為也如是則陛下亦無怪乎學者之不能文也彼志於禄而已故自為兒童而父兄教之以義格比十餘嵗則已誦數百篇稍長而能執筆則皆不治它技惟以模擬為工已而試于有司則固足以得禄矣及其入官之後年日加長而志不加專偶儷漫汗之文已熟於其手而古文竒字或未始識也夫文之體固不一矣而今之為文者則一之何則其素所積畜者然也然陛下它日使掌西掖之誥視北門之草與夫紬石室金匱之書者例皆取此今不教之於初學之時而欲責之於入官之後臣以為難矣及失職不稱然後擯斥之此又非學者之罪也士方未仕固不可使雜治它技以妨其業誠如臣言使為科舉之文已略倣依三代之體則它日遣言立意自當不愧於古人且臣非敢厚誣天下之進士也陛下何不試於清閒之燕取義格而觀之觀其遣言立意它日有能為陛下編年記事如劉向班固者乎有能為陛下陳謨奏議如馬周賈誼者乎有能歌功頌德如栁宗元韓愈者乎有能發誥施命如權德輿白居易者乎臣有以知其不能為也此六七公尚不可及況其上者乎今之學者則以為此等皆不足為也曰通經而已甚乎其不思也臣不敢借古人以為諭今之所尊師者莫如王安石文集數十百卷其間箴銘歌詩賦頌表奏之𩔖無不皆善經術特其文章之一端爾世有醜女見鄰婦之美而學之其眉目膚髮手足鼻口舉無所似也獨以一節之似而曰我盡得其美則未有不為人之所歐弃者矣此則士學安石之比也往者哲宗皇帝患其若此始立宏詞之科陛下前又置詞學兼茂科欲以此等求天下之士其意既美矣第恐所得不廣不足以儲他日之用故臣竊効愚䇿以為莫若教之於初學之時又皆取六經孟軻之體以為模楷則自當不陷於邪說前所謂宜間求四方之能文者不問踈賤而尊顯之尚慮有司之選有幸不幸則士亦未勸也臣聞累聖敦奬詞學當時羣臣號能文者無不旋被褒擢臣畎畝書生所記者纔二三事爾太宗甞夜讀李度詩朝而問丞相曰度今何在丞相言度坐法居絳州有詔乗傳入直史館夫度小官謫于外州而一詩之善已䝉記識矣則學者何得不勸焉今四海之大豈無如度者陛下留意微臣之言詳延俊彦以助聖化不勝幸甚駒又上論曰臣聞儒者之患非獨其文之不振也學之不博抑又甚焉陛下既詔學者復古之文又當使之博學今之說者曰博溺心又曰絶學無憂此乃老子莊周絶俗之人刳心去智之說何可法焉自孔子之聖而曰不如丘之好學也又曰我學不厭其晏居與門人應對之際諄諄以學為言故問禮問樂問官名耻一物之不知如曰博溺心則肅慎之矢專車之骨巨魚萍實聖人亦安用之耶太祖皇帝尚欲盡令天下武夫讀書而況庠序之士秉筆操牘其號曰儒而所問輒不知曰是不足知也將誰欺乎古人之博學者臣不可徧舉矣今士專修夫子之道夫子既學矣其師慕者又莫如王安石臣聞安石於書無所不讀故其講解經傳訓釋文字雜取百家諸子之說以發明之誦其言而不知其所讀之書謂之盡得安石之學臣不信也往者安石初建經義時獨倡言道德性命之理此其意非以文章學問為不足尚也以為文章學問固儒者之本務如女子而事組繡法吏而讀律令自當然爾今以為不足尚而不務也是乃中人之情樂於閒佚而為之說臣甞游塲屋間見同列者專治一經其所旁取以為資者老莊揚列三經義解字說而已此數書不一年可徧閲又其甚則二三年可成誦也故士終日袖手書案之上無所用心驟而問之不必巨魚萍實之難知也六經之事有不能知者矣昔韓愈言隂陽地土星辰禮樂之書雖今仕進者不要此道然古之人未有不深於此而後為大賢者臣觀漢董仲舒揚雄之屬則果皆通於此惟賈山以渉獵書傳則已不得為醇儒矣陛下不惜官爵以待天下之士如一賈山且不得見則是陛下何時而得仲舒軰哉雖然士之不學非其所不能也特以上之所設科無所事於此則當此之時自非好名者孰肯耗心疲力以腹貯萬卷書耶臣恐數年之後百家諸子皆為故紙以與家人覆瓿而已甚可惜也今詔自太學及郡國庠序與士講明經術之外又勸之以不可無學而時叩其所有有博聞者優與升擢而甚惰無所渉獵者亦時屏黜二三則士無有不勸者矣茍其博學則其文章亦必無前之弊此尤不可以不先也駒又上論曰臣向之所論者專為學者而已然士之不學非學者之患而國家之所宜慮也陛下無以臣為過士之不學不過稠人中閉口結舌面赤汗下使天下以為口實而已也今之進士𩔖皆他日之公卿百執事也彼方應舉時既無事於學而其入仕之後雖向之所讀數書者又將捐去則峩冠曵帶所有者特枵然之腹而已陛下置公卿百執事也大則欲其謀王體斷國論小則欲其辯權事而決疑獄上以備左右之應對下以與賔客言今以枵然之腹立乎本朝之上則陛下何望焉其不學之患今日未見也他日見之矣往者學士劉敞奉使北方敵人道使者由他徑以誇示其郡國之大敞素明於地理因責問之敵人畏服是時順州山中有異獸敵不能名以問敞敞為言此駮也敵益畏之父老為臣言神宗皇帝時御殿放榜進士有暨陶者有司讀曁為洎而陶不應侍郎蘇頌曰呉有塈豔暨讀為結此得非其後乎問之果然神宗皇帝喜謂頌曰果呉人也慶厯元豐之際士皆深於學矣然微此二臣則堂堂大宋幾何而不為外國之所鄙笑多士之所訕薄乎奈何今日不勸之使博學以儲他日之用陛下欲有所問則皆恍然相視醉心拱手而不能知然後倉猝四顧而求多聞之士不可得矣且夫効一官緫一職非學亦不能也真宗皇帝嘗因放榜謂羣臣曰天下至廣藉羣學共治之今又得千餘分理州縣矣以此而言則是州縣之吏亦欲其知學也鄭子皮用一不學之人尹何以為邑而子産譬之於傷錦如吏部嵗補數百尹何於天下則數年之後殆無完錦矣自州縣而上其所職愈大則所學當益富今士通於道德性命之理誠前世所不及然一為吏則素所蓄積不過以善其身而已是何預於天下之事而驟布於郡國之間此臣之所以私憂也陛下幸以此敎學者又宜詔大臣嵗擇博學者以名聞而尊顯之如真宗召崔偓佺於肥鄉主簿而特置龍圖閣直學士以處杜鎬則海内皆承風以不學為恥矣昔人有種漆者鄉人皆笑之十年而漆可以為器向之笑者悉取資焉士之學不學於今誠未有損益臣言之若迂濶然不十年陛下必收其用矣惟陛下留神省察駒又上論曰臣愚無所識知竊獨聞之於士君子陛下稽古如帝堯好學如孔子萬幾之暇博覽前載之書至於夜分不寐蓋嘗慨然以士寡學為歎故臣略陳勸學之方其詳則在陛下下議郎博士議以詔天下臣嘗竊怪西漢之士亦專一經而其飾吏事斷疑獄皆出於此今之學者亦專一經而不能施於用神宗皇帝所為罷詞賦而建經義者葢將使之見於行事也非以為决科之具而已今徒能誦王安石義訓及義格以待問此豈神宗皇帝所望於士者耶臣知其然矣臣嘗以尚書試進士請以尚書一經言之尚書五十八篇大約數萬言自帝堯至秦穆其世次之先後與其誥命誓訓之所從作雜見他書學者所宜知也竒文奧義訓註不能盡者昔之老儒有白首而不能窮也然其可以為有司之問題者不過二千而已二千之目自元豐至今凡太學公私試與州郡省試之所問者皆不離此而其所嘗問者又不再出葢今之可以為題者又纔數百而已數百之義學者如竭其力數嵗可備也數百義足以應敵則其他雖吾本經有不必究知者矣有司按其義而可以合格則又不敢不取而鬻書者取士之所對義刻為版本若書則自堯典及秦誓靡不皆有謂之排𩔖後生小儒曉夜課讀雖不敢盡用然少增損之亦足以合格如是而欲望其飾吏事决疑獄豈不難哉六經之㫖既為微妙其間星辰山川禽魚草木皆資他書以相參驗此王安石所以書無所不讀也然今之學安石所訓之外則不復研究而有司之不可以為題者又皆不復究知獨誦道德性命之言以為學聖人之道者如是足矣葢昔之善醫者必先讀神農之書以徧識天下之藥雖其用藥之妙出於自得非書之所能盡然未有不明於藥性之寒温補㵼而後能為方者也後之庸醫以為治病之妙不在於此獨收古方而不復讀神農之書則其所試之方足以毒人而已今之學者不幸𩔖此臣愚以謂宜於大義之外令有司雜取六經中事及安石之所未訓釋或訓釋而未盡與先儒之所疑而未决者如今之䇿題以問士常出其不意而視其所通多寡以為升黜則凡誦時文者不能有所儌倖而通經博古之士出矣凡臣之所言者上自師儒下逮進士皆心知其弊獨口不言爾其間豪傑之士亦各欲暴露其所長至於有所拘而不得馳騁則尤不樂於此而考試時文詞一律試官亦益厭之但上下相循以為習俗無有言於朝者臣愚不肖竊欣太平之難遇而嘉聖道之方興又重惜神考崇經教士之意不白於天下是故勇不自制既以其身當天下之笑譏亦不虞蹈狂妄之罪輙具為書冒獻於上古人曰士不通經果不足用惟明主裁之駒又上論曰臣聞方今貢舉之法有三曰義論䇿大要以義為主臣既科條之矣䇿論亦足以考士之所學而非今日之所先也故臣特言其畧而陛下試觀焉臣聞真宗皇帝時制詔取士兼收䇿論嘗謂丞相旦曰時才政事盡在二者臣竊惟神宗皇帝所以罷黜詞賦而獨不廢䇿論者以為取士之道義以觀其經術論以察其智識䇿以辨其謀畧則天下之士盡在吾彀中矣是時太學諸生有䇿居第一者其文詞亦未有以大過人也然神宗皇帝尚取而觀是以學者咸勸經義之外䇿論亦彬彬可取焉近日學子乃以是為餘事不過亦以偶儷漫汗之文纂錯繁雜以充試卷而已此尤失作文之體矣而有司曰是餘事也亦不以定升黜又其所問率皆無益之事𩔖非所以取時才而詢政事也夫學者之未仕其於時才政事是豈能知而有以助萬一邪然既以設科則不得不盡其實此真宗之所以兼收而神考之所以獨不廢也今之學子皆不觀史書則䇿論之不工為無足怪臣觀歴代史記其間車斾服器禮樂制度與夫守文之君當途之士相與謀是非而斷利害者皆今所宜知也書云事不師古以克永世匪説攸聞太宗皇帝讀書至説命未嘗不太息也神考之聖訓曰漢之武宣唐之太宗則吾無間然矣自餘治世盛王則吾取二三䇿而已夫豈以史記為不足觀邪臣嘗與市人讀詔書于路竊見陛下戒伶官則引同光之政諭宗室則稱劉向之美蓋學為王者久矣漢丞相言謹按詔書律令下者文章爾雅訓詞深厚小吏淺聞不能究宣因重掌故之選自是公卿士吏彬彬多文學之士矣夫西漢之詔書無足道也然猶恐淺聞者不能究宣今聖天子誥命如此而承學之臣率不知史書此臣之所甚未諭也陛下側席求賢用之惟恐不及士之去為公卿葢無日矣今日之論則他日之陳謨而為陛下講治道者也今日之䇿則他日之奏䟽而為陛下議時政者也宋興以來名臣幾百人矣其陳謨奏䟽班然可睹也此豈致身廟堂之上而後學為者自為布衣其學素明也陛下試讀今日之䇿論以預卜其陳謨奏疏則他日之文物恐未得如前日之盛臣是以為陛下極言之臣嘗見一進士工為文詞至為䇿論則亦漫汗偶儷無足觀者臣偶問之汝何苦而為此則曰不然有司不我取也夫神考與陛下敎育之意當使天下洗濯磨礱日夜奮發務增其所未髙而極其所未至以待國家之用今以有司之故而使豪傑之士破崖岸去圭角以自貶損則自中人以下何可望其進邪蓋古之敎人者思所以增益之而今之敎人思所以摧抑之甚非聖主意也願陛下詔有司及考試時䇿論所問皆可以察智識而辨謀略者其文非得體則明教告之而取經義之外亦頗以定其升黜庶使學者少通前代之典無令空言不適於用又時因得豪傑之士凡此皆所以為異日名臣之資此神考與陛下教育之本意也孝宗時知南康軍朱熹上奏曰臣竊嘗伏讀國朝會要恭覩太宗皇帝嘗因江州守臣周述之奏詔以國子監九經賜廬山白鹿洞書院既又以其洞主明起為蔡州褒信縣主簿以旌儒學每恨無由一至其處仰觀遺跡及䝉聖恩假守兹土到任之初考按圖經詢究境内民間利病乃知書院正在本軍星子縣界而陳舜俞廬山記又載真宗皇帝咸平五年嘗勅有司重加修繕間因行視陂塘始得經由其地見其山川環合草木秀潤真閒燕講學之區而荒涼廢壞無復棟宇因竊惟念太宗皇帝真宗皇帝所以幸敎多士垂裕萬世之意其盛如彼而下吏淺聞弗克原念以稱萬分之罪其大如此駭懼震慴不遑啓居既又按考此山老佛之祠蓋以百數兵亂之餘次第興葺鮮不復其舊者獨此儒館莽為荆榛雖本軍已有軍學足以養士然此洞之興遠自前代累聖相傳眷顧光寵德意深遠理不可廢况境内觀寺鐘皷相聞殄棄彛倫談説空幻未有厭其多者而先王禮義之宫所以化民成俗之本者乃反寂寥希闊合軍與縣僅有三所而已然則復修此洞葢未足為煩於是始議即其故基度為小屋二十餘間敎養生徒一二十人節縮經營今已了畢但其勅額官書皆已燒毁散失無復存者不敢擅行標榜收置輙昧萬死具奏以聞欲望聖明俯賜鑒察追述太宗皇帝真宗皇帝聖神遺意特降勅命仍舊以白鹿洞書院為額仍詔國子監仰摹光堯夀聖憲天體道性仁誠德經武緯文太上皇帝御書石經及印板本九經䟽論語孟子等書給賜本洞奉守看讀於以褒廣前烈光闡儒風非獨愚臣學子之幸實天下萬世之幸熹召對延和又上奏曰臣昨任南康軍日嘗具狀奏乞賜白鹿洞書院勅額及乞以太上皇帝御書石經并版本九經注疏給賜本洞今亦未䝉施行而朝野喧傳相與譏笑以為怪事臣誠恐懼不敢不盡其説謹按本洞書院實唐隱士李渤所居當時學者多從之游遂立黌舍至五代時李氏為建官師給田贍養徒衆甚盛迨至國初猶數十百人太平興國中嘗䝉詔賜九經而官其洞主見於會要而咸平五年有勅重修仍塑宣聖及弟子像又見於陳聖俞所記簡牘具存可覆視也夫以此洞之興原其所自雖若淺鮮無足言者而太宗皇帝真宗皇帝眷顧褒崇至於如此則聖意所存至深至遠必有非下吏淺聞所能窺測者今乃廢而不舉使其有屋廬而無勅額有生徒而無賜書流俗所輕廢壊無日此臣所以大懼而不能安也然竊意有司所以不能無疑於臣之請固未必皆如譏笑者之言殆必以為州縣已有學校不必更為煩費耳如其果然則臣請有以質之夫先王禮義之宫與異端鬼敎之居孰正孰邪三綱五常之教與無父無君之説孰利孰害今老佛之宫徧滿天下大郡至踰千計小邑亦或不下數十而公私增益其勢未絶至於學校則一郡一縣僅一置焉而附郭之縣或不復有其盛衰多寡之相絶至於如此則於邪正利害之際亦已明矣今有司非徒不能有所正於彼而反疑臣之請於此臣不能識其何説也今幸䝉恩賜對故敢復以為請伏望聖慈下臣此章特從其請既以紹承先志啓迪羣心又以丕闡大猷昭示抑邪與正之漸實天下萬世之幸中書舍人崔敦詩論南康軍奏請白鹿洞書院額疏曰臣竊惟國朝偃武崇文首善太學其後天下州郡始相繼有請建書院以養士至道二年賜西京嵩陽書院額咸平四年賜潭州嶽麓書院大中祥符二年從應天府請置新建書院此𩔖不一皆賜經書亦有令備價印造及間有賜額者江州廬山白鹿洞書院實太平興國二年守臣周述言學徒數百人望賜九經使之𨽻習緣其學徒繁盛於是有㫖從之自慶歴詔許州府軍縣立學於是學校徧於天下當時詔書有曰除舊立學外並令各立學蓋舊學即書院之𩔖是也自太上皇帝中興廣設學校徧賜石經所以教之之法已是詳備今來南康軍所奏雖非定制然亦所以推廣朝廷崇儒重道之化本監訪聞潭州嶽麓書院係𨽻屬郡學所養生員皆自郡學補中撥入及請選行藝之士充長委實曲盡今勘當南康軍奏所復白鹿洞書院養士一二十人名額經書未敢擅便標榜收買本監欲下本軍隨宜措置標榜所有經書具數申監印造仍會潭州嶽麓書院𨽻屬州學規例一體施行光宗紹熈三年禮部侍郎倪思請復混補法命兩省臺諫雜議可否於是吏部尚書趙汝愚等合奏曰國家恢儒佑文京師郡縣皆有學慶歴以後文物彬彬中興以來建太學於行都行貢舉於諸郡然奔競之風勝而忠信之俗微亦惟榮辱升沉不由學校德行道藝取决於名工雕篆之文無進修之志視庠序如傳舍目師儒如路人季考月書盡成文具今請重敎官之選假守貳之權倣舍法以育材因大比以取士考終場之數定所貢之員期以次年試于太學其諸州教養課試升貢之法下有司條上思議遂寢寧宗時兵部侍郎虞儔上奏曰臣聞三代令主以至列國之君皆有學故天子曰辟雍諸侯曰泮宫雖小大不同其化民成俗長育人材則一也朝廷興太學置明師四方之士于于然而來可謂盛矣竊怪夫近年州郡之學往往多就廢壊士子游學非圖餔啜以給朝夕則假衣冠以誑流俗而鄉里之自好者過其門而不入為教授者則自以為冷官而不事事自一郡觀之若未甚害也舉天下皆然則實關事體矣臣嘗究其所以然蓋人之常情莫不以仕進為榮選人之在外者所望不過關陞與夫改秩而已向也太守監司所發舉狀先及教授今則且以為贅員置而不問雖有提學司文字專舉教官而員數又甚窄向也教官在法得就任改秩今則莫之許也是以有不屑就之心故不能所不樂為之事無足怪者夫朝廷建一官蓋欲使之治一職茍以為迂濶於事無補於時曷不一舉而廢之吏祿學糧猶可省也若以為化民成俗長育人材自學校始祖宗以來莫之有改奈何使之名存而實亡乎照得教官自堂除之外在部格法非曾試中詞科及學官殿試第一甲省試上舍十名前等人不許差注葢立法之初重其選也如此今選人到部縱使有格多不肯就至與之堂除亦不滿意又就試者絶無一人而干堂者日以猥衆上而架閣非有所擢用則不可得次而幹官非特降指揮則不可差伺候日月之久廟堂無闕以處之未免有淹滯之歎今若朝廷稍重教官之選有以作新之使其知所歆羡則選人進取之路少寛而廟堂造化之權亦廣矣是一舉而兩得之也或曰然則其如闕遠何臣應之曰不然今京局之闕至有三政四政者葢以文字易得庶幾他日可望於改秩初未嘗以為遠而莫之肯待也臣願陛下明詔銓曹復教授在任改秩之法風厲監司郡守教授中有能勤於教育作成士𩔖者舉狀之發必先及之則孰不願仕於其間激昂奮厲以修舉其職業乎將見異時民以之化俗以之成人材輩出以為國家之用矣此當今之急務也惟陛下留神理宗時起居郎魏了翁論敷求碩儒開闡正學疏曰臣自去嵗嘗以士習之弊告於先帝大扺謂今之為士蹤跡詭祕見利則趨脱有緩急不可倚仗今不幸而言中小則賣友以求免大則賣國以偷生雖其自麗典刑然已有傷國體不及今圖所以久安長治之道而隨事隨救雖嚴刑峻法比而誅之不能禁也臣以慶元進士嘉泰學官開禧館職嘉定史臣三十年間得諸舊聞驗以親見葢自乾道淳熈以來涵養作成大儒輩出學者景從淳熈之季雖已有倡為道學之目者然而儒風鼎盛正理常勝自孽韓柄國又更偽學之名以排陷善𩔖其始也宗相之黜舉朝咸曰不可以是得罪者凡五十餘人太學生上書固爭亦蹈難而不悔猶以見先朝表章風厲有益於人心者若此自學禁既密士習日浮夫所謂伊洛之學非伊洛之學也洙泗之學也非洙泗之學也天下萬世之學也索諸天地萬物之奥而父子夫婦之常不能違也約諸日用飲食之近而鬼神隂陽之微不能外也大要以六經語孟為本使之即事即物窮理以致其知而近思反求精體實踐期不失本心焉耳奚其偽而被以此名屏不得傳於是驅一世而納諸近功淺利之域以漁獵為學問以綴緝為文章以操切為實才以貪刻為奉公踵陋習愚恬不之講方時茍安害未甚見也一旦開邊之議大官倡聲一口附和其不謂然者不過一二館職之卑耳卒之内訌外猘誤國殘民流毒至今夫學術之不明其害乃至於此自嘉定以來雖曰亟更曩轍然老師宿儒零替殆盡後生晚學散漫亡依其有小慧纎能者僅於經解語錄諸生揣摩剽竊以應時用文詞浮淺名節隳頓葢自其始學父師之所開導子弟之所課習不過以譁衆取寵惟官資宫室妻妾是計爾及其從仕則又上之所以軒輊下之所以喜愠亦不出諸此古人所謂為已之學成物之本固不及知也一旦臨小小利害周章錯愕已昧所擇脱不幸而死生臨乎其前則全軀保妻子之是務雖亂常干紀有不遑恤嗚呼使此習也而日長月異平居無直諒多聞之友立朝無正色犯顔之士臨難無赴節死義之臣雖利在盗賊利在夷狄亦委已聽命而已陛下與大臣俱何便於此哉陛下嗣位之初正明示好惡作新觀聽之幾願與大臣圖維長久安寧之計毋以書生為迂腐毋以正論為闊疏敷求碩儒開闡正學使人人知其有禮義亷恥之實知有君臣父子之親知此身之靈於物而異於禽獸也則見得必思義見危必致命夫如是而君享用賢之福為人臣者亦職有利焉周頥曰師道立則善人多善人多則朝廷正而天下治此斷斷然如穀之可以療飢也惟亟圖之元世祖至元十三年布呼宻與同舍生戬通泰達爾圖嚕等上疏曰臣等聞之學記曰君子如欲化民成俗其必由學乎玉不琢不成器人不學不知道故古之王者建國君民教學為先蓋自堯舜禹湯文武之世莫不有學故其治隆於上俗美於下而為後世所法降至漢朝亦建學校詔諸生課試補官魏道武帝起自北方既定中原增置生員三千儒學以興此歴代皆有學校之證也臣等今復取平南之君建置學校者為陛下陳之晉武帝嘗平呉矣始起國子學隋文帝嘗滅陳矣俾國子寺不𨽻太常唐髙祖嘗滅梁矣詔諸州縣及鄉並令置學及至太宗數幸國學增置學舍至千二百間國學太學四門學亦增生員其書算各置博士乃至髙麗百濟新羅髙昌吐蕃諸國酋長亦遣子弟入學國學之内至八千餘人髙宗因之遂令國子監領六學一曰國子學二曰太學三曰四門學四曰律學五曰書學六曰算學各置生徒有差皆承髙祖之意也然晉之平呉得户五十二萬而已隋之滅陳得郡縣五百而已唐之滅梁得户六十餘萬而已而其崇重學校已如此况我堂堂大國奄有江嶺之地計亡宋之户不下千萬此陛下神功自古未有而非晉隋唐之所敢比也然學校之政尚未全舉臣竊惜之臣等嚮被聖恩俾習儒學欽惟聖意豈不以諸色人仕宦者常多䝉古人仕宦者尚少而欲臣等曉識世務以任陛下之使令乎然以學制未定朋從數少譬猶責嘉禾於數苗求良驥於數馬臣等恐其不易得也為今之計如欲人材衆多通習漢法必如古昔徧立學校然後可若曰未暇宜且於大都𢎞闡國學擇䝉古人年十五以下十嵗以上質美者百人百官子弟與凡民俊秀者百人俾廪給各有定制選德業充備足為師表者充司業博士助教而教育之使其教必本於人倫明乎物理為之講解經傳授以修身齊家治國平天下之道其下復立數科如小學律書算之𩔖每科設置教授各令以本業訓導小學科則令讀誦經書教以應對進退事長之節律科則專令通曉吏事書科則專令曉習字畫算科則專令熟閑算數或一藝通然後改授或一日之間更次為之俾國子學官總領其事常加㸃勘務要俱通仍以義理為主有餘力者聽令學作文字日月嵗時隨其利鈍各責所就功課懲其勤惰而賞罰之勤者則升之上舍惰者則降之下舍待其改過則復升之假日則聽令學射自非假日無故不令出學數年以後上舍生學業有成就者乃聽學官保舉䝉古人若何品級諸色人若何仕進其未成就者且令仍舊學習俟其可以從政然後嵗聽學官舉其賢者能者使之依例入仕其終不可教者三年聽令出學凡學政因革生員增減若得不時奏聞則學無弊政而天下之材亦皆觀感而興起矣然後續立郡縣之學求以化民成俗無不可者臣等愚幼見於書聞於師者如此未敢必其可行伏望聖慈下臣此章令諸老先生與左丞王贊善等商議條奏施行臣等不勝至願書奏帝覽之喜至元中翰林集賢學士程鉅夫奏曰臣聞國於天地必需才以為用而人才之盛非自盛也全在國家敎育之勤其衰也反是參之歴代可考也國家自中統建元以來中外臣僚亦時聞表表偉傑者皆自往時故老宿儒薫陶浸灌而然歴時既久以次淪謝邇來晨星寥寥無幾何矣臣不知更十餘年後人物當何如其瑣瑣也而主國論者恬不知怪視學校為不急謂詩書為無用不知人才盛衰張本於此蓋嘗有㫖行貢舉求好秀才上意非不諄切而妄人輙隂沮之應故事而集議凡幾作輟矣然則無怪乎選任之非才政治之不理也今已至此後當若何臣愚欲望陛下明詔有司重學校之事慎師儒之選京師首善之地尤當興建國學選一時名流為國人矜式優以餼廪隆以禮貌庶四方觀感有所興起外而名都大邑教官有缺不但循常例取庸人而已必使廷臣推擇可以為人表儀者條具聞奏令有祿可養而不匱職比親民而加優視教化之廢興為考第之殿最其諸生有經明行修者特與蠲免賦役依已降詔㫖施行似望國家教育有方多士鼓舞不倦他日隨取隨足無臨事乏才之歎天下幸甚世祖時各道儒司悉以曠官罷浙西道儒學提舉葉李召至京師上奏曰臣欽覩先帝詔書當創業時軍務繁夥尚招致士𩔖今陛下混一區宇偃武修文可不作養人才以𢎞治道各道儒學提舉及郡教授實風化所係不宜罷請復立提舉司專提調學官課諸生講明治道而上其成才者於太學以備錄用凡儒户徭役乞一切蠲免帝可其奏葉李為尚書左丞一日從世祖至柳林奏曰善政不可以徒行人才不可以驟進必訓以德義摩以詩書使知古聖賢行事方略然後賢良輩出膏澤下流唐虞三代咸有胄學漢唐明主數幸辟雍匪為觀美也乃薦周砥等十人為祭酒等官凡廟學規制條具以聞帝皆從之成宗時翰林國史院檢閲官袁桷上國學議曰成周國學之制畧於大司樂其遺禮可法者見於文王世子三代而上詳莫得而聞焉漢武表章六經興太學至後漢為尤盛唐制微附益之而其制愈加詳密今可考也宋朝承唐之舊而國學之制日隳至于紹興國學愈廢雖名三學而國學非真國子矣夫所謂三舍法者崇寧宣和之弊也至秦檜而復增之月書季攷又甚夫唐明經帖括之弊唐楊綰嘗曰進士誦當代之文而不通經史明經但記帖括牒自舉非仄席待賢之意宋之末造𩔖不出此今科舉既廢而國朝國學定制深有典樂教胄子之古意儻得如唐制五經各立博士俾之專治一經互為問難以盡其義至於當世之要務則略如宋胡瑗立湖學之法如禮樂刑政兵農漕運河渠等事亦朝夕講習庶足以見經濟之實往者朱熹議貢舉法亦欲以經説會粹如詩則鄭氏歐陽氏王氏吕氏書則孔氏蘇氏呉氏葉氏之𩔖先儒用心實欲見之行事自宋末年尊朱熹之學唇腐舌弊止於四書之註故凡刑獄簿書金穀户口靡宻出入皆以為俗吏而爭鄙棄清談危坐卒至國亡而莫可救近者江南學校教法止於四書髫齓諸生相師成風字義精熟蔑有遺忘一有詰難則茫然不能以對又近於宋世之末尚甚者知其學之不能通也於是大言以蓋之議禮止於誠敬言樂止於中和其不涉史者謂自漢而下皆霸道其不能詞章也謂之玩物䘮志又以昔之大臣見於行事者皆本於節用而愛人之一語功業之成何所不可殊不知通逹之深者必悉天下之利害灌膏養根非終於六經之格言不可也又古者敎法春夏學干戈秋冬學羽籥若射御書数皆得謂之學非若今所謂四書而止儒者博而寡要故世甞以儒詬誚由國學而化成于天下將見儒者之用不可勝盡儒何能以病于世仁宗時虞集為集賢修撰會議學校乃上奏曰師道立則善人多學校者士之所受教以至於成德逹材者也今天下學官猥以資格授彊加之諸生之上而名之曰師爾有司弗信之生徒弗信之於學校無益也如此而望師道之立可乎下州小邑之士無所見聞父兄所以導其子弟初無必為學問之實意師友之游從亦莫辨其邪正然則所謂賢材者非自天降地出安有可望之理哉為今之計莫若使守令求經明行修成德者身師尊之至誠懇惻以求之其德化之及庶乎有所觀感也其次則求夫操履近正而不為詭異駭俗者確守先儒經義師説而不敢妄為竒論者衆所敬服而非鄉愿之徒者延致之日諷誦其書使學者習之入耳著心以正其本則他日亦當有所發也其次則取鄉貢至京師罷歸者其議論文藝猶足以聳動其人非若泛泛莫知根柢者矣順帝時蘇天爵乞增廣國學生員狀曰國家典章興隆庠序敦崇勸勉責在憲臺夫成均實風化之原而人材乃邦家之本是宜增廣員額樂育賢能昔者世祖皇帝既定中原肇新百度知為治必資於賢者而養賢必本於學官至元七年初命中書左丞許衡為國子祭酒以教公卿大夫之子弟是時學徒未有定額其後政教既修學者寖廣迨至仁宗皇帝增多至四百員然而近嵗以來員額已滿至使胄子無從進學殊非祖宗開設學校廣育羣材之美意也蓋自昔國家未有不由作興英賢而能為治者也故漢室中興圜橋門者億萬計李唐受命游成均者三千員人材之多近古未有洪惟國家海宇之廣庠序之盛又豈漢唐所可此擬獨於學徒員額猶少方今朝廷治化更新嘉惠儒術至于學校長育人材尤為先務宜從都省聞奏量擬增添生員一百名内䝉古色目五十員漢人五十員應入學者並如舊制錢穀所費嵗支幾何人材所關實為至重如此則賢能益盛俗化益隆其於治道實為有補歴代名臣奏議卷一百十五
