body:
  text: 厯代名臣奏議卷三百五明楊士竒等撰灾祥宋徽宗宣和元年起居郎李綱論水災狀曰臣伏覩陛下以積水暴集淹浸民居迫近都城纍降御筆分遣官吏固護隄防拯濟漂溺仰見陛下聖慮焦勞曲盡防患之理然臣竊謂國家都汴百有六十餘載未嘗少有變故今事起倉卒逺邇驚懼誠大異也臣嘗躬詣郊外竊見積水之來自都城以西漫為巨浸東距汴堤停蓄深廣湍悍峻激東南而流其勢未艾以宗廟社稷之靈雉堞防守之固萬無他虞然或淹緩旬時因以風雨有不可不慮者此誠陛下寅畏天戒博詢衆謀之時而羣臣竭智效力捐軀報國之秋也纍日以來傾耳以聽缺然未聞臣竊怪之夫變異不虛發必有感召之因災害未易禦必有消弭之䇿周官於國危則有大詢之禮祖宗每遇災變亦降詔求言臣愚伏望陛下斷自淵衷特詔在廷之臣各具所見以聞擇其可採者非時賜對特加驅䇿施行其說因衆智協衆力濟危圖安上以答天地之戒下以慰億兆之心天下不勝幸甚臣仰荷陛下天地父母之恩親加識擢得侍清光常思奮不顧身以徇國家之急輒有己見急切利害事須面奏伏望聖慈降㫖閣門許臣來日因侍立次直前奏事庶幾得盡狂瞽仰裨聖慮之萬一綱又論水災便宜六事狀曰臣近嘗奏請以水潦為患乞賜燕閒敷陳利害今月十四日崇政殿侍立閣門傳㫖令臣先退惶懼戰栗居家待罪不敢供職聖恩寬厚未奉誅責日夕惴恐局蹐無地伏念臣愚憃謏聞孤立寡與惟知仰事陛下以國家為心比見積水暴集逼邇都城私憂過計輒貢狂瞽情迫意切言皆不倫觸盛意犯隆㫖自干雷霆之威死有餘罪自非陛下恕其愚直天地父母矜而憐之誰復為臣言者臣竊以水旱之災雖堯湯有所不免惟聖人為能遇災而懼側身修行博詢衆謀以銷去之故堯於洪水方割之時有疇咨之言湯於旱既太甚之日有六事之責皆能轉災以為福易沴以為和此古聖人之明驗也今者水患之來起於倉卒人心惶懼逺邇震驚幸賴宗社之靈陛下睿算之審屢降御筆處分疏導通駃勢漸退落雖畿甸旁近皆罹其災而都城無虞人意漸定然臣竊以謂水災既退之後朝廷未可以謂無事正宜講究利害增固隄防寅念天戒益以修省不可忽也臣愚蠢不揆輒復妄發昧死上便宜六事一曰治其源二曰弱其勢三曰固河防四曰恤民隱五曰省煩費六曰廣儲蓄惟陛下留神幸察臣恭惟國家卜世定鼎眷都大梁平原沃野彌望千里非有髙山峻嶺為之阻而都城以西京索交流陂澤相接自西徂東地勢傾下加以雨潦不能吞納則決溢東注俯灌都城其勢然也為今之計莫若相視陂塘疏導京索增卑培薄固以隄防節以斗門旱則水有所泄雖經霖雨其勢不得接連而下可以為萬世之利此則治其源之䇿也臣竊觀自昔善捍水患者必為長隄以制其衝其意以謂以數仭之城而拒方至之水風濤之所鼓薄亦已危矣限以長隄殺其怒勢然後人力可施而城益堅今積水之來自都城之西浩如江湖東抵汴岸南阻新隄雖停蓄深廣而卒不能至城下者有隄以為之阻也由隄而行散漫湍激至都城之南則徑抵護龍河者無隄以為之阻也為今之計莫若距城數里之外因髙地勢繚以長隄使雖有積水決溢之患循隄四瀉不能薄城可以禦一時之急此則弱其勢之䇿也國家都汴處大河之下流其所恃以為固者掃岸堅而法制嚴也比年以來玩習茍簡護衛之卒散於抽差備禦之儲耗於轉易河嚙隄防日朘月削恬不加恤如廣武掃其距清汴才百餘步去冬危殆屢矣其不決溢者特幸耳使夏秋之交乘霖雨湍暴之勢果能保其無虞乎夫以陂澤積水暴集之患猶可驚駭況大河之勢又可不為之深慮哉臣愚願擇深知河事者相地形回清汴使與大河相逺仍詔有司遵守法制存留兵革儲積材料敢有抽差轉易者必正典刑此則固河防之䇿也今兹積水之來衝白沙蕩中牟迫都城散漫畿甸之邑淹浸屋廬漂溺民畜損傷苗稼不可以數計今又決其南以注於陳蔡之郊決其北以注於相衛之境疏汴渠之下流於陳留則數千里之內悉被其患矣陛下惻怛憂勞降詔拯濟德意甚厚臣猶竊慮州縣監司未能悉意奉行也願詔諸路應被災傷地分今年秋並與蠲免水過之後安集民居借貸賑濟務令復業無使失所以副陛下之意此則恤民隱之策也臣竊惟去歲江淮泛溢東南之民悉皆流移賴陛下聖慈以六路上供米斛廣加賑濟民得無死德至渥也然州縣蕭條帑廪匱乏逮今未復今畿甸旁近又有積水之患矣何以堪之臣愚願陛下斷自宸衷凡營繕工役花石綱運有可省者權令減罷數年之間民力漸完國用以足然後惟陛下之所命耳裕民豐財莫是為大臣所謂罷不急之務者此也臣又惟古者九年之蓄然後無旱乾水溢之患教化行習俗美而頌聲興是為太平治之至也祖宗以來舊有封樁米斛以千萬計所以為兵民之天宗社之本也比年以來工役寖多仰食者衆歲以侵耗遂致殫竭今國計所仰者獨東南六路轉輸歲額耳假使一方水旱歲額不登將胡以自給靜以思之可為寒心臣愚願陛下明詔有司裁蠶食者幸歲豐登自朝廷多降糴本委彊幹官吏廣行收糴别項上供以充封樁之數歲歲如此及祖宗舊額而後止此朝廷之所優為何不留意而獨為凛凛也養兵足國莫是為急臣所謂廣國計之儲者此也凡此六者皆當今之要務顧臣智識淺陋文字荒疏言不足以達意惟陛下財幸下臣章宰執議其可否如可採録望賜施行臣比者嘗獻愚計伏䝉聖慈寬假未賜斧鉞之誅輒復自竭冒昧天聽庶幾芻蕘之言有補萬一仰報盛德貼黃臣伏以水患暴至失於隄防慿陵都城久未退息厥異甚大誠不可忽伏望陛下畏天戒固民心收士用嚴守衛以弭寧災害大慰天下之望避殿損膳告于天地宗廟社稷所以畏天戒也法禹湯之罪已以詔萬方親御六龍率羣臣負土石以先士卒所以固民心也誅水官之不勝任者以正典刑擇材智而驅䇿之與共患難所以收士用也輟營繕花石之不急者併卒伍而部分之以備不虞所以嚴守衛也四者既具又在陛下修胸中之誠感動天心如此而災害不弭和氣不臻未之聞也臣不勝惓惓惟陛下財察徽宗次南都綱時為尚書右丞因召對曰臣昨任左史以狂妄論列水災䝉恩寬斧鉞之誅然臣當時所言以謂天地之變各以類應正為今日攻圍之兆夫災異變故譬猶一人之身病在五臟則發於氣色形於脉息善醫者能知之所以聖人觀變於天地而修其在我者故能制治保邦而無危亂之憂徽宗稱善欽宗靖康元年左司諫陳公輔上奏曰臣聞隂盛則陽衰隂消則陽長此天地自然之理也四月純陽用事隂氣退聽之時又陛下誕生之月宜乎陽德方升昭明盛大隂所不能掩者自數日來天氣清寒日色微薄濃雲不開霪雨繼作其故何哉蓋隂有以蔽之也臣嘗原其所由謂敵人之彊耶然前日敵兵在外圍迫京城而日景晏溫清明自若今既欲講和好稍稍遁去恐咎不在敵人也謂女謁之盛耶然陛下即位不邇聲色後宫嬪御不過三二百人亦無位號隆重者此中外所共知恐咎不在女謁也以臣料之奸邪去之未盡而大臣不和百司茍玩皆隂盛之象此不可不知也自崇觀以來諛臣佞士務為夸淫之說媚恱人主未嘗有敢言災異者往往以臘月雷為瑞雷三月雪為瑞雪拜表稱賀作詩詠讚者有之矣夫災祥咎異雖治世不免此天所以警懼人君欲其修德以銷天變也豈可諱而不言哉臣今日區區首論及此蓋不敢復效諛佞之徒以欺陛下聰明也臣聞蔡京王黼童貫朱勔數輩其為奸邪有不可勝言者天下之民思食其肉今雖各曽行遣然或處善地或全腰領其子孫親戚尚有未曽盡行竄殛田宅物産尚有未曽盡行籍沒若是豈非奸邪去之未盡耶陛下謙虛退託以待臣寮而宰執忿爭上前無所畏避或詆毁同列或中傷善良豈非大臣不和耶陛下勤儉祗恪留心萬幾羣臣尚仍舊態不能服勤職事至有人主假日猶御便殿引對臣下而百官有司却作休務豈非百司茍玩耶臣願陛下將蔡京王黼童貫朱勔等數輩重行誅戮其子孫親戚並當流竄田宅物産並當籍沒以快天下之心則四海歡欣鼓舞自足以召和氣而隂霪寒溼之咎無有不殄矣然後下臣此章告諭大臣各務協心盡力以輔贊聖明絶其私心平其宿憾而百司庶府亦當察其奸邪怠惰不切奉公者特與懲戒如此則不至於君弱臣强君勞臣逸足以使陽德昭升隂氣消伏矣然此雖小變未足深憂臣必以是為言恐陛下忽此而不以為戒也又況蠶麥適時若隂雨不止不能無損亦不可不謂之災伏惟陛下少留神焉臣不勝幸甚御史中丞呂好問上奏曰臣聞民間多言近日彗出寅位臣雖未嘗親覩要之天垂象所以示警戒于下也彗者除舊布新之謂若能恐懼修德改革弊政退斥小人引用君子不惟可以弭災變轉禍為福亦在於此矣昨崇寧大觀間彗星兩見太上皇恐懼改革之意見於當時詔令赦文可覆視也然而羣小滿朝閹宦內助正人終不得用政事終不得改蔡京大惡也逐之未久而復召況肯逐小惡者乎張商英未為甚賢也用之未久而已貶況肯用大賢乎黨籍雖毁而禁錮益牢言路雖開而箝塞益急罷諫官虛講筵使太上皇不聞身之過差不念古之治亂是以天意震怒敵人深寇黎庶驚惶遂傳位陛下陛下亦念之乎臣竊思之陛下即位以來躬行節儉視民如傷非有過咎形于多方而天變復見者陛下欲行善政多為左右鐫改蓋今所用之人乃昔日之人也所施之政猶昔日之政也名為進用賢者而賢者之言未得盡行名為疏逺小人而小人之欲率皆如志又況隂害正道顯倡邪論欲復祖宗百年之成法而至今未能復欲去蔡京紹述之姦說而至今未能去致使陛下仁政不得施于朝廷仁澤不得流于寰宇故上天昭告如是以此見天之愛陛下之深也書曰惟先格王正厥事幸陛下體天之意除舊布新以正其事則天下之願望陛下留意王襄論彗星疏曰臣伏讀八月三日星文責躬詔書節文念將循舉故事而率皆已行深惟虛文不能應譴告之實臣愚無識竊所未諭臣聞天子父天而母地兄日而姊月皇天之愛聖主如慈父之愛賢子凡有謫見不虛發意者欲警悟陛下而增益其所未至者乎臣伏思陛下即位以來綿厯三時天下之民戴目傾耳如旱苖之得甘澤餓夫之望美食雖祖宗法度日形於詔㫖而京貫規模未改於章程詔㫖以謂循舉故事率皆已行臣恐皇天昭昭在上有所未孚也京貫用事二十餘年京變法度於內貫壞邊鄙於外王黼益之以至于今日今日之法度非祖宗之法度亦非熙豐之法度乃蔡京之規模也今日之邊鄙非祖宗之邊鄙亦非熙豐之邊鄙乃童貫之施設也陛下守蔡京之規模而不改遵童貫之施設而不除在廷之臣懷畏避而不敢輕言疏逺之人希榮利而不敢輒議而欲致休祥召和氣豈易能哉蔡京為相恣為紛更祖宗熙豐之法無一事不遭變改者凡所變改者未有不為害者也若悉舉而具陳之雖窮年閲月有所未遍況於尺牘之間而能盡其萬分臣願試以今日之急務國家之大政四事言之夫養兵之制祖宗所以威天下者也東南運漕宣武因之以為帝都者也財用之出所恃以為國者也陜西五路今日以為根本者也臣聞五代不綱兵疲將弱凡一遇敵無不奔潰故五十年間離亂相尋周世宗自斬宿將樊愛能等知藝祖神武俾治軍政藝祖悉汰老弱坐食之人選練精鋭無前之衆當時中原不過數十州禁旅之卒不過數萬人六七年間南取淮南北定三關謳歌者有歸遂有天下因襲前代之迹建京師於平土以謂非重兵不足以制四海也故皇城之內有諸班之兵京城之內有禁衛之兵京城之外列營猶數十里中夜則造朝入則奔趨營居西者必給東倉之米以逺其途負糧兩石不得雇代以閲其力諸班娶妻則太祖引視之諸軍支糧則太祖臨幸之諸班之妻盡取女子之長者欲其子孫魁傑世為禁衛而不絶也太祖嘗謂雖京師有精兵數萬況天下乎其養之教之親之愛之然後嚴治以整齊之厚賞以激勸之加之深思逺慮為後世子孫無窮之計至於府界諸邑輔郡縣鎮但係河路易致糧餉者無不屯兵三數千人重內制外如此其周密也及王安石為相思復三代民兵故創教保甲而潛消禁旅臣元豐間往來京師道中京南自延嘉以北廢營壞壘三十餘里當時禁衛精兵不知幾千萬人也其後蔡京枉費軍儲闕乏衣糧不充則教閲之法弛人無顧惜則姑息之心生故弱者鬻食於市强者負擔於路髙俅壞之於內童貫斃之於外數十年間不知其銷折幾何人皇城諸班之地今為殿閣池臺矣京城廢營之地今為苑籞甲第矣郡縣之民佃空營地以自給者蓋千百計富室大家尚養健僕數十以待暴客陛下以萬乘之尊威懾四海而皇城之內無諸班以宿衛京城之中少禁旅以鎮守近畿輔郡兵將備禦殆同戲事一有邊警則逺追閩越之人盡舉淮浙之衆此輩飲食異好風土異宜往來萬里載罹寒暑雖未遇敵而疾病勞憊者十已四五萬一南方鼠竊狗偷如異日之警則何以待之借使無警全然得歸萬里之人豈可再致是動天下之兵而困天下之衆也此臣略言養兵非祖宗之法者也臣聞王公設險以守其國自古帝王之都皆可考矣唯宣武之為都獨自朱梁而始晉天福末就糧而遷焉祖宗以謂非重兵不足以制天下也故宿重兵以制之以重兵非漕運不足以給餉也故仰東南之運以養之東南運漕取於六路年額六百餘萬石其資以為本者三船也倉也鹽也造船之法六路之船以供江外之綱淮南之船以供入汴之綱常六千隻以六千船運六百萬石則一舟之運歲常千石人船之力有餘故不勞而能辦其後漸廢至章惇為相船秪四千而撥東河之船運西河之石每大石升船一舟輒壞比及運畢壞者過半蔡京更改法度廢為直達此船法壞也祖宗置真楊泗倉名曰轉搬六路綱運冬月不止江水低下運河髙淺冬月潮小水不登應則閉閘而不通故真州置倉以缷之潮大放閘則揚泗以次缷之六路未至則發運司收糴儲於倉中加息充代而責其直汴綱六千又近者而運之故一年歲課應期而敷倉木巨萬皆美材也京悉取之以供京師之營造中間雖復興起曽不足以庇風雨而發運司糴本又盡於無益之求矣此倉法之壞也臣竊觀蔡京之姦謀困民之大害無甚於鹽法者祖宗河北之鹽不𣙜以利河北之民河東自置鹽監以便河東東南收稅上供委鹽六路以暗為六百萬石之本又發運司因之以制諸綱優重賞罰焉故三邊充足不資朝廷之應副東南運漕常足六百萬石之歲額蔡京欲取善治財物之功且以供無益之費也故盡取鹽利歸之中都祖宗飛錢於三邊蔡京收利於𣙜貨故中都豐足而三邊匱矣西北之糧由是而空西北之兵由是而不繕治而河北之民驅其車牛役其人丁搬輦鹽貨不得耕織者不知其破幾千百家天下縣鎮趨賞避罪巡門散鹽以及茶礬吏緣誅求騷擾百出者殆不可勝言況有六路轉運司直供運漕之歲額取之於民今亦罄矣天下章疏巨萬山積其間果無一人言及此者豈非國家邊事未息尚資鹽利以為用未敢遽言之哉然而祖宗熙豐之時以至建中靖國之初當時未收鹽利也國用緣何而足府庫緣何而充豈非祖宗之經入法度有所未復冗員浮費有所未減於今日者講求興復之裁省抑免之以代鹽利可也必欲守鹽法不變而求東南運漕如祖宗之盛運漕不繼而求內外兵馬如祖宗之强臣恐未可以歲月冀此臣略言運漕非祖宗之法者也祖宗之時外置轉運司以漕一路之賦內置三司使以總天下之財委任而責其成功耳神宗皇帝聖文神武將大有為用財有式節財有政始分天下之財以為二司轉運司獨用民常賦與州縣酒稅之課其餘財利悉收於常平司掌其發斂儲之以待非常之用罷三司而為户部轉運之財則左曹𨽻焉常平之財則右曹𨽻焉當是時雖一鎮一縣無不貫朽粟陳者及蔡京用事舉天下之財而盡用諸路漕臣靡然從風本路無以周給而進羡餘百姓常稅不納而急橫諸縣歲終無以塞責則令民取常平錢斛轉易而為二稅州郡視之而不敢禁常平知之而不敢劾上下䝉蔽以姑息茍且取急於一時貪汚之吏竄名詭冒猾胥頑民亦中分而有之斂取之時辭訴紛委常平之政殆將廢矣常平之財殆將竭矣雖欲求明健之吏為振舉之職天下詭冒之獄不勝其誅罰也編户民財不勝其斂取也如此則常平之政雖云不廢而其實廢常平之財雖云未竭而其實竭天下貨財不知其失陷者幾千萬億尚何區區於青苖助役是非利害之辨此臣略言財用非祖宗熙豐之法者也陜西秦鳳路祖宗開拓鞏州矣熙豐之時又闢熙河蘭㑹州以為熙河路阻河為界設為三關平土豐草可以耕牧甚美功也神宗皇帝時有獻青唐之䇿者神宗以為國家之外厩而不取也神宗皇帝得疊宕等州盡空三百里地而漢蕃兩不居之也蓋青唐之馬最良而蕃食肉酥必得蜀茶而後生故熙豐時置茶馬司大率以茶一籠計費三千而易百千之馬歲以蜀茶易馬二萬匹以三十年為率則國用馬常四十萬矣中國之兵安得不强外裔之勢安得不弱自湟鄯廓州之入中朝而茶司之本又盡於市珠玉國馬至今蓋無幾矣神宗皇帝之不建疊宕等州豈不以城之無利守之實難又且以賜忠順之蕃使耕牧於其間也疊宕之地既皆不毛而湟鄯諸州萬山埆瘠殆非人跡之所涉童貫仰國家之財悉兵民之力收復三州增築城寨又於熙豐所空之地建城而自以為功分屯兵將轉輸糧食夫弓箭手民兵五路之根本也每差戍守一月一易則必人市頭口負乾糧器械所需之物而趨焉路逢蕃寇則多致殺掠或得戌滿三數月間又當復往如此勞費無有巳時而熙河包氏之兵最為忠順神宗皇帝特寵異之心一不滿勢必不為吾用此熙河之兵所以寡弱而不振四路之兵恐亦復然今之士夫見邊兵之凋弊則以謂未必勝於東兵見西馬之病瘠則以謂未必及於東馬蓋不見其强盛之時而獨見其衰弊之後耳陜西之財百萬為率常以七十萬獨供熙河而以三十萬供秦鳳涇原環慶鄜延永興軍路也熙河之財十常七八以供新邊之費則是童貫之新邊常困竭陜西之諸路陜西之諸路常煩朝廷之應副而貽患於天下之諸路矣自宣武之為京師恃河北河東陜西以為根本故祖宗之時優恤河北民則不橫賦兵則不出戌鹽則不拘𣙜也自蔡京竭其財𣙜其鹽困其民疲其兵加以中間盜賊之蜂起今歲邊事之未寧河東河北之民方仰朝廷之援救不足恃之以為强而陜西兵將尚為朝廷緩急之用則陜西之為根本明矣陛下安得不顧惜其根本而封殖之臣料廷臣慮非不及於此自見兩責黨人棄地之罪畏懼常瞻前却顧而不敢言耳此臣略言邊防非祖宗之法度者也臣願陛下考復臣言而詳思之則陛下今日政事果悉舉祖宗之故事乎果因循京貫之規模乎京貫之惡天下無不欲殺之者蓋以其蟊賊生靈蠧害國家以至於今日也借使京之鹽法不改貫尚有功於國行之數十年而不可易臣恐其大不然矣雖然常平之政不可廢在修弊起廢處之以中制新邊之地不可棄在因事制宜轉敗而為成若夫養兵之制運漕之法又在謹審而力行之夫祖宗之法犬牙相制不可偏廢也如論養兵則于運漕如論運漕則于鹽法如論財賦則于常平如論邊防則于茶馬千條萬目豈易遽言廟堂之股肱朝廷之肺腑必有竒材大略能為陛下處之者非臣疏逺之敢竊議也昔仲山甫周之賢相耳詩人歌詠其功德以謂愛莫助之況聖君巍巍在上恭儉寅畏宵旰焦勞減珍味者七十品放宫女者六十人常御便坐不奏音樂雖堯舜茅茨土階夏禹卑宫菲食不是過也而臨御三時治功未進豈非有合周雅愛莫助之者乎恭惟陛下以繼體守文之時應創業垂統之運當以太祖之神武英斷戡定禍亂仁宗之仁慈納諫安養蒼生神宗之聰明剛健修舉百度不可優遊退託日復一日以緩事機也天下之事已遲三時矣昔禹惜寸隂況當救焚援溺之時而可以坐閲二十七旬乎且自古君臣必有道合德契披肝膽以相照雖骨肉之親不可間也故商髙宗以傅說為旱歲之雨劉先主以諸葛亮為如魚得水蓋不如是不足以有為也書傳所載少有能兼將相之任者漢髙祖相蕭何而將韓信則西楚不足滅矣然薦韓信者蕭何也唐太宗相房杜而將英衛則天下不足平矣然濟英衛者房杜也陛下體此以觀之則將相之任定將相之任定則廟堂敢措議於軍旅將帥得注意於功名廟堂之上運用天下如身使臂如臂使指若杜黃裳之平西蜀李德裕之平河北指縱發䇿不離於樽俎而兩路平今朝廷人材豈無杜黃裳李德裕輩至於條令之未便官吏之貪汚斂求之違法奉行之未善此皆毛舉小小監司郡守片言可除之弊何足以多繫聖慮哉臣年老多病待盡朝夕祈欲一言而首邱耳干冒冕旒惟陛下留神侍御史李光論彗星劄子曰臣聞易曰天垂象見吉凶聖人象之蓋觀乎天文以驗得失者誠聖王之先務也臣伏見近者彗出寅艮間躔度甚速此變易之大者或傳朝廷用隂陽家說以分野言之為敵人滅亡之證此恐進諛之人以甘言諂辭媚恱陛下陛下輕信其說無復答謝天譴之意則虧損盛德非宗廟生靈之福臣聞孔子作春秋不書祥瑞而書災異者蓋欲警戒人君使知恐懼修省以應天變不聞以災異歸之吳楚也二百四十二年之間彗星三見禍亂輒應周室微弱上下交怨此皆人事之所感動也天心仁愛人君故出災異以譴告之不聞天心仁愛荆蠻欲其修省也陛下萬一惑於邪說凡天地變動各以分野言之則陛下之失自今以往誰復敢言蓋天變之發或發於未然之前或發於已然之後皆所以覺悟人君也所謂應天變之術豈有他哉在於修人事而已臣伏見陛下即位以來凡所施為無非仰合天心下當人意者勤儉憂勞不聞有過然舉措之間安得每事皆當亦當窮究致異之由推至誠行直道政事之不中不平者或未加治萬民之失業窮困者或未加恤姦邪之徒熒惑主聽者或未加察言路駸駸復有壅隔之患則隂陽之和何時而致天地之變何時而息乎臣所以居言責之地而不能默默也冒犯天威臣無任激切恐懼之至髙宗建炎二年中書舍人滕康上奏曰去歲郊祀前日食而日官不以聞廷臣不以告使陛下所以應天者未至故逆臣敢萌不軌者無先事之戒也陛下即位行再歲矣惻怛愛民之政徒為空言而百姓不被其恩哀痛責躬之詔不著事實四方不以為信忠佞並馳而多士解體刑賞失當而三軍沮氣臣願陛下取建炎初元以來所下詔書所舉政事熟思審度得無一二不類臣言者乎望參稽得失而罷行之上再三褒諭稱其有諫臣風三年六月淫雨詔求直言中書舍人季陵上言曰金人纍歲侵軼生靈塗炭怨氣所積災異之來固不足怪惟先格王正厥事則在我者其可忽邪臣觀廟堂無檀命之臣惟將率之權太盛宫閫無女謁之私惟宦寺之習未革今將帥擁兵自衛浸成跋扈苗劉竊發勤王之師一至淩轢官吏莫敢誰何此將帥之權太盛有以干陽也宦寺縱橫上下共憤卒碎賊手可為戒矣比聞復召藍圭黨與相賀聞者切齒此宦寺之習未革有以干陽也洪範休徵曰肅時雨若謀時寒若咎徴曰狂恆雨若急恆寒若自古天子之出必載廟主行示有尊也前日倉卒迎奉不能如禮既至錢塘置太廟於道宫薦享有闕留神御於河滸安奉後時不肅之咎臣意宗廟當之比年盜賊例許招安未幾再叛反墮其計忠臣之憤不雪赤子之寃莫報不謀之咎臣意盜賊當之道路之言謂鑾輿不久居此自臣臆度決無是事假或有之不幾於狂乎軍興以來既結保甲又改巡社既招弓手又募民兵民力竭矣而猶誅求焉不幾於急乎此皆隂道太盛所致帝嘉納之御史中丞張守論災異所自劄子曰臣伏準詔㫖以盛夏之月常寒久隂災異之來必有所自令侍從郎官以及臺諫條具闕失欲以應天變收人心召和氣仰見陛下畏天之威遇烖而懼古帝王之用心也臣待罪憲府清問所及敢不竭愚慮臣聞天心之愛人君自非大無道之世則必出災變以譴告警懼之及其至誠修省則轉禍為福捷於影響傳曰禹湯罪己其興也勃焉蓋不特有罪己之言而有責己之實也陛下罪己之詔嘗數下矣而天未悔禍恐實有所未至爾倘能應天以實不以文則安知譴告警懼非誘掖陛下以唘中興之業乎臣於去秋嘗奏疏願陛下居處飲食動作享用每以二聖母后為念詞頗煩悉頗簡聖聽冀不以一日南面之樂而忘萬里北狩之戚也勿謂九重之邃外莫得而聞也正心誠意日慎一日則何患天變之不弭人心之不固和氣之不至乎雖然髙宗有鼎雉之祥祖已訓之曰惟先格王正厥事則事事欲其正也臣請為陛下畢其說常寒久隂陽微隂盛之證也臣者君之隂也外國者中國之隂也盜賊者凡民之隂也方今朝廷不能制將將不能制兵强者怙寵有跋扈之風庸者擁衆為偷安之計遣師而出則必廣求官爵金幣而後唘行無功而還則又泛第首級勳勞而邀上賞虛張軍數而冒請給陵轢州縣而取犒賜小不如意肆為敓攘凡此則臣强也敵人纍年慿陵中夏連陷郡邑劇於破竹深入淮甸易於探囊止于山東偃然自肆涉此夏暑未有退期使吾選將厲兵固可襲取今則上下畏怯莫敢誰何凡此則中國微也狂寇潰卒蟻聚蜂屯大者數萬小者數千逺則星布于京西而不勝討近則鴟張於淮甸而無所憚或隂懷窺伺而邀求要地或陽就招納而公肆剽劫凡此則盜賊强也陽微隂盛斷可見矣是以紀綱未立號令不行人心動搖國勢危蹙而當長養之時積雨彌月寒氣不收宿麥壞於垂成禾稼傷於方茂物價翔貴商旅斷絶秋冬之間敵騎內嚮盜賊乘之於飢饉之餘其祻可勝言哉天時人事至此極矣陛下覩今日之勢與去年孰愈而朝廷之措置施設蓋與前日未有異也俟其如今春維揚之變而後言之則雖斥逐大臣無救於禍臣又聞漢制災異䇿免三公故陳平曰宰相上佐天子理隂陽順四時下遂萬物之宜而御史大夫蕭望之謂日月少光咎在臣等宣帝以為意輕丞相天變之來宰相豫任其責竊見某雖有勤王之功初無王佐之略論其材能則辦一職而有餘論其器識則斡萬幾而不足算計見效曽未及於前日豈不殆哉唐張守圭破可突干有功明皇欲相之張九齡曰宰相代天理物不可以賞功乃止今某蓋以勤王入相不幾於賞功乎吳起與田文論功文不及者三朱買臣難公孫𢎞十䇿𢎞不得其一終之田文相魏公孫佐漢言宰相自有體也故黃霸長於治民及為丞相則功名損於治郡以人之才各有分極故也某人固未有顯過但經濟之略未聞若以防秋在邇未宜罷免則臣愚以謂不若更擇文武全材海內推服公願以為相者親擢而並用之庶幾叶謀共計各效所長彌縫其失而正救其災則天變亦可收和氣亦可召也昔汲黯在朝而淮南寢謀杜黃裳為相而兩河剋復蓋其威望鎮物精神折衝亦不必事事更張而臣下為之凜畏敵人為之竦讋盜賊為之退聽矣伏願陛下內極嚴恭寅畏以修其德外更選用輔弼以修其政人事既盡天心必歸古人有云未至而言固嘗為虛及其已至又無所及今日之事實繫存亡顧畏避不言之罪清議不容而觸忤權要之罪聖明必貸惟陛下留神不以為虛言則天下幸甚守為殿中侍御史乞捕飛蝗劄子曰臣訪聞京西京東飛蝗為災上至京師下及淮甸逺邇憂懼恐失有秋蓋以軍旅之後必有凶年言其殺傷之怨薄隂陽之和也昔周宣王遇烖而懼側身修行以致中興天意若警陛下以隆中興之政恭聞淳化三年六月飛蝗蔽天徑西南而去太宗皇帝謂宰相曰必恐害及田稼朕憂心如搗亟令人馳詣所集處視之是夕大雨尺餘蝗盡殪慶歷四年六月仁宗皇帝謂輔臣曰方歲旱而飛蝗滋甚百姓何罪朕默禱上帝願歸咎于朕躬章得象對曰臣不能輔理宣化以致災孽而貽陛下憂今聖言及此必有上通天意之應伏望聖慈仰體祖宗之德下憫元元之災勝妖以德以弭天變仍敕逐處監司守令檢詳條令併力撲除儻不失有年庶幾軍興之時國用民食不至甚困天下幸甚四年張浚乞修德選賢以消天變疏曰臣竊惟國家不競患難洊至强敵慿陵海宇騰沸二聖久征於逺塞皇輿未復於中原而敵國交兵方興未艾郡邑半陷於敵手黎元悉困於塗泥自古禍亂所鍾罕有若此之比必欲昊穹悔禍氓庶獲安非君臣之間更相勉礪痛心嘗膽修德著誠大誅姦邪頓革風俗親君子逺小人去讒佞屏聲色簡嗜欲崇節儉則曷以上應天變下懷民心四海黔黎殊未有休息之日若昔黃帝遭蚩尤之亂大禹罹洪水之災然而卒能誅夷終歸平治者正以君臣上下苦心勞形杜邪枉之門開公正之道天人響應遐邇協謀故能平難化之寇成不世之績是知應非常之變必當得非常之人重念臣自叨殊遇深荷眷知雖事不辭難而功無可紀自知力小而任重徒能志大以心勞而況臣濫居政府以來天文失軌風雨不時敵人內侵盜賊多起蚤夜自省畏懼彌深欲隆希世之大勳必非微臣之可致伏願皇帝陛下念宗廟社稷之重憫邊陲黎庶之災敕已清心畏天念咎然後選求賢哲委付事功假以歲月之期漸圖興復之業俾臣乞身而去以畢餘生庶免顛隮仰負天地生成之賜不勝至願浚為觀文殿學士上奏曰臣聞太史推測天象以來年正月之旦日有蝕之臣竊惟天之愛人君必示以災變使之畏懼修省勉求為治人君修德畏天則天心眷祐享國無窮如其怠忽不省歸之時數禍有不可勝言者矣然而應天之道在實不在文當求之於心考之於行心有未至者勉之行有不善者改之如天之無不公如天之無不容如天之至誠無私而不失其信則何憂乎治道之不興何患乎賢才之不至哉惟陛下留神毋忽紹興三十二年浚奏飛蝗為災狀曰臣今月十一日午後舟行出國門有飛蝗自北而南其長數里臣竊惟災異之起必有所因恭惟陛下即位之初厲精求治憂勞庶政豈容有此臣愚伏望聖慈益加欽畏以答天心抑天之愛陛下殆將有以警勉于初助成聖德恢張皇業更乞延見近臣賜以清閒咨問時政必使澤惠實及軍民臣愚不勝拳拳紹興元年臨安火延燒數千家獻諛者謂非災異殿中侍御史魏矼上言曰春秋定哀間數言火災說者謂孔子有德而魯不能用季孫有惡而不能去故天降之咎今朝廷之上有姦慝邪佞之人未逐乎百執事之間有朋附奔競之徒未汰乎搢紳有公忠宿望及抱道懷藝有猷有守之士未用乎在位之人畏人軋已方且蔽賢未聞推誠盡公旁招俊又宜鑒定哀之失甄别邪正亟加進用三年天旱地震詔羣臣言事知溫州洪擬上奏曰法行公則人樂而氣和行之偏則人怨而氣乖試以小事論之比者監司守臣獻羡餘則黜之宣撫司獻則受之是行法止及疏逺也有自庶僚為侍從者卧家視職未嘗入謝遂得美職而去若鼓院官移疾廢朝謁則斥罷之是行法止及冗賤也𣙜酤立法甚嚴犯者籍家財充賞大官勢臣連營列障公行酤賣則不敢問是行法止及孤弱也小事如此推而極之則怨多而和氣傷矣侍御史張大經以旱應詔上奏曰人心不和有以致旱民力竭而愁歎多軍士貧而怨嗟衆二者當今大弊州縣之間絹帛多折其估米粟過收其贏關市苛征𣙜酤峻禁中外兵帥多出貴幸之門營利自豐素召衆怨教閲滅裂軍容不整且近習甲第名園越法踰制别墅列肆在在有之非賂遺何以濟欲願陛下疏斥憸腐抑絶幸門垂意人主之職責成宰輔一提其綱則天下事有能辦之者吏部侍郎廖剛論救旱劄子曰臣聞金穰水毁木饑火旱天數也雖堯湯在上水旱所不能免聖人惟不以天廢人故恐懼修省必謂己德之愆所致如湯以六事自責是也夫以湯之為君制事以義制心以禮檢身若不及而不吝於改過寧復有如是之闕失者哉凡以畏天之威罔敢怠豫而應之以誠如此是以雖有七年之旱後世不以為天譴而皆歸之於數為其所以應之者無不盡耳不然後世何獨私於湯哉比者連月不雨宸衷憂惻食息不忘中外所共知也臣願陛下嘗試隱之於心如湯所慮六事之失者儻有之乎有之而未能改則是應天之實未至雖禱祠庶事之備亦曰文而已矣非所以動天也誠則至矣過則改矣將無逺之不格無災之不弭斯須之旱又奚患焉亦取法於湯而已區區狂瞽之說惟陛下裁擇剛為御史中丞又上奏曰臣竊惟旱暵之久聖心焦勞如臣輩備位言責固當有藥石之言上禆聖政之萬一而寡陋淺暗曾無以效其區區曷勝惶懼愧負之至然臣竊意陛下朝夕省念求所以致旱之由殆將無所不至臣亦安敢默默自已臣聞先儒之論曰五行土制水土功興則水氣壅閼其證為旱邇來營造宫殿土木之役亦既經時然將以奉吾太母所不可已者行且訖工臣不復敢言若乃運河淤澱二十餘年今者遽欲濬治自杭至秀凡百餘里工力以數十萬計乃欲取辦於殘零廂兵與道路之遊手限以半月可不謂之使民疾乎畚鍤之事若實遊手決不能辦其勢必科夫於人户名為和顧遊手因以救飢其實皆南畝之民也方兹久旱農夫嗷嗷日待浸灌之澤有如時雨適至身拘於官不得反顧其私豈不害事而致怨乎臣謂天降災盩正當恐懼修省靜以待之而更興大役重擾吾民恐非所以應天也臣非不知開河之為利今正非其時耳又有咈人心者數事請遂言之劉光世賜第漕司收買材植凡數十里外有以木筏至者不問大小長短盡數劄下不許賣外人已買者或留之而未償其直未售者或抑之而日損其價簰筏鱗次蔽塞河道其所使令倚勢騷擾頗為民害如此不急之役獨不可少緩乎此一事也參選冗員充滿邸肆類遭疑文百端沮抑且如沿海巡尉透漏私鹽滿三十斤並礙差注雖已參部必須下元任州縣再取保明坐此留滯者皆是初參選人極多如縣丞司法雖多不許破格差注然如廣南州軍多是土人權攝動經年歲蓋內地經任人往往不肯屑就臣謂與其冒濫權攝孰若期以一年或三季許破格注授庶使寒士無滯留之歎此二事也近日諸營寨强刺百姓充軍已䝉聖㫖禁戢今稍革矣然已刺者多鄉村良民或負販小商或單丁養父母之人雖多與衣糧非其所願臣願特降睿㫖明赦將校等人强刺之罪聽其放出給據得歸農本則鼓舞者多矣此三事也恭以陛下憂勞之極至於不御葷肉則凡可以順人心合天意以召和氣而消災沴者宜無不為況此數事頗關休戚近在目前惟聖慈加省幸甚中書舍人洪遵論禱雨思所當戒劄子曰臣竊見涉冬至今纍月不雨人情嗸嗸無以為命陛下夕惕為治孳孳在民閔雨之心形于夢寐緇黃祈禬靡神不宗以至賑飢窮決犴獄止屠宰出廪粟大官供膳蔬素幾旬每對公卿大臣焦勞憂嗟見於晬表左右從御瞻顧動色上天孔昭若響若答三日之霖應誠洊至中外相慶歡喜欲舞天下幸甚昔成湯遭旱以六事自責蓋至七年而後已春秋於魯僖公書三時不雨以見其憂民之切今陛下不忍百日之旱濬發精誠求之於飲食言動之間曽不淹辰而丕應如此視成湯之七年魯僖之三時超然逺過有盛德而無愧辭人生實難萬世而遇大聖吁其偉哉臣立朝日淺䝉陛下恩顧最厚不敢作為頌詩以揚大澤獨有惓惓之意願陛下日慎一日雖休勿休念萬幾之間其所當戒有在賑飢決獄四端之外者永思所以上當天心下愜民情如今日禱雨之誠則治道光明可以粃糠千古尚何成湯魯僖之足云哉臣愚無識惟陛下留神遵為祕書省正字乞禁奏祥瑞疏曰臣聞春秋之作以示萬世規戒上之日食雨雹隕星震電下至多麋有􅈮蝝生有蜚之類纎悉必載獨祥瑞之事闕然不聞豈二百四十二年間皆無可書之實聖人垂教以為無益故也秦漢以來世主往往慿藉以文太平故此說浸盛至若黃龍見于劉聰蒼麟白鹿見于石虎鳳凰騶虞見于王建之世是乘時僭竊何瑞之有而其導諛之臣曽罔聞知史冊班班蓋有春秋深意惟元魏世宗時芝生太極殿崔光舉莊周所謂氣蒸成菌指為不祥其言忠切可為後世龜鑑恭惟陛下聖謨天造光啓中興歲仍金穰可謂上瑞紹興初蜀郡有以符瑞來上者亟行削秩四方聞之莫不歌誦聖德十餘年以來權臣擅朝矯誣瑞應邪諂之徒迎合朋附藉此為進身計臣不敢縷陳如衢州之寶碑則設心獻佞類於符命贛州之木成天下太平字鎪刻甚明識者嗤笑福州之竹實則傳記所載初非吉證揆是三者槩可見矣臣愚欲望睿慈專下明詔自今州縣無得輒奏祥瑞其卓卓顯異不可泯者上之禮部庶幾洗滌澆風化為忠厚以稱陛下謙慎之本意誠非小補臣愚無識惟陛下留聽歷代名臣奏議卷三百五
