body:
  text: 歷代名臣奏議卷一百五十三明楊士竒等撰求賢晉平公浮西河中流而歎曰嗟乎安得賢士與共此樂者船人固桑對曰君言過矣夫劍産于越珠産江漢玉産昆山此三寶者皆無足而至今君茍好士則賢士至矣平公曰固桑來吾門下食客者三千餘人朝食不足暮收市租暮食不足朝收市租吾尚可謂不好士乎固桑對曰今夫鴻鵠髙飛翀天然其所恃者六翮耳夫腹下之毳背上之毛增去一把飛不為髙下不知君之食客六翮邪將腹背之毳也平公默然而不應焉齊宣王坐淳于髠侍宣王曰先生論寡人何好淳于髠曰古者所好四而王所好三焉宣王曰古者所好何與寡人所好淳于髠曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士宣王曰國無士耳有則寡人亦說之矣淳于髠曰古者驊騮騏驥今無有王選於衆王好馬矣古者有豹象之胎今無有王選於衆王好味矣古者有毛牆西施今無有王選於衆王好色矣王必將待堯舜禹湯之士而後好之則禹湯之士亦不好王矣宣王默然無以應趙烈侯好音謂相國仲連曰寡人有愛可以貴之乎連曰富之可貴之則否君曰然鄭歌者槍石二人吾賜之田人萬畝連諾而不與烈侯屢問連乃稱疾不朝畨吾君謂連曰君實好善而未知所持公仲亦有進士乎連曰未也曰牛畜荀欣徐越皆可連進之畜侍以仁義烈侯逌然明日欣侍以舉賢使能明日越侍以節財儉用察度功德所與無不充君說乃謂連曰歌者之田且止以畜為師欣為中尉越為內史賜連衣二襲楚威王問於莫敖子華曰自從先君文王以至不榖之身亦有不為爵勸不為祿勉以憂社稷者乎莫敖子華對曰如華不足知之矣王曰不於大夫無所聞之莫敖子華對曰君王將何問者也彼有廉其爵貧其身以憂社稷者有崇其爵豐其祿以憂社稷者有斷脰決腹一瞑而萬世不視不知所益以憂社稷者有勞其身愁其志以憂社稷者亦不為爵勸不為祿勉以憂社稷者王曰大夫此言將何謂也莫敖子華對曰昔令尹子文緇帛之衣以朝鹿裘以處未明而立朝日晦而歸食朝不謀夕無一月之積故彼廉其爵貧其身以憂社稷者令尹子文是也昔者葉公子髙身獲於表薄而財於柱國定白公之禍寧楚國之事恢先君以掩方城之外四封不廉名不挫於諸侯當此之時也天下莫敢以兵南鄉葉公子髙食田六百畛故彼崇其爵豐其祿以憂社稷者葉公子髙是也昔者吳與楚戰於柏舉兩軍之間夫卒交莫敖大心撫其御之手顧而太息曰嗟乎子乎楚國亡之月至矣吾將深入吳軍若撲一人若捽一人以與大心者也社稷其為庶幾乎故斷脰決腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也昔吳與楚戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散棼冒勃蘇曰吾被堅執鋭赴強敵而死此猶一卒也不若奔諸侯於是贏糧潜行上淨山踰深溪跖穿膝暴七日而薄秦王之朝雀立不轉晝吟宵哭七日不得告水漿無入口癲而殫悶旄不知人秦王聞而走之冠帶不相及左奉其首右濡其口勃蘇乃蘇秦王身問之子孰誰也棼冒勃蘇對曰臣非異楚使新造盩棼冒勃蘇吳與楚人戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散使下臣來告亡且求救秦王顧令起寡人聞之萬乘之君得罪一士社稷其危今此之謂也遂出革車千乘卒萬人屬之子滿與子虎下塞以東與吳人戰於濁水而大敗之亦聞於遂浦故勞其身愁其志以憂社稷者棼冒勃蘇是也吳與楚戰於柏舉三戰入郢君王身出大夫悉屬百姓離散䝉榖結鬭於宫唐之上舍鬪奔郢曰若有孤楚國社稷其庶幾乎遂入大宫負雞一本作離次之典以浮於江逃於雲夢之中昭王反郢五官失法百姓昏亂䝉榖獻典五官得法而百姓大治此䝉榖之功多與存國相若封之執圭田六百畛䝉榖怒曰榖非人臣社稷之臣茍社稷血食餘豈悉無君乎遂自棄於磨山之中至今無冒故不為爵勸不為祿勉以憂社稷者䝉榖是也王乃大息曰此古之人也今之人焉能有之耶莫敖子華對曰昔者先君靈王好小要楚士約食馮而能立式而能起食之可欲忍而不入死之可惡然而不避華聞之其君好發者其臣抉拾君王直不好若君王誠好賢此五臣者皆可得而致之蘇子謂楚威王曰仁人之於民也愛之以心事之以善言孝子之於親也愛之以心事之以財忠臣之於君也必進賢人以輔之今王之大臣父兄好傷賢以為資厚賦斂諸臣百姓使王見疾於民非忠臣也大臣播王之過於百姓多賂諸侯以王之地是故退王之所愛亦非忠臣也是以國危臣願無聽群臣之相惡也慎大臣父兄用民之所善莭身之嗜欲以與百姓人臣莫難於無妒而進賢為主死易垂沙之事死者以千數為主辱易自令尹以下事王者以千數至於無妒而進賢未見一人也故眀主之察其臣也必知其無妒而進賢也賢人之事其主也亦必無妒而進賢夫進賢之難者賢者用且使已廢貴且使已賤故人難之燕昭王問於郭隗曰寡人地狹人寡齊人削取八城胸奴驅馳樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗曰有然恐王之不能用也昭王避席願請聞之郭隗曰帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賔也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則廝役之材至矣南面聽朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乘勢以求臣則朋友之材至矣北面拘指逡巡而退以求臣則師傅之材至矣如此則上可以王下可以霸唯王擇焉燕王曰寡人願學而無師郭隗曰王誠欲興道隗請為天下之士開路於是燕王常置郭隗上坐南面居三年蘇子聞之從周歸燕鄒衍聞之從齊歸燕樂毅聞之從趙歸燕屈景聞之從楚歸燕四子畢至果以弱燕并強齊夫燕齊非均權敵戰之國也所以然者四子之力也詩曰濟濟多士文王以寧此之謂也漢武帝元狩三年上招延士大夫常如不足然性嚴峻雖素所愛信者小有犯法輒按誅之汲黯諌曰陛下求賢甚勞未盡其用輒已殺之以有限之士恣無已之誅臣恐天下賢才將盡陛下誰與共為治乎黯言之甚怒上笑而諭之曰何世無才患人不能識之耳且才猶有用之器也有才而不肯盡用與無才同不殺何施黯曰臣雖不能以言屈陛下而心猶以為非願陛下自今改之無以臣為愚而不知理也居久之坐法免吳孫權時荆州士人新還仕進或未得所婁侯陸遜上疏曰昔漢髙受命招延英異光武中興羣俊畢至茍可以熙隆道教者不必逺近今荆州始定人物未達臣愚慺慺乞普加覆載抽拔之恩令並獲自進然後四海延頸思歸大化權納其言唐太宗曰古來帝王皆欲國祚長久但為威勢既髙下情不能上達加以君子小人雜處其間用不得人遂至亡滅侍中魏徴對曰巧佞忠正無代不有但相時君所好而進若用忠正則理用邪佞則亂必然之理也太宗曰為帝王者必須慎其所與只如鷹鷂鞍馬聲色殊味朕若欲之隨須即至如此等事常敗人正道邪佞忠正亦在時君所好若任不得賢何能無滅徴對曰臣聞齊威王問淳于髠曰寡人所好與古者聖王同否髠對曰古者聖王所好有四今王所好唯有三種古者好色王亦好之古者好馬王亦好之古者好味王亦好之古者好賢王獨不好齊王曰今無賢可好也髠曰古之美色即有西施毛嬙竒味即有龍肝豹胎善馬即有飛兔緑耳此等今既無之王之厨膳後宫外廄今亦偹矣王若以今之無賢未知前代賢者得與王相見否太宗深然之德宗問政治之要都官員外郎關播曰為政之本要得有道賢人乃治帝曰朕比下詔求賢才又遣使黜陟􅊧逮所遺須能者用之若何播曰陛下雖求賢又使舉薦然止得求名文辭士焉有有道賢人肯奉牒丐舉選邪帝恱曰卿姑去還當更議憲宗嘗御浴堂北廊從容言曰朕間覽前史見興化致理之主奉公竭忠之臣未嘗不加興歎想其風彩洎我貞觀開元之化偹在青史垂於不朽朕不量菲薄欲庶幾仰承祖宗之道追縱古昔之風將釣拔俗之士致濟代之才舉兹凋瘵納諸仁壽邉境靡烽燧之警郡縣無愁怨之音禮義興行盜賊屏息無忝諡號不為宗廟之羞何行而可以至是也學士李絳對曰陛下興聖懷發德音追帝皇之髙風紹祖宗之丕烈思延釣築之士想致唐虞之化非臣凡近愚昧所宜獲承聖言而祇應清問也臣聞聖人與天地合德日月合明思發於志故易曰出其言善千里之外應之況其邇者乎又曰先天而天弗違後天而奉天時天且不違而況於人乎昔周成王泣啓金縢皇天為之返風宋景公誠發德言妖星為之退舍天人相感今古同時記曰川澤通氣山川出雲嗜欲將至有開必先言聖靈相通有感而應也今陛下以上聖之資撫易化之運積勵精思理之志求希代濟時之賢感於誠懷勞於夢想言出於口行加於人神祗將必效靈才俊固當接武豈惟殷宗求於傅說周文獲於渭濵碩言必從志誠斯感惟聖人為能之抑臣又聞奏必觀其實不觀其文信其行不信其言若欲天下副陛下之誠從陛下之化自非聖躬行之以導其下則無由而致未有表正而影不直聲鳴而響不答也今陛下以常士之禮而待拔俗之賢以九品之祿而望超代之器是由垂蝸蚓之餌以釣吞舟之鱗設弓弋之􅗤以羅垂天之翼固不可得而致也昔文王養老而伯夷太公出昭王禮士而鄒衍樂毅至故必以身先之以誠致之未有不應者也陛下誠能正身勵已尊道貴德親信端士逺棄邪佞盡忠進直者奬之希合從諛者斥之與大臣言敬而信之不使小人參其事與賢士游親而禮之不令不肖者搆其隙唯義所比不論親踈唯仁是行不論貴賤去冗官無益於時者則祿及才能矣出宫女之希御幸者則時無怨曠矣簡繁數之儀則禮得其節矣除靡慢之奏則樂得其和矣將帥廉則士卒勇矣官師公則治化洽矣法令行則下不違矣教化篤則俗必遷矣如此則聖問周達德聲遐宣可使金石孚變鳥獸率舞而況於人乎則必賢哲慕義英彥赴響伊尹必負鼎而來吕望必投釣而起由余必棄戎而委質寧戚必捨牛而效用二傑成功於髙祖四七展才於光武龍吟則山雲起虎嘯則谷風生自然之應也然後陛下坐明堂朝羣后興教化作禮樂正風俗厚人倫逺比堯舜興崇近與祖宗合德時臻至理代稱中興則向者聖念所思睿心企及何逺之有哉唯陛下勤行之爾若言之不至無至也伏惟陛下念之伏惟陛下勤之而已上曰美哉斯言朕當書之於紳因有進㫖撿自古明君賢臣亂君邪臣事跡造屏風焉宋仁宗慶歷四年右正言同修起居郎余靖上奏曰臣竊聞京西轉運使杜把准中書劄子奉朝㫖抽赴闕欲令計置收捉宜州蠻賊者臣以為朝廷蓄飬賢俊當如民家收積財貨平時先有營度至急乃得其用伏自去年以來陜西舉知州始用把三司擇通判則又用杞京西多盜賊則又用杞今兹蠻人作叛則又用杞皆席未遑暖而即移之是使杜把有奔命之勞朝廷有乏賢之歎如斯事體良亦可惜臣親見杜把言京西之政始有端緒而未盡施設今遽捨去不成績效此屢易官之患也伏惟廟堂之上當思天下有多少賢才可與共了天下事者廣為詢訪預作處置某人可了某職某人可當某路一旦緩急用之如指諸掌此乃廟堂之策當有素定者也今二年之內講求賢俊只知有一杜把何觀聽不廣示天下以狹也設使别路更有賊盜則將又移杜把無乃取笑四方乎每見大臣謀事當平居無事時優游暇逸如不足憂者及一隅有警則倉惶移易如素不經心者且去年冬兩府大臣共選諸路轉運使故田瑜為廣西轉運使梁載為判官必謂才能出人今蠻僥才動未見瑜等如何處置有甚利害早已疑之此擇人之術不自信矣始若不知不如勿用只如近差王絲往湖南安撫待其奏報不中事節乃知其人不可委任知人不明為害不細伏望陛下敕諭兩府大臣廣思博採天下賢才以應萬務無使臨事倉卒有乏才之歎則社稷之福古人有言曰霸王之主終不採將於往賢求相於後哲自是識拔不明求之不至不可厚誣四海謂之乏賢惟陛下圖之神宗時程皓論飬賢上疏曰臣竊以議當代者皆知得賢則天下治而未知所以致賢之道也是雖衆論紛然未極其要朝廷亦以行之為艱而不為也三代飬賢必本於學而德化行焉治道出焉本朝踵循唐舊而館閣清選止為文字之職名實未正欲招賢飬材以輔時贊化將何從而致之也臣歷觀古先哲王所以虛已求治何嘗不盡天下之才以成已之德也故曰大舜有大焉善與人同樂取於人以為善今天下之大豈為乏賢而朝廷無飬賢之地以容徐察其器實髙下而進退之也臣今欲乞朝廷設延英院以待四方之賢凡公論推薦及巖穴之賢必招致優禮視品給俸而不可遽進以官止以應詔命名凡有政治則委之詳定凡有典禮則委之討論經畫得以奏陳而治亂得以講究也俾群居切磨日盡其材行其志使政府及近侍之臣互與相接陛下時賜召對訪以治道可觀其材識器能也察以纍嵗人品益分然後使賢者就位能者任職或委付郡縣或師表士儒其德業尤異漸進以帥臣職司之任為輔弼為公卿無施之不稱也若是則引彚並進野無遺賢陛下尊賢待士之心可謂無負於天下矣哲宗元祐初王岩叟乞依治平故事詔執政舉館職上奏曰臣伏以國家之所急在人材而人材之難不可以倉卒而得必及其閒暇廣聰眀以求之則一日有用隨取隨應無顛沛之患矣求而得之宜優異寵榮以發其光華雍容嵗月以濡其德美而飬其望使人人有以見天下而後進而用之則朝廷尊名器重天下之人信且服矣臣伏覩祖宗所以盛儒館之選萃天下之賢而育之者此道也故巨公名卿莫不由此途出今祕書之官限貟太狹不足盡天下英豪之選充國家緩急之求臣切惜之伏望聖慈依治平故事詔執政各舉可充館職者五人既以收羣材之美且以觀大臣之能方陛下新聖政以光明先業之時臣以謂求材飬賢最先務也惟陛下留神采納岩叟又論求賢當去六蔽上奏曰臣伏觀自古治世天下之人安樂無事日躋於仁夀之域而不自知者人主清心以照理至誠以用賢之效也事莫不有理也心清則理自見天下未嘗無賢也誠至則賢自來恭惟陛下臨政逾年是非不能惑於聽邪正不能亂於前不勞聰眀而萬事皆理者心清以照之也惟是人材得之未多朝廷之間除授之際常覺艱難不稱盛時之事可為陛下惜耳陛下勿謂天下之賢盡於此也而得賢之心足勿謂雖有賢者不易致也而求賢之心倦陛下內篤此誠以自厲外敕同德協心之臣以求之臣以謂無不得賢之理然古有六蔽焉不去之則衆賢終不可盡得臣請為陛下道其理略有私意則為蔽執偏見則為蔽局於褊心則為蔽喜於附已則為蔽有自賢之心則為蔽簡貴自居而不與物親則為蔽此求賢之所難陛下不可不知也願陛下深詔執政大臣使上同陛下清心至誠之美而警戒六蔽之患則天下之賢無逺近無隱顯皆收得之為朝廷用以賢繼賢社稷之福生靈之幸與天壤相等矣臣不勝愚忠孝宗淳熙二年兵部侍郎周必大上奏曰臣聞富人之造居室也率種木於數十年之初故未嘗有求而無之之患況夫興事造業貽謀萬世其可不儲材於間暇而欲取具於斯須乎前事布在方册臣不敢泛論且以本朝觀之太祖太宗搜攬豪傑恢張四維凡作成之方無所不用其至及真宗仁宗之世名卿才大夫磊落相望是其效也仁宗丁時太平增光前烈尤以涵飬士類為急自治平至元祐悉獲其用厥後章惇蔡京相繼秉政專為身謀靡思國計方且沮士氣以壞風俗奬讒誦以植黨與卒令裔夷謀夏所從來逺矣太上中興一洗前弊紹興初將相卿士得人為多既而秦檜以患失之心濟忌嫉之性同已者用異已者逐人才衰落貽患至今使陛下欲復古則將相未能仰副隆指欲飬民則守令未能布宣寬詔當饋而歎蕭曹撫髀而思頗牧抑有由也臣愚欲望聖慈明諭二府為國長慮博求文武之英布列中外近而言之可使收功於當世逺而言之又將為利於無窮厥今要務孰大於此昔西漢蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢拜諫大夫遣之王嘉因言今諸大夫有材能者甚少宜豫蓄飬可成就者則士赴難不愛其死臨事倉卒乃求非所以期朝廷也嘉言可取惟陛下念焉寧宗時衛涇上奏曰臣竊惟人主建功立事興治保民必以人才為急自昔人才之盛莫加成周臣嘗觀菁莪之詩而知成周所以育才之多觀嘉魚之詩而知成周所以與賢之實觀臺萊之詩而知成周所以得賢之效序菁莪者曰君子惟能長育人才則天下喜樂之言君子長育士類猶大陵之長育微草使菁菁然茂盛其後遂有百朋之錫人才之多固可見矣序嘉魚者曰太平之君子至誠樂與賢者共之夫與賢而出於中之誠則志念純篤精神交孚無復疑間故嘉賔燕樂綏安而卒章喻以甘瓠樛木有君臣固結不可解之義其與賢之實為如何也序臺萊者曰得賢則能為邦家立太平之基言君子得賢則其德廣大堅固如南山之有基址夫用賢而至於如山之有址則層級比次地望相接久而不匱故邦家光榮萬壽無疆不惟一時德音之茂且足以保艾爾後焉其得賢之效彰明碩大而有不可掩者惟成周人才之盛本末如此故能成文武之功業卜年世於綿永豈他道哉肆我本朝自太祖太宗躬履艱難混一區宇靡皇他務急先人才網羅收拾唯恐或遺愛護長飬唯恐弗及至景德祥符至和嘉祐之際人才盛矣逮天聖慶厯間議論相持怨忌交作幾至於激惟我仁祖容覆如天并包罔外元臣碩輔一以至公平心區處遂於國體迄無所傷故蘇軾有言仁宗皇帝四十二年之間搜攬天下豪傑不可勝數既以為股肱心膂而其任重道逺者又留以為子孫百年之用至今賴之是以國家太平之久莫盛此時殆與成周異世而同符也恭惟陛下聖明天縱德音日新十年以來銷磨黨偏茂建皇極凡前日議論之不一者今皆歸一趨向之難合者今皆復合洗濯湔祓隨器收用無新舊彼此之間無重輕取舍之偏士生斯時可謂幸矣如臣一介庸陋無所取材憂患疾病屏伏田里念絶榮望誤䝉聖恩起之間廢擢領名郡兹緣奏事獲望清光方將逺去闕廷區區愚衷不能自己竊謂今日公正之路既開和平之福滋集靖原所自若非陛下君臣同心保全臣子愛惜士類忠厚惻怛何以至此臣更願陛下與執政大臣推明此意以廣育材之地持守此意以盡與賢之實堅永此意以收得賢之效自今中外士大夫精白以承休德勉勵以赴事功使人才之盛無愧詩人之所詠上同祖宗之盛時則靜可以保治安動可以圖興復惟陛下意爾豈不休哉理宗時禮部尚書魏了翁進故事曰慶厯四年四月右正言同修起居注余靖上疏曰臣竊聞京西轉運使杜把准中書劄子奉朝㫖抽赴闕欲令計置收捉宜州蠻賊者臣以為朝廷蓄飬賢俊當如民家收積財貨平時先有營度至急乃得其用伏自去年已來陕西舉知州始用杜把三司擇判官則又用杜把京西多盜賊則又用把今兹蠻人作叛則又用把皆席未遑暖而即移之是使杜把有奔命之勞朝廷有乏賢之歎如斯事體良亦可惜臣親見杜把言京西之政始有端緒而未盡施設今遽捨去不成績效此屢易官之患也伏惟廟堂之上常思天下有多少賢才可與共了天下事者廣為詢訪預作處置某人可了某職某人可當某路一旦緩急用之如指諸掌此乃廟堂之策當有素定者也今二年之內講求賢俊只知有一杜把何觀聽之不廣示天下以狹也設使别路更有賊盜則將又移杜把無乃取笑四方乎每見大臣謀事當平居無事時優游暇逸如不足憂者及一隅有警則倉皇移易如素不經心者伏望陛下敕諭兩府大臣廣思博採天下賢才以應萬務無使臨事倉卒有乏才之歎則社稷之福古人有言曰霸王之主終不採將於往賢求相於後哲自是識拔不明求之不至不可厚誣四海謂之乏賢惟陛下圖之臣竊見余靖上疏乃慶歷四年四月也方是時晏殊為相范仲淹杜衍富弼諸賢皆在二府而韓琦分陜專任西事本朝人物於斯為盛而靖也以一事之不素講猶孜孜以儲才為言臣聞天為斯世生才自足給一世之用用之有不給則以求之有未至於是常知乏才之可歎而不知遺才之實多夫使其兼收並蓄如醫之儲藥工之擇木粗細畢程大小各當則左抽右取惟意所欲何憂乎人才之不足何患乎事機之遝至爰自後世長飬成就之功少而摧折委棄之意多脫有緩急則弄印四顧莫知所畀夫未能射御而責以獲禽然且不可兹其為射御不已多乎太祖皇帝未取太原君臣之間擬曹翰以守之亦可謂早矣而臣普猶曰翰死孰可代且太原未取而先擇守未置守而先擬代載在史册人不以為太早而以為當然不知今日三邉重地陛下與二三大臣亦嘗慮及此乎不惟三邉為然也內之百司庶府外之牧守監司皆當以是致思也燕閒之覽儻謂其可采惟陛下速圖之中書舍人兼經筵說書袁甫進故事曰唐太宗貞觀三年上謂房𤣥齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職也比聞聽受辭訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射臣謂太宗以宰相親細事則不能助朕求賢蓋光隂迅速而精力有限以有限之精力而耗於迅速之光隂用之於細事則必不能專心於求賢此必然之理也近者兩相並命庶明勵翼陛下親灑御札從右揆之請使自丞相以下以及百執事各勤修職業於本局寅而人未而出誠率厲羣工之要務然臣區區之意謂可以革向來百官怠惰茍且之弊耳若夫為宰相者僅了細務於朝堂而未能同心叶慮助陛下求賢此乃太宗之所深慮而未可為今日喜也夫以房𤣥齡杜如晦號為唐賢相猶且區區於目前之細務而未能專以求賢為急太宗於是以事之小者使尚書左右丞相當之而大事乃關於僕射此令一出為房杜者何所辭其責哉甚矣求賢一事至難盡也拘攣者不能越常度輕易者不能精選擇私意多者先親故而後孤寒忌心勝者樂軟熟而妒忠直此求賢之所以難也間有髙蹈邱園不屑軒冕者亦當汲汲焉苦心刻意致敬盡禮必欲其為時一出既得之矣又必度其才能之所堪與其職任之宜稱使犁然當於天下之心然後能收求賢之實效固非曰一人舉而遽用之一人毀而遽棄之也昔周公之為輔相也執贄而見者以千百計周公不憚吐握之勤以身先天下士故得士為盛今者晨入堂而出已迫暮其所賔接幾何人哉搜訪不廣則聰明壅招延稍怠則譏議起真賢恥於自售而求售者多佞人戞戞乎其難也臣望陛下明詔二三大臣不惟退堂之後宜盡求賢不倦之意其㑹于堂也正當各以所聞所見某人為賢某人為才某人宜居某職某人宜任某事開心腹露情愫相與講明問辨以盡其所懷日日如是則一日得一日之人才月月如是則一月得一月之人才廟堂或未能盡識則當進侍從之臣相與開廣而究極之講明既盡則進而告君豈復有衡鑑不審是非易位者哉今之所謂進擬者亦略近此意然規模狹而不廣意向私而未公所以用人雖多而得人甚鮮者正坐此耳舍此不務乃一切諉之曰今世乏才韓愈有言其真無馬耶其真不識馬耶臣亦曰其果乏才耶其乏識才者耶願陛下與二三大臣更加之意甫為祕書少監上疏曰臣聞天地變化草木蕃天地閉賢人隱陛下新更大化正天地變化人物蕃盛之秋也臣竊怪比年以來百物日漸衰耗小民愁苦大不聊生臣濫叨麾節十有餘年其在江東也既目擊凋殘窮悴之態易守富沙所見尤甚於江東旋被奏事之命道經三衢視臣七八年前假守之時氣象大異猶可諉曰寇實使然及歸抵四明則蕭條之狀與三衢同人人嗟咨家家嘆息耄耋之人亦云前此未見臣心甚駭之天地生物何有終窮今物耗且貴氣象蕭條豈無所以然之故歷觀史册所載大抵物貨衰少井邑荒涼往往不見於隆盛之時而多見於叔末之世當其隆盛也公道開明衆賢彚進布列在位蔚然輝光凡融結於宇宙之間者無非瑞氣之象則天不愛道地不愛寶物産蕃阜乃變化之餘效耳及夫叔末之世佞僞馳騁賢智一鬱上下茍玩精采萎􅒒凡形見於天壤之內者景象迫促而不舒物産壅閼而不暢無寖明寖昌之勢而有日銷月鑠之形亦理之所必然耳多賢則潤澤豐腴乏才則膏液枯竭已事之驗昭哉可觀今日豈不多賢歟更化以來招徠耆艾登崇俊良一反天地閉塞賢人隱伏之證則當有天地變化萬物繁阜之效今也賢才衆多而物意焦枯如前所陳者何歟豈氣數至此而微有非人力之所可挽回歟抑變衰為盛必有旋轉造化之妙而非時賢之所能及歟否則衆雋雖聚本朝而分職授任未能各當其處坐觀者多而任責者少歟又否則陛下雖有好賢樂善之念未免貌敬心踈彼之有所抱負者實未能展布歟是數者之中必有一二于此矣而臣又竊有隱憂者深恐悠悠嵗月績用未應陛下亦見在朝之士所謂醇儒雅望者略無救弊新竒之䇿必將漸起厭心且别求夫輕鋭有才之人善言利而多心計者用之譬如人抱沈痼之疾風寒暑溼之所陵薄其受病固非一日積漸耗散生意才一髮耳氣象蕭條則其病證也人才則醫也計畫則藥方也有善醫焉未及盡用其方乃遽更他醫雜試而輕攻焉則一髮生意所存幾何今日所用之人是也而所以用其方者未也陛下何不集在廷之彥如慶厯間開天章閣給筆札俾各條陳當世之利病何以振朝廷之綱何以裕國家之計何以濟民生之急何以壯邉鄙之勢察脉觀證對病用藥鑿鑿精實勿事空談上之人擇其尤的切可行者使各竭力任責課功計效凡布列周行者不至虛度光隂粉飾觀美則事事振起物物精神昔日血氣之微弱未有不轉為盛強茍徒慕賢人衆多之名而無庶明勵翼之實使賢者仰屋竊嘆而憸人刻核之說得以投隙而入則元氣先蹙而血氣隨之其銷鑠耗竭決不止如今日而已臣來自逺方不識忌諱盡吐肝膈惟願陛下力守更化以來求賢如不及之初意毋致小有轉移君臣上下苦心刻意是究是圖將見薰為太和民物蘇醒享變化蕃盛之效消閉塞隱伏之幾特一轉移之間耳惟陛下篤信而力行之宗社幸甚生靈幸甚洪舜俞進漢武帝順帝故事曰上方欲用文武求之如弗及始以蒲輪迎枚生見主父偃而歎息群士慕嚮異人並出卜式拔於芻牧𢎞羊擢於賈孺衛青奮於奴僕日磾出於降𨽻斯亦曩時版築飯牛之徒明已漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣歷數則有唐都落下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及順帝知能任使故士得用情天下喁喁仰其風采遂乃備𤣥纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降已之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謀洪深左雄黃瓊之政事正固桓焉楊厚以儒學進崔爰馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗隂陽詳密張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆埸宣其智力帷幄容其謇辭舉措禀其成式則武宣之軌豈其逺而臣聞求賢而不用吉士與不求同知人而不善任使與不知同人主有志於治孰不知非賢罔乂而急於求賢者有行可際可公飬之士亦莫不起而應其求海濵之大老至洛陽之年少至東山之髙卧者至周南之滯留者至明廷立鵠華階振鷺非不極一時之盛而知不盡所抱用不盡所知如醫者聚參苓术桂玉札丹砂於一槖品雖至珍用與病違雖聚無益也武帝蒲輪之詔一下而異人並出順帝𤣥纁之聘一馳而俊乂咸事好賢急士之意前後無間然武帝有儒雅篤行質直推賢定令文章滑稽應對厯數協律運籌奉使將率受遺所聚凡二十七人而漢以之盛順帝有淵謨政事儒學文章牧民將帥推士糾違隂陽機術所聚凡二十人而漢以之衰蓋武帝於人才之長短小大洞察底藴隨所用而各當順帝苐知來之而髙謀不見納謇辭不見容智力不得宣賢雖滿朝廷足以美觀聽而已諸葛亮嘗言親賢人逺小人先漢所以興隆親小人逺賢士後漢所以傾頽一親一逺之間盛衰判矣易之損益皆以十朋之龜弗克違明衆賢之助在損之六五虛中自損以從在下之賢則為元吉在益之六二賢者欲致益於君君樂受其益未可盡必也惟守正固以待之至王用之以享于帝然後吉有志於治者其可以徒聚天下之賢哉賢者之聚亦豈可徒樂簮盍之盛而不思相與共慰天下之望哉徐元杰上言曰臣竊惟自昔天下之事非人才不能以有濟今問之在朝則耆舊凋零問之在野則遺逸散漫於此而有作成興起之念焉則何材而不資世臣聞之師曰人主愛惜人才必於卑微寒酸之時而豐殖培飬儲為超躐登用之地故遴選之必極其精委用之必當其任師儒教導之官不容以輕畀職幕刑獄之吏切戒於輕豫外而監司郡守必謹簡其賢內而職事散官必更迭而出上而卿監郎曹又上而侍從臺諫給舍凡自內外及見任之與閒退者莫不具姓名而籍記之其在內則三省而下咸責以考察之公其在外則監司郡守迭嚴其舉刺之法所薦惟賢則必賞所舉或繆則必罰材或足以集事雖譎詐可以御而使功或足以掩過雖愆尤可以宥而録繼自今欲乞陛下明詔大臣取內外小大之臣分置簿籍盡記姓名開具功過其為籍也隨職任之小大為編排之次第每每各以一本而置之銓部留之省府上之禁嚴庶乎按圖考索如指諸掌若是則緩急可以搜尋出入可以更迭而無臨事乏材之嘆此特在一作新之頃而已詩曰周王壽考遐不作人所以見豐芑數世之仁也惟陛下矜采愚慮而亟圖之祕書郎許應龍上奏曰臣聞天下固有不一之才人主當有兼容之量夫才之在天下若十指然長短小大雖若不齊而皆適於用惟平心以處之毋重彼而輕此毋執一而廢一則人莫得以窺其際而不至於彼此求勝負相傾軋以成分朋植黨之弊昔臯陶論官人之法謂翕受敷施九德咸事則可以撫五辰而凝庶績奈何後世之君不知出此文帝好清淨豪傑之士難合武帝用才智道德之士見遺宣帝尚刑名儒學之士不用皆由所尚之偏遂不足以盡天下之才要之人主當與天地同其大品物流形洪纎髙下何所不有惟天地之量足以容之栽培傾覆生育長飬各順其禀賦之自然而無容心於其間故萬物並育而不相害人主代天而行化惟無以好惡之私先立於中則人才之重厚浮薄小大長短悉歸於運化之內天下既無不用之才人才亦無不遇之嘆尚何黨同伐異以至於相激哉盡是道者惟我朝仁祖為然慶厯初人才彚進黨論微有萌蘖仁祖納之以如天之量均調消息兼容翕受使無更仆迭起之患而有協恭和𠂻之美故仁祖之世獨稱多士嘉祐治聲振古無有職此之由也嗟夫人才不同彼此異見其來非一日矣足一躡軍門視文士如仇讎首一戴儒冠輕武辨如草芥矯矯特立則以靜重為茍容處事詳審則以剛直為沽譽長於吏才則以明經術者為腐儒專於學問則以了官事者為俗吏少俊則以老成為遲鈍寬厚則以嚴明為苛刻彼是此非判乎其不相入也人主以公天下為心其於人才惟求所以辦吾事濟吾治耳烏可用其一而廢其一哉所尚茍偏則互相訾毁迭為勝負非惟不足以成事而清流濁流之禍實肇於此陛下踐祚以來召耆德之臣用名家之裔既舉賢能復舉將帥既褒直言復褒廉吏文學者用之吏事者用之無一毫好惡之私有保合太和之意固可以示皇極之公矣雖然野無遺賢斯可謂至治之極王多吉士斯可立太平之基今日用人固無好尚之偏得人之盛其果如帝王之世乎若猶未也則招延之路尤不容以不廣雖求賢之詔屢下剡薦之牘交馳然人情易私罕以實應單寒寡援者無由自達靜退不競者未免見遺臣願陛下益達四聰大開衆正使任薦舉之責者皆以至公為念拔尤取頴無一或遺以備上之采擇則俊乂在官百僚師師當匹休於隆古矣惟陛下與大臣亟圖之度宗咸淳八年祕書少監髙斯得上言曰臣聞天之生才何代無之特在乎人主皇皇汲汲以求之而已茍能以至忱動之以意氣來之彼將雲合霧集為吾所用安有乏才之患哉帝王尚矣若漢之武帝求賢如饑渴亦不世出之令主也始因感董仲舒之言令郡國舉孝廉自是茂材異等之科賢良文學之選詔書無嵗不下於是群士慕嚮異人輩出文武在庭穆穆布列公孫𢎞董仲舒兒寬之儒術司馬遷相如之文章汲黯韓安國鄭當時之論議東方朔徐樂嚴助之應對衛青霍去病之將略蘇武張騫之奉使其餘不可勝數故能內修百度外攘四夷制作文章有三代之風恢拓境土極萬里之廣史臣紀述其事謂其欲用文武求之如弗及漢之得人於兹為盛信矣蔡雍立於靈帝之朝蓋漢之季世也當是時樂松賈護多引無行之徒待制鴻都門下帝皆待以不次之位又取市賈小人謂之宣陵孝子凡數十人悉拜為郎中後因灾異命群臣陳政要故蔡雍以武帝之世名臣輩出文武並興為對欲以勸帝去無用之小才求經國之賢士帝之昏暗何足以知此也臣嘗因是而有感於祖宗之事是時名臣輩出文武並興亦豈減於漢之武帝哉惟我仁祖聖度天寬旁招俊乂德望則富弼文彥博威略則韓琦范仲淹諫爭則蔡襄余靖文章則歐陽修蘇軾載在國史不可選紀其後氣脉傳于元祐流風被于淳熙名公巨卿項背相接豐芑數世之仁猗歟盛哉陛下統承三祖寤寐英髦宜得文武名臣以興事造業光于祖宗而環視中外猶若有未滿人意者豈至誠樂與之意未著而翕受敷施之道未廣與臣願陛下恢張聖聽洞闢四門使正氣翕合而野無遺賢何患治功之不成外患之不弭哉雍事暗君言之不行宜也陛下既有取於雍之言故臣敢效雍歷舉祖宗之事以告惟陛下採擇焉臣不勝惓惓度宗時端明殿學士牟濚進王岩叟上哲宗論求賢當去六蔽故事曰臣伏觀自古治世天下之人安樂無事日躋於仁壽之域而不自知者人主清心照理至忱以用賢之效也事莫不有理也心清則理自見天下未嘗無賢也忱至則賢自來恭惟陛下臨政逾年是非不能惑於聽邪正不能亂於前不勞聰明而萬事皆理者心清以照之也陛下勿謂天下之賢盡於此也而得賢之心足勿謂雖有賢者不易致也而求賢之心倦陛下內篤此忱以自厲外敕同德協心之臣以求之臣以謂無不得賢之理然古有六蔽焉不去之則衆賢終不可盡得略有私意則為蔽執偏見則為蔽局於褊心則為蔽喜於附已則為蔽有自賢之心則為蔽簡貴自居而不與物親則為蔽此求賢之所難陛下不可不知也願陛下深詔執政大臣使上同陛下清心至忱之美而警戒六蔽之患則天下之賢無逺邇無隱顯皆將得之為朝廷用以賢繼賢宗社之福生靈之幸與天壤相等矣臣聞堯舜之仁不遍愛人急親賢也孔子謂博施濟衆堯舜其猶病諸蓋天下至大民物至繁聖人安能人人而濟之惟親賢為愛人之本此堯舜之所以急先務也陛下臨御以來詔㫖丁寧與士大夫更始弓旌四出收召正人端士亦既布在朝列矣而寤寐求賢惟日不足親灑宸翰勉諭近臣薦進賢士大哉堯舜之用心也臣竊以為何代不生才何才不用世而薦進人才乃近臣之職分猶待陛下丁寧勉諭耶先皇帝在位四十一年培豐水之芑以為聖子神孫之地至深至厚謂宜隨求隨應隨取隨用何至有人物眇然之嘆耶臣觀王岩叟進言于哲宗皇帝有曰願陛下勿謂天下之賢盡於此也而得賢之心足勿謂有賢不能致也而求賢之心倦而終之以去六蔽以來衆賢岩叟所以勉其君以忱於求賢者猶恐其有所蔽也今聖賢相逢上下同志明白洞達決無所蔽感而必應倡而必和必有推人之有善若已有之之心而為陛下登進人才者賢者之欲得君行道亦猶聖主欲得賢以共治也患不能自達爾舉爾所知爾所不知人其舍諸非陛下望近臣之意乎雖然求賢而不用與不求等用賢而不信與不用等唐李絳有曰賢則當任任則當久賢者中立而寡助舉其類則不肖者怨杜群枉則懷奸者嫉一制度則貴戚毀傷正過失則人主踈忌夫然故用賢豈易事哉絳之言至言也臣願陛下近采岩叟之言逺覽李絳之論其於賢才也心忱求之心忱用之則天下之賢者至矣惟陛下留神元世祖至元中翰林集賢學士程巨夫上奏曰臣聞治天下者必盡天下之才故曰立賢無方曰旁招俊乂若限以方所徴以技藝雖曰用人猶無人也國家既已混一江南南北人才所宜參用而環視中外何寥寥也豈以其踈逺而遂鄙之歟此群臣之私意非陛下至公之度也臣何以知之臣往在江南屢聞眀詔一則曰求好秀才二則曰求好秀才而以好秀才致之陛下者幾何人江南非無士也亦非陛下不喜士也是群臣負陛下也且陛下遣使江南丁寧之曰求好人夫所謂好人者大而可以用於時細而可以驗於事蓋無所不該矣而凡出使者皆昧陋愚淺不達聖見之髙明止以卜相符藥工伎為好人之尤此何謂也不惟不達聖見且使逺方有識之士或以淺窺朝廷臣竊恥之臣之愚陋雖未足以為好人然世所謂好人者儻無則已有則臣必識之江南百餘州之廣袤百餘年之涵飬豈無一二表表當世不負陛下任使者臣奉命而往布宣德意庶幾遇之如得其人以驗臣言則望陛下先試以一職任事使之自卑而髙自難而易小有益則小進之大有功則大用之磨以嵗月自見能否且陛下如用若人則不但愚臣得舉所知而已他時奉命出使者皆知陛下德意將見異人輩出不逺數千里為朝廷用得人之盛視古無愧臣不勝大願謹録奏聞歷代名臣奏議卷一百五十三
