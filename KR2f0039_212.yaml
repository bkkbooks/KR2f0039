body:
  text: 歷代名臣奏議卷二百十二眀楊士竒等撰法令宋哲宗元祐元年御史中丞劉摯論安反側不必降詔劄子曰臣聞朝廷議欲降詔中外慰安人情傳聞二三臣不敢信儻果如此臣實未喻伏見陛下即位以來修先朝政事增損法令進退官吏大要專以安民四方曉知上旨坦然眀白矣至於懷私負釁貴近不赦而忠信之言雖小必録此又人皆能道之臣猶不知國家尚安所疑欲家至而戶曉也若謂日者黜責一二臣僚恐附離黨與不無反側故以詔書安之臣謂人情無甚相逺不從上令而從其意動民以言不若示之以行事自古而然朝廷果將吹毛洗垢搜抉宿過則詔令隨行亦不信今但朝廷罰罪之意出於公議惟責大體不問其餘則雖無所言何患人不知之近者朝廷法令方具功罪眀白吏民安堵自如正宜鎮靖無事而何故自生疑二猥欲望以言語區區過自分説以勝士大夫之心臣恐中外有以窺陛下也前世自漢唐以來因誅鉏叛逆或尅復僭偽危疑之始慮有動搖故亟下詔令慰撫未萌今升黜官吏何時無之何至張皇自生不安之意臣竊以為過矣抑臣聞之人才實難自非大姦大猾懷邪怙終此外安有終身棄置之理古人以功贖過所謂使功不如使過良以此爾前以罪退後以功進是乃國家所以公天下者見之一二則中外將不待言而信矣臣謂安反側計無以尚此何必空言哉伏望睿斷寢降詔之議免四方疑惑以幸天下臣不勝拳拳元祐元年六月二十八日甲寅詔曰朕惟先帝臨御以來講求法度務在寬厚愛物仁民而縉紳之間有不能推原朝廷本意希功掊剋或妄生邊事或連起犴獄積其源流乃知其弊此羣言所以未息朝廷所以懲革也敕振風俗修整紀綱兹大公蓋不得已況罪顯者已正惡巨者已斥則宜蕩滌隱疵闊略細故豈復究治以纍太和夫疾之已甚孔子不為御衆以寬有虞所尚為國之道務全大體應今日以前有涉此事狀者一切不問言者勿復彈劾有司毋得施行各俾自新同歸美俗布告中外體朕意焉摯再論降詔疏曰臣近聞朝廷議欲降詔中外得於傳聞未見本末然竊謂朝廷舉動不可不慎昨已具狀論列今者外議藉藉又異於前大意謂陛下即位以來增損法令進退官吏今已改意自悔故欲下詔委曲解説又深厭臺諫言事故欲止約多士轉相告語且謂自此臣寮雖有罪犯無復憂畏臺諫雖有聞見無復敢言詔令未下人已非議臣備位言路所聞如此不敢不論臣竊謂刑賞豫奪天下公器非茍順人情惟當而已日者朝廷加惠元元取官吏蠧國賊民之尤無狀者顯黜一二以勵其餘此甚大惠陛下其以為當邪未當邪誠以為當則足矣何必家至戶曉自啓疑二之意使忠義自失姦罔幸免臣所未喻也臺諫臣寮類皆踈賤孤寒之人而使以譏切主上彈治貴近為職其勢固已不勝若稍加沮抑且使有誅夷之憂則人人顧私自便誰肯盡言又況聽與不聽上繫朝廷去取大抵欲言十事退思反顧已去五六其言雖上又經裁擇則言而聽者率不過十一二然則朝廷聽言可謂審慎論議雖多言者何罪且臺諫以言為職今若眀出詔令戒使勿言則是豫之官而奪其職為小人之所睥睨輕誚必不能自立相率引去然則言路塞絶誰復以利害之計上聞此又臣所未喻也臣思慮纍晝夜其事甚易見不知為陛下建此計者誰乎臣願陛下深思臣言無忽速賜寢罷降詔之議以安士論若本無此議臣聞之誤妄罪當萬死臣不勝拳拳摯三論降詔疏曰臣近兩具狀奏乞寢罷降詔指揮未知聖旨賜與不賜省察朝士大夫億度風旨轉相傳誦不無非議臣謂降詔本欲安人情而詔令未下事已宣露反使人情疑惑則利害固已可見甚非陛下鎮靜中外之意臣備貟言路此而不論臣則有罪是以不避煩紊願畢其説臣謹按齊桓公與管仲謀伐莒謀未發而聞於國人國人曰君子善謀小人善意臣下竊意之也故朝廷之人不為則已茍有所為雖祕謀密計人且意而知之況陛下已修政事已清人物遂欲闊略細故含垢匿瑕示天下以寬大誠大惠也但此意一定何患人之不知若更施於行事一二則中外喻意坦然洞逹矣何必空言喋喋過自分辨急於取信無乃害國家大體哉詔書大意不過以謂罪惡者已治欲使其餘改行自新恭惟先皇帝養育人材布滿內外其中邪慝不能無之今已行懲勸則是乃所以成就先帝之意若必形於詔書示蕩滌之惠使之自新則似分别前日政事虧損治道無大於此然則人情安與不安乃在陛下立意行事其實何如耳不在降詔詔下之後事體窒礙其害乃至如此臣願陛下深賜省照特罷降詔以全大體臣不勝拳拳摯又論政令疏曰臣聞之銜䇿不調雖造父不能善御法令不一雖有虞不能善治故曰慎乃出令言慎始也又曰令出惟行弗惟反言慎終也聖人制法造令於堂奧之上熟復兢慎若不得已者故其出也天下信之以命則行以禁則止所謂信如四時堅如金石若始之不慎既出而反之則何以示信出而勿反則又將有受其敝者由此言之始既不慎雖欲慎終不可得矣恭惟陛下即位逾年加惠海宇修完政事大要專以便人天下幸甚然纍月以來法令寡信議者竊有疑焉夫法非不善而施行之際使議者致疑此亦不可不察臣謹條列一二以槩見其餘乃者朝廷患免役之敝下詔改復差法天下知之久矣置局設官以議施行之敘天下望之又久矣造法不慎其始施之倉猝故改而立雇募之議繼又為招募之法而法至今不能成也朝廷患常平之敝並用舊制施行曽未纍月復變為青苖之法其後又下詔切責首議之臣而斂散之事至今行之如初此二事大事也四方傾耳拭目以觀盛德之舉而反覆二三雖近侍謀議之臣曽不敢必知法將安出尚何以使天下信之挾銅之禁行之未幾復限以五斤勿禁一開其端則輕重多寡誰復可辨官司固未易家至數之禁而不能止與不禁同大河職事河北轉運司言之則屬轉運司都水言之則歸都水夫二者必有一得則亦必有一失矣此其小事然推此類言之則議者之論安可不察且改之易之誠是耶君子猶以為反令況改易而未必是徒以暴過舉於天下則曷若慎之於始乎今朝廷建一事命一官令已行矣議者必曰此未也且將改之曽未淹久而議者之言果信臣愚未喻朝廷知其不可而姑為之以待改耶不知而偶為之耶始議既粗行之必有抵牾拾遺補過之臣以言為職知而不言則為廢職言而易之則為反令故臣願陛下深詔執政大臣逺慮熟計慎重出令其始既慎度可以必行而後行之則至其終也不可反矣惟陛下加惠留神思之毋忽上以嚴政令下以示信四方又以杜塞異議使無所幸其失今日之治宜莫先此臣不勝拳拳取進止摯又乞修敇令疏曰臣竊以法者天下之大命也先王制法其意使人易避而難犯故至簡至直而足以盡天下之理後世制法惟恐有罪者之或失也故多張綱目而民於是無所措其手足矣世輕世重唯聖人為能變通之祖宗之初法令至約而行之可久其後大較不過十年一變法豈天下之大民物之衆事日益滋則法不可以不密歟臣竊以謂非事多而後法密也殆法繁而後姦生也神宗皇帝逹因革之妙慎重憲禁元豐中命有司編修敕令凡舊載於敕者多移之於令蓋違敕之法重違令之罪輕此足以見神宗皇帝仁厚之德哀矜萬姓欲寬斯人之所犯恩施甚大也而所司不能究宣主德推廣其間乃增多條目離析舊制用一言之偏而立一法因一事之變而生一條其意煩苛其文晦隱不足以該萬物之理達天下之情行之幾時蓋已屢變今所謂續降者每半年一頒每次不減數帙矣夫法者天下之至公也造之而不能通故行之而不能久其理然也又續降多不顯言其所衝改故官司州縣承用從事參差抵牾本末不應非所謂講若畫一通天下之志者也臣愚以謂宜有所加損潤澤之去其繁密合其離散要在簡易明白使民有所避而知所謂遷善逺罪之意伏望聖慈酌時之宜完法之用選擇儒臣一二有經術眀於治體練達民政者將慶歷嘉祐以來舊敕與新敕參照去取略行刪正以成一代之典施之無窮右司諫王巖叟上奏曰臣纍日來風聞陛下欲降詔書以安人心反側則臣不知果有果無然臣既有所聞不可不先事而言以備采擇未審此事出於聖慮邪出於左右者之謀邪出於聖慮則臣以謂陛下私憂過計耳出於左右之謀則臣以謂誤陛下矣自古以來朝廷黜邪退姦亦是常事何須過以為憂反動姦人之心將謂陛下畏之必潛增凶焰隂造禍機傾搖善良窺伺新政矣可不戒哉伏惟陛下即位以來上合天心下從民欲斥逺姦邪奬崇忠直納天下善言而不厭革天下弊事而不疑故能使四夷靖安百姓歌詠以為復見祖宗太平之盛陛下惟當日篤此心隆此道以永社稷無疆之休不宜少移初意也夫姦心抑之且不可止況於進之直言求之且不可得況於沮之長君子而消小人在陛下一言長小人而消君子亦在陛下一言此國家否泰之關而天下治亂之機也陛下不可不深思不可不預防臣恐詔書一出則言之後時故冒犯而先論願陛下納臣愚忠收詔勿下使羣邪自靜以養朝廷之威衆正自安以重國家之勢天下幸甚貼黃稱臣竊思降詔之後老姦宿邪則安矣而忠臣義士必不自安陛下方求天下大治以追祖宗之盛而使忠臣義士不得盡其心非陛下之福也願因臣之言反復思之重此詔書之發幸甚舜去四凶當時四凶之黨不應無人尚在中外未聞下詔安四凶之黨也臣自風聞下詔寢食不復自安心料陛下畏見多言故有此指揮不知令臣今後如何居職有言則犯令不言則負恩進退之間未知所處幸陛下察之無誤此舉言事官當忠於主上公於天下是為稱職忠則不肯立朋黨故言無所隱公則不敢任喜怒故言無所欺或朋邪罔上或意在報私或厚誣其人或以訐為直或隂懷顧忌則陛下當深察其情罷之則可也竄黜之則可也以約束一切閉其言則不可也如果有詔書即望陛下采納臣言只作聖意取入禁中以安言路之心巖叟又上奏曰臣自風聞朝廷欲降詔書安慰縉紳之心雖兩上章論奏不便以聞之未審故言未詳臣今頗得大槩信如所聞甚可怪也事有大不可者三陛下豈容易而發竊知其間敘列先朝縉紳之惡無所不有雖云臣下所為然於先帝之眀如何也陛下下詔之善意本在掩蓋前事不知反所以彰先帝之失此大不可一也陛下即位以來未嘗以喜怒愛憎妄責一人凡有所行必本天下公議大姦大惡不得已而黜者又曲從寬恕百分罪惡不過行一二分而已何有大甚之事今聞詔行疾之已甚之語如是則是陛下臨御以來所行之事皆為過當反成自誣以傷國家之體此大不可二也姦人誑惑陛下張大其事言人心反側故致陛下有下詔之意陛下何不自察今天下生靈之心安與不安何如往前今天下生靈之心所以安只因陛下眀辨邪正黜去欺君罔上之人數輩耳復見陛下姑息此曹未測將來之好惡則天下之心將疑而搖矣陛下之意雖以安罪惡不知反所以動天下之心此大不可三也陛下下詔未見一利而有大不可者三何可為哉臣非故敢逆陛下之情也蓋欲以惜朝廷之舉動全吾君之盛美耳夫為國之道惟渾然深厚示以無心泯迹言語之間使天下君子小人皆不可得而議乃為清寧之本也何為自生疑心無故下詔使天下可得而窺可得而議哉臣恐益為紛紛不能成清寧之治誤陛下初心爾願陛下拂除姦人先入之言省察愚臣繼進之説或蒙聖心曠然一賜開納臣今夕即死無所恨矣惟陛下憐其愚幸甚侍御史林旦上奏曰臣近者風聞朝廷欲降詔書戒約言事官不宜疾惡太甚動搖人心初聞之以謂此妄意朝廷之言耳殊不以為信既而傳者益衆不能不以為疑竊惟陛下臨政以還虛已聽納招徠讜言四方之人孰不欣戴此實宗廟社稷之福也今方踰嵗若遂厭言有詔戒止凡傾耳以聽企足以望者得不解體耶此必有造謀以誤陛下者臣度其意不過兩端而已一則務為姑息以掠譽於小人一則持此自獻謂能不謗於先帝夫有國之要道在於使君子道長小人道消而已君子道長則德澤日被於天下而為朝廷之福小人道消則疾苦不加於百姓而得四方之心豈有為民除去疾苦而反致人心之不安也若此則虞舜不當放四凶孔子不當誅少正卯矣聖人於殘賊不仁之人殺之而不疑今朝廷寬大眀正其罪惡不過慰塞人望量其官職隆其差遣而已何損於其身何愧於天下而便致人心不安也此等小人本無愛君利民之心人疾之久矣又何足矜恤而更姑息之此甚倒置也且先帝聰眀睿知憂勤庶政不愛髙爵重祿而與士大夫共之乃望其盡忠竭誠以報稱其恩寵也彼乃結黨相因公肆欺侮醜穢慘虐無所不至使上之人雖有良法美意而澤不下流隂受小民之怨望其負國罔上之罪何可勝誅也向日執政之臣言事之官目擊耳聞不肯以告故使朝廷未正其罪今罪惡悉已暴露而朝廷終不忍深誅而顯戮之雖有貶降亦只是奉行先帝聖意譴斥不忠不良之人且示天下以前日失當之事自各有建言之人奉行之吏非出於先帝之本意也如此豈得為謗先帝乎大凡言事之官招仇觸怨豈所欲為朝廷過奬借之猶有畏懼觀望而不肯盡言者況又有所沮抑之則彼安肯奮不顧身以輸忠於陛下乎臣竊恐由此遂使亮直之人反為羣小指笑玩侮心懷畏避而不得安其位矣若其言事彈擊不實喜怒任情朝廷摘示羣衆罷之可也竄之可也但不當泛下一詔均沮遏之耳今日朝廷正恐姦邪乘間作過惟藉耳目之官防察糾正若自為壅蔽以啓小人之幸則此後執政大臣欲進擬前日不忠不良罪慝顯著之人置在要近誤朝廷委任遂有以藉口而鉗閉臺諫官之言矣此甚非計之得也臣不敢耻過作非而重於立位止是愛惜國體恐天下之人誤認朝廷之意而起疑惑觀望之心爾利害所繫不少願陛下謹之重之右正言朱光庭上言曰臣竊惟王者出號施令示天下之大信唯其合皇極之道上參天心下順物理使四海內外聞之欣躍鼓舞咸曰大哉王言故書載詩歌足以為世法蓋以至公至正而然也伏自陛下臨御以來天下之人上自公卿下逮民庶稱頌陛下之德謂厯古以來未見如此之公未見如此之眀故君子有以伸其直小人不得肆其罔而又信任俊哲放去姦回朝廷清眀日就太平臣前日風聞朝廷將欲降詔慰安小人臣竊以謂剛陽之氣常在於生扶持保祐唯恐其不長隂邪之氣常在於殺消除殄滅唯恐其不盡夫剛陽則君子之道也陛下今日固進君子矣然扶持保祐願陛下加意焉隂邪小人之道也陛下今日固退小人矣然消除殄滅願陛下致力焉如此則天下常泰而不否矣臣竊聞將下詔書條列事目慰安姦邪之人今後更置而不問在聖度含洪則善然使姦邪之人有以增氣臣謂此詔不須頒下恐天下之人適足有以窺陛下臣愚不肖荷陛下盛德之遇今日有所懷不敢不竭盡於旒扆之前願陛下睿斷特賜追寢前詔更不頒行臣愚不勝拳拳右正言王覿上奏曰臣伏聞近者朝廷以放黜一二大姦十數巨蠧恐人情不安將下詔書以安之又將戒言事官凡臣寮舊惡不得復言臣固未詳其虛實誠出於此臣恐四方有識之士輕議朝廷也其狀於今月三日投進訖臣今又聞詔書有言者勿得彈劾有司毋得施行之戒竊以為過矣夫為陛下之耳目者言事官也為陛下之股肱者有司也小人情偽萬狀宿惡舊姦初多隱伏幸而發露著見則言事官論之有司行之然後小人不得大肆而朝廷清眀陛下可以無為而治矣蓋小人之宿惡舊姦發露著見而言事官鉗口而不得言有司束手而不得治則小人肆行而無所憚矣使小人肆行而無所憚則欺君壞法蠧民害物者蜂起鱗集而爭奮矣朝廷尚安得清眀陛下尚安得無為而治哉或言事官忠憤而違詔以舉職有司疾惡而違詔以行法則陛下之詔書乃成虛設言事官有司之違詔者亦不為無罪又須按治則綱紀紊亂賢不肖混淆而意外之憂智者有所不能謀賢者有所不能救以夫君子小人勢不兩立而迭為盛衰者也故在易君子道長小人道消則為泰小人道長君子道消則為否夫否泰者君子小人消長之間也今朝廷優恤小人而使言者勿復彈劾有司毋得施行是乃抑君子而長小人嵗月之間邪黨漸勝天下不幾於否乎昔帝舜雖臨下以簡御衆以寬孔子雖謂人而不仁疾之已甚亂也亦未嘗聞箝言者之口而使不得言小人之姦廢有司之職而使不得治小人之惡也今陛下必欲下寬大之詔以安羣小之情則惟用闊略細故以諭之可矣何至壞朝廷之紀綱使小人舊姦宿惡之發露著見者其事狀雖涉於罔上然亦一切不問而言者勿復彈劾有司毋得施行以為小人之資也伏望聖慈審繹之熟講之謹於出令無為異日之患天下幸甚貼黃臣待罪諫官專以論議政事為職朝廷進賢退不肖乃政事之大者也凡論人之賢不肖須以素履及已試之事驗之方可信據孔子曰吾於人也誰毁誰譽如有所譽其有所試矣雖譽之猶當以其已試之事況彈劾哉然則今日以往奉詔之後若論及臣寮之素履及其已試之事則不犯詔禁者少矣奉詔愈謹則諫官御史愈成虛設故臣知詔書中言者勿復彈劾有司毋得施行之語尤不可以宣示中外也貼黃借如臣寮或處權要今日以前嘗有罔上之罪今日以後方乃發露論罪則可録論詔則不可言居言責者守詔而不言則坐視侍從權要之地有罔上之人將為天下之大患違詔而進説則不惟廢朝廷之詔令而又將得違詔之罪進退猶豫而不能決則遂至於天下雷同而姦凶得志矣陛下如何處之言事官每月論列動觸權貴之怒豈若不言之安但不敢輒為身謀以誤陛下而已深恐詔令輕出之後不可追改竊聞詔書今尚未下惟聖慈詳酌二年刑部侍郎范百祿上奏曰臣竊以堯舜大典罪疑惟輕至周之時刑疑則從罰罰疑則從赦漢詔獄疑者讞有司不能決下廷尉令敕所謂刑名疑慮者蓋本乎此書稱宥過無大周官以三刺三赦三宥之法求民情斷民中而施上服下服之罪原情定辟冀有以生之不得已焉然後刑殺令敕所謂情理可憫者亦出乎此祖宗立法以此為輕重賞罰之權以此為人主好生之德但令有司審謹罪罰必當不妄貸凶暴當誅之人則為善矣故熙寧敕云如非疑慮可憫而輒奏者免駮勘此正合於漢詔所謂有合讞而後不當讞者不為失之意至元豐則已刪去上件與免駮勘之文中間雖曾申眀然敕意終是未備至於去年十一月二十四日敕則云不得一槩將舊例貸配仍委三省點檢如有不當許用例破條奏乞取勘施行本部自承準著令已來每擬斷大辟固不敢一槩用例貸配然官吏上下自非眀恕不惑鮮不顧避點檢畏懼奏勘故罪案條法雖在疑慮可憫之間稍不灼然眀白則往往入重不憚論殺以茍逭一時之責兼不任看詳得其間疑慮可憫者屢以批退故從依斷以此比之已前年分大辟論殺分數為多仍訪聞比來在外諸州知有此約束亦頗承望風旨不敢奏讞死刑臣愚以為上件著令雖革得往時用例破條之弊不失有罪之人深恐行之積年將見其間罪人必有當輕而重者不少矣甚違寧失不經之義殆非朝廷好生之德謹具録熙寧元豐敕并去年十一月二十四日敕條及元豐六年以後并自降去年敕條指揮後來十箇月斷貸過大辟分數繳連進呈伏望聖慈特賜詳酌指揮下有司覆詳去年十一月二十四日條貫參用熙寧元豐敕意重别刪修立法庶使平國之刑協于中正天下幸甚四年戶部侍郎蘇轍論侯稱少欠酒課以抵當子利充填疏曰臣竊見今月二十二日敕滑州韋城縣百姓侯稱少欠酒務課利等錢特許將子利並充欠數已拘收抵當契書依舊在官仍許納錢收贖所欠課利等錢與均作七年送納仍免差人監催餘人不得援例臣竊以民間欠負合催合放皆有條法上下共守凡有寬貸皆先經戶部勘當於法無礙然後施行未有如侯稱之比直自朝廷批下聖旨更不問條法可否一面行下仍令衆人不得援例者本部官吏皆竊疑怪不敢奉行深恐此令一行應干欠負之家皆懷不平之意已具狀申尚書省乞朝廷裁酌施行去訖臣今竊聞侯稱係皇太妃親戚二聖篤於恩愛特為降此指揮踈賤之臣不當更有論奏然臣職在右曹專掌坊場法度祖宗條約當與天下共之不宜以宫禁之私輒有撓敗臣恐此門一啓宫中遞相扳援其漸可畏臣若失職不舉其罪大矣竊惟皇太妃供養二宫動循禮法外廷雖踈未聞有過差之事今侯稱所欠不過萬數千緡耳若以私親之故出捐金帛以濟其急下足以存骨肉之恩上足以全祖宗之法天下傳誦無復間言公法既完國勢增重其於太妃盛德亦非小補也臣不勝區區守法愛君之心欲乞追還前命使天下眀知朝廷不以私愛害公義干冒鈇鉞俯伏待罪御史中丞李常論內降乞有司執奏疏曰臣愚不佞熙寧中常預編中書條例伏見仁宗皇帝屢詔中書欲令內降三省執奏及未得便令行下如此之類指揮不一臣方是時竊怪詔旨重復如此細詳仁宗聖意蓋為非時內降亦有不得已而出者正賴臣寮執持覆奏以拒止之也又竊見杜衍為宰相凡內降積至十數連封而面還之仁宗嘗謂諫官歐陽修曰外人只知杜衍封還內降吾居禁中有求恩澤者每以杜衍不可告之而止者多於所封還也其助我多矣伏以太皇太后陛下皇帝陛下臨御以來內降恩澤幾於屏絶一以至公待天下未嘗以私恩加親黨內外臣庶之所共知而歌詠矣近日李倬乞買白地事臣竊料陛下以白地為小事或不得已而許之事無小大孰為得已要在有司執守法度如杜衍之事仁宗可也臣愚以謂遇人以恩者人主之事也守法盡公者人臣之事也人主之恩有不得已而降旨臣下可不守法度而執奏耶買白地事曾不聞反覆執奏而遽行之曾不根究為何地而遂不省察也今據僧人所陳乃有墳墓及竹木園菜圃李倬妄以為白地固當深治凡今後可不務於懲止哉伏望聖慈特詔有司應內降並須反覆執奏或理當奉行必先取索圓備詳究可否於詔條無害於物情無妨乃得行下如此則人主之恩自全而臣下獨當執守之責矣五年翰林學士承旨蘇頌論省曹寺監法令繁密疏曰臣聞在昔帝王之發號出令也必因時而施宜視俗而興化時朴野則濟之以文俗雕偽則示之以質隨變所適使民宜之故能久於其道而天下化成質文損益百世可知也國家剗五季之弊續有唐之緒纍聖創制或革或因其道粲然於是大備仁宗皇帝以承平日久事多因循曠然有改作之志故開廣言路整緝治綱至於先皇帝遂大有為臺閣之務無所不舉然而事目寖廣法令亦繁陛下臨御之初深知其故推原先志稍加裁損數年之間講眀備至而法令之繁尚未盡革何以言之先皇帝改定官制本欲憲章百王歸於簡要而奉行之際羣臣不能究宣上旨各務便文事有未詳更復立法積久不已遂致滋彰故今日之弊良由關防傷於太密而畫一傷於太煩則難於通融蓋省臺寺監萬務所萃置長立二承之以僚屬所以裁處事務助成至治也而官不任職每事立條事務日新欲以有司之文而盡天下之務雖使臯陶制法蕭何造律勢不能遍況百司所職條目不同而一司之間又有細務或通於此而礙於彼故有求之人不能悉曉遂至紛爭或經臺省投牒披訴文移往復虛煩取會其可行者百無一二徒長奔競無益風教夫關防密則有司執文重疊問難小或違戾遂格而不行使有求者抑塞而不舒妄訴者牽制而不斷近者陛下特軫宸𠂻將革其弊故丁酉詔書分命近臣抽索文案看詳點檢內有拘文害事不近人情者許并元條刪改詔意如此可謂察見事情大慰羣望然而行移彌月取索甚多比至定奪上省竟以有礙他條不能盡如詔書之意誠由關防太密之所致耳拘礙如此亦可以謂之弊矣誠能少損其文致而濟之以忠厚則三代循環之政亦不過此臣愚欲望聖慈特詔近臣遍行取索應省曹寺監見用條制格式仍召集諸司官吏使之反復詰問看詳定奪可刪者刪之可改者改之擇其要切者著為新令務從簡易使便於施用其餘令式所不能者小事則從省曹長官專決大事則稟於朝廷簿書期會悉付衆僚催督結絶若官司措置失當及徇私廢公致有赴訴並委臺察糾案如得實狀其當職官吏次第書罰有涉欺妄亦行懲責如此則臺閣規模有宏逺之致朝廷法度循簡易之規矣八年尚書右丞梁燾上奏曰陛下必欲命令堅眀莫若謹於更張審於施設無以淺事輒廢逺慮無以辨言輕動成法蓋條法頻改則人情惑而不安命令二三則主威玩不重凡造令立事必先謀於大臣使之講究雖大臣以為是亦未可也又行於百官使之合議須羣臣皆以為是議論詳熟曲盡人情而不疑也然後可以行之一定而不可復變必使中外上下謹守敬信如日星之粲然可仰也書曰敬乃攸司謹乃出令令出惟行弗惟反謂作命所以示信於天下必謹之於初既行而不可改也又曰慮善以動動惟厥時謂不善不時者不可輕舉也紹聖三年殿中侍御史陳次升論敕榜當取信天下劄子曰臣伏覩紹聖元年七月十九日責降吕大防等敕榜節文云至於射利之徒脅肩成市盍從申警俾革回邪推豫不忍之仁開爾自新之路除已行責降外其餘一切不問議者亦勿復言當是之時朝命初下萬口一辭歡呼鼓舞歌頌聖君含垢溥博如天包容如地不以一眚廢人此盛德之事也天下人心恬然安定近者竊見汪浹李仲送吏部與合入差遣録黃行下緣元祐所獻文字得罪則前件敕榜有其餘一切不問之語殆成虛文將何以取信天下傳曰王言如絲其出如綸王言如綸其出如綍言其已行而不可反也況夫揭榜朝堂遍牒中外眀示臣庶俾懷悛革自新之心行之未幾今乃録下浹等得罪之由又如此臣恐虧朝廷號令之信有傷國體伏望睿旨檢會前件敕榜宣示大臣自今已始同共遵守庶使人無反側之心亦所以彰朝廷忠厚之德次升又乞罷編元祐章疏奏曰臣近奏乞宣諭大臣遵守敕榜其餘一切不問之語未見施行今聞差官編排元祐間臣寮章疏仍厚賞以告藏匿採之輿議實有未安須至再瀆天聽臣嘗讀史觀漢光武誅王郎收文書得吏人與郎交關毁謗數千章光武不省會諸將軍燒之曰令反側子自安當時以此遂定天下後世書之以為美談共惟陛下即政之初詔令天下言事親政以來揭榜許其自新是亦光武安反側之意今又張官置局吹毛求疵考人一言之失致於有過之地是前之詔令乃所以誤天下也後之敕榜又所以誑天下也命令如此何以示信於人乎昔成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚請擇日立叔虞王曰吾與之戲耳史佚曰天子無戲言於是封叔虞於唐夫成王非輕其爵命也以王言惟行弗惟反爾矧今御史臺榜示朝堂進奏院遍牒天下惟患人之不知非特戲言而已戲言尚踐而行之豈有眀揭榜示曉諭臣庶可反之乎伏望聖慈念光武安反側之言思成王遂削桐之封所有編排章疏指揮乞行寢罷哲宗時中書舍人范純仁論朱宿梁二不當貸命上奏曰門下省送到奏案朱宿為殺親舅梁二為殺妻父録黃二道本省元奏依法已得御寶畫可今却準門下省批到奉聖旨送中書省取旨朱宿梁二各特貸命決脊杖二十刺面配沙門島收管今來本省合依聖旨取旨又緣却已有貸配逐人沙門島指揮即不是中書省進擬本省未敢行下合行覆奏及有難貸情理具畫一下項一凡人投鼠猶或忌器豈有殺舅不顧母憂今母之兄弟可殺則父之兄弟固亦無難觀朱宿犯上之情亦必有以致母不能安室之事其舅見而回避必是諳其所為尚猶尋逐持杖擊其腦而殺之不惟全無渭陽之情亦異夫七子自責之意及無敬親不敢慢人之心此事雖不可以盡責愚人然朝廷亦當示好惡風教以全民之天性今乃特貸其死以示優恩甚非用中化民之道一據律節文祖父母父母為人毆擊而子孫即毆擊之至死者並依常律然則古人立法豈不知救父母為可貸蓋不欲使民專殺而亂治也今非毆而止拽其衣袖便敢擊折足脛而殺之乃得貸死全與人情法意相逺在於凡人猶可況於妻父尤難屈法門下省以謂梁二固宜處死以其能忘妻父之愛情理灼然可憫臣以謂天下之治本於人倫人倫之先本於夫婦伉儷敵體其合以義所以古人刑于寡妻不敢失於臣妾妻子故得人之歡心以事其親今使男子殺其妻之父易若雞犬則或婦人為其父母而殺其夫及夫之父母亦皆合為可憫一親屬相犯於國家風教不便父子兄弟夫婦各有典常其情各須篤厚今夫婦相殺骨肉相殘比陛下即位之初嵗嵗有增今數已過倍若不稍示禁約則將來此類更多何由使朝廷致比屋可封之治一刑罰平當則下無寃人或有幽寃必傷天地之和氣古者匹夫銜寃六月降霜所以朝廷深戒官吏眀慎用刑恐有寃也今乃縱百姓專殺平人特貸其死使死者怨憤不雪致干隂陽之和為水旱之災延於億兆臣職居調燮不敢不盡其言凡今檢到斷例與臣所陳情犯義理不同雖有近似者亦是當時偶有失當難為準用若更添今來二人貸死之例則今後如此行凶之人鮮有可正典刑者一朝廷緩一死刑須當有所勸沮不可無名曲貸使有罪獲免無罪銜寃今特貸此二人使天下不知所謂是欲使今後人子皆得如此為父母而殺人耶又欲勸夫婦之間恩義當薄耶但見不恤死者之寃而寬凶惡之人耳於風教人情皆為未便緣臣今所開陳非止為正二人刑名蓋有前項所繫風教利害朝廷好惡及為寃氣致災之本所以須至執奏自來朝廷命令或有舍人繳奏或門下省封駮若道理别無不當即蒙聖旨令依元降指揮其朱宿梁二欲依本省已得指揮殿中侍御史吕陶上奏曰臣等伏見朝廷差安燾知樞密院給事中以為不當駮正封還陛下未信其言遂不送本官書讀施行臣等竊為朝廷惜之夫安燾之才不才差除之當與否自有天下之公論臣皆置而未議所惜者朝廷之法度爾且三省之設事相表裏勢相始終凡命令之出先自中書省一人宣之一人奉之一人行之次由門下省一人讀之一人省之一人審之茍有未當則許駮正然後由尚書省受付施行紀綱程式其密如此蓋以出命令而尊國體也或闕其一則於制敕不為完文中外難以取信近日除吕公著為門下侍郎不由本省而下給事中范純仁力辨其事是也夫國家所以維持四海而傳之萬世者惟守法度而已況當陛下諒暗之日簾聽之時正宜謹守法度不可毫釐差失今安燾之命不送給事中書讀施行乃是封駮一職遂為虛設制敕不完命令不重而法度不存矣斜封授官恐漸於此臣等所以為朝廷深惜也臣等竊度聖意必謂已行之命難於追改且失序遷則是一舉而兩失矣為安燾者豈可受不完之制敕而處具瞻之地哉莫若因其辭免寢罷新命則君臣之際授受皆得其宜而法度不廢也況朝廷差除因臣下辭免或臺諫論奏而罷與改者多矣豈得於燾獨不改伏望聖慈追還安燾告命及詳覽臣等論列安燾文字别降指揮施行陶又乞應赦文放欠官司不施行者許民庶實封論奏疏曰臣竊以國家覃布赦令與民休息若雷霆之震驚雨露之潤濯窮幽極逺皆欲使之生成茂遂而無一夫不獲之嘆然而四方萬里之廣監司郡縣或非其人不能深體朝廷德意往往廢格詔令沮止惠澤大抵上通之則下塞上與之則下奪所以民間逋負多不蠲放渙汗之令遂為虛文嗟痛之聲聞於治世頃年瀘州用兵之後民力凋耗曲赦放稅苖時中妄有奏請加意斂督近日眀堂禮成天施浩蕩大蠲逋欠蒲宗閔不恤困窮公為抑遏細民既無告訴朝廷何由聞知昔唐文宗開成肆赦放釋逋負宰相鄭覃李石恐姦吏不能奉行乞內置一本以時觀覽蓋亦深防沮遏之弊向者英宗皇帝郊祀降赦欠負非侵盜者皆除放而詳定所謂須十分納及三分方以赦除錢眀逸以為言英皇即詔如赦令盡除之乃知有司之吝非今日矣聖主重民固宜深察臣愚伏請特降睿旨眀詔中外應赦文放欠官司不為施行者許民庶實封聞奏所屬不得留滯庶使刻薄之吏少知警畏憔悴之民盡蒙惠養陶又奏乞早降私使役人條法事疏曰臣竊以人之情偽無窮而國家之法令有限以有限之法令防無窮之情偽則固不能周盡及其弊從而生則必曲折委細事為之制而濟之庶幾詳密備具行之可久理勢宜如此也昔嘉祐之差役務從寬厚而條禁太略貪吏猾胥幸農夫之在官而鋭意侵漁害端百出人甚苦之至熙寧之免役止令出錢官為雇募凡所謂侵漁於農夫者一切有禁毫釐不敢違縱然而有司斂入過重民間錢貨遂至乏絶陛下深恤元元復行差法以救其弊因時設施一出仁厚天下幸矣臣愚以謂法不相須則惠有未至既以嘉祐之制差之而不以熙寧之令禁之則雖無近年出錢之勞復有昔日應役之害今推行差法將及一年其約束條貫猶未頒下四方郡縣愚夫俗吏意謂朝廷務行寬大之政既許差役則其他細故不復檢察坐視役者已萌貪心委使將迎動涉侵擾若不早立憲度力行禁約則農民漸見受弊伏請申命有司嚴責期限不候諸路役帳齊足疾速裁定使役人條制先次頒行以完差役之法右正言劉安世論命令數易疏曰臣嘗考載籍以推先王之道雖禮樂刑政號為治具而所以行之者特在於命令而已昔之善觀人之國者不視其勢之盛衰而先察其令之弛張未論其政之醇疵而先審其令之繁簡惟其慮之既熟謀之已臧發之不妄而持以必行則堅如金石信如四時敷天之下莫不傾耳承聽聳動厭服此聖人所恃以鼓舞萬民之術也書曰慎乃出令令出惟行弗惟反易曰渙汗其大號傳曰令重則君尊又曰國之安危在出令凡此皆聖人慎重之意也臣伏見朝廷命令變易頻數逺不過一二嵗近或期月而已甚者朝行而夕改亦有前詔未頒而後令蠲除者吏不知所守民不知所從求其弊原蓋由講議未精思慮未審人情有所未盡事理有所未通或牽於好惡之私或溺於迎合之説是非無所辨取舍無所宗故一人言之而遽為之紛更也方平居無事之時輕嫚多變之如此緩急有事之際何以取信於人伏望聖慈深鑒前古之戒謹為今日之慮至於法度之廢置政事之因革必使大臣公心協謀博極利病廣覽詳擇務當義理更其所可更則不嫌於違俗守其所可守則無憚於襲故申敕門下無使徒為審讀以應故事其有措置失當前後謬戾者必舉封駮之職庶幾詔令清簡吏民信服事可久行不致反汗丁隲奏請下御史臺體訪小人造作謗議疏曰臣竊聞近有小人多興謗議密相傳報驚動中外之聽或虛稱朝廷升黜臣寮或妄言臺諫官非意彈斥百官或文致姦言以厚誣近臣或造為惡名以玷辱多士如五鬼十物之類是也其實出於被罪流落之人私挾喜怒隂遣子弟門人出入朋比互為聲援上則欲惑亂君臣以成疑似之禍下則欲離間同心轉相猜忌以隳久大之業此其用意豈淺哉不可不察也昔唐穆宗之時有八關十六子之説為後世譏笑今二聖居上區别善惡進賢退不肖元首股肱夙夜孜孜勵精求治惟恐不及非有穆宗之時八關十六子之事而姦幸者猶能巧作飛語公然喧播自京師以逹四方扇搖流俗為害不細不於此時痛行禁止則恐浸以成俗傷薄風化臣切憂之伏願陛下特降睿旨下御史臺體訪其主名附之吏議置於典法以消讒邪橫逆之黨天下幸甚徽宗時中書舍人曾肇論內降指揮不可直付有司疏曰臣伏見陛下即位以來更張政事除民疾苦開廣言路收拔滯淹每一政令之出內外無不歡呼相慶以至未眀求衣辨色臨朝躬親聽斷夙夜不懈推今日欲治之心為之不已太平之功指日可待然臣竊有所見不敢緘默臣待罪右省伏覩內中時有批降指揮除付三省樞密院外亦有直付有司者雖陛下睿眀必無過舉然忖之事體終有未安蓋帝王號令不可輕出必經中書參議門下審駮乃付尚書省施行不經三省施行者自昔謂之斜封墨敕非盛世之事神宗皇帝正三省官名其意在此臣愚伏願陛下凡有指揮須付三省樞密院施行更不直付有司以正國體其三省樞密院若奉內中批降指揮亦須將前後敕令相參審度可否然後行下不可但務急速奉行以為稱職蓋三省樞密院皆執政大臣陛下委以平章政事之人其任非輕不同胥吏但以奉行文書為事帝王號令務要簡大若夫立法輕重委曲關防皆有司之職非人主之務書曰文王罔攸兼于庶言庶獄庶慎惟有司之牧夫蓋謂此也至於內外臣寮干求內降恩澤侵紊綱紀增長僥幸以陛下眀聖必不容許臣亦不復以為言更願陛下戒之謹之嚴行杜絶無使小人乘間得入天下幸甚肇為翰林學士乞下詔禁絶干求內降疏曰臣伏見仁宗皇帝在位四十二年屢下詔書約束臣下干求內降令中書樞密院如內降與臣寮遷官及差遣者並具條執奏以聞推劾干請之人眀正其罪下御史臺閣門榜諭仍著為法皇祐二年因祀眀堂肆赦嘗諭輔臣曰比有貴戚近習夤緣請託以圖內降雖頗抑絶然未免時有侵撓可於赦文中禁止之庶澄清宿弊示信天下時輔臣對以載之赦條恐未盡聖意乃别為手詔與赦書同降蓋仁宗之仁如天於人之欲有不能違然一切徇情則侵紊紀綱虧損刑政故令執政大臣具條執奏人主致恩人臣守義上下維持交相警戒又令推劾干請之人眀正其罪則人自不敢因緣請託故一時朝廷號令肅清間有干請之人輒為諌官御史所劾仁宗雖有不忍人之心而終不至於優柔牽制者其術蓋出於此也恭惟陛下天姿寬仁正身率下論者謂有仁宗之德夫寬則無所不容仁則有所不忍臣愚竊慮內外之人因此有干祈陛下雖正身於上而迫於請禱無以却之執政大臣又或不能一一執奏日積一日則侵紊紀綱虧損刑政其為禍患有不可勝言者矣臣愚伏願陛下監觀仁宗所以防制左右杜絶恩幸之意特下詔書戒飭內外之人不得干求內降如有內降旨揮非憲章所存者令執政大臣具條執奏推劾干請之人眀正其罪仍責諫官御史常加覺察榜諭朝堂著之於法使內外眀知聖意所在如此則聖治日新朝無粃政小人安分於私室請謁不行於公家以成陛下寬仁之德以稱陛下正身率下之意垂之萬世貽訓子孫豈惟天下之幸實社稷無疆之福也惟陛下裁擇右正言任伯雨上奏曰臣聞外議皆言近日內降頗多下至僧人恩澤開封府大理寺所勘公事往往旨揮釋放此言虛實雖未可必萬一果有而陛下不知則九重深逺詐傳敕命俯仰之間所繫不輕若止因左右懇求陛下寬仁不得已重違其意則干亂政刑此風不可滋長且鴻都賣爵墨敕斜封皆出漢唐季世不可不戒昔仁宗慶歷亦嘗有之宰相杜衍不肯奉行每積至數十即面繳納仁宗嘗謂侍臣曰外人秖知杜衍封還內降不知朕以衍不肯而拒之者過於封還也又嘗內降開封府吏扈玉遷職一等尚美人遣內侍韓從禮傳教旨免工人市籍府判龎籍奏其事仁宗立命杖韓從禮詔今後內降無得輒受以此觀之所司守法自當執奏臣伏願陛下降臣劄子付三省樞密院指揮所屬去處今後內降無得輒受此亦仁宗皇帝故事如此則僥幸干求庶幾息矣伯雨又上奏曰臣風聞內苑作工匠盜所結真珠事敗有旨更不得治監官醫官院人力懷刃為盜捕獲有旨不得問經由門戶中外聞之莫不撫髀駭歎頓足寒心皆謂陛下誤以為小事竊以監官之設本為監臨主守司閽之設本為機察出入今珠璣至貴之物失至數萬匹夫挾刃入數重門如涉無人之境皆非小事不止因循乃一切赦之後來更有犯者陛下不赦之則罪同罰異人人皆怨陛下又赦之則事事廢法紀綱遂壞雖有監官司閽將何用也且宫禁之門法最嚴密周官小宰治宫禁之法獨有大刑在律亦宫禁之法為最重蓋聖人立法之意防慮幾微謹備不測以嚴衛一人今陛下多愛不忍幾於姑息廢萬世之成憲棄祖宗之大法紀綱不立左右恃恩廢弛積日纍月事體陵遲忽有不測之虞誰復知所職守陛下豈不為宗廟社稷自重乎臣伏願陛下罷前降指揮敕有司依法律推治干繫所貴人人盡心各知職守不至弛玩以産禍亂則宗廟之休社稷之福也歷代名臣奏議卷二百十二
