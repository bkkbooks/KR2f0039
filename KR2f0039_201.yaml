body:
  text: 歷代名臣奏議卷二百一明楊士竒等撰聽言衛侯言計非是群臣和者如出一口時孔伋居衛乃言於衛侯曰君之國事將日非矣公曰何故伋曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣臣下同聲賢之賢之則順而有福矯之則逆而有祻如此則善安從生詩曰具曰豫智誰知烏之雌雄抑亦似君之君臣乎齊景公至自田晏子侍於遄臺于猶馳而造焉公曰唯據與我和乎晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平􅎦嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是景公正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而不朝晏子睹裔敖而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人出正閨刖跪擊其馬而反之曰爾非吾君也公慙而反不果出是以不朝晏子入見公曰昔者寡人有罪被髮乘六馬以出正閨刖跪擊其馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮於刖跪以辱社稷吾猶可以齊於諸侯乎晏子對曰君無惡焉臣聞之下無直辭上無隱君民多諱言君有驕行古者明君在上下有直辭君上好善民無諱言今君失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可於是令刖跪倍資無正時朝無事晏子復於景公曰朝居嚴乎公曰朝居嚴則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害國家如何也且合菽粟之微以滿倉廩合疏縷之緯以成幃幕太山之高非一石也纍卑然後高也夫治天下者非一士之言也固有受而不用惡有距而不入者哉楚靈王虐白公子張驟諌王患之謂史老曰吾欲已子張之諫若何對曰用之實難已之易矣若諌君則曰余左執鬼中右執殤宫中身也禮記曰退然夭死曰殤殤宫殤之居也執謂把其録籍制服其身知其居處也凡百針諫吾盡聞之矣寧聞他言白公又諌王如史老之言對曰昔殷武丁能聳其德至于神明以入于河自河徂亳於是乎三年默以思道卿士患之曰王言以出令也若不言是無所禀令也武丁於是作書曰以余正四方余恐德之不類兹故不言如是而又使以象旁求四方之賢聖得傅說以來升以為公而使朝夕規諫曰若金用汝作礪若濟川用汝作舟楫若大旱用汝作霖雨啓乃心沃朕心若藥不瞑眩厥疾不瘳若跣不視地厥足用傷若武丁之神明也其聖之睿廣也其知之不疚也猶謂未乂故三年默以思道既得道猶不敢專制使以象旁求聖人既得以為輔又恐其荒失遺忘故使朝夕規誨針諫曰必交修余無余棄也今君或者未及武丁而惡規諫者不亦難乎齊桓晉文皆非嗣也還軫諸侯不敢淫佚心類德音以得有國近臣諫遠臣謗輿人誦以自誥也是以其入也四封不備一同而至於有畿甸以屬諸侯至於今為令君桓文皆然君不度憂於二令君而欲自逸也無乃不可乎周詩有曰弗躬弗親庶民弗信臣懼民之不信君也故不敢不言不然何急其以言取罪也王病之曰子復語不穀雖不能用吾憖置之耳對曰賴君之用也故言不然巴浦之犀犛兕象其可盡乎其又以規為瑱也遂趨而退歸莊王立為君三年不聽朝乃令於國曰寡人惡為人臣而遽諫其君者今寡人有國家立社稷有諫則死無赦蘇從曰處君之髙爵食君之厚祿愛其死而不諫其君則非忠臣也乃入諫莊王立鼓鐘之間左伏楊姬右擁越姬左裯衽右朝服曰吾鐘鼓之不暇何諫之聽蘇從曰臣聞之好道者多資好樂者多迷好道者多糧好樂者多亡荆國亡無日矣死臣敢以告王王曰善左執蘇從手右抽隂刀刎鐘鼓之懸明日授蘇從為相莊王築層臺延石千里延壤百里士有反三月之糧者大臣諫者七十二人皆死矣有諸御已者違楚百里而耕謂其耦曰吾將入見於王其耦曰以身乎吾聞之說人主者皆閒暇之人也然且至而死矣今子特草茅之人耳諸御已曰若與豫同耕則比力也至於說人主不與子比智矣委其耕而入見莊王莊王謂之曰諸御已來汝將諫邪諸御已曰君有義之用有法之行且已聞之土負水者平木負繩者正君受諫者聖君築層臺延石千里延壤百里民之釁咎血成於通途然且未敢諫也已何敢諫乎顧臣愚竊聞昔者虞不用宫之竒而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之秦人不用蹇叔之言而秦國危桀殺關龍逄而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊賢用辨士之言故身死而國亡遂趨而出楚王遽而追之曰己子反矣吾將用子之諫先日說寡人者其說也不足以動寡人之心又危加諸寡人故皆至而死今子之說足以動寡人之心又不危加諸寡人故吾將用子之諌明日令曰有能入諫者吾將與為兄弟遂解層臺而罷民楚人歌之曰薪乎萊乎無諸御已訖無子乎萊乎薪乎無諸御已訖無人乎晉平公好樂多其賦斂下治城郭曰敢有諫者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言曰晉人咎犯也欲以樂見平公曰內之止坐殿上則出鐘磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隱平公召隱士十二人咎犯曰隱臣竊願昧死御平公曰諾咎犯伸其左臂而詘五指平公問于隱官曰占之為何隱官皆曰不知平公曰歸之咎犯則伸其一指曰是一也便遊赭盡而峻城闕二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有飢色而馬有粟秩五也近臣不敢諫逺臣不得達平公曰善乃屏鐘鼓除竽瑟遂與咎犯參治國魏文侯時師經鼓琴文侯起儛賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯謂左右曰為人臣而撞其君其罪如何左右曰罪當烹提師經下堂一等師經曰臣可一言而死乎文侯曰可師經曰昔堯舜之為君也唯恐言而人不違桀紂之為君也唯恐言而人違之臣撞桀紂非撞吾君也文侯曰釋之是寡人之過也懸琴於城門以為寡人符不補旒以為寡人戒文侯與士大夫坐問曰寡人何如君也群臣皆曰君仁君也次至翟黃曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣以此知君之非仁君文侯怒而逐翟黃黃起而出次至任座文侯問寡人何如君也任座對曰君仁君也曰子何以言之對曰臣聞之其君仁者其臣直向者翟黃之言直臣是以知君仁君也文侯曰善復召翟黃入拜為上卿魏王將起中天臺令曰敢諫者死許綰負畚操插入曰聞大王將起中天臺臣願加一力王曰子何力有加綰曰雖無力能商臺王曰若何曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺髙既如是其趾須方八千里盡王之地而足以為臺趾古者堯舜建諸侯地方五千里王必起此臺先以兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之衆倉廩之儲數以萬億度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作魏王默然無以應乃罷起臺秦孝文王遷太后于雍下令敢諫者死諌而死者二十七人齊客茅蕉請諫王大怒趣召鑊欲烹之蕉徐行至前再拜而諫曰臣聞有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也陛下欲聞之乎王曰何謂也對曰陛下有狂悖之行不自知也車裂假父囊撲二弟遷母于雍殘戮諫士桀紂之行不至于是矣令天下聞之皆瓦解無向秦者臣切為陛下危之臣言已矣乃解衣伏質王下殿手接之爵以上卿西漢景帝時吳楚反以誅朝錯為名帝從袁盎請斬錯東市謁者僕射鄧公為校尉以言事見帝帝問曰道軍所來聞􅏯錯死吳楚罷否鄧公曰吳王為反數十年矣發怒削地以誅錯為名其意非在錯也且臣恐天下之士噤口不敢復言也帝曰何哉鄧公曰夫􅏯錯患諸侯强大不可制故請削地以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也帝默然良久曰公言善吾亦恨之宣帝神爵二年司𨽻校尉蓋寬饒坐上書不道諫大夫鄭昌上言曰臣聞山有猛獸藜藿為之不采國有忠臣奸邪為之不起寬饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託直道而行多仇少與上書陳事有司劾以大辟臣幸得從大夫之後官以諫為名不敢不言甘露元年帝祭宗廟出便門欲御樓船薛廣德免冠諫曰宜從橋帝曰大夫冠廣德曰陛下不聽臣言臣自刎以血汙車輪陛下不得入廟矣帝不悅先驅張猛進曰臣聞主聖則臣直乘船危就橋安聖主不乘危御史大夫言可聽帝曰曉人不當如是邪遂從橋成帝鴻嘉元年故南昌尉梅福上奏曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而畔親也不可以為言也昔高祖納善若不及從諫如轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進竒異知者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此髙祖所以無敵於天下也孝文皇帝起於代谷非有周召之師伊吕之佐也循髙祖之法加以恭儉當此之時天下幾平由是言之循高祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諫悅至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢于此為盛使孝武皇帝聽用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣藝陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之羣蹈籍名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輒報罷臣聞齊桓之世有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至衆多也然其俊傑指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦亡幾人故爵祿束帛者天下之底石髙祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢驅除倒持泰阿授楚其柄故誠能勿失其柄者天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今不循伯者之道乃欲以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦已明矣故髙祖棄陳平之過而獲其謀晉文召天王齊桓用其讐無益于時不顧逆順此所謂伯道者也一色成體謂之醇白黑雜合謂之駁欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥增逝愚者蒙戮則知士深退間者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尤甚羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此十之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循髙祖之軌杜亡秦之路數御十月之歌留意亡逸之戒除不急之法下亡諱之詔博覽兼聽謀及疏賤令深者不隱逺者不塞所謂闢四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益盛陛下不見其形願察其影建始以來日食地震以率言之三倍春秋水灾無與比數隂盛陽微金鐵為飛此何景也漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸勢隆於君權隆於主然後防之亦無及已元延元年故槐里令朱雲上言曰今朝廷大臣上不能匡主下無以益民皆尸位素飱孔子所謂鄙夫不可與事君茍患失之無所不至者也臣願賜上方劍斬佞臣一人以厲其餘帝問誰也對曰安昌侯張禹帝大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從比干龍逄游於地下足矣未知聖朝何如耳左將軍辛慶忌叩頭諌曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭帝意解及後當治檻帝曰勿易因而輯之以旌直臣成帝欲立趙偼妤為后先下詔封偼妤父臨為列侯諫大夫劉輔爭之帝收輔繫掖庭祕獄羣臣莫知其故左將軍辛慶忌等上書諫曰臣聞明王垂寬容之聽崇諫爭之官廣開忠直之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無諂諛之士元首無失道之愆竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬日之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列親從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官與衆共之昔趙簡子殺其大夫鳴犢孔子臨河而還今天心未豫灾異屢降水旱迭臻方當隆寬廣問褒直盡下之時也而行慘急之誅於諫爭之臣震驚羣下失忠直心假令輔不坐直言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚於掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察後漢章帝時大將軍竇憲陷尚書僕射郅夀以罪下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謡於路爭臣七人以自鑒照考知政理違失人心輒改更之故天人並應傳福無窮臣伏見尚書僕射郅夀坐於臺上與諸尚書論擊胸奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為夀機密近臣匡救為職若懷默不言其罪當誅今夀違衆正議以安宗廟豈其私邪又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪請買公田人情細過可裁隱忍夀若被誅臣恐天下以為國家橫罪忠直賊傷和氣忤逆隂陽臣所以敢犯嚴威不避夷滅觸死瞽言非為夀也忠臣盡節以死為歸臣雖不知夀度其甘心安之誠不欲聖朝行誹謗之誅以傷晏平之化杜塞忠直垂譏無窮臣謬豫機密言所不宜罪名明白當填牢獄先夀僵仆萬死有餘書奏夀得減死安帝時河間男子趙騰詣闕上書指陳得失帝怒詔獄結以罔上不道太尉楊震上奏曰臣聞堯舜之世諫鼓謗木立之於朝殷周哲王小人怨詈則還自敬德所以達聰明開不諱博采負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不省司空張皓亦上奏曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘騰等雖干上犯法所言本欲盡忠正諌如當誅戮天下杜口塞諫諍之源非所以昭德示後也帝乃悟騰得減死時連有灾異詔公卿百僚各上封事尚書陳忠以詔書既開諫諍慮言事者必多激切或致不能容乃上疏豫通帝意曰臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以髙祖赦周昌桀紂之譬孝文嘉袁盎人豕之譏武帝納東方朔宣室之正元帝容薛廣德自刎之切昔晉平公問於叔向曰國家之患孰為大對曰大臣重祿不極諫小臣畏罪不敢言下情不上通此患之大者公曰善於是下令曰吾欲進善有遏而不通罪至死今明詔崇髙宗之德推宋景之誠引咎克躬咨訪羣吏言事者見杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直若嘉謀異䇿宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優游寬容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路桓帝時白馬令李雲言事下獄大鴻臚陳蕃上奏曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔髙祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請魏明帝青龍二年高堂隆數以宫室事切諫帝不悅侍中盧育進曰臣聞君明則臣直古之聖王恐不聞其過故有敢諫之鼓近臣進規此乃臣等所以不及隆隆諸生名為狂直陛下宜容之景初中帝嘗問祕書監王肅曰漢桓帝時白馬令李雲上書言帝者諦也是帝欲不諦當何得不死肅對曰但為言失逆順之節原其本意皆欲盡心念存輔國且帝者之威過於雷霆殺一匹夫無異螻蟻寬而宥之可以示容受切言廣德宇於天下故臣以為殺之未必為是也吳烏程侯寶鼎元年左丞相陸凱上奏曰臣聞惡不可積過不可長積惡長過喪亂之源也是以古人懼不聞非故設進善之旍立敢諌之鼓武公九十思聞警戒詩美其德士恱其行臣察陛下無思警戒之義而有積惡之漸臣深憂之此禍兆見矣故略陳其要寫盡愚懷陛下宜克已復禮述修前德不可捐棄臣言而放奢意意奢情至吏日欺民民離則上不信下下當疑上骨肉相克公子相奔臣雖愚暗於天命以心審之敗不過二十稔也臣常忿亡國之人夏桀殷紂亦不可使後人復忿陛下也臣受國恩奉朝三世復以餘年值遇陛下不能循俗與衆沈浮若比干伍員以忠見戮以正見疑自謂畢足無所餘恨灰身泉壤無負先帝願陛下九思社稷存焉晉武帝太康三年帝問司𨽻校尉劉毅曰朕可方漢何帝毅對曰桓靈帝曰何至於此對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈不聞此言朕有直臣固為勝之漢主劉聰謂陳元達曰卿當畏朕反使朕畏卿乎元達叩頭謝曰臣聞師臣者王友臣者霸臣誠愚暗無可採也幸邀陛下垂齊桓納九九之義故使微臣得盡愚忠昔世宗遙可汲黯之奏故能恢隆漢道桀紂誅諫幽厲弭謗是以三代之亡也忽焉陛下以大聖應期挺不世之量能逺捐商周覆國之弊近模孝武光漢之美則天下幸甚聰既僭位以劉娥為右貴嬪甚寵之俄拜為后將起䳨儀殿以居之其廷尉陳元達切諌聰大怒將斬之娥時在後堂私敕左右停刑手疏啓曰伏聞將為妾營殿今昭德足居䳨儀非急四海未一祻難猶繁動須人力資財尤宜慎之廷尉之言國家大政夫忠臣之諌豈為身哉帝王拒之亦非顧身也妾仰謂陛下上尋明君納諌之昌下忿暗主拒諌之祻宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之祻由妾而招人怨國疲咎歸于妾拒諫害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦猶妾之視前人也復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂其羣下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公內輔如此后朕無憂矣後魏孝明帝神龜中沙汰郎官御史中尉東平王元匡輿棺諫諍尚書令任城王澄劾匡大不敬詔恕死為民三公郎辛雄上奏曰竊惟白衣元匡歷奉三朝每蒙寵遇謇諤之性簡自帝心鷹鸇之志形于在昔故高祖錫之以匡名陛下任之以彈糾至若茹皓升輦匡斥宜下之言髙肇當政匡陳擅權之表剛毅忠欵羣臣莫及骨鯁之跡朝野共知當髙肇之時匡造棺致諌主聖臣直卒以無咎假欲重造先帝已容之于前陛下亦宜寬之于後况其元列由緒與罪按不同也脫終貶黜不在朝廷恐杜忠臣之口塞諌者之心乖琴瑟之至和違鹽梅之相濟祁奚云叔向之賢可及十世而匡不免其身實可嗟惜隋文帝開皇初帝嘗怒一郎于殿前笞之諫議大夫劉行本諌曰其人素清其過又小願少寬之帝不聽行本前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽若非當置之於理豈得輕臣而不顧也因置笏於地而退帝斂容謝之唐髙祖武德初萬年縣法曹孫伏伽上言三事其一臣聞天子有爭臣雖無道不失其天下隋失天下者何不聞其過也方自謂功德盛五帝邁三王窮侈極欲使天下士肝腦塗地戶口殫耗盜賊日滋當時非無直言之臣卒不聞悟者君不受諫而臣不敢告之也向使開不諱之路官賢授能賞罰時當人人樂業誰能搖亂者乎陛下舉晉陽天下響應計不旋跬大業以成勿以得天下之易而忘隋失之不難也天子動則左史書之言則右史書之凡搜獵當順四時不可妄動且陛下即位之明日有獻鷂者不郤而受此前世弊事奈何行之相國參軍事盧牟子獻琵琶長安丞張安道獻弓矢竝被賚賞以率土之富何索不致豈少此物哉其二百戲散樂本非正聲隋末始見崇用此謂淫風不得不變近太常假民裙𥜗五百稱以衣妓工待𤣥武門游戲臣以為非貽子孫之謀傳曰放鄭聲逺佞人今散妓者匪韶匪夏請竝廢之以復雅正其三臣聞性相近習相逺今皇太子諸王左右執事不可不擇大抵不義無賴及馳騁射獵歌舞聲色慢游之人止可悅耳目備驅馳至拾遺補闕决不能也泛觀前世子姓不克孝兄弟不克友莫不由左右亂之願選賢才澄僚友之選帝大悅即詔曰周隋之晚忠臣結舌是謂一言喪邦者朕惟寡德不能性與天道然冀弼諧以輔不逮而羣公卿士罕進直言伏伽至誠慷慨據義懇切指朕失無所諱其以伏伽為治書侍御史賜帛三百匹李綱為太子詹事太子失德屢諌不聽綱遂乞骸骨髙祖罵曰卿為潘仁長史而羞朕尚書邪綱頓首曰潘仁賊也志殘殺然每諌輒止為其長史故無愧陛下功成厚自伐臣言如持水內石敢久為尚書乎且臣事東宫東宫又與臣忤是以上印綬帝謝曰知公直士幸卒輔吾兒太宗貞觀元年尚書杜淹嘗白太宗郅懷道可用帝問狀淹曰懷道在隋時位吏部主事方煬帝幸江都羣臣迎阿獨懷道執不可帝曰卿時何云對曰臣與衆帝折曰事君有犯無隱卿直懷道者何不讜言淹謝曰臣位下又顧諌不從徒死無益帝曰內以君不足諫尚何仕食隋粟忘隋事忠乎因顧羣臣公等謂何王圭曰比干諫而死孔子稱仁泄冶諌亦死則曰民之多僻無自立辟祿重責深從古則然帝笑曰卿在隋不諫宜置世充親任胡不言淹對曰固嘗言不見用帝曰世充愎諌飾非卿若何而免淹辭窮不得對帝勉曰今任卿已可有諫未答曰願死無隱二年太宗使太常少卿祖孝孫以樂律授宫中音家伎不進數被讓侍中王圭與溫彥博同進曰孝孫修謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下罔上為人游說邪彥博懼謝罪圭不謝曰臣本事前宫罪當死陛下矜其性命引置樞密責以忠效今疑臣以私是陛下負臣臣不負陛下帝默然慙遂罷明日語房𤣥齡曰昔武王不用夷齊宣王殺杜伯自古帝王納諫固難矣朕夙夜庶幾于前聖昨責圭等痛自悔公等勿懲是不進諫也三年太宗嘗問魏徴曰人主何為而明何為而暗徴對曰君之所以明者兼聽也其所以暗者偏信也詩曰先人有言詢于芻蕘昔堯舜之世闢四門明四目達四聰是以聖無不照故共鯀之徒不能塞也靜言庸違不能惑也秦二世則隱藏其身捐隔踈賤而偏信趙髙及天下潰叛不得聞也梁武帝偏信朱异而侯景舉兵向闕竟不得知也隋煬帝偏信虞世基而諸賊攻城割邑亦不得知也故人君兼聽納下則貴臣不得壅蔽而下情得以上通也太宗甚嘉其言有人告尚書右丞魏徴阿黨親戚太宗使御史大夫溫彥博案之無狀彥博奏徴既為人所道雖在無私亦有可責帝令彥博謂徴曰爾諌正我數百條豈以此小事便損衆美自今已後不得不存形迹居數日太宗問徵曰昨來在外聞有何不是事徴正色曰前日令彥博宣敕語臣云因何不作形迹此言大不是臣聞君臣同契義皆一體未聞不存公道惟事形迹若君臣上下同遵此路則邦國之興喪或未可知帝矍然改容曰前發此語尋已悔之實大不是公亦不得遂懷隱避徴乃拜而言曰臣以身許國直道而行必不敢有所欺負但願陛下使臣為良臣勿使臣為忠臣帝曰忠良有異乎徵曰稷契臯陶君臣協心使身獲美名君受顯號子孫傳世福祿無疆龍逄比干面折廷諍身受誅夷君陷大惡家國並喪獨有其異以此而言相去逺矣帝曰君但莫違此言我必不忘社稷之計乃賜絹二百匹六年太宗置酒丹霄樓中謂長孫無忌曰魏徴王圭事隱太子巢刺王時誠可惡我能棄怨用才無羞古人然徴每諫我不從我發言輒不即應何哉徴曰臣以事有不可故諫若不從輒應恐遂行之帝曰第即應須别陳論顧不得徴曰昔舜戒羣臣爾無面從退有後言若面從可方别陳論此乃後言非稷卨所以事堯舜也帝大笑曰人言徵舉動踈慢我但見其嫵媚耳徴再拜曰陛下導臣使言所以敢然若不受臣敢數批逆鱗哉七年太宗謂侍臣曰朕見胡裴始畢上書論西蕃事意頗有情理朕與共語非常戰懼今奏一事人亦應如此魏徴對曰天顔俯臨豈得不懼臣見在外諸司欲奏事者先三五日反覆尋思及其臨奏三分不能道得一分尋常易事尚難如此况爭諌之人出言皆是觸忤非陛下假之顏色豈敢盡其情哉帝由是接羣臣愈溫且曰隋煬帝多猜忌對羣臣多不語朕則不然君臣相親如一體耳八年太宗謂房𤣥齡等曰昨皇甫德參上書言朕修營洛州宫殿是勞人也收地租是厚斂也俗尚髙髻當是宫中所作也此人欲使國家不役一丁不收一租宫人皆無髻乃稱其意耳事既訕謗當須論罪魏徴進諌曰賈誼當漢文之時上書云可為痛哭者三可為長太息者五自古上書率多激切若不激切則不能起人主心激切即似訕謗所謂狂夫之言聖人擇焉唯在陛下裁察不可責也帝曰朕初欲責此人若責之則誰敢言者因賜絹二十匹十一年太宗謂魏徴曰比來所行得失政化何如往前對曰若恩威所加逺夷朝貢比於貞觀之始不可等級而言若德義潜通民心悅服比於貞觀之初相去又甚逺帝曰逺夷來服應由德義所加往前功業何因益大徵曰昔者四方未定常以德義為心旋以海內無虞漸加驕奢自溢所以功業雖盛終不如往初帝曰朕今所行以往前何為異徴對曰貞觀之初恐人不言導之使諌三年已後見人諫恱而從之一二年來不恱人諌雖黽勉聽受而意終不平諒有難也帝曰於何事如此徴對曰即位之初處元律師死罪孫伏伽諌曰法不至死無容濫加酷罰遂賜以蘭陵公主園直錢百萬人或曰所言乃常而所賞太厚答曰我即位來未有諫者所以賞之此導之使言也徐州司戶栁雄於隋資妄加階級人有告之者陛下令其自首不首與罪遂固言是實竟不肯首大理推得其僞將處雄死罪少卿戴胄奏法止合徒陛下曰我已與其斷當訖但當與死罪胄曰陛下既不然即付臣法司罪不合死不可酷濫陛下作色遣殺胄執之不已至於四五然後赦之乃謂法司曰但能為我如此守法豈畏濫有誅夷此則恱以從諫也往年陜縣丞皇甫德參上書有忤聖㫖陛下以為訕謗臣奏稱上書不激切不能起人主意激切即似訕謗于時雖從臣言賞物二十段意甚不平難於受諫也帝曰誠如公言非公無能道此者人皆苦不自覺公向未道時都自謂所行不變及見公論說過失堪驚公但存此心朕終不違公語太宗謂侍臣曰朕昨往懷州有上封事者云何為恆差山東衆丁於苑內營造即日徭役似不下隋時懷洛以東殘人不堪其命而畋獵猶數驕逸之主也今者復來懷州畋獵忠諫不復至洛陽矣四時搜田既是帝王常禮今者懷州秋毫不干於百姓凡上書諫正自有常准臣貴有詞主貴能改如斯詆毁有似呪咀侍中魏徴奏曰國家開直言之路所以上封事者尤多陛下親自披閲或冀臣言可取所以僥幸之士得肆其醜臣諌其君甚須折𠂻從容諷諫漢元帝嘗以酎祭髙廟出便門御樓船御史大夫薛廣德當乘輿免冠曰宜從橋陛下不聽臣言臣自刎以頸血汚車輪陛下不得入廟矣元帝不悅光祿張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危廣德言可聽元帝曰曉人不當如是耶乃從橋以此而言張猛可謂直臣諫君也帝大恱十二年太宗謂侍臣曰上封事者皆言朕遊獵太頻今天下無事武備不可忘朕時與左右獵于後苑無一事煩民夫亦何傷魏徴曰先王惟恐不聞其過陛下既使之上封事正得恣其陳述茍其言可取固有益於國若其無取亦無所損帝曰公言是也皆勞而遣之十八年太宗謂長孫無忌等曰夫人臣之對帝王多順從而不逆甘言以取容朕今發問不得有隱宜以次言朕過失無忌等咸曰陛下聖化道致太平以臣觀之不見其失黃門侍郎劉洎對曰陛下撥亂造化實功髙萬古誠如無忌等言然頃有人上書辭理不稱者或對而窮詰無不慚退恐非奬進言者帝曰此言是也當為卿改之太宗嘗怒苑西監穆裕命於朝堂斬之時髙宗為皇太子遽犯顔進諫太宗意乃解長孫無忌曰自古太子之諫或承間從容而言今陛下發天威之怒太子申犯顏之諫斯誠古今未有帝曰夫人久相與處自然染習自朕御天下虛心正直即有魏徴朝夕進諫自徴云亡劉洎岑文本馬周褚遂良等繼之大子幼在朕膝前每見朕心恱諫者因染以成性故有今日之諫太宗嘗問諫議大夫禇遂良曰昔舜造漆器禹雕其爼當諫舜禹十有餘人食器之間何須苦諫遂良曰雕琢害農事纂組傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗曰卿言是也朕所為事若有不當或在其漸或已將終皆宜進諫比見前史或有人臣諫事遂答云業已為之或道業已許之竟不為停改此則危亡之禍可反手而待也太宗時權貴嫉魏徴每言於太宗曰魏徴凡所諫爭委曲反覆不從不止意以陛下為幼主不同於長君太宗曰朕少不學問唯好弓馬至於起義即有大功既封為王偏蒙偏愛理道政術都不留心及為太子初入東宫思安天下欲克已為政唯魏徴與王圭導我以禮𢎞我以道勉彊從之大覺利益遂力行不息以致太平並魏徴等之力所以特加禮重每事聽從非私之也言者乃慙而出太宗又謂房𤣥齡等曰今天下百姓藉我撫養先須令我安穩今上封者唯道九成往來百姓辛苦魏徴對曰陛下意存容納許其進言則妄處多不妨時有可録陛下所有短長此人多不肯隱但容納之亦是善事太宗謂侍臣曰朕每閒居靜坐則自內省恆恐上不稱天心下為百姓所怨但思正人匡諫欲令耳目外通下無寃滯又比見人來奏事者多有怖懾言語致失次第尋常奏事情猶如此况欲諫諍必當畏犯龍鱗所以每有諫者縱不合朕心亦不以為忤若即嗔責深恐人懷懼豈敢更言又謂房𤣥齡曰自知者明信為難矣如屬文之士伎巧之徒皆自謂已長他人不及若名工文匠商略詆訶蕪詞拙跡于是乃見由此言之人君須得匡諌之臣舉其愆過一日萬幾一人聽斷雖復憂勞安能盡善常念魏徴隨事諫正多中朕失如明鏡鑑形美惡必見且自古帝王多任情喜怒喜則濫賞無功怒則濫殺無罪以是天下喪亂莫不由此朕今夙夜未嘗不以此為心恆欲公等盡情極諫公等亦須受人諫豈得以人言不同已意便即護短不納若不能受諌安能諌人𤣥齡曰陛下之言是也太宗以御史大夫韋挺中書侍郎杜正倫祕書少監虞世南著作郎姚思廉等上封事稱㫖召而謂曰朕歷觀自古人臣立忠之事若值明主便得盡誠規諫至如龍逢比干竟不免孥戮為君不易為臣極難朕又聞龍可擾而馴之然頷下有逆鱗觸之則殺人人主亦然卿等遂不避犯觸各進封事常能如此朕豈慮社稷之傾敗每思卿等此意不能暫忘故詔卿等設宴為樂仍賜帛有差太常卿韋挺上章陳得失太宗賜書曰得所上書意見極是讜言辭理可觀甚以為慰若齊桓之難夷吾有射鈎之罪蒲城之役勃鞮為斬袂之仇而小白不以為疑重耳待之若舊豈非各吠其主志在無二卿之深誠見于斯矣若能克全此節則保令名如其怠之可不惜也勉勵終始垂範將來當使後之視今亦猶今之視古不亦美乎朕比不聞其過未覩其闕賴竭忠懇數進嘉言用沃朕懷一何可道太宗謂侍臣曰朕觀前代讒佞之徒皆國之蟊賊也或巧言令色朋黨比周若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃故叢蘭欲茂秋風敗之王者欲明讒人蔽之此事著於史籍不能具道至於齊隋間讒譛事耳目所接者略與公等言之斛律明月齊朝良將威震敵國周家每嵗斫汾河氷慮齊兵之西渡及明月被祖孝徴讒構伏誅周人始有吞齊之心髙熲有經國大才為隋文帝贊成霸業知國政者二十餘載天下賴以康寧文帝唯婦言是聽特令擯斥及為煬帝所殺刑政由是衰壞又隋太子勇撫軍監國凡二十年固亦早有定分楊素欺主罔上賊害良善使父子之道一朝滅于天性逆亂之源自此開矣隋文既淆混嫡庶竟禍及其身社稷尋亦覆敗古人云代亂則讒勝誠非妄言朕每防萌杜漸用絶讒構之端猶恐心力所不至或不能覺悟前史云猛獸處山林藜藿為之不採直臣立朝廷奸邪為之寢謀此實朕所望于羣公也魏徴曰禮云戒慎乎其所不睹恐懼乎其所不聞詩云愷悌君子無信讒言讒言罔極交亂四國又孔子惡利口之覆邦家蓋為此也臣嘗觀自古有國有家者若曲受讒譛妄害忠良必宗廟邱墟市朝霜露矣願陛下深慎之太宗謂侍臣曰君臣本同治亂共安危若主納忠諫臣進直言斯故君臣合契古來所重若君自賢臣不匡正欲不危亡不可得也君失其國臣亦不能獨全其家至於隋煬帝暴虐天下鉗口卒令不聞其過遂至滅亡虞世基等尋亦誅死前事不遠朕與卿等何得不慎無為後世所嗤又曰治國與養病無異病人覺愈彌須將護若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便驕逸必至喪敗今天下安危繫之於朕故日慎一日雖休勿休然耳目股肱寄在卿輩既義均一體宜協力同心事有不安可極言無隱儻君臣相疑不能備盡肝膈實為治國之大害也左右曰陛下之言及此社稷之福也長樂公主文德皇后所生也將出降敕所司資送倍於長公主魏徴奏曰昔漢明帝欲封其子帝曰朕子豈得同於先帝子乎可半楚淮陽前史以為美談天子姊妹為長公主天子之女為公主既加長字良以尊於公主也情雖有踈義無等别若令公主之禮有過長公主理恐不可實願陛下思之帝稱善乃以其言退而告后后歎曰嘗聞陛下敬重魏徴殊未知其故而今聞其諫乃能以義制人主之情可謂正直社稷臣矣妾與陛下結髮為夫妻曲蒙禮敬情義深重每將有言必候顏色尚不敢輕犯威嚴况在臣下情踈禮隔故韓非謂之說難東方朔稱其不易良有以也忠言逆耳而利於行有國有家者深所要急納之則世治杜之則政亂誠願陛下詳之則天下幸甚太宗幸九成宫宴近臣長孫無忌曰王圭魏徴往事息隱臣見之若讎不謂今日又同此宴太宗曰魏徴往者實我所讎但其盡心所事有足嘉者朕能擢而用之何慚古烈然徴犯顏切諫每不許我為非我所以重之也徴且拜曰陛下導臣使言臣所以敢言若陛下不受臣言臣亦何敢犯龍鱗觸忌諱也太宗大悅賜錢十五萬纍封鄭國公尋以疾請為散官太宗曰朕拔卿于讎虜之中任卿以樞要之職見朕之非未嘗不諫公獨不見金之在礦何足貴哉良冶鍛而為器便為人所寶朕方自比于金以卿為良工卿雖有疾未為衰老豈得便爾耶徴乃止後以誕皇孫詔宴公卿帝極歡謂侍臣曰貞觀以前從我平定天下周旋艱險𤣥齡之功無所與讓貞觀之後盡心于我獻納忠讜安國利人成我功業為天下所稱者魏徴而已古之名臣何以加也於是親解佩刀以賜之又嘗謂徴曰隋煬帝承文帝餘業海內殷阜若能常據關中豈有傾敗遂不顧百姓行幸無期徑往江都不納董純崔象諫爭身戮國滅為天下笑雖復帝祚長短委以𤣥天而福善禍淫亦由人事朕每思之若欲君臣長久國無危敗君有違失臣須極諫朕聞卿等規諫縱不能當時即從再三思審必擇而用及徴薨太宗親臨慟哭自製碑文賜其家食實封九百戶且謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕嘗保此三鏡以防已過今魏徴殂逝遂亡一鏡矣因泣下久之乃詔曰昔惟魏徴每顯余過自其逝也雖過莫彰朕豈獨有非於往時而皆是於兹日故亦庶僚茍順難觸龍鱗者歟所以虛已外求披迷內省言而不用朕所甘心用而不言誰之責也自斯以後各悉乃誠若有是非直言無隱羣臣皆稱善太宗謂黃門侍郎王圭曰中書所出詔敕頗有意見不同或兼錯失而相正以否元置中書門下本以相防過誤人之意見每或不同有所是非本為公事或有護已之短忌聞其失有是有非咸以為怨或有茍避私隙相惜顏面知非正事遂即施行難違一官之小情頓為萬人之大弊此實亡國之政卿輩特須在意防也隋日內外庶官政以依違而致禍亂人多不能深思此理當時皆謂禍不及身面從背言不以為患後至大亂一起家國俱喪雖有脫身之人縱不遭刑戮皆辛苦僅免甚為時論所貶黜卿等須滅私狥公堅守直道庶事相啓沃勿上下雷同也又謂侍臣曰中書門下機要之司擢才而居委任實重詔敕如有不穩便皆須執論比來唯覺阿㫖順情唯唯茍過遂無一諫諍者豈是道理若惟署詔敕行文書而已人誰不堪何煩簡擇以相委付自今詔敕疑有不穩便須執言毋得妄有畏懼知而寢默圭嘗上封事切諫太宗謂曰卿所論朕皆中朕之失自古人君莫不欲社稷永安然而不得者祗為不聞已過或聞而不能改也今朕有所失卿能直言朕復聞過能改何謂社稷之不安乎又曰卿若常居諫官朕必永無過失圭對曰臣等敢不奉命太宗謂侍臣曰古人云危而不持顛而不扶焉用彼相君臣之義得不盡忠匡救乎朕嘗讀書見桀殺關龍逢漢誅鼂錯未嘗不廢書嘆息公等但能正詞直諫裨益政教終不以犯顏忤㫖妄有誅責朕比來臨朝斷决亦有乖于律令者公等以為小事遂不執言凡大事皆起於小事小事不論大事又將不可救社稷傾危莫不由此隋主殘暴身死匹夫之手率土蒼生罕聞嗟痛公等為朕思隋氏滅亡之事朕為公等思龍逢鼂錯之誅君臣保全豈不美也又謂侍臣曰朕觀古來帝王驕矜而取敗者不可勝數不能逺述古昔如晉武平吳隋文伐陳以後心逾驕奢自矜諸已臣下不敢復言政道因兹弛紊朕自平突厥破髙麗以後兼并鐵勒席卷沙漠以為州縣邊陲逺服聲教益廣朕恐懷驕矜恆自抑折日旰而食坐以待晨每思臣下有讜言直諫可以施於政教者當拭目以師友待之如此庶幾於時康道泰耳左右皆曰誠如陛下之言太宗威儀嚴肅百僚進見者皆失其舉措太宗知其若此每見人奏事必假借顏色冀聞規諫嘗謂公卿曰人欲自照必須明鏡主欲知過必藉忠臣主若自賢臣不匡正欲不危敗豈可得也故君失其國臣亦不能獨全其家至若隋煬帝暴虐臣下鉗口卒令不聞其過遂至滅亡虞世基等尋亦誅死前事不遠公等每看事有利於人必須直言規諫又謂房𤣥齡杜如晦曰朕聞自古帝王上合天心以致太平者皆股肱之力朕比開直言之路者庶知寃抑欲聞規諌所有上封事人多告訐百官細無可採朕厯選前王但有君疑於臣則下情不能上達欲求盡忠極慮何可得哉而無識之人務行讒毁交亂君臣殊非益國自今以後有上書訐人小惡者以讒人之罪罪之又曰朕因暇日每與虞世南商榷古今朕有一言之善世南未嘗不悅有一言之失未嘗不悵恨其懇誠若此朕用嘉焉群臣忠直皆若世南天下何憂不理及卒太宗哭之甚慟手敕魏王泰曰虞世南於我猶一體也拾遺補闕無日暫忘實當世名臣人倫準的吾有小善必將順成之吾有小失必犯顏而諫之今其云亡石渠東觀之中無復人矣群臣皆曰然𤣥宗初立收還綱權鋭於决事羣臣畏伏起居郎吳競慮帝果而不及精乃上奏曰自古人臣不諌則國危諫則身危臣愚食陛下祿不敢避身危之禍比見上封事者言有可采但賜束帛而己未嘗蒙召見被拔擢其忤㫖則朝堂决杖傳送本州或死於流貶由是臣下不敢進諌古者設誹謗木欲聞已過今封事謗木比也使所言是有益於國使所言非無纍於朝陛下何遽加斥逐以杜塞直言道路流傳相視怪愕夫漢髙帝赦周昌桀紂之對晉武帝受劉毅桓靈之譏况陛下豁達大度不能容此狂直耶夫人主居尊極之位顓生殺之權其為威嚴峻矣開情抱納諌諍下猶懼不敢盡奈何以為罪且上有所失下必知之故鄭人欲毁鄉校而子産不聽也陛下初即位猶有褚無量張廷圭韓思復辛替否栁澤袁楚客等數上疏爭時政得失自頃上封事往往得罪諫者頓少是雀巢覆而鳳不至理之然也臣誠恐天下骨鯁士以讜言為戒撓直就曲斫方為圓偷合茍容不復能盡節忘身納君於道矣夫帝王之德莫盛於納諫故曰木從繩則正后從諫則聖又曰朝有諷諫猶髮之有梳猛虎在山林藜藿為之不采忠誎之有益如此自古上聖之君恐不聞已過故堯設諫鼓禹拜昌言不肖之主自謂聖智拒諌害忠桀殺關龍逢而滅於湯紂殺其王子比干而滅于周此其驗也夫與治同道罔不興與亂同道罔不亡人將疾必先不甘魚肉之味國將亡必先不甘忠諫之說嗚呼惟陛下深監于兹哉隋煬帝驕矜自負以為堯舜莫已若而諱亡憎諫乃曰有諫我者當時不殺後必殺之大臣蘇威欲開一言不敢發因五月五日獻古文尚書帝以為訕已即除名蕭瑀諫無伐遼出為河西郡守董純諫無幸江都就獄賜死自是蹇諤之士去而不顧外雖有變朝臣鉗口帝不知也身死人手子孫勦絶為天下笑太宗皇帝好恱至言時有魏徴王圭虞世南李大亮岑文本劉洎馬周褚遂良杜正倫髙季輔咸以切諫引居要職嘗謂宰相曰自知者為難如文人巧工自謂已長若使達者大匠詆訶商略則蕪辭拙跡見矣天下萬機一人聽斷雖甚憂勞不能盡善今魏徴隨事諫正多中朕失如明鑑照形美惡畢見當是時有上書益於政者皆黏寢殿之壁坐望卧觀雖狂瞽逆意終不以為忤故外事必聞刑戮幾措禮義大行陛下何不遵此道與聖祖繼美乎夫以一人之意綜萬方之政明有所不燭智有所不周上心未諭于下下情未達於上伏惟以虛受人博覽兼聽使深者不隱逺者不塞所謂闢四門明四目也其能直言正諫不避死亡之誅者特加寵榮待以不次則失之東隅冀得之桑榆矣代宗時宰相元載多引私黨畏羣臣論奏乃紿帝曰羣臣奏事多狹讒毁請每論事皆先白長官長官以白宰相宰相詳可否以聞檢校刑部尚書顏真卿上奏曰諸司長官者達官也皆得專達於天子郎官御史陛下腹心耳目之臣也故出使天下事無細大得失皆俾訪察還以聞此古明四目達四聰也今陛下欲自屏耳目使不聰明則天下何望焉詩曰營營青蠅止于棘讒人罔極交亂四國以其能變白為黑變黑為白也詩人疾之故曰取彼譖人投畀豺虎豺虎不食投畀有北昔夏之伯明楚之無極漢之江充皆讒人也陛下惡之宜矣胡不回神省察其言虛誣則讒人也宜誅殛之其言不誣則正人也宜奬勵之捨此不為使衆人謂陛下不能省察而倦聽覽以是為辭臣竊惜之昔太宗勤勞庶政其司門式曰無門籍者有急奏令監司與伏家引對不得關礙防擁蔽也置立仗馬二須乘者聽此其平治天下也天寶後李林甫得君羣臣不先咨宰相輒奏事者託以他事中傷之猶不敢明約百司使先關白時閹人袁思藝日宣詔至中書天子動靜必告林甫林甫得以先意奏請帝驚喜若神故權寵日甚道路以目上意不下宣下情不上達此權臣蔽主不遵太宗之法也凌夷至於今天下之敝皆萃陛下其所從來漸矣自艱難之初百姓尚未凋竭太平之治猶可致而李輔國當權宰相用事遞為姑息開三司誅反側使餘賊潰將北走党項裒哺不逞更相驚恐思明危懼相挻而反東都陷沒先帝由是憂勤損夀臣每思之痛心切骨今天下瘡痏未平干戈日滋陛下豈得不博聞讜言以廣視聽而塞絶忠諫乎陛下在陜時奏事者不限貴賤羣臣以為太宗之治可跂而待且君子難進易退朝廷開不諱之路猶恐不言况懷厭怠令宰相宣進止御史臺作條目不得直進從此人不奏事矣陛下聞見止於數人耳目天下之士方鉗口結舌陛下便為無事可論豈知懼而不敢進即林甫國忠復起矣臣謂今日之事曠古未有雖林甫國忠猶不敢公為之陛下不早覺悟漸成孤立後悔無及矣德宗時翰林學士陸贄上奏曰臣某言賊朱泚逋誅尚穴宮禁陛下思念宗廟痛傷黎元仁孝交感至於憤激猥以急務下詢微臣臣雖鄙懦尊慕仁義荷陛下知已之遇感陛下思理之誠愚衷所懷承問輒發不以淺深自揆不以喜怒上虞誠缺於周防承順之規是亦忠于陛下一至之分也前奉詔問尋具上陳請延羣臣稍與親接廣咨訪之路開諫諍之門通壅鬱之情宏採拔之道自獻答奏逮兹彌旬不聞施行不賜酬詰未審宸㫖以為何如昧於忖量但務竭盡恐由辭理蹇拙不能暢達事情慺慺血誠敢願披􅅹頻煩瀆冒豈不慙惶蓋犬馬感恩思效之心眷眷而不能自止者也臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所由生也是則時之否泰事之損益萬化所繫必因人情情有通塞故否泰生情有薄厚故損益生通天下之情者莫智于聖人盡聖人之心者莫深於易象其别卦也乾下坤上則曰泰坤下乾上則曰否其取象也損上益下則曰益損下益上則為損乾為天為君坤為地為臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下于義順矣而反謂之否者上下不交故也氣不交則庶物不育情不交則萬邦不和天氣下降地氣上騰然後嵗功成君澤下流臣誠上達然後理道立損益之義亦由是焉上約已而裕於人人必恱而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容易哉故喻君為舟喻人為水水能載舟亦能覆舟舟即君道水即人情舟順水之道乃浮違則沒君得人之情乃固失則危是以古先聖王之居人上也必以其欲從天下之心而不敢以天下之人從其欲乃至兢兢業業一日二日萬幾夫幾者事之微也以聖人之德天子之尊且猶慎事之微乃至一日萬慮豈不以居上接下懼失其情歟書曰人心惟危道心惟微微則萬幾之慮不得不精也危則覆舟之戒不得不畏也夫揆物以意宣意以言言或是非莫若考于有跡跡或成敗莫若驗於已行自昔王業盛衰君道得失史冊盡在粲然可徴與衆同欲靡不興違衆自用靡不廢從善納諌靡不固逺賢耻過靡不危故詩書稱堯德則曰稽于衆捨已從人數舜之功則曰明四目達四聰言務同欲也序禹之所由興則曰益贊于禹禹拜昌言述湯之所以王則曰用人惟已改過不吝言能納諌也歌文王作周則曰濟濟多士文王以寧美武王剋殷則曰亂臣十人同心同德言皆從善也堯舜禹湯文武此六君者天下之盛王也莫不從諌以輔德詢衆以成功是則德益盛者慮益微功愈高者意愈下及代之衰也則道亦反焉故書曰紂有億兆夷人離心離德言違衆也詩曰汝炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿又曰雖無老成人尚有典刑曽是莫聽大命以傾言逺賢也書曰謂人莫已若者亡詩曰惟彼不慎自獨俾臧自有肺暘俾人卒狂言自用也前史數桀紂之惡曰强足以拒諫辨足以飾非言耻過也考得失於已行之迹鑒盛衰於已驗之符孰失道而不衰孰得理而不盛報應以類影響不差胡可不則而象之敬而畏之乎粵自秦漢暨于周隋其間將厯千祀代興者非一姓繼覆者非一君雖所遇殊時所為異迹然失衆必敗得衆必成與堯舜禹湯同務者必興與桀紂幽厲同趣者必覆全失衆則全敗全得衆則全成多同於善則功多甚同於惡則禍甚善惡從類端如貫珠成敗象行明若觀火此歷代之元龜也尚恐議者曰時異事異臣請復為陛下粗舉近效之尤章章者以辨焉太宗文皇帝以天縱之才有神器之重武定禍亂文致太平威行如雷霆明照侔日月英略施於百勝聖功被於九歌固非庶品之所度量常情之所鑽仰然猶兢兢畏慎懼失人心每戒臣下獻規恆以危亡為慮夙興聽理日旰忘勞公卿迭趨庭奏庶務評議得失與衆共之下無滯情上無私斷退朝之暇宴接侍臣咨訪謀猷詢求過闕或諭往古成敗或問人間事情每言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則上下相匡務遵勤儉言及閭閻疾苦則君臣同慮議息征徭懋德懲違觸類滋長尚恐過言謬舉既往難追每召宰相平章必遣諌官俱入小有頗失隨即針規得一善必遽命甄升聽一諫必明加褒錫故得時無闕事人樂輸誠又引文學之流更直宿內署或講求典禮或諷誦詩書每至夜分情忘厭倦夫以太宗之德美貞觀之理安且猶務得人心其勤若此是則人心之於理道可一日而不接乎髙宗始年亦親聽納故當時翕然歸美以為有貞觀之風兼賴遺澤在人先範垂裕幸無改作俗以阜康數十年間天下無事承平之業滋久倦勤之意頗彰燕居益深接下彌簡前哲之耿光浸逺中宫之威柄潜移卒有嗣聖臨朝天授革命豈不以經邦之道闕疇咨於大猷宴安之懷溺偏信於近狎馴致祻變幾將傾邦雖亂匪自他然其失一也弊俗一靡餘風遂流訖神龍景雲之間皆嬖幸亂朝聰明不達𤣥宗躬定大難手振宏綱開懷納忠剋已從諌尊用舊老採拔羣才大臣不敢壅下情私昵不敢干公議朝清道泰垂三十年謂化已行謂安可保耳目之娛漸廣憂勤之志稍衰侈心一萌邪道並進貪權竊柄者則曰德如堯舜矣焉用勞神承意趣媚者則曰時已太平矣胡不為樂有深謀逺慮者謂之迂誕驚衆有讜言切諫者謂之誹謗邀名至尊收視於穆清上宰養威於廊廟議曹以頌美為奉職法吏以識㫖為當官司府以厚斂為公忠權門以多賂為問望外寵持竊國之勢內寵擅回天之謡禍機熾然焰焰滋甚舉天下如居積薪之上人人懼焚朝廷相蒙曽莫之省日務逰宴方謂有無疆之休大盜一興至今為梗豈不以忽於戒備逸於居安憚忠鯁之怫心甘諛詐之從欲漸漬不聞其失以至於大失者乎肅宗懲致寇之由藴撥亂之略虛受廣納同符乎太宗招延詢謀輟食廢寢洞啓誠腑推心與人豁披胸襟忘已應物故得來蘇之望允塞配天之業勃興先皇帝繼守恭勤而益之以和惠惠則有感和則有親雖時繼艱屯而衆不離析理尚寬大務因循而重作為然於紫宸聽朝常限三人奏事亦宣諭德令課責侍臣或賞其盡規或讓以容默性本仁恕事多含𢎞諫雖未從且不深忤情茍有阻終獲上通故君臣相安而人亦小息陛下英姿逸辨邁絶人倫武略雄圖牢籠物表慣習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊自久浚源太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不達於睿聰臣於往年曾任御史獲奉朝謁僅欲半年陛下嚴邃髙居未嘗降㫖臨問羣臣局蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔既殊私錫且異公言未行者則戒以樞密勿論已行者又謂之遂事不諫漸生拘礙動涉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰真孰虛何得何失則事之通塞備詳之矣人之情僞盡知之矣列聖升降之效歷歷如彼當今理亂之由昭昭如此未有不興于得衆殆於失人裕於僉諧蔽於偏信濟美因乎納諫虧德由乎自賢善始本乎憂勤失全萌乎安泰今陛下將欲悔禍邀福去危從安若不循太宗創業之規襲肅宗中興之理鑒天寶致亂之所以懲今者遷幸之所由則何以孚聖懷彰令聞新遠邇之聽歸反側之心乎前承德音訪及庸鄙敢緣斯議輒以獻聞自邇以來反覆千慮愚智有分信非可移至今拳拳猶滯所見不勝愚誠懇欵謹復布露以聞陸贄又上奏曰朝隱奉宣聖㫖頻覽卿表狀勸朕數對羣臣兼許令論事辭理懇切深表盡忠朕本心甚好推誠亦能納諌但緣上封事及奏對者少有忠良多是論人長短或探朕意㫖朕雖不受讒譛出外即謾生是非以為威福朕往日將謂君臣一體都不隄防緣推誠信不疑多被奸人賣弄今所致患害朕思亦無他故却是失在推誠又諌官論事少能慎密例自矜衒歸過於朕以自取名朕從即位以來見奏對論事者甚多大都皆是雷同道聽塗說試加質問即便辭窮若有竒才異能在朕豈惜拔擢朕見從前已來事秖如此所以近來不多取次對人亦不是倦於接納卿宜深悉此意者聖德廣大如天包容俯矜狂愚仍賜奬諭嘉臣以懇切目臣以盡忠雖甚庸駑實懷感勵夫知無不言之謂盡事君以義之謂忠臣之夙心久以自誓以此為奉上之道以此為報主之資幸逄休明獲展臣願既免罪戾又蒙褒稱庶奉周旋不敢失墜儻陛下廣推此道施及萬方咸奬直以矜愚各録長而捨短人之欲善誰不如臣自然聖德益彰羣心盡達愚衷懇懇實在於斯睿眷特深縷宣密㫖備該物理曲盡人情其於慮逺防微固非常識所逮然臣竊謂天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納帝王之盛莫盛於堯雖四凶在朝而僉議靡輟故曰惟天為大惟堯則之是知人有邪直賢愚在處之各得其所而已必不可以忠良者少而闕於詢謀獻納之道也昔人有因噎而廢食者又有懼溺而自沈者其為矯枉防患之慮豈不過哉願陛下取鑒於兹勿以小虞而妨大道也臣聞人之所助在乎信信之所立由乎誠循誠於中然後俾衆無惑存信於已可以教人不欺唯信與誠有失無補一不誠則心莫之保一不信則言莫之行故聖人重焉以為食可去而信不可失也又曰誠者物之終始不誠無物物者事也言不誠則無復有事矣匹夫不誠無復有事况王者賴人之誠以自固而可不誠於人乎陛下所謂失於誠信以致患害者臣竊以斯言為過矣孔子曰可與言而不與之言失人不可與言而與之言失言智者不失人亦不失言由此論之陛下可審其所言而不可不慎信其所與而不可不誠海禽至微猶識情僞含靈之類固必難誣前志所謂衆庶者至愚而神蓋以蚩蚩之徒或昏或鄙此其似於愚也然而上之得失靡不辨上之好惡靡不知上之所祕靡不傳上之所為靡不效此其類於神也故馭之以智則人詐示之以疑則人偷接不以禮則狥義之意輕撫不以恩則效忠之情薄上行之則下從之上施之則下報之若響應聲若影從表表枉則影曲聲淫則響邪懷鄙詐而求顏色之不形顏色形而求觀者之不辨觀者辨而求衆庶之不惑衆庶惑而求叛亂之不生自古及今未之得也故唯天下至誠為能盡其性能盡其性則能盡人之性若不盡於已而望盡於人衆必紿而不從矣不誠於前而曰誠於後衆必疑而不信矣今方嶽有不誠於國者陛下則興師以伐之臣庶有虧信於上者陛下則出令以誅之有司順命誅伐而不敢縱捨者蓋以陛下之所有責彼之所無故也向若陛下不誠於物不信於人人將有辭何以致討是知誠信之道不可斯須去身願陛下慎守而行之有加恐非所以為悔者也臣聞春秋傳曰人誰無過過而能改善莫大焉易曰日新之謂盛德禮記曰德日新日日新又日新商書仲虺述成湯之德曰用人惟已改過不吝周詩吉甫美宣王之功曰衮職有闕惟仲山甫補之夫禮易春秋百代不刋之典也皆不以無過為美而謂大善盛德在於改過日新成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴蓋為人之行已必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德日新是為君子遂非則其惡彌積斯謂小人故聞義能徙者常情之所難從諫勿咈者聖人之所尚至於贊揚君德歌述主功或以改過不吝為言或以有闕能補為美中古已降淳風浸微臣既尚諛君亦自聖掩盛德而行小道於是有入則造膝出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑譛臣之罪由此生媚道一行為害斯甚太宗文皇帝挺秀千古清明在躬再恢聖謨一變流弊以虛受為理本以直言為國華有面折廷爭者必為霽雷霆之威而明言奬納有上封獻議者必為黜心意之欲而手敕褒揚故得有過必知知而必改存致雍熙之化沒齊堯舜之名向若太宗狥中主之常情滯習俗之凡見聞過則羞已之短納諌又畏人之知雖有求理之心必無濟代之效雖有悔過之意必無從諌之名此則聽納之實不殊隱見之情小異其于損益之際已有若此相懸又况不及中才師心自用肆于人上以遂非拒諌孰有不危者乎且以太宗有經緯天地之文有底定禍亂之武有躬行仁義之德有理致太平之功其為休烈耿光可謂盛極矣然而人到于今稱詠以為道冠前古澤被無窮者則從諌改過為其首焉是知諌而能從過而能改帝王之美莫大於斯陛下所謂諌官論事少能慎密例自矜衒歸過於朕者臣以為不密自矜信非忠厚其於聖德固亦無虧陛下若納諌不違則傳之實足增美陛下若違諌不納又安能禁之勿傳伏願以貞觀故事為楷模使太宗風烈重光於聖代恐不可謂此為歸過而阻絶直言之路也臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之議是則聖賢為理務詢衆心不敢忽細微不敢侮鰥寡侈言無驗不必用質言當理不必違遜于志者不必然逆于心者不必否異於人者不必是同於衆者不必非辭拙而效速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他唯善所在則可以盡天下之理見天下之心夫人之常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所欲信既偏則聽言而不考其實由是有過當之言疑既甚則雖實而不聽其言於是有失實之聽輕其人則遺其可重之事欲其事則存其可棄之人斯並茍縱私懷不稽皇極于以虧天下之理于以失天下之心故常情之所輕乃聖人之所重圖逺者先驗於近務大者必慎於微將在博採而審用其中固不在慕髙而好異也陛下所謂比見奏對論事皆是雷同道聽塗說者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣但以陛下雖窮其辭而未盡其理能服其口而未服其心何以知其然臣每讀史書見亂多理少因懷感嘆嘗試思之竊謂為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願達於上上之情莫不求知於下然而下恆苦上之難達上恆苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辨給眩聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諌如是則下之諂諛者順㫖而忠實之語不聞矣上騁辨必勦說而折人以言上眩明必臆度而虞人以詐如是則下顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之說不申矣夫以區域之廣大生靈之衆多宫闕之重深髙卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其間則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然考其初心不必淫暴亦在乎兩情相阻馴致其失以至于艱難者焉昔龍逢誅而夏亡比干剖而殷滅宮竒去而虞敗屈原放而楚衰臣謂夏殷虞楚之君若知四子之盡忠必不勦棄若知四子之可用必不拒違所以至於忍害而捨絶者蓋謂其言不足行心不足保故也四子既去四君亦危然則言之固難聽亦不易趙武呐呐而為晉賢臣絳侯木訥而為漢元輔公孫𢎞上書論事帝使難𢎞以十䇿𢎞不得其一及為宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一酬一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才臣是以竊慮陛下雖窮其辭而未窮其理能服其口而未服其心良有以也古之王者眀四目達四聰蓋欲幽抑之必通且求聞已之過也垂旒於前黈纊於側蓋惡視聽之太察唯恐彰人之非也降及末代則反於斯聰明不務通物情視聽秪以伺罪釁與衆違欲與道乖方於是相尚以言相示以智相冒以詐而君臣之義薄矣以陛下性含仁聖意務雍熙而使至道未孚臣竊為陛下懷愧於前哲也古人所以有恥君不如堯舜者故亦以是為心乎夫欲理天下而不務於得人心則天下固不可理矣務得人心而不勤於接下則人心固不可得矣務勤接下而不辨君子小人則下固不可接矣務辨君子小人而惡其言過悅其順已則君子小人固不可辨矣趣和求媚人之甚利存焉犯顏取怨人之甚害存焉居上者易其害而以美利利之猶懼忠告之不蔇况有踈隔而勿接又有猜忌而加損者乎天生蒸人合以為國人之有口不能無言人之有心不能無欲言不宣於上則怨讟於下欲不歸於善則湊集於邪聖人知衆之不可以力制也故植謗木陳諌鼓列爭臣之位置采詩之官以宣其言尊禮義安誠信厚賢能之賞廣功利之途以歸其欲使上不至於亢下不至於窮則人心安得而離亂兆何從而起古之無為而理者其率用此歟茍有理之之意而不知其方茍知其方而心守不一則得失相半天下之理亂未可知也其又違道以師心弃人而任已謂欲可逞謂衆可誣謂專斷無傷謂詢謀無益謂諛說為忠順謂獻替為妄愚謂進善為比周謂嫉惡為嫌忌謂多疑為御下之術謂深察為照物之明理道全乖國家之顛危可立待也理亂之戒前哲備言之矣安危之效歷代嘗試之矣舊典盡在殷鑒足徴其於措置施為在陛下明識所擇耳伏願廣接下之道開奬善之門宏納諌之懷勵推誠之美其接下也待之以禮煦之以和虛心以盡其言端意以詳其理不禦人以給不自眩以明不以先覺為能不以臆度為智不形好惡以招諂不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍蚩而妍蚩自彰莫得而怨也有犯顏讜直者奬而親之有利口讒佞者踈而斤之自然物無壅情言不茍進君子之道浸長小人之態日消何憂乎少忠良何有乎作威福何患乎妄說是非如此則接下之要備矣其奬善也求之若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪㳙必容能小事則處之以小官立大勞則報之以大利不忌怨不避親不抉瑕不求備不以人廢舉不以已格人聞其才必試以事能其事乃進以班自然無不用之才亦無不實之舉如此則奬善之道得矣其納諌也以補過為心以求過為急以能改其過為善以得聞其過為明故諫者多表我之能好諌者直示我之能賢諫者之狂誣明我之能恕諌者之漏泄彰我之能從有一于斯皆為盛德是則人君之與諌者交相益之道也諌者有爵賞之利君亦有理安之利諌者得獻替之名君亦得採納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諌之德光矣其推誠也在彰信在任人彰信不務於盡言所貴乎出言則可復任人不可以無擇所貴乎已擇則不疑言而必誠然可以求人之聽命任而勿二然可以責人之成功誠信一虧則百事無不紕繆疑二一起則羣下莫不憂虞是故言或乖宜可引過以改其言而不可苟也任或乖當可求賢以代其任而不可疑也如此則推誠之義孚矣微臣所以屢屢塵黷而不能自抑者蓋以陛下有拯亂之志而多難未平有務理之誠而庶績未乂有堯舜聰明之德而未光宅於天下有覆載含宏之量而未翕受於衆情故臣每中夜靜思無不竊歎而深惜也向若陛下有其位而無必行之志有其志而無可致之資則臣固已從俗浮沈何苦而汲汲如是惟陛下詳省所闕亟行所宜歸天下之心濟中興之業此臣之願也億兆之福也宗社無疆之休也贄又上奏曰右欽溆奉宣聖㫖緣唐安公主喪亡不可向此間遷厝權令造一塔安置待收復京城即擬將歸以禮葬送所造塔役功費用亦甚微小都不合是宰相所論之事姜公輔忽有表奏都無道理但欲指朕過失擬自取名朕本拔擢將為腹心今却如此豈不負朕至深卿宜商量如何穩便者公輔頃在翰林與臣久同職任臣今據理辨直則涉於私黨之嫌希㫖順承則違於匡輔之義涉嫌止貽於身患違義實玷於君恩狥身忘君臣之耻也别嫌奬義主之明也臣今不敢冒行所耻亦賴陛下眀聖而鑒焉古語有之順㫖者愛所由來逆意者惡所從至故人臣皆爭順㫖而避逆意非忘家為國捐身成君者誰能犯顏色觸忌諱建一言開一說哉是以哲后興王知其若此求諫如不及納善如轉圓諒直者嘉之訐犯者義之愚淺者恕之狂誕者容之仍慮驕汰之易滋而忠實之不聞也於是置敢諌之鼓植告善之旌懸戒慎之鞀立司過之士猶懼其未也又設官制以言為常由是有史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗尚恐其怠也每嵗孟春遒人以木鐸狥于路而振警之官師相規工執藝事以諫其或不恭邦有常刑然非明智不能招直言非聖德不能求過行招直則其智彌大求過則其德彌光唯其衰亂之朝暗惑之主則必諱其過行忿其直言以阿諛為納忠以諫爭為揚惡怨讟溢於下國而耳不欲聞腥德達於上天而心不求寤逮乎顛覆猶未知非情之昏迷乃至於是故明者廣納以成德暗者獨用而敗身成敗之途千古相襲與敗同轍者罔不覆與成同軌者罔不昌以陛下日月之明江海之量自當矯夏癸殷辛拒諫飾非之慝協大禹成湯拜言改過之誠矧又時運方屯物情猶鬱乃是陛下握髮吐哺之日而宵衣肝食之辰士無賢愚咸宜録用言無大小皆務招延固不可復有忤逆之嫌甘辛之忌也夫君人者以衆智為智以衆心為心恆恐一夫不盡其情一事不得其理孜孜訪納唯善是求豈但從諌不咈而已哉乃至求謗言聽輿誦葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必達今公輔官在諫議任居宰衡獻替彌綸乃其職分比於芻蕘葑菲豈不優而且重哉此理之常奚足怪也縱使引喻非當不猶愈於輿誦乎矯激過深不猶愈於謗言乎晉文聽輿人之誦而霸業興虞舜設誹謗之木而帝德廣斯實聖賢之髙躅陛下何疾焉聖㫖又以造塔役費微小非宰相所論之事下臣愚戇竊謂不然當問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪夫小者大之漸微者著之萌故君子慎初聖人存戒知幾者所貴乎不逺而復制理者必在於未亂之前本立輔臣置之左右朝夕納誨意在防微微而弼之乃其職也㳙涓不遏終變桑田焰焰靡除卒燎原野流煽已甚禍災已成雖欲救之固無及矣書曰不矜細行終纍大德易曰小人以小善為無益而不為也以小惡為無傷而不去也故惡積而不可掩罪大而不可解然則小之不可不慎也如此陛下安得使之勿論乎虞書載咎繇之言曰兢兢業業一日二日萬幾兢兢慎也業業危也幾者動之微也唐虞之際主聖臣賢庶績咸熙萬邦已協而猶上下相戒既慎且危慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎舜之為君始作漆器羣臣固爭咸謂非宜漆器之為用也甚堅其為費也蓋寡然猶相繼諷諫者豈不欲杜其漸而慎其初歟是知君臣之間義同一體事罔大小相須而成故舜命其臣曰作朕股肱耳目夫股肱之奉元首不以煩細而闕於運行耳目之助於心靈不以么微而廢於視聽是以臣子之於君父也盡其敬而敬焉盡其愛而愛焉敬則願極於尊榮愛則懼陷於過惡萬邦黎獻莫不皆然而况位列朝廷任當輔弼主辱與辱主安與安此而不言誰復言者禮曰近而不諌則尸利也若宰相者可謂近矣事或乖誤得無諫乎武丁賢君也傅說賢相也而武丁引金作礪以命其相說諭木從繩以戒其君是則輔弼之任匡救攸屬巨細之事悉宜盡規陛下所言役費微小非宰相所論之事又謂指朕過失擬自取名此誠異乎愚臣之所聞是以願披肺腸而不敢自默者也若以諫爭為指過則剖心之主不宜見罪於哲王若以諌爭為取名則匪躬之臣不應垂訓於聖典獻替列職竟使奚為左右有人復將焉用臣竊謂指過以示直固不如改過以見稱進諫以取名固不如納諌之為美假有意將指過諫以取名但能聞善而遷見諌不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩已過而過彌著損彼名而名益彰果而行之所失大矣一獲一失可不慎乎伏願嘉忤㫖之忠祛逆耳之吝平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微忱贄又上奏曰右欽溆奉宣聖㫖省卿所奏姜公輔事宜雖甚知卿盡忠然似未㑹朕意朕意以公輔才行共宰相都不相當在奉天時早欲停罷後因公輔辭退朕已對面許訖尋屬懷光背叛遂且因循容到山南公輔知朕必擬移改所以固論造塔事賣直取名據此用心豈是良善朕所以惆悵者秪緣如此卿今疑朕不能納諫殊乖本意者臣以戇執務在朴忠推理而言有懷必盡睿意𤣥妙非凡所窺如臣懵昧之材且無希伺之志奏報失㫖宜其固然所冀録微欵而矜至愚實天下幸甚古人有言曰明主者可以理奪又曰主聖則臣直今陛下禀天縱之才備明聖之資臣若抱理莫伸守直不固上虧至化罪莫大焉輒復據直道而理其前言惟陛下留意幸察臣竊以領覽萬機必先虛其心鑑鏡羣情必先誠其意蓋以心不虛則物或見阻意不誠則人皆可疑阻於物者物亦阻焉疑於人者人亦疑焉萬物阻之兆人疑之將欲感人心致於和平盡物理使無紕繆是由却行而求及前人也無乃愈踈乎孔子曰不遷怒不億不信豈非懼於肆情逞憾以至於失中違道者哉臣之區區志欲匡輔是以前者奏疏願陛下平積憤之氣弭逆詐之情然後試以愚言反覆參校庶臻至理且亮微誠今陛下以素欲廢罷公輔之心而謂其所行皆非良善則是遷怒而積憤之氣未平也陛下揣公輔知必移改之意而謂其所言皆欲取名則是億不信而逆詐之情未弭也逆詐之弭積憤未平固宜公輔獲戾於蓄疑下臣見尤於乖意謂之至當則或不然夫臣之獻言以助理也君之求諫以弼違也言苟助理何必以人而廢言諫苟弼違何必責意而拒諫若彼言無足用意雖善而奚為諌有可從人雖咎而寧捨古先聖王所以採葑菲詢芻蕘傳謗言用仇怨急於聽納乃至於斯其意無他惟義所在願陛下不以憎嫌而遺其片善不務精察而謂之大明忠言者利於行而惴於情唯計慮至熟乃能無忤幸紆宸鑒更審所宜歷代名臣奏議卷二百一
