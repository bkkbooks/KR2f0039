body:
  text: 歷代名臣奏議卷一百九十九明楊士竒等撰求言周厲王時國人謗王召公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚於防川川壅而潰傷民必多民亦如之是故為川者決之使導為民者宣之使言故天子聽政使公卿至於列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以阜財用衣食者也夫民慮之心而宣之口成而行之胡可壅也若壅其口其與能幾何王不聽齊威王時鄒忌修八尺有餘身體昳麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及公也城北徐公齊國之美麗者也忌不自信而復問其妾曰吾孰與徐公美妾曰徐公何能及君也旦日客從外來與坐談問之客曰吾與徐公孰美客曰徐公不若君之美也明日徐公來孰視之自以為不如窺鏡而自視又弗如逺甚暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也客之美我者欲有求于我也于是入朝見威王曰臣誠知不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求於臣皆以為美于徐公今齊地方千里百二十城宫婦左右莫不私王朝廷之臣莫不畏王四境之內莫不有求于王由此觀之王之蔽甚矣王曰善乃下令羣臣吏民能面刺寡人之過者受上賞上書諫寡人者受中賞能謗議于市朝聞寡人之耳者受下賞令初下羣臣進諫門庭若市晉武帝泰始初尚書李胤上奏曰古者三公坐而論道內參六官之事外與六卿之教或處三槐兼聽獄訟稽疑之典謀及卿士陛下聖德欽明垂心萬機猥發明詔儀刑古式雖唐虞疇咨周文翼翼無以加也自今以往國有大政可親延羣公詢納讜言其軍國所疑延詣省中使侍中尚書咨論所宜若有疾疢不任覲會臨時遣侍臣訊訪詔從之後周武帝保定二年以于謹為三老帝親幸太學以食之曰猥當天下重任自惟不才不知政術之要公其誨之三老答曰木從繩則正君從諫則聖自古明王聖主皆虛心納諫以知得失天下乃安惟陛下念之唐太宗貞觀元年太宗謂侍臣曰正主任邪臣不能致理正臣事邪主亦不能致理惟君臣相遇有同魚水則海內可安朕雖不明幸諸公數相匡救冀憑直言鯁議致天下于太平諫議大夫王圭對曰臣聞木從繩則正君從諫則聖故古者聖主必有爭臣七人言而不用則相繼以死陛下開聖慮納芻蕘愚臣處不諱之朝實願罄其狂瞽佐萬分一太宗曰善詔令自是宰相入內平章國計必使諫官隨入預聞政事有所開説必虛已納之二年太宗謂侍臣曰明主思短而益善暗主護短而永愚隋煬帝好自矜誇護短拒諌誠亦實難犯忤虞世基不敢直言或恐未為深罪昔箕子佯狂自全孔子亦稱其仁及煬帝被殺世基合同死否杜如晦對曰天子有爭臣雖無道不失其天下仲尼稱直哉史魚邦有道如矢邦無道如矢世基豈得以煬帝無道不納諫諍遂杜口無言偷安重位又不能解職請退則與箕子佯狂而去事理不同昔晉惠帝賈后將廢愍懷太子司空張華竟不能苦爭阿意茍免趙王倫乃舉兵廢后使讓張華華曰將廢太子日非是無言當時不被納用其使曰公為三公太子無罪被廢言既不從何不引身而退華無詞以答遂斬之夷其三族古人云危而不持顛而不扶則將焉用彼相故君子臨大節而不可奪也張華既抗直不能成節遜言不足全身王臣之節固已墜矣虞世基位居宰輔在得言之地竟無一言諫爭誠亦合死太宗曰公言是也人臣必須忠良輔弼乃得身安國寧煬帝豈不以下無忠臣身不聞過惡積禍盈滅亡斯及若人主所行不當臣下又無匡諫茍在阿順事皆稱美則君為暗主臣為諛臣主暗臣諛危亡不逺朕今志在君臣上下各盡至公共相切磋以成理道公等各宜務盡忠讜匡救朕惡終不以直言忤意輒相責怒四年太宗問蕭瑀曰隋文帝何如主也對曰克已復禮勤勞思政每一坐朝或至日昃五品已上引坐論事宿衛之士傳飱而食雖性非仁明亦是勵精之主上曰公知其一未知其二此人性至察而心不明夫心暗則照有不通至察則多疑於物又欺孤兒寡婦以得天下恆恐羣臣內懷不服不肯信任百司每事皆自決斷雖即勞神苦形未能盡合于理朝臣既知其意亦不敢直言宰相已下惟承順而已朕意不然以天下之廣海內之衆千端萬緒須合變通皆委百司商量宰相籌畫于事穩便方可奏行豈得以一日萬幾獨斷一人之慮也且日斷十事而五條不中中者信善其如不中者何以日繼月乃至纍年乖謬既多不亡何待豈如廣任賢良髙居深視法令嚴肅誰敢為非因令諸司若詔敕頒下有未穩便者必須執奏不得順旨便即施行務盡臣下之意十七年太宗謂魏徴曰比來朝臣都不論事何也徴對曰陛下虛心採納誠宜有言然古人云未信而諫則謂之謗已信而不諫謂之尸祿但人之材器各有不同懦弱之人懷忠直而不能言踈逺之人恐不信而不得言懷祿之人慮不便身而不敢言所以相與緘默俯仰過日太宗曰誠如卿言朕每思之臣欲進諫輒懼死亡之禍與赴鼎鑊冒白刃亦何異哉故忠貞之臣非不欲竭誠乃是極難所以禹拜昌言豈不謂此朕今開懷抱納諫諍卿等無勞怖畏遂不極言太宗又謂魏徴曰朕觀近古帝王有傳位十代者有一代兩代者亦有身得身失者朕所以常懷憂懼或恐撫養生民不得其所或恐心生驕逸喜怒過度然不能自知卿可為朕言之當以為楷則徴對曰嗜欲喜怒之情賢愚皆同賢者能節之不使過度愚者縱之多至失所陛下聖德玄逺居安思危常能自制以保克終之美則萬代永賴太宗時踈勒朱俱波甘棠遣使貢方物太宗謂羣臣曰向使中國不安日南西域朝貢使亦何緣而至朕何德以堪之觀此翻懷危懼近代平一天下拓定邊方者唯秦皇漢武始皇暴虐至子而亡漢武驕奢國祚幾絶朕提三尺劒以定四海逺夷率服億兆乂安自謂不減二主也然念二主末塗皆不能自保由是每自懼危亡必不敢懈怠惟藉公等直言正諫以相匡弼若惟揚美隱惡共進諛言則國之危亡可立而待也左右皆曰陛下求言如此誠社稷之福也太子右庶子髙季輔上疏陳得失太宗特賜鍾乳一劑謂曰卿進藥石之言故以藥石相報太宗又謂孫伏伽曰今以公為諫議大夫必須獻可替否又謂侍臣曰公等全無諫爭魏徴對曰昔者齊景公射不中的而左右俱稱其善景公曰自晏子死不復聞寡人之過弦章對曰上之所好下必從之君若以謇諤為忠則人皆晏子陛下每稱述忠諫之士若有事須獻替誰敢不盡其忠太宗又謂侍臣曰比兩三月來不見公等讜言未知以朕不可諫爭隱而不言為是庶事咸得不須論也魏徵對曰陛下每見一事即為鑒誡臣等深識聖情必事理有違豈敢隱而不奏然比來大使既出內外無事所以不論玄宗天寶十五年帝在蜀有老父郭從謹進言曰安祿山包藏禍心固非一日有告其謀者陛下往往誅之使得逞其姦逆致陛下播越是以先王務延訪忠良以廣聰明蓋為此也臣猶記宋璟為相數進直言天下賴以安自頃以來在廷之臣以言為諱闕門之外陛下皆不得知草野之臣必知有今日久矣但九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎帝曰朕之不眀悔無所及慰諭而遣之德宗時翰林學士陸贄上奏曰朝隱昨日奉宣聖旨逆賊雖退猶未收城令臣審思當今所務何者最切具條録奏來者伏以初經大變海內震驚無論順逆賢愚必皆企竦觀聽陛下一言失則四方解體一事當則萬姓屬心動關安危不可不慎臣謂當今急務在于審察羣情若羣情之所甚欲者陛下先行之羣情之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫于人心況乎當變故動搖之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖邦家乎此誠當今之所急也然尚恐為之不易者蓋以朝廷播越王命未行施之空言人或不信何以言其然今天下之所欲者在息兵在安業天下之所惡者在斂重在法苛陛下欲息兵則寇孽猶存兵固不可息矣欲安業則征徭未罷業固未可安矣欲薄斂則郡縣懼乏軍用令必不從矣欲去苛則行在素霽威嚴言且無驗矣此皆勢有所未制意有所未從雖施于德音足慰來蘇之望而稽諸事實未符悔過之誠且動人以言者其感不深動人以行者其應必速蓋以言因事而易發行違欲而難成易發故有所未孚難成故無思不服今陛下將欲平禍亂拯阽危恤黎蒸安反側既未有息人之實又乏于施惠之資唯當違欲以行已所難布誠以除人所病乃可以彰追咎之意副惟新之言若猶不然未見其可頃者竊聞輿議頗究羣情四方則患于中外意乖百辟又患于君臣道隔郡國之志不達于朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際真偽雜糅於其間聚怨嚻嚻騰謗籍籍欲無疑阻其可得乎物論則然人心可見蓋謂含𢎞聽納是聖主之所難鬱抑猜嫌是衆情之所病伏惟陛下神無滯用鑒必窮微愈其病而易其難如淬鋒潰疣決防注水耳可以崇德美可以濟艱難陛下何慮不行而直為此凛凛也臣謂宜因文武羣官入參之日陛下特加延揖親與敘言備詢禍亂之由明示咎悔之意各使極言得失仍令一一面陳軍務之除到即引對不拘時限用表憂勤周公勤握髮吐餐而天下歸心則此義也又當假之優禮恱以溫顔言切而理愜者必賞導以盡其情識寡而辭拙者亦容恕以嘉其意有諫諍無隱者願陛下叶成湯改過之美褒其直而勿吝其非有謀猷可用者願陛下體大禹拜言之誠奬其能而亟行其䇿至于匹夫片善採録不遺庶士傳言聽納無倦是乃總天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂化疑梗為欣合易怨謗為謳歌浹辰之間可使丕變陛下儻行之不厭用之得中從義如轉圓進善如不及推廣此道足致和平其於昭德塞違恐不止當今所急也慮有愚而近道事有要而似迂冀垂睿思反覆詳覽必或無足觀採捨棄非遙穆宗初立逸遊荒恣監察御史楊虞卿上奏曰烏鳶遭害仁鳥逝誹謗不誅良臣進臣敢冒誅獻瞽言臣聞堯舜以天下為憂不以位為樂況今朔部方梗西戎弗靖兩河有瘡痏之虞五嶺罹氛厲之役人之疾苦積下朝之制度莫修邊亡見儲國用寖屈固未可以髙枕而息也陛下初臨萬幾宜有憂天下心當日見輔臣公卿百執事垂意以問使四方內外灼有所聞而聽政六十日入對延英獨三數大臣承聖問而已他內朝臣偕入齊出無所咨詢諫臣盈廷忠言不聞臣實羞之蓋主恩踈而正路塞也公卿大臣宜朝夕燕見則君臣情接而治道得矣今宰臣四五人咸頃刻侍坐鞠躬隕越隨旨上下無能往來此繇君太尊臣太卑故也公卿列位雖陟降清地曽未奉優眷承下問雖陛下神聖如五帝猶宜周爰顧逮惠以氣色使支體相成君臣昭明陛下求治于宰相宰相求治于臣等進忠若趨利論政若訴寃此而不治無有也自古天子居危思安之心同而居安慮危之心則異故不得皆為聖明也後唐廢帝清泰二年帝以時事為憂嘗從容讓宰相盧文紀等無所規贊文紀上言曰臣等每五日起居與兩班旅見侍衛滿前雖有愚慮不敢敷陳竊見前朝置延英殿或宰相欲有奏論天子欲有咨度皆非時召對旁無侍衛故人得盡言望復此故事帝詔曰舊制以五日起居百僚俱退宰相獨升若常事自可敷奏或事應嚴密聽于閣門奏榜子當盡屏侍臣于便殿相待何必襲延英之名也宋太宗太平興國中言事者衆詔閣門非涉僥望乃許受之繇是言路稍塞直史館謝泌上奏曰狂夫之言聖人擇焉茍詰而拒之四聰之明將有所蔽願采其可者拒其不可者庶顒顒之情得以上達帝然之仁宗天聖三年右正言劉隨乞顧問諫官疏曰臣伏念景德天禧之間九域晏清四夷欵附生物咸遂祥瑞􅥐臻而猶下賢能之詔求諫諍之官豈不以萬機至繁慮措置之或爽八紘至廣非耳目之獨知是以雖居安而慮危思長轡以逺馭也其後唯得魯宗道劉燁二人充職精擇之難一至于此洎皇太后陛下受顧託之重皇帝陛下自臨御已來萬國歡心百官承式而乃憂勤庶政修舉舊章復置諫官委以言事臣最為愚懦亦預柬求方竭駑鈍少伸補報旋因公纍出領外官三年替還復命供職誓堅勤藎罔避誅夷夫以品位甚卑責任甚重道君親之過失指權勢之非違冒雷霆之威掇姦邪之怒在于小臣固當難事若非恕其狂妄俾盡誠懷鉗口保身或孤任使臣欲詳觀先帝之詔上報兩宫之恩凡有侵紊朝綱干竊政柄姦憸冒寵賢俊久沈憲綱涉寃賞典過制蠧政之類知而必言言之中否唯聖人擇之而已念臣塵諫職內外三年除朝請之外未嘗一登金殿略近天顔雖名侍從之官實為踈逺之迹唐初置拾遺補闕掌侍從諷諫日親旒冕凡事得以盡言蓋自唐末已後權臣阻絶雖不預于宴逰亦專司于諫諍洎太宗皇帝改為正言司諫精擇流品號為清華既為耳目之官宜審詢訪之地式期顧問願竭愚誠故不敢朋附班聮蒙昧日月有違詔旨自速靈誅景祐二年御史中丞杜衍上奏曰臣聞三公之官至重所以經邦萬事之統實繁貴乎燭理故明主躬親庶政體貌大臣常于進見之間俾盡論思之道蓋君臣相遇則可致時雍上下不交則謂之否塞固在倚毗丞弼詢訪善謀使下情必通上澤無壅斯有國有家之大務也臣伏見中書樞密之官是皆選自宸𠂻委之柄用領三事之職佐萬機之劇古所謂坐而論道者也今乃每遇剛辰得親丹扆外朝始罷延英次對中覆奉行祗循常務以天下之大民事之艱恐非數刻之中可盡研幾之理欲望聖慈當清間之燕迭召兩府臣僚賜坐便殿一月之中只乞三兩次召對俾其極獻替之説酌古今之宜究治亂之源達幽隱之意上以成好問之裕下以申納忠之誠明良之歌上下同體是故平時而論可明其體要之變臨事而辨或近乎逰説之嫌以虞舜之時而云好察邇言以漢文之達亦曰無甚髙論此實通國體用衆智之大端也至于鹽米之細務叢脞之末莭此特有司之職耳不當取決于宸斷宜詔所司科管之庶其正小大之分適權義之中延納訏謨開蓋聖智提綱總要叶大德之不踰造膝虛懷明為善之最樂臣猥以庸望輒罄愚𠂻干冒威嚴隕越無地光祿寺主簿蘇舜欽上奏曰臣聞治平之君使危亡禍亂之言不離於耳則天下庶可久安也髙位之臣使顛覆竄殛之禍不絶於心則百職可以無曠也苟治平而忽危亡未有不危亡者也髙位而忘顛覆未有不顛覆者也此物理之常勢古今之定分也歷觀前代聖神之君好聞乎讜議賢明之輔不壅乎下情蓋以四海至逺民有隱匿不可以遍照故無間愚賤之言而擇用之萬機至繁事有習弊不可以獨覽故必求衆多之議以更張之然後朝無遺政物無遁情雖有佞人邪謀莫得而進也臣昨覩詔書戒越職言事者播告四方無不驚惑往往竊議恐非本于宸𠂻蓋陛下即位已來屢詔羣下以來鯁直故百僚皆得轉對又置匭函設直言極諫科今詔書如此是與前事相違豈非大臣蔽塞陛下聰明杜絶忠良之口不惟虧損朝廷大政實亦自取覆亡之道夫納善進賢宰相之事蔽君自任未或不亡今諫官御史又多出其門下但務希旨即取好官多士盈庭噤不得語陛下垂拱法宫之內何由得聞天下之務乎臣前見陛下以孔道輔范仲淹剛直不撓致位臺諫後雖改他官不忘獻納此二臣者非不知緘口數年坐得卿輔蓋不敢負陛下委注之意虧臣子忠義之莭而皆罹中傷竄謫不假使正臣奪氣鯁士咋舌目覩時弊口不敢論昔晉公問叔向曰國家之患孰為大對曰大臣持祿而不極諫小臣畏罪而不敢言下情不得上通此患之大者是故漢文感女子之説而肉刑是除武帝聽三老之議而江充以族肉刑古法江充近臣女子老人愚耄踈隔之至也豈以義之所在賤不可忽二君從之後世稱聖況國家班設爵位列陳豪英故當責其公忠安可教之循默賞之使諫尚恐不言罪其敢言孰肯獻納物情閉塞上位孤危軫念于兹可為驚怛伏望陛下霈發德音追寢前詔勤于采納下及芻蕘求覩四海之安危垂念朝廷之闕失見所未見日新又新故可常守隆平保全近輔若詔榜未削欺罔成風則不唯堂下逺于千里竊恐指鹿為馬之事復見于今朝也臣區區以此言達于冕旒者非不知出口禍從為衆憫笑蓋欲陛下一悟則天下蒙福以臣之軀質蒼生之命亦以大矣伏望陛下留意焉慶歷五年知諫院余靖上奏曰臣竊見朝廷每有契丹遣使到闕元昊差人來朝大臣商量唯欲祕密兩制兩省御史中丞已下雖名侍從供奉之官當時並不聞知及處置既了縱或不便無由論列臣思國家建置侍從之官以備顧問諫諍之官以救闕失蓋欲謀無遺䇿故也漢武帝征伐西戎開置邊郡侍從之官嚴助朱買臣之徒常與大臣論議大臣數屈漢史稱之以為美談今柄臣密議外不得聞一慮或失救之不及勢之可憂者也伏乞宣諭大臣凡北敵西戎之事繫於安危者侍從諫諍之官悉令聞之使陳利害不為漏泄傳云謀之欲多斷之欲獨此御國之要也惟陛下裁之八年殿中侍御史何郯乞許兩制兩省上章論事疏曰臣竊以古者人君聽政以天下至廣非一人聰明所能盡是故內取公卿大夫謀於朝外採百工庶人議於下使下情無不通然後中外相濟政理所以無過差焉今國家設侍從之官自翰林學士至天章閣待制皆取文學極選以備顧問公卿之材並由此出自頃相承朝廷惟以文翰待之而不責其言議臣下亦以職分當爾而自安於循默以天下利害之大被言責者唯御史臺官僅十餘貟而欲陛下聰明無遺政理無所失者不可得矣唐太宗置十八學士與之議天下事故貞觀一代稱為至治斯從臣輔助之明效也在明皇時則有集賢學士張説以圗國政在德宗時則有翰林學士陸贄以參戎機以至憲宗得李絳而斥近幸之弊敬宗因韋處厚而辨忠邪之分皆由時君開懷用意以待臣下故感慨之士得以效其節今天下多故政令舛失者不一使賢智之士驅馳尚恐不足救其弊若猶復雍容拱默為髙以言議非所責則朝廷之事何寄焉近日伏聞中詔命羣臣論議時事斯誠陛下求治之志務通塞蔽然恐天下利害非一日可盡條陳欲乞特頒詔旨告諭兩制兩省臣寮自今有聞朝廷闕失政令過差軍機利害雖非言職並許上章論列仍委中書置籍具録所上章疏遇欲進用臣寮令取有裨補多者用為選首所冀親侍之臣各知責任務圗傾竭以助政化至和二年侍御史趙抃上奏曰臣伏覩中書劄子奉聖旨下御史臺根勘太常博士祕閣校理王起虛妄上言定州夜會擲磚瓦等事見追禁鞫問次臣嘗聞太宗皇帝朝雍邱縣尉武程上疏願減後宫嬪嬙太宗謂宰臣曰武程疏逺小臣不知宫闈中事內庭給使不過三百人皆有掌執不可去者卿等固合知之時李昉奏武程妄陳狂瞽宜行黜削以懲之太宗曰朕曷嘗以言罪人但念其不知耳終不之罪今起志在憂國用心無他若緣此獲譴臣恐中外臣僚人人緘默雖有機密急速大事誰敢復措一詞言路榛塞由此始矣伏望陛下上念太宗皇帝不罪言事者之誠恕起之罪以廣睿聰有益聖仁若然則堯採誹謗舜逹聰明禹拜昌言漢詔不諱不獨稱美于前世矣三年知諫院范鎮上奏曰臣伏見先朝以御寶印歷紙給言事官令以時奏上所以課得失而殿最之也恭以陛下天資寬仁喜聞諫諍考于施用其實無幾深恐大臣不甚將順所以言者多見廢格臣欲乞據今御史諫官見貟于禁中及中書樞密院人置一簿每一章奏即簿上之在禁中者陛下時時觀覽以備遺忘以觀言者得失有可施行即敕大臣施行其在中書樞密院者亦令大臣為詳閲其已行未行勾注每季終録付史館庶使後世知陛下納諌求治之意仍令言者不敢妄有奏論仁宗時知諌院司馬光乞施行制䇿劄子曰臣竊以國家夲置六科蓋欲以上觀朝政之得失下知元元之疾苦非為士人設此以為進取之階也臣昨差覆考應制舉人所制䇿竊見上等三人所陳國家大體社稷至計其間甚有可采擇者伏望陛下取正本留之禁中常置左右數加省覽以為警戒其副本下之中書令擇其所言合於當今之務者奏而行之使四方之人皆知朝廷求直言之士非以飾虛名乃取其實用也及臣前獻五規雖智識暗淺辭語鄙陋然皆臣夙夜盡忠竭誠以思治世之要道非指陳一事之得失於有司無所施行亦望陛下以視朝之隙時取觀之庶幾於聖政或有萬分之益劉敞上奏曰臣近曽密獻愚忠乞特降手詔諭與閣門前後殿聽政稍增數刻足以廣聰明收衆心未蒙采納伏念九月以後晝漏益短日始東出已涉辰初比至百官起居二府奏事逡巡俯仰便及辰正實恐羣臣因此請對稀少習俗既成下情壅隔甚非陛下憂勤萬機之意臣謂自九月以後用已初為限三月已後用辰正為限雖升降止于數刻之間其于收斂羣情已無量矣臣又竊聞頃來奏事者雖有可否罕聞德音君臣之情亦似未通且萬乘至尊羣下至卑以至卑接至尊甚難也皆考據條制齊戒沐浴乃得一見自以為千載之遇而曽不蒙少垂察問盡其忠藴則人人抑默退而失望臣願陛下延見上殿臣僚仍賜委曲訪問侍從之臣則問以治體言事之臣則問以所言財利之臣則問以國計守土之臣則問以民俗如此則朝廷得失人情善惡無不聞者矣易曰唯君子為能通天下之志而天下不治者未之有也臣忝近列無補聰明輒貢所聞伏增戰恐英宗即位殿中侍御史司馬光乞延訪羣臣上殿劄子曰臣聞天尊地卑道之常也而周易乾下坤上謂之泰者蓋言人君降心以接臣人臣竭忠以事君然後上下交而其志同也若人君驕亢以自尊人臣怠慢以自踈則上下之情不通而否道成焉是以孔子語舜之德曰舜好問而好察邇言其斯以為舜乎竊見祖宗之時間居無事常召侍從近臣與之從容講論萬事至于文武朝士使臣選人凡得進見者往往召之使前親加訪問委曲詳悉無所不至所以然者一則欲使下情上通無所壅蔽二則欲知其人能否才器所任是以黜陟取捨皆得其宜太平之業由此而致恭惟陛下潛德藩邸踰三十年一旦龍飛奄有四海雖聖質英睿得于天縱然與當世士大夫未甚相接民間情偽未甚盡知臣謂宜詔侍從近臣每日輪一貟直資善堂夜則宿于崇文院以備非時宣召若有事故請假則與以次官互換直宿其餘羣臣進見及奏事者亦望聖慈稍解嚴重細加訪問以開廣聰明禆益大政光又上劄子曰臣先曽上言乞詔侍從近臣每日輪一貟直資善堂夜則宿于崇文院以備非時宣召若有事故請假則與以次官互換直宿以開廣聰明裨益大政至今未聞施行蓋陛下謙謹以皇太后同聽庶政未奉慈旨不敢擅召羣臣與之議論今皇太后盡以四海之事歸于陛下出入起居頥指如意臣是以敢重申前説乞少加采擇凡人墻之外目不見也里之前耳不聞也而天子奄有四海一日萬機民之憂樂事之本末雖有聰明睿知之性若不問之于人何從知之是以太祖太宗雖起于側微猶日孜孜訪問羣下至于小臣卒伍亦無所間絶故能紀綱四方創業垂統陛下生為帝王子孫未嘗歷事于外天下之事豈能細知況先朝置直學士待制等職以為侍從之臣若使之不得朝夕在左右備顧問將安用之所有每夜于崇文院輪宿自是舊制近年以來因循隳廢舉而行之有何所難伏望聖慈檢會臣前來所奏劄子內事節特賜施行光又上劄子曰臣前者兩次上言乞詔待從近臣每日輪一員直宿資善堂夜則宿於崇文院以備非時宣召若有事故請假則與以次官互換直宿亦曾面奉德音云欲自以聖意宣諭政府施行此事自後至今未聞施行臣不避煩瀆天聽再三進言者蓋以為國之要在於審察人材周知下情而已審察人材之謂明周知下情之謂聰明則百官稱其職聰則萬幾當其理百官稱其職萬幾當其理治之極也賢不肖混殽之謂昏下情不上通之謂蔽昏則百職隳曠蔽則萬幾乖戾百職隳曠萬幾乖戾亂之至也治極則安亂至則危故聰明昏蔽者治亂之大本也今陛下即政之初厲精求治而不以此事為先欲以興隆祖業垂裕後昆是猶却行而求及前人也故臣不得不勤勤懇懇為陛下再三言之書稱堯之德曰稽于衆舍己從人稱舜之德曰賓于四門明四目達四聰故能咸熙庶績格于上下至今言聖人者無不以二帝為首何哉聰明故也秦二世納趙髙之謀恐譴舉不當見短于大臣而深拱禁中漢靈帝惑趙忠之言謂人君登髙則百姓散離而不敢登臺榭北齊後主志度儒懦不喜見朝士非私眤未嘗交語隋煬帝沈湎淫泆常在後宫盜賊滿天下恐人言之是以上下怨叛至於殺身滅國而終不自知後世言無道者無不以四君為首何哉昏蔽故也太祖太宗起于側微天下艱難民間情偽無不備知然南面之日延訪羣臣惟恐不及晝日不足繼之以夜下至役夫田婦無不詢察以盡其情用能創業垂統力致太平陛下以帝王子孫生長富貴朝士大夫素未相接耕織勞苦不經耳目當兹親政之始雖孜孜下問朝夕不倦以察人情猶恐不盡況深居九重非視朝之時不見羣臣羣臣非官位職事有例上殿無由進見顒卬淵默以嚴重自居將使幽逺之民銜寃失職者何由上聞踈賤之臣懷材藴德者何由自達分國家安危之所哉將于此乎在臣是以不勝憤悶區區盡忠重為陛下陳之伏望陛下察為國之要觀唐虞之所以興秦漢齊隋之所以亡繼祖宗之志以守太平之業檢會臣前來所奏兩劄子內事節早賜施行實天下幸甚光又上劄子曰臣屢曽上言乞詔侍從近臣每日輪一貟直資善堂夜則宿於崇文院以備非時宣召亦曽面奉德音云候秋涼當頻有宣召今已秋涼尚未聞有曽被召之人臣始者上言之時竊見陛下欣然開納將謂即時施行自後遷延日久聖意漸以為難臣竊意內外之臣必有欺惑天聽沮難此事欲陛下常居禁中不與羣下相接以壅蔽聰明專固權寵者此豈忠臣之所為而陛下之福邪臣願陛下深察此情斷自聖志使之更直陛下每日聽政餘暇宫中無事之時特賜召對與之從容講論古今治體民間情偽使各竭其胸臆所有而陛下更加采擇是者取之非者捨之忠者進之邪者黜之如此則下情盡達聖德日新矣若以資善堂體例稍生則學士待制於崇文院輪宿自有在彼祗候宣召其有事故請假者須與以次官互換直宿此事極其難行而所益甚大惟陛下留意光又上劄子曰臣竊見祖宗之時纍曽令朝臣轉對或遇災異更廣求直言真宗咸平景德之間詢訪尤切其詔書云涉詆許者固可優容乏詞藻者許其直致是時羣臣上書言事者日不下百餘封每戒敕閣門令疾速進入詔樞密直學士馮拯陳堯叟令詳定以聞所以然者不惟考時政之得失亦以觀羣臣之能否也是故太宗時得寇準真宗時得張知白皆因上書言事驟加擢用後為宰相俱著名迹景德元年六月內出朝士邊肅等二十四人姓名令于崇政殿引對在外者驛召赴闕其後稍稍進用多為名臣此皆近事易法者也陛下踐阼未久羣臣能否恐未遍知欲乞依祖宗舊制每遇內殿起居日常令朝臣兩人轉對其餘在京及外處臣僚有欲上書言事者所在官司皆不得壅滯彼必欣然承命各竭所懷然後陛下親加省覽必有所得若上書者稍多陛下不能一一遍觀即乞擇近臣識慮明達用心公正者二人先次看詳但求理道切當不取文辭華美分為數等各以貼黃節出事宜置之于前然後奏御陛下更以聖意擇其善者特令引對面加詢訪若實有可采其所言之事即為施行仍于禁中籍記姓名每遇有重難公事試委之幹辦俟果有功效乃加進用如此則天下之才盡在目前可以器使雖堯舜之世嘉言罔攸伏野無遺賢亦不是過也不然若但循故事止作虛名所上之書未必省覽雖復省覽亦無施設則無益于事不如不為也治平中知諫院吕誨乞詔中外咸上封事疏曰臣恭惟聖德踐阼之初臨朝聽斷搢紳歡抃中外同慶方天下延頸傾耳仰奉新政宜有講求以厭羣望竊以章聖皇帝御正殿之二日詔羣臣直言抗疏自古求治之君未有如是之切也有以知開闢言路誠邦國之首務矣陛下承先帝仁明之治萬機無闕臣尚慮四方幽逺明有未燭百執因循事或過舉在繼述之體所繫尤重臣欲乞陛下特降明詔俾中外臣僚咸上封事指陳朝政之闕失時務之利害採擇善言恢張治道則下情無壅聖聰日廣昌明盛業自此而始羣心慶賴不勝大幸殿中侍御史范純仁乞詔臣寮上封章陳闕失疏曰臣伏見近者水災為害萬衆失寧愁痛未平繼以淫雨隂沴不解人益無聊陛下軫慮至深嘗降詔旨責躬求諫非不丁寧多士盈庭徒為竊議未聞各明上封章副陛下之意者其間或有奏疏亦未聞采擇施行羣下有未通之情朝廷無恤災之實以致天意未順人罹其殃若非陛下至德動天推誠納諌則恐未能上承天戒下格太和伏望聖慈特降詔諭令兩制近侍及三司副使已上臣寮並須令逐貟各上封章指陳時政闕失其省府館閣諸司主判朝臣及常參官等並令依次轉對各依故事如此忠言可盡下情可通聖政之得失必聞羣臣之能否皆見惟祈天造俯納愚誠純仁又上疏曰臣近日曽上封奏乞降詔令兩制及三司副使已上臣寮逐貟各上封事及諸司主判常參官等依次轉對至今不蒙施行伏惟陛下臨御之初天下延頸企足觀望聖化正宜博覽羣䇿通達下情使四方之利病必聞羣下之能否皆見然後可以布順民之政恢太平之風固不當以聽覽為煩而以多言為厭也況自古昔有敷奏以言之法官師相規之誡瞽為詩工誦針大夫規誨士傳言皆所以深采羣言裨助時政之道也近世則有百僚轉對之法本朝纍聖悉曽行之非臣至愚獨有是説伏望聖慈體明目達聰之道念羣情壅塞之弊將臣所奏付中書門下檢會施行則天下幸甚起居舍人傅堯俞上奏曰臣伏以近侍臺諌官皆天子耳目心腹所上章奏宜即達聖聽乃與其他文字一例進入脫有留滯遺失內外不得相知自來别無關防竊慮未為便穩欲乞指揮禁中置簿專令人管勾逐日具有無及職位姓名章奏道數畫一抄上仍令通進司逐日亦依此畫一開坐關送閣門閣門每日于引公事前先次進呈俟陛下親覽訖然後付內照會遇前後殿不坐即令閣門具狀直進如有留滯遺失可以根逐施行神宗初即位下詔曰朕以菲德承至尊託于公卿兆民之上惟治忽在朕躬夙夜兢兢上思有以奉天命下念所以修政事之統愧不敏明未燭厥理夫開言路通上下之志欲治之主所同趣也其布告內外文武羣臣若知見思慮之所及至于朝之闕政國之要務邊防戎事之得失郡縣民情之利害各令直言抗疏以聞無有所隱言若適用亦以得人觀其器能當從顯擢風爾文武其各體朕意庶兹令之非徒下也于是御史知雜事劉述上奏曰臣伏覩近降詔敕許內外文武羣臣直言朝之闕政國之要務邊防戎事之得失郡縣民情之利害此誠陛下悉心求治虛已待人圖新庶政之當先也天下幸甚臣竊思之內外文武職官固多英俊之士其間論議或有可取然不若侍從臺閣乃天下賢才之所聚也臣欲乞特降聖旨取當今之急務問以所宜令兩制兩省及館閣臣僚一一條對既以究其利病亦以見其器能候內外諸處奏到文字就兩制館閣中擇智識優長練習時務者三四人置局看詳評議逐旋其事理于所屬中書密院參覆商量然後進呈取旨施行所冀庶政交修下情盡達熙寧元年龍圗閣直學士韓維上奏曰臣近嘗面奏降黜陳習有虧陛下信令理須追革自爾未聞别有處分尋屬迫近郊祠不及繼有論列臣伏以人主深居九重之中所以鼓動羣衆共成天下之務惟在號令而已則其出之豈可以不慎行之豈可以不信陛下即位之初命羣臣轉對其詔文曰斥有位之阿私又曰郡縣之官課空文而尸素仰詳明詔之意是開羣臣以盡言使其抱負隱伏悉以上聞然後公議審擇以輔初政之美陳習所言臣雖不盡知然聞其大略詆人過失耳使其所言而是乃所以上副詢求之意若其非也猶當函忍以勸來者今所言之事未察虛實而言事之人已加斥貶自違明詔之本意而失大信於初政未獲其利乃更有害此臣愚所未諭也昔晉文霸駮之君商鞅刻核之臣耳尚知假伐原徙木以著其信然後政令可得而行人民可得而使也豈為人主而不務此乎議者或謂陳習素行非美今所言頗挾怨害得貶不為不幸此又流俗不知大體者之言無足采信藉使習實有此乃自匹夫之惡耳匹夫之惡不懲於朝政未為甚損使天下之人疑陛下于不信臣竊以為害無甚于此者陛下若不以此為失亟加追改而乃欲博詢細故以補聰明臣恐陛下思慮雖逺而所及者愈近施設雖多而所得者愈少也伏望聖慈特賜指揮追還誤罰昭示大信知諌院范純仁乞詔近侍陳朝廷闕失疏曰臣竊以古者三公之下即建九卿皆以左右王朝協贊治道蓋祿厚者其報宜重位髙者其責當深理之必然不容僭濫本朝自兩府之下亦設侍從之官自待制諫議已上學士舍人皆是古來九卿之職朝廷待之恩禮既異士民瞻仰位貌亦崇是宜朝夕論思同國休戚今乃忘本徇末擇易捨難只將主判司局便為巳之職事言寵名則亞于四輔論補報則同于庶僚人情既務因循朝廷不加考核況今災異之後是陛下宵旰之時凡在近臣正宜盡瘁而其間甚有優遊緘默養望待遷無愛君憂國之言乏盡忠補過之義或有時政得失惟能退有後言處之不慚僅同胡越未必人人茍祿蓋因習以成風不稼取禾莫斯為甚伏望陛下明降詔旨督責近侍凡是朝廷闕失並須論列奏陳所上封章並赴政府其盡心論奏而言多中理者稍加褒進其持祿不言或言而無取者量行黜責如此則朋龜效靈庶職修舉朝廷獲多士之助近臣免尸素之譏元豐八年純仁知慶州乞詔內外官條陳利害狀曰臣伏覩六月二十二日詔書應中外臣寮及民庶並許實封直言朝政闕失民間疾苦者有以見聖心求治之深也臣雖至愚不敢泯默竊以陛下方啓重熙之運布日新之政天下之人翹首以望至治固未覩夫闕政之可陳也所謂民間疾苦則陛下臨御之初聊整數事而百姓鼓舞歡呼者是也蓋近在畿輦之下事理著明者陛下得熟聞而更之其在僻逺幽微者則陛下莫得而聞矣固宜明詔四方詢求之廣也然中外臣民猶未能深副聖意極有所陳者蓋民庶之愚雖有疾苦不能自言唯舉人胥吏有能言者又以利害不切於己而不言也臣寮則亦有不能言者矣或有所畏避而不言者矣有踈逺而慎靜者矣有怠於憂國愛人者矣有昔嘗言而今愧于言者矣如此者皆不言也儻非陛下深詔執事及羣有司使各罄其所聞自陳于上則懼聖詔將為空文而天下之情終不能盡也蓋向來朝廷修立法度付之有司以施于天下固欲便民而益國也如慈父寄食哺兒意豈有不善哉而哺者無愛兒之心不量飢飽多少之節曰唯知哺之而已不恤其他則兒不病而死者幾希矣今吏之行法者不恤民之利害惡欲曰唯知行法而已不恤其他則宜其百姓疲弊而無告也然則郡邑之弊守令知之一路之弊職司知之茶鹽利局民兵刑法差役之弊提其局及受其害者知之軍政之弊三帥與將領者知之邊防之弊守邊者知之伏望陛下特下明詔內則敕六曹四司九寺三監三帥百司外則敕監司提舉提點邊臣牧守以至令佐監當曹掾各使條陳本職及所經歷之利害無或隱蔽曰某事利人益國可以興行某事煩密勞費可以簡省某事蠧害公私可以釐革限一月內聞奏亦可因其所陳略知其人之才識然後陛下參命近侍與大臣審擇而行之流為霈澤被於萬方如此則朋龜獻兆庶績咸熙堯舜三代之政可不勞而成矣唯陛下留神省察特賜施行則天下幸甚哲宗初即位下詔求言曰蓋聞為治之要納諫為先朕思聞讜言虛已以聽凡內外之臣有能以正論啓沃者豈特受之而已固曰不愛髙爵重祿以奬其忠設其言不當于理不切于事雖拂心逆耳亦將欣然容之無所拒也若乃隂有所懷犯非其分或扇搖機事之重或迎合已行之令上則觀望朝廷之意以徼幸希進下則衒惑流俗之情以干取虛譽審出于此而不懲艾必能亂俗害治然則黜罰之行是亦不得已也顧以即政之初恐羣臣未能遍曉凡列位之士宜悉此心務自竭盡朝政闕失當悉獻所聞以輔不逮宜令御史臺出榜朝堂時韓維留侍經筵乃上疏乞改詔書六事曰臣近者伏覩録到朝堂所出榜文開示大信招來羣言皆前代帝王之髙致而方今朝廷之急務天下幸甚臣尚有疑者若乃隂有所懷至不得已也七十五字非元諭聖旨之本意似增飾而為之者何則前云至于拂心逆耳猶將欣然容而不拒復以賞爵勸之後所云則異于此矣又以黜罰懼之且機事之重何害密言已行之令容有未知朝廷之意茍善何惡其觀望流俗之言必淺自可以勿聽藉使有犯此四禁者亦未至拂心逆耳猶在欣然容之之列豈可便行黜罰若此言出于陛下則是詔文前後自相違戾疑誤觀者若出于臣下議論則是違異聖意巧為辭説以懼來者隂成其邪志也古之求言必曰毋有所諱又曰毋悼後患今則多設防禁又以黜罰懼之是人有所諱而悼後患也古之為民者宣之使言下至道路芻蕘亦見收采今則出榜止于朝堂降詔不及諸道既乖古義亦非舊體恐非所以推廣聖德普及于遐逺開闢言路不間于幽側也此事若不改正臣深恐自今聖德漸成壅蔽臣在先帝朝嘗奉聖旨以災旱撰責躬求直言詔及下之日都人歡恱甘雨亦降不數日姦人希宰相意上惑聖聽别作一詔蓋掩前詔之美庇護新法之失人情疑懼遂不敢言前詔但成虛文而已今榜後之意頗亦類之此事于國體不小伏望陛下深察此弊而痛絶其端特作聖意批降指揮令刋去此七十五字只以榜前所云别撰詔文遍頒天下使萬方之人豁然知聖人樂善好諫之心披雲霧而覩青天白日豈不快哉豈不大哉門下侍郎司馬光亦上疏曰臣先乞下詔書廣開言路不以有官無官之人並許進實封狀仍頒下諸路州軍於要閙處出榜曉示鼓院檢院州軍長吏不得抑退臣昨奉聖旨令入見於今月二十三日到京蒙降中使以五月五日詔書賜臣看閲臣狂瞽妄言曲荷采納豈獨微臣之幸抑亦天下之幸此乃聖主之先務太平之本原也然臣伏讀詔書其間有愚心未安者不敢不冒萬死極竭以聞竊見詔書始末之言固盡善矣中間有云若乃隂有所懷犯非其分或扇搖機事之重或迎合已行之令上則觀望朝廷之意以徼幸希進下則衒惑流俗之情以干取虛譽審出于此茍不懲艾必能亂俗害治然則黜罰之行是亦不得已也臣聞明主推心以待其下而無所疑忌忠臣竭誠以事其上而無所畏避故情無不通言無不盡今詔書求諫而逆以六事防之臣以為人臣惟不上言上言則皆可以六事罪之矣其所言或于羣臣有所褒貶則可以謂之隂有所懷本職之外微有所涉則可以謂之犯非其分陳國家安危大計則可以謂之扇搖機事之重或與朝旨暗合則可以謂之迎合已行之令言新法之不便當改則可以謂之觀望朝廷之意言民間之愁苦可閔則可以謂之衒惑流俗之情然則天下之事無復可言者矣是詔書始于求諫而終于拒諫也臣恐天下之士益箝口結舌非國家之福也又止令御史臺出榜朝堂自非趨朝之人莫之得見所詢者狹伏望聖明于詔書中刪去中間一節如臣三月三十日所奏頒布天下使天下之人曉然知陛下務在求諫無拒諫之心各盡所懷不憂黜罰如此則中外之事逺近之情如指諸掌矣帝於是始改前詔曰朕紹承燕謀獲奉宗廟初攬庶政鬱于大道夙夜祗畏不敢遑寧懼無以章先帝之休烈而安輯天下之民永惟古之王者即政之始必明目達聰以防壅蔽敷求讜言以輔不逮然後物情遍以上聞利澤得以下究詩不云乎訪豫落止此成王所以求助而羣臣所以進戒上下交警以遂文武之功朕甚慕焉應中外臣寮及庶民並許實封直言朝政闕失民間疾苦在京於登聞鼓檢院投進在外于所屬州軍驛置以聞朕將觀覽以考求其中而施行之光又乞降封事簽帖劄子曰臣聞舜明四目達四聰王者視四海之內皆如户庭閭閻之間皆如指掌然後能治其天下恭惟太皇太后陛下深居九重皇帝陛下富于春秋四海之廣大閭閻之微隱未嘗身親而目覩也非采聽臣民之言雖以天縱睿智之性何由知之陛下近詔天下臣民皆得上封事言朝政缺失民間疾苦仍降出令臣與諸執政官看詳其第一次降出者三十三卷臣謹與諸執政選擇其中除無取及冗長之辭外其可取者已用黃紙簽出進入訖伏乞陛下取簽出者更賜詳覽或留置左右以備規戒或降付有司商議施行如此則忠言日進聰明日廣誠生民之厚幸社稷之盛福也嚮者執政請聽臣寮上殿陛下謙退以為國家政事多未習知臣寮欲言事者自有章疏何必上殿今臣民章疏舉集於前若非陛下勤加省覽則朝政缺失民間疾苦何由上聞國家政事無時而習知也其間亦有一事而衆人共言者臣亦重復簽出蓋欲陛下知天下所共患衆情所同欲也夫為政在順民民心之所欲者行之所惡者去之則何患號令不行民心不附國家不安名譽不榮哉惟在陛下斷志而力行之耳光知陳州又乞開言路劄子曰臣昨在京師伏蒙太皇太后不以臣愚疏無取遣使訪以得失豈惟微臣有千載一遇之幸中外聞之踊躍相慶以為言路將開下情得以上通太平之期指日可待也當是時臣未暇備論天下之事先陳所急於三月三十日上言以近嵗風俗頽弊士大夫以偷合茍容為智以危言正論為狂致閭閻愁苦而上不得知明主憂勤而下無所訴公私兩困盜賊已繁宜下詔書不以有官無官之人有知朝政闕失及民間疾苦者並許進實封狀鼓院檢院州軍長吏不得抑退其義理精當者行其言而顯其人狂愚鄙陋者報聞罷去亦不加罪又于四月二十一日復上言皇帝陛下初即政于用人賞罰尤不可不當夫諫諍之臣人主之耳目也不可一日無之説命曰若跌弗視地厥足用傷設有人閉目而塞耳跣足而疾趨前遇險阻能無傷乎賈山有言人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡況震之以威壓之以重乎頃者王安石秉政欲蔽先帝聰明專威福行私意由是深疾諌者過於仇讎嚴禁誹謗甚於賊盜是以天下之人以言為諱百姓愁苦無聊靡所控告致怨謗之語上及先帝臣常痛心泣血思救其失是故首乞下詔開言路以通下情臣謂羣臣茍有肯進言者陛下必加褒擢以勸來者此乃古人市駿骨揖怒蛙之意也召誥曰王乃初服嗚呼若生子罔不在厥初生自貽哲命今皇帝陛下新即位太皇太后初垂簾天下之人莫不屬目傾耳臣自到西京以來朝夕伏聽朝廷惟新之政以為必務明四目達四聰以發天下積年憤鬱之志今開言路之詔既不聞頒于四方而太府少卿宋彭年言在京不可不並置三衙管軍臣僚水部貟外郎王諤乞令依保馬元立條限均定逐年合買之數又乞令太學增置春秋博士使諸生肄業朝廷以非其本職而言各罰銅三十斤臣忽聞之悵然失圖憤悒無已臣非私于二人直為朝廷惜治體耳夫阿意箝口容身竊祿此小臣之利也威福在巳人不敢言此大臣之利也然民怨于下而不聞國家阽危而不知於陛下有何利哉彼宋彭年王諤臣素不識不知其人為賢為不肖但惜陛下臨政之初而二臣首以言事獲罪臣恐中外聞之忠臣解體直士挫氣欲仕者斂冠藏之欲諫者咋舌相戒則上之聰明猶有所不照下之情猶有所不達太平之功尚未可期也宋彭年所言雖不識事體但當廢而不行亦不宜加罪至如孔子作春秋為萬世法王安石秉政輒黜之使不得與諸經並列於學官學者毋得習以為業王諤所言未至不當乃以越職為罪古者置諫鼓設謗木詢于芻蕘未聞有位於朝而以言事為越職者也若當職之人既不肯言不當職之人又不得言則以四海之廣兆民之衆其政治利病天子深居九重何由得聞之哉昨日進奏院遞到告身差臣知陳州然則臣自今於一州之外言及他事亦為越職何敢言矣今二臣之罰既不可追伏望陛下如臣前奏下詔不以有官無官當職不當職之人皆得進言擇其可取者微加旌賞使天下之人知朝廷樂聞善言不惡論事無可取者寢而勿問庶幾願納忠之人猶肯源源而來也臣稟賦愚戇文學政事皆出人下惟不識忌諱不阿權貴遇事妄言無所顧避以此荷知於纍朝見稱於衆人若亦不得言則無所復用於聖世矣上辜太皇太后陛下下問之意下負微臣平生納忠之心內自痛悼死不暝目臣久忝便安今朝廷授以名藩義不敢辭見牒本州索逺接公人起發赴任次到官之日但勉竭疲駑恪勤本職茍力所不逮伏須罪戾而已光又上劄子曰臣聞周易天地交則為泰不交則為否君父天也臣民地也是故君降心以訪問臣竭誠以獻替則庶政修治邦家乂安君惡逆耳之言臣營便身之計則下情壅蔽衆心離叛自生民以來未有不由斯道者也夫道猶岐路近差跬步逺失千里今皇帝陛下新臨大寶德性高明太皇太后同斷萬幾聖謨光大初發號令不可不慎斯乃治亂之岐塗安危之所分也當以要切為先以瑣細為後臣竊見近年以來風俗頽弊士大夫以偷合茍容為智以危言正論為狂是致下情蔽而不上通上恩壅而不下達閭閻愁苦痛心疾首而上不得知明主憂勤宵衣旰食而下無所訴公私兩困盜賊已繁猶賴上帝垂休歲不大飢祖宗詒謀人無異志不然者天下之勢可不為之寒心乎此皆罪在羣臣而愚民無知往往怨歸先帝此臣所以日夜憤痛焦心泣血不顧死亡思有開發於朝廷者也臣愚以為今日所宜先者莫若明下詔書廣開言路不以有官無官之人應有知朝廷闕失及民間疾苦者並許進實封狀盡情極言仍頒下諸路州軍於所在要閙處出榜曉示在京則於鼓院檢院投下委主判官畫時進入在外則於州軍投下委長吏即日附遞奏聞皆不得取責副本強有抑退其百姓無産業人慮有姦詐則責保知在奏取指揮放令逐便然後陛下於聽政之暇略賜省覽其義理精當者即施行其言而顯擢其人其次取其所長捨其所短其狂愚鄙陋無可采取者報聞罷去亦不加罪如此則嘉言日進羣情無隱陛下雖深居九重四海之事如指諸掌舉措施為惟陛下所欲斯乃治安之源太平之基也陛下若以臣言為可取伏乞決自聖意下學士院草詔書施行羣臣若有沮難者其人必有姦惡畏人指陳專欲壅蔽聰明此不可不察侍御史劉摯乞增諫貟許察官言事疏曰臣蒙恩過聽使備貟御史固將竭盡愚論知無不及而竊惟陛下即阼臨政之始其所先者宜莫若廣言路故臣今就職之日首獻其説蓋聖人以一心御萬事而無遺慮以一視周四海而無遺照非能身親而目得之也為能咨諏訪逮致人之言開闢其途使無壅蔽上之公卿大夫百執事下之雖工瞽執技之賤芻蕘負薪之鄙皆得輸意自竭雜然至前而聽吾之所擇惟懼乎言者之不能多也祖宗以來諫官御史張設貟品罕不備足凡在職者皆有言責臣今伏見諫官止有大夫一貟御史臺自中丞而下雖十貟然止於中丞侍御史兩殿中法得言事外監察御史六貟專於察治官司公事文書之稽違者而不與於言則是在朝廷以言為官而任其責者裁此五人而已天下之大臣工之衆權強之漸朋比之萌民之休戚政之利病其於獻納伺察誠恐耳目之未廣事或有不得盡聞于聖聽者非所謂明四目達四聰開衆正屈羣䇿者也臣欲望聖慈於諌院增置諫官貟數本臺六察御史並許言事其所領察按自不廢如故所貴共盡忠力交輔聖政臣不勝惓惓歷代名臣奏議卷一百九十九
