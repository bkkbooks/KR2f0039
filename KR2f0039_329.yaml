body:
  text: 歴代名臣奏議巻三百二十九明楊士竒等撰禦邊宋仁宗時安化蠻䝉光月率衆冦宜州敗官軍殺鈐轄張懐志等六人三司鹽鐵判官蘇紳上言曰國家比以西北二邊為意而鮮復留意南方故有今日之患誠不可不慮也臣頃從事宜州粗知本末安化地幅員數百里持兵之衆不過三四千人然而敢肆侵擾非特恃其險絶亦由徃者守將失計而國家姑息之太過也向聞宜州吏民言祥符中蠻人騷動朝廷興兵討伐是時唯安撫都監馬玉勒兵深入多所殺獲知桂州曹克明害其功累移文止之故玉志不得逞蠻人畏服其名至今言者猶惜之使當時領兵者皆如玉則蠻當殄滅無今日之患矣至使乘隙蹂邊屠殺將吏其損國威無甚於此朝廷儻不以此時加兵則無以創艾將來而震疊荒裔彼六人者雖不善維馭自致喪敗然衘寃負耻當有以刷除臣觀蠻情所恃者地形險阨據髙臨下大軍難以並進然其壤土磽确資蓄虚乏力耕火種以爲餱糧其勢可以緩圖不可以速取可以計覆不可以力爭今廣東西教閲忠敢澄海湖南北雄武等軍皆慣渉險阻又所習兵器與蠻人畧同請速發詣宜州䇿應而以它兵代之仍命轉運使偹數年軍食今秋冬之交嵐氣已息進軍據其出路轉粟補卒為曠日持久之計伺得便利即圖深入可以傾蕩巢穴杜絶蹊逕縱使奔迸林莽亦且壞其室廬焚其積聚使進無鈔略之獲退無攻守之偹然後諭以國恩許以送款而徙之内郡收其地募民耕種異時足以拓外夷為屏蔽也仍詔旁近諸蠻諭以朝廷討叛之意毋得相為聲援如獲首級即優賞以金帛計若出此則不越一年逆冦必就殄滅況廣西溪峒荆湖川陜蠻落甚多大抵好為騷動因此一役必皆震讋可保數十年無擾之虞矣朝廷施用其䇿遣馮伸已守桂州經制之蠻遂平皇祐五年直集賢院劉敞論城古渭州有四不可上疏曰臣今月二十二日奏公事臣得預上殿親聞徳音以謂古渭州存之則為害棄之則傷威兩者未決詢及左右指意懇惻臣誠獨美陛下聰明謙遜好謀無窮也臣雖不聞公卿之議然臣之愚以為棄之便何者朝廷與羌戎約和久矣今一旦奪其地而城之棄明信規小利使夷狄有以窺中國不可一也羌戎種落非一族也自見稍侵必人人懐疑交謀間諜以新城為比或能相率大為邊患不可二也自始築城到今半年耳所費已鉅萬計秦州爲之空竭而調給饋運不可勝紀設復屯兵守之日引月長財盡力竭則闗中皆可憂不可三也向者虜出争利多殺官軍數千人後雖擊破其衆足以相當而虜怨益深其志復得故地而已兵若不解憂患方起不可四也假令新城足以蔽秦州長無羌胡之虞雖傾國守之可也不然地形便利賊能乘之以窺邊圉雖傾國争之可也今何所重輕而縻國財用困民力損士卒之命以貪此咫尺之地計功則可辱言利則可耻慮患則可憂昭昭甚明而談者不忍決之謂爲傷威臣所不諭也昔者舜伐三苖三苖不服益贊於禹班師振旅而有苖來格由此觀之帝王之威在使物畏之不在使物惡之故動以義順於理則物畏之矣動以利逆於理則物惡之矣畏之則服惡之則侮自然之道也武帝黜丞相御史之請而止不田車師輪臺則天下復平元帝用賈捐之之䇿而罷朱崖則中國復安故以徳言之則不過舜禹以强言之則不過漢武帝馭外裔也患枉於義不患力不足也患逆於理不患威之損也惟陛下察於此兩者以觀利害之孰在謀之貴多斷之貴獨明鑑所以見容古事所以知今臣不勝狂直之至仁宗時敞又奏曰臣伏以預偹不虞軍之善政曩者元昊畔亂西邉震驚騷動之患延被天下賴陛下神聖與宗廟之靈元昊殞滅國内多故其子幼弱委政舅氏故邊鄙得以復安百姓養老長幼早寢晏起此誠天道助善中國之福也然自爾以來又十餘年矣其子益壯竊謂虎狼野心未可待以不疑設使一旦發狂能爲風塵而邊偹少懈又如曩時甚非預慮制勝之䇿臣望朝廷申勅邊臣常若冦至城郭必固甲兵必修倉廪必實賞罰必明候望必謹威信必立使敵人懔懔無可乘之隙則邊患逺矣頃者邊吏頗以飲食之費役使之傭得罪即今武吏多不願臨邊有不得已就職者皆畏避微文情不自聊居常救過茍免而已緩急恐不足以責效又非所以明朝廷大體也孫沔吕溱皆貴重之臣有功名於時猶以此見廢設復有孟舒魏尚之徒臣固知議者不能容之此廼馮唐所以疑漢文帝不能用亷頗李牧也鄉飲酒之禮一獻百拜其為修慤至矣然而終不可以治軍旅則治軍旅者姑亦取其大節而已邊臣有材者寡可用者少臣願陛下容養此輩濶略細過無甚督以微法使得樂職嗜事展力效用人人思報上恩則折衝逺矣臣所部不當邉劇然而言此者欲推明聖徳駕馭智勇之一端非敢為邊吏游説也至和元年侍御史趙抃論契丹遣使無名上言曰臣伏見河北通和嵗歴浸久使人往復禮有常數近者契丹遣蕭徳輩不時而來奏記旅實外又即别無事端雖中外人心稍安然北敵情偽難測或觀望釁隙或窺覘盛衰桀黠貪惏自古無信昔漢文帝與匈奴和親厥後繼入邊境故賈誼有太息慟哭之説唐徳宗許吐蕃盟㑹至時竊發平凉故渾瑊有狼狽奔遁之事初皆甘言厚意終乃背約渝盟今契丹使來無名其勢未已僥求不一詭詐百端稱息兵以怠我師幸重賂以困邦賦為意不淺其可忽諸傳曰居安慮危又云有偹無患不可謂邊隅未擾即示宜安之懐不可恃風塵未驚遂為茍且之計伏望陛下留神鑒古宻諭輔弼近臣講求捍禦之䇿今㳂邊急務者莫先乎擇將帥練士卒偹軍實擇將帥則才能者留疲懦者去練士卒則精勇者進驕惰者退偹軍實則邉氣壯人心安三者有禦萬一猝然冦警我何懼哉頃嵗西師未興之日士大夫有横議及此者人皆竊笑鄙易之指爲狂狷不祥之言烏肯動心預爲之防一旦延安驚擾臨時措置失次中外不勝其弊臣今之言未必非當時狂狷不祥之言也至愚憂國無所諱避伏惟陛下如天聼卑取千慮一得之説奮乾剛之徳發先見之明審思而力行之則宗廟社稷之福也嘉祐五年侍御史吕誨論邊備弛廢上疏曰臣切以戎羌講好積有嵗日邊偹久隳兵威不振因循玩冦豈居安慮危之長䇿也臣非知兵者但累任陜西官稔聞四路之事方陛下勵精求治臣嘗言兵防宜為之首務故畧舉邊鄙數事以聞宸聽臣以謂今邊備最可憂者陜西民財匱乏仍嵗不稔不比寶元康定間事力萬一小有警急必無强勝之勢斷可知矣自西戎通好以來儒臣樂為邊帥者特以寄任事權為意何嘗經略庶務為兵防久逺之計哉臣伏見近年生戸自入漢界居住者奄有土田如蹈無人之境所屬堡寨都不禁止州縣亦無由得知雖知亦不行遣慮恐生事風塵忽起為賊内應皆此類也熟戸自慶厯中經歴戰鬬消折人數甚多後來雖有析生增口未嘗籍其姓名緩急要用如何㸃集兼自來威彊之族徃徃為西人利誘皆有背心藩籬不固將來禦敵無所憑恃不可不憂也弓箭手自西事後來闕數不曾招填多為堡寨官員私役百種侵漁人甚苦之以致教閲隳廢今沿邊堡寨使臣多不擇人唯利在轉官酬奬聚積俸祿乘時射利一切營私至有家不蓄馬弓弩不牽挽者責其禦敵之效其可得乎至如土兵最是得力寶元中籍民充弓手尋刺為保㨗等軍當時公私損費不知紀極既而分配指揮訓練已成倫序西事既平逃亡死損更不添填今所存無幾少者皆五十餘嵗即日揀擇殆盡則二十餘年蓄飬訓練之功一旦廢棄良可惜也至如四路帥臣且以涇原一路言之地最平衍賊馬出入正當奔衝控守尤難康定中累戰大敗皆在此路施昌言昏老且病當此重寄如倚長城得爲之安乎臣愚嘗思之今邊鄙無事正是可為之際宜早擘畫亦有以為待冦之偹臣欲乞朝廷選差諳邊事朝臣一兩員别作名目宻與轉運使一員同共體量四路如果有宿弊無憚更張應自來生戸遷入漢界住者並依熟戸例標撥田土明行給授置簿拘管分立頭項俾人員領轄所有舊來熟戸亦將元人㸃檢内或有生戸溷雜久居今來不以新舊人重編排等級增置人員立定賬籍所貴應急可以㸃集其弓箭手只㸃檢元籍闕額人數令逐旋招收補填所有偹邊堡寨使臣盡令閲試弓馬相度人才不至怯懦可以被驅使者俾之久任若不稱職者委所差官於近裏州軍使臣内選揀對換應是土兵只擇其子弟驍勇有武藝者不以等級爲限許壯者得以代其老弱其利相萬也四路帥臣乞選揀才畧公忠之人或文或武不限官職如得其人使之久任此數事臣愚自謂之便又非創新擘畫並是祖宗舊規但痛惜其隳廢敢覬陛下留神省察與大臣確論以臣言是當遂施行不宜稽緩以臣言非亦乞宸衷記録異日當驗所以乞差官體量者縁久隳之事皆是邊臣茍安三二年間更替而去養成深弊上下固䕶不欲朝廷聞知若只降詔命令逐處修飭武偹終無實事與不行均矣惟聖聰採納仁宗時蘇舜欽論西事上疏曰臣竊見自西寇暴逆節天下言兵者不可勝計大扺不過訓練兵卒積芻粟而已其言汎雜無所操總又陳爛使人耳厭其聞而笑忽之況清衷近輔自有上算故不當復有所獻也然臣早居長安偹見西邊事體其要在乎得人得人則練兵積粟之術不煩幃幄之議而自集也唯攻守之䇿必須中授何者此事至大不可輕舉近聞朝廷將議深討覆其巢穴此葢憤其凶悖勇而不之思也孰不知羌氐之俗居不常處獸聚鳥散本無聚積若垂軍絶漠則跨歴險塗被甲裹糧操執兵械外疲而内懼一日之行有三日之勞曾未見敵先已自病隘而遇伏則將不支矣昔趙充國論之詳矣故中國利守邊人利戰從古然也傳曰天子守在四夷又曰荒服者王不王則修徳詩曰薄伐玁狁至于太原薄伐亦謂逐出之而已來則逐之去而勿追禦戎之善䇿也國朝五路興師亦遇敗衂前日劉平不能持重俟隙務於速戰身罹禽獲傷剥國威是知討之不如守之之利也明矣近者朝廷拜置夏竦韓琦范仲淹等此皆名動外裔人所屬望者賊昊姦譎故必疑畏疑畏則將以事騐之以臣竊料今秋必放兵犯塞以觀我師之方略當是之時尤須愼重若能堅壁清野勿與之敵設伏用竒於險塞之地待其師老糧盡而反覆擊之不勞深討而可成功也方今之勢不患其不來戰患守之之道未至耳議其攻者恐鋭而寡謀敗陛下軍事也愚者之説萬或一效以嘗預西事不敢塞黙伏惟聖慮財察之不勝懇懇之至英宗時胡宿論河北偹邊事宜合分滄棣為一路上奏曰臣聞地有常險而國無常地此古今得失之勢異也古者北有盧龍之塞白檀之險隔限南北中國得之控扼北敵今此二險敵反有之河北地形無險可守自河南北達於澶淵平壤二千里景徳中一旦敵騎至河上當是時去祖宗才四十年兵强將勇習知戰鬬至煩章聖親駕敵始懼而乞和河北名將帥有若楊延昭馬知節李允則何承矩孫全有盛名扈駕則李繼隆石保吉内臣則秦瀚皆數經戰陣自河決商胡失横隴故道中國亡大河之險敵乘虚擣滄景則山東危願用張宗益郭申錫言割濵棣徳博以𨽻滄别為一路屯兵以扼敵衝備不虞國之福也伏望聖慈特詔大臣講䆒速行宿又論邊界守約束上奏曰臣聞憂患之來多藏於細微而生於人之所忽自邊臣趙滋舉行界河打魚刈葦一切禁斷由此漢兵多與北人争鬬累年不絶和好之體一旦至此怨隙之開亦不在大去年八月庚寅大雨水今春彗孛謫見上天不言以文象示下陛下宜思内外憂患彌縫其闕葢有偹則患不能深無釁則亂不能起界河武思趙用輩雖時立小忠皆不達大計宜宻行誡約臣觀景徳詔安撫司皆防微愼重自景徳已後詔書數更北人打魚安於積習邊吏弛職不復譏呵及至舉行舊條而淵魚見察衆狙皆怒履霜已深堅氷且至願大臣早為之偹國家承平百年與敵通好者六十嵗内外無患前世所未有近年邉遽來上不過侵誣尺寸疆候此邊人之常態縣寨之本職移文足以辦之何遽至興甲兵哉今搢紳中有恥燕薊外屬者若天時未與人事未至而欲妄意難成之福不如講和息民擇良將以守邊選能臣而修聘外固歡和之形内修守禦之偹羈縻不絶守眞宗仁宗法度以惠養元元則天下幸甚宿又論西夏事宜上疏曰臣聞漢武收河南地築朔方開置河西五郡中國得之以隔絶邊人不得相通前世謂之斷匈奴右臂今盡為夏國所有夏國主諒祚恃豺狼之衆濟凶父之惡去年不顧誓詔燒刼秦鳳涇原兩路熟戸肆行殺略滿意而去邊臣畏懦按兵不出朝廷降詔詰問拒使者不之納及賀正人至以壕外地屬戸為説此地慶厯中西蕃溪洞所獻檢據甚直詔答已詳近日延州安撫司復奏夏國乞遣使齎狀乘馹詣闕其意無他止是申尋前語圖起争端臣恐疆場之憂恐未息也如聞西人常有意闚秦中同家堡一帶蕃部正扼西賊來路涇原若失此險無所隔閡賊馬一二日可至古渭古渭可至則秦中摇矣雖聞今年嵗在東井為闗中之福星家説鎭嵗所在不可加兵然五緯盈縮進退不常難可恃也彼若不畏天道輙來犯順盈縮繋於天道成敗先於人謀若止是論議理壕外地界朝廷必無開許彼見不許有必爭之舉大集羣醜以撓諸路如聞西賊尚有窺伺邊隙結納熟戸之意欲望聖慈明戒邊帥豫偹不虞綏靖鎭撫明遣間探講練軍政以佚待勞彼知我有偹決不敢遽起事端宿知制誥論邊事上奏曰臣竊以景徳二年北敵乞和章聖深惟逺慮務息邉氓俯屈至尊下柔獷俗繼以仁宗聖徳順成先志彌縫間隙得羈縻勿絶之誼自爾邉境長無風塵之警父老不識金革之事大徳至恩在民深矣國家承平百年其間通好居六十年前世所未有近日戎人移建鋪居侵越代州疆界吏止之北兵與漢兵鬬又雄州奏契丹人騎兩過拒馬橋南伐去栁栽千餘放箭射歸信縣尉又界河舊制北人不得取魚雖素有禁防或聞私亦曾採捕舊不聞有鬭爭之事近年禁禦太宻鬬争不絶亦曾射傷廵檢殺死邏兵邊臣恬然曾不為怪朝廷奏報視爲閑事未審鬬争不止其末如何皆積不相能馴致此釁履霜之漸堅氷且至誠懼章聖和戎之䇿從此而壊國家居常偹陜西次及河東未嘗深留意於河朔陜西河東西路兵官經朝廷選所得差多極邉城寨都監寨主之類則又許帥保薦頗得土人曉識山川險易習知蕃戎情態又有内屬蕃部為之障蔽土兵蕃落保㨗之屬皆便弓善戰以一路兵力得良帥制之寇至可以戰可以守河東險固去年西賊燒刼涇原秦鳳熟戸蕃部迄今環慶賊馬鈔掠未已然今年嵗在東井東井秦分為闗中之福星家之説鎮嵗所在不可加兵宜勅沿邊諸將嚴兵為待賊若大舉犯順我得天道不宜縱敵兵法所謂敵加於已不得已而應之者謂之應兵兵應者勝彼自守窟穴無所侵軼不宜提兵深入自違天道前所謂朝廷未嘗深留意於河朔者豈非恃盟好重改作防敵人之疑乎方今之計莫若外固歡和之形内修守禦之偹且河朔地形無險可守自雄莫已南平攘千里往時黄河流入敵境無慮五七里自河決商胡不由横隴故道河北水流散漫失中國大河之險不能限隔戎人盛冬氷合兵馬可過敵人若以精騎𢷬滄景之虚長驅南下則京東摇矣河北雖有塘水城壁利兵堅甲無所恃之臣非能知前後通邊事者言之多矣朝廷以北邊無釁未暇經畧今來邊釁已有萌芽防於幾先奸謀自破今陛下聖徳日躋神機天挺燭知萬事之統坐照四夷之情廟堂之上俊乂大臣皆有文武全畧通知三路利害者豈臣愚瞽摽聞所能究知然而負薪之語有益廊廟況預聞政事稔知邊患敢黙而去乎欲乞令中書樞宻院檢取前後臣僚上言章奏相度可否施行知諫院司馬光言備邊劄子曰臣聞周書稱文王之德曰大邦畏其力小邦懐其徳葢言諸侯傲狠不賔則討誅之從順柔服則保全之不避强不陵弱此王者所以爲政於天下也臣伏見去嵗先帝登遐趙諒祚遣使者來致祭延州差指使髙宜押伴入京宜言語輕肆傲其使者侮其國主使者臨辤自訴於朝臣當時與吕誨上言乞加宜罪朝廷忽略此事不以爲意使其怨懟歸國一國之人皆以爲耻今嵗以來諒祚招誘亡命㸃集兵馬窺伺邊境攻圍堡寨驅脅熟戸八十餘族殺掠弓箭手約數千人悖逆如此而朝廷乃更遣使臣齎詔撫諭彼順從則侮之傲狠則畏之無廼非文王所以令諸侯乎若使臣至彼諒祚稽首伏罪禁止侵掠猶或可赦若復拒違王命辤禮驕慢侵掠不已未知朝廷將何以行之傷威毁重孰甚於此方今公私困竭士卒驕惰將帥乏人而敵人犯邊事之可憂孰大於此而朝廷上下晏然若無事者其故何哉豈朝廷自有其備而疎外之臣不得與知乎臣竊惑之所謂偹者非但添屯兵馬積貯粮草而已也在於擇將帥而修軍政也三者皆闕何謂有備臣不勝憤懣伏望陛下博延羣臣訪以禦邊之䇿擇其善者而力行之方今救邊之急宜若捧漏甕沃焦釡猶恐不及豈可外示閒暇而飬成大患也治平元年光又乞戒邊城濶略細故上疏曰臣聞明主謀事於始而慮終於微是以用力不勞而收功甚大竊見國家所以禦邊人之道似未盡其宜當其安靖附順之時則好與之計校末節争競細故及其桀傲暴横之後則又從而姑息不能深討是使邊人益有輕中國之心皆厭於柔服而樂為背叛近者西戎之禍生於髙宜北敵之隙起於趙滋而朝廷至今終未省悟尤以二人所為為是而以循理守分者為非是以邊鄙武臣皆鋭意而生事或以開展荒棄之地十數里為功勞或以殺畧老弱之卒三五人爲勇敢朝廷稱其才能驟加擢用既而敵心忿恨遂來報復屠剪熟戸鈔刼邊民所喪失者動以千計而朝廷但知驚駭增兵聚粮其致寇之人既不追䆒而守邉之臣亦無譴責如此而望敵國賔伏疆埸無虞是猶添薪扇火而求湯之不沸也臣愚切惟真宗皇帝親與契丹約為兄弟仁宗皇帝赦趙元昊背叛之罪冊爲國主嵗捐百萬之財分遺二邊豈樂此而爲之哉誠以屈已之愧小愛民之仁大故也今陛下嗣已成之業守已安之基而執事之臣數以争桑之忿心不畏灌𤓰之大計使邊鄙之患紛紛不息切為陛下惜之近者聞契丹之民有於界河捕魚及於白溝之南剪伐栁栽者此乃邊鄙小事何足介意而朝廷以前知雄州李中祐不能禁禦為不才别選州將以代之臣恐新將之至必以中祐為戒而以趙滋為法妄殺鄰民戰鬬之端徃來無窮焉况今民力凋弊倉庫虚竭將帥乏人士卒不練夏國既有憤怨屢來侵寇禍胎已成若又加以契丹失歡臣恐國力未易支也伏望陛下嚴戒北邊將吏若契丹不循常例小小相侵如魚船栁栽之類止可以文牒整會道理曉諭使官司自行禁約不可輕以矢刃相加若再三曉諭不聽則聞於朝廷雖專遣使臣至其王廷與之辯論曲直亦無傷也若又不聽則莫若博求賢才增修徳政俟公私富足士馬精强然後奉辤以討之可以驅穹廬於漠北復漢唐之土宇與其爭漁栁之勝負不亦逺哉光爲龍圖閣直學士乞留意邊事上疏曰臣竊見近年以來趙諒祚雖外遣使人稱臣奉貢而内蓄奸謀窺伺邊境隂以官爵金帛招誘中國不逞之人熟戸蕃部聞其亡命叛去及與濳交通者已爲不少而朝廷不能一一盡知也其熟戸蕃部有違拒不從者諒祚輙發兵馬公行殺掠弓箭手有住在沿邊者諒祚皆逼逐使入界將帥之臣但坐而視不能救援遂使其餘熟戸皆畏憚兇威怨憤中國人人各有離叛之心及朝廷遣使齎詔責問諒祚拒而不納縱有所答皆侮慢欺冒之辤朝廷亦隱忍含容不復致詰諒祚又數揚虚聲以驚動邊鄙而將帥之臣率多懦怯别無才謀以折衝禦侮止多聚兵馬以自衛其身一路有警三路皆聳盡抽腹内州軍下畨兵士置在麾下使之虚食粮草數月之後寂無影響然後遣還未及休息忽聞有警又復抽去如此往還疲於道路訖無一事曾有施爲臣雖愚駑不習邊事竊以私意料之諒祚所以依舊遣使稱臣奉貢者一則每嵗所賜金帛二十餘萬二則利於入京販易三則欲朝廷不為之偹也其所以招誘不逞之人者欲以採訪中國虚實之事平居則用為謀主入寇則用為鄉導也其所誘脅熟戸廹逐弓箭手者其意以為東方客軍皆不足畏唯熟戸弓箭手生長極邊勇悍苦鬬若先事剪去則邊人失其所恃入寇之時通行無礙也所以數揚虚聲驚動邊鄙者欲使中國之兵疲於奔命耗散諸蕃公私貧困既而邊吏習以為常不復設偹然後乘虚入寇也凡此事若不早為之慮使奸謀得成切恐其爲國家之患不可量也臣謂朝廷宜宵衣旰食以為深憂而但見其遣使奉貢即以爲臣節未虧得其侮玩之語以爲恭順得其欺慢之語以爲誠實葢朝廷非不知其本心欲其未發止求目前之暫安不顧異時之深患臣日夜思之不勝憤悒何敵國為謀之深而中國慮事之淺也臣愚伏望陛下於邊鄙之事常留聖心特降詔書明諭中外應文武臣僚有久歴邊任或曾經戰陣知軍中利害知敵國情偽者並許上書自言陛下勿以其人官職之疎賤及文辤之鄙惡一一畧加省覽擇其道理稍長者皆賜召對從容訪問以即日治兵禦戎之䇿何得何失如何處置即得其宜若其言有可取者即為施行仍記錄其姓名置於左右然後選其中勇畧殊衆者擢為將帥若能稱職有功則勸之以爵賞昏懦敗事則威之以刑誅加以選練士卒留精去冗申明階級之法抑揚驕惰之氣誠能如此行之不懈數年之後俟將帥得人士卒用命然後惟陛下之所爲雖北取幽薊西取銀夏恢復漢唐之疆土亦不足為難況但守今日之封略制敵國之侵侮豈不沛然有餘裕哉四年文彦博奏曰臣被㫖令看薛向所上疏并邊陲利害具可否條列錄進入臣詳觀向之所陳大要有五其一任將帥以制其衝其二亟攻伐以罷其敵其三省戍兵以實其力其四絶利源以弊其國其五慎經費以固其本所謂任將帥者朝廷何嘗不慎擇而重之但所擇或得或否耳既得其人固當如向所論使久其任必各成效猶如前時屢遷數易雖得賢才使將帥亦難責其成功所謂亟攻伐以罷其敵者一曰先舉之䇿以謂先發制人攻勝後發制於人攻負故欲亟肄以罷之多方以誤之二曰淺攻之䇿其大㫖欲招誘横山部族團結熟户之兵及義勇弓箭手之衆侵擾賊境使不寧居將自困弊此皆朝廷素留意者兼韓琦上言慶厯初曾與范仲淹嘗建此議會西人輸欵而止去嵗樞宻院遂與中書同議悉有成算尋已降付逐路今别録奏議進呈兼逐路之兵自來未嘗精較實數去嵗樞宻院令編例官類聚得確實人數降下諸路嚴切訓練至於部分亦有成法並檢康定中諸路出師牽制之術並宻付逐帥遵守朝廷處置之詳殆無遺䇿然此舉動必當其時去嵗十月臣甞上奏於先帝若諒祚果遂倔强自絶於朝廷以討伐兇渠招納降附無所不可若猶恭順服過即當含容所謂羈縻不絶況王者之師非不得已豈宜輕用今向亦云若諒祚改圖自新復守誓詔伏望廓天地之量霽雷霆之威省費罷兵安邊息民天下之幸斯言是矣然於平時不可不講議精熟一旦有隙用之無疑所謂省戍兵以實其力者其要欲省東兵之疲軟揀土兵之精勤取實用損虚費為持久必勝之術朝廷近以計較逐路之兵去冗留精皆有定數俟向去春季依法料簡兼去嵗不以龍衛兵戍邊此亦省兵實力之一端也又曰絶利源以弊其國者葢謂朝廷嵗賜并縁邊和市一宜絶之賊勢自窘矣嵗賜和市如諒祚阻命自當絶之上三䇿不待議論而利害可知所謂慎經費以固其本者此廼方今至切之務最要講求葢經費若簡國財乃富國富即兵强兵强即蠻夷不敢内侮而後制禮作樂馴致太平何欲而不可今之言者不計國用之豐寡而欲輕舉妄動為國生事者多矣惟朝廷審用而慎行之兵一用其費不貲茍力屈貨殫雖有智者不能善其後向又以調度兵費宜以康定為鑒其言尤為切當葢康定時兵久不用人未知戰上下騷然暴取横用莫知紀極天下困弊終無尺寸之功亦可鑒矣向云自寶元初守官陜右出入兵間今又主闗中之漕首尾七年目覩心計固宜詳悉其言誠有倫理然謀攻料敵老將所難兵者大事不可輕言之古人論兵至慎至重如向云取横山如反掌捕西賊若設罝掩兔謀雖可采言亦似輕誠願愼之重之愚慮如此伏乞聖神詳擇起居舍人傅堯俞乞偹邉上奏曰臣竊聞延州近有宻奏衆口籍籍以為事在諒祚臣備位外廷不當商度機務輙進瞽言茍所聞誠非惟陛下貸狂愚之罪夫自古䇿敵人者多矣臣不敢偹論以煩天聽臣獨怪數十年來不脩戎偹而專事姑息損國家堂堂之威驕敵人無厭之俗近日朝廷頗用道理裁抑以伸暢威靈誠為得也然臣謂度必能制其死命如臂使指則反覆低昂皆得以如我所欲不然士武將材決莫能犯伸暢之議廼可獨行儻猶未也制御之術宜屈伸相養今養兵百萬率懦且驕將臣雖多孰可倚以辦事國家新遭大䘮人皆一詞以為府庫屈竭邊鄙之間未宜有警伏願陛下詳思逺圖先爲不可勝之偹以挫其奸心脱或跳梁妄狂有所干請擇不甚害事體者間有所屈庸示含容則所伸可必矣惟識理道曉重輕者居可以言譬動可以意揣今諒祚猖狂恣肆在人言意之外豈可不隄防哉雖未有深䇿秘計能為大憂敢必其無動幸陛下念之夫人有十金之産巳厚棘重闗將禦寇竊一罹難疚則有投間之虞況天下之大而復土未畢乎臣又見今日一人乞偹邊而無事明日一人乞偹邊而又無事遂相安於無事而謂可以卒無事所以言日益輕而偹日益不修臣恐積習因循為悔遂大朝廷茍以爲然者不過行文書諭邊吏而已望陛下修偹邉之實而慮於人之所忽則天下幸甚堯俞改知諫院乞差人經度西事上奏曰臣聞有國家者慮事於未萌而脩偹於無患況事既然而患已至者乎臣雖亡狀粗爲陛下陳之臣伏見西戎猖狂負恩逆徳邊鄙之熟戸則掠為已有朝廷之使人則拒而不納其事勢如此猶得不為之偹乎惟制御之大畧陛下與執政大臣宜講之已熟至於控扼之當否將吏之勇怯甲兵之利鈍士伍之强弱與今狂賊重輕之勢事有萬塗非可以盡得於廟堂之上此趙充國所謂百聞不如一見兵不可以隃度者也況沿邊分爲四帥未盡得人人各有心議難齊一伏望陛下詳擇重臣一兩人徃彼經度制置俾至秋冬事有豫偹賊茍侵軼庶能枝梧此固事機不可稽緩堯俞又乞罷内臣招安熟戸上奏曰臣聞近差内臣四人分為陜西四路鈐轄俾專安輯熟户而理其寃結仍許每嵗一入奏事臣獨念之未以爲得縁所以置安撫經畧使者正爲此等事耳夫不能慰安使叛而從偽與無故爲羌戎所刼有司之過一也茍謂帥臣力不可爲則雖内臣何益豈有邊鄙籓籬為賊掠去乃無一人任其責者今邊事方作處置不可失宜臣謂安輯之要當專督帥臣但寛其羈勒使得盡其材力倘猶不職重行黜免則後效可圖而威靈伸矣況理有非便庸可不思將來李若愚等奏事茍不以爲信與無用同言而必從則安撫經畧之權遂歸於四人矣彼帥臣者將諂奉之不暇又敢與之較事體而爭是非哉縱若愚等審愼無過猶不足以為後法便著成效益有可慮古人謂塞其涓涓況勢非涓涓者乎伏乞收採芻蕘特行寢罷前事之失具存方册臣不復詳言惟陛下留神省察神宗即位開封推官陳襄奉使契丹回上殿劄子曰臣昨奉使北敵久留邊郡竊見髙陽闗一路沿邊州軍戍兵甚冗馬歩之卒不減三萬九千餘人嵗費芻粮動以萬計諸州儲蓄之數出於貴糴多者無數嵗之備少者微三年之蓄一甲未擐則財用已匱而邊民困矣幸而亭障無虞可以姑息一有警急如何支持臣愚以爲方今安邊息民之要莫先於減戍卒而用土兵戍卒減則財用省而民力紓土兵用則戰守易而城壁固此祖宗禦戎之遺䇿不可廢也今延安本路七州四軍義勇之籍無慮四萬六千餘人可以當馬歩戍兵之數但官司因循失於訓練嵗時雖有教閲之名而無可用之實甚可惜也況邊防諸郡深池髙壘有陂塘沮洳之阻無戎馬奔衝之患萬一有寇至不過堅吾壁以守之清吾野以待之則昔時義勇之軍足為防托之用不有屯戍又何患哉臣欲自朝廷先遣才望之臣按行一路令與監司長吏將所籍義勇人數重行檢㸃去其老弱而補之壯勇舍其征役而授以騎耕每於農隙之時給與口食選差教隊使臣分往諸邑精加簡閲務令精鋭可以效用然後減去戍兵之半食於近輔之郡遇大征伐則發内卒以應之如此則土有精兵塞有餘粟守禦有備而邊民蘇矣如允所奏乞降付樞宻院相度施行前輝州司戸叅軍王韶上書言曰國家必欲討平西賊莫若先以威令制服河湟欲服河湟莫若先以恩信招撫沿邊諸族葢招撫沿邊諸族所以威服唃氏也威服唃氏所以脅制河西也陛下誠能擇通材明敏之士能周知其意者令徃來出入於其間推恩信以撫之使其傾心向慕歡然有歸伏之意但能得大族首領五七人則其餘小種皆可驅廹而用之矣諸種既失則唃氏君臣其敢復簡慢而不歸心於我耶唃氏既歸於我即河西李氏在吾股掌中矣急之可以蕩覆其巢穴緩之可以脅制其心腹此所謂見形於彼而收功在此也今木征諸族數欵塞面内為中國之用者久矣此其意欲假中國爵命以威其部内而邊臣以董氊故莫能為國家通恩意以撫之此所謂棄近援而結逺交貪虚降而㤀寔附使董氊得市利而邀功於我誠非取勝之術也今木征與青唐族首領瞎藥等在河州瞎征與其舅李篤氊及沈千族首領常尹丹波等屯結可欺巴温與龍川首領羅結在黄河頭三者皆唃氏子孫各立文法漢界逺者不過四五百里近者二三百里皆可以并合而兼撫之也謹具和戎六事條列如左一臣切見涇原秦鳳兩路蕃兵及洮河宕疊州武勝軍諸族皆吐蕃之遺種也自唃斯羅死董氊繼立文法祇能安集河湟間而近邊諸族自為種落其在疆埸之外者皆强梗頑硬不爲吾用在内地者又分離散處不相統一此議者所以謂西蕃諸族皆微弱而不足用也臣聞古之善御戎狄者固不患其微弱也惟其微弱然後可以并合而有但國家未嘗得人而親撫之耳臣愚以爲陛下必欲合西戎諸族而用之宜擇通材明敏之士心慮軒豁能周知羌人情意者令朝夕出入於其間徃來廵行察其疾苦平其寃濫治其鬱結如漢䕶羌校尉之比有不服者即稍以恩信綏之身與之為帥使其傾心向慕歡然有歸伏之意然後激作而用之則十數萬之兵不出疆埸而可集矣一臣切見西蕃種類皆尊大族重故主諸族有承唃氏之後者羌人皆畏服尊之而唃氏諸孫今在洮河間者皆孱弱不能自立如木征徃嵗居洮山有青唐族首領雞羅瞎藥及胡僧鹿尊事之欲立文法收復洮河宕疊等州及武勝軍諸羌而木征孱弱終不能自立會秦州遣人逐去今洮河間諸州並無大族爲主雖有瞎征及欺巴温之徒各恃衆自立然文法所及者俱不過一二百里此其勢正可以并合而兼撫之也臣愚以爲宜遣人徃河州與木征計議令入居武勝軍或渭源城與漢界相近輔以漢法因選官一員有文武才畧者令與木征同居漸以恩信招撫沿邊諸𦍑有不從者令木征挾漢家法令以威之其瞎征及欺巴温之徒既有分地亦宜稍以爵命制其心腹使其習用漢法漸同漢俗於漢界實有肘腋之助且使西賊不得與諸羌結連此乃制賊之上䇿也一臣切見鄜延環慶兩路番兵自來各有成法使之戰鬬及守境皆與漢兵無異徃徃禦敵殺將立功塞外此兩路藩籬所以益固也今四路番兵並是羌夷舊種雖有吐渾党項及吐蕃之别然其種姓實皆出於西戎而已何獨在鄜延環慶則可用在涇原秦鳳則不可用豈天地之所生育與人材性分之所授者絶然相異耶臣體問得宣徽使曹偉在西邊日其用環慶兵皆不及涇原秦鳳只因經畧使范仲淹在慶州日與种世衡等處置各盡其宜故今四路之中惟環慶路蕃兵號為得力是知教之在人而不在其性分之相異也臣愚以爲陛下宜擇朝臣有文武材畧者徃涇原秦鳳擇蕃兵可教者教之固其部族合其心力使勸勉奮勵樂為吾用則十萬餘蕃兵不費官中粒食而可以為心腹之用矣一臣以謂蕃人欲其可用須令有合有離離之所以弱其勢合之所以齊其力沿邊諸族附塞而居者皆分離散逸無大首領也勢既離弱又須團合所以均其志趣齊其心力使其勸勉奮勵相率而為吾用臣愚以謂涇原秦鳳兩路蕃兵可為十部每部置都廵檢一人以蕃官有材能識畧為衆所服者統之而以漢官一員為都大提舉以總之但得蕃人畏其首領而以漢官總其權任自然不敢作過而久逺並為吾用矣一臣謂沿邊蕃部欲其可用莫若使其與漢人雜居今沿邊蕃部畸零田地耕墾所不至者極多但自來官中須得頃畆相連地段相接者方始招添弓箭手臣愚以爲本不須地段相連一段三二十畆以上者即三五段便可招一名弓箭手矣切計沿邊諸族不下十餘萬帳大約十餘萬帳可招弓箭手一萬人以一萬人散居十餘萬帳之間則何患其心腹不一思慮不專乎是則招添弓箭手一萬人便可獲番兵十餘萬人之用也一臣切見官中自來然令蕃兵獻地招致弓箭手多是令其全段獻納盡帳起離此蕃人所以顧戀而不肻獻也若田地隘狹招致不足處可令熟戸隨其地段多少大約耕百畆者即獻十畆與官中招添弓箭手令其全段獻納盡帳起離則蕃人顧戀所獻者狹若隨其地段割令以獻則山原髙下所獻者廣又令弓箭手得散在沿邊族帳之間使中國羈游無事之民耕蕃部荒閒之地而可以禁其背叛結其心腹語其利害豈不顯然明白耶昔魏絳和戎謂戎狄貴貨賤土其土可賈今之蕃部正同此耳若國家厚以恩信撫之其土地皆可賈易而致臣切案古渭州一帶至洮河蘭鄯之間漢隴西南安金城三郡地所謂湟中閤亹臨羌抱罕邯中大小榆土地肥饒宜糓者皆在洮河蘭鄯之間誠得而耕之其利豈止威伏羌戎而已耶書入上即令樞宻院召問方畧以為秦鳳路安撫司自古渭寨接青唐武勝軍應招納番部市易募人營田等事並令韶主之五年韶建用兵之䇿王安石力主其議八月韶舉兵破木征收復武勝軍十月改為熈州六年八月入河州遂城之復將兵至馬練川降瞎吳叱進攻宕州㧞之岷州木令征疊州欽令征洮州郭廝享皆路以城降復州五闢地自臨江寨至安鄉城東西十里韶加端明殿學士然議者謂韶所上功狀多欺誤不實殺蕃部老弱甚衆能開拓疆土而耗費中國不可勝計紹聖以後王贍復建􅙉鄯之䇿實韶啟之也翰林學士鄭獬論种諤擅入西界上奏曰臣伏見十月二十四日召兩府大臣入議外言竊皆傳种諤已提兵入據綏州横山豪酋挈族内附審如是是豈朝廷之福耶聚謀累日䇿將安出事雖隱秘不漏針芒然趣賈逵竇舜卿就道以毋沆為轉運使發京師兵及銀數十萬兩偹芻餉出錦𫀆銀帶賜降者觀此則殆將兩持首尾未有決然判安危之至䇿也臣前言不可納横山及見手詔以諒祚順向深戒邊臣無得生事臣以為信今廼知朝廷外示綏静内包隂計兹豈帝王之大畧哉尊用變詐之士務為掩襲之謀乃戰國强暴之君所為也況陛下初履天位猶處諒䦣宜念祖宗䝉成太平之業以淵静鎭海内仁澤結民心不及慮此而過聽一二邪臣之説欲以奇譎幸邊功此天下盡知其不可而陛下獨以為可冒而行之聞者莫不寒心然种諤之奪綏州若不奉陛下之風指安敢一日不俟上報徑驅數千卒直擣虜境乎不然則擅興有罪陛下何為而不行誅夫中國以信義撫四夷既約束邊臣無得生事詔墨未乾而奪其地信義俱弃其曲在我彼將嫚辤以請罪則朝廷何以報之如彼懐不順袵氊裘而犯邊我不得已而起應之則士卒雖肝腦塗野而不辤葢舉天下之怨在彼也今無故而先擾之彼將率其犬羊之衆而來争則士卒有旅拒躊躇而不行者矣葢舉天下之怨在我也豈唯士卒之不樂哉府庫之空乏此四海所共患千金之費不給則必賦諸民則將見隳産壊家弃父母鬻子孫以供軍期者矣萬一有奸雄之徒窺隙而乘之嘯為盗賊小則剽屋廬大則跨郡縣於此之時潰爛而不救則於社稷生靈得無有負乎事有謀小而妨大者正爲此也而种諤不顧國家始末之大計乃欲以一螻蟻之命以天下為兒戲茍貪微功以邀富貴此正天下之奸賊若不誅之則無以厲其餘臣以為陛下必欲逆折禍亂之機牙使不為異日之悔則莫若下詔聲諤之罪誅於塞下及薛向髙遵裕楊定張穆之等皆付有司次第以治其罪然後遣一介之使持手詔還諒祚以綏州及横山之降民遂明告以諤等生事已次第伏罪則彼又將何求於我如此則顯示中國履信之美而復收夷狄向化之心無遺鏃折㦸之費而事立解矣如有言者希望尤以爲不然此皆非忠臣豈敢以犬馬之餘生而保天下之事乎臣以太白經天四方地震皆為兵象切恐兵禍起於横山之議今見其端矣無使臣言之驗則朝廷之福也伏望陛下上觀天戒下察人事以宗廟社稷爲念以四海生靈為意無令天下無罪之民為奸臣所誤今誅一奸臣而天下定其利害較然可見陛下決意行之無疑臣不勝區區之懇知諌院楊繪論种諤擅入西界上疏曰臣聞帝王之道唯信為大仲尼以爲兵食可去信不可去晉文覇國之君耳猶曰得原失信何以庇民今為國家患唯西北二邊然而數十年無𤇺燧之警生民不識戰鬬之苦者豈專仗金帛而然乎亦恃乎信誓之言而已矣比者西戎新納信款切聞髙遵裕詐傳聖㫖與种諤等納西夏叛人首領近三十人仍深入敵界地名綏州築城以居之臣切謂朝廷若遂從其計則失信於敵國生起邊事無窮極矣為今計者莫若貶謫其矯制擅興之罪以正典刑仍差使告諭西夏示非朝廷之命如此則大信不失興功生事之徒少有懲矣臣又聞西戎有僭逆之狀已五七年擅置官司輙更年號而但倔强於巢穴中終不敢顯然出兵為邊鄙之患者何哉彼雖異族亦不敢無名而舉矣今既納其逃叛者則彼之作過有名矣以中國而失信於外裔一不可也既失信於西則北戎亦從而疑信誓之不實是一舉而兩失之二不可也興師有曲直直者奮而曲者怠左傳所稱我怠彼奮是也今若生起邊患則差徃戰鬬者必曰彼邀功生事髙遵裕种諤實當其名而被堅執鋭出生入死則使吾徒為之有不伏之心而生懈怠焉則難以必勝三不可也有此三不可之大患則朝廷何恤於二子而不惜於邊鄙大患乎方今公私帑藏近已空竭糧運不繼當取於民民將不堪則患起於内矣臣切料扶其議者必曰若貶二子歸其逃者則西虜亦未必息兵不若因而成功臣切謂朝廷自不失信而虜作過則直在我矣我直彼曲雖興軍擾民軍民何辤以怨乎外人議者咸曰兹事葢起於薛向鹽馬之法行之六七年今將弊矣薛向欲求脱去而使他人乘其弊故與楊定髙遵裕种諤等建為此謀欲求邊任而罷轉運使之職致陜西之民從夏秋以來倡言朝廷欲收復横山而不恤陜西之民甚有怨咨近外人又傳惑陛下之聽於外者楊定也惑陛下之聼於内者王中正也致陛下鋭於横山之議者職斯二人臣雖愚昧豈不知此事之非實但願陛下早賜指揮則外人浮議自弭矣臣忝諫職敢不盡言知雜御史劉述論种諤擅入西界上疏曰臣昨以种諤不禀朝命擅興兵馬城西界綏州有違誓詔為國生事曾具奏聞乞并同謀人枷送下獄從朝廷差官制勘依軍法施行續又奏薛向楊定張穆之髙遵裕王中正輩表裏相結誑惑聖聰妄興邊事乞行根勘以正典憲未䝉朝廷盡理施行臣伏思之陛下新紹大統方在亮隂之中所賴者兩府大臣協心畢力修輔庶政以安民心以固根本至於疆埸之事尤宜戒飭帥臣講信修睦撫寧遐荒而乃輕用奸臣之言遽議用兵之䇿失信於外國結怨於邊民而況闗陜之西比年饑饉民力凋弊國帑空虚自寶元康定以來人間瘡痍尚未全復今又使之奉期會之役供倉卒之求彼獨何以勝其苦哉故臣慮有不堪其憂者也又風聞每於中書南廳會議其間多顧避形迹不務昌言或各持已見靡從正論至有累日而不能決者夫軍國之事常有緩急若機會一失則如奔川逸驥弗可捄止今兩府大臣依違如是使之適變而應猝豈不殆哉昔唐太宗謂黄門侍郎王珪曰近日中書所行詔勅頗有意見不同互相是非或有茍避私隙相惜顔面知非不正遂即施行惜違一官之小情偽爲萬人之大弊此實亡國之道也隋内外庶官正以依違而致祻亂兹誠人主獨見事機委任責成之先務也臣愚欲乞陛下面戒兩府今後並須戮力一心堅守正道凡所議事皆當原始要終不可媮為一切以貽久逺之患詔㫖有所未便亦須據理執奏毋事循嘿仍乞宻加聖鑑辯其邪正其辯邪正之術如唐李絳所言試取惡事假以上意為善而問之或取善事假以上意為惡而問之其人或不顧事實好惡便隨聖心而言則忠信傾邪立可識矣此得其要也其間或有無所裨益惟務阿附之人宜加罷出以儆在位則賢否分而職業修矣臣以戇愚動觸忌諱忠憤所激豈敢愛身惟陛下念之熈寧元年述又論种諤薛向上疏曰臣切聞趙曕勘到种諤詐稱得宻㫖擅發兵馬城綏州公案止斷追官安置而已案内亦不一就勘到薛向張穆之髙遵裕王中正等人外議喧然皆謂未得公當夫矯制發兵人臣之罪無大懐奸罔上國家之法不容一則見不忠於主兹實叛亂之漸為天下者不可不深懲也昔漢馮奉世矯制斬莎車王傳首京師威震西域宣帝欲加爵土蕭望之以爲不可恐後奉使者爲國生事武帝時王恢用馬邑豪聶一計欲舉兵攻匈奴與韓安國論難徃復數四武帝從恢議後無成功下恢廷尉廷尉以為當斬太后以田蚡之言謂武帝曰恢為馬邑事今無成而誅恢是為匈奴報仇也武帝曰首為馬邑事者恢故發天下兵數十萬今不誅恢無以謝天下恢聞乃自殺恢當時禀命於朝廷而舉事不成武帝猶謂不誅無以謝天下葢慮後來狂易之人妄興邊事殺傷士卒疲弊中國故以為戒爾今种諤詐稱宻㫖擅發兵馬以致邊境騷然公私勞費此而不誅孰為可誅者所幸頼者陛下仁聖之心充格天地天地神靈擁祐聖德故致諒祚死不然兵連禍結百姓受弊於今已不淺矣伏望陛下深思宗社之計早絶祻亂之源發於聖斷斬諤以謝邊民以誡後來專輙興事以遺國家之患者天下幸甚天下幸甚其次薛向臣採諸衆論其人本為擘畫用塩博馬事今來塩鈔布滿中外賣之折錢而復不顧其法已弊矣向切欲擺脫未有縁由故於上前妄陳横山可取之議欲作邊帥以徼已利耳非忠於朝廷也洎過本路遂將公文并手詔與諸將稱得宻㫖圖取横山以致种諤狂發貪功恐為他人所先輙作此事迹其所由首惡者乃向也今种諤既議追官安置而已向乃猶不失為州臣恐用法未適輕重之宜縱使陛下當時曾許向經營此事乃為向以甘言厚利眩惑之故所謂懐奸罔上者非向而誰漢武帝所以不赦王恢者正為此爾中外皆謂向憸巧之人善結權貴致位至此悉用此道陛下既為此人面欺當須覺悟而怒之不當曲為主張掩葢其罪也臣恐今後奸邪之人窺見此意别生事端誑誤陛下以爲朝廷招天下之患陛下又將主張掩葢之邪將不然邪臣聞聖人無常心以百姓心為心言從衆也仁宗皇帝未嘗私意喜怒天下之人謂之善則用之天下之人謂之惡則弃之是以天下稱其聖此陛下所宜法而行之者也今薛向之罪惡中外切齒闗陜之人恨不食其肉而寢其皮而陛下獨未悟臣所未諭也其勘官趙瞻既勘得种諤辤連薛向等人便合追攝勘證豈得再取朝廷指揮顯見黨庇懐奸首惡之人伏請選差公正强明臣僚并趙瞻一處勘鞫以正邦憲以厭人心臣前已具奏乞不差趙瞻作勘官恐因與薛向鄉里之舊曲為黨庇今乃果然臣恐兩府大臣中亦有黨庇薛向如趙瞻者陛下不可不察也臣職在糾奸故敢觸冒忌諱昧死陳誠惟陛下念之神宗時張方平出知青州未行帝問祖宗禦戎之要對曰太祖不勤逺畧如靈夏河西皆因其酋豪許之世襲環州董遵誨西山郭進闗南李漢超皆優其禄賜寛其文法諸將財力豐而威令行間諜精審吏士用命故能以十五萬人而獲百萬之用及太宗謀取燕薊又内徙李彞興馮暉於是朝廷始旰食矣真宗澶淵之克與契丹盟至今人不識兵革三朝之事如此近嵗疆場之臣乃欲試天下於一擲事成徼利不成貽患不可聽也帝曰慶歴以來卿知之乎元昊初臣何以待之對曰臣時為學士誓詔封册皆出臣手帝曰卿時已為學士可謂舊徳矣右正言孫覺論自治以勝敵國之患上疏曰臣伏見陛下去年經營西事議不素定邊臣二三至今偏禆輕易出師深入營建城壘轉輸饋運數道為之騷然終之楊定見誘䘮元於敵今又或傳交趾争立内相誅夷為更易廣帥以至閩越諸州大抵改置牧守矣而北戎亦輙為誓約擅刺兩地邉民中國四陲而三方皆警此葢陛下新即大位逺人未見威德故敢或為侵侮以窺我邊朝廷整飭戎偹選置任使未為失計也然臣竊聞之虞書曰柔逺能邇惇徳允元而難任人蠻夷率服夫以堯舜之時聖賢相會宜長䇿成算以厭伏四夷然其言專以難任人為本葢任人處内則主聽眩主聽眩則任使不明忠邪雜進雖有智勇安所設施或任人放逺則智者竭其智勇者獻其力夫如是則何蠻夷之足患哉臣又聞六月詩之序曰小雅盡廢則四夷交侵中國微矣葢小雅王道之序凡其所言皆綱紀人倫惠飬萬物君臣相遇以誠而知羣下之勞苦遣使勞還恩意愈篤反復以自治為先故能周道中興邊人逺迹臣愚竊以邊人之患雖盛王所不免唯知自治者為能勝之伏望陛下雖講邉偹選帥臣而深以詩書為監日新盛徳使任人不能眩聼而次序以興小雅之廢則臣將見四夷畢來陛下深拱以享太平之報覺又論治邊之畧上疏曰臣伏見陛下深以敵國為念而治邊防儲軍實臨朝慨然思古之將帥至親撰文以祭前朝大將之有功者垂老降徒賜之服章延見訪逮以此見陛下之於敵國懐不平之憤而欲上為列聖攄之於無窮也臣竊不自料謹上治邊之略伏惟留神采擇國家與敵和好六七十年雖時有邀求或小侵嫚然未嘗敢頓隳信誓深入犬擾邊民白首不見兵革朝廷雖嵗捐金繒厚禮重幣以結其歡心然吾之元元得父子相保以養其家不至於暴露流離肝腦塗地者列聖之賜也其賄益厚其勢益驕其弊終至於用武何也與者倦而其取無厭約既久則其終必弊則其至於用武也豈得已哉老子曰兵者不祥之器非君子之器聖人不得已而用之茍不得已則軍儲不可以不實邊防不可以不脩將不可以不擇卒不可以不練吾之糧械既已偹足戎人守信誓謹疆埸則吾固待之如初若大有所求違約妄作或舉重兵以臨境上恃吾有以待之則以戰以守惟上所令臣雖未嘗至邊州以臣之所聞見切恐今日之將卒器械糧廪未可以與敵角也臣聞李牧之為趙將居邊軍市之租皆自用享士賞賜決於外不從中覆委任而責成功故李牧乃得盡其智能選車千三百乘騎萬二千匹百金之士十萬是以北逐單于破東部滅澹麻西抑强秦南支韓魏委任邊將必若趙之於李牧可也太祖皇帝神武聖謨燭知邊事故闗南用李漢超瀛州用馬仁瑀常山用韓令坤易州用賀惟忠棣州用何繼筠延州用趙贊慶州用姚内斌環州用董遵誨原州用王彦昇靈州用馮繼業逺者至二十年近者亦不减十餘嵗其家留京師者撫恤之甚厚郡中筦𣙜之利悉以與之恣其市易免所過征税令募驍勇以為爪牙每來朝必召對賜座飲食之其還也厚加賜賚故邊臣於財得以養士用間通知蕃人情狀敵將入寇我已先知設伏掩擊多能以寡勝衆以至平蜀取荆下嶺表收江南二十年間用兵四方而不以西北為慮者諸將守邊之力也臣以謂才能䇿略若此十數人者不乏於世顧所以委任責成之道何如耳誠能講求擇將之方於諸州要處試而用之其才果可任也則付之一州以便宜從事地可墾闢聽招土兵卒可選用聽其廢置財可聚散聽其出入間諜徃來聽其自便率嵗來朝燕見加禮使君臣之際洞見心腑則將輸其忠士盡其力是被邉諸州皆得李牧以守之也如此則敵之進退常在中國至於無厭之邀求無故之侵侮彼將望風而自阻矣孰敢赴湯蹈火以取糜爛者哉夫以衰周之諸侯唐室之藩鎮皆以一國或數州之地外抗邊人内拒天子葢用志不分者能以小敵大委任責成者能以寡勝衆也今以天下之大四海之富而鰓鰓然嘗有邊陲之患用人不專而間說者衆不假人以權而朝廷自任責故也臣聞治天下譬之養身身之血氣不可偏有所養養血以勝氣養氣以勝血皆以致疾而害其身文武之為用亦何以異此國家自西師講和以來天下以兵為諱武事之不講也久矣陛下天錫勇智兼用文武方將大拯天下之弊以為宗廟無窮計慮則夫偹邊選將之方特其小小者耳伏望陛下日新盛德聽用賢俊收採衆䇿以期成功天下幸甚歴代名臣奏議卷三百二十九
