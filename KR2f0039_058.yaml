body:
  text: 歷代名臣奏議卷五十八明楊士竒等撰治道宋寧宗時袁説友上言臣仰惟皇帝陛下聰明仁孝得於天資厯數攸歸神器有託承太皇之命旨遵聖父之詔音嗣守丕圖撫臨萬宇天地開悅神人協和臣遭際明時至榮極幸臣猥瑣不才叨綴從列向者充員京邑屢拜清光夙荷聖神特達之知愧無職守纎毫之報兹幸身逢華旦碩瀝愚衷亟欲仰贊宏模少裨聖德竊惟自古大有為之君其於踐阼之初必思有以收結人心慰滿衆望人心既得衆望已孚則天順人助四夷來王極功所不難致陛下嗣位維新中外愛戴正是收結人心慰滿衆望之日臣不暇縷舉繁目碩以當今可行足以收人心而慰衆望者有六事焉其一曰大行至尊夀皇聖帝奄棄萬方倐已浹月陛下追慕皇祖日赴臨殿號慟備至臣民歎嗟唯是三年之服天下通喪自漢以來喪禮從薄遂有以日易月之制蓋數千百年為天子者未有斷然而能復古也惟我夀皇聖帝頃罹髙宗之喪斷自宸衷躬行三年之服孝誠之至萬古無踰今陛下繼統嗣位適當以日易月禫祭之初此正陛下盡孝竭誠之日夫夀皇之於髙宗蓋子為父服是以為三年之喪今陛下之於夀皇則孫為祖服亦當行周期之制臣碩陛下體夀皇執喪三年之禮倣古人喪禮近厚之説亟下詔旨躬行周期之服令有司討論喪制凡御朝退朝御輦過宫之服並令斟酌裁定陛下一一躬行之此令一下中外臣子既以仰嘆陛下念祖孝誠之切復以深感陛下居喪盡禮之孝抑以敬服陛下聰明仁孝之實以收人心以慰衆望莫切於此且今之外敵固非可以禮義責也猶能慕我夀皇之孝而能於繼祖踐位之日躬行三年之喪外敵固不足言之於陛下也然彼且能爾今周期之服陛下必能以身行之儻聖意以為無難即乞速降指揮不勝臣子厚幸其二曰昨日恭聞已降指揮宣押宰臣留正仰見陛下握符御極知所先後倚任大臣共圖盛治規模宏逺將致太平天下幸甚臣竊意留正必須抗章牢辭未即赴闕碩陛下體古人進退大臣以禮之意深以朝廷輔佐之任為重與降詔趣還俾之必來則陛下禮貌大臣無愧於古先哲王矣至如起居郎陳傅良憂國愛君不得已遂納祿而去樞密院編修官楊方以前日時事未順亦投劾而歸二人者皆一時人望所屬臣願陛下出自聖意亟下詔旨並令日下依舊前來各供舊職豈特以收結士心亦於贊襄治道大非小補其三曰臺諫者天子之耳目所以密贊治道裨益聖聰頃嵗髙宗皇帝更化之日首下詔書大開風憲之地今陛下作主舉行新政要當廣開言路崇用臺諫臣碩陛下斷自宸衷亟發詔旨申飭臺諫令各盡乃職知無不言凡有章奏陛下即日施行則言路既廣聖德彰聞治效日隆下無壅蔽初政之要無以越此其四曰向者夀皇聖帝初罹髙宗之喪教坊樂人及一應俳優伶官等並行罷逐今陛下嗣服之日適居喪制臣碩陛下即降指揮應干樂人及俳優伶官等日下並權令逐便候終喪日續聽指揮亦以見陛下盛德之至也其五曰自古人主規圖極治增益聖德未嘗不求言納諫以廣聽聞漢董仲舒謂廣覽兼聽極群下之知盡天下之美此蓋帝王之要務也今陛下嗣服之始尤當廣求直言崇任忠鯁政事之當否民情之休戚儻非聽言受諫陛下無由自知國朝祖宗即位之日即相繼下詔以求直言列聖遵承以為家法然而求言貴於能聽聽言貴於能行今朝政闕失民間疾苦未易縷陳臣碩陛下亟發詔旨先令在朝監察御史以上及館職學官限五日內各上封章極言時政闕失使之盡言無隱陛下儻未能盡經乙覽即乞以臣下章奏付後省都司官掇其必可施行者類申朝廷將上取旨一一施行其間有關繫陛下躬行者亦令大臣别項敷奏陛下恪意力行如此則五帝三王將並駕而齊驅矣其六曰今嵗適當大禮之年今大行在殯遂降九月明堂指揮陛下既履寶位即與太上皇帝事體不同參之禮經嚴父莫大於配天蓋謂尊父以配天也陛下若行明堂則於尊父之禮實有所礙兼陛下臨御之初正欲修明號令聳動觀聽臣碩陛下以明堂尊父之禮既有所礙亟與大臣商議仍舊講行郊祀之禮如冬至之前未得發引即照乾道元年正月郊祀之例别降德音其肆赦支犒恩數等亦照隆興二年十一月冬至日指揮施行庶幾陛下御極之始即見上帝於昭格天地斂福庶民實為初政之助臣備數從班職在獻納既未得即侍天威面控愚慮而於六事實不可緩用敢亟具奏劄上瀆聖聰惟陛下諒其忠悃而早行之至於躬節儉之德以先天下惜內帑之財以養國力兩宫定省之日風雨不渝泰安之禮極其優厚倚信大臣視為心腹收召人物必先忠良早朝晏罷日以勤政為務臣下章奏可否隨即施行內侍之任以忠直老成為先見在宫嬪稍加斟酌裁減隨龍恩數必合舊制而後行左右請求必惟成法而後與戒飭諸屯主帥務令修舉軍政申嚴沿邉守臣專以固圉為職凡此數端望陛下曲留聖衷節次施行則堯舜三代之治日月可冀矣臣不勝激切控瀝之至衛涇上奏曰臣聞人君之治天下無不原於此心治安常得於憂勤禍敗每基於逸樂蓋方其多事則懼心必生故憂勤而圖治居安既久則驕心易起故逸樂而不自知茍非聰明過人鮮能自克臣恭惟陛下天資濬哲智略髙逺萬無是事臣區區愚慮不能自已於言且聲色易於移人陛下非不知聲色之不可邇也而耳目為難防宴安同於鴆毒陛下非不知宴安之不可懷也而志意為易惰財用生民之膏血陛下非不知財用之當節也而牽於姑息則有所未暇節名器人主之操柄陛下非不知名器之當惜也而溺於貴幸則有所未暇惜自陛下即位人臣之進説者非一疏陛下之聽言者非一日雖改過不吝見善必從而弊隙尚多冗濫未革陛下意謂時之無事不必過憂事之至微未足害治然恐陛下此念生於自喜則驕心得以乘之驕心一萌則所以體天意者亦幾於怠矣況朝廷庶事未可謂盡當四方幽隱未可謂盡達年穀雖豐民困重斂夷狄雖順意實不測大計未立大讎未復天之望陛下者若是正宜惕息修省其可有一毫之驕心耶臣碩陛下圖患於不見保治於未形一起居言動一云為注措兢兢業業常若上帝臨之在上質之在傍聲色之陳於前必思玉體之當愛宴安之動於念必思德業之當勉爵賞之施必思名器不可以假人賜豫之頒必思民力不可以困竭此心無日不與天相似則陛下所以體天意者既至天心所以愛陛下無窮凡陛下所當為之事皆次第而舉矣昔仁祖謂休祥之臻懼省不類災異之見警畏厥繇乃考箕疇之傳稽漢儒之説裒類五行六沴禍福之應為書十二卷名曰洪範政鑒以示天人感召之理夀皇嘗諭近臣無逸一書享國久長皆本寅畏爰緝尚書所載天事列為二圖名曰敬天朝夕觀覽仁祖夀皇所以飭躬修德克謹天戒見於三書者不外此數事成效昭然于今可覩不然治教刑政大抵粗略而天之報貺乃同於已安已治之時臣誠恐天幸不可以為常禍機多藏於隱微而發於人之所忽也惟陛下留神省察豈特臣之幸實宗社生靈之幸涇又上奏曰臣恭惟陛下聰明天縱嗣承大統舜禹授受千古有光遵夀皇之成規對廷臣於黼座將以講求治道夫豈徒應故事而已臣側聞群臣進言者多勸陛下即位之初當大有所施設以竦動四方之觀聽陛下聖意以循循為治臣有以見宸慮髙明度越千古固非常情之所能量度也臣竊觀自昔欲有為之君非不好大喜功志髙慕逺方其鋭意圖治凡創端造業皆足以震耀群動興起人心論治者亦皆喜談而樂道及閲嵗踰時意銷氣沮曽無尺寸之效而淪胥以敗往往鋭始者必怠終兢虛美而本無誠心故其害至此孰若因人情之所欲審事勢之所宜圖實效而不隆虛名務逺謀而不趨近利其初雖若循循未快人意然盡力於躬行用功於悠久積日纍月寖明寖昌計算見效反出於欲有為者之上得失可槩見矣昔堯以兢兢日行其道舜以業業日致其孝禹之克勤湯之檢身若不及文王之翼翼小心武王之繼志述事凡詩書所稱此六七聖人不過畏天命保人心側身修行恭己任賢慢遊逸樂之是警是戒憂勤恭儉之是訓是圖初未嘗為驚世駭俗輕發易變之舉也然後世稱聖之盛治之極必曰唐虞三代豈非循循之效哉陛下以不世出之資享夀皇已成之業踐阼以來薄海內外小大臣民傾耳拭目以徯維新之政陛下聖意先定周密詳重謹於所發不為目前可喜之事誠有得於聖賢循循之義矣臣愚猶有私憂過計試為陛下言之陛下慈仁本於天稟未嘗不恭儉也而恭儉之德未信服於人心陛下日昃視朝咨詢忘倦未嘗不憂勤也而憂勤之志未昭白於天下爵賞所以勵臣工也而人以為多濫紀綱所以尊朝廷也而人以為未振有納諫之盛德而未聞行諫之英斷有恤民之仁心而未聞寬民之實惠詔百官以修職業而茍且之習未革敕將帥以厲軍政而貪刻之徒實繁半嵗之間課效未見救過不給衆人竊議有識憂疑毋乃陛下雖知循循之可尚而未能踐其實乎夫聖賢之循循與世俗之因循相近而實相逺也聖賢之循循亦順至理之當然力行而不息耳茍無誠心實德悠悠玩日時乎無事則茍安而不慮事變之至則倉卒而無謀徇一時之娛忘千載之患此乃世俗因循之害非唐虞三代所以為治之意也況今日風俗頽靡百度弛縱人材削弱國勢未張汲汲有為尚恐不濟若猶因循其弊將至於不可為矣臣慮臣下或聞陛下有循循之志遂希旨迎合飾因循之説以誤聖聽非忠於為陛下計也臣碩陛下剛健篤實勵精圖政躬朴素以杜奢侈之漸防逸豫以戒宴安之毒則恭儉之德彰矣輟燕間之暇以攬機務絶左右之私以親正人則憂勤之心著矣公豫奪以示懲勸惜名器以待功勞罷內降之命遵纍朝之法則爵賞知所謹矣毋以朋黨輕疑外廷毋以道學併棄賢士擇任耳目之寄大開公正之塗則紀綱庶乎振矣有奬飾而未聞拔擢有開納而無所施行非所以崇諫也務斥諂諛之説護養忠直之氣斯得聽言之要矣貴近之濫恩未革無益之費用未省非所以寬民也條無名之橫斂議蠲減而必行斯有惠下之實矣擢亷勤之吏以勵偷惰嚴按察之司以治贓汚則職業修矣昔之以賄賂進者果於棄而不用今之以貪黷敗者置於法而不貸則軍政肅矣凡此八者陛下果事事而加謹物物而加察勿以小善無益而不為勿以小惡無傷而不去仁心善政與日俱新如火之然如泉之達使聖德日以光大功業日以休顯斯足以盡循循之實矣茍懷安怠忽無所施為臣恐未免終墮於因循之説也惟陛下留神幸甚涇又上奏曰臣聞天下雖大治之在心自昔君臣相與講明治道未嘗不以此心為先務禹之告舜曰安汝止伊尹之告太甲曰欽厥止傅説之告髙宗曰惟厥攸居政事惟醇周公之告成王曰文王惟克宅厥心乃克立兹常事蓋心者萬事之綱致治之本未有不先定其心而能成治道者也臣恭惟陛下以聰明英睿之資承慈皇付託之重憂勤在御三載于兹虛懷任人屈已從諫帝王盛德蔑以加此是宜盈成之業有光太平之期可卜顧求治雖勤課效未見上下悠悠偷安嵗月毋乃聖心所嚮容有未定而莫知所用力之地歟夫惟聖心未定故小大之臣議論不明趨嚮不一家持一説人立一見或習頽墮或貢諛佞或務迎合或事讒邪皆不過竊取陛下爵祿其為身計足矣陛下臨政碩治何所望於此乎易曰通其變使民不倦又曰易窮則變變則通通則久言天下之事茍至於窮極必貴於變通乃為可久之道也臣觀當今事勢往往多弊而其弊將窮矣民極於貧而莫究賑恤之宜平時猶且思亂兵極於養而莫止飢寒之怨臨事孰肯用命官極於冗而澄汰之無䇿徒困於缺少財極於斂而寬省之無計每患其不支士大夫知有祿位而不知有名節緩急何所倚仗風俗知有奢靡而不知有條制踰僭何所限節舉天下大事無出此五六者而其弊至此極矣尚賴朝廷清明聖德容覆祖宗仁澤在人中興以來培植益厚維持固結幸以無事然平居暇日已懷凛凛之懼脫有讒諂在側群邪並進得以撓亂陛下之紀綱法度公道不伸國體浸弱姦雄睥睨或生輕侮之心一旦事變起於細微禍機萌於所忽向之維持固結者有時而不可恃亦可為寒心哉陛下試當清間之燕事物不衡於慮嬪御不接於前平心定氣而靜思之微臣之言必有默契於淵衷者然則變通之道其在今日誠聖心所宜先定也臣伏願陛下體乾健之德廣離明之照審觀事勢之所繫念其弊之為己窮察其弊之所由起覽大易之言求變通之道聖心先定然後明詔大臣逮中外百執事朝夕講磨同心協力及今而亟圖之勿坐待其極而至於不可救凡行一事必曰其有益於變通之實歟不可以嘗試而幸成也每出一令必曰其有合於變通之理歟不可以輕發而驟改也進一人才必曰果可以任吾變通之責歟不可以順適目前而用之也聽一言議必曰果有以助吾變通之政歟不可以投合所見而受之也夫既知所用力之地循循而行之孜孜而為之雖無立見之效而有馴致之功前五六者之弊庶乎有瘳而天下之治可次第舉矣不然當庶事極弊之時譬之一身四體岌如藥傷補敗猶恐不給而希合茍容之徒養交持祿方且謂雨㿩時若詠誦太平以規榮利及其意得志滿奉身而退它時獨以憂勞遺陛下豈不誤哉可勝悔哉此理非難曉其事非難行特在陛下加意與否而已臣拙戅不量踈外僭論大體竊惟國朝儲養館職之意甚厚仁皇盛時詔特許以言事臣待罪册府首尾五年三獲瞻望清光每竭愚衷輒蒙寬赦兹不敢以去國而忘葵藿之誠昔魏徵陳十漸以戒太宗其末有曰千載休期時難再得明主可以為而不為此臣所以鬱結而長歎也臣敢以徵之言為陛下獻惟陛下財幸煥章閣待制侍講朱熹上奏曰臣迂愚衰賤無以踰人仰荷聖明召從逺外置之近侍之列處以勸誦之官此豈私於小臣者哉意者必以其粗嘗講學稍有思慮不肯隨衆默默或有以仰裨聖治萬分之一也而臣伏自到闕三獲進對狂妄之言時蒙采納如增添講日看詳封事不受賀表之屬皆得施行臣竊不自知以為庶幾可以披瀝肝膽畢義碩忠而無負於陛下所以收録使令之意又竊惟念服在內朝實以從容諷議為職故雖被求言之詔亦不敢輒同外臣撰述文字以致宣泄但嘗面奏一二意望陛下自以聖意施行而纍日以來竊觀天意雷霆之後繼以陰雨沈鬱不解夜明晝昏此必政事設施大有未厭人望以致陰邪敢干陽德者而臣前日所嘗言之大者尚亦未蒙省察若但碌碌隨群解釋文義時時陳説一二細微以應故事則不唯非陛下所以召用愚臣之意亦豈愚臣所以服事陛下之志哉今有微誠須至傾竭臣之所言其最大者則勸陛下凡百自奉深務抑損自宫闈之私居處服用且如潛邸之舊以至外庭禮數僕御恩澤亦未可遽然全享萬乘之尊庶幾有以感格親心早遂晨昏定省之碩以為陛下必垂開納而數日來乃聞有旨修葺舊日東宫為屋三數百間外議皆謂陛下意欲速成早遂移蹕以為便安之計不惟未能抑損乃是過有增加臣不知此果出於陛下之心大臣之議軍民之碩耶抑亦左右近習倡為此説以誤陛下而欲因以遂其姦心也臣恐不惟上帝震怒災異數出正當恐懼修省之時不當興此大役以咈譴告警動之意亦恐畿甸百姓飢餓流離阽於死亡之際忽見朝廷正用此時大興土木修造宫室但以適已自奉為事而無矜惻憫憐之心或能怨望忿切以生他變不唯無以感格太上皇帝之心以致未有進見之期亦恐夀皇在殯因山未卜几筵之奉不容少弛太皇太后皇太后皆以尊老之年煢然在憂苦之中晨昏之養尤不可闕而四方之人但見陛下亟欲大治宫室速得成就一旦翩然委而去之以就安便六軍萬民之心必又將有扼腕而不平者矣前鑑未逺甚可懼也至於一離尊親之側輕去倚廬之次深宫永巷園囿池臺耳目之娛雜然而進臣又竊恐陛下之心未易當此紛華盛麗之熒惑感移雖欲日親儒士講求經訓以正厥事而進德修業亦將有所不暇矣此又臣之所大懼也至於夀康定省之禮則臣嘗言之矣而其意有未盡也今聞邇日一再過宫亦未得見而不亟為之慮如臣所謂下詔自責頻日繼往者顧乃逶迤舒緩無異尋常之時泛然而往泛然而歸太上皇帝聞之必以為此徒備禮而來實無必求見我之意其深閉固拒而不肯見固亦宜矣又聞太上皇后懼忤太上皇帝之意不欲其聞太上之稱又不欲其聞內禪之説此又慮之過者殊不知若但一向如此而不為宛轉方便使太上皇帝灼知陛下所以不得已而即位者但欲上安宗社下慰軍民姑以代已之勞而非敢遽享至尊之奉則父子之間上怨怒而下憂懼將何時而已乎父子天倫三綱所繫不惟陛下之心深所未安而四方觀聽殊為不美久而不圖亦將有借其名以造謗生事者此又臣之所大懼也至於朝廷紀綱尤所當嚴上自人主以下至於百執事各有職業不可相侵蓋君雖以制命為職然必謀之大臣參之給舍使之熟議以求公議之所在然後揚于王庭明出命令而公行之是以朝廷尊嚴命令詳審雖有不當天下亦皆曉然知其謬之出於某人而人主不至獨任其責臣下欲議之者亦得以極意盡言而無所憚此古今之常理亦祖宗之家法也今者陛下即位未能旬月而進退宰執移易臺諫甚者方驟進而忽退之皆出於陛下之獨斷而大臣不與謀給舍不及議正使實出於陛下之獨斷而其事悉當於理亦非為治之體以啓將來之弊況中外傳聞無不疑惑皆謂左右或竊其柄而其所行又未能盡允於公議乎此弊不革臣恐名為獨斷而主威不免於下移欲以求治而反不免於致亂蓋自隆興以來已有此失臣嘗再三深為夀皇論之非獨今日之憂也尚賴夀皇聖性聰明更練世事故於此輩雖以驅使之故稍有假借實亦陰有以制之未至全墮其計然積習成風貽患於後其害已有不可勝言者如陳源袁佐之流皆陛下所親見也奈何又欲襲其迹而蹈之乎且陛下自視聰明剛斷孰與夀皇更練通達孰與夀皇夀皇尚不能制之於前而陛下乃欲制之於後臣恐其為患之益深非但前日而已此又臣之所大懼也至於􅓖宫之卜偏聽臺史膠固謬妄之言墮其交結眩惑之計而不復廣詢術人以求吉地但欲於祐思諸陵之傍儹那遷就茍且了當既不為夀皇體魄安寧之慮又不為宗社血食久逺之圖則自宰執侍從以至軍民皆知其非而不敢力爭夫以夀皇之豐功盛烈百世不忘而所以葬之如此其草草也此豈不又大咈天人之心以致變異之頻仍而貽患於無窮乎此又臣之所大懼也凡此四懼皆非小故臣碩陛下深察愚言而反之於心明詔大臣首罷修葺東宫之役而以其工料回就慈福重華之間草創寢殿一二十間使粗可居又於宫門之外草創供奉宿衛之廬數十間勿使其有逼仄暴露之苦如是則上有以感格太上皇帝之心而速南內進見之期又有以致夀皇几筵之奉而盡兩宫晨昏之禮下有以塞群下窺觀眩惑之姦而慰斯民飢餓流離之歎此一事也若夫過宫之計則臣又碩陛下下詔自責減省輿衛入宫之後暫變服色如唐肅宗之改服紫袍執控前馬者預詔近屬尊行之賢使之先入首白太上皇后以臣前所陳宛轉方便之説然後隨之而入望見太上皇帝即當流涕伏地抱膝吮乳以伸負罪引慝之誠而太上皇后宗戚貴臣左右環擁更進譬諭解釋之詞則太上皇帝雖有忿怒之情亦且霍然雲消霧散而歡意浹洽矣此二事也若夫朝廷之紀綱則臣又願陛下深詔左右勿預朝政但使朝廷尊嚴紀綱振肅而國家有泰山之安則此等自然不失富貴長久之計其實有勳庸而所得褒賞未愜衆論者亦詔大臣公議其事稽考令典厚報其勞而凡號令之弛張人才之進退則一委之二三大臣使之反復較量勿徇己見酌取公論奏而行之批旨宣行不須奏覆但未令尚書省施行先送後省審覆有不當者限以當日便行繳駁如更有疑則詔大臣與繳駁之官當晚入朝面議於前互相論難擇其善者稱制臨決則不惟近習不得干預朝權大臣不得專任己私而陛下亦得以益明習天下之事而無所疑於得失之算矣此三事也若夫山陵之卜則臣前日嘗以議狀進呈近日又與同列連名具奏今更不敢頻煩聖聽亦望特宣大臣使詳臣等前後所論而決其可否於立談之間先寬七月之期次黜臺史之説别求草澤以營新宫使夀皇之遺體得安於內則宗社生靈皆蒙福於外矣此四事也凡此四事皆今日最急之務切乞留神反覆思慮斷而行之以答天變以慰人心上以彰聖主用人求諫之實下以伸小臣愛君憂國之忠則臣不勝千萬大幸又竊念臣老病之餘寒齋獨宿終夜不寐憂慮萬端而進對之時率多遺忘言語精神又不能以自達是以前日一再面奏所陳數事有未蒙深察者今因入侍敢復冒昧輒形紙墨伏惟聖明獨賜詳覽而擇其中至於孤危之蹤不敢自保竊恐自今以往不獲久侍清間之燕矣臣無任瞻戀懇切皇恐俟罪之至駕部員外郎李鳴復上奏曰臣聞有帝王之規模當有帝王之事業規模宏闊而事業又與之相符天下不足治矣唐魏徵之言曰五帝三王不易民以教行帝道而帝行王道而王顧所行何如耳世蓋未有行其道而不著其效者堯舜其君而俗不唐虞禹湯文武其君而治不三代此必有其故也恭惟陛下以天縱之資篤日新之學嗣位之始首增講員聽政之餘垂精經典書中庸至聖之章而日加省察閲大學章句之疑而特垂顧問大庭彂䇿昭明此書瓊林賜詩彰示此意為天下國家之經有九既取之以為出治之規明明德於天下之序有八亦視之以為力行之要此其規模豈漢唐諸君所敢望雖六五帝四三王可也然自登大寶于今七年天下翹首以望太平傾心以觀至化雍熙泰和之風不見而歎息愁恨之聲轉聞規模則古事業不古獨何歟臣嘗讀孟子見其言有曰以不忍人之心行不忍人之政治天下可運之掌上又曰堯舜之道不以仁政不能平治天下蓋有是心也而能行是政則付之掌運而有餘有是道也而不以其政則求以平治而不足今陛下之心堯舜之心也未知陛下之施於政者果足以發是心乎否也陛下之道堯舜之道也未知陛下之見於政者果足以行是道乎否也民政壞於守令之貪殘軍政壞於將帥之掊尅朝廷之政又壞於士大夫之茍安三者之弊未去而欲與古帝王齊驅而並駕臣知其難矣三代之得天下也得其民也得其民者得其心也民惟邦本本固邦寧而今之為州縣者以撫字為迂談以催科為急務此猶曰用之公家也囊橐之私勝而民不聊生矣苞苴之計行而民無所赴訴矣使天下不敢言而敢怒昔人以是為虐民之戒今則不惟敢怒又至於敢叛矣夫置吏所以養民而民之叛端自吏始國家何賴焉前車既覆後車當戒近甸之地咫尺君門握符之寄輟從朝列召杜之詠罕見而苛如虎者踵相接也𥜗袴之歌鮮聞而剝及膚者袂相聮也民無常産因無常心即不幸帶牛佩犢相扇而起又何以為䇿民政如此陛下亦常思之否乎古者寓兵於農初無養兵之費後世以民養兵遂有蠧民之患然使其如霆如雷足以折外侮有嚴有翼足以強國勢是猶曰于以固吾圉也兵以精為貴今則老弱相半矣兵以氣為勇今則凍餒交作矣與士卒同甘苦昔人以是為將兵之法今則勢分隔絶又剝之以自利矣竭天下之力以養兵而反竭兵之力以奉主帥國家何益焉不遇盤根曷知利器潢池赤子盜弄戈矛鼠竊狗偷顧何足道然江上分備禦之屯而賊之凶焰未戢也京都輟禁衛之旅而賊之猖獗自如也小寇尚爾大敵何若即不幸姦雄勍敵觀釁而動復何以為計軍政如此陛下亦嘗思之否乎夫治亂之迹雖見於天下轉移之機實係於朝廷四郊多壘此何等時而列武周行因循度日謂惟靜可以制動是則然矣靜而流於偷墮恐其動未易息也謂惟常可以御變是則然矣常而失之弛玩恐其變未易弭也謂雍容和緩可以鎮安人心是則然矣然內無可恃之實外有可憂之形此猶駕弊舟於驚濤之中寢積薪於然火之上恐人心亦未易安也陛下非不憂勤也大臣非不焦勞也百司庶尹亦未嘗無惴惴不寧之懷也而積習既久諛風浸成務為虛文掩覆實狀所陳者類非軍國之急務所事者不過簿書之常程日甚一日而怪證生嵗復一嵗而元氣削朝政如此陛下又嘗思之否乎陛下居今行古其規模為甚髙而以古準今其事業猶弗逮則亦有是心而無是政故爾夫政者所以推吾之心而達之天下者也茍無其政心何自而達茍非其人政何自而舉立政一書周公所以訓戒成王者諄切備至上自禹湯下自文武陳其已往之實用為方來之規推而至於詰爾戎兵陟禹之迹所以著其功業之盛以覲文王之景光以揚武王之大烈所以彰其繼述之美然要其所以致此亦惟曰勿以憸人克用常人而已是知人才之賢否國政成敗之所關不可不謹也昔仁宗皇帝享國最久遇變最多然衆賢聚於內而朝廷尊按察使分布於外而郡國治帥得一仲淹而西賊喪膽使得一富弼而北敵降心將得一狄青而南凶授首四十二年之治號為太平皆自得人始臣碩陛下稽仁祖致治之法味姬旦告君之辭不徒究之於心而必發之於政不徒求之空言而必見之行事必吏稱職民安業而政之在民者無不理必車馬修器械備而政之在軍者無不肅必九德咸事百工惟時而政之在朝者無不舉為政在人無使一小人或得容其姦政在養民無使一細民或不被其澤政事修於內變故息於外理有必至勢無甚難特在陛下加之意爾不然學與政一道也勤於學而不及於政知與行一理也致於知而不力於行譬如五穀不腹而欲以療飢良藥不口而欲以己病臣未知其可也臣生長萬里外洊叨誤渥獲玷郎曹舊典有常職當登對有懷不吐不惟負陛下亦負所學惓惓之忠惟陛下察焉鳴復為侍御史又奏曰臣聞九官相遜所以為虞廷之盛多士濟濟所以致周室之隆蓋衆賢和於朝則萬物和於野未有乖爭淩犯之習交肆於內而安靜和平之治能成於外者也中庸言位天地育萬物必以致中和為本洪範論斂五福錫庶民必以建皇極為要中庸之與洪範異書而同旨中和之與皇極異名而同意古聖王治天下所以措一世於泰和躋斯民於仁夀其道未有不本諸此陛下以天縱之資膺天位之重知出治之道在問學故垂精經典知進學之益在講讀故留意經筵正心誠意之實持之惟懼其不嚴治國平天下之理究之惟恐其不熟有君如此其忍負之而十年之間柄臣專國鉗天下之口而奪之氣正者引遁直者銷沮迎合茍容之輩擢置朝行寡廉鮮耻之徒散在郡國故中外附和如出一口而天下之俗弊於諛堅氷頓消太陽正照天下拭目以觀維新之化戢者思奮屈者求伸不得其平者久喑而欲鳴不獲乎上者久憤而欲吐故談辨風生矯枉過正而天下之俗又傷於激諛固非盛世事也激而不已亦豈國家之福哉光禹之持祿保位無以起西漢之衰南北部之互相譏揣適以招東漢之禍可為萬世鑒也國朝之治莫盛於慶厯又莫盛於元祐祠醉之舉網傲歌之摘瑕賴老於謀國者力行救正而紹述之論一起群凶得志善類吞聲其初起於邪正之交攻而其末遂至於夷夏之不靖豈不甚可畏哉厥今權歸人主政在中書若有將治之機而外寇尚強內勢尚弱未有平治之實生我王國置身周行謂宜不競不絿同心同德各揚乃職無曠厥官而邇者都司之爭幾於奮臂臺臣之辨至於交章含沙或寓於奏對之間下石或託於遊談之口此何等氣象而見於今日不知是數者之紛紛施之國家所益者何事所補者何䇿也陛下聖性髙明隨宜區處或用或舍或去或留雖浩乎天地之兼容而亦截乎毫釐之有辨百官知所戒懼矣然臣竊以為天下之患每成於既著聖人之慮常謹於至微與其别是非於交鬬之餘不若絶偏黨於無形之始蓋人性本於善外物感之而後性始遷人心一於正利欲汨之而後心始雜克念罔念聖狂之所以分為善為利舜跖之所由判猶之水焉澄其昏穢則清者自存猶之鑑焉滌其氛埃則明者自若臣碩陛下密運中和之化大開皇極之門無有作好無有作惡在上者既一惟斯道之遵則無有淫朋無有比德在下者亦皆惟有極之會喜怒哀樂發必中節偏陂反側咸歸于中上下共由於大公至正之途相與於和協輯睦之境將見有所不為為無不成有所不動動無不濟其或不然上作而下不應君倡而臣不和此方待以休休有容之量而彼乃甘為截截小人之歸則國有常刑理有公是臣亦不敢畏避怨仇以孤陛下責任之意臣蒙恩簡拔拊已兢皇惟有愚忠仰圖報稱故於請對之始審量事勢揆度時宜首以致中和建皇極之説為陛下獻惟陛下垂聽而力行之天下幸甚鳴復又奏曰臣聞善圖治者當勉其所未至善慮患者當察其所未形未至而能勉則實政日舉而天下之治因以成未形而能察則公理常存而天下之患因以息有天下國家者不可不致其謹也陛下自更化以來杜群枉之門開衆正之路易之所謂內君子外小人書之所謂任賢勿二去邪勿疑陛下固已得之此正天下將治之秋四海生靈延頸企踵以望太平之日也然臣竊有言焉天下之事惟其實而已名者實之賔也茍徒務其名則不足以致治天下之理惟其公而已私者公之對也茍或溺於私則適足以害治臣觀今日朝廷之上佩玉黼黻者皆名勝拔茅征吉者皆善類其闕然猶可議者實效之未著耳且恢復大事也斷而行之名非不美也空國以出百費且興喪師而返一籌不畫恢復之實安在會計急務也舉而行之名非不正也費用日廣今且無節征斂日繁今猶無度會計之實安在稱提楮幣名曰便民而便民之實未見蠲除苛取名曰惠民而惠民之實未聞宰椽樞屬更易不常問其政今猶昔也百司庶府除授不一課其效今猶昔也天下事豈真盤錯而不可為哉特務其名不核其實爾果能責之以實則九德咸事足以凝庶績六卿分職足以阜成兆民雖隆古盛治有不難及不然觀美有餘實用不足臣恐畫龍不足以致雨流為西晉之浮虛未可知也臣故謂當勉其所未至者此也臣觀今日士大夫近清光者皆懇惻以愛君列庶位者每忠誠而體國其隱然猶可慮者已私之未克耳且王言所以寓訓戒也力求刪去者有之公乎私乎臺疏所以示勸懲也委曲覆護者有之公乎私乎甲以為是乙或以為非此以為然彼或以為否往者都司有爭貽訕朝路此風何可長也往者臺臣有辨至勞聖斷此舉不宜再也天下事豈真淆亂而不可決哉特牽於私不顧其公爾果能處之以公則無偏無黨王道蕩蕩無黨無偏王道平平雖盛時氣象有不難復不然好惡既異朋比漸生臣恐蟻穴或足以潰隄激而為東漢之黨錮未可知也臣故謂當察其所未形者此也夫使有小人焉而或曠其職擊而去之未足憂也皆君子也而實政不舉則深可憂有小人焉而或背乎理排而斥之未足慮也皆君子也而私情不戢則深可慮然則如之何其可曰是不難定其意嚮者在陛下握其樞機者在宰相耳任之以是事必責之以是實夫誰敢慢公言則播而行之私請則拒而絶之夫誰敢肆今朝多吉士野無遺賢瞻之在前有唐虞三代之可企瞪乎其後有漢室晉氏之可鑒治亂安危之分實係於此碩陛下與二三大臣擇斯二者而亟圖之天下幸甚宗學博士許應龍上奏曰臣聞人主有善始之意固天下之所深喜亦天下之所深望也夫飛龍在天萬物咸覩意諭色授而六服震動言傳號渙而萬里奔走茍意向之或偏舉動之不審則治忽之機實肇於此今也講學以進德求賢以輔治開言路以通下情此帝王盛德之事而皆舉行於臨政碩治之初是其初意之善固足以聳動觀聽天下安得不以為喜然是意也易長亦易消易勤亦易怠必守之以堅行之以力則日就月將以極其緝熙之功言聽諫從以盡其施行之實求之必用用之必信而使賢者能者無不盡其才之歎此豈非天下之所深望哉茍能為其所喜而復滿其所望則唐虞三代之盛有不難致者矣共惟陛下以神聖之資紹延洪之業體元居正厲精思治謂多聞乃可以建事也則鋭情經術增置講官謂帝王之德莫大於納諫也則下明詔以求直言命群臣以上封事謂邦基之立惟在於得賢也則播告中外各舉才識凡此設施無非治道之大端則善始之意固已不容言矣然臣惓惓之忠尤望堅守而不變焉蓋自昔人主固有留意於經理者矣而為黃老養性之説或欲以沮其勤不欲人主觀書者又欲以售其術稍不加察則近便嬖之時多親儒生之時少而好學之勤不能如其初矣亦有鋭意於求言者矣然逆耳之諫難受順旨之言易從一或偏聽則剴切者謂之沽名訐直者疑其訕上而悅諫之心必不能如其初矣亦有汲汲於求賢者矣然君子鯁直而易踈小人柔順而易親親則莫見其非踈則莫見其是故積年信而任或一朝疑而棄則好賢之心復有始而無終矣凡若此者皆後世人主之通患茍非天德清明純亦不己未有不蹈其轍者陛下退朝之暇猶勤觀覽切直之諫優加褒擢收召耆德之臣旌表清廉之守此皆真心實德之所形見固非勉強而行者而臣猶以堅守為言是豈為是過計哉蓋自強不息斯可合乾德之大終始惟一乃可底日新之盛否則動搖於浮言而遷易於邪佞此心轉移一息間耳而治勢安危所關者大臣不復援引古昔請近述國朝之事以明之昔元祐初選擇名儒勸講經幄廣開言路增置講員擢舊德於散地設十科以薦賢一時之治燦然更新疑若可以無遺慮矣而當時之臣猶有隱憂焉劉摯則曰已行之令持循勿變則治道成王巖叟則曰惟當日篤此心不可少移初意以至日謹一日天下之事不足慮程頥言之終則念始不可不勉傅堯俞又言之無非欲其堅守不變以成其初政之美哲宗信用其言故元祐之盛度越今昔異時此論一搖或以紹述之説進或以調停之説進則事體非復前日矣然則進言於今日者可不以是為戒哉雖然人主一心攻者甚衆少懈而受其一則陷溺其中而不自覺太宗皇帝嘗曰人主當淡然無欲使嗜好不形於外則邪佞無自而入此先正其心之意也此心一正則私意不足以亂其真而外物不足以更其所守以之講學則專而精以之聽言則公而明以之任賢使能則無所處而不當書曰監于先王成憲其永無愆惟陛下留神應龍又奏曰當國家多事之日而欲興起治功者其大要有二議論不可以不一命令不可以不謹蓋一則公是公非無甲可而乙否謹則令出惟行無驟更而數易古先聖人凡有大疑必謀及卿士謀及庶人翕然大同然後從之以為不如是則異論者得以惑吾聽巧言者得以肆其欺而國是無由定凡有政令必質之人情參之輿議罔有不臧然後行之以為不如是則上作而下不應朝行而暮復改而國事何由舉奈何時君世主無獨斷之明謀臧不從不臧覆用故佞者迎合以取容而偽者誕謾而求售辨者紛更以生事而戅者矯亢以賣直各執其説互相矛盾豈知議論不一人將何所適從歟無一定之規則慕美名而忘實患急近效而昧逺圖事不問是非而徑欲施行法不權輕重而遽欲更革豈知命令不謹烏能經久而不變歟如此則雖有聽言之名而反為多言所纍雖有善治之意而終無致治之期明主獨觀萬化之原其必有以處此矣竊觀更化以來言路廣開下情無壅論事切直者罔不嘉納上書狂悖者亦示優容建政立事興利除害戒飭官吏御札屢頒勤恤民隱詔書洊下百姓咸曰大哉王言一哉王心固宜庶政和而萬邦寧然悠悠嵗月成效蔑然豈道逺難驟致事大難速成耶推原其故無不議論命令之間猶有所當審者乎且今之議論如何哉意境土之可復則獻恢拓之謀一或少沮則謂和議之當講慮老弱之無用則申揀汰之請及至激變則復咎區處之失宜御教之議或謂可從或慮重費履畝之議或謂可行或謂亟免若是之類皆議論之不一也度牒不應敷何既敷而隨免官劵不必截胡既截而復造帑藏赤立遽建督府恐費用之難支謫籍未消復頒除命恐師言之未穆若此之類皆命令之不謹也誠使決以獨見不惑群議是者從之非者違之何至前後之抵牾作事謀始隨時施宜可則因之否則革之何患施行之不當蓋今日之弊謀雖廣而未能從衆聞雖多而未能擇善故議論不一而終難成事務名而不務實知利而未知害故命令不謹而易至反汗然議論與命令實相關係議不主乎公則命之出也必不合乎公論不當於理則令之行也必有背於理是則議論者其命令之樞乎然持是樞者實在大臣留屯之議公卿議臣以為不可而趙充國以為可魏相能主充國而先零之強不戰而服珠崖之叛陳萬年以為當擊賈捐之以為不當擊于定國主捐之而終漢之世絶無邉患此又大臣所宜加察雖然天下之事有經有權而又有機機者所以制治於未亂銷患於未形者也一或不密則害成矣其所係尤重也矧敵情叵測而備禦當嚴逆儔未馘而事變方激謀畫精審則轉危而安處置失宜則召釁稔禍凡一竒之出一計之畫固不容不周密也今所圖者萬分未獲其一而迹之布於天下已若泥中之鬬獸而況兵之多寡財之有無戰艦之未具城壁之或缺將帥之不和逺近傳播纎悉靡遺潛窺而陰伺者儻乘巇而投隙其能無岌岌乎且用兵之法有之不可使人知無之不可使人疑今朝廷之上雖務安靜而道聽塗説者多張皇以惑衆儻以無為有以虛為實豈不啓疑二而滋反側乎蘇軾有言智者圖事貴於無迹故功已成而人不知此切時之論也惟陛下與大臣亟圖之應龍為太學博士又奏曰臣聞天下有向安之勢人主無幸安之心則治功有隆而無替矣夫事至而為之備患生而為之防此特茍簡目前者之見至於無事而為有事之備無患而為防患之謀非憂深思逺者豈能計慮及此人主茍以是為念則久安長治之效又烏有難致者哉易之泰曰無平不陂無往不復艱正無咎夫居泰之世聖人不以為可樂而以為可懼者何哉天下之理無常平而不陂者無常往而不復者惟能艱危其思慮正固其施為則可以無咎夫泰者通也天下極安之時也聖人猶以為戒況未至於極安之時乎且今日之事非臣所當僭言也亦嘗竊觀天下之大勢矣河北山東雖入職貢而版圖猶未盡復殘敵垂亡遊魂假息而遺類猶未盡滅豪傑歸附人心響應而大勳猶未遽集是雖有向安之勢又不可不為久安之圖必思患而預防隨機而應變然後可以久安必振發以立志果鋭以圖功然後可以久安臣不敢逺引古昔請近述髙宗之事以明之敵人退避若可以少安矣而猶欲大立其恢復之模強敵遽斃若可以自賀矣而猶欲自治以待其釁以至論中興之有時則謂必有所施為而後可以得志論自古人君則以為未有安坐而不勤於四方者由是而觀則髙宗固不以既安之日而懷幸安之心故上焉有以建中天之業下焉有以垂億萬載之基其成效大驗蓋可覩矣率由舊章豈非今日之所當勉乎今朝廷之上亦未嘗不加意於此也宣威置於全蜀制閫列於邉陲新復郡縣經理而綏懷之流移邉氓勞來而安集之城壕則為之修築關隘則為之葺理若此之類固非因循茍安者之為也然而自治之䇿未易畢舉將帥雖擇果皆賢於長城如李績之守并州者乎士卒雖練果皆藝能精鋭如德裕之雄邉子弟者乎邉食雖蓄果能有十年之積如羊祜之在襄陽者乎若猶未也則激厲以作其氣委任以責其成使守禦之備無一而不舉則主威益振國勢益尊中興之業可指日以冀矣詩曰是究是圖亶其然乎臣不勝拳拳應龍又奏曰臣聞韓琦之論曰天下之事惟審其是定而不易乃可成務蘇軾亦曰先定其規模而後從事治亦多術耳而獨以定為先者蓋能定而後能應天下之大事機之繁以有限之力而應無窮之變茍所守不堅則議論之角立賢否之雜進政事可因可革其將何以處之惟吾心有一定之見以之聽言則無稽勿聽弗詢勿庸以之用人則任賢勿二去邪勿疑以之出令則堅如金石信如四時三者既定顧何事之不可為哉共惟陛下厲精更始總攬權綱急於聽言則論事之切直者悉蒙崇奬上書狂悖者亦示優容公於用人則收召耆哲招來俊彥無一藝之不庸雖寸長而不棄謹於出令則親灑宸翰洊頒德音或戒飭以警庶官或奬諭以厲將士聖化日新四方風動太平之盛可翹足以待也然臣區區之愚猶欲堅守而不變者豈顧為是過計哉蓋嘗敬觀元祐之事而參之今日之治則知定之一説信乎其所當務也今觀其時進擬可行之言看詳奏對之疏擢舊德於散地起忠讜於謫籍停水利而厚農桑之業罷青苗而復常平之舊免保甲而去民兵之擾一時之治絶後光前宜若可以無遺慮矣而當時之臣猶有隱憂焉劉摯則曰已行之令持循勿變則治道成王巖叟則曰惟當日篤此心不可少移初意無非欲其一定不易以為長治久安之計夫何異議之人日夕搖撼未幾國論一變或以調停之説進或以紹述之説進新學廢矣而復興之新法罷矣而復行之邉隙息矣而復啓之召釁稔禍遂詒伊戚然則言治於今日者可不以是為鑒乎且今朝廷之上凡所施行固不容議惟碩不以異議而搖不以小不如意而沮且機會可乘之言固快人意也而量時度力則未可以輕舉上䇿自治之説若委靡不振也而實可以圖全揣摩迎合雖若可聽然信而用之必至於誤事忠鯁戅直雖若逆耳然推而行之實切於時政此心一定是非莫惑尚何築舍道旁之慮哉臣故曰聽言不可以不定例不當得而得則扳援而妄求者頭鑽而肘刺才不足用而用則經營以求進者肩摩而袂接碩德偉績超躐遷擢人誰敢議名實未加於上下而遽膺不次之選則人懷幸得之心必以沈淪為恨把麾持節善最上聞增秩進職彼自知勸若迭更數易人無固志不惟迎送之重費尤恐績用之弗成凡此四弊一意杜絶則各安其分無復僥覬尚何賢否之混殽哉臣故曰用人不可以不定禁專殺謹徒刑所以示欽恤之仁戒掊克懲貪墨所以洗舊汙之染若是者斷在必行犯者勿貸孰不􅏮然而知警乃若蠲免賦租固欲寬民力也而州郡乃以用度不贍而冀朝廷之裨補輸納用劵固欲救折閲也而常賦所入虧損過半既乏見鏹以應軍衣之支復窘財用以供經常之費若是者尤當通融其有無斟酌而蠲減否則迫於文移急於逃責必至創立名色肆行科罰倚法以削民何以堪若是則雖有恤下之美名未必有及民之實惠必詳考熟究使公私俱便庶可立為定制不然則朝行暮改徒為墻壁之虛文耳臣故曰出令不可以不定雖然此非至難之事也特在乎一轉移之頃耳然尤有大於此者敢以關於理亂之原者陳之昔吕陶言於哲宗之朝有曰君子小人分辨則治道成邪正雜揉於朝則治體不能以純一今之君子固彚進於朝矣豈無投間置散而未盡用者乎今之小人固斥逐無餘矣豈無潛窺陰伺以冀其復進者乎天下之患莫大乎君子有挾持天下之志而小人得參其間使不得以展布焉夫君子不得以展布君子何病也君子一去而小人得以鼓舞而竊其權肆意妄行不至於極弊大壞則不止然則人主果何利於此哉今大明當天魑魅盡伏固無所容其迹然藥石於強壯之時乃臣子拳拳憂國之忠易曰履霜堅氷陰始凝也是必防其微杜其漸則天下可以常為泰而不為否矣臣位卑言髙罪在不赦惟陛下恕其愚歷代名臣奏議卷五十八
