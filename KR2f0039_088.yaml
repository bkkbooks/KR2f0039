body:
  text: 歴代名臣奏議卷八十八明楊士竒等撰經國宋髙宗時張浚上言曰臣受陛下聖知最厚自謂遭逢幸㑹盖非偶然凡有所見盡言無隠又況社稷至計所繋臣安敢曲為身謀黙不上逹仰惟俯賜矜察不勝大幸臣契勘金人侵犯以来强暴為甚鋒不可當公卿大夫上負國家甘為叛逆其大惡不道固不待言矣次則不過畏避怯縮随時俯仰敵之未至幸且偷安敵之憑陵委身而去陛下念其勢力不逮旋復器使此往事之明驗也其間盖有恨敵之不道憫國之無辜誓死捐身力圖破敵而事機之来有成有敗好事觀望之人又復以輕狂而媒糵之然則為陛下社稷至計果如之何而可乎臣嘗折中而論之大凡持盈守成遲重是貴謀功立事勇决為先今國勢衰弱宼難日至使人人懐因循茍且之心不敢任成敗安危之責臣恐日復一日坐致大壊矣臣竊謂當今䘮亂之後謀身者易任事者難謀身則毁譽不至任事則怨謗立随仰惟陛下念社稷之重思中興之難反復熟計以觀得失至於臣之起自孤逺驟膺委寄不自量力妄意事功則又甚難矣今臣欲決意以圖敵則恐負敗事之憂欲専斷以立功則恐貽擅權之議至於因循玩日姑為朝夕之計事極勢危終歸於無可奈何則又臣之所深疾痛恨不肯為此以負陛下知遇也伏惟萬幾之暇特賜省覽庶使臣之孤忠得被聖知趨事赴功雖死無悔臣無任激切之至浚論當時事勢曰臣聞受非常之恩者圖非常之報拯焚溺之急者乏徐緩之音臣竊惟當今事勢譬若養成大疽於頭目心腹之間不決不止決遲則禍大而難測決速則禍輕而易治惟陛下謀之於心斷之以獨謹察情偽預備倉卒猶之奕棊分據要害審思詳處使在我有不可輙犯之勢庶㡬社稷有安全之理不然日復一日且將噬臍異時以國與敵者反歸罪於正議此臣所以食不下咽不能一夕安也倘非陛下聖徳在人獲天地之祐承祖宗之慶有以照察其心臣亦何所逃罪浚論車駕進止利害曰臣昨日幸侍天光獲聞聖訓退而思之惟是車駕進止一事利害至大臣區區中懐所見未知當否敢以剖露惟陛下深思而詳擇焉臣竊惟天下之事不倡則不起不為則不成自古賢聖之君平定禍亂未有謙退逺處而能躋天下於太平之域者惟太公避狄勾踐報呉二事士大夫多以為口實不知與今事勢萬萬不同夫祖宗二百年積累之基付在陛下不幸而敵人陵之叛臣據之陛下不得已而養銳待時以俟天定猶之可也至於事有可為之理時有可興之勢思前慮後猶豫不決豈不重失人心乎臣請以棊諭善奕者先固基本次定筭數臨以大勢使之左右枝梧之不暇然後我勝可必彼敗可分今四海生民之心孰不思戀王室者敵人相結脅之以威雖有智勇無由展竭三嵗之間賴陛下一再進撫士氣従之而稍振民心因之而稍回正當示之形勢庶㡬乎激忠起懦而三四大帥者亦不敢懐偷安茍且之心夫天下者陛下之天下也陛下不自致力孰肯履危險忘寝食孜孜焉惟恢復是望而愚忠不移者乎臣意謂今日之事存亡安危所自以分陛下六師倘還則有識解體内外離心日復一日終以削弱異時復欲下廵幸詔書誰為深信而不疑者何則彼知朝廷姑以此為避地之計實無意於圖天下故也陛下若斷自宸衷有進無退車塵一動上可以格天心下可以順民望敵人之勢寖以蹙縮大功自是而立大業自是而成論者不過曰萬一秋冬有警車駕難於逺避夫軍旅同心將士用命扼淮而戰破敵有餘況陛下身臨大江氣當百倍苟士不効力人有離心陛下雖過自為計將容足於何地乎又不過曰當秋而進士有戰心及春而還絶彼窺伺此特可舒一時之急應倉卒之警年年為之人皆習熟謂我不競當有怨望難乎其立國矣又不過曰敵占上流順舟而下變故立生所不可測夫襄漢我有也敵舟何自而来乎敵人事力有餘果能陵犯水陸偕行自上而濟陛下身處臨安去建康無數舎之逺也䖏之其安否乎三者利害有同白黑矧惟陛下遭兩宫之大耻負四海之重責天意人心兩皆屬望有為而無成天下猶矜憐而歸心陛下也不為而坐待其盡為禍可勝言耶夫為將帥之策者恐臣導陛下而前督其進取曽不知事有機㑹時有利鈍士馬不能遽益也敵勢不能立破也要宜剛大其志氣恢洪其度量以拯救天下百姓為心仰無愧於天俯無怍於人度事而為審時而動先謀自治利而誘之致而破之何難而不可濟哉惟陛下斷以恢復為事則任恢復之人以退守為事則任退守之人使各引其𩔖求其黨一意施為為陛下畢盡死力庶乎不至於操持兩端擇利自謀也臣又竊譬之父有痼病其子欲以瞑眩之藥治之而或者爭止焉為或人之謀疑其愛已為子之謀似乎不審然而人各有心姑取䛕恱捨此適彼所不慙焉謂子為不盡忠乎其父豈不過謬哉今日侍陛下以還為臣之謀無所任責誠亦得計矣為陛下國家之計恐有所未至是以披心腹露肝膽反復一二言之而不知其當否也伏惟陛下裁赦浚論脩徳以圖恢復䟽曰臣聞明主能受盡言暗主以言為諱臣幸遭遇陛下不以臣為至愚不肖數亦采聽其說臣倘不以死力陳而猶回顧後患是臣負陛下矣故願盡區區之忠烏乎尚忍言之哉今吾之二帝宗族逺䖏沙漠之地憂憤無聊可想而知輕侮肆辱可思而見臣嘗屈指而計之如此者盖三千晝夜矣雖云嵗俸之牛種時遺之粟帛數既不多安能充養彼其殘忍用意實欲摧折而消磨之也雖然此尚以陛下揔師于南不敢遽加無禮耳嗚呼陛下異時之事一或差跌禍有可勝言者乎臣自富平既敗分膏斧鉞陛下矜憐其心不以釁鼔臣幸復見天日陛下之恵也今事雖有可為之機理未有先勝之道含糊畏黙終不以言而僥倖於一勝富平之事將復見於今日矣豈惟上辱陛下抑亦辱臣之身臣願披肝膽露心腹為陛下言之夫兵家之事不在交鋒接戰然後勝負可分要在夫得天下之心則士氣百倍叛臣歸服不旋踵而四海定矣故人君之道莫先乎正心脩身以感格天下之心然而是豈可以偽為哉一毫有差四海共知今使天下之人皆曰吾君孝弟之心須㬰不忘寝食之間父兄在念則忠義之士當思有以共憤雪耻矣吾君言動舉措皆合禮法至誠不倦上格於天則教化必行於異日矣吾君之朝君子在位小人屏去侍御僕従㒺匪正人譛言不行邪言不入市井之談不聞道義之說日至則内外安心各服其職矣吾君棄珠玉絶弄好輕犬馬賤刀劍金帛之賞不以予幸惟以予功則上下知勸矣夫如是則將帥之心日益以壮士卒之心日益以奮天下四海之心日益以歸彼將曰吾君之所為如此所行如此敵人不道尚肆吞噬曷不共力而同濟事功哉金國之人雖號荒服盖亦心知善惡非盡憃愚全無知識也聞陛下之威徳知中國之理直則氣讋志䘮小大離異戰未必力衆未必同如此陛下何為而不可何事而不成乎嗚呼事或有一不然疑惑之説毫髪著見於外天下之人口不敢言心則敢怒異時事乖勢去禍亂立作如覆水之不可救矣盖隙一見於此心已生於彼不易之道為人上者其可不畏而戒之耶且自古為君甚難非獨今日也或一言之失或一行之非或失色於人或失禮於人或一小人在側便足以致禍致難起戎起兵前日明受之變大逆之徒陳兵闕下旁引他詞其鑑不逺也今祖宗傳陛下以二百年之基業而陛下聖徳日躋學問日廣斷然脩其在已者遂可以致帝王之治何憚而不勉之耶如臣備位宰輔受美禄享重名豈不欲懐姦觀望因循度日以全其身哉顧以異時身無死所且䝉誤國惡聲則為臣莫大之醜故寧盡言而得罪於今日也不識陛下能恕而容之於後日乎陛下果能容之而欲以至誠行其事臣將繼此而一二以獻焉浚又奏曰臣伏見近報罷諸路檢察財用官并福建江西路收買翎毛亦皆住罷臣仰惟陛下仁民愛物事每謹㣲雖帝王之用心不過是也然臣區區之意竊以為天下之勢有緩急天下之事有輕重急其所緩重其所輕則顛沛於末流而害之加於百姓有不可勝言矣臣嘗謂天下大計譬如人之一身方安平無事之時恬淡虚静調養元真足以保天和享夀考不幸而養治失素痼疾已成邪氣侵淩日甚一日茍非瞑眩之藥毒而治之臣恐元氣既失必無遽生之理今天下之勢衆所共知倘不思拯溺救焚之策以保吾民豈不終至危殆耶臣非不知夫捐器甲而不脩捨弓矢而不造羽毛不傷舟車不葺漕運不督激賞不施可以裕民力足財用崇虚譽靖國人然而叛臣之禍近在腹心一旦緩急誰任其責將棄吾赤子而避之乎亦將驅士卒而與之争乎若欲驅士卒而與之爭即如前所陳闕一不可此數者固非天降地出出於民力而已安有事借民力而無毫髮之擾者哉夫合天下百姓之力除天下百姓之害而措之安平之域雖湯武復生無以易此也顧取之均平無或苛虐使錙銖寸粒還以為民斯善矣且商周之君當桀紂之時退而脩徳以待天定方是時桀紂未嘗憑陵天下也故能脩徳以懐徕天下歴時之久得行其志陛下上有父兄之讎下有生民之責敵之謀我嵗必一至四海嗷嗷未見休息以事揆之如黄帝之有蚩尤漢髙之有項籍光武之於赤眉王莽爭雄角力曽不少暇轉晷之間存亡所係自非一大痛治掃除其惡推行仁徳與民更始四海内外何以獲安且檢察之官謹擇其人可也以財用為不當檢察非也羽毛之實謂申請措置之不善可也併兩路而悉罷之非也不然即天下之事無一可為姑束手端拱聼之而已彼操仁義繩墨之說者正如人之有疾勢在膏肓庸醫畏縮方且戒以勿吐勿下姑進參苓而安養之終至於必死主人猶以為愛已也乃若良醫進剖腹洗腸之術傍觀駭愕指以為狂迨疾良已尚不免夫輕試之謗自古掠美附衆者得譽常多而骨鯁當權者負謗常重天下之事難如人意大率如此往者澶淵之役寇準決策親征功存社稷事平之後姦臣謂其輕棄萬乗假此擠陷近事之鑒使人傷憤臣起廢放之中䝉陛下一心委用願竭死力以報恩徳雖此兩事臣不預行然傳聞紛紛思之誠為可畏萬一異時事有大於此者出衆人之不意始徐起而議之則敗事多矣伏望陛下申明内外更賜詳議國是既定事乃可為孟子曰人之易其言也無責耳矣無責之人言每輕發況乎懐私意務搖動者乎且靖康以来借仁義愛民之言以進說者不知其幾人矣其後都城之禍渡江之後生民塗炭莫之紀極官私事力十去八九愛民之意其實安在當時大臣流離竄棄雖死無益而獻言陳説者今尚保其妻孥以安於田里也臣之區區不自量度輙任國事早夜以憂必欲盡力而為之然而事之成敗猶恐未保倘於此含糊首鼠誤陛下決矣伏望聖慈察臣之心茍所見邪僻不可信用臣自此入覲天光即乞骸骨歸里養親矣冒犯天威無任震恐浚論和戰利害䟽曰臣夙負大罪自謂必死瘴癘之地仰惟陛下優容之矜憐之保全之死骨復生盡出聖神之造自今已徃皆已死之日而陛下實生之臣今雖居苫塊中安敢恝然遂忘陛下恩徳且顧惜一已而黙不出一言庶㡬有補萬一哉惟陛下察其用心恕之而已臣聞自昔忠臣事君莫不欲其主之明莫不欲其主之聖莫不欲其主之名顯日月功盖宇宙彼知夫國家安榮則其身亦與有安榮故犯顔逆耳而不敢辭也姦臣不然惟利之圖不復他恤導君於非使重失天下之心而隂肆其邪志始則曲意媚順而蔽欺人主之聦明終則専事擅權而潜移生殺之大柄跡其包藏有不可勝言者矣然而身滅家亡族覆世絶見於史册歴歴可攷天下後世視之曽犬豕之不如彼果何所利耶惜乎至愚而莫之思也日者陛下法乾之剛而用以沉潜施設中機天下四方孰不畏服是臣可言之秋也臣䟱逺不復預聞朝廷機事而伏思念今日事勢極矣陛下將拱手而聼其自然乎抑將外存其名而博謀宻計求所以為長久歟臣誠過慮以為自此數年之後民力益竭財用益乏士卒益老人心益離忠臣烈將淪亡殆盡内憂外患相仍而起陛下將何以為策祖宗盛時嘗與敵通好矣惟力敵勢均而國家取兵於西北取財於天下文武之才世不乏人是故其事得以持久而百四十年之後靖康大變事出不意禍亂之酷亙古所無論者猶恨夫恃和為可安而不知自治之失也今天下㡬何譬之中人之家盜據其堂室安居飽食其間而朝夕隂伺吾隙一日有間其捨我乎然則陛下不可不深思力圖於此時也且敵嘗有弑立之舉夫弑逆之人天地所不容人情所甚惡誠能任賢選能脩徳立政斷然為吾之所當為口不絶和而實以勢臨之彼必有瓦解之憂借使敵不量度輕為舉動第堅壁清野以遲之明示逆順其衆自離敵之危亡可立而待何則人心不肯趨逆而忘順也假之五七年而敵君臣之分定彼國有人得柄用事雖有賢智莫知為陛下計矣願陛下精思審謀無忘朝夕無使異日有噬臍之嘆夫約和衰弱之時謂不能久而敵人之變洊生於内則是天賛陛下違天不祥陛下其承之臣聞人之俯仰天地間所以自立其身者不過忠孝二字此天下之大義不可斯須少忽也而臣行負神明孤苦餘生親養已無所施矣事有大義所當為者不過盡忠於陛下顧雖頭目手足有可捐棄而為陛下用者所不當顧惜而況親逢聖明極力保全恩徳至大使臣有懐私顧已匿情畏罪慮禍之心則是陛下不負臣臣實負陛下天地鬼神其肯容之㢤是以不顧嫌疑不避鼎鑊不恤讒毁為陛下陳之陛下勿謂軍民之心為可忽忠良之言為可棄夫治天下譬持罌水一決而潰有不可收拾者矣陛下其念之哉臣行年六十死亡無日非若紛紛者互持和戰之說惟恐其説之不勝而身之不獲用貪目前之得忽久逺之圖臣知為陛下國家計耳陛下安榮臣亦與有安榮臣之自謀亦豈為不審耶幸未死得終禮制陛下不以臣為愚而卒棄之願陛下許臣居嚴婺間賜之屋三十楹田三十頃俾得優㳺養痾田野間為陛下謀畫心腹之臣以畢盡愚忠庶㡬有補萬一臣之志願足矣惟陛下廣乾坤之度以精求天下之賢無忘祖宗國家之耻父兄宗族之讐盛徳大業昭著後世臣猶幸及見之臣不勝大願浚又上言曰臣受陛下更生大恩今至憂廹身渉險萬里常恐一旦死填溝壑終無以仰報萬一思得以展盡所懐瞑目無憾臣嘗病夫世儒牽扵和戰異同之説而不知實為一事或者竊儒為姦不知經史之心切切焉利禄是圖而有以欺惑陛下之聴又其甚則大姦大惡挾敵懐貳以自封殖其家簧鼔曲說愚弄天下敢畢陳之臣聞天地之大徳曰生而天地生物之功本於秋冬盖非嚴凝之于秋冬則無以敷榮之于春夏然則秋冬之嚴凝乃生物之基也在萃之象曰除戎器戒不虞而泰之九二爻辭曰包荒用馮河泰萃之世聖人謹於武備如此謂不如是不足以生物而行其心也況時丁艱難而可忽略不省啓大禍于後反謂是為得哉若夫一時之和則亦聖賢生利天下之權也商湯事葛矣而終滅葛書曰湯一征自葛始周太王避狄矣築室于岐未㡬謀以却敵詩曰乃立冡土戎醜攸行文王事昆夷矣而卒伐之詩曰昆夷銳矣維其喙矣越勾踐事呉矣坐薪嘗膽竟以破呉越語曰越十年生聚十年敎訓彼皆翕之乎始而張之乎終汲汲乎徳政脩立而以生利天下為心未嘗恃和為安自樂其身而已也漢髙祖嘗與項羽和歸太公吕后割鴻溝以西為漢東為楚良平進言今楚兵罷食盡此天亡之時不因其機而取之是養虎自遺患也漢王従之卒成大業漢文帝與匈奴和曽無間嵗之寧漢文全有天下謂可和以息民方是時百姓猶不免侵陵之苦至武帝始一大征伐之其後單于来朝漢三百年間用以無事唐太宗天下初定有渭上之盟未㡬李靖之徒深入沙漠之地犂其庭係其酋海内始安焉兹豈非以和為權而得之哉若夫石晉之有天下則不然取之非其道謀之非其人桑維翰始終於和其言曰願訓農習戰養兵息民俟國無内憂民冇餘力觀釁而動動無不成初若有深謀者然考其君臣所為名實不孚于上下朝廷之上専務姑息賞罰失章施設謬戾權移於下政亂於上無名之獻莫知紀極一時用事方鎮之臣往往昏于酒色厚于賦歛果于誅戮以害于百姓朝廷莫知所以御之所謂訓農習戰養兵息民略無實事維翰所陳殆為空言姑欲信其當時必和之説以偷安竊位而已契丹窺見其心謂晉無人須求陵侮日甚一日後嗣不勝其忿始用景延廣之議僥倖以戰而不知其荒淫怠傲失徳非一日天下之心已離天下之勢已去天下之財已匱延廣不學不知行聖賢之權亟思所以復其心立其勢强其國急急兵戰之爭事窮勢極數萬之師無一夫為之發矢北向者至今為天下後世嗤笑凡言君臣委靡不振服役于人者必曰石晉云臣仰惟陛下聦明聖知孝心純一即位以来簡用實材敵人聞風而畏之於是有議和之事陛下以太母為重且幸徽宗皇帝梓宫之亟還和之權也不幸用事之臣貪天之功肆意圖利乃欲翦除忠良以聴命於敵而隂蓄其邪心方國家閒暇之時怠傲是務徳政俱廢而専扵異已之去志果安在哉夫敵日夕所願望者欲我之忠良淪没耳欲我之盡失天下之心耳欲我之將士解體其氣不復振作耳欲我之懐於宴安以甘于酖毒耳前日用事者一切徇其所甚欲而畢為之不幾乎與敵為地歟身死之日天下酌酒相慶不約而同下至田夫野老莫不以手加額其背天逆人不忠于君而天人之心重惡之如此且彼曽不思夫敵之於我其愛之而和乎其有餘力而肯和乎其國中亦有掣肘之虞而和乎其欲圖之於後而和乎臣謂敵有大讎大怨不可復合譬夫一葉之分今日之和必其酋帥攜離人心睽異姑為此舉以息目前而圖回江淮以去除後患之心其中未嘗一日忘也惜夫昏庸姦賊之人豢於富貴闇於政事曽無尺寸之效以上報於國家毫髪之惠以下及於百姓分列黨與布在要郡聚歛珍貨以獨厚於私室為身謀為子孫謀而不知為陛下謀不知為國家天下謀坐失事機者二十餘年以誤陛下社稷大事有識之士誰不痛心且夫賢才不用政事不脩國勢不立而專欲責成受命於敵適足以啓輕侮之心而正墮其計中魯仲連所謂彼將有所與奪梁王安得晏然而已乎此甚可痛恨者也敵國之人何自而畏敵國之難何自而成遲以嵗月百姓離心將士䘮氣國亦危亡而已矣臣願陛下鑒石晉之敗而法商湯周太王文王之心用越勾踐之謀考漢唐四君之事以保固社稷天下幸甚臣竊料前日用事者獻議於陛下不過曰以我之和而敵之變難洊生是欺天之説也敵相殘之釁其来有素初不在夫和與不和之間向使國家徳政脩乎上威令加乎下敵之變難豈不有大於此而我不世之耻庶㡬其可雪乎又不過曰姑少遲之更俟其亂此盖度其身之必不可辦任大事相與為叨竊茍且計而已非國家計也萬一敵有人焉定其亂而强其國臣恐當是時陛下不得一夕安枕矣古語曰當斷不斷反受其亂又曰天與不取反受其咎又曰畏首畏尾身其餘㡬又曰機事之来間不容髪此四者今日之謂也願陛下體道之權外示順聽一一従之於今及春陽用事與廊廟大臣圖回大計復人心張國勢立政事不絶其和而遣一介之使與之分别曲直逆順之理事必有成臣不孝之身親養已絶含毒忍死其亡無日徒能為陛下言之而已臣乂伏思祖宗之徳在天下至大至厚太平之治多歴年所三代盛時有不能及恭惟皇帝陛下稟乾剛之資而輔以緝熈之學何為而不成何治而不至願陛下充其志氣擴其聦明必使清明在躬如太虚然惟是之従以選賢才以脩徳政以大基業天下幸甚浚奏恢復事宜曰臣伏覩聖㫖指揮令㳂江諸大帥監司帥守各條陳目今進討恢復事宜合如何施行具已見利害疾速聞奏此陛下兼覽衆智明目逹聦之義也天下幸甚臣不自量甞以河東陜西之策上浼天聽伏想已逹聽覽竊惟今日之事當自陜西河東山東始以觀其變以度其勢然後因時而應似為得宜臣仰惟陛下好生之徳格于天地敵人不道自取殄滅此天心也誠可為天下大慶然臣嘗觀唐安禄山之亂慶緒史思明繼之稱兵為虐亦既數年縁九節度之師節度不一心腹不相得一敗不振使之及此誠可為龜鑑也臣自入本路界早夜詢問江淮目今民力軍勢之實百姓困扵征役科歛頻繁頗不聊生軍馬疲扵道路飢疾相仍殘死者衆民多流離軍有愁歎將或驕而不武兵或分而不協臣願陛下厚撫軍民亟施恩惠固結其心振作其氣謹簡將帥大脩軍政乗此機㑹掃除大讎陛下略細務罷常程去冗食專意馬上之治除天下之大害興天下之大利如祖宗創業之初則中興之業盛大無窮功績之隆震耀前古固陛下之所優為臣愚無識嘗誤國事每自震懼顧何足以補萬一區區愚忠不忍少隱當否未必惟陛下寛赦采擇不勝幸甚浚論歸正人利害䟽曰臣竊惟自昔創業中興之君圖回天下初非有夙任之將素養之兵舊撫之民為之用也攷其施設事非一端或取之羣盜或得之降虜或以敵人攻敵人莫不虚懐大度仰憑天道俯順人心以成大功後世仁徳之不孚措置之失宜馴致降人多有背叛此非徒人事之繆盖亦天命之所不歸也今陛下紹隆祖宗方務恢復乃扵降者而首疑之則左右前後與夫今日軍旅之衆孰不可疑而況他日進撫中原必先招徕事乃可濟若處之失當反激其怒他日人自為敵未易可圖計之出此豈不誤哉雖然臣知此非陛下意也盖陛下將有經營四海之心推誠待人如天如日豈比固陋之士姑為保身全家之謀唯恐大江以南萬一生事耳至扵刺客間起固容有之不可不防然亦安可以此因噎廢食也死生有命富貴在天聖賢豈虚語乎臣之幕屬固有力持此議者臣盖甞深闢之伏乞睿照浚又論招納歸正人利害䟽曰今月初二日司農寺丞史正志到建康伏領御筆䖏分臣不勝感懼惟歸正一事臣日夜思念至熟不敢少忽也竊惟國家自南渡以来兵勢單弱賴陜西及東北之人不忘本朝率衆歸附以數萬計臣自為御營參賛軍事目所親見後之良將精兵往往當時歸正人也三十餘年捍禦力戰國勢以安今一旦遽絶之事有大不可者臣不避誅責敢條列于後此令一下中原之人以吾有棄絶之意必盡失其心一也人心既變為寇為讎内則為敵用外則為我宼二也今日處分既出聖意將見淮北之人無復渡淮歸我者人迹既絶彼之動息無自而知間探之𩔖孰為而遣三也中原之人本吾赤子今陷扵敵三十餘年日夜望歸如子之仰父母今有脫身而来者父母拒而棄絶之不得衣食天理人情皆所未順四也自往嵗用兵大軍奔馳疾疫死亡十之四五陛下慨念及此既望諸將各使招募若淮北之人不復再渡所募之卒何自而充五也尋常諸軍招江浙一卒之費不下百緡而其人柔弱多不堪用若非取兵淮北則軍旅之勢日以削弱六也臣自叨任使事即為二説以盡其情其一山寨之首領来歸厚加犒勞使持帛書復往撫論本䖏山寨令各安居耕種毋輒生事以待王師其二許令充應萬弩之選若有官借補之人不肯與效用為列即以忠義従軍之名䖏之各令準備差出間探及學習弓弩以就行列今近二百餘人其攜家而来者老弱不任軍用則分撥荒田借貸錢粮俾為屯守之計區區不敢少容私意扵其間惟此一事所係甚重若果絶之人心一失大事去矣仰惟陛下聖明仁孝英武有太祖太宗之遺風思欲拯生民之厄雪廟社之耻國家所係人心為本陛下恢洪聖度同符天地信順獲祐其理必然天下幸甚浚又論泗州事宜䟽曰臣竊聞敵人有燕山自立者偽赦傳聞大略可見此天付陛下以恢復之日也目今事宜臣愚以為宜召募有智辯使臣數輩持主事宰執書反復詳列俾切中其心庶㡬祖宗故地不待血刃可復得之仰惟陛下早夜整兵訓戎命帥擇將聚糧儲財以待機㑹中興之業其必有成臣又伏見淮東泗州在今日最為要害之地若得一智勇兼長之將以歩騎五千近日未經戰戍者使守其中北可以通京師東可以通山東西可以通陳蔡英雄豪傑其必有環應而起者第與之深結勿用輕復城邑它日大兵一出嚮導既得人心既歸孰不響合惟是擇任不可不謹臣智識淺短特以荷陛下恩遇夙夜殫竭不敢不盡其誠陛下不以為罪自兹機事之来臣當次第具所見以進用備采擇之末伏惟聖慈貸其狂愚不勝幸甚浚又論撫恤淮漢兵民及經理陜西河東事宜䟽曰臣竊見淮西敵人以聖駕俯臨大兵四出引衆遁去其勢必為北歸計臣竊伏思之敵人悖逆天道率脅醜𩔖来渉吾境衆叛親離旋被殺戮天之相佑國家大啓昌期可謂甚著兹盖皇帝陛下執柔剛之權惟其時中盡仁孝之誠有以上格自信此心終獲其應顧兹機㑹誠大有為之秋也天下幸甚臣待罪藩方望屬車之塵不逺數舎歡忭之餘反復深念其敢不盡竊以天意人事推之今日為恢復之時盖無疑矣雖然恢復所宜詳講周慮使出萬全臣愚以為来逺之道先自近始為今之計恐宜以撫養根本為急務也惟自夏迄冬江漢兩淮之間兵疲往来民困饋運若復大舉深追誠恐所得未㡬而我之事力益覺其弊借使河南之地即盡得之秋風既髙鐵騎萬一復来不得不虞恐或一城差跌百姓必重被其毒孤中原歸戴之心遲海内平寧之望臣故願陛下孜孜扵撫兵恤民之事俾江漢兩淮得少休息扵三兩月間圖回經略之心則黙運而亟行之頻遣間使求歸故地以察其情以觀其勢以怠其志以回其心廣陛下好生至徳使諸國之人皆知愛慕而坐銷其精兵勇夫怒我復戰之意時發檄文責任將帥招撫中原其間豪傑自樂輸情獨陜西河東形勢所在厥今可以進為伏乞更勤神筭以時授之俾先駐險地常為大敵復臨之計山東海道亦宜一大措置付以成謀據天下之要阨海道之衝左牽右引使支梧之不暇而後使人之辭得伸其説縦其未従吾之勢力亦足以平定中原矣伏惟睿筭固已洞燭區區愚見何補萬分仰乞特賜采擇不勝幸甚浚又上經理淮甸䟽曰臣竊惟敵人退兵之後士馬物故㡬半飲馬長江之志固未敢萌也而用事羣酋人各有心日夜備具似有欲窺淮甸之謀先事預圖理不可緩我之甲兵方之昔日西北之士所存無㡬而又去嵗捍禦大敵傷折逃亡繼以病死十亦四五馬固同之以今嵗事力比量酌度夫人知其為弱也議者或欲弭兵息民以治在我此説近是也誠恐敵之圖事未肯但已一旦倉卒何以待之又況補集將士必資西北之人能戰忍苦方為可仗然則乗機及時内堅守備外疑敵心左牽右制使之首尾奔趨人情揺動斯為成筭不可忽也淮甸要䖏我不先圖異日勍敵起侮渡淮先據形勢則事有難䖏者矣惟陛下其念之臣愚不勝惓惓浚又論蕭宇等約降及恢復事宜䟽曰臣今月初七日得翰林學士史浩書恭領御筆處分臣愚荷陛下示以腹心與謀至計其敢不盡誠臣契勘宿州縂管蕭宇及蕭千戶皆契丹之族屬今其聞契丹之盛欲歸之心想見甚切其言誠實誠如聖諭臣見已選募得力心腹人前去外臣伏讀聖訓將来秋深以大兵繼之来降則重賞叛則破之陛下聖慮盖得之矣今當以兵臨境約之使降俟其従我俾居先鋒同共破敵若付之以兵責成扵宇等恐它日有難制者聖意素定臣謹當遵守惟是定中原圖恢復非徒係之天時亦須人事克盡有以副之仰惟陛下兢兢脩徳誠意格天必欲拯斯民之窮復祖宗之業規模甚盛然而朝廷承前日多事之後綱紀未立賞罰未明人才未集法令未行風俗未變甲兵未備財用未足自治上策猶不能盡厭人心臣愚以為今日之㡬既不可失所以圖之當務酌中庶㡬萬全臣前日之奏欲令呉璘固守徳順時為聲勢牽制其西復欲令淮東之兵循海而出水陸漸進揺動其東彼之事勢大槩可見然後復以重兵進襄漢只當以一二萬人耀兵許順以示出竒盖彼處糧道難繼不當更用重兵恐乏食退師更沮軍勢異時善後之策莫若屯駐大軍扵順昌非惟糧道便利屏蔽江淮而與山東陜西聲勢相通若河南之地盡歸扵我臨河都邑秖先選募令自為守我之大兵雲屯順昌招来英豪益壮軍勢常為備具以待其来縦竭國逺至亦必有以破之矣況其大勢既去不能復来耶臣所陳今日經常之規理當如是若夫東北之人雲合響應與夫敵自相攻其勢攜貳此又一時機㑹雖事有決然者而不敢預必但當先為在我不可勝之計耳臣衰遲淺學何足以補聖聦萬一伏惟聖慈更賜睿斷特降䖏分浚奏恢復事宜曰臣老無能為自䝉太上皇帝委用既而陛下紹統信任彌深審計宻圖朝夕不替臣扵五月間必欲廣運錢糧冒險泝淮置之于西正以事機之来理不可失今日誠有可為之時獨師旅單寡賞予闕乏將帥難得不可冒昧一戰以幸其成所宜圖為萬全左牽右制徐為之應若異時形勢自見果有必取中原之圖願陛下假臣以權使得少効尺寸然後歸老山林臣之願也至於見可則進知難則退惟社稷之計是謀惟生民之命是卹此又臣區區素心初不敢僥倖一時之動貽悔後日也伏乞聖慈更賜睿照時詔問宰執方略資政殿學士李邴條上戰陣守偹措畫綏懐各五事戰陣之利有五曰出輕兵務逺略儲將帥責成功重賞格大略謂關陜為進取之地淮南為保固之地關陜雖利扵進取然不用師扵京東以牽制其勢則彼得一力以拒我今大將統兵者數人皆所恃以為根本萬一失利將不可復用偏裨中如牛臯王進楊珪史康明皆京東土人知地險易可各配以部曲三五千人或出淮揚或出徐泗彼將奔命之不暇此不動而分陜西重兵之一端也闗陜今雖有二宣撫其體尚輕非遣大臣不可呂頥浩氣節髙亮李綱識量宏逺威名素著願擇其一而用之必有以報陛下又言陛下即位之初韓世忠劉光世張俊威名隠然為大將今又有呉玠岳飛者出矣願詔大將扵所部舉智謀忠勇可以馭衆統師各兩三人朝廷籍記遇有事宜使當一隊毋𨽻大將則諸人競奮才智皆飛玠之儔矣大將爵位已崇難相統一自今用兵第可授以成筭使自為戰而已慎勿遣重臣臨之以輕其權而分其功今却敵退師之後必論功行賞願因此詔有司預定賞格謂如得城邑及近上首領之𩔖自一命至節度使皆差次使足相當所謂守備之宜有五曰固根本習舟師防地道講遺策列長戍大略謂江浙為今日根本欲保守則失進取之利欲進取則慮根本之傷古之名將内必屯田以自足外必因糧扵敵誠能得以功名自任如祖逖者舉淮南而付之使自為進取而不至虚内以事外臣聞朝廷下福建造海舩七百隻必如期而辦乞倣古制建伏波下瀨樓舩之官以教習水戰俾近上將佐領之自成一軍而専𨽻扵朝廷無事則散之縁江州郡緩急則聚而用之臣度敵人他年入宼懲創今日之敗必先以一軍来自淮甸為築室反耕之計以綴我師然後由登莱泛海窺呉越以出吾左由武昌渡江窺江池以出吾右一䖏不支則大事去矣願預講左支右吾之䇿夫兵之形無窮願詔臨江守臣凡可設竒以誤敵者如呉人疑城之𩔖皆預為措畫今長江之險綿數千里守備非一茍制得其要則用力少而見功多願差次其最緊䖏屯軍若干人一將領之聽其郡守節制次緊稍緩䖏差降焉有事則以大將兼統之既久則諳熟風土緩急可用與旋發之師不侔矣所謂措畫之方有五曰親大閱補禁衞講軍制訂使事降敕榜大畧謂因秋冬之交闢廣場會諸將取士卒才藝絶特者而爵賞之建炎以来禁衛單寡乃籍五軍以為重臣常寒心願擇忠實嚴重之將以為殿帥稍補禁衛之闕使隠然自成一軍則其馭將也若臂之使指矣今諸郡廂禁冗占私役者大郡二三千人小郡亦數百人臣願講求除郡守兵將官自禁軍給使外餘僕従衣糧使自僦人以役大抵殺廂軍三分之二而以其衣糧之數盡募禁軍金人自用兵以来未嘗不以和好為言此決不可恃然二聖在彼不可遂已姑以餘力行之耳臣謂宜專命一官如古所謂行人者或止左右司領之當遣使人舉成法而授之庶免臨時斟酌之勞而朝廷得以專意治兵矣劉豫僭叛理必滅之謂宜降敕榜明著豫僭逆之罪曉諭江北士民此亦兵家所謂伐謀伐交者所謂綏懐之略有五曰宣徳意先振恤通關津遣材能務寛貸大略謂山東大姓結為山砦以自保今雖累年勢必有未下者願募有心力之人宻往詔諭應淮北遺民未歸者令淮南州郡給以行由差舩津濟量差地分人護送母得邀阻有官人先次注授差遣無官而貧乏者令㳂江州郡以官舍居之仍量給錢米三兩月其能自營為生乃止内有才智可用之人随宜任使勿但縻以爵秩而已凡諸將行師入境敢抗拒者固在勦戮其有善良老弱之人皆従寛貸使之有更生之望歴代名臣奏議卷八十八
