body:
  text: 歷代名臣奏議卷三百十明楊士竒等撰灾祥宋寧宗嘉定十年袁燮上奏曰臣恭聞紹熙二年仲春月朔疾雷震驚繼以大雪光宗皇帝惕然祗懼越六日詔侍從臺諫兩省郎官館職各條具朝政闕失以聞一時忠臣良士獻言者甚衆當世急務莫不上達可謂有應天之實矣咎徴雖形邦本自固姦宄不作疆埸不聳豈非變災為祥之明驗歟今陛下寬仁恭儉不敢荒寧畏天之心亦已篤矣乃正月二十四日氣令甚燠及夜過半天大雷電發于都邑二十六日霰集不止通夕飛雪積于平地久而後消夫雷乃發聲蟄蟲啓户著于月令之仲春今先期而發已非其時矣雷陽也中國亦陽也雪隂也四裔亦隂也當春而雪未為害也而作于雷震之餘陽已發舒而隂忽用事不宜積而積隂盛而陽微有邊境侵侮中國之象豈小故哉蓋自殘敵竄伏汴都陛下不忍遽絶仍與通好羣盜之歸附者拒而不納流民之逃死者卻而不受故此曹皆惟我是怨而殘敵遂以我為怯糾合羣怨致死于我侵犯王略無時無之陛下履至尊之位而見輕於垂敝之敵辱莫大焉其可以不自奮發乎虞書曰元首起哉起云者奮發之謂也元首奮發則國人莫不奮發矣深懲既往之失圖回日新之功恢張紀綱振起頽惰以伸中國之威以破敵人之膽此所謂奮發也臣不暇逺引姑以近代之事明之金人之犯淮也兵力日强自謂長江奄忽可渡我髙宗皇帝會不少懾下詔親征敷奏其勇而益內修政事王繼先醫術之精罕見其比所以保衛聖躬者也臺諫力排其姦而籍其家資劉婕妤寵冠後庭中外所知也一言救解繼先則斥之不旋踵張去為閹官之長驕橫久矣亦以臺諫之言而投諸散地此三事者皆行于金人犯境之日敵勢雖暴而聖斷赫然此國威所以復振而敵讎所以誅滅也人主之所為不必屑屑於細故惟能舉二三大事足以聳動天下者發憤而力行之則尊居九重而威震六合反覆手之間爾雷雪之變人皆以為隂盛陽微之故此乃皇天啓佑上聖欲以剛濟柔以威輔德而成以陽制隂之功也陛下其可不仰體天意歟光宗親遭此變敷求讜言陛下必欲銷變致祥亦宜開忠直之路以通天下之情古者孟春之月遒人以木鐸徇于路官師相規工執藝事以諫求之如此之切蓋不如是無以聞已過而修闕政也天災固可畏然人君修省則有其象而無其應向也隂盛而陽微今也以陽而制隂蕞爾殘敵豈能抗衡于中國哉大明中天爝火自息臣不勝惓惓惟陛下留神十一年燮又上奏曰臣聞洪範之有庶徴古人所以明天人貫通之理也於休徴則曰哲時燠若於咎徴則曰豫常燠若何謂哲明於是非之謂也何謂豫安於逸樂之謂也時者當其可之謂常者過於偏之謂人主明于是非有如黑白必能憂勤政治必能總攬權綱賢必任而不二邪必去而勿疑利於民者必能興之害於民者必能除之和氣所感嘉祥必應此時燠所以順之也人君安於逸豫昏而不明窒而不通舒緩而不肅寬柔而無斷朝廷之政事不能自有所施設天下之人才不能自有所進退國無定論人有離心乖氣所召災患必作此常燠所以應之也天人一理隨感而應可不畏哉陛下臨政願治不為不久而和氣有未充災異猶未弭去年久旱河流斷絶種麥未及多而田已揚塵不可復種矣人皆憂之曰他日其可接食乎祈雪未應人情皇皇又皆曰疫癘其將作乎螟蝗其將熾乎常燠之為害如此至於冬深雨則降矣而水猶未通雪亦作矣而移時即止是常燠之流毒猶未歇也陛下早朝晚罷不殉于貨色不盤于游田無逸豫之失而有逸豫之災此豈可不推原其故歟以臣所見所謂逸豫非必貨色游田之謂當邊烽未熄戎事方殷之際而優游恬愈若四方無虞之日真才未必能用宿弊未必能革浸浸焉日入於頽弊之域軍民愁怨無所赴訴兹非逸豫之所致歟病已深矣事已迫矣汲汲圖之猶懼不及又可悠悠乎毋以嘉祥之略應為喜而以餘災之猶在為懼肆頒明詔引咎責躬曰天下其許朕自新改絃易轍勇於必為人主作興於上人臣震悚於下無敢驕奢無敢耽樂朝思夕慮翼贊明主同以宗社生靈為憂何患乎災異之不消乎臣聞人主患無其志不患無其功竊觀陛下天資之粹美聖德之純茂足以冠羣倫足以恢逺略所以每獲面對未嘗不陳二帝三王之道每侍經幄未嘗不進憂國愛君之言誠願陛下勿自菲薄恢張志氣卓乎如古大有為之君今日常燠之災人皆以為逸豫所致臣日夜憂思不知所出何者逸豫之失人主之大戒也區區殘敵假息僑寓我有其備何患不克若因循縱弛無奮發之心而專以自守為說守不能固浸微浸弱而遂至於通和則大事去矣無可言者矣堂堂天朝而委靡至此可不痛哉此臣所以惓惓而不自已也詩不云乎敬天之怒無敢戲豫惟陛下深思此言常以逸豫為戒宗社幸甚生靈幸甚寧宗時國子祭酒王介上奏曰羅日願為變是下人謀上也修好增幣而金人猶觖望是渺視我國也內批數出是左右干政也諫官無故出省是小人間君子也皆謂之僭一僭已足以致災變而况兼有之哉朱熹上災異劄子曰臣竊聞今月五日夜漏方下五六刻間都城之內忽有黑烟四塞草氣襲人咫尺之間不辨人物著於面目皆為沙土臣雖不曽親見然親舊相訪見之者多驗之數人其說如一決非虗妄臣竊思惟間者以來災異數見秋冬雷雹苦雨傷稼山摧地陷無所不有皆為隂盛陽微之證陛下雖嘗下責躬之詔出敢諫之令而天心未豫復有此怪亦為隂聚包陽不和而散之象臣竊懼焉而恐其未有敢以聞於聖聼者也蓋嘗聞之商中宗時有桑榖並生于朝一暮大拱中宗能用巫咸之言恐懼修德不敢荒寧而商道復興享國長久至于七十有五年髙宗祭于成湯之廟有飛雉升鼎耳而鳴髙宗能用祖已之言克正厥事不敢荒寧而商用嘉靖享國亦久至于五十有九年古之聖王遇災而懼修德正事故能變災為祥其效如此伏願陛下視以為法克已自新蚤夜思省舉心動念出言行事之際常若皇天上帝臨之在上宗社神靈守之在旁凛凛然不復敢使一毫私意萌於其間以煩譴告而又申敕中外大小之臣同寅協恭日夕謀議以求天意之所在而交修焉則庶乎災害日去而福祿日來矣臣不勝惓惓愛君憂國之至理宗紹定四年都城大火尚右郎官吳潛上奏曰臣願陛下齊戒修省恐懼對越菲衣惡食必使國人信之毋徒減膳而已踈損聲色必使天下孚之毋徒徹樂而已閹宦之竊弄威福者勿親女寵之根萌禍患者勿昵以暗室屋漏為尊嚴之區而必敬必戒以恆舞酣歌為亂亡之宅而不淫不泆使皇天后土知陛下有畏之之心使三軍百姓知陛下有憂之之心然後明詔二三大臣和衷竭慮力改絃轍收召賢哲選用忠良貪殘者屏回邪者斥懷奸黨賊者誅賈怨誤國者黜毋並進君子小人以為包荒毋兼容邪說正論以為皇極以培國家一線之脉以救生民一旦之命庶幾天意可回天災可息弭災為祥易亂為治也端平元年翰林學士知制誥真德秀上奏曰臣伏覩太史奏元日立春風起乾位其占主兵丁西之夕月犯太白亦為兵象或謂星文所主實在衛晉以此仰寬聖憂夫天道主乎華夏而本朝者中原正統之所在也天之示戒所以仁愛陛下豈為區區北敵計哉況時方用兵而占亦主兵厥類甚明可不深懼漢王嘉有言應天以實不以文然則陛下所以仰答天戒者亦曰實而已矣何謂實本之於心則為實意修之於身則為實德推之於事則為實政有是三者應天之道得矣大學曰所謂誠其意者毋自欺也夫為善而無實是謂自欺以之欺人肺肝且不可隱況天道神眀而可欺乎陛下親政以來乾乾終日修身進德之誠發政施仁之目形之翰墨播之詔令無一非善是宜昊穹昭格休應狎至而清臺占驗乃若有未然者皇皇后帝厥監非逺何以致是意者應天之實陛下猶有當盡者乎夫毋不敬思無邪陛下所嘗筆之宥坐者也動靜起居真若神明之在上然後為敬之實聲色玩好真若寇讎之必逺然後為無邪之實若敬焉而有以害之正焉而有以汨之則雖玉音之鏗鏘時發於口金書之焜煌日接於目皆虗文而非實也用人聽言陛下所嘗詔之百辟者也登進賢能不徒寵其身必有以盡其材然後為用人之實開納忠讜不徒容其直必有以行其䇿然後為聽言之實若賢者固見禮而所蘊未獲究諫者固見容而所陳不盡施則雖夔龍之武相接於廷鳳皇之鳴日聞于耳皆美觀而非實也況名曰恤民而凋瘵如故未聞實惠之有加名曰察吏而汙濁如故鮮以實廉而自勵至於財匱而弗贍幣輕而不行師徒喪於奔潰舟楫壞於轉輸凡若是者皆未聞經理之實敵人狡焉日伺吾隙設有不幸如占書所云其將何以應之乎天佑皇家豫形警告至惓惓也伏惟陛下深體上天仁愛之意凡其本之心修之身推之於事者必使無一非實而去其所謂文具美觀者上帝監臨必垂眷佑所以延洪國命銷弭兵菑當有潛格於冥冥之中者矣臣俟罪禁林䝉恩最厚因人事以推天意常切隱憂故不敢避犯顔之誅僭陳苦口之戒仰祈獻察廣東經略安撫使崔與之上奏曰比年以變故層出盜賊跳梁雷雹震驚星辰乖異皆非細故京城之災七年而兩見豈數萬户生靈皆獲罪於天者百姓有過在豫一人此陛下所當凜凜惟有求直言可以禆助君德感格天心又曰戚畹舊僚凡有絲髮寅緣者孰不乘間伺隙以求其所大欲近習之臣朝夕在側易於親昵而難於防間司馬光謂內臣不可令其采訪外事及問以羣臣能否蓋干預之門自此始也若謂其所言出於無心豈知愛惡之私因此而入其於聖德寧無玷乎三年工部侍郎李心傳上奏曰臣聞大兵之後必有凶年蓋其殺戮之多賦斂之重使斯民怨怒之氣上干隂陽之和至於此極也陛下所宜與諸大臣掃除亂政與民更始以為消惡運迎善祥之計而法敝未嘗更張民勞不加振德既無能改於其舊而殆有甚焉故帝德未至於罔愆朝綱㦯苦於多紊廉平之吏所在鮮見而貪利無耻敢於為惡之人挾敵興兵四面而起以求逞其所欲如此而望五福來備百榖用成是緣木而求魚也臣考致旱之由曰和糴增多而民怨曰流散無所歸而民怨曰檢稅不盡實而民怨曰籍資不以罪而民怨凡此皆起於大兵之後而勢未有以消之故愈積而愈極也成湯聖主也而桑林之禱猶以六事自責陛下願治七年於兹災祥饑饉史不絶書其故何哉朝令夕改靡有常規則政不節矣行齎居送略無罷日則使民疾矣陪都園廟工作甚殷則土木營矣潜邸女冠聲焰滋熾則女謁盛矣珍玩之獻罕聞郤絶則苞苴行矣鯁切之言類多厭棄則讒夫昌矣此六事者一或有焉猶足以致旱願亟降罪已之詔修六事以回天心羣臣之中有獻聚斂剽竊之論以求進者必重黜之俾不得以上誣聖德則旱雖烈猶可弭也然民怨於內敵逼於外事窮勢迫何所不至陛下雖謀臣如雲猛將如雨亦不知所以為䇿矣帝從之監察御史吳昌裔上奏曰臣聞天運常新而無窮人情循舊而難變陛下即位以來坐受春朝凡十二正朔矣天地變化嵗月推移光景常新事㑹無極乃以更新之意嚮復還往昔之規橅虛老流光浸渝初志上恬下玩甚可惜也邇者十二月壬子雷甲寅洊雷越正月己未大雨雪辛酉又雪視魯隱八日之災孰甚八月敵寇蜀十月寇襄十一月圍黃視漢陽諸姬之禍為慘天變如此外患如此此正陛下君臣濯舊而圗新之時也然臣仰窺聖德妄議朝政私竊有惑焉陛下本心清明向也韜晦於逸欲今緝熙典學君德宜日新矣然妃后之閣妙麗交進王侯之邸錫賚頻煩則恭儉之德不加乎舊陛下八柄豫奪向也牽制於權姦今垂拱親事君權宜作新矣然貂璫之長間通外庭羽衣之嬖時干私謁則總攬之權不加乎舊州縣貪黷之根皆故相遺種也而時異事殊餘孽復起猶回護於舊惡而不衰天人乖異之證皆故王厲氣也而日邁月征蒸嘗缺祀猶藏宿於舊怨而不釋舊染之俗貴咸新也舊邦之命欲維新也今細微節目時有一新之功而大本大端脫然未變于舊是豈明德新民之極乎往者權臣三十年用人多出私意每欲用一私昵則必參以公議一人謂之帶過更化初無此弊也近日除授率乖素望往往蘭艾同進而不皆一色純正之人則除吏復循其舊往者權臣每臺諫月課多出風論及意有所覆護則言又寢而不行謂之收起更化初無此弊也近日臺疏率多浮沈往往風采銷沮而常有危疑引去之意則玩諫復仍其舊陳升之引閩人吕頥浩引山東人薦士而私其鄉黨此舊轍也今著廷之官督府之屬左右互擬其一何以兼攬天下之才趙雄多用蜀人王淮多用浙人選才而偏於鄉舊此故態也今執政之召說書之置東西並用其二何以旁招四方之彥夫使親舊而皆賢固所當用也鄉人而皆善固不當棄也然陶陶日新曽幾何時而昭昭然立的復尋舊武此豈至公血誠之心哉然則剝爛而復鼎否而新亦在君相加之意而已建炎四年正月雷雨再見是為烏珠過江之應髙宗謂輔臣曰朕與卿等宜共修德以實應天此陛下新德畏天之法也紹興辛巳正月雷雪交作是為金兵臨江之證王十朋遺陳康伯書曰相公居燮調之任當進賢退不肖以弭天變此宰相新國正君之事也臣願陛下濯去舊見以來天下之善大臣改紀舊習以公天下之聽用人必惟其賢毋使邪黨乘間而錯起聼言必從其是毋使公論被厄而不伸養君心之源常戒謹危機以扶天理清政本之地務力行好事以順人心惜隂愛日惟新是圖如此而天怒不回民恫不懌外患盜賊不屏息臣甘伏妄言之誅昌裔又論四隂之證狀曰臣竊見立秋以來常隂為沴先一日大雨雹越翼日暴風至霪雨不止至于旬時蚤禾壞於垂成晚稻傷於既穎豐穰之候轉而凶荒將恐害于粢盛無以供我軍實又聞天目一帶洪浸漂流水冒近畿是殆為兵為饑之證占書曰雨雹隂脅陽也雨隂干陽也方金火之交而厥罰常雨此非隂盛陽微之故乎夫臣者君之隂也妻者夫之隂也小人者君子之隂也四裔者中國之隂也且自聖上攬權之後固無昔日擅命之臣惟威令積弱不能以運掉三邉紀綱浸頽不能以操制諸將習強者方命怙寵者玩威第功賞者多肆於誕誣報軍書者輒輕於狎侮偏稗擅離部伍而不知有國法士卒敢淩州縣而不知有朝廷積是强形漸不可長此非將帥之權太盛乎方國步艱難之日正君心恐懼之時而道路流言竊議聖德謂宫庭燕飲頻為過差閣分妃嬪多著位號知書近侍以竒巧而移上意私謁邪民以險陂而通外交甚至外廷之除授或倚於幽隂帥柄之請求輒通於中禁牽於柔道職是厲階此非女寵之謁太勝乎端平人才之盛藹然有小元祐之風不一二年初意漸變君子則厭薄以為無益小人則愛惜以為有才三凶囑託以潛歸二孽僥覦而再起不惟昔之所斥者復乘隙以求進而今之所擯者亦旋踵而得遷旁啓多門自塞正路此非舊人復用之漸乎䝉古慿陵中夏蓋非殘金之比初犯蜀口五郡為墟繼犯荆襄十州如燬將士征行而不得卧婦子流徙而不得歸欲戰則窘事力之不强欲和則慮情欵之未實又况唐鄧均陸之寇導之以扣江秦鞏松維之族誘之以斡腹內外受敵殊可寒心此非敵國竊發之證乎凡此四端是皆隂類事形於下則變見於天證象孔昭警戒甚至陛下代天作子者也所宜昭德塞違以回渝怒之威大臣佐理隂陽者也所宜開誠布公以消乖沴之氣陽明勝則德性用隂濁勝則物欲行消長之機正宜凜凜今大昕坐朝間有特不視事之文私第謁假或有時不入堂之報上有耽樂慆逸之漸下無協恭和衷之風在內則嬖御懷私以為君心之蠧在外則弟子寡謹以為朝政之纍游言噂沓寵賂彰聞欲以此銷爍羣慝呼吸太和得乎昔建炎三年六月隂雨不止髙宗罪已求言宰執引咎求去郎官以上皆許言朝政闕失時中書舍人季陵以三隂之說應詔謂能制將帥為德之剛能抑宦寺為德之正御史中丞張守亦以三隂之說抗疏願嚴恭寅畏以修其德更選任輔弼以修其政上下動色祗畏明威卒扶炎精之光以基中興之盛皆自髙宗君相一念抑畏中來也臣愚欲望陛下仰繩祖訓顧諟天明逺聲色戢宦寺以清宅心之源進忠良斥姦回以公用人之柄宣明典章以申御將之法謹固封守以嚴備敵之防而二三大臣各一乃心各和乃政通宫中府中為一體毋使陟罰之異同合在邊在廷為一家毋使細大之偏重如此君臣合德中外革心未有不轉災眚而休祥易隂䝉而暘霽天下事變亦當隂消潛弭而不足憂矣臣不勝拳拳嘉熙元年火災右司郎中趙必願應詔上封事曰開邊稔禍之刑牽制而未行激變棄城之戮姑息而未舉荆襄淪沒祖宗之基業莫能保淮蜀蹂躪赤子之寃魂無所依履畝之令下而加以抑配稱提之法嚴而重以告訐民無蓋藏每有轉壑之憂士不宿飽常有思亂之志又曰臺諫給舍骨鯁之論莫容左右便嬖浸潤之言易入春夏常享濶略於原廟之尊節鉞隆恩殷勤於邸第之貴又曰必也正故相專國之罪嚴貪夫徇貨之誅思室鬼髙明之瞰先編氓後親貴去木妖競治之釁尚堅固革奢華戒宫殿無度之燕酣節內庭不急之營繕必願為宗正少卿因轉對上言曰中才庸主惟其無所知覺故言不可入而敗已隨之陛下作敬天之圖朝夕對越謂宜天意可回而熒惑失度鬱攸煽災迫近禁門幾燬左藏烟埃方熄白晝隕星貫日之虹脅陽之雹疊見層出陛下觀時察變何由致此今日之事動無良䇿惟在側身修行祈天永命而已淳祐五年侍左郎官徐元杰進故事曰髙宗皇帝聖政建炎四年正月庚申上曰昨雷聲頗厲晉志以雷發非時為女主顓權君弱臣强四夷不制所致朕與卿等宜共修德以實應天癸亥上曰昨日雷再發聲今日方二月節要之亦非時也晉志所占無異惟發頻者應速耳臣聞雷者隂陽交㑹而成聲動於震宫之中收於兊澤之後時當發聲則為天之號令所以驚百蟄而榮萬物也不當發而發皆非時之災隂抗乎陽之所致夫天時人事同一脉絡有是氣必有理故於理微有不順而氣之所應舛逆從之矣有如春陽方動之初和氣猶未洽也雷已驚逺而懼邇此豈非天之所以仁愛人君默寓其所謂扶持全安之道也歟髙宗皇帝建炎四年正月庚申以雷聲頗厲而推晉志以明之愳女主之專擅愳君弱而臣强愳四夷之不制惻然聖訓詔告在廷必曰朕與卿等宜共修德以實應天是蓋遇災知愳切切於實德之交修而不敢泛泛然以文具相䝉也越三日而節應驚蟄矣雷再發聲聖心恐愳有加無已又必曰要之亦非時也又謂與晉占無異而申之以惟頻發應速之言此豈非我烈祖克謹天戒之盛美乎今陛下帝學時敏聖敬日躋法祖欽天夙夜匪懈乃者奮雷霆之斷開日月之明政化於是乎作新家國於是乎齊治華夷於是乎鎮服未必有晉志所占之患而聖心寅畏宸札渙頒以為雷發非時朕心祗愳避殿減膳詔求直言凡可以應天銷變者若不能以終日蓋與烈祖所謂修實德以應天者同一軌轍臣又何所容其喙然臣聞之易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義蓋隂陽以氣言天所以覆乎地也故雷聲為天之號令柔剛以質言地所以承乎天也故雷之出地者有時焉仁義以德言于以見人為天地主當自淵默雷聲者驗之始知貫三極一道爾故乾元為萬善之長惟剛健而不息所以包四德而為仁坤順而承天之所為惟敬以直內而後義以方外德不孤矣自昔君天下而立之極必曰定之以仁義中正而主靜蓋主宰之道惟定而能靜則大中至正之理隨寓而無所轉移故知仁主乎剛則寬而有制動而有勇理足以勝欲公足以滅私又必以姑息拘攣者為戒而不至或牽於小不忍之情而害大體之正矣知義主乎敬則所由者漸所辨者早尊足以統卑內足以攘外又必以窺伺間隙者為慮隂有以消未形之患而合時措之宜矣夫仁義立人之要道也凡隂陽剛柔之氣質莫不由是而兼統自昔君臣上下所以交修其實德而不敢為應天之文具者蓋審諸此而已不然剛不足以制欲義不足以勝情則是陽為隂所抗凡晉志所占之象皆隂類也故曰隂疑於陽必戰可不愳哉可不戒哉元杰又上奏曰恭惟皇帝陛下貴為天子心與天通動一念慮之微有善不善休咎之證即緣而起常若與天靈密相周旋況顯而視聽言動之敬肆其有不關於慘舒之證者乎邇者亢陽為沴陛下齊心屢禱有感必通臣每侍清光陛下不鄙臣愚必垂閔雨之問臣之所奏嘗及於天之所助者順欲陛下驗之五事之間玉音曰俞曽無難色此宗社生靈之福也臣聞天理與人事同一脉絡五事與庶徴相為影響視聽言貌皆主於思而思必無邪則事事皆敬敬與不敬休咎關焉然則人主欲回咎徴而為休徴勿求之於天求之於已而已矣昔禹湯之有天命皆原於罪已之一念鯀湮洪水禹乃嗣興叙九疇而先五行必次以五事之敬用殷邦旱暵湯閔弗雨懼不敬以傷民命惟急於六事之自責夫六事之叢其責意者五事之虧其敬與臣請先以五事明之禹之意若曰人主之耳目不可以偏寄也故敬心常運於視聽之間不使媟近得以為吾聰明之惑庶乎喜怒中節氣步以是而準寒燠其有不時者哉人主之辭色至易以窺伺也惟敬心常攝乎貌言之際不使紛亂得以為吾肅乂之撓庶乎形聲俱和燥溼以類而應雨暘其有不時哉不然狂僭豫急之弗察反休徴而為咎徴一息間耳此禹所以隨用而持敬與成湯克享天心之主也天之不雨何至此極六事之失亂世之常也湯平政而愛民不邇聲色不殖貨利而又不吝於改過亦何至民政之失節讒夫之敢欺歟夫苞苴女謁宫室之動其欲豈果有是當責之事哉湯則不敢以自信也惟其自信之不敢故其自責之甚深自責之念深則自欺之意泯天髙聽卑宜為之動桑林之雨湯之真敬驗矣且禹湯聖德之君也自後世言之亦何以罪已為哉然則人主非知有克已之學不足以進此今陛下天姿沖粹聖學髙明居皇極五位之中而體洪範五事之敬遇災知愳欲銷去之責已省愆不為文具夫是以天心有潛格之應嵗事有中熟之占是烏得不為今日喜然臣之所喜今日也臣之所慮亦今日也乃者霄躔多愆隂精輒蝕江潮忽洶湧矣堤岸仍潰決矣水土之性亦於是而稍失吁天心之仁愛陛下所以昭示譴告者在是蓋不特雨澤愆期之一警也況夫比嵗以來北人禍慘吾之國勢屢警而忽定固不可謂非備禦之力然或者以為太乙福德久躔吳分此天所以佑宋也吁天幸其可以常恃哉國家陽九之㑹邇在目前靜察天時敬修人事寧深信而無其驗毋忽視而稔其憂臣􅈤􅈤然每勸陛下以敬用五事者不但為閔雨發也陛下果有所警悟當深求克己之仁特發罪己之勇循大禹敬用之實加成湯自責之忱視聽之達於下者必公貌言之出於上者必謹民政之利病必察宫室之增崇必戒以至塞貢獻之路杜邪枉之門使苞苴女謁之計不行而讒諂面諛之人可逺矣如此則聖心之主宰者愈定聖德之發彊者愈充天數之靡常者必回人事之可恃者必驗聖宋宗社億萬年靈長之休只在聖心真積力久之敬而已不然五事之敬用或不能以持久則皇極之建用將恐流而為六極之弱何以銷未形之患哉臣不勝惓惓六年正月朔日食詔求直言權兵部尚書淮東制置使李曽伯上奏曰臣一介非材四年分閫已試罔效當去尚留日懼疏虞仰負隆委頃以冬防幸畢嘗於至後一日即上請代之奏恭䝉詔㫖未賜俞允遂於十二月六日再陳愚悃僭進時才妄揣宸聰昭鑒必可其奏退而席槀俟命今復踰月矣星移物換嵗序且更天髙聽遙化工莫測臣惴惴朝夕不遑寧處俯揆螻蟻之分宜待鈇鉞之誅豈應洊犯不韙有所祈叩臣伏讀邸文恭誦奎畫仰惟陛下以元正日食方下求言之詔許中外臣子指陳得失消復咎眚臣有見陛下欽承天戒圖惟治功開不諱之門來忠直之告臣之求退適際斯時其敢不昧死以請臣拜手竊觀祖宗盛時康定庚辰正旦日食是嵗元昊寇邊犯延州圍塞門安逺諸寨諸將畏避莫敢出朝廷憂之二月遂令韓琦安撫陕西尋命琦及范仲淹為經略招討使之副未幾再命仲淹兼知延州於是賊始懼而不敢犯考之於此則是先朝用韓范代范雍經理西事實在此嵗臣又觀皇祐己丑正旦亦有日食之異是年北敵聚兵近塞詔近臣陳備邉策葉清臣一疏亦及方面帥領之材以為不患無人患不能用因舉孫沔狄青諸臣其嵗九月儂蠻始犯雍異時卒賴青沔等力以平嶺南又考之於此則是先朝因天象以謹邊備圖帥材尤以是為重也所以有康定皇祐戒懼之實德遂以成慶歷嘉祐太平之極功實為陛下今日家法然則今日之事其所當為者固不一以臣職思其憂則莫切於守邊莫急於易帥明矣臣自去夏以來䝉睿㫖勉留蓋數日以俟冬晚乘此邊隙之暇謂可得代兹春令頒矣若更張之議稍遲月日青草又生戎馬復入臣智慮已殫竭精采已摧靡事㑹無極利害多端恐不能制此勍寇徒誤國事誅竄何補用敢仰稽故實載瀝悃悰期以副陛下應天保邦之實意非但為臣區區之私而已伏望睿慈特賜宸斷宣諭大臣撿㑹前請趂此春寇未動早易閫寄將臣放歸田里庶幾天心感格邊境震懾于以寬宵旰之顧憂復祖宗之盛治實在斯舉天下幸甚衢州通判牟子才亦以太陽交食應詔上奏曰臣伏覩淳祐五年十二月二十六日詔書以六年正月辛卯朔太陽交蝕應中外百職及學校草茅之士悉令指陳得失凡可以消弭咎眚導迎善氣各悉心以告者臣猥以虛庸䝉恩丞郡詔㫖所及敢不罄竭其愚忠陛下自臨蒞以來德澤屢下和氣充塞四海九州罔不豐稔天心人意若合符節固宜乖氣異象消伏不作乃月正元日日食辛卯咎徴之來其異如此且嵗在丙午則古今之否運也時方孟春則陽氣之始施也月紀建寅則陽爻之交泰也王春三朝則受朔之元辰也而日月交蝕於方晡之時以一日言之日為陽夜為隂以四方言之東南為陽西北為隂以人事推之君為陽臣為隂夫為陽婦為隂德為陽兵為隂君子為陽小人為隂今支干㑹于南離之方其蝕在申其纏在女此臣亢乎君婦敵乎夫小人加君子之徴也而尊者尤惡之臣嘗讀史至漢之季世見其災異狎至未嘗不痛恨於一時之諸君也正月己酉朔日有食之成帝元延元年也是嵗祿去公室政在元舅王鳳以大司馬大將軍領尚書事崇談音商相繼為政其氣焰足以蔽䝉三光日之所為蝕者此也谷永大儒涉三七之節紀直百六之災厄乘三難之際㑹目覩巨異意必有殊尤絶異之論警動上心以殺其勢今觀其疏不過曰皇后貴妾專寵也不過曰中黃門後庭驕恣狂悖也又不過曰北宫苑囿將有夏崔之亂也諸夏下土將有樊蘇之變也其言迂緩不切有所附㑹而於竊權之王氏乃無一言及之史臣書曰專攻上身蓋譏之也正月辛丑朔日有食之哀帝元夀元年也是時傅商鄭業以外親忝封邑孫寵息夫躬以姦辨寵侯封董賢以令色諛言䝉賜豫五侯驕蹇權震內外其烜赫足以掩翳陽剛日之所為蝕者此也鮑宣儒生當父虧明毋震動子訛言之時目覩大異忠憤所激思欲一吐胸中之鬱抑以救當時之失今考其書曰深內自責避正殿也曰舉直言求過失也曰罷退外親及旁仄素餐之人也曰何武師丹孔光彭宣可大委任也其言鯁亮明切無所顧忌而於貴幸之董賢深嫉焉史臣贊曰守死善道蓋嘉之也夫災由天降變不虛生成哀漢季世之君也故當時封章後世録實語多及於災異蓋謂其睹災異而不戒是以為漢季世之君也今日咎異之來則與漢季世之君相符矣政事之失則與漢季世之君無異矣女寵之盛則與漢季世之君髣佛矣權姦接跡黨與駢肩則視漢季世之君有加矣而陛下遇烖而懼引咎責已導諫敷恩則豈肯甘心於漢季世二君之下風哉臣嘉熙間待罪史館與聞討論之事嘗因輪對以大臣不公不和六事為陛下告陛下不以臣卑鄙亟賜俞奬是陛下待微臣之恩深且厚也有君如此誰忍負之臣儻有重於言以諱為解兹為自誣且誣吾君皇天后土昭布森列臣罪莫逃幸因明詔之及列為十二條以獻陛下心志所期不敢妄自菲薄效谷永阿媚時好以羞當世之士惟深思熟慮空臆盡言得從鮑宣游於地下則愚臣之願也其一曰一敬心以澄治原心者天也上古聖人繼天立極惟用力於性命之原以酬酢天下之萬變人心惟危道心惟微惟精惟一允執厥中者堯之所以授舜舜之所以授禹也發於聲色臭味之氣者人心也根於仁義禮智之性者道心也平居暇日莊敬自持察一念之所從起求所以治之則清明純一無少間斷以之對越天地者此心也以之欽承祖宗者此心也以之臨朝見羣臣者此心也以之經筵對儒生者此心也以之接嬪御貂璫者亦此心也所遇雖不同而所以為敬者未嘗不一也平居暇日矜肆誕忽不能察一念之所從起求所以治之則膠擾紛雜物欲滋長接嬪御貂璫之時不能如經筵對儒生之時矣經筵對儒生之時不能如臨朝見羣臣之時矣臨朝見羣臣之時又不能如對天地見祖宗之時矣所接既異而所以為敬亦隨而轉移也此無他敬肆之分也漢元帝臨朝之暇親近儒生可謂敬矣及退而處宫庭則鼓琴瑟吹洞簫自度曲已為侍中所窺此敬肆之見於一日者也唐𤣥宗即位之初延禮文儒可謂勤矣及天寶末年溺於燕安女子小人內外交煽旋為開元之纍此敬肆之見於終身者也方二君之耽樂也自謂深宫之中世無得而知者故自肆而不反不知宫庭屋漏顯如日月之照臨女子宦官􅏮如蛇虺之在側未有隱而不彰久而不變者也陛下性資超卓學問緝熙固非漢唐二君所跂及然對越欽承之時如此而宫闈燕閒之時則如彼也臨朝親儒之時如此而嬪御媟狎之時則又如彼也發之於心術念慮之微而形之於四方萬里之逺臣願陛下念祖宗創業之艱思一身之關繫甚重監二君燕安之失退朝無事延訪名儒夜直禁中不時召對貂璫之干請者却之嬪妃之御見者疏之使紛華盛麗不足以為吾之惑竒技淫巧不足以為吾之害則中外一致旦夕一心終始一節陛下所謂猶有愧者將仰不愧而俯不怍矣天怒寧有不回者乎其二曰清政本以重相權臣聞冡宰者首六卿而統百官天子之相也冡宰無職六卿則分職矣冡宰論道六卿則行道矣六卿異曹百官異職管攝之使皆歸于一非宰相事耶所以管攝之者非每事而控制之也自百而歸之六自六而歸之一所操者至簡也國朝倣周制改僕射為丞相而沿唐舊制自宰相下侵六曹之職而三省始多事自檢正都司之置而三省愈多事合二者而六曹輕矣且以吏户兩曹言之吏部掌天下之選事也而部闕盡歸於堂堂闕不下於部參選者不之吏部而之省府日力困於應酬工夫困於位置國家大事姑置不問而周旋親故酬酢人情之念憧憧往來未免少分經體贊元之功銓曹要地反成虛設此吏部之權輕尚書之職廢而中書之務所以不清也户部司天下之財賦者也然國用房鹽之財斡於宰相而不斡於户部朝廷之上所商者鹽策所括者田契所問者錢榖甚非古人置相之義嗚呼版曹所掌朝廷之財也國用所掌亦朝廷之財也均為朝廷之財何至自相區别困於多事耶此户部之權輕尚書之職廢而中書之務所以不清也其他四曹大抵皆爾推原所自非始於開禧嘉定間耶然近嵗中書之務愈致紛雜而不清者則惟宰相之故也前日之相機智足以濟其姦雄而處心積慮專以收攬事權張大聲勢為能事往往下行六曹之細務或遺天下之大機而檢正都司頗多覘伺相意模稜兩端以聽所擇其或禀承面命猶云合與不合送部勘當萬一事有可行亦云有似此的例部中不敢明白指定宰旅不敢訂說必行是以近者纍月遠者年嵗率多迂回故作阻難而中書之務如蝟毛之紛矣近日之相精神不足以牢籠機務而心之所存亦欲自作聰明獨運謨略意或未順則託病以濟之事或未周則拱默以須之經旬動月歷嵗跨年不能裁決一事監司帥守則類多攝官侍從論思則亦皆曠職極而至於國家急務守禦大計一切付之浮沉誕謾之場而檢正都司往往徒自悵歎雖欲􅢳擬厥道無繇於是滯事猥多而中書之務如治絲而棼之矣此日之所為蝕也欲弭天變其惟清中書之務乎然臣所謂清者非直付之於無所事也六卿各率其六十之屬以倡九州之牧所謂送部勘當者則令據事指定不必繚繞更聽朝廷指揮撿正都司各贊其長以檢柅三省之務所謂欲筆者不必逢迎相意多為沮格之辭而宰相者總其樞機于上勿自眩其志而忘要道之執勿徒詳于小而遺逺大之計體統正而內外各得其職規模逺而大小各得其宜則自天官以下無非宰相之事而弊幸去矣天怒其有不回者乎其三曰别邪正以清流品致治之要在於辨羣臣之邪正二者常不相容君子指小人為邪小人指君子為邪自昔堯舜已有知人之難而孔子亦有聽言觀行之戒則辨之誠難矣陛下自臨御以來以至于今國論凡幾變矣進賢退不肖不知其幾矣然比年以來混淆而不知區别之方冗雜而不見純一之效隂陽之證莫辨是非之心不明以為衆賢萃耶則位文昌者屢辭旌聘之招班從槖者不願旌麾之擁或扼於幹方或扼於秉麾或扼於閒散或扼於倅二或扼於小官皆賢者也以為任用當耶則瑣碎戚畹或玷節閫驕豪貴閥或參畿輔心權奸者隂肆含沙跡貴幸者顯媒人爵或倚賴屬籍之近翺翔半刺而貽害於一州或夤緣邸第之親侵奪民産而流毒於數路或觀覘窺伺或模稜含糊或反覆變詐皆庸人也甚至惡毒流行善類淪沒五年正月諫臣死而昔日之諫臣自若也五月丞相死而昔日之丞相自若也六月給舍死而昔日之給舍自若也自諫臣之死也而伏蒲論事之地幾鑑之亡矣自丞相之亡也而論道經邦之地幾棟之撓矣自給舍之死也而塗歸繳駁之地幾玉之燬矣嗚呼司馬光鄒浩陳瓘劉安世諸賢人淪亡殆盡無遺中原之禍起君子之消小人之長而世道之屯厄常隨之其所關繫蓋不輕如此此日之所為蝕也然則欲回天怒者其有大於别賢否乎臣願陛下清其天君持其定見以為進退人才之本有才矣必參以德而用之不可徒取其才也有德矣必觀其行事而用之不可徒取其德也才有剛柔必柔濟剛剛濟柔而後無偏弊才有長短必取其長舍其短而後無棄材使凡得罪名教之人不足以惑陛下清明之聽詭譎變詐之士不足以撓陛下堅凝之心則賢否别矣天怒其有不回者乎其四曰罷女謁以肅宫闈女子之禍於人也甚矣古今淫泆之主溺於衽席之愛自謂窮天下之樂不足以喻其適而不知禍胎亂萌已伏於閨閫之中陛下儀刑家人中宫上儷宸極可謂無險詖干謁之私矣然嬪妃矜寵眩惑聰明女覡恃權交通關節無藉之權姦主之以安其身亡耻之士大夫主之以媒其進無賴之黨與主之以張其勢金錢賄賂飛越中都餽獻苞苴直通中禁遂使外人指某事內土庫輸送矣某事白鶴觀修造矣禁衛所以􅊀不虞也一男子之妄有所慿藉則通行而無礙或以陛下燕閒之嚬笑泄於外則雖昌言而不以為怪或以女覡詭祕之蹤跡泄於內則雖微詞而必致於辟大臣不敢遏絶而敢逄迎不敢正救而敢鼓舞烏得謂之無罪此日之所為蝕也欲回天怒其有大於罷女謁之干請乎臣願陛下以社稷為念謹宫掖出入之防嚴非類混淆之禁使伺間而干進者恐怖而不敢前乘機而僥覬者退縮而不敢進宫省既清浮言自息天怒其有不回者乎其五曰斥權姦以絶禍本人君所恃以立國者人材而已然自古奸臣欲盜其君之國非挾宫闈之助合左右之交則不能獨為故寒浞之相羿也行媚於內而施賂於外王莽之相漢也媚事太后下至旁側長御內外盤結無一發其姦者然後可以愚弄上下而甘心焉自昔權姦篡人之國非專兵甲之柄擁財利之權則不能以為故曹操之輔漢以討賊為辭而擁兵自衛楊國忠之相唐身調兵食而任其惡兵財既專權勢益重然後可以劫取神器而恣意焉是舉也前日之相實似之自古大臣欲專其國非以朋黨之論陷害正人則不能以自專故𢎞恭以蕭望之為黨而殺望之李宗閔以李德裕為黨而疏德裕自昔小人欲固其寵位非窺伺迎合厚自封植則不能以有為故李林甫口蜜腹劒蔽欺聰明善養君欲李義甫笑中有刀諸子賣官市獄門如沸湯是舉也近日之相實似之前日之相以公議之所不容屈伏海濵陽致其仕而隂賂寵幸為他日復用之階陽處塊苫而隂結宫府為他日竊權之地近日之相以不智不勇之身而橫塞要塗以鍾鳴漏盡之資而控摶富貴陽為病倦而隂張虗氣以示其據鞍矍鑠之能陽為推轂而隂懷疑心以遂其從旁下石之計天下之人皆知而陛下獨墮其計中而不知則其䝉蔽必有甚工且密者此日之所為蝕也欲回天怒其有大於斥權姦乎今權姦斥矣而根苗猶未絶也臣願陛下昭大智以燭天下之微奮大勇以決天下之事勿以儒效為迂闊而復思小人之有才勿以直道為咈逆而復善舊人之多智使交結左右者其計不得行而徘徊講筵者其譛不得逞如是則朝廷清明禍夲杜絶而中外大小之臣永堅一心以事陛下而無復後憂矣天怒其有不回者乎其六曰通言路以來敢言昔者聖人之制治也設敢諌之鼓立誹謗之木近臣進規大夫進謀公卿納誨瞽史垂教庶人議芻蕘詢耆艾修之而後王酙酌焉逮及我朝宰輔之宣召則有言侍從之論思則有言進故事則有言翰苑之夜對則有言二史之直前則有言羣臣之內引則有言百官之輪對則有言監司帥守之見辭則有言以至三館之囊封小臣之特引臣民之扣匭三學之伏闕外臣之附驛京局之發馬遞鋪則又皆有言比年以來為大臣者背公營私崇惡騁怨惟恐人之議已思欲以箝天下之舌告訐察伺無所不至人賢不肖咸謂言出於口禍及其身往往畏避謹默自同寒蟬甚至自隔對班不肯有言藉令有言又皆掇拾細故徒應故事不足以裨主聽而慰人望也時政之闕失生民之弊病賞罰之僭濫獄訟之寃抑疆事之危急率皆壅於上聞其間豈無盡忠協謀存愛君之心負濟時之略明於國家之大體通於人事之古今者徒以防禁之厲隔絶之嚴雖有言不得上達也陛下更化以來宰執有條對經筵有密唘三學草茅有清議可謂言路不壅塞矣然而議論徒多施行絶少調護彌縫之意重而決裂奮迅之意輕壅遏沮壞之道勝而施設云為之道微天子曰某言常談也某事常事也宰相曰某言過當也某事風聞也導人使諫而拒諫彌深下詔求言而諱言滋甚言者聽其自言未嘗以不當於事為忤行者聽其自行未嘗以不合於言為拘遂使至當之言徒為無益之具咎異沓至其必由斯今求言之意非不美矣然昔者所進未之能行今而有求又恐非實其於言路之通塞關係匪輕臣愚願陛下當謀謨並進之時留神省覽宣付大臣俾之分閲擢其可用顯奏施行勿以忌諱為拘則忠臣出勿以文采為尚則至計行勿以與廟堂異議而去之則謀謨皆合於公論而陛下誠於聽言之意暴白於天下矣天怒其有不回者乎其七曰明風憲以肅紀綱給舍臺諫國家之元氣也元氣充則四肢實而夀命長元氣虧則四肢竭而夀命短其可畏也乃者權臣柄國專用私人方其權之未固則一時聲望之士不為所嗾者率排斥而無遺及其權之既固則一時修飾之士意向小異者即擊去而不貸情有未通則倚腹心以示意向而腹心者因得以行其私事或未悉則假簡槧以導委曲而簡槧亦有時而漏露仁人君子誤汚丹書無辜之民或遭簿録循至于今未及湔祓雖以詔令之懇切不免畫餅之療饑是信任誠誤矣然今日之臺諌敢於排奸雄而論宰相給舍敢於繳權幸而拂貴遊監司帥守敢於抨戚里而排勳閲雖使祖宗盛時亦不過如此陛下以祖宗為法則當施行其言以養其敢言之氣今以所聞參之則言者愈激而聽者愈緩論者愈多而行者愈寡乃有大不然者古者言及乘輿則天子改容今封章束閣半墮渺茫天使沓來徒勞宣諭矣古者論及廟堂則宰相待罪今議政事則敢於爭辨去人才則旋即録用矣古者論及左右則貴戚斂手今外臺逐之而宰相收之臺諫誰何之而陛下調護之不以除授為非不以彈擊為是而戚畹愈無忌憚矣吾君吾相何示天下以不廣如此耶夫言者之盡言非為一身計也向也為權奸之所嗾雖咈陛下之意而陛下不敢不行今也為大臣之所惡雖合陛下之意而陛下亦不敢遽行是陛下之畏宰相無間於初終而宰相之玩臺諫亦無異於今昔矣此咎異之來有甚於昔也陛下而以風憲為念則凡給舍臺諫之有言皆當見之施行以示公天下之心勿以專攻上身為常事而不加修省勿以論及大臣為沽名而委曲回護勿以事關貴戚為訐直而緩於施行則風憲明而紀綱肅矣天怒其有不回者乎其八曰寬繇役以收人心夫民心得然後可以固邦本邦本固然後可以保天下人君所以奄有神器傳之無窮者豈有他哉知愛民而已恭惟國家祖宗德澤至深至厚纍聖相繼莫不以愛民為本陛下嗣守丕圖亦莫不以愛民為先務下寬大之詔敷曠蕩之澤所以奉承祖宗愛養元元之意可謂切至然自用兵以來獮剃而斫喪之者非可以一端盡矣春冬鈔襲而困三邉之民清野徒治而困兩淮之民浮鹽和糴而困江浙之民鹽丁出沒而困閩廣之民軍用需索而困荆湖之民敵潰迭作而困川蜀之民盜賊橫行而困沿海之民加以貪夫暴吏不體上意侵漁蠧蝕靡所不至血其齒牙以民為犧牲增和糴之入以供羡餘取田租之贏以豐囊槖假挨究之名以增賦斂嚴𣙜酤之令以伐和氣長告訐之風以供估籍派攤賴之目以償逋缺厚軍需之儲以肆科抑旱魃為虐則縮檢踏之數吝於蠲租水災掩至則沽抄劄之名而訒於發廩索綿帛於方桑蠶之候追米斛於未秋收以前拘監未已械繫隨之急刻未已刑獄隨之號令嚴峻而必行姦胥夤緣而為利苞苴既厚寵賂又滋以貪婪之心行暴橫之政以星火之令速疲殘之民餘息之民僅僅如縷而笞箠縲繫殆無虗時愁歎之聲閭里相接强悍者散為攘竊懦愞者倏致流離重以饑寒朝不謀夕嗚呼上天何用更生此使為旱魃以隔陛下之雨露使為蟊賊以食生民之根葉此而不除陛下之赤子未得安枕而卧也豈曰國家固民以寧邦本之本指哉此災異之所以來也陛下而以愛民為心則宜申飭有司凡中外蠧國害民之政一切除去凡弓張未弛之政一切罷行勿以民怨為可忽勿以民力為可窮深究祖宗被螫斷手足以全大體之義時取其無狀者一二人中出手筆特行處分使如雷霆忽然在其側且使天下皆知誠出聖意之所丁寧不以詔令為虗文則實惠及民有可以為祈天永命之地矣天怒其有不回者乎其九曰勞還役以一士心古者戍役兩朞而還其出戍之時則采薇以食而念歸期之逺也然所以使我舍室家而不遑啓處載飢渴而至於傷悲者非上之人固為是以苦我直以有所不得已而然耳故出師則歌采薇以勉之其還歸則歌出車杕杜以勞之先王蓋以已之心為人之心故能曲盡其情使民忘其死以忠其上也先儒程頥謂毒民不由其上則人懷敵愾之心是也我國家自有敵難兵不解甲者垂二十年矣始也宿師於襄漢今襄漢入於敵而退守荆湖之北矣始也宿師於三關今三關入於敵而退守堂奧之地矣始也羈縻宜雍今宜雍警於敵而嚴守桂林之地矣始也聚兵山東今山東歸於敵而分漣水海道之地矣敵人無嵗而不入則邊備無嵗而不嚴邊備無嵗而不嚴則中國無嵗而不勞吾之所以待之者固不可以數入為常而怠於戍守亦不可以久戍為勞而忘於撫循也今上而朝廷下而將帥以敵為常矣以敵為技止此矣夫以敵為常則玩心生以敵為技止此則忽心生合玩與忽而暇以戌役為勞苦乎故邊鄙之間有功而上不見知有勞而下不知恤此災異之所以來也陛下而有意乎此則宜申飭有司嚴戒將帥察其勞苦憂傷之情憫其貧窶淒涼之實畨休以時役使有則勿以微勞為不足念而有功必賞勿以小校為不足問而有憂必恤則竭力效死而無還心矣天怒其有不回者乎其十曰謹刑罰以召和氣舜之命官先播穀以敷教而後極於刑蓋有以益其民之身又有以善其民之心不獲已制刑焉而刑之所施又必察其情當其罪是亦惟刑之恤之意也周官大司徒以八刑糾民在三物以教之後而其所糾有不孝不睦不姻不弟不任不恤造言亂民而已所謂刑者祗所以教之也其仁愛忠厚之至上自有虞成康之世刑措不用幾四十年此所謂置天下於仁義者也今之任廷尉者不以人命為心司天牧者不以民庸為念為士師者不以弼教為事是其心術念慮匪惟貨惟內則訖富訖威也匪指道以明則煆鍊以成也游辭兩造而遁情析律二端而舞巧或上下以知術相馭或彼此以文法相操錐刀之末而盡爭犴狴之淹而弗悔民無所措其手足國無所庇其本根聞明五刑矣未聞正四凶之罪以服天下也聞黜四贓矣未聞刑不孝之人以勵風俗也上之人不以善道待天下故風化所被刑獄滋章一嵗之內子弟殺父兄者十之二三妻殺夫者十之四五幼淩長者十之六七下淩上者十之八九人道絶滅天理不容怨毒充盈上干和氣刑獄濫矣日何為而不蝕乎臣願陛下以堯舜為心以成周為法罔兼庶獄明清單辭道上之德意志慮而達之民悉民之險阻艱難而復其上春生秋殺一出無心刑後德先哀矜勿喜如是則泰和之風忠厚之俗沉涵漸漬入人之深而天怒可回矣其十一曰廣仁恩以安遺黎外患之禍自古有之禍患之烈未有如今日也曩者蜀首被害淮襄次之今又轉而南侵且驚塵游騎遍於東西南北之境矣夷城削險糜爛生民無貴無賤駢首就戮荒烟凍雨冥漠無歸結為妖氛激為厲氣沉為滯魄散為游魂往往鬼哭天隂則聞此死者之銜寃也摧殘餘黎幸免屠戮竄伏山谷奔走道塗流澌既竭生理復空䝉袂輯屨待哺嗷嗷北風其涼雨雪其雱無衣無褐何以卒嵗或捽人臠尸或易子咬骨或兄弟之血前後濺野草或夫夫婦婦更相為鯨鯢齊魂為燕氛趙骨化魏土悽痛之聲入金石出絃匏聞之者悄蹙酸屑痛不自禁此生者之所遭也嗚呼均為王土也何彼土之樂而吾土之愁也均為赤子也何彼民之幸而此民之重不幸也上焉者聽民之自生自死而不知恤下焉者聽民之或去或來而不知救為民父母而恝無情耶流離如此日何為而不蝕乎臣願陛下念死者之無辜而求所以慰安之憂生者之無依而求所以安樂之其安土重遷者則申飭監司帥守復其繇役免其租賦其轉徙流離者則專置一使以任其事廩有餘粟則傾囷倒廩以紓其目前之急官有間田則給牛種以救其終身之苦壯者藉以充守禦之兵弱者藉以備使令之役或分其勢而不使之結連或渙其羣而不使之為亂如此則淮襄秦蜀之民復得蘇息為陛下保境土為陛下迓續天休而禍亂弭災異消矣其十二曰寬鹽策以裕財用易曰理財正辭禁民為非曰義是為天下者以義為本不以利為本以義為利不以利為利也曰正云者非蓄於義乎大學曰長國家而務財用必自小人始且理財者以君子為的不以小人為的以君子為利不以小人為利也曰務云者非喻於利乎蓄於義則功利之說不足以蝕人主之心喻於利則富强之術反足以召天下之亂有天下者其亦知所審哉國家嵗用至廣兩稅之外仰給於鹽鹺者為多祖宗相承朝夕計慮與夫賢臣謀士補葺闕遺纎悉備具著在令甲皆可以經久垂逺而無弊故商賈輸金於官謂之入納及其請鹽於煮海之場則待次之期有逺有近幸而及期則泉貨流通萬一法令或有少變則本已消折尚何子利之可冀乎比者朝廷規求近效昧忽逺圖凡鹽策之利自一孔以上官司斡運或謂之國用房鹽或謂之相府鹽無非自撡利權大抵下同商賈與民爭利至析秋毫氣焰炎炎迫人商賈往往積怨已入納者折閲無餘未入納者逡巡改業所貴乎鹽策之流通者以商人入納之數為之贏虧也今商賈之資用漸竭既無以為販賣之資而朝廷之子本不繼又無以為斡旋之用則是煮海者無䇿可措而停塌者無貨可居雖壓之朝廷之勢加之以刑戮之威而本之則無其何以責鹽策之登衍哉此貨鹽之害也浮鹽即歸朝廷漕臺專任變賣鹽未至場則兵將為欺夾和灰土鹽既至場則官司為欺抑售髙價暨至發泄則富户為欺賣弄斤兩蚩蚩之民展轉受害中間朝廷雖有三分七分發賣之文然商賈終於疑惑豈肯公肆貿遷間有商販之人多為官司所抑坐淹嵗月發泄未能若謂權宣可以為糴本之儲則糴本不專仰是也若謂多積可以為國家之利則往往分散而入於私用也若謂三分不足以病商賈則商賈之勢竟難與官司為敵也若謂變賣不足以病民則髙大之直百姓不樂於與官為市也此賣鹽之害也嗚呼民吾民也商賈亦吾民也豈有為民父母坐視其流離顛沛而不恤也哉臣願陛下特降睿㫖遵守祖宗之舊法申嚴前後之指揮釐革見行之條貫使行旅流通邦儲豐衍以副陛下蓄義為富之意則二弊自革以此而消災弭變曷為而不可其他脉絡之或間斷節指之不相應者未易殫述此十數條者乃陛下之所咨訪於臣民者誠有關於治體之汚隆氣脉之盛衰也陛下豈不知屋漏之至嚴而未能專一於敬心豈不知萬機之叢脞而未能肅清於政本豈不知流品之當清而未能公平於好惡豈不知女謁之干進而未能勇制於情欲豈不知權姦之為害而未能遏絶其萌芽豈不知言路之當通而未能疏滌其壅滯豈不知信任之當謹而未能致察於賢否豈不知徭役之當寬而未能禁戢於貪暴豈不知士心之當固而未能撫恤其憂勞豈不知獄訟之至繁而未能深察其情實豈不知邉民之流離而未能大布於恩澤豈不知鹽策之病民而未能一洗於功利凡皆志慮之因循率為聖政之疵纍意者天心仁愛人君不容不以是為陛下告乎春秋二百四十二年而日蝕者二十有六西漢二百一十二年而日蝕者五十有二唐二百八十九年而日蝕者九十有三未有如今日之蝕也豈可以尋常之變待之乎陛下倘不以為尋常必穆然而思曰夏正謹始朔旦紀元天令方新朝綱甫肅離明赫赫遽爾翳䝉得無陽剛元德有間斷歟得無君道仁政有虧闕歟而愚臣區區之意則以為國本者國脉之所關國是者國勢之攸繫而陛下未及有所咨訪豈聖心固有定論不待臣民之論列耶抑亦畏人多言而闕然其問也然此大事也豈容置而不問蓋國本早定則天下之人望有所歸而姦權不敢有睥睨漢鼎之心國論不凝則萬世之基圖無所屬而豪傑或有輕視宗祧之意故臣願陛下深入思慮早定國計堅凝國論正以此也陛下春秋四十有三矣即位亦二十有三年矣閲天下之義理不為不多矣乃者中外小大之臣不避斧鉞之誅每有論奏必以宗社大計為言陛下建學于內博采精擇似亦有意乎此矣然聖意猶豫未即裁決此臣所以不敢已於言也陛下端平之政開衆正之門塞羣邪之路翕翕向元祐僅及半載議論一變而嘉熙之雜淳祐之專紛紛未定矣陛下既不待羣臣之請自更化絃於前則豈可不俯聽羣臣之言相與堅凝於後而聖意過有憂慮罅隙時見寢苫掛冠之請一嘗試也而陛下與之祠祿腹心臺諫之除二嘗試也而陛下見之施行不過曰姑存體貌也不過曰姑止人言也又不過曰荆棘之路不可開也然優游漫緩之極反覆之所基繚繞包涵之中禍亂之攸伏此臣所以不敢已於言也而況古今厄運適丁兹時寅正紀元又著兹異失今不圖則陛下之勢孤而海內寒心矣其何以弭災異之變遏禍亂之萌耶故嘗為之說曰天下者祖宗之天下也祖宗惟不邇聲色不殖貨利不害善類不用小人不遏言路不尚兵刑不重征斂故天變弭於上人心助於下而主勢尊安今陛下一壞於女謁之干請而主勢孤再壞於功利之刻薄而主勢孤三壞於君子之踈逺而主勢孤四壞於小人之竊弄而主勢孤五壞於忠言之不售而主勢孤六壞於兵甲之未息而主勢孤七壞於壤地之迫蹙而主勢孤八壞於暴君汙吏之斫喪苛征橫斂之推剝而主勢孤今欲扶其壞而翼其孤舍國本之定國是之凝臣未見其可也陛下幸聽臣言則天下事尚可為不然壞者自壞而不自全孤者愈孤而不自立則劉蕡所謂宫闈將變社稷將危天下將傾海內將亂者復見於今日矣臣不避斧鉞之誅罄竭愚𠂻冒昧一言以為消弭災異之本惟陛下實圖利之臣雖畢命山林死且不朽干冒天威罪當萬坐子才又上奏曰臣不識忌諱嘗條舉十數事告陛下矣然此十數事根原雖在陛下而扶持正救則專有賴於宰相也比年以來宰相多不用讀書人間有用之又皆書生之靡者故其所為不過逄君之惡安能格君心之非陛下奮然開悟舉儒相而專任之此上天悔悟以開更化之機也此九廟神靈隂隲顯相為國家植立無疆之休也大臣於此念付託之匪輕思為臣之不易尤當刷磨舊意振動新功圖惟報稱況今天下內無國本外有強臣敵國豈宰相玩嵗愒日坐老天下事機之時乎必論今樂蕩心之害陳昔人流連之戒如王曽之諫仁宗而後敬心可一必總朝廷之大體守國家之法度如劉摯之事二聖而後政本可清必論丁謂之才不可使在人上如李沆而後邪正可别必積下內降數十封而靣納如杜衍而後女謁可罷必如富弼論陳執中無學術不可為相而後權姦可去必如趙普收拾擲下諫紙糊綴復進而後言路可通必如吕夷簡選用風憲當出聖意而後紀綱可肅必如曽公亮知民疾苦補助窮乏而後人心可收必如吕公著言有勞不報何以使人必如寇準論刑罰偏頗亢旱立致而後士心可一和氣可召必如龎籍論省冗兵減浮費以蘇川陕必如王旦戒張士遜言朝廷𣙜利至矣而後遺黎可安財用可裕乃若固國本定國是則必如韓琦挾孔光傳以進必如司馬光言天若祚國必無此事而後可也其或過自菲薄不以渡江以前宰相為規橅而妄意前日之專甘心近時之快則相業卑微其餘不足觀矣其何以仰稱陛下專任十相之意哉臣仰恃聖明不能自默陛下惟毋以常談忽之天下幸甚歷代名臣奏議卷三百十
