body:
  text: 歷代名臣奏議卷二百九十二明楊士竒等撰近習宋仁宗皇祐元年知制誥胡宿上奏曰臣聞昔者葛懷敏先任入內內侍省副都知管幹皇城司公事宿衛不謹致逆徙竊變震驚宫闈嚮非宗廟社稷之重陛下乘輿幾殆及逆徒既獲又不生致規滅姦人之口天下之議罪在懷敏楊景宗二人而已臣每念此事痛心扼腕陛下仁聖不忍加重誅止解內職令居外任今因奏事忽有此命若再復內侍名職且赴本任是不久將復入內侍省之職也若再居內省則宿衛之變復未可知兼條制內臣都知副都知之職有過降充外任更不許再居舊職所以防一切之微誠源逺之法制也伏望陛下令有司檢詳舊制追寢今命法制一壞復之良難有此違礙臣不敢草制其中書送到詞頭一道臣輒封還五年權御史中丞孫抃上奏曰臣伏聞內降詔㫖付中書除授入內都知王守忠充莭度使臣初聆此言驚駭未信何也自陛下臨御以來三十年矣其聖意卓然高邁前古者有三舅家之親頗循法度中宫近戚亦自欽職內侍貴人不敢踰越此皆前世所難之事而陛下誡飭訓勵鮮有妄干天下大賢正人歌頌宸𠂻皆謂周成康漢文景不能如是是故雖敵國外强蝗旱內作而元元晏然不失太平乃陛下數事感天地信生靈使之然今一旦以統帥之官付中貴豈陛下之心哉臣謹按唐制大總管大都督之職帶使持莭則謂之莭度使所以尊嚴將領專制軍事安危成敗一以繫焉豈宜中官得處其任太宗朝王繼恩平劔南有大功朝廷議其賞止進順州防禦使乃别立宣政之號以寵之陛下若以守忠勤藎嵗久則富祿之安佚之奬慰之可也獨不當假夫官秩以踰祖宗典法以損陛下聖明臣謂此議必不可行外取天下四夷之笑伏乞聖斷於制敕未降已前特賜寢罷至和元年知制誥劉敞奏曰臣今月二十二日當制送到詞頭內園使綿州防禦使入內內侍省押班石全彬除利州觀察使充入內內侍省副都知者臣伏見今月十九日已有制㫖除全彬宫苑使利州觀察使既出聖衷又參廟論未能三日復换此命朝令夕改古人所非若因全彬自陳探其不滿之意曲徇所求以悅其心便是朝廷恩典本無定制唯繫宦官臨時徼乞宣布天下必以為惑傳示後世必以為笑何則陛下賞罰當信天下當教後世不知全彬功勤凡有幾何昨者嶺外之行已曽受賞今來溫成葬畢賞又不薄不知饜足愈求遷進朝廷亦當愛惜事體無宜輕改成命全彬閨闥之臣尚如此姑息萬一復有權勢重於全彬者如何待之臣雖鄙賤實惜此體不敢輒撰誥詞恐纍聖德其元送到詞頭臣已封還中書知諫院范鎮上奏曰臣九月中上言外議皆謂石全彬等緣溫成葬事妄冀恩澤陛下上顧月入南斗之戒重謹爵祿不可輕授是時陛下靣諭臣本無此議又云若與此輩轉官是幸朝廷之祻也臣退而竊喜陛下之言至明至聖又以為外議不足聼也比自臣接伴回至雄莫間道路傳聞石全彬自作坊使轉宫苑使自綿州防禦使轉利州觀察使其餘幹當使臣例轉兩資臣惟天子之言豈有不信臣下者如此必全彬等日久求請陛下重違拒之大臣又不為陛下執奏使天下之人有以議陛下者章獻皇太后輔佐陛下臨御天下章懿皇太后輔佐陛下章惠皇后保護陛下三太后皆有母道於陛下其葬之日監護之臣遷拜未嘗如此之寵也賜與未嘗如此之多也使天下之人議陛下䔍溫成之愛而有輕三后之心實由全彬輩之冒濫也繇大臣之不執奏也本朝觀察使未有緣護葬而輕授者臣為諫官若不論奏是臣負陛下責任之意乞以臣章下中書樞密參詳以臣言為非乞罷臣職放歸田里使免尸素之咎以臣言為是乞追還全彬誥敕以塞衆議二年殿中侍御史趙抃等上奏曰臣等竊聞內臣閻士良已得㫖揮帶御器械伏覩前年中郭申錫上言內臣舊制須經邊任五年又帶御器械五年仍限五十嵗已上及歷任無贓私罪方預選充押班等尋聞陛下聼納中外傳播以為得宜蓋欲得老成謹畏無過之人在陛下左右聞下樞密院常令執守施行今來詔墨未乾已聞除士良帶御器械竊以御帶職名將來多是承例叙遷押班須是自御帶之任便須選老成謹畏無過之人況士良為性狡獪自來與中外大臣交相結托久在河北張皇事勢天下具知及歷任曽有賘罪至徒今來密院殊無執守首紊著令所有士良新命乞賜寢罷别擇善良以懲勸陛下左右之人嘉祐三年殿中侍御史吕誨上奏曰臣伏自設官制祿以待其人用為賞勸過是則非所以公於天下也竊見近日除管幹御藥院入內供奉劉保臣王保寧鄧保夀王世寧四人遙郡團練刺史傳聞中外駭動人聼臣輒以國朝故事言之高品黃門三十年供奉官十年一轉蓋不使此輩坐而竊祿如咸平中洛苑使入內內都知秦翰與雷有終討王均之亂既而有功授以內園使恩州刺史即不知保臣等立何勞效與秦翰恩賞一同只是攀援暗轉無名之例伏乞追還成命特與平轉屬邊彊多事之際恐因此內臣無功進秩掌兵授律者不肻用命鶴有乘軒衛人無戰意斯有國者為之深誡惟聖斷無以私昵害天下之至公乃臣拳拳之望也五年誨又上奏曰臣伏聞寶元前諸閣分內品之類不過一二十人比來增及數倍除身分俸外更請本閣料錢四時衣服又破三司折食價錢冗費甚多繇此歷天章閣後苑內東御藥院最為優厚或因監督工作一切小勞便理績效得聖㫖盡下則超資躐等謂之暗轉自內品供奉不數年間授諸司使遙領刺史防團之任向時石全育何承用盧昭序張茂則馮承用之類其名甚多不可殫舉既與之暗轉則俸祿隨而增給如此濫恩非特亂先朝之典制較之前古亦未之聞也如前班武臣更歷外任及沿邊立顯功著效者未有酬賞若是之速焉竊以國家設爵均祿砥礪才能顯其進用以成大業豈特為內官假貸而賈天下之怨言謂主上恩厚於私昵甚為朝廷惜之臣即不知祖宗之制度何緣而廢至當陛下即位之初太后臨朝制命出於帷幄威福假於內官斜封墨敕授之匪人故外廷鮮得聞知疑暗轉之例自兹而始暨明道而後陛下躬覽萬幾北司之弊不聞剗革奈何復使盛於前也然宣命降於內省遷擢誥敕亦關於兩府蓋自來上下循持蔽而不言以陛下爵祿植為私恩交結貴幸因緣致身於近輔者比比有之以是積弊寖久陛下無由而知蠧公害政莫甚於此都城之下髙門大第寶貨充積富貴窮極皆幸臣之所有也傾府庫之貨財竭生靈之膏血以資無功何所取益臣恐神人怒怨非朝廷之福也設若保臣等出居外任薄立勞效陛下復以何官待之臣竊謂先帝賞秦翰討賊之功宜守之為例則小人覬覦之心自息伏乞指揮入內內侍省檢㑹諸閣分寶元以前人數比類今日如員數過多即行減省及管幹天章閣後苑內東門御藥院各限定人數或與三年一替並令入內內侍省將印紙歷子具有無公過事件批書如因勞效得㫖酬賞格即時與叙遷送中書出給誥敕所貴內侍省與樞密院中書相關不敢蔽欺得以盡公其暗轉俸給一切非例伏乞裁罷仍追寢劉保信前命止與平轉俾中外臣寮升進均一賞有所勸天下大幸六年知諌院司馬光上奏曰臣等伏以祖宗開基之始人心未安恐有大姦隂謀無狀所以躬自選擇左右親信之人使之周流民間密行伺察當是之時萬一有挾私誣枉者則鈇鉞隨之是以此屬皆知畏莫敢為非今海內承平已踰百年上下相安固無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉被此屬量其過失廣作威福私受貨賂所愛則雖有大惡掩而不問所憎則舉動言語皆被捃托臣等嘗病國家擇天下英材以為公卿大夫而猶不可信顧任此厮役小人以為耳目豈足恃哉今乃妄執平民加之死罪使之幽繫囹圄橫羅楚毒幸而不自誣服僅能辨明若更不聼有司詰問元初巡察之人小加懲誡臣恐此屬無復畏憚愈加恣橫使京師吏民無所措手足豈合祖宗意哉光又論押班須年五十疏曰臣伏見朝廷近除帶御器械蘇安靜充內侍省押班臣竊聞國家舊制兩省押班須年五十以上方得為之安靜年未五十特蒙擢用臣恐今後內臣求進者援以為例乃有年齒極少遂居衆首國之舊章因此隳壞竊為朝廷重之伏望陛下追寢安靜前命以存典法仁宗時監察御史裏行包拯論內臣奏曰臣伏覩先朝實録竊見真宗皇帝因對輔臣言及前代內臣恃恩恣橫蠧政害物朕常深以為戒至於班秩賜與不使過分有過未嘗矜貸此輩常亦畏懼王旦等對曰先代事跡昭然足以為龜鑑而聖慮言及於此實社稷之福也竊見近年內臣祿秩權任優崇稍過恐非所以保全之也以陛下英明神斷有罪必罰此輩或不敢為大過然在制之於漸庶免貽患於後伏願陛下佩服先帝之言以為格訓凡事更加裁抑則天下幸甚監察御史傅堯俞上奏曰竊聞近日內降指揮樞密院除何誠用帶御器械尋有臣僚上言遂罰誠用事有不便諌臣納忠天髙聼卑遽行追寢上下之分交得中外之心相慶然臣猶有所未諭者伏以內降之名古今以為非是陛下不窒其源乃制防檢付之有司既而輒復違之須人言而後止在納諫之美則曠古無並於剛一之德未為增益伏望自此凡左右敢以私事干陛下者乞從睿斷根逐嚴加貶責果陛下所欲進用者不必從中降㫖於視朝之際與大臣公議可則行之不可則罷之不使如誠用事數暴於人聼則陛下日月之明無毫分之纍矣臣孤拙無狀荷陛下任使思以塵露粗禆海嶽幸不以人廢其言深留聖慮則不勝幸甚堯俞彈李允恭不合補孫永言為入內黃門奏曰伏聞入內都知李允恭奏男供備庫副使堯佐之子永言為入內黃門竊聞內臣許養子一人而初補入內都知亦無恩典允恭既不合薦孫堯佐亦未當養子一旦破條越例事出非次此命一行必有相援而進者則陛下之成法遂廢大凡因事以啓僥幸為易置防以限恩澤則難官賞之弊近方粗革徼幸之塗膠固拘礙未能剗除者甚多其已行之法惟陛下持之如金石勿遽轉移則天下幸甚永言新命乞行追寢允恭久侍左右條例非不詳知公違制敕亦望特行勘責況內侍省條例甚明而永言違礙非一不敢俱陳以煩聖聼伏乞指揮子細勘㑹免致䝉蔽堯俞又上奏曰今月二十日有奏狀二封一狀論列入內都知李允恭不合奏孫永言充入內黃門一狀論列朱頴士不合干求內降內侍省不合不執奏取勘頴士都水監不合迎合權要保舉頴士至今未䝉降出施行臣徘徊顧思駭歎纍日方今內外百司涵濡慈恕盡誠以報陛下者鮮阿私以負陛下者多事不公當而能逹於憲官者才十之一二理或隱微不敢以煩陛下者又十有八九如允恭之公違制敕頴士等徼求私徇罪甚明白公議不容臣忠憤所激不顧權幸謂陛下欣然收採朝奏暮出議法於繩墨之外以整齊綱紀而方留中不下殊未垂納此非陛下至公之道且何以風厲百僚臣官為法吏職有言責守官舉職豈敢顧望中止伏冀陛下憐臣愚懇并前狀付外施行儻臣狂妄可誅雖百死無憾堯俞又上奏曰臣近纍狀奏彈勾當汴口朱頴士雖䝉追罷差遣其頴士不合干求內降內侍省並不依條執奏取勘頴士都水監附阿權幸保舉頴士尚未曽勘責及入內副都知李允恭不合奏男堯佐之子永言充入內黃門緣內侍只許養子一人而初授都知别無恩典有堯佐則允恭不合薦孫允恭在則堯佐未當養子已䝉寢罷進退違戾事狀明白御史中丞王疇亦有劄子論列皆不䝉降出臣愚賤亡狀未能感動天聼慚懼之極不知所處獨念陛下造為法令以維持綱紀幸臣壞之執政既徇而曲從法官論之陛下又寢而中止是法令伸於四海而屈於朝廷請求禁於踈外而行於近密上之所為必有甚焉者將何以揭示後來取信天下陛下之法初未動搖無狀者尚敢干犯儻犯而容之則誰與共守臣恐綱紀之紊或基於此絶其綿綿不可不慮臣雖孤外竊料陛下至公之心但慈恕有不忍耳人言既切必將施行然悠悠之語謂臣與王疇劄子奏狀皆不經睿覽雖此事决無而物聼已駭伏望陛下以臣三狀并王疇劄子並付所司依法行遣庶幾少塞疑議以正刑典堯俞又上奏曰臣近三狀論列李允恭朱頴士等皆䝉留中遂於今月初五日具劄子乞以臣前狀并御史中丞王疇劄子付外尋於垂拱殿進呈臣親奉德音不以臣言為非是樞密院輒復不行衆口籍籍皆謂李允恭嘗押張忭入樞密院視事忭深德之力為保庇仍風聞樞密院勘㑹李永言係條貫前擡舉人數以此上惑聖聰且條貫前私身甚衆何獨永言特被收採權幸阿私共壞成法此而不省使臣何言況陛下左右使令非一其供奉勤勞不當更有厚薄非分之恩獨行於允恭今殿前都帥李璋內侍何誠用俱以因緣內降曽經勘責已著之令獨移於頴士陛下知不忍於數人而不知失天下均平之望臣實區區為陛下痛惜陛下果以臣言為是則乞施行倘以為非則何惜一介之賤不加竄逐以快權幸之心臣亦無顔出入外廷以視朝列此狀不出臣且再趨軒陛重煩天聼胥重誅而後已堯俞再乞追李永言恩命奏曰臣近具劄子乞罷內侍押班李允恭孫永言恩命崇政殿進呈日䝉宣諭已行追奪既而傳聞有指揮不與請受及他人不得援例臣雖至愚實所未曉豈有近幸恃恩破條干法天子俯從公議許令追削而樞密必循人情曲為庇護此事浸行害政非細臣非不知頻瀆聖聰當速罪戾又與允恭素無嫌隙但愛惜陛下成憲為國家久逺計耳臣未知不支請受是何等法臣言不已豈但為月費數千錢哉設百官有未合任子者間或陳請濫膺官賞而臺臣諫列相繼奏論權罷俸給可得已乎今條格具存允恭力能破之方復區區使他人不得援例何遽知後日無力如允恭者臣未信其能守也借能守之是敕可破而例不可援於上下重輕之分得無悖哉況押班乃內侍長當堅守法令以表省內而身犯之樞密院固執政大臣當整齊綱紀以刑天下而公壞之伏望陛下先奪永言之官然後議允恭與樞密院之責則天下洗然無有䝉蔽此事一行萬務皆理儻如是孤賤臣雖百死猶生也干冒天威無任戰汗之至堯俞又上奏曰臣近有狀乞追李允恭孫永言恩命及奪供奉官趙繼寵差遣皆不䝉降出事權膠固孤力難移早夜顧思措身無所臣伏念幸人徼寵破壞常法樞密院茍徇人情恣其求請致臣區區屢煩睿聰然臣所以不避誅遣而喋喋不已者冀陛下矜憐特加收採防杜微漸緝正綱紀臣若顧避便不復言日往月來浸以增甚不知於朝廷損乎益乎凡事止於孽芽差易為力謂小無害積悔將深昨李永言若即正典刑繼寵者豈敢妄有覬幸今此二人儻不追奪則兩省內侍攀援趍競各生意於繩墨之外矣美官重祿率歸私謁明敕著令舉為空文惟陛下留神念之此豈為政之體今朝廷闕失獨賴臺諫官數人故陛下時有所聞窒此一途聰明何寄臣謂其言可聼願陛下奮然行之有不能容不若明加竄黜忠義之士猶有不顧而言者如其是非置而不辨章奏入而不下使默默以食息悠悠於圈牢則有志者豈肻為陛下安職業而久留哉是不徒孤臣之羞固亦非陛下之福至於今後依先降條貫餘人不得援例如此指揮最為深弊臣雖亡狀不願數聞陛下豈不惡之但未之思耳伏乞將臣前後論列李永言文字及趙繼寵兩狀付外早賜盡法施行堯俞又上奏曰臣近纍狀乞追李允恭孫永言恩命奪供奉官趙繼寵差遣皆不䝉降出忠義之言日切而陛下不亮權幸之交日深而陛下不察臣蚤夜以思感憤兼極自夏涉冬僅踰百日如朱頴士而壞條干法者三事況其間又有臣所不知者乎若惟務因循則內侍省條貫將盡廢矣不徒紊亂綱紀且起不均之怨日以增多為害非小頴士以赦令原免猶復有名繼寵永言須當辨正夫用孤危攻近幸昔以為難矧二人者挾中外之助乎臣所以屢沮而不休者無他以為古人之誠可貫金石而臣以懇確之心干公睿之主豈慮於終不見亮者哉且前置利劔沸鼎猶有延首奮身而不顧以犯天子之顔者今陛下至明至恕容納直言雖甚震怒勢不過斥逐臣何憚何惜敢顧望以負陛下輒再煩天聰以期必賜採聼伏望以臣前後文字付外盡法施行臣不勝懇倒之至堯俞又上奏曰臣纍狀乞追李永言恩澤奪趙繼寵差遣終未䝉降出近聞鄭貽緒者將十數年前事援繼寵例又勾當後苑人言未已幸進相仍事聞搢紳莫不驚駭因緣攀引殊無巳時豈有為法馭下而執政不用設官使言而陛下不聼如此是條禁不須置而御史可以廢也臣非不知掇拾細微聊以供職上不違陛下下不忤貴臣可以無患害而速富貴恐臣今日所得未多陛下異時為悔已甚故獨區區顧思而不能自已者也張忭廢陛下之法恃幸臣之援蔑視言者謂如無人且忭者嘗任御史歷知雜事遂為中執法當日謂陛下者云何而今乃所為如是陛下略加省察可以見其心矣伏望聖慈出臣前後論列文字依條施行不然誅臣以快權幸臣忠憤所激言不能文惟陛下留神裁處英宗即位殿中侍御史司馬光等論張茂則劄子曰臣等竊聞祖宗舊制內臣年未五十不得充內侍省押班近除張茂則年方四十八今陛下踐阼之初尤宜謹守祖宗法度以御左右之臣示天下至公若茂則果有才幹可用雖更留此闕二年俟其年至然後授之又何晚也臣恐茂則一開此例則內臣攀援求進者多畫一之法從此隳壞人人相效不可禁止不若正之於事初也臣等區區所為國家重惜在此而已治平元年光知諫院論任守忠疏曰臣竊聞入內內侍省都都知任守忠擅取奉宸庫金珠數萬兩獻遺中宫自以為功仍受中宫賞賜外議籍籍無不駭愕伏以守忠從來罪惡極多不可遽數陛下體元繼統聖政方新守忠曽無畏憚益恣巧諂公取官物自炫私恩贊導椒房首為侈靡既求權寵又分厚利姦邪之臣無大於此伏望陛下特發神斷以守忠付所司窮治所犯明正典刑以示天下光又論任守忠疏曰臣近曽上言任守忠姦邪事迹乞正典刑未聞施行臣案守忠懷姦罔上諂佞貪婪竊弄權柄固非一日專為讒慝交構兩宫狡詐反覆陛下所知若非先帝聖明皇太后仁慈則社稷可憂天位不安今又盜取庫物曲求容媚教中宫為不順陷陛下為不義此而不誅典刑安用據守忠罪惡臣久合奏陳但以陛下踐阼之初天威未振欲望陛下親發英斷戮此大姦使內外之臣莫不震肅今聖恩容貸已及嵗餘外議皆言守忠以諂佞之故受陛下寵遇過於先帝之時臣備位諫官不敢塞默守忠職在宫禁久專威福若不早除恐别生事伏望陛下如臣前奏速以守忠付所司窮治所犯肆之市朝以副天下之望光又論任守忠第三疏曰臣近者兩次上言任守忠姦邪事迹乞正典刑至今未聞施行臣迫於忠懇不能自已竊見守忠早以小臣獲事先帝幸䝉奬拔榮祿俱極日侍左右不能以忠言正道補益萬分專以詼諧諂諛茍求悅媚其罪一也總領近侍委之差遣而陵忽同列與奪自恣附已則愛悅逆意則憎疾援引親黨排抑孤寒任情徇私略無顧避其罪二也從來所受俸祿賞賜亦為不少而資性貪婪老而益甚盜竊官物受納貨賂金帛珍玩溢於私家第宅産業甲於京師聚斂之心曽無紀極其罪三也交結朋援專權據勢縱逞胸臆妄行威福所愛者雖有大罪掩蓋不言所惡者小有瑕疵糾擲成事使宫禁之內側足屏息畏憚守忠無以為比其罪四也濮王之薨守忠監護葬事賣弄國恩輕蔑皇族乘其有喪丐奪財物所得甚多終不滿意遂誣長子宗懿以為不孝使被譴謫感憤成疾以至沒身不能自雪其罪五也先帝以春秋寖髙未有繼嗣深思宗廟生民之重屬意聖明固非一日而守忠隂蓄姦心沮壞大䇿深忌國家立長立賢自欲於倉猝之際居中建議擇幼弱昏懦之君以邀大利如有唐之季定策國老門生天子賴先帝聰明卓然逺覽斷志不疑不然則太平之業幾墜於地其罪六也及陛下既為皇子守忠內懷憂懼日於先帝之前離間百端隔絶內外進對甚希使先帝為陛下之父不得施為父之恩陛下為先帝之子不得展為子之親其罪七也及先帝晏駕陛下纘統不幸遇疾皇太后權同聼政守忠乘此之際大逞姦謀窺伺語言撰造事迹往來革靣進退異辭使皇太后以文母之慈不免投杼之疑陛下以曽閔之孝立有負恩之謗交構兩宫遂成深隙計其隂謀無所不至賴皇太后聰明確堅執義不可傾移不然祻變之興豈可具道其罪八也及聖體既安皇太后恭還大政守忠不勸導陛下以勤修子道承顔順意報答盛德恢廣令譽而相時隨勢翻異炎凉欲詐輸新忠以巧遮舊惡用昔時讒陛下之計為今日讒皇太后之辭雖陛下未必聼受而使皇太后聞之不能不以介意終日涕泣悒怏成疾守忠但欲左右反覆自為身謀並不顧天下之人議陛下之善惡其罪九也皇后正位尚新天下聳觀令德守忠輒為皇后畫策並不禀問皇太后矯傳教㫖開祖宗寶藏擅取金珠數萬兩以獻皇后既取悅一時又坐享厚賜逆婦姑之禮開驕侈之源使皇后受其惡名而已身收其重利為臣姦邪孰甚於此其罪十也守忠有大罪十皆陛下所親見衆人所共知其餘欺謾為姦恣橫不法事類繁多不可勝言誠國之大賊人之巨蠧伏望陛下盡發守忠之罪明示四方斬於都市以懲姦慝光論內侍差遣疏曰臣嚮時上殿伏見陛下宣諭以內臣差遣並一切委之都知司臣當時已曽奏陳以為非便今入內內侍省都都知任守忠恃此權勢背公立私奉之者坐獲進擢忤之者立致排擯威福之柄盡在其手遂使宫禁之中畏憚其人過於人主罪盈惡積幸賴陛下神斷已斥而去之然儻不收還威福之柄則是去一守忠生一守忠終無益也臣愚伏望陛下自今日已後除內臣常程差遣依舊令都知司定差外其勾當御藥院內東門龍圖天章閣後苑化成殿延福宫等處及非時差管句裏外要切公事之人並乞陛下親加選擢試之以事觀其為人忠謹有功者則加賞拔姦邪不職者則加貶退不必一一勘㑹資序檢尋體例如此則誰不懷德畏威輸忠竭力豈獨內臣而已雖外朝之臣亦可用此道而治也侍御史吕誨上奏曰臣恭以聖朝承五代凋弊之餘祖宗外平諸國珠寶委積皆歸於內府非國有大事旌賞勳勞未嘗有一毫輕費其籍祕嚴雖大臣及主計者莫得知其詳實有以知神武英謀所存之深逺也先帝恭儉莭用聞于天下然自至和中服藥而後府庫不嚴宦官專恣用之一分而攘取百倍中外聞之莫不痛惜臣近聞外議內臣任守忠以奉宸庫明珠三萬兩黃金一萬兩奉於中宫守忠自邀酬奬仍固恩寵果如是陛下得不念祖宗艱難貯積之意哉矧亮隂中玩好侈靡有損而無益議論如此甚玷中宫之盛德足見宦者之狡計姦惡斯露衆所不容矣設使小人得計窺伺陛下之間隙動為容悅則何所不至臣欲乞今後奉宸諸庫宜謹其出入不使小人窺覘將備國家緩急以濟大事惟聖明留念神宗即位御史中丞司馬光論御藥院王中正乞盡罷寄資令補外官狀曰臣伏見陛下前者盡罷寄資內臣高居簡等令補外官中外欣然無不稱頌聖德尋聞復留陳承禮劉有方二人又以王中正幹當御藥院衆頗失望臣竊惟祖宗之意以御藥一職最為親密過供奉官以上輒令罷去者乃以防微杜漸詒謀萬世憂深思逺誠自古帝王之所不及子孫所宜謹守不可失墜者也近嵗以來左右之臣顧戀權勢又貪祿位遂求暗理資序豫支俸給名曰寄支以欺誑外人此豈祖宗之意耶今陛下欲振舉紀綱一新治道必當革去久弊一遵正法夫法如隄防常應全固乃得無患一有蟻壤泄之則漸致潰敗不可復救近習之臣朝夕在側因緣祈恩無有窮極不以祖宗舊法制之恐陛下他日亦將厭之也況王中正素聞姦猾頗好招權今處之要職是生一居簡也伏望陛下依前降指揮盡罷寄資者令補外官以成聖德之美别擇內供奉以下朴直廉謹者使幹當御藥院以存祖宗之法光又論王中正及不當令內臣采訪外事狀曰臣竊聞陛下好令內臣采訪外事及問以羣臣能否臣愚竊以為非宜陛下內有兩府兩制臺諫外有提轉牧守皆腹心耳目股肱之臣也陛下誠能精擇其人使之各舉其職薦舉賢能糾按姦慝論政事得失述民間利害皆令列於奏牘明白啓陳其有尸祿偷安及挾欺罔者小則罪黜大則誅竄誰敢不盡公竭誠以承休德如此則天下之事猶一堂之上陛下何患於不知哉今若深處九重之內詢於近習之臣采道聼途說之言納曲躬附耳之奏不驗虗實即行賞罰臣恐讒邪得以逞其愛憎而陛下為之受其譏謗也近聞王中正差往陜西幹當公事有知涇州劉渙等曲加諂奉鄜延路鈐轄吳舜臣違失其意俄而涣等進擢舜臣降黜衆人皆言中正所為審或如此則是中正弄權已有其驗今陛下又置之肘腋委以腹心臣恐天下之人將重足接迹而畏之輿金輦璧而奉之矣外議又言山陵禮畢韓琦必求引退兩府當有遷臣竊慮兩制以上萬一有無廉耻之人或隂結此屬以求進用者夫以堯之聰明咨于四嶽衆言僉同然後用人猶失之於鯀況可決於近習之口乎凡公忠正直之士必不肯借譽左右以求自售齊威王所以賞即墨大夫而烹阿大夫正謂此也昔漢唐之衰宦官所以壞亂紀綱傾覆國家者皆由人主與之謀議帷幄進退羣臣故也此乃治亂安危之本不可不察伏望聖慈詳思臣言凡欲知天下之事當詢訪外廷之臣其王中正不可令幹當御藥院或姦佞之臣豫設機謀以經營兩府者必不可用則天下幸甚光又論髙居簡狀曰臣聞古人有言堂上不糞則郊草不贍曠藝言近者不治則不暇及逺也竊見幹當御藥院高居簡性資姦回工讒善佞久處近職罪惡甚多臣謹按祖宗舊制幹當御藥院官至內殿崇班以上即須出外蓋以日月寢久官資稍高則防其憑恃威靈竊弄權柄逺監漢唐之祻深為子孫之慮故也陛下即位之初內臣以覃恩遷官者盡補外職獨留御藥院四人天下首以此一事譏陛下之失況居簡於衆人之中最為狡猾而陛下特加寵信待以腹心中外指目大玷聖德臣職在繩糾不敢不言伏望聖慈遵祖宗令典應幹當御藥院官至崇班以上者盡授以向外差遣其高居簡乞逺加竄逐以解天下之惑光又論高居簡狀曰臣近曽上言幹當御藥院高居簡工讒善佞乞逺加竄逐未䝉施行昔周公以立政戒成王至虎賁綴衣趣馬小尹左右攜僕百司庶府亦皆擇人穆王命伯冏為太僕正曰昔在文武侍御僕從罔匪正人又曰簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖自古聖帝明王雖左右小臣未嘗不謹擇端良之人以自防逸豫之生也況陛下嗣膺寶命聖德惟新善惡興衰於此乎分而使讒佞如居簡旦夕常在左右又寵信之此乃異日祻亂之根腹心之疾也臣職在去邪不敢不再三上言伏望聖明依祖宗舊制應幹當御藥院官崇班以上者並令出外其高居簡仍乞逺加竄逐光又論曰臣昨日前上殿言幹當御藥院高居簡自先帝時竊弄權柄陛下復寵而信之大為聖德之纍乞治其罪陛下許臣送樞密院施行至今未聞有指揮不知居簡以何道結陛下能如此之深也居簡所能止於讒佞佞者不過巧言令色希意迎合快人主之欲以市其權使人主溺於荒宴而不自知也讒者不過離人君臣間人骨肉惑人主之心以固其恩使人主陷於傾危而不自悟也有是二者不可不察向使陛下即位嵗久功業已成而有讒佞之臣始得弄權天下有識者猶當寒心何則知其必為祻亂之階也況今初承大統當鋭精求治之時而遽留居簡於左右仍加寵信根蒂已牢則異日之憂可勝道哉此臣所以不避死亡而必當力爭者也或聞陛下欲待居簡自求引退然後遣去臣誠戅愚未曉所謂若國之大臣耆年有德聞望素高一旦偶有小失未為外人所知陛下務存終始使自引去以全其名則可矣其挾姦作慝者猶宜明正刑書況居簡閨闥小臣罪惡盈積所宜肆諸市朝宣示四方以戒憸人而尚足為之隱乎且居簡姦邪播聞逺近陛下今日雖為之隱天下耳目庸可蔽乎凡居簡所以能為惡者以其自託宫禁譬如狐鼠依憑城社彼唯恐離去左右豈肻自陳求退乎伏望陛下盡出羣臣前後所言居簡事狀送居簡赴所司明治其罪以彰至公之道知諌院楊繪論不當差王中正等往外幹事狀曰臣謹按春秋君之始年變一年而謂之元年者欲其善於始也變一月而謂之正月者欲其正於始也恭惟陛下肇升大寶新布大令天下之民傾耳拭目以觀聽乎聖功睿業實所謂善之於始正之於始之時也凡百注措可不謹諸近聞差幹當御藥院王中正往陜西幹事續又差幹當御藥院李舜舉繼往未幾又差押班王昭明繼往御藥院押班最為親近之職祖宗已來差出甚少外之官吏茍奉上所親近之人不唯擾民抑甚駭物今乃旬日之中差御藥院二人押班者一人接跡而行陛下以此輩為腹心乎則館閣臺省之臣乃朝廷所養以待用者豈無一人可為腹心而必用此輩乎臣近又聞冬至莭假百官頗循舊例逰相國寺聞有小黃門隨而抄劄姓名臣不審陛下以之為耳目而使之然乎抑此輩自欲以媚於上乎如陛下使之然則非前旒蔽明人主不窺私之義也若其自媚於上則蔽陛下之聰明其可量哉臣切意陛下之所為慕居堯舜之上而反有不鑑漢唐之季臣竊惑之伏乞委腹心耳目之任於世之賢者無俾宦者之權從此漸盛乃所以為善之於始正之於始之術也熙寧元年右正言孫覺乞定著內臣員數年未四十不得入諸閨閣狀曰臣風聞日近行遣內臣白茂先事如茂先所坐宜在誅戮之科貸以不死聖恩甚厚然內臣出入宫闈宜在防限臣聞先帝時後宫甚肅內臣出入皆更相戒飭聳栗祗畏在仁宗朝入內內臣亦嘗限年年未四十者不得入諸閨閣臣謂因此事定著員數仍以年為限隔便使重為保任自非通詔令之處一切減損蓋宫省之內不可以不清而防微杜漸亦宜及其未然九年侍御史周尹等論遣李憲措置邊事狀曰臣等伏見朝廷以熙河路鬼章為寇遣內侍省押班李憲往以秦鳯熙河路計議措置邊事司為名中外之論皆謂憲雖名計議措置邊事而軍前諸將皆受憲莭制其實大帥然自詩書已降迄于秦漢魏晉周隋上下數千載間不聞有以中人為將帥者此其故何也勢有所未便也蓋有功則負恃驕恣陵轢公卿何所忌憚無功則挫損國威傳笑四夷非細事也唐自睿宗以前未嘗以將帥屬中人至明皇承平日久志大事奢稍委近習㑹安南蠻渠梅椒鸞叛而楊思勉請行遂許之然猶以宗楚客為大都護及覃行章亂黔中始以思勉為招討使雖有擒滅醜虜之功而唐之祻萌於此矣及代宗用魚朝恩拒史思明討僕固瑒而恃功擅命幾危社稷倚元載除之寒心者數月以程元振判元帥行軍司馬權震天下元勳故老皆見斥逐洎敵人內侵集天下兵無隻輪入關者此皆已然之效也至憲宗時王承宗叛以吐突承璀為行營招討處置使諌官李傭許孟容吕元膺段平仲白居易等衆對延英謂古無中人位大帥恐為四方笑乃更為招討宣慰使而承璀卒以無功輕謀弊賦得罪及後世區區踵其故迹而唐之祻有不可勝言者其源蓋起於開元也今陛下更易百度未嘗不以先王為法忽降詔命以中人為帥搢紳士大夫皆莫知所謂夫以陛下之仁聖神武駕馭豪傑雖憲百輩臣等知其無能為也然陛下獨不長念卻慮為萬世計乎使後世襲沿故迹狃以為常進用中人常據兵柄則天下之患又將有不可勝言者矣陛下其忍襲開元故迹而忘天下之患乎方今雖乏人然文武之士布滿中外豈無一人可以任陛下邊事憲出入近密荷國寵榮詔下之日大臣不敢言小臣不敢議臣等代匱憲府以言為職故敢盡其狂愚尹等又論遣李憲狀曰臣等於十九日奏為用李憲專措置熙河事宜乞寢成命至今未䝉施行臣等重念古者奄人以典司內事而已雖漢唐之始亦未聞任事至後世始以政機兵柄假於所私而漢唐自是衰矣陛下議事造法逺取於三代以漢唐之盛為不足道而肯安襲已敝之法重回既成之命臣等備數憲府終未敢安也惟奄人柔媚非深長計慮也左右便辟以逆人君之嗜好作為陛下既數假寵於憲則其類莫不畏向而服從之而其情日自侈大憲功益高賞不可不進及其盛而抑之則其中必不自滿矣以柔媚之性日習於侈大挾不自厭滿之心得所信向服從之類以事陛下於中此不可不戒也臣等知陛下聖智神武以犬馬用憲羈紲銜勒必無狂逸奔踶之憂而臣等區區誠為過計然反復思念自古未有以兵寄奄人而不亂者夫天下之事忽於其始則其終也必有害陛下以一方事宜屬之憲後執以為例則兵權必歸焉陛下以薛昌朝役於憲人習以為常則士大夫必見摧傷矣此必然之效也惟陛下深念之故臣等以謂果莊之患小用憲之患大憲功不成其祻小有成其祻大昔漢唐及藝祖皆以兵定天下方其初中國瓜析為八九世方乏才人不知學而祖宗震起於攙搶擾攘之中所以安寧者亦自多士而已未聞此屬有與焉今果莊狗偷鼠盜非可畏之與國也祖宗恩德庇覆之久陛下作成人才之盛非無可用之忠臣也陛下何重於憲而忽忘天下之士怠功臣之心兆後世之患哉陛下神明淵奧非羣臣所能窺測然臣等於此日夜念之至熟而無疑者也陛下謀于心臣等謀於衆人陛下欲權一時臣等為萬世計惟少屈意聽納早賜指揮寢罷以安物論監察御史裏行蔡承禧論遣李憲措置邊事狀曰臣伏覩詔除內侍省押班李憲充秦鳯路計議措置邊事其一路將領皆取憲約束臣等伏見藝祖之朝中官不過給使太宗使以黃衫給事禁中方是之時四方可謂多事不以不稱之才而天下士民罔不服從以之興大統傳後世逮唐之晚乃以吐突承璀為招討處置而侍從之官論奏不已憲宗屈天下之議而用之終以無功而罷蓋一方之警欲以擾一路為難以天下之力治一小警為至易此理順故也理順則無逺而不從理屈則雖近而不服熙州小警大不過覬幸朝廷之爵祿嵗時之賜與小不過欲以劫掠本界倉廪牛馬況封疆之臣所聚者一路之勇所用者一路之智也彼夙夜砥礪欲以捐軀命而承德音乃使潛氣屏息以順適奄尹之指令乎臣等又聞名言兹在兹茍有兹事必在兹義今雖委曲傅就更為計議措置之名其實使一路將領出於指麾乃是行招討經略之職欲以厚誣議者安可得乎況今天下之廣士民之衆豈無一憲輩而顧必用之何示天下以不廣哉伏望朝廷鑒藝祖太宗之所以裁抑中人業成若此念唐憲宗所以崇用之而功卒無成之若彼明所與以稱所施天下幸甚承禧又論遣李憲措置邊事狀曰臣近章疏論列李憲不合充秦鳯路計議措置邊事悉陳區區之愚陛下赦其狂瞽開納聽受至今未奉㫖揮寢罷臣自度智謀愚下訥於辭說不足上回宸慮此事實繫國體重輕貽訓將來不可遂已臣語直辭拙言不逹意而憲以敏給辨慧能當陛下之意臣進見開陳有時不能盡事情萬一而憲朝夕得侍清光詳復巧說臣孤立無蜉蝣蟻子之助而憲內外之人觀望稱美以為才能勢不均敵而臣獨冒萬死拂上㫖惓惓若此者豈為臣一身之計重念祖宗基業之難而臣荷陛下識擢奬憐使之盡言不忍緘默自同衆人惟陛下留神而熟思之承禧又論遣李憲措置邊事第三狀曰臣自聞詔除內侍省押班李憲充秦鳯熙河計議措置邊事臣兩有論列未奉聖㫖指揮臣竊以陛下通知古今明曉治體非不知中人之出為害政中人之柄兵不可示後世而必欲使之者非以其便敏能適於㫖令歟非捷給能有以應對歟非以在熙河曽經行伍之間乎此聖意孜孜果於用之欲以救生民一時之患而忘其可慮之逺者臣故仰服陛下垂意於一世之功矣然而便敏似才捷給似智又曽經行伍必以為有功臣請言便捷之害於政者夫中人之出務於集事而不度事之深淺一槩以束下為能既居兩路經略使之間則必以陛下之威氣使兩路經略使不敢議其可否縱事有未便則無敢言者矣無敢言者則雖有害於邊防陛下無由而聞矣臣請言捷給之害於事者陛下深居法宫之中羣臣進見以時而憲以親侍陛下言之親莫如憲日侍左右莫如憲其為固已易於信從而又嘗歷熙河其性慧巧必能有以投陛下之意其所言邊防有害則陛下雖聖明悉知之乎憲之處熙河謂之有功也豈憲之獨能然哉上有大帥下有偏裨熙河軍吏以陛下俾親信之出也有功必推憲其無功敢議憲以聞上乎故憲能纍積以至此豈憲之必能然哉而以陛下之明聖必有以照亮而未肻遽易者豈非出此乎臣有一言望陛下少垂清慮復之熟之陛下今命諸路之帥都副總管以為可以任邊以今差將官正副七十餘人以為可以將領矣至於小郡列堡而以才武名者不可勝數小有事宜豈無一人可任者至以中人為專帥而臨制兩路雖曰計議又帶措置之名四夷聞之豈不輕視中國乎況今秦鳯熙河之凋弊常俸自己難給而又一二千指揮之兵以食之果莊者如聞潛已遁去臣恐憲慮無功又别生邊事以邀覬伏望聖慮特回德音以慰安中外天下幸甚凡今得侍左右皆有以將順而臣獨仰拂宸㫖豈臣之所欲哉惟陛下思之干冒宸旒不勝萬死十年監察御史裏行彭汝礪奏曰臣昔者論不當付寺人以兵陛下以為非是及李憲師出果獲鬼章自洮以西遂至無事而臣言絀矣臣之言非以憲為不足以成功其慮亦不在憲故臣言自絀於疑猶信天下之事固有趣時而為之者然其大綱亦不可以一槩言也今以周官觀之考其數蓋不及百人而所事亦略可見以今視之其多少輕重何如也蓋古者因民之有是疾故擇而任焉非以使令之故刑無罪之人而為之也彼其類非無聰明賢智無故使以刑徒其身廢絶其類至踰千百焉此非先王以仁愛人之道也古人惟酒漿醯醢司服守祧而已其它莫與焉今以一道之權與之此非先王以義制事之意也憲辟薛昌朝不聽切齒扼腕以為腐儒所賣自是不復回顧士人矣張茂則以河事頡頏作氣官屬罕見其靣雖逹官大吏俯首不敢與抗而姦詐之人稍復趨附以僥幸萬一之利陛下以是觀之使其有可以輕士人之勢其心如何且朝廷比年之役其最貽陛下憂者洮西閩蜀其最繫議論者惟濬川之役今日之役最為大者洮河之役數者皆在寺人是陛下所愛飬尊寵之士大夫無一可屬任者也且彼其初非無敏健精悍可用之力及稍任事者則窺覦玩弄藉蹈士大夫矣詩曰商鑒不逺在夏后之世陛下試取漢唐以來宦官之事觀之亦足以知矣自古人君方其無事之時未見其害則士大夫之言為不足信亦莫之聽也及其祻亂並作本末顛沛至於無可奈何而後已自古及今蓋非一二也惟陛下為宗社計之不勝幸甚哲宗元祐五年御史中丞梁燾論陳衍採訪外事狀曰臣風聞中貴陳衍採訪外事密奏兩宫衍近來頗自表異淩狎羣輩氣岸不遜臣以謂兩宫聖明輔陛下施為有宰執論事得失有臺諫百司各守其職循名責實則事無廢弛豈可使閹尹賤𨽻上玷聰明若此人言為可信有傷聖德漸不可長八年十一月翰林學士兼侍講范祖禹論宦官劄子曰臣聞書曰與治同道罔不興與亂同事罔不亡漢有天下四百年唐有天下三百年及其亡也皆由宦官相去五百餘年如循一軌蓋與亂同事未有不亡者也漢自元帝任用石顯委以政事殺蕭望之周堪而廢劉向等漢之基業壞於元帝東漢鄧后臨朝中官用事手握王爵口含天憲順帝以後五侯專朝桓帝靈帝之時十常侍擅天下子弟親黨割剝百姓毒流四海附之者寵及三族違之者滅及五宗大考黨獄夷戮天下名士於是黃巾賊起朝野崩離及袁紹誅宦官獻帝奔播困餓而曹操因之以篡漢唐自明皇使高力士省決章奏宦官始盛李林甫楊國忠等皆因力士以進唐亡之祻基於開元肅宗任李輔國末年寢疾輔國以兵劫遷明皇於西內殺張皇后及二王明皇以憂崩肅宗以駭沒貴為天子上不保其父中不保其身下不保其妻子由用輔國一人而已代宗用程元振功臣畏讒吐蕃寇陷京師播遷于陜德宗用宦官分領神策禁兵其後天子由其所立唐室終以此亡憲宗服金丹躁忿為陳𢎞志所弒敬宗為劉克明所弒文宗欲討憲宗之賊謀泄仇士良殺四宰相及朝臣滅其族流血成渠朝廷半空文宗憂憤以至于沒武宗以後皆由宦官所立僖宗呼田令孜為父天下大亂黃巢賊起播遷于蜀又幸興元楊復恭自稱定策國老呼昭宗為負心門生天子劉季述等廢昭宗於東內韓全誨等劫昭宗幸鳯翔於是崔裔誅中官而朱全忠劫遷昭宗遂弒之因以篡唐觀漢唐亡國之祻其酷如此後之人主豈可不以為刻肌刻骨之戒哉太宗時王繼恩有平蜀之功中書欲除宣徽使太宗曰朕讀前代書史不欲宦官預政事宣徽使執政之漸也宰相懇言繼恩有大功非此不足為賞太宗切責宰相等乃命學士别立宣政使之目以授繼恩布衣韓拱辰詣檢院上言繼恩功大賞薄太宗大怒以拱辰妖言惑衆杖脊黥面配流崖州太宗可謂深鑒前古而塞祻亂之源矣英宗服藥任守忠往來交搆兩宫致慈聖太后與英宗不相悅言者劾奏其罪貶蘄州安置盡逐其黨然後慈聖英宗母子如初宫省清肅至熙寧元豐間內臣之中李憲王中正宋用臣三人者最為魁傑憲總兵熙河兼領三路中正總兵河東兼領四路其權勢震動內外自陜以西人不敢斥言憲名中正口敕募兵州郡不敢違師徒凍餓奔潰死亡最甚憲陳再舉之策以誘夏賊致永洛陷沒在熙河僭擬不法用臣興土木之役無時休息榷舟船置堆垜網市井之微利奪細民之衣食專事刻剝為國斂怨此三人者雖加誅戮未足以謝萬姓朝廷止從寬典量加廢黜唯憲獨死中正用臣猶存陛下近召內臣十人續又召數人而李憲王中正之子皆在其中又除押班二人帶御器械一人中外無不駭愕既而聞二人以執政言其有過先罷三人以舍人徼詞頭且輟然前來指揮首違故事又李憲王中正之子既得入侍則中正用臣亦將進用人心不得不憂故臣敢極言之陛下與太皇太后同聽政之初外逐蔡確章惇吕惠卿等及羣小人故朝廷肅清內逐李憲王中正宋用臣等及羣小人故宫禁肅清內外皆無凶人故天下安靜臣歷觀近古內外肅清未有如今日也祖宗法度所以維持後世不可輕變陛下奈何先自壞之陛下所以享南靣之尊䝉已成之業四方萬里奔走而聽命者以朝廷公正天下心服也陛下何不慎守法度規矩增修德政使過於垂簾之時然後不失天下之望今未及進一賢行一善先驟用中官如此之盛四方聞之必以為政出宫掖無復綱紀如衰季之世豈不大失人心哉夫人心一失欲復收之甚難陛下若作一二事使中外悅服四方竦動則他日所為有順流之易人心先信故也若作一二事使中外憂疑四方解體他日雖有美意人已不信在前豈得便心服乎如此而望德業之光名譽之隆非臣之所知也今中官止是陛下左右給事使令臣雖至愚亦知其必未有害政之事然欲治外者必先治內欲治逺者必先治近是以明王慎選左右壬人堯舜畏之佞人孔子逺之恐其有損而不自覺也昔唐之時仇士良教其黨曰天子不可令間常宜以奢靡娛其耳目使日新月盛無暇更及他事則吾輩可以得志慎勿使之讀書親近儒生彼見前代興亡必知憂懼則吾輩踈斥矣士良以此固其權寵故能專恣二十餘年夫漢唐之事當今必無然以先帝天資英睿聖學高明可謂不世出之主而內外為小人所誤外興師旅內興百役先帝未嘗享太平之樂終以憂勤損夀凡不便民之事皆羣小所為而使先帝受天下之謗臣常痛之故不願陛下復近小人蓋以此也陛下誠能聽臣之言悉追罷除用內臣指揮未到者别與差遣已入者復授外官則中外之人稱誦聖德萬口一辭以為至美乃可以解衆庶之惑洗陛下之謗此如反掌之易何難而不為哉自聞近日兩次指揮以來外議洶洶皆云大臣不能爭執陷陛下於過舉臺諫之臣又皆畏避中人莫敢一言但恐陛下未之知耳若使知之必不為也臣侍經筵八年日望一日嵗望一嵗期陛下為令德之主唯恐有纎毫之失故不避違拂聖意數進苦切之言陛下每留睿聽以臣愚直見知臣亦不量微力竊以獻納自任今兹事體實繫朝政汙隆人情去就臣義均休戚榮辱不忍默默坐視敢冒萬死而獻其忠唯陛下裁察歷代名臣奏議卷二百九十二
