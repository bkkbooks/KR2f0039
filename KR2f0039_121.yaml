body:
  text: 歷代名臣奏議卷一百二十一明楊士竒等撰禮樂冠婚喪禮魯襄公九年公送普侯普侯以公宴于河上問公年季武子對曰㑹于沙隨之年寡君以生普侯曰十二年矣是謂一終一星終也國君十五而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂莭之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉普侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也唐太宗貞觀五年皇太子冠有司言皇太子冠用二月吉請造兵備儀仗上曰東作方興宜改用十月少傅蕭瑀奏曰據陰陽書不若二月上曰吉凶在人若動依陰陽不顧禮義吉可得乎循正而行自與吉㑹農時急務不可失也右專言冠禮宋仁宗景祐元年監察御史孫沔上奏曰臣伏覩近降白麻選立皇后當禮院定到儀式取冬至日奉册皇后位中宫事或必行義亦未諭伏自天聖以來十有餘載每下詔令必曰克奉慈闈敷宣逹孝及山園肅事軺車發途陛下攬紼徒行掩袂號慟天下聞之雖虞舜之為心周武之為子無以過也今春百僚陳誠五上封表乞聽樂而陛下純仁之懷孺慕之意孝志不衰抑去未允是知百行之本一人克修三載之憂天下通制雖易月之詔臨政得於從權期年而渝在仁傷於有愛而況明王廣孝思及萬世也今建納皇后必展鴻規古禮交修官儀備舉慶賜兼行歡心內易奈何莊獻未及大祥哀樂相參切恐不可士庶違之則有踰制之刑公卿違之則負忘哀之責豈英明之君禮法之主可自踰防範以動風俗則前之下令皆為空言虧德損名無甚此舉雖以禁掖久虛其位固匪朝廷將順之宜伏望陛下發慕往之情奉有終之孝追還近詔别擇慶辰俟過禫祥以成嘉㑹則行告廟史無愧辭刑以御邦孰敢不正伏乞與執政大臣更從公議定庶幾不顯於聞聽臣生居寒微不知國體惟恐史筆直書千載之後有虧陛下之全德爾干犯天威甘受斧鑕嘉祐二年判太常寺吳奎等上奏曰臣聞古者婚姻始用行人告以夫家采擇之意謂之納采問女之名歸夫廟卜而獲吉以告女家謂之問名納吉今選尚一出朝廷不待納采又公主封爵已行誕告不待問名而卜之若納成則既有進財請期則有司擇日宜稍依五禮之名存其物數俾知古者婚姻之事重而夫婦之際嚴如此則亦不忘古禮之義也欲俟公主出降日令李偉家主婚之人具合用鴈幣玉馬等陳於內東門外以授內謁者進入內中付掌事者受之其馬即不入英宗治平三年頴王府翊善邵元乞下太常禮院修撰頴王聘納儀範奏曰臣伏覩皇子頴王天資卓茂婚姻及期方陛下即政之初而元嗣克家之日推之於禮莫重於斯臣等伏見國朝親王聘納雖開寶通禮具存舊儀而因循未嘗施行至有敲門羊酒鎮匱錢銀乃里巷之常談蓋搢紳之不道行於聖旦竊所未安欲乞降聖㫖下太常禮院博約舊典修撰潁王聘納儀範其故事非禮者一切罷之哲宗元祐六年范祖禹論納后儀制狀曰臣竊以都亭驛常為遼使館舍今納皇后以母天下而先居之於夷狄之館恐非所以觀示四方為正始之道也臣愚欲乞詳酌以舊尚書省權為行第又發册奉迎命使及皇后入內皇帝皆服通天冠絳紗袍臣謹案古昏禮用冕服無他服之文通天冠綘紗袍本以代古皮辨之服唐開元禮國朝開寶通禮亦皆服衮冕發册與奉迎同日將以為天地宗廟社稷之主繼先聖之後其可以不致隆乎伏請皇帝臨軒發册命使奉迎及皇后入內並服衮冕以重大婚之禮伏望聖慈更下三省樞密院參酌庶於國體為便合於先王經禮之意所有録黃未敢行下謹具封還伏候敕㫖貼黃議者或謂昨來發太皇太后册寶止服通天冠絳紗袍今納皇后服冕有踰尊之嫌臣謹案冕服祭服也辨服齊服也故南郊致齊服通天冠絳紗袍祭之日乃服衮冕冕服所以交神非所以事親也婚禮將以為天地宗廟社稷之主有鬼神隂陽之義故服祭服與事親之禮不同即無踰尊之嫌臣與鄧伯溫等議狀已備論之今服通天冠絳紗袍於禮無所據臣竊惜聖朝講明一代大典而於先王之禮無據則未足為法也伏乞更賜詳酌哲宗時御史中丞蘇轍乞令兩制共議納后禮劄子曰臣伏見今月五日詔書莭文以皇帝尚虛中壼令太常禮官參考古今典故著為成式臣謹案通禮納后最為嘉禮之重自天聖以來逮今六十餘年在朝臣僚及太常官吏無復親經其事者兹禮至大宜加重慎竊見近歲議太皇太后皇太后皇太妃寶册冠服儀衛等事皆令翰林學士兩省給舍與禮官同議今來皇帝婚禮所以承宗廟奉兩宫子四海其事甚重伏乞仍令翰林學士以下共加詳議蓋慎始所以敬終而正家所以齊天下不可忽也右專言婚禮東漢安帝元初三年鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制詔下公卿議者以為不便劉愷獨議曰詔書所以為制服之科者蓋崇化勵俗以𢎞孝道也今刺史一州之表二千石千里之師職在辨章百姓宣美風俗尤宜尊重典禮以身先之而議者不尋其端至於牧守則云不宜是猶濁其源而望流清曲其形而欲景直不可得也太后從之時有詔大臣得行三年喪服闋還職尚書陳忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者大父母死未滿三月皆勿徭令得葬送請依此制從之至建光中尚書令祋諷尚書孟布等奏以為孝文皇帝定約禮之制光武皇帝絶告寧之典告寧休謁之名吉曰告凶曰寧古者名吏休假曰告吏二千石有豫告賜告豫告在官有功法所當得也賜告病三月當免天子優賜其告使帶印綬將官屬歸家養病也貽則萬世誠不可改宜復建武故事忠上疏曰臣聞之孝經始於愛親終於哀戚上自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異恩一體而分三年乃免於懷抱先聖緣人情而著其莭制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵遲禮制不序蓼莪之人作詩自傷曰瓶之罄矣惟罍之恥言已不得終竟子道者亦上之恥也髙祖受命蕭何創制大臣有寧告之科合於致憂之義建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為雕損大漢之興雖承衰敝而先王之制稍以施行故籍田之耕起於孝文孝廉之貢發於孝武郊祀之禮定於元成三雍之序備於顯宗大臣終喪成乎陛下聖功美業靡以尚兹孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登髙北望以甘陵之思揆度臣子之心則海內咸得其所冲帝崩梁太后以揚徐盜賊方盛欲須所徴諸王侯到乃發喪太尉李固曰帝雖幼少猶天下之父今日崩亡人神感動豈有人子反共掩匿乎秦皇沙丘之謀近日北鄉之事皆天下大忌不可之甚者也太后從之即暮發喪魏武帝幼子倉舒卒帝傷惜之甚掾邴原有女早亡帝欲求與倉舒合葬原辭曰嫁殤非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉帝乃止明帝太和中皇女淑薨追封諡平原懿公主司空陳羣上疏曰長短有命存亡有分故聖人制禮或抑或致以求厥中防墓有不修之儉嬴博有不歸之魂夫大人動合天地垂之無窮又大德不踰間動為師表故也八歲下殤禮所不備況未朞月而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以來未有此比而乃復自往視陵親臨祖載願陛下抑割無益有損之事但悉聽羣臣送葬乞車駕不行此萬國之至望也聞車駕欲幸摩陂實到許昌二宫上下皆悉俱東舉朝大小莫不驚怪或言欲以避衰或言欲於便處移殿舍或不知何故臣以為吉凶有命禍福由人移徙求安則亦無益若必當移避繕治金墉城西宫及孟津别宫皆可權時分止可無舉宫暴露野次廢損盛莭蠶農之要又賊地聞之以為大衰加所煩費不可計量且由吉士賢人當盛衰處安危秉道信命非徙其家以寧鄉邑從其風化無恐懼之心況乃帝王萬國之主靜則天下安動則天下擾行止動靜豈可輕脫哉吳大帝嘉禾六年春正月詔曰夫三年之喪天下之達制人情之極痛也賢者割哀以從禮不肖者勉而致之世治道泰上下無事君子不奪人情故三年不逮孝子之門至於有事則殺禮以從宜要絰而處事故聖人制法有禮無時則不行遭喪不奔非古也蓋隨時之宜以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糾坐猶已廢曠方事之殷國家多難凡在官司宜各盡莭先公後私而不恭承甚非謂也中外羣僚其更平議務令得中詳為莭度顧談議以為奔喪立科輕則不足以禁孝子之情重則本非應死之罪雖嚴刑益設違奪必少若偶有犯者加其刑則恩所不忍有減則法廢不行愚以為長吏在逺茍不告語勢不得知比選代之間若有傳者必加大辟則長吏無廢職之負孝子無犯重之刑將軍胡綜議以為喪紀之禮雖有典制茍無其時所不得行方今戎事軍國異容而長吏遭喪知有科禁公敢干突茍念聞憂不奔之耻不計為臣犯禁之罪此由科防本輕所致忠節在國孝道立家出身為臣焉得兼之故為忠臣不得為孝子宜定科文示以大辟若故違犯有罪無赦以殺止殺行之一人其後必絶丞相雍奏從大辟普文帝崩國內行服三日武帝遵漢魏之典既葬除喪然猶深衣素冠降席撤膳太宰司馬孚等奏曰臣聞禮典軌度豐殺隨時虞夏商周咸不相襲蓋有由也大普紹承漢魏有革有因期於足以興化致治而已故未皆得返情素同規上古也陛下既已俯遵漢魏降喪之典以濟時務而躬蹈大孝情過乎哀素冠深衣降席撤膳雖武丁行之於殷世曾閔履之於布衣未足以喻方今荆蠻未夷庶政未乂萬機事殷動勞神慮豈遑全遂聖㫖以從至情加歲時變易期運忽過山陵彌逺攀慕永絶臣等以為陛下宜回慮割情以康時濟治輒敕御府易服內省改坐大官復膳諸所施行皆如舊制詔曰每感念幽𡨕而不得終苴絰於草土以存此痛況當食稻衣錦誠佹然激切其心非所以相解也吾本諸生家傳禮來久何心一旦使易此情於所天相從巳多可試省孔子答宰我之言無事紛紜也言及悲剝奈何奈何孚等重奏伏讀明詔感以悲懷輒思仲尼所以抑宰我之問聖思所以不能已己甚深甚篤然今水旱干戈未戢武事未偃萬機至重天下至衆陛下以萬乘之尊履布衣之禮服粗席藁水飲疏食殷憂內盈毁悴外表而躬萬機坐而待旦降心接下昃不遑食所以勞力者如斯之甚是以臣等悚息不寧誠懼神氣用損以疚大事輒敕有司改坐復常率由舊典惟陛下察納愚欵以慰皇太后之心又詔曰重覽奏議益以悲剝不能自勝奈何奈何三年之喪自古達禮誠聖人稱心立𠂻明恕而行也神靈日逺無所告訴雖薄於情食㫖服美朕更所不堪也不宜反覆重傷其心言用斷絶奈何奈何帝遂以此禮終三年後居太后之喪亦如之武帝泰始二年八月詔書曰此上旬先帝棄天下日也便以周年吾煢煢當復何時一得叙人子情邪思慕煩毒欲詣陵瞻侍以盡哀憤主者奏行備太宰司馬孚尚書令裴秀尚書僕射武陔等奏曰陛下至孝蒸蒸哀思罔極衰麻雖除毀悴過禮疏食粗服有損神和今雖秋節尚有餘暑謁見山陵悲感摧傷群下竊用悚息平議以為宜逺體降抑聖情以慰萬國詔曰孤煢忽爾日月已周痛慕摧感永無逮及欲奉瞻山陵以叙哀憤體氣自佳耳又已涼便當行不得如所奏也主者便具行備又詔曰昔者哀適三十日便為梓宫所棄遂離衰絰感痛豈可勝言顧漢文不使天下盡哀亦先帝至謙之志是以自割不以副諸君子有三年之愛而身體廓然當見山陵何心而無服其以衰絰行孚等重奏臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之于後陛下以社稷宗廟之重萬方億兆之故既從權制釋降衰麻羣臣庶僚吉服今者謁陵哀慕若加衰絰近臣期服當復受制進退無當不敢奉詔詔曰亦知不在此麻布耳然人子情思為欲全哀喪之物在身蓋近情也羣臣自當案舊制期服之義非先帝意也孚等又奏臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克己俯就權制既除衰麻而行心喪之禮今復制服義無所依若君服而臣不服雖先帝厚恩亦未之敢安也參量平議宜如前奏臣等敢固以請詔曰患情不能企及耳衣服何有諸君勤勤之至豈茍相違四年皇太后崩有司奏前代故事倚廬中施白縑帳蓐素牀以布巾裹凷草軺輦板輿油犢車皆施縑裹詔不聽但令以布衣車而已其餘居喪之制一如禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著衰服既虞而除其內外官寮皆就朝晡臨位御除服訖各還所次除衰服詔曰夫三年之喪天下之達禮也受終身之愛而無數年之報奈何葬而便即吉情所不忍也有司又奏世有險易道有汙隆所遇之時異誠有由然非忽禮也方今戎馬未散王事至殷更須聽斷以熙庶績昔周康王始登翌室猶戴冕臨朝降於漢魏既葬除釋諒暗之禮自逺代而廢矣唯陛下割髙宗之制從當時之宜敢固以請詔曰攬省奏事益增感剝夫三年之喪所以盡情致禮葬已便除所不堪也當叙吾哀懷言用斷絶奈何奈何有司又固請詔曰不能篤孝勿以毁傷為憂也誠知衣服末事耳然今思存草土率常以吉奪之乃所以重傷至心非見念也每代禮典質文皆不同此身何為限以近制使達喪闕然乎羣臣又固請帝流涕久之乃許十年武元楊皇后崩及將遷于峻陽陵依舊制既葬帝及羣臣除喪即吉先是尚書祠部奏從博士張靖議皇太子亦從制俱釋服博士陳逵議以為今制所依蓋漢帝權制興於有事非禮之正皇太子無有國事自宜終服有詔吏詳議尚書杜預以為古者天子諸侯三年之喪始同齊斬既葬除喪服諒暗以居心喪終制不與士庶同禮漢氏承秦天下為天子修服三年漢文帝見其下不可久行而不知古制更以意制祥禫除喪即吉魏氏直以訖葬為莭嗣君皆不復諒暗終制學者非之久矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月嗣君茍若此則天子羣臣皆不得除喪雖志在居篤更通而不行至今世主皆從漢文輕典由處制者非制也今皇太子與尊同體宜復古典卒哭除衰以諒暗終制於義既不應不除又無取於漢文乃所以篤喪禮也於是尚書僕射盧欽尚書魏舒問杜預證據所依預云傳稱三年之喪自天子逹此謂天子絶朞唯有三年喪也非謂居喪衰服三年與士庶同也故后世子之喪而叔向稱有三年之喪二也周公不言髙宗服喪三年而云諒暗三年此釋服心喪之文也叔向不譏景王除喪而譏其燕樂已早明既葬應除而違諒暗之莭也春秋晉侯享諸侯子産相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔生不及哀此皆既葬除服諒暗之證先儒舊說往往亦見學者未之思耳喪服諸侯為天子亦斬衰豈可終喪三年邪上考七代未知王者君臣上下衰麻三年者諸下推將來恐百世之主其理一也非必不能乃事勢不得故知聖人不虛設不行之制仲尼曰禮所損益雖百世可知此之謂也於是欽舒從之遂命預造議奏曰禮官參議博士張靖等議以為孝文權制三十六日之服以日易月道有汚隆禮不得全皇太子亦宜割情除服博士陳逵等議以為三年之喪人子所以自盡故聖人制禮自上達下是以今制將吏諸遭父母喪皆假寧二十五月敦崇孝道所以風化天下皇太子至孝著於內而衰服除於外非禮所謂稱情者也宜其不除臣欽臣舒臣預謹按靖逵等議各見所學之一端未統帝者居喪古今之通禮也自上及下尊卑貴賤物有其宜故禮有以多為貴者有以少為貴者有以髙為貴者有以下為貴者唯其稱也不然則本末不經行之不逺天子之與羣臣雖哀樂之情若一而所居之宜實異故禮不得同易曰上古之世喪期無數虞書稱三載四海遏密八音其後無文至周公旦乃稱殷之髙宗諒暗三年不言其傳曰諒信也暗默也下逮五百餘歲而子張疑之以問仲尼仲尼答云何必髙宗古之人皆然君薨百官總已以聽於冢宰三年周景王有后世子之喪既葬除服而樂晉叔向譏之曰三年之喪雖貴遂服禮也王雖弗遂宴樂已早亦非禮也此皆天子喪事見於古文者也稱髙宗不云服喪三年而云諒暗三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒暗之節也堯崩舜諒暗三年故稱遏密八音由是言之天子居喪齊斬之制菲杖絰帶當遂其服既葬而除諒暗以終之三年無改父之道故百官總已聽於冡宰喪服已除故稱不言之美明不復寢苫枕凷以荒大政也禮記三年之喪自天子逹又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之莭同於凡人心喪之禮終於三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒暗之制至令髙宗擅名於往代子張致疑於當時此乃賢聖所以為譏非譏天子不以服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之除雖不合髙宗諒暗之義近於古典故傳之後嗣于時預修陵廟故斂葬得在浹辰之內因以定制近至明帝存無陵寢五旬乃葬安在三十六日此當時經學疏略不師前聖之病也魏氏革命以既葬為節合於古典然不垂心諒暗同譏前代自泰始開元陛下追尊諒暗之禮慎終居篤允臻古制超絶於殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害己而削其籍今其存者惟士喪一篇戴勝之記雜錯其間亦難以取正天子之位至尊萬機之政至大羣臣之衆至廣不同之於凡人故大行既葬祔祭于廟則因疏而除之已不除則羣臣莫敢除故屈己以除之而諒暗以終制天下之人皆曰我王之仁也屈己以從宜皆曰我王之孝也既除而心喪我王猶若是之篤也凡等臣子亦焉得不自勉以崇禮此乃聖制移風易俗之本髙宗所以致雍熙豈惟衰裳而已哉若如難者更以權制自居疑於屈伸厭降欲以職事為斷則父在為母朞父卒三年此以至親屈於至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆同不敢獨也禮諸子之職掌國子之倅國有事則帥國子而致之太子唯所用之傳曰君行則守有守則從從曰撫軍守曰監國不無事矣喪服母為長子妻為夫妾為主皆三年內宫之主可謂無事揆度漢制孝文之喪紅禫既畢孝景即吉於未央薄后竇后必不得齊斬於别宫此可知也況皇太子配二至尊與國為體固宜逺遵古禮近同時制屈除以寬諸下協一代之成典君子之於禮有直而行曲而報有經而等有順而去之存諸內而已禮云非玉帛之謂喪云唯衰麻之謂乎此既臣等所經制大義且即實近言亦有不安今皇太子至孝蒸蒸發於自然號咷之慕匍匐殯宫大行既奠往而不反必想像平故倣徨寢殿若不變從諒暗則東宫臣僕義不釋服此為永福宫屬當獨衰麻從事出入殿省亦難以繼今將吏雖䝉同二十五月之事寧至於大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而況於皇太子臣等以為皇太子宜如前奏除服諒暗制於是太子遂以厭降之議從國制除衰麻諒暗終制惠帝初秦國郎中令李含領始平中正秦王柬薨含依臺儀葬訖除喪尚書趙浚有內寵疾含不事已遂奏含不應除喪本州大中正傅祗以名義貶含中丞傅咸上表理含曰臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風雖以此不能協和流俗然其名行峻厲不可得掩二郡並舉孝廉異行尚書郭奕臨州含寒門少年而奕超為别駕太保衛瓘辟含為掾每語臣曰李世容當為晉匪躬之臣秦王之薨悲動感人百僚㑹喪皆所目見而今以含俯就王制謂之背戚居榮奪其中正天王之朝既葬不除藩國之喪既葬而除藩國欲同不除乃當責引尊準卑非所宜言耳今天朝告於上欲令藩國服於下此為藩國之義隆而天朝之禮薄也又云諸王公皆終喪禮寧盡乃叙明以喪制宜隆務在敦重也夫寧盡乃叙明以哀其病耳異於天朝制使終喪未見斯文國既葬而除既除而祔爰自漢魏迄於聖晉文皇升遐武帝崩殂世祖過哀陛下毀頓銜疚諒暗以終三年率土臣妾豈無攀慕遂服之心實以國制不可而踰故於既葬不敢不除天王之喪釋除於上藩國之臣獨遂於下此不可安復以秦王無後含應為喪主而喪既除而祔則應吉祭因曰王未有廟主不應除服秦王始封無所連祔靈主所居即便為廟不問國制云何而以無廟為貶以含今日之所行移博士使案禮文必也放勛之殂遏密三載世祖之崩數旬即吉引古繩今闔世有貶何但李含不應除服今也無貶王制故也聖上諒暗哀聲不輒股肱近侍猶宜心喪不宜便行婚娶歡樂之事而莫云者豈不以大制不可而曲邪且前以含有王喪上為差代尚書敕王葬日在近葬訖含應攝職不聽差代葬訖含猶躊躇司徒屢罰訪問踧含攝職而隨擊之此為臺敕府符陷含於惡若謂臺府為傷教義則當據正不正符敕唯含是貶含之困躓尚足惜乎國制不可偏耳又自以隴西人雖户屬始平非所綜悉自初見使為中正反覆言辭說非始平國人不宜為中正後為郎中令又自以選官引臺府為比以讓常山太守蘇韶辭意懇切形於文墨含之固讓乃在未薨之前葬後躊躇窮於對罰而攝職耳臣從弟祗為州都督意在欲隆風教議含已過不良之人遂相扇動冀挾名義法外致案足有所邀中正龐騰便割含品臣無祁大夫之德見含為騰所侮謹表以聞乞朝以時博議無令騰得妄弄刀筆帝不從太安元年三月皇太孫尚薨有司奏御服齊衰朞詔通議散騎常侍謝衡以為諸侯之太子誓與未誓尊卑體殊喪服亡為嫡子長殤謂未誓也三誓則不殤也中書令卞粹曰太子始生故已尊重不待命誓若行議已誓不殤則元服之子當斬衰三年未誓而殤則雖十九當大功九月誓與未誓其為升降也微斬與大功其為輕重也逺而令注云諸侯不降嫡殤重嫌於無以大功為重嫡之服大功為重嫡之服則雖誓無復有三年之理明矣男能奉衛社稷女能奉婦道各以可成之年而有已成之事故可無殤非孩齓之謂也謂殤後者尊之如父猶無所加而止殤服恐以天子之尊為無服之殤行成人之制邪凡諸宜重之殤皆士大夫不加服而令至尊獨居其重未之前聞也祕書監摯虞議曰太子初生舉以成人之禮則殤理除矣太孫亦體君傳由位成而服全非以年也天子無服殤之儀絶朞故也於是御史以上皆服齊衰東晉元帝時琅琊王裒薨郎中令丁潭上疏求行終喪禮曰在三之義禮有逹制近代已來㦯隨時降殺宜一匡革以敦於後轍案令文王侯之喪官僚服斬既葬而除今國無繼統喪庭無主臣實陋賤不足當重謬荷首任禮宜終喪詔下博士議國子祭酒杜夷議古者諒暗三年不言下及周世稅衰效命春秋之時天子諸侯既葬而除此所謂三代損益禮有不同故三年之喪由此而廢然則漢文之詔合於隨時凡有國者皆宜同也非唯施於帝王而已按禮殤與無後降於成人有後既葬而除今不得以無後之故而獨不除也愚以丁郎中應除衰麻自宜主祭以終三年太常賀循議禮天子諸侯俱以至尊臨人上下之義君臣之禮自古以來其例一也故禮盛則並全其重禮殺則從其降春秋之事天子諸侯不行三年至於臣為君服亦宜以君為莭未有君除而臣服君服而臣除者今法令諸侯卿相官屬為君服斬衰既葬而除以令文言之明諸侯不以三年之喪與天子同可知也君若遂服則臣輕重無應除者也若當皆除無一人獨重之文禮有攝主而無攝重故大功之親主人喪者必為之再祭練祥以大功之服主人三年喪者也苟謂諸侯與天子同制國有嗣王自不全服而人主居喪素服主祭三年不攝吉事以尊令制若當逺迹三代今復舊典不依法令者則侯之服貴賤一例亦不得唯一人論於是詔使除服心喪三年琅邪悼王煥年二歲薨元帝悼念無巳將葬以煥既封列國加以成人之禮詔立凶門柏歷備吉凶儀服營起陵園功役甚衆琅邪國右常侍㑹稽孫霄上疏曰臣聞法度典制先王所重吉凶之禮事貴不過是以世豐不使奢放凶荒必務約殺朝聘嘉㑹足以展庠序之儀殯葬送終務以稱哀榮之情上無奢泰之謬下無匱竭之困故華元厚葬君子謂之不臣嬴博至儉仲尼稱其合禮明傷財害時古人之所譏莭省簡約聖賢之所嘉也語曰上之化下如風靡草京邑翼翼四方所則明教化法制不可不慎也陛下龍飛踐阼興微濟弊聖懷勞謙務從簡儉憲章舊制猶欲莭省禮典所無而反尚飾此臣愚情竊所不安也棺槨輿服旒翣之屬禮典舊制不可廢闕凶門柏歷禮典所無天晴可不用遇雨則無益此至宜莭省者也若琅邪一國一時所用不為大費臣在機近義所不言今天臺所居王公百僚聚在都輦凡有喪事皆當供給材木百數竹簿千計凶門兩表衣以細竹及材價直既貴又非表凶哀之宜如此過飾宜從粗簡又案禮記國君之葬棺槨之間容柷大夫容壺士容甒以壺甒為差則柷財大於壺明矣槨周於棺槨不甚大也語曰葬者藏也藏欲其深而固也槨大則難為堅固無益於送終而有損於財力凶荒殺禮經國常典既減殺而猶過舊此為國之所厚惜也又禮將葬遷柩於廟袒而行及墓即窆葬之日即反哭而虞如此則柩不宿於墓上也聖人非不哀親之在土而無情於邱墓蓋以墓非安神之所故修虞於殯宫始則營草宫於山陵遷神柩於墓側又非典也非禮之事不可以訓萬國臣至愚至賤忽求革前之非可謂狂瞽不知忌諱然今天下至弊自古所希宗廟社稷逺託江表半州之地凋殘以甚加之荒旱百姓困瘁非但不足死亡是懼此乃陛下至仁之所矜愍可憂之至重也正是匡矯末俗改張易調之時而猶且竭已罷之人營無益之事殫己困之財修無用之費此固臣之所不敢安也今琅邪之於天下國之最大若割損非禮之事務遵古典上以彰聖朝簡易之至化下以表萬世無窮之規則此芻蕘之言有補萬一塵露之微有增山海元帝時孝懷太子為敵所害始奉諱有司奏曰天子三朝舉哀羣臣一哭而已司空王導以為皇太子副二宸極普天有情宜同三朝之哀從之明帝崩鍾雅遷御史中丞時國喪未朞而尚書梅陶私奏女妓雅劾奏曰臣聞放勛之徂八音遏密雖在凡庶猶能三載自兹以來歷代所同肅祖明皇帝崩背萬國當朞來月聖主縞素泣血臨朝百僚慘愴動無歡容陶無大臣忠慕之莭家庭侈靡聲妓紛葩絲竹之音流聞衢路宜加放黜以整王憲請下司徒論正清議康帝時汝南王統江夏公衛崇並為庶母制服三年尚書令顧和奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺莭文著於周典按汝南王統為庶母居廬服重江夏公衛崇本由踈屬開國之緒近喪所生復行重制違冒禮度肆其私情閭閻許其過厚談者莫以為非則政道陵遲由乎禮廢憲章頽替始於容違若弗紏正無以齊物皆可下太常奪服若不祗王命應加貶黜詔從之孝武帝太元元年崇憲太后褚氏崩后於帝為從嫂或疑其服太學博士徐恭議資父事君而敬同又禮傳其夫屬乎父道者妻皆母道也則夫屬君道妻亦后道矣服后宜以資母之義魯譏逆祀以明尊尊今上躬奉康穆哀皇及靖后之祀致敬同於所天豈可敬之以君道而服廢於本親謂應服齊衰朞於是帝制朞服十五年淑媛陳氏卒皇太子所生也有司參詳母以子貴贈淑媛為夫人置家令典喪事太子前衛率徐邈議喪服傳稱與尊者為體則不服其私親又君父所不服子亦不敢服故王公妾子服其所生母練冠麻衣既葬而除非五服之常則謂之無服從之十七年太常車𦙍上言曰謹案喪服禮經庶子為母緦麻三月傳曰何以緦麻以尊者為體不敢服其私親也此經傳之明文聖賢之格言而自頃開國公侯至於卿士庶子為後各肆私情服其庶母同之於嫡此末俗之弊溺情傷教縱而不革則流遁忘反矣且夫尊尊親親雖禮之大本然厭親於尊由來尚矣禮記曰為父後出母無服也者不祭故也又禮天子父母之喪未葬越紼而祭天地社稷斯皆崇嚴至敬不敢以私廢尊也今身承祖宗之重而以庶母之私廢蒸嘗之事五廟缺祀由一妾之終求之情禮失莫大焉舉世皆然莫之裁貶就心不同而事不敢異故正禮遂頽而習非成俗此國風所以思古小雅所以悲歎當今九服漸寧王化惟新誠宜崇明禮訓以一風俗請臺省考修經典式明王度詔不答安帝隆安四年太皇太后李氏崩尚書祠部郎徐廣議曰太皇太后名位允正體同皇極理制備盡情禮彌申春秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號昭公服三年之喪子於父之所生體尊義重且禮祖不厭孫宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰朞永安皇后無服但一舉哀百官亦一朞詔可宋髙祖永初二年黃門侍郎王淮之上奏曰鄭𤣥注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來唯晉朝施用縉紳之士多遵𤣥義夫先王制禮以大順羣心喪也寧戚著自前訓今大宋開泰品物遂理愚謂宜同即物情以𤣥義為制朝野一禮則家無殊俗從之文帝元嘉二年帝既免喪司徒徐羡之與左光祿大夫傅亮上表歸政曰臣聞元首司契運樞成務臣道代終事盡宣翼冕旒之道理絶於上皇拱已之事不行於中古故髙宗不言以三齡為斷冡宰聽政以再朞為莭百王以降罔或不然陛下聖德紹興負荷洪業億兆顒顒思陶盛化而聖㫖謙挹委成羣司自大禮告終鑽燧三改大明佇照逺邇傾屬臣等雖率誠屢聞未能仰感敢藉品物之情謹因蒼生之志伏望陛下逺存周文日昃之道近思皇室締構之艱時攬萬機躬親朝政廣闢四聰博詢庶業則雍熙可臻有生幸甚羡之等重奏曰近陳寫下情言為心罄奉被還詔鑒許未回豈惟愚臣秉心有在詢之朝野人無異議何者形風四方實繫王德一國之事本之一人雖世代不同時殊風異至於主運臣贊古今一揆未有渾心委任而休明可期此之非宜布自遐邇臣等荷遇二世休戚以均情為國至豈容順默重披丹心冒昧以請上猶辭羡之等又固陳曰比表披陳辭誠俱盡詔㫖沖逺未垂聽納三復屏營伏增憂歎臣聞克隆先構幹蠱之盛業昧旦丕顯帝王之髙義自皇宋創運英聖有造殷憂未闕艱患仍纏賴天命有底聖明承業時屯國故猶在民心太山之安未易可保昏明隆替繫在聖躬斯誠周詩夙興之辰殷王待旦之日豈得無為拱已復𤣥古之風逡巡虛挹徇匹夫之事伏以宗廟為重百姓為心𢎞大業以嗣先軌隆聖道以增前烈愚瞽所獻情盡於此上乃許之十七年元皇后崩皇太子心喪三年禮心喪者有禫無禫禮無成文世或兩行皇太子心喪畢詔使博議有司奏喪禮有禫以祥變有漸不宜便除即吉故其聞服以綅縞也心喪已經十三月大祥十五月禫變除禮畢餘一朞不應復有禫宣下以為永制詔可二十三年七月白衣領御史中丞何承天奏曰尚書刺海鹽公主所生母蔣美人喪海鹽公主先離婚今應成服撰儀注參詳宜下二學禮官博士議公主所服輕重太學博士顧雅議今既咸用士禮便宜同齊衰削杖布帶踈履朞禮畢心喪三年博士周野王議又云今諸王公主咸用士禮譙王衡陽王為所生太妃皆居重服則公主情禮亦宜家中朞服為允其博士庾邃之顔測殷明王淵之四人同雅議何惔王羅雲二人同野王議如所上臺按今之諸王雖行士禮是施於傍親及自己以下至於為帝王所厭猶一依古典又永初三年九月符修儀亡廣德三主以餘尊所厭猶服大功海鹽公主體自宸極當上厭至尊豈得遂服臺據經傳正文并引事例依源責失而博士顧雅周野王等捍不肻怗方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於末戚顧獨貶於所生是申其所輕奪其所重奪其所重豈緣情之謂臺伏尋聖朝受終於晉凡所施行莫不上稽禮文兼用晉事又太元中晉恭帝時為皇子服其所生陳氏練冠縓緣此則前代施行故事謹依禮文者也又廣德三公主為所生母符修儀服大功此先君餘尊之所廢者也元嘉十三年第七皇子不服曹媫妤止於麻衣此厭乎至尊者也博士既不據古又不依今背違施行見事而多作浮辭自衛乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮不少今世博士雖復引此諸條無救於失又詰臺云蕃國得遂其私情此義出何經記臣按南譙衡陽太妃並受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者由有厭而然也臺察重更責失制不得過十日而復不酬答既被催攝二三日甫輸怗辭雖理屈事窮猶聞義耻服臣聞喪紀有制禮之大經降殺攸宜家國舊典古之諸侯衆子猶以尊厭況在王室而欲同之士庶此之僻謬不俟言而顯太常統寺曾不研却所謂同乎失者亦未得之宜加裁正𢎞明國典謹案太學博士顧雅國子助教周野王博士王羅雲顔測殷明何惔王淵之前博士遷員外散騎侍郎庾邃之等咸䝉抽飾備位丞疑既不謹守舊文又不審據前准遂上背經典下違故事率意妄作自造禮章太常臣敬叔位居宗伯問禮所司謄述往反了無研却混同兹失亦宜及咎請以見事並免今所居官解野王領國子助教雅野王初立議乖舛中執捍愆失末違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁錮五年詔敬叔白衣領職餘如奏孝武帝孝建元年有司奏故第十六皇弟休倩薨夭年始及殤追贈諡東平沖王服制未有成准輒下禮官羣議太學博士陸澄議案禮有成人道則不為殤今既追胙土宇逺崇封秩圭黻偹典成孰大焉典文式昭殤名去矣夫典文垂式元服表身猶以免孺子之制全丈夫之義安有名頒爵首而可服以殤禮有司尋澄議無明證却使秉正更上澄重議竊謂贈之為義所追加名器故贈公者便成公贈卿者便成卿贈之以王得不為王乎然則有在生而封或既沒而爵俱受帝命不為吉凶殊典同備文物豈以存亡異數今璽策咸秩是成人之禮羣后臨哀非下殤之制若喪用成人親以殤服末學含疑未之或辨敢求詳衷如所稱左丞臣芉希參議尋澄議既無畫然前例則不合准據按禮子不殤父臣不殤君君父至尊臣子恩重不得以幼年而降又曰尊同則服其親服推此文者旁親自宜服殤所不殤者唯施臣子而已詔可又湘東國刺稱國太妃以去三十年閏六月二十八日薨未詳周忌當在六月為取七月勒禮官議正博士邱邁之議按吳商議閏月亡者應以本正之月為忌謂正閏各有所執商議為允宜以今六月為忌左僕射建平王宏謂邁之議不可准據按晉世及皇代以來閏月亡者以閏之後月祥宜以來七月為祥忌及大明元年二月有司又奏太常鄱陽哀王去年閏三月十八日薨今為何月末祥除下禮官議正博士傅休議尋三禮喪遇閏月數者數閏嵗數者沒閏閏在朞內故也鄱陽哀王去年閏三月薨月次莭物則定是四月之分應以今年四月末為祥晉元明二帝並以閏二月崩以閏後月祥先代成准則是今比太常丞庾蔚之議禮正月存親故有忌日之感四時既已變人情亦已衰故有二祥之殺是則祥忌皆以同月為議而閏亡者明年必無其月不可以無其月而不祥忌故必宜用閏所附之月閏月附正公羊明議故班固以閏九月為後九月月名既不殊天時亦不異若用閏之後月則春夏永革莭候亦舛設有人以閏臘月亡者若用閏後月為祥忌則祥忌應在後年正月祥涉三載既失周朞之議冬亡而春忌又乖致感之本譬人年末三十日亡明年末月小若以去年二十九日親尚存則應用後年正朝為忌此必不然則閏亡可知也通關並同蔚之議三月末祥有司奏雲杜國解稱國子擅和之所生親王求除太夫人檢無國子除太夫人先例法又無科下禮官議正太學博士孫豁之議春秋母以子貴王雖為妾是和之所生按五等之例鄭伯許男同號夫人國子體例王合如國所生太常丞庾蔚之議母以子貴雖春秋明義古今異制因革不同自頃代以來所生䝉榮唯有諸王既是王者之嬪御故宜見尊於蕃國若功髙勳重列為公侯亦有拜太夫人之禮凡此皆朝恩曲降非國之所求子男妾母未有前比祠部郎中朱膺之議以為子不得爵父母而春秋有母以子貴當謂傳國君母本先公嬪媵所因藉有由故也始封之身所不得同若殊績重勳恩所特錫時或有之不由司存所議參議以蔚之為允詔可大明二年正月有司奏故右光祿大夫王偃喪依格皇后服朞心喪三年應再周來二月晦檢元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉於時猶心禫素衣二十七月乃除二事不同領曹郎朱膺之議詳尋禮文心喪不應有禫皇代考驗已為定制元嘉季年􅍔難深酷聖心天至喪紀過哀是以出適公主還同在室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉以文帝元嘉十五年皇太子妃祖父右光祿大夫殷和喪變除之禮儀同皇后六月有司奏凡侯伯子男世子喪無嗣求進次息為世子檢無其例下禮官議正博士孫武議按晉濟北侯荀朂長子連卒以次子輯拜世子先代成準宜為今例博士傅郁議禮記微子立衍商禮斯行仲子舍孫姬典攸貶歷代遵循靡替于舊今胙土之君在而世子卒厥嗣未育非孫之謂愚以為次子有子自宜紹為世孫若其未也無容逺搜輕屬承綱繼體傳之有由父在立子允稱情典曹即諸葛雅之議按春秋傳云世子死有母弟則弟無則立長年均擇賢義均則卜古之制也今長子早卒無嗣進立次息以為世子取諸左氏理義無違又孫武所據晉濟比侯荀朂長子卒立次子亦近代成例據文採比竊所允安謂宜開許以為永制參議為允詔可四年九月有司奏陳留國王曹䖍季長兄䖍嗣早卒䖍季襲封之後生子銑以繼䖍嗣今依例應拜世子未詳應以銑為世子為應立次子鍇太學博士王溫之江長議並為應以銑為正嗣太常陸澄議立鍇右丞徐爰議謂禮後大宗以其不可乏祀諸侯世及春秋成美䖍嗣承家傳爵身為國王雖薨沒無子猶列昭穆立後之日便應即纂國統于時既無承繼䖍嗣以次襲紹䖍嗣既列廟享故自與出數而遷豈容蒸嘗無闕橫取他子為嗣為人𦙍嗣又應恭祀先父按禮文公子不得禰諸侯䖍嗣無緣降廟既寢銑本長息宜還為䖍季世子詔如爰議五年閏月有司奏依禮皇太后服太子妃小功五月皇后大功九月右丞徐爰參議宫人從服者若二御哭臨應著衰時從服者悉著衰非其日如常儀太子既有妃朞服詔見之日還著公服若至尊非哭臨日幸東宫太子見亦如之宫臣見至尊皆著朱衣有司又奏王太子妃薨至尊皇后並服大功九月皇太后小功五月未詳二御何時當得作鼓吹及樂博士司馬興之議按禮齊衰大功之喪三月不從政今臨軒拜授則人君之大典今古既異賖促不同愚謂皇太子妃附廟之後便可臨軒作樂及鼓吹右丞徐爰議皇太子妃雖未山塋臨軒拜官舊不為礙樟棺在殯應懸而不作祔後三御樂宜使學官擬禮上興之又議按禮大功至則辟琴瑟誠無自奏之理但王者體大理絶凡庶故漢文既葬悉皆復吉唯縣而不樂以此表哀今准其輕重侔其降殺則下流大功不容撤樂終服夫金石賔享之禮簫管警塗之衛實人君之盛典當陽之威飾固亦不可久廢於朝又禮無天王服嫡婦之文直後學推貴嫡之義耳既已制服成月虛懸終窆亦足以甄崇家正標明禮歸矣爰參議皇太子朞服內不合作樂及鼓吹七月有司奏故永陽縣開國侯劉叔子天喪年始四嵗傍親服制有疑太學博士虞領軍長史周景逺司馬朱膺之前太常丞庾蔚之等議並云宜同成人之服東平沖王服殤實由追贈異於已受茅土博士司馬興之議應同東平殤服左丞荀萬秋等參議南面君國繼體承家雖則佩觽未關成人得君父名也不容服殤故云臣不以殤君子不殤父推此則知傍親故依殤制東平沖王已經前議若升仕朝列則為大成故鄱陽哀王追贈太常親戚不降愚謂下殤以上身居封爵宜同成人年在無服之殤以登官為斷今永陽國臣自應全服王於旁親宜從殤禮詔景逺議為允十二年十一月有司奏興平國解稱國子袁愍孫母王氏應除太夫人檢無國子除太夫人例下禮官議正太學博士司馬興之議按禮下國卿大夫之妻皆命天子以斯而推則子男之母不容獨異博士程彥議以為五等雖差而承家事等公侯之母崇號得崇子男於親尊秩宜顯故春秋之義母以子貴固知從子尊與國均也彥參議以興之議為允除王氏為興平縣開國子太夫人詔可明帝泰豫元年後廢帝即位崇所生陳貴妃為皇太妃有司奏皇太妃位亞尊極未詳國親舉哀格當一同皇太后為有降異乂於本親朞以下當猶服與不前曹郎王燮之議按喪服傳妾服君之黨得與女君同如此皇太妃服宗與太后無異但太后既以尊降無服太妃儀不應殊故悉不服也計本情舉哀其禮不異又禮諸侯絶朞皇太后雖云不居尊極不容輕於諸侯謂本親朞以下一無所服有慘自宜舉哀親踈二儀準之太后兼太常丞司馬燮之議禮妾服君之庶子及女君之黨皆謂大夫士耳妾名雖總而班有貴賤三夫人九嬪位視公卿大夫猶有貴妾而況天子諸侯之妾為他妾之子無服既不服他妾之子豈容服君及女君餘親況皇太后妃貴亞相極禮絶羣后崇輝盛典有踰東儲尚不服朞太妃豈應有異若本親有慘舉哀之儀宜仰則太后參議以燮之議為允太妃於國親無服故宜緣情為諸王公主於至尊是朞服者及其太妃王妃三夫人九嬪各舉哀後廢帝元徽二年七月有司奏第七皇弟訓養母鄭修容喪未詳服制下禮官正議太學博士周山文議曰按庶母慈已者小功五月鄭𤣥云其使養之命不為母子亦服庶母慈己之服愚謂第七皇弟宜從小功之制參議並同漢魏廢帝喪親三年之制而魏世為舊君服三年者至普秦始四年尚書何禎奏故辟舉綱紀吏不計違適皆反服舊君齊衰三月於是詔書下其奏所適無貴賤悉同依古典歷代名臣奏議卷一百二十一
