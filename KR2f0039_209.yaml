body:
  text: 歷代名臣奏議卷二百九明楊士竒等撰法令宋武帝時司徒王𢎞與八座丞郎上疏曰同位犯法無士人不罪之科然每至詰謫輒有請訴若垂恩宥則法廢不可行依事糾責則物以為苦怨宜更為其制使得憂苦之衷也又主守偷五匹常偷四十匹並加大辟議者咸以為重宜進主偷十匹常偷五十匹死四十匹降以補兵既得小寬民命亦足以有懲也想各言所懷左丞江奧議曰士人犯盜贓不及棄市者刑竟自在贓汙淫盜之目清議終身經赦不原當之者足以塞愆聞之者足以鑒誡若復雷同羣小謫以兵役愚謂為苦符伍雖比屋鄰居至于士庶之際實自天隔舍藏之罪無以相關奴客與符伍交接有所藏蔽可以得知是以罪及奴客自是客身犯愆非代郎主受罪也如其無奴則不應坐右丞孔默之議曰君子小人既雜為符伍不得以相檢為義士庶雖殊而理有聞察譬百司居上所以下不必躬親而後同坐是故犯違之日理自關今罪其養子典討者蓋義存戮僕如此則無奴之室豈得宴安但既云復士宜令輸贖常盜四十匹主守五匹降死補兵雖大存寬惠以紓民命然官及二千石及失節士大夫時有犯者罪乃可戮恐不可以補兵也謂此制可施小人士人自還用舊律尚書王淮之議曰昔為山隂令士人在伍謂之押符同伍有愆得不及坐士人有罪符伍糾之此非士庶殊制實使即刑當罪耳夫束修之胄與小人隔絶防檢無方宜及不逞之士事接羣細既同符伍故使糾之于時行此非唯一處左丞議奴客與鄰伍相關可得檢察符中有犯使及刑坐即事而求有乖實理有奴客者類多使役東西分散住家者少其有停者左右驅馳動止所須出門甚寡典計者在家十無其一奴客坐伍濫刑必衆恐非立法當罪本㫖右丞議士人犯偷不及大辟者宥補兵雖欲𢎞士懼無以懲邪乘理則君子違之則小人制嚴于上猶冒犯之況其宥科犯者或衆使畏法革心乃所以大宥不免士庶異制意所不同殿中郎謝元議謂事必先正其本然後其末可言本所以押士大夫于符伍者將以檢小人邪為使受檢於小人邪案左丞議士庶天隔則士無知庶之由以不知而押之於伍則是受檢于小人也然則小人有罪士人無事僕𨽻何罪而令坐之若以實相交關貴其聞察則意有未因何者名實殊章公私異令奴不押符是無名也民之資財是私賤也以私賤無名之人豫公家有實之任公私混淆名實非允由此而言謂不宜坐還從其主于事為宜無奴之士不在此例若士人本檢小人則小人有過已應獲罪而其奴則義歸戮僕然則無奴之士未合宴安使之輸贖於事非繆二科所附惟制之本耳此自是辨章二本欲使各從其分至于求之管見宜附前科區别士庶于義為美盜制按左丞議士人既終不為兵革幸可同寬宥之惠不必依舊律于議咸允吏部郎何尚之議曰按孔右丞議士人坐符伍為􅓧有奴罪奴無奴輸贖既許士庶緬隔則聞察自難不宜以難知之事定以必知之法夫有奴不賢無奴不必不賢今多僮者傲然於王憲無僕者怵迫於時網是為恩之所霑恆在程卓法之所設必加顔原求之鄙懷竊所未愜謝元謂奴不隨主于名分不明誠是有理然奴僕實與閭里相關今都不問恐有所失意同左丞議𢎞議曰尋律令既不分别士庶又士人坐同伍罹謫者無處無之多為時恩所宥故不盡親謫耳吳及義興適有許陸之徒以同符合給二千石論啓丹書己未問㑹稽士人云十數年前亦有四族坐此被責以特恩獲停而王尚書云人舊無同伍坐所未之解恐蒞任之日偶不值此事故邪聖明御世士人誠不憂至苦然要須臨事論通上干天聽為紛擾不如近為定科使輕重有節也又尋甲符制蠲士人不傳符耳令史復除亦得如之共相押領有違糾列了無等衰非許士人閭里之外也諸議云士庶緬絶不相參知則士人犯法庶民得不知若庶民不許不知何許士人不知小民自非超然簡獨永絶塵粃者比門接棟小以為意終自聞知不必須日夕來往也右丞百司之言粗是其況如襄陵士人實與里巷關接相知情狀乃當於冠帶小民今謂之士人便無小人之坐署為小民輒受士人之罰于情於法不其頗歟且都令不及士流士流為輕則小人令使徴預其罰便事至相糾閭伍之防亦為不同謂士人可不受同伍之謫耳罪其奴客庸何傷邪無奴客可令輸贖又或無奴僮為衆所眀者官長二千石便當親臨列上依事遣判偷五匹四十匹謂應見優量者實以小吏無知臨財易昧或由疏慢事蹈重科求之于心常有可愍故欲小進匹數寬其性命耳至於官長以上荷蒙祿榮付以局任當正已明憲檢下防非而親犯科律亂法冒利五匹乃已為𢎞矣士人無私相偷四十匹理就使至此致以明罰固其宜耳並何容復加哀矜且此輩士人可殺不可謫有如諸論本意自不在此也近聞之道路聊欲共論不呼乃爾難精既衆議糾紛將不如其已若呼不應停寢謂宜集議奏聞決之聖㫖少帝景平二年羊𤣥保為宣城守先是劉式之為宣城立吏民亡叛制一人不禽符伍里吏送州作部若獲者賞位二階𤣥保以為非宜陳奏曰臣伏尋亡叛之由皆出于窮逼未有足以推存而樂為此者也今立殊制於事為苦臣聞苦不可貞懼致流弊昔龔遂譬民于亂繩緩之然後可理黃霸以寬和為用不以嚴刻為先臣愚以謂單身逃役便為盡户今一人不測坐者甚多既憚重負各為身計牽挽逃竄必致繁滋又能禽獲叛身類非謹惜既無堪能坐陵勞吏名器虛假所妨實多將階級不足供賞服勤無以自勸又尋此制施一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行一郡民罹憂患其弊將甚臣忝守所職懼難遵用致率管穴冒以陳聞文帝元嘉初㑹稽剡縣民黃初妻趙打息載妻王死亡遇赦王有父母及息男稱息女葉依法徙趙二千里外司徒右長史傅隆上議曰原夫禮律之興蓋本之自然求之情理非從天墮非從地出也父子至親分形同氣稱之于載即載之於趙雖云三世為體猶一未有能分之者也稱雖創巨痛深固無讎祖之義若稱可以殺趙趙當何以處載將父子孫祖互相殘戮懼非先王明罰咎繇立法之本㫖也向使日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代以為美談者哉舊令云殺人父母徙之二千里外不施父子孫祖明矣趙當避王朞功千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情體因親以教愛者也趙既流移載為人子何得不從載從而稱不行豈名教所許如此稱趙竟不可分趙雖內愧終身稱當沈痛沒齒孫祖之義自不得永絶事理固然也從之南齊世祖留心法令數訊囚徒詔獄官詳正舊注永明七年尚書刪定郎王植撰定律章表奏之曰臣等晉律文簡辭約㫖通大綱事之所質取斷難釋張斐杜預同注一章而生殺永殊自晉泰始以來唯斟酌參用是則吏挾威福之勢民懷不對之怨所以溫舒獻辭于失政絳侯慷慨而興歎皇運革祚道冠前王陛下紹興光開帝業下車之痛每惻上仁滿堂之悲有矜聖思爰發德音刪正刑律敕臣集定張杜二注謹礪愚蒙盡思詳撰削其煩害録其允衷取張注七百三十一條杜注七百九十一條或二家兩釋于義乃偹者又取一百七條其注相同者取一百三條集為一書凡一千五百三十二條為二十卷請付外詳校摘其違謬從之于是公卿八座參議考正舊注有輕重處竟陵王子良下意多使從輕其中朝議不能斷者制㫖平決至九年廷尉孔稚圭上表曰臣聞匠萬物者以繩墨為正馭大國者以法理為本是以古之聖王臨朝思理逺防邪萌深杜奸漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡歷登皇乘圖踐帝天地更築日月再張五禮裂而復縫六樂頺而爰緝乃發德音下明詔降恤刑之文申慎罰之典敕臣與公卿八座共刪注律謹奉聖㫖咨審司徒臣子良禀受成規創立條緒使兼監臣宋躬兼平臣王植等抄撰同異定其去取詳議八座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照𤣥覽斷自天筆始就成立律文二十卷録叙一卷凡二十一卷今以奏聞請付外施用宣下四海臣又聞老子仲尼曰古之聽獄者求所以生之今之聽獄求所以殺之與其殺不辜寧失有罪是則斷獄之職自古所難矣今律文雖定必須用之用失其平不異無律律書精細文約例廣疑似相傾故誤相亂一乖其綱枉濫橫起法吏無解既多謬僻監司不習無以相斷則法書徒明於帙裏寃魂猶結于獄中今府州郡縣千有餘獄如令一獄嵗枉一人則一年之中枉死千餘矣寃毒之死上干和氣聖明所急不可不防致此之由又非但律吏之咎列邑之宰亦亂其經或以軍勳餘力或以勞吏暮齒獷猜濁氣忍并生靈昏心狠態吞剝氓物虐理殘其命曲文被其罪寃積之興復緣斯發獄吏雖良不能為用使于公哭于邊城孝婦寃於遐外陛下雖欲宥之其已血濺九泉矣尋古之名流多有法學故釋之定國聲光漢臺元常文惠績映魏閣今之士子莫肯為業縱有習者世議所輕良由空勤永嵗不逢一朝之賞積學當年終為閭伍所蚩將恐此書永墜下走之手矣今若𢎞其爵賞開其勸慕課業宦流班習胄子挾其精究使處內局簡其貞良以居外任方嶽咸選其能邑長並擢其術則臯繇之謀指掌可致杜鄭之業鬱焉何逺然後奸邪無所逃其形惡吏不能藏其詐如身首之相驅若弦括之相接矣臣以踈短謬司大理陛下發自聖衷憂矜刑網御延奉訓逺昭民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律助教依五經例國子生有欲讀者䇿試上過髙第即便擢用使處法職以勸士流詔報從納事竟不施行後魏獻文帝詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以徒坐論糾告得尚書已下罪狀者各隨所糾官輕重而授之雍州刺史張白澤上表諌曰伏見詔書禁尚書以下受禮者刑身糾之者代職伏惟三載考績黜陟幽明斯乃不易之令軌百王之通式今之都曹古之公卿也皆翊扶萬幾贊徽百揆風化藉此而平治道由兹而穆且周之下士尚有代耕況皇朝貴仕而服勤無報豈所謂祖襲堯舜憲章文武者乎羊酒之罰若行不已臣恐奸人窺望忠臣懈節而欲使事靜民安治清務簡至于委任責成下民難辨如臣愚量請依律令舊法稽同前典班祿酬廉首去亂群常刑無赦茍能如此則升平之軌期月可望刑厝之風三年必致矣顯祖納之孝文帝謂侍臣曰百揆多途萬機事猥未周之闕卿等宜有所陳尚書中書監髙閭對曰臣伏思太皇太后十八條之令及仰尋聖朝所行事周于百揆理兼于庶務孔子至聖三年有成子産治鄭歷載乃就今聖化方宣風政驟改行之積久自然致治理之必明不患事闕又為政之道終始若一民可使由之不可使知之政令既宣若有不合於民者因民之心而改之願終成其事使至教必行臣反覆三思理畢于此不知其它但使今之法度必理必眀必行必久勝殘去殺可不逺而致髙祖曰刑法者王道之所用何者為法何者為刑施行之日何先何後閭對曰臣聞刑制立㑹軌物齊衆謂之法犯違制約致之于憲謂之刑然則法必先施刑必後著自鞭杖已上至於死罪皆謂之刑刑者成也成而不可改髙祖曰論語稱冉子退朝孔子問曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之何者是政何者是事閭對曰臣聞政者君上之所施行合于法度經國治民之屬皆謂之政臣下奉教承㫖作而行之謂之事然則天下大同風軌齊一則政出於天子王道衰則政出於諸侯君道缺則政出于大夫故詩序曰王道衰政教失則國異政家殊俗政者上之所行事者下之所奉髙祖曰若君命為政子夏為莒父宰問政此應奉命而已何得稱政尚書遊明根曰子夏宰民故得稱政帝善之宣武帝時有詔以姦吏犯罪每多逃遁因眚乃出並皆釋然自今已後犯罪不問輕重而藏竄者悉逺流若永避不出兄弟代徙尚書左僕射源懷奏曰謹案條制逃吏不在赦限竊惟聖朝之恩事異前宥諸流徙在路尚䝉旋反況有未發而仍遣邊戌按守宰犯罪逃走者衆祿潤既優尚有兹失及䝉恩宥卒然得還今獨若此等恐非均一之法如臣管執謂宜免之書奏門下以成式既班駁奏不許懷重奏曰臣以為法貴經通治尚簡要刑憲之設所以網羅罪人茍理之所偹不在繁典行之可通豈容峻制此乃古今之達政救世之恆規伏尋條制勳品已下罪發逃亡遇恩不宥仍流妻子雖欲抑絶奸途匪為通式謹按事條侵官敗法專據流外豈九品已上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄而遇恩免罪勳品已下獨乖斯例如此則寬縱上流法切下吏育物有差惠罰不等又謀逆滔天輕恩尚免吏犯微罪獨不䝉赦使大宥之經不通開生之路致壅進違古典退乖今律輒率愚見以為宜停書奏世宗納之時詔以奸吏逃刑懸配逺戌若永避不出兄弟代之并州大中正郭柞奏曰慎獄審刑道煥先古垂憲設禁義纂惟今是以先王沿物之情為之軌法故八刑備於昔典奸律炳於來制皆所以謀其始迹訪厥成罪敦風厲俗永資世範者也伏惟㫖義博逺理絶近情既懷愚異不容不述誠以敗法之原起于奸吏奸吏雖微敗法實甚伏尋詔㫖信亦斷其通逃之路為治之要實在於斯然法貴止奸不在過酷立制施禁為可傳之于後若法猛而奸不息禁過不可永傳將何以載之刑書垂之百代若以奸吏逃竄徙其兄弟罪人妻子復應從之此則一人之罪禍傾二室愚謂罪人既逃止徙妻子走者之身懸名永配于眚不免奸徒自塞詔從之孝明帝時蘭陵公主駙馬都尉劉輝坐與河隂縣民張智夀妹容妃陳慶和妹慧猛奸亂耽惑毆主傷胎輝懼罪逃亡門下處奏各入死刑智夀慶和並以知情不加防限處以流坐詔曰容妃慧猛恕死髠鞭付宫餘如奏尚書三公郎中崔纂執曰伏見㫖募若獲劉輝者職人賞二階白民聽出身進一階厮役免役奴婢為良案輝無叛逆之罪賞同反人劉宣明之格又尋門下處奏以容妃慧猛與輝私奸兩情耽惑令輝挾忿毆主傷胎雖律無正條罪合極法並處入死其智夀等二家配敦煌為兵天慈廣被不即誅譴雖恕其命竊謂未可夫律令髙皇帝所以治天下不為喜怒增減不由親踈改易案鬭律祖父母父母忿怒以兵刃殺子孫者五嵗刑毆殺者四嵗刑若心有愛憎而故殺者各加一等雖王姬下降貴殊常妻然人婦之孕不得非一夕生永平四年先朝舊格諸刑流及死皆首罪判官後決從者事必因本以求支獄若以輝逃避便應懸處未有捨其首罪而成其末愆流死參差或時未允門下中禁大臣職在敷奏昔邴吉為相不存鬭斃而問牛喘豈不以司别故也案容妃等罪止于奸私若擒之穢席衆證分明即律科處不越刑坐何得同宫掖之罪齊奚官之律案智夀口訴妹適司士曹參軍羅顯貴已生二女于其夫則它家之母禮云婦人不二夫猶曰不二天若私門失度罪在於夫釁非兄弟昔魏晋未除五族之刑有免子戮母之坐何曽諍之謂在室之女從父母之刑已醮之婦從夫家之刑斯乃不刋之令軌古今之通議律期親相隱之謂凡罪況奸私之醜豈得以同氣相證論刑過其所犯語情又乖律憲案律奸罪無相緣之坐不可借輝之忿加兄弟之刑夫刑人于市與衆棄之爵人于朝與衆共之明不私于天下無欺于耳目何得以正刑書施行四海刑名一失駟馬不追既有詔㫖依即行下非律之案理宜更請尚書元修義以為昔哀姜悖禮於魯齊侯取而殺之春秋所譏又夏姬罪濫於陳國但責徵舒而不非父母明婦人外成犯禮之愆無關本屬况出適之妹舋及兄弟乎右僕射遊肇奏言臣等謬參樞轄獻替是司門下出納謨明常則至於無良犯法職有司存劾罪結案本非其事容妃等奸狀罪止於刑並處極法準律未當出適之女坐及其兄推據典憲理實為猛又輝雖逃刑罪非孥戮篡同大逆亦謂加重乖律之案理宜陳請乞付有司重更詳議時廷尉少卿袁翻以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推為獄成悉不斷理詔令門下尚書廷尉議之三公郎辛雄議曰春秋之義不幸而失寧僭不濫僭則失罪人濫乃害善人今議者不忍罪奸吏使出入縱情令君子於小人薰蕕不别豈所謂賞善罰惡殷勤恤隱者乎仰尋周公不減流言之懲俯惟釋之不加驚馬之辟所以小大用情貴在得在失之千里差在毫釐雄久執按牘數見疑訟職掌三千願言者六一曰御史所糾有注其逃走者及其出訴或為公使本曹給過有所指如不推檢文案灼然者雪之二曰御史赦前注獲見贓不辨行賕主名檢無賂以置直之主宜應洗復三曰經拷不引傍無三品證比以獄桉既成因即除削或有據令奏復者與奪不同未獲為通例又須定何如得為證人若必須三人對見受財然後成證則於理太寬若傳聞即為證則于理為急今請以行賕後三人俱見物及證狀顯著准以為驗四曰赦前斷事或引律乖錯使除復大衷雖按成經赦宜追從律五曰經赦除名之後或邀駕訴枉被㫖重究或訴省稱冤為奏更檢事付有司未被研判遂遇恩宥如此之徒謂不得異于常格依前案為定若不合拷究已復之流請不追奪六曰或受辭下檢反覆使鞫獄證占分明理合清雪未及告按忽逢恩赦若從占證而雪則違正格如除其名罪濫潔士以為罪須按成雪以占定若拷未畢格及要證一人不集者不得為占定古人雖患察獄之不精未聞知寃而不理今之所陳實士師之深疑朝夕之急務願垂察焉詔從雄議孝莊帝時姊夀陽公主行犯清路執赤棒卒呵之不止御史中尉髙道穆令卒棒破其車公主深以為恨泣以訴帝帝謂公主曰髙中尉清直之臣彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯極以為愧道穆免冠謝曰臣䝉陛下恩守陛下法不敢獨於公主虧朝廷典章以此負陛下帝曰朕以愧卿卿反謝朕尋敕監儀注東魏孝靜帝天平間竇瑗行晉州事既還京師上表曰臣在晉州之日䝉班麟趾新制即依朝命宣示所部士庶欣仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之聞於此為證伏惟陛下應圖臨㝢握紀承天克構洪基㑹昌寶歷式張琴瑟且調宫羽去甚刪泰革弊遷澆俾髙祖之德不墜於地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父子不得告告者死再三返覆之未得其門何者按律子孫告父母祖父母者死又漢宣云子匿父母孫匿大父母皆勿論蓋謂父母祖父母小者攘羊甚者殺害之類恩須相隱律抑不言法理如是足見其直未必指母殺父止子不言也若父殺母乃是夫殺妻母卑于父此子不告是也而母殺父不聽子告臣誠下愚輒以為惑昔楚康王欲殺令尹子南其子棄疾為王御士而上告焉對曰泄命重刑臣不為也王遂殺子南其徒曰行乎吾與殺吾父行將焉入曰臣乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父為與殺謂王為讎皆非禮春秋譏焉斯蓋門外之治以義斷恩知君殺父而子不告是也母之於父同在門內恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識比野人義比禽獸且母之于父作合移天既殺已之天復殺子之天二天頓毁豈容頓默此母之罪義在不赦下手之日母恩即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懷音梟獍猶變況承風禀教識善知惡之民哉脫下愚不移事在言外如㦯有之可臨時議罪何用豫制斯條用為訓誡誠恐千載之下談者喧譁以明明大朝有尊父卑母之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附父謀反大逆子得告之條父一而已至情可見竊惟聖主有作明賢贊成光國寧民厥用為大非下走頑蔽所能上測但受恩深重輒獻瞽言儻䝉收察乞付評議詔付尚書三公郎封君義立判云身體髮膚受之父母生我勞悴績莫大焉子于父母同氣異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之案春秋莊公元年不稱即位文姜出故服虔注云文姜通兄齊襄與殺公而不反父殺母出隱痛深諱朞而中練思慕少殺念至於母故經書三月夫人遜于齊既有念母深諱之文明無讎疾告列之理且聖人設法所以防淫禁暴極言善惡使知而避之若臨事議刑則陷罪多矣惡之甚者殺父害君著之律令百王罔革此制何嫌獨求削去既於法無違於事非害宣布有年謂不宜改瑗復難云尋局判云子於父母同氣異息終天靡報在情一也今欲論其尊卑辨其優劣推心未忍訪古無據瑗復議曰易曰天尊地卑乾坤定矣又曰乾天也故稱父坤地也故稱母又曰乾為天為父坤為地為母禮喪服經曰為父斬衰三年為母齊衰朞尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母由告死便是子殺天下未有無母之國不知此子將欲何之瑗案典律未聞母殺其父而子有隱母之義既不告母便是與殺父天下豈有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服虔注云文姜通於兄齊襄與殺公而不反父殺母出隱痛深諱朞而中練思慕少殺念至于母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理瑗尋注義隱痛深諱者以父為齊所殺而母與之隱痛父死深諱者以父為齊所殺而母與之隱痛父死深諱母出故不稱即位非為諱母與殺也是以下文以義絶其罪不為與殺明矣公羊傳曰君殺子不言即位隱之也朞而中練父憂少衰始念于母略書夫人遜乎齊是內諱出奔猶為罪文傳曰不稱姜氏絶不為親禮也注云夫人有與殺桓之罪絶不為親得尊父之義善莊公思大義絶有罪故曰禮也以大義絶有罪得禮之衷明有讎疾告列之理但春秋桓莊之際齊為大國通于文姜魯公謫之文姜以告齊襄使公子彭生殺之魯既弱小而懼于齊是時天子衰微又無賢霸故不敢讎之又不敢告列惟得告於齊曰無所歸咎惡于諸侯請以公子彭生除之齊人殺公子彭生案即此斷雖有援引即以情推理尚未遣惑事遂停寢隋文帝時尚書省嘗奏犯罪人依法合流而上處以大辟黃門侍郎栁莊奏曰臣聞張釋之有言法者天子所與天下共也今法如是更重之是法不信于民心方今海內無事正是示信之時伏願陛下思釋之之言則天下幸甚帝不從煬帝在顯仁宫敕宫外衛士不得輒離所守有一主帥私令衛士出外帝付大理繩之大理少卿源師據律奏徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之自可不關文墨既付有司義歸恆典脫宿衛近侍者更有此犯將何以加之帝乃止唐髙祖武德初擢李素立為監察御史民犯法不及死髙祖欲殺之素立諫曰三尺法天下所共有一動搖則人無以措手足方大業經始奈何輦轂下先棄刑書乎帝嘉納太宗貞觀元年吏部尚書長孫無忌嘗被召不解佩刀入東上閣門出閣後臨門校尉始覺尚書右僕射封德彛議以監門校尉不覺罪當死無忌誤帶刀入徒二年罰銅二十斤太宗從之大理少卿戴胄駮曰校尉不覺無忌帶刀入內同為誤耳夫臣子之于尊極不得稱誤准律云供御湯藥飲食舟船誤不如法者皆死陛下若録其功非憲司所決若當據法罰銅未為得中太宗曰法者非朕一人之法乃天下之法何得以無忌國之親戚更欲撓法耶更令定議德彛執議如初太宗將從其議胄又駮奏曰校尉緣無忌以致罪于法當輕若論其過誤則為情一也而生死頓殊敢以固請太宗乃免校尉之死是時朝廷盛開選舉或有詐僞階資者太宗令其自首不首罪至于死俄有詐僞者事泄據法斷流以奏之太宗曰朕初下敕不首者死今斷從流是示天下以不信矣胄曰陛下當即殺之非臣所及既付所司臣不敢虧法太宗曰卿自守法而令朕失信耶胄曰法者國家所以布大信於天下言者當時喜怒之所發耳陛下發一朝之忿而許殺之既知不可而置之於法此乃忍小忿而存大信臣竊為陛下惜之太宗曰朕法有所失卿能正之朕復何憂也三年太宗詔關中免二年租稅關東給復一年尋有敕已役已納並遣輸了明年總為準折給事中魏徴上書曰臣伏見八月九日詔書率土皆給復一年老幼相歡咸歌且舞又聞有敕丁已配役即令役滿折造餘物亦遣輸了待明年總為準折道路之人或失所望此誠平分百姓均同七子但下民難與圖始日用不足皆以國家追悔前言二三其德臣竊聞之天之將輔者仁人之所助者信今陛下初膺大寶億兆觀德始發大號便有二言生八表之疑心失四時之大信縱國家有倒懸之急猶必不可況以太山之安而輒行此事為陛下為此計者于財利小益于德義大損臣誠智識淺短竊為陛下惜之伏願少覽臣言詳擇利益冒昧之罪臣所甘心令簡㸃使右僕射封德彛等並欲中男十八已上簡㸃入軍敕三四出徴執奏以為不可德彛重奏今見簡㸃使云次男內大有壯者太宗怒乃出敕中男已上雖未十八身形壯大亦取徴又不從不肯署敕太宗召徴及王圭作色而待之曰中男若實小自不㸃入軍若實大亦可簡取于君何嫌過作如此固執朕不解公意徴正色曰臣聞竭澤取魚非不得魚明年無魚焚林而畋非不獲獸明年無獸若次男已上盡㸃入軍租賦雜徭將何取給且比年國家衛士不堪攻戰豈為其少但為禮遇失所遂使人無鬭心若多㸃取人還充雜使其數雖衆終是無用若精簡壯健遇之以禮人百其勇何必在多陛下每云我之為君以誠信待物欲使官人百姓並無矯僞之心自登極已來大事三數件皆是不信復何以取信於人太宗愕然曰所云不信是何等也徴曰陛下初即位詔書曰逋私宿債缺負官物並悉原免即今所司列為事條秦府國司亦非官物陛下自秦王為天子國司不為官物其餘物復何所有又關中免二年租調關外給復一年百姓䝉恩無不歡恱更有敕㫖今年白丁多以役訖若從此放免並是虛荷國恩若已折已輸今總納取了所免者皆以來年為始散還之後方更徴收百姓之心不能無怪已徴得物便㸃入軍來年為始何以取信又共理所寄在於刺史縣令常年貌稅並悉委之至於簡㸃即疑其詐僞望下誠信不亦難乎太宗曰我見君固執不已疑君蔽此事今論國家不信乃人情不通我不尋思過亦深矣行事往往如此錯失若為致理乃停中男賜金罋一口賜圭絹五十匹太宗時刑部奏張君快歐陽林謀殺蘇志約取銀君快不下手貞觀九年三月赦劫賊不傷財主免死配流經門下奏定刑部郎中髙敬言舉斷合死門下執依前奏尚書任城王道宗録奏太宗謂侍臣曰國有常典事迹可明何得各為意見㺯其文墨因令御史勘當御史奏之太宗曰君快等謀為劫殺何得免死因令殺之魏徴進諫曰據律劫賊傷財主者皆死謀殺之條元謀者斬下手者絞餘皆配流劫賊重謀殺輕赦是一時之恩劫賊不傷財主免死配流則君快從重法被寬而刑部于後從輕法斷死臣實有疑太宗曰幾人行劫徴對曰三人下手者處死罪太宗令議議定奏聞太宗曰三人謀從二人之言因令配流太宗因教習不整遣大將軍張士貴杖中郎郎將等士貴坐杖輕下吏魏徴諫曰臣外竊聞大將軍張士貴坐行杖阿縱送付大理臣以為教習不整官司誠合重責但將軍之任職在爪牙委以心膂取其誠效行杖小有不稱未是將軍之罪且使將軍執杖已不可為後法又以杖輕加責彌復驚駭物情假令推得阿私終恐有虧聖德太宗大笑遽令釋之時陳倉折衝都尉魯寧坐事繫獄自恃髙班慢罵陳倉尉劉仁軌仁軌杖殺之州司以聞上怒命斬之怒猶不解曰何物縣尉敢殺吾折衝命追至長安面詰之仁軌曰魯寧對臣百姓辱臣如此臣實忿而殺之辭色自若魏徴侍側曰陛下知隋之所以亡乎曰何也徴曰隋末百姓强而淩官吏如魯寧之比是也上恱擢仁軌為櫟陽丞時侍御史張仲素奏慶州樂蟠縣令叱奴騭盜用官倉案驗並實太宗令斬之中書舍人楊文瓘奏據律不合死太宗曰倉糧朕之所重若不加法恐犯者滋多魏徴諫曰陛下設法與天下共之今若改張人將法外畏罪更復有重者又何以加焉太宗從之太宗御大極殿大赦因謂侍臣曰為君極難法若急恐濫及善人法若寬則不肅姦宄寬猛之間若為折衷魏徴對曰自古為政者因時設教若人情似急則濟之以寬如有寬慢則糾之以猛時既不常所以法令無定廣州都督党仁𢎞嘗率鄉兵二千助髙祖起封長沙郡公仁𢎞交通豪酋納金寶沒降獠為奴婢又擅賦夷人既還有舟七十或告其贓法當死帝哀其老且有功因貸為庶人乃召五品以上謂曰賞罰所以代天行法今朕寬仁𢎞死是自㺯法以負天也人臣有過請罪于君君有過宜請罪於天其令有司設藁席於南郊三日朕將請罪房𤣥齡等曰寬仁𢎞不私而以功何罪之請百僚頓首三請乃止時同州人房彊以弟謀反當從坐帝因録囚為之動容曰反逆有二興師動衆一也惡言犯法二也輕重固異而均謂之反連坐皆死豈定法耶房𤣥齡等議曰禮孫為父尸故祖有䕃孫令是祖孫重而兄弟輕于是令反逆者祖孫與兄弟緣坐皆配沒惡言犯法者兄弟配流而已時李乾祐為殿中侍御史鄃令裴仁軌私役門卒太宗欲斬之乾祐曰法令與天下共之非獨陛下有也仁軌以輕罪致極刑非畫一之制刑罰不中則民無所措手足帝意解太宗患吏多受賕乃密使左右試賂之有司門令史受絹一匹上欲殺之民部尚書裴矩諫曰為吏受賂罪誠當死但陛下使人遺之而受乃陷人於法也恐非所謂道之以德齊之以禮上恱告羣臣曰裴矩能當官力爭不為面從儻每事皆然何憂不治太宗嘗謂侍臣曰比有奴告主謀逆此極弊法特須禁斷假令有謀反者必不獨成終將與人計之衆計之事必有它人論之豈藉奴告主也自今奴告主者皆不須受盡令斬決又曰詔令格式若不常定則人心多惑奸詐益生周易稱渙汗其大號言發號施令若汗出於體一出而不復也又書曰慎乃出令令出惟行弗惟反且漢祖日不暇給蕭何起于小吏制法之後猶稱畫一今宜詳思此義不可輕出詔令必須審定以為永式又曰國家法令唯須簡約不可一罪作數種條格式既多官人不能盡記更生奸詐若欲出罪即引輕條若欲入罪即引重條數變法者實不益道理宜令審細毌使互文致疑髙宗時引駕盧文操盜左藏物上命誅之諫議大夫蕭鈞諫曰文操情實難原然法不至死上乃免之顧侍臣曰此真諫議也時郇公李孝協為魏州刺史坐贓賜死有司奏孝協父叔良死王事不可絶其嗣上曰畫一之法不以親踈異制茍害百姓雖太子亦不赦時將軍權善才中郎將范懷義誤斫昭陵柏當除名上特命殺之大理丞狄仁傑奏罪不當死上曰我不殺則為不孝仁傑固執不已上怒令出仁傑曰犯顔直諫自古以為難臣以為遇桀紂則難遇堯舜則易夫法不至死而陛下特殺之是法不信于人也人何所措其手足且張釋之有言設有盜長陵一抔土陛下何以處之今以一柏殺二將軍後代謂陛下為何如矣臣不敢奉詔者恐陷陛下于不道且羞見釋之于地下也上怒解遂貸之擢仁傑為侍御史武后時左拾遺陳子昻上復讎議狀曰先王立禮所以進人也明罰所以齊政也夫枕干讎敵人子之義誅罪禁亂王政之綱然則無義不可以訓人亂綱不可以明法故聖人修禮理內飭法防外使夫守法者不以禮廢刑居禮者不以法傷義然後能使暴亂不作廉耻以興天下所以直道而行也竊見同州下邽人徐元慶父爽為縣吏趙師蘊所殺元慶鬻身庸保為父報讎手刃師藴束身歸罪雖古烈者亦何以多誠足激清名教旁感忍辱義士之靡者也然按之國章殺人者死則國家畫一之法也法之不二元慶宜伏辜又按禮經父讎不同天亦國家勸人之教也教之不茍元慶不宜誅然臣聞昔刑之所生本以遏亂人之所利蓋以崇德今元慶報父之仇意非亂也行子之道義能仁也仁而無利與亂同誅是曰能刑未可以訓元慶之可顯有于此矣然則邪由正生理必亂作昔禮防至密其弊不勝先王所以明刑本實由此今儻義元慶之莭廢國之刑將為後圖政必多難則元慶之罪不可廢也何者人必有子子必有親親親相讎其亂誰救聖人作始必圖其終非一朝一夕之故以全其政也故曰信人之義其政不行且夫以私義而害公法仁者不為以公法而徇私義王道不設元慶之所以仁髙振古義伏當時以其能忘生而及於德也今若釋元慶之罪以利其生是奪其德而虧其義非所謂殺身成仁全死無生之莭也如臣等所見謂宜正國之法置之以刑然後旌其閭墓嘉其徽烈可使天下直道而行編之於令永為國典時大夫魏元忠為張易之構謫嶺表太僕崔貞慎東宫率獨孤禕之祖道易之怒使人上急變告貞慎等與元忠謀反武后詔監察御史馬懷素按之使者促迫懷素執不從曰貞慎餞流人當得罪以為謀反則非昔彭越以逆誅欒布奏事尸下漢不坐罪今元忠罪非越比不宜坐餞流謫之人且陛下操生殺柄欲加之罪自當處決聖心既付臣按狀惟知守陛下法爾后意解中宗神龍初左拾遺趙冬曦上書曰古律條目千餘隋時奸臣侮法著律曰律無正條者出罪舉重以明輕入罪舉輕以明重一辭而廢條目數百自是輕重㳂愛憎被罰者不知其然使賈誼見之慟哭必矣夫法易知則下不敢犯而逺機穽文義深則吏乘便而朋附盛律令格式謂宜刋定科條直書其事其以準加減比附量情及舉輕以明重不應為之類皆勿用使愚夫愚婦相率而逺罪犯者雖貴必坐律明則人信法一則主尊神龍中大理正王志愔嘗奏言法令者人之隄防不立則無所制今大理多不奉法以縱罪為仁持文為苛臣執刑典恐且得謗遂上所著應正論云易萃之六二曰引吉無咎謂處萃之時已獨居正異操而聚獨正者危未能以逺害惟九五應之乃履正迎吉由已居下位而中正是託期於上應之不括囊以守祿也又言刑賞二柄惟人主操之故曰以力役法者百姓也以死守法者有司也以道變法者君上也魏遊肇為廷尉帝私敕肇有所降恕肇執不從曰陛下自能恕之豈可令臣曲筆也又言為國當以嚴致平非以寬致平嚴者非凝網重罰在人不易犯而防難越也故捨銜䇿以奔踶則王良不能御駻停藥石于膚腠則俞附不能攻疾又言漢武帝甥昭平君殺人以公主子廷尉上議帝垂涕曰法令者先帝之所造也用親故誣先帝法吾何面目入髙廟乎卒可其奏隋文帝子秦王俊為并州總管以奢縱免官楊素曰王陛下愛子請赦之帝曰法不可違若如公意我乃五兒之父非兆人之父何不别制天子子律乎故天子操法有不變之義凡數千言帝嘉之𤣥宗時武疆令裴景仙丐贓五千匹亡命帝怒詔殺之大理卿李朝隱曰景仙其先寂有國功載初時家為酷吏所破誅夷略盡而景仙獨存且承嫡于法當請又丐乞贓無死比藉當死坐猶將宥之使私廟之祀無餒魂可也帝不許固請曰生殺之柄人主專之條别輕重有司當守且贓惟枉法抵死今丐贓即斬後有枉法抑又何加且近發德音杖者聽減流者給程豈一景仙獨過常法有詔決杖百流嶺南肅宗至德中將軍王去榮殺富平令杜徽肅宗新得陜且惜去榮材詔貸死以流人使自效中書舍人李至諫曰聖人誅亂必先示法令崇禮義漢始入關約法三章殺人者死不易之法也按將軍去榮以朔方偏裨提數千士不能整行列挾私怨殺縣令有犯上之逆或曰去榮善守陜新下非去榮不可守臣謂不然李光弼守太原程千里守上黨許叔冀守靈昌魯炅守南陽賈賁守雍邱張巡守睢陽初無去榮未聞賊能下也以一能而免死彼弧矢絶倫劍術無前者恃能犯上何以止之若捨去榮誅將來是法不一而招罪人也惜一去榮殺十去榮之材其傷蓋多彼逆亂之人有逆于此而順於彼乎亂富平而治于陜乎悖縣令能不悖于君乎律令者太宗之律令陛下不可以一士小材廢祖宗大法帝詔羣臣議太子太師韋見素文部郎中崔器等皆以為法者天地大典王者不敢專也帝王不擅殺而小人得擅殺者是權過人主開元以前無敢專殺尊朝廷也今有之是弱國家也太宗定天下陛下復鴻業則去榮非至德罪人乃貞觀罪人也其罪祖宗所不赦陛下可易之耶詔可代宗時御史臺請天下斷獄一切待報唯殺人許償死論徒者得悉徙邉京兆尹嚴郢奏言罪人徙邊即流也流有三而一用之誠難且殺人外猶有十惡僞造用符印强光火諸盜今一徙之法太輕不足禁惡又罪抵徒科别差殊或毆傷夫婦離非義絶養男别姓立嫡不如式私度關冒户等不可悉而與十惡同徙即輕重不倫又按京師天下聚論徙者至廣例不覆讞今若悉待報有司斷決有程月不啻五千獄正恐牒桉填委章程紊撓且邊及近邊犯死徒流者若何差請下有司更議順宗時禮部員外郎栁宗元駮復讎議狀曰臣伏見天后時有同州下邽人徐元慶者邽音圭父爽為縣尉趙師韞所殺卒能手刃父讎束身歸罪當時諫臣陳子昻建議誅之而旌其閭且請編之于令永為國典臣竊獨過之臣聞禮之大本以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為治者殺無赦其本則合其用則異旌與誅莫得而並焉一本作不得並也誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僭壞禮甚矣果以是示于天下傳于後代趨義者不知所向違害者不知所立以是為典可乎蓋聖人之制窮理以定賞罰本情以正褒貶統於一而已矣嚮使刺讞其誠僞讞語蹇切議罪也考正其曲直原始而求其端則刑禮之用判然離矣何者若元慶之父不陷于公罪師韞之誅獨以其私怨奮其吏氣虐于非辜州牧不知罪刑官不知問上下䝉冒籲號不聞而元慶能以戴天為大耻枕戈為得禮禮記曲禮云父之讎不與共戴天寢苫枕干弗與共天下也處心積慮以衝讎人之胸介然自克即死無憾是守禮而行義也執事者宜有慚色將謝之不暇而又何誅焉其或元慶之父不免於罪師韞之誅不愆于法是非死于吏也是死於法也法其可讎乎讎天子之法而戕奉法之吏是悖驁而淩上也悖音孛驁音敖執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讎其亂誰救是惑于禮也甚矣禮之所謂讎者蓋其寃抑沉痛而號無告也非謂抵罪觸法陷于大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讎凡殺人而義者令勿讎讎之則死有反殺者邦國交讎之周禮地官又安得親親相讎也春秋公羊傳曰父不受誅子復讎可也父受誅子復讎此推刃之道復讎不除害公羊定公四年今若取此以斷兩下相殺則合於禮矣且夫不忘讎孝也不愛死義也元慶能不越于禮服孝死義是必逹理而聞道者也夫逹理聞道之人豈其以王法為敵讎者哉議者反以為戮黷刑壞禮其不可以為典明矣請下臣議附于令有斷斯獄者不宜以前議從事謹議永貞間郭子儀壻太僕卿趙縱為奴告下御史劾治而奴留內侍省中書侍郎同中書門下平章事張鎰奏言貞觀時有奴告其主謀反者太宗曰謀反理不獨成尚當有他人論之豈藉奴告耶乃著令奴告主者斬由是賤不得干貴下不得淩上教本既修悖亂不萌頃者長安令李濟以奴得罪萬年令霍晏因婢坐譴輿臺下類主反畏之悖慢成風漸不可長建中元年五月辛卯詔書奴婢告主非謀叛者同自首法並準律論由是獄訴衰息今縱事非叛逆而奴留禁中獨下縱獄情所不厭且將帥功孰大于子儀冡土僅乾兩壻前已得罪縱復繼之不數月斥其三壻假令縱實犯法事不緣奴尚宜録勳念亡以從蕩宥況為奴所訴耶陛下方貴武臣以討賊彼雖見寵一時不能忘懷于異日也帝納之時玉工為帝作帶誤毁一銙工不敢聞私市它玉足之及獻帝識不類擲之工人伏罪帝怒其欺詔京兆府論死兵部侍郎同中書門下平章事栁渾曰陛下遽殺之則已若委有司須詳讞乃可于法誤傷乘輿器物罪當杖請論如律由是工不死憲宗元和六年富平人梁恱為父報仇殺人詣縣請罪敕復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同必資論辨宜令都省集議聞奏者朝議郎行尚書職方員外郎上騎都尉韓愈議曰伏以子復父讎見于春秋見于禮記又見周官又見諸子史不可勝數未有非而罪之者也最宜詳于律而律無其條非闕文也蓋以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義于經而深沒其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施于下之辭非百姓之相殺者也又周官曰凡報仇讎者書于士殺之無罪言將復讎必先言于官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心亦不自專訪議群下臣愚以為復讎之義雖同而其事各異或百姓相讎如周官所稱可議於今日或為官吏所誅如公羊所稱不可議於今日又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷于今也然則殺之與赦不可一例宜定其制曰凡復父讎者事發具其事申尚書省尚書省集議奏聞酌其宜而處之則經律無失其㫖矣穆宗初牛僧孺以庫部郎中知制誥徙御史中丞按治不法內外澄肅宿州刺史李直臣坐賕當死賂宦侍為助具獄上帝曰直臣有才朕欲貸而用之僧孺曰彼不才者持祿取容耳天子制法所以束縛有才者祿山朱泚以才過人故亂天下帝異其言乃止賜金紫服以户部侍郎同中書門下平章事文宗時鄭注構宋申錫捕逮倉卒內外震駭右散騎常侍崔𤣥亮率諫官叩延英苦諍反復數百言文宗未諭𤣥亮置笏在陛曰孟軻有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天子曰殺之然後察之乃置于法今殺一凡庶當稽典律況欲誅宰相乎臣為陛下惜天下法不為申錫言也俯伏流涕帝感悟衆亦服其不撓繇此名重朝廷武宗㑹昌中李德裕上奏曰臣等每䝉延英召對獲聞聖言常欲朝廷尊臣下肅此則是陛下沈究為理之本伏以管仲古之大賢明於理國其言可以為百代之法管仲云凡軍國之重器莫重于令令重則君尊君尊則國安故安國在乎尊君尊君在乎行令明君察於理人之本莫要于令故曰虧令者死益令者死不行令者死留令者死不從令者死五者死而無赦又曰令雖在上而論可與不可者在下是威下繫於人也自太和以來風俗大壞令出於上非之者在下此弊不除無以理國韋𢎞質所論宰相不合兼領錢榖臣等敢以事體聞奏昔匡衡云大臣者國家之股肱萬姓所瞻仰也明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家動搖而人不靜矣今韋𢎞質受人教導輒獻封章則是賤人圖柄臣矣臣等又以蕭望之是漢朝名儒重德為御史大夫奏云今嵗首日月少光咎在臣等上以望之意輕丞相乃下侍中御史中丞詰問又貞觀中監察御史陳師合上書云人之思慮有限一人不可捴數職太宗云此人妄有毁謗止欲離間我君臣流師合于嶺表又賈誼云人主之尊譬如堂群臣如陛衆庶如地故陛九級上廉逺地則堂髙陛無級廉近地則堂卑亦由將相重則君尊其勢然也如宰相有奸謀隱慝則人人皆得上論至於制置職業固是人主之柄非小人所得干議古者朝廷之士尚各守官業思不出位況韋𢎞質賤人豈得以非所宜言上黷明主此是輕宰相矣後漢太學諸生頗干時政其時謂之處士橫議皆是亂風俗深要懲絶伏望陛下知其邪計從朋黨而來每事明察遏絶將來之漸則朝廷安靜邪黨自銷臣等不勝感憤輒具聞奏伏望特賜省覽謹録奏聞後周世宗以刑書深古條目繁細難于檢討又前後敕格重互亦難詳審於是中書門下奏曰伏以刑法者御人之銜勒救弊之斧斤有國家者不可一日而廢也雖堯舜之世亦不能捨此而致治今奉制㫖刪定律令有以見明罰敕法之意也竊以朝廷之所用者律十二卷律疏三十卷式二十卷令三十卷開成格一十卷大中統類一十二卷後唐以來至漢末編敕三十二卷及國朝制敕等律令則文辭古質或難以詳明格敕則條目繁多或有所疑誤將救舞文之弊宜伸畫一之規所冀民不陷刑吏有所守臣等商議望準制㫖施行仍命侍御史知雜事張湜太子右庶子劇可久殿中侍御史率汀職方郎中鄧守中倉部郎中王瑩司封員外郎賈玭太常博士趙礪國子博士李光贊大理正蘇曉太子中允王伸等十人編集新格勒成部秩律令之有難解者就文訓釋格敕之有繁雜者隨事刪削其有矛盾相違輕重失宜者盡從改正無或拘牽候畢日委御史臺尚書省四品以上及兩省五品以上官參詳可否送中書門下議定從之歷代名臣奏議卷二百九
