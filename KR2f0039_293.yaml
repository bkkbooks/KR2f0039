body:
  text: 歴代名臣奏議卷二百九十三明楊士竒等撰近習宋徽宗時陳次升彈裴彦臣䟽曰臣竊惟人之無禮於君者臣子惡之如鷹鸇之逐鳥雀況身居言責其可黙乎臣訪聞今月十三日御藥閻守懃在御前呈進文字内臣裴彦臣對君上用手敲守懃幞頭髙聲道莫錯斬人莫錯斬人顯是不敬無人臣之禮罪不可赦安可置而不問陛下縱不以身之安危為念其如社稷何其如天下何其如公議何昔漢唐之間閹官秉國柄制國命者其始於陵慢其終至於跋扈而不可制今日彦臣悖悍如此豈可忽之而不慮後日之患乎伏望聖慈特出睿斷明正典刑以為宫禁之戒次升又奏曰臣伏見本臺今月十四日據御藥閻守懃狀論内臣裴彦臣對君上髙聲等事已具申奏乞行根治未聞施行者竊以宫殿之中理當恭肅敢有聲徹御所者在法不容況對君上高聲肆忿而無人臣之禮者乎夫人主之尊如堂堂高則難攀卑則易陵彦臣果於陛下之前如守懃所陳顯屬不敬而有淩上之心若不明正典刑以懲其惡益無畏憚何所為而不可易曰履霜堅氷至盖言漸也詩曰肇允彼桃蟲拚飛維鳥言事起於至㣲儻不防閑及其成也終至於不可制陛下當以古人之言為戒社稷之重為念除惡於未萌消患於未然毋使滋蔓以至於難圖後悔無及矣伏望聖慈特降守懃状詞付有司考究虗實因依施行次升論劉瑗䟽曰臣訪聞陛下在潛邸日察知都門親事官有勞遂援故例奏留占役使此事之小者也非有犯分難行之理干紊朝廷而管勾官劉瑗怒其恩非已出乃誣奏都監使臣為之干請置之於罪又朝㫖嚴宗室門令限都監出入瑗乃掲牓府第扃鑰中門過為防守若踈哲宗親友之恩視萬乗之貴介弟如無有也按瑗乃本府之管勾官耳牽一府之人奉事陛下反敢挾令作威若踈其所親用情忤悻以較其所事途人聞之莫不扼腕憤懣逮陛下誕受天命入奉鬼神宗廟瑗宜自知罪咎恐懼引去尚敢偃然無所忌憚握要務受恩施行彷徉於陛下之左右雖陛下天地德量容忍不誅其如社稷何其如公議何昔晉文公為公子過曺衛鄭三國之君皆不為禮焉及文公旣入而主夏盟伐曹與衛春秋謂其伐無禮而不議其修舊怨夫伐不失刑禮以立政此文公所以覇也今瑗以平昔悖悍陵驁之迹猶朝夕親近而領方藥之政臣未敢謂其無包藏姦惡之心也臣聞而不言使陛下之失刑政此臣之大戮也又聞英宗之立非内侍都知任守忠意因循遲乆未加斥逐交構百端幾開兩宫大隙當時諫臣論奏以莭度副使安置由是光獻得以脩其慈英宗得以全其孝觀瑗前日之迹陛下之立豈瑗所欲旣懷疑忌心不自安焉能保其無它耶雖今日聖德巍巍宫殿清肅必無可開之隙然小人姦險操心之危慮患之深造事非一端可料安得不思患而豫防之也伏望聖衷特正瑗之典刑以慰中外次升又奏曰臣近彈奏劉瑗充潛邸管勾官日誣奏都監干乞㽞親事官及扄鑰府門過為防守顯有凌驁之迹乞正典刑未䝉施行須至再瀆天聽者竊惟陛下聖德淵懿出於天縱頃居潜邸御下以公事上以信中外之人莫不傳聞瑗為本府管勾官知之尤為至詳輙敢陵驁不存上下之分且如奏㽞親事官為其有勞也瑗怒其恩不自已出乃誣奏以受都監干請之私例而奏之非有欺也瑗以謂不當㽞是誣所奏以欺朝廷頗玷聖德又府門啓閉自有時限瑗乃掲牓府第過為扄鑰待陛下如何人耶瑗之悍悖不忠所事如此宜即誅夷今陛下入承大統廼厚授恩施寘左右恬不防閑雖聖度包荒憫瑗昔為宫僚之舊不忍加誅陛下恩德如此何負於瑗瑗之負陛下實多亦當以社稷為念較其孰輕孰重斷以大義不可循以私恩孔子曰小不忍以致大亂此言宜以為戒兼聞瑗自懐疑懼屢嘗請去小人之心疑懼旣生防患之慮何所不至竊恐别至生事若不早正典刑是陛下為瑗屈公義而撓法也法者天下之所公共天子不得而私昔漢昭平君隆慮公主之子也醉殺主傅廷尉請論武帝曰吾弟有是一子以死屬我為之涕泣良乆曰法令先帝所造也用弟故誣先帝之法吾何靣而入髙廟乎又下負萬民夫昭平君帝者之親尚不敢以私撓法瑗雖係随龍之人其待遇之恩豈宜過於帝者之親乎兼聞當時更有内臣一名同瑗誣奏都監干請留親事官臣不記姓名亦乞勘㑹詣實一就重行黜責次升論内侍李偁䟽曰臣竊聞陛下頃居潛邸哲宗厚天倫之愛恩遇甚渥陛下忠信恭敬未嘗以毫髪之私上干朝廷實以本府都門親事官晨昏啓閉甚勞援例奏留實占役使非有它也其事至㣲有何犯分臣寮之家尚許指名奏人随行況天子之貴介弟豈有不可者乎御藥李偁輙敢淩侮悖慢誣奏都監干請但不明言陛下受請求耳今陛下續承祖宗之業位乎天位豈偁所欲偁猶領職禁中給事左右忠臣良士莫不扼腕日夕為憂竊謂古之刑人不在君側者盖防患於未然慮祻於不測今日安可恬然不以為慮況偁凌侮之迹甚著疑忌之心必生心旣不安慮患必審若不早正典刑宫禁之中恐開釁端如前日任守忠之事爾伏望聖慈體英宗之果斷早賜施行以清宫禁以防後患實天下之福也次升又奏曰臣近彈劾御藥李偁誣奏陛下潛邸都監干請乞留都門親事官事乞正典刑不䝉施行者臣竊惟陛下之意必以偁給事宫禁日在左右不忍加罪所以示恩私也雖然恩固可行亦有時而不可行恩重於義則恩不可以廢義義重於恩則當捨恩而從義偁前日旣有淩侮之迹今日必生疑忌之心前日已嘗犯分今日寧保其無反側乎陛下宜察其姦謀酌其情犯斷之以義不可牽於私恩乃可以為宗廟無窮之計孔子曰小不忍以致大亂此言當以為戒伏望聖慈撿㑹臣前奏早賜施行無貽後日之悔左司諫江公望乞逺便嬖䟽曰臣讀孟軻之書至戴不勝曰子謂薛居州善士也使之居於王所在王所者長㓜尊卑皆薛居州也王誰與為不善在王所者長㓜尊卑皆非薛居州也王誰與為善一薛居州獨如宋王何廼知成人君之善非一人之力也周公作立政戒成王雖綴衣趣馬左右攜僕必以吉士乃知左右前後雖便嬖近習亦惟其人也人君位尊勢隆雖左右大臣日一見有事則公言之諫官御史月對不過三四有事則昌言之天下之士獲登文陛以望清光者萬無一二焉戰栗惶怖言若不出諸口矧能劇談天下利病哉與陛下朝暮起居從事莫非左右前後便嬖近習之人一不審所擇則憸佞柔媚彚進於君側承風順指悦意便情有所不欲欲無不得有所不聞聞無不盡朝餌夕啗日浸月潤切於身則蠧性命之情延於外則移朝廷之政唐宦者仇士良嘗語其軰人君不可令閒暇暇必觀書見儒臣而又納諫智深慮逺減玩好省游幸吾屬恩且薄矣莫若以財貨鷹馬毬獵聲色蠧其心極侈靡使悦不得息則必斥經術暗外事萬幾在於我矣此尤見便嬖近習其不擇之害有至於士良臣望陛下諦思孟軻之言以求多士之助佩周公之訓戒雖攜僕必惟其人觀士良與其軰計宻驗朝夕從事便嬖近習之忠佞如是則貨財鷹馬毬獵聲色之欲適萌於心左右前後旣無逢迎之人朝夕從事莫匪端人善士雖欲為之不可得已夫言不及大而論小事不該逺而渉邇非所當及也然小者大之基邇者逺之積知㣲之君尤所當戒陛下思之毋忽欽宗靖康元年邇英殿説書楊時論不可復近奄人状曰臣竊考自古奄人用事未有無後患者漢唐之末是也漢之竇武何進以肺腑之親因天下怨怒收攬英豪如李膺陳蕃軰共起而除之卒不勝皆駢頸受戮唐之昭宗信狎宦者至有東宫之幽其為歴世之祻大矣國家用童貫握兵為國生事二十餘年覆軍殺將朝廷不得聞中外耗竭而貫之私藏厚積不可以千萬計人怨神怒馴致今日陛下之所親見也臨御之初謂宜屏去此曹使與輿臺皁𨽻服掃除之役而已不可復近比聞防城所仍用奄人提舉授以兵柄此覆車之轍不可蹈也使氣焰一熾則後不可制矣恩倖持權貪饕得志上皇晚雖悔悟而追救不及不可不鑒也時又上䟽曰臣竊見自古奄人用事未有無祻者漢唐之末是也比年以來此曹氣焰尤盛皆縁蔡京王黼軰首為亂階開通交結假以重權使相應援僥倖之門一開至不可遏童貫握兵權於外梁師成擅大柄於内陶鑄將相垂二十年其餘恩倖持權肆為貪暴故人怨神怒幾致䘮邦原其祻根皆蔡京王黼軰為之也陛下即位天下響應異時之為惡者碎於國人之手投哀請命乞寄官資不煩芟夷而隂自消伏似非人為實出天意此宗社之福生靈之幸也人無賢愚莫不稱慶比聞外廷之臣有懐姦患失務為身謀而不為國家逺慮者復効京黼軰所為隂謀交結漸令用事以陛下之英明剛斷又嘗親見其弊宜無有此然臣竊有疑焉伏見梁平李彀之徒皆持權自若氣焰復熾未識陛下亦嘗察其所以然否乎臣謹按梁平嘗為大理寺開封府承受結為隂獄殺無罪之人不可數計罪盈惡貫人所切齒陛下之所知今復䖏之御藥院果何意耶李彀嘗管幹京城監造軍器姦欺侵蠧無所不至近興復濠之役調夫數萬減剋口食殘虐百端役夫至於殍踣逃亡亦不可勝計近在國門之外陛下其亦聞之乎至於直下元豊庫取珠子及送親事官於開封府䖏所之𩔖並不經由三省外議亦以為皆宦官為之故態漸長使陛下受疑於天下所繫豈小哉臣謂省臺寺監百執事者初不乏人何苦信用此曹駕覆車而履其轍也如邵成章軰人或稱之以為稍賢於其徒然此曹縱賢亦不可用但使之服掃除通詔令可也盖外廷姦臣一見其用事則向風觀望隂以為肘腋腹心之託内外相應馴致祻災非特不利於國亦非所以利此曹也大抵此𩔖善伺人意巧為便佞浸潤膚受尤難隄防自非監古視今以為深戒日多漸漬未有不為所惑者祻亂之機發於至㣲漸不可長拳石之多積而為邱山不可不謹也宦女之祻古人所戒著在方册非臣私言謹取五代史書宦者傳繕冩進呈伏望燕閒之際一賜覽觀永為龜鑑天下幸甚右司諫陳公輔論宦人蠱惑人主状曰臣聞宦寺之亡人國家其來已乆漢自和帝後中官始盛至靈獻之時極矣故袁紹誅常侍以逞志然曹操因之漢遂以亡唐自明皇後中官始盛至僖昭宗時極矣故崔嗣血軍容以甘心然朱温因之唐遂以亡大抵假威柄于外以内攘姦人則大臣愈專主權愈卑譬灼火攻蠧蠧盡木燒漢唐之亡皆由此軰豈不哀哉恭惟本朝祖宗積德深厚其歴年之長固非漢唐可比比年以來國家承平宫廷使令日益増廣加以財用富足而横恩濫賞覃及閹寺故宦官由之而盛竊弄威權恣為姦状雖朝士大夫憤疾之甚曽無以䖏之乃縁士庶伏闕獻書因而諠譁遂逞積年之忿殺害宦官二三十人不由朝廷命令不假威柄于人使此曹無所肆怨而氣勢稍衰與漢唐異矣此何以致其然耶實天祐我宋以延宗社無疆之福也陛下今日固當上承天意下順人欲因而摧抑此軰不使復振臣竊聞近來稍稍復用事如盧公裔王若沖邵成章之徒是已臣仰惟陛下臨御以來崇尚儉約聲色狗馬畋㳺玩好一切屏絶此曹將無所肆其巧然大率宦人蠱惑人主決非一端唐仇士良謂人主不可使閒暇閒暇則觀書近儒臣故我曹不得進用而恩澤始衰本朝楊戩亦戒其徒曰汝軰不可令天子罷修造我所得恩澤及財物皆縁修造陛下觀此軰用心果可不防哉臣區區之心望陛下鑒唐之亡因今日之天意專以此軰為戒無使其乗間伺隙以移陛下聦明也至於進退人才尤不宜與之謀孔子不主癰疽孟子不畏臧倉賢人君子決不肯因嬖倖以圖富貴其所以附麗以進者貪饕無恥巇險逞欲之小人故前日蔡京王黼王安中等專倚此曹為重此天下所共知伏惟陛下留神於此日夜念之無忘小臣之言實宗廟社稷之福而天下之幸也御史中丞許翰上言曰臣竊考觀載籍自春秋以來國家昌大世祚綿永者惟漢與唐至於我宋方建萬世之統此近古之三代也漢唐亂亡皆坐内侍為我宋鑑可謂明矣是以不可不察漢唐之季世平積乆人主不憂敵國外患而安於佚樂不親法家拂士而昵於近習於是奸宄得乗其間興宫室池苑壮麗之觀致妖冶靡曼傾惑之色以蔽其明為讒諂導䛕險詖之辭奏囂塵淫放鄭衞之音以亂其聦諱避危亡之言縁飾隆平之事使之燕安豫怠廣侈無憂以壊其志而後扶輿骫骳以導之喜忿懟耻辱以導之怒祈求要請以導之施私相竊語一嚬一笑皆能隂陽人主之意使國家威福潜移於是太阿之柄始倒持於下矣其漸至此則各随其世事勢之流相激生變為亂不同同歸於亡東漢祖尚名莭士大夫各持清議以争之故其季殺戮忠良禁錮賢儶袁紹乗天下之忿起而誅之而後漢亡唐北司本兵權重東漢而士大夫莫與之敵是以世無黨錮之祻而帷闥之𨽻勢陵人主幽辱廢置無不如意朱温乗天下之忿起而誅之而後唐亡本朝北司之盛殆過漢唐學士大夫凜凛乆矣前日縁太學生伏闕論事數萬之衆不約而從發憤讙呼若天導之使北司之勢不誅而自折則袁紹不復施其謀而朱温無所加其暴此所謂宗廟之靈社稷之福也書曰天視自我民視天聽自我民聽民之所欲天必從之是故上酌民言則下天上施陛下於何容心亦憲天而已矣凡退聽者無所歸怨而國制大定是乗一時之變而建萬世之利也而議者猶或非之夫前日但縁務專國是不酌民言鬰其忿怨以至於此漢唐之季變生豪傑其祻至於不可復救今國家徒以赤子啼號赴訴其枉一言撫之而萬姓返室懐仁歸德豈不賢於前世萬萬也哉此臣之所以為陛下賀也臣竊過計但慮事定之後邪説揺奪哀祈感動法不終守是以敢申言之謹按周官宦寺皆𨽻冡宰惟内小臣上士四人鄭康成以為異其賢者餘不過僅數十人未有登于下士者也是以内侍之祻不產於三代之前使國家能按今日之法而世守之則内侍得以保身延祀不罹誅殺於下而國家因之垂化定治不憂祻亂於上内外休寧不亦懿乎故願下臣章於内省掲示成憲永戒前非天下幸甚李光乞不用内臣管軍劄子曰臣歴觀自古進用奄人未有不致危亂者而兵權尤甚夙沙衛殿齊師殖綽郭最曰子殿國師齊之辱也區區諸侯之師使奄人殿之猶以為辱況天子之師乎自童貫秉軍政二十年將士零落殆盡開邊生事取笑四夷旋致今日之祻陛下躬履憂危亦可以鑒矣而譚稹梁方平軰皆乆握兵柄䘮師辱國臣謂陛下更易弊事當如拯救焚溺訪聞二人復管勾城壁事豈倉猝之際士大夫果無足委任者乎雖差𫝊墨卿王㝢等提領縁此曹用事日乆將士習熟但知中官不畏從官況敵人壓境朝廷舉措細大必聞非所以壮軍威而増士氣也伏望陛下出自睿斷早賜斥逐所有四城壁等事乞下行營使司專委從官添差文武臣寮同共管勾光論梁師成劄子曰臣伏覩敵騎内宼需索犒軍金銀陛下以宗社生靈為重屈意求和上自乗輿服御宗廟器皿下至民間首飾之物拘収殆盡大臣戚里之家不免直取獨未聞宦官能體陛下憂勞之意者近年以來宦官用事或殖貨利或治宫室或開拓邊境或進退臣寮皆能竊弄威權以厚自封殖此陛下耳目所及不復縷陳其專權擅勢桀黠尤甚者莫如梁師成師成用事日乆能作威福計其家貲無與為比當此危急之時獨不在直取之數臣切惑之臣謹按師成出入禁掖踰二十年罪惡貫盈不可悉數方蔡京王黼相繼用事朝綱隳壊賄賂公行姦邪朋附而為之用忠賢擯斥而不得進師成與之締交關通表裏蒙蔽引用浮薄布滿中外依慿城社玷辱聖朝以至海内怨嗟飬成今日之患迹其罪惡乆合誅夷方陛下踐阼之初聖政日新一時憸人咸知退縮而師成偃然居中執政大臣慮其狡獪多計恐一旦復得進用莫敢動揺伏望陛下斷自淵衷以師成付有司籍其家貲窮究姦慝以正刑典因以風厲黨𩔖庶有懲革實天下幸甚高宗時左正言鄧肅上䟽曰臣近准尚書省劄子奉聖㫖令送臣僚所論二章付門下後省其一章論臺諫之職不可觀望其二章論宦官之盛不可不戒臣竊鼓舞以為中興之道正在此也恭惟陛下臨御以來所用黄門比之上皇僅百之一比之淵聖僅十之一是陛下於北司盖未嘗不戒也然小人無知尚有敢循舊轍者陛下旣責臣以言臣敢黙黙乎臣於初十日侍班殿下有肩輿而至横門者羣臣吐舌莫敢誰何嘗試遣人詢之曰内臣陳良弼也臣切謂百官下馬外門徒歩而入雖雨作埿深滅足沒跗未嘗敢以為勞盖君臣之分不敢廢也良弼何人敢尓驕傲雖宣和以前宦官最盛不聞童貫梁師成等敢用肩輿輙入横門者今良弼之寵方之童貫等無萬分之一便敢輕視朝廷失禮如此傳之天下有損聖德臣竊痛之或曰良弼病矣不能徒歩臣以為不然豈有不能徒歩於横門之外而能徒歩於横門之内者乎又曰汴河乆涸運漕不至良弼一出則黄流瀰漫一時之功不可闕也臣又以為不然若恃㣲功便忘分義則趙普之流當乗肩輿以登太祖之庭矣或者又曰恐得聖㫖然後敢尓臣又對之曰此決無是理也朝廷之儀定於太祖陛下孝德上追虞舜豈忍以一黄門之故輕變祖宗之法乎臣愚伏望聖慈明正典刑以示懲戒不惟消患於未然亦所以弭天下之謗也惟陛下留神趙元鎮乞抑内侍奏曰臣前日奏事殿中伏奉聖訓以言官張致逺論列士大夫有隂結内侍者陛下旣駭且怒以謂此風寖不可長宣政之祻流毒至今不可不戒宜降詔開諭且令有司立法禁止臣待罪宰輔親承玉音仰見陛下不惑於甘言無狃於近習洞鑒覆車之迹灼知滋蔓之端好惡一分邪正自辨帝王盛德事也雖然小人無他志在進取不復顧藉至於壊風俗紊紀綱唱䜛佞之風塞公正之路以及於䘮國亡家之祻皆所不卹兹宜可畏歟今雖有所斥逐而潜形祕跡人莫得知物論所譏聖心未晤者臣不知其有無而亦不能保其必無也臣願陛下力懲而亟革之與其沮遏波流孰若絶去根本之為愈臣嘗見齊威王封即墨大夫故事及本朝歐陽脩奏䟽仁宗皇帝其議論事迹皆可稽考謹録在前用見臣區區將順之意亦因以獻規於陛下伏幸寛仁察斯忠懇孝宗時吏部侍郎李椿乞裁抑中貴奏曰臣聞憂先於事故能無憂事至而憂無救於事臣私憂過計願先事而憂之庶幾乎無憂也宦者論曰宦者四星在皇位之側盖中門之禁女宫之戒審門閭謹房室不可無也故宦人之在王朝其來舊矣臣伏覩熈寧五年詔書莭文前後省内臣轉至承制崇班内常侍許進一子與下班殿侍三班差使内侍省東西頭供奉官殿頭許進一子與下班殿侍諸班内品更不許進入内内侍省所管諸班内品每年通許進五人餘悉仍舊内供奉官已下至黄門如願進外官者比内侍省逓加一等推恩其内臣諸司使副合該奏兒男充前班者今後更不進内臣時上諭樞宻院曰方今宦者數已多而𨽻省者又不入内空絶人之世仁政所不取且獨不可用三班使臣以代其職事乎臣以此仰見祖宗好生之德不惜加等推恩以全人之生世德至渥也臣不識今尚守此法與否但見中官比之陛下初即位時人數漸多其勢頗盛臣又見近年有中官失火者蠶室中燒死小兒可見宫刑之室宦官之家皆有之臣又聞蠶室中小兒十不得四五少得生全者豈稱祖宗好生之德臣慮陛下所未聞也切縁自古宦官之盛衰繫有國之興亡臣不敢逺引漢唐之祻切見宣和之末童貫等罪惡貫盈軍民怨入骨髓京師百姓羣起而攻宦官殺之者不可勝數旋致靖康之祻建炎間王淵交結宦官不卹軍士遂激成苗劉之兇逆軍士求康履殺之併及其黨遂致明受之變前轍不逺言之痛心盖宦者體膚旣毁性情柔忍猜疑驕妬不期然而然其間雖有忠直之人亦多衆所不容所以互相視效憑恃浸潤交結受賄以資相髙享用過厚水陸厭飫侵漁百姓興建第宅連亘街陌始則人畏之極則人惡之畏且惡以致羣起而攻之上貽國家之憂仰惟陛下神聖在上宦者雖漸盛人雖畏之未甚惡也於此時有以裁制之不至于極則永無前日之患於宦者亦保富貴與國長乆此臣所以欲先事而憂者也裁制之道臣願出於聖斷官置蠶室選精於其事者掌之應進子者申奏并保乳入之俟平復賜其家如或不育願再進者聽之再進不育是上天不許也即聽進外官以為後以絶隂闇傷生之害其委付差使門禁宫戒之外毋使干預人材政事嚴禁士大夫及兵將官與之交通者稍遵太祖皇帝之制官品高則外補易曰君子思不出其位謂艮為閽寺也閽者止於門寺者止於巷聖人之戒深切著明不可不察也臣非不知言出祻生臣自念荷陛下恩遇特異不知所報故惟有忘身徇國庶幾萬分之一如臣言可採乞出於睿㫖施行祕書少監趙汝愚乞罷陳源添差總管奏曰臣先凖中書門下省送到録黄一道承樞宻院關十一月十八日奉聖㫖恭奉太上皇帝聖㫖提舉德夀宫陳源為應奉有勞可特與遥郡上轉行兩官臣伏覩陛下天性仁孝欽承太上慈訓兢兢業業惟恐不至故臣仰遵聖意即已書讀了當然當時實不知陳源别有兼職今再凖録到告詞其後擬稱陳源可特授永州防禦使依前右武大夫特添差兩浙西路馬歩軍副總管臨安府駐劄提舉德夀宫臣竊惟陳源係内侍而得參預一路軍政臣不知其始自何年除授然其事體重害漸不可長要非太上建炎詔書之意臣請為陛下誦之臣嘗讀建炎三年詔書自崇寧以來内侍用事循習至今理宜痛革自今内侍不許與主管兵官交通假貸饋遺借役禁兵當是時内侍與兵官交通借役禁兵且猶不可今乃假以一路揔戎之任臣恐非太上所以防㣲杜漸之意也臣伏思神宗皇帝時始令王中正李憲稍預邊事是時朝廷法度峻整若無甚害而卒之夤縁攀援竟成童貫開邊之祻靖康之變至今言之使人心折陛下安可視今日若無甚害而遂忘前日之戒耶臣愚欲望聖慈特降指揮除遵依太上皇帝聖㫖與轉行兩官外所有添差兩浙西路馬歩軍副揔管職事特與觧罷以為萬世子孫無窮之法以成太上建炎詔書之意宗社幸甚光宗即位楊萬里召為秘書監入對曰古之帝王固有知以一已攬其權不知臣下竊其權大臣竊之則權在大臣大將竊之則權在大將外戚竊之則權在外戚近習竊之則權在近習竊權之最難防者其惟近習乎非敢公竊也私竊之也始於私竊其終必至於公竊而後已可不懼哉寧宗慶元元年大府寺丞吕祖儉奏曰臣恭惟本朝立國之規模所以上接乎唐虞三代之統紀而逺過漢唐者非假夫强大威力也非資夫權謀術數也獨恃夫君子以為固而已然君子之能為固豈有他哉亦以其議論氣莭可以培根本而支變故也國家中興遹追慶歷元祐之言論風㫖固有以開紹興之正論然自秦檜用事導䛕成俗近嵗安静和平之説復壊人心議論氣莭或幾乎息而立國規模終不可忘紹熈五載夏秋之交海内皇皇天未悔祻小大之臣盡誠勠力大明繼照危而復安則陛下固已親見所恃以為固者而下改元之詔矣始政清明登用忠直天下之心盖將日望維新之政今日月曽幾何而人之觀聽則有異焉講席之臣或閔其耆艾而使之歸或因其論事而許之去臺諫之官或以舊學有勞而優遷或以繁難闕守而補外中批屢下㫖意難明想謂陛下之心祗欲昭示獨斷以防蔽欺而不知我之操柄則已潜有所移矣夫外廷與内廷之勢殊而君子與小人之情異左右前後之人地近情親巧於伺候外示畏謹陽若無他黜陟廢置間得關預時獻㣲益或可施行雖威福權柄如自上出而盜竊賣弄則益難知彼外廷之欲盡言者則共指為矯激外廷之欲論事者則共指為過當由是列于庶位者𩔖多逺嫌避事鮮克分明斟酌調娯務為得體議論氣莭日就消衰常時旣難盡其心緩急必將失所恃天下大物也設官分職所以維持也聽外朝以為公恃君子以為固然後能守而無失若廼嬖近暬御所知不逺寧免循私非使人主不信外廷則無由可以擅寵矧今國勢甫定人心猶揺嵗事有饑饉之憂敵國有窺伺之迹信任君子猶懼弗濟儻或失職又將疇依伏望陛下監觀本朝立國之規模惟念總攬權綱之要道外廷情實固宜致察内廷姦欺尤當深防絶去私邪之門使得自保寵禄闢開公正之路使得展布腹心夫然後朝廷尊安君子遂志議論氣莭足以圖回實政强壮本朝而可馴致慶歷元祐之治矣臣志在愛君不遑他恤惟陛下裁赦理宗即位國子祭酒喬行簡上䟽曰向者陛下内廷舉動皆有禀承小人縱有蠱惑干求之心猶有所忌憚而不敢發今者安能保小人之不萌是心陛下又安能保聖心之不無少肆陛下為天下君當懋建皇極一循大公不應私徇小人為其所誤凡為此者皆戚畹肺肝之親與近習貴幸之臣奔走使令之軰外取貨財内壊綱紀上以㒺人君之聦明來天下之怨謗下以撓官府之公道亂民間之曲直縱而不已其勢必至於假采聽之言而傷動善𩔖設衆人之譽而進拔憸人借納忠效勤之意而售其隂險巧佞之姦日積月累氣勢益張人主之威權將為所竊弄而不自知矣陛下衰絰在身愈當敬戒宫庭之間旣無所嚴憚嬪御之人又視昔衆多以春秋方富之年居聲色易縱之地萬一於此不能自制必於盛德大有虧損願陛下常加警省景定四年禮部侍郎牟子才論董宋臣不當除押班奏曰臣十年憂患分老山林蒙陛下収召復寘諸禁近之列常恨糜捐未足補報今旣數月矣不敢出位有所敷陳者盖以陛下自更化瑟内撫外寧衆正咸集羣憸悉除而又穡事告登文治具舉靖共尓位臣之分也近日以來在廷之臣學校之士乃以内臣之復用連章公車紛紛未止臣意陛下之用此人不過念其平日給事之勞抆拭而用之耳而諸臣深憂思慮則以其前轍之可監而慮其舊態之復作謂今寵以押班之任而日在陛下左右譬如木之有蠧蠧在中而木不覺其腐禾之有蟲蟲在心而禾不覺其槁雖陛下諄諄開諭而學士大夫之惑終不可觧也臣静觀數日間諸臣或以此而決去就者陛下宣召而復留之大臣為國家大體計為保固局靣計為憂惜諸賢計所以扶持而安全之者無不盡心焉竊意一堂都俞之際必有深長之思果斷之決使天下無可復議朝廷庶可妥安而老臣又何所容其喙然竚乎有聞而猶未也但聞諸臣欲去者猶未肯留已留者猶未忘去而輿議之徧責於在位者略不少恕焉臣謂陛下昭昭聖明如此大臣孜孜啓沃如此其於此事轉旋闢闔盖亦甚易㣲臣愚見不無望於陛下早有以䖏此庶幾一枰全安而無奕子動搖之虞風休雨止而有安恬泰定之勢此宗社之幸生靈之福也臣甫出獲穽非不欲懲羮吹虀保全末路深恐上負明主下負夙心用敢冐昧一言惟陛下幸赦五年子才為給事中繳李忠輔奏曰臣伏覩臺臣論列閤長李忠輔奉御筆李忠輔降兩官降罷臣有以見聖慮深逺天斷奮發盖將昭大公而毖後患也臣惟成周之制閹人守中門之禁寺人掌女宫之戒未嘗畀以事權所以遏其蠧政害事之漸自漢以來恭顯之用事專恣朝臣之側目畏憚亦旣任以機要又何以禁其長祻流毒之慘此防㣲杜漸者之所當深慮盖内轄一司自來止以小璫為之取其服勤恭謹易以禁制又以三年為任不使之日増月益聲生氣長以貽害無窮惟董宋臣自小璫至於大官二十年間皆兼領此職權傾中外恣為姦利至今得罪公論故每有除授人言交攻忠輔乃其所薦根株此局以為依憑凡其奸犯科條誣上行私之事皆出其所教而忠輔新進氣銳為術轉深為害愈烈大作威福動稱聖㫖帥漕兩司奉行惟謹其妄生羅織使人破家蕩産往往死於非命權則歸已怨則歸君而甚者窺覘中詗揣摩宻報曲為恩倖之地陛下灼見其奸奪其内轄職事遂降指揮内轄以三年為任立為定制又以臺臣之言降官放罷天下莫不仰陛下之明斷但觀臺臣所論則忠輔䖏心積慮傾險反覆可畏又有甚於前之所陳使罰止於此安知其不復出為惡耶且宋臣未嘗不罷也而又復用未嘗不退也而又復進使其不死祻且不歇抑亦可以為監矣比者城中欎攸旣始於宋臣之屋城外煙焰亦發於忠輔之家今陛下施行忠輔而宋臣適死於數日之間意者惟天惟祖宗望陛下盡取二十年祻根亂本一掃而空之雖宋臣死灰無復然之慮而忠輔則虎兕有出柙之憂倘陛下盡行臺臣所乞屏斥之言以絶其根實惟天惟祖宗之意而陛下子孫萬世無疆之福也所有將來録黄係經臣書讀用敢冐昩先具奏聞金哀宗時近侍干預朝政翰林直學士兼左司郎中實黙愛實諫曰今近侍權太重將相大臣不敢與之相抗自古僕御之臣不過供給指使而已雖名僕臣亦必選擇正人今不論賢否惟以世胄或吏貟為之夫給使令之材使預社稷大計此軰果何所知乎歴代名臣奏議卷二百九十三
