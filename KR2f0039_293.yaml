body:
  text: 歷代名臣奏議卷二百九十三明楊士竒等撰近習宋徽宗時陳次升彈裴彥臣疏曰臣竊惟人之無禮於君者臣子惡之如鷹鸇之逐鳥雀況身居言責其可默乎臣訪聞今月十三日御藥閻守勤在御前呈進文字內臣裴彥臣對君上用手敲守勤幞頭髙聲道莫錯斬人莫錯斬人顯是不敬無人臣之禮罪不可赦安可置而不問陛下縱不以身之安危為念其如社稷何其如天下何其如公議何昔漢唐之間閹官秉國柄制國命者其始於陵慢其終至於跋扈而不可制今日彥臣悖悍如此豈可忽之而不慮後日之患乎伏望聖慈特出睿斷明正典刑以為宫禁之戒次升又奏曰臣伏見本臺今月十四日據御藥閻守勤狀論內臣裴彥臣對君上髙聲等事已具申奏乞行根治未聞施行者竊以宫殿之中理當恭肅敢有聲徹御所者在法不容況對君上高聲肆忿而無人臣之禮者乎夫人主之尊如堂堂高則難攀卑則易陵彥臣果於陛下之前如守勤所陳顯屬不敬而有淩上之心若不明正典刑以懲其惡益無畏憚何所為而不可易曰履霜堅氷至蓋言漸也詩曰肇允彼桃蟲拚飛維鳥言事起於至微儻不防間及其成也終至於不可制陛下當以古人之言為戒社稷之重為念除惡於未萌消患於未然毋使滋蔓以至於難圖後悔無及矣伏望聖慈特降守勤狀詞付有司考究虗實因依施行次升論劉瑗疏曰臣訪聞陛下在潛邸日察知都門親事官有勞遂援故例奏留占役使此事之小者也非有犯分難行之理干紊朝廷而管勾官劉瑗怒其恩非已出乃誣奏都監使臣為之干請置之於罪又朝㫖嚴宗室門令限都監出入瑗乃揭榜府第扃鑰中門過為防守若踈哲宗親友之恩視萬乘之貴介弟如無有也按瑗乃本府之管勾官耳牽一府之人奉事陛下反敢挾令作威若踈其所親用情忤悻以較其所事途人聞之莫不扼腕憤悶逮陛下誕受天命入奉鬼神宗廟瑗宜自知罪咎恐懼引去尚敢偃然無所忌憚握要務受恩施行倣徉於陛下之左右雖陛下天地德量容忍不誅其如社稷何其如公議何昔晉文公為公子過曺衛鄭三國之君皆不為禮焉及文公既入而主夏盟伐曹與衛春秋謂其伐無禮而不議其修舊怨夫伐不失刑禮以立政此文公所以霸也今瑗以平昔悖悍陵驁之迹猶朝夕親近而領方藥之政臣未敢謂其無包藏姦惡之心也臣聞而不言使陛下之失刑政此臣之大戮也又聞英宗之立非內侍都知任守忠意因循遲久未加斥逐交構百端幾開兩宫大隙當時諫臣論奏以莭度副使安置由是光獻得以修其慈英宗得以全其孝觀瑗前日之迹陛下之立豈瑗所欲既懷疑忌心不自安焉能保其無它耶雖今日聖德巍巍宫殿清肅必無可開之隙然小人姦險操心之危慮患之深造事非一端可料安得不思患而豫防之也伏望聖衷特正瑗之典刑以慰中外次升又奏曰臣近彈奏劉瑗充潛邸管勾官日誣奏都監干乞留親事官及扄鑰府門過為防守顯有凌驁之迹乞正典刑未䝉施行須至再瀆天聽者竊惟陛下聖德淵懿出於天縱頃居潜邸御下以公事上以信中外之人莫不傳聞瑗為本府管勾官知之尤為至詳輒敢陵驁不存上下之分且如奏留親事官為其有勞也瑗怒其恩不自已出乃誣奏以受都監干請之私例而奏之非有欺也瑗以謂不當留是誣所奏以欺朝廷頗玷聖德又府門啓閉自有時限瑗乃揭榜府第過為扄鑰待陛下如何人耶瑗之悍悖不忠所事如此宜即誅夷今陛下入承大統乃厚授恩施置左右恬不防間雖聖度包荒憫瑗昔為宫僚之舊不忍加誅陛下恩德如此何負於瑗瑗之負陛下實多亦當以社稷為念較其孰輕孰重斷以大義不可循以私恩孔子曰小不忍以致大亂此言宜以為戒兼聞瑗自懷疑懼屢嘗請去小人之心疑懼既生防患之慮何所不至竊恐别至生事若不早正典刑是陛下為瑗屈公義而撓法也法者天下之所公共天子不得而私昔漢昭平君隆慮公主之子也醉殺主傅廷尉請論武帝曰吾弟有是一子以死屬我為之涕泣良久曰法令先帝所造也用弟故誣先帝之法吾何靣而入髙廟乎又下負萬民夫昭平君帝者之親尚不敢以私撓法瑗雖係隨龍之人其待遇之恩豈宜過於帝者之親乎兼聞當時更有內臣一名同瑗誣奏都監干請留親事官臣不記姓名亦乞勘㑹詣實一就重行黜責次升論內侍李稱疏曰臣竊聞陛下頃居潛邸哲宗厚天倫之愛恩遇甚渥陛下忠信恭敬未嘗以毫髮之私上干朝廷實以本府都門親事官晨昏啓閉甚勞援例奏留實占役使非有它也其事至微有何犯分臣寮之家尚許指名奏人隨行況天子之貴介弟豈有不可者乎御藥李稱輒敢淩侮悖慢誣奏都監干請但不明言陛下受請求耳今陛下續承祖宗之業位乎天位豈稱所欲稱猶領職禁中給事左右忠臣良士莫不扼腕日夕為憂竊謂古之刑人不在君側者蓋防患於未然慮祻於不測今日安可恬然不以為慮況稱凌侮之迹甚著疑忌之心必生心既不安慮患必審若不早正典刑宫禁之中恐開釁端如前日任守忠之事爾伏望聖慈體英宗之果斷早賜施行以清宫禁以防後患實天下之福也次升又奏曰臣近彈劾御藥李稱誣奏陛下潛邸都監干請乞留都門親事官事乞正典刑不䝉施行者臣竊惟陛下之意必以稱給事宫禁日在左右不忍加罪所以示恩私也雖然恩固可行亦有時而不可行恩重於義則恩不可以廢義義重於恩則當捨恩而從義稱前日既有淩侮之迹今日必生疑忌之心前日已嘗犯分今日寧保其無反側乎陛下宜察其姦謀酌其情犯斷之以義不可牽於私恩乃可以為宗廟無窮之計孔子曰小不忍以致大亂此言當以為戒伏望聖慈撿㑹臣前奏早賜施行無貽後日之悔左司諫江公望乞逺便嬖疏曰臣讀孟軻之書至戴不勝曰子謂薛居州善士也使之居於王所在王所者長幼尊卑皆薛居州也王誰與為不善在王所者長幼尊卑皆非薛居州也王誰與為善一薛居州獨如宋王何乃知成人君之善非一人之力也周公作立政戒成王雖綴衣趣馬左右攜僕必以吉士乃知左右前後雖便嬖近習亦惟其人也人君位尊勢隆雖左右大臣日一見有事則公言之諫官御史月對不過三四有事則昌言之天下之士獲登文陛以望清光者萬無一二焉戰栗惶怖言若不出諸口矧能劇談天下利病哉與陛下朝暮起居從事莫非左右前後便嬖近習之人一不審所擇則憸佞柔媚彚進於君側承風順指悅意便情有所不欲欲無不得有所不聞聞無不盡朝餌夕啖日浸月潤切於身則蠧性命之情延於外則移朝廷之政唐宦者仇士良嘗語其輩人君不可令閒暇暇必觀書見儒臣而又納諫智深慮逺減玩好省游幸吾屬恩且薄矣莫若以財貨鷹馬毬獵聲色蠧其心極侈靡使悅不得息則必斥經術暗外事萬幾在於我矣此尤見便嬖近習其不擇之害有至於士良臣望陛下諦思孟軻之言以求多士之助佩周公之訓戒雖攜僕必惟其人觀士良與其輩計密驗朝夕從事便嬖近習之忠佞如是則貨財鷹馬毬獵聲色之欲適萌於心左右前後既無逢迎之人朝夕從事莫匪端人善士雖欲為之不可得已夫言不及大而論小事不該逺而涉邇非所當及也然小者大之基邇者逺之積知微之君尤所當戒陛下思之毋忽欽宗靖康元年邇英殿說書楊時論不可復近奄人狀曰臣竊考自古奄人用事未有無後患者漢唐之末是也漢之竇武何進以肺腑之親因天下怨怒收攬英豪如李膺陳蕃輩共起而除之卒不勝皆駢頸受戮唐之昭宗信狎宦者至有東宫之幽其為歷世之祻大矣國家用童貫握兵為國生事二十餘年覆軍殺將朝廷不得聞中外耗竭而貫之私藏厚積不可以千萬計人怨神怒馴致今日陛下之所親見也臨御之初謂宜屏去此曹使與輿臺皂𨽻服掃除之役而已不可復近比聞防城所仍用奄人提舉授以兵柄此覆車之轍不可蹈也使氣焰一熾則後不可制矣恩幸持權貪叨得志上皇晚雖悔悟而追救不及不可不鑒也時又上疏曰臣竊見自古奄人用事未有無祻者漢唐之末是也比年以來此曹氣焰尤盛皆緣蔡京王黼輩首為亂階開通交結假以重權使相應援僥幸之門一開至不可遏童貫握兵權於外梁師成擅大柄於內陶鑄將相垂二十年其餘恩幸持權肆為貪暴故人怨神怒幾致喪邦原其祻根皆蔡京王黼輩為之也陛下即位天下響應異時之為惡者碎於國人之手投哀請命乞寄官資不煩芟夷而隂自消伏似非人為實出天意此宗社之福生靈之幸也人無賢愚莫不稱慶比聞外廷之臣有懷姦患失務為身謀而不為國家逺慮者復效京黼輩所為隂謀交結漸令用事以陛下之英明剛斷又嘗親見其弊宜無有此然臣竊有疑焉伏見梁平李彀之徒皆持權自若氣焰復熾未識陛下亦嘗察其所以然否乎臣謹按梁平嘗為大理寺開封府承受結為隂獄殺無罪之人不可數計罪盈惡貫人所切齒陛下之所知今復處之御藥院果何意耶李彀嘗管幹京城監造軍器姦欺侵蠧無所不至近興復濠之役調夫數萬減剋口食殘虐百端役夫至於殍踣逃亡亦不可勝計近在國門之外陛下其亦聞之乎至於直下元豐庫取珠子及送親事官於開封府處所之類並不經由三省外議亦以為皆宦官為之故態漸長使陛下受疑於天下所繫豈小哉臣謂省臺寺監百執事者初不乏人何苦信用此曹駕覆車而履其轍也如邵成章輩人或稱之以為稍賢於其徒然此曹縱賢亦不可用但使之服掃除通詔令可也蓋外廷姦臣一見其用事則向風觀望隂以為肘腋腹心之託內外相應馴致祻災非特不利於國亦非所以利此曹也大抵此類善伺人意巧為便佞浸潤膚受尤難隄防自非監古視今以為深戒日多漸漬未有不為所惑者祻亂之機發於至微漸不可長拳石之多積而為邱山不可不謹也宦女之祻古人所戒著在方册非臣私言謹取五代史書宦者傳繕寫進呈伏望燕閒之際一賜覽觀永為龜鑑天下幸甚右司諫陳公輔論宦人蠱惑人主狀曰臣聞宦寺之亡人國家其來已久漢自和帝後中官始盛至靈獻之時極矣故袁紹誅常侍以逞志然曹操因之漢遂以亡唐自明皇後中官始盛至僖昭宗時極矣故崔嗣血軍容以甘心然朱溫因之唐遂以亡大抵假威柄于外以內攘姦人則大臣愈專主權愈卑譬灼火攻蠧蠧盡木燒漢唐之亡皆由此輩豈不哀哉恭惟本朝祖宗積德深厚其歷年之長固非漢唐可比比年以來國家承平宫廷使令日益增廣加以財用富足而橫恩濫賞覃及閹寺故宦官由之而盛竊弄威權恣為姦狀雖朝士大夫憤疾之甚曽無以處之乃緣士庶伏闕獻書因而喧譁遂逞積年之忿殺害宦官二三十人不由朝廷命令不假威柄于人使此曹無所肆怨而氣勢稍衰與漢唐異矣此何以致其然耶實天祐我宋以延宗社無疆之福也陛下今日固當上承天意下順人欲因而摧抑此輩不使復振臣竊聞近來稍稍復用事如盧公裔王若沖邵成章之徒是已臣仰惟陛下臨御以來崇尚儉約聲色狗馬畋遊玩好一切屏絶此曹將無所肆其巧然大率宦人蠱惑人主決非一端唐仇士良謂人主不可使閒暇閒暇則觀書近儒臣故我曹不得進用而恩澤始衰本朝楊戩亦戒其徒曰汝輩不可令天子罷修造我所得恩澤及財物皆緣修造陛下觀此輩用心果可不防哉臣區區之心望陛下鑒唐之亡因今日之天意專以此輩為戒無使其乘間伺隙以移陛下聰明也至於進退人才尤不宜與之謀孔子不主癰疽孟子不畏臧倉賢人君子決不肯因嬖幸以圖富貴其所以附麗以進者貪叨無恥巇險逞欲之小人故前日蔡京王黼王安中等專倚此曹為重此天下所共知伏惟陛下留神於此日夜念之無忘小臣之言實宗廟社稷之福而天下之幸也御史中丞許翰上言曰臣竊考觀載籍自春秋以來國家昌大世祚綿永者惟漢與唐至於我宋方建萬世之統此近古之三代也漢唐亂亡皆坐內侍為我宋鑑可謂明矣是以不可不察漢唐之季世平積久人主不憂敵國外患而安於佚樂不親法家拂士而昵於近習於是奸宄得乘其間興宫室池苑壯麗之觀致妖冶靡曼傾惑之色以蔽其明為讒諂導諛險詖之辭奏囂塵淫放鄭衛之音以亂其聰諱避危亡之言緣飾隆平之事使之燕安豫怠廣侈無憂以壞其志而後扶輿骫骳以導之喜忿懟耻辱以導之怒祈求要請以導之施私相竊語一嚬一笑皆能隂陽人主之意使國家威福潜移於是太阿之柄始倒持於下矣其漸至此則各隨其世事勢之流相激生變為亂不同同歸於亡東漢祖尚名莭士大夫各持清議以爭之故其季殺戮忠良禁錮賢儶袁紹乘天下之忿起而誅之而後漢亡唐北司本兵權重東漢而士大夫莫與之敵是以世無黨錮之祻而帷闥之𨽻勢陵人主幽辱廢置無不如意朱溫乘天下之忿起而誅之而後唐亡本朝北司之盛殆過漢唐學士大夫凜凛久矣前日緣太學生伏闕論事數萬之衆不約而從發憤歡呼若天導之使北司之勢不誅而自折則袁紹不復施其謀而朱溫無所加其暴此所謂宗廟之靈社稷之福也書曰天視自我民視天聽自我民聽民之所欲天必從之是故上酌民言則下天上施陛下於何容心亦憲天而已矣凡退聽者無所歸怨而國制大定是乘一時之變而建萬世之利也而議者猶或非之夫前日但緣務專國是不酌民言鬱其忿怨以至於此漢唐之季變生豪傑其祻至於不可復救今國家徒以赤子啼號赴訴其枉一言撫之而萬姓返室懷仁歸德豈不賢於前世萬萬也哉此臣之所以為陛下賀也臣竊過計但慮事定之後邪說搖奪哀祈感動法不終守是以敢申言之謹按周官宦寺皆𨽻冡宰惟內小臣上士四人鄭康成以為異其賢者餘不過僅數十人未有登于下士者也是以內侍之祻不産於三代之前使國家能按今日之法而世守之則內侍得以保身延祀不罹誅殺於下而國家因之垂化定治不憂祻亂於上內外休寧不亦懿乎故願下臣章於內省揭示成憲永戒前非天下幸甚李光乞不用內臣管軍劄子曰臣歷觀自古進用奄人未有不致危亂者而兵權尤甚夙沙衛殿齊師殖綽郭最曰子殿國師齊之辱也區區諸侯之師使奄人殿之猶以為辱況天子之師乎自童貫秉軍政二十年將士零落殆盡開邊生事取笑四夷旋致今日之祻陛下躬履憂危亦可以鑒矣而談稹梁方平輩皆久握兵柄喪師辱國臣謂陛下更易弊事當如拯救焚溺訪聞二人復管勾城壁事豈倉猝之際士大夫果無足委任者乎雖差𫝊墨卿王㝢等提領緣此曹用事日久將士習熟但知中官不畏從官況敵人壓境朝廷舉措細大必聞非所以壯軍威而增士氣也伏望陛下出自睿斷早賜斥逐所有四城壁等事乞下行營使司專委從官添差文武臣寮同共管勾光論梁師成劄子曰臣伏覩敵騎內寇需索犒軍金銀陛下以宗社生靈為重屈意求和上自乘輿服御宗廟器皿下至民間首飾之物拘收殆盡大臣戚里之家不免直取獨未聞宦官能體陛下憂勞之意者近年以來宦官用事或殖貨利或治宫室或開拓邊境或進退臣寮皆能竊弄威權以厚自封殖此陛下耳目所及不復縷陳其專權擅勢桀黠尤甚者莫如梁師成師成用事日久能作威福計其家資無與為比當此危急之時獨不在直取之數臣切惑之臣謹按師成出入禁掖踰二十年罪惡貫盈不可悉數方蔡京王黼相繼用事朝綱隳壞賄賂公行姦邪朋附而為之用忠賢擯斥而不得進師成與之締交關通表裏蒙蔽引用浮薄布滿中外依慿城社玷辱聖朝以至海內怨嗟飬成今日之患迹其罪惡久合誅夷方陛下踐阼之初聖政日新一時憸人咸知退縮而師成偃然居中執政大臣慮其狡獪多計恐一旦復得進用莫敢動搖伏望陛下斷自淵衷以師成付有司籍其家資窮究姦慝以正刑典因以風厲黨類庶有懲革實天下幸甚高宗時左正言鄧肅上疏曰臣近准尚書省劄子奉聖㫖令送臣僚所論二章付門下後省其一章論臺諫之職不可觀望其二章論宦官之盛不可不戒臣竊鼓舞以為中興之道正在此也恭惟陛下臨御以來所用黃門比之上皇僅百之一比之淵聖僅十之一是陛下於北司蓋未嘗不戒也然小人無知尚有敢循舊轍者陛下既責臣以言臣敢默默乎臣於初十日侍班殿下有肩輿而至橫門者羣臣吐舌莫敢誰何嘗試遣人詢之曰內臣陳良弼也臣切謂百官下馬外門徒步而入雖雨作埿深滅足沒跗未嘗敢以為勞蓋君臣之分不敢廢也良弼何人敢尓驕傲雖宣和以前宦官最盛不聞童貫梁師成等敢用肩輿輒入橫門者今良弼之寵方之童貫等無萬分之一便敢輕視朝廷失禮如此傳之天下有損聖德臣竊痛之或曰良弼病矣不能徒步臣以為不然豈有不能徒步於橫門之外而能徒步於橫門之內者乎又曰汴河久涸運漕不至良弼一出則黃流瀰漫一時之功不可闕也臣又以為不然若恃微功便忘分義則趙普之流當乘肩輿以登太祖之庭矣或者又曰恐得聖㫖然後敢尓臣又對之曰此決無是理也朝廷之儀定於太祖陛下孝德上追虞舜豈忍以一黃門之故輕變祖宗之法乎臣愚伏望聖慈明正典刑以示懲戒不惟消患於未然亦所以弭天下之謗也惟陛下留神趙元鎮乞抑內侍奏曰臣前日奏事殿中伏奉聖訓以言官張致逺論列士大夫有隂結內侍者陛下既駭且怒以謂此風寖不可長宣政之祻流毒至今不可不戒宜降詔開諭且令有司立法禁止臣待罪宰輔親承玉音仰見陛下不惑於甘言無狃於近習洞鑒覆車之迹灼知滋蔓之端好惡一分邪正自辨帝王盛德事也雖然小人無他志在進取不復顧藉至於壞風俗紊紀綱唱讒佞之風塞公正之路以及於喪國亡家之祻皆所不恤兹宜可畏歟今雖有所斥逐而潜形祕跡人莫得知物論所譏聖心未晤者臣不知其有無而亦不能保其必無也臣願陛下力懲而亟革之與其沮遏波流孰若絶去根本之為愈臣嘗見齊威王封即墨大夫故事及本朝歐陽修奏疏仁宗皇帝其議論事迹皆可稽考謹録在前用見臣區區將順之意亦因以獻規於陛下伏幸寬仁察斯忠懇孝宗時吏部侍郎李椿乞裁抑中貴奏曰臣聞憂先於事故能無憂事至而憂無救於事臣私憂過計願先事而憂之庶幾乎無憂也宦者論曰宦者四星在皇位之側蓋中門之禁女宫之戒審門閭謹房室不可無也故宦人之在王朝其來舊矣臣伏覩熙寧五年詔書莭文前後省內臣轉至承制崇班內常侍許進一子與下班殿侍三班差使內侍省東西頭供奉官殿頭許進一子與下班殿侍諸班內品更不許進入內內侍省所管諸班內品每年通許進五人餘悉仍舊內供奉官已下至黃門如願進外官者比內侍省遞加一等推恩其內臣諸司使副合該奏兒男充前班者今後更不進內臣時上諭樞密院曰方今宦者數已多而𨽻省者又不入內空絶人之世仁政所不取且獨不可用三班使臣以代其職事乎臣以此仰見祖宗好生之德不惜加等推恩以全人之生世德至渥也臣不識今尚守此法與否但見中官比之陛下初即位時人數漸多其勢頗盛臣又見近年有中官失火者蠶室中燒死小兒可見宫刑之室宦官之家皆有之臣又聞蠶室中小兒十不得四五少得生全者豈稱祖宗好生之德臣慮陛下所未聞也切緣自古宦官之盛衰繫有國之興亡臣不敢逺引漢唐之祻切見宣和之末童貫等罪惡貫盈軍民怨入骨髓京師百姓羣起而攻宦官殺之者不可勝數旋致靖康之祻建炎間王淵交結宦官不恤軍士遂激成苗劉之凶逆軍士求康履殺之併及其黨遂致明受之變前轍不逺言之痛心蓋宦者體膚既毁性情柔忍猜疑驕妬不期然而然其間雖有忠直之人亦多衆所不容所以互相視效憑恃浸潤交結受賄以資相髙享用過厚水陸厭飫侵漁百姓興建第宅連亘街陌始則人畏之極則人惡之畏且惡以致羣起而攻之上貽國家之憂仰惟陛下神聖在上宦者雖漸盛人雖畏之未甚惡也於此時有以裁制之不至于極則永無前日之患於宦者亦保富貴與國長久此臣所以欲先事而憂者也裁制之道臣願出於聖斷官置蠶室選精於其事者掌之應進子者申奏并保乳入之俟平復賜其家如或不育願再進者聽之再進不育是上天不許也即聽進外官以為後以絶隂暗傷生之害其委付差使門禁宫戒之外毋使干預人材政事嚴禁士大夫及兵將官與之交通者稍遵太祖皇帝之制官品高則外補易曰君子思不出其位謂艮為閽寺也閽者止於門寺者止於巷聖人之戒深切著明不可不察也臣非不知言出祻生臣自念荷陛下恩遇特異不知所報故惟有忘身徇國庶幾萬分之一如臣言可採乞出於睿㫖施行祕書少監趙汝愚乞罷陳源添差總管奏曰臣先凖中書門下省送到録黃一道承樞密院關十一月十八日奉聖㫖恭奉太上皇帝聖㫖提舉德夀宫陳源為應奉有勞可特與遙郡上轉行兩官臣伏覩陛下天性仁孝欽承太上慈訓兢兢業業惟恐不至故臣仰遵聖意即已書讀了當然當時實不知陳源别有兼職今再凖録到告詞其後擬稱陳源可特授永州防禦使依前右武大夫特添差兩浙西路馬步軍副總管臨安府駐劄提舉德夀宫臣竊惟陳源係內侍而得參預一路軍政臣不知其始自何年除授然其事體重害漸不可長要非太上建炎詔書之意臣請為陛下誦之臣嘗讀建炎三年詔書自崇寧以來內侍用事循習至今理宜痛革自今內侍不許與主管兵官交通假貸饋遺借役禁兵當是時內侍與兵官交通借役禁兵且猶不可今乃假以一路揔戎之任臣恐非太上所以防微杜漸之意也臣伏思神宗皇帝時始令王中正李憲稍預邊事是時朝廷法度峻整若無甚害而卒之夤緣攀援竟成童貫開邊之祻靖康之變至今言之使人心折陛下安可視今日若無甚害而遂忘前日之戒耶臣愚欲望聖慈特降指揮除遵依太上皇帝聖㫖與轉行兩官外所有添差兩浙西路馬步軍副揔管職事特與解罷以為萬世子孫無窮之法以成太上建炎詔書之意宗社幸甚光宗即位楊萬里召為祕書監入對曰古之帝王固有知以一已攬其權不知臣下竊其權大臣竊之則權在大臣大將竊之則權在大將外戚竊之則權在外戚近習竊之則權在近習竊權之最難防者其惟近習乎非敢公竊也私竊之也始於私竊其終必至於公竊而後已可不懼哉寧宗慶元元年大府寺丞吕祖儉奏曰臣恭惟本朝立國之規模所以上接乎唐虞三代之統紀而逺過漢唐者非假夫强大威力也非資夫權謀術數也獨恃夫君子以為固而已然君子之能為固豈有他哉亦以其議論氣莭可以培根本而支變故也國家中興遹追慶歷元祐之言論風㫖固有以開紹興之正論然自秦檜用事導諛成俗近嵗安靜和平之說復壞人心議論氣莭或幾乎息而立國規模終不可忘紹熙五載夏秋之交海內皇皇天未悔祻小大之臣盡誠勠力大明繼照危而復安則陛下固已親見所恃以為固者而下改元之詔矣始政清明登用忠直天下之心蓋將日望維新之政今日月曽幾何而人之觀聽則有異焉講席之臣或閔其耆艾而使之歸或因其論事而許之去臺諫之官或以舊學有勞而優遷或以繁難闕守而補外中批屢下㫖意難明想謂陛下之心祗欲昭示獨斷以防蔽欺而不知我之操柄則已潜有所移矣夫外廷與內廷之勢殊而君子與小人之情異左右前後之人地近情親巧於伺候外示畏謹陽若無他黜陟廢置間得關預時獻微益或可施行雖威福權柄如自上出而盜竊賣弄則益難知彼外廷之欲盡言者則共指為矯激外廷之欲論事者則共指為過當由是列于庶位者類多逺嫌避事鮮克分明斟酌調娛務為得體議論氣莭日就消衰常時既難盡其心緩急必將失所恃天下大物也設官分職所以維持也聽外朝以為公恃君子以為固然後能守而無失若乃嬖近暬御所知不逺寧免循私非使人主不信外廷則無由可以擅寵矧今國勢甫定人心猶搖嵗事有饑饉之憂敵國有窺伺之迹信任君子猶懼弗濟儻或失職又將疇依伏望陛下監觀本朝立國之規模惟念總攬權綱之要道外廷情實固宜致察內廷姦欺尤當深防絶去私邪之門使得自保寵祿闢開公正之路使得展布腹心夫然後朝廷尊安君子遂志議論氣莭足以圖回實政强壯本朝而可馴致慶歷元祐之治矣臣志在愛君不遑他恤惟陛下裁赦理宗即位國子祭酒喬行簡上疏曰向者陛下內廷舉動皆有禀承小人縱有蠱惑干求之心猶有所忌憚而不敢發今者安能保小人之不萌是心陛下又安能保聖心之不無少肆陛下為天下君當懋建皇極一循大公不應私徇小人為其所誤凡為此者皆戚畹肺肝之親與近習貴幸之臣奔走使令之輩外取貨財內壞綱紀上以罔人君之聰明來天下之怨謗下以撓官府之公道亂民間之曲直縱而不已其勢必至於假采聽之言而傷動善類設衆人之譽而進拔憸人借納忠效勤之意而售其隂險巧佞之姦日積月纍氣勢益張人主之威權將為所竊弄而不自知矣陛下衰絰在身愈當敬戒宫庭之間既無所嚴憚嬪御之人又視昔衆多以春秋方富之年居聲色易縱之地萬一於此不能自制必於盛德大有虧損願陛下常加警省景定四年禮部侍郎牟子才論董宋臣不當除押班奏曰臣十年憂患分老山林蒙陛下收召復置諸禁近之列常恨糜捐未足補報今既數月矣不敢出位有所敷陳者蓋以陛下自更化瑟內撫外寧衆正咸集羣憸悉除而又穡事告登文治具舉靖共尓位臣之分也近日以來在廷之臣學校之士乃以內臣之復用連章公車紛紛未止臣意陛下之用此人不過念其平日給事之勞抆拭而用之耳而諸臣深憂思慮則以其前轍之可監而慮其舊態之復作謂今寵以押班之任而日在陛下左右譬如木之有蠧蠧在中而木不覺其腐禾之有蟲蟲在心而禾不覺其槁雖陛下諄諄開諭而學士大夫之惑終不可解也臣靜觀數日間諸臣或以此而決去就者陛下宣召而復留之大臣為國家大體計為保固局靣計為憂惜諸賢計所以扶持而安全之者無不盡心焉竊意一堂都俞之際必有深長之思果斷之決使天下無可復議朝廷庶可妥安而老臣又何所容其喙然竚乎有聞而猶未也但聞諸臣欲去者猶未肯留已留者猶未忘去而輿議之遍責於在位者略不少恕焉臣謂陛下昭昭聖明如此大臣孜孜啓沃如此其於此事轉旋闢闔蓋亦甚易微臣愚見不無望於陛下早有以處此庶幾一枰全安而無奕子動搖之虞風休雨止而有安恬泰定之勢此宗社之幸生靈之福也臣甫出獲穽非不欲懲羮吹虀保全末路深恐上負明主下負夙心用敢冒昧一言惟陛下幸赦五年子才為給事中繳李忠輔奏曰臣伏覩臺臣論列閣長李忠輔奉御筆李忠輔降兩官降罷臣有以見聖慮深逺天斷奮發蓋將昭大公而毖後患也臣惟成周之制閹人守中門之禁寺人掌女宫之戒未嘗畀以事權所以遏其蠧政害事之漸自漢以來恭顯之用事專恣朝臣之側目畏憚亦既任以機要又何以禁其長祻流毒之慘此防微杜漸者之所當深慮蓋內轄一司自來止以小璫為之取其服勤恭謹易以禁制又以三年為任不使之日增月益聲生氣長以貽害無窮惟董宋臣自小璫至於大官二十年間皆兼領此職權傾中外恣為姦利至今得罪公論故每有除授人言交攻忠輔乃其所薦根株此局以為依憑凡其奸犯科條誣上行私之事皆出其所教而忠輔新進氣鋭為術轉深為害愈烈大作威福動稱聖㫖帥漕兩司奉行惟謹其妄生羅織使人破家蕩産往往死於非命權則歸已怨則歸君而甚者窺覘中詗揣摩密報曲為恩幸之地陛下灼見其奸奪其內轄職事遂降指揮內轄以三年為任立為定制又以臺臣之言降官放罷天下莫不仰陛下之明斷但觀臺臣所論則忠輔處心積慮傾險反覆可畏又有甚於前之所陳使罰止於此安知其不復出為惡耶且宋臣未嘗不罷也而又復用未嘗不退也而又復進使其不死祻且不歇抑亦可以為監矣比者城中欎攸既始於宋臣之屋城外煙焰亦發於忠輔之家今陛下施行忠輔而宋臣適死於數日之間意者惟天惟祖宗望陛下盡取二十年祻根亂本一掃而空之雖宋臣死灰無復然之慮而忠輔則虎兕有出柙之憂倘陛下盡行臺臣所乞屏斥之言以絶其根實惟天惟祖宗之意而陛下子孫萬世無疆之福也所有將來録黃係經臣書讀用敢冒昧先具奏聞金哀宗時近侍干預朝政翰林直學士兼左司郎中實默愛實諫曰今近侍權太重將相大臣不敢與之相抗自古僕御之臣不過供給指使而已雖名僕臣亦必選擇正人今不論賢否惟以世胄或吏貟為之夫給使令之材使預社稷大計此輩果何所知乎歷代名臣奏議卷二百九十三
