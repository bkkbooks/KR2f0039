body:
  text: 歷代名臣奏議卷五十七明楊士竒等撰治道宋光宗時彭龜年上論正始之道疏曰臣仰惟陛下嗣無疆大歷服逾年改元於是奏告天地宗廟社稷非細事也臣嘗推原古人紀年之意不謂之一而謂之元者元善也所以明人君體元之道在善其始也今日陛下繼天地之德衍宗社之慶慰夀皇之心答臣民之望視始正本實在於此草茅小臣獲對清光適際斯時區區愚忠偶有所見輒敢條列以上仰報聖明唯陛下財幸臣聞心者身之始身者家之始朝廷者天下之始元子者萬世之始於其始而知所以正之體元之道無餘事矣何謂心者身之始身聽於心者也心一動而身隨之不可不正也然聖人所謂正其心者亦去其所以害心者而已是以大學曰身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正蓋感於物者稍偏則動於中者皆邪在常人尚且不可而況人君乎陛下聖學髙明其於正心必有道矣臣猶碩陛下日日察之念念察之使忿懥恐懼好樂之類皆不足以動其中則陛下之心即堯舜禹湯文武之心也使數者茍有一焉則其發用之間或有以害夫清明之體而於酬酢萬變宰制萬事統御萬國恐亦難矣昔范純仁有言君心欲如槃水常使平正而無所趨向則免偏側傾覆之患斯言可謂得人君正心之道惟陛下念之何謂身者家之始大雅之歌文王曰惠于宗公神罔時怨神罔時恫刑子寡妻至于兄弟以御于家邦家之難齊也如此以文王之聖尚且待神無怨恫而後能使其家刑焉是必無一毫之愧於身乃可舉一家之政于內故賜豫私則僥幸之路啓寵幸私則嫉妬之害生用度不節則儉約衰法制不嚴則名分僭今日宫庭未必有是設或燕閒之際少懈隄防深虞間隙之開便難窒塞在陛下謹之而已耳何謂朝廷者天下之始大抵天下之事當出於一出於一則有所總統而天子之勢尊不出於一則無所總統而天子之勢䙝世言漢武帝以九卿之權間宰相宣帝以天下之務在中書為得駕御臣下之術不知政出二門實妨理道臣恭聞本朝仁宗皇帝英識偉度三代而下一君而已事出獨斷何所不可而權要請託每以大臣為辭實以此門一開姦徒百出深謀逺計近世所無此陛下家法也崇寧奉行御筆乃小人盜權之術此陛下近監也臣竊聞陛下即位之初所施行事間出中旨雖睿智所及多中事情然憂國之臣未免過慮近日此塗漸塞朝綱寖清臣碩陛下長守此意使朝廷政事常出於一得則功歸於上而陛下受從善之名失則責在於下而陛下免徇私之謗體正事順莫便於斯如此而後朝廷可正而天下之治可得而舉矣何謂元子者萬世之始臣聞詩曰君子萬年永錫祚𦙍祚𦙍古人所甚重也是以自初生至于成人教之皆有方法古者父子雖曰異宫然文王之為世子也日問安於寢門之外則其相去當不甚逺嘉王陛下之元子宗廟社稷所繫非輕而今遽建邸於外自此居處之易察恩意之易浹教誨之易行當不如前日在陛下之側矣陛下雖簡擇僚友謹選左右然傅相之士少侍御之人多傅相正而難親侍御近而寡正從違之頃賢否便分皇子雖天資頴特敏於為善萬一薰染積習之餘或移岐嶷沖和之性臣恐不能不重陛下宗廟社稷之念也臣竊見司馬光請以皇子伴讀官提舉左右前後侍御僕從之人如有巧佞讒諂者許令糾察其言極切事情臣碩陛下舉而行之大要使府僚之勢重於侍御道義之訓密於宴遊則萬世之本可得而正矣臣州縣小吏不識忌諱輒肆狂妄輕議家國罪當萬死惟陛下赦其愚戅龜年又上論車駕過宫愆期視朝爽節章奏壅滯疏曰臣備數校文自入鎖闈不通外內財三十五日耳既出試院凡達於耳目之事乃有甚可駭者自一人之身至於天下之事或廢而不舉自內庭至于外朝若漫無紀綱之足恃自大臣至于百執事皆有栗栗不自安之意軍達于行伍民達於閭閻其言至有不忍聞者雖不足盡信亦有不容不疑者也詰其所以然則不過陛下近不過宫及御朝爽節章奏不下此其可指者耳夫過宫事親之小節也今兩宫之情如春風和氣安有微隙晨昏定省少或不講在父子真情之間何嘗較計此瑣瑣哉但有不可得而已者陛下事親自視孰與周文王文王朝王季且日三焉而陛下歷月不過宫可乎是不可委之以為偶然而已視此以為偶然則其它以偶然而罷者亦必猶是也陛下試觀大廷朝會羣臣小不謹於禮此豈真有不畏其上之心而朝廷之儀不得輕貸者誠以上下之分恐因是遂陵遲故爾吾以是責人則人豈不以是望我而可謂吾天性之愛不翦翦於是可乎夫一不過宫直以為有損於孝固不可然今世之所謂孝者曽不過如此等事於此一有不謹無怪乎議已者之云云也何也吾之所謂實然者誠未有以大信于人則捨禮文之間抑何所見其果孝與否孝經曰敬一人而千萬人悅夫敬之而能使人悅如此則反是豈不足以招其怨且尤乎竊聞近日臣僚抗章論奏如出一口彼誠不忍陛下父子初無纎芥而遽遭此籍籍口語故不憚斧鑕傾心告上非是羣臣看得此事太重自是陛下待得此事太輕此在陛下非有所難抑何憚而不為而忍以一己動天下之疑犯天下之議乎至于御朝之節自有法度內之起居則節於內侍外之起居則節於閣門陛下近日斥責內侍微過必舉所以此輩寧無異心陛下啓處之間儻或爽節不特避禍者畏陛下而不敢言懷姦者未必不幸陛下而不言也嘗讀庭燎之詩至夜如何其夜未央庭燎之光君子至止鸞聲鏘鏘然後知古之人君固望其臣之來朝而數期以待之也至於罷朝則使人問大夫大夫退然後適小寢則古者人君動止皆以臣下為節今千官百辟垂紳搢笏儼然在廷側耳警蹕移晷不聞所謂敬大臣體羣臣之經果如是乎縱曰彼皆士大夫必不敢怨其上若持㦸而衛殿階操挺而扈屬車者皆赳赳無識之徒爾吾之所以服役之者不特以利蓋有義存焉彼但見陛下事親在於過宫治政在於視朝陛下一不過宫便以為陛下不能事其親一不視朝便以為陛下不能治其政紛紛之議此不足怪彼心一動邂逅之間直有可慮者陛下不可以此輩戀斗升之祿而以無能為輕之也若夫章奏所以達下情茍非大臣誰能日日進對其他臣僚所賴以獻替者唯章奏耳漢制凡臣下奏事雖不行亦必報聞罷謂之報聞罷者蓋欲其人知其言之已達也主父偃上書武帝朝奏莫召入其速如此近日臣下奏議多留中不出若使事事得徹睿覽其間有所去取固未為害萬一奏入去處或有留滯陛下既不得知臣下又直以為其言不行無從詰問因循積習漸致蒙蔽緩急之際豈不殆哉此事陛下尤不可不關聖慮也臣愚欲望陛下不間寒暑無爽過宫之期益嚴起居無失御朝之節凡有章奏悉下大臣平章事屬機密者自當關防或有施行者令其覆奏如此而人心不安人言不息臣當受妄言之誅臣聞近日臣僚見陛下如此等事頗動人心往往多有諫疏此皆是愛君憂國之深唯恐陛下微有玷失故捐身開䇿不自顧惜自非忠實豈能如此陛下雖容受聽納未嘗少忤然切身之事人所難言在朋友尚欲善道而況於君父臣慮它日小人或有指摘此等臣僚以為暴揚陛下之過則凡今日論諫皆足為罪萬一出此則人心愈動將不止如今日而已此事尤繫國家利害安危臣故於是復瀝血以告唯陛下財擇焉龜年又上論人主用心立德用人聽言四事疏曰臣仰惟陛下始初清明宵旰圖治用心懇惻視古碩治之主不足多也萬口一辭皆謂太平可以立致而臣區區之愚獨有憂焉臣聞伊尹告太甲曰今王嗣厥德罔不在初召公告成王曰王乃初服若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年臣謂今日政陛下之初也如子之生或善或惡皆在今日是可不兢兢業業自貽哲命乎夫用心有義利立德有誠僞用人有邪正聽言有是非此乃命吉凶命歷年之所自出者陛下於此政當審所取捨一有不謹吉凶便分臣敢為陛下條列陳之惟陛下垂聽臣所謂用心有義利者大學推明明德於天下要其極不過於正心而心之正不正則繫乎所存義利之間耳何謂義曰出於吾心之誠然而不能自已者是也何謂利曰不出於吾心之誠然而有為為之者是已且如孝於父母是吾心之所不能已者也義也若以不孝於父母為父母之所譴責為天下之所譏議而後為之則是有為而然而非義矣以至親親尊賢子庶民臨天下亦莫不爾故臣願陛下凡所舉措凝神熟思果非有為為之也則此心之動無非義矣涵養推廣無使間斷果有為為之耶則此心之動無非利矣抑遏止絶無使發露如此等事時時有之但當使一日之間一念之發有所為而為之事漸少無所為而為之事漸多積久習熟自然去王道不逺矣何謂立德有誠僞誠者實理也凡事從實而為之則為誠不從實而為之則為僞書曰作德心逸日休作僞心勞日拙夫作德之所以日休者以其實也作僞之所以日拙者以其不實也唯其實故患難中為好事逸樂中亦為好事為之初不待勉彊不為亦不必遮護此所以日休唯其不實故時暫為好事久則忘之矣見人則為好事無人則忘之矣雖勉彊而終廢雖遮護而終敗此所以日拙不特如此而已也實則常自處以不足故聽言納諫唯恐不及不實則好示人以有餘故文過飾非無所不至臣仰惟陛下純實之性出於天禀與臣等語前後可覆此固有帝王之資矣然今日既登大寶則非前日比也聲易恣於耳色易恣於目安逸易恣於肢體芻豢易恣於口腹耳目口體之欲一縱則唯恐迹著而人知人知而議已則前日之實反為不實不可知也此臣所甚慮也故臣謂陛下欲保前日之實必杜今日之欲欲不縱則君道實矣君道實則天下安矣何謂用人有邪正臣聞富弼曰人主無職事唯以辨君子小人為職於君子小人不能辨則人主之職廢矣然自古人君孰不欲親君子逺小人哉卒之各賢其臣不自知覺以君子為小人以小人為君子如漢元帝者總總也仰惟陛下潜德王邸固以知人為難臣嘗記陛下問臣畢竟君子小人如何辨臣告陛下曰中庸所謂取人以身修身以道修道以仁者此知人之要法也故人君必先治己之情性而後能知人之情性故情性與君子近則所用者必君子情性與小人近則所用者必小人人君欲辨君子小人莫急於治情性所謂治情性則臣前所陳是也何謂聽言有是非甚矣言之難聽也以為利而或害焉以為善而或惡焉人君如何其辨之也夫民衆聽之則聖獨聽之則愚聽言者能以是察之思過半矣故公共之言易識私獨之言難信傳曰公生明偏生暗又曰偏聽生姦獨任成亂政謂是也今人君出而與宰執議政既出則有給舍省審臺諫論列何從而不公入而與近習論政既出則直以一人之意行之宰執不能回給舍不能繳臺諫不能論何從而不私陛下天錫睿智超冠百工初臨大祚想無此患但以舜之聽明而猶堲讒說則在陛下其可不謹耶臣前日親聞玉音宣諭講筵事謂內侍輩有諒暗罷講之說陛下却而不聽此葉公所謂不以小謀亂大作真社稷之福也臣願陛下聽言一一如此則何憂天下之不治雖然臣之所陳雖曰四事其實一原陛下儻能立此心以義則養德必誠用人必正所聽之言必無不是故臣謂陛下今日所最緊者在於以義立心而已然義最難精心最難正陛下方增置講讀緝熙聖學願與諸儒熟究之日就月將以為惠福天下之本不勝幸甚光宗以紹熙二年春有雷雪詔陳時政得失同知貢舉兼侍講陳騤上奏曰宫闈之分不嚴則權柄移內謁之漸不杜則明斷息謀臺諫於當路則私黨植咨將帥於近習則賄賂行不求讜論則過失彰不謹舊章則取舍錯宴飲不時則精神昏賜豫無節則財用竭皆切於時病吏部尚書趙汝愚上奏曰臣嘗讀書觀舜命禹之辭曰克勤于邦克儉于家不自滿假惟汝賢臣竊惟禹之神聖其功德豈易量哉然舜授受之際獨以勤儉為稱者何哉蓋儉以約己勤以為人為聖為賢實本諸此故舜之命禹必以勤儉為首也天祐我宋三世揖遜如堯授舜如舜授禹克勤克儉陛下亦己親傳而密受之矣臣請論其目則朝廷之政事不可以不厲精幾微不可以不深慮人才不可以不博訪邉備不可以不預修夜之所思旦之所行不忘乎是則勤之至矣陛下之飲食嗜好不可以不節嵗時用度不可以不省民力不可以不惜賜豫不可以不吝夜之所思旦之所行不異乎是則儉之至矣上以副重華付託之重下以為子孫萬世之法豈不休哉惟陛下留神幸甚陳亮對策曰臣聞人主以厚處其身而未嘗以薄待天下之人故人皆可以為堯舜而昔人謂其以己而觀之者天地之性本同也夫天佑下民而作之君作之師禮樂刑政所以董正天下而為之君也仁義孝悌所以率先天下而為之師也二者交修而並用則人心有正而無邪民命有直而無枉治亂安危之所由以分也堯舜二代之治所以獨出於前古者君道師道無一之或闕也後世之所謂明君賢主於君道容有未盡而師道則遂廢矣夫天下之事孰有大於人心之與民命者乎而其要則在夫一人之心也人心無所一民命無所措而欲論古今㳂革之宜究兵財出入之數以求盡治亂安危之變是無其地而求種藝之必生也天下安有是理哉臣恭惟皇帝陛下謙恭求治常若不及深念夫人心之不易正而民命之未易生全也進臣等布衣於廷而賜以聖問曰朕以涼菲承夀皇付託之重夙夜祗翼思所以遵慈謨蹈明憲者甚切至也臣竊歎陛下之於夀皇蒞政二十有八年之間寧有一政一事之不在聖懷而問安視寢之餘所以察辭而觀色因此而得彼者其端甚衆亦既得其機要而見諸施行矣豈徒一月四朝而以為京邑之美觀也哉而聖問又曰臨政五年于兹而治不加進澤不加廣豈教化之實未著而號令之意未孚耶臣於是知陛下求治若不及之心如天之運而不已也臣聞禹立三年百姓以仁遂焉推其本原則曰克儉克勤不自滿假而已今時和嵗豐邉鄙不聳亦幾古之所謂小康者陛下猶察其治之不加進澤之不加廣而欲求其所謂教化之實號令之意者蓋深知人心之未易正民命之未易生全也臣請為陛下誦君道師道以副陛下求治不已之心焉夫所謂教化之實則不可以頰舌而動之矣仁義孝悌以盡人君之所謂師道可也所謂號令之意則不可以權力而驅之矣禮樂刑政以盡人君之所謂君道可也夫天下之學不能以相一而一道德以同風俗者乃五皇極之事也極曰皇而皇居五者非九五之位則不能以建極也以大公至正之道而察天下之不協于極不罹于咎者悉比而同之此豈一人之私意小智乎無偏無黨無反無側以會天下於有極而已吾夫子列四科而廁德行於言語政事文學者天下之長俱得而自進於極也然而德行先之者天下之學固由是以出也周官之儒以道得民師以賢得民亦以當得民之一條耳而二十年來道德性命之學一興而文章政事幾於盡廢其說既偏而有志之士蓋嘗患苦之矣十年之間羣起而沮抑之未能止其偏去其僞而天下之賢者先廢而不用旁觀者亦為之發憤以昌言則人心何由而正乎臣碩陛下明師道以臨天下仁義孝悌交發而示之盡收天下之人才長短小大各見諸用德行言語政事文學無一之或廢而德行常居其先蕩蕩乎與天下共由於斯道則聖問所謂士大夫風俗之倡也朕所以勸勵其志者不為不勤而偷媠猶未盡革殆將不足憂矣若使以皇極為名而取其偷惰者而用之以陰消天下之賢者則風俗日以偷而天下之事去矣夫天下之情不能以自盡而執八柄以馭臣民者乃六三德之事也强弱異勢而隨時弛張者人主所以獨運陶鈞而退藏於密者也用玉食不可同之勢而察威福之有害于家凶于國者悉取而執之此豈臣下之所得而䙝用乎沈潜剛克髙明柔克以期刑法之適平而已吾夫子為魯司冦民有犯孝道者不忍置諸刑其說以為教之不至則未庸以殺而少正卯則七日而誅之蓋動搖吾民不可一朝居也周官之刑平國用中典蓋不欲自為輕重耳而二三十年來罪至死者不問其情而皆附法以讞往往多至於幸生其事既偏而平心之人皆不以為然矣數年以來典刑之官遂以殺為能雖可生者亦傅以死而廟堂或以為公而盡從之使奏讞之典反以濟一時之私意而民命何從而全乎臣碩陛下盡君道以幸天下禮樂刑政並出而用之凡天下奏讞之事長案碎欵盡使上諸刑寺其情之疑經者駮就寬典至其無可出而後就極刑皆據案以折之不得自為輕重則聖問所謂獄民之大命也朕所以選任其官者不為不謹而寃濫之數或未盡除殆將不足憂矣若使以福威在已而欲一日盡去其寃濫人之私意固不可信而吾能自保其無私乎不如付之有司之猶有準繩也聖問又曰意者狃於常情則難變玩於虛文則弗畏乎臣以為人主厚處其身而未嘗以薄待天下之人安有吾身之既至而天下之終不可化者乎臣碩陛下明師道君道以先之而已此所謂教化之實號令之意者也臣伏讀聖䇿曰且帝者之世賢和於朝物和於野俗固美矣然讒說殄行乃以為慮臣有以見陛下深知人心之未易正也昔者堯舜以師道臨天下茍可以教之者無所不用其至矣而說之橫入於人心者謂之讒說行之髙出於人心者謂之殄行人心之危說有以橫入之則受矣行有以髙出之則伏矣此所謂震驚而堯舜之所憂也故必有納言之官使王命民言交出迭入而得以同歸于道而天下之學一矣及周之衰天下之學爭起肆出不能相下而向之所謂讒說殄行者一變而為鄉原務以浸潤於人心自納於流俗天下之學既不能以相一而其勢不屈而自歸孔孟蓋深畏之以其非復堯舜之時所嘗有也碩陛下畏鄉原甚於堯舜之畏讒說殄行則人心之正有日矣臣伏讀聖䇿曰畫衣冠異章服而民不犯刑既措矣然怙終賊刑必使加審何也臣有以見陛下深知民命之未易生全也方堯舜以君道幸天下禹平水土稷降播種民固已樂其有生矣而臯陶明刑以示之塞其不可由之塗使得優游於契之教伯夷之禮天下之人皆知禹夷稷契之功而臯陶之所以入於人心者隱然而不可誣也後世之為天下者刑一事而已矣寬簡之勝於微密也溫厚之勝於嚴厲也其功皆有言而臯陶不言之功則既廢矣夫鞭作官刑朴作教刑金作贖刑眚災肆赦怙終賊刑官刑既於彼教刑又於此情之輕者釋以財情之誤者釋以令凡可出者悉皆出之矣其所謂怙終賊刑者蓋其不可出者也天下之當刑者能幾人後世之輕刑未有如堯舜之世者也碩陛下考堯舜之所以輕刑之由則民命之全可必矣而聖䇿又曰得非薰陶訓厲自有旨歟臣之所以反復為陛下言之者茍盡師道則薰陶在其中茍盡君道則訓厲不足言矣堯舜之所以治天下者豈能出乎道之外哉仁義孝悌禮樂刑政皆其物也臣伏讀聖䇿曰今欲為士者精白承德而趨向一于正為民者遷善逺罪而訟訴歸于平臣有以見陛下之未嘗以薄待天下之人也彼亦何忍以異類自為哉而聖䇿又曰名賔於實而是非不能文其僞私滅於公而愛惡莫可容其情則聖意不免於小疑矣然而天下之學貴乎正天下之情貴乎平其終固未嘗不歸於厚也夫今日之患正在夫名實是非之未辨公私愛惡之未明其極至於君子小人之分猶未定也伊尹論有言逆于汝心必求諸道有言遜于汝志必求諸非道其說近矣而漢之谷永其言未嘗不逆唐之李泌其言未嘗不順則人心庸有定乎孟子論國人皆曰賢必察見其賢而後用之國人皆曰可殺必察見其可殺而後殺之其說密於伊尹矣然為人上者何從而得國人之論也凡今之進言於陛下之前者孰不自以為是而自以為公哉陛下亦嘗察輿論之曰賢者而用之矣然而人之分量有限其心未能盡平也未能舉無私也小人乘間而肆言以為公力詆以為直陛下亦不能不惑之矣遂欲兩存之以為平薰蕕決無同器之理也名實是非當日以淆而公私愛惡未知所定何望夫風俗之正而刑罰之清哉陛下見其賢而用之舉動之小偏則勿行而已耳君臣故當相與如一體也何至存肆讒之人以恐懼其心志而徊徨其進退哉陛下茍能明辨名實是非之所在公私愛惡之所歸則治亂安危於是乎分而天下之大計略定矣風俗固不期而正刑罰固不期而清也清白承德遷善逺罪直其細耳而聖䇿又曰節儉正直之誼興行於庶位哀矜審克之惠周浹於四方果何道以臻此其要在於辨名實是非之所在公私愛惡之所歸其道則以厚處其身而未嘗以薄待天下之人而已陛下三載一䇿多士宜若以踵故事也宜若以為文具也草茅亦以故事視之以文具應之過此一節則異時髙爵重祿陛下不得而靳之矣陛下圖其名而草茅取其實此豈國家之所便哉正人心以立國本活民命以夀國脉二帝三王之所急先務也陛下用以䇿士則既不鄙夷之矣於其末又復䇿臣等曰子大夫待問久矣咸造在廷其為朕稽古今之宜推治化之本凡可以同風俗清刑罰成泰和之效者悉意而條陳之朕將親覽臣有以見陛下必欲正人心全民命以盡君師之道而自逹於二帝三王之治而後已顧臣何人豈足以奉大對臣竊觀陛下以厚處其身而未嘗以薄待天下之人既得正人心全民命之本矣而猶欲臣稽古今之宜推治化之本夫以厚處身之道豈有窮哉使天下無一人之有疑焉可也陛下之聖孝雖曽閔不過而定省之小奪於事則人得以疑之矣陛下之即日如故而疑者不愧其望陛下之以厚自處為無己也陛下之英斷自天不借左右以辭色而廢置豫奪之不常則人得以疑之矣陛下之終無所假而疑者亦不愧其望陛下之以厚自處為無己也雲上於天需君子以飲食宴樂而九五之需于飲食者待時以有為當於此乎需也豈以陛下之聖明而有樂乎此哉然而人心不能無疑也明兩作離大人以繼明照四方而六五之出涕沱若戚嗟若兩明相照撫心自失而不敢以敵體也豈以陛下之英武而肯鬱鬱於此哉然而人心不能無疑也臣碩聖孝日加於一日英斷事踰於一事奮精明於宴安之間起心志於謙抑之際使天下無一人之有疑而陛下終為夀皇繼志而述事則古今之宜莫便於此治化之本莫越於此同風俗以正人心清刑罰而全民命而明效大驗可以為萬世無窮之法其本則止於厚處其身而已詩不云乎維天之命於穆不已文王之德之純而子思亦曰純亦不已夫以厚處其身豈有窮哉臣昧死上愚對祭戡上奏曰臣聞治道貴清靜此先哲之格言也天下無事猶當以清靜理之而況多事乎多事之時而處以無事則事自定茍惟不然徒為膠膠擾擾事日益繁去治愈逺厥今天下可謂多事矣吉凶之禮迭舉宫室之役並興與夫使命往來之交馳諸軍犒賞之頻併是皆不得已者適丁歉嵗生民艱食陛下發倉廪府庫以賑救之此又大不得已者今太倉之粟左帑之金所餘無幾京府積鏹漕司羡緡耗用略盡州縣之間上下煎熬殆無生意人勞財匱莫甚於此時自今以往日幸無事猶懼不給萬一饑饉洊臻盜賊竊發或有意外之費將何以支為今日之計要當於不得已之中求其可已者已之可緩者緩之朝廷之上鎮之以靜重百執事之間守之以靖共州縣先於撫摩邉鄙貴於寧輯休息生聚年嵗之間國用稍裕民力稍蘇然後興滯補弊建利除害亦未為晚此國家根本之計惟陛下留神幸甚戡又奏曰臣竊見漢宣帝為西漢中興之主侔德商周求其所以致治之迹不過信賞必罰綜核名實樞機周密品式備具上下相安無有茍且之意而已考其成效至於威信夷狄功光祖宗業垂後裔何其盛哉恭惟陛下其仁如堯其孝如舜如禹之勤儉如湯之勇智又有文王之容德武王之義德兼二帝三王之美可謂盛德之君孝宣雜霸不足陳於前然今日之治未底孝宣之盛者臣竊惑之豈賞罰未盡信必名實未盡綜核耶樞機未盡周密品式未盡備具耶何其上下未免有茍且之意也凡今之仕者無非茍且內而百執事志在爵位多方以圖進計日以待遷不復以職業介意循常守故因陋就簡避嫌畏譏之不暇何暇為國家逺大之圖外而監司令守志在利祿唯恐所入之不豐所求之不廣至於職業能者不過趣辦目前規求近效以逭責免戾而已何暇為國家經久之計又況任之不久責之不專人知其任之不久也唯脫去是期幸其責之不專也唯退避是務間有有志事功者經營規畫未及就緒不以遷去即以罪罷矣烏能取效於旬月之間此所以茍且之俗尚熾而中興之功未立也今縱未能一一久任而責成至如主計之臣掌兵之官與夫監司帥守似不可以屢遷數易使之尸素而逃責也要當以三年為任凡朝廷所欲為者如屯田牧馬修城壁備器械課農桑興水利之類除授之初臨遣而面命之責成效於三年三年之中有過則削爵奪俸有功則增秩賜金無易其任三年之後然後核實之不愆于素則進用之因任之不如所言罪之可也竄之可也如此任之既久責之既專既不容茍且偷安以幸免亦不敢茍且欲速以應命三年之間何事不立何功不成孝宣之治亦不足進惟陛下留神省察戡又奏曰臣聞人主以天下為憂樂天下以人主為休戚天下無事則人主享其樂人主萬夀則天下同其休上下相關理之必然今日邉鄙無虞盜賊不作亦可謂寧謐矣無彊臣擅權無姦邪亂政朝廷亦可謂清明矣然而廟堂之上懦懦然常若有不測之憂百執事之間皇皇然不安厥職下而士民亦無和平之象陛下貴為天子富有天下當享天下之至樂臣竊料陛下亦未知所以為萬乘之樂此中外休戚之所關也宰執之敷陳侍從之獻納給舍之封駁臺諫之論列不無煩瀆聖聽皆其職分之所當然不能自已以臣觀之今日之事不過數端而已非有甚難特陛下一頥旨之勞耳陛下何惜不於談笑之間畢此數事使中外之人皆知陛下之心頌陛下之德以釋天下之疑以召天下之和上恬下熙共臻康泰陛下端拱巖廊之上優游無為享天下之樂天下賴陛下一人之慶豈不韙歟臣不勝大願戡又奏曰臣聞天人之勢雖若遼邈而休咎之證如符節之合君民之分雖若隔絶而交感之理如影響之隨天至髙而卑民至愚而神人君一嚬一笑一言一話皆足以動天聽感人心故一念之善則為祥風慶雲一念之差則為迅雷激電一政令之美則民在春風和氣之中一政令之失則民立烈焰層氷之上上下相應脉胳相貫有不期然而然者為天之子為民之父母其可忽諸粵自今夏以來災異屢見星變地震山摧川竭黑子貫日赤氛亘天上天之所示戒者不一而足近則都邑逺則畿甸閭閻無知之人興訛造訕公肆謗讟幸災樂禍唱言變亂無所忌憚人情訩訩朝不謀夕其勢甚危乃十一月十有五日車駕過宫親講問安視膳之禮都人欣快天意頓回和氣致祥瑞雪時降遍及淮浙罔不霑濡是月二十日皇太后冊寶禮成流傳四方舉同慶抃化悍戾為柔順變愁嘆為歡謠氣象霍然盡還舊觀天下耄艾萬口一詞歌詠聖德易危而安反災為祥在陛下一頥旨一舉足之易孰謂天道之難知人心之難感乎臣濫將王命迓客淮壖得之見聞歸美報上臣之職也臣所歷淮浙八郡蘇秀中熟常潤所收僅六七分自江而北絶長補短大率不減六分斗米不過一百五六十金錢會流通民旅安便盜賊不興邉鄙帖然此正陛下垂衣拱手優游無為兩宫交歡朝野多娛之日臣復何言臣區區愚衷竊謂陛下既鑒往事之明驗必思將來之永圖無以天幸為可常無以愚民為可忽曲盡事親之道示儀刑於有衆深究保邦之術消變亂於未萌戒諭執政大臣條舉天下滯務重地之闕帥者以時除授逺方之待報者以次施行聽任臺諫以振紀綱保全臣下以勵名節朝廷既正天下自化逺人自賔中外廓清無事兩宫萬夀備天下之養享天下之樂足以夸當年而髙後世書之史冊傳之無窮豈不韙歟臣不勝大碩戡又奏曰臣聞自古人君臨御之初必謹其始為人臣者亦必以謹始之說告於其君蓋國家安危之幾天下治亂之原生民休戚之本君子小人消長之際實係於此可不謹諸春秋書元年春王正月公羊曰元年者何君之始也穀梁曰雖無事必書正月謹始也故伊尹告其君曰今王嗣厥德罔不在初召公告其君曰王乃初服若生子罔不在厥初生古之君臣相與警戒莫不以謹始為先蓋人君體元居正南面以聽天下龍飛之初萬物之所爭睹四海之所具瞻一命令之發一政事之施必有以竦動天下悅服人心則天下之人翕然向風從化不令而行無為而治始之不謹其後雖有仁心善政良法美意人不信也仰惟陛下嗣膺大寶躬臨初政海隅蒼生傾耳囑目以觀德化而傒太平是以陛下宵衣旰食不遑康寧於謹始之道尤加聖慮伏覩求言之詔既詢訪於舊弼又咨諏於近臣既俾中外之臣咸得條奏又俾在廷之臣每日輪對此正初政之當急天下之士莫不披肝膽布腹心輸忠竭誠以副陛下􅈤惻之意況臣世受國恩身為宰士若隱情惜已不為陛下極言臣則有罪臣謹採掇自古人君謹始之道人臣謹始之說槩舉八事為陛下獻一曰正心術二曰辨邪正三曰廣聖學四曰來直言五曰戒游逸六曰崇節儉七曰恤刑罰八曰重名器皆隨解釋援古為證不敢飾為浮詞以瀆聖聽伏望陛下清閒之燕垂精留神特賜省覽或於初政可裨萬一謹列如左一正心術臣聞堯之傳舜舜之傳禹見於書曰天之厯數在爾躬爾終陟元后人心惟危道心惟微惟精惟一允執厥中見於論語曰堯曰咨爾舜天之厯數在爾躬允執其中舜亦以命禹夫三聖相傳心術之妙不過曰中而已漢武帝即位之初親䇿多士董仲舒告以正心以正朝廷正朝廷以正百官正百官以正萬民蓋上天之災祥下民之休戚人才之邪正天下之治亂係於人君之心一念慮之發雖若甚微幽顯之間其應如響惟人君者當宅心於正道之中非正勿視非正勿聽非正勿言非正勿動一心既正則邪佞讒諂不得而入聲色貨利不得而淫以視則明以聽則聰言可為則動可為法舉而措之則朝廷萬事無不歸於正四方逺邇無不一於正天下不足為矣二辨邪正臣聞舜初即政首舉十六相去四凶而天下咸服傳以為有大功二十禹臯都俞之際亦以知人為先臯陶又陳九德謂人君能知九德之人考察其真僞而信之上可以撫五辰下可以凝庶績蓋知人人君之盛德人君無職事惟辨君子小人而進退之耳君子小人之難辨也久矣讒諂面諛似忠乘機投合似智脅肩諂笑似恭小廉曲謹似賢排斥小人者似乎讒汲引善類者似乎黨面折庭爭者似乎訐難進易退者似乎矯人君智不足以燭之則君子小人並用而雜處交爭而互勝終必至於小人進而君子退此治亂之所由分也惟人君者要當精鑒詳察審其賢者聽任之而勿二知其不肖者廢斥之而勿疑內君子而外小人使之各安其分則人君之能事畢矣天下其有不治乎三廣聖學臣聞商髙宗嗣位之初傅說告之曰王人求多聞時惟建事學于古訓乃有獲又曰惟學遜志務時敏厥修乃來又曰惟斆學半念終始典于學厥德修罔覺詩人進戒嗣王曰日就月將學有緝熙于光明佛時仔肩示我顯德行詩書所載臣之告其君必以學為先蓋人君不可無學學者學治天下王者之事故堯舜禹湯汲汲仲尼皇皇此所以聖益聖明益明也昔唐太宗貞觀之初引十八學士於禁中論古今成敗諷誦詩書講求典禮咨詢忘倦以至夜分嘗謂虞世南曰使我稽古臨事不惑者公等力也臣碩陛下於廷臣中遴選忠信端良博雅多聞之士使備勸講無限員數無拘資格更畨遞直退朝之暇引之便坐講求經術咨詢治道因訪民間疾苦吏治得失假以溫顔接以誠意俾盡其情如是則聖學日益聖政日新雖深居九重而周知四海豈小補哉四來直言臣聞舜受禪之初咨于四嶽闢四門明四目達四聰傅說復于王曰惟木從繩則正后從諫則聖故元稹上書於憲宗初元謂自古人君即位之初必有敢諫之士君受而賞之則競為忠讜茍拒而罪之則卷懷括囊又引太宗賞孫伏伽事以告之蓋古者史為書瞽誦詩百工獻藝庶人謗於道商旅議於市人人得以盡其言況以諫為官有言責者乎陛下自即位以來求言之詔屢下納諫之誠未孚未聞賞一敢言之士而已輕去言事之臣此天下識者所以竊窺初政而重為之惜也臣碩陛下廣開言路增置諫官言之是則賞之言之非則置之狂妄者優容之抵訐者寬宥之懷姦罔上朋邪害正者黜之如是則天下之士莫不樂告陛下庶幾直言日聞下情畢通而無壅蔽之患矣五戒遊逸臣聞成王即政周公恐其逸豫作書戒之先曰君子所其無逸先知稼穡之艱難乃逸又言商中宗髙宗之不敢荒寧祖甲之不敢侮鰥寡文王之自朝至于日中昃不遑暇食兹四君所以享國久長又戒以繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無逸一篇反復數百言始終以逸豫為戒故古人以宴安為鴆毒以無逸為元龜仁宗皇帝建邇英閣書無逸於屏間朝夕觀覽以示警戒夫昧爽丕顯後世猶怠始而不勤後將若何古之人君朝以聽政書以訪問夕以修令未明求衣夜分乃寐者非欲焦心勞形以自苦也蓋恐怠心一生則便佞之說乘間而入鴆樂之事有時而為流而不返不惟荒政損德亦非所以養夀命惟人君者要當清心寡欲克己復禮終始惟一無荒無淫如此則夀齊堯舜享國百年豈不韙歟六崇節儉臣聞舜命禹總朕師懋乃德嘉乃丕績不過克勤于邦克儉于家不自滿假惟汝賢孔子亦曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黼冕舜之所以傳禹禹之所以繼舜者莫不以儉德為先故唐𤣥宗開元之初焚珠玉錦繡于庭以示儉德及其末年猶以窮奢極侈亂天下其始可不謹乎唐太宗問禇遂良曰舜造漆器諫者十餘人何也遂良對曰漆器不已必以金為之金器不已必以玉為之古人之必諫其漸若事已橫流則無及矣蓋天子者合天下之力而奉之凡宫室車馬服食器用無非生民之膏血其作之甚勞其成之甚難安而享之必思其所自來思其所自來則不忍輕費民財重惜民力如此則子孫萬世長享天下之奉矣七恤刑罰臣聞舜初嗣位首陳典刑之義以敕天下曰欽哉欽哉惟刑之恤哉又命臯陶作士戒以惟明克允故能好生之德洽于民心兹用不犯于有司恤刑之效於此可見漢景帝之元年減笞法定箠令唐太宗貞觀之初觀明堂圖而除鞭背自古聖賢之君莫不以人命為重不敢輕於用刑故能享國長久慶流後裔恭惟祖宗二百四十餘年之間深仁厚澤漸被四表誅戮之刑內不施於骨肉外不施於士大夫麗於法者一付有司雖天子不得輕重於其間故卜年卜世與周匹休又非漢唐之所能及臣碩陛下遵守祖宗成憲謹於用刑寧失之寬不可失之急寧失之略不可失之詳寧有佚罰不可及無辜庶幾初政有以深結人心而為萬世無窮之福天下幸甚八重名器臣聞商髙宗即位傅說進于王曰惟治亂在庶官官不及私眤惟其能爵罔及惡德惟其賢夫爵賞天下之公器當與天下共之非人君所得而私昔韓昭侯愛一弊袴不以賜左右必欲待有功者且曰明主愛一嚬一笑袴豈特嚬笑哉唐宣宗重惜章服有司嘗具緋紫衣數襲以備賞賜或半嵗不用其一夫弊袴微物也章服虛文也二君吝惜如此蓋物以寓意文以副實上之人愛之重之不以輕畀則得之者榮茍惟人人而與之則不足以為重矣而況一命以上人君所以勵世磨鈍無功者賞則有功者怠不肖者進則賢者退豫奪廢置可不謹諸惟人君者要當以天下為公凡髙爵厚祿擇天下之賢者有功者共之惟其人勿以踈逺而廢非其人勿以親昵而用威權不可移於下名器不可假於人如此則上無濫賞下無幸人貴賤履位賢不肖襲情而天下治矣右臣所言八事凡陛下之所優為者臣申言之所以堅陛下有為之心陛下之所不為者臣預言之所以防陛下欲為之漸此皆初政之急務若夫示好惡公毁譽以作人才尚名節黜貪鄙以厚風俗薄賦斂戒掊剋以寬民力擇將帥明賞罰以肅軍政所當講求次第而施行者臣不敢躐等以進位卑言髙罪當萬死惟陛下裁赦歷代名臣奏議卷五十七
