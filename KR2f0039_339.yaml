body:
  text: 歴代名臣奏議巻三百三十九明楊士竒等撰禦邉宋理宗時李鳴復知樞宻院事上奏曰臣比者伏䝉聖慈擢置樞筦繼又從宰臣之請以兵財楮幣分而為三委之執政臣以繆庸仍獲任兵戎之責朝夕惟念大懼無以稱塞嘗攷究其利病竊謂有一時權宜之䇿有萬世經久之慮審思事勢而定其應補葺罅漏以周其防此一時䇿也規模欲其宏逺法度欲其整肅此萬世慮也自三關失險内郡摧殘一時軍將蕩無綱紀寇来則散而為盜以擾害百姓寇去則聚而為兵以仰食縣官其為数至十有三萬而蜀之兵不如昔自襄陽不守荆郢繼失連嵗帥閫急欲隄防創軍籍以招無業之民挪餉項以贍無額之兵其為數至二十餘萬而荆鄂之兵不如昔蜀去天萬里閫外之事不可遥制故擇兩帥以分其憂荆鄂正今要衝列戍分屯權當歸一故命督府以緫其勢莫逺於蜀莫重於上流委寄得人則區處有道赳赳雄斷是用出此兩淮所以蔽江浙而自浮光陷敵惴惴然常有抱虎之憂長江所以限南北而自淮堧被兵凛凛乎常有飲馬之懼故收彊壯以實軍籍兩淮皆然沿江亦然不如是恐反以資寇勢實使之不容靳也廣科降以修戰備兩淮皆然沿江亦然不如是恐無以禦寇勢實為之不容吝也蜀楚之兵雖已溢額而不可驟減江淮之兵雖無虧額而不可不増盖敵勢尚強國威未振撫事應變權時施宜凡以為一時備禦計爾若曰立國之宏規禦戎之上䇿盡在於是則非也昔太祖受天明命撫有大寳戰士不過十餘萬北禦契丹西捍河東猶以其餘威開荆楚包湖湘卷五嶺吞巴蜀掃江南服吳越太宗繼之遂㧞晉陽一統四海兵固不在衆也南渡以来諸大將陳兵以捍敵各以數萬計事定之後内而三衙外而沿江逺而四蜀皆有㫖立定軍額其溢額人依舊存留惟日後更不作闕額招收而已措置得宜遵承惟謹兵固當有限制也人皆以為今之患在乎兵少不足以強國臣獨以為今之患在乎兵多反所以蠧國兵非惡其多也多而不足用不若少而精之為愈也以其不足用也而又求多焉抑惑矣今天下兵數視祖宗時何啻數倍廂禁軍散在郡國殿歩司拱衞京都御前軍分屯要害皆官軍也蜀有忠勇襄漢有保㨗兩淮有義士皆民兵也禁軍本以備征戰今供雜役矣御前軍專以充調遣今多占破矣散在郡國者動干紀律而每懐不逞之志號為御前者屢増劵廪而且有無厭之心竭天下之力以養兵而流弊至此尚足為國㢤臣嘗伏而思之革積弊者當以漸振頽綱者當以理老弱交雜而力之壯者無以自伸精觕混殽而藝之強者無以自見此今日之弊也吾能明訓練之法壯而強者旌而别之使自為一軍無事則温飽以養其勇有事則激勵以作其氣彼既有進取之望則必無非僻之心而所謂老且弱者待之如常闕則勿補將見數年之後天下皆可用之兵而淩犯之風不期而自息矣名𨽻尺籍而半為市人月破廪給而安居他所此今日之弊也吾能嚴占破之禁某處投充則仍𨽻某處教閱某郡支請則仍於某郡居住嚴加訓練而且緩招刺將見數年之後天下皆實在之兵而僥倖之習不令而自消矣由前而論特一時應變之權由後而言實萬世常行之理臣願陛下以萬世為慮而勿以一時為安以兵之冗為可憂而勿以兵之多為可恃孜孜然思之斷斷然行之整今日之新規復先朝之舊觀生靈之幸宗社之福也貼黄臣近見田慶宗具到歩司所管在寨軍一萬三千六百餘人老病借差約五千有零外止管強壯八千二百四十二人三千人充采石捍禦五千人僅可管幹寨柵及隨畨救撲臣竊疑焉問之同列則曰權要借使吏房占破皆於焉取之名存實虚殆無足怪一司如此他可類推也臣曩在㑹稽嘗攷覈軍籍幇請給者三千三百餘人而日就教閱日充祇應者僅及其半朝士差借雖補外而甲乙相傳權貴占留雖易世而執持不遣鄉官之借出其為數猥衆浙漕之抽差視他司獨多計二百有八人以私僕而掛公籍者有之以虚名而竊實廪者又有之一郡如此他可想見也夫支請有定限雖頃刻不容稽違幇勘有定數雖鏹粒不容虧欠上下煎熬為養兵計也文移旁午為養兵設也平居耗不貲之費倉卒無可用之人其可聽其自為縱弛而畧不加察㢤伏乞睿照貼黄臣竊見平江置戍以拱衞名慮逺識髙盖有深意但數以萬計經始實難欲徑從荆鄂召募而或慮其太遥欲分委州郡招收而或疑其紛雜欲且就諸屯抽摘以實其半而二三其說意亦未定以臣觀之在内與在邉不同徐為之計似亦未晚夫五材並用誰能去兵然兵可止亂亦足兆亂顧所以御之者何如耳御得其道則紀律脩明雖舊管之軍皆可使為吾用御失其道則風聲交扇雖新招之卒安知不重吾憂舍舊以圖新而吾之法度紀綱蕩然如故恐亦無益也臣謂創軍額不如脩軍政急招刺不如精訓練愚見如此併乞睿照貼黄臣竊見全蜀井分為四而利州一路實為三路屏蔽敵人連嵗蹂踐自利以上半為盜區去嵗有興洋間土人數十軰赴制司陳状謂敵人屢出榜招安乞急調兵收復某等當為内應不然則無以自活是祖宗徳澤在人者深而人心愛戴猶一日也今宜行下本路安撫陳隆之宻加搜訪擇其土人之可任一郡者俾守一郡官得自辟財得自用如能捍禦外寇顯立雋功當議特許世襲如古方鎮之法類而推之京西一路悉倣而行之實當今經理之一䇿也貼黄臣聞兵之與財本相為用制司主兵緫司主財欲其專也蜀之財計邇年以來困於供億之勞司存徙移寇盜劫掠今無一孔之遺矣緫所積弊其端非一戎司虚籍為蠧尤甚若仍舊貫兵財各分財匱而主兵者不知兵増而主財者無以為應已然之弊不容革未然之憂盖未艾也今宣威新建而緫餉乃楊履正制副暫權宜乗此時盡將緫所之權併歸宣司以蜀之財養蜀之兵有無虚實皆得以相通兵無虚籍財無横費而蜀庶乎其可為矣所有合置掌財官屬併令宣司具名辟奏朝廷審度除授貼黄臣聞守國之道莫先設險蜀自敵人犯邉以來昔之恃以為險者今蕩然矣鑿斯城以固吾圉非所當講明者乎益昌舊為制緫置司之地有寳峯山以屏其左有嘉陵江以限其右邇者蜀士聚議謂宜於此郡築城移沔戎司一屯固守以扼敵騎衝突之路臣已嘗移書楊履正陳隆之令相與叶濟以圖其成未知目即有無已行措置去秋風無㡬欲乞睿㫖行下促令作𦂳計辦外此如潼川重慶府各據兩江之㑹亦乞行下本路監司帥守相度形勢若可恃以為險即任責城築以為節節屯守之計如事力不足仍自朝廷量與科降如此則敵必有所畏而不致長驅吾亦有所恃而可以為守矣中書舍人袁甫上疏曰臣竊謂今日事勢不當論安危當論存亡夫闗扵國家存亡之最急者莫急扵敵人秋髙馬肥必謀大舉傳聞將以三路並進昂台吉與逆全妻將自山東窺我淮甸蘇卜特将自木波界窺我西蜀布展将自陜州窺我襄漢萬一果如所聞國家何以禦之布展本主和者也近者淮安叛兵布展舉兵相應所以致此者葢亦有說武僊田八敵之深仇襄州輕扵接納已為失䇿李伯淵又以詐奪愛頂焉由是布展之怒愈甚然則和好已難諧矣始輕戰而挑敵中議和而欵師今戰既不可和又不成勢甚廹矣尚覬和而忘備悠悠度日敗在眼中奚止累卵之危而已㢤然則為今之計不破拘攣之格顯幽拔滯則真才必不出不除張皇之禁披肝露膽則下情必不通不掃塵冗之務一意憂邉則神志必不專不去浮淫之蠧舍虚就實則功程必不著不振朝廷之綱信賞必罰則氣勢必不奮不併江淮之勢合異為同則事權必不一不察卒伍之情賑乏賙急則軍心必不安此皆通國之人明知其當然而上之人遲疑顧慮不能果扵有為者正以未知其職耳夫天下之所以治安者以内外上下各得其職也欲守邉人人稱職必先任大閫者不失其職欲閫寄人人稱職必先䑓諫給舍不失其職欲䑓諌給舍人人稱職必先廟堂之上不失其職今兩淮荆襄四蜀衝要之地處處枵虚色色鹵莽身居大閫一不暇問朝夕之所計慮者不過互相猜疑巧為傾陷謀邉甚踈謀身甚宻外諜甚拙内諜甚工讎敵甚淺私讎甚深帥臣若此邉守何責臣所謂必先閫寄不失其職者此也自輕啓兵端經營京洛䘮師辱國愁痛尚新耻過作非復事唐宿委棄軍實取笑黠敵䋲以國法罪何可逭而䑓諫給舍重扵抗章國有邱山之損罰無毫毛之加精采既頽折衝何賴臣所謂必先䑓諫給舍不失其職者此也范葵乆處襄淮朝廷未得其代甚類一則杜把二則杜把之說此在廟堂平日儲才耳昔之儲才者預事先定某死則某代之今事急矣何暇言儲敗證既形勢當更改臨敵易將之疑此拘常襲故之論不足信也亟求可代者大作規模并謀合智推誠付託勿掣其肘事力雖匱不可吝財兵難隃度不可中御任責在閫寄而主張在廟堂讒言莫入論議歸一庶或有濟今閫寄之誤國者䑓諫給舍不敢言而廟堂亦不問使代之者果得其人䑓諫給舍或以風聞動摇而廟堂又輕信之則國事去矣臣所謂必先廟堂不失其職者此也而臣又有疑而未諭者天下之事緩則緩圖急則急着今處呼吸危亡之秋而不厲卧薪嘗膽之志習雍容鎮静之量而不為捄焚拯溺之舉方且牽扵常調拘扵吏議豢扵茍安惑扵坐談大敵臨前搏手無措則不得已而行守江之下䇿淮襄既不可守江其果可守乎今淮襄尚無恙也不肯破拘攣之格不肯除張皇之禁不肯掃塵冗之務不肯去浮滛之蠧不肯振朝廷之綱不肯合江淮之勢不肯收卒伍之心坐待北風一起逺近響震則財為誰之財民為誰之民與其一擲而輕棄曷若先事而亟為與其疑醫而待亡曷若信醫而圖存自古有病者未必死而諱病者必死今朝廷諱言病矣縱使開不諱之門而未能確然信任可用之人束縛䋲墨靳吝脂膏不捐反間數萬之金反聽市虎三至之說臣恐敵不在外而在内兵不動草地而起扵蕭墻矣抑臣復有愚慮請盡瀝𠂻忱為陛下精言之孟軻曰入則無法家拂士出則無敵國外患者國常亡此言人君當納其身扵戒謹恐懼之地雖有敵國外患乃可為進徳之助也敵人廹我人皆憂畏臣獨謂陛下進徳之機正在於此伏願陛下杜女謁逺閹宦戒㫖酒親忠賢精明不衰則昏怠不起畏忌常存則邪僻莫干凛凛然常有履霜堅氷之念而後可以壯元氣消外患強中國禦敵人矣臣猥以淺學備數經帷正以推明經義論說古今開導上心為職臣今此䟽自廟堂䑓諫給舍以至閫寄邉守皆以不失其職為言臣豈不自知其職乎若陛下乾剛日進敬心匪懈處宫闈如坐朝廷對妃嬪如對儒生則無怠無荒而四夷来王天下將曰講說之官不失其職如此如或不然純一有間怠荒乗之縁飾雖多真實反寡則清議将以臣之責人者移而責臣矣豈不甚可懼歟臣赤心愛君不識忌諱盡吐肝膈惟陛下裁赦甫又奏曰臣聞處事勢孔棘之時與常日不同有大斡旋則可以運動事㡬有大力量則可以鎮壓人心有大識慮則可以消伏變故史册所載亦可覩矣胡為今日之事獨不然耶邉遽方聞窘態已露楮幣一事耳論說紛起施行倉卒實効未獲疑謗先騰臣甚惑焉且克敵一軍疽根伏蔵久矣諸帥不叶互相猜貳敵情叵測竊窺間隙扵是横決而不可制任閫寄者各執所見朝廷持兩可而聽其所為遂折而歸扵招之一說然既招之後憂慮萬端今邉報又急矣敵犯鳯州又犯蔡息三道並進已騐于此浮光棗陽久闕正守此為何時拱黙坐視齊安制閫精銳消耎潯陽江靣守備尤踈朝廷非不明知柰何不為拯溺救焚之計而尚爾遷延翫愒耶自古主扵綏懐則不輕用武主扵敵愾則不屑招納今既許其𠞰又許其招雜用錯施初無定守有謂秦鞏不可棄者矣而又惑扵鞭不及馬之論有謂秦鞏不可納者矣而又摇扵獸窮則搏之說委恢珙以通好扵布展然今之窺我者布展也和安可輕信任范葵而加兵扵唐宿然今之為吾患者唐宿也兵豈可輕舉首䑕兩端莫知所決宵旰之憂其有既乎履畆輸劵可謂下下之䇿曩甞議及此矣其時尚畏公論未敢犯此惡名遽改而為鬻祠牒之舉已而怨謗譁然亟從寢罷曽㡬何時今又歸于履畆鬻牒信不美也猶有物以予之今履畆則白取矣鬻牒敷配僅及大家今履畆雖云有官之家而七色雜流與已仕而亡殁者咸不免焉則所及者亦泛濫矣一命之㣲官與故官之子孫伏臘不周事育不繼者何限今乃使與穹官顯爵家温禄厚者一槩同科州縣之吏不能皆良觀望回䕶避貴虐賤有力者頑未應令而追呼廹促破家蕩産悲痛無聊者大扺皆中下之户先受其害昔之謀國興利貽笑千古若括商若僦質若稅間架若除陌錢彼豈以為得已不已耶盖亦曰不得已而為之耳然上焉不得已而虐其下則下焉亦不得已而叛其上涇原之變此亦激扵不得己之至耳非獨前古然也本朝熈豐間若青苖若助役若市易若手實彼其施行之初人言籍籍主國論者惟曰是不足恤也然始扵不恤人言而終扵不恤國家被害之民在在嗟怨我不恤彼則彼亦不恤我矣王安石誤國之罪至扵激成靖康之禍皆不恤之一念為之也然則為今邉事之計當如何曰臨敵雖不可易將宜急擇忘身徇國有謀知議之帥以為之儲和戰雖不可執一說宜痛懲獨運祕宻之弊使舉朝羣臣得以獻其謀屏目前常程細務而廟堂謀謨專一以料敵制勝為急令淮襄四蜀之血脉俾與朝廷為一家而無一毫壅閼䝉蔽之患則邉事其庶㡬矣為今楮幣之計當如何曰行法自貴近始凡將相勲戚之家斷不得夤緣幸免而使貧弱者偏受無窮之毒恢洪朝廷寛恤之意凡産去稅存有名無實者一切務從闊畧勿為廹促急蹙之態以激天下等死之心昭示大信上下交孚勿使疑吾徒有截鑿之空言而終行刓忍樁留之實意收愈多則數愈少數愈少則價愈昂非獨國利亦為民利則楮幣其庶㡬矣顧臣迂愚之質實懐體國之忠每見聖上有仁心仁聞而今乃為寕考所未為之事二揆潔已奉公而今乃為故相不屑為之舉心誠痛之故嘗謂厥今有大患下人輕上幸災樂禍此風滋長真可寒心若邉事區處合宜楮幣施行有序尚可弭輕量之心消意外之變如其不然邉事摇軍心扵外楮幣摇人心扵内内阻外訌不亦岌岌乎殆㢤臣之愚䇿如上所陳吐自肺肝不識忌諱惟陛下財幸甫又奏乞降詔撫諭西蜀劄子曰臣竊謂敵兵犯蜀憂慮萬端今趙彦呐隔在仙人原音問久曠陳隆之離興元見住米倉山髙稼在沔州亦無音耗朝廷就令四川總領安癸仲撫諭軍民陛下宜降手札勞勉制帥及撫諭使又宜命詞臣草詔具述陛下憫傷蜀民曩經敵人蹂踐痛猶未定今又重遭兵禍皆由和戰不決舉措不審召釁納侮悔其可追老弱死扵流離士卒戕扵鋒鏑惕然愧懼食息靡遑即此大意更加深切庶㡬逺民明知上心亦使軍士生其氣勢臣之愚慮盖見故相當國以言為諱詞臣揣摩意見多所避忌語不􅈤惻豈能動人陛下更化以來曠然與天下為公今者詔㫖丁寕所貴明白洞達臣不暇逺引三代誥命只如漢武末年兵戈不息深陳往悔吐自肺肝與夫唐徳宗奉天詔書自謂天譴不悟人怨不知痛心靦面罪實在予下至封敖草陣傷邉將詔有云傷居爾體痛在朕躬如此等語頗得王言之體願陛下明諭詞臣使之展意無所依違勅書誕敡将見歡聲如雷賈勇敵愾敵兵不足慮也僭瀝愚忠惟陛下採擇甫又奏備邉四事劄子曰臣濫叨班綴賜對便朝竊見陛下軫念邉疆憂形玉色㣲臣恨無良䇿少濟時艱姑竭愚慮畫為四條皆至𦂳至切汲汲行之如拯溺救焚庶克有濟一曰固江陵以重上流之勢臣聞去年撥襄鄂隨郢復岳徳安漢陽信陽屬沿江副司而置司扵鄂撥江陵均房歸峽光化荆門屬京湖副司而置司扵江陵襄陽距鄂千里而聲勢不接江陵介居襄鄂之間而孤城無助今徳安棗陽隨郢襄陽皆破而復與信陽漢陽僅存空城而已均房光化歸峽荆門或破或潰而江陵遂成孤立矣顧乃責沿江副司以復襄陽責京湖副司以守江陵地勢隔越事權不專彼此牽制決至蹉跌莫若以京湖諸郡仍舊併歸一帥緫治江陵且撥湖南九郡𨽻之庶㡬形勢便順事力從容經理上流莫急扵此二曰堰瓦梁以壯東淮之防臣聞敵人往年首犯襄境連年遂入西淮至去冬又擾東淮直抵維揚三邉之禍嵗甚一嵗今荆襄已失止守江陵孤城西淮屢擾蕩無藩籬可恃儻東淮守禦又復不固則敵馬飲江而江浙震矣豈容玩視而弗戒乎昔孫呉築瓦梁堰以抗彊魏江南恃以為安者六十年南唐李氏悉力經營堰不及成淮已盡失今制臣建議脩復病扵工力浩瀚宜從朝廷亟助其費乗此敵退作急經畫併日興工猶可有濟三曰處流民俾復生業臣聞淮民少長習兵為國保障去冬敵騎奄至西淮義勇憤激思闘任邉閫者惟恐推鋒而怒敵但知撒花以媚寇驅逐老弱焚蕩生聚謂之清野重以敵馬蹂躪勢熖熏赫扶攜渡江不可勝計勞来之使中輟賑貸之令徒頒彼留江南別無所得食返江北又無以為生不亟圖之非但失扞敵之利必且重蕭墻之憂謂宜申飭江淮帥臣亟行賑恤朝廷亦合貼助支費假以資糧俾復生業或團結以助聲勢或㨂刺以填闕額或選擢材武優補軍職兼此數端實區處淮民之切務四曰責邉閫遣回敵使臣聞比者朝廷已甞戒飭邉臣遣回敵使中外之人方幸廟謨堅定不墮姦謀稍有生意但見王檝盤旋窺覘久未出境觀聽已惑近者傳聞猶為可疑豈其不禀朝命道宣歙而来邪朝廷周慮曲防固萬無是事不知道路之言何為有此黠敵變詐每得慣便既有輕量之心恐肆玩弄之計今兹復来非前日比包藏叵測必有出扵邀索之外者兼邉疆効死之臣無非與敵為仇復有訛言煽摇可憂非一儻慮阻遏其來貽祻目即則專在邉閫委曲區處豈無良䇿或謂兹事當宻難使户知但恐欲愚國人而人終不可愚耳以臣管見王檝之欲来者乃邉臣諉其事扵朝廷而止其勿来者在朝廷當専其責扵邉閫處置少差噬臍何及臣所陳四事辭雖樸拙情實懇至儻陛下以臣言為可采伏乞睿斷速賜施行許應龍進故事曰慶歴六年詔曰西北多故敵態難常預備不虞理當先物又詔陜西河東經畧司謂西人雖納欵稱臣叵測之心詭譎難信恐諸路罷兵之後漸弛邉備其務練兵卒全城壁常若寇至有不如詔者亟以名聞臣聞先為不可勝以待敵之可勝此用兵之至計也急則倉皇而失措緩則玩弛以茍安事變寇来莫之能禦其患有不可勝言者書曰不見是圖易曰君子以思患預防此正今日之所當謹也仁宗當天下全盛之日尚慮敵態之不常西人納欵之後猶恐詭譎之難信況今日敵兵之出沒不時而荆襄之敗壊已極西蜀之闗隘未固而外郡之寇攘間作東支西撐近獲少息而根本不立備禦無䇿其可不焦心勞思以求安邉固圉之術乎權宜通好意圖少安而敵情叵測尤當為自治之謀開邉拓境盍監覆轍而量時度力豈宜為輕進之舉殘破之邵尚費經理歸附之卒未易調服儻優㳺嵗月不思處置此去秋髙馬肥能㡬何日萬一赤白囊交至然後科瑣邉吏無乃大寒而索裘乎今日之事功其所以弗立者盖由扵議論之不定而事權之不一夫議論不定則或進或退莫知適從事權不一則相忌相傾各欲求勝緩急誰復應援兵力遂至單弱是以邉陲靡寕上勤憂顧為今日之計莫若先定其規模而使諸將有所禀承先正其體統而使諸閫勿相矛盾如此則上令而下從謀并而智合以守則固以戰則勝升平之効日月可冀矣應龍又進故事曰藝祖命李漢超等守闗南凡十七年郭進守西山賀惟忠守易州姚内斌守慶州董遵誨守環州亦十餘年管𣙜貿易悉以給之又使之私募驍勇以為爪牙軍中之事復許其便宜二十年間曽無西北之虞真宗朝錢若水上言曰今日之所患在戰守不同心伏望陛下選武臣有謀素諳邊事者任為邊郡刺史令召募武勇為隨身部曲官為廩給然後嚴亭障明斥堠每得事宜宻相報示寇来則齊出討除寇去則不令逺追各務安静茍無大過不輕替移儻立微功就加爵賞如此則戰守必同心戎人不敢近塞矣臣謂極邉州郡與敵對境烽燧警報無時無之若用文臣則不請戰闘或遇侵擾慄慄危懼多至退遁若用武臣則驍勇敢為遇寇不懾惟患無兵可用耳今若令其招募武勇給以廪賜而復久其職任筦㩁貿易悉以予之俾得以激厲士卒固結其心則孰不思奮而又嚴斥堠精間諜寇至則互相救應併力捍禦寇去則各嚴備守不務窮追聲勢既張敵自讋伏朝廷則視其功績就加旌賞茍無大過不輕替移則士卒相孚同心恊力如手足之捍頭目何患疆場之不寕㢤今之邉郡多任左選兵畧素不講究行陳又非涉歴安平無事僅可自保一聞警急率至奔迯間有究心備禦差强人意則又委之不專任之不久財用既無積蓄士卒又非素練無一可恃無怪乎邉陲之不固也今若遵太祖之䇿用錢若水之言以為守邉備塞之計則兵威振而外侮消矣禮部尚書魏了翁進故事曰唐陸贄奏議第十六巻興元賀吐蕃尚結賛抽軍回歸狀右欽溆奉宣聖㫖適得渾瑊奏比日尚結賛頻使人計㑹擬自領兵馬剋期同收京城緣春来蕃軍多有疾疫近得探報尚結賛等並抽兵退歸不知逺近朕意緣吐蕃士馬強盛又以和好之義自請將兵助國討賊朝夕望其成功今忽抽軍退歸甚失准擬渾瑊李晟等諸軍兵馬並不至絶多若無蕃軍應援深慮被賊衝突卿試料量事勢如何者臣質性孱昧不習兵機但以人情揆之時亦偶有所得自承此㫖欣賀良深竊謂蕃戎退歸乃是社稷遐福昨日已附欽溆口奏訖伏恐未盡愚欵尚勞聖憂謹復披陳庶觧疑結彼吐蕃者天性剛彊形容魁健貟力怙氣難詘易驕威之不格撫之不懐雖或時有盛衰大抵常為邉患隂詐難御特甚諸夷陛下但舉建中以來近事准之則戎心難知固可明矣頃者方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求寖多翻覆靡定託因細事嘖有煩言首尾凡歴四年要約竟未堅決立碑纔畢復請改移猜矯多端扵斯可驗逮至盜驚都邑駕幸郊畿結賛緫戎在邉因請將兵赴難陛下推誠允納厚賂招来逗留持疑竟不肯進無濟討除之用但攜將帥之心懷光遽至猖狂頗亦由兹促禍及皇輿再駕移蹕漢中陛下猶望蕃兵以寕内難親倚之情彌厚屈就之事亦多叵測為心曽不知感翻受朱泚信使意在觀變推移頻與諸軍剋期至時皆不赴㑹致令羣帥進退憂虞欲捨之獨前則慮其懐怨乗躡欲待之合勢則苦其失信稽延既姦且驕曷望成績非唯變態難測且又妨擾實深戎若未歸寇終不滅但願陛下謹扵撫接以奮起忠勇之心勤扵砥礪以昭蘇逺近之望中興大業旬月可期不宜尚眷眷扵異域之人以失將士之情也臣聞善為天下者不計敵人之盛衰而計在我之虚實中國外國一氣耳其盛衰誠無與扵我者先王以其叛服去来荒忽無常故雖懐之以徳接之以禮未甞逆示猜間然亦豈引而致之倚與為援而畧無防慮也徳宗每事猜忌雖内焉陸贄外焉李晟猶疑之不釋而獨扵尚結賛乃用其信何哉方其自請入援其情不難知也徳宗慮渾瑊李晟兵少幸其可以為即聽之不疑至扵結賛抽兵自退人情驟失倚仗各懐畏懼則徳宗又以為憂以一結賛之来為喜一結賛之去為憂安有堂堂中國而直為此廪廪也陸贄獨曰此社稷遐福也拜䟽入賀臣以為藉令倚仗結賛幸而成功猶懼無以賞之而況敵心貪很狙詐横生求欲無厭去来自若可以遽為之憂喜乎詩曰夙興夜寐洒掃廷内維民之章脩爾車馬弓矢戎兵用戒戎作用逷蠻方古之所謂待邊人者亦惟盡吾所以自治之道而已顧舍其在我以資乎人祗見其害未睹其利也結賛既退旋復舊京初無賴乎蕃戎贄之言既信矣而徳宗尚眷眷扵異域之人以貽後日刧盟之悔為千古笑至是而贄益有知言之名然已無及扵損威辱國矣比年以来夏人既約而復渝敵使已来而自郤此正所謂荒忽無常者故臣敢以贄之所言者為今日獻願陛下與大臣力圗所以自治之實而常為不可勝之勢則叛服去来吾皆有以待之也劉克莊進故事曰石虎死蔡謨曰虎死實為大慶然度徳量力非時賢所及商浩北伐王羲之曰區區江左營綜如此識者寒心桓温謀遷洛孫綽曰趨死之憂促返舊之樂賖出晉書臣竊惟居重御輕者安虚内事外者危敵運寖衰士氣稍振荆甲𢷬虚重闢土疆蜀兵攻堅大獻俘䤋向也我師畏敵如虎今遂能袒裼而暴下車而搏雖未遽收卞莊子之功然亦頗奮馮婦之勇矣此皆陛下廟謨雄畧長駕逺馭所致如聞閫臣忠憤激發荆狃一勝蜀謀再舉識者憂之臣觀晉人畫江自守精兵名將往往分布沿流重鎮如庾翼在襄陽陶侃在武昌褚裒在京口桓温在姑孰之類故昔人有長江千里如人七尺之軀䕶風寒者不過数處之喻而自江以北之地則付之祖逖劉琨軰使自疆理琨握空拳守并逖以素隊千人布三千匹渡江不給鎧仗晉人能量事力權輕重如此偏安一隅而不害其立國非偶然也今之閫臣握兵柄操利權朝家又抽摘科降以助之適值目前之安静遂有分表之經營比之晉人則似輕堂奥而重極邉虚根本而事逺畧臣不敢援引前古姑以近事言之趙范欲圖唐鄧唐鄧不可得而棗陽先失扵是安隨郢復均房之境皆為邱墟趙彦呐欲圖秦鞏秦鞏不可得而劒闗不守五十四州蕩覆豈非外重而不能御内虚而無以守其勢必至此歟臣竊私憂過計謂江陵重然後可以援襄樊重慶實然後可以圗漢中范與彦呐即吾龜鑑夫蔡謨王羲之孫綽之言盖英雄豪傑之所誚侮以為怯懦者然自晉至今欲保守金甌使之無缺者終不能易此論也惟陛下詔閫臣熟籌之監察御史呉昌裔同䑓論邉防事宜疏曰臣等甞兩上章留徐清叟又各上疏乞畀叢祠一無報行日切兢懼自合居家待罪不當復有所陳然事闗危急存亡不容自黙臣等每謂今日邉事蜀中之患不在敵而在秦鞏淮襄之患不在敵而在北軍昨聞鞏州汪世顯等已降扵敵為之引兵直窺階文則秦鞏之患已有證矣近者訪聞襄陽城中北軍挾李伯淵以叛半殱南軍制帥趙范帶親兵而出僅以身免雖傳聞未可盡信若其果爾則是北軍之患又有證矣敵惟荆襄東連吳㑹西通巴蜀古人以為國之西門又謂天下喉襟若為寇賊據其門户扼其喉襟則呉蜀中斷自上流渡江直可以控湖湘若得舟而下直可以𢷬江浙形勢順便其来莫禦萬一有此則人心動揺望風奔潰雖有勇智将焉用之況自去年以来郭勝叛扵唐范用吉叛扵均尚全等克敵叛扵徳安皆以北軍相率叛去今李伯淵素號膽勇為三軍所推又逐人往来江浙稔知地利若羣兇並嘯四叛連衡守我城池據我糧食則其謀深計狡将不止掠抄邉疆而已加以敵騎往来不常此軰為之向道則憂在社稷恐有不忍言者昔宣和間黼貫開邉郭藥師以常勝軍来降又招雲朔漢兒以為一軍謂之義勝厥後金人南牧二軍首叛以降遂導敵軍俶擾中土時宦官尚閟其事不以上聞竟成靖康之禍臣等讀國史至此不勝痛心今日之事雖未遽至是其危證亂階亦已畢露不知陛下亦嘗憂及此乎大臣亦嘗以此告陛下乎臣等忝在言責得之風聞若不亟為陛下言之何以自觧不忠之罪用敢不識忌諱冒犯奏陳欲望陛下明諭大臣思所以靖難保邦之計若趙范果已離襄急令收聚諸郡餘兵固守江陵以為上流捍蔽鄂渚與江陵相近陛下已嘗命帥而尚未啓行即宜申命督促疾馳以往如其方命乞改畀有威望忠畧之人以鎮武昌與江陵犄角併乞行下淮西帥尤焴嚴作隄備所有淮東之地亦多北軍雖聞分戍新復州軍然恐聞風相挺而動亦乞下趙葵疾速措置母使噬臍區處既定則守江之策尤不可緩乞專以責之陳韡如戰艦軍糧防江民兵等宜日下辦集以防不測其他所合思患預防之事蚤自廟堂同心區畫不可循習故態茍安目前不可畏避張皇謾為覆盖夙夜憂懼惟恐禍至無日而亟圖利之庶或可以扶顛持危而不至淪胥以敗也臣等不勝憂念懇切之至謹録奏聞伏候敕㫖貼黃臣等昨與清叟以開邉論及首相又因發下條具邉防事宜見其所具多有踈略已同諫官䟽其不可行者以復廟堂但知控竭愚忠不知觸忤時忌今外有虎視之狂敵内有䲭張之叛兵不待秋防患已立至國勢凛凛危扵綴旒大臣扵此不能憂邉思職為君父計而乃徒事猜防空擲嵗月甚可憂也今清叟既已出䑓臣等自難安職惟君臣義重冒言及此又將不免廟堂之疑欲乞陛下以社稷大計為念毋以人情牽制為拘若謂臣等不能静嘿安處乞早罷黜或與以祠庶使大臣不以臣等多言為慮専為陛下區處邉防臣等雖退歸山林實為大幸昌裔又論三邉備禦狀曰臣聞射不志正雖巧無用藥不當病雖良無益臣不量愚分冒進瞽言前䟽六條扵陛下之心之身家國之事粗陳其槩矣今事有至急至切者又何敢隐情惜已不為陛下終言之臣聞之道路見之諜報竊知敵人聚兵牧馬決意南来一渡河洛以窺江淮一由唐鄧以窺襄漢一託秦鞏以窺四川三道並入衆號百萬甚至脩搭槗路将帶羊皮浮環以為飲江之計兵有先聲雖虚實未審然三伍見聞殆有深可慮者胡不以金人之初起觀之五月傳箭扵國中令鄉兵備戰至八月則㸃集今秋風已動非草地㸃集之時乎四月放馬入泊逐水草至七八月則取馬出澱以備戰闘今童馬免乳非出牧戰闘之時乎漢備匈奴率以秋冬唐遣戍卒謂之防秋中國扵秋髙馬肥之時每每嚴作隄備如此豈可以候卒流傳之繆遂謂疆吏張皇之言欵我邉陲懈我守備恃其不来而不恃吾有待之乎紹興庚申烏珠分四道入寇外則張燾等豫言之内則陳淵等繼言之下則京局小官亦言之而秦檜忍耻恃和漫不為戰守之備使無劉錡順昌一㨗則鐡浮屠必南牧矣紹興辛巳金人分四道入寇舊相張浚首言之老将楊存中力言之從官金安節等交議之陳康伯雖決戰守之䇿然江沱燕安之久使非敵酋自斃以歸則紫茸軍必絶江矣以今事力視紹興時将無河北山西之舊也兵無背嵬鐡山之勇也器械無銳首駐隊之犀利也舟師無戈船海鰍之堅壯也况京洛潰師以後精銳殱扵鋒鏑糧械委扵蒿萊京帑耗扵兊楮邉儲空扵生劵四緫所科降之數日積月壓無以給其乏然而邉民調度之餘氷銷火燎靡敝不知其幾也以空虚無可恃之邉備而當飄忽不可測之敵兵脫或哨騎一来直闖籬落則沿邉鎮戍聞風蕩揺惟有巻甲以南趨必不能北向為陛下發一矢矣秦師伐鄭蹇叔曰師之所為鄭必知之勤而無所必有悖心夫勞師襲逺而敵國先知尚且肆其貪殘不肯徒返矧并呑無厭鄙我猶憾若知而不為之備則其悖心豈不烈乎今之授任者方敵未有釁則抵掌虚喝欲營分表之功及寇已有萌則搏手周章不為局内之慮我之将士不豫附而乃醲其賞賜過待新附之軍我之田野不加闢而乃供其餼牽外招遺燼之衆軍實無楚師之儆師乗無晉卿之和端居無事互相猜防萬一事㑹之来而望其首擊尾應難矣㢤事之急者不可以舒緩圗寇之深者不可以浮淺應臣愚欲望陛下少垂聖思明詔二三大臣不拘旦暮延見議事如建炎詔書許令侍從䑓諫聚議都堂講明軍政如紹興典故取張守四路帥守之議經理淮甸以為外禦之防取表臣七處備禦之䇿控制長江以為裏虚之備取允文三重防托之說保䕶蜀口以為上流之固兵食之數有㡬當置講議一司以考登耗之源風寒之處有㡬當置脩攘一局以議攻守之要偏禆材武當有格法逐軍事藝當有掌記軍書之措畫来上者擇行之邉守之貪懦不職者易置之事事精思日日申儆而又命一重臣視師江上董督諸將以訓齊三軍如張浚汪澈葉義問故事庶㡬統體一而國勢張思慮集而人心奮臂指服役而精神折衝吾圉有備又何憂冦兵之暴至乎天下之事難平敵人之情難料佳兵者殆忘戰者危老師弗戢既一失扵前時玩寇養安難再誤扵今日若頻復而數誤則國事非矣詩曰猶之未逺是用大諫臣不勝拳拳昌裔又論三邉防秋狀曰臣聞防秋之說尚矣薇作而遣薇剛而歸說者曰周之戍役猶今防秋之兵也瓜時而徃及瓜而代傳者曰齊之戍期即今防秋之候也盖北敵風俗四月放馬入泊令逐水草禁人乗騎八月取馬出澱飼以麥豆準備戰闘方隆暑則筋觧膠緩力不及逺至秋髙則勁弓折膠銳不可當故漢軍備敵率以秋冬唐兵戍北謂之防秋皆時吾戰備遏彼寇虐也國家當海東崛起之敵立中國自治之規每扵秋時常若寇至靖康有防秋詔建炎有防秋議謂夏已及半去秋不逺非早圖之則敵又奔突者李綱之疏也謂時已中夏去秋無㡬惟博謀羣議則尚可捍敵者劉珏之䇿也謂防秋之期才一兩月而控扼守禦盖非一塗者張守之言也謂秋防事廹僅有兩月而防托戰守尚無定謀者葉夣得之請也君臣之間日夜凛凛惟恐一事蹉跌此豈故為是過計哉徹桑牖户之謀折桞樊圃之戒昔人所以無日不申儆扵國中也今計秋風不十日矣敵之驃悍過扵殘金師之出没飄若風雨但聞其以草青為放牧之候棗紅為出哨之期則避暑而遁逐涼而来乃敵人之常也不知上之所以憂邉思職下之所以料敵禦戎者亦有如中興之深畧乎分上下流守淺隘口脩戰艦閱水軍此防江上之秋也斂淮東戍厚淮屯募土豪訓義甲此防淮堧之秋也招水手葺海鰍結固民舠選擇㠗長此防海道之秋也援忠勇集流移繕修城壁開浚海櫃此防京湖之秋也固三闗天險閘諸道支徑補兵籍峙軍糧此防蜀口之秋也備風寒者不下數處為秋防者非止一條所當愛日惜隂并手合力如撲原火如袽漏舟旦旦而為之猶恐不蔇而今朝廷之上百辟晏然言論多扵施行浮文妨扵實務后族王宫之冗費列曹坐局之常程羣工閒慢之差除諸道非泛之申請以至土木營繕時節宴㳺神霄禱祈大禮錫賚藻飾治具亡以異扵平時至扵治兵足食之方脩車備器之事則反皆闕畧不暇精講方且今日一人而出疆進取曰吾将以厚藩籬明日一人而遣使求成曰吾將以寛嵗計京湖焚蕩者一十四郡而區撥地界之未明蜀口委棄者二十三闗而分布司存之未定勢均者持意見權扼者快恩讎膽薄者徇顔情氣揚者亡紀律蠶食交侵此為何時而汎無規模擔閣日子脫或㳺騎闖陸浮牌渡江而後調兵符科邉瑣為應急草草之謀則亦晚矣昔靖康之難敵方退師上下恬嬉遂謂無事方建議立東宫開講筵復春秋罷配饗有言責者日論京黼之黨當事任者謀逐許李之賢宻院欲追擊賊三省欲䕶出境宣司欲調戰士廟堂欲止援師行移二三命令反復玉輅之索争議未定而鐡騎已過河矣故當時有不理㑹防秋却理㑹春秋等語吁此豈二敵之善戰哉亦一時謀人之不臧有以致寇而深之耳昔胡安國有言軍政未脩既不可戰彊弱不敵又不可和惟有講求防守之方以為攘敵之備最為上䇿臣謂今日之事當置和戰不議而專議秋防三省進呈之際盡屏細務非備禦不謀樞宻本兵之地略去彛章非兵食不講侍從不拘早晚許以邉事請對䑓諫不限月課時以邉警奏聞百僚師師日以敵國外患衡慮而陛下又鑒靖康之所以失法建炎之所以興屏聲色節燕飲常以貂帽思將士之勞抑倖賞減浮費務以金帛代軍儲之糴躬率内外以𢎞濟時艱則敵来而應可以伸吾威敵去勿追可以成吾信敵雖吞噬諸國橫截八荒而終不敢干中華正統之所在矣惟陛下宵旰亟圖之宗社幸甚貼黄臣近收鄉人書言戎帥曹友聞得諜者報草地欲以八月入寇則是臣防秋之說扵蜀尤不可緩也盖蜀自去冬敵退之後尚留哨騎出没並邉或伏草間以待麥熟董鵬飛以守城死時當可以刼寨亡陳瑀以行邉執不三月間失三太守皆西陲才勇之人以此邉氓愈更畏怯又東有李伯淵窺上津西有汪世顯伺仇池種類寔繁景色可畏兵無三萬之數粮無十日之儲色色築底惟有民氣一髪僅存而數年間捐財以助邉荷擔以供餉不知其㡬履畆矣近聞緫所有對糴之法制司有起夫之令臣為之駭然此說果行則民病困極之餘將引繩而絶之矣欲望聖慈申勅制緫禁戢科需而扵驅磨所之失陷者撫諭司之科撥者官塩户之輟借者留意審核以應支梧庶可寛民一分實非小利所有三太守死事得之公論謂董鵬飛為上時當可次之陳瑀又次之欲乞行下宻院等第推賞施行伏候勅㫖昌裔又奏曰準御史䑓牒輪當十二月一日視朝轉對有已見下項事須至奏聞者一臣比以一介孤愚待罪分察每扵時政空臆盡言旁忤宰臣㡬負大譴尚賴聖恩天廣曲賜存全疊拜命卿又兼史事自知無以稱塞屬當轉對其敢隐情惜已而有愧於初心㢤臣聞天之所以職覆君之所以司牧不過曰仁而已天之仁在扵與民物以為生君之仁在扵承天心之所生故好生惡殺三代之所以得人心也大兵大獄漢唐之所以殄國脉也洪惟本朝以仁立國其得天下也不妄殺一不辜其謹刑獄也不誤入一有罪其懐逺人以恩不加以侮慢不恭之誅其體近臣以禮不坐以曖昧不明之過漢以王恢首邉釁兵連不觧者踰三十年而本朝謀臣務存大體不曰澶淵郤敵之後十九年不言兵則曰陛下即位之初二十年不可道用兵不曰首兵必有𡨕謫則曰用兵不是好事盖恐干戈一啓有貽根本之憂唐以林甫陷善良羅織被罪者㡬數百家而本朝議論務從忠厚不以女奴之偽書而誣正人不以奏邸之傲歌而網名士不以詠檜之詩而終棄竒才不以興甲之語而深罪舊弼盖恐刑獄一興有以開荆棘之路此皆列聖仁厚之徳大臣深逺之慮所以培護元氣而祈天永命扵無疆也不幸其間小人相繼用事以深入之說而啓兵端以隂中之術而造黨禍然仁聖相傳神武不殺未嘗一墮其姦謀故熈河之師王韶實倡之而當宁歎息深咎廷臣之不言涇原之築李憲實繼之而中使奏聞乃痛邉民之疲敝鄯湟之復朝廷初無堅決之謀而童貫造釁師敗者數十萬人燕雲之取聖訓嘗有全師之戒而蔡京首謀兵潰者五十萬衆是階厲者之罪也而何足以傷祖宗之仁華亭之獄安石之子雱為之㑹上察其誣而事遂寢同文之鞠蔡確之子渭為之㑹事無其證而計不行元祐之籍等定者三百九人天示其威而碑仆不立矣趙汾之案根連者五十三家天奪其魄而欵具不書矣是執讒者之過也而何足以累祖宗之聖上天有祚我宋之心祖宗無咈人心之事故雖王室屢經多難而國勢安若泰山盖其所以貽謀者至深且長也陛下蹈規祖武祗事天明小心抑畏惟恐傷乎民生盛徳温恭惟恐咈乎物論咨儒臣以講學未嘗不盡下之情導諫臣以敢言未敢有拒人之色中更大化庶事厲精思欲取濁亂之政習而一新之天下翕然莫不有升平之望矣獨惟宰揆非人不能仰承聖意方其始也輕躁寡謀而首興京洛之師及其久也猜忌深中而隂造縉紳之謗佳兵之禍至于甲卒䘮亡膏血沾漬有目者所得而見也而中傷士夫之穽則猶隐而不彰征調之苦至于室家離散哭聲流傳有耳者所得而聞也而傾陷善類之罟則㡬發而幸免若非陛下翻然感悟洞燭其非則大兵之後又將醖成衣冠之禍矣夫有司失一死罪責尚不輕今以無罪而驅民扵兵凡不附已者謀中以危法安知嚮夕雷雨之異非其處心積慮之惨有以上干至和乎邇者徳音一播丁寕罪己而三邉莫不屬心廷制一揚奮發拜罷而多士為之吐氣所謂兵獄三事皆自惠卿發之者今已昭昭暴白扵天下矣然而仁足以回震霆之怒而不能以革敵人之侮心明足以開積潦之隂而未能以釋中外之疑慮豈可不求其故乎孟子曰是乃仁術也善推其所為而已矣不殺羔小善爾我真宗推之至扵家富人足聿成景徳和平之風不踐蟻㣲事爾我哲宗推之至扵役減刑清坐輯元祐安静之福今陛下有悔過之大徳有洗寃之盛心盍不以其隐之扵中者而推之庶政百度耶由是而體行葦之厚以篤兄弟之戚按棠棣之燕以懐死䘮之威則親親之仁也由是而復胎養之令以培元良之本立内學之敎以選宗藩之英則幼幼之仁也召用衆正勿以好名之嫌而絶為善之路則敬賢之仁也優容言者勿以約閙之說而杜敢諫之門則好善之仁也舊姦宿慝芟夷藴崇勿使是殖是長則惡惡之仁也僑戸流民還定安集毋使靡室靡家則愛人之仁也念一覺悟而天下無寃民心一惻怛而萬物皆生意則陛下之仁實與天地同其大彼以暴吾以仁彼以嗜殺吾以好生雖草地窮漠之夷亦不能干中國正朔之所在矣先儒程頥有曰充拓得去則天地變化草木蕃充拓不去則天地閉賢人隐惟願陛下善推而力行之臣不勝拳拳一臣聞聽言之道固不可偏亦不可雜偏則所受狹隘無以公天下之言雜則所聽混殽無以一天下之善不失之偏以来衆正不鄰扵雜以杜多門而後兼聽盡天下之美矣且當今急務莫大扵朝政邉事也在廷則有大命之出納庶政之廢興百吏之進退在邉則有㡬事之翕張帥權之分合敵情之去来此皆國家之命脉天下之機括所闗係也故昔之議朝政也命令必出扵人君政本必歸扵中書令有不當者必使給舍審覆事有不便者必許䑓諌盡言所以政令詳審而朝廷尊行之扵天下者無一事之闕議邉防也處分必出扵廟堂謀謨必叅扵都省侍從之知兵事者許以論思廷紳之歴邉任者責以條具所以處置得宜而軍情服行之三邉者無一籌之誤此古今之常理亦祖宗之家法也盖自人君喜獨斷之名而耳目之司或偏扵所寄宰相操獨運之說而㡬事之宻或徇扵所私扵是始有以近習干公議有以小臣與朝政而事權雜出徒為羣下梯進之謀有以私人通宻報有以遊士與邉機而意見背憎適為外臣交賄之地紀綱之所以隳壊而不振血脉之所以壅塞而不通由此其積也臣不敢逺引先朝故事姑以乾淳之間聞見之所接者為陛下言之孝宗皇帝睿斷明謨雖博采扵衆議而虚心曠度實公聽扵外庭熊克以曽覿薦而權直則宰相入奏言之劉甄夫以王淇薦而得召則政府授牘問之葛掞以内臣薦而欲除要官則宰執又留班奏之是議政之地未嘗使小臣與聞也有邉事則令侍從兩省至都堂㑹議乏將才則令制領將佐赴樞宻院審察議恢復則令朝士之可與大計者令兼局官㡬宻之地未嘗許㳺士請謁也孝宗二十八年之治所以光明俊偉而不可及者豈非朝廷邉鄙之事操執綱要而微賤冗散之士不得以輙與其議㢤今陛下慨念時艱復置元輔人心固喜政本之有所歸大臣留意邉事博詢廷紳人言亦知國論之無所倚然或者過慮邇言之聽不察而小臣宻啓猶習扵命相之前逺猶之告不聞而游士私謁尚狃扵前相之舊則體統不明事宜失當其弊反有甚扵前日之所為矣臣願陛下一以孝宗為法政事歸扵三省而勿以親信近臣與差除議論公扵外朝而勿以逺㳺纎士與邉議則小不間大私不勝公朝政清明邉塵弭息乾淳之治可坐而致矣伏乞睿斷留神天下幸甚貼黄臣蜀人也向在䑓時屢言蜀事謂趙彦呐年老智窮所當儲代又扵秋防一䟽論蜀必危而朝堂廷臣之言曽不留意今聞敵騎徑破閬中分為兩隊一沿江至順慶一絶流指潼川曹友聞以轉戰敗于芭蕉谷劉孝全以食盡潰于鷄翁隘趙彦呐以羸卒退保劒門今又之江油楊恢以無兵禦閬寇今已趨東闗辛以按部行項容孫以新除去潼遂順慶皆無守臣驚移之舟邀截于敵揜面赴江死者以數十萬計此得扵著作郎李心傳十月十七日成都書報如此吁蜀亡矣或者但知以斬將之虚㨗告于廊廟而不以敗亡之實證聞于朝廷衆議欲除一宣諭從䕫門經理今已旬月而未見施行又聞有䑓臣有言欲斥逐小吏之壅蔽蜀事者公論咸以為快而亦未見檢㑹行遣豈朝廷之議殆類扵棄蜀耶夫蜀猶首也荆猶咽喉也江淮則猶股臂也今病在頭目日濱危亡而猶翫愒恬嬉不知救療欲為保其四體之謀抑難矣臣願陛下明諭大臣亟圖以救蜀之䇿不勝鄉國父老之望右臣前項所奏一論本朝仁政謹刑息兵二論朝政邉議貼黄論蜀危急事謹録奏聞伏候勅㫖昌裔又論湖北蜀西具偹奏曰臣自就列以来便閱廣西經畧司據岑邈謝濟所申以為敵已破大小雲南雲南與廣西為鄰審如所申廣西事體直可寒心今廟筭深長必能選有威風大臣控扼廣西如招兵積粟等事或通湖南或通廣東想皆次第施行筭無遺䇿矣而臣之愚見則以為上流尤所當備臣十年前聞敵有斡腹之謀欲借路雲南圗我南鄙當時說者皆以為迂今聞瀘州安撫司所申宻院事稱西蜀南蕃蠻王阿永申敵攻打大理國并殺死姚州髙慶節度見在大理國内屯駐四向生蠻悉皆投拜烏蒙國都蠻王阿吕申本蕃鬼婆帶領軍馬往後蕃見敵兵深入攻打卭部川界分便破散小雲南國見敵兵在大理國界分駐札言說今冬再回求路要出漢地此皆去嵗事也若然則是小大雲南悉皆狼狽廹我後户矣詎可不為闗防㢤試將蜀西湖北之與南蠻接者為陛下條陳之南方諸蠻之大者莫如大雲南其次小雲南次烏䝉次羅氏鬼主國其他小國或千百家為一聚或二三百家為一族不相臣屬皆不足數而其他皆蜀之徼外諸蠻接黎州大度河之對有所謂卭部川卭部川之後即小雲南也卭部川之下即兩林虚恨蠻虚恨之下即馬湖大江蠻之部族夷都蠻也馬湖大江蠻每借兩林虚恨卭部川路販馬于青羗彌羗時有好馬至叙州互市皆得之西方馬湖一江自叙州入江至開邉寨右去為大江蠻左去為小江蠻小江即烏䝉部落也烏䝉疆界稍大扵諸蠻可為雲南之次所有之地隨小江而上遶出大江兩林虚恨之後與小雲南相接烏䝉之下即呂告蠻呂告之下即阿永蠻其他皆與蜀之諸郡接由卭部川可通黎州大渡河由虚恨可通峩眉縣中正寨由夷都可通犍為縣沐川寨由大江蠻可通宣化縣崖門及叙之開邉寨由呂告可通長寜由阿永河可通瀘水之江門寨此皆通行往来之路今小雲南已困小雲已亡若烏䝉次第皆破則驅諸蠻行熟路嘉定瀘叙長寕皆可至矣而臣之所憂又恐其㨗扵湖右盖阿永與播接而瀘之仁懐綏逺寨實出播州之境又與思播相連而思播可連南平珍黔以出鼎澧初無闗隘止以山箐為限可十日自烏䝉来吕告亦可十日自吕告来阿永可八九日阿永来播州可七八日播至鼎澧亦不過旬日而羅氏鬼主國在思播之後亦可透辰沅萬一計出扵此不但蜀邉腹背受敵而湖右之腹心先潰可不畏㢤臣謂廣西固當備蜀西之南徼湖北之南鄙尤當備盖廣西猶可諉曰炎瘴之毒非彼所宜在蜀西在湖北則併炎瘴無之矣以冀北之馬而行扵無所障礙之鄉其鋒何可當耶臣以為叙州兩江之㑹當用桑愈之說増兵屯駐扼塞要衝思播田楊之族當推赤心置其腹中相為犄角以為烏䝉國之籓籬使借兵出漢之謀不得逞則西蜀之南徼屹然如金城之不可抜辰沅之間當用史子翬之䇿増兵屯鼎澧之間當臣寮之說選擇憲守以為羅鬼國之前拒使斡腹旋出之師不可得進則湖北之南鄙截然如中防之制水矣然在蜀者宜申勅蜀帥使之用力闗防毋為輕敵之舉在湖北者宜亟建荆閫使之盡心區處毋為漫浪之計不然則長江在吾北不足為吾之限制而江以南為其所躪躤宗廟社稷将何地而置安㢤臣連䟽求去䝉陛下宣諭强顔復留偶聞廣西之事其敢自嘿比之經筵雖嘗畧言其槩猶未詳今為陛下底裏言之惟陛下宻與二三大臣圗之臣不勝俟命金世宗時宗叙嘗請募貧民戍邉屯田給以廪粟既貧者無艱食之患而富家免更代之勞得專農業上善其言而未行也十七年上謂宰臣曰戍邉之卒嵗冒寒暑往来畨休以馬牛往戍往往皆死且奪其農時敗其生業朕甚閔之朕欲使百姓安扵田里而邉圉彊固卿等何術可以致此左丞相良弼曰邉地不堪耕種不能久戍所以畨代耳上曰卿等以此急務為末事耶往嵗叅政宗叙嘗為朕言此事若宗叙可謂盡心扵國者矣今以兩路招討司烏庫哩石壘部族臨潢泰州等路分置堡戍詳定以聞朕將親覽上追念宗叙聞其子孫家用不給詔賜錢三千貫明昌五年配享世宗廟庭金東海侯大安初北兵南嚮召平定州刺史趙秉文與待制趙資道論備邉䇿秉文言今我軍聚扵宣徳城小列營其外涉暑雨器械弛敗人且病俟秋敵至將不利矣可遣臨潢一軍𢷬其虚則山西之圍可觧兵法所謂出其不意攻其必救者也金宣宗貞祐三年朝廷欲起代州戍兵五千河東路兵馬都緫管胥鼎上言嶺外軍皆已南徙代為邉要正宜益兵保守今更損其力一朝兵至何以待之平陽以代為藩籬豈可撤去尚書省奏宜如所請詔從之鼎為尚書左丞兼樞宻副使上言自兵興以来河北潰散軍兵流亡人户及山西河東老幼俱徙河南在處僑居各無本業易至動摇切慮有司妄分彼此或加廹遣以致不安今兵日益盛将及畿甸倘復誘其失職之衆使為向導或驅之攻城豈不益資其力乞朝廷遣官撫慰及令所司嚴為防閑庶㡬不至生釁上從其計詔諸道按察司講究防秋按察轉運使盧庸陳便宜曰自鄜延至積石雖多溝坂無長河大山為之屏蔽恃弓箭手以禦侮其人皆剛猛善闘熟于地利夏人畏之向者徙屯他所夏人即時犯邉此近年深患也人情樂土且耕且戰緩急將自奮又曰防秋之際宜先清野又曰掌軍之官不宜臨時易代兵家所忌將非其人屢代何益無何有言庸老不勝任者即罷之興定二年樞宻院以海州軍食不足艱于轉輸奏乞遷于内地詔問資徳大夫兼三司使尚書右丞侯摯奏曰海州連山阻海與沂莒邳密皆邉隅衝要之地比年以来為賊淵藪者宋人資給之故若棄而他徙則直抵東平無非敵境地大氣増後難圖矣臣未見其可且朝廷所以欲遷者止慮粮儲不給耳臣請盡力規畫勸喻農民趨時耕種且令煑塩易粮或置塲宿遷以通商旅可不勞民力而辦仍擇沭陽之地可以為營屯者分兵䕶邏雖不遷無患也上是其言乃止元世祖時成都失利帝遣人問所以失之之故及今措置之方昭勇大将軍䕫東路招討使李呼喇濟附奏曰初立成都惟建子城軍民止扵外城別無城壁宋軍乗虚来攻失扵不備軍官皆年少不經事之人以此失利四川地曠人稀宜修置城寨練習軍馬措畫屯田規運粮餉創造舟楫完繕軍器六者不可缺一又當任賢逺讒信賞必罰脩内治外戰勝攻取選用良將隨機應變則邉陲無虞矣中統元年六月郝經備禦奏目曰臣經言臣初離闕廷未知朝廷用兵次第雖條奏新政不敢遽言但舉備預大畧一條而已今聞西北阻命朝廷處置自遼東至于豐靖以及河西其闗隘備禦必無缺綻未知西域回鶻諸國及土波大理繞出西南嘗為備禦否其土地廣逺兵力豪勁且其酋長多變詐懼乗虚作變與西北連衡遏截錫哩大王在所蟻聚轉相營惑使有反顧之憂又西蜀兩川新集或為摇蕩使有意外之變宜遣一大官知兵者選集回鶻諸國土波大理一帶軍馬扵好水草險要處駐劄與闗西宣撫司肱脾相應是斷西北右臂且張聲勢以接應錫哩大王軍馬則國勢日張西北日沮諸國不敢覬覦兩川得以倚重如不為備或有透漏則數千騎可以突出闗西河南無結草之拒中原震動矣臣又切見江上退師以来宋人頗有輕中國之心盖彼瘡痍未完不敢窺伺然國家不可不為之備四川河南京東山東當置四緫帥西川自成都至興元接上均州置一帥河南自唐鄧至陳潁置一帥京東自睢亳至宿泗置一帥山東自邳徐沂海并東北海口置一帥扵陕西河南酌中處置一大行䑓緫統東西以壯國家藩垣便使宋人請和邉備亦當如此臣愚㣲眇爝火之見不敢自蔽且即入宋不勝戀闕故又及此伏取聖裁歴代名臣奏議巻三百三十九
