body:
  text: 歷代名臣奏議卷三十六明楊士竒等撰治道宋神宗熙寧二年司馬光上體要疏曰臣准御史臺牒伏奉四月二十日詔敕傳曰近臣盡規以其榮耻休戚與上同也今在此位者視朕過失與朝廷政事之闕默而不言乃或私議竊歎若以為其責不在已夫豈皆習見成俗以為當然其亦有含章懷寶待唱而後發者也今百度隳弛風俗偷惰薄惡烖異譴告不一此誠忠賢助朕憂惕以創制改法救弊除患之時宜令侍從官自今視朕過失與朝廷政事之闕無有巨細各具章奏極言無隱噫言善而不用朕有厥咎導之而弗言爾為不恭朕將用此考察在位所以事君之實明黜陟焉臣以駑下之材自仁宗皇帝時䝉擢在侍從服事三朝恩隆德厚殞身喪元不足為報雖訪問所不及猶將披肝瀝膽以效其區區之忠况聖意采納之勤督責之嚴諄諄如此臣敢營私避怨匿情愛已不為陛下别白當今之切務庶幾少補萬分之一邪臣聞為政有體治事有要自古聖帝明王垂拱無為而天下大治者凡用此道也何謂為政有體君為元首臣為股肱上下相維內外相制若網之有綱絲之有紀故詩云勉勉我王綱紀四方又云愷悌君子四方之綱古之王者設三公九卿二十七大夫八十一元士以綱紀其內設方伯州長卒正連帥屬長以綱紀其外尊卑有序若身之使臂臂之使指莫不率從此為政之體也何為治事有要夫人智有分而力有涯以一人之智力兼天下之要務欲物物而知之日亦不給矣是故尊者治衆卑者治寡治衆者事不得不約治寡者事不得不詳約則舉其大詳則盡其細此自然之勢也益稷曰元首明哉股肱良哉庶事康哉言君明則能擇臣臣良則能治事也又曰元首叢脞哉股肱惰哉萬事墮哉言君親細務則臣不盡力而事廢壞也立政曰文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹言文王擇有司而任之其餘皆不足知也康誥曰庸庸祗祗威威顯民言文王用其可用祗其可祗刑其可刑專明此道以示民也是故王者之職在於量材任人賞功罰罪而已茍能慎擇公卿牧伯而屬任之則其餘不待擇而精矣謹察公卿牧伯之賢愚善惡而進退誅賞之則其餘不待進退誅賞而治矣然則王者所擇之人不為多所察之事不為煩此治事之要也臣竊見陛下日出視朝繼以經席將及日中乃還宫禁入宫之後竊聞亦不自閒省閲天下奏事羣臣章疏逮至昏夜又御燈火研味經史博觀羣書雖中宗髙宗之不敢荒寧文王之日昃不食臣以為不能及也然自踐阼以來孜孜求治於今三年而功業未著者殆未得其體要故也祖宗創業垂統為後世法內則設中書樞密院御史臺三司審官審刑等在京諸司外則設轉運使知州知縣等衆官以相統御上下有敘此所謂紀綱者也今陛下好使大臣奪小臣之事小臣侵大臣之職是以大臣解體不肯竭忠小臣諉上不肯盡力此百官所以弛廢而萬事所以隳頽者也而陛下方用為致治之本此臣之所大惑也臣微賤不得盡知朝廷之事且以耳目所接近日數事臣所知者言之其餘陛下可以類求也昔漢文帝問陳平天下一嵗決獄及錢榖出入幾何平曰陛下即問決獄責廷尉問錢榖責治粟內史必使卿大夫各任其職此乃宰相事也若平者可謂能知治體矣今之兩府皆古宰相之任也中書主文樞密主武若乃百官之長非其人刑賞大政失其宜此兩府之責也至於錢榖之不充條例之不當此三司之事也陛下茍能精選曉知錢榖憂公忘私之人以為三司使副判官諸路轉運使各使久於其任以盡其能有功則進無功則退名不能掩實僞不能亂真安民勿擾使之自富處之有道用之有節何患財利之不豐哉今乃使兩府大臣悉取三司條例别置一局聚文士數人與之謀議改更制置三司皆不與聞臣恐所改更者未必勝於其舊而徒紛亂祖宗成法考古則不合適今則非宜吏緣為姦農商失業數年之後府庫耗竭於上百姓愁困於下衆心離駭將不復振矣且兩府於天下之事無所不總若百官之職皆使兩府治之則在上者不勝其勞而在下者為無所用矣又監牧使主養馬四園苑主課利今乃使監牧使不屬群牧司四園苑不屬三司提舉司則在下者各得專權自恣而在上者為無所用矣陛下方欲納天下於大治而使百官在上者不委其下在下者不禀其上能為治乎若此之類臣竊恐似未得其體也凡天下之事在一縣者當委之知縣在一州者當委之知州在一路者當委之轉運使在邊鄙者當委之將帥然後事乃可集何則久在其位識其人情知其物宜賞罰之權足以休戚所部之人使之信服故也今朝廷每有一事不委之將帥監司守宰使之自為方略責以成效而施其刑賞常好别遣使者銜命奔走旁午於道所至徒有煩擾之弊而於事未必有益不若勿遣之為愈也夫事之利害吏之能否皆非使者所能素知不免臨時詢采於人所詢者或遇公明忠信之人猶僅能得其一二或遇私暗奸險之人則是非為之倒置矣此二者交集於前而使者不能猝辨也是以往往害事而少能為益非將帥監司守宰皆賢而使者皆愚也纍歲之講求與一朝之議論積久之采察與目前之毁譽精粗詳略其勢不同故也其有居官纍嵗而不知利害臨人積久而不知能否或雖知利害而不能變更雖知能否而不能黜陟此乃愚昧私曲之人朝廷當察而去之更擇賢者以代其位不當數遣使者擾亂其間使不得行其職業也又庸人之情茍䇿非已出則媢嫉沮壞惟恐其成官吏若是者十常五六借使使者所規畫曲盡其宜在彼之日其當職之人已怏怏不悅不肯同心以助其謀協力以成其事曰朝廷自遣專使治之我何敢與知及返命之日彼必敗之於後曰使者既謀而授我我今竭力而成之功悉歸於首謀之人我何有哉此所以謂不若毋遣使者而屬任當職之人為愈也夫使者所以通逺邇之情固不可無然今之轉運使即古使者之任茍得人而委之賢於暫遣使者逺矣若監司自為姦慝貪縱或有所隱蔽欺罔或為部內之人所訟或所謀畫之事未得其宜朝廷欲察其罪惡審其虛實判其曲直決其是非然後别遣使者按之若按得其實監司有罪則當刑不才則當廢豈有但已者也今每有一事朝廷輒自京師遣使者往治之是在外之官皆無所用也使者既代之治事而當職之人亦無所刑無所廢是只使之拱手旁觀偷安竊祿者矣若此之類臣竊恐似未得其體也今朝廷之士左右之臣皆曰陛下聰明剛斷威福在已太平之功可指日而致臣愚竊獨以為未也臣聞古之聖帝明王聞人之言則能識其是非故謂之聰觀人之行則能察其邪正故謂之明是非既辨邪正既分奸不能惑佞不能移故謂之剛取是而捨非誅邪而用正確然無所疑故謂之斷誅一不善而天下不善者皆懼故謂之威賞一有功而天下有功者皆喜故謂之福今陛下聰明剛斷則誠體之矣欲取威福之柄則誠有其志矣然於所以為之之道尚或有所未盡故臣以為太平之功未可期也夫帝王之道當務其逺者大者而略其近者小者國之大事當與公卿議之而不當使小臣參之四方之事當委牧伯察之而不當使左右覘之儻公卿牧伯尚不能擇賢者而任之小臣左右獨能得賢者而使之乎若茍為不賢則險詖私謁無不為已今陛下好於禁中出手詔指揮外事非公卿所薦舉牧伯所糾劾或非次遷官或無故廢罷外人疑駭不知所從此豈非朝廷之士左右之臣所謂聰明剛斷威福在己者耶陛下聞其言而信之臣竊以為過矣夫公卿所薦舉牧伯所糾劾或謂之賢者而不賢謂之有罪而無罪皆有迹可見責有所歸故不敢大為欺罔若姦臣密白陛下令陛下自為聖意以行之則威福集於私門怨謗歸於陛下矣安得謂之威福在陛下耶且陛下鄉時中詔所指揮者率非大事至於兩禁美官邊藩將帥省府職任諸路監司此皆衆人之所希求治亂之所繫屬當除授之際竊恐未必一一出聖志也若乃奸邪貪猥之人陛下所明知而黜去者或更改官而升資或不久復進用然則威福之柄果不在陛下而陛下偶未之思也以此觀之面譽陛下聰明剛斷威福在己太平可立致者非愚則諛不可不察也陛下必欲威福在己曷若謹擇公卿大臣明正忠信者留之愚昧阿私者去之在位者既皆得其人矣然後凡舉一事則與之公議於朝使各言其志陛下清心平慮擇其是者而行之非者不得復奪也凡除一官亦與之公議於朝使各舉所知陛下清心平慮擇其賢者而用之不肖者不能復爭也如此則謀者舉者雖在公卿大臣而行之用之皆在陛下安得謂之威福不在己邪陛下此之不為而顧彼之久行臣竊恐未得其要也夫三人羣居無所統一不散則亂是故立君以司牧之羣臣百姓勢均力敵不能相治故從人君決之人君者固所以決是非行賞罰也若人君復不肯決當使從誰決之乎夫人心不同有如面焉國家凡舉一事朝野之人必或以為是或以為非凡用一人必或以為賢或以為不肖此固人情之常自古而然不足怪也要在人主審其是非而取捨之取是而捨非則安榮取非而捨是則危辱此乃安危榮辱之所以分也是以聖王重之故博謀羣臣下及庶人然而終決之者要在人君也古人有言曰謀之多故可以觀利害之極致斷之獨故可以定天下之是非若知謀而不知斷則羣下人人各欲逞其私志此衰亂之政也詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猷匪先民是程匪大猷是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成此言周室之衰人臣不知先王之大道務爭近小之事人君不能定其可否而事終無成也漢世國家有大典禮大政令大刑獄大征伐必下公卿大夫博士議郎議其議者固不能一必有參差不齊者矣於是天子稱制決之曰丞相議是或曰廷尉當是而群下厭然無有不服者矣今陛下聽羣臣各盡其情以議事此誠善矣然終不肯以聖志裁決遂使羣臣有尚勝者以巧文相攻辨口相擠至于再至于三互相反覆無有限極臣愚深恐虧朝廷之政體損陛下之明德流聞四方取輕九域非嘉事也夫天下之事有難決者以先王之道揆之若權衡之於輕重規矩之於方圓錙銖毫忽不可欺矣是以人君務明先王之道而不習律令知本根既殖則枝葉必茂故也近者登州婦人阿云謀殺其夫重傷垂死情無可愍在理甚明已傷不首於法無疑中材之吏皆能立斷事已經審刑院大理寺刑部斷為死罪而前知登州許遵文過飾非妄為巧說朝廷命兩制定奪者再命兩府定奪者再敕出而復收者一收而復出者一爭論縱橫至今未定夫以田舍一婦人有罪在於四海之廣萬幾之衆其事之細何啻秋毫之末朝廷欲斷其獄委一吏足矣今乃紛紜至此設更有一可疑之事大於此者將何以決之夫執條據例者有司之職也原情制義者君相之事也分爭辨訟非禮不決禮之所去刑之所取也阿云之事陛下試以禮觀之豈難決之獄哉彼謀殺為一事為二事謀為所因不為所因此苛察繳繞之論乃文法俗吏之所爭豈明君賢相所當留意邪今議論嵗餘而後成法終於棄百代之常典悖三綱之大義使良善無告奸凶得志豈非徇其枝葉而忘其本根之所致邪若此之類臣竊恐似未得其要也此皆衆人之所私議竊歎而莫敢明言者臣獨以受恩深重不顧斧鉞為陛下言之惟聖明裁察三年翰林學士范鎮上奏曰臣請致仕已四上章歷日彌旬未聞報可緣臣所懷有可去者二不敢不陳臣言青苖不見聽一可去薦蘇軾孔文仲不見用二可去負二可去重之以多病早衰其可以已乎今人有言獻忠與獻佞孰是必曰獻忠是納諫與拒諫孰是必曰納諫是蘇軾孔文仲可謂獻忠矣陛下拒而不納必有獻佞以誤陛下者不可不察也若李定避持服遂不認母是壞人倫逆天理者而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求罷李大臨罷蘇頌諫院罷胡宗愈王韶上書肆意欺妄以興造邊事敗則置而不問反為之罪帥臣李師中及御史一言蘇軾則下七路掎托其過孔文仲則遣之歸任以此二人况彼二人以彼事理觀此事理孰是孰非孰得孰失陛下聰明之主其可以逃聖鑒乎惟審思而熟計之朝廷所恃者賞罰而賞罰如此如天下何如宗廟社稷何至於言青苖則曰有效矣夫所謂見效者豈非嵗得緡錢數十百萬乎數十百萬者非出於天非出於地非出於建議者之家一出於民民出之而不已則數嵗之後將如之何民猶魚也財猶水也水深則魚活財裕則民有生意養民而盡其財臂猶養魚而欲竭其水也今之官但能多散青苖急其期會者則有自知縣擢為轉運判官擢為提㸃刑獄急進僥幸之人豈復顧陛下百姓乎但知趨賞爾臣恐陛下百姓相濡於涸轍中矣陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術臣職獻替此時而無一言則負陛下多矣臣知言入必觸大臣怒則罪在不測雖然臣嘗以忠事仁皇帝仁皇帝不賜之死才聽解言職而已以禮事英皇帝英皇帝不加之罪才令補畿郡而已不以所事二帝之心而事陛下是臣自棄於世也臣為此章欲上而中止者數矣既而自謂曰今而後歸伏田閭雖有忠言嘉謀不得復聞朝廷矣所以上之決然不疑惟陛下裁赦直史館判官誥院蘇軾擬進士對御試䇿曰臣切見陛下始革舊制以䇿試多士厭聞詩賦無益之語將求山林朴直之論聖德廣大中外歡悅而所試舉人不能推原上意皆以得失為慮不敢指陳闕政而阿諛順㫖者又率據上第陛下之所以求於人至深切矣而下之報上者如此臣竊悲之夫科場之文風俗所係所收者天下莫不以為法所棄者天下莫不以為戒昔祖宗之朝崇尚辭律則詞賦之工曲盡其巧自嘉祐以來以古文為貴則䇿論盛行於世而詩賦幾至於熄何者利之所在人無不化今始以䇿取士而士之在甲科者多以諂諛得之天下觀望誰敢不然臣恐自今以往相師成風雖直言之科亦無敢以直言進者風俗一變不可復返正人衰微則國隨之非復詞賦䇿論迭興迭廢之比是以不勝憤悶退而擬進士對御試䇿一道學術淺陋不能盡知當世之切務載所聞見將以推廣於聖言庶有補於一二將以開示四方使知陛下本不諱惡切直之言風俗雖壞猶可以少救其所撰䇿謹繕寫投進策曰臣伏見陛下發德音下明詔以天下安危之至計謀及於布衣之士其求之不可謂不切其好之不可謂不篤矣然臣私有所憂者不知陛下有以受之歟禮曰甘受和白受采故臣願陛下先治其心使虛一而靜然後忠言至計可得而入也今臣竊觀陛下先入之言已實其衷邪正之黨已二其聽功利之說已動其欲則雖有臯陶益稷為之謀亦無自入矣而况於疏逺愚陋者乎此臣之所以大懼也若乃盡言以招過觸諱以亡軀則非臣之所恤也聖䇿曰聖王之御天下也百官得其職萬事得其序臣以為陛下未知此也是以所為顛倒失序如此茍誠知之曷不尊其所聞而行其所知歟百官之所以得其職者豈聖王人人而督責之歟萬事之所以得其序者豈聖王事事而整齊之歟亦因能以任職因職以任事而已官有常守謂之職施有先後謂之序今陛下使兩府大臣侵三司財利之權常平使者亂職司守令之法刑獄舊法不以付有司而取決於執政之意邊鄙大慮不責帥臣而聽計於小吏之口百官可謂失其職矣王者之所宜先者德也所宜後者刑也所宜先者義也所宜後者利也而陛下易之可謂萬事失其序矣然此猶其小者若其大者則中書失其政也宰相之職古者所以論道經邦今陛下但使奉行條例司文書而已昔邴吉為丞相蕭望之為御史大夫望之言隂陽不和咎在臣等宣帝以為意輕丞相終身薄之今政事堂忿爭相抵流傳都邑以為口實使天下何觀焉故臣願陛下首還中書之政則百官之職萬事之序以次得矣聖䇿曰有所不為為之而無不成有所不革革之而無不服陛下及此言是天下之福也今日之患正在於未成而為之未服而革之耳夫成事在理不在勢服人以誠不以言理之所在以為則成以禁則止以賞則勸以言則信古之人所以鼓舞天下綏之斯來動之斯和者蓋循理而已今為政不務循理而欲以人主之勢賞罰之威而成之夫以斧析薪可謂必克矣然不循其理則斧可缺薪不可破是以不論尊卑不計强弱理之所在則成所不在則不成可必也今陛下使農民舉息與商賈爭利豈理也哉而怪其不成乎禮曰微之顯誠之不可掩也如此夫陛下茍誠心乎為民則雖或謗之而人不信茍誠心乎為利則雖自解釋而人不服且事有決不可欺者吏受賄枉法人必謂之贓非其有而取之人必謂之盜茍有其實不敢辭其名今青苖有二分之息而不謂之放債取利可乎凡人為善不自譽而人譽之為惡不自毁而人毁之如使為善者必須自言而後信則堯舜周孔亦勞矣今天下以為利陛下以為義天下以為貪陛下以為廉不勝其紛紜也則使二三臣者極其巧辨以解答千萬人之口附會經典造為文書以曉告四方之人豈如嬰兒鳥獸可以美言小數眩惑之哉且夫未成而為之則其弊必至於不敢為未服而革之則其弊必至於不敢革蓋世有好走馬者一為墮傷則終身徒行何者謹重則必成輕發則多敗此理之必然也陛下若出於謹重則屢作屢成不唯人信之陛下亦自信而日以勇矣若出於輕發則每舉每敗不唯人不信陛下亦不自信而日以怯矣文宗始用訓注其志豈淺也哉一經大變則憂沮喪氣不能復振文宗亦非有失德徒以好作而寡謀也謹重者始若怯終必勇輕發者始若勇終必怯乃者橫山之人未嘗一日而忘漢雖五尺童子知其可取然自慶歷以來莫之敢發誠未有以善其後也近者邊臣不計其後而遽發之一發不中則內帑之費以數百萬計而關輔之民困於飛挽者二年而未已雖天下之勇者不敢復言之也由此觀之則橫山之功是邊臣欲速而壞之也近者青苖之政助役之法均輸之䇿併軍搜卒之令率然輕發又甚於前日矣雖陛下不恤人言持之益堅而勢窮事礙終亦必變他日雖有良法美政陛下能復自信乎人君之患在於樂因循而重改作今陛下春秋鼎盛天錫智勇此萬世一時也羣臣不能濟之以謹重養之以淳朴譬如乘輕車馭駿馬冒險夜行而僕夫又從後鞭之豈不殆哉臣願陛下解轡秣馬以須東方之明而徐行於九軌之道甚未晚也聖䇿曰田疇闢溝洫治草木暢茂鳥獸魚鱉莫不各得其性者此百工有司之事曽何足以纍陛下陛下操其要治其本恭已無為而物莫不盡其理以生以死若夫百工有司之事自宰相不屑為之而況於陛下乎聖䇿曰其富足以備禮其和足以廣樂其治足以致刑何施而可臻此孔子曰百姓足君孰與不足首瓠葉可以行禮掃地而祭可以事天禮之不備非貧之罪也管子曰倉廪實而知禮節臣不知陛下所謂富者富民歟抑富國歟陸賈曰將相和則士豫附劉向曰衆賢和於朝則萬物和於野今朝廷可謂不和矣其咎安在陛下不反求其本而欲以力勝之力之不能勝衆也久矣古者刀鋸在前鼎鑊在後而士猶犯之今陛下躬蹈堯舜未嘗誅一無罪欲息衆言不過盡逐異議之臣而更用人耳必未忍行亡秦偶語之禁東漢黨錮之法則士何畏而不言哉臣恐逐者不已而爭者益多煩言交攻必甚於今日矣欲致和而廣樂豈不疏哉古之求治者將以措刑也今陛下求治而欲致刑此又羣臣誤陛下也臣知其說是出於荀卿荀卿好為異論至以人性為惡則其言治世刑重亦宜矣說者又以為書稱唐虞之隆刑故無小而周之盛時羣飲者殺臣請有以辨之夏禹之時大辟二百周公之時大辟三百豈可謂周治而禹亂邪秦及三族漢除肉刑豈可謂秦治而漢亂邪致之言極也天下幸而大治使一日未安陛下將變今之刑而用其極歟天下幾何不叛耶徒聞其語而懼者已衆矣臣不意異端邪說惑誤陛下至如此宥過無大刑故無小此用刑之常理也至於今守之豈獨唐虞之隆而周之盛矣所以誅群飲者以為其意非獨群飲而已如今之法所謂夜聚曉散者使後世不知其詳而徒聞其語則凡夜相過者皆執而殺之可乎夫人相與飲酒而輒殺之雖桀紂之暴不至於此而謂周公行之歟聖䇿曰方今之弊可謂衆矣救之之道必有本末所施之宜必有先後臣請論其本與其所宜先者而陛下擇焉方今救弊之道必先立事立事之本在於知人則所施之宜當先觀大臣之知人與否耳古之欲立非常之功者必有知人之明茍無知人之明則循規矩蹈繩墨以求寡過二者皆審於自知而安於才分者也道可以講習而知德可以勉强而能唯知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉以諸葛孔明之賢而知人之明則其所短是以失之於馬謖而孔明亦審於自知是以終身不敢用魏延我仁祖之在位也事無大小一付之於法人無賢不肖一付之於公議事已效而後行人已試而後用終不求非常之功也誠以當時大臣不足以與知人之明也古之為醫者聆音察色洞視五藏則其治疾也有剖胸決脾洗濯肺腑之變茍無其術不敢行其事今無知人之明而欲非常之功解縱繩墨以慕古人則是未能察脉而欲試華陀之方其異於操刀殺人者幾希矣房琯之稱劉秩關播之用李元平是也至今以為笑陛下觀今之大臣為知人歟為不知人歟乃者擢用衆才皆其造室握手之人要結審固而後敢用蓋以為其人可與戮力同心共致太平曽未安席而交口攻之者如蝟毛而起陛下以此驗之其不知人也亦審矣幸今天下無事異同之論不過瀆亂聖聽而已若邊隅有警盜賊竊發俯仰成敗呼吸變故而所用之人皆如今日乍合乍散臨事解體不可復知則無乃誤社稷歟華陀不世出天下未嘗廢醫蕭何不世出天下未嘗廢治陛下必欲立非常之功請待知人之佐若猶未也則亦詔左右之臣安分守法而已聖䇿曰生民以來稱至治者必曰唐虞成周之世詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善然要其所以成就亦必有可言者其詳言之臣以為此不可勝言也其施設之方各因其時而不可知其所可知者必畏天必從衆必法祖宗故其言曰戒之戒之天維顯思命不易哉又曰稽於衆舍已從人又曰丕顯哉文王謨丕承哉武王烈詩書所稱大略如此未嘗言天命不足畏衆言不足從祖宗之法不足用也苻堅用王猛而樊世仇騰席寶不悅魏鄭公勸太宗以仁義而封倫不信凡今之人欲陛下違衆而自用者必以此藉口陛下所謂賢明忠智者豈非意在此等歟臣願考二人之所行而求之於今王猛豈嘗設官而牟利魏鄭公豈嘗貸錢而取息歟且其不悅者不過數人固不害天下之信且服也今天下有心者怨有口者謗古之君臣相與憂勤以營一代之業者似不如此詩云百人之聚未有不攻而破況天下乎今天下非之而陛下不回臣不知所稅駕矣詩云譬彼舟流不知所届心之憂矣不遑假寐區區忠藎惟陛下察之臣謹昧死上對四年軾又上書曰臣近者不度愚賤輒上封章言買燈事自知瀆犯天威罪在不赦席稿私室以待斧鉞之誅而側聽逾旬威命不至問之府司則買燈之事尋已停罷乃知陛下不惟赦之又能聽之驚喜過望以至感泣何者改過不吝從善如流此堯舜禹湯之所勉强而力行秦漢以來之所絶無而僅有顧此買燈毫髮之失豈能上纍日月之明而陛下翻然改命曽不移刻則所謂智出天下而聽於愚者威加四海而屈於匹夫臣今知陛下可與為堯舜可與為湯武可與富民而措刑可與强兵而伏戎矣有君如此其忍負之惟當披露腹心捐棄肝腦盡力所致不知其他乃者臣知天下之事有大於買燈者矣而獨區區以此為先者蓋未信而諫聖人不與交淺言深君子所戒是以試論其小者而其大者固將有待而後言今陛下果赦而不誅則是既已許之矣許而不言臣則有罪是以願終言之臣之所欲言者三言而已願陛下結人心厚風俗存紀綱夫人莫不有所恃人臣恃陛下之命故能役使小民恃陛下之法故能勝服强暴至於人主所恃者誰書曰豫臨兆民凛乎若朽索之馭六馬言天下莫危於人主也聚則為君民散則為仇讐聚散之間不容毫釐故天下歸往謂之王人各有心謂之獨夫由此觀之所恃者人心而已人心之於人主也如木之有根如燈之有膏如魚之有水如農夫之有田如商賈之有財木無根則槁燈無膏則燼魚無水則死農無田則飢商賈無財則貧人主失人心則亡此理之必然不可逭之災也其為可畏從古以然茍非樂禍好亡狂易喪志則孰敢肆其胸臆輕犯人心昔子産焚載書以弭衆言賂伯石以安巨室以為衆怒難犯專欲難成而孔子亦曰信而後勞其民未信則以為厲已也唯商鞅變法不顧人言雖能驟致富强亦已召怨天下使其民知利而不知義見刑而不見德雖得天下旋踵而失也至於其身亦卒不免負罪出走而諸侯不納車裂以徇而秦人莫哀君臣之間豈願如此宋襄公雖行仁義失衆而亡田常雖不義得衆而强是以君子未論行事之是非先觀衆心之向背謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而勢有不可則反為危辱自古及今未有和易同衆而不安剛果自用而不危者也今陛下亦知人心之不悅矣中外之人無賢不肖皆言祖宗以來治財用者不過三司使副判官經今百年未嘗闕事今者無故又創一司號曰制置三司條例使六七少年日夜講求於內使者四十餘輩分行營幹於外造端宏大民實驚疑創法新竒吏皆惶惑賢者則求其說而不可得未免於憂小人則以其意度於朝廷遂以為謗謂陛下以萬乘之主而言利謂執政以天子之宰而治財商賈不行物價騰踴近自淮甸逺及川蜀喧傳萬口論說百端或言京師正店議置監官夔路深山當行酒禁拘收僧尼常住減刻兵吏廪祿如此等類不可勝言而甚者至於欲復肉刑斯言一出民且狼顧陛下與二三大臣亦聞其語矣然而莫之顧者徒曰我無其事又無其意何恤於人言雖未必皆然而疑似則有以致謗人必貪財也而後人疑其盜人必好色也而後人疑其淫何者未置此司則無其謗豈去嵗之人皆忠厚而今嵗之人皆虛浮孔子曰工欲善其事必先利其器又曰必也正名乎今陛下操其器而諱其事有其名而辭其意雖家置一喙以自解市列千金以購人人必不信謗亦不止夫制置三司條例司求利之名六七少年與使者四十餘輩求利之器也驅鷹犬而赴林藪語人曰我非獵也不如放鷹犬而獸自馴操罔罟而入江湖語人曰我非漁也不如捐罔罟而人自信故臣以為消讒慝而召和氣復人心而安國本則莫若罷制置三司條例司夫陛下之所以創此司者不過以興利而除害也使罷之而利不興害不除則勿罷罷之而天下悅人心安興利除害無所不可則何苦而不罷陛下欲去積弊而立法必使宰相熟議而後行事若不由中書則是亂世之法聖君賢相夫豈其然必若立法不免由中書熟議不免使宰相此司之設無乃冗長而無名智者所圖貴於無迹漢之文景紀無可書之事唐之房杜傳無可載之功而天下之言治者與文景言賢者與房杜蓋事已立而迹不見功已成而人不知故曰善用兵者無赫赫之功豈惟用兵事莫不然今所圖者萬分未獲其一也而迹之布於天下已若泥中之鬭獸亦可謂拙謀矣陛下誠欲富國擇三司官屬與漕運使副而陛下與二三大臣孜孜講求磨以嵗月則積弊自去而人不知但恐立志不堅中道而廢孟軻有言其進鋭者其退速若有始有卒自可十年之後何事不立孔子曰欲速則不達見小利則大事不成使孔子而非聖人則此言亦不可用書曰謀及卿士至於庶人翕然大同乃底元吉若逆多而從少則靜吉而作凶今上自宰相大臣既已辭免不為則外之議論斷亦可知宰相人臣也且不欲以此自汙而陛下獨安受其名而不辭非臣愚之所識也君臣宵旰幾一年矣而富國之效茫如捕風徒聞內帑出數百萬緡祠部度五千餘人耳以此為術其誰不能且遣使縱橫本非令典漢武遣繡衣直指桓帝遣八使皆以守宰狼籍盜賊公行出於無術行此下䇿宋文帝元嘉之政比於文景當責成郡縣未嘗遣使至孝武以為郡縣遲緩始命臺使督之以至蕭齊此弊不革故景陵王子良上疏極言其事以為此等朝辭禁門情態即異暮宿州縣威福便行驅迫郵傳折辱守宰公私勞擾民不聊生唐開元中宇文融奏勸農判官使裴寬等二十九人並攝御史分行天下招擕户口撿責漏田時張說楊瑒皇甫璟楊相如皆以為不便而相繼罷黜雖得户八十餘萬皆州縣希㫖以主為客以少為多及使百官集議都省而公卿以下懼融威勢不敢異辭陛下讀之觀其所行為是為否近者均稅寬恤冠蓋相望朝廷亦旋覺其非而天下至今以為謗曽未數嵗是非較然臣恐後之視今亦猶今之視昔且其所遣尤不適宜事少而員多人輕而權重夫人輕而權重則人多不服或致侮慢以興爭事少而員多則無以為功必須生事以塞責陛下雖嚴賜約束不許邀功然人臣事君之常情不從其令而從其意今朝廷之意好動而惡靜好同而惡異指趣所在誰敢不從臣恐陛下赤子自此無寧嵗矣至於所行之事行路皆知其難何者汴水濁流自生民以來不以種稻秦人之歌曰涇水一石其泥數斗且溉且糞長我禾黍何嘗言長我粳稻邪今欲陂而清之萬頃之稻必用千畝之陂一嵗一淤三嵗而滿矣陛下遂信其說即使相視地形萬一官吏茍且順從真謂陛下有意興作上糜帑廩下奪農時隄防一開水失故道雖食議者之肉何補於民天下久平民物滋息四方遺利蓋略盡矣今欲鑿空訪尋水利所謂即鹿無虞豈惟徒勞必大煩擾凡所擘畫不問何人小則隨事酬勞大則量才録用若官私阻格並行黜降不以赦原若才力不辦興修便許申奏替換賞可謂重罰可謂輕然並終不言諸色人妄有申陳或官私誤興功役當得何罪如此則妄庸輕剽浮浪姦人自此爭言水利矣成功則有賞敗事則無誅官司雖知其疏豈可便行抑退所在追集老少相視可否吏卒所過雞犬一空若非灼然難行必須且為興役何則格阻之罪重而誤興之過輕人多愛身勢必如此且古陂廢堰多為側近冒耕嵗月既深已同永業茍欲興復必盡追收人心或搖甚非善政又有好訟之黨多怨之人妄言某處可作陂渠規壞所怨田産或指人舊業以為官陂冒佃之訟必倍今日臣不知朝廷本無一事何苦而行此哉自古役人必用鄉户猶食之必用五穀衣之必用絲麻濟川之必用舟楫行地之必用牛馬雖其間或有以他物充代然終非天下所可常行今者徒聞江浙之間數郡顧役而欲措之天下是猶見燕晉之棗栗岷蜀之蹲鴟而欲以廢五穀豈不難哉又欲官賣所在坊場以充衙前顧直更無酬勞長役雖有長役所得既微自此必漸衰散則州郡事體憔悴可知士大夫捐親戚棄墳墓以從宦於四方者宣力之餘亦欲取樂此人之至情也若雕弊太甚厨傳蕭然則似危邦之陋風恐非太平之盛觀陛下試慮及此必不肯為且今法令莫嚴於御軍軍法莫嚴於逃竄禁軍三犯廂軍五犯大率處死然逃軍常半天下不知顧人為役與廂軍何異若有逃者何以罪之其勢必輕於逃軍則其逃必甚於今日為其官長不亦難乎近者雖使鄉户頗得顧人然至於所顧逃亡鄉户猶任其責今遂於兩稅之外别立一科謂之庸錢以備官顧則顧人之責官所自任矣自唐楊炎廢租庸調以為兩稅取大厯十四年應征賦斂之數以定兩稅之額則是租調與庸兩稅既兼之矣奈何復欲取庸聖人之立法必慮後世豈可於兩稅之外生出科名萬一後世不幸有多欲之君輔之以聚斂之臣庸錢不除差役仍舊使天下怨毒推所從來則必有任其咎者矣又欲使坊郭等第之民與鄉户均役品官形勢之家與齊民並事其說曰周禮田不耕者出屋粟宅不毛者有里布而漢世宰相之子不免戍邊此其所以藉口也古者官養民今者民養官給之以田而不耕勸之以農而不力於是有里布屋粟夫家之征而民無所為生去而為商賈事勢當爾何名役之且一嵗之戍不過三日三日之顧其直三百今世三大户之役自公卿以降毋得免者其費豈特三百而已大抵事若可行不必皆有故事若民所不悅俗所不安縱有經典明文無補於怨若行此三者必怨無疑女户單丁蓋天民之窮者也古之王者首務恤此而今陛下首欲役之此等茍非户將絶而未亡則是家有丁而尚幼若假之嵗月則必成丁而就役老死而沒官富有四海忍不加恤孟子曰始作俑者其無後乎春秋書作丘甲用田賦皆重其始為民患也青苖放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汙吏陛下能保之歟異日天下恨之國史記之曰青苖錢自陛下始豈不惜哉且東南買絹本用見錢陜西糧草不許拆兑朝廷既有著令職司又每舉行然而買絹未嘗不折鹽糧草未嘗不折鈔乃知青苖不許抑配之說亦是空文只如治平之初揀刺義勇當時詔㫖慰諭明言永不戍邊著在簡書有如盟約于今幾日議論已搖或以代還東軍或欲抵換弓手約束難恃豈不明哉縱使此令決行果不抑配計其間願請之户必皆孤貧不濟之人家若自有贏餘何至與官交易此等鞭撻已急則繼之逃亡逃亡之餘則拘之鄰保勢有必至理有固然且夫常平之為法也可謂至矣所守者約而所及者廣借使萬家之邑止有千斛而榖貴之際千斛在市物價自平一市之價既平一邦之民自足無專㪷乞丐之弊無里正催驅之勞今若變為青苖家貸一斛則千户之外孰救其飢且常平官錢常患其少若盡數收糴則無借貸若留充借貸則所糴幾何乃知常平青苖其勢不能兩立壞彼成此所喪愈多虧官害民雖悔何逮臣竊計陛下欲考其實必然問人人知陛下方欲力行必謂此法有利無害以臣愚見恐未可憑何以明之臣在陜西見刺義勇提舉諸縣臣嘗親行愁怨之民哭聲振野當時奉使還者皆言民盡樂為希合取容自古如此不然則山東之盜二世何緣不覺南詔之敗明皇何緣不知今雖未至於斯亦望陛下審聽而已昔漢武之世財力匱竭用賈人桑羊之說買賤賣貴謂之均輸于時商賈不行盜賊滋熾幾致於亂孝昭既立學者爭排其說霍光順民所欲從而豫之天下歸心遂以無事不意今者此論復興立法之初其說尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既已許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廪祿為費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以豫之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多今有人為其主牧牛羊不告其主而以一牛易五羊一牛之失則隱而不言五羊之獲則指為勞績陛下以為壞常平而言青苖之功虧商稅而取均輸之利何以異此陛下天機洞照聖略如神此事至明豈有不曉必謂已行之事不欲中變恐天下以為執德不一用人不終是以遲留嵗月庶幾萬一臣竊以為過矣古之英主無出漢高酈生謀撓楚權欲復六國髙祖曰善趣刻印及聞留侯之言吐哺而罵曰趣銷印稱善未幾繼之以罵刻印銷印有同兒嬉何嘗纍髙祖之知人適足明聖人之無我陛下以為可而行之知其不可而罷之至聖至明無以加此議者必謂民可與樂成難與慮始故陛下堅執不顧期於必行此乃戰國貪功之人行險僥幸之說陛下若信而用之則是徇髙論而逆至情持空名而邀實禍未及樂成而怨已起矣臣之所願結人心者此之謂也士之進言者為不少矣亦嘗有以國家之所以存亡歷數之所以長短告陛下者乎國家之所以存亡者在道德之淺深不在乎强與弱歷數之所以長短者在風俗之薄厚而不在乎富與貧道德誠深風俗誠厚雖貧且弱不害於存而長道德誠淺風俗誠薄雖强且富不救於短而亡人主知此則知所以輕重矣是以古之賢君不以弱而亡道德不以貧而傷風俗而智者觀人之國亦以此而察之齊至强也周公知其後有篡弒之臣衛至弱也季子知其後亡吳破楚入郢而陳大夫逢滑知楚之必復晉武既平吳何曽知其將亂隋文既平陳房喬知其不久元帝斬郅支朝呼韓功多於武宣矣偷安而王氏之釁生宣宗收燕趙復河湟力强於憲武矣消兵而龎勛之亂起故臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富强使陛下富如隋强如秦西取靈武北取燕薊謂之有功可也而國之長短則不在此夫國之長短如人之夀夭人之夀夭在元氣國之長短在風俗世有尫羸而夀考亦有盛壯而暴亡若元氣猶存則尫羸而無害及其已耗則盛壯而愈危是以善養生者慎起居節飲食道引關節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害則五臟和平而夀命長不善養生者薄節慎之功遲吐納之效厭上藥而用下品伐真氣而助强陽根本已空僵仆無日天下之勢與此無殊故臣願陛下愛惜風俗如護元氣古之聖人非不知深刻之法可以齊衆勇悍之夫可以集事忠厚近於迂闊老成初若遲鈍然終不肯以彼易此者知其所得小而所喪大也曹參賢相也曰慎無擾獄市黃霸循吏也曰治道去泰甚或譏謝安以清談廢事安笑曰秦用法吏二世而亡劉晏為度支專用果鋭少年務在急速集事好利之黨相師成風唐德宗初即位擢崔祐甫相以道德寬大推廣上意故建中之政其聲翕然天下相望庶幾貞觀及盧把為相諷上以刑名整齊天下馴致澆薄以及播遷我仁祖之馭天下也持法甚寬用人有敘專務掩覆過失未嘗輕改舊章然考其成功則曰未至以言乎用兵則十出而九敗以言乎府庫則僅足而無餘徒以德澤在人風俗知義是以升遐之日天下如喪考妣社稷長逺終必賴之則仁祖可謂知本矣今議者不察徒見其末年吏多因循事不振舉乃欲矯之以苛察齊之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成且天時不齊人誰無過國君含垢至察無徒若陛下多方則人材取次可用必欲廣置耳目務求瑕疵則人不自安各圖茍免非朝廷之福亦豈陛下所願哉漢文欲拜虎圈嗇夫釋之以為利口傷俗今若以口舌捷給而取士以應對遲鈍而退人以虛誕無實為能文以矯激不仕為有德則先王之澤遂將散微自古用人必須歷試諸難有卓異之器必有已試之功一則使其更變而知難事不輕作一則待其功高望重人自無辭昔先主以黃忠為將軍而諸葛亮憂其不可以為忠之名望素非關張之倫若班爵遽同則必不悅其後關侯果以為言黃忠豪勇之資以先主君臣之契尚須慮此况其他乎世嘗謂漢文不用賈生以為深恨臣嘗推究其㫖竊謂不然賈生固天下之竒才所言亦一時之良策然請為屬國欲以係單于則是處士之大言少年之鋭氣昔高祖以三十萬衆困於平城當時將相群臣豈無賈生之比三表五餌人知其疏而欲以困中行說尤不可信矣兵凶器也而易言之正如趙括之輕秦李信之易楚若文帝急用其說則天下殆將不安使賈生常歷艱難亦必自悔其說用之晚嵗其術必精不幸喪亡非意所及不然文帝豈棄材之主絳灌豈蔽賢之士至於朝錯尤號刻薄文帝之世止於太子家令而景帝既立以為御史大夫申屠賢相發憤而死紛更政令天下騷然及至七國發難而錯之術亦窮矣文景優劣於斯可見大抵名器爵祿人所奔趨必使積勞而後遷以明持久而難得則人各安其分不敢躁求今若多開驟進之門使有意外之得公卿侍從跬步可圖其得者既不肯以僥幸自名則其不得者皆必以沉淪為歎使天下常調舉生妄心耻不若人何所不至欲望風俗之厚豈可得哉選人之改京官常須十年以上洊更險阻計折毫釐其間一事聱牙常至終身淪棄今乃以一人之薦舉而與之猶恐未稱章服隨至使積勞久次而得之者何以厭服哉夫常調之人非守則令員多缺少久已患之不可復開多門以待巧者若巧者侵奪已甚則拙者迫隘無聊利害相形不得不察故近嵗朴拙之人愈少巧進之士益多惟陛下重之惜之哀救之如近日三司獻言使天下郡選一人催驅三司文字許之先次指射以酬其勞則數年之後審官吏部又有三百餘人得先占闕常調待次不其愈難此外勾當發運均輸按行農田水利己振監司之體各懷進用之心轉對者望以稱㫖而驟遷奏課者求為優等而速化相勝以力相高以言而名實亂矣惟陛下以簡易為法以清淨為心使姦無所緣而民德歸厚臣之所願厚風俗者此之謂也古者建國使內外相制輕重相權如周如唐則外重而內輕如秦如魏則外輕而內重內重之末必有姦臣指鹿之患外重之弊必有大國問鼎之憂聖人方盛而慮衰常先立法以救弊我國家租賦籍於計省重兵聚於京師以古揆今則似內重恭惟祖宗所以深計而預圖固非小臣所能臆度而周知然觀其委任臺諫之一端則是聖人過防至計歷觀秦漢以及五代諫諍而死蓋數百人自建隆以來未嘗罪一言者縱有薄責旋即超升許以風聞而無官長風采所係不問尊卑言及乘輿則天子改容事關廊廟則宰相待罪故仁宗之世議者譏宰相但奉行臺諫㫖而已聖人深意流俗豈知臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌而救內重之弊也夫姦臣之始以臺諫折之而有餘及其既成以干戈取之而不足今法令嚴密朝廷清明所謂姦臣萬無此理而養猫以去鼠不可以無鼠而養不捕之猫畜狗以防姦不可以無姦而畜不吠之狗陛下得不上念祖宗設此官之意下為子孫正萬一之防朝廷紀綱孰大於此臣自幼小所記及聞長老之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所擊臺諫亦擊之及至英廟之初始建稱親之議本非人主大過亦無禮典明文徒以衆心未安公議不允當時臺諫以死爭之今者物論沸騰怨讟交至公議所在亦可知矣而相顧不發中外失望夫彈劾積威之後雖庸人亦可奮揚風采消委之餘雖豪傑有所不能振起臣恐自兹以往習慣成風盡為執政私人以致人主孤立紀綱一廢何事不生孔子曰鄙夫可與事君也歟其未得之也患不得之既得之患失之茍患失之無所不至矣臣始讀此書疑其太過以為鄙夫之患失不過備位而茍容及觀李斯憂䝉恬之奪其權則立二世以亡秦盧把憂懷光之數其惡則誤德宗以再亂其心本生於患失而其禍乃至於喪邦孔子之言良不為過是以知為國者平居必有亡軀犯顔之士則臨難庶幾有徇義守死之臣若平居尚不能一言則臨難何以責其死節人臣茍皆如此天下亦曰殆哉君子和而不同小人同而不和和如和羮同如濟水孫寶有言周公大聖召公大賢猶不相悅著於經典晉之王導可謂元臣每與客言舉坐稱善而王述不悅以為人非堯舜安得每事盡善導亦斂衽謝之若使言無不同意無不合更唱迭和何者非賢萬一有小人居其間則人主何緣得知覺臣之所願存紀綱者此之謂也臣非敢歷詆新政茍為異論如近日裁減皇族恩例刋定任子條式修完器械閲習鼓旗皆陛下神算之至明乾剛之必斷物議既允臣敢有詞至於所獻之三言則臣之私見中外所病其誰不知昔禹戒舜曰無若丹朱傲惟慢遊是好舜豈有是哉周公戒成王曰毋若商王受之迷亂酗於酒德成王豈有是哉周昌以漢高為桀紂劉毅以晉武為桓靈當時人君曽莫之罪書之史冊以為美談使臣所獻三言皆朝廷未嘗有此則天下之幸臣與有焉若有萬一似之則陛下安可不察然而臣之為計可謂愚矣以螻蟻之命試雷霆之威積其狂愚豈可數赦大則身首異處破壞家門小則削籍投荒流離道路雖然陛下必不為此何哉臣天賦至愚篤於自信向者與議學校貢舉首違大臣本意已期竄逐敢意自全而陛下獨然其言曲賜召對從容久之至謂臣曰方今政令得失安在雖朕過失指陳可也臣即對曰陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太速進人太鋭聽言太廣又俾具述所以然之故陛下頷之曰卿所獻三言朕當熟思之臣之狂愚非獨今日陛下容之久矣豈其容之於始而不赦之於終恃此而言所以不懼臣之所懼者譏刺既衆怨仇實多豈不殆哉死亡不辭但恐天下以臣為戒無復言者是以思之經月夜以繼晝表成復毁至於再三感陛下聽其一言懷不能已卒進其說惟陛下憐其愚忠而卒赦之不勝俯伏待罪憂恐之至厯代名臣奏議卷三十六
