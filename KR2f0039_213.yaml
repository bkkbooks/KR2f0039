body:
  text: 歴代名臣奏議卷二百十三眀楊士竒等撰法令宋徽宗時御史中丞朱諤上奏曰陛下手詔屢下惻怛願治然吏奉行者多安於茍簡或懐二三柅置不行使悳音善教無由下達願分命使者刺舉諸道有受令而不行及行令而不盡者論如古留令虧令之罪則令出而朝廷尊矣元祐紛更凡得罪於熈寧元豐者不問是否輙陳寃訴自歸無過之地彰先朝之失刑希合奸臣規求進用門下侍郎許將頃下御史獄抗章云絲毫自知其無事父子相係而為囚追屬吏十有六人繫病者百有三日終無可坐之罪遂加不實之刑夫以追吏如是之多繫病者如是之久卒之於無可坐則先帝所用之刑為如何哉將於哲廟表泛為平詞至宣和太后之前則銜寃負痛其辭如此於陛下紹述成功得無少損乎李綱上奏曰臣恭惟宋受天命藝祖創業其得天下也以仁得之列聖守成其守天下也以仁守之重熈累洽百有五十餘載承平之久跨漢軼唐雖堯舜三代之隆無以過也陛下光紹丕圖祇遹先烈宵衣旰食勵精為治立政造事所以利安元元者無所不至而一以仁慈為之本可謂深得祖宗創業守成之道矣爰自臨御以来屢下寛恤之詔宸翰昭回至誠惻怛之意見於辭者足以鼓天下之動是以薄海内外䝉被悳澤天覆地載海涵春育無一物不得其所協氣嘉生薰為太平以仁致治其效如此臣愚竊謂詔令之所布實賴官吏悉意推行不為文具則實悳之及民者彌久而彌廣然詔令之頒降有先後而官吏之去来為不常雖悳意志慮具在方冊後来者往往未嘗深究而周知之朝廷之上所當以時舉而行之者也陛下邇者幸以紹述熈豐政事頒於朝堂矣願詔有司檢㑹裒集前後所降御筆寛恤手詔事件如勸農桑恤刑獄戒搔擾賑貧乏恤鰥寡孤獨之𩔖通行於天下而非一時指揮者附於紹述熈豐政事之後以時頒之申命以告四方庶㡬内外官吏深惟悳意志慮之所在竭力遵奉罔敢怠廢以副陛下以慈為寳仁民愛物之意天下幸甚李復論謹權量劄子曰臣聞王者齊天下之不一必以法而律度量衡乃其法也先王廵守所至必叅考焉防其敗法異政殊俗所自而起故孔子曰謹權量審法度四方之政行焉古者幅帛不中度不鬻於市斛龠不中量不列於市破律改作皆有誅其法嚴而不敢少弛所以無有不一而天下平治也臣竊知今南方之權衡北地之斛量比之中州十増二三雖中州民間亦多用私造倉庫増損官器出納作弊諸處客商所齎物帛来陕西紗絹輕者不及三四兩長不及二丈八尺闊不及一尺五寸其他物帛盡𩔖此又多濫以粉藥非以欺罔愚弱以取髙價而與官吏交結平賣入官將充衣賜於春秋給散軍兵不肯請領屢曽起事專吏售之換易官物亦累敗露其弊徧於陕西近年尤甚縱而不治極於人情不便恭惟陛下智髙神禹而權衡度量頒於天下奸弊偽濫不法盡合屏絶今乞下有司立法應逐色物帛各立定長闊輕重粉藥偽濫皆嚴立法禁許為告賞其舊日短狹織具並令納官毁除見在不中度幅帛並令送官量支其價官收以備賞給如有違犯物皆没官使守陛下之法以絶天下之弊復又論刑法劄子曰臣聞上有道揆下有法守道揆在上朝廷之事也法守在下有司州縣之事也今之更改條法令式道揆法守具在是矣夫條法所立刑賞何為而然哉盖本之於禮義也禮義之當否豈在下之可專朝廷揆之而已朝廷揆之然後著之為法頒之天下遵而行之敢有違者乃犯禮畔義而必有罪也所謂禮義豈常人所能知哉必博通古今深於經術識其理之所歸乃可與議臣竊見修勅局前後所差官多以眀法入仕或曾試斷案或曾任刑法職事之人此等只是曽學舊條與諸處法吏無異安知禮義予奪若任而修立條法頒而行之即便是勅豈足施行臣欲乞應有更改及有創立並逐事上朝廷具聲説所以立法之意朝廷揆其當否使中於理然後俾條而修之可以成忠厚之政而流愷悌之風不勝幸甚左司諫江公望乞依赦文放免欠負劄子曰臣竊聞膏澤以施為先有司以吝為得各有所當不可槩見去年四月放欠赦文既行天下歡呼均被其澤議者以謂失撙過裕則未免屯膏之譏放免所以礙官本執奏有謂區區過計則未達有司之吝有司不得不吝朝廷不得不釋職在下守之不失其為義命在上施之無害其為仁義貴從宜必審權輕重仁在博施故當籌緩急朝廷以宿負為不可償民罹捶楚囚禁之苦州縣有牒訴追呼之擾方曠然與天下丕變故作肆赦之文非不知礙官本妨國用急於緩民之苦息州縣之擾故盡行蠲放以伸陛下博施之仁放免欠負雖所以礙本執奏朝廷直其守職之吝自從權宜之義雖赦釋之有司何預焉各有所當不可槩見良以此也又況朝廷號令既出而反何以取信天下有司既有日限久請不報上下相持徳澤不流民不堪命陛下特未知爾豈其曠然丕變之恩反鉗於有司之手不得行也訪聞宿負雖注官籍名存實亡縱然自存朝哺不給有負數千緡錢累月之間持數千錢出以應郡縣督責之期雖荷耳械手棰毒至於籲天亦何益也祇以傷陛下之仁爾伏望聖慈眀詔有司應赦文所載欠負不以礙官本並依元降指揮蠲免施行豈惟大號無反汗之失又足以申至仁博施之㤙豈不美哉博士周行已論増修法度上奏曰臣竊惟國朝受命民不易肆祖宗相承以聖繼聖基本之厚太平之久三代以来所未有也陛下紹承七聖之丕基恢張先帝之丕業法度至此而大備禮樂至此而大興風俗至此而大定人材至此而大成自古未有今日之至治極盛者也然而太平既久民安無事内外恬熈官吏媮惰臣竊過計恐其法度漸弛奸弊漸生盖人情無事則安安則無深逺之思人情無事則忽忽則無憂虞之念故無事者有事之所起也雖堯舜三代盛時未嘗不兢兢業業以相戒慎臣愚欲望陛下先之以沈㡬照之以逺慮察媮惰於無事止奸弊於未萌斷自淵衷委之大臣因時損益増脩法度振其所或廢補其所未全調而一之持而定之以懋官吏以休四海以固祖宗甚盛無疆之業洪彦昇為殿中侍御史先是詔諸道監司具法令未備若未便於民者久而弗上彦昇上言曰吏狃於勢随時俯仰不能上承悳音因縁為奸者衆有因追科而欲害熈寧保伍之法因身丁而故揺崇寧學校之政省事原情當有勸沮宜遣官編彚辨其邪正以行賞罰帝皆從之右正言淩哲上䟽曰漢髙入關悉除秦法與民約法三章耳所謂殺人者死實居其首司馬光有言殺人者不死雖堯舜不能以致治斯言可謂至當矣臣竊見諸路州軍大辟雖刑法相當者𩔖以可憫奏裁自去嵗郊後距今大辟奏裁者五十餘人中有實犯故殺鬬殺常赦所不原者法既無疑情無可憫刑寺並皆奏裁貸減彼殺人者可謂幸矣被殺者銜恨九原何時已耶臣恐强暴之風滋長良善之人莫能自保其於刑政為害非細應今後大辟情法相當無可憫者所司輙奏裁減貸者乞令臺臣彈劾欽宗靖康元年監察御史余應求上奏曰臣伏覩近年以來凡有中㫖皆降御筆施行期限嚴促稍有稽違寘以不恭之罪三省有司奉行不暇雖有違戾法憲前後重複者不敢執奏或被受即行不申三省事之甚微亦煩宸翰其始因中人領事内中奏陳而為之其後士大夫倚中人以進欲興功利而於法不可者亦為之最後執政大臣或行事有戾於法或差除不允僉議或為親知私謁干請者亦為之由是號令日紊綱紀日壊矣夫三省樞密院是之謂朝廷陛下與謀議大事出命之所也人君擇賢而任之固當委以庻事若宰執不才易之可也豈可自攬細務悉降御筆而可以為治哉陛下初政清眀委用宰輔宜無此弊然竊聞尚有臣寮直逹奏陳内中批降施行者此與前日御筆何異哉臣以謂内侍與臣寮所陳獻利害措置事宜皆可付三省樞宻院商議進呈取㫖而行庶㡬不戾於法憲不惑於異同人主大權不移於中可以杜多門之政可以絶近習僥倖之原政事之大無先於此惟陛下財擇翰林學士許翰上奏曰臣聞天下之法當與天下共之有司守之以死雖天子不得而私也而後天下之大公立比年以來有司阿意撓法以徇一時是以條約文具而不守伏願陛下眀詔内外今後指揮若有害事病民違戾條制並令有司具析執奏御筆手詔不由三省而下者官司被受審復取㫖乃得施行必使法嚴信如四時而後令一而民定可以立政矣侍御史李光乞罷用例酌情指揮劄子曰臣伏覩近降聖㫖令六曹尚書侍郎各以其事治有條者以條決之無條者以例決之無條無例本部酌情裁決臣竊詳上項指揮實欲以道揆之任歸之有司臣固未暇論其是非姑言其甚不可者陛下若許其用例臣恐遂至於侵權何以言之夫吏人遷補有限以嵗月之法今則有減選出官之例命官差遣有入逺之法今則有大臣陳乞家便之例以至錢穀之勞捕賊之賞依法則輕用例則重如此之𩔖未易槩舉尚不可援而況於酌情乎盖用例酌情者天子三公道揆之任非有司可得而專也熈寧中詔自今妃嬪以例乞骨肉恩者勾當使臣具保眀詣實依條方得繳奏今執政大臣患三省事務繁冗遂欲假借六曹使得用例酌情臣竊以為過矣臣嘗備貟郎曹目覩奸吏舞文之弊且六部所用條令纎悉備具吏人習熟以常法從事尚為所欺意所出入無不得者今乃公然容其廢法而用例無例而酌情是開僥倖之門縱受賄之路臣恐吏益强法益廢而事益紛紛矣伏望聖慈更詔大臣重賜叅議除都堂三省所接詞訴分遣六曹依敕條與決施行外其無條有例者申乞朝廷指揮如此則三省訟牒自當減省而上下相維詳畧相統紀綱正而威權立矣不勝幸甚髙宗時右司諫潘良貴奏曰契勘禮部製造過度牒數目自紹興三年至今年十月十八日製造約一十四萬道給降約一十三萬道以三年為率數目如此則自建炎元年以來大約須給降過四五十萬夫天下戸口自更兵火之後所至耗減其丁壯理宜蕃息使力本務農以固基本今因循積習視以為常日引月滋無有紀極竊恐數年之後百姓失業盡為逰手之人況今州縣寺舎悉許流寓士大夫占射居止又適嵗饑此曹什百為羣居則無屋食則無粟流離困苦實可憫憐兼之度牒所得錢物盡是一時無名用度朝廷百官將士之經費悉不仰此以為供須若不速行樽節深慮有意外之患昔越王之復呉也令於國中曰女子十七不嫁丈夫二十不娶其父母有罪將免乳者令醫守之生男子二壺酒一犬生女子二壺酒一豚其深思逺慮尚欲蕃息其未生者況已成丁壯之人而廢棄之豈不重為國家惜乎伏望朝廷詳酌立為定制庶㡬永逺可以施行胡寅上疏曰臣聞建昌之惡莫大於謀為反逆先王豈不知是為深可懲戒哉然止於未萌固亦多術而未有預懸重賞誘人使告者盖知告訐之路一開則其禍不可勝言者也臣伏見昨來有言者以建昌軍人作過請降空名官告付下州郡誘人告變夫以反逆加人雖人情之所不忍然見官秩可以告變而得則淺思寡慮與夫凶猾怨家不忍小忿而致人於大惡非難事也故自令行以來適當防秋之際建昌廬陵數郡相繼告發何昔日之絶無而今乃競有耶彼建昌之禍則有所本矣不治其本而禁其末見目前之小利昧經久之逺圖將使官吏軍民盻盻相伺在上者不敢治其下在下者得以持其上謀慮如此傳笑四方臣謂弭亂之要在州郡得人至若陳告之法自來條制莫不備盡只合申眀行下所有昨來已降指揮伏望聖慈特賜追寢庶㡬人心不揺禍亂不作寅又上奏曰臣聞孔子定書載帝王典誥誓命之篇垂法萬世其要在告戒箴警初無溢美溢惡之辭所謂大哉王言言之必可行也臣竊見比年以來書命所宣多出詞臣好惡之私意遇其所好則譽莊跖為夷齊遇其所惡則毁晉棘為燕石極意誇大有同牋啓快心摧辱無異詆罵使人主命悳討罪之言未免於玩人䘮徳之失是豈代言為命之法哉夫文者空言也言而當則為實用善者怙焉惡者懼焉其有益於治不在賞罰之後矣而非空言也曽謂是可忽乎臣愚伏望陛下申諭外制之臣以飾情相悦含怒相訾為戒褒嘉貶絀務合至公詞貴簡嚴體歸典重庶㡬古昔誥命之意以成一代賛書之美殿中侍御史鄭剛中上奏曰臣竊見典買田宅法限六十日投契又六十日請契恐其故違限約則扼以倍納之稅恐其因倍而畏則寛以赦放之限疑若無弊矣而其弊今有不勝言者買産之家𩔖非貧短但契成則視田宅已為己物故吝惜官稅自謂收藏白契不過倍納而止遇赦限雖倍納猶是虚文必待家有争論事渉關礙始旋行投印此無他官無必懲之法開因循之路而使趨宜其資豪猾而失公利也虧失公利猶害之小者至有不識書計之人饑寒切身代書售産閱時既久富家管業亦深或為書人已死或牙保關通乗放限之便改移契劵以典為賣它日子孫抱錢取劵而不得則飲泣縣令之庭而已爾臣願朝廷詳酌下有司立為信限出限一日更不理為交易錢不追理業還本主典田宅者並依條為合同契一處赴官投印如是則白契可以盡勒上不至於虧損官錢下不至於以典為賣公私偕利矣剛中又上奏曰説者謂有陽而無隂不可以成嵗功有徳而無刑不可以成政事臣常惑之今試使一人持刻薄之説勸人主為苛察之政則有識者必指為法家者流是欲置天下於澆疵怨謗之地不可聽也又使一人持寛大之説勸人主為姑息之政則有識者必指為敗法之人是欲置天下於委靡不振之域亦不可聽也臣反覆計慮而後得其説盖寛仁者人主之道持法者臣下之職二者不可易也人主與天地同悳惟髙眀博厚然後公公私私有生能言之𩔖各足其欲至於百官有司則法度之所在猶四時之氣推行造化可生則生可長則長可肅則肅可殺則殺予奪之間不可有毫釐之謬惟使生育之恩歸於上法度之章謹於下四海之内戴君父之徳而畏有司之嚴然後朝廷尊而政事修矣恭惟祖宗以愷悌之風蕩五代之毒螫陛下以澤潤之徳救百六之塗炭累聖相承前後一軌大君之道咸不約而得之矣考其忠厚之極則無如仁宗皇帝之時慈恵之氣盎然如春風者㡬五十載覆載之功不為不大然所謂法度者未嘗弛也内之朝廷外之郡縣有人犯一非義則郡守必劾監司必按臺諫必言以至一官資之予奪一刑名之輕重一錢穀之出入有司各守其法以争之不得於法雖力彊勢重不敢有徼幸之望小大同心共以身任之而不顧天下惟見人主簡易優㳺坐收寛仁之名而天下亦无敢為非者此祖宗與三代治古之道也至陛下臨御以來寛仁愛物之心於古有光而臣下持法之心頗與古異大率有司皆不肯以身任怨責縣有罪郡守不敢劾留以俟監司守有過監司不敢按留以俟臺諫某事於法不可行也郡猶問於監司監司問六部六部問朝廷朝廷作聖㫖罷之某事於法不可得也郡猶請於監司監司請六部六部請朝廷朝廷作聖㫖奪之積日累月罷之奪之皆自一人出而百官有司無一拂戾人情者苛察之怨日漸歸於上姑息之恩各欲歸諸己此豈善風俗持久之道乎諸葛孔眀曰寵之以位位極則賤順之以恩恩竭則慢是故吾繩之以法法行則知恩善乎其能言也盖法者百王相授之具上下守之而皆出於無心惟使寛宥曠蕩之澤時出於人主則天下皆若履秋霜之嚴而知有春陽之暖豈不偉歟臯陶為士將殺人堯曰宥之三臯陶曰殺之三夫臯陶豈不知將順之美以謂宥罪者人君之恩至有司則奉法而已不知其它也此後世所以樂堯宥刑之寛而畏臯陶執法之堅臣願陛下戒敕臣吏各使持職奉法凡予奪之際自有成書無大疑惑者不得互相推避其失職廢法全身避怨者咸按督之常使紀綱持循賞罰眀信不廢法度而陛下寛厚之仁泊然與覆載同功俾天下獨知斯謀斯猷惟我后之徳則生靈幸甚章誼上奏曰臣竊見朝廷近日每建一事毎行一令曽未閱日議者紛然以為不便旋即更改雖從善如流朝廷之美事然人主出號布令猶天之有雷風也故曰鼓舞萬物者風雷乎鼓舞萬民者號令乎雷不一風不再今政事號令出而復反行而中輟豈所以尊主威而隆國勢哉臣原其所自盖由朝廷初議立政出令之時其僥倖希進之人建為專欲便私之論以誤執政而執政初不經意輕信其説亦不復叅酌衆情採聽士論是以既行之後輿論紛然利害昭著雖執政大臣亦自不能力主其説此政令所以屢更國論所以不定也臣觀今日㡬㣲之事至多號令之行宜審其博稽深考雖未能如古大詢之禮然内省如給事舍人外省如尚書侍郎宰相之屬如都司樞廷之屬如檢詳皆當先預論思密為可否其能訂之古義而不悖施之當今而可行然後執政進呈而聽陛下之去取如此則令重而君尊君尊而國安虧令留令與夫不從令者雖死無赦如管仲之言可也惟聖主留神幸甚誼又上奏曰臣伏見紹興元年三月勅州縣免行錢並罷見任官買賣並依市價違者計贓以自盗論朝廷所以降此指揮盖欲革貪吏茍得之心寛齊民供辦之力悳至厚也然物有實直著在律令月具上下之估旬具増減之目旋估者有禁䞉利者有刑首尾闋防纎悉必備今州縣監司盡廢律令之文專舉自盜之勅遂使在官之人買薪市米動觸刑章而無賴之民持吏短長誣訴充積即有犯者市司定價髙下出於臨時獄吏計贓多寡由其喜怒處法議刑其弊至此豈所謂易避而難犯哉臣備員秋官屢斷兹獄見其委曲未合人情伏望睿眀更付外廷詳議審處兼舉律令之舊文然後申嚴自盜之新制則設而難犯犯亦無怨庶㡬仰副聖主眀慎用刑之意不勝幸甚誼又上奏曰臣聞法者天下之公也議之於朝廷措之於有司行之於天下無有逺近貴賤取信焉者也今奸吏舞法使有司無所執守天下無所取信背公營私喜怒任意未有如今日尚書省鈔房人吏之甚者也吏部轉官皆有格法自令史而上即官侍郎尚書具條奏擬既應法矣而鈔房人吏有不快意而在法無礙者必使吏部自陳退鈔名為請退今年六月右選武功郎戴師正秉義郎屈有諒二人轉官鈔上吏房以二人係兵馬大元帥府結局轉官止給到吏部公據至今不為奏鈔悉令請退臣恭聞陛下御極之初曽降指揮應結局官吏不暇悉給告勅權時之宜並令吏部出給公據當時既有指揮則朝廷吏部所當通知今吏部既能省記大畧矣豈有鈔房人吏乃不知耶又去年八月有秉義郎艾世安亦係公據轉官之人鈔房已自照用建炎指揮放行了當今來忽於二人遂有沮難良見私意兼吏部郎官侍郎各各考驗並非虚偽而鈔房堅執不可此臣所謂奸吏舞法使有司無所執守天下無所取信者也士大夫為郎官侍郎而其所上文書皆不獲施用堂吏專得任其喜怒之私而為朝廷取怨於天下此非國家之福也伏望睿斷付之有司考究情弊以警奸吏不勝幸甚誼又上奏曰臣伏見朝廷比修紹興勅令格式其忠厚之意則悉本於祖宗其綱條之舉則悉仍於舊貫惟是除苛解嬈救弊補偏頗資討論時有筆削然當是之時簡編浩博而難稽衆議紛紜而不一書貴速成論靡專決是以去取之間不無舛錯厥今頒在有司為日既久州縣推行時見牴牾欲承疑行用則衆聽惑而不孚欲因事申眀則法屢變而難守豈所以為一定之制哉臣愚伏望睿慈眀詔郡守監司與夫承用官司參考祖宗之舊典各摭新書之闕遺悉随所見條具以聞然後命官審訂刪去訛謬著為定法庶㡬一時憲章坦然眀白若江河之有隄防梓匠之有繩墨使民易避而難犯不勝幸甚右正言陳淵上奏曰臣聞古之為臣者有禀令無議令故令出於上下知奉承之而已此法之所以行而事之所以立也往者靖康之初淵聖皇帝以兼容之度博訪羣言俱取而並用之甚盛悳也而忠邪雜糅是非不公故毎下一令上自禁從下至百執事之臣與夫布衣韋帶之士必羣起而交攻之或已發而中廢或盛行而遽改或姑存之終至於委靡不振而後已以故一事無成拱手以待禍其為弊至今尚在也此而不革無以立政故臣不避僭越之誅為陛下力陳之夫議政之地昔時士大夫屏息而過之如恐犯分及其後風俗一變乃始有竊議其非者又其後公肆詆訐無所忌憚則今日之弊是也亷陛不分莫此為甚朝廷之勢安得而尊朝廷不尊則國威不立國威不立而欲以指麾顧盼定天下之大議臣固知其難矣傳曰下輕其上爵賤人圖柄臣則國家揺動而人不静矣此古今通患也今天下之事宰相行之臺諫言之若是亦足矣臺諫耳目有所不及則詢之侍從侍從思慮有所未至則求之百執事其有遺䇿乎而又下取布衣韋帶之士俾道聽塗説之流得以肆其不根之論臣恐徒為紛紛無益於治雖然人主之悳莫大乎聽納如陛下之舍己從人不間貴賤雖堯舜不能過此臣子所宜將順者也而臣私憂過計更為此言者非固欲棄愚者一得之慮也以謂布衣韋帶之議資之以廣聰眀則可也若創法立度而唯此曹之徇適足以自眩而已自古造事者謀之以同斷之以獨故總覽兼聽之誠常施之於未決之前而是非可否之私不容於已定之後為是故也故臣愚願陛下自今凡有大事議之而後行已行而議者勿聽毋使眀謨坐困曲説則天下幸甚淵又上奏曰臣聞君者出令者也臣者行君之令而致之民者也此古今不易之道也茍出乎上者已審而行乎下者無稽違廢慢之失則上之悳意志慮無不孚於民而民咸被其澤矣往者宣和之間權臣用事播告之外自有風㫖為吏者從其風㫖而不從其言罪弗及也以故一時號令不信於天下雖寛恤之詔季一舉行掛之牆壁徒為文具而已上意益勤民情愈怨愁歎之氣熏穹纏壤無所赴告遂為今日難解之禍盖吏不能行令之過也陛下即位以來深監其弊茍有方命必罰無赦内外大小之臣宜其精白一心以承休悳無敢不恭而貪殘之吏尚仍舊習有累聖政臣竊憤之今年春建寇既平陛下嘉恵一方宥過無大所以洗滌瑕疵蠲除逋負安集犇竄無不曲盡悳至渥也令下未㡬已聞州縣之間百端沮抑莫肯奉承論者以為患陛下既已眀示威福而申告之矣今又聞赦文以上四州軍殘破為甚全放今年二稅下四州軍不免搔擾止取其半而吏引著令諸稱赦放者不得過三分盡追其餘以備急闕是以一定之典而議非常之恩以厚誣之計而力沮已行之命遂使陛下愛民之詔㡬成虚發此而不懲無以示信且舊書所載或以故例或縁泛恩所指無定處所釋無限量今以兵火之後傷殘凋瘵之餘曲示寛典固不同矣又況䘮亂以來民不堪命常賦所入十才得四五止取其半猶慮恵不及民況十取其七乎自甌粤之亂陛下為之宵衣旰食者一年於此至遣執政大臣國之良將親往平之然後復安既安之後所賴以撫綏吾民者唯監司守令而已而行法如此陛下何望焉若其事出於監司密喻而守令奉之與夫守令率意擅行而監司勿問皆不能無罪也臣愚願先降眀詔諭以前日之誠意立行改正然後核監司守令稽違廢慢之實嚴賜黜責自今以往庶㡬貪殘之吏不敢舞文以為奸倚法以僥倖臣不勝區區之心惟陛下裁察監察御史劉行簡論尚書六曹及百司法令之弊䟽曰臣愚不肖叨䝉誤恩擢置臺察之司伏見尚書六曹下逮百司凡所用法令初無畫一之論𩔖以人吏省記便為與奪盖法令具在奸吏猶得侮之今乃一切聽其省記顧欺弊何所不有欲與則陳與例欲奪則陳奪例或與或奪在其牙頰其患可勝言哉陛下聖眀灼見此弊嘗降處分令左右司郎官以其省記之文刋定頒行然左右司職事號為最煩竊恐於此不能專一無由速得成書臣愚伏望聖慈特降睿㫖改送詳定一司敕令所立限刋定鏤板頒降内吏部條法最為急務乞責近限先次施行庶㡬杜絶奸吏弄法受賕之弊天下幸甚起居郎周麟之論禁小報狀曰臣聞國之有號令猶天之有雷風雷不一風不再號令如此然後可以鼓舞萬民動則丕應無有逺邇罔不是孚仰惟皇帝陛下自更化以來蠱飭百度鼎新庶政登用賢儁屏除奸回凡積年弊事固已一切剗革而釐正之矣方陛下頒詔㫖布命令雷厲風飛之時不無小人譸張之説眩惑羣聽如前日所謂召用舊臣者浮言胥動莫知從來臣嘗䆒其然矣此皆私得之小報小報者出於進奏院盖邸吏輩為之也比年事有疑似中外未知邸吏必競以小紙書之飛報逺近謂之小報如曰今日某人被召某人罷去某人遷除往往以虚為實以無為有朝士聞之則曰已有小報矣州郡間得之則曰小報已到矣它日驗之其説或然或不然使其然耶則事渉不密其不然耶則何以取信此於害治雖若甚微其實不可不察臣愚欲望陛下深詔有司嚴立罪賞痛行禁止使朝廷命令播之天下天下可得而聞不可得而測可得而信不可得而詐則國體尊而民聽一臣不勝至願綦崇禮上奏曰臣伏見日者陛下臨遣使臣宣諭諸路親加訓飭付以御書手歴使書其所舉按監司郡縣玩習茍且平時詔條動多違戾洎聞遣使往往前期旋行整治以盖其迹如闕官差權多不應法雖本無員闕亦或増差巧作名目蠧耗禄廩以臣所聞自江淛以往皆有此弊至於逺方則又影占窠闕以便權官雖朝廷所差吏部所注正官之任多是托以它説不肯放上士人無所告訴銜寃困饑而權攝之官安享禄利其廢法未有如此者及使者將至凡違法差官去處皆先自令罷亦聞逺處不放上任者皆令赴上矣豈獨差官之弊至於詔令頒布法禁奉行民戸科率刑獄逮繫官物出入酒稅𣙜征租賦催放倉庫受納婚田訴訟鄉保差役公使收簇行戸供應凡州縣一切之事有所違戾莫不預行料理粗使應法以待使者之來若貪贓不法迹狀彰露不可掩匿則監司長吏始從而發摘之亦有不及為計而為使者所劾正者以臣所慮儻得平時監司州縣兢兢自飭常若初聞使者之時何患法之不守而事之不舉哉第恐過此無復畏忌縱弛自肆還如前日則朝廷豈能嵗嵗為之遣使此監司按察官之責也臣愚欲望聖慈特降睿㫖申嚴戒勵應因今來遣使宣諭之後若逐路諸司及郡縣官吏玩弛違戾尚循故態其已罷差之官已改正之事敢引例廢法擅行復舊者重寘典憲或事有便於公私而宣諭使誤行罷易者條具以聞監司按察官私相盖庇失於按劾委御史臺覺察害及民間者許令越訴庶㡬一勞久治仰副陛下臨遣使者之本意中書舍人張孝祥論王公衮復讎議曰復讎義也夫讎可復則天下之人將交讎而不止於是聖人為法以制之當誅也吾為爾誅之當刑也吾為爾刑之以爾之讎麗吾之法於是為人子而讎於其父母者不敢復而惟法之聽何也法行則復讎之義在焉故也今夫佐公衮之母既葬而暴其骨僇尸也父母之讎莫大於是佐公衮得賊而輙殺之義也而莫之敢殺也以謂有法焉律曰發冢開棺者絞二子之母遺骸散逸於故藏之外則賊之死無疑矣賊誠死則二子之讎亦報此佐公衮所以不敢殺之於其始獲而必歸之吏也獄成而吏出之使賊洋洋出入閭巷與齊民齒夫父母之讎不共戴天者也二子之始不敢殺也盖不敢以私義故亂法今獄已成矣法不當死二子殺之罪也法當死而吏廢法則地下之辱沈痛欝結終莫之伸為之子者尚安得自比於人也哉佐有官守則公衮之殺是賊協於義而宜於法者也椿等聞春秋之義義在復讎公衮起儒生尫怯如不勝衣當殺賊時奴𨽻皆驚走賊以死捍公衮得不死適耳且此賊掘冢至十數嘗敗而不死今又敗焉而又不死則其惡必侈於前公衮之殺之也豈獨直王氏之寃而已哉椿等謂公衮復讎之義可嘉公衮殺掘冢法應死之人為無罪納官贖弟佐之請當不許故縱失刑有司之法如律謹議右司諫潘良貴上奏曰臣聞中臺者出納王命賦政四海喉舌之司也六曹當遵奉成憲各揚乃職兵火以來茍簡玩習視為傳舍其最甚者間遇朝廷送下勘當事理並不依據格法指定是非常操兩可之説曰更合取自朝廷指揮是致朝廷臨時别有衝改長貳郎官循黙奉行不復更有執守每廢一法即後來陳乞者循以為例干求請托紛然無窮若不加察恐省部成法盡壊其患有不可勝言者臣愚欲望睿斷嚴飭六曹長貳郎官各務協心凡朝廷送下勘當事理並須據格法定是非供報仍乞詔大臣事關六曹者不問鉅細一切唯有司格法是從庶㡬杜僥倖之門開公正之路仰稱陛下賦政之意龍圖閣直學士知湖州汪藻上奏曰臣竊惟國家自祖宗以來擅中原沃埜之饒耕桑萬里錢粟之問不至廟堂材官騎士之屯環列畿甸朝廷威令雷動風行方是之時省費裕國彊兵息民之説雖勿問焉可也今四方搶攘土宇日蹙招安之衆仰給縣官縣官征求至民不勝其敝譬人坐積薪之上火既然矣是安可一日輟而弗圖哉則陛下博詢羣下固宜然今日省費裕國彊兵息民之術可得而言矣不過曰罷冗官之廩節冗兵之餉如是而費可省國可裕也擇將帥之材眀賞罰之令如是而兵可彊民可息也是數者皆區區常談朝廷講之熟矣豈待臣言而後知然捨是亦未見他䇿臣竊有憂焉人主莫大於失人心士大夫莫大於忽公論徳意不孚欲人心之歸不可得也風俗不厚欲公論之行不可得也君之與民雖有天壤之殊其上下相安以誠而已故古者人君發政施仁必致慎於出令之始度不可行者不以布宣恐其紿民也既曰可行雖舉世非之莫能揺奪恐民不信也陛下憂民惻怛之誠可謂至矣布為詔令可謂丁寧矣是宜民於陛下愛戴日深而田里之間顧未免愁歎者其故何哉陛下造令之初未嘗叅其可否多出於率然故謂之恤民者民未嘗恤也謂之戢奸者奸未嘗戢也方時艱難利固有未可遽興害固有未可遽除者民知上之出於不得已也以誠告焉其孰敢以為怨既已號令四方謂之徳意矣乃有司奉行輙拘閡廢格使民庶習翫視為空文事率如斯其誰不解體甚可憂也臣願陛下凡命令之出必慎其始而誠其終審知無壅然後詔民如其不然勿輕出也庶㡬恩浹人心而人心感悦天下幸甚公論之在天下猶元氣之在人身四肢雖瘠元氣在焉不害其為安四肢雖彊元氣䘮焉不免於病自數十年來士大夫喜為新竒髙逺之論黜中庸平易之談淩遲至今風俗大壊士大夫所向無適而非利所懐無適而非私知朝廷以功名為急則争為斬將搴旗之説以利在於功名故也知朝廷以忠鯁為賢則爭為眀目張膽之説以利在於忠鯁故也朋黨唱和合為一談敢為誕謾上惑主聽至責其實效則如繫影捕風了不可得甚可畏也臣願陛下於用人之際精加柬求無為浮偽所勝庶㡬真材出焉副朝廷之用士大夫之風亦當自此稍變詔令信於上風俗眀於下上下皆由至誠政事脩而財用足紀綱正而國勢尊則省費裕國彊兵息民適餘事耳茍為不然雖有管樂之臣為陛下謀之憂未艾也臣愚不知忌諱謹録奏聞趙元鎮上奏曰臣聞天子所至曰幸以其布徳澤問疾苦號令風化所從而出今車駕駐驆建康宜其加惠斯民使之忻戴而軍律不嚴羣政不舉以强淩弱無復紀綱每兵數人結為一黨或强奪所賣之物不還價錢或抑令空手之人般負錢米小不如意毆擊随之寃痛之聲聞者傷惻將佐自以為得志廂界亦不敢誰何遂使闤闠之中日有横逆之苦臣嘗建言乞令三衙廣布察視分占地分嚴立賞罰及令諸軍貼差使臣應有所犯以次坐之不知曾無降出而民間之患甚於前日今欲檢舉臣前章早作措置仍乞責問建康府縱容弛慢坐視不恤之罪或令所在火保團頭等常切覺察應有似此之人即仰率衆捕捉如敢拒捕不以所犯重輕並依軍法捉事人量加激賞如此則奸惡小戢而嗷嗷疲悴之民有所赴愬矣孝宗時楊萬里上䟽曰臣聞聖人之仁必有所止仁而無止則將以仁天下適以殘天下仁而至於殘非仁之罪也仁而無止之罪也事固有所極有所反仁而無止則其極不得不反而為殘殘非出於仁之外也而生於仁之中然則與其無止以殘吾仁孰若有止以全吾仁也哉是故聖人之心愛天下則無止而其仁則與天下為有止溥之以無止之心而約之以有止之仁故仁則有止矣而所以仁則無止也古者司寇當獄之成也以告於王王命三公參聽之至於將刑也王曰宥之司寇曰不可王又曰宥之司寇又曰不可宥至於三而司寇卒不從於是焉而殺之王則為之徹膳為之不舉樂且夫以天子之尊而三拒於司寇天子欲活一夫而卒坐視其死三宥不從何不四宥之也四宥不從何不屢宥不一宥也不一宥而猶不從何不自宥之而必聽於司寇也且彼罪人者吾君不能活其死而徒徹膳以致無益之憐則亦㡬於不仁矣然三代行之未之有改何也盖宥之者聖人之仁也宥止於三者仁固有所止也今夫天地之仁萬物也春而萬物欣欣焉夏而萬物油油焉夫欣欣油油萬物之至願也天地既仁夫萬物矣則何不與萬物旦旦而春旦旦而夏也而必摧之以風霜毒之以冰雪使夫欣欣者悲油油者瘁何奪其所至願而與其所不願也聞之曰冬閉之不固則春生之不茂使天地而與萬物旦旦春夏也則無來嵗可也有來嵗則何以繼也仁而無止天地不能不窮也而聖人能之歟國朝之法獄成而罪人以寃告者則改命它郡之有司而鞫焉鞫止於三而同焉而罪人猶以寃告也亦不聽此得古者三宥之意也而議者以為聖人之仁當盡天下之情而勿限以三鞫其説聽之可樂也然自朝廷行之十有餘年獄訟日滋蠧弊日積奸民得䇿而無辜者代之死則議者之説為害也臣請言其害殺人者一夫也而連逮者十之焉不惟十也有再其十有三其十者焉捕同捕也繫同繫也訊同訊也獄吏豈曰彼有罪汝無罪也哉幸而獄成矣連逮者得釋矣而殺人者臨刑不伏則又鞫也則連逮者釋未畢也而捕又繼之又伏而又不伏則又鞫也而連逮者復與焉鞫至於三至於五至於十而連逮者皆與焉連逮者家破矣瘦死矣而獄未竟也大抵一獄有十年不決者焉獄決矣不殺人者俱死而殺人者獨生焉其勢連逮者死不盡則獄不決何其仁於一罪人而不仁於十百平民也其害一也罪人之不伏也其為擾也至於百郡有浮費而數路無寧居外路之官吏被命而徃鞫者所居則有給所過則有給所至則有給不則居者行者交病於饑寒給則縣官不勝其費其鞫之一其里之千費錢萬者亡慮三數十焉其鞫之十則為千里者十費錢萬者亡慮三數百焉此其費何名者耶猶曰推仁不計費也而官吏之行者若江淮之間道里之逺饑寒之恤猶忍言也至於二廣則風土之惡瘴癘之禍不忍言也父母妻子哭其去又哭其歸去則人也其哭猶忍聞也歸則䘮也其哭不忍聞也大抵去而人者十焉歸而鬼者七八焉而人者二三焉二三人者雖不死而死矣何也病也病而全者又十而一二焉外路之官吏辜而使之至於此也其害二也夫議者之初則曰鞫不限於三者仁也而仁之害一至於此豈非仁而無止則仁反而為殘哉然則古之聖人仁止於三宥其所慮詳也臣願朝廷深詔有司少増三鞫之舊法而止於五使天下之無罪而死者還其生而有罪以生者還其死此不亦三代之至仁也哉萬里又上䟽曰臣聞古之立法不惟懲天下之已犯亦以折天下之未犯盖已犯之必懲未犯之所以必折也是故懲之者法之義折之者法之仁義行故仁不窮仁行故義不數仁義相有而不相無此法之利也後之法非無仁義也利未見而害先焉者義數而仁窮而已義不可數數則民怨仁不可窮窮則民狎狎則犯者衆犯者衆則刑者數然則刑至於數者不生於刑之數而生於仁之窮民至於怨者不生於怨其刑而生於狎其法今夫民之情固喜温而惡寒欲涼而畏熱也然冬不寒夏不熱則民病而死矣人知夫法之仁也不知夫狎之而死也是故愛極者恩之所從銷寛甚者猛之所自起古之聖人其法初不及後世之備也惟不使仁之窮而民之狎也是以法立而刑不試後之法盖詳且密矣然文詳而舉之也畧網密而漏之也踈天下之民窺其畧也則知其詳必至於不舉習其踈也則知其密必至於甚漏知其不舉則犯之也易知其甚漏則犯之也頻刑安得不數而民安得不怨哉嗟乎求用刑之踈者必至於用刑之數求天下之喜者必反以得天下之怨理固然也然則所謂舉之畧而漏之踈者何也一曰法不執而多為之岐二曰法徒設而自廢其禁罪莫大於殺人罪至於殺人何以議為也則亦殺之而已漢髙帝如此其寛仁也入關之初欲結天下之心如此其亟也欲除秦法之苛如此其鋭也而其與民約法亦曰殺人者死帝不以為疑民亦不以為請何則上下皆便其當然也殺人而法不死孰不相殺以至於大亂哉此豈所謂當然而天下何便於此也故雖髙帝欲取天下之速而不敢宥殺人之罪以諂天下之心雖秦民之苦於秦而不以髙帝之不宥殺人為帝之虐然則古之立法之意可知已矣而今之法不然殺人一也則有曰盜曰鬬之目焉則有曰故曰謀曰誤之别焉曰盜曰謀曰故者法之所必死也曰鬭則死生之間也曰誤則生矣果誤也而殺人也又況所謂誤者未必誤而所謂非謀非故者未必非謀非故也何則法不執則吏可賣吏可賣則民可遁有司取具獄而讀之曰此真誤殺也不知夫吏之竊笑也此之謂法不執而多為之岐夫民之所以畏法者何也非畏法也畏刑也法不用則為法法用之則為刑民不犯則為法民犯之則為刑是以畏之也有法而不用不如無法何則無法則民未測其罪之所當有法而不用則民知其法之不足忌有法而民不忌是故布之號令不曰號令而曰空言垂之簡書不曰簡書而曰文具法至於空言文具是無法賢於有法也古之法始乎必用而終乎無所用今之法始乎不用而終乎不勝用夫法不求民之入而拒民之入者也古之法民不入也不招以入而民之入也不縱以出夫惟不出是以不入故始乎必用而終乎無所用今之法有曰誣人以罪而不實者罪之以其罪自大辟以降皆是物也而用法者不然以一夫之片紙而興大獄鞫大罪也卒之所謂大獄者初無獄之可興所謂大罪者亦無罪之可鞫上之人則俱釋之而已矣受誣者至於破家亡身而誣人者其極不過杖而遣則奸民何憚於不屢誣善良以求利也哉獄訟何時而可清也故始乎法不用而終乎法不勝用此之謂法徒設而自廢其禁盖人有野於宅而盜於防者其始峻其牆而止出於一門又從而衛之以兵非以制其出者也以制其入者也夫是以盜不敢過未㡬而慮夫樵牧者出入之迂也則鑿其東而門焉又鑿其西而門焉門多且徑而不能皆衞也則至於有門而不扃焉門多且徑則盜從其徑者而入之矣有門不扃則羣盜掉臂而入矣法不執而多為之岐孰不從其徑而入哉法徒設而自廢其禁孰不掉臂而入哉臣願朝廷詳慮而審處之如殺人者不死此法可以更議而誣訴者罪以其罪此法可以必行議其所當議而行其所不行則成康不式之事雖未易致也而漢文㡬措之風其猶可及也歟萬里又上䟽曰臣聞厥今馭吏之難莫難於禁贓吏盖朝廷亦求所以禁之矣而未得所以禁之之方寛以養其耻則常狃上之寛而不知畏繩之以法則慮其怨而不服抑將何以處也臣以為用寛不若用法用法不若先服其心天下心服而後法可盡行贓可盡禁也夫何故天下之所以服者常生於不偏而其不服也常起於不平孟子曰夫子教我以正夫子未出於正也己不正而欲正諸人父不能以行於子也欲正天下而不出於正何以服天下哉且所謂欲正天下而不出於正者誰也豈非朝廷之大吏耶大吏而不正不正而法不行也而欲舉法以禁小吏宜其怨而不服也歟臣何以知大吏之不正異時臣之所聞見者有二一曰私縣官之藏以自入二曰公苞苴之貽以自富天有十日人有十等朝之不可名以晡晝之不可名以夕童子知之至於公卿之不可名以皂隸侯伯之不可名以輿臺則公卿之與侯伯有不知焉何也且天下有君子有小人小人非君子則莫之使君子非小人則莫之事莫之使則不養莫之事則不尊是故朝廷之於君子則尊之於小人則養之盖養小人者所以尊君子尊君子所以責君子之自尊也禮義亷耻豈非君子之所以自尊者耶而異時下自臺省寮屬上逹於公卿侍從有所謂宣借之廩給焉有所謂白直之餐錢焉夫所謂宣借白直者所以養小人而使為君子之侍御僕從也今也無其人而取其食其大官至月以數百緡計則是公卿不為公卿而以皂隸自為也侯伯不為侯伯而以輿臺自為也名為朝廷之大吏而實為皂𨽻輿臺之小人不知公卿侍從亦何忍自處其身於此也無它貨之所在焉耳此所謂私縣官之藏以自入者也都城之有門所以誰何奸者也一夫之異言異服而入者則問持千錢以過者則征而四方之所謂苞苴者雖其篚百金孰有問之者哉不惟百金也千金亦不問也不惟千金也萬金亦不問也非不問也不敢問也曷為不敢問也視其書與篚之緘題或曰上之於廟堂某官也或曰省部某官也或曰貴近某官也夫何敢問且夫所謂萬金千金者何出哉將帥剥三軍之給以固權寵也監司守令攘公盜民以求美遷也此則受之彼安得不剥而攘之天下之箱篚肩相摩於道而其入國門如海水之沃焦公卿曰吾不受苞苴也侍從曰吾不受苞苴也貴近者曰吾不受苞苴也而臣見其入也未見其出也則將誰受之耶此所謂公苞苴之貽以自富者也昔者漢宣帝之時屢下詔以戒吏貪而必及於省卒徒以自給者皆禁止之帝之英眀亦察見於此則貪吏破膽矣陸贄之秉政至於藩鎮之鞭靴亦卻不受雖徳宗諭之而不奉詔以為鞭靴之弊必至於金玉則今之以卒徒自給者恬不之禁而箱篚之大於鞭靴者亦熟視而不問此何理哉大吏不正而責小吏法畧於上而詳於下天下之不服固也是故用法自大吏始而後天下心服天下心服則何法之不可盡行何贓之不可盡禁也哉萬里又上䟽曰臣既言用法自大吏始然則小吏之法可以遂行乎曰未也不有以與不可以奪不有以利不可以害千金之子豈其一身能運千金之貲也哉必有為之謀畫者有為之奔走者有司其管籥者有司其舟車者無是數人則千金之子一日不能以理其家雖然樂於人之為用而不樂於人之為費已則膏粱而忘其人之饑已則綺繒而不卹其人之寒至其欺而盜焉則從而笞之此其勢非棄而去則必不為之盡力今夫人主之於百官下自一命之賤而上極宰相之貴此用天下之名也約之為斗粟豐之為萬鍾此用天下之實也實與名偕則實輕而名重天下斯捨輕以就其重名儉於實則實重而名輕天下斯就實而去其名理固然也人惟伯夷也而後能首陽之節然伯夷之後未見伯夷也而天下又安能人人而伯夷哉故雖聖人居人之國饑而不能出戸亦不辭其君之餽粟以為亷而欲天下之士不食而獨清可乎今天下之吏禄二淛之簿尉月給至於踰百緡而二廣之縣令不取其半至於江淮荆湖則又往往州異而縣不同盖有豐不勝其豐而約不勝其約者矣士之貧者扶老攜㓜千里而就一官禄既薄矣而又州縣之充足者上官之見知者則月有得焉其或州縣之匱乏者上官之私怒而不恱者有終嵗而不得一金且夫假責以往也而饑寒以居也狼狽以歸也非大賢君子誰能忍此而曰爾無貪吾有法豈理也哉是故莫若均天下之吏禄使其至逺者如其近者増其寡者如其豐者如此而猶不改則吾之法一用而天下大服然則行法當如之何臣聞天下之君子以禮耻之而有餘至於小人以刑威之而不足則必有不測甚大之威而後可盖嘗見士大夫為臣言有上官嘗提舶於海邦者而以賄聞鞫之得實覆奏於朝有命笞其背而黥焉其同列者念其非所以示所臨之吏民也則諭之使自裁而其人曰免死幸矣笞而黥不足怍也小人之不畏刑如此頃者聖天子臨御之初盖嘗笞一郡守之贓者矣而天下至今贓吏愈多也則不測甚大之威不可不用也恭聞太祖皇帝初平嶺表有守英州而贓七十萬者特詔棄市又有知衡州而贓得實者令伏法於衡州臣願天子奮不測甚大之威不問吏之小大取其敗而尤者一二人殺之則天下之人震慄而莫敢為矣夫贓者千而敗者一幸而敗矣又曰不忍殺也夫固不畏刑而畏死也不懲以所甚畏而投之以所不畏天下何憚而不為贓吏乎臣故曰天下心服而後法可盡行贓可盡禁也萬里又上䟽曰臣聞堯舜在上亦不能使天下必不為惡夫欲使天下必不為惡者止於嚴刑而已矣過是則無術焉而嚴刑者又不可以常用時用則王常用則亡盖刑者聖人不得已之具而嚴刑者又天下所甚不樂之政以吾之不得已而行天下之所甚不樂雖堯舜能不窮耶故夫流放竄殛者堯舜之刑也此非不嚴也然使堯舜朝行之又暮行之臣恐有如武王數紂之虐者議其後矣是故堯舜亦不能使天下必不為惡何者嚴刑不可以常用也然而堯舜刑殺一二人而天下治此獨何術也盖堯舜之所以治有所不殺而甚於殺有所不刑而甚於刑忠肅恭懿者堯舜既相之眀允篤誠者堯舜又相之則夫不忠不肅不篤不誠者何必盡殺而盡刑也哉屏而棄之足矣夫人之情豈願於永棄今棄於堯舜之世則是不如刑殺者之速死何則身雖不死而望於世者已絶求齒於士君子而不可復也此其心必有以自悔而其遷於善也必有以自力則是不使天下之必不為惡者乃所以必之歟臣前之二䇿其一説曰治贓吏自大吏始其一説曰先之以均吏禄後之以不測甚大之威此其為術足以使天下之懼於貪而未足以使天下之樂於亷盖威之狎則必習而為不威懼之怠則必反而為不懼何則不勝其貪則不勝其刑不勝其刑則不勝其窮夫惟使之樂於亷則誰能奪其樂者臣聞天不能為無春之秋聖人不能行無賞之刑盖生而後殺則殺者不怨刑而不賞則生者不勸今夫某貪吏某非貪吏天子曰爾曷為貪吾殺爾至非貪者則不殺焉貪者死而非貪者生則吏之為貪者將曰貪不可為也於是相率而為不貪今夫某亷吏某非亷吏天子曰爾非亷吏吾不用爾至於亷吏則亦不用則吏之非亷者將曰彼矯而亷以異我也竟何以異於我於是相戒而不為亷天下之俗生於勝勝生於衆衆生於尚上之人不尚亷吏則亷吏寡矣以至寡之亷而欲勝至衆之貪難哉臣願朝廷内委宰相侍從臺諫外委監司太守嵗舉亷吏一人而陛下親擇其尤者不測擢之為臺省之職雖未至如唐之相楊綰亦庶乎亷吏之俗勝貪吏之俗衰俗所尚而樂趨之不過數年贓吏之刑亦不必用矣萬里又上䟽曰臣聞政以令而行亦以令而不行令焉而政不行非天下真敢慢天子之令以違天子之政也或曰天子有令而自慢之爾人惟不自慢也人而自慢則天下孰不慢之夫固有以召之也且天子之令天下也豈不欲行其政而曷為自慢其令自慢其令者生於出之不審而壊於發之不一不審故可快而不可行有言而不自實始乎喜卒乎怨不一故發而悔悔而更今日而發者至眀日而更者至將從其發者乎從其更者乎不審者欺天下者也不一者惑天下者也令至於欺而欲民之信令至於惑而欲民之不疑是畫宫以與人而曰能館指千蹊萬徑以導人而責其皆詣也而可乎周家之盛也天子深拱於京師而象魏所掲木鐸所振誥命所被衆至於六服羣辟外至於九夷八蠻極至於海隅出日奔走俯伏以聽王命至於其衰則犬戎所攻鄭伯所射子帶子朝之所逼而四方諸侯閉戸髙枕而莫之救召之而不至喻之而不聞賞之而不恩詰之而不威此二者何為其然也盖嘗求之成王以翦桐興而幽王以舉烽亡如此而已矣翦桐戯也舉烽亦戲也而興亡異焉則信與不信之異也且不以幼而恕不以戲而誑則天子豈有一言之欺天下而天下亦豈敢忽天子之一言哉彼烽者警急之耳目也無警而舉之召諸侯而誤之後能終無警乎後而有警有警而非誤則孰不以有警為無警非誤為真誤歟一令之不信乃至於殺其君以敗其國不信之禍一至此哉臣嘗讀易至於渙而得其説其象辭曰風行水上渙其爻辭曰渙汗其大號夫號令一也既取於風之行水又取於汗何也今夫風與水相遭也為卷為舒為急為徐為織文為立雪為湧山細則激激滌滌焉大則洶洶輷輷焉不制於水而制於風惟風之聽而水無拒焉成周之盛非風也歟若夫人之身汗則安不汗則疾既汗而復入者疾入而出者猶有瘳也入而不出則不可為矣幽王之病非汗之出而入入而不出者歟然則令之必行欲如水上之風而令之不行則如復入之汗聖人之作易前之説為天下之師後之説以為天下之資也臣竊觀今日之號令何其異於作易者前之説所云者耶糴於民而用夫所謂交子者此亦一利也然臣不知止以利官歟抑以利民歟止以利官則恐非朝廷之所忍為也利民則臣未見其利也何也官用之於民民亦用之於官則上下均利也今也糴則用之於民至兩税之輸而民以與官則官不受於官而官不受則民持此將焉用之朝廷盖有命許民以此輸之官矣名許之實拒之名用之實廢之則其令無乃誑耶至於恩沛有所謂民之四親俱存者蠲其征役有司至今持而不行曰諸郡未有例也且夫令之出也其可行與否抑嘗審之乎不審而出令令出而不行天下無緩急也有緩急而天子下一令天下又將曰不乆必寢不寢必更豈不殆哉朝廷試思之歴代名臣奏議卷二百十三
