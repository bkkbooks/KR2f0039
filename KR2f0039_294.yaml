body:
  text: 歷代名臣奏議卷二百九十四明楊士竒等撰封禪齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏古之王者在伏羲之前封泰山禪云云云云山名在梁父東虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭亭亭山名在巨平又曰在牟隂顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首社首山名在博縣又曰在巨平南十三里皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬縣車上卑耳之山謂將上山纒束其馬懸鉤其車也卑耳即齊語所謂辟身南伐至召陵登熊耳山以望江漢兵車之㑹三而乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾鄗音臛鄗上山也又曰鄗上北里皆地名所以為盛江淮之間一茅三脊所謂靈茅也所以為藉也東海致比目之魚魚各有一目不比不行其名曰鰈西海致比翼之鳥鳥各有一翼不比不飛其名曰鶼鶼然後物有不召而自至者十有五焉今鳯皇麒麟不來嘉穀不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止漢武帝時議欲放古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上竒其書以問兒寬寬對曰陛下躬發聖德統楫與輯同羣元宗祀天地薦禮百神精神所鄉徴兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經以為封禪告成合祛於天地神祇祗戒精專以接神明總百官之職各稱事宜而為之節文惟聖主所由制定其當非羣臣之所能列今將舉大事優遊數年使羣臣得人自盡終莫能成惟天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之東漢光武建武三十年張純上奏曰自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治之風成於頌有周之盛成康之間郊配封禪皆可見也書曰嵗二月東巡狩至于岱宗則封禪之義也臣伏見陛下受中興之命平海內之亂修復祖宗撫存萬姓天下曠然咸䝉更生恩德雲行惠澤雨施黎元安寧夷狄慕義詩云受天之祜四方來賀今攝提之嵗倉龍甲寅德在東宫宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封于岱宗明中興勒功勳復祖統報天神禪梁父祀地祇傳祚子孫萬世之基也中元元年帝乃東巡岱宗以純視御史大夫從并上元封舊儀及刻石文太尉趙喜上奏曰自古帝王每世之隆未嘗不封禪陛下聖德洋溢順天行誅撥亂中興作民父母修復宗廟救萬姓命黎庶賴福海內清平功成治定羣司禮官咸以為宜登封告成為民報德百王所同當仁不讓宜登封岱宗正三雍之禮以明靈契望秩羣神以承天心也中元元年上至泰山有司復奏河雒圖記表章赤漢九世尤著明者前後凡三十六事與博士李充等議以為殷統未絶黎庶繼命髙宗久勞猶為中興武王因父受命之列據三代郊天因孔子甚美其功後世謂之聖王漢統中絶王莽盜位一民莫非其臣尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振於匹夫除殘去賊興復祖宗集就天下海內治平夷狄慕義功德盛於髙宗宣王宜封禪為百姓祈福請親定刻石紀號文太常奏儀制魏明帝時中護軍蔣濟奏曰夫帝王大禮巡狩為先昭祖揚禰封禪為首是以自古革命受符未有不蹈梁父登泰山刋無竟之名紀天人之際者也故司馬相如謂有文以來七十二君或從所繇於前謹遺蹟於後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刋山梁之石無以顯帝王之功布生民不朽之觀也語曰當君而嘆堯舜之美譬猶人子對厥所生譽他人之父今大魏振百王之弊亂拯流遁之艱危接千載之衰繼百世之廢治自武文至于聖躬所以參成天地之道綱維人神之化上天報應嘉瑞顯祥以比往古其優衍豐隆無所取喻至於歷世迄今未發大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苖堀彊於江海大舜當廢東巡之儀徐夷跳梁於淮泗周成當止岱嶽之禮也且昔嵗破吳虜於江漢今兹屠蜀賊於隴右其震蕩內潰在不復淹就當探其窟穴無纍於封禪之事也此儀久廢非倉卒所定宜下公卿廣纂其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞詔曰聞濟斯言使吾汗出流足自開闢以來封禪者七十餘君爾故太史公曰雖有受命之君而功有不洽是以中間曠逺者千有餘年近數百載其儀闕不可得記吾何德之修敢庶兹乎濟豈謂世無管仲以吾有桓公登泰山之志乎吾不敢欺天也濟之所言華則華矣非助我者也公卿侍中尚書常侍省之而已勿復有所議亦不須答詔也晉武帝平吳混一區宇太康元年九月庚寅尚書令衛瓘左僕射山濤魏舒尚書劉實張華等上奏曰聖德隆茂光被四表諸夏乂清幽荒率從神策廟笇席捲吳越孫皓稽顙六合為家巍巍之功格于天地宜同古典勒封東嶽告三府太常為儀制瓘等又奏臣聞肇自生民則有后辟載祀之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沈淪寂寞曽無遺聲者不可勝記自黃帝以前古傳昧略唐虞以來典謨炳著三王代興體業繼襲周道既沒秦氏承之至于漢魏而質文未復大晉之德始自重黎實佐顓頊至于夏商世序天地其在于周不失其緒金德將升世濟明聖外平蜀漢海外歸心武功之盛實由文德至于陛下受命踐阼𢎞建大業羣生仰流唯獨江湖沅湘之表凶桀負固歷代不賓神謀獨斷命將出討兵威暫加數旬蕩定羈其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達于四極雖黃軒之征大禹逺略周之奕世何以尚今若夫𤣥石素文底號前載象以姓表言以事告河圖洛書之徴不是過也加以騶虞麟趾衆瑞並臻昔夏殷以丕崇為祥周武以鳥魚為美咸曰休哉然符瑞之應備物之盛未有若今之富者也宜宣大典禮中嶽封泰山禪梁父發德號明至尊享天休篤黎庶勒千載之表播流後之聲俾百代之下莫不興起斯帝王之盛業天人之至望也詔曰今逋寇雖殄外則障塞有警內則民黎未康此盛德之事所未議也瓘等又奏今東漸于海西被流沙大漠之隂日南北户莫不通屬茫茫禹迹今實過之則天人之道已周巍巍之功已著宜有事梁父修禮地祇登封泰山致誠上帝以答人神之願乞如前奏詔曰今隂陽未和政刑未當百姓未得其所豈可以勒功告成邪瓘又奏臣聞處帝王之位者必有歷運之期天命之應濟生民之大功者必有盛德之容告成之典無不可誣有不可讓自古道也而明詔謙冲屢辭其禮雖盛德攸在推而未居夫三公職典天地實掌民物國之大事取議於此漢氏封禪非是官也不在其事臣等前奏蓋陳祖考之功天命又應陛下之德合同四海述古考今宜循此禮至於剋定盛月須五府上議然後奏聞請寫詔及奏如前下議詔曰雖蕩清江表皆臨事者之勞何足以告成方望羣后思隆大化以寧區夏百姓獲乂與之休息斯朕日夜之望無所復下諸府矣勿復為煩瓘等又奏臣聞唐虞三代濟世𢎞功之君莫不仰答天心俯協民志登介丘履梁父未有辭焉者蓋不可讓也今陛下勳髙百王德無與二茂績宏規巍巍之業固非臣等所能究論而聖㫖勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞神祗之欵望使大晉之典謨不同風於三五臣等誠不敢奉詔請如前奏施行詔曰方當共𢎞治道以康庶績且俟他年無復紛紜也宋孝武帝大明元年十一月戊申太宰江夏王義恭上表曰惟皇天崇稱大道始行揖讓迄于有晉雖聿修前緒而蹟淪言廢蔑記於竹帛者焉可單書紹乾維建徽號流風聲被絲管自無懷以來可傳而不朽者七十有四君罔仁厚而道滅鮮義澆而德宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時蓋陶唐姚姒商姬之主莫不由斯道也是以風化大洽光熙于後炎漢二帝亦踵曩則因百姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈況大宋表祥唐虞受終素德山龍啓符金玉顯瑞異采騰於軫墟紫烟藹於邦甸錫冕兆九五之徴文豹赴天歷之㑹誠二祖之幽慶聖后之𡨕休道冠軒堯惠深亭毒而猶執沖約未言封禪之事四海竊以恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和窮昊膺兹多福髙祖武皇帝明並日月光振八區拯已溺之晉濟橫流之世撥亂寧民應天受命鴻徽洽于海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象歷明逺通於神祇𤣥澤被乎上下仁孝命世睿武英挺遭運屯否三才湮滅乃龍飛五洲鳯翔九江身先八百之期斷出人鬼之表慶烟應髙牙之建風耀符發迹之辰親翦凶逆躬清昏壒天地革始夫婦更造豈與彼承業繼緒拓復禹迹車一其軌書罔異文者同年而議哉今龍麟已至鳯皇已儀北李已實靈茅已茂雕氣降氛於宫榭珍露呈味於禁林嘉禾積穗於殿甍連理合幹於園籞皆耀質離宫植根蘭囿至夫霜毫𤣥文素翮頳羽泉河山嶽之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜沓粵不可勝言太平之應兹焉富矣宜其從天人之誠遵先王之則備萬乘整法駕修封泰山瘞玊岱趾延喬松於東序詔韓岐於西廂麾天閽使啓關謁紫宫朝太乙奏鈞天詠雲門贊揚幽奧超聲前古豈不盛哉伏願時命宗伯具兹典度詔曰太宰表如此昔之盛王永保鴻名常為稱首由斯道矣朕遭家多難入纂絶孝德薄勳淺鑒寐崩愧頃麟鳯表禎茅禾兼瑞雖符祥顯見恧乎猶深庶仰述失志拓清中㝢禮祇謁神朕將試哉四年四月辛亥有司奏曰臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道𤣥勳上烈融章未分鴻光委緒歇而罔藏若其顯諡騰軌則系綴聲采徴略聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玊潤鏤迹以燻今鐫德以麗逺而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自兹以降訖于季末莫不欲英𢎞徽位詳固洪聲豈徒深默修文淵幽馭世而已諒以縢非虛奏書匪妄埋擊雨恕神淳廕復樹安得紫壇肅祗竹宫載竚散火投郊流星奔座寶緯初基厭靈命歷德振弛維功濟淪象𤣥浸紛流華液幽潤規存永馭思詳樹逺太祖文皇帝以啓遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河竚翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈頽天重耀儲正凝位於兼明衮嶽蕃華於元列故以祥映昌基繫發篆素重以班朝待典飾令詳儀纂綜淪蕪搜騰委逸奏玊郊宫禋圭𤣥畤景集天廟脉壤祥農節至昕陽川丘夙禮綱維巡表綏中甸史流其詠民挹其風於是涵迹視隂振聲威響歷代之渠沈缺望內安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懷音革狀邉帛絶書爟光弛燭天岱發靈宗河開寶崇丘淪鼎振采泗淵雲皇王嶽摛藻缺漢并角即音栖翔禁籞衮甲霜咮􅪨舞川肆榮泉流鏡後昭河源故以波沸外關雲蒸內澤若其雪趾青毳𤣥文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬頴孶萌移華淵禁山輿竚衡雲鶼竦翼海鰈泳流江茅吐䕃校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神協氣昌物瑞雲照蒱軒龜軫缺泉淳芳太宰江夏王臣義恭咀道遵英拪竒麗古該潤圖史施詳閟載表以功懋往初德耀炎昊升文中岱登牒天關耀冠榮名摛振聲號而道謙稱首禮以虛挹將使𤣥祇缺觀幽瑞乖期梁甫無盛德之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徴聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鍾竦節陽路整衛正途清禁於是績環珮端玊藻鳴鳯竚律騰駕流文間綵比象之容昭明紀數之服徽焯天陳容藻神行翠蓋懷隂羽華列照乃詔聯事掌祭賓容贊儀金支宿縣鏞石潤響命五神以相列開九關以集靈警衛兵而開雲先雨祇以灑路霞凝生闕烟起成宫臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫夀固皇根谷動神音山傳稱響然後辨年問老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮微代往淪絶拘採遺文辨明訓誥梁武帝天監八年時有請封㑹稽禪國山者帝命諸儒草封禪儀欲行之著作佐郎許懋建議曰舜柴岱宗是為巡狩而鄭引孝經鉤命決云封于泰山考績柴燎禪乎梁父刻石紀號此緯書之曲說非正經之通議也如管夷吾所說七十二君燧人之前世質民淳安得泥金檢玊結繩而治安得鐫文告成妄亦甚矣若聖主不須封禪若凡主不應封禪秦始皇嘗封泰山孫皓嘗封國山皆由主好名於上而臣阿㫖於下非盛德之事不足為法也上嘉納之北齊文宣帝天保五年正月制詔問外中紀號秀州長史樊孝謙對曰臣聞巡嶽之禮勒在虞書省方之義著於易象往帝前王匪唯一姓封金刋玊億有餘人仲尼之觀梁甫不能盡識夷吾之對齊桓所存未幾然盛德之事必待太平茍非其人更貽靈譴秦皇無道致雨風之災漢武奢淫有奉車之害及文叔受命炎精更輝四海安流天下輯睦劒賜騎士馬駕鼓車乃用張純之文始從伯陽之說至於魏晉雖各有君量德而處莫能擬議蔣濟上言於前徒穢紙墨袁准發論於後終未施行世歷三朝年將十祀啓聖之期兹為昌㑹然自水德不竸函谷封塗天馬息歌苞茅絶貢我太祖收寶雞之瑞握鳯皇之書體一德以匡朝屈三分而事主蕩此妖寇易如沃雪但文既受命武乃行誅雖太白出髙中國宜戰置之度外望其遷善伏惟陛下以神武之姿天然之略馬多冀北將異山西涼風至白露下北上太行東臨碣石方欲吞巴蜀而掃崤函苑長洲而池江漢復恐迎風從火芝艾共焚按此六軍未申九伐夫周發牙璋漢馳竹使義在濟民非聞好戰至如投鼠忌器之說蓋是常談文德懷逺之言豈識權道今三臺令子六郡良家蓄鋭須時裹糧待詔未若龍駕虎服先收隴右之民電轉雷驚因取荆南之地昔秦舉長平金精食昴楚攻巨鹿枉矢霄流況我威靈能無協讃但使彼之百姓一覩六軍似見周王若逢司𨽻然後除其苛令與其約法振旅而還止戈為武標金南海勒石東山紀天地之竒功被風聲於千載若令馬兒不死子陽尚在便欲案明堂之圖草射牛之禮比德論功多慙往列升中告禪臣用有疑唐太宗貞觀初羣臣表請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝不及始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎太宗謂房𤣥齡等曰封禪是帝王盛事此表請者不絶公等以為何如魏徴對曰帝王在德不在封禪自喪亂已來近泰山州縣雕殘最甚若車駕既行不能全無使役此便是因封禪而勞役百姓太宗曰封禪之事不自取功績歸之於天譬如𤣥齡等功臣雖有益於國能自謙讓歸之於朕豈似不言而欲自取今向泰山功歸於天有似於此然朕意常以嵩髙既是中嶽何謝泰山公等評議六年胸奴克平逺夷入貢符瑞日至年穀頻登嶽牧等屢請封禪羣臣又稱述功德以為時不可失今日行之臣等猶謂其晚惟魏徴以為不可帝曰朕欲得卿直言之勿有所隱朕功不髙耶曰功髙矣德未厚耶曰德厚矣華夏未理耶曰理矣逺夷不慕義耶曰慕義矣嘉瑞不至耶曰至矣年穀不登耶曰登矣然則何為不可徴對曰陛下功髙矣人未懷惠德厚矣澤未滂流華夏安矣未足以供事逺夷慕矣無以供其求符瑞雖臻而罻羅猶密積嵗豐稔而倉廪尚虛此臣所以竊為未可臣未能逺譬且借近喻於人今有人十年長患疼痛不能任持療理且愈皮骨僅存便欲負米一石日行百里必不可得隋氏之亂非只十年陛下為之良醫除其疾苦雖已乂安未盡充實告成天地臣竊有疑且陛下東封萬國咸萃要荒之外莫不奔馳今自伊洛之東暨乎海岱藋莽巨澤茫茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻寧可引彼戎狄示以虛弱竭財以賞未厭逺人之望加年給復不償百姓之勞或遇水旱之災風雨之變庸夫邪議悔不可追豈獨臣之誠懇亦有輿人之論帝稱善於是乃止太宗已平突厥年穀屢豐羣臣請封泰山太宗初頗非之已而遣中書侍郎杜正倫行泰山上七十二君壇迹以是嵗兩河大水而止其後羣臣言封禪者多乃命祕書少監顔師古諌議大夫朱子奢等集當時名儒博士雜議不能決於是左僕射房𤣥齡特進魏徴中書令楊師道博採衆議奏上之其議曰為壇於泰山下祀昊天上帝壇之廣十二丈髙丈二尺玊牒長一尺三寸廣厚五寸玊檢如之厚減三寸其印齒如璽纒以金繩五周玊䇿四皆長一尺三寸廣寸五分厚五分每策皆五簡聯以金昊天上帝配以太祖皇地祇配以髙祖已祀而歸格于廟盛以金匱匱髙六寸廣足容之制如表函纒以金繩封以金泥印以受命之璽而玊牒藏于山上以方石三枚為再纍纒以金繩封以石泥印以受命之璽其山上之圓壇土以五色髙九尺廣五丈四面為一階天子升自南階而封玊牒已封而加以土築為封髙一丈二尺廣二丈其禪社首亦如之其石檢封以受命璽而玊檢别製璽方一寸二分文如受命璽以石距非經不用又為告至壇方八十一尺髙三尺四出陛以燔柴告至望秩羣神遂著于禮髙宗將封嵩山詔諸儒議射牲事太常博士裴守真奏古者郊祀天地天子自射牲漢武帝封泰山令侍中儒者射之帝不親也今按禮前明十五刻宰人鸞刀割牲質明行事毛血已具天子至奠玊酌獻而已今若前祀一日射牲則早於事及日則晚不逮事漢又天子不親古今異宜恐不可行是時破陳慶善二樂舞入帝常立以視須樂闋乃坐守真并言二舞誠祖宗盛德然古無天子立觀者化育詒庇孰非厥功不應鼓舞别申嚴奉詔可𤣥宗開元中將封禪詔有司講求典儀舊制盥手洗爵皆侍中主之詔祀天神太祝主之四門助教施敬本上言曰周制大宗伯鬱人下士二掌祼事漢無鬱人用近臣漢世侍中微甚籍孺閎孺等幸臣為之後漢邵闔自侍中遷步兵校尉秩千石其職省起居執虎子蓋䙝臣也今侍中位宰相非鬱人比祝者薦主人意於神非賤職也古二君相見卿為上儐況天人之際哉周太祝下大夫二上士四下大夫今郎中太常丞之比上士員外郎博士之比漢太祝令秩六百石今太祝乃下士以下士接天以大臣奉天子輕重不倫非禮也舊制謁者引太尉升壇謁者位下升壇禮重漢尚書御史屬有謁者僕射一秩六百石銅印青綬謁者三十五以郎中滿嵗稱給事中未滿嵗稱謁者光祿勳屬有謁者掌賓贊員七十秩比六百石則古謁者名秩差異等今謁者班微循空名忘實事非所以事天也帝詔中書令張說引敬本熟悉其議十三年十一月封泰山上備法駕至山足御馬登山與宰相及祠官俱登問禮部侍郎賀知章曰前代玊牒之文何故祕之對曰或密求神仙故不欲人見上曰故為蒼生祈福耳乃出玊牒宣示羣臣宋太祖時孫堪上書曰聖宋受天眷命皇帝保綏萬邦治定德隆邇治逺同由是聖時耆艾及公卿臣庶僉與拜章稽顙伸道封禪而皇帝過謙厚損罔迪俞允詔聞率土而神人胥慊草莽賤臣堪謹俯酌庶懇上稽古訓昧死作封禪書一篇雖不足以敷衍洪烈啓迪盛猷庶發揮下誠贊揚能事臣之志也其文曰邈乎天地權輿絪緼混茫分蒼判黃品物用章於是庶類之宗膠轕旁充嗜欲之氓布濩交爭充不已必荒爭不息必傷荒則愆伏作而皓氣亡傷則狂暴煽而生類殃惟天地也能品物之生罔克異類之底寧能黔庶之昌罔克彛倫之自章越乃厯選列辟輔其宏綱易曰后以財成天地之道輔相天地之宜裁成之猷罔爽然後命無忝也輔相之範克篤然後功聿成也丕命元功允著既從於是有登封以助髙焉有封禪以報厚焉稽厥靡他所以告駿命也所以告懋功也所以鑒後嗣也所以答靈祉也茍非至德厖鴻淳化沕潏同符天休合莭地宜奚擬議之敢乎惟皇上帝厥靈孔爍匪諄諄其令而晰晰其符故當命者儲嘉瑞違心者極妖灾肇自生民君宇內以敷治者雖皇王殊厥諡逺邇異厥軫稽所以克荷景命允簡帝心者罔不曰仁義禮樂而已是以二帝之懿三王之輝雖禪代有殊質文相貿罔不恢淳仁以懷物廓正義以幹邦貫大禮以條上下之宜盈至樂以結士民之愛然後風聲踵武獲參兩儀逖違心之妖萃當命之瑞姬周既逝又駮古昔握圖啓極者鮮不峻慘酷以繩衆瀆威武以懾逺奮煩譎以立憲任巧鋭以周行故仁義之休禮樂之淑稍芽於兩漢驟委於魏晉凋落於齊梁枯槁於周隋暫斸於巨唐尋剝於五代其末醇而復也如是然猶有乘小康而展盛禮據淺惠而冒洪威相如頌於前班固贊於後呼壽之徴慶于世宗宫闕之祉耀于光武稽其所以克勤濟衆闡憲軌物垂諸聖世胡其相萬歟大宋之道昭晰前古盛德宏功春熙日融始則伸九伐平多壘建王業也後則緝庶政諧萬邦舉彞倫也是故黃鉞初指則獷者革慝者沈篚厥所以昭武王也洪恩漸被則尫斯起昧斯輝惟天所以穆唐堯也洎皇帝誕纘丕圖繼陟元后雨露之所豐濡日月之所委燭靡不偃息休光彌綸至澤曄曄煌煌雖幽必彰汪汪洋洋無逺弗滂猶復懼古典之未敷叔弊之未祛由是訓罰戮於古刑夷慘酷也偃鎩㦸於靈臺蕩武威也篤憲章於簡易滌煩譎也起俊乂於鄉遂剗巧僞也於是刑清而民和兵偃而道益隆憲簡而俗益醇賢進而官益舉至則樹仁義之根而復植之振禮樂之緒而再暢之俾九有之黎饜飫乎淳仁之濡栖遲于正義之紀條暢乎大禮之緒郁穆乎正樂之統至若臮瞷辨給之俗裸袒文身之羣雖古昔之所不臣舟車之所罕通相與稽首闕庭執贄請吏故大化流也泛濫乎郊甸汗漫乎要荒滌蕩乎四海浮沈乎覆載遐考在昔舜之堯禹之舜相襲也湯之禹文之湯未百世也前憲赫曦易馴也餘德渺漭易沿也遺氓敦惠易綏也然而流殛之罰勞於舜拜言之屈勤於禹昧爽之坐役於湯日昃之思瘁於文然後舜啓無為之治禹成無間之譽湯闡來蘇之望武致盡美之聲曷若聖宋宅千古之下風提千古之弛綱使淳源清流解紐復繼化一變而仁義醇道一反而禮樂同乃伻帝之淳王之方民乎翺翔前之慘往之頑民乎逖遷由是上帝時諶祥符屢彰既而乾之精坤之形相與絡繹八區薦珍郊靈故在上則星緯儲休慶雲覃輝甘露榮光霧散雨霏在下則靈芝林峙醴泉波委羽毛鱗介更誕厥美咸瑞牒之所闕標前史之所罕聞炳爍簡編卓出古議則陟岱宗之崇髙展勒成之皇儀時乎時乎斯厥時乎而皇帝茂謙德之遐芳損盛業之景炎稽于衆誠未之果行徴諸冊牘非謨明之所存者也古語曰修德以錫符奉符以行事是故績鮮爰舉欺之大也德至弗圖慢之甚也聖王罔從欺而動靡甘慢而守宜乎抑厚壤之瑣節奉皇穹之寵靈蕆事庶僚詳禮宗伯鳴鸞五輅揚斾九旗寅亮遐躅崇配黃軒俾嘉聲隆震於萬世王猷翕鑠於一時其不休哉臣生長蓬茨無位朝廷不宜越次僭履擬議文憲然以惠迪典謨沐浴大賚仰酌逺古參倫聖世知有未侔焉是敢首陳列辟受命之猷次敘二帝三王雍容之盛繼道漢晉隋唐因循之治然後知鼓祥風振頽基裁成輔相非睿聖疇能煥發闡揚格斯文之昭著乎恭以頌聲之聞本諸木鐸先民遺範詢于芻蕘則韋褐之間有其志者諒可伸也故敢奮扶愚忠述贊典符然後蹈舞遐方俯伏俟罪惟聖人不以人廢言臣之懇也歷代名臣奏議卷二百九十四
