body:
  text: 歷代名臣奏議卷一百十八明楊士竒等撰禮樂統言禮樂及統言禮魯隱公五年九月考仲子之宫將萬焉萬舞也公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也漢成帝時犍為郡於水濱得古磬十六枚議者以為善祥劉向因是說上宜興辟雍設庠序興禮樂隆雅頌之聲盛揖攘之容攘古讓字以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆削者謂有所刪去以刀削簡牘也筆者謂有所增益以筆就而書也救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆管絃之間小不備因是絶而不為是去小不備而就大不備大不備或莫甚焉夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有悖逆不順之子孫至於陷大辟受刑戮者不絶繇不習五常之道也夫承千歲之衰周繼暴秦之餘敝民漸漬惡俗貪叨險詖不間義理不示以大化而獨驅以刑罰終已不改故曰導之以禮樂而民和睦初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議東漢明帝即位博士曹充上言曰漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書琁璣鈐曰有帝漢出德洽作樂名豫帝善之詔曰今且改太樂官曰太豫樂詩曲操以俟君子拜充侍中章帝時曹褒徴拜博士會帝欲制定禮樂褒上疏曰昔者聖人受命而王莫不制禮作樂以著功德功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛德之美章下太常太常巢堪以為一世大典非褒所定不可許帝知羣僚拘攣難與圖始朝廷禮憲宜時刋立明年復下詔其略曰漢遭秦餘禮壞樂崩且因循故事未可觀省有知其說者各盡所能褒省詔遂復上疏具陳禮樂之本制改之意拜褒侍中和帝永元九年司空張奮上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也先王之道禮樂可謂盛矣孔子謂子夏曰禮以修外樂以制內丘已矣夫又曰禮樂不興則刑罰不中刑罰不中則民無所厝其手足臣以為漢當制作禮樂是以先帝聖德數下詔書愍傷崩缺而衆儒不逹議多駮異臣纍世台輔而大典未定私竊為憂不忘寢食臣犬馬齒盡誠冀先死見禮樂之定十三年更召拜太常復上疏曰漢當改作禮樂圖書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝詔曹褒今陛下但奉而承之猶周公斟酌文武之道非自為制誠無所疑久執謙謙令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法晉愍帝建興初正旦作樂熊逺諫曰謹按尚書堯崩四海遏密八音禮云凶年天子徹樂减膳孝懷皇帝梓宫未反豺狼當塗人神同忿公明德茂親社稷是賴今杜韜蟻聚湘川比歲征行百姓疲弊故使義衆奉迎未舉履端元日正始之初貢士鱗萃南北雲集有識之士於是觀禮公與國同體憂容未歇昔齊桓貫澤之會有憂中國之心不召而至者數國及葵丘自矜叛者九國人心所歸惟道與義將紹皇綱於既往恢霸業於來今表道德之軌闡忠孝之儀明仁義之統𢎞禮樂之本使四方之士退懷嘉則今榮耳目之觀崇戲弄之好懼違雲韶雅頌之美非納軌物有塵大教謂宜設饌以賜羣下而已成帝咸康七年尚書蔡謨奏八年正會儀注唯作鼓吹鐘鼓其餘伎樂盡不作侍中張澄給事黃門侍郎陳逵駮以為王者觀時設教至於吉凶殊斷不易之道也今四方觀禮陵有儐弔之位庭奏宫懸之樂二禮兼用哀樂不分體國經制莫大於此詔曰今既以天下體大禮從權宜三正之享宜盡用吉禮也至娛耳目之樂所不忍聞故闕之耳事之大者不過上夀酒稱萬歲已許其大不足復闕鐘鼓鼓吹也澄逵又啓今大禮雖降事吉於朝然儐弔顯於園陵則未滅有哀禮服定於典文義無盡吉是以咸寧之會有徹樂之典實先朝稽古憲章垂式萬世者也詔曰若元日大享萬國朝宗庭廢鐘鼓之奏遂闕起居之節朝無磬制之音賓無蹈履之度其於事義不亦闕乎惟可量輕重以制事中散騎侍郎顧臻表曰臣聞聖王制樂讚揚政道養以仁義防其淫佚上享宗廟下訓黎元體五行之正音協八風以陶物宫聲正方而好義角聲堅齊而率禮弦歌鐘鼓金石之作備矣故通神至化有率舞之感移風易俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入笞之屬皮膚外剝肝心內摧敦彼行葦猶謂勿踐矧伊生靈而不惻愴加四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序足以踏天頭以履地反天地之至順傷彜倫之大方今夷狄對岸外禦為急兵食七升忘身赴難過秦之戲日廩五斗方掃神州經略中甸若此之事不可示逺宜下太常纂備雅樂簫韶九成惟新於盛運功德頌聲永著于來葉此乃所以燕及皇天克昌厥後者也諸伎而傷人者皆宜除之流簡儉之德邁康哉之詠清風既行下應如草此之謂也愚管之誠惟垂採察後魏文成帝和平六年特進征南將軍刁雍上表曰臣聞有國有家者莫不以禮樂為先故樂記云禮所以制外樂所以修內和氣中釋恭敬溫文是以安上治民莫善於禮移風易俗莫善於樂且於一民一俗尚須崇而用之况統御八方陶鈞六合者哉故帝堯修五禮以明典章作咸池以諧萬類顯皇軌於云岱揚鴻化於介丘令木石革心鳥獸率舞包天地之情逹神明之德夫感天動神莫近於禮樂故大樂與天地同和大禮與天地同節和故百物阜生節故報天祭地禮行於郊則上下和肅肅者禮之情和者樂之致樂至則無怨禮至則不違揖讓而治天下者禮樂之謂歟惟聖人知禮樂之不可以已故作樂以應天制禮以配地所以承天之道治人之情故王者治定制禮功成作樂虞夏殷周易代而起及周之末王政陵遲仲尼傷禮樂之崩亡痛文武之將墜自衛返魯各得其中逮乎秦皇翦棄道術灰滅典籍坑燼儒士盲天下之目絶象魏之章簫韶來儀不可復矣賴大漢之興改正朔易服色協音樂制禮儀正聲古禮粗欲周備至於孝章每以三代損益優劣殊軌歎其薄德無以易民視聽博士曹褒覩斯詔也知上有制作之意乃上疏求定諸儀以為漢禮終於休廢寢而不行及魏晉之日修而不備伏惟陛下無為以恭已使賢以御世方鳴和鸞以陟岱宗陪羣后以升中嶽而三禮闕於唐辰象舞替於周日夫君舉必書古之典也柴望之禮帝王盛事臣今以為有其時而無其禮有其德而無其樂史闕封石之文工絶清頌之享良由禮樂不興王政有缺致也臣聞樂由禮所以象德禮由樂所以防淫五帝殊時不相沿三王異世不相襲事與時並名與功偕故也臣識昧儒先管窺不逺謂宜修禮正樂以光大聖之治詔令公卿集議唐太宗時以慶善樂為文舞破陳樂為武舞詔魏徵及虞世南褚亮李百藥等為之詞太宗謂侍臣曰昔周公相成王製禮作樂久之乃成逮朕即位數年之間成此二樂五禮又復刋定未知堪為後代法否朕觀前王有功於人者作事施令有即為法所貴不忘其德者也朕既平定天下安堵海內若德惠不倦有始善終自我作古何慮不法若遂無德於物後代何所遵承以此而言後法不法猶在朕耳徵對曰陛下撥亂反正功髙百王自開闢已來未有如陛下者也更創新樂兼修大禮自我作古萬代取法豈止子孫而已髙宗上元元年大酺上御翔鸞閣觀之分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推梨讓栗相親如一今分二朋遞相誇競非所以崇禮義勸敦睦也上瞿然曰卿逺識非衆人所及也遽止之開耀元年以立太子宴百官及命婦於宣政殿引九部伎及散樂自宣政門入太常博士袁利貞上疏曰正寢非命婦宴會之地路門非倡優進御之所請命婦會於别殿九部伎自東西門入而停散樂上乃更命置宴於麟德殿賜利貞帛百匹𤣥宗開元中裴耀卿請行禮樂化導三事表曰三者禮樂化導也州牧縣宰所守者宜揚禮樂典書經籍所教者返古還朴上奉君親下安鄉族若皆和氣浹洽自然化理清平由此言之不在刑法聖朝制禮作樂雖行之自久而外州逺郡俗習未知徒聞禮樂之名不知禮樂之實竊見鄉飲酒禮頒於天下比來惟有貢舉之日略用其儀閭里之間未通其事臣在州日率當州所管縣二與百姓勸導行禮奏樂歌至白華華黍由庚等章言孝子養親及羣物遂性之義或有泣者則知人心有感不可盡誣但臣州久絶雅聲不識古樂伏計太常具有樂器大樂久備和聲伏望令天下三五十大州簡有性識於太常調習雅聲仍請笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀准令式行禮稍加勸奬以示風俗又以州縣之學本以勸人祿在其中聞於學也今計天下州縣所置學生不減五六萬人及諸色并國子每年薦舉擢第過百人已上雖有司明試務在擇才而學校衰微居然可驗州縣補學生之日皆不願為逺郡送鄉貢之時多有不願來集恐成頽弊不可因循伏望詳擇其宜微加勸革德宗時杜佑上三朝行禮樂制議曰晉司律中郎將陳頎云昔杜䕫𫝊舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭太和中左延年改䕫騶虞伐檀文王三曲更作聲節其名雖存而聲實異惟䕫鹿鳴今不改易也魏代正朝大會太尉奉羣后行禮東廂雅常作者也後有三篇第一曰於赫篇詠武帝聲律與古鹿鳴同第二曰魏魏篇詠文帝用左延年所改騶虞聲第三曰洋洋篇詠明帝亦用左延年所改文王聲第四復用鹿鳴之聲重用而除古伐檀及晉初食舉亦用鹿鳴按左𫝊穆叔如晉晉侯享之工歌鹿鳴之三三拜鹿鳴所以嘉寡君也敢不拜嘉毛詩云鹿鳴燕羣臣嘉賓也既飲食之又實其幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心也詩𫝊並無行禮及叔孫通所制漢儀復無别行禮事荀氏云魏氏行禮食舉再取周詩鹿鳴又以宴嘉賓無取於朝考之舊聞未知所應荀朂乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝祭之義食舉歌詩十二篇化肇羣后奉璧趨步拜起莫非行禮豈容别設一樂謂之行禮耶荀譏鹿鳴之失似悟昔謬還制四篇復襲前軌宋太宗時鄉貢進士田錫請復鄉飲禮書曰臣聞聖人建大業得大位制禮以經邦國作樂以和神人五禮行於朝廷逺方之民有終身不得觀之者六樂奏於宗廟逺方之俗有終身不得聞之者於是制鄉飲之禮行鄉校之間俾人遍知冀人易識蓋其禮甚辨其儀甚詳有獻祭之儀有俎豆之數命鄉人之賢者為主延鄉人之老者為賓揖讓拜起皆有儀升降進退必有位以金石之樂和其節以雅頌之詩導其情自秦承周衰漢邇秦亂不能行之至後漢世祖行之世祖之後復廢至西晉復之西晉之後又廢至皇唐用之明著禮文散頒郡國咸俾長吏以化黎元至開元中宣州刺史裴耀卿以為鄉飲之儀惟於貢士之日略得舉用其餘寢停豈聖王化俗之心豈良吏知禮之大於是拜章奏以上言自恭儉而行禮月而習之歲而行之于是宣州耆老宣庭僚吏每聞歌白華之什華黍之詩南陔之篇由庚之頌言孝子養親之道述萬物遂性之旨觀者皆踴躍聽者有感泣蓋禮樂之感於外而精神之發於中也在唐之世為唐之牧守唐之世祚垂三百載唐之牧守凡幾千人唯耀卿能於一郡之間獨奉先王之禮樂猶化其俗尚移其風以是知先王之禮不徒行先王之樂不徒用但後人行之不得其道用之不知其微國家大禮與天地同節大樂與天地同和禋天地祭宗廟祠山川正齒胄逮封册冠昏之禮軍旅賓客之容陛下皆舉百王之禮而行之以六代之樂而明之所謂禮樂刑伐自天子出矧國家括地三百州拓土一萬里年榖屢豐民氣太和朝廷之禮既崇而逺方之民有未親見之者朝廷之樂既備而逺方之俗有未親聞之者願陛下申明舊典舉行新政頒鄉飲之禮修鄉飲之儀使其觀祭獻之嚴則知不忘報本矣覩蘋藻之祀則知所貴者誠矣見賢者為主則知懋德者可尊矣視老者為賓則知髙年者可恭矣閲揖讓拜起之式則知謙恭撙節之可學矣見升降進退之容則知折旋俯仰之可習矣聞白華南陔之詩則知孝於父母矣聽雅音正聲之奏則恱於和樂矣月而習之歲而行之稔於禮而自熟漬於道而彌深訐愎化為柔和很戾遷為貞順革惡歸善流邪復正其何然哉蓋性相近也習相逺也不覺自生於知恥之性既無過又知恥國家雖設刑而無淫慝可刑矣朝廷雖設禁而無過差可禁矣若是則為父者以慈而為教也為子者以孝而自守也為兄者以友愛而自得也為弟者以恭謹而自恱也為夫者以和而有其室家也為婦者以柔而事於舅姑也一家率之一鄉慕之一邑化之一郡榮之一國興之天下同之得非王者厲精於禮樂而致之諸侯折節於禮樂而奉之若以為古之禮也不可復行則世祖承盜莽之後而能行之晉氏承元魏之亂而能復之太宗革隋季之淫而能用之若以為俗之薄也難驟化之則裴耀卿何以化之宣州之民何以順之是知三代絶迹千古曠禮猶可繕完補葺損益裁酌沿其俗適其時而明之况貞觀之風開元之化左顧不逺右盻可及彜章不泯令式斯在昔舜庭奏樂而鳥獸率舞燕谷吹律而草木遂萌文王行禮而虞芮懷慙范宣護功而欒黶知變夫金石至和非有樂於鳥獸而鳥獸自舞草木無情非必應於律吕而律吕能通西伯之仁不以化虞芮而爭訟自息晉卿之讓不以矯欒黶而汰虐自亡蓋禮樂之進物也速而謙讓之服人也深况欲以賓主之禮以明之以獻祭之儀而示之以金石之樂以和之以升降之度而化之以揖讓之容以導之以尊賢之序以命之以養老之道以喻之人之心物之性得不優而柔之而自趨之感而慕之而自化之鄉飲之禮化民導俗夫如是之速也願陛下詢公卿而復之望陛下敕牧守而行之行之朞年則民知恥行之再歲則民知教行之三載則民知禮行之而不輟用之而能久則比屋可封之俗不獨堯帝之時也聖代當復見矣聞樂而感之者不獨宣州有之也天下當盡然也天下幸甚海內幸甚惟陛下裁之臣不勝慺慺思理之誠謹昧死奉書以聞真宗景德元年北征凱旋京師是日以懿德皇后忌詔徹鹵簿鼓吹禮官議曰班師振旅國之大事后之忌日家之私事今大駕凱旋軍容宜肅昔武王伐紂在諒暗中猶前歌後舞夫諒暗是重逺忌是輕以此而論舉樂無爽况春秋之義不以家事辭王事其還京日法駕鼓吹音樂並請振作寧宗時朱熹乞修三禮劄子曰臣聞之六經之道同歸而禮樂之用為急遭秦滅學禮樂先壞漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義說耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說熙寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過誦其虛文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽冥而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其說者而不知其為闕也故臣頃在山林嘗與一二學者考訂其說欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列注疏諸儒之說略有端緒而私家無書檢閲無人抄寫久之未成會蒙除用學徒分散遂不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别為一書以補六藝之闕而亦未能具也欲望聖明特詔有司許臣就袐書省太常寺關借禮樂諸書自行招致舊日學徒十餘人踏逐空閒官屋數間與之居處令其編類雖有官人亦不繫銜請俸但乞逐月量支錢米以給飲食紙札油燭之費其抄寫人即乞下臨安府差撥貼司二十餘名候結局日量支犒賞别無推恩則於公家無甚費用而可以興起廢墜垂之永久使士知實學異時可為聖朝制作之助則斯文幸甚天下幸甚右統言禮樂魯桓公二年夏取郜大鼎于宋納于太廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席太羮不致粢盛不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聽周內史聞之曰臧孫逹其有後於魯乎君違不忘諫之以德莊公二十四年秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎齊景公與晏子坐于路寢公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰惟禮可以己之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以其為民也是以先王上之楚靈王合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓宋太子佐後至椒舉請辭焉曰屬有宗祧之事於武城敢謝後見徐子吳出也以為二焉故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之商紂為黎之搜東夷叛之周幽為太室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽趙武靈王平晝閒居肥義侍坐曰王慮世事之變權甲兵之用念簡襄之迹計胡狄之利王曰嗣立不忘先德君之道也錯質務明主之長臣之論也是以賢君靜而有道民便事之教動有明古先世之功為人臣者窮有弟長辭讓之節通有補民益主之業此兩者君臣之分也今吾欲繼襄王之業啓胡狄之鄉而卒世不見也敵弱者用力小而功多可以無盡百姓之勞而享往古之勳夫有髙世之功者必負遺俗之纍有獨智之慮者必被庶人之恐今吾將胡服騎射以教百姓而世必議寡人矣肥義曰臣聞之疑事無功疑事無名今王即定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔舜舞有苗而禹袒入裸國非以養欲而樂志也欲以論德而要功也愚者暗於成事智者見於未萌王其遂行之王曰寡人非疑胡服也吾恐天下笑之狂夫之樂智者哀焉愚者之笑賢者戚焉世有順我者則胡服之攻未可知也雖驅世以笑我胡地中山我必有之王遂胡服使王孫緤告公子成曰寡人胡服且將以朝亦欲叔之服也家聽於親國聽於君古今之公行也子不反親臣不逆主先王之通誼也今寡人作教胡服而叔不服吾恐天下議之也夫制國有常而利民為本從政有經而令行為上故明德在於論賤行政在於信貴今胡服之意非以養欲而樂志也事有所出功有所止事成功立然後德可見也今寡人恐叔逆從政之經以輔公叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故寡人願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜曰臣固聞王之胡服也不佞寢疾不能趨走是以不先進王今命之臣固敢竭其愚忠臣聞之中國者聰明睿知之所居也萬物貨財之所聚也聖賢之所教也仁義之所施也詩書禮樂之所用也異敏技藝之所試也逺方之所觀赴也蠻夷之所義行也今王釋此而襲逺方之服變古之教易古之道逆人之心畔學者離中國臣願大王圖之使者報王王曰吾故聞叔之病也即之公叔成家自請之曰服者所以便用也禮者所以便事也是以聖人觀其鄉而順宜因其事而制禮所以利其民而厚其國也被髮文身錯臂左衽甌越之民也黑齒雕題鯷冠秫縫大吳之國也禮服不同其便一也是以鄉異而用變事異而禮易是故聖人茍可以利其民不一其用果可以便其事不同其禮儒者一師而禮異中國同俗而教離又况山谷之便乎故去就之變智者不能一逺近之服聖賢不能同窮鄉多異曲學多辨不知而不疑異於已而不非者公於求善也今卿之所言者俗也吾之所言者所以制俗也今吾國東有河薄洛之水與齊中山同之而無舟楫之用自常山以至代上黨東有燕東胡之境西有樓煩秦韓之邉而無騎射之備故寡人且聚舟楫之固求水居之民以守河薄洛之水變服騎射以備燕其參胡樓煩秦韓之邉且昔者簡子不塞晉陽以及上黨而襄王兼戎取代以攘諸胡此愚智之所先時中山負齊之强兵侵掠吾地系纍吾民引水圍鄗非社稷之神靈即鄗幾不守先王忿之其怨未能報也今騎射之服近可以備上黨之形逺可以報中山之怨而叔也順中國之俗以逆簡襄之意惡變服之名而忘國事之恥非寡人所望於子公子成再拜稽首曰臣愚不逹於王之議敢道世俗之聞今欲繼簡襄之意以順先王之志臣敢不聽令再拜乃賜胡服趙文進諫曰農夫勞而君子養焉政之經也愚者陳意而智者論焉教之道也臣無隱忠君無敝言國之祿也臣雖愚願竭其忠王曰慮無變擾忠無過罪子其言乎趙文曰當世輔俗古之道也衣服有裳禮之制也循法無愆民之職也三者先聖之所以教今君釋此而襲逺方之服變古之教易古之道故臣願王之圖之王曰卿言世俗之間常民溺於習俗學者沈於所聞此兩者所以成官而順政也非所以觀逺而論始也且夫三代不同服而王五霸不同教而政知者作教而愚者制焉賢者議俗不肖者拘焉夫制於服之民不足與論心拘於俗之衆不足與致意故勢與俗化而禮與變俱聖人之道也承教而動循法無私民之職也知學之人能與聞遷逹於禮之變能與時化故為已者不待人制今者不法古子其釋之趙適諫曰隱忠不竭姦之屬也以私誣國賤之類也犯姦者身死賤國者族宗此兩者先王之明刑臣下之大罪也臣雖愚願盡其忠無遁其死王曰竭意不讓忠也上無蔽言明也忠不辟危明不距人子其言乎趙適曰臣聞之聖人不易民而教智者不變俗而動因民而教者不勞而成功據俗而動者慮經而易見也今王易禮不循俗胡服不顧世非所以教民而成禮也且服竒者志淫俗僻者亂民是以蒞國者不襲竒僻之服中國不近蠻夷之行非所以教民而成禮者也且循法無過修禮無邪臣願王之圖之王曰古今不同俗何古之法帝王不相襲何禮之循伏羲神農教而不誅黃帝堯舜誅而不怒及至三王觀時而制法因事而制禮法度制令各順其宜衣服器械各便其用故禮世不一其道便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒而志淫是鄒魯無竒行也俗僻而民易是吳越無俊民也是以聖人利身之為服便事之為教進退之為節衣服之為制所以齊常民非所以論賢者也故聖與俗流賢與變俱諺曰以書為御者不盡馬之情以古制今者不逹事之變故循法之功不足以髙世法古之學不足以制今子其勿反也漢髙祖并天下諸侯共尊為皇帝於定陶博士叔孫通就其儀號就成也髙帝悉去秦儀法為簡易羣臣飲爭功醉或妄呼拔劒擊柱上患之通知上悉饜之說上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀髙帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復也復重也因也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積德而後可興也吾不忍為公所為公所為不合古吾不行公往矣毋汙我通笑曰若真鄙儒不知時變遂與所徵三十人西及上左右為學者與其弟子百餘人為綿蕞野外謂以茅剪樹地為纂位尊卑之次也蕞與蕝同並音子恱反習之月餘通曰上可試觀上使行禮曰吾能為此乃令羣臣習肄武帝元封七年司馬遷等議改正朔時御史大夫兒寬明經術上乃詔寬曰與博士共議今宜何以為正朔服色何上寬與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推𫝊序文則今夏時也臣等聞學褊陋不能明陛下躬聖發憤昭配天地臣愚以為三統之制後聖復前聖者二代在前也今二代之統絶而不序矣唯陛下發聖德宣考天地四時之極則順隂陽以定大明之制為萬世則宣帝時琅琊王吉為諫大夫上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書斷獄聽訟而已此非太平之基也今俗吏所以牧民者非有禮義科指世世通行者也以意穿鑿各取一切茍順一時非正道是以詐僞萌生刑罰無極質朴日消恩愛寖薄孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域則俗何以不若成康夀何以不若髙宗東漢章帝元和三年博士曹褒請著漢禮班固以為宜廣集諸儒共議得失帝曰諺言作舍道邉三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣乃拜褒侍中桓帝延熹九年郎中荀爽對策陳便宜曰臣聞之於師曰漢為火德火生於木木盛於火故其德為孝其象在周易之離夫在地為火在天為日在天者用其精在地者用其形夏則火王其精在天溫暖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝廉夫喪親自盡孝之終也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道而克稱火德者也往者孝文勞謙行過乎儉故有遺詔以日易月此通時之宜不可貫之萬世古今之制雖有損益而諒暗之禮未嘗改移以示天下莫遺其親今公卿羣僚皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎春秋𫝊曰上之所為民之歸也夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔翟方進以自備宰相而不敢踰制至遭母憂三十六日而除夫失禮之源自上而始古者大喪三年不呼其門所以崇國厚俗篤化之道也事失宜正過勿憚改天下通喪可如舊禮臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恆孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也今漢承秦設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義孔子曰昔聖人之作易也仰則觀象於天俯則察法於地覩鳥獸之文與地之宜近取諸身逺取諸物以通神明之德以類萬物之情今觀法於天則北極至尊四星妃后察法於地則昆山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴鴝雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹逺取諸物則木實屬天根荄屬地陽尊隂卑蓋乃天性且詩初篇實首關雎禮始冠婚先正夫婦天地六經其㫖一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其序矣昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止祻亂之源也人能枉欲從禮者則福歸之順情廢禮者則祻歸之推祻福之所應知廢興之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老夀之福及三代之季淫而無節瑶臺傾宫陳妾數百陽竭於上隂隔於下故周公之戒曰不知稼穡之艱難不知小人之勞惟耽樂之從時亦罔或克夀是其明戒後世之人好福不務其本惡祻不易其軌截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宫采女五六千人從官侍史復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徵調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞于內故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃匹一曰通怨曠和隂陽二曰省財用實府藏三曰修禮制綏眉夀四曰配陽施祈螽斯五曰寬賦役安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以為歲尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也易曰天地節而四時成春秋𫝊曰唯器與名不可以假人孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶于而國者也宜略依古禮尊卑之差及董仲舒制度之别嚴督有司必行其命此則禁亂善俗足用之要宋文帝元嘉六年駙馬都尉奉朝請徐道娛上表曰謹按晉博士曹𢎞之議立秋御讀令上應著緗幘遂改用素相承至今臣淺學管見竊有惟疑伏尋禮記月令王者四時之服正月駕倉龍載赤旗衣自衣服黑玉季夏則黃文極於此無白冠則某履某舄也且幘又非古服出自後代上附於冠下不屬衣冠固不革而幘豈容異色愚謂應恆與冠同色不宜隨節變綵土令在近謹以上聞如或可採乞付外詳議太學博士荀萬秋議伏尋幘非古者冠冕之服禮無其文案蔡雍獨斷云幘是古卑賤供事不冠人所服又董仲舒止雨書曰其執事皆赤幘知並不冠之服也漢元始用衆臣率從故司馬彪輿服志曰尚書幘名曰納言迎氣五郊各如其色從章服也自兹相承迄于有晉大宋受命禮制因循斯既歷代成凖謂宜仍舊有司奏謹案道娛啓事以土令在近謂幘不宜變萬秋雖云幘宜仍舊而不明無讀土令之文今書舊事于左魏臺雜訪曰前後但見讀春夏秋冬四時令至於服黃之時獨闕不讀今不解其故十四年帝以新撰禮論付太常傅隆使下意隆上表曰臣以下愚不涉師訓孤陋閭閻面墻靡識謬䝉詢逮愧懼流汗原夫禮者三千之本人倫之至道故用之家國君臣以之親用之婚冠少長以之仁愛夫妻以之義順用之鄉人友朋以之三益賓主以之敬讓所謂極乎天蟠乎地窮髙逺測深厚莫尚於禮也其樂之五聲易之八象詩之風雅書之典誥春秋之微婉勸懲無不本乎禮而後立也其源逺而流廣其體大而義精非夫睿哲大賢孰能明乎此哉况遭暴焚亡百不存一漢興始徵召故老搜集殘文其體例紕繆首尾脫落難可詳論幸髙堂生頗識舊義諸儒各為章句之說既明不獨逹所見不同或師資相𫝊共枝别幹故聞人二戴俱事后蒼俄已分異盧植鄭𤣥偕學馬融人各名家又後之學者未逮曩時而問難星繁充斥兼兩摛文列錦煥爛可觀然而五服之本或差哀敬之制舛雜國典未一於四海家法參駮於搢紳誠宜考詳逺慮以定皇代之盛禮者也伏惟陛下欽明𤣥聖同規唐虞疇咨四嶽興言三禮而伯夷未登微臣竊位所以大懼負乘形神交惡者無忘夙夜矣而復猥充博採之數與聞爰發之求實無以仰酬聖旨萬分之一不敢廢默謹率管穴所見五十二事上呈蚩鄙茫浪伏用竦赧明帝泰始二年有司奏皇太子所生陳貴妃禮秩既同儲宫未詳宫臣及朝臣並有敬否妃主有內相見又應何儀博士王慶緒議百僚內外禮敬貴妃應與皇太子同其東朝臣𨽻理歸臣節太常丞虞願等同慶緒尚書令建安王休仁議稱禮云妾既不得體君班秩視子為序母以子貴經著明文內外致敬貴妃誠如慶緒議天子姬嬪不容通音介於外雖義可致䖍不應有箋表參詳休仁議為允詔可南齊明帝永泰元年尚書令徐孝嗣上議曰夫人倫之始莫重冠婚所以尊表成德結歡兩姓年代汙隆古今殊則繁簡之儀因時或異三加廢於王庶六禮限於天朝雖因習未久事難頓改而大典之要深宜損益案士冠禮三加畢乃醴冠者醴則唯一而已故醴辭無二若不醴則每加輒醮以酒故醮辭有三王肅云醴本古其禮重酒用時味其禮輕故也或醴或醮二三之義詳許於經文今皇王冠畢一酌而已即可擬古設醴而猶用醮辭實為乖衷尋婚禮實篚以四爵加以合巹既崇尚質之理又象泮合之義故三飯卒食再酳用巹先儒以禮成好合事終於三然後用巹合儀注先酳巹以再以三有違㫖趣又郊特牲曰三王作牢用陶匏言大古之時無共牢之禮三王作之而用太古之器重夫婦之始也今雖以方樏示約而彌乖昔典又連巹以鎖蓋出近俗復别有牢燭雕費采飾亦虧曩制方今聖政日隆聲教惟穆則古昔以敦風存餼羊以愛禮沿襲之規有切治要嘉禮實重宜備舊章謂自今王侯已下冠畢一酌醴以遵古之義醴即用舊文於事為允婚亦依古以巹酌終酳之酒竝除金銀連鎖自餘雜器悉用埏陶堂人執燭足充􅌊燎牢燭華侈亦宜停省庶斫雕可期移俗有漸參議並同奏可梁武帝普通六年尚書僕射徐勉上修五禮表曰臣聞立天之道曰隂與陽立人之道曰仁與義故稱導之以德齊之以禮夫禮所以安上治人𢎞風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌典禮吉為上凶次之賓次之軍次之嘉為下也故祠祭不以禮則不齊不莊喪紀不以禮則背死忘生者衆賔客不以禮則朝覲失其儀軍旅不以禮則致亂於師律冠婚不以禮則男女失其時為國修身於斯攸急洎周室大壞王道既衰官守斯文日失其序禮樂征伐出自諸侯小雅盡廢舊章缺矣是以韓宣適魯知周公之德叔侯在晉辨郊勞之儀戰國從橫政教愈泯暴秦滅學掃地無餘漢氏鬱興日不暇給猶命叔孫於外野方知帝王之為貴末葉紛綸遞有興毁或以武功鋭志或好黃老之言禮義之式於焉中止及東京曹褒南官制述集其散略百有餘篇雖寫以尺簡而終闕平奏其後兵革相尋異端互起章句既淪俎豆斯輟方領矩步之容事滅於旌鼓蘭臺石室之文用盡於帷蓋至乎晉初爰定新禮荀顗制之於前摯虞刪之於末既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啓運先天改物撥亂惟武經時以文作樂在乎功成制禮𢎞於業定光啓二學皇枝等於貴逰闢兹五館草萊升以好爵爰自受命迄于告成盛德形容備矣天下能事畢矣明明穆穆無得而稱焉至若𤣥符靈貺之祥浮溟機山之賮固亦日書左史副在司存今可得而略也是以命彼羣才搜甘泉之法延兹碩學闡曲臺之儀淄上淹中之儒連蹤繼軌負笈懷鉛之彥匪旦伊夕諒以化穆三雍人從五典秩宗之教勃焉以興伏尋所定五禮起齊永明三年太子步兵校尉伏曼容表求制一代禮樂于時參議置新舊學士十人止修五禮咨禀衛將軍丹陽尹王儉學士亦分住郡中製作歷年猶未克就及文憲薨殂遺文散逸後又以事付國子祭酒何𦙍經涉九載猶復未畢建武四年𦙍還東山齊明帝敕委尚書令徐孝嗣舊事本末隨在南第永元中孝嗣於此遇祻又多零落當時鳩斂所餘權付尚書左丞蔡仲熊驍騎將軍何佟之共掌其事時修禮局住在國子學中門外東昏之代頻有軍火其所散失又踰大半天監元年佟之啓審省置之宜敕使外詳時尚書參詳以天地初革庶務權輿宜俟隆平徐議刪撰欲且省禮局併還尚書儀曹詔㫖云禮壞樂缺故國異家殊實宜以時修定以為永准但頃之修撰以情取人不以學進其掌知者以貴總一不以稽古所以歷年不就有名無實此既經國所先外可議其人人定便即撰次於是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎隨源以聞請㫖斷决乃以舊學士右軍記室參軍明山賓掌吉禮中軍騎兵參軍嚴植之掌凶禮中軍田曹行參軍兼太常丞賀瑒掌賓禮征虜記室參軍陸璉掌軍禮右軍參軍司馬裴掌嘉禮尚書左丞何佟之總參其事佟之後以鎮北咨議參軍伏暅代之後又以暅代嚴植之掌凶禮暅尋遷官以五經博士繆昭掌凶禮復以禮儀深廣記載殘缺宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張充及臣三人同參厥務臣又奉别敕總知其事末又使中書侍郎周捨庾於陵二人復豫參知若有疑義所掌學士當職先立議通咨五禮舊學士及參知各言同異條牒啓聞决之制㫖疑事既多歲時又積制㫖裁斷其數不少莫不網羅經誥玉振金聲義貫幽微理入神契前儒所不釋後學所未聞凡諸奏决皆載篇首其列聖㫖為不刋之則洪規盛範冠絶百王茂實英聲方垂千載寧孝宣之能擬豈孝章之足云五禮之職事有繁簡及其列畢不得同時嘉禮儀注以天監六年五月七日上尚書合十有二秩百一十六卷五百四十六條賓禮儀注以天監六年五月二十日上尚書合十有七秩一百三十卷四十五條軍禮儀注以天監九年十月二十九日上尚書合十有八秩一百八十九卷二百四十條吉禮儀注以天監十一年十一月十日上尚書合二十有六秩二百二十四卷一千五條凶禮儀注以天監十一年十一月十七日上尚書合四十有七秩五百一十四卷五千六百九十三條大凡一百二十秩一千一百七十六卷八千一十九條又列副祕閣及五經典書各一通繕寫校定以普通五年二月始獲寫畢竊以撰正履禮歷代罕就皇明在運厥功克成周代三千舉其盈數今之八千隨事附益質文相變故其數兼倍猶如八卦之爻因而重之錯綜成六十四也昔文武二王所以綱紀周室君臨天下公旦修之以致太平龍鳳之瑞自斯厥後甫備兹日孔子曰其有繼周雖百代可知豈所謂齊功比美者歟臣以庸識謬司其任淹留歷稔允當斯責兼勒成之初未遑表上實由才輕務廣思力不周永言慙惕無忘寤寐自今春輿駕將親六師搜尋軍禮閲其條章靡不該備所謂郁郁文哉煥乎洋溢信可以懸諸日月頒之天下者矣愚心喜忭彌思陳述兼前後官一時皆逝臣雖幸存耄已將及慮皇世大典遂闕謄奏不任下情輒具載撰修始末并職掌人所成卷秩條目之數謹拜表以聞後魏孝明帝熙平元年六月中侍中劉騰等奏曰中宫僕刺列車輿朽敗自昔舊都禮物頗異遷京已來未復更造請集禮官以裁其制靈太后令曰付尚書量議太常卿穆紹少卿元端博士鄭六劉臺龍等議按周禮王后之五輅重翟錫面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋翟車貝面組總有握輦車組挽有翣羽蓋重翟后從王祭祀所乘厭翟后從王賓享諸侯所乘安車后朝見於王所乘翟車后出桑則乘輦車后宫中所乘謹以周禮聖制不刋之典其禮文尤備孔子云其或繼周者雖百世可知也以其法不可踰以此言之後王輿服典章多放周式雖文質時變輅名宜存雕飾雖異理無全捨當今聖后臨朝親覽庶政輿駕之式宜備典禮臣等學缺通經叨參議末輒率短見宜凖周禮備造五輅雕飾之制隨時增减太學博士王延業議按周禮王后有五輅重翟以從王祠厭翟以從王享賔客安車以朝見于王翟車以親桑輦車宫中所乘又漢輿服志云秦并天下閲三代之禮或曰殷瑞山車金根之色殷人以為大輅於是始皇作金根之車漢承秦制御為乘輿太皇太后皇太后皆御金根車加交絡帷裳非法駕則乘紫罽軿車雲􅏹文畫輈黃金塗五末蓋瓜在右騑駕三馬阮諶禮圖并載秦漢已來輿服亦云金根輅皇后法駕乘之以禮婚見廟乘輅后法駕乘之以親桑安車后小駕乘之以助祭山軿車后行則乘之紺罽軿車后小行則乘之以哭公主邑君王妃公侯夫人入閣輿后出入閣宫中小逰則乘之晉先蠶儀注皇后乘雲母安車駕六騩按周秦漢晉車輿儀式互見圖書雖名號小異其大較略相依擬金根車雖起自秦造即殷之遺制今之乘輿五輅是其象也華飾典麗容觀壯美司馬彪以為孔子所謂乘殷之輅即此之謂也案阮氏圖桑車亦飾以雲母晉之雲母車即是一與周之翟車其用正同安車既名同周制又用同重翟山軿車案圖飾之以紫紺罽軿車雖制用異於厭翟而實同用於今入閣輿與輦其用又同案圖今之黑漆畫扇輦與周之輦車其形相似竊以為秦滅周制百事創革官名軌式莫不殊異漢魏因循繼踵仍舊雖時有損益而莫能反古良由去聖久逺典儀殊缺時移俗易物隨事變雖經賢哲祖襲無改伏惟皇太后睿聖淵凝照臨萬物動循典故貽則後王今輒竭管見稽之周禮考之漢晉採諸圖史驗之時事以為宜依漢晉法駕則御金根車駕四馬加交絡帷裳御雲母車駕四馬以親桑其非法駕則御紫罽軿車駕三馬小駕則御安車駕三馬以助祭小行則御紺罽軿車駕三馬以哭公主王妃公侯夫人宫中出入則御畫扇輦車案舊事比之周禮唯闕從王享賓客及朝見於王之乘竊以為古者諸侯有朝會之禮故有從享之儀今無其事宜從省略又今之皇居宫掖相逼就有朝見理無結駟即事考實亦宜闕廢又哭公主及王妃周禮所無施之於今實合事要損益不同用捨隨時三代異制其道然也又金根及雲母駕馬或三或六訪之經禮無駕六之文今之乘輿又皆駕四義符古典宜仍駕四其餘小駕宜從駕三其制用形飾備見圖志司室領尚書令任城王澄尚書左僕射元暉尚書右僕射李平尚書齊王蕭寶夤尚書元昭尚書左丞盧同右丞元洪超考功郎中劉懋北主客郎中源子恭南主客郎中游思進三公郎中崔鴻長兼駕部郎中薛恱起部郎中杜遇左主客郎中元韡騎兵郎中房景先外兵郎中石士基長兼右外兵郎中鄭幼儒都官郎中李秀之兼尚書左士郎中朱元旭度支郎中谷頴左民郎中張均金部郎中李仲東庫部郎中賈思同國子博士薛禎邢晏髙諒奚延太學博士邢湛崔瓚韋朏鄭季期國子助教韓神固四門博士楊那羅唐荆寶王令俊吳珍之宋婆羅劉燮髙顯雍杜靈俊張文和陳智顯楊渴侯趙安慶賈天度艾僧㯹吕太保王當百槐貴等五十人議以為皇太后稱制臨朝躬親庶政郊天祭地宗廟之禮所乘之車宜同至尊不應更有製造周禮魏晉雖有文辭不辨形制假令欲作恐未合古制而不可以為一代典臣以太常國子二議為疑重集羣官並從今議唯恩裁决靈太后令曰羣官以後議折中者便可如奏孝明帝時胡太后數幸宗戚勳貴之家侍中崔光表諫曰禮諸侯非問疾弔喪而入諸臣之家謂之君臣為謔不言王后夫人明無適臣家之義夫人父母在有歸寧沒則使卿寧漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帳以接羣臣示男女之别也願陛下簡息遊幸則率土屬賴含生仰恱矣不聽北齊文宣帝天保元年皇太子監國在西林園冬會羣議皆東面二年於北城第內冬會又議東面吏部郎陸卬疑非禮魏收改為西面邢子才議欲依前曰凡禮有同者不可令異詩說天子至於大夫皆乘四馬况以方面之少何可皆不同乎若太子定西面者王公卿大夫士復何面邪南面人君正位今一官之長無不南面太子聽政亦南面坐議者言皆晉舊事太子在東宫西面為避尊位非為向臺殿也子才以為東普博議依漢魏之舊太子普臣四海不以為嫌又何疑於東面禮世子絶旁親世子冠於阼冡子生接以太牢漢元著令太子絶馳道此皆禮同於君又晉王公世子攝命臨國乘七旒安車駕用三馬禮同三公近宋太子乘象輅皆有同處不以為嫌况東面者君臣通禮獨何為避明為向臺所以然也近皇太子在西林園在於殿猶且東面於北城非宫殿之處更不得邪諸人以東面為尊宴㑹避案燕禮燕義君位在東賓位則在西君位在阼階故有武王踐阼篇不在西也禮乘君之車不敢曠左君在惡空其位左亦在東不在西也君在阼夫人在房鄭注人君尊東也前代及今皇帝宴㑹接客亦東堂西面若以東面為貴皇太子以儲后之禮監國之重别第宴臣賓自得申其正位禮者皆東宫臣屬公卿接宴觀禮而已若以西面為卑實是君之正位太公不肯北面說丹書西面則道之西面乃尊也君位南面有東有西何可皆避且事雖少異有可相比者周公臣也太子子也周公為冡宰太子為儲二明堂尊於别第朝諸侯重於宴臣賓南面貴於東面臣疏於子冡宰輕於儲二周公攝政得在明堂南面朝諸侯今太子監國不得於别第異宫東面宴客情所未安且君行以太子監國君宴不以公卿為賔明父子無嫌君臣有嫌按儀注親王受詔冠婚皇子皇女皆東面今不約王公南面而獨約太子何所取邪議者南尊改就西面轉君位更非合禮方面既少難為節文東西二面君臣通用太子宜然於禮為允魏收議云去天保初皇太子監國冬㑹羣臣於西園都亭坐從東面義取於向中宫臺殿故也二年於宫冬㑹坐乃東面收竊以為疑前者遂有别議議者亦同之邢尚書以前定東面之議復申本懷此乃國之大禮無容不盡所見收以為太子東宫位在於震長子之義也按易八卦正位向中皇太子今居北城於宫殿為東北南面而坐於義為背也前者立議據東宫為本又案東宫舊事太子宴會多以西面為禮此又成證非徒言也不言太子常無東南二面之坐但用之有所至如西園東面所不疑也未知君臣車服有同異之議何為而發就如所云但知禮有同者不可令異不知禮有異者不可令同茍别君臣同異之禮恐重紙纍札書不盡也子才竟執東面收執西面援引經據大相往復其後竟從西面為定歷代名臣奏議卷一百十八
