body:
  text: 厯代名臣奏議卷三百三明楊士竒等撰災祥宋神宗元豐三年直舍人院呂大防上奏曰臣伏覩七月二十六日手詔以彗出西方責躬引咎敷求讜言以正厥事臣伏讀感欷以為天道難知不可隱度今聖心恐畏退託損抑有以見不諱之朝度越前古臣愚不肖雖吏守外藩不敢不布肝鬲少禆萬一伏惟神明幸察臣竊以為方今政事之急謾為三説九宜上冒天聽一曰治本二曰緩末三曰納言治本之宜有三一宜養民漢之傳國至昭帝而六世藩臣之變外戚之禍數矣唐之傳國至明皇而六世如漢之變而又有巨盜之患今大宋之臨御而陛下之繼統世數與漢唐同而曾無一方之患其得人心可見矣茍非纍聖德澤􅉼養深厚視之如傷愛之如子則何以固結其心若此伏自陛下布行新政以來參酌古今著為良法便民者為不少矣而民情戚戚不以為安推原其端蓋緣朝廷措置大率急於公家而後於民事竊觀先王之政上之憂下也深則下之報上也厚故其詩曰駿發爾私終三十里上憂下之詩也雨我公田遂及我私下報上之詩也上下之情其相親如此則怨惡不順何由生乎其間哉故馬周之對太宗以為貞觀初匹絹易斗米而人不怨者知陛下憂之也五六年來匹絹易榖十數斛而民怨者知陛下不憂之也此言極要頗同今日之意臣試舉其一二免役錢本率衆以給庸公家無所利其入今所在猥積至有一縣之人出者半贏者半而取之不已遇水旱未嘗有所蠲減貧下未嘗有所貸免此民情戚戚之一也市易本以抑兼并便衆業而公利在其間民有艱急匱乏之期方之他取於富室則無倍稱之息然吏或不良乘民之急而掊刻無已徒欲收贏取賞而不顧事體之宜與法令之本意誘陷無賴子弟以隳産者有之豫民者髙其物估以巧取息者有之一物朝貴賣而夕賤買者有之此民情戚戚之一也保甲者先王什伍教民之法也不專為兵而已今有司惟以坐作進退射藝精粗為急而不問推行考察姦盜去惡奬善之意而又富者逸而貧者勞或遇飢饉則將有流散不可號召之虞此民情戚戚之一也凡此特法令之未備或吏奉法不謹之過以陛下之聖明而修正之宜無難者二宜教士舜九德文王作人周公三物皆為先王教士之實今聞以才選者矣未聞以德進也聞以文詞選者矣未聞以行進也臣竊以非大變其法則終不能得教士之實其變法謂何責之郡縣監司保任其才行以升於尚書各試其所知而命之則士勸於善而不專以文辭設科則士業崇本凡此一改法令則天下從之矣以陛下之聖明而修正之不五六年必收其效三宜重穀自古國家之患未有不緣民飢而起也今縣官積錢所在貫朽而倉廪至無半歲之實誠可憂也蓋自常平之法行而羣司各計其利故轉運司唯有租稅征科之入而已其歲入既不足以充費故於儲蓄之計雖欲賤糴而不暇為也常平雖有折納斂糴之法而吏多不能推行萬一水旱方千里則積鏹之饒將無用而民之強者衆而為盜弱者流離溝壑而無以救矣臣近嘗上乘歲豐積穀之議頗合事機而亦可行於久逺伏望財察凡此特法令之未備或吏奉法不謹之過以陛下之聖明而修正之宜無難者緩末之宜有二一宜緩勤逺略中國本也要荒末也先王之政修德而不勤兵於逺其為我聲教所暨故舜之命官猾夏者治之然則不為中國患者王者不治也或者謂我得其地可闢而郡縣之我得其人可冠帶而賦役之竊謂過矣以四海九州之廣而欲苦寒不毛之地以為富以民多士之盛而欲桀驁難制之人以為衆徒見有糜敝所重而未見其可也雖有前代喪失之地茍非民情來附未足以用衆二宜緩治兵兵者先王所治而非所以為先也衛君問陳於孔子而孔子答以爼豆之事蓋禮教有所未修而先之以軍旅之事則語道非其序也今刑政雖講而未可謂盡中禮樂雖修而未可謂盡善教化雖布而未可謂盡行然則今日之政宜有急於兵者焉凡此非可廢之事特在陛下施為之有先後而已以陛下之聖明留意而條别之宜無不得其序者納言之宜有四一宜廣言路古者羣臣人人得諫故曰工執藝事以諫工尚諫則餘可知矣所謂爭臣七人者在位皆諫諫而又當必爭者有七人而後可今陛下虛心待下未嘗大聲以色而諫者未始有聞於天下諫而必爭者未始見其人方唐太宗之時當亡隋之後人物寡少而諫者滿朝今陛下承纍世文明之盛而遂使史筆無書諫諍之事亦可謂闕典矣二宜寬侵官之罰凡人臣之居外見不便於民有害於政者大者聞諸朝小者以其職而行之是也今一切禁止不使相侵則朝廷必有不聞之事而民庶必有失職之苦矣三宜恕誹謗之罪自古有為之君更制天下之事未有不被毁訾於世者以盤庚之明周公之聖而不免況其下者哉蓋衆人皆常情不逹義理樂因循而憚改作改作之始未見其利而翕然非之聖人於此特恕其無知而寬之可也豈足以與之較量長短是非哉故漢文深知其意直除其罪以容之而已茍設峻令以防之非不遽止然愚庸之情不自知語言之過而非其上矣四宜容異同之論古者衮服之飾必以黻者取其兩已相背而能成政也兩已相背至銘諸躬而日服之以為監有以見人君御臣之深戒在於喜同而惡異也舜伐三苖禹以為可益以為不可然不害並為九官周公相成王召公不恱然不害同為十亂洪範謀及卿士則三公之論有不用焉周官詢及萬民則卿士之謀有不取焉夫然後可以通逹衆志輔成大業茍取其所同而捨其所異則晏子所謂以水濟水孰能食之者也非特如此而已茍欲其同則必有誕謾詐欺以附同者矣茍惡其異則必有詭隨面從以免異者矣使人臣皆懷誕謾詭隨以事上殆非朝廷之利也竊聞議者必使廷臣無異論乃謂之一道德為此説者似不思也夫一道德以同俗者蓋謂典常之教不可不同也今以政之殊有可有不可有宜有不宜有損有益而必一而同之恐非聖人之意也所惡異論者豈非以其沮議害事而惡之邪茍導之使言而擇之在我則雖有沮議害事之言在吾所棄固不能為患也凡此無難改之勢而有速應之實蓋在陛下為之而已如前所陳蓋陛下政事之形容於外者臣得以揣度而陳之至如陛下聖性之淵微君德之崇厚惟幾以成天下之務惟深以逹天下之志臣之愚陋莫得而測焉伏惟仰觀天心旁考古義詘竒論而用中道則天下幸甚宫邸教授呂大鈞上奏曰臣伏讀詔書寅畏天變引過罪已數求美言以新盛德誠意惻怛發於心畫自足以消變除慝況諫行言聽膏澤逮下必將感召和氣溢為嘉祥臣愚恨無精識奧學啓寤天聽徒有淺聞近見二事或可以少禆萬一伏惟聖主留神財察幸甚臣聞詩書所稱古先哲王雖清明在躬俊乂在官猶孳孳不倦延禮臣下講求至道之要而推行之夫至道之要莫切於堯舜之言其言曰人心惟危道心惟微此言至簡至要古之人君莫能盡行故常為中材之所忽而獨上聖能勤行者也然則人心者人君之所日用時出以應萬務者也其神恍惚其出入無時其作於中而見於外也邪正糾紛頃刻萬變其危如是安得不日夜存養寧息使之感物應變無所差失乎道心者人心之所默識躬行以立大本者也凡有生之民無衆寡小大無彼我莫不體之以為吾心就其間􅉼容存養以生吾誠其道茫昧難以言諭唯忠信默會庶幾近之稍或不明則離而不一其微如是安得不間暇燕處求索推明克已體物常使純一則仁義禮智油然根於中睟然見於外然後為得乎故言動之所發政令之所加始出於善而其終常流為不善凡此者皆人心不安而易變故也誠意之所存行義之所履始若充盡其終常至於天下不為一家中國不為一人凡此者皆道心不明而易失故也由是言之此二心者非有一物也特體用之殊耳使人心一於道心則自不危矣使道心一於人心則自不微矣今乘陛下勵精反已之時謂宜博延德義之士儲精垂思相與講求至道之實使浩然之氣充塞天地則何患濬哲不生而明德不暢乎此臣之所謂淺聞者此也臣又聞天下衆人言謂陛下躬勤庶政日不遑暇而有司奉行多不盡理陛下逺略方外軍政修舉而將帥出征多不諭旨陛下奬勸人材柬拔倚注而或不得其人陛下優假言事之臣未嘗深譴而近日內外望風畏怯莫敢有言青苖免役所以寬民力而下户凋瘵日甚常平儲峙錢穀所以足國用而有司經費日窘訓齊保甲所以禁暴而盜賊如故增置官局所以革弊而文書益煩異時歲饉糴貴小民常取倍息之貴亦能自給今年豐官出輕貸而束手受困異時富商大賈豪奪細民而不甚為苦今市易均輸平準而負益深凡此皆臣之近見者也然推見無本而求之豈有他哉唯知道心之實則見此時之弊矣傳曰唯道集虛陛下既明發德音虛心待物則道豈難知哉古人謂顧力行何如者此在陛下一動心之間耳可不深念之乎館閣校勘邢恕亦上奏曰臣恭惟皇帝陛下實天祚宋誕生明聖有超卓絶異之姿爰自育德宫闈仁心仁聞載在群口及初嗣位動率禮法承順兩宮左右就養發於誠孝逺近內外凡厥臣庶莫不矜式太皇太后厭世陛下號慟泣血百僚在位不覺隕涕入臨而出轉以相告有識咨嗟長老嘆息山陵復土外雖變禮從吉而陛下悲哀未怠宫中實服三年夙夜念治躬親政事小大之臣咸各率職十有四年未嘗一日少懈後宫燕遊聲色嗜好無所聞園囿弋獵輿馬馳騁無所幸方且闢闔乎乾坤而步驟乎帝皇其視天下如一家中國如一人其設心操術豈待問哉仍年以來威福自出惟所指顧莫不服從曽未謦咳莫不響應赫赫巍巍朝廷益尊四方萬里盜賊消戢閭里安堵陛下誠因此美即此善據此勢藉此時以之上當天心則可使寒暑平風雨時三光軌度以之下順地理則可使五穀熟庶草茂山川晏寧至于景星出卿雲見甘露降醴泉涌鳳凰麒麟可使皆在郊藪天人之際其形氣有以相通其變動有以相感格之以誠應之以實密與道俱則其答猶影響其合猶符節也如此則何災不可消何異不可去若夫祈禳小數豈足道哉昔宋景公一諸侯耳出君人之言三熒惑為之退舍況於陛下之仁聖智勇履席南面之勢不出殿堂之上而廣制海內尺地莫非其有一民莫非其臣者哉以誠感天曽不移刻以德退星曾不旋踵此臣所以殫志畢慮不量其愚不避見嫉之嫌而願畢其惓惓也伏惟陛下留神加察焉踈逺小臣未嘗得日望清光奉承德音也然而間從公卿大夫之後竊聽於進見下風者皆以謂陛下才髙天下智出物表既妙思六經而多識前載旁羅百氏典章制度律令敕式靡不淹洽工作器械算數米鹽無不精密神機天辨變化無窮退而鮮不自失夫人心畏怯則智勇皆廢雖朝暮禁闥陟降殿陛密近親習之臣猶且踧踖愧恐唯諾聽從之不暇無能有所開發建明以補助萬一況于單賤鄙逖之人乎雖天之髙不可階而升日月之可仰無得而踰性與天道不可得而聞然匹夫匹婦之於聖人有所與知一有不獲自盡民主罔與成功以大舜之智而自耕稼陶漁以至於為帝無非取人以為善以孔子之聖而獄訟文辭可與人共之者不獨有焉則所謂聖智者曷嘗掩衆人之所能而咸蓋羣心之所知哉衆人所見而有以處之使各效其長羣心所知而有以擇之使必從其是竭天下之力盡天下之思慮然猶有所不及而後聖人奮其智能則所以待之者盡矣其所得者博矣其所守者約矣已而有迹其長緣其是則天下之人莫不興起為之於其才力之所不給計之於其思慮之所不獲則天下之人莫不厭服何必耗血氣疲精神一切親事於法宮之中然後為得哉臣竊仰陛下之天德常若太髙而或不下接朝廷之舉事常若太速而謀之常患不博雖陛下之聰明睿知百舉百中而愚者千慮之一猶恐有所遺也況或纎芥闕漏略於彌縫而汗渙已施機張已發則誰敢出身試臨不測而輕議於既往哉且夫履四海之盛位襲五世之極治又有冠古之稱絶俗之事此乃全盛光大之時君子之所以尚消息盈虛也意者陛下或有而矜之所謂日中則昃月盈則食盛衰損益之機其在是矣故易之明夷以蒞衆既濟思患而預防此古先哲王所以安而不忘危存而不忘亡治而不忘亂日新厥德以祈天永命也昔唐太宗自負其文武材略以為實兼將相然不知帝王自有體下兼將相不足為能不若漢髙祖豁逹面諭羣臣吾不如子房蕭何韓信也方是時彗星亦嘗變見而太宗悟焉曰吾自謂三王以來撥亂之主莫吾若故負而矜之輕天下士上天見變其謂是手夫謂古人為莫吾若而輕時人則上下之情不通而無所不至惟太宗為能知悔而又有魏徵王圭劉洎馬周之徒更戒迭諫然後貞觀之治庶幾三代之風而彗亦不能為災何況陛下盛德至誠避殿損膳深自引咎以來讜言放出宫女以防隔塞虛心克已效於事實豈特太宗之比哉于以收視反聽淡然與神明俱而默與造化為友端拱無營優遊自得付物以能委任責成情偽之變事物之來有道以揆有節以察不勞而成不動而化兼享堯舜之名永保喬松之壽上以奉寧七廟慰釋皇太后之心以幸惠羣臣而錫為蒼生福則何變異之足憂哉抑臣又聞惟德動天無逺勿屆而天地之大德曰生董仲舒亦曰刑主殺德主生則修德者莫若好生也朝廷近歲屢起詔獄深識逺見之士竊量陛下聖意之過欲大畏民志究盡事實及至便殿親決時亦有所縱舍郡府奏讞大辟類率從生非必專欲求殺也然而治獄之吏典法之官但見追逮不絶恐不能無妄意朝廷便私自營冀徼盡力首公之名而規闊略縱出之責則必至於滋蔓刻核失出蓋鮮則失入有之及至上奏請決煆鍊已成文致已白囚人雖有懷鬱抑而不得伸朝廷雖欲加寬厚而無所施則是豈國家之意哉臺寺深嚴自非事守相關焉知其詳然法者設於有罪而使惡人知畏也人無罪者或不自保而善人亦懼矣此臣所以疑也臣知京師玩習久安大抵懈弛而嚮者貴近狃於恩幸不知畏法方陛下勵精為治有以督過訓齊之誠是也然而矯枉者貴直矯枉過直則是曲而已孟子曰今之與楊墨辨者如追放豚既入其苙又從而招之誠使百司自此莫不飭厲而貴近益遵約束然且求之不已則是亦過直而招之之類也書曰寬而有制從容以和在易之節曰苦節不可貞先王之所以繩檢羣下未嘗無制也然必寬之使赴功有餘地從容而不迫遽故和樂而無憔悴節之為卦君子所以制數度議德行然至於已甚過中苦而不甘不可以通行持久失其所以為正是故先王議道自己制法以民也誠以陛下天縱之才日躋之德慮靡不周而志罔或倦舉以程能課事而厚望之於羣臣磨以歲月則鮮不破漏傾覆失其所操持行義有跌於繩墨之間而譴訶有軼於度量之表矣易曰窮則變變則通詩曰四牡騑騑六轡如馳臣意陛下洞逹事機時措之宜必有以變而通之如王良造父御馬緩急控縱而歸和平固已得之於精神之會心術之微然臣直以耳目所接言之不能無過計也獄吏法官制在陛下視以好惡惟所寬恤易若覆手至于興甲兵之大投民於鋒鏑之間措之矢石之下以其死爭一跌而不振則雖有仁智之心不能救患於已然而消禍於既往是故帝王之師必出於萬全攻不必取不茍勞衆戰不必勝不茍接刃蓋以養國威全人命也近者瀘南之舉師出不為無名以陛下之威武將吏鼓勇軍士思奮校之以計若老成人之䇿孺子角其有餘不足若孟賁拉侏儒檄馳鋒接萬全必勝而獨克然臣得之傳聞不知是否以謂蠻徼山林阻險道路狹隘溪澗隔絶吏士羊腸魚貫不輕得進地饒瘴疫令人頭痛身熱漚泄霍亂而中州之人不服習其水土使蠻稍桀黠聞大兵將至則逃遁而不出旅距而不可入曠日引久留而不決士卒暴露疾病死亡者衆而餽餉或不給師老械敝浸成遷延不然逆類醜徒上下救死為首尾之勢旁近種落相與唱和有脣齒之援舉熊羆之士而輕用其鋒以與猿狙之民角逐於﨑嶇逼束濘淖翳薈之間以幸頃刻之勝厮養下卒有一不備於行間雖能梟馘其首領繫纍其徒黨猶不若多算逺御以全制其弊也如師倦而歸蠻或連結諸種呼嘯並出蜀地狹而人稠雖遇大熟食猶不足比歲錢積於官市用少而益貴米不加多而益賤則農人困矣蜀之所恃以界限蠻夷者山林也今承平日久而虞衡之屬時禁不講界上之民私相交易往來往往有微徑潛通道路故號為險狹者今率行牛林木故可以為障塞者今皆盡行斤斧不幸而歲飢食不足錢不可以多得本末俱困山林之阻故不設備屬有姦民鄉導外寇表裏俱發郡縣又闕守備則唐之南詔前世之均順豈可以其無能哉古有言兵者凶器一方有急四面皆從今蜀雖號富饒為朝廷外府以內外輕重較之則手足標末也五路天下之腹心根本也河北陜西河東又皆控帶戎境率計義勇保甲籍勝兵不減七八十萬然則三路尤為天下之捍蔽祖宗寬假邊民稅或不及分河北特弛鹽禁誠知天下有急三路最持其重三路不可動搖則天下之勢常安而他皆坐受其利故切封疆捍壁壘挽齎奉餉數履危難之地者則急其力而緩其財守墳墓安鄉里不識戰鬭之事不知死亡之憂者則急其財而緩其力利害之相權勞逸之相均勇怯強弱之相資多寡有無之相濟蓋未冇兼責而獨得者也祖宗初定天下所以任戰者皆黥面之兵固未有義勇保甲也猶且恤之若此況今日乎誠宜先擇三路之守令優為勸奬之法稍稱職者且使任俾得以拊循其民即安田里因其暇日𨽻習戰守捐其逋負寬其力役平居無追須勞苦之歎則緩急可責其效死果得民兵之實則西北之敵且畏威矣民誠效死敵誠畏威則邊鄙不聳兵刃不頓不過几席之上樽爼之間可以挫四夷因其亂亡之時踐其機投其隙鼓之以道德征之以仁義誘之以恩信則可簞食壺漿以迎王師扶老攜幼以歸聖德鞭撻不施況血刃乎方天變之來陛下過意抑損即有以反求諸身又有以固結其民酌輕重之宜謹先後之施則夏遼異黨蠻貊荒忽可使歸命向化矧惟宫殿之內左右密勿常從宿衛之臣乎至若推廣象類而修舉恩澤之政以導迎善氣唯陛下所擇非小臣所得一二言也臣屬近在輦轂之下首聞詔旨猥先衆人而言陛下赦憐不誅使能言之士得以繼進則四海九州之博內外臣民之衆方九德咸事之時安知不有指陳世故極於天人之分逹於古今之宜足以上答聖心抑塞星變者哉則是臣於國猶為有補也神宗時承議郎王安禮上奏曰臣聞和氣致祥乖氣致異人事失於下變象見於上能應之以德則咎異消忽而不戒則禍敗至蓋天以君為子愛之顧之可謂至矣政一弗迪則垂象譴告將欲人君悔過逺非慎微省事以自全安也自昔言災異者皆不出此乃者彗出西方異之甚者陛下恐栗祇畏避宫省膳亟下明詔敷求直言乾道昭然今則消復臣聞無災而懼禍亦不萌患至而思咎將誰執當陛下思變責躬之日臣實不敢懷未信謗已之嫌共惟陛下即位以來憂勤庶政興起敝廢總持權綱可謂欲治之主不世出矣有仁民愛物之心而澤不下究有溫恭好問之實而壅於上聞廣土衆民未躋既富萬方黎獻罔或彚征在位多素餐之譏比屋無圄空之頌是非雜操賢不肖混淆民勞於室謫見于天臣竊思其由未知其實意者左右之臣不均不直謂忠者為不忠謂不賢者為賢朋黨比周讒忌蔽塞以惑陛下之聰明歟任職言事之臣附勢以亂情偽倚法以徇愛憎賞不及功罰不當罪而政事不得其平歟乘權附利之臣不察惠養閔仁之意用力殫於溝瘠取利究於園夫兵民嗷嗷或致愁嘆人不得安而失職歟凡此數者足以干隂陽之和致乖沴之氣天象之差幾在於此陛下慈仁孝友格于皇天外無狗馬玩好之求內無險詖私謁之事是陛下修之於上正之於朝廷而羣臣隳之於私室伏願陛下察親近之行使無以濟其私杜羣枉之門使得以歸於直省不急之改作紓弗勝之力役凡可弛以利民者一切罷之則善言可以退舍美意可以延年復見於今日矣若夫貶損之舊章祈禳之小數臣竊恐皆非陛下所以昭事上帝之意臣羈孤憃愚旁無佽助獨蒙陛下拔擢幸得待罪從臣常懼無以報稱故敢冒昧不避斧鉞之誅以先衆臣唯陛下留神裁擇不勝幸甚干冒天威臣俯伏俟命之至張方平上論曰臣蒙恩在朝備員經歲無施補益每為深愧今被命守藩旦夕出國門適值陛下以垂象之變降御札發德音敕宰司率在廷之臣直言過失改修政事之未協于民者當陛下憂勞之際老臣不為陛下開一言則忠義之語無復至於天聽上負知眷沒有餘責敢以聞見少報重恩臣聞天尊地卑而君臣之分定君君臣臣而後國體正天下安故惟辟作福惟辟作威臣無有作福作威臣而有作福作威其害于而家凶于而國蓋為國之體猶權衡勢不可使有所偏重偏重之勢必成傾覆歷代成敗何不由此伏自近嵗以來災異之作率由隂侵於陽陛下天縱聰明前言往事無不洞鑑不待臣説也今聖心所以答天戒責躬變禮可謂精誠之至謂天蓋髙其聽孔卑故不旋日而星變以隱感通昭答足以明皇天眷佑我有宋之意至矣陛下應之以實固當踐所言今夫政事之未協于民者固有之矣大抵新法行已六年事之利害非一二可悉就中役法一事為天下害實深纍經更變竟無長䇿可以定其法議論日以紛擾公私日以勞敝夫人為天地之心天地之變人心實為之故和氣不應災害洊作蓋下令如流水之原取其順流之易也經六年而事功莫效顧其事必有未協于民者矣法既未協事資必改若猶憚改人將不堪憂患一成噬臍安及陛下承六世之業上有二宫家國大事願陛下憂深而思逺寧忍於人情不可忍於社稷也憂患既成人臣各有去就之分家國之憂獨在聖人所以終日不離其輕重謂此也此臣所以為陛下痛心疾首一夕而九興也況今習俗奔競偷敝成風交黨相傾勢利相軋攻訐起於廟堂獄訟興於臺閣非所以昭聖化也毁譽移於好惡賞罰偏於愛憎非所以正王度也士大夫習尚如此有為國家死節仗義臨難虞而不易其操者歟昔堯舜之為君選于衆舉十六官而與臯夔稷契共治天下猶且明四目逹四聰而後能協和萬邦雖大聖賢未有一人之心力而可以成天下之務也陛下臨御九年中外臣庶皆照臨之下其間必有知忠義不二心之臣簡在聖衷者矣願陛下召之左右從容訪逮譬之金石叩之則鳴人各有心激之則發吉人之辭寡吉人訥於言外若不足其中誠也利口捷給外若有餘其中偽也惟聖鑑精察之若夫導之以言而不能盡者使陳之簡牘必有所效者矣前代明君莫不以是考于下故能廣視聽於扶同之外究得失於幾微之先攬其權綱執其柄鍔慮所以藏身之固思所以置器於安此惟獨決於神斷而後可非所以謀于人者也夫事有失於前者不可不悔患有在於後者不可不懼如救焚溺勢不可緩緩則無及於救矣魚不可脫於淵國之利器不可以假人涓涓可以潰堤熒熒至於燎原釁端厲階不可忽也臣之心惟願國家之善政美事陛下之盛德鴻烈髙越百王之上流光萬世之下天之福祥休嘉之象生而咎證之象不生民之愁嘆怨咨之聲不作而頌聲作使兆民樂事勸功尊君親上欣戴安樂臣退就田里以至暝目泉下猶知懷此幸願也老臣無狀為陛下慮不敢不精為陛下言不敢不盡亦惟陛下察此至誠俯垂省納實天下幸甚監察御史裏行彭汝礪上奏曰臣竊惟書敘休咎之證時雨以肅常則以狂時寒以謀常則以蒙蓋各以類焉然天難諶命不可知故先王亦正厥事而已今年春亢陽秋苦雨隂陽之災各至其後復大水冒郡邑殺人畜淹禾稼流蕩廬舍陛下咨嗟嘆息憂形於色為出使勞徠安集之則陛下之仁愛可謂至矣然古以醫諭治國欲知其身緩急焉病發於手足而治於手足其力雖勞疾終不加損求其本而治之七年之病可朝暮而定陛下寬慈恭儉仁孝宫闈嬪御非有過溢之寵池臺林籞非有不時之遊幸母家后族畏法循理非有僭侈如漢之外戚也內外百官承流聽命非有擅威作福如唐之藩鎮也蠻夷畏威非有飛揚跋扈不可制者也而天災仍重宜必有在臣知不足以知天變言不足以中民病願陛下財察之夫豈刑政有不中歟讒慝苛虐之吏或未逐歟隂邪之人用歟亦其臣有所不稱歟不然何災傷之如此也左右皆曰禍福數也為此言者非偷則諛今人君之事天猶人臣之事君其君有所與則附之有所惡則畏之威福之至皆以為命焉則人事幾廢矣書曰洚水警豫又曰王司敬民此先王所以恐懼修省之意陛下察之五經之學皆陛下所自得亦何庸臣言哉明州通判梁燾以久旱上書論時政曰陛下日者閔雨靖惟政事之闕愓然自責丁卯發詔癸酉而雨是上天顧聽陛下之德言而喜其有及民之意也當四方仰雨十月之久民刻於新法嗷嗷如焦而京師尤甚闤闠細民罔不失職智愚相視日有大變之憂陛下既惠以詔音又施之行事講除刻文蠲損緡算一日之間歡聲四起距誕節三日而膏澤降是天以雨壽陛下之萬年感聖心於大寤有以還其仁政也然法令乖戻為毒於民者所變才能萬一人心之不解故天意亦未釋而雨不再施陛下亦以此為戒而夙夜慮之乎今陛下之所知者市易事耳法之為害豈特此耶曰青苖錢也助役錢也方田也保甲也淤田也兼是數者而天下之民被其害青苖之錢未及償而責以免役免役之錢未暇入而重以淤田淤田方下而復有方田方田未息而迫以保甲是徒擾百姓使不得少休於聖澤其為害之實雖一有言之者必以下主吏主吏妄報以無是則從而信之恬不復問而反坐言者雖間遣使循行而茍且寵祿巧為妄誕成就其事至請遍行其法上下相隱習以成風臣謂天下之患不患禍亂之不可去患朋黨蔽蒙之俗成使上不得聞所當聞故政日以敝而禍亂卒至也陛下可不深思其故乎哲宗元祐元年梁燾為右諫議大夫上奏曰臣竊聞華州奏鄭縣界小敷谷山摧損覆居民者臣按春秋傳曰國主山川故山川之變聖人以為至戒而深懼然變之來也或考之人事而相符或稽諸君德而不類要之皆有天意顧世主所以應天意者何如耳應之得其道則轉禍而為福失其道則反安而為危詩曰百川沸騰山冡崒崩髙岸為谷深谷為陵此人事相符之變也然幽王曽不以為恤故詩人哀之曰胡憯莫懲書曰湯湯洪水方割蕩蕩懷山襄陵浩浩滔天此君德不類之變也然帝堯自以為戒故命禹之辭曰洚水警豫臣竊伏思陛下即位以來尊用耆哲登崇雋良納天下之善常若不及革天下之弊惟恐不至以百姓之心為心撫而念之不啻父母之於赤子也四海內外物情人意和樂而舒徐巍乎太平之象矣宜乎美祥嘉瑞交至而迭應今反有山摧之異者何也臣見天心之仁愛陛下欲以篤佑聖治日新又新以盛無疆之休故於未然深示警告願陛下仰思天心而內自勵曰豫臨兆民固凛凛乎無不懼矣豈尚有言動之際忽而不恭者乎公言直道固無間而上下交矣豈尚有詖辭邪説反易是非汨吾之明者乎正人君子固並進而朝廷清矣豈尚有不肖渾淆其間亂吾之真者乎天下固安矣豈尚有宿蠧深弊逺而難燭隱而不知或欲改而復存或已除而又作動人之憂者乎四疆固靜矣豈尚有惜虛名而甘實弊以養後患未為至計者乎爵賞不為不謹也姑息以害公僭差而紊正者一能絶歟刑賞不為不平也當罪而縱宜直而枉者有不察歟政令不為不明也煩而寡要輊出而易反以惑民之聽者審於思歟力役不為不省也用而不切偏而弗均者究之至歟郡邑之治不為不飭也任非其人遏王澤而不流病吾民者知之盡歟仰願陛下因天之戒凡此類者益加意焉臣愚不勝惓惓昔梁山崩晉侯以傳召伯宗伯宗以重人之言告而晉侯從之以自責春秋賢之夫晉侯列國之君而梁山一國之望耳其變也猶能亟召賢者而謀之況陛下有天下之大華山又五嶽之崇乎其可不畏天之威思所以應其變也伏惟陛下鑒周之失體堯之言采晉之善博資賢人之謀修飭政事以答天戒社稷幸甚天下幸甚六年燾知鄭州上奏曰臣聞日者衆陽之長人君之象也以清明博照為德而不容蔽虧侵掩之為患一有此變則君德傷矣乃今春以來蒙濁霧翳不見清明之景者跨六十日間得一仰暘潔則欣欣然物榮而人喜今又食于五月之朔為變亦已甚矣詩曰彼月而食則維其常此日而食于何不臧傳曰月食非常也比之日食猶為常也日食則不善矣惡其主君之占非太平之象也臣竊為陛下憂之亦以為陛下之賀也自古衰亂之國必有日食星辰之變而日食為之最此臣所以憂也自古明昌之君逢災遇變飭躬寅畏應天以誠終回咎謫不損為聖此臣所以賀也恭惟陛下以上帝眷命早有天下並明文母臨制四方退託謙恭無所專斷言動中禮不聞過舉何其天鑒昭昭示戒如警失道敗度之君甚可畏也或者陛下以盛妙之年居崇髙富貴之位養心之道猶未加焉故天心垂以譴告欲陛下飭躬寅畏應之以誠則除災而集福矣臣願陛下思所以銷變之理而上恱天心夫銷變之道莫如修德修德之要莫如進學進學之敏莫如專志志專於為善則氣定性復聰明日開真積力久為聖益聖夫如是可以迎天地之貺揚祖宗之休災害不生禍亂不作淡然髙拱坐擁吉隆之符矣董仲舒有言曰天之仁愛人君欲止其亂自非大亡道之世天盡欲扶持而全安之事在強勉而已強勉學問則聞見博而智益明強勉行道則德日起而大有功此皆可使還至而有效者也詩曰夙夜匪懈書曰懋哉懋哉皆強勉之謂也陛下以堯舜之資聖敬日躋加以好學之志當為太平有道之主天之顧諟感應純佑豈止仲舒之所稱者亦在陛下勉之不懈而已夫帝王之學當知其大者逺者不在辨章析句總攬纎微葳蕤文章滂沛議論屑屑若儒臣之為也所謂逺大者豈無要耶臣謹獻其略夫明主可以靈承上帝者莫如敬臣願陛下事天以敬明主可以得四海之歡心者莫如孝臣願陛下奉親以孝使羣臣之喜樂盡忠者莫如信臣願陛下御臣以信使百姓之家給人足者莫如仁臣願陛下養民以仁使政事惟醇不令而行者莫如勤儉臣願陛下治已以勤儉使左右安寧中外附豫者莫如寬宏臣願陛下容下以寬宏敬天之事蓋多端也非學無以究至誠之實孝親之事蓋多端也非學無以盡愛敬之力信臣之事蓋多端也非學無以辨邪正之情仁民之事蓋多端也非學無以逹富夀之術勤儉之事蓋多端也非學無以適中道之用寬宏之事蓋多端也非學無以識敦大之體惟其進學則盡之矣伏惟陛下屏逺聲色親近書史宫中清燕日深記誦退朝之餘經筵之外間召講讀侍臣咨訪講議不必務求多速常使日力有餘暇而致精樂而忘倦日就月將自成廣博克勤于學則德明而君道強不勤于學則德微而君道弱君道之弱雖無災異足為懼畏君道之強雖有災異可以銷伏陛下誠能存畏天之心發進學之志天心聽之恱然降福蒙濁之咎終無辰月之驗薄食之變必有雲雨之應精意所感吉符是隨上寬太母憂勞保護之慈下副中外欣戴瞻望之願享國永年比隆仁祖此宗社之慶臣民之幸也臣天與朴忠向亦自竭今不敢以在外踈逺少怠愛君之誠狂直之言惟陛下財赦元祐二年右司諫王覿上奏曰臣聞書曰惟吉凶不僣在人惟天降災祥在德夫人君之德配乎天地而協乎隂陽者也故災祥之來皆隨其德古之人君每見災異則退而自省以修德焉乃可以變災為祥轉禍為福伏見去嵗以來旱災屢作今春涉夏亢陽尤甚陛下焦勞惻怛精意祈禱靡神不舉而又傾倉廪之積以賑飢省土木之工以寬役親録囚徒赦過宥罪宜可以致雨矣而雨猶未也然則天意亦必有在矣謹按洪範之五事一曰貌貌曰恭恭作肅見於休徴則曰肅時雨若也夫人君外既有恭莊以著於貌內必有肅欽以生於心然後施於政事一皆主於肅欽則百官羣吏四方萬里莫敢不肅而天應之以時雨此天人相與之際如影響也恭惟陛下春夏以來凡可以致雨者無所不講而雨猶未應意者肅欽之道或有所未備乎陛下起居語默多在深宫之中非愚臣所得而見其見於政事者臣得以言之也夫中都之官雍容養望者多而紀綱浸隳諸司之吏驕慢玩法者衆而鞭笞罕及此京師官吏之不肅也監司妄意朝廷厭於督責者以茍簡為適時郡縣妄意朝廷主於寬大者以縱弛為得計此監司郡縣之不肅也國之凶人可誅竄以明國之刑者或沮格於大臣之言民之巨蠹可黜削以釋民之怨者或稽留於典吏之手此刑罰之不肅也令出惟行弗惟反今發號出令或數日而追或纍月而變者此號令之不肅也廣西新州之役以兵將邀功無事受戮者千餘人逺方之民銜寃無訴矣而久不正其罪此軍政之不肅也河北塘泊之險以大河橫流漲為平陸者數百里敵騎之來將通行而無礙矣而莫有任其責者此邊吏之不肅也凡政事之不肅者類如此而求所謂時雨順之不亦難哉夫仁恩豈不可致雨而肅欽乃可以致雨者何耶蓋肅然後仁恩可行也朝廷不肅則小人肆而下有受其弊者矣政事不肅則萬事隳而民不保其生矣夫如是且將亂之不暇尚何仁恩之有況可以感天心而致雨乎惟肅欽然後政事修而仁恩行乃所以致雨之道也然則言動之不可以不肅者臣願躬行之政事之不可以不肅者臣願深圖之庶幾乎雨可致也三年御史中丞蘇轍乞罷五月朔朝會劄子曰臣伏見去冬無雪今嵗春夏時雨絶少二麥不收秋種未入旱勢闊逺嵗事可慮伏惟皇帝陛下聖心焦勞禱請備至發倉粟留上供米以救飢饉茍可利民無所愛惜而天意未回旱氣日甚臣實憂之竊惟古之明君遇災恐懼內既竭其誠心嗇用勸分以濟民厄外必避殿減膳廣求直言以答天意今二聖既勤其內而外事未修五月之旦將御文德朝羣臣臣恐九重之祕憂懼之實民莫得知徒見陛下晏然坐朝臨御大衆民愚無知或謂陛下不畏天災不恤民瘼人心一疑天意弗順以此救旱所損大矣臣愚伏願陛下舉行祖宗故事明詔有司罷朔會避正殿損常膳令百官吏民皆得上封事指陳時政闕失如此施行雖未得雨而人知陛下寅畏天戒不吝改過羣情恱服神亦將助以此救旱非小補也近日執政大臣雖曽奏乞解罷職任以答天變而所請未力無益於事今若陛下既自引咎則大臣勢難獨止雖未可遽從若且例降一官俟得雨而復君臣協心災庶可止臣備位禁林心有所見不敢緘默或加采納乞不出臣此章只作聖意行下於體尤便轍為户部侍郎論隂雪劄子曰臣伏見自去冬至今隂雪繼作罷民凍餒困斃道路聖心憂勞何所不至蓋嘗命有司發內庫之錢出司農之粟竭大府之炭以濟其急矣猶以為未也則釋犴獄罷夫役凡可以惠民之事無不為矣而天意不順雨雪如故臣竊惑之臣嘗觀先儒論五行之説以為聽之不聰是謂不謀厥咎急厥罰常寒故周之末世舒緩微弱政在臣下則天應之以燠暖秦之末世峻刑暴斂海內重足而立則天應之以寒栗是以周亡無寒歲秦滅無燠年信如此言則朝廷之政今豈失於急歟竊惟二聖臨御以來革敝去煩施惠已責凡所措置雖未盡得而民獲其所欲者多矣茍以為急雖三尺童子不信也然則隂雪之應其咎安在臣聞商髙宗雉雊於鼎其臣祖已告之曰惟先格王正厥事夫所謂正厥事者無常事也惟因其非而正之耳故臣竊推之古事以為天大雷電以風而成王應之以逆周公衛國大旱而文公應之以伐邢夫親任三公非所以止風而興師伐人非所以致雨彼既為之不疑而天亦報之如響者誠得其時當其事耳臣竊惟近者天地之變常半歲苦旱半歲苦隂隂陽之氣一有過差浸淫爛熳而不能反今雨雪既甚久而不止則春夏之際又將復旱此其類似有以致之者古之為政德刑並用寬猛相濟使天下懷其惠而畏其威民氣充塞而天地從之故陽不過而隂不忒自頃以來朝廷之政專以容恱為先務上下觀望化而為一監司之臣以不執有罪為賢郡縣之官以寬弛租賦縱釋酒稅為優至於省臺寺監亦未聞有正身治事以辦集聞者也何者朝廷方兼容是非以不事事為安靜以不别白黑為寬大是以至此極也臣竊惟朝廷之意其始蓋欲以寬治民耳而不知姦臣猾吏乘其間以侵虐細民其弊不可勝數名雖近寬而其實則虐也陛下誠欲消復此變宜訓敕大臣使之守法度立綱紀信賞必罰使群下凜然知有所畏茍朝廷無偏甚不舉之政則隂陽過差浸淫爛熳往而不反之氣宜可得而止也不然雖空府庫竭倉廪以賑貧窮破囹圄焚鞭朴以縱罪戾臣恐天地之意未易回也臣待罪地官以簿書米鹽為職出位而言罪在不赦然陛下頃自踈外擢臣而用之二年之間致位於此豈欲責臣齪齪以吏事自效而已哉是以冒萬死獻言惟陛下裁擇四年御史中丞李常上奏曰臣聞漢䇿曰善言天者必有證於人善言古者必有驗於今臣學荒識淺智慮不明豈足以知天烏足以考古又況所謂善言者耶雖然誦詩書之文服師友之訓稽夫往昔驗諸當今以觀天人之際若有可以言者輒妄陳一二干鈇鉞之誅惟陛下裁擇臣伏見今歲已來日色無光雷不時震怒風屢發甘澤弗降上天示變殆非偶然質之前書甚可畏也易曰垂象著明莫大乎日日者君象也照臨下土暉曜所燭無有不及不容有所掩翳而光烈弗舒者也震迅以時發揚隱伏者雷也刑威之象也不容於發生之辰寂然收聲使人無所懼憚也鼓動萬物幽微必逹者風也號令之象也不容狂怒輒發蕩然無時以抑止甘雨者也雨之所及膏潤悅懌長養嘉穀惠澤之象也不容更越時序枯稿百生若無意於哀矜者也臣自不雨以來博行訪問雨澤愆少唯王畿獨甚雖請禱備至而嘉應未臻沉隂欲雨輒復隨起霡霂微潤尋復收霽天其或者將以此警懼陛下乎且古之聖王不以災譴為患患政刑有所不至耳茍能恐懼省察修明政刑而災譴不弭者未之有也臣夙夜伏思陛下臨御以來發政施仁莫不本之先王法乎至德唯恐一物或失其所聽言納善從之如流惟恐設施未當害及元元宜乎和氣感召風雨順理以佐百穀以寬疲瘵矣又自闕雨至今陛下焦勞惻怛憂形言色奔走幣祝致誠乎天地山川及羣小祀親臨軒陛以寬牢獄命官四出以察寃滯然而終未獲應者將政令之大者有所未盡歟先儒謂心和則氣和氣和則形和形和則聲和聲和則天地之和應矣臣伏見今日政令之最大而設施未安致人情不和者役法是也役法之大溥及四海窮邊逺徼山農野叟無不繫其利害休戚今自改更以來日見未便户部雖巧為損益以求可行猶朽木糞牆本根不善終不能必當四海之人形聲靡和嗸嗸莫訴而陛下曽未之察也執政大臣曽未之恤也觀望百執事鉗口奉行曽未之告也然則陛下之明有所蔽而不遍照乎四國矣威刑見玩而有所拂矣號令差忒而設施失當矣德澤不及乎黔黎而欲時雨之應期何可得耶臣請詳言力役之為平民患差與雇利病重輕之不同夫耕農之人儻身常在野而不見官府入城市天下之情所同願也自租庸調法廢版籍不明差役寖弊國朝因仍前代雖加損益不免就版籍隨重輕等第差科然破家産廢農業非一日之積矣熙寧中講知差法之弊天下州鎮凡因色役害民之事例皆裁減如衙前主管厨庫承符散從手力充場庫子接送之類也就其不可減者悉使召而賦錢平民平民隨力出錢無事於公家遂得以身常在野不見官府入城市孰便於是耶雖然方是時奉令之臣取民過多務於贏積遂有輸錢不逮之歎農民愈貧之憂而不聞其免徭役而事農業於家為病也陛下即位之初采納羣言念歲歲輸錢為非農人之事又不供力役以為非古遂一切罷之復行差法方詔旨初下愚民未知被差之為害臣於是時亦不能盡知如此四逺之人蓋嘗呼而相慶矣行之既久始覺其患有加於嚮日何也蓋差法之廢十有餘年版籍愈更不明宜重役者輒輕宜輕役者反重交相糾決獄訟紛然因緣為姦公行賕賄鄉寬户多者僅有休息之期鄉狹户窄者頻年在役況今無限田之制上等極力之人昔輸錢有歲百貫者今止差為弓手歲雇弓手一名以代身役不過用錢三四十貫中下人户舊出錢不過三貫至二貫而雇承符散從手力之類不下三十貫以是校之勞逸苦樂殊為不均至相倍蓗矣然則今所改法徒能使上等人户優便安間而第三第四等困苦日甚詩云哿矣富人哀此惸獨正謂是也昔臣待罪户部嘗獻議曰法無新陳便民者良法也論無彼已可久者確論也既而典司邦憲亦屢以此干冒聖聰有司收格曽莫之省以臣料之人情豈甚相逺哉不過謂業已施行憚於改易殊不知茫茫四國仰訴無由蚩蚩微命相顧受敝聚為不和之氣上動天鑒豈國家之盛事耶臣前所奏尚欲令富者輸錢貧者出力折衷二法而為書今也博訪輿言詳究民瘼在上者既無寬剩之求則下户皆願出錢矣而又四方風俗或不同利害或不一當差而願雇者有之誠能使四方隨俗以為法不以一偏之好惡示四方官吏不得觀上所好惡而講法其歸主於寬民便俗上下均一無有偏重而已今示以一偏之意而為法使四海沸騰細民窮困朝廷晏然不知慮卿士大夫畏忌不敢言況希合之人為監司與夫守令哉持之不以介諸懷使陛下致天怒於上人怨於下豈國家社稷計耶臣謬司典憲陛下許其察利害言得失復有所顧避而不言則臣上負朝廷下孤百姓罪不容誅矣伏望聖慈察天意之甚微特詔一二詳練民事臣寮使與賤臣就差雇二法取便百姓者修正之無牽新書無執舊説吾民以為善矣庶乎災變可消和氣可格天下幸甚天下幸甚劉安世為愆亢乞徹樂損膳精誠祈禱狀曰臣伏見去冬以來頗愆時雪今春踰月驕亢愈甚詢之四方率多旱暵二麥已損洊飢可憂然而南畝之間苖未至稿近日得雨猶有可救方二聖子育黎庶垂意民事謂宜責躬修政以召和氣而禱祀之禮有所未舉賑救之目有所未行臣雖甚愚竊以為過昔堯有九年之水湯遇七年之旱而國無捐瘠之民者蓋備之有素而已宣王遇災而懼側身修行欲銷去之故雲漢之詩曰不殄禋祀自郊徂宫上下奠瘞靡神不宗此前代聖帝明王所行之事陛下之所宜取法也伏望聖慈祗畏天變徹樂損膳精誠祈禱明敕大臣講求闕政申命中外審決留獄諸路監司謹視所部凶荒州縣廣為賑濟之備或官廪有不充之處仍令勸誘富民納粟以助公上擇其尤者寵以間官不急工役悉俾停罷庶幾人神和恱早致膏澤事有備豫民無流散安世又乞舉禋祀荒政及求言恤刑狀曰臣近以時雨愆候旱勢闊逺嘗進狂瞽粗陳銷復之理又舉前代聖帝明王側身修行救災備患之事條列以聞乞賜採擇今已纍日未覩施行臣聞田家之言以謂三冬得雪而中春無雨則猶不免於歲歉今內自畿縣外逮諸路率皆旱暵二麥已損嗸嗸下民將罹飢饉凡可以為之救助者安可緩也臣聞聖王為國必有九年之蓄故雖遇旱乾水溢之災民無菜色今歲一不登人且狼顧若有司不度事勢拘執故常必俟春夏之交方行祈禱之禮民已艱食旋為賑貸之計所謂大寒而後索衣裘亦無及矣伏望聖慈特垂軫惻禋祀之典救荒之政先事而講不必待時責躬求言恤刑省役庶召和氣以致膏澤安世為右正言上奏曰臣伏見陛下即位以來于今五載承天順地仁民愛物德澤洋溢施乎方外元元鼓舞歌頌不暇固宜隂陽順序風雨時若諸福協應百嘉蕃昌而歲比不登和氣湮鬱飢饉流徙災害頗衆今春及夏旱暵為虐京畿西路二麥失望農民嗷嗷且有菜色雖陛下惻然軫念靡神不宗踈決繫囚降從寬典而沛然之澤終未告足又陜西河北屢聞地震大星晝隕其光燭地旬月之間巨異仍出臣聞天人之際精祲有以相蕩善惡有以相推事作乎下象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者暗水旱之災隨類而至此皆天心之仁愛人君而先出災異譴告警懼使之兢慎修省而不至失道之敗也臣竊謂上天之體雖髙而聽卑明主所應惡文而尚實與其為祈禳之小數不若圖銷復之大方臣願陛下夙夜祗畏側身修行特下明詔以示罪已又許中外臣民極言政事之闕失專委近臣考求其當以施有政庶幾下情不至壅塞其諸路災傷州縣流民所至並委守令多方賑濟無俾捐瘠申敕緣邊帥臣及捕盜官吏常切警備以戒不虞今日已前內外營造土木之役茍非要切並乞停罷分命監司按視留獄公卿輔弼同寅協恭以思天變開衆正之路塞羣枉之門誠備災之善經應變之至務也昔宋景公小國之諸侯爾有不忍移禍之誠出人君之言三熒惑為之退舍陛下之明聖發於誠心精意感通何求弗獲臣待罪諫列日聞焦勞輒效愚忠庶禆萬一惟冀聖慈少賜採納不勝幸甚中書舍人曽肇上奏曰臣伏見去年諸路災歉京西陜西人至相食冬間屢得嘉雪粟麥甚茂飢民嗷嗷待此以濟而雨不時應旱氣已盛麥苖萎黃勢將稿死雖有收成之處所得固已無多若飢饉洊臻公私受弊有不可言者此正君臣側身畏懼憂恤百姓之時而恬然莫以為意此非臣之所諭也皇帝陛下太皇太后陛下畏天愛民海內所知豈忍生靈轉徙溝壑恐是上下蒙蔽茍寬聖心但云雨澤小愆未至害事九重深逺何由盡知臣等承乏從官不敢雷同隱默敢效小補仰禆萬一伏見已定今月十七日春宴臣愚竊謂天災方作民食未充乃於此時君臣相與飲食燕樂恐無以消伏天災導迎和氣伏望特賜德音為罷春宴使百姓咸知陛下之意人心既恱天意亦順必有膏澤應聲而至猶足以救垂死之苖獲豐登之望蓋輟一日之適而成終歲之功在於聖心宜無難者唯留神無忽天下幸甚厯代名臣奏議卷三百三
