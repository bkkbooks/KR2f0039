body:
  text: 歴代名臣奏議巻二十一明楊士竒等撰郊廟宋神宗時傅堯俞出知昇州陛辭上殿劄子曰臣忝經任使逮事昭陵㳟惟仁宗皇帝享國四十餘年纔五十餘嵗以神器大寳付畀先皇雖大統不屬必歸傍宗而雅意所存早在英廟追念恩徳豈有量哉陛下孝誠貫徹天地所以論報之心無不至者然臣猶有區區欲效塵露望陛下赦其迂愚而採其悃愊則不勝大願臣聞諸禮經有廟祏之制祖功宗徳皆萬世不祧竊惟仁宗可謂至徳陛下聖文天縱過絶古今願因閒宴奮揚神筆霈為徳音深詔執事俾仁廟一室與藝祖太宗並為百代不遷之主既以宣示子孫又以感通上下天人交歡必有祥應前嵗陛下手詔中書門下考太祖之籍取屬近而行尊者一人裂地而王之且許其世世勿復絶也當是時天下聞者莫不感咽抃蹈以懐陛下之仁如親被大賜陛下誠能取臣之言一告中外如士民不鼓舞感抃者臣不敢辭罔上之誅經曰聖人感人心而天下和平乞略留聖意太常禮院主簿楊傑上禘祫合正位序議曰中書劄子奉聖㫖修定太廟祀儀續准近制奉僖祖為太廟始祖所以禘祫神主合正位序檢㑹禘祫舊儀於殿室外設昭穆之位僖祖翼祖太祖太宗仁宗及諸室后主共四十位俱南嚮順祖宣祖真宗英宗及諸室后主共十位俱北嚮所有禮樂之器多陳設於堂之上下而皆在北嚮神主之後質之典禮參以人情竊恐未順謹按禮記周禮經傳及爾雅通典禘祫志三禮義宗所載禘祫昭穆蓋有室中堂上之别古者宗廟異宫各有堂室户近東祏主在西其在始祖后稷廟室則后稷東向其為昭者皆南向其為穆者皆北向在太祖文王廟室文王東向以率先王之穆穆皆北向在太宗武王廟室則武王東向以率先王之昭昭皆南向各就其室祼酌饋獻此所謂室中之位也及其迎之出户射牲燔燎朝事朝踐則后稷文王武王皆南向先王先公其為昭者皆西向其為穆者皆東向此所謂堂上之位也遇祫祭則先王先公合食于后稷之廟傑又奏請四皇后廟升祔狀曰臣先曽上言伏為皇后廟四室第一室孝惠皇后賀氏第二室孝章皇后宋氏第三室淑徳皇后尹氏第四室章懐皇后潘氏孝惠皇后太祖首納之后也淑徳皇后太宗首納之后也章懐皇后真宗首納之后也並遇初潜嬪于帝室正位乎内王化所基生享禮封後行追冊孝章皇后在太宗之朝已母儀天下及太宗即位號曰開寳皇后以上四后順徳徽音見於彤史奉安别廟薦享有常升祔之儀久而未講每遇禘祫則遷神主設席於太廟本位帝王后主之次雖云合食其實異牢禮意人情有所未盡或者以謂孝恵淑徳章懐三后生無尊稱殁加盛禮難以升祔太廟臣謹按國朝㑹要禮閣新編所載懿徳皇后符氏開寳八年崩亦在太宗登極之前至太平興國三年方行追冊今已升祔太宗廟室況又孝章皇后在太祖之朝已正中壼而母儀天下乎伏請比用懿徳皇后禮例升孝恵皇后孝章皇后祔于太祖皇帝廟室升章懐皇后祔于真宗皇帝廟室所貴嚴升配正始人倫推廣孝思風化天下奏入已久未䝉付外施行今伏見慈聖光獻太皇太后上僊山陵有日陛下以嫡孫號慕過哀外示易月之文而實遵三年之制謂園陵有所謙抑故隆以因山謂謚法未足形容故増以四字權宜祥禫之服却而不御公卿羣臣表章七上而始得瞻望更朝又表章五上然後勉從正殿之請每降手詔發揚太皇太后仁聖功業莫不出於至誠感動天地自載籍以來天子孝徳未有過於今日也將來九虞禮畢則崇配于仁宗廟室臣愚不避誅殛再敢上浼天聽伏乞陛下擴充不匱之心等而上之至于祖宗后廟因慈聖光獻崇配之日升孝恵孝章淑徳章懐四后神主祔于太祖太宗真宗祏室斷天下之大疑正宗廟之大法以垂永久不勝至願其升祔昭穆准淳化元年勅宜依舊懿徳皇后在淑徳皇后之上又咸平三年勅孝章皇后宜在孝恵皇后之下又祥符五年勅禘祫之日孝恵孝章淑徳三皇后神主祔饗於太祖太宗本室次於正主又祥符六年言者請以元徳皇后神主升祔在懿徳皇后之上真宗詔曰載念尊親蓋惟極致在乎陟降非敢措辭惟以祔廟之嵗時用為合享之次序宜㳟以元徳皇后神主祔于明徳皇后之次至慶歴五年言者請以章懿皇后序於章穆章獻皇后之上仁宗詔曰祇覽祥符之詔深原文考之㫖極意尊親之際重形陟降之辭故以祔廟之嵗時用為合享之次序義無差别情無輕重㳟依禮官所議奉章獻皇后章懿皇后序於章穆之次是致慶歴祀儀凡行禘祫皇后廟神主並設席於太廟本位帝王后主之次永萬世不易之典也如䝉允臣所請其升祔昭穆即乞依三朝詔㫖及慶歴祀儀熈寜祀儀施行謹具奏聞哲宗元祐元年右正言朱光庭論配帝及從祀之神奏曰臣謹按周頌我將祀文王於明堂也我將我享維羊維牛維天其右之孝經曰孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝臣詳二經之文皆為明堂而言也在我將之頌言天而不言上帝孝經稱嚴父莫大於配天又曰配上帝又按郊特牲曰萬物本天人本乎祖禮所以配上帝也郊之祭也大報本反始也由是言之則天之與上帝一也推本始而祭之則冬至萬物之始也故於是日祀天尊祖以配之推成功而祭之則季秋萬物之成也故於是月祀上帝嚴父以配之祖配本始之祭而父配成功之祭其理然也自漢以來論明堂者衆矣臣竊究周頌孝經郊特牲之文天之與上帝既一則從祀之神不當有異緣郊與明堂皆三年一大祭也但内外配祖考為異爾又大司樂曰樂六變則天神皆降則從祀之神固無疑矣臣伏請將來九月宗祀神宗皇帝于明堂以配上帝天神宜悉從祀不惟正大享之禮蓋以隆配父之道也伏望朝廷因此大祀特下有司考正以為萬世法六月朝奉郎試中書舍人蘇軾同孫永李常韓忠彦王存鄧温伯劉摯陸佃傅堯俞趙瞻趙彦若崔台符王克臣謝景温胡宗愈孫覺范百禄鮮于侁梁燾顧臨何洵直孔文仲范祖禹辛公祐吕希純周秩顔復江公著狀奏近准敕節文中書省尚書省送到禮部狀本部勘㑹英宗配享功臣係神主祔廟後降敕以韓琦曽公亮配享所有神宗皇帝神主祔廟所議配享功臣今乞待制以上及秘書省長貳著作與禮部郎官并太常寺博士以上同議奉聖㫖依右臣等謹按商書兹予大享于先王爾祖其從與享之周官凡有功者名書于王之太常祭于大烝司勲詔之國朝祖宗以來皆以名臣侑食清廟歴選勲徳實難其人神宗皇帝以上聖之資恢累聖之業尊禮故老共圖大治輔相之臣有若司徒贈太尉謚文忠富弼秉心直諒操術閎逺歴事三世計安宗社熈寜訪落眷遇特隆匪躬正色進退以道愛君之志雖沒不忘以配享神宗皇帝廟庭實為宜稱七年十一月龍圖閣學士蘇軾上奏曰臣謹按漢成帝郊祠甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其畧曰想西王母欣然而上夀兮屏玉女而却虙妃言婦女不當與齋祠之間也臣今備位夏官職在鹵簿准故事郊祀既成乗輿還齋宫改服通天冠絳紗袍教坊鈞容作樂還内然後后妃之屬中道迎謁已非典禮而況方當祀事未畢而中宫掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴㳟寅畏度越古今四方來觀莫不恱服今車駕方宿齋太廟而内中車子不避仗衛争道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行八年軾為端明殿學士又上奏曰臣伏見九月二十二日詔書節文俟郊禮畢集官詳議祠皇地祇事及郊祀之嵗廟饗典禮聞奏者臣㳟覩陛下近者至日親祀郊廟神祇饗荅實䝉休應然則圜丘合祭允當天地之心不宜復有改更臣竊惟議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然冬至南郊既祀上帝則天地百神莫不從也古者秋分夕月於西郊亦可謂隂位矣至於從祀上帝則以冬至而祀月於南郊議者不以為疑今皇地祇亦從上帝而合祭於圓丘獨以為不可則過矣書曰肆類于上帝禋于六宗望於山川徧于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祇豈有此理哉武王克商庚戍柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之别也而獨畧地祇豈有此理哉臣以知古者祀上帝則并祀地祇矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祀而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天有成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之終篇言天而不及地頌所以告神明也未有歌其所不祭祭其所不歌也今祭地於北郊歌天而不歌地豈有此理也臣以此知周之世祀上帝則地祇在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也春秋書不郊猶三望左氏傳曰望郊之細也説者曰三望太山河海或曰淮海也又或曰分野之星及山川也魯諸侯也故郊之細及其分野山川而已周有天下則郊之細獨不及五嶽四瀆乎嶽瀆猶得從祀而地祇獨不得合祭乎秦燔詩書經籍散亡學者各以意推類而已王鄭賈服之流未必皆得其真臣以詩書春秋考之則天地合祭久矣議者乃謂合祭天地始於王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽為圓壇八陛中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又按水經注伊水東北至洛陽縣圜丘東大魏郊天之所準漢故事為圓壇八陛中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事於南郊賈曽議曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀郊之與廟皆有禘於廟則祖宗合食於太祖禘於郊則地祇羣望皆合於圜丘以始祖配享蓋有事祭非常祀也三輔故事祭于圜丘上帝后土位皆南面則漢嘗合祭矣時褚無量郭山惲等皆以曽言為然明皇天寳元年二月敕曰凡所祠享必在躬親朕不親祭禮將有闕其皇地祇宜如南郊合祭是月二十日合祭天地于南郊自後有事於圜丘皆合祭此則唐世合祭天地之明驗也今議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之别古者一嵗祀天者三明堂饗帝者一四時迎氣者五祭地者二饗宗廟者四凡此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先饗宗廟並祀天地自真宗以來三嵗一郊必先有事景靈徧饗太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗行之不以為難今之禮親祭如此其少而三嵗一行不以為易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之内朝諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里唯以齊祭禮樂為政事能守此則天下服矣是故嵗嵗行之率以為常至於後世海内為一四方萬里皆聽命於上機務之繁億萬倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至于今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得䕃補親屬非周禮也自宰相宗室以下至於百官皆有賜賚非周禮也此皆不改而獨於地祇則曰周禮不當祭於圜丘此何義也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何為不可祭乎臣將應之曰舜一嵗而廵四嶽五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二嵗一廵者唯不能如舜也夫周已不能行舜之禮而謂今可以行周之禮乎天之寒暑雖同而禮之繁簡則異是以有虞氏之禮夏商有所不能行夏商之禮周有所不能用時不同故也宣王以六月出師驅逐玁狁蓋非得已且吉甫為將王不親行也今欲定一代之禮為三嵗常行之法豈可以六月出師為比乎議者必又曰夏至不能行禮則遣官攝祭祀亦有故事此非臣之所知也周禮大宗伯若王不與則攝位鄭氏注曰王有故則代行其祭事賈公彦疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也後世人主不能嵗嵗親祭故命有司行事其所從來乆矣若親郊之嵗遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一嵗可以再郊臣將應之曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乗大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏也事天則備事地則簡是於父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞猶不能嵗嵗親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑蔵猶恐不足郊賚之外豈可復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊已為疏濶若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壊欲復古而背古益逺神祇必不顧饗非所以為禮也議者必又曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者為欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權耶若變禮從權而可則合祭圜丘何獨不可十月親祭地十一月親祭天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之嵗以夏至祀地祇於方澤上不親郊而通爟火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境内而不在四郊者故逺望而祭也今所在之處俛則見地而云望祭是為京師不見地乎此六議者合祭可否之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圜丘方澤皆親祭之為是也蓋以時不可行是故參酌古今上合典禮下合時宜較其所得已多於漢唐矣天地宗廟之祭皆當嵗徧今不能嵗徧是故徧於三年當郊之嵗又不能於一嵗之中再舉大禮是故徧於三日此皆不能親往二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當行郊地之嵗而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行議者不過欲於當郊之嵗祀天地宗廟分而為三耳分而為三有三不可夏至之日不可以動大衆舉大禮一也軍賞不可復加二也自有國以來天地宗廟唯饗此祭累聖相承唯用此禮乃神祇所歆祖宗所安不可輕動動之則有吉凶􅍔福不可不慮三也凡此三者臣熟計之無一可行之理伏請從舊為便昔西漢之衰元帝納貢禹之言毁宗廟成帝用丞相衡之議改郊位皆有殃咎著於史䇿往鑒甚明可為寒心伏望陛下詳覽臣此章則知合祭天地乃是古今正禮本非權宜不獨初郊之嵗所當施行實為無窮不刋之典願陛下謹守太祖建隆神宗熈寜之禮無更改易郊廟饗以億寜上下神祇仍乞下臣此章付有司集議如有異論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可但執更不論當今可與不可施行所貴嚴祀大典以時定貼黄唐制將有事於南郊則先朝獻太清宫朝享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹按武王克商丁未祀周廟庚戍柴望相去三日則先廟後郊亦三代之禮也奉聖㫖令集議官集議聞奏元祐元年禮部言元豐所服大裘雖用黒羔皮乃作短袍様襲於衮衣之下仍與衮服同冕未合典禮下禮部太常寺共議禮部員外郎何洵直言陸佃所議有司疑者八按周禮節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人既云衮冕又云裘冕是衮與裘各有冕乃云裘與衮同冕當以衮襲之裘既無冕又襲於衮中裘而表衮何以示裘衮之别哉古人雖質不應以裘為夏服蓋冬用大裘當暑則用同色繒為之記曰郊祭之日王被衮以象天若謂裘上被衮以被為襲則家語亦有被裘象天之文諸儒或言臨燔柴脱衮冕著大裘或云脱裘服衮蓋裘衮無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者記曰大裘不裼説者曰無别衣以裼之蓋它服之裘䙝故表裘不入公門事天以報本復始故露質見素不為表襮而冕亦無旒何必假他衣以藩飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上重二衣也大裘本不裼鄭志乃云裘上有𤣥衣與裘同色蓋趙商之徒附㑹為説不與經合襲之為義本出於重沓非一衣也古者齋祭異冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服衮冕是衮冕者祀天之齋服也唐開元及開寳禮始以衮冕為齋服裘冕為祭服兼與張融臨燔柴脱衮脱裘之義合請從唐制兼改製大裘以黒繒為之佃復破其説曰夫大裘而冕謂之裘冕非大裘而冕謂之衮冕則裘冕必服衮衮冕不必服裘今特言裘冕者主冬至言之周禮司裘掌為大裘以共王祀天之服則祀地不服大裘以夏日至不可服裘故也今謂大裘當暑以同色繒為之尤不經見兼賜襲一衣而已初無重沓之義被裘而覆之則曰襲袒而露裘之羙則曰裼所謂大裘不裼則非衮而何玉藻曰禮不盛服不充故不裘不裼則明不裼而襲也充羙也鄭氏謂大裘之上有𤣥衣雖不知覆裘以衮然尚知大裘不可徒服必有𤣥衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可以徒服故被以衮豈借衮以為飾哉今謂祭天用衮冕為齋服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗服衮矣雖無大裘未能盡合於禮固未嘗有表裘而祭者也且裘内服也與袍同袍䙝矣而欲襌以祭天以明示質是欲衩衣以見上帝也洵直復欲為大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所志其後詔如洵直議去黒羔皮而以黒繒製焉四年右諫議大夫范祖禹上明堂劄子曰臣伏見明堂大禮已在散齋㳟惟仁宗皇帝若稽古典斷以聖意自皇祐二年始制明堂之禮先詔有司乗輿服御務從簡儉無枉勞費御撰樂曲舞名服靴袍御崇政殿閱試雅樂如行禮之次又於禁中靴袍親書明堂及明堂之門二榜將近祀日霖雨不止仁宗禁中齋禱極於㳟䖍應禱開霽天日清潤風和氣協祀前之夕即罷警嚴仁宗每詣神座行禮畢鞠躬却行須盡褥位方改歩移嚮以示肅㳟之至又令侍臣徧諭獻官及進徹爼豆悉安徐謹嚴無怠遽失㳟質明禮畢比之他時行禮加數刻之緩御樓宣赦畢降詔中書門下止絶請託應内降恩澤及原減罪犯者不得施行仁宗欽崇禋祀布昭明徳傳之萬世大略如此英宗神宗聖孝遵承皆極嚴敬今陛下嗣位五載再舉宗祀上帝顧饗神考配侑國之大事莫重於此惟陛下内盡誠敬法則祖宗則神天降祉羣生䝉福夫齋者所以致其精明之徳孔子之所慎者齋齋必有専一精潔之誠乃可以交於神明禮之言齋曰心不茍慮必依於道手足不茍動必依於禮古之君子其齋如此齋三日必見其所祭者誠之至也夫惟致齋肅㳟然後動容周旋無不中禮書曰皇天無親克敬惟親鬼神無常享享于克誠夫皇天惟親至敬鬼神惟享至誠天人之交相去不逺惟誠與敬可以感通陛下躬行於上則百官有司莫敢不祇肅於下經曰聖人之徳無以加於孝惟陛下虔㳟祀事以教天下之孝使羣臣萬國瞻望盛徳休光臣不勝拳拳之愚祖禹又議合祭狀曰臣准尚書禮部牒親祠皇地祇三省同奉聖㫖令侍從官尚書侍郎給舍臺諫禮官集議奏聞者右臣等謹按經曰昔者明王事父孝故事天明事母孝故事地察禮曰天子祭天地祭四方祭山川祭五祀嵗徧三代之禮天子無不親事天地周禮冬日至祀天於地上之圜丘夏日至祭地於澤中之方丘自玉器牲幣樂舞皆不同由漢以來乃有合祭之文至於國朝踵為故事元豐中神宗皇帝用禮官之議詔定北郊親祀之儀始罷合祭之禮陛下嗣位於今八年將肇祀圜丘而疑於未見地祇欲循祖宗之舊則禮不經見欲如元豐之制則慮北郊或未可行故下有司博議此誠欽崇明祀慎重之至也臣等謹議書曰惟天地萬物父母禮曰地載萬物天垂象取財於地取法於天是以尊天而親地也王者父事天母事地皆不可以不親今三年一郊已非古典而北郊未有親祠之日若不因見地祇則是尊天而不親地事父而未事母也朝廷審能以夏日至盛禮備物躬祠北郊舉千餘年之墜典此則三王之盛復見於今矣其誰敢以為不然臣等竊恐北郊之禮未必親行徒崇空文則天子長無親事地之禮亦非聖情之所安也伏請合祭天地如祖宗故事俟將來親行北郊之禮則合祭可罷謹錄奏聞者又曰臣等近於尚書禮部集議親祠皇地祇已具聞奏伏請南郊合祭未聞聖㫖指揮臣等竊以天地特祭經有明文然自漢以來不能行之千有餘年矣昔商因夏禮周因商禮皆有損益孔子曰其或繼周者雖百世可知也可知者亦猶商因於夏周因於商也時異事變不可盡同雖有聖人繼周亦必損益是必先代之禮後代有不相沿前王之禮後王有不相襲唐虞五載一廵守周則十二年豈可謂唐虞非乎蓋周不能行也先帝朝獻景靈宫十一殿一日而徧陛下一嵗乃徧亦因時制宜欲可行也合祭之禮臣等不敢逺引前代自太祖建隆四年初郊至于元豐百二十年已成一代之禮後嗣可以遵承天地父母理無不可以並不得言瀆太祖平一海内太宗真宗皆致太平仁宗享國長久英宗神宗紹休聖緒率用此禮神祇饗荅非不䝉福報也唯元豐六年用詳定郊廟奉祀禮文所議云殆非所謂以類求神之意遂遷皇地祇之位蓋以地祇當祭於方丘樂以八變不可以升圜丘也夫周之后稷本朝之太祖皆當享於宗廟樂以九變而周公制禮以祖配天未有或非之者也祖可以配則地何為不可以並乎然先帝所以行之者決欲親祠北郊也若先帝能力行之而陛下未能猶當且復其舊況先帝尚未行乎設先帝已行而復知其難未必不改而從舊也宋興以來太祖郊四太宗郊五真宗郊五仁宗郊九英宗郊一神宗郊三皆合祭不合祭者唯元豐六年一郊耳陛下嗣位八年已再饗明堂當並見天地今初郊祀若循祖宗之舊他日果能行北郊之禮然後罷合祭未為失也今未能用周禮而先罷之他日欲親祠則不果欲合祭則已罷父天母地偏而不備伏恐聖慮未得安也若北郊既不可行而復議合祭則慢神已甚雖宴享賔客猶不可以如此況事大神祇乎臣等不知今欲親祠北郊如之何而可也一年再郊此必不能且夏日之至未易行也減損北郊之儀以就可行是於父母有隆殺也南北郊與明堂間祀則南郊愈疏亦未為得禮也或六年或九年而一郊此豈周禮乎如此則北郊之禮必為空文未有可行之日也今近捨祖宗百餘年已行之禮而欲逺復三代千餘年不舉之法去所易而就所難守周禮之空文虛地祇之大祀失今不定後必悔之伏望聖慈早以時決無疑於祖宗之舊以昭大孝之隆圜丘合祭依熈寜十年典禮則四海羣生並受其福臣等忝備近臣義不敢黙謹録奏聞五年尚書右丞許將乞議皇地祇親祠之禮奏曰臣近准敕差夏至祭皇地祇攝事竊考祀儀見乃者詳定禮文所奏親祀南郊合祭天地非禮乃建議罷圜丘皇地祇并從祀位郊祀之嵗不及親祠地祇即冢宰攝事巳且為儀行之臣伏以王者父天母地並為大神自古祭祀雖有異同然未有偏正而不躬行者也且三嵗冬至天子親祀徧享宗廟祀天圓丘而其嵗夏至方澤之祭乃止遣上公則是皇地祇遂永不在親祠之典此大闕禮也不可不議伏望聖慈博詔儒臣講求典故斟酌其宜正祀典以為萬世法七年禮部侍郎曽肇上奏乞分祭曰臣近奉詔集官議南郊合祭天地事已具議狀奏聞訖臣職在典禮再三思惟此天地大祭國家重事況當陛下郊祀之初尤宜敬重舉錯一有未安貽議萬世尚慮前狀開陳未盡敢再冐昩以聞伏以天地合祭非先王之禮學士大夫所共知之不待臣言而信也然使合祭於承事神祇無不順之理雖非先王之禮何為而不可行蓋以聖人之於祭求之於茫昧不可知之中故必因其方順其時而用其類以致之是以因髙以事天因下以事地兆五帝於四郊朝日於東夕月於西兆司中司命於南兆風師雨師於北兆山川丘陵墳衍各因其方而春夏秋冬各順隂陽之性其於祭事或燔或瘞或埋或沈以至圭璧幣牲坎壇樂舞各從其類先王非茍為之以謂求之如此之盡然後庶㡬神之來享也茍為反是則其於格神也難矣今論者以罷合祭則天子未有親見地祇之時夏至親祠北郊則以五月行禮為難欲因南郊并舉地祭此施於人事以求自便則可矣以此為親見地祇之實則未也何則事之非其方致之非其類又違其時施於羣小祀且猶不可況地祇之尊乎以此事地地祇未必來享而便謂此為親見地祇之實此臣之所未諭也且屈已從神與屈神以從已二者孰安今以五月行禮為難而引地祇以就冬祭茍從人事之便恐失陛下㳟事地祇之意此又臣之所未諭也聖人之事神洞洞乎其忠屬屬乎其敬舍忠舍敬常情所不肻為而謂陛下肻安之乎臣愚故謂合祭不可復親祠不可廢但當斟酌時宜省去繁文末節則親祠之禮無不可為巳於前狀論之矣唯陛下留神省察逺推先帝復古之心持以至誠不倦之意無從茍簡自便之説以成躬事地祇之實則上下神祇孰不顧享天下後世孰不稱頌臣以職事誼當罄竭伏望聖慈詳加採擇不勝幸甚肇又奏曰臣伏覩詔書冬日至南郊宜設皇地祇位以嚴並享之報此蓋皇帝陛下急於親祭地祇不待考正典禮遽下此詔然臣竊詳詔㫖亦云合祭不應古義今則設皇地祇位於南郊乃是復行合祭之禮既以為非又自行之一詔之中前後違戾詔書又云厥後躬行方澤之祀則修元豐六年五月之制是則異時北郊禮行合祭復罷天地大祀國家重事而輕易變更頗類兒戯廢置神位㡬於奕碁此臣所以聞詔愕然不知所措也臣伏思陛下之意無他以謂王者父天母地尊親並行即位以來親祭上帝而未及地祇恐乖明察之義又為議者所惑以謂五月祭地必不可行則是長闕事地之禮故因南郊并舉地祭欲以致誠敬於地祇爾以臣所見欲以致誠反近於怠欲以致敬反近於瀆何則南郊非祭地之處冬至非見地之時樂以圓鍾為宫其變以六非致地祇之音燔柴升煙非祭地祇之禮不問神之享與不享姑欲便於人事不近於怠乎今世之人家有尊長所居異宫子弟致敬必即其處尚不敢屈致一堂況天子事地可不如家人之禮哉前日以合祭為非而罷之今日復行異日復罷謂神無象廢置自由不近於瀆乎陛下志在誠敬而所行反近於怠且瀆此無他為陛下謀者以古為迂率意改作務從茍且趣便一時故也臣愚不逹時變竊為陛下痛惜之陛下即位八年兩行明堂大享之禮今兹有事南郊凡與天神舉皆從祀次第行之則將來郊祀之嵗親祠北郊并及諸神固未為晚何苦遽為此舉以渉非禮之議哉況五月祭地前世之所甞行本朝開寳中亦曽四月行雩祀之禮古人尚以六月出師孰謂夏至有不可行禮者哉臣愚伏望陛下速降徳音收還前詔今冬南郊禮畢即命有司詳定親祠北郊儀物仍令斟酌時宜省去繁文末節以從簡便俟至郊祀之嵗㫁在必行如此則於承事神祇不失誠敬先帝已正禮文不至無名改作使萬世之後以謂復行先王祭地之禮自陛下始不亦善乎臣䝉恩擢備從官職在典禮朝廷舉措得失臣與其責故自聞詔以來彷徨累日言之則為逆㫖不言則為失職熟慮再三寜以逆㫖獲罪不敢失職以負陛下任使也是以罄竭狂愚觸犯忌諱庶㡬萬一有補聖明則臣雖受重誅所不敢避唯陛下留神省察不勝幸甚肇又議明堂祀上帝奏曰臣謹按周禮稱昊天上帝文各不同昊天上帝則一帝而已五帝則五方之帝理自明白不待辯而知唯上帝之稱世或専以為昊天上帝或専以為五帝然以周禮考之肆師之職𩔖造上帝封于大神按周禮凡稱大神皆謂天也以上天為天則不應復云封於大神矣又典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望先儒以謂四望非地則上帝非天斷可識矣而孝經亦曰郊祀后稷以配天宗祀文王於明堂以配上帝正與祀天旅上帝之文相合蓋郊明堂異祭后稷文王異配則天與上帝亦宜有異以此推之謂上帝専為昊天上帝者非也又掌次王大旅上帝則張氊案祀五帝則張大次小次上帝五帝所張不同則謂上帝専為五帝者亦非也然則上帝果何謂歟按書稱𩔖于上帝孔安國傳以謂昊天及五帝孔頴逹從而釋之曰昊天五帝上帝可以兼之由是推之所謂上帝者蓋兼昊天五帝言之西漢已有是説矣故安國用此以解經文至鄭康成始引䜟緯之書傅㑹以為六天乃謂昊天上帝為北辰之星五帝為太微宫中五帝坐星此則成康解經之罪非先儒之説本然也然則不曰昊天五帝而曰上帝何哉蓋言昊天上帝則不及五帝言五帝則昊天不與舉上帝則昊天五帝皆在其中以昊天及五帝皆有帝之稱故也按周禮王祀昊天上帝則服大裘而冕祀五帝亦如之蓋先王尊事五帝與昊天同服冢宰掌祀五帝與祀大神祇之禮同則明堂并祀昊天五帝不為過也祭祀白青黄赤四帝揚雄以為僭祭之禮漢武帝祀泰一五帝於明堂合髙皇祠坐對之蓋天神貴者曰泰一其佐曰五帝雖出於方士之言然所指泰一即昊天也故武帝皆祠於明堂以髙帝配食則明堂并祀昊天五帝於此可見歴代明堂或并祀昊天五帝或止祀五帝其去五帝坐専祀昊天上帝者唯晉太始唐顯慶中爾本朝皇祐中大享明堂參用南郊蜡祭之禮嘉祐七年禮官始議改正設昊天上帝位以真宗配次設五方帝位次又設五人帝位以五官從祀自是遵行遂為故事至元豐中始詔祀英宗於明堂唯以配上帝而五帝不與論者以為未安詔臣等集議臣等稽之經典既如彼迹之故事又如此伏請自今宗祀神考於明堂以配昊天上帝并祀五方帝五人帝五官神以稱嚴父之孝以成大享之義紹聖初北郊之論雖定猶不果行龍圖閣直學士黄履建言曰陽復隂消各因其時上圓下方各順其體是以聖人因天祀天因地祭地三代至漢其儀不易及王莽諂事元后遂躋地位同席共牢歴世襲行不能令革逮神宗考古揆今以正大典嘗有意於兹矣今承先志當在陛下及二三執政哲宗詢諸朝章惇以為北郊止可謂之社履曰天子祭天地蓋郊者郊於神明之義所以天地皆稱郊故詩序云郊祀天地若夫社者土之神而已豈有祭大祇亦謂之社乎哲宗可之遂定郊議元符元年左司員外郎曽旼上言曰周人以氣臭事神近世易之以香按何佟之議以為南郊明堂用沈香本天之質陽所宜也北郊用上和香以地於人親宜加雜馥今令文北極天皇而下皆用溼香至於衆星之位香不復設恐於義未盡於是每陛各設香又言先儒以為實柴所祀者無玉槱燎所祀者無幣今太常令式衆星皆不用幣蓋出於此然考典瑞玉人之官皆曰圭璧以祀日月星辰則實柴所祀非無玉矣槱燎無幣恐或未然至是遂命衆星隨其方色用幣哲宗時劉安世上議曰近奉詔㫖封送下蘇軾等三狀與臣等所議北郊事不合令再行看詳考求其當别具聞奏者右謹具如前臣等幸以儒學得備官使凡有議論必據經典六經所載方敢取以為證茍不經見其説雖辯實不敢從孔子曰周監於二代郁郁乎文哉吾從周是典章制度歴夏商之損益至周而大備無以復加此孔子所以有從之之論也臣等昨奉詔㫖講議大典皆祖周制而或者欲於當郊之嵗以十月神州地祇之祭易夏至方澤之祀可以免盛暑舉事之勞夫神州地祇乃天子建都之所一方之神爾非皇地祇之比也或者又欲於夏至之日上不親郊止設爟火天子望祀於禁中如西漢竹宫故事此皆出於臆説違經害義不可施行臣等更不復議内有蘇軾一狀最為强辯須至㩁其是非以煩天聽按軾以謂合祭圜丘於禮為得不可復有改更臣等謹按周禮天子親祀上帝一嵗凡九國朝因前代之制三嵗方一郊天仍於其間或用他禮比之周室固以疎濶茍更因循謬誤不加考正則何以副聖上嚴禋之意哉夫祭祀之禮莫大於天地孝經曰昔者明王事父孝故事天明事母孝故事地察二儀敵體禮宜均一豈可親祠乃有隆殺古者謂求神以類繫辭曰乾為天陽物也故祭之於冬至一陽生之日就國之南圜丘以行禮牲牢器幣樂舞皆尚陽數此所謂求神以類者也坤為地隂物也故祭之於夏至一隂生之日就國之北方澤以行禮牲牢器幣樂舞皆尚隂數此所謂求神以類者也今議者於人主父事天母事地求端推類之誠意則違經變古反逆隂陽聖人之成法則棄而不行猥用王莽不經之説至引夫婦同牢私媟之語黷亂天地臣等雖謭陋決不可從非禮之禮秦漢而下去聖寖逺禮崩樂壊無能改革神宗皇帝聖學髙明超然逺覽灼見歴世之誤廼詔有司俾加稽考未遑改制奄及大故陛下繼志述事講究墜典此正方今之先務也議者乃引周頌昊天有成命以為合祭之證臣等竊詳詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之終篇未嘗有合祭之文所謂郊祀天地乃後儒叙詩者之辭爾非經語也蓋成周之世圜丘祭天歌此詩以為樂章方澤祀地亦歌此詩以為樂章而已非謂易北郊之祀使就饗於南郊也借如其説臣等不敢别引他經止就周頌中舉詩以難之潜詩之序曰潜季冬獻魚春薦鮪也不識謂一祭邪抑二祭邪又豐年詩之序曰豐年秋冬報也噫嘻詩之序曰春夏祈榖於上帝也如此之類未審止是一祭復為二祭三詩既互用於異時則昊天有成命雖歌於圜丘豈不可用於方澤乎臣等竊謂去聖遼邈經籍焚蕩若典禮所載後世當共守之六經所無方可以義起今郊天祀地之禮經㫖詳具昭如日星不識何苦必欲變改臣等反復推究别無義理止以諸軍賞給恐動羣小之情故造此紛紜之言以惑聖聽甚者至引􅍔福殃咎之説劫持朝廷必欲從已甚無謂也夫郊禋錫予乃五代姑息之弊法聖朝寛仁不欲遽罷若分而為二以給之何不可之有臣等所守乃先王之正禮而蘇軾之議皆後代之權宜權之與正決不可合伏望聖慈詳擇其當上以成神考之志下以證千載之􅍝豈勝幸甚所有廟饗典禮已具前奏伏乞檢㑹施行太子中允陸佃上廟制議曰臺門周書曰太廟路寢明堂應門庫臺注謂門者皆有臺於庫門見之從可知也臣謹按爾雅曰閍謂之門正門謂之應門犍為舍人曰閍廟門也應門南向大門明堂位曰九采之國應門之外北面東上然則太廟明堂同制大門謂之應門蓋築臺為屋於其上禮記曰天子諸侯臺門有以髙為貴也又曰臺門而旅屏大夫之僭禮也正義曰兩邉起土臺臺上架屋謂之臺門𤣥閫周書曰應門庫臺𤣥閫注謂以黒石為門階也提唐周書曰太廟提唐注謂唐中庭道提謂為髙之也臣謹按考工記曰堂塗十有二分注謂分其督旁之修以一分為峻也爾雅曰廟中路謂之唐堂塗謂之陳詩曰中唐有甓注謂中中庭也唐堂塗也據此中堂有甓謂中庭道則庭外廟中之路提使少髙而已弗甃也疏屏明堂位曰太廟疏屏注謂疏今浮思也刻之雲氣蟲獸若今闕上為之矣疏曰天子外屏人臣至屏俯伏思念其事臣竊謂疏屏蓋謂疏其上也尚書大傳曰諸侯疏序注謂序廧也於上為疏疏窻也謹按義訓曰交窻謂之牖櫺窻謂之疏鄭氏謂刻為雲氣蟲獸誤矣四門家語曰孔子觀乎明堂覩四門墉有堯桀之象而各有善惡之狀興廢之誡焉臣竊謂宗廟與明堂同制則廟亦四墉有門其南曰閍三面謂之闈故蔡邕明堂月令論曰古大明堂之禮膳夫氏相禮日昃出西闈日闇出北闈知宗廟之門四也九階考工記曰世室九階注謂南面三三面各二疏曰明堂位曰三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上以此知南面三階也大射禮云工人士與梓人升自北階禮記曰夫人至入自闈門升自側階又曰升自東階以此知三面各二也左墄蹵鞠者傳曰黄帝所作王者宫中必左墄而右平薛總曰墄限也謂階齒也天子殿髙九尺階九齒各為九級其側階各中分左右有齒右則坡陁平之𤣥陛周書曰太廟内階𤣥陛注謂以黑石為階臣竊謂内猶中也南面三階其中階之陛以黑石為之重屋周書曰太廟重亢注謂重亢累棟也復格周書曰大廟復格注謂復格累芝栭也臣謹按芝栭山梲也方小木為之爾雅曰關謂之槉栭謂之楶注槉欂也疏曰欂一名枅字林云枅柱上方木也櫨謂斗栱又明堂位曰山楶藻梲天子之廟飾也鄭氏謂山節刻欂為山也藻梲畫侏儒柱為藻文也禮器曰管仲山楶藻梲君子以為濫矣鄭氏謂大夫無畫山藻之飾然則山楶刻而畫之天子廟飾重焉黑楹明堂位曰太廟刮楹注謂刮摩也疏曰謂以宻石摩柱愽而畫之天子廟飾重焉廣雅曰天子諸侯廟黝堊大夫蒼士黈臣看詳説者據爾雅以謂廧謂之堊地謂之黝案莊子郢人仰塗堊漫其鼻則不特廧謂之堊又榖梁曰天子諸侯黝堊大夫蒼士黈丹楹非禮也案此刮楹亦以黑白飾之故春秋正義曰禮楹天子諸侯黝堊徐邈云黝黑柱也然則黑柱以白畫之丹桷尚書大傳曰天子之桷斵之礱之加宻石焉注謂礱礪也宻石砥之也漢書解詁曰桷椽也諸侯丹桷以丹色也臣竊謂宗廟丹桷禮也刻桷非禮也榖梁曰楹天子諸侯黝堊據此諸侯丹桷則天子桷丹可知也飾礩尚書大傳曰士大夫有石材庶人有石承注謂石材柱下礩也石承當柱下而已不外出為飾臣看詳士大夫石材外出為飾則天子諸侯柱礩飾之從可知矣逹鄉明堂位曰太廟逹鄉注謂鄉牖屬謂夾戶窻也博雅曰窻牖䦳也臣謹按考工記曰四旁兩夾窻謂於重屋四旁面各兩窻以納日月之明所謂達鄉而鄭氏以謂每室四戶八窻非是也説文曰在屋曰窻在牆曰牖則窻在屋明矣交牖義訓曰櫺窻謂之疏交窻謂之牖臣謹按説文曰牖穿壁交木為窻也儀禮曰司宫闔戶牖則牖蓋交木為之可以開闔已祭則閉焉藻井周書曰太廟旅楹春常畫旅注謂常累系也春常謂藻井之飾也言皆畫列柱為文風俗通曰殿堂象東井形刻作荷菱荷菱水物也所以厭火賁墉尚書大傳曰天子賁墉諸侯疏厚注謂賁大也牆謂之墉大牆正直之牆不衰殺其上臣竊謂廟垣謂之牆今其外繞牆也承室之牆曰墉儀禮或曰北墉下或曰西牆下墉與牆異明矣牆蓋衰殺其上考工記曰囷窌倉城逆牆六分注謂逆猶卻也六分其髙郤一分以為閷設移周書曰太廟設移注謂承室曰移臣謹案爾雅曰連謂之簃注謂堂樓閣邉小屋博雅曰宫室相連謂之簃蓋天子宗廟重廊故於堂邉設移屋連之詩曰繹繹寢廟繹繹連也重廊周書曰太廟重廊注謂重廊累屋也臣謹按古曰廊廟廟之有廊明矣山牆周書曰太廟山牆注謂牆畫山雲臣謹案子貢曰譬之宫牆夫子之牆數仭不得其門而入不見宗廟之美百官之富蓋其脩之數也右臣謹案周禮匠人夏后氏世室堂脩二七廣四脩一五室三四歩四三尺殷人重屋堂脩七尋堂崇三尺四阿重屋周人明堂東西九筵南北七筵堂崇一筵五室凡室二筵鄭氏謂世室宗廟也重屋王宫正堂若大寢也或舉宗廟或舉王寢或舉明堂互言明其同制周書亦曰太廟路寢明堂咸有四阿重亢重廊復格藻井設移旅楹内階𤣥陛提唐山牆臺門𤣥閫則三者同制明矣故明堂位曰太廟天子明堂而月令仲夏天子居明堂太廟先儒謂明堂制與廟同亦曰太廟也然則天子太廟五室土室在中大於四室故謂之太室書曰王入太室祼是也其左為東房其右為西房皆南户而木室在東北火室在東南金室在西南水室在西北木室東戸火室南户金室西戶水室北户詩曰築室百堵西南其户傳謂或西其戶而家語又曰賜觀太廟之堂未既還瞻北闔皆斷西戸謂金室北户謂水室也四室中夾室劉熈釋名曰房旁也在堂兩旁也夾室在堂兩頭故曰夾也夾室皆有前堂謂之廂爾雅所謂室有東西廂曰廟無東西廂有室曰寢而覲禮云凡俟于東廂是也説者謂天子宗廟無廂夾不已誤乎其四中則南曰明堂北曰𤣥堂東曰青陽西曰總章月令所謂春居青陽太廟夏居明堂太廟秋居總章太廟冬居𤣥堂太廟孟月居左个季月居右个是也至於閏月則闔門左扉立于其中而還適路寢居門終月鄭氏謂於文王在門謂之閏則太廟象先王平生所居與明堂路寢同制五室十有二堂理宜然也或曰宗廟與路寢明堂制同則上有五室不得有房又惑矣案書路寢實有東房西房東夾西夾而明堂位曰太廟天子明堂則魯用天子禮樂太廟如明堂制而季夏六月以禘禮祀周公於太廟君衮冕立於阼夫人副禕立於房中則太廟路寢明堂有房明矣今先所圖上廟制欲以八廟約少牢大夫宗廟為之雖増四阿重檐山節藻梲堂九尺階九等略應王禮然未有五室九階臺門𤣥閫内階𤣥陛山牆賁墉重廊累棟復格設移四門達鄉黒楹丹桷藻井之制又以房為堂且謂房無北壁故得北堂之名夫堂與房異著矣安有為房而無北壁者哉至於饎饔又在廟中西堂下凡皆所未盡也説者謂饎饔在西堂下逼西壁為之夫爨置於廟中理不安矣況欲逼宗廟西壁為之乎説者或謂西壁謂西牆也案儀禮有曰西牆有曰西壁則壁與牆異以臣考之特牲饋食曰主人服如初立于門外東方南面視側殺主婦視饎爨于西堂下蓋堂謂門側之堂爾雅曰門堂之側謂之塾匠人曰門堂三之一古者爨在廟門外或在東或在西故饎爨在廟門外之西堂下少牢饋食云饔爨在門東南北上廩爨在饔爨之北特牲饋食云牲爨在廟門外東南魚腊爨在南皆西面饎爨在西壁士虞禮曰側享于廟門外之右東面魚腊爨亞之北上饎爨在東壁西面由是觀之饎爨在廟門外之西堂下逼西壁為之明矣故曰饎爨在西壁又曰主婦視饎爨于西堂下臣稽考載籍廟與路寢明堂同制雖具其凡如右然其脩廣之度匠人以為南北七筵東西九筵凡室二筵謂之凡室二筵則太室大矣太廟五室十有二堂太室又大則廣九筵脩七筵不能容之案匠人市朝一夫鄭氏謂方各百歩則東西九筵南北七筵亦謂南北各六十三尺東西各八十一尺歟且古者寢不踰廟燕衣不踰祭服而宣王考室之詩曰如鳥斯革如翬斯飛則先王宫室其輪奐至矣又曰噲噲其正噦噦其㝠噲噲大聲也噦噦小聲也言其閎深可以荅響豈與大夫之陋同日而語又況後王彌文積隆以至於今也然則天子廟飾雖古制殘闕不可盡見而今亦有不可盡如古者要之考先王度當世與時宜之而已其前代載籍所傳不具與其後世未之有法可以道揆禮可以義起使華副實稱昭明垂之百世取度於身實在聖衷如允臣所議乞叅校舊圖擇其善者以聖訓裁之右司諫蘇轍論明堂神位狀曰臣聞三代常祀一嵗九祭天再祭地皆天子親之故於其祭也或祭昊天或祭五天或獨祭一天或祭皇地祇或祭神州地祇要於一嵗而親祀必遍降及近世嵗之常祀皆有司攝事三嵗而後一親祀親祀之踈數古今之變相逺如此然則其禮之不同蓋亦其勢然也謹按國朝舊典冬至圜丘必兼饗天地從祀百神若其有故不祀圜丘别行他禮或大雩於南郊或大饗於明堂或㳟謝於大慶皆用圜丘禮樂神位其意以為皇帝不可以三年而不親祀天地百神故也臣竊見皇祐明堂遵用此法最為得禮之變自皇祐以後凡祀明堂或用鄭氏説獨祀五天帝或用王氏説獨祀昊天上帝雖於古學各有援據而考之國朝之舊則為失當蓋儒者泥古而不知今以天子每嵗親祀之儀而議皇帝三年親祀之禮是以若此其踈也今者皇帝陛下對越天命逾年即位將以九月有事於明堂義當並見天地遍禮百神躬薦誠心以格靈貺臣恐有司不達禮意以古非今執取王鄭偏説以亂本朝大典夫禮沿人情人情所安天意必順今皇帝陛下始親祠事而天地百神無不咸秩豈不俯合人情仰符天意臣愚欲乞明詔禮官今秋明堂用皇祐明堂典禮庶㡬精誠陟降溥及上下畢仲游上明堂奏曰議事之人患不原本末之情輕重之勢與夫今古之所宜而專以其誦習聞見固守之雖明知其不可復而不忍捨去者惑之甚也自漢已來爭於親廟之數郊丘之禮與夫明堂之制度者卒皆無定論而明堂為甚蓋其制度既不經見一皆出於異書雜説而為相勝之論則雖蔡鄭復生猶將不決故原聖人之心而以義起之則今儒者所共知者以為有餘不原聖人之心而斷於臆説則雖合諸子百家而猶不足經曰郊祀后稷以配天宗祀文王於明堂以配上帝孟子曰明堂者王者之堂也如欲行王政則勿毁之矣夫明堂之本意大要尊祀祖考而為神明之所王者以時居之而行其政於天下茍可以祀祖考可以行其政則天子之所出入皆可以為明堂茍不能配祖考不能行其政雖使九室四户七十二牖真聖人之法猶將無益傳曰祭祀以敬不問其禮矣飲酒以樂不選其具矣今國家上稽聖賢之遺文下循祖宗之故事闢路寢嚴配以事天神者非止今日天神固已享矣嚴配之禮固已得矣姑修其孟子所謂王政者自此行之則天地得其職隂陽得其序萬物得其宜若夫考工筵室之廣狹月令左个右个太廟之同異蔡鄭世室重屋享功養老敎學選士之曲説出於誦習見聞而決不可以為定論者在上之人義起而斷之不足膠也侍御史劉摯論景靈宫帝后同殿乞下近臣議奏曰臣伏見神宗皇帝神主既祔太廟竊計於景靈宫當依祖宗神御别建廟殿伏緣宫中地歩今已隘逼若或開展民區則理有未安臣惟原廟之説始見於西漢而其制度蓋不傳而無聞今景靈宫之聚神御也固有祖於原廟之意然帝之與后各建殿室蓋緣舊來神御散在諸寺故亦各殿乃出於一時規畫别無議據臣愚竊謂既曰廟貎自當倣於宗廟之制帝后宜同御一殿如此則今日神宗所御遂可無事於興作矣奉遷昭憲皇后於宣祖殿合配而復以太始殿易名而為神宗之殿非徒簡節勞費便於時而已也攷之禮典則無違質之人情則為順此大事也伏望聖慈詔三省兩制禮官雜議以處其當聽陛下聖斷焉臣淺陋妄議合即罪誅徽宗即位初禮部太常寺言哲宗升祔宜如晉成帝故事於太廟殿増一室候祔廟日神主祔第九室詔下待從官議皆如所言蔡京議以哲宗嗣神宗大統父子相承自當為世今若不祧逺祖不以哲宗為世則三昭四穆與太祖之廟而八宜深攷載籍遷祔如禮陸佃曽肇等議國朝自僖祖而下始備七廟故英宗祔廟則遷順祖神宗祔廟則遷翼祖今哲宗於神宗父子也如禮官議則廟中當有八世况唐文宗即位則遷肅宗以敬宗為一世故事不逺哲宗祔廟當以神宗為昭上遷宣祖以合古三昭三穆之義大觀二年議禮局檢討俞㮚言𤣥以象道纁以象事故凡冕皆𤣥衣纁裳今太常寺祭服則衣色青矣前三幅以象陽後四幅以象隂故裳制不相連屬今之裳則為六幅而不殊矣冕𤣥表而朱裏今乃青羅為覆以金銀飾之佩用綬以貫玉今既有玉佩矣又有錦綬以銀銅二環飾之以玉宗彞宗廟之彞也乃為虎蜼之狀而不作虎彞蜼彝粉米散利以養人也乃分為二章而以五色圓花為藉其餘不合古者甚多乞下禮局博考古制畫太常寺及古者祭服様二本以進至於損益裁成斷自聖學四年議禮局官宇文粹中議改衣服制度曰凡冕皆𤣥衣纁裳衣則繪而章數皆竒裳則繡而章數皆偶隂陽之義也今衣用深青非是欲乞視冕之等衣色用𤣥裳色用纁以應典禮古者蔽前而已芾存此象以韋為之今蔽膝自一品以下並以緋羅為裏緣緋絹為裏無復上下廣狹及㑹紕純紃之制又有山火龍章案明堂位有虞氏服韍夏后氏山商火周龍章韍者乃黻冕之黻非赤芾之芾也且芾在下體與裳同用而山龍火者衣之章也周既繢於上衣不應又繢於芾請改芾制去山龍火章以破諸儒之惑又祭服有革帶今不用皮革而通裏以緋羅又以銅為飾其綬或錦或皁環或銀或銅尤無經據宜依古制除去至佩玉中單赤舄之制則全取元豐中詳定官所議行之又上所編祭服制度曰古者冕以木版為中廣八寸長尺六寸後方前圓後仰前低染三十升之布𤣥表朱裏後方者不變之體前圓者無方之用仰而𤣥者升而辨於物俛而朱者降而與萬物相見後世以繒易布故純儉今羣臣冕版長一尺二寸濶六寸二分非古廣尺之制以青羅為覆以金塗銀稜為飾非古𤣥表朱裏之制乞下有司改正古者冕之名雖有五而繅就旒玉則視其命數以為等差合綵索為繩用以貫玉謂之繅以一玉為一成結之使不相併謂之就就間相去一寸則九玉者九寸七玉者七寸各以旒數長短為差今羣臣之冕用藥玉青珠五色茸線非藻玉三采二采之義毎旒之長各八寸非旒數長短為差之義又獻官冕服雜以諸侯之制而一品服衮冕臣竊以為非宜政和四年比部員外郎何天衢上言曰祭不欲數數則煩祭不欲疏疏則怠先王建祭祀之禮必得疏數之中未聞一日之間遂行兩祭者也今太廟薦新有與朔祭同日者夫朔祭行於一月之首不可易也若夫薦新則未嘗卜日一月之内皆可薦也新物未備猶許次月薦之亦何必同朔日哉自是薦新偶與朔祭同日詔用次日焉徽宗時左正言任伯雨與右司諫陳瓘同論修建景靈西宫劄子曰臣伏覩近降聖㫖修建景靈西宫坼移元豐庫大理寺軍器監儀鸞司等處以其地基奉安神考哲宗神御極於尊崇彰乎廣大此可以見陛下奉先之孝只移官舍不動民居又可以見陛下愛民之仁得斯民之歡心以事宗廟此堯舜文武之用心也然而稽之禮意有所不合考之人情有所未便可得而議者有五事焉臣不可以無言也夫國之神位左宗廟右社稷左陽也人道之所鄉位宗廟於人道之所鄉則不死其親之意也神考建原廟于左蓋取諸此今廟據社位不合經㫖非神考之意此其可議者一也夫人之所居必擇吉地故詩美衛文公能營宫室而曰卜云其吉終然允臧可不擇乎唐大理卿徐矯有言曰大理獄院由來相傳殺氣太盛鳥雀不敢棲蓋刑獄之地必有殺氣人情所惡古今皆然今乃擇此以建宫廟既非吉地神必不安此其可議者二也西宫之地雖云只移官舍不動民居而一寺一庫一監一司移於他處却要地基遷此就彼彼亦有居民也不知起遣㡬家而後可以建此被遣之民有所不願則失其歡心失其歡心則違陛下愛民奉先之本意矣此其可議者三也昔者奉安祖宗帝后神御散于寺觀之内神考合集諸殿㑹于一宫今乃離析一宫分為兩處嵗時酌獻鑾輿分詣禮既繁矣事神則難此其可議者四也傳曰孝莫大於寜親寜親莫大於寜神顯承殿奉安以來一祖五宗神靈協㑹既安既久何用遷徙宗廟重事豈宜輕動動而寜之不如勿動之寜也雖曲示隆報之心而未盡寜神之禮此其可議者五也凡朝廷舉動茍合公論則天下人情莫得而議一有可疑則衆説蠭起凡此五者臣皆得之於公論而不敢不言者也宗廟之事至重至大陛下於宰臣之請雖已㳟依然禮意人情有所未安難以施行何憚於改伏望聖慈特降睿㫖令三省别行詳議庶於宗廟大事無輕動之悔伯雨瓘再言西宫劄子曰臣昨具劄子言修建景靈西宫有可議者五續具奏狀言祖宗神御與聖祖天興殿皆列於天廟之次不當遷徙續又具劄子言真祖用道家之制而叅取隂陽之説神考依禮經之㫖而不易左右之位今一舉而兩失之願詔三省樞宻院及侍從臺諫官重行審議未䝉施行臣竊惟宗廟之祠不可輕易祖宗之緒不宜茍改而朝廷固執初議臣不敢以為然也周禮義曰位宗廟於人道之所向者不死其親之意也不死其親雖公羊之舊説而三經妙義乃神考之所以訓天下者也廟社之説安可破乎今欲棄先儒之是説違神考之聖訓專用私意率改成緒臣是以知其不然也或者以謂若東展舊基則髙頭街之地必見侵掘國之左臂不可侵也夫天廟之説出於隂陽家真宗用之今尚不取何獨左臂之説為可據乎況舊基之北有𣙜貨務移一務則不動民居而得殿基矣不欲侵掘則因地形之髙下何為不可擇此可因之緒而堅持難就之計臣是以知其不然也又或謂以祖宗神御昔者或東或西或南或北隨寺觀之所在即置殿宇豈有左右之拘乎臣謂隨處奉安斯無定位㑹而為一必辨東西昔者散處之時后或在南帝或在北今既㑹而為一豈可以不分南北而皆以因舊為説乎臣是以知其不然也夫此三不然者皆不足以固守然陛下所以不敢輕改前議者謂神考素有修建西宫之意蔡京親聞先訓而實錄備載其語故不可以不㳟依也陛下用史官親聞之語遵神考素定之意以奉先之孝述宗廟之事臣下之所宜將順其有大於此乎然而以臣觀之此乃蔡京矯誣神考之訓無足信者臣請以一事驗之元豐中神考於英宗治隆殿後留一殿之基宣仁詔曰此以待未亡人也因遜此基為神考廟宫之地宣仁之意不欲多遷民居耳而紹聖大臣因謂宣仁輕蔑神考裁損廟制於是重卜奉安之地以極崇報之禮今顯承殿是也方建修顯承殿之時蔡京正在朝廷若神考之言審如實錄所載京於此時何不具以先訓聞于哲宗況當哲宗之時京最用事凡可以毁宣仁者無遺力矣豈有宗廟重事親聞先訓可以證元祐之非無大於此而乃隠忍不言復何待乎臣是以驗其為矯誣也且紹聖之初哲宗聖意本無適莫章惇雖挾功自恣然其初猶有兼取元祐之意及京自成都而來與其弟卞共毁宣仁共欺哲宗京之得售其説自役法始從大改役法以後事事無不大改兄弟同朝塤箎相和無有一事不如其意當此之時不以所聞神考聖訓告于哲宗至于今日然後引所自書實錄以為證驗唱為不經之論而欲遷神考于西宫其為矯誣可謂明矣京以矯誣之筆妄増實錄之事以矯誣之舌偽造神考之訓朝廷用矯誣之言而輕改宗廟信矯誣之説而力沮言者臣恐自此以後矯誣之人無復忌憚矯誣之政不可復救奸雄生心四夷相賀必始於此矣伏望聖慈出自睿斷正京矯誣之罪明示貶竄然後三省樞宻院及侍從臺諫官如臣所請重行審議瓘又言修建景靈西宫狀曰臣近論修建景靈西宫有可議者五巳奉聖㫖送三省樞宻院今數日矣未有定議臣謹按大中祥符五年以聖祖臨降詔於大内之南已丙之位得祖廟之地以建景靈宫亦如天廟星在太㣲之東南也神考合集祖宗神御㑹于天廟之次所以契符天象稽叅經㫖述真宗之事為後世之法今修建西宫非神考紹述之意宗廟至重不宜輕舉伏望聖慈詔諭大臣速行改議無貽輕動之悔天下幸甚貼黄大中祥符五年十二月詔以聖祖臨降令修玉清昭應宫使丁謂擇地建宫及令禮官考制度以聞是月丁謂言得司天少監王熈元等狀按晉天文志云張南有天廟十四星乃帝王祖廟也今大内法象太微天廟星在太微南若建新宫宜大内正南次東止丙方上合天廟星位又按二宅經大内陽宅新宫宜在正南次東已丙上合陽宅福徳方吉臣請以錫慶院開封府兩處地位建置上符天象旁合經術遂詔以錫慶院建宫歴代名臣奏議巻二十一
