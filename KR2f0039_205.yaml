body:
  text: 歷代名臣奏議卷二百五明楊士竒等撰聽言宋徽宗即位初左正言曽肇乞旌賞直言疏曰臣伏見陛下發德音下明詔使人直言無有所諱此堯稽衆舜好問之盛德先王立謗木諫鼓詩人詢于芻蕘之誼也天下甚幸臣切以謂陛下惻怛詢訪之誠心既已形於號令則其於開導奬激使人樂於盡忠獻納亦須有術況詔書已有其言可用朕則有賞之文則宜實其言以信天下臣伏聞治平四年英宗皇帝踐阼之初即求直言尋又下詔上書人所陳政體時務材識出衆者命官特加甄擢其次則賜詔書奬諭布衣即令有司召問條對有理量材録用當時咨謀勸誘如此其詳至有朝上書暮召對者是以四方萬里人人奮勵爭竭腹心唯恐在後神宗皇帝廣覽兼聽片善必收寸長必録斟酌損益以修政事故熙寧元豐十九年間百度修舉功崇業巨雖聰明睿智出於聖性亦虛心採納羣言之助也臣愚伏願陛下明諭輔臣討尋治平四年之令舉而行之其上書言事有合聖意者速加旌勸則逺近聞之孰不感激智者效其計忠者獻其誠陛下不出戶庭而海內之情畢聞於上不勝幸甚時日食求言太學博士王渙之上奏曰求言非難聽之為難聽之非難察而用之為難求而不用非所謂應天以實者也臣切見國家每有天變輒下求言之詔而下之報上乃或不然以指陳闕失為訕上以阿諛佞諂為尊君以論議趣時為國是以可否相濟為邪説其於大臣權要則觀望附會相戒以默志士仁人知言之無益也不復有言而小人懷姦僥幸肆為詭譎可駭之論以為偷合茍容之計此尤不可不察也願陛下虛心公聽言無逆遜唯是之從事無今昔唯當為貴人無同異唯正是用則人心恱治道成天意得矣中書舍人鄒浩乞至誠終始納諫疏曰臣伏讀虞書見舜命羣臣作股肱耳目而戒之曰豫違汝弼汝無面從退有後言夫面從以成其違者是諛也後言以指其違者是謗也二者非事君之道也有虞之臣皆大賢豈不知之舜且以此戒焉是知拂心忤意非人臣之所樂在於人君有以導之而已此帝舜之聖所以為萬世法也臣愚切觀陛下即位以來憲天聰明首闢言路旋因日食亟降詔書咸使納忠無有忌諱言果當理欣然聽從增秩賜官風動天下故雖踈逺芻蕘之賤莫不鼓舞遭遇思日罄竭以補初政之萬一而況股肱耳目之寄又安有不盡其忠者乎帝舜之聖今復見於陛下然臣觀太宗乃近古明君魏鄭公且曰陛下貞觀之初導人使諫三年以後見諫者恱而從之比一二年勉強受諫而終不平質以其詳悉有據驗太宗悟曰非公無能道此者人苦不自覺耳於是知納諫固難而謹始尤為難也子思曰誠者物之終始不誠無物伊尹曰終始惟一時乃日新彼太宗聞之而悟真大過人者顧不能持以至誠日新無敝使鄭公不得而窺焉則其去舜也逺矣陛下方稽古以御今如太宗之事亦願取以為鑒以隆太平之偉績臣又伏思上書之人所言不一其泛論大體指陳邪正如此類者自可留之禁中以備觀覽至於陳述利害事干有司者即乞降付政府委官看詳有可施行旋具聞奏此則聖詔之出不為空文施之國家固非小補唯陛下留聽浩又論太學生不當以言事殿舉疏曰臣準中書省録黃一道為太學生張寅亮等妄言裁減皇太后園陵浮費各殿一舉事臣尋觀寅亮等所上書其言狂謬固當懲戒以示天下緣士大夫已在選擢而詳練滋久者尤有不能體悉朝廷用意之深況山野一介布衣之賤乎陛下察其無知特從輕典又且遣改屏出學押出門指揮則是寅亮等固已在所矜容矣止殿一舉誠不為過但近年以來言路壅塞為時大弊自陛下勸奬開導始克通達世以相賀獲仰太平今寅亮等若未免殿舉切恐自此以後人復畏避不敢獻言天下之事無由周知亦聖政所當深慮者也傳不云乎烏鳶之卵不毁而後鳳凰集誹謗之罪不誅而後良言進臣愚亦願陛下以此赦之而已所有録黃臣未敢簽書行下給事中上官均上奏曰臣聞聖人擇狂夫之言好問至於芻蕘者樂於聞善也誹謗之罪不誅者欲以來直言也蓋君臣之勢隔如霄壤進言直則有犯分之嫌持論髙則有出位之罪畏嫌避罪則愛身者熟視拱默而不敢論矣政事有闕偷安固祿而不敢論則九重之奧萬事之機安得聞歟賈山有言人主之威非特雷霆勢重非特萬鈞開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡況震之以威壓之以重豈有不摧折者如此則人主不得聞其過失矣聖人知盡言之難也故賞諫臣以厲諛恱之臣貸狂直以開正直之路使工誦針諫瞽誦詩諫公卿比諫士傳言諫庶人謗於道商賈議於市所以集天下之善而成巍巍之功也自陛下即位之初開廣言路虛懷開覽擇其可用者賜官增秩以奬其言四方之士歡欣鼓舞人人出其所長發其所藴露章抗疏幾無虛日陛下神明天縱道術精微固所自得至於政事之臧否人臣之邪正法宫之奧纎悉洞照者殆亦收覽衆言之助也臣以為進士殿舉比士大夫貶官非輕罰也張寅亮等踈愚狂瞽誠不識朝廷忌諱然志非懷邪比庶人謗於道可也今被之以重罰疑非陛下開廣言路之意臣竊妄度陛下聖度容納非加怒於無知之小臣特以其言有及執政之意言涉犯分故稍正刑罰以明上下之體然四方之逺難以户曉必以為陛下前日許中外之人得上封事既招其來又罪其言前日賞之今日罪之妄意朝廷有厭言之意自中人以上安寵顧利政事之有缺往往趑趄畏縮而不敢正議矣且加罪一二進士固未足惜竊恐沮直臣之氣鉗多士之口自此始矣臣以為狂言犯分貸而不罪其為害輕誅責賤士以沮直言其為害大臣願陛下揆之聖心權其輕重更加矜容以稱陛下初政之意以解四方之疑天下幸甚宣和二年御史陳堯臣乞重惜憲臺之權疏曰臣聞天下所恃以安者朝廷之紀綱紀綱所恃以立者臺諫之風采若臺諫有所拘忌受制於人而風采不存則朝廷莫之糾彈容姦於國而紀綱以壞是故人君惜之事權不繫於官長不拘於大臣養其志氣不挫於權豪不畏於強禦雖其人未必皆賢其言未必皆當許以風聞而貸其不實之愆納以虛懷而開其敢言之路豈徒然哉凡欲以破姦雄之膽救陵夷之患也唐文宗曰御史臺朝廷紀綱臺綱正則朝廷正朝廷正則天下理楊瑒曰糾彈之司若遭恐脅以成姦人之謀御史臺固可廢矣臣惟方今天下平治固無姦臣之足慮然間有擅權挾寵之徒肆為敗俗亂常之惡孝不足以移忠功不足以掩過內恃強援奧知以脫常刑重憲恬然自得莫敢誰何蔑視風憲之官不翅奴僕之役若非處以私人終必視為仇怨然慮其攻已則先設隄防以拒其來聞其有言則廣行營救以反其罪不擠以今事則必中害以他非不謂在昔與我為讎則曰於今與誰為黨或以離間其君臣為辭或以疏隔其恩威為語指切直者為沽名謂納忠者為訕上巧言令色千計百端是致發意欲彈者改遷抗章才及者貶竄前者沈滯流落而不聊其生後者惴恐憂思而深以為戒忠義風采消委殆盡臺臣雖備位名存實亡臣愚以謂恐非朝廷之福乃者官吏猥冗財費浮濫紹述失其本意紀綱浸以隳弛而霜臺坐視不發天下恨之逮至陛下獨奮離明斷以乾健減罷裁抑一遵熙豐之舊繼又廢黜拱默選任臺臣中外方且鼓舞然未聞有所建明或即旋行遷易天下疑之夫彈劾之職紀綱所繫當急先其大者譬如捕盜先其渠魁去草急在根本今使置其大者而言其小者是猶捨渠魁而攻疲羸留根本而摘枝葉適以激其怒而滋其萌是豈除惡務本之意乎臣恐天下紛紛籍籍者特未定也故臺臣屢遭恐脅則姦回無所畏憚就有特然奮勵衆必為之寒心知其必蹈禍機而謂不若且已雖因時薄有所彈終不敢直肆其説至使明目張膽之士化為結舌鉗口之流臣恐自是積習成風人知畏避遂致姦臣欺蔽君上紀綱既紊何所不為且姦人始兆在糾劾而非難其惡已成雖鈇鉞而何及故治國家者平時宜有直言頂豸之士則悠久庶無姦謀指鹿之臣今陛下仁天廣覆智燭旁臨賞罰如寒暑號令如風雷所以舉直錯枉防微杜漸者固不患不至所患姦回植黨牢不可破或左右先容或前後救援不能無誤聞聽至有逆已行之命或方頌而旋改沮必罰之威或朝黜而暮升蠧國害民之事或遏而復熾欺公罔上之人或沮而復起國是動搖人心惶惑其根原有在於強援奧知之間而已夫擊搏之任豈人樂為公議所在有不得已人孰不欲保其父母妻子孰不願享其富貴安榮何事而取怨於權臣犯顔於人主邪聽言之道當以事觀茍惟在巳無愆則於人言何恤安用預設隄防茍唯事干國體則亦何黨何讎奚事廣行營救臣願陛下深惟此理上體祖宗之成憲下為萬世之來規重惜憲臺之權優養直士之氣使姦回必劾而無遺罪戾必罷而無赦止其防備之私絶其救援之弊明出詔令應今後凡臺臣有所論列職非三省而輒出位謀政與夫干請私謁拯姦護惡巧為粉飾者置之重辟庶使姦無所緣紀綱一正天下幸甚徽宗時陳次升上奏曰臣竊聞右司諫陳瓘以言事不當得罪雖不知其詳然臣伏覩天禧元年二月七日申敕臺諌官詔書云雖言有過當必示曲全今陛下訪落之初用人如不及從諫如轉圜猶恐萬幾之務不能遍察上至百辟卿士下及庶民皆許直言無有諱忌其詔亦云言而失中朕不加罪命下之始萬口一辭以謂正當不諱之朝且無犯顔之慮孰不激昻勇聳願竭區區之愚以圖補報萬一況身有官守有言責者安可緘默乎瓘既以諫為職又許風聞論事偶有失實陛下當含容矝貸如上詔旨今遽省重責頗駭羣聽竊慮中外傳聞人人鉗口結舌以言為諱忠讜之路塞壅蔽之風成矣伏望聖慈念天禧申敕臺諫之意及陛下求言之詔特寬瓘之罪責庶幾養成士大夫敢言之氣其於聖治不為小補左正言任伯雨乞留龔夬狀曰臣聞先甲三日易後甲三日難諫而不早足以取名而於事無益忠臣之義但求有益而不願取名臣今日先事之言惟欲有益於朝廷也臣伏聞殿中侍御史龔夬言翰林學士承旨蔡京告訐周穜等語言事乞罷黜京而朝廷謂京無過不以夬之所言為信夬既不得其言難以復在言職雖朝廷未加斥逐理當求去夬尚未去而臣已言及此其所以為先事之言也蓋言事之官乃朝廷耳目之所寄也耳目不通則有蒙蔽之患故自祖宗以來奬勵言官屈意聽納養其徑氣不使小挫非重其人所以重朝廷之耳目也自紹聖以來七年之間五逐言者初逐常安民次逐孫諤次逐董敦逸次逐陳次升次逐鄒浩此五人者皆與蔡京所見不同雖其間或以他罪被逐而京之所惡則無不去者今夬之言京又將罷去則是兩朝言官前後六人無不為京而去也陛下以聖德嗣位上法祖宗內稟慈訓數月之間德澤廣被內外安靜人情歡悅此千載之一時也今若緣此一事又去言官臣恐後之言者人人不已可惜安靜之勢忽成紛紛其於初政豈能無纍若待臨事而諫孰若先言之有益也臣願陛下察夬所言忠於為國特回睿聽曲賜允從庶使敢言之士意向朝廷蒙蔽之風自此衰息伏望陛下上稟慈闈議其可否小臣狂妄冒犯天威無任皇恐戰汗之至惟陛下矜赦幸甚伯雨又上奏曰切以紹聖時章子厚蔡卞用事諫官御史盡出子厚卞引用不唯無所建明率皆附會子厚卞欺誣朝廷自陛下即位總攬權綱自擇臺諫然臣謂臺諫官始用之既重其選終罷之必正其名臣欲乞今後臺諫以言事罷去者皆坐其所言以正其罪蓋妄冒不才者其罪小欺誣朋附者其罪大張庭堅近以言事不當除京東運判既而改汝州今又送吏部中外疑惑不知所以臣伏願陛下斷自聖意降出庭堅章疏考其所言若欺罔朋附則送吏部為尚輕若止妄冒則送吏部為太重正名定罪庶足勸戒無使言路自今以往以庭堅為戒左司諫江公望乞容納直言疏曰昔漢武帝殺人如剃草而汲黯數以直見不少降帝終下之黯在朝淮南之謀為寢一戅直之臣甚微而朝廷輕重繫焉是以養之不可不素用之不可不審遇之不可不隆聽之不可不察去之不可不慎今朝廷以言得譴不過黜官逺去國而已然未聞有汲黯之切直何也蓋養之不素未必充其才適充其才遇之未必盡其禮禮或加厚聽之未必察其情去之未必當其罪以人君之威逐一小臣不啻若怒飇之振稿翩翩然徑逝矣而不知適以資讒諂囁嚅相賀之語也傷君之明喪臣之直無甚於此自昔人君之明擴大度以優容虛誠心而延佇推內恕以假借忍難行而聽納所以養成人之直故其進諫也無首鼠之疑謀有批鱗直前之勇氣事無不聞理無不盡上無過舉下無逆情姦人破膽黠吏縮手民賊屏迹國狗希鳴蹇直之氣日益長而朝廷之勢日益尊矣故曰茍得其養無物不長茍失其養無物不消陛下德度宏博出於天性羣臣進諫雖涉狂易未嘗誅其心復加優賚天下之士孰不欲為陛下盡忠況在言責者乎傳曰興王賞諫臣逸王罰之信斯言也然臣聞唐太宗貞觀之時導人使諫三年之後諫者悅而從之又一二年勉強受諫而終不平蓋受難甘之言常在於慷慨願治之初必厭於玩習已安之後漢武帝剛忍之主也而有容直之得唐太宗強明之君也而有卒惰之失相去逺矣惟陛下鑒焉宗正寺主簿石公弼上奏曰朝廷比日所為直詞罕聞頌聲交至未有為陛下廷爭可否者願崇忠正以銷諛佞通諫爭以除壅蔽徽宗善之擢殿中侍御史欽宗靖康元年翰林學士許翰上奏曰臣聞萬人所聚必有公言傳曰防民之口甚於防川川大決而犯傷必多是以監謗而衰周亂禁言而強秦亡無逸之訓曰小人怨汝詈汝則皇自欽德不啻不敢含怒此疏川而導之之術也昔者鄭人遊於鄉校以議執政之善否或謂子産盍毁鄉校子産曰其所善者吾則行之其不善者吾則改之是吾師也毁之何為國家自王安石持矯拂世俗之説流弊至今其患可見陛下方將公聼並觀力矯此弊優容受納務盡羣情前日宰相吳敏留李邦彥止是避嫌分謗因以鎮撫士民而或者未達其心謂力排公議計或私相譏謗亦必責臣不言臣謂但使朝廷德日以勝則此等疑論自當衰熄竊聞臺臣論奏學校謗傷宰相中丞等事臣恐陛下遂行其言則將使忠鯁杜塞譏毁不聞朝廷蔽蒙復如前日此亂亡之機也不可不審伏望聖慈勿下其章以來四方之賢而通天下之志翰又上奏曰臣聞君子謂小人為邪小人亦謂君子為邪君子小人雜進於前而忠邪之説交至無已則人君何以定之臣前日始為中司為淵聖言明主之聽天下言陳之之日皆有册籍成敗既效賞罰隨之今如臣言某人忠賢某人姦佞某事如是而將成某事如是而將敗陛下退朝則籍其説審克夷考而卒不讎也則按臣之言而坐其妄夫如是則言者莫敢妄言黼扆之前都俞清矣又廷臣之間必有朴茂沈詳忠信不欺之士博詢熟察審得一人則衆言殽亂可質而定蓋忠邪之在朝廷譬如耳目鼻口之在人面已不自見而隆窊醜好人能昭昭言之是故君於諸臣雖甚近而難知得一信人在側則朝廷忠邪莫能相亂觀者易審故也夫君志不定則羣言繁興羣言不治則政法大亂古之明主能以其躬為天下正者無他精意不煩約而易守如斯而已矣右正言程瑀乞籍録臺諫章疏狀曰臣聞君猶心也宰執猶之股肱臺諫猶之耳目耳司聽目司視視聽不廢運用股肱無為於中而治者此心所以為真君也人君亦何為哉相與論治道者臺諫也相與行治道者宰執也天下之事不過利與害臺諫曰是宰執曰非人君察焉果非也過在臺諫不在宰執若以是為非則宰執何所逃罪哉宰執曰利臺諫曰害人君察焉果害也過在宰執不在臺諫若以利為害則臺諫何所逃罪哉萬機至繁吾之所用聰明者特在於審是與非辨利與害此以一應萬之要也茍不能致知乎此使是非利害灼然胸次則真贋不分朱紫混淆勞精疲神於末流天下之治不可冀矣蓋人非堯舜不能舉事皆善罔計其善而恱人讃已是謂求諂諛而成暗昧昔諸葛亮當主幼國新之際獨總朝政顧何所賴於羣下一旦發教乃諄諄力求轉相違覆以補曠敗太宗貞觀之治庶幾成康一時輔拂亦少貶矣嘗謂執政曰朕常恐因喜怒妄行賞罰故願公等極諫公等亦宜受人諫不可以已之所欲惡人違之使宰執能以此待臺諫人君能以此待宰執天下之治不難圖矣朝廷之事無過舉則臺諫何所復言及其有言必與朝廷違異乃所以相成也唯朝廷不以異已為嫌而事求其當則天下幸甚本朝之盛無踰仁祖稽考治迹蓋周成王漢文帝不足進焉宰臣則前有王曽李迪後有韓琦富弼執政則有歐陽修范仲淹之徒由今視之其人何如哉然當時諸臣深達治體朝廷之上既以務和而不務同至於臺諫有所論列不以人微而易之不以意異而詘之唯是之從而不嫌議不出已亦不難於改過從善當時議宰執以為奉行臺諫文書是不知此乃諸臣深達治道用心過人者洎王安石用事已來專以摧折臺諫為事然當時人材承纍朝養育而砥礪名莭之風不衰論議風生以斥逐為榮未為安石下也至蔡京用事師法安石而殘狠過之議已者置之死地臺臣引用私黨藉為鷹犬摶噬正士創置官司冗濫蠶食而諫省列位寢闕弗補惡政弊事流毒四方陛下既親見之臨御以來疏逺讜直之士布在臺諫虛已聽納下詔敦諭是誠有意祖宗之治矣然以臣觀陛下蓋喜受人言而未可謂之善用言蓋喜納人諫而未可謂之能從諫何者用言從諫必深思而熟計之當理則行不俟旋踵若受而不能用與不受同實無益也三代以降能用言從諫者無如漢髙祖唐太宗蓋髙祖智略初無踰人奮布衣取天下未嘗畫一策出一計唯其善用羣策非獨張良陳平之腹心外如酈食其婁敬之徒一言合理信用不疑此所以成帝業太宗脅父殺兄以就大事其天資何如哉唯其樂聞已過有諫必聽始也孫伏伽之徒賞之使言久之得魏徴往往諭意於言辭顔色之表不待力爭強辨此所以躬平禍亂而坐致太平人主誠欲聽言納諫以二君為法可矣陛下天性元良憂勤庶事聽言納諫宜無難者顧尚有愧於二君臣知其由矣陛下以沈晦為事而有纍於明以柔遜為事而有纍於斷明與斷兩未見焉而大臣承蔡京餘風不能以韓琦富弼諸人之心為心故臺諫章疏或阻隔而不行或稽留而不下未閲數月已有擠陷之事如余應求陳公輔者蹤迹孤外志操􅏮然金人在郊京師震恐之時抗章乞對慷慨論事蒙陛下延問開納兵過之後擢為臺諫士大夫方慶言路得人而應求等亦感激奮勵知無不言正道少伸邪人側目一旦論事稍涉嫌疑陛下未能洞察執政因而擠之是何異蔡京所為哉覆轍在前不憚蹈之亦可哀矣夫任耳目以廣視聽將以運用股肱今也壅蔽耳目有傷害之者矣陛下將誰與為治乎臣聞真宗時常詔諭諫官御史各令舉職仍令中書籍記其言事行與不行歲終具奏蓋非特稽所言當否用以知其人亦以防壅蔽之患伏望陛下特賜舉行仍內中創置臺諫章疏文籍隨所上録之聽政之暇雍容觀鑒不惟裨補治道因考其事有合行而稽留未進呈者時與督責執政庶幾耳目股肱之任不至偏廢而治道可望在明斷而行之臣備員諫省賜對之初已懇懇為陛下言之伏望曲留聖心天下幸甚右司諫陳公輔上奏曰臣竊惟陛下臨御之初詔求直言而太學諸生皆上封事陛下不倦聽覽又從而官之如張炳雷觀是已古者聽納之君雖堯舜禹湯不能過也然諸生竊有疑焉以謂陳東之書逺勝炳觀陛下不官東而官此二人非唯諸生不平炳與觀亦固厚顔矣臣竊思之陛下必謂東不當伏闕上書以致百姓紛亂夫東固未嘗與百姓期也李綱之罷東以忠義感奮恐其言不能上聞故率諸生伏闕爭之不謂是日百姓亦來臣詢之諸生皆曰方李邦彥等退朝百姓皆詬罵東與諸生力遏之既而百姓喧譁東皇恐憂懼面若死灰遽欲退避而百姓遮擁求出不得然則東豈有意率百姓為亂哉臣觀東非唯學問淹該善論天下事亦忠誠奮發之士陛下若用之於朝必能有為議者又謂東書深詆李邦彥而大臣有庇邦彥者不欲陛下官之如是則陛下欲以公議用人大臣以私意沮之也安能免人之言哉臣願陛下不惜一官以勸盡忠之士以慰太學諸生之心實天下幸甚臣職在言責茍有所聞不敢默默惟陛下察之御史中丞吕好問上奏曰臣聞之古人有言好惡不愆民知所適事無不濟又曰示之以好惡而民知禁夫所謂好惡者求合夫聖人之道不使邪説詖行害夫至當之理此用人之難未若聽言之難也陛下即位以來躬行莭儉視朝至於日旰求言甚切不問髙下屈已聽納此堯舜三王之用心也然而羣臣趨向非一識有淺深或有包藏私意務行其説或有遂其前非一逞怨忿此不可不察也本朝開基垂統一百六十餘年聖聖相承天下寧治可因可革未嘗拘執自章惇蔡卞首建紹述之説後蔡京得志專用此術以濟其姦建隆以來凡所施為皆棄而不講獨指熙寧元豐號為紹述及其所行有顯然違於熙寧元豐之法者則又曰此神宗皇帝之志也若以志言之何所考據何往而不可為哉此蓋妄假國論實為身謀已成之效灼然可知至於擠排善類箝塞忠言以正為邪以是為非行之數十年間遂使朝廷無可用之才有司無可久之法公私空竭敵人侵侮當是時也在廷之臣無有為朝廷施一嘉謀出一竒䇿者陵遲之弊一至於此其為蠹害見於今日伏自陛下受天明命表正萬邦首去邪慝招延善人天下之士解蒙釋蔽如醉醒寐覺四方稱快若出一口陛下前日手詔有云必求實是此乃為政之大體也然邪正難辨是非難分正者固自以已為正矣而邪者亦自以已為是也既自以為正既自以為是真偽相雜實未易分此乃用人之難未若聽言之難也陛下天資聖明理無不燭然衆言殽亂亦安得而遽辨之哉然臣有一説請試言之夫所謂實是者行之而朝廷尊安四民樂業乃為實是行之而朝廷困弱四民失業則非是陛下若驗之於已行之事已用之説則成敗可見不必逺求也臣前日面陳未盡委曲今輒敢再申其説浼瀆聖聽伏望陛下燕間之餘一賜省覽臣不勝拳拳之至監察御史余應求上奏曰臣仰惟陛下聖度如天容受忠讜之言未嘗少拒雖舜之好問禹拜昌言不過是也又取其尤者而爵賞之導人使言凡有知識孰不竭愚畢慮以貢芻蕘之萬一哉近者太學生陳東首為忠言獻之闕下皆國家大計人所難言姦佞惡之肆為浮言以誤天聽學官承指幾欲屏斥非賴聖明獻忠者身幾危矣太學正吳若數上書議論不撓言事者以為鼓唱諸生是致朝廷亦行罷黜如此則何以來天下之言伏望睿斷賜東一官還若舊職以昭陛下容受忠讜之心侍御史李光乞擇臺省官莭録封事劄子曰臣伏見陛下自即位以來懲創前日姦邪當國杜塞言路之弊於是增置諫員憲臺六察或得言事猶以為未也又許臣寮實封投匭職事官不應上殿人亦得引對開公正之路杜私邪之門海內聞風莫不稱慶今才數月未聞旌一直言用一正士而言路駸駸有壅塞之患近降指揮奏事既罷不得從容留身不合上殿人雖有指揮亦須覆奏議者謂陛下有厭言之意矣祖宗假借言事官虛懷聽納雖布衣之士必溫顔誘接至有辭氣狂悖者未嘗加罪今諫官御史一言逆旨旋被斥逐議者謂陛下有拒諫之實矣況今姦諛未盡去蠹壞未盡飭邊方未寧百姓匱竭更張廢置未盡合天下之公論慷慨獻忠者當纍及之或謂陛下已厭封事之多不暇省覽或付之三省密院大臣門人子弟得以傳播誠為非便臣伏見仁祖時嘗委張方平司馬光詳定中外所上封事盡心料簡合於義理可施行者雖文采不足一一奏聞光與方平亦嘗奏乞其間識慮稍出於衆開陳政體時務文理詳明者乞特賜召對面加詢訪果有可採密籍姓名隨材擢用今太平日久誠為多士之時所獻封章豈盡無可觀採臣愚伏望聖慈檢會祖宗故事專委兩省或臺諫官二員擇其公忠端亮者俾之遴選據所可取者莭録成册每季進呈以備乙覽忠言嘉謀庶有裨益以輔成陛下中興之治天下幸甚時李光程瑀以言事落職中書舍人許景衡上奏曰臣竊見近年以來臣下阿比務為壅蔽凡政事之闕失生民之疾苦皆不得聞于朝廷所以養成前日之禍伏自陛下即位首開言路以通下情故侍從臺諫官獻忠請對者無日無之而陛下優容開納見于玉色此誠二帝三王之用心也天下幸甚近者李光言事上忤威顔已降指揮落職與小郡昨日又聞李光程瑀並送逺小處監當臣竊惟李光程瑀皆以忠鯁敢言為陛下識擢置在言路其先後建白皆蒙施行識者方慶陛下得人以為宗社之福今日偶緣思慮不審所論未契聖心陛下憐其愚直諒其無他故李光與郡而程瑀為郎既正典刑斯亦足矣忽有後命竄之遐方聞者愕然莫不震駭以謂陛下初政乃是求言納諫之時孜孜詢訪委曲涵容猶恐人不敢言若一旦震怒併逐言者則是杜絶忠義之口今後雖有見聞誰復敢言也況今元元困悴未被膏澤邊方猖獗太原圍閉政事尚多闕失小人敢肆欺罔正賴臺諫敢言指其姦謀以折禍亂之萌奈何偶因論議過差遽投諸荒裔耶記曰舜好問而好察邇言隱惡而揚善蓋言舜於聽納之際善則揚之惡則隱之不加罪也至於鯁亮有守見于已試者不獨不加罪深可為朝廷惜之今李光程瑀一介小臣似不足惜而臣所惜者在於朝綱之不振忠義之難立而言路之梗塞也伏望聖慈上念祖宗優容言者之意深鑒近年壅蔽之失三復帝舜隱惡揚善之言曲賜開宥二人者特免逺竄之罪李光乞只依近降與郡指揮而程瑀亦乞與郡於以養忠臣義士敢言之氣以為宗社無窮之計天下幸甚臣不勝惓惓祈天俟命激切屏營之至臣職在論思茍有所見不敢隱默僭瀆天聽罪當萬死惟陛下赦之髙宗建炎三年司諫趙元鎮論聽納不諱疏曰臣聞治安成於所憂而禍患生於所忽古之人君所以兢兢業業不敢逸豫者慎之至也昨未渡江時朝廷便謂無事志得意滿偷安茍容士大夫知其惡聞邊患也則務為太平之説以投合其好亦因以得美官爭先相髙唯恐説之不售而聽者滋惑矣於是忽其所憂緩其所急儲金帛修禮文偃然為輕逺之謀而無復外寇之慮一旦倉皇難作不復支持譬猶病者諱而不語人或告之以病證之萌則怫然不説其不至於喪亡則幸也方事之初以為得計漫不加省為患必深至其已然悔恨何及臣願陛下防微杜漸每唯禍亂之憂屈已虛心不以顚危為諱或進言之人謂強敵已驕不難殄滅盜賊細故不足剪除如某人之為將可倚於成功如某處之財力可取以足用此維揚之遺風諛佞之所為也亦願陛下力拒其言不以容恱見納亦猶病者眷眷焉唯求安是念雖復沈痾之痼而良醫善藥日簉門下庶幾其有瘳矣區區愚忠敢以此為獻唯陛下留神省察張浚上奏曰臣聞聽言之難自古記之是以書稱先王之盛必曰侍御僕從罔匪正人僕從之微亦必精擇蓋以言語之間有興衰禍福所自起者使左右茍非正人則聽言之間人君不能無至於惑亂也臣嘗謂小人進用讒説必投隙乘間不正名其事彼其挾私負怨朝夕經營固出於有心或因進詼諧之説或假託市井之論夤緣附會其端甚微而人君以萬機之衆憂勞天下其於聽言之際奚暇再三思慮以決擇是非是以小人之志常得行於天下而使濫被謗逐者往往歸怨於人君臣以謂欲盡聽言之道莫若親君子而逺小人蓋不知是雖有大過人之聰明亦不能無過聽之失也可不謹哉可不戒哉紹興間浚又議聽言之難曰古語有之築舍道旁三年不成蓋言之者多則聽之者惑自然之理也帝王之道聽雖欲廣斷惟務獨故成湯之伐桀百姓以為我后不恤我衆舍我穡事而割正夏主其議者伊尹而已武王之伐紂雖夷齊之賢亦叩馬而諫風雷暴作皆有疑心主其議者太公而已今日之事以中國而攘夷狄以君而討臣以有道而誅無道雖遲速小大所舉不同終在夫力為之而已矣往歲江湖皆旱獨二浙豐稔故可以給軍須靖百姓向使浙亦被災則大事已去惜乎議者之不及此也機不可失敵不可縱時不再來昔人論之詳矣臣去國踰旬憂慮倍積惟恃陛下主之於內故不憚譊譊之言冒瀆天聽所冀曲賜照臨也建炎中編修官胡銓論賣直疏曰臣聞太祖皇帝欲拜昌言于斯時也衆賢萃於本朝如臯夔稷契莫不畢集服讒廋慝如行竒好窮之流莫不畢屏八紘之內莫不畢清雕題左衽繩山柎海至險絶者莫不畢臣國家之綱紀法度號令文章莫不畢舉四民莫不畢理螕蠹萌蘖凡蠢茁之類莫不畢遂三光全寒暑平上而薄蝕仄慝之異下而朐䏰甲拆之孽莫不畢息殊祥異瑞四靈之物莫不畢至鳥獸魚鱉四擾之屬莫不畢滋而在庭百執事豈復有一善或遺一言不聞於上者乎雖至於匹夫匹婦之賤豈復有一善或遺一言不聞於上者乎其朝夕納誨之士豈復有一毫能裨時政之闕者乎其竒謀碩畫豈復有加於太祖之智慮者乎然而方且渴聞昌言若不可得而遂欲拜之惟恐一善或遺一言或不聞以害吾治道也惟恐一夫不被其澤以害吾仁政也如太祖之心假使其時政治一有不至教化一有未善則將焦心勞思臥薪嘗膽以圖之豈特欲拜昌言而已乎厥今天下何如哉臯夔稷契之疇能畢集乎服讒廋慝之流能畢屏乎八紘之內能畢清平雕題左袵之國能畢臣乎綱紀法度號令文章能畢舉乎四民能畢理乎螕蠹萌蘖蠢茁之類能畢遂乎薄蝕仄慝之異朐䏰甲拆之孽能畢息乎殊祥異瑞四靈之物能畢至乎鳥獸魚鱉四擾之屬能畢滋乎在庭百執事舉無一善或遺一言不聞者乎匹夫匹婦舉無一善或遺一言不聞者乎而在庭之士頗以箝默為賢容恱為髙側聞道路之言近日臺諫論事陛下謂為賣直臣未知信否陛下自登大位樂聞讜言四海欣欣皆以為將見太平則道路之言決不足信然自頃以來張震之去西省一空王十朋之去臺列一空王大寶之去諫苑一空金安莭行又去矣是瑣闥又將一空也以此觀之道路之言容或可信夫賣直之言唐德宗之言也德宗猜忌臣下謂薑公輔為賣直史臣書以為戒德宗一出此言忠臣結舌直士杜口馴至興元之變其末流遂有甘露之禍害及忠良所謂一言足以喪邦德宗有焉臣願陛下以德宗為戒以太祖為法則天下幸甚銓又上奏曰臣居窮山間田父野老相語以為陛下虛心納諫有髙祖之風臣聞其言竊自喜躍以謂聽諫最帝王之難事惟寬容大度之主能之故禹戒舜曰無若丹朱傲周公戒成王曰無若商王受之迷亂舜成王豈有是哉而皆優容寬貸略不加罪古今以為美談陛下虛心納諫誠如髙祖太宗則舜成王何逺哉然唐文皇最號能納諫者及其志滿意驕聖慮漸解寖不克終魏徴深以為言臣愚願陛下始末不渝毋若唐宗之解慮則天下幸甚知開封府宗澤上奏曰臣伏聞李綘見憲宗于浴堂殿帝曰比諫官多朋黨論奏不實皆陷謗訕欲謫其尤者如何綘曰此非上意必憸人以此熒誤上心自古納諫昌拒諫亡夫臣進言於上豈易哉君尊如天臣卑如地加雷霆之威彼晝夜思度如欲陳十事俄而去五六及將以聞則又憚而削其半故上達者才一二何哉干不測之禍顧身無利雖開納奬勵尚恐不至若譴訶之使杜口非社稷利帝曰非卿之言我不知諫之益且人君深居嚴密又以旒纊蔽其聰明所以見天下之是非聞天下之情偽者蓋用諫官代為耳目俾姦邪讒慝不敢掩其不善而見其善者唐髙祖太宗初即位嘗賞孫伏伽蘇世長以激諫臣恭惟陛下聲色貨利弗邇弗殖捨已從人樂取諸人以為善固無可諫者至於臣下懷姦藏慝嫉賢蔽善敢肆欺罔茍朋比者當使耳目之臣廣其聞見瀝心彈糾毋有所隱以絶後艱髙宗時監察御史鄭剛中上奏曰臣竊聞樞密院編修官胡銓上書論使事其言狂悖力詆大臣聖恩寬容不賜誅戮聞止除名送昭州編置可謂父母之矣然臣區區尚欲一言者非謂銓無罪也銓愚瞽冒昧曾不審詳冥行妄發譴竄何憾臣獨以陛下南渡以來未嘗拘顧忌諱逐一言者豈不以時方艱難事功未濟與其罪狂夫而容有後悔曷若并包並受以來天下之言故內懷一槩者雖伸吭感激怨咨天地陛下率聽而納之如是者有年矣今也豈不能容一胡銓以增盛德之光乎重念銓一介書生坐無識見但聞衆論訩訩實不知使事曲折原其用意亦為愛君銓本貫吉州奉老母于此銓竄逺去毋將疇依陛下方孝友格天欲成和議若置銓於聖度之內使其子母相保不至狼狽誠莫大之恩也臣不勝禱祈之至冒犯天威罪當萬死經筵官張栻講葛覃先王正家之道因及時事語激切髙宗意不懌國子博士李彥頴上奏曰人臣事君豈不能阿諛取容栻所以敢直言正為聖明在上得盡愛君之誠耳書曰有言逆於汝心必求諸道帝意解遽曰使臣下皆若此人主應無過矣殿中侍御史張守論聽言劄子曰臣聞良藥有苦口之利明鑑無見疵之尤故人臣以獻言為忠人主以聽言為賢然聽言之難從古所患書傳所載不可勝舉願治之主每區區聽納而或不免過聽之失者不得其要也臣嘗求其要未有若伊尹告太甲之言為切且至也其言曰有言逆于汝心必求諸道有言遜于汝志必求諸非道臣試為陛下論之夫逆心之言未必皆合乎道然未見人主所向而言志在責難則鮮有不逆者要當以道求之遜志之言未必皆違乎道然或伺人主所向而言志在容恱則鮮有不順者要當以非道求之從違之際祻福成敗如反覆乎大抵人心喜順而惡逆遜志則易入逆心則難行人主能於常情所惡而求其是於常情所喜而求其非然後智出衆人之上而羣言不能惑君子小人之情狀皆即吾心逆順之間而知之不亦簡且易乎又況逆心之言雖衆每不能勝遜志之一言尤不可不察請以一二事明之唐髙宗志在廢王后而立武氏也韓瑗來濟上官儀輩莫不切諫以至受遺定策如長孫無忌之親褚遂良之忠皆以為不可獨李績曰此陛下家事何須問外人卒立武氏而篡奪之禍幾至亡國秦苻堅志在伐晉也權翼石越苻融輩更進互説以至老將如王猛親且愛如太子宏少子詵皆以為不可獨慕容垂曰陛下神謀內斷足矣不煩廣訪朝臣以亂聖慮遂定計南伐而淝水之敗僅以身免則是遜志之一言足以喪邦而逆心之言莫能救藥二君不能即所逆順而求之於道與非道之間祻敗至於如此豈不痛哉恭惟陛下聰明勇智出於天縱從善有轉圜之易去佞無拔山之難屢詔求言虛心納諫廣覽兼聽極羣下之智然臣區區之私猶恐陛下或未得其要也蓋自崇寧以來姦諛柄朝防民之口甚於防川靖康之後言路一啓而狂瀾橫流餘波未泯要當執要以觀之況二帝蒙塵四方多事臣願陛下以伊尹之言不忘於造次之際正心誠意終始惟一視君子小人如燭照數計則紀綱無患於不立鄰敵無患於不服中興之業無患於不成矣守又乞賞直言劄子曰臣伏見陛下以常寒久隂詢訪闕失聖心焦勞形于詔旨在廷之人各進所言無慮數十人竊恐其間不無忠義切直之言可以禆聖德而贊國論者伏望陛下乙夜覽觀因其切直或加奬諭或與褒擢一二庶知聖明不諱亦以示罪已畏天之實誠於盛德不為小補昔唐太宗受孫伏伽之諫而賜蘭陵公主園受魏鄭公之言而賜佩刀黃金之類所以三代之後獨稱賢王貞觀之治比隆三代惟陛下留神天下幸甚守又上奏曰臣伏見自崇寧迄于宣和之間姦臣擅政專欲蔽欺人主之聰明故拾遺補過之臣多闕而不置於是直言不聞譽諛之聲日滿於耳馴致變亂社稷阽危遺患至今陛下纂臨明目達聰廣覽兼聽利害休戚惟恐其或壅也而臺諫之臣尚多員闕諫官止有一員言事御史除馬伸差出止有二員非惟於聖主中興之朝為闕典亦恐四方萬里或得以竊議則於陛下聽言納諫之大德不能無纍蓋以臺諫之任宰執往往避嫌不敢進擬欲望睿斷特加選除庶幾博採衆言有禆聖治且以仰稱陛下聽言納諫之實守又上奏曰臣伏見陛下自渡江以來懲前日蔽塞之祻大開言路訪問闕失親擢臺諫言雖激切未嘗加罪盛德日躋逺近臣民拭目傾耳以觀日新之政前日諫官袁植論事專尚誅殺陛下罷之仰見聖心務崇忠厚亦甚盛之德也然逺近臣民未免有斥逐諫臣之疑臣竊惜之言事之臣嫉惡或過勢使然也行與不行亦必考於朝論斷在聖心使其失中姑置勿問似於聖德未有所傷又況耳目之官每患循默而不敢言與其敢言而或過則猶愈於循默蓋敢言而過不過於難行若循默不敢言則為患實大臣備員風憲若復不為陛下開陳臣則有罪惟陛下裁赦章誼上奏曰臣竊聞臨安府察推沈長卿等四人上書論時政利害語侵宰相引過辭位不敢視事陛下體貌大臣特降指揮停廢四人以全眷遇之禮可謂厚矣然臣竊見陛下纍年以來開廣言路容納狂直天下士庶自以遭遇聖明願效懇悃雜然並進雖有犯分失理之辭終懷憂國愛君之意率蒙優假此盛德之事也今兹四人所陳輒於政事之外别為侮誚之語上瀆帝聰下駭衆聽陛下卓然逺見慮傷國體謂貸此四人則宰相不敢復安厥位遂申典憲有此指揮臣採之衆論以陛下難傷大臣之意欲使決留輔政而正四人之罪則可也若宰相既感恩遇許陛下以驅馳而奉行詔旨不貸四人之罪則不可也四人之罪不蒙貸捨則是宰相無念愆自訟之懷而致聖主有罪言拒諫之失非所以昭大信於天下也傳曰吾聞修德以消怨未聞作威以防怨防民之口甚於防川川壅而潰傷人必多君人之尊猶不敢作威以防怨況宰相乎伏願下臣此章以示大臣庶幾全聽言之美而君臣並受其福誼又乞貸進士吳木以開言路狀曰臣竊觀自古人君開廣言路使之無壅者未必盡得天下至當之言亦未必盡用言者之説以損益天下之政事進退天下之人才其意蓋以謂下情不通則視聽蔽塞視聽蔽塞則人之賢否事之利害有不及知而危亡禍亂之幾或藏於其間誠不可忽是以博資獻納髙視逺聽故能坐於室而見四海不降階序而運天下此要道也陛下灼知此道君臨萬邦比年以來優遊法宫而天下是非利病日陳乎前固於進言之人孜孜欣納矣近有湖州進士吳木上書陳説時事以其副本赴御史臺乞行繳進臣嘗見其言焉中間泛論宰相政事又指言參知政事營庇等事其言之當否心固知之矣其事之是非固已不逃於陛下照臨矣纍日以來不聞引過辭位而聞進士吳木編管徽州衆論甚駭夫布衣士上書論宰相參知政事而居其位者不以為過則必自以為無愧於心亦當自辨於陛下之前矣故視事自若也自辨於陛下之前者臣與天下之人固不得而知然進士吳木因上書得罪則天下之人將盡知之矣若是則其責可以自辨陛下得而察之也天下謂陛下編置言事之人其咎將使誰辨之哉臣伏望睿明追還所降編管吳木指揮以自辨於天下不勝幸甚誼又上奏曰臣近聞給事中陳戬請對因有劄子論奏執政樞機之臣間於都堂密院燕衣便服接見將帥於是樞府大臣引愆待罪陛下亦察其沿襲之久亮其無他已許樞臣視事如故然自此以來堂陛益峻體貌益崇不為無補昨日乃聞陳戬繼有奏請乞任宫祠陛下至仁從欲遂降除郡指揮而搢紳之士不知其由謂戬近因言事遽蒙補外雖臣亦竊惑之臣謂朝廷言語侍從之臣本以獻納論思為任今一有持議便令去國則疏逺微賤之人誰肯為陛下開口論天下之事哉設使戬因自陳欲便私而陛下矜其潛邸舊人俯徇所請則今日何等時也人臣豈自便之時哉陛下日求言事之人唯恐不獲今次對之臣肯為朝廷論事如戬者幾人而陛下又聽其去則陛下深居髙拱遂成孤立矣孟子謂齊宣王曰王無親臣矣昔者所進今日不知其亡也言人君於可親之臣不宜捨去之遽也伏望聖慈鑒孟軻之言慎用捨之柄還戬從班以釋衆惑不勝幸甚誼又上奏曰臣近者曽奏陳湖州進士吳木緣上書指言宰執蒙朝廷送徽州編管乞恕木狂直之過特行釋放又奏給事中陳戬因論大臣於都堂樞府便衣接見將帥蒙朝廷與郡乞容戬敢言之忠特還舊職二項奏陳經今纍日伏蒙陛下恩容覆露不以臣言為非未賜斥逐臣愚庸無知既被涵貸復冀聖度開廓俯徇臣請以廣言路臣竊惟兩人所論皆執政大臣其當否雖未可知然咸有憂國愛君之心無附下罔上之罪陛下初恐大臣因此惶懼不敢自安遽為進退是以略賜行遣今來大臣安職衆情喁望若此兩人未蒙照察則自兹以往人主之勢漸孤大臣之權漸逼進言之路漸壅懷姦怙寵排陷端良之士者漸得肆志矣臣不勝區區伏望聖慈檢會臣前奏特賜施行不勝幸甚洪遵進故事曰齊威王召即墨大夫語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使人視阿田野不闢民貧苦昔日趙攻甄子不能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆烹之於是齊國震懼人人不敢飾非務盡其誠齊國大治臣聞唐魏徴嘗謂太宗曰人主兼聽則明偏聽則暗誠哉斯言甚矣為君之難也深居九重而四海萬機之重叢然鼎來極吾之聰明知慮無以周知自非博聽廣納未見其有濟也齊威王即位九年當戰國之際干戈日尋諸侯交侵奔命不暇一日察見毁譽召二大夫而誅賞之上下震懼至於莫敢飾非齊國大治強于天下向使威王玩歲愒日行姑息茍且之政慶賞刑威不能一施之欲其紀綱之振法度之行是猶倒馳而求跂前人不亦左乎漢文帝召季布於河東而復還之布曰陛下以一人譽召臣以一人毁去臣文帝漢之賢主也毁譽是非之間猶不能察況其下者乎然則威王之於文帝其優劣不待較而可知矣吕頥浩上奏曰臣嘗考自古安危治亂雖係人主設施之當否而其大要尤在於察言蓋大偽之言似乎大真大姦之言似乎大忠茍人主不能察則是非善惡莫知適從姦言有時而用矣昔酈食其請立六國後髙祖聽張良八難之説輟食而罵之封倫陳刑名之説太宗不從而從魏徴仁義之言此二帝所以終能摧勍敵而建至治也然則開言路者帝王之盛德至于察言者明主之英斷也臣嘗觀靖康之初淵聖皇帝覽宣和間壅蔽之患故大開言路是時臺官得言事諫官得言事六察官亦得言事侍從官得言事下至士庶皆得實封言事又或士民率衆伏闕言事議論紛紛何暇察其言之是非哉不知避敵誤二聖北遷者羣言鼓惑之罪也去年冬末金人分三路追襲車駕是時廷臣皆以航海為非惟陛下英明獨斷必為海道之行至於今日帖然無虞萬一今歲敵人不渡江則是天地神明相祐陛下使我休息歲餘得為備禦之計也夫難得而易失者天之時難成而易敗者人之功臣願陛下愛惜分隂汲汲圖之總攬羣策而察其言之是非凡人之言其利害成敗有益於興衰撥亂者必從之不然不從也凡人之才智略謀慮有益於興衰撥亂者必用之不然不用也廟堂近臣所獻計策參照已行之事驗其言之是非則人不難知矣夫一夫獻謀百夫聚而非之則其謀必不得伸也一夫欲行百夫起而沮之則其事必不行也昔陳蕃有言曰成敗之機在察言臣屢以此説獻陛下伏願留神省察歷代名臣奏議卷二百五
