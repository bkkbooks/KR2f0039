body:
  text: 歷代名臣奏議卷一百八十二明楊士竒等撰去邪宋欽宗靖康元年左正言崔鶠上奏曰臣伏覩詔書詔諫臣直論得失以求實是此見陛下求治之切也然數十年來王公卿相皆自蔡京出其餘擢居要路以待相繼而用者又充塞乎臺省要使一門生死則一門生生一故吏逐則一故吏來更持政柄互秉鈞軸歷千百年無一人立異雖萬世子孫無一人害己此蔡京之本謀也安得實是之言聞於陛下且如馮澥近日上章其言曰熙寧元豐之間士無異論太學之盛也此姦言也昔王安石用事除異己之人當時名臣如富弼韓琦司馬光吕公著吕誨吕大防范純仁等咸以異論斥逐布衣之士誰敢為異乎士攜策負笈不逺千里遊乎學校其意不過求仕宦耳安石著三經之説用其説者入官不用其説者黜落於是天下靡然雷同不敢可否陵夷至于今大亂此無異論之大效也而尚敢為此説以熒惑人主乎又崇寧以來博士先生狃於黨與各自為説附王氏之學則詆毁元祐之文服元祐之學則詆誚王氏之説尤為欺罔豈有博士先生敢有為元祐之學而詆誚王氏之説乎自崇寧以來京賊用事以學校之法馭士人如軍法之馭卒伍大小相制內外相轄一有異論居其間則纍及上下學官以黜免廢錮之刑待之其意以為一有異論則己之罪必暴於天下聞於人主故耳博士先生有敢詆誚王氏者乎欲乞下太學取博士講解覆視則澥之誕謾見矣至如蘇軾黃庭堅之文集范鎮沈括之雜説畏其或記祖宗之事或記名臣之説於己不便故一切禁之坐以嚴刑示以重賞不得藏匿則禁士異論其法亦已密矣澥言為元祐之學詆誚王氏之説其欺罔不亦甚乎欺罔之言公行則實是何從而見也然先王之求實是亦有道矣皇帝清問下民周官詢于衆庶孟子不以左右卿大夫之言為然必詢于國人則實是見矣臣乞以澥所上言章并臣之章垂于象魏揭于通衢以驗國人之論而賞罰之以戒小人欺罔君父者此陛下之福天下之幸也鶠又論馮澥狀曰臣近上章論諫未蒙施行澥復遷吏部侍郎此士論之所共憂臣適當言責不得而已也觀澥之意不過於拘以熙寧元豐之法為治緣澥乃熙寧元豐人材之一也已之説行則身安己之職廢則身危非為國家忠計此天地否泰所係國家治亂之所自分不可忽也昔在仁宗英宗時選天下敦朴敢言之士以遺子孫而王安石用事皆目為流俗之人盡逐去之乃自為新説以造士號為新美之材充塞乎朝廷而人主不聞天下之安危矣元祐之初相司馬光收仁宗英宗時人才用之故宣仁聖烈皇后擁少主不出簾帷而天下治問其四夷則率服矣問其盜賊則消弭矣問其軍士則豫附矣問其百姓則富樂矣當是時天下之勢安於泰山及章惇用事斥之於炎荒瘴海之外蔡京隂蓄異圖凶謀益熾於是盡收熙寧元豐時人材用之誘以美官餌以厚祿於是海內小人波蕩而從之萬口一詞迭相唱和為紹述之論以誑惑人主紹述一道德而天下一於諂佞矣紹述同風俗而天下同於欺罔矣紹述理財而公私竭矣此用熙寧元豐人材之效也譬之治疾一醫治病而病愈一醫治病而病壞此賢否不待較而明也且元符末以連年四月朔日食四月者正陽之月古人所忌詔求直言應詔上書者數千人蔡京因此以除去異己者乃遣腹心之黨考定之分邪正二等同己者為正異己者為邪澥與京同者也故列於正等擢以不次而異於京者京皆指以為邪陷於罪戾凡數千人近者上皇下責躬之詔其言以求直言奪於權臣反歸咎建議臣僚然則前日附會蔡京號為上書正等之人皆今日之罪人也陛下嗣服之初天下觀陛下好惡是非以卜世之盛衰今用蔡京正等之人非上皇悔過之意天下之士聞之解體矣同己為正異己為邪澥與京同者也故列於正京之術破壞天下於兹極矣尚忍使其餘蠧再破壞邪京姦邪之計大類王莽而朋黨之衆則又過之願斬之以謝天下纍章極論時議歸重諫議大夫楊時論王安石學術之繆奏曰臣伏見蔡京用事二十餘年蠧國害民幾危宗社人所切齒而論其罪者曾莫知其所本也蓋京以繼述神宗為名實挾王安石以圖身利故推尊安石以王爵配享孔子廟廷而京之所為自謂得安石之意使人無得而議其小有異者則以不忠不孝之名目之痛加竄黜人皆結舌莫敢為言而京得以肆意矣然則致今日之禍者實安石有以啓之也謹按安石挾管商之術飾六藝以文姦言變亂祖宗法度當時司馬光已言其為害當見於數十年之後今日之事若合符契其著為邪説以塗學者耳目敗壞其心術者不可縷數姑即其為今日之害尤甚者一二事以明之則其為邪説可見矣神宗皇帝常稱美漢文惜百金以罷露臺曰朕為天下守財耳此謹乃儉德惟懷永圖正宜將順安石乃言陛下能以堯舜之道治天下雖竭天下以自奉不為過守財之言非正理曾不知堯舜茅茨土階未嘗竭天下自奉其稱禹曰克儉于家則竭天下以自奉者必非堯舜之道其後王黼朱勔祖其説以應奉花石之事竭天下之力號為享上實安石竭天下自奉之説有以唱之也其釋鳬鷖守成之詩於末章則謂以道守成者役使羣動泰而不為驕宰制萬物費而不為侈夫鳬鷖之五章特曰鳬鷖在亹公尸來止熏熏旨酒欣欣燔炙芬芬公尸燕飲無有後艱詩之所言止謂能持盈則神祗祖考安樂之而無艱難耳自古釋之者未有為泰而不為驕費而不為侈之説也安石獨倡為此説以啓人主之侈心其後蔡京輩輕費妄用専以侈靡為事蓋祖此説耳則安石邪説之害豈不甚哉臣伏望睿斷王安石學術之謬追奪王爵明詔中外毁去配享之像使邪説淫辭不為學者之惑實天下萬世之幸疏上安石遂降從祀之列監察御史范宗尹乞革欺罔之風上奏曰臣竊謂方今天下之事可革者甚衆而欺罔之風革之尤不可緩夫鹿之與馬相去逺矣然髙謂鹿為馬而二世惑焉者蓋以天下而欺一人故也以天下而欺一人其禍可勝言哉臣觀國家自崇寧以來上自宰輔大臣下至州縣賤吏莫不以欺罔相尚是以財用匱竭生靈愁痛災異數見盜賊羣起而道君不知也前日之禍職此之由今陛下纘紹之初國步艱難之際正當明四目逹四聰之時而臣下尚有肆為欺罔者使此風復熾則天下之禍將有甚於前日者矣願明詔臺諫自陛下即位以來中外之臣有曾為欺罔者事無巨細已敗未敗悉仰撿舉彈奏以聞然後聲其罪於天下而重加誅責使天下曉然知欺罔不可復為則陛下深仁厚澤得以究矣欽宗時侍御史李光論王雲等劄子曰臣近合臺諫官論列童貫開邊生事擁兵南奔罪積惡大黨類實繁雖難以盡行究治亦當擇其蹤迹暴著助成姦惡者顯戮一二以為搢紳之戒如同簽書樞密院事宇文虛中給事中王雲是也燕雲之役二人參議幕中實為謀主貫固未嘗知書每奏報朝廷一時欺謾誇誕之言皆出其手敵騎入寇隨貫馳入都城張大聲勢決東幸之策朝廷震驚進虛中為資政殿學士充撫諭使雲為給事中奉使募兵當危急之時四方勤王之師未有至者陛下躬宵旰之憂大臣窮日夜之慮二人既以計脫擁兵自衛徘徊近畿隂拱以觀成敗及聞西兵稍集和議已定單身入城復據要近士論訩訩莫不憤歎樞密本兵之地瑣闥清近之班儻使此流冒居將何以責士大夫守臣節者乎恭惟陛下嗣位之初四方之人延頸跂踵以望新政所與謀議獻納者不過二三執政大臣與兩省侍從尤當選忠賢以副人望治亂安危之機實在于此如虛中等姦欺詭詐為臣不忠乃復崇奬進用如此臣恐逺方聞之人人解體仗節死義之士亦不復為陛下用矣伏望斷自宸𠂻重行竄斥以解天下之疑不勝幸甚光再論王雲等劄子曰臣近嘗論列同簽書樞密院事宇文虛中給事中王雲身為士大夫職列侍從朋附童貫贊助開邊使兵連禍結及敵騎內寇朝廷憂危將命募兵逗撓不進前後臣寮交章定虛中雲罪與王蕃等蕃已責授散官安置議者猶謂輕典獨此二人赦而不誅已駭物論今乃反置近列居密勿獻納之地急則用計而脫禍緩則詭辭而冒榮専為身謀無復人臣之節兼近年以來士大夫交結宦官浸以成俗虛中為翰林學士雲為中書舍人皆朝廷華選貫皆倚為腹心每用兵行師皆有將帶前去之語靦顔就道曾無愧恥陛下初即大位拔用人材宜以禮義廉恥風厲士類若不痛加懲革則後來者更相倣效廉恥之道愈喪而禮義之俗浸隳矣夫人君養士之廉恥所以重其國士之有廉恥亦所以重朝廷唐李鄘恥為吐突承璀所引卒辭相位史氏書之以為美談今虛中輩姦纎趨利庸近凡鄙交結近習迹狀明白辱國甚矣伏望檢臣前奏付外施行早賜罷黜以厭公論不勝幸甚光又論曾紆等劄子曰臣惟國家之興神聖相授専務愛育元元以固邦本而四海之廣所與共冶以惠養斯民者尤在於守令監司之職委以刺舉實外臺耳目之寄専以按察州縣者也其任顧不重哉伏自陛下即位以來號召天下豪傑之士聚之朝廷而貪汙不法之吏多在外服或倚勢作威或倚法虐下誅求掊斂靡有藝極使逺方之民無所申訴朝廷何賴焉臣伏見江西轉運曾紆福建轉運趙岍唐績提舉市舶張佑提舉廣東香鹽黃昌衡府界提舉常平陸棠皆緣交結權幸以躐取名位邪佞凶狡素無廉聲皆不足以當一道之寄岍績逺任福建漕臣朝廷近差陳磷等為代遂通賄賂於梁師成以造茶為名不肯離任佑本泉州大商今市舶廨治乃在泉州背公營私何往不可近聞營造第宅盡令屬邑科買材木贓汙不法一方之民咸受其弊昌衡棠皆奴事朱勔昌衡頃知秀州華亭縣抑勒人户依等第科買白鶴每隻至有百餘千者自秀至蘇花石珍禽絡繹不絶遂就除本州通判益肆掊取東南之民莫不憤怨棠知平江府長洲縣専一勾當朱勔家事民間訟牒悉委佐官平江地瀕太湖勔田産盡在長洲縣多被水患民間不肯承佃棠既為抑勒上户佃種稍不承認即枷項送獄承認之後永無脫期至破家蕩産賣妻鬻子猶監錮不已良民妻女稍有姿色者必多方鈎致百姓田園號為膏腴者必竭力攘取以搜尋竒玩而發人籠篋者有之以訪求古物而掘人冢墓者有之紆故相布之子因諂事宦官進職賜帶頃任楚州及鎮江府通判皆以本州娼女自隨替罷挈之而去帷薄荒穢父子聚麀尤為清議之所不容伏望聖慈特降睿旨盡行竄斥以正刑書仍乞精擇廉幹修潔素有風力之人以充監司之選庶幾朝廷惠澤得以下究細民疾苦得以上聞仰副陛下勤恤民隱之意天下幸甚光又論朱勔等劄子曰臣恭覩陛下自膺受大位獨奮乾剛誅流姦凶四方之人莫不鼓舞獨朱勔父子未就殱夷士論猶鬱勔肆姦惡踰二十年専以竒技淫巧熒惑朝廷花石之供毒流海宇竭百姓膏血罄州縣帑藏一門之內建節正任厮役姻親悉補官爵權傾中外濁亂朝綱名為應奉御前其實盡入私室錢榖出入不許驅磨計其姦贓擢髮莫數臣近嘗論奏方兵與之際上下匱乏宜修理財之政當自東南始雖諸局支用難以幾察而有司帳籍尚可驅磨欲望陛下擇有風力清強官就兩浙近便處置司追攝勔父子并其姪汝翼汝賢等及自來専一應副嘗為監司守令力能刻剝生民助其凶焰除徐鑄王汝明蔣彞已死亡外今新除工部尚書胡直孺前發運使盧宗原陸置前兩浙提刑王仲閎胡邃前兩浙提舉常平趙霖前知平江府應安道通判陸棠許操司録周把前知常熟縣宋晦前知秀州華亭縣黃昌衡淮南運使余賙前知秀州朱審言并諸司吏人已未出職並乞勾赴所司一就根勘驅磨自來應副過錢物計其家資盡行籍沒內有百姓田産元係強奪侵占者據契撥還勔父子罪惡滔天非明正典刑戮之市朝不足以快東南士民怨憤之氣上項官吏各具罪犯取旨以次黜責施行庶幾士大夫冒犯廉隅為臣不忠者有以警懼實天下幸甚光再論朱勔劄子曰臣嘗論列朱勔將東南財用假託應奉脅制州縣盡入私家合依祖宗故事置司驅磨未蒙施行此必朝廷見官吏人數頗衆恐致生事遂降指揮特免驅磨近亦報勔止從竄斥此於公議實為未厭臣按勔在東南為害日久田園第宅富擬王室房緡日掠數百貫租課嵗收百萬斛曵綺羅者列屋衣金紫者充庭展南宅以套司理院拆北倉以為養種園監司經由郡官朔望例於門外下馬謂之朝謁其葬汝翼母福國夫人通判許操權府率郡官朝服步從三十餘里衆所駭聞近者上皇南巡勔自知罪惡貫盈與童貫合謀邀請百端私造乘輿服御之物掃除室宇潛謀異圖率斂豪民幾至生變幸賴上皇念宗廟社稷之重車駕還歸迹其姦萌理難容貸伏望陛下斷自淵衷將勔并其子孫姪付之有司籍其家資明正典刑仍乞委本臺官吏取索東南應奉司及杭溫明州平江府等置局去處并應副官吏依近降京東西兩路李彥指揮施行光又論鄧雍劄子曰臣伏覩近降指揮今之尚書侍郎異日宰執之選也都省所接詞訴分送六曹與決施行陛下責任之意可謂重且専矣則居是職者非得天下英偉豪傑之士智識材器可當異時輔弼之選者曷宜任此職臣謹按吏部侍郎鄧雍不學無術世濟姦邪其父洵武任樞密使因緣請託特許赴殿試關通近幸猥中科目濫廁從列帷薄荒穢士大夫目為豔班兼雍不曉吏事又欲廢法任情専受請託選人關升改官意所欲與雖郎官執條例以進輒遭詬詈人材猥下趣操頗僻不足汙天官之選伏望聖慈特賜罷黜施行庶厭公議光又論鄧雍劄子曰臣伏見近年以來嬖幸用事姦邪擅權賢否混淆是非顛倒世家之子布滿要塗瀆亂朝綱莫斯為甚臣謹按前吏部侍郎鄧雍専以便僻側媚躐取要官初無術學而使之特赴殿試不知古今而使之猥廁經筵帷薄不修蹤迹醜穢士傳播以為笑談今雖罷遣尚仍舊職玷髙華之選實於公議有所未允伏望特出睿斷早賜褫奪職名投置間散庶幾清朝名器不以假人且絶姦邪覬覦之路實天下幸甚光又論李會李擢劄子曰臣伏覩除目以李會李擢為左右司諫訓詞褒諭以首論蔡京有功特被召用外庭之議無不駭愕臣之區區亦所未諭夫首論蔡京者陳瓘也其次則有石公弼張克公毛注之流相繼彈擊上皇覺悟既罷而復用者數矣京與王黼前後用事權傾天下言路塞絶多士盈庭莫敢開説方是時也忠義奮發不避死亡之誅慷慨言事不過曹輔等三五人爾下逮韋布之士廷對大問進藥石之言則有若范宗尹投匭獻計針時政之失則有若朱夢説而會擢在當時迭為臺官身任言責保寵固位被阿諛之譏目覩時事曾無一言逮陛下龍飛灼見姦慝大學諸生伏闕上書首論六賊之害蔡京之惡夫人而能言之矣諫官御史能於此時明目張膽擊姦指佞實恃陛下聖明不啻摧枯拉朽之易何足為功況會擢當金人圍逼都城力附白時中李邦彥専主避敵割地之謀方肅王之北渡也不罪金人之渝盟乃敢奮筆橫議以上皇還宫問肅王所在劫持上下必欲以祖宗基業委之外裔至有三鎮與王室孰重之語章疏具存可以考按今時中邦彥坐是落職議者猶謂輕典而會擢反被召用復預諫爭之列不知誰為陛下薦此二人者陛下好惡取捨如此廟堂之論何時而定百官有司之衆何所適從乎臣愚伏望陛下深思熟察辨邪正之歸無為詭辭偏説之所傾奪庶以仰稱陛下艱難求助之意副四方跂竦之情所有會擢等召命伏乞特賜寢罷以安衆情光又論楊逴吕齊劄子曰臣竊謂文昌諸郎皆異時侍從之選非有素望安可冒居臣伏見新除刑部員外郎楊逴度支員外郎吕齊命下之日士有異議逴浮薄無行因妻父徐鐸夤緣交結朱勔及梁師成以為進身自選調任京東提刑司檢法冒賞官勔方用事權勢赫奕薦逴賜第遂被超擢齊闒茸凡下素無士檢頃知河南府伊陽縣在任與宦官康份關通憑恃權要恣為贓汙監司郡守不敢按發今乃自管庫之冗徑躋郎曹實於公議有所未厭伏望聖明特賜罷遣使士大夫稍知郎選之優不勝幸甚光又論王子獻等劄子曰臣近準尚書省劄子専委臣取索點檢京東京西兩路西城所創置擾民等一切並罷元係西城所辟置及曾應副害民之官先次放罷具名聞奏臣除己一面令吏部供具本路州縣官外臣今所聞兩路最為李彥信任陳獻利便創立租稅忍於害民為國斂怨僥冒賞典轉官除職之人其尤甚者京東則有王子獻吕岯毛孝立京西則有劉寄任徽彥李端願子獻為京東轉運使將梁山濼城田租收入西城所辟置孝立岯為屬官遍詣州縣自濟兖鄆濮興仁廣濟等處為之騷然迫脅官吏抑勒細民有不承佃者便枷項送獄人人惴恐莫保性命蒲魚荷芡之利皆日計月課纎悉無遺遂致濼傍之人無所衣食強者結集為寇盜弱者轉徙乎溝壑岯孝立皆驟被拔擢自文林郎不二三年轉至朝散朝請大夫自曹官為通判自通判為郡守監司又孝立任濟州日母死其父欲只作所生規免解官未幾父又死遂干求李彥請御筆候葬畢起復孝立家本三衢憚往返迂逺不復挈喪歸鄉只就濟州營葬近緣廉訪奏劾國忌日就司録廳用妓樂深夜飲燕為臣不忠為子不孝敗壞風俗莫此為甚寄徽彥端願或自白身或由小官為李彥汲引將唐鄧汝蔡四州九縣取民間稅地謂之公田斂取無藝百姓失業流丐者衆風諭諸邑催索租逋急於星火確山令劉願前後杖下決死良民千餘人徽彥近緣金人內寇添差京西運判遂分遣屬官四出有甚寇盜襄城一邑科率至十七萬謂之助國錢更不抄上赤歷此數人者朝廷雖已放罷而罪惡貫盈公議未允伏望陛下洞照姦凶久為民害特發睿斷重置典刑或竄流嶺表以謝兩路生靈不勝幸甚光又上論王子獻等劄子曰臣近準詔旨姦貪之吏蠧國害民者尚未竄逐所以好惡未孚贓吏未懲民未被澤臣職在臺端仰煩聖訓宣諭使之彈劾在臣愚分誠為失職臣伏自供職首尾半年前後論列姦貪之吏多矣陛下雖有聽納之明而未見力行之果臣輒再具已嘗論奏而未蒙施行者如京東轉運使王子獻前知淄州毛孝立前東平府通判吕岯前京西轉運使杜徽彥提舉常平李端願劉寄此六人者皆奴事李彥竭兩路膏血以奉彥者假借事權勢力氣焰足以制百姓生死之命彥非得此六人亦不能成其姦凶如此其暴也臣聞此一等人其類尚多自陛下初政灼見姦慝雖已落職送部止是退居鄉里復帶前銜金章紫綬所在州郡皆以嘗任郡守監司往往差彼人從日陪燕遊無復省躬念咎之意亦莫有依元降指揮赴吏部受差遣者是陛下賞罰號令止行於小臣而不行於大吏伏望檢臣前奏重賜竄逐仍乞行下吏部取責前後送部臣寮如有傲睨偃蹇不肯赴吏部之人即與直注逺地或河北河東合入見闕差遣庶幾方命慢上者知所警懼不勝中外之幸光又繳馮澥榜朝堂疏狀曰臣愚暗朴拙當陛下初政偶承人乏擢置言路每因進對備聞德音未嘗不以紹復祖宗法度為説忠臣義士莫不歡欣鼓舞日頌德化之成也臣今月十七日入臺伏覩三省降到黃榜一道臣寮上言以王安石為名世之學發明要妙著為新經天下學者翕然宗仰又言熙寧元豐間內外安平公私充實法令備具賦役均平其意専以王安石之説為是公肆誕謾無復忌憚特以陛下聖明未可遽欺既以司馬光與安石俱為天下之大賢又云優劣等差自有公論觀言者之意必不肯以光為優以安石為劣夫光與安石行事之是非議論之邪正皎然黑白雖兒童走卒粗有知識者莫不知之當熙寧元豐間如韓琦富弼歐陽修之屬尚皆無恙安石惡其議己皆指為因循之人擯斥不用卒以憤死恭惟太祖太宗創業之艱難真宗仁宗守成之不易規摹宏逺矣安石欲盡廢祖宗法度則為説曰陛下當制法而不當制於法欲盡逐元老大臣則為説曰陛下當化俗而不當化於俗蔡京兄弟祖述其説五十年間搢紳受禍生靈被害海內流毒而祖宗法度元老大臣掃蕩禁錮幾無餘藴矣幸賴宗廟社稷之靈上皇悔悟以祖宗不拔之基全付陛下今言者又創為熙豐之説以安石為大賢臣恐此榜一出流聞四方鼓惑民聽人心一失不可復收此非朝廷之福也所有降到敕榜臣未敢簽押行出謹録奏聞伏候敕旨六月十五日上召翰林學士吳幵至內東門付以御封侍御史李光劄子於光劄子後御批祖宗之法子孫當守之如蔡京首唱紹述變亂舊章貽患至于今日可作一詔於是降詔曰朕以薄陋紹休聖緒惟祖宗肇造區宇重休纍洽至于今其法度條章雖隨時損益凡以惠遺天下者咸根柢於仁義施於民淪入骨髓在於後人奉承之不敢有渝邇者蔡京懷讒搜慝妄作不靖凡舊章彝憲肆行變亂挾紹述之言為劫持之計內外騷動公私匱困比嵗上皇深灼其姦親御翰墨攘剔蠧弊咸所釐正逮朕纘紹夙夜祗懼嘉與公卿大夫圖惟故實務遵二帝三王之道以協我列聖之心以為萬世之賴尚慮邪説詖行習熟見聞搖動衆心害於國體明示厥指罔或不孚有一於斯必罰必殺光又論胡直孺劄子曰臣伏見近除胡直孺為工部尚書命下之日士論沸騰莫不疑駭蓋直孺素結朱勔為發運使為待制知平江府為户部侍郎皆勔力也臣近論朱勔及言東南財用為羣小侵蠧直孺其一也老而無恥素節凋喪不足汙八座之選靦顔朝列不自引退伏望陛下斷自宸衷重行竄黜以為士大夫不顧廉隅者之戒取進止光又論胡直孺劄子曰臣近再上章論列工部尚書胡直孺罪惡已蒙陛下開納許以必行亦既纍日不見降黜此必大臣以直孺為賢曲加覆護以臣言為妄未肯施行夫大臣以進退人材為職所進忠賢則國家享其利所進憸佞則人主受其欺陛下不以臣不肖使得待罪言路若大臣用人失當臣得而論之朝廷行之則陛下威權立矣今臣力言之陛下虛已而聽之大臣沮抑之則是陛下威福之柄反制於大臣而臣區區不能但已者也况直孺佞邪天下所聞與應安道盧宗原相繼為轉運使及發運使欺罔朝廷如循一軌將上供物斛及糧網船盡充花石之供號為應奉州縣帑藏為一空起發封樁妄稱均糴嵗計不足猶進羡餘緣此進職濫廁從班遂知平江府縱朱氏請求益肆掊斂不復知有朝廷矣直孺素畜聲妓每攜就朱氏園亭與倡優雜處啖其子姪吳人怨憤目為朱家奴勔入京師凶焰益熾至與宰職爭權竊弄國柄首引直孺為户部侍郎縉紳側目莫不駭歎伏自陛下即位灼見姦凶以次流放黨類屏息獨直孺反被褒擢聨八座之選命下之日士論沸騰前後臣寮論列不一伏望陛下斷自淵衷速賜竄黜以為多士之戒如臣所奏失實欺罔聰聽亦望解臣言職重置典憲臣與直孺理難兩存臣不勝激切待命之至光又論燕瑛胡直孺劄子曰臣伏見燕瑛胡直孺二人以姦佞相濟傅會匪人方權幸用事恣為不法盜用官錢如同己物刻剝細民甚於豺虎前後臣寮疏列罪惡非一瑛頃任廣南市舶専以貨賄交結近幸目為香燕及為開封尹専任猾胥政事紕繆輦轂之下寇盜縱橫褫職居外曾未旬月百計經營由散官徑為户部尚書直孺任兩浙漕臣假託應奉耗竭帑藏醜穢之迹中外所聞知平江府諂事朱勔日三造其門勔所欲為無求不獲家畜聲妓専事媚恱以圖進用名教所棄清議不容陛下灼見姦慝亟議誅竄令二人皆帶龍圖閣直學士名曰罷斥其實升遷自祖宗以來非名德重望為士類所推者未易得此陛下始即大位慎重名器愛惜生靈之時如使此流列顯職當郡寄臣恐四方志義之士不以聖朝爵祿為榮人人解體羞與比肩恐非朝廷之福臣與瑛直孺實昧平生所以拳拳不已者誠見陛下慨然思治乃於賞罰功罪輕重失當未能厭服人心實纍聖治伏望陛下奮發乾剛大明黜陟將此二人鐫職投間庶協公論臣不勝憤激之至光又論燕瑛胡直孺劄子曰臣竊謂監司郡守號為近民之官勢力氣焰足以制百姓死生之命頃者姦幸當權奢淫無度竭生靈之膏血不足供溪壑之欲於是分遣親戚之人忍於殘賊敢為姦贓者布滿州縣夤緣假借上下相蒙其剝民愈甚則獲賞愈多如應安道徐鑄之流死亡略盡今其在者蹤迹顯露莫如燕瑛胡直孺二人皆自郡守監司以贓汙致身臣纍具彈奏必蒙陛下委曲開納臣亦委曲為陛下言之若以朝廷多事之際以為有才亦當置在三邊財榖之地不當秩以宫祠優以便郡也臣之此言若出畏懦今乃反得輔郡地望愈隆沮天下至公之論成憸人怙寵之私成命既頒物議騰沸此必大臣有隂為之地者二人平昔止能以竒貨厚賄交結權幸飾殽饌聲妓以媚恱要人身雖去國各留子弟見在京師日造大臣之門對衆附耳營求百端稔惡弗悛無復忌憚伏望陛下奮發威斷直批付三省褫奪職名重行竄殛以解四方之疑不勝幸甚欽宗命李綱為河東北宣撫使援太原綱言吳元濟以區區環蔡之地抗唐室與金人強弱固不相侔而臣曾不足以望裴度萬分之一然寇攘外患可以掃除小人在朝蠧害難去使朝廷既正君子道長則所以扞禦外患者有不難也因書裴度論元稹魏洪簡章疏要語以進上優詔答之朝説之上達言曰臣聞唐虞之世豈有蠻夷猾夏之事乃以蠻夷猾夏命臯陶作士何也曰是事之有無典䇿久矣孰詰也蓋有猾夏之蠻夷不害為唐虞之至治而或命官於無事之時以為天下萬世之戒是所以稱唐虞之聖者也雖然又言寇賊姦宄何也曰天下治亂必原其所自彼蠻夷猾夏實自乎寇賊姦宄也以故古昔天下禍亂之機與夫存亡之微折猶豫而果決存百世於一朝者皆自吾內以餉乎外也項羽之勇范增之智不能執沛公於坐上者項伯舞劒以身衛沛公也曹公袁紹相扼官渡無異兩虎額吼果誰勇怯而曹公卒走袁紹坑其衆八萬者紹將髙覽張洽輩率衆來降而曹公知紹虛實得以奮擊也苻堅以百勝之威百倍東晉之衆有姚萇慕容垂為將視晉君若浮苴孤鶩然乃絶肥水未半而潰于謝石五千之兵秦帝僅以身免者萇垂懷亡國之禍心其尚書朱序降晉而為之謀曰大兵未集而擊之易也魏叛臣侯景狐兔犬狼之衆何足以當梁氏江海富庶太平之久乃一日入石頭據金陵如戲劇者梁臨賀王正德導乎景而丞相朱異先與景交通也唐代宗朝雖有郭子儀在朝而吐蕃回紇頻年入長安踐京畿者李輔國程元振二閹無君於內而僕固懷恩於外為蕃寇之盟主也昭宗時李克用朱全忠相噬不減袁曹而唐室之危甚於官渡未知二孽誰先得之一旦全忠先滅唐為梁者唐宰相崔緇郎隂為梁之佐命也嗚呼蠻夷猾夏寇賊姦宄實同機並杼之敏也今河東河北之人十餘年來不辨蕃漢之兵皆曰童家之兵也不辨蕃漢之旌旗甲馬皆曰童家之旌旗甲馬也至於金榖貨幣不知為朝廷之有皆曰童家之金榖貨幣也故金人一日大軍入河北分軍入河東逺而石嶺關不得以為固近而大河不得以為險談笑以抵京師城下者官吏之疲弱人民之愚蠢以金人之兵甲旌旗久無辨於華戎也幾何而不開門灑道以迎之也哉金人於京師城下有德色肆言曰童王招我來聞者寃之閹方平既以大河之橋延金人又欲以京師城門納金人益可懼乎京師百姓於是上念社稷宗廟之危下顧父母子孫之酷不勝其忿不約而起大呼於道取閹孺數十人於馬上拉而碎之則人情大可見已天其或者必以閹貫待司寇藁街之誅未使戕於市人之手與執事者其可忽乎或者不敢沒輿議而私懷羣閹之悲則假之於市人指詬宰相以髙歡憤張彝為言何其不知類耶東魏征西將軍張彝子仲瑀乞銓削武人品秩羽林千餘人乃殺彝父子甚慘于時懷朔鎮使髙歡在洛見之歸而傾産結客得司馬子如孫騰侯景輩逞其樂禍之心豈今日比耶魏羽林千人實雜以羌渾之醜報其一身之事爾今京師巨萬齊民世世荷皇家亭毒鞠育之恩相與念敵兵無名一日蟻結於嚴城之下天子將不得一日之尊京師將不得一日之大深究禍亂之原實在羣閹則取戕之以我之公憤諭彼之私讎相去萬里而逺也彼髙歡異類久以胡后臨朝淫亂元叉劉勝輩寵任驕恣流毒國中魏室將亡歡先有心則因彝事而作爾國家纍聖洽光四海澄清陛下遵養青宫者十年其傳祚之數日皇天以此強敵警懼增德豈魏齊之妖可並世而言耶若乃宰相為都人指詬毁辱者昔亦有之唐憲宗明君也相皇甫鎛之日殿廷班列相與驚駭街衢市肆相與大呼裴度率衆情而上疏曰忽取微人列於重地逺近流聞與京師無異度之言可信不誣也未聞當時責驚駭者何士刑笑呼者何民豈不謂此邦家之羞也唯當自治於上而一切無怒於下也或者不以皇甫鎛為言而言髙歡以垢聖世何也孰知天地之隂陽消息見於君子小人之進退君子小人迭為進退而各從其類不可須臾並列也其為宫嬪為財賂為閹官為兵革為賊盜為蠻貊皆隂也從小人而類進也若夫朝廷有道絶女謁薄閹官不私財賂不玩兵革盜賊不起蠻貊賔服者皆陽也君子以類進者也唯小人盛於廷則蠻貊盛於邊在廷無一小人則在邊無一蠻貊錙銖低昂不欺也小人盛而盜軒冕則蠻貊亦盛而寇疆埸小人熾盛而僭公卿則蠻貊亦大盛而害王侯一日小人退則蠻貊退不勞干戈鼓鼙之武也若小人與君子雜進則蠻貊與華夏亦雜居小人未盡退而蠻貊未盡退也今日之事可觀也已許翰上言曰臣近論宰相白時中李邦彥執政王孝迪等去位不出都城非祖宗法令時中孝迪已詔赴鎮而邦彥未去臣竊計陛下祗以邦彥前日曾有節損一言之善故未遽遣臣若不為陛下盡言陛下無由悉其本末按邦彥之心雖無深阻但材質浮薄學術寡陋初附梁師成王黼位執政而蔡攸薦之為宰相童貫蔡攸之行也身見河朔流離將亂幕中賔客多勸攸貫説上皇以節損而攸貫等自知富貴已極但乏衆庶之譽故其還朝以賔客言時時從容為太上道久之太上慨然思一大變時事而邦彥適為宰相遂與攸貫協力然邦彥材術不足以果斷忠固不足以持守故徒紛紛卒無所補論邦彥心止於如此若數其罪不勝誅矣何者當取燕山之時邦彥身為執政坐視禍變不為一言去嵗復起雲中之役人益寒心邦彥身為宰相阿意詭隨又不救正若邦彥當此之時不知事勢必亂是無識也知而不言養交持祿是不忠也無一可者逮至倉卒胡馬渡河邦彥但謀竄身不急召兵保城遂至失備幾危社稷昔漢家盛時水旱薄蝕皆以天災策免丞相今邦彥執政六年於此而大位內禪萬方外騷宫闈播越宗廟震驚畿甸殘破生靈屠戮此豈止水旱之災薄蝕之變也哉在昔法義主辱臣死尚復何道陛下仁聖幸赦不誅謂宜以禮自圖進退乃復遵用蔡京王黼故事身為宫使留居都城禮視見任執政耽寵昧利無大臣體夫大臣罷政而猶留都城者必為其人時可咨訪有補國家也臣考邦彥相道君於安平之時則忠益未見輔陛下於艱難之際則知謀不聞留連趑趄亦復何為且邦彥素擅朝政進退在位故今廷臣二三顧望疑將復用莫敢公言願陛下逐出邦彥使士大夫壞植散羣一意首公為朝廷用則法義昭明於上而輿衆慰釋於下其於邦彥恩已厚矣起居郎胡安國繳王安中隨州安置朝説之許景衡落職宫觀詞頭疏曰準中書省刑房送到詞頭一道朝議大夫王安中可責授單州團練副使隨州安置中書舍人朝説之許景衡可落職宫祠令臣命詞者右臣謹按王安中昨自尚書左丞建節知燕山府委任之意重矣借令無才可辦邊事至如敵勢強弱敵態情偽與沿邊兵食之闕饋運艱阻民户殘弊師徒失律衆所共知者自合條具實狀逐項奏聞使朝廷灼見利害審定取捨早為備禦之策而安中畏避童貫専務蔽蒙終不端言其事數奏祥瑞誣罔諂諛以固寵祿養成邊患一旦敵騎長驅燕薊覆沒深入畿甸社稷幾危推原本因其罪與蔡攸等耳今臣寮論列以謂行法未盡乞斥諸逺方少為誤國者之戒雖責授散官復處漢東近地竊恐公論不以為允矧今太原被圍師屯未解強敵壓境朔部戒嚴飛挽芻粟郡邑騷動若不恃賞罰之公厭服物論何以攘却敵國乎伏望特依臣寮所請斥諸逺方以正其蒙蔽欺君之罪又按中書舍人朝説之許景衡責降元文為視大臣升黜以為去就懷姦徇私失事君之義即未見得説之等以何陳奏至今不知各人去就懷姦徇私之迹難以命詞欲乞檢會説之等元初陳乞事因降付本省以憑按據實狀載諸詞命為臣子之戒所有前件詞頭臣未敢具草安國又繳內侍王仍等録黃疏曰伏覩臣寮上言內侍王仍張見道鄧文誥輒懷詭計圖欲離間兩宫邊防動靜妄意傳播轉相聳動將以遂其姦志此而不除後必貽患而陛下未欲施行止令覺察臣愚竊謂圖欲離間兩宫則罪不可赦將以遂其姦志則惡不可留伏望陛下深察衆言及時裁處討罪除惡斷在不疑將此三人者依臣寮所論編置逺方於以全兩宫慈孝之情不勝大願所有録黃臣未敢書行髙宗即位馬伸上疏曰陛下得黃潛善汪伯彥以為輔相委任不復疑然自入相以來處事未嘗愜當物情遂使女真日強盜賊日熾國本日蹙威權日削且三鎮未服汴都方危前日遽下還都之詔至今鑾輿未能順動其不謹詔命如此草茅對策不如式考官罰金可矣一日黜三舍人乃取沈晦孫覿黃哲輩諸羣小以掌誥命其黜陟不公如此吳給張誾以言事被逐邵成章緣以上言逺竄其壅塞言路如此祖宗舊制諫官御史有闕御史中丞翰林學士名以進三省不敢預厥有深旨近擬用臺諫多取親舊不過欲為己助其毁法自恣如此張慤宗澤許景衡公忠有材皆可任重潛善伯彥忌之沮抑至死其妨功害能如此或責以救焚拯溺之事則曰難言蓋謂陛下制之不得施設也或問陳東之死則曰不知蓋謂其事繇於陛下也其過則稱君善則稱己如此吕源狂橫陛下逐去不數月由郡守升發運其強很自専如此御營使雖主兵權凡行在諸軍皆其所統潛善伯彥别置親兵一千人請給居處優於衆兵其務收軍情如此廣市私恩則多復祠官之闕同惡相濟則力庇王安中之罪托其所為豈不辜陛下倚任之重哉陛下隱忍不肯斥逐塗炭遺民固已絶望二聖還期在何時邪臣每念此不如無生嵗月如流時幾易失望速罷潛善伯彥政柄别選賢者共圖大事疏入留中明日改衛尉少卿伸以論事不行辭不拜建炎元年尚書右僕射李綱上言曰臣聞節義者天下之大間僭逆者臣子之極惡春秋之義人臣無將將則必誅況以僭竊位號為天下所共憤怒者哉謹按張邦昌被遇道君之朝久與機政際會靖康之日擢冠宰司資其重臣奉使敵帳初無忠義徇國之意但為諛佞保身之謀去中國者踰年從敵騎以偕至方二聖播遷之日無一言營救之忠憑恃金人盜據神器國破而資之以為利君辱而攘之以為榮竊有乘輿安處宫禁降旨以行其僭命南面以朝其偽臣易姓建邦四十餘日逮金人之既退方降赦以收恩考其四日之手書猶援周朝之故事而陛下總師于外天人所歸勤王之兵四面雲集乃始退還舊班遣使迎奉今乃冒處王爵極其褒崇不聞泥首以自拘方且偃然為得計人之干紀一至於斯儻或逃誅何以立國或謂陛下嗣登大寶乃邦昌揖遜之謀以罪為功臣所不喻夫英宗之曽孫神宗之孫道君之子淵聖之弟惟有陛下一人而已天佑我宋必將有主主宋祀者非陛下而誰四海臣民所共欣戴邦昌何力之有哉今其黨與尚布朝列秋髙馬肥敵騎猖獗挾借其勢陛下不得而制之矣中夜以思不寒而栗伏望陛下斷以英哲而察其罪惡特正典刑而肆諸市朝以慰四方忠臣義士之心以垂萬世亂臣賊子之戒天下幸甚三年以久雨多寒召郎官以上赴都堂條具時政得失可以收人心召和氣弭天變者吕頤浩奏之令實封以聞趙元鎮上奏曰臣聞雨暘寒暑過差之節繫之隂陽逆順盛衰之理春秋洪範之所紀漢諸儒之論載之詳矣臣不暇推證有勤聖覽臣竊謂久雨多寒隂沴之候其應則兵禍不解民心離散小人道長也臣嘗求其致之之説敢獻於陛下竊惟祖宗之有天下也歷五季兵火之餘險阻艱難皆目擊而身蹈之故其建立足以垂法萬世以聖繼聖至於仁宗四十餘年號稱極治子孫守而勿失復何加焉厄運所鍾社稷不幸乃有王安石者用事於熙寧之間以一己之私拂中外之意巧增緣飾肆為紛更祖宗之法掃地殆盡於是天下始多事而生民病矣假闢國之謀造作邊患興理財之政困窮民力設虛無之學敗壞人材奬小人抑君子塞言路喜姦諛扇為刻薄輕浮之俗日入於亂賴宣仁垂簾深鑒其害首因改元昭著至意所行者仁宗之法所用者仁宗之人涵養十年民瘼小愈夫何治世之日少亂世之日多復有蔡京者崛起於崇寧之初竊堯舜孝悌之説託紹述熙豐之名畢力一心祖述安石以安石之政敷演枝蔓浩然無涯至於不可限極而後已兵連禍結四夷交侵二聖北轅朝廷南渡則安石闢國之謀而蔡京祖述瀆武之患也繁文酷吏上下相繩鞭撻追呼農畝失業則安石理財之政而蔡京祖述厚斂之患也僥冒躐進依阿取容當官有營私之心而臨難無仗節之義此又安石敗壞人材之科而蔡京祖述賔興賢能之患也瀆武而兵禍不解厚斂而民心離散至於賔興賢能之弊則習為軟熟柔佞之姿無復禮義廉恥之節士風雕喪君子道消矣故凡今日之患始於安石成於蔡京自餘童貫王黼輩曾何足道今貫黼已誅而安石未貶猶得配享廟廷蔡京未族而子孫飽食安坐臣謂時政闕失無大於此者其欲收人心召和氣烏可得哉故於陛下播越之中示此隂沴之戒天之警悟不啻諄諄之告冀陛下知其所自痛懲而亟革之也伏覩近降赦文遵用嘉祐敕令周恤黨臣之家是將以元祐為法而有意乎仁宗之治矣嗚呼無聊憔悴之民兹亦有少安之漸乎然而德意未敷天災未弭者以政令未歸於一致風俗猶裂於多岐談詩書陳治亂者非安石之學則蔡京之人也遺患流毒浸淫人間牢不可破甚於膠漆徒使陛下焦心勞思孜孜訪問雖日下求言之詔是誠何補風俗之難移從古所患唯陛下明於聽覽果於取捨其或中外臣寮因事奏請有涉於安石蔡京之遺意者皆不利社稷之人願明正典刑播告天下使四方萬里之逺皆知陛下用心所向庶幾變之有漸此風一變然後可以言治其他細故不足為陛下陳之建炎中御史中丞許景衡乞罷黜張公庠劄子曰臣訪聞通判福州張公庠在任貪汙不法自知公議不容乃扇搖軍情歸怨監司帥臣監司帥臣日不自安而提點刑獄司已具劾奏即未聞朝廷施行契勘福州去年兵變縶殺帥臣栁廷俊朝廷失於究治今餘黨尚存而公庠職為倅二不能撫循乃緣己私扇惑諸軍竊慮禍變近在旦暮去年已是覆轍而近日建州軍黨猶未就擒不可不戒也其張公庠欲望聖慈檢會福建提刑司所奏速賜罷黜施行以解一方危急仍乞下本路牒鄰州鞫治罪犯明正典憲景衡為尚書右丞又論王安中自便劄子曰臣伏覩近降指揮象州安置王安中放令逐便臣僚纍有章疏論列安中罪狀若令自便公論未允至今未蒙施行謹按安中昔帥燕山親見郭藥師之跋扈常勝軍之糜費金人之侵侮邀索並不曾奏報朝廷措置守禦固寵畏禍左右彌縫以茍嵗月故議者咸謂緣燕山之役成中原之禍者童貫等唱之而安中實成之也貫等已正典刑而安中止竄遐裔已為寬恩今若引赦例得逐便則當用武之時無以懲守邊之吏矣或者以為曠蕩之恩罪垢咸滌而安中前執政獨不得預霈澤乎是大不然赦書明載蔡京童貫梁師成誤國之罪雖其子孫猶不得預收敘之例孰謂安中與之同罪乃遽得自便哉伏望睿明檢會臣僚章疏特出宸斷所有放令逐便指揮更不施行景衡又乞罷詹度赴行在劄子曰伏覩昨降指揮前資政殿學士詹度發來赴行在中外聞之莫不駭愕謹按度自為小官交結近習夤緣僥幸馴致顯塗假應奉享上之名為竊攘豐己之事違法種種士民類能言之一昨附會姦魁首開邊隙既帥定武尋易燕山當新邊草創之時殘虐燕人搜求寶玉織組練帛以為苞苴車馳肩負絡繹道路既而新軍暴橫糜費不資蕃將跋扈已有異意而度恬然若不聞知帥閫乃朝廷之重寄而所任如此安得無禍哉未幾金人入寇藥師叛命中原擾攘生靈塗炭皆度輩所致也言之可為流涕雖元惡已就誅夷而度輩祗從竄逐永禦魑魅已為寬恩今若入覲行在稍加任使則傳聞四方孰不憤歎恭惟陛下始初清明賞罰升黜蓋欲上全國體下當民心以成中興之業今度何人獨蒙召還是開邪枉之門而植憸佞之望也伏望陛下正心誠意斥逺姦欺以示好惡於天下請自度始則海內莫不欣然稱頌聖德矣所有詹度赴行在指揮伏乞特賜寢罷紹興元年大宗丞常同乞郡得栁州三年召還首論朋黨之禍自元豐新法之行始分黨與邪正相攻五十餘年章惇唱於紹聖之初蔡京和於崇寧之後元祐臣僚竄逐貶死上下蔽蒙豢成敵國之禍今國步艱難而分朋締交背分死黨者固自若也恩歸私門不知朝廷之尊重報私怨寧復公議之顧臣以為欲破朋黨先明是非先辨邪正則公道開而姦邪息矣上曰朋黨亦難破同對朋黨之結蓋緣邪正不分但觀其言行之實察其朋附之私則邪正分而朋黨破矣上曰君子小人皆有黨同又對曰君子之黨協心濟國小人之黨挾私害公為黨則同而所以為黨則異且如元祐臣僚中遭讒謗竄殛流死而後禍亂成今在朝之士猶謂元祐之政不可行元祐子孫不可用上曰聞有此論同對以禍亂未成元祐臣僚固不能以自明今可謂是非定矣尚猶如此蓋今日士大夫願陛下始終主張善類勿為小人所惑髙宗時中書舍人胡寅論朱勝非疏曰臣伏見故相朱勝非以服闋除觀文殿大學士提舉臨安府洞霄宫臣以臣父任給事中日曾論列勝非臣適當詞掖不敢書行已具奏外臣謹按朱勝非與張邦昌皆是鄧洵武家壻王黼之客苗傅劉正彥之隂黨也自其為小官時文學行治皆為人所傳笑在宣和中仕流混濁猶取庸陋之誚時相主之雖力猶且提攜不行出為南京副總管值敵兵內攻自是而後勝非之志操能否著矣臣欲不言恐負陛下欲詳言之又懼煩瀆請略言之南京胡直孺勤王被虜勝非為副總管值張邦昌僭位遣快行親事至其母家淮南發運使向子諲拘留送獄驗其文劵則經由南京勝非厚與批請以資其行子諲疑勝非與邦昌交私為之羽翼遂急檄勝非勤王且云不可汚張巡許逺之地是時天下共知陛下為大元帥二帝北去主宋祀者非陛下而誰勝非身在南京去元帥府不逺而於邦昌蹤迹如此若謂是時勝非心不在邦昌而在陛下臣不信也繼而諂事黃潛善叨與政事戊申之冬敵騎已破澶濮犯大名掠齊鄆駸駸南嚮勝非不恤國步之將危方且宴安於寵祿略無一語上動天聽寧致狼狽恐忤潛善若謂是時勝非心不畏潛善而畏陛下臣不信也苗劉造逆為大臣者當正色立朝死生以之此宋督所以憚孔父劉安所以憚汲直曹操所以憚文舉也勝非乃依從其間顯然援唐襄王晉太后事其意以苗劉事成則已收佐命之功不成則已託調護之説然則何所往而不可哉若謂是時勝非心不操二端而一於陛下臣不信也逮陛下返正大明典刑取一時宰執勝非顔岐張􅊹聲罪致討載之親詔謂不如歐陽修所稱斷臂之婦人天下傳誦以為舜誅四凶不是過也為勝非計尚以何顔面立於人間哉未幾又蒙抆拭付以宣撫之權於江州置司勝非嘗為宰臣義當即日受命趨赴治所而乃逡巡退匿謬為辭遜坐使李成馬進毒流數郡江州既破即請移治但欲偷安無意討賊忠義徇國者顧若是乎比吕頤浩以都督還朝斥逐異己意謂勝非庸謬易制力加援引再汚揆席上天震怒星文示變勝非偃然不懼以調護自處外示佞柔於事無所決白而實則姦憸私事俱辦惟陛下少寬臣喋喋之罪使陳梗槩一言有欺罪當萬死李綱於勝非本無仇怨止緣綱在相位日曾行遣偽命臣寮又為黃潛善中傷邦昌之死潛善所行也乃嫁其事於綱勝非暗昧惟綱之怨及再入相首諷臺諫官論綱舊惡時綱為湖廣四路宣撫治狀方著並無過舉勝非不恤國事以私憾而罷之向子諲才氣忠義人所推許止緣南京之事勝非怨之刺骨常謂人曰李綱向子諲皆是凶人不殺不靜其所存險毒如此自其再相子諲深懼遭其密戮即日引疾挂冠而去吕頤浩既為勝非斥逐賢才開其入相之路勝非即以黃唐傳掌瑣闥黃龜年司制命劉棐為諫官王詳為左史汲引親黨虞澐陳桷輩分據要津其人皆凡下不為時議所與乃用劉棐黃龜年章疏謂秦檜大植朋黨有龍戰于野之象考其章疏所稱事實又只緣除楊願為密院計議王鈇為提舉茶鹽宋㬇為提舉坑冶而已以勝非所為方之秦檜其為龍戰不亦大乎蓋勝非外寬內忌陽為敦厚長者之狀而耳聞目見習成宣和之風乃心疾很能為人禍至於非義之事人所不敢為者則肆意行之李擢為京城南壁守禦官恨孝慈皇帝不用耿南仲和議以召敵人乃傲然端坐視城垂破而不救又為邦昌翰林學士罪當伏法而勝非所深喜也再相之初首復擢職名因席益與擢善則導益使薦之擢竟叨竊八座而去黃潛厚是聚賄亂政偷盜府庫之人李邴是行苗傅劉正彥建節白麻極意稱奬之人顔岐是同黨潛善阿諛誤國之人張􅊹是觀望苗劉詔書所謂情理尤重之人王安中是諂事梁師成隨逐童貫收復燕雲為國産禍之人王孝迪薛昂宇文粹中蔡懋是崇觀宣和戕毁帝業使戎馬在郊之人放投永棄誰曰不宜勝非乃以為失職之士星象所繇著也盡復職名意將引用天下聞之莫不大駭賴徐俯初作諫官未至謬妄力疏寢罷人心乃安豈非人所不敢為而勝非敢為者乎康執權闒茸汚賤廢置纍年勝非以其曾擊異己者必欲收召再召三召迫於衆情不可而後已自謂謙慎不敢専權而布列內外皆其親厚陳藹者不肖人也所生母死紿謂人乳母而不持服兄死嫂弱遂奪其兄致仕恩澤以自薦既得之後淩辱其嫂困苦至死又以隂計陷害其姪此藹為人大槩勝非與之中表姻婭故自為宣撫使即辟為幕屬凡江西繆政多藹之謀及再為相遂差藹監吉州𣙜貨務偷盜官錢嵗時賂遺入於相府超越資格差為湖北提刑逮言章論列勝非猶諷吏部詐供藹曾任提舉鼎澧刀弩手藹雖曾有此差遣旋即廢罷未嘗到官勝非乃改除字為任字欺罔陛下以濟其私張銖者為靜江通判值勝非遣子迎母自賔州過桂府銖以别乘之尊不顧廉恥出城數十里執杖聲喏於國太夫人轎前稟覆起居行數百步然後退廣西人莫不恥笑比至府城竭力應辦勝非德之先除銖為湖北鹽香以為未足又薦之對又降指揮與升擢差遣遂除郎官仍攝奉常劉式者大贓吏也勝非以妹嫁之遂詐改官除邵州通判比為言章論列見在湖南置獄取勘勝非門客劉澤者為衡陽簿傳道勝非之意與提刑馬居中仍厚賂居中遂使劉式翻異殃害干連良善百姓至今未畢式嘗以三千緡就勝非買門客恩澤奏其子劉師心又為湖南士豪姓胡人以八十緡買給使恩澤奏承信郎韓京者屯兵衡州茶陵縣隂與郴寇交通據有數縣民田奪百姓牛以耕之名為贍軍實則入己以充賄賂之費大為湖南之害紹興二年十一月勝非母由茶陵而東韓京詐稱前路有警邀留數日極其供待然後以兵衛送至吉州境上勝非以為誠然湖南帥臣纍奏韓京過犯勝非一切蒙蔽反以廣東鈐轄與之程昌禹者鄧洵武使臣也自蔡州擅興徑趨荆南朝廷就除荆南鎮撫不肯受命移兵至鼎州罪當誅戮范宗尹即以鼎守付之昌禹凶殘不能綏撫竭取民之膏血以贍所部及厚遺過客凡由鼎而東者人人滿意為之延譽而嚴刑峻法誅剝日甚激民從賊牢不可破致煩陛下宵旰者無人肯以上聞也勝非與昌禹以同出鄧門之故超加職名改授靜江遂除待制明降指揮候楊公已就招安然後付以告命而密諷李蕘使一面送告與之視陛下官爵私物不如也李大有者居臨江軍為勝非子夏卿行媒議王羲叔家姻事既成以都司處之張顔術者嘗以弓刀竒玩獻於夏卿仍為之轉販米糧遂為江西宣撫屬官後值湖南擾攘權知道州狼藉不法為提刑吕祉所按勝非不行反令作武岡軍通判郭千里者嘗勸勝非奔避馬進勝非以其忠愛於已亦為宣撫屬官千里受降賊賂遺引為宣司使臣廣以金帛結納夏卿勝非再相遂除千里為監丞盧宗訓者以盧益纍薦堂吏之族也其人汚穢茍賤不為士人所齒得淮西提舉為臺章言罷勝非必欲主持之遂送與嶽飛使辟為官屬意藉外兵權脅制衆口使不敢言飛大鄙宗訓之為人不得已受之俾權德安府果以贓盜自敗吕延嗣者曾任賔州通判照管勝非家屬遂擢為桂陽知監好貨受賄監事不治百姓嗟怨張轂者嘗為郴州司户與勝非子唐卿同官勝非嘗居郴州每請俸米轂必令髙帶斗面以給之郭敦復者嘗任道州營道縣尉贓汚不法曾以妾奉唐卿二人皆蒙勝非封送姓名與吏部不循資格皆注湖南漕司見闕屬官其長子唐卿建炎四年任郴州録事參軍沿幹差出其實避賊一去兩年不曾還任監司州郡不敢罷去至紹興三年還自賔州過郴州懇太守趙不羣批書四考關升又因江州軍中繫名冒賞循承直郎再任嶽廟尚恐三十箇月不能成任乃諷吏部侍郎建明選人嶽廟許以三年為任改官凡勝非除授不公變亂法制大抵如此臣在湖南所知已如此其在行朝及他路所未知者又不知其尚幾百條也自庚戌年敵騎退後朝廷一向謝絶不與交通三四年間敵不我測不敢輕舉及勝非再相復議遣使誤陛下於忘恩釋怨之地且俾使人受劉豫餽送啓寵納侮果致去冬犯蹕之事其經邦斷國一至是哉臣竊謂宰相之任佐天子治天下治亂之所本其任至重不可冒居勝非負彌天之罪陛下寬大赦而不誅再付相權責以功效非為賜也勝非所宜革心改悔以報大恩而其所為如前所奏則又關通內侍諂奉將帥牢籠堂吏德譽羣小専以軟熟無忤持祿取容所謂怙終長惡迷復不悛國家之大賊人理之巨蠧方邊報稍息則冒哀當軸而不辭及淮上有警則力懇去位而不顧謹按春秋之法任大者責重勝非獨相逾年可謂専矣寸功不立百度乖張天下目為勘當相公無責可乎今其喪制已除是古諸侯免喪以士服入見天子之日命德討罪柄出大君如勝非者豈宜寵以祕殿之名資食以真祠之厚祿賞刑失當以乖天下之望夫恩章寵數體貌大臣國之令典固不可廢然施之稱愜則國體尊重人以為榮施之非宜則彼當得者不以為貴而名器輕賤人主之權替矣騏驥驊騮一日而馳千里是故潔其廄櫪豐其芻豆緩急之際與人一心若夫駑駘下乘既無絶足仍有詭銜竊轡以智為盜之患則凡馬畜之而已矣人君駕馭人材何以異此伏望陛下奮發威斷奉將天討出臣此章深詔宰執正名定罪以為大臣二心誤國之戒以慰四方積年憤悶不平之心刑辟既昭叛賊自懾事干大政所係不輕臣是以竭忠仰冒聰聽茍利於國九殞不辭臣不任犯顔惶懼之至歷代名臣奏議卷一百八十二
