body:
  text: 歷代名臣奏議卷二百明楊士竒等撰求言宋哲宗元祐元年殿中侍御史孫升上奏曰臣聞古人有言曰武王諤諤而昌桀紂默默而亡夫以一士之謇諤豈足致成周之昌一人之循默安能速夏商之亡積纍然也何則謇諤之言達則壅蔽之患除壅蔽之患除則忠言日聞忠言日聞則變止于未然禍消於未兆詩曰濟濟多士文王以寧則其昌也不亦宜乎循默之風長則壅蔽之患成壅蔽之患成則忠言不聞忠言不聞則變生於不測禍至於已然詩曰雖無老成人尚有典刑曽是莫聽大命以傾則其亡也不亦宜乎壅蔽之傷國其患如此是以秦之盛強金城千里子孫帝王萬世之業而趙髙咫尺以鹿名馬則四海九州之以亂為治以危為安以白為黑以賢為愚固無足怪是以民窮而主不恤下怨而上不知俗已亂而政不修此壅蔽之極而秦之所以亡也夫世之治亂係乎君子小人消長內外而已天下君子寡而小人衆君子常患乎在外而小人常患乎居內是以自古治世少而亂世多也然則朝廷之有君子可不貴哉恭惟二聖臨御以來首開言路登用正人天下所謂忠信端良之士豪傑俊偉之才俱收並用無有棄遺近世得人之盛未有如今日者也君子日進而小人日退忠正日長而邪慝日消在廷濟濟有成周之風此首開言路之效也臣愚不肖遭遇明時獲在言職嘗蒙賜對親承德音使盡言無間雖有過差聖慈為之主張臣佩服訓辭以謂自古聖帝明王欲治求言之意不過如此而已伏惟皇帝陛下恭默不言太皇太后陛下簾聽庶政一日萬機之微四海九州之逺深居房闥與共事者元老執政大臣爾今此數人者皆至公而無私處事無一不當于理猶廣達耳目杜漸防微況未能皆至公而無私處事無一不當于理而陛下乃於耳目之臣論議之際置黨附之疑開小人之隙疑間一開讒巧必作則君子不可勝誅而言者不安其職矣言者不安其職則朋黨比周之説勝賣直掠美之言入則雖聖聽不能無惑聽惑則其弊必至於厭言言厭則循默之風作壅蔽之患生忠言不復聞矣臣切恐非朝廷之福也臣不勝大懼願陛下深思往古之明戒無替前日之訓詞除黨附之疑心待端良之君子無使循默之風作壅蔽之患生則天下幸甚殿中侍御史林旦上奏曰廣言路然後知得失達民情然後知利病竊見去嵗五月詔求讜言士民爭欲自獻及詳觀詔語名雖求諫實欲拒言約束丁寧使不得觀望迎合犯令干譽終之以必行黜罰以恐懼之於是人人相戒言將出而復止至於再申諭告方達天聰聞初詔乃蔡確章惇造端其詞盡出於惇今二人既去其餘黨常懷醜正惡直之心願深留宸慮以折邪謀三年翰林學士知制誥兼侍讀蘇軾上奏曰臣近以目昏臂痛堅乞一郡蓋亦自知受性剛褊黑白太明難以處衆伏蒙聖慈降詔不許兩遣使者存問慰安天恩深厚淪入骨髓臣謂此恩當以死報不當更計身之安危故復起就職而職事清間未知死所每因進讀之間事有切于今日者輒復盡言庶補萬一昨日所讀寶訓有云淳化二年上謂侍臣諸州牧監馬多瘦死蓋養飼失時枉致病斃近令取十數槽置殿庭下視其芻秣教之養療庶革此弊臣因進言馬所以病蓋將吏不職致圉人盜減芻粟且不恤其飢飽勞逸故也馬不能言無由申訴故太宗至仁深哀憐之置之殿庭親加督視民之于馬輕重不同若官吏不得其人人雖能言上下隔絶不能自訴無異于馬馬之飢瘦勞苦則有斃踣奔逸之憂民之窮困無聊則有溝壑盜賊之患然而四海之衆非如養馬可以置之殿庭惟當廣任忠賢以為耳目若忠賢踈逺諂佞在旁則民之疾苦無由上達秦二世時陳勝吳廣已屠三川殺李由而二世不知陳後主時隋兵已渡江而後主不知此皆昏主不足道如唐明皇親致太平可謂明主而張九齡死李林甫楊國忠用事鮮于仲通以二十萬人沒于雲南不奏一人反更告捷明皇不問以至上下相蒙祿山之亂兵已過河而明皇不知也今朝廷雖無此事然臣聞去嵗夏賊犯鎮戎所殺掠不可勝數或云至萬餘人而邊將乃奏云野無所掠其後朝廷訪聞委提刑司體量而提刑孫路止奏十餘人乞朝廷先賜放罪然後體量實數至今遷延二年終未結絶聞奏凡死事之家官所當恤若隱而不奏則生死銜寃何以使人此豈小事而路為耳目之司既不隨事奏聞朝廷既行蒙蔽又乞放罪遷延侮玩一至于此臣謂此風漸不可長馴致其患何所不有此臣之所深憂也臣非不知陛下必已厭臣之多言左右必已獻臣之多事然受恩深重不敢自同衆人若以此獲罪亦無所七年翰林學士范祖禹論求言疏曰臣聞禹戒舜曰后克艱厥后臣克艱厥臣政乃乂黎民敏德舜曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆捨已從人不虐無告不廢困窮惟帝時克后克艱厥后者知為君難也臣克艱厥臣者知為臣不易也君知為君之難則不可不求言於臣臣知為臣之難則不可不極言於君如此則政乃治黎民化之敏於為德矣君知為君之難此孔子所謂一言而可以興邦也不知為君之難則所樂者唯其言而人莫豫違也夫為人君出言不善而人莫敢違此孔子所謂一言而喪邦也舜知其如此故答禹曰信如此則嘉言無所隱伏人臣得行其言則天下之士願立於朝故野無遺賢賢人皆在朝則萬國咸寧矣人君能盡天下之善言不遺天下之賢人又動必稽于衆捨已以從人故能不虐無告皆得其所不廢困窮皆得其養惟帝堯能之禹以道陳戒故以此告舜舜以堯為法故以此答禹其要在於聽言用賢從衆愛民而已臣今日所講孟子不敢勸齊王發粟以救飢則與此正相違齊王為民父母坐視齊國飢饉其民將轉死溝壑而孟子不敢復言譬之馮婦搏虎豈得嘉言無所伏哉臣觀齊王不忍一牛之死以羊易之非無仁心也然而不能推愛牛之心而愛民見牛將死則知愛之見民將死則不知愛是以民飢而不救此所以為不仁也齊人無以仁義與王言者孟子非堯舜之道不敢陳於王前孟子見之時少齊人見之時多譬如萌生之物一日溫之十日寒之雖欲其生豈可得哉此所以為不智也齊王不仁不智由不能聽言用賢也昔仁宗謂輔臣曰如聞州郡嘗於夏秋之際先奏時雨霑足稼穡登茂後或災傷畏罪不敢以聞使民不得免賦租甚非長吏愛民之意乃著令不罪州郡吏而聽除民租又有奏水災過實者有司請加之罪仁宗曰州郡多奏祥瑞至於水旱之災或抑而不聞今守臣自陳墊壞官私廬舍意亦在民豈當加罪也仁宗聖心恤民如此若使孟子遇仁宗之時豈有不言者哉臣願陛下以舜禹之言為法以仁宗之心為心以齊王為戒知為君之難不可不求言求言不可不訪問使嘉言日聞賢人日進則四海生民幸甚仁宗故事伏乞常留聖覽中書舍人孔武仲乞輪侍從官進對疏曰臣伏見前日近臣論奏乞罷侍從官轉對而專責以朝夕論思之效朝廷尋已施行臣以謂論思者侍從之事然茍不持之以法度則責無所歸言與不言各從其意論思之效果安在也昔唐太宗聞直諫則奬激之久不言事則誚薄之風聲所感羣下自勵是以終貞觀之世中外無壅蔽之事朝廷無佞媚之臣政理之效優出近世仁宗皇帝嘗御正陽門親䇿羣臣又嘗開天章閣召執政八人賜坐授以紙筆使條陳政事之要嘗謂輔臣曰近日上封言政事得失何其少也豈非言路壅塞所致乎英宗皇帝嘗謂范純仁曰近日風俗可嘉羣臣能屢來言事如此人君日有益矣仁祖英宗汲汲求人言如此是以至和嘉祐治平之政至今稱頌昨日陛下親御經筵許講讀官進對凡預講讀者不過五六人陛下聞其規戒之言亦多矣況侍從官不止五六人其能言天下之事者固多患在未有以率之而已伏望逺稽唐太宗及仁宗英宗勤求人言之義近推經筵許侍臣進對之意輪流侍從官二人進對令各陳所見擇其是者推行之則轉對之法雖廢論思之責猶在也元祐中中書舍人陳軒上奏曰祖宗舊制諸道帥守使者辭見之日並召對便殿非特可以周知利害亦可觀閲人才今視朝數刻而退惟執政大臣得在帝所或經旬閲月臺諫官乃得覲餘皆無因而前殆非所謂廣覽兼聽之道願詔有司使如故事紹聖元年知杭州曽肇乞詔天下皆得直言及百官次對狀曰臣聞自昔有為之君欲以收攬威柄修立政事一新海內之耳目則必公聽並觀大開言路使朝廷得失民情利病百官忠邪賢不肖畢聞于上然後虛心審察揆以古誼參以時變出于天下之公而無悖於前可施于後者則斷而行之出于一人之私而于前為無稽于後為有弊者則絀而不用以此經綸天下之務酬酢萬物之變故能所為必成所欲必獲古之興王所以功施一時澤及後世未有不出于此者伏惟皇帝陛下躬至德開大明方且夙寤晨興以總攬權綱更革時敝為志然後發德音下明詔使人人得直言時事無有所諱以廣聰明以通壅塞正在此時而中外寂然未聞有所咨訪此臣之所未諭也論者或曰方今宇內無事朝廷清明陛下循守舊章足以稱治尚何事於言哉臣切思之斯言過矣何則舜之繼堯無異道也方堯老而舜攝固也闢四門明四目達四聰及其命九官則天地人神草木鳥獸之政無所不舉而終之命龍作納言蓋雖舜之盛德又當極治之世所以通天下之情者猶不敢不以言為急又況德未臻堯舜之盛世未若唐虞之治者乎惟是臣下用事則或蔽于自私而惡聞其過于是多為關防杜塞言者指鯁言正論為矯激以循默取容為忠厚此則任事者之所便非朝廷之忠計也昔漢宣帝之初上書者皆為二封領尚書者先發副封所言不善屏去不奏及魏相執政白去副封然後天下之情無不上聞宣帝所以知人疾苦成中興之功魏相所以總領衆職號稱賢相者能去壅蔽故也陛下無有為之志則已茍有志焉而不廣開咨詢訪納之路臣未見其可也臣愚欲願陛下明詔天下皆得直言又詔百官使以次對諭以至誠求助之意責以盡忠無隱之誼其言而有益則不惟納用且加以賞言而無益則一切包容置而不問如此則逺近之人知陛下有求言之實有聽言之明孰不感激奮勵應上之求哉雖然四海之大士民之衆不必人人皆知義理方陛下虛已下問之時豈無乘間投隙以姦言私説惑亂聖聽者此則在陛下聽納之際有以辨之而已孔子曰將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈孟子曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮孔孟所以知言用此而已蓋人之以言接於我者不能使之齊而能使吾不為彼之所惑者辨之有道故也辨之有道則雖姦言私説雜陳於前安能移我之意哉茍畏其惑亂而遂廢咨詢是何異憂噎而廢食也臣愚待罪從官轉徙五郡道路傳聞皆謂陛下聖質髙明濟以果斷其志將以有為於天下日夜傾耳以聽德音而久之未有所聞輒因賜對首敢以是為獻伏惟留神采擇元符八年户部郎中曽鞏乞復轉對疏曰臣聞帝王即位之初必有以順天下之心答中外之望其為之有序在知其要而已臣伏覩先帝嗣位以來憂勤恭儉日謹一日神功聖德充塞天地固非臣言所能髣佛也陛下繼之承之任大責重然四海之廣萬事之煩億兆之衆不可家至而人接之則欲達天下之情成天下之務豈有他哉在廣言路爾言路廣則人人得盡其情人人得盡其情則上無不聞之事下無不通之志政令之得失百姓之休戚羣臣之忠邪賢不肖雖在四方萬里之外陛下不出户庭不降几席可以周知而備見矣然後察政令之得者則力行之彌綸未至者則損益之百姓之所願欲則與之百姓之所疾苦則除之顯忠而去邪任賢而退不肖夫然故上澤得以下及下情得以上聞百官有司奉法遵職貴者不以崇髙而敢肆賤者不以踈逺而敢欺陛下深處法宫之中端拱無為而天下治矣夫任已聰明則其察愈詳其蔽愈甚因衆之聰明則所視者逺所聽者周故先王設進善之旌立敢諫之鼓陳誹謗之木又使瞽獻書師針䏂賦蒙誦工諫近臣盡規親戚補察彼豈聰明之不足哉知任已不如任衆也舜之繼堯所守一道然舜初受命則闢四門明四目達四聰以謂繼治世者耳目尤不可以不廣故也三代以還咨詢訪納固非一途然近世之所嘗行祖宗之所已試則命百官轉對實今日之要務也昔唐太宗初即位延見羣臣或論往古成敗或究民間利病每言及稼穡艱難則上下相規務遵勤儉言及閭閻疾苦則君臣感嘆議息征徭故能創業垂統成貞觀之治下至代宗每于紫宸聽朝常限三人奏事敢言者賞其盡規不言者責其隱默故陸贄以謂諫雖未從且不深忤情茍有阻終獲上通周世宗即位之始亦延羣臣使陳當世之務故能外強兵威內修政事而顯德之政獨髙五代先帝熙寧之初亦詔百官咸以次對故事不逺行之非難此臣愚惓惓所以有望于陛下也今學士大夫布滿周行人有所懷皆願自竭但慮詢求之未廣聽諫之未至爾陛下沛然發德音下惻怛之詔使之極言無有忌諱則孰不踴躍奮勵各罄所知以補聰明之萬一哉陛下察其言之當者納之用之而勸之以賞言而未當或過于訐直者寬裕色函而不加以罪非但舉空文循故事而已如此則四海之內知陛下有好問之美有聽言之實忠謀讜論日聞于上而阿諛壅蔽之私不得行矣天下之情孰有鬱塞而不伸天下之務孰有怠廢而不起者哉故臣愚過計以謂今日之要務未有易此者也至于廣收骨鯁敢言之人充耳目之任敕左右侍從之官責以論思獻納是皆朝廷之所素講不待臣言而悉者也哲宗時尚書右僕射范純仁奏乞看詳臣庶所上封章疏曰臣竊見旱暵作沴兩宫焦勞減膳責躬聳動羣聽臣以輔政無狀已與吕公著等同奏待罪乞行降黜夙夜憂懼思所以消弭災異之術上裨聖猷愚者千慮庶或一得臣觀前代多因災異求訪直言所以宣道人情以消壅蔽自陛下臨御之初即下詔許人實封言事當時臣庶所上封章盈於萬數其中必有可行之事可采之言若收其爝火之微亦可補大明之照大臣不能遍覽有司憚於舉行棄擲散遺稀獲省録故未能上副陛下求言之意也伏望特降聖旨下三省樞密院六曹寺監將前來臣庶應詔所上封章後來不以行與不行據元初承受到都大數目並令檢尋進入然後擇賢明近臣專為總領仍許於尚書省間曹及袐書省太常寺國子監工府及應間慢寺監司局內選擇郎官丞簿博士帖職教授等指射一二十員分擘看詳逐旋節略緊切大意同申三省其有關久逺利害未可便行者即行下當職官局及逐處監司州縣相度給與日限具可否保明聞奏其決然可行者便令執政進擬施行如此則必得芻蕘之言上裨堯舜之治徽宗初即位中書舍人曽肇乞修轉對之制詔百官民庶極言時政狀曰臣伏讀詩書見周成王即政之初咨嗟求助至于再三羣臣進戒亦皆至誠懇惻無所諱避然考其時猶在除喪朝廟之後及康王嗣立自乙丑至癸酉才九日而君臣更相訓告如恐不及夫詩書所載固非空言而康王纍然在喪服之中上下相飭如此其急豈非天位至重守之至難祗畏恐懼尤在其始故雖宅憂之際虛心納善亦不敢以已乎恭惟皇帝陛下聰明恭儉天質夙成孝友慈仁形於言動自出居邸第雖未有所施為而天下稱頌以為賢主及踐阼數日弛張廢置出於獨斷者莫不曲盡物情大慰民望則又天下歡呼以為英主此誠宗廟社稷之福夷夏生靈之慶也然臣以謂四海之逺非一人視聽之所能周萬幾之衆非一人思慮之所能給必須合天下之目為之視合天下之耳為之聽合天下之心為之思慮如是則陛下不視而明不聽而聰無思無為而天下治矣夫為此者非他在開言路而已言路開則上無不聞之事下無不達之情以之震舉敝壞蠲除疾苦考核能否判别忠邪唯陛下之所欲為無施而不可也昔者以舜繼堯所守一道然猶明四目達四聰及禹繼舜亦拜昌言在漢宣帝始親政事則詔民上書去其副封以防壅蔽唐太宗初即位孫伏伽以小事諫太宗厚賜勉之以誘言者至于本朝可謂平治而祖宗以來數詔百官使以次對神宗舉而行之於熙寧之初以興起事功為後世法臣願陛下逺觀舜禹成康之所行近迹神考之故事修轉對之制下不諱之令明詔百官下及民庶使得極言時政無有所隱然後陛下擇其善者而行之且報之以賞大則加以爵秩小則豫之金帛其言不足採若狂妄抵牾者一切置之不以為罪庶以鼓動天下敢言之氣紓發鬱堙壅塞之情當今先務無大于此願陛下亟行之右正言鄒浩乞如神考故事詔侍從言事疏曰臣伏見神考嘗詔侍從官言事其略曰傳曰近臣盡規以為榮耻休戚與上同也今在此位者視朕過失與朝廷政事之闕默而不言乃或私議竊嘆蓋以其責不在已夫豈習見成俗以為當然其或有含章懷寶待倡而發者也宜令侍從官自今視朕與朝廷政事之闕無有巨細各具章極言無隱噫言善而不用朕有厥咎道之而弗言爾為不恭朕將用此考察在位所以事君之實而明黜陟焉夫自五帝以來神聖超卓如我神考可謂羣臣莫能及矣然猶咨訪闕失不敢忽如此今陛下寵待近臣甚厚亦神考之用心顧近臣未必皆能上體聖意敢以所見極言無隱欲望如神考故事特降詔書諭以至懷庶幾人人思自罄竭陛下從而覽之豈唯兼收博采坐以無事而臣下忠邪得失之情亦因以灼知而盡見此要道也宣和六年司封貟外郎李光乞開言路劄子曰臣聞帝王之美莫大于詢謀治安之時尤先于警戒歷觀前代有為之君雖聰明有餘而切直之言不絶于耳雖天下大治而幾微之慎不忘于懷恭惟皇帝陛下以睿智寬仁之資膺祖宗積纍隆平之業勞心求治幾三十年華夏乂安天地交泰符瑞之應史不絶書所謂太平盈成之期實在今日陛下所當憂勤宵旰虛已以聽納羣臣所宜精白勉勵夙夜以進戒而近嵗以來士大夫狃于因循宴安寵祿諛佞成風至妄引荀卿有聽從無諫諍之説以杜塞言路多士盈庭莫敢開説是陛下有容納之德而羣臣進拒絶之計朝政之闕失臣下之姦邪生民之利病海內之休戚何由盡聞乎古人有言曰堂上逺于百里堂下逺于千里門庭逺于萬里蓋言壅隔之祻深也臣愚伏望陛下博延羣臣明詔天下廣衆正之路開不諱之門使忠良蹇諤之士有所規益而讜言進傾邪讒巧之徒不得壅蔽而下情通實天下幸甚徽宗時陳瓘論求言之詔未及舊弼劄子曰臣竊覩陛下近因日食詔許中外臣民實封言事天下之忠言必自此而進矣然而求言之詔普逮于臣民而乞言之禮未加於黃耉竊慮耆德故老久去朝廷或在謫籍或已得謝忠於徇國意欲有言泛然應詔則非舊弼之體密貢封事則有強聒之嫌若非聖問俯及隆謙示敬則黃耉之言或不樂告是以周家忠厚尊事黃耉秦穆改過復詢黃髮詩書所載聖主之所宜行也願因側身懼變之時明示養老乞言之禮必有嘉謨來助初政格王正事無先於此伏望陛下上稟慈闈議而行之天下幸甚瓘又論賞言者劄子曰臣近者傳聞奉議郎鄭敦義進士何大正等皆以封事進言各霑恩賞所以開忠鯁之路踐前詔之語蒙蔽之患自此革矣此堯舜之用心也然而臣竊以謂天下善言雖有可賞而朝廷推恩未可太遽賞而太遽不能無弊古人有言曰言而有賞則恐拘介之士憚賞而不言貪冒之人慕利而妄舉自前者詔書之下人情歡抃皆欲有言然而拘介之士意在憂國雖願其言之見聽又以希賞而自嫌欲言不言終于蓄縮此不能無弊者一也漢宣帝之初去封事之副而天下之言始得盡聞于上吏民上書言便宜有異輒下杜延年評處後奏言常與兩府及廷尉分章當是之時封事雖多而人主不勞者以宣帝左右有親信可委之士也今陛下侍從之間可委之士未見其人千章萬疏獨煩聖覽人人希賞日日望恩陛下躬自應副不無少勞非所以寧玉體而澄聖慮也此不能無弊者二矣又上書之士各盡忠誠凡朝廷當密之機未發之命彼皆先揣其當然往往斥言而無避其事未經行遣安可先賞言者今日之事蓋有如此者矣此不能無弊者三也又今年省試下第之人不減數千上封事者十有三四臨去復留意各有望自料所言可以得賞則皆指日以待恩除望而有得然後欣恱臣恐朝廷恩命難以人人而悅之也此不能無弊者四矣臣愚以謂此四弊者皆生于推恩之遽臣願陛下宣諭輔臣且賞敦義大正以誘天下敢言之士自餘章疏有可取者並皆籍記姓名將來一併推賞賞之既緩則拘介欲言之士却或無嫌陛下萬機之餘可以徐覽朝廷當密之機必待先行而後賞欲去復留之士可使悉心而俟命如此則四弊去矣臣愚妄論事機冒犯天聽惟陛下裁赦欽宗靖康元年監察御史胡舜陟乞御史言事疏曰臣竊以御史耳目之官以言為職故監察御史自唐以至本朝皆論政事繫官邪正與殿中侍御史同元豐紹聖著在甲令至崇寧間大臣營私欲其便已遂變祖宗成憲使人君無兼聽之明而南臺御史始有不言事者名存實亡害治尤甚今多事之時以開言路為急伏望睿旨下本臺令增入監察御史言事之文以復祖宗之制髙宗建炎間樞密院編修官胡銓上奏曰臣聞太平興國中有布衣皂囊獻書者太宗嘉納顧宰臣曰比降詔書許言事是雖狂悖朕不加罪淳化中武程上疏狂瞽大臣李昉請加黜削以懲之太宗責之曰朕曷嘗以言罪人哉臣以是知祖宗所以得天下定祻亂雖規模宏逺未易窺究大要納諫最為盛美仰惟陛下宵旰圖治渴聞嘉言凡詔書為求言而下者十蓋五六真有祖宗求諫之風然比日中外論事之臣顧望畏忌類多攟托細故無甚骨鯁以副青規之聽臣實未喻臣聞康澄上時政疏以謂天象變見不足懼直言不聞深可畏臣雖愚戇無識竊觀國家近事亦有不足懼而深可畏者欲望陛下申飭百官明示以渴諫之旨使各直道而行盡言無諱於以消天變而折敵衝則太平淳化之治其則不逺惟陛下留神毋忽尚書右丞許景衡乞復轉對劄子曰臣伏覩建隆詔書臣僚轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦近制每遇文德視朝許侍從官二員轉對雖放朝亦許封進比緣朝廷多事輒廢不講方當國步艱難修舉政事之時而論思獻納裨益國家乃侍臣之職也欲乞詳酌遵祖宗故事每月朔前後殿起居並許侍從官轉對或放朝亦令對進以副陛下虛已求言紹復祖宗成憲之意紹興三十年正字周必大上奏曰臣聞事有大疑謀及卿士著之洪範為世元龜我仁宗皇帝之在位也或御資政殿召兩府侍從而詢天下之事或御迎陽門集兩制近臣而賜直言之目或開天章閣內出筆扎而使條時政之當行者蓋欲採在廷之善決當世之疑盛德成功至今蓋巍巍也陛下自臨萬宇備歷百為凡曰事機難逃聖鑒近者奮剛斷起治功更易將臣舉直錯枉治內之道已無可言惟是荆襄兩淮地方數千里田畒未盡闢民兵未盡精將置而弗恤與則或非固圉之䇿將屯田以實塞與則必有生事之嫌此議者所以日夜為言陛下所以宵旰軫慮而廟謨籌箸所以猶汲汲也夫心術有限必因衆人之智明臆度難精不若親見之謀審臣願陛下監洪範之訓法仁祖之規以此二疑條為清問內詢臺諫侍從以殫衆人之智外詢沿邊帥守以盡親見之謀俾之深思各以實對必使疆埸按堵盟約無虧在我者備禦既修而在彼者觀聽不惑然後陛下與二三執政總其説之善者折𠂻而行之不過片言議論定矣與夫日上螭頭之奏時聞黈纊之聰泛為危言而卒無可行名知大體而實則迂闊較其利害蓋相萬也譬猶治疾當集良方茍無良方但言疾狀雖云明脈豈曰善醫淹歷嵗時初亦何補思患豫備恐不其然伏望聖明特垂睿斷髙宗時胡寅上奏曰臣恭覩陛下虛心求言日昃不倦凡職事官以上悉許面對資衆謀屈羣䇿以收恢復之功德意甚美而比來待對之人隔下班次有五六日至于旬時者卑官冗吏職有常守既爾徘徊不無妨廢其間嘉言讜論稽于上達又無以稱陛下見賢若渴之心臣愚欲望特降指揮凡當面對臣寮若遇其日引對未及即令退具所欲論奏之言依祖宗時百官轉對故事實封于閣門進入則陛下有達聰之美臣子無底滯之嘆兩得之矣章誼乞詳延多士論天下利害疏曰臣聞大廈之建非一木之枝帝王之功非一士之略方今國勢未寧邊備未設錢榖甲兵之問數至于廟堂軍書羽檄之急交馳于道路一日二日之間幾微巨萬陛下與二三執政之臣朝思夕計固曰無遺酬對裁量固云不倦然而望治之誠雖切于九重而算計見效靡凝于庶績臣伏思之此殆帝王之功未可以獨致而羣士之略所宜于遍舉以陛下天縱之聖固已不自恃其聰明而委之于執政任事之人矣誠使執政任事之臣亦不敢自任其思慮而資其䇿于天下智謀之士則何為而不成何求而不獲哉臣願陛下設為一司詳延天下習知治體之士使之極談天下之利害于政事則論其孰後孰先于法制則論其孰用孰捨論財賦則如何而足論甲兵則如何而強論都邑則何地可以宅中論征討則何人在所燮伐四民何由而得遂其生百吏何由而不失其職盜賊充斥必有安集之方夷狄內侵必有攘却之䇿然後宰相總持衆美而定議于廟堂陛下公聽並觀而責成于宰相如此則規模宏逺來效可期矣傳曰禹思天下有溺者猶已溺之稷思天下有飢者猶已飢之故孔席不暇暖而墨突不及黔今天下飢溺甚矣此志士仁人遑遑之日也收覽羣䇿共濟當時之務以拯斯民之急非陛下仁聖誰為之日中必熭操刀必割誠不可以少緩惟聖主留神幸甚試中書舍人李彌遜乞許內外職事官言事劄子曰臣聞廊廟之材非一木之枝帝王之功非一士之略舜有大功二十皆取諸人此有天下不易之理況艱難之時乎國家多事以來十有餘年大勳未集陛下深創前失力圗大計宸謨廟算固無遺䇿然萬幾至繁日不暇應千慮之外有當却顧而預防者或隱于尋常不見之地非賴衆智未易明也夫今日當務之急政事不可不修而自治之方未舉夷狄不可不備而善後之計未定有志之士所深慮也臣願陛下以此二事詔內外侍從官及見任職事官以上使得悉陳之陛下與一二大臣慎擇而力行必有以上裨聖聽助成恢復之功其在外官令於所在州軍實封投進行在官依面對例施行起居郎洪遵乞修注官經筵奏事劄子曰臣不肖幸得以記注陪侍經幄瞻望天威近在跬步至於御茗分珍華墩錫坐皆非糞土小臣平生所敢覬望竊見春秋二講每於雙日先期書歷經筵官講讀畢許留身奏事修注官雖與簽書未嘗有奏事者皆云近例如此聯名一歷不應别為二體臣伏聞元祐中起居舍人呂陶嘗乞候講讀罷臣僚再留奏事並許侍立以此觀之講退猶且入侍何由不許奏事欲望睿慈下講筵所依講讀官例施行遵又經筵進故事曰仁宗皇帝謂輔臣曰比上封言政事得失者何其少邪豈非言路壅塞所致乎其詔閣門通進銀臺司登聞檢鼓自今州縣奏請及羣臣表疏其亟以聞臣聞木從繩則正后從諫則聖古之聖王以左右輔弼諫諍之臣為未足也則又設敢諫之鼓進善之旌誹謗之木下至百官官針王闕百工庶人舉得以言二帝三王之盛用此道也臣恭仰仁宗皇帝承三聖休業天下已安已治可以垂拱無為方且深惟逺慮一命令之下一政事之出孳孳業業專以闕失為懼嘗曰臣下能進忠言朕何惜夏禹之拜又語輔臣以封事之少丁寧告戒惟恐壅塞方時海宇又安俊傑居位臣寮所陳公車所奏一言片善朝至而夕行故能四十二年之間治功茂盛跨軼三五視漢唐為不足道竊謂有天下者當以仁宗皇帝為法中書舍人周麟之上奏曰臣伏見陛下厲精為治勤求民瘼芻辭輿誦博采兼聽孳孳如不及四方利病至纎至悉庶人得言之士大夫得言之監司郡守近民之吏得言之此誠有虞詢四門眀四目逹四聰之時也陛下求言之意聞之唯恐不行行之唯恐不盡而天下之所望者亦如此故邇者士庶上書陳獻利害及守臣到任條具裕民事進降者甚多看詳者不一然以臣觀之大要有三或施之于民而民利槩之以法而法通若此類者固無所疑朝廷皆以次施行矣有行之可以利民而于舊法及一時指揮或大相抵牾或小有不合言既不可盡廢法亦不可輕議若此類者臣亦各權其事之輕重乞從朝廷隨宜參酌可否矣其或自有見行成法州縣所當奉行而猶申請不已言者猥多覽者易厭臣每看詳至此謂之無可施行則實有其弊設或一一申嚴則不勝其繁凡若此者臣今欲並行類聚總其條目取自聖裁特降明詔戒諭郡縣之吏使之明習條令罔或容私遵守成憲毋致違戾究心夙夜悉意奉行庶幾使陛下愛養元元廣謀從衆之惠遍及寰宇無一夫不被其澤天下幸甚右正言陳淵上求言疏曰臣聞天地至大日月至明而人之遊乎覆載之中出乎照臨之下皆其德也今使人旦朝贊之暮夜譽之則人必以為得狂疾矣何則天地日月非贊譽之所能益而亦無待乎人之贊譽也人主之德其大如天地其明如日月蓋其所當然者雖贊譽何加焉故其平居所宜聞者切直之論而已虛辭飾説以相媚恱非所急也且凡贊譽者非欺則諛使欺且諛者得行其志人臣之利也而人主何利焉若夫切直之言乃人主之利而又人臣之所不利故人主聞切直之言常少而聞贊譽之語常多此不可不察也開道而求諌和顔而受之猶懼不至況樂軟熟喜便佞而惡聞其過乎昔在崇觀迄于宣和一時用人往往將順者多而正救者少馴致敗亂職此之由誠願推切直之為利監贊譽之為害狂愚者雖甚必恕諛佞者雖寡必逺則下情得以上通而天下治矣淵又上奏曰臣聞昔之治世工誦針諫大夫規誨士傳言庶人謗夫謗猶不廢也非直不廢而已舜之求言乃立謗木是使人謗已也而周公之戒成王曰小人怨汝詈汝則皇自敬德是又不禁人之詈已也由是言之後世所謂謗訕之刑指斥之誅豈古之道哉祖宗之時謗訕指斥之律蓋有不得已行之者自紹聖已來至于宣和之末何多也使誠有是事聞而改之可也又豈可以一人之勢而盡箝天下之公論乎若其無是事而文致其罪則天下之士聞之將有藏其身而不見膠其口而不言者矣此今日之祻所由致真宗朝有訟事投匭者言涉不遜真宗録其所訟之事以示外廷曰若以其言盡付之有司所寃未直而指斥之罪先加之矣真宗之心與舜周公之意可謂不期而合者也後之子孫其可不以為法乎陸贄曰諫者多表我之能好諫者直示我之能賢諫者之狂愚明我之能恕諫者之漏泄彰我之能從有一于兹皆為盛德人主欲知諫之有益斯言盡之矣淵又上奏曰臣聞人之所以惡聞其過者求已勝也而不知求勝于人終莫能勝唯不求勝乃能勝人書曰豫視天下愚夫愚婦一能勝豫夫如是故能合天下之勝已者資之以成已何慮乎不勝孔子曰丘也幸茍有過人必知之孟子曰古之君子過則改之蓋聖人未嘗無過以人知之為幸而君子有過亦以改之為貴未聞有惡聞其過者此所以有能有功而天下莫能與之爭也其為勝也不亦多乎何則今人之為不善其知而故為之者固不足道有以善為之莫之覺而入于不善者是其始于善不善特未明也有人于此指摘其瑕疵而譏議之則其見聞智愚必有以勝于我矣若拒而不受彼言之者固無所損而吾之不善自若也如取其言之善以為一已之有是以天下之善為吾善也雖欲不勝人其可得乎淵又上奏曰臣聞太宗皇帝嘗以里語告真宗曰道吾惡者是吾師是雖人之常談而聖人取之蓋人主唯不知其過故與亂同事而不自悟使聞其過而改之雖堯舜可進也由是言之道吾惡者非吾師而何孔子曰三人行必有我師焉擇其善者而從之其不善者而改之夫不善者猶將內自省焉而以為師而況於攻吾之惡乃所以進我於善也其可師也明矣仲虺之誥湯曰能自得師者王如是而得師又豈因人而得之哉不因人而得之夫是之謂自得人主能自得師則天下莫不歸焉其為王也孰禦光宗淳熙五年翰林學士周必大上奏曰臣聞人主冕旒蔽明黈纊塞聰其所以能明見萬里者內寄耳目于臺諫外寄耳目於監司也今臺諫既以所聞告于上矣則為監司者自當數以所部利病獻焉今除每嵗刺舉一二官吏外鮮聞以某郡縣之利當興某郡縣之害當除徹于陛下之前者豈真無利害可言哉蓋未嘗周爰諏詢之過也臣願明詔部刺史或月或季各以部內所當罷行之事倣成周小行人所謂萬民之利害政事教治刑政之逆順與夫作慝犯令豐凶和樂之書條具以聞母得用薄物細故塞責如此則不惟陛下坐而周知天下之故亦可于是稽其人之才否而詔黜陟矣寧宗時袁説友乞來忠言疏曰臣切見陛下收採人才置在朝列必欲使之各盡所長以濟事功臣觀在廷之臣類皆謹守繩墨無所裨益如是則其誰不可為也陛下憂勤宵旰于九重之上羣臣無能為絲毫助者蓋親近者少而踈逺者多也陛下朝夕論事不過二三大臣雖侍從臺諫固已進見有時況于其下百執儻有竒謀逺慮安能為用踰二三嵗始一輪對以踈賤之臣咫尺天威方且驚惶畏栗之不暇尚安能從容言天下事哉不過指摘細微以應故事遂使陛下有意聽言未必皆可採之言有心納諫未必皆切直之諫至于一有施為近臣則曰上意已有所向小臣則曰朝廷自有成謀事有利害則皆緘默不言一或參差始盡言其不可間有敢言之臣陛下又為之遷官進秩徒可來希意茍合之士而清修端潔者又嫌于冒進而不肯言臣謂未行其言而遽進其人乃所以杜言者路也遂使天下利害陛下以一人之身而獨任其責將何望于天下士哉雖臣亦為大可愧也臣願陛下明詔有司事有可否不間侍從百執之臣不以輪對使各罄其忠其言可用雖無謀援當力主其説未有成績不可遽加進擢以為賢者之嫌庶幾羣謀用而勳業濟矣都官郎官袁燮上奏曰臣不佞四月六日猥以庸陋獲對清光敷陳治道勸陛下以延訪英髦讀畢臣復口奏申述延訪之意謂陛下欲周知是非得失之實要在勤于好問陛下首肯再三聖詔云問則明於是悚然深服聖人謨訓如此之簡且切也退而與朝士言亦無不稱贊聖言之簡要陛下既洞見此理臣以為必能日與賢臣往復問答開廣聰明期大有為于天下而側聽十旬陛下端拱淵默尚如曩時臣竊惑焉豈聖意自有主耶臣聞易之乾曰君子學以聚之問以辨之乾君德也謂學雖甚富而心有所疑不辨不明此所以貴乎問也中庸曰舜其大知也與舜好問而好察邇言仲虺告成湯曰好問則裕自用則小以是知勤于好問實帝王之盛德陛下既知如是而明則當知夫反是而暗明則光輝旁燭無所不通暗則是非得失懵然無辨豈不大相逺哉且今日在廷之臣孰有某善孰有某能孰可以當重任孰可以辦一職孰為人望所歸孰為清議所貶陛下能盡知之乎當今之務何者為綱何者為目何者當先何者當後所未立者何事所未革者何弊陛下能盡知之乎吏貴乎亷而貪濁者衆吏貴乎良而慘酷者繁或催纍年積欠鞭箠不止或借朝廷威令羅織無辜此百姓所以不堪其苦也陛下能盡知之乎將帥擁兵固有忠於為國者矣而多徇私者固有勇于立功者矣而多怯懦者固有勤於閲習者矣而多茍簡者掊剋日甚名籍多虛此緩急所以不可仗也陛下能盡知之乎凡此數條臣竊料陛下未必盡知也夫以聖德純茂而於此未能盡知其故何哉亦惟端拱淵默而罕發于清問而已今宰執奏事陛下猶有所咨訪自從臣近列得聞玉音者寡矣況踈逺者乎此國家之大患臨政雖久而治功未立皆由此也或以為人主一言之失史官書之天下議之問而不當不如勿問臣竊謂不然自古帝王之言豈能無失惟得賢臣開陳正救歸于至善而已豈可畏人之譏議而終於不問哉陛下誠能自今以往有疑必問咨訪宰執日益加詳至于從臣之獻納臺諌之奏陳百官之輪對監司郡守之升殿者人人咨訪究其所藴必將披瀝肝膽效其忠誠而事無巨細豈有所不知哉臣又聞皇太子天資英粹率由善道可謂盛德矣而于接對宫僚之時亦罕有所訪問蓋非不欲問也其意以為聖父淵默於上而子道亦當爾也臣嘗觀一介之士欲自植立者茍有所疑亦必咨問況主器之重所關甚大而可不以是為急乎此在陛下以身帥之陛下躬好問之誠率之于上而以臣所奏宣示東宫曉然知好問之益每一月具所與宫僚問答之語悉以上聞則智慮日明德業日充誠宗社無疆之休也陛下毋忽臣言元世祖時趙天麟上䇿曰臣聞明堂之材非一樹之枝太平之功非一士之略以衆人之聽為聽則其聽益聰以衆人之視為視則其視益明堯有衢室之問舜有總章之訪兼天下之智悉天下之情故能文武聖神受皇天之眷命溫恭濬哲增玄德于無窮此帝王之極功古今之共美也今國家體堯齊舜坐阜天民自先帝以來乾坤再立日月重明一家之典式方新萬姓之風俗漸變太和方立厄運還來有共工崇伯之徒扇滔天方命之禍上玄降鑒殱厥渠魁復用賢臣爰修治具然而覆盆難照之地生靈無告之都餘風未殄盛化未𢎞知此事者莫及官吏不加詳問孰肯明言臣謂內外官僚並膺天命或申風化或舉宏綱或整治軍民或監守營辦各居其職各掌其事斯皆逹情弊之淵源見利害之精微皆有區區為國之心坦坦至公之論以國家雖開言路未嘗專詢于百官彼百官其意將曰布衣之人綽綽餘裕無官守之拘而有言責之階則上自朝廷下及軍民無非所當言者故敢言之也今吾輩既當職分職分之外非所宜知進則恐有侵官之嫌退則自違忠懇之志于是超然無懼敢陳仁義於王前者萬無一二焉臣竊惜國家之聽覽猶有所遺而百官之忠告未獲盡伸也唐文皇貞觀五年詔百官言得失中郎將常何武人不涉學家客馬周為條二十餘事皆當世所切太宗怪問之何以實對且言周忠孝人也此蓋無學者假手於人而為之亦足以見其友之何如也且方今山野草茅之人白屋衡門之士猶使之上書陳言況內外之命官乎伏望陛下增光鸞紙垂問鵷聨旁及外路之官俾適中心之願天人之相通奚以審之帝王之一揆奚以行之朝廷之美慶奚以增之古今之大體奚以施之守成之治道奚以先之化刑之先後奚以言之綱常之正理奚以本之外方之未服奚以來之閭閻之疾苦奚以救之有司之私弊奚以革之食貨之富庶奚以致之其此等未能悉數者皆奚以問之凡省臺院部及管民官五品以上內外諸衙門三品以上官並各對之凡官品不在限內而欲對者聽凡無文者具實事凡所對在京師者就呈都省在外者繳申所統達于都省都省未敢開拆照視乃奏聞于上上命大臣議之於是都省判送禮部禮部官察院官一同評議既定具呈都省都省及御史臺翰林院官議其可行者奏聞而行之凡言中者至考加階不中者無罪凡英材卓犖超絶倫流者别行不次用度若然則國家之聽覽無遺百官之忠告獲伸虞書云明四目達四聰此亦其一也天麟又上䇿曰臣聞國家之政或有弛張下民之心即殊哀樂驗于民而知其政聽其聲而見其情蓋在心為志發言為詩詩有六義之分道無二端之異一言可以蔽之思無邪焉耳矣所以衆史掌於前聖人刪於後三百餘篇班于六經固非輕也豈惟此哉上世以來稗官嘗立九流之內小説預焉凡道聽塗説之所造閭里小知之所及亦使綴之而不忘庶或一言之可采也戰國而下總攬權綱以為狂夫之議鮮有得中聖人之書足以為法是以天子不採詩諸侯不貢詩樂官不達雅國史不明變惟漢武之朝定郊祀之禮祠太一于甘泉祭后土於汾隂乃立樂府而采歌謡於是有代趙之謳秦楚之風然帝徒能好名而不復察實故當時之體斷不能肩上世帝王之治也方今聖主拱極賢臣毗政羣生已遂四海咸賔又奚須市井閭閻之語哉但以古今聖賢之所同者志于仁而已厚其民而已是則同若夫政事之因時損益之中莭則不同也何則議結繩之事於耀文之世豈能行乎談無為之理於救弊之際豈可從乎故雖有先王之陳迹而亦未能一一盡從之也遂不免於旁搜逺覽博達羣情庶乎殊塗而同歸百慮而一致也聖明開言路之後陳言者莫非通經典之儒士習文法之吏貟皆持大體以泛言未悉輿論而備紀由是觀之則市井閭閻之語亦實不可棄者也昔堯有四凶堯不能去及舜為相而去之非舜之明明于堯也以舜之陶漁耕稼在下親被其苦故知之也況天聰明自我民聰明天明威自我民明威可不先於民乎臣竊以為國家若立采風謡之官則下民之瘼可以知矣守令之賢愚可以辨矣朝廷之得失可以聞而戒之矣又審市價之髙低則知民之所趨尚者矣察方俗之善惡則知政之所當加者矣聆歌頌之和聲則知法之所當守者矣伏望陛下令繡衣使者巡行之兼采閭閻風謡達之憲臺凡政事之失者移文都省改張條目奏聞丹闕付于隨處行省而行之所以廣仁恩也凡祝頌之和者行下太常播為雅頌奏聞丹闕薦于天地宗廟而歌之所以廣孝敬也仁恩孝敬既廣於上而百姓心和于下矣心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五榖登朱草生山不童澤不涸麟鳯在郊藪龜龍逰於沼此蓋和之至極也聖人云移風易俗莫善于樂其此之謂歟歷代名臣奏議卷二百
