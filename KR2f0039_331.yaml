body:
  text: 歷代名臣奏議卷三百三十一明楊士竒等撰禦邊宋哲宗元祐元年三月守慶州范純粹乞以棄地易被虜之人疏曰臣自元豐元年在陕西路備貟監司適當軍興之時至七年乃得還朝故於陕西邊事粗知始末昨蒙除授今任赴官過闕雖蒙特許朝覲纍狀乞上殿奏稟職事尋準樞密院劄子催發出門故欲敷奏職事了不獲陳今既到任身逺朝廷須至披露論析仰黷聖聽切以西夏之國效順嵗久邊隅無事夷夏晏然秪因种諤沈括數輩希功造事欺罔朝廷以謂夏國失勢衆怨親叛無甚勞費席卷可平或請覆巢長驅或請進築開拓致朝廷大舉戈甲諸路並興固嘗長驅而無功亦已進築而失利衆説並試一無所成徒致關輔瘡痍公私困弊百姓流徙國兵殘耗雖諸路各有收復故寨廢州多非中國所利之地深在敵境創為興修橫添兵屯倍置器械加費金幣益耗芻糧盡關輔公私之力曽不足以自支故日煩朝廷自內應副而邊防釁隙日在可憂彼夏國者深沈自居未即報應蓋亦以頻年應敵部族疲勞橫山之人失業良久勢力未復舉動良難故但比時以來數數遣使迹如效順實乃有謀外則不議土疆內則不修常貢既形欵我之計又為自資之謀臣聞纍畨使人貨販滋廣通約所得不減三數百萬其自資之謀亦可見矣諸路軍兵經纍次凋瘵之餘雖將招填略充舊數而新人眇小未堪戰鬪朝廷但知兵籍數目而未知士卒之氣全未振奮臣未測朝廷謀畫所向但見近降朝旨應因軍興增置兵將官吏及添戍軍兵並已抽還外議以謂朝廷晏然自以為無事人切憂之則其欵我之計亦已行矣常貢未修彼所以言邊事之未竟也疆土不議彼所以為將來舉事之端也理勢灼然無可疑者然則邊防大事未見成畫臣恐嵗月滋久彼力漸全待草豐榖實之秋當弓徑馬肥之際稱兵有請暴肆跳梁倉卒之間何以遣應若臨時欲議許可則國體有傷若至期復舉干戈則生靈被害唯編户之方困豈再籍之能堪臣心之憂言有不忍臣昨者既不得奏稟聖算尋曽往見執政大臣語此邊事雖所慮亦或切至而為謀未知所從如臣之愚亦何敢以此自任唯是思慮所得參訪羣言不敢內有所懷願陳其説臣切以謂諸路所取夏人之地固未足繫彼國存亡之機而彼之所以乘困而必爭者蓋以謂日侵月削而不敢校則小國之勢在所可憂故自保之計不得不然一國共謀豈不及此由是推之乃知必爭之地未棄則邊釁無時而可除也夫中國者禮義之所自出也今彼之與我必爭者顧禮義當何如耳臣竊觀近時之論邊事者獨以謂彼既困怠無所能為加以數年可期柔服臣竊以謂不然彼所以默默自處未有所請但為自全之計者乃所以飬鋭待時也是豈終困之理哉謂新地自興復以來糜耗巨萬斥棄為難殊不思前日之已費者不足復追而它日之未費者尚可救也臣伏覩陛下即位以來纍降德音凡聚斂掊積之令有害民生者悉行蠲除四海兆民歡呼愛戴蒙被聖澤可謂盛矣臣竊思念天下之費莫大於饋邊若邊事未有措置他日一有調度帑藏空虛無以取濟則聚斂傷民之令恐不能輒已此又不可不慮者也臣願陛下靜占往鑒斷自聖心因彼遣使再三而未有所請之時乘彼詞理恭順而姦謀未露之日特降詔旨槩述先帝所以問罪之意具道秉常所以復國之由嘉其忠藎之誠諭以逆順之理趣令先以前後戰陳虜陷官貟使臣將吏丁夫悉歸朝廷其所削之地並從給賜如此則邊釁可期於止息生靈有望於安全亦足使四夷知朝廷前日興師之意在於拯患問罪而不在乎疆土之利也中國陷寇之人又知朝廷愛人而不愛地也神功偉績可謂難名臣非不知危言異議自速祻悔伏念不獨守邊之職理當建眀重以事君之方義無可避臣於先帝臨御之日數論邊事屢竭迂淺伏蒙先帝曲賜優容每有稱可非敢獨於此日驟為首尾異同之論古人有言曰知豫之為取者政之寶也取豫之間正在今日伏望陛下察臣誠在憂國志切愛君以臣今言少關聖慮如其粗有可採即乞宣付三省樞密院令大臣共議事貴機速伏乞早賜處決庶不為朝廷異時之患則天下幸甚傳曰事君有犯無隱臣則無隱矣其如位卑言髙妄議朝廷機政實犯天憲不敢以誅竄自逃貼黃臣頃者或聞北敵曽有文字到朝廷請勾下西邊兵馬臣昨充北朝國信使日其接伴之使嘗語及夏國之事亦云曽有文字教南朝罷兵臣是時隨冝應對尋具奏聞臣以謂西北脣齒之國萬一北敵狡慢或一日又以夏國所失疆土為言即朝廷至時却已難為處決今日機會恐不可忽此臣所謂事貴機速也臣竊見所得西夏舊城堡寨如河東路葭蘆吳堡鄜延路米脂義合浮圖環慶路安疆等寨皆係深在賊疆於漢界地利形勢略無所利而所費芻糧皆是倍價計置及嵗嵗勞煩稅戶逺入輸納至于運致錢帛器械置官遣戍一一艱苦今日若行斥棄委是並無關害唯是鄜延路塞門一寨係當中路之衝平川廣闊去帥府地里甚近别無地利控扼之險自得塞門增逺四十餘里可為中路屏蔽粗為邊防之利兼此塞門一寨舊是漢城棄陷以來年嵗未逺似與其餘城寨利害有殊朝廷若議存守則理或有名更係朝廷裁決所有蘭會之地耗蠧尤深如聞朝廷已遣使相視勘會更不敢縷細開陳平章軍國重事文彥博奏曰臣伏讀聖問有可禦西夏之術臣去年夏始聞西人欲求內臣以謂方國家多事務早安靜奏乞朝廷恢天海之量廣示開納禦四夷之術羈縻而已由此可以息兵止固吾圉外夷懷服中夏安寧則太平之風浸隆浸久兼曽繳進神宗專令臣男貽慶齎賜臣親書詔一夲所貴審知神宗夲意止務安邊不欲輕舉皆是邊臣希望功賞為國生事徼幸萬一以致兵食困匱財力殫耗必料此詔已經聖覽今復蒙下問所禦西夏之術臣愚何足以仰副虛佇臣切見西人自去年已來凡數次入朝即未見修嵗時常貢之禮亦未聞請常賜之物度其姦心必有所待當此之際朝廷亦須有以待之邊臣亦必有以制之若更如向時种諤徐禧輩料敵不精謀攻失策致誤邊事即關中之人其心搖矣自靈武永樂王師不振之後兵勢民力尚未完復狡羌竊發必能制乎即如向時种諤輩皆云西人亂弱取如拾芥又可信乎國之大事豈可數為狂計所誤朝廷於此固當熟計而深念事欲美成計須先定當責成邊臣審料賊勢精選諜者密窺賊形必先事以待之使賊計不行邊壘有備此亦固羌夷之䇿為人謀之小勝或西人欵塞請覲詰其所由出於善意即導之使來俟至延安帥臣密察亦當得其要領先時奏聞廟堂之上可以預料而審度之俟至闕下知其所來必有所為因其所為之可否或議或詰審而應之可者即從否者即已若議及疆土須廟堂之上衆謀大同茍有後艱同任其責或取與之間謀有同異即各述利害理須明白後或不應謀果不臧自任其責廟謀一定邊計粗寧天下小康堂上髙枕矣伏惟陛下聖眀逺大之計固已先定出於衆智豈俟臣之過慮然采芻蕘擇狂言亮其誠而不責其妄幸甚元年彥博又奏曰中外臣僚上言夏國受朝廷封册恩禮極優錫賚尤厚而敢忘恩背惠輒行公牒傳達疆吏自絶於天不修貢奉天地所不容人神所共怒乞行天討以正有罪欲乞降詔邊帥及出敕榜以諭中外若朝廷姑務息民推天地之大德曲示含容抑羣情之怒忿不與醜羌計較即乞眀諭邊臣嚴加守備靜以待之必取全勝所有朝廷續遣大兵且令分屯次邊州軍以備緩急邉上勾抽元祐元年十一月吏部尚書吕大防答詔諭西事疏曰臣伏準詔問戎人狡獪未測其誠心臣愚以為四裔之情自古無信西夏自繼遷以來專事譎詐惟朝廷御得其道則詐無所施或失其方則驕而益肆待遇之體不可不審然以臣觀之今日夏戎之情略可見矣羌人重於酬報先帝舉大兵徑抵靈武幾入其國而不能以數萬人之衆入塞為報永樂諸將寡謀敗事使北敵僅得以藉口然自是王師深入不虞之咎非其夲國舉兵之成功蓋未足以為美敵之無能為一也自來開邊進築之始敵必極力決爭乘其未堅至於三四不能得而後已昨蘭州之城攘斥甚廣雖一再至爭不能得去嵗冰合遂不復來城既益堅敵望亦絶此虜之無能為二也比聞秉常極孱劣梁氏既死而秉常已亡則內難未已何暇外圗雖使秉常得存亦不足畏今數遣使入朝而不早布誠欵者蓋茍欲觀望遷延不敢先發以示弱以臣愚計切聞敵使旦夕到闕可使押伴臣僚且以私意問其來使今主上嗣登寶位自大遼諸國皆遣使入賀夏國是朝廷蕃臣何故獨不至以觀其意足以測其偽矣又詔問向者所得邊地雖建立城寨亦慮孤僻不易應援棄之則弱國威守之則終恐戎人在念臣以謂新收疆土議者多言可棄蓋思之未熟也詔旨以為弱國威真廟算之逺慮然臣猶謂棄之不止弱國威而已又有取侮於四夷之端焉不可不審計也況蘭州西羌之地夲非夏國封境又其君長嘗受朝廷祿秩元昊以來方盜據其地延慶城寨則接近漢界一旦舉而棄之未見其可今日措置之冝只可降詔下夲路將會州一處更不攻取其蘭州及延慶兩路新建城寨只據見得地界守禦亦可以稍安敵情而為議和之計矣議者不過謂戍兵少則不足以出戰多則無力以供饋臣愚以綏蘭之地皆並塞美田增招民兵墾以足食則供饋之費省専事守計少存戰兵則騎兵可大減矣其增招民兵墾闢曠土分守戰之計減供饋之費如以為可即乞下臣條析子細利害又詔問邊計合如何措置向去如何守禦臣愚以為今日邊計唯擇將帥為先轉運使為次其他施設皆可取辦伏聞國初西戎之患多在環慶太祖皇帝擇姚內斌董遵誨二驍將以守二州租賦之入兵械之費一切付之而聽其自為西人畏之不敢入寇今以四海九州之力奉邊而不足太祖以二州租入之費禦戎而有餘以此言之守禦之方在於得人而已臣愚以陕西五路宜擇威名忠亮之人不限文武為之統帥其次以為將佐又擇公正強眀之臣以為轉運使副俾各擇其才能以充其任使屬官備邊之城専事守計而出戰救援之兵蓄於內郡平居則散而耕寇至則聚而守且為內郡之兵以援之視寇入之多寡深淺而必報之無使其得志亦不妄動以生事守兵雖見大利不得出戰戰兵雖見大利不得久在邊如此則費省而易供守堅而不墮其計矣給事中孫覺乞棄蘭州上奏曰臣頃在諫職嘗議蘭州可棄兩次奏聞未蒙賜可切聞西人在館以蘭州為請而朝廷大臣議論不一或以為可棄或以為不可臣切思之二者皆有所見非茍而已也以為不可者以戎人難保棄信忘義今日得地眀日侵邊未可知也與其割要地以利之而不能巳其侵冒孰與守其要害而坐制其弊哉以為可者則以為蘭州之地乃彼所素有吾雖得之增兵益戍未嘗有毫髮之益而嵗糜一百七十餘萬羌人又嘗大舉圍閉久之乃罷終為中國之患而生西人之隙恐西人今請不已用兵未有巳時二者所見雖不同然皆為中國計慮憂深思逺有志之士也以臣觀之今者朝廷之於西羌幸可乘其無事保飬三數年間亦可以休息邊人困苦之弊萬一西羌不如所請跳踉桀驁如元豐時則臣知廟堂之上憂未艾也臣以為棄之便凡臣所謂棄之者非謂直棄以與之而已蓋欲於未與之時先與之要約西界寨柵往時所謂要害羌人取之而去者有幾令西人先以還我約束既定乃議與之如此則吾所得者亦不少矣伏望聖慈因其來請特與之勿牽於異議拘於常守而失此機會也漢宣帝明主也趙充國良將也以宣帝之明充國之老練其論羌事往返至於五六年從其䇿而事乃集廣謀博議古之人不免要在明主擇而行之哲宗時侍御史劉摯論邊事上言曰臣伏見元豐中出兵西界增創城壘議者講求利害久矣臣亦嘗具三策上於朝今夏人泛遣使者已到邸纍日其勢必有邀請雖廟議默定而區區不能自已謹復條列一二補前奏之未備以待採擇議者之論臣嘗詢訪本末備得其説為棄地之議者曰往年興師本以弔民伐罪既取地自利其勢必爭傷財害民以爭非其地其勢不得不棄困而後棄不如一捐空城豫之以示恩惠此言是也然難者謂豫地所以息爭若虎狼亡厭爭求不已得地據險益擾近郡其能保不為患乎為守地之議者曰頓儲設阻增募土兵逺斥近援何地不守且先皇帝之所得而以豫人非是此言亦是也然難者謂敵不得地兵難不解日引月長邊釁益大其能保終守此地乎故議者之論非不曲盡事理至於弭未然之患如難者所憂則雖好謀之人莫敢任責竊料朝廷深計逺慮未欲遽決亦必以此臣愚不佞獨謂用兵以終守其地誠難保也棄地而使不為患臣雖老矣願保沒齒不見邊境之憂惟陛下赦其愚使畢其説臣聞向所得地在熙河為蘭州在鄜延為五寨蘭州夲西蕃故地而五寨夲夏戎所有也其地道里迂直産利厚薄所須守兵多寡轉餉勞逸皆朝廷所熟究臣不復道而自夏人視之為必爭之地彼將以誓約為請固請而固不豫彼將獸困而鬪借兵北戎以逞其忿朝廷且有西顧之憂使我師每戰每勝臣猶以為非國之利又況殺傷相當成敗未可知皇帝陛下諒隂之際太皇太后垂簾稱制正思與民休息而顧欲戮力血戰以爭尺寸無用之地所謂以隋侯之珠彈千仞之雀由此言之終守其地是臣之所以不敢保也國朝自祖宗以來嵗捐金帛數十萬遣使修約而西虜稽首順命者數十百年矣蠻貊好事亡厭固天性也然且如此則恩深利厚足以羈縻其心故也今乘先帝討擊之威因其屈服之勢曠然推惠歸侵地復嵗賜丁寧戒敕分棄前患復謹舊約彼雖有桀黠眥睚之意既一杜塞其欲無所發則亦將感激退聽復如前日何苦必欲動衆犯順以自魚肉其民雖彼之國寧獨利乎古之飬虎者時其飢飽適其怒心虎或可飬而況四裔乎由此言之弭患息爭非獨臣以死保之自祖宗以來御此敵者用此道也臣願采議者之論觀異日之勢而斷以此意大計既決其餘措置纎悉施行次第在朝廷裁之而已雖然臣猶有拳拳之愚不敢不盡今夫請地在彼豫地在我是以主制客以逸待勞之勢也為彼計則不得不急為我計正冝從容間暇鎮以無事臣切怪近日議者皇皇汲汲視此地如金城湯池唯恐不守不然如附贅懸疣唯速去之為快異議紛起先自惑亂又何其迫遽無大體也今使者雖在邸臣願且毋遽許以地而厚禮答之善詞遣之或先復嵗賜而微示以不愛地之意度其效順堅決至於再至於三然後以嵗月豫之所謂許四裔不一而足夫豈晚乎臣愚不知大計惟陛下裁幸殿中侍御史吕陶上慮邊五疏一曰四夷為中國患從古有之雖純王極治所不免然無如今日胸奴之盛強也禦戎之策前世止言中下雖搢紳之儒介胄之士備見利害互論得失或専和親以茍一時之安或務討伐以洗數世之耻然無如今日制御之失也盛強之漸非一日而能蓋自光啓以來善窺中原之多故起掠旁鄰以廣部族至於石晉則又藉其兵勢以取天下乃割地以報之夫十六州者皆據宅要害天之所設以限四裔前世聚兵置帥控扼之地既已棄而為其巢穴矣而乃劃千里平廣之野以自守禦且藩墻不完而户庭易覘則冦兵奮臂以入又安怪其南牧之患哉是以晉祚之末悉衆來寇如蹈無人之境而得志以歸於是有輕中原之意國家之興數從數叛景德之役氣焰大喪始露講好之請章聖皇帝以休息天下為慮有為民屈已之説可其盟約因而罷兵而天下之武備漸以弛廢至寶元康定之間西鄙不庭王師未克敵人觀我之釁外自連結以邀利於上多張虛聲屢出慢言以駭惑朝廷之聽而當時之勢顧有未安乃議增其金帛以至五十萬今三十年矣時獻一書嵗馳一介設難可之求發非常之問以觀吾君吾相之應答而朝廷拳拳然若奉盟主未嘗輒忤其意寧忍愧耻不敢興事惟重賂柔辭以固鄰好舉天下生民之膏血劫以鞭撲聚以錐刀而歸於敵者幾千萬也古之外敵強盛有如今日者乎古之制御外敵有如今日者乎然而恃以為長久之計亦竊為執事者不取也夫兵家之要先據地利不然則善屈敵人之力而勝之故軍志曰先處戰地趣戰者勞又曰以佚待勞以飽待飢謂之理人力彼十六州者古稱險固之會而我皆失之則地利有不及也所恃者獨中國之冨強耳而掊剝吾民嵗為供饋使之坐得厚賄以充其強悍之力而我之生民日趨困弊王兵未舉而邦夲先搖動則素所恃者亦不足矣始防外憂而終召內患也雖曰和戎為利又安獲其利哉臣恐積日持久我虛彼實彼佚我勞一旦乘隙而發則勢將不可是和之愈久則害愈深而禍愈大所謂飬虎遺患也善制四裔者不若是叛戾不率則有戰困窮而馴伏然後與之和戰亦在我和亦在我是故中國不可料以一隅而四夷無得計今我常欲和彼常欲戰則彼能測我之所欲而以戰邀利於我乃其計之得也彼之所欲者亦未必然耳夫如是則中國何事於畏戰而好和哉今日尤冝思之矣景德之戰彼力既屈而謀臣猛將欲乘其敗以鏖之此萬世之舉矣貸而不戮則固有噬臍之悔及其以地為請而議者不思逺圖乃許之以金幣垂三十年而請地之釁復作於慶歷之始則又從而增之慶歷距今亦三十年矣知天子之新即位而欲窺中國備禦之淺深強弱乃其謀也向之虛聲慢言而有請者疑其旦暮聞於朝廷矣臣雖甚愚不知何以禦之哉彼方窺吾之備禦而茍失其策則陵侮之勢無休已時也將拒之以兵邪則平日畏戰而不欲加兵矣將益之以賂邪則民力有限敵心無厭而國之大費日益不給用以制之者適足助之也藉以為利者隂受其害也名為惜民而實乃戕民也勢至於此則莫若一任威斷而不可不用兵矣用兵之略臣敢繼而備論焉二曰朝廷畏戰甚矣天下之士疑焉而未知其端也以體言之而謂不順乎則中國固可鞭笞四夷而隆主威也以義言之而謂無釁乎則慢求僭請接踵以至而衆心積憤也以地言之而謂其廣乎則我之享有四海而彼乃一隅也以兵言之而謂其多乎則我之成軍百萬而彼才什二也以材言之而謂其足用乎則桀黠之族不若多士之賢也以力言之而謂其冨厚乎則馬羊之饒不若寶幣之積也中國之直且強敵之曲且弱也如此然猶畏戰而不敢用兵以正其罪論者乃曰兵凶器戰危事不可輕議而妄舉也斯大不然兵所以禁暴也惟其窮兵則受弊戰所以殄寇也惟其好戰則取亡國家方有四裔侵侮之患而未嘗一議誅削之策是以中國之氣鬱鬱不振而天下之心不勝其憾茍一日奮揚皇威以申九伐之令則豈及於窮兵好戰之失哉持是談者膠柱於一偏而未能應變也度今之勢必可不至於兵戰惟甘言厚幣結其心而致萬世之安乎雖天下之愚夫曲士皆知其不足以結之而必至於兵戰也知甘言厚幣之不足結則何事極竭吾力以填盧山之壑而飽冦讎之力哉知兵戰之不可免則又何憚夫凶器危事而不講求其具也昔者六國併力以攻孤秦百戰而歸於覆亡者豈兵之不可勝歟蓋以地賂秦而不知其地盡而兵亦弱也今天下之勢固萬萬異於六國然以遼人與我為敵之情而言則亦有類於秦與六國之事彼常邀賂而無厭者欲窮我之力也以賂與之而不以兵禦之則何以息其見窮哉然則臣之所謂用兵者亦非大舉六師長驅深入輕吾民之命犯天下之危力決於一勝而驟平其巢穴蓋亦大為之防先嚴其備而次絶其賂示以必戰而求其成功於終也夫困則卑順強則驕逆者敵之情也有田欽祚之勝然後有開寶之盟有達蘭之敗然後有景德之好今肆其陵慢務求於我而不已者豈其勢力必能乘中國之釁哉蓋六十年間狃於國家之仁治珍藏之財嵗嵗厚遺而無窮已壯夫猛士不敢彎弓而北嚮彼方之人少而耳所聞長而目所見惟知中國貨財之可取而不知中國威武之不可犯故也是以強而不困驕逆日甚而卑順日逺幸今陛下纘治之始乾健離明運照萬物天威霆怒震驚四海殊方獷俗深有未測而方覘伺於我則固冝乘此機會而更張備禦之策示之以無所貸忍之意而有所必誅之道以變易其視聽而破壞其姦心夫講求邊備申嚴軍政慎擇將帥精練士卒分屯要地以為犄角之勢謹固封略以全守禦之形然後罷其嵗賂而使之無素蓄之具則敵之計反覆皆窮而不知所出欲以賂為請乎則我之財不復可覬欲以戰為事乎則我之兵可用而無所憚夫內之既失於貨賄則其力自困外之又逼於守備則其勢無所得如此而部族之不微黨與之不潰者從古未嘗有也不過十年敵必衰矣茍非屈服於我以就命則必逃遁亡匿於幕北寒苦無水草之域而不之見也夫然乘坐勝之勢復燕薊之地遵祖宗前定之策即范陽故府建堡置戍以遏三路入寇之漸則勳髙古今而福及廟社豈不偉哉與夫平日委百萬之資與人而拱手以待寇至者孰為愈也三曰今天下之勢內無強臣跋扈之漸外無僭國割裂之危朝廷之上早夜深憂切計孜孜而不已者惟二邊之患臣嘗語其詳而奏於前篇矣及西戎逆順之情狀臣亦竊覘其大略焉夫以五州之地數萬之衆而敢肆其豺狼之心求犯天子之威怒而不知懼者其故何哉蓋彼之部族日以盛大而我之制御失其策也靈武之地方廣千里表裏山河草木肥茂足為放牧耕戰之所而一旦捨之以資彼寇使西域諸羌坦無隘礙合而為一則其類益廣其勢益強不足怪也昔之制北敵者必通西域以弱其助今之所以不能通者由棄靈武而夏人安處其間為之障蔽也西域之不能通則北敵有以連結而夏人之強梗豈可量哉且自國初而來逆順固非一也興國之際繼捧既奉朝貢則繼遷為寇故端拱之詔賜國姓授節鉞以羈縻之至淳化之初侵掠不已是以太宗皇帝奮揚武怒鋭意誅翦王師一舉而俘其酋領蕃漢之户來歸者八千餘族因隳夏城徙民於內及至道之始則又有五路之伐然而諸將緩期不援遂喪大功資飬餘孽以遺害於後世至今天下深惜之洎乎章聖嗣位遽請蕃任朝廷雖察變詐姑務寧息乃有刺史功臣之拜其後清逺靈武之役起於咸平而二壘盡陷德眀幼弱則有景德之歸嚮元昊狂悖則有寶元之僭叛此始終順逆其情狀可見者也賜之以國授之以節鉞封之以功臣加之以王爵朝廷之恩信極於此矣皆不足以恱來其心而屈服其志於是賂之以厚幣以固結盟好幸其不犯邊吏而免用師之勞豈惠中國綏四夷不戰而屈人兵之長計乎臣故曰彼之部族日以盛大而我之制禦失其策也況比嵗已來服容官號不復循習舊俗皆竊取朝廷之制而倣用之多遣介使以伸難塞之請屢傳閲集以驚近塞之耳目招致逋逃又與之謀議叛釁之萌已數年矣而朝廷不為備慮從而飬之甚可痛也臣計其逆戾之意不過兩端而已大則欲舉衆犯塞徼幸於一勝之利而徐圖所嚮小則欲益吾之嵗賂而飽其貪心就兩端而窺之則所謂舉衆犯塞者亦未必能爾惟求益嵗賂則固其心焉兵説有之詞卑者進詞強者退昔冒頓匿壯士健馬不以示漢使蓋有攻漢之心也誇人以形聲者豈必有其實哉由此而言則夏人為彼不庭之態者欲求益嵗賂而已也彼以形聲誇我而遂益其賂乃逆計之得矣則無厭之求何時而息乎此天下之共議而廟堂之宜慎動也就使舉衆入寇則勝敗之際亦有兩端而已戰而勝邪則謂吾畏之而必益其賂戰而敗邪則必曰近塞諸羌擅用兵爾為此説者欲吾嵗賜之不絶也彼之得失兩獲其利而吾可以不計哉內府之財羣生之力捨之以啖寇則貽害益甚孰若取之以飬兵而強威也事之施設必有先後而利亦有大小今之所先者莫若精武備謹邊略不為形聲之所駭動而遂自處於柔弱恐懼之地來則禦之去則守之毋畏其兵毋繼以賂使之不測國家臨制之術夫然則其利雖小可弭數十年邊鄙之患而無旦夕之憂茍欲謀其大者而滌除本根之害則必復靈武而後可也四曰朝廷之棄靈武凡幾十年矣議者以為殊方絶塞無用之地昔漢武以英材雄略征伐天下舉造陽之地九百里而棄之元帝以捐之一言遂罷朱崕不復討擊皆足以垂裕後世然則何必疲弊中國之力而興事於彼哉臣雖狂愚輒謂不爾今西邊諸郡多與蕃戎接迹旦夕惴惴常有侵掠之虞者蓋失靈武而致其境土迫於我也況西域不能通而北鄙無以弱乎昔東漢之世西羌屢擾鄧隲欲棄涼州虞詡以為不可其議乃曰今羌所以不敢入據三輔為心腹之害者以涼州在後故也其土人所以推鋒無反顧之心者為其臣屬於漢故也若棄其境或徙其人衆必生異志雖太公白起為將恐不足禦今靈武久棄而西羌盛大二鄙連結而中國之憂不已亦何異此故臣愚以為必復之則本根之患庶幾可以除也然則臣所謂復之之策者非經營期月之間而速求其效蓋亦久而不懈而要以成功於終其措置之大略有三而已一曰離旁鄰之助二曰啓嚮化之心三曰分兵以困其力且西鄙諸羌類族至衆有地可守有兵可戰雖強弱大小其勢不一而其心不能相君臣此固中國以四裔伐四裔之資也昔景德之初羅支能以部族出討繼遷卒致敗滅當時議臣欲加王爵褒寵其效今之不附於夏人者其謂誰乎則固宜敷導恩信諭之禍福厚賜金幣重假名器以懷結其心而感其力必有輸忠義而為梗於彼者使諸羌類族攻戰不暇則外有所忌而內不敢抗於中國此之謂離旁鄰之助臣又聞戎酋之性自用而好忍比嵗以來雖腹心之人往往罹陷誅殺是故為其役屬而處於要重者竊有欵塞效順之意然而懼乎無見容之地而退就刑戮倣徨猶豫計莫能決則固宜擇任土人為之誘導可其來歸之請而撫存之且以索求其左右之姦謀則夏人之黨與將漸攜二此之謂啓嚮化之心況今西夏之兵不滿二十萬已冦於我悉衆而至大抵長於聚而不長於散可以獨支於一隅而不可雜出於諸路是故犯秦隴則涇渭為無虞逼環慶則麟府未嘗警此虛實衆寡可見者也儻任吾犄角之勢而更相援助彼掠於東則擊其西彼擾於南則追其北則力有不逮而氣亦喪矣此之謂分兵以困其勢為是三説而濟以久而不懈則已失之地庶幾必復而西域有可通之漸乃中國數世之利也奈何不圖長逺之計而過務姑息幸朝夕之無寇至豈不惜哉今之所謂禁地者吾不可徒步輒履而彼得以放牧其間今之所謂巡照者吾不可張弓西嚮而彼得以縱暴於我言之國體殊未壯也苛法細禁徒自損弱而不敢奮然革易者得非畏康定之失乎昔之失也蓋萬事弛廢變生於倉卒而莫能支矣以今況昔則邊不失備兵已知戰而猶甘心以欺侮者誠亦未之思也五曰自周而下外域之勢稍稍抗於中國而朝廷時有遣將用師之役其見於載籍可得而擬議者在詩則有采薇出車杕杜六月采芑江漢常武之類分列二雅而詠歌之至於齊桓以大國之資起為盟主而衛王室其於異域最號有功雖春秋實豫而孔子稱其一正天下大槩皆務攘除驅逐而不使之有損於中國亦不以四夷為難制漢氏初興大亂甫定羌戎之患屢起故其計議雜出於一時之不得已而以和親為説於是中國四夷之分始交而失其别及乎積久而國家旦夕常有四夷之憂是以才謀智識之士探窮原本而務為經逺之策志在力平邊鄙之難而不欲使之一日輒犯於中國其思慮精密而規模恢廣雖時異事變亦可倣而用焉夫欲特設一官以主蠻夷之事使吾日理而彼日危然後施三表五餌而係其頸令千家為一國而處之塞外此賈誼之術也夫欲徙民實邊使逺方無屯戍之勞塞下之民父子相保而無係敵之患則與東方戌卒不習地勢而心畏敵者功相萬矣此鼂錯之議也夫欲度羌人故田及民所未墾願罷兵分屯要害賦以農事益積畜省大費以待寇之自弊此趙充國之計也夫欲令隴西以北定安以西八郡之民罪非不赦者皆得輸粟於公以贖其過且廣邊備而為守戰之具此張敞之言也今二邊之釁中國以為大患而百官不尸其責疆埸之謀日勞於吾君吾相之念慮而未聞成功天下之務或委廢而不暇修講則孰若特建一官以専其任使之廣詢博聽竭其智力而辦之哉此賈誼之術可施於今日也三邊之地嚴於扞敵一夕不敢忘備而土兵無幾聚四方凶悍不逞之徒坐食塞下如寄於逆旅之中而督以殄寇則孰若募近塞願徙之民及以罪而遷者一切寬假而命之久安於彼以為禦衛哉此鼂錯之議可施於今日也一方少警則四海有饋餉之勞嵗掊月斂竭耗民力以飬不耕不戰之卒而勢不可已則孰若募人為屯以墾塞下之間田而助足兵足食之利哉此趙充國之計可施於今日也不惜國家之公利召富商入榖而給之倍價以王官易民之錢刀假浮屠法以度非類而為饋邊之修則孰若貸民之輕罪而命之以粟贖過且有紓於急匱哉此張敞之言可施於今日也臣竊惟方今之敝蓋危而後為之謀及乎暫安則置而不議皆茍於一時之利而不若古人經營之久以圖其功於永世故也惟吾君吾相深思極慮參求古今之宜而慎其施設則四子之策孰云無補於朝廷乎勿謂其區區既往之陳迹而不之考也陶又乞徙瀘州戎兵歸內郡上奏曰臣切見昔年瀘州乞弟入寇始因求索一髦骨價事至毫末而邊吏貪功覬賞擅行殺戮以至敗軍覆將騷動一方上煩朝廷兩次命帥西討調發數萬公私之費其數不資兩蜀瘡痍今未全復初林廣統領大兵深入巢穴及到乞弟住坐處止有茅屋數間賊亦遁去竟不能獲乃是以天下之力與螻蟻計較毫釐以生民膏血棄如糞土爾此朝臣固未詳知也其後以王光祖為瀘南安撫意欲生致賊酋光祖怙權作威肆其殘虐蕃漢被害怨淪骨髓經營數年亦無所得此朝廷亦未詳知也今瀘州內外屯兵萬餘作為聲勢欲致此賊其策亦疏矣夫欲致賊而不匿其形賊不可得且萬兵之費饋運日勞雖無寇至坐耗民力臣愚以謂乞弟之存亡違順不足上煩朝慮宜一切置而不問唯徙重兵歸內郡以省橫費戒邊臣守疆場示不必取之意要以嵗月當有成效元祐二年九月八日翰林學士朝奉郎知制誥兼侍讀蘇軾因擒果莊論西羌夏人事宜劄子奏曰臣竊見近者熙河路奏生擒果莊百官稱賀中外同慶臣愚無知竊謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然將驕卒惰以勝為災亦不足怪故臣區區欲乞陳前後致寇之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵纍年雖中國靡弊然夏人困折亦幾於亡橫山之地沿邊七八百里不敢耕者至一百餘里嵗賜既罷和市亦絶敵中匹帛至五十餘千其餘老弱轉徙牛羊􅑁壞所失蓋不可勝數飢羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使每一使賜豫貿易無慮得絹五萬餘匹歸鬻之其民匹五六千民大恱一使所獲率不下二十萬緡使五六至而纍年所罷嵗賜可以坐復既使因吾資以德其民且飽而思奮又使其窺我厭兵欲和之意以為欲戰欲和權皆在我以故輕犯邉陲利則進否則復求和無不可者若當時大臣因虜之請受其詞不納其使且詔邊臣與之往返商議所獲新疆取捨在我俟其詞意屈服約束堅眀然後納之則敵雖背恩反覆亦不至如今日之速也敵雖有易我意然不得西蕃解仇結好亦未敢動夫阿里庫棟戬之賊臣也挾契丹公主以弒其君之二妻棟戬死匿喪不發逾年衆定乃詐稱嗣子偽書果莊溫希沁等名以請於朝當時執政若且令邉臣審問果莊等以阿里庫當立不立若朝廷從汝請遂授節鉞阿里庫真汝主矣汝能臣之如棟戬乎若此等無詞則是諸羌心服既立之後必能統一都部吾又何求若其不服則釁自彼爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之果莊等各得所欲宜亦無患當時執政不深慮此専以省事為安因其妄請便授節鉞阿里庫自知不當立而憂果莊之討也故欲借力於西夏以自重於是始有解仇結好之謀而果莊亦不平朝廷之以賊臣君我也故怒而盜邉夏人知諸羌之叛也故起而和之此臣所謂前後致寇之由眀主不可以不知者也雖既往不咎然可以為方來之鑒元昊本懷大志長於用兵亮祚天付凶狂輕用其衆故其為邉患皆歷年而後定今梁氏専國素與人多不協方內自相圖其能以創殘呻吟之餘久與中國敵卒料其姦謀蓋非元昊亮祚之比矣意謂二聖在位恭默守成仁恕之心著於逺邇必無用武之意可肆無厭之求蘭會諸城鄜延五寨好請不獲勢脅必從猖狂之後求無不獲計不過此耳今者􅋀聞朝廷降詔諸路敕勵戰守深眀逆順曲直之理此固當今之急務而詔書之中亦許夏人之自新臣切以謂開之太易納之太速曽未一戰而厭兵欲和之意已見乎外此復蹈前日之失矣臣甚惜之今欲聞果莊之捷或有漸欵塞之謀必將為恭狠相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在敵有求必獲不獲必叛雖偷一時之安必起無窮之釁故臣願眀主斷之於中深詔大臣密敕諸將若夏人欵塞當受其詞而却其使然後眀敕邉臣以夏人受恩不資無故犯順今雖欵塞反覆難保若實改心向化當且與邉臣商議茍詞意未甚屈服約束未甚堅眀則且却之以示吾雖不逆其善意亦不汲汲求和也彼若心服而來吾雖未納其使必不於往反商議之間遽復盜邉若非心服則吾雖蕩然開懷待之如舊能必其不叛乎今嵗涇原之入豈吾待之不至耶但使吾兵練士飽斥候精眀敵無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦眀主不可以不知者也今朝廷意在息民不憚屈已而臣獻言乃欲艱難其請不急於和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行而有獲其意者也若權其利害究其所至則臣之愚計於安邉息民必久而固與聖意初無小異然臣竊度朝廷之間似欲以畏事為無事者臣竊以為過矣夫為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃者阿里庫之請人人知其不當豫而朝廷豫之以求無事然事之起乃至於此不幾於有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其與幾何臣於侍從之中受恩至深其於委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至二十七日軾又乞詔邉吏無進取及論果莊事宜劄子奏曰臣聞善用兵者先服其心次屈其力則兵易解而功易成若不伏其心惟力是恃則戰勝而寇愈深況不勝乎功成而兵不解況不成乎頃者西方用兵纍年先帝之意本在弔伐而貪功生事之臣惟務殺人爭地得尺寸之土不問利害先築城堡置州縣使四夷憎畏中國以謂朝廷専欲得地非盡滅我族類不止是以併力致死莫有服者今雖朝廷好生惡殺不務逺略而此心未信憎畏未衰心既不服惟有鬭力力屈情見勝負未可知也今日新獲果莊威震異域邉臣賈勇爭欲立功以為河南之地指顧可得正使得之不免築城堡屯兵置吏積粟而守之則中國何時息肩乎乃者王韶取熙河全師獨克使韶有逺慮誅其叛者乃以忠順即用其豪酋而已則今復何事其所以兵連禍結罷弊中國者以郡縣其地故也往者既不可悔而來者又不以為戒今又欲取講王城曰此要害地不可不取方唐盛時安西都護去長安萬里若論要害自此以西無不可取者使諸羌知中國有進取不已之意則寇愈深而兵不解其禍豈可量哉臣願陛下深詔邉吏叛則討之服則安之自今已往無取尺寸之地無焚廬舍無殺老弱如此期年諸羌可傳檄而定然朝廷至意亦自難喻將帥未必從也雖日行文書終恐無益宜驛召陜西轉運使一貟赴闕面敕戒之使歸以喻將帥而察其不如詔者臣又竊聞朝論謂果莊犯順罪當誅死然譬之化外不足深責其子孫部族猶足以陸梁於邉全其首領以纍其心以為重質庶獲其用此實當今之良䇿然臣竊料果莊凶豪素貴老病垂死必不能甘於困辱為久生之計自知生存終不得歸徒使其臣子首鼠顧忌不敢復讎必將不食求死以發其衆之怒就使不然老病愁憤自非久生之道果莊若死則其臣子専意復讎必與阿里庫合而北交於夏人此正蠻貊同舟遇風之勢其交必堅而溫希沁介於阿里庫夏人之間地狹力弱其勢必危若見并而吾不能救使二敵合三面以窺熙河則其患未可以一二數也如臣愚計可詔邉臣與果莊約若能使其部族討阿里庫而納趙純忠者當放汝生還質之天地示以必信果莊若從則稍富貴之使其信臣而喻至意焉果莊既有生還之望不為求死之計其衆必從以果莊之衆與溫希沁合而討阿里庫其勢必克既克而納純忠雖放還果莊可以無患此必然之勢也西羌本與夏人世仇而果莊夲與阿里庫不協若許以生還其衆必相攻縱未能誅阿里庫亦足以使二盜相疑而不合也昔太史慈與孫策戰幾殺策策後得慈釋不誅放還豫章卒立竒功李訴得吳元濟將李祐解縛用之與同卧起卒擒元濟非豪傑名將不能行此度外事也議者或謂果莊之獲兼用近界酋豪力戰而得之仇怨已深若放生還此等必無全理臣以謂不然若果莊死於中國其衆讎此等必深若其生還其讎之亦淺此等依中國為援足以自全自古西羌之患惟恐解仇結盟若所在為讎敵正中國之利無可疑者臣出位言事不勝恐悚待罪之至十月七日軾又乞約果莊討阿里庫劄子奏曰臣近者竊見劉舜卿賀表具言阿里庫罪狀又竊聞舜卿奏乞削阿里庫官爵續又聞阿里庫上章請命議者或欲許其自新以臣愚慮二者之説皆未為得何者阿里庫凶狡反覆必無革面洗心之理今聞其女已嫁梁伊伯之子度其久逺必須協力致死共為邉患今來上章請命蓋是部族新破衆叛親離恐吾乘勝致討力未能支故匿情忍詬以就大事若得休息數年蓄力養鋭假吾爵命以威脅諸羌誅不附已者羽翼既成西北相應必為中原之憂非獨一方之病也且夏賊逆天犯順夲因輕料朝廷以為必不能討已今若便從阿里庫之請則其所料良不為過西蕃小醜朝為叛逆暮許通和則夏國之請理無不許二寇淹天自若欲戰欲和無不可者則西方之憂無時而止矣然遂從舜卿之請削奪官爵即須發兵深入致討彼新喪大首領舉國戒懼我師深入茍無他奇恐難以得志臣愚以謂當使邉將發厚幣遣辨士以離其腹心壞其羽翼今聞溫希沁等諸族已為所質勢未能動而又有凌戬在其肘腋迹同而心異若用臣前計使邉臣與果莊約若能使其部族與溫希沁凌戬等合而討阿里庫納趙純忠即許以生還此政所謂以敵人攻敵人計無出此者若朝廷便許阿里庫通和即須推示赤心待之如舊不可復用計謀以圖此賊數年之後必自飛揚此所謂養虎自遺患者也故臣願朝廷既不納其通和之請又不削奪其官爵存而勿論置之度外隂使邉臣以計圖之似為得策臣屢瀆天聽罪當誅死八年十一月十一日軾知定州又乞增修弓箭社條約狀奏曰臣竊見北敵久和河朔無事沿邉諸郡軍政少弛將驕卒惰緩急恐不可用武藝軍裝皆不逮陜西河東逺甚雖據即目邉防事勢三五年間必無警急然居安慮危有國之常備事不素講難以應猝今者河朔沿邉諸軍未嘗出征終年坐食理合富強臣近遣所辟幕官李之儀孫敏行親入諸營按視曲折審知禁軍大率貧窘妻子赤露飢寒十有六七屋舍大壞不庇風雨體問其故蓋是將校不肅斂掠乞取坐放債負習以成風將校先違法不公則軍政無緣修舉所以軍人例皆飲博逾濫三事不止雖是禁軍不免寒餓既輕犯法動輒逃亡此豈久安之道臣自到任漸次申嚴軍法逃軍盜賊已覺衰少年嵗之間庶革此風然臣竊謂沿邉禁軍緩急終不可用何也驕惰既久膽力耗憊雖近戍短使輒與妻孥泣别被甲持兵行十數里即便喘汗臣若嚴加訓練晝夜勤習馳驟坐作使耐辛苦則此聲先馳北敵疑畏或致生事臣觀祖宗以來沿邉要害屯聚重兵止以壯國威而消敵謀蓋所謂先聲後實形格勢禁之道耳若進取深入交鋒兩陳猶當雜用禁旅至於平日保境備禦小寇即須専用極邉土人此古今不易之論也鼂錯與漢文帝畫備邉策不過二事其一曰徙逺方以實廣虗其二曰制邉縣以備敵寶元慶歷中趙元昊反屯兵四十餘萬配刺宣毅保捷二十五萬人皆不得其用卒無成功范仲淹劉滬种世衡等専務整緝蕃漢熟户弓箭手所以封殖其家砥礪其人者非一道藩籬既成賊來無所得故元昊稱臣今河朔西路被邉州軍自澶淵講和以來百姓自相團結為弓箭社不論家業髙下戶出一人又自相推擇家資武藝衆所服者為社頭社副録事謂之頭目帶弓而鋤佩劔而樵出入山坂飲食長技與北敵同私立賞罰嚴於官府分番巡邏鋪屋相望若透漏北敵及本土強盜不獲其當番人皆有重罰遇有警急擊鼓集衆頃刻可致千人器甲鞍馬常若寇至蓋親戚墳墓所在人自為戰敵甚畏之體問得元豐二年北界羣賊一火約二十餘人在兩界首不住打劫為患久不敗獲有北平軍大悲村本社頭目冉萬冉升及長行冉捷等部領社人與盜賊鬭敵趕趂捉殺直至北界地名北當山峪內被冉萬射中賊頭徐德冉捷趕上斫獲首級并冉升亦斫到第二賊頭賈貴本路保眀申奏朝廷並已於班行內安排以此知弓箭社人户驍勇敢戰緩急可用先朝名臣帥定州者如韓琦龎籍皆加意拊循其人以為爪牙耳目之用而籍又增損其約束賞罰奏得仁宗皇帝聖旨見今具存昨於熙寧六年行保甲法準當年十二月四日聖旨強壯弓箭社並行廢罷又至熙寧七年再準正月十九日中書劄子聖旨應兩地供輸人户除元有弓箭社強壯并義勇之類並依舊存留外更不編排保甲看詳上件兩次聖旨除兩地供輸村分方得依舊置弓箭社其餘並合廢罷雖有上件指揮公私相承元不廢罷只是令弓箭社兩丁以上人户兼充保甲以至逐捕夲界及化外盜賊並皆驅使弓箭社人户向前用命捉殺見今州縣委實全藉此等寅夜防托顯見弓箭社實為邉防要用其勢決不可廢但以兼充保甲之故召集追呼勞費失業今雖名目具存責其實用不逮往日臣竊謂陜西河東弓箭手官給良田以偹甲馬今河朔沿邉弓箭社皆是人户祖業田産官無絲毫之給而捐軀捍邊器甲鞍馬與陜西河東無異苦樂相遼未盡其用近日霸州文安縣及真定府北寨皆有盜賊驚劫人户捕盜官吏拱手相視無如之何以驗禁軍弓手皆不得力向使州縣逐處皆有弓箭社人户致命盡力則盜賊豈敢輕犯邊寨如入無人之境臣已戒飭夲路將吏申嚴賞罰加意拊循其人去訖輒復給用龐籍舊奏約束稍加增損别立條目欲乞朝廷立法少賜優異眀設賞罰以示懲勸今已密切取會到夲路極邉定保兩州安肅廣信順安三軍邉面七縣一寨內管自來團結弓箭社五百八十八村六百五十一火共計三萬一千四百一十一人若朝廷以為可行立法之後更敕將吏常加拊循使三萬餘人分番晝夜巡邏盜邊小寇來即擒獲不至狃􅏸以生戎心而事皆循舊無所改作敵不疑畏無由生事有利無害較然可見謹具所乞立法事件畫一如左一看詳嘉祐四年龎籍已獲朝旨事件除見可施行外有當時事體與今來稍有不同須至少有增損今參詳到下項弓箭社人户但係久來團結地分並依見今已行體例不拘物産髙下丁口衆寡並每户選擇強壯一丁充弓箭手貼黃髙強人户與下等各出一丁雖似不均緣行之已久下等人户無詞乞且一切仍舊若上户添差人數即恐行法之初人心不安又緣保甲法雖上户亦止一丁所以今來不敢增損每社置長社副社録事各一名為頭目並選有物力或好人材事藝衆所推服者方得差補農事餘暇委頭目常切提舉閲習武藝務令精熟齊整如無盜賊非時不得勾集每社及百人以上選少壯者三人不滿百人者選二人不滿五十人者選一名充急腳子並輪番一月一替専令探報盜賊如探報不實及稽留後時有誤捕捉者並申官乞行嚴斷逐社各置鼓一面如有事故及盜賊並須聲鼓勾集若尋常社內聲鼓不到者每次罰錢一百如社內一兩村共為一火地里稍逺不聞鼓聲去處即火急差急腳子勾喚若強盜入村鼓聲勾喚及到而不入賊者並罰錢三貫如三經罰錢一百一經罰錢三貫而各再犯者並送所屬嚴斷如能捉獲強盜一名除依條支賞外更乞支錢二十貫如兩次捉獲依前支賞外仍與免户下一年差徭如三次以上更免一年無差徭可免者各更支錢十貫折充如獲竊盜一名除依條支賞外更支錢二貫以上錢用社內罰錢充如不足並社衆均備逐社各人置弓一張箭三十隻刀一口內單丁及貧不及辦者許置槍及捍棒一條內一件不足者罰錢五百弓箭不堪施放器械雖有而不精並罰錢二百若全然不置即申送所屬乞行勘斷逐社每夜輪差一十人於地分內往來巡覷仍夲縣每季給歷一道委夲社頭目抄上當巡人姓名有不到者罰錢二百如夲地分失賊其當巡人委夲社監勒依條限捕捉限滿不獲送官量事行遣其所給歷除每季納換及知佐下鄉因便點檢外不得非時取索弓箭社人戶遇出入經宿以上須告報本社頭目及鄰近同保之人違者罰錢三百文社內遇捉殺賊盜因鬬致死除依條官給絹外更給錢一十貫付其家被傷重者減半並以係省錢充社內所納罰錢令社長等同共封記主管須遇社會合行酬賞者方得對衆支給破使即不得衷私别作支用社內遇豐熟年只得春秋二社聚會因便點集器械非時不得亂有糾集騷擾已上並是龎籍起請已獲朝旨事件自寧熙六年聖旨廢罷後來民間依舊衷私施行令參詳增損修定一弓箭社人户為與強敵為鄰各自守護骨肉墳墓曉夜不住巡邏探伺以此巡撿縣尉全藉此人為耳目肘臂之用每遇冬教內有本社弓箭人户見係保甲人數者即須勾上一月教閲其稱捕盜官司不敢放心以至化外盜賊既知逐社人户勾上村堡空虛即皆生心窺伺公私憂恐又人户勾集彌月諸般費用不少深為患苦臣竊謂保甲人户每年冬教本塞與人氣俗相似以戰鬬為生寢食起居不釋弓馬出入守望常帶器械其勢無由生踈欲乞應弓箭人户今後更不充保甲仍免冬教貼黃保甲法須是主户兩丁以上方始差充其弓箭社一丁以上並差即無已充保甲而不充弓箭社人戶者今來所乞本社內人户更不充保甲只是減罷重疊虛名即非幸免顯無妨礙而使人户稍免無益之費専心守禦又免教集之月村堡空虛以生戎心公私安枕為利不淺其減罷保正長並却令充本社守闕頭目一弓箭社人戶既任透漏失賊之責動輒罰錢科罪及均出賞錢顯見與其餘人戶苦樂不同理合稍加優異欲乞應弓箭社人戶並免兩稅折變科配今已取會到本路州軍所免折科錢物數目比之和買價例每嵗剩費錢七千九百九十八貫五十六文所獲精鋭可用民兵三萬餘人費小利大可行無疑一弓箭社頭目並是鄉村有物力心膽之人責以齊衆保境亦須别加旌勸欲乞立定年限每句當及三年如無透漏及私罪情重者委本縣令佐及捕盜官保眀申安撫司給與公據公罪杖以下聽贖又及三年無上件過犯仍與保眀給公據與免本戶差徭內别有功勞者委自安撫司相度如委是卓然顯效雖未及上件年限亦與比類施行若更有大假勞績難以常格論賞者即委自本司奏乞録用一弓箭社地分本係人户私下情願自相團結皆是緣邊之人衆共相約要害防托之處行之已久北敵不疑所以龐籍奏請並是因舊略加約束今來不可更有移易地分及增添團結去處永逺只以今來所管五百八十一村為定所貴事事循舊不至張皇事如本地分內人户分煙析生即各據戶眼定差或外來人戶典買到本社田地亦許收入差充弓箭社戶若兩處有田産者不得緣此帶免别處折變委所屬官司常切覺察貼黃弓箭社五百八十八村內有八十九村係兩地供輸人戶勘會上件人戶元是有些小虛名稅賦自來北界差人過來計會本縣收衆戶抱腳供輸其人戶並是一心捍邊可信之人切慮朝廷欲知其實一今來立法整齊弓箭社人戶及免冬教即須委自安撫司逐時差官按視內有武藝膽力出衆之人即須與例物激賞不惟使人戶競勸亦所以致朝廷及將帥恩意緩急易為驅使今取會到轄下兩州三軍弓箭社人戶兼充保甲者每年冬教按賞合用錢一千五百八十二貫七百八十八文今來既免冬教即保甲司却合出備上件錢數與安撫司為上件激賞之用但人數既多上件錢數微少支用不足欲乞每年破五千貫除上件錢數外其餘並以本路回易庫見在錢貼支右謹件如前臣竊見西山之下定保之間山開川平無陂塘之嶮澶淵之役敵自是入寇見今本路只有戰兵二萬五千九百餘人分屯八州軍若有警急尚不足於守而況戰乎論者或以保甲之衆緩急可恃臣竊謂保甲皆齊民也集教止是一月武藝無緣精熟又平時無絲毫之利有得於官每嵗所獲按賞例物不償集教一月之費一旦驅之於戰守死地恐未可保惟弓箭社人戶所處皆必爭之地世世相傳結髮與敵戰若朝廷許依臣所乞少有以優異其人既免折科間復贖罪免役嵗以五千緡賞其尢異者深致朝廷將帥恩意則此三萬餘人真久逺可恃者也今録白到嘉祐四年龐籍奏獲聖旨事件兼取會到本路兩州三軍弓箭社火人數及免折科每年和費用錢數年免冬教所省按賞例物數目繳連在前仍畫到地圖一面帖出接連邉面及逐社住坐去處隨狀進呈伏望聖慈詳酌施行謹録奏聞伏候敕旨歷代名臣奏議卷三百三十一
