body:
  text: 歷代名臣奏議卷二百六十二明楊士竒等撰漕運漢武帝時河東守畨係上言曰漕從山東西嵗百餘萬石更砥柱之限敗亡甚多而亦煩費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下度可得五千頃五千頃故盡河壖棄地民茭牧其中耳今溉田之度可得穀二百萬石以上榖從渭上與關中無異而砥柱之東可無復漕天子以為然時人有上書欲通褒斜道褒中縣也斜谷名音邪又曰褒斜二水名及漕事下御史大夫張湯湯問其事因言抵蜀從故道多阪回逺今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒褒之絶水至斜百餘里以車轉從斜下下渭如此漢中之榖可致山東從沔無限便于砥柱之漕且褒斜材木竹箭之饒擬于巴蜀天子以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里道果便近而水湍石湍一作溲不可漕宣帝五鳳中大司農中丞耿夀昌以善為算䏻商功利得幸于上奏言故事嵗漕關東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡榖足供京師可以省關東漕卒過半又白增海租二倍天子皆從其計御史大夫蕭望之奏言故御史屬徐宫御史大夫屬家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復豫民魚乃出夫隂陽之感物類相應萬事盡然今夀昌欲近糴漕關內之榖築倉治船費直二萬萬餘萬萬億也有動衆之功恐生旱氣民被其灾夀昌習于商功分銖之事其深計逺慮誠未足任宜且如故後魏大武帝延和七年薄骨律鎮將刁雍上表曰奉詔髙平安定統萬及臣所守四鎮出車五十乘運屯榖五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來往猶以為難設令載榖不過二十石每涉深沙必致滯陷又榖在河西轉至沃野越度大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一嵗不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動靜以聞臣聞鄭白之渠逺引淮海之粟泝流數千周年乃得一至猶稱國有儲糧民用安樂今求于牽屯山河水之次造船二百艘二船為一舫一船勝榖二千斛一舫十人計須千人臣鎮內之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕于車運十倍有餘不費牛力又不費田詔從之唐𤣥宗開元十八年宣州刺史裴耀卿朝集京師帝訪以漕事耀卿條上便宜曰江南戶口多而無征防之役然送租庸調物以嵗二月至楊州入斗門四月已後始度淮入汴常苦水淺六七月乃至河口而河水方漲須八九月水落始得上河入洛而漕路多梗船檣阻隘江南之人不習河事轉雇河師水手重為勞費其得行日少阻滯日多今漢隋漕路瀕河倉廪遺跡可尋可于河口置武牢倉鞏縣置洛口倉使江南之舟不入黃河黃河之舟不入洛口而河陽柏崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓于倉以待則舟無停留而物不耗失此甚利也二十一年秋雨害稼京師飢帝將幸東都召問所以救人者京兆尹裴耀卿曰陛下既東巡百司畢從則太倉三輔可遣重臣分道賑給自東都益廣漕運以實關輔關輔既實則乘輿西還事蔑不濟且國家大本在京師但秦地狹水旱易匱往貞觀永徽時祿廪者少嵗漕粟二十萬略足今用度寖廣運數倍且不支故數東幸以就敖粟為國大計臣願廣陕運道使京師常有三年食雖水旱不足憂今天下輸丁約四百萬使丁出百錢為陕洛運費又益半為營窖用分納司農河南陕州又令租米悉輸東都從都至陕河益湍沮若廣漕路變陸為水所支尚贏萬計且河南租船候水始進吳工不便河漕處處停留易生隱盜請置倉河口以納東租然後官自雇載分入河洛度三門東西各築敖倉自東至者東倉受之三門迫險則旁河鑿山以開車道運十數里西倉受之度宜徐運抵太原倉趨河入渭更無留阻可減費巨萬天子然其計德宗貞元四年李泌言于上曰江淮漕運自淮入汴以甬橋為咽喉地屬徐州鄰于李納若納一旦復有異圖竊據徐州則失江淮矣請徙張建封鎮徐州割濠泗以𨽻之則淄青惕息而運路常通江淮安矣上從之八年中書侍郎同中書門下平章事陸贄奏請減京東水運收腳價于緣邊州鎮儲蓄軍糧事宜狀曰右臣伏見陛下每垂睿心經略邊境增築城壘加置戍兵至于春秋衣裝嵗時宴犒先後遲速悉由宸衷其為憂勤可謂至矣其為資費亦以多矣蓋以安人固國不憚煩勞此誠慎慮之深者也然于儲蓄大計則未降意良圖但任有司隨月供應近嵗蕃戎小息年榖屢登所支軍糧猶有匱乏邊書告闕相繼于朝儻遇水旱為灾粟糴翔貴凶醜匪茹寇擾淹時或負挽力殫或饋餉路絶則戍兵雖衆不足恃城壘雖固不克居是使積年完聚之勞適資一夕潰敗之辱此乃理有必至而無幸濟者也臣竊為陛下惜之軍志曰雖有石城十仞湯池百步無粟不能守也故朝錯論安邊之䇿要在積榖充國建破羌之議先務屯田歷代制禦四夷常為國之大事勇者奮其力智者貢其謀攻守異宜盛衰殊勢柔服而不勞師旅者則常聞之矣屯師而不務農食者未嘗有焉今陛下廣徴甲兵分守城鎮除所在營田稅畝自供之外仰給于度支者尚八九萬人千里饋糧涉履艱險運米一斛達于邊軍逺或費錢五六千近者猶過其半犯雪霜皸瘃之苦冒豺狼剽掠之虞四時之間無日休息傾財用而竭物力猶苦日給之不充其餘儲蓄以備非常固亦絶意而不暇思也夫屯兵守土以備寇戎至而無糧守必不固矣遇寇不守則如勿屯平居有殘人耗國之煩臨難有啓敵納侮之禍所養非所用所失非所虞以為制備之規臣竊謂踈矣頃者吐蕃尚結贊率其醜類越軼封疆朔方五原相繼淪陷雖由將帥不武亦因匱乏得詞其事未遙足為深戒昧理而好諛者必曰當結贊入寇之日遇賊泚作亂之餘戍卒未多邊農尚寡今則甲兵大備稼穡屢登比于曩時勢不同等臣請復陳近效以質浮詞今年夏初寇犯靈武禦則寡力守則乏糧告急求哀匪朝伊夕有司為之請罪陛下為之軫憂遽擇使臣奔波督運積財以資用髙價以招人賴蕃戎自旋糧道獲濟封略不壞固非成謀然則鹽夏覆而靈武全唯在幸與不幸之間耳是皆無不拔之勢有可駭之危其為規制之方所謂同歸於失矣議者是當今而非既往豈不曰昧理而好諛乎今戍卒之加于往時臣固知之矣今邊農之廣于往嵗臣亦知之矣其所謂歸於失者在于措置乖當蓄斂乖宜利之所生害亦隨至故也陛下忿蕃醜之暴掠懲邊鎮之空虛繕甲益兵庇人保境此誠雄武之英志覆育之仁心刷憤耻而揚威聲海內咸望有必攻之期矣既而統帥無律制事失權戍兵不𨽻於守臣守臣不總於元帥至有一城之將一旅之兵各降中使監臨皆承别詔委任分鎮亘千里之地莫相率從緣邊列十萬之師不設謀主每至師徒犯境方馳書奏取裁行李往來動踰旬日比䝉徴發救援寇已獲勝罷歸小則蹂籍麥禾大則驅掠人畜是乃益兵甲而費財用竟何補侵軼之患哉夫將貴專謀軍尚氣勢訓齊由乎紀律制勝在于機權是以兵法有分閫之詞有合拳之喻有進退如一之令有便宜從事之規故能動作協變通制備垂永久出則同力居則同心患難相交急疾相赴兵之奉將若四支之衛頭目將之守境若一家之保室廬然後可以扞寇讎護氓庶蕃畜牧闢田疇天子唯務擇人而任之則髙枕無虞矣吐蕃之比于中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝彼之兵衆合并而我之部分離析夫部分離析則紀律不一而氣勢不全節制在朝則謀議多端而機權多失臣故曰措置乖當此之謂乎陛下頃以邊兵衆多轉餽勞費設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆恱慕爭趨厚利不憚作勞耕稼日滋粟麥嵗賤向使有司識重輕之術𢎞久逺之謀守之有恆施之有制謹視豐耗善計收積菽麥必歸于公廪布帛悉入于農夫其或有力而無資願居而靡措貸其種食假以犂牛自然戍卒忘歸貧人樂徙可以足食可以實邊無屯田課責之勞而儲蓄自廣無懲役踐更之擾而守備益嚴果能用之足為長算既而有司隘吝不克將眀忘國家制備之謀行市道茍且之意當稔而願糴者則務裁其價不時斂藏遇灾而艱食者則莫揆乏糧抑使收糴遂使豪家貪吏反操利權賤取于人以俟公私之乏困乘時所急十倍其贏又有勢要近親羇逰之士或託附邊將或依倚職司委賤糴于軍城取髙價于京邑坐致厚利實繁有徒欲勸農而農不獲饒欲省費而費又愈甚復以制事無法示人不誠每至和糴之時多支絺紵充直窮邊寒沍不任衣裘絶野蕭條無所貨鬻且又虛張估價不務准平髙下隨喜怒之心精粗在胥吏之手既無信義率下下亦以僞應之度支物估轉髙軍郡穀價轉貴遞行欺罔不顧憲章互相制持莫可禁止度支以茍售滯貨為功利而不察邊食之盈虛軍司以所得加價為羡餘而不恤農人之勤苦雖設巡院使相監臨既失綱條轉成囊槖至有空申簿帳僞指囷倉計其數則億萬有餘考其實則百十不足巡院巧誣于㑹府㑹府承詐以上聞幸逢有年復遇無事吞聲補舊引日偷安若遇嵗儉兵興則必立至危迫靈武之事足為明徴臣故曰蓄斂乖宜此之謂也邊之大事在食與兵今食則無儲兵則乏帥謂之有備其可得乎近者緣邊諸州頻嵗大稔榖糴豐賤殊異往時此乃天贊國家永固封略之時也而尚日不暇給曽無逺圖軍府有歉食之詞穡人有悔耕之意天贊而不受其利農傷而不恤其窮及凶灾流行播植墮廢雖復悔恨事何可追臣是以屢屢塵煩所惜在此頃請擇人充使委之平糴務農陛下以理貴因循未賜允許又請乘時豐稔邊城加貯軍糧有司以經費無餘其事復寢臣謬當任使待罪樞衡雖神武之謀不資獻納而職司之分敢忘憂虞夙夜疾心䀌如焚灼輒復效其鄙薄庶或裨補萬分不勞人不變法不加賦稅不費官錢不廢耳目之娛不節浮冗之用唯于漕運一事稍權輕重所宜請為陛下致邊軍十萬人一年之糧以為艱急之備陛下誠䏻聽臣愚計不受沮傷百日之間收貯捴畢轉運常行之務既無失于舊規太倉嵗入之儲亦不闕其恆數圖慮至熟更無所妨謹具揚榷上陳惟陛下留意省察舊制以關中王者所都萬方輻湊人殷地狹不足相資加以六師糗糧百官祿廪邦畿之稅給用不充所以控引東方嵗運租米冒淮湖風浪之弊泝河渭湍險之艱所費至多所濟蓋寡習聞見而不逹時宜者則曰國之大事不計費損故承前有用一斗錢運一斗米之言雖知勞煩不可廢也習近利而不防逺患者則曰每至秋成之時但令畿內和糴既易集事又足勸農何必轉輸徒耗財賦臣以兩家之論互有短長各申偏執之懷俱昧變通之術其于事理可得粗言夫聚人以財而人命在食將制國用須權重輕食不足而財有餘則弛于積財而務實倉廪食有餘而財不足則緩于積食而嗇用貨泉若國家理安錢榖俱富蒸黎蕃息力役靡施然後恆操羡財益廣漕運雖有厚費適資貧人三者不失其時之所宜則輕重中權而國用有制矣開元天寶之際承平日久財力阜殷祿食所頒給用亦廣所以不計縻耗勵贍軍儲至使流俗過言有用一斗錢運一斗米之說然且散有餘而備所乏雖費何害焉斯所謂操羡財以廣漕運者也貞元之始巨盜初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省腳錢至使郊畿之間烟火殆絶都市之內餒殍相望斯所謂覩近利而不防逺患者也近嵗關輔之地年穀屢登數減百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困榖賤今夏江淮水潦漂損田苖比于常時米貴加倍氓庶匱乏流庸頗多關輔以榖賤傷農宜加價糴榖以勸稼穡江淮以榖貴民困宜減價糶米以救凶灾今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘斯所謂習見聞而不逹時宜者也今淮南諸州米每斗當錢一百五十文從淮南轉運至東渭橋每斗船腳又約用錢二百文計運米一斗揔當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估每斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣頃者每年從江淮湖南浙東浙西淮南等道都運米一百一十萬石送至河隂其中減四十萬石留貯河隂倉餘七十萬石送至陕州又減三十萬石留貯太原倉唯餘四十萬石送赴渭橋輸納臣詳問河隂太原等倉留貯之意蓋因往年蟲旱關輔洊飢當崔造作相之初懲元琇罷運之失遂請每年轉漕米一百萬石以贍京師比至中途力殫嵗盡所以節級停減分貯諸倉每至春水初通江淮所般未到便取此米入運免令停滯舟船江淮新米至倉還復留納填數輪環貯運頗亦協宜不必每嵗加般以增不急之費所司但遵舊例曽不詳究源由邇來七年積數滋廣臣近勘河隂太原等倉見米猶有三百二十餘萬石河隂一縣所貯尤多倉廪充盈隨便露積舊者未盡新者轉加嵗月漸深耗損增甚縱絶江淮輸轉且運此米入關七八年間計猶未盡況江淮轉輸般次不停但恐過多不慮有闕今嵗關中之地百榖豐成京尹及諸縣令頻以此事為言憂在京米粟太賤請廣和糴以救農人臣今計料所糴多少皆云可至百餘萬石又今量定所糴估價通計諸縣貴賤并雇船車般至太倉榖價約四十有餘米價約七十以下此則一年和糴之數足當轉運二年一斗轉運之資足以和糴五斗比較即時利害運務且合悉停臣竊慮運務若停則舟船無用舟船無用則壞爛莫修倘遇凶灾復須轉漕臨時鳩集理必淹遲夫立法裁規久必生弊經略之念始慮貴周不以積習害機宜不以近利隳永制不貴功于當代不流患于它時慮逺防微是其均濟臣今所獻庶近于斯減所運之數以實邊儲存轉運之務以備時要其于詳審必免貽憂舊例從江淮諸道運米一百一十萬石至河隂來年請停八十萬石運二十萬石舊例從河隂運米七十萬至太原倉來年請停五十萬石運二十萬石舊例從太原倉運米四十萬石至東渭橋來年請停二十萬石運二十萬石其江淮所停運米八十萬石請委轉運使于漕水州縣每斗八十價出糶計以糙米與細米分數相接之外每斗猶減時價五十文以救貧乏計得錢六十四萬貫文節級所減運腳計得六十九萬貫都合得錢一百三十三萬貫數內請支二十萬貫付京兆府令于京城內及東渭橋開場和糴米二十萬石每斗與錢一百文計加時估價三十已上用利農人其米便送東渭橋及太原倉收貯充填每年轉漕四十萬石之數並足餘尚有錢一百一十三萬貫文以供邊鎮和糴臣已令度支巡院勘問諸軍州米粟時價兼與當管長吏商量今計見墾之田約定所糴之數得鳯翔涇隴邠寧慶鄜坊丹延夏綏銀靈鹽振武等道良原長武平涼等城報除度支旋糴供軍之外别擬儲備者計可糴得粟一百三十五萬石其臨邉州縣各于當處時價之外更加一倍其次每十分加七分又其次每十分加五分通計一百三十五萬石當錢一百二萬六千貫文猶合剩錢十萬四千貫留充來年和糴所于江淮糴米及減運米腳錢請並委轉運使便折市綾絹絁綿四色即作船般送赴上都邊地早寒斂藏向畢若待此錢送到即恐收糴過時請且貸戶部别庫物充用本色續到便令折填其所貸戶部别庫物亦取綾絹絁綿四色並依平估價務利農人仍取度支官畜及車均融般送請各委當道節度及當城兵馬使與監軍中使并度支和糴巡院官同受領使計㑹和糴各量人戶墾田多少先付價直立限納粟不願糶者亦勿強徴其有納米者每斗六升折粟一斗應所糴得米粟亦委此三官同檢覆分于當管城堡之內揀擇髙燥牢固倉窖等收納封閉仍以貯備軍糧為名非緣城守絶糧及承别敕處分並不得輒有支用待收糴畢具所糴數并收貯處所聞奏并報中書門下捴計貯備粟一百三十五萬石是十一萬二千五百人一年之糧來秋若遇順成又可更致百餘萬石邊蓄既富邊備自修以討則有齎以守則可久以加兵則不憂所至乏食以斂糴則不為貪將所邀恢疆保境者得以遂其謀蹙國跳軍者無所辭其罪是乃立武之根柢安邊之本源守土庇人莫急于此傾公臧而發私積猶當悉力以務之況今不擾一人無廢百事但于常用之內收其枉費之資百萬贏糧坐實邊鄙又有勸農賑乏之利存乎其間此蓋天錫陛下靖邊塞而安國家之時不可失也陛下誠能過聽愚計先聚軍儲慎擇良圖更貞師律蠢爾凶醜自當畏威縱迷款塞之心必無猾夏之慮伏惟少留睿思詳省而明斷之其所停減運腳臣已與本司審細計料并邊鎮分配和糴數及米粟估價等數各得别狀條件分析謹同封進宋太祖征太原已濟河諸州餉饋集上黨城中車乘塞路上聞之將以稽留罪轉運使趙普曰六師方至而轉運使以獲罪聞敵必謂儲峙不充有以窺我矣非威逺之道也俾䏻治劇者往蒞其州足矣開寶三年秋三司言倉儲月給止及眀年二月請分屯諸軍盡率民船以資江淮漕運太祖大怒責之曰國無九年之蓄曰不足爾不素計而使倉儲垂盡乃請屯兵括民船以運是可卒致乎今設汝安用茍有所闕當罪汝以謝衆三司使楚昭輔懼詣太宗求寬釋使得盡力太宗既許召右知客押衙陳從信問之對曰從信嘗逰楚泗知糧運之患良以舟人之食日歷郡縣勘給是以凝滯若自發舟計日往復并支可以責其程限又楚泗運米于舟至京復輦入倉宜宿備運卒令即時出納如此每運可減數十日楚泗至京千里舊八十日一運一嵗三運若去淹留之虛日則嵗可增一運焉今三司欲籍民舟若不許則無以責辦許之則冬中京師薪炭殆絶矣不若募舟之堅者漕糧其損敗者任載薪炭則公私俱濟今市米騰貴官價斗錢七十賈者失利無敢致于京師雖居商厚儲亦匿而不糶是以米益貴民將餓殍若聽民自便即四方奔湊米多而價自賤矣太宗眀日具奏太祖可之真宗時議減西鄙屯兵以息轉餉召知通利軍楊允恭與崇儀副使竇神寶閣門祗候李允則馳往經度圖上郡縣山川之形勝允恭因建議曰自環州入積石抵靈武七日程芻粟之運其策有三然以人以驢其費頗煩而所載數鮮莫若用諸葛亮木牛之制以小車發卒分鋪運之每一車四人挽之旁設兵衛加戈刃于其上寇至則聚車于中合士卒之力禦寇于外尋為議者所沮而止仁宗時陕西經略安撫使范仲淹奏乞免關中支移二稅乞于次邊入中斛斗疏曰臣竊見陕西數年以來科率百端民力大困州縣督責不䏻存濟其間最為民患者是支移稅賦轉般斛㪷赴延州保安軍山坡險惡一路食物草料常時踴貴人戶往彼輸納比别路所貴三倍比本處州縣送納所費五倍害民若此實非久計臣等欲乞朝廷指揮都轉運司體量關輔今來灾旱民力困乏如邊儲有備其二稅與免支移并邊上入中斛㪷大段價髙出却京師見錢銀絹萬數浩瀚亦令相度權于次邊州軍入中所貴減得官中貴價既次邊有備則每遇事宜稍慢可以退那軍馬于次邊就食糧草既稍蘇民瘵又不誤軍期如此守邊庶為得策神宗熙寧六年知應天府張方平上奏曰臣竊惟今之京師古所謂陳留天下四衝八逹之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱溫受封于梁因而建都至于石晉割幽薊之地以入契丹遂與契丹共平原之利故五代爭奪耶律是臣其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規摹畢講不還周漢之舊而梁氏是因豈樂是而處之勢有所不獲已者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立兵以食為命食以漕運為本漕運以河渠為主國初浚河渠三道通京城漕運自後定立上供年額汴河斛㪷六百萬碩廣濟河六十二萬碩惠民河六十萬碩廣濟河所運多是雜色粟豆但充口食馬料惠民河所運止給大康咸平尉氏等縣軍糧而已惟汴河所運一色粳米相兼小麥此乃太倉畜積之實今仰食于官廪者不惟三軍至于京師士庶以億萬計太半待飽于軍稍之餘故國家于漕事至急至重京大也師衆也大衆所聚故謂之京師有食則京師可立汴河廢則大衆不可聚汴河之于京城乃是建國之本非可與區區溝洫水利同言也近嵗已罷廣濟河而惠民河斛㪷不入太倉大衆之命惟汴河是賴近嵗陳說利害以汴河為議者多矣臣恐議者不已屢作改更必致汴河日失其舊國家大計殊非小事惟陛下特回聖鑑深賜省察留神逺慮以固基本髙宗時左正言鄧肅上奏曰臣竊觀發運司嵗計五百餘萬每嵗入貢艫尾相銜略無虛日崇墉比櫛不容升合之缺朝廷費出且無餘者今年不知何以處之去冬自遭圍閉運漕不通今夏又以堤岸失防汴流久絶校之每嵗所入蓋未有百分之一也切聞之已入汴口者有百六十萬此數之外未有繼者朝廷欣然便以為有餘殊不知京師所積止于八月九月已後俟去年冬計每月之費在京師者以二十萬為率在行在者以十萬為率又有糴場二十四所并勤王軍兵齪門巡防人兵口食等兼非泛取索數目㑹入汴口之數僅支五月日耳五月之外將如之何倘敵人絶跡不復南度則運漕相繼未有害也若敵騎肆優再干我師不知軍民謷謷將焉就食此事最急不可以倉卒備也舟船有限日數甚迫雖發運百人亦無如之何矣臣愚欲乞諸州選才幹官員代發運司各運逐州嵗計往赴京師近地期以十月已前足五十餘萬之數凡舟船人兵與其餘所費之物各責辦知通乃以公使錢代支國家艱難之時雖三二年間公使闕乏未為要務協數十州之力人各自勸又立賞罰從而驅之則糧道又何患哉昔蕭何給餽餉不絶糧道漢髙祖自以為不如蓋當時糧道若或不繼雖有韓信亦將何所施乎惟陛下無忽孝宗時員興宗上奏曰臣聞陕西者蜀之扞蔽也數戍重兵兵恃食食恃漕運凡漕運之出此塗最艱畏者舟楫無施人力難繼故也使四川總計漕臣平時得一才吏思所以仰寬陛下西顧之意則講之有方取之有藝運之有法臨事輒濟不致遺蠧一方生息之民矣臣昔為吏西邊所見乃大不然者是皆計吏漕臣之咎也臣請疏舉其事先是金之背盟偏將窺蜀王師掎之所至輒下劉海下秦李進下河吳挺下鞏吳璘前軍繼之遂下德順簞食接塗士卒不餓如是何耶蓋取其郡即發其郡之倉戰其地即食其地之粟此宋武入關之勢也漕運何自而困哉繼而軍淹日月不免須索遂取于總漕之司二司無䇿均科于三等民戶興利之間文移甚星火矣以此為謀謂之有方可乎凡巴蓬劒閬上自三等每戶有出一夫者出兩三夫者一夫之費為錢一十八萬一夫所荷私載之外不過六斗計其米數則是六十鍾而致一鍾也夫以役一夫而費十八萬運一鍾而用六十鍾軍前所得不過毫絲民間所損已甚丘山有司亦太拙矣以此而取謂之有藝可乎當時運糧之夫同日俱發俱發則無次舍同招流民則素寒餓以寒餓之民居無次舍之地其死道路死霜雪者相踵也未跨數月臣已見申宣撫司死者近二千人其它則臣不䏻計也以此而運謂之有法可乎蜀之總計者昔負陛下委倚大率如此臣恐一日有事西陲糴買不足以辦大事欲革前弊欲興後利糧運當預為之謀也臣愚伏望陛下委總漕更科條權其輕重則此弊猶可及止也傳曰因利而利則其利深臣竊見陕西運茶之制一十里為鋪鋪有兵兵日有程月有給茍不如式則罪罰隨之國家逐年收西馬之利皆鋪兵之力也誠䏻倣運茶之法以運軍糧自興利至魚關水路自便無可議者若陸輦自河池至成岷過長道遂至天水此一路也自兩當至鳳翔過黃牛遂至大散此又一路也登涉山險運糧之夫常困于是常死于是苟䏻措置當以十五里為鋪鋪置五十兵一路置鋪不過六十矣鋪兵日再往來一運七斗再運為一碩有四矣六十鋪之兵月運二千一百碩鋪計兵月給之費兼取之民人計二碩而碩計五千不過三萬緡以民間雇夫之費凡六十有三萬緡鋪兵比之月減六十萬緡矣蓋鋪兵以三鍾而致一鍾民間以六十鍾而致一鍾利害豈不相逺乎陛下愛民類于愛子有司遺毒知則必革願聽臣䇿特賜施行既可以息西民困苦之役又可以免道路流亡之憂又濟年前緩急之用所謂一事治而三利具者也伏乞下大臣評議施行知信州王師愈論信州米綱疏曰臣竊見信州嵗起上供米七萬石類多陷折其弊甚矣倘不原致弊之由而為之計雖嚴其責罰未見其弊之革也臣嘗推原其故一曰地勢不得其宜二曰改撥無㝎處三曰管押非其人信之為州居江東上流最髙之地南接閩北際徽東連浙之衢二面阻山唯西有水路逹于鄱陽溪港狹灘磧多易漲易涸難得大船故信之米綱其初必用小船般載但寬于釣艇耳船與水常不相值有水則船不辦間或船辦裝載已畢一旦水落留滯岸下近則纍旬逺則纍月待其水通迂回行數百里始至鄱江併歸大船自初裝至于離岸經涉日久工稍坐食侵耗不知其幾雖欲無陷失得乎此則地勢致其弊也自紹興之初朝廷灼見信州起發米綱如是之難元降指揮止令于池州交卸以其地近而易達也雖不盡免陷折亦不若今日之甚其後守臣徐林亦嘗申眀數年間未見其大害近年以來總領漕司改撥無定或撥赴鎮江或撥赴淮南或撥赴行在省倉州縣受困陷失為愈多良由水腳之費非池州比也信州每一石米起赴池州正用錢五百有竒若赴建康則用錢七百有竒赴鎮江則用錢九百有竒赴淮南則又過之赴行在省倉則用錢一千二百有竒信州每納苖米一石依例止收水腳之費二百文只就池州交缷貼陪已過半矣多方措置辦之已艱況改撥建康鎮江淮南行在之逺乎方未裝發日若行改撥州縣尚可措置貼陪使之離岸至有已裝發于中塗者然後改撥部押之人不免復歸以索貼陪州縣不能即辦遂致米綱滯留中塗經日益久工稍坐食侵耗益多此則改撥致其弊也凡部綱者不顧其身不顧其家冒不測之險非慕賞則貪糜費之贏餘信州米綱無賞之可慕合用水腳尚或虧缺何贏餘之可貪是以有官有家業可倚仗之人皆不願行總領漕司責之州州責之縣縣不得已乃強之公吏一當其役親戚即為死别知其必不免也其有顧藉者睹前二弊竭力關防陷失尚少其無顧藉者乘此二弊益肆其姦至有全綱陷失者亦有陷失大半者此則部押非其人也嗚呼一顆一粒皆民之脂膏國之大計州縣收之不勝其勞一旦委之不啻泥土豈不重可惜哉苟不原三者致弊之由而欲以責罰禁之誠不見其弊之革也臣以謂地勢不得其宜固不敢輕議若夫改撥無定處部押非其人不為難革欲望聖慈行下總領轉運司檢元降指揮信州米綱只于池州交缷不得輒行改撥仍于部綱常格推賞外别立信州米綱賞格以所押米石之多寡為之等差許募見任寄居待闕文武官有家業人部押不得依前強差公吏庶幾官物無陷綱運易逹積弊可革矣師愈為長沙守又論綱運之弊疏曰臣竊聞諸路綱運類多陷折皆由賞減而不擇人也凡部綱者幸而事濟則身可保家可保官可保如其不濟則喪身破家敗官之禍隨之人所以冒此祻而不顧者以賞可慕耳是故頃年有家業之人皆欣然願就雖監司帥守之親屬亦為之或有虧缺有可陪備故陷折也少自減綱賞監司帥守親屬又皆禁止所部押者多貧困無藉之人冒急而輕就且多端經營費用不資方其離岸所喪已多逮至中流託以風濤又況出納之際欺弊不一故陷折也多原其減賞之由不過以文臣纍賞易至正郎武臣纍賞易至副使即可奏薦殊不思州縣拘收錢米艱辛一旦付之無藉之人失之亦非小弊比年止許選人小使臣部押防纍賞之弊已是允當誠䏻再定綱賞務令稍厚不拘監司帥守親屬或有家業有行止有幹材無過失校尉或獻納補官人皆許部押所押不得過三次如此則既革纍賞之弊綱運亦免陷折此大利也如狂言可採惟陛下特賜施行師愈又論潭州貼雇綱船之弊疏曰臣伏見潭州諸縣有大害曰貼雇綱船是也請為陛下詳陳之潭州嵗運苖米三十萬五千石以餉屯駐軍或有和糴及起發常平米多至五六十餘萬石少亦四十萬石頃年講和息兵其米止運至武昌皆是潭州措置船載未嘗敷及諸縣其後荆南襄陽屯軍泝江而上水淺灘多亦是潭州措置船載亦未嘗敷及諸縣暨至金人敗盟軍須日急守臣權一時之宜始令諸縣雇舟相添未嘗全取辦于諸縣自是遂為㝎例嵗嵗行之上則潭州漕司案吏下則牽頭船戶相為表裏每料除官支錢外必仰諸縣貼雇急以期限嚴以責罰者案吏也乘勢邀求其欲無厭者牽頭船戶也諸縣畏其責罰欲應期限不得不徇牽頭船戶之需酬以髙價邀求愈多況有爭雇之弊設若長沙著價五十善化或增六十湘潭又增七十其它縣亦莫不然直至厭其所欲而後已一縣被敷一萬料所費至一二千緡若所敷之數不止此其費亦隨之嗟乎此錢何從而出哉諸縣受其苦者一也諸縣雇船幸而得之依限解發始則下排岸司相驗相驗者取乞次則漕職官覆驗覆驗者取乞末則給付押綱使臣又從而巧為詞說取乞為尤甚嗟乎此錢何從而出哉諸縣被其苦者二也縣奉州令不敢違戾雖知二苦不暇顧恤于是冒法禁撰名色取之百姓以足其用㳂流漁戶凡有一網一釣舟者不免焉或多敷麯引或多出㝎帖或多給師巫公據或預借于上戶其名不可槩舉大抵科敷者官得其一吏取其十且以雇一萬料用貼雇錢一千貫為率縣吏因之為姦不知幾倍于此而官得此數然則享厚利者漕司州縣案吏也牽頭船戶也相驗覆驗官司也押綱使臣也被抑勒者知縣也受實害者闔境百姓也逮劉某守潭灼見其弊又睹諸郡無所出産凡客船運鹽而至者别無回貨孰肻空載以涉重湖之險多藉于運米綱斷然盡免諸縣貼雇潭州自行措置民無所擾米綱亦應期而辦其策甚良其利甚博自劉某被召通判職官上欲媚漕使下欲利吏輩以速辦為名盡變某之舊復興前者之害幸而沈介到任悉如某之措置又且米綱先期而了竊恐介去之後復有改之者欲望聖慈嚴敕湖南漕司及潭州每嵗米綱一依劉某沈介措置不得更令諸縣雇船殃害百姓或有違戾許百姓越訴臺諌彈劾每嵗發荆南襄陽米綱則用官船發武昌九江米綱則雇客船蓋緣客船所憚者荆襄之行水淺灘多動經年嵗有破家喪身者誠䏻只用官船運荆襄之米則客船亦欣然而就雇或有軍興警急必不得已分諸縣量行貼雇以助裝發必為之立綱次某縣應副第幾綱先後有倫斷不可易綱次既㝎自無爭雇之弊庶幾潭民咸被實惠理宗時知安慶黃幹代撫州陳守上奏曰國家綱運資以餉軍比年以來法度弛壞非惟軍餉不繼抑亦公私受弊其未離岸也有江水淺涸坐食糜費之弊其已離岸也有監官侵虧船梢盜竊之弊而其既敗也有攤賴平民之弊雖知其弊莫知䏻革是無它廢轉般之制而循直逹之法故耳今欲革歷年之弊使官無羡費而衆害悉除則莫若復轉般之制且以江西一路言之如撫州建昌綱之折閲每以水道淺涸不能行巨舟延引嵗終而未䏻起隔嵗之綱者一綱吏卒水手動數百計又所招集並皆遊手無賴之人自度官吏侵盜大數已虧恣情極用無所顧忌估籍所償不䏻萬分之一官司不免縱之攤賴平民侵削國本為害不細今若于隆興置轉般倉一所每嵗一路綱運水腳其費不資取其所費養水軍數百人命一武臣為之長造數十巨艦部以軍法責之轉輸近裏州軍止以小舟運載納之轉般倉却令水軍專一護送更往迭來不假召募綱紀素㝎部分素嚴舟楫素具較之烏合嘗試實相萬萬如此則非惟可以省官綱之折閲抑足以增國家之武備戢江湖之羣盜脫士大夫之罪戻免平民之攤賴是一變法而羣害悉去衆利並興如果可採乞于諸路推廣之元世祖時東平布衣趙天麟上䇿曰臣聞垂拱以運天下之事靡不從命者君之道也居職以服王室之勞而不敢外思者臣之理也故聖人設官錫以龍光之厚欲報效而已矣而周公之忠亦猶曽子之孝但可也而已矣君臣之際尊卑懸異與市井平交之道豈可同哉上古以來不賞而勸降及中古民漸澆漓須用賞以激之亦未聞食三品之祿居三品之位烟塵四靜而希重賞國家亦從而賞之者也竊見方今海道運糧之官雖萬億及秭亦皆冒汪洋之險借風浪之力以致之于神京之中誠可謂之有功然亦其當然之職也若夫計糧數之斛斗而酬之不啻巨萬亦以甚矣伏望陛下載宣天㫖令有司㝎制凡海道運糧之官三年一考超升于髙職而用之計不失優崇之禮又待超升舊官之後而以漸抑其賞賜之資亦國家之大端也臣非惜錢物而已但以與國家出力者非惟運糧之官如皆賞之則不給如獨賞運糧之官則猶未免大恩于一偏也且居其職者行其事何用賞乎此臣所以欲正其名分也臣又以㑹通河者有用之名川也懋遷有無者由是而經行官場南北者由是而往返雖復江淮河漢之大亦所以賴其朝宗雖復閩廣川蜀之遙亦足以達其輸運有利有害者理之常有通有塞者物之變湯湯然清浪之內流沙滯焉蕩蕩然坦途之上盜賊生焉又每嵗立秋之後積于數月之間瀕河農民極被搔擾又有沙之地以板衛岸皆非經久之計也更望陛下載宣天㫖舉天下審知河道地脉之人改修㑹通河之有沙者以避之不然則數年一度修理甚為煩費不可不杜其源也復宜分河路南北軍府為三五所而以千夫長各領之不備數者招軍士以充之不預出征之流不在營田之限使之專以巡鎮非常之警充給泛舟之役閘梁有圯則修之堤岸有損則築之若然則農民庶乎安帖盜賊庶乎消弭費寡而效多暫勞而永逸矣歷代名臣奏議卷二百六十一
