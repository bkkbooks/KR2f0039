body:
  text: 歴代名臣奏議卷一百二十三明楊士竒等撰禮樂䘮禮宋真宗景徳初禮官詳定明徳皇太后靈駕發引於京師壬地權欑依禮埋懸重升祔神主安易上言曰禮云既虞作主虞者已葬設吉祭也明未葬則未立虞主及神主所以周制但鑿木為懸重以主神靈王后七月而葬則埋懸重掩𤣥堂凶仗輼輬車龍輴之屬焚於柏城訖始可立虞主吉仗還京備九祭復埋虞主然後立神主升廟室自曠古至皇朝上奉祖宗陵廟行此禮何以今日乃違典章茍且升祔方權欑妄立神主未大葬輒埋懸重且棺柩未歸園陵則神靈豈入太廟奈柏城未焚凶仗則凶穢唐突祖宗望約孝章近例但於壬地權欑未立神主升祔凶儀一切祗奉俟丙午年靈駕西去園陵東回祔廟如此則免於顛倒不利國家乃詔有司再加詳定判禮院孫何等上言按晉書羊太后崩廢一時之祀天地明堂去樂不作又按禮王后崩五祀之祭不行既殯而祭所言五祀不行則天地之祭不廢遂議以園陵年月不便須至變禮從宜又縁先準禮文候神主升祔畢方行享祀若俟丙午歲則三年不祭宗廟禮文有闕況明徳皇太后徳配先朝禮合升祔遂與史館檢討同共參詳以為廟未祔則神靈不至伏恐祭祀難行欑既畢則梓宫在郊可以葬禮比附遂按禮云葬者藏也欲人不得而見也既不欲穿壙動土則龍輴欑木題湊䝉槨上四柱如屋以覆盡塗之所合埋重一依近例便可升祔神主安易妄言以凶仗為凶穢目羣官為顛倒指梓宫為棺柩令百司分析園陵浼瀆聖聦誣罔臣下安易又云昔日覩羣官盡公奉二帝諸后並先山陵後祔廟今日覩羣官顛倒奉明徳皇太后獨先祔廟後園陵者今詳當時先山陵後祔廟蓋為年月便順别無隂陽拘忌今則年月未便理合從宜未埋重則禮文不備未升祔則廟祭猶闕須從變禮以合聖情兼明徳皇太后將赴權欑而安易所稱柏城未焚凶仗則凶穢唐突祖宗按檀弓云䘮之朝也順死者之孝心也鄭𤣥注云謂遷柩於廟又云其哀離其室也故至於祖考之廟而後行商朝而殯於祖周朝而遂葬今亦遥辭宗廟而後行豈可以禮經所出目爲顛倒吉凶具儀謂之唐突哉又云孝章皇后至道元年崩亦縁有所嫌避未赴園陵出京權櫕之時不立神主入廟直至至道三年西去園陵禮畢然後奉虞主還京易神主祔廟以合典禮今詳當時文籍縁孝章為太宗嫂氏上僊之時止輟五日視朝百官不曽成服與今不同初亦無詔命令住廟享今明徳皇太后母儀天下主上孝極曽顔況上仙之初即有遺命權停享祀今按禮文固合如此安易荒唐庸昧妄有援引以大功之親比三年之制欺罔君上乃至於斯況安易以訐直自負所詆者無非良善以清要自高所尚者無非鄙俗名宦之志老而益堅詩書之文懵而不習本院所議並明稱典故旁考時宜雖曰從權粗亦稽古請依元議施行從之大中祥符九年殿中侍御史張廓言京朝官丁父母憂者多因陳乞與免持服且忠孝恩義士所執守一悖於禮其何能立今執事盈庭各務簡易況無金革之事中外之官不闕不可習以為例望自後並依典禮三年服滿得赴朝請天禧四年御史臺言文武官併丁憂者相承服五十四月别無條例下太常禮官議曰按禮喪服小記云父母之喪偕先葬者不虞祔待後事其葬服斬衰注謂同月若同日死也先葬者母也其葬服斬衰者喪之隆哀宜從重也假令父死在前月而同月葬猶服斬衰不葬不變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重雜記云有父之喪如未没喪而母死其除父之喪也服其除服卒事反喪服注云没猶終也除服謂祥祭之服卒事既祭反喪服服後死者之服又杜預云若父母同日卒其葬先母後父皆服斬衰其虞祔先父後母各服其服卒事反服父服若父已葬而母卒則服母之服虞訖反服父之服既除練則服母之服䘮可除則服父之服以除之訖則服母之服賀循云父之喪未終又遭母喪當父服應終之月皆服祥祭之服如除喪之禮卒事反母之服臣等參考典故則是随其先後而除之無通服五十四月之文請依舊禮改正仁宗景祐二年禮儀使上言曰天聖五年太常禮院言自来宗廟祠祭皆宰臣參知政事行事每有服制旋復改差多致妨闕檢會唐會要貞元六年詔百官有私喪公除者聽赴宗廟之祭監祭御史以禮有緦麻已上喪不得饗廟移牒吏部詰之吏部奏准禮諸侯絶周大夫絶緦者所以殺旁親不敢廢大宗之祭事則緦不祭者謂同宫未葬欲人吉凶不相黷也魏晉已降變而從權緦已上䘮服假滿即吉謂之公除凡既葬公除則無事不可故於祭無妨乞令凡有縿服既葬公除及聞哀假滿許吉服赴祭同宫未葬雖公除依前禁之詔從之又王涇郊祀錄緦麻已上喪不行宗廟之祭者以明吉凶不相干也貞元吏部奏請得許權改吉服以從宗廟之祭此一特之事非舊典也今本院看詳律稱如有緦麻已上喪遣充掌事者笞五十此唐初所定吏部起請皆援引典故奉詔百官有私喪公除者聽赴宗廟之祭後雖王涇著郊祀錄是一時之事非舊典也又别無詔敕改更是以歴代止依貞元詔命施行至大中祥符中詳定官請依郊祀錄緦麻以上喪不預宗廟之祭今詳貞元起請證据分明王涇所說别無典故望自今後有私喪公除者聽赴宗廟之祭免致廢闕寳元元年右司諫韓𤦺上奏曰臣昨奉使還闕竊聞朝廷自西事以来兩次非時就宅宣召兩府臣寮在外不測事宜人情驚駭當時物議以謂有失持重之體日近復知西京謡言虚驚煩於止遏昨日午後又聞就宅宣兩府臣寮入内搢紳士庶無不憂惑至晚方知只是魏國夫人薨謝陛下雖隆乳母之愛其如在禮止為緦麻三月之服若言乎親則非近也若言乎尊則不崇也此止可一中人傳詔於宰臣之第令議而奏之何必徧宣近輔震恐都人事徃不追後當為戒臣欲望每有國家體大之議邊鄙機宜之急合與兩府臣寮商量處置者務從審宻以安人心不宜倉卒以動羣聽臣又以送終之厚前載所非今魏國夫人於陛下親服既疎葬禮亦當簡儉望陛下勿聽左右張皇過為奢侈况國家西鄙設備兵須未豐正宜節用聚財之秋不可更為無益之費言或可采幸賜納用慶厯元年右正言孫沔乞權住豫王葬禮奏曰臣伏覩豫王以逡巡致疾奄棄妙齡人神共悲嘆戚何及況陛下以一人繼體之大慈父鍾愛之心變禮伸情追爵制服故四方知陛下思念之懐悲感之意亦已至矣使天下為父者足以仰仁慈之道也竊聞欲取五月中葬於永定陵以春秋之義固為得禮盖陛下以哀痛之深無以盡其意而欲飾終顯跡冀竭精志雖使死者有知亦無所益諒大聖至明無幽不照豈於此事更有所疑實以情所未忍遂起此議今左右大臣宗親中閫皆為皇眷軫悼未敢直請緩期竊恐因仍成事難復救論臣職當建言故非獲已當君父痛切之際而復不能將順其㫖獲罪必矣臣豈惜一黜而誤陛下之逺謀朝廷之大計也然豫王未可葬者三悉數以陳願賜詳覽且一品之葬禮式甚煩百日之間工役難就啓土壠山驅人勞衆諸宫因此葬者亦多所費之財非五十萬未能畢事今三司力屈百計收斂邊鄙宿兵未得豐足豈宜以三嵗之恩忘四方之事此未可一也又京洛之間衝要之所自昊賊侵軼國家征討饋運粮草齎送甲兵徃還騷擾民頗不聊配率科徭嵗無虚刻塋墓若此驟興州郡如何供給此未可二也復況西賊竊伺中國已經數年以水旱不調謂得天時以将帥不和謂合人事巧搖百端思欲一決今若因我之憂起役之次或盡兵力以幸此災益啓戎心轉為邊患此未可三也臣所見至愚固未為得庶盡懇切上補聰明欲乞權宜就近安殯俟西事稍定一二年間具禮改葬正合典儀伏望皇帝陛下以禮制情以義㫁恩以祖宗社稷為心以安危休戚是念無執小節以妨永圗臣恭聞真宗皇帝四十餘方長育陛下司牧羣生為世真主今陛下盛德形容始三十嵗受萬世無疆之福何患乎錫羨之嗣晚也伏乞養氣保神順時進膳特寛聖慮專㫁邦畿則天下幸甚沔又奏曰臣聞忠臣切言非欲被狂名於時在回君心而已聖人納善非以啓衆議之口在惜國體而已故帝王舉一事出一令有不便於時未合於衆必容三諫以達四聦實冀再思利害周察體宜一說中幾萬有䝉福破柔邪之謀開明哲之志不惟其大亦以為難臣非不知犯顔不若取媚趨險不若偷安茍人人自圖恐非國家之利恭惟皇帝陛下仁明同堯舜恭儉若文景大度包荒純誠愛物好善無厭從諫弗咈接臣下以從容形温潤於顔色是使至愚得以盡慮況臣非才叨備諫列豈可見事自隠以一言為供職遂與衆退黙起外廷竊議臣所不取也是敢再陳狂瞽上瀆聖明惟陛下察之聽之容之畢之而已臣若以此獲譴實亦無恨近以豫王卜葬曽上封奏細陳其事又前日崇政殿進對三復盡意雖言拙識淺不足以動天聽乃知聖心唯切思念故非確然意不可轉此恐隂陽術數之流左右纎佞之輩巧陳厭勝多說災祥上惑視聽以此未决臣伏願以天時人事國計未便者察之中春卜地盛夏起墳鑿土穿山六十餘穴損害生命役人勞衆數十萬工衝冒暑熱適在毒日流爍更或大雨霖潦修治橋路供億頓逓不害於民何以集事此天時未便者一也豫王最幼殤禮為下諸宫附葬族屬多長以卑動尊亦非順也邊方士卒衣食不足而藏寳於地下郡邑人民配率無數而勞生奉死者此於人事未便者二也西鄙屯戍三十餘萬省司嵗用百計不支鬻一廷尉官纔得九千斛免一里胥役不過數百貫調發已勞用度不給況南郊在今冬賞費千萬其為窘急故亦可知今一品儀仗尚用千餘人附葬諸喪各備執事車騎導從僅萬餘衆徃復勞撓非五十萬緍恐未能畢事此於國計未便者三也此非獨臣言乃三事大夫有識者之言也陛下貴為天子以一幼子展送終之禮庶盡其愛亦未為過其為未便者以時有所妨爾盖國家多事之際在陛下割慈忍愛克己復禮為天下蒼生計況西賊猖熾敗軍殺将人心憂危未有安策而重三嵗之念忽萬姓之苦陛下以為如何且天下安雖未有子亦不足為憂也若天下危雖有子得不為慮哉況其奉死者也臣又觀欲了葬者有三諸宫國戚一也中人監護二也司天隂陽三也皆旁集已事而利進身也今三事大夫有識者意有補益而未能回上心者逺也國戚監護隂陽者事有所損而能伺上意者近也伏望陛下察逺近之言究損益之本則王之葬禮庶幾權止矣昨日又見敕㫖差朝臣減省費用此乃陛下所慮至㣲至悉之深也然恐此二人力未足為監護中貴大臣所信而能節制也不若俟一二年間中外稍安備禮改卜亦為王者之光而天下之幸也今陛下當悲悼之際㣲臣無将順之心而煩辭寡識干瀆天聽尚冀感回暫息勞費則誅責之罪逃避何及至和元年沔為樞宻副使論張貴妃喪禮過制疏曰臣最處孤迹特荷聖恩如遇有聞事干大體不敢隠黙自求安全茍狂言有所開悟雖誅責亦足補報竊見貴妃夭亡上心感悼欲加異禮尤宜節情史筆一書後世為戒故不可不謹也臣雖叨近班莫聞中議實有所疑合具陳奏庶幾更資討論免貽中外之議一皇儀殿乃祖宗太后權厝之所今遷妃子在内恐非一品所宜必是倉卒之間禮官之失又聞諸宫之親朝夕聚衆縗裳千人號泣踰月且正寝至近在上全無避忌何僭如是使魂而有知必不得安況凶穢之氣干犯尊嚴尤為不便懼知禮者傳笑四方更乞酌其舊典速行遷殯庶協中道一恭徳之諡盖禮官務取羙名以奉上意未暇開陳恐成敗事至於三朝聖后以孝以章皆以後来孝思尊易諡法今貴妃便以恭徳為號實可驚駭詳稽前志無此失禮何況因情自我為繆必致起謗上玷聖明唯乞審議免貽後誚至於郭氏張氏二后並無諡號前規盡在速乞削去恭徳二字一園陵監護使竊見郭后張后並在奉先殯盖於體不宜起陵議葬於西京今以貴妃特欲興陵之役未知以何名擇地而為制度人臣豈敢盡言況今經冬無雪數千里災旱加之疾疫是四方多虞之時宜且靜以鎮之若役萬兵之衆費百萬之財於國賦民力實為大損不若便俟豐年徐議其制臣前日聞宰臣初議􅑼殯於普安院最為得體臣愚鈍少文乆守外方不盡知朝廷體要聞有識者皆以奉貴妃之議大過盖佞人阿㫖不以直道裨聖意将以服勞而求爵賞爾況禮不自天降地出在於人情而已茍得其中則為後世令典朝家延洪慶基百年中外無患難者盖仁義深而禮法正爾陛下當為祖宗惜之伏望遷妃子之靈出皇儀殿罷哭泣之儀去恭徳之號省園陵之名然後重加詳酌所貴中禮天下幸甚干瀆天威難避誅責臣不勝惶懼激切之至慶歴二年知諫院歐陽脩論楊察請終喪制乞不奪情劄子曰臣近見丁憂人茹孝標居父之喪来入京邑奔走權貴營求起復己為御史所弹又聞新及第進士南宫覲聞母之喪匿不行服得官娶婦然後徐歸見在法寺議罪孝標官為太常博士覲在場屋粗有名稱此二人猶如此則愚俗無知違禮犯義者何可勝數矣盖由朝廷素不以名教奨勵天下而禮法一隳風俗大壊竊以風化之本由上而下伏見起復龍圖閣待制楊察累有章奏乞終母喪而朝㫖未允夫臣子之行惟孝與忠察以文中髙科官列近侍而能率勵頺俗以身為先陛下宜曲賜褒嘉遂成其志使遷善化俗自察而始豈可不通人情膠執舊弊推禄利之小惠廢人臣之大節臣謂近侍奪情本非軍國之急不過循舊例示推恩而已今察以節行自髙志在忠孝知貪冒禄利為可恥若朝廷奪其情使其於身不得成美行而於母有罔極之恨豈足謂之推恩乎方今愚俗無知違犯禮義至使繁獄訟嚴刑罰而不能禁止脫有一人欲守名教而全忠孝以勵天下者又為朝廷不許則風俗之弊其咎安在伏乞早降恩㫖許其終喪不獨成察之志亦以為朝廷之美四年脩論葬荆王劄子曰臣伏覩朝㫖雖差宋祁監護故荆王葬事然未見降下葬日及一行事件或聞以歲月不利未可葬或聞有司以財用不足乞且未葬夫隂陽拘忌之說陛下聰明睿聖必不信此巫卜之言而違禮典但慮議者堅執方今財用不足不可辦葬陛下聞有勞民枉費之說則不得不慮因以遲疑臣謂前後勅葬大臣浮費枉用之物至多豈是朝廷本意皆為主司措置之失致人因縁以為奸爾今若盡節浮費及絶其侵蠧而使用物不廣則將復以何辭而云不葬臣不知所司曽将一行用度計定大數否内若干是浮費若干是實用若實用之物數猶至多而力不可辦則緩之可也若實用之物少只是舊例浮費多則可削去浮費而已今都不計度而但云無物可葬則不可也未見實用之數多少不量力能及否而曰必須遵禮而曰必須葬亦未可也如臣愚見酌此兩端葬則為便然須先乞令王堯臣宋祁等将一行合用之物列其名件内浮費不急者一一減去之若只留實用之物數必不多假如稍多更加節減雖至儉薄理亦無害如此則葬得及時物亦不費夫儉葬古人之美節侈葬古人之惡名今避儉葬不肯節費留喪而待有物之年以就侈葬則非臣所知也若曰儉葬亦未能辦則乃過言之甚也然外之輿議為國家論事體者皆云葬則為便今朝廷議者分而為二顧物力者則不顧典禮國體論典禮國體者則不思財用辦否各執偏見議乆不决以惑陛下之聦明今便葬之害一不葬之害五便葬之害不過費物然力有可為不葬之害所失則大不肯薄葬而留之以待侈葬成王之惡名一也信巫卜之說而違典禮二也目下減節力所易為他時豐足理或難待使皇叔之柩五七年間不得安宅而神靈則無歸三也使四夷聞天子皇叔薨而無錢出葬遂輕中國而動心四也今天下物力雖乏然凡百用度不能節費處多獨於皇叔之身有所裁損傷陛下孝治之美五也此臣所謂葬則為便者也荆王於國屬最尊名位最重伏乞早令定議無使後時脩又論葬荆王一行事劄子曰臣風聞已有聖㫖荆王葬事令三司與太常禮院及監葬官等同議減節浮費此足見陛下厚於皇叔之恩念民惜費之意一舉而兩得也然臣每見朝廷作事欲愛民節用而常枉費勞人盖為議事之初不得其要或失於不精審者有四民間不科配一也州縣供應物有定數二也送葬之人在路禁其呼索三也州縣官吏不得過外供須以邀名譽四也茍絶此四者則無大患矣昨京西一路遭張海驚刼之後不可更有誅求臣今欲乞指揮三司應是合要之物並須官給不得民間科買仍乞先将一行儀仗人馬并送葬人等一人以上先定人數然後劄與京西令依數供頓則可無廣費自荆王以下諸喪非至親者不必令其自徃仍乞限定人數及每人将帶隨行人數亦乞限定凡皇親及一行官吏除宿頓合供飲食外不得數外呼索州縣官吏亦不得於官供飲食外别以諸物獻送權要其受獻送并呼索並以入已贓論仍乞御史裏行一人隨行糾察其數外帶人及州縣隨順呼索獻送物等官吏物出於已亦從違制若託以供應為名於民間賤買及率掠者皆以枉法贓論如此防禦方可杜絶浮費以稱陛下厚親節用之心慶歴三年集賢校理余靖上奏曰臣伏見隂陽剋擇官状申皇子故鄂王殮被服並取今月初四日又伏見每年正月五日紫宸殿開宴管領契丹賀正人使切恐有司循故事申舉以戎使為重依例作樂開宴臣身為禮官故敢先事言之竊以故鄂王雖在襁褓是為無服之殤其如已賜爵命當同成人之例父子天性豈能無戚今日服之而明日宴樂情何以安且臣寮之家遭此喪尚當給假況萬乗之主因戎狄之使不得申其私恩深可痛也臣以為若不得已宣召與禮食而徹去聲樂親遣大臣告諭戎使以皇帝有嗣續之痛故罷去聲樂非有輕重於北朝也戎狄同有父子不敢以此為恨昔周景王以子喪既葬而與宴春秋譏之以為失禮古者卿佐之喪雖有祭祀尚猶廢樂況在親父子乎臣不勝區區之至太常禮院上議曰禮記父母之喪無貴賤一也又曰三年之喪人道之至大也請不以文武品秩髙下並聽終喪時以武臣入流者雜難盡觧官詔自今三司副使已上非領邊寄並聽終制仍續月奉武臣非在邊而願觧官者聽凡奪情之制文臣諫舍以上牧伯刺史以上皆卒哭後恩制起復其在切要者不候卒哭内職遭喪但給假而已願終喪者亦聽惟京朝幕職州縣官皆觧官行服亦有特追出者凡公除與祭四年參知政事范仲淹奏議葬荆王疏曰昨日奉聖㫖令中書熟議荆王葬事者臣謂此議有三其一曰年嵗不利此隂陽之說也其二曰財用方困此有司之憂也其三曰京西宼盜之後不可更有搔擾此憂民之故也臣又别有四議乞陛下擇之其一曰諸侯五月而葬是自古不易之典今年嵗不利之說非聖人之法言也其二曰天下財利雖困豈不能葬一皇叔耶陛下常以荆王是太宗愛子真宗愛弟雖讒惑多端陛下仁聖力能保全使得令終豈忍送葬之際却惜財利而廢典禮使不得及時而葬恐未副太宗真宗之意臣為陛下惜之豈不防天下之竊議哉更乞檢會先朝諸王之薨有無權厝之者其三曰自来敕葬多是旋生事端呼索無算臣請特傳聖㫖令宋祁王守忠與三司使副并禮官聚議合要物色務從簡儉畫一聞奏與降敕命依所定事件應副更不得於敕外旋生事節枉費官物仍出聖意特賜内藏庫錢帛若干備葬事使三司易為應副如此則陛下孝徳無虧光於史策其四曰自来勅葬枉費太半道路供應民不聊生臣請特降嚴㫖荆王二子并左右五七人送葬外其餘婦人合存合放便與處分更不令前去自然道路易為供頓大減冗費既減得費耗又存得典禮此國家之正體也乞聖慈從長處分臣待罪政府不敢不盡七年禮官邵必上言曰古之臣子未有居父母喪而輒與國家大祭者今但不許入宗廟至於南郊壇景靈宫皆許行事按唐吏部所請縿服既葬公除者謂周以下也前後相承誤以為三年之喪得吉服從祭失之甚也又據律文諸廟享有緦麻以上喪不許執事祭天地社稷不禁此唐之定律者不詳經典意也王制曰喪三年不祭惟天地社稷為越紼而行事注云不敢以卑廢尊也是指王者不敢以私親之喪廢天地社稷之祭非謂臣下有父母喪而得從天子祭天地社稷也兼律文所以不禁者亦止謂緦麻以上周以下故也南郊太廟俱為吉祀奉承之意無容異禮今居父母喪不得入太廟至南郊則為愈重朝廷每因大禮侍祠之官普有霑賚使居喪之人得預是事是不欲慶澤之行有所不被奈何以小惠而傷大禮近嵗兩制以上並許終喪惟於武臣尚仍舊制是亦取古之墨縗從事金革無避之義也然於郊祀吉禮則為不可下禮院議曰郊祀大禮國之重事百司聨職僅取濟集若居喪被起之官悉不與事則或有妨闕但不以慘麤之容接於祭次則亦可行請依太常新禮宗室及文武官有遭喪被起及卒哭赴朝參者遇大朝會聽不入若縁郊廟大禮惟不入宗廟其郊壇景靈宫得權從吉服陪位或差攝行事詔可至和元年孫抃論温成護葬宜減損正禮疏曰臣在病假中聞朝廷議貴妃事累具劄子論奏數日間留中不降今制命已出必不可更生議論但臣愚深為聖朝惜此一舉欲望陛下特降詔㫖申諭四方言前追册之命止旌褒貴妃生前勤效若挺身以衛宸極割臂以書奏章之𩔖其将来護葬次第宜減損正禮務從簡易至於諸般遺賞恩例並須一一檢尋國家故事施行如此則尚可以稍救前失惟新聖徳方今自秋不雨終冬無雪春陽浸逺粟麥未敷人心皇皇疾疫相繼災異之大莫甚於此陛下恤民勞憂國力答天意順物情在此行也臣不勝拳拳之至五月抃為御史中丞又論張貴妃進册皇后疏曰臣伏見貴妃薨逝陛下以數年内助之益議欲追册后諡舉行園陵號名既崇事體尤重參較禮典頗未合宜況自去年秋冬至於春首雨雪不降粟麥未敷必慮百司難為供應伏望陛下先詔大臣商𣙜次命禮官議定然後施行所貴聖朝事典動有根據亦所以惜人力而答天意抃又乞改差以次臣僚監護温成皇后葬事疏曰臣伏以國家禮制隆殺從宜本縁人情匪自天降規模法式中外觀瞻得之則取重朝廷失之則貽誚天下臣伏覩温成皇后禮葬初命參知政事劉沆為監護之職當時物論或未為非今沆爰立作相謂宜立須改差奈何重惜更張膠固不變風憲論列陛下所宜留神相臣懇辭陛下所宜開可上守祖宗之軌範下從臣子之讜言念公相燮理之非輕俾后妃終始之如禮伏況自啓􅓖祭窆制度繩墨一切辦集定無闕事其監護職除宰相外欲乞速賜改差以次臣僚免使虧本朝之典禮取後代之譏議臣寫誠瀝血所難盡言伏惟陛下思之慎之特賜采納則天下幸甚嘉祐七年知諫院司馬光論董充媛賜諡冊禮疏曰臣伏見充媛董氏薨追贈婉儀又贈淑妃陛下親為之輟朝掛服羣臣進名奉慰又命有司為之定諡及行䇿禮於葬日仍鹵簿外廷之議皆以為董氏名秩本㣲病亟之日方拜充媛今送終之禮太為崇重臣按古者婦人無諡近世為皇后有諡及有追加䇿命妃嬪以下未之有也鹵簿本以賞軍功未嘗施於婦人唯唐平陽公主有舉兵佐髙祖定天下之功方給鼔吹後至中宗時韋后建議妃主葬日皆給鼓吹非明王之令典不足法也臣愚念陛下恭儉寡欲近嵗以来後宫之寵絶無太盛過分著聞於外者此四方之人所以咨嗟頌詠歸仰聖徳也不意今兹以既没之董氏而有司諂曲妄崇虚飾以隳紊制度瀆慢名器使天下之人疑陛下隆於女寵甚非所以益聖徳也況禮數既崇則凡事所須用度益廣今明堂大禮新畢帑藏空虚賦歛日滋元元愁困誠不宜更崇大後宫之喪以横増煩費夫亡者雖加之虚名盛飾豈能復知而適足以仰累聖徳臣竊惜之伏望陛下特詔有司悉罷議諡及冊禮事其葬日更不給鹵簿凡喪事所須悉從減損不必盡一品之禮以明陛下薄於女寵而厚於元元也仁宗時宋祁言郭稹不應為嫁母持服状曰臣竊惟禮者叙上下制親疎别嫌明㣲以為之節也故三年之喪雖天下逹禮至於情文相稱必降殺從宜故尊有所申則親有所屈不敢以所承之重而輕用於其私者也伏見前祠部員外郎集賢校理郭稹生始數嵗即鍾父喪而母邊氏更適士人王渙稹煢煢孤苦以訖成立見無伯叔又鮮兄弟奉承郭氏之祭者惟稹一身而已母邊氏適王氏更生四子今邊不幸而訃聞稹乃觧官行服以臣愚管見深用為疑伏見五服制度勅齊衰杖朞降服之條曰父卒母嫁及出妻之子為母其左方注曰謂不為父後者若為父後者則為嫁母無服今詳邊氏嫁則從夫已安於王室死将同穴永非於郭偶而稹既為父後則宜歸重本宗雖欲懐有慈之愛推無絶之義亦不得為己嫁之母亢父而盡其禮也何者輕奉父統則郭之承重更無他親備執母喪則王之主祀自有諸子臣詳求制㫖疑稹不當觧官行禮夫禮有所殺君子俯就也誼有所㫁聖人不專也況當孝治宜謹彛經伏乞降臣此状下有司博令詳議其郭稹為父後為嫁母應與不應觧官行三年之喪然後明垂定制俾守共規臣偹禮官不敢寢嘿謹具状奏聞英宗即位初殿中侍御史司馬光乞遣告哀使劄子曰臣等竊見大行皇帝晏駕已近旬日其告哀於契丹使人尚未進發兼聞不曽素戒使者對答繼嗣之辭臣等竊議深恐未便何則國家既與契丹約為兄弟遭此大喪立當訃告契丹刺探之人所在有之今天下縞素契丹豈得不知而訃告之人尚未到彼彼謂中國有何事故能不猜疑自古大宗無子則取於小宗以為後著在禮典豈為國惡若契丹有問盡以實對有何所傷今問繼嗣於使人而使人對以不知事體豈得便稳況陛下初為皇子之時詔書已布告天下契丹安得不知今若答以虚辭不足詐彼而適足取其笑侮耳國家自與契丹和親以来五十有六年生民樂業今國有大故正是隣敵闚伺之時豈可更接之失禮自生間隙臣等願朝廷早決此議令使人晝夜兼程進發若契丹問及繼嗣皆以實告孔子曰言忠信雖蠻貊之邦行矣臣等愚意竊以如此為便光乞撤去福寕殿前尼女劄子曰臣竊見大行皇帝梓宫在福寕殿自啓菆以来每日装飾尼女置於殿前傅以粉黛衣之綺繡状如俳優又𩔖戲劇臣不知其説果何謂也羣臣見者無不駭異或嘆其失禮或黙有譏誚黷嫚威神莫甚於此殆非所以裨助喪容觀示萬方伏望聖慈速令撤去孔子曰𦵏之以禮此孝之大也臣願陛下因此特降聖㫖下有司應将来靈駕進發以至襄事凡儀仗送終之物有鄙俚無稽不合禮典如此之𩔖悉宜撤去無使四方之人有所觀笑光言遣奠劄子曰臣聞禮為人後者為之子也孔子曰人未有自致者也必也親喪乎又曰喪事不敢不勉故天子即位之初天下所以瞻仰而歸心者唯在執喪盡禮而已矣恭惟仁宗皇帝舉天下而授之陛下明睿獨㫁人莫能間父母能生陛下不能使陛下貴為天子富有四海至於萬世子孫永饗天禄皆仁宗皇帝之厚徳不可忘也今靈駕發引逺就山陵天長地乆永無還期痛毒惻怛無甚於此伏望陛下至日若聖體稍安行禮之際威儀容止動加矜慎擗踊哭泣過於哀毁以竭孝思之至報罔極之恩結四海之心聳萬民之望盛徳本基盡在於是不可以不嚴畏也此雖聖明所自知然臣區區尚欲以塵露之㣲助山海之大庶幾萬一或有所益焉光論虞祭劄子曰臣聞禮既𦵏而虞虞安也柩既藏矣孝子不忍一日離其親恐精神彷徨無所依歸故祭以安之也然則虞者孝子之事主人當親其禮非臣下所得攝臣竊見今月三日虞祭百官皆入就位而哭而陛下不親其禮使宗正卿攝事臣竊惑之伏以永昭陵距京師猶五頓木主還未至之時不可一日不虞故使羣臣攝事今木主已逹京師近在内殿而有司不根禮意尚如塗中使羣臣行事於親疎之序有所不稱於哀慕之情有所未盡臣恐聞見之人不知有司之失而歸責於陛下今未至卒哭尚有三虞欲望自来日以後陛下親行其禮光又奏曰臣昨日上言虞祭者孝子之事非臣下所得攝乞陛下親行其禮陛下不以臣言為輕以為得禮已降聖㫖依臣所奏今日禮儀既具百官在庭而陛下不出復使宗正卿攝事在列之臣無不愕然自失且昨日有司不為陛下設親祭之禮猶可謂之有司之失若今日之事則咎将誰歸此皆由臣惷愚以彰陛下之過臣之罪重惟陛下裁之臣聞易曰不逺復無祇悔元吉孔子曰過而不改是謂過矣伏望陛下来日雖聖體小有不康亦當勉强親行其禮以觧中外之惑治平二年翰林學士王珪上議乞依先朝封贈期親尊屬故事奏曰臣等謹按儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為所後者之祖父母妻妻之父母昆弟之子若子若子者言皆如親子也又為人後者為其父母期傳曰何以期也不貳斬也特重於大宗者降其小宗也又為人後者為其昆弟大功傳曰何以大功也為人後者降其昆弟也以此觀之為人後者為之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不得專一於此故也是以秦漢以来帝王有自旁支入承大統者或推尊父母以為帝后皆見非當時取議後世臣等不敢引以為聖朝法況前代入繼者多宫車晏駕之後援立之䇿或出母后或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祇承天地之意於宗室衆多之中簡拔聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承者皆先帝之徳也臣等愚淺不逹古今切以為今日所以崇奉濮安懿王典禮宜一依先朝封贈期親尊屬故事髙官大國極其尊榮譙國太夫人襄國太夫人仙逰縣君亦改封大國太夫人考之古今實為宜稱神宗熈寕元年翰林學士王珪上奏曰臣等謹按王制喪三年不祭唯祭天地社稷為越紼而行事傳謂不敢以卑廢尊也則居喪而可得見天地也春秋僖公三十三年傳凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟杜預以謂新主既特祀於寝則宗廟四時常祀自當如舊是則居喪而可得見宗廟也周公稱商髙宗諒隂三年不言子張疑之以問仲尼仲尼答曰何必髙宗古之人皆然髙宗不云服喪三年而云諒隂三年者杜預又謂古者天子諸侯三年之喪既葬而服除諒隂以居心喪不與士庶同禮也然則服除之後郊廟之祭可勿舉乎南齊以前代君嗣位或仍前郊之年或别自為郊下有司議而王儉乃援晉宋以来皆改元即郊而不用前郊之年又自漢文以来皆即位而謁廟至唐徳宗以後亦踰年而行郊況本朝景徳二年真宗居明徳皇太后之喪既易月而服除明年遂享太廟而合祀天地於圜丘臣等伏請皇帝将来冬至躬行郊廟之禮其服冕車輅儀物音樂縁飾事者皆不可廢神宗時知太常禮院蘇頌議承重法疏曰臣近因上言臣僚家廟祠享事乞重定服紀親疎之制曰一節准五服年月勅斬衰三年嫡孫為祖父為長子今士庶之家子孫罕分嫡庶其相為服徃徃一槩以斬衰期或踰年從吉便行嫁娶茍有犯者縁勅律不分士庶便當一列㫁罪臣以謂古者貴賤不同禮諸侯大夫世有爵禄故有大宗小宗主祭傳重之義則喪服從而異制匹士庶人亦何預焉何以言之謹按喪服傳曰父為長子何以三年也正體於上又乃将所傳重也鄭康成曰重其當先祖之正體又以其将代己為宗廟主也而經不言長孫為祖者盖有爵土則父殁次當傳已其承重可知也近代仕不世爵宗廟因而不立尊卑亦無所統其長子孫與衆子孫無以異也生而情禮則一死而喪服獨異恐非先王制禮之本意也而世俗之論乃以三年之喪為承重故謂當服者為承重而不知為承大宗之重也嘗聞慶歴中朝廷欲議臣僚應任子者長子長孫差優與官餘皆降等此亦近立宗之法也然雖有此議亦不果卒行慶歴末石中立卒未幾庶子從簡又卒嫡孫祖仁先己服期不知後服禮官以謂宜别制斬衰嘉祐中劉煇祖母卒自言㓜孤鞠於祖母雖有諸父亦乞解官行服禮官議煇是長孫自當承重臣竊謂祖仁官丞郎列近職世荷賞延是亦有重可承者也煇乃庶官世又非顯若云鞠於祖母報以三年可也有諸父在而令承長孫重非也故熈寜八年六月詔書嫡子死無衆子者然後嫡孫承重襲封爵者雖有衆子猶承重此明宗子傳重正合古禮而未議無封爵者及庶人所以承重之意故學禮者猶以為未盡也傳曰都邑之士則知尊禰大夫及學士則知尊祖故諸侯及其太祖天子及其始祖之所自出由是言之尊卑之禮有隆殺之異而喪服從而為之制也明矣今服祖重者而無所以為重之義又無大夫庶人之别是尊卑一統而貴賤同體也臣伏覩朝廷修舉遺墜禮無不講喪服之制事干典刑有所未明固宜稽考欲乞特詔禮官博士參議禮律若以無封爵者無傳重之義即乞别立服制如在禮故合承重亦乞參酌古今收族主祭之禮立為宗子繼祖有以異於衆子孫之法及庶人與士大夫當與不當同一律頒布天下使人知尊祖不違禮教則州郡用法㫁以不疑也臣職在守藩不當輕議禮典然麗刑讞獄亦州郡之所得言也神宗崩時詔禮官詳議禮部尚書韓忠彦等議朝廷典禮時世異宜不必循古若先王之制不可盡用則當以祖宗故事為法今言者欲令羣臣服喪三年民間禁樂如之雖過山陵不去衰服庶協古制緣先王恤典節文甚多必欲循古又非特如所言而已今既不能盡用則當循祖宗故事及先帝遺制詔從其議哲宗初即位秘書省校書郎范祖禹上疏曰臣謹案禮喪服斬衰父傳曰為父何以斬衰也父至尊也諸侯為天子傳曰天子至尊也君傳曰君至尊也先王制禮以君服同於父皆斬衰三年盖恐為人臣者不以父事其君此所以管乎人情也自上世以来未之有改至漢文帝遺詔始令吏民三日羣臣三十六日而除後世又為易月之制二十四日而大祥三日禫而釋服喪紀之數尤薄於漢焉自漢以来不惟人臣無喪君之服而人君遂亦不為三年之喪惟晉武帝以䟽素終三年其羣臣多以為非盖諂䛕之人習於流俗而不知禮也唐之人主無有為三年服者而三百年間議者亦未嘗及之盖世無逹禮之士而人不知事君之義也惟國朝自祖宗以来外廷雖用易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服故也今君上之服已如古典而臣下之禮猶依漢制是以大行在殯而百官有司皆已復其故常容貌衣服無異於行路之人無哀戚思慕之心豈人之性如此其薄哉由上不為之制禮也夫衰麻哭泣孝子仁人之所以表其𠂻也賢者無服則無以致其哀不肖者無服則遂忽而忘之是以禮義偷薄忠孝陵遲則由無服以管其情也素冠之詩刺不能三年盖為是矣且其禮之失者臣請得以悉陳之今羣臣易月而人主實行喪故十二日而小祥朞而又小祥二十四日而大祥再期而又大祥夫練祥不可以有二也既以日為之又以月為之此禮之無據者也古者再朞而大祥中月而禫禫者祭之名也非服之色也今乃為之縿服三日然後禫此禮之不經者也既除服矣至葬而又服之盖見梓宫不可以無服也祔廟而後即吉纔八月矣去山陵未乆也而遽純吉無所不佩此又禮之無漸者也臣伏見大行皇帝之喪自三月十三日服至二十八日而除羣臣衰麻纔十六日遺詔易月因襲故事已行之禮不可追也臣愚以為過山陵宜令羣臣朝服止如今日未除衰至朞而服之漸除其重者再朞而又服之乃釋衰其餘則君服斯服可也此非有所難行惟存其衰麻而已今之冠服非古之制也至於祥不必為之服惟未純吉以至於禫然後無所不佩則三年之制畧如古矣夫衰裳不可以服勤㫁以日月而易朝服以治事誠是也然既葬而遂除之臣竊以為太早矣孔子曰喪事不敢不勉又曰上好禮則民莫敢不敬伏惟皇帝陛下聖政之美四方風動上順天意下順人心書曰今王嗣厥徳罔不在初於以革千餘嵗之弊正一代之禮教天下使知君臣之義其於風化非小補也如以臣言為然乞下有司考正其禮臣又聞儉葬者聖哲之訓也奢葬者世俗之失也宋華元厚葬其君君子以為不臣漢世山陵多藏金寳故有張釋之之言劉向之論世所明知也武帝在位嵗乆茂陵中物無所容霍光不逹大體以厚葬為愛君無所減損從而益之故西漢之末唯霸陵獨完葬之厚薄禍福可覩矣臣誠知國家山陵送徃儉於前代然猶以為言者欲於儉約之制損之又損使天下知其中無所有見其中無可欲則萬世之利也臣昔者伏見仁宗皇帝𦵏於昭陵有緘封皮匣納之方中者甚多皆出於禁中人莫得而知也臣愚以為如此之𩔖無益於先帝竊恐沿襲故事猶或藏之推此𩔖以損之必猶有可省者也昔周太祖将終戒世宗曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙衣歛以瓦棺勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝周祖生於五季之末非有前聖之識而其葬乃如太古此其智賢於秦始皇逺矣近事不逺即本朝所代也臣以為周祖懲唐奢𦵏故以儉薄矯之然以天子之喪而幾於臝葬則太偪而不可為繼今惟於儉制之中加損約焉可也臣頃在書局未嘗敢越職言朝廷得失今非職而言者竊以先帝之服臣子所同也先帝之葬四海所共也臣身服先帝之服預先帝之葬知其不合於禮而不言憂其或過於厚而不以告臣所不能己也臣嘗采唐事為唐鑑數百篇欲獻之先帝屬先帝不豫未及上其中一篇論厚葬一篇論喪服輒不自揆謹録上進庶幾觀古以知今少禆萬一焉干冒旒扆臣無任惶懼俟罪之至祖禹又上疏曰臣前上疏論大行皇帝喪服乞令羣臣依典禮三年之制臣之愚見以為過山陵雖易朝服宜存其衰麻而服乗之飾止如今日至朞年而漸變之以至於祥禫然後全吉此非有所難行惟令有司考正之而已今已卒哭山陵有期喪服事重道之隆汚俗之厚薄繫焉不可不早裁定也國家承平百有餘年列聖欽明動循典禮人倫之正朝廷之治考之前世自三代以後未之有也惟是喪服猶依漢制遂使臣居君喪情禮至薄後世或謂本朝無一逹禮之士臣竊惜之且在禮臣子一也今君服於上臣除於下是有父子而未有君臣也天子者天下之共主也故其喪使天下共服之臣伏見朔望之禮羣臣朝服以造於先帝之殯宫是以吉服臨喪也而人主獨以衰服在上上下異禮是以先帝之服為人主之私喪也以吉服臨喪以先帝之服為人主之私喪此皆禮之不安者也臣前所言君服斯服者竊以為君臣當同服也伏惟祖宗以来此禮未改者盖喪事常出於倉猝而有司惟舉故事因襲而行無所損益焉今欲風天下以忠孝使民徳歸厚莫若先正此禮則衆庶曉然明於君臣之義矣夫居喪之禮衰麻本不可以去身然而朝廷之上異於私家故古者君臣居喪而行吉禮則釋衰而服冕既終禮則釋冕而服衰今人君素服以聽朝羣臣朝服以治事盖亦古之遺法也臣愚以為羣臣燕服亦宜為之制度以齊之吉禮則朝服與燕服皆吉凶禮則朝服與燕服皆凶居喪朝服所以從宜也而燕服有紅紫之飾則何以異於無服者乎聖人所以制服者使民見其服而哀不忘於心也必使之脫去朝服而猶以有喪者自處則人情不可得而忘矣朞年之内燕服宜純縞素至小祥而漸變之古者練衣黄裏縓縁此練之服也既小祥則燕服亦可以有色而服乗之飾漸加以縁可也書曰三載四海遏宻八音古者禮不下庶人惟遏宻三年所以為君服也詩曰溥天之下莫非王土率土之濵莫非王臣然則民亦臣也今附廟以後惟羣臣不舉樂而四海之内萬民得以作樂焉此所以不知戴君之重也臣愚以為宜禁民舉樂三年竊惟朝廷所以不循遏宻之制者盖不欲使天下之民三年不樂而為樂工者所在有之恐其失業故寜殺禮以便民也臣以為凡天下之為俗樂者率皆游民非良農也使之廢業三年乃所以教之使知為君之有服也彼不為樂必有他業以養其生未必至於困窮也今殺禮以姑息之是使人不知君臣之義也故臣以為禁之合於禮而無傷於俗足以厚天下之情夫為國家者以禮為急不可忽也伏望陛下幸察㫁之以禮而勿疑祖禹進故事曰永徽元年正月太宗女衡山公主應適長孫氏有司以為服既公除欲以今秋成昏于志寜上言漢文立制本為天下百姓公主服本斬衰縱使服隨例除豈可情隨例改請俟三年畢成昏帝從之臣祖禹曰書曰三載四海遏宻八音君喪三年自古以来未之有改也漢文率情變禮薄於喪紀始令吏民三日羣臣三十六日釋服雖欲自損以便人而不知使人入於非禮也自是以後民不知戴君之義而嗣君遂亦不為三年之服唐之人主無能謹於禮者故有公除而後昏亮隂而舉樂内無父子外無君臣而欲教化行禮俗成難矣夫君者父道也臣者子道也無君是無父也况人君而可以無父乎若君服於内臣除於外是有父子無君臣也為國家者必勅革漢文之薄制遵三代之隆禮教天下以方喪三年則衆著於君臣之義也元祐元年太常丞吕希純論司馬光薨乞罷紫宸殿稱賀上䟽曰臣謹按禮記檀弓衛有太史曰栁莊寝疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁荘也者非寡人之臣社稷之臣也聞之死請徃春秋書仲遂卒於垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹以此見古之人君聞大臣之喪雖宗廟之祭皆廢今来宰臣司馬光其薨適在明堂散齋日内嚴父配天國之大典固不可廢至於御樓肆赦恐亦難罷惟是紫宸殿受賀一節縁是慶賀之事比之宗廟之祭為輕方聖情軫悼元臣而羣臣拜舞稱慶恐於禮義人情未為宜稱所有今来禮畢紫宸立班伏乞聖慈特賜詳酌指揮二年崇政殿說書程頥上奏曰臣伏覩有司排偹開樂宴臣備員勸講職在經義輔導人主事有害義不敢不言夫居喪用喪禮除喪用吉禮因事而行乃常道也今若為開樂張宴則是特為一喜慶之事失禮義害人情無大於此雖曰故事祖宗亦不盡行或以故而罷或因事而行臣愚竊恐祖宗之意亦疑未安故也自古太平日乆則禮樂純備盖講求損益而漸至爾雖祖宗故事固有不可改有當隨事損益者若以為皆不可改則是昔所未遑今不復作前所未安後不得復正朝廷之事更無損益之理得為是乎況先朝羙事亦何嘗必行臣前日所言殿上講説是也故事未安則守而不改臣前言冬至受賀表是也臣前後累進狂言未嘗得䝉采用而言之不已者盖職之所當不敢曠廢伏望聖慈特賜聽納自中降㫖罷開樂宴直候因事而用於義為安歴代名臣奏議卷一百二十三
