body:
  text: 歷代名臣奏議卷九明楊士竒等撰聖學宋寧宗時衛涇上奏曰臣聞學之為王者事自昔帝王莫不以學為本然學有小大分章析句牽制文義此書生之學也究聖賢之用心明古今之大致識安危治亂之體察善惡消長之機斯為帝王之大學臣恭惟陛下聰明天縱不自矜伐即位之初首下明詔博延儒英增置講讀紬繹經史從容賜坐一日再御情亡厭倦可謂知所本矣邇者側聞玉音宣諭今後晚講各須講解義理引古證今庶不為文具若只讀過恐無益於事大哉王言臣有以見陛下識度髙逺精進不已知求多聞之有益於聖德也臣誠不佞抑聞之先哲學則必問問然後為學學者聖之先務問者學之大方孔子稱舜大知必曰好問仲虺戒成湯必曰好問則裕易乾之六爻龍德變化皆聖人也九二見龍在田孔子曰龍德而正中也亦由學以聚之問以辨之逮至九五飛龍在天則與天地合德日月並明問學之功其大矣哉儻若誦説雖勤而誠意不充見聞雖廣而躬行不力深恐猶為觀美而於王功帝績未知所用力之地也曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎它在乎加之意而已臣伏願陛下講學之際更留聖心咨詢考問以盡臣下之情反復研究以求理道之要磨礲漸漬日纍月積疏瀹其心源斟酌於義味自然德性成就知慮開明物來而能名事至而能應以之用人則邪佞者逺忠直者伸以之立政則蠧弊日銷績效日著何為而不成何求而不獲哉昔唐太宗平定四方有志治道選文學之士日侍間燕或論往古成敗或問民間事情言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則務遵勤儉言及閭閻疾苦則議息征徭惟其見善必從聞義必徙用能貞觀之治庶幾成康為功德兼隆之主此又尊所聞行所知之明驗也以陛下天資粹美進德無疆上焉唐虞三代要不難致下焉亦不失為唐太宗惟陛下留神幸甚袁説友上奏曰臣恭聞太宗皇帝謂李至曰朕年來無它好但喜讀書用監古成敗仁宗皇帝謂輔臣曰近講詩見國風多譏刺得以為監戒髙宗皇帝謂趙鼎曰朕居禁中自有日課早閲章奏午後讀春秋史記夜讀尚書又曰有帝王之學有士大夫之學朕在宫中無一日廢學但推前古治道有宜於今者要施行耳不必指摘章句以為文也大哉祖宗所以治天下國家者其必由於學乎誠本朝之家法啓佑乎後人者也臣仰惟皇帝陛下聰明睿智得於天資歷數在躬繼天作子踐阼之初恭默以執祖喪恪謹以隆父養倚信大臣收召人物崇廣言路敷求直言此皆陛下疇昔講學之功其見於初政者已足以慰人心而愜衆望然而自古聖王臨政願治身致太平未有一事不由於學況陛下御極之始尤當以講學為先自古聖主進德修業終身而行未嘗一日敢忘於學況陛下春秋方盛尤當以講學為急陛下之所謂講學者蓋將舉而措之以治天下國家者也本朝呂公著有言曰天子之學與凡庶不同夫分文析字聲律章句此世之儒者以希利祿取科級耳人主所不當學也人主所當學者觀古人之用心論歷代帝王所以興亡治亂之迹求立政立事之要講愛民利物之術公著之言實為人主講學之要今陛下方上承宗廟之付託下慰四海之觀瞻萬機得失之端一念趣向之本小有未至即基安危是故人主所謹端在一心正心之原實本於學蓋道者適治之路惟學然後道明以德行仁者王惟學然後德進審為政之理非學何以達理以義制事非學何以由義古今有興亡有成敗學然後知所以興亡成敗之本天下有利害有治亂學然後知所以利害治亂之因人主有講學之功則明道進德達理由義可以成可以興享其利享其治人主失講學之益則昧道暗德悖理違義至於亡至於敗受其害受其亂事之必然無可疑者陛下前日朱邸固已親近諸儒從容講論凡其開沃聖心培埴學本者可謂弗遺餘力則陛下於道德理義必已能洞達而知所原本矣於興亡成敗利害治亂必已能深究而知所畏慕矣陛下天縱聰明非凡所及講學之益為日固久然既承大寶天子之學事異初潛故臣轉以為講學之事陛下今當舉行者其説蓋有五焉一曰凡經筵講讀陛下或意有所未諭則詳為叩問必至洞徹深曉然後已與之反覆問難使之開導聖心知所鑒戒且不以它事而輟講亦不以拂意而倦聞若止循故事略無上下議論之益則雖積嵗纍月於陛下必無益也二曰經筵之例率以朝退入講陛下坐朝甫畢聖躬豈無少勞急幸經筵諸儒僅了講讀不暇紬繹辨論人主僅能訖事不暇叩問咨益講讀虗文莫此為甚願頒睿旨凡遇講日並候退朝供膳已畢然後入講下則從容敷繹以罄論議上則再三叩問以達未諭則講讀之官不徒設矣三曰竊聞經筵目即見講春秋通鑑三朝寶訓陛下方此臨阼委政大臣既無它事以擾聖抱要宜增益一二經書輪以進講尚書一經句句皆明治亂安危之本仁宗皇帝訓典事事皆為後世子孫之法願增此二書以全講學之力四曰講官內宿祖宗欲以召儒臣廣為咨問光武講論經理夜分乃寐意蓋出此願陛下遇講官宿直即賜宣對或以日間已講讀而意所未諭者再使詳解細説或陛下自以古昔治亂興亡叩問原本使之開沃啓導或陛下萬幾之務有疑二而未決者因以咨詢使之開陳獻納學念既專則學力日進矣五曰古先帝王自唐虞三代以下至於唐末正統之傳其君或善或否其治或得或失無慮百數陛下凡遇進講或講官宿直以古帝王時取一君命講官著論一篇凡其君之善與否其治之得與失詳為議論相繼進入陛下觀其所論善者為法惡者為戒集為一帙常置坐右或聖意有所未諭即於經筵或夕召之時再令元撰講官詳細開説不出數月古之帝王善否得失盡在陛下目中可以為法而為戒矣凡此五説皆所以為講學之地願陛下上法太宗仁宗髙宗聖訓講學之勤下稽吕公著所論聖學之要出而於經筵講讀之間入而於晝夜觀書之際不事虗文力求實學則聖心融徹聖學髙明聖德日新聖治日盛施諸政事無非有得而無失錯之事業無非有利而無害一毫之差陛下自不肯為一言之失陛下自不肯發事事中程度物物合條理以至親君子逺小人數見儒臣尊禮正論則中興之功太平之治誠可拱而俟也臣起自寒儒叨綴從列論思獻納職守所繫瞻望清光之初不敢進無益之論專以講學一事以獻陛下伏惟聖明以為當今急先之務最切最要莫大於此務深思而力行之昔傅説之告髙宗曰念終始典于學厥德修罔覺監于先王成憲其永無愆臣拳拳所奏惟陛下加念焉天下厚幸説友又奏曰臣恭聞髙宗皇帝諭宰臣趙鼎曰朕常居禁中有日課早閲章疏午後讀春秋史記夜讀尚書率以三鼓罷孝宗皇帝諭講官周操曰朕在宫中並無他用心只是看經史耳大哉皇祖之訓學有緝熙于光明所謂詒孫謀而燕翼子者蓋必由于學也仰惟陛下踐阼之初未遑它務首開經幄添置講員增益諸經早晚兩講不以崇髙富貴為樂而以盛德日新為念臣去嵗八月初二日面奏講學劄子陛下慨然垂聽出示講官越三日宣召微臣玉音諭以悉行所奏中外交賀咸仰陛下學念之篤根於至誠蓋二帝三王之用心求以上繼髙宗孝宗聖學之盛也臣竊惟陛下日御經筵固有定式惟是假日與退朝之際皆是清間之燕宫中庶務必不上關聖懷當此暇隙之時稍思日課之學如髙宗孝宗之訓定課式於禁中庶幾既有外朝講讀之勤又有內庭課學之益臣恭覩髙宗皇帝聖政孝宗皇帝聖政二書皆是兩朝七十年間大政事藏諸金匱不惟盛德大業醲化懿綱一一所當訓式而紀載明白事理較然觀閲之間易於著心而入耳固不待講解而後明也臣愚欲望陛下以髙宗孝宗宫中讀書定課為法而復以聖政之書專為宫中課程之學下祕書省繕寫兩朝聖政二書留置日所御殿日閲數條以為定式詳施置之美意法政事之修明熟味細觀再三紬繹積日纍月不渝定課則兩朝聖政之書盡畢觀覽良法美意皆在陛下胸中而見諸政治者將自吻合而無間矣此其事不勞其道易行而其效必至者也臣拳拳愛君願禆聖學惟陛下財幸中書舍人虞儔上奏曰臣聞帝王之學與經生學士不同夫分析章句窮究前聖之旨考論同異折衷諸儒之説此經生學士之學也若緝熙光明之用發之於一身仁義詩書之澤施之於四海此帝王之學也揚雄有言學之為王者事其已久矣堯舜禹湯文武汲汲其已久矣如曰學以聚之問以辨之寬以居之仁以行之則載之於大易之辭如曰王人求多聞時惟建事則見之於傅説之戒如曰尊其所聞則髙明矣行其所知則光大矣曽子蓋嘗言之董仲舒又從而申之矣且學聚問辨可以已矣然易必繼之以寬居仁行王人求多聞可以已矣然書必繼之以時惟建事者何哉正以帝王之學與經生學士不同始焉欲其發之於一身者有緝熙光明之用終焉欲其施之於四海者有仁義詩書之澤蓋不可得而已者也恭惟陛下有生知之性而不恃有天縱之能而不矜方且增置講官日侍經幄沍寒隆暑未嘗少倦雖堯舜禹湯文武汲汲不是過也凡帝王之宏規祖宗之成憲古今之安危治亂儒臣之獻納論思固已悉究淵源兼綜條貫至矣不可有以加矣臣惓惓之愚願陛下廣學問以寬仁即多聞而建事尊其所聞見之於躬行俾聖德日新愈極乎髙明行其所知措之於事業俾治功日進愈至乎光大則宗社幸甚生靈幸甚理宗紹定間徐元杰對策曰臣聞求道有本原行道有功用自本原而達之功用則天下之治可以不勞而舉矣蓋道無近功惟志趣之髙逺者為足以極其功道非小用惟力量之凝定者為足以大其用自有天地以來所以脈絡世教綱維人極於不泯不絶之地者皆非偶然之故也太極之理流行散見於萬類之殊常人得之由之而不知者也故必有待於超出乎億兆人之上者為之君師焉以一人之心融天地之心以天地之心覺天下之心帝之所以為帝王之所以為王同此心者亦同此道也同此學也亦同此功用也然則有帝王之心者斯能有志於帝王之道有帝王之學者亦豈不能進進於帝王之用哉共惟皇帝陛下英姿天挺聖學日新自臨御以來孜孜汲汲既知求此道之用以用其心則知推此心之用以用天下其間大震怒大拂亂所以嬰宵旰之懷關玉食之抱者殆非可以一二計也陛下端居凝邃加意講求所以壓萬變之紛紜鎮羣疑之洶湧隂以為天下國家之計者蓋陛下求道得力處也夫求道既有所得則夫堅始者之念以就來者之圖勉今日之誠以為後日之慮不以僅定為無恐不以茍安為自足凡堯舜三代之所以根柢乎盛治者是政陛下行道用力處也因其力之有所得充其力之有所用天地之眷厚矣所以答天地之眷者當何如祖宗之託重矣所以奉祖宗之託者當奚若丕緒之承今九年矣所以充拓事業者當何修而至陛下誠能因其力之有所得充其力之有所用自身而家所以正人倫而係風化者不可不謹其表倡之機自家而國所以别賢否而定名義者不可不致其微漸之慮自國而天下所以謹修攘而全愛敬者不可不極其勉勵之誠其效證於堯舜三代之所已行其監具於秦漢以下之所並見其事信於經訓史册之所可考陛下誠於本原之地而極其神不徒以日誦日講者為常準則學之為王者事宜在陛下方寸間耳臣又何敢容其喙請以所聞於師者拜手稽首以復陛下之問惟陛下少垂聽焉臣昧死上愚對臣伏讀聖策曰蓋聞學之為王者事繇堯舜三代至于今日未之有改也而或以為古今有殊時帝王有異治世道有升降各因其時以為治而無一定之論吁有是哉臣有以見陛下有志於帝王道統之傳而為昧者發道與時異之嘆也臣聞道與心一帝王之心與萬世一堯之授舜舜之授禹三聖授受相傳一道載之於書人心道心之分惟危惟微之辨或生於形氣之私或原於性命之正惟其形氣之並生雖上智不能無人心惟其性命之各正雖下愚不能無道心故人心每患於難制而道心每患於難明難制故危而安之者常寡難明故微而知之者幾希惟精則決擇詳審而致知之功深惟一則主宰堅定而力行之用久是以一中之執萬世惟允成湯傳之為昭德建中文武傳之為順則立極帝王之治所以蒸為雍熙薰為泰和而無一民一物之不得其所者皆此道之功用也夫以功用之散於天下者若是其明著而根本之斂於一心者猶不敢廢夫講貫之忱故堯舜禹湯文武之所以號為汲汲於學者果為何事也豈非以惟微數語肇啓其端故心法之傳異世同軌成湯之禮制文武之克宅莫不皆致力於本原之地雖其時之相去若有不同而道之相傳未嘗不一自世之昧者觀之泥於迹而不求於心索於治而不求於道舜文一也或疑其勞逸之殊而不揆其符節之合商周一也或疑其文質之異而不通夫損益之因善乎董仲舒之言曰繼治世者其道同繼亂世者其道異蓋其所以異者世之治亂而已所謂道則未嘗不同焉故韓愈亦曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武即仲舒之所謂繼求韓愈之所謂傳則六七君子之心越宇宙而同神歷千載而一日又孰謂其世有升降而因時為治果無一定之論乎然則能知帝王之無異心則知帝王之無異道知帝王之無異道則知帝王之無異效矣臣伏讀聖策曰夫統理民物為天下君膺天地之眷顧蒙祖宗之付託若是其重而本原之地無所據依以善斯世不可也是以堯舜之帝禹湯文武之王莫不從事於學如飢之必食渴之必飲未嘗外道以出治舍經以求治也臣有以見陛下以天地祖宗之寄為不可忽以堯舜三王之道為必可行而欲講學以求道即道以求治而又知所用力之地也臣聞帝王之心與天地一祖宗之心與帝王一帝王代天地以裁成其化者也祖宗法帝王以會通其用者也故求帝王之治者當求帝王之道求帝王之道者當求帝王之心心法明則道法著矣道法立則治法舉矣世去古逺正學不傳生民不見帝王之澤至治之主蓋不世出而天地之生聖人乃間見於千載之後藝祖皇帝肇造區夏撥亂立極讀書而歎後世刑網之密蓋有以契夫天地生育之心矣仁宗皇帝紹休聖緒繼體守成講易而得六情六氣之説蓋有以契夫天地動靜之心矣夫以祖宗講明學問稽式帝王既無一而不契於天地之心則夫兩間之所以眷祐於國家而遺陛下以無疆之休者要非人力之所幸致也陛下講學所以朝夕不倦寒暑不輟而必欲與帝王之心同一運量者蓋欲以慰祖宗之託而答天地之眷焉爾故觀乎天地則見帝王矣觀乎帝王則見祖宗矣何則天地付陛下以此位者也帝王同陛下以此道者也祖宗傳陛下以此心者也心得其正則此道為有宗道得其正則此位為無沗位正而道益可行道正而心益可制動息造次常以天下為憂安舒暇豫略不以有位為樂夫如是也真知夫天地之所付者至大而不敢以自小矣真知夫帝王之所同者至公而不敢以自私矣真知夫祖宗之所傳者至重而不敢以自輕矣自是而充之以學力所到日益月新心術所存天寬地大舉一世之人濟濟於雍熙泰和之域渾渾乎如四時之春而不見有炎風朔雪之慘者皆此心之推也惟陛下益反諸心而用力焉則功用豈有難致者哉臣伏讀聖策曰朕以眇陋嗣承丕緒于今九年昧旦而朝咨諏輔弼延納英雋日御經筵日誦日講咸有常準臣有以見陛下統臨于上愈尊而愈謙問學之勤愈久而愈不替也臣聞帝王之學厥有本原惟謹養乎心術之微不徒為誦説之務惟深探夫造端之自不徒為外飾之求宫庭深邃燕佚易生聲色滿前志念易汨四海九州之大非空言所能維持一日萬幾之繁非小智所能經理然所以維持而經理之者其本會於聖心運量之中其用形於聖學貫通之後則是心不可以不盡學力不可以不充也久矣故有一念之縱肆則不足以充此學有一息之間斷則不足以充此學外庭固學矣內庭其可息乎經筵固學矣退處其可懈乎端人正士固與學矣便嬖使令其可與褻乎陛下有志於帝王之事固出於聖心之實然抑帝王所以兢兢業業警戒無虞孳孳汲汲悠久不息者得非陛下之所當深勉而不徒為言語誦説之末而已者乎陛下即位固九年矣然外而強土之未清內而姦宄之未靖陛下而念及此得不以周之克商九年大勳未集而勉其憂勤乎陛下每朝固咨輔弼延英雋矣然內而邪正之未明外而貪亷之未判陛下而念及此得不以舜之三考黜陟庶績咸熙而為幾康之戒乎不然以可致之資而不能致以可為之時而不能為以可豫備之嵗月而自惰於不備不虞之域若是而曰講誦有常臣甚不知陛下講誦之謂矣陛下茍能以帝王之心為心則必深求帝王用力之要凡六經所載得之於經筵之所誦講者誠非徒以講誦為也口以誦之必反心而載惟學以講之必聞義而力徙故於至善之所當止則必如好好色使之眼明心恱可也於不善之所當改則必如惡惡臭使之影滅迹絶可也學有如是則本原正矣本原既正則自身而家自家而國自國而天下無一政之不立無一事之不舉功用之著其可以限量既耶臣伏讀聖策曰六經之道所以該貫天人維持世變者至纎至悉不可勝窮而通鑑一書又所以著歷代之媺惡以勸戒于後者莫先於修身而齊家進君子而退小人嚴名分而遏亂萌修政事而攘夷狄恤民隱而懼天變臣有以見陛下會經訓之精粗明史册之勸戒而欲用力於君德治道之大者也夫經所以載道也史所以緯經也人主之學所以講經與史者蓋欲為修身齊家治國平天下之用者也臣嘗以是觀之六經皆所以言天人而至於該貫其道則莫詳於易與春秋之為書六經皆所以維持世變而所謂至纎至悉則莫大於易與春秋之為用易者六藝之原也卦有隂陽固所以明天道也而吉凶悔吝未始不以人言之則易之所以維持世變者宜乎極其所謂變通鼓舞之道而不可以致詰也春秋者史記之約也義有褒貶固所以明人道也而災異所書未嘗不以天言之則春秋之所以維持世變者宜乎定天下之邪正而亂臣賊子皆凛乎其知懼也即易與春秋之旨而槩之六經之道則維持世變至纎至悉而不可勝窮自修身齊家至於恤民隱而懼天變者皆可以類推矣雖然此經之所以載道者然也至於史之所以緯夫經者則自周之衰以訖五代之季其間安危理亂之分成敗興亡之故上下數千年間皆若燭照龜卜而不可掩然以善論世變者觀之漢大綱僅正而萬目則未甚舉唐萬目舉而大綱又不能正則其所以正人倫而係風俗别賢否而定名義謹修攘而全愛敬大槩不可以帝王之功用並言者要亦有由矣是烏可不為本原之論哉空谷而足音晦冥而日月絶無僅有之中而求其粗合於古帝王之道惟文帝一人而已昔孝宗皇帝與大臣論古今治亂因曰自漢唐以來人君惟漢文帝粗能知道自文帝之外人君非惟不知道亦不知學大哉王言深於考論夫後世人主之為學者乎試即文帝之粗知道者觀之雖其禮文之事猶或多缺然刺取六經蓋亦髣佛於王者之意故當時之治藹然猶有王者氣象非粗知道者其孰能之自其躬玄默麗道準仁而修身之道粗明所幸夫人衣不曵地而齊家之道粗立張武受賂益愧其心吳王不朝賜以几杖而治國之道又粗審以至棄細過而絶戎隙成軍禮以張國勢務休息而專德化警災異而求直言凡可以為平天下之道者亦粗於此而加之意然則文帝之所以為漢德之盛者豈非粗知道之效歟夫惟文帝粗知六經之道既足以致後元之治後世考論文帝之史則當勸其所以為文帝者而戒其所以不如文帝者當勸夫文帝之可以到帝王者而戒夫文帝之終於未到帝王者則治道功用又豈容外吾心而求之乎臣願陛下反求此心加意力行以可到帝王者自勉以未到帝王者自勵此則在於用力不用力耳烏患其有難行者哉臣伏讀聖策曰朕深惟經訓史策日陳於前文學繁多途轍迂闊求其所以置力者乃即燕間竊有慕古人緝熙光明之義日就月將躬履神會蓋以基治道之本一人心之歸使普天率土若士與民悉共由於理義而無本末舛逆之患上下異嚮之風顧不韙歟臣有以見陛下加意於緝熙之誠用力於本原之地而欲推而達之於治道功用之大也夫經之與史雖文字之繁而關於君德治道者則未嘗無綱領之要夫緝熙光明日就月將此詩人之所述而成王用力為學之實也至於曰躬履曰神會此則陛下心術純明義理融貫能以詩人之所述者究心而又以成王之所學者用力也蓋躬之所履皆力行之事神之所會皆致知之功行無不力則緝熙矣知無不致則光明矣以陛下之躬履神會求成王之緝熙光明而又形諸心畫發諸聖製布堯言於天下斷斷然以為自天子至於庶人一是皆以修身為本而知夫學之有益於人國矣舉天下之大家傳人誦皆灼灼然知陛下緝熙光明之懿殆與成王不可以異觀矣抑成王之所以謹養其心以為講學之本也陛下亦嘗實用其力乎臣考諸詩曰敬之敬之天維顯思命不易哉羣臣告成王以用力之大者也而諄勤懇切之意又必繼之以無曰髙髙在上陟降厥士日監在兹蓋欲其知天之監無往而不在無時而不然而敬之為敬無一動之或違無一息之可弛也成王於此灼知用力之要謙虗挹損形之於言曰惟豫小子不聰敬止必加之以日就月將之誠懋之以緝熙光明之益積而至於萬億年天休之敬以是而論則知緝熙光明乃為學之要而敬之敬之又緝熙光明之要也今陛下既即燕間慨慕於古其事非不偉也至於古之所以謹處燕間無微而不敬者兹又陛下切身之事而治道之所由以基人心之所由以一義理之所由以充廣者也蓋敬者主一無適之謂徹上徹下之道陛下與成王所謂緝熙光明之實而二帝三王所以傳授心法之準的也故必紬繹心思續續不已充廣心地恢恢有餘而後可以言緝熙清明一有紛汨志慮一有間斷氣象一有褊狹則不足謂之緝熙矣而可以為敬乎必明善誠身動與理覺盡心知性靜與理融而後可以言光明物欲少有障蔽血氣小有昏蒙智識小有凝滯則不足謂之光明矣又可以為敬乎陛下之所謂躬履蓋履此敬也陛下之所謂神會蓋會此敬也以是而基治道使天下國家之治如堯舜三代之盛可也否則規摹弗立玩愒小康本末之不能無舛逆者皆治世之纍也以是而一人心必使逺近風俗之化如堯舜三代之美可也否則儀刑弗謹觀聽莫新上下不能不異其向者皆風俗之弊也陛下能反求此心常守此敬內主乎一而不病乎雜外無所適而不徇乎私本正而末自隨上倡而下必應隂消其舛逆之患潛格其異向之風則其感動意思殆與七十子之服孔子者同一機栝也臣願陛下以真敬存心則躬履神會自不能掩其功用之著由是而充之則以成王之學造帝王之道惟陛下加之意而已聖策又曰若夫商政治之得失求民俗之利病論士習之厚薄則有所未暇蓋以本原既正則它可以序舉也臣切謂陛下之言及此豈非天下之幸而天地祖宗之望陛下者乎蓋政治之得失每係於君道轉移之間民俗之利病實關於君政修廢之頃士習之厚薄亦視夫君心之好尚者如何陛下不屑屑於三者之計必諄諄於本原之正者豈非以用力於本原者既善則三者之效特舉而措之耳故中庸論為天下國家有九經而曰所以行之者一大學言齊家治國平天下之道亦以修身在正心者為之本陛下講明於此蓋亦熟矣繼今而後極致知之善盡力行之誠因全體之明求大用之著必剛以制欲必勇以力行必恭儉以約已必淵靜以養心如是則本原既正三者之序斷斷乎其可舉不然外有講學之文內無講學之實諉本原之論以蓋其事體之失假修飭之具以掩其修省之愆戒酒有針而無益於制心緝熙有記而無益於進德若是而曰政治之未暇問民俗之未暇問士習之未暇問是自置天下國家於聖度之外又安足以為本原之論哉昔孝宗皇帝聖訓有曰朕心未嘗放下一日間天下定行一遭孝宗之所以經營於念慮者若是其詳且悉曽謂其以本原之是正而一切付天下之事於未暇問乎聖謨洋洋載在國史皆陛下之所當體而行之者也臣願陛下益反之心曲加其真實無偽之力廣推於外旁達其運量不窮之妙則本原在於聖心矣凡陛下策臣以經史之所當講者皆可以序而舉况於是三者之務哉聖策之所以幸教臣者亦已至矣而陛下謙沖溫粹猶終之曰子大夫奉對于廷其以有得於經史者紬繹而畢陳之朕將親覽臣仰見陛下咨訪不倦嘉與草茅之賤求本原之纎悉非徒為是諏採之文具也臣竊聞六經之書致治之成法也史之為史亞乎六經者也夫致治成法既皆具於經而史又亞乎經之道則凡天下國家之治非徒本原之是正而已至於纎悉莭目所以救習俗之失防人心之微者經之與史蓋相貫通而互發明也陛下既俾臣等紬繹而畢陳之臣不能罄竭膚淺之萬一以為陛下告不惟下負所學抑亦上負陛下之諄誨矣然臣之所尤拳拳於陛下而不能自已於納忠者其説蓋有三焉一曰固民心二曰肅軍心三曰正士大夫之心蓋民者國之命脈也兵者國之精神也士大夫者又國之醫師砭劑也為人上者當使命脈堅強精神運動常致謹夫醫師砭劑之用以為元氣調養之方則立國之勢自隱然有安靖和平之功用矣臣請竭其愚而終言之書曰民惟邦本本固邦寧怨豈在明不見是圖此言民不可以不固怨不可以不弭也今之所以固民者何如耶田閭困於科率市井困於征求商賈困於抽斂富家大室困於奄沒之刑疊是數困猶未已焉逺近怨咨不可聞也乖戾之氣上熏於天激而為江閩之盜滋而為輔近之姦漲而為都會之災溢而為邊陲之警延而為數千里之旱岌岌殆哉國家命脈一縷千鈞深可慮也昔光武中興鄧禹勸之以立髙祖之業救萬民之命先朝范鎮亦曰欲備契丹莫若寬天下之民此皆所以為命脈計也陛下亟圖之則其證猶可起也否則非臣之所敢知矣書曰其克詰爾戎兵以陟禹之迹至于海表罔有不服此言衛國以兵詰之者有其道則服之者有其機也今之為兵者何如耶自核實之不加而兵益以冗自訓練之不精而兵益以惰自豢養之不戒而兵益以脆自等級之不嚴而兵益以驕自刻剝縱弛之相蒙而兵又流於叛且潰矣夫國家竭民之力以養兵蓋資之以衛吾國也今乃不冗則惰不惰則脆不脆則驕不驕則叛不叛則潰習於縱敵而不習於死敵利於為寇而不利於禦寇敢於犯上而不敢於衛上於是士卒得以陵偏禆偏禆得以陵主帥閩南之紛亂方爾而繼之以江右之陸梁西蜀之驚蕩方傳而因之以淮東之奔迸姑息養禍浸以成風蔓草難圖憂未歇也昔晉文公城濮之戰見其師少長有禮而知其可用藝祖皇帝始用軍法使以階級相承小有違犯咸伏鈇鑕是以上下有序無征不服此皆所以為精神計也陛下其亟圖之則其患猶可弭也否則非人臣之所敢言矣夫固國以民衛國以兵二者命脈之所關精神之所係一日不可忽焉者也然所以護養其民調伏其兵者惟有士大夫以為醫砭爾夫聖人養賢以及萬民而命將遣率以守衛中國者亦以重戍役車徒之責今之為士大夫者臣又不知其果何如耶陛下以培固邦本為心而監司守令則行之以朘削膏血之政陛下以運動國勢為心而曰將曰帥則乘之以消沮士卒之私陛下以興利除害信賞必罰為心而內外大小之臣則應之以虛誕茍且偷安旦暮之計是無怪乎上之真德實意不能宣達於其下下之吞聲隱氣不能通達於其上上下隔絶於勢分之交違則夫民怨而思亂兵怨而思叛亦其理之所必至也昔漢宣帝欲安渤海之警得一龔遂單車至府宣布教令慰安牧養盜為之悉平而民不患其不安者以得人而安之也唐馬燧之在河東馭馬厮役教以騎射比及二年得精兵二萬而兵不患其不強者以得人而制之也是以國朝開基之初藩侯不撫百姓則有斷不容之之戒至於南征北伐戰勝攻取兵不過二十萬者亦惟以曹彬潘美為將耳此其於國家砭劑之用明效大驗彰彰然足以為後人嘉賴維持之地蓋漢唐之美獨盛於一代者也今陛下所慕者帝王之道所鑒者漢唐之言所取者祖宗貽謀之善則其所謂一軍民之心者要莫先於正士大夫之心而其所以正士大夫之心者又不過先正陛下之心而已董仲舒有言曰人君正心以正朝廷正朝廷以正百官正百官以正萬民極而至於四方逺近之一於正此又自本原而達之功用古今不易之至論也惟陛下於此而實用力焉則天下幸甚宗社幸甚元杰又奏曰臣聞論語書成於有子曽子之門人故二子獨得以子稱其所載先聖與羣弟子之言至為不茍言者心之聲也學問之道無它求其放心而已求於心者合下必自源頭理會魯論言出心字只有三處然句句字字無往而非求心臣嘗日夜反覆求孔門所以問答之根據不但稍可以知聖人心法之傳至於古帝王相傳為學切要處亦因是可以推尋蓋求道莫切於求心求心莫切於求仁仁為心之全德故曰仁人心也合而言之道也言道無越於魯論故曰五經之管轄六藝之喉襟伊川程頥嘗曰讀論語有讀了全然無事者有讀了後其中得一兩句喜者有讀了後知好之者有讀了後直有不知手之舞之足之蹈之者臣末學空踈不足進此敢謂百生慶幸濫員經筵蒙恩宣諭俾專説是書仰裨清燕臣感泣遭遇願瀝粗淺請倣先儒之言發明求心之旨以助聖學端本行仁之萬一庶幾正心以正朝廷使百官萬民四方逺近莫不一於正人皆有士君子之行不徒以言語視論語臣不勝惓惓淳祐十二年著作郎牟子才兼崇政殿説書經筵供職入奏苐一劄曰臣孤逺之蹤往以狂愚觸忤權貴退伏山林凡五寒暑屢稽嚴召罪不容誅陛下簡記不忘洊頒除命月正元日擢長著庭曽未兼旬又叨親擢以經入侍此儒生之至榮也顧臣謭薄其何以當傴僂循墻辭不獲命則念曩者爭之於議論之末而無所及不若從容燕間隨事啓沃庶幾小補是以冒昧效職昔程頥為説書嘗以君臣道合靡不由至誠感通為言今臣入覲之初不敢它有援引惟積其誠意專以正心一説為陛下言之惟陛下裁幸臣觀自古聖帝明王未嘗無待於學然帝王之學異於儒生不在於專記誦治章句工詞章以為美而在乎講明義理務治其心而已蓋人主之一心所以統紀三極而酬酢萬化也人主之心正則天下之事無一而不出於正人主之心不正則天下之事無一而不出於邪形端而影直源澄而流清其理有必然者故典學之君未嘗不以正心為急務而勸學之臣未嘗不以格心為至論也陛下即位以來無一日不親近儒生無一日不講明義理自昔好學之君未之有加焉其於治心之學亦既用其力矣然心之為物最難治也有所貪欲而弗能窒則不得其正有所忿怒而弗能忍則不得其正有所汨撓而弗能定則不得其正有所矯飾而弗能純則不得其正而其所以然者蓋有所謂理欲之限有所謂義利之則有所謂是非之岐有所謂好惡之端陛下亦嘗靜慮澄神而深考密察之乎夫理與欲敬肆而已義與利公私而已是與非邪正而已好與惡善惡而已雖其本末先後賔主內外截然甚嚴然所謂敬者常難持而肆者常易萌公者常難充而私者常易勝正者常難明而邪者常易惑善者常難保而惡者常易溺為人主者偏焉而不自克蔽焉而不加察往往兆於方寸之間而發於言動者為甚戾差之毫釐之頃而捷出於事為者為莫遏萌之於宫庭隱奧之內而形於四方萬里之逺者為不可掩故始於敬肆之分而終以欲勝理始於公私之判而終以利掩義始於邪正善惡之不明而終也是非好惡之失其實極而至於意玩而流情稔以肆而營繕宴遊之事或有之矣亷耻道喪隂濁流行而苞苴賄賂之事或有之矣賢否貿亂穹壤易位而指鹿為馬之事或有之矣生於其心害於其政其端甚微而其禍甚大可不懼哉亦在乎辨而察之耳臣願陛下思堯舜惟危惟微之旨以致其理欲之辨果天理耶則極而明之使無一壅閼果人欲耶則克而去之使無少凝滯如此則義理足以變化其氣質之偏而物欲不足以掩其德性之善按之以為修身之本夫孰有放肆之失又願陛下思成湯不邇不殖之戒以致其義利之辨果為義耶則推之崇之使益以嚴明果為利耶則懲而絶之使無復滋蔓如是則舉動足以昭明乎事物之表而情愛不足以牽紊乎體統之正按之以為制事之本夫孰有膠擾之私至於是非好惡之當明則臣亦願陛下以孟氏知言之要辨詖淫離遁之詞逆之於未有言之先而知其心之所欲萌察之於既有言之後以知其心之所由在則邪正瞭然如權衡尺度之不可移矣以大學好惡察親愛敬畏之辟去惡必實用其力而禁止其自欺好惡必公用其心而不溺於私愛則善惡昭然如好色臭惡之不可亂按之以為聽言用人之本又安有混殽變亂之患此豈非一正心之功用哉臣故曰在乎辨察之耳惟陛下繼自今益加聖心格物致知以求其故審思明辨以察其似去讒逺色賤貨貴德以審其輕重之分敬以持之使緝熙而無間純以一之使悠久而不變則表裏昭融原本端一統紀明治界限嚴肅天下無餘事矣不然一念慮之間而理欲義利之角立一意向之內而是非好惡之雜出乍前乍却乍晦乍明如浮雲在空悠悠揚揚以為滓穢臣懼非所以光聖德而隆治化也夫責難於君謂之恭陳善閉邪謂之敬臣實不敢以庸常之意望陛下惟陛下念之子才又奏曰臣猥以空踈充員夕説誠意未至啓迪蔑如比方徹講疏恩兹又執經啓席適當陽長之候敢後忠告之言臣嘗讀易至復卦私竊妄論以為有天心之復有人心之復一陽生於積隂之下而芽蘖發動者天心初復之端也方隂陽動靜之未分也無思無為寂然不動天地生物之心幾於熄滅當是時也誰得而形容之及至震陽之來動於坤下因其一動而天下皆知其將為生物之端倪向者天地寂然不可形容之心方得窺見其萬一故程頥曰陽復於下乃天地生物之心也先儒皆以靜為見天地之心是不知動之端乃天地之心非知道者孰能識之楊時亦曰復也者陽始生動之端也知復之道則天地之心可以默識非盡心知性者孰能見之此所謂天地之復也方其喜怒哀樂之未發也渾然一中無所偏倚赤子純一之心幾若隱晦當是時也誰能推而明之及至感而遂通隨事著見因其已發而天下皆知其為體用之動靜而向者大本達道泯然不可推究之心至是方得窺其朕兆故張載以為靜而動天則無念無為無所主宰常然如此人之德性亦與此合蓋進德之基也朱熹亦曰天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也此所謂人心之復也使天地之心當純坤十月之時消而不長往而不來出而不入衰而不盛亡而不存或有所隔塞或有所擾亂則藝不生荔不挺糜角不解水泉不動而天地之復幾於熄非隂疑於陽陽戰於隂變而為閉藏者乎使吾之一心當情欲已動之時喜或過喜怒或過怒哀或過哀樂或過樂或有所偏倚或有所乖戾則三辰失行山川崩竭不止於天地不位兵亂凶荒胎殰卵殈不止於萬物不育而吾身之復幾於熄非不中不和極其所致則變而為災異者乎故隂陽之未定聖人則扶其陽於萌芽發達之初抑其隂於氣勢窮極之後使隂陽順動造化流行天地之復浸以剛大無一壅遏而有以成其天地不及之功喜怒之未定聖人則致其戒於不睹不聞之地謹其幾於隱微幽獨之際使喜怒和平血氣循軌一身之復充滿周全無一差謬而有以全其天地至純之德夫如是則未定之隂陽天地既無極而不反之氣未定之喜怒人君亦豈有久而不平之心何以言之復之為義在天地間則為隂陽在人心則為善惡有不善未嘗不知知之未嘗復行不善即隂也善即陽也上五隂下一陽即沈迷蔽錮之時也一日忽然省覺即陽機發達之始也齊宣王興甲兵危士臣召怨於諸侯可謂極矣及其不忍觳􅑌即見善端之萌漢武帝窮兵黷武好神仙崇土木可謂極矣及其輪臺一悔即見善端之復觀乎此則一陽之復非陛下進德之大機栝乎臣請極言復卦六爻之義以為聖德之助且初九以陽爻處復卦之初失之未逺者也一陽居衆隂之始復而不逺者也在易為最貴是復之主也人性至善人心至良本自無過欲起念動其過始萌瞬息之間忽千萬里豈止於悔先儒以為失而後有復不失則何復之有惟失之不逺而復則不至於悔大善而吉至哉言乎此正不逺復之微旨也陛下對此陽剛深惟其義茍能曲致戒謹凡前日喜怒未定之時稍有過差即當隨事覺悟毋使其已形之惡積而不散激而為災咎變亂則積復於善不祇於悔大善而吉之道也所謂不逺而復也顧不足為聖德之助乎六二雖隂爻處中正而切比於初在上無應以分其從陽之意能下仁也復之休美者也復者復於禮也復禮則為仁仁者天下之公善之本也初復於仁二能親而下之是以有克已復禮之仁而下之也以其有不逺復之仁而下之也非植黨締交也非比周為私也則是因人之善而復已之善也因人之仁而復已之仁也豈不為復之休乎陛下對此陽剛深惟其義茍能事事致曲不以切比於初為非不以志從於陽為非不以中正親仁為非則休復之吉不特歸美於六二之臣雖六五之君亦有謹恭下士柔順助陽之實矣顧不為聖德之助乎六三以隂居陽不中不正而又處動之極其守則固故屢失屢復不安於復夫操存舍亡蓋俯仰之間耳喜怒哀樂之失既已流宕困而後學悔而後變者以此涉世其危滋甚故曰厲然復而頻雖晚矣不猶愈於迷而不復者乎陛下對此陽剛深惟其義凡二十九年之中心之所存雖不能無過然亦未嘗不悔躬之所履雖不能無失然亦未嘗不復既復既失復悔不知幾失幾悔矣悔誤紛紛久而未定是以聖德未能光新以頻復之厲耳繼自今勿以危厲無咎而遂其過勿以躁動之危而玩其過勿以陷於衆隂之中而愈滋其過則無咎之義不獨六三之臣擅其善陛下亦得善補過之義矣顧不為聖德之助乎六四近君之位也六居外體之下而曰中行者卦一陽五隂自二至上則四為中六四居上下四隂爻之中履得中正下從初九正應之陽獨得所復也人之本心未嘗不善積習所移遂陷於惡有能超然自拔於羣邪之中以從陽剛之君子而不為所陷是得中行為獨復其本心也其真知所擇而從道哉不言吉凶者以柔居羣隂之間而初陽甚微未足以有為故聖人但稱其獨復陛下對此陽剛深惟其義當是非無定見好惡無定守從欲而流從邪而陷從習氣而不反之時察羣隂之盛而勉其中行獨復之心忿一陽之微而扶其終不克濟之志則剛復而長動而順行出入無疾朋來無咎而陽不孤矣顧不為聖德之助乎六五以中順之德處君位能篤厚夫復是厚而篤用力於仁者也然極乎髙明者有髙視四海之心詳於致察者有輕視羣臣之意物欲深者天機必淺心量狹者所守易搖其於善道雖得必失雖明必昏不若靜重而專慤者之可保此六五敦復之所以無悔也然陽復方微之時以柔居尊下復無助未能至亨者也能無悔而已易中陽長之卦凡在上遇隂柔之主則未嘗不附而順之故於臨泰之五皆吉而復與大壯之五皆無悔此聖人為君子之心也陛下對此陽剛深惟其義凡世之所謂秉陽德之剛者勿逆其進勿遏其長過焉容而貰之不及焉扶而矜之去其所謂意必固我之私成其所謂中順篤厚之實則君子有所恃小人不敢肆矣顧不為聖德之助乎上六以隂柔居復之終偃然在上最逺於陽迷而不反者也君道過亢迷與妄行故有眚災天災自外而來已過由已而作用之行師則終有敗及其國君陷於凶祻雖至十年之久亦不克從蓋陽雖微而漸長隂雖甚而向消將消之運不能敵方長之勢故終無獲吉之理陛下對此陽剛深惟其義乃舉事之不合乎理不順乎天而為陽德之害者去其迷而使之不至於迷反其極而使之不至於極懲其妄而使之不至於妄矯其偏而使之不至於偏無輕喜焉以泄陽德之微無輕怒焉以滋隂濁之欲陛下之心本無喜怒也陛下以天下之喜為喜以天下之怒為怒如堯之明俊德喜在俊德堯何與焉舜之誅四凶怒在四凶舜何與焉夫如是則陽盛而長隂衰而消凶變而為吉災變而為祥敗必至於成害必至於利利害之機無出於此顧不為聖德之助乎夫陽在天地間至實而不虛也至美而不惡也至大而不小也然至實為天理至虛為人欲而天理人欲常相對也至美為君子至惡為小人而君子小人常相勝也至大為王道至小為伯圖而王道伯圖常相奪也有天下安可不致其别而謹其所擇耶故知天理之為貴則處心積慮必以純一立政造事必以陽明而人欲之私不以陷吾𠂻也知君子之為美則尊崇有德必開誠心信用仁賢必布公道而小人之惡不可進也知王道之為大則修義明道必不計功理財正辭必不謀利而伯圖之狹非所用也陛下在位久閲天下之理多而又將之以緝熙之學其於復之一卦固已曉然洞究其旨矣而區區小臣猶敢矜螢爝於日月之下效涓埃於川嶽之前者顧以陽剛方長陽德浸亨臣雖至愚極陋其敢它有論建以悖天德是用當陽復之初專以復卦終始之義自靖自獻以效芹曝之私惟陛下赦其狂愚理宗時牟濴進故事曰昔程皓上神宗劄子以為君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心忱意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必可法不為後世駁雜之政所牽滯不為流俗因循之論所遷惑信道極於篤自知極於明任賢勿二去邪勿疑必期致世如三代之隆而後已也臣聞學之為王者事其已久矣堯舜禹湯文武汲汲夫以堯舜禹湯文武之治天下無它道焉汲汲於學而已有堯舜禹湯文武之資學堯舜禹湯文武之學而治不唐虞三代臣未之信也恭惟皇帝陛下睿哲由於天稟聖學得之心傳嗣服之初日以講學為急真古帝王之用心也然臣竊以為君道莫先於講學講學莫先於立志蓋人主一心攻之者衆志不先定則中無所主而外物或得以轉移之蔽欺之言入則是非有不得其正私比之言入則喜怒有不得其正功利之言入則取與有不得其正便佞之言入則好惡有不得其正此學之大戒也故程皓拜疏神宗皇帝首以定君志為講學之要皓伊洛大儒也世號之曰明道先生此真帝王之格言也臣願陛下思先皇付託之重覽程皓進諫之疏若稽古訓堅凝初志使此心清明終始如一日延見羣臣虛心下問以考政事之得失觀羣臣之志趣謂天維顯思命不易哉者正論也謂天命不足畏者邪説也謂憲章法度所當遵守者正論也謂祖宗不足法者邪説也謂君子小人不可並立者正論也謂兼容而兩用之者邪説也謂每旦視朝虛心訪問者正論也謂尊嚴淵默使人不可窺測者邪説也謂民罔常懷懷于有仁者正論也謂峻法立威使民不敢慢易者邪説也謂敵國外患當急於內修者正論也謂敵無能為者邪説也謂損上益下莭用愛人者正論也謂恭儉無足取者邪説也陛下試以是為察言觀人之鑒而邪正之辨判如黑白矣今臣以非才誤叨勸講大懼無以仰禆聖聰用敢推廣程皓之説為陛下告惟陛下垂聽户部尚書真德秀上奏曰臣聞聖人之道有體有用本之一身者體也達之天下者用也堯舜三王之為治六經語孟之為教不出乎此而大學一書由體而用本末先後尤明且備故先儒謂於今得見古人為學次第者獨賴此篇之存而論孟次之蓋其所謂格物致知誠意正心修身者體也其所謂齊家治國平天下者用也人主之學必以此為據依然後體用之全可以默識矣恭惟陛下有髙宗之遜志時敏有成王之緝熙光明即位以來無一日不親近儒生無一日不講劘道義自昔好學之君未有加焉者也臣昨值龍飛之初獲預講讀之末嘗欲用大學之條目附之以經史纂集為書以備清燕之覽匆匆去國志弗之遂而臣區區愛君憂國之念雖在畎畝未嘗少忘間居無事則取前所欲為而未遂者朝夕編摩名之曰大學衍義首之以帝王為治之序者見堯舜禹湯文武之為治莫不自身心始也次之以帝王為學之本者見堯舜禹湯文武之為學亦莫不自身心始也此所謂綱也首之以明道術辨人才審治體察民情者格物致知之要也次之以崇敬畏戒逸欲者誠意正心之要也又次之謹言動正威儀者修身之要也又次之以重妃匹嚴內治定國本教戚屬者齊家之要也此所謂目也而目之中又有細目焉每條之中首之以聖賢之典訓次之以古今之事迹諸儒之釋經論史有所發明者録之臣愚一得之見亦竊附焉雖其銓次無法論議無長然人君所當知之理所當為之事粗見於此矣陛下親政之始而臣書適成為卷四十有三為帙二十有二輒因召對冒昧以聞伏望聖慈察臣一念愛君之篤矜臣十年用功之勤特降睿旨許臣投進而陛下於機政之暇講讀之餘賜以覽觀其於體用之學不無秋毫之補兵部侍郎曹彥約上奏曰臣聞自古人主即位之初善獻言者必以講學為稱首人主挺生聖哲受天明命一日萬幾已足以厭服四海而猶區區焉習諸生之業其故何也蓋惟有聖人之資者而後宜於學有聖人之位者尤當急於學宜於學者事半而功倍固不與常人等急於學者身修而天下治固不以常情論此堯以聖神文武之德必學於尹壽舜以濬哲文明之德必學於務成跗在聖性有益而無損在後世有歸美而無竊議仰惟皇帝陛下以天縱之聖嗣承大寶皇太后陛下以母儀之重保佑聖躬皆將守家法以正本朝履謙德以光史牒則講學之素固已切切乎皇帝陛下之心而講學之勸固已纚纚乎皇太后陛下之言矣臣以山林疏逖之蹤受先皇不遺微小之察脫迹州縣綴名近列攀烏號而莫及際飛龍之首出誤蒙迅召峻陟二卿宜必有千慮一得有補於聖世者竊惟經世之學與書生科舉之習不得而同經筵之學與家孰黨庠之體亦猶有異蓋綴緝陳言取務時好此書生科舉之習也人主正心以正朝廷正朝廷以正百官得其道則賢智合謀失其理則邪佞伺隙故經世之學宜不與書生科舉之習相似端拜以求師合志以取友此家孰黨庠之體也分畨直以侍經幄候玉色以進針規言於造膝者每患於匆遽書之簡册者猶難於探討經筵之學視家孰黨庠者相去逺矣臣願陛下以講學為素心視講學為日用當經筵未御則必清心滌慮以求有益及經筵既御則必切問近思以歸至當即古人之行事驗今日之立政議論不徒詳必深切於世務意嚮不徒美必有關於國脈語體必及於用謹始必圖其終出則與大臣評之若盡若未盡入則以聖賢證之若合若不合口耳所傳皆為售用以此致堯舜之治雖不中不逺矣然而人主之好儒學尤當以近似之害正為慮尊正大而黜纎巧信忠賢而逺邪柔則近習不得以乘間假偽不得以亂真其機甚微其利害甚切也中興自髙宗皇帝以來世傳聖學孜孜亹亹不廢間燕煒煒煌煌明並日月而張説陳源曽覿之流尚以粗習筆墨欲為王伾叔文輩竊弄權柄威福在已乃自謂儒者事業不過如此鄙薄賢俊輕侮簡册以至治道之所當論聖經之所當講遜志詳説則以為徒亂人意為鬼為蜮足以稔賢士大夫之害甚至顯執國政謀動干戈涓涓不戒終至橫流非纍聖知其姦偽而終逺之其為患可勝既哉此又屋漏暗室之微浸潤膚受之端內廷之所就將燕間之所踐履關於講學者甚切不可不察惟陛下留神彥約遷寶章閣學士知常德府又奏曰臣待罪從班久侍經幄竊見陛下深居宫禁以養志聞於天下髙拱廟堂以愛民聞於天下講讀有常以力學聞於天下匪頒有數以莭用聞於天下然而羣臣進戒諄諄不已或曰謹獨或曰行健或曰防未然之欲或曰持不息之志或曰無忘在潛之日或曰察於不睹不聞之地陛下皆俞其請矣言之者不已聽之者不倦臣未測其説也豈人臣之愛君不以其君之未嘗有此而遂已於言耶將實有所疑於此而固言之耶果其君之未嘗有此而不已於言國家之福也如其有所疑而固言之則亦不可以為無而忽之也蓋鴆毒常匿於宴安而隱疾常出於盛壯寡過者常得於敬畏而逸樂者常本於憂勤孔子謂一言而可以興邦喪邦特在於為君之難與夫言而莫豫違而已可不畏哉臣竊惟論利害者貴乎簡入念慮者貴乎熟以羣臣之言如此其衆見於論疏如此其廣要其所欲不過於修身好學而已唐張藴古獻針太宗凡六百二十有二字其間所言無非修身之要舉天下修身之説莫加此矣本朝趙師民獻針仁宗凡七百七十有八字其間所言無非好學之要舉天下好學之説莫加此矣與其泛聽而廣求孰若篤志而近思臣以二針之作切於事情如此輒録本以進望陛下列為二圖置之座側口誦心惟朝斯夕斯因一言以思一事考一字以窮一理優而柔之厭而飫之若江海之浸膏澤之潤渙然冰釋怡然理順則凡羣臣之所獻者可以揔括而盡行之矣臣不勝惓惓彥約又奏曰臣待罪經幄一年有半以進讀三朝寶訓得侍清光未及終帙今以衰病之久蒙恩放還鄉井有所欲言敢盡布之竊以寶訓為書皆太祖太宗真宗三聖之格言也坦然明白不待有所發明而後見況臣淺陋尤為無所知識蓋嘗妄論以為書之所載為卷三十為目八十有八而其襟喉管轄特在於政體聽斷與夫孝德仁慈謙儉五者而已警之以鑒戒輔之以諌諍以是而睦族以是而體羣臣則於人無不順以是而受符瑞以是而崇祀典則於事無不敬總而括之必至於庶績咸熙而萬世永賴皆自五者之所發見推所從來則五者之所本又皆自好學始也臣讀寶訓至太祖皇帝謂宰相曰欲治之君必能正身自致于無過之地夙夜畏栗防非窒欲深慕古人以德化人之義此太祖皇帝之聖學也太宗皇帝謂宰相曰朕每讀書見古來帝王多自尊大深拱嚴凝誰敢犯顔言事若不降情接納乃是自蔽聰明或喜賞怒刑豈能歸天下之心哉此太宗皇帝之聖學也真宗皇帝謂近臣曰朕樂聞朝政闕失以警朕心然臣僚奏章多以苛細為利不知國家政事自有大體使其不嚴而治不肅而成斯為善理豈可慘虐刻下邀為已功使之臨民徒傷和氣此真宗皇帝之聖學也由聖學而廣之則凡見於政體見於聽斷孝德以事親仁慈以恤下謙儉以處已而況莭目之下於此者可以類言矣今陛下躬儒素之行考帝王之業頻御講筵古所未有增置講官舊所未見聖學之髙明夫人能言之矣臣竊以為人主之學將以見於治功也有太祖之學故建隆開寶創業之治度越漢唐有太宗真宗之學故太平淳化與夫咸平景德守文之治比倫成康今臨政願治雖未應報政然而求言雖切而下情猶未通愛民雖勤而橫斂猶未革真贓不除則鼠竊者無所畏真清不用則小廉者無所勸在陛下審問謹思明辨而力行之則聖學有所底止矣不然而切切於簡册之間諄諄於播告之際尊儒重道而士不得行其志布德施惠而民不得受其利祖宗創業守文之懿本不如此此則進讀寶訓之大旨非執經強聒之比也惟陛下留神洪舜俞進故事曰唐太宗謂蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脈理皆邪弓雖徑而發矢不直朕始寤向者辨之未精也虞人有原獸之針輪人有糟粕之議工執藝事以諫不聞於世久矣而唐之弓工獨得古意其言蓋以規太宗功業雖盛而治心之道實未嘗講也夫心者萬理之會萬事之主此心明白洞達無一毫迂曲之纍則見面盎背皆天理之形著發號出令盡人心之契合敬義直方所以相為表裏也太宗天姿髙而學問不足其得在於好名其失亦在於好名好名故能矯揉為善惟名之好而觀省存養之不加故矯揉之力怠而稟受之偏者不能掩輕我宫人之怒不役一夫之怒會須殺此田舍翁之怒以至好大喜功而多愛無非本心之發露也木心不直脈理皆邪雖徑而發矢不直弓工可謂善窺其君心術之微矣太宗亦可於此進格物正心之功矣其謂勇辨諂諛姦詐嗜欲輻輳以攻一心是特知制外而未知養內安有內心不治而外邪可間者哉將作監楊文仲在講筵每以積誠感動嘗進讀春秋帝問五霸何以為三王罪人文仲奏曰齊桓公當王霸升降之會而不能為向上事業獨能開世變厲階臣考諸春秋桓公初年多書人越二十年伐楚定世子之功既成然後書侯之辭迭見此所以為尊王抑霸之大法然王豈徒尊哉蓋欲周王子孫率修文武成康之法度以扶持文武成康之德澤則王迹不熄西周之美可尋如此方副春秋尊王之意帝曰先帝聖訓有曰絲竹之亂耳紅紫之眩目良心善性皆本有之又曰得聖賢心學之指要本領端正家傳世守以是而君國子民以是而祈天永命以是而貽謀燕翼大哉先訓朕朝夕服膺戴栩上奏曰臣仰惟陛下英明冠古聖德緝熙凡在列之臣得以面清光者無不以講學為言所謂講學者中庸大學其首也臣不佞以為陛下之所講羣臣之所對未免寖流於虛文臣請掇其切於實用者言之臣聞中庸之學自謹獨入大學之學自致知入中庸曰喜怒哀樂未發謂之中發而皆中莭謂之和致中和天地位焉萬物育焉夫能謹於喜怒哀樂即自其謹獨而得之人雖中智其不知戒懼徒以隱顯殊制作輟靡常惟於不睹不聞者謹之則誠意所積流通無間今陛下臨朝若神非不嚴恪恭已南面非不粹淵然退而寒之者多矣暬御使令慧黠順適者獲進巧詐迎合者見容燕飲之不莭舉動之少輕宫庭隱微一有過差皆足以干隂陽之大和近者星象違度隂雨彌旬螟螽為沴穀價騰踴疵厲洊作流離日繁陛下反之於躬真足以位天地育萬物乎然後謹獨之學可驗也大學曰在明明德在新民在止於至善夫能底於至善即自其致知而得之天下事物無窮而莫不有定理其本末有倫先後有序惟事事物物求其至焉一理既通觸類自悟今陛下精一之談不絶於口危微之旨日陳於前然尊所聞行所知者鮮矣處事用人明辨是非者有幾别白邪正者有幾號令所出朝更而夕變除授所加倐佞而忽賢朝廷施設一或失宜皆足以召天下之釁侮近者訛言迭興叛孽間起某事未作而人疑其無成某人未用而人疑其必敗陛下反之於躬真足以明明德而新民志乎然後致知之學可驗也臣願陛下取二書而觀之不以廣誦泛説為能而以切問近思為貴執中必如虞舜繼志必如文武克明俊德必同於堯日新其德必同於湯守之以誠養之以敬日夜去其所未合而不忘其所已合然後講學之功有補矣且夫中庸大學一理也中庸之九經即大學所以治國平天下者也大學之毋自欺即中庸之莫見乎隱莫顯乎微者也書二而理一陛下能自得師則優遊饜飫皆是實誼左右逄原莫非妙用惟當使此誠此敬無一息不存耳昔唐德宗出宫女屏逺玩好淄青將士投兵相謂曰聖主出矣吾屬猶反乎及其猜忌一生以推誠為無益則貞元之敝有甚於肅代陛下於此察之使言而民莫不信行而民莫不説聲名洋溢於中國施及蠻貊則主勢日隆獨非今日之急務乎唐憲宗平淮蔡制馭強藩當時論者謂非朝廷之力直以措置能服其心及其驕侈一萌任用便嬖聚斂之臣則元和之治終愧於二祖之風烈陛下於此加省焉知善則得之不善則失之惟命不于常則天命日固獨非今日之永圖乎夫以陛下耽玩此學之久嗜慕此學之篤而又體察此學之詳臣申復其端則不以為贅辨明其實則不以為忤而臣進對之始亦姑論其大略而未敢舉也狂瞽之言罪當萬死惟陛下裁幸許應龍進故事曰髙宗於萬機之暇留神六籍遍閲諸子百家之書下至近世臣子之作亦無不覽逮御經筵則曰有帝王之學有士大夫之學朕在宫中雖無一日廢學然但推前古治道有宜於今者要施行之耳非指摘章句以為文也吕公著言講學亦曰天子之學與凡庶不同必欲求立政立事之要講愛人利物之術非徒事分章析句之繁臣聞學之為王者事其已久矣古先聖人所以皇皇汲汲者豈徒事於口耳之末哉必欲見之施行以為治國平天下之道茍講誦雖詳而大莭之不究記問雖博而政理之未明是特分章析句之學耳於國家何補哉且經所以載道而道者治之經理也觀典謨則當知帝王之軌範觀雅頌則當知王政之廢興觀禮及樂則當知安上而治民移風而易俗觀易春秋則當知進君子而退小人內諸夏而外夷狄以至諸史之觀又當知成敗得失之當鑒如此則處經事而必知其宜遭變事而必知其權天下雖大可運諸掌矣此乃帝王之學為人上者所當加意矧今外而疆場之未寧內則民力之未蘇非參稽古訓酌而行之何以興事而造業乎臣願陛下於講讀之際舉綱撮要擇其切於今日者審思明辨則物來能名事至能應修文德則可以來逺人進英俊則可以強本朝明思患豫防之戒則可以安邊境審理財正辭之義則可以足國用此乃髙宗所謂推前古治道有宜於今者施行之而吕公著所謂天子之學與凡庶不同必欲求立事之要者亦此意也不然則博而寡要徒事虛言行之惟艱竟無成效昔太祖讀書謂四凶罪止流竄而歎後世刑網之密仁宗觀無逸謂享國之君宜戒逸豫哲宗論乂用三德謂此乃為政之大本得之則治失之則亂而人主不可須臾去兹皆祖宗典學之大要而治功赫奕實基於此監于成憲其永無愆惟陛下留意度宗咸淳八年起居舍人髙斯得上言曰臣恭承聖問臣聞聖人教人不過日用常行之道所以使學者篤志近思不騖於髙逺不忽於卑近而有陵莭躐等之病也雅者雅素之雅謂平日之所常言也詩以吟咏情性使人有所感發而溫厚和平書以道達政事使人明於治亂而效法監戒禮者天理之莭文使人制心檢身止邪防欲者也三者皆至近至切如日用飲食之不可闕故常常言之也於禮獨曰執者蓋詩書言其理而已禮則起居動靜所執守據依者非但空言而已也故曰禮不執則不行三者聖人所常言若夫性與天道則閎逺微妙孔子未嘗輕以語人且此章與五十學易之章相接亦所以見易道之妙非孔子之所雅言也陛下聖學髙明日御經帷儒臣所講誦者莫非聖經賢傳如布帛之文穀粟之味固不患其騖於髙逺而溺於凡近矣臣區區愚忠猶願陛下即孔子之所雅言而加聖心焉二南詩之首也驗之於身吾能樂而不淫乎二典書之首也體之於心吾能欽天敬民乎禮羣言之首也曰毋不敬吾能敬以執之宫庭間燕之時亦戰兢自持不至於失墜矣乎夫如是則孔子之雅言不為空言矣陛下聰明天縱就將之久孔子之言固已默契允蹈臣不量荒陋冀以塵露增益萬分惟陛下擇焉度宗時牟濴上奏曰臣聞帝王之好學有出於中心之自然者有出於一時之勉強者出於自然則日汲汲焉惟恐弗及出於勉強則作輟有時而工夫亦間斷矣漢唐諸君夫豈無知學者然始而勤終而怠始而清明終而昏蔽何哉聲色土木甲兵禱祠之事一有以汨之則志慮分志慮分而左右近習始得以乘間而入矣是蓋出於勉強而非本乎自然也我朝列聖相承留意問學萬幾之暇時召儒生方洪邁之對孝宗皇帝于選德殿也帝諭之以此殿命名雖取選射觀德之義然發號出令圖事揆策無適而不在是且曰燕遊聲色之奉宫室苑囿之娛非惟不好亦不敢獨取尚書通鑑汲汲而讀之日誦心記未嘗一日去手大矣哉帝之為言也勤矣哉帝之用心也是豈有一毫勉強之心哉帝之意豈非以尚書為列聖傳心之奧旨而通鑑明千古治亂之機括耶一開卷間而帝之所以為帝王之所以為王君子之所以為君子小人之所以為小人治之所由興亂之所以作瞭然如黑白判矣以是存心則中無所纍而世間外物舉不足以動吾心雖有欲殖貨利動土木盛鷹馬欲乘間以惑吾之清明者果何從而入哉嗚呼此乾淳之治所以卓冠一時而孝宗之聖所以髙絶千古歟陛下臨御之初首以親儒臣逺近習為第一義且命講官以書進講而諭臣以通鑑之妙真有得於孝宗之用心者臣愚欲望聖慈取通鑑一書置諸左右燕間之際時一覽焉則孝宗之言信而乾淳之治端可復見矣臣無任惓惓濴進故事曰臣聞傳記曰王人求多聞時惟建事學于古訓乃有獲又曰念終始典于學厥德修罔覺然則學者帝王之首務不可忽也況今陛下初臨大寶所宜朝夕延訪羣臣講求先王之道覽觀前世之成敗以輔益聖德緝熙大化不可但循近例以寒暑為辭如此使下情何以通四方何以觀望殆非所以廣聰明宣令名也伏乞依元降指揮日開經筵臣聞經筵所以輔成君德至不輕也太祖皇帝甫定天下首命王昭素講易自是聖子神孫恪守家法必重經筵之選欲以發明道義禆益聖德至元祐初程頥為説書專以薰陶德性涵養氣質為要其言曰人主跬步不可離正人又曰一日之間親學士大夫之時多則自然氣質變化德性成就至於涉書史覽古今特講學之一端耳陛下初政光明卓絶莫非自講學中來臣以非才首荷聖慈拔之郎曹置之經幄每三日一次執經入侍天顔溫穆從容顧問臣亦自以遭逄聖明不量迂踈竭其愚慮不敢不以正對冀有補聖學之萬一方欲發明程頥之説以開廣聖意而自五月以來不得一望清光雖聖明天縱聖德日新固不因人而作輟而或者得以竊議聖意漸不如初臣固知陛下講學工夫無有間斷適事機紛至聖心焦勞故未暇耳然陛下所以置臣等於經幄者非但應故事備外飾而臣等亦非但欲塞職業干榮進而已四方觀聽不可家至而户曉臣用敢援引司馬光上英宗皇帝乞不以寒暑為辭之説欲望陛下今後除假故外日御經筵使羣臣各得輸其忠悃於聖學不為無補如程頥所謂惟願聖主德如堯舜異日天下享堯舜之治廟社固無窮之本則臣子愛君之至情也臣雖無程頥之學而有程頥之志冒昧奏聞惟陛下裁察權直學士院文天祥上奏曰臣早以書生遭遇先皇帝親擢事先皇帝垂十年恨無涓埃補報天地陛下龍飛繼運移忠以事聖明永肩乃心臨鑒在上比者臣來自外藩待罪戎監陛下親御宸墨進之經筵臣學殖凋蕪循牆無路自入侍氊廈切見天顔睟穆聖性謙虛雖如草茅之愚時賜訪問臣感激殊遇亦既得以悉數於前矣猥當轉對伏念臣職在講讀今日聖學關天下治忽不細輒因封事畢吐其𠂻臣聞聖人之作經也本以該天下無窮之理而常足以擬天下無窮之變天地無倪隂陽無始人情無極世故無涯千萬世在後聖人亦安能預窺逆觀事事而計之物物而察之然後世興衰治亂之故往往皆六經之所已有凡六經垂監戒以為不可者小犯之則關安危大犯之則決存亡如赴水火之必斃如食堇葛之必毒是何哉聖人知有理而已合於理者昌違於理者僵所貴乎帝王之學惟能不悖乎大經無蹈乎其大戒而已烏乎聖人所以為萬世慮者豈不甚智所以為萬世戒者豈不甚仁矣哉書曰民可近不可下豫視天下愚夫愚婦一能勝豫而後世猶有以民為黔首以覆其宗為天下笑者書曰內作色荒外作禽荒詩曰亂匪降自天生自婦人而後世猶有昭陽華清霓裳羽衣以階漁陽之禍者書曰慎乃儉德惟懷永圖又曰不作無益害有益不貴異物賤用物而後世猶有蒲萄天馬甲帳翠被以致四海蕭然者臣嘗歎夫自聖經以來時君不聞大道之要生人不被至治之澤秦至五季千數百年間犯六經之顯戒者相望史册聖人立為大經大法以幸萬世藐然未有聞焉豈不惜哉惟皇上帝畀矜斯文孔孟微言至我朝周程朱始大闡明如矇斯發先皇帝表章四書尊禮儒先為往聖繼絶學為萬世開太平穆考之廟稱為理宗陛下親得精一之傳而日就月將緝熙于光明斯道斯民邂逅千載先皇帝欲為唐虞三代之志殆留與陛下使了此事臣覩陛下自踐阼以來畏天尊祖親親仁民敬大臣體羣臣尊其所聞行其所知何往非學今朝廷清明宫府齊一大法小廉罔越厥志不可謂不治矣然臣竊怪去年寒燠失常四方或以旱告今年星文示變雨雹見妖近者積隂為寒皆名咎徴漢人縱閉之學必謂一證主一事臣不能曉此但即其影而想其形因其流而疑其源豈人所不知已所獨知之地陛下猶有當反之六經者乎陛下日御經筵正道正言常接于耳而又內庭不廢觀書傳曰多識前言往行以畜其德陛下蓋有之矣臣愚更願陛下虛心體認切己省察每誦一義善可以為法即驗之身曰吾嘗有是乎無則勉之每説一事惡可以為監即揣之心曰吾嘗有是乎有則改之言則慮其所終行則稽其所敝豈惟制治于未亂保邦于未危充道學之用經綸天下之大經範圍天地之化而不過行而帝行而王以卒先帝主張道統之事業臣何幸身親見之哉書曰兢兢業業一日二日萬幾夫一日二日之間亦未至即有萬事然一事不謹則萬事之幾自此而兆故撥亂本塞禍源無一息不當用功兢兢業業所謂必有事焉者也惟陛下留神黃應龍上奏曰臣眇以書生耕學畎畝竊第以來兹三十年備歷險難粗諳民事際遇聖明叨恩賜對顧臣愚陋何所建明惟服習父師之訓以為人臣事君不告以帝王之道斯謂不敬臣聞帝王之治原於學而學必著之行事帝王之事行其道而道必徴之庶民若學而不見諸事為則何以立人極道而不於民攸監則何以合天心昔傅説告其君以王人求多聞時惟建事周公勉王以立政立事相我受民先臣吕公著亦言國家設勸講之制求治天下之術尚書備帝王之道尤切於治恭惟皇帝陛下德性聰明根聖稟之天縱學力充廣親儒臣之日深此道此學固已洞然矧自藝祖皇帝開闢宇宙以來一以道理最大為立治之本陛下熙明之學親得理宗皇帝之的傳道統大原上繼堯舜然而堯之授舜其言簡而嚴蓋謂歷數與執中相為表裏天祿與四海相為終始甚可凛也逮舜之命禹則其言詳而切危微之辨精一之功所謂學也稽言詢謀則其事也可愛可畏無非證於民者臣敢不鋪張虞夏之隆上瀆天聽敢借漢唐為諭漢唐賢君非無上嘉唐虞逺輩堯舜之志若太初中越人言起大屋以勝火災此無稽之言也武帝輕聽之建神明通天之臺千門萬户之宫以滋海內之虛耗方士言神仙若可得此無稽之言也武帝又聽之幸海上求蓬萊天下愁苦後雖追悔亦已晚矣聽言若此則平日欲聞大道之要表章六經者直表章而已爾貞觀初年命五品以上更宿內省數延問民疾苦嘗自謂不學則不明古道亦卓然有見而乃復立浮圖此勿詢之謀也太宗庸之不免牽於多愛洛陽宫既治繼有飛仙宫之作亦勿詢之謀也太宗又庸之竟詒弗克終之誚行事若此則曩時鋭情經術與學士討古今是直討論之而已爾若夫永光建中之際則尤有可戒者方其寬𢎞恭儉詔舉有行嘗言惟有道者能以往知來不可謂不知道證之斯時日月失明民人飢疫盜賊不禁刑人滿市是雖好儒無以掩牽制文義之失若乃減大官之膳戒服玩之奢亦厲精治道及徇近臣嵗雖旱而禾甚美之説租稅不免民壞屋賣瓦行間架法而變亂滋矣本於一中形孚四海前聖大訓昭然可覽若此陛下以帝王之學行帝王之道固無漢唐數君之失然本諸身者固已深探道之原而徴諸民者猶未盡見行事之效小臣所以未能無疑於此夫國事之治忽帝學之占也生民之休戚君道之表也先臣陳瓘嘗言歷數在躬有天命也允執厥中盡人事也天人兩得則四海不窮天祿常固無過不及之謂中不左不右之謂中不中若車輪無轂不能轉物則為物所轉此自然之理也斯最為善言執中者人君行道不能轉物而為物所轉其端甚微關繫甚大漢唐之事槩可覩矣然聖人之言不徒信而有徴且示萬世人主以保固民命延洪國脈之方曰敬修其可願蓋願治者四海之同情敬修者一人之實德今天下亦困矣邊陲之民困於兵郡縣之民困於賦溪山湖海之民困於盜幸未至於窮者祖宗三百餘年深仁厚澤所固結陛下愛民一念足以上通天心下慰民望也且夫安恬而佚樂人所願也不免有流離轉徙之憂憔悴亡聊之歎將何修而使之無阽危豐衣而足食人所願也不無顛雪而垂鶉腹雷而形鵠將何修而使之無凍餒康寧而壽考人所願也或者少壯戕鋒刃老羸轉溝瀆將何修而俾全其生此其大略也非命殞於刑戮積骨仆於征徭曷可勝計惟真有惻怛之忱而後謂之敬惟真有改圖之實而後謂之修邇者札荒旱潦之頻仍奪攘矯虔之間作朝廷航粟于浙于海于江于閩人免於飢天報以稔此天從人願所致陛下視民如傷所召然修其可願之實胡寧止此天心之眷佑靡常嵗事之豐穰難屢導迎和氣培植生意因民願欲茂續天休正在此時聖學髙逺當力行好事之秋益敬其所當敬愈修其所當修虞夏盛隆有不難及抑臣聞之帝王而下聖賢所傳中庸大學之書與危微精一之旨互相發明大學之誠意正心修身乃所以為齊家治國平天下之地所謂致知致此知也所言格物格此物也倘宫庭之未肅邦國之未乂天下之反側未平是家國天下之大物猶未實格談格物者曰今日格一物明日格一物所格何物也耶中庸以中和位天地育萬物以至誠經天下之大經立天下之大本其事在有九經其或身未盡修賢未盡尊庶民未盡子逺人未盡柔則大經大本何時而植立天地化育何時而參贊論中和者曰未發不是先已發不是後窮極幽妙將安用哉學必著諸行事道必徴諸庶民非臣臆見聖經賢傳皆可質也廣廈細旃之所講貫於此已熟誠非微臣所能測窺惟陛下究竟及此經筵之暇朝政之餘日乾夕惕內省反觀一興念小民水耕火耨之勞即文王康功田功日昃尚不遑暇食果何樂乎常舞酣歌一軫懷逺民草行露宿之苦則漢文奉先帝宫室常恐羞之又何意乎新宫舊剎念終始典于學厥德修罔覺六府修而三事治衆賢和而萬邦寧無怠無荒而四夷來王宜民宜人而百祿是總天下事皆在聖心運量中矣惟陛下留神元世祖在潛邸召張德輝問曰孔子歿已久今其性安在對曰聖人與天地終始無往不在殿下能行聖人之道性即在是矣又問或云遼以釋廢金以儒亡有諸對曰遼事臣未周知金季乃所親睹宰執中雖用一二儒臣餘皆武辨世爵及論軍國大事又不使預聞大抵以儒進者三十之一國之存亡自有任其責者儒何咎焉世祖然之至元間中書左丞許衡上疏曰古之聖人以天地人為三才天地之大其與人相懸不知其幾何也而聖人以人配之何耶蓋上帝降𠂻人得之以為心心形雖小中間包含天地萬物之理所謂性也所謂明德也虛靈明覺神妙不測與天地一般故聖人説天地人為三才明德之靈明天下古今無不一般上為受生之初所稟之氣有清者有濁者有美者有惡者得其清者則為智得其濁者則為愚得其美者則為賢得其惡者則為不肖若得全清全美則為大智大賢則其明德全不昧也身雖與常人一般其心中明德與天地無異其所為便與天地相合此大聖人也若全濁全惡則為大愚大不肖其明德全昧雖有人之形貌其心中暗塞與禽獸一般其所為顛倒錯亂無一是處此大惡人也若清而不美則為人有智而不肖若美而不清則為人好善而不明其清而美者類鏡之明而平其濁而惡者類鏡之不明而又不平也其清而不美者類鏡之明而不平其美而不清者類鏡之平而不明也清美之氣所得的分數便是明德存得的分數濁惡所得分數便是明德暗塞了的分數明德止存得二三分則為下等人存得七八分則為上等人存得一半則為中等人明德在五分以下則為惡常順為善常難明德在五分以上則為善常順為惡常難明德在五分則為善為惡常交戰於胸中戰而未定外有正人正言助之則明德長而為善外有惡人惡言助之則明德消而為惡清的分數濁的分數美的分數惡的分數參錯不齊所以便有千萬般等第氣隂陽也蓋能變之物其清者可變而為濁濁者可變而為清美者可變而為惡惡者可變而為美徇情欲則清美變為濁惡存天理則濁惡變為清美天生聖人明德全明不用分毫功夫於天下萬事皆能曉解皆能了幹見天下之人皆有自已一般的明德只為生的氣稟拘之又為生已後耳目鼻口身體的愛欲蔽之故其明德暗塞與禽獸不逺聖人哀憐故設為校學以變其氣養見在之明開未開之明使人人明德皆如自已一般此聖人立教之本意然為學之初先要持敬敬則身心收斂氣不粗暴清者愈清濁者不得長美者愈美而惡者不得行靜而敬長念天地鬼神臨之不敢少忽動而敬自視聽色貌言事疑忿得一一省察不要逐物去了雖在千萬人中常知有已此持敬大略也禮記一書近十萬言最初一句曰毋不敬天下古今之善皆從敬字上起天下古今之惡皆從不敬字上生在小學便索要敬在大學也索要敬以至當小事當大事都索要敬這一件先能著力然後可以論學成宗嘗御宣文閣右丞相托克托前奏曰陛下臨御以來天下無事宜留心聖學頗聞左右多沮撓者設使經史不足觀世祖豈以是教裕皇哉即祕書監取裕宗所授書以進帝大悅英宗至治二年監察御史烏克遜良楨以帝方覽萬幾不可不求賢自輔於是連疏天歷數年間紀綱大壞元氣傷夷天祐聖明入膺大統而西宫秉政姦臣弄權畜憾十有餘年天威一怒隂晦開明以正大名以章大孝此誠兢兢業業祈天永命之秋其術在乎敬身修德而已今經筵多領以職事臣數日一進講不渝數刻已罷而暬御小臣恆侍左右何益於盛德哉臣願招延儒臣若許衡者數人置於禁密常以唐虞三代之道啓沃宸衷日新其德實萬世無疆之福也文宗時虞集上奏曰臣某等言特奉聖恩肇開書閣將釋萬機而就佚遊六藝以無為此獨斷於睿思而昭代之盛典也乃俾臣等並備閣職感兹榮幸輒布愚忱欽惟皇帝陛下以聰明不世出之資行古今所難能之事以言乎涉歷則衡慮困心艱勞之日久以言乎戡定則撥亂反正文治之業隆然而功成不居位定不有謙遜有光於堯舜優遊方擬於羲黃集羣玉於道山植衆芳於靈囿委懷淡泊造道精微若稽在昔之傳聞孰比於今之善美而臣等躬逢盛事學愧前修雖已竭於論思懼無堪於裨補然敢不詠歌雅頌極襄贊之形容探賾圖書玩盈虛之來往冀心神之融會成德性之純熙揆微志而匪能誠至願其如此仰祈天日俯察芻蕘臣某等不勝惓惓之至順帝時蘇天爵上奏曰帝王之治典學為先開設經筵實惟盛典欽惟皇帝陛下天縱聰明勵精圖治嗣服伊始詔開講筵特命宰輔臺臣及選奎章翰林儒宿十日一進講讀所以輔益聖德緝熙大化實宗社無疆之福中外臣民孰不欣抃竊聞講官所進説者皆祖宗之聖訓聖賢之格言然則不可不敬也自昔講官侍坐有儀蓋所以尊師重道從容降接非苐循故事而備外飾也今陛下春秋鼎盛聖學方新其於祖宗之訓聖賢之言樂於聽聞獨於講官尚未賜坐夫以三代令王皆置師傅之官坐論道義世祖皇帝每召儒臣進對亦嘗賜坐俾盡所言伏願自今以始每遇進講賜坐設几從容顧問凡古今治亂之原及民間情偽得失俾講官詳究敷陳薰陶感發如此則聖學髙明治化熙洽而經筵所設誠非虛文矣歷代名臣奏議卷九
