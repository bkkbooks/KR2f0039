body:
  text: 歷代名臣奏議卷一百九十六明楊士竒等撰慎微漢景帝時郅都為中郎將敢直諫面折大臣於朝嘗從入上林賈姬如廁野彘卒來入廁上目都都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧賈姬等乎陛下縱自輕奈宗廟太后何上還彘亦去太后聞之賜都金百斤武帝元光元年趙人徐樂上書曰臣聞天下之患在於土崩不在於瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊尺土之地身非王公大人名族之後無鄉曲之譽非有孔墨曽子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼而天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不修此三者陳涉之所以為資也是之謂土崩故曰天下之患在於土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德澤未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解由是觀之天下誠有土崩之勢雖布衣窮處之士或首惡而危海內陳涉是也況三晉之君或存乎天下雖未有大治也誠能無土崩之勢雖有強國徑兵不得旋踵而身為禽矣吳楚齊趙是也況羣臣百姓能為亂乎哉此二體者安危之明要也賢主所留意而深察也間者關東五榖不登年嵗未復民多窮困重之以邉境之事推數循理而觀之則民且有不安其處者矣不安故易動易動者土崩之勢也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患其要期使天下無土崩之勢而已矣故雖有強國徑兵陛下逐走獸射蜚鳥𢎞遊燕之囿淫縱恣之觀極馳騁之樂自若也金石絲竹之聲不絶於耳帷帳之私俳優侏儒之笑不乏於前而天下無宿憂名何必湯武俗何必成康雖然臣竊以為陛下天然之聖寬仁之資而誠以天下為務則湯武之名不難侔而成康之俗可復興也此二體者立然後處尊安之實揚名廣譽於當世親天下而服四夷餘恩遺德為數世隆南面負扆攝袂而揖王公此陛下之所服也臣聞圖王不成其敝足以安安則陛下何求而不得何為而不成何征而不服乎哉東漢光武初禁網尚簡但以璽書發兵未有虎符之信南陽太守杜詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徴調竹使而已符第合會取為大信所以明著國令斂持威重也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徴兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之獻帝時荆州牧劉表不供職貢多行僭偽遂乃郊祀天地擬斥乘輿詔書下其事少府孔融上疏曰竊聞領荆州牧劉表桀逆放恣所為不軌至乃郊祀天地擬儀社稷雖昏僭惡極罪不容誅至於國體宜且諱之何者萬乘至重天王至尊身為聖躬國為神器陛級縣逺祿位限絶猶天之不可階日月之不可踰也每有一豎臣輒云圖之若形之四方非所以杜塞邪萌愚謂雖有重戾必宜隱忍賈誼所謂擲鼠忌器蓋謂此也是以齊兵次楚唯責包茅王師敗績不書晉人前以露袁術之罪今復下劉表之事是使跛牂欲窺髙岸天險可得而登也按表跋扈擅誅列侯遏絶詔命斷盜貢篚招呼元惡以自營衛專為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其藝可見臣愚以為宜隱郊祀之事以崇國防魏明帝景初中光祿勳髙堂隆疾篤口占上疏曰曽子有疾孟敬子問之曽子曰鳥之將死其鳴也哀人之將死其言也善臣寢疾病有增無損常懼奄忽忠欵不昭臣之丹誠豈惟曽子願陛下少垂省覽渙然改往事之過謬勃然興來事之淵塞使神人響應殊方慕義四靈效珍玉衡曜精則三王可邁五帝可越非徒繼體守文而已也臣常疾世主莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之迹莫不蚩笑季世惑亂亡國之主而不登踐虞夏殷周之軌悲夫以若所為求若所欲猶緣木求魚煎水作氷其不可得明矣尋觀三代之有天下聖賢相承歷載數百尺土莫非其有一民莫非其臣萬國咸寧九有有截鹿臺之金巨橋之粟無所用之仍舊南面夫何為哉然癸辛之徒恃其旅力知足以拒諫才足以飾非諂諛是尚臺觀是崇淫樂是好倡優是説作靡靡之樂安濮上之音上天不蠲眷然回顧宗國為墟不夷于𨽻紂縣白旗桀放鳴條天子之尊湯武有之豈伊異人皆明王之胄也且當六國之時天下殷盛秦既兼之不修聖道乃構阿房之宫築長城之守矜夸中國威服百蠻天下震竦道路以目自謂本枝百葉永垂洪暉豈悟二世而滅社稷崩圯哉近漢孝武承文景之福外防邊警內興宫殿十餘年間天下囂然乃信越巫懟天遷怒起建章之宫千門萬户卒致江充妖蠱之變至於宫室乖離父子相殘殃咎之毒禍流數世臣觀黃初之際天兆其戒異類之鳥育長燕巢口爪胸赤此魏室之大異也宜防鷹揚之臣於蕭墻之內可選諸王使君國典兵往往棊跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭是依漢吕之亂實賴朱虛斯蓋前代之明鑒夫皇天無親惟德是輔民詠德政則延期過歷下有怨歎掇録授能由此觀之天下之天下非獨陛下之天下也臣百疾所鍾氣力稍微輒自輿出歸還里舍若遂沈淪魂而有知結草以報晉惠帝時侍中嵇紹上疏曰臣聞改前轍者則車不傾革往弊者則政不爽大一統於元首百司役於多士故周文興於上成康穆於下也存不忘亡易之善義願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則祻亂之萌無由而兆矣宋文帝元嘉中行幸還多侵夕散騎常侍何尚之表諫曰萬乘宜重尊不可輕此聖心所鑒豈假臣啓輿駕比出還多冒夜羣情傾側實有未寧清道而動帝王成則古今深戒安不忘危若值汲黯辛毗必將犯顔切諫但臣等碌碌每存順默耳伏願少採愚誠思垂省察不以人廢適可以慰四海之望優詔納之後魏孝文帝南伐將自小平泛舟幸石濟司空録尚書事穆亮諫曰臣聞垂堂之誨振古成規於安思危著於周易是以慿險弗防沒而不弔匹夫之賤猶不自輕況萬乘之尊含生所仰而可忽乎是故處則深宫廣廈行則萬騎千乘昔漢帝欲乘舟渡渭廣德將以首血汙車輪帝乃感而就橋夫一渡小水猶尚若斯況洪河浩汗有不測之慮且車乘由人猶有奔逸致敗之害況水之緩急非人所制脫難出慮表其如宗廟何帝曰司空言是也唐太宗貞觀十三年魏徴恐太宗不能克終儉約近嵗頗好奢縱上疏諫曰臣觀自古帝王受圖定鼎皆欲傳之萬代貽厥孫謀故其垂拱巖廊布政天下其語道也必先淳朴抑浮華其論人也必貴忠良鄙邪佞言制度也則絶奢靡而崇儉約談物産也則重榖帛而賤珍竒然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乘之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於嗜欲故也語曰非知之難行之惟難非行之難終之斯難所言信矣伏惟陛下年甫弱冠大拯橫流削平區宇肇開帝業貞觀之初時方克壯抑損嗜欲躬行節儉內外康寧遂臻至治論功則湯武不足方語德則堯舜未為逺臣自擢居左右十有餘年每侍帷幄屢奉明旨常許仁義之道守之而不失儉約之志終始不渝一言興邦斯之謂也德音在耳敢忘之乎而頃年以來稍乖曩志敦朴之理漸不克終謹以所聞列之如左陛下貞觀之初無為無欲清靜之化逺被遐荒考之於今其風漸墜聽言則逺超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬晉武焚雉頭之裘今則求駿馬於萬里市珍竒於域外取怪於道路見輕於邊隅此其漸不克終一也昔子貢問理人於孔子孔子曰凛乎若朽索之馭六馬子貢曰何其畏哉子曰不以道導之則吾讐也若何其無畏故書曰民惟邦本本固邦寧為人上者奈何不敬陛下貞觀之始視人如傷恤其勤勞愛之如子每存簡約無所營為頃年以來意在奢縱忽忘卑儉輕用人力乃云百姓無事則驕逸勞役則易使自古以來未有由百姓逸樂而致傾敗者也何有逆畏其驕逸而故欲勞役之哉恐非興邦之至言豈安人之長算此其漸不克終二也陛下貞觀之初損己以利物至於今者縱欲以勞人卑儉之迹嵗改驕侈之情日異雖憂人之言不絶於口而樂身之事實切於心或時有所營慮人致諫乃云若不為此不便我身人臣之情何可復爭此直意在杜諫者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子踈斥小人今則不然輕褻小人禮重君子重君子也敬而逺之輕小人也狎而近之近之則不見其非逺之則莫知其是莫知其是則不間而自踈不見其非則有時而自昵昵近小人非致理之道踈逺君子豈興邦之義此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸弗育於國陛下貞觀之初動遵堯舜捐金抵璧反朴還淳頃年以來好尚竒異難得之貨無逺不臻珍玩之作無時而至上好奢靡而望下敦朴末作滋興而求農人豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渴善人所舉信而任之取其所長恐其不及近嵗以來由心好惡或衆善舉而用之或一人毁而棄之或積年信而任之或一朝疑而逺之夫行有素履事有成迹所毁之人未必可信於所舉積年之行不應頓失於一朝且君子之懷蹈仁義而𢎞大德小人之性好讒佞以為身謀陛下不省察其根源而輕為之臧否是使守道者日踈干求者日進所以人思苟免莫能盡力此其漸不克終六也陛下初登大位髙居深視事唯清靜心無嗜欲內除畢弋之物外絶畋獵之源數載之後不能固志雖無十旬之逸或過三驅之禮遂使盤遊之娛見譏於百姓鷹犬之貢逺及於四夷或時教習之處道路遙逺侵晨而出入夜方還以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上達咸思竭力心無所隱頃年以來多所忽略或外官充使奏事入朝思覩闕庭將陳所見欲言則顔色不接欲請又恩禮不加間因所短詰其細過雖有聰辨之略莫能申其忠欵而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縱樂不可極志不可滿四者前王所以致禍通賢以為深誡陛下貞觀之初孜孜理化屈己從人恆若不足頃年以來微自矜放恃功業之大意蔑前王負聖智之明心輕當代此傲之長也欲有所為皆取遂意縱或抑情從諫終是不能忘懷此欲之縱也志在嬉遊情無厭倦雖不全妨政事不復專心治道此樂將極也率土乂安四夷欵服仍逺勞士馬問罪遐裔此志將滿也親狎者阿旨而不肯言踈逺者畏威而莫敢諫積而不已將虧聖德此其漸不克終九也昔堯舜成湯之時非無災患而稱其聖德者以其有始有終無為無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿內戶口並就關外攜負老幼來往數千曽無一户逃亡一人怨苦此誠由陛下矜育之懷所以至死無攜二頃年以來疲於徭役關中之人勞弊尤甚雜匠之徒下日悉留和雇正兵之輩上番多别驅使和市之物不絶於鄉閭遞送之步不絶於道路既有所弊易為驚擾脫因水旱榖麥不收恐百姓之心不能如前日之寧帖此其漸不克終十也臣聞禍福無門唯人所召人無釁焉妖不妄作伏惟陛下統天御宇十有三年道洽寰中威加海外年榖豐稔禮教聿興比屋踰於可封菽麥同於水火暨乎今嵗天災流行炎氣致旱乃逺被於郡國凶醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下警懼之辰憂勤之日也若見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗德者思而改之與物更新易人視聽則寶祚無疆普天幸甚何祻敗之有乎然則社稷安危國家理亂在於一人而已當今太平之基既崇極天之峻九仞之積猶虧一簣之功千載休期時難再得明主可為而不為微臣所以鬱結而長歎者也臣誠愚鄙不達事機略舉所見十條輒以上聞聖聽伏願陛下採臣狂瞽之言參以芻蕘之議冀千慮一得衮職有補則死日生年甘從斧鉞疏奏太宗謂魏徴曰人臣事主順旨甚易忤情尤難公作朕耳目股肱常論思獻納朕今聞過能改庶幾克終善事若違此言更何顔與公相見復欲何方以理天下自得公疏反覆研尋深覺詞強理直遂列為屏障朝夕瞻仰又録付史司冀千載之下識君臣之義乃賜徴黃金十斤廄馬二匹太宗又謂侍臣曰治國如治病病雖愈尤宜將護倘遽自放縱病復作則不可救矣今中國幸安四夷俱服誠自古所希然朕日慎一日唯懼不終故欲數聞卿輩諫諍也魏徴曰內外治安臣不以為喜惟喜陛下居安思危耳太宗問侍臣守天下難易魏徴對曰甚難太宗曰任賢能受諫諍則可何謂為難徴曰觀自古帝王在於憂危之間則任賢受諫及至安樂必懷寬怠言事者惟令兢懼日陵月替以至危亡聖人所以居安思危正為此也髙宗時浮屠盧伽逸多治丹曰可以續年髙宗欲遂餌之東臺侍郎郝處俊諫曰修短固有命異方之劑安得輕服哉昔先帝詔浮屠那羅邇娑寐案其方書為祕劑取靈花怪石歷嵗乃能就先帝餌之俄而大漸上醫不知所為羣臣請顯戮其人議者以為取笑邊隅故法不得行前鑑不逺惟陛下深察帝納其言武后時突厥使者入見皇太子應朝有司移文東宫召太子太子右庶子崔神慶諫曰五品以上佩龜者蓋防徴召之詐內出龜以合之況太子乎古者召太子用玉契此誠重慎防萌之意不可不察凡慮事於未萌之前故長無悔吝之咎今太子與陛下異宫非朝朔望而别喚者請降墨敕玉契詔可麟臺正字陳子昂論人機疏曰臣聞天下有危機禍福因之而生機靜則有福機動則有禍天下百姓是也夫百姓安則樂其生不安則輕其死輕其死則無所不至也故曰人不可使窮窮之則姦宄生人不可數動動之則災變起姦宄不息災變日興祅逆乘興天下亂矣當今百姓雖未窮困軍旅之弊不得安者向五六年矣夫妻不得相保父子不得相養自劒已南爰至河隴秦涼之間山東則有青徐曹汴河北則滄瀛恆趙莫不或被飢荒或遭水旱兵役轉輸疾疫死亡流離浮散十至四五可謂不安矣幸得陛下以仁聖之恩憫其失業邉境所在有兵戰之役一切且停遂使困窮之人尚得與妻子相見父兄相保若復其業獲以救窮人心稍安殆半年矣天下可謂幸甚愚臣切賀陛下得天下之機能密靜之非陛下至聖大明不能如此也愚臣今所以為陛下更論天下之危機者恐將相有貪敵國之利又説陛下以廣地強武為威謀動甲兵以事邉塞陛下或未知天下有危機萬一聽之臣懼機失禍搆則天下有不可奈何也詩不云乎人亦勞止汔可小康惠此中國以綏四方故臣願陛下垂衣裳修文德去刑罰勸農桑以息天下之人務與之共安然後使遐荒蠻夷自知中國有聖人重譯而入貢愚臣竊以為當今天下之大計也伏惟陛下念之伏惟陛下念之近者隋煬帝不知天下有危機自以為威德廣大欲建萬代之業動天下之衆殫萬人之力兵役相仍轉輸不絶北討突厥東伐句麗於是天下百姓窮困人不堪命機動禍搆遂喪天下此是不知天下有危機而信貪佞之人冀收敵國之利卒以滅亡者也隋氏之失可以殷鑒豈不大哉伏惟陛下察之伏惟陛下察之國家所伐吐蕃有大失䇿中國之衆半天下受其弊遂事不諫當復何言陛下不以臣愚芻蕘可採一賜召臣至玉階得以口論天下幸甚臣子昂言臣本下愚未知大體今月十六日特奉敕恩賜臣紙筆遣於中書言天下利害天之降命敢不對揚而孤負聖恩萬一無補死罪死罪謹率愚見封進以聞塵聽玉階伏闕纍息中宗嗣聖元年武承嗣請追王其祖立武氏七廟太后從之裴炎諫曰太后母臨天下當示至公不可私於所親獨不見吕氏之敗乎太后曰吕氏以權委生者故敗今吾追尊亡者何傷乎對曰事當防微杜漸不可長耳太后不從玄宗時吕向奏不令突厥入仗馳射疏曰臣聞鴟梟不鳴未為瑞鳥猛虎雖伏豈齊仁獸是由醜性毒行久務常積故也今夫突厥者正與此類安忍殘賊莫顧君親陛下持武義臨之修文德來之既懾威靈又沐聲教以力以勢不得不庭故稽顙稱臣奔命遣使陛下乃能收其順效雜以從官赴封禪之禮參玉帛之會此德業自盛固不可名焉因復詔許侍遊召入禁仗仰英姿之四照送神藝之百發恩意俱極誠無得踰焉乃更賜以馳逐使撡刀矢競飛鏃於前同獲獸之樂是屑略太過未敢取也雖聖胸豁達與物無猜而愚臣徘徊與時加栗倘此等各懷異心交肆盜憎荆軻詭動何羅竊至暫逼嚴蹕稍冒清塵悔將何及憲宗喜方士桞泌為帝治丹劑求長年帝御劑中躁病渴起居舍人裴潾諫曰夫除天下之害者常受天下之利共天下之樂者常饗天下之福故上自黃帝顓頊堯舜禹湯文武咸以功濟生人天皆報以耆夀垂榮無疆陛下以孝安宗廟以仁牧黎庶攘剗祅凶復張太平賔禮賢俊待以終始神功聖德前古所不及陛下躬行之天地宗廟必相陛下以億萬之永今乃方士韋山甫桞泌等以丹術自神更相稱引詭為陛下延年臣謂士有道者皆匿名滅景無求於世豈肯干謁貴近自鬻其伎哉今所至者非曰知道咸求利而來自言飛鍊為神以訹權賄偽窮情得不恥遁亡豈可信厥術御其藥哉臣聞人食味别聲被色而生者也味以行氣氣以實志水火鹽梅以烹魚肉宰夫和之齊之以味君子食之以平其心夫三牲五榖稟五行以生也發為五味天地生之所以奉人聖人節調以致康強若乃藥劑者所以禦疾豈常進之餌哉況又金石性本酷烈而燒治積年包炎産毒未易可制夫秦漢之君亦信方士矣如盧生徐福欒大李少君後皆詐譎無成功事暴前䇿皆可驗視禮君之藥臣先嘗之父之藥子先嘗之臣子一也願以所治劑俾其人服之竟一嵗以考真偽則無不驗矣穆宗即位初怠荒于政戚里多所請丐挾宦人詗禁中語關託大臣翰林學士李德裕建言舊制駙馬都尉與要官禁不往來開元中訶督尤切今乃公至宰相及大臣私第是等無他材直泄漏禁密交通中外耳請白事宰相者聽至中書無輒詣第帝然之初憲宗喜方士桞泌為治丹劑求長年後帝竟以藥棄天下穆宗雖誅泌而後稍稍復惑方士布衣張臯上疏曰神慮淡則血氣和嗜欲勝則疾疹作古之聖賢務自頥養不以外物撓耳目聲色敗情性繇是和平自臻福慶用昌在易無妄之疾勿藥有喜在詩自夫降康降福穰穰此天人之符也然則藥以攻疾無疾不用藥也髙宗時處士孫思邈達於養生其言曰人無故不應餌藥藥有所偏助則藏氣為不平推此論之可謂達見至理夫寒暑為賊節宣乖度有資於醫尚當重慎故禮稱醫不三世不服其藥庶士猶爾況天子乎先帝晚節喜方士纍致危疾陛下所自知不可蹈前覆迎後悔也今人人竊議直畏忤旨莫敢言臣蓬菣之生非以邀寵顧忠義可為者聞而默則不安願陛下無忽帝善其言後唐明宗時嵗屢豐熟中國無事中書侍郎馮道上言曰臣為河東掌書記時奉使中山過井陘之險懼馬蹶失不敢怠於銜轡及至平地謂無足慮遽跌而傷凡蹈危者慮深而獲全居安者患生於所忽此人情之常也宋仁宗景祐元年參知政事宋綬上奏曰臣聞自古守成之君率皆兢畏不忘顧省何者慮人心逸於久安而患害生於所忽故常立防於無事之始銷變於未萌之前若事至而應不已殆歟臣願飭勵羣臣交修庶職勿以治平自怠勿以纎微不謹則可以保至尊而享洪業也又竊思馭下之道有三蓋臨事尚乎守當機貴乎斷兆謀先乎密夫惟能守則姦莫由移斷則邪莫由惑密則事莫由變是三者治亂安危之所繫願陛下欽之念之至若朝務清夷深居間燕亦願陛下愛養玉體節宣所以順四時聲味所以調六氣勿至傷過乃克和平自然擁百靈之休享無疆之福豈不善哉四年蘇舜欽上疏曰臣聞重閉尚設於勇夫擊柝以待乎暴客是皆前籍立戒以監後人故國門九闔梐枑百重刑人以守閽下士以拂闑所以深嚴帝所以備非常古者非有符節不得輒入君門降及後來乃設籍禁品庶官之髙下限諸門之出入故東籍而西入者律令有文焉臣竊見國朝皇城官門皆無名籍往來無間甚非防微之旨也臣欲乞今後內城諸門應分畨宿直諸色人等各立名籍仍差中官專切提轄至和二年翰林學士歐陽修上奏曰臣聞人臣之能盡忠者不敢避難言之事人主之善馭下者常欲聞難言之言然後下無隱情上無壅聽姦宄不作禍亂不生自古固有伏藏之禍未發之機天下之人皆未知而有一人能獨言之人主又能聽而用之則銷患於未萌轉禍而為福者有矣若夫天下之人共知而獨人主不知者此莫大之患也今臣之所言者乃天下之人皆知而唯陛下未知也今士大夫無貴賤相與語于親戚朋友下至庶民無愚智相與語于閭巷道路而獨不以告陛下其故何也蓋其事伏而未發言難於指陳也臣切見樞密使狄青出身行伍號為武勇自用兵陜右已著名聲及捕賊廣西又薄立勞效自其初掌機密進列大臣當時言事者已謂不便今三四年間雖未見其顯過然而不幸有得軍情之名推其所因蓋因軍士本是小人面有黥文樂其同類見其進用自言我輩之內出得此人既以為榮遂相恱慕加又青之事藝實過於人比其輩流又粗有見識是以軍士心共服其材能國家從前難得將帥經略招討常用文臣或不知軍旅或不間訓練自青為將領既能自以勇力服人又知訓練之方頗以恩信撫士以臣愚見如青所為尚未得古之名將一二但今之士卒不慣見如此等事便謂須是我同類中人乃能知我軍情而恩信撫我青之恩信亦豈能遍及於人但小人易為扇誘所謂一犬吠形百犬吠聲遂皆翕然喜共稱説且武臣掌機密而得軍情不唯於國家不便亦於其身未必不為害然則青之流言軍士所喜亦其不得已而勢使之然也臣謂青不得已而為人所喜亦將不得已而為人所禍者矣為青計者自宜退避事權以止浮議而青本武人不知進退近日以來訛言益甚或言其身應讖言其宅有火光道路傳説以為常談矣而唯陛下猶未聞也且唐之朱泚本非叛者倉卒之際為軍士所迫爾大抵小人不能成事而能為患者多矣泚雖自取族滅然為德宗之患亦豈小哉夫小人陷於大惡未必皆其本心所為直由漸積以至蹉跌而時君不能制患於未萌故臣敢昧死而言人之所難言唯願陛下早聞而省察之爾如臣愚見則青一常才未有顯過但為浮議所喧勢不能容爾若如外人衆論則謂之用心有不可知者此臣之所不能決也但武臣掌機密而為軍士所喜自於事體不便不計青之用心如何也伏望聖慈深思逺慮戒前世禍亂之迹制於未萌密訪大臣早決宸斷罷青機務與一外藩以此觀青去就之際心迹如何徐察流言可以臨事制變且二府均勞逸而出入亦是常事若青之忠孝出處如一事權既去流議漸消則其誠節可以永保終始夫言未萌之患者常難於必信若俟患之已萌則又言無及矣臣官為學士職號論思聞外議喧沸而事係安危臣言狂計愚不敢自默修知諫院又上奏曰臣近據永寧軍捉獲作過兵士已曽具結集作過因依聞奏訖蓋以河北屯聚兵馬雖多自來未有威名將帥鎮撫而卒士驕很相習為常昨自保州變亂之後安肅軍衛州通利軍等處相繼結集不已只如今來趙牧等本亦别無酷虐情狀只是偶然柬試不當況自有部署轉運提點刑獄司等處自可依公論訴豈得小不如意便謀結集以此見雖是官吏乖方亦由驕兵好亂臣伏見有唐驕兵逐帥之禍起自河北始務姑息養成大患況今河北為國家重地事之利害所繫不輕尤宜逺慮周思防微杜漸今官吏敗事偶寬責罰未至失刑若驕兵過示姑息一起其端則他時有不可制之患昨保州之事知州通判並遭殺害其餘官吏各重行降責至今保兵自為得志動皆引以為言而即目統兵之官亦自始以為戒軍威日削士氣益驕今永寧之事亦因兹而馴致也其趙牧等雖為可罪若便重行黜責則河北驕兵結集竊恐自此漸多開啓其端養成後患以此而言趙牧等可罪之人誠不足惜所可惜者朝廷事體也其趙牧等欲乞候斷訖作過兵士且與移一河北鄰近依舊資序差遣不使驕兵得志而後患轉滋必欲更行移降事宜俟朝旨定逾時亦未為晚侍御史趙抃上言曰臣竊以輔弼凝丞所宜協力共濟謀猷獻替須藉至公不私若始無防間則終至間隙中書者天下瞻望之地茍非執政大臣同心同德則何以上副聖主焦勞求治欲元元見太平之意也伏見宰臣文彥博與參知政事程戡是兒女正親家俱曽陳乞回避未蒙聖旨允許然以公朝無疑誠於事體不便且人情豈逺機務實繁矧當鈞衡聮比姻婭一議或異則必生形迹之非一言偶同則豈免黨與之謗臨事同異兩難處之今夫一郡一縣小官同僚尚以親嫌必使易地又況中書執天下刑賞之柄繫天下休戚之本日有議論處置大事豈於親戚乃不為嫌乎臣伏望陛下特賜宸斷可其奏請使得相回避則中外無有間言也仁宗時宋祁上奏曰符契之信天子所以拱斂威重撿防邪偽其在兵賦尤重自周官鎮圭以召守牙璋以興師漢氏始與郡國為竹使符以代牙璋光武中興禁法踈簡但以璽書發兵於是杜詩建言以為事有煩而不可省費而不得已請復虎符絶姦端朝廷更從其議魏晉迄唐罔不遵用惟五代蹙弱州國褊近旦命暮達不容有詐於是周顯德六年始去符契專以印章為驗國初受命方事之繁急於蕩定未暇修復方今地大師衆巧譎寖萌承平既久民不知戰緩急邉垂有警而詔文單下誠恐細人間諜姦詐摸寫乘機徼幸稽逗期會無以察知則國家亦當居安思危先事立制奪邪人竊發之便願復符節官以明慎國命凡發兵百人以上財賦百萬以上皆待符與詔書雙下使郡國合而後遣百人百萬以下則符契特行焉據為大信誠有國之要務其符之形製乞下有司詳案舊典施行劉敞上奏曰臣伏以為國之道防患於未然逺嫌於萬一所以安羣情止邪謀也伏聞張茂實本周王乳母子嘗養宫中故往年市人以狂言動茂實頗駭物聽近者韓絳又以讒説傾宰相動搖人心則是一茂實之身逺則為小人所指目近則為羣臣所疑懼雖聖心坦然於物無猜恐未能家至户曉使人人不惑也假令茂實其心如丹必無它腸亦未能家至户曉使人人不憂也如此則備宿衛典兵馬適足以啓天下之惑動天下之憂甚非重宗廟安臣民備萬一之計臣謂今日之宜要令兩善莫若解茂實兵權處以外郡於茂實不失富貴而朝廷得逺嫌疑此最䇿之善者也昔王郎自稱劉子輿盧芳自號劉文伯因疑飾偽未必皆有犯上之心但流言驅扇羣情眩惑使之然耳臣忝近列方當逺出心之所疑不敢不極論乞以臣言密付執政商量起居舍人同知諫院司馬光論臣寮上殿屏人劄子曰臣等竊聞自先帝以來應兩府臺諫官等上殿奏事左右侍臣悉皆屏退蓋以君不密則失臣臣不密則失身重慎樞機不得不爾竊見近日臣寮上殿奏事左右侍臣不遵舊制或有進至殿角板障門以裏與御座相去不過數步陛下德音及羣臣敷奏之語皆可聽聞其間有機密大事若致漏泄大為不便欲乞一依舊制今後應遇兩府臺諫官等上殿奏事其左右侍臣並於殿角板障門外踏道下祗候仍乞委都知押班於兩邉板障門外撿校如敢竊有覘聽者並具姓名聞奏勘罪施行光知諫院時論夜開宫門狀曰臣竊聞今月二十五日十三公主薨其日宮中送殯出城留宫門及城門至夜深方閉物情駭異以為非宜雖陛下慈愛至深然門闕之禁不可不嚴若以式律言之夜開宫殿門及城門者皆須有墨敕魚符其受敕人具録所開之門并出入人帳送中書門下自監門衛大將軍以下俱詣閣覆奏御注聽即請合符門鑰監門官司先嚴門仗所開之門內外並立隊燃炬火對勘符合然後開之符雖合不勘而開若勘符不合而為開及不承敕而擅開閉若得出入者剩將人出入其刑名輕者徒流重者處絞今以乳兒出殯之故內自禁掖外達郊野諸門洞開一如晝日車馬往來絡繹不絶出入之人無復譏訶有如萬分之一姦險不逞之人雜處其間豈可不為之寒心哉伏望陛下深鑒安危防微杜漸自今宫殿門城門並須依時開閉非有急切大事勿復夜開必不得已須至夜開者即乞陛下親降手敕加以御寶受敕之人仍寫出入人帳委宿衛當上之官衆共驗敕文真的然後覆奏候再見御批方請門鑰與監門官親自監開依帳點閲人數放令出入即時下鎖進納門鑰其宿衛監門官司若不見手敕及御批而輒敢開者依不承敕而擅開閉律文施行雖有手敕御批不參驗及不親自監開點閲人數者依符雖合不勘而開律文施行庶可以養萬乘之威尊消姦宄於未萌也神宗熙寧四年御史中丞楊繪論王安石奏曰臣竊見人君獨享天下之奉其勢至隆也以一人而塊居深宫之中其身至孤也以其勢之至隆固不可不先絶乎覬覦也以其身之至孤固不可不深防乎危禍也故周易之垂訓未嘗不戒之於無焉如坤之初六當一隂生之時應建午之月豈惟無堅氷而已兼亦無履霜也而曰履霜堅氷至斯不謂戒之於無哉其象曰履霜堅氷隂始凝也馴致其道至堅氷也其文言曰隂疑於陽必戰由辨之不早辨也一隂始生其卦直遇其六五曰有隕自天志不捨命也臨卦才二隂生爾聖人已逆戒之曰至於八月有凶豈亦不謂戒之於無哉蓋謂必無而忽之則有時而或有也謂之為或有而備之則必無矣是以古聖賢者之著書立言垂教於後世未嘗不先以辨君臣尊卑為首務也昔髙郢作魯議夫以天子禮樂祀於周公之廟止施於死者也髙郢猶著論以非之者蓋天子之禮樂不可以兩用之臣觀古史凡有得建天子旌旗者未有不至於大故然後知髙郢之論於防微之道著也唐陳越伊尹論亦斯之類焉云此皆賢聖之權臣竊謂古聖賢未嘗不以尊君卑臣為常道至於權者出於聖賢之不得已亦未敢明著于書者蓋懼後世亂臣賊子如莽操師溫之輩假之以為名也臣欲一言於陛下然未委陛下恕之乎不恕之乎恕之則不漏其言臣之禍猶賖不恕之乎臣之禍不測然臣豈得畏不測之禍而不進忠於陛下也臣竊見唐賢多以所為之文見其人一生行事如蓍蔡之不謬如李紳作閔農詩士稱其有宰相器韓愈稱歐陽詹亦曰讀其書知其於慈孝最隆也丁謂詩有天門九重開終當掉臂入王禹稱讀之曰入公門鞠躬如也天門豈可掉臂入乎此人必不忠後果如其言臣聞王安石文章之名久矣嘗聞其詩曰今人未可輕商鞅商鞅能令政必行今覩其行事已頗類之矣臣竊嘗惑其文今謹昧死而條之乞陛下恕臣罪而反覆詳之王安石雜説曰魯之郊也可乎曰有伊尹之志則放其君可也有湯之仁則絀其君可也有周公之功則用郊不亦可乎王安石雜説曰周公用天子禮樂可乎周公之功人臣所不能為天子禮樂人臣所不得用有人臣所不能為之功而報之以人臣所不得用之禮樂此之謂稱王安石雜説曰有伊尹之志而放君可也有周公之功而代兄可也有周之后妃之賢而求賢審官可也夫以后妃之賢而佐王以有天下其功豈小補哉與夫婦人女子從夫子者可同日語乎臣竊謂孟子勸齊王無毁明堂者蓋當時天下無定主故敢爾若言之於一統之世則孟子豈不為罪人今王安石於君尊臣卑重熙纍盛之朝而顯然再三丁寧於伊尹放君周公用天子禮樂之事臣願陛下詳其文而防其志臣言必死罪不敢辭兵部貟外郎兼起居舍人同知諫院范純仁奏言王安石變祖宗法度掊克財利民心不寧書曰怨豈在明不見是圖願陛下圖不見之怨神宗曰何謂不見之怨對曰杜牧所謂天下之人不敢言而敢怒是也神宗嘉納之純仁乞將章辟光所奏宣示臺官疏曰臣近聞臺官上言著作佐郎章辟光不合妄進文字語干岐王臣以不見辟光所陳但聞外議喧騰未能知其實否伏緣國朝親王外居自有故事豈容小臣輒生間言伏望聖慈將章辟光所奏宣示臺官如别無過當之言則可以安中外之心如其言涉輕妄則乞依臺官所奏早行責降以戒憸佞若只但示含容足使外議傳播及岐王聞之不能自安於陛下友愛之間所損不細防微杜漸不可不察徽宗建中靖國元年六月八日御史中丞王覿上殿劄子曰臣聞君不密則失臣臣不密則失身幾事不密則害成故自昔禁中之語造膝之言皆不可以宣露於外至於章疏君有留中而不出臣有焚藁而不存者謂君臣之所當共密也若宜密而不密臣既有後患之憂君亦不復得盡忠之言矣如聞近日以紹聖元符留中章疏付哲宗實録院臣愚切慮非所以開言路也伏望聖慈更賜詳酌左正言任伯雨乞慎密幾事劄子曰臣聞書曰一日二日萬幾易曰幾者動之微吉之先見者也君子見幾而作不俟終日古之聖人所以濟天下之務者知此而已矣陛下即位之初泣請慈闈共護神器皇太后以宗廟社稷為心察聖嗣見微之意權宜之請不忍不從可謂見幾而作不俟終日吉之先見孰大於此至於預定還政之期形于手書事光前人道越千古此乃上天眷佑開誘聖衷而四海生靈無窮之福也然而母道以至慈為本而聖孝以報德為大事有先後政有緩急治亂安危之幾皆繫於此思而行之不可以失其敘也今者二三大臣負誣神考輕欺先帝讎毁宣仁摧壓母道陛下若置而不問則無以慰天人之心遽有施行則無以順太母之慈然則祔廟以前且當明辨邪正躬攬以後乃可大明黜陟宜先者不可後宜緩者不當急也惇等未去朝廷而遽令王圭子孫敘復如此之類先後緩急失其敘矣臣願陛下居安思危詳考古事順德慈闈稟訓而行慎之重之以密幾事天下幸甚伯雨奏宜幾察出入狀曰臣近為火在房心之間曽具奏聞今來火自房心之間直上而行其於心星遂無淩犯若非陛下先發誠意預思消復之理惻怛恐懼格于皇天則安能使熒惑改度如前史所載之盛事乎天心可見聖念可知革否為泰斷可必矣然而臣竊思之前者熒惑歷氐犯房房乃天子之明堂也方哲宗靈駕發引以前事未定疊明堂之上宫舍之中正是幾察出入防微杜漸之時不可以悲擾事叢而廢警備也臣愚既有所見不敢不言伏望聖慈赦其僣易幸甚伯雨又乞周防內庭狀曰臣伏念臣孤賤之迹誤蒙陛下識拔不次異恩誓以死報故愛君憂國忠誠迫切不識忌諱遇事必言伏見今月十四日皇太后奄棄四海之養陛下乍失東朝依恃內庭之事動關聖慮當此之際可不周防臣願陛下諸事振肅倍加謹密蓋陛下自潛邸入承大統雖天人屬望內外欣戴然禁掖情偽未盡諳詳古人謂人心險於山川難於知天近日獄事亦可見矣臣又見自正月已來天色隂晦風雪經旬天意示戒蓋為隂干陽之象也陛下上為宗廟社稷大計不可不慮以此觀之理須嚴肅臣又思之國家財用空竭無甚今日加以二年之間繼遭變故費用之廣不可殫舉陛下聖孝報親思極四海之奉如園陵所須固有舊制不可增損至如遺留支賜諸色浮費無益往者皆可痛行裁損又如土木之役如西京之類及他修造甚非急務一切可停量時緩急以辦大事使民力不勞而國用可足此實陛下報親之盛德也惓惓愚忠伏願陛下留神采覽天下幸甚陳瓘上奏曰臣嘗謂治外之術自三代以來未有如本朝之得計也堅守無失是以久無邉患方彼民捕魚之時未有爭也而仁祖所以止絶之者杜其爭端而已所謂圖難於其易而為之於未有也老子曰天下之難事必作於易天下之大事必作於細又曰其安易持其未兆易謀其脆易泮其微易散為之於未有治之於未亂合抱之木生於毫末九層之臺起於纍土千里之行始於足下為者敗之執者失之是以聖人無為故無敗無執故無失故民之從事者常於幾成而敗之慎終如始則無敗事矣仁祖在位四十二年事無大小圖難於易慎終如始無為也無執也是以無敗無失孔子曰有始有卒者其唯聖人乎仁祖是也瓘又上思患預防奏曰臣聞易曰窮則變變則通通則久是故天下之事窮則必變變而後通人不通之天必自變此必然之理也乃者用事之臣以私滅公勢力已窮猶不悔悟先帝有欲變之心而左右無將順之臣焦勞憂悔奄棄天下摧傷痛恨海內所同陛下受天眷命增光前烈慈孝之治欣然以和未有更張人心已服朝廷之寬大可必生民之休息有期謳歌所歸鼓舞相慶然而臣愚以謂既往之迹無足追論未來之事所可深虞今西邉雖已罷兵然正是大軍之後假使諸路豐熟此方必有凶年民物凋殘加以水旱人不飽暖何事不生又況河北居民流亡大半倉廪匱竭城堡不完恃北敵之不來我因循而無備敵人耄矣餘日幾何其孫好殺理必生事朝廷自侍從而上多是東南之人西北事宜久不諏訪雖云造作邉事不在今日然恐意外之變適在此時若不先事而圖恐有後時之悔可防之患安得不思思而防之又有大於此者太宗謂侍臣曰外憂不過邉事皆可預防唯姦邪無狀若為內患深可懼也帝王用心常須慎此嗚呼太宗之訓可謂明矣有狀者以為可防無迹者以為可懼今日之事蓋亦有無迹而可懼者矣朋黨是也唐憲宗問李絳曰人言外間朋黨太盛何也李絳對曰朋黨言之則可惡尋之則無迹嗚呼人之為邪至於無迹可尋豈不深可懼乎臣以唐事考之牛李二黨皆黨也然而李德裕之黨多君子牛僧孺之黨多小人何以知其然邪德裕之徒忌克自任不同己者則顯然排斥故其為黨也有形而可見僧孺之徒忌克自私不同己者則暗然擠陷故其為黨也無迹而難尋此二黨者皆明主之罪人也然彼善於此不可不辨故臣因論太宗聖訓而以無迹者為尤可懼焉方今大明既升鳯德在上乃邪朋消散之始是至治必成之時然而成則有敗始則有終老子曰人之從事常於幾成而敗之慎終如始則無敗事矣故臣有思患預防之説博士周行已論察朋比壅隔之弊曰臣竊謂人臣之私莫大於朋比而天下之患莫深於壅隔古之人君所以操獨斷而任賢使能廣羣聽而明目達聰蓋防此也恭惟陛下臨御以來總覽權綱勵精政事官無大小事無巨細皆出宸斷親御翰墨臣庶奔走而聽命海內歡欣而蒙德二十年間法全而令具治定而功成然則天下既已無事矣臣愚過慮竊意萬機之繁久勤宵旰臣願陛下儲精蠖濩遊意太清小職細務責之三省百司而獨操其要者在於察股肱之任必出於公使無朋比之欺擇耳目之官咸竭其忠使無壅隔之患如此則職何小而不舉事何細而不聞不待悉煩聖慮而天下之理得矣臣愚不勝區區螻蟻之誠欽宗靖康元年監察御史余應求論中人預軍政之漸狀曰臣嘗觀自古中人預軍政未有不為患者故齊寺人貂漏師于多魚夙沙衛殿而二將見獲唐用監軍每無成功此可為後世深戒者也國家近年邉事專委童貫談􅍬終成大禍幾危社稷今兵革未弭選將命帥固當任責以成效所遣中人不過隨軍承受奏報文書而已不使之預聞軍政也近者河東承受王嗣昌奏請畫一乞令日報將兵覆驗首級提點犒賜催趣糧草及差發探報動息出入皆報承受所則是雖名承受其實監軍也軍政不專於主帥而關決於承受則動有牽制進退狐疑又唐之監軍多擁精兵自衛勝則坐分功賞不利則引兵先遁今嗣昌又令以隨軍步馬各二隊自衛若近裏幹當隨行防護是又踵唐監軍之迹也如此豈有同心赴敵死於行陳之意哉朝廷不察其意而從之臣恐將帥依違不能專制又慮積日纍月異時為監軍所制將自兹始矣臣觀童貫之初用事也為熙河蘭會路承受而已繼而為措置邉事又為安撫制置使又為宣撫使終之爵郡王職樞管談􅍬初用事也亦熙河蘭會路承受而已繼而為幹當公事又為淮浙制置末乃為河東宣撫使蓋其由有漸非一日之積也今嗣昌初為承受許預軍政師還有功後或用之豈不少假之權浸以隆盛安知數年之後不復為貫􅍬乎易曰履霜堅氷蓋言防微杜漸當辨之於早也陛下方修法度以治內命將帥以事外委任甚專不從中制而嗣昌陳請乃欲干預軍政擁兵自便首為梗階漸不可長伏望聖明追還所請重賜竄責以為中人預軍政之戒以示專任將帥之意不勝幸甚中書舍人劉珏上十開端之戒曰陛下即位罷御筆止營繕登俊乂詘虛誕戢內侍之權開言者之路命令既當未嘗數改任用既公率皆稱職賞必視功政必核實此天下所以指日而徯太平也比者內降數出三省罕有可否此御筆之開端也教子弟既有其所又徹而新之長入祗候之班勢若可緩亟而成之此營繕之開端也河陽付之庸才涇原委之貪吏此任用失當之開端也花石等濫賞既治復止馬忠統兵纍行纍召此命令數易之開端也三省密院議論各持所見啓擬各舉所知持不同不比之説忘同寅協恭之議此大臣不和之開端也內路之帥擅作聖旨指揮行郡之守稱為外任監當臣下誕謾之開端也董局務者廣辟官屬侍帷幄者紛爭殿廬此內侍恣橫之開端也兩省繳奏多命以次行下或戒以不得再繳臺諫言事失當率責為逺小監當此言路壅塞之開端也恤民之詔纍下未可行者多是為空文無實德此政事失信之開端也隨龍第賞冠帶之工亦推恩金兵扣闕禮房之吏亦進秩此爵賞僭濫之開端也是十者雖未若前日之甚其端已見杜而止之可以馴致治平因而循之雖有智者不能善其後矣髙宗紹興二年張浚上言曰臣竊謂天下之事每當謹微一失其原終不可救古語謂涓涓不絶浩浩奈何凡以微之不可不謹也古之君人者非不欲逺追三代興太平而治世常少亂世常多何哉幾微之間禍患已成而人主每以其微而忽之故日積一日而終至於敗亂喪亡也明皇之於唐也鋤韋氏之亂致承平之業聰明睿智號為賢君逮楊妃一用遂成播遷當是時明皇豈以此事為果足以壞天下哉夫惟以其微而忽之故變亂遂大非特此也藩鎮跋扈終亂王室原其始也特本夫假借一二武夫以數州之地而已北司恣橫與唐俱亡原其始也特本夫差委一二中官兼總衛兵而已事之細微不可不謹每每若此唐事至近可以類考竊惟陛下萬幾之餘必嘗留意經覽於此臣之管見何足補助萬一浚又上言曰臣嘗謂方天下無事之時君臣上下之分其勢足以相維雖人君不能修治其身及繩正其左右以失天下之心其為禍也尚遲乃若艱難多故敵情不測人心易怨君人者儻有差失禍亂不旋踵而作矣大勢一去不可復合無以微而忽之幸也浚又上言曰臣竊惟自昔人君於內外侍從之臣間有深知其所為者往往自謂我之聰明才智足以制御而役使之而不知事有緩急理有不虞藏伏竊發為國家大患由辨之不早去之不速也可不戒哉御史中丞許景衡乞罷錢伯言知杭州疏曰臣聞自吳越錢氏納國至今一百六十餘年其子孫顯貴甲於縉紳然未嘗有出守杭州者於此以見祖宗防微之意深矣杭州近闕守臣朝廷差吏部侍郎錢伯言伯言有風幹若帥他路無不可者唯守杭州則非所宜且違祖宗故事臣愚伏望聖慈特賜詳酌别選有才略重臣以守杭州或須人馬亦乞就便差撥仍令星夜兼程前去以拯一方危急殿中侍御史張守論諸將請私劄子曰臣聞漢髙祖既平秦項而一時功臣多就葅戮鮮能以功名自終者何哉位髙而權盛也光武懲前世之失雖寇鄧耿賈之髙勳鴻烈分土不過大縣數四所加特進朝請而已故建武諸將往往以功名延慶于後則利害禍福較然甚明國家向自童貫握兵柄勢傾天下內之朝廷公卿外之帥守監司下至州縣小吏升沈進退捷於影響故凡持節所至官無髙卑俯伏廷謁附託以進而風俗流失國勢陵遲馴致邊陲內侮之禍貫亦不免斧鉞之誅此忠臣義士所為慟哭流涕者也恭惟陛下聖德神武撥亂反正撫御將帥曲盡恩禮然士風不競餘習不泯而堅氷之必至滋蔓之難圖臣竊過計伏見近者劉光世還自江南王淵還自浙右各效智力以自著見陛下醲於用賞庸勸將來乃聞士大夫不自好者趨走干謁門庭如市氣焰可炙臣不知其何以得此道路之言竊謂光世與淵嘗有所薦達以及奏功第賞有未嘗身涉行陳而乃竄名功狀之內者審如是則防微杜漸亦不可忽夫大將之職在於訓士卒明賞罰以攘寇戎而已他何與焉但位髙金多則不能别嫌明微畏逺權勢以自處於無過之地或至抵冒而不自寤也況今強敵未殄二聖未還他日更立非常之功復膺不次之賞則寵祿愈崇事權益重而朝廷體貌尤所假借則招權賈禍將不止於今日漢之韓彭近世之童貫不可不鑒也昔蘇建嘗責大將軍衛青無所招選青謝曰招賢絀不肖者人主之柄也人臣奉法遵職而已何預招士驃騎亦然故衛霍為漢賢將著在信史臣願陛下訓諭諸將杜請謁之私戒敕士大夫明分義之守不惟上尊朝廷以安國勢以厚風俗亦示聖明所以保全諸將之意也祕書正字張孝祥上奏曰臣聞善醫者不以無病而廢藥石之儲善國者不以無事而忽先具之備蓋懲病克夀弗畏入畏古之戒然也恭惟陛下神心淵懿聖學髙逺前世安危治忽之鑒古今先後注措之宜皆已昭晰洞達無有疑蔽如日之中而纎悉必照如衡之平而輕重必審凡所以明謹政體興起治功鞏固丕基維持萬世者罔不備具固何待羣臣千慮之愚然臣不識忌諱深惟古人先事之義竊謂今日嵗誠豐矣然荒政不可以不治兵固戢矣然邉備不可以不謹黎獻畢集允釐百工當思有馳騖不足之時四方無警百姓按堵當思有毫末弗緝之患此其略也夫綢繆宜隂雨之未及宴安惟鴆毒之可畏伏席大治大安之勢擇凡當預備之䇿因大臣造膝之餘使之一二條舉熟復而深圖之孟子曰國家間暇及是時明其政刑雖大國必畏之矣臣不勝惓惓以為陛下獻惟陛下幸赦孝宗時太子詹事王十朋上疏曰臣嘗謂人心險於山川難於知天謂其不可測也況奔軍亡國之人烏能保其久而無患也哉唐太宗教射於殿廷羣臣諫之曰律不可以兵刃至御在所今以卑碎之人張弓挾矢於殿陛之側萬一狂夫竊發出於不意非所以重社稷誠哉憂國愛君之言親衛將卒且猶不可而謂歸附之人信其終無害也難矣近者歸明歸正之將陛下旌其忠義壯其勇略擢而用之日與之親使效其力所謂推赤心置人腹中者固足以見大有為之志矣然天下之人凡有愛君之心莫不疑焉謂自古以來莫難於用斯人而用之者罕見其久而不為吾患其棄彼歸我心已二矣今乃使之朝夕以侍左右設或不飽其欲其謀之深計之久而心之不能保其將若之何至於斯時雖悔無及臣請擇其灼然忠誠可以任用陛下素所知者屬之以事權厚之以爵祿勉之以功名亦足以示無疑之意而激其圖報之心矣何必日親之而後為待遇之至哉臣願陛下考之於往古慮之於將來特加宸念毋憚一時之難從而置久逺於無害不勝社稷生靈之願集英殿修撰趙汝愚論國家安危所繫四事奏曰臣聞自古天下之患常生於其所忽患生於所忽則必有出於人意之所不料者故雖有謀臣勇士將無所用其力矣孰若思患而預防之事未至而為之謀事既至而為之應較其利害得失豈不甚相逺耶臣伏念將去闕庭自此雖有犬馬之誠恐無路自達臣熟思纍日謹取國家安危所繫者四事敢致其拳拳之忠陛下幸録其意每先事而審思之庶幾獲效涓塵之益幸甚其一金國使人朝見百官諸衛皆在殿門之外雖館伴臣僚亦不得進預其間故一旦使人稍失常度已無有任其責者萬有一如昔荆軻舞陽之變不知是時孰可禦之此不可不過為之備也其二臣聞北界官司輒敢於沿邉去處明出榜約招誘本界軍人百姓有官者依舊換給官資無官者各有給散錢物緣此渡淮而去者至今未絶臣伏思邉境人情向背於國家大計固已非便萬有一沿江諸軍間有受其招誘者將致軍情轉相扇動此豈可不深為之計也其三鎮江一軍最號雄勇而種姓多雜難於撫御故御得其道則易以成功御非其道則足以致亂其將帥之任尤宜遴選其四吳氏守蜀今已四世雖吳挺士心不附可無他志然而去朝廷絶逺權任太重一方之人皆習熟其姓字吳氏子孫亦自視關外諸軍若其家舊物異時更代之時恐必煩朝廷經理臣謂宜及今無事時稍裁制之使常知警畏庶可無後患此四者皆事之未必然而臣私憂過計者也雖然昔申屠剛有曰未至豫言固常為虛及其已至又無所及是以忠言至諫希得為用惟陛下用剛之言哀臣之心幸甚幸甚參知政事史浩奏曰臣聞傳曰奔軍之將不可以語勇亡國之大夫不可以圖存此古今之通論也近者契丹歸正蕭哲伯等萬里逺來誠為勞苦其實則奔亡之餘又況彼或遣之以為吾間縱之以蠧吾國皆未可知也陛下待之之禮當豫之爵命使無失所嚴其駕馭使有後效可矣今既賜之對錫之燕其餘匪攽優待無所不至當遣回軍前分部將下勿使主兵曽此未聞忽有旨令入內打毬臣竊惑之夫此輩生長北戎擊鞠之戲固所精也陛下欲以為戲而觀之耶抑欲優待而寵綏之耶若以為戲臣以謂降敵不當使其窺見宫牆之內若欲寵綏臣以謂自此邉將必多方招置以為功他日髙官重祿悉為此輩所得實無益於恢復徒有耗費爾昔徽宗朝郭藥師以地來降待之以腹心嘗請擊鞠於牟陀岡其後叛去敵兵大入果於牟陀岡作營寨汴都失守實自牟陀岡登城此輩降徒固不當以為戲也昔孔子射於矍相之圃揚觶而號於衆曰奔軍之將亡國之大夫與為人後者不入此輩奔亡固不足以當寵綏也陛下舉措天下所拭目傾耳誠不可以不重傳曰上有好者下必有甚焉者矣此之謂也臣前者既言賜對不可於便殿當立仗以示威錫宴不當用使者之禮乞免從官押伴既蒙陛下俯察臣衷悉如所請陛下從諫若轉圜之易聖德巍巍度越百王之上不可於此而失之王質乞勿開隙奏曰臣嘗論之天下之患其開也有隙其成也有形方其開也棲之則墜轉之則散稍縱而弛則復合往來翕忽眇眇綿綿使人可以疑可以欺夫是之謂隙及其成也掩於東而生於西抑於內而振於外極力而攻之愈窮而患愈熾夫是之謂形天下之患惟不可使至於形成天下之患而至於形成雖有敏者不可以措手嗟夫世之君子其所以待天下之變盡矣而惟其杜隙者甚難彼其智非不足以知也而知之以為無足憂何者見其微而不察其著見其小而不極其大見其所出而不推原其所窮夫三者是拱手而待變也蓋臣思之苻堅之寵鮮卑李林甫之用虜將僕固懷恩之裂河北杜元頴崔植之縱朱克融皆熟視其隙而不為彌縫補苴以塞其變近者至於隕國亡身而逺者至於遺害數百年而不息臣常密察天下之患其狀如長江大河方其激激然若有所泄而不能潰沕沕然若有所鬱而不得發回旋曲折隂蓄其怒於其心而朝搜暮求以尋其馳騁奔衝之路於此之時而不為之髙其隄防以殺其暴導其支腋以泄其潰其勢必咆哮騰踴蕩然而四出壞城郭包陵谷而不可治然天下之人不能曲盡水之情狀狎其安流而忽其無事以為無足畏者則是引水而橫流於天下也臣觀漢唐之季皆由宦官斫喪其國內脅人主戕公卿外招姦雄連盜賊至於舉天下閧然而起縱橫奔突天下之至亂而不可制蓋其慘如此臣嘗細究其源則似甚微蓋自竇憲兄弟竊威弄權而鄭衆於是有功故臣以為漢之宦官其隙開於鄭衆其形成於孫程曹騰而極於曹節王甫自安南林邑之擾而楊思勉於是有功故臣以為唐之宦官其隙開於楊思勉其形成於李輔國仇士良國家宣和之末紹興之初因宦官而召亂者再而至于今亦少損矣平居廣殖貨財縱享娛樂窮極滋味此近習之常態固無足怪者臣獨慮其爭引朝士以為門人此其漸不可以不制且民間之論以為某人之進某人主之臣非舉以為信也而熟察其迹則不為無證何者天子之密旨或泄而外傳而人臣之私情或不旋踵而有散有所甚昵則必有甚踈唐自開元之間髙力士引宇文融楊國忠韋堅王鉷而南北司合而為一自永泰以後元載殺魚朝恩而南北司判而為二其合也則南司藉北司以成姦其判也則南司因北司以成釁此其勢之相激有不得不然者今日勿使合而為一則異時不至於判而為二此陛下不可不留意也寧宗時禮部尚書黃裳上奏曰孔子曰有始有卒者其惟聖人乎又詩曰靡不有初鮮克有終所謂有始有卒者由其持心之一也所謂鮮克有終者由其持心之不一也陛下今日初政固善矣能保他日常如此乎請略舉已行之事論之陛下初理萬機委任大臣此正得人君持要之道使大臣得人常如今日則陛下雖終身守之可也臣恐數年之後亦欲出意作為躬親聽斷左右迎合因謂陛下事決外庭權不歸上陛下能不咈然於心乎臣恐是時委任大臣不能如今日之專矣夫以萬機之衆非一人所能酬酢茍不委任大臣則必借助左右小人得志隂竊主權引用邪黨其為禍患何所不至臣之所憂者一也陛下奬用臺諫言無不聽此正得祖宗設官之意使臺諫得人常如今日則陛下終身守之亦可也然臣恐自今以往臺諫之言日關聖聽或斥小人之過使陛下欲用之而不能或暴近習之罪使陛下欲親之而不可逆耳之言不能無厭左右迎合因謂陛下奬用臺諫欲聞讜論而其流弊致使人主不能自由陛下能不咈然於心乎臣恐是時奬用臺諫不能如今日之重矣夫朝廷所恃以分别善惡者專在臺諫陛下茍厭其多言則為臺諫者將咋舌閉口無所論列君子日退小人日進而天下亂矣臣之所憂者二也二事朝廷之大者又以三事之切於陛下之身言之曰篤於孝愛勤於學問薄於嗜好陛下今皆行之矣未知數年之後能保常如今日乎殿中侍御史謝方叔上言曰操存本於方寸治亂係於天下人主宅於法宫蠖濩之邃朝夕親近者左右近習承意伺旨之徒往往覘上之所好不過保恩寵希貨利而已而冥冥之中或有遊揚之説潛伏而莫之覺防微杜漸實以是心主之司農卿髙定子入對言內治不修外懼不謹近親有預政之漸近習有弄權之漸小人有復用之漸國柄有陵夷之漸士氣有委靡之漸主勢有孤立之漸宗社有阽危之漸天變日多地形日蹙昔有危脈今有危形昔有亡理今有亡證度宗時權禮部侍郎兼給事中陳宗禮進讀孝宗聖訓因奏安危治亂常起於一念慮之間念慮少差禍亂隨見天下之亂未有不起於微而成於著又言不以私意害公法乃國家之福帝曰孝宗家法惟賞善罰惡為尤謹宗禮言有功不賞有罪不罰雖堯舜不能治天下信不可不謹也歷代名臣奏議卷一百九十六
