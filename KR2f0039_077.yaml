body:
  text: 歷代名臣奏議卷七十七明楊士竒等撰宗室宋仁宗時張方平上論曰臣聞昔在帝堯克明俊德以親九族九族既睦而後平章百姓協和萬邦三代之王莫不封建宗子以為藩衛周之宗盟異姓為後其敦叙世族之義則有飲食之禮親睦伯叔之國則有脤膰之賜及其衰也幽王不能燕樂同姓骨肉相怨而頍辨角弓之刺興焉平王棄其九族而葛藟之譏起焉然維城毗輔翼奬王室故有周之享國逾八百年及乎孤秦郡縣天下專自封大不復建侯子弟單微勢同匹庶及山東寇起孑立無救四方瓦解遽至顛覆二漢之制屏翰支子入參宿衛宗室賢者預聞朝政親疏雜用輕重相權故基祚搖而更安國命絶而復續魏氏簡薄兄弟隔逺族人制諸藩王不許朝覲文如鄄城武若任國關防禁固才不試展而乃忍死待賊託孤寄命本根淺弱龜鼎速遷司馬氏近鑒當塗謀安後世配兵諸子分據要地永嘉之後禍變尤作自相屠刈過於血仇離石嘯亂區域太擾羌胡紛起王制剝盡猶賴藩戚撫臨方面故大命重集于江左焉中興之後敦峻干誅皆自上流蹙逼京邑故自晉世逮于宋齊險害都㑹必命王室子弟鎮督之于後劉蕭二明昏迷悖亂忌同好異縱其尋斧枝幹都盡枯枿兀然股肱悉除但存胸領險慝之人以為利姦雄之臣以為福故使齊梁坐移神器嗚呼滅天理反人道汚禮義傷風教凶德之大其惟內自誅夷者乎近者唐氏創業亦多宗室立功中世已還多難之際斧鉞往討嵓廊謨謀書勳鼎旗流於史牒者同姓近屬實繁有徒臣聞教莫大於親親道莫大於立愛故𫝊稱六逆其一曰疏間親夫子曰君子篤於親則民興於仁伏惟我國家德厚流光慶基憑固天實保定長發其祥韡韡杕華既和樂而且孺振振公姓皆信厚而有穆宜乎德教自家而刑國孝悌達于四方者矣至于爵德官才教勸長善之道臣猶竊歉疑若有未盡至者採其大要敢僭論焉方平又論曰臣聞周之五等分土繼世立適以長不以賢立子以貴不以長無嫡選庶兄亡弟及故子孫傳祚與王家始終其支子為群公子公子之子為公孫逮乎世代已逺服屬且疏則名以其祖之所居官或封邑或字或諡因以為教以綴親别本而各仕其國為卿大夫士焉漢之封爵皇子則王王子則侯王侯世及無嫡則絶後武帝復使諸王得推恩封子弟為列侯而王國之嗣無不侯矣其宗室同姓肺腑之親入居卿相出為牧守中外遞處惟才是用故諸劉繁衍彌漫乎天下曹氏裁制藩戚最為無道至于隔其兄弟吉凶之問禁其婚媾慶弔之禮上不得預朝覲下不得交人事離恩絶義斷棄天常能者被拘才者不試故曹植自比圈牢之養物求一效死之地而不得氣類乖疏公族翦弱故司馬氏乘間而起如襲虛邑焉南北之際晋宋之事尹正王府督領藩鎮兵戍之地險要之都必命宗枝分居嶽牧爰及隋唐未之替也我國家祥符之前皇親尚出臨郡後絶外授初無他釁且天下一統承平治寧藩郡之勢制如臂指不比江左隋唐都督節察輒千里百城事權之大也又何忌焉蓋以其驕貴放恣鮮遵軌度罔自抑畏不知小人之依故朝廷推示大公為百姓計上全親親之義下為元元之福爾且國家基圖安固源流深長古者族食世降一等親必有盡屬必益逺及本支百世衍大蕃昌有藝文如向歆材略如皋勉又可以勿用乎哉夫天子建國諸侯立家大夫有二宗士有𨽻子弟上下尊卑莫不用其宗戚以自佐佑春秋秦伯之弟針出奔晋譏其有千乘之國而不能容其母弟至使出仕于晋故謂之出奔方今天下之大郡國之廣百官衆職文武參布宗室子弟豈無智可以效一官才可以帥一校者歟彼夫執事內外之臣統理軍民之長規約條教又豈生而知之蓋習之則至矣臣愚以謂諸皇宗天戚有能修整端良者宜稍試其材出領郡職入參環衛異同並進親疏雜用輕重相制等級相權唐之諸王率為州郡别駕漢之藩國衆務由於內史誠約漢唐之制漸用而叙進之選量上下律之以法宜其才用能否志行僻正可得而著見矣則又察其謹良莊慎者以備王室爪牙焉詩曰豈無他人不如我兄弟誠使盤維之固豈非廟社之休乎方平又論曰臣聞昔在帝舜命后夔典樂教胄子夏有東西之序商建左右之學周則有大司樂掌成均之法樂師治國學之政自王及群后之子皆訓以四術三行之事又庶子之正於公族者亦教以孝弟睦友子愛之道明父子之義長幼之序故庶子之官治而邦國有倫衆鄉方矣自秦燔滅先王之道而教其子以申商刑名之言不復有庠序之事漢雖開設學校選置師儒而國子遂廢齒學之禮今諸宫院講說教授之官實古師友之地且天枝帝胄習見貴驕生於深宫之中長乎婦人之手甫出就傅性習之始朝廷當為慎擇道德之老經術之儒莊介堅質之人純重規矩之士俾正言日入於其耳善道薰襲於其心使知恭儉之為令名嚴畏之為吉德聳勵之以樂善則有榮賞福祥之事誡懼之以趨惡則有刑罪禍敗之言善惡之端實由師友今乃使自薦請即為除授凡選人充職一嵗乃得改官至有商販初仕輕薄少年率僥幸以自媒為進宦之捷徑以備優弄之具曽何誨導之為夫食荼蓼者不知薺甘居嬴博者必為齊言紺緅隨染薰蕕易器況人抱血氣剛柔之性函欲惡荒佚之情書曰位不期驕祿不期侈此言富貴不與驕侈相期勢必自至者也而不節之以德義輔之以正人欲其不入於邪動克由禮其可得乎周公曰孺子其朋孺子其朋其往言方幼孺當慎所與朋處者也子曰損者三友友便僻友善柔友便佞損矣臣伏見近建睦親之宫制度周大前拱宸極後固國基夫漢立諸侯之邸才備乎朝宿唐建諸王之院專寵乎近親未有能糾合宗族均恩等義如今之美者也其設司分局綱維備矣至于教育勸勵之道臣敢獻愚焉其諸院講說教授之官臣謂宜擇其學問精博志行端修之士定其員數中開廣堂為之學館凡宫族子弟尊卑咸㑹而以齒叙焉晨以談經晝以學文學官分掌之而命耆德近臣一人總攝焉其勤於肄業恭懿莊儉學藝特優者使之上聞遷其秩祿加之賜賚以旌之則其不率教者不待罰而憤悱知勸矣鏘如冠珮雖居象魏之間洋然頌聲如在洙泗之上不亦美哉故為國以禮動人以行王化之大者貴遊公卿之子弟州鄉庠孰之士人莫不上靡德音下修志業四方風動其教不肅而成矣振振公族咸如麟趾之時綿綿葛藟更茂本根之庇可為德化之徴邦家之光也英宗治平二年侍御史趙瞻上奏曰臣伏聞别嫌明微者禮之大經並后匹嫡者事之深戒商周庶子外為藩屏漢魏諸王出就封國此所以尊儲二之定分著宗室之大法不使寵愛之私窺圖之計得以萌心也竊見皇子三位興造大備嵗荒夏疫作已為譏況宫制院名居非其所雖人子性行自隆友悌而國家禮法貴示降差並列東宫恐乖古典昔唐太宗移太子承乾之第魏王泰居于武德殿魏文正諫之以為太逼東宫太宗遽然省悟遣還外第然以一存此意終致後患故爭常起於所軋而禍常生於所忽歷觀前代聖君賢父率亦不能盡斯亂原惟陛下精察熟慮使安其所下此議于儒臣俾援證于典禮庶乎朝廷陵僭之疑一定而於骨肉孝悌之意愈深焉至如宫邸之制過麗則侈心生工徒之役違時則乖氣應因兹垂恤一切漸罷實為天下之幸英宗時殿中侍御史傅堯俞上奏曰臣伏聞以疏而謀親者忠蔽於慈愛緣始而圖逺者言近乎迂闊惟推心於大公則愛不能惑鑒古而深念則迂有可察臣所以自忘其身疏而長慮於事始者也然詞略則在理難悉語深則於事非便輒陳梗槩惟陛下思之臣獨念古先哲王總攬天下其臨斷萬務則罔或不周及於父子之間鮮克無悔豈非愛牽於內而義不勝情者哉伏見皇第二子開國東陽位與穎王相去才一階耳起居出入事頗均齊雖出閣封王具存故事又其天資信厚久炙聖訓友于雍睦固異於人臣猶恐異時年各長成左右使令迭生毁譽嵗月浸久或有可念夫有始卒蓋聖人難之陛下學通古今當為萬世垂法臣謂宜及皓等幼少便為節制待皓以下恩意禮秩常與穎王差逺使有限隔無可陵之勢則社稷無疆之福昔者誕告外廷臣不敢遽獻愚瞽今輒復陳露者望陛下默留聖意堯俞又奏曰臣伏聞應天以實而懷人以德故天不必牲玉之日告人不必金幣之户及是以昔者聖帝明王之有天下也必本誠意推仁術以感㑹天人之心然後身享無窮之休而地有不拔之固臣實愚賤輒昧死有言惟陛下寬其妄狂憐其悃愊則不勝幸甚恭惟大行皇帝舉天下而畀之陛下顧念恩德豈有既乎其所以纍陛下者獨數女耳今大行梓宫在殯越國公主出居外邸撫存恩渥未有隆厚雜遝之事聞於人者陛下癸酉赦書大行慶賚主壻李瑋例移别鎮實恐議者以為歉然伏料陛下以因山有期所未遑暇然龎鴻之澤漸霑皇族此臣所以妄狂以進其悃愊者也望陛下念先帝素意所向之深者務為周旋顧遇內盡陛下懇懇之懷飾以恩意寵光外副海內顒顒之望則天必降監顧諟盡慶雲景星不足以為陛下之福人必悲傷感歎極肌膚骨髓不足以藏陛下之仁臣非附下罔上者不敢與李瑋為地直舉一端冀陛下易察耳乞母出臣章惟陛下留神采擇翰林學士王圭等奏今月某日中書批送到門下侍郎兼兵部尚書同門下平章事昭文館大學士監修國史韓琦等狀奏伏以出於天性之謂親緣於人情之謂禮雖以義制事因時適宜而親必主於恩禮不忘其本此古今不易之常道也伏惟皇帝陛下奮乾之健乘離之明擁天地神靈之休荷宗廟社稷之重即位以來仁施澤浹九族既睦萬國交歡而濮安懿王德盛位隆宜有尊禮陛下受命先帝躬承聖統顧以大義後其私恩慎之重之事不輕發臣等忝備宰弼實聞國論謂考古約禮因宜稱情使有隆恩而廣愛庶幾上以彰孝治下以厚民風臣等伏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏合行典禮詳處其當以時施行謹具狀奏聞伏候勑㫖治平元年五月二十八日進呈奉聖㫖候過仁宗皇帝大祥别取㫖治平二年四月九日再進呈奉聖㫖送太常禮院與兩制待制已上同共詳定聞奏臣等謹案儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為所後者祖父母妻妻之父母昆弟昆弟之子若子若子者言皆如親子也又為人後者為其父母傳曰何以期也不二斬也何以不二斬也特重於大宗者降其小宗也又為人後者為其昆弟傳曰何以大功也為人後者降其昆弟也以此觀之為人後者謂之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不能專一於此故也是以秦漢以來帝王有自旁支入承大統者或推父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法況前代入繼者多宫車晏駕之後援立之䇿或出母后或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡拔聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承者皆先帝之德也臣等愚淺不達古今竊以為今日所以崇奉濮安懿王典禮一依先朝封贈期親尊屬故事髙官大國極其尊榮譙國太夫人襄國太夫人仙遊縣君亦改封大國太夫人考之古今實為宜稱臣等謹議殿中侍御史范純仁論濮王稱親未當狀曰臣伏聞手詔節文稱親之禮謹遵慈訓追崇之典豈易克當固已見陛下守義徇公慎重之至也然稱親之禮殊未為安羣口紛紜不勝嗟憤臣等竊議皇太后手書稱親之意蓋用漢宣故事欲行於今乃與中書門下元建皇考之議大體相依此不免為兩統二父之失所以議者喧然皆謂母后手書非出慈壽之本意皆建議之臣眩惑交構成就其謀欲自掩其惡而杜塞言者之口也臣觀陛下繼明之始與漢宣故事不同宣帝之時尚為有司所奏為人後者為之子請謹視孝昭所為未有却令大宗正統之母追稱小宗所生為親也錯亂禮法失其本意若欲以濮王為親則襄國已降自當為母於皇太后豈得安哉恭惟陛下親受仁宗詔命而為之子故先帝遺詔誕告萬方謂陛下為皇子即皇帝位四夷諸夏莫不共聞今乃復稱濮王為親則先帝治命之詔不行而陛下繼體之義不一況太后與政府大臣並受先帝顧託言猶在耳永昭陵土未乾止因一二近臣之謀遂忘而弗顧陷兩宫於有過之地使四方夷狄惑先帝之遺詔疑陛下之過舉移謳歌欣戴之心為忠憤不正之氣可不痛哉萬一敵國姦民有以先帝遺詔為問則執政之臣其將何辭以對然則稱親之禮豈宜輕用臣等待罪于家屢䝉詔㫖促令供職而踧踖未敢承命者以此之故也若必使臣等就職則當合班廷爭以救朝廷之失雖陛下容納直言為天下所聞而臣等不能早悟明主之罪益深益重矣豈可復居言路預耳目之臣哉臣等之心有死無二伏惟陛下留神聽納天下幸甚純仁又乞定濮安懿王稱號狀曰臣近到闕下伏聞兩制等已依典禮議定濮安懿王稱號封爵却因政府議論不同且令權罷中外人心疑惑未已伏緣陛下昨受仁宗詔命親許為仁宗之子至於遷官封爵悉用皇子故事問安侍膳孝德已彰以至纂承大統天下以陛下為仁宗之子故億兆欣戴一無間言子子孫孫長享天命此則與前代出繼之主事體不同故於本宗難加殊禮況濮王自有封國繼嗣蕃昌今若改封大邦世世傳襲夾輔帝室永垂鴻名則於濮王之尊不為不盛於陛下之報不為不深伏望聖慈斷以大公特降詔㫖恭依兩制所議如此則上合天心下服民望杜諂諛希合之言為萬世不易之法純仁又上狀曰臣近曽上殿進劄子言乞依兩制議定濮王封爵稱號事早降詔㫖及面有奏陳皆䝉聖意開納至今已踰旬日未䝉别降指揮近風聞有臣寮建議欲尊濮王以殊號者朝論相傳未知實有臣夙夕思念萬一有執政大臣造作此議致陛下聖意難於可否故臣不避再三之黷須至奏陳惟望陛下留神聽納則天下幸甚伏以仁宗皇帝當康盛之年立陛下為子皇太后不避六宫之怨力贊先帝保育陛下者是皆欲陛下繼體承祧一意大統報德述事傳於無窮陛下自為皇子則問安侍膳純孝已彰即位以來蒸蒸不怠謳歌欣戴夷夏帖然但臣下不明陛下之心故率然建為此議殊不思若加濮王以殊號則致天下疑陛下以懷報私親為重以傳授大統為輕事不兩兼理之然矣上則違先帝之意中則傷皇太后之心下則失天下之望當聖政惟新之際豈宜失天下之心如此況今二三宰執皆是先帝舊臣計其贊先帝立陛下之時必不肯為今日之議但以有保身之計故不暇深慮事機阿㫖遂非一至于此豈顧事行之後虧損聖猷貽譏今古雖悔何逮臣竊見魏明帝太和三年詔書其事甚明陛下神聖博學必亦覽之詳矣足以度先帝皇太后期望陛下之心雖先帝聖德廣大非魏主之可同在其愛子之心必不相逺如陛下以宗廟重事議論未同聖衷難於獨斷則望降臣此奏付中書門下令兩府大臣及未曽預議兩制臣寮同定聞奏如此則自然公理可見是非可決使天下知陛下以至公大議昭示今古不以邪說諛論侵紊典禮純仁又上狀曰臣近曽纍上封章乞早依兩制所議加濮王封爵典禮以安中外之心未䝉聖慈開允蓋以臣愚見兩制所議已合至公今若尚更遲留不惟濮王追崇之典有闕亦恐增長觀望希合之意導惑聖聽虧損大猷臣不敢逺引古義止以漢事言之如宣帝因霍氏所立又是昭帝旁孫昭穆之間自當有考尚以其有為人後之議終為魏詔所非況陛下親為仁宗之子事體與宣帝全然不同難取而行理亦明矣以近臣各有董宏不正之言將致聖明之朝亦有哀帝之失故臣雖微賤寧不為陛下惜之陛下若以臣言為可采即望更令兩府大臣及未曽經議兩制臣僚同定奏聞施行若以臣言為妄謬不足取聽則乞下臣前奏付有司議罪重行貶責亦使臣引罪知非雖死無恨臣無任愛君激切之至神宗熙寧二年知制誥楊繪上奏曰臣竊以帝之盛者宜莫如堯今考諸堯典曰克明俊德以親九族九族既睦平章百姓夫九族之外同姓之親不為少矣而堯所親睦止於九族云者以服紀之異也服紀者其禮之用乎恩生於情者也恩之以無窮之情節之以有限之禮蓋明乎親之不可以無盡也族盡於九法陽之極數也服盡於五法五行之成數也然則服之紀雖盡則同其所自出者忍儕於路人乎如是復為大宗小宗之法以維之為大宗者百世不遷也為小宗者五世則遷也周雅云文王孫子本支百世是由帝堯以來訖于周親睦九族之制蓋殫此矣有天下者曷不欲逺尊其祖然而統之以太祖之廟而不毁外至於六世之上則去廟而為祧去祧而為壇去壇而為墠去墠而為鬼蓋亦明乎親之不可以為無盡也臣謹案春秋魯桓僖宫災孔子在陳聞之曰其桓僖乎蓋以桓僖之廟宜毁而不毁故天以火災戒之也伏覩睦親宅被火災者二廣親宅被火災者亦二旬月之中如此之併豈適丁其時乎臣竊以春秋之義推之蓋二宅之中有親已盡服已無者而未經裁節於有限之禮故天以火災戒之乎歷考上世尊族或封以就國或官而任外而自唐明皇而後世崇於宫宅而不任以政故本朝依其制也然國初之制凡以䕃授官率皆以其父祖合任之數授之今則長男生踰年而受官其下之男皆生五年而受官矣舊制止授班行今則皆授南班官矣十年前止滿數百今則踰千人矣又其間子孫衆多者數房而共一室者矣安可不更張其事哉欲乞陛下酌古今之宜限服紀之禮廣采衆議裁其䕃子之數立其出官之制設大宗小宗之法以正其統其餘支庶之服紀盡者並許出居於外以合於帝堯親睦九族之道六年知太常禮院黃履乞特燕宗室以齒奏議曰臣聞常棣之詩曰儐爾籩豆飲酒之飫兄弟既具和樂且孺蓋言安寧之時有禮有儀然後能不失親族之心也伐木之詩曰既有肥羜以速諸父又曰籩豆有餞兄弟無逺蓋言以禮者誠每有隆而無殺也司儀曰王燕則諸侯毛中庸曰燕毛所以序齒蓋言燕之以齒而孝悌之道達矣臣伏覩陛下之於宗室以爵貴之以祿富之以詩書禮樂教之以忠孝仁義成之可謂得親叙之道矣至於與群臣同戚休而有暇乎飲食燕樂則亦未嘗不使之與也然而特燕以齒猶未之講恭惟萬機之暇誠一行之以為太平盛事蓋亦美矣元豐元年知宗正丞趙彥若上奏曰臣伏見本朝宗室舊有召試出身之令及熙寧初始命宗子出補外官分事任列於有職之臣此誠天下至公盛德之事祖宗所未嘗有至陛下已自得之加以聖澤涵育宗英衆多當此之際有司不能宣德明恩建白所職請廣選舉以協隨時之義少佐當寧勤求之意而牽常抱俗取過目前則素餐竊位於何塞責昔漢之取人不限疏近而宗正有郡國嵗計上籍之文劉向以宗室髙才進對待詔唐宗正寺嵗送進士二十人與國子監京兆府相比李程李肱皆為舉首雖復繼周而下去古已久未可以諭當世然取其稍近古今者或可施行令宗正寺侍祠之外專掌玉牒屬籍而不豫薦士在於聖時竊恐臣之本職有所未稱謂宜具為條統俾諸教官依國子監外官學例為課試法每遇秋賦許就宗正寺投狀鎖試别立人數頗示優異著為格令俾其競勸賢戚並用紀綱四方何獨棫朴之雅乎凡天下事皆如權衡重於此則輕於彼矣宗室之間自有考校賢者獲升不肖者退抑分當裁損必無觖望夫親賢兼進布列中外以鎮安四海為磐石之固與愚智混淆聚於一處徒殫祿廩而無所事者不可同日語也哲宗元祐元年左司諫王巖叟上奏曰臣竊聞日近宗室火災熾大延及至廣顛沛倉皇不知所舍寓於佛寺暴露庭廡一無壅蔽都人觀望虧損事體極不為便料聖恩已加存撫不待臣言然臣聞聽所得思慮所及不敢遂默此誠陛下所當留念伏望睿慈嚴敕有司速尋可居之地早令安處以昭陛下救災恤難篤於宗族之仁心以示陛下禁非防邪護惜國家之大體巖叟又奏曰臣前日伏聽德音以旱暵為災憂勞惻怛發於至誠引咎自責惟恐有所不及今臣等講求闕失以應天變臣敢不極盡思慮冀補萬分惟陛下察其愚而憐其志幸甚王者之道以篤親親隆仁愛為先也臣聞宗室不係賜名授官孤遺之家二十餘位六十餘人全無祿食朝夕不能自存將有流落之憂京師士民無不傷之皆言雖為疏逺終是祖宗苗裔國家於事體合有處置不當便若路人視而不恤聞昨因人言已送禮部立法今將半年不見了當惸獨困窮勢何可待臣謂此事若執政大臣留意須㬰之間可以裁定伏望陛下批降指揮更不下禮部只令執政速議可行之法早使宗支霑被聖澤以成王室之美昔者世居不道自取誅絶固無足哀然世之仁人君子亦欲陛下有以施厚恩崇盛德臣不忍不言按漢景帝二年吳楚七國宗室遂除其籍至武帝元光二年復七國宗室絶屬者歷代以為漢武之美今天下皆曰世居之惡非若七國武帝之仁非及陛下猶能復七國之籍使上屬於宗室臣以謂緣世居絶屬者碩陛下亦許復之庶幾一開幽鬱有感至和臣不勝愚忠三年起居舍人彭汝礪奏曰臣十二月論石有鄰與宗室議婚事後所聞益衆乃知上下安於此久矣而臣亦惑之不敢復致論體問宗正司條制雖言袒免親不得與非士族之家為婚然不知如何遂為士族又不得與諸司出職工商雜類進納惡逆為婚之文止絶於緦麻親以上則皆容袒免親與工商進納雜類為婚矣以進納者為無礙則雖惡逆者亦可也臣伏思積厚者流長源逺者澤厚蓋以其有所自也天子之所親推而上之至於七世而不忘則推而下至於所逺亦不可以不稱也今宗室雖係袒免然皆出祖宗而同繫於國體而使汚穢荒逺皆得以貨取似非所以為祖宗光榮也今士大夫之族議親非以德望則猶以門閥或匪其耦則一族以為羞焉況於人君哉夫豪商大賈以財雄於鄉今輸金至三千及五千緡入為助教監簿而竊士族之名又捐數千緡求為宫親而遂得列於官户竊寵蠧國依威陵弱豈止為國辱哉臣今欲乞詳定袒免婚姻條貫惟陛下念之七年龍圖閣學士知潁州蘇軾上奏曰臣聞之詩曰懷德維寧宗子維城宗室之有人邦家之光社稷之衛也周之盛時其卿士皆周召毛原非王之伯叔父則其子弟也逮至兩漢河間東平之德歆向之文天下以為口實而唐之宗室武略如道宗孝恭文章如白與賀者不可以一二數而以功名至宰相者有九人焉自建隆以來纍聖執謙不私其親幹國治民不及宗子雖有文武異才終身不試神宗皇帝實始慨然欲出其英髦與天下共之故增立教養選舉之法行之二十年出入中外漸就器使未見有卓然顯聞稱先帝意者夫豈無人蓋朝廷未有以大聳動之耳臣伏見左承議郎令畤事親篤孝內行純備博學經史手不釋卷更事通敏文采俊麗志節端亮議論英發體兼衆器無適不宜臣嘗見其所著述筆力雅健博貫子史蓋清廟之瑚璉明堂之把梓也使其生於幽逺猶當擢用而況近託肺腑已䝉試用者乎伏望聖慈特賜考察召致館閣養其髙才而遂以賢業以風動宗室觀示海內成先帝之意不以臣人微言輕而廢其請也哲宗時同知太常禮院劉攽奏曰臣伏見手詔推求太祖皇帝諸孫屬近行尊者立以為王以光大成功偉業此誠陛下追孝祖廟聖恩無已舉百王之所未嘗用而行之則傳所謂禮雖先王未之有可以義起也然竊觀詔㫖所處猶有未諭恭以太祖皇帝傳國太宗雖為兄弟用後譬猶商及王大統所在繼體之君皆太祖子孫也盛德之祀澤厚流光舉在是矣何待復求諸孫而王之如是則祖廟有功不毁之稱列聖繼統丕承之美反不及置一國乎古者惟列國之君無嗣則有求其子孫而紹封之者祖宗之重不可與比同議又諸侯不得祖天子今封王當自為其國之祖終不敢上承太祖明矣臣以謂陛下欲褒揚藝祖豈無其說按春秋傳曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也文王造周為太祖子孫封國最多後世不敢與並漢明帝亦曰我子豈可與先帝子等故世祖諸子皆封大國而明帝子才半之也然則帝者世也崇厚始祖之子常必異於繼體矣太祖皇帝之子惟德昭德芳二人陛下何不崇此二國之後世世不降其爵與周漢等盛宗廟祭祀使之在位則藝祖巍巍之慶陛下蒸蒸之孝無不休顯著明矣臣以愚戇待罪禮官知陛下推崇藝祖顧聖慮超越非群臣所及猶碩考合典禮使其大義可以講說為萬世法故敢冒進瞽言伏望少加采擇臣無任戰栗之至殿中侍御史陳次升論宗景以妾為妻上奏曰臣風聞有㫖判宗司濟陽郡王宗景妻亡立侍姬楊氏為正室者竊以宗景身居尊屬職在判宗一有動作皇族取則今若以楊氏為妻在卑者必以為尊在幼者必以為長豈惟名分紊亂不足以表儀宗室其在人情亦有未安兼宗室嫁娶於條必須一代有官其進納伎術工商雜類之家皆不許為親楊氏起於卑微若為正室未審果不戾於上條乎求之禮經考之條法皆未為允昔齊桓公霸者耳葵丘之會盟誓之戒猶曰毋以妾為妻況明天子在上禮義法度之所自出而宗藩大臣乃爾傳之天下書之典䇿其於聖朝寧不為纍伏望睿㫖降赴有司考求禮法如有違戾即乞改正施行不勝幸甚徽宗建中靖國元年左司諫江公望上言曰臣聞天下之理有隙則物皆可入故聖人塗隙於未開之前有跡則瑕皆可指故聖人泯跡於未形之際物皆可入則親者離矣瑕皆可指則疑者實矣在物之理雖甚疏逺者尚且如此矧閨門之內骨肉之間其可不察耶臣訪聞蔡王指使列況告鄧鐸者有不順之語浸淫恐行及蔡王矣開封府已行根治臣聞之駭汗流浹驚悸不自持豈有孝治之世太平之時乃容小人銜私怨逞不軌謀離間陛下骨肉之親者乎象之於舜焚廩浚井其逆心已明矣擁二女坐床鼓琴其逆謀已成矣舜未嘗藏怒宿怨卒封之有庳而富貴之唯恐不得象之心也至魏文帝褊忿疑忌一陳思王且不能容故有煮豆燃萁相煎何太急之語為天下後世笑豈不思兄弟天之大倫也有手足相捍之親有首尾相應之義有塤箎之和有友于之樂故孔子有以不間父母昆弟之言為孝蓋親隙不可開隙開則言可離二疑迹不可顯迹顯則事難磨滅陛下得天下天人之歸也章惇嘗簾前持異議已有隙迹矣蔡王出於無心年尚少未達禍亂之萌故恬不為恤陛下一切包容已開之隙復塗矣已顯之迹復泯矣恩意渥縟觀陛下之情已不失兄弟之歡矣與夫區區未能忘天下操以自狹者不啻相十百矣伏望陛下勿以曖昧無根之言加諸至親骨肉之間俾陛下有魏文相煎太急之隙而忘大舜親愛之道豈治世之美事也伏望陛下密詔所司凡無根之言勿形案牘箠楚之下何求弗得一有浸淫旁及蔡王之語不識陛下將如何處之莫若略治所告之人粗見嫌怨情狀並流之嶺表以示天下神器非人心天命弗得非口舌强力可爭也以示天倫之愛雖天下莫之奪也雖善為間言莫之離也儻形案牘有瑕可指一入胸次終身不忘雖父子之間尚未能磨滅況兄弟乎迹不可泯隙不可塗則骨肉離矣陛下將何道以治天下也蔡王萬一䝉犯霧露之毒神考在天之靈豈不知之陛下將何面目見神考於太廟乎書曰克明俊德以親九族九族既睦平章百姓詩曰刑于寡妻至于兄弟以御于家邦故至德要道足以風動天下未有不自親始者也伏望陛下敦而勉之宣和二年知太宗正寺丞仲渙上奏曰臣伏覩方今宗室蕃衍陛下親叙族屬教養作成于兹有年才能並出咸拭目以幸千載之遇然混於常例格於銓選有志於事業者不為不多若不特加旌别無以昭示激勸欲望聖慈特降睿㫖應宗子有文行才術名實顯著者許本司具以名聞斷自淵衷不次升擢庶使人人奮勵以副樂育之意髙宗時右正言陳淵論用宗子奏曰匹夫角力壯羸不等則壯者必勝使一羸而當一壯則勝負未可知也又況於羸者之多乎故閭閻細民以父子昆弟之多寡為强弱急難之際豈無他人不若親戚為可恃也豈獨閭閻之民為然雖大而天下亦莫不然武王克商同時而封者五十三人而異姓不在是焉當時不以為私後世不以為過豈其才智皆足以過人而德業皆可以服天下乎所以布枝葉而芘本根强手足而衛頭目不得不然也周之所以卜世三十卜年八百者其以此耳今遐裔之强既與吾為敵國而吾之親族衰替未有甚於此時不圖所以糾集而簡拔之使居腹心之地以為吾援壯羸異勢其何以濟此遐裔所以輕視中國易發而難制也頃者敵騎憑陵二帝北狩戚屬之在東都者席卷而從之獨陛下一人適居於外天實留之以興我宋其餘宗室散處遐方下國又皆疏屬卑秩不近畿甸幸而獲免亦已寡矣謂宜旁搜逺訪使各陳族系圖而上之引還近地親加試擇焉其有屬尊而官髙聞望素著者俾領方面或處監郡之任其次委以州縣掌兵之職若已嘗出仕而貪墨殘忍不才無能者姑仍其舊後生可教者教之俟其成就然後用焉如此則數年之後聲績傳播將有如漢之河間東平者出敵人聞之必謂中國親族多賢足以自輔自然畏威而不敢肆矣昔仁祖朝富弼在樞府仁祖詔弼專管北事弼因上安邊十三䇿其一則論宗室當教而用之所以强本支而服四夷者以謂敵人貴親多以近親為名王將相以治國事以掌兵柄所以自强而中國未聞有皇親可以為朝廷屏翰者敵必謂王室孤危無所扶助本根不固易以搖動此誠宜為敵人之所窺測也此言仁祖時也其後熙寧元豐間始行教養考試之法英才輩出雖未嘗大用無赫赫功名震耀海內而亦不得為無人矣不幸遭值寇攘往往罹害流離殊邦凋喪殆盡今又有甚於仁祖以前矣然弼言於仁祖時是時海內乂安兵革不用而又契丹講和之後而其反復切至如此使當今日其所獻計又宜如何也區區管見惟陛下深念之章誼上奏曰臣竊謂宗室子弟方此艱難之時其恤之不可以不厚然率之亦不可以無法今宗室有官無官之家自渡江以來散處州郡其寓居越州者為尤多目今已及一千二百餘人而來者猶未已也頗聞所𨽻無宗屬而仰給於州縣所居無室廬而雜處於民伍其放縱不自愛者往往兼容庶姓而冒一時之餼廩疏戚不相知官府不敢詰殆非陛下惇叙之意也今朝廷宗正職事見領於太常寺若置一丞以領宗司之事擇一官府寺觀以為宗子居止之地於宗子之間推一嚴能修潔之士以糾正僞冒之弊然後時其請給使無流落之歎籍其長幼使有本支之辨事從簡易無大費耗況南外西外兩處宗司皆以不廢獨此輦轂之下又安可無總率之人哉伏望聖慈特降指揮措置施行知紹興府張守乞安養宗室奏曰臣伏見自陛下巡幸東南內外宗室流落州縣雖有存恤指揮所得請給或有或無頗多失所以至或寓旅邸或在市廛與民庶雜居飲博鬪訟不能自愛誠可嗟憫蓋緣待之未盡善也契勘兩京舊有敦宗院有屋宇以居止有錢糧以贍養有官吏以檢察宗子各有統屬稍獲安處今來車駕駐蹕臨安臣愚欲乞倣兩京舊制於兩浙東西路各權置敦宗院各就大郡踏逐寺院或官舍劈截以充每院差近上有年德宗室一員知宗正司置主管財用一員兼知宗正丞監門官兩員取會諸州以見今贍養宗子錢米盡數發赴財用所按月支給如不碩入院或往别州居住者並罷支錢米等如合聖意即乞下有司討論條制詳酌施行不惟使天支不至失所亦漸就檢束不至為非仰稱陛下敦叙之意臣忝侍帷幄假守近藩目覩利害不敢緘默惟陛下裁擇孝宗淳熙七年禮部尚書周必大上奏曰臣竊謂事有所該者廣而涉於簿書期會則雖良法美意未免以吏姦而生弊如措置宗室同名是也蓋吏志於利而已乘文書浩繁取會不一必為害於其間以去嵗正月臺劾大宗正司人吏劉景及進奏官髙忠信乞覓善溍錢物觀之概可見矣大抵祖宗時宗室既少又皆聚居宫院自然立名各殊神宗熙寧以來日益蕃衍於是稍許其補外至哲宗始因宗正寺丞宋景年之請凡别祖無服親若非連名許用本字勢使之然非固略也至于今又八十餘年矣宗支愈盛往往散居四方必欲驟改宜戛戛乎其難也故淳熙元年初令川廣限一年餘路半之限滿無立名公據有官人不許參選無官人住支請給至二年八月則展一年矣三年六月又展半年矣四年四月又展半年且有更不再展之文矣其勢終不能行五年正月遂降更不立限指揮而所謂不許參部者轉而為先次參部不許赴任者轉而為未放請給今又嵗餘遷延如故祇如臨安近在輦轂為通判者善仁也為轉運司幹官者亦善仁也而未嘗改焉況逺外者乎臣謂宗室之有官者告敕印紙一一可驗名雖偶同三代未嘗同也今捨其平生付身而憑宗正吏一紙之公據輕重蓋相逺矣臣又見外路保明乞改名之人例具三二十字大宗正司或以為可用而宗正寺則以為不可其說但云依舊重疊而不肯明言與某王宫何人位何人同名然則雖不重疊而謂之重疊豈易察耶臣愚欲望聖慈特降睿㫖應宗室參部及赴任之人不候立名公據且依舊法却一面行移取會其諸路定到所改未當之字須令大宗正司宗正寺分明檢照聲說與三祖下某王宫某人位某人同名即不得泛言重疊庶幾稍抳吏姦仰副陛下睦族之本意光宗時蔡戡上奏曰臣聞周有天下封國七十而同姓之國五十有三文昭武穆皆為顯諸侯周召毛原皆為名卿才大夫大者制禮作樂躋時太平小者勳在王室藏之盟府周之卜年八百卜世三十良有以也在漢則有朱虛之忠河間之賢沛獻之謹節東平之好善在唐則有孝恭却敵之功道宗方面之略勉石之事業白賀之文章顯顯為世豪英者不可悉數由周以來漢唐最為長久豈非得周家强本支之道而然歟暨我國家源深流長子孫蕃衍盛大乃建睦親廣親二宅聚之京師其惇叙之道教育之法莫不備至然而不過髙爵重祿以養其身而已雖有懷才抱藝卓爾不群者不得施用終亦汨沒而無聞熙寧二年始詔易以外官許之應舉故人人自奮爭效所長百年之間外而為監司守臣內而為侍從卿監蓋不乏人然亦未聞傑然立事建功垂於不朽追配古人者其故何也夫宗室之進身有三曰進士曰任子曰特恩特恩補官授以右選之職處以員外之任故已置之不用之域矣任子之法既與庶姓同進士之科特與庶姓異蓋繇進士而進者取之太優用之有限故也取之太優則無能者或濫進用之有限則有才者或見遺雖朝廷所以優異宗室亦所當然而於搜羅人才有所未盡也今之宗室與祖宗之時異當熙寧法行之初宗室子弟去宫掖而親州縣之勞捨膏粱而為文墨之習蓋有非所碩者欲誘而進之則取之不得不優取之既優則用之不得不限其所到之地亦其宜也自衣冠南渡以來流落異方攻苦食淡與寒士角其間種學績文砥節礪行者不為無人然而人情易怠曰如是而可以應舉得官蓋亦足矣故所學者不過如是雖有文章足以代王言終不得一登詞掖雖有才學足以斷國論終不能一履政塗唯人懷自棄之心蓋有必棄之理存焉臣竊謂祖宗之成法宗室之異恩固不可革不若設為兩科而並行之碩與庶姓混考者許其自陳試賦於漕司則遵任子之例春試禮闈則用庶姓之法在選中者以師儒之職優之取之既與庶姓同用之不可與進士異有華國之文則使居臺閣之職有經世之才則使膺廟堂之選不必限其所到之地庶幾真賢實能不致棄遺中人常材不失仕進豈特親親用賢之道一舉而兩得抑亦成周强本支崇屏翰之意也理宗時兵部侍郎曹彥約上封事曰陛下謹定省以事長樂開王社以篤天倫孝友之行宜足以取信於天下然兄弟至親猶誤於狂妄小人之手道路異說猶襲於尺布不縫之謠臣以為守法者人臣之職也施恩者人主之柄也漢淮南王欲危社稷張蒼馮敬等請論如法文帝既赦其罪廢徙王不幸而死封其二子於故地此往事之明驗本朝太宗皇帝之所已行也今若徇文帝緣情之義法太宗繼絶之意明示好惡無隙可指雖不止謗而謗息矣殿中侍御史吕陶上奏曰臣訪聞宗室所生之母於禮法不得祔葬凡有亡沒權殯僧舍逺或十餘載近亦五七年其子雖享髙位重祿止為無歸祔之法往往遂忘其親不舉以葬於母子之恩義則衰薄在朝廷之風化則虧損夫禮緣情而制法因禮而成養育劬勞理當報德尊卑輕重事亦從宜伏望聖慈特詔有司詳議許令祔葬其制度務從降殺以辨嫡庶之分如此則幽明之際皆得其安孝治之風所勸尤廣元太宗將即位宗親咸會議猶未決時睿宗為太宗親弟故左右司員外郎耶律楚材言於睿宗曰此宗社大計宜早定睿宗曰事猶未集别擇日可乎楚材曰過是無吉日矣遂定䇿立儀制乃告親王察哈台曰王雖兄位則臣也禮當拜王拜則莫敢不拜王深然之及即位王率皇族及臣僚拜帳下既退王撫楚材曰真社稷臣也國朝尊屬有拜禮自此始世祖時趙天麟上䇿曰臣聞自非上聖須待學而知之已居至貴須以名而美之夫學者規矩之至也猶卜居於莊嶽之間易效於齊言猶招臂於邱陵之上凝眸而逺見故兖公之殆於庶幾由語之而不惰秦伯之違其良士徒後悔而噬臍也夫名者榮身之極也雖齊紈蜀錦未足以商其麗雖芝蘭玉樹不足以齊其香故巢許者箕潁之賤夫揭六合而播譽操懿者漢魏之宰相縱小人而亦憎也是知流波不息可致於大洋之中積善素多大勝於尊榮之職孔子曰學而時習之不亦恱乎又曰君子疾沒世而名不稱焉此之謂也方今宗室貴人幸生聖世有好學而不厭者亦有輕學而弗嗜者臣固知堯舜率天下以仁而遐陬尚且從之況於金枝玉葉親聆謦咳之音鳯閣龍樓密邇雍熙之化嚮風從教如琢瓊瑶但以宗族止貴於崇親非若師友輔成乎德業也今國家既立宗正府又立國子學蓋欲申邦憲以公滅私崇德化以文飾質然其宗室罕篤於學或月誦而年閒或春集而秋散以馳馬試劍為至樂以援弓射鴻為常事一日暴之十日寒之未能有生者矣雨露息之斧斤伐之未有能萌者矣臣但惜其已貴而不慕榮名則惑之甚焉且宗室之右族非寒門之同例欲希賢聖有易有難就居移氣養移體而論之似亦或難就貧無怨富無驕而論之富者實易所以易者專於道義而無飢窘之憂行未半於寒士而獲無窮之譽故也古人有言曰千里之步始於足下九仞之山起於一簣言在乎為之熟之而已矣迹其生於深宫之中長於婦人之手太倉精粒為之食御局綾錦為之衣左庫之錢供其費用下民之力給其役使夏不知暑冬不知寒不知稼穡之艱難不聞小人之勞苦頤指氣使而左右趨風叱咤撝訶而鬼神驚懼視公侯之爵輕若纎塵俯望重之賢皆出已下有酒如澠有肉如陵目厭於姬姜之艷耳喧於絲竹之聲真兜率之天人蓬萊之仙子處貴而不自知其貴宣驕而不自覺其驕自中人以下鮮有弗移其性者也若以河潤九里澤及三族聖躬居萬乘之尊宗戚備極榮之位俾居藩鎮俾守邊疆設有微愆或干國典陛下將如之何哉置于法則傷恩原其罪則廢法故不如自其年之幼也嚴師以訓之及其過之未也屈情而學之乃可復本來之性天垂榮名於後世矣不求名而名自隨之者上也知名之美而學以求之者次也勸之以次而達之於上者古今之通理也伏望陛下導宗室以學問激宗室以榮名嚴宗室之師重宗室之友庶使貴人之志各懷希聖之明心無令博士之流謾作在公之虛號若然則東平最樂克廣于今河間道術不能專美矣天麟又上䇿曰臣聞聖神秉籙公天下以為心宗室乘時畏彛章而守正大安小帖邇順遐歸非唯欲下之誠服蓋亦守邦之常理故爵祿之設所以加於賢能非但用及於其親以榮之也刑罰之立所以施於有罪非可或私於其親以釋之也昔舜誅四凶而封象於有庳之國天下不以為偏黨者蓋四凶之害已及於天下而象未嘗害天下故惡惡之心愛弟之道兩盡而無失也周公誅管蔡而歌常棣於兄弟之宴天下不以為損德者蓋管蔡雖親圖危於社稷而於族莫不蹈道故憂公之理樂私之情並行而不悖也是以賞罰明而令行令行而事理事理而民安民安而國安國安而宗室亦獲安矣今國家內族星布外戚雲分皆獲食邑而不預大權皆仰皇猷而各安常分漢唐以來未有之也猶闕防之之道焉宗正府中已備其員之尊卑未申厥憲之輕重欲從輕議則似虧大正之猷亦從常倫則又失議親之道向不為之立法其何以行之哉夫人之生也戴天履地呼隂吸陽自非智愚之不移中人之上下大抵相似處富貴之盛者即有昻昻之風在貧賤之困者咸秉謙謙之志果其性有異乎非也其居使之然也況乎以天潢之派挾象闕之尊接步武於烟霄聨芳馨於桂籍者哉其或卑職下方之士窮閭厄巷之人睚眦之間承接之際偶相干犯難以為敵有苦而已矣有死而已矣下民哀怨上達乎天寧可不懼之哉此皆非國家之所恣但宗室挾貴而然也萬一天聽側聞則將怒其干紀亂常而加之以厚罰矣或流於逺方或貶於重役能不失親親之恩哉故與其有罪而加之刑不若先禁之之為愈也與其厚罰以禁之不若申明典憲以絶其茍免之心而令全德之為愈也方今貴族上畏天威各循繩墨無敢妄行臣但恐儻䝉此事有黷皇眀故云然也漢世祖時董宣為洛陽令湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乘宣叱奴下車因格殺之主還宫訴帝帝賜宣錢三十萬且光武寧不知主之貴而令之賤哉所以然者為天下計也伏望陛下大昭離日丕出綸言凡宗室府內所設官員選宗族之有德望者而為之不得已則銓擇朝野之賢能以充之不宜但拘宗族之內以備員也凡貴戚之在京城者有罪則宗正府治之自有常典凡貴戚之在外方者有罪則郡縣達文于宗正府宗正府差官治之凡貴戚之罪據周禮八議比庶人宜降幾等立條例以明示天下凡貴戚之有罪者不宜令卒徒廝役得以詈辱之凡諸王公主投下人户皆庶人之類自有常制委所在臨民官治之可也若又從臣先所謂訓宗室之說則教行而知禮法明而畏罪永永維清矣順帝時既毁文宗廟主削文宗后皇太后之號徙東安州而皇弟雅克特古斯文宗子也又放之髙麗監察御史崔敬上疏曰文皇獲不軌之愆已徹廟祀叔母有階祻之罪亦削洪名盡孝正名斯亦足矣惟念皇弟雅克特古斯太子年方在幼罹此播遷天理人情有所不忍明皇當上賔之日太子在襁褓之間尚未有知義當矜憫蓋武宗視明文二帝皆親子也陛下與太子皆嫡孫也以武皇之心為心則皆子孫固無親疏以陛下之心為心未免有彼此之論臣請以世俗諭之常人有百金之産尚置義田宗族困厄者為之教養不使失所況皇上貴為天子富有四海子育黎元當使一夫一婦無不得其所今乃以同氣之人置之度外適足貽笑邊邦取辱外國況蠻夷之心不可測度倘生他變關係非輕興言至此良為寒心臣碩殺身以贖太子之罪望陛下遣近臣迎歸太后太子以全母子之情盡骨肉之義天意回人心恱則宗社幸甚歷代名臣奏議卷七十七
