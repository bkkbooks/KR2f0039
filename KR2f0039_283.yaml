body:
  text: 歷代名臣奏議卷二百八十三明楊士竒等撰褒贈漢成帝時梅福以為宜建三統封孔子之世以為殷後乃上書曰臣聞不在其位不謀其政政者職也位卑而言髙者罪也越職觸罪危言世患雖伏質橫分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏櫪千駟臣不貪也故願一登文石之陛涉赤墀之塗當户牖之法坐盡平生之愚慮亡益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於把明著三統示不獨有也是以姬姓半天下遷廟之主流出於户所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而況聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉谷永上疏曰臣聞聖主尊師傅褒賢俊顯有功生則致其爵祿死則異其禮諡昔周公薨成王葬以變禮而當天心公叔文子卒衛侯加以美諡著為後法近事大司空朱邑右扶風翁歸德茂天年孝宣皇帝愍册厚賜贊命之臣靡不激揚關內侯鄭寬中有顔子之美質包商偃之文學嚴然總五經之眇論立師傅之顯位入則鄉唐虞之閎道王法納乎聖聽出則參冢宰之重職功列施乎政事退食自公私門不開散賜九族田畝不益德配周召忠合羔羊未得登司徒有家臣卒然早終尤可悼痛臣愚以為宜加其葬禮賜之令諡以章尊師褒賢顯功之德上弔贈寬中甚厚蜀後主時咱隆乞立諸葛亮廟表曰臣聞周人懷召伯之德甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興以來小善小德而圖形立廟者多矣況亮德範遐邇勳蓋季世興王室之不壞實斯人之是賴而蒸嘗止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存德念功述追在昔者也今若盡順民心則瀆而無典建之京師又逼宗廟此聖懷所以懷疑也臣愚以為宜因近其墓立之於沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮晉武帝太康中議郎段灼上疏追理鄧艾曰故征西將軍鄧艾心懷至忠而荷反逆之名平定巴蜀而受三族之誅臣竊悼之惜哉言艾之反也以艾性剛急矜功伐善而不能協同朋類輕犯雅俗失君子之心故莫肯理之臣敢昧死言艾所以不反之狀艾本屯田掌犢人宣皇帝拔之於農吏之中顯之於宰府之職處內外之官據文武之任所在輒有名績固足以明宣皇帝之知人矣會值洮西之役官兵失利刺史王經困於圍城之中當爾之時二州危懼隴右凛凛幾非國家之有也先帝以為深憂重慮思惟可以安邉殺敵莫賢於艾故授之以兵馬解狄道之圍圍解留屯上邽承官軍大敗之後士卒破膽將吏無氣倉庫空虛器械殫盡艾欲積榖強兵以待有事是嵗少雨又為區種之法手執耒耜率先將士所統萬數而身不離僕虜之勞親執士卒之役故落門段谷之戰能以少擊多摧破強賊斬首萬計遂委艾以廟勝成圖指授長䇿艾受命忘身龍驤麟振前無堅敵蜀地險阻山髙谷深而艾步乘不滿二萬束馬懸車自投死地勇氣淩雲將士乘勢故能使劉禪震怖君臣面縛軍不踰時而巴蜀蕩定此又固足以彰先帝之善任矣艾功名已成亦當書之竹帛傳祚萬世七十老公復何所求哉艾以禪初降逺郡未附矯令承制權安社稷雖違常科有合古義原心定罪事可詳論故鎮西將軍鍾會有吞天下之心恐艾威名知必不同因其疑似構成其事艾被詔書即遣強兵束身就縛不敢顧望誠自知奉見先帝必無當死之理也會受誅之後艾參佐官屬部曲將吏愚戇相聚自共追艾破壞檻車解其囚執艾在困地是以狼狽失據夫反非小事若懷惡心即當謀及豪傑然後乃能興動大衆不聞艾有腹心一人臨死口無惡言獨受腹背之誅豈不哀哉故見之者垂涕聞之者歎息此賈誼所以慷慨於漢文天下之事可為痛哭者良有以也陛下龍興闡𢎞大度受誅之家不拘敘用聽艾立後祭祀不絶昔秦人憐白起之無罪吳人傷子胥之寃酷皆為之立祠天下之人為艾悼心痛恨亦由是也謂可聽艾門生故吏收艾尸柩歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定諡死無所恨赦寃魂於黃泉收信義於後世則天下徇名之士思立功之臣必投湯火樂為陛下死矣帝省表甚嘉其意惠帝時趙王倫誅解系并戮其妻子後齊王冏起義時以裴解為寃首倫秀既誅冏乃奏曰臣聞興微繼絶聖主之髙政貶惡嘉善春秋之美談是以武王封比干之墓表商容之閭誠幽明之故有以相通也孫秀逆亂滅佐命之國誅骨鯁之臣以斫喪王室肆其虐戾功臣之後多見泯滅至如張華裴頠各以見憚取誅於時系結同以羔羊被害歐陽建等無罪而死百姓憐之陛下更日月之光照布惟新之明命然此等未蒙恩理昔欒卻降在皂𨽻而春秋傳其人幽王絶功臣之後棄賢者子孫而詩人以為刺臣備忝右職思竭股肱獻納愚誠若合聖意可羣官通議八坐議以系等清公正直為姦邪所疾無罪橫戮寃痛已甚如大司馬所啓彰明枉直顯宣當否使寃魂無愧無恨為恩大矣永寧二年追贈光祿大夫改葬加弔祭焉蕩隂之役侍中嵇紹為亂兵所害征虜將軍司馬王接議曰夫謀人之軍軍敗則死之謀人之國國危則亡之古之道也蕩隂之役百官奔北唯嵇紹守職以遇不道可謂臣矣又可稱痛矣今山東方欲大舉宜明髙節以號令天下依春秋褒三纍之義加紹致命之賞則遐邇向風莫敢不肅矣朝廷從之東晉元帝時周札一門五侯王敦憚之遣參軍賀鸞盡掩殺札兄弟及敦死札等故吏並詣闕訟周氏之寃宜加贈諡事下八坐尚書卞壼議以札石頭之役開門延寇遂使賊敦恣亂札之責也追贈意所未安懋筵兄弟宜復本位司徒王導議以札在石頭忠存社稷義在亡身至於往年之事自臣等有識以上與札情豈有異此言實貫於聖鑒論者見姦逆既彰便欲徴往年已有不臣之漸即復使爾要當時衆所未悟其姦萌札與臣等便以身許國死而後已札亦尋取梟夷朝廷檄命既下大事既定便正以為逆黨邪正失所進退無據誠國體所宜深惜臣謂宜與周顗戴若思等同例尚書令郤鑒議曰夫褒貶臧否宜令體明例通今周戴以死節復位周札以開門同例事異賞均意所疑惑如司徒議謂往年之事自有識以上皆與札不異此為邪正坦然有在昔宋文失禮華樂荷不臣之罰齊靈嬖孽髙厚有從昏之戮以古況今譙王周戴宜受若此之責何加贈復位之有乎今據已顯復則札宜貶責明矣導重議曰省令君議必札之開門與譙王周戴異今札開門直出風言竟實事邪便以風言定褒貶意莫若原情考徴也論者謂札知隗協亂政信敦匡救茍匡救信姦佞除即所謂流四凶族以隆人主巍巍之功耳如此札所以忠於社稷也後敦悖謬出所不圖札亦闔門不同以此滅族是其死於為義也夫信敦當時之匡救不圖將來之大逆惡隗協之亂政不失為臣之貞節者於時朝士豈惟周札邪若盡謂不忠懼有誣乎譙王周戴各以死衛國斯亦人臣之節也但所見有同異然期之於必忠故宜申明耳即如令君議宋華齊髙其在隗協矣昔子糾之難召忽死之管仲不死若以死為賢則管仲當貶若以不死為賢則召忽死為失先典何以兩通之明為忠之情同也死雖是忠之一節亦不必為忠皆當死也漢祖遺約非劉氏不王非功臣不侯違命天下共誅之後吕后侯諸吕周勃從之王陵廷爭可不謂忠乎周勃誅吕尊文安漢社稷忠莫尚焉則王陵又何足言而前史兩為美談固知死與不死爭與不爭茍原情盡意不可定於一槩也且札闔棺定諡違逆黨順受戮凶邪不負忠義明矣鑒又駁不同而朝廷竟從導議成帝時蘇峻之難光祿大夫散騎常侍卞壼率勵散衆及左右吏數百人與賊苦戰死之二子眕盱見父歿相隨赴賊同時見害峻平朝議贈壼左光祿大夫加散騎常侍尚書郎𢎞訥議以為死事之臣古今所重卞令忠貞之節當書於竹帛今之封贈實未副衆望謂宜加鼎司之號以旌忠烈之勳司徒王導見議進贈驃騎將軍加侍中訥重議曰夫事親莫大於孝事君莫尚於忠唯孝也故能盡敬竭誠唯忠也故能見危授命此在人之大節臣子之極行也案壼委質三朝盡規翼亮遭世險難存亡以之受顧託之重居端右之任擁衛至尊則有保傅之恩正色在朝則有匪躬之節賊峻造逆戮力致討身當矢旝再對賊鋒父子并命可謂破家為國守死勤事昔許男疾終猶蒙二等之贈況壼伏節國難者乎夫賞疑從重況在不疑可謂上準許穆下同嵇紹則允合典謨克厭衆望於是改贈壺侍中驃騎將軍開府儀同三司諡曰忠貞祠以太牢贈世子眕散騎侍郎眕弟盱奉車都尉母裴氏撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徴士翟湯聞之歎曰父死於君子死於父忠孝之道萃於一門咸康六年成帝追思壼下詔曰壼立朝忠恪喪身凶寇所封懸逺租秩薄少妻息不贍以為慨然可給實口廪其後盜發壼墓尸僵髮鬢蒼白面如生兩手悉拳爪甲穿達手背安帝詔給錢十萬以修塋兆東陽許孜郡察孝廉不起巾褐終身年八十餘卒於家邑人號其居為孝順里咸康中太守張虞上疏曰臣聞聖賢明訓存乎舉善褒貶所興不逺千載謹按所領吳寧縣牧故人許孜至性孝友立節清峻與物恭讓言行不二當其奉師則在三之義盡及其喪親實古今之所難咸稱殊類致感猛獸弭害雖臣不及見然備聞斯語竊謂蔡順董黯無以過之孜沒積年其子尚在性行純慤今亦家於墓側臣以為孜之履操世所希逮宜標其令迹甄其後嗣以酬既往以奬方來陽秋傳曰善善及其子孫臣不達大體請臺量議疏奏詔旌表門閭蠲復其子孫穆帝永和十二年殷浩卒後將改葬其故吏顧恱之上疏訟浩曰伏見故中軍將軍揚州刺史殷浩體德沈粹識理淹長風流雅勝聲蓋當時再臨神州萬里肅清勳績茂著聖朝欽嘉遂授分陜推轂之任戎旗既建出鎮夀陽驅其豺狼翦其荆棘收羅向義廣開屯田沐雨櫛風等勤臺僕仰憑皇威羣醜革面進軍河洛修復園陵不虞之變中路猖蹶遂令為山之功崩於垂成忠欵之志於是而廢既受削黜自擯山海杜門終身與世兩絶可謂克己復禮窮而無怨者也尋浩所犯蓋負敗之常科非即情之永責論其名德深誠則如彼察其補過罪己則如此豈可棄而不悉法有餘寃方今宅兆已成埏隧已開懸棺而窆禮同庶人存亡有非命之分九泉無自訴之期仰感三良昊天罔極若使明詔爰發旌我善人崇復本官逺彰幽昧斯則國家威恩有兼濟之美死而可作無負心之恨疏奏詔追復浩本官武帝初吉挹為魏興太守苻堅將韋鍾數攻魏興挹屢敗之後賊衆繼至挹力不能支城陷被執不屈而死車騎將軍桓沖上言曰故輕車將軍魏興挹祖朗西臺傾覆隕身守節挹世篤忠孝乃心本朝臣亡兄溫昔伐咸陽軍次灞水挹攜將二弟單馬來奔録其此誠仍加擢授自新野太守轉在魏興久處兵任委以邉戍疆埸歸懷著稱所蒞前年狡氐縱逸浮河而下挹孤城獨立衆無一旅外摧凶鋭內固津要虜賊舟船俘馘千計而賊并力攻圍經歷時月會襄陽失守邉情沮喪加衆寡勢殊以至陷沒挹辭氣慷慨志在不辱杖刃推戈期之以隕將吏持守用不即斃遂乃杜口無言絶粒而死挹參軍史頴近於賊中得還齎挹臨終手疏并具説意狀挹之忠志猶在可録若蒙天施垂曲宥之恩則榮加枯朽惠隆泉壤矣帝嘉之追贈益州刺史武帝太元中封羊祜兄玄孫之子法興為巨平侯邑五千户以桓玄黨誅國除尚書祠部郎荀伯子上表訟之曰臣聞咎繇無嗣臧文以為深嘆伯氏奪邑管仲所以稱仁功髙可百世不泯濫賞無得崇朝故太傅巨平侯羊祜明德通賢國之宗主勳參佐命功成平吳而後嗣闕然蒸嘗莫寄漢以蕭何元功故絶世輒繼愚謂巨平之封宜同鄼國故太尉廣陵公靳準黨翼賊倫禍加淮南因逆為利竊饗大邦值西朝政刑失裁中興因而不奪今王道維新豈可不大判臧否謂廣陵國宜在削除故太保衛瓘本爵災陽縣公既被橫害乃進茅土始贈蘭陵又轉江夏中朝名臣多非理終瓘功德無殊而獨受偏賞謂宜罷其郡封復邑災陽則與奪有倫善惡分矣竟寢不報王敦之難刁協死敦平周顗戴若思等皆被顯贈惟協以出奔不在其例咸康中協子彛上疏訟之在位者多以明帝之世褒貶已定非所得更議且協不能抗節隕身乃出奔遇害不可復其官爵也丹陽尹殷融議曰王敦惡逆罪不容誅則協之善亦不容賞若以忠非良圖謀事失算以此為責者蓋此於譏議之間耳即凶殘之誅以為國刑將何以沮勸乎當敦専逼之時慶賞威刑専自己出是以元帝慮深崇本以協為比事由國計蓋不為私昔孔寧儀行父從君於昏楚復其位者君之黨故也況協之比君在於義順且中興四佐位為朝首于時事窮計屈奉命違寇非謂逃刑謂宜顯贈以明忠義恭帝時傅季友代宋國公劉裕作求加贈劉穆之表曰臣聞崇賢旌善王化所先念功簡勞義深追逺故司勳秉䇿在勤必記德之休明沒而彌著故尚書左僕射前軍將軍臣劉穆之爰自布衣協佐義始內竭謀猷外勤庶政密勿軍國心力俱盡及登庸朝右尹司京畿敷讃百揆翼新大猷頃戎車逺役居中作捍撫寧之勳實洽朝野識量局致棟幹之器也方宣讃盛化緝隆聖世志績未究逺邇悼心皇恩褒述班同三事榮哀既備寵靈已泰臣伏思尋自義熙草創艱患未弭外虞既殷內難亦洊時屯世故靡有寧嵗臣以寡劣負荷國重實賴穆之匡翼之勳豈唯讜言嘉謀溢于民聽若乃忠規密謨潛慮帷幕造膝詭辭莫見其際事隔於皇朝功隱於視聽者不可勝記所以陳力一紀遂克有成出征入輔幸不辱命微夫人之左右未有寧濟其事者履謙居寡守之彌固每議及封爵輒深自抑絶所以勳髙當年而茅土弗及撫事永念胡寧可昧謂宜加贈正司追甄土宇俾忠貞之烈不泯於身後大賚所及永秩於善人臣契闊屯夷旋觀終始金蘭之分義深情感是以獻其乃懷布之朝聽所啓上合請付外詳議齊髙帝建元初故宋建平王景素秀才劉璡上書曰臣聞曽子孝於其親而沈乎水介生忠於其主而焚於火何則仁也不必可依信也不必可恃昔者墨翟議雲梯於荆臺之下宋人逐之夷叔為衛君隱難於晉公子殪之李牧北折龍庭之旗南拒全秦之卒趙君不圖其功賜以利劍陳蕃白首固義忘生事主漢靈不明其忠卒被刑戮彼數子者皆身栖青雲之上而困於泥塵之裏誠以危行不容於衰世孤立聚尤於衆人加讒諂蛆蠱其中謗隙蜂飛而至故也臣聞浸潤之行骨肉離絶疑似一至君臣易心此中山所以歔欷奏樂孟博所以慷慨囊頭者也臣每惟故舉將宋建平王之禍悲徹骨髓氣凝霜霰今旋鼎啓運人神改物生罪尚宥死寃必申臣誠不忍王之負謗而不雪故敢明言其理臣聞孝弟為志者不以犯上曽子不逆薪而爨知其不為暴也秦仁獲麑知其可為傅也臣聞王之事獻太妃也朝夕不違養甘苦不見色帳下進珍饌太妃未食王投箸輟飯太妃起居有不安王傍行蓬髮臣聞求忠臣者於孝子之門安有孝如王而不忠者乎其可明一也當泰始元徽中王公貴人無謁景寧陵者王獨抗情而行不以趨時捨義出鎮入朝必俯拜陵所王尚不棄先君豈背今君乎其可明二也王博聞而容衆與諫而愛士與人言詬詬若有傷聞人之善譽而進之見人之惡掩而誨之李蔚之蓬蘆之寒素也王枉駕而訊之何季穆等宣簡王之舅也王提挈以升之王虛己以厚天下之士尚不欲傷一人之心何乃親戚圖相菹膾乎其可明三也臣昔以法曹參軍奉訊於聽朝之末王每斷獄降聲辭和顔色以待士女之訟時見夏伯以童子縲縶王愴然改貌用不加刑徐州嘗嵗飢王散秩粟俸帛以繼民之乏蠲理寃疑咸息繇務所在皆有愛於民臣聞善人國之紀也安有仁於民庶而虐其宗國者乎其可明四也王修身潔行言無近雜內去聲酌之娛外無田弋之好每所臨踐不加穿築直衛不繁第宅無改荆州髙齋刻楹柏構王廢而不處昔朝廷欲賜王東陵甲第又辭而不當兩宫所遺珍玩塵於笥篋無他嬖私不耽內寵姬嬙數人皆詔令所賜王身食不踰一肉器用瓦素時有獻鏤玉器王顧謂何昌寓曰我持此安所用哉乃謝而反之王恭巳蹈義若此其可明五也王之在荆州也時獻太妃初薨宋明帝新棄天下京畿諸王又相繼非命王乃徴入為太常楚下人士並勸勿下王謂為臣而距先皇之命不忠為子不奉親之窀穸不孝於是棄西州之重而匍伏北闕王若志欲倔強便應髙枕江漢何為屈折而受制於人乎其可明六也王名髙海內義重太山耆幼懷仁士庶慕德故從昏者忌明同枉者毁正搦弦為鉤張一作百行坐咳嚏皆生風塵會王季符負􅖄流謗事會讒人之心權醜相扇鴟梟奮翼王雖遘愍離凶而誠分彌欵散情中孚揮斥滿素虞玩之銜使歸旋世子入質京邑續解徐州請身東第後求會稽降階外撫虞玩殷煥實為詮譯誠心殷勤備留聖聽王若侜張跋扈何事若斯其可明七也自是以後日同殊論蒼梧之衰德既彰羣小之姦慝彌廣下盈其毒上不可依時長王並見誅鋤公卿如蹈虎尾衆人翕翕莫不注仰於王廂閣諸人同謀異志王心不從利忠不背本執周天賜而斬之以距王宜與等遣司馬孫謙歸欵朝廷王若欲擬非覬寧當如此乎其可明八也又是年五月以後道路皆謂阮佃夫等欲潛圖宫禁因兵北襲而黃回髙道慶等傅搆其事武人奬亂更相恐脅至六月而京師徴賦車徒將講衆北壘都鄙疑駭僉言釁作垣祗袒因民情囂蕩揚聲北奔紿辭惑衆窮亂極禍會州人自都還掖門已閉殊不知臺中安不王既素籍異論謂為信然收率疲弱志在投散冰炭在懷但恐遲後何圖兵以順出翻為逆動乎夫往來之人喧譁幻惑皆出輦轂非從徐州起也且臺以六月晦夜無何呼北兵以至皆登陴抽刃而朱方七月朔猶緩帶從容其晚聞哀都變亂始乃鳩兵簡甲耳王豈先造禍哉其可明九也王聞京室有難坐不安食不甘言及太后未嘗不交巾掩泣又臨危之際撫檻而嘆曰吾恐三才於斯絶矣兹豈不誠在本朝以天下為憂乎自非深忠逺槩孰能身滅之不恤獨眷眷國家安危哉其可明十也夫王起兵之日止在匡救昏難放殛姦盜非他故也請較言之當時君臣之道治亂云何楊運長阮佃夫為有􅖄邪為無􅖄邪若其無􅖄何故為戮若其有􅖄討之何辜王豈不知君親之無將乎顧以救火之家豈遑先白丈人非不恭也徒以運屬陵喪智力無所用之蹉跌傾覆此乃時也豈謂反乎果然今日王亡明日宋亡王何負於社稷何愧於天下哉臣聞武王克商未及下車而封王子之墓漢髙定天下過大梁躡燕代修信陵之祀存望諸之裔晉世受命亦追王陵之寃而詔其孫為郎夫比干殷辛之罪人也無忌魏之疑臣也樂毅燕之逃將也彥雲齊之賊而晉害也適逢聖明之君革運創制昭功誠蕩嫌怨請議天下之善也或殊世而相明故四賢咸濟其令問三后馳光於萬葉君子榮其輝小人服其義今陛下尊英雄之髙軌振逸世之竒聲何至仍衰世之異議以掩賢人之名哉若王之中外不明終始蹈德臣懼方今之人不復為善矣且世之興衰何代無有今齊苖裔萬世之後其能無汚隆乎茍前良可廢何以勸後之能者伏願上同周漢西晉之如彼下為來胤垂範之如此倘能降明詔踐枉道使往王得洗謗議拯冥魂賜以王禮反葬則民之從義猶若回風之卷草也臣聞鸛鳴臯垤則降隂吐雨騰蛇聳躍而沈雲鬱冥但傷臣言輕落毛身如橫芥神髙聽邈終焉莫省直欲內不負心庶將來知王之意耳明帝建武中任昉代范雲作表求立太宰竟陵王子良碑曰臣雲言原夫存樹風猷沒著徽烈既絶故老之口必資不刋之書而藏諸名山則陵谷遷貿府之延閣則青編落簡然則配天之迹存乎泗水之上素王之道紀於沂川之側由是崇師之義擬迹於西河尊主之情致之於堯禹故精廬妄啓必窮鐫勒之盛君長一城亦盡刋刻之美况乎甄陶周召孕育伊顔故太宰竟陵文宣王臣某與存與亡則義形社稷嚴天配帝則周公其人體國端朝出藩入守進思必告之道退無茍利之専五教以倫百揆時序若夫一言一行盛德之風琴書藝業述作之茂道非兼濟事止樂善亦無得而稱焉人之云亡忽移嵗序鴟梟東徙松檟成行六府臣僚三藩士女人蓄油素家懷鉛筆瞻彼景山徒然望慕昔晉氏初禁立碑魏舒之亡亦從班列而阮略既泯故首冒嚴科為之者竟免刑戮置之者反蒙嘉歎至於道被如仁功參微管本宜在常均之外故太宰淵丞相嶷親賢並軌即為成規乞依二公前例賜許刋立寧容使長想九原樵蘇罔識其禁駐蹕長陵輶軒不知所適臣里閭孤賤才無可甄值齊網之𢎞弛賔客之禁䇿名委質忽焉二紀慮先犬馬厚恩不答而弊帷毁蓋未蓐螻蟻珠𥜗玉匣遽飾幽泉陛下𢎞奬名教不隔微物使臣得駿奔南浦長號北陵既曲逢前施實仰覬後澤倘録杜預山頂之言庶存馬駿必拜之感臨表悲懼言不自宣後魏孝文帝太和中著作佐郎成淹上表曰臣聞經疆啓宇實良將之功褒德酬庸乃聖王之務昔薑公杖鉞開隆周之基韓生秉旄興鴻漢之業故能賞超當時名垂前史若閫外功成而流言內作人主猜疑良將懷懼樂毅所以背燕章邯所以奔楚至如鄧艾懷忠矯命寧國赤心皎然幽顯同見而橫受屠戮良可悲哀及士治伐吳奮不顧命萬里浮江應機直指使孫皓君臣輿襯入洛大功亦舉讒書驟至內外唱和貝錦將成微晉武之鑒亦幾於顛沛矣每覽其事常為痛心聖主明王固宜深察臣伏見故征南大將軍開府儀同三司青州刺史濟南王慕容白曜祖父相資世酋東裔值皇運廓被委節臣妾白曜生長王國飲服道教爵列上階位登帝伯至天安初江隂夷楚敢拒王命三方阻兵連城嶽峙海岱蒼生翹首拯援聖朝乃眷南顧思救荒黎大議廟堂顯舉元將百寮同音僉曰惟允遂推轂委誠授以専征之任握兵十萬杖鉞一方威陵河濟則淮徐震懼師出無鹽而申纂授首濟北太原同時消潰麋溝垣苖相尋奔走及回麾東掃道固銜璧盤陽梁鄒肉袒請命于時東陽未平人懷去就沈文靜髙崇仁擁衆不朝扇擾邉服崔僧祐蓋次陽陳顯達連兵淮海水陸鋒起揚旌而至規援青齊士民忷忷莫不南顧時兵役既久咸有歸心而白曜外宣皇風內盡方略身擐甲胄與士卒同安撫初附示以恩厚三軍懷挾纊之溫新民欣來蘇之澤遂使僧祐擁徒弭斾效順軍門文靜崇仁棄城竄海次陽顯達望塵南奔聲震江吳風偃荆漢及青州剋平文秀面縛海波清靜三齊克定逖彼東南永為國有使天府納六州之貢濟泗息烽警之虞開岱宗封禪之略闢山川望秩之序斯誠宗廟之靈神算所授然抑亦白曜與有力矣及氛翳既靜爵命亦隆榮燭當時聲譽日逺而民惡其上妄生尤隙因其功髙流言惑聽巧偽亂真朱紫難辨傷夷未瘳合門屠戮鴻勳盛德蔑爾無聞有識之徒能不悽愴臣謂白曜䇿名王庭纍荷榮授歷司出內世載忠美秉鉞啓蕃折衝敵國開疆千里拔城十二辛勤於戎旅之際契闊於矢石之間登鋒履危志存靜亂及方難既夷身膺髙賞受胙河山與國升降六十之年寵靈已極觀其立功足明機運豈容僥幸更邀非望者乎且於時國家士馬屯積京南跨州連鎮勢侔雲嶽主將驍雄按鉀在所莫不殉忠死難效節奉時比之不可生心白曜足知之矣況潛逆阻兵營岱厭亂加以王師仍舉州郡屠裂齊民勞止神膽俱喪亡燼之衆不可與圖存離敗之民不可與語勇哉白曜果毅習戎體嫻兵勢寧不知士民之不可藉將士之不同已據強兵之勢因塗炭之民而欲立非常之事此愚夫之所弗為也料此推之事可知矣伏惟陛下聖鑒自天仁孝宰世風冠宇宙道超百王開國以來諸有罪犯極刑不得骸骨者悉聽收葬大造之恩振古未有而白曜人舊功髙嬰禍淪覆名滅國除爵命無紹天下衆庶咸共哀憐方之餘流應有差異願陛下揚日月之光明勳臣之績垂天地之施慰僵尸之魂使合棺定諡歿有餘稱選其宗近才堪驅䇿錫以微爵繼其絶世進可以奬勸將來退可以顯國恩澤使存者荷莫大之恩死者受骨肉之惠豈不美哉仰惟聖明霈然昭覽狂瞽之言伏待刑憲髙祖覽表嘉愍之唐太宗貞觀十一年行幸過漢太尉楊震墓傷其以忠非命親為文以祭之僕射房玄齡進曰楊震雖當夭枉數百年後方遇聖君停輿駐蹕親降神作此文可謂雖死猶生沒而不朽使伯起有靈當欣躍於九泉之下矣伏讀天文且戚且慰凡百君子可不朂勵名節知為善之效乎玄宗天寶末張巡死節雎陽人􅎱其功以為降賊肅宗未及知進士李翰傳巡功狀表上之曰臣聞聖主褒死難之士養死事之孤或親推轜車或追建邑封厚死以慰生撫存以答亡君不遺於臣臣亦不背其君也自賊臣搆亂據雒陽引幽朔以吞河南故御史中丞贈揚州大都督張巡忠誼奮發率烏合守雍丘潰賊心腹及魯炅棄甲宛葉哥舒翰敗績潼關賊遂盜神器鴟峙二京南臨漢江西逼岐雍羣帥列城望風出奔巡守孤城不為却賊欲繞出巡後以擾江淮巡退軍睢陽扼東南咽領自春訖冬大戰數十小戰數百以弱制強出竒無窮殺馘凶醜凡十餘萬賊不敢越睢陽取江淮江淮以完巡之力也城孤糧盡外救不至猶奮羸起病摧鋒陷堅三軍噉膚而食知死不叛城陷見執卒無撓詞慢叱凶徒精貫白日雖古忠烈無以加焉議者罪巡以食人愚巡以守死臣竊痛之夫忠者臣之教恕者法之情巡握節而死非虧教也析骸以爨非本情也春秋以功覆過書赦過宥刑在易遏惡揚善為國者録用棄瑕今者乃欲議巡之罪是廢教絀節不以功掩過不以刑恕情善可遏惡可揚瑕録而用棄非所以奬人倫明勸戒也且祿山背德大臣將相比肩從賊巡官不朝宴不坐無一伍之士一節之權徒奮身死節以動義旅不謂忠乎以數千卒橫挫賊鋒若無巡則無睢陽無睢陽則無江淮有如賊因江淮之資兵廣而財積根結盤據西向以拒雖終殱滅其曠日持久必矣今陜鄢一戰逆徒駭北王師震其西巡扼其東此天使巡舉江淮以待陛下師至而巡死不謂功乎古者列國侵伐猶分災救患諸將同受國恩奉辭伐罪巡固守亦待外援援不至而食盡食盡而及人則巡之情可求矣假巡守城之初已計食人損數百衆以全天下臣尚謂功過相掩況非素志乎夫子制春秋明褒貶齊桓公將封禪略不書晉文公召王河陽書而諱之巡蒼黃之罪輕於僭禪興復之功重於糾合今巡子亞夫雖得官不免飢寒江淮既巡所保户口充完宜割百户俾食其子且強死為厲有所歸則不為災巡身首分裂將士骸骼不掩宜於睢陽相擇髙原起大冢招魂而葬旌善之義也臣少與巡遊哀巡死難不覩休明唯令名其榮祿也若不時紀録月日濅悠或掩而不傳或傳而不實巡生死不遇誠可悲悼謹撰傳一篇昧死上倘得列于史官死骨不朽帝繇是感悟而巡大節白於世義士多之德宗時中書侍郎同中書門下平章事陸贄奏曰右田緒使節度隨軍劉瞻送書與臣其書意緣奉進止令為其亡父承嗣撰遺愛碑文故送前件馬絹等以申情貺臣先奉恩旨令撰碑文于今半年竟未綴緝良以勸戒之道忠義攸先褒貶之詞春秋所重爵位有僥幸而致名稱非詐力可求將使循軌轍者畏昭憲而莫渝怙姦妄者顧清議而知恥仲尼修春秋而亂臣賊子懼豈必臨之以武脅之以刑哉褒貶茍明亦足助理田承嗣阻兵犯命靡惡不為竟逭天誅全歸土壤此乃先朝所愧恨義士所惋嗟今田緒尚干宸嚴請頌遺愛微臣隘局實憤於心謬承恩光備位台輔既未能滌除姦慝匡益大猷而又飾其愧詞以贊凶德納彼重賂以襲貪風情所未安事固難強是以屢嘗執翰不能措詞輒投所操太息而止緣承聖誨姑務懷柔昨見田緒使人臣亦婉為報答但告云所為碑頌皆奉德音既異私情難承厚貺候稍休暇續當撰成既無拒絶之言計亦不至疑阻其來書謹封進所送馬及絹等令劉瞻便領却回訖不敢不奏貞元中咸陽人或上言見白起云請為國家扞禦西陲既而吐蕃入寇邉將敗之上以為信然欲於京城立廟贈司徒李泌曰今將帥立功而陛下褒賞白起臣恐邉臣解體矣且立廟祈禱將長巫風今杜郵有舊祠請詔葺之則不至驚人耳目矣且起列國之將贈三公太重贈兵部尚書可也從之宣宗大中初上與宰相論元和循吏孰為第一周墀曰臣嘗守土江西聞觀察使韋丹功德被於八州沒四十年老稚歌思如丹尚存上即詔史館修撰杜牧撰丹遺愛碑仍擢其子宙為御史宋仁宗康定元年知長垣縣蘇舜欽上疏曰臣近到闕聞黃德和以退軍及妄奏劉平石元孫叛逆朝廷已從軍法處分然劉平石元孫以血戰陷沒死於賊手初朝廷未能辨明即時以兵卒監圍其第及德和既已伏辜二族未霑恩澤遷延纍日人頗疑惑古者舍爵䇿勳貴其速也此雖敗衄是亦勤勞於時伏望陛下斷自睿意詔有司於西郊備禮致祭陛下出次素服西向舉哀故禮云軍有憂則素服哭於庫門之外赴車不載􅐤韔蓋古者之義也伏願即日降册追贈賻其家族爵其子弟使死者有知豈無𡨕助生者懷感必當盡忠烈士義夫聞之震激人人思為陛下用也劉平子弟臣雖不識聞其頗知邉事用敵西寇必有成功況國恥家讎異於他將則吳用子胥唐拜田布即其義也至和二年知制誥劉敞奏曰臣等據祠部員外郎直集賢院祖無擇奏伏見至聖文宣王四十七代孫孔宗願襲封文宣公乃是其人未死已賜諡矣臣竊觀前史孔子之後襲封者衆在漢魏則曰褒成褒聖宗聖在晉宋亦曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封以鄒國唐初曰褒聖或為君或為侯為公為大夫使奉祭祀唯漢平帝追諡孔子為褒成宣尼公遂以均為褒成君至唐開元二十七年追諡為文宣王又以其後為文宣公是皆以祖之美諡而加後嗣生而諡之不經甚矣欲乞明詔有司詳求古訓或封以小國或取尊儒褒聖之義别定美號加于封爵著于令式使千古之下無以加於我朝之盛典也右奉聖旨送兩制詳議者臣等謹按漢元帝初元元年以師孔霸為關內侯食邑八百户號褒成君而霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食八百户祀孔子及霸卒子福嗣福卒子房嗣房卒子莽嗣皆稱褒成君至平帝元始二年始更以二千户封莽為褒成侯而追諡孔子曰褒成宣尼公以此觀之則褒成者國也宣尼者諡也公侯者爵也褒成宣尼公者猶曰河間獻王云爾蓋推宣尼以為褒成祖非用褒成以為宣尼諡也唐世不深察此義以褒成為夫子之諡因疑霸等號封褒成者皆襲其祖之舊耳故遂封夫子文宣王而爵其後文宣公考校本末甚失事理因循承襲至今不改先帝既封泰山親祠闕里又加文宣以至聖之號則人倫之極致盛德之顯名盡在此矣尤非其子孫臣庶所宜襲處而稱之者也臣等以謂無擇議是可用其文宣王四十七代孫孔宗願伏乞改賜爵合若褒成奉聖之比上足以尊顯先聖有不可階之勢下不失優異孔氏使得守繼世之業改唐之失法漢之舊傳曰必也正名又曰稽古立事可以永年此類之謂也嘉祐七年知諫院司馬光上論后妃封贈劄子曰臣伏聞學士院新定後宫封贈父祖制度皇后與妃皆贈三代臣竊以為不可夫禮之所慎在於尊卑之分别嫌明微故國君沐梁大夫沐稷士沐粱蓋以大夫貴近於君故推而逺之以防僭逼之端士賤逺於君雖與之同物無所嫌也況后妃之際實治亂之本聖人於此尤兢兢焉皇后敵體至尊母儀四海六宫之內無與等夷妃品秩雖貴而皇后猶為女君今封贈之典混而為一臣實懼焉雖陛下聖明宫壼之政貴賤有倫必無僭逼之憂然非所以别嫌疑防萌兆垂法度示子孫也昔漢文帝幸郎署慎夫人與皇后同坐中郎將袁盎引却慎夫人席曰且陛下既以立后慎夫人乃妾妾主豈可同坐哉文帝善其言彼少頃同席盎猶以為不可而犯顔力爭況著之典䇿以為百世之法乎臣謹按天聖中遇南郊大禮皇大后追贈三代太妃止贈二代然則妃贈三代乃近嵗之失不可以不正也議者或謂外廷之臣凡入兩府者皆贈三代妃正一品禮不可以後之臣竊以為不然聖王制禮內外異宜不可均一自宰相樞密副使名秩雖殊而比肩為臣共同職業俱贈三代不足為嫌皇后與妃位次相亞而有妾主之分以此尤宜分别名器使之著明以防後世之有僭差不可鹵莽滅裂茍然而已也臣愚欲望陛下特降聖旨改定新制自今後唯皇后得贈三代自妃以下皆不過二代若以外廷之臣封贈太優則乞自今後唯宰相樞密使得贈三代自參知政事以下止於二代庶幾得禮之宜八年光又乞罷進奏補外親劄子曰臣竊見諸路轉運使提點刑獄知州軍等各遣親屬進奉至京師朝廷不問官職髙下親屬逺近一例推恩乃至班行幕職權知州軍或所遣之人不係親屬者亦應齋郎及差使殿侍此蓋國初承五代姑息藩鎮之弊故有此例後來人主嗣位之初大臣因循故事不能革正然以理推之國家爵祿本待賢才及有功效之人今使此等無故受官誠為太濫況近日官吏繁冗十倍於國初之時朝廷深知其弊所以數年前别定條例減省諸色奏蔭之數若進奏之人皆得一官則併又增數百入仕之人向來減省蔭奏委為虛設今縱不能盡罷此等恩澤其進奏人若係五服內親者或乞等授一官其五服外親及不係親屬者並量賜金帛罷去庶幾少救濫官之失光又乞矜恤陳洙遺孤狀曰右臣竊見殿中侍御史裏行陳洙資性忠果憂公忘私稟命不永奄辭聖世垂沒之際猶上章奏搢紳之倫靡不嗟惜宜有旌嘉異於諸臣家素貧乏孤遺頗衆歸葬閩越道塗險逺伏望朝廷特賜矜憫依監察御史裏行張宗誼例除子男一人官及乞降朝旨下衢信建三州候洙喪柩至彼差人防護津送前去亦足以示朝廷褒直勸忠終始之恩也知湖州胡宿乞為晉太傅謝安置守冢禁樵採表曰春秋之記太上立德其次立功謂之不朽聖人之制能禦大災能捍大患則必見祭至於封表閭墓禁止樵蘇尋所來而實繁蓋難得而疏舉雖聖賢相去事業有間迹其大指所以褒德旌功而已竊見晉太傅諡文靖公謝安挺生江表忠存王室甫從衡門未褫韋帶已積台輔之器便繫蒼黔之心及起東山相簡文帝摧桓溫九五之逼破苻堅百萬之衆名蓋當世功濟諸華號文武之偉人為風流之稱首張文規所撰吳興録稱安墓在長城縣南六十五里初葬建康之梅山為陳始興王叔陵發其冢裔孫夷吾為長城令徙於縣南三鴉岡按長城即今長興縣臣昨受詔除出忝州任到官之日遂移本縣訪墳柏所在據大理寺丞知縣事裴大亮狀於縣南萬安鄉三鴉岡訪得安冢履地十畝有畸古老相傳謂之謝墓田路去縣與吳興録所載略同墓旁社户十六嵗時祭拜舊有叢祠不堪其陋臣量破公省錢委大亮移置佳處重建祠堂凡屋十二遣工往塑其像冠服儀衛悉用當時之制然祠墓差僻人迹罕至若無給復之守恐罹樵牧之患昔信陵濁世之公子漢初蒙守冢之給介推霸者之陪𨽻晉復啓環山之封況如安者髙德卓然雖人隔本朝功訖前世穆然清風猶在庶物臣每見郊丘所肆赦前代忠烈立廟所在莫不申飭長吏嚴加虔奉欲乞聖慈特降宸旨於安冢旁申禁樵採給復五家以備灑掃守護之役敕州縣官吏嵗時祠祭以明聖朝紀元功褒有德之意歷代名臣奏議卷二百八十三
