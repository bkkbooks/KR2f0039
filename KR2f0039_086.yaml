body:
  text: 歴代名臣奏議卷八十六眀楊士竒等撰經國宋高宗建炎二年開封尹宗澤上䟽曰易曰幾者動之微吉之先見者也君子見幾而作不俟終日孟子曰雖有鎡基不如待時盖天下之事見幾而為之待時而措之則事無不成苟或失焉必至汗漫委靡而不振矣方今輦轂之下民俗安靖宗廟社稷儼然如故以致收復伊洛而敵人過河捍蔽滑臺而敵騎屢敗河東河北山寨義民數遣人至臣䖏乞出給榜旗引領舉踵日望官兵之至皆欲戮力恊心掃蕩畨寇以幾言之則大宋中興之盛於是乎先見矣以時言之則中原恢復之期於是乎可必矣惟在陛下見幾乗時早還華闕與忠臣義士究圖事功則萬舉萬全可以復境土而成中興也或者以謂自揚至汴時有小寇恐屬車之来途中不能無虞臣謂造此言者乃姦憸小人自為身謀耳殊不知盜賊所以作者誠縁法駕乆寓外郡國勢未强天下不能㝎于一故時有竊發之事乃若六龍来復宅中圖乂則比屋歡呼人各歸業强不􅓸弱衆不暴寡豈復有盜賊耶此事甚易眀此理甚易知然而姦邪之蔽扵營私往往不肯開陳而力為陛下詳説者惟老臣而已臣所以再三言之者豈好辯哉恭念祖宗二百年舊都不忍為姦臣委去也恭念陛下聰眀齊聖之資不忍為姦臣蔽䝉也念赤子之嗷嗷不忍為姦臣坐視而不救也念金人猖獗不忍為姦臣縦敵而不殺也伏願陛下念兹在兹斷自淵衷速回鑾輿上以對祖宗之神靈下以慰黎元之懐想外以平醜𩔖之侮拂則天下大㝎指日可期書曰勅天之命惟時惟幾望陛下留神而三復之臣今遣僚吏呼延次升及臣之子頴詣行闕以聞澤又上䟽曰臣得范瓊書叙説所統軍兵有海内招安使臣水軍奉聖㫖令扵儀真駐劄教習水戰抗扼上流於三月八日已到真州臣讀此語而不知扈蹕之臣誰為陛下建此議也且王者無外其規模約束當使守在四夷昔楚人城郢史猶鄙之況陛下奄有九有之時可規規孑孑為偏覇之事乎兹豈憸人之欲虚張敵勢以為可防其意望遷延六龍進發之期爾殊不知此聲一傳則四方驚愕必以謂中原不守遂為江寧抗扼之計如是則何以綏安四海之聽乎盖天子為君萬邦而元后作民父母陛下回鑾登樓肆赦則普率之人欣欣恱而相告曰天子宅中圖乂則萬邦㒺不率俾矣元后正位丕承則兆民浸浸於變時雍矣夫如是将見金人不足患而中興之功與天比崇若使范瓊教習水戰是聖心猶豫尚緩還期則中外播聞愈自懾怯則萬國何自而咸寧乎此臣所以拭目注望屬車之塵不忘夙夜伏願陛下眀詔范瓊整促人馬不須更習水戰祇備扈駕歸御京闕毋使羣黎百姓齎咨涕泣則豈惟老臣之幸寔天下萬世之幸澤又上䟽曰臣竊見漢光武用寇恂為潁川太守因従車駕撃隗囂潁川盜賊羣起帝頋謂恂曰潁川廹近京師當以時㝎獨卿能平之恂對曰潁川惡少輕剽奚能為哉但聞陛下有事隴蜀故乗間竊發耳若乗輿南向賊必惶怖歸死臣願執鋭前驅帝即日命駕南征盜賊悉降遂建東漢中興之業臣竊見近日有招安到丁進者數十萬衆願為陛下守護京城又李成願扈従還闕即渡河備禦敵軍又没角牛楊進等領衆百萬亦願率衆渡河迎取二聖兹三頭項人馬非潁川比也今皆披瀝肝膽同寅恊恭共濟國事臣聞得道者多助多助之至天下順之果陛下千乗萬騎来歸九重遹追我太祖太宗奕世聖人二百年大一統基業則天下必心悦而誠服庶績其凝萬國咸寧矣尚何盜賊憑陵之足慮乎臣敢瀝悃誠再冒天聽伏望裁赦澤又疏曰臣聞孟子曰雖有鎡基不如待時故君子不先時而起不後時而縮當其可而已易曰幾者動之微吉之先見者也故君子見幾而作不俟終日不曰如之何而已恭惟我國家曩縁敵人侵犯郊畿殘破州縣恣為誕妄百端邀求今天意悔祻人心助順考時與幾寔陛下中興之㑹也古聖人勅天之命惟時惟幾者盖以時哉不可失而知幾若神故也臣觀京師城壁已増固矣樓櫓已脩飾矣龍濠已開濬矣器械已足備矣寨柵已羅列矣戰陳已閲習矣人氣已勇鋭矣汴河蔡河五丈河皆已通流泛應綱運陜西京東滑臺京洛畨賊皆已掩殺潰遁矣天下萬邦與畿甸生靈夙夕祈天而請者鄉南懇禱而願者但望陛下千乗萬騎號令風伯雨師清塵灑道翠華回輦歸御九重為四海九州作主耳且一人有慶兆民頼之兹其時也茲其幾也臣願陛下毋聽姦邪之言而忽其時忘其幾天下幸甚果怠兩河山寨之心與沮萬民敵愾之氣則天下危矣願陛下毋循東晉既覆之轍臣老矣不勝至誠惻怛懇切之至願陛下哀憐之澤又上䟽曰臣聞孟子言術不可不慎也矢人惟恐不傷人函人惟恐傷人巫匠亦然臣因斯語始知人心所存之邪正與所作之是非若以迹槩之了然區分如辨黑白夫忠義之人動容周旋無非忠義而不忠不義之事無自入焉故其於上下愛戴保護不啻如函人惟恐其傷之也彼不忠不義之人動容周旋亦無非不忠不義而忠義之道無自入焉故其於上下毁裂擯棄不啻如矢人惟恐其不傷之也恭惟我國家曩縁敵人肆横殘破州縣圍閉京城刧掠邀求靡有紀極以至强迎二聖后妃親王與諸天眷䝉塵北去凡忠義之士莫不痛心疾首泣血奮厲佐佑陛下張皇六師震耀神武緫領貔貅之士掃蕩沙漠迎奉二聖来歸京師俾中原生靈還㝎安集㒺或流散愛戴其上保護其下夙夜念念想如函人焉惟恐其或傷之也其不忠不義者但知持禄保寵動為身謀謂我祖宗二百年大一統基業不足惜謂我京城宗廟朝廷府藏不足戀謂二聖后妃親王天眷不足救謂諸帝諸后山陵園寝不足護謂周室中興不足紹謂晉室覆轍不足羞謂廵狩之名為可效謂偏地之伯為可述儲金幣以為敵資樁器械以為敵用禁守禦之招募慮勇敢之赴敵也掊保甲以助軍慮流離之安業也欺㒺天聽􅓸蔑下民凡誤國之事無不為之猶矢人焉惟恐其或不傷之也臣願陛下驗已試之迹以道槩之則人心所存之邪正與所作之是非自然區分無足疑矣臣衰老孱懦誤䝉陛下識擢俾留守京城兼開封尹事臣砥礪瀝竭知無不為惟恐失措有誤國家大計然臣每所申奏若非陛下察臣斷斷孤忠憐臣悄悄見愠體天地之大德覆護擴日月之大眀照臨臣與血屬當膏砧斧虀粉萬状矣尚安能為陛下保釐尹正使京城市井里巷安居樂業熈熈皥皥如我祖宗太平之時乎臣之至此豈止謗書盈箧而已耶臣願陛下六龍萬乗早歸大内下慰四海生靈瀝血懇切之望臣之言此寔出悃誠痛切憤悶所以不避姦邪詆誣不避冒犯誅戮臣願陛下降臣此言榜之朝堂俾應在朝臣僚寔封章䟽指摘臣言如臣言稍渉狂妄乞正典刑眀臣罪惡如臣言果符忠義乞降詔勅眀告回鑾之期庶安天下之聽此事甚大恭俟睿慈洞察勿貳勿疑澤又上䟽曰臣犬馬之年已七十矣陛下不以臣衰老無用付之東京留鑰臣自去年七月到任夙夜究心營繕樓櫓城壁掃除宫禁闕廷分布柵寨訓練士卒教習車陣比及終冬諸事稍稍就緒都城貼然風物如舊人人延頸跂踵日夜徯望聖駕還闕臣以故自今年正月三日兩次遣屬吏及臣之子捧表逺詣行在投進祈請車駕西上歸肆大赦於宣徳門使天下曉然皆知陛下言旋舊都再造王室命令用是通達盜賊用是消弭無復有方命阻兵之患然後容臣為陛下條畫措置造膝陳請遣一使泛海道入高麗諭以元豐惇好之舊令出兵攻金人之西又復遣官従間道趨河東諭折氏脩其舊職以固吾圉使三陲交攻金人令彼應敵不暇吾方大舉六月之師一道由滑濬一道出懐衛渉河並進北首燕路訪大遼子孫興滅繼絶約為與國則燕冀之感恩荷徳不患不為吾用如此則金人勢必孤弱自可縛而臣之二聖天眷自此決有歸期兩河故地自此決可收復而況兩河之人感祖宗二百年涵養之澤雖陷敵踰年而戴宋之心初無携貳使吾大兵渡河而戰則東北人民必有背敵歸我前徒倒戈攻于後以北誰不願為吾死孟子曰雖有智慧不如乗勢雖有鎡基不如待時今時則易然也臣甞以今日時勢觀之天意悔祻人心固結雖三尺童子争欲奮臂鼓勇復祖宗之境土迴二帝之鑾輿況當六月宣王北伐之時機㑹間不容髮陛下何憚而不亟還京師使臣獲奉咫尺之威請借筯以籌黄帝書曰日中必熭操刀必割此言時不可失也諺曰當斷不斷反受其亂此言斷不可誣也今日之事臣願陛下以時果斷而行之毋惑讒邪之言毋沮忠鯁之論倘陛下以臣言為是願大駕即日還都使臣為陛下得盡愚計若陛下以臣言為非願陛下即日放罷老臣或重竄責臣所不辭惟眀主可與忠臣言臣故昧死以聞澤又上䟽曰臣聞詩於小雅載六月宣王北伐之事盖遐裔以弓矢馬騎為先而當六月歊蒸之時皆難於致用故宣王乗時行師終於薄伐玁狁以建中興之功臣自留守京師夙夜匪懈經畫軍旅近據諸路探報敵勢窮促可以進兵臣欲乗此暑月遣王彦等自滑州渡河取懐衛濬相等處遣王再興等自鄭州直護西京陵寝遣馬横等自大名取洺趙真定楊進王善丁進李貴等諸頭項各以所領兵分路並進既過河則山寨忠義之民相應者不啻百萬契丹漢兒亦必同心備禦金人事纔有緒臣乞朝廷遣使聲言立契丹天祚之後講尋舊好且興滅繼絶是王政所先以歸天下心也況使敵人駭聞自相擕貳耶仍乞遣知幾辯博之士西使夏東使髙麗喻以禍福兩國素䝉我宋厚恩必出助兵同加掃蕩若然則二聖有回鑾之期兩河可以安貼陛下中興之功逺過周宣之世矣臣犬馬之齒今年七十矣勉竭疲駑區區愚忠所見如此臣願陛下早降回鑾之詔以繋天下之心臣當躬冒矢石為諸将先若陛下聽従臣言容臣措畫則臣謂我宋中興之業必可立致若陛下不以臣言為可用則願賜骸骨放歸田里謳歌擊壤以盡殘年頻煩上瀆天聽悚恐待罪三年司諫趙元鎮上奏曰臣恭惟陛下厯茲艱運屢更變故雖否泰循環理之必至天其或者眷佑我宋激勵陛下益堅憂勤之念以就中興之業乎昔趙簡子以襄子為後謂其臣董安于曰是其人能為社稷忍辱後襄子䝉受灌飲之耻而卒滅智伯越王句踐敗困㑹稽既以反國置膽于坐飲食必嘗曰汝忘㑹稽之耻耶後亦以滅吳區區小國之君苟用心如此卒能有成今陛下承隆平乆逸之後躬履艱棘淮甸之擾倉卒播遷二兇姦謀乗間竊發陛下不深以罪人而責躬克己唯以天下為念是能為社稷忍辱矣其亦飲食嘗膽如負㑹稽之耻仰承天之所以責成之意則興衰撥亂此其始歟唯夫食不加肉衣不重綵折節下賢與百姓同勞苦是乃句踐之所以滅吳也元鎮又奏曰臣嘗謂方今之事所以易敗而難成者其害有二臺諫不盡言朝廷不任責不盡言則昧于利害之寔不任責則忽於成敗之機其欲保邦致治不亦難哉臺諫之不盡言也以朝廷惡聞其事拒之而不得言言之而不得行則與不言何異畏棄地之譏中變連和之策懼避戎之論力沮渡江之謀遂使遺患都城流毒淮甸生民淪䧟社稷阽危是皆不任責以致之禍可既哉今陛下深鑒其失矣然今日之事與前不侔議和之使係踵扵道而兵禍不解初幸浙西再臨江左而防托未偹則朝廷之責益重矣惟陛下與大臣圖之母蹈前車之失至於祖宗基業付託之重孰為之子孫四海生靈歸附之心孰為之父母此則陛下之責也當斯時負此責頋不艱哉唯自任不疑力行不屈赫然丕變庶幾有濟其或畏避苟且幸其無事則淪胥以敗未見有振起之漸昔劉備起漢踈屬志在靖難雖困敗沮辱之中而剛果之氣略不少衰一時豪傑皆為其用卒能以區區疲蜀屢困中原之師後世稱之號為英主今陛下兩經大變艱難顛沛亦已極矣而天下之責猶不得辭之臣願陛下持志宜益堅臨機宜益壮奮發天威之斷激昻神武之姿至大至剛終始如一凡今日未獲之事躬自任之以風勵天下使公卿任公卿之責将士任将士之責則内脩政事外靖邊圉舉在是矣實宗社之幸斯民之幸也元鎮又上奏曰臣於今月初一日甞具愚懇仰瀆聖聦乞候浙西平㝎及建康已有渡江的耗乃議進發竊聞昨日已降指揮初十日廵幸平江外議紛然頗謂未便臣不知朝廷有無探報所報如何浙西之寇即今何之平江境内曽無侵犯建康之衆曽未渡江若平江之吉凶未知建康之去留未審則今来車駕将安往耶聞欲暫駐越州徐圖所向因為就食之謀然越州百里之内悉遭虜掠不過取之衢婺諸州而陸路阻脩艱于運漕儻未接濟何以支吾倉皇之中益難措手兼敵人未逺狡詐難防萬一分兵出竒姑為回戈之勢則行在咫尺寧無震驚人心一揺變故莫測臣雖淺陋慮猶及此也或謂軍儲窘廹不能安居彼此不殊何由足備臣愚欲乞先遣王􅊅等軍分屯嚴婺不惟減省行在用度亦足張大聲勢應援浙西以俟建康寧息及平江保守無虞然後移蹕北還似未晚也恭惟陛下以萬乗之尊負宗廟社稷之託凡兹舉動要當萬全前日頒降徳音固已失之太遽如今日回蹕之事尚願少留聖慮豈可堅執前議不虞後患臣採之衆論如此非臣管見敢此異同伏幸留神省察元鎮又上奏曰臣嘗謂天下有公論不可以力制不可以智勝由堯舜周孔以迄于今如權衡之設黒白之辨自一人之善惡至朝廷之賞罰一付於此則天下治矣國家陵遲衰弱之漸人皆謂兵革之為患其亦知有以致之乎以善惡是非之倒置公論乆欝而不眀也其来逺矣禍胎至深固宜痛心疾首亟變而力新之如救災溺唯恐不及如去惡草絶其本根使風教純一物情和㑹則人之所欲天必従之悔禍於我其或在是搢紳者間猶昧此或狃於術業之異或牽於恩舊之私隂有所懐巧為沮遏忘乎大公至正之道而甘心于亡國䘮家之術亦其人之不幸歟非特其人之不幸也宗廟社稷天下生民之不幸也靖康之初發蔡京之罪録黨籍之家而議者則曰今邉事未息軍政未脩忽而不省乃復為此不急之務建炎之初辨宣仁之謗復詞賦之科而議者又曰今二聖未還兩河未復置而不問乃復舉此迂闊之議其言一行姦計潜發遂使上皇引咎哀痛之詔半為空文淵聖紹復祖宗之言訖無成效噫太平之治須太平而為之抑亦為之而後至耶苟惑於其説如前所云則天下之事無時而可為雖善惡是非乆欝于公論者亦不得而措詞矣必欲厭服人望得其歡心不亦難哉唐憲宗用皇甫鎛程异為相裴度論之曰可惜者淮西盪㝎河朔底寧承宗斂手削地韓𢎞輿疾討賊豈朝廷之力能制其命哉但以䖏置得宜能服其心耳德宗當奉天之難詔問陸贄一時急務何者切直贄對以理亂之本繋於人心況當變故搖動之時在危疑向背之際人之所歸則植人之所去則傾安可不審察羣情同其欲惡使億兆歸趨以靖邦家此誠當今之急務也以裴度陸贄之才非不知髙城深池堅甲利兵與夫折衝制勝為禦侮防患之䇿而納忠于君者其言如此誠知弭亂之本歟陛下詔膺大統適茲多艱欲大有為必知其要念憲宗中興之業在䖏置之得宜察陸贄理亂之言繫人心之向背凡祖宗之法復而未盡崇觀之患染而未除以至進退賞罰苟當扵人心而合乎公論雖流離顛沛而因革可否不可一日而廢唯公論著善惡眀輿議攸歸士風丕變則慕徳向化心恱而誠服之矣寧謂已往之事無益于今耶若夫積粟練兵之計攻守竒正之謀當責之有司而朝廷之上朝夕之所請眀者正宜在此唯陛下不以踈闊而忽之起居郎胡寅進萬言書劄子曰臣竊考古者人君廵守本以省方觀民黜陟諸侯而考制度故舜以五載為節周以十二嵗為節盖有常制不然則詰戒戎兵征討不庭如髙宗伐鬼方成王伐淮夷宣王伐玁狁無非事者先王之舉動惟此二端固不為苟也秦漢以来如始皇孝武乃好用兵外夷間以豫逰馳騁八荒國家病矣亦未有為狄人廹逐逃避奔潰而無所㝎止者也至唐眀皇為安禄山所叛首以萬乗之君弃宗廟社稷而出奔如古失國諸侯寓公為笑萬世至其後嗣習為故常代宗德宗皆一再出狩不以為耻然猶所據得形勢之利又有謀臣猛将為之宣力扞患難雖能克復不至滅亡而其挫志忍辱亦不少矣豈古所謂廵守之意哉本朝受命太祖太宗躬擐甲胄以㝎大業無有寧嵗卒平四方奠宅中土則與古戒兵戎討不庭伐鬼方淮夷玁狁之事可無愧矣至真宗親駕澶州戡定北邊功尤俊偉自是以後坐致太平思欲告功神眀昭示得意遂祠汾隂封太山則與古省方觀民黜陟諸侯而考制度之意雖未盡善亦庶幾焉夫此二端豈不費國勞民而國以益安民無怨咨者以其所舉凡欲為民非苦之也聖聖相繼至上皇凡五朝非以郊祀籍田未甞警蹕城外軍民之情四方觀聽皆以為固當如此厯百餘年生長老死惟京師為安爾靖康之失既往難悔陛下嗣位則正商髙宗周宣王所遇之時而遽循唐眀皇代徳奔走之跡遂不力圖興復抗志有為公卿大臣反以省方廵幸之美名而文飾之自南都至維揚自維揚至錢塘自錢塘至建康自建康至平江三年之間國益危勢益蹙敵益横人益恐回視過日但有不如況平江素無江山險固之强惟以陂澤沮洳數百里自保譬猶蹄涔坎井豈足以盤礴神龍一失波濤雖螻蟻猶能困之若又逺駕縦能緩于追侵而衆怨必生㝎有肘腋之變不待蓍龜所告理之必然者也故播越隠遁天下之人皆可惟陛下則不可臣自扈従以来日夜憂懼欲奮然陳論慕斷鞅之所為竊恐宸心積乆多畏在朝議論決不僉諧虗浼聽聞無補于事欲泯黙度日又念備數近侍存亡休戚分義所同反覆思之不能自已輙以愚鄙之見條成一書綱舉七䇿别為二十事論廵幸之失畫撥亂之計冒昧塵獻其間切要輙用黄紙貼出以偹省覽至於因議大體而泛及他事者難以槩舉則亦用紙表見之非敢自謂無不中者然今日大謀恐須如此乃能振起伏望陛下懇惻憂思特賜詳閲如可施行即乞降付三省宻院叅酌去取斷為國論即日改圖如或不然則臣所見亡竒止於如是雖備任用何能有補願従廢黜實所甘心至於狂戇之言觸犯顔色私自揣度理難寛貸陛下寳慈天覆必能恕之震慄雖深恃以無恐所有臣書謹具進呈其書曰臣伏覩詔書以敵人侵陵備禦不給遂有移蹕之意右頋岳鄂左趨吳越安危利害下詢羣臣臣時駭然不意清問之及此何者陛下自錢塘来幸江寧也有詔曰以援中原矣及至江寧以舊邸之名符啓建之義改為建康府以昭受命之祥也有詔曰興邦正議于宏規矣繼而深懲維揚之祻遣奉隆祐太后以六宫及百司不與軍旅者之南昌也有詔曰朕與二三大臣帷幄宿将堅守不動誓有一死以荅羣生矣前後三詔近在半年之中而今来詔音不同如此退伏思念至于旬時陛下以安危利害訪於在廷苟或慮之不精計之不審以害為利以危為安偷顧目前妄有建白則其負誣聖眀迷誤社稷罪在不赦輙陳愚見不避斧鉞泛論建炎謀國之失而陳撥亂反正之計念時事之廹切仰徳意之寛大冀功效之可立忘觸冒之難恕惟陛下留神省察臣聞孔子曰成事不說遂事不諫既往不咎今臣所陳不免追咎既往者盖謂建炎已来有舉措大失人心之事今欲復收人心而圖存則既往之失不可不追不可不改故也一昨陛下以親王介弟受淵聖皇帝之命出帥河北二帝既遷則當糾合義師北向迎請而遽膺翊戴亟居尊位遙上徽號建立太子不復歸覲宫闕展省陵寝斬戮直臣以杜言路南廵淮海偷安嵗月敵兵深入陕右逺破京西而漫不治軍略無扞禦盜賊横潰莫之誰何無辜元元百萬塗地怨氣上格目昏無光飛蝗蔽天動以旬月方且製造文物縻費不貲猥于城中講行郊報朝廷動色相謂中興敵騎乗虚直𢷬行在匹馬南渡狼狽不堪淮甸之間又復流血逮及反正寳位移蹕建康不為乆圖百度頽弛淮南宣撫卒不遣行自畫大江輕失形勢一向畏縮惟務逺廵軍民怨咨如出一口存亡之決近在目前凡此節次十餘條皆所謂舉措失人心之大者也自古衰亡固不足道請以中興者言之夏少康周宣王燕昭王越勾踐漢光武莫不任賢使能脩政事治軍旅而其奮發刻厲期於必成者則又本扵憤耻恨怒之意不能報怨終不茍已所以光復舊物各稱賢君未有乗衰㣲缺絶之後竊竊焉因陋以為榮施施焉苟且以為安而能乆長無祻者也為陛下計當如何而黄潜善汪伯彦顔岐顧以乳嫗護赤子之術待陛下曰上皇之子殆将三十人今所存惟聖體不可不自重愛也曽不知太祖勤勞取天下列聖兢業嗣守不敢墜失今也宗廟為草莾堙之陵闕為畚鍤驚之堂堂中華戎馬生之赫赫帝圖盜賊營之然則潜善伯彦所以誤陛下陷陵廟蹙土宇䘮生靈者又豈燕昭越踐漢光武之比乎本初嗣服既不為迎二帝之䇿因循逺狩又不為守中國之謀以至于今徳義不孚而號令不行刑罰不威而爵賞不勸廵幸所至民以淮甸為戒駐蹕所在人以敵至為憂東南之州郡㡬何翠華之省方無已若不更轍以救垂亡則陛下永負孝弟之愆常有父兄之責人心已去天命難恃雖欲羈栖山海䟦履﨑嶇臣恐非所以為自全之計也為今之䇿碩陛下一切反前失而已則必下詔曰繼紹大統出扵臣庶之諂而不悟其非廵守東南出於僥倖之心而不虞其祻經渉變故僅免危亡盖上天警戒於眇躬俾大宋不失于舊物金人以遐逺之裔擾亂中華日尋干戈扶立僭偽以强陵弱俾臣作君朕義不戴天志思雪耻父兄旅泊陵廟荒殘罪乃在予無所逃責以此號召四海聳動人心不敢愛身決意講武然後選将訓兵戎衣臨陣按行淮甸上及荆襄收其豪英誓以戰伐天下忠義之士必雲合而景従天下武勇之夫必響應而飇起國用不足於此不患無財甲馬不强於此不患無備有道多助孰不順之秦隴雖遙驍騎壮士即可坐致齊魯雖失饒財厚貨必自竭輸陛下凡所欲為孰不如志其為利害豈與退保吳越日就滅亡同年而語哉臣不自量每切憤歎既未能被堅執銳先啓戎行而服業簡編討論古昔固當忘其昧陋少賛經綸輙為陛下畫中興之䇿莫大於罷和議盖和之所以可講者兩地用兵勢力相敵利害相當故也非强弱盛衰不相侔所能成也而其議則出於耿南仲何也淵聖皇帝在東宫當宣和季年王黼欲搖動者屢矣南仲為東宫官計無所出則歸依右丞李邦彦邦彦其時方被寵眷又隂為他日之計毎因王黼讒譛頗曽解紛亦縁上皇仁慈本無移易太子之意也既而淵聖嗣極逓遷前朝大臣而邦彦為次相金人遽至城下邦彦諧謔小人烏知逺慮遂獻和議而南仲以宫傅之重方奉椒房出奔聞六飛堅守至陳留而返自愧其失因附邦彦而沮种師道擊敵之謀扵是覆邦之患滋蔓而起分朋植黨必欲自勝主戰伐者李綱种師道兩人而已㡬㑹一去國論紛然中制河東之師必使陷没以伸和議之必信二帝逺去宗族盡徙中原塗炭至今益甚者本縁南仲主持邦彦以報私恩不為國慮之所致其朋徒附合狠忮膠結寧誤趙氏不負耿門之所為也使其可和則淵聖執德不堅馴致祻敗而陛下卑辭厚禮避地稱臣無所不用其極乞和之使接武扵道宜其少緩師矣何乃累年而尚無效耶自古中國盛强如漢武帝唐太宗其得志四方必并吞掃滅以示廣大侮亡取亂極其兵力而後已中國禮義所自出也恃强陵弱猶且如此今乃以㢘退慈仁君子長者之事望扵反常悖道之叛臣與剽悍之敵有是理哉若以為强弱之勢絶不相侔縦使向前萬不能抗則自古徒歩奮臂無尺寸之地而争帝王之圖者彼何人㢤伏望陛下眀照利害之原罷絶和議刻意講武以使命之幣為養兵之費此乃晉恵公征繕立圉之䇿漢髙迎太公吕后之謀斷而行之堅確不變庶㡬敵人知我有含怒必鬬之志沙漠之駕或有還期不然則今僻處東南萬事不競納賂則孰富于京室納質則孰重扵二帝飾子女則孰多于中原之佳麗遣大臣則孰加于異意之宰輔深思逺慮反復計之所謂乞和必無可成之理昔北兵至澶州王欽若陳堯佐請幸吳蜀惟寇準勸親征及成功之後欽若等羞恨無以藉口則撼真宗曰當是時寇準亦豈有好計但是熱血相沃譬如博錢以陛下為孤注耳使人君不眀則欽若之言為愛君而寇準之功為幸勝今之議和者其情状一一出於此苟能息絶其議陛下不藉之以塞民望大臣不藉之以寛已責則必為善後之圖矣夫事有緩急治有先後既㝎議講武則其餘庶常有日力不暇給者當置行臺以區處之今典章文物一切掃地百司庶府殆為虚設其必不可闕者惟吏部戸部為急誠使江淮兩浙湖北並依八路法慎擇監司而付之則吏部銓事亦復減省不過置侍郎一貟郎官兩貟胥吏三十人則所謂磨勘封叙奏薦常程之事可按而舉矣戸部所以治天下財賦也今四方供貢乆不入于王府往往為州郡以軍興便宜截用經常一壊未易復理竊觀行在支費毎月無慮八十萬惟以𣙜貨塩利為無窮之源耳故臣謂宜置行臺或建康或南昌或江陵審擇一處以安太后六宫百司以耆哲諳練大臣緫臺謹守成法従事郎吏而下不輕移易量留兵将為營衛命户部計費調度以給之其虚名無寔徒費國用之所一切省罷陛下奉廟社之主提兵按行廣治軍旅周旋彼此不為㝎居惟是侍従臣僚帥臣監司要害守牧則當加意以時進退其賢不肖功罪之著眀者而餽餉之權自宜專責宰相而選委發運以佐行于下如漢委蕭何以闗中唐委劉晏以東南經制得人加以嵗月量入為出何患無財所謂宰相之任代天理物扶顛持危其責甚重非特早朝晚見坐政事堂弊弊然扵文具無益之末移那闕次以處親舊濟其私欲而已也古之人君臨政願治必委任宰相豈徒體貎崇重一聽其所為亦必深相提䇿務為眀白計日累月以考功緒陛下視今日國勢孰愈於前日乎此在宸心所自鑒照臣未敢深論也夫大亂之後風俗靡然躬率而丕變之者則在陛下務寔效去虚文夫治兵必精命将必賢政事必脩誓戡大憝不為退計者乃孝弟之寔也遣使乞和廣捐金幣不耻卑辱冀幸萬一者為孝弟之虚文也屈已致誠以来天下之士博訪䇿略信而用之以期成功者乃求賢之實也未見賢若不克見既見則不能由之或因苟賤求進之人遂乃例輕天下之士姑為禮貎外示美名者為求賢之虚文也聽受忠鯁不憚拂逆非止面従必将心改苟利扵國即日行之者乃納諫之寔也和顔稱善泛受其説合意則喜之不合則置之官爵所加人不以勸或内惡其切直而用他事遷徙其人者為納諫之虚文也将帥之材智必能謀勇必能戰仁必能守忠必不欺得是人而任之然後待以恩御以威結以誠信有功必賞有罪必刑者乃任将之寔也庸奴下材本無智勇見敵輙潰無異於賊與之親厚等威不立賜予過度官職逾涯将以收其心適足致其慢聽其妄誕張大之語望其朴實用命之功者為任将之虚文也簡汰其疲老病弱升擇其壮健驍勇分屯在所置營房以安其家室聚粟帛以足其衣食選衆所畏信者以董其部伍申眀階級之制以變其驕恣悍悖之習大抵如周顯徳年中世宗命我太祖之意然後被之以精甲付之以利器進戰獲首虜則厚賞死則恤其妻孥退潰則誅其身降敵則戮其族令在必行分毫不貸者乃治軍之實也無所别擇一切安養姑息之惟恐一夫變色不悦幸無事則曰大幸矣教習擊刺有如聚戲金鼓之節旗幟隊伍皆習敵人之所為紀律蕩然雖其将帥不敢自保者為治軍之虛文也慎選部刺史二千石必求眀恵忠智之人使乆於其官懲革弊政痛刈姦贓以除民害雖軍旅騷動盜賊未平必使寛卹之政寔被於民固結百姓将離之心勿致潰叛乃愛民之實也詔音出於上虐吏沮於下誑以出力自保則調發其丁夫誘以犒設贍軍則厚裒其錢榖弓材弩料竹箭皮革凡干渉軍須之具日日征求物物取辦因縁姦弊民已不堪乃復蠲其税租載之赦令寔不能免苟以欺之者為愛民之虚文也若夫保宗廟保陵寝保土地保人民以此六寔者行乎其間則為天子之實也陵廟荒圮土宇日蹙衣冠黔首為肉為血以此六虚者行乎其間陛下戴黄屋建幄殿質眀輦出房雉尾金爐夾侍兩陛仗馬衛兵儼分儀式賛者引百官以次入奉起居既退宰相大臣卑卑而前搢笏出奏司辰唱辰正則駕入而仗出矣以此度日而國勢益卑彼敵人者晝夜厲兵跨河越岱電掃中土遂有吞吸江湖蹂躪衡霍之意吾方挾持虚器茫茫然未知所之此則為天子之虚文也伏望陛下留意寔效勿愛虚文於此七者奮發慷慨而力圖之今宿衛單弱國威銷挫臣甞言乞早勾發京師衛士赴行在又降等仗扵兩浙福建江東西湖南北四川二廣抽揀禁軍貢發充御營正兵增厚其月廩精加訓閲陛下自将之天子之軍既強則中國之變自弭昔漢髙祖甞大敗于成臯矣與數騎渡河入張耳韓信軍奪其印易置諸将軍遂復振此特御将之大權雖知如韓信且莫能測宜其取秦滅項甚易陛下今欲扵劉韓張岳四人之兵有所移易廢置臣知其不能矣權既偏重柄既倒持彼必謂陛下不能一日而舍之夷踞桀驁日以滋起陛下以孤立之身寄扵其上安能使此四人者常無怨怒相激而不為變乎苖劉之亂率爾而作者坐此故也漢獻帝時主柄下移不能自立李傕郭汜以偏裨小将互刼乗輿至以臭牛之骨與帝進饌萬乗人主為叛臣所質此既往之鑑也臣謂今日見在兵必不可用既未有以大更易之莫若先集天下勁兵以强御營之勢然後可以彈壓悍将驕兵悍将驕兵既不敢妄動就紀律則四方横潰之軍及羣起不逞之盜必自帖息猶有披猖不軌者遣偏師以鋭卒往禽滅之遂罷招安䇿況陛下以雪耻復讎為已任仗大義而行天下頑兇不義之徒固将斂衽倒戈而聽驅使之命矣漢光武為銅馬帝者用此道也東南之禁卒既起則又命福建團結槍仗手建汀南劔邵武四郡精選萬人各擇其土豪使部督之各屯本處以俟興發命兩浙募水手并選發諸州撩湖捍海等兵盡付水軍教習戰艦命江東西湖南北募弓手以在官閒田給養之人得一頃正税之外其餘科須一切與免命廣西及辰沅鼎靖於見數峒丁中寔科有技能壮勇者不取虚數分畨踐更屯戍襄漢為山林谿谷之援以京西淮南荒廢無主之地為屯田招集兩河山東及本路流徙之人畧依古法均節之擇强武者訓習使且耕且戰文武臣中有眀習營屯之事肯承任者因以任之凡此六條雖非講武必為之急亦不可不為之助陛下試使執政大臣委弃簿書細故勿設他説以相論疑日夜圖回擇人而為之必見績状扵是時而兵不强敵不畏盜不息然後可以歸之天命無所復為矣不然是自弃也陛下内有自弃之心而欲于目前三四庸将數萬潰卒中求為乆安三尺童子亦知其不能矣或者必曰軍旅之興民最受弊今若如前所陳恐未能有損扵强敵而先已自殘其民矣則臣應之曰自敵入寇已来國家嵗嵗以和好自䖏未甞敢以兵刃北向凡以愛民恐勞之也然大河以南連亙數十州之地城覆民屠不可勝計豈用兵之罪耶設有一城一邑能率勵兵民誓以死戰一郡不克一郡繼之不猶愈於束手屈膝斃扵白梃之下哉惟在任将相使處置合宜則雖使民以死尚且不怨況欲用兵以保衛赤子乎漢光武既滅新莽之後東征西戰尚十餘年而後天下大㝎當時豈無勞民費財之事所計者大則有所不暇恤頋能于軍旅擾攘之中常有愛惜生靈之意故天助而人歸之苟坐視四海流血而避用兵之勞費則是舜不當征苗啓不當討扈髙宗不當伐鬼方宣王不當伐玁狁以噎廢食非通時務經國之逺猷也自古圖王霸之業者必㝎根本之地而固守之而非建都之謂也陛下家世都汴舍汴都焉今欲用闗中而制山東則力未能至按南渡六朝之遺迹則舍建康不可雖然欲謀進取則非堅坐不動之所能必觀進取形勢之便用之而圖成臣竊謂惟荆襄為勝春秋之世楚甞以是抗衡上國窺周問鼎三國割據曹操聞孫權以荆州假劉俻則失箸而駭六朝建立雖南北之形已判亦必増重上流庾亮欲經略中原則先分戍漢沔宋太祖欲伐魏則先廣襄陽資力故晉何充謂荆楚國之西門地帶趙蜀得人則中原可㝎失人則社稷可憂今湖北接京西雖無大險然方城為城漢水為池管仲之所不敢輕盖地近中州上下不過千里其要害易守非如淮泗汗漫平原按衍四通五達易入而難備也曹操用兵彷彿孫吳而赤壁敗亡㡬扵不救則難易之勢可見矣誠能屯唐鄧襄漢之田以養新兵出廣西武陵峒丁并施黔獠軍築堅壘列守漢上阻以水軍經以正軍緯以弓手民軍牽制江黄呼吸廬夀則進取之基立然後陜西聲氣血脉通達而騎卒可至川廣之富皆猶外府易以拱挹其比扵漂泊大江之南棲伏東海之濵險易利害相去逺矣建康固是六朝舊都甘守偏隅遷延國祚亦何不可臣獨以為不可焉盖為陛下之責與晉元帝不同故也西晋為劉聦吞併無復能立懐愍兩君皆以弑殞故元帝自琅邪王又憑王敦專制淮南十年之威起而纉祚然傳世十帝享國百年强臣内叛勍敵外迫其得僅存猶綴旒耳當時非無謀臣猛将提重兵出入終不能復取中原者非獨天運亦勢使然也今陛下之父兄在敵中固無恙然居穹廬毳帳之中其衣服飲食居處動靜豈得比中國民庶中人之奉㢤其聞陛下嗣登寳位也必日夕南望曰吾有子弟為中國帝王吾之歸庶有日乎痛惟愁荒屈辱之中發此念為此言于今三年日迫日切而獻謀者方欲導陛下南狩日逺日忘遂無復國之心别求建都之所此臣所深不喻也今河北河東之民知朝廷不復頋思已甘心左衽山東京西淮甸之民猶冀陛下未忍遽棄若更遲延嵗月無以及之則怨恨陛下而為敵國者所至皆然亦何必金人邪扵此而欲建都非特不可亦必不能矣故臣願陛下先命吕頥浩杜充分部諸将過江廣斥候治盜賊自以精兵二三萬為輿衛於穏宻州郡速置營屋以安存其所謂老小者陛下提此兵渡江而北緩轡而上遺使廵問父老撫綏挺刃之餘民至扵荆襄規模措置為根本之地猶漢髙之於闗中光武之於河内雖廵歴往来征伐四出而所固守必争而勿失者以荆襄為重陛下方富于春秋非如昔人白首舉事覬萬一之成者誠能堅忍聳厲坐薪甞膽悠乆為之而不能濟則書傳所載周宣王漢光武之事皆為妄言以欺後世無足信矣陛下聰眀洞照必不謂然也上世帝王為治之道惇睦宗族强本弱枝所以鞏固基局紹延佑命故三代有天下皆傳數十世而周又特為長乆盖以大建宗室以自藩屏故也原其用心盖以天下為公而不以為私初非如後世以智力把持之褊心多忌雖有骨肉懿親盻盻然不借以尺寸之權而恐其伺便軋已亡秦是已漢以為鑒遂大封同姓非劉氏不王及其乆也光武劉備皆以宗室倡義而起於滅絶之後夫漢髙固欲為乆逺無窮之慮非為其一身也以謂不如是不足以大庇子孫萬世血食然則封建宗室者乃固守天下之要術也今陛下之族北去者衆矣所幸免亦幾何而黄潜善鄭榖小人之見本無逺識謂陛下以支子入繼又不縁傳付之命國歩未夷恐肺腑之間不無非望之冀考其行事必曽進言恫疑虚喝以恐動宸心故自南都以至維揚誅竄之刑疑忌之意相尋繼見雖其罪戾或自貽戚然亦恐未必盡出扵治親齊家之美意審如是欲以保國而延厯難矣今宜同姓中不間親踈選擇賢材布之内外廣加任使其望實傑然出衆者陛下宜留之宿衛夾輔王室其有克敵戡難之功者宜漸為茅土之制星羅而棊列以慰祖宗在天之靈以續國家如綫之緒使敵人知趙氏之居中國者尚如此其衆既失而得復者非獨陛下一人而已則其撲炎火之横心立異姓之逆謀庶其少息乎夫創業垂統之君必立綱紀以遺子孫繼世承序之君必守綱紀以法祖宗綱紀存則存綱紀亡則亡所繋如此夫一君子進衆小人未必退一小人進則衆君子必退矣勢不兩立而扵君子為難盖其道固如此仁宗皇帝在位最乆得君子最多小人亦時見用然罪著則斥之君子亦或見廢然忠顯則收之故其成當世之功貽後人之輔者皆君子也至王安石則不然斥絶君子一去而不還崇信小人一任而不改故其敗當時之政為後世之害者皆小人也仁宗皇帝所養之君子既乆且逺日以消亡矣安石所教之小人方新而近其蕃息未艾也所以誤國破家至毒至烈不知已時然則陛下欲求君子而用之而不愛爵禄以待其人豈非甚不易得者乎君子未得而已試無堪敗事顯著之小人稍稍𩔖聚其未至則召之惟恐其不来其既至則用之惟恐其不速混然雜進其黨必集所謂悔過用賢之意與陛下反正之初絶不侔矣陛下土地金帛能有㡬何豈堪此軰大言輕捨盡輸之敵人耶将以汲引豪傑延致英雄而標的如此是猶却行而求前北轅而適越爾夫以賢治不肖此治平以前陛下之家法以不肖治賢此熈寧已後陛下之家戒矧當今日否塞之氣充牣於中原隂長之滋勃興扵敵國非得希世異材上下内外迭任交用泰何由復而否何由傾乎此綱紀國家之一事也右文左武者有國不易之道漢髙祖用韓信彭越不以加於蕭曹光武用賈復耿弇不以加扵鄧禹唐太宗用李靖李勣不以加于房杜蜀先主用關羽張飛不以加於諸葛孔眀非獨其禮文等降不同其誠心所以待遇之亦異今儒學衰息未有巨賢碩徳屹乎朝廷以收運籌指蹤之功陛下所深恃以為心膂爪牙者惟三四庸将耳夫此數人者以近時論之曾不足以當种師道之廝役況望古昔名将乎而偃蹇龐然當負重寄使平寇盜尚或未能豈敢冀其向敵人發一矢也自愧無以塞責則大言詭論以上欺睿聽慢辭倨禮以下視朝士謂今日祻亂皆文臣所致耳敵人方强不可與争鋒必以退避自保乗時而動又不鈐勒其衆動則潰潰則盜盜則招招則官反復循環無有窮已其為國家之害豈文臣所敢望哉竊聞陛下推心撫之失于太厚出入内禁不以時節小人不知義理習扵所熟以謂君臣上下猶朋軰然恃憑威靈無有紀極寵而不驕驕而能降降而不憾憾而能眕者鮮矣臣願陛下委大臣以腹心待近臣以禮貎常使南衙朝士氣勢重扵此徒天下抱才自愛之人必願立扵左右緩急之際必有能為陛下竭忠盡節不愧古人者矣與樊噲為伍韓信猶羞之況儒士乎臣叅奉内朝班綴之後欲求近臣如汲黯之流氣折淮南尚未多得羸軀弊輿惴惴然扵長㦸犬馬之中卒伍賤人皆得以惡聲誰何之不敢正色忤視少拂其勢従臣如此況其下者乎唐制監察御史秩七品衣緑至卑也然銜命出使則節度使具櫜鞬郊迎本朝㳂此意郎官出使則序位在轉運使之上凡此盖欲尊重天朝習民于上下之分也故事宰相坐待漏院三衙管軍扵簾外倒仗聲喏而過吕夷簡為相日有管軍忽遇扵殿廊年老皇遽不及降階而揖非有悖戾之罪也夷簡上表求去以為輕及朝廷其人以此廢斥盖分守之嚴如此今見其分庭抗禮矣推此𩔖非一日長不已陛下不為之别異表著是自削堂陛無復等威亦将何所不至哉此綱紀國家之二事也治天下者必取篤實躬行之士而舎浮華輕薄之人所以美教化善風俗本朝自熈寧以前皆守此道至王安石以佛老之似亂周孔之實絶滅史學倡説虚無以同天下之習其習既同于今五十年士以空言相髙而不適于實用以行事為粗迹曰不足道也其或蹈規矩守㢘隅稍異扵衆則羣嘲而族笑之以為異𩔖紛紛肆行以至敗國二帝屈辱羿莽擅朝以謂是適然耳伏節死難者不過一二人此浮華輕薄之為害也夫欲變風移俗惟係上所好惡韓琦富弼在朝文武兩班升朝官以上即不許自陳磨勘皆聽檢舉所以養勸㢘耻恢張四維故當時人知自重風俗忠厚至今乃有身為従臣而自陳磨勘乞覃恩轉官不以為耻者矣推而上之見利必忘義貪得必患失遺其親後其君背叛篡奪便可馴致此眀君之所甚畏而深戒者也今萬化之原本扵陛下苟力行孝弟則天下忠順者来矣好賢逺佞則天下名節者出矣賞清白則貪汙者屏矣崇行義則奔競者息矣旌能實則謬誕者懲矣貴忠厚則殘刻者逺矣為反此道則頽波日漫必至扵糜爛而後已至扵文辭之麗言語之工倒置是非移易黒白誠不宜任用以為浮薄之勸也靖康二年著作郎顔博文佞䛕張邦昌則曰非湯武之干戈同堯舜之禪讓及為邦昌作請罪表則曰仲尼従佛肸之召本為興周紀信乗漢王之車固将誑楚博文近世所謂能文之士也其操術反覆如此故㢘耻道消四維大壊則社稷随之陛下何利焉此綱紀國家之三事也法度者所以治天下之具號令者所以行法度之幾而信義者所以出號令之實也孔子曰自古皆有死民無信不立聖人重信至扵易死疑若太過鄙夫陋儒以智詐譎詭為術者必忽此言然真宗澶州與契丹結盟契丹守之百有二十年不敢先動宣和宰相王黼一旦敗盟舉兵結逺夷伐與國取景徳誓書還之天章閣天地鬼神所臨重誓自我背之遂使敵人得以藉口夫金人何憾扵我哉皆契丹惎之假手借兵報滅國之怨耳失信之􅍔乃至扵此孔子之言良不為過而近日以来朝廷失信扵民尤甚臣不能徧舉其目但如所謂前降指揮更不施行如所謂已差下人别與差遣此等奏語必日聞扵冕旒之側矣陛下何惜不勅大臣俾審熟思慮而直為此反汗之失以欺駭四方之聽乎今外州郡專制不禀朝命者漸多有之所恃以指麾役使惟在號令出之不審則輕守之不固則疑輕而且疑則制命之權不在陛下矣承受既數奉行實難不曰略與應破指麾則謂不晚必又更改近在朝廷尚有此風逺而四方従可知矣陛下縦有真賢實能付之民社仁政恵澤播之黔黎以是之故何繇責其功效百姓雖愚然習扵知見必謂朝廷之令率皆誑我是心一萌姦雄得以誘之矣此綱紀國家之四事也郡守縣令者親民之官監司者統臨州縣之長天下之治起扵一縣縣治則州治州無不治則天下治矣眀主必慎擇居此之人既得其人必乆任之以考功罪之實而施賞罰焉近日以来朝廷移易郡守監司無月無之殆不可勝紀東南路分不過十數何為紛紛如此陛下宜察其故矣謂其不才而罷之耶則曷若考慎扵未命之前也頋恐未必然特出扵用事者之私意耳民力已困財用已竭潰兵劇賊方洋乎其間戎務軍須交制乎其上朝廷憂勞嘆息而未能救尚忍不為擇忠信之長慈恵之師以撫綏之乎臣願深詔大臣自今以往於郡守監司縣令斷以三年為任非有大過勿輕移改縣令不許輙従奏辟去官其有貪汙為民害者舉祖宗法痛懲治之仍許内外侍従官舉所知堪為令者嵗一人後不如舉貶秩示誡留意此事庶幾斯民於鼎沸之中有蘇息之望又今吏部無闕以待入官之人士無所得禄一切苟且求權攝以度日見居官者不能勝任逆避患害則求差檄幹辦之名苟營俸粟無復宿業之志欲事治而民安難矣今欲乞專委諸路帥臣轉運提刑不以逺近共限一季申發部内見任及闕官已授未到職位姓名叅三司之實付吏部為案抵以行差注諸有以便宜従事辟置官屬者必用曽任令録以上無過犯人其奏補出官及曽以不職無治状罷者不聽奏舉奏補人必依舊法試銓無銓則於逐路運司嵗一試之仍増時議䇿問各一首精其選少其數中格則出官以絶請求賄賂冗食之弊肅清仕路政在得人此綱紀國家之五事也臣禀賦凡下無大過人然夙夜思之又考之往古揆之公論所得如此扵當世之務雖未能盡亦可見其大槩矣惟陛下動心加慮反覆而求之隆寛降意開納而聽之萬一可行則至誠惻怛奮乾之健而速圖之日月逝矣嵗不我與以為今日難于前日安知後日不又難扵今日乎往日雖不可復追不當謂無可為者而遂已也天㝎勝人大福不再深可憂懼今年之春震雷大雪白虹貫日中有黑子錢塘之變實先垂象恭以上天之仁眷頋陛下懇懇至厚所以申命用休者不啻再矣陛下出扵屯難側身怨艾親近書史引對多士減徹玩好躬親庶政亦非復維揚之比臣民共知不可誣也然任至重者力必强責至大者憂必深天下萬姓以二帝之故所望於陛下者非止如是而已廼閏月金犯大火芒怒赫然九月朔旦日有食之車駕復有思患預防之行眀堂遂虚陽徳大弱錢塘受辱之地豈可再枉六飛縣名柏人漢祖不宿若趨㑹稽幸三衢則地形窮僻扈衛益勞貢賦不通財用益窘道路艱阻朝覲益稀郵置迂深命令益隔人知陛下無復興之志威權日削無可瞻望投戈四逸孰能止之惟有臣區區之言理眀事順思迎父兄誓報讐恥奮志强厲有進無退庶足以感發軍情率先将佐於危絶之中求生存之道此非怯懦畏避之所能濟也不然而姑恃天命之不庸釋是猶不耕于田枵腹以待嘉榖之旅生不績于麻露肌以待野蠶之成繭事理之必無者矣又惟斯民戴宋無二者徒以祖宗徳澤深厚人未忍忘雖甚塗炭猶未瓦解雖甚怨怒猶未反叛然以比来廵行所過觀之傍道里縣之民一切空盡以避兵卒其甚者田疇荒莱室廬破毁生聚不保滿目蕭條殊非来蘇望幸之美傳示四方何以彰徳頃在建康已獲金人之覘者以此知敵人雖負十全之勢而限以長江不敢輕渡然屯駐山東聞有數路並入之謀陛下不深委将相早為防遏但欲深尋幽逺則回頋州郡復為虚邑必曰君王尚且畏避何以責我守城民心覩此安能乆忍而無變亂若不望風稽拜以事敵人必将推賢擇能以自保治陳勝吳廣因民不忍而劉項乗之秦遂滅亡者盖本扵此古人稱中興之治者曰撥亂世反之正秦不正而甚亂漢髙祖反之正而興焉王莽不正而甚亂光武反之正而興焉隋不正而甚亂唐太宗反之正而興焉唐末五代不正而甚亂我太祖皇帝反之正而興焉反之正者反易其道究其敗亡之由盡更而去之猶反覆手之易也今之亂亦云甚矣其反正而興之在陛下其遂陵遲不振亦在陛下金人雖强其衰弱可待特恐中國豪傑因之而起反吾之亂興彼之治則陛下之大事去矣天下記之野史書之善惡榮辱垂之方来後人觀之亦猶今之視昔夫湯以七十里而有天下楚以七千里而為讐人役今金人之强未如秦其得罪扵中國無人不怨則有甚扵始皇之於六國也東南形勢控帶江山兼有吳楚之地坤維嶺海提封自如非如湯以七十里而起也而乞憐偷生之勢乃甚扵楚之為秦役此臣所以日夜憤懣為陛下痛惜而傷大臣之過計也昔宗澤留守京師一老従官耳猶能致誠鼓動羣賊北連懐衛之民誓與同迎二帝皆相聽許尅期密應者無慮數十萬人不幸為黄潜善所惡百方沮抑憤悒而死其志不就羣臣亦無敢以澤所謀逹于宸聽者以此知人心未厭二帝之徳何況陛下身為子弟責孰加焉誠欲北向而有為臣将見鋤耰慘於長鎩奮臂威扵甲兵舉四海惟陛下之用決不為失䇿惟在陛下斷與不斷為與不為耳五路事宜張浚已行措置今能使淮南荆襄肘臂相應山東合従則敵人所守者數千里之地兵分勢離批亢𢷬虚攻其不備多方以誤之不厭不退以十年為期陛下必能掃除妖氛一清天歩脩上京之廟貎拜鞏雒之神臯逺迓父兄歸安鳯闕再新儀物永固皇圖陛下於時憂責方已巍然南面稱宋中興永永萬年欣懐無斁其與惕息遁藏蹈尾負耻有如今日豈不天地相絶哉臣本踈外之蹤無所知名誤蒙眷求擢侍左右頋睞之温寵遇之榮多士流傳以為口實重惟職司記注掌書言動䘮亂已来典籍廢缺官業不舉素餐是愧況覩寇讐未殄盜賊憑陵鑾輅傍徨民無死所臣扵此曰得近清光有知不言有言不盡苟非畏禍即是欺君震懼于衷不能自己戇愚抵冒理合誅夷寛仁如天恃以無恐儻或其言可采有補大猷尺寸之功垂名竹帛是古人之所榮㣲臣之至願也干瀆威嚴臣無任隕越俟罪之至時議遣使入雲中寅為中書舍人上䟽曰臣竊聞遣使臣入雲中已有㝎議臣愚陋蒙陛下擢寘従班職在獻納雖小事失當猶合上聞況遣使體大縦使初不預議苟心有所未安豈敢緘黙輙形論奏伏望陛下留神省察昔孔子作春秋以示萬世人君南面之術無不備載而其大要則在父子君臣之義而已魯桓公為齊所殺魯之臣子於齊有不共戴天之讐而荘公者乃桓公之子也非特不能為父雪耻又與齊通好元年為齊主王姬四年及齊狩于禚五年㑹齊同伐衛八年及齊同圍成九年及齊盟于蔇是年為齊納子糾仲尼惡之備書扵䇿以著其釋怨通和之罪魯荘惟忘父子君臣之義也魯之臣子則而象之故公子牙弑械成于前慶父無君動於後卜齮圉人犖之刃交發於黨氏武闈之間魯之宗祀不絶如綫此釋怨通和之效也豈非為後世之永鑒乎女真者驚動陵寝戕毁宗廟刼質二帝塗炭祖宗之民乃陛下之讐也頃者誤國之臣自知其才術不足以戡㝎禍亂而又貪慕富貴是故譸張為幻遣使求和以苟嵗月九年于此其效如何彼之一身叨竊爵位而去曽何足道而於陛下聖徳國家大計則虧䘮多矣所幸陛下勇智日躋灼然獨見於邪言乆惑之後奉将天討罪状豫賊再安國歩漸圖恢復天下忠臣義士聞風興起各思自効以佐丕烈譬如人行萬里登車出門又如支吾夏屋初正基柱存亡治亂實係此時今乃無故蹈庸臣之轍踐阽國之址犯孔子之戒循魯荘之事忘復讐之義陳自辱之亂臣竊為陛下不取也或謂不若是少有貶屈其如二帝何臣應之曰自建炎丁未以至甲寅所為卑辭厚禮以問安迎請為名而遣使者不知㡬人矣知二帝所在者誰歟見二帝之面者誰歟聞二帝之言者誰歟得女真之要領者誰歟因講和而能息敵兵者誰歟臣但見丙午而後通和之使歸未息肩而黄河長淮大江相次失險矣臣但聞去年冬使者還言逺人帖服國勢奠安形于奏章傳播逺近曽未數月而劉豫之衆稱兵犯順矣女真者知中國所重在二帝知中國所恨在刼質知中國所畏在用兵則常示欲和之端増吾所重平吾所恨匿吾所畏而中國坐受此餌既乆而後悟也天下其謂自是改圖必矣何為復出此謬計耶苟曰姑為是爾則豈有脩書稱臣厚費金幣而成就一姑為之事也苟曰以二帝之故不得不然則前效可考矣況嵗月益乆敵情益閟必無可通之理也臣甞思之陛下與女真絶則臣下無所得而人主為義舉若通和則利歸臣下而人主受其惡故凡願奉使通和者皆身謀非國計也陛下何不據孔子之論而決此䇿乎自王安石廢黜春秋天下學士不知尊尚一旦亂臣賊子接迹乎四海幸遇陛下篤信此書孔子之志将伸於今日便當考筆削之意斷當今之事只行一二大者陛下美名輝映千古矣當今之事莫大扵敵國之怨也欲舒此怨必雪此讐則用此之人而不用講和之臣行此之政而不脩講和之事使士大夫三軍百姓皆知女真為不共戴天之讐人人有致死扵女真之志百無一還之心然後二聖之怨有可平之日陛下為人子之職舉臣等駑下伸眉吐氣食息世間亦預榮矣苟為不然以中國萬乗之君而稱臣扵金人則宰相而下皆其陪臣也借使女真欣然講解以一將軍将數萬衆駐兵泗水之上願與陛下面相結約㰱盟而退不知陛下何以待之則又欲變置吾之大臣分部吾之兵将割我之地土而取其租税有一扵此其能従之乎従之則無以立國不従則隳敗和好将何據而可臣實戇昧思之不通是以略具古義浼瀆聦聽惟陛下誠加采擇或合聖意即以世讐當復無可通之義眀降指揮寝罷奉使之命刻印銷印俄頃之間初無害日月之眀適足以彰陛下好謀能聽之美免累聖徳誤國大計臣不勝區區納忠之至寅又奏曰臣竊聞宰相張浚有論使事為兵家機權與臣所論事理不同今何蘚遂行不可救止臣待罪侍従初有所陳已荷聖知今浚以輔國謀臣陛下之所改顔而禮貌之者也勢難以臣故以沮其議臣不當力論取勝徒成紛紛然臣再三思慮終未曉浚之説須至剖析聞於聦聽望陛下留神省覽姑且志之聖懐俟他日驗臣所計與浚孰中孰否則使事之利害決矣今則未敢求直也金人緫師二十餘年破大遼弱我宋雖無逺略亦精於用兵其所行事盡詭詐也今我之虚寔彼豈不知尚須卑辭執謙然後足以驕其心示弱屈服然後足以平其怒乎此遣使之無益一也庚戍後不遣使敵兵亦不来及癸丑遣使則鈎引敵使入國熟視而去曽不旋踵而淮南之警奏至矣此遣使之無益二也前我所遣四軰皆朝廷之選待従之臣聞其入敵境晝夜驅遞略無禮節及見彼主坐受欺紿怱怱而歸未甞得其要領也而況何蘚一使臣其何能任覘國之事乎此遣使之無益三也昔富弼之使也以一言息南北百萬之兵可謂偉矣使歸行賞遷進官職弼方以中國未能用兵徒頼使人口舌下敵為莫大之耻終不肯受其識度如此乃可辦國今奉使者首先論其私事祈求恩澤一一足意而後行所慮卑近與市井之人無異尚能眀目張膽不辱君命乎此遣使之無益四也萬一金人臨以兵威肆其恐脅使人必不能就死則反以我之情告之是自敗也死生之際唯烈士不懼曽謂何蘚而能之乎此遣使之無益五也金人之所大欲者誰不知之既有滅宋之心正使劉豫眀日就亡今日亦必赴救而況豫賊祈哀乞援秋髙草熟来寇何疑此不待窺覘自可坐照於一堂之上也此遣使之無益六也今淮以北劉豫自以為其封疆矣河之北金人自以為其土宇矣使者之行豈能乗雲馭風徑至敵境哉必渡清河之阻經濁河之限然後能至也去冬下詔罪状劉豫眀其為賊今豫肯賔吾使人達之扵金哉臣恐戎伐凡伯則有之矣此遣使之無益七也今我與金之勢如兩家有沒世之怨一弱一强强者侵陵不休弱者必固其門墉嚴其戒備待時而動庶能有濟乃欲命一僕夫陷以酒肉恱以金帛適足以重吾之弱増彼之强而已此遣使之無益八也自古兵强馬衆玩武不戢而無自焚之變者此五胡英傑勒曜垂珪之所難也敵人好財貪色兇殘不義特盜賊之靡耳非有保國永世兼并天下之術也度其勁兵壮者老老者死其犬馬之齒日已長矣其謀臣志滿意得沈酣乎子女玉帛之間不越數年必有祻敗此易見也萬一今冬黨助豫賊昧扵一来陛下申嚴将士據大江之險以禦之彼再而衰三而竭必矣小小勝負兵家之常今未有兵交之形而遽自納侮以示畏恐情見力屈當反為所乗非兵家形格勢禁之法此遣使之無益九也夫和人之心迎合金人之意為身謀而已陛下寤寐賢才日昃不倦菲衣節食卑宫室陋器用以養戰士固将為父兄攄覆載不同之憤雪滄溟不滌之耻也若堅用和䇿則謀臣解體義士䘮氣将帥偷安而卒伍泮散以為無復有輸忠効智建立功名之日使和人自謂其說可用如此必有進為之漸以國與人取説金人大事去矣此遣使之無益十也獨有一説使陛下難處者以二帝為言耳然自建炎改元以来使命屢遣無一人能知兩宫起居之状謦欬之音者況今嵗月益乆敵必重閟惟懼我知之今以敵為父兄之讐絶不復通則名正而事順他日或有異聞在我理直易為處置若通而不絶則敵握重柄歸曲於我名寔俱䘮非陛下之利也使或有知二帝所在一見慈顔宣達陛下孝思之念雖嵗一遣使竭天下之力以将之亦何不可之有其如艱梗悠邈必無可達之理乎以此揆之則以二帝為言者理不難處也臣聞善為國者必有一㝎不可易之計正其大義不僥倖以為之漢髙祖出關得董公之謀以弑君討項羽後雖屢敗然項羽負不義之罪雖强必弱漢守其䇿不變終有天下然張良嶢關之舉養虎之喻君子猶羞道之及劉先主諸葛武侯志在復漢目操為賊亦能三分鼎立魏延出竒欲速孔眀不求近功君子以為真以天下自任者古之英雄規模注措大扺如此三國崛起曹氏先據利勢蜀最後立豈以微弱之故卑下扵操以苟存耶孟子曰君如彼何哉强為善而已今日大計只合眀復讐之義用賢才脩政事息民訓兵以俟北向更無他䇿倘或未可惟是堅守若夫二三其徳無一㝎之論必恐不能有為至扵何蘚之行非特無效決須取辱臣所見如此豈得以張浚有言而自抑也又況蒙被詔書曲加奨諭先以為榮今焉内愧所以致詳盡義忘其喋喋心在報君非好辯也若夫軍旅之事則未之學張浚以遣使為機權者臣所不諭不敢强為之説伏乞陛下幸赦之取進止厯代名臣奏議卷八十六
