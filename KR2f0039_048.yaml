body:
  text: 厯代名臣奏議卷四十八眀楊士竒等撰治道宋髙宗時提舉萬夀宫兼侍讀張守上奏曰臣仰惟陛下憂勤念治行已十年自去冬敵人不能南渡今秋湖寇蕩平中興有期内外延跂然人心惴惴猶有外侮之憂臣竊以謂夷狄未賔莫先自治盖修政事所以禦外侮也伏碩陛下念艱難之舊業恢乆大之逺圗無過不及也建大中以承天心勿貳勿疑也極志誠以盡羣慮任賢則責其大功而待以持久使能則畧其宿負而用其所長保固淮甸以定駐蹕之都奬拔偏禆以分尾大之勢愛惜名器財力以革僥倖之習崇奬忠厚端慤以銷朋比之風凡此數者安危所繋其他細故不足為陛下道也然以陛下英睿天縦於此數者少留神焉中興之烈不難致矣書稱成湯之徳曰終始惟一時乃日新徳所以日新而不窮者終始惟一而已雖書生常談而本之治道無出於此惟陛下果斷而力行之守又上奏曰臣久去軒陛孤陋寡聞比䝉召寘經幄復瞻穆穆之清光千載之遇敢不竭愚慮以瀆天聽竊惟今日之先務有六而夷狄不與焉盖夷狄未賔莫先自治試為陛下畢其説一曰立國二曰察言三曰任賢四曰使能五曰抑僥倖六曰破朋黨何謂立國陛下廵幸江浙行且十年去冬敵騎不能渡江入秋以来復無他警議者便謂長驅深入恢復中原以立大功時不可失臣以謂今日之驍將勵兵蓄憤養銳固可折箠而笞劉豫頓轡而還舊京然不過策勲第賞為一時美觀而未為國家長乆之利也何者敵國尚強藩籬未立秦晉韓魏之地強兵健馬之區悉属扵敵庭就使剋復州縣能保有其土地而撫奄其人民乎千里饋糧能不乏乎為今之計當一意經理淮甸以壯屏翰駐蹕建康暫為别都儲粟練兵自為不可攻之計然後待時而動一舉而圖萬全此立國之謀也何謂察言伏自陛下大開言路謀行計從上之宰執進呈次之臺諫論事下之百官轉對逺之草茅上書發言盈廷未易決擇又況知言自古所難臣頃承乏臺属首嘗以伊尹之言告陛下矣曰有言逆心必求諸道有言遜志必求諸非道臣每謂聽言莫要於此盖不知人主所向而言鮮有不逆者迎合人主所向而言鮮有不順者因逆心而求其是因遜志而求其非則十已得五六然後考覈其邪正叅訂其虚實於是或用㦯捨鮮有不當矣此聽言之要也何謂任賢宣王之中興任賢使能而已禹之戒舜則曰任賢勿貳所謂任者非止崇以爵位富以禄廪而已求之欲審付之欲専疑則勿用可也用則勿疑可也求之審則當其才付之専則盡其用孟子所謂左右卿大夫國人皆曰賢而後用之則求之審矣齊桓之用管仲一則仲父二則仲父則付之専矣不然則畏首畏尾救過不給何暇展四體而修職業乎夫求之既審付之既専又在乆任以責其成功堯之用鯀而陻洪水為害大矣必俟九載績用弗成而後黜堯豈不恤昏墊之民哉盖守當時三考黜陟之法也況或一時之舉措有纎芥之失一人之愛憎有毁譽之私随即廢置不惟不盡其材而法令弛張莫知其端恩讎報復各快其意徒為紛紛無補治道臣碩陛下茍得真賢則略其細故不規近効以責成於持乆此任賢之道也何謂使能能則與賢者異矣使之則與任者異矣賢者而役使之則無以盡其心能者而信任之則必有誤於國盖才可以辦事者未必賢也左右近習百司庶府各因其能使辦一職則事無不舉然非當信任也又在棄其小瑕録其大略捨其舊惡許其自新故使智使勇使貪使愚如封倫裴矩以姦亡隋也而以智佐唐李祐賊將也而卒縛吳元濟天下之才未嘗不可用也顧使之如何耳若乃以春秋責備之義以使能則能者不得而用矣能者不得而用則不過取夫碌碌闒茸不才之人夫闒茸不才之人雖無顯過而敗事必矣不可不戒也此使能之方也何謂抑僥倖艱難以来風俗敗壊貪懐茍得熾於前日在下者既啓僥倖之心在上者遂行姑息之恵名器日輕費出日廣民力愈困國勢愈弱朝受一命則夕圗堂除一有除授則繼求遷擢除代至三四輩待次至十餘年稍加裁抑則謗起於下而怨歸於上甚至以危言上惑宸聽卒如所欲而後己為今之計痛加裁抑勢或難行如内外官吏足以任使矣不必更増員闕也既有代人矣不必更有除授也官吏將士之俸廩足以贍養矣不必更有増益也人既習安無所歸咎至於為人而設官有求而必予扵是紛紛競起人有覬覦而紀綱日隳無以善後矣要在稍嚴資格奬用静退之士以息浮競之風凡妄行申請攀援不已者痛懲而申儆之則息僥倖之漸也何謂破朋黨朋黨之禍尚矣孔子曰君子羣而不黨則君子固無黨也然義理所尚不謀而同故聞善而相稱譽見善而相薦引未必有心而近於為黨唐虞九官濟濟相遜武王十亂同心同徳帝王之盛節也小人欲排陷君子將一舉而盡去之求其過而不得則一指以為黨耳善乎歐陽修之論曰欲空人之國而去其君子者必進朋黨之説欲孤人主之勢而蔽其耳目者必進朋黨之説欲奪國而予人者必進朋黨之説漢之末以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡唐之末又先以朋黨盡殺朝廷之士而其從者皆庸懦傾險之人也然後唐從而亡所謂一言䘮邦者如此豈不痛哉古者上以直道用人故殛鯀而興禹誅蔡叔而封蔡仲下以直道自任故祈奚舉其子崔祐甫多除親舊載在經史號為美談況非父子親舊而以其𩔖逐之曰朋黨此何謂也本朝慶厯之間韓琦范仲淹杜衍富弼軰嘗以為黨而盡逐之矣以至元祐之間又以司馬光等命之曰姦黨而禁錮之矣大抵人指以為黨者多賢士凡進朋黨之論亦必痛懲而申儆之破朋黨之策也陛下於此六者毎致意焉則中興之期指日可待其他細故不足為陛下道也然以陛下之英睿天縦固深眀乎此而區區以為獻者特在於果斷而力行之耳能果斷而不疑力行而不怠又必以誠意先焉大學曰欲治其國先齊其家欲齊其家先修其身欲修其身先正其心欲正其心先誠其意故誠者天之道也臣碩陛下正心誠意造次不忌終始惟一董仲舒曰事強勉而已矣強勉學問則聞見博而智益眀強勉行道則徳日起而大有功書稱湯徳日新盖欲常新而不弊也詩稱湯聖敬日躋盖欲有進而無己也儻強而行之則聖帝眀王異世同符人自歸心天自悔禍天下不足治四夷不足平中興之業不難致矣顧雖書生常談無新竒可喜之論而臣區區平昔篤信而可行者不過如此惟留神裁擇天下幸甚胡寅上言曰臣聞善建室者必立基故作舎道旁則三年不成善奕棊者必布勢故舉棋不定則不勝其偶為天下國家猶建室與讎敵争勝如奕棋而無成謀其可乎陛下總師履極十有二年中原之禍益深生民之力益困中興績效茫然未立夫以聖學日躋恭儉克己臨朝向乆眀習國家事可謂誼主矣然為其事而無其功豈不曰計畫未嘗前定故歟人主之職莫大乎論相人才政事皆由相而後舉今十有二年之間易相至於九人賢者用未及盡憂讒畏禍而已去不肖者持禄懐寵坐待黜免而後行昨日所用之賢才眀日指為邪佞者有矣今日所行之善政他日以為誤國者有矣朝廷無不改之令臣下無久任之功軍士無堅守之心百姓無固結之志持此而欲語中興豈不猶充飢以畫餅利渉以土舟者乎宰相不職而更用賢才當也數不職數更用昔人所謂誤豈可數無乃陛下知人之哲亦有愧扵古耶夫此九相者其操術智慮必不盡同求其同而用之又將疑其為朋黨求其不同而用之正猶病者用醫一以為寒一以為熱一進温補一専導利務為不同以茍免而病者亦斃矣然則國家何利焉坐此之故奔競恣睢惟利是從而仕風愈壊或和或戰俄怯俄勇而軍律益隳改更紛錯前後乖違而政事益不修舉措既煩財用横費而生民益不樂夫此四者國恃以存今而若此雖月行一美詔時建一善事僉言稱薦收召一君子交章論列罷退一小人祇為無益而已淺士短識久誦中興智者寒心方憂極弊若不及時大有變革改紀國政以趨事功而因陋就簡日復一日至於智者無以善後之時正使良平復生不能為陛下計矣昔光武中興東晉南渡其所措置務適時宜於舊法亦不盡循事雖不同同歸於治伏望陛下慨然逺覽詔兩府大臣及侍從臺諫官條具今日立國之大計經乆可行之務損益因革之宜各令展盡底藴於十日内畫一具奏陛下留神省覽斷自聖裁若大臣議絀則參用侍從臺諫之言若論思疏駮不當則専守廟堂之䇿仍集百執議于都堂衆心僉同三占從二定為國論以次施行從此者嚮用爵賞違此者威用刑罰加以嵗年力行固守庶㡬經綸有叙民聽式孚可冀中興之效不然雖人材衆多文法良是而大計不定猶丹楹刻桷輪奐翬飛於浮沙之上水至則蕩然矣雖卒武兵利若可禦敵而勝勢不立猶坐分客主局合龍蛇而一枰之上無有生眼亦不待戰罷計路而後知其敗也今敵據汴京士氣恐懾重斂嵗乆民心已離惟陛下早圗之若揖遜救焚徐行拯溺臣不知所稅駕矣寅又上言曰臣聞大哉乾元萬物資始至哉坤元萬物資生成位乎兩間則與天地合其徳故體元者人主之職而春秋謂一為元元即仁也仁人心也人君者正心以正朝廷則百官萬民莫不正而治道成矣堯舜禹傳心之言曰人心惟危道心惟微人心謂利欲之私也行乎利欲則背於義理豈不危乎道心謂義理之公也公與私在一念之間耳私欲蔽之雖離婁不能自見也豈不微乎惟危故安之為難惟微故知之為不易是故三聖研精審擇而懼其雜致一不二而懼其放不雜不放本心昭然然後能執守中道無所偏倚猶鑑眀水静扵人之美惡無不知也猶權輕重度長短於事之舉措無不當也以此為元后而仁覆天下矣周道既衰孔子作春秋首眀此心以示萬世人君南面之法更秦絶學異端並作言黄老者以虚無為心眀申韓者以慘刻為心好攻戰者以權謀為心毁倫𩔖者以寂滅為心心體既差其用随失學士大夫謂誠不如詐謂正不如譎謂道徳不賢於術數謂教化不捷扵法令遺經雖在而帝王之迹熄矣陛下濬哲文眀性與道合舉天子之事傳仲尼之心使斯文不䘮所謂天授非人力也夫源清者流澄本端者末正有諸内必形諸外為其事必有其功今士風陵夷四維未張惟利是從不顧義理利在尼雅滿則欲以釋怨恱其心利在劉豫則欲以友邦通其好利在迷國之宰輔則欲為之羽翼以助其飛利在怙權之將帥則欲為之疽囊以厚其毒姦邪回遹民之所惡者相與封殖之使不揺守道秉節天之所好者相與傾擠之使不立邪説爛漫人心不正未有甚扵此時聖人所為懼春秋所由作也今陛下於仲尼百世以俟之意聖性既自得之若夫體元居正端本清源力行所知以收撥亂反正天下歸仁之効更加聖心焉則何畏乎女真何憂乎叛賊何難乎中興之業哉寅又上言曰臣謹考歴古帝王保天下之要以民為本而得民心之道以食為先此腐儒之常談亦經邦之至論也舜命十二牧曰食哉惟時箕子陳八政一曰食二曰貨人之有食猶魚之有水水盛則魚繁減則魚耗涸則魚死至易見也民獨何以異此方七國争雄之時争地以戰争城以攻尚權謀棄仁義謂可以朝諸侯有天下而孟子獨以農桑牧養之事告時君莫不以為迂闊無効是時惟秦兵力最強鞭笞四海卒立為帝孟子之言真若迂闊矣秦惟兵之強而不恤百姓視民如草芥朝芟而夕刈之曽不二世而雍州之地崤函之固為他人所有則孟子之言乃至急至切而非迂闊也臣觀今日民力有水涸之勢其可憂不在尼雅滿之下願陛下勿以為腐儒常談使臣得畢其説趙充國西漢名將曹操三國英雄其用兵無不屯田積粟而今日之兵開口待哺此何理也自司馬法及戰國以来䝉恬白起頗牧信布之流臨敵制勝無不計首級而今日功狀皆言不令斫級一布掩殺横屍㡬里或入水不知其數此何理也自古臨敵有用命者有不用命者故藝祖皇帝嘗出入行間以劒斫士卒皮笠記其退縮者事定而誅之若其摧堅陷陣則賞不旋踵是謂有賞有刑旌别勇怯而今之賞功全隊轉授未聞有以不用命被戮者此何理也自古行賞其將帥勲伐尤異者則遷其官秩或封以國邑若其士卒則犒賜而已或以金帛予之而已今自長行以上皆以真官賞之人挾劵厯請厚俸至於以官名隊此何理也自古利權盡歸公上予奪操縦惟君所命如李牧之軍市租如藝祖命邊將回易之𩔖則衣糧器械賞設之費皆出其中今煑海𣙜酤之入遇軍屯所至則奄而有之闤闠什一之利半為軍人所取至扵衣糧則日仰於大農器械則必取扵武庫賞設則盡資於縣官此何理也自古制兵有事則付之將帥無事則歸之天子光武中興可謂馬上取之之時矣猶且不假將帥以久權鄧禹取三輔總數十萬衆一旦無功奪之如探囊中物今總兵者以兵為家厚自培植若不復肯捨者曹操曰若欲孤釋兵則不可也無乃𩔖此乎自建炎以来易置宰執凡四十餘人矣謀慮不臧政事不善雖台衡之重股肱之親一言而去之何獨於將帥而不可進退以均勞逸之任拔沈滯之才乎此又臣所未曉也自古制兵必有實數戰闘則有敗北平居則有死亡緩急則有散逸此不能免也今諸軍近者四五年逺者八九年未嘗開落死損折傷之數豈皆不死乎抑随死随補乎逃而不以告敗而不以告死而不以告補而不以告不可也以補者之姓名充死者之姓名以死者之妻子為補者之妻子不可也不然軍籍何自而無缺乎此又臣之所未曉也自古制兵必去冗食存精銳分為等級如所謂百金之士千金之士則戰之所恃以必勝者其餘充聲勢備輜重而已則所以食之役之者不敢與銳卒班焉雖其等如是然無非軍旅之用也今諸軍則無所不有矣避賦役免門戸者往焉納賄賂求官爵者往焉有過咎不得仕者往焉犯刑憲畏逮捕者往焉違科舉失士業者往焉則又有鄉黨故舊之人百工手藝之人方技術數之人音樂俳戲之人彼所以輻湊雲萃者非有勢以庇之乎非有利以聚之乎不然人生各有業何必軍之從此又臣之所未曉也凡今日軍政之弊其大致如此其詳從可知矣恭惟陛下克己臨政惟儉惟勤無華衣美食之奉無嬪嬙柔曼之嬖無宮室臺榭之觀無撞鐘舞女之樂無匪頒賜予之濫寛詔屢下以民為心惟恐傷之若保赤子者九年於此矣加以東南諸路未嘗有數千里水旱之變民力宜足國用宜裕而上自宰相下至縣令諰諰然日以軍食不給為莫大之憂索之於帑藏則無終嵗而不發之儲索之於計司則無運轉而不竭之貨索之於州縣則無陳積以待調發之物索之於百姓則無出力佐興有餘不匱之家然而贍軍之費嵗嵗増益日樁月樁急於星火要王官置審計以示覈實無隠之狀而境土未拓叛賊未擒讎敵未殱二帝未復不幸而旱蝗水潦方數千里連二三年因之以盜賊則不必尼雅滿㸃集劉豫犯順而國家之大事去矣是豈小故可不思所以善後之策乎今邊防無事之時則曰兵數衆多食不可闕也及疆埸小警則曰兵力不足敵不可當也情狀盖盡於此其智術機巧不施之於敵國而施之於朝廷大要在於自計而已官愈髙則待之當益隆兵愈衆則畏之當益甚至於民力已竭國用已屈自彼觀之猶越人視秦人之肥瘠耳亦何足少槩其心哉故臣謂兵政不修則水涸魚死之喻指日可見矣臣愚謂宜扵諸軍中各選取壯勇京軍三二千人補宿衞之缺存祖宗三衙之制使兵政有考然後命諸將揀其軍為三等請給視之凡上功狀依舊制論首級又命各舉所知可以為將帥者各若干人就以其軍分試之無事則分戍有警然後聽大將軍指揮凡疾病而死及失律散逸者即時具數申上闕額必聽朝㫖補填屯軍所在不得侵奪在官之利以兩淮荒地分給頃畆責委大將率次軍下軍受田而耕其上軍則固護營屯閱習武藝諸大將宣力有年或告勞而有疾不當強使之宜毎軍置副帥一人叅管軍馬以俟交代其謀議官許置兩人一聽自辟一從朝廷選授諸將總軍則於州縣之事都無干預雖建使置司其官属猥多至數十人坐糜俸禄宜從減損凡監司守令皆係王官與陛下分民而治者也兵將官即不得輙有按削凡校用使臣自為隊伍者先會總數然後分番按試若不䏻挽強撃刺即黜之勿令竄名冗食如此之𩔖朝廷改紀法制示以必行則兵威自振民力自寛國用自足矣自古建官非為他也惟以為民也凡事皆本於有民無民則無事無事則無官而終不能無也故因事建官使民出粟以養之事治則足矣而未有羣天下之人無所職任而禄之者也而未有以優局餼廪以待不才有罪之人者也今日宫觀嶽廟添差不釐務可謂姑息之極弊非修政事攘戎狄之先務也非寛民力足國用之要術也此其為害亦餽餉之次矣士大夫惟元臣故老有徳有勞閔煩苦之役示恩意之人處以宫祠差遣自餘任事則食禄否則罷之而已矣猶慮貧窶可恤者據品秩給以閒田可也至於監當等官皆課利所出費用所資乃有一闕添差至五六人者為公乎為私乎若其為公則不當差也如為私者天下吏員猥多皆可以五六人而共一闕矣何獨監當而可乎故凡添差與所謂不釐務悉宜減罷也䘮亂以来士子廢學失業惟志扵得平時則投匭函獻封事科場則乞收試求恩免風俗大壊宜有率勵之道將来科埸宜降指揮特展三年且令進修以待後舉比年法制從寛遷官僥冒者衆人得任子仕流混濁當相時之宜稍澄其源凡任子之恩遞陞一等大禮奏薦者必至朝議大夫而後許自是率而上之不隔郊者仍須隔郊得者既艱又須嚴入仕之門守銓試之法未出官人勿令以恩例及奏辟入官必須試選合格乃聽注授如此之𩔖朝廷改紀法制示以必行則流品漸清民力自寛國用自足矣則又遴選守令而乆任之以拊循既困之民民各安業則生財之路廣公私皆濟無乏絶之患以守則固以戰則勝何為而不如志乎或謂如臣所陳乃今日大病也而無治之之方人徒䏻言之耳臣以謂不然彼數人者自陛下拔擢用之非有世家根據難馭之形陛下灼見利害命大臣條具一幅詔書敢不從乎握兵而不從人主之命彼將何理以自白臣知其不敢違也若因循今日之事更加以嵗月則唐末五代之禍真可馴致矣夫濟大難之世必有拂衆之畧絶人之才乃立非常之功光武起兵誅討僭叛中興漢祚宜其蕩然施恩以收西京人心然考其所為則用法嚴宻未嘗以政恱人至於減天下吏員十存一二而已豈聞人懐怨咨欲充無厭之望乎孔眀輔劉先主志在復漢倡大義於天下而所據險僻又出吳魏之後宜尚寛大以固蜀人也然考其行事限人以爵律人以法其始蜀人不安其後遺愛比之召公甘棠死之日百姓如䘮考妣而不聞有舎蜀而走吳魏者人心惟是之從耳處置盡公必自帖服不在溱洧之濟濡沫之恵也漢削諸侯七國同日反景帝憂其得山東豪傑袁盎曰吳王安得豪傑而用之所用皆鑄錢亡命耳如得豪傑亦且輔吳王為誼不反矣自頃以来朝廷稍欲裁制冗濫恤民便國小人不利輙從而譁之或造為謠言以駭動朝聽至謂無所得於此則攜持而北去胡不觀稱臣拜敵有一人賢智之士乎廟堂公卿無鎮浮之量亦從而改度輟令者踵相接也嗚呼曽謂如此而可以振頽敗之俗成中興之功哉太祖太宗櫛風沐雨東征西伐以平藩鎮之禍收養民之功而陛下倒持太阿髙拱熟視以成不掉之勢為失民之事臣竊憂之伏望陛下出臣此章眀詔大臣考其當否早議國制若以前人已壊之迹今不可為安知他日又不難於今日乎臣不勝納忠懇切之誠趙元鎮上奏曰臣向䝉陛下不以臣不才寘之宰輔前後三嵗迄無寸功聖度兼容忘其所短懇辭去位禮意益隆粉骨捐軀未知所稱今者待罪藩郡使得自佚曽未朞年遽叨召命俾預經幄示不終棄自惟何者辱陛下知遇如此然臣區區之愚有不得已者不免仰瀆天聽臣竊惟陛下紹祖宗之業當艱難之時柬拔儒臣列侍講讀非欲分章摘句為書生事業必將論道之餘訪以當世之務臣雖學識迂僻不足仰禆聰聽亦欲少施所藴時有獻替是迺祖宗設置經筵之義況扵今日乎臣謂陛下所當諮訪於講讀之臣者内則政事之得失外則邊事機籌而已臣之思欲獻之於陛下者亦無以踰此臣素不知兵然兩經捍寇粗識事宜謂先固本根乃議攻戰屯大將於江濵分精銳扵淮上首尾足以相應聲援足以相及敵雖強梁欲謀深入前迫大軍之勢後有尾襲之虞而我之漕運既省民亦少安設或長驅頭舉而身随矣跨河越岱無不可者故於臨機應變之間反復憂慮以持重為先或欲置之危地必取成功非不可勝之策也若今之邊事規模宏逺事勢恢張固已盡善但與臣所見偶不同耳亦非怯懦者所䏻知也臣昧於治體然昨在揆路妄意區别謂朝廷之上屢立黨與吕夷簡范仲淹之黨可合也學術政事所同而其人多忠厚老成之士王安石吕恵卿之黨可合也學術政事所同而其人多才能少俊之流至若元祐之人與夫紹聖崇觀之黨則不可合也學術政事不同而品流趣嚮之異也故於進退賞罰之際申嚴勸沮使人知所嚮或欲混善惡於一途則善𩔖必沮傷納君子小人於同域則小人必勝理之自然害政之大者也若今之政事議論好惡黜陟取捨固已盡善但與臣所見偶不同耳亦非淺陋者所䏻及也此兩事之外其他所不同者固不一而臣亦不敢自以為是顧頑冥之資執其所見而已今措置已定法令已行羣心退聽習俗丕變矣陛下儻欲採用臣言重為更革則中外擾擾何時而已臣行年五十有三衰疾侵尋死亡無日亦安能遽䘮所守俛仰從人儻使厠跡諸儒議論之末陛下將何所諮詢臣亦自度無可獻之陛下者如其遂非不悛執迷難化永為棄物不復可用亦其分也是以聞命而来逡廵恐懼屢陳辭懇不敢但已誠恐進對之言與時不合奉身求退重取慢命偃蹇之誅非陛下疇昔顧遇許以保全之意況自夏及秋足疾増劇痛楚浮腫有妨拜趨臣已别具劄子奏乞改除一在外宫觀外輙敢盡布腹心宻聞扵陛下惟陛下憐之俾臣終老山林死無所恨監察御史鄭剛中上奏曰臣聞人主未嘗不欲求言嘗患言之難聽論事者未嘗不欲言之行嘗患言之難入漢文帝謂張釋之曰卑之毋甚髙論令今可行也後世學者多指以過文帝謂其不能抗志逺大而限言者以卑小也嗚呼甚髙之論詎可聽哉大不觀時小不揆事辨博之說縱之於三皇五帝之上而濟用之實常若玉巵之無當是果何益文帝戒釋之未為過也雖然文帝何不要釋之以至當之論而雅意欲其卑乎此不為無過夫髙之與卑不相侔矣髙雖不可縱卑固不可溺天下之理一溺於卑則事功衰靡流弊不勝言其失視甚髙論者猶不啻也人主之聽言人臣之論事使其上不縱於甚髙下不溺於太卑常守至當之論以一天下之趣向則亦何患乎言之難聽難入哉故臣嘗謂論治道必歸於平論人材必歸於恕論治道歸於平者非謂見小利忘逺害也見小利忘逺害則陋而已矣今恐務虚名者不得成貪竒功者多後患與其相夸以所難相靡而無實曷若因時順勢相與守吾可行之道敦本節用修禮正名未起者加振未備者加飭常使上正而下自服内治而外自賔如是則所以求治道者不其平乎至若廢紀綱而不修蕩名節而不勵謂為逺而不肯行謂為重而不復舉兹又人君之所宜勉也論人材歸於恕者非謂以小人間君子也以小人間君子則雜而已矣今恐臯䕫不可以世有稷契不可以輩得與其舎近慕逺異世而須才曷若磨礲砥礪觀其心術之邪正茍不至畔道而害治則自可量才而使因能而任常使效知無不及之事陳力無不勝之誅如是則所以得人材者不其恕乎至若倚忠為姦盜名欺世無能為而可以害吾之有為託能言而有以揺吾之國是者兹又人君之所當去也論治道歸於平論人材歸於恕此所謂至當之論可以一天下之趣向者惜乎文帝獨不以是而要釋之耶恭惟陛下體乾坤覆載之德廓山藪包含之量謂祖宗率皆疏通耳目容納臺諫故即位以来加恵言事之官雖衆智畢陳未必有裨於萬一而開懐屈意舜禹不能進持此以濟中興之業固有餘裕臣以愚賤之資誤䝉器使未知所以報厚恩者然考之厯古其能随事啓沃開陳主意者固自有數餘非髙而誕謾適足以起世主之疑則卑而淺陋不足以廣上之心志故其說常齟齬而不合區區淺陋之愚尚庶㡬於犬馬之自竭惟陛下憐其愚而幸赦之提㸃成都府路刑獄公事馮當可被召上奏曰臣觀自古聖帝眀王未嘗無待於學然帝王之學異於儒生不在於貪多務得以資博洽之才含英咀華以為文章之美在乎叅諸既往之迹揆以當今之政立政行事以古為法如堯舜禹之若稽古商髙宗之鑒成憲是也陛下聖性髙眀好尚純古萬機之暇躬覽載籍該貫總攝洞見百家自開闢之事治亂成敗之蹟如指諸掌其為學可謂至矣至於立徳行事以古為法者臣願陛下守其所已至而勉其所未至也自古戡定多難必由克斷臣願陛下剛健法天以為再造之本自古君論一相用終其人臣願陛下任賢勿貳以立一定之規自古任賢使能不肖者退聽臣願陛下旌别賢否以絶濫吹之失自古強幹弱枝未然者先慮臣願陛下封植本根以戒履霜之漸非特此數者陛下廓開聖鑒洞照古今凡古由是而治者以之為法凡古由是而亂者以之為戒則大業富有盛徳日新雖自古聖帝眀王之學何以加也昔齊宣王好色好貨孟子猶曰可以為王陛下好學帝王之盛徳也臣願陛下擴而大之追蹤前古以幸天下髙宗親政策士諭考官曰對策中有陳朝政切直者並寘上列太學生王十朋以權為對大畧曰攬權者非欲衡石程書如秦皇傳湌聽政如隋文强眀自任不任宰相如唐徳宗精於吏事以察為眀如唐宣宗盖欲陛下懲既往而戒未然威福一出於上而已嘗有鋪翠之禁而以翠羽為首飾者自若是豈法令不可禁乎抑宫中服澣濯之化衣不曵地之風未形於外乎法之至公者莫如選士名器之至重者莫如科第往嵗權臣子孫門客類竊巍科有司以國家名器為媚權臣之具而欲得人可乎願陛下正身以為本任賢以為助博采兼聽以收其效㡬萬餘言上嘉其經學淹通議論醇正遂擢為第一劉行簡應詔條具利害狀曰右臣伏覩今月二十七日手詔令中外侍從省臺寺監職事官監司守令等各述已見的確利害凡可以省費裕國強兵息民者條具以聞仍已詔大臣置司修政有言聞達悉付講求有以見陛下焦勞圗治宵旰靡遑仰師周宣所以内修政事外攘夷狄之意以恵天下甚盛徳也然臣嘗謂修政之舉置司而講求之宜也何宜聞而久未聞耶昔梅福以南昌尉上書乞假軺傳至行在所條對急政四方之士固願効其所聞以為所不當緩如福者多矣及今始求之豈亦所謂急政者乎方今中原版蕩九廟播遷外憂猾夏之逺夷内有弄兵之羣寇而又僭偽竊國之人反側自疑日夜謀我言政之急未有如今日者陛下詔臣等以省費裕國強兵息民之事固議者所當急急矣然事不素講而求之於一朝一夕之間所謂足國裕民者誠不知其方欲足國則民不裕欲裕民則國不足一旦用度有闕郡縣吏不過隂取於民以應公上之須陛下亦莫得而知也所謂省費強兵之事亦然欲省費則兵不益欲益兵則費不省加又有烏合招来之寇存之則糜費廪食不足恃以為強汰之則無所歸且覆出為惡議者處此誠知其難也今日欲為陛下論之而不知所當先則為不知言陛下問修政於羣臣而不先其所自為則為不知政今日之事在陛下躬行者顧莫先於省費非謂天下之費必待陛下而省也以為不如是則不足以感人心而示好惡政之本不立也臣愚不肖待罪臺屬于兹有日矣竊聞陛下小心如成康儉徳如文景篤好書傳踰於聲色尚方服用簡樸無華與士庶之家等縉紳交歎以謂聖慮宏逺不以一日奢靡快意為樂也然邇来議者頗謂嵗取左藏庫金帛之數不減全盛時有司告病縉紳惑焉豈陛下儉扵一躬而賜予或未節耶且左右親近之人至無厭也不以禮法抑之將何時而已仁宗皇帝嘗語侍臣曰左藏庫月供錢千二百緡此周王所謂供王之好用朕宮中無所費其令罷之當是時左右親近之人非不多也然而無所覬覦者知不可也又況其間畏義知耻與上同休戚者雖予之將辭焉其不然者皆貪得無厭不與上同休戚者也又何恤焉且陛下厚於及人而以身當天下之謗其無乃自為謀者疎邪臣碩少抑賜予之費與所謂雜色供奉冗食無用之人稍鐫減之示好惡於天下則修政之本已立其事為之末乃可議耳夫修政之目無微而不當舉誠將次第而行之莫若詔監司郡守縣令各至所部詢問父老講求一方之利害若曰孰利未興孰害未除孰民田有遺墾孰為知兵孰材武可用孰土豪可任使其當山川控扼㳂江瀕海之地則曰某地可守某地可戰某地可為寨柵廬舎某處可以積粟漕運各以方畧来上然後以其說深考而熟計之度其可者行焉間遣近臣巡按其地而核其實以為之賞罰黜陟則事無有不得其要領者今未嘗目見耳聞而獨使之汎然論天下之利害其有益於施行者無㡬耳趙充國號為通知四夷事者且曰百聞不如一見臣碩馳至金城圗上方畧況餘人哉乃若省費裕國強兵息民見於事為者則臣謂莫若求之民兵盖四者一事而已古者兵民為一故兵不可勝用而國不知費趙一國耳長平之戰四十萬人死其後亦不聞無兵秦男子十五以上皆驅之軍則是民即兵也比年以来為民兵之説獻於上者多矣卒莫之行巡社之法既行而旋罷豈朝廷難之以為擾民耶是計之未熟而行之不得其要者也若臣之說則異扵是陛下即行之不過下半紙檄以頒郡縣郡縣承天子詔㫖而告之民民則樂從之矣初無有甚難盖其說曰不募不籍不教不易其名不奪其業不係縻於官不程督以吏如是故民不擾而樂從凡縣鎮鄉社之民通使為之不欲者勿強並習兵器若弓弩戈矛槍梃刀牌等随其所習以今所謂保正長者總之曉以利害使各保其田桑廬舎境内有寇悉聽捕逐其獲寇之賞則有常格見於著令若遇大盜并力殺獲則聞于朝稱其事而旌賞之如効用之法其平居講習精於武藝者聽保正長推舉不以多少聞于州郡州郡按試之如所舉者為之旌别蠲其身丁及三犯杖聽贖彼固知保田桑廬舎之利而又有意外旌賞之寵無所係縻無所程督亦誰憚而不為哉今夫羣天下之士而試之有司次第薦送而官使之彼誠利扵得官也挾策覔舉雖終老而不悔曷嘗募之使為科舉籍之使不脫耶使民習兵無以異此為農為商不易其名不奪其業且將因閒暇時嘯其朋儔自相講習挺者撃戈矛者刺弓弩者馳射彼歸而求之有餘師又何必驅而教之為哉且山谷强悍之民初未嘗教也而藝絶官軍者所至多有如曰必驅而教之使知坐作進退是猶博士先生緩帶徐步升堂巍坐而談經坐諸生堂上撃鼓而進退之以為文物表儀化民成俗可也所謂學者豈真有待於是乎孔子曰不教民戰是謂棄之而臣乃以鄉社之兵為不必教者非兵無事於教也以其勢與官軍不同非仰食公上者也所繋至衆一或擾之將不樂從藉令習業不精假之嵗月所得十一不已多乎嗚呼兵之弊甚矣其患有不可勝言者在祖宗之時平居無事則竭天下之力以養兵在今日國勢阽危則竭天下之力以養亂今臣之說雖未能銷患於赫赫之際而䏻為陛下銷患於冥冥之中雖未能足國裕民於一朝夕之間而能為陛下足國裕民於三嵗之後且為久逺無窮之利若以三嵗之後無救目前因置不講則是其弊終不可救也碩陛下下臣章雜議若以為可則立為賞功勸勞之典叅酌舊所著令損益而施行之此臣所不能知也或曰臣之説朝廷非不聞也不果行者懼民之知兵且為亂也臣曰不然強悍之民倔起山谷十百為羣輕犯縣鎮居民無逺近多寡望風奔走與異時敵人所至率以一歩卒聫十百人而驅之拱手屈膝以受箠撃莫敢與抗者非不顧其生也誠未嘗知戰闘撃刺之事耳僅有一能者則荷戈持梃出當之矣此臣所耳聞而目見也借令一鄉社之民自起為盜則有他鄉社之兵制之一縣鎮之民為盜則有他縣鎮之兵制之矧未必皆然耶臣之念至熟悉矣雖臣觀陛下詔大臣設官属置司講論以修政為名誠美矣顧所以稱是名者宜何如哉使一國之政如一家之政小大協心上下告語畢精窮思推忠盡誠罔有嫌間不顧望陛下風指不迎合大臣議論惓惓焉閔閔焉唯恐一事之有遺策一物之有遁情則庶㡬焉臻於有成可日月冀也如其好是美名而不克充其實且聚訟交訾若築室于道謀則非獨不可以日月冀抑論議有不出於至公者矣元豐條例之舉崇寧講議之名事出權臣弊政充塞貽天下患害至今未艾也碩陛下察焉臣愚無知識姑陳其槩以塞聖問伏惟留神幸察行簡又上劄子曰臣竊惟天下之事下合人心上合天意中合大道者唯有一言曰公而已矣老子曰容乃公公乃王王乃天天乃道盖混而為一非容不能公三公之稱謂其容而能公也王訓大王者之稱謂其公而能大也則是公不可不與王同徳王不可不與天同道此天下之至理也臣竊觀陛下自臨御以来於天下之事未嘗容心於其間大臣以為賢則進之臺諫以為否則退之與政事之因革羣臣皆以為可則審度其言而罷行之可謂至公而無私契天合道者也然而身為三公不知與王同徳者非一日矣已所好者與之雖愆扵理而害於事者弗非也已所惡者奪之雖才有堪於用者弗取也議有當於人心者弗行也夫如是則政事安得無疵纇民安得不受其患哉惟公也故賢者碩立於王之朝而不肖者退聽而革心道徳所以一風俗所以同上無粃政下無幸民内治之所以舉逺人之所以服夫所謂公者一言而已矣見於利害乃如此其大可不審耶臣愚欲望陛下詔執政大臣諫官御史與百執事咸體上心剗除弊習宏開正路終始惟一則治道之隆三王可四五帝可六天下廓廓乎其無事矣行簡又進故事曰漢武帝向儒術丞相竇嬰太尉田蚡亦俱好儒術推轂趙綰為御史大夫綰薦其師申公天子使使束帛加璧安車駟馬以迎申公既至天子問治亂之事申公年八十餘對曰為治者不在多言顧力行如何耳是時天子方好文辭見申公對黙然然已招致即以為太中大夫舍魯邸議眀堂事臣嘗謂申公之言天下之至言也自古好治之君未嘗不慷慨思見天下之賢士求天下之議論次第而施行之已而利害之實既了了於胷中則忍而不䏻決見利不克興知害不克除談有餘而實不足者往往皆然中庸曰好學近乎智力行近乎仁武帝之初盖未辨此也故於申公之對有惑焉其後罷斥百家表章六經制禮樂易服色典章文物燦然大備意有所在皆力行之不見甚難安知非申公之言有以發之歟使其所行不改文景之恭儉而専在於愛民利物之間則後世必以為賢哲不世出之君矣然武帝席文景極治之後扵天下之事尚謂猶不可不力行如此況多難之時乎臣故曰申公之言天下之至言也行簡又論人主力行果斷疏曰臣聞之書曰非知之艱行之惟艱又曰為治者不在多言顧力行如何耳盖自古有為之君未嘗不慨然欲聞天下之言而求其利害之實也既聞之則安之乃不果扵行者往往皆然此無他疑似之論有以惑之且不能自克故也恭惟陛下憫宿蠧之未除念頽綱之不振政煩民困用廣財殫申詔大臣置司講究凡不可於民而害於政者皆罷行之徳意至渥也然曽未聞有所施行臣之私憂過計顧恐有以疑似之説欺陛下之聽者曰茍如此將失人心矣臣故欲為陛下言之夫所謂失人心者懼刑政之苛虐賦役之猥多失百姓之心也懼好惡之不公賞罰之不眀失士君子之心也若皆無是則所失者小人之心耳失小人之心而得百姓士君子之心又何病焉臣碩陛下扵今日之政當審知其利害所當罷行者斷自聖心勿貳勿疑庶㡬速見成效而事之委靡不振者悉舉矣伏惟留神幸察戸部侍郎葉夢得上奏曰臣聞邊患暴起驟亂中國自古未有如今日之甚然盛衰循環雖天道有不䏻免惟知消息盈虚之理而應之不失其道則易亂以為治變危以為安亦在人之所為而已周以后稷創業扵始功徳厚矣再傳而為不窋遂失其官公劉繼之去邰而國扵豳周復以續自公劉九傳至古公其積行累功愈隆扵前而迫扵獯鬻復去豳而國扵岐實啓文武遂有天下文王之時亦有玁狁昆夷之患自文武九傳而為厲王復迫於犬戎宣王繼之周復以興三代如周無以加矣而失國者再失天下者一㦯迫扵獯鬻或迫扵犬戎然絶而復續終不䏻亂其乆長之業至扵卜年八百卜世三十者有公劉大王文武宣王承其後故也今國家之勢不幸𩔖此然以我二百年太平安寧天下生息繁庶不見兵革之乆則盛極而或衰以敵孱陋荒穢假息一方不列扵王會未甞得與中國相通則衰極而或盛理宜有之但消息盈虚兩盡其變則我之蹔弱未必不為盛大無窮之基敵之驟強未必不為滅絶速斃之本昔者吳王夫差伐齊既勝而歸伍員曰天之所棄必驟近其小喜而逺其大憂王若不得志扵齊而以覺王心吳國猶世今天禄亟至是吳命之不長也未㡬吳果滅扵越吳人侵楚入郢敗其舟師獲二帥七大夫楚國大懼子期又敗扵繁陽令尹子西獨喜曰乃今可為矣扵是遷都扵鄀改修其政而楚復定以吴占敵安知天不逺其大憂以楚占我則天下固亦因此而可為矣況以祖宗徳澤蟠結之深厚太上皇帝謙遜自約淵聖皇帝寅畏小心陛下繼之以英烈神武世世相承有后稷公劉文武宣王之美而無厲王之過竊料敵不出三年其勢必亂何者自從事契丹以来㡬二十年人疲衆怨一也烏竒邁惸然逺交而斡里雅布尼瑪哈奄有中國之財之地其勢必爭二也所用之兵刼諸小國烏合之衆以為肘臂所謀之人託諸契丹䘮亡之餘以為腹心恩怨不齊間隙易生三也既再得志扵我其氣必驕所盜金珠玉帛之富適以啓其侈所據子女服食之奉適以稔其欲侈動而欲肆何恃可乆四也燕趙汾晉驅其殘破之人朝夕謳吟思漢必不甘心忍為左袵之鬼小伺其間必棄而来歸衆散人離不過威以刑殺則怨怒愈甚内將自潰五也積此五者理豈乆長惟是自古復國之難必大智不惑大勇不懼知逸樂始扵憂勤敵國外患適為我利乃能有濟此臣所謂應之以道而盡其變者也恭惟陛下睿眀之徳足以厯觀盛衰之理雄武之量足以徧應強弱之實伏望深考成周所以絶而復續之故以永公劉大王宣王之功慎察吳楚所以更為存亡之端以質伍員子西之論講修政事集用忠賢憂其所可憂而無屈扵我之蹔弱畏其所可畏而無憚扵彼之驟強則克復七廟之業内安四海北迓二聖可必得而伸也御史中丞廖剛上奏曰臣聞欲正其末必端其本欲清其流必澄其源自古為天下國家孰不欲興利除害振滯補弊以成治功然而毎不能者不求其本源故耳臣竊觀今日天下之事不循其本而為之者尚多如患經費之不支則多方聚斂不曰省事而均節之乃其本乎患盜賊之未息則窮力討捕不曰擇人而安輯之乃其本乎事功之不立以方作俄輟人不得盡其才故也命令之不孚以輕發數改民無以定其志故也至若刑威弛而馴致兵驕名器輕而寖成官冗未有無所自而然者亦在反而求之耳雖然此特事之一端而已事之端固未易殫舉抑有所謂本源之大者焉孟軻論天下國家之本在身董仲舒言逺近莫不壹扵正獨在乎吾身之正是故叢脞則萬事隳清浄則民自定是謂本源之大者得其道則無為而治者也揚雄曰天下雖大治之在道四海雖逺治之在心其是之謂乎君惟眀乎道意誠而心正則忠邪如見肺肝是非若辨白黑亦何待人言然後喻哉區區愚忠姑請以是為獻李彌遜自廬陵以左司召上殿劄子曰臣聞善為國者如持衡本末輕重常使適平無偏而不舉之患焉唐自中葉以還方鎮驕横稔成禍亂至于五代益甚藝祖躬覩其弊懲前轍之傾故削州郡之權以尊王室以攬威柄誠得銷患捄時之宜然當是時強兵勁卒悉屯京師及西北近畿往来更戍不絶扵道百姓逸樂財用豐衍州郡奉行詔條得以無患其後承平既乆兵制寖隳民益無聊而州郡之權益輕本末俱弱以致禍患此已然之眀效也至于今日曽未少革帥守但持空拳兵寡民貧城池隳弊財賦悉以上供餽餉不足枝梧目前常不暇給平時稍為備守之計則羣議力沮之萬一有警拱手罔措賢者則甘心守節不肖者則奉身逃生雖誅竄失職之吏其害己不可勝道矣朝廷平時視州郡如越人視秦人肥瘠曽不曰王者以天下為家朝廷賴州郡以為藩維也州郡撓弱則朝廷之勢不固矣譬如千金之家知堂奥之可保而略其門廡不知門廡之隳堂奥其可安乎臣愚碩慎擇賢材以任帥守假之事權使得竭才展效鎮安一方上寛顧憂下銷奸宄以效臂指之用昔董仲舒曰當更化而不更化雖有大賢不能善治今政解而更張之時也伏望睿慈留神擇中天下幸甚彌遜為户部侍郎又上劄子曰臣嘗觀唐太宗問創業守文之君而房𤣥齡以創業為難魏徴以守文為難臣愚以謂創業守文雖不為易而中興為甚難也盖振頽綱補弊政易風俗集流亡政之可因者悼前轍而或廢事之可革者守膠柱而不移欲其成功誠甚難也易曰有過物者必濟故小過之後受之以既濟自古人君非有大過人者不能囬衰亂之俗以為安平之治也惟周宣王以任賢使能而䏻復古漢宣帝以信賞必罰而致中興光武以總攬權綱造漢室肅宗以治兵討賊復唐祚元帝以虚心下士收一時之望以保江左至扵區區勾踐尚能苦身焦思滅強吳尊周室以復其國則天下之事未有力行而不成亦未有不為而能成者也降是而往雖有願治之君而終不能成其紹復之業者政事之間害成者多而不能去故也將帥雖衆而失控御之術害成也財用雖足而失均節之道害成也立政者茍一朝之利而不為經逺之計害成也在位者懐自安之私而無許國之志害成也有是數者而欲中興之功是猶農夫不去草莱而望苗之興顧不難哉仰惟國家之難曠古未聞陛下宵衣旰食坐薪嘗膽凡政事之得失生民之利病人材之賢否與夫任將帥練兵卒豐財用一有補扵中興之治者莫不深究而力行之然蹙國未復強敵未殄豈規摹未定而害成者未去乎今强敵㽞屯中原資糧畿甸分兵淮泗觀時伺釁窺我中國其志甚大未肯輕舉兹忠臣義士所以流涕而芻蕘縉紳每為寒心者而朝廷方且崇大體務鎮静狃目前之安忘善後之計如秦人越人端視而不加恤臣愚所未喻也臣聞孟子論當務之急易經著随時之義君子見㡬不俟終日又聞賁育之不戒童子之不抗魯雞之不期蜀雞之不支若計謀不先定將帥不協力士卒不素練饋餉不預備玩嵗愒日不早圗之一旦秋風髙胡馬鳴後時之悔若噬臍焉殆將何及臣碩陛下斷以乾剛照以離眀體當務随時之訓如救焚援溺之急馭將以道節財以理變茍且之政以為逺圗懲自安之私以勵臣莭力去此害成者然後任賢能如周宣王信賞罰如漢宣帝總權綱如漢光武掃大憝如唐肅宗下取元帝勾踐之事以為規監將見中原不足復强敵不足破誠宗廟社稷海㝢元元無疆之休臣不勝憂思忠憤激切屏營之至通判廣州汪應辰召對上奏曰臣竊以天下之事智足以謀之力足以行之雖或甚難宜其無不舉者然考其效驗往往與人繆盭而變故之發常出乎智力之外已往成敗之迹其如是者多矣是以聖人論天下之事以為非人所能必歸之扵天至其論天道也曰我不敢知曰天不可信曰天難諶命靡常又必歸之扵人事夫所謂人事者非恃其智力之謂也即吾之仁心誠意所以無媿於天者擴而充之以至扵廣大勤而行之以至於悠乆不以好惡之私汨其正不以利害之變易其守使存於心者無毫髮之差施於事者無竅隟之闕表裏純粹與天為一天且不違則事雖甚難盖有不足治者沴氣可以消而為和獷心可以化而為善衰敝之俗可以易而為治安四逺賔服百嘉鬯遂皆其方寸之所發夙夜之所積者爾由是以言所謂天道即人事也故二帝三王君臣之間更相儆戒未嘗不稱天盖其心未嘗不在帝左右也秦漢而下聖學益微天人異觀幽顯殊致而天下之治亦有媿扵古矣恭惟皇帝陛下以聰眀睿智撫囏虞之運軫念南北赤子肝腦塗地之禍發自淵衷屈己修好以保全遺黎導迎善氣此天之心也昔戰國紛争獨孟軻以謂不嗜殺人者能一之行仁政而王莫之能禦而臣嘗考東晉以後南北分裂二百餘年北又析為十六國其間變故不可勝計然南亦莫能相尚盖其所以失者或不量事勢輕用其民以僥倖扵戰勝或因循茍且安扵細娛未嘗至誠惻怛講修仁政為乆大之計故終無以仰稱天意也陛下超然逺覽灼知天意所在好生之徳固已格于上下惟是政事之間天下之民有望扵獨斷者乆矣比日以来眀詔數下革去宿弊芟夷蕪穢解弛煩宻振拔滯淹䟽導壅塞一皆出扵聖意斯民歡喜鼓舞至或感泣人心如此天意又可知矣然陛下所以保大圗永欽承天休者豈特如此而已哉推平昔聖心之所存與今日仁政之所已行者兢業扵㡬微之際基命扵宥宻之中必將日新又新以幸天下人材既進不間新舊而特致嚴扵邪正之辨言路既開不間䟽逺而特致察扵是非之實求政之闕遺而増修之使之為富彊之國求下之疾苦而振徳之使之為太平之民至於天意人事合若符節曠然大變將有不期而自至者盛徳大業皆在扵陛下矣應辰為户部侍郎又進故事曰唐太宗初即位置𢎞文舘精選天下賢良文學之士虞世南禇亮等令更宿直退朝之暇引入内殿從容燕見或論往古成敗或問民間事情每言及稼穡艱難則務遵勤儉言及閭閻疾苦則議息征徭以至諷誦詩書講求典禮咨詢忘倦或至夜分若軍國㡬微時務得失則責之輔相悉不相干又謂太子少師蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不正則脉理皆邪弓雖勁而發矢不直朕始寤曏者辨之未精也朕以弓矢定四方識之猶未盡況天下之務其能徧知乎乃命京官五品以上更宿中書内省數延見問以民間疾苦及政事得失臣聞有天下者常患乎不䏻通天下之情察天下之理情有所不通則是猶一身之中而關節脉理之不属也理有所不察則是猶耳目不䏻視聽而欲以運動手足也然而一日有萬機之繁堂下有千里之逺乃欲使天下之情無不通天下之理無不察其勢豈不甚難哉盖必咨詢訪納廣覽兼聽有所見聞者皆得以獻陳扵前有所疾苦者皆得以赴愬於上則雖未嘗家至户察而固已卓然立乎無蔽之地以此醻酢事變經理世故盖亦舉而措之爾以舜之聦眀自耕稼陶漁又厯試諸難然後為帝宜其無所不知也繼堯之後盡循其道宜其無所為也而書之所載乃以詢于四岳闢四門眀四目逹四聦為先務則舜之所以為舜所以䏻繼堯者豈其任一已之聦眀哉盖取諸人以為善也三代而下惟貞觀之治庶㡬成康而太宗即位則擇天下名士相與宻勿論議夜以繼日又令京官五品以上更直待問此其致治之本也陛下以大眀繼照旁求直言收召耆徳如舜與太宗之初矣然臣以為聖人之心常自以為不足故其求益扵下者亦無所不用其至舜以詢于四岳為未足也故繼之闢四門以闢四門為未足也故又廣視聽于四方太宗既盡得天下名士與之㳺居矣然而衆不可盖愚或有得故京官五品以上亦皆得以序進焉臣碩陛下因今日所行推而廣之謹陳其六事以備采擇其一曰唐之宰臣雖休假亦見率皆從容命坐論政事大體至扵啓擬差除之𩔖則退而以熟狀畫可猶有古者論道之遺意今雖不能盡如古竊謂二府進呈之暇亦宜賜以閒燕使得展盡底藴無所顧避盖君臣之間誠意既通論議既定然後可以有為也其二曰侍從之臣本以論思獻納為職今則各有司局往往以越職為嫌所宜眀降詔㫖示以近臣盡規之義則所謂侍從者不止扵有司之守也其三曰尚書六曹雖曰奉行成命之地而元祐著令諸奉制書及事已經奏而理有不便者速具奏聞其後大臣用事惡其害己遂廢其法今宜復元祐舊制則所謂有司之守者又不止扵奉行文書也其四曰講讀之官宜有所訪問以推究古義裨益聖學且以眀當世之務如祖宗朝邇英延義二閣記注之所載尚可考也其五曰竊見英宗皇帝親政諫官司馬光上言乞復先朝故事日輪侍從一員直資善堂夜則宿於崇文院時賜召對與之講論古今治體民間情偽光論此事至于四五最為詳悉願舉而行之亦唐𢎞文館之意也其六曰祖宗視朝之外再御後殿親決庶政如外路部送到罪人如投匭訴事人如審官院流内銓三班院磨勘并差遣人如審刑院刑部叙復左降人如經過到闕軍人如慮囚放欠盖雖賤官下吏卒伍徒𨽻皆一一引問考覈其實寃抑者必伸欺蔽者必察今惟選人改秩及囚繋疏決始得引見一切聽之有司而已祖宗之制雖未䏻盡復臣竊謂今之臣庶其以事而至於庭者固已無㡬碩省閱其狀親賜質問随其事理裁自聖意而間亦有所予奪焉凡此數者皆祖宗之所已行非特以通天下之情察天下之理而小大之臣其材識之髙下志趣之邪正皆亦不逃扵聖覽矣天下幸甚厯代名臣奏議卷四十八
