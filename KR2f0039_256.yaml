body:
  text: 歷代名臣奏議卷二百五十六明楊士竒等撰賦役宋神宗時監察御史裏行劉摯上奏曰臣昨日准聖旨批下司農曾布劄子為詰臣所言助役事尋已具分析奏聞去訖臣竊以耳目之於人也事物過者必見必聞以赴其心而心必受之未有不信其耳目而反以其能視聼為疑者先王以言置官代天子耳目內外相信無以異於一體之相為用也其言雖直必容雖多必受則國家安治不然則反此故謗木諫鼓不設危亂之國鼎鑊斧鑕不在聖眀之朝恭以陛下躬上聖之德好問樂善凡延見臣下雖賤官小吏必溫恭和容以訪逮之此堯舜之盛也然至於臣等以職事為言則使之分析者中外皆知非陛下意乃司農挾寵以護改作大臣設法以蔽聰眀爾因事獻忠敢一言之今天下之勢陛下以謂安耶未安耶治耶未治耶茍以為未安未治也則以陛下之睿智言動起居躬蹈德禮夙夜厲精以親庶政而天下未至於安治者將誰致之耶陛下即位以來注意責成倚以望太平而自以太平為已任得君專政安石是也三二年間開闔動搖舉天地之內無一民一物得安其所者蓋自青苖之議起而天下始有聚斂之疑青苖之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未艾而漳河之役作漳河之害未平而助役之事興其間又求水利也則民勞而無功又淤田也則費大而不效又省併州縣也則諸路莫不強民以應令又起東西府也則大困財力禁門之側斧斤不絶者將一年而未己其議財也則商賈市井屠販之人皆召而登政事堂其征利也則下至于厯日而官自鬻之推此而往不可究言古之賢人事君行道必馴致之有漸持久而後成至於設施皆有次序今數十百事交舉並作欲以嵗月變化天下使者旁午牽合於州縣小人挾附佐佑於中外至于輕用名器混淆賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之流俗敗常鑿民者謂之通變能附已者不次而進之曰吾方擢才不可招者為名而斥之曰吾方行法凡政府謀議所以措置經畫除用進退獨與一屬掾曾布者論定然後落筆同列預聞乃在布後故奔走乞丐者布門如市雖然猶有繫國家之體而大于此者祖宗纍朝之舊臣則鐫刻鄙棄去者殆盡國家百年之成法則剗除廢亂存者無幾陛下豈不怪天下所謂賢士大夫比嵗相引而去者凡幾人矣陛下亦嘗察此乎去舊臣則勢位無有軋已者而權可保也去異已者則凡要路皆可以用門下之人也去舊法則曰今所以制馭天下者是己之所為而陛下必將久任以聽其伸縮也嗟夫此事之實也其名則曰革敝而興治是以陛下樂聞其名而難察其實也夫賞罰號令乃陛下所以砥礪天下而鼓動四方以為勸信者今有人焉能舞公事以傾勳舊構大獄以逐官吏其事是耶乃其職爾何至超任以為職司耶趙濟是也又有人焉以渭源田欺罔始既以此得罪而終復以此增秩王韶是也程昉事漳水以興大役困一方而無成功趙子幾挾情以違法禁按吏以防民言則皆置而不問乃是賞反施于聖人之所當罰罰不及于王法之所當誅也畿邑之民以助錢為訴也陛下聖㫖令召情願東眀知縣以不能禁民有訴而被效也陛下聖㫖止令劾擅升户等之事二者皆獨斷之善政而中書皆格而不下此則陛下之號令不行也西師無功而曰非朝廷之本謀天下但見給軍之費輦出于京師空名之誥馳下于西路又命一知制誥于將幕使專代天子之言報復號令絡繹于道茍以為非耶何不止之逮其事敗則曰非政府謀也捐費緡錢以千萬計秦晉之人肝腦塗地生軍旅之怨結敵人之釁而不自請咎乃致陛下發中詔以責躬抑徽號而不受忠義之士誰不痛心而疾首至如助役之法臣嘗言之矣其條制纎悉臣雖未能究見然臣大意終以謂使天下百姓賦稅貸責公私息利之外無故作法升進戶等使之槩出緡錢皆非為人父母愛養基本之所宜為者故臣謂之聚斂非妄言也陛下任遇輔臣如此其重而致主之術乃用此道是皆大臣之誤陛下而大臣所用者誤大臣也今既顛謬乖錯敗亂綱紀知天下之不容懼宸衷之回悟以謂雖中外之士畏避無敢言者然其尚敢言者獨御史有職爾故又使司農熒惑天聽作為偏辭令臣等分析以摧沮風憲之體艱梗言路欲其憂憚茍容而緘默或欲撩其危言從而擠逐不知忠臣莭士雖戮辱不懼所以盡事君之義耳今羌夷之欵未入反側之兵未安三邊瘡痍疲潰未瘳河北大旱諸路大水民困財力縣官匱竭聖君恭勤思治萬方之所知而在輔弼者方欲蔽天聰眀使下情不得而上逹其何心耶臣願陛下思祖宗基業之艱難念天下生靈之危苦少回幾慮收還威柄深恐異時專權肆志將有陛下所不能堪者則必至于虧失君臣之恩是今日養之適所以害之也若夫馮亰王圭同列預政皆依違自固不扶顛危雖心悟其非而無所救正已之進退又媕婀而不決皆非所謂輔臣之體臣四海之內孤立獨進陛下過聽任以風憲嘗竊思之近嵗臺諌官疊以言事罷免豈其言皆無補於事歟豈皆願為訐激險直之語以自為名而潔去歟嘗以謂欲言政府之事者其譬如治湍暴之水可以循理而漸道之不可以隄防激鬭而發其怒不唯難功亦為患滋大故臣自就職以來竊慕君子之中道欲其言直而不違于理辭順而不屈其志庶幾愚衷少悟天聽而亦不敢婞然如淺丈夫以一言一事輕決去就致聖朝數數逐去言事者而無所裨補思以上全國體而下亦庶幾能久其職業而成功名兩月之間才十餘疏其言及助法者止三疏耳當天下多事之時而臣言簡緩又不足以感悟則其負陛下已多矣不意大臣之怒已至如此令臣等分析分析之事前代無之祖宗無之近年已來乃為此法以摧言者之氣方陛下孜孜聽治喜於納諫而大臣所為則不得正目而視此所以發臣之狂而不能默也伏願陛下深察事物之變用安靖之治以休生民有所措置以大小緩急為先後之序以義利經權為本末之辨自兹凡有獻替於陛下者乞有以誘掖奬厲之罷分析之命以尊嚴朝廷而養多士敢言之氣臣不勝惓惓憤悶愛君待罪之心摯又論弓手疏曰臣伏覩今月七日敕命莭文弓手正身不願充役者許雇曾充弓手之人令逐路轉運司相度施行臣竊意朝廷必以差法初行弓手一役乍差鄉户未習捕盜次苐而舊日應募之人一旦放罷或無所業挾其素藝去而為盜故降今來指揮欲以權其始而待其成臣竊以謂二者非所宜憂也蓋差役方復事未就緒若假以嵗月則法自成而事定矣昨三月十七日敕弓手曾經鬭戰緝捕有功者雖無户等特與存留則收拾舊人已有此法且弓手不可不用差法者蓋鄉人在役則不獨有家丁子弟之助至于親族婚姻及其里落之衆莫不為之營援同其休戚一有捕限則人人張耳目出方略以求盜賊又其土著自重故無逃遁之患此乃從來弓手得賊所以常多于他警捕之人而祖宗以來弓手所以必用正身也自行雇募以來盜寇充斥蓋所募浮惰之人不任其責差之與雇利害如此然則祖宗之法豈無意哉行之百餘年不聞上等戶以為不便而願雇人也夫上之使民使其出力則易使其出錢則難此古今之通誼易曉也今朝廷指揮雖云不願充役方許雇人然官司上下利在舊人慣熟或以人情留占必須沮斥新户使之雇人安能見其願與不願之情臣深恐被差之人嵗出緡錢不易却須歸怨差法姦人因而可以搖動議論兼天下繇役重輕州縣風俗各各異宜固當隨方制之不可槩以一法臣觀五路弓手熙寧以前正身充役之時最號強徑往往逐名家自飬馬其材藝捕緝勝于他路近日復差以來妥帖就役皆已試之效亦不聞其不樂而願出錢雇人也訪聞惟是川蜀江淅等路昨差至第一等人戶充役皆習于驕脆不肯出力為公家任捕察之責故寧出資雇代自以為便此皆一偏之利而議者不察遂乃一例變動大法今朝廷若未肯追寢許雇之命必欲委曲徇民則宜分别利害大小權為之制自來盜賊最多及弓手正身久有成效者無如五路臣欲乞五路弓手並依祖宗舊法及今年七月三日申眀聖㫖指揮須得正身祗應外其餘路分即依今月七日指揮仍乞將舊有户等差充者及前項曾經戰鬭有功存留者與情願雇人者三色通計不得過正額一半人數所貴新舊相兼漸熟捕盜事體其三色人數內遇有闕額止行差補則一二年間差法成就雇法可罷矣貼黃朝廷立法不可以事初一二小害槩壞大體所謂弓手正身之小害者唯是南方上等人戶其子弟多修學為舉人故為未便造起浮言以惑議者之聽殊不知每嵗出緡錢雇代其為久逺之害不細也兼祖宗以來行正身充役之法通于天下已百有餘年曾不聞其不便今朝㫖雖欲周順人情下許雇之法然止可作權時指揮宜立限一年或二年候人情習熟即罷代法伏乞詳臣今來所請事理特賜施行外其許雇路分仍乞相度人戶二丁以下方聽依近制雇人代役參知政事王安石上奏曰今陛下即位五年更張改造者數千百事而為書具為法立而為利者何其多也就其多而求其法最大其效最晚其議論最多者五事也一曰和戎二曰青苖三曰免役四曰保甲五曰市易今青唐洮河幅員三千餘里舉戎羌之衆二十萬獻其地因為熟戶則和戎之䇿已效矣昔之貧者舉息之于豪民今之貧者舉息之于官官薄其息而民救其乏則青苖之令已行矣惟免役也保甲也市易也此三者有大利害焉得其人而行之則為大利非其人而行之則為大害緩而圖之則為大利急而成之則為大害傳曰事不師古以克永世匪說攸聞若三法者可謂師古矣然而知古之道然後能行古之法此臣所謂大利害者也蓋免役之法出于周官所謂府史胥徒王制所謂庶人在官者也然而九州之民貧富不均風俗不齊版籍之髙下不足據今一旦變之則使之家至戶到均平如一舉天下之役人人用募釋天下之農歸于畎畝茍不得其人而行則五等必不平而募役必不均矣保甲之法起于三代丘甲管仲用之齊子産用之鄭商君用之秦仲長統言之漢而非今日之立異也然而天下之人鳬居鴈聚散而之四方而無禁也者數千百年矣一旦變之使行什伍相維鄰里相屬察奸而顯諸仁宿兵而藏諸用茍不得其人而行之則搔之以追呼駭之以調發而民心搖矣市易之法起于周之司市漢之平準今以百萬緡之錢權物價之輕重以通商而貰之令民以嵗入數萬緡息然甚知天下之貨賄未甚行竊恐希功幸賞之人速求成效于年嵗之間則吾法隳矣臣故曰三法者得其人緩而謀之則為大利非其人急而成之則為大害故免役之法成則農時不奪而民力均矣保甲之法成則寇亂息而威勢彊矣市易之法成則貨賄通流而國用饒矣知諌院陳襄論役法狀曰臣聞方今政有害于民者無甚于役法使民嵗出傭錢以資應募之人夫應募之人者莫非遊手墮農之輩違慢作過又不足以集事兼出錢人戶非是樂輸行之數年民力已困上等厚有資力之家猶可出備自餘中産已下多是農民惟以薄業為生别無營入能自足于衣食者蓋有數矣今來戶戶率緡既有定額無由蠲免嵗時輸入官司敦迫榖益賤而錢益貴常有逋負督責之憂不幸遇嵗凶荒一有不足則不免于飢莩流亡之患此大略可見矣若此法不更必恐天下等第之民日益困弊轉致失所此不得不慮也如欲更之則莫若且因今來新定簿役之法復為五等依舊差役除衙前重難及州縣自來號為重役為民深害者即官與雇人以酒場河渡等錢充為傭直其諸色役並從差糾之法如願雇人代役者亦聽仍乞依司農寺條貫諸係公之人因役人勾當公事及投名公參入直之類取受財物者依常平乞取法及依熙寧編敕官員不得差出三百里外勾當私事條約施行如此等第被役之人差使至經年别無勞費莫不出力願為而無憚矣此可為不易之良法也謹具狀奏聞伏候敕㫖張方平論募役疏曰臣伏覩見行役法天下共苦不便陛下天髙聽卑必聞其利害切恐中外臣僚未有為國家深憂逺慮精言其本末者臣既以方拙上荷知眷今拜章乞致仕方俟命解謝念言重恩思有以補報而去故不避誅絶上此奏封極陳保邦便民之大計切務非徒詭激以抗髙論而已陛下至聖大明儻察臣言實有益于國家即乞發自清衷特下眀詔停罷此法復行舊制之中有所未安稍為增損參定施行詔下之日四方萬姓若有匹夫匹婦不慰恱抃蹈上感德澤者則臣請受罔上迷國壞法亂紀之罪投放遐裔以正典刑陛下猶謂臣言未足為信古者有大疑謀及卿士庶人協同而後有作即乞露布臣章俾在廷百辟以至諸路郡縣官吏共得盡其公議二者惟在陛下發于神斷以定天下是非若但送之中書詢之執政無益也則乞留中不下非惟有以保全孤臣抑以致忠義之言以廣四聰之逺不勝為國憂慮區區之心惟聖眀諒察所上劄子具列封進方平又論免役錢疏曰臣切惟昔者聖人所以治民之道别其四業任之九職農夫效稼穡之力虞衡主山澤之利百工飭化八材商賈阜通貨賄各率所事以奉其上而上之所以取于民惟田及山澤關市此財用之所出也顧㳂革損益雖歷代不同要之必本于此過是則非王制矣伏見近建賦役之法率令輸錢夫錢者人君之所操不與民共之者也人君以之權輕重而御諸事制開塞以通政術稱物均施以平準萬貨故有國家者必親操其柄官自冶鑄民盜鑄者抵罪至死示不得共其利也夫錢者無益飢寒之實而足以致衣食之資是謂以無用而成有用人君通變之神術也本朝經國之制縣鄉版籍分立五等以兩稅輸榖帛以丁口供力役此所謂取于田者也金銀銅鐵鉛錫茶鹽香礬諸貨物則山海坑冶場監出焉此所謂取于山澤者也諸管𣙜征算斥賣百貨之利此所謂取于關市者也權錢一物官自鼓鑄臣向者再總邦計見諸爐嵗課上下百萬緡天下嵗入茶鹽酒稅雜利僅五千萬緡公私流布日用而不息上自宗廟社稷百神之祀省御供奉官吏廪祿軍師乘馬征戍聘賜凡百用度斯焉取給出納大計備于此矣景德以前天下財利所入茶鹽酒稅嵗課一千五百餘萬緡太宗以是料兵閲馬平河東討拓跋賊嵗有事于契丹真宗以是東封岱宗西祀汾睢南幸亳未嘗聞加賦于民而調度克集慶厯以後財利之入乃三倍于前朝而惟日不足何事功之異也舉是而言則本末之原有可得而究者矣陛下憫時政之積敝志在變而通之以財成天下之務故創法立制設青苖以賑乏絶建募傭以㢮繇役所大措置事以十數要在崇德而廣業以惠飬元元而已臣官在守藩職在長民朝廷政令非敢出位而言至于民事利害以言職也夫民事之利害衆矣顧率錢之患獨切故敢具言其事自古田稅榖帛而已今二稅之外諸色㳂納其目曰陪錢地錢食鹽錢牛皮錢篙錢鞋錢如此雜料之類大約出于五代之季急征橫斂因而著籍遂以為常今以一陳州言之州四縣合二萬九千七百有餘戶夏秋二稅凡斛㪷一十五萬八千有零碩正稅并和預買紬絹三萬有零匹絲綿四萬九千有零兩此常賦也復有鹽錢一萬五千八百有零貫并夏秋㳂納錢雖緣敝法承習己久然此諸色錢常例亦多用折納斛㪷不悉輸錢也大槩古今田制未有輸錢之法也今乃嵗支苖錢六萬七千餘貫計息錢一萬二千三百貫有零嵗納役錢四萬七千餘貫此乃常賦之外嵗輸貫錢六萬餘千以陳之戶口不敵諸州之一縣率是以准天下之所輸可見也凡公私錢幣之發斂其則不逺百官羣吏三軍之俸給夏秋糴買榖帛坑冶場監本價此所以發之者也田廬正稅茶鹽酒稅此所以斂之者也民間貨布之豐寡視官錢所出之多少官錢出少民用已乏則是常賦之外錢將安出若募錢輸官還以募傭錢既出入非畜聚也夫募錢者率之本民散于惰遊市井自如南畝空矣窮鄉荒野下戶細民冬至節臘荷薪芻入城市往來數十里得五七十錢買葱茹鹽醢老稚以為甘美平日何嘗識一錢臣聞諸路其間刻薄吏㸃閲民田廬舍牛具畜産桑棗雜木以定戶等乃至寒瘁小家農器舂磨銍釜犬豕凡什物估千輸十估萬輸百食土之毛者莫得免焉故天下之民遑遑無所措手足謂之錢荒吏厲鋒氣以刻削為功干賞蹈利而賞利從之此豈聖意之然耶必料天聰亦未之詳聞也陛下本欲以美利利天下至于施為見于行事非復聖意所存者矣陛下盛㫖一出執政奉行稍已增益至于有司苛細甚矣頒下諸路職司之官各出所見展轉交害本同而末異朝行而夕改郡縣承用以至不勝其敝且民田二稅水旱檢放自有常制青苖之息或遇灾傷猶暫倚閣募役之錢年雖大殺不可免也豪猾乘民之急舉貸取息至或相因陪輸誠侵酷矣然不越榖帛民耕織之所有也州縣之役若身充若雇傭率三分其費而二分出于薪粒大鄉戶衆一役代歸十餘年間安居無所預矣募法之行且三年初年民始大駭吏議法未一或納或否次年已有伐桑棗賣田宅鬻牛畜今年稍荒歉處民流散多矣推此其可以經久者耶而乃恬弗為怪莫之改圖臣恐國家之憂不在四夷而見伏戎于莽矣伏惟陛下深思宗社之重俯察下民之情申命大臣精議輸錢之法此大事也非取于髙談虛論茍且而已矣夫茍且者臣下之身謀逺慮者陛下家國之計愚而不可欺弱而不可勝者民也儻民情失于撫御大勢一有動危雖有智者恐無以善于後矣輸錢二事而募法之害尤重臣故勤勤先其重者今所開陳特舉大體其為害條目不可悉數也臣上荷聖恩至深至重自念衰疲不任陳力一旦先犬馬填溝壑沒有遺恨故求一對清光專為陳此愚懇少效補報粗寬愧負事聞天聽退就斧鉞臣所快也惟陛下留神省察馮山議免役狀曰右臣久官逺方不識朝廷忌諱然事干治體茍有所見不敢輒隱以虧臣子之莭臣竊見條制之設已經四年內盡羣臣之謀外收天下之議更革創置無所不盡利害本末十見七八惟免役一法未有成效臣伏以朝廷立法之意本以便民除去搔擾抑絶僥幸何所不可而紛紛至今者非去千載之弊而為一代之法不可遽為而速見也臣去年冬自京師授差遣回經京西陕西利州成都梓州五路上自監司下至州縣冠蓋奔走議論詳悉惟恐後至以慢陛下之詔令以違司農之期㑹然齟齬遲緩未能決然者臣觀其由非獨四方官吏之過蓋巧議錯出有司無定之所致也自熙寧四年以後天下始知朝廷新法本在愛民非為聚斂靡不日夜講究因其鄉俗之便為國家畫經久之計獨衙前弓手之類稍難處畫不得不差緩嵗月然後成就自去年冬末已後訪聞諸處僅能成書方議奏報而旋有新制令依倣府界之法又令四等以下均出役錢未幾又令只據稅錢不用等第又令那移補助半年之間改動者數四官吏惶駭不知定議文書煩浩旋為棄物然則役法何時而定耶臣竊以天下風俗不同事體各異有司之法將籠而一之則固將得此而失彼利一而害十近見梓州之法亦只以等第為率上等之家所出不過十三貫則其所取者至輕而其所免者甚重設未均一極已寬簡按察之議以為可行未及奏聞而例從改易舉此一處他州可知民間田畝稅錢類不相等推此以往名目甚多豈可直據一端以為定論要其至當俟其均稅之法已定然後免役之法可行若猶未也莫若詔諸路監司與郡守縣令因其鄉俗各自立法不問異同但取其便民而已立以期限過者有罰如此則法順于民而易行民安于法而不煩則免役之效庶幾可見苟未能追改前制臣乞自今已後議者之說且一切置而勿用大體既立則舉偏補弊者自然次第而舉矣臣竊見前代立法至久而後定何則事非經試雖智者不能極其盡況差役之弊已經數百載間雖知其為害于民而不敢有議更變之者誠難其變之之術也今一旦創起新法既行之後必其纎悉無遺臣未知其可也臣願陛下下臣所議詳擇其一使天下重困之人早見成法茍官不廢事民不知役則三代仁政何以異此如利害相乘難于經久本實無害徐議罷去亦無纍陛下寬仁之盛德也臣近見司農寺指揮尚猶詢訪官吏未盡未便事理臣之所憂非獨為朝廷新法了無休期兼恐緣役事而進者奔趨無己輕取陛下之名器擅自恣放重為新法之病臣伏覩熙寧二年十二月詔書博盡衆議務要除去擾弊使民樂從臣之愚見稍係利害之大者謹具狀奏右司諫蘇轍乞更支役錢雇人一年候修完差役法狀曰右臣伏見二月九日三省樞密院劄子節文應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數定差更乞指揮諸縣官吏看詳若依今來指揮别無妨礙即便依此施行若有妨礙致施行未得限敕到五日內具利害擘畫申本州本州限一季聞奏奏到各隨宜修改奉聖㫖依奏臣看詳上件指揮大綱已得允當其間節目頗有踈略差誤未易一一具言全在有司節次修完近見開封府奏開祥兩縣于數日之內依舊役法人數差到役人臣竊惟自罷差役至今已僅二十年乍此施行吏民皆未習慣兼差役之法關涉衆事根牙盤錯行之徐緩乃得詳審若不窮究首尾匆遽便行但恐既行之後别生諸弊臣竊見州縣役錢所在例有積年餘剩今年夏料雖已放罷舊餘剩錢猶足支數年欲乞朝廷指揮將見在役錢且依舊雇役盡今年而止却于今年之內催督諸處審議差役令的確可行更無弊害然後于今冬迤邐差撥起自來年役使鄉戶一則差役條貫既得審詳既行之後無復人言二則將已納役錢一年雇役民力紓緩進退皆便臣深恐諸道以為朝廷已行之命降到即行雖有妨礙更不陳述致差役之條未盡其利若朝廷以臣此言可用欲乞下三省疾速施行謹録奏聞伏候敕㫖貼黃新法已來減定役人皆是的確數目行之十餘年並無闕事則舊法人數決為冗長天下共知況近降指揮明使州縣相度有無妨礙至于揭簿定差亦無日限今來開封官吏更不相度申請于數日之間一依舊法人數差撥了絶如壇子之類近年以剩員充者一例差撥役人監勒開祥兩縣迅若兵火顯是故欲擾民以害成法尚賴百姓久苦役錢乍獲復舊更無詞說不爾必須爭訟紛紜為害不小乞下所司取問開封官吏眀知有上件妨礙更不相度申請及似此火急催督是何情意特賜行遣以戒天下挾邪壞法之人轍又論罷免役錢行差役法狀曰右臣伏見門下侍郎司馬光奏乞罷免役錢復行差役舊法奉聖㫖依奏施行臣竊謂近嵗所行新法利害較然其間免役所系尤重朝廷自去秋已來改更略盡惟此一事遲留不決民間傾聽想聞德音臣竊料此事既行民間鼓舞相慶如飢得食如旱得雨比之去年罷導洛市易鹽鐵等事其喜十倍非至仁至聖至眀至斷誰能行此然臣有愚慮蓋朝廷自行免役至今近二十年官私久已習慣今初行差役不免有少齟齬不齊譬如人有重病不治必死醫者用藥攻療必有瞑眩不寧要須病去藥消然後乃得安樂今中外用事臣寮多因新法進用既見朝廷革去宿弊心不自安必因差役之始民間少有不便指以為言眩惑聖聰敗亂仁政兼臣竊觀司馬光前件劄子條陳差役事件大綱已得允當然其間不免踈略及小有差誤執政大臣豈有不知若公心共濟即合據光所請推行大意修完小節然後行下今但備録劄子前坐光姓名後坐聖㫖依奏其意可知自今以往其必有人借中外異同之論以搖動大議臣願陛下但思祖宗以來差役法行民間有何患害近嵗既行免役民間之弊耳目厭聞即差役可行免役可罷不待思慮而決矣伏乞將臣此奏留中不出時賜省覽茍大法既正縱有小害隨事更張年嵗之間法度自備臣踈逺小臣初䝉擢用輒此深言罪在不赦但念臣初無左右之助諌垣之命出自聖意不敢自同它人更存形跡冒昧陳聞惟陛下裁幸貼黃臣竊詳差役利害條目不一全在有司節次修完近則半年逺亦不過一年必有成法至于鄉戶不可不差役錢不可不罷此兩事可以一言而決況所在役錢寬剩一二年間必未至闕用從今放免理在不疑前來司馬光文字雖有役錢一切並罷之文又却委自州縣監司看詳有無妨礙臣竊慮諸路為見有此指揮未敢便行放罷依舊催理則凶嵗疲民無所從出或致生事欲乞特降手詔大略云先帝役法本是一時權宜指揮施行嵗久民間難得見錢已詔有司依舊差役所有役錢除坊郭單丁女戶官戶寺觀依舊外其餘限詔到日並與出榜放免其去年已前見缺役錢具數聞奏未得催理聽候指揮轍又言雇募衙前改為招募既非明以錢雇必無肯就招者勢須差撥不知嵗收坊場河渡緡錢四百二十餘萬欲于何地用之熙寧以前諸路衙前多雇長名當役如西川全是長名淮南兩浙長名大半以上餘路亦不減半今坊場官既自賣必無願充長名則衙前並是鄉戶雖號招募而上戶利于免役方肯占名與差無異上戶既免衙前重役則凡役皆當均及以次人戶如此則下戶充役多如熙寧前矣轍為陳州學官代張方平上奏曰臣伏以中外臣庶各有職事越職而言國有常憲臣守土陳州非有言責而輒言之計其狂愚兹實有罪然臣伏念頃以老疾不任吏事陛下未忍廢棄親擇便地以遂安飬將辭之日面奉德音以為大臣之議皆當為國謀慮不宜以中外為嫌有所不盡古人有言雖爾身在外乃心罔不在王室伏惟聖德廣大無所不容而臣自到任以來于今一載心目昏眩有加無瘳故嘗乞丐餘生求還閭舍區區之誠久而未獲陛下視臣志氣益衰至此豈復有意别白是非而與世俗爭議也哉是以得失之間久無所與今日竊有所懷上為陛下參之官吏下為陛下驗之百姓而安危之機實在于此自惟受恩纍聖邦之休戚身實同之志力雖衰于義不可默已然臣之所欲言者非敢逺引前古逆探未然以惑陛下之聰眀也凡皆陛下之所嘗試而臣愚之所與聞者耳臣伏見陛下即位之始計慮深逺凡有所建動合天心始議山陵深恤費用之廣推眀先帝薄葬之命以詔有司四方聞之無不感泣其後一年之間誕布號令勸率宗族崇孝悌之行勉勵州郡先農桑之政復轉對以廣言路議徭役以寬民力盛德之事不可具紀是時天下大變之後而無不翹然想聞德音以忘其憂兩宫歡欣九族親睦羣臣萬民䝉福而安紛紜之議不至于朝廷謗怨之聲不聞于里閭陛下優遊無為而天下已治矣為國如此豈不樂哉陛下自今視之當日之政其可悔恨者凡有幾以臣觀之非獨陛下無所悔恨雖天下之人亦未有以為失當者也何者政令簡易而人情之所安耳易曰易則易知簡則易從易知則有親易從則有功有親則可久有功則可大嚮使陛下推行此道始終不變則臣以為久大之功可得而致矣其後求治太切用意過當奸臣緣隙得進邪說始議開邊以中上㫖于是延安有橫山之謀保安有招誘之計陛下饒之以金帛假之以干戈小人貪功慮害不逺輕發深入結怨西戎攘奪尺寸無用之土空竭內府纍世之積大者疲弊秦雍小者身死寇讎西鄙騷然不寧而陛下始一悔矣然而陛下天資英果有漢武宏逹之量雖復兵吏失律而立功之意未嘗少衰是以左右大臣測知此心復進財利之說陛下樂聞其利而未暇深究其害于是舉而從之置條例司而講求天下之遺利己酉之秋新政始出自是以來凡所變革不可悉數其最大者一出而為常平青苖再出而為揀兵併營三出而為出錢雇役四出而為保甲教閲四者並行于世官吏疑惑兵民憤怨諌諍者章交于朝誹謗者聲播于市陛下不勝其煩為之當寧太息日昃而不食矣然猶幸其成功力排衆人之議而固守之天下方共厭苦而不知其所止也揀兵併營之䇿其害先見武夫凶悍為怨最深為患最急陛下知其不可于是多支月糧復收退卒以順適其意而陛下既再悔矣然軍中之口猶復洶洶不靖陛下雖推恩撫之而終不以為惠反謂陛下畏之耳不幸邊臣失算再生戎患帷幄之臣謀之不臧不務安而務撓之臨遣執政付以疆事多出金幣豫書誥敕以成其深入之計當此之時天下之心知其必敗矣而陛下與一二臣者方以為萬舉而萬全既而出兵無人之境築城不守之地困弊腹心以求無益之功使秦晉之民父子流離肝腦塗地戎人徼倦受屈已築之城隨即傾覆救援之兵相繼潰叛四方震動君臣宵旰而後下罪已之詔投竄元宰以謝二鄙而陛下既三悔矣夫此三者方其未悔也陛下亦以為是耶非耶陛下犯逆衆心行而不顧其必以為是不以為非也然而其終卒至于此然則方今陛下之所是而未悔者無乃亦類此歟臣聞衆而不可欺者民也勇而不可犯者兵也險而不可侮者鄰國也今陛下既已欺民犯兵而侮鄰國矣夫犯兵侮鄰變速而禍小至于欺民則變遲而禍大變速而禍小者瓦解之憂也變遲而禍大者土崩之患也今瓦解之憂陛下既知悔矣而土崩之患陛下未以為憂此臣之所以寒心也易曰不逺復無祗悔元吉事之未敗也陛下不悟其非必俟其敗而後悔如向三者則陛下之復已逺而悔亦大矣且臣觀之方今陛下之所是而未悔者亦有三而已青苖助役保甲三者之弊臣不復言矣何也言事者論其不可非一人也百姓毁壞支體燻灼耳目嫁母分居賤賣田宅以自脫免非一家也陛下其亦知之矣徘徊而不改使民無所告訴加之以水旱繼之以飢饉積憾之民奮為羣盜浸淫蔓延滅而復起英雄乘間而作振臂一呼而千人之衆可得聚也如此而勝廣之形成此所謂土崩之勢也臣恐陛下至此雖復悔而無所及矣故臣願陛下取即位之政與今日之事而試觀之天下擾擾不安孰與今日之盛羣臣交口爭辨孰與今日之衆陛下聽覽疲倦孰與今日之多悔恨自責孰與今日之切陛下誠以此較之則不待臣言之終而得失可以自决矣且夫即位之政陛下之本心也今日之事臣下之過計也陛下棄即位之本心而徇臣下之過計臣切以為過也雖然竊聽之道路方今陛下則亦悔之矣悔之而不變非陛下之意也迫于建議之臣耳夫人臣進謀于其君茍事之不遂而變以從衆則人主有以測其深淺人主有以測其深淺則其用舍之命在于人主此人臣之所以不便也臣切痛陛下為社稷之計欲改過以安天下而怙權固位之臣持之而不釋陛下聰眀睿智廢置自我而獨為此欎欎也臣不勝區區忘身憂國之誠是以勢踈而言切惟陛下察之傅堯俞議坊郭等第出助役錢奏曰臣竊以謂鄉村以人丁出力城郭以等第出財謂之差科相與助給公上古今之通道臣不敢逺引為證自本朝百餘年間祖宗之法未有以城郭之財助鄉村之力者今而行之恐未為得凡公人未有不以官事與百姓接者一與關涉必肆誅求但事有大小時有踈數耳況胥吏日夕與百姓從事者乎故州縣之官不使公人多見百姓謂之能吏所以百端防檢恐其侵漁猶未能禁其一二今惟憂其不足乃無名取錢于坊郭以與之臣深所未諭也其間固有勞逸不至均齊繫官吏之能否條禁之精粗惟當督責郡縣講求善法安在人人與錢哉昔者鄉村坊郭事體不同故各安其分無有異論自免役之興不復分别今差役既還未有科配常情槩見則似不平必令出錢願椿留以備緩急夫以天下之廣兆民之衆事常藏于隱微發于人之所忽邊鄙河防盜賊水旱豈可必其無有哉慶厯中羌賊叛擾借大姓李氏錢二十餘萬貫後與數人京官名目以償之頃嵗河東用兵上等科配一戶至有萬緡之費力不能堪艱苦萬狀此皆以上下完盛之時取于民以為助猶或如此況今民力疲弊乎國家指以為用而不憂者免役寬剩錢耳蓋有時而盡豈能持久如聞天下主財利之臣不度朝廷大體㳂襲舊弊觀望故態雖茶鹽酒稅常入之數皆不甚究心漸有虧失臣恐數年之後或至不足一有緩急將全取于民不惟人難克當必致生事誠能量使出辦錢物斂而藏之嚴敕有司不得輒用其科擾之事一切禁絶示以必信使人無疑則不徒無詞遂將欣歡奔走惟恐輸納之在後耳昨陕西兵興一路等第人戶流離奔迸無地藏匿京西州郡與之犬牙相接晏然無預人之憂樂如隔天壤今若積以為備或一方有事轉而濟之是通天下之力不其均且易哉若取其財依舊科斂他日之患恐不但怨咨而已臣嘗以是白文彥博司馬光吕公著此乃國之逺圖民之實惠願陛下特斷而行之若用以資助役人臣未敢詳定今役法大議已定皆韓維等素所裁處如可遵用即乞且修整頒降令州縣行用候見抵牾者隨加改正三二年間庶幾完備如以差法為非自可復為顧法不須無事徒此紛紛今諸路文字來方此改更何日成就臣聞陳力就列不能者止此亦臣之不能為者陛下採用臣言臣敢不悉心供職若謂言與議者不合不可施行乞依蘇軾例許臣罷免詳定儻以臣上違朝㫖將以誡敇不恪雖加重責臣不敢辭鄭獬論安州差役狀曰伏見安州衙前差役最為困弊其合差役之家類多貧苦每至差作衙前則州縣差人依條估計家活直二百貫已上定差應是在家之物以至雞犬箕帚匕筯已來一錢之直茍可以充二百貫即定差作衙前既已充役入于衙司為吏胥所欺縻費已及百貫方得公參及差著重難綱運上京或轉往别州腳乘關津出納之所動用錢物一次須三五百貫又本處酒務之類尤為大弊主管一次至費一千餘貫雖重難了當又無酬奬以至全家破壞棄賣田業父子離散見今有在本處乞丐者不少縱有稍能保全得些小家活役滿後不及年嵗或止是一兩月便却差充不至乞丐則差役不止蓋本州士人貧薄以條貫滿二百貫者差役則為生計者盡不敢滿二百貫雖嵗豐榖多亦不敢收蓄隨而破散惟恐其生計之充以避差役以此民愈貧差役愈不給雖不滿二百貫亦差作衙前一丁既充衙前已令主管場務或又差押送綱運則又不免令家人權在場務其正身則親押綱運及本州或有時暫差遣則又别令家人應副是一家作衙前須用三丁方能充役本家農務則全無人主管兼家人在場務生踈動是失陷官物及界滿則勒正身陪填近時朝廷雖罷衙前而綱運役次猶不減則見充衙前者其病愈甚本州最所重難者紬絹錢綱其入京錢綱或可直給衙前召保約以日限許令直便入京送納其轉江綱運風濤遼逺動經半年則許令至真州發運司送納真州别附綱入京如此則所費稍得減損重難滿日亦許作分數指射不係酬奬酒坊或三五名併作一處以為優饒其已經一次衙前者亦乞立作年限方得再差兼自來條貫衙前與免科配及本戶稅皆納本色而本州科率折變並亦不免亦乞今後與依條施行臣所親見止于安州訪聞湖北一路類皆如此欲乞聖㫖下寬恤民力所令差去湖北路臣寮子細相度裁定其場務利害繫自州縣亦乞令就本處訪問擘畫以從寬簡謹具狀奏伏候敕㫖哲宗即位初知陳州司馬光乞去新法之病民傷國者疏曰臣竊見先帝聰眀睿智勵精求治思用賢輔以致太平委而任之言行計從人莫能間雖周成王之任周公齊桓公之任管仲燕昭王之任樂毅蜀先主之任諸葛亮殆不能及斯不世出之英主曠千載而難逄者也不幸所委之人于人情物理多不通曉不足以仰副聖志又足已自是謂古今之人皆莫已如不知擇祖宗之令典合天下之嘉謀以啓迪清衷佐佑鴻業而多以已意輕改舊章謂之新法其人意所欲為人主不能奪天下莫能移與之同者援引登青雲與之異者擯斥沈溝壑專欲遂其狠心不顧國家大體人之常情誰不愛富貴而畏刑禍于是縉紳大夫望風承流競獻䇿畫務為竒巧捨是取非興害除利名為愛民其實病民名為益國其實傷國作青苖免役市易賖貸等法以聚斂相尚以苛刻相驅生此厲階迄今為梗又有邊鄙之臣行險徼幸大言面欺輕動干戈妄擾蠻夷夫兵者國之大事廢興存亡于是乎在而其人茍榮一身之官賞不顧百姓之死亡國家之利病輕慮淺謀發于造次御軍無法僅同兒戲深入敵境坐守孤城糧運既竭狼狽奔潰築寨極邊功猶未畢輕敵不備闔城塗地使兵夫數十萬暴骸于曠野資仗巨億棄捐于異域又有生事之臣欲乘時干進建議置保甲戶馬保馬以資武備變茶鹽鐵冶等法增家業侵街商稅等錢以供軍須遂使九土之民失業窮困如在湯火此皆羣臣躁于進取誤惑先帝使利歸于身怨歸于上非先帝之本志也臣荷先帝大恩常思報效嚮在朝廷之時屢言新法非便觸忤權貴冒犯衆怒爭辨非一先帝憐其孤忠不以為罪仍䝉寵擢置之樞廷臣以所言未行力辭不受臣非惡富貴而好貧賤正欲感悟先帝知臣為國不為身庶幾采納狂瞽使百姓獲安基局永固而已既又自乞冗官退伏閭里雖身處于外區區之心晨夕寤寐何嘗不在先帝之左右所以不敢自赴闕廷如此之久者亦猶辭樞廷之志也熙寧七年歷時不雨先帝遇災而懼深自刻責誕布詔書廣開言路臣當是時不勝踴躍極有開陳而建議之臣知所立之法不合衆心天下之人必盡指其非恐先帝覺悟而已受誤國之罪伏欺罔之刑乃勸先帝繼下詔書言新法已行必不可動臣之所言正為新法若新法不動臣尚何言自是閉口不敢復預朝廷論議十有一年矣然每覩生民之愁怨憂社稷之阽危于中夜之間一念及此未嘗不失聲拊心也葵藿之志猶望先帝一賜召對訪以外事得吐心極言退就斧鉞死無所恨不意上天降禍先帝升遐臣之寸誠無由披露欎抑憤悶自謂終天及奔喪至京乃䝉太皇太后陛下特降中使訪以得失是臣積年之志一朝獲伸感激悲涕不知所從顧天下事務至多臣思慮未熟不敢輕有條對但乞下詔使吏民皆得實封上言庶幾民間疾苦無不聞逹既而聞有㫖罷修城役夫調邏之卒止御前造作京城之人已自歡躍及臣歸西京之後繼聞斥退近習之無狀者戒飭有司奉法失當過為煩擾者罷物貨專場及民所飬戶馬又寬保馬年限四方之人無不鼓舞聖德傳布一日千里頌嘆之聲如出一口溢于四表乃知太皇太后陛下深居禁闥皇帝陛下雖富于春秋天下之事靡不周知民間衆情久在聖度四海羣生可謂幸甚凡臣所欲言者陛下略已行之臣稽慢之罪實負萬死夫為政在順民心茍民之所欲者與之所惡者去之如決水于髙原之上以注川谷無不行者茍或不然如逆阪走丸雖竭力以進之其復走而不可必也今新法之弊天下之人無貴賤愚智皆知之是以陛下微有所改而逺近皆相賀也然尚有病民傷國有害無益者如保甲免役錢將官三事皆當今之急務釐革所宜先者臣今别具狀奏聞伏願決自聖志早賜施行議者必曰孔子稱孟莊子之孝其他可能也其不改父之臣與父之政是難能也又曰三年無改于父之道可謂孝矣彼謂無害于民無損于國者不必以己意遽改之耳必若病民傷國豈可坐視而不改哉易曰幹父之蠱有子考無咎象曰幹父之蠱意承考也蠱者事有蠱弊而治之也幹父之蠱迹似相違意則在于承繼其業承父之美也又曰裕父之蠱往見吝象曰裕父之蠱往未得也裕者饒益之名也若不忍違異益父之過往而不返未為得宜也昔漢文帝除肉刑斬右趾者棄市笞五百者多死景帝元年即改之笞者始得全武帝作鹽鐵榷酤均輸等法天下困弊盜賊羣起昭帝用賢良文學之議而罷之後世稱眀唐代宗縱宦官公求賂遺置客省拘滯四方之人德宗立未三月悉禁止罷遣之時人望致太平德宗晚年有宫市五坊小兒暴橫為民患鹽鐵月進羡餘順宗即位皆罷之中外大恱是皆改父之政而當者人誰非之哉況先帝之志本欲求治而羣下干進者競以私意紛更祖宗舊法致天下籍籍如此皆羣臣之罪非先帝之過也為今之計莫若擇新法之便民益國者存之病民傷國者悉去之使天下曉然知朝廷子愛黎庶之心吏之苛刻者必變而為忠厚民之離怨者必變而為歡譽德業光榮福祚無窮豈不盛哉夫天子之孝在于得萬國之歡心以事其親儻措置如此歡心孰大焉事親孰備焉今幅員之內所在嗷嗷有倒垂之急延頸傾耳以俟改法庶得蘇息若朝廷不以為意日復一日萬一遇數千里之蝗旱公私匱竭無以相救失業之民蜂起為盜安知無姦雄乘之而動則國家有纍卵之危申屠剛曰未至豫言固常為虛及其已至又無所及朝廷當此之際解兆民倒垂之急救國家纍卵之危豈暇必俟三年然後改之哉况今軍國之事太皇太后陛下權同行處分是乃母改子之政非子改父之道也何憚而不為哉惟聖眀裁察臣光昧死再拜上疏光守門下侍郎又乞罷免役錢狀曰右臣竊以百姓出力以供在上之役蓋自古及今未之或改熙寧中執政者以為百姓惟苦差役破産不憚增稅乃請據家資髙下各令出錢雇人充役按因差役破産者惟鄉戶衙前有之自餘散從承符弓手手力耆戶長壯丁未聞破産者也其鄉戶衙前所以破産者蓋由山野愚戇之人不能幹事使之主管官物或因水火損敗或為上下侵欺是致缺折備償不足有破産者至于長名衙前久在公庭勾當精熟每經重難差遣積纍分數别得優輕場務酬奬往往致富何破産之有夫差役出于民錢亦出于民今使民出錢雇役何異割鼻飼口朝三暮四于民何所利哉又嚮者役人皆上等戶為之其下等單丁女戶及品官僧道本來無役今更使之一槩輸錢則是賦斂愈重非所以寬之也故自行免役法以來富室差得自寬而貧者困窮日甚殆非所以抑兼并哀惸獨均賦役也又監司守令之不仁者于雇役人之外多取羡餘或一縣至數萬貫以冀恩賞規進取不顧為民世世之患又國家舊制所以必差青苖戶充役人者為其有莊田家屬有罪難以逃亡故頗自重惜今雇浮浪之人充役常日恣為不法一旦事發單身竄匿何處州縣不可投名又農家所有不過榖帛與力自古賦役無出三者自行新法以來青苖免役及賦斂多責見錢錢非私家所鑄要須貿易外求豐嵗榖賤已自傷農況迫于限期不得半價盡糶所收未能充數家之糇糧不暇更留若值凶年則又無榖可糶人人賣田無所可售遂至殺牛賣肉伐桑鬻薪來年生計不敢復議此農民所以重困也又錢者流通之物故謂之泉布比年以來物價愈賤而閭閻益困所以然者錢皆聚于官中民間乏錢貨重物輕借使有人鬻薪糴米米價雖賤薪價亦賤故也臣愚以為宜悉罷免役錢其州縣諸色役人並依舊制委本縣令佐揭簿定差替見雇役人其衙前先召募人投充長名召募不足然後差村人戶每經歷重難差遣依舊以優輕場務充酬奬所有見在免役錢撥充州縣常平本錢以戶口為率常存三年之蓄有餘則歸轉運司凡免役之法縱富彊應役之人征貧弱不役之戶利于富者不利于貧者及今耳目相接猶可復舊若更年深富者安之民不可復差役矣元祐元年光又乞罷免役錢依舊差役疏曰臣竊見免役之法其害有五舊日差役之時上戶雖差充役次有所陪備然年滿之後却得休息數年營治家産以備後役今則年年出錢無有休息或有所出錢數多于往日充役陪備之錢者此其害一也舊日差役之時下戶元不充役今來一例出錢免役驅迫貧民剝膚推髓家産既盡流移無歸弱者轉死溝壑彊者聚為盜賊此其害二也舊日差役之時所差皆土著良民各有宗族田産使之作公人管勾諸事各自愛惜少敢大段作過使之主守官物少敢侵盜所以然者事發逃亡有宗族田産以纍其心故也今召募四方浮浪之人充役無宗族田産之纍作公人則恣為姦僞曲法受贓主守官物則侵欺盜用一旦事發則挈家亡去變易姓名往别州縣投名官中無由追捕官物亦無處理索此其害三也自古農所有不過榖帛與力凡此所以供公賦役無出三者皆取諸其身而無窮盡今朝廷立法曰我不用汝力輸我錢我自雇人殊不知農民出錢難于出力何則錢出民間所鑄皆出于官上農之家所多有者不過莊田榖帛牛具桑柘而已無積錢數百貫者也自古豐嵗榖賤已自傷農官中更以免役及諸色錢督之則榖愈賤矣平時一斗直百錢者不過直四五十文更急責之則直三二十矣豐年猶可以糶榖送納官錢若遇凶年則榖帛亦無不免賣莊田牛具桑柘以求錢納官既家家各賣如何得售惟有拆屋伐桑以賣薪殺牛以賣肉今嵗如此來嵗何以為生是官立法以殄盡民之生計此其害四也提舉常平倉司惟務多斂役錢廣積寬剩以為功效希求進用今朝廷雖有指揮令役錢寬剩不得過二分竊慮聚斂之臣猶依傍役錢别作名目隱藏寬剩使幽逺之人不被聖澤此其害五也陛下近詔臣民各上封事言民間疾苦所降出者約數千章無有不言免役錢之害者足知其為天下之公患無疑也以臣愚見為今之計莫若直降敕命應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數委本縣令佐親自揭五等丁産簿定差仍令刑部撿㑹熙寧元年見行差役條貫雕印頒下諸州所差之人若正身自願充役者即令充役不願充役者任便選雇有行止人自代其雇錢多少私下商量若所雇人逃亡即勒正身别雇若將帶却官物勒正身陪填如此則諸色公人盡得有根柢行止之人少敢作過官中百事無不修舉其見雇役人候差到役人各放逐便數內惟衙前一役最號重難嚮者差役之時有因重難破家産者朝廷為此始議作助役法然自後條貫優假衙前諸公庫設厨酒庫茶酒司並差將校勾當諸上京綱運召得替官員或差使臣殿侍軍大將管押其粗色及畸零之物差將校或節級管押衙前苦無差遣不聞更有破産之人若今日差充衙前料民間陪備亦少于嚮日不至有破家産者若猶以為衙前戶力難以獨任即乞依舊于官戶僧寺道觀單丁女戶有屋業者每月掠錢及十五貫莊田中等所收斛斗及百石以上者並令隨貧富分等第出助役錢不及此數者與放免其餘産業並約此為准所有助役錢令逐州樁管據所有多少數目約本州衙前重難分數每分合給幾錢遇衙前合當重難差遣即行支給然尚慮天下役人利害逐處各有不同欲乞于今來敕內更指揮行下開封府界及諸路轉運司謄下諸州縣委逐縣官看詳若依今來指揮别無妨礙可以施行即便依此施行若有妨礙致施行未得即仰限敕到五日內具利害擘畫申本州仰本州類聚諸縣所申擇其可取者限敕書到一月內具利害擘畫申轉運司仰轉運司類聚諸州所申擇其可取者限敕書到一季內具利害擘畫奏聞朝廷候奏到委執政官再加看詳各隨宜修改别作一路一州一縣敕施行務要所在役法曲盡其宜光又乞不改更罷役錢敕劄子曰臣近以抱病家居恐溘先朝露無以少報盛意是以力疾貪陳所見竊以即日為小民病者無若免役錢欲乞悉行廢罷復祖宗差役舊法識慮愚短誠不意朝廷盡從其說非陛下眀斷不能如是此乃天下之幸非獨微臣之幸也然臣聞令出惟行弗惟反彼免役錢雖于下戶困苦而上戶優便行之已近二十年人情習熟一旦變更不能不懷異同又復行差役之初州縣不能不小有煩擾又提舉官專以多斂役錢為功惟恐役錢之罷若見朝廷于今日所下敕微有變動必須相告曰朝廷之敕果尚未定宜且觀望必競言役錢不可罷朝廷萬一聽之則良法復壞矣伏望朝廷執之堅如金石雖有小小利害未偹俟諸路轉運司奏到徐為改更亦未為晚當此之際則願朝廷勿以人言輕壞利民良法光又乞申眀役法劄子曰臣先曾上言乞直降敕命應天下免役錢一切並罷其諸色役人並依熙寧元年以前舊法人數委令佐揭簿定差䝉朝廷一一如臣所請臣竊聞降敕之初百姓莫不喜恱一兩月間州縣定差已了别無詞訟人情安帖無何續有雇募不足方行定差指揮人始疑惑既而屢有更張號令不一又轉運使各以己見欲令本路共為一法不令州縣各從其宜是致州縣惶惑不知所從或已差役人却放或已放雇人却收或依舊用役錢雇人或不用錢招人充役朝夕不定上下紛紜往往與二月六日敕意相違竊緣臣元初起請及朝廷所降敕節文眀言委州縣官看詳依今來指揮若有妨礙致施行未得仰具利害擘畫申州州申轉運司轉運司奏聞委執政官再加看詳隨宜修改别作一路一州一縣敕施行務要曲盡其宜豈是當日所言一字不可移易但患轉運司州縣不肯奏陳耳臣今欲申眀元初起請內聲說不眀不盡事件謹具畫一如後一非謂止收百石即令助役也若尤嫌太少及所收掠誤利難知實數即乞應係第三等以上令出助役錢第四等已上放免若本州坊場河渡等錢自可支酬衙前重輕分數得足則官戶等更不消出助役錢一從來諸州招募人投充長名衙前若招募不足方始差到鄉戶衙前此自是舊法今來别無改更惟是舊日將坊場河渡折酬長名衙前重難令自出賣今來官中出賣坊場河渡收錢依分數折酬長名衙前重難只此與舊法有異若鄉戶差補已足續有投名者即先從貧下放鄉戶歸農鄉戶願投充長名亦聽一臣起請委逐縣看詳具利害擘畫申州本州類聚擇其可取者擘畫申轉運司轉運司類聚諸州所申擇其可取者擘畫奏聞朝廷伏緣知逐處民間利害子細轉運司不如州州不如縣竊慮逐縣逐州有擘畫得事理切當而本州及轉運司抑遏刪去不以上聞致敕下之日依舊妨礙施行未得欲乞更降指揮下州縣如有似此擘畫切當被在上刪去者許逐縣直申轉運司本州直申奏所貴下情無壅曲盡事宜仍乞降指揮下詳定役法所只得以諸路州縣申到利害詳其可否立為定法其不當職之人為髙竒之論不切事情者不得施行亦不可將一路一州一縣利害作海行條貫一詳定役法所奏請行下指揮若有妨礙難行之事亦乞如臣起請委逐路州縣看詳具利害擘畫申上隨宜修改右臣所言若有可取乞遍下諸州縣除此外並依二月六日所降敕命施行光又乞再申眀役法劄子曰檢㑹二月六日敕文止是罷免役錢其諸色役人並依熙寧元年以前舊法委令佐揭簿定差尚慮諸路州縣利害各有不同所以下文云委逐縣看詳若有妨礙施行未得即具利害擘畫申州仰本州類聚諸縣所申擇其可取者具利害擘畫申轉運司轉運司類聚諸州所申擇其可取者具利害擘畫奏聞其意欲使本州體量諸縣所舊利害之虛實擘畫之是非擇其實而是者條例申轉運司云某縣當如何措置某縣當如何措置其餘已依舊法定差施行轉運司得諸州所申亦如此體量條例申奏蓋欲隨處差役曲盡其宜非謂使逐路共為一法也今訪聞諸路轉運司不遵用熙寧元年以前舊法又不取諸州縣所擘畫各以己意撰成一路役法差官分詣諸州縣名為商量其實諷諭令隨己意却作州縣擘畫立法申奏州縣稍有違異輒加責怒以此多不依應得逐處利便不合民心又諸路州縣見朝廷置詳定役法所以為當别撰役法頒下往往等候下即定差殊不知看詳役法所專候諸路州縣具到利害擘畫即作一路一州敕行下以此觀望遷延久不了絶今欲特降指揮下諸州縣除有舊法妨礙難行之事速具申陳外其餘並依舊法一面定差其看詳役法據逐處先申到利害擘畫事件如得允當逐旋奏乞令本處依此施行所貴差役之法日近早見結絶光又乞申敕州縣依前敕差役劄子曰臣伏見御批指揮以臣近建明差役法慮其間未得盡備差韓維吕大防孫永范純仁專切詳定聞奏臣竊以免役錢之病民自嚮日臣僚民庶上封事及日近劉摯等奏陳言之甚詳非獨出臣一人之私意也陛下幸用臣言悉罷免役錢依舊差役詔下之日中外歡呼往來之人聞道路農民迭相慶賀云今後這回快活也然則此令之下深合人心明白灼然無可疑者其間條目未備不能委曲盡善固須有之臣所以乞下諸路州縣官吏令看詳若有妨礙施行未得即具利害擘畫以次上聞誠以畎畝幽隱南北異宜自非在彼親民小官無以知其詳悉故令各具所見指陳利害所以盡下情求民瘼非謂敕書一下禁人不得復議也俟其奏到徐議添改何後之有要在早罷役錢復差役為大利而已如構大厦棟宇已立雖戶牖未備可以徐圖今陛下令韓維等再行詳定究利害完補漏略成就良法固無所妨但敕下已踰半月州縣差役約以及半方行遣紛紜臣愚竊恐聞此指揮謂朝廷前日之敕改更未定或斂錢或差役尚未可知官吏惶惑不知所從衆庶失望怨嗟益甚必有本因新法得進之臣乘此間隙爭言免役錢不可罷因聚斂獲功之吏稱舊條未改督責免役錢愈急是民出湯火濯清泉復入湯火也伏望朝廷特賜申敕州縣言今來止為其間條目未備令維等詳定所有差役仰州縣依前敕一面施行候詳定到事節續降下次免致于差役中半紛紜之際令出反汗人情大搖實天下幸甚歷代名臣奏議卷二百五十六
