body:
  text: 歷代名臣奏議卷二百六十六明楊士竒等撰理財宋神宗熙寧初有魏繼宗者自稱草澤上言京師百貨無常價貴賤相傾富能奪貧能與乃可以為天下今富人大姓乘民之亟牟利數倍財既偏聚國用亦屈請假𣙜貨務錢置常平市易司擇通財之官任其責求良賈為之轉易使審知市物之價賤則增價市之貴則損價鬻之因收餘息以給公上于是中書奏在京置市易務官凡貨之可市及滯于民而不售者平其價市之願以易官物者聽若欲市於官則度其抵而貸之錢責期使償半嵗輸息十一及歲倍之凡諸司配率並仰給焉熙寧二年制置三司條例司言天下財用無餘典領之官拘於弊法內外不相知盈虛不相補諸路上供歲有常數豐年便道可以多致而不能贏年儉物貴難於供億而不敢不足逺方有倍蓰之輸中都有半價之鬻徒使富商大賈乘公私之急以擅輕重斂散之權今發運使實總六路賦入其職以制置茶鹽礬酒稅為事軍儲國用多所仰給宜假以錢貨資其用度周知六路財賦之有無而移用之凡糴買稅斂上供之物皆得徙貴就賤用近易逺令預知中都帑藏年支見在之定數所當供辦者得以從便變易蓄買以待上令稍收輕重斂散之權歸之公上而制其有無以便轉輸省勞費去重斂寬農民庶幾國用可足民財不匱詔本司具條例以聞知諫院陳襄論三司條例乞行均輸法劄子曰臣伏覩中書劄子制置三司條例司狀奏乞行均輸之法朝廷遂除司勳郎中薛向充江淮制置發運使以領其事又出內帑之錢數百萬貫使之籠貨取息以助縣官之經費臣切以為興利之道非當今之所宜行陛下聖德文眀超越前古其即位之初天下皆謂二帝三王之政必行於今日豈宜先利以示四方臣為諫官姑息而不言致陛下於有過之地是不以堯舜之道期於陛下臣實耻之自先皇顧命已來當國家多難之際天文謫見于上地道震動于下水潦民飢之灾遍于中國此天意有以警動陛下欲其恐懼修德而保其全安也而陛下首當修明五事欽慎萬幾務一德以享天心思一言以和天下曽未及此乃欲徇有司之議行桑羊𣙜利之術臣不知其可也昔漢武帝承文景恭儉之後國用富饒侈心一生遂有輕事四夷之志中道勞費帑庾空竭乃以羊為大司農中丞置均輸平準之法籠天下之貨物買賤賣貴以資一時之急卒斂怨於天下貽譏於後世是豈仁術哉陛下若以國用空虛調度滋廣不𣙜利無以繼公上之給臣切以為不然陛下尊為天子富有方夏四海九州之賦入不為不多苐以承平百年因循奢靡而制用無節此今日不足之患也近者朝廷深鑒其失親命近臣辟選官屬制置三司條例固已救其深弊矣但令所司取天下㑹計之籍度縣官供給之數百度為之均節而歸之藝極至於無名之費不急之務一切禁之而不得行諸路財賦之有無令有司得以便宜移用與凡糴買上供之物皆得以徙貴就賤用近易逺使無害於公私而止於備用可也而後陛下身先恭儉節用愛人而率之於上小大之臣畏法遵繩而守之於下如此則浮費自省而財物不可勝用矣又何必收輕重斂散歸之公上與民爭錐刀之利而失王政之體乎孟子對梁惠王曰王何必曰利亦有仁義而已矣未有仁而遺其親未有義而後其君子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者夫道亦在擇之而已矣所有貸錢賈販之事如以臣言為可采特賜寢而不行則天下幸甚三年襄為侍御史知雜事論青苗不便乞住支第一狀曰臣伏見制置三司條例司奏辟屬官提舉管勾諸路常平廣惠倉俵散青苗錢斛事其劄子元降指揮預俵之法本以為民而公家無所利其入至於斂散之際亦皆取人之便而不得抑配蓋取先王耕斂補助之道也今來風聞諸路所遣提舉管勾官多不體認元降指揮慿藉事權陵壓州縣却以青苗之法取民利息二分等第之家不問其願與不願一例抑配物論喧然以為極擾切緣朝廷之意本為小民闕乏常在於新陳不接之際倍息舉貸以取資給故設青苗預支之法使農人得以資助耕斂而兼并不得以乘其急是欲專以便民而非有以規其利也明矣今使者一出而天下之人皆謂朝廷只以補助之說為名而其實專在於取息而已是豈立法之意哉茍朝廷之法不然而使者為之致陛下失大惠於民則辱命之罪莫大焉宜正典刑以示天下使中外曉然知陛下孚惠之心非有取利於百姓可也如朝廷立法之初果以為利則是特有司之過矣為父而𣙜其子此漢武之事非陛下所宜行不惟不可行時亦不可將以惠民適所以害之也何以言之比歲以來四方多事河決地震水潦民飢陕右有備邊之須河朔有修城之役民力凋弊瘡痍未復天下無名之斂所在有之如聞諸路之民尚有積年逋負官物動以萬計未能輸入今更以青苗取利人必不堪不惟重以困民適足以壞其官本大率小人見利幸於茍得既用之後多不能償大者須至於逋逃小者不免於刑辟此必然之理臣前謂將以惠民適所以害之者此也臣欲乞早降指揮下諸路提㸃刑獄司更切體量差去提舉管勾常平錢斛官員內有生事擾民擅違朝㫖特與減黜施行其青苗錢已行支俵者將來只令隨稅送納本錢如未俵散處並令罷支庶不失陷官本錢及别致騷擾襄論青苗第二狀曰臣近有奏狀為諸路俵散青苗錢官員內有生事擾民擅違朝㫖乞特與減黜及青苗已行俵散者只令送納本錢如未俵散處並令罷支等事未䝉朝㫖施行竊詳條例司元降指揮以常平廣惠變為青苗之法申嚴賞罰督責州縣以謹其給納雖以優民救乏為名其實不異民間舉放之事以漁民取利而已豈陛下聖明之主所宜為之就使國家帑藏空虛財用不足亦未至如經紀小民放本取利事體削弱如此之甚也今來訪聞諸路所差官吏為見朝廷屬意財利莫不望風希㫖務為誅剝以覬幸酬賞茍免黜責或以三分取息或將陳舊之物紐作貴價兊換支散或不以民之貧富一例抑配事初如此其後可知臣恐此法一行騷動天下希錐刀之利失億兆之心貽祻之端未必不由兹始況興事改法繫國家安危大計上有公卿謀議下有臺諫糾察豈可只由條例一司獨專其事置陛下於有過使黎元之不安茍利一時斂怨天下非細事也臣欲乞將中外臣寮前後上言常平青苗等不便事件章疏并臣前狀降付中書令與密院一處看詳定奪可否及下兩制臣寮供析利害聞奏庶陛下得以盡天下之公議知事體之難行特賜寢罷以安人心襄論青苗第三狀曰臣聞臣之事君有犯無隱夫犯顔忤㫖以取君父之怒豈其所欲哉蓋義有可言而不言非愛君之道此臣所以昧死而不敢隱默者也臣近以青苗之法搔擾不便欲乞寢罷以安人心未䝉俞㫖施行陛下聖性聰明固已曉然開悟但以王安石執議不變重違其情物論喧然不加聽察事之可者則置而勿問其不可者則無所不行豈非條例之臣為自安之計巧為飾說誣罔聖聰近者韓琦上言以河北俵散青苗錢立定貫百均與等第人户比之它路獨取利息三分顯是提舉之官違條抑配而朝廷並無黜責琦之論列足以知其非便而特寢不行吕景以畿縣之民逋負官物尚有五十餘萬不宜更與預支實慮虧陷官本而却令取勘夫擅行抑配者既無罪黜則掊克之吏無所不至不忍為騷擾者反䝉按劾則民之司牧何所措其手足哉故臣前曰此法一行騷動天下正謂此也陛下近以司馬光為樞密使中外翕然皆以陛下知光之言為是而悟制置司之為非今復遽然罷之者豈又以光言為非耶必以其辭而不受也然則光之所以不受者以陛下不行其言爾知其言而不用猶可以去又況有所受命乎如欲用之行其言而已矣何吝而不為哉輕進退於大臣失孚號於天下非所謂令出弗反之義也李常職在諫官既聞中外之議不敢不言事雖不實誠亦符之輿論況國朝舊制自許風聞言事若令分析是欲使其必去將以杜言者之口恐非所以待諫臣之體而廣言路之道也凡此數事雖聖慮一時之失豈非聽者之誤乎禮曰有所忿懥則不得其正有所好樂則不得其正亦在陛下追而正之爾書曰改過不吝湯之德也自陛下臨政以來事無過舉唯用安石然後有更改之暴而致興利之非聖人施為自有法度合於道者取之不合於道者去之任天下之羣才取天下之公議堯舜三王之治可以指期而至又何必徇一士之曲議以貽黎元之患哉所有制置條例司如有可行事件欲乞只歸三司相度施行青苗之法早賜停寢則天下幸甚襄論青苗錢第四狀曰臣近嘗三次上言論列青苗之法乞行寢罷而陛下未以臣言為然臣得待罪于言事之官凡時政之闕失近於苛細猶得斥而言之顧此一事最為害政之大者苟依違不言置陛下於有過之地則臣上負朝廷任使之意不忠之罪莫大焉臣觀制置司元降指揮莫非引經以為言而其實貸民以取利事體削弱為天下譏笑是特為管仲商君之術非陛下之所宜行臣願陛下為堯舜之君以仁義治天下不願其為霸主也昔者伊尹不俾厥后為堯舜其心愧耻若撻于市是以髙宗命說曰爾尚明保豫罔俾阿衡專美有商古之人其責難於君如此之備而又肻逄君以利而為霸者之術哉夫所謂霸者當戰國之時諸侯之土地皆褊小而不足上無聖賢之君下無王者之臣而外有敵國之患計出於不獲已而然也管仲以區區之齊居於海濵於是兼魚鹽之利權輕重之法假仁義而行譎詐欲以强國足兵而已然而不能使其君為王政此聖門之所耻言而曽西所以卑其功烈也商鞅之事秦也說其君以强國之術故變法令開阡陌信賞刑而秦人莫敢不服然而謂其君不可與入帝王之道此正孟軻所謂謂其君不能賊其君者也彼二子者使知以仁義事其君而行王者之政其肻茍一時之利以貽天下萬世之譏哉臣故曰霸者蓋國小而力不足上無聖賢之君下無王者之臣而外有敵國之患計出於不獲已而然也方今陛下富有中國廣輪萬里上有賢聖之君下有王者之臣內無強臣敵國之患外無西北二陲之難凡四海九州之賦入又足以供吾之用而不為不足陛下不於此時與廟堂之臣坐而論道以行王政而反屑屑為均輸舉貸之事臣切為陛下惜之然則今日之弊在於國家因循制度未立而侈用日廣斯亦不足患矣陛下但慎選主計之臣付與利柄取天下賦入之籍度縣官調度之數百用為之均節而歸之藝極則浮費省而財用足斯可以行王政矣省徭役薄賦斂則天下之農不釋耒而耕矣寬關市之征弛山澤之禁則天下之商不藏鏹而行矣修庠序之教勸之以忠信孝悌則天下之民皆遣其子弟而興於學矣尊賢而使能才者進不才者退則天下之士皆勵其德行而為良吏矣農有餘粟商有餘財民服其教吏稱其職然而國不富而政不王者未之有也子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者夫道亦在擇焉而已矣惟陛下捨乎興利之道而行乎保民之政則聖人之治矣襄論青苗第五狀曰臣近以青苗之法擾民為害欲乞寢罷其制置司立法之誤中外言者已詳臣故不一一論列上煩聖聽但以方今天下生民凋弊財力殫竭二稅之外更有無名科率何啻十色有餘若復俵散青苗錢實恐民不堪命陛下以至仁求治凡欲更張法度皆以為民安有取民脂膏以為貸息而謂周公太平已試之法哉陛下之心必不為此然則天下之人皆知誤陛下者王安石也誤安石者吕惠卿也以陛下聰明觀天下之論議其法利害固已灼然可知奈何安石持强辨以熒惑於前惠卿畫詭謀以隂助于後加以反覆比周之小人隨時觀望平日公論則舉知其法之非一探於利則又言其法之是此雖陛下至聖不能無惑雖臣等之至忠亦不免指為朋黨也近者諫官李常以言事待罪尚令分析孫覺以奏對反覆落職外遷御史中丞吕公著而下皆以不職為言乞從責降而臣獨區區未敢以請者尚冀犬馬之誠一悟聖意許以青苗之法下議百官如臣等之言非則甘從逺竄以戒妄言如臣等之言是則安石惠卿亦乞特行貶黜以謝天下御史中丞吕公著乞罷提舉官吏及住散青苗錢奏曰臣切聞近日中外臣寮纍有章疏乞罷昨差提舉常平廣惠倉官吏及住散人戶青苗錢至今未有施行臣伏思朝廷所以特遣使人頒行新法本欲惠恤百姓非為剝下奉上朝廷之意固已甚善然而朝野沸騰皆為不便者蓋由朝廷處置前後自相違戾如昨來元本敕㫖止於河北京東淮南三路後來忽然續差官吏遍行天下所差官吏往往多不得人如蘇㳙王廣亷皮公弼之徒張皇事勢必欲生事邀功朱經李元瑜之輩庸猥下才所在為人輕笑其間取利之條日增惠民之意漸失所以人心搖動日益不寧臣欲乞應前來所遣官吏可一切罷歸其青苗錢且只於近京一兩路專委提刑司或轉運司相度俵散務要惠民不必取利候散及一二年如見得於公私無損實有惠濟推之諸路亦未為晚兼人心亦自信服若一二年間民猶以為不便則朝廷亦宜改作不可必遂前失如此則人心自安無不得所公著又奏曰臣近具劄子言制置三司條例司本出權宜合從廢罷諸路散青苗錢違戾元降敕㫖及遣提舉官等不當並宜追還昨日亦曽面奏未䝉施行臣伏思近日朝廷頗有更張其意雖欲便民然其間事理豈能盡當茍博採羣言事有未便者不憚改作則善莫大焉若舉措既失人心已搖專以朝廷之威欲勝衆多之口則恐執之愈久物情益更不安至於迷而後復所失多矣伏乞特賜檢會臣前奏降出施行公著又乞罷提舉常平倉官吏奏曰臣近兩具劄子言乞罷提舉常平廣惠倉官吏未䝉施行臣切惟朝廷自頒行此法以來中外議者皆以為本非惠民實欲掊利人情憂懼物論沸騰朝廷以法令既行憚於改作直至取大臣所奏逐條疏駮巧為辨說敷告天下其餘中外官守或因有所論列或以不即奉行皆欲劾問專以朝廷之威杜塞衆口是以比日以來人情愈更不寧臣伏思陛下自即位之始慨然有大有為之志其規模固欲髙視近古然今日所行才一二末事頗已輕失人心縱使法意雖善其施設固亦未工況人無智愚皆以為不便伏望博采公議盡罷諸路所遣提舉官委提刑或轉運司且於三兩路相度支散候見得於民無害則不獨此法可以持行其它處置皆足以取信於人若百姓終以為病朝廷亟為改之猶不至害及天下所有臣前奏伏乞檢會付外施行公著又論青苗奏曰臣纍具劄子言昨遣提舉常平廣惠倉官吏不當諸路散青苗錢違戾元降敕㫖未䝉施行臣聞易曰說以先民民忘其勞又曰感人心而天下和平自古有為之君未有不先人心而能立事者也亦未有脅之以朝廷之威勝之以頰舌之辨而能終得人心者也陛下以聰明睿智之資承祖宗積纍之後方其未有所為四方已自欣戴至於今所施設其事乃至淺末然而人情洶洶如此之甚則致之不為無由陛下固宜審察主議之臣乃以為流俗浮議不足恤臣切以人心惟危聖人所畏難安易動今日為甚若不幸有姦宄之謀窺伺間隙則於陛下威德必有所沮不可不恤也且今之所謂豪俊多才布在顯要皆陛下與執政大臣平日所共精擇然而不謀同辭皆以此舉為謬豈有平日所謂賢者今則此日盡不肖由此觀之亦不可概謂之流俗浮議也借使朝廷處置皆已盡善尤當反覆惟慮求所以附順人心況今日紛紛實自朝廷致之且如轉運使提㸃刑獄官皆陛下選掄委以一路豈有一路之政皆所倚辦獨此數事不可信任縱其人不可任自當亟罷其職别擇能臣茍以為可任又不當别置提舉官此諸路監司所以離心者也況國家制法本欲便人然而使人心違怨一至於此尚曰善為政乎臣切觀陛下每延見羣臣講求政事常欲曲盡物情期於公當兼今來衆人所議實係國家安危若向去人情益擾陛下必不能力主唯是不逺而復庶幾害不及民況臣之所以區區者亦不獨惜此一事誠恐人心既已乖離陛下之志終必疑殆則向去朝廷難乎復有所為伏乞檢㑹臣纍奏早賜施行右正言孫覺上奏曰臣昨自出貢院即具奏聞青苗新法中外人情不以為便此宜聖衷早有所定如或遲遲不議更改即將為國生事矣蓋臣愚忠以謂陛下上承祖宗之重藉兼有四海之富即位三年德澤未施於下而託惠民之虛名收取息之實利本末舛錯施置失當號令二三而中外益疑傅㑹經義而更成穿鑿以至大臣離心議臣扼腕近者建言而求去逺者抗章而請罪如此持久不已內外之言和附為一則陛下之法將格而不行誅之則不可勝誅不誅則法令廢而威權奪矣今建議者但欲法之必行而不顧遺患於後臣嘗謂陛下當以朝廷為心而無所偏則利害可一言而決矣異時諸路轉運使若范純仁之類必不肻行新法以應提舉官之命諸路安撫知州若韓琦之比必不自奪其議以徇制置司之欲諸州知縣若姜潛之流必不肻隳其素守以遂管當官之私諸路之中有一人二人為此者時議必翕然稱之矣好名者喜於立異中人又耻於不逮人人相慕而為此則陛下之法廢格而不行矣不知陛下將比比而誅之耶亦考其是非而行法耶若將考其是非則法有情願之文人不情願者我何敢強如此法不得而加則其勢必折而不可久以不可久之法加之民而不便之實又見於一年二年之後不知陛下何憚於速改而必待其自壞耶法至于自壞則所損於天下者豈少哉孟子曰愛人不親反其仁禮人不答反其敬今日之新法雖有善意然而人不親也不答也則亦宜自反而已矣傳曰未至豫言固常為虛及其已至又無所及臣愚區區於今日者正類此矣伏望陛下留神采納覺又辭免體量府界青苗錢疏曰臣准中書劄子奉聖㫖指揮同府界提㸃并提舉常平廣惠倉官於府界諸縣體量近散青苗錢係人户情願請領或追呼抑配臣聞府界之民居近輦轂狃於幸恩曲赦夏秋二稅貸糧之類蠲放倚閣歲率有之故水旱灾傷一二即已放免七八矣今青苗本錢雖聞多已俵散然其人情循習故常冀幸終見蠲免故雖請錢之初未見其害然催納之際必致鞭笞撲撻然後事集此必然之理也故府界之縣十七開封祥符户口略等然開封所散止三千餘緡而祥符及三千餘貫以此推之足見諸縣有能體朝廷之意以贍恤貧弱為務而又憂失陷之弊將來催驅難以辦集者則所給散當有莭度也至於陳留不散一錢此又見百姓其實不願與官中交關非風諭召集則未有至者況大户本不闕乏徒以官中散錢使之保識下戶不敢不請下等細民多利得錢而又患無保識或有保識而所請不多道途之費給散之擾十已耗其二三而下户所有之田不能百畝所出幾何而租賦之外更納青苗錢或至數石則所餘無幾矣若官許納錢迫以期限則麥價大減又當賤糶以價償官矣如此則下户一嵗之收曽不補其所負況府界積年貸糧舊缺四十餘萬石而去秋所催才及七十餘石麥租等錢一萬二千餘貫去秋才納六百餘貫以此見府界之民狃習恩貸其給甚易而其斂則難也今聖㫖指揮乃令體量人户情願請領或追呼抑配則臣前所引開封三縣其情可見矣況臣前後論列皆謂法不精所遣使者非其人故屢引作俑之說以明將來之害今聖㫖乃使臣遍行諸縣又與提㸃提舉等官連書聞奏諫官備耳目之任凡所聞見得以開陳必欲按實罪狀正所謂干礙之官臣聞古者設官有言之者有行之者故言者不責其必行行者不責其能言臣備員諫省以言語為官矣其又能一二以行之乎伏望聖慈察臣區區之志臣之所言是邪則願陛下采而行之所言非耶固不逃於誅譴所有體量青苗㫖揮望賜寢罷謹具狀辭免以聞覺又奏曰臣切見制置三司條例司畫一文字頒行天下曉諭官吏使知法意其凡有七至於論斂散出入之弊分城郭田野之民憂將來之陷失其利害灼然人人所能知者臣皆請置而不論至於援引經義以傅㑹先王之典防微杜漸將以召怨賈祻者臣得極為陛下陳之其條有三謹具如後一新法云周禮泉府以謂民之貸者有至二十而五而曰國事之財用取具焉今者不過三分即此貸民取息已不為多今常平之物不領於三司比周公之法乃不以取具國事之財用故云公家無所利其入臣切以謂周家綱紀天下其法至密小大詳略之設有條本末先後之施有序所治大者不領其詳所當後者不先於本故其法始於治地其效至於天下無一人之獄比其積纍乃自於文王武王周公三聖人者上取堯舜夏商之遺法損益彌縫之至是而始備嗚呼其亦難成矣哉周之法如此其詳且備矣民之養生喪死者既以無憾則又慮夫祭祀喪紀與夫不可知之乏絶故為之立賖貸之法以隂相之所以備民之艱難而示彌縫之至也以其時考之宜若四民皆有作而無一人得為惰遊之幸者今天官九職其九曰閒民無常職轉移執事則是周法雖密而先王亦恐其踈而或有脫焉者故又設閒民之職以待轉移之人亦猶賖貸之所以待非常也賖貸者不可以徒豫必使以國服輸息蓋又寓勤生節用之意以俟其怠惰者耳若夫國事之財用取具者蓋謂泉府所領若市之不售貸之滯於民用有買有豫并賖貸法而舉之焉若專取於泉府則冢宰九賦之類將安用耶至國服之息說者不明先鄭後鄭各為一解康成曰於國事受園廛之田而貸萬泉者朞出息五百則是一歲之中貸錢十千而出五百之息是為二十而一矣又曰王莽時民貸以治産業者但計贏所得受息無過嵗計什一則是莽時雖計多少為定及其科催唯據所贏多少假令所貸百千嵗贏十千取一千五千取五百是計贏所得受息無過嵗計什一也康成雖引載師園廛為比然卒以莽時為據其意蓋為周制亦當爾也不應周公取息反重於王莽之時夫以王莽貪亂敗亡之法尚不至於以本計息奈何謂周禮太平之制而取息之厚乃至是耶况載師所任自園廛二十而一至漆林二十而五其征五等而漆林之征最重以其末作妨農所以抑之使歸本也今以農民乏絶將以補耕助斂乃欲二十而五以比漆林之征則是為本末者無以異與周禮之意相違甚矣況周官載治法甚詳必欲舉而行之宜有先於此者如賖貸之法劉歆行於新室已不效矣莽之亡雖不專以此然亦取亡之一道故臣謂聖世講求宜講求先王之法章明較著已試而效者推而行之不當取疑文虛說茍以圖治焉一新法將以振乏絶抑兼并此誠為天下者之所慮然臣切以謂為此者有施設次第而其效不可以遽見若亂其紀綱倒其先後而徒以振乏絶抑兼并為意則其治必不成成必不久何以言之西漢之時所患者諸侯地大過制無不帝制而天子自為者擅爵人赦死罪甚者戴黃屋至逆節萌起內窺京師此其勢非止兼并之放恣貧弱之乏絶也然而賈誼處之不過欲衆建諸侯而少其力朝錯不知出此以謫削諸侯之地而致七國之祻漢室幾亡其後主父偃卒用誼䇿推恩分子弟國邑而諸侯銷弱京師以尊所謂安危之幾豈不在謀蓋謂此也今以青苗細故招天下之議使老臣踈外而不見聽輔臣遷延而不就職門下執奏而不肻行諫官請罪而求去若此其事雖善難以必行況復疑文虛說若前之云云者哉臣聞夏之貢法其傳乃自堯舜以來可謂善矣及周之世不可行也則變而為助故傳曰治地莫善於助莫不善於貢若夫文武周公豈固棄毁先代之法哉蓋時有不可行人有不可强不得不舍先聖而從近世棄古法而徇人情以舜之世而有苗不率又以禹出兵而征之其勢如覆太山以壓卵然以益之一言則還師而修德以舜禹之聖猶不能無過舉其所以為不可及者以其能舍己從人唯是之求也今賖貸之法用之於周不過如貢法之善論者之紛紛又非止益之一言然而牢閉固拒從而為之辭以必其所不必何也臣切憂姦邪之臣乘人情之汹汹爭欲上章奏疏動搖朝廷外以釣直取名內實結黨連伍小則希權位竊貴勢大或懷不可測之姦謀朝廷建法興事不與大臣正士為謀而務排其說黜其忠乃使姦邪小人得騁其志日夜增飾造作而幸其有變流傳四方駭動天下甚非國家之福也一新制以謂周禮國事財用取具於泉府之官賖貸之息今常平之物不領於三司專以振民乏絶比周公之法乃不以取具國事之財用故云公家無所利其入也臣切以謂箕子見象筯而歎曰必為玉杯其後果以奢泰亡國孔子以謂為芻靈者為善為俑者不仁蓋俑疑於人而後世有用殉者矣仁聖之防微慮逺其深矣乎今以泉府不明之法施於主上仁民愛物之時雖云取息二分將以廣施散利補助耕斂之乏絶然臣切亦私憂使者不皆得其人州縣不能深知朝廷之微意而並緣為姦聚斂希㫖則單弱之民或受其弊九重萬里何由察而知之今者朝廷清明法令備具而將漕之臣迫於財賦之不足州縣之吏畏憚監司之譴訶尚且公為掊斂百出千名朝廷明有取息之文俗吏不能通知經義則臣又切懷箕子之私憂與仲尼之逺慮也以陛下之睿明天姿仁恕推仁民愛物之心而創行新法臣恐萬世之後失其本真有剝膚椎髓應上之求者矣則為玉杯以亡國與用人而殉死可不深防其漸歟右臣所條三事非欲與建議之臣爭勝負辭辨而已蓋內竭區區之愚忠外採衆人之正論不敢以虛辭濫說疑誤天聽伏望陛下斷以不疑一朝罷去毋使天下疑朝廷之為利小人幸君子之道消徐講治法躋世太平非獨臣之幸甚實四海幸甚翰林學士范鎮上奏曰臣切以常平倉始於漢之盛時賤則貴而斂之恐傷農也貴則賤而散之恐傷民也最為近古雖唐虞之政無以易也而青苗者唐喪亂之世所為也所謂青苗苗青在田賤估其直收斂未畢而必其償是盜跖之法也今以盜跖之法而變唐虞不易之政此人情所以不安而中外驚疑也陛下以上聖之資厲精求治宜先道德以安民心而服四夷有司乃皇皇於財利使中外人心驚疑不安臣恐四夷有以窺我也乃者天雨土地生毛天鳴地震皆民勞之象也伏惟陛下觀天地之變罷青苗之舉歸農田水利於州縣追還使者以安民心而解中外之疑鎮又奏曰臣伏覩近降中書劄子四十道散下諸路約束分俵青苗錢不得抑配人户並召情願者特申前詔耳非臣前所奏請之謂也陛下嫉富人之多取而少取之少取與多取猶五十步之與百步耳何擇焉今有二人坐市市物其一人從其傍下其直以相傾奪則人皆知惡之況朝廷乎朝廷者非王道不可為乃欲為市道之所惡者乎異時下户之舉息者大率千家才數十百家今又盡驅而豫之錢是天下之下户皆舉息矣天下之下户既皆舉息則其心乃常恐乎公上之責其償而莫寧其志也且始之豫之也則人莫不願其得及責其償則豈能如豫之之願乎臣恐官廪一散若貸糧之不時得收文移愈密而天下多事矣貧富之不均久矣貧者十蓋七八何也力役科買之數也非富民之多取也富者才二三既榷其利又責其保任下户下戶逃則於富者取償是促富者使貧也貧者既已貧矣又促富者使貧萬一契丹渝盟秉常盜邊驅貧民與之守禦豈不殆哉且富民有道在於節費節費有道在於減兵減兵有道在於以漸為之十年則嵗積緡錢五百萬矣積而不已以之為國則國用足以之治民則民力寬何用遣使汲汲於聚斂而取怨於天下之民乎宋興百一十年雖三代太平未有如今日之長也何則祖宗之規模在於州縣州委之生殺縣委之賦役慮其或失於中也為之轉運使提㸃刑獄以按察而糾舉之其委任謹重之道至矣一旦遣使數十人分撓其權欲天下之心不驚疑可乎而言者乃謂富人動搖又建議欲設賞以捕繫之是監謗也監謗而可為於此世乎亦猶興利者之為也臣無言責然陛下比者詔書丁寧今兹事體又大不敢緘默伏乞檢臣前奏罷青苗錢歸農田水利差役於州縣而召還使者則天下幸甚鎮又奏曰臣伏以陛下以一人之尊而居天下士民之上所恃者綱紀也綱紀者上下之分而已今內則中書之政歸於條例司外則轉運提㸃刑獄及州縣之權奪於提舉常平廣惠倉司上下之分侵撓如此陛下之綱紀何恃乎且法者所以示信天下也陛下初詔云公家無所利其入今河北提舉司乃自第一等給錢有差皆令出三分利豈為公家無所利其入乎又云不願者不得抑配今上等人户既令出息又令保任貧户豈不為抑配乎近詔諸路提㸃刑獄嚴加覺察又令開封府鞫問吕景諸路提㸃刑獄肻為陛下覺察乎法令如此而欲天下取信不可得也外議紛紛皆云自古以來未有天子而開課場者民雖至愚不可不畏伏乞檢臣前二奏罷青苗錢追還使者而歸農田水利差役於州縣以正綱紀以息民言而幸天下臣不勝區區之愚監察御史裏行張戩上奏曰臣切以天下之論難掩至公在於聖明動必循理無適無莫義之與比昔建議謂便而試行之今已知有害而改罷之是順天下之心而成天下之務也昔非今是何憚改為故曰毋意毋必毋固毋我又曰時行則行時止則止大易之義貴於隨時陛下何利之求惟義而已今則衆意乖戾天下騷然而王安石尤欲飾非所持甚隘信惑憸人力排正論此臣所以在於必諍雖死輒為義或難從勢無兩立也參知政事趙抃上奏曰臣近以制置條例司遣使四十餘人馳傳天下人情驚擾物論喧譁纍具奏陳并與宰臣等數嘗面奏乞罷諸路提舉官屬其常平等事一切責成監司信賞必罰孰敢慢者而王安石强辨自用動輒忿爭以天下之公論為流俗之浮議順非文過違衆罔民近制置司所差官如張次山吳師孟范世京等七八人懇辭勇退唯恐不得所請夫要職顯仕人之所欲彼不願就者蓋知事悉乖戾不敢當之昨日安石再舉西川福建提舉官四員其愎如此上煩言者是所謂惡醉而強酒也近臣侍從臺諫官力言制置司不便司馬光因罷樞密副使之命中外人情莫不怪駭李常居家待罪多日孫覺張戩程皓三人各與安石論列於中書又悉嘗上殿乞罷言職今日吕公著范鎮俱請郡朝廷事有輕重體有大小以言乎財利於事為輕而天下之民心得失為重矣以言乎提舉官於體為小而禁近耳目之臣用捨為大矣今夫不罷財利而失天下民心是去重而取輕也不罷提舉官而棄禁近耳目之臣是失大而得小也今中外人情恟恟如此更乞酌事之重惜體之大罷其輕者小者變祻為福易於反掌爾樞密副使司馬光乞罷條例司常平使疏曰臣䝉聖恩除樞密副使仍屢遣陳承禮等趣臣就職德澤汪洋天隆地厚非臣隕身糜骨所能報稱然臣切惟陛下所以用臣之意蓋察臣狂直庶幾有補於國家臣所以事陛下之心亦不過竭其愚衷以裨聖德之萬一若陛下徒以祿位榮臣而不取其言則是以天官私非其人臣徒以祿位自榮而不能救生民之患則是盜竊朝廷名器以私其一身誠恐上纍陛下之至公下喪微臣之素守此臣所以屢違詔命不敢祇受者也臣伏見陛下天縱英明厲精求治思得嘉謀以新美天下而建畫之臣不能仰副聖意思慮未熟講議未精徒見目前之小利不顧永久之大害憂政事之不治不能輔陛下修祖宗之令典乃更變亂先王之正刑患財利之不足不能勸陛下以恭儉節用乃更遣聚斂之臣誅剝齊民設官則以冗增冗立法則以苛益苛使四海危駭百姓騷然猶且堅執而行之不肻自以為非也臣先曽上疏言不當設制置三司條例司又言天下之事當委之轉運使知州知縣不當别遣使者擾亂其間又嘗因經筵侍坐言散青苗錢不便自後朝廷更遣使者四十餘人分行天下以提舉勾當常平廣惠倉相度差役農田水利為名其實專使之散青苗錢臣切自疑智識淺短不足以知天下變通之務又疑因臣之言激怒建畫之臣使行之更力由是閉口不敢復言今行之才數月中外鼎沸皆以散青苗錢為不便然後臣乃敢發口復言彼言青苗錢不便者大率但知所遣使者或年少位卑倚勢作威陵轢州縣騷擾百姓止論今日之害耳臣所憂者乃在十年之後非今日也夫民之所以有貧富者由其材性愚智不同富者智識差長憂深思逺寧勞筋苦骨惡衣菲食終不肻取債於人故其家常有贏餘而不至狼狽也貧者啙窳偷生不為逺慮一醉日富無復贏餘急則取債於人積不能償至於鬻妻賣子凍餒填溝壑而不知自悔也是以富者常借貸貧民以自饒而貧者常假貸富民以自存雖苦樂不均然猶彼此相資以保其生今縣官乃自出息錢以春秋貸民民之富者皆不願取負者乃欲得之提舉官欲以多散為功故不問民之貧富各隨户等抑配與之富者與債仍多貧者與債差少多者至十五緡少者不減千錢州縣官吏恐以逋缺為負必令貧富相兼共為保甲仍以富者為之魁首貧者得錢隨手皆盡將來粟麥小有不登二稅且不能輸況於息錢固不能償吏督之急則散而之四方富者不去則獨償數家所負力竭不逮則官必為之倚閣春債未畢秋債復來歷年寖深債負益重或值凶年則流轉死亡幸而豐稔則州縣之吏併催積年所負之債是使百姓無有豐凶長無蘇息之期也貧者既盡富者亦貧臣恐十年之外富者無幾何矣富者既盡若不幸國家有邊隅之警興師動衆凡粟帛軍須之費將從誰取之臣不知今者天下所散青苗錢凡幾千萬緡若民力既竭加以水旱之灾州縣之吏果有仁心愛民者安得不為之請於朝廷乞因郊赦而除之朝廷自祖宗以來以仁政養民豈可視其流亡轉死而必責其所負其勢不得不從請者之言也然則官錢幾千萬緡已放散而不返矣官錢既放散而百姓又困竭但使閭胥里長於收督之際有乞取之資此可以謂之善計乎且常平倉者乃三代聖王之遺法非獨李悝耿夀昌能為之也榖賤不傷農榖貴不傷民民賴其食而官收其利法之善者無過於此比來所以隳廢者由官吏不得人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其榖換轉運司錢是欲盡壞常平專行青苗也國家每遇凶年供軍倉自不能足用固無羡餘以濟飢民所賴者止有常平倉錢榖耳今一旦盡作青苗錢散之向去若有豐年將以何錢平糴若有凶年將以何榖賙贍乎臣切聞先帝嘗出內藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢榖共約一千餘萬貫石今無故盡散之它日若思常平之法復欲收聚何時得及此數乎臣以謂散青苗錢之害猶小而壞常平倉之害尤大也今國家每有大費三司所不能供者陛下輒取內藏庫物以給之彼內藏庫者乃祖宗纍世之所蓄聚以備軍旅非常之用也使其物常如泉源流出於庫無有窮竭之時則可矣若本皆斂之於民以實之則有時而空矣昔漢文帝欲作露臺召匠計之直百金上曰百金中人十家之産也吾何以臺為太宗時兖王嘗作假山召僚屬置酒觀之翊善姚坦獨俯首不視王强使視之坦曰坦惟見血山耳不見假山王驚問其故坦曰坦在田舍時見州縣督稅里胥臨門捕人父子兄弟送縣笞撻血流滿身愁苦之聲不可忍聞此假山皆民租賦所為非血山而何是時上亦自為假山聞之遽命毁之今陛下令薛向於江淮為貿易以三百萬緡畀之又散青苗錢數千萬緡其餘五十萬三十萬者固不足數爾其為露臺假山之費不亦多乎陛下聰明仁儉固不減於漢文帝及太宗然而視棄財物如糞土者蓋未知其所從來皆出於生民之膏血耳陛下若終信條例司所言推而行之不肻變更以循舊貫十年之外富室既盡常平已壞帑藏又空不幸有方二三千里水旱餓殍滿野加以四夷侵犯邊境羽書猝至戎車塞路攻戰不已轉餉不休當是之時民之羸者不轉死溝壑壯者不發為盜賊將何之矣秦之陳勝吳廣漢之赤眉黃巾唐之黃巢皆窮民之所為也大勢既去雖有智者不能善其後矣臣切惟太祖太宗躬擐甲胄櫛風沐雨跋履山川䝉犯矢石以為子孫成光明盛大之業如此其美也陛下試取臣所進歷年圖觀之自周秦以來至于國初一千三百六十有二年其間亂離版蕩則固多矣至於中外無事不見兵革百有餘年如國朝之盛者豈易得乎此臣所以尤為陛下痛惜者也書曰民不靖亦惟在王宫邦君室臣切觀方今四夷親附邊鄙不聳五榖和熟盜賊稀簡是宜為天下和樂無事之時而中外恟恟人不自安者無它故也正由朝廷有制置三司條例司諸路有提舉勾當常平廣惠倉使者爭獻謀畫各矜智巧變更祖宗法度侵奪細民常産掊斂財利以希恩寵非獨此青苗一事而已至於欲計畝率斂雇人充役決汴水以種稻及澆溉民田及欲泄三十六陂水募人耕佃若此之類不可悉數道路之人共所非笑而條例司自以為髙竒之䇿書以授常平使者必欲行之天下恐其興作之不已皆如青苗為害於民也故小大遑遑不敢自安苟不罷廢此局則生民必無休息之期矣陛下誠能昭然覺悟采納臣言罷制置三司條例司及追還諸路提舉勾當常平廣惠倉使者其官員並送審官院與合入差遣青苗錢已散者令州縣候豐熟日催收本錢更不取利未散者毋得更散其常平倉錢榖依舊封樁令提㸃刑獄司管勾則太平之業依然復故矣兹事明如白黑易如反掌陛下何憚而不答也如此臣雖盡納官爵但得為太平之民以終餘年其幸多矣苟言不足采陛下雖引而置諸二府徒使天下指臣為貪榮冒寵之人未審陛下將何所用之不勝慺慺狂愚之誠惟聖明裁處臣光昧死再拜上疏監察御史裏行程皓上疏曰臣近纍上言乞罷預俵青苗錢利息及汰去提舉官事朝夕以覬未䝉施行臣切謂明者見於未形智者防於未亂況今日事理顯白易知若不因機亟决持之愈堅必貽後悔悔而後改則為害已多蓋安危之本在乎人情治亂之機繫乎事始衆心暌乖則有言不信萬邦協和則所為必成固不可以威力取强言語必勝而近日所聞尤為未便伏見制置條例司疏駮大臣之奏舉劾不奉行之官徒使中外物情愈致驚駭是乃舉一偏而盡沮公議因小事而先失衆心權其重輕未見其可臣切謂陛下固已燭見事體究知是非在聖心非吝改張由柄臣尚持固必是致輿情大鬱衆論益歡若欲遂行必難終濟伏望陛下奮神明之威斷審成敗之先幾與其遂一失以廢百為孰若沛大恩而新衆志外汰使人之擾亟推去息之仁況糶糴之法兼行則儲畜之資自廣在朝廷未失於舉措使論議何名而沸騰伏乞檢㑹臣所上言早賜施行則天下幸甚皓又奏曰臣聞天下之理本諸簡易而行之以順道則事無不成故曰智者若禹之行水行其所無事也捨而之於險阻則不足以言智矣蓋自古興治雖有專任獨決能就事功者未聞輔弼大臣人各有心暌戾不一致國政異出名分不正中外人情交謂不可而能有為者也況於措置失宜沮廢公議一二小臣實與大計用賤陵貴以邪妨正者乎凡此皆天下之理不宜有成而智者之所不行也設令由此僥幸事小有成而興利之臣日進尚德之風寖衰尤非朝廷之福矧復天時未順地震連年四方人心日益搖動此皆陛下所當仰測天意俯察人事者也臣奉職不肖議論無補望允前奏早賜降責觀文殿學士知青州歐陽修上奏曰臣伏見朝廷新制俵散青苗錢以來中外之議皆稱不便多乞寢罷至今未䝉省察臣以老病昏忘雖不能究述利害苟有所見其敢不言臣今有起請事件謹具畫一如後一臣切見議者言青苗錢取利於民至煩聖慈命有司具述本末委曲申諭中外以朝廷本為惠民之意然告諭之後縉紳之士論議益多至於田野之民蠢然固不知周官泉府為何物但見官中放債每錢一百文要二十文利爾是以申告雖煩而莫能諭也臣亦以謂等是取利不許取三分而許取二分此孟子所謂以五十步笑百步者以臣愚見必欲使天下曉然知取利非朝廷本意則乞除去二分之息但只令納元數本錢如此始是不取利矣蓋二分之息以為所得多耶固不可多取之於民所得不多耶小利又何足顧何必以此上纍聖政一臣檢詳元降指揮如灾傷及五分已上則夏料青苗錢令於秋料送納秋料於次年夏料送納臣切謂年嵗豐凶固不可定其間豐年常少而凶嵗常多今所降指揮蓋只言偶然一料灾傷爾若才遇豐熟却須一併催納則農民永無豐嵗矣至於中不熟之年不該得灾傷分數合於本料送納者或人户無力或頑猾拖延本料尚未送納了當若令又請次料合俵錢數則壓積轉多必難催索臣今欲乞人戶遇灾傷本料未曽送納者及人戶無力或頑猾拖延不納者並更不支俵與次料錢如此則人戶免積壓拖缺州縣免鞭撲催驅官錢免積缺失陷一臣切聞議者多以抑配人户為患所以朝廷屢降指揮丁寧約束縣官吏不得抑配百姓然諸路各有提舉管幹等官往來催促必須盡錢俵散而後止由是言之朝廷雖指揮州縣不得抑逼百姓請錢而提舉等官又却催促盡數散俵故提舉等官以不能催促盡數散俵為失職州縣之吏亦以俵錢不盡為弛慢不才上下不得不遞相督責者勢使之然各不獲已也由是言之理難獨責州縣抑配矣以臣愚見欲乞先罷提舉管幹等官不令催督然後可以責州縣不得抑配其所俵錢取民情願專委州縣隨多少散之不必須要盡數亦不必須要州縣之民戶戶盡請如此則自然無抑配之患矣右謹具如前臣以衰年昏病不能深識逺慮所見青苗之議久已喧然中外羣臣乞行寢罷者不可勝數其所陳久逺利害必已詳盡而無遺失一日陛下赫然開悟悉採羣議追還新制一切罷之以便公私天下之幸也若中外所言雖多猶未能感動天聽則見行不便法中有此三事尤係目下利害如臣畫一所陳伏望聖慈特賜裁擇修又上奏曰臣近曽奏為起請俵散青苗錢不便事數內一件乞遇灾傷夏料未納及不係灾傷人户頑猾拖缺者並更不俵散秋料錢數至今未奉指揮臣勘㑹今年二麥才方成熟尚未收割已係五月又合俵散秋料錢數切緣夏料已散錢尚未有一户送納若又俵散秋料錢切慮積壓拖缺枉有失陷官錢臣已指揮本路諸州軍並令未得俵散秋料錢别候朝廷指揮去後臣伏思除臣近所起請灾傷未納及人户拖缺不納者乞且不俵次料一事外臣今更有愚見不敢緘默臣切見自俵青苗錢已來議者皆以取利為非朝廷深惡其說遂命所司條陳申諭其言雖煩而終不免於取利然猶有一說者意在惠民也以臣愚見若夏料錢於春中俵散猶是青黃不相接之時雖不戶戶闕乏然其間容有不濟者以為惠政尚有說焉若秋料錢於五月俵散正是蠶麥成熟人戶不乏之時何名濟闕直是放債取利爾若二麥不熟則夏料尚缺豈宜更俵秋料錢使人户積壓拖缺以此而言秋料錢可以罷而不散欲望聖慈特賜詳擇伏乞早降指揮歷代名臣奏議卷二百六十六
