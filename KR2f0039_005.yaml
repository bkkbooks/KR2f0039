body:
  text: 歷代名臣奏議卷五明楊士竒等撰君德宋理宗寶慶元年禮部侍郎真德秀上奏曰臣竊聞陛下乃者涓選剛辰移御清燕非特恬養神明之觀抑且稍正宫寢之儀臣子之心不勝慰幸然區區之愚有欲獻於陛下者不敢自默恭惟髙宗皇帝受命中興再造區夏六飛南渡駐蹕錢塘其與前世之君篳路籃縷以啓山林披攘荆棘以立朝廷者殆無以異其艱其勤可謂至矣孝宗皇帝嗣守丕緒志清中原二十八年之間搜攬賢材厲精聽斷未嘗一日少懈用能保固大業垂萬世無疆之休今陛下所御之宫庭即二祖儲神間燕之地也仰瞻楹桷俯視軒墀當若二祖實臨其上念昔者創守之惟艱思今日繼承之匪易則兢業祗懼其容少忽乎漢文帝有言朕奉先帝宫室常恐羞之惟其以是存心故能終身為恭儉之主兩漢之賢君莫先焉此臣之所欲獻者一陛下前所居處密邇東朝唯思曲盡人子之恭其敢遽當人主之奉今宫閣暨乘輿服用之需頥指使令之便必將浸備於昔臣知聖性恬淡固非外物可移然以一心而受衆攻非卓然剛明弗惑未有不浸淫而蠧蝕者然則將何道以處之曰惟學可以養此心惟敬可以存此心惟親近君子可以維持此心蓋理義之與物欲相為消長者也篤志于學則日與聖賢為徒而有自得之樂持身以敬則凛如神明在上而無非僻之侵親賢人君子之時多則規警日聞諂邪不得而惑三者交致其力則聖心湛然如日之明如水之清理義常為之主而物欲不能奪矣此臣之所欲獻者二三年之喪行於宫壼非獨衰麻在躬而已哀慕之存於心者不可頃刻忘憂戚之形於色者不可斯須已古者卒哭而廬居小祥而堊室今雖未能如昔然居處之制不可不極其朴素也古者服喪非有疾不飲酒食肉今雖未能如昔然饔人大官之供不可不極其菲儉也古者終喪不處于內今雖未能如昔然防微謹獨屏逺聲色不可不極其嚴也食則見先帝于羮立則見先帝于牆庶幾不負罔極之恩丕昭純孝之實儻因移御之適凡所以自奉者少異於居喪之儀則雖衰麻在躬猶不服也此臣之所欲獻者三陛下前者日侍慈明兩宫之情常歡然而無間今視膳問安之敬雖無改於昔而其見則有時矣此正陛下深留聖心之日也古之事親者聽於無聲視於無形一舉足一出言不敢忘父母也況皇太后親舉神器以授陛下同聽萬幾曽未數月褰裳去之如脫敝屣隆恩厚德與天地無極陛下將何以報之乎然則恭勤之禮孝養之誠當有加於前日可也至於兩宫侍御之臣恩意當使如一蓋愛親者及其犬馬況左右使令者乎厥今羣臣萬民之命繫於兩宫慈孝交隆於上則羣臣萬民皆有所恃以為安而兩宫侍御之臣亦得以保其富貴此臣所欲獻者四臣猥以不材叨備勸讀比者親承聖訓茍可禆益朕躬母或有隱陛下之虛懷求助如此臣其敢以淺陋自解乎用是輒陳其愚冀補萬一惟聖明擇焉紹定六年德秀為戶部尚書又奏曰臣聞當天命已定之餘而不忘戒懼者三代令王之所以長世也當天命未定之時而遽忘戒懼者後世人主之所以不克終也臣嘗讀書而得基命定命之説竊以謂周之文武基命者也若成王則命已定矣而周公作詩以戒王乃曰宜監于殷駿命不易又曰命之不易無遏爾躬召公作書以戒王亦曰王其德之用祈天永命又曰欲王以小民受天永命夫周至成王再世耳而文武之功配天罔極天命烏乎而遽止亦豈待祈而後永耶及觀太康之於夏太甲之於商僅一再傳而一則以盤遊失國一則以欲敗度縱敗禮而幾失之天未嘗以禹湯之烈而私其子孫也是以謂之難諶是以謂之靡常然後知二公惓惓之忠非過計也然則繼體守成之主其可以天命已定而忽之哉厥今天下何時也臣以為天命未定之時也夫自藝祖基肇造之命而太宗定之髙宗基中興之命而孝宗定之聖子神孫繼繼承承于千萬年命之定也久矣而臣以為未定者蓋觀皇矣之詩而知文王受命之由方天厭商亂而求民之定也始則觀之二國焉求之不獲而又觀之四國焉其德皆莫若文王者於是眷焉西顧命之為中夏主夫豈茍然哉今中原俶擾天之簡求民主兹惟厥時使吾之德足以當天心天必不舍而他畀也茍吾之德未足以當天心天必轉而他之矣臣故曰此天命未定之時也嘉定中臣繆直禁林是時韃日以興金日以削嘗中夜倣徨而起曰此吾國安危將判之秋君臣上下恐懼修省之日也於是進祈天永命之戒寧宗皇帝優容狂瞽嘉歎再三而權臣寡識懵不之省自是二十餘年德政未嘗增修人心惟益咨怨所謂祈天永命之言直視以為迂闊而欺天罔人之事則益甚焉是以譴告頻仍災害酷烈錢塘巨浸莽為沙磧天台苕霅州化為湖而都城之災則尤曠古所未有他如彗孛飛流之變無嵗無之盜賊兵燼之厄幾半天下吾國之勢蓋岌岌然上賴九廟之靈權臣殞命陛下親政英明果斷薄海聳觀而於外攘內修之政未及大有所為金遽以滅告矣羣雄虎爭猛敵焱鋭豫備深防所當汲汲內顧根本猶有可虞而邊臣勿勿或假和以紓患或恃戰以成功臣以為皆非至計也昔人有言凡舉大事必順天心夏秋以來積隂多雨陽澤弗競而乾文示異數見於清臺之占因人事以推天心殆有甚可懼者臣是以復進祈天永命之説也然所謂祈者豈世俗禬禳小數諂瀆鬼神之謂也稽諸召誥曰敬德曰小民而已傳有之敬者德之聚能敬必有德近世大儒皆謂敬者聖學之所以成始成終也陛下聖學高明固嘗以毋不敬之言揭諸宥坐朝夕仰視如對神明然所以害吾敬者則不可不察也儀狄之酒伐德亂性此害吾敬者也南威之色蕩心惑志此害吾敬者也陛下於此心惕然自省曰沈湎冒色婦言是用昔人之所以自絶也其可不戒乎侏儒之戲滑稽之談此害吾敬者也陛下於此心肅然自持曰優笑在前賢才在後昔人所以取亡也其可不戒乎鄭聲之淫佞人之殆有一于此皆足害敬放而逺之不可以不嚴盤遊之樂弋射之娛禽獸之珍狗馬之玩有一于此皆足害敬屏而絶之不可以不力如此則陛下之心清明純粹萬善出焉則又反而思之曰朕自即位以來為權臣所誤其失有幾凡聖心之所未安者即天理所未安也改之其可以或吝則又稽于衆曰朕言動之不中道政令之不合宜者其事有幾凡人情之所未允者即天意所未允也更之其可以或後蓋一念之愧不敢安此敬也一事之戾不敢忽亦敬也謹之於心術之微而發之於踐履之實必如湯之日躋文王之緝熙中宗之嚴恭寅畏然後謂之無不敬此祈天永命之一也然召公既曰敬德又必以小民參之何邪蓋天之視聽因民之視聽民心之向背即天心之向背也權臣用事以來戕賊元元殆非一事蓋其始也易楮幣易鹽鈔顓用罔利之術而峻繩下之刑估沒編𨽻濫及無辜而民怨其中也黜忠良而進貪刻舉赤子以付豺狼逺近嗷嗷恬不之恤而民益怨其末也廉耻道絶貨賂公行以服食器用為未足而責之以寶玉珠璣以寶玉珠璣為不足而責之以田宅契劵希指求進者雖殺人于貨亦所忍為而民大怨矣江湖閩廣三衢之盜相挻而起生靈荼毒幾千萬人户口減少殆什七八幸而無盜者又以官吏爭自為盜田里荒寂州縣蕭條亦無異於緑林黑山之所躪轢也可勝嘆哉仰賴陛下布端平之詔一洗而新之然狃于舊習者鮮為革心之圖困于虐政者未被息肩之惠蓋賄道雖窒而昔之賄進者尚存贓吏雖懲而贓多者或反漏網加以邊事既興江淮之間科調百出所至騷然民不堪命逺而襄蜀抑又可知臣恐非所以培本根夀命脈也陛下至仁寧忍聞此臣願聖志惻然興念申頒詔旨凡郡邑掊刻之政邊閫科調之擾悉從禁止敢違命者必罰無赦至於行都近甸為沐浴雨露之首而楮輕物貴為生孔囏愁嘆之聲在在而有書稱文王惠鮮鰥寡蓋窮悴之人奄奄就盡惠澤所及鮮然咸有生意此海內所望於仁聖之君也宜命近臣條舉便民之畫如魏相所上詔書二十三事者以次行之此祈天永命之二也易曰天之所助者順人之所助者信是以自天祐之吉無不利陛下真能敬德於上而使斯民懷生於下則人心恱而天意順恢拓之本其在斯乎天心將轉久矣韃戎殘暴所至為墟必非眷命之所屬陛下春秋鼎盛聖德日新惟益懋敬焉一陟一降在帝左右一遊一衍若天與俱強勉力行悠久不息以迓續休命於無窮乃眷南顧當有其日中原故物終為吾有若徒以力求之而不反其本天意難測臣實憂之昔梁武欲取河南嘗自語曰吾之基業有如金甌脫致紛紜悔之何及徒以乙卯之夢羣臣之諛不能自克卒隳金甌之業追迹梁武平生所為違天悖理何可勝數無得天之實而希不世之功其失宜哉臣區區所陳本於周召聖賢典訓必不誤人且前日嘗以告先皇今敢不以告陛下臣之愚忠壯老一心惟聖明裁察寶慶初魏了翁上奏曰臣不佞待罪史臣獲際陛下龍飛御極命侍從言語之臣以次面對切惟澄源正本罔不在初臣不敢掇拾細微具文應詔臣聞心者人之太極而人心又為天地之太極以主兩儀以命萬物不越諸此故天之神明春秋冬夏風雨霜露地載神氣為風霆流形庶物露生其於人也則清明在躬氣志如神蓋貫通上下表裏民物自繼善以及於成性皆一本而分也而人心之靈則所以奠人極人極立而天地位焉孔子曰事父孝故事天明事母孝故事地察子思曰君子之道造端乎夫婦及其至也察乎天地夫天髙地下人位乎其中判然三才若不相接也而五行二氣自一而分故上下同流彼動此應使行乎宫庭屋漏之間炯然清明無少愧怍則仰觀俯察光潔昭著前參後倚流布充塞無非此心之發見一有不慊則視上帝而夢夢顧四方而蹙蹙雖日星草木亦若隨人意而不舒者陛下謂此心之外别有所謂天地神明者乎抑天地神明不越乎此心也正月之朔風來自乾丁丑既望月蝕于翼占者以為兵戈之應迫近之象而雷電先時而發雨雪繼雷而降劉向亦以為陽不閉隂隂見間而勝陽之應然而此必有感而後為應既應則復為感不可以其變在外而忽之其事已應而幸焉側聞陛下嘗謂講讀之臣夜來雪作朕終夜為之不安當益恐懼修德大哉聖言此正求端用力之要也且陛下居深宫之中十手十目所不睹聞也而惕然終夜若有臨乎其前者以此見天非蒼蒼之謂也陛下之心與億兆人之心義理所安是之謂天不愧于人是不愧于天也不畏于人是不畏于天也臣願陛下即此不安之心而益加推廣其見天地也毋專以禱祠為事常使此心兢兢惕惕如與天陟降如在帝左右可以對越而無愧奉宗廟也毋專以備物為饗常使此心油油翼翼如見乎其位如聞乎其容聲可以受終而無怍事太母也毋專以儼恪為恭常使此心洞洞屬屬如執玉奉盈如將弗勝可以感通而無間對公卿百執事毋徒以尊嚴為儀也常使此心寬虗平夷盡下而無所伏對經生學士母徒以誦説為功也常使此心緝熙光明日新而不可已播告于萬方有衆毋徒以言語為化也常使此心明白洞達觀感而無所惑心有未喻必反覆問辨以求之毋厭煩以自畫也心有未可必熟復思念以圖之毋耻過以成非也夫如是息養瞬存朝習暮益無頃刻之間則大本既立何事不可為以證諸庶民以考諸三王以建諸天地以質諸鬼神以施諸後世何往而不可合也不然則庶民且弗信而況其他乎聖學淺深之候氣數屈伸之感世途理亂之變人物消長之幾根於此心決於此時惟陛下速圖之了翁權禮部尚書又奏曰臣嘗從師友講學每謂治國之本始於正君嘗儲神蓄思將為陛下力陳修身齊家之要既至近畿則所聞日異恐或者指臣為闊於事情又不然謂臣為專攻上身故臣先為陛下據時事之迫切者而言之然而本原之論則何可以終無一言也臣每惟後世之治與古絶異古之人君以天位為至艱至危如履虎尾如蹈春氷如恫瘝乃身是故師氏司朝僕臣正位太史奉諱工師誦詩御瞽幾聲巫史後先卜筮左右人主無一時可縱弛也虞賔在位三恪助祭夏士在庭殷士在廟讎民在甸夷𨽻在門人主無一事不戒懼也蟲飛而會盈日出而視朝朝退而路寢聽政日中而考政夕而糾虔天刑日入而潔奉粢盛然後即安人主無一刻可暇逸也后妃御見有度應門擊柝鼓人上堂女史授環彤管記過人主無一息可肆欲也夫以貴為天子富有四海之內而自朝至昃兢兢業業居內之日常少居外之時常多蓋所以養夀命之源保身以保民也豈惟可以保民雖子孫千億亦自此始自秦人蕩滅古制為人上者深居穆清而授事於婦寺出令於房闥四方文書非􅉏御之臣不得上聞千數百年以來相尋一轍於是宦官外戚女寵嬖幸代操政柄人主僅擁虛器以寄于民上其接士大夫不過視朝數刻之外凡以傷生伐性者畢陳於前豈惟湮政事之原抑以傷夀命之本身不得康嗣不得蕃凡以是耳陛下以聖智之資而為權臣所操者十年幾無以自白於斯世今幸居可為之時外而百官有司奔走效職內而妃嬪嬙御便嬖取憐自淺中者視之必曰今乃知為皇帝之貴也今天下太平宜及時為樂也而臣以古今禍亂之事觀之則陛下雖曰勢重形佚其實巍然孤立於至艱至危之地而不自覺也陛下試思夫獨居深宫之中可託之以腹心者誰歟當此事變遝來之時可以繫天下之望者誰歟詩曰價人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城此六者守邦之要道也而其要則又在於宗子宗子者傳謂王之適子也無適子以為之城則王之獨居何恃而不畏乎故繼之曰無俾城壞而獨斯畏陛下誠能長慮及此則今日孤立之勢亦可以自覺矣傳曰后妃有正淑之行則嗣續有賢聖之君制度有威儀之節則人君有夀考之福此言希御幸以嗇精神則可以永夀命而蕃嗣續臣嘗記魏史明帝耽于內寵廷尉高柔上疏以為嬪嬙過數聖嗣不昌宜妙選淑媛以備內宫之數其餘盡遣還家且以育精養神專靜為寶則螽斯之美可致如魏明者雖不足為聖時道而柔之言實保身蕃嗣之要故臣願陛下念天命之不易思王業之惟艱必也居內之時常少居外之日常多親賢而逺色則思慮精明清心而寡欲則體力堅實無姦聲亂色則血氣循軌無淫樂慝禮則精神內守豈惟保夀命之道是乃致嗣續之原臣之所憂甚於漆室之女故忘其愚僭者若此若夫韓琦言于仁祖所謂建學內中擇宗室之謹厚好學者升入內學冀得親賢以屬大事是説也亦宜早入聖慮博訪而豫定焉卷卷之忠退俟斧鑕端平中祕書少監袁甫上劄子曰臣仰惟陛下更化以來廣開獻言之路而羣臣交進互説大而朝廷之綱紀微而田里之纎悉逺而邊鄙之變故近而宫闈之奧密臣下言之可謂詳陛下聽之可謂熟矣而至於切陛下之身之心者間雖言及一二而未有懇懇惻惻竭盡忠愛不顧忌諱不避嫌疑為陛下盡言無隱者臣一介踈逺去國一紀兹叨誤渥幸覲清光敢不一吐其愚以報陛下知遇哉臣嘗讀無逸一書蓋周公晚嵗所作字字真實吐自肺肝非徒紙上空言而已觀其論商周享國之修短明示兩途若曰由此則金玉厥躬而養夀命之原由彼則斫喪戕賊而失性命之正故凡受病之根伏於隱微而萌蘖易生者周公皆一一先其未病而藥之蓋適情肆欲是之謂逸故此書戒以後王惟耽樂之從亦罔或克夀懼其心志內荒而縱伐德之斧也勞民動衆是之謂逸故此書戒以無淫于觀于逸于遊于田懼其窮極民力以騁耳目之娛也輕改舊章是之謂逸故此書戒以變亂先王之政刑至于小大懼其驟更數易而無堅凝之守也不恤衆怨是之謂逸故此書戒以民否則厥心違怨否則厥口詛祝懼其怨懟繁興隄決而川潰也淫刑窮兵是之謂逸故此書戒以亂罰無罪殺無辜懼其輕視人命路熟而手滑也老臣忠愛先事預防列此數條凛若金科茍犯其一害已可畏兼犯數者危乎殆哉嗚呼周公受文王武王付屬之任恐恐然惟懼成王不自愛重則於吾責為有負故其勤拳真切之意必欲始終保護成王全而歸我文武庶幾無慙於託孤云爾然則無逸一書固切於成王之身心尤萬世帝王之藥石也恭惟陛下勇智本乎天錫聰明冠乎羣倫猶且孜孜勉勉崇儒興學其於帝王之道蓋已吻合無間矣抑臣猶願以無逸為陛下告者蓋臣即此書以驗今日之事如印劵符鑰之相契殆若端為陛下而發者不可不精思而深省也且陛下固知節情欲之流以保天和持警戒之念以彌德性矣天下咸以是賀陛下臣則未敢以為慶也譬彼蔓草暫爾芟剃春陽一轉芃然復生何則元有蔓草之根固與無宿根者不同也泛觀天壤之間嘉禾與蔓草同受一氣而不能兩立嘉禾茂則蔓草不殖蔓草榮則嘉禾必枯反此理以觀此身物欲之根不去則性命之基不牢性命之基欲牢則物欲之根當絶隂陽消長之理斷斷乎有不可誣者而况女德無極易以溺人剛制于酒克終實難尤陛下所宜兢兢戒謹也陛下固知體恤民情而不至積怨讟之釁存心仁厚而未嘗萌嗜殺之念矣天下咸以是賀陛下臣亦未敢以為慶也數年以來江湖閩浙寇亂交作吾民死於征斂死於徭戍死於兵革否則死於飢荒者何可數計重以楮令日變物價日增民生無聊怨讟並起昨者中原有可乘之會臣下獻規恢之策淮襄困於餽餫百姓踣於道塗偏師輕動棄甲而復然則陛下雖不疲民力以召怨而民力至今日而竭陛下雖無嗜殺人之念而民命至今日而殘孟軻有言殺人以梃與刃有以異乎無以異也以刃與政有以異乎無以異也陛下心甚仁於百姓而百姓怨乃歸於陛下凡無辜而死者雖非陛下殺之猶陛下殺之也無逸之終篇論哲王聞小人之怨詈則皇自敬德大哉敬乎敬心常存必不溺於情欲必不移於玩好必不勞民必不佳兵天下欣然戴之為君而又何怨之有不然兢業一或少懈邪僻乘間而入侈心虐政捷出無端其極也民咨胥怨怨之不已至于詈詈之不已至于詛詛騰於萬口怨萃於一人故周公痛切而言曰怨有同是叢于厥身此怨不歸於他人而身實當之然則人怨乃移為已怨禍人乃所以自禍也勢一至此雖欲長享天祿以綿無疆之休其可得乎且夫逸欲之極至於輕殺而原其根本則始於一念蓋一念喜功伏藏于中始若甚微炎炎不已易以滋熾及兵端一啓小不如意則遽斂而藏之夫斂之固是也然卧薪嘗膽果為何事敵國外患所以進德又豈容信甘言而弛武備乎臣恐前日之輕舉與今日之宴安其為逸一也抑臣又聞勤者逸之對也人皆知勤之為無逸而不知徒勤亦逸也秦皇之程書隋文之傳餐乃叢脞非無逸也正使日御經帷親近儒生若可以言勤矣然耳聽經訓而身不行焉則雖勤亦逸耳是故專心致志自強不息是謂無逸聽之必行行之必力是謂無逸出而與講讀相親是心也入而與妃嬪相處亦是心也治朝聽政之時是心也燕朝便坐之時亦是心也無作輟無暴寒是謂無逸斯道也在大易謂之生生在魯論謂之仁夀斯須放逸則生理息一念間斷則仁夀虧甚可畏也甚可懼也周公所以保護成王至于夀考者正以元老大臣其責切巳故耳陛下可不深念於此哉臣曩者將指江東因辛卯鬱攸之後嘗瀝忱悃力言逸欲之害時朝廷以言為諱抱此孤忠無階得達今公道開眀樂受忠言臣敢復以此説一悟聖聰惟陛下財幸甫又上直前劄子曰臣猥以庸虛疊膺誤渥擢司記注直前奏事職也今事之當言者奚止一端陛下樂受盡言不以犯顔為罪臣其敢茍為緘默以上負明天子知遇哉臣近者密侍經帷因論聖人之剛德嘗啓奏陛下剛之一字最切於陛下之身羣臣言剛德者多矣而實未識所謂真剛也孔子曰吾未見剛者或以申棖為對子曰棖也欲焉得剛夫剛與欲似非對也而孔子必對言之者蓋有欲則我為物役無欲則我能役物我能役物非真剛乎有欲則私意橫生無欲則與天為徒與天為徒非真剛乎大易所謂剛健中正純粹精者此也中庸所謂發強剛毅足以有執者此也有毫髮之私喜私怒則鼠隙由此開有纎微之旁蹊曲徑則蟻穴由此啓是故懲忿窒欲謂之真剛克巳復禮謂之真剛漢高祖唐太宗非無英明雄武之略然君子不敢以真剛許之者正以其不知帝王宅心密察之功而害吾之剛德者多也元帝牽制文義優遊不斷而漢業以衰文宗虛懷聽納不能堅決而唐室不振嗚呼惟辟作福作威何所拘牽而無斷人主天下利勢何事遲回而不決誠以為不斷耶可恭顯之奏而殺望之斥堪猛更生者又何其斷歟不斷於去佞而反斷於去賢此漢之所以衰也誠以為不決耶擯李德裕之黨黜李石於逺外者又何其決歟不決於逐小人而反決於逐君子此唐之所以不振也夫元帝文宗天資仁厚之主也親近儒生之主也剛德不足卒至大弊而當時之臣又無以真剛之説啓沃上心者二君自視吾之資稟決不足以望髙帝太宗則寧守吾之仁厚喜儒不至於失故步耳特不知人主宰制四海運動六合豈區區仁厚喜儒所可辦哉是必有真剛之德而後可也仰惟陛下聰明天錫問學日新真剛之德固已得之聖心矣夫藴於中必發於外陛下果有真剛之德則政事施設之間必有不可掩者何為乎暗焉而未彰也陛下豈以發號出令率意輕變以是為剛乎此似剛而非真剛也且今日至大至急之務有二曰楮弊也邊事也陛下雖弊弊焉日夜以為憂而算計見效迄無秋毫之功者臣以為皆由陛下剛德之未充耳誠使剛德見於節浮費則凡宫闈之用度近臣之錫賚冗官冗吏之蠶食自今以始痛加裁抑推此以行於州縣則所省之費皆可以助收楮之用矣今乃以節用為老生之常談悠悠嵗月茍且因循終不忍大有所損以示吾刻苦警勵之意真剛固如是乎剛德見於懲贓吏則取二三十年以來蠧國害民之人富藏於私者盡歸之於公毁家紓國自古有之明白洞達務在必行則皆可以佐收楮之用矣今乃僅因人言略加發摘罪大罰輕輿論未快陛下方且回旋曲折依違掩覆已發之贓既如是而未發者厚積深鐍偃然安享陛下悉置之不問是前日縱其為國之賊而今日又教之不體國也真剛固如是乎剛德見於核軍政則邊境之事所合大加搜校某處新疆失守某處戍兵損折某處招人填補兵糧元計若干減省若干新招贍給若干盡吐事實毫髮無隱而不然者顯置之罰今乃諱敗遂非不以實聞生劵利贏缺額不補陛下眀知其欺罔未嘗一加黜責真剛固如是乎剛德見於擇帥權則堂堂中國豈無至公血誠沈幾多智之士足以當閫外之寄今焉淮襄制垣不聞虗心無我收羅俊彥以資幕畫又不聞深謀逺計保境安民以圖後效精神困於挫衄之餘智勇竭於耗散之後至於分閫沿江者兩淮事勢不相統屬下多矛盾之見上無調一之策平居尚有違異緩急何以得力自古用人必先儲代今未用者謂其局生而非老手巳試者雖云局熟而又罔功邊遽日聞敵情叵測卧薪嘗膽合智並力猶懼不足陛下乃宴安暇裕如平時真剛固如是乎陛下自更大化動以漢宣總核名實為比臣竊觀陛下徒有慕漢宣厲精為治之名而乃墮於元帝文宗柔弱不振之失是以擇善固執未有堅定之力聽言納諫未有果決之操剛德不競意愛少偏潛窺於杳冥之中旁睨於幾微之際希求御札浸開竊弄之門慿恃寵恩將有履霜之漸陛下勿謂吾之聰明自足洞照而不必過慮也罅隙一開皆害剛之斧損德之蠧也臣恐日積月纍浸淫不已勸陛下以所當為者則蓄縮而有待贊陛下以非所當為者則果斷而必行何則主宰不定意向易移其弊必至此耳古語曰不見其形願察其景今陛下剛德之未充是必有隂受其病者而陛下特未之覺耳因景知形防微杜漸勿使之彰著則善矣真剛在心不在力養剛以漸不以暴撫劒疾視匹夫之勇一鼓作氣再則易衰夫惟奮以大勇而又有積習涵養之功則剛德塞天地矣陛下有堯舜之資而甘與漢元帝唐文宗伍此臣所以憤悶不快而欲一吐其愚也狂僣妄言罪當萬死惟陛下財赦甫為中書舍人又上內引劄子曰臣猥以踈庸誤蒙收召寵光狎至感深涕零自惟蒲栁弱質早衰多病洊布忱悃竟閟俞音然而葵藿傾陽寸心炯炯儻終於辭避非陛下負臣而臣實負陛下矣是以勉策疲駑祇服明命幸借玉階方寸地輒攄管見少裨萬分願賜垂聽臣仰惟陛下聰明天縱勇智天錫心源昭徹時幾洞見亦嘗深思而默省乎夫莫尊乎天矣其喜説其威怒陛下所以知之者非心歟莫幽乎鬼神矣其肸蠁其怨恫陛下所以知之者非心歟莫嚴乎祖廟矣其安樂其憂悲陛下所以知之者非心歟方此心之未與物交也湛然清明寂然靜止及其既交於是喜怒哀樂生焉然而時值乎艱危事遭乎變故喜樂未見而哀怒先形繼天為子而天心未契也主祭百神而神心未格也受列聖之付託而列聖之心未慰也則為之戚焉赧焉栗栗焉而加以羽檄交馳邊塵暗矣士馬物故喪師聞矣孤人之子寡人之婦哭聲震野矣仰籲蒼穹邈焉弗聞禱爾于上下神祇渺不可測率前人有指疆土又岌岌乎不可保也而法家拂士方且日以危急痛切之辭交進乎吾前則愈為之震惕震惕未已消沮繼之當是之時此心之清明靜止者亂矣於是乎柔媚之人乘其幾而入之曰是適然爾且將安堵也否則曰天數有定非人力可與也又否則曰責在臣下不必過憂也夫以前日法家拂士之言如彼而今也柔媚之言乃如此於是乎疑慮頓釋憂懷遽紓邊塵若不見喪師若不知哭聲若不聞嗚呼外境固迷也內心之炳炳者其可欺哉惟其不可欺烏知不翻然悔悟躍然奮發耶孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂歟噫是正操舍存亡之機也此念一回宜深懲既往之咎親鯁直而斥柔佞可也未幾而處逆境為甚艱反思順境之可喜而又適會夫敵騎暫退羽書暫稀果以為天助神佑也雖明知秋髙馬肥指期非逺而敵去則舞偷安目前又將曰今者不樂日月其除矣於是震惕轉而為喜幸消沮易而為縱肆何翻覆之甚耶夫始之震惕消沮今之喜幸縱肆不過隨勢急緩而為之變遷皆非本心之正也陛下何不奮乾剛之勇充離照之明自覺悟於心曰嗜欲之娛何能解憂宴安之懷何足為樂徒使我獲戾于天于神于宗廟而不得一日暫安今將清其天君盡更前轍則必屏嗜欲懲宴安而吾身始立於無過之地則必察民瘼決壅蔽而天下無異乎戶庭之間然後命股肱大臣曰國勢蹙矣危機迫矣凡可以拯救生靈迓續天命者汝其開誠布公汲汲圖之又命諫臣曰朕躬有過汝其盡規臣有佞邪汝其極言此何如時而尚可有所諱避乎又命將帥邊臣曰凡兵之失利者汝其察夷傷勞呻吟慰安其父母妻子不幸而殁于陳者告于上而厚矜恤之其忠烈之章章者朝廷亟官其子若孫而旌異之大信昭布決不失言如此則天地宗廟必能察陛下之心豈不隂相默佑轉災為祥乎四方忠臣義士必能信陛下之心豈不感激奮厲捐軀報國乎理亂安危之機特在陛下方寸間耳臣不敢毛舉庶事而獨論心源者蓋以陛下之心清明靜止則必知疾痛癢疴必通關節脈悼邊氓之塗炭憤國步之多艱自能惡旨酒如大禹自能不邇聲色如成湯自能衣大布冠大帛如興衛之文公自能坐卧仰瞻飲食嘗膽如報吳之勾踐轉危為安易亡為存有不難者不然中外之事可為痛哭流涕者豈易枚數哉詩云我瞻四方蹙蹙靡所騁陛下之憂臣之憂也陛下之辱臣之辱也主憂臣辱主辱臣死臣固不惜一死而惜不以一疏悟陛下乎臣學淺識暗所言朴直然區區忠赤粗得吐露陛下儻恕其狂斐而加采擇焉豈惟微臣之幸實宗社生靈之幸甫為兵部侍郎又上內引劄子曰臣迂疏朴野投迹山林自知無補於當世陛下洊加趣召臣前後控免屢矣而陛下迄不俞所請者豈以微忠粗有可采耶今兹勉䇿羸軀復覲清光亦願一吐真忱圖報陛下萬分一耳臣聞激烈而言天下事固臣子愛君之忠涕泣而言天下事尤臣子忠愛之切何則居安而思危處存而懼亡慨然為激烈之論以聳動人主之聽是固可以言忠矣乃若危中求安亡中圖存當事勢蹙迫之際而祈哀請命於君父惟有涕泣而道之耳又何止激烈言之而已哉厥今江潮暴涌蕩陵我都邑旱魃遺虐勦絶我民命內則楮幣蝕其心腹外則強韃剝其四肢危亡之禍近在旦夕陛下何為不一省悟乎夫憂慮切而後戒懼深警策至而後悔艾力臣敢涕泣以二語為陛下獻一曰秉一德二曰塞邪徑而究其所以行此二語者則在陛下真知省悟而已何謂秉一德臣聞終始不變之謂一表裏無二之謂一當昕朝臨蒞之時雖儼乎其齊莊及內庭邃密之地或弛然而縱肆則不可以言一德矣陛下靜觀默察內隱諸心吾之德一乎否乎聽治朝而百辟聳瞻御經幄而儒生欵接當此之時求一言之誤一動之愆無有也及退而自便其私敬心一懈純德或虧陛下曷為至於此哉蓋所以潛移陛下之心者多矣何則燕處之際娛恱耳目者聲色爾奔走後先者便嬖爾是皆順我者也皆求媚乎我者也四方有敗彼則掩覆天顔未懌彼則寬譬誘於易入動於可喜湛溺其中迷不自覺視治朝經幄敻然不侔矣陛下博覽古昔洞見成敗戒謹恐懼者國未有不治荒淫逸豫者國未有不亂獨奈何不審所決擇而反至於與亂同事乎陛下豈以禁嚴之地設有過言過行人莫豫知耶潛雖伏矣亦孔之昭鼓鐘于宫聲聞于外是烏可欺哉陛下縱自欺奈蒼蒼在上林林在下者何臣所以涕泣妄言陛下未能消天變孚民聽服逺夷者皆秉德不一之所致也何謂塞邪徑臣聞以義交者為正路以利合者為邪徑正路迂而易壅邪徑捷而易趨為人主者躬帥以正誰敢不正其有稍趨於邪者痛懲而力遏之天下悚然知邪徑之不可由其背邪向正也決矣今陛下不謹幾微邪正雜揉旁蹊曲徑其隙漸開宫掖之祕近習之褻稍有一隙則寡廉鮮耻者羣起而赴之紛紛多門不可悉數大凡公則必正私則必邪當今之時自上及下由中及外習以成風牢不可解一言以蔽之曰私而已請託以私而行賄賂以私而成黨與以私而固恩怨以私而報官爵以私而攫權勢以私而傾私意之萌陛下既有以啓之私意之極陛下又從而養成之臣來自草野側聞邇日邪徑之開難以枚舉其甚不忍聞者且至於纍陛下之聖德矣夫私意勝則利心動利心熾則邪徑多邪多而正少則導諛迎合者日至而忠言讜論落落乎難合矣其極也不止於難合將反為邪所勝而正論愈榛蕪矣其何以為國乎將見寖微寖滅蒼蒼者愈怒林林者愈怨而陛下孤立於上其為憂懼又不止如今日矣臣所以涕泣妄言陛下未能消天變孚民聽服逺夷者又皆邪徑未塞之所致也夫此二説其實一原果能秉一德則邪徑有可窒之漸茍不窒邪徑則反至於纍吾之一德故曰惟在陛下真知省悟而已臣曩侍經帷屢陳懇欵嘗進心本不動之説而陛下欣然嘉納且有學者之褒今復以省悟之説啓陛下陛下試思省悟者誰歟不知省悟者又誰歟豁然明白了無凝滯此正陛下之本心也即此本心坐照是非的然知夫宴安之必為鴆毒美疢之不如藥石凡以甘言蠱我以逸樂投我者彼皆自為富貴地耳一中其計於彼則利於我何益及夫危亡之迫乎其後自詒伊戚誰復分憂陛下省悟及此則知一德果不可以不秉邪徑果不可以不塞也昭昭矣雖然今當拯溺救焚之時他無良策而獨持省悟之説毋乃迂乎曰人之未省悟也猶醉之未醒夢之未覺雖有良策亦安所施一省悟則醒矣覺矣良策乃可得而施矣然則目前之事姑聽其自敗自壞必待省悟而後救之乎曰隨事而救之不過一事而止耳今日衆弊膠轕禍亂方興何可以一事盡借使一害僅去一害又生源源方來夫豈智力之所能勝故莫若大正其本盡悟前非而今而後奮乾剛之勇毅然不屈於物欲開衆正之門確乎不牽於私意勿置其身於安平逸樂之地而常納其身於憂危恐懼之中念祖宗凜凛在天之靈則為之長慮而却顧懼國家岌岌不可保之業則為之痛心而疾首覩萬姓將有淪胥阽亡之憂則為之食不下咽寢不安席罪已有真切之意格天非虛偽之為薄海內外皆知陛下昭然此心對越上帝然後大勢可回大業可固非獨可以處暇也雖急而無以異乎暇之整非獨可以履常也雖變而無以異乎常之安此豈非一日省悟之機乎不然天下之事殆未可知而臣之涕泣恐未有已也披瀝忠肝不敢纍牘惟陛下留神甫又進故事曰漢元帝永光五年太子少傅匡衡上疏曰臣聞治亂安危之機在乎審所用心傳曰審好惡理情性而王道畢矣治性之道必審已之所有餘而強其所不足蓋聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛強者戒於太暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進惟陛下戒所以崇聖德臣觀匡衡所陳其戒雖有六而切於漢元帝之身者二條而已一曰無斷二曰後時蓋元帝之天資仁愛溫良者也湛靜安舒者也仁愛溫良者乏剛明果斷之操湛靜安舒者無奮迅振作之風遂使賢否混淆邪正雜揉漢業之衰端由於此衡不能挈此二戒懇切言之使元帝豁然感悟改過遷善而乃混於六條之中以聽人主自擇衡亦不善於格君矣當是時貢禹之徒不力救優柔之失而徒以甘言遊辭求合主意此固不忠之甚者劉向上疏慷慨激切其言曰執狐疑之心者來讒賊之口持不斷之意者開羣枉之門可謂深中膏肓之病矣然亦有遺憾焉孟軻曰人不足與適也政不足與間也惟大人為能格君心之非君仁莫不仁君義莫不義一正君而國定矣當元帝時管中書典樞機者其人其政大略可覩然奚必屑屑然較勝負於此哉君心之本原未正而欲挽回於末流固宜憂乎其甚難也獨匡衡能從其用心治性而針之然所言駁而未純泛而不力嗚呼漢儒病在不學耳使果有孟軻之學何患不能正君而國定哉匡衡劉向號為名儒卒不能究格心之業使天下謂儒無益於人之國儒果無益於國耶讀史至此為之掩卷三嘆嘉熙二年校書郎徐元杰上奏曰臣嘗讀易於否泰剝復而知天下之理無有終窮剝極則必復否極則必泰一陽兆於復此生生之基也進則可以為三陽之泰矣人主為天地立心觀否剝巳極之象將以新世道復泰之生意在乎反諸一心體復之義而已故有一身之生意則一身泰有國家之生意則國家泰有天下之生意則天下泰反是則剝與否而已兹非交通為泰之難不逺而復之難也人主患不知復爾知復則隨寓隨覺有自新之功不知復則隨覺隨泯有自暴之纍秦穆殽陵之歸受責如流此過而能復者也漢武末年之詔深咎既往此迷而能復者也梁陳隋唐之君覩變異而不悟縱佚遊而不悔終於迷復敗亡而已然則處否剝之世有能自反而復則君德生生日新之美即天地生生日新之功致泰之道其在是乎恭惟皇帝陛下以仁聖之姿撫艱難之運自其緝熙聖學玩易知幾謂宜致天地之泰無難矣然端平新政初心清明不逺而復生意將新此一機也失之名更化而實未嘗更化嘉熙以來容養善念端復無悔生意又新此一機也失之於始玩變而終未能消變激而為慓韃之禍泄而為非時之雷溢而為水旱日星之咎民物以是而消圮上下以是而扞格天地剝否之象至此極矣然天下無終極之理君德不可無自反之忱苞桑之戒不嚴不足以致休否之吉貫魚之寵不察不足以逺剝近之災陛下悔悟之機屢動而屢窒得非自反之未至復德之生意猶有未新者乎壬午之風陛下之法家拂士也夫以恐懼修省方嚴於避殿求言之時而火星失度且有戟氣是天心仁愛之意其有加無已又如此則陛下夙夜畏威以祈天永命者當何時而可已哉天亦念斯世否剝之極開一線之生意者在陛下然則轉一世之剝為一陽之復新一陽之復為三陽之泰其機在聖心而已今也人臣愛君請御正殿至再至三陛下勉而從之此正朝廷清明之機開世道以復泰之日也非徒曰復新御朝之禮而已陛下勿憂世道之泰為難當憂天理之復為難進濳陽之剛則陽明勝而德性用者不可不充也消外隂之柔則隂濁勝而物欲行者不可不窒也以孔門之克已復禮者求之凡便安順適意欲好樂皆已也必剛以克之而後欲盡而禮復矣以視聽言動之勿非禮者求之則凡隱微之差形似之妄皆非也必明以辨之而後非禁而禮復矣由乎中而應乎外制於外所以養其中陛下以臨朝之清明玩不逺而復之義持之以克已之勇自身而家自家而國自國而天下無往而不求為生意之充則世道復泰舉無難矣何以言之惡旨好善此一身之生意也臣竊覩陛下臨朝之詔有曰惟知菲食何暇嗜音臣子聳聞莫不以謂自斯言充之清明在躬志氣如神何往而不為修身之泰然賔筵惟戒媟近侍僕罔匪正人得無有所當檢柅益為聖德之謹者乎防微杜漸此一家之生意也臣嘗側聞陛下臨朝之旦嘗曰戚里豫郡易啓私恩中外歡傳莫不謂自斯心充之糾禁內謹政無多門何往而不為齊家之泰然蠧冗每難盡窒狐社率多虛附得無有所當警飭益為命令之嚴者乎黜陟有序此一國之生意也陛下臨朝而率作凡差除進擬職所當遷亦莫不曲致其謹小大聳聞以謂自此意充之上盡道揆下盡法守何往而不為治國之泰然用賢轉石去佞拔山針切上身詆及宫禁或有恚憤於導人使諫之後是豈容不以正論元氣公道命脈益為之扶植者乎備禦有經天下之生意也陛下臨朝而憂顧以淮右封部盡𨽻督閫將以一其事任中外歡傳以謂自此見充之舉措得宜而人心服城守相接而敵騎擒又將何往而不為天下之泰然淮冦方掠憂重石城西蜀未平難置度外況乎東西猶有治水鄰壑之疑是豈容不以同舟遇風叶力共濟者益為之戒諭者乎夫以陛下復德美意一旦發動其機如此則陽明之生駸駸不已轉斯世否剝而復泰之此陛下所能為而不容不勉而為之者昔董仲舒論災異警懼以為自非大無道之世天盡欲扶持而安全之必繼之曰在勉強而已勉強行道則德日起而大有功此陛下所當深體進夫克已復德之誠求以無愧乎上天仁愛之本心則天下國家之泰未有不自勉強充之是又愚臣之所惓惓也雖然陛下反復為本固所以致泰也臣嘗觀剝復否泰之機其所以然者君子小人實為之陛下燕間玩易之頃亦嘗於君子小人消長之際而深長思乎曰泰曰否上下之志交與不交同與不同而已善處否者有傾否之喜不善處泰者有復隍之憂其機至可畏也處剝之勢君子得輿尚為小人之剝廬而況於剝床以膚魚肉生靈者哉至於處復之時聖人不言君子而言朋來無咎正以世道一線之生意在此故潛來君子之朋僅曰無咎而已蓋有意君子之道長也然則人主因天理之復開世道之泰又非九二大臣叶贊不能也故自天子至于大臣一是皆以克已復禮為本今陛下克已無我尊禮大臣蓋亦閔世否剝求以為復泰之圗大臣包荒慮逺固無一日不為天下計抑馮河有勇朋亡得中相與叶贊陛下基泰之道者尤不容不重用其心也昔諸葛亮曰宫府當為一體􅕾罰不宜異同親賢臣逺小人此先漢所以興隆也繼今陛下惟日與二三大臣致謹其所以興隆之本自一差擢之謹等而上之凡一命令凡一黜陟無往而不以公天下為心於陽明必極其充於隂欲必嚴其窒則天地生生之意當亦無往而不普而況右揆久虛論相者陛下之職也曩者更化之初輕用此職開邊之禍猶未歇也今不可以復輕矣世道存亡之決在此一舉臣願陛下宵衣旰食默祈於上天之公非耆艾骨鯁足以負荷斯世者不以輕畀而又博參中外之情以決之一皆出於天命有德而無私如是則天佑賢佐叶濟中興開之以朋來無咎進之於茅茹彚征基世道以復泰之運或者猶可及也常人之見見於已形識者之見見於未形自其見於已形言之上而天變之未弭下而邊患之未平凡世道否剝之可為痛哭又有如賈誼所謂難遍以疏舉者臣積忱竭慮思以轉移機括感悟聖心惟自其未形者而圖之故願陛下靜觀否泰剝復之幾益謹諸聖心而求所以為輔相裁成之道庶乎可以感悅人心迓續天命上以重一祖十二宗之付託下以繫四海億兆生靈之愛戴則天地復泰之象不在天地而在陛下方寸中矣臣狂瞽末學初對清光猥褻縷陳冒犯天聽罪當萬死惟陛下裁赦之元杰又奏曰臣惓惓孤忠既以天理之復為世道之泰投忱君父矣臣又私切有感焉夫邊患莫慘於今日故天變莫稠於今日陛下克謹天戒有感必通宜矣邇者太白經天流星隕晝質之占象皆非細故此必猶有應天以實而未盡舉行者也昔伊尹耻其君不及堯舜孟子非堯舜之道不敢陳於王前臣戴陛下天地罔極之恩方待對也蚤夜齋栗如對上帝曷敢隱情惜已退有後言故兹瀝忱略述帝道冀以感悟萬分之一惟陛下力行好事無往不盡而後可以回天心之悔禍昔舜伐苗之師以禹誓衆無不一乃心力三旬之逆猶不免焉蓋書者記事之史也當時所載如此則苗之為害可知益之贊禹乃曰惟德動天無逺弗屆繼之以謙益滿損時乃天道之言至又推本於帝初歷山之號泣旻天瞽亦允若益豈為是緩而不切之言哉其意若曰格有苗易格旻天難格旻天易格傲象難象至不仁親愛無已是於其所難格者格之矣當時誕敷文德之實皆自其天理中發之此所以至諴感神天為之動苗亦以格也陛下聰明濬哲稽古如舜舉天下仰之如父母今也覩天變之狎至悵邊好之未通固欲以反求其躬行內修其政事此蓋有所不容緩者然臣謂舉繁縟不足以格天變之弭惟盡人事則不期而自弭殫計力不足以結邊好之和惟回天意則有感而自和故言善則星舍有潛回之機家和則狄輩亦豈得而至為今之計莫若充姚虞親愛之心密加於已復爵之邸崇周家內睦之仁深寓乎無不盡之情酌典禮於遷瘞憫嫠之時施德澤於昭天漏泉之域使存者有所慰薦往者有所憑依是亦盡人事之一端或者回天意之有所待也曩時儒生忠愛似失之激不惟不足以迎陛下無窮之意反有以惑陛下親愛既往之心然而陛下髙明配天何所不察博厚配地何所不容以御朝清明之初此正復見天地之心之日也新陽生意幽壤如春冥昧昭蘇氤氲蟠塞天開泰道助者順矣一順舉百順備何憂乎天變何畏於韃酋陛下其深繹之臣螻蟻微蹤生平無他妄念惟知盡臣子之職為難今叨恩非據得對天日少殫畎畝之忠而後屏處窮閻臣之志願塞矣惟陛下矜察景定四年禮部侍郎牟子才上奏曰臣違逺闕庭凡閲九載中蒙全度獲保山林不自意聖明照知終賜收召遂得復望穆清之光自惟蒙恩至深所當竭忠以報而臣衰病廢學莫效萬分此臣之所愧懼也臣嘗觀先儒朱熹之於孝宗蓋自癸未入對首以本然之天理為言辛丑再入又申言之至於戊申之對越八年矣而尤拳拳焉望以天理之純而人欲之盡夫以孝宗聖明二十七年之間熹之效忠者終始不越乎天理之説然後知臣子之愛君惟於閲歷之人而驗其本然之天理而已恭惟陛下聖性髙明聖學緝熙其所用力於天理者久矣臣曩侍經幄親承睿訓固知陛下可以為堯舜可以為湯武而一時諸臣之誤陛下者乃日夜與陛下之理為仇聖心本寅畏也而彼則有逸豫之説聖德本忠厚也而彼則有刻薄之説聖度本優容也而彼則有譁競之説臣固知陛下本心必不出此而皆諸臣之誤陛下也及一覺悟以之戡難更化定大本不勞餘力皆陛下本心之天理實為之臣益有以驗陛下四十餘年講明之素持循之力懲艾感發之真而諸臣之説終不足以誤陛下也臣忱不佞以為陛下之天理蓋至是而始定矣天理人欲介乎毫芒體認難真操持易失而所謂人欲者非必聲色貨利也茍微有所係吝微有所壅滯皆足以為本心之纍而三者之説每得以乘之此臣熹之所以告孝宗者猶恐其天理之未純人欲之未盡而公私是非邪正咸得以交戰于中也臣切觀陛下自再造以來經理創殘鎮定危疑內而振贍畿輔之水潦外而應酬疆埸之事會君臣相與焦勞圖惟者久之而後定其勤蓋如此切度聖心固不忍以目前之庶定遽忘前時之克艱而臣愚過計則以為宿憂既弛順境易移不知天將去其疾而俾遂無後憂邪抑順適吾意而或為宴安之鴆毒也故臣願陛下有以全敬畏之本心陛下即位以來恪守家法以禮待士大夫以仁愛百姓不幸小人誤國始用一切以戕其脈夫以法毒天下未有不反中其身者也今既盡反其所為矣譬如人之一身寒邪既去元氣尚虛非養之以粱肉調之以參术不可也謂宜悉取祖宗所以待士愛民祈天永命者循而行之而後可以輯四海安靜和平之福而延洪億萬世子孫無疆之休故臣又願陛下有以全忠厚之本心維我祖宗治尚寬厚而公議一脈極力扶持所以振起其頽墮不舉之處而使之無壅底不通之患往者言議之臣指喻時有過當聖度猶見涵容中更積威之餘風采消沮雖或求言之意形於詔旨而人懲曩禍孰肯盡言言及乘輿尚見優假事關廊廟忿怒斯形臣恐日往月來遂成風俗非所以養敢言之氣而為國家之福臣益願陛下有以全優容之本心凡是三者皆陛下本然之天理所以旋乾轉坤傾否致泰蓋陛下之所嘗實用其力而終賴其力者也故臣納約自牖輒援是以忠益之義而不暇泛及於事物之末惟陛下毋以臣言為迂而幸聽之不勝幸甚理宗嘗視朝謂將作監王應麟曰為學要灼見古人之心應麟對曰嚴恭寅畏不敢怠皇克勤克儉無自縱逸強以馭下制事以斷此古人之心然操舍易忽於眇綿兢業每忘於遊衍帝嘉納之理宗時祕書郎許應龍上奏曰臣聞國於天地必有與立一曰君德二曰人心夫天下至大也王業至重也所賴以憑藉而扶持者固亦多術矣而臣獨以君德人心為先者蓋君德厚薄乃安危之兆人心向背實理亂之基君德茍正則朝廷清明治功振起於寬厚宏博之中而隱然有不可犯之勢人心茍固則尊君親上如手足之捍頭目雖當危疑緩急之秋亦無解散動搖之患故古先聖人不慮國勢之不強惟慮已德之不修不慮外侮之難禦惟慮人心之未附蓋敵國外患何世無之雖虞朝之盛猶有弗率之苗民周治之隆猶有不服之崇國然舜文之心曷嘗以是為患哉文德之敷民心之洽既足以致風動之休則蠢兹有苗何慮其不格徽猷之德懷保之恩足以格子來之衆則崇墉言言亦因壘而自降矣漢唐之君雖非帝王比然七制能以公恕統天下而四百年之間舉無二志唐以仁厚結人心雖屢更變故皆不旋踵而定是知君德人心乃國家之元氣而長治久安未有不本諸此請復以國朝之事明之共惟藝祖立極聖聖相承講學行仁求賢納諫下情通而無壅蔽之患公論伸而絶好惡之偏其正君德有如此者戒藩侯以撫養厭將臣之殺降緩故縱之誅重誤入之辟蠲河北之鹽寬陜西之稅其結民心有如此者是以朝廷尊安基業鞏固雖澶淵西夏之警智髙鬼章之黠皆隨起隨仆卒晏然而無患是果何以得此哉以兵而言則無大兵威以操制生人之命以刑而言則無深責重罰以禁遏姦宄之心疑若委靡而不振矣而二百餘年之間主威國勢隱如雷霆固若磐石亦惟君德明於上人心固於下足以消姦邪之萌而杜禍亂之原也陛下纂承丕緒尊奉慈極親近儒生開廣言路聽斷訪問未嘗少懈出入起居罔有不欽皆所以正君德也大風之變首議蠲免洪水之災倍加賑恤旌廉抑貪欲宣德意赦過宥罪務行寬大皆所以結人心也是宜天地和應雨暘時若年穀順成民生豐裕將以建大政而興太平而疆埸之防猶關宸慮然大明當天魑魅自伏今聖德昭明賢才萃聚豈無運籌帷幄以決千里之勝者乎人心愛戴中外和協豈無賢於長城者為吾之捍禦乎昔裴度言於憲宗之朝謂淮西蕩定河北底寧豈朝廷之力能制其命直以區處得宜能服其心耳今日之事苟區處得宜隨機而應變強本而弱支則進退伸縮無不如意尚何外患之足慮哉雖然君德人心固所以為固國之本而君德之修又所以為固人心之本然人心不難固而君德為易虧苟德修於上有加而無已則民戴於下無時而或釋臣願陛下法乾之健體恆之久不以躬行為已至而或怠於力行不以日新為已盛而益期於又新則澤流而益深仁增而益高民之戴德永永無窮將使外薄四海無思不服國勢尊安猶太山而四維之矣臣不勝拳拳應龍又進故事曰仁宗朝丁度等答邇英聖門一卷其序曰自古求治之主靡不欲興理道安邦國納忠正退姦邪廣聰明致功業然行此數事在明與剛斷爾明則不惑剛則有執斷則能行總是三者守而勿失非聖人孰能為之司馬光言人君大德有三曰仁曰明曰武武者非強亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也臣聞﨣﨣雄斷光武所以再造剛明果斷憲宗所以中興蓋天下無不可為之事特患夫人主無獨斷之明所見苟明是則行之非則違之而不為羣議所惑用賢則勿二去邪則勿疑有功則必賞有罪則必罰振厲奮發凛然有不可犯之勢則令行而禁止利興而害除顧何事之不可為哉奈何時君世主明不足以有臨剛不足以有執非不用人而人之賢否莫能别非不立事而事之是非不能辨故讒説者得以容其欺巧言者得以逞其辨悠悠嵗月竟無成緒天下之治將日趨於委靡而不復振矣吁此丁度所以有自古致治之主在明與斷之論而司馬光亦曰斷之不疑則姦不能惑佞不能移者正謂此爾今日總攬權綱作新政治切於用賢則旁搜而博采急於求言則廣覽而兼聽然守邊備塞豈無一定之畫而和戰之議角立建功立業當有敢為之勇而遲疑之意未決是以望治雖勤而成效愈邈夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門故劉向獻言於漢而欲其決斷狐疑分别猶豫使是非炳然而後可以興太平之基者真至當之論也夫所謂斷者非強明自任之謂也參之以衆論之公酌之以當然之理是非未明則反覆詰問必求其實若果合宜則守之以堅行之以果不以異議而搖不以小未如意而沮則事無不舉功無不成而中興可冀矣洪舜俞進故事曰其席前左端之銘曰安樂必敬前右端之銘曰無行可悔後左端之銘曰一反一側亦不可以忘後右端之銘曰所監不逺視邇所代機之銘曰皇皇惟敬口生㖃口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也楹之銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長杖之銘曰惡乎危於忿惡乎失道於嗜欲惡乎相忘於富貴帶之銘曰火滅修容慎戒必恭恭則夀屨履之銘曰慎之勞勞則富觴豆之銘曰食自杖食自杖戒之憍憍則逃戶之銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我杖之乎擾阻以泥之若風將至必先搖搖雖有聖人不能為謀也牖之銘曰隨天時地之財敬祀皇天敬以先時劔之銘曰帶之以為服動必行德行德則興背德則崩弓之銘曰屈伸之義廢興之行無忘自過矛之銘曰造矛造矛少間弗忍終身之羞豫一人所聞以戒後世子孫衣之銘曰桑蠶苦女工難得新捐故後必寒鏡之銘曰以鏡自照見形容以人自照見吉凶觴之銘曰樂極則悲沈湎致非社稷為危機之銘曰安無忘危存無忘亡孰惟二者必後無凶杖之銘曰輔人無苟扶人無咎此武王聞丹書於師尚父為銘以自警也維昔帝王之治天下莫不以敬為主敬則百慮澄不敬則百慮擾敬則萬善集不敬則萬善墮是敬非自外而入也上帝臨女毋二爾心知所畏然後知所敬也人主身都綦貴心受衆攻非隨物致戒以警敕之則畏心忘而敬心泯天理之存者幾何武王惕懼而銘諸物不曰視邇所代則曰溺不可救不曰其禍將大則曰社稷為危何其辭之嚴也天真難保人欲易流出入起居之際龜鑑在目庶幾常若危亡禍亂之壓其前而起臨深履薄之懼無一念之非敬也然以武王之聖豈待睹銘而知懼哉堯舜性之也湯武身之也身之則寧過於撿防求進乎性之之域也其或收斂於十手十目之地而縱肆於暗室屋漏之中修飾於親儒生學士之時而玩狎於對宦官女子之頃雖有此銘如無此銘矣故中庸大學皆貴乎君子謹其獨度宗即位起居郎兼侍講湯漢入奏言願陛下持一敬心以正百度則追養繼孝所以報先帝者必益致其隆先意承志所以事太母者必益致其謹其愛身也必不以物欲撓其和平其正家也必不以私昵墮其法度政事必出於朝廷而預防於多門人才必由於明揚而深杜於邪徑度宗時牟濴進故事曰臣聞孔子曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎臣竊以君道之大無所不難苟得其要而持之則所難者少矣臣請略舉其要陛下試垂聽幸甚言無所隱之謂忠心無所欺之謂信忠於主者不避嫌信其已者不思謗所以忠信或至於獲罪故人君以察忠信而主之為難巧於言之謂佞順於事之謂柔巧言則易得順事則易從所以佞柔常至於日親故人君以辨佞柔而逺之為難廣大業者存乎勤而人情常易於生倦以墮其業故人君以久而不倦為難成大謀者存乎斷而人情常牽於小不忍以亂其謀故人君以棄小不忍為難臣以謂為國之要能察忠信而主之使得盡言辨佞柔而逺之使不害政行之以勤而無廢弛之憂濟之以斷而無優遊之患則治道成矣臣日侍經筵荐蒙聖問以為君難之義臣嘗敷陳其槩退而仰歎聖學高明深惟克艱厥后之旨而不以易心臨天下堯舜之用心也臣每思所以推廣聖意者今觀王巖叟所論為君難四事言言懇切真有益於君德臣敢托其説為陛下告蓋正人之事君也主於忠忠則不欺不欺則至公至公則言有所拂事有所違人君主之不力則往往始親而終疏之而忠信或至於受禍漢元帝之於蕭望之是也佞人之事君也主於不忠不忠則欺罔欺罔則為私為私則言皆諛恱事皆柔從人君察之不至則往往始逺而終比之而佞柔終至於得志唐德宗之於盧杞是也廣大業者存乎勤不能兢業一心則或至倦惰唐玄宗開元天寶之治是也成大謀者存乎斷不能以義制事則或失之優遊漢元帝不能振孝宣之業是也為君之難雖不止是四者而四者乃其綱領也臣嘗推本而論之惟見善明用心剛則主忠信必立逺佞柔必果無始勤終怠之憂無優遊不斷之慮矣昔太祖皇帝一日坐便殿俯首不語者久之左右請其故帝曰爾謂帝王可容易行事乎朕早來乘快指揮一事史官必書於簡册故不樂也此深得為君難之義臣願陛下以太祖之心為心而取巖叟所陳四事深加之意則治天下可運諸掌奚其難惟陛下幸聽遼興宗問翰林都林牙兼修國史蕭罕嘉努曰我國家創業以來孰為賢主罕嘉努以穆宗對帝怪之曰穆宗嗜酒喜怒不常視人猶草芥卿何謂賢罕嘉努對曰穆宗雖暴虐省徭輕賦人樂其生終穆之世無罪被戮未有過今日秋山傷死者臣故以穆宗為賢帝默然金太祖與高麗議和凡女真入髙麗者皆索之至十餘年索之不已太宗時皇子朂上書諫曰臣聞德莫大於樂天仁莫先於惠下所索户口皆前世姦宄叛亡烏春烏木罕阿海阿克順之緒裔先世綏懷四境尚未賔服自先君與髙麗通聞我將大因謂本自同出稍稍欵附髙麗既不聽許遂生邊釁因致交兵久方連和蓋三十年當時壯者今皆物故子孫安於土俗婚姻膠固徵索不已彼固不敢稽留骨肉乖離誠非衆願人情怨甚可愍者而必欲求為已有特彼我之蔽非一視同仁之大也國家民物繁夥幅貟萬里不知得此果何益耶今索之不還我以強兵徑卒取之無難然兵凶器戰危事不得已而後用髙麗稱蕃職貢不闕國且臣屬民亦非外聖人行義不責小過理之所在不俟終日臣愚以為宜施惠下之仁𢎞樂天之德聽免徵索則彼不謂已有如自我得之矣從之哀宗時禮部尚書兼侍讀楊雲翼嘗患風痺至是稍愈上親問愈之之方對曰但治心耳心和則邪氣不干治國亦然人君先正其心則朝廷百官莫不一於正矣上矍然知其為醫諫也元世祖中統二年春內難平李昶上表賀因進諷諫曰患難所以存警戒禍亂將以開聖明伏願日新其德雖休勿休戰勝不矜功成不有和輯宗親撫綏將士增修庶政選用百官儉以足用寬以養民安不忘危治不忘亂恆以北征宵旰之勤永為南面逸豫之戒世祖稱善久之世祖時趙天麟上䇿曰臣聞放之彌六合卷之退藏於密者心之體也範圍天地而不過曲成萬物而不遺者心之用也此兩者其實體用而已矣體以統用則神道設教而天下咸服用以達體則行其無事而真源自淨含之若虗啓之有餘內外周圓上下如一三皇大之而道徹終古五帝性之而德垂後世三王身之而仁流萬邦五霸假之而功加一時何以言之蓋四端如四時之相用五常符五行之不忒混而為一謂之太極暢而示微謂之無極非無極不足以知神人之圓靈非太極不足以見聖人之大致太極即無極也聖人即神人也性無不善人無不同雖凡愚不能無道心道心惟微故聖人貫天下之道氣稟所拘物欲所移雖神聖不能無人心人心惟危故聖人崇天下之教道者名異而理同既非心而不圓教者下學而上達又非心而不立夫性者心之齊而具理也情者心之發而為事也仁者心之愛也義者心之宜也禮者心之節也智者心之覺也信者心之實也理以存妙事以應務愛以盡公宜以方外節以暢文覺以燭暗實以明誠此七者其實性情而已矣性定而情自檢者心也情定而性自復者亦心也凡在下者心定則非分之望消凡在上者心定則化育之方備欽惟陛下父天母地寰海為家四三皇而六五帝仰三王而俯五霸以非常之資御非常之尊以不世之德膺不世之運一言之出神鬼橫集一意之行風雷翕變夫動者靜之末也靜者動之本也審乎本末則心自定矣原乎動靜則心自正矣精乎道教則心自誠矣昭乎體用則心自明矣定正以契天人之相通誠明以洞天人之無一又豈在察察以用神孜孜以致感哉五常包絡於此四時調和於彼運天下於掌上炳天下於胸中無為而為不宰而宰斯皆陛下固有之當然已行之常事伏望慎終如始疇不賴焉天麟又上䇿曰臣聞運元氣之神以安五行而盡自然之健者天也協五行之位以定元形而備無疆之順者地也據五行中五方法健以為動效順以為靜者帝王也帝王之德參天兩地貴于公而不私焉公者義也私者利也量義以動則憂以天下樂以天下而王道備矣放利而行則既失民望又失民心而王政怠矣是以聖人其臨民也凛乎若朽索之馭六馬其撫民也柔乎若慈母之視嬰兒所欲與之聚之所惡勿施爾也且下民皆國家之民也而民財皆國家之財也又何須泛取於下而輕用於上哉竊見郡縣之中賦斂之時鄉司里正定其貧富専加擅減營利于中富家之利優遊有餘貧家力不能及遂舉債于他家其或失期稽限罪莫可逃齊之以號令威之以刑罰愁怨之氣寃苦之聲充塞天淵伊誰救者又或不辦則官吏亦從而得罪矣及其會計上司納于府庫凶年不發其積貧民不蒙其賜樂工之流呈戲技而圖之荷寵之人迎喜氣以期之豈不傷於用財之至公哉且怒者聖人之所不免也一怒之中事存萬理故中庸以中節為和顔子以不遷為德竊見數年以來北征鬩墻之叛東伐浮海之國近又大舉南征鞭策未嘗停戎韁未嘗解諺曰天子怒起伏尸萬里信乎其如是能不戒之哉臣竊以四逺未知禮樂之當然遷徙無常翺翔邊徼勝之不足喜得之不足治今乃煩天威而怒之而討之豈不傷於用力之至公哉伏望陛下下思地利之艱難上審天心之仁厚知民之欲富也則寡用其財而衆生之知民之欲逸也則常愛其力而務存之知喜之太過而損其陽則節之知怒之太過而蕩其隂則息之知王者之貴於無私則敷大公以御之知信之可示於天下則推赤心以治之財積而下富上足心固而下定上安喜怒有宜而內外無可悔之機公信既宣而上下無相疑之意如膠漆之固如塤篪之和君聿致於無為民不知其帝力然而兆人之不富四逺之不服未之有也天麟又上䇿曰臣聞動植具於有物之先乾坤判於無名之始流通二氣班布五行惟人也括萬象以獨靈執一中而不倚芒乎若醇醪之酩酊寂乎猶混沌之鴻濛及其清濁遂分視聽胥引智愚懸隔強弱難齊總總而生林林而羣太朴降焉良心放矣中人以下騁利欲之紛拏下愚之流梏癡迷而忘返以至剝牀交戰暴戾相淩或顧影以無依或籲天而無告爰生大聖𢎞濟風波肇啓三皇繼聞十紀維持造化把握隂陽三才定而天地位尊卑立而萬物育由此觀之蓋天為民而立君也君道貴仁天道輔德年丁五百命我皇家祖帝軒蔓衍之遺芳掃金宋區分之偏境東浮洋水西越崑崙南蕃于交廣之南北限於玄虛之北虞夏之玉帛萬國越可相同漢唐之宇宙一家猶難並議功已成矣德已興矣道已行矣政已平矣陛下能無思乎陛下能無戒乎思夫業之所立者祖也方其雲興虎噬神鬼助功電激雷奔龍蛇起陸欲啓處而不遑啓處欲自暇而不獲自暇櫛風沐雨勞身於戈甲之秋冒棘披荆抗志於煙塵之際以至于有天下兹惟艱哉今天下已定守之非易能不思艱難乎戒夫業之所本者民也民之所恃者政也民可近不可下非民無以立統非衆罔與守邦慮其啼飢也薄取其斛粟念其號寒也減徵其織帛冀其知禮也申之以孝弟欲其知禁也示之以好惡勞之來之匡之直之輔之翼之又從而振德之且政雖一理日有萬機一事尚未形見而即防之一言雖無大害而即慮之堤潰於蟻孔氣泄於針芒骨銷於積毁軸折於叢薄可不戒哉而又據古今成敗以為龜鑑參天人感應以察休咎冕旒前蔽不矜其明而視於至公黈纊旁塞不眩其聰而聽於大同委賢以任之量能而用之敬以居之簡以行之勤而不煩逸而不過清而不激默而不窒披衮服端拱以向陽執鎮圭宴坐而當寧寶位以之而克安龜祚以之而克固傳諸子孫耀於罔極使史筆欣然而贊之曰大元天子之德皇兮將兮莫之與京尚矣媺矣莫之或擬不亦光哉不亦快哉愚臣亂言罪當萬死伏望陛下檢身若不及為善惟不足稽伯禹之不自滿假體成湯之聖敬日躋過聽愚臣之言曲免狂妄之罪竊謂聖心同海涓流不棄而浸浸增深故能大寶齊天億萬無疆而綿綿永鎮矣歷代名臣奏議卷五
