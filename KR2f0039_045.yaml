body:
  text: 歷代名臣奏議卷四十五明楊士竒等撰治道宋欽宗即位初李綱上疏曰右臣伏覩皇帝陛下誕膺天命撫臨萬邦天地神祇永有依歸華夏蠻貊永有承事神人交慶海宇騰歡道君皇帝體道法古因天順人不二不疑傳付大器授受之際燦然明白雖堯之禪舜何以加此下視漢唐無足比數此誠宗社之休而生靈之福也然臣竊謂陛下主鬯春宫兹踰十年孝友之美實形四方英偉之姿久動群聽道君皇帝眷佑一德方兹艱難付以宗社生靈之寄天之所歸豈曰人力然而方今勍敵慿陵邊隅孔亟姦邪充斥君子道消法度紀綱蕩然無統陛下履位適當斯時得不上應天心下順人欲外攘勍敵使邊隅之患寧內誅姦邪使君子之道長以副道君皇帝所以付託陛下之意哉邇者道君皇帝下罪己詔罷不急之務蠲煩苛之令除掊克之法招徠忠讜之言討論捍禦之策唱於前陛下不可不和於後造於始陛下不可不續於終正猶堯之禪舜論共鯀兜苗之罪皆在堯時而四罪之誅使天下咸服必居舜日然後元凱可進法度可修四目可明四聰可達庶政惟和萬邦咸寧以成垂拱無為之治仰惟道君皇帝既已為宗社生靈之故親御翰墨悔前日之非播告四方不匿厥旨矣則夫左右恩寵之臣造作邊事養成禍胎屢覆王師貽患宗社有如童貫者招權怙勢首為兵謀以佞幸之資據師保之任有如王黼蔡攸者以穿窬之質挾姦雄之謀作竒技淫巧以蕩上心運花石竹木以斂民怨有如朱勔者豪奪民田掊斂財賄剝下奉上依勢作威有如李彥者恃寵眷之私擅威福之柄招兵自衛失禁旅之心有如髙俅者罪實比於四凶誅宜行於兩觀陛下以其久在道君皇帝左右之故未欲誅殛亦宜流竄逺方以正典刑而自即位以來今已纍日寂然未聞決斷之詔群心憂疑其何以仰副道君皇帝畀付之意上應天心下順民欲而使邊鄙懷我德威逡巡而不敢進哉臣愚伏望陛下運以乾綱照以離明為宗社生靈大計斷而行之天意昭答人心恱服則邊鄙不難禦矣昔孔子為魯司寇七日而誅少正卯今陛下即位纍日而未行虞舜之政臣竊惑之至於宰相臺諫之臣亦宜罷黜慎擇其人以協惟新之政何則天下之事惟宰相可行而臺諫可言坐於廟堂之上與天子相可否者宰相也立乎殿陛之間與天子爭是非者臺諫也宰相得行其道臺諫得行其言一失其職則為宰相者何以揆百官而撫四夷為臺諫者何以紏官邪而諫王惡冒寵尸祿無補國家噤默不言致危宗社其罪豈淺鮮哉臣竊觀道君皇帝深悼前失欲收天下之心而降哀痛之詔罪己之言所不忍聞仰讀之人為之掩泣此誠禹湯之用心也抑畏之極至於感疾遜位退居舊宫人主如此而宰相臺諫之臣偃然如故恬不為怪此何理也譬猶庸醫之療病已致人於危困猶且顧視財賄自為身謀不忍捨去而慮他人之軋已也求病之瘳豈可得哉為今之計正宜深訪博採求人於間廢踈賤之間所謂擢卒為將拔士為相者正今日急務也惟陛下留神幸察臣愚戇無取惟好讀書深考古人論議天人之際竊有所見往年任起居郎日因都城暴水變異至大嘗具狀奏乞因侍立直前奏事區區之誠以謂隂氣太盛恐有盜賊夷狄兵革之事有其兆而未見難於顯言故欲面奏尋蒙謫降惓惓之忠無以自達去國七年而盜賊夷狄之患相仍如此乃知天人之際若合符節不可誣也請以比年以來天人之際及今日之事為陛下詳言之崇寧之間蚩尤之旗見其長半天宣和之初赤氣夜起自西北至於東南此皆兵象禍大而應遲今年冬日之至熒惑入南斗端誠殿稱賀梟鳴於廷此皆不祥之兆惟正心修德大有變革乃能消弭禍故導迎福祥昔宋景有善言三而熒惑為之退三舍此必至之理不可忽也陛下傳位之初前兩日昏翳四塞日光不明隂慘之氣無風而栗至暮日入赤光散溢此君道衰弱議論未決之兆也陛下即位之日日暈五色帶黃赤珥兩日相摩正同藝祖受命之應此天人協贊之符也然而御垂拱殿見群臣之後蒙氣四起暴風從西北來越翼日天氣清潤日華騰輝明而未融方中蒙氣復作至暮乃散臣竊以法推之日者君象君以剛明為道君道明則日光盛而群隂伏今如此者殆陛下即位之初退托謙損未總權綱之所致也平時猶可如此今事勢迫急敵國寇邊日有變故乃宗社安危之秋豈可平時比哉上天垂象所以警戒陛下者甚厚願陛下察臣前之所言密詔親信大臣條具過惡之甚者明正典刑過惡之輕者量加貶謫然後下寬大之詔一切不問其餘以安反側則主勢強而天意得人心服矣推此以往雖致極治之太平可也臣素愚直為衆所知方陛下聽政之初昧死上狂言惟陛下赦其罪而取其忠天下不勝幸甚靖康元年三月校書郎陳公輔條畫十二事上奏曰臣近者兩蒙聖恩召對親奉玉音事平之後當急於圗治此實天下幸甚臣不勝踊躍抃蹈之至臣聞之聖人不先時而起不後時而縮凡興事造業扶危救衰要當勇於力行敏則有功烏可以後時哉伏自陛下臨御以來天下延頸舉首伺望新政遲遲未聞民固惑矣況今宗廟垂休神祇降福陛下聖德所感強兵宿將皆願盡力軍聲大振敵氣已奪欲和與和欲戰必克事之可平在旦暮矣然則陛下圗治之計宜早定睿謨以慰天下之望不可緩也臣自念平昔有致君澤民之志有犯顔逆耳之言無路而不得進今幸遭遇陛下慨然願治容受直辭乃臣自效之秋臣不避萬死條畫十二事皆今日治所宜先者預以奏聞伏乞聖慈貸臣狂愚少賜睿鑒謹具列其目一曰審因革臣聞聖主立法不矜於同而矜於治故可則因否則革未嘗拘於一而不知變也國家祖宗之法善矣至治平而稍弊故神宗皇帝革而新之凡以隨時之宜適民之欲耳比來專以不變熙豐之法為紹述之孝不問時之所宜民之所欲者曰以不變為孝則是神宗自不當變祖宗法蓋法無必因亦無必革惟其當而已況今吏員猥多賦役煩重政令數易紀綱隳壞以至養兵取士馭吏牧民皆不如古法至於此而已弊矣尚何紹述為哉臣願考祖宗之法與今日所行善者因之否者革之詳求博取精思熟慮擇其至當者著一代良法不必拘拘以紹述為名而失其實也二曰論大臣臣聞天子所與共天下者七八大臣得人則朝廷正百官治海內和平四夷效順茍非其人天下不安豈可不論哉傳曰人主之職論一相相之難其人久矣古之論相必曰才足以有為識足以有明量足以有容三者固難全矣有一於此亦可任焉乃若以道事君以公滅私則難其人矣惟以道事君則自任以天下之重毁譽得喪不以動心聲色富貴不以纍志可則行之不可則止唯以公滅私則孤忠自許不立朋黨所以鈞陶天下進退人才一付以至公未嘗著意於其間也本朝惟李沆韓琦為真相焉近時此風無復存者陛下承變亂之後將大有為必得賢相共圗治功臣望陛下詳擇而審考之則必有名世之才為時而出者至於樞密之地政事之本綱轄之任亦必擇其真賢實能人望所歸者儻無其人自可兼之不必備也三曰辨邪正臣聞正臣進者治之表正臣陷者亂之機自古治亂必主乎邪正自古之人君所以任賢勿二去邪勿疑唐太宗知士及之佞德彛之姦而不用至房杜王魏則任之不疑所以成貞觀之治明皇之初委任姚宋以致太平至於末年罷張九齡相李林甫則治亂自此分甚哉邪正不可不辨也然邪人乘間窺伺揣合主意阿權事貴持祿固寵故人主易以信正人責難於君不務茍且直道而行無所附麗故人主易以疑此唐德宗所以於裴延齡輩則委任不移於陸贄則怫然以讒幸逐也臣願陛下於易信者不可以輕信於易疑者斷之以不疑庶幾可得其實也四曰明賞罰臣聞賞當賢則臣下勸罰當罪則臣下畏賞罰者人主之威柄安可以不當哉國家承平既久萬事姑息故爵賞太濫典刑太輕貴遊子弟雖乳臭小兒聮班侍從應奉官吏雖蒼頭奴𨽻躐取顯仕兩府大學而身不任責直閣待制而服不識字伶倫嬖幸醫卜伎藝身被朱紫家盈金玉豈非爵賞太濫耶漢法大臣有罪皆棄市夷族本朝祖宗恩德之厚未嘗殺戮大臣然竄逐嶺表固有之矣近時大臣懷姦誤國天下疾之乃令間居都城坐享厚祿其他朋邪諂佞之徒姦贓狼籍罪惡昭著方且結交權貴與之營救或貨而不問或朝竄夕召豈非典刑太輕耶夫爵賞濫則人多僥幸典刑輕則下不畏法此所以至於危亂也臣願陛下深鑒此弊愛惜名爵不輕以與人明正典刑不失其罪賞以春夏刑以秋冬如天地之無私則天下之治舉矣五曰廣言路臣觀自古人君茍不至有大惡如桀紂者未嘗不欲納諫然卒至於言路壅塞天下潰亂者皆權臣蔽之元帝之初聽蕭望之劉向所言及恭顯用事則不能容成帝之初數下明詔求言公卿奏議可述及外家擅權則不復聞矣國家祖宗之時大臣皆公心直道故朝廷詔令有未便者臣下得以直言雖天子震怒大臣方極力救之至熙豐以來用事者欲新法必行恐人異已故排斥群議有出一言則謂之沮壞良法必逐之而後已諫官御史以其黨為之觀望成風無復公議方太上皇帝詔求直言言之不中亦不加罪及蔡卞乃盡治言者如陳瓘等皆當世端人擯死不用士論痛惜臣觀今日其弊極矣大臣樂軟熟而憎鯁切臺諫之官與夫縉紳之士相習一律間居議論無敢及國家安危生民休戚況望於人主前爭是非利害耶所以上下欺罔誕謾無所不至而召天下之亂也臣願陛下以前日為鑒擇臺諫官責其言事不稱職者凡政事法度有可議者詔臣下集議各獻其説無令權臣壅蔽聖聰則人人皆願明目張膽效區區之忠下情不患不通矣六曰勵風俗臣聞士大夫者風俗之所繫朝廷用賢士大夫以職業成政事以行義率風俗則民德日歸於厚矣近時士人以剽切記問為讀書不能行其所言以纎艷浮巧為能文不能先以器識以傾險變詐為有材不能持以義節士之所尚如此而在位大臣亦以此為用人之先故奔競成風巧偽相扇禮義亷恥浸以凋喪而天下日流於薄也臣願陛下稍革此弊令廟堂之上選公忠廉退純實篤厚之人用於朝廷其浮躁衒露傾邪險薄者黜之示以好惡則天下之士皆相率為善可以革浮薄之風成忠厚之俗也夫忠質文之政三代所以相救臣觀今日禮法度數失於太繁聲名文物皆非實用習俗淫靡人情澆偽可不救之以質歟七曰收權綱臣聞太阿之柄不可授於人人主之權不可移於下漢自昭帝之時大臣秉權宣帝承之信賞必罰綜核名實所以收威權於上而成中興之功及至元帝牽制文義優柔不斷故漢業衰焉臣觀太上皇帝本以寬厚曠達之性在位日久不防姦邪浸以欺惑故群小狃狎權移於下而威令有至於不行臣願陛下深鑒此弊排斥群邪奮然獨斷使威權皆出於人主則頽綱廢紀可以復振而天下之治無患不成矣八曰抑宦侍臣聞柔曼傾意佞諛盜朝漢唐禍亂皆原於此不可不知也然此曹蠱惑人主皆以其嗜好入之今陛下勤儉之德出於天性聲色狗馬觀遊宴樂皆屏不近彼固無所肆其巧矣然尚有可戒者不宜崇其爵位任以事權蓋崇其爵位則志得意驕任以事權則作威作福唐太宗時內侍不立三品不任以事惟閣門守禦廷內掃除可謂深鑒此弊矣至於進退人才尤不宜與之謀孔子不主癰疽瘠環孟子不畏臧倉聖賢君子寧沒身不見任用豈肯附麗幸臣耶其所以寅緣干進者必朋邪憸薄之小人也懷姦之臣皆倚之以為重卒亂天下可不鑒之哉九曰治財賦臣聞古者制國用皆量入以為出是以祖宗盛時斂取有經用度有節無虛費無妄豫故常賦之外未嘗一取於民間而聚斂興利之臣亦不得容其姦矣比年費耗百出征求無藝聚斂興利之臣專以上供為名侵漁百姓無所不至州縣率掠民不聊生陛下今日雖已盡罷御前供奉所須之物奈何軍興之時財用窘急於取民者尚或未巳臣願事平之後詔有司以一嵗經費立為定額常賦之外如茶鹽法刻民尤深者一切講究取其中制輕徭薄賦與民休息使海內富庶如祖宗時國用亦無患其不饒所謂百姓足君孰與不足也十曰崇儉約臣聞儉為德之共侈為患之大帝王所以訓天下未有不以儉德也比年承平既久海內富庶驕侈不期而至故尊卑上下內外逺近皆以淫靡相勝衣服飲食極其珍異車輿屋宅飾以金翠聲樂玩好觀遊燕樂其費不資而物價騰踊細民窮苦蓋不可不節之也上之所行下之所效陛下在東宫儉德著聞今日臨御專以敦朴為天下先夫楊綰人臣也以清德在位能使人減騶徹御罷去聲樂況以一人而躬行者乎然羔羊在位節儉雖以化文王而有刑威之政存焉臣願陛下明詔四方痛革前日侈靡之弊有不懲者重置以法自京師貴近始則此風可消而天下富足矣十一曰重外官臣聞監司天子外臺守令民之師帥監司得人則一路受賜守令得人則郡縣被澤此不可不擇也近時除擢監司或出貴幸之門或繇宰執親黨不觀才能不問資格至於郡縣尤不擇人侍從之官得罪朝廷乃付以民社貪叨之吏干求權要乃得除郡士人以縣令為俗吏不肯注受吏部以縣令非要官不加銓擇故為監司者人微望輕不能舉善懲惡為守令者曠官慢法不能承流宣化上下蒙蔽肆為姦欺窮困之人無所告訴臣願陛下謹重外任之官凡監司有闕選卿監省郎藩府有闕選侍從官所以均其內外更其勞逸其餘郡守之闕盡歸吏部如祖宗時以分數資望依格授之任久其任無令數更易至於縣令雖有吏部選格更令侍從官舉充其有治狀優異委監司御史考察以聞特加升擢使人知郡縣為重不敢不勉而四方萬里皆蒙朝廷德澤矣十二曰修武備臣聞有文事者必有武備治天下國家未有能廢此也祖宗盛時邊備尢謹比來委任非人故守禦中國禦戎安邊之策一切壞盡是以夷狄一旦長驅而前良可駭嘆臣願陛下深鑒前日之弊以武事為急內自京師外至都邑講求兵備盡如祖宗之時況今金人雖已出境秋冬決須復來河東河北兩路尤當備禦亦宜早為之計糧不可不積兵不可不募將不可不擇城池不可不固車馬不可不修器械不可不備臣料此等廟堂講究熟矣不復具陳姑舉其略而已緣臣所論十二事其次第雖有先後然皆今日之急至於武備議者必曰當在所先而臣獨後之者蓋文武以天保以上治內采薇以下治外至於宣王亦曰內修政事外攘夷狄今日雖夷虜深入禦之為先以臣觀之朝廷若法度修舉大臣得人賞罰無私風俗歸厚以至下情得通權綱不失大略如臣前項所陳則天下國家無有不治矣彼夷虜自當懷德畏威望風逺遁豈足憂哉孔子曰逺人不服則修文德以來之孟子曰王如施仁政可使制挺以撻秦楚堅甲利兵臣所聞如此惟陛下不以為迂闊不勝幸甚侍御史曹輔上言曰臣聞萬幾萃於一日可謂至煩數十年蠱壞之業救於一時可謂至難以至煩至難之任付於吾君而欲責效於期月之間有撥亂興衰之志奮而行之則善矣若支傾補漏循襲故常臣不知其可也今天下危疑之事駭心動目卒然而至者時有之矣堂陛之間相視失色無借箸之略而有失匕之驚甲可乙否紛如聚訟俯仰踟蹰而機會已失不可追救往往轉易而為難垂成而遂壞痛心切骨貽恨無窮者每每有之曩者敵去渡河縱而弗擊是一失也非不斷之過乎至今天下調兵饋糧疲弊生民以貽宵旰之憂殆為是也不斷為患顧不大哉僥幸之門正如市道平旦啓關側肩而入以其貨賄之所聚也紛紛勢利之場又甚於此前日濫恩冒賞稍行禁止而一時橫竊名器之人亦皆斂迹僥幸之門似將少塞今又大啓茍賤不廉之徒彈冠復出富商巨猾挾資獻巧伺候權門小夫下伍躡足俟進是必有以姑息之恩干動聖慈有以造謗生怨之語妄搖聖慮既以姑息為恩以造謗生怨為可慮則自時厥後小人成群決不敢去而刑罰大柄得無委墜而不舉乎是又不斷之過也僥幸既多奔競益起悠悠風塵誰復抑之不斷為患顧不大哉言路初開諫官臺臣摩肩而進其間亦有挺節徇公捐軀報國之士欲效涓埃以助明時陛下溫顔下詔若水投石陛下之於言者可謂真有意矣然奏章十上六七不行縱或行之聊復應耳初信之抑又疑之初許之抑又拒之得無有以私見曲説進陳是非者乎得無欲隔絶言路故為沮折使不得一伸其喙乎陛下亦為之不信言官輒寢其奏是又不斷之過也夫臺諫所採惟公論耳公論所許從而與之其所不許從而擊之茍言官屢發弗售則公論遂廢不行古今未有無公論而能善風俗者治道陵遲誠有以也不斷為患顧不大哉書曰任賢勿二去邪勿疑夫知其賢而任之又以人之言而二焉則賢者退藏於深渺知其邪而去之又以人之言而疑焉則邪者朋比而求援今者姦諛在位能盡去乎內官領職干與兵柄能盡罷乎陛下明知其人矣言者屢上而依違不遣是又不斷之過也卒之為姦佞者朋比欺蒙上下暌隔鬻恩弄權妨功害能預兵柄者縱暴逞威呼吸變故蜂蠆在懷去則必復不斷為患顧不大哉人主之於大臣待之至優責之甚重不優則不足以示君之施不重則不足以效臣之報古者公卿大臣天地有大變賜之牛酒則以不起聞矣職不勝任策書一至則布衣出府矣若有他失則棧車牡馬歸以思過矣其所責顧不重哉今聖主所以禮貌大臣可謂至矣其敢不竭所以報乎前者河東之役种師中戰殁七統制師皆潰正緣糧乏兵飢廟堂因循失於措畫而敢坐視其敗略不引咎近日彗星出東北十夕不滅而論道燮理之臣擊鐘鼎食曽莫懲嗟主憂臣辱此語端為何哉而天度包荒終不忍詰是又不斷之過也臣恐自是利則同享患則相棄有全軀保妻子之念無安國衛社稷之心堂堂再造之基誰與共圖不斷之患顧不大哉古語不云乎日中必熭操刀必割負扆而立垂裳而治必取諸斧良有以也易於乾曰剛健中正於夬曰剛決柔也臣望陛下體乾之健乘夬之剛雷厲而風飛陽開而隂闔君子怙焉小人懼焉中興之業何慮其不成也朝説之上奏曰臣聞王制司徒之職曰一道德以同風俗傳曰剛柔緩急聲音不同繫水土之風氣謂之風好惡取捨動靜無常隨君上之情欲謂之俗是俗可同也風莫之能同也五十年來學士大夫不約而同稱焉曰一道德以同風俗同其所不可同者遂至設重賞以禁民之口逞虐刑以奪士之職人無強弱必責之以隨順便辟士無大小皆待以諸侯之享與不享專利不遺纎介黷兵無有寧嵗小人得志君子失措熾為尚同惡異之政貽天下後世之害實自乎顛倒六經飾六藝以文姦言之故也臣愚望陛下深留神加察校書郎余應求條畫利害疏曰臣昨嘗面奏有治道之得失時政之因革及條畫當今利害文字伏蒙聖慈令臣繳進臣已進入訖然臣區區之意所謂治道得失時政因革者如盡復祖宗法度兼用元豐元祐之政伏覩陛下已降詔旨矣條畫利害如追贈司馬光等內侍依祖宗法罷廉訪使者廢苑囿以賜貧民等事陛下已施行矣至於前日所條畫有未盡者又不敢隱默陛下虛懷聽納篤於求言如此若畏避嫌疑有所懷而不盡臣之罪也謹具條畫如後一近者太上皇帝東遊逺涉江淮冒犯風露非所以保安聖躬欲乞遣使奉迎歸京深居宸嚴陛下日奉四海之養優遊逸樂永保盛福一近年以來凡有中旨皆降御筆施行稍似稽遲置以不恭之罪百司執事奉行不暇雖或違戾法憲不敢執奏又人臣啓擬有法所不可者取御筆行之尤為非便欲乞自今陛下意所欲行者臨朝與大臣議之母降宸翰非唯有司可以審覆違戾庶幾權歸於上杜多門之政絶近習私謁僥幸之原一古者文敝救之以質近來文敝劇矣欲乞純法太祖之道尚質厚從簡易捐侈靡去煩苛以厲風俗一古者國有建立更革必集群議以異衆者為髙自王安石行新法詆異已者為流俗士大夫議論雷同無所可否六十年近嵗尤甚凡有所為獨建議者謀之不復以利害可否詢於衆庶欲乞自今軍國之事博延群臣謀之廣庭以盡下情取衆所謂可者而行之庶無敗事一近來宰執並不見賔客所得進者門下親狎故人阿諛茍媚以事干請是以人材之能否生民之休戚國家之安危邊鄙之利害政事之得失恬不聞知欲乞令宰執許於私第見客庶可廣詢世務一君臣之間欲上下交而情通人臣獻言尤所難者陛下既以虛心屈已以來天下之言欲乞每遇退朝後開延賢士賜坐從容使陳治亂安危之本古今興亡成敗之要及令百司無問大小各以本職言事親加省覽以進忠讜一春秋書災異而不書祥瑞所以示後世人君知警懼也然以臣觀之天下和平民物安樂年榖屢豐乃為上瑞彼雲物鬼神之祥禽獸草木之異吉凶未定也近年四方水旱盜賊不以聞而表賀祥瑞曽無虛月欲乞自今應有水旱盜賊災異毋得隱諱其祥瑞之事一切禁止一祖宗官制簡而易行流品有敘自改官制以來紊亂重復今日尤甚欲乞內外文武內侍伎術等官並依祖宗舊制或謂行之既久未易輕改則乞減省中都職事釐務及州縣冗員以省邦用一近嵗名器輕紊以恩幸除大學士者六七人開府使相者十餘人節度使以上無慮數員若承宣觀察防禦團練遙刺之類奴𨽻皆得為之欲乞例行追降一而清官及三等職名所以賞勞用賢近來公卿戚里子弟及朋附權幸與夫以財利辦職者起躐華要乞盡行降黜今後凡有功於國有勞於民其人之賢允衆議者間除一二以為勸沮一諸路監司員數尚多無益於事祇增煩擾乞憲漕之外有可減者併之如茶鹽常平自合漕司兼領一燕雲之役道途之人皆知其不可而邊臣喜功不恤國事唱為此謀以誤朝廷罪不可貸欲乞凡建議燕雲及後來以燕雲推賞者並行追奪以慰人望一伏覩祖宗肇造區夏佐命功臣封以王爵可也近世褒寵大臣假以王號尤紊憲章欲乞降為國公一戚里後宫之家公卿貴遊子弟以恩幸進及士大夫交結中貴列職朝著者尚多欲乞澄汰以清班列一近嵗御前應奉有勞上書文理可采及特赴殿試之人皆一時權幸干請欲乞追奪或勒令致仕不理官品一天下錢糧祖宗時盡總之三司使自改官制以來錢榖散漫不盡屬戶部久矣近世中人總領名色尤不一欲乞令天下錢糧盡歸戶部一軍政久壞邊鄙不修將帥不遴選兵卒不訓練欲乞以老臣知軍務者為樞使以祖宗之法修軍政復邊備訓練士卒遴選將帥置之京師以待一旦之用一自陛下臨御以來雖降霈恩然民間未受實惠而召兵四方不無煩擾伏乞應民間夏秋二稅只納本色其餘無名科率盡皆放免和預買並乞先次支錢今年以前倚閣賦稅不許監司再行催納諸州上供亦乞參酌近年中數特加減損一茶鹽法雖罷立額減鈔錢然民間猶未便也欲乞講畫取利民便國者行之一常平法行之既久散多納少其法浸壞今若收之則詭名挾户有籍無人不過監保正長地分人均納民間重困欲乞自今年以前應未納常平錢榖並可放免今後只以見在錢榖願請者給之不須比校年例更行賞罰一免役法雖為便民然所募皆遊手姦猾既給雇直又復受賕而保正長等又復有等第者為之則是既出雇錢又不免差役矣兼衙校之類多是借産業抵當率不過數百緡而差押官物或多至萬緡失陷侵盜家業不足以償欲乞參酌祖宗法制重行修立一市易抵當與民爭利所得不償所費失體尤甚欲乞減罷一近年以來賜第之家相望於京師欲乞非國戚主第者並行拘收雖係國戚主第而奢侈過制者改賜小第仍徹去之一臣寮之家所得御筆詔札例皆建閣僥覬恩澤欲乞並令繳納朝廷其閣毁拆今後不得輒有陳請一近嵗公卿大夫下至庶寮玩於安逸專事遊燕家置聲樂沈湎無度內則荒亂心術外則隳廢職事尤壞名義陛下既以聖德化之羣臣自當革心欲乞更加訓諭其或不悛重行竄棄一士大夫名節不立行義不修專務奔馳投獻自媒欲乞選擇端靖有守之士置之列位及招山林遺逸以為臺諫一儒生問學不根本原專尚浮華互相蹈襲欲乞復祖宗制科取士及兼用先儒傳注義理之學當以人心所自得者形之於文不可斷以一説以誤後進王安石今之臣子豈宜列位於先聖之次乞降從諸儒之列一緇黃之徒不耕不蠶耗蠧衣食貟數浸廣常住田産富於農民飲食服用侈埓王侯甚者招姦利無行業欲乞省併寺觀十存二三並作十方不得甲乙住持無敕額者並行拆去常住田産存留一半其餘納官召人租佃留為養兵之費逐年課試及恩澤撥放出賣度牒並行停罷戚里後宫及大臣之家並不得置墳寺只以人户守冢復其家如古之制減僧道等員其強壯者任便歸民庶幾生齒寖繁户口日衆以副務農重本之意右件如前臣區區之意欲言者久矣厥路無由伏遇陛下英斷聰明虛懷聽納故敢忘其固陋輒自罄竭欲望采擇其中者誠以守之斷以行之庶幾期月之間可見太平冒犯天威罪當萬死侍御史胡舜陟論反正六事上奏曰臣觀春秋傳曰兵猶火也弗戢將自焚老氏亦曰以道佐人主者不以兵強天下其事好還國家自熙寧間王韶建開邊之説王安石主其議遣將用兵無嵗無之瀘南廣南勤師逺伐至崇寧以來尤甚西開青唐以及夏國南築溪洞以及丹州西南則建祺祥等州皆不毛之地非人之境而驅赤子陷鋒鏑死者不計其數生者竭其膏血凡五十餘年而又王黼童貫合謀以棄契丹百年之好約大金以墟其國是以上帝震怒禍我國家金人猖獗莫之能禦屠戮士庶攻陷城邑長驅於中原問罪於都城親王宰執為質金廷猶磨牙搖毒搏噬不已我師之出無不敗衄蹙國喪氣失威損重此豈非所謂弗戢自焚其事好還乎陛下踐阼適于斯時宵旰焦勞未見于效蓋天怒未解人力豈能勝哉然天之與人相去雖逺其應甚邇今欲上解天怒當修人事以應之書曰惟先格王正厥事此先王修省以應天解上帝震怒之道也臣觀今日祖宗寬大之政泯滅而未舉王安石刻急之法為害而未除法度未得其正也士大夫之欺罔誕謾尚循舊習驕奢貪鄙曽不少悛風俗未得其正也事未見功賞已驟至及其敗事罰不加焉賞罰未得其正也閹宦近習猶執事權頡頏恣睢無所忌憚任用未得其正也昔之叨冒恩寵者未加鐫削懷才抱器者陸沈州縣爵祿未得其正也昔之僥幸富貴者一毫不取火耕水耨者困於重斂賦斂未得其正也數者不正豈所謂正厥事乎伏望明詔三省凡是數者悉反之正庶幾人事修而天意得震怒一解妖氣自消坐致太平增光祖烈欽宗時起居郎胡安國上奏曰臣聞為天下國家者必有一定不可易之計謀議既定君臣固守雖浮言異説沮毁搖動而初計不移故有志必成治功可致陛下即位於艱難多事之中有恭儉之德有孝友之行有克勤願治之誠有好謀納諫之善以兹四美撥亂興衰宜若反手然南向而朝天下今越半年矣而紀綱尚紊風俗益衰施置乖方舉動煩擾大臣爭競而朋黨之患萌百執窺觀而交間之姦作用人失當而名器愈輕出令數更而士民不信若不掃除舊迹乘勢更張竊恐姦雄無所忌憚因兹恣行侵侮大勢一傾不復可正矣陛下所任為股肱心膂者兩府大臣也所信為耳目聰明者諫官御史也上世帝王之治詢事考言以圖成績伏望陛下逺稽周世宗開國之謀近法仁祖慶歷間求治之意特詔兩府大臣詢以救方今之弊修政事攘冦敵之方各令展盡底藴具為畫一進呈先次宣示臺諫臣寮如有不合者使得逐件疏駮若大臣議詘則參用臺諫之言疏駮不當則專守大臣之策衆議既定仍集百官議於朝堂以合古者詢謀僉同之意然後斷自宸衷按為國論頒諸中外以次施行敢有動搖必罰無赦庶幾新政有經民聽不惑可冀中興之效歷代名臣奏議卷四十五
