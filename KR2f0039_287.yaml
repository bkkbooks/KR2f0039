body:
  text: 歴代名臣奏議卷二百八十七明楊士竒等撰巡幸魯莊公二十三年公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義率長幼之序征伐以討其不然諸侯有王王有廵守以大習之非是君不舉矣君舉必書書而不法後嗣何觀漢元帝幸甘泉郊泰畤禮畢因留射獵薛廣德上書曰竊見闗東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宫思與百姓同憂樂天下幸甚上即日還東漢明帝永平四年春車駕近出觀覽城第尋聞當遂校獵河内東平王蒼上書諫曰臣聞時令盛春農事不聚衆興功傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之徳雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消揺仿佯弭節而旋至秋冬乃振威靈整法駕備周衞設羽旄詩云抑抑威儀惟徳之隅臣不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宫桓帝延熹六年車駕幸廣城校獵光禄勲陳蕃上䟽諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故臯陶戒舜無效逸遊周公戒成王無盤于遊田虞舜成王猶有此戒況徳不及二主者乎夫安平之時尚宜有節況當今之世有三空之戹哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毁顔坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非聖賢恤民之意也齊景公欲觀於海放于琅邪晏子為陳百姓惡聞旌旗輿馬之音舉手嚬眉之感景公為之不行周穆王欲肆車轍馬跡祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也書奏不納後魏孝文帝車駕將水路幸鄴已詔都水回營構之材以造舟檝御史中尉髙道恱表諫曰臣聞博納輿言君上之崇務規箴匡正臣下之誠節是以置鼓設謗爰自曩日虚襟博聽義屬今辰臣既踈魯濫䝉榮貫司兼獻弼職當然否佩遇恩華願陳聞見竊以都作營構之材部别科擬素有定所工治已訖回付都水用造舟艫闕永固居宇之功作暫時遊嬉之用損耗殊倍終為棄物且子来之誠本期營起今乃脩繕舟檝更為非務公私回惶僉深怪愕又欲御泛龍舟經由石濟其㳂河挽道久已荒蕪舟檝之人素不便習若欲委棹正流深薄之危古今共慎若欲挽牽取進授衣之月躶形水陸恐乖視人若子之義且鄴洛相望陸路平直時乘沃若徃来匪難更乃捨周道之安即渉川之殆此乃愚智等慮朝野俱惑進退伏思不見其可又従駕羣寮聽將妻累舟檝之間更無限隔士女雜亂内外不分當今景御休明惟新式度裁禮調風軌物寰宇竊惟斯舉或損洪猷失溥天順則之望又氐羌犯順未恭西道偏戎旗胄仍襲南冦對接近畿蠻民踈戾毎造不軌闚覦閒隙或生慮外愚謂應妙選懿親撫寧後事令姦回息覬覦之望邉冦絶闚疆之心臣稟性愚直知而無隠區區丹志冒昧以聞宣武帝時車駕將幸鄴司徒左長史李平上表諫曰伏見已丑詔書雲軒鑾輅行幸有期鳳服龍驂剋駕近日將欲講武淇陽大習鄴魏馳驌騻於緑竹之區騁驎驥於漳滏之壤此誠幽顯同忻人靈共恱臣之愚管竊有惑焉何者嵩京創構洛邑俶營雖年跨十稔根基未就代民至洛始欲向盡資産罄於遷移牛畜斃於輦運陵太行之險越長津之難辛勤備經得達京闕富者猶損大半貧者可以意知兼歴歳従戎不遑啟䖏自景明已来差得休息事農者未積二年之儲築室者裁有數間之屋莫不肆力伊瀍人急其務寔宜安静新人勸其稼穡令國有九年之粮家有水旱之備若乗之以羈紲則所廢多矣一夫從役舉家失業今復秋稼盈田禾菽遍野鑾駕所幸騰踐必殷未若端拱中天坐招四海耀武嵩原禮射伊洛士馬無跋涉之勞兆民有康哉之詠豈不美歟唐太宗貞觀七年上將幸九成宫散騎常侍姚思亷進諫曰陛下髙居紫極寧濟蒼生應須以欲従人不可以人從欲然則離宫逰幸此秦皇漢武之事故非堯舜禹湯之所為也言甚切至太宗諭之曰朕有氣疾熱便頓劇故非情好逰幸甚嘉卿意因賜帛五十段十一年太宗東廵狩將入洛次於顯仁宫宫苑官司多被責罰侍中魏徵進曰陛下今幸洛州為是舊征行䖏庻其安定故欲加恩故老城郭之民未䝉徳恵官司苑監多及罪辜或以供奉之物不精又以不為獻食此則不思止足志在奢靡既乖行幸本心何以副百姓所望隋主先命在下多作獻食獻食不多則有威罰上之所好下必有甚競為無限遂至滅亡此非載籍所聞陛下目所親見為其無道故天命陛下代之當戰戰慄慄毎事省約參踪盛列昭訓子孫奈何今日欲在人之下陛下若以為足今日不啻足矣若以為不足萬倍於此亦不足也太宗大驚曰非公朕不聞此言自今已後庶㡬無如此事太宗幸洛陽宫泛舟于積翠池顧謂侍臣曰此宫苑臺沼是煬帝所為驅役生人窮此雕麗復不能守此一都以萬人為慮好行幸不息人所不堪昔詩人云何日不行何草不黄大東小東杼軸其空正謂此也遂使天下怨叛身死國滅今其宫苑盡為我有隋氏傾覆者豈惟其君無道亦由股肱無良如宇文述虞世基裴藴之徒居髙官食厚祿受人委任惟行諂佞蔽塞聰明欲令其國無危亡理不可得也司空長孫無忌奏言隋氏之亡其君則杜塞忠讜之言臣則茍欲自全有過初不糾舉冦盗滋蔓亦不實陳據此即不惟天道寔由君臣不相匡弼太宗曰朕與卿等承其餘弊惟須𢎞道移風使萬代永頼矣十四年上幸同州沙苑親格猛獸復晨出夜還特進魏徴奏曰臣聞書美文王不敢盤于逰畋傳述虞箴稱夷羿以為戒昔漢文臨霸坂馳下袁盎攬轡曰聖主不乗危不徼幸今陛下騁六飛馳不測之山如有馬驚車覆陛下縦欲自輕奈髙廟何孝武好格猛獸相如進諫曰力稱烏獲㨗言慶忌人誠有之獸亦宜然卒遇逸材之獸駭不存之地雖烏獲逄䝉之技不得用而枯木朽株盡為難矣雖萬全而無患然本非天子所宜近也孝元郊泰畤因留射獵薛廣徳奏稱竊見闗東困極百姓罹灾今日撞亡秦之鐘歌鄭衞之樂士卒暴露従官勞倦如安宗廟社稷何馮河暴虎未之比也臣竊思此數帝心豈木石獨不好馳騁之樂而剖情屈已従臣下之言者志存為國不為身也臣伏聞車駕近出親格猛獸晨出夜還以萬乘之尊闇行荒野踐深林渉豐草甚非萬全之計願陛下割私情之娱罷格獸之樂上為宗廟社稷下慰羣寮兆庶太宗曰昨日之事偶属塵昏非故然也自今深用為戒太宗嘗校獵同州時秋斂未訖咸陽丞劉仁軌諫曰今兹澍澤霑足百榖熾茂収纔十二常日贅調已有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使場圃畢勞陛下六飛徐驅公私交泰璽書褒納𤣥宗開元五年帝幸東都國子祭酒禇無量上言昔虞舜之狩秩山川徧羣神漢孝景祠黄帝橋山孝武祠舜九疑髙祖過魏祭信陵君墓過趙封樂毅後孝章祠桓譚冢願陛下所過名山大川邱陵墳衍古帝王賢臣在祀典者並詔致祭自古受命之君必興滅繼絶崇徳報功故存人之國大於救人之災立人之後重於封人之墓願到東都収叙唐初逮今功臣世絶者雖在支庶咸得承襲帝納其言十三年帝東封泰山道中數馳射為樂太子左庶子吳競諫曰方登岱告成不當逐狡獸使有垂堂之危朽株之殆帝納之𤣥宗将西幸已復有旨與宰相云西幸有日般運已去仍聞京畿百姓猶有未安儻来歳非熟下人無向朕雖至彼復有何情欲延期至来冬待看榖麥卿等商度以為何似時張九齡等具奏曰洛陽城闕雖曰皇都至於宫苑之間制度本狭然風土氣候不甚宜人陛下以萬姓為心萬姓以陛下為命億兆所繫誠在聖躬聖躬若安何顧小小陛下遂當宁動色再降徳音茍利於人朕何顧惜發言惻隠感動神祗臣等幸聞至言不覺承睫聖恩愛育遂及於此又勅臣等商量進来者湛恩至徳焉可使朝臣不知聖君鴻名不可令史官無述臣望宣聖㫖改用来年十月幸西京仍望具将本狀徧示朝列并宣付史官𤣥宗將幸東都而太廟屋自壊帝問宰相宋璟蘇頲同對曰三年之喪未終不可以行幸壊壓之變天所以示教戒陛下宜停東廵脩徳以答至譴帝以問姚崇對曰臣聞隋取苻堅故殿以營廟而唐因之且山有朽壊乃崩況木積年而本自當蠧乎但壊與行㑹不縁行而壊且陛下以闗中無年輸餉告勞因以幸東都所以為人不為己也百司已戒供擬既具請車駕如行期舊廟難復完盍奉神主舍太極殿更作新廟申奉誠大孝之徳也帝曰卿言正契朕意賜絹二百匹詔所司如崇言天子遂東𤣥宗自東都還李林甫牛仙客知上厭廵幸乃増近道粟賦及和糴以實闗中數年蓄積稍豐上謂髙力士曰朕不出長安近十年天下無事朕欲悉以政事委林甫何如對曰天子廵守古之制也且天下大柄不可假人彼威勢既成誰復敢議之者上不恱力士頓首謝罪上意乃解力士自是亦不敢深言天下事矣肅宗時史思明陷洛陽有詔幸東京將親征考功郎中知制誥蘇源明上䟽曰淫雨積時道路方梗甚不可一也自春大旱秋苗耗半斂穫未畢先之以清道之役申之以供頓之苦甚不可二也毎立殿廊見旌旗之下餓夫執殳仆于行間日見二三市井餒殍求食死于路旁日見四五甚不可三也姦夫盜兒連牆接棟磨礪以須陛下之出御史大夫必不能澄清禁止甚不可四也聖皇廵蜀之初都内財貨吏民資産縻散于道路之手至有乘馬駃驢入宣政紫宸者況陛下初有四海威制不及曩時逺矣今兹東行殆賊臣誘掖陛下而已詩曰三星在霤謂危亡在於須臾臣不勝嗚咽為陛下痛之願速罷幸不然窮甿樂禍已扼腕於下甚不可五也方今河洛繹騷江湖叛涣詩曰中原有菽庶民采之彼思明椘元皆采菽之人也陛下何遽輕萬乗而速成之邪甚不可六也大河南北舉為寇盜王公以下廩稍匱絶將士糧賜僅支日月而中官冗食不減徃年棃園雜伎愈盛今日陛下未得穆然髙枕殆繇此也自非中書指使太常正樂外願一切放歸給長牒勿事須五六年後随事蠲省今聚而仰給甚不可七也李光弼㧞河陽王思禮下晉原衞伯玉拂焉耆過析支不日可至御史大夫王𤣥志壓巫閭臨幽都汝州刺史田南金踰闕口遏二室鄧景山淩淮泗愾然而西狂賊失勢蹙于緱山之下北不敢逾孟津東不敢過甖子計日反接而至矣陛下不坐而受之乃欲親征徇一朝之怒甚不可八也王者之於天地神祗享之以牲幣而已記曰不祈方士彼淫巫愚祝妄有關説甚不可九也天子順動人皆幸之之謂幸人皆病之之謂不幸臣等屢拂視聽聨伏赤墀之下頓顙流涕而出雖陛下優容貸罪凡百之臣必昌言于朝萬口謗于外甚不可十也臣聞子不諍於父不孝也臣不諍於君不忠也不孝不忠為茍榮冒禄圈牢之物不若也臣雖至賤不能委身圈牢之中將使樵夫指而笑之帝嘉其切直遂罷東幸徳宗時翰林學士陸贄奏言右先頒勅㫖已定行期所司供承亦聞粗備但以霖潦方甚道路阻艱衆情同憂莫敢論奏今發日漸逼隂雲尚繁小大嗷嗷愁懼轉甚臣雖闇鈍亦竊揣量豈不知元惡初平餘氛未殄乃是逆順將分之際吉凶多變之時須速鎮安理宜促駕向使霖潦為害人功可施其備禦由於智能其役用止於煩費其所患不及於性命其可憂但在於人臣則當公私罄財上下竭力務寧大業奚恤暫勞各應叶奉聖規安敢復忤成命良以褒斜峻阻素號畏途縁側逕於巔巖綴危棧於絶壁或百里之内歴險且千或一程之中渉水數四若遇積雨滯浸羣峯澍流巨石崩奔訇殷相繼深谷瀰漫徃来不通悉非功力之所支籌畧之所遏斯須之頃跬歩之間倉黄遘殃皆不可測匹夫單騎尚且過防況萬乘時行千官景従而可以蹈不存之險冒無禦之災乎如或磴路潨崩閣道淹圮環衞之儀少闕屬車之馬㣲驚縦有億徒何所為用陛下欲無駭慮其可得乎又或霪滯更深谿澗皆溢逕路既絶傳送無由連山萬重進退不可一日乏食將如之何陛下欲無軫憂固亦難矣人主舉措宜圖萬全必先事以防危不臨危而求幸幸而獲濟貽媿已深不幸罹災追悔何及孔子曰欲速則不達誠哉是言臣今非敢阻陛下欲速之情但頗以不達為慮耳儻迴睿㫖少俟開晴則發期雖延渉路無滯不疾而速允叶乾行知機其神是謂天鑒竊聞羣議輙以上陳慺慺懇誠寔冀昭納敬宗欲幸東都諫者甚衆上皆不聽已使按脩宫闕裴度從容言曰國家本設兩都以備廵幸然自多難以来宫闕營壘百司廨舍率已荒弛陛下儻欲行幸宜命有司徐加完葺然後可徃上曰從来言事者皆謂不當徃如卿所言不徃亦可乃勅罷脩宋真宗大中祥符四年將祀汾隂是時大旱京師近郡榖價踊貴龍圖閣待制孫奭上䟽諫曰先王卜征五年嵗習其祥祥習則行不習則增脩徳而改卜陛下始畢東封更議西幸殆非先王卜征五年慎重之意其不可一也夫汾隂后土事不經見昔漢武帝將封禪故先封中嶽祠汾隂始廵幸郡縣遂有事於泰山今陛下既已登封復欲幸汾隂其不可二也古者圎丘方澤所以郊祀天地今南北郊是也漢初承秦唯立五畤以祀天而后土無祀故武帝立祠於汾隂自元成以来従公卿之議遂徙汾隂后土於北郊後之王者多不祀汾隂今陛下已建北郊乃舍之而逺祀汾隂其不可三也西漢都雍去汾隂至近今陛下經重闗越險阻輕棄京師根本而慕西漢之虚名其不可四也河東唐王業之所起也唐又都雍故明皇間幸河東因祠后土聖朝之興事與唐異而陛下無故欲祀汾隂其不可五也昔者周宣王遇災而懼故詩人美其中興以為賢主比年以来水旱相繼陛下宜側身脩徳以荅天譴豈宜下徇姦回逺勞民庶盤逰不已忘社稷之大計其不可六也夫雷以二月啟蟄八月収聲育養萬物失時則為異今震雷在冬為異尤甚此天意丁寧以戒陛下而反未悟殆失天意其不可七也夫民神之主也是以聖王先成民而後致力於神今國家土木之功累年未息水旱洊沴饑饉居多乃欲勞民事神神其享之乎此其不可八也陛下必欲為此者不過效漢武帝唐明皇廵幸所至刻石頌功以崇虚名夸示後世爾陛下天資聖明當慕二帝三王何為下襲漢唐之虚名其不可九也唐明皇以嬖寵姦邪内外交害身播國屯兵交闕下亡亂之迹如此由狃於承平肆行非義稔致禍敗今議者引開元故事以為盛烈乃欲倡導陛下而為之臣切為陛下不取此其不可十也臣言不逮意陛下以臣言為可取願少賜清閒以畢臣説帝遣内侍皇甫繼明就問又上䟽曰陛下將幸汾隂而京師民心弗寧江淮之衆困於調發理須鎮安而矜存之且土木之功未息而奪攘之盜公行外國治兵不逺邉境使者雖至寧可保其心乎昔陳勝起於徭戍黄巢出於凶饑隋煬帝勤逺畧而唐髙祖興於晉陽晉少主惑小人而耶律徳光長驅中國陛下俯從姦佞逺棄京師渉仍嵗洊饑之墟脩違經久廢之祠不念民疲不恤邉患安知今日戍卒無陳勝饑民無黄巢英雄将無窺伺於肘腋外敵将無觀釁於邉陲乎先帝嘗議封禪寅畏天災尋詔停寝今姦臣乃賛陛下力行東封以為繼成先志先帝嘗欲北平幽朔西取繼遷大勲未集用付陛下則羣臣未嘗獻一謀畫一策以佐陛下繼先帝之志者反務卑辭重幣求和扵契丹蹙國縻爵姑息於繼遷曽不思主辱臣死為可戒誣下㒺上為可羞撰造祥瑞假託鬼神纔畢東封便議西幸輕勞車駕虐害饑民冀其無事徃還便謂成大勲績是陛下以祖宗艱難之業為姦邪僥倖之資臣所以長嘆而痛哭也夫天地神祇聰明正直作善降之百祥作不善降之百殃未聞専事籩豆簠簋可邀福祥春秋傳曰國之将興聴於民将亡聴扵神愚臣非敢妄議惟陛下終賜裁擇六年奭又上䟽曰陛下封泰山祀汾隂躬謁陵寝今又将祠于太清宫外議籍籍以為陛下事事慕效唐明皇豈以明皇為令徳之主耶甚不然也明皇禍敗之迹有足為深戒者非獨臣能知之近臣不言者此懐姦以事陛下也明皇之無道亦無敢言者及奔至馬嵬軍士已誅楊國忠請矯詔之罪乃始諭以識理不明寄任失所當時雖有罪己之言覺寤已晚何所及也臣願陛下早自覺寤抑損虚華斥逺邪佞罷興土木不襲危亂之迹無為明皇不及之悔此天下之幸社稷之福也真宗時翰林學士李廸上言陛下東封時勅所過毋伐木除道即驛舍或州治為行宫裁令加塗塈而已及幸汾亳土木之役過徃時㡬百倍今蝗旱之災殆天意所以儆陛下也帝深然之哲宗時監察御史陳次升奏曰臣伏聞有㫖今月二十日幸金明池者臣竊觀孟子之言曰吾王不逰吾何以休吾王不豫吾何以助一逰一豫為諸侯度則知天子逰幸與民同樂乃天下無事之時也今聞聖駕幸金明池有㫖不過御橋是以主器至重社稷所繫其出入起居兢慎如此寔天下之福也臣竊觀輿議以所造龍舟窮極工巧華麗尤甚陛下必須乗御以臣愚見乗船危乗橋安陛下尚不乗橋豈肯乘船耶雖然陛下若不乗船臣先事而言亦無所害萬一有之可為未然之戒臣安可以緘黙傳有之曰千金之子不垂堂百金之子不倚衡聖主不乗危不徼倖又曰乘船危聖主不乗危伏願陛下念之哉徽宗政和後多㣲行曹輔時為祕書省正字上䟽曰陛下厭居法宫時乗小輿出入廛陌之中郊坰之外極逰樂而後反道塗之言始猶有忌今乃談以為常某日由某路適某所某時而歸又云輿飾可辨而避臣不意陛下當宗廟社稷付託之重玩安忽危一至於此夫君與民本以人合合則為腹心離則為椘越畔服之際在於斯須甚可畏也昔者仁祖視民如子憫然惟恐其或傷一旦宫闈不禁衛士輙踰禁城㡬觸寳瑟荷天之休帝躬保佑俚語有之盜憎主人主人何負於盜哉況今革冗貟斥濫奉去浮屠誅胥吏蚩愚之民豈能一一引咎安分萬一當乗輿不戒之初一夫不逞包藏禍心發蠭蠆之毒奮獸窮之計雖神靈垂䕶然亦損威傷重矣又況有臣子不忍言者可不戒哉臣願陛下深居髙拱淵黙雷聲臨之以穹昊至髙之勢行之以日月有常之度及其出也太史擇日有司除道三衛百官以前以後若曰省煩約費以便公私則臨時降㫖存所不可闕損所未嘗用雖非祖宗舊制比諸㣲服晦迹下同臣庶堂陛陵夷民生姦望不猶愈乎髙宗建炎初将駐蹕建康車駕詣神主船燒香畢次幸普照寺尚書右丞許景衡上奏曰臣竊惟陛下廵幸恭迎太祖太宗神主載之前舟有司嚴奉如在太廟而陛下未敢升舟燒香者誠以非時瀆神恐失禮也意者當俟駐蹕恭行奉安之儀然後禮文為稱今来道出淮泗方謁神主枉駕佛祠臣深恐天下議者以陛下縁致恭於僧伽欵神靈於宗廟不獨誠意有所未専而於禮文亦未為得也若以為行幸祈福耶則天子之行風伯清塵雨師洒道天地神明所共扶持豈若商旅細民毎過淮泗則徼福塔廟耶又況祖宗廵幸並無臨佛祠欵浮屠故事唯章聖皇帝東封道過睢陽見張廵許逺廟為之嘆賞表其忠義之節以為臣下之勸而已於此有以見帝王一嚬一笑豈無謂而發哉臣愚欲望聖明一意奉先之孝謹守祖宗之制無惑乎議者之謂而為有識者之所非也臣不勝拳拳竭忠愛君之至所有臨幸普照寺塔下燒香指揮伏乞特賜寢罷紹興三十一年權吏部侍郎汪應辰上言曰臣伏見漢章帝幸河内詔曰精騎輕行無他輜重不得輙脩道橋逺離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脱粟瓢飲耳又南幸詔曰所經道上郡縣無得設儲跱命司空自将徒支柱橋梁有遣使奉迎探知起居二千石當坐又見唐太宗脩洛陽宫以傋廵幸張元素極諫太宗謂房𤣥齡曰元素所言有理宜即罷役後日或以事至雖露居亦無傷也夫以章帝太宗當安平無事之時而行幸之際務從簡嗇至於如此恭惟陛下清心約已無所嗜好仁民愛物惟恐傷之比以敵人敗盟将士冒犯矢石之故寝不安席食不甘味為之避殿減膳今將親御戎輅大廵六師而臣竊聞沿路州縣自詔令下即已預為之備供辦之物名色猥衆其未必他日所當用者十居七八徃徃裒斂賖貸於民而胥吏又得寅縁以濟其貪至於填塞田畆毁撤廬舍以開廣道路甚非所以仰稱聖徳欲望明降詔㫖嚴行禁約有不奉承者坐之以示陛下恭儉仁厚與夫今日行幸之本意天下幸甚孝宗時羅願奏曰臣聞帝王之出必嚴扈從故有大駕法駕千乘萬騎煩而不可省所以示尊嚴致兢懼也陛下留心典禮出入有節自郊祀孟享之外惟徳夀宫温凊之奉一月屢出兩宫相距不逺既不欲數蹕煩民徃徃駕興行者未止而扈從之人積習生常恬然不戒至於己事還宫左右禁旅喘汗而相見小黄門諠笑於馬上此何為者也天下乂安君臣簡易不過於觀美為不足今北有强敵方窺伺人誠不可以不戒又毎春逰豫與民同樂雖亦頗陳禁旅然鑾輿不御以萬乘之尊幅巾匹馬雜於扈騎之中繞出湖山數十里夾道觀者宻近天威臣子之心不能不懼又毬馬之設雖以閑習武事然皆昧爽期入宫掖奔突馳驟揮霍紛紜雖武将邉人素精此技有如萬分一馬不受鞚手不應節跬歩之間何以相及願明詔有司出入之際申嚴扈從奏其尤不肅者謹游豫之防省毬馬之㑹陛下安則九廟安矣理宗時牟子才上奏曰臣恭覩㫖揮車駕以十月三日詣西太乙行欵謁恭謝之禮臣切謂自漢武帝始祠太乙其後或随太乙所在築室迎祠大率皆因方士雜引道經星歴之學而為之比者國家以五福太乙臨蜀分乃建西太乙於西湖之濵以為禬祈之地雖厥有故事然是役也土木鉅麗一時囊封匭奏已交言其非而或者又切議陛下他日必因欵謁而為湖山㳺幸之舉今宗祀禮成親行恭謝陛下盖将敬體神天禔福庶民夫豈以觀㳺為意然道塗之言皆謂有司飭橋梁除道路辦供給過為勞擾又傳是日欲張水嬉陳樂伎萬一果出於此豈不實或者㳺幸之説而有失陛下敬天愛民之初意乎逢迎者之論不過謂祖宗嘗屢詣西太乙而南渡以来亦有湖山之幸臣以為此承平時事今邉警未清事大單屈為何如時豈可盡循承平之盛觀以啟豐亨豫大之心乎恭惟陛下踐阼之始一欵圜丘其後未嘗輕出郊也三十年間嚴恭寅畏動無過舉則今日之出臣尤以為不可不謹況乗輿出郊非他時比臣之隠憂又有在於言之外者陛下其可不為宗廟社稷深長思乎臣非不知聖意已定未易挽回觸忤威顔必取誅斥而區區忠愛不能自已用敢親書此奏昧死以聞伏惟陛下察臣愚衷深入宸慮自以其意特召大臣詳議其事明詔有司亟止此行庶㡬舉動合宜青史書之可為萬世法而疑慮潜消宗廟社稷幸甚子才又上奏曰臣比者西太乙㫖揮初下之時嘗宻告陛下乞自以聖意明詔有司亟止此行盖區區忠愛之志欲救正於未然力量淺薄未能感動繼聞諸臣陸續亦有奏䟽是公議不謀而同非臣一人之私言也二十四日伏覩内批陛下非不敬悟此意而欵謁之行終未即止是猶以臣等之言為未然也其曰為國祈祥初無其他臨幸去䖏此意固甚明白但湖山嬉㳺歌舞之地民庶蕩産於此士夫溺志於此堂堂人主存一敬心随寓皆福初無分於東西也又何必親出郊以勞千乘萬騎而啟諸人㳺幸之疑乎其曰應干排辦禮文務從簡約此意固亦甚善但乘輿出郊十里而逺所至除道斫木毁室寧免勞民與其省約於道塗之間曷若動循禮義謹重一出之為安且適乎陛下之意不過曰畿輔之盜近已肅清及今一出亦未為過不思淮哨未定蜀圍未解並邉赤子殞命鋒鏑者不知㡬千萬億陛下茍念及此切念聖心未嘗不淒然蹙頞也又不過曰百榖順成在在豐稔及今一出亦未為過抑不思湖湘襄蜀皆以旱苦赤地千里民無宿儲公私之積良可哀痛陛下茍念及此切料聖意未嘗不慨然動心也又不過曰祼享太宫隂雲閣雨宗祀世室皓魄當空天地祖宗眷佑昭垂也今以冬享行恭謝欵謁之禮亦未為過抑不思景星慶雲非福我者也淒風苦雨殆儆予者也敬肆之念一分治忽之㡬攸係前日畏威夙夜不敢荒寧是以有佑順之眷今以一晴霽之故遂謂之得天而肆以繼之庸詎知眷顧可長保乎陛下識見超邁逺覽古今其亦知臨幸之為害乎車轍亡周驪山覆秦此逺幸也華林卑晉梨園衰唐此近幸也今陛下鳴鑾警蹕於湖山間亦隣乎近幸矣安知近幸不已它日不轉而為逺幸耶又有一説扵聖躬頗有闗係宣和間車駕時出正字曹輔諫曰萬一乗輿既駕之初一夫不逞發䗬蠆之㣲逞窮獸之計雖皇天后土宗廟靈神並垂䕶佑然亦傷威損重又況有臣子不忍言者此所謂不測起於軫下也可不戒哉臣讀史至此未嘗不痛恨於當時而深哀輔之忠也今陛下仁慈立國君民一心萬無如輔所言亦有不容不慮者四郊多壘時多艱危賊臣之孽嗣窟於舊海弄兵之餘黨伏於近畿禁衛何所而偽符得入宫闈何地而妖訛相恐重以連嵗土木民怨載塗則曹輔之言臣以為未宜忽之也此一身之慮也又當為子孫萬世之慮作法於涼其弊猶貪作法於貪其弊若何今陛下臨幸西宫乘輿一出遂為故事傳之後世久則習為常矣以陛下聖明閲歴既久艱難備知逰幸之樂猶不能自制忠讜之論猶不能盡容後世子孫豈能皆賢臣恐必有以今日藉口而窮靡麗極盤游於湖山之間而又有甚焉者矣方是之時國力困於供億民力疲於土木忠臣義士死於諫諍未必非陛下今日之舉有以啟之古之人君抑情制欲以為子孫貽謀之慮陛下不此之意獨奈何開而縦之乎陛下一幸西宫而開子孫奢縦之禍亦豈忍其至此也陛下試於燕閒之際超然逺覽穆然深思自一身之慮及子孫之慮以及天下國家之慮籌惟利害亟罷此行所抑者甚㣲而所存者甚大茍狃於左右逢迎之説玩細娱而忘大慮臣未知其可也臣又按漢史武帝元鼎五年立泰畤於甘泉親祠太乙武帝即位至此㡬三十年而有此舉措盖其學不足以明理理不足以制欲無足恠者陛下講學于今三十餘年此乃聖徳成就之日所當同符堯舜而方欲效武帝親祠太乙之舉臣寔惜之始武帝既祠太乙遂下詔稱揚以為望見太乙若景光十有二迺心侈然其後益封泰山祠后土幸建章廵海上作甘泉通天蜚亷殆無虚嵗盖其侈心一萌不能自止可不懼哉且祠太乙所以致福而臣以漢史考之其初祠太乙之年日有食之自是旱蝗河決蛇鬬無嵗無有而南越之叛匈奴之宼亦在是年至於東方盜起巫蠱禍作干戈相尋所謂福者乃如此武帝晚年始悟下詔以為平生所為狂悖嗚呼亦已晚矣武帝自謂其所為狂悖陛下試觀其所為豈不真狂悖可笑而奈何欲效之乎武帝猶知所悔而陛下豈甘在武帝下乎豈必晚而後悔乎晚而悔之豈有及乎故臣願陛下以三十年講學之功同符堯舜而不願陛下與漢武比也臣既效宻啟之忠敢忘廷爭之議用敢直前繳奏以聞欲望陛下痛察臣衷改降指揮特寢前命以弭人言夫從諫者帝王之盛徳陛下欲駕幸西宫而止以人言屈己從人之美度越古今其愈於執迷不復使後之執筆而議者皆得以歸尤於今日逺矣惟陛下亟圖之貼黄祥符間王欽若等建議封泰山祠汾隂是時王旦方相真宗心憚之曰王旦得無不可欽若曰臣得以聖意諭旦宜無不可旦既黽而從之其後天書之事不復異議議者非之今日之事臣竊料陛下必無畏相之心而二三大臣相與逄迎亦必不待諭而後從也然則亦何頼焉孟子曰逢君之惡其罪大二三大臣尚可以王旦藉口乎臣以為非陛下銳然以理制欲自止此行則二三大臣決不能力陳正義以回聖意也太學生劉黻上諫游幸䟽曰天下有道人主以憂勤而忘逸樂天下無道人主以逸樂而忘憂勤自昔國家乂安四夷賔服享國日久侈心漸生若漢武帝之單于震讋而有千門萬户之觀唐明皇之北邉無事而有驪山温泉之幸至於隋之煬帝陳之後主危亡日迫遊觀無度不足效也堯舜禹湯文武之兢業祗懼終始憂勤無逸言逰畋則不敢日是則不暇食曷嘗借祈禳之説以事逰觀之適比年以来以幸為利以玩為常未免有輕視世故眇忽天下之心單于未嘗震讋而有武帝多欲之費耗北邉未嘗無事而有明皇晏安之鴆毒陛下春秋尚少貽謀垂憲之機悉在陛下作而不法後嗣何觀自十數年間創龍翔創集慶創西太乙而又示之以逰幸導之以禱祠蠱之以虚誕不經之説孔子曰少成若天性習慣如自然積久慣熟牢不可破誰得而正之且西太乙之役佞者進曰太乙所臨分野則為福近嵗自吴移蜀信如祈禳之説西北坤維按堵可也今五六十州安全者不能十數敗降者相繼福何在耶武帝祠太乙於長安至晚年以虚耗受禍而後悔方士之繆雖其悔之弗早猶愈於終不知悔者也大凡人主不能無過脱有過言過行宰執侍從當言之給舍臺諫當言之搢紳士大夫當言之皆所以納君於當道者也今陛下未為不知道未為不受人言宰執以下希寵而不言與夫言之而不力皆非所以愛陛下也其心豈以此為當而不必言哉直以陛下為不足以望堯舜禹湯文武之主而以漢武明皇待陛下也金熈宗時翰林待制兼右諫議大夫程寀上奏曰古者天子皆有廵狩無非事者或省察風俗或審理寃獄或問民疾苦以布宣徳澤皆廵狩之名也國家肇興誠恐郡國新民逐末棄本習舊染之汙奢侈詐偽或有不明之獄僭濫之刑或役無時四民失業今鑾輅省方将憲古行事臣願天心洞照委之長貳釐正風俗或置匭匣以伸寃枉或遣使郡國問民無告如古廵狩之事昔漢昭帝問疾苦求民瘼如此則和氣宣通天下丕平可坐而待也世宗將幸金蓮川有司具辦薛王府掾梁襄上䟽極諫曰金蓮川在重山之北地積隂泠五榖不殖郡縣難建盖自古極邉荒棄之壤也氣候殊異中夏降霜一日之間寒暑交至特與上京中都不同尤非聖躬將攝之所凡奉養之具無不逺勞飛輓越山踰嶮其費數倍至於頓舍之䖏軍騎闐塞主客不分馬牛風逸以難収臧獲逋逃而莫得奪攘蹂躪未易禁止公卿百官衛士富者車帳僅容貧者穴居露䖏輿臺皁𨽻不免困踣饑不得食寒不得衣一夫致疾染及衆人夭傷無辜何異刃殺此特細故耳更有大於此者臣聞髙城峻池深居邃禁帝王之藩籬也壮士健馬堅甲利兵帝王之爪牙也今行宫之所非有髙殿廣宇城池之固是廢其藩籬也掛甲常坐之馬日暴雨蝕臣知其必羸瘠矣禦侮待用之軍穴居野䖏泠啖寒眠臣知其必疲瘵矣衛宫周廬才容數人一旦霖潦積旬衣甲弓刀霑溼柔脆豈堪為用是失其爪牙也秋杪將歸人已疲矣馬已弱矣裹粮已空楮衣已弊猶且逺幸松林以從畋獵行於不測之地往来之間動踰旬月轉輸移徙之勞更倍於前矣以陛下神武善騎射舉世莫及若夫銜橜之變猛摯之虞姑置勿論設扵行獵之際烈風暴至塵埃漲天宿霧四塞跬歩不辨以致翠華有崤陵之避襄城之迷百官狼狽於道途衛士參錯於隊伍當此宸衷寧無戒悔夫神龍不可以失所人主不可以輕行良謂此也所次之宫草畧尤甚殿宇周垣唯用氊布押宿之官上畨之士終日驅馳加之飢渇已不勝倦更使徹曙廵警露坐不眠精神有限何以克堪雖陛下恱以使人勞而不怨豈若不勞之為愈也故君人者不可恃人無異謀要在䖏已於無憂患之域也燕都地䖏雄要北倚山嶮南壓區夏若坐堂隍俯視庭宇本地所生人馬勇勁亡遼雖小止以得燕故能控制南北坐致宋幣燕盖京都之選首也況今又有宫闕井邑之繁麗倉府武庫之充實百官家屬皆䖏其内非同曩日之陪京也居庸古北松亭榆林等關東西千里山峻相連近在都畿易於據守皇天本以限中外開大金萬世之基而設也奈何無事之日越居草莱輕不貲之聖躬愛沙磧之㣲凉忽祖宗之大業此臣所惜也又行幸所過山徑阻脩林谷晻靄上有懸崖下多深壑垂堂之戒不可不思臣聞漢唐離宫去長安才百許里然武帝幸甘泉遂中江充之姦太宗居九成㡬致結社之變太康畋於洛汭后羿拒河而失邦魏帝拜陵近郊司馬懿竊權而簒國隋煬海陵雖惡徳貫盈人誰敢議止以離棄宫闕逺事巡征其禍遂速皆可為殷鑒也臣嘗論之安民濟衆唐虞猶難之而今日之民賴陛下之英武無兵革之憂賴陛下之聖明無官吏之虐賴陛下之寛仁無刑罰之枉賴陛下之節儉無賦斂之繁可謂能安濟矣而遊畋納凉之樂出於富貴之餘静而思動非如衣食切身有不可去者罷之至易耳唐太宗將行闗南畏魏徴而停漢文帝欲馳霸陵袁盎諫而遽止是陛下能行唐虞之難行而未能罷中主之易罷臣所未諭也且燕京之凉非濟南之比陛下牧濟南日毎遇炎蒸不離府署今九重之内臺榭髙明晏安穆清何暑得到議者謂陛下北幸久矣毎嵗随駕大小前歌後舞而歸今兹再出寧有遽不可乎臣愚以為患生於不戒者多矣西漢崇用外戚而有王莽之禍梁武好納叛降而有侯景之變今者累嵗北幸狃於無虞往而不止臣甚懼焉夫事知其不可猶冒為之則有後難必矣議者又謂往年遼國之君春水秋山冬夏巴納舊人猶喜談之以為真得快樂之趣陛下效之耳臣愚以謂三代之政令有不可行者況遼之過舉哉且本朝與遼室異遼之基業根本在山北之臨潢臣知其所逰不過臨潢之旁亦無重山之隔冬猶䖏於燕京契丹之人以逐水草牧畜為業穹廬為居遷徙無常又壤地褊小儀物殊簡輜重不多然隔三五嵗方能一行非嵗嵗皆如此也我本朝皇業根本在山南之燕豈可捨燕而之山北乎上京之人棟宇是居不便遷徙方今幅貟萬里惟奉一君承平日久制度殊異文物増廣輜重浩穰随駕生聚殆逾於百萬如何嵗嵗而行以一身之樂嵗使百萬之人困於役傷於財不得其所陛下其忍之歟臣又聞陛下於合圍之際麋鹿充牣圍中大而壮者才取數十以奉宗廟餘皆縦之不欲多殺是陛下恩及於禽獸未及於随駕衆多之臣庶也議者謂前世守文之主生長深宫畏見風日彎弧上馬皆所不能志氣銷懦筋力拘柔臨難戰懼束手就亡陛下監其如此不憚勤身逺幸金蓮至於松漠名為坐夏打圍實欲服勞講武臣愚以為戰不可忘畋獵不可廢宴安鴆毒亦不可懐然事貴適中不可過當今過防驕惰之患先趨萬有一危之途何異無病而服藥也況欲習武不必度關涿易雄保順薊之境地廣又平且在邦域之中獵田以時誰曰不可伏乞陛下發如綸之㫖回北轅之車塞雞鳴之路安䖏中都不復北幸則宗社無疆之休天下莫大之願也方今海内安治朝廷尊嚴聖人作事固臣下将順之時而臣以螻蟻之命進危切之言仰犯雷霆之威陷於吏議小則名位削除大則身首分磔其為身計豈不愚謬惟陛下深思博慮不以人廢言以宗廟天下為心俯垂聽納則小臣素願遂獲雖死猶生他非所覬望也世宗納之遂為罷行章宗明昌四年将幸景明宫御史中丞董師中及侍御史賈鉉治書侍御史鈕祜禄遵古諫以謂勞人費財盖其小者變生不虞所繫非輕聖人法天地以順動故萬舉萬全今邉鄙不馴反側無定頗勒格巴斡貪暴强悍深可為慮陛下若問諸左右必有容悦而言者謂堂堂大國何彼之恤蠭蠆有毒患起所忽今都邑壮麗内外苑囿足以優佚皇情近畿山川飛走充牣足以閱習武事何必千車萬騎草居霜宿逼介邉陲逺煩偵候以冒不測之悔哉上不納師中等又上疏曰近年水旱為沴明詔罪已求言罷不急之役省無名之費天下欣幸今方春東作而亟遣有司脩建行宫揆之於事似為不急況西北二京臨潢諸路比嵗不登加以民有養馬簽軍挑壕之役財力大困流移未復米價甚貴若扈從至彼又必増價日糴升合者口以萬數舊籍北京等路商販給之倘以物貴或不時至則飢餓之徒将復有如曩嵗殺太尉馬毁太府𤓰菓出忿怨言起而為亂者矣書曰民情大可見小人難保況南北兩屬部數十年捍邉者今為頗勒格巴斡誘脇傾族随去邉境蕩揺如此可虞若忽之而往豈聖人萬舉萬全之道哉廼者太白晝見京師地震又北方有赤色遲明始散天之示象冀有以警悟聖意脩徳銷變矧夫逸逰古人所戒逺自周秦近逮隋唐與遼皆以是生釁可不慎哉可不畏哉泰和二年将幸長樂川刑部尚書李愈切諫曰方今戍卒貧弱百姓騷然三叉尤近北陲恒防外患兼聞泰和宫在兩山間地形狹隘雨潦遄集固不若北宫池臺之勝優㳺閒適也上不從夏四月愈復諫曰北部侵我舊疆千有餘里不謀雪耻復欲北幸一旦有警臣恐丞相襄樞宻副使實黙等不足恃也況皇嗣未立羣心未定豈可逺事逸㳺哉上異其言元世祖時趙天麟上策曰臣聞先王之臨制也馬上得之而不以馬上治之順天取之而又以順天守之當其四邉有警中夏未寧方方興傒后之心在在冀更生之日有天吏之濟世不得已而用兵事在合宜心非自豫迨乎荆榛絶柢烽火沈光安不忘危因時講武故春夏秋冬之事有蒐苗獮狩之名轅置旃以為門褐纒質以為𣙗前禽遂失即鹿由虞不韋陳厲飾之文氣嚴三鼓戴聖紀合圍之戒禮用三驅且振旅茇舍治兵大閱于以順少長而習威儀于以辨號名而讀書契表田莱而是務防戰事之不虞豈耽嗜云乎哉亦舉儀而已矣今國家起統于𤣥㝠之域習俗于弓矢之中在潜龍之時而派天潢之尊馳志於斯猶為未可況飛龍之後而承大器之重存情於此云何自輕國家毎春日載陽乗輿北邁金風薦爽大駕南迴因田事以選車徒采珍異以供食膳臣疑太甚敢罄愚衷庶陛下之思之顧芻蕘而不棄夫弥旬延月出伏從禽並細栁之龍臺接長楊之熊館霓旌蔽日靁鼓震天九重之兵衞森森萬乗之儀鑾澟澟馳驅迅速回互騰驤天馬紛飛斜衝横騖加之以崇崗峻阜積藪長林路不但於千盤坂或同於九折竊以千金之子坐不垂堂今陛下富無倫貴無敵豈宜頻冒此險哉夫敦弓楛矢長㦸利戈窮山澤以設罝罘合周圍而縦鷹犬雲霄杳漠無可避之捷禽陵谷交雜無得逃之鷙獸莫不摧翎卸羽絓角羈蹄濺血滿於荒蕪號聲慟於人耳竊以君子見其生而不忍見其死諸侯哀觳觫而行仁術今陛下禀聖人之資居聖人之位貴洽好生之徳用推不忍之心豈宜屢為此事哉文王不敢盤於逰畋周公美之漢文日射狐兔賈山悼之至於俎豆之實固當親射庖厨之奉則有司存伏望陛下游神太素端慮施仁常存愛物之心簡夫遊畋之事革延日弥旬之例戒光武夜歸之失虞徳被動植之物湯羅寛鳥獸之生如此則承恩聿致於告祥聞樂因之而率舞使有知之民傾心感戴未服之國嚮化来賔且如廣廈之下細旃之上公卿在後師保居前訪治道以調化機計公論以和玉燭周旋揖讓不其樂哉又何須親勞耎脆逞雄心於兵馬之間屈犯塵埃取㣲樂於銜橜之上故曰好動不及好静有為不若無為斯天下之想聞乃聖王之大道也御史大夫托克托扈從上都還至鷄鳴山之渾河帝将畋于保安州馬蹶托克托諫曰古者帝王端居九重之上日與大臣宿儒講求治道至於飛鷹走狗非其事也帝納其言世祖車駕廵幸上都監察御史崔敬上䟽曰太祖以上都為清暑之地車駕行幸嵗以為常閣有大安殿有鴻禧睿思所以保養聖躬適起居之宜存畏敬之心也今實喇鄂爾多思乃先皇所以備宴㳺非常時臨御之所今陛下方以孝治天下屢降徳音祇行宗廟親祀之禮雖動植無知㒺不歡悦而國家多故天道變更臣備貟風紀以言為職願大駕還大内居深宫嚴宿衛與宰臣謀治道萬㡬之暇則命經筵進講究古今盛衰之由緝熙聖學乃宗廟之福也成宗元貞二年監察御史李元禮上諫幸五臺䟽曰臣聞古人有言曰天下之得失生民之利害社稷之大計惟所見聞而不繫職司者宰相得行之諫官得言之今朝廷雖不設諫官監察御史職當言路即諫官也烏可坐視得失而無一言以禆益聖治萬分之一哉伏見五臺剏建寺宇土木既興工匠夫役不下數萬人附近數路州縣供億頓重男不暇耕女不暇織百物踊貴則民将有不聊生者矣又聞太后親臨五臺布施金幣廣資福利其不可行者有五何則時當盛夏禾稼方茂百姓嵗計全仰秋成扈從經過千乗萬騎不無蹂躪其不可一也太后春秋已髙親勞聖體往復暑途數千里山川險惡不避風日輕冒霧露萬一調養失宜悔之無及其不可二也陛下即位以来遵守祖宗成憲正當兢業持盈之日凡上舉動必書簡册以貽萬世之則書而不法将焉用之其不可三也夫財不天来皆出於民今朝廷費用百倍昔時而又勞民傷財以奉土木其不可四也佛者本西方聖人以慈悲方便為教不與物競雖窮天下珎玩供養不為喜雖無一物為獻亦不為怒今太后為國家為蒼生崇奉祈福福未獲受而先勞聖體聖天子曠定省之禮軫思親之懐其不可五也伏願中途回轅端居深宫儉以養徳静以頥神上以循先皇后之懿範次以盡聖天子之孝心下以慰元元之望如此則不待祈福而福自至矣臣元禮謬當言路不避僭越而惓惓不已者誠以臣子愛君之心切冀其一悟聖聰與其受不言之責寧獲敢言之罪天下幸甚武宗初即位上都即廵狩賽音布拉克之地翰林學士王文用上奏曰先帝新棄天下陛下廵狩不以時還無以慰安元元宜輒還京師且臣聞人君猶北辰然居其所而衆星拱之不在勤逺畧也帝悟即日可其奏文宗幸䕶國仁王寺泛舟玉泉監察御史盖苗進曰今頻年不登邉隅不靖政當恐懼脩省何暇逸逰以臨不測之淵乎帝嘉納之賜以對衣上尊即日還宫順帝時車駕将田扵栁林御史臺臣諫曰陛下春秋鼎盛宜思文皇付托之重致天下於隆平況今赤縣之民供給繁勞農務方興而馳騁氷雪之地倘有銜橛之變奈宗廟社稷何歴代名臣奏議卷二百八十七
