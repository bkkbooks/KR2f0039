body:
  text: 歷代名臣奏議卷一百三明楊士竒等撰都邑晉侯謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也韓獻子將新中軍公揖而入曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民從教十世之利也夫山澤林盬國之寶也國饒則民驕逸近寶公室乃貧不可謂樂公說從之遷於新田漢高帝五年劉敬戍隴西過洛陽髙帝在焉劉敬脫挽輅衣其羊裘見齊人虞將軍曰臣願見上言便事虞將軍欲與之鮮衣劉敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣於是虞將軍入言上上召入見賜食已而問劉敬劉敬說曰陛下都洛陽豈欲與周室比隆哉上曰然劉敬曰陛下取天下與周室異周之先自后稷堯封之邰積德纍善十有餘世公劉避桀居豳太王以狄伐故去豳杖馬箠居岐國人爭隨之及文王為西伯斷虞芮之訟始受命吕望伯夷自海濱來歸之武王伐紂不期而㑹孟津之上八百諸侯皆曰紂可伐矣遂滅殷成王即位周公之屬傅相焉乃營成周洛邑以此為天下之中也諸侯四方納貢職道里均矣有德則易以王無德則易以亡凡居此者欲令周務以德致人不欲依阻險令後世驕奢以虐民也及周之盛時天下和洽四夷鄉風慕義懷德附離而並事天子不屯一卒不戰一士八夷大國之民莫不賓服效其貢職及周之衰也分而為兩天下莫朝周不能制也非其德薄也而形勢弱也今陛下起豐擊沛收卒三千人以之徑往而卷蜀漢定三秦與項羽戰滎陽爭成皋之口大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數哭泣之聲未絶傷痍者未起而欲比隆於成康之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具也因秦之故資甚美膏腴之地此所謂天府者也陛下入關而都之山東雖亂秦之故地可全而有也夫與人鬬不扼其骯拊其背未能全其勝也今陛下入關而都案秦之故地此亦扼天下之骯而拊其背也髙帝問群臣群臣皆山東人爭言周王數百年秦二世即亡不如都周上疑未能决及留侯明言入關便即日車駕西都關中劉敬說上都關中上疑之左右大臣皆山東人多勸上都洛陽雒陽東有成皋西有殽澠背河向雒其固亦足恃張良曰雒陽雖有此固其中小不過數百里田地薄四靣受敵此非用武之國夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三靣而固守獨以一靣東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬說是也於是上即日駕西都關中晉簡文帝時桓溫欲經緯中國以河南粗平將移都洛陽朝廷畏溫不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諌著作郎孫綽乃上疏曰伏見征西大將軍臣溫表便當躬率三軍討除二寇蕩滌河渭清灑舊京然後神旗電舒朝服濟江反皇居於中土正玉衡於天極斯超世之宏圖千載之盛事然臣之所懷竊有未安以為帝王之興莫不藉地利人和以建功業貴能以義平暴因而撫之懷愍不建淪胥秦京遂令胡戎交侵神州絶綱土崩之釁誠由道喪然中夏蕩蕩一時橫流百郡千城曽無完郛者何哉亦以地不可守投奔有所故也天祚永革中宗龍飛非惟信順協於天人而已實賴萬里長江畫而守之耳易稱王公設險以守其國險之時義大矣哉斯已然之明效也今作勝談自當任道而遺險校實量分不得不保小以固存自喪亂已來六十餘年蒼生殄滅百不遺一河洛丘墟函夏蕭條井堙木刋阡陌夷滅生理茫茫永無依歸播流江表已經數世存者長子老孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復𬗟成遐域泰山之安既難以理保蒸蒸之恩豈不纒於聖心哉溫今此舉誠欲大覽始終為國逺圖向無山陵之急亦未首決大謀獨任天下之至難也今發憤忘食忠慨亮到凡在有心孰不致感而百姓震駭同懷危懼者豈不以反舊之樂賖而趨死之憂促哉何者植根於江外數十年矣一朝拔之頓驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業富者無三年之糧貧者無一餐之飯田宅不可復售舟車無從而得捨安樂之國適習亂之鄉出必安之地就纍卵之危將頓仆道塗飄溺江川僅有逹者夫國以人為本疾寇所以為人衆喪而寇除亦安所取哉此仁者所宜哀矜國家所宜深慮也自古今帝王之都豈有常所時隆則宅中而圖大勢屈則遵養以待㑹使德不可勝家有三年之積然後始可謀太平之事耳今天時人事有未至者矣一朝欲一宇宙無乃頓而難舉乎臣之愚計以為且可更遣一將有威名資實者先鎮洛陽於陵所築二壘以奉衛山陵掃平梁許清一河南運漕之路既通然後盡力於開墾廣田積榖漸為徙者之資如此賊見亡徴勢必逺竄如其迷逆不化復欲送死者南北諸軍風馳電赴若身手之救痛癢率然之應首尾山陵既固中夏小康陛下且端委紫極增修德政躬行漢文簡朴之至去小惠節遊費審官人練甲兵以養士滅寇為先十年行之無使隳廢則貧者殖其財怯者先其勇人知天德赴死如歸以此致政猶運諸掌握何故捨百勝之長理舉天下而一擲哉陛下春秋方富溫克壯其猷君臣相與𢎞養德業括囊元吉豈不快乎今溫唱髙議聖朝互同臣以輕微獨獻管見出言之難實在今日而臣區區必聞天聽者竊以無諱之朝狂瞽進說芻蕘之謀聖賢所察所以不勝至憂觸冒干陳若陛下垂神溫少留思豈非屈於一人而允億兆之願哉如以干忤罪大欲加顯戮使丹誠上逹退受刑誅雖沒泉壤尸且不朽宋孝武帝大明二年朝議欲依古制置王畿揚州移治㑹稽猶以星變故也尚書吏部郎沈懷文曰周制封畿漢置司𨽻各因時宜非好相反安民寧國其揆一也茍民心所安天亦從之未必改今追古乃致平一神州舊壤歷代相承異於邉州或罷或置既物情不說容虧化本上不從梁元帝承聖二年下詔將還建康將軍胡僧祐黃羅漢宗凛劉瑴諫曰建業王氣已盡與虜止隔一江若有不虞悔無及也上令朝臣議之朱買臣上言曰建康舊都山陵所在荆鎮邉疆非王者之宅願陛下勿疑以致後悔臣家在荆州豈不願陛下居此但恐是臣富貴非陛下富貴耳後魏孝文帝外示南討意在謀遷齊於明堂左人詔太常卿王諶親令龜卜易筮南伐之事其兆遇革帝曰此是湯武革命順天應人之卦也羣臣莫敢言任城王澄進曰易言革者更也將欲應天順人革君臣之命湯武得之為吉陛下帝有天下重光纍葉今曰卜征乃可伐叛不得云革命此非君人之卦未可全為吉也帝厲聲曰象云大人虎變何言不吉也澄曰陛下龍興既久豈可方同虎變帝勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣子豫參顧問敢盡愚𠂻髙祖既鋭意必行惡澄此對久之乃解曰各言其志亦復何傷車駕還宫便召澄未及升階遙謂曰向者之革卦今更欲論之明堂之忿懼衆人競言阻我大計故厲色怖文武耳想解朕意也乃獨謂澄曰今日之行誠知不易但國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可文治移風易俗信為甚難崤函帝宅河洛王里因兹大舉光宅中原任城意以為何如澄曰伊洛中區均天下所據陛下制御華夏輯平九服蒼生聞此應當大慶帝曰北人戀本忽聞將移不能不驚擾也澄曰此既非常之事當非常之人所知惟須決之聖懷此輩亦何能為也髙祖曰任城便是我之子房加撫軍大將軍太子少保又兼尚書左僕射隋文帝嫌長安城制度狹小將遷都夜與髙熲蘇威二人定議散騎常侍庾季才旦而奏曰臣仰觀𤣥象俯察圖記龜兆允襲必有遷都且堯都平陽舜都冀土是知帝王居止世代不同且漢營此城經今將八百嵗水皆鹹鹵不甚宜人願陛下協天人之心為遷徙之計髙祖愕然謂熲等是何神也遂發詔創新都於龍首山唐武后時麟臺正字陳子昻上諫靈駕入京書曰臣聞明主不惡切直之言以納忠烈士不憚死亡之誅以極諌故有非常之策者必待非常之時有非常之時者必待非常之主然後危言正色抗議直辭赴湯鑊而不回至誅夷而無悔豈徒欲詭世誇俗厭生樂死者哉實以為殺身之害小存國之利大故審計定議而甘心焉况乎得非常之時遇非常之主言必獲用死亦何驚千載之跡將不朽於今日矣伏惟大行皇帝遺天下棄群臣萬國震驚百姓屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不冀䝉聖化獲保餘年太平之主將復在於今日矣况皇太后又以文母之賢叶軒宫之輝軍國大事遺詔決之唐虞之際於斯盛矣臣伏見詔書梓宫將遷西京鑾輿亦欲陪幸計非上策智者失圖廟堂未聞骨鯁之謀朝廷多有順從之議愚臣竊惑以為過矣伏自思之生聖日沐皇風摩頂至踵莫非亭育不能歷丹鳳抵濯龍北面玊階東望金屋抗音而正諌者聖王之罪人也所以不顧萬死乞見一言願蒙聽覽甘就鼎鑊伏惟陛下察之臣聞秦據咸陽之時漢都長安之日山河為固天下服矣然猶北假胡苑之利南資巴蜀之饒自渭入河轉關東之粟踰沙絶漠致山西之寶然後能削平天下彈壓諸侯長轡利策橫制宇宙今則不然燕代迫胸奴之侵巴隴嬰吐蕃之患西蜀疲老千里贏糧北國丁男十五乘塞嵗月奔命其弊不堪秦之首尾今為闕矣即所餘者獨三輔之間耳頃遭荒饉人被洊饑自河而西無非赤地循隴已北罕逢青草莫不父兄轉死妻子流離委家喪業膏原潤莾此朝廷之所備知也賴以宗廟神靈皇天悔禍去嵗薄稔前秋稍登使羸瘵之餘得保性命天下幸甚可謂厚矣然則流人未返田野尚蕪白骨縱橫阡陌無主至於蓄積猶可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乘萬騎何方取給況山陵初制穿復未央土木工匠必資徒役今欲率疲弊之衆興數萬之軍徴發近畿鞭撲羸老鑿山採石驅以就功但恐春作無時秋成絶望凋瘵遺噍再罹饑一作艱苦倘不堪其弊必有逋逃子來之頌其將何詞以述之此亦宗廟之大機不可不深一作審圖也況國無兼嵗之儲家鮮匝時之蓄一旬不雨猶可深憂忽加水旱人何以濟陛下不深察始終獨違群議臣恐三輔之弊不止如前日矣且天子以四海為家聖人包六合為宇宙歷觀邃古以至於今何嘗不以三王為仁五帝為聖故雖周公制作夫子著眀莫不著述堯舜憲章文武為百王之鴻烈作千載之雄圖然而舜死陟方葬蒼梧而不返禹㑹群后歿稽山而永終豈其愛蠻夷之鄉而鄙中國哉實欲將示聖人之無外也故能使墳籍以為美談帝王以為髙範況我巍巍大聖轢帝登皇日月所照莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈不察之愚臣竊為陛下惜也且景山崇麗秀冠羣峯北對嵩邙西望汝海居祝融之故地連太昊之遺墟帝王圖跡縱橫左右園陵之美復何加焉陛下曽未察之謂其不可愚臣鄙見良足尚矣況瀍澗之中天地交㑹北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據關河之寶以聖眀之主養淳粹之人天下和平恭已正南面而已陛下不思瀍洛之壯觀關隴之荒蕪遂欲棄太山之安履焦原之險忘神器之大寶徇曽閔之小節愚臣暗昧以為甚也陛下何不覽諌臣之策採行路之謡咨謨太后平章宰輔使一作協蒼生之望知有所安天下豈不幸甚昔者平王遷周光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美為始王漢書載為代祖豈其不願孝哉何聖賢褒貶於斯濫矣實以時有不可事有不一作必然蓋欲遺小存大去禍歸福聖人所以為貴也夫小不忍而亂大謀仲尼之至誡願陛下察之若以臣愚不用朝議遂行臣恐關隴之憂無時休息臣又聞太原蓄巨萬之倉洛口積天下之粟國家之寶斯為大矣今欲捨而不顧背以長驅有識震驚天下失望倘鼠竊狗盜萬一不圖西入陜州之郊東犯武穴之鎮盜敖倉一抔之粟陛下何以預遏之此天下之至機不可不深懼也雖則盜未旋踵誅刑已及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後圖者失國之利器不可以示人斯言不徒設也固願陛下念之臣西蜀野人本在林藪幸屬交泰得遊王國故知不在其位者不謀其政亦欲退身巖谷滅跡朝廷竊感婁敬委輅干非其議圖漢策於萬全取鴻名於千古臣何獨怯而不及之哉所以敢觸龍鱗死而無恨庶萬有一中或垂察焉臣子昻誠惶誠恐死罪死罪代宗時郭子儀為京城留守自變生倉卒賴子儀復安故天下皆咎程元振羣臣數論奏元振懼乃說帝都洛陽帝可其計子儀奏曰雍州古稱天府右隴蜀左崤函襟馮終南大華之險背負清渭濁河之固地方數千里帶甲十餘萬兵彊士勇真用武之國秦漢所以成帝業也後或處而泰去而亡者不一姓故髙祖先入關定天下太宗以來居洛陽者亦鮮先帝興朔方誅慶緒陛下席西土戮朝義雖天道助順亦地勢則然比吐蕃馮陵而不能抗者臣能言其略夫六軍皆市井人竄虛名逃實賦一日驅以就戰有百奔無一前又宦豎掩迷庶政荒奪遂令陛下倣徨暴露越在陕服斯委任失人豈秦地非良哉今道路流言不識信否咸謂且都洛陽洛陽自大盜以來焚埃略盡百曹榛荒寰服不滿千戶井邑如墟豺狼羣皥東薄鄭汴南界徐北綿懷衛及相千里蕭條亭舍不烟何以奉萬乘牲餼供百官次舍哉且地狹厄裁數百里險不足防適為鬬埸陛下意者不以京畿新罹剽蹂國用不足乎昔衛為狄滅文公廬於曹衣大布之衣冠大帛之冠卒復舊邦况赫赫天子躬儉節用寧為一諸侯下哉臣願陛下斥素餐去冗食抑閹寺任直臣薄征弛役恤隱撫鰥委宰相以簡賢任能付將臣以訓兵禦侮則中興之功日月可冀惟時邁亟還見宗廟謁園陵再造王家以幸天下帝得奏泣謂左右曰子儀固社稷臣也朕西決矣乘輿還子儀頓首請罪帝勞曰用卿晚故至此乃賜鐡劵圖形淩烟閣昭宗乾寧初朱朴擢國子毛詩博士上書言當世事議遷都曰古王者不常厥居皆觀天地興衰隨時制事關中隋家所都我實因之凡三百嵗文物資貨奢侈僭僞皆極焉廣明巨盜陷覆宫闕局署帑藏里閈井肆所存十二比幸石門華隂十二之中又亡八九髙祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東漢輿鳳林為之關南菊潭環屈而流屬於漢西有上洛重山之險北有白崖聨絡乃形勝之地沃衍之墟若廣浚漕渠運天下之財可使大集自古中興之君去已衰之衰就未王而王今南陽漢光武雖起而未王也臣視山河壯麗處多故都已盛而衰難可興已江南土薄水淺人心囂浮輕巧不可以都河北土厚水深人心彊愎狠戾不可以都惟襄鄧實惟中原人心質良去秦咫尺而有上洛為之限永無夷狄侵軼之虞此建都之極選也不報宋仁宗時陕西四路安撫沿邉招討使范仲淹上論修建北京狀曰臣危言孤立久荷聖知當此旰昃之憂豈可循默自守雖以言而取罪亦以盡臣子之心臣先於景祐三年五月初在開封府曽進劄子言西洛帝王之宅絶無儲備乞聖慈以將有朝陵為名使東道有餘則運而西上西道有餘則運而東下數年之間庶幾有備太平則居東京舟車輻輳之地以便天下急難則守西洛山河之宅以保中原當時臣言西洛可營者以備急難也今北事既動營洛已晚臣今别有愚見請一二以陳之臣竊聞修建北京以禦大敵以臣料之可張虛聲未可為倚何哉河朔地平去邉千里敵騎豪健晝夜兼馳不十數日可及澶淵陛下乘輿一動千乘萬騎非數日可辦倉卒之間敵騎已近欲進北京其可及乎此未可一也又承平已久人不知戰聞敵大至羣情憂恐陛下引憂恐之師進涉危地或有驚潰在爪牙之臣誰能制之此未可二也又北京四靣盡平絶無險厄之地儻乘輿安然到彼而敵騎旁過直趨河南於澶淵四靣乘凍而渡京師無備將何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可傍無堅甲利兵可禦陛下行在河朔心存京師豈無回顧之大憂乎此未可三也假使大河未凍敵不得渡而直圍守澶淵聲言向闕以割地㑹盟為請當此之時京師無備烽塵俯逼陛下能堅守不動而拒請乎唐明皇時祿山為亂舊將哥舒翰以四十萬兵屯守潼關請不出戰且以困賊楊國忠促令進討一戰大敗遂陷長安今京師無備敵或南牧朝廷必促河朔諸將出兵截戰萬一不勝則有天寶之患朝廷將安往乎昔煬帝盤逰淮甸違逺關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立於朔方天下不復為唐矣德宗欲幸益郡李晟纍奏乞且幸山南以繫人心乃知朝廷萬邦之根本今陕西河北聚天下之重兵如京師搖動違逺重兵則奸雄奮飛禍患四起臣聞天有九閽帝居九重是以王公法天設險以安萬國也易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京髙城深池軍民百萬足以為九重之備乘輿不出則聖人坐鎮四海而無煩動之勞鑾輿或出則大臣居守九重而無回顧之憂矣彼或謀曰邉城堅牢不可卒攻京師坦平而可深犯我若修固京師使不可犯則伐彼之謀而沮南牧之志矣寇入之淺則邉壘已堅寇入之深則都城已固彼請割地我可弗許也彼請决戰我可弗出也進不能為患退不能亡歸然後因而撓之返則追之縱有鈔掠可邀可奪彼衰我振未必不大勝豈非陛下保社稷安四海之全䇿哉或曰京師王者之居髙城深池恐失其體臣聞後唐末契丹以四十萬衆送石髙祖入朝而京城無備閔宗遂亡石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其失體哉臣但憂國家之患而不暇顧其失體也若以修築城隍為失體不猶愈於播遷之禍哉朝廷百辟必曉此事但懼議者謂其失體而不敢言臣任在西陲非當請間而言此事誠罪人也然臣子之心豈敢忘君親之憂況臣素來愚拙唯知報國而不知其受謗矣昔奉春君負販之夫勸髙祖都關中而張良贊之翌日命駕臣叨預近列而輒建言比之奉春君之僭未甚為過至於西洛帝王之宅太祖營修有意在子孫表裏山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河東之㑹要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才謀重臣天下幸甚宋庠論封畿上奏曰謹按周制王者都畿千里千里之地謂之寰內井田百萬是之自出兵强地正以制諸侯漢都關中亦分京兆馮翊扶風為三輔又取河南河內河東𢎞農四郡合三輔之劇遣司𨽻校尉以督之雖地非幅員侈於周制若其包山河之固冠郡國之首置使持節不與部刺史為等亦王畿之意也魏晉而下始以司𨽻之治為司州南北分爭名實始替然江左建國常以宰相帶揚州刺史朝廷根本此焉是賴至唐有天下復都長安乃因關河形便分州郡為十道而關內一道全是王畿雖無司𨽻之名猶以華同岐三州為上輔河南為東都而京畿都畿並置觀察使此皆强幹據極統御庶邦國家因循五代即都於汴地非京邑之舊州無輔畿之實自祖宗以聖武神略剗平僭僞萬方臣妾㑹於京師雖城闕雄尊閭里繁衍而諸縣之外便屬他州州雖密邇即為别路畿內十六縣才置提㸃官二員人瑣位卑降於漕運之局寧所謂尊甸服重王官者哉臣欲望略依周漢舊章以三京所環之州畫為畿內曹濮單陳蔡鄭滑等八州輔開封為中畿以孟汝二州輔河南為西畿以宿亳二州輔應天為東畿併三畿之州升曰近輔通置畿內觀察使一人以統之取臺省給舍為出入之資凡輔州並乞正除刺史取待制官以下正郎以上為出入之資俸秩班品異於列郡除去今日虛名之弊且示聖朝正官之漸然後舉畿內之籍均其租稅輕其繇役踵漢故事徙天下豪族內實三畿之州四靣設關梁譏出入以嚴王制應禁兵營府分據寰內如此則海內震服而王室安矣髙宗時趙元鎮論西幸事宜狀曰臣昨奉聖訓條具目今事宜除已奏聞外臣竊惟東晉渡江全有淮甸羣賢協力僅保一隅亦以其外無陵侮之憂故也今强敵南侵視大江如履平地淮南故非我有而江左郡縣凡都㑹形勢之地􅊖經蹂踐其視東晉萬萬不侔矣雖欲立國於此其可得乎况能平定齊魯恢復晉趙定建極宅中之計惟關中奧區兵民可恃太祖皇帝時已有遷都之議陛下必欲經營中原當自關中始今關中半失之矣欲經營關中當自蜀中始欲幸蜀中當自荆南始雖然漢中鄰長安而興利鄰秦鳳太平之久負販往來山谷險絶皆成蹊徑昨長安潰兵徑趨興元全無阻遏自興元趨劒門更無棧道而劔門兩間亦有捷路可至成都然則蜀中所恃之險尚須措置使絶不通行然後可保張浚之行専委召集西兵未聞營度守蜀也今嶽鄂路通可擇使臣三兩人齎詔付浚及選除利州䕫峽等路監司守臣委之協謀為守蜀之備俟浚回報然後决意西行且駐荆南徐圖所向為今日計無踰於此者謹具條畫下項臣嘗謂天下之事必有一定之論匹夫之謀一身商賈之謀一家亦不可繆悠然轉徙終無所守況欲立國為久逺之業去嵗四月初陛下發臨安幸建康慨然有克復中原之意臣嘗上言欲守江南當以淮為外戶乞早發諸將屯守淮南委杜充節制之兵既不遣充亦不行淮卒不守也後欲守江以民丁為兵以王羲叔為使臣嘗上言民不足恃羲叔不可用言卒不行而江亦不守也始議巡幸不敢為戰守之策艱關水陸棲泊㑹稽及洪州失守復幸平江為決戰之議已而興國有警進不能前則移蹕四明自始及終元無定論儻林之平所遣海船不到則束手端坐更無脫免之計每思及此為之寒心故臣謂巡幸之宜願以今嵗為戒也今秋既不可再登海船則捨上流荆襄之行無術矣臣區區愚陋不足仰承睿訓惟陛下決擇元鎮又奏曰臣已具愚見仰瀆聖聰尚慮所言未究所藴重為陛下陳之且車駕駐蹕所在天下之根本也外設藩籬之固中嚴堂陛之居然後從中制外運動得宜譬之人身有腹心有手足不可易置也今捨二浙澤國險阻之區而都建康顯敞衝要四逹交爭之地修飭宫城移置官府悉庫藏金帛隨之不鑒維揚倉卒之禍而為久逺安居之計實臣所未諭也若謂建康古帝王之宅得形勢之利然自堯舜三代秦晉而下建都不一各便其所宜而未嘗相因不聞後王之興必居前王之地也若謂北臨淮甸足以係中原之心便於進取之勢然移蹕已復半年矣進取之計果如何中原之人歸者幾何響應而起者又幾何若謂易於號令然前此兩經捍敵車駕進臨鼓作士氣諸將奮勵承命即前倘朝廷威令不行駕馭無術雖在營壘中無益也不考利害之實不度時措之宜採書生之髙談按史冊之故事而先自致於顛危之地乃曰欲圖恢復臣竊以為不可雖然臣知定都建康未為得策而陛下茍因臣說遽議回鑾臣亦以謂不可也自朝廷南渡中外臣民莫不以恢復之說獻於陛下臣自郎官歷臺諫至踐宰輔前後進計於陛下亦以此為先陛下篤於孝悌固亦未嘗不在是也然而臣所期於陛下者不忘恢復之念常為恢復之謀仰順天心俯鑒人事度德量力觀釁而動不敢輕舉而易彂也今恢復之勢已張恢復之名已正凡平日獻議之人以謂恢復之功可跂而待乃欲旋幸二浙偷安目前自為退縮削弱之計必以陛下為不孝不悌之主以臣為不忠不義之人夫不孝不悌之名固陛下不可受而不忠不義之罪臣亦安敢當之此議論之臣他日必不見貸者臣所謂欲議回鑾亦不可也蓋一動移之間便有强弱之勢不可遽也嗚呼採虛名忘實利張虛聲受實禍其利害為如何而浮言易動主聽易搖使任責者難於致力而天下之事所以易敗而無功也今為陛下計唯是委任羣臣不責近效俾盡前日措置之䇿必取今日規模之利用副陛下孝悌之心不難也如臣怯懦愚暗實不足以及此人有能不能前日之規模措置臣之所能也今日之規模措置非臣之所能也不强其所不能古人所取也今以不能之事責人以必能其人殺身不顧也赤族不恤也其如國事何進讀帷幄雖不預國論萬一陛下咨訪見及臣之所言不過如此其言非今日之宜則其人難語以今日之責矣然則何所用之臣所以不避雷霆之怒仰干斧鉞之誅披寫血誠控告陛下誠不敢愈恱取容以欺聰聽耳伏幸察臣哀切之懇曲垂惻隱之仁恢廓網羅保全腰領投之於無用之地臣雖死之日猶生之年兩浙西路安撫使葉夢得上奏曰右臣伏聞朝廷已命翁彥國經理建康以備巡幸竊惟國家定鼎汴陽固萬世無窮之計然而聖慮深逺以為萬一之備或有不得已者則形勢所在不可不考建康居東南要津實恃大江以為險然自豫章而東長沙而北江陵而西江行數千里控扼之㑹皆以武昌為襟帶孫權建鼎足三方之勢抗魏制蜀倚為用武之地故周瑜吕䝉因之以破曹操擒關羽晉元帝南遷首命陶侃以龍驤將軍為太守故蘇峻之亂卒賴其效宋齊之後専事隴蜀不以為意侯景長驅無所忌憚遂致梁禍唐以鄂嶽為一道觀察嘗委以重人至牛僧孺罷相文宗復以鄂州為武昌軍置節度使特命僧孺守之則歷代兼制江湖之意形勢大略可見唐雖都關中與吳晉異亦不敢忽也至於所以夾輔建康者又環之有五城曰石頭城曰冶城曰臺城曰苑城曰新城蓋大江之險特可為之限隔而所以守江者必有為之捍禦今惟新城在揚州之境利害所繫差輕其餘四城皆不可廢韓滉鎮浙西當朱泚之亂潛修石頭城人疑其異志亦可知石頭城之為利臣愚竊謂鄂州宜建為帥藩宿以重兵以為建康之西門石頭城當尋其故址興輯之分備屯戍以謹大江之守然後建康可恃以固伏望聖慈特命大臣參議施行臣職忝論思雖事非所部顧在今日匹夫願自竭以冀秋豪之補不敢以犯分為嫌輒獻其愚干冒天威臣無任惶懼激切屏營之至夢得為江南東路安撫制置大使又上宫室議曰臣聞古者帝王宫室之制不盡載於經而略見於周官與禮為門者五為朝者三為寢與宫者皆六所謂五門者曰臯門曰庫門曰雉門曰應門曰路門臯門先儒謂王城之門庫門次之宗廟社稷其內雉門王宫之門故旁設兩觀此五門之别也所謂三朝者曰外朝曰內朝曰燕朝周官朝士掌外朝之法凡公卿大夫公侯伯子男三公皆有定位是為外朝司士掌朝儀之位三公卿大夫王族故士􅍑士太僕太右皆有定位是謂內朝太僕掌王之服位王眂治朝則前王位而退入亦如之是謂燕朝禮玊藻言王朝服以日視朝於內朝退適內寢聽政先儒謂外朝在庫門之外凡國有大事致萬民而詢焉則御之內朝在路門之外凡日視朝見羣臣則御之燕朝在路門之內凡日退而聽政則御之此三朝之别也所謂六寢六宫者先儒以周官宫人掌王之六寢之修為言謂路寢一小寢五蓋在路門之內而六宫王后之居又在其後視王之六寢此六寢六宫之制也秦漢而下㳂革不同即唐之近制考之唐以宣政為前殿謂之正衙即周之內朝也以紫宸為便殿謂之閣即周之燕朝也而無外朝日御正衙見羣臣謂之常參朔望薦食諸陵寢有思慕之心不能臨前殿即喚仗入紫宸謂之入閣至五代其禮寖廢常參不復日見羣臣惟大臣一朝便殿而已後唐明宗即位始詔百官五日一隨宰相入見便殿謂之起居本朝因唐之舊參酌古制更為增損今汴都南薰朱雀門宜為古之雉門以大慶殿為外朝故嵗旦大朝會則御之而其門即應門也以文德殿為內朝故月朔合六參官入見則御之而其門即路門也謂之過殿其旁設東西閣門則倣唐制以紫宸垂拱為閣也遇朔不過殿則喚仗入閣而御紫宸與望及五日百官一起居皆御之以垂拱為燕朝則日御以聽政蓋相仍唐室舊內增修不得不然今陛下既以建康為别都則視周洛邑與汴京嵗大朝會見百官御大慶月朔過殿御文德望與六參御紫宸日御垂拱此四殿有不可闕而忌前不坐垂拱與吏部引見選人軍頭司呈試武藝等本朝所增蓋又有崇政後殿講筵有邇英殿亦不可廢此典禮所在將以垂後經逺固宜參備端門亦當增為三門以正天子之禮則朝羣臣蒞四夷賦政出令行禮正名上擬洛邑次不失祖宗之意若夫髙下之度廣狹之數則先王初不為定制各視時而為之商之重屋堂髙三尺周之眀堂堂髙九尺若禹卑宫室則夏之世室其髙一尺而已其髙下固不等也周之路門不容乘車之五箇為丈有六尺五寸應門二徹三箇為二丈四尺其廣狹固不同也恭惟陛下以寬仁信兆民以惇朴先天下聖志固自有定今宫城之內其地有限若有司推明德意但取典禮所不可廢者而不為觀美則與其大而有闕不若狹而能備惟六寢六宫在內中周禮既不詳祖宗成法見於汴京者因時便宜當出聖裁非臣所敢及謹昧死上宫室議伏惟陛下垂意採擇夢得又奏繳行宫圖并宫室劄子曰臣近准尚書省劄子備奉聖旨以本府行宫昨緣臨時修蓋不如法及百司等屋宇亦因旋行修造致多茍簡専委臣相度措置立定規摹畫圖繳進逐旋如法營葺務要可以經久臣衰陋不材誤蒙重寄實非所能任承命震恐不敢輒辭退考之古昔周文武既定都於豐謂之宗周至成王欲宅洛邑乃復營之謂之成周亦曰東都以為四方道里逺近之中使朝覲貢賦取均焉及宣王遭犬戎之難㑹諸侯於東都選車馬備器械因還以居周遂中興則有正都有别都自周而然也晉重耳敗楚城濮逮齊小白正天下之義合諸侯於踐土周襄王巡守臨之春秋書天王狩于河陽魯僖公朝于王所而左氏記重耳作王宫於衡雍則天子巡狩亦作宫焉然洛誥稱用牲于郊乃社于新邑有郊有社庶邦冢君皆在則别都之禮宜略與正都同而巡狩之宫止以朝見方嶽則宜從約也今陛下巡幸東南臨安蓋巡狩之宫而以建康為别都則車駕未即還汴建康行宫受朝四方賦政出令視臨安宜有當增備者孔子頌禹之德曰卑宫室而盡力乎溝洫然則宫室雖在所備要以不侈大而卑為美漢髙祖入關命蕭何治未央宫見其壯麗而怒曰天下洶洶勞苦數嵗成敗未可知是何治宫室過度也世以髙祖為賢晉孝武時宫室弊壞謝安修之皆仰模𤣥象合體宸極後世譏焉恭惟陛下宏濟艱難聖猷恢逺勤儉之意天下聳聞臣頃者獲侍清光親所目擊雖服食器用之間有臣庶不堪者陛下皆安之今中原初定漸圖經理始用成周之制因時便事營創别都以興王業臣愚敢不上體聖志無費財無妄役無擾民參酌古今典禮所必不可闕者然後為之惟是今宫室地步昨來營繕禁中與外庭分擘去處參差不齊若止據見在地步相度即偏曲窄小其合添殿宇官府等難以安排若欲參備以為經逺持久之計則須有禁中空地那融去處非臣所敢専決今先次各草立規模措置畫到圖二本各行貼說并臣參酌古今典禮㳂革制度撰成宫室議一篇頭連在前同共繳進伏望聖慈取自睿斷行下付臣重具定本進呈所有圖內增添殿宇官府移改安排事理及那融禁中地步丈尺數目與內外防守利害合奏禀事各别具劄子畫一開陳臣學術淺陋思慮不逺聞見不廣無以仰稱陛下委使之意塵犯天威臣無任惶懼激切屏營之至夢得又奏營葺行宫制度畫一劄子曰臣遵奉聖訓先次草具到營葺行宫圖二本并宫室議一篇繳進所有圖內參考古制所當增添殿宇官府事理并那融禁中地步丈尺數目及宫城外門制度合詳具奏禀今具畫一開陳下項一周官王國皆旁為三門此天子之制也蓋五門皆取正中一門名之其旁又為兩門通為三門至雉門為王宫之門每正月之吉以垂治象則又有象魏設於門之左右謂之兩觀亦或謂之闕諸侯則不得備三門而無兩觀故獨魯以周公之賜得有兩觀則新作南門與新作雉門及兩觀見書於春秋今行宫但因建康府舊制為兩門其上增展門屋九間而已此諸侯之制也恐非典禮今打量舊城兩門各闊一丈七尺其兩間相去有地步六丈若於中間就開一門即不須改作可就立三門門前東西仗舍各有地步可以增設兩觀一行宫見今有朝殿一所并兩廊屋其朝殿兩柱已損爛中空見行計置修換其餘廊屋等並多損漏逐時八作司不住檢計補葺未嘗有虛日今契勘宫城內地步東西南北相去各一百九十餘丈東除去年淮西宣撫使張俊展套新城五十餘丈南北內教埸五十餘丈皆屬禁中在外東西相去止有九十餘丈南北自朝殿至宫門雖有九十餘丈其西面却有禁中曲尺侵過地步除外南至宫墻止有四十餘丈東面內東門小殿外即是禁中墻直至舊几筵殿後其南自舊几筵殿至宫墻亦止有二十八丈五尺今來若以朝殿為正就移向南為大慶殿却以其後基地蓋紫宸殿於紫宸殿西通禁中曲尺侵過地內蓋垂拱殿與紫宸殿作一排其前蓋文德殿即可略倣汴京舊制其那融禁中舊曲尺侵過空地西五十餘丈北三十餘丈其垂拱殿西止有十餘丈一內諸司及內藏庫軍器庫等中書門下兩省樞密學士院職事皆在內庭汴京並於皇城內建置其往來通行路皆有門為限斷其與禁中相接處非隔殿宇則為行廊今行宫除內藏庫等散於四旁隙地建造各不相連接外其御厨御藥院翰林司入內內侍講筵所等並分設於朝殿中門外兩廊兩省樞密同為一省與學士院並在外皆是一時權宜之制其通行路處並無别門內東門小殿東及內教埸三面并張俊所展新城與禁中分隔處止是築墻恐不可以示尊嚴若依前項措置正中蓋紫宸殿西蓋垂拱殿接連空地創建行廊一條直徹內教埸東墻即其南餘剩地可以依倣汴京舊制減損作兩省樞密學士院東面將小殿東舊墻改造行廊一條直徹南面可以分設御厨等緊要應奉局次二項不惟可以略備所添屋宇實外護禁中却將舊几筵殿基通南面空地直至宫墻可以建置內藏庫等凡經由行路並可度要會處創立别門其東面改作廊須那融過禁中六七丈一祖宗舊制崇政殿邇英殿皆在皇城東北內崇政即講武殿蓋試習武事之所應軍頭引見司呈試武藝及忌前不坐前殿吏部引見選人等皆坐崇政殿講筵則坐邇英殿今宫城東北别無空閒地步其西北內教埸射殿逐時引見諸軍乃祖宗講武之意若就為崇政殿即其後空地可以就建邇英殿若其地不可那融垂拱殿西改造行廊內禁中亦有空閒地步可以修建緣事並屬宫禁非臣所得干預不敢擬定右具進呈章誼乞於臨安駐蹕上奏曰臣竊見東南四五月間地氣蒸潤渡淮而南土多鹹鹵尤更卑溼今來千乘萬騎駐蹕之所宜擇形勢爽塏之地雖回鑾汴京固已戒期然暑暍方興理宜少緩臣契勘臣所管杭州東南俯瞰大江西攬湖山之秀北通大路引漕江淮荆湖之物通徹川廣京東京西諸路比之鎮江常州蘇湖等處特為雄大自頃錢氏有國最不被兵近年雖遭方臘殘破陳通攘據皆藉國威靈旋即收復兼之州廨官舍稍稍寬宏道路城郭亦易修治水泉甘香民不病暑咫尺閩越山川鞏固方兹首夏届辰如蒙警蹕南路鷁首神舟以時順動長河如帶無風濤之恐鞍馬暫休無箠䇿之勞比之淮南地勢髙爽實可以揮却炎暑暫駐六師臣與本州官吏不勝拳拳瞻望之誠伏乞宣示宰執相度施行孝宗即位欲成髙宗之志首詔經理建業以圖進取而大臣幸安計未决王阮試禮部對䇿曰臨安蟠幽宅阻面湖背海膏腴沃野足以休養生聚其地利於休息建康東南重鎮控制長江呼吸之間上下千里足以􅍑視吳楚應接梁宋其地利於進取建炎紹興間敵人乘勝長驅直搗而我師亦甚憊也上皇遵養時晦不得已與平乃駐臨安所以為休息計也三十年來闕者全壞者修弊者整廢者復較以曩昔倍萬不侔主上獨見逺覽舉而措諸事業非固以臨安為不足居也戰守之形既分動靜進退之理異也古者立國必有所恃謀國之要必負其所恃之地秦有函谷蜀有劒閣魏有成臯趙有井陘燕有飛狐而吳有長江皆其所恃以為國也今東南王氣鍾在建業長江千里控扼所㑹輟而弗顧退守幽深之地若將終身焉如是而曰謀國果得為善謀乎且夫戰者以地為本湖山回環孰與乎龍盤􅍑踞之雄胥潮奔猛孰與乎長江之險今議者徒習吳越之僻固而不知秣陵之通逹是猶富人之財不布於通都大邑而匣金以守之愚恐半夜之或失也倘六飛順動中原在跬步間况一建康耶古人有言千里之行起於足下人患不為爾知貢舉范成大得而讀之嘆曰是人傑也隆興中起居郎胡銓上建都疏曰臣聞與人鬪不扼其亢拊其背未能全勝何則其勢不便也漢髙五年都雒陽是時方有山東之亂而秦之故地又未能全有危亦甚矣儻不先都四塞之地則天下非漢有也王郎反河北獨巨鹿信都為世祖堅守此天下之根本在焉茍釋此不守則天下非漢有也故臣嘗論之項羽得關中而不能守是不扼其亢拊其背也髙帝決都關中所以扼其亢拊其背也王郎得巨鹿信都不能守是不扼其亢拊其背也世祖留意河北所以扼其亢拊其背也項羽不扼其亢拊其背所以失天下也髙帝能扼其亢拊其背所以得天下也王郎不能扼其亢拊其背所以失天下也世祖能扼其亢拊其背所以得天下也此兩漢存亡之決婁敬邳肜可謂社稷之臣矣臣竊觀今日天下大勢自淮以北則天下亢與背也建康則扼亢拊背之要地也錢塘則燕安鴆毒之危地也安處錢塘是與人鬪而不扼其亢拊其背也此項羽王郎入牛角之計也若據建康下臨中原此髙帝世祖興王之計也况今西北欲歸之人如漢民之謳吟思漢亦已久矣茍不决策移蹕定都何以繫西北延頸思歸之心乎冒瀆天聽不勝激切屏營之至歷代名臣奏議卷一百三
