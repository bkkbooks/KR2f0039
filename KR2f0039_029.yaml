body:
  text: 歴代名臣奏議巻二十九明楊士竒等撰治道唐文宗甞曰朕觀晉君臣以夷曠到傾覆當時卿大夫過邪中書侍郎李石對曰然古詩有之人生不滿百常懐千嵗憂畏不逢也晝短苦夜長闇時多也何不秉燭逰勸之照也臣碩捐軀命濟國家惟陛下鑒照不惑則安人彊國其庶幾乎上甞自謂臨天下十四年雖未致治然視今日承平亦希矣同中書門下平章事李珏曰為國者如治身及身康寕調適以自助如恃安而忽則疾生天下當無事思所闕禍亂何至哉後唐明宗時大理少卿康澄上䟽言時事曰為國家者有不足懼者五深可畏者六三辰失行不足懼天象變見不足懼小人訛言不足懼山崩川竭不足懼水旱蟲蝗不足懼也賢士藏匿深可畏四人遷業深可畏上下相徇深可畏廉恥道消深可畏毁譽亂真深可畏直言不聞深可畏也不足懼者碩陛下存而勿論深可畏者碩陛下修而靡忒上優詔奨之上方務聽納史館脩撰張昭上䟽曰臣聞安不忘危治不忘亂者先儒之丕訓靡不有初鮮克有終者前經之至戒究觀列辟莫不以驕矜怠惰有虧盛徳恭惟太宗貞觀之初𤣥宗開元之際焦勞庶政以致太平及國富兵消年髙志逸乃忽守約之道或貽執簡之譏陛下以慈儉化天下以禮法檢臣鄰絀姦邪之黨延正直之論務遵純儉以節浮費信賞必罰至公無私其創業垂統之規如貞觀開元之始碩陛下有始有終無荒無怠臣又伏念保邦之道有八審焉碩為陛下陳之夫委任審於材器聽受審於忠邪出令審於煩苛興師審於徳力賞罰審於喜怒毁譽審於愛憎議論審於賢愚嬖寵審於姦佞推是八審以決萬機庶可以臻至治明宗覽之稱善後周世宗方切於治道集賢殿學士竇儼上䟽曰歴代致理六綱為首一曰明禮禮不明則彛倫不序二曰崇樂樂不崇則二儀不和三曰熙政政不熙則羣務不整四曰正刑刑不正則巨姦不懾五曰勸農農不勸則資澤不流六曰經武武不經則軍功不盛故禮有紀若人之衣冠樂有章若人之喉舌政有統若人之性情刑有制若人之呼吸農為本若人之飲食武為用若人之手足斯六者不可斯須而去身也陛下思服帝猷寤寐獻納亟下方正之詔廓開藝能之路士有一技必得自効故小臣不揆輙陳禮樂刑政勸農經武之言世宗多見聽納宋太宗太平興國七年知相州田錫上䟽曰臣備位諫垣出官河朔雖勵忠勤之節未伸謇諤之誠尸位自知傍偟益切何以分陛下憂勤之寄何以副朝廷委用之恩敢不夙夜有思㳙埃欲効碩以芻蕘之見上希英聖之知今陛下命以頒條委之理郡親民之心無先於此茍若所理之郡事簡獄空所親之民風淳俗厚所謂蒞民有術御下有能足以副朝廷任用之恩有以彰陛下憂勤之㫖然事有無從而得簡獄有無因而久空民風未至於淳和物俗未臻於富厚雖有蒞民之術無得而施雖有御下之方無從而設況臣闇懦御下非才以臣愚䝉蒞民無術但可言其久弊恤其未安乆弊者昔近并門鄰於敵境備邊之費禦寇之兵二十餘年民不遑息未安者今以北狄邇於塞垣屯兵禦戎飛芻輓粟三十餘郡民不甚豐筦𣙜貨財網利太宻躬親機務綸㫖稍頻臣所謂網利太宻者酒麹之利但要増盈商稅之利但求出剰或偶有出剰不詢出剰之由或偶有虧欠必責虧欠之過逓年比樸只管増加逓月較量不管欠折然國家軍兵數廣支用䖏多課利不得不如此征收筦𣙜不得不如此比較窮盡取財之路莫甚於兹䟽通殖貨之源未聞適變似不知止殊無定期今乞國家以闗市之征定其常數酒麹之利授以常規或偶有増加不更求出剰或偶有虧折即可令於出剰時補填且如州縣征科農桑稅賦年豐則未聞加納嵗歉則許之倚征自然理得其中民知所措何以言之民生於利亦猶魚生於水也民困於利又如水涸於魚也碩更生於讜議别布新條當生民既庶之時是求理酌中之際天下幸甚海内幸甚臣所謂綸㫖稍頻者臣甞讀揚子法言曰聖人之道猶日中又甞覽太公六韜曰聖人之道猶龍首龍首能髙視而逺聽日中謂融明而燭幽是知君有居上之威儀臣有奉上之職業君道務簡簡則號令審而人易從臣道務勤勤則職業脩而事無壅臣伏見陛下憂民太過視事太勤每日早於崇徳殿受百僚之朝至日午於講武殿視萬幾之事或進呈甲仗或揀閱軍人或躬問縲囚或親觀戰馬自匭而進者或詳其詞理撾鼓以聞者或徇彼寃誣皆金口言詞人人省問天心揆度一一區分有以見陛下勞萬幾之神自此見臣下虧事君之職況今四方無事多壘盡平何以勞陛下如此太勤何以使三公因此無愧葢陛下慮四聰或有所未達萬幾或有所未知文王之心遂乾乾而夕惕成湯之意貴孜孜於日新然陛下何不移此勤勞於求賢何不改此精專於選士諫官則置之左右御史即委以糾彈給事中當材者許之封駮詔令起居郎有文者命之紀録言動百職如是各舉其業千官如是各得其人則何憂事不允釐何慮民不受賜今有司指揮多以劄子取聖㫖官貟注擬必須引見聽敕裁事若允當則既由宸𠂻事若未當則亦歸睿斷如此皆勞天聽安用有司致陛下視事太勤憂民太過況宫闕乃尊嚴之地軒墀列清切之班可以延佇賢良詢求理道豈宜使押來囚繫或病患軍人或虚詞越訴之徒或僥倖希恩之輩引之便殿得面天顔陛下則随事指揮臨時予奪其間有驟承顧問上懼天威或偶有敷陳稍愜聖㫖怯懦謇訥者口雖奏而未盡其心姦詐辨詞者言雖當而未必有理陛下或賜之恩澤或寘以刑名然睿鑑周通出令固無於枉濫而帝庭清肅終朝豈稱於喧囂加以條理事宜或傷頻併施行詔敕遂至稠重禮曰王言如絲其出如綸王言如綸其出如綍喻其以近及逺漸光大於萬方以言訓人可常行於百代簡而且要人則易從繁而又難人則易犯書曰臨下以簡又曰御衆以寛御衆不以寛則獲罪者多臨下不以簡則從令者少況帝王有常道禁令有常程施令貴乎必行設禁貴乎必止若令之無節奉而行之者必難禁之無時遵而止之者亦寡臣所謂網利太宻既如彼綸音稍頻又如此碩陛下寛臣敢言之罪察而審之望陛下聽臣敢諫之言擇而行之臣復有未諭聖意之事三又有奏請可行之事二未諭者今内職諸司各有公廨禁林近侍各有本廨中書是宰相職事之堂相府是陛下優賢之地今則於中書外廡置磨勘一司較朝臣功過之有無審州郡勞能之虚實睠言是職本属考功豈考功之職不脩而磨勘之名互出殊非雅稱深損大綱此臣所謂未諭聖意之事者一也其次御史臺本不禁人今為繫囚之所大理寺舊來置獄今為檢格之司授人之職本貴當材鞫獄以情者自然無濫或諸侯有大過或百姓有深寃乃命臺官委為制使憲府之風規自别刑曹之按鞫無疑今則或撾鼓聞天虚詞詣闕多差殿直承㫖使為制勘使臣殊非理獄之才驟委鞫人之罪其間有未明推勘因致淹延或未曉刑章妄加深刻既臨以制書之命寘乎縲紲之中上畏嚴威誰敢拒捍及當録問皆伏欵詞雖罪致徒流必該申奏按既圎備即據施行豈無陷於非辜豈無失於有罪虧陛下慈仁之旨損朝廷欽恤之恩此臣所謂未諭聖意之事者二也臣每讀史書至於文集或匹婦有廉正之節野人有孝悌之風尚旌彼門閭或賜之粟帛将以勵澆漓之俗亦以行風教之規脩身者由此彰名尚義者因兹立節今國家官僚逺官不得般家父母云亡不得離任墨縗視事寧安孝子之心明詔未行深損聖人之教此臣所謂未諭聖意者三也昔漢文在位稱為刑措嵗終斷獄者三十此蓋民安其業乃無咎於刑章物失其宜必自罹於夭枉是以聖人見一物失宜則必加惻隠知一夫失所則必動哀矜御一衣思天下女工之勤甞一膳思天下農夫之苦故尚書曰不敢侮鰥寡周易曰信及豚魚豚魚至微信猶能及鰥寡至賤侮不敢加有以見聖人用心無微不至聖人施恵無所不均今河朔數州衙前軍将應宣命配來之者多江南兩浙之人雖曽有敕文許令自便然各無去着猶係職名其間有不請衣糧只望差使設有得該請受多是折支時寒無衣日餒無食老小相聚凍餓貧窮羇旅無圖咨嗟愁苦與其配之而無用孰若捨之而放歸此乃可言者一也今國家封彊甚廣州縣至多今録闕貟據資勞而遷授簿尉滿任按嵗月以除移其間廉吏雖多抑亦貪夫不少貪者偶無彰露刑罰寧加廉者未有升聞旌酬弗及言乎賞勸似未精詳宜委諸州遍令申奏州有幾縣縣有幾貟奏其善者則不善者自彰奏其廉者則不廉者自顯或就加奨飭或聊與轉遷則廉能者既有所歸猥濫者寕無自愧揚清激濁實為致理之先易俗移風宜自親民之始此臣所謂可言者二也臣縷陳鄙見煩黷聖聽臣不任惶恐戰慄之至淳化二年監察御史張觀乞體貌大臣簡略細務奏曰臣憑藉光寵備位風憲毎遇百官起居日分立于庭司察不如儀者舉奏之因見陛下天慈優容多與近臣論政徳音往復頗亦煩勞至于有司職官承意将順簿書叢脞咸以上聞豈徒褻瀆至尊實以輕紊國體況帝王之道動則左史書之言則右史書之列於緗素垂為軌範不可不謹也若夫方今之急者匈奴未滅邊鄙猶聳隂陽未序倉廪猶虚淳朴未還奢風尚熾縣道未治逋逃尚多刑法未措禁令猶宻墜典未復封祀猶闕凡此數者朝廷之急務也誠碩陛下聽斷之暇宴息之餘體貌大臣與之商㩁使沃心造膝極意論思則治體化源何所不至臣又甞讀唐史見貞觀初始置崇文館命學士耆儒更直互進聽朝之隙則引入内殿講論文義商確時政或日旰忘倦或宵分始罷書諸信史垂為不朽況陛下左右前後皆端士偉人幸望端拱凝旒囬視反聽釋循常之務養浩然之氣深詔近位闡揚真風上為祖宗播無疆之休下為子孫建不拔之業自然成康文景不獨專美於昔時堯舜禹湯自可追蹤於今日與夫較量金榖剖析毫釐以有限之光隂役無涯之細務者安可同年而語哉真宗即位知代州柳開上言曰國家剏業将四十年陛下紹二聖之祚精求至治若守舊規斯未盡善能立新法乃顯神機臣以益州稍靜望陛下選賢能以鎮之必須望重有威即羣小畏服又西鄙今雖歸明他日未可必保茍有翻覆須得人制禦若以契丹比議為患更深何者契丹則君臣久定蕃漢乆分縱萌南顧之心亦須自有思慮西鄙積恨未冺貪心不悛其下猖狂競為兇惡侵漁未必知足姑息未能感恩望常預備之以良将守其要害以厚賜足其貪婪以撫慰來其情以寛假息其念多命人使西入甘涼厚結其心為我聲援如有動靜使其掩襲令彼有後顧之憂乃可制其輕動今甲兵雖衆不及太祖之時人人練習謀臣猛将則又懸殊是以比年西北屢遭侵擾養育則月費甚廣征戰則軍㨗未聞誠碩訓練禁戢使如往日行伍必求於勇敢指顧無縱於後先失律者悉誅獲功者必賞偏裨主将不威嚴者去之聽斷之暇親臨殿庭更召貔虎使其擊刺馳驟以彰神武之盛臣又以宰相樞宻朝廷大臣委之必無疑用之必至當銓緫僚属評品職官内則主管百司外則分治四海今京朝官則别置審官供奉殿直則别立三班刑部不令詳斷别立審刑宣徽一司舊屬樞宻近年改制職掌甚多加倍置人事則依舊别無利害虚有變更臣欲望停審官三班復委中書樞宻宣徽院銀臺司復歸樞宻審刑院復歸刑部去其繁細省其頭目又京府大都萬方軌則望仍舊貫選委親賢今皇族宗子悉多成長但令優逸無以試材宜委之外藩擇文武忠直之士為左右賛弼之任又天下州縣官吏不均或冗長至多或嵗年乆闕欲望縣四千戸已上選朝官知三千戸已上選京官知省去主簿令縣尉兼領其事自餘通判監軍廵檢監臨使臣並酌量省減免虚費於利禄仍均濟於職官又人情貪競時態輕浮雖骨肉之至親臨勢利而多變同僚之内多或不和伺隙則致于傾危患難則全無相救仁義之風蕩然不復欲望明頒告諭各使改更庶厚化原永敦政本恭惟太祖神武太宗聖文光掩百王威加萬國無賢不用無事不知望陛下開豁聖懐如天如海可斷即斷合行即行愛惜忠直之臣體察姦諛之黨臣乆塵著位寖荷恩寵辭狂理拙唯聖明恕之比部貟外郎刁衎上䟽曰臣聞天下大器也羣生衆畜也治大器者執一以正其度保衆畜者齊化以臻其原故聖人謂莫神於天莫富於地莫大於帝王又曰帝王乗地而緫萬物以用人也則知萬乗之尊一人之位等天地之覆燾若日月之照臨可不慎思慮以安民繋慘舒而被物所以堯舜篤善道以垂化而民謂之所天桀紂懐凶徳以害世而民謂之獨夫則君之於民善惡有如是之驗民之於君毁譽有如是之異陛下纂圗兹始布政惟新所宜上順天心下從人欲進善以去惡避毁而來譽遵唐虞之治斥辛癸之亂私賞無及於小人私罰無及於君子任賢勿貳去邪勿疑開諫諍之門塞讒佞之口愛而知其惡憎而知其善無以春秋鼎盛而耽於逸㳺無以血氣方剛而惑於聲色若太祖之勤儉若太宗之恵慈荅天地敷錫之意保祖宗艱難之業則周成漢文三宗之美不可同年而議擬也咸平四年知全州陳彭年荅詔五事曰臣准詔在朝文武百官舉行轉對在外羣臣各許上章奏事者此陛下思納昌言以安庶彚之意也臣雖至愚切期塞詔伏惟明睿少賜裁察今之踐明庭獻封事者多述民間之常務殊非邦國之逺圖臣之所言則異於是臣聞重華之世伯禹叙其九州太甲之朝伊尹陳其一徳武王受命訪洪範之九疇成王嗣興制周官之六典咸同古道以資化源伏惟陛下嗣二聖之丕基御千齡之大統羣臣進用百姓阜安誠當煥發洪猷彰明盛徳増脩制度剏立憲章變霸俗於累朝復王風於往古使九夷荷其恵澤萬世仰其聲名之日也夫事有雖小而可以建大功理有至近而可以為逺計者臣請言之其事有五一曰置諫官二曰擇法吏三曰簡格令四曰省吏貟五曰行公舉此五者實經世之要道致理之坦途也臣請縷言之夫置諫諍之官開獻替之路堯舜湯武所共然也何者以正直之臣忠信之士參立左右專奉箴規有事必言有闕必諫足以達四方之壅蔽資聖主之聦明今雖有諫官且無言責或出居外任或兼領餘司常箝口以自安少危言而替否是同虚器何補聖猷臣請依六典貟數置諫議大夫司諫正言並選孤立無黨忠直不欺言行相符名實相稱者為之俱以才授不以叙遷使其常立明庭專居諫省入觀朝政出聽輿辭或作事失中或出令未當或選舉無状或獄訟有寃小則上章大則廷諍然後聖主察其所言可者從之否者罷之嵗終以言事之多少為課最之髙卑忠讜盡規者甄升依阿固位者懲責自然人皆竭節政必無邪臣下不敢偷安朝廷得以震肅矣又人命所繋在於法官官或非才人必無告古者按大獄議大刑雖本於法律亦輔以經義故釋之定國之為廷尉則無寃人張湯趙禹之列九卿乃名酷吏國家重文學之選輕刑法之司故其屬僚未得盡善用忠恕之道則為曠官徇刻深之文乃名奉法唯格律而是守豈經義之能詳若是則囹圄何由空虚鈇鉞何由偃息臣請今後廷尉官屬或委所司謹加銓擇不拘資叙唯擢才能使其理一成之刑務於平允用三尺之法志在哀矜無以愛憎舞文無以髙下希㫖自然民知恥格時洽和平又法令者國家之權衡生民之銜轡貴於簡易惡乎滋章乆用則民知適從數變則人無所措近者陛下知制敕之頻降懼條科之太繁旋軫聖謨特令删定既經歴之者皆是名臣則措置之間固皆合理而詔書頒下方及於踰年後敇施行又将為累百或删去者重為條貫或巳有者吏亦申明無益憲章徒繁簡牘且理遵畫一則史無以欺民令或頻更則人得以㺯法損益之際豈不明哉古人有言利不十不變法誠謂此也況先朝求理之心陛下繼明之志詔令一出夷夏同歡縱少有闕文亦無妨大體豈煩改作一致多門臣請今後有上封言事請變格法者非有大益毋改舊章庶使號令愈明刑辟漸措又理世之端審官為本審官之道用賢為先不在具貟但期得俊故曰官不必備惟其人又曰省事不如省官今國家州郡至廣官貟太多無益公方空蠧國用使有才者莫盡其力不肖者得容其姦請以臣所親經證其利害臣前任蘇州通判日知州喬維岳疾病獨臣與判官崔端任其事次夀州通判日知州喬維岳喪亡支使甘鴻漸差出獨臣與推官陸文偉同官此時區分獄訟決遣文書皆得及期亦無闕事即今蘇州知州通判外有職事官三貟夀州知州通判外有職事官四貟官貟既衆事分益煩増将吏之衙參添簿書之壅滯又臣本州洵陽縣計戸一千一百有官三貟漢隂縣計主戸六百有官二貟率皆人戸彫踈路岐荒僻詞訟絶少租稅甚微徒使安閒固無勤績臣每見知郡推官軍監判官並名初等職事然有名雖知郡而事並藩方額是軍監而務多州府或當要道或在邊庭其間知郡則有推官而闕判官軍監則有判官而無通判監當錢榖詳斷刑名凡所責成莫非繁劇然其請受少於判司勞役不均賢愚共見臣請特選明幹朝臣與諸路轉運使相度管内州縣有公事簡少官屬過多處並量減省所減之俸依司理司法參軍例添給初等職官是則冗長之處既以減貟要用之官又各加俸自然官無虚設人皆竭誠創此新規益光至理又為邦之道莫切於求賢求賢之方莫先於公舉然隄防不峻則濫進之路興憲綱稍嚴則明敭之典廢期臻多士共振宏綱臣請依唐朝故事新授常參官朝謝日並進状舉官自代各隨所長具言其状或以文學或以吏能或以强明或以清白務在摭實不許飾詞儻所諳知無避親黨既經御覽即付宰司俟其年終具名條奏在外者委諸路轉運使在京者委本司長官更詳其能以驗所舉如薦揚既數採聽非虚即為量才各加進用其後或不脩操行故瀆彛章則舉主依法科刑以懲謬舉或政績殊異課最有加則舉主隨事旌酬以褒進善賞罰既信清濁自明蓋採羣議則人無以私有常規則衆皆知勸清源正本其在於兹臣又伏見唐太宗常召公卿諮詢理體羣臣多拘近俗莫有逺謀唯獨魏徴請行王道太宗既從其議果致太平中華則外戸不扃四夷則重譯來貢艱難屢作而締創益新豈非盛徳在人餘慶及後所致歟國家功成理定逺肅邇安萬彚宅心九夷拭目以陛下之聖徳跨越古先誠宜鄙晉魏而不談小髙光而獨出行清浄神明之化恢仁義慈儉之風然後舞干羽以為甲兵畫衣冠而為刑辟坐明堂而朝萬國登岱岳而禮百神則天下之民無聲而應海外之俗不召自來矣咸平五年河陽節度判官張知白䟽曰臣聞創王業期於無窮者必政事為基是以王業盛者其政事必經乆可取逺大可法然後速見治平之運竊以古今之言事者鮮不以防邊為急務多舉西北二隅攻守之事以獻方略由是竒兵之謀紛然競起夫五行之中金為兵以五事配之則金為義兵之為用實不可去也乃知言弭兵者罪莫大焉夫外裔者亦天地之一氣耳其性無常邉方殊俗與中國絶異是以史籍所載京師為陽而諸夏為隂蓋取諸内外之義也夫陽主生物隂主殺物故知四夷擾邊不足異也在制之有道爾又和樂為陽愁苦為隂王者必先内和人心而後制四夷此崇陽抑隂之義也臣伏見去春大雪今夏暴雨稽洪範之書則繋乎咎惡之文伏惟陛下自即大位日謹一日而復温厚恭肅祇畏勤儉討論方䇿思廣治道聖徳無缺則咎惡何從而起豈非政令之間有不便於天時者乎今夫春者發生之月也可生而不可殺也國家毎嵗春夏将交之時禁止採捕是仁及鳥獸今建寅之月三元之始孟夏乃是正陽之月況正律所載有秋分巳前不決死罪之制月令當春則曰無肆掠不可以隂政犯陽又曰宜行仁而不可以舉義事及夏則曰挺重囚出輕繋並無決死之文唐朝悉依此制若罪在十惡尤為巨蠧者則決不待時自唐氏失馭政事多隳今刑統内唯存晉天福七年敕立春兩日不決死罪蓋以天福之間方為戰國天下生靈犯罪戾抵滛刑者不可勝紀殺戮之刑僅無虚日故不可全避春夏盛徳之月止取其兩日以代兩季今天下每嵗所決大辟至鮮一嵗之中凡有二十四氣每嵗各主十五日臣以為天下列郡每嵗所決死罪雖不可禁春夏兩季亦可於立春立夏氣至之時各禁十五日以應一孟之節全發生之陽氣若罪在十惡決不待時者亦可改斬為絞以免流血之刑自餘雜犯死罪者若有巳斷具獄可取半月外行決其邊防屯兵之地以軍法從事者不在此限又按禮經季夏中氣之後十五日不可以興土功為土将用事氣欲靜也請詔天下每嵗起季夏中氣至立秋節半月内非邊陲防警捍敵浚城及脩治隄防以禦水害餘並不得起創土功其整葺隳頽者不在此限臣又聞周禮六官其一曰秋官主刑又月令孟秋中氣之後則命有司繕囹圄具桎梏斷薄刑決小罪秋分則申嚴百刑斬殺必當無留有罪無或枉撓此並順上天行肅殺之令也令使決獄多不拘於此時或在三春或當九夏雖勤恤庶獄慮有滯留其如未順四時之令也欲望自今除盛夏仍舊降詔恤刑外每嵗自孟秋中氣之後秋分前遴選周行分道決獄如此則順天行刑而又四方之風謡因之得以知列郡之條綱因之得以振且一嵗之中必順令決獄與其行之於别季不若行之於此時又聞先王垂訓重徳教而輕刑罰所以見王道盛也今法令之文大為時所推尚自中外由刑法而進者甚衆雖有循良之吏亦改節而務刑名也然則刑法者治世之具而不可以獨任必參之以徳教然後可以言善治矣夫徳教之大莫若孝悌若捨此而欲使民從化是猶釋舟檝而求濟於無疆涯之津也故宜旌勸孝悌以厚風俗臣伏見朝廷明有詔命優恤孤窮無告之民令異其姓名别為一簿每遇有科徭賦斂則令去重就輕蠲勞為逸斯則蘇疲羸之一術也其如官吏鮮能奉行成制鄉縣之内因而别致慘舒若令佐盡得其人則孤窮無告之民皆得上簿不得其人則委之人吏責自鄉胥徇私任情移易貧富嗷嗷之民誰敢吐一言以伸訴必至於委棄溝壑是故将欲興禮義先在舒民心将欲舒民心先在均貧富将欲均貧富先在正簿書養民之道郡踈而縣親故知百姓之長不可不精採擇蓋列郡之牧數至少而睿鑒可以周知宰序之任官至卑而朝廷難以徧察夫親民之官㢘而不明者則失於馭下明而不㢘者則傷於徇私必待㢘明兼備中和在躬者然後可用是故備其位者則多中乎選者彌少邦國至大也庶官至衆也有人而置諸散地未可知也當其位而不使盡其心亦未可知也臣是以夙夜為國家思求人之術宜歴選周行經公舉者而用之使先蒞大邑試其政事期年之間較其成績茍能正其簿書均其戸籍而孤窮之民得庇於上然後酬之以不次之恩臣又聞聖人居守文之運者将清化源在乎正儒術古之學者其事簡而有限其道精而有益今之學者其書無涯其道非一是故學彌多性彌亂至於經史子集其帙殆萬在於前者悉謂之古法在於編者悉謂之古書殊不知法有可法不可法也書有可傳不可傳也若盡使知之則可謂勞而少功博而寡要當年不能究其學累世不能窮其業今進士之科大為時所進用其選也殊其待也厚進士之學者經史子集也有司之取者詩賦策論也故就試者懼其題之不曉詞之不明唯恐其學之不博記之不廣是故五常六藝之意不遑探討其所習泛濫而無著非徒不得專一又使害生其中何謂其然且羣書之中真偽相半亂聖人之微言者既多背大道之宗㫖者非一若使習而成功得不揉淳粹之性蕩中正之氣其為吏也安能分挈治柄使教令必行哉中庸曰率性之謂道脩道之謂教孔子曰性相近也習相逺也是知為儒不可不重其所習董仲舒曰春秋大一統者天地之常經古今之通誼今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守此仲舒議漢之失引春秋大一統之說言諸侯統於天子不得自專亦猶百家之說不得與聖教並進懼乎亂皇王之大道也今之世望漢之世其章句之學彌盛而異端之書又滋多乎數倍矣安可不定其成制哉況夫儒者之術不以廣記隠奥為博學不以善攻竒巧為能文若使明行政令大立程式毎至命題考試不必使出於典籍外叅以正史至于諸子之書必須輔於經合於道者取之過此並斥而不用然後先策論後詩賦責治道之大體捨聲病之小疵如是則使夫進士之流知其所習之書簡而有限知其所學之文正而有要不施禁防而非聖人之書自委棄於世矣不加賞典而化成之文自興行於世矣真宗時右正言夏竦上奏曰臣聞易曰堯舜垂衣裳而天下治語曰無為而治者其舜乎詩曰不識不知順帝之則皆非謂隂拱黄屋不親庶政納進熟之計受䝉成之福蓋言聖人勞於求賢逸於得士左右前後股肱耳目皆任循良一人虚心以感天下則可以無為矣夫天者君道也四時者臣道也君道清明以象天臣當生殺以象四時仲尼曰天何言哉四時行焉百物生焉古先聖王靡不由此國家中外清謐朝廷肅雍陛下親視萬機勞神日昃至有論報刑徒簡稽卒伍皆抵軒陛寔煩清問臣聞百官承式各有司存正則有賞濫則有罰但令各守條章豈皆取必於上若陛下英睿神聖無得而量至於耳目視聽固亦有限日出臨朝表奏雲集決其大綱奮其宸斷猶不暇給況親其委細勞其聖躬臣切恐違上事宗廟下撫億兆之意碩陛下選任賢達責成冗事應論罪閱卒之比自非國家大計理干政教者稍委之所貴庶政簡能符合太一宸體逸豫永享萬夀是則塵露之微少裨萬一仁宗天聖三年大理寺丞范仲淹上䟽曰臣聞巧言者無犯而易進直言者有犯而難立然則直言之士千古謂之忠巧言之人千古謂之佞今臣勉思藥石切犯雷霆不遵易進之塗而居難立之地者欲傾臣節以報國恩恥佞人之名慕忠臣之節感激而發萬死無恨況臣之所言皆聖朝當行之事而未知行之者諒有以也聖人之心豈不至此蓋當乎一日萬機未暇餘論大臣之心豈不至此蓋懼乎上疑下謗未克果行臣請言之以發聖慮臣聞國之文章應於風俗風俗厚薄見乎文章是故觀虞夏之書足以明帝王之道覽南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而将落前代之季不能自救以至於大亂乃有來者起而救之故文章之薄則為君子之憂風化之壊則為來者之資唯聖帝明王之相救在乎已不在乎人易曰窮則變變則通通則乆亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風況我聖朝千載之㑹惜乎不追三代之髙而尚六朝之細然文章之列何代無人蓋時之所尚何能獨變大君有命孰不風從可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚臣又聞聖人之有天下也文經之武緯之此二道者天下之大柄也昔諸侯暴武之時孔子曰爼豆之事則甞聞之聖人救之以文也及夾谷之㑹孔子則曰有文事者必有武備請設左右司馬此聖人濟之以武也文武之道相濟而行不可斯須而去焉唐明皇之時太平日乆人不知戰國不慮危大寇犯闗勢如瓦觧此失武之備也經曰禍兮福所倚福兮禍所伏又曰防之於未亂聖人當福而知禍在治而防亂故善安身者在康寕之時不謂終無疾病於是有節宣方藥之備焉安國者當太平之時不謂終無危亂於是有教化經略之備焉我國家文經武緯天下大定自真宗皇帝之初猶有舊将舊兵多經戰陣四夷之患足以禦防今天下休兵餘二十載昔之戰者今巳老矣少者未知戰爭之事人不知戰國不慮危豈聖人之意哉而況守在四夷不可不慮古來和好鮮克始終唐陸贄議云邉方殊俗輾轉無常深而多防狡而多計威之不悟撫之不懐雖或時有盛衰大抵常為邊患属方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求浸多翻覆不定託因細事嘖有煩言猜矯多端其斯可驗此唐人之至論也今自京至邊並無闗險其或恩信不守釁端忽作戎馬一縱信宿千里若邊少名将懼而不守或守而不戰或戰而無功再叩澶淵豈必尋好未知果有幾将可代長城伏望聖慈鑒明皇之前轍察陸贄之讜議與大臣論武於朝以保天下先命大臣宻舉忠義有謀之人授以方略委之邊任次命武臣宻舉壮勇出羣之士試以武事遷其等差壮士䝉知必懐報効列於邊塞足備非常其或自謂無虞不欲生事輕長世之䇿茍一時之安邉患忽來人情大駭自古兵不得帥魚肉無殊乃於倉卒戰鬭之間㧞卒為将豺狼競進真偽交馳此五代之前鑒也至於塵埃之間豈無壮士宜復唐之武舉則英雄之軰願在其中此聖人居安慮危之備備而無用國家之福也惟聖意詳之臣又聞先王建官共理天下必以賢俊授任不以爵禄為恩故百僚師師各揚其職上不輕授下不冒進此設官之大端也我國家累聖求理而致太平大約紀綱法象唐室以臣觀之宜法唐興之時不宜法唐衰之後唐興之時特開館閣以待賢俊得學士十八人聲滿天下此文皇養将相之材以論道經邦而成大化也暨至中興往往得人唐衰之後此選不盛我朝崇尚館閣目為清華相輔之材多由此選三館清宻古謂登瀛近嵗遷出内庭逼居坊陌非唐所謂集仙之館也又其間校讐之職或不由科第以恩而除限以嵗年漸至清顯輕十八學士之選恐非文皇養将相之材之意也伏望聖慈與大臣議其可否重為制度以法唐興之時而延廊廟之器此國家之大美也又諫官御史耳目之司不諱之朝宜有賞勸自陛下臨政以來未聞旌一諫貟賞一御史若言而無補是選之不精言而有補豈賞之不行徒使犯顔者危緘口者安以集藥石為虚言以陳絲髮為供職三載之後進退雷同臣恐天下竊議朝廷言路未廣忠臣未勸将令諫官御史之徒尸素於朝非國家之福也惟聖意詳之又聞先王義重君臣賞延于世大勲之後立賢為嗣餘子則以才自調不使混淆而後大防一隳頽波千載凡居近位嵗進子孫簮紱盈門冠蓋塞路賢與不肖例升京朝謂之賞延無乃太甚此必前代君危臣僭之際務相姑息因為典故以至於斯又百司之人本避鄉役不踰數嵗例與出官莫非貪忍之徒絶異孝㢘之舉使親民政其弊如何開此二途嵗取百數無所不有實累王風恐非任官惟賢之體也人避衆怨不敢上言遂令仕路紛紜禄位填委文武官吏待闕踰年貪者益礪其爪牙㢘者悉困於寒餓徒於禮闈之内増其艱難壮士惜年數嵗一舉廼相奔競至有訟爭而況脩辭者不求大材明經者不問大㫖師道既廢文風益澆詔令雖繁何以戒勸士無㢘遜職此之由其源未澄欲波之清臣未之信也儻國家不思改作因循其弊官亂於上風壊於下非國家之福也儻為長乆之䇿則碩與大臣特新其議澄清此源不以謗議為嫌當以治亂為意此國家之福也惟聖意詳之臣聞以徳服人天下欣戴以力服人天下怨望堯舜以徳則人愛君如父母秦以力則人視君如仇讐是故御天下者徳可慿而力不可恃也伏惟皇太后陛下皇帝陛下日崇聖徳以永服天下之心若夫敦好生之志推不忍之心薄於典刑厚於惻隠在物祝網於民泣辜常戒百官勿為苛酷示天下之慈也唯聖人能之恥珠玉之玩罷組繡之貢焚晉武之雉裘出文皇之宫人少度僧尼不興土木示天下之儉也唯聖人能之雞鳴而起孜孜聽政毎有餘暇則召大臣講議文武訪問艱難此皇王之勤也唯聖人勉之貴賤親踈賞罰唯一有功者雖憎必賞有罪者雖愛必罰捨一心之私從萬人之望示天下之公也惟聖人行之自古帝王與佞臣治天下天下必亂與忠臣治天下天下必安然則忠臣骨鯁而易踈佞臣柔順而易親柔順似忠多為美言骨鯁似强多為直諫美言者得進則佞人滿朝直言者見踈則忠臣避世二者進退何以辨之但日聞美言則知佞臣未去此國家之可憂也日聞直諫則知忠臣左右此國家之可喜也伏惟聖明不可不察自古王者外防夷狄内防姦邪夷狄侵國姦邪敗徳國侵則害及黎庶徳敗則禍起蕭墻乃知姦邪之凶甚於夷狄之患伏惟聖明常好正直以杜姦邪此致理之本也臣又聞聖人宅九重之深鎮萬國之望以靜制動以重為威如天之髙如地之深使人不得容易而議也昨覩鑾駕順動稍頻恐非深居九重靜鎮萬方之意況進奏院報於天下天下聞之恐損威重先朝以御宇日深功成天下廵幸之費尚或諫止今繼明之始聖政方新宜加憂勤深防逸豫則人心大恱天道降康又比先帝功成之年未可輕為廵幸伏望聖慈再三詳覽毎有順動必循典禮以服天下之望臣又聞人主納逺大之謀乆而成王道納淺末之議乆而成亂政方今聖人在上賢人在側取捨之際豈有未至然而刑法之吏言絲髮之重輕錢榖之司舉錙銖之利病則往往謂之急務響應而行或有言政教之源流議風俗之厚薄陳聖賢之事業論文武之得失則往往謂之迂說廢而不行豈朝廷薄逺大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以逺大為迂說不以淺末為急務則王道大成天下幸甚臣又聞聖人之至明也臨萬機之事而不敢獨斷聖人之至聦也納羣臣之言而不敢偏聽獨斷則千慮或失偏聽則衆心必離人心離則社稷危而不扶聖慮失則政教差而彌逺故設百官而不敢獨斷者懼一慮之失也開言路而不敢偏聽者懼衆心之離也今聖政方新動思公共委任兩地出入萬機萬機之繁能無得失乃使羣臣上言以補其闕使上無䝉蔽下無壅塞有以見聖人之不獨斷也天下幸甚然而臣下上言宻陳得失未可盡以為實而亦當深究其宜或務窺人短長或欲希㫖上下動揺賞罰之柄離隔君臣之情似是而非言偽而辨雖聖鑒之下能無惑焉偶動宸衷無益王道似此宻奏之𩔖更望聖慈深加詳鑒與大臣議論可否然後施行儻宻奏之言便以為實内降處分一面施行則讒譛之人縁隙而進以訐為直以詐為忠使内外相疑政教不一非致理之本也古人有言曰為君難為臣不易者其在此乎伏惟聖明不可不察又自古親近小臣率多纎佞恃國恩寵為人階縁公議未行私請先至如此則人皆由徑政有多門伏望聖慈深為防慮以存至公之道也臣曲陋之人本無精識覽前王之得失究聖朝之取捨因敢罄而陳之伏望聖慈詳擇一二慶歴中參知政事范仲淹又荅詔條陳十事䟽曰伏奉手詔今來用韓琦范仲淹富弼皆是中外人望不次拔擢韓琦暫往陜西范仲淹富弼皆在兩地所宜盡心為國家諸事建明不得顧避兼章得象等同心憂國足得商量如有當世急務可以施行者並須條列聞奏副朕拔擢之意者臣智不逮人術不通古豈足以奉大對然臣䝉陛下不次之擢預聞政事又詔意丁寧臣戰汗惶怖曽不獲讓臣聞歴代之政乆皆有弊弊而不救禍亂必生何哉綱紀浸隳制度日削恩賞不節賦斂無度人情慘怨天禍暴起惟堯舜能通其變使民不倦易曰窮則變變則通通則乆此言天下之理有所窮塞則思變通之道既能變通則成長乆之業我國家革五代之亂富有四海垂八十年綱紀制度日削月侵官壅於下民困於外夷狄驕盛寇盜横熾不可不更張以救之然則欲正其末必端其本欲清其流必清其源臣敢約前代帝王之道求今朝祖宗之烈采其可行者條奏碩陛下順天下之心力行此事庶幾法制有立綱紀再振則宗社靈長天下䝉福一曰明黜陟臣觀書曰三載考績三考黜陟幽明然則堯舜之朝建官至少尚乃九載一遷必求成績而天下大化百世之後仰為帝範我祖宗朝文武百官皆無磨勘之例惟政能可旌者擢以不次無所稱者至老不遷故人人自勵以求績效今文資三年一遷武職五年一遷謂之磨勘不限内外不問勞逸賢不肖並進此豈堯舜黜陟幽明之意耶假如庶僚中有一賢於衆者理一郡縣領一務局思興利去害而有為也衆皆指為生事必嫉之沮之非之笑之稍有差失隨而擠陷故不肖者素湌尸祿安然而莫有為也雖愚暗鄙猥人莫齒之而三年一遷坐至卿監丞郎者歴歴皆是誰肯為陛下興公家之利救生民之病去政事之弊葺綱紀之壊哉利而不興則國虚病而不救則民怨弊而不去則小人得志壊而不葺則王者失賢不肖渾淆請託僥倖遷易不已中外茍且百事廢隳生民乆苦羣盜漸起勞陛下旰昃之憂者豈非官失其政而致其危耶至若在京百司金穀浩瀚權勢子弟長為占據有虚食廪祿待闕一二年者暨臨事局挾以勢力豈肯恪恭其職使祖宗根本之地綱紀日隳故在京官司有一貟闕則爭奪者數人其外任京朝官則有私居待闕動踰嵗時往往到職之初便該磨勘一無勤效例䝉遷改此則人人因循不復奮勵之由也臣請特降詔書今後兩地臣僚有大功大善則特加爵命無大功大善更不非時進秩其理状循常而出者秖守本官不得更帶美職應京朝官在臺省館閣職任及在審刑大理寺開封府兩赤縣國子監諸王府并因保舉及選差監在京重難庫務者並須在任三周年即與磨勘若因陳乞并於中書審官院碩在京差遣者與保舉選差不同並須勾當通計及五周年方得磨勘如此則權勢子弟肯就外任各知艱難亦有俊明之人因此樹立可以進用如今日已前受在京差遣巳勾當者且依舊日年限磨勘其未曽交割勾當却求外任者並聽其外任在京朝官到職勾當及三年者與磨勘内前任勾當年月日及公程日期并非因陳乞而移任在道月日及陞朝官在京朝請月日並令通計其逺官近地勞逸不同并在假待闕及公程外住滯或因公事非時移替在道月日委有司别行定奪聞奏如任内有私罪并公罪徒巳上者至該磨勘日具情理輕重别取進止其庶僚中有髙才異行多所薦論或異略嘉謀為上信納者自有特恩進改非磨勘之可滯也又外任善政著聞有補風化或累訟之獄能辨寃沈或五次推勘人無翻訟或勸課農桑大獲美利或京城庫務能革大弊惜費鉅萬者仰本轄保明聞奏下尚書省集議為衆所許則列状上聞並與改官不隔磨勘或有異同各以所執取㫖出於聖斷仍請詔下審官院流内銓尚書考功應京朝官選人逐任得替明具較定考績結罪聞奏内有事状猥濫并老疾愚昧之人不堪理民者别取進止已上磨勘考績條件該說不盡者有司比𩔖上聞如此則因循者拘考績之限特逹者加不次之賞然後天下公家之利必興生民之病必救政事之弊必去綱紀之壊必葺人人自勸天下興治則前王之業祖宗之權復振於陛下之手矣其武臣磨勘年限委樞宻院比附文資定奪聞奏二曰抑僥倖臣聞先王賞延于世諸侯有世子襲國公卿以徳而任有襲爵者春秋譏之及漢之公卿有封爵而殁立一子為後者未聞餘子皆有爵命其次寵待大臣賜一子官者有之未聞毎嵗有自薦其子弟者祖宗之朝亦不過此自真宗皇帝以太平之樂與臣下共慶恩意漸廣大兩省至知雜御史以上毎遇南郊并聖節各奏子充京官少卿監奏一子充試銜其正郎帶職員外郎并諸路提㸃刑獄以上差遣者每遇南郊奏一子充齋郎其大兩省等官既奏得子充京官明異於庶僚大示區别復更毎嵗奏薦積成冗官假有任學士以上官經二十年者則一家兄弟子孫出京官二十人仍接次陞朝此濫進之極也今百姓貧困冗官至多授任既輕政事不舉俸禄既廣刻剥不暇審官院常患充塞無闕可補臣請特降詔書今後兩府并兩省官等遇大禮奏許一子充京官如奏弟姪骨肉與試銜外毎年聖節更不得陳乞如别有勲勞著聞中外非特賜一子官者繫自聖恩其轉運使及邊任文臣初除授後合奏得子弟身事者並候到任二年無遺闕方許陳乞如二年内非次移改者即許通計三年陳乞三司副使知雜御史少卿監以上並同兩省遇大禮各奏薦子孫其正郎帶館職貟外郎并省府推判官外任提調刑獄以上遇大禮合該奏薦子孫者須是在任及一周年方得陳乞已上有該說不盡者委有司比𩔖聞奏如此則内外朝臣各務乆於其職不為茍且之政兼抑躁動之心亦免子弟充塞銓曹與孤寒争路輕忽郡縣使生民受弊其武臣入邊上差遣并大禮合奏薦子弟者乞下樞宻院詳定比𩔖聞奏又國家開文館延天下英才使之直祕庭覽羣書以待顧問以養器業為大用之備今乃登進士髙等者一任纔罷不以能否例得召試而補之兩府兩省子弟親戚不以賢不肖輙自陳乞館閣職事者亦得進補太宗皇帝建崇文院祕閣自書碑文重天下賢才也陛下當思祖宗之意不宜甚輕之臣請特降詔書今後進士三人内及等者一任廽日許進上教化經術文字十軸下兩制看詳作五等品第中第一第三等者即賜召試試又優等即補館閣職事兩府兩省子弟並不得陳乞館閣職事及讀書之𩔖御史臺隨時彈劾并諫院論奏如館閣闕人即委兩地舉文有古道才堪大用之士進名同舉并兩制列署表章仍上殿稱薦以充其職如此則館閣職事更不輕授足以起朝廷之風采紹祖宗之本意副陛下慎選矣三曰精貢舉臣謹按周禮卿大夫之職各教其所治三年一大比考其徳行道藝乃獻賢能之書于王賢為有徳行能為有道藝王再拜受之登于天府天府太廟之寶藏也蓋言王者舉賢能所以上安宗社故拜受其名藏于廟中以重其事也卿大夫之職廢既乆矣今諸道學校如得明師尚可教人六經傳治國治人之道而國家乃専以辭賦取進士以墨義取諸科士皆捨大方而趨小道雖濟濟盈庭求有才有識者十無一二況天下危困乏人如此将何以救在乎教以經濟之業取以經濟之才庶可以救其不逮或謂救弊之術無乃後時臣謂四海尚完朝謀而夕行庶乎可濟安得晏然不救坐俟其亂哉臣請諸路州郡有學校處奏舉通經有道之士専於教授務在興行其取士之科即依賈昌朝等起請進士先䇿論而後詩賦諸科墨義之外更通經㫖使人不専辭藻必明理道則天下講學必興浮薄知勸最為至要内歐陽脩蔡襄更乞逐場去留貴文巻少而考較精臣謂盡令逐場去留則恐舊人捍格不能創習䇿論亦不能旋通經㫖皆憂棄遺别無進路臣請進士舊人三舉巳上者先䇿論而後詩賦許将三場文巻通者互取其長兩舉初舉者皆是少年足以進學請逐場去留諸科中有通經㫖者至終場别問經㫖十道如不能命辭而對則於知舉官貟前講說七通者為合格不㑹經㫖者三舉巳上即逐場所對墨義依自來通粗施行兩舉初舉者至於終場日須八通者為合格又外郡解發進士諸科人本鄉舉里選之式必先考其履行然後取以藝業今乃不求履行惟以詞藻墨義取之加用封彌不見姓字實非鄉里舉選之本意也又南省考試舉人一場試詩賦一場試䇿人皆精意盡其所能復考較日乆實少舛謬及御試之日詩賦文論共為一塲既聲病所拘意思不逺或音韻中一字有差雖生平苦辛即時擯逐如音韻不失雖末學淺近俯拾科級既鄉舉之處不考履行又御試之日更拘聲病以此士之進退多言命運而不言行業明君在上固當使人以行業而進而乃言命運者是善惡不辨而歸諸天也豈國家之美事哉臣請重定外郡發解條約須是履行無惡藝業及等者方得解薦更不封彌試巻其南省考試之人巳經本鄉詢考履行却須封彌試巻精考藝業定奪等第進入御前選官覆考重定等第訖然後開看南省所定等第内合同姓名偶有髙下者更不移改若等第不同者人數必少却加封彌更宣兩地參較然後御前放榜此為至當内三人巳上即於髙等人中選擇聖意宣放其考較進士以䇿論髙詞賦次者為優等䇿論平詞賦優者為次等諸科經㫖通者為優等墨義通者為次等巳上進士諸科並以優等及第者放選注官次等及第者守本科選限自唐以來及第人皆守選限國家以收復諸國郡邑乏官其新及第人權與放選注官今來選人壅塞宜有改革又足以勸學使其知聖人治身之道則國家得人百姓受賜四曰擇官長臣聞先王建侯以共理天下今之刺史縣令即古之諸侯一方舒慘百姓休戚實繋其人故歴代盛明之時必重此任今乃不問賢愚不較能否累以資考陞為方靣懦弱者不能檢吏得以蠧民强幹者惟是近名率多害物邦國之本由此凋殘朝廷雖至憂勤天下何以蘇息其轉運使并提㸃刑獄按察列城當得賢於衆者臣請特降詔書委中書樞宻院且各選轉運使提㸃刑獄共十人大藩知州十人委兩制共舉知州十人三司副使判官同舉知州五人御史臺中丞知雜三院共舉知州五人開封知府推官共舉知州五人逐路轉運使提㸃刑獄各同舉知州五人知縣縣令並十人逐州知州通判同舉知縣縣令共二人得前件所舉之人舉主多者先次差補仍指揮審官院流内銓今日以後所差知州知縣縣令共具合入人歴任功過舉主人數聞奏委中書看詳委得允當然後引對如此舉擇則諸道官吏庶幾得人為陛下愛惜百姓均其徭役寛於賦斂各獲安寧不召禍亂天下幸甚五曰均公田臣聞易曰天地養萬物聖人養賢以及萬民此言聖人養民之時必先養賢養賢之方必先厚禄厚禄然後可以責㢘隅安職業也皇朝之初承五代亂離之後民庶凋弊時物至賤暨諸國收復天下郡縣之官少人除補至有經五七年不替罷者或纔罷去便入見闕當物價至賤之時俸禄不輟士人之家無不自足咸平巳後民庶漸繁時物遂貴入仕門多得官者衆至有得替守選一二年又授官待闕一二年者在天下物貴之後而俸禄不繼士人家鮮不窮窘男不得婚女不得嫁喪不得葬者比比有之復於守選待闕之日衣食不足貸債以茍朝夕到官之後必來見逼至有冒法受贓賖舉度日或不恥賈販與民爭利既非負罪之人不守名節吏有姦贓而不敢發民有豪猾而不敢制姦吏豪民得以侵暴於是貧弱百姓理不得直寃不得訴徭役不均刑罰不正比屋受弊無可柰何由乎制禄之方有所未至真宗皇帝思深慮逺復前代職田之制使中常之士自可守節婚嫁以時喪塟以禮皆國恩也能守節者始可制姦贓之吏鎮豪猾之人法乃不私民則無枉近日屢有臣僚乞罷職田以其有不均之謗有侵民之害臣謂職田本欲養賢縁而侵民者有矣比之衣食不足壊其名節不能奉法以直為枉以枉為直衆怨思亂而天下受弊豈止職田之害耶又自古常患百官重内而輕外唐外官月俸尤更豐足簿尉俸錢尚二十貫今窘於財用未暇増復臣請兩地同議外官職田有不均者均之有未給者給之使其衣食得足婚嫁喪塟之禮不廢然後可以責其㢘節督其善政有不法者可廢可誅且使英俊之流樂於為郡為邑之任則百姓受賜又将來升擢多得曽經郡縣之人深悉民隠亦致化之本也惟聖慈深察天下幸甚六曰厚農桑臣觀書曰徳惟善政政在養民此言聖人之徳惟在善政善政之要惟在養民養民之政必先務農農政既脩則衣食足衣食足則愛膚體愛膚體則畏刑罰畏刑罰則寇盜自息禍亂不興是聖人之徳發於善政天下之化起於農畝故詩有七月之篇陳王業也今國家不務農桑粟帛常貴江浙諸路嵗糴米二百萬石其所糴之價與輦運之費毎嵗共用錢三百餘萬貫文又貧弱之民困於賦斂嵗伐桑棗鬻而為薪勸課之方有名無實故粟帛常貴府庫日虚此而不謀将何以濟臣於天下農利之中粗舉二三以言之且如五代羣雄争霸之時本國嵗飢則乞糴於鄰國故各興農利自至豐足江南應有圩田毎一圩方數十里如大城中有河渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利又浙西地卑常苦水沴雖有溝河可以通海惟時開導則潮泥不得而堙之雖有堤塘可以禦患惟時脩固則無摧壊臣知蘇州日㸃檢簿書一州之田係出稅者三萬四千頃中稔之利每畝得米二石至三石計出米七百餘萬石東南毎嵗上供之數六百萬石乃一州所出臣詢訪髙年則云曩時兩浙未歸朝廷蘇州有營田軍四都共七八千人專為田事導河築堤以減水患于時民間錢五十文糴白米一石自皇朝一統江南不稔則取之浙右浙右不稔則取之淮南故慢於農政不復修舉江南圩田浙西河塘大半隳廢失東南之大利今江浙之米石不下六七百文足至一貫文省比於當時其貴十倍而民不得不困國不得不虚矣又京東西路有卑溼積潦之處早年國家特令開決之後水患大減今罷役數年漸巳堙塞復将為患臣請每嵗之秋降勅下諸路轉運司令轄下州軍吏民各言農桑之間可興之利可去之害或合開河渠或築堤堰陂塘之𩔖並委本州軍選官計定工料毎嵗於二月間興役半月而罷仍具功績聞奏如此不絶數年之間農利大興下少飢嵗上無貴糴則東南嵗糴輦運之費大可減省其勸課之法宜選官討論古制取其簡約易從之術頒賜諸路轉運使及面賜一本付新授知州知縣縣令等此養民之政富國之本也七曰脩武備臣聞古者天子六軍以寧邦國唐初京師置十六将軍官屬亦六軍之義也諸道則開折衝果毅府五百七十四以儲兵伍每嵗三時耕稼一時習武自貞觀至於開元百三十年戎臣兵伍無一逆亂至開元末聽匪人之言遂罷府兵唐衰兵伍皆市井之徒無禮義之教無忠信之心驕蹇凶逆至于喪亡我祖宗以來罷諸侯權聚兵京師衣糧賞賜豐足經八十年矣雖巳困生靈虚府庫而難於改作者所以重京師也今西北强梗邊備未徹京師衛兵多逺戍或有倉卒輦轂無備此大可憂也逺戍者防邊陲之患或緩急抽還則外禦不嚴戎狄進奔便可直趨闗輔新招者聚市井之輩而輕囂易動或財力一屈請給不充則必散為羣盜今生民已困無可誅求或連年凶飢将何以濟贍軍之䇿可不預圖若因循過時臣恐急難之際宗社可憂臣請宻委兩地以京畿見在軍馬同議有無闕數如六軍未整須議置兵則請約唐之法先於畿内并近輔州府召募強壮之人充京畿衛士得五萬人以助正兵足為强盛使三時務農大省給贍之費一時教戰自可防虞外患其召募之法并将校次第並先宻切定奪聞奏此實强兵節財之要也候京畿近輔召募衛兵已成次第然後諸道傚此漸可施行聖慈留意八曰減徭役臣聞漢光武建武六年六月詔曰夫張官置吏所以為人也今戸口耗少而縣官吏職所置尚繁今司𨽻州牧各實所部二府於是條奏并省四百餘縣天下至治臣又觀西京圖經唐㑹昌中河南府有戸一十九萬四千七百餘户置二十縣今河南府主客户七萬五千九百餘户仍置一十九縣主户五萬七百客户二萬五千二百鞏縣七百户偃師一千一百戸逐縣三等而堪役者不過百家而所供役人不下二百數新舊循環非鰥寡孤獨不能無役西洛之民最為窮困臣請依後漢故事遣使先往西京併省諸邑為十縣其所廢之邑並改為鎮令本路舉文資一貟董𣙜酤闗征之利兼人煙公事所廢公人除歸農外有碩居公門者送所存之邑其所在邑中役人却可減省歸農則兩不失所候西京併省稍成倫序則行於大名府然後遣使諸道依此施行仍先指揮諸道防團州巳下有使州兩院者皆為一院公人碩去者各放歸農職官廳可給本城兵士七人至十人者人力歸農其鄉村耆保地里近者亦令併合能併一保耆管亦減役十餘户但少徭役人自耕作可期富庶九曰覃恩信臣竊覩國家三年一郊天子齋戒衮冕謁見宗廟乃祀上帝大禮既成還御端門肆赦天下曰赦書日行五百里敢以赦前事言者以其罪罪之欲其王澤及物之速也如此今大赦毎降天下歡呼一兩月間錢榖司存督責如舊桎梏老幼籍沒家産至於寛賦斂減徭役存恤孤貧振舉滯淹之事未甞施行使天子及民之意盡成空言有負聖心損傷和氣臣請特降詔書今後赦書内宣布恩澤有所施行而三司轉運司州縣不切遵禀者並從違制徒二年斷情重者當行刺配應天禧年以前天下欠負不問有無侵欺盜用並與除放違者仰御史臺提㸃刑獄司常切覺察糾劾無令壅遏臣又聞易曰先王以省方觀民設教故有廵狩之禮察諸侯善惡觀風俗厚薄此聖人順動之意今廵狩之禮不可復行民隠無窮天聽甚逺臣請降詔中書今後毎遇南郊赦後精選臣僚往諸路安撫察官吏能否求百姓疾苦使赦書中及民之事一一施行天下百姓莫不幸甚十曰重命令臣聞書曰慎乃出令令出惟行准律文諸被制書有所施行而違者徒二年失錯者杖一百又監臨主司受財而枉法者十五疋絞蓋先王重其法令使無敢動揺将以行天下之政也今覩國家每降宣敕條貫煩而無信輕而弗禀上失其威下受其弊蓋由朝廷采百官起請率爾頒行既昧經常即時更改此煩而無信之驗矣又海行條貫雖是故違皆從失坐全乖律意致壊大法此輕而弗禀之甚也臣請特降詔書今後百官起請條貫令中書樞宻院看詳㑹議必可經乆方得施行如事干刑名者更於審刑大理寺句明㑹法律官吏參詳起請之詞删去繁冗裁為制敕然後頒行天下必期遵守其衝改條貫並令繳納免致錯亂誤有施行仍望别降敕命今後逐處當職官吏親被制書及到職後所受條貫敢故違者不以海行並從違制徒二年未到職巳前所降條貫失於檢用情非故違者並從本條失錯斷科杖一百餘人犯海行條貫不指定違制刑名者並從失坐若條貫差失於事有害逐處長吏别見機㑹須至便宜而行者並須具縁由聞奏委中書樞宻院詳察如合理道即與放罪仍更相度别從更改歴代名臣奏議巻二十九
