body:
  text: 歴代名臣奏議卷九十明楊士竒等撰經國宋髙宗時知揚州吕頥浩上奏曰臣竊以金人裒百戰之兵一年之内兩犯京師天祐陛下不墮敵中躬有神器臣竊觀天下之勢以撥亂為務成敗安危繫於施設臣不敢逺引堯舜三代之事昔周世宗當中國殘弊之後王朴獻䇿曰唐失道而失吳蜀晉失道而失幽并觀所以失之由知所以平之術在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民竢其倉廩實財用足人安將和則有必取之勢無不成之功陛下睿算逺圖布昭聖武伏願任賢使能信賞必罰理財節用積粟訓兵裁抑恩倖無令撓朝廷之權􅊧選人材使之任將帥之責大開諫路而擇其善總覽羣䇿而從所長則何為不成何戰不勝哉頥浩特進觀文殿學士上奏曰准尚書吏部牒備坐尚書省劄子臣僚上言邊事乞大詢衆庶奉聖㫖行在職事官以上各具所聞實封聞奏仍限五日者伏惟陛下即位以來仁民愛物之心孚于四海憂勤恭儉之德格于上天是宜邊境安寧萬邦䝉福然而乘兵政敗壊之後敵人以百戰之師投隙而南所向無前適丁斯時實勞措畫傳曰天下多事聖哲馳騖而不足茲誠多事之際而聖哲馳騖不足之時仰䝉大詢備禦之䇿臣本以儒學進身然嘗任西北沿邊差遣敵人情偽與夫戰陣之畧粗聞一二犬馬之齒今已六十筋力不能勝甲胄衰邁不能從軍旅顧有愚見不敢緘嘿輙陳今日備禦十䇿條具如後一曰收民心臣聞治天下之道莫先於得民心昔漢髙祖入關中約法三章除去秦之暴政民大恱服雖有項氏之彊而終為所擒唐德宗被圍奉天内嬰孤城外迫彊寇所恃者人心未去故卒能誅彊暴而復社稷陛下清心省事約已便民慨然願治可謂勤矣然金人因破滅契丹之勢乗中原弛備之時北破河朔河東諸郡西陷京西陜右諸州近復引兵渡河駐兵于開德大名府濮州境内環地數千里被其荼毒可勝嘆哉今敵騎漸迫京東州郡若民心畏禍一有動搖竊恐京東州縣及淮南宿亳等州縣望風而下則不可支吾矣伏望陛下發至誠之心下哀痛之詔逺法商周之罪已近考奉天之詔書曲赦河北京東兩路蠲免夏秋二稅除放積年欠負凡破陷州軍及鄉村人户避勍敵而南來者令州縣優加存恤及防䕶家小勿令賊盜殺害凡此號令斷在必行播告逺近使之周知所有逐州軍軍粮却令轉運司條具措置以聞況京東州縣累經大敵殘破之後民失耕業不曾種植雖不放免無可輸納矣嘗考自古逺裔不善攻城惟金人慓勇堅悍輕生不畏死長於攻城諸路州郡縁大敵縱横之後鄉村有力人户盡挈其家屬牛畜資産入州城居止金人既破一城縁此所得倍廣伏望聖慈詔三省宻院詳議利害如京東淮南諸路城壁堅壯守禦足備糧儲不乏去處責令死守如或不然緩急之際縱官吏與民避敵或入山林或入陂澤庶免全郡生靈皆為魚肉為此一路之民開此生路昔李光弼與史思明相拒知洛陽不可守沮韋陟之虛誕縱民避賊退保河陽卒獲大㨗臣所願收民心者此也二曰定廟算臣契勘金人駐兵於澶魏之郊祈請之使屢行而彼未有講和之報范瓊韓世忠統兵北去而未有決戰之期致聖慮焦勞大詢羣䇿廼主憂臣辱之時而大將主兵官多言彊弱不敵不敢交戰百官之心皆願鑾輿渡江夫渡江一事不得已必為之但迎敵拒戰之計豈可少緩哉昔魏武帝以中原之盛引兵南征周瑜決䇿以舟師挫之苻堅舉百萬之衆欲投馬箠渡江伐晉謝安遣兵以敗之況主上躬有天命祖宗德澤在人而金人殘忍貪暴逆天殄物安知我之弱不為彊彼之彊不遂弱耶昔韓信論項氏以謂其彊易弱與此相𩔖伏望聖慈明詔大臣議定廟算隂為過江之備而大為拒戰之資申敕主將修武備講陣法訓彊弩料彼己明斥堠以竢夾淮一戰此不易之䇿也昔范曄論髙祖光武之畧以謂淮隂論項王審料成敗則知髙祖之廟勝耿弇決䇿河北定計南陽則知光武之業成夫廷論決䇿不可二三蹉跌臣願定廟算者此也三曰料彼己臣聞用兵之道在知彼己知彼而不知己必敗知己而不知彼亦敗自金人犯邊以來百戰百敗非止百戰百敗徃徃望風奔潰不暇交鋒者以將帥不知彼己亦未嘗講究彼己之長短也臣頃在鄜延環慶路見我師與夏人接戰每迭勝迭負未有敗衂如今日之甚者蓋鄜延環慶皆山險之地騎兵非所利故也金人起燕薊歴趙魏絶大河至汴宋皆平原廣野騎兵馳突四通八達步人不能抗此所以多敗也夫彼之所長在騎兵我之所恃惟步人以步人抗騎兵則平原廣野決不能立惟阻險用竒可以掩擊為將不可不知也金人用兵在秋冬之後每年四月放馬入泊逐水草號曰入澱注山西州軍及燕薊諸處契丹有國時擇美水草之地數千頃禁人耕鑿留以養馬其人謂之馬入澱入澱之後馬不餵料止食青草七八月間馬乃出澱之際敵人畏大暑之時出其不意而攻之庶可勝也翰林學士孫洙制䇿論契丹其畧曰以一月之粮興六月之師破之必矣豈虚言哉臣宣和四年任河北轉運使五月下旬隨种師道與契丹相持於白溝是年大暑敵人以酷熱不可忍不顧性命躍入白溝河以水浸其軀其畏熱可知矣自用兵以來每於春冬交戰正彼之所利我所不利此又所以多敗也臣嘗觀晁錯議兵事曰匈奴之長技三中國之長技五山林積石涇川丘阜草木所在步兵之地也車騎二不當一土山丘陵平原廣野車騎之地也步兵十不當一有深意存焉歴考自古論兵能知彼知己未有出晁錯之右者願詔諸將用我所長擊彼所短講求其說以保萬全臣所貴知彼知己者此也四曰選將材臣聞之孫武曰兵者國之大事將者材之至難傳曰有必勝之將無必勝之兵又曰將者人之司命審如是將帥之材要當遴選委任若非其人則禍敗不可勝計然人材難知功業寓於智識就其智識觀之則人材或可得矣蘇轍有言曰道藝文章勉彊積習而可至惟有知人之明不可勉彊譬如蕭何之知韓信此豈有法可以授人者轍之言雖可信然孔子所謂視其所以觀其所由察其所安莊周之論九證豈虛語哉今彊敵在境天下多事將材為急臣願陛下詔行在從官及統制官三衙臣僚各舉材堪將佐之人各二人監察御史以上職事官各舉一人委官問其謀慮試其材武如或可用從而擢試庶幾將材自此塗出昔范曄有言曰事苦則矜全之情薄生厚故安存之慮深夫以中人易流之性享厚禄膏粱之奉安存之慮既深則臨敵用命者鮮矣嘗觀太祖太宗皇帝駕馭將帥嘗令有歉然不滿之意如曹彬下江南王全斌下蜀未嘗過與官爵郭進守山西李漢超守關南亦未嘗妄進官資以其飢則著人飽則颺去故也以近事驗之巨師古未知名之人能佐趙哲平建寇此𩔖既衆將材出矣臣願陛下選將材者此也五曰明斥堠臣契勘金人用兵無斥堠軍無行伍止是選擇彊壯有物力之人乘上等壯馬四五人為一隊齎弓箭及手刀不帶衣甲前去探事號曰硬探其探事精審日馳二百餘里而中國諸軍自來斥堠不明萬一敵騎南牧須揀選有材武心力使臣將校百人分為十二隊給弓箭手刀及選擇壯馬乗騎前去分頭探報遇有警急令奔馳前來逐人給金字牌與之所至村民官私驗認牌子給與飲食草料蓋敵騎之行若飄風驟雨郵傳步人探報不及近年之弊徃徃縁此臣宣和七年陷于金人次年正月在金人寨中親見金人引兵到上德橋而京師猶不知是年十一月金人已渡河破鄭州執知州宋伯友縱之使歸京師伯友詣都堂陳述而大臣以謂破鄭州者河北彊寇非金人夫斥堠乖謬如此之甚誠可怪駭又如累年以來敵騎渡河縁北岸無探報不知戎馬所聚令治舟楫絞􅑉筏致南岸無由掩擊臣願陛下明斥堠者此也六曰訓彊弩臣嘗考近年以來金人入寇我師遇之不暇成列輒奔潰敗走者以平原廣野我之步人不能抗彼之騎兵故也又金人遇中國之兵徃徃以鐵騎張兩翼前來圍掩為將者全不預謀分兩翼而射之所以不能立臣嘗觀史冊所載及以近事驗之敵人之長實在騎兵我之所長莫若彊弩今欲禦騎兵捨彊弩將安用哉晁錯曰上下山坂出入谿澗且馳且射匈奴之長技也材官騶發矢道同的匈奴之革笥木薦弗能支也此中國之長技也其理亦明矣蘇秦合從說韓曰少府時力距來皆射六百步之外韓卒超足而射百發不暇止逺者達胸近者掩心又曰以韓卒之勇被堅甲蹠勁弩帶利劒一人當百不足道也夫史冊所載茲可驗矣以近事言之崇寧三年環慶路築大砦泉种師中將前軍羌酋比精者領鐵騎萬餘人前來奔衝師中下馬號令以彊弩射之乃退雖相持數日不敗五軍中必有老將見此事者宣和四年冬契丹大酋四軍太師引精銳來寇霸州大戰於氷清縣北郭藥師用河北第六第八第十五將馬黄弩神臂弓藥師本將人馬分隊相間擺布對列以馬黄弩神臂弓射之敵騎少却我師乗之遂大敗今淮東提刑薛彦國時為第十五將可召而問也日近用兵多係孤軍獨進為將者不知彊弩之利遂致中原之長技無由施設且如萬人為軍千人操弩敵人騎兵驟至奔突使三百步内彊弩並發人人只能發兩箭則敵人必卻敵人既卻我師乃可立我師立定然後可以語戰近時之敗以我師每為騎兵衝突措足不定所以敗也神臂弓箭在軍器中雖最能及逺然其藝難精自來逐將下能射神臂弓者率不過三四百人兼臨陣對敵緩急之際施放不快不若彊弩之輕捷臣願訓彊弩者此也七曰分器甲臣嘗觀敵人之軍兵器便利衣甲堅宻所以多勝中國之軍兵器不便利衣甲不堅宻所以多敗何以言之敵人之軍皆是民兵平時賦斂至薄而緩急以丁㸃軍器甲鞍馬無非自辦平時家居日逐擐甲冑而習弓矢所以器甲各適用中國之軍莫非黥卒器甲從官給身軀短小者或得長甲脩長者或得短甲力能挽七斗弓者或授以一石弓力能勝兩石弩者付之以三石弩致弓弩不適用反與短兵同寒餓之卒無力自辦器甲可勝歎哉昔馬燧製衣甲必分三等蓋有深意晁錯曰甲不堅宻與袒裼同射不能及逺與短兵同夫驅人於行陣之間以肌肉冒鋒刃而甲不堅宻器不適用良可哀也又蕃兵遇敵步人騎兵皆全裝所以心固而敢戰漢兵遇敵馬軍全裝步人則衣甲不具所以心怯而畏戰步人戴笠子不能禦箭冇弇心則無披膞之𩔖是也非特此也敵人軍行有車乗牛畜般載器甲所以步人可以全裝我師之行無般載器甲之具步人全裝則困於負擔矣此又為將者當講議措畫也臣願詔五軍統制官使之講論其事今日合如何措置條具以聞庶使士卒之心堅固敢戰臣所謂分器甲者此也八曰備水戰臣契勘金人既殘破京東州郡而京西路州軍去年殘破外止存金州與順昌府敵人志在刼掠向北州軍既無所有則秋冬之交睥睨淮南必矣江淮水戰之具在今日豈可不講然防淮難防江易是防淮不若防江也臣已條具夾淮一戰之計矣防江之事莫若備水戰今朝廷雖於鎮江府擺泊海船以備禦敵而上流州軍自荆南府抵真州凡可以濟渡處並未聞措置豈可不預為之計哉昔魏武帝既得荆州引兵窺吳周瑜䇿曰曹操捨鞍馬仗舟楫與吳越爭衡本非中國所長觀曹操軍方連船艦首尾相接可燒而走乃取䝉衝鬬艦數十艘實以薪草膏油灌其中裹以帷幕上建牙旗又預備走舸大破曹公於赤壁所謂䝉衝鬬艦當講求其法製造於長江所謂走舸者亦不可忽也又觀王濬伐吳造大船連舫方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬所謂大船連舫今亦可作也又造大筏數十方百餘步今若可用亦不可廢也又古之戰艦或曰樓船或曰海鶻或曰游艇臣又嘗於雄霸州見備戰輕舟或曰刀魚或曰雲梯皆不可闕也伏望聖慈專置使二員一員自荆南府至池州一員自池州至鎮江府專切提舉製造戰船教習水軍及詢訪古今備戰舟船設施利害申明措置不可少緩臣所謂備水戰者此也九曰控浮橋臣契勘泗州夀春府各有浮橋除夀春府浮橋因大水漂壊未曾修治外朝廷已差兵防守泗州浮橋矣竊恐斥堠不明探報不的萬一敵兵或馳至緩急無以措手不可不防也靖康元年正月間金人到磁州邯鄲縣先遣郭藥師提騎兵三千夜馳三百里比明至濬州奪浮橋是時内侍梁方平雖領精銳人兵在黄河北岸以失於探報不意敵騎遽至人兵倉卒奔潰幸南岸守橋人望見敵中旗幟急以猛火焚斷纜索遂不得濟敵人既不得濟乃沿河上下尋覓舟船編排巨筏又四五日乃得濟欲望聖慈詳酌委官宻竊前去措置若可解拆即權暫解拆其浮橋脚船并大纜物料並擺泊於南岸却以舟船濟渡過徃之人如未可解拆即南岸措置猛火油准備緩急焚爇纜索比之倉卒荒擾事不侔矣臣所謂控浮橋者此也十曰審形勢臣仰惟陛下聖德龍飛前年五月即位於睢陽聖心慮逺究觀損益謂汴都之境距大河止百里過大河乃金人界也誠未可以還闕乃時廵淮甸駐蹕維揚逮今踰歲矣茲者金人攻破河北京東州郡尚未退師若駸駸南來則大駕必須渡江此勢之必然人情之所共知也夫敵人過大河已不能控扼我乃渡淮既渡淮矣又不能控扼則我必渡江若渡江之後又不能控扼則敵騎亦須逼江此實忠臣義士殺身徇國決死一戰之秋臣已於前篇條具夾淮一戰之計矣又請大習水戰為備江之計矣臣願陛下明詔大臣及統制大將講論一戰之計可以圖萬全之䇿夫以金人善用兵善料敵彼知聖駕駐蹕維揚楚泗之間必有禦備則必遣重兵由夀春府或光濠州境内渡淮南來及以輕兵由宿泗前來牽制我師兼光濠州界淮河淺狹幾可徒涉此尤不可不防者要當分擘兩軍以一軍屯泗州盱眙縣以一軍屯夀春府花靨鎮以備衝突臣契勘自金人犯邊以來我師遇之望風奔潰不暇接戰是以烟塵所向大將膽落士卒心驚亦未嘗布為一陣使人自為戰若非據淮阻險以決一戰必至於糜爛不振又至於不可支持也金人用兵雖號驍勇然而無紀律無陣法若遇節制之兵一敗之後必至於顛沛但令我師倣古陣法遵用節制人人不退走迎敵角勝負則可以語一戰矣常山蛇勢雖茫昧不傳而兵法具存别有陣圖可考昔漢髙祖望黥布置陣如項羽其心惡之且黥布一卒能置陣如此今之大將豈不厚顔耶臣前所論金人所向盡用騎兵平原廣野我之步兵決不能抗若非阻險用竒決不能勝則夾淮一戰伏願疾速處畫揀閱人兵布列行陣如何據險如何進止以竢一舉臣乂聞有必勝之將無必勝之兵今大將人人畏怯各陳引避之說可謂無必勝之將矣又安得必勝之兵哉加以近年以來朝廷駕馭將帥賞罰未明人不孚信敗軍失律之將未嘗明正典刑致令統兵者畏死不畏法何以示天下耶昔孟氏之敗責其將士曰吾父子以温衣美食養士四十年一旦臨敵不能為吾東向放一隻箭今日大將誰肯率衆北向放一箭哉昔唐太宗征王世充陣於洛陽之西竇建德舉山東之衆號三十萬以助世充諸將怯懼太宗奮獨見之明引兵過洛陽陣於兩賊間不憂世充襲其後一戰而擒建德夫唐太宗敢陣於兩賊間而夾淮之戰在吾境内有糧草有地利我為主彼為客諸將尚躊躇而不敢進國之爪牙將安用哉昔周世宗征河東劉旻率衆犯陣兵始交大將樊徽何愛能退走其騎軍亂世宗躬督戰將士皆奮遂敗旻軍世宗休軍潞州斬樊徽何愛能以徇軍威大振近時用兵未嘗行此誅責然則孰肯用命哉臣究觀金人之勢若二三月間不寇淮甸則秋冬之間南牧必矣備禦之䇿不過如此臣所願審形勢者此也頥浩又奏曰臣今月十七日准入内内侍省遞到金字牌降付臣詔書一道臣已望闕祇受外臣仰惟陛下聖德日躋睿謨天縱方逆臣作亂倡導敵人侵犯淮甸之初奮發獨斷親御六飛廵幸近邊號令諸將上下用命屢奏竒功遂使勍敵退兵生靈按堵凡所謂善後之䇿固不能逃於聖算矣尚且發德音下明詔俯詢舊弼問以方畧仰見陛下盛德謙沖將屈羣䇿以圖中興之大業也臣雖老且病然荷陛下非常之眷懐天地莫報之恩輙以所見析為十事凡今攻戰之利守備之宜措置之方綏懐之畧具在十事内雖智識蹇淺無所取材然臣生長西北兩邊出入行陣踰二紀耳聞目見粗為習熟謹繕冩進呈所冀螢燭末光增輝日月冒瀆天聰臣無任兢皇戰懼激切之至一論用兵之䇿臣契勘臣在河北塞上守官歲久目覩金人與契丹相持二十年今嵗戰次年和次年復戰而契丹之衆不悟其詐卒致顛覆仰惟陛下天性聖孝痛北狩之未還悼生靈之荼毒屢遣信使卑辭屈己祈請講和以紓父兄之阨以救生民之命而敵性貪婪吞噬不已自王倫之回跨四年矣歲歲舉兵侵犯川口去年雖不曾出兵而移師南來大入淮甸又與劉豫同惡相濟其志豈小哉今幸敵人已退若不用兵則五月間必傳箭於敵中秋冬間復舉兵至淮甸在我支梧賦斂終至財力困竭此不可不用兵也況不用兵則二聖必不得還中原之地必不可復偽齊資糧必不可焚或曰如此遂廢講和一事耶臣對曰不然古者兵交使在其間既不可因戰而廢和又不可因和而忘戰間遣使命再貽書以驕之復示弱以紿之而我急為備出其不意乗時北伐此用兵之利也二論彼此形勢臣契勘金人本契丹所屬之國止縁天祚侵陵其民誅求無厭以致憤怨舉兵交戰遂滅耶律氏政和年間内侍童貫奉使大遼得趙良嗣於盧溝河聽其狂計遣使由海道至女真國通好女真既滅耶律氏兵益衆勢益張知中國太平日久都無戰備必可圖也遂陷中原勢愈猖獗二十年間主張國事者國相尼雅滿也為之謀臣者劉彦宗烏舎貝勒蕭三太師髙慶裔王芮張愿恭之徒是也為之將帥者斡哩雅布札木國王伊都羅索貝勒三太子四太子達蘭郎君之徒是也謀無不成戰無不克横行天下又近十年彼之勢可謂彊矣然尼雅滿性好殺而喜戰用兵不已昧於不戢自焚之禍部曲離心久矣將士厭苦從軍皆謳吟思其鄉土勢必潰散有將亡之兆又敵性嗜殺將兵所至族其彊壯老弱掠其婦女財寶悖天道結民怨窮極已甚此亦將亡之兆劉彦宗斡哩雅布伊都札木國王羅索貝勒皆已死所存者才氣皆在數人下其將士所有子女玉帛充牣于室志驕意滿此亦將亡之兆凡此皆彼之形勢也我之形勢比之數年前則不同何以言之數年以前金人所向我之戰兵未及交鋒悉已遁走近年以來陛下留神軍政揀擇精銳汰去孱弱今二三大將下兵已精矣陛下聖性精於器械製作工巧數年以來卑宫室菲飲食而輟那財用修造器甲今器械畧備矣兵既精器械又備將士之心曾經戰陣膽氣不怯勇於赴敵故頃者韓世忠扼敵於鎮江張俊獲捷於明州陳思恭邀擊於長橋去年敵人初到淮南世忠首挫敵鋒諸將屢得勝㨗至于吳玠累次大捷于川口此我之形勢也夫太祖太宗皇帝有兵十四萬而平定諸國遂取天下況今有兵十五萬察賊之勢如彼度我之勢如此若不用兵恢復中原則必有後時之悔豈可少緩哉三論舉兵之時臣在河北陜西縁邊備見敵人風俗每逐年四月初盡括官私戰馬逐水草牧放號曰入澱入澱之後禁人乗騎八月末各令取馬出澱飼以麥豆準備戰鬭又敵人所長者在弧矢之利而暑月弓力怯弱射不能及逺故自古至今凡逺裔犯邊未嘗出於盛暑之時歴代將帥儒臣皆不知此惟唐杜牧嘗獻言于宰相李德裕曰漢伐匈奴率以秋冬當虜人勁弓折膠重馬免乳之際與之較勝負故敗多勝少今若以仲夏月發兵出其意外一舉無遺𩔖矣嗚呼世稱杜牧知兵善論事豈虛言哉臣於紹興二年十一月初八日嘗鋪引杜牧之論具劄子奏陳次日進呈之際䝉聖諭以為夏月舉兵乃周宣王六月北伐之意也然時方議和未暇及此去歲秋末朝廷再遣使人北去請和而豫賊之子已與敵酋引兵過淮信義俱棄可知矣然則和議豈可憑信在我之計豈可但已縱令今年秋末復為邊患臣願陛下奮發睿斷乗此機㑹有不可失之時宻與大臣決䇿定議隂敕大將速為之備於今年四月初舉兵北伐若乃進兵之路趨汴之計供餉之方招懐之畧臣一一條陳於後伏望睿明深思熟計廣詢博訪施行乞賜睿察四論分道進兵之䇿臣本東北人自中原陷敵以來傳聞京西路殘破為甚京畿次之惟京東路河北東路不曾經兵火百姓安堵如舊然苦於劉豫苛虐思望本朝之心至今未泯茲蓋祖宗德澤感民之所致若乗斯民徯望之深出敵人不意之際舉兵北伐必有大功縱未能盡有其地亦可收人心慰民望也臣已條具今年四月舉兵之䇿矣臣欲乞於即今所有戰兵數内差撥五萬人選大將一員統之由泗州𢷬南京至汴京仍差大將一員統兵二萬人駐泗州為應援又别選大將一員統舟師二萬人由明州趁今年四月内便風泛海前去攻沂宻至青濰州京東之民企望王師日久所至必望風而下又遣大將一員提兵二萬駐濠州以張聲勢此兵不可深入以糧運艱阻但時遣竒兵渡淮𢷬順昌府陳州則京西北路諸郡傳檄亦可下惟是申敕大將所至不得殺人不得刼掠務要宣諭朝廷德意蠲除劉豫什一之政明出黄榜除二稅之外更不行青苖預買之法所下州縣選差逐處豪傑為衆推伏者主管事務七八月間且班師過淮次年復出臣已於去年十二月二十八日具奏兵法所謂彼入我出彼出我入不二三年間中原之地黄河以南必先為我有者蓋謂是也乞賜睿察五論運糧供軍事臣已條具分三路進兵以窺中原事其糧食亦合分項應副一項自明州由海道趨沂宻州兵二萬人每人日支米二升二萬人每日合支米四百石一月合支米一萬二千石臣乞於明州支上件米充一月之糧令海船附帶前去到宻州板橋鎮左右住岸則有糧可因矣一項駐軍濠州䇿應入界大兵所有軍糧由淮河水運可到濠州岸下則此項人馬不患乏糧也惟是自泗州趨汴京之兵五萬人縁泗州以北汴水不通諸軍合齎十日之糧至有糧地分乞委江浙漕臣揀選淨米五萬石前期運至泗州准備諸軍附帶入界南京以北鄉民稍有耕種則可以因糧矣仍乞申敕大將軍兵所至曉諭鄉村使民通知王師弔伐除糧食必藉鄉村百姓供應外一行軍士如敢攘奪財物刼掠婦女並行軍法及處分大將凡王師所至搜索劉豫父子所聚糧料准備資給金人者並行焚毁紹興二年臣在政府日已定計北伐嘗請韓世忠到都堂諭以焚毁劉豫糧料事世忠曰此乃清野之法不可不行合具奏知六論大兵進發日乞聖駕駐蹕鎮江府事臣於建炎四年春末車駕在紹興府日嘗具奏韓世忠已於鎮江府江心艤舟邀截住敵酋四太子人馬未得濟渡乞車駕進幸浙西號令諸將前去江上夾擊敵酋及具奏聞以萬乗之尊仗雷霆之勢車駕所至自可以聳動人心銷弭羣慝此議未決而臣罷政其事不行去歲秋末敵騎初到淮甸陛下奮然決策下親征之詔大駕進幸平江諸將罔敢退縮斬獲既衆敵遂退師此乃皇天悔禍開悟聖𠂻宗社有靈遂將恢復之兆也臣嘗考五代時耶律氏方彊德光舉兵破汴京之際大遼彊盛自古亦罕聞也不數年周世宗即位慨然有發奮之心親統諸軍巡行塞上其出師也自乾寧軍御樓船入黄河順流而下故北取三關兵不血刃歐陽修撰五代史云世宗英武之材可謂雄傑其料彊弱較彼我非明於決勝者孰能至哉伏望睿明深思熟慮若夏初進兵北伐乞時暫移蹕權駐鎮江府訓飭大將撫循戰士訖遣之此帝王之盛舉也嘗觀漢髙祖唐太宗取天下櫛風沐雨躬臨行陣況陛下天資聖武精於馳射何憚而不行哉乞賜睿察七論經理淮甸臣契勘淮南東西路平原廣野皆天下之沃壤自建炎三年金人殘破之後居民稀少曠土彌望數百里今又重困金人蹂踐焚蕩一空正當選擇守臣經理之際不可緩也夫總兵統衆破敵決戰當責武臣撫存凋瘵招集流移當用文臣欲望聖慈更命輔臣詳議可否應淮南州郡除濠泗州夀春府差武臣外其餘並差文臣使之大講經理之政仍勸率鄉村於三月間多種早禾六七月間成熟可濟艱食比至防秋場圃畢矣其東西二帥可委者因任之不可委者别差官仍訓敕令講求羊祜治襄陽之故事踵行之其通泰州産塩地分尤宜選任能吏收塩息以助軍興臣於宣和元年任太府少卿嘗考𣙜貨務入納大率淮南路入納歲得一千四五百萬貫浙東西歲收七八百萬貫下户部勘當便見昔年所收實數蓋通泰楚州産塩浩瀚倍如浙東西有此數事豈可不遴選守臣乎或曰敵酋若犯邊文臣豈可委臣對曰不然去年宣撫司嘗奏武臣楚序等守承楚泗州矣金人相近望風遁去大率東南州郡無城壁守禦之備若小小寇盜有兵者猶可禦捍若大敵至不問文武官皆不能保守也但當較其利害大小事體輕重而圖之綏懐之畧自此者始此其要也乞賜睿察八論機㑹不可失事臣在陜西縁邊見中國與夏人相持前後五十年每出兵接戰勝負各相半惟自金人猖獗以來中國之兵未嘗交鋒望塵奔潰者是豈金人真不可敵哉我之兵不精耳故自宣和七年以來金人一舉而圍汴京再舉而破京城又再舉而犯揚州又再舉而渡大江并陜西亦失之數年以來朝廷深究其弊修軍政備器械又敵人過江之時戰士屢經得㨗膽氣不怯人人皆敢迎敵則金人豈復能彊梁横行如徃年哉以近事言之吳玠初擊退於和尚原再禦退於饒風嶺又大捷於仙人關去歲九月敵犯淮甸我師累捷敵人頓兵百餘日師老糧匱無所得而遁則情見勢屈可知矣夫侵陵中國如此之久侮嫚如此之甚今王師已振敵衆向衰若不發兵攻擊則終無討伐之期矣或曰得汴京而未能守何益於事臣對曰不然昔漢髙祖入關約法三章除秦煩苛之令民心歸之項羽雖以其地析為三秦徙髙祖於漢中然關中之地終為漢有因之以取天下況此舉必可以擒劉麟平僭偽使中原之民知神器不可以非望得又可以示我宋不忘中國土地人民之意兼彼入我出彼出我入無大悔吝乎臣嘗考宣和年間國家以富有四海之事力而户部支費每月不過九十五萬貫紹興三年臣在政府日㑹計户部經費每月一百一十萬貫臣閒退以來切料户部經費必有增添之數夫養兵二十萬不能北向爭天下則東南民力何可支梧豈不寒心哉況中原之人强悍壯實東南之人柔脆怯弱數年之後見管戰兵漸次衰老消磨既盡雖欲北向爭天下亦難矣臣冒死為陛下喋喋言之乞賜睿察九論舟楫之利臣嘗觀晁錯論兵以謂中國之長技五逺裔之長技三未嘗不歎服錯之知兵也以今日論之敵人便鞍馬每以騎兵取勝國家駐蹕東南當以舟楫取勝蓋舟楫者非敵人之長技乃今日我之長技棄而不用可勝惜哉臣已乞舟師一萬照應北伐之兵矣臣嘗廣行詢問海上北來之人皆云南方木性與水相宜故海舟以福建船為上廣東西船次之温明州船又次之北方之木與水不相宜海水鹹苦能害木性故舟船入海不能耐久又不能禦風濤徃徃有覆溺之患今者國家與敵人相持之際天以舟楫之利賜我助中興之大業朝廷其捨諸臣自少壯時遍走兩浙京東河北及敵中沿海地分通知海道可徃去處是宜大講海船之利以擾偽齊京東諸郡河北諸郡及敵中諸郡今當聚集福建等路海船於明州岸下先補船主梢工一官依臣所論齎一月之糧前去沂宻州仍選差曾在京東界與人接戰將兵授以全裝鐵甲使之北去范温者本京東界不肯臣劉豫之人在海山間聚衆屢與豫賊相抗可遣也崔邦弼在青州為將官數年間與金人於青濰州界交兵一方之人極喜之可遣也王進本係登州界逓鋪兵士後來為兵官嘗屠戮敵人留在青州者人亦喜之可遣也臣自離朝廷不知諸將下見管人兵之數遙計崔邦弼下有兵約三千人王進下約二千人范温初到時有兵六千人後來併入中軍或汰往諸州軍充廂軍若盡行剗刷歸范温處約得五千人已一萬人矣又於諸軍中補足二萬人之數遣行所至去處遇偽齊海船可用者即留之其不可用者即焚之趁南風而去得北風乃歸敵人雖有鐵騎百萬必不能禦夫此行在我無浩瀚之費到彼資東北之糧萬全之計豈可緩哉乞賜睿察十論并謀獨斷事臣嘗考古之帝王舉大事決大議謀不可不廣而斷不可不獨晉武帝欲伐吳羣臣以謂未可惟張華贊成其計故一舉而平江表唐憲宗欲伐蔡衆議排沮惟裴度與帝意合一舉而擒吳元濟韓愈頌其功曰凡此蔡功惟斷乃成不赦不疑由天子明是也今陛下以聖明英武之資方敵人退兵之際首以善後之計下詢於前宰相臣料六人者或以謂當用兵或以謂不當用兵或欲且保江南或欲經理淮甸或欲堅守和議或以謂上䇿莫如自治或以謂來則拒之去則勿追乃禦敵之道人人所見既不同則議論必不一若夫稽考已然之事斟酌今日之勢孰利孰害孰緩孰急是非可否在聖主獨斷而已臣事陛下之久出入將相踰五年平日嘗以謂若不舉兵則必不能還二聖復中原牽制川陜敵兵紹興三年春臣已定計北伐樞宻院機速房具有案底偶潘致堯髙公繪自敵人處奉使回恐害和議其事中輟今乂二年矣夫敵性反復金人尤狡譎其操心堅忍必欲吞噬我國家陛下屈己極矣去秋忽然兵至其意不淺今其去也必大為之備秋冬間若本國别無牽制必舉兵南來或併兵以窺四川在我之計決不可茍時暫安而忘北向爭天下事萬一欲舉兵更乞質諸大臣參訂禁從博訪卿士謀及庶人謀及卜筮所貴慮無遺䇿動有成功臣年已衰老待盡於畎畝間妄陳所見不中事機惟陛下赦其萬死乞賜睿察貼黄臣契勘自金人入境以來天下之論或以謂必講和議或以謂必須用兵二說膠擾曾無一定之論伏覩自建炎元年至今前後所遣使命差宇文虛中王倫朱弁郭元邁魏行可崔縱洪皓龔璹張邵軰前後祈請非不切至近又遣潘致堯髙公繪韓肖胄胡松年章誼孫近魏良臣相繼入國竊料敵人國書必無果決之言亦有難從之請姑欲欵我爾伏望聖明深賜洞察祈請十年畧無顯效斟量和議可成或不可成如和議可成則臣乞舉兵之策置而不用可也如和議決不可成則臣衰愚之言或可備收採謹具奏知頥浩又上奏曰臣昨日留身奏事仰䝉聖諭朕欲親幸軍營按視諸將教習陣隊而前此宰執力陳不可近日自杭州舟行到常州縁諸軍陸路不易遂登岸乗馬欲與衆人同艱辛而范漴又以為不可縁此鬱鬱臣仰聞聖言不覺感歎竊以方今天下多難乃用武戡定之時馬上治之之日按行營陣出入御馬乃其宜也而儒士書生尚欲依太平之際必欲備法駕具儀仗非此不行是猶欲以干戚之舞解平城之圍也昔周武王師踰孟津左仗黄鉞右秉白旄載於經籍未聞有非之者漢文帝親屈帝尊徃來於棘門灞上細柳營勞軍以今觀之自咸陽東南西漢故都至灞上道路約五六十里計其往還必須三兩日是時臣僚亦不以為非唐太宗躬擐甲胄平定禍亂如榆窠園之役與單雄信親角勝負虎牢之戰帝麾軍先登率史大奈秦叔寶纏麾幟馳出賊陣後遂擒竇建德此皆聖人英武之畧但陛下今日不當親臨戰陣不當履危冒險不當馳騁畋獵不當身屬櫜鞬若按視軍營出郊跨馬何損於治哉臣願陛下以剛斷為心以神武為事勿拘俗儒之論自為鬱鬱以圖中興之業臣不勝幸甚頥浩又奏曰臣契勘金人自建炎二年引兵㓂淮三年正月遂直犯揚州去年十月以大兵分路渡江皆有深意近者蕭愿中引兵冦江今復稍退此皆天佑本朝聖德昭格之所致也夫敵人今年既不渡江則諸事可以措手矣將以創中興之業伏願陛下發中興之誠心行中興之實事今當先定駐蹕之地據都㑹之要使號令易通於川陜將兵順流而可下漕運不至於艱阻然後速發大兵一頭項往江西湖南以平羣寇一頭項往池州至建康府處置已就招安尚懐反側之人於明年二三月間使民得務耕桑則大江以南在我之根本立矣然後乗大暑之際遣精銳之兵與劉光世渡淮掎角而北去由淮陽軍沂州入宻州以搖青鄆命張俊躬親統兵由河中府入絳州以撼河東乗兩路餘民心懐我宋未泯之時知王師有收復中原之意則中興之業可覬也若不速為之逡巡過春夏則金人他日再來不惟大江以南我之根本不可立而日後之患不可勝言矣臣嘗觀自古有為之君將以取天下者弗躬弗親則不能戡禍亂定海内伏望聖慈考漢髙祖馬上治之之迹法唐太宗櫛風沐雨之事速圖之不可緩也臣在西北二邊出入行陣二十餘年今者年踰六十近在軍中頓覺筋力衰憊非復昔時之彊壯也日望陛下賜骸骨而歸所幸未塡溝壑之前一見中興之業爾乞賜睿察知福州張守應詔論事劄子曰臣今月二日伏奉詔書以卻敵之初圖善後之計凡今攻戰之利守備之宜措置之方綏懐之畧可悉條具來上者仰惟陛下體虞舜之達聰邁成湯之好問不間遐邇務聞至言窺德意之所存則中興之功指日可俟臣雖固陋不肖疾病久衰受恩至深論報無所敢不竭所聞以對然言方盈廷不當枝詞蔓說廣援古今以煩乙夜之觀姑論利害之實願留神財擇議者必謂敵人既遁當追奔逐北恢復中原以快宿憤臣謂中原固可唾手而取也儻一戰收復而能保固其土地阜安其民人則善矣得土地而未能保固得民人而未能阜安是自困之道也明詔四事臣以謂莫急於措置措置茍當則餘不足為陛下道也蓋措置失宜則不能守備守備不固則不能攻戰攻戰不勝則不能綏懐去冬敵人長驅以抵淮甸蓋以措置未能無失故也夫防江不若防淮防淮然後可以駐蹕建康駐蹕建康然後可以經營中原此緩急之序也臣請言措置之大畧其一措置軍旅其二措置軍食何謂措置軍旅神武中軍當專衞行在而以餘軍分戍三路一軍駐于淮東一軍駐于淮西一軍駐于鄂岳或荆南擇要害之地以處之使北至關陜西抵川峽血脉相通號令相聞有唇齒輔車之勢則自江之南可以奠枕而卧也然今之大將皆握重兵貴極富溢前無利禄之望退無誅罰之憂故朝廷之勢日削兵將之權日重而又為大將者萬一有稱病而賜罷或卒然不諱則所統之衆將安屬耶臣謂宜拔擢麾下之將使為統制每將不過五千碁布三路朝廷號令徑達其軍分合使令悉由於朝廷優假朝廷之權以用之然後可以有為也何謂措置軍食諸軍既已分屯諸路則所患者錢榖也然所費多寡在彼猶在此爾則所患者轉輸也然祖宗以來每歲上供六百餘萬斛悉出於東南而轉輸未嘗以為病也今宜以兩浙之粟專供行在而江東之粟以餉淮東江西之粟以餉淮西荆湖之粟以餉鄂岳荆南量所用之數責漕臣輸將而歸其餘於行在錢帛亦然恐未至於不足也然自艱難以來漕運之船悉歸漕司仍委諸路各造一二百隻專充轉餉如有官司或諸軍拘留則令漕臣州縣聞諸朝而痛懲之諸軍錢糧既無乏絶之患然後特降詔書戒飭諸將申嚴紀律不得秋毫侵擾州縣以復業之民户口多寡為諸將殿最歲終遣官覆實而升黜之則民得以還其鄉里而田野日闢生齒日滋江北州縣有興復之期矣如是措置既定候至防秋復遣大臣為之都督使諸路之兵進相援退相保如常山之蛇首尾相應居則可以守備而進則可以攻戰可以傳檄而定偽齊可以折箠而笞强敵可以保固其土地而阜安其民人綏懐之畧亦在是矣然臣復有區區之愚誠敢因清問之及而冒貢一二敵人之輕中國尚矣去秋之來妄意車駕逺避則大入江浙如曩歲之易也今既挫衂悵然而歸後必不敢輕入使其復來其計須悉兵舉國以取必勝是宜陛下留神於善後之䇿也如前所陳措置大畧臣熟計之猶為未也究其本原則在陛下内修德而外修政耳召公之告武王曰明王愼德四夷咸賔惟修德可以服四夷也周詩之頌宣王曰内修政事外攘夷狄惟修政可以攘夷狄此皆書生常談初無驚人可喜之論然簡約易行悠久見效則未有此二端之為要也蓋所謂愼德不過正心誠意畏天愛民儉于家勤于邦逺聲色屏貨利兢兢業業凡可以累德者無不戒也持久不勌盛德日新四海愛戴而不忍去何患逺人之不服乎所謂修政不過任賢使能信賞必罰任賢者非止崇以爵位茍知其賢則一切信任而不復致疑使能者不必信任茍有一能則隨其才分俾盡其力信賞以勸功不以所喜而與之必罰以治罪不以所惡而奪之以至抑權倖裁冗濫謹法度興廉耻凡可以害治者無不去也正朝廷以正四方何患天下之不治乎伏願陛下果斷而力行之臣言狂瞽不足以稱塞明詔俯伏以俟誅殛守為殿中侍御史乞詔大臣講求政事劄子曰臣聞天下之勢厯數脩短存乎天强弱治亂本乎政事在天者不可為而政事之在人者不可不勉也竊惟國家承平之久振古未有而兵革之旤亦振古之所無然而祖宗徳澤之深基本之固厯數延洪與天無極陛下以神武纂承四方延頸拭目以覩中興則内修政事外禦强敵在於因時設施以隆不拔之勢仰惟陛下憂勤仄席日再御朝而公卿羣臣上體焦勞廢休澣窮日力孜孜奉國不為不至矣然未見赫然有所設施以慰天下之望也夫扶顛必期於正持危必期於安援天下之溺必期於獲濟固宜賢者盡其慮智者竭其䇿勇士奮其節怯夫勉其死若乃遵常守故濟濟相遜而勞形怵心於簿書米鹽之間臣恐未足以致太平也恭聞太宗皇帝嘗謂大臣曰卿等所奏簿書乃是常事惟時務不便尤須極言其失又以在位諸臣自負才術既用之後罕有悉心當事者以責任大臣今茲艱虞聖哲馳騖不足之時尤當愛惜寸隂以急先務又況今春金人踐蹂京西殘及陜右意其秋冬之間必大舉深入汲汲為備猶恐不及也臣願陛下詔執政大臣惟以治軍旅選將帥嚴守禦廣儲積搜求人材慰安人心係政事之大者專意講求凡細微不急之務付都司六曹長貳檢詳祖宗法令處決行下庶幾精神心術不致煩勞日力不至虛費有以上助陛下大有為之意仰答太宗所以為子孫無疆之圖也漢王吉有云欲治之主不世出公卿大臣幸得遭遇其時言聽計從而未有建萬世之長䇿舉明主於三代之隆務在簿書期㑹聽斷獄訟此非太平之基也宣帝用是總覈庶政以致中興臣之區區誠有望於今日臣言狂瞽惟陛下裁擇守知洪州論遣使劄子曰臣叨膺閫寄職事之外不當冒言天下之事伏念受陛下大恩目覩利害不敢嘿嘿但已惟陛下留神裁擇臣竊觀陛下屈己與金人講和誠以梓宫未即山陵兩宫久闕大養孝思之切委曲聽從至於復河南故地雖官吏軍民復見太平官府為幸而凋瘵之餘與敵接境猶未得奠枕而臥也故復河南之地利害未為甚重向者金使之來王倫之還具言金國無所須索梓宫兩宫所許甚確指日渡河朝廷乃遣王倫藍公佐奉迎比聞金人輒留倫而反公佐臣在逺外固不能知曲折而道路之言以謂金人之留王倫欲盡變前日之議且以還河南之地為大恩而責歲幣之數梓宫兩宫則未有還期道路之言雖未足信然臣以理揆之惟一倫則可以盡反前日之議矣又聞金國前主和議之人皆因事就誅則前議之變理之必然也夫金人之用事者今既非主和議之人則和議之成與否不可知特以嘗遣使發詔故未能盡變初議他日必以中國所不可行之事而為釁端矣其始不須歲幣今乃首以為言其始許還梓宫今乃置而不論止以區區河南之地為大恩而責報焉他日之事固可見矣是宜長慮却顧以為善後之圖若執一變因就彌縫僥倖萬一之成非計之善也為今之計非可以其變詐而遽廢前議亦當遣使遜辭且議要約且議歲幣徐為之謀不憚使命之煩擾也其議要約也若曰陛下卑辭厚禮致恭於大國大國遣使下詔而還復其侵疆講信修睦之初國人延頸以俟梓宫兩宫之還今既愆期上下觖望何以展四體盡事大之禮乎向日賜許借使行人失辭國人無由户曉也儻或未從緩而圖之蓋金人之意俟我迎請之堅且急也必厚有邀求以敝中國臣恐中國之力無以滿丘壑之欲也以至疆場之事必不得已亦當遵用前日契丹故事必使中國可行然後為善其議歲幣也若曰國家全盛之時盡有河北山東膏腴之地故或可辦今山東河北盡屬金國河南新疆瘡痍未瘳而東南數十州歲幣安從出哉反覆議論必不得已而與之則契丹之數亦不可過也然臣之欲使人徃反議論者欲陛下戒以宻覘敵人盛衰虛實徐察天意而為後圖惟是明詔大臣激厲諸將拔擢偏裨簡閱士馬積財粟備器械以為意外之備而和議之成與否且當置之度外可也夫以陛下聖明天縱必洞照此理而臣愚過計猶懼陛下孝悌之至亟欲梓宫兩宫之還或墮敵計中而有噬臍之悔耳冒貢狂瞽出於愛君憂國之誠不自知其進越惟陛下裁赦時秦檜為相和議成然猶以梓宫未還母后欽宗未復詔侍從臺諫集議以聞禮部侍郎曾開上疏畧曰但當修德立政嚴於為備以我之仁敵彼之不仁以我之義敵彼之不義以我之戒懼敵彼之驕泰眞積力久如元氣固而病自消太陽升而隂自散不待屈己陛下之志成矣不然恐非在天之靈與太后淵聖所望於陛下者也檜曰此事大係安危開曰今日不當說安危只當論存亡檜矍然歴代名臣奏議卷九十
