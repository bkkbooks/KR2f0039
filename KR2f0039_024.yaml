body:
  text: 厯代名臣奏議卷二十四明楊士竒等撰治道漢武帝即位舉賢良文學之士前後百數而廣川董仲舒以賢良對䇿焉制曰朕獲承至尊休德傳之無窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪俊郡國諸侯公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛于韶于周莫盛于勺聖王已殁鍾鼓管絃之聲未衰而大道微缺陵夷至乎桀紂之行王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所操持或悖􅍝而失其統與固天降命不可復反必推之于大衰而後息與烏呼凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或天或夀或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飭而甘露降百榖登德潤四海澤臻草木三光全寒暑平受天之袩享神鬼之靈德澤洋溢施乎方外延及羣生子大夫明先聖之業習俗化之變終始之序講聞髙誼之日久矣其明以諭朕科别其條勿猥勿并取之于術慎其所出乃不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發德音下明詔求天命與性情皆非愚臣之能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大無道之世者天盡欲扶持而全安之事在強勉而已矣強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有其效者也還讀曰旋詩曰夙夜匪懈書云懋哉懋哉皆強勉之謂也道者所繇適于治之路也仁義禮樂皆其具也故聖王已殁而子孫長久安寧數百歲此皆禮樂教化之功也王者未作樂之時乃用先王之樂宜于世者而以深入教化于民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化人也著故聲發于和而夲于情接于肌膚臧于骨髓故王道雖微缺而管絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰于幽厲非道亡也幽厲不繇也至于宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱頌至今不絶此夙夜不懈行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在于已非天降命不可得反其所操持悖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此蓋受命之符也周公曰復哉復哉復報也孔子曰德不孤必有鄰皆積善絫德之效也及至後世淫佚衰微不能統理羣生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積于下怨惡畜于上上下不和則隂陽繆盩而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風也小人之德草也草上之風必偃故堯舜行德則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯徠動之斯和此之謂也臣謹案春秋之文求王道之端得之于正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端于天天道之大者在隂陽陽為德隂為刑刑主殺德主生是故陽常居大夏而以生育養長為事隂常居大冬而積于空虛不用之處以此見天之任德不任刑也天使陽出布施于上而主歲功使隂入伏于下而時出佐陽陽不得隂助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成歲也為政而任刑不順于天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用于下而欲德教之被四海故難成也臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正夲也春秋深探其夲而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不一于正而亡有邪氣姦其間者姦音干是以隂陽調而風雨時羣生和而萬民殖五榖孰而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下走音奏不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明于此是故南面而治天下莫不以教化為大務立太學以教于國設庠序以化于邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之具心欲盡滅先聖之道而顓為自恣茍簡之治顓與専同故立為天子十四歲而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也濟益也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可雕也糞土之墻不可圬也今漢繼秦之後如朽木糞墻矣雖欲善治之亡可奈何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之于當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿于天為政而宜于民者固當受祿于天夫仁義禮知信五常之道王者所當修飭也五者修飭故受天之祜而享鬼神之靈德施于方外延及羣生也天子覽其對而異焉乃復䇿之制曰蓋聞虞舜之時遊于巖廊之上垂拱無為而天下太平周文王至于日昃不暇食而宇內亦治夫帝王之道豈不同條而共貫與何勞逸之殊也蓋儉者不造玄黃旌旗之飾及至周室設兩觀乘大輅朱干玉戚八佾陳于庭而頌聲興夫帝王之道豈異指哉或曰良玉不琢又曰非文無以輔德二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉烏呼朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力夲任賢今朕親耕藉田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今隂陽錯謬氛氣充塞羣生寡遂黎民未濟廉耻貿亂賢不肖渾殽未得其真故詳延特起之士意庶幾乎今子大夫待詔百有餘人或道世務而未濟稽諸上古之不同考之于今而難行毋乃牽于文繫而不得騁與將所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載乃遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟辟讀曰避乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善也此之謂也至于殷紂逆天暴物殺􅓍賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入于河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚于朝廷愛施兆民天下歸之故太公起海濵而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采玄黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不琢資質潤美不待刻琢此亡異于逹巷黨人不學而自知也然則常玉不琢不成文章君子不學不成其德臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉于禮義而恥犯其上武王行大義平殘賊周公作禮樂以文之至于成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之説憎帝王之道以貪狼為俗非有文德以教訓于天下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾空言虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趣利無恥又好用憯酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業羣盜並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極羣下之知盡天下之美至德昭然施于方外夜郎康居殊方萬里説德歸誼此太平之致也然而功不加于百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在于它在乎加之意而巳願陛下因用所聞設誠於內而致行之則三王何異哉陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大乎太學太學者賢士之所關也教化之夲原也今以一郡一國之衆對亡應書者書謂舉賢良文學之詔書也是以王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流今吏既亡教訓于下或不承用主上之法暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯􅓎氛氣充塞羣生寡遂黎民未濟皆長吏不明使至于此也夫長吏多出于郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非所謂積日絫久也故小材雖絫日不離于小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然纍日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心于求賢天下之士可得而官使也遍得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而任官録德而定位則廉恥殊路賢不肖異處矣陛下加惠寬臣之罪令勿牽制于文使得切磋究之臣敢不盡愚于是天子復册之制曰蓋聞善言天者必有徴于人善言古者必有驗于今故朕垂問呼天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改今子大夫明于隂陽所以造化習于先聖之道業然而文采未極豈惑乎當世之務哉條貫靡竟統紀未終意朕之不明與聽若眩與夫三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既以著大道之極陳治亂之端矣其悉之究之孰之復之詩不云乎嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之仲舒對曰臣聞論語曰有始有卒者其惟聖人呼今陛下幸加惠留聽于承學之臣復下明册以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也册曰善言天者必有徴于人善言古者必有驗于今臣聞天者羣物之祖也故遍覆包函而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之于古考之于今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者修教訓之官務以德善化民民巳大化之後天下常亡一人之獄矣今世廢而不修亡以化民民以故棄行誼而死財利是以犯法而罪多一歲之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質朴之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹于承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命于天固超然異于羣生入有父子兄弟之親出有君臣上下之誼會聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是以得天之靈貴于物也故孔子曰天地之性人為貴明于天性知自貴于物知自貴于物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也册曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改臣聞衆少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發于諸侯舜興呼深山非一日而顯也蓋有漸以致之矣言出于已不可塞也行發于身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明呼情性察呼流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也鄉讀曰響故桀紂暴謾讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也册曰三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世無弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以救溢扶衰所遭之變然也故孔子曰無為而治者其舜呼改正朔易服色以順天命而巳其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之救當用此也孔子曰殷因于夏禮所損益可知也周因于殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因于虞獨不言所損益者其道如一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論誼考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失耳若乃論政事之得失察天下之息耗此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虛德潤草木澤被四海鳯凰來集麒麟來遊以古凖今一何不相逮之逺也安所􅓎盩而陵夷若是意者有所失于古之道與有所詭于天之理與試迹之古返之于天黨可得見乎黨音儻夫天亦有所分豫豫之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所豫祿者不食于力不動于末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載髙位家溫而食厚祿因乘冨貴之資力以與民爭利于下民安能如之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之具家見織帛怒而出其妻食于舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利呼紅讀曰工古之賢人君子在列位者皆如是是故下髙其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩于誼而急于利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四面而內望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同足以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相趙綰王臧請立明堂以朝諸侯不能就其事乃言其師申公于是上使使束帛加璧安車以蒲裹輪駕駟迎申公弟子二人乘軺傅從至見上上問治亂之事申公時已八十餘矣對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對默然然已招致即以為大中大夫舍魯邸議明堂事元光五年徴賢良文學之士上䇿詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯隂陽和五榖登六畜蕃甘露降風雨時嘉禾興朱草生山不童澤不涸麟鳳在郊藪龜龍逰于沼河洛出圖書父不喪子兄不哭弟北發渠搜南撫交址舟車所至人迹所及跂行喙息咸得其宜朕甚嘉之今何道而臻乎此子大夫修先聖之術明君臣之義講論洽聞有聲乎當世問子大夫天人之道何所本始吉凶之效安所期焉禹湯水旱厥咎何由仁義禮智四者之宜當安設施屬統垂業物鬼變化天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇朕將親覽焉靡有所隱災川公孫𢎞對䇿曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則羣臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治之夲也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和德于上百姓和合于下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五榖登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳳至龜龍在郊河出圖洛出書逺方之君莫不説義奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見于上謂之術凡此四者治之夲道之用也皆當設施不可廢也得其要則天下安樂法設而不用不得其術則主蔽于上官亂于下此事之情屬統垂業之夲也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱桀之餘烈也桀紂行惡受天之罰禹湯積德以王天下因此觀之天德無私親順之和起逆之害生此天文地理人事之紀臣𢎞愚戇不足以奉大對時對者百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一召入見容貌甚麗拜為博士待詔金馬門𢎞復上疏曰陛下有先聖之位而無先聖之名有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志書奏天子以册書答曰問𢎞稱周公之治𢎞之材能自視孰與周公賢𢎞對曰愚臣淺薄安敢比材于周公雖然愚心曉然見治道之所以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不纍日銷金石者不纍月夫人之于利害好惡豈比禽獸木石之類哉期年而變臣𢎞尚竊遲之上異其言𢎞又上書曰臣聞天下通道五所以行之者三君臣父子夫婦長幼朋友之交五者天下之通道也知仁勇三者所以行之也故曰好問近乎知力行近乎仁知恥近乎勇知此三者知所以自治知所以自治然後知所以治人未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招徠四方之士任賢序位量能授官將以厲百姓勸賢材也今臣愚駑無汗馬之勞陛下過意擢臣𢎞卒伍之中封為列侯致位三公臣𢎞行能不足以稱加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯乞骸骨避賢者路汲黯為主爵都尉時天子方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戇也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主于不義乎且己在其位縱愛身奈辱朝廷何臨災嚴安以故丞相史上書曰臣聞鄒子曰政教文質者所以云救也當時則用過則舍之有易則易之故守一而不變者未睹治之至者也今天下人民用財侈靡車馬衣裘宫室皆競修飾調五聲使有莭族雜五色使有文章重五味方丈于前以觀欲天下彼民之情見美則願之是教民以侈也侈而無莭則不可贍民離夲而徼末矣末不可徒得故搢紳者不憚為詐帶劒者誇殺人以矯奪而世不知愧故姦軌浸長夫佳麗珍怪固順于耳目故養失而泰樂失而淫禮失而采教失而偽偽采淫泰非所以範民之道也是以天下人民逐利無已犯法者衆臣願為民制度以防其淫使貧富不相耀以和其心心既和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則隂陽和四時正風雨時草木暢茂五榖蕃熟六畜遂字民不夭厲和之至也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪匡正海內以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強陵弱衆暴寡田常篡齊六卿分晉並為戰國此民之始苦也于是強國務攻弱國修守合從連衡馳車轂擊介胄生蟣蝨民無所告訴及至秦王蠶食天下并吞戰國稱號皇帝一海內之政壞諸侯之城銷其兵鑄以為鐘虡示不復用元元黎民得免于戰國逢明天子人人自以為更生鄉使秦緩刑罰薄賦斂省繇役貴仁義賤權利上篤厚下佞巧變風易俗化于海內則世世必安矣秦不行是風循其故俗為智巧權利者進篤厚忠正者退法嚴令苛諂諛者衆日聞其美意廣心逸欲威海內使蒙恬將兵以北攻強胡辟地進境戍于北河飛芻挽粟以隨其後又使尉屠睢將樓船之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絶越人擊之秦兵大敗秦乃使尉他將卒以戍越當是時秦禍北搆于胡南挂于越宿兵于無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經于道樹死者相望及秦皇帝崩天下大畔陳勝吳廣舉陳武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然夲皆非公侯之後非長官之吏無尺寸之藝起閭巷杖棘矜應時而動不謀而俱起不約而同會壤長地進至于伯王時教使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入胸奴燔其龍城議者美之此人臣之利非天下之長䇿也今中國無狗吠之警而外纍于逺方之備糜敝國家非所以子民也行無窮之欲甘心快意結怨于胸奴非所以安邉也禍拿而不解兵休而復起近者愁苦逺者驚駭非所以持久也今天下煆甲摩劒矯箭控弦轉輸軍糧未見休時此天下所共憂也夫兵久而變起事煩而慮生今外郡之地或幾千里列城數十形束壤制帶脅諸侯非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也後以安為騎馬令帝以卜式為郎式不願上曰吾有羊上林中欲令子牧之式乃拜為郎布衣屩而牧羊韋昭曰屩草屝歲餘羊肥息上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輒斥去毋令敗羣上以式為竒拜為緱氏令試之緱氏便之宣帝時丞相魏相又數表采易隂陽及明堂月令奏之曰臣相幸得備貟奉職不修不能宣廣教化隂陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇隂陽隂陽之分以日為紀曰冬夏至則八風之序立萬物之性成各有常職不得相千東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兊執矩司秋北方之神顓頊乘坎執權司冬中央之神黃帝乘坤艮執繩司下土兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兊治則飢秋興震治則華冬興離治則泄夏興坎治則雹明王謹于尊天慎于養人故立羲和之官以乘四時節授民事君動靜以道奉順隂陽則日月光明風雨時節寒暑調和三者得敘則災害不生五榖熟絲麻遂草木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民説上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡廉恥寇賊姦宄所繇生也臣愚以為隂陽者王事之夲羣生之命自古賢聖未有不繇者也天子之義必純取法天地而觀于先聖髙皇帝所述書天子所服第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌謹與將軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠于天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫朝錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知隂陽者四人各主一時時至明言所職以和隂陽天下幸甚王吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂夲務也欲治之主不世出公卿幸得遭遇其時言聼諫從然未有建萬世之長策舉明主于三代之隆者也其務在于期會簿書斷獄聽訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不偹難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行于深宫得則天下稱誦之失則天下咸言之行發于近必見于逺故謹選左右審擇所使左右所以正身也所使所以宣德也詩云濟濟多士文王以寧此其夲也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極質檏日銷恩愛寖薄孔子曰安上治民莫善于禮非空言也王者未制禮之時引先王之禮宜于今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域則俗何以不若成康夀何以不若髙宗竊見今世趨務不合于道者謹條奏唯陛下裁擇焉吉意以為夫婦人倫大綱夭夀之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女無節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘于婦逆隂陽之位故多女亂古者衣服車馬貴賤有章以褒有德而别尊卑今上下僭差人人自制是以貪財趨利不畏死亡周之所以能致治刑措而不用者以其禁邪于冥冥絶惡于未萌也又言舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今至于積功治人亡益于民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉古者工不造雕琢商不通侈靡非工商之獨賢政教使之然也民見儉則歸夲夲立而末成其指如此上以其言迂闊不甚寵異也元帝時御史大夫貢禹上書曰孝文皇帝時貴廉潔賤貪汙賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海內大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習于計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯于世欺謾而善書者尊于朝悖逆而勇猛者貴于官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政于世行雖犬彘家富藝足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至于是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不解之故解讀曰懈四海之內天下之君微孔子之言亡所折中中音竹仲反況乎以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其于變世易俗調和隂陽陶冶萬物化正天下易于決流抑隊自成康以來幾且千歲欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念髙祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣逺放讇佞放出園陵之女罷倡樂絶鄭聲去甲乙之帳退偽薄之物修莭儉之化驅天下之民皆歸于農如此不解則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民産子七歲出口錢自此始又省建章甘泉宫衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意元帝好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵于皇后太子匡衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之主務在創業垂統傳之無窮繼體之君心存于承宣先王之德而褒大其功音者成王之嗣位思述文武之道以養其心休烈盛美皆歸之二后而不敢專其名是以上天歆享而鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖德天覆子愛海內然隂陽未和姦邪未禁者殆論議者未丕揚先帝之盛功爭言制度不可用也務變更之所更或不可行而復復之是以羣下更相是非吏民無所信竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事留神于遵制揚功以定群下之心大雅曰無念爾祖聿修厥德孔子著之孝經首章蓋至德之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化治性之道必審己之所有餘而強其所不足蓋聰明疏通者戒于大察寡聞少見者戒于雍蔽勇猛剛強者戒于大暴仁愛溫良者戒于無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖德臣又聞室家之道修則天下之理得故詩始國風禮夲冠婚始乎國風原性情而明人倫也夲乎冠婚正基兆而防未然也福之興莫不夲乎室家道之衰莫不始乎梱內故聖王必慎妃后之際别適長之位禮之于內也卑不隃尊新不先故所以統人情而理隂氣也其尊適而卑庶也適子冠乎阼禮之用體衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜遊燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故人慎防其端禁于未然不以私恩害公義陛下聖德純備莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣成帝初即位薛宣為御史中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀閔元元躬有日昃之勞而亡佚豫之樂允執聖道刑罰惟中然而嘉氣尚凝隂陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事至開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相迫促亦內相刻流至衆庶是故鄉黨闕于嘉賔之歡九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則隂陽否隔和氣不興未必不由此也詩云民之失德乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知夲朝之要務臣愚不知治道惟明主察焉上嘉納之成帝召直言之士詣白虎殿對䇿䇿曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對杜欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克巳就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行于鄉黨考功能于官職逹觀其所舉富觀其所豫窮觀其所不為乏觀其所不取近觀其所為逺觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因夏尚質周因殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏于一人愛寵偏于一人則繼嗣之路不廣而嫉妬之心興矣如此則匹婦之説不可勝也唯陛下純德普施無欲是從此則衆庶咸説繼嗣日廣而海內長安萬事之是非何足備言東漢光武時桓談拜議郎給事中因上疏陳時政所宜曰臣聞國之廢興在于政事政事得失由乎輔佐輔佐賢明則俊士充朝而理合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚莊王問孫叔敖曰寡人未得所以為國是也莊王名旅穆王商臣之子也孫叔敖楚賢相也言欲為國于是未知何以得之叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣莊王曰善願相國與諸大夫共定國是也蓋善政者視俗而施教察失而立防威德更興文武迭用然後政調于時而躁人可定昔董仲舒言理國譬若琴瑟其不調者則解而更張夫更張難行而拂衆者亡是故賈誼以才逐而朝錯以智死世雖有殊能而終莫敢談者懼于前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣夫張官置吏以理萬人縣賞設罰以别善惡惡人誅傷則善人蒙福矣今人相殺傷雖巳伏法而私結怨讎子孫相報後忿深前至于滅戶殄業而俗稱豪健故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬于邉其相傷者加常二等不得雇山贖罪如此則仇怨自解盜賊息矣夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏此所以抑并兼長廉恥也今富商大賈多放田貨中家子弟為之保役保役可保信也趨走與臣㒒等勤收稅與封君比入是以衆人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相紏告若非身力所得皆以臧卑告者如此則專役一已不敢以貨與人事寡力弱必歸功田畝田畝修則榖入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲陷則與死比是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣章帝時第五倫性峭直常疾俗吏苛刻及為三公值帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之􅐾以寬𢎞臨下尚書考靈䊮曰堯文塞晏晏爾雅曰晏晏溫和也出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寬和而政急不解務存莭儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莾之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寬博之選以應上之求者也陳留令劉豫冠軍令駟協並以刻薄之􅐾臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在于此又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不從以身教者從以言教者訟夫隂陽和嵗乃豐君臣同心化乃成也其刺史太守以下除拜京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寬臣愚不足採桓帝初詔公卿郡國舉至孝獨行之士崔實以郡舉除為郎論當世便事數十條名曰政論指切時要言辨而確確堅正也當世稱之仲長統曰凡為人主宜寫一通置之坐側其辭曰自堯舜之帝湯武之王皆賴明哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所以不理者常由人主承平日久俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽嗜欲不恤萬機或耳蔽針誨厭偽忽真或猶豫岐路莫適所從或見信之佐括囊守祿或踈逺之臣言以賤廢是以王綱縱弛于上智士鬱伊于下悲夫自漢興以來三百五十餘嵗矣政令垢玩上下怠懈垢惡也風俗雕敝人庶巧偽百姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期于補綻決壞技柱邪傾隨形裁割要措斯世于安寧之域而巳故聖人執權遭時定制步驟之差各有云設不強人以不能背急切而慕所聞也蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也是以受命之君每輒創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪何者其頑士暗于時權安習所見不知樂成況可慮始茍云率由舊章而已其達者或矜名妒能恥策非己舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶將困焉斯賈生之所以排于絳灌屈子之所以攄其幽憤者也夫以文帝之明賈生之賢絳灌之忠而有此患況其餘哉故宜量力度德春秋之義今既不能純法八世故宜參以霸政則宜重賞深罰以御之明著法術以檢之自非上德嚴之則理寬之則亂何以明其然也近孝宣皇帝明于君人之道審于為政之理故嚴刑峻法破姦軌之膽海內清肅天下密如密靜也薦勳祖廟享號中宗算計見效優于孝文及元帝即位多行寬政卒以墮損威權始奪遂為漢室基禍之主政道得失于斯可監昔孔子作春秋褒齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠違權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍夫熊經鳥申雖延厯之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏熊經鳥伸此道引之士養形之人也蓋為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也方今承百王之敝值厄運之會自數世以來政多恩貸馭委其轡馬駘其銜四牡橫奔皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾清節奏哉昔髙祖令蕭何作九章之律有夷三族之令黥劓斬趾斷舌梟首故謂之具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寬致平也必欲行若言當大定其夲使人主師五帝而式三王蕩亡秦之俗遵先聖之風棄茍全之政蹈稽古之蹤復五等之爵立井田之制然後選稷契為佐伊吕為輔樂作而鳳凰儀擊石而百獸舞若不然則多為纍而巳獻帝時政移曹氏祕書監侍中荀恱志在獻替而謀無所用乃作申監五篇而奏之其大略曰夫道之夲仁義而已矣五典以經之羣籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其于仁義也申重而已致政之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壞則勢傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣是謂四患興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五教臯陶作士政不行焉故在上者先豐人財以定其志帝耕藉田后桑蠶宫國無逰人野無荒業財不賈用力不妄加以周人事是謂養生君子之所以動天地應神明正萬物而成王化者必乎真定而已故在上者審定好醜焉善惡要乎功罪毀譽效于準驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不核物無不功善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎巳也故肅恭其心慎修其行內不回惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭朴以加小人化其刑也君子不犯辱況于刑乎小人不忌刑況于辱乎若教化之廢推中人而墜于小人之域教化之行引中人而納于君子之塗是謂章化章明也小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之內政有事則用之軍旅是謂秉威賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政又立行之以誠守之以固簡而不怠踈而不失無為為之使自施之無事事之使自效之不肅而成不嚴而化垂拱揖讓而海內平矣是謂為政之方又言尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以陽從隂違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隱而名彰得失一朝而榮辱千載善人勸焉淫人懼焉宜于今者備置史官掌其典文紀其行事每于嵗盡舉之尚書以助賞罰以𢎞法教帝覽而善之厯代名臣奏議卷二十四
