body:
  text: 厯代名臣奏議巻二十四明楊士竒等撰治道漢武帝即位舉賢良文學之士前後百數而廣川董仲舒以賢良對䇿焉制曰朕獲承至尊休徳傳之無窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪儁郡國諸侯公選賢良脩絜博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉盖聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛扵韶扵周莫盛扵勺聖王已殁鍾鼔筦絃之聲未衰而大道微缺陵夷至乎桀紂之行王道大壊矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所操持或悖􅍝而失其統與固天降命不可復反必推之扵大衰而後息與烏虖凡所為屑屑夙興夜寐務法上古者又将無補與三代受命其符安在災異之變何縁而起性命之情或天或夀或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飭而甘露降百榖豋徳潤四海澤臻草木三光全寒暑平受天之袩享神鬼之靈徳澤洋溢施乎方外延及羣生子大夫明先聖之業習俗化之變終始之序講聞髙誼之日乆矣其明以諭朕科别其條勿猥勿并取之扵術慎其所出迺不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隠朕将親覽焉仲舒對曰陛下發徳音下明詔求天命與性情皆非愚臣之能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家将有失道之敗而天廼先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗迺至以此見天心之仁愛人君而欲止其亂也自非大無道之世者天盡欲扶持而全安之事在彊勉而已矣彊勉學問則聞見博而知益明彊勉行道則徳日起而大有功此皆可使還至而立有其效者也還讀曰旋詩曰夙夜匪懈書云懋哉懋哉皆彊勉之謂也道者所繇適扵治之路也仁義禮樂皆其具也故聖王已殁而子孫長乆安寜數百歲此皆禮樂教化之功也王者未作樂之時廼用先王之樂宜扵世者而以深入教化扵民教化之情不得雅頌之樂不成故王者功成作樂樂其徳也樂者所以變民風化民俗也其變民也易其化人也著故聲發扵和而夲扵情接扵肌膚臧扵骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政乆矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰扵幽厲非道亡也幽厲不繇也至扵宣王思昔先王之徳興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱頌至今不絶此夙夜不懈行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在扵已非天降命不可得反其所操持誖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此盖受命之符也周公曰復㢤復㢤復報也孔子曰徳不孤必有鄰皆積善絫徳之效也及至後世淫佚衰微不能統理羣生諸侯背畔殘賊良民以争壤土廢徳教而任刑罰刑罰不中則生邪氣邪氣積于下怨惡畜于上上下不和則隂陽繆盭而妖孽生矣此災異所縁而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之徳風也小人之徳草也草上之風必偃故堯舜行徳則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯倈動之斯和此之謂也臣謹案春秋之文求王道之端得之扵正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端扵天天道之大者在隂陽陽為徳隂為刑刑主殺徳主生是故陽常居大夏而以生育養長為事隂常居大冬而積扵空虚不用之處以此見天之任徳不任刑也天使陽出布施扵上而主歲功使隂入伏扵下而時出佐陽陽不得隂助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任徳教而不任刑刑者不可任以治世猶隂之不可任以成歲也為政而任刑不順扵天故先王莫之肯為也今廢先王徳教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用扵下而欲徳教之被四海故難成也臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正夲也春秋深探其夲而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不壹扵正而亡有邪氣奸其間者奸音干是以隂陽調而風雨時羣生和而萬民殖五榖孰而草木茂天地之間被潤澤而大豐羙四海之内聞盛徳而皆倈臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下走音奏不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壊也古之王者明扵此是故南面而治天下莫不以教化為大務立太學以教扵國設庠序以化扵邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也埽除其迹而悉去之復脩教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之具心欲盡滅先聖之道而顓為自恣茍簡之治顓與専同故立為天子十四歲而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也濟益也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可彫也糞土之墻不可圬也今漢繼秦之後如朽木糞墻矣雖欲善治之亡可柰何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必觧而更張之乃可鼔也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之扵當更化而不更化也古人有言曰臨淵羨魚不如退而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則災害日去福禄日来詩云宜民宜人受禄于天為政而宜扵民者固當受禄于天夫仁義禮知信五常之道王者所當脩飭也五者脩飭故受天之祜而享鬼神之靈徳施于方外延及羣生也天子覽其對而異焉乃復䇿之制曰盖聞虞舜之時㳺扵巖廊之上垂拱無為而天下太平周文王至扵日昃不暇食而宇内亦治夫帝王之道豈不同條而共貫與何勞逸之殊也盖儉者不造𤣥黄旌旗之飾及至周室設兩觀乗大輅朱干玉戚八佾陳扵庭而頌聲興夫帝王之道豈異指㢤或曰良玉不琢又曰非文無以輔徳二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虚秦國用之死者甚衆刑者相望耗矣哀㢤烏虖朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力夲任賢今朕親耕耤田以為農先勸孝弟崇有徳使者冠盖相望問勤勞恤孤獨盡思極神功烈休徳未始云獲也今隂陽錯謬氛氣充塞羣生寡遂黎民未濟㢘耻貿亂賢不肖渾殽未得其真故詳延特起之士意庶㡬乎今子大夫待詔百有餘人或道世務而未濟稽諸上古之不同考之于今而難行毋廼牽扵文繫而不得騁與将所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔徳賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載廼遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟辟讀曰避乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡羙矣又盡善也此之謂也至于殷紂逆天暴物殺􅓍賢知殘賊百姓伯夷太公皆當世賢者隠處而不為臣守職之人皆奔走逃亡入于河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚扵朝廷愛施兆民天下歸之故太公起海濵而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡羙矣未盡善也此之謂也臣聞制度文采𤣥黄之飾所以明尊卑異貴賤而勸有徳也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不琢資質潤美不待刻琢此亡異扵逹巷黨人不學而自知也然則常玉不琢不成文章君子不學不成其徳臣聞聖王之治天下也少則習之學長則材諸位爵禄以養其徳刑罰以威其惡故民曉扵禮義而恥犯其上武王行大義平殘賊周公作禮樂以文之至扵成康之隆囹圄空虚四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之說憎帝王之道以貪狼為俗非有文徳以教訓扵天下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾空言虚辭而不顧實外有事君之禮内有背上之心造偽飾詐趣利無恥又好用憯酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業羣盜並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海内莫不率服廣覽兼聽極羣下之知盡天下之美至徳昭然施于方外夜郎康居殊方萬里說徳歸誼此太平之致也然而功不加扵百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在扵它在乎加之意而巳願陛下因用所聞設誠於内而致行之則三王何異㢤陛下親耕耤田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大乎太學太學者賢士之所關也教化之夲原也今以一郡一國之衆對亡應書者書謂舉賢良文學之詔書也是以王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主徳不宣恩澤不流今吏既亡教訓扵下或不承用主上之法暴虐百姓與奸為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯􅓎氛氣充塞羣生寡遂黎民未濟皆長吏不明使至扵此也夫長吏多出扵郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非所謂積日絫乆也故小材雖絫日不離扵小官賢材雖未乆不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然累日以取貴積乆以致官是以㢘恥貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心扵求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而任官録徳而定位則㢘恥殊路賢不肖異處矣陛下加恵寛臣之罪令勿牽制扵文使得切磋究之臣敢不盡愚扵是天子復冊之制曰盖聞善言天者必有徴扵人善言古者必有驗扵今故朕垂問虖天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虚心以改今子大夫明扵隂陽所以造化習扵先聖之道業然而文采未極豈惑乎當世之務㢤條貫靡竟統紀未終意朕之不明與聽若眩與夫三王之教所祖不同而皆有失或謂乆而不易者道也意豈異㢤今子大夫既以著大道之極陳治亂之端矣其悉之究之孰之復之詩不云乎嗟爾君子毋常安息神之聽之介爾景福朕将親覽焉子大夫其茂明之仲舒對曰臣聞論語曰有始有卒者其惟聖人虖今陛下幸加恵留聽扵承學之臣復下明冊以切其意而究盡聖徳非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也冊曰善言天者必有徴扵人善言古者必有驗扵今臣聞天者羣物之祖也故徧覆包函而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布徳施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也徳者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之扵古考之扵今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其羙惡之極乃與天地流通而往来相應此亦言天之一端也古者脩教訓之官務以徳善化民民巳大化之後天下常亡一人之獄矣今世廢而不脩亡以化民民以故棄行誼而死財利是以犯法而罪多一歲之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹扵承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也脩此三者而大本舉矣人受命扵天固超然異扵羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長幼之施粲然有文以相接驩然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乗馬圏豹檻虎是以得天之靈貴扵物也故孔子曰天地之性人為貴明扵天性知自貴扵物知自貴扵物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也冊曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虚心以改臣聞衆少成多積小致鉅故聖人莫不以晻致明以微致顯是以堯發扵諸侯舜興虖深山非一日而顯也盖有漸以致之矣言出扵已不可塞也行發扵身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯徳章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也鄉讀曰響故桀紂暴謾讒賊並進賢知隠伏惡日顯國日亂晏然自以如日在天終陵夷而大壊夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也冊曰三王之教所祖不同而皆有失或謂乆而不易者道也意豈異㢤臣聞夫樂而不亂復而不厭者謂之道道者萬世無弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反将以捄溢扶衰所遭之變然也故孔子曰無為而治者其舜虖改正朔易服色以順天命而巳其餘盡循堯道何更為㢤故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也孔子曰殷因扵夏禮所損益可知也周因扵殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因扵虞獨不言所損益者其道如一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明徳嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論誼考問将欲興仁誼之休徳明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失耳若乃論政事之得失察天下之息秏此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡奸邪民亡盜賊囹圄空虚徳潤草木澤被四海鳯凰來集麒麟來㳺以古凖今壹何不相逮之逺也安所􅓎盭而陵夷若是意者有所失扵古之道與有所詭扵天之理與試迹之古返之扵天黨可得見乎黨音儻夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予禄者不食扵力不動扵末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載髙位家温而食厚禄因乗冨貴之資力以與民争利扵下民安能如之㢤是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而亡已以迫蹵民民日削月朘寖以大窮富者奢侈羨溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受禄之家食禄而已不與民争業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之具家見織帛怒而出其妻食扵舍而茹葵愠而㧞其葵曰吾已食禄又奪園夫紅女利虖紅讀曰工古之賢人君子在列位者皆如是是故下髙其行而從其教民化其㢘而不貪鄙及至周室之衰其卿大夫緩扵誼而急扵利亡推讓之風而有争田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四面而内望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人行㢤夫皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乗致寇至乗車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同足以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之說滅息然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相趙綰王臧請立明堂以朝諸侯不能就其事乃言其師申公扵是上使使束帛加璧安車以蒲裹輪駕駟迎申公弟子二人乘軺傅從至見上上問治亂之事申公時已八十餘矣對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對黙然然已招致即以為大中大夫舍魯邸議明堂事元光五年徴賢良文學之士上䇿詔諸儒制曰盖聞上古至治畫衣冠異章服而民不犯隂陽和五榖登六畜蕃甘露降風雨時嘉禾興朱草生山不童澤不涸麟鳳在郊藪龜龍逰扵沼河洛出圖書父不喪子兄不哭弟北發渠搜南撫交阯舟車所至人迹所及跂行喙息咸得其宜朕甚嘉之今何道而臻乎此子大夫脩先聖之術明君臣之義講論洽聞有聲乎當世問子大夫天人之道何所本始吉凶之效安所期焉禹湯水旱厥咎何由仁義禮智四者之宜當安設施屬統垂業物鬼變化天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇朕将親覽焉靡有所隠菑川公孫𢎞對䇿曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有徳者進無徳者退則朝廷尊有功者上無功者下則羣臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治之夲也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和徳扵上百姓和合扵下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五榖登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟徳配天地明並日月則麟鳳至龜龍在郊河出圖洛出書逺方之君莫不說義奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見扵上謂之術凡此四者治之夲道之用也皆當設施不可廢也得其要則天下安樂法設而不用不得其術則主蔽扵上官亂扵下此事之情屬統垂業之夲也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱桀之餘烈也桀紂行惡受天之罰禹湯積徳以王天下因此觀之天徳無私親順之和起逆之害生此天文地理人事之紀臣𢎞愚戇不足以奉大對時對者百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一召入見容貌甚麗拜為愽士待詔金馬門𢎞復上疏曰陛下有先聖之位而無先聖之名有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志書奏天子以冊書荅曰問𢎞稱周公之治𢎞之材能自視孰與周公賢𢎞對曰愚臣淺薄安敢比材扵周公雖然愚心曉然見治道之所以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不累日銷金石者不累月夫人之扵利害好惡豈比禽獸木石之𩔖㢤期年而變臣𢎞尚竊遲之上異其言𢎞又上書曰臣聞天下通道五所以行之者三君臣父子夫婦長幼朋友之交五者天下之通道也知仁勇三者所以行之也故曰好問近乎知力行近乎仁知恥近乎勇知此三者知所以自治知所以自治然後知所以治人未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招徠四方之士任賢序位量能授官将以厲百姓勸賢材也今臣愚駑無汗馬之勞陛下過意擢臣𢎞卒伍之中封為列侯致位三公臣𢎞行能不足以稱加有負薪之疾恐先狗馬填溝壑終無以報徳塞責願歸侯乞骸骨避賢者路汲黯為主爵都尉時天子方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也黯對曰陛下内多欲而外施仁義柰何欲效唐虞之治乎上黙然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戇也羣臣或數黯黯曰天子置公卿輔弼之臣寜令從諛承意陷主扵不義乎且己在其位縱愛身柰辱朝廷何臨菑嚴安以故丞相史上書曰臣聞鄒子曰政教文質者所以云救也當時則用過則舍之有易則易之故守一而不變者未睹治之至者也今天下人民用財侈靡車馬衣裘宫室皆競修飾調五聲使有莭族雜五色使有文章重五味方丈扵前以觀欲天下彼民之情見美則願之是教民以侈也侈而無莭則不可贍民離夲而徼末矣末不可徒得故搢紳者不憚為詐帶劒者誇殺人以矯奪而世不知媿故姦軌浸長夫佳麗珍怪固順扵耳目故養失而泰樂失而淫禮失而采教失而偽偽采淫泰非所以範民之道也是以天下人民逐利無已犯法者衆臣願為民制度以防其淫使貧富不相燿以和其心心既和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則隂陽和四時正風雨時草木暢茂五榖蕃熟六畜遂字民不夭厲和之至也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強陵弱衆暴寡田常篡齊六卿分晉並為戰國此民之始苦也扵是強國務攻弱國修守合從連衡馳車轂擊介胄生蟣蝨民無所告訴及至秦王蠶食天下并吞戰國稱號皇帝一海内之政壊諸侯之城銷其兵鑄以為鐘虡示不復用元元黎民得免扵戰國逢明天子人人自以為更生鄉使秦緩刑罰薄賦斂省繇役貴仁義賤權利上篤厚下佞巧變風易俗化扵海内則世世必安矣秦不行是風循其故俗為智巧權利者進篤厚忠正者退法嚴令苛諂諛者衆日聞其美意廣心逸欲威海内使蒙恬将兵以北攻強胡辟地進境戍扵北河飛芻輓粟以隨其後又使尉屠睢将樓船之士攻越使監禄鑿渠運糧深入越地越人遁逃曠日持乆糧食乏絶越人擊之秦兵大敗秦乃使尉佗将卒以戍越當是時秦禍北搆扵胡南挂扵越宿兵扵無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經扵道樹死者相望及秦皇帝崩天下大畔陳勝呉廣舉陳武臣張耳舉趙項梁舉呉田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然夲皆非公侯之後非長官之吏無尺寸之埶起閭巷杖棘矜應時而動不謀而俱起不約而同㑹壤長地進至于伯王時教使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長䇿也今中國無狗吠之警而外累扵逺方之備糜敝國家非所以子民也行無窮之欲甘心快意結怨扵匈奴非所以安邉也禍挐而不觧兵休而復起近者愁苦逺者驚駭非所以持乆也今天下鍜甲摩劒矯箭控弦轉輸軍糧未見休時此天下所共憂也夫兵乆而變起事煩而慮生今外郡之地或㡬千里列城數十形束壤制帶脇諸侯非宗室之利也上觀齊晋所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也後以安為騎馬令帝以卜式為郎式不願上曰吾有羊上林中欲令子牧之式乃拜為郎布衣屩而牧羊韋昭曰屩草屝歲餘羊肥息上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輙斥去毋令敗羣上以式為竒拜為緱氏令試之緱氏便之宣帝時丞相魏相又數表采易隂陽及明堂月令奏之曰臣相幸得備貟奉職不修不能宣廣教化隂陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇隂陽隂陽之分以日為紀曰冬夏至則八風之序立萬物之性成各有常職不得相千東方之神太昊乗震執規司春南方之神炎帝乗離執衡司夏西方之神少昊乗兊執矩司秋北方之神顓頊乗坎執權司冬中央之神黄帝乗坤艮執繩司下土兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兊治則饑秋興震治則華冬興離治則泄夏興坎治則雹明王謹于尊天慎于養人故立羲和之官以乗四時節授民事君動静以道奉順隂陽則日月光明風雨時節寒暑調和三者得敘則災害不生五榖熟絲麻遂草木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民說上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡㢘恥寇賊姦宄所繇生也臣愚以為隂陽者王事之夲羣生之命自古賢聖未有不繇者也天子之義必純取法天地而觀扵先聖髙皇帝所述書天子所服第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌謹與将軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩恵扵天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫晁錯時為太子家令奏言其状臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知隂陽者四人各主一時時至明言所職以和隂陽天下幸甚王吉上䟽言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務将興太平詔書毎下民欣然若更生臣伏而思之可謂至恩未可謂夲務也欲治之主不世出公卿幸得遭遇其時言聼諫從然未有建萬世之長策舉明主扵三代之隆者也其務在扵期㑹簿書㫁獄聽訟而已此非太平之基也臣聞聖王宣徳流化必自近始朝廷不偹難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行扵深宫得則天下稱誦之失則天下咸言之行發扵近必見扵逺故謹選左右審擇所使左右所以正身也所使所以宣徳也詩云濟濟多士文王以寜此其夲也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極質檏日銷恩愛寖薄孔子曰安上治民莫善扵禮非空言也王者未制禮之時引先王之禮宜扵今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民躋之仁夀之域則俗何以不若成康夀何以不若髙宗竊見今世趨務不合扵道者謹條奏唯陛下裁擇焉吉意以為夫婦人倫大綱夭夀之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女無節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘扵婦逆隂陽之位故多女亂古者衣服車馬貴賤有章以襃有徳而别尊卑今上下僭差人人自制是以貪財趨利不畏死亡周之所以能致治刑措而不用者以其禁邪扵㝠㝠絶惡扵未萌也又言舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今至扵積功治人亡益扵民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉古者工不造琱琢商不通侈靡非工商之獨賢政教使之然也民見儉則歸夲夲立而末成其指如此上以其言迂闊不甚寵異也元帝時御史大夫貢禹上書曰孝文皇帝時貴㢘絜賤貪汙賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海内大化天下㫁獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習扵計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯扵世欺謾而善書者尊扵朝誖逆而勇猛者貴扵官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政扵世行雖犬彘家富埶足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壮士兄勸其弟父勉其子俗之壊敗乃至扵是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輙行其誅亡但免官則争盡力為善貴孝弟賤賈人進真賢舉實㢘而天下治矣孔子匹夫之人耳以樂道正身不觧之故觧讀曰懈四海之内天下之君微孔子之言亡所折中中音竹仲反況乎以漢地之廣陛下之徳處南面之尊秉萬乗之權因天地之助其扵變世易俗調和隂陽陶冶萬物化正天下易扵決流抑隊自成康以来㡬且千歲欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念髙祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣逺放讇佞放出園陵之女罷倡樂絶鄭聲去甲乙之帳退偽薄之物修莭儉之化驅天下之民皆歸扵農如此不觧則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民産子七歲出口錢自此始又省建章甘泉宫衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意元帝好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵扵皇后太子匡衡復上䟽曰臣聞治亂安危之機在乎審所用心盖受命之主務在創業垂統傳之無窮繼體之君心存扵承宣先王之徳而襃大其功音者成王之嗣位思述文武之道以養其心休烈盛美皆歸之二后而不敢專其名是以上天歆享而鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖徳天覆子愛海内然隂陽未和奸邪未禁者殆論議者未丕揚先帝之盛功争言制度不可用也務變更之所更或不可行而復復之是以羣下更相是非吏民無所信竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事留神扵遵制揚功以定群下之心大雅曰無念爾祖聿脩厥徳孔子著之孝經首章盖至徳之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以賛天地之化治性之道必審己之所有餘而强其所不足盖聦明䟽通者戒扵大察寡聞少見者戒扵雍蔽勇猛剛強者戒扵大暴仁愛温良者戒扵無㫁湛静安舒者戒扵後時廣心浩大者戒扵遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖徳臣又聞室家之道脩則天下之理得故詩始國風禮夲冠㛰始乎國風原性情而明人倫也夲乎冠婚正基兆而防未然也福之興莫不夲乎室家道之衰莫不始乎梱内故聖王必慎妃后之際别適長之位禮之扵内也卑不隃尊新不先故所以統人情而理隂氣也其尊適而卑庶也適子冠乎阼禮之用體衆子不得與列所以貴正體而明嫌疑也非虚加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動静㳺燕所親物得其序得其序則海内自脩百姓從化如當親者䟽當尊者卑則佞巧之姦因時而動以亂國家故人慎防其端禁扵未然不以私恩害公義陛下聖徳純備莫不脩正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣成帝初即位薛宣為御史中丞執法殿中外緫部刺史上䟽曰陛下至徳仁厚哀閔元元躬有日昃之勞而亡佚豫之樂允執聖道刑罰惟中然而嘉氣尚凝隂陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事至開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相迫促亦内相刻流至衆庶是故鄉黨闕扵嘉賔之懽九族忘其親親之恩飲食周急之厚彌衰送往勞来之禮不行夫人道不通則隂陽否隔和氣不興未必不由此也詩云民之失徳乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知夲朝之要務臣愚不知治道惟明主察焉上嘉納之成帝召直言之士詣白虎殿對䇿䇿曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對杜欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克巳就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行扵鄉黨考功能扵官職逹觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為逺觀其所主孔子曰視其所以觀其所由察其所安人焉廋㢤取人之術也殷因夏尚質周因殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏扵一人愛寵偏扵一人則繼嗣之路不廣而嫉妬之心興矣如此則匹婦之說不可勝也唯陛下純徳普施無欲是從此則衆庶咸說繼嗣日廣而海内長安萬事之是非何足備言東漢光武時桓譚拜議郎給事中因上䟽陳時政所宜曰臣聞國之廢興在扵政事政事得失由乎輔佐輔佐賢明則俊士充朝而理合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚荘王問孫叔敖曰寡人未得所以為國是也莊王名旅穆王商臣之子也孫叔敖楚賢相也言欲為國扵是未知何以得之叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣荘王曰善願相國與諸大夫共定國是也盖善政者視俗而施教察失而立防威徳更興文武迭用然後政調扵時而躁人可定昔董仲舒言理國譬若琴瑟其不調者則解而更張夫更張難行而拂衆者亡是故賈誼以才逐而晁錯以智死世雖有殊能而終莫敢談者懼扵前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣夫張官置吏以理萬人縣賞設罰以别善惡惡人誅傷則善人蒙福矣今人相殺傷雖巳伏法而私結怨讎子孫相報後忿深前至扵滅戶殄業而俗稱豪健故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬扵邉其相傷者加常二等不得雇山贖罪如此則仇怨自觧盜賊息矣夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏此所以抑并兼長㢘恥也今富商大賈多放田貨中家子弟為之保役保役可保信也趨走與臣㒒等勤收稅與封君比入是以衆人慕効不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相紏告若非身力所得皆以臧卑告者如此則專役一已不敢以貨與人事寡力弱必歸功田畆田畆脩則榖入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因縁為市所欲活則出生議所欲陷則與死比是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣章帝時第五倫性峭直常疾俗吏苛刻及為三公值帝長者屢有善政乃上䟽褒稱盛羙因以勸成風徳曰陛下即位躬天然之徳體晏晏之􅐾以寛𢎞臨下尚書考靈䊮曰堯文塞晏晏爾雅曰晏晏温和也出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書毎下寛和而政急不觧務存莭儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莾之餘頗以嚴猛為政後代因之遂成風化郡國所舉𩔖多辨職俗吏殊未有寛博之選以應上之求者也陳留令劉豫冠軍令駟協並以刻薄之􅐾臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在扵此又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不從以身教者從以言教者訟夫隂陽和嵗乃豊君臣同心化乃成也其刺史太守以下除拜京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寛臣愚不足採桓帝初詔公卿郡國舉至孝獨行之士崔寔以郡舉除為郎論當世便事數十條名曰政論指切時要言辨而确确堅正也當世稱之仲長統曰凡為人主宜冩一通置之坐側其辭曰自堯舜之帝湯武之王皆頼明哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所以不理者常由人主承平日乆俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽真或猶豫岐路莫適所從或見信之佐括囊守禄或踈逺之臣言以賤廢是以王綱縱弛扵上智士欝伊扵下悲夫自漢興以来三百五十餘嵗矣政令垢翫上下怠懈垢惡也風俗彫敝人庶巧偽百姓囂然咸復思中興之救矣且濟時拯世之術豈必體堯蹈舜然後乃理㢤期扵補綻決壊技柱邪傾随形裁割要措斯世扵安寧之域而巳故聖人執權遭時定制歩驟之差各有云設不強人以不能背急切而慕所聞也盖孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也是以受命之君毎輒創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事㢤故言事者雖合聖徳輒見掎奪何者其頑士闇扵時權安習所見不知樂成況可慮始茍云率由舊章而已其達者或矜名妒能恥策非己舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶将困焉斯賈生之所以排扵絳灌屈子之所以攄其幽憤者也夫以文帝之明賈生之賢絳灌之忠而有此患況其餘㢤故宜量力度徳春秋之義今既不能純法八世故宜參以覇政則宜重賞深罰以御之明著法術以檢之自非上徳嚴之則理寛之則亂何以明其然也近孝宣皇帝明扵君人之道審扵為政之理故嚴刑峻法破姦軌之膽海内清肅天下宻如宻静也薦勲祖廟享號中宗筭計見效優扵孝文及元帝即位多行寛政卒以堕損威權始奪遂為漢室基禍之主政道得失扵斯可監昔孔子作春秋褒齊桓懿晋文歎管仲之功夫豈不美文武之道㢤誠違權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以觧平城之圍夫熊經鳥申雖延厯之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏熊經鳥伸此道引之士養形之人也盖為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也徳教者興平之粱肉也夫以徳教除殘是以粱肉理疾也以刑罰理平是以藥石供養也方今承百王之敝值戹運之㑹自數世以來政多恩貸馭委其轡馬駘其銜四牡横奔皇路險傾方将拑勒鞬輈以救之豈暇鳴和鑾清節奏㢤昔髙祖令蕭何作九章之律有夷三族之令黥劓斬趾㫁舌梟首故謂之具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寛致平也必欲行若言當大定其夲使人主師五帝而式三王盪亡秦之俗遵先聖之風棄茍全之政蹈稽古之蹤復五䓁之爵立井田之制然後選稷契為佐伊吕為輔樂作而鳳凰儀擊石而百獸舞若不然則多為累而巳獻帝時政移曹氏祕書監侍中荀恱志在獻替而謀無所用乃作申監五篇而奏之其大略曰夫道之夲仁義而已矣五典以經之羣籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其扵仁義也申重而已致政之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壊法放越軌奢敗制四者不除則政末由行矣夫俗亂則道荒雖天地不得保其性矣法壊則勢傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不得充其求矣是謂四患興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善雖使契布五教臯陶作士政不行焉故在上者先豐人財以定其志帝耕耤田后桑蠶宫國無逰人野無荒業財不賈用力不妄加以周人事是謂養生君子之所以動天地應神明正萬物而成王化者必乎真定而已故在上者審定好醜焉善惡要乎功罪毀譽効扵準驗聽言責事舉名察實無惑詐偽以蕩衆心故事無不覈物無不功善無不顯惡無不章俗無姦怪民無淫風百姓上下覩利害之存乎巳也故肅恭其心慎脩其行内不囬惑外無異望則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭朴以加小人化其刑也君子不犯辱況扵刑乎小人不忌刑況扵辱乎若教化之廢推中人而墜扵小人之域教化之行引中人而納扵君子之塗是謂章化章明也小人之情緩則驕驕則恣恣則怨怨則叛危則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之内政有事則用之軍旅是謂秉威賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既蠲五政又立行之以誠守之以固簡而不怠踈而不失無為為之使自施之無事事之使自效之不肅而成不嚴而化垂拱揖讓而海内平矣是謂為政之方又言尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以陽從隂違天以婦陵夫違人違天不祥違人不義又古者天子諸侯有事必告于廟朝有二史左史記言右史書事事為春秋言為尚書君舉必記善惡成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得或欲隠而名彰得失一朝而榮辱千載善人勸焉淫人懼焉宜扵今者備置史官掌其典文紀其行事毎扵嵗盡舉之尚書以助賞罰以𢎞法教帝覽而善之厯代名臣奏議巻二十四
