body:
  text: 歷代名臣奏議卷二百二十三明楊士竒等撰兵制宋髙宗時黃次山奏曰臣聞制勝在將不在兵養兵在精不在衆渭曲之戰西魏以府兵萬人破走髙歡二十萬衆者節制存焉故也府兵始於西魏而成於唐西魏才百府而唐置八百有竒以中府千人為率則唐兵幾九十萬而西魏不過十萬也且當時諸將功參佐命望實俱重者曰八柱國宇文泰任總百揆元欣優遊禁闥唯李虎趙貴于謹獨孤信侯莫陳崇六人各督二大將軍每軍各統二開府每開府各統一軍是為二十四軍部分既明權紀自振身居行伍籍在朝廷若身使臂若臂使指折衝厭難誰敢侮之陛下天命中興為生賢佐髙勳鴻烈於古有光然而法制搶攘非甚有紀謂宜裒多益寡酌古御今使若柱國督將軍將軍督開府合袪斂散可得而知按籍運籌不逃聖鑒然後歷吉日選靈辰北臨盛秋躬秉武節稽驪山大閲之制用臨淮校旗之法激惰偷之士角拳勇之才令行於軍氣當自倍敵人送死談笑應之警報夕傳鋭師朝引風馳霆擊固不韙歟昔吳漢將突騎至清陽士馬甚盛悉上兵簿於幕府不敢自私郭子儀方燕客聞相楊綰散減音樂五分之四古之賢將所以能功名終始與國匹休者其設心類如此陛下推誠之素功臣體國之深今日事機如此之急尚何俟而久不為哉事之克濟臣主同榮倘或不然舉無全地惟陛下留聽次山又奏曰臣幸得以非才復召見乃七月己巳言校旗大閲之法曰願歷吉日選靈辰北臨盛秋躬秉武節陛下嘉惠留聽不遺易忘之臣八月甲辰詔御六師順天道東行九月丙寅發臨安臣得廁執事顔行蒙霜露備羈靮宜有以開廣德意幸自見敢索言之臣聞臨大難不懼者聖人之勇也甲兵不多非國之災貨財不積非國之貧顧操術立志何如爾唐太宗初即位突厥頡利傾國而至飲馬便橋元年關中飢米斗匹絹二年天下蝗三年大水民東西就食兹亦危矣太宗見善明用心剛信魏徴仁義之説而拒封倫捭闔之詞以房杜為腹心英衛為爪牙處將於衛宿兵於府其語士卒曰吾不使汝曹穿池築苑唯專意武備天下無事則為汝師突厥入寇則為汝將其語將帥則曰國之紀綱唯賞與罰非分之恩不可數得勉自修飭毋貽後悔太阿之柄操持不失故薄海內外莫敢攖其鋒其後頡利成禽酋長帶刀宿衛部落皆襲衣冠米斗三四錢行旅取給道路此無他操術得宜有志者事終成也方今邊塞之祻飢饉之災方之太宗異世同事然今秋嵗既稔矣待邊塞者獨不可為歟臣願陛下躬太宗撥亂之心采魏徴仁義之説以至誠育萬物以至孝通神明以剛健中正位天德親賢逺佞貴公滅私若忿欲不萌則聽斷自審臨機必果料敵必明簡號令嚴階級拔進梟俊禽敵之士汰遣全軀保妻子之徒有功當賞不吝王侯無功僥望分毫不與如此則不可勝之計立矣法曰先為不可勝以待敵之可勝不可勝在我可勝在敵以飽待飢以逸待勞正治以待其亂致人不致於人在我者也觀釁而動首尾俱縱建瓴破竹所俟者時在敵者也以陛下之明席藝祖仁宗之遺澤當上元之德會協永平之嵗紀惟當斷以不疑與賢士大夫共此功名爾孟子曰責難於君謂之恭今日之事落落若難合臣非敢獨言易然不以孟子之心望陛下則臣之罪也惟陛下憐察吏部員外郎廖剛奏曰臣聞古者天子必有親兵雖總轄不無其人實自將之所以備不虞強主威無太阿倒持之悔漢有南北軍唐有左右神策之類是也我祖宗鑒五季之弊軍政尤為嚴密如三衙四廂所統之兵區處調發關防周盡惟一人之所欲為臣竊聞之比年以來稍稍廢缺所恃以備非常者諸將外衛之兵而已臣願陛下參稽舊制選精鋭忠赤三數萬人以為親兵直自將之居則以為守衛動則常為中軍此強本弱枝之道最今日之急務也昔段秀實常為唐德宗言之辟猶猛虎所以百獸畏者爪牙也爪牙廢則孤豚特犬皆能為敵正謂是也臣愚不勝區區過計願陛下留神無忽剛為御史中丞又奏曰臣聞國不可去兵不必敵國外患之備雖間暇無事之日亦在所不廢也然兵貴選練不在數多多而不可用非獨不能成功亦或能敗事今日諸將之兵冗濫甚矣或收集叛亡或招納盜賊疲癃稚弱無所不有姑取其數之多初不計其可用與否也前此一切不暇問今和議既定本為休兵息民豈容不能戰之人尚爾虛占兵籍蠧蝕吾民之膏血乎臣願布告諸大將使之體國念民精加選擇汰其不堪披帶者以十二三為率聽其自便詭名請受者因而可以銷去立賞以杜其後無歸而願留者别籍為屯田卒授以河南之地使之種耕自食其力且資以供億吾軍庶東南凋瘵之民稍獲蘇息而屯戍可以久逺不廢是一舉而兩得也武義大夫曹勛上書曰臣竊以古者寓兵於農以禦大敵兩漢而下無不皆然惟魏及唐建府兵之制民兵遂廢唐全盛時戡大憝勦元惡無非官軍者及德少衰據藩鎮起大盜亦無非官軍者是以歷古有叛將而無叛兵由唐而下多叛兵而少叛將理或致然今州縣之民百倍於兵而義不能卻內侮強不能禦外侵蓋以未嘗習用也近見諸路州縣見行火甲以禦夜盜民安之若素習臣嘗推行備見其便今欲乞就建民兵之法俾粗知部勒稍知戰事廂有坊坊有甲甲有伍伍有長許置器甲以肄武備州委都監縣委令佐帶民兵將領專一習按復委太守提督之不期年一路便可得兵百萬實可密制兵卒使不得逞絶內侮外侵之患倘或可採乞下臣取索畫一便見不擾有利無害御史中丞張守上奏曰臣伏見比年敵人犯順將士畏怯望風奔潰破殘州縣易於拉朽忠臣義士之所憤嘆而敵人之所竊笑也臣嘗求其故不過驕惰而已今每出師則水舟陸車纍纍隨行謂之老小其實皆婦女故出師之數婦女必倍之弊日以滋古所未有以故所居則求寬潔所食則求豐美所用則求羡餘一有不足則冒法抵禁劇於寇盜責其用命禦敵奮勇立功其亦難矣夫為將領者固當正身率下與士卒同辛苦往往亦以婢妾歌舞而自隨故上為一下為二上下相蒙無復忌憚今者陛下屏逺嬪御以馬上治天下駐蹕建康深戒既覆之車一新舊染之俗前日之弊理宜痛懲臣愚欲乞應軍人家口遇出軍日並不得隨行各就本寨居止官司常加存恤修治舍屋量添口食如有軍人及將校使臣輒將帶婦女老小隨軍並行軍法本轄將校使臣失覺察減一等科罪主將身自違犯令御營使司及御史臺覺察彈奏重賜施行庶幾將士忘家徇國或能立功以革舊弊守又乞以田募兵劄子曰臣伏見近者朝廷條畫防江點用人丁臣以謂驅不教之民一旦用之恐致誤事然所謂民兵非終不可用也特不可以濟目前之急而幸一朝之功耳然自朝廷數年以來屢嘗推行民兵或置巡社或結保甲或增弓手或計田出兵大抵皆所以更張軍政而求實用然而推行以來未見成效其因出而逃遇敵而潰則與官軍不甚相逺臣嘗思之惟寓兵於農最為良法然三代之法不可復矣獨取其意尚有可行伏見國家係官之田有五一曰屯田二曰逃田三曰户絶田四曰抵當籍沒田五曰罪人籍沒田頃畝甚多入官之租雖至膏腴畝率一二斗多不過三四斗或冒占或荒間或欠負或水旱檢放或官吏侵漁所入官者又無幾矣臣愚以謂若捐此田以募兵則於公家之費不多而得土著之人可委各有顧戀不至散亡臣愚欲乞盡括五色係官之田委州縣預定肥瘠美惡第為等差上田三十畝其次增多至百畝止召募一人給為永業免其賦役居常務農農隙講武教養而成年嵗之間必有精鋭可以濟用所有官兵權住招刺伏望睿慈詔大臣詳議如有可採即乞付有司條畫施行守為殿中侍御史又奏曰臣仰惟陛下修政事攘戎兵慨然有意於中興之盛然今之最大且急者莫過於軍政本朝之兵自童貫髙俅等壞之而勸沮之法廢驕惰之風成出戍則亡遇敵則潰小則荷戈攘奪以逞大則殺將嬰城而叛天下可用之兵無幾矣唐史有云置兵所以止亂及其弊也適足為亂又其甚也至困天下以養亂今日之勢蓋幾於此改絃易調顧可緩乎伏覩建炎元年十一月詔侍從以上各具所見考古軍政可行於今者條具以聞逮今纍月未聞有所獻納以副陛下大有為之意者今朝廷雖有置振華新軍指揮議者尚慮招集選擇未易充數循習效尤或蹈前轍及所以給養之具訓練之要節制之方亦當講求臣竊過計以謂防秋之期止三數月寸隂可惜窮日力以圗之尚恐不及欲望睿慈申嚴去冬之詔或責以旬月使悉意開陳或召至中書給筆札條具庶幾博採衆智宜有可行而陛下詔令不至虛出守又論教閲軍兵劄子曰臣竊謂兵法之弊久矣防秋不逺理難遽革因而用之尚有可為今天下之兵固亦不少而養兵之費固亦不資豈皆不可用乎抑教之不至耳玉翦以六十萬之衆伐荆亦必俟其投石超距而後用之蓋士氣振然後樂赴功也天下之兵衣糧俸給蠶食縣官者有四曰禁軍曰廂軍曰土軍曰弓手雖有教閲之法載在令甲州縣之間置而不講在於平日猶為不可況國步艱危寇戎猖蹶之時乎蓋以州縣之吏或妄占破或稱防護或稱差出種種名目背公自營借欲教閲因無見在之兵矣上下苟偷日復一日糜耗國用驕惰日滋目不識旌旗耳不聞鉦鼓隊伍行列坐作進退皆不復知一旦驅之守禦責之效死何異却行而求前哉臣愚欲乞諸路各委制置使同監司一員根刷見管廂禁土軍弓手汰其老弱病羸早晚兩教州委守臣縣委令長且親詣教場按閲如其事藝精強隨事激賞不惟將來防秋必有可用而部內盜賊亦可翦除應軍兵弓手如有不赴教閲並正軍法應在任官白直之外妄有影占及長吏不日赴教場監司安撫制置司按劾以聞重置典憲如有可採即乞睿旨速賜施行李石奏曰文武相為經緯之術二者要不可偏廢特所尚有緩急耳且人之身血氣為榮食氣為衛今特以榮氣之強健而廢其衛氣可乎國家弭兵無事既已有嵗自以為尚文之世然求所謂輔成文治以蚤正素治者陛下以神武不殺為威寓五兵於詩書之教廟算深逺非草野所當慮者然以臣所慮特其粗者嘗謂虞舜干羽之舞人徒知其為文德不知其以蹈厲之節而寓其擊刺之威以明不輕用武也今之教閲之法亦昔人干羽之意雖曰文德無廢其武可也昔魚朝恩老於兵間已不識郝將軍之陳為李臨淮遺法況不習其教者乎州之禁軍縣之弓手所以為教閲之法者寄其緩急之用耳欲用之人必資其教且小人非居安於無事則必使之為蹴踏蹶張運掉其筋力馳驟其血脈習為冒險赴危之狀目熟旌旗耳習金鼓而不懾怯者此教之以緩急之用也且自二十餘年之間邉圉綏靜其可擐甲挽強者皆以老簡汰其少壯者已不知戰陳為何等事甚可慮也今之州縣教閲者乃素備耳今又於教閲之法不得専意為之而廢其事所謂禁軍弓手州縣冒法差役趨走指呼與衆人同所謂教之者兵官巡尉以時一出按例為之遇春秋大閲有司未免有損經費而徒為玩習之具此何異棘門之戲哉臣願行下州縣禁軍弓手不得違法差出兵官巡尉教閲之籍時稽考之以示安不忘危之意李彌遜上奏曰臣謹按歷代天子必有衛所以制六合威四夷固根本之地也承平日久寖以廢弛至於國家艱難用武以來亦復因循沿襲置而不講誠為今日之急務近者朝廷雖稍收四方之兵以聚中都然人數未多法制未備軍伍未成未足以為重臣愚欲乞朝廷措置或差或募或就委諸將選擇精鋭數萬人置帥以總之專衛王室别立親衛數千人倣古之制選募良家子便弓馬者及武臣子弟及諸將諸軍下子弟為之庶幾可以制近威逺以增重朝廷之勢如臣之説或有可採伏望聖慈特賜指揮施行江南東路安撫制置大使葉夢得奏曰臣既已妄論守江之備竊惟兵法曰上兵伐謀其次伐交其次伐兵項羽與漢髙帝相持廣武欲挑戰帝曰吾寧鬭智不鬭力卒禽項羽自古用師伐兵不如伐謀鬬力不如鬬智此不戰屈人之道也今諸將屢捷稍皆還屯理須休息整齊以待秋深再舉則此一兩月之間未可遽動正伐謀鬭智之時採之道塗皆謂敵初以盛夏來侵蓋狃前日屢勝欲以憑陵於我謂我必屈而初無所忌憚陛下既沈幾先物決策用兵順昌首敗烏珠邇者宿亳陳鄭復相繼歸順賊出不意失其本圖敗亡疾病之餘自喪其師幾三之一固已伐其謀矣今者平昔用事酋領與其徒往往皆無固志則其國中未必不歸罪犯盟始議之人橫生猜嫌而我兩河京東故民與契丹遺種及去嵗所誅七族之黨宜亦皆有伺間償怨之志則我謀智並用適當其幾不待將來大軍親臨而後可決勝負探報見主兵侵我者不過十三人烏珠等八人則在京師以窺淮浙薩勒濟等三人則在關中以擾隴蜀偽蓋天大王等二人則在濬滑以主簽軍方漢髙帝與項羽勝負未決之際先用陳平計委金四萬斤疏間楚君臣范增果疑不用遂翦其腹心及垓下之敗復下令得羽頭者賞千金邑萬户而魏太武攻臧質質亦募得太武者封萬户賜布絹各萬匹竊意今烏珠而下亦當委諸大將多出金帛擇機辨之士縱為反間仍各立賞格謂如得兀术者賞官田畝錢帛若干其次以是為差明為敕榜散揭於新復州必有傳布漸至京師者縱未能使即相魚肉豈不足壞散其黨使攜二乎然後下詔訪耶律氏之後以興滅繼絶褒前日被誅七族之家有能為之復仇與山東兩河素自結集不屈於敵者皆賜以官秩他日大軍過河以兵援之有能立功者裂其故疆悉以分封自敵并吞契丹其故家大族怨之深入骨髓強據燕趙吾民橫被驅率革靣左袵日懷憤怨今知中國之威大振異時虎狼塗炭之惡無所復施上下交疑釁端易生但有一從吾令攘袂而起則他皆瓦解我諸將乘而席卷此兼弱攻昧取亂侮亡而前徒倒戈攻後以北者在是舉矣臣區區孤忠無所效勞既聞輿言不敢隱默伏惟陛下垂惠採擇髙宗駐蹕揚州夢得為户部尚書陳待敵之計有三曰形曰勢曰氣而已形以地理山川為本勢以城池芻粟器械為重氣以將帥士卒為急形固則可恃以守勢強則可資以立氣振則可作以用如是則敵皆在吾度內矣因請上南巡阻江為險以備不虞又請命重臣為宣總使一居泗上總兩淮及東方之師以待敵一居金陵總江浙之路以備退保疏入不報李光乞修京城守禦之備劄子曰臣恭聞仁宗皇帝以四方用兵無功選用大臣講求利害召韓琦范仲淹對于崇政殿琦等深慮夏人一旦乘勝張犯闕之勢求以河為界則宜堅守京城詔河北之兵按而不較使進而嘗有反顧之憂故修京城者非徒禦寇誠以伐深入之謀也當時天下治安如彼而大臣謀慮及此疑若過計今金人恃兵力之強劫質親王大臣以三鎮為辭勢必深入則都城守禦之備安得不汲汲也臣訪聞朝廷專委李彀開撩城濠日役萬人而將作監分管東壁樊家岡一帶六十八萬餘工比之别壁工料最為浩大見役本監並步軍司人兵不滿千人兼聞本監長二未差正官張元幹書生不足倚辦欲望聖慈特降指揮令李彀將所轄兵夫與將作監就城東駐劄併力先從東壁開掘兼新除少監井度見在蜀中未有到任之期乞逐急選任有材幹官同共管幹所役兵夫逐日興工放散各依時刻仍日輪從官及臺諫官一員躬詣檢察庶幾早得辦集敵人聞之有所忌憚不勝幸甚光又奏曰臣伏見臣寮上言以都城濬治金湯修設樓櫓為非已奉聖旨劄付宣撫司都人傳播莫不惴恐夫衆保於城城保於德言君以德附衆以功庇下故能相依以衛社稷則修樓櫓濬金湯嚴守禦之備者所以安人心壯士氣以伐敵人深入之謀也河東河北素號腹心之地密邇玉室今敵人在境諸郡僅能自守萬一防秋不嚴復成長驅之勢則大河之險理宜設備而天子之居廟社所在號曰都城者又烏得泰然不為之慮乎今天下之勢誠為全盛以户部之籍計之主户無慮二千餘萬倉猝之際起而為兵孰不響應陛下愛惜民力未欲輕動已戒畿甸之兵為保伍之法召東南之兵約赴援之期搜原野以簡師徒鳴鼓角以聲弔伐勒兵示衆大見武節所以示敵人之有備也今議者乃專為邉河之防而欲弛都城守禦之具臣恐此説一出內外騷動居者無固守之志敵人起深入之謀非計之得也伏望陛下明詔執政大臣速議守禦之策濬城壕增雉堞屯兵積粟示彼有不可犯之勢亦以慰安人情保護根本實中外之幸孝宗淳熙二年敷文閣待制周必大上言曰臣竊謂安邉闢國固在乎兵然兵貴乎精而不貴乎多今雖日下招填之令而諸軍未嘗以為足也昔尋邑百萬而敗於光武之千騎苻堅百萬而敗於謝玄之數千兵果在多乎臣不敢泛引古事姑以近日茶寇言之四百輩無紀律之夫非有堅甲利兵也又非有竒謀祕畫也不過陸梁山谷間轉剽求生耳自湖北入湖南自湖南入江西今又睥睨二廣經涉纍月出入數路使帥守監司路分將官稍有方略用其所部之卒自可殄滅顧乃上煩朝廷逺調江鄂之師益以贑吉將兵又會合諸邑土軍弓手幾至萬人猶未有勝之之策但聞總管失律帥臣拱手提點刑獄連易三人其他將副巡尉奔北夷傷之不暇小寇尚爾倘臨大敵則將若何臣聞去年冬江東西諸郡同月地震今年廬州大水壞城中古橋於占皆為兵象萬一勍敵不譓輒窺邉鄙雖以陛下神武睿算破之無難所慮和好嵗久宿將無幾後來者於應敵之方非其素習必至仰勞指授伏望聖慈預飭諸將密修邉備且令遍察所部統制官等孰善謀孰善戰孰以廉平得士心各以名聞簡在聖懷備他日之用但令將得其人自然人百其勇兵之多寡非所問也抑臣又有私憂過計者昨有自鄂州來者云在彼見彗星出於西南今者孛星亦在西南天事常象應之在德陛下固當有以處此然西南為坤維坤維蜀也消弭備禦尤不可緩比雖委范成大權充制置然成都距軍前甚逺深恐緩急之際事機有不相應願陛下速擇文武信臣或别以撫諭為名或專委節制之重往分憂顧庶免後艱實為大幸必大為兵部侍郎又上言曰臣仰惟陛下選將練兵十四年於兹軍政日修固非愚臣所當妄議然千慮所及則不敢默臣舊聞鄂州一軍最號精鋭有紀律者今夏統制解彥詳統領梁嘉謀張興嗣將三千人收捕茶寇其間一勝一負所不能免但聞師行無法至有十百為羣逃竄而歸者臣嘗博詢其故皆謂近嵗多揀汰舊人招收新軍舊人曽歷行陳備諳李法新軍往往是遊手及有過犯之人尺籍伍符彼豈能知前此新舊相參尚猶可用今舊人日少遂致如此李川不欲明言其事只劾彥詳等調發乖謬致軍兵亡沒者一百一十四人陛下特降睿旨將彥詳等遞追官資勒停自效而又嘉川能舉其職特與遷轉信賞必罰孰不勸懲然而弊源未革安得不為之所臣愚欲望聖慈遍下諸軍除大段癃老疾病之人毋得輒行揀汰其新軍不特教之事藝須令朝夕示以紀律庶幾緩急之際不致誤事若乃久任將帥使之揀擇偏稗整齊部曲此在今日尤為先務惟聖明留神財幸淳熙十四年知桂陽軍陳傅良擬進劄子臣聞熙豐崇觀以來用事者紛更祖宗之舊以致金人之禍今天下皆追咎之矣至於重斂不惟奉行不以為過又從而附益之者何也昔者以妄費今以養官與兵故也方今經費兵居十一官居十二官未暇言也敢言養兵國初州郡無禁兵也著在令甲自騎射至牢城凡名額二百二十三總為本城而已所謂禁兵者皆三司之卒分屯而更戍今之屯駐駐泊之名而鈴轄都監監押之官所部領也三邉之兵間因事宜升為禁軍者則所謂四十四處禁軍是已是為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅於是列郡稍置禁軍至威果既云多矣然亦無過大郡要害之處熙寧按天下廂軍之籍五十萬人而不知戰於是教閲之法起其後以廂軍團併為額則今之兩浙崇節福建保節之類是已教閲之法因别為額而𨽻之將下則今之兩浙雄節福建廣節之類是已元豐兵令悉以雄節之類升同禁軍由是禁軍始遍天下方戍法之行也三司禁旅轉徙於四方而州郡廂軍大抵以供百役蓋勞之則易使散之則易養此藝祖神謀也自州郡各有禁軍而三司之卒不出不出則常坐食於京師常坐食於京師則必盡天下之利歸之公上利盡歸於公上而州郡之益兵已多則其勢必巧取隂奪而後足於是養兵始為大患若今屯所諸軍亦何異本城軍哉特以三總領饋之而不節制於長吏為差異耳昔之所謂韓家軍者今為京口人矣劉家軍者今為建康池陽人矣嶽家軍者今為鄂渚江陵人矣向之數經行陳以功得官往往揀汰冗食於廟祠添差之類比所招刺例多下等久不離營兒女滋息稍食鮮薄類苦飢露當此勞辱最易撫摩臣愚以為此可以漸復祖宗舊制之機殆天授陛下也誠有為國家任是責者稍使不仰食於縣官以省月樁則經總制之名亦可以涎第改正恭惟陛下不愛爵祿以待天下之士大官重權可謂尊寵至於養兵則國家被重斂之名而不得辭臣享其佚上任其怨臣竊不取也孝宗時葉適上兵總論曰今事之最大者而當極論論之得其要而當先施行者一財也二兵也雖然財之所以為大事者由兵之為大事而已其舉措為興廢之決無先於此世之言兵者充塞爛漫可聞而不可聽可聽而不可行者無他焉言古者簡易徑省無兵之患而有兵之利然而接乎今之異勢異宜而不可用也則古者雖善而何益言今者繁密重滯有兵之患而無兵之利然而習乎今之既安既成而不可改也則今雖不善而何損雖然此非真擇利害以定取舍者也誠使真擇利害以定取舍則雖不必簡易徑省以慕古人之名而今日之兵其有患而無利曉然庸人皆能言之豈可不急圗而亟變乎蓋嘗慮之三代之兵乘兩漢之郡國管仲之內政隋唐之府衛此古人之美名也自府衛變而為召募召募之法壞而邉兵始重於是藩鎮之亂起收藩鎮之重勢而人主聚兵以自將為名竭天下之力以養之及人主不能自用而柄任已不專於諸侯矣則四顧茫然無所統一於是內則常憂其自為變而外則不足以制患至於有莫大之兵而受敵國無窮之祻此非今世之所謂實患者乎美名不必慕是各度其時之所能行者可以言智矣實患不能制是又不知其時之所當變此不可以言智也姑試言兵之常制以合今日之事者有四有邉兵有宿衛以為固者也羣臣不考本末不察事勢忘昔日士卒奮呼專上無禮之患而反以為太祖之所以立國者其要在兵都於大梁無形勢之險而其險以兵夫都於大梁因周漢之舊而非太祖擇而都之也使果恃兵以為固則連營百萬身自增之不待後世也其數乃不滿二十萬何哉不以兵強前世帝王之常道也況太祖之兵不滿二十萬其非恃兵以為固也決矣召募之日廣供餽之日增蓋端拱雍熙以後契丹橫不可制而然耳康定慶歷謀國日誤恃兵為固之説大熾不禁而後天下始有百萬之兵弱天下以奉兵而而其治無可為者矣而上下方揚揚然自以為得計為之治文書聚財賦盡用衰世裒刻之術取於民以啖之而猶不足及其不可用則又為之俯首以事勍敵而使之自安于營伍之中也故王安石為神宗講所以銷兵之術知兵之不勝養而猶不悟籍兵之不必多教諸路保甲至四五十萬隂欲以代正兵正兵不可代而保甲化天下之民皆為兵于是虛耗之形見而天下之勢愈弱矣元祐廢罷保甲史臣以為太祖設階級之法什伍壯士以銷姦雄之心兵制最明而百餘年無祻亂王安石不足以知此者實録所載蓋當時議論之本原也雖然王安石則信不足以知此而不為王安石者豈能知之哉至於紹聖以後則又甚矣保甲復治正兵自若內外俱耗本末並弱大觀政和中保甲之數至六七十萬二法皆弊名具實亡故軍制大壞而士卒不能被甲荷戈平民相挻化為盜賊幹離不始挾兵才萬餘長驅而至莫有敵者倉卒遣人召白徒以勤王京師失守則勤王之人寇掠遍天下矣嗚呼痛哉養兵以自困多兵以自祻不用兵以自敗未有甚于本朝者也而議者猶曰恃兵之固制兵之善可因而不可改可增而不可損是厚誣太祖而誤國家也加以四屯駐之兵又昔所未有以數倍祖宗之財用投於四總領之巨壑而州郡又各以廂禁兵自困侵削民力至於空盡問其外禦則曰請和不暇問其內備則曰倉卒可虞統制統領總管路分鈐轄將兵之官充滿天下坐縻厚祿而兵未嘗有一日之衛兵有大將屯兵有州郡守兵邉兵者因其地練其民不待內地之兵食而固僥塞也宿衛兵者因都邑所近之民教成而畨上與募士雜國廩其半而不全養也大將屯兵者悉用募士而教其精鋭全養之而已州郡守兵者以州郡之人守之而不以州郡之力養之也故兵制各行而兵力不聚然後百萬之兵而不困於財矣故進則能戰退則能守而不受侮於敵人今也一之邉兵募也宿衛募也大將屯兵昔有舊人而今募以補之使成軍也州郡守兵昔之禁兵消盡而今募其人名之曰禁兵也四者皆募而竭國力以養之是徒知募而供其衣食耳此所以竭國力而不足以養百萬之兵也力則已困用則不可故進不可戰退不可守百人跳梁則一方震動而敵人之侵侮無時而可禁也臣願陛下審慮定計以分四者之兵而變今日之法不過二年法行制定財不足為大憂而兵可用矣適又奏曰自唐至德以後節度專地而抗上令喜怒叛服在于晷刻而藩鎮之禍當時以為大諱矣然國擅於將猶可言也未久而將擅於兵將之所為唯兵之聽遂以劫制朝廷故國擅於將人皆知之而將擅於兵則不知也大歷正元之間節度使固已為士卒所立唐末尤甚而五代接於本朝之初人主之興廢皆羣卒為之推戴一出天下俯首聽命而不敢校而論者特以為其憂在於藩鎮豈不踈哉太祖既稍收節度權柄故汰兵使極少治兵使極嚴所以平一僭亂威服海內者太祖統紀制御之力非恃兵用方今國未見有難治之弊敵未見有難破之強徒以自困於兵浸淫重滯不能輕利其一曰四屯駐大兵之患其二曰州郡廂禁土兵弓手之患去一患則得一利一州之兵患去則一州利一方之兵患去則一方利兵患去則兵強惟所用之無不可者陛下果決知此豈有久而不革者哉適又奏曰敢問四大兵者知其為今日之深患乎使知其為深患豈有積五十年之久而不求所以處此者然則亦不知而已矣自靖康破壞維揚倉卒海道艱難杭越草創天下逺者命令不通近者橫潰莫制國家無明具之威信以驅使強悍而諸將自誇豪雄劉光世張俊吳玠兄弟韓世忠嶽飛各以成軍雄視海內其玩寇養尊無若劉光世其任數避事無若張俊當是時也廩稍惟其所賦功勳惟其所奏將校之祿多于兵卒之數朝廷以轉運使主餽餉隨意誅剝無復顧惜志意盛滿仇疾互生而上下同以為患矣及張浚收光世兵柄制馭無策吕祉以迹雋趣之一旦殺帥卷甲而遁其後秦檜慮不及逺急於求和以屈辱為安者蓋憂諸將之兵未易收浸成疽贅則非特北方不可取而南方亦未易定也故約諸軍支遣之數分天下之財特命朝臣以總領之以為喉舌出納之要諸將之兵盡𨽻御前將帥雖出於軍中而易置皆由於人主以示臂指相使之勢向之大將或殺或廢惕息俟命而後江左得以少安故知其為深患者若此而已雖然以秦檜之慮不及逺也不止以屈辱為安而直以今之所措者為大功疲盡南方之財力以養此四大兵惴惴然常有不足之患檜徒坐視而不恤也檜久于其位老疾而死後來者習見而不復知但以為當然故朝廷以四大兵為命而困民財四都副統制因之而侵刻兵食內臣貴幸因之以握制將權蠧弊相承無甚於此而況不戰既久老成消耗新補惰偷堪戰之兵十無四五氣勢愞弱加以役使回易交跋債負家小日增生養不足怨嗟嗷嗷聞於中外昔祖宗竭天下之財以養天下之兵前世之所無有而今日竭南方之財以養四屯駐之兵又祖宗之所無有也夫以地言之則北為重以財言之則南為多運吾之多財兵強士飽事力雄富以此取地於北不必智者而後知其可為也今奈何盡耗於三十萬之疲卒襲五六十年之積弊以為庸將腐閹賣鬻富貴之地則陛下之逺業將安所託乎陛下誠奮然欲大有為於天下攄不可掩抑之素志以謀夫不同覆載者之深讎必自是始使兵制定而減州縣之供餽以蘇息窮民種植基本於是厲其兵使必鬬厲其將使不懼一再當敵而勝負決矣兵以少而後強財以少而後富其説甚簡其策甚要其行之甚易也適又上奏曰廂軍供雜役禁軍教戰守弓手為縣之巡僥土兵則為鄉之控扼夫供役有兵備戰有兵巡僥有兵控扼有兵大州四五千人中州三千人小州猶二千人計一兵之費其正廩給之者居其一與因兵而置營伍將校其上則路分鈐轄總管者居其一與恩賜閲視借請劵食者居其一與緣兵之蠧弊虧公病私者又居其一民之所謂第一等户盡其賦入不足以衣食一兵今州郡二稅之正籍蓋以上供者及其所趂辦酒稅窠名盡以上供者朝廷既自以養大兵矣而州郡又以其自當用度者又盡以養廂禁土兵又有配𨽻之罪人牢犴充塞亦州郡所養然則財安得不匱而民安得不困乎夫所以養兵者為其有事而戰不為其無事而備也無事而備則必有不養之兵而後可今養之於無事竭州縣之力以衣食之固非所以戰也則雖有百萬之兵而不免自貶為至弱之國乃其勢之宜然爾世之論曰養兵之患無智愚所同知然而不能去者不可去也不可去者動衆害事弊未除而亂先作也夫畏其動衆害事以為弊未除而害先作此固庸人之常情耳而以為養兵之患無智愚所同知則非也何者誠不知而已知其為患則早夜之所思命令之所出必使之至於無動衆害事可以除弊而不作亂以幸天下國家也豈恣其如此而徒曰必動衆害事哉故不減宿衛屯駐之大兵則國力不寬不減廂禁弓手土兵則州郡之力不寬夫立法定制於重滯繁擾之中以困民為安強以耗國為仁惠以疲士大夫之精力為用材以人心益陋所守益卑者為逺識以不可舉動者為體國以養兵不戰為銷姦雄之心遂至於忘讎耻棄諸華廢天命禮壞樂失積衆弊而莫能革者宿衛屯駐之兵困之於上廂禁弓手土兵困之於下而已陛下思之於外而不圖其內意行其所難而不實為其所易者何哉貟興宗上殿輪對乞廣招募劄子曰臣聞王公設險以守其國險之所設人之所畏也故蜀有重關之險扞蜀者莫若守關吳有長淮之限扞吳者莫若固淮若夫荆襄之地千里坦坦此四戰之地也外無長淮以闌之近無重關以固之無關無河是無以為險者矣彼有險者聖人常以為慮無險者信不可以一日無備哉昔者宋齊六代之間夷盜南顧屢作屢止不能窺尺寸土壤蓋是時此地為重鎮此地屯重兵故也然則荆襄枵然無以為險者是當以兵為險耶況又春夏之間漢水可涉道路之多錯出可數自光化出次湖可以窺夷陵自臨汝出新野可以窺襄陽自唐州出棗陽可以窺西郢自陳州出宛丘可以窺光化茍無堅甲利兵厚集於此則深恐漢蜀之勢脈絡未通首尾難應異乎常山之勢矣是則可憂者也臣愚伏望陛下曲軫宸慮起福未形擇諸將中文能附衆武能威敵者經制此方且使以屯田為名徙內郡之兵增而戍之徙之不足又增募之蓋今荆襄之兵甚少而守蜀之兵一有外慮千里抽發未易致也或謂臣言朝廷于荆襄未嘗不擇將諸將未嘗不募兵臣以為諸將招募無術以負陛下委使者也臣自湖北所聞悉矣凡捕人補軍如捕逃亡給豫虧約諸將之令既不自信矣人誰信之獨前日劉錡在京招募茶商凡數千人以充正額茍得其術曲折如錡則盜賊亦可招亦可用也況吾民哉韓琦曰招軍次第在人貟不得侵取例物無他阻滯人自不隔如此則捐數十萬緡得萬兵矣琦之言捨小成大之術也惟陛下下諸將增戍之外又益私例使廣招壯實庶幾一方即金城之固矣興宗又乞恤義士劄子曰臣聞威惠偏廢不可以御軍軍法一偏不可以用衆使惠而無威則人不畏威而不惠則人不懷然後知撫士育人者凡以張吾氣而保吾威也使列將大校平時察察奴役其士獸驅其人則衆人披離居然已無足恃一有風塵之警則又有足恃乎臣謹據興洋一帶義士西蜀東道之扞蔽也其地險以厚其民力以武幼脫諸父母之懷其心皆可以義動可以勢役者是以紹興之初王庶在西邉極力措置凡城郭鄉社民各有户户各有等庶使分等以出丁分丁以代卒無事則更閲有事則出戍或與捐本户之徭又與免本身之役恩意甚接科條甚具庶區區行此者非獨為保蜀計乃為保國計也是以南山控要害之衝義士熟識利害自生其地自戰其地人懷保妻子守墳墓之念宜其專也臣觀饒峯之役梁洋之役近時散關之役義士與有勞焉朝廷悠悠而竟不知者諸將掩之也有能以王庶之心為心則人有告矣然而邇者是曹寃抑類有四焉此邉將罪也蓋義士比諸縣弓手手力實無雇緡然官能驅之而使無辭者以元降措畫等第與免官業錢故也今則竄易文書實者未必得免免者未必皆實一寃也凡有戰事正軍堅甲顧避弗前義士楮衣驅以先進近時諸司有議增置甲楯量欲給之議一出口而劒內士民飛詞訩訩夫仰父俯子者劒內之士所知也一家接踵肝腦塗地如義士者劒內不知矣二寃也王庶之役義士也大閲則有食錢出軍有增給衣糧錢其有異功籍定名姓以次官使今義士捨農而出寒肩而反勞則有矣飽則無之功則有矣賞則無之三寃也紹興之初義士戰已輒罷則各有一家之樂邇來官司無故占破俾之芻牧俾之負擔俾借官吏往來之役且義士者謂之民乎謂之兵乎謂之民則不當私擾謂之兵則不當私役今一切反此四寃也夫以邉民有是四寃為將帥者忍不加慮臣愚伏望下四川宣撫司體量優恤如興洋等處曽實充義士之人被官私抑勒不與依數捐免家業錢者並許本名申訴即與捐免諸陳亡之家亦乞照應此例施行其本户尚有餘丁乞更不差義士名目後有闕數于多丁處别乞抽補或當戍守雖令自備衣糧外亦乞今後更與減量本户雜科名色務從寬厚其諸將州縣平日無故占破私役禁軍法務在必行仍乞取王庶初行約束一一相度檢舉庶于邉民不敢怨望其義士元有官兵統領一員將須數員亦乞下宣撫司選差為衆樂推如近時閻寶之徒自足為用又照得階成岷鳳熙秦界上自紹興辛巳曽被宣司給散旗榜之人纍有勞效被諸將掩遏未能申列者今後有願充義士名目亦乞比附興洋義士依次與免科徭庶幾西邉後有緩急增助官軍之勢不致危急得承平義勇之遺風伏望特出睿意詳酌臣言使邉人生路一開挾纊之恩肆遍非獨結西陲之心亦聖主仁不異逺之意也興宗又議軍實奏曰臣聞天下之憲不在于兵而在軍實之不練軍實之不練猶無軍也練之不精猶不練也不練不精有司乃憂軍冗而欲去是却行而欲前也三代之初兵本于農農出為兵以農之有常數故兵之有常人一家各備一卒之用其有老者有疾者有單丁而無告者皆不役於軍及其有事官非役指衆之家即役少壯之士其勢截然如頭如足如臂指之相衛開闔進退無不在我國未嘗養無用之卒故卒甚精庫未嘗出泛濫之費故費甚省此三代之際所以綱紀四方百守而百全者率用此道也及管子治齊始變周制使都邑異鄉使兵民異處國中之士為兵故兵不與農野鄙之民為農故農不知役管子之慮至此僅能謀齊而已甚非先王之故也然當是時合齊國之士軌連鄉長之法一軍不過一萬三萬即為全軍桓公用此以髙步列國使諸侯弭耳聽令者猶以齊之軍實教之不繁而擇之不冗也秦漢之後事大變異矣兵卒皆以募效用致官居有營伍之制動有尺籍之拘最後又有黥墨之記彼一市其身於縣官雖老雖單丁皆終身而不得去若有司一旦欲去之有司為少恩矣昔者嘗聞之先儒曰兵自二十以上至於衰老不過四十餘年勇鋭犯堅不過二十餘年若廩之終身則是一卒二十年無用而食於官也自此推之則養兵十萬五萬可去矣屯兵十年則五年為無益之費矣誠哉是言也臣觀秦漢以來兵冗而墮者常危兵練而精者常安如王尋役百萬於昆陽苻堅役百萬于淝水袁紹役四十萬于官渡哥舒翰役十數萬於潼關彼其中安能無老弱錯雜之卒又臨以好戰之將使斯民無罪而就死地者無怪也殊不知威武本助文德聖人使紀律常嚴賞罰常信則人人皆賁育矣雖休息已足張其軍威何至於多且冗也恭惟我太祖皇帝披風櫛雨既定禍難四方乂安取斯民而撫摩之天下備禦之卒不過三十餘萬郭進李謙浦之徒屯戍一方多者五千少者三千而已及太宗真宗皇帝軍額稍舒亦不過四十餘萬仁宗皇帝之時屯戍西方范仲淹歐陽修之徒已有減汰之説矣皇祐中文彥博一言減保捷軍凡三萬五千嵗省二百四十餘萬此皆祖宗之成憲也今陛下天神天明法則祖宗常以招募精勇外謹屯戍為居安慮危之備以勵諸將德至渥也邇者今將帥招填務閲精鋭頒甲樣製務令備具粲然統紀文德之助蓋已肩於三代矣然臣竊慮逐路諸將循例畏謗冗散未去精勇未填此不可不深為之謀也臣觀軍興以來諸將寄名挂字身居市井實不至軍其額尚存臣不知其幾人也闕額未填旋有亡者又有逃者軍吏未行刋落主將亦多猶豫或半匿而不申或時申而未盡臣又不知其幾人也老者病者請給之法自當減半今則庇覆溷亂終身廩之其無歸者官自當給其願歸者亦不得去至於老死妨占軍額臣又不知其幾人也如是三冗悠悠皆有可慮諸將軍實豈能得其實乎假使一軍三萬每一萬五千人若實核冗病死逃者一千人三萬則為冗者二千人矣推諸路言之若有十八軍則共為老弱等二萬人矣一兵嵗費百千一嵗則為二百萬緡矣其間實有願歸者軍吏略與賙給亦非傷恩者也況陛下身同堯禹節用勤身諸軍必不容暗冗之病臣嘗走邉為吏具得所見悉其如此不敢誣也臣愚伏望戒勵諸軍敢有竄匿私名以亂軍實一切禁之軍若有逃有亡軍吏不即刋落其私入者今後並許陳首與捐其罪不首則朝廷自有明法諸軍老病衰弱退有所依願為民者亦宜聽許若無依倚則方給半分錢糧上不失恩下不失所此則兵之三冗可以漸去也臣又觀四川等處廂軍至濫夫廂軍者有事則可以備禁軍之闕其可太濫乎今諸處多刺孱弱或刺羸病一家或至三卒或至二卒止為州郡威儀而已間有無狀之吏終嵗私役那借則謂之差出之卒逐月納工匠事藝終身避免則謂之事藝之卒朝廷置兵本以衛民今之蜀中乃以蠧民患至深切君門萬里何從知之此賤臣敢為陛下申言之也臣今併望嚴賜聖旨如四川等處廂軍年十五已下強增嵗月或羸或病以欺州郡自合並許州郡精加檢察然後入籍諸司諸州軍以事藝工匠為名吏或受取並乞以贓論如是則天下之吏不敢自私天下之兵不見冗濫各為徇公固本之計濟世之急務臣未見有過於此也知池州袁説友上言曰臣一介踈逺頃者誤蒙甄擢叨守池陽陛辭之日聖訓丁寧俾之調護軍民宣諭統帥臣恭體德意惟知殫竭駑力以副臨遣之寵二年之間切嘗詢究軍屯事體凡涉於利害當否者粗知梗槩敢托其今可行者三説以裨廟謨之萬一一曰久任統帥二曰選正副將三曰修治戎器何謂久任統帥昔趙充國之制先零也年已七十宣帝猶信而用之綿歷幾二十年久而罙篤故能卻敵制勝威謀靡亢晉元帝既用祖逖方有誓清中原之志遽以戴若思代之而恢復之功竟以弗就是知將之與士要在于號令久孚恩威久信然後情勢相諳能否相悉凡是四者必俟久而後見固非以嵗月之暫而可致也今閫外之屯各有統帥其始用也貴於詳擇其既用也貴於久任夫不計其才之可用與否而姑用之曽不嵗月或以不職而報罷或以升遷而移大閫彼以不職聞者固不必用然亦病于始焉之不擇耳倘其可用也則何必屢遷數易於上下方諳悉之時而遽易之哉將帥之職與文臣之職不同其一方之險便部曲之能否士卒之強弱惟久而後知之知之深然後緩急得以信而用之今若軍中之事未及熟習或僅已習熟而未久已乃又易而他之則將之與士皆相視如適相遇者何翅傳舍之遷徙哉一有緩急將不知士士不知將能否不諳誰何不熟其不敗事者幾希臣頃守池陽嘗見統帥之數易矣將帥愈易而事愈廢徒以縻金帛之費重士卒之擾其於軍政毫髮何補此最大患也臣欲望特賜敷奏凡今外屯統帥始也貴於詳擇擇而得人則專於久任雖嵗月甚久不以遽易使其熟於軍政之利害諳於士卒之能否安意肆志久於經理如治家務如辦私事藉使有勞可録只須就職以遷不使他易庶幾得因久任一意軍政必有大可觀者何謂選正副將昔霍去病起於校尉辛慶忌起於校丞皆奮身偏禆卒為漢家名將然則偏禆小將故未可忽也今軍中升差之法自副將而為正將由正將而為統領由統領而為統制惟統制之職則猶俟樞庭審察而後得耳若正副將統帥所自選置者臣頃守池陽見軍中差正副將之時往往率以其職甚卑其權甚微似不經意而不知今日正副之將皆異日統領統制之儲也此而不擇則異日馴至而為統制果可用乎惟能遴選于始進之日則必能責用於既進之後毋忽于其小當慮于其後又烏可以職之卑權之微而遽忽之哉臣欲望敷奏明詔諸屯統帥應今後正副將有闕須詳加精選審擇忠勇之士然後差置朝廷時摘其一二俾赴朝廷試閲以察能否庶幾他日將帥之儲預擇於此少有緩急可以責效誠非細務也何謂修治戎器昔周家復古詩人先于備器械以戒不虞聖人本於除戎器蓋戎器者實軍政之先務也今諸屯兵器項目不一各以千萬計今雖卷甲未用然一嵗之間既有風雨燥溼之候則戎器所藏豈無損弊脫落之患往往修不以時雖修而不以法茍簡鹵莽姑應故事堆積損腐蟲鼠侵齧膠漆漶漫凡若此類豈可茍于修製不加之意以時而除治哉一旦忽有調發物物損腐稍不可恃則其誤事蓋不小矣臣頃守池陽嘗見軍中解事者皆謂凡為戎器要當上則屋廬爽塏下則逺去地氣月葺旬治以時以法加意修理方為可用今軍屯上下肯留意于此者恐未可多得甚非所宜也臣欲望敷奏嚴詔諸屯統帥凡應干兵器不必嵗嵗增添虛數目且以見在之數以時除治日修月葺點視損壞如法修理毋靳費出毋事苟簡毋為虛文仍於三軍每將各置爽塏之屋以貯器甲俾無損剝腐脫之患每嵗命總領時以點閲試用保明具奏庶幾一有調發兵器可恃足以倚仗不致誤事親目軍中利害如前所陳倘蒙開納即賜施行實有補於軍政天下厚幸説友又上言曰臣嘗聞傳有之曰惠則足以使人又曰德以施惠戰所由克又曰衣食足然後知榮辱凡此者皆謂撫存之於前則可以責用於其後而為吾所役者亦將舒徐悅懌願自表見自昔善用天下比皆如此而況於用兵哉臣竊惟今日最不能以自贍而衣食單窮妻孥凍餒養生送死一無可恃聲嗟氣嘆日甚一日知之而無能救之者則惟諸軍之士卒是已臣頃守池州兩年之間蓋嘗親目軍屯士卒貧窮怨嗟之狀且今士卒日給雖等數不同大率不過二升半米與百錢而已此固從昔定數何前日可以自存而今日遽謂不足哉臣固嘗詢之將帥其説自謂軍中事力與昔年迥不相侔上無寬裕之財可以輟惠而分給則下無非時之與得以周急而惠窮方昔年事力寬裕之時日教月習將帥捐金與帛以激勸事藝藝精者既賞志勤者亦賞而勇力進者又賞蓋無時無之而又其家有婚姻有疾病有亡殁則各將言之統帥悉有給與凡是數説皆起於在上者事力寬裕故能時有惠犒今大不然統司錢物既有定數日就窶乏而措置料理悉所不敢是以上下煎迫秦越相視士卒合得錢米之外一毫無有安得不窮且困哉此則將帥自為之説爾然臣又詢之士卒考之衆論抑又有他説焉一曰支有減剋二曰米求出剩三曰縻於苞苴切聞軍中支請士卒錢米往往不即及時依數支散循習為例暗有消剋逮於支付各將散給士卒則合得錢米已有消折矣夫以毫釐之給豈堪復有消折哉彼數萬人之給人各有剋則衆少致多悉歸之他用矣此所謂支有減剋也大軍倉官支給米斛多有循習以求出剩月減嵗剋自有定則有久而羡餘則為寬剩雖非明取實則暗積是皆瘠士卒之給以肥在上之須此所謂米求出剩也將帥之職悉本朝廷除授而居是職者懷無厭之望濟貪進之欲則苞苴權門取悅貴近往來于道習以為常皆以求足其所望欲彼其苞苴之費固何所從出哉不過朘剝士卒以充其所用而已此所謂縻于苞苴也夫既以在上者事力之不裕又困於三者之極弊宜其士卒憔悴窮困而不能以自存也是以人懷怨嗟非一嵗月則緩急之際責其能效死力以濟國事蓋亦難矣為今之計欲以少寬士卒殆未見有速效之策臣以謂所給錢米自有定數增之不可無亦於前三者之弊亦可以少革否乎欲望敷奏亟發睿斷嚴詔諸總領所更切措置支散士卒錢米之時使之各足其數以時而得毋令毫髮減剋其大軍倉官支散米斛不得剝下豐上循習前例以幸寬剩嚴戒諸屯將帥苞苴之弊廣行覺察一有違犯重置典憲每遇朝廷除授統帥升差統制嚴加訓飭以警其私庶幾知所戒懼或能稍寬士卒窮困之苦人知感奮足以責其異日之用矣昔漢韓信為將軍多以恩拊衆得士死力蓋寬饒為司馬遇士卒甚有恩衛卒至數千人皆叩頭願留以報厚德載在方策皆其明效大驗也惟聖主以是而命將帥焉天下幸甚參知政事史浩奏曰臣聞搜田以時詩人入詠羽旄之美孟子詳言君舉必書人皆稱善蓋因農事之隙當思武備之修側聞翠華將臨白石豈是留情於田獵實將大閲於車徒堅其執戈衛社之心鼓其投石拔距之氣緩急之際勤勞不辭諒惟此圖久關聖慮臣有鄙見所合冒聞其事雖微其體則重衆所聚處人必觀光宜須嚴戒有司俾之遴選精卒去其凶邪狡橫之輩取其驍雄練習之人犒勞務為均平號令期于純靜庶使三軍之賈勇了無一夫之向隅然後簡厥馴良置之左右環以衛士列為御營天尚灑道清塵人必飛蜂走蟻陛下入則登壇信誓出則按轡徐行理合謹防誠非過慮千金之子尚戒垂堂萬乘之尊所當設備其有驅馳得雋扈從宣勞勸賞既行風勵甚衆使此戎昭之盛事不為觀美之虛文臣有激於中不能自默伏惟陛下俯察拳拳愛君之意特寬喋喋出位之誅趙汝愚乞於關外招刺義勇軍疏曰臣契勘全蜀四路三面並邉內黎雅文敘四川近嵗頻有警擾全賴徑兵逐處鎮守且如黎州一郡西有五部落南有卭部川西南有青羌彌羌邉面二三百里所當防守非特數處然本州見管兵健有西兵有禁軍有義勇有諸州戍兵臣請一一為陛下言之舊例每嵗有屯戍西兵五百人遇防秋則增戍三百人其數非不多其人非不勇秪緣是客軍逺戍逐嵗更易而不習彼中地利又州郡以其是御前諸軍恐萬一小有挫折則虧損朝廷威重自來秪令在城中防守故方無事時假其威名以之彈壓則有餘至於緩急之際其實不敢輕用此外有禁軍額管五百人本司纍行下本州措置招刺而無人願就見管三百五十餘人有新招義勇二百人諸州戍兵三百五十人共九百人數內諸州戍兵自來脆弱又緣數戰不利至今其氣未振所可恃者惟本州禁軍及新招義勇而已然除本州存留人數外其分屯諸寨人數絶少稍有動靜委是闕人使喚臣到任之初適值嘉州董蠻作過臣不免於諸州調兵防守要是烏合之衆不敢十分倚仗臣竊伏思念陛下方規恢洪業志復中原若一旦有事北方則西兵豈容逺戍或者蕃蠻乘間伺隙侵犯邉疆則朝廷不能無後顧之憂此不可不預為規畫臣欲措置於關外沿邉去處招刺強壯五百人名為義勇軍就成都府團結訓練每嵗輪差二百五十人於黎州屯戍與黎州義勇同教且使之漸習地利留二百五十人住營準備嘉敘諸州調發庶幾稍壯軍勢可以左支右吾伏望聖慈俯從臣請特降睿旨將所招義勇軍許依黎州已得指揮施行所有每月合支錢引臣契勘臣本司見支義勇餘剩錢內可以支破於户部諸司錢物别無妨闕委是經久利便汝愚又論諸州廂禁軍之弊奏曰臣伏見比年州縣之財取之盡而用之竭矣誠使所養皆所用雖竭民之力以求濟所用可也若所養非所用而竭民之力如是不已烏得不稍為之變通哉諸州禁軍揀不中人近降指揮並要分畨教閲臣在兩郡纍曽按試多是日前招刺之人或人材短小不及等格或年齒稍髙筋力退惰終是武藝生踈不堪倚仗若一併揀充廂軍剩員重行招刺則州郡員額頓增愈難支遣謂宜分委逐路監司候秋涼日遍詣諸郡通選壯城廂軍之強壯以易禁軍之老弱今後廂軍有闕並權住招補每季終專委守臣搜閲禁軍之老弱者以充其數禁軍有闕則刺新軍新軍復不如格則守臣專坐如此則數嵗之間老弱漸去強壯日增於是嚴私役之禁申閲習之令異時朝廷有所征發則州郡不失為有備也其次所在廂軍尤為冗濫大率失於員額太寬故為郡將者初不甚惜往往替移之際容受請託於是有招刺違法之弊詭名冒請之弊冗占窠局之弊差借猥多之弊蠧耗廩粟無補公家臣謂宜密會諸州尺籍視其郡之間劇而稍損其數異時略倣武雄等格而為招刺之法不及格者闕之方此財用匱竭蓋亦樽節浮濫之一端也惟陛下留神幸甚敷文閣待制四川置制使范成大奏曰臣竊見天下將兵之政其弊甚矣竭諸郡之力以養兵不為不久而終無可恃之勢朝廷不時下令督責纎悉州郡類若漠然者其故何哉不揣其本而齊其末不揆其力而課其功雖日下一令猶無益也臣比自廣入蜀皆承乏連帥之職實嘗躬督屬部不遺餘力才藝自振者十不二三廢惰自如者比比相望然其勢難以盡效誠見州郡之力亦有不可得而強者焉繄欲修明將兵之政則須招填闕額葺治器械準備激犒三者舉非徒手可辦今皆缺然無力以及之帥漕二司又不與之通心商略徒以文移責辦何異於説河畫餅者哉臣愚謂宜行下諸路帥漕臣逐一詢究某郡闕額若干當如何招募器械之闕及弊壞者若干當如何葺治一嵗之按閲若干當如何激犒三者各以是何窠名錢物應副如逐州皆有樁備則立之程式以觀厥成如委無可出當從帥漕司措置應副不得已則為申明朝廷量度支賜以助之而後可以責軍政之實矣臣伏見陛下費財以飬軍勞心以定制其於天下將兵豈不望其有一日之用而州郡實未嘗講明其故臣不敢隱默冒昧略陳之成大知處州又奏曰臣伏見國家于屯衛正兵之外别令諸州自募禁卒故逐路皆成全師規摹深矣法意中弛戎備久缺陛下聖武布昭沈幾逺馭大搜軍實以壯國威又嚴諸郡教閲之法今則器仗顯設程課精明郡始知有兵兵始知有戰不增募卒之費坐獲成軍之實甚盛舉也臣竊詢宿弊尚有二端一曰簡閲未精二曰營伍未立何謂簡閲未精按禁軍著令惟郡守兵官得破不堪披帶之人充當直外其餘百役專用廂軍向來一槩混役禁卒各有事務未嘗講武自陛下修明軍政以來此等或憚肄習之勤勞或戀司局之優厚率作緣故降就廂軍春秋二揀百計不赴其尤黠者則徑降剩員終身不揀是以禁軍尚有怯弱廂軍反多強壯事體倒置議者不平此弊未除恐負陛下強兵之意何謂營伍未立按祖宗舊制營房損漏兵官不得替移霖雨經時有司先葺營寨中間雖嘗申嚴州郡漫不加省有營無屋有屋無人帶甲之軍雜處閭井晨出無期會暮歸無點集蹤迹難制號召難齊甘苦難知真偽難察一旦調發如群市人雖有法制何緣紀律此弊不振恐妨陛下制軍之法欲望聖慈嚴飭揀兵之官執法從事刷諸路見管廂軍剩員不以是何官司盡數揀點仍先立寬限必須呈身若臨期托病或申差出即時開落勿復容情精料其可為勝兵者十必三四其司局占破尚是禁軍者亦可改正仍令所在修蓋營房部領遷入各具了畢月日上聞夫簡閲精則人材可恃營伍立則紀律可行二事具舉成軍隱然惟陛下令之耳厯代名臣奏議卷二百二十三
