body:
  text: 歷代名臣奏議卷三百二十明楊士竒等撰禦邊漢文帝時太子家令朝錯言守邊備塞急務曰臣聞秦時北攻胡貉築塞河上南攻揚粵置戍卒焉其起兵而攻胡粵者非以衛邉地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫丐奴之地積隂之處也木皮三寸氷厚六尺食肉而飲酪其人密理鳥獸毳毛其性能讀曰耐下同寒揚粵之地少隂多陽其人疏理鳥獸希毛其性䏻暑秦之戍卒不䏻其水土戍者死于邊輸者僨於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左發之不順行者深怨有背畔之心凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆䝉矢石赴湯火視死如生今秦之發卒也有萬死之害而無銖兩之報死事之後不得一算之復天下明知禍烈及已也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威劫而行之之敝也丐奴衣食之業不著於地其藝易以擾亂邊境何以明之丐奴鞍馬為居射獵為業非有城郭田宅之歸不費屯集挽運之力美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此丐奴之生業而中國之所以離南畝也今使丐奴數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣才至則敵又已去聚而不罷為費甚大罷之則敵復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一嵗而更不知胸奴之能不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠答藺石城上雷石也渠答鐡蒺藜也復為一城其內城閒百五十步要害之處通川之道調立城邑毋下千家為中周虎落虎落外蕃也若今時竹虎也一說以竹篾相連遮落之也先為屋室具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家豫冬夏衣廪食能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買豫之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地丐奴入驅而能止其所驅者以其半豫之縣官為贖其民如是則邑里相救助赴敵不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地藝而心畏敵者功相萬也以陛下之時徙民實邊使逺方亡屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去逺矣上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙逺方以實廣虛也相其隂陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里剖宅通田作之道正阡陌之界先為築室家有一堂二內門户之閉置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百五百帥名也假音假借之假大也十連一邑邑有假候皆擇其邑之賢材有識習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍政定於外服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶胸奴不與和親臣竊意其冬來南也一大治則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也愚臣亡識唯陛下財察宣帝元康三年先零遂與諸羌種豪二百餘人解仇交質盟詛羌人無大君長而諸種豪遞相殺伐故每有仇讎往來相報今解仇交質者自相親結欲入漢為寇也上聞之以問趙充國對曰羌人所以易制者以其種自有豪數相攻擊藝不一也往三十餘嵗西羌反時亦先解仇合約攻令居與漢相距五六年乃定至征和五年先零豪封煎等通使胸奴煎讀曰翦胸奴使人至小月氐傳告諸羌曰漢二師將軍衆十餘萬人降胸奴羌人為漢事苦事使役也張掖酒泉本我地地肥美可共擊居之以此觀胸奴欲與羌合非一世也間者胸奴困於西方聞烏桓來保塞恐兵復從東方起數使使尉黎危須諸國設以子女貂裘欲沮解之設謂開許之也沮壞也欲壞其計令解散之其計不合疑胸奴更遣使至羌中道從沙隂地出鹽澤過長坑入窮水塞南抵屬國與先零相直臣恐羌變未止此且復結聨他種宜及未然為之備後月餘羌侯狼何果遣使至胸奴藉兵藉借也欲擊鄯善敦煌以絶漢道充國以為狼何小月氐種在陽關西南藝不能獨造此計疑胸奴使已至羌中先零罕开乃解仇作約到秋馬肥變必起矣宜遣使者行邊兵豫為備敕視諸羌毋令解仇以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善惡安國至召先零諸豪三十餘人以尤桀黠皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹為羌所擊失亡車重兵器甚衆安國引還至令居以聞是嵗神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上遣問焉曰將軍度羌人何如當用幾人充國曰百聞不如一見兵難隃度隃遙也臣願馳至金城圖上方略然羌人小國逆天背畔滅亡不久願陛下以屬老臣勿以為憂上笑曰諾充國至金城須兵滿萬騎欲渡河恐為敵所遮即夜遣三校銜枚先渡銜枚者欲其無聲使敵不覺渡輒營陳㑹明畢遂以次盡渡敵數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊敵以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中亡敵夜引兵上至落都召諸校司馬謂曰吾知羌人不能為兵矣使敵發數千人守杜四望狹中兵豈得入哉杜塞也充國常以逺斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲為用敵數挑戰充國堅守捕得生口言羌豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬪而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒吳越騎為支兵至令居敵並出絶轉道卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間敵疏搜索也通轉道津渡初罕开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪乃遣歸告種豪大兵誅有罪者明白自别毋取并滅天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降罕开及劫略者解散敵謀徼極乃擊之徼要也要其倦極者也時上已發三輔太常徒弛刑弛刑謂不加鉗􅎂者也弛之言解也三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛藝不可久或曰至秋冬乃進兵此羌在境外之冊今羌朝夕為寇土地寒苦漢馬不能冬能讀曰耐屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵並出張掖酒泉合擊罕开在鮮水上者羌以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子亶讀曰但復引兵還冬復擊之大兵仍出羌必震壞仍頻也天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回還千里回謂路紆曲也以一馬自他負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至羌必商軍進退稍引去商計度也逐水草入山林隨而深入羌即據前險守後厄以絶糧道必有傷危之憂為異域笑千載不可復而武賢以為可奪其畜産虜其妻子此殆空言非至計也又武威縣張掖日勒皆當北塞有通谷水草臣恐胸奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域要遮也杜塞也其郡兵尤不可發先零首為畔逆它種劫略故臣愚册欲捐罕开暗昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者撫循和輯此全師保勝安邊之册天子下其書公卿議者咸以為先零兵盛而負罕开之助負恃也不先破罕开則先零未可圖也上乃拜侍中樂成侯許延夀為強弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其册以書敕讓充國曰皇帝問後將軍甚苦暴露將軍計欲至正月乃擊罕羌羌人當獲麥已逺其妻子精兵萬人欲為酒泉敦煌寇邊兵少民守保不得田作今張掖以東粟石百餘芻槀束數十轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食欲至冬敵皆當畜食此畜讀曰蓄蓄聚積也多藏匿山中依險阻將軍士寒手足皸瘃皸圻裂也瘃寒創也皸音軍瘃音竹足反寧有利哉將軍不念中國之費欲以嵗數而勝微久歷年嵗乃勝小敵也數音所具反將軍誰不樂此者言凡為將軍者皆樂此今詔破羌將軍武賢將兵六千一百人敦煌太守快將二千人長水校尉富昌酒泉侯奉世將婼月氐兵四千人服䖍曰婼音兒羌名也蘇林曰婼音兒遮反師古曰蘇音是也亡慮萬二千人亡慮大計也齎三十日食以七月二十二日擊罕羌入鮮水北句亷上句亷謂水岸曲而有廉稜也去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使敵聞東方北方兵並來分散其心意離其黨與雖不能殄滅當有瓦解者已詔中郎將卬將吳越佽飛射士步兵二校益將軍兵今五星出東方中國大利蠻夷大敗五星所聚其下勝羌人在西星在東則為漢太白出髙用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外便宜有守以安國家乃上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使罕諭告以大軍當至漢不誅罕以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛德至計亡已故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零羌楊玉此羌之首帥名王將騎四千及煎鞏騎五千阻石山木候便為寇罕羌未有所犯今置先零先擊罕釋有罪誅無辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人致人引致而取之也致於人為人所引也今罕羌欲為敦煌酒泉寇宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致敵之術而從為敵所致之道臣愚以為不便先零羌敵欲為背畔故與罕开解仇結約然其私心不能亡恐漢兵至而罕开背之也臣愚以為其計常欲先赴罕开之急以堅其約先擊罕羌先零必助之今敵馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨敵交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫須之屬不輕得離也莫須小種羌名也如是敵兵寖多誅之用力數倍臣恐國家憂纍繇十年數不二三嵗而已臣得䝉天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至熟悉也於臣之計先誅先零已則罕开之屬不煩兵而服矣先零已誅而罕开不服涉正月擊之得計之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚解弛望見大軍棄車重欲渡湟水道厄狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善敵赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地靡忘羌帥名也充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反羌不可擅遣充國曰諸君但欲便文自營茍取文墨之便而自營衛非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦腳脛寒泄脛膝以下骨也寒泄下利也言其患足脛又苦下利脛音下定反泄音息列反將軍年老加疾一朝之變不可諱朕甚憂之今詔破羌將軍詣屯所為將軍副急因天時大利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌彊弩將軍時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上㑹得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言羌人得至是耶往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中穀斛八錢吾謂耿中丞糴二百萬斛穀羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二册羌人故敢為逆失之豪釐差以千里是既然矣今兵久不決四裔卒有動搖相因而起雖有知者不能善其後羌獨足憂邪吾固以死守之明主可為忠言遂上屯田奏曰臣聞兵者所以明德除害也故舉得於外則福生於內不可不慎臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛茭槀二十五萬二百八十六石難久不解繇役不息又恐它夷卒有不虞之變相因並起為明主憂誠非素定廟勝之䇿且羌人易以計破難用兵碎故也臣愚以為擊之不便計度臨羌東至浩亹羌人故田及公田民所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人用穀月一萬七千三百六十三斛鹽三百八斛分屯要害處氷解漕下繕鄉亭浚溝渠治湟狹以西道橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國敵騎伉健各千倅馬什二就草為田者逰兵以充入金城郡益積畜省大費今大司農所轉穀至者足支萬人一嵗食謹上田處及器用簿唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計敵當何時伏誅兵當何時得決孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今敵亡其美地薦草愁於寄託逺遁骨肉離心人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之人雖未即伏辜兵決可期月而望羌人瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌人之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威德並行一也又因排折羌人令不得歸肥饒之地貪破其衆以成羌人相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一嵗罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以視羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患坐得必勝之道七也亡經阻逺追死傷之害八也內不損威武之重外不令敵得乘間之勢九也又亡驚動河南大开小开使生它變之憂十也治湟狹中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長冊唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之敵雖未伏誅兵決可期月而望期月而望者謂今冬邪謂何時也將軍獨不計敵聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分别人而并擊我其意常恐今兵不出得亡變生與先零為一將軍熟計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵分餘不過七八千人失地逺客分散飢凍罕开莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子眀令相捕斬之賞臣愚以為敵破壞可日月冀逺在來春故曰兵決可期月而望竊見北邊自敦煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人敵數大衆攻之而不能害今留步士萬人屯田地勢平易多髙山逺望之便部曲相保為塹壘木樵校聨不絶便兵弩飭鬪具㷭火幸通勢及并力以逸待勞兵之利者也臣愚以為屯田內有亡費之利外有守禦之備騎兵雖罷敵見萬人留田為必禽之具其土崩歸德宜不久矣從今盡三月敵馬羸瘦必不敢捐其妻子於它種中逺涉河山而來為寇又見屯田之士精兵萬人終不敢復將其纍重還歸故地是臣之愚計所以度敵且必瓦解其處不戰而自破之册也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不苟接刃攻不必取不苟勞衆誠令兵出雖不能滅先零亶能令敵絶不為小寇則出兵可也即令同是而釋坐勝之道從乘危之勢往終不見利空內自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且胸奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以贍一隅臣愚以為不便校尉臨衆幸得承盛德奉厚幣拊循衆羌諭以眀詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡它心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖無尺寸之功偷得避嫌之便而無後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寬仁未忍加誅令臣數得孰計愚臣伏計敦甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍冊其言常是臣任其計可必用也上於是報充國曰皇帝問後將軍上書言羌人可勝之道今聽將軍將軍計善其上留屯田及當罷者人馬數將軍强食慎兵事自愛上以破羌強弩將軍數言當擊又用充國屯田處離散恐羌犯之於是兩從其計詔兩將軍與中郎將卬出擊强弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田眀年五月充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還元帝竟寧元年以後宫良家子王嬙字昭君賜單于單于歡喜上書願保塞上谷以西至敦煌傳之無窮請罷邉備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應曰周秦以來胸奴暴桀寇侵邊境漢興尤被其害臣聞北邊塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞僥起亭隧築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙胸奴來寇少所蔽隱從塞以南徑深山谷往來差難邊長老言胸奴失隂山之後過之未嘗不哭也如罷備塞戍卒示丐奴之大利不可一也今聖德廣被天覆胸奴胸奴得䝉全活之恩稽首來臣夫丐奴之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以候望通㷭火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又況單于能必其衆不犯約哉三也自中國尚建關梁以制諸侯所以絶臣下之覬欲也設塞僥置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔世世不絶今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多日聞胸奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落溪谷水門稍稍平之卒徒築治功費久逺不可勝計臣恐議者不深慮其終始欲以一切省繇戍十年之外百嵗之內卒有它變障塞破壞亭隧滅絶當更發屯繕治纍世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必深德漢請求無已小失其意則不可測開異域之隙窺中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事光武建武九年隗囂死司徒掾班彪上言曰今涼州部皆有降羌羌人蠻夷荒服而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置護羌校尉皆持節領護理其怨結嵗時循行問所疾苦又數遣使驛通動靜使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊制以明威防光武從之即以牛邯為護羌校尉持節如舊時遼西烏桓大人郝旦等九百二十二人率衆向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮是時四裔朝賀絡繹而至天子乃命大㑹勞饗賜以珍寶烏桓或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞內布於緣邊諸郡令招來種人給其衣食遂為漢偵候助擊胸奴鮮卑彪又上言曰烏桓天性輕黠好為寇賊若久放縱而無總領者必復侵掠居人但委主降掾史恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷寧城開營府并領鮮卑賞賜質子嵗時互市焉和帝時安定降羌燒何種脅諸羌數百人反叛郡兵擊滅之悉沒入弱口為奴婢時西海及大小榆谷左右無復羌寇隃麋相曹鳳上言曰西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞內諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利緣山濵水以廣田畜故能彊大常雄諸種恃其權勇招誘羌人今者衰困黨援壞沮親屬離叛餘勝兵者不過數百亡逃棲竄逺依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌人交關之路遏絶狂狡窺欲之源又殖穀富邊省委輸之役國家可以無西方之憂於是拜鳳為金城西部都尉將徙士屯龍耆安帝時北部與車師連兵入寇河西朝廷不能禁議者因欲閉玉門陽關以絶其患延光二年敦煌太守張璫上書陳三䇿以為北部呼衍王常展轉蒲類秦海之間專制西域共為寇鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛榖食出據栁中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議尚書陳忠上疏曰臣聞八蠻之寇莫甚北部漢興髙祖窘平城之圍太宗屈供奉之耻故孝武憤怒深惟久長之計命遣虎臣浮河絶漠窮破敵庭當斯之役黔首隕於狼望之北財幣糜於盧山之壑府庫單竭杼柚空虛算至舟車資及六畜夫豈不懷慮久故也遂開河西四郡以隔絶南羌收三十六國斷胸奴右臂是以單于孤特鼠竄逺藏至於宣元之世遂備蕃臣關僥不閉羽檄不行由此察之戎狄可以威服難以化狎西域內附日久區區東望扣關者數矣此其不樂胸奴慕漢之效也今北敵已破車師勢必南攻鄯善棄而不救則諸國從矣若然則敵財賄益增膽藝益殖殖生也威臨南羌與之交連如此河西四郡危矣河西既危不得不救則百倍之役興不訾之費發矣議者但念西域絶逺恤之煩費不見先世苦心勤勞之意也方今邊境守禦之具不精內郡武衛之備不修敦煌孤危逺來告急復不輔助內無以慰勞吏民外無以威示百蠻蹙國減土經有明誡臣以為敦煌宜置校尉案舊增四郡屯兵以西撫諸國庶足折衝萬里震怖胸奴帝納之順帝時大將軍梁商以氐羌新反黨衆初合難以兵服宜用招降乃上表曰胸奴寇畔自知罪極物當窮困皆知救死況種類繁熾不可單盡今轉運日增三軍疲苦虛內給外非中國之利竊見度遼將軍馬續素有謀謨且典邊日久深曉兵要每得續書與臣策合宜令續深溝髙壁以恩信招降宣示購賞明其期約如此則逺人可服國家無事矣帝從之乃詔續招降畔敵商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢決勝當時敵人之所長而中國之所短也强弩乘城堅營固守以待其衰中國之所長敵人之所短也宜務先所長以觀其變設購開賞宣示後悔勿貪小功以亂大謀續及諸郡並各遵行於是右賢王部抑鞮等萬三千口詣續降桓帝時以陳龜世諳邊俗拜為度遼將軍龜臨行上疏曰臣龜䝉恩纍世馳騁邊陲雖展鷹犬之用頓斃敵人之庭魂骸不反薦享狐狸猶無以塞厚責答萬分也至臣頑駑器無鉛刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之才而忝鷹揚之任上慙聖朝下懼素餐雖殁軀體無所云補今西州邊鄙土地塉埆鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望縣命鋒鏑聞急長驅去不圗反自頃年以來胸奴數攻營郡殘殺長吏侮略良細戰夫身膏沙漠居人首係馬鞍或舉國掩户盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬雖含生氣實同枯朽往嵗并州水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯懼於困厄陛下以百姓為子品庶以陛下為父焉可不日昃勞神垂撫循之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖策其民五倍文王西伯天下歸之豈復輿金輦寶以為民惠乎近孝文皇帝感一女之言除肉刑之法體德行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致災害敵人凶悍因衰緣隙而令倉庫單於貪婪之口功業無銖兩之效皆由將帥不忠聚姦所致前凉州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選胸奴烏桓護羌中郎將校尉簡練文武授之法令除并涼二州今年租更寬赦罪𨽻掃除更始則善吏知奉法之祐惡者覺營私之禍敵馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并涼一年租賦以賜吏民靈帝時西羌反邊章韓遂作亂隴右徴發天下役賦無已司徒崔烈以為宜弃涼州詔㑹公卿百官烈堅執先議議郎傅燮厲言曰斬司徒天下乃安尚書郎揚贊奏燮廷辱大臣帝以問燮燮對曰昔冒頓至逆也樊噲為上將願得十萬衆橫行丐奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也今涼州天下要衝國家藩衛高祖初興使酈商别定隴右世宗拓境列置四郡議者以為斷丐奴右臂今牧御失和使一州叛逆海內為之騷動陛下卧不安寢烈為宰相不念為國思所以弭之之䇿乃欲割弃一方萬里之土臣竊惑之若使烏合之衆得居此地士徑甲堅因以為亂此天下之至慮社稷之深憂也若烈不知之是極蔽也知而故言是不忠也帝從燮議諌議大夫劉陶上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊章之寇每聞羽書告急之聲心灼內熱四體驚竦今西羌逆類私署將帥皆多假熲時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據厄高望今果已攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立關東破膽四方動搖威之不來呌之不應雖有田單陳平之策計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷氷解風散惟恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬬生之計西寇寖前去營咫尺敵騎分布已至諸陵將軍張溫天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣䝉其慶國危則臣亦先亡也吳孫權時吕岱從交州召出薛綜懼繼岱者非其人上疏吳主曰昔帝舜南巡卒於蒼梧秦置桂林南海象郡然則四國之內屬也有自來矣趙他起畨禺懷服百越之君珠官之南是也漢武帝誅吕嘉開九郡設交址刺史以鎮監之山川長逺習俗不齊言語同異重譯乃通民如禽獸長幼無别椎結徒跣貫頭左衽長吏之設雖有若無自斯以來頗徙中國罪人雜居其間稍使學書粗知言語使驛往來觀其禮化及後錫光為交址任延為九真太守乃教其耕犂使之冠履為設媒官始知聘娶建立學校導之經義由此已降四百餘年頗有似類自臣昔客始至之時珠崖除州縣嫁娶皆須八月引戶人民集㑹之時男女自相可適然後禀命父母以為婚交址縻泠九真都龎二縣皆親戚死輒娶其婦世以此為俗長吏恣聽不能禁制曰南郡男女雜㳫不以為嫌由此言之可謂蟲豸有靦面目耳然而土廣人衆阻險毒害易以為亂難使從治縣官羈縻示令威服田户之租賦裁取供辦貴致逺珍名珠香藥象牙犀角玳瑁珊瑚琉璃鸚鵡翡翠孔雀奇物充備寶玩不必仰其賦入以益中國也然在九甸之外長吏之選類不精核漢時法寬多自放恣故數反違法珠崖之廢起於長吏覩其好髮髠取為髲及臣所見南海黃蓋為日南太守下車以供設不豐撾殺主簿仍見驅逐九真太守儋萌為妻父周京作主人并請大吏酒酣作樂功曹畨歆起舞屬京京不肯起歆猶迫彊萌忿杖歆亡於郡內歆弟苗帥衆攻府毒矢射萌萌至物故交址太守士燮遣兵致討卒不能克又故刺史㑹稽朱符多以鄉人虞褒劉彥之徒分作長吏侵虐百姓彊賦於民黃魚一枚收稻一斛百姓怨叛山賊並出攻州突郡符走入海流離喪亡次得南陽張津與荆州牧劉表為隙兵弱敵彊嵗歲興軍諸將厭患去留自在津少檢攝威武不足為所陵侮遂至殺沒後得零陵賴恭先輩仁謹不曉時事表又遣長沙吳巨為蒼梧太守巨武夫輕悍不為恭服所取相怨恨逐出恭求步隲是時津故將夷廖錢博之徒尚多隲以次鉏治綱紀適定會仍召出吕岱既至有士民之變越軍南征平討之日改置長吏章明王綱威加萬里大小承風由此言之綏邊撫裔實有其人牧伯之任既宜清能荒流之表祻福尤甚今日交州雖名粗定尚有高涼宿賊其南海蒼梧鬱林珠官四郡界未綏依作寇盜專為亡叛逋逃之藪若岱不復南新刺史宜得精密檢攝八郡方略智計能稍稍以漸能治髙流者假其威寵備之形勢責其成效庶幾可補復但如中人近守常法無奇數異術者則羣惡日滋久逺成害故國之安危在於所任不可不察也竊懼朝廷忽輕其選故敢竭愚情以廣聖思晉武帝時吳既平普減州郡兵冠軍將軍陶璜上言曰交土荒裔斗絶一方或重譯而言連帶山海又南郡去州海行千有餘里外距林邑才七百里夷帥范熊世為逋寇自稱為王數攻百姓且連接扶南種類猥多朋黨相倚負險不賓往𨽻吳時數作寇逆攻破郡縣殺害長吏臣以尫駑昔為故國所採偏戍在南十有餘年雖前後征討翦其魁桀深山僻穴尚有逋竄又臣所統之卒本七千餘人南土溫溼多有氣毒加纍年征討死亡減耗其見在者二千四百二十人今四海混同無思不服當卷甲消刃禮樂是務而此州之人識義者寡厭其安樂好為禍亂又廣州南岸周旋六千餘里不賔屬者乃五萬餘戶及桂林不羈之輩復當萬戶至於服從官役才五千餘家二州脣齒唯兵是鎮又寧州興古接據上流去交址郡千六百里水陸並通互相維衛州兵未宜約損以示單虛夫風塵之變出於非常臣亡國之餘議不足採聖恩廣厚猥埀飾擢蠲其罪舋改授方任去辱即寵拭目更視誓念投命以報所受臨履所見謹冒瞽陳孝武帝時徵益州刺史郭鈴犍為太守卞苞於坐勸鈴以蜀反殷仲堪斬之以聞朝廷以仲堪事不預察降號鷹揚將軍尚書下以益州所統梁州三郡人丁一千畨戍漢中益州未肯承遣仲堪乃奏之曰夫制險分國各有攸宜劒閣之隘實蜀之關鍵巴西梓潼岩渠三郡去漢中遼逺在劒閣之內成敗與蜀為一而統屬梁州蓋定鼎中華慮在後伏所以分斗絶之勢開荷㦸之路自皇居南遷守在岷卭襟帶之形事異曩昔是以李勢初平割此三郡配𨽻益州將欲重復上流為習坎之防事經英略厯年數紀梁州以統接曠逺求還得三郡忘王侯設險之義背地勢內外之實盛陳事力之寡弱飾哀矜之苦言今華陽乂清汧隴順軌關中餘燼自相魚肉梁州以論求三郡益州以本統有定更相牽制莫知所從致令巴宕二郡為羣獠所覆城邑空虛士庶流亡要害膏腴皆為獠有今逺慮長規宜保全險塞又蠻獠熾盛兵力寡弱如遂經理乖繆號令不一則劒閣非我保醜類轉難制此乃藩扞之大機上流之至要昔三郡全實止差文武三百以助梁州今俘沒蠻獠十不遺一加逐食烏散資生未立苟順符指以副梁州恐公私困弊無以堪命則劒閣之守無擊柝之儲號令選用不專於益州虛有監統之名而無制御之用懼非分位之本㫖經國之逺術謂今正可更加梁州文武五百合前為一千五百自此之外一仍舊貫設梁州有急蜀當傾力救之書奏朝廷許焉桓沖為荆州刺史持節將軍既到江陵欲移阻江南乃上疏曰自中興以來荆州所鎮隨宜回轉臣亡兄溫以石季龍死經略中原因江陵路便即而鎮之事與時遷勢無常定且兵者詭道示之以弱今宜全重江南輕戍江北南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽若狂狡送死則舊郢以北堅壁不戰接會濟江路不云逺乘其疲惰撲滅為易臣司存閫外輒隨宜處分於是移鎮上明使冠軍將軍劉波守江陵咨議參軍楊亮守江夏宋文帝時索虜南侵遂至瓜步太祖使百官議防禦之術御史中丞袁淑上議曰臣聞函車之獸離山必斃絶波之鱗宕流則枯邊寇微么趨致畿甸烏合雲屯聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晉輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵於能濟矣乃者燮定攜逺阻違授律由將有㢮拙故士少鬪志圍潰之衆匪寇傾淪攻制之師空自班散濟西徑騎急戰蹴旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使栲潞入患泉伊來擾紛殄姬風泯毒禹績騰書有渭陰之迫懸烽均咸陽之警然而切揣虛實伏匿先彰校索伎能譎詭既顯綿地千里彌行阻深表裏躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸陷溢痁祻洊興芻藁已單米粟莫係水㝢襟帶進必傾霣河隘扁固退亦墮滅所謂栖烏於烈火之上飬魚於叢棘之中或謂損緩江右寬繕淮內竊謂拯扼閩城舊史為允棄逺涼土前言稱非限此要荒猶弗委割況聮被京國咫尺神甸數州摧掃列邑殱夷山淵反覆草木塗地今邱賦千乘井笇萬集肩摩倍於長安締袂百於臨淄什一而籍實慊氓願履畝以稅既協農和户競戰心人含鋭志皆欲贏糧請奮釋緯乘城謂宜懸金鑄印要壯果之士重幣甘辭招推決之將舉薦板築之下抽登臺皂之間賞之以焚書報之以相爵俄而昭才賀闕異能間至戎貪而無謀肆而不整迷乎向背之次謬於合散之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謡言緡命宜選敢悍數千騖行潜掩偃旗裹甲鉗馬銜枚會稽而起晨壓未陳旌譟亂舉火鼓四臨使景不暇移塵不及起無不禽鎩獸讋氷解霧散掃洗哨類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還徑兖部徑卒梗其歸塗必剪元雄懸首麾下乃將隻輪不反戰轊無旋矣於是信臣騰威武士繕力緹組接陰鞞柝聨響若其僞遁羸張出沒無際楚言漢斾顯默如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命慿城借土則當因威席卷乘機芟勦泗汴秀士星流電燭徐阜嚴兵雨湊雲集蹶亂桑溪之北搖潰瀚海以南絶其心根勿使能植銜索之枯幾何不蠧是由涸澤而漁焚林而狩若峻風之儛輕籜杲日之拂浮霜既而尉洽荷掠之餘望吊網悲之鬼然後天行樞運猋舉煙升青蓋西巡翠華北狩經啓州野滌一軫策俾高再勒燕然後銘方乃奠山沈河創禮輯策闡耀炎昊之遺則貫軼商夏之舊文今衆賈拳男而將術疏怯意者稔泰日積承平嵗久邑無驚赴之急家緩餽戰之勤閲訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選攉論深切躬擐盡幽斬帶尋逺設有沈明能照俊偉自宣誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數達昏明益損之宜能暌合民心愚睿物性登丹墀而敷策躡青蒲而揚謀上說宸鑒下弭素言足以安民紓國救災恤患則宜拔過寵貴之上褒升戚舊之右别其旗章榮其班祿出得專譽使不禀命降席折節同廣武之請設壇致禮均淮陰之授必有要盟之功竊符之捷夷裔暴狠內外侮棄始附之衆分茷無序蠱以威利勢必攜離首順之徒靡然自及今淶繹故典瀍土纓緌翦焉幽播折首凶狡是猶眇者願明痿之思出動商遄會功終易感劫晉在於善覘全鄭實寄良諜多縱反間汨惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汨以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辨則堅圍可解馳羽而巖邑易傾必府鬲土崩枝幹瓦裂故燕樂相悔項范交疑矣或乃言約功深事邇應廣齊圉反駕趙飬還君盡輿誦之道畢能事之效臣幸得出內層禁遊心明代澤與身泰恩隨年行無以逢迎昌運潤飾鴻法今塗有遺鏃刃未息鋒敢思涼識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終朝之抗辭杜耿之言事咸云及經之棘猶闕上笇燭郛之敬裁收下䇿自耻懦木智不綜微敢露昧見無會昭採虜自彭城北歸復求互市顔竣議曰臣愚以為與虜和親無益已然之明效何以言其然敵人之欲侵暴正苦力之不足耳未嘗拘制信義用輟其謀昔年江上之役乃是和親之所招厯稔交騁遂求國婚朝廷羈縻之義依違不絶既積嵗月漸不可誣敵心無厭重以忿怒故至於深入幸今因兵交之後華戎隔判若言互市則復開曩敝之萌議者不過言互市之利在得馬今棄此所重得彼下駟千匹以上尚不足言況所得之數裁不十百邪一相交關卒難閉絶寇負力玩勝驕黠已甚雖云互市實覘國情多贍其求則桀慠罔已通而為節則必生邊虞不如塞其端漸杜其觖望內修德化外經邊事保境以觀其釁於事為長御史中丞何承天上安邊論凡陳四事曰伏見北蕃上事虜犯青兖天慈降鑒矜此黎元博逮羣䇿經綸戎政臣以愚陋預聞訪及率其管窺謹撰安邊論庶或開引羣慮延盡衆謀短長畢陳當否可見其論曰寇雖習戰來久又全據燕趙跨帶秦魏山河之險終古如一自非大田淮泗內實青徐使民有贏儲野有積榖然後分命方召總率虎旅精卒十萬使一舉蕩夷則不足稍勤王師以勞天下何以言之今遺黎習亂志在偷安非皆耻為荒服逺慕冠冕徒以殘害剝辱視息無寄故繦負歸國先後相尋敵既不能校勝循理攻城略地而輕兵掩襲急在驅殘是所以速怨召禍滅亡之日今若遣軍追討報其侵暴大翦幽冀屠城破邑則聖朝愛育黎元方濟之以道若但欲撫其歸附伐罪弔民則彼必輕騎奔走不肯㑹戰徒興巨費無損於彼復奇兵深入殺敵破軍茍陵患未盡則憤激思鬪報復之役將遂無巳斯秦漢之末䇿輪臺之所悔也安邊固守於計為長曾孫之霸才均智敵江淮之間所居各數百里魏舍合肥退保新城江陵移民南涘濡須之戍家停羡溪及表陵之屯民夷散雜晉宣王以為宜從江南以北岸曹爽不許果亡柤中此皆前代之殷鑑也何者斥候之郊非畜牧之地非耕桑之邑故堅壁清野以俟其來整甲繕兵以乘其敝雖時有古今勢有彊弱保民全境不出此塗要而歸之有四一曰移逺就近以實內地今青兖舊民冀州新附在界首者三萬家此寇之資也今悉可內徙青州民移東萊平昌北海諸郡大山以南南至下邳左沐右沂田良野沃西阻蘭陵北厄大峴西塞之內其號險固民性重遷暗於圖始無事之時喜生咨怨今新被鈔掠餘懼未息若曉示安危居以樂土宜其歌忭就路視遷如歸二曰浚復城隍以增阻防舊秋冬收斂民人入保所以警備暴客使防衛有素也古之城池處處皆有今雖頽毁猶可修治粗計戶數量其所容新徙之家悉著城內假其經用為之閭伍納稼築場還在一處婦子守家長吏為師丁夫匹婦春夏佃牧寇至之時一城千室堪戰之士不下二千其餘羸弱猶能登陴鼓譟十則圍之兵家舊說戰士二千足抗羣敵三萬矣三曰纂偶車牛以飾戎械計千家之資不下五百偶牛為車五百兩參合鈎連以衛其衆設使城不可固平行趨險賊所不能干既已族居易可檢括號令先明民知夙戒有急徴發信宿可聚四曰計丁課仗勿使有闕千家之邑戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自衛弓幹利鐵民不辦得者官以漸充之數年之內軍用粗備矣臣聞軍國異容施於封畿之內兵農並修在於疆埸之表攻守之宜皆由其習任其怯勇山陵川陸之形寒暑溫涼之氣各由本性易則害生是故戌申作師逺屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也管子治齊寄令在民商君為秦設以耕戰終申威定霸行其志業非茍任强實由有數梁用走卒其邦自滅齊用技擊厥衆亦離漢魏以來兹制漸絶搜田非復先王之禮治兵徒逞耳目之欲有急之日民不知戰至乃廣延賞募奉以厚秩發遽奔救天下騷然方伯刺史拱手坐聽自無經略唯望朝廷遣軍此皆忘戰之害不教之失也今移民實內浚治城隍族居聚處課其騎射長吏簡試差品能不甲科上第漸就優别明其勳才表言州郡如此則屯部有常不遷其業內護老弱外通官途朋曹素定同憂等樂情由習親藝因事著晝戰見貌足相識夜鬪聞聲足相救斯教戰之一隅先哲之遺術論者必以古城荒毁難可修復今不謂頓便加功整麗如舊但欲先定民營其閭術墉壑存者因而即之其有毁缺權時柵斷足以禦彼輕兵防遏遊騎假以方將漸就只立車牛之賦課仗之宜攻守所資軍國之要今因民所利導而率之耕農之器為府庫之寶田蠶之氓兼扞城之用千家總倍旅之兵萬户具全軍之衆兵强而敵不戒國富而民不勞比於優復隊伍坐食廪糧者不可同年而校矣今承平來久邊令弛縱弓簳利鐵既不都斷往嵗棄甲埀二十年課其所住理應消壞謂宜申明舊制延加禁塞諸商賈往來幢隊挾藏者皆以軍法治之又界上嚴立關候杜廢間蹊城保之境諸所課仗並加雕鐫别造程式若有遺鏃亡刃及私為竊盜者皆可立驗於事為長又巨野湖澤廣大南通洙泗北連青齊有舊縣城正在澤內宜立式修復舊堵利其埭遏給輕艦百艘寇若入境引艦出戰左右隨宜應接據其師津毁其航漕此以利制車運我所長亦微徹敵之要也後魏太武帝延和中薄骨律鎮將刁雍表曰臣聞安不忘亂先聖之政也況綏服之外帶接邊城防守不備無以禦敵者也臣鎮所管河西爰在邊表常懼不虞平地積榖實難守護兵人散居無所依恃脫有妖姧必致狼狽雖欲自固無以得全今求造城儲榖置兵備守鎮自建立更不煩官又欲三時之隙不令廢農一嵗二嵗不訖三嵗必成立城之所必在水陸之次大小高下量力取辦詔許之帝搜于河西詔司徒崔浩詣行在所議軍事浩表曰昔漢武帝患丐奴彊盛故開涼州五郡通西域勸農積穀為滅賊之資東西迭擊故漢未疲而丐奴已弊後遂入朝昔平涼州臣愚以為北敵未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虛雖有鎮戍適可禦邊而已至於大舉軍資必乏陛下知此事闊逺竟不施用如臣愚意猶如前議募徙豪彊大家充實涼土軍舉之日東西齊勢此計之得者孝文帝延興中尚書奏以敦煌一鎮介逺西北寇賊路衝慮㦯不固欲移就涼州羣官㑹議僉以為然給事中韓秀獨謂非便曰此蹙國之事非闢土之宜愚謂敦煌之立其來已久雖土鄰彊寇而兵人素習縱有姦竊不能為害循常置戍足以自全進斷北狄之覘途退塞西夷之窺路若徒就姑臧慮人懷異意或貪留重遷情不願徙脫引寇內侵深為國患且敦煌去涼州及千餘里捨逺就近遙防有闕一旦廢罷是啓戎心則邊人交構互相往來恐卒徒協契侵竊涼土及近諸戍則關右荒擾烽警不息邊役煩興艱難方甚乃從秀議時車駕南伐以李沖兼左僕射留守洛陽車駕渡淮别詔安南大將軍元英平南將軍劉藻討漢中召雍涇岐三州兵六千人擬戍南鄭尅城則遣沖表諫曰秦州險厄地接羌夷自西師出後餉援連續加北人叛逆所在奔命運糧擐甲迄兹未巳今復豫差戍卒懸擬山外雖加優復恐猶驚駭脫終攻不尅徒動民情西北連結事或難測輒依㫖密下刺史待軍尅鄭城然後差遣如臣愚見猶謂未足何者西道險厄單徑千里今欲深戍絶界之外孤據羣黨之口敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守意在惜地校之二義德有淺深惠聲已逺何遽於一城哉且魏境所掩九州過八民人所臣十分而九所未民者惟漠北之與江外耳羈之在近豈急急於今日也宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹將為吞并之舉今鍾離壽陽密邇未拔諸城新野跬步弗降所剋者舍之而不取所降者撫之而旋戮東道既未可以近力守西蕃寧可以逺兵固若果欲置者臣恐終以資敵也又今建都土中地接寇壤方須大收死士平蕩江㑹輕遣單寡棄令陷沒恐後舉之日衆以留守致懼求其死效未易可獲推此而論不戍為上髙祖從之尚書中書監髙閭上表曰臣聞為國之道其要有五一曰文德二曰武功三曰法度四曰防固五曰刑賞故逺人不服則修文德以來之荒狡放命則播武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寧方征伐四剋北敵强悍勇而寡謀長者野戰所短者攻城若以敵之所短奪其所長則雖衆不能成患雖來不能內逼又敵散居野澤隨逐水草戰則與家産並至奔則與徒衆俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已厯代為邊患者良以倏忽無常故也六鎮勢分倍衆不鬪互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可升地險山川丘陵王公設險以守其國長城之謂歟今宜依故于六鎮之北築長城以禦北敵雖有暫勞之勤乃有永逸之益如其一成惠及百世即於要害往往開門造小城於其側因地却敵多有弓弩敵來有城可守有兵可捍既不攻城野掠無獲草盡則走終必懲艾宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑內立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬人專習戈楯二萬人專習騎矟修立戰場十日一習採諸葛亮八陳之法為平地禦寇之方使其解兵革之宜識旌旗之節器械精堅必堪禦寇使將有定兵兵有常主上下相信晝夜如一七月發六部兵六萬人各備戎作之具敕臺北諸屯倉庫隨近作米俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漠北敵若來拒與之決戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一月之功當三步之地三百人三里三千人三十里三萬人三百里則千里之地彊弱相兼計十萬人一月必就運糧一月不足為多人懷永逸勞而無怨計築長城其利有五罷逰防之苦其利一也北部放牧無抄掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也嵗常逰運永得不匱其利五也又任將之道特須委信遣之以禮恕之以情閫外之事有利輒決赦其小過要其大功足其兵力資其給用君臣相體若身之使臂然後忠勇可立制勝可果是以忠臣盡其心征將竭其力雖三敗而踰榮雖三背而彌寵厯代名臣奏議卷三百二十
