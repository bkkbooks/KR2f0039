body:
  text: 歷代名臣奏議卷一百十四明楊士竒等撰學校宋太宗端拱初史館修撰楊徽之因次對上言曰自陛下嗣統鴻圖闡揚文治廢墜修舉儒學嚮臻乃至周巖野以聘隱淪盛科選以來才彥取士之道亦已至矣然擅文章者多超遷明經業者罕殊用向非振舉曷勸専勤師法不傳祖述安在且京師四方之會太學首善之地今五經博士並闕其員非所以崇教化奬人材繇內及外之道也伏望濬發明詔博求通經之士簡之朝著拔自草萊增置員數兮教胄子隨其所業授以本官稟稍且優旌别斯在淹貫之士既蒙厚賞則天下善類知所勸矣無使唐漢專稱得人太宗嘉納之仁宗至和三年侍御史趙抃乞給還太學田土房緡狀曰臣伏以商周之所以名治世莫非崇樹學校教育俊良以敦厚風俗之為急也後之茍簡淺末有以庠序議治道者咸以迂闊誚之然則舍此而欲風化之宣是猶郤行而求前也竊見京師太學殆將廢弛在慶歷初朝廷撥田土二百餘頃房緡六七千入學充用是時供生員二百人後來陳旭判監贍養亦不下百人近胡瑗管勾已逾三嵗才贍及掌事諭義孤寒學徒三二十人而已又自今年春夏已來一切停罷令自供給所以然者蓋向前所賜田土房緡並郤係國子監拘收占吝近聞吳中復論奏乞依舊還太學至今多日未蒙施行臣愚以謂今若田土房緡不還太學則無由贍養生徒不贍養則將見其紛然引去而之四方矣如此則太學遂廢伏惟陛下聰明仁聖凡輔弼臣鄰日欲致君於堯舜今使太學遂廢將不及商周之治如之何唐虞之庶幾哉伏望特賜聖旨指揮以先所賜田土房緡給還太學依舊許令修完齋舍贍養生員教育漸劘一變至治庶使本朝尊儒重道興學育材之盛不愧於古之治世矣嘉祐元年歐陽修上奏曰臣等伏見近日言事之臣為陛下言建學取士之法者矣或欲立三舍以養生徒或欲復五經而置博士或欲但舉舊制而修廢墜或欲特創新學而立科條其言雖殊其意則一陛下慎重其事下其議於羣臣而議者遂欲創新學立三舍因以辨士之能否而命之以官其始也則教以經藝文辭其終也則取以材識德行聽其言則甚備考於事則難行夫建學校以養賢論材德而取士此皆有國之本務而帝王之極致也而臣等謂之難行者何哉蓋以古今之體不同而設施之方皆異也古之建學取士之制非如今之法也蓋古之所謂為政與設教者遲速異宜也夫立時日以趨事考其功過而督以賞罰者為政之法也故政可速成若夫設教則以勸善興化尚賢勵俗為事其被於人者漸則入於人也深收其效者遲則推其功也逺故常緩而不迫古者家有孰黨有庠遂有序國有學自天子諸侯之子下至國之俊選莫不入學自成童而學至年四十而仕其習乎禮樂之容講乎仁義之訓敦乎孝弟之行以養父兄事長上信朋友而臨財亷處衆讓其修於身行於家逹於鄰里聞于鄉黨然後詢於衆庶又定於長老之可信者而薦之始謂之秀士久之又取其甚秀者為選士久之又取其甚秀者為俊士久之又取其甚秀者為進士然後辨其論隨其材而官之夫生七八十嵗而死者人之常夀也古乃以四十而仕蓋用其半生為學考行又廣察以鄰里鄉黨而後其人可知然則積德纍善如此勤而久求賢審官如此慎而有次第然後矯偽干利之士不容於其間而風俗不陷於偷薄也古之建學取士其施設之方如此也方今之制以貢舉取人往者四嵗一詔貢舉而議者患於太遲更趣之為間嵗而應舉之士來學於京師者類皆去其鄉里逺其父母妻子而為旦暮干祿之計非如古人自成童至於四十就學於其庠序而鄰里鄉黨得以衆察徐考其行實也蓋古之養士本於舒遲而今之取士患於急迫此施設不同之大槩也臣請詳言方今之弊既以文學取士又欲以德行官人且速取之歟則真偽之情未辨是朝廷本欲以學勸人修德行反以利誘人為矯偽此其不可一也若遲取之歟待其衆察徐考而漸進則文辭之士先已中於甲科而德行之人尚未登於內舍此其不可二也且今入學之人皆四方之遊士齎其一身而來烏合羣處非如古人在家在學自少至長親戚朋友鄰里鄉黨衆察徐考其行實也不過取於同舍一時之毀譽而決於學官數人之品藻爾然則同學之人蹈利爭進愛憎之論必兮朋黨昔東漢之俗尚名節而黨人之禍及天下其始起於處士之橫議而相訾也此其不可三也夫人之材行若不因臨事而見則守常循理無異衆人茍欲異衆則必為迂僻竒怪以取德行之名而髙談虛論以求材識之譽前日慶歷之學其弊是也此其不可四也今若外方專以文學貢士而京師獨以德行取人則實行素履著於鄉曲而守道丘園之士皆反見遺此其不可五也近者朝廷患四方之士寓京師者多而不知其士行遂嚴其法使各歸於鄉里今又反使來聚於京師云欲考其德行若不用四方之士止取京師之士則又示人以不廣此其不可六也夫儒者所謂能通古今者在知其意達其理而酌時之宜爾大扺古者教學之意緩而不迫所以勸善興化養賢勵俗在於遲久而不求近效急功也臣謂宜於今而可行者立為三舍可也復五經博士可也特創新學雖不若即舊而修廢然未有甚害創之亦可也教學之意在乎敦本而修其實事給以餱糧多陳經籍選士之良者以通經有道之士為之師而舉察其有過無行者黜去之則在學之人皆善士也然後取以貢舉之法待其居官為吏已接於人事可以考其賢善優劣而時取其尤出類者旌異之則士知修身力行非為一時之利而可伸於終身則矯偽之行不作而偷薄之風歸厚矣此所謂實事之可行於今者也臣等伏見論學者四人其説各異而朝廷又下臣等俾之詳定是欲盡衆人之見而採其長者爾故臣等敢陳其所有以助衆議之一非敢好為異論也伏望聖慈特賜裁擇七年知諫院司馬光上奏曰臣伏見國子監直講見缺數員久而未補蓋以近制須年四十以上及進士九經出身方得為之臣愚以為學官正宜取德行經術可為師表之人不當限以苛法若不察其人之賢愚而惟年齒出身則其間雖有德行如顔回經術如王弼皆終身不可為學官也又舊制學官皆先試講説然後就職近嵗此法亦因循不行臣欲乞今後應國子監直講有闕許本監或兩制以上舉京朝官選人有德行經術者具姓名聞奏更不問年紀及出身其國子監所舉者委學士或舍人院試兩制以上所舉者委國子監試並須衆官聚廳㸦舉疑義靣試講説擇其義理精通者保明聞奏方降敕差除若德行邪僻經術荒謬而輒敢舉薦保明者並乞嚴行朝典仁宗時諫議大夫夏竦請興學校疏曰臣聞古之教者家有孰黨有庠術有序國有學禮樂之始教化之倫於是乎在五帝有成均之名虞夏貴膠庠之禮周監二代四郊立學漢氏握符雅尚學校元帝不限博士弟子之員孝明教授期門羽林之士永平之際揖讓興焉李唐好文崇設兩監不遊太學以為恥旋及叔世事亦陵遲國家法遵典故惟逺是圖時文載郁化成天下但謹教勸學有殊經意設廣文之館列博士之員胄子惰尚齒之禮中年廢考校之規或有生徒𨽻名而已故儒雅之士厭其同方由是九州罕修學校蜀郡墜文翁之訓豫章隳范寧之制太守但思於固祿刺史不聞其興學遂使邊遐之俗罔知鄒魯之風冠帶之民安有弦歌之化雖間有俊材而罕聞師訓執泥經指不知所裁伏願陛下稽考古義恢崇人文明太學之道于中廣庠序之學於外兮命郡國各置學官講信修睦以裨教化無使子襟之詩復歌於聖代也張方平上論曰臣聞古之王者建國君民教學為先古之教者家有孰黨有庠術有序國有學夫其造育俊選以成官材是立政之基也上賢崇德正君師父兄之尊是設教之本也合射習鄉修揖讓弦歌之節是禮樂所成也養老合語享孤念功是仁義所起也出師受成執訊反告是廟堂之嚴也選習材能以助祭事是宗祊之重也蓋三王四代盛德之世上自天子外及諸侯其所以化民成俗之道未有不以學為先也周官曰州長春秋以禮會民而射于州序黨正以禮屬民而飲酒于序以正齒位文王世子復載諸侯羣吏養老之事此則州鄉列國庠序之禮咸與太學同制矣周衰天下大亂干戈日用而列國之學猶廢故子襟刺其不修左氏美其不毀也漢文翁首建黌舍於蜀郡仲舒次發太學於京師而公卿大臣名儒隱德咸有門弟子橫經傳道書名録牒或數千人至于東都學士寖盛故在兩漢其政事本於經術其議論依於王制朝有名教之勸士篤去就之行及桓靈失御姦亂滔天王綱解絶民勢版蕩而賴正人持救義士奮拯支壞扶顛更延餘歷雖腥德已塞于上而清議不敗於下豈非教學之功漬染深厚之所致歟江左普氏范寧立庠序於豫章庾亮起講舍於鄂渚然倡而不和絶而不續尋復廢圮諸生解散以是而觀時之風政其可知也惟我治朝據宸立極丕冒出日同文一軌鳥言鴂舌知誦簡册之言髽首卉裳咸襲端甫之服奎璧有爛河洛發祥文物炳然儒碩挺出故學校俶落乎濉渙續興乎郟鄏摹規大於齊魏弦誦聞於江浙樂善之吏經營其闕民恱獻力不令景從庠序之制班班然且遍乎郡國矣自非朝廷以道德風示四方以禮義薰襲齊人又安得不言而化如草偃風行若是之速乎然臣聞一閧之市必立之平一卷之書必立之師周典以本俗六安萬民其一曰聨師儒記曰凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學今學宫盛立而師位尚虛諸生抱經侐然無主時敏厥修雖得樂群之所必有正業曷取函丈之問且夫百工衆伎必有師匠緇黃所聚輒立師長況夫學者為國造士使民興仁所傳者纍聖之格言所習者先王之正道師教不立學乃虛器夫三代而下治道淳優儒雅尊博莫如二漢自文武之世屢下詔書勤命郡國勸使立學而終不能興自餘厯世小雅蕩然故弗論矣今天下承文明之化庠序修立乃盛於兩漢朝廷宜遂成其善意樂以成之顧同不急之務視之弗篤豈國家尊道育材之意哉間者近甸數郡之學雖為除乎講官旋復縻以吏職攬簿領之不暇何圖籍之能精且國家奄有萬邦吏員至衆山澤津途百家之聚錐刀可斂必遣王官惟是膠庠王道所在顧一士之廩祿廢徽政之本原豈朝廷貴教化而賤貨利之意歟臣愚以為宜委清望近臣上從朝列下逮選曹舉經術篤行之士凡立學州郡悉為選官依其資任優其稍祿夫張官布職散劇繫時略之則輕屬之則重貴之則人必同趨簡之則衆斯共薄事無大小柄其事則權歸任無髙卑委其任則效立臣愚以為欲使師禮嚴重道訓尊立在乎使之專治學政主領學徒勤良者旌而異之悖惰者簡而黜之及賔興之時必參以學官之論其嘗簡黜者弗在蒸髦之選其嘗旌異者必預充庭之貢而命外臺察諸學之官其尤通博於講議勵精乎教育能得學士自逺方至者上之特賜奬諭或有賜焉太學員缺即以充選且制使才名之士不歷學官者不得入乎館閣入館閣者必先歷乎學官猶近制先倅郡而後得補憲臺三院也如此則清流美士在乎學矣自然師道尊而教立士業成而行修禮義逹乎閭巷德化漸乎州里國獲良才之用民得善吏之庇三綱以正五教用成弦誦聞乎四方道德行於天下矣方平又上論曰臣聞古有四民皆世其業則象賢世祿為古之道然三王四代必教諸學藝成德就乃辨材而官之故舜命夔典樂教胄子夏氏大小之學商人左右之序皆所以教國子也周官大司樂掌成均之法以治建國之學政而合國之子弟王太子王子群后之世子卿大夫元士之適子國之俊選皆造焉崇以詩書之教詔以德行之媺干羽絃誦凡學必時修六禮以節其性明七教以興其德比年考校至於大成然後論材定位而官使之漢制中二千石九卿得任子弟為郎或沒於刺守名績流著亦蒙恩典録其後嗣凡三署郎悉屬光祿勳更直宿衛嵗察亷茂舉四行才迹優顯始蒙選舉銓居髙第方出補長丞下自魏普迄於唐朝臣僚有功利及民勞效在國始被恩澤賜一子官褒勵勸賞其義甚大臣竊覩朝制凡職參侍從班在兩省無間中外嵗至誕節輒任京官一人郎官卿監外臺亷刺凡及郊禮輒任選職一人又近制員外而兼館閣得視正郎之秩三丞而請致仕亦荷門子之録誠由盛世一統溥天無外銓除路廣郡縣員多足以雱灑王澤周冒纎微之品奬勸群吏無為子孫之憂然臣之愚意竊有不足者夫賞延於世雖盛王之典而能不當官亦先賢所誡今仕任之塗益廣顧教育之道未施且世祿之家鮮克由禮膏梁之族名為易驕夫其生享豐餘之養習見逸欲之靡而不淬礪以先王道德恭儉之言陶染以古賢孝友祗庸之訓是使立身之道不篤蒞官之法不修罔知小人作業之勞不念稼穡艱難之勤家緒速淪世美鮮濟故宜然矣彼性知禮義之貴心存藝文之樂卓爾而立不入於邪令器自成其亦幾族是以古者作為膠學聚而教之非惟為國造士固乃為臣立家也臣伏請凡今之子弟以資任入仕者冝悉籍於太學其在都者令日入肄業遵古齒序之禮臣聞師嚴而後教尊欲尊乎教在嚴其師欲師之嚴在重其位伏願於朝士中擇宿儒清德名素在人者正授博士明立條教使行師弟子之禮以肅之比年考校顯勤罰惰及三年則大比能精一大經量策時務而通者送吏部依資補用其未精通者復留進業必及格始得除吏其在外者以大比時赴集升降同之傳曰學以從政不聞以政入學故夫學古入官量才授任著諸典訓若何捨之如此則名為資任實經誨育雖髙華之胄有寒素之業也父兄必加夙夜之訓子弟必勤講修之志勸勵之道立庠序之教興朝多世德之家官獲稱職之吏仰補時政旁恢治法非邦教之大者歟方平知睦州又奏請州學名額及公田狀曰臣聞古之王者建國君民教學為先古之教者家有孰黨有庠術有序國有學故三王四代盛德之世上自天子外及庶邦其所以化民成俗之道未有不以學為先也伏以新定古城山俗淳淡民風順睦以得州名邑有俊選之材野有名節之士先是太平興國九年知州故左補闕田錫始建今至聖文宣王廟及上請九經書於朝蒙恩給賜今見收管至景祐元年知州右司諫范仲淹拓廟西垣建置學舍樹立講堂至寶元元年知州都官員外郎胡楷增新廟宇基址嚴敞及臣到任塗塈茨以畢工焉伏望陛下崇導德教之源廣厲學官之路俾是逺方之俗仰霑天子之光特與恩賜州學名目并乞於管內荒逃係官田內量給十數頃以給學糧選官以領其教職置籍以會其物費庶遊學之士獲安𨽻業之所使郡為鄒魯家為洙泗風化所被恩施甚美神宗熙寧元年監察御史裏行程皓上疏曰臣伏謂治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未盡美士人微謙退之節鄉閭無亷恥之行刑雖繁而姦不止官雖冗而材不足者此蓋學校之不修師儒之不尊無以風勸養勵之使然耳竊以去聖久逺師道不立儒者之學幾於廢熄惟朝廷崇尚教育之則不日而復古者一道德以同俗茍師學不正則道德何從而一方今人執私見家為異説支離經訓無復統一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及百執事方嶽州縣之吏悉心推訪凡有明先王之道德業充備足為師表者其次有篤志好學材良行修者皆以名聞其髙道之士朝廷當厚禮延聘其餘命州縣敦遣萃於京師館之寬間之宇豐其廪餼恤其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其教自小學灑掃應對以往修其孝悌忠信周旋禮樂其所以誘掖激厲漸磨成就之之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道其學行皆中於是者為成德又其次取材識明逹可進於善者使日受其業稍久則舉其賢傑以備髙任擇其學業大明德義可尊者為太學之師次以分教天下之學始自藩府至於列郡擇士之願學民之俊秀者入學皆優其廩給而蠲其身役凡有父母骨肉之養者亦通其優遊往來以察其行其大不率教者斥之從役漸自大學及州郡之學擇其道業之成可為人師者使教于縣之學如州郡之制異日則千室之鄉逹於黨遂皆當修其庠序之制為之立師學者以次而察焉縣令每嵗與學之師以鄉飲之禮會其鄉老學者衆推經明行修材能可任之士升於州之學以觀其實學荒行虧者罷歸而罪其吏與師其升於州而當者復其家之役郡守又嵗與學之師行鄉飲酒之禮大會羣士以經義性行材能三物賔興其士於太學太學又聚而教之其學不明行不修與材之下者罷歸以為郡守學師之罪升於太學者亦聽其以時還鄉里復來於學太學嵗論其賢者能者於朝謂之選士朝廷問之經以考其言試之職以觀其材然後辨論其等差而命之秩凡處郡縣之學與太學者皆滿三嵗然後得充薦其自州郡升於太學者一嵗而後薦其有學行超卓衆所信服者雖不處於學或處學而未久亦得備數論薦凡選士之法皆以性行端潔居家孝悌有亷恥禮遜通明學業曉達治道者在州縣之學則先使其鄉里長老次及學衆推之在太學者先使其同黨次及博士推之其學之師與州縣之長無或專其私茍不以實其懷姦罔上者師長皆除其仕籍終身不齒失者亦奪官二等勿以赦及去職論州縣之長蒞事未滿半嵗者皆不薦士師皆取學者成否之兮數為之賞罰凡公卿大夫之子弟皆入學在京師者入太學在外者各入其所在州之學謂之國子其有當補蔭者並如舊制惟不選於學者不授以職每嵗諸路别言一路國子之秀者升於太學其升而不當者罪其監司與州郡之師太學嵗論國子之有學行材能者於朝其在學賔興考試之法皆如選士國子自入學中外通及七年或太學五年年及三十以上所學不成者辨而為二等上者聽授以管庫之任自非其後學業修進中於論選則不復使親民政其下者罷歸之雖嵗滿願留學者亦聽其在外學七嵗而不中升選者皆論致太學而考察之為二等之法國子之大不率教者亦斥罷之凡有職任之人其學業材行應薦者諸路及近侍以聞處之太學其論試亦如選士之法取其賢能而進用之凡國子之有官者中選則增其秩臣謂既一以道德仁義教養之又專以行實材學升進去其聲律小碎糊名謄録一切無義理之弊不數年間學者靡然丕變矣豈惟得士寖廣天下風俗將日入醇正王化之本也臣謂帝王之道莫尚於此願陛下特留宸意為萬世行之神宗時監察御史裏行彭汝礪論三舍疏曰臣伏覩國子監考試上舍依詮試例臣伏念自王者之迹熄而學校教養之法不明於天下學者以言而不及道於是其實幾亡焉道之方行也陛下以天明命奮然震起而鼎新之放淫辭黜邪説造之以經術而學士大夫知所本也然風俗靡靡未還忠厚豈獨美之未成哉亦由吾所以取之者其法未盡也且夫科舉之興久矣相因於千嵗而欲革於一旦之近臣固自知其難也蓋亦有漸焉今天下之士或聚或散而行能之實非可以遽察臣以謂當自庠序始法度之行自近及逺故又當自太學始考試頗以行能為差雖未如古蓋亦殆庶幾焉今上舍尤所以風動四方比他時益當慎選而必用糊名之法似非朝廷所以養育德義之本意也且朝廷罷詩賦廢制科欲取之以實也今如是則但察其詞而已何異於以言也論選士在學校不循科舉之常恐必非其人也今如是則不肖者亦可以僥幸何以異於科舉也今六經之説其明如日雖老夫小子皆得自託於義理學文不足患也所虞者其實未應而已臣欲乞試內上舍皆以文行參考如辭理優長行義超卓為一等推恩仁義無玷者為一等如有過闕文雖中不與焉夫上舍中其恩不過免解或遂得一命而使人人知所以自愛而興於德所施者寡而所及者逺夫是之謂要術行之以漸待之以久古或可復矣臣嘗待罪學省稍詳本末如臣所論衆不能廢今所以必用封彌謄録欲如內舍者恐物議難一不敢自任其責而朝廷所以如此者亦以私疑之也臣以謂陛下興起學校方將追還三代之美而立政造法乃無以異於後世之科舉則所失多矣夫行能有素非可以一朝一夕為之是非所繫者衆亦非一人之所能專也茍得其私第當竄其人而已不可以非其人而廢法也臣欲乞秖令鎖宿考校庶幾專一或以臺諫官一人臨之以防議論之私其他乞如試內舍體例則學校之興不至廢失矣諫議大夫龔夬上奏曰臣伏覩制書舉人習業之外更試律義一道臣竊惟周王之教道德為先其次六藝而已故皆純全而道德以一風俗以同者此也陛下自熙寧以來大闡學校養育人材發明經旨訓迪士類今一旦以刑名之學亂之臣所未喻夫道德者本也刑名者末也教之以本人猶趨末況教之以末乎臣愚欲望聖慈追寢習律制書俾多士專尚經旨悉意本業不勝幸甚知興元府文同乞置府學教授狀曰臣自到本府遂詣學舍點檢見於處所褊狹僻在城下屋宇卑陋殆不可入其中生徒小大裁數人而已臣因詢問僚屬并遍訪左右所以如此不振之由皆言本府自唐末以來並無諸科修學及第之人從前每有科場皆是外州軍進士暫來就此假籍寄應縱獲薦到省皆下第無成遂各歸還本貫不復住此修習所以其民便謂讀書無效更不從學近嵗府縣雖稍有士人應舉終是素無師範所肄之業多不能上合新格臣初觀本府山川人物土風次第與東西二川大扺相類彼處雖至小州郡進士常不下三四百人而本府邑屋富盛人民繁庶若此豈無秀異可教之士以備官使但自來上下因循相與廢墮使朝廷風教獨不霑浹寥然一方遂絶文采深可歎也臣伏見本府司理參軍潘行自熙寧三年到任乃權府學教授行能為之講説經藝教其對答大義誘掖後進孜孜不倦日授月試皆有條緒近日府縣子弟翕然盡願入學至於外郡士人聞之間亦漸有來者以此見人之趨嚮善道悉由勸奬訓勵儻得其心有所服自然不可制禦而卒至成業矣行今來舉主考第並已該磨勘來年正月滿當解罷臣竊慮行去之後俾他官承乏料學者之所恱從未必有能如行者臣兼體問得本路興洋利文龍等州雖有進士徒具名爾其人亦嘗自患所居僻陋難得師友臣欲望朝廷勘會本府并前件五州自來實係少有舉人修學及第之處乞賜詳酌特置學官就與行改轉使正充本府府學教授所貴一府五州之人悉得就近修學不三二年當盡變此俗燦然與天下士人相侔矣臣職在守土所治之下或有可請不敢自默臣無任恐懼激切屏營之至知制誥蘇頌上議學校法疏曰臣聞古者立太學以教於國設庠序以化於邑雖王之諸子卿大夫之子弟及國之俊選皆造焉三代所以教化行而習俗成者繇此道也自鄉遂之制壞而學校從而廢缺漢普而下代有興置至唐而後備上都立國子監以揔六學之務設官則有祭酒司業為之長博士助教直講為之訓導監丞主簿掌其政令外則京府州縣各有學並置博士助教以主訓教之職繇是黨庠遂序國學之制稍稍復矣國朝自景祐以來天下建學慶歷以後數立規程自是諸儒知所宗尚嵗月寖久師生益增然而黌校之間未聞有業成通經之士顯著於時而副朝廷之選用者今明詔將議改制而降意於詢訪兹誠治世之先務而聖主所當留神也臣竊謂本朝學制大抵倣唐之舊然而設官有未備而教導有未至故積日雖久而成效無聞也何以言之唐制學官國學則博士助教各二人直講四人大成十人學生三百人太學四門學則博士助教各三人學生各五百人而四門又有俊士八百人律書算學則博士助教各一人學生五十人至三十人今之學官惟直講説書共八人而無國子太學四門之别職事又無殿最之課太學生止於三百人廣文生則三嵗試補但隨秋賦而不𨽻兩學聽習律學雖有其名而無其職書算則又闕焉唐之學官每嵗終考校以訓授功業多少為殿最學生則以業成通兩經以上者止於監祭酒司業策試優者上於禮部大成上於吏部今二者咸無焉其法制滅裂如此而欲責其一道德而廣教化勢不可得也必欲别為新規臣愚以謂積習既久未易更張莫若即舊法而增損之則便而易行也今學官八人謂宜各令分掌職事五人專職講説人各講一經春秋兼三傳禮記兼周禮儀禮並為大經各限二年講畢毛詩為中經限一年半周易尚書為小經限一年三人掌教授諸生以詩賦文論經史大義及時務策仍輪日直學以待諸生請問疑義并出試題目若考校試卷則八人通主之其教導有方成效顯著為諸生稟伏者候及三年委判監官聞於朝廷望賜召試館閣職事其不職者罷免之學生以五百人為額逐日早分經聽受每經百人仍兼習孝經論語聽讀罷則課習文史每月公試三學官考校優劣分三等揭名於學以為勸沮監丞掌其課最主簿糾其違慢每一經講畢監上於判監集官策試大義十道次日口説十道各定為三等大義通十并口説明白能發明聖賢深藴者為優等大義通六及口説俱通者為次等不及六通為下等其通一大經或一中經兼一下經試入優等者上於朝廷望加旌拔或直送省試仍許特奏名次等籍其名以俟再試甄别下等本學常加敦勉其文行道藝超絶倫輩朝野所知者不拘常例並許舉薦以備朝廷擢用其律書算等亦望各立一學量置生徒庶令學者粗知本原以之入官不至牆靣也州郡之學每州請置經學博士一員內舉人及三百人以上者朝廷為選差正官三年為一任如能舉職有效者任滿日本州為保薦之乞加旌擢其餘本州辟召有科名守選官員或經行純粹之士上於本路列奏朝廷俟旨補授仍給本學公錢為俸亦以三年為任任滿保薦如正官法內命官望加優奬舉人即授以間官再授教授之職每州仍置説書一員以本郡有經術文行之士為鄉里所推者充仍從生徒衆舉州為補置本州無其人則請於鄰州使專講説諸生聽讀課試亦約太學之例如有經術精博文藝優長者上於州州為覆試籍其名以補學職俟及三年顯有功效者舉送國子監與通經者同試縣學置助教一員推舉如州説書例兼主講説教授之事諸生有業成通經者上於州學與通經者校試舉送州縣既立學校須藉公費望許標撥本處間田或戶絶及僧寺莊土多處斟酌移割入學充職田隨生徒多少以定頃畝州縣為差人主持勾收課利入學以助支費條約既傋奬勸既行則人人各務本業窮經學文不三五年可以丕革舊俗矣宗丞劉摯乞增宗學官俸狀曰臣所領職事偶有管見不敢自避僭冒之罪而茍簡不言伏覩治平制詔增立宗室教學之法設教授官通大小學幾三十員其講授課試條式明具逐官除本俸及月請飱錢六十千外别無添給而宮院承例衆率私錢充為月給多者三五十千其下不減二十千臣等伏以諸宮宗室聽讀員數不等大學小學亦復人數不同而學官月給取足其間故其斂率之法參差各異或以俸入均割或從員數分定或大小學通融或逐學各自承數大槩員多或俸優則所斂輕而易供員少或俸薄則所出多而難集取豫緩急亦又繫夫賔主恩意得失之間故輸者受者皆有幸不幸焉以至興訴投訟本司為之督索蓋此錢本非官為立制互生詞説理難齊一臣再惟教官於學者既為仰給之地則俯仰顧私恐少肯以教人之意飭厲自任至其甚也將必有委曲諂媚相事於詼諧宴集以求容恱者蓋利之所在人之常情師生之分無由兩立凡此甚非朝廷養訓宗子崇嚴學官本意臣等不勝愚欵欲乞將諸教授比在京職事官明立添支稍優其數舊例宮院所供月錢一皆禁罷教者既無懷私之慮得以展意於其職學者又免會斂之煩而不得持此相為輕重師道少抗然後所謂程課可得而加察矣臣等竊嘗計之使學官員數常足而誠聽增俸之優其所加費為緡錢歲才三數千爾恭惟朝廷養士之制新美完具太學生干計而郡國增立教官緣學經費無請不獲所以樂育人材恩施甚厚顧豈於宗學小費乃有愛惜特有司未經申論因循至此伏望赦其愚裁行之時議建武學同修起居注張璪上言曰古之太學舞干習射受成獻功莫不在焉文武之才皆自此出未聞偏習其一者也請無問文武之士一養於太學知諫院兼領國子監事陳襄上奏曰臣伏覩先降詔書令兩浙已下至臺閣臣僚建議學校貢舉之制得以上聞者兹見陛下講求至治思得求賢養士之要以興起王業也臣近以諫官兼領國子監事每至太學視其齋舍頽弊生徒挑逹官吏茍簡殊無法度竊謂太學者天子教化之宮自古聖帝賢王莫之敢廢普漢而下雖無先王之法然猶置師弟子多及千數唐貞觀中規制益廣增築學舍千二百間博士生員與蕃夷子弟遊於學者僅至八千餘員豈國朝儒學之盛跨越漢唐而弦誦之地寂寥至此臣實耻之蓋藝祖創業未遑斯事當時謀議之臣識慮不遠因循百年未有太學今生員所居乃是司業廳事與朝集數位而已天下徯望必行於陛下之手事得其本為之甚易但陛下先求賢哲之士使居師長之位百度興葺乃其末事可以不勞而成矣伏見前授試大理評事充忠武軍節度推官知許州長社縣事常秩性行純明專於古學甘貧守道不茍仕進語默出處非義不由道德未加而人信之此可謂以身治人者也前授安州司戶參軍充國子監直講陳烈忠孝仁勇根於誠性行與道合心與俗違博通羣經而尤明於禮學思一物不獲其所則其心憂焉仁宗朝嘗以學官召之數命不起此可謂能自任以天下之重者也二子之道則同而其用或異皆所謂學孔子者也方今丘園有道之士求烈與秩未見其比陛下方大有為之時捨如是人而使窮居家食恐非虞舜之舉十六相文王待二老之意也如陛下未即置諸左右姑以禮命召至太學使居博士之職以經授弟子帥宗室公卿之子弟與國之俊選咸得執經肄業而以師禮處之庶乎其可致也有鄉貢進士管師常者履行正固經術專精東南士人多所從學更練民事而適於時用嘗為太學正衆論推服鄉貢進士程頥者有髙堅之行懷經濟之學廷試不第無復進取守道用晦名聞公卿近聞諸路搜訪遺逸以應赦書師常與頥咸與薦達亦望聖恩並除國子監一助教之名庶幾太學生員有所規法語曰舉逸民天下之民歸心焉正謂此也所有近詔諸臣議學之制論者固多伏望陛下選擇近臣頒付詳定取其合於王制者立為一代之法願不為淺者之論而遂沮止則天下幸甚哲宗元祐元年左正言朱光庭乞擇名師主太學狀曰臣竊以立國家太平之基本者莫急於人材養天下人材之成就者莫先於庠序朝廷務要廣求人材而不素為之養則何由而得今上庠與州郡學校雖名為興賢而無養人材之實所以然者蓋無名師之故也夫所謂名師者其經術足以窮聖藴其行義足以為人表又能至誠以教養為己任者是也昔在仁宗朝詔胡瑗典太學當是時天下學者翕然向風所以成就人材為多至今未見其繼者豈國家之大四海之廣無其人患在不求之也今庠序之中不見以禮義教養惟見以苛禁繩治其所習經術所修行義孰為發明孰為觀法學官者區區自顧苛禁之不暇奚暇治禮義哉甚非所以為首善之地也今朝廷所去弊政幾欲盡而所修善政未甚聞臣以謂所修善政莫先於置名師興學校以養人材首善自京師而風動天下伏望聖慈詔大臣博求真儒為天下所共推者使主太學以教養為己任罷三舍之弊法去一切之苛禁專務以禮義教養多士自然可以成就人材為陛下立太平之基本臣願陛下留神天下幸甚左司諫王岩叟乞罷三舍法狀曰臣聞法有為名則美而行之則艱事有用意則良而施之則戾者三舍是也三舍之法立雖有髙材異能未見能取而得之而奔競之患起奔競之患起而賄賂之私行賄賂之私行而獄訟之禍興獄訟之禍興而防猜之禁繁博士勞於簿書諸生困於文法非復混然養士之體而庠序之風或幾乎息此識者之所共嘆也臣竊謂庠序者所以萃羣材而樂育之以定其志業養其名譽優遊舒徐以待其成今乃科舉之外别開進取之多岐以支離其心而激其爭端使利害得失日交戰於胸中損育德善道之淳意非所以篤教化成人材也臣愚乞鑒已然之弊罷三舍法開先生弟子不相見之禁示學士大夫以義講解之餘止於公私試第髙下如昔時自足以奬材氣而厲風聲使多士欣欣於從學則上庠宜復有雍容樂易之美為四方矜式矣岩叟又請用薦舉之士為學官乞罷試法疏曰臣伏以砥名礪行以待用於世者士人之所以自處也養士人之節以成就其美而風天下之俗者朝廷之所以處士人也臣竊見內自太學外至州郡學官之制皆令就試四方之士區區於進卷屑屑於程文不憚奔馳之遠淹留之久者顧豈其心哉祿任迫之有不得已耳甚非所以重師道崇儒風惜士人之節也禮曰道尊然後民知敬學孟子曰人之患在好為人師今立法如此使人人自求為師欲天下之民知敬學恐不可得臣愚伏望聖慈令罷此法一用應詔薦舉之士為中外學官以重教導之選為天下勸御史中丞劉摯乞重修太學條制狀曰臣竊以學校之制主於教育人材非行法之地也羣居衆聚帥而齊之則誠不可以無法然而法之為學校設者宜有禮義存焉可也比歲太學屢起大獄其事一出於誣枉於是有司緣此造為法禁煩苛凝密士之學其間者轉身舉足輒蹈憲網束溼愈於治獄條目多於防盜上下疑二求於茍免先王之意禮義科旨逝已盡矣法有大可怪者博士諸生禁不相見教諭無所施質問無所從但博士月巡所𨽻之齋而已謂如此則請問者對衆足以為證佐以防私請以杜賄謝嗟夫學之政令豈不大繆先王意哉私請賄謝如是真可以絶之乎而又齋數不一不可以隨經分𨽻也故使之兼巡如周易博士或巡治禮之齋禮學博士復巡治詩之舍往往所至備禮請問相與揖諾至或不交一言而退昔之設學校教養之法師生問對憤悱開發相與曲折反復諄諄善誘蓋其意不如是之疏也其道不如是之薄也先王之於天下遇人以長者君子之道則下必有長者君子之行而報乎上者斯有禮也遇人以小人犬豕之道則彼將以小人犬豕自為而報乎上者不能有義也況夫學校之間哉太學自置三舍之法寥寥至今未嘗應令成就一人豈真無人也主司懲前日之禍畏罪避謗士雖有豪傑拔萃之才誰敢題品以人物自任而置之上第哉則是先帝有興賢造士之美意而有司以法害之也臣愚欲望聖慈詳酌罷博士諸生不許相見之禁教誨請益聽其在學往還即私有干求饋受自依律敕仍乞先次施行外應太學見行條制委本監長二與其屬看詳省其煩密太甚取其可行便於今者有所增損著為科條上之禮部本部再行詳定上之三省以聽聖斷摯又上奏曰臣昨者建言太學條制煩密失養士之意乞下有司别行修立後蒙朝廷選官置局及今已久未見成法緣所差官各有本職不得專一集議兼臣竊以謂庠序之制教育以成其材奬勸以進其志羣居衆聚略為約束自古以來法之施於學校者其本不過如斯而已然則為今之議無大措置獨可按據舊條考其乖戾泰甚者刪去之而存其可行可久便於今者則所謂學制可以一言而定矣若乃髙闊以慕古新竒以變常非徒無補而又有害夫職親於諸生而習知其情偽者宜莫如學官也使其因人情利害而為之法者亦莫如學官也然則安用以他官置局為哉故臣前日奏請止乞令本學立法上禮部禮部再加參詳上三省以待聖斷誠如臣言學制成久矣今置局半年聚議既希闊而議官各持所見紛然異同無所折衷學者疑惑趣向未安欲望聖慈指揮罷修定學制所檢會臣今年二月十五日所奏止以其事責在學官正録以上將見行條制去留修定嚴立近限次第條上取旨施行所貴因革不失其當法令速成以便學者以述先帝興學之旨以副陛下造士之意四年龍圖閣學士朝奉郎知杭州蘇軾上奏曰臣伏見本州州學見管生員二百餘人及入學參假之流日益不已蓋見朝廷尊用儒術更定貢舉條法漸復祖宗之舊人人慕義學者日衆若學糧不繼使至者無歸稍稍引去甚非朝廷樂育之意前知州熊本曽奏乞用廢罷市易務書板賜與州學印賃收錢以助學糧或乙賣與州學限十年還錢今蒙都省指揮只限五年見今轉運司差官重行估價約計一千四百六貫九伯八十三文若依限送納即州學嵗納二百八十一貫三伯九十七文五年之間深為不易學者旦夕闕食而望利於五年之後何補於事而朝廷嵗得二百八十一貫三伯九十七文如江海之中增損涓滴了無所覺徒使一方士民以謂朝廷既已捐利與民廢罷市易所放欠負動以萬計農商小民銜荷聖澤莫知紀極而獨於此飢寒儒素之士惜毫末之費猶欲於此追收市易之息流傳四方為損不小此乃有司出納之吝非朝廷寬大之政也臣以侍從備位守臣懷有所見不敢不盡伏望聖慈特出宸斷盡以市易書板賜與州學更不估價收錢所貴稍服士心以全國體元祐中越州學教授慕容彥逢奏曰臣伏覩神宗皇帝恢崇太學以幸教多士製堂及齋名以寓訓迪學者遊於斯仰之若日星之麗乎上也陛下緝熙先猷州縣學校咸建師長命以貢士而名堂及齋類多前日官司隨意建立或怪僻不馴或稽考無據或違背經旨以此揭示多士甚未稱朝廷育材之意臣愚欲乞府界及諸路州縣學應堂及齋名除不許用太學敦化等堂名及論秀蒸髦等職事齋名外並須用太學諸齋名即不得存留舊名及别有創立如蒙聖允乞下有司頒降施行元符中彥逢為太學博士又上奏曰臣伏覩陛下追述神考美意自京師下至郡縣恢崇學校以幸教天下增置諸路教官所選惟經術行義之士三代庠序之盛宜無以加此然諸路教官奉行貢士法事體比昔為重今員數既衆又皆一時之選而資任多係選人國子監長二嵗舉改官止八人施之太學正録且猶不給況諸路教官如此其衆邪伏望聖慈特詔有司稍增國子監長二舉官舊格使凡預師儒之選者益知自重以稱陛下長育人材之意哲宗時太學正葛勝仲進養士圖籍劄子曰臣竊以三代之盛班治顯設之方尤備於成周而周之隆教養作成之法獨推於文武文王之詩曰不顯亦臨無射亦保故其效至於多士以寧武王之詩曰豐水有芑武王豈不仕故其效至於無思不服雖聖人以神道設教其精神心術之妙不可推測意者殆將以作人籲俊為長久無窮之計非特謀用於一時以康庶事而已棫朴云周王壽考遐不作人下武云於萬斯年不遐有佐故子孫賴之而國以長楙嗚呼盛哉天祐斯文越數千年而復生上聖應世覺民之迹若合符節恭惟皇帝陛下以徇齊淵懿之資履熙洽隆平之運聖學髙明道心昭徹燭見治本在崇化厲賢故自躬斷已來首議學政大開雍頖而於以育才衆聯師儒而命之分教以賔興考勸之法革科舉循沿之陋升進之令類出於親製程試之文每塵於乙覽一歲餼廩無慮數百萬别為一司經畫均制不取於縣官而坐以餘羡且命諸道各售常産以資永業行之十有餘年典法大備彬彬新美之才輩出而晏晏忠厚之俗已成雖詩歌文武之盛無以進焉既又命禮部以天下養士之額舍宇之數費用之多寡田業之頃畝載之圖籍掌在有司臣等恭承詔旨討論編次隨類編括厪克成書取大觀二年嵗終為率既以逐州縣離為析數又以天下合為總數凡二十有四路而中都兩學之費不與焉彼漢中世增弟子員三千人而唐太宗千一百區載之史牒已稱甚盛顧視今日何足道哉所有天下養士圖籍凡二十有五册謹隨狀上進干冒宸扆無任戰悸屏營之至畢仲遊上奏曰天下之事有至近且狹偶得其道而行之則雖纍百世而不倦有甚大極重不得其道則終無補於天下今所謂律令臯陶之刑也增損隆殺近所以為治之道遂成不刋之書學校之設欲以進賢養士為太平之具不得其道至今設為虛器而已蓋甚可嘆也古者家有孰黨有庠術有序國有學而養老習射讀書合樂行禮於其中者蓋欲使知君臣之義父子之親長幼之節明是非一好惡積道藝以為天下之用顔子不遷怒不二過孔子謂之好學而後世姑益賦廩督課業嚴禁令以從事豈古人所以為學之道邪其君臣之義父子之親長幼之序所以明是非一好惡為道藝者猶未備也而又欲麗師堂廣生舍衆徒弟以為盛其去道愈逺蓋聞熙寧之初變詩賦為經義以取士增太學郡國學官設三舍改定式令以布行之四方之人至京師者幾數千而是非不明好惡不一道藝進取未有異也而今復欲變經義為詩賦退學官更定式令以從事則學士大夫之所以自得者果安在邪以略言之三代鄉舉里選之法雖難卒行宜亦倣其大者使學士大夫有以自得而後詔先生博士率以君臣之義父子之親長幼之序與夫是非好惡道藝之正而詩賦經義則如古以射取士之法行同能偶然後序之别為貢舉以待科舉之士存之而勿論要使優遊和易而不迫化其心而勿強復其迹則庶乎先王所以為學之道而久以嵗月則遂將適於實用不為虛器而徒設天下幸甚歷代名臣奏議卷一百十四
