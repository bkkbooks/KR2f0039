body:
  text: 歴代名臣奏議卷三百二十三明楊士竒等撰禦邊宋眞宗咸平四年兵部尚書張齊賢論陜西事宜上奏曰臣竊見昨者清逺軍陷沒以來青崗寨燒弃之後靈武一郡援隔勢孤賊遷必窺覘城池刼脅熟户兵力傷沮難固壘垣況塞北未寜方有調發若果分兵西面亦恐兩失機宜以今日西鄙事勢言之窮討則不足防遏則有餘其計無他惟在激勵自來與繼遷有讐蕃部招誘逺處大族首領啗之以官爵誘之以貨財推恩信以導其誠述利害以激其志若山西蕃部響應逺處族帳傾心則敵軍之勢減矣以弓箭手及旋㸃義軍對本城兵士臣責得十三州軍有二萬餘人若更扵他州及近處對替又合得五六千人其本城兵士試加料揀亦甚有材勇可捍邊者若沿邊兵得及五萬餘更誘蕃部踰十數萬但彼出則我歸東備則西擊使其奔命不暇矧更能外侵哉仍許蕃漢兵獲得馬畜貲財悉令自取明行曉諭逺近皆知則蕃漢將士之心孰不見利争進今靈州軍民不翅六七萬陷之死地危難可知臣又慮賊遷謂來春必發兵救援靈武扵我未舉兵之際盡驅軍馬併力攻圍則靈州孤城亦必難固萬一陷失賊勢益增縱使多聚兵革廣積財貨亦難保必勝矣所以臣乞封潘羅支為六谷王及厚賜金帛仍先敦諭彼必向風恐遷賊旦暮用兵斷彼族賣馬之路茍朝廷信使得達潘羅支則泥埋等族西南逺蕃不難招輯西蕃既已禀命沿邊兵勢自雄則鄜延環慶之淺蕃原渭鎮戎之熟户自然齊心討賊竭力聖朝設能與對替兵甲及駐泊軍馬互為聲援伺間而興則萬山聞之必不敢扵靈州河西頓兵矣萬山退縮則賀蘭山蕃部亦稍叛遷賊矣如此靈州孤壘未至憂虞今議者謂六谷虚名終宜吝惜靈州孤壘翻未籌量與其濫賞而収逺服之心臣謂濫賞之失輕矣茍若蹙地而稔邉庭之勢則蹙地之耻大矣今議者不過曰名器不可假人刑賞不可濫及此乃聖人治中國之道非議扵外域者也陛下即位之初以銀夏一管盡與繼遷委高爵於匪人屈王臣於穹帳分儲廪以悦其志輦金帛以慰其心有以見陛下愛全生靈耻用凶器恵此中國以綏四方者也朝廷扵遷賊之恩可謂厚矣殊不知契丹慮遷賊感大國之恩斷右臂之勢防患甚切其謀甚深置王爵以賜之遣戎使以鎮之王爵至則旌節之命輕矣旌節之命適所以資之也戎使至則動静皆伺之向背之心異矣我使往適所以堅之也夫西平之命亦虚名也契丹命之有何損哉以今日言之當時之策豈不為失乎且六谷者西北之逺蕃也荒服之内推為雄豪若扵平時但以市馬須示羈縻則一懐化將軍亦巳厚矣酌今日事體似失權宜兼恐今後邉事兵機更有準前失中即扵國家大有妨損昨清逺之䧟是使奸兇轉成豐富兵民官吏六七千餘或含恨重泉或永囚異域傷和致沴思之痛心顧惟靈州還同穽獸外則虞寇戎之逼内則憂變故之生朝夕之間垂餌虎口然而握兵者畏懦逗遛坐觀覆敗運籌者安然自若曾不憂邉臣雖至愚不勝忠憤且外敵之性變詐多端必恐彼衆之謀潛伺開隙伏望明諭邉將内備外虞臣不任憂國思報之至齊賢又請調江淮荆湘丁壯八萬以益防禦朝議以為動摇兼澤國人民逺戍西鄙亦非便計遂寢齊賢又言靈州斗絶一隅當城鎮完全磧路未梗之時中外已言合棄自繼遷為患以來危困彌甚南去鎮戎約五百餘里東去環州僅六七日程如此畏途不須攻奪則城中之民何由而出城中之兵何由而歸欲全軍民理須應接為今之計若能增益精兵以合西邉屯駐對替之兵從以原渭鎮戎之師率山西熟户從東界而入嚴約師期兩路交進設若繼遷分兵以應敵我則乗勢而易攻且奔命道途首尾難衛千里趨利不敗則禽臣謂兵鋒未交而靈州之圍自解然後取靈州軍民而置砦扵蕭闗武延川險要處以僑寓之如此則蕃漢土人之心有所依頼裁候平寜却歸舊貫然後縱蕃漢之兵乗時以為進退則成功不難矣時不能用未幾靈武果䧟齊賢改吏部尚書上疏言曰臣在先朝常憂靈夏兩鎮終為繼遷并吞言事者以臣所慮為太過畧舉既往之事以明本末當時臣下皆以繼遷只是懐戀父祖舊地别無他心先帝與以銀州廉察庶滿其意爾後攻刼不已直至降麟府州界八部族蕃酋又脅制賀蘭山下帳族言事者猶謂封奬未厚洎陛下賜以銀夏土壤寵以節旄自此姦威愈滋逆志猶暴屢斷靈州糧路復撓縁邉城池數年之間靈州終為吞噬當靈池清逺軍垂欲䧟沒臣方受經畧之命臣思繼遷須是得一兩處强大蕃族與之為敵此乃以蠻夷攻蠻夷古今之上策也遂請以六谷名目封潘羅支俾其展効其時近臣所見全與臣謀不同多為沮撓及繼遷為潘羅支射殺邉患謂可少息今其子徳明依前攻刼析逋逰龍鉢等盡在部下其志又似不小臣慮徳明乗大駕東幸之際去攻六谷則瓜沙甘肅于闐諸處漸為控制矣向使潘羅支尚在則徳明未足為虞今潘羅支已亡厮鐸督恐非其敵望委大臣經制其事咸平中詔近臣議靈州棄守之事左司諫知制誥楊億奏曰臣奉御劄子朕常覽古書備詳邉事得其人則舉無遺策失其事則謀之不臧朕三復斯文終朝在念未嘗不察言觀行捨短從長希戮力扵邦家冀太康扵宇縣其如塵氛不息邉塞未寜北狄雖具扵隄防西鄙尚多扵艱阻靈武是中原巨屏平夏乃近域小蕃久興内牧之心常作疆場之患阻絶道路侵犯軍城肆虐轉恣扵無厭大郡翻成扵孤壘縱之則終成暴亂討之則慮困生靈兩途宜在扵咨詢百中須從扵籌畧卿職當綸綍位列清華披經史之遺文大資智畧觀古今之盛事必蘊機謀邊患用何策以剪除靈州以何方而廢置棄之則有何利害存之則有何便宜專聽必當之謀無恡酌中之論分明擘畫宻具奏聞用符果決之誠以副蕩滌之望者竊以詢于芻蕘前王之盛徳謀及卿士載籍之格言盖所以竭盡下情詳求中道使舉無失策動必有成斯聖皇慎重之至也然而狂夫之言聖人擇焉謀之欲多斷之在獨伏惟皇帝陛下清問之宴親紆睿覽言可用者行之不疑臣某幸甚幸甚臣嘗讀舊史見漢武北築朔方之郡平津侯諫以為罷敝中國以奉無用之地願罷之上使辯士朱買臣等發十策以難平津平津不能對臣以為平津侯為漢賢相深明經術習知利害属武帝以雄侈自任志在開拓買臣等以詞辯獲進並侍左右前史又稱平津每朝會議論但開陳其端使人主自擇不肯面折廷諍由此言之非不能折買臣之舌盖所以將順人君之意耳即朔方之非便有自來矣且其地非禹貢九州之内非周官職方所領在要荒之外固聲教不及元朔中大將軍衞青攘却匈奴取其河南地以列置郡縣今靈州是赫連果地後魏置州盖朔方之故墟即匈奴之舊壤僻介西鄙懸絶諸華數百里之間無有水草烽火不相應亭障不相望當邉境謐寜羌戎即叙道路不壅饟饋無虞猶足以張大國之威聲為中原之扞蔽自北軍内擾邉邑屢驚羣部為其脅從兇黨因而猖熾待之以爵賞頗驕蹇而不恭討之以甲兵又遁逃而無獲凡有贏糧之役必興狙擊之謀每至靈武轉輸大須發卒防援離去内地皆無闘心經渉畏途多有菜色自曹光實白守榮馬紹忠及王榮之敗資糧屝屨所失至多將士丁夫相枕而死以至募商人入榖輸帛償以數倍之價復扵積石之孤壤别築清逺之一城邉民繹騷國帑匱乏既不能制敵人之死命又不能救靈武之急難數年之間兇黨逾盛靈武危堞巋然僅存河外五城繼聞䧟没但堅壁清野坐食糗糧閉壘枕戈茍度朝夕且使賊遷横行沙漠俶擾疆陲擊列鎮之戍兵侵屬國之蕃部雖有警急無候望而得知縱或憑陵但繕完而自保未嘗出一兵馳一騎敢與敵捔此靈武之存無益明矣平津所言罷敝中國以奉無用之地正為今日也臣以為存之有大害棄之有大利且如國家募人入粟價以十倍之直發卒轉餉渉兹不毛之地此古人所謂率二十鍾而致一石敺民扵死地者也今或棄之即可以嵗省戍卒分守内郡一卒之費可給十夫國家無飛芻輓粟之勞士卒免暴露流離之苦必謂廢之即虧失土地傷損威重且如堯舜夏禹聖之盛者也地不過數千里而明徳格天四門穆穆武丁成王商周之明主也然地東不過江黄西不過氐羌南不過荆蠻北不過太原而頌聲並作號為至治及秦漢拓土窮兵逺畧雖疆理益廣而干戈日尋府庫之資財屢空生靈之肝腦塗地校功比徳豈可同年而語哉夫蝮蛇螫手壯士斷腕蟻壤不塞將漏山阿今靈武之存為害甚扵蝮蛇供饋之費為蠧逾扵蟻壤無鴻毛之益有泰山之損豈可忽逺大之畧徇悠悠之談昔西漢賈捐之嘗建議棄朱崖當時公卿亦有異論元帝能排衆多之説奮獨見之明下詔廢之人頌其徳元帝之意寜欲自棄其地當其内屬為郡固已置吏而拊循及其稱兵搆亂豈可勞民而征戍故其詔書曰議者以棄朱崖羞威不行夫通于時變即憂萬民萬民之饑餓危孰大焉且宗廟之祭凶年不備況乎避不嫌之辱哉臣以為正與今日靈武之事相類當邊方寜謐靡有寇患可以存而勿論及勞師費財無益保障固宜廢而不舉何足以傷威重而貽羞辱哉必以失地為言即燕薊八州河湟五郡所失多矣何必此為議者又以西北諸蕃戎馬是産資其控制以通貿易環慶諸州内附蕃落藉其屏翰以免驚騷此又迂濶之甚且戎人為利所誘故㸦市扵邉闗蕃部之族自强故能庇扵種類必來寇扵環慶固無隔於籓籬百雉危城千里懸隔自救不暇豈及扵他議者又以其土田沃饒有漢陂之利恐賊遷因而播種益以富强況戎人但以攻剽為能罔知耕稼之事河隴之外棄地甚多延袤百城提封萬井西漢屯田之所疆畔猶存儻事力耕可以積榖何必獨耕靈武乃能足食若靈武於賊有大利即是必争之地當朝夕攻取豈至扵今皆為孟浪之談殊非經久之計況又嵗有調發動致敓􅔯借寇兵而齎盜糧竭民力而耗國用為患之大無出於斯雖庸人豎子亦知其可棄也然自清逺淪䧟斥候不通孤城之人如釡中之魚躍强敵之勢若崑山之火炎朝廷必欲棄之須牙璋徴兵靈旗直指約齎深入執殳前驅鼔行賊中傅于城下然後合其將卒遷其人民隳城復隍塞井夷竈乃為棄也臣伏料國家物力尚屈未暇此行雖曰棄之亦空言耳今一城生齒正在焚溺之中咸懼必死以是憂思自脱而無路若陛下慎選單介間道而行齎持詔書宣布王命令其盡焚廬舍自拔而歸丁壯悉令持兵老㓜以之襁負古稱歸師不可遏又曰置之死地而後生之當此之時人百其勇臨難思免其鋒莫當國家又須申命偏師揚言出塞軍聲既振賊勢自分即靈州東遷之民不虞邀擊之患雖有掠刼易為枝梧且國家所惜者士民所急者財用豈可以驍果之旅委扵餓虎之蹊府藏之實填扵盧山之壑今若棄去靈武退守環慶卒免戍扵絶域民思保其室家供饋不出於郊圻恩徳自淪於骨髓民力不竭士氣益揚何敵不摧何戎不克恭惟陛下欲康宇縣慮困生靈求必當之謀思酌中之論臣以靈州之廢置計無出扵此望陛下採之而已陛下又憤兹强敵思欲翦除臣以為不可黷武以窮兵止可伐謀而制勝臣竊料賊遷睢盱邉塞之外倔强沙漠之中脅制諸羌嘯聚不逞無耕農之業無蠶織之工為䑕竊之謀以資衣食聚烏合之衆以擾塞垣致蕃夷之服從用兇威而驅廹非有厚利能誘其人朝廷今廢棄靈州每嵗更無饋運絶其覬望何所窺圖此困賊遷之一也平夏之西池鹽斯在先是貿易粟麥用資餱糧今條禁甚嚴法網尤宻無敢踰越漸致擕離此困賊遷之二也嚴勅疆吏謹奉國經辨其非常禁其闌出使竹頭木屑不遂其求狗盜雞鳴無施其巧㳺魂空磧坐抵困窮此困賊遷之三也然須精選鋭師分守邉地慎擇名將授之廟謀訓練驍雄隄防侵軼驗其走集明其偵候茍鴟張而衝突必烽舉以燧燔併力翦除分路驅逐如秦人之鹿犄角以攻譬常山之蛇首尾相應蕞爾殘敵坐致滅亡臣竊見太祖朝命姚内斌領慶州董遵誨領環州二人所統之兵纔五六千而巳閫外之事一以付之軍市之租不從中覆用能士卒効命羌夷畏威朝廷無旰食之憂疆場無羽書之警臣欲望陛下於武臣中選有將帥之才知邉鄙之事者三數人分布諸郡各量其所將兵多少付之除廪禄之外賜與一大縣租賦恣其犒設令開幕府辟召髦俊為之僚佐咨以策畧勇力之士禀其指蹤之用軍旅之政許以便宜而行儻賊遷侵邉郡軍城擾内屬蕃部並脣齒相援腹背夾攻或戰馬正肥戎士思奮即徴發内屬征討不庭俘獲之餘盡分麾下且戎人利扵降附羞廹兇渠儻撓之以勁兵示之以大信懐荒振逺推亡固存出金帛以購酋豪懸爵秩以寵降附明立賞格厚答戰功即賊遷之腹心稍稍奔潰親離衆叛事去運乖煢煢獨夫誰與為伍但塞外一獨夫耳安能與大邦為讐哉陛下若欲謀成廟堂功在漏刻臣以為此敵方盛其財猶豐勇悍之羣如臂使指未可以嵗月破也直須廢棄靈州退保環慶然後以計困之耳如臣之策祗得三兩驍將付以一二萬精卒以數縣租賦給其用度令分守邉郡賊遷可以計日成禽朝廷可以高枕無事矣臣從事儒學豈知軍旅耳剽日久心知其然輙罄謏聞仰祗清問談不稽古詞非據經進思盡忠盖事君之無隠謀或可用豈以人而廢言刑部郎中陳貫上形勢選將練兵論三篇大畧言地有六害今北邉既失古北之險然自威逺城東距海三百里沮澤磽确所謂天設地造非敵所能輕入由威逺西極狼山不百里地廣平利馳突此必争之地凡争地之利先居則佚後趨則勞宜有以待之昔李漢超守瀛州契丹不敢視闗南尺寸地今將帥大抵用恩澤進雖謹重可信卒與敵遇方畧何從而出邪故敵勢益張兵折扵外者二十年方國家收天下材勇以備禁旅賴廪給賜予而已恬于休息久不識戰可以衛京師不可以戍邉境請募土人𨽻本軍籍丁民為府兵使北捍契丹西扞夏人敵之情偽地勢之險易彼皆素知可不戰而屈人之兵矣都廵檢使平州刺史李繼和命兼涇原儀渭鈐轄時繼遷未弭命張齊賢梁顥經畧因訪繼和邉事繼和上言鎮戎軍為涇原儀渭北面扞蔽又為環慶原渭儀秦熟户所依正當回鶻西涼六谷吐蕃咩逋賤遇馬臧梁家諸族之路自置軍已來克張邉備方扵至道中所葺今已數倍誠能常用歩騎五千守之涇原渭州茍有緩急會于此軍并力戰守則賊必不敢過此軍而縁邉民户不廢耕織熟户老㓜有所歸宿此軍茍廢則過此新城止皆廢壘有數路來寇若自隴山下南去則由三百堡入儀州制勝闗自瓦亭路南去則由彈筝峽入渭州安國鎮自清石嶺東南去則由小盧大盧潘谷入潘原縣若至潘原而西則入渭州東則入涇州若自東石嶺東公主泉南去則由東山砦故彭陽城西並入原州其餘細路不可盡數如以五千歩騎令四州各為備禦不相㑹合則兵勢分而力不足禦矣故置此城以扼要路即今自靈環慶鄜延石隰麟府等州以外河曲之地皆屬扵賊若更攻䧟靈州西取回鶻則吐蕃震懼皆為吞噬西北邉民將受驅刼若以可惜之地甘受賊攻便思委棄以為良策是則有盡之地不能供無已之求也臣慮議者以調發芻糧擾民為言則此軍所費止出四州地里非遥輸送甚易又劉綜方興屯田屯田若成積蓄有備則四州税物亦不湏得況今繼遷强盛有踰曩日從靈州至原渭儀州界次東取𨫼子山以西接環州山内及平夏次并黄河以東以南隴山内外接儀州界及靈州以北河外蕃部約數十萬帳賊來足以闘敵賊遷未盛不敢深入今則靈州北河外鎮戎軍環州並北徹靈武平夏及山外黄河以東族帳悉為繼遷所吞縱有一二十族殘破奔迸事力十無二三自官軍瀚海失利賊愈猖狂羣蕃震懼絶無闘志兼又咸平二年棄鎮戎後繼遷徑來侵掠軍界蕃族南至渭州安國鎮北一二十里西至南市界三百餘里便扵蕭闗屯聚萬子米逋西䑕等三千以脅原渭靈環熟户常時族帳謀歸賊者甚多賴聖謨深逺不惑羣議復置此軍一年以來蕃部咸已安集邉民無復愁苦以此較之則存廢之説相去萬倍矣又靈州逺絶居常非有尺布斗粟以供王府今闗西老㓜疲苦轉餉所以不可棄者誠恐滋大賊勢使繼遷西取秦成之羣蕃北掠回鶻之健馬長驅南牧何以枝梧昨朝廷訪問臣送芻糧道路臣欲自蕭闗至鎮戍城砦西就葫蘆河川運送但恐靈州食盡或至不守清逺固亦難保青岡白馬曷足禦扞則環州便為極邉若賊從蕭闗武延石門路入縱鎮戎有五七千兵亦恐不敵即回鶻西涼路亦斷絶伏見咸平三年詔書縁邉不得出兵生事蕃夷盖謂賊如猛獸不怫其心必且不動臣愚慮此賊他日愈熾不若聽驍將鋭旅屢入其境彼或聚兵自固則勿與闘妖黨纔散則令掩擊如此則王師逸而賊兵勞賊心内離然後大舉及靈州孤壘戍守最苦望比他州尤加存恤且守邉之臣内憂家屬之窘匱外憂姦邪之憎毁憂家則思為不亷憂身則思為退迹思不亷則官局不治思退迹則庶事無心欲其奮不顧身令出惟行不可得已良由賞未厚恩未深也賞厚則人無顧内之憂恩深則士有效死之志古之帝王皆懸爵賞以抜英俊卒能成大功大凡君子求名小人徇利臣為兒童時嘗聞齊州防禦使李漢超守闗南齊州屬州城錢七八萬貫悉以給與非次賞賚動及千萬漢超猶私販𣙜場規免商筭當時有以此事達于太祖者即詔漢超私物所在悉免闗征故漢超居則營生戰則誓死貲産厚則心有所繫必死戰則動有成績故畢太祖之世一方為之安静今如漢超之材固亦不少茍能用皇祖之遺法選擇英傑使守靈武高官厚賞不吝先與往日留半奉給其家半奉資其用然後可以責潔廉之節保必勝之功也又戎事内制或失權宜漢時渤海盜起龔遂為太守尚聽便宜從事且渤海漢之内地盜賊國之飢民況靈武絶塞西鄙彊戎又非渤海之比茍許其專制則無失事機縱有營私冐利民政不舉亦乞不問用將之術異於他官貪勇知愚無不皆録但使法寛而人冇所慕則久居者安心展體竭材盡慮何患靈州之不可守哉又朝廷比禁青塩甚為允愜或聞議者欲開其禁且塩之不入中土困賊之良策也今若謂糧食自蕃界來雖塩禁不能困賊此鬻塩行賄者之妄談也蕃粟不入賊境而入于邉廪其利甚明況漢地不食青塩熟户亦不入蕃界博易所禁者非徒糧食也至扵兵甲皮榦之物其名益多以朝廷雄富猶言摘山煑海一年商利不入則或闕軍須况蕃戎所賴止在青塩禁之則彼自困矣望固守前詔為便眞宗時權御史中丞賈昌朝上備邉六事其一曰馭將帥自古帝王以恩威馭將帥賞罰馭士卒用命則軍政行而戰功集太祖脱裘㡌賜王全斌曰今日居此幄尚寒不可禦況伐蜀將士乎此馭之以恩也曹彬李漢瓊討江南太祖召彬至前立漢瓊等扵後授以劒曰副將以下不用命者得專戮之漢瓊股栗而退此馭之以威也太祖雖削武臣之權然一時賞罰及用財集事皆聽其專有功則賞有敗則誅今每命將帥必先疑貳非近倖不信非姻舊不委今陜西四路總管而下鈐轄都監廵檢之屬悉參軍政謀之未成事已先漏甲可乙否上行下戾主將不專號令故動則必敗請自今命將去疑貳推恩恵務責以大效得一切便宜從事偏禆有不聽令者以軍法論此馭將之道也其一曰復土兵今河北河東强壯陜西弓箭手之類土兵遺法也河北鄉軍其廢已久陜西土兵數為賊破存者無幾臣以謂河北河東彊壯已詔近臣詳定法制每鄉為軍其材能絶類者籍其姓名遞補之陜西蕃落弓箭手貪召募錢物利月入糧奉多就黥涅為營兵宜優復田疇使力耕死戰世為邉用可以減屯戍省供饋矣内地州縣增置弓手如鄉軍之法而閱試之其三曰訓營卒太祖朝令諸軍毋得食肉衣帛營舍有粥酒肴則逐去士卒有服繒綵者笞責之異時被鎧甲冐霜露戰勝攻取皆此曹也今營卒驕惰臨敵無勇舊例三年轉貟謂之落權正授雖未能易此制即不必一例使為總管鈐轄擇有才勇可任將帥者授之況今之兵仗製造殊不適用宜按八陣五兵之法以時教習使啟殿有次序左右有形勢前却相附上下相援令之曰失一隊長則斬一隊何慮衆不為用乎其四曰制逺人今四夷蕩然與中國通在北則臣契丹其西則臣元昊二國合從有犄角中國之勢借使以嵗幣羈縻之臣恐不可勝算古之備邉西有金城上郡北則雲中鴈門今自滄之秦綿亘數千里無山河之阻獨恃州縣鎮戍爾嵗所供贍又不下數千萬一榖不熟或至狼狽契丹近嵗兼用燕人治國建官一同中夏元昊據河南列郡而行賞罰此中國患也宜度西方諸國如沙州唃厮明珠滅臧之族近北如黑水女眞高麗新羅之屬舊通中國募人往使誘之使歸我則勢分而釁生體解而瓦裂矣其五曰綏蕃部屬户者邉陲之屏翰也延有金明府有豐州皆戎人内附之地朝廷恩威不立彊敵廹之塞上諸州藐焉孤壘蕃部既壊土兵亦衰破敵之日未可期也臣請陜西縁邉諸路守臣皆帶安撫蕃部之名擇其族大有勞者為酋帥如河東折氏之比庶可為吾藩籬之固也其六曰謹覘候古者守封疆出師旅居則有行人之覘國戰則有前茅之慮無其謹如此太祖命李漢超鎮闗南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領棣州郭進控山西武守琪戍晉陽李謙溥守慶州董遵誨屯環州王彦升守原州馮繼業鎮靈武筦𣙜之利悉輸之軍中聽其貿易而免其征税邉臣富於財得以為間諜羌夷情狀無不預知二十年間無外顧之憂今日西鄙任邉事者敵之情狀與山川道路險易之勢絶不通曉使蹈不測之淵入萬死之地肝腦塗地狼狽相藉何以破敵制勝耶願監藝祖任將帥之制邉城財用悉以委之募勇敢之士為爪牙臨陣自衞無殺將之辱募死力為覘候而望敵知來無䧟兵之耻書奏多施行之夏臺益部寇擾王顯上疏曰間嵗以來戎事未息李繼遷負恩於靈夏王小波干紀於巴卭河右坤維並興師旅而繼遷翻然向化遣子入覲願修職貢陛下曲加容納許其内附示以徳信申以恩錫所以綏懐之者至矣然而狼子野心未可深信所宜謹屯戍固城壘積芻糧然後遴選才勇付以邉任縱有緩急則備禦有素彼又奚能為患哉至若蜀寇未平神人共憤謂宜申飭將帥速期蕩平既免老師以費財且防事久則生變又況邛蜀物産殷富其間士卒驕怠遲留顧戀實兼有之莫若勿憚往來潛為更代既可均其勞逸抑可免扵遷延至扵河北闗防所當加謹者誠以國家方事西南宻謀興舉若分中朝之勢力則長外寇之姦謀矣時制沿邉糧斛不許過河西河西青塩不得過界販鬻犯者不以多少處斬顯請多者依法自餘别為科斷以差其罪章上未報移知秦州仁宗明道二年劉平自雄州徙知成徳軍奏曰臣嚮為沿邉安撫使與安撫都監劉志嘗陳備邉之畧臣今徙眞定路由順安安肅保定州界自邉吳淀望趙曠川長城口乃契丹出入要害之地東西不及一百五十里臣竊恨聖朝七十餘年守邉之臣何可勝數皆不能為朝廷預設深溝高壘以為阨塞臣聞太宗朝嘗有請建置方田者今契丹國多事兵荒相繼我乗此以引水植稻為名開方田隨田塍四面穿溝渠縱廣一丈深二丈鱗次交錯兩溝間屈曲為徑路才令通歩兵引曹河鮑河徐河雞距泉分注溝中地高則用水車汲引灌溉甚便願以劉志知廣信軍與楊懐敏共主其事數年之後必有成績帝遂宻勅平與懐敏漸建方田寳元二年平為鄜延環慶路副部管乞選用酋豪各守邉郡疏曰臣聞五代之末中國多事四方用兵唯制西戎似得長策于時中國未嘗遣一騎一兵逺屯塞上但任土豪為衆所伏者以其州邑就封之凡征賦所入得以贍兵由是兵精士勇將得其人而無邉陲之虞太祖掃清天下謂唐末諸侯跋扈難制削其兵柄收其賦入自節度使以下第其俸禄或四方有急則領王師行討事已兵歸宿衞將還本鎮雖為長策然當時大臣不能逺計亦以朔方李彛興靈武馮繼業移於内地自此靈夏漸敝中國命將出守發兵出屯千里就糧逺近騷擾十年之中兵民交困靈武既失守趙徳眀以僻守一隅且懼問罪亟馳驛奏願備藩臣朝廷姑務息民即以靈夏兩鎮授之徳明濳治甲兵日滋邉患當時若止弃靈夏綏銀四州限山為界使徳明逺遁漠北則無今日之患既以山界蕃漢人户并授之而鄜延環慶涇原秦隴嵗宿兵數萬今元昊僭逆恣行殺害衆叛親離復與嘉勒斯賚相持巳乆結隙方深此乃天亡之時臣聞寇不可玩敵不可縱或元昊一旦為人殺戮酋豪代之與嘉勒斯賚通和約契丹相為表裏則西北之憂未可測矣若以鄜延環慶涇原秦隴四路軍馬分為兩道益以蕃漢弓箭手歩騎得精兵二十萬比元昊之衆三倍居多乗人心離散與嘉勒斯賚立敵之時㳂邉州軍轉徙糧草二百餘里不出一月可坐致山界洪宥等州招集土豪授以職名給衣禄金帛自防禦使以下刺史以上次第封之以土人補將校勇者貪扵禄富者安於家不期月而人心自定或授嘉勒斯賚以靈武軍節度使西平王使逼元昊河北族帳復出鄜延石州蕃歩騎攻西河部族以厚賞招其酋帥其衆離貳則大軍進討以所得城邑而封之元昊不過竄身河外一窮寇爾今元昊倚山界洪宥等州蕃部為肘腋以其勁勇而善戰闘若失之是斷其左右臂靈夏綏銀不産五榖蕃部馳騁不習山界道路每嵗供給資糧以贍之若收復洪宥限以山界憑高據險下瞰沙漠各列保障量以戍兵鎮守此天險也彼靈夏綏銀千里黄沙本非華土往年調發逺戍老師費財官私疲弊以致小醜昌熾此謀之不臧也或朝廷貸元昊之罪更示含容宿兵轉多經費尤甚恐北人謂朝廷養兵百萬不能制一小戎有輕中國之心然亦須議守禦之長計或元昊潜與契丹結為援以張其勢則安能減西兵以應河北譬如一身二疾不可並治必輕者為先重者為後也請召夏竦范雍與兩府大臣議定攻守之策令邉臣遵守寳元元年張方平上平戎十策及表曰臣某言臣於景祐元年以茂材異等對詔策陛下擢臣秘書省校書郎至寳元元年以賢良方正能直言極諫對詔策陛下擢臣秘書省著作佐郎夫士感知己猶許以死況陛下自臨御已來十五年中三策天下士中選者止五人而臣再濫揀拔等比三人而已今雖逺在江湖之外而聞朝廷有鄙上之虞其可悠悠自同常人者哉臣不佞才見短淺然歴代之書備嘗渉獵至于成敗得失尤用心探討畧能言其梗概至于國論大體時務細故叅詳措置使臣間議其中臣潜自量亦未敢在諸生後是陛下再選臣于大問之下臣幸不辱也頃聞元昊猖獗敢干邉吏出車遣戍頗煩旰昃臣竊投筆憤歎西望毛竪恨身在遐逺不得請纓闕下思效愚者之慮輙上平戎十策臣未嘗逰函潼之西故其山川地形風土人物不無闕畧至于軍國機事臣以疎逺莫得詳知今所論著徒採歴代史冊兵謀地志及所見朝廷施為顯然之事臆度道聽懼不精審至有所得或足以發伏惟陛下神機天畧固無遺算萬機之暇清閒之餘少廻日月之光一登衡石之末以臣策不甚迂疎乞召兩府大臣試扵御前商㩁或有一得上稱清𠂻則扵海嶽亦有㳙塵之益也所撰平戎十策謹别録實封附遞上進干黷天威臣無任戰汗隕越待罪之至臣誠惶誠恐頓首頓首攻心臣聞上兵伐謀又曰攻心為上竊料戎心之蓄叛謀有日矣國家自藝祖剗除五代之弊始大一統立太平之基太宗真宗休養生息仁澤覆露文徳綏逺戎狄侵軼驅逐出疆謹備邉而已未嘗耀威靈勤逺畧深入外地以恢封境也今元昊猖狂負恩且習我之舊有輕我之志而無備我之心謂我必不能長驅出塞薄伐問罪也臣謹按地志麟府本銀勝之地去銀州三百里夏州五百里其去興州封壤相接賊巢穴在興州中都山若因鄉導渡河直趨五七日可到賊來入寇必自延渭比還自救程途自倍若徒遣輕騎姑謀犯邉清野深溝足挫其鋭儻悉發其衆身來入寇則中都守備勢當單寡誠能先以精兵屯布旁河州郡至元昊犯塞之時為竒兵自麟府路入巻甲掩其巢穴使西邉城壘守險自固勿與之戰元昊聞兵臨國正所必救事出慮表衆懐沮懼數道伏擊潰敗可保且彼州父老我之遺人飲潼荷㫋猶懐華土王師奄至可以恩信招徠則朔方之地庶復歸國伐其謀於已定攻其心扵不測所謂出其不意掩其不備一舉破賊策之上也臣聞先人有奪人之心軍之善志自國家失朔方棄靈武置戍内地控扼益蹙專為静勝深戒生事然戎心貪戾益思蠶食今若屯兵邉郡坐糜饋廪來則自保去又不追費財無功損威示弱計者若不厚懲創之使懾服而後止則臣恐邉鄙之虞未能徹警也伐交用兵之道其次伐交今元昊所恃為交者豈非北敵乎臣聞元昊與北通姻揆其事勢必先要結我與契丹通好餘三十年矣自漢氏以來夷夏之和而能謹守信誓如今之久者未之有也非惟懐我恩信利我聘幣抑當我盛徳之世無釁可乗今其與我之和好也在外而其與戎人之親睦也在内外雖我睦隂為戎助此又不可不過慮也示我之有禮防彼之有辭此為事機不可失者臣願遣使一介齎書一函示之以元昊背義之由朝廷備禦之意其書曰夏州自徳明以來受恩于國至于元昊綏撫彌隆今忽恣睢虧廢貢職藩臣阻命法當致討如聞元昊連彼婚姻遽興問罪之師實損與國之好彼誠矜其狂易遣喻此情若元昊悔過改圖效誠請命則我為之寛宥待之如初設元昊不禀訓辭居然愎扈違我二國之命自恃獨夫之强則當眀下詔書削其爵命申勅守將蕩除鯨鯢如此則我扵契丹以元昊之故益示敦睦之道契丹於我雖元昊之姻莫興間嫌之説雖未能破彼之交而我之親隣伐叛兩有辭矣專勝善用兵者我專而敵分我專為一敵分為十是以十擊其一也則我衆而敵寡吾所與戰者約也吾所與戰之地不可知則敵所備者多吾所與戰者寡矣寡者備人者也衆者使人備已者也昔吳為三軍而病楚隋以易戍而弊陳多方誤之用此算也今縁邉城壘緜接千里臣慮元昊分布兇黨間出討掠示欲掩襲分我守備務以疲我而諸守將輕請濟師我備彼去正墮其計今鄜延環慶涇原諸路皆國家控制西陲置兵之根本也形勢應援足相首尾縁邉城壘於兹倚重臣請諸境上州軍擇守將使脩築堡戍斥逺烽候非時寇至姑使歛衆清野閉壘自保勿與輕接又元昊犯塞路皆荒磧地無水草齎糧而至假有攻圍勢不能久若賊亟來攻我則逐路發師設謀邀逐無輕動衆以損威重如此則不為多方之誤而取專勝之功矣以蠻夷攻蠻夷邈川大首領嘉勒斯賚本吐蕃之遺種也自博囉齊殺繼遷而徳明破滅六谷世為仇怨今諸戎能為元昊後患者惟洮涼爾比聞效順來獻戎㨗朝廷撫納恩信亦厚此誠以蠻夷攻蠻夷之策也臣以為馭戎夷之道不惟賞利懐誘亦在誠信要結今邈川介于西鄙感慕恩徳納忠為用常所贈賄恐未足以致其力儻於朝臣中擇一有機辯材謀之士銜命臨撫諭以國家眷遇之意凡元昊部族與洮河接境而我應援可及者使自攻取之為出偏師趨要害為之犄角是令邈川自為戰也或難臣曰元昊既弱邈川復强是元昊未破又生一夏矣臣曰不然今量邈川之衆固未能困元昊也我因其力而假之勢羌有貪利之心且為我用足以牽持元昊之後分其備禦兹亦多算之一端也安民臣聞武有七徳先安民而後可以保大定功也今聚師西陲凡百調率應期趨辦實在闗中若百姓力屈流亡搔動則嘯聚草竊不逞之民乗焉語曰鳥窮則啄獸窮則搏民窮斯為盜矣羣黨連結輾轉相雄兹亦患起扵甚微釁生乎所忽則朝廷之憂不在邉防而在四郊之内矣伏願陛下深念兹哉諸陜西將帥轉運使等宜得識大體明時務周材之人充之凡廢置之宜弛斂之事當循寛大無使躁急陜西州縣長吏悉為選擇特降明詔告諸守令所聽民政務從簡直宿逋久負一切除免諸所科率起自近年有害於民者悉且權罷應徭役重色破民産力者使更張之以便安百姓闗津山澤侵民小利者與衆公共以恵貧弱上以布國家之徳澤下以裕編氓之生路以弭盜賊以固根本安民之要此其大節若其不先恤之而先困之寇未至而民已疲則是自取弊也何保大定功之有哉置兵根本用軍決勝在乎統帥統帥不一則威令不行不相為用非成功之勢也近觀唐時元濟淮西之誅慶緒相州之圍成敗之由其事可見淮西之師中外疑沮以用裴度為宣慰使度纔至師諸將各圖立功惟恐在後故元濟卒擒焉相州之圍子儀光弼皆在非無名將也以九節度之師不相統制但用魚朝恩為觀軍容使故相觀望卒以潰歸今環慶鄜延涇原等路各有部分莫相統領臂指伸縮當從中御機宜緩急勢不相及夫同舟而濟胡越一心利害背馳則為路人矣臣伏觀唐氏制度方面重權不欲專授戎帥故命皇子弟為元帥及節度大使而藩帥但授副元帥節度副大使及長史行軍司馬亦或命宰臣遥領節度及副元帥者今自陜以西永興當咽喉之要大河之南襃漢之北滎陽之西輸饋供億此其都會臣愚竊以為大軍根本宜駐此地而置陜西處置招討使之名應鄜延環慶涇原諸路皆節度之其大使請自聖心選置留止都下使遥領之擇命大臣才望威畧可任以重者為副大使行大使事以永興為治所以臨制諸路凡縁邉城戍要害控扼之處為寇衝突或邀襲討逐當得鄰道相㑹合應援者聽其處置焉此則權用雖在外而柄鐏實在内輕重相持易以移改盖馭將之要道也足食闗中雍州之域厥田上上昔秦鄭國引涇水注洛三百餘里溉澤滷之田皆畝收一鍾至漢白公復引涇水注渭袤二百里故闗中號為沃野千里而無凶年自漢唐之盛此焉作都非惟百二之固抑資膏腴之利也臣竊以為西疆之事宜聚重師於永興為臨制根本之地然今闗中地有遺利山陸險阻飛輓為艱邉儲軍資供須勞敝今誠能按兩渠之故迹豐衣食之本原檢責經界開置屯務則不煩逺為調發而足食矣或難臣曰昔唐氏都闗中肅代兵興中外艱食禁軍乏餉百姓至挼穗以供之及劉晏領租庸轉運使最達食貨輕重之術然徒能引江淮之粟以食秦人豈二渠之利不興於爾時乎臣對曰昔在唐初二渠所溉猶萬餘頃及承平漸久事不務本沃衍之地占為權豪觀㳺林苑而水利分於池榭碾磑以故亡天府之利貽天下之害故二渠難復於唐氏之時正為建都于彼也今議復之又何憚焉豐財夫兵事之大財用為急豐財足用必有根本財用根本在乎三司比來邦費敝事積矣有司徒張空簿而國財糜散於姦㳺之手伏望選用材幹精力之吏通輕重之數明功利之術者覆實天下之金糓以入為出以有餘補不足以會中外一嵗經用之實則財賦之盈虚可預料矣而又通其積滯權其贏縮使闗市不乏貨物平準此理國行師之本也諸不急之務無益之作浮冗之費欺侵之弊精為節度以集大計子曰足食足兵洪範八政先食貨而後賔師故知師旅大事財用為急也備姦臣聞用兵之術多方誤之伏以東南糧運在於汴渠比來重惜民力久不開濬每嵗霜寒水落沈沙填淤遂至渠底高淤堤下民屋至於黄河奔流湍瀉亦全藉隄防之固所謂築垣行水今黄汴是也自戎人即叙通其行商憧憧往來布于都市其所通結素無禁限唐憲宗初討淮西而姦臣王承宗李師道軰潜遣刺客暴害大臣斷陵廟之㦸焚芻廪之聚此亦慮外之事也今黄河横腹心之内汴渠為輸委之本若姦人窺伺潜有決鑿汙瀦我良田損墊我邑屋阻絶我運路則是肘腋之下更生一役其汴渠黄河隄障益望擇勤幹吏宻為分地廵邏以譏察姦人書曰惟事事乃其有備有備無患其此之謂矣購募竊聞元昊勇而好殺安忍無親背面之間必有讐敵可重行購賞以動其人有能得其首級者舉元昊之爵位土疆授之而許以重師為之援䕶戎人不義聞利必動則彭寵䘮元於家奴苻生殞命於近族事或有之矣右禦戎十策伏念臣齪齪書生本學爼豆之事區區壯志頗渉孫吳之書豈達權謀徒得糟粕頃聞元昊飽飛朝廷備禦雖蜂蟻屯聚犬羊躑躅仰惟聖慮未忘憂軫臣身紆郡紱神馳塞垣不得一至軍前圖上方畧輙此遥度或裨萬一天地容覆日月照被蠢蠕微動各得盡情臣之芻蕘伏望採納時方平又請延召近臣訪議邉事上疏曰臣微聞人言北敵不守封畧築城鄙上邉吏諜知料閲兵馬且復遣使來事固未審虚實然國家與之通好已四十年事窮必害起利盡則交疎理之常者顧但紆緩嵗月北方諸戎羈屬於彼者如奚高與達靼常内懐不服特强役屬之爾去冬彼以大兵臨河西謂如拾芥之易既而遁散以歸内羞諸戎且疑我之納夏人既羞且疑則其起辭生事思有逞於我豈保無他夫兵危事也不當易言之若信好可繼朝廷豈願事四夷即事至於不獲已亦在上下奮勵講所以折衝之策圖所以式遏之筭河朔之兵不啻三十萬邉境千里塘水居其八得以專力而控其要害城邑樓櫓守在九天之上若頓重師澶魏中山堅壁而弗與戰清野以待其敝出竒伺便邀其重歸是不可勝在我可勝在彼矣且彼久與中原通甘心和好其貴人習於驕佚其部人不練於戰闘於其本俗衰敝已甚而又母子兄弟内結疑隙上下離貳持去就心此其亂危之形中國可乗之機會若朝廷有意扵逺畧幽薊可圖也尚實能為中原患哉誠陛下震其威靈廟堂審其計議内外文武各致其力使彼一舉而不得志不有内變必有外叛諸戎勢且瓦解山後之地天其或者使復合於中土未可知也臣願陛下思患預防考謀事先秋氣漸清宫殿凉爽時因燕閒延對大臣俾各盡其謀猷以定其帷幄一日有邉境之急庶無倉卒之擾今西疆粗寜縱不保其久未有旦夕之虞也其將校可任者稍徙河北使得與士卒相服習漸諳土俗至于選官吏峙糗糧繕器械葺廐牧皆今切務而可以素備者也備而未用為政之常臨事紛紜何以鎭静此皆朝廷塵熟之論而儒生之常談臣忝在近班愚慮所及不敢自隠惟宸鑒裁擇方平又請罷陜西招討經畧司事上疏曰竊惟羌人叛命王師致討分命重臣委之統帥故授夏竦陜西招討等使四路軍政實節制之空國事邉于兹三嵗師惟不出出則䘮敗寇惟不來來必得志控要城寨殘蕩無幾内屬藩落驅掠向盡鈍兵挫鋭財殫力屈去嵗劉平石元孫之没奪范雍節鉞今春任福之敗罷韓琦經畧使中外皆謂朝廷威罰不舉責效太輕然猶薄示損懲微塞物論安有權握大衆坐翫寇敵至于覆軍殺將蹙國損威而曰我不預知是安用名為統帥也昔自三代至于春秋列國凡起軍旅未有其國君不親預戎事者自漢至唐興兵舉衆未有元帥不身先士卒在於行陣者後漢叚熲征西羌二十餘年未嘗蓐寢訖平羌患若將率奮身許國發憤殄寇有如是之臣則陛下何憂焉事既乖失理須更張臣竊聽輿人之議皆謂前後䘮師非賊能敗我我自取敗爾何哉凡諸邉臣禀命招討司機宜事會不失之急即失之緩勇者不得施其力智者不得專其謀而又愛惡相攻異同相戾文檄矛楯人無適從且朝廷設此司所以使臂指相用首尾相救決衆謀於獨斷通四路為一家近如麟府之圍雖非陜西疆域然為統帥茍急國患即未能請行赴救猶須耀師境上助為聲援陛下旰食軫慮遣勅使齎璽書督之出偏師使遥牽賊後逗遛立却畢竟不奉命至使賊如蹈無人之境因以平豐州夷寜逺麟州幾䧟今雖僅存勢已孤絶如秦人視越人之肥瘠一不動念但恐涇原鄜延即有警急亦必不能如首尾之相為救也陛下曲全事體乞還竦舊官與之一郡遂其自全之計且精擇逐路守將使人自為功家自為固量其邉勢配之兵力仍於永興益置重兵以為諸路根本以為人心鎮重春秋擇遣重臣出廵邉春則量禦備之力遷其軍馬入就倉牧命守將脩治城塹完利器用以待防秋之政今焉秋則閲其訓練之法蒐捕之術審官吏勞能以明升降之典按賦輿盈虚以通貨食之計以嚴其戰守但邉城能堅其守已足弊賊若將率各盡其用自當有功伏願天衷垂納裁擇方平又請省陜西兵馬及諸冗費事上奏曰臣伏聞陜西夏旱二麥不收近雖有得雨處秋田亦未必有望民已艱食頗有流移邉警雖寜兵戎尚衆因之飢饉事實可憂芻糧委輸最為切務朝廷綏懐夏寇本為休兵息民若其役費不紓必見物力日困經久之計殆無以支又比來諸州累報地震考諸咎證由隂有餘夫隂者妻道也臣道也民也邊鄙也此時後宫無過制外廷無權强所當戒慮者民與邊鄙爾内安民而外待邊鄙其要在貨力有備而已今境上堡寨兵分力微假如寇來勢必不能出戰如其守也即隨處土人自應足用况春夏之際戎人必無大舉若每年三月以後縁邊所屯東兵一切抽向内地就食至八九月復遣出戍又邉城一馬之給當歩卒三人既多羸駑不任馳敵平時虚芻粟動輙無人效命若今後所發縁邉屯駐馬軍約度足以廵邏外稍用歩人替還寛減調度此其畧也近聞勾抽陜西提㸃刑獄曹頴叔到闕欲令簡省邉計臣兩見頴叔㨿其謀畫亦恐虚行今邉臣惟務留兵朝廷無肯任咎悠悠頴叔如大計何必在内外協心休戚齊慮乘邉隅之粗閒極夙夜以疚懐儻詳利害之原猶有異同之論斷之欲獨當繫聖裁頴叔此行每事乞明與處分凡于冗費深加裁減如恐其勢輕事難獨任或推選近臣一員承命而往其陜西四路部署乞各賜一詔書諭之此意使與頴叔公共詳議所有陜西轉運使亦乞察臣前言早賜别行擇任寳元初陜西經畧安撫使夏竦陳邉事十策狀曰今月八日陜西安撫使天章閣待制龎籍等到府奉傳聖㫖商量西鄙事宜者竊以繼遷一族本党項遺類居呼韓舊地東薄銀夏西至靈鹽南趣鄜延北抵豐會迤邐平下輻員千里太平興國中繼遷逃背鳩集萬騎屢寇朔方嵗發兵夫送糧旱海邀險肆掠為害不一至道初特遣洛苑使白守榮等率重兵䕶糧四十餘萬遇寇浦洛河兵夫潰走自相蹈藉糧卒並没守榮等僅以身免朝廷旰食闗輔騷然太宗皇帝召宰臣議之吕端始欲發卒由麟府丹鄜延環慶三路趣平下襲其巢穴太宗難之且曰三道深入用甲卒幾萬何人為將帥何人䕶輜重表裏沙磧何處會合須更熟籌不可輕舉是時邉患方深議者不已至秋遂命李繼隆出環州丁罕出慶州范廷召出延州王超出夏州張守恩出麟州五路趣平下竭内帑之國財罄闗中之民力繼隆與丁罕合行十數日不見賊張守恩見賊不擊相繼引還王超范廷召至烏白池以諸將失期士卒困乏而回此際先臣𨽻扵廷召備見輕舉之害然是時繼遷當兄繼捧入朝之後為曹光實掩襲之餘遁逃之迹窮蹙可知涼州潘羅支沙州曹延禄皆受朝廷節度使犄觕追討靈州河外大涼小涼河西北臧才等數十大蕃族皆有讐怨願助國討除尚猶累嵗積年不能撲滅太宗又問宰臣曰卿等莫别有擘畫當時宰相但錯愕莫之能對太宗亦不悦久之先皇帝即位鑒追討之弊愍闗輔之勞唯戒疆吏謹烽堠嚴卒乘來即驅逐去勿追捕嘗出陜地圖自指山川堡塞示宰臣令移兵簡費又以涇原地最要害屯兵且衆命增置鈐轄都監以備奔軼此實先帝之聖斷逺圖也然拓拔之境自靈武䧟没之後銀綏割棄以來假朝廷威靈聚中原禄賜畧有河外役屬小蕃徳明元昊久相繼襲貿易華戎捃剥財用拓地千餘里積貨數十年較之繼遷勢已相萬其於妄作名器僭製車輿姱咤㫋廬跳梁沙幕亦有日矣朝廷付以一方置而不問芻豢過飽猖蹶遽彰所宜誅夷以塞公議然而兵者凶器戰者危事聖人不得已而用之自昔兵家皆欲先勝後戰則舉無遺策以繼遷窮蹙比元昊富實事勢可知也以先朝累勝之士較當今闗東勇怯可知也以興國習戰之帥方㳂邉未試之將工拙可知也繼遷逃伏平夏元昊窟穴河外地勢可知也若分兵深入則軍行三十里自齎糧糗則不能支久須載芻粟則難扵援送師行賊境利於速戰儻進則賊避其鋒退則敵躡其後晝設竒伏夜撓營柵師老糧少深可虞也若窮其巢穴須渡大河既無長舟巨艦則須浮囊挽綆茍賊列寨河上以逸待勞我師半渡左右來攻未知何謀可以捍禦臣以為不較主客之利不計攻守之便議追討者是謂無策若繕完壁壘脩利器械約束將佐控扼險隘但輙過扵嵗月不豫計扵勝負是今之常制也則慮體分勢異衆力不齊曠日持久軍食難繼事不先定則有後憂若威以文誥格以干羽勝決帷幄師行衽席必有成算繫於前籌此非臣之可及也臣今但有十策十事列上如左一今之闗塞延安險阻秦州地逺易為控扼所最憂者涇原次則環慶涇原莫急於慶州戎人狡猾必不肯舍平易而趨險隘此敵情之易料也古之用兵皆擇其精鋭先當矢石謂之握竒跳蕩是為竒兵其次疲軟則以守城壁近年之弊强弱兼用强為弱累戰多無功又中國長技莫先强弩近年之弊參以他兵不能專用已長攻彼之短今若令涇原環慶兩路各於土兵禁兵或弓箭手内擇弓刀槍槊手三二千副之涇原令高繼嵩張亢主之環慶令劉平趙振主之日夕訓練常如寇至如有警急則令自涇原界望環慶路横絶邉儌數百里間往來交擊互為首尾𫝊矢持滿俟中而發一發萬矢三得一中則十發之矢以殪三萬餘人敵軍當此不易支也仍乞立為强弩指揮特升兵額稍增月給以震軍聲以壯士志但恐賊界聞此有謀必不敢容易窺塞其偏禆將校道路堡塞並委劉平等臨時選擇處當此實制勝之大端也二縁邉熟户號為藩籬除延州李金明胡繼諤二族與賊世讐受國厚恩勢必向漢自餘熟户如二族者十無一二羌戎之性貪利畏威若不結以恩信憚以威武而欲倉卒驅之禦敵漢强則助漢賊盛則助賊必矣其明朱滅臧等族又納質賊境居既首䑕戰必倒戈元昊窺見此隙所以勾招引致脅以鋒鏑誘以貨財國家非不知其若此所宜速見良畫深破賊計及早羈束以固藩籬此西陲之急務也臣前後累狀陳啟未䝉開可伏乞采臣前奏下臣勘會逐州部族首領量人馬事力授以職名第給禄賜蕃官俸料至微所費不厚若控制有宜得其死力則為利至大或其間向漢不堅即令重納有力量質子或有自恃兇强招撫不至者則令劉平等非時伺便以强弩屠其種落此策若行足以破賊計而張國威也軍志云先人有奪人之心伏乞觀此事機早賜裁定三甘涼首領河西大族繼遷賜爵之後徳明承襲以來仰恃國威吞噬畧盡回鶻吐渾去朝廷地逺難收其効唯有吐蕃與賊世仇角厮羅住宗哥對賊巢穴蝦氊來􅼑心據賊上㳺臣累奏乞詔角厮羅進討破賊之日許以西平之封授二子靈夏節制又乞遣使􅼑心撫存蝦氊令父子和協共力破賊未奉回㫖竊慮議者以為元昊既破地入吐蕃則角厮羅勢大復生一敵此議乃計之不熟者也平下逆黨習於刼掠吐蕃雖衆兵技不敵但欲使且牽賊勢必未能盡平狡穴若此際不收實效而徇空言非國家之利也伏乞采臣前奏早賜指揮先朝潘羅支充靈州西面都廵檢使尚欲蠻夷相攻遥制遷賊況今厮羅向化父子受官不於此時遂其忠憤差之毫釐深可惜也若前議得行必恐昊賊未敢輕離巢窟伏乞聖鑒深察此議四陜西四路兵甲不少但地有險易路有逺近寨柵有多少軍分有勇怯易防處合減兵難守處當增兵兵之增減即須察其險易量其逺近計其城寨均其勇怯使各盡其宜朝廷去邉陲逺但因逐路所乞差發士卒所以臣前後累奏乞均匀加兵今來伏䝉朝㫖許令那移駐泊尚慮邉臣占恡甲兵鮮克公共方今西鄙唯涇原環慶最須備禦其兩路犬牙相入烽候相望分之則勢孤併之則勢大物理之常也欲乞劉平罷鄜延安撫兼涇原總管所貴表裏相助首尾相應張大軍勢壯勵士心亦防邉之最要害也五設使元昊謀犯邉境量其事勢豈能四路俱來必是擇一平易路分併兵衝突其餘邉界即分三二千騎往來出沒牽制我師此賊計之可前料者也今來㳂邉兵馬總而計之數亦不少若各守路分則不足互相策應其最近者雖朝㫖許令互相照應切恐緩急邉臣執守文義不肯分兵相援欲乞朝廷詳酌特降指揮有賊馬犯邉令四路互相闗報分兵策應鄜延可以策環慶秦隴可以策涇原若此則㳂邉勢合軍聲大振是計儻行固足以預制狂賊也六元昊旅拒已來陜西加兵所費糧餉不少尚賴累年闗輔大稔易為計置今夏稍旱二麥薄熟粟豆苖晚秋成未克設使元昊復稱臣納欵㳂邉亦未敢班師若宿兵塞上邉稼不豐持久之謀未知安在所以臣前奏乞令陜西諸州各招置神虎保㨗等軍各一兩指揮令逐州訓練精熟却乞那移闗東兵馬歸回有警急則令逐州量留士卒外並勾赴邉臣一則闗中土兵勁悍耐於馳騁二則減省㳂邉芻粟三則可為悠久之計七闗右㳂邉舊俗輕悍喜為寇賊山林深阻難為搜捕加以近邉蕃户以藏盜為業若敵犯邉人情恐動或飛輓稍頻丁夫逃潰互相扇摇聚而為盜闗中官司不可不預為之計也咸平中陜西轉運司曾抄㸃保毅軍六萬八千餘人防城備邉今來西陸安静多年若遽行此法則恐人户驚擾别生寇劇前奏乞添置弓手三兩倍及乞置壯丁獵户緩急可以防守城壁把截要害却那得正兵出入野戰此實今之萬全也朝廷檢詳前奏早賜行下付臣當司差官添置候賊平日却即罷遣一則不費供饋坐獲其用二則不動羣情易為辦集比㸃保毅軍及抄弓箭手利害相萬也八㳂邉小寨多是曹瑋建置常時預備讐賽防遏逋逃似有小利羌戎入寇則難於處當分兵固守則州郡勢危守禦不定則所蓄芻粟翻為寇糧又逺近傳聞亦是亡一城寨滋益賊氣且損軍聲欲乞宣㫖㳂邉總管司勘會小寨有兵少糧多不係要害先支㳂邉廵檢等軍馬就食盡糧草所有小寨逐月廪給却令就大寨旋請如有大叚警急勢必難敵則令併小寨士卒入大寨把隘相殺一則免資寇盜二則併得兵力於要衝之處以衛奔衝九方今備邉之計最宜積榖故趙充國云糴三百萬斛榖羌人不敢動矣況闗輔税租有限嵗時豐儉難常若猝調兵食急賦横歛則秦民輕悍咨怨易興此不可不預計也近者有詔入粟拜爵須是巨富之民方能佐縣官之急欲望朝廷詔闗中州縣有犯過誤連累之罪情願収贖者許令召保於㳂邉諸郡入粟贖罪每銅一斤准粟五斗良民救患何止樂輸諒不踰年塞下之粟必稍充羡寛宥過誤全民膚體足以上副陛下至仁之徳又慮議者以為國家全盛之際不當貨刑示弱此議亦思之未切也且爵者名器尚許拜授若寛刑赦過得粟便民比之拜爵此為優矣十候教習勁弩指揮招置土兵添差弓手各有次序即乞委自當司差官揀選㳂邉冗兵於近裏州軍及減騎軍回闗東仍省㳂邉閒冗吏員古者將帥授命於朝皆假之威權許以便宜使以盡力今來朝廷儻采所陳令集西事則乞特依古制借以銜勒令竭疲駑仍乞指揮諸路總管司臣寮今後每事遵禀安撫司指揮不得怯懦自謀妄説事理聞奏上惑聖聽如有寇賊奔衝並須出兵守險持重伺便痛行殺戮不得恃城玩寇放過賊馬令入他處如違以軍法處分如此令行下則邉防畏懦之臣預謀戰闘不敢只作守城自全之計右謹具如前伏以國家富有四海重熈累洽物力全盛忠賢間出昔魏有一段干木晉人不敢窺西河江左有一謝安苻堅䘮百萬之衆以此計之蠢爾羌戎豈敢輕犯邉境但元昊資性兇忍輕背國恩鬼得而誅滅亡可待未授首間朝廷之議不得不過為備禦然賊境最多姦人盡知縁邉虚實料其逆黨聚謀必須潜闚間隙方敢作過若國家處置得宜任人不雜使陜西内外城邑戰守有備元昊豈敢容易輕離巢穴自取敗亡況闗塞防秋古今常事傳云無恃寇之不至恃吾有以待之此言誠得守邉之要也頃繼遷亡没徳明尚㓜族中親屬强梁者衆徳明甚懼愴惶送欵當時有司不能裂河南之地封拓拔諸親令其勢分間起自相殘賊而乃併錫眞命授一孽童數十年間禄賜豢養資寇糧者多矣至今義士為之歎惋是知此際巖廟裁處不可不深圖逺算也臣素業刀筆不諳軍旅昨䝉推擇付以西事雖繼陳方畧多以迂闊不合廷議進退維谷憂駭可知豈謂天慈更容訪逮拜恩瀝懇敢不自竭其所陳十事實臣在職見聞夙夜惟忖心慮所及咸罄扵是伏乞聖慈下兩府裁酌如稍近扵理即乞特賜詳擇施行敢不䖍奉徳音漸圖逺績然而成大益者有小害獲逺利者無近効方今許國者多言事者衆或不周知利害别議建明事未成間遽有更改則邉臣之計惑矣此則須賴陛下倍賜主張勅左右大臣專主斯議自古内外相維則有成績羊祜杜預非張華主之則不能平吳石雄劉沔非李徳裕主之則不能平上黨布在方策較然可知若臣所陳庸昧不逺前談徒煩聽聰無足采録即乞早選能吏代臣經畧西事别詢竒畫免誤公朝矧將者三軍司命國家安危之主不可一日輕付常才忽於大計若西陲失備則他寇相因伏乞朝廷深賜哀察干冐宸嚴臣無任祈天瀝懇激切之至謹録狀陳竦又論復塞垣進策曰臣聞匈奴以北有隂山草木茂盛冒頓依阻寇虐中州漢奪其地邉用少安匈奴過之未嘗不泣夫有一隂山猶資敵勢況衰晉不武盡割燕地幽薊雲朔良田沃野以之畀敵得無彊盛由茲外域轉為邉患故國家懐之以文而不庭加之以武而不至要之以盟而無信賂之以貨而無厭憑陵我邉鄙虐害我生靈自邇以來為患非一盖不復塞垣而勞捍禦猶張踈羅以隔蚊蚋秦趙築長城漢築五原塞因其山谷設為險阻先代之勞後王之利不惟經畧有方兼使華夷有限應變無壅深詳其理夫為萬世之畫削外敵之勢莫若復漢故地外錮塞垣復地之謀必資良畫誠當計其寇敵選其將帥明其兵政謹其邉防制其閫外皆如所言然則陽示畏弱隂整用度命將領之臣修李牧之法訓兵利器明賞信罰按行營壘親視疾病膏之以恩惠勞之以言辭同其苦樂和其上下整其騎乗名其等列習其擊刺養其勇鋭於是豐其金帛隂遣五間訪彼山川紆直之勢察彼將助好惡之性相其機而觀其變因其釁而發其謀疑其君臣焚其積聚優寵降附撫綏邉境令幽薊之民積思漢之心匈奴之臣有叛主之計乃選一良將為之謀主隂勒士馬出其不意夫今之邉界距塞垣裁二三百里匈奴入中國之路不過四五及其險隘不闊尋丈若分竒兵之甲杜薊門之路出并代之弩守蜚狐之口然後正兵數道攻城畧地先平小邑以沮其氣次克大城以觀其變敵人不善嬰守救兵無路而至幽陵朔易不降即潰乃命良臣以葺完留飛將以扞禦復修亭障遵漢舊規則牧馬之塵罕能南暨矣竦又論謹邉防奏策曰臣聞防邉扞寇其要有四逺烽候明約束謹闗梁慎間諜逺烽候則寇抄不至明約束則守禦不怠謹闗梁則姦覘不行慎間諜則敵情可得不知烽候約束之道者不能無禦敵之患不知闗梁間諜之事者不能有得敵之利善守邉者令敵不知所攻掠奸不知所刺探敵動静之計進退之期山川之勢法令之制知之而後制之譬如乗高建瓴方今邉邑使領循守規轍政無竒狀以警寇心晝日喧呶唯喏昏夜傳呼更漏暇則飲醊餚觴急則施陳甲馬寇至則扃鍵城郭受圍則坐食芻粟内無竒兵外無相援四野蒼生任為魚肉以此守邉殆非良畫誠宜選任梟雄列分逺鎮堅甲精金匀扵給授寇來勿縱敵去勿追仍任偏禆經絡邉境相為肘腋互張聲勢數年之間深務完葺是則邉民既安邉用亦足矣元昊寇延州手詔咨訪輔臣攻守方畧同知樞宻院事陳執中既上對退復奏疏曰元昊乗中國久不用兵竊發西陲以㳺兵困勁卒甘言悦守臣一旦連犯亭障延安幾至不保此盖范雍納詭説失扵戒嚴劉平輕躁䘮其所部上下紛擾逺近震駭自金明李士彬族破而並邉籬落皆大壊塞門金明相距二百里宜列修三城城屯兵千人益募弓箭手寇大至則退保小至則出闘選閤門祗候以上為塞上都監以諸司使為盧闗一路都廵檢以兵二千属之使為三砦之援熟羌居漢地久者委邉臣撫存之反覆者破逐之至扵新附黠羌如涇原康奴滅臧大蟲族久居内地常有叛心不肆剪除恐終為患今軍須之出民已愁嘆復欲徧修城池如河北之制及夏須成使神運之猶恐不能民力其堪此乎陜西地險非如河北惟涇州鎮戎軍勢稍平易若不責外守而勞内營非策之上也宜修並邉城池其次如延州之鄜同環慶之邠寜不過五七處量為營葺則科率減民力蘇矣今賊勢方張宜静守以驕其志蓄鋭以挫其鋒增土兵以備守禦省騎卒以減轉饟然後徐議盪平改張節度更須主張將臣使横議不入則忠臣盡節而捐軀矣歴代名臣奏議卷三百二十三
