body:
  text: 歷代名臣奏議卷三百十三明楊士竒等撰灾祥宋理宗淳祐六年祕書郎髙斯得日食應詔上奏曰臣竊惟日食之災固非小變其在今日尤謂非常蓋以歲言之則適在丙午國家陽九之㑹也以月言之則是謂三始前代之所惡也以日言之則朔日辛卯詩人之所醜也凶烖參㑹厥咎已彰況未食之前曀隂纍日霽於一朝譴告曉然不啻面命既食之後餘分逮暗光不及還諏之羣言良非美兆陛下克謹天戒若稽舊典豫思所以飭躬正事攬塞大異者罷元㑹而不講避正衙而不御卻夀觴而不舉復下明詔敷求盡言聖心憂勞羣下震恐臣幸以虛薄備數周行懷欲效愚久矣敢不奉詔而悉陳之臣伏覩陛下斥去魁孽更新大化以來夙夜刻厲欲以懲革曩弊改紀庶政非不至也然行之踰年課其成效茫若捕風繫影曽未有以少慰海內之望臣竊惑之大姦嗜權巧營奪服將以遂其三世執命包藏睥睨之志陛下惕然覺悟奮獨斷而退罷之是矣諫憲之臣交疏其惡或請投之荒裔或請勒之休致或議奪其麻而壞之陛下茍行其言亦足以昭示意嚮渙釋羣疑顧乃一切寢而不宣歷時既久人言不置然後黽勉傳諭委曲誨姦俾於襲經之峕妄致掛冠之請因降祠命茍塞人言抱擁存全如護拱璧夫以蔡京之去俾之謝事又削其十一官而謫之杭凡其鄉里姻婭比為死黨者如宋喬年葉夢得林攄之徒悉皆逐去不得親近人謂上意堅定不可回奪矣曽不三年復居相位窮凶極惡以階政宣之禍今罪與京埒而罰不傷其毫毛又有姦人貪其重賄怵其甘辭於密勿之際日夜乘間伺隙而隂為之地焉是以訛言並興善類解體謂聖意之難測而大姦之必還莽卓操懿之禍將有不忍言者臣竊為陛下凜凜也皇嗣未建國本久虛頃嵗以來言之者唇腐齒落不知其幾疏矣陛下始而玩中而疑終而諱焉英宗之選育也仁廟春秋二十有六孝宗之選育也髙廟春秋二十有五雖未正名號而聖意固已定矣陛下之年視二祖何如也顧優遊不斷未有專屬非玩歟羣臣立長之論雖涉乎嫌然皆發乎忠誠非有他也而陛下深怪其說非疑歟近者一二小臣論奏及此竊聞宣諭宰執咎進言之煩非諱歟自頃以來諸臣杜口矣日慆月邁罅隙不塗安知無如定陶賂遺後宫求為漢嗣者天下祖宗之天下也陛下受之將以傳諸萬世其可牽於私係而不以大公至正之心早正而素定乎大臣者貴乎以道事君者也今也獻替之義少而容恱之意多知耻之念輕而患失之心重內降所當執奏也則不待下殿而已行濫恩所當裁抑也則不從中覆而據命揣上之不嚴於絶惡也則進其餘黨而嘗試意上之追仇乎盡言也則擇其甚者而排擯嫉正而庇邪善同而惡異任術而詭道樂偷而憚勞凡其過失見於羣臣之論奏者固已不少陛下朞年之間虛心委寄所責者何事而其應乃爾無怪乎望治之勤而收效之遲也臺諫者所以主持公是者也祖宗之時言入輒行無所回撓將以養其氣也比日以來厭其強聒求以箝之乃有所謂宣諭者焉權凶逸罰交章請罪則諭止之扈帶私授抗疏論列則諭止之且陛下以此官為何官耶蓋明目張膽立於殿陛以與天子爭是非可否者也顧可諭止之與諭之其可止乎王十朋有言紹興末臺諫奉行天子風㫖有宣諭使言者有宣諭不得言者臺諫之職言不行則去其可受宣諭乎臣謂今日之病何以異此摧其氣挫其鋭則精神風采亦日銷月鑠而已矣陛下果何便於此侍從者所以論思獻納補闕拾遺者也祖宗以來搜攬俊乂列布禁塗朝廷一有闕失言語議論之臣交唱迭和圗惟正救是以事無過舉今也班聮寥落虛位孔多職業隳廢氣象衰薾國有大事言之而無助爭之而無黨政之多粃抑此之由謂常世之士果無足以充是選乎則極論綱常一斥不復者其人也執憲端平拚除非類者其人也疏陳三漸力拄閹戚顯劾二姦肅清宫禁者又其人也若此數人漢廷公卿孰有出右者誠能聚之本朝豈不足以折羣邪而奪之氣今也或棄之而不召或召之而不力天子嚴憚而不復柬記大臣觀望而不敢薦延望實之不收乃徙謂人才乏使而目前之茍可以充數豈可厚誣哉刑賞者國之紀綱也賞公則人知勸刑肅則人知懼人主所以御天下者惟此二柄而已其可使之私且䙝乎貴介怙親第賞重復西垣駮正而遂非不省恩舊干澤汙玷郎闈瑣闥塗歸而終置不問賞不私乎近臣毒死謀出權姦國人户知賊豈難得發姦擲伏者非但失職又囊槖之典獄訖威爰書誕謾敕榜掛壁跡捕渺茫朝廷弗竟也三凶流竄令非不嚴乃有廋伏近畿狎玩國法州郡故縱曽不誰何搢紳傳言相與憤惋舜之流四凶族曽不如此刑不䙝乎兵財者國之大政也治兵莫大於謀帥理財莫先於節用淮閫巽懦擢自權姦趨向既邪緩急難倚今縱不能輟威望臣以代之見大夫之中豈無可任者遷延嵗月重於易置豈非憂邉思職者之過乎敵窺南徼事已數載邉臣父奏日駭聽聞夫敵之以斡腹誤我久矣而廟堂之上將信將疑應接常緩飭兵衛峙糗粻結邉丁撫夷落繕障塞明斥候非知兵者不能辦也乃蹈常襲故不急擇才臣以畀之萬一小夷不支北騎奄至自嶺以南無復橫草之備乃駭而圗之豈將有及之乎軍政之闕孰大於此國家版圗數年以來蕩析幾半承平用度不損圭銖譬如衰敗之家産垂盡而費如昔雖欲不困不可得已邉垂久戍饋餉日繁鹽滯楮窮國計大屈此何時也而土木不休好賜無藝白鶴新宫斧斤之聲未絶師臣賜第版築之役將興聞之道路又謂宫掖之間按明禋之舊比責幣帛於版曹貢篚之地既墟至乃輟移他幣以應命由是而推橫費侈用外庭所不得知有司所不得㑹者可勝道哉邦財之蠧孰大於此陛下臨政願治非不焦勞而如前所陳無一嗛志可不思其故歟蓋自端平親政以來號曰更化者屢矣然其所謂更化者不過下一詔書易一宰相而已至於大化之本關乎氣運之盛衰治道之隆替當更而不更者則固未知思也本者何非陛下之心乎陛下未明求衣寒心銷志見於視朝聽斷之時親近儒臣詢訪得失見於旃厦從容之際雖堯舜之兢業文武之憂勤不是過也然閭閻小人妄議聖德或謂謹獨之地立意之未誠燕閒之時窒欲之不固貨利蝕吾之明者也而不殖之戒未嚴大姦覬還私獻絡繹相位偶缺多藏交營君臣之間相覿以貨相賂以利此元靈汙濁之事豈盛世所宜有哉至於便嬖側媚之人所以熒惑耳目感移心意者尤足以為清明之纍腐夫巧譛而使傳幾搖妖㜮外通而魁邪密主隂姦伏蠱互煽交攻陛下之心至是其存者幾希矣夫陛下之心大化之本也不於是乎洗濯磨淬力思所以更之乃徒立為虛言亡實之名而謂之更化此天心之所以未當而大異之所以示警也雖然是心之非更之雖在陛下而格之則在大臣陛下斷自宸衷並建二相所以責望之者豈特簿書期㑹之故錢榖甲兵之問而已繩愆糾繆陳善閉邪蓋將以為澄源端本之地也捨是不圗而汲汲於末流豈足以為賢相哉必力定國本如韓琦挾孔光傳以悟上心而犯顔逆指非所懼必決去小人如司馬光所謂天若祚宋必無此事而挑怨蹈禍非所恤必止絶內降如杜衍之積至數十連封面還必裁抑嬖幸如陳俊卿之面質上前力去淵覿其能及乎此也則陛下從而聽之其不能及乎此也則陛下以此望之庶乎言動造次交警迭規涵養薰陶潛感密悟必使人主一嚬一笑之間無往而不中其度焉夫如是而後大臣之責盡大臣之責盡而後陛下之心正陛下之心正而天下之事始可次第而理矣孟軻曰君子之過如日月之食人皆見之及其更也人皆仰之陛下誠能銷變弭殃以彰更化之盛則孟軻所謂更者盍亦反其本矣臣西南寒儒頃以庚子冬雷應詔上封事乞陛下擇才並相以是忤史嵩之流落三年不自意得逄陛下更新大化再玷周行目睹嵗旦日食之異敢不奉明詔吐其強愚狂瞽干誅惟陛下幸赦十二年斯得為祕書少監兼侍立修注官進故事曰李丞相沆每朝謁奏事畢必以四方水旱盜賊不孝惡逆之事奏聞上為之變色慘然不恱既退同列以為非問丞相曰吾儕當路幸天下無事丞相每奏不美之事以拂上意然又皆有司常行不必靣奏之事後告已之公不答數數如此因謂同列曰人主豈可一日不知憂懼也若不知憂懼則無所不至矣臣嘗觀唐虞盛時大臣進說其君雖平居無事未嘗不存警戒之意蓋人主不可一日無懼心而保持是心使久而不怠則大臣之責也禹臯陶論治於舜之前舜進禹使之昌言禹不及其他獨舉前日洪水滔天浩浩懷山襄陵下民昏墊者以為告禹豈自伐其功者哉蓋將以保帝舜洚水警豫之心使之不忘一日之懼所謂昌言莫大於此後世大臣鮮能知此義者惟漢魏相粗有見乎此相敕掾史案事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之夫宣帝之時吏稱其職民安其業亦可以言治矣相乃常以逆耳之事告其君使之知所警懼不敢安逸可不謂賢乎我國朝名臣李沆相真宗皇帝每奏事畢必以四方水旱盜賊不孝惡逆之事奏聞上變色不恱同列皆止之而沆不為止且曰人主豈可一日不知憂懼若不憂懼則無所不至矣嗚呼沆之此言真可謂得大臣之體矣雖周公作無逸以戒成王何以過此且咸平景德乃國家至隆極盛之際而為宰相者不以已治安為足方以警戒無虞為心用能弼我祖宗丕丕基傳之無窮而施之罔極豈非萬世宰相之法哉臣竊見比者江浙閩中諸郡同日大水流殺人民動以萬計中外一辭謂非小變然大臣恬然視之未聞有孳孳汲汲推原致異之由圗惟弭災之䇿為陛下力陳之者一二廷臣不得已而有言亦人臣願忠職分之常耳頗聞惡其強聒指為張皇抑何居其位而不知其任耶夫魏相李沆居天下無事之時而喜言災變之事今日大臣當大異較炳之後而惡言災變之實豈以陛下不樂聞之而顧望以至此乎臣願陛下虛懷訪逮示臣以喜聞警戒之意如舜之進其臣使之昌言庶幾自今或有變異有以開廣上心博采人言共圗銷弭之術宗社幸甚斯得又上奏曰臣待罪蓬山録録無補陛下過聽擢之攝承記注辭不獲命日夜思惟所以稱塞者就列之初適覩國家有非常之異職分所在敢不皇皇汲汲即為陛下言之臣竊見六月以來饒信衢婺台處嚴陵建寧南劒邵武諸州同時大水敗壞官寺屋廬流殺人民以千萬計父老咸謂數十百年所無此非小變也陛下可不惕然警懼推原致異之由求以攬塞之乎臣觀漢儒言災異謂有某事則有某應皆為必然之理故人或不之信然本朝大儒程頥蘇軾朱熹以為感應之理甚精其說不可盡廢廢之則人主忘警戒之心臣今采托漢儒所論水災之應驗諸當世行事蓋真有若合符者試校舉而陳之漢儒謂政令逆時則水失其性霧水暴出百川逆溢壞鄉邑溺人民今盛夏之月土木橫興毁徹民居妨奪農務窮晝極夜不得休息百姓以其愁苦之氣薄隂陽之和感天地之精致異招殃莫大於此舉動逆時如此水安得而不應乎漢儒謂辟遏有德厥災水水流殺人說者謂辟君也人君壅遏有德使不見用則水災應之今在外之臣固有嘗攖逆鱗一斥不復者有顯劾權姦久而不召者當此侍從卿監班列一空之際悉招徠之以補其處可也而宿疑未化開悟惟艱至於詔㫖所趣命召所加則不過一二朋邪貪刻之人而已有德壅遏如此水安得而不應乎漢儒謂道人始去湧水為災道人者有道之人也今陛下招延衆正列于有位天下方以慶歷元祐之治望之而因一小人輕蔑學校使師儒望士力爭而去若不甚惜比日以來復聞小人有欲陷正臣以變時事者一網盡去有其兆矣善類孤危如此水安得而不應乎漢儒謂誅罰絶理厥災水其水也雨殺人今陛下寬仁出於天性而草茅扣閽或觸黥𨽻之辟事謂創見聞者驚疑至於州縣之間寃獄孔多而輔郡殺士尤其著者道路流傳莫不切齒內外臺臣以其肺腑噤莫敢言陛下深居九重亦嘗知其事乎乃若誅罰所當加者莫垓滎若也則反擁護存全不傷毫髮刑罰絶理如此水安得而不應乎漢文帝後三年藍田水出流九百餘家壞民室八千餘所殺三百餘人漢儒謂是時胸奴犯北邉殺略萬餘人故有水災之應往嵗之冬寇入淮西大掠而去其所殺者奚翅萬人創殘之餘民氣破傷官吏侵漁寃苦無告邉民失職如此水安得而不應乎元帝永光五年大水壞鄉聚民舍及水流殺人漢儒謂是時帝違古制刑臣石顯用事故有水災之應比年以來刀鋸之餘氣焰日盛士大夫無耻者赴壑投林倚為內主而都邑瑣細之訟亦復漁獵以瀆聖聽發命不衷吏道多雜職此之由刑臣用事如此水安得而不應乎凡此六者非臣臆說質之往牒考之時事信而有證至不誣也陛下安得視為偶然而不亟圗所以銷弭之乎今避殿減膳罪已求言既寂無聞所下寬恤詔書辭氣平緩殊無哀恫惻怛之意二府引咎歸政之虛文猶不知改至於處置救災恤難之事若存若亡未聞有慨然以納溝由溺為己責如救頭然而圗之者此臣之所甚惑也程頥有言天地之間有感必有應所應復為感斫感復為應今災變如此忽而不圗臣恐感應反覆殆無終窮不至於大傷敗不已況隂盛陽微蓋昭然為兵革盜賊小人將起之證而於五勝之運又我國家之所甚惡者乎臣願陛下深思天戒采用臣言亟下求言之詔博求塞異之方必先罷新寺土木必速反忤㫖諸臣必遏絶邪說主張善良必謹重刑辟愛惜士類必加惠邉民救其死亡必抑逺幸臣絶其干撓信能行此六者不惑不疑則天怒庶乎其可回和氣庶乎其可召矣雖然臣復有愚見懷欲吐露已久今天時人事如此其敢復有隱忍不為陛下言之臣觀漢成帝時災異至衆劉向告以銷弭之術始終不過以和為言其論治世之事曰衆賢和於朝萬物和於野曰朝臣和於內萬國歡於外曰諸侯和於下天應報於上其論衰世之事曰幽厲之際朝廷不和禍殃自此始曰朝臣繆戾乖剌災異數見蓋反覆言之至為深切而又以和氣致祥乖氣致異之說終焉若向者亦可謂善言災異矣今陛下更新大化厲精思治所望於二相者何如也協恭和𠂻訓誡勉厲非不諄切奈何纎芥之隙不杜佩劒之風浸成讒人交亂其間將至不可復合夫佐人主燮調隂陽何等職分顧不以稷契臯夔濟濟相遜者自勉而甘心於衰世背戾之風然則乖氣致異涌水為災二相安得不任其咎乎臣願陛下因天災之可畏明以利害申諭二相使之各棄細故戮力一心以濟國事以回天意二相和則衆賢和衆賢和則萬物和如此而猶有變異以為明主之憂臣不信也臣憂愛之深愚戇妄發惟陛下幸赦斯得又上奏曰臣伏覩御筆以諸郡水災分命朝臣體訪被災輕重布宣德意且令有司給降錢米賑濟仰見聖天子憂念元元不皇寧處之意然臣謂近年以來所在常平義倉例多羽化況當水毁之後儲蓄抑又可知若令有司專仰此以充賑給必成文具竊見仁宗皇帝慶歷八年河北水災特出內藏庫錢帛令三司轉漕斛斗賑贍嘉祐元年河北復被水出內藏庫絹二十萬匹銀十萬兩賑貸神宗皇帝熙寧元年詔三司支錢五十萬貫賜河北轉運司應副水災諸州支用以免科擾民間孝宗皇帝乾道元年浙東西水災蠲免百姓身丁錢絹於內庫紐支撥還戶部以充軍用祖宗愛民之切於有司賑給之外又捐朝廷內帑錢物以助之實惠及民不為空言所以人心感恱天意易回雖然此非特祖宗已然之事亦陛下之所親行者紹定二年台州大水命常平使者葉棠移治經理發豐儲倉米十萬石封樁庫錢五十萬貫以充賑濟修城之用是時楮價四倍於今計五十萬為今二百五十萬視三祖所捐蓋有過之今被災之地既廣舊比固當悉援然亦安可漠然視之而徒責之諸司州郡乎臣竊料陛下痛傷赤子死亡未必不欲捐緡賑之特大臣每事蓄縮逆畏陛下或有所靳而不敢言耳且紹定賑台之事彌逺猶能行之曽謂二相之賢而獨不能為之乎夫居鈞軸之地遇國家大災變拘文牽俗躊躇顧慮不能稍稍度外行事以慰天下之心而曰國力方屈吾為朝廷惜費殆不得為知務矣臣謂三使者之行當各以二三百萬緡自隨所至的度被災輕重均濟近郡又當兼給以米庶幾實德宣布可以轉災為祥朝廷每造一宫建一寺其費動以數千萬計若捐百之一二以活十州數百萬生靈之命其為福田利益蓋有大於宫寺者矣陛下若以臣言為可采伏乞睿㫖降付三省疾速施行景定五年斯得為祕書少監以彗出應詔上言曰臣伏覩七月六日詔書以彗出栁宿許中外臣僚直言時政缺失者臣一介妄庸受性愚直淳祐末祀䝉陛下擢二蓬省攝承記言竟以遇事妄發得罪而去已而朱熠沈炎何夢然之徒相與捃拾坐廢十年自分此生永訣聖代無復一言關于陛下之聽矣不謂垂死之年乃承罪已之詔諄勤懇惻導之使言臣目睹皇天震怒大禍將至其敢畏避權勢不聲其所懷以負聖明謹瀝血忱以羣臣所必不敢言陛下所必不得聞者為獻惟陛下幸聽臣謹按國史徽宗皇帝崇寧五年正月戊戍彗出西方光芒長十餘丈徽廟大懼日進蔬食每夕焚香涕泣至數百拜星沒乃止於是慨然深照蔡京之姦不由人言奮自威斷即日罷其左僕射凡京所為政事一切罷之除毁黨碑凡元祐姦黨指揮二十項悉從蕩滌停補役住方田廢三衛徹圜土更學法復科舉罷後苑製造蠲六尚貢物以至茶鹽錢法並詔户部議改內外百姓歌謡鼓舞溢于塗巷近世以來以實應天精切勇猛未有過於此者後嗣安得不取法哉陛下數年以來專任一相虛心委已事無大小一切付之果得其人宜乎天心克享災害不生禍亂不作矣而庚申以來大水為災浙西之民死者數百千萬繼以連年旱暵田野蕭條物價大翔民命如線景象急迫至此極矣今又重以非常之異妖星突出光芒竟天夫栁為鶉火火者國家盛德所在而彗出焉其變不小若非朝廷政事大失人心則何以致天怒如此之烈乎臣請得而枚數之祖宗立國一本忠厚大姦巨蠧始加流竄今也大臣輕於用之以怖異己庚申辛酉之間大小之臣追停遷放無月而無威則立矣如斫喪祖宗忠厚之澤何士大夫以仕進為業者也今使刻薄小人吹毛求疵控持扼塞動觸新制進退無門旅困顛連有厯二三嵗竟不得一闕而去者又使輕鋭少年數人日夜改七司法煆煉增加自薄趨薄惟恐一人之得進然但能困孤寒耳至已所欲與則雖碌碌下流超資越序而無所忌憚也人才難得自古而然並蓄兼收猶懼乏使今也以意向為用舍以黨類為去留自非素出其門皆棄不録遂使懷才抱藝之士沈廢流落咨嗟憤怨有錮人於聖世之恨豈不足以傷隂陽之和乎古之大臣皆以下士為賢吐哺握髮未嘗少懈所以通達下情搜攬人物共濟國事也今不務師古妄自尊大有造光範如謁鬼神越月逾年竟不得通雖有竒才異能何以自見凡此數者皆為陛下失士大夫之心者也自井田既廢養兵之費皆仰稅租漢唐以來未有能易之者也今也騁其私智市田以餉自謂䇿略髙妙前無古人陛下知其非計嘗欲罷之有秋成舉行之命彼悍然不顧也白奪民田流毒數郡告牒棄物不售一錢遂使大家破碎小民無依米價大翔飢死相望有司尚謂田惡日更月易無有已時姦佃乘之咸叛其主識者謂異日浙西有亂必自公田始不特若此又四出虎狼之吏使之磨牙張吻啖咋良民柯山一閧逺近為之震驚苕水三貪朝廷之所妙選史越翁到郡數旬而聚斂至三百萬椎剝之慘不言可知朝廷鋤去黥吏本以愛民也不知反以害民一吏就擒視為竒貨株連枝蔓殃數十家得錢數百千萬而猶未已質妻賣子破産亡軀哭泣載塗臣所親見堂堂天朝而甘為破落州縣攤賴之舉凡此數者皆為陛下失畿甸之心者也江漢上流國家重地中興以後簡畀名臣彈壓撫摩未始偏廢今也舉而付之一夫容養姑息如奉驕子頥指氣使求得欲從斬劓殺伐遍於湖廣監司守令畏懾而不敢爭使陛下創殘遺民淪墜湯火而莫之救江西湖北嵗糴給錢其來已久今亦半給告牒人情寧不洶洶以至市舶盡利而蕃夷怨鹽法苛急而商賈怨比日以來復聞廣寇贛盜相挻而起凡此數者皆為陛下失逺民之心者也然此特臣田間所知萬分之一二耳淮海以西嶺蜀以東千萬人之怨又奚止是哉陛下所恃以有天下者人心而已今大臣盡失之則其相與愁痛號咷哀籲上蒼産妖鍾孽以警悟陛下以昭示危亡又何足怪哉況近嵗以來天生柔佞之徒布在世間立人本朝惟知有權門而不知有君父或稱其再造王室或稱其元勳不世或直以為功不在禹周公下虛美溢譽日至上前熒惑聖明掩蔽罪惡遂使陛下深居九重專倚一相髙枕而卧謂如泰山四維之真可倚不知其下失人心上招天譴乃至於此豈非羣臣附下罔上之所致哉陛下試觀五年之間廷紳奏疏不知凡幾千百亦有一語事關廊廟者乎意之異已者盡斥位之逼已者盡除上自執政侍從下至小小朝紳無一而非其黨雖學校諸生亦復數年噤無一語言路久已荆棘所以養成大臣橫逆之氣人怨天怒不至於彗出不止也且災異䇿免三公漢唐以來視為常事丙申雷變陛下亦嘗奮發剛斷一日而罷二相今彗星之應至不忍言豈雷發非時之比况人心皇皇萬口一辭皆指其人獨陛下不悟耳且后妃之家不得為執政官仁宗皇帝之著令也政宣犯之終至禍敗陛下違仁宗之令典蹈政宣之覆轍固已不合天心久矣今遇非常之變而又不思改圗則亦何時而覺寤哉臣恐自今上天不復譴告而傷敗旋至矣臣忠憤所激不勝大願陛下取崇寧彗出故事反覆披覽力見施行因大臣求退而亟許之取庚申以來一切刻薄害人之政即日罷去申嚴仁宗著令為子孫萬世之法而又盡滌聖心力行好事收召真賢昭洗寃魄以答天心以慰人望如此十日而妖星不滅則寸斬臣以謝大臣以戒狂妄臣不敢辭干冒天威不勝震懼之至淳祐十二年國史實録院校勘湯漢以大水應詔上奏曰君心敬肆之分實上天喜怒之由一念之敬上帝臨女祥風慶雲所從出也一念之肆上帝震怒妖祲隂沴所從生也又火災應詔上封事曰臣聞任天下之大立心不可不公守天下之重持心不可不敬陛下膺皇天之眷命受祖宗之寶圗則不當懷私恩為天下共主為億兆寄命則不當隆私親大臣邇臣服休服采皆陛下所倚仗也則不當信私人三省密院皆陛下之朝廷發號布政所從出也則不當有私令四海九州土宇版章皆陛下之倉廪府庫也則不當殖私財陛下於皇天祖宗之德弗永念而報答私恩於羣黎百姓之疾苦弗深恤而冨貴私親公卿在廷其信任不若近習之篤中書造命其施行不若內批之專則陛下之立心既未能盡合乎天下之公矣往者陛下上畏天戒下恤人言內則拘制於權臣外則恐怯於強敵敬心既不敢盡弛則私意亦未得盡行比年以來天戒人言既已玩熟而貪濁國柄黷貨無厭彼既將恣行其私則不得不縱陛下之所欲為於是前日之敬畏盡忘而一念之私始四出而不可禦矣姑以近事迹之定䇿之碑忽從中出鄉未欲親其文也貴戚子弟參錯中外鄉不如是之放也土木之禍展轉流毒訟牒細故胥吏賤人皆得藉群璫之勢徹清都之邃鄉不如是之盛也御筆之出上則廢朝令下則侵有司鄉不如是其多也賄賂之通書致之操鄉不如是其章也故凡陛下之所以未能任大守重而至於召怨宿禍者始於立心之未公成於持心之不敬私以為主而肆以行之此所以感動天地而水火之災捷出於數月之內也陛下得不亟為治亂持危之計而可復以常日玩易之心處之乎理宗時考功郎官趙景緯以彗出于栁應詔上奏曰今日求所以解天意者不過恱人心而已百姓之心即天心也錮私藏而專天下之同欲則人不恱保私人而違天下之公議則人不恱閭閻之糟糠不厭而燕私之供奉自如則人不恱百姓之膏血日朘而符移之星火愈急則人不恱不公於已而欲絶天下之私則人不恱不澄其源而欲止天下之貪則人不恱夫必有是數者斯足以召怨而致災願陛下捐內帑以絶壅利之謗出嬪嬙以節用度之奢弄權之貂寺素為天下之所共惡者屏之絶之毒民之恩澤侯嘗為百姓之所憤者黜之棄之擇忠鯁敢言之士置之臺諫以通關鬲之壅選慈惠忠信之人使為守窣以保元氣之殘又必稽乾淳以來凡利源窠名之在百司庶府者悉𨽻其舊以濟經用之急公田派買不均之敝聽民自陳隨宜通變以安田里之生則人心恱天意解矣人之常情懼心每發於災異初見之時不能不濳移於諂諛交至之後萬一過聽左右寬譬之言曲為他說以自解毛舉細故以塞責而恐懼之初心弛則下拂人心上違天意國之安危或未可知又曰損玉食不若捐內帑卻貢奉之為實避正朝不若塞幸門廣忠諫之為實肆大眚固所以廣仁恩又不若擇循良黜貪暴之為實蓋天意方回而未豫人心乍恱而旋疑此正隂陽勝復之㑹眷命隆替之機也將作監袁甫上奏曰臣仰惟陛下祗畏天威益隆聖德因風雨震淩之變惕然恐懼以避殿減膳為未足乃親灑宸翰布告中外俾小大臣僚咸以直言來上聖心篤切已足上格穹蒼矣臣昨厠從列兹叨祠廪目擊變異痛心疾首雖抱沈痼屏處衡茅其敢以是為解而不思所以仰答清問是用披瀝肝膈粗陳管見惟陛下少垂聽焉臣聞聖帝明王之世天道順於上地道寧於下故無疾風苦雨之災無地震水涌之變此皆盛德感召之所致也而自今夏以來地震屢矣乃七月七日白虹夜見虹颶母也越二日而颶風挾雨大肆威虐人皆曰颶母之見此先兆也臣則曰先兆之見不在乎白虹垂象之時而已著於地震示變之日記曰地載神氣神氣風霆風霆流形庶物露生且夫天氣下降地氣上騰於是乎風霆流形發生庶物斯其所謂神氣者歟夫何神氣之發育乃反為人物之殃不為祥風甘雨乃轉而為災為沴殆有甚可怪者焉土宇者所載之神氣也今則漂蕩室廬矣民人者所載之神氣也今則傷害民命矣物産者所載之神氣也今則垂成之稼掃地無餘一飽無期餓莩將見矣地震兆其端而颶風煽其毒是其咎果安在歟夫地載神氣而聖人之神氣實與之相為流通納于大麓烈風雷雨弗迷作書者以為舜之德即舜之所以為神氣也清明在躬氣志如神天降時雨山川出雲記禮者又引嵩髙之詩而繼之曰此文武之德即文武之所以為神氣也成王之神氣微有所昏故大風偃禾昭示譴告及夫啓金縢之書發悔過之語而反風起禾見於不旋踵之頃當是時成王之神氣其精明與舜同亦與天地同故一念感召如響斯答然則今日之變天道未順地道未寧震動漂搖災異交作無庶物露生之應而有蕩析摧敗之憂陛下盍亦反躬內省豈吾之神氣有歉於古之帝王而然歟臣竊謂天覆地載人物處於其中同此一神氣也惟天地萬物父母惟人萬物之靈亶聰明作元后實所以為神氣之主也比嵗以來兵戈滿目乖戾之氣上干隂陽西蜀破矣荆襄殘矣淮甸搶攘江湖撼搖民人死亡何可勝計今又先之以地震重之以風雨凡平時之林然而生蔚然而茂神氣之所發育者率皆憔悴蕭條觸目酸鼻而又物價翔踴日甚一日民將無所得食直立而須死耳夫民物之生皆地之所載而天之所覆也今天愛其道地愛其寶但見寖衰之形莫覩寖明寖昌之象可不為之寒心哉雖然亦豈無道以處此臣敢科别其條以告陛下夫天下譬猶一身身以神氣為主神氣精明然後骨力堅強血脉流通吾身可以久安而無疾治天下亦然心源者神氣也人才者骨力也兵財者血脉也自一身而宫闈自宫闈而朝廷自朝廷而天下所以主張是者神氣也所以運動是者骨力也所以流行是者血脉也陛下一澄其心源則神氣充矣一振人才之綱領則骨力強矣一提兵財之體統則血脉通矣故天下之機括惟在陛下之一身而已且端平未更化之前姑置勿論自更化之後陛下所厯之艱險變故不為不多而所以動心忍性者不為不至矣不知陛下因災異而神氣遂為之消沮乎抑因警懼而神氣愈為之精明乎夫憂窘則怵惕安平則㢮緩常人之情耳聖帝明王純一不二之德則固不當若是也臣願陛下悼念災變之可畏深思平日之過愆痛自懲艾以陛下之心對天地之心變異卒起之時固當飭躬自省變異漸息之後尤當兢業自持此心所存栗栗然常若盲風怪雨拔木發屋之變臨乎其前絶荒淫之嗜好戒宴安之鴆毒杜羣枉之邪徑伸忠賢之正氣燕居深處與治朝聽覽之際同一莊肅妃嬪進御與經帷講學之時同一敬畏勿以屋漏暗室而自肆當以天鑒孔昭為可懼勿以借曰未知而自恕當以人見肺肝為難欺視聽管攝乎天君而毋以外物汨精神幾務盡付於至公而毋以私昵寄心腹斥一時寬釋之邪說而惟思天下至大至重之責不可有一日之暇逸屏目前玩志之細娛而深念藝祖皇帝之金甌不可有纎毫之闕損如此則大臣不敢養驕以惰股肱小臣不敢養諛以惑耳目近臣不敢養安以稔蕭墻之禍逺臣不敢養寇以遺宗社之憂君臣上下置此身於岌岌至危至險之中天地神祗惻然感動將挈而還之於至安至固之域矣臣所謂陛下一澄其心源則神氣必充者此也人主無職事惟以進賢退不肖為職史稱郭公之所以亡在善善而不能用惡惡而不能去以臣觀之郭公之罪固在乎無剛斷之勇而其受病之原則在乎未能識善惡之真如使其真知善善真知惡惡則何遽至於亡惟其顛倒錯亂莫知適從當用者如轉石當去者如拔山卒之正不勝邪忠不敵佞佞邪滿朝則忠正路塞是以終陷於亡耳陛下收攬威福凡所進退之人不勝其衆矣昔者所進今日不知其亡往往乍賢乍佞迄無一定之守人謂陛下剛斷之不足臣竊窺陛下近年以來未嘗不欲用剛也特在乎審而行之耳斷在必用者宜施之於君子而勿誤施之於小人斷在必去者宜施之於小人而勿誤施之於君子則得其所謂用剛之實而不蹈郭公之失矣今陛下未能别白賢否之真但懲往時議論紛紛異同之弊遂以安靖為尚然所謂安靖者惟茍同而已矣君所謂可臣亦曰可君所謂否臣亦曰否以茍同為賢其意將以求安靖也殊不知是是非非力爭明辨合天理當人心乃所以為安靖阿意順指媚上諂下無所救正蔑聞針規則雖求為安靖乃所以為大不安靖耳今災異數見天怒未釋怪證日新民情易搖尚得謂之安靖乎本朝慶歷嘉祐間羣臣可否相濟至熙豐而并為一談元祐諸賢亦可否相濟至紹符而又并為一談由今觀之孰得孰失人才之委靡至近年極矣臣之愚見竊謂勿以已意為逆順而以義理為逆順勿以同異定取舍而以是非定取舍庶乎陛下不受人之欺而國家享得賢之實今也不然脫遇有一任使有一除授則左顧右眄輒興乏才之嘆正如風痺之人縱緩不收四肢百骸不為我用謂之骨力之強可乎陛下赫然聖明照臨于上破茍同之說闢大公之途使天下人才踴躍奮迅乃可以固肌膚之㑹筋骸之束矣臣所謂陛下一振人才之綱領則骨力必強者此也今日急切之務兵財二事而已論者但知逐末忘本臣竊惑焉自古興王之始奮徒手而運掉一世無兵而立有兵無財而立有財蓋其精神志念沉深果斷幾未至不輕躁以先事勢可為不遲疑而失時挫而逾厲弱而益壯則何事不可為何功不可立兵財本一事血脉本相通今析而言之執政各主其一不識兵而非財兵何以養財而非楮財何以辦茍不通為一體大作規模洗滌積弊而一新之臣未見其可也厥今中外所養之兵與凡屯戍㳂邉者不為少矣而猶苦於無兵楮弊布在天下者凡四十千萬有竒其數可謂至夥矣而猶窘於無財此豈拘泥常調者所可變而通之哉陛下必思夫興王之始奮徒手而運掉一世者何術而致此彼惟不以常調處之危中求安死中求生故能易禍為福如反掌之易耳是故患兵之少而言增募者謬說也患楮之不行而言稱提者尤謬說也舉朝群臣泛泛如河中木而陛下又未嘗毅然振刷有所改作則烏能救今日傷敗危亡之天下哉或者乃曰論事易行事難今欲振刷改作必思如之何而發端又如之何而布置又如之何而究竟可也臣應之曰今日非不可振刷改作也特患未肯振刷改作耳如陛下果肯振刷改作必有其道矣且陛下亦嘗以自昔人主處艱險危急之極者而思之乎彼口之所食者何食身之所服者何服宫嬪凡幾暬御凡幾內外有冗官冗吏否乎有濫恩橫費否乎興土木否乎侈宴集否乎獻議者或及此則笑曰是不過節用耳所用如丘山而所節僅㳙埃此迂談耳臣之所言奚止曰節而已哉直欲陛下如興王之始奮徒手而運掉一世則必思坐卧仰膽飲食嘗膽真如越王勾踐可也必思大布之衣大帛之冠真如衛文公可也夫如是天下將曰萬乘帝王而所食如是所服如是是真欲興邦矣是真欲洗一世而更新矣妃嬪耶暬御耶土木耶宴集耶必能奮然大從減省天下傳誦曰今日汰某人矣明日又罷某事矣冗官耶冗吏耶濫恩耶橫費耶必能確然痛加裁抑天下傳誦曰今日下某令矣明日又革某弊矣陛下立心務在必行決不朝作而暮止朝廷論議至當歸一寧有甲可而乙否萬一左右之臣迎逢陛下之意以為方今事勢未至危殆之極何必先為苦節窮蹙之態是說也乃害陛下之儉德者也所宜深警而亟斥之或又以為方今幸而人無橫議何必為此紛更張皇之舉是說也乃沮陛下之從善者也尤宜明辨而力排之陛下胡不思夫夏少康之興僅有田一成有衆一旅可謂至狹至微矣尚能振作興起挽回衰亂之邦復為隆盛之勢陛下視少康之時豈不尚易於斡旋運用乎梁武帝為侯景所逼自知必亡乃曰自我得之自我失之亦復何恨嗚呼代天作子撫有萬方危迫困辱至出此語書之史冊貽羞千古當其尚可救藥也怠而不奮及其不可支吾也猶不知悔自昔然矣可不懲乎今日之事不問智愚不拘中外同然一辭皆曰巧婦不能為無麵餅甚者則曰國將與楮俱敝其慮固苦其言固切而論及於振刷改作則又皆曰陛下猶未之肯也不特陛下未之肯為陛下左右之臣者皆未之肯也毋乃以為妨已而不暇計國乎不思皮之不存毛將安傅計國乃所以為已計也陛下躬率於上將有管晏為時而出如陛下猶欲以平時架漏之具文而施之於傷敗危亡之天下則雖有管晏猶不知為陛下計而況未有管晏乎夫管晏孔門之所羞稱也今欲求其所羞稱者尚不可得陛下亦可反而思之矣人主天下之利勢也陛下操賞罰之利勢於掌握之內惟在乎善用之則天下何難治之有臣所謂陛下一提兵財之體統則血脉必通者此也抑臣復有獻焉上以言求下下以言應上勿謂言為無益也臣竊思今日之事復有十條焉號令率多反汗取輕天下今當謹重其所發一也賞罰未行之始天下已生疑心今當示信而勿惑二也所在軍情不安敢於陵犯紀律今當厚恤而嚴法三也災變之後小民艱食皆將驅而為盜今當招糴以弭姦四也秋髙馬肥敵情叵測區處邉面已為後時豈容更復悠緩五也督府制閫統體相關所宜戒飭一心以國事而滅私情六也監司按行諸路楮劵徒致煩擾亟宜别行措置七也州縣體量田租務在實惠及下以固民志八也湖淮交子盡合易以銅楮通彼所以寬此儻是說可行亦當早有定論九也安邉所乏積貯合議區畫毋致隂消濳耗十也此十條亦粗足以裨末議然臣不敢掇拾細微以溷聖聰者蓋以治天下必使神氣精明自然骨力強而血脉通凡此末節有不勞餘力而自舉者陛下毋以神氣之說為迂稽諸天地驗諸人事今日之變非向時火災之比蓋火災僅在京城未為廣也今之水災遍及外方矣不戒于火猶可諉曰居民弗謹遂至延燎水災非細故也我宋以火德王天下先朝河決為災猶且上下恐懼况風雨肆虐至於此極陛下其可不奮志力行一反衰薾之光景而為興隆之氣象哉詩曰惟昔之富不如時惟今之疚不如兹又曰我瞻四方蹙蹙靡所騁臣賤性朴愚懷不自已幸值陛下導之使言是以一吐狂僭惟陛下財幸吏部尚書魏了翁上奏曰臣伏見比日以來天文示異何其稠也六月庚辰流星晝隕其占為覆軍為隂謀越十日己丑熒惑入太微垣其占為饑為逆為喪七月戊戍太白經天其占為兵為秦強為不臣此金火二星之變至于今未退也而火迫內垣尤為急切越六日丙午以後金星行入東井夫孽非天作變不虛生陛下亦思所以省已愆回天心乎漢相王嘉謂動民以行不以言應天以實不以文下民微細猶不可詐況於上天神明而可欺乎人皆以為至言臣謂如此言者在二漢以來絶少抑不知民與天一也安有為欺民之事而可以應天亦安有為欺天之事而可以動民者此猶未免於擇焉不精然其立言之大意則固已深中乎千有餘年應天動民之實病矣臣每見近年以來羣臣封章多言陛下每遇祀饗必逢開霽每有禱祈無不響答而臣嘗以為此特淺淺之為見者耳大水大火大兵大盜無嵗無之而不此之問乎姑以今年所聞如正月而徐邳覆軍二月而惠寇作亂三月而黃陂逐將四月而建辛違命五月而禁衛失伍六月而京口挻褐七月而髙郵阻兵封章奏疏非不多矣而不以是為異也不特此也雖乾文示異無月無之亦能盡徹於陛下之聽乎陛下聞災異聞變故未嘗不知畏懼也而臣猶有疑於動民以言應天以文則民未可得而動天未可得而應也天未可應臣何以知之以民未可動知之耳民未可動何以知之臣半年之間涉萬里長途所接州縣民吏語及親政未有能深信者至江淮以來則憂危之語日聞以此知民未可以虛言動也民未可動則天決不可以虛文應也惟陛下實體而篤行之權中書舍人王應麟以冬雷上言曰十月之雷惟東漢數見命令不專姦邪並進卑踰尊外陵內之象當清天君謹天命體天德以回天心守成必法祖宗御治必總威福洪舜俞進故事曰昔神宗時羣臣請上尊號及作樂神宗以久旱不許羣臣固請富弼言故事有災變皆徹樂恐陛下以同天節敵使當上夀故未斷其請臣以為此盛德事正當以示四方乞并罷上夀從之即日而雨弼又上疏願益畏天戒逺姦佞近忠良神宗親書答詔曰義忠言親理正文直茍非意在愛君志在王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也臣聞詩曰文王陟降在帝左右又曰陟降厥士日監在兹上天之心與君接人君之心與天通一陟一降隨寓隨在初無毫髮之間五事有敬怠則庶徴有休咎其應如響之應聲我神祖久旱輟同天節上夀之禮亢陽即日而雨陛下以雷變寢天基節上夀之禮積隂即日而霽夫豈人力所能致哉此心即天心天心即此心也富弼於既雨之後奏益畏天戒逺姦佞近忠良蓋姦佞之逺忠良之近即以畏天戒天意在於進君子退小人人君欽承此意而行則寅畏之實也答詔欲弼不替今日之志君臣交相警戒宜有以祈天永命也歟臣故亦願陛下與二三大臣不以天意已回為喜常以天命難諶為懼許應龍進故事曰劉安世嘗言於哲宗之朝曰上天之體雖髙而聽卑明主所以惡文而尚質與其為祈禱之小數不若圗銷變之大方願陛下夙夜祗畏側身修行特下明詔以示罪已又許中外之臣民極言政事之缺失專委近臣考求其當以施有政命公卿輔弼同寅協恭以思天變開衆正之路塞群枉之門誠偹災之善經應變之至務也臣謂應天以實不以文兹不易之至論也夫災異之來天所以警人主茍不講明乎實政而徒崇尚於虛文其何以轉禍為福哉夫避正殿減常膳徹音樂固足以寓兢業之忱驗占候謹齊戒嚴禱祠固足以示禬禳之意然此特應天之文爾必下詔求言以聞已之過失必散財發粟以蘇民之疾苦必輔弼之臣同寅協恭而後可以圗銷弭之方必賞罰之行不僭不濫而後可以起偷惰之習如此則君無失德朝無闕政感召之機當如影響之隨矣此則應天之實在今日所當先也竊觀近事所謂應天之文雖已備舉應天之實尤當加意中外獻言盍求其當而施行之必速賑恤雖行宜核其實而給散之必均私謁不行則衆正之路開獨斷不惑則羣枉之門杜示恩威以馭將士振紀綱以尊朝廷上下一心無有扞格則形聲和而天地應有不期而然者昔蘇軾有言熒惑犯日以太宗修德而雨足熒惑守心以二聖施仁而退舍蓋已然之明驗也惟陛下與大臣亟圗之應龍又進故事曰真宗景德三年司天定五月朔日蝕上避正殿既而隂晦不見上語宰相曰此非朕德所致但喜分野之民不被其災耳髙宗紹興元年日有黑子上曰日為太陽人主之象應天之道以實不以文若朕實德未至徒為文飾恐難動天其在君臣相與盡心行安民利物之事庶幾天變不至為災臣聞皇天無親惟德是輔民心無常惟惠之懷茍人心說於下則天變銷於上猶影響之相應也夫天佑民而作君君承意以從事茍一念之形必以為民為先一政之施必以害民為戒矜憐撫育布德行惠使無一夫不被其澤則形聲和而天地應尚何災變之足慮自夫闕政舛令有以干隂陽之和故謫見于天以示警戒茍能因災而懼是究是圗舉行寬恤之政俾斯民無愁嘆怨恨之聲猶可以上回天意轉妖為祥若徒避正殿減常膳以示貶損而無寵綏四方之意是特循故事耳果何以盡感格之實哉故真宗因日蝕不見不以為朕德所致而惟喜分野之民不被其災而髙宗因日有黑子而欲行安民利物之事者其意蓋為是耳比者日官預占薄蝕陛下首頒御札亟率舊章御便朝損珍羞嚴恭寅畏不遑朝夕復發德音赦過宥罪恤流移而蠲租賦撫士卒而惠鰥寡仁心一形天心隨格隂雲布濩靈耀靡虧若可以上寬憂虞導迎嘉貺而謙沖退托稱慶之禮既不舉行復常之請又未俞允雖虞舜之惟時惟幾文王之小心翼翼何以踰此然應天以實不以文動人以行不以言必戒謹其所不睹恐懼其所不聞而始終如一然後可以應天必官吏謹於奉行遐邇罔不周遍而不為文具然後可以動人天人之間既和同而無間則開重暈之祥建中興之業可指日以冀矣歷代名臣奏議卷三百十三
