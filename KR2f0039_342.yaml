body:
  text: 歷代名臣奏議卷三百四十二明楊士竒等撰四裔宋太祖時趙普上禦戎策曰夫禦戎之道有三策焉前代聖人論之詳矣繕修城壘依憑險阻訓戎聚穀分屯塞下來則備戎去則勿追䇿之上也偃革櫜弓卑辭厚禮降王姬而通其好輸國貨以結其心雖屈萬乘之尊暫息三邉之戍䇿之次也練兵選將長壘深入擁戈鋋而肆戰決勝負于一時䇿之下也國家自戎馬生郊邉防受敵兵連禍結纍載于兹邯鄲致蹂踐之虞上谷失藩籬之固飛芻挽粟千里騷然丁壯斃于轉輸膏血塗于原野尚賴聖君宵旰廣運宸謀今夏以來方隅稍定糇糧以濟城邑粗安然而北人之情變詐難測或慮朔風髙引塞草具腓乘大漠之苦寒奉穹廬之醜類南下燕趙復恣憑淩則成敗存亡未可量也況河朔之地困厄方深邑里丘墟黎元蕩析儻後日之戰覆車之禍則趙真定疇能守之人心一搖天下之事去矣國家素失薊北關塞之險亡控守之處是上策不能舉也頓兵草野與胸奴轉戰勞弊已甚勝負未分是下策不足恃也審觀天下之形勢憂患未已唯與之通好或可解紛今山東諸侯近不交戰訪問胸奴休兵馬退在北庭宜因此時舉和親之䇿夫屈信變化與道汙隆轉危就安聖人之務也將裁成于四海豈凝滯于一方昔髙祖奮布衣起豐沛誅暴楚滅強秦不五七年平定天下而雄圖大略自軒昊以降未見其倫以天子之尊唯有魯元一女及出師朔野困于白登爰從説士之詞遂舉和親之策逮及文景承先人之業開太平之基至道興行兆民胥恱海內田賦三十而稅一太倉之粟紅腐而不可食內府之錢貫朽而不可較亞夫賈誼為謀議將帥之臣三十年間天下刑措巍巍功業與三代比隆及其火照甘泉兵屯細栁宗室之女出聘單于夫以髙祖之雄才文景之淳化豈力之不足而德之不至也耶然而與之通好者蓋視外裔無重輕爾安肯耗竭中國事無用之寇傷害德義而與外裔爭前代帝王所以待外裔之道羈縻之而已豈求功業于其間哉觀典䇿之遺文審安危之大計降志邊方惟聖人能之結好息心正在今日儻或上天悔禍鄰敵依仁奉二國之歡盟息邉夷之烽燧誠祖宗之福也夫盛衰之理其機存焉聖賢因之以定其業昔者隋季版蕩唐室勃興髙祖大并肇登天位英衛房杜為佐命之隆而頡利可汗遽犯京邑太宗躬枉車駕以敦其夙好廣輸財貨以厭其貪心歲月洊更哭厥浸弱李靖以數萬之衆擒而滅之此王者蒙垢俟時殱強敵之明效也今契丹嬖臣擅軸牝雞司晨單于幽孱權移于母治越于強大地處于嫌疑虎兕之衆雖繁攻奪之形已露況滔天泯夏極惡窮凶以人事言之星紀未周冒頓之謀必興于戎帳矣國家暫時屈已以濟艱屯而取亂侮亡其則何逺若契丹恃憑種落張皇寇暴逆天悖理不奉綏懷然聖人屈已濟物之誠已彰灼于天下矣豈獨回昊穹之眷命因亦激戰士之鬪心曲直實在我又何愧利害斯見宜賜察焉太宗太平興國五年左拾遺張齊賢上奏曰臣竊惟方今海內一家朝野無事關聖慮者豈不以河東新平屯兵尚衆幽薊未下輦運為勞以生靈為念乎臣每料之此不足慮也自河東初降臣即權知欣州捕得契丹納米專典皆自山後轉般以援河東以臣料契丹能自備軍食則於太原非不盡力然終為我有者蓋力不足也河東初平人心未固嵐憲欣代未有軍寨入寇則田收頓失擾邉則守備可虞而反保境偷生畏威自固及國家守要害增壁壘左控右扼疆事甚嚴恩信已行民心已定乃於鴈門陽武谷來爭小利此則外裔之智力可料而知也聖人舉事動在萬全百戰百勝不若不戰而勝若重之謹之外敵不足吞燕薊不足取自古疆埸之難非盡由外裔亦多邉吏擾而致之若緣邉諸寨撫御得人但使峻壘深溝蓄力養鋭以逸自處寧我致人李牧所以稱良將于趙用此術也所謂擇卒未如擇將任力不及任人如是則邉鄙寧矣邉鄙寧則輦運減輦運減則河北人民獲休息矣獲休息則田業增而蠺織廣務農積穀以實邉用且敵人之心固亦擇利避害安肯投死地而為寇哉臣又聞家六合者以天下為心豈止爭尺寸之事角四裔之勢而已是故聖人先本而後末安內以養外人民本也四裔末也中夏內也四裔外也是知五帝三王未有不先根本者也堯舜之道無他廣推恩於天下之民爾推恩者何在乎安而利之民既安利則外裔斂袵而至矣陛下愛民利天下之心真堯舜也臣所聞多以纎微之利剋下之術侵苦窮民以為功能者彼為此效相習已久至于生民疾苦見之如不見聞之如不聞斂怨速尤無大于此伏望審擇通儒分路採訪兩浙江南荆湖西川河東有偽命日賦斂苛重者改而正之因而利之使賦稅課利通濟可經久而行為聖朝定法除去舊弊天下諸州有不便於民事委長吏聞奏如敢循常不以上聞自當嚴加典憲使天下耳目皆知陛下之仁戴陛下之惠此以德懷逺以惠利民則幽燕強大之鄰沙漠侵擾之寇擒之與屈膝在術爾七年李繼遷擾西鄙保安軍奏獲其母至是太宗欲誅之以冦準居樞密副使獨召與謀準退過相幕吕端坐疑謀大事邀謂準曰上戒君勿言於端乎準曰否端曰邊鄙常事端不必與知若軍國大計端備位宰相不可不知也準遂告其故端曰何以處之準曰欲斬於保安軍北門外以戒凶逆端曰必若此非計之得也願少緩之端將覆奏入曰昔項羽得太公欲烹之髙祖曰願分我一杯羮夫舉大事不顧其親況繼遷悖逆之人乎陛下今日殺之明日繼遷可擒乎若其不然從結怨讐愈堅其叛心爾太宗曰然則何如端曰以臣之愚宜置於延州使善養視之以招來繼遷雖不能即降終可以繫其心而母死生之命在我矣太宗撫髀稱善曰微卿幾誤我事即用其䇿其母後病死延州繼遷尋亦死繼遷子竟納欵請命端之力也左拾遺知相州田錫論邊事上奏曰臣聞動靜之機不可妄舉安危之理不可輕言利害相生變易不定用捨無惑思慮必精夫動靜之機不可妄舉者動謂用兵靜謂持重應動而靜則養冦以生姦應靜而動則失時以敗事動靜中節乃得其宜今北鄙繹騷蓋亦以居邉任者規羊馬細利為捷捕斬小勝為功賈怨結仇乘敵致冦召戎起釁職此之由伏願申飭將帥謹固封守勿尚小功許通互市索獲蕃口撫而還之如此不出五載河朔之民得務三農之業亭障之地可積十年之儲前嵗俶擾邉陲親迂鸞輅今兹張皇聲勢頗動人心若玁狁來侵六龍夙駕戎羌既退萬乘方歸是皆失我機先落其術內所以兵不得分屯農人不得收斂勞頓斁耗可勝言乎軍國大端固當謹始戎族未亂無煩強圖敵勢未衰何勞力取待其亂而取之則克乘其衰而兵之則降既心服而志歸則力省而功倍自古貪利洊食不獨胸奴邀功起戎多自邊將當鑒前軌以恢永圖昔漢安帝時東夷犯境連年不息漢頗患之其主云亡其子繼立漢乃命使吊之東夷感恱還漢生口一隅晏然至於南蠻亦嘗畔渙始由邉吏增賦乘怨冦掠光武時西戎犯邉班彪請置護羌校尉通其貨之有無治其人之寃枉塞垣遂安誠願依古道務逺圖示綏懷萬國之心用駕馭四夷之䇿事戒輒彂理在深謀臣又謂安危之理不可輕言國家務大體求至理則安捨近謀逺勞而無功則危為君有常道為臣有常職是務大體也上不拒諫下不隱情是求至理也帝王之道惡萌欲心漢武帝躬秉武節遂登單于之臺唐太宗手結雨衣往伐遼東之國率義動之衆徇無厭之求輸常賦之財奉不急之役是捨近謀逺也沙漠窮荒得之無用外裔遺種殺之更生是勞而無功也臣又謂利害相生變易不定者兵書曰不能盡知用兵之害者則不能盡知用兵之利蓋事有可進而退則害成之事至焉可退而進則利用之事去焉能審利害則為聰明以天下之耳聽之則聰以天下之目視之則明故書曰明四目逹四聰惟此聰明無壅塞盡去相蒙之弊乃協知幾之神臣又謂取捨不可以有惑故曰孟賁之狐疑不知童子之必至思慮不可以不精故曰差若毫釐繆以千里自國家圖燕以來連兵未解財用不得不耗人臣不得不憂恢復弔伐之名雖建洪業可否禍福之實宜留聖心願陛下精其思慮決其取捨無使曠日持久窮兵極武為國大計不得不然雍熙中詔詢文武禦戎之䇿殿中侍御史趙孚奏議曰臣愚以為不用干戈不勞飛挽為萬世之利者敢獻其説惟明主擇之古者兵交使在其間雖飛矢在上走驛在下蓋信義不可廢也昔苗民逆命帝乃誕敷文德而有苗格又仲尼曰有能一日克己復禮天下歸仁只如并門一方歷代難取聖襟英斷一舉成功當其逆城危於纍卵生聚懷伏而陛下猶遣通使舍人薛文寶入城諭之日者北邉未賓全燕猶梗再興軍旅將復土疆臣竊計屯戍邉陲故非獲已暴露原野豈是願為欲望朝廷通逹國信近鑒唐髙祖之降禮逺法周古公之讓地聖人以百姓之心為心君子見幾而作諭以禍福示以恩威議定邉疆永息征戰養民事天濟時利物莫過於此臣又計彼雖嗜好不同然去危就安厭勞喜逸亦人情之所同也上嘉之端拱二年吏部侍郎李至乞懷柔北人上奏曰臣今月十一日奉宣御札以北人犯邉廣延羣議天慈惻隱睿訓丁寧仰承屈已之仁俯愧素餐之責伏聽綸旨戰汗交并臣繆以庸虛叨塵侍從國家之事首合上言但以章句之能記問之學徒欲循先賢之陳迹習迂儒之懦謀豈敢自衒於多士之朝輕瀆於至聖之鑒今陛下戒臣以鉗口責臣以惜言既迫威嚴輒陳狂瞽臣竊惟北鄙為患自古而然不足致怒唯在御之得其道爾若綏之以德則其用功也逸其經費也約其見效也速其保安也久而無衒耀彰灼之名但有安樂富壽之實若懾之以威則在良將徑兵竒謀詭道士冒鋒鏑霜露民竭資財糧穀伏尸流血搴旗斬將然後振旅凱樂厭功清廟此誠天下之壯觀臣非不欲之也直以非被堅執鋭之士無運籌借箸之智欲之而不能致之也春秋傳云人有能有不能臣豈強以所不能而誣惑於天聽哉若其懷柔之術粗能言之請陳其一二昔者漢髙祖既定天下唯胸奴為梗奉春君獻議請以魯元公主妻之望其執子壻外孫之禮髙祖欣然納之臣以為奉春之䇿愚之甚者也彼單于冒頓親殺其父而奪其位肯顧外祖哉以髙祖聰明神武豈不知此謀之拙蓋有以也是時民困已久皆望息肩髙祖所以屈萬乘之尊捨骨肉之愛為百姓請命於胸奴爾百姓見髙祖如此則仁義浸於骨髓感激盈於胸臆始肯奮不顧命以扞國天意見髙祖如此始肯霈然垂祐以致和平遂以至愚之䇿而獲萬世之福此理出於杳冥微妙非尋常所能見也至于孝文能遵前訓亦不以萬乘為貴四海為大卑事胸奴所以海內富夀粟腐貫朽幾致刑措至于孝武承纍代之業任雄武之才奮兵而出收河南之地取渾邪之域摧凶殄寇功冠前古及其連兵不已國家疲弊户口減半於是罷輪臺之役下哀痛之詔然後僅安則知威懾之與德綏利害不侔矣此乃前古之顯效也近者李繼遷以蕞爾之衆侵擾西邉為我疥癬之患陛下尚能憫西民之勞苦下惻隱之命赦繼遷之罪加保以恩化狂悖為忠順變殺戮為生成凡在含識莫不上感聖德此又目前之顯效也昔者仲尼垂持滿之誡曰聰眀睿智守之以愚功被天下守之以遜勇力振世守之以怯富有四海守之以謙此天道也夫四德者陛下可謂兼之矣而有邉寇之患者天意將警戒陛下欲遵仲尼之教守不世之烈以永八百年之基乎所以臣昧死上言願陛下上恭天意下徇民情霽雷霆之威霈雨露之澤追禹湯罪已之旨下漢武哀痛之詔開懷以待之玉帛以撫之文告以諭之明神以要之使彼服義懷仁則我無遺鏃之費保覆盂之安如使驕狠不悛則我之士民怒氣自倍則後日之戰必無前日之遷延也臣愚暗昏耄所見止此塵瀆天鑒伏俟刑書謹奉表以聞至道二年出李重貴為衛州團練使未行會命將五路討李繼遷以重貴為麟府州濁輪寨路都部署得對便殿因言賊居沙磧中逐水草牧畜無定居便戰鬪利則進不利則走今五路齊入彼聞兵勢太盛不來接戰且謀逺遁欲追則人馬乏食將守則地無堅壘賊既未平臣輩何顔以見陛下太宗善之出御劒以賜真宗即位拜李至工部尚書參知政事一日上訪以靈武事至上疏曰河湟之地夷夏雜居是以先王置之度外繼遷異類騷動疆場然臍不足弭其患擢髮不足數其罪然聖人之道務屈已含垢以安億民蓋所損者小所益者大望陛下以元元為念不以巨憝介意料彼脅從亦厭兵久矣茍朝廷舍之不問啖以厚利縻以重爵亦安肯迷而不復訖於淪胥哉昨鄭文寶絶青鹽使不入漢界禁粒食使不及羌夷致彼有詞而我無謂此之失策雖悔何追今若復禁止不許通糧恐非制敵懷逺不戰屈人之意昔唐代宗雖罪田承嗣而不禁魏鹽陛下宜行此事以安邉鄙使其族類有無交易售鹽以利之通糧以濟之彼雖逺夷必然向化互相告諭一旦懷恩舍逆效順則繼遷豎子孤而無輔又安能為我蜂蠆哉今靈州不可不棄非獨臣愚以為當然若移朔方軍額於環州亦一時之權也或指靈州為咽喉之地西北要衝安可棄之以為敵有此不智之甚非臣之所敢知也後靈武卒不能守時邉人屢寇知虢州謝泌上疏曰臣竊惟聖心所切者欲天下朝夕太平爾雍熙末趙普録唐姚崇太平十事以獻未幾普復相時稱致治之䇿無出於此尋普病又遼騎擾邉因循未行今北邉謐寧繼遷請命則可行於今日矣臣以為先朝未盡行者俟陛下爾陛下自臨大寶邉不加兵西北肅然民安歲登則太平之象復何逺哉至於省不急之務削煩苛之政抑奔競來直言斯皆致太平之術又豈讓唐開元之治也議者或謂方今用兵異於開元且開元邉戎孔熾明皇卒與之和至如漢髙祖亦然此皆屈已以寧天下豈以輕大國而競小忿乎請以近事言往嵗討交趾王師一動南方幾搖先皇以為得之無用棄之實便及授官為藩屏則至今鼠伏石晉之末恥講和契丹遂致天下橫流豈得為強或者有言敵所嗜者禽色所貪者財利餘無他智計先朝平晉之後若不舉兵臨之但與財帛則幽薊不日納土矣察此乃知其情古猶今也漢祖明皇所用之計正可以弭其心矣臣伏覩近詔以不逞之徒所陳述皆閭閻事臣聞古先哲王詢于芻蕘察於邇言者蓋慮視聽之蔽故採此以逹物情亦罕行其事也先朝有侯莫陳利用陳廷山鄭昌嗣趙贊之徒喋喋利口賴先帝聖聰尋翦除之然為患已深矣咸平三年知雄州事何承矩上奏曰夫榷場之設蓋先朝從權立制以惠契丹縱其渝信犯盟亦不之廢似全大體今緣邉榷場因其犯塞尋即停罷去歲以臣上言於雄州置場賣茶雖資貨並行而邉氓未有所濟乞延訪大臣議其可否或文武中有抗執獨議是必别有良謀請委之邉任使施方略責以成功茍空陳浮議上惑聖聰秖如靈州足為證驗況兹契丹又非夏州之比也真宗時契丹聚兵幽薊聲言將入寇議者請城洛陽司空呂夷簡謂契丹畏壯侮怯遽城洛陽亡以示威景德之役非乘輿濟河則契丹未易服也宜建都大名示將親征以伐其謀或曰此虛聲爾不若修洛陽夷簡曰此子囊城郢計也使契丹得渡河雖髙城深池何可恃耶乃建北京仁宗時陕西經略安撫使夏竦奏策曰臣聞北敵凶態洊食邉境為日久矣周道中興宣王薄伐秦氏孔武逐之塞北雖繞長城終非良䇿漢髙北伐師挫白登奉春獻議乃約和親供給至豐冦掠無厭太宗中年侵軼岐雍孝武窮兵稿街秉律精鋭深入摧敗敵衆甘露之中呼韓欵塞當是之時戎勢微弱中國懷禦踈密有宜新莽盜漢寇心復戾世祖中興敵分南北勢既攜離邉防稍泰竇憲總師遂破其種逮及桓靈復患寇鈔漢祚線絶中原瓜割羌戎大盛亂華猾夏周隋之際突厥驕矜敵后外入宗女外降唐室初開邉境多虛渭橋之陳文皇盟載雖李靖之擒討蘇定方之破滅邉鄙之間不能無害聖宋龍興廓有諸夏桑穀之賦山海之利勇悍之士金革之物無有逺邇皆入縣官獫狁之寇猶比漢唐非勇之不足枝梧抑寇之梗於疇昔自幽薊陷寇之餘重季蒙塵之後中國器度工巧衣冠士族多為敵人所有逮今六十年間益稔凶狡多誘中原亡命之徒善侵塞下生間之輩貪婪嘯聚苦於邉邑前年冬寇我北鄙暨于澶淵將帥之臣嬰城自守生靈膏血腥汙原草自非陛下拯救元元親馳革輅胸奴之氣未易當也洎乎天威震耀敵徒喪膽遁逃無所獻欵歸命陛下赦其鯨鯢寬其剪滅要以日月之盟質以丹青之信若能革靣易心永懷至德紓民偃革大為長䇿誠恐剽悍之性不耻貪戾若絶乘虛之寇必有無已之求從之則虛府庫而資寇讐拒之則積怨心而起驕慢為國計者其猶病諸莫若明待以信隂為之圗以臣料之非難事也夫胸奴之衆勝兵者不逺二十萬糇糧不過數日輜重不過數乘長於寇鈔短於守禦利於騎鬪挫於步戰便於弓矢拙於劒戟以其兵則不及中國五分之一以其用則不及中國十分之一以其技則不及中國三分之一比年寇虜而疆場之臣不能扞者豈天時乎抑亦將之不省兵乎夫外裔侵擾代無之若其敗滅固有時矣陛下必欲恢復塞垣清謐邉陲在擇將帥而後議之寶元元年右司諫韓琦論外憂始於內患上奏曰臣伏聞元昊狂謀僭命朝貢不修輕犯天謀人神共忿陛下雖寬詔厚澤姑務懷柔其如逆狀已然必為邉患今獻䇿陳事者大抵不過欲朝廷選擇將帥訓習士卒修利戈甲營葺城隍廣蓄資糧以待黠羌之可勝此乃安邉扞寇之切務也然而凡人之慮皆能及之臣竊謂此特外憂而已雖漢唐全盛之際豈能使四夷常自竄伏而保不為盜哉若乃綱紀不立忠佞不分賞罰不明號令不信浮費靡節橫賜無常務宴安之逸遊縱宫庭之奢靡受女謁之干請容近昵之僥幸此臣所謂內患也且四夷內窺中國必觀釁而後動故外憂之起必始內患臣今為陛下計莫若先治內患以去外憂內患既平外憂自息譬若木之有本未有本固而枝葉不盛者也臣欲望陛下深惟祖宗所謂內患者盡革而去之則陛下威德逺暢外夷髙視於漢唐之上元昊小醜孰能為國家之患哉如外憂已兆內患更滋臣恐國家之慮非直元昊一凶而已臣切為陛下憂之臣猥備諫員不敢循默言涉狂直惟陛下憐其納忠貸其萬死仁宗時趙元昊且叛為嫚書來規得譴絶以激使其衆通判睦州張方平請順適其意使未有以發得歲月之頃以其間選將厲士堅城除器為不可勝以待之雖終於必叛而兵出無名吏士不直其上難以決勝小國用兵三年而不見勝負不折則破我以全制其後必勝之道也時天下全盛皆謂其論出姑息決計用兵方平上平戎十䇿以為入寇當自延渭巢穴之守必虛宜屯兵河東卷甲而趨之所謂攻其所必救形格勢禁之道也慶歷元年方平知諫院請因郊禋肆赦招懷西賊劄子曰伏以前景祐五年有事於圓丘西戎貢職不至始發釁端次年春遂搆兵犯邉殺掠吏民邉將備禦無䇿賊數入寇輒以勝歸濟其凶謀氣焰益盛今自陕西四路河東麟府逺近屯戍輸挽供給天下為之勞弊而解嚴息甲未可以日月期也臣嘗問自邉來者詢賊中事蓋今羌戎乃漢唐郡縣非以逐水草射獵為生皆待耕穫而食賊每點集資糧器用人自為備須歲年為計乃能一大舉雖破城寨不能有我寸土也而又絶其俸賜禁其關市賊中尺布直錢三數百邉防守禦備繕完益固賊情見勢屈自當改圖然猶騎虎不可復下雖有悔心亦何由自通誠欵朝廷雖欲招來若非時無名事亦難舉儻因今來郊禮覃慶之時特開曠蕩之恩示以綏懷之意或特降一詔或著之赦書其辭意大略則曰夫王者以天下為度含生之類罔不亭育況朔方靈武河西三郡聲教所暨莫非王民頃自德眀已來克保外臣之節朝廷眷待恩禮至隆去年元昊遣使人來稱為本蕃推戴緣其附順三十餘年忽此奏陳不無疑駭見情未審遂至興兵使邉人不寧師徒暴露今親郊上帝盛禮告成慶賜大行囚繫盡釋乃眷西顧惻然軫念虧於撫育吾甚傷之今後夏州或有使人至者候人不得遏絶或有願通於朝廷之意即令邉臣受而上聞且泛告邉臣以謹守封略罔或生事令榜而揭諸塞上或邉臣之有威望者遣單使以朝旨往為開諭足彰陛下德義之厚無損朝廷威重之體且敵妄自尊大於巢窟中久矣王者固宜以大度處之豈足與之辨名器等威之分哉敵若有悔禍之心稱蕃納貢陛下優為封爵名號以服擾之出府庫之餘以歲時安撫之使天下知陛下深誠逺慮為生靈計至於天地鬼神亦當助仁而佑順仁者無敵於天下況一敵歟若敵悍然自恃凶愎不移亦足以驕怠彼心激怒我衆邉臣必曰天子之恩意如此敵無革心我不可以不奮身而為國致討矣戰士必曰天子不以敵之不義而必窮誅是哀吾屬之久戍也今敵無革心吾屬不可以不效命鬪戰矣自邉之人至於天下之民必曰天子所以赦敵蓋念賦役之煩擾吾人之困勞今敵無革心吾人不得不竭力以奉邉矣敵黨必曰天子幸加恩而不我誅也而其主茍不思焉是驅我於鋒刃之下以濟其欲而已夫兵猶火也不戢將自焚使我怒彼怨敵有自焚之勢則成敗有所分矣今議者聞臣之説必難臣曰敵自入寇無不剋何困之有今雖招懷之徒示國之弱賊肯革心乎臣請對曰昔繼遷之為邉患也號為驍悍有謀略者陷朔方靈武國家喪地且千里而其衆亦大弊爾時繼遷雖不為六合所殺勢亦不支矣故其死時戒德明曰爾當傾心歸順朝廷如一兩表未蒙開納但連上封章以祈見聽故德明欵附畢世不渝今敵非遷比也不幸自其初叛而我守邉匪人是故敵纍得志而其衆嗜為寇之利向使我無大敗彼無大獲而以敵之虐用其下尋應疲潰矣今朝廷處畫邉事守遏益固將卒用命財用不乏雖未能大殘其衆姑使來無所掠獲即敵自窮蹙今先開其歸路以為後圖縱敵未懷與國何損必又難臣曰敵雖致欵戎心可保乎即有其實邉備得以徹之乎臣請對曰昔景德初契丹大入河朔先帝親駕北狩于澶淵契丹始遣使議通和好俄又其統軍達蘭中伏弩以死和議遂定于時邉陲可保戎心徹警偹而謂繼好至今之堅乎在朝廷所以撫納控馭而已今事邉之費歲且千萬用師以來係纍殺戮幾十萬人故自古以來論邉事者莫不以和戎為利征戍為害蓋深念此也伏願陛下廷召二府大臣試詳此議儻蒙採聽則生民之福實所繫賴臣不勝區區之懇方平議西非邉事上奏曰今月五日中書樞密院聚廳奉傳聖旨宣示契丹來書并朝廷回答書本如所見有異令具陳奏者今朝廷答書大意欲且納元昊故書末有理難阻絶之語臣竊詳今來契丹與元昊相攻虛實未保且以來書大體言之其辭以元昊不順朝廷之故因緣搆釁遂已興兵恐深入討伐後元昊却歸朝廷故乞拒而不納今若答書直云理難阻絶則是峻拒契丹之請堅納西人之盟得新附之小羌失久和之強敵況契丹見屯兵甲近在邉陲因此違言或成忿隙控弦近塞有以為名則河朔邉防素備何若患有遲速事有輕重廟算折衝厲階自弭事要允當義在兩全今西鄙遣人已到境上欲乞朝廷降詔元昊大約言昨者朝廷納卿欵誠亦緣契丹啓贊嘉其善意遂議加封今聞卿招誘契丹邉戶頗失甥舅之歡契丹遣使為言朝廷睦鄰有體揆之大義有軫于懷卿宜審處事宜早除嫌隙則誓書封册便可施行仍乞於契丹回書中具及此意如此則朝廷於西人有恩意之厚於北鄙無搆怨之端中國禮義容覆大矣若將來契丹却與元昊通和遣人復請開納則今詔敕已具後命元昊被此德音應知感戴儻其凶德復為旅拒則較其輕重羌虜之患小契丹之患大斷可知矣叨蒙訪逮合罄愚瞽採擇用捨繫之朝廷方平又奏曰臣等近為中書樞密院傳聖旨宣示所答契丹國書令各陳所見已於初六日同上札子具陳事意竊聞朝議改定回答契丹書以為元昊若盡如要約即朝廷難為辭却者臣等竊懷未盡須至再有敷陳蓋當今可慮於西者三可虞於北者五何者若朝廷已納元昊誓書勢必便行封册而北使復至固邀我以拒絶此其可慮一也若朝廷已納元昊誓書遲留未行封册是使西人窺我有所牽制此其可慮二也必不獲已而封册之命中止是中國無復信義永斷招懷之理此其可慮三也若報至邉廷見我辭拒意堅言切萬一睢盱生忿因成急變則河東河北忽為所乘邉備何若此其可虞一也且以西人搆難於我彼曽約束使來納和今西人起釁於彼我乃遂納不同其患持此責我彼為有辭此其可虞二也今二敵相持事形可見元昊權譎無耻狙詐多端縱負屢勝之強必不兩延大敵北兵既迫或迎而伏罪則契丹號令元昊未應敢逆安知已和之約不能復使之離是我不能弭患於西徒以致怨於北此其可虞三也今敵聚兵馬近在境上擇利而動勢不虛歸若元昊旦而受封敵必怨而望報但恐事之以金帛未稱其所欲也故不如叩其兩端之中徐觀二寇之變逗留日月繕完守備不當乘其方逞激之卒發此其可虞四也夫二寇之隙誠偽未明就使信然尤宜審處見情則獲直往必違而我以新附難保之叛人怒久和可患之強敵既促尋戈之釁翻堅元昊之交此其可虞五也凡此可慮可虞之事若朝廷深謀長䇿有以善其後臣等所不敢知儻未有以待之則若虞機張釋括期於必中爾臣等前議故願示以大義要之兩全且未納西人誓表時降詔書或遣一介之使往申告諭至於和約又非阻絶即具以此意回報契丹因令使人邀其終趣於北則言遜而體正於西則名拒而實通凡諸事機後皆可救臣等位叨侍從義均休戚國之大議復蒙訪逮愚慮所及不避再三伏望朝廷更賜採亮仁宗時知諫院蔡襄論趙元昊狂僣之計上奏曰趙元昊棄其祖父盟約妄為狂狡僣稱大號不臣之迹彰著朝廷大增邉備議者皆謂元昊遣人入朝不從其所請必寇邉郡以肆狂心臣竊謂不然外裔之心見利則動若元昊欲寇邉當去年未備之時舉衆而來勢或難禦於其時尚不入寇今乃先自狂悖待我邉之皆有禦然後入寇亦有何利臣竊料元昊本無寇邉之心但張聲勢欲求中國歲與貨財耳襄又論地形勝負上奏曰論者或以西虜之俗善騎射習戰鬪以為北敵之比臣竊謂過也大凡騎軍利平地步卒利險隘得地形之利者勝勢常多趙魏之地千里無關塞之險敵善騎射故勝勢多在彼也今西邉之地自鄜延環慶涇原沿邉三路皆是山險要塞之處此乃步卒之地非騎軍之利若以其俗善騎射樂戰鬪則不減北敵若論步騎之利則地形異矣故勝勢常在我也襄又論敵騎強弱上奏曰臣聞景德中契丹大舉攻瀛州經二十日不破而敵衆死傷者數萬人南略趙魏之境所攻下者唯通利德清兩軍而已以北敵之強舉國而來又趙魏之地無險隘之阻尚不能必取中國州郡況趙元昊以數郡之卒入險隘之地頓於堅城之下豈能必勝哉故元昊當無備之時不敢伺隙而來但遣使人妄設尊名以搖朝廷之心幸朝廷怯其勢而聼其請此乃元昊狡心能計利害之深者也為國家計者當知其不足懼但深察精審於處置則狡謀自破矣襄又料元昊擾邉境上奏曰或問元昊既無來寇之心今者遣使人入朝不得如其請元昊之計其將安出臣切謂趙元昊必自度邉塞險固難於進攻若大舉甲兵既一敗衄則窮蹙之勢日見坐為中國擒也此必但時以輕騎偏軍往來邉地鈔略蕃部若此不已是中國邉郡之兵不可一日罷去年歲之間歲月之久運芻粟完城寨關中勢當疲擾此敵常佚而我常勞利害可明也臣故謂今來未必大舉兵用偏師鈔擾邉境者此也襄又論契丹遣使之意上奏曰契丹舉兵征元昊以助中國仍責以劫略之罪或曰二寇互相疑二勢不兩雄必有釁隙臣謂契丹與元昊久為親好元昊為中國邉患若與契丹結隙則腹背受敵元昊黠賊豈有如此失䇿假使契丹淩辱百端元昊亦卑屈而就之必無目下結隙之理契丹今日之謀主於自邀通和之功耳或曰契丹既欲邀功理當趣和今乃請朝廷不與元昊通和何也臣聞每有朝廷使者在彼契丹多出元昊之書以示之然以功不顯著既和之後中國之償我者必輕又元昊必自恃已力能與中國通和不以契丹為重故契丹以兵脅我之絶而示元昊又以兵制元昊之和以示我左右持之而自收其功足為威武之勢臣謂今雖請與元昊絶和朝廷若從之非久必遣使請與元昊通和襄又乞拒元昊之和上奏曰元昊非久必有使來若更有所求可因而絶之若無所求奉正朔正名分貢方物相續而至朝廷以何事拒之若以契丹之故而拒之相次又以契丹之故招與之和元昊以中國之言足為信今既絶和元昊必以重兵宿麟府之間既防契丹又窺河東以輕兵出陕西沿邉州郡朝廷不敢輕移陕西兵馬河東一路不增兵則不可以守增兵則糧運難繼不戰已困况乘時觀隙奔突難防非細故也襄又乞不聼議者許西賊不臣事上奏曰臣伏見元昊遣人乞和名分不正須索過多必朝廷深究事體已有定議然臣切慮有昏謬之人請損名分且與和好務從權變以寬民力此實茍且之論非長久之策也今邉兵久戍饋運繁數誰不欲通和以就休息奈何名分不正須索過多便生北敵之心立見危亡之患非特執一端之説與羌戎爭氣而已伏望陛下深思熟慮拒絶小人之言主持天下之計大凡百事處置失錯從可更改若此事一失更無可救之理欲絶後患莫若斷之在前區區愚情不勝披瀝肝膽之至襄又乞早降元昊册書上奏曰伏見元昊使人至已數日如聞誓書大體頗有朝廷約束兼余靖使北已有回奏别無齟齬之意切謂宜速行封册者今契丹兵西嚮在未勝負以前遣使報之度其勢必假他議茍有所俟契丹幸而勝元昊其心益驕或於齎謝之外輒有所求何以處之臣故謂莫若速之利也若報聘之禮已行契丹雖欲乘間生端則曲不在我況存元昊之和則契丹未敢輕絶中國而為患也伏惟陛下揣度事勢不可緩也寶元二年直集賢院富弼上奏曰臣切聞去嵗十二月中趙元昊反自立為大夏皇帝改元稱制引兵犯邉遣使致書割地邀貨陛下召輔相於宴會不容食頃之間輔相馳車馬於康衢殊乖坐鎮之重變起倉卒事無凖繩朝議紛拏人心皇駭不逾旬浹傳布四方衆皆謂之忽然臣則知其有素請陳有素之狀其狀有六焉昔者德明尚存元昊方幼常勸厥父勿事中朝安能舉我國家終久為人臣妾且謂所得俸賜只以自歸部落實繁窮困頗甚茍兹失衆何以守邦不若練習干戈杜絶朝貢小則恣行計掠大則侵奪封疆上下俱豐於我何恤德明以力未甚盛不用其謀豈有身自繼立而不行其説耶此元昊反狀有素者一也自與通好略無猜情門市不譏商販如織縱其往來蓋示懷柔然而迹稔則容姦事久則生變故我道路之出入山川之險夷邦政之否臧國用之虛實莫不周知而熟察又比來放出宫女任其所如元昊重幣市之內之左右不唯朝廷之事為其備詳至於宮禁之私亦所窺測濟以凶狡之性貪欲之謀豈肯固守盟約坐受羈制此元昊反狀有素者二也西鄙地多帶山馬能走險潮海彌逺水泉不生王旅欲征軍需不給窮討則遁匿退保則襲追以逗撓為困人之謀以遲久為匱財之計元昊恃此艱險得以猖狂復如先朝加兵於我而終棄靈夏況我強盛百倍往時今若稱兵必能得志此元昊反狀有素者三也朝廷纍次遣使元昊多不致恭或故作滯留而不迎或佯為匆遽而見迫或欲負扆而對或欲專席而居雖相見之初暫御臣下之服而送出之後更具帝者之儀蓋久已稱尊成其驕態忽下編於臣列深耻見於國人且講異圖自求足志此元昊反狀有素者四也頃年靈州屯戍軍校鄭美奔戎德明用之特兵朝廷終失靈武元昊早蓄姦險務收豪傑故我舉子不第貧賤無歸如此數人自投於彼元昊或授之以將帥或任之以公卿推誠不疑倚為謀主彼數子者既不得志於我遂奔異域觀其決䇿背叛發憤包藏肯教元昊為順乎其效鄭美必矣此元昊反狀有素者五也西北相結並擾中原邉疆之患莫甚於今頃者元昊援契丹為親私自交通共謀寇難緩則指為聲勢急則假其師徒至有犄角為竒首尾相應彼若多作牽制我則困於分張蓋先已結北敵之強方敢立中原之敵此元昊反狀有素者六也是六者嵗月已久中外共聞而天子不得知朝廷不為備養成深患遂至大騷此乃兩府大臣之罪也此外元昊大抵復知朝廷以久安自恃不悟邉鄙之防以無戰為常不求將帥之具士卒驕惰器用凋零無謀臣䇿士以經營四方無宏綱大紀以控制萬國以此故元昊敢以一方之衆抗我天下之師輒稱皇帝殊不忌憚其為小戎輕蔑也如此略遣數介平致尺書而大臣不知所為措置乖失以致調發軍旅塞滿邉陲戰陳未嘗一施儲饋已聞屢窘關中大擾人心不寧而元昊宴安自居一毫無損坐觀其弊竊笑所為其為小戎侮玩也又如此臣雖賦性至昧語才不長然自聞騷繹常切憂憤況臣知元昊必為今日之患十年于兹矣懷不能已遂於景祐元年嘗進文數軸內閲將一篇頗敘其事當時朝廷方謂天下大定四夷無虞臣不敢極陳西戎不賓之由但述選將預備之策而已不見省納棄為空文今變故已成邉事為梗致陛下憂勞在念旰昃唯勤專委任於輔臣謀削平於寇亂僅周嵗序尚留天誅且自用武以來作事多失凡降一詔未嘗合朝廷之宜凡建一謀未聞協天下之望寬猛不中動靜皆違謂之德則人不肯懷謂之威則人不肯懼威德既弛夷夏何觀臣今略舉八條止為戎事未論其他伏惟至明詳擇一事伏聞元昊遣使全擬北庭部伍甚雄辭禮俱亢觀其勇悍難制強辨自髙若非使者請行即是元昊選差取其籌畫推為腹心必謂不敢加誅得以恣行強暴以能揣敵情為有智以不辱君命為得賢我若察其所叛之謀知其所求之意存之則元昊遂其志誅之則元昊喪其魄所宜始至之日盡斬都市事出不意乖其本謀即時宣聞遂行削奪或命將致討或發兵備邉上則可以示大邦不測之威下則可以杜小人好亂之漸豈不韙哉戎人必憚而失國戰士必為之增氣而反逺從境上召至都下資其貿易待以雍容重幣遣還優辭慰恤意者豈非冀其回心易慮而伏義向化乎夫朝廷結以恩信幾四十載尚無懷感之意終至反常之祻豈兹姑息遂可悛移且以放還謂之懷柔邪則元昊悖逆之性何懷柔之肯馴謂之矜恕耶則元昊僣竊之罪何矜恕之可忍謂之他計率無可觀只是執事者巽懦自居優遊不斷殺之恐其急擊囚之恐其有辭遂至放還優示寬貸向若未能加戮只宜境上交回使其不測淺深猶可謂之良策召而復遣理有何長乃是大國之謀悉為小戎所料遂其所以能揣敵情之智成其所以不辱君命之賢況當時調發正當輦運相屬道路雜沓民口沸騰使之往來盡得聞見謀事若此取侮之道也臣嘗觀前史見隗囂遣將髙峻據髙平光武使寇恂往降之峻命皇甫文出謁辭禮不屈恂立斬之峻即日降諸將曰殺其使而降其城何也曰文者峻之腹心今者辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳又唐太宗即位突厥入寇直至涇州突厥遣其腹心執矢思力入朝為覘自張形勢云百萬之兵今且至矣乃請反命帝誚之曰我先戮爾蕭瑀封德彛請禮遣之帝曰不然今若放還當謂我懼遂縛思力囚於門下勒兵欲戰突厥懼遂請和伏惟陛下觀寇恂唐太宗之所為復思今日元昊殊不悔過則當誅其來使果是邪非邪機會一失不可復得臣深念此痛惜萬萬也若事皆此類祻未可知二事伏自元昊稱亂西鄙震驚或帥臣乞師或朝議遣使沿邉要害宿兵猥繁雖與舊日不侔然亦不過一二十萬京師屯衛則差減天下禁旅則尚多起為應兵未嘗乏使切見自去年十二月至今年四月末半年之內相繼三度揀軍皆遣使臣傳布宣命每至一郡無不張皇仍帶殿侍數貟畨次押人赴闕村民恐懼未點鄉軍致有奔竄山林鑽鑿支體不顧傷毁茍避涅黥久乃知其非然其如終是已惑三揀兵士厥數臣則不知然觀此施為所獲必鮮若其事頻驚衆則莫甚於兹臣又伏思內則省庭外則轉運司以至州縣勤勞供職嚴峻用刑所急之須唯財是務盡農畝之稅竭山澤之利舟車屋宇蟲魚草木凡百所有無一不征共知困窮都為賦斂自來天下財貨所入十中八九贍軍軍可謂多財可謂耗矣今始用武遽稱乏人即不知向時所贍之軍何在所耗之財何益殊未戰鬪已大驚擾萬一或至敗衄頻有殺傷須行補添别設應援至時又不知調發者何所揀選者幾畨比之今來必大興作凡係兵籍既已不充所謂鄉軍豈免強配此時百姓所懼將來必有不虛若果行之為患非細三事伏見今年四月降中書省劄子稱臣寮上封財賦所出各有攸司由外以充內自下而奉上者也又曰仍取羡登用備供入乞戒諭諸路轉運司如用度或闕須管自擘畫支贍若的是圓融不出即許於鄰道穀有剩處支那不得更似日前乞自京般請錢銀之類遍行下者臣聞民者本也存心於民則邦國寧財者末也屬意於財則黎庶畔是以王者以天下之財養天下之民不聞誅求以害生靈蓄積以奉私欲易曰何以聚人曰財禮曰財散則人聚此經典之明文也伏以國家肇造之時疆境甚隘財賦至微而征伐不停用度亦足洎太祖盡取川蜀河東江南兩浙荆南湖南廣南閩粵之地何啻萬里不計逐方所積寶貨當時盡歸京師且以後來賦輸無不經度逐年只留實約軍費其餘每歲盡數上供民力所輸秋毫無隱不間逺邇不問炎涼輦運縱橫水陸奔湊官司督責時無暫休凡天下如此者已七十年矣豈非由外以充內自下而奉上乎而又干戈不作華夏底寧唯是常須别無他費臣謂都下財貨固當在處如岡如阜有入無出莫知紀極諸路運司以逐州實約之費無多羡餘其間年嵗有凶殺則必蠲除朝廷有要索則必應副多行搜括裁可張羅若又分外督之不知出於何所朝廷既行誡諭運司不敢冒違無計以供唯民是取民若可出豈復行仁民又不禁必生怨怒虧損和氣馴致深憂是元昊擾邉陕西被苦士馬日濟芻粟頓竭繕治甲兵修築城壘百役興作萬倍艱難復阻旱災無收農賦中糴之入既不厚鬻爵所得又不豐數十萬兵無所仰給坐觀困弊不行救恤而執事者尚曰財賦者由外以充內自下而奉上爾之不足爾自營求是何乖方之深也夫上下相繼中外一體豈可豐上而刻下空外而實中下茍困則上豈得安外若搖則內豈能定況以七十年天下所入而救此日一方之急豈為難哉若但誅求取足人民無所逃避變亂豈有不生手足之患未除心腹之疾又作則臣深為執事者危之臣不敢逺引古事恐煩省察只以本朝事驗之切聞太宗皇帝初實內帑嘗謂侍臣曰河東敵境甚邇吾必取之至時不免擾民今內帑所積以備調發戒重擾也其後皆如詔卒不擾下今元昊背畔關中用兵要在安民圖共禦寇而反靳中府無用之物擾四方已困之民惜財費人大非太宗皇帝之所用心也臣又聞王者貴為天子富有天下藏於天下者天子之富也藏於國內者諸侯之富也藏於室廬篋笥者庶人之富也今執事勸陛下行庶人之事何示人不廣也且又云的是圓融不出許於鄰道支那夫鄰道貨財各有用度必難假輟徒費規求臣又敢以近日一事為證切見河北轉運司奏乞割河東五州十三縣稅賦充河北支用本路自奏一路之費悉賴五州之資若遂割移殆難供給尋具聞奏事已寢停鄰道支那徒虛語爾唯是朝廷逐急救濟乃為良圖矧向者居無事之時已行假貸豈今來當用武之際復致艱難前後不侔利害可見臣謂建此計者不姦則妄贊其説者非愚則諛惟陛下鑒之以明斷之以果則大事不失而帝業可保矣四事切見去歲降詔令內外兩省官及諸司使副在邉者并軍職刺史等近百人各結罪保舉殿直京官已上委無贓私堪充邉任者臣聞有德者然後知人之德有才者然後識人之才無德者見有德必憎非才者見有才必忌唯憎與忌固非存公萬一才德雖疏憎忌不作其如所見相戾所為相乖使之擇人何由得士切以兩省官及諸司使副雖名顯官豈必皆賢多由積纍而升亦有容易而得軍職刺史本是武夫校力則多語識全少盡令舉將帥之士便以委邉塞之權不問舉主之才德如何安知所舉者善惡若忌憎已有所害乖戾復更相乘所舉之人豈堪任事臣又聞官大者德未必大位髙者才未必髙京朝殿直之流固有可採借職選人之輩豈盡無能假有兩省官識一選人果有竒才又有諸司使副識一借職果有異術借可薦舉置于邉陲而限以詔條須且棄置宛轉尋訪别得所聞久諳與旋擇固殊目覩與耳聞又邈限官而選得士為難臣又聞善任人者必適其所用善御物者不強其不能蓋以輪轅異宜鑿枘殊制茍只取其無過而不問其用之所有祗重其守亷而不究其謀之所存則臨事必隳當官必敗亷而無過者行也用而有謀者才也行則主於化導才則主於經營居治安之時宜乎化導以行在擾亂之日則當經營以才大凡處邉任者小則乘一障大則守一州或驅馳戰陳之間或出入荒遐之境或經度糧草或􅌻習山川或逞驍勇以雄邉或行反間以疑敵或陳討伐之䇿或謀守禦之術如此數事皆須藉才必求非常之人乃立非常之效若但取齪齪無過規規守廉施之邉方萬必無用不止無用必誤軍機徒令舉者易與而自便爾後有喪師失律其若我何臣謂此詔舉官蓋因循平日所行甚非今時之宜也臣伏望兩省官諸司使副或軍職刺史在邉者不可一例受詔宜令兩府精擇有才識公望卓然為人所稱者方令舉官仍宜不限品秩自借奉職選人已上皆得充舉所保之事須保堪任邉上重難任使如上之所陳或本人邉事不集並當同罪則人人自畏豈敢容易而舉哉十得十百得百不虛授不濫賞斷可知矣倘有所纍許其自新得出沈埋必有植立夫先擇舉主則所舉者不謬矣不限品秩則下位有才者不遺矣不免責罰則負犯者激勵而自奮矣利害甚煥可舉而用然須能否既著賞罰必行國無虛辭人則皆勸五事切聞鄜延路嘗與蕃兵接戰有一寨主為蕃兵所得及虜去軍民甚衆西頭供奉官閣門秖候馬遵引兵追戰即時奪回延帥范雍及副部署劉平奏乞酬奬朝命只遷東頭供奉官而已伏以元昊僣尊西陲被擾方勵武節以寧邉患其要在乎善惡必辨賞罰必明則人各有心孰不宣力賞若當則有功者愈勸罰若當則有過者自悛賞罰不明功過兩弛轉相教告誰肯奮激武節不勵戎心益生有敗而無成有亂而無治漸漬不救淪胥以鋪蓋由乎辨之不早也夫馬遵者出死力突堅圍引既衄之兵入不存之地奪已擒之將士拔已陷之師徒雖非大功亦可謂之竒節矣況范雍劉平者國家方大倚注保奏理合超遷只進一官殊乖輿論當兹始初用武尤在賞勸激人茍未得宜必難勵衆臣切聞河北一都巡檢王守琪捉殺得獨流寨潰散兵士二三十人自禮賓副使轉供備庫使仍差知隴州又見京東都巡檢李知和捉得劫賊七人自內殿崇班轉供備庫副使此二賊徒者只是草竊之輩固非勍敵之人殺之不足震天威縱之不能成大患而王守琪則驟遷十餘級李知和亦超轉兩資至於馬遵者出境討賊不顧存亡援溺救焚皆得全活上可以壯朝廷之威下可以抑僣國之強比王李之功效則度越有餘比王李之遷酬則數倍不足邉臣見之失色元昊聞之長姦用人若斯致寇之道也六事近於七月中伏聞中書樞密院同進呈募擒元昊科格遂告示天下者切以拓跋異類西域諸羌自唐末亂離五代爭戰據乃土宇侈其封疆時肆猖狂罕能懷服常致邉患每勞王師歷代以荒服處之置諸度外國家引為宗屬付以節旄割賜名城世襲王爵廪給甚厚貿遷弗停其國富強皆我資用是偏隅一洗僻陋則我於西夷恩德豈不大哉盟誓弗渝始終無負而元昊不圖報效輒肆頑凶欺誣上天僣竊大號合行誕告速置明誅庶伸征伐之權以快人神之憤況自西陲變動天下震驚聚目而觀攢耳而聽或謂朝廷有上策廟堂有竒兵豈容有臣敢行稱亂顒顒佇望以日繫時殆踰半年不聞下令久之乃舉削奪之罰行募賞之科何其隘哉夫始未有為人實莫測一旦告諭共知非謀孰不疑朝廷自怯未能加誅於元昊而又慮久無處置姑設賞募以厭天下之望乎適足示弱不足厭人示人以強猶懼不振示人以弱其弊何勝故書曰安危在出令存亡在所任若謂元昊小戎無費民力但誅首惡足致和平則臣請終始陳之切聞自邉事初警即行調發師徒合雜器械堆盈官私俱勤道路如沸易置邉吏辨集軍糧關輔大騷黎庶已困何民力之無費焉募令一施敵情愈祕知有竊發益自周防增置守衛之兵廣募禦侮之士寢食必以計出處必以權動則有謀大為之備何首惡之可募焉況夫募者起於亂秦用於末世三代已往不聞有此豈我太平之世天下一統偶有小醜背畔稽之典䇿自有討禦而執事者不為良畫遽勸陛下行亂秦末世之事乎既非至公之謀又匪常行之法然有不得已者亦或為之何則苦於用兵終未獲敵思為助兵之術則募之漢髙祖於項羽是也兵力驟敗敵勢轉盛內懷震懼計無所出則募之王莽於劉演是也用兵不一困於支離敵又相乘力不能應則募之梁太祖於劉知俊是也一夫跳走不知所從雖有兵甲之強無以加討則募之楚平王於伍貟之類是也募賞雖設無一獲者是募賞為無益不可全任明矣今元吳初叛未嘗大戰非苦於用兵也師旅屯聚空食邉陲非兵力驟敗也諸方不聳獨西鄙有警非用兵不一也元昊大據全夏擁衆不伏非一夫跳走不知所從也臣以此觀之甚非用募賞之時且以我大邦坐視小醜況我直彼曲奚所憚焉正朝廷之大刑副天下之公議舉不失體動則有辭欲征則征之足以示猛欲守則守之姑以示寬表以大御小之權行禁暴安民之道號令天下豈不偉哉何乃偷募茍求潛謀竊取似同盜劫不敢公行謂之容則元昊之惡不可容謂之忽則元昊之謀不可忽謂之惜用則用已費矣謂之惜民則民已勞矣况又濟師已衆遣將已多邉境騷然曠日持久而反止於用募更無他圖倚之幸安謂已得策以此厭天下之望以此安君上之心臣深為執事者羞之兵既不行募又無得為此逗撓不減戍糧國用且殫民財是取怨叛必作表裏合攻臣亦甚為陛下憂之夫元昊既懷逆謀彼必大為禦備今聞上下募賞自知髙枕無虞外裔之心畏強侮弱因而肆暴遂成深憂若誘之使來自有方略則非臣所知萬一執事者謀之不臧技止於此遷延玩冦嗢沒養姦禍已成而計窮敵已大而力屈則誰復為陛下圖之七事伏聞秋初夏守贇為樞密使夫樞密之任秉國大權起於有唐始用宦者降及後世更以武臣國家恩禮益隆委任尤重本天下之兵柄代天子之武威勢均中書號稱兩府茍為轉授不若闕官夏守贇早事先朝嘗參儲吏既緣攀附漸致顯榮惟事貴驕罔思畏謹每更劇任頗乏清名才術無聞公忠弗有一旦擢居衆賢之上俾贊萬務之機朝命則行人心不允又況元昊作梗西陲用兵上資睿聖之謀下取樞臣之畫庶臻泰定以安黔黎所宜妙擇才能削平禍亂而罔詢厥德遽用斯人不問賢愚皆所輕笑夫樞密者內陶鑄武臣外鎮撫四裔無事則坐制機軸以修武備用兵則指畫方略以殄寇讐是四者皆非守贇所能知其髣佛而正當用武之際使踐論兵之職不悮國事復何為哉雖樞府之柄不專一人然大抵任賢豈當如是傳曰得賢則能為邦家立太平之基書曰罔有立政用憸人惟吉士用勱相我國家是則賢者可以立太平而憸人不可與於政也始陛下用守贇蓋以為賢者可立太平故用之茍知其憸人則必不用矣使陛下用而不知者執政緘默之過也用之和平之日已曰濫官委於艱難之時尤為非據英傑為之解體姦雄為之生心唯是得賢乃能靜亂臣又聞為國家者得人則安失人則危得人則重失人則輕唐郭子儀係乎安危者也入則天下安出則天下危裴晉公係乎輕重者也進則朝廷重退則朝廷輕今守贇反是其在朝廷也雖未即致危亦可謂取輕矣亟宜罷免以重觀瞻所以示陛下不私於一人而蓋為萬世也臣又慮者以其嘗為攀附而謂之親信可使以其久歷寄任而謂之耆舊可尊以其官是節制而謂能知兵以其貌甚魁梧而謂能鎮俗是皆不然唯盡公者可以親信不主乎攀附之遇唯宿德者可謂耆舊而不在乎寄任之多有才武而好學則能知兵不在乎官有器業而不佻則能鎮俗不在乎貌伏唯陛下察守贇之所立驗守贇之所為可謂盡公宿德者乎可謂有才武而好學有器業而不佻者乎臣於守贇愛惡不相干聲迹不相接非有家世之隙祿位之嫌而進是説也但聞諸公議有足惜者區區之懇實願究陳八事伏聞西鄙用兵以來不住差移武臣往彼每有過闕下而求見者不多許見臣切詳所謂未見其宜謂之天子至尊不可令小臣浼瀆則非所以詢芻蕘而廣接納也謂之循守舊例未嘗許小臣求見則今用兵要在開通壅非循舊例阻絶人臣之時也謂武臣多鄙不可令容易而對則既已委任用為好人非宜鄙之也謂朝廷差除自有命令本職所管自有局分不必令對則用兵之際事與舊殊本職或有更張局分亦有規制何由聞逹非以博究利病而剪除凶孽之意也以此四事求之臣故曰切詳所謂未見其宜今邉寇方興陕西大擾朝廷多發兵伍選任武臣雖則直禦寇戎蓋亦分備他盜凡有武臣求對必於邉事有聞陛下聼朝之餘何惜一見召於咫尺待以從容霽其威顔加之善誘使無懼懾盡日敷陳然後觀其奏對之是非察其趣向之邪正可者則奬激而遣之不可者亦優容而罷之如此則自謂官家知我姓名身心有所分付不患邉奏不省不憂權臣害能各盡所懷無不感恱勇鋭而去罄竭為期刻志夷凶立功報主局分豈有不寧聖人所以感人心而天下和平者蓋用此矣又何憂乎叛寇何恤乎用兵陛下勤勞之心豈不至哉接納之禮豈不優哉聞見之事豈不博哉今却其所求不與之見奏對之是非無由辨趣向之邪正不得知彼又自謂朝廷雖然遣行官家未嘗識靣但從職任罔察事情胸臆不伸括囊而去至則邉事擬奏而不敢奏兵機欲陳而不敢陳或慮聰明不聞或憂權臣見忌人皆懼禍誰肯盡心縱有疏聞豈如靣奏陛下勤勞之心則怠矣接納之禮則疏矣聞見之事則隘矣禍不滋蔓已為大幸如望寇之速平兵之速弭則不可得也議者又謂臣曰此非主上怠於勤勞而踈於接納蓋執政者自知致寇常慮獲罪不欲許人非次上殿或論奏四方之事或有陳兩府之罪開悟聖人聰明則非已之利也故但奏云某人已有差使某人已與遷補所求入見不宜允從只欲徼望恩榮别希錫賜以此罔上上以為然意欲阻絶天下是非蔽塞天子耳目自以為安身之計也臣謂果有是事則非臣所知唯在陛下察其忠邪而進退之則蒼生之福也宗社無疆之慶也弼又上奏論不可待西使太過疏曰臣近者切聞昊賊遣其偽六宅使賀從勉齎書到闕欲議通好事頗祕密臣不知審實但外人傳説昊賊來書未肯稱臣别圖位號兼臣昨在西京門居養疾切見傳宣下河西一路州軍排備祇候西使次第甚盛又令逐州通判就驛相看置酒管領臣甚憂事體太過必恐下靣難為處置有失中國制馭外裔之術也臣又切聞西使之來非自然之意蓋契丹特遣使往河西教之令來既是元昊稟畏契丹使來貢奉元昊不敢不從即不假匆忙可且持重與之商議縱時下未合必有後圖今來請和既不由元昊使人豈能專其可否以此思之朝廷待西使不必過當大凡措置機事在乎制之於初初若失宜後難救應臣又今日切聞西使入見賜與甚多既許人使偽官之稱則元昊所圖勢難止遏茍一一遂其所欲臣不知向去事體如何況臣去年兩使北敵所議西事甚是分明臣前後邀勒度數頗多不能一一記憶臣今省得再去時與館伴劉六符所説一節臣謂六符云北朝將來令元昊如何歸附須是却令依舊納欵不可令别有所望六符云固是如此況元昊自來稱臣於南朝今來更待望甚定是須令納欵稱臣況南朝與北朝書云彼若翻然效順此必待之如初臣今記得上項一節甚明伏乞朝廷檢會臣再奉使過日别録照對方見的實向者所許北敵歲添金帛之數蓋為令他指揮西事初既不避張此名聲今來又却不依舊約則是虛受前耻而不獲後效甚可痛惜也此事朝廷須是廣為思慮何者北敵元許却令稱臣今來自是朝廷過有許可亦恐北敵意不欲謂元昊於中國尚不肯稱臣於我豈肯甘分則是因此致他北敵亦難制元昊元昊亦自此所圖愈大也若北敵遣使以此來問則朝廷何辭以對又慮元昊若不稱臣於朝廷則北敵必曰元昊本稱臣於南朝今元昊既於南不復稱臣漸為敵國則是元昊與南朝等唯我契丹獨尊矣臣謂北敵因此益熾必自喜名分暗定異日稍有釁隙緣此若有所求則未知朝廷何以待之臣旦夕思此二事將必有一焉不可不深圖不可不早慮願朝廷且執北敵所約更加裁擇不可容易過許則不至别生後患臣又恐延州及京師幹當事人且貪成功不為國家思後來之患伏乞陛下與兩府臣寮深切計慮必無後悔然後從而行之則天下之幸宗社之福臣不勝懇懇之至歷代名臣奏議卷三百四十二
