body:
  text: 歷代名臣奏議卷十八明楊士竒等撰郊廟後漢髙祖入汴初營宗廟帝以姓自漢出遂襲國號尊光武為始祖并親廟為五詔羣臣議刑部尚書竇貞固上言曰按王制天子七廟諸侯五大夫三士一正義曰周之制七廟者太祖及文王武王之祧與親廟四也又曰七廟者據周也有其人則七無其人則五至光武中興及魏晉宋齊隋唐或立六廟或立四廟蓋建國之始未盈其數也禮曰德厚者流光此天子可以事六世之義也今陛下大定寰區重興漢祚旁求典禮用正宗祧伏請立髙曽祖禰四親廟又自古聖王祖有功宗有德更立始祖在四廟之外不拘定數所以或五廟或七廟今請尊髙皇帝光武皇帝為始祖法文王武王不遷之制用歷代六廟之規庶合典禮漢祖從之後周世宗顯德五年將禘於太廟言事者以宗廟無祧室不當行禘祫之禮國子司業兼太常博士聶崇義上言其略曰魏明帝以景初三年正月上仙至五年二月祫祭明年又禘自兹後以五年為禘且魏以武帝為太祖至明帝始三帝未有毁主而行禘祫其證一也宋文帝元嘉六年祠部定十月三日大祠其太學博士議云案禘祫之禮三年一五年再宋髙祖至文帝裁亦三帝未有毁主而行禘祫其證二也梁武帝用謝廣議三年一禘五年一祫謂之大祭禘祭以夏祫祭以冬且梁武乃受命之君裁追尊四朝而行禘祫則知祭者是追養之道以時移節變孝子感而思親故薦以首時祭以仲月間以禘祫序以昭穆乃禮之經也非關宗廟備與未備其證三也終從崇義之議南唐嗣主保大中太常博士陳致雍進祖宗配郊位議曰臣伏聞禘郊祖宗配食之文其來有秩以逺祖而配者始封之君是也若皇唐奉太祖景皇帝冬至配圜丘夏至配方丘法周人郊后稷之義也以近祖而配者受命之君是也若髙祖神堯皇帝孟春配祈榖法周人祖文王之義也太宗文皇帝孟夏配雩祀法周人宗武王之義也國家憲章三代專配郊丘得禮之正也自開元中不用太祖景皇帝配天地以髙祖神堯皇帝配天地謂髙祖受命之君有天下不因於景皇帝至永泰元年太常博士獨孤及議云太祖景皇帝于柱國之任翼周弼魏肇啓王業建封于唐髙祖因之以有天下之號天之所命也亦猶周后稷始封之祖若廢配天地是太祖之廟毁也二年禮儀使杜鴻漸與獨孤及議同自是相承復依武德貞觀故事故不用開元禮文我烈祖再造區宇建七世之廟奉髙祖居昭穆之上景皇帝不在太祖之位故以髙祖配天地太宗配雩祀所以配雩祀者蓋興復以來未暇祈榖之祭故也竊以髙皇帝廟號烈祖功格上玄居百世以不遷繼中興而垂統禮合躋升之義位崇昭配之文修撰髙逺所奏未協舊章然則國朝大祀嵗只有三若上遷太宗文皇帝配皇地祇是祖宗皇帝之功有差父子之倫不序子雖齊聖不先父食周人所以郊祀后稷宗祀文王以后稷為天地之主文王避祖之位今或依奏以太祖配皇地祇則于禮無謂未若建孟春祈榖一祭以太宗從下佐食然可奉烈祖髙皇帝孟夏配雩祀使尊祖之禮得申免齊聖之食有黷考古沿酌庶協厥中伏請更下尚書省衆官定議宋太祖建隆元年有司請立宗廟詔下其議兵部尚書張昭等奏謹案堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建國改立六廟蓋昭穆之外祀契與湯也周立七廟蓋親廟之外祀太祖與文王武王也漢初立廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之室隋文但立髙曽祖禰四廟而巳唐因立親廟梁氏而下不易其法稽古之道斯為折𠂻伏請追尊髙曽四代崇建廟室三年國子司業兼太常博士聶崇義表上參定郊廟祭玉詔令太子詹事尹拙集儒學三五人更同參議拙多所駁正崇義復引經以釋之悉以下工部尚書竇儀俾之裁定儀上奏曰伏以聖人制禮垂之無窮儒者據經所傳或異年祀寖逺圗繪缺然踳駿彌深丹青靡據聶崇義研求師説耽味禮經較於舊圗良有新意尹拙爰承制旨能罄所聞尹拙駮議及聶崇義答義各四卷臣再加詳閲隨而裁置率用增損列於注釋共分為十五卷以聞詔頒行之拙崇義復陳祭玉鼎釡異同之説詔下中書省集議吏部尚書張昭等奏議曰按聶崇義稱祭天蒼璧九寸圎好祭地黃琮八寸無好圭璋琥並長九寸自言周顯德三年與田敏等按周官玉人之職及阮諶鄭玄舊圗載其制度臣等按周禮玉人之職只有璧琮九寸瑑琮八寸及璧羡度尺好三寸以為度之文即無蒼璧黃琮之制兼引注有爾雅肉倍好之説此即是注璧羡度之文又非蒼璧之制又詳鄭玄自注周禮不載尺寸豈復別作畫圗違經立異四部書目內有三禮圗十二卷是隋開皇中敕禮官修撰其圖第一第二題云梁氏第十後題云鄭氏又稱不知梁氏鄭氏名位所出今書府有三禮圗亦題梁氏鄭氏不言名位厥後有梁正者集前代圗記更加詳議題三禮圗曰陳留阮士信受禮學於潁川綦册君取其説為圗三卷多不按禮文而引漢事與鄭君之文違錯正刪為二卷其阮士信即諶也如梁正之言可知諶之紕謬兼三卷禮圗刪為二卷應在今禮圗之內亦無改祭玉之説臣等參詳自周公制禮之後叔孫通重定以來禮有緯書漢代諸儒頗多著述討尋祭玉並無尺寸之説魏晉之後鄭玄王肅之學各有生徒三禮六經無不論説檢其書亦不言祭玉尺寸臣等參驗畫圗本畫周公所説正經不言尺寸設使後人謬為之説安得便入周圗知崇義等以諸侯入朝獻天子夫人之琮璧以為祭玉又配合羡度肉好之言強為尺寸古今大禮順非改非於理未通又據尹拙所述禮神之六玉稱取梁桂州刺史崔靈恩所撰三禮義宗內昊天及五精帝圭璧琮璜皆長尺二寸以法十二時祭地之琮長十寸以效地之數又引白虎通云方中圓外曰璧圓中方外曰琮崇義非之以為靈恩非周公之才無周公之位一朝撰述便補六玉闕文尤不合理臣等竊以劉向之論鴻範王通之作元經非必挺聖人之姿而居上公之位有益於教不為斐然臣等以靈恩所撰之書聿稽古訓祭玉以十二為數者蓋天有十二次地有十二辰日有十二時封山之玉牒十二寸圜丘之籩豆十二列天子以鎮圭外守宗后以大琮內守皆長尺有二寸又祼圭尺二寸王者以祀宗廟若人君親行之郊祭登壇酌獻服大裘搢大圭行稽奠而手秉尺二之圭神獻九寸之璧不及禮宗廟祼圭之數父天母地情亦奚安則靈恩議論理未為失所以自義宗之出歷梁陳隋唐垂四百年言禮者引為師法今五禮精義開元禮郊祀録皆引義宗為標準近代晉漢兩朝仍依舊制周顯德中田敏等妄作穿鑿輒有更改自唐貞觀之後凡三次大修五禮並因隋朝典故或節奏繁簡之間稍有釐革亦無改祭玉之説伏望依白虎通義宗唐禮之制以為定式又尹拙依舊圗畫釡聶崇義去釡畫鑊臣等參詳舊圗皆有釡無鑊按易説卦云坤為釡詩云惟錡及釡又云溉之釡鬵春秋傳云錡釡之器禮記云燔黍捭豚解云古未有甑釡所以燔捭而祭即釡之為用其來尚矣故入於禮圗今崇義以周官祭祀有省鼎鑊供鼎鑊又以儀禮有羊鑊豕鑊之文乃云畫釡不如畫鑊今諸經皆載釡之用誠不可去又周儀禮皆有鑊之文請兩圗之又若觀諸家祭祀之畫今代見行之禮于大祀前一日光祿卿省視鼎鑊伏請圗鑊於鼎下詔從之太宗淳化三年將以冬至郊前十日皇子許王薨有司言王薨在未受誓戒之前準禮天地社稷之祀不廢詔下尚書省議吏部尚書宋琪等奏以許王薨謝去郊禮裁十日又詔輟十一日以後五日朝參且尊成服百僚皆當入慰有司又以十二十三日受誓戒按令式受誓戒後不得弔喪問疾今若皇帝既輟朝而未成服則全爽禮文百僚既受誓而入奉慰又違令式況許王地居藩戚望著親賢於昆仲為大宗於朝廷為冢嗣遽兹薨逝朝野同哀伏想聖情豈勝追念當愁慘之際行對越之儀臣等實慮上帝之弗歆下民之斯惑況祭天之禮嵗有四焉載于禮經非有差降請以來年正月上辛合祭天地從之真宗咸平元年判太常禮院李宗訥等言僖祖稱曽髙祖太祖稱伯文懿惠明簡穆昭憲皇后並稱祖妣孝明孝憲孝章皇后並稱伯妣按爾雅有考妣王父母曽祖王父母髙祖王父母及世父之別以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文事下尚書省議户部尚書張齊賢等言王制天子七廟謂三昭三穆與太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊本祖而重正統也又云天子絶期喪安得宗廟中有伯氏之稱乎其唐及五代有所稱者蓋禮官之失非正典也請自今有事於太廟則太祖并諸祖室稱孝孫孝曽孫嗣皇帝太宗室稱孝子嗣皇帝其爾雅考妣王父之文本不為宗廟言也歷代既無所取於今亦可不行景德中南郊鹵簿使王欽若上言曰五方帝位板如靈威仰赤熛怒含樞紐白招拒叶光紀恐是五帝之名理當恭避禮官言開寶通禮義纂五者皆是帝號漢書注自有名即蒼帝靈府赤帝文祖白帝顯紀黑帝玄矩黃帝神斗是也既為美稱不煩回避二年欽若又言漢以五帝為天神之佐今在第一龕天皇大帝在第二龕與六甲嶽瀆之類接席帝坐天市之尊今與二十八宿積薪騰蛇杵臼之類同在第三龕卑主尊臣甚未便也若以北極帝坐本非天帝蓋是天帝所居則北極在第二帝坐在第三亦髙下未等又太微之次少左右執法子星之次少孫星望令司天監參驗乃詔禮儀使太常禮院司天監檢定之禮儀使趙安仁言按開寶通禮元氣廣大則稱昊天據逺視之蒼然則稱蒼天人之所尊莫過於帝託之於天故稱上帝天皇大帝即北辰耀魄寶也自是星中之尊易曰日月麗乎天百榖草木麗乎土又曰在天成象在地成形蓋明辰象非天草木非地是則天以蒼昊為體不入星辰之列又郊祀録壇第二等祀天皇大帝北斗天一太一紫微五帝坐差在行位前餘內宫諸位及五星十二辰河漢都四十九坐齊列俱在十二陛之間唐建中間司天冬官正郭獻之奏天皇北極天一太一準天寶敕並合升第一等貞元二年親郊以太常議詔復從開元禮仍為定制郊祀録又云壇第三等有中宫天市垣帝坐等十七坐並在前開元禮義羅云帝有五坐一在紫微宫一在大角一在太微宫一在心一在天市垣即帝坐者非直指天帝也又得判司天監史序狀天皇大帝一星在紫微勾陳中其神曰耀魄寶即天皇是坐五帝乃天帝也北極五星在紫微垣內居中一星曰北辰第一主月為太子第二主日為帝王第三為庶子第四為嫡子第五為天子之樞蓋北辰所主非一又非帝坐之比太微垣十星有左右執法上將次將之名不可備陳故總名太微垣星經舊載孫星而壇圗止有子星辨其尊卑不可同位竊惟壇圗舊制悉有明據天神定位難以躋升望依星經悉以舊禮為定欽若復言舊史天文志並云北極北辰最尊者又勾陳口中一星曰天皇大帝鄭玄注周禮謂禮天者冬至祭天皇於北極也後魏孝文禋六宗亦升天皇五帝上按晉天文志帝坐光而潤則天子吉威令行既名帝坐則為天子所占列于下位未見其可又安仁議以子孫二星不可同位陛下方洽髙禖之慶以廣維城之基茍因前代闕文便為得禮實恐聖朝茂典尤未適中詔天皇北極特升第一龕又設孫星于子星位次帝坐如故欽若又言帝坐止三紫微太微者巳列第二等唯天市一坐在第三等按晉志大角及心中星但云天王坐實與帝坐不類詔特升第二龕三年龍圗閣待制陳彭年言伏覩畫日來年正月三日上辛祈榖至十日始立春按月令正月元日注為祈榖郊祀昊天上帝春秋傳曰啓蟄而郊郊而後耕蓋春氣初至農事方興郊祀昊天以祈嘉榖當在建寅之月迎春之後自晉泰始二年始用上辛不擇立春之先後齊永明元年立春前郊議欲遷日王儉曰宋景平元年元嘉六年並立春前郊遂不遷日吳操之云應在立春前然則左氏所記乃三代彛章王儉所言乃後世變禮來年正月十日立春三日祈榖斯則􅊞王儉之末議違左氏之明文望以立春後上辛行祈榖禮因詔有司詳定諸祠祭事有司言今年四月五日雩祀上帝十三日立夏祀赤帝按月令立夏之日天子迎夏于南郊注云為祀赤帝於南郊又云是月也大雩注云春秋傳曰龍見而雩龍星謂角亢也立夏後昏見於東方按五禮精義云自周以來嵗星差度今之龍見或在五月以祈甘雨於時巳晚但四月上旬卜日今則惟用改朔不待得節祭於立夏之前殊違舊禮之意茍或龍見於仲夏雩祀於季春相去遼闊於禮未周欲請並于立夏後卜日如立夏在三月則待改朔四年判太常禮院孫奭言準禮冬至祀圜丘有司攝事以天神六百九十位從祀今惟有五方上帝及五人神十七位天皇大帝以下並不設位且太昊勾芒惟孟夏雩祀季秋大享及之今乃祀於冬至恐未協宜翰林學士朝迥等言按開寶通禮圜丘有司攝事祀昊天配帝五方帝日月五星中官外官衆星總六百八十七位雩祀大享昊天配帝五天帝五人帝五官總十七位方丘祭皇地祇配帝神州嶽鎮海瀆七十一位今司天監所設圜丘雩祀明堂方丘並十七位即是方丘有嶽瀆從祀圜丘無星辰而反以人帝從祀望如奭請以通禮及神位為定其有增益者如後敕從之真宗時右正言夏竦進䇿曰伏以祀者國之大事民之攸仰天子富有六幽尊極萬國不有祭享何以教民故宗廟有蒸嘗褅祫之殊郊祀有類望燔瘞之差蓋禮天地事鬼神莫重乎祀莫大乎祭潔粢盛豐牲牷藉包茅端黻冕者儀也謹齋戒肅容貌致誠信嚴執獻者恭也儀以昭禮恭以降神與其恭不足而儀有餘不若儀不足而恭有餘易曰東鄰殺牛不如西鄰之禴祭書曰鬼神無常享享于克誠傳曰蘋蘩蕰藻之菜潢汙行潦之水茍有明信可薦於鬼神昔三代之興也祭薄而誠厚及其亡也祀豐而誠怠故先王之戒莫先乎此國家丕命有開天授皇器盛享帝之禮正清廟之位雖曰唐漢無或比隆祀事之間竊有惑焉夫九祭六號禮則有差百拜三獻恭則無異朝廷之制三年而郊陛下端圭冕修齋戒著誠致潔昭事上帝元元之民咸知感嘆頌聲洋洋流美道路至於朝日夕月四郊迎氣則以萬幾之煩特詔執事將命文臣大儒足以承式或聞行事之官祝史之貟不無齷齪之士頗用貴遊子弟罕能虔恭夙夜多乃懈怠祀事若聖明之德享之則巳若以祭官神其吐之伏願陛下遵倣經義躬視祭獻必若聖政少暇願擇良臣視事應宗祝之官選任儒雅嚴其戒誓劾其怠慢昭夫肅恭之德教以孝謹之禮其德上逮其教下流則神人和樂災害不生淳厚之風猶兹漸矣仁宗初即位同判禮院謝絳論宣祖配侑奏曰臣伏覩本院與崇文院檢討官詳定以宣祖配感生帝竊尋宣祖非受命開統因循配祀義或未安臣以謂三代兩漢之際經禮雖著而事逺難法請以唐典明之髙祖武德初定令每嵗圜丘雩祀並以景帝配祈榖大享並以元帝配太宗初以髙祖配圜丘明堂北郊之祀元帝専配感生帝髙宗永徽三年祀髙祖於圜丘太宗於明堂兼配感生帝又以景帝元帝稱祖萬代不遷遂停配祀以符古義臣以謂景帝厥初受封為唐始祖推於事實蓋與宣祖不侔宣祖於唐是為元帝之比唐有天下裁越三世而景元二祖巳停配祀之典且有宋受命于兹四聖而宣祖配侑因而未停與唐非合請依永徽故事停宣祖配享仍用唐太宗故事宗祀真宗於明堂兼配感生帝若據鄭康成説則曰五帝迭王王者之興因其所感別祭於南郊以祖配之今若不用永徽故事則請以太祖兼配正符鄭説而論者以宣祖比周之后稷竊又惑焉詳鄭之意非受命始封之祖則不配故引后稷配靈威仰之義為證唯太祖始基帝業配感生帝據理甚明若以配祈榖與感生帝祠日相妨則當以太宗配祈榖太祖配雩祀亦不失尊嚴之旨臣以謂宣廟非為不遷而迭用配帝于古為疑禮祖有功宗有德但非受命之祖親盡必毁而況配享乎天聖二年二月翰林學士王圭等上議曰同知太常禮院吕夏卿狀古者新君踐阼之三年先君之喪二十七月為禫祭然後新主祔廟特行禘祭之始禘是冬十月行祫祭明年又行禘祭自此五年再為禘祫喪除必有禘祫者為再大祭之本也今當祫祭緣陛下未終三年之制納有司之説十月依舊時享然享廟祫祭其禮不同故事郊享之年遇祫未嘗權罷臘祭是則孟享與享廟嘗併行於季冬矣其禘祫年數乞一依太常禮院請今年十月行祫祭明年四月行禘祭仍如夏卿議權罷今年臘享康定元年直祕閣趙希言奏太廟自來有寢無廟因堂為室東西十六間內十四間為七室兩首各一夾室按禮天子七廟親廟五祧廟二據古則僖順二祖當遷國家道觀佛寺並建別殿奉安神御豈若每主為一廟一寢或前立一廟以今十六間為寢更立一祧廟逐室各題廟號扣寶神御物宜銷毁之同判太常寺宋祁言周制有廟有寢以象人君前有朝後有寢也廟藏木主寢藏衣冠至秦乃出寢於墓側故陵上更稱寢殿後世因之今宗廟無寢蓋本于茲鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之説未足援正自荀卿王肅等皆云天子七廟諸侯五大夫三士一降殺以兩則國家七世之數不用康成之説也僖祖至真宗方及六世不應便立祧廟自周漢每帝各立廟晉宋以來多同殿異室國朝以七室代七廟相承巳久不可輕改周禮天府掌祖廟之守藏寶物世傳者皆在焉其神御法物寶盝扣床請別為庫藏之自是室題廟號而建神御庫焉慶歷元年張方平論郊廟三事疏曰臣前所論請於郊廟致誠以謝天戒此乃內出於精𠂻者然祀享之禮在於內盡志外盡物外盡物者不貴乎物之多也在乎稱禮而巳臣近奉敕執事於郊廟故舉所見不稱禮之尤者三事以聞蓋疑于典故別無討論禮也者主於恭而巳矣此聖心可裁正者也一圜丘黃道伏見圜丘昊天上帝皇地祇用黃褥位祖宗配侑用緋褥位以示損於天地也皇帝板位及飲福位皆用緋褥示不敢踰祖宗也而自小次前設黃道升壇夫黃道之制不著於典禮臣竊詳之蓋以皇帝既解劒脫履用藉步為潔既用藉步而色用黃則是踰於祖宗褥位之制而又從升壇諸執事者盤辟回旋禮容不肅至于襟袂委拂神位以避黃道故也且壇上既鋪織罽為藉臣謂自小次登午陛例可罽藉其黃道特請徹之於禮為稱一小次皇帝既行禮當就壇下褥位其小次之設皇帝奠幣登獻每降即就次至于近侍左右輒幄後休坐則陪位百官不能不跛倚懈惰夫三年一郊禮稀曠矣而又恭虔之不足非所以副陛下事天尊祖之意掌次周官所載禮有舊文若徹其帷蔽虛而不處即此變禮始自聖明後世有述矣一祠官凡祀事主於肅恭況禮行於郊廟若肅恭不足是謂黷祀臣於太廟見司徒升奉爼而爼巳入室命執事者復舉以出乃始奉而薦之其不虔乃爾又監禮之官終事不至有司莫詰御史不糾百執事之懈于位乃爾應緣祀事官雖於尚書省受誓戒徒習虛儀而巳請特降中旨申敕御史臺嚴加糾察以懲不恪右三事切於禮意事非難行上可以將陛下之精誠下可以正朝廷之彞典庶乎三靈來格百福饗臻倘蒙聖心特垂察納即乞降出施行判太常寺吕公綽言舊禮郊廟尊罍數皆準古而不實三酒五齊明水明酒有司相承名為看器郊廟配位惟用祠祭酒分大中祠位二升小祠位一升止一尊酌獻一尊飲福宜詔酒官依法制齊酒分實之壇殿上下尊罍有司毋設空器並如唐制以井水代明水明酒正配位酌獻飲福酒用酒二升者各增二升從祀神位用舊升數公綽又言歷代郊祀配位無側向真宗示輔臣封禪圗曰嘗見郊祀昊天上帝不以正坐蓋皇地祇次之今修登封上帝宜當子位太祖太宗配位宜比郊祀而斜置之其後有司不諭先帝以告成報功酌宜從變之意每郊儀範既引祥符側置之文又載西向北上之禮臨時擇一未嘗考定乃詔南郊祖宗之配並以東方西向為定三年太常博士余靖言周禮司服之職掌王之吉服大裘而冕無旒以祀昊天上帝祀五帝亦如之衮冕十有二旒其服十有二章以享先王鷩冕八旒其服七章以享先公亦以饗射毳冕七旒其服五章以祀四望山川絺冕六旒其服三章以祭社稷五祀玄冕五旒其服無章以祭小祀此皆天子親行祀事所服冕服悉因所祀大小神鬼以為制度今大祠中祠所遣獻官並用上公九旒九章冕服以為初獻其餘公卿亦皆七旒冕服全無等降小祠則公服行事乖戾舊典宜詳周禮因所祭鬼神以為獻官冕服之制詔下禮官議奏曰聖朝之制唯皇帝親祀郊廟及會朝大禮服衮冕外餘冕皆不設其每嵗常祀遣官行事攝公則服一品九旒冕攝卿則服三品七旒冕自從品制為服不以祠之大小為差至於小祠獻官舊以公服行事則有違典禮按衣服令五旒冕衣裳無章皂綾綬銅裝劒佩四品以下為獻官則服之今小祠獻官既不攝公卿則盡屬四品以下當有祭服請除公卿祭服仍舊從本品外小祠所遣獻官並依今文祭服行事若非時告祭用香幣禮器行事之處亦皆準此皇祐初同知太常禮院邵必上言曰伏見監祭使監禮各冠五旒冕衣裳無章色以紫檀按周禮六冕之制凡有旒者衣裳皆有章惟大裘冕無旒衣裳無章一命大夫之冕無旒衣裳亦無章今監祭監禮所服冕五旒侯伯之冕也而衣無章深所不稱色以紫檀又無經據竊詳監祭監禮既非祠官則御史博士爾而服用五等蓋非所宜而且有旒無章況國家南郊大禮大常卿止服朝服前導皇帝明祠官也今後監祭者請冠獬豸監禮者冠進賢為稱詔不允二年判太常寺宋祁上明堂路寢議曰凡明堂路寢其名雖異其制一也昔神農氏祀於明堂有其蓋而無四方至黃帝謂明堂為合宫唐虞謂明堂為五府夏后氏謂明堂為世室商人謂路寢為重屋周人謂五府為明堂黃帝合宫義也唐虞五府府聚也言五帝之神聚祭乎此夏后氏名世室者取世世不毁也商人名重屋者商於虞夏稍文加以重簷四阿之制故取名焉周人謂明堂者以其明政教之法常於此堂也天子布十二月政令每月就其時之堂而聽朔焉若閏月則闔門左扉而施其政故於文王在門為閏又曰在國之陽居離之地有明義焉故謂之明堂夏之世室深蓋八丈四尺廣十丈五尺匠人職所謂堂修一者也基髙一尺夏氏堂上五室以法五行木室處東北火室處東南金室處西南水室處西北每室深丈八尺廣二丈一尺土室處中深二丈四尺廣二丈八尺然五室居堂之上深六丈廣七丈又匠人職所謂堂上五室三四步四三尺也有九階三面二階南面三階法陽數也五室有四户八窗户法四時窗法八節一堂者法地載五行云商人四重屋者正寢也正寢則路寢也其制堂深五丈六尺廣七丈二尺堂上亦為五室室方一丈六尺基髙三尺重屋四阿四阿者霤也周人明堂如寢廟法九尺為筵東西九筵南北七筵基髙一筵上亦五室室深廣二筵或曰宫蓋方三百步在近郊三十里或曰七里之郊鄭康成曰此三者或舉宗廟或舉王寢或舉明堂互言之明其同制也漢馬宫曰夏后世室室顯於堂故命以室商人重屋屋顯於堂故命以屋周人明堂大於夏室故命以堂夏氏益其堂之廣四百四十四尺周人明堂以為兩序間大夏氏七十二尺云漢武帝始以公玉帶所上黃帝時明堂圗作之汶上黃圗中一殿四面無壁以茅蓋通水水環室垣為復道上有樓從西南入名曰崑崙帝始祠太一五帝於上座至後漢光武帝又營明堂上圎下方八窗四闥九室十二坐室四户凡三十六八牖凡七十二沿周制也晉議營明堂裴頠曰尊祖配天其義明著廟宇之制禮據未分宜可直為一殿以崇嚴父之祀其餘雜碎一皆除之由是宋齊以後咸率兹禮故宋作明堂止為大殿十二楹無古戶牖但文飾雕畫而巳梁仍宋制以中六楹安六天帝坐悉南向五人帝位阼階上堂後為小殿五楹為五佐室焉唐明皇帝始以東都乾元殿為眀堂參用周法開元二十年以行享禮臣按眀堂天子布政之所因得祀上帝者蓋以地非褻近可以交饗人神歟至三代彌文故制為戶牖有所法象所以尊大而神眀之也要之在講禮事神布揚法度而巳後之王者所以班大政朝羣臣何嘗無其所哉其謂之宣室謂之大極皆眀堂比也沿革稱謂有不同耳而諸儒限局聞見抱殘册爭空言據巳是之槩見抗必信之實論以為一事一物不如古制則為非禮推尊上古殆不可及然殊不知聖人便世制宜興至治安天下通靈心雖無明堂猶無損于有道嫌於行禮者也今之大慶則古之路寢即明堂也以之奉天以之布政何不可邪國朝以來非朝會齋宿未嘗臨御故其棟宇閎邃廷堂華敞與燕寢自不相連固非常幸褻近者也今有請即為明堂於禮便甚祁又議五室奏曰眀堂所以有五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黃曰神斗白曰顯紀黑曰玄矩蒼曰靈府鄭康成曰五府與周明堂同自夏以來五室之制不改周家以木室在東北象木生於寅火室在東南象火生於巳金室在西南象金起於申水室在西北象水起於􅕀土室居中者象土總御五行寄治四方不専一隅之義也其名木室曰青陽火室曰明堂土室曰太室金室曰總章水室曰玄堂青陽者言春之色與陽之氣明堂者夏為朱明是其體之明也太室者太大也土功最大餘行比之為小以其含廣大也總章者總法也章明也至秋萬物巳成光明潔鮮云玄堂者玄黑也冬殺為隂故取黑義秦更制九室其法不傳後漢之營明堂遂改周制張衡所謂復廟重屋八達九房者或曰九室十二坐以象九州十二月宋營明堂止為十二大屋無戶牖之制齊從王儉議更復五室梁武帝欲有述作乃下制與羣臣大議曰堂準大戴禮九室八牖三十六戶以茅蓋屋上圓下方鄭康成據援神契亦曰上圓下方曰八窗四達明堂之義本是祭五帝神而九室之數未見其理若以五堂而言雖當五帝之數面南則背汁光紀面北則背赤熛怒東面西面又亦如之於事殊未可安且眀堂之祭議五帝則是總議在郊之祭五帝則別宗祀所配復應有室若専配一室則是義非配五若皆配五則便成五位以理而言明堂本無有室朱異以為月令天子居明堂左個右個聽朔之禮既在明堂今若無室則於義成闕制曰若於鄭義聽朔必在明堂於此則人神混淆恭嚴之道有廢春秋云個居二大國之間此言眀堂左右個者謂所祀五帝堂之南又有小室亦號明堂分為三處聽朔既三處則有左右之義在營域之內明堂之外則有個名故曰明堂左右個也以此而言聽朔之處自在五帝堂之外神有別理無相干議遂不能定天監十二年虞皭建言周禮明堂九尺之筵以為髙下修廣之數堂一筵故階髙九尺漢家制度猶遵此禮故張衡引度堂以筵者也鄭康成以廟寢三制既同俱應以九尺為度制曰可於是毁宋太極殿以其材構明堂十二楹基準太廟以中央六楹安六坐悉南向由東第一青帝第二赤帝第三黃帝第四白帝第五黑帝配帝總配享五帝在阼階東上西向大殿後又為小殿五楹以為五佐室焉後周採三輔黃圗欲建九室不能成隋牛里仁建言三代相沿咸有損益至於五室確然不變夫室以祭天天實有五若立九室四廡所用布政視朔自依其辰鄭司農謂十二月分在十二月陽等左右之位不云居室康成亦言每月於其時之堂而聽政焉禮圗畫個皆在堂偏是以須為五室唐髙宗與羣臣雜議以五室為宜故設昊天上帝於太室中央南向配帝於東南西向青帝於木室西向赤帝於火室北向黃帝於太室南戶之西北向白帝於金室東向黑帝於水室南向其太昊炎帝軒轅少昊髙辛之坐各於五方帝之左內向差退勾芒祝融后土蓐收玄冥坐於明堂廷中各於其方俱內向故國朝從唐制儀存通禮臣按古謂明堂為五府似五室之制權輿於此上世圗籍淪暗不得搢紳先生所能道者又皆大較而言不能纎細推處故夏周止云大享帝明堂不言帝別一室後世諸儒推而合之分主五行遂設神位其有興之莫可廢也然漢制本為九室薛綜曰堂後有九室所以異周制云若然室在堂後不為享帝之位明矣故向背之間梁武致疑筵几之度逺而難質今有司請以大慶殿即為明堂倣古宜今最為合禮周禮書曰清廟明堂與路寢同制此其驗也其五室權以幔幄為之以眀六天五帝絶位於禮無嫌祁又議規蔡雍明堂奏曰蔡雍曰明堂者天子太廟所以崇禮其祖以配上帝者也夏曰世室商曰重屋周曰明堂東為青陽南為明堂西為總章北為玄堂中曰太室易曰離也者明也南方之卦也聖人南面而聽天下嚮明而治人君之位莫正於此故雖有五名而主以明堂也其中正焉皆曰太廟謹承天隨時之令昭令德宗祀之禮明前功百辟之勞起尊老恭長之義顯教幼誨稚之學朝諸侯選造士於其中以度制生者乘其能而至死者論其功而祭故為大教之宫而四學具焉譬如北辰居其所而衆星拱之萬象翼之所由生専受作之所自來明一統也故言明堂事之大義之深也取其宗祀之清貌則曰清廟取其政室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四面周水圎如壁則曰辟雍異名而同事其實一也春秋因魯取宋之姦賂則顯之太廟以明聖王建清廟明堂之義經曰取郜大鼎于宋納于太廟非禮也君人者將昭德塞違故昭令德以示子孫是以清廟茅屋昭其儉也夫德儉而有度升降有數文物以紀之聲名以發之以臨照百官百官於是戒懼而不敢易紀律所以大明教之也周清廟魯太廟皆明堂也魯褅祀周公於太廟眀堂猶周宗祀文王於清廟明堂也禮記檀弓曰王齋褅於清廟明堂也孝經曰宗祀文王於明堂禮記明堂位曰太廟天子明堂又曰成王幼弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頒度量而天下大服成王以周公為有勳勞於天下命魯公世世禘祀周公太廟以天子禮樂升歌清廟下管象舞所以廣魯於天下取用清廟之歌歌於魯太廟明堂之廟猶周清廟也皆所以昭文王周公之德以示子孫者也易傳大初篇曰天子旦入東學晝入南學暮入西學夕入北學在中央曰太學天子之所自學也禮記保傅篇曰帝入東學上親而貴仁入西學上賢而貴德入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯門子日側出西闈視五國之事日暗出北闈視帝節猶爾雅曰宫中之門謂之闈王居明堂之禮又別隂陽門南門稱門西門稱闈故周官有門闈之學師氏教以三德守王門保氏教以六藝守王闈然則師氏居東門南門保氏居西門北門也知掌教國子與易傳保傅王居明堂之禮參相發明為四學焉文王世子篇曰凡大合樂則遂養老天子至乃命有司行事興秩節祭先師先聖焉始之養也適東序釋奠於先老遂設三老位焉春夏學干戈秋冬學羽籥皆於東序凡祭與養老乞言合語之禮皆小樂正詔之於東序又曰大司成論説在東序然則詔學皆在東序東序東之堂也學者詔焉故稱太學仲冬之月令祀百辟卿士之有德於民者禮記太學志曰禮士大夫學于聖人善人祭于明堂其無位者祭於太學禮記昭穆篇曰祀先賢于四學所以教諸侯之德也即以顯行國禮之處也太學明堂之東序也皆在明堂辟雍之內月令記曰明堂者所以明天氣統萬物明堂上通於天象日辰故下十二宫象日辰也水環四周言王者動作法天地德廣及四海方此水也名曰辟雍王制曰天子出位執有罪反釋奠於學以訊馘告樂記曰武王伐商為俘馘于京太室詩魯頌云矯矯虎臣在泮獻馘亰也太室辟雍之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告者也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光於四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟雍太學通合之義也其制度數合有所法堂方百四十四尺坤之策也屋圎徑二百一十六尺乾之策也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變且圎蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應十二辰三十六戶七十二牖以四户八牖乘九室之數也户皆外設而不閉示天下不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱列於四方亦七宿之象也堂髙三丈亦應三統四鄉五色者象其行外廣二十四丈應一嵗二十四氣四周以水象四海王者之大禮也晉袁準著論非之曰明堂太廟太學三者事義不同各有所施而論者合為一體取詩書放逸之文經典相似之語推而同之其失逺矣夫宗廟之中人所致禮幽隱清靜鬼神所居而使衆學處焉饗射其中人鬼慢黷死生交錯囚俘截耳創痍流血以干鬼神非其理也又茅茨採椽至質之物建日月乘玉輅以處其中非其類也禮記先儒云明堂四面東西八丈南北六丈與七廟非一體也夫宗廟鬼神所居祭天而于人鬼之室非其處也王者五門宗廟在一門之內若在其廟而張三侯又辟雍在內非宗廟之中所能容也周人立三代之學非立三代宗廟者也周養老於東膠非三老也文王世子養老乞言於東序又皆於學也靈臺以望氣清廟以訓儉既非一體安有宗廟之中而以之燕射戲謔乎明堂在國之陽而宗廟在左又宗廟不應在外也齊宣王問孟子曰可毁眀堂乎若眀堂是廟豈容有此問哉諸儒言明堂各未有證蔡雍等遂言異名同實方之北辰居所取其處中不移旁運三光非是一物而備其體以悟人意耳臣按蔡雍為漢大儒當時去聖人未逺然而以眀堂清廟辟雍靈臺合為一物何據寧其博見異藝有所述乎將以獨識取髙當世也自孔子歿諸儒鋒奮或言魯禮或論周制或道夏商家自為書決不相通又緯讖詭異附經造説誼無足據而雍信其所疑是愚謂不可行而言是誣合誣與愚雍必有一焉宜為後人之嗤詆也故魏晉而下雍説不復施行祁又議上帝五帝奏曰鄭康成以上天之神凡六昊天者天皇大帝五帝者太微五帝王肅曰昊天惟一神以五帝為次神而諸儒附鄭者多故據而為説云凡合祭五帝一嵗有二祀龍見之月祭于南郊謂之大雩一也九月大饗于明堂宗祀文王以配二也祭明堂者諸儒之言不同或説周家祭五天帝皆明堂中以五人帝及文王配五官神坐廷中以武王配號曰祖宗禮所謂祖文王而宗武王者也施設神位準五行相向以為法威仰在邜西面熛怒在午北面樞紐在未北面招拒在酉東面汁光紀在子南面太皥炎帝黃帝少皥髙辛各在其位少退勾芒祝融后土蓐收玄冥皆在人帝下少後文王坐太皥之南位如主人武王少退或曰合祭之日五精之帝皆西面其牲則天帝各一犢合同十牲文王之牲用太牢以詩我將篇曰我將我享維牛維羊文王武王而用太牢者以五人帝各配一天為之主足為外神依止則文王泛配五帝矣以不専配則所用牲得從盡物之享云漢武帝祠太一五帝於明堂上坐牲以太牢禮畢燎堂下晉武帝初議明堂羣臣曰五帝即天也王氣時異故殊其號雖名有五其實一明堂南郊宜除五帝坐五郊改五精之號皆同稱昊天上帝各設一位而巳詔可時韓陽建言古建明堂咸秩五帝無祭一天者帝下詔曰往者衆議除明堂五帝位考之禮文不正其復之摯虞議以為漢魏故事明堂祀五帝之神新禮五帝即上帝上帝即天也明堂除五帝之位惟祭上帝按仲尼稱郊祀后稷以配天宗祀文王於明堂以配上帝周禮祀天旅上帝祀地旅四望四望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王沒配五行故太昊配木神農配火少昊配金髙辛配水黃帝配土此五帝者配天之神同兆之於四郊報之於明堂祀天大裘而冕祀五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢前韓陽上書宜如舊祀五帝詔巳施用請改定新禮從之唐禮部尚書許恭宗議祠令新禮並用鄭氏六天之説圜丘祀昊天上帝南郊祀太微感帝明堂祀太微案鄭氏唯據讖緯以説六天皆謂星象而昊天上帝不屬穹蒼其注月令周官以昊天上帝為北辰曜魄寶注孝經明堂為太微五帝案易日月麗於天百榖草木麗於地在天成象在地成形足明辰象非天草木非地毛萇傳曰元氣浩大則稱昊天逺視蒼蒼則稱蒼天此則蒼昊為體不入星例且天地各一是曰兩儀天尚無二帝焉有六是以王肅羣儒咸非其義起居舍人王仲丘又以貞觀禮季秋祀五帝明堂顯慶禮祀昊天上帝於明堂準孝經説先儒以為天是感精之帝上帝即太微五帝且上帝之號本屬昊天周禮王將旅上帝張氈案設皇邸祀五帝張大次小次由此言之上帝之與五帝自有差等不可混而為一鄭注孝經上帝者天之别名神無二主故異其處以避后稷孔安國曰帝亦天也然則禋享上帝有合經義而五方皆祀行之巳久請二禮並行以成月令大享帝之義詔可自是不改國朝因之臣案諸儒之説上帝及五帝紛然不一王肅以為上帝即昊天鄭康成謂昊天為皇大帝五帝為太微五帝王鄭二説既顯學者爭為執辨雖天子亦不能果定其文然臣以為就經言之仲尼之意儻可見也孝經云孝莫大於嚴父嚴父莫大於配天又曰郊祀后稷以配天宗祀文王於眀堂以配上帝周頌我將篇曰祀文王也我將我享維牛維羊惟天其右之伊嘏文王既右享之孝經言配天而後言上帝詩當言帝右而云天右是天為上帝上帝為天互文以見義也天之所以為五帝者先儒之議多矣近大儒孫奭建言天雖一神以其至尊故有多名亦猶人君稱皇王后辟天王天子皇帝縣官臣民曰陛下史臣曰上服用曰乘輿出入曰車駕各隨德義而稱亦以至尊故也以天帝之神迭王五時故聖人制禮謂之五帝非五帝各一神也以謂儒不怪詩傳天有五名而獨怪帝有五號奭又以嵗九祭皆主於天至日圜丘正月祈榖五時迎氣孟夏雩季秋饗凡九惟至日其禮最大故稱曰昊天上帝昊天者以體稱上帝者以德兼舉禮大故也其餘則否至於大雩祈百榖之雨大享報百榖之成以五帝者有生成之功祈榖之禮闕一不可雖止一神並陳五位不知神之於彼乎於此乎奭言如是是其得也然而欲去昊天上帝一位止設五帝臣以為禮有未然號昊天者以其元氣魁然乘五行王氣普臨萬物因時顯功人強以名故春曰青帝夏曰赤帝猶春為蒼天冬為上天耳唐以來二家之説兼行故今享禮有六帝位雖然奭許於彼於此而求之矣何獨是五而非六乎故兼存之則示聖人尊天奉神不敢有所裁抑云祁又上議配帝奏曰祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭氏曰禘郊祖宗謂祭昊天於圜丘曰禘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言爾虞氏以上尚德禘郊祖宗配用有德者自夏以下稍用其姓代先後之次郊祭一帝而明堂祭五帝小德配寡大德配衆禮之殺也諸儒據鄭此説由是推而廣之以眀文武有俱配之義臣案孝經曰孝莫大于嚴父嚴父莫大于配天則周公其人也昔者周公郊祀后稷以配天宗祀文王于明堂以配上帝然則孔子著經以美周公者則自周以上未有能以父之尊而進配上帝者也惟周公能之則自商及虞安得祖而宗之之説耶禮記多出秦漢諸儒之家鄭即據而為解以違孔經以未之思耳崔靈恩曰五帝皆在明堂中以五人帝及文王配之五神坐廷中以武王配之或非之曰不然五官之神生為上公死為貴神其生也帝王之饗皆預升堂今為貴神獨坐於下屈武王之尊下坐同之義為不允當謂合祭五帝明堂惟有一祭五帝及神俱坐堂上以文武二祖泛配五帝及神歟以文王配祭五帝則謂之祖以武王配祭五神則謂之宗二王同時並配故祭法所謂祖文王宗武王也祖始也宗尊也名祭為尊且始者明一祭之中有二義焉以始而言謂合祭五帝於大雩之時為百榖祈嵗功始求之義也以尊而言季秋之月得其成功尊而祀之以報其德明二王配祭既有此義故分為二名鄭康成所謂祖宗通言者謂稱祖不得無尊嚴之心言尊不得無始求之理而孝經及詩但云祀文王於明堂不云武王者祖宗之祭其體同故舉一足以明不待兩見云宗祀文王於明堂文王當言祖而云宗者亦通武王之義漢武帝初祠太一五帝於眀堂上坐以髙皇帝對之至明帝乃以光武配五帝在青帝之南少退西面自是歷章安而下不敢輒易齊明帝有事明堂有請以武帝配謝曇濟曰按法禘郊祖宗並列嚴祠鄭氏注義亦據兼饗宜祖宗兩配文武雙祀左僕射王晏曰若用鄭説祖宗通言則生有功德沒垂尊稱歷代配帝何止於二今盛薦上帝允屬武考百代不改其文廟乎詔可唐太宗始以髙祖配享明堂髙宗又奉太宗配祀有司遂以髙祖配五天帝太宗配五人帝太尉長孫無忌建言永徽二年七月詔書奉太宗以尊嚴配時髙祖當遷禮司乃以太宗降配五人帝雖同在明堂不得對越天帝非明詔奉親之意謹按孝莫大於嚴父嚴父莫大於配天伏尋詔意義在於此又尋漢魏晉宋歷代之禮無父子同配之義唯祭法稱周人帝嚳而郊稷祖文王而宗武王鄭康成謂祖宗者通言祭五帝五神於明堂也尋鄭之意乃以祖宗合為一祭又以文武共在明堂連袵配祀良為巨謬故王肅曰古者祖有功而宗有德祖宗自是不毁之名非謂配食者也審如鄭義則經當言祖祀文王不得言宗祀也又曰武王配勾芒之類是謂五神位在堂下天子降位失君敘矣故春秋傳禘郊祖宗報五者國之典祀也知各一事非祖宗合祀於明堂矣南齊蕭氏以武明昆季並於明堂配食事乃不經不足為法武德令以元帝配於明堂兼配感帝至貞觀初緣情革禮奉髙祖配明堂延世祖専配感帝有遞遷之典髙祖請配昊天上帝太宗請配明堂五帝從之唐垂拱元年有司議嚴配之禮孔元義曰孝莫大於嚴父嚴父莫大於配天明配尊大之者昊天是也請奉太宗髙宗配天上帝於圜丘髙祖配感帝於南郊昔宗祀文王於明堂文王當祖而云宗者通武王之義請太宗髙宗配祭於明堂沈伯義曰有虞禘黃帝而郊嚳祖髙辛而宗堯夏后亦禘黃帝而郊鯀祖髙辛而宗禹商人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王伏尋嚴配之文於此最備德禮之序莫善於周禘嚳郊稷不聞於主明堂宗祀用兼于兩配以文王武王父子殊別文王為父上主五帝武王對父不配五神昔者周公宗祀文王於明堂以配上帝不言嚴武王以配天則武王雖在明堂理未齊於配祭既稱宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文王為五帝宗也必若一神兩祭為是則五祭十祠薦獻頻繁實虧於數此則神無二主之道禮崇一配之義竊尋貞觀永徽共遵専配明慶之後始創兼尊必以順古宜從周法髙祖請配圜丘方澤太宗請配南北郊髙宗配五天帝鳯閣舍人元萬頃等議案見行禮昊天上帝等祠十一所咸奉髙祖太宗兼配今議者引祭法周易孝經之文雖近古之祠殊失聖旨伏據見行禮髙祖太宗今既配五祠當仍舊無改髙宗功烈無著豈祠配有別請亦配五祠於是郊丘諸禮以三帝同配明皇帝開元十一年罷之國朝太祖受命以宣祖配享明堂太宗始奉太祖配俄又以宣祖配焉真宗復奉太祖聖上嗣位奉真宗配天以正孝經嚴父之義臣案鄭氏以文武二主皆配明堂其言非是據孝經止言嚴父配天周公其人也今以周公言之則武王非父以成王言之則文王為祖二理較然不待議而判矣齊唐以數帝皆配於經義寧不戾邪歷代名臣奏議卷十八
