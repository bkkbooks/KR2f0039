body:
  text: 歴代名臣奏議卷一百三十七明楊士奇等撰用人宋神宗熈寜四年監察御史裏行劉摯論人才上䟽曰臣竊以為治之道惟知人為難葢善惡者君子小人之分其實義利而已然君子為善非有心於善而惟義所在小人為惡頗能依真以售其偽而欲與善者淆故善與惡雖為君子小人之辨而常至於不明世之人徒見其須臾而不能覆其久也故君子常難進而小人常可以得志此不可不察也恭惟陛下承百年太平履大有為之㑹寤寐人物不次而用至於今日未見卓卓有功狀可以補國利民仰稱詔㫖而中外頗有疑焉者此何謂也豈所以用之者或未能盡得其人歟臣且以將命出使者言之其規畫法度始皆受之於朝廷也一至於外則大異矣興利於無可興革故於不可革州縣承望奔命不暇官不得守其職業農不得安其田畝以掊削民財為功以興起犴獄為才陛下振乏均役之意變而為聚斂之事陛下興農除害之法變而為煩擾之令守令不敢主民生靈無所赴愬臣以謂此等非必皆其才之罪特其心之所向者不在乎義而已故希賞之志每在事先而奉公之心每在私後故顛倒繆戾久無所成其能少知治體有愛君之意出憂國之言者皆無以容於其間是故今天下有二人之論有安常習故樂於無事之論有變古更法喜於敢為之論二論各立一彼一此時以此為進退則人以此為去就臣嘗求二者之意蓋皆有所是亦皆有所非樂無事者以謂守祖宗成法獨可以因人所利㩀舊而補其偏以馴致於治此其所得也至昧者則茍簡怠惰便私膠習而不知變通之權比其所失也喜有為者以謂法爛道窮不大變化則不足以通物而成務此其所是也至鑿者則作為聰明棄理任智輕肆獨用强民以從事此其所非也彼以此為亂常此以彼為流俗畏義者以並進為可恥嗜利者以守道為無能二勢如此士無歸趨臣謂此風不可浸長東漢黨錮有唐朋黨之事蓋始於此在易之象以君子道長小人道消為泰小人道長君子道消為否傳曰惟君子為能通天下之志書曰皇建其有極又曰無有作好遵王之道無有作惡遵王之路記曰一道徳以同俗又曰舜執其兩端用其中於民今天下風俗可謂不同情志可謂險阻而消長之勢可謂未明矣臣願陛下虚心平聽黙觀萬事之變而有以一之其要在乎謹好惡重任用而已爾前日意以為是者今求諸非前日意以為短者今取其長稍抑虚譁輕偽志近忘逺幸於茍合之人漸察忠厚謹重難進易退可與有為之士抑髙舉下品制齊量收合過與不及之俗使㑹通於大中之道然後風俗一險阻平民知所向而忠義之士識上之所好惡無有偏陂莫不奮迅而願為之用則施設變化惟陛下號令之而已臣謂方今之故無大於此惟陛下幸察摯又論監司上奏曰臣自待罪風憲屢曾以天下監司為言乞澄汰選擇誠以朝廷政令使監司得其人則推行布宣可以諭上指而究恵澤茍非其人則所謂徒善而已終於民不得被其利夫上之所好下必有甚朝廷以名實為事行總覈之政而下乃為刻急淺廹之行朝廷以教化為意行寛厚之政而下乃為舒緩茍簡之事皆習俗懷利迎意而作故所為近似而非上之意本然也今雖因革之政有殊而觀望之俗故在但所迎之意有不同耳其為患一也昨差役之法初行監司已有迎合爭先不量可否不校利害一槩定差騷動一路者朝廷察其意固已黜之矣推此以觀人情大約類此且天下之事散在諸路總制於監司其大者治財賦察官吏平獄訟考疾苦使者皆務為和緩寛縱茍於安靜則事之委靡不振世之受敝不勝言也向來黜責數人皆以其非法掊斂意在市進虐民甚者亦非欲使之漫然不省其職廢所宜治之事謂之寛厚也昧者不逹故矯枉或過其正臣謂此法不可滋長須要大為之禁伏乞聖慈詔執事申立監司考績之制以常賦之登耗郡縣之勤惰刑獄之當否民俗之休戚為之殿最每嵗終以詔誅賞仍自今嵗始焉庶幾有所隠括裁制之使循良者不入於弛肅給者不入於薄以上副聖明制治用中之意夫察時之寛猛緩急觀俗之過與不及而張弛其政正今日事也摯又乞補諫員奏曰臣伏以國之政令常患為名甚美而事無其實竊覩庚戌詔書令内外兩制各舉諫官二員當此之時天下臣庶皆知陛下欲開廣言路謂此官之任職在補發人主聰明而直言朝廷闕失故求天下公議所與之人此盛徳事也兩制各以所知應令者蓋數十百人矣然至今頗未見有所用之方陛下厲精政理豈徒文虛名而廢實事耶豈數十百人者之材業皆不足以少副詔意耶不然復將聽大臣自有所擇用之耶夫百執事固大臣之所宜擇然惟有在言路者當出於人主爾諫院自孫洙補外及今逾月缺員已多當陛下求忠言如不及之時伏願檢㑹去年兩制所舉人數内親選有重望諒直之人補任諫員交輔聖政以實前日之詔不勝大願舘閣校勘王存乞崇用忠實仁厚之吏上奏曰臣准御史臺告報當臣轉對者臣聞為治不在多言顧力行何如此至論也陛下自即位以來克己一心憂勤庶政未嘗事燕游之好擢任材能修明法度有黽勉不倦之心内經貨財外明威武有長轡逺馭之略觀前世求治之主規模宏廓而勵精如此者不見一二謂宜天下震動鼓舞以趨太平然為之累年而人情未安衆論不一其故何耶豈非所以為法有未諭於民心而所任行法者有不厭於物論耶陛下亦盍反求所以然矣葢治貴適宜不必舍近而慕逺事蘄當理不必遵古而狹今祖宗法制行逾百年固有陵夷偏弊而不舉者陛下作而振起之是當爾也先王善政有可施於今者祖宗未遑及焉陛下舉而推行之是亦當爾也然議者遂以為本朝之法卑狹潰壊必盡更其故然後為治臣恐好議論者過也古人有言徒善不足以為政徒法不能以自行此言雖有善法必得人而行之竊見比年擢用之人才慧有餘而忠實不足行法之吏刻暴相勝而仁厚無聞羣情惑而横議興未必不由於此然則所謂行法適足以壞法也臣恐澆薄相扇寖以成風今卿大夫聚於朝論刑而不及徳士庶人交於下言利而不及義夫朝廷進人之賢否風俗繫之風俗之厚薄盛衰隨之仰惟陛下恢堯舜舍己從人之美體仲尼察言觀行之明深抑巧佞險薄之風崇用忠實仁厚之吏使大宋之風俗淳厚於三代陛下之徳化比隆於二帝豈不盛哉臣愚不識忌諱伏惟陛下幸赦而省察之臣不勝拳拳司塩鐵判官錢勰乞參舉才徳之士上奏曰臣聞天下之治有因有革祖宗遺徳在人法度明備此陛下之所宜因而世習久治弊隨以生此當今之所宜革也伏惟陛下操大有為之志而當不可不為之時凡所以不憚更張而務以興利除害堯舜文武之用心也臣竊嘗深計熟慮當今之宜其先務之要不過擇人而已今陛下先器能而後履歴惟材是舉可謂急於擇人矣然臣尚慮有所獻者以謂人才不悉同而所用有宜適用不盡其才則雖才且無益多才而不渉道則為患大於不才惟道徳規矩之士而其才足以經濟世務者此自陛下所宜養育成就以待非常之用者也自餘百執事之任有才智通敏可以辦集事務而不能深知禮義之科指者此足充繁使而不可居内外表率之官而抱公守道難進易退之士雖無敏㨗趨走之便而堪属大事者此居内可備顧問而居外可為表率臣願陛下參舉才徳各盡其用必使有徳者先進而有才者佐之俾上不失經國之體下不失便民之利以陛下至明不惑之資洞見情偽器而使之天下幸甚勰又乞擇經術耆艾之士以備顧問上奏曰臣伏見漢制侍中左右曹諸吏常侍給事中皆加官多至數十人或得入禁中掌顧問應對唐制供奉學士以文學言語出入侍從因得參謀議納諌諍是皆人主所與燕見者也恭惟陛下天縱之資專意經術遴揀臺閣未嘗虛授妙選名儒以備要近然皆外領事務日有官守之責未協盡規之義臣願陛下益選其間經術通明有守不畏魁磊耆艾之士兼取該貫史學通知古今可以謀王體斷國論者優以清閑引之親近使專意討論以備朝夕燕見紬繹顧問宻勿獻替少裨萬一則與夫事已施行而使言事者論列利害彰於羣聽勢相遼而所益廣惟陛下省察御史中丞楊繪論舊臣多求退上奏曰臣竊見唐尚書左丞孔戣年及七十致仕得請韓愈上䟽言自古以來及聖朝故事年雖髙但視聽心慮茍未昏錯尚可顧問委以事者雖求退罷無不留止優以禄秩不聽其去以明人君優賢貴老之道也禮曰大夫七十而致仕若不得謝則必賜之几杖及引詩云雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也臣竊謂孔戣年已七十致仕得請愈猶以老成可惜而留之則近日老舊之臣年未及七十而堅求休退者已聽數人矣范鎮始六十有三而致仕吕誨約六十而致仕歐陽脩六十有五而致仕富弼年六十有八被劾後歸養疾司馬光王陶始踰五十雖皆未致仕而得閑散地雖彼數臣自以知止足為髙節臣所疑何獨近來髙者之多乎唐大中時吏部侍郎孔溫業求外遷宰相白敏中顧同列曰吾等可少警孔吏部不樂居朝矣彼白敏中一庸相也尚能以賢人不樂居朝自警而況陛下以大聖之資孜孜求治而老舊之臣相繼有不待年而求去者乎老者退而少者進舊者遠而新者衆得不微軫於聖懐哉但恐訪於偏辭者則曰彼皆奸邪之人畏陛下之神明而逺遁矣否則曰彼皆沮止新法者今新法既已便故皆羞忸而退矣臣願勿信於偏而少加警於聖慮則天下幸甚矣為國任臣之道惟其用之當而已故無老少舊新之分也然而老而舊者常過於重謹而難以與變法少而新者常喜於進取而易以與作事臣以為二者之說宜參取之乃得其當若取之偏則少而新者可與圖其始之利而不肯慮其終之害老而舊者能防其終之弊而不肯謀其始之變若能用易於作事者俾圖其始之利而裁之聽難於變法者俾慮其終之害而防之則事得其宜矣古有云老者之知少者之決此之謂矣竊恐少而新者言其利則易從老而舊者言其害則難入而或有利十而害百者但聞其利不聞其害焉民或被其害而無由上逹矣繪又論諌官當人主自擇上奏曰臣聞天子有諌臣七人雖無道不失其天下謂三公四輔為七人之數今之諌官即古之三公四輔之職其任得非重哉擇之可不謹乎本朝諌院官多或至五六人少猶不下三人然皆出於清衷之自擇葢天子既以事委宰相則天下之人悉趨附而無敢陳其不逮故置諫官以相維之其如位宰相者必不喜諫官之敢言理固然也不爾裴垍安得獨稱美於唐哉為宰相者則必自除附己者為之乃不如不置也徒自蔽於耳目而已陛下博通古今至於納諫昌拒諫危之說如唐太宗終始納諫而昌唐明皇不能終而危之事具布史策不假臣言也伏覩孫洙補郡後來官闕而不填者旬月得非難其人乎臣竊見李絳有云聖王選當代之人極其才分自可致治豈借賢異代治今日之人哉臣願陛下據在朝之臣擇其老成諳練典故之士而置之諫列以參聽其議論不無補於聖聰也而勿委宰相除之若委而除之則必取新進之士不敢異論者不由檢正并條例而升則自編校與勅局而授矣願陛下兼聽而廣視之取資深淺之人雜用於以集衆才之美而濟天下之務幸甚五年御史劉孝孫乞召對之人量加試用上奏曰臣伏見陛下講脩衆務㨂拔人材雖毫善寸長畢䝉收采英識睿鑒前古罕及然其間有召自遐逺使之對揚天資髙明聖問宏奥幽仄之士乍對清光舉動語言過於兢畏偶有罷去能無沮傷葢其始召也皆以為榮及其罷去也不勝其辱況士人或縁臣僚薦舉或為朝廷所知比之軰流必有可采茍就其材器各加試用不惟不沮傷其志是亦陛下覆載涵育之徳也孝孫又論方靣之寄勿遽更易上奏曰臣前日奏事延和論及久任官吏之意臣竊謂設官分職以相經緯而不責悠久一切代徙曽無常任皆自昔之公患比來朝廷思革前弊如監司使者稍稍任之久而方靣之寄尚或遷易不常事大體重方幸得人要且勉徇吏民便安之意少息逓𫝊送迎之勞曲假歳月使得盡所設施夫豈不美如留守大名府韓琦知成都府趙抃皆朝廷舊臣天下之所属望琦有大節抃有清德所至誠服如其父母藩垣之外得斯人而任之則可以坐分宵旰之憂矣臣願陛下留神方靣遴揀名徳久其時歳勿遽更易雖心在王室臣子之志而無以公歸實厭輿望臣不勝區區九年監察御史裏行蔡承禧論除授不經二府上奏曰臣伏覩近日命趙卨為安南招討使李憲為之副外議紛紛皆云不自二府此雖陛下擇才之明亦必與大臣商議又曰憲所陳請多不經由二府徑批聖語下招討司此果有之乎是非之間臣未易以臆決風傳之事或難盡信然若無其由安得此語臣職居風憲義不可隐茍有聞見宜以悉陳臣竊以人君之職在知言以言任人既難偏用則先參驗其平日之素行又考察其今日之所能凡所能所行已先參攷則曰功曰效從可類求自小官而至大吏自大吏而至大臣及夫參預政機圖回樞要任既重矣察亦至矣故古之知治之君不以疑大臣為嘉謀以擇大臣為重事若夫道不足以簡人君之心行不足以孚天下之衆所措乖戾所為諂邪則敷告外廷去之可也至於使居其職而不責以所任之事使充其位而不責以所行之言内計定而外言得以轉移近習進而輔政之語得以侵奪或文符直行而不領属於公府或論議隂進而不闗決於樞廷則滅裂紀綱何莫由此諒朝廷以為事之大者必須僉謀已令大臣詳論事之小者不欲迂滯祗使小臣開陳或患其宛轉而虛有留難或以其廹急而不暇詳問夫王言之出尤在謹微其初小不留神其後遂為故事某日某事稍繫政經已嘗不下二府某日某事不繫國體何縁却闗外司樂便疾於一時忘幾微於後日一啓其漸寖難改更況於邊廷休戚至重且命大臣者所以同安危而繫休戚者也今至煩莫若邊鎮至重莫若將臣而有不預焉則大臣之能知其任者必皆自疑莫敢安其處矣既不敢安其處則同心同德之義虧矣大臣之罷軟者必曰勢位已極矣上已為之而又以力爭則獲專權之咎矣大臣之不勝其任者必曰此出於聖㫖我何預哉是謂其能者為自疑之端不才者為容身之地積此而往豈國家之利邪而又君逸臣勞勢自當爾主憂臣辱事皆固然未有君宵旰於上而使臣得燕安於其官主憂勞於中而使臣乃恬然於其下者也臣不必遠引古今以國朝言之章聖皇帝責謂李穆天旱如此盈車載俸於汝安乎可謂能知責輔弼之方矣太祖以王著醉於玉堂而悉逐御史此可謂能責彈劾之臣矣葢平日不侵其所職則日後可責以有成臣伏覩近世朝廷所以責臣下者至輕羣臣所以自任其責者尤鮮二府侵奪寺監之職寺監侵外任監司之職監司侵州縣之職方今之弊在所革除豈可相承上下如此則恐權綱一紊拯之則難臣欲乞除命大臣臺諫之外事無巨細非經二府者不得施行其乞不下兩府者悉傅以法其大臣或可疑若不堪其任者速令罷免如二府之論或有異同陛下搃攬其成裁斷其可而後行庶盡帝王容下之美大臣無諉上之咎人人自任其責君臣之間各盡其道侍御史周尹乞重使者之任狀曰臣伏見朝廷近年遣使出外大則察訪制置小則幹當公事逺至兼兩路近亦十數州竊原其意豈非以天下至廣人情萬殊髙拱深嚴不能周知夫事物風俗之變環顧僻逺不能親諭以徳意志慮之詳臨遣軺車旁午道路葢欲其宣布上澤考正法度講求民瘼推行美利擊奸暴振滯淹甄别賢方澄清風俗此堯之聰明舜之考績文王之憂勤而陛下之求治也然將命之人間或不稱所選煩苛掊刻失於大體所至郡縣惟糾擿簿書小失刋正吏文空言變更已成而妄作聰明摧辱監司而自為威重聽任失實措置乖方期會之嚴甚於星火以致職司諂事官吏驚憂一方騷然不敢安處有識聞見為朝廷深惜殆非所謂肅肅王命仲山甫將之皇皇者華言逺而有光華之義也近聞朝廷察訪體量幹當公事等官内有任意違法者許本路監司覺察聞奏必以使者不職如前所陳故行約束不令過當然王人銜命乃為外司檢察本末倒置非所以尊大朝廷也臣願陛下重使者之任謹選而時遣之非素有才行曉知民務之人不以將命非廢置利害闗於要切之事不以輕出無令使者為監司所議庶幾君命不辱國體增重崇忠厚之化革偷薄之風十年監察御史裏行彭汝礪論守令許保明再任上奏曰臣聞事有若緩而所主最大理有若迂而所闗最急者守令是也今之談治道者咸謂迂緩忽而不省然百里之命千里之寄財賦之繁彼實尸之獄訟之重彼實任之向使一不得人則陛下雖有徳澤誰與逹此百姓雖有沈寃誰與領此臣伏見陛下儲神政機勵精民務屢下徳音誕告中外峻刺舉之法嚴考課之令四方聳然咸知趣向以臣觀之今四海幅員之廣有學士大夫之衆所謂循良之長慈恵之師宜不難得然限以嵗月不足以程其功槩以資格不足以起其意臣今以為宜委按察官精覈部吏其有䆒心政理宜於其人有志功名善於其職者縣令許知州保明申監司知州許監司保明奏朝廷不限員數並許再任如任内别有功狀卓然可觀大者特賜詔除次者優加秩任其合闗陞磨勘者並與就任陞改如此則能者得極其意奮迅於事功中材不忍自棄自勉於職業汝礪又奏曰臣比縁入對乞令吏部選薦人才以待朝廷考擇䝉恩許令尚書左選略賜施行甚大恵也詩曰濟濟多士文王以寜欲多士有道在知所以養之求之而已養之在久求之在博譬猶梗楠杞梓之木皆須百年而後成蘋蘩藴藻之菜亦非一所而可得尚書左選惟升朝文臣而已如右選及侍郎選不與焉衆才所聚不謂無人臣欲乞令三選皆倣尚書左選法而推行之責之以不已必有所得上稱朝廷所以求取長育人才之意惟陛下留神汝礪乞選任大臣諫官狀奏曰右臣學不燭於理又不稔熟於時事雖思冒昧自竭亦自知其無補也臣竊自念三代之盛莫如周周莫盛於成康昭不克繼穆幾於亡宣王中興然已不純於文武矣髙祖取秦為漢一傳而有呂氏之禍文景之際盛矣而亦有七國之亂武帝好大喜功兵出無虛歳海内為之騷然光武再有天下號令溫雅政教宣昭所克繼者顯肅而已肅已下無稽焉神堯之功不及湯武太宗之治幾於成康至於髙宗孱弱武氏遂專制明皇之興不克厥終唐自此㣲矣下於五代中國分裂為七八及真人出四海一而聖聖相續太平踰百年矣自三代以來其盛未有如今日也深惟萬物之變相徃還於無窮治不能無亂安不能無危臣稽諸天變察諸人事參之徃古驗之來今度天下之勢足以為大治亦可以為亂足以為大安亦可以為危治亂安危之機在陛下察之而已臣之不肖自顧無益陛下事惟陛下謹擇大臣以與政事選揀忠直以當言路庶幾利害邪正不壅於聞聽而天下終保於治安也臣不勝拳拳之至臣所陳非一不能以動天聽天下之事在下者不能言之而在上者不能知之雖然不能言之及其能言之則亦行之矣不能知之及其能知之則亦去之矣則是猶未為深害也若夫已言之而不能行已知之而不能去則為害大矣臣不任震慄謹録奏聞汝礪又奏曰臣聞為君難任人而用之則為君非難知人難修身而取之則知人非難陛下固天縱之將聖又不厭於學其於天下是非之理固已昭晰矣惟所以是之而觀天下之賢惟所以非之而觀天下之不肖則邪正曲直何隠於日月之昭昭耶然天下之理有似是而非物之終有敝者不可不察也所任主於仁而有容者也而庸懦者同焉庸懦者其形似仁而非仁也所聽主於知而可以謀也而纎巧者附焉纎巧者其說似智而非智也所使主於勇而足以有為者也而暴戾者出焉是暴戾者其迹似勇而非勇也自陛下即位此類誤陛下多矣幸陛下加察焉子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行葢亦不得已矣然自朝廷至於郡縣凡幾位自公卿至於士凡幾人欲以一人之知昭明而宻察之亦不可勝辨矣使臣為計亦擇其大者而已臣願摠天下之事而兼計之盡天下之才而兼論之而為之圖籍焉自廟堂之上與任安危者當幾何人而其道大其徳駿可與同者今幾人自邊境之外所與分邊寄者今幾何人而其謀深其猷壮可以使者今幾人内之為府為監為省為寺者幾何處也外之諸路及為大郡府又幾何處也其徳行可以教人其忠謀可以諫諍者可以長人者可以理財者可使者或貴或賤或遠或近今摠幾人蔽之吾心謀之公卿大夫聽之民言皆以為可則可以不疑矣以信任之使之固以恩遇之使之厚以禮遇之使之盡久之乃遷焉夫其大者已得之矣其小者付之有司不用吾知焉可也以臣所計不過數十人而天下事定矣葢堯之所知者一相而已舜之所命四岳九官十二牧凡二十二人而已周官之所論三公三孤六卿凡十二人而已天下亦多事矣雖舉而推之將不勝其多而其所求者止於如此乃所以能足也葢堯以一相使引其類則得十六相舜以二十二人分治内外而不仁者逺周以六卿各率其属而兆民治此其所以為帝所以為王也夫四海之大百官之富未嘗無才也在人主所取而已詩曰薄言采芑于此菑畝夫宣王中興之主乘天下乏才寡能之時崛然興起求所以為相所以為將葢無不如其意以今日之盛祖宗恩徳䝉被百年而陛下養育之至亦何求而不得乎惟陛下念之汝礪又論縣令狀奏曰臣聞朝廷選職司重於郡守選郡守重於縣令亦勢之自然也然臣嘗以謂一路之為職司者不過三四人一州為之守者一人而為之令者或五六人或十人事之自縣而至於州者十止於三四自州而至於職司者一二而已故利害係於民者至多而其迹尤與民親者莫如令也陛下作為法度尤用意於此而臣所經渉徧江淮數千里之間求其能至於不敗事者已少而其不才茍簡貪冒之人實不可勝數其能以至誠推陛下之徳意志慮以施於民者往往而絶也臣以謂為縣終不得人則陛下雖有善政終不得以及天下莫不有青苖免役也有處以為大利有處以為大害莫不有賦稅也有處以為増羨有處以為虧損然則法之行果繫於令也今選人有舉者三人進為令令得舉者五人遷為京官知縣其所保者不為賍汙而已雖不能不恤也邑有小大人之才有餘不足循名次授之則不才者往往誤當煩劇難治之寄而有能者或置於寛閑無事之地此非善使人之方也且如廬州之舒城合肥慎縣與亳之衛真皆用京官如饒州之安仁餘干與歙之祁門皆係舉令然合肥慎縣之事十於衛真舒城祁門之煩非安仁餘干比也今不度其力而任之其能不敗乎夫喜安逸惡勤勞皆人之常情也非少優與之則孰肯自投於危辱之地哉臣乞令逐監司籍繁難縣皆待舉而後入稍優以恩例其治狀尤善者奬擢之至無狀者黜之因以為舉者之賞罰因以觀舉者之賢否如此則縣邑徧得才能而民莫不受賜矣然臣初從仕見自選調為令自令得以京官為縣頗自喜慰人人皆有激昻趨赴事功之心自此數年至不樂為縣雖少年强力往往自屈以就管庫之安閑而一縣闕令嘗更數年假攝者以為寄寓而事之敝敗多矣凡此皆制御太嚴之敝也且如青苖免役其條件已不可勝計一行移之不如式一出納之不如期則憂辱己隨之今審官流内銓自比年停替者餘二千人矣自縣事得罪者十至六七焉傳曰未有多禁而能止者未有多令而能行者計亦在擇人而已不為之方而以煩文繩之求郡邑之治猶駕駑馬而責之千里必不能至矣惟陛下少寛銜轡使得有行焉臣向聞陛下宣諭使人曰化國之日舒以長使人可為也士人聞之至有感泣者夫先王有不忍之心則有不忍人之政惟陛下力行之貼黄臣問審官吏今知縣闕次常有餘處雖至好縣分亦不肯注授故諸處闕官有至數年者今逐處縣分惟能了青苗免役等錢則監司以為材能亦不問其它人不復知有縣令職事陛下之民其休戚尤繫於縣令不為之計則雖陛下日新政治民終不獲安息汝礪又論遣使狀奏曰臣聞人君有視聽之明而不足以周於物有仁民愛物之心而不足以逹於天下於是遣使焉將使以興利也非智不足以知之非仁不足以行之將使以除害也不忠則不能無欺不信則不能無詐然則遣使亦重事也今諸路有都轉運轉運發運提㸃刑獄提舉常平市易而逐司各有官勾當内有司農市易將作軍器兵部其出使者或三四人或六七人而朝廷特遣之使又皆不與此比所遣既數而所與又多不慎小人因縁附託得攝尺寸之柄而乘權勢之來一旦作為威福以廹蹙州縣將迎少失則發剔㣲細而吏無容足所矣如程昉以閹人將命而狠虐傲慢雖近臣往往見其為姦利暴於民言獨不知有以告陛下未也如張靚異時號奇俊士其在兩浙阿附撓正醜迹今已見矣如張諤為司農使其属按開祥一日罷去者八人而奏報之妄十幾六七至今留滯未決如軍監以選人張杲計置皮角而所至淩轢蹂踐郡邑為之紛然陛下之徳恵未施而怨譏先滿於道路朝廷之事未集而威令遂輕於天下以此知使事非可輕也且古者遣使雖數然以傳記考之如大小行人訓方氏撢人之属其所職各一事未有預黜陟與奪如今之易也今司農寺属官所至皆得檢發而其類尤為横逆臣聞先王之使人其大小輕重各因其才而已少年吏更渉未幾又非有過人之智而委付如此必不克堪矣臣伏思朝廷逐路有職司數人皆為陛下布宣徳意以詔於民者也今博選其人可以任朝廷之事矣國家改為之始青苗之法未行農田差役之事未正故須專使如將作補完城壁軍器計置皮角亦皆至遣官今事且就緒使職司遣人足矣職司不能集責之可也何用紛紛如此也其它亦申勅所司慎出其属庶幾吏得自盡其力無使國家威令頓輕於天下也元豐間曾鞏上言曰右臣伏覩本州人試將作監主簿潘興嗣五歳以父任得官二十二歳授江州徳化縣尉不行熈寜二年朝廷察其髙以為筠州軍事推官不就今年五十六嵗安於靜退三十餘年臣竊以康定中徐復以處士收用辭不就得官其一子近王回孫侔皆以幽潛見録命下而回已死亦得官其一子李覯以國子直講退歸死十年亦得禄其後則國家之於激奬廉退既肆其所守又恩及其世葢有故事今與王回同時見録之人有孫侔而後又有興嗣處幽不改其操皆已白首然未有為上聞者故其子獨未䝉恩竊以康定至今幾四十年士之抗志於隠約而為朝廷所知者止此數人葢枯槁沈溺其守至難故其人至少為國家者取而顯之使天下皆知士之特立無求於世者不為上之所遺則自重者孰不勉浮競者孰不悔可謂施約而勸博寵禄之所以勵世其實在此臣故敢以聞伏惟陛下幸察侔及興嗣躬難進之節遭遇聖時用王回徐復李覯為比加恩其子使斯人不卒窮於閭巷足以明示天下興嗣有子羣年二十六嵗孫侔今家真州謹狀奏聞八年監察御史王岩叟上奏曰臣聞治天下者不患乎無賢而患有而不能用用而不能盡而使小人間之以亂其治爾葢小人之傑者皆有材可稱有能可喜修威儀正顔色飾辭令與賢並進於前誰非賢哉此人主所宜察之而勿誤也臣以謂旁求素履而深考之博採公議而審觀之則賢佞可得而分矣臣請詳道所以察賢佞之說陛下埀聰明以聽焉幸甚賢人之所為其進也難其退也易利之所在不競也勢之所居不趨也言行則惴惴以留而色不驕言不行則遲遲以去而色不怨以百姓之安為樂而不以己之安為樂以國家之危為憂而不以己之危為憂矯世厲俗有所不為以觸忌也而不變犯顔逆鱗無所不盡以嬰禍也而不悔不蔽天下之善不隠天下之惡專以不欺事其君執徳秉義終始如一不觀當時之所好惡而順之此所謂賢者也陛下試持此以取之而天下之賢有不為陛下所得者臣不信也佞人之所為無定志也無定言也上所欲為則為之不惜其君之過舉也不卹其民之後害也進人不以為國家而以為己謀事不以先社稷而以先身天下有疾苦而不以告也天下有善良而不以聞也懷禄耽寵人情之所共厭而不自知也前日以為是後日以為非而不愧也然而自古中材之主未嘗不為所惑者其巧言可聽其令色可悅仁人君子之樸訥非所敵爾此所謂佞人也陛下試持此以照之天下之佞人有不為陛下所見者臣不信也孔子曰知仁勇三者天下之逹徳伏惟陛下知足以知之仁足以守之勇足以行之惟知之益深守之益固行之益篤以終之而已延登忠賢以輔成主上之聖徳放逺佞柔使不為清明之瑕天下幸甚社稷幸甚哲宗即位王岩叟為右司諫權給事中繳駮安燾除知樞宻院上奏曰臣伏以左司諌之職属門下省近䝉本省批狀差兼權給事中給事中職當論駮臣雖暫權義難茍且今日伏覩畫黄除安燾知樞宻院公議不允臣不敢放過門下縁過門之後即是施行既已施行益難追改據燾不才無補陛下而玷處廟堂坐尸厚禄考之物論謂當置之散地别進賢才今乃超遷總領機務位愈髙而德愈不類任益大而才益不宜必恐多致人言上煩聖聽臣所以輙先封還乞陛下更加裁慮或陛下必憐其人未欲遽行罷免則願且勿陞其位但令與范純仁並為同知諫院可也臣亦再三為陛下思之惟如此頗為易處伏望聖慈恕臣疎虞僭易之罪察臣區區愛國之心特垂採納岩叟又論安燾敇命不送給事中書讀上奏曰臣兩次論駮除安燾知樞宻院敇命久之不下意謂聖慈已賜開納今竊聞已有指揮門下省更不送給事中書讀令疾速施行臣聞命皇恐不知所容陛下必以臣為違拒睿㫖遂一面施行臣仰惟國家置官司正要上下相闗防相審察惟恐有失誤所以重審之至況給事中喉舌之任若不由過則不成命令何所不可臣違君之命至於再三雖陛下優容未加誅戮臣自知罪不容矣然臣少而讀書本學事君之道今不敢不以其所學事吾君也臣位可奪也而守官之志不可奪也身可忘也而愛君之心不可忘也守官之志可奪則陛下今日雖喜臣從命後日將不復信臣矣愛君之心不忘則陛下今日雖未亮臣後日將復念臣矣陛下聰明照微豈不察臣之所以區區效愚忠而不已者為陛下耶臣自為耶每與大臣結怨仇而不避者為國計耶為身耶陛下欲人阿意順㫖則易欲人抗言執議則難臣不為易而為其難亦何心哉但恐因臣不能為陛下守職事而獲沮抑則人人務為其易非朝廷之福也古人有言曰賞當賢則臣下勸罰當罪則姦邪止此國家之大柄而人主不可以不謹也陛下一日逐章子厚於汝州可謂罰當罪矣一日擢范純仁為執政可謂賞當賢矣然安燾之進則未見其當此臣之所以當力為陛下言也陛下曰必行之臣曰必不可行則是以臣抗君也宜乎死有餘責然臣言之不已為之不疑者以臣職當然也守職而不敢曠乃所以奉陛下也貼黄臣豈不知即時奉行上則可以順陛下之意下則可以悅大臣之心順陛下之意是臣之志也然國體之所深繫恱大臣之心非臣之志也況公議之所不與臣但知以守官盡臣職不敢將職事作人情若少為俯仰便失忠義欺明主誤朝廷是臣負天下國家為罪大矣此臣所以冒犯天威再三論列冀陛下開納也岩叟再辭書讀乞差官權給事中上奏曰臣封還安燾除知樞宻院敕黄伏䝉御批以國家進退大臣皆須以禮況前日延和奏事已嘗面諭卿今復如是非予所以待大臣之意也可速書讀無執所見者臣既居諫諍之地又假封駮之任不敢俯仰姑息而為陛下守官不敢顧避從䛕而為陛下持法今燾差除未安已累恩徳命令斜出尤損紀綱此事至重實繫國體臣所以夙夜思慮殆廢寢食屢進愚忠冀回天意陛下初以燾次補而進之終以燾自辭而聽之是進退大臣之禮也臣以燾為不才不當雜羣賢並進所以上助聖明判白賢佞使在位端亮名節之人知陛下聰明旌别感激自勵是所以副陛下待大臣之意也及延和殿對䝉被天奬使臣得安心言事必賜主張在臣之分何以為報須事無大小有利國家者知無不言乃可以副睿眷況今日之事諫官御史議論如一臣之區區豈敢偏執所見伏望聖慈察臣之心恕臣之罪特依前奏早賜施行貼黄臣竊恐陛下之意謂己行之命重於更改縁給事中本為封駮所封駮皆已行之命置官之意葢以封駮為重而不以己行為重也自唐至徳以來命令既出由給事中封駮之故改而後行者不可勝數陛下固已熟知如此更願優容開納使有司得為陛下守官以正綱紀臣謂為臣之罪莫大於反覆臣既再三論列義難却行書讀伏望陛下别賜指揮差官權給事中以全孤臣之守岩叟又奏曰臣累言安燾之進不能協公議不能重朝廷不能服四夷又告命不由門下書讀無以正法度無以持紀綱無以敕羣臣所繫甚大至今未䝉省納施行多士之論皆以皇帝陛下太皇太后陛下自聽政以來未嘗有一事不惬天下之心今乃因不才無狀之人致累吾君全美之徳非獨臣惜之天下愛君之人誰不惜之臣恐有獻言者誤陛下但謂己行之命不可回不復陳義理當如何此非忠於陛下之言也非明於王體之論也自古及今惟苦口逆耳諫止君父使無過舉為天下後世所議乃忠臣也乃明於王體者也臣竊以明主惟義是從不以回已行之命為難請引仁宗朝一事以告陛下慶歴三年三月二十一日除夏竦為樞宻使四月八日用御史中丞王拱辰諫官歐陽脩等十一疏追竦樞宻使敕當時名儒石介作為聖徳頌以詠仁宗之美天下流傳至今稱為盛事伏望陛下法而行之不以改已行之命為難而以聽諫為重天下幸甚臣志在愛君忘其再三之瀆惟陛下察臣之志臣死無恨岩叟又論擇相不可不謹上奏曰臣竊觀詩書所載歴代傳記之所著其稱帝王能事莫大於知人知人所先莫先於輔弼輔弼得賢則百寮任職而上自處於無為之地矣至簡而全人君之美不勞而收天下之功故臣區區愛君之心願陛下無失乎此也伏思陛下聽政方踰年而治道已清四方已寜人人之心懽欣交通而無所不足者陛下進賢退佞如指白黑之效也今輔臣缺位臣知陛下擇賢而任之必無所誤然中外之人莫不翹首拭目以觀陛下此舉臣不可不告陛下其戒之重之孔子曰衆好之必察焉孟子曰左右皆曰賢未可也諸大夫皆曰賢然後察之見賢焉然後用之陛下以孔子所以不輕信之心而取之庶乎其無失矣陛下念公忠之臣得之難也不可不勞心於初以求之誠得其人則陛下逸矣念佞邪之人去不易也不可不精意於初以别之誤進一人則陛下憂矣自古以來世主之患患在喜髙名之士而陋少文之人曾不知髙名之下有奸才少文之中多重器不可不辨也成天下之業敗天下之事常爭於辨與不辨毫釐之間耳賢者居廟堂則上可以尊天子重朝廷下可以安百姓鎮四夷茍一非其人則國事危而人心揺矣羣邪類升百偽交作陛下雖欲奠枕而卧有不可得也陛下之憂實臣之憂敢於未然傾瀉肝膽庶幾有補萬一惟陛下采納甚幸貼黄竊以命執政大臣不與差除百官同也百官雖進若不合公議退之甚易執政既進朝廷便繫體貌雖陛下悔而欲罷亦有所不可所以不可不謹之者此也初若不謹後致人言則陛下傷知人之明矣岩叟又乞審於進賢果於去奸上奏曰臣伏覩陛下即位之初首副天下之望用司馬光執政信行其言以革天下之弊惟光憂國愛民之誠心信於上下信於内外故陛下一用之而天下之心安四夷之心安而陛下之心亦安今不幸光薨臣知陛下之心漠然矣臣竊聞百姓相與憂曰吾君能不忘光之言乎求其類而用之使持循其法乎又憂曰奸人無乃復將為朋動揺正論以欺吾君乎無乃競為身謀不卹國家之急以病吾民乎誰復以吾君之心為心以吾民之意為意夙夜盡瘁以遺其身如光者乎吾君方倚光以圖治而天遽奪之其何意耶臣願陛下益勵乃心益謹乃事益重所付不可泰然以忘憂也今宜先有以釋民之憂而安其心者惟當果於去奸審於進賢二端而已爾夫大忠在朝奸人雖未去猶有所忌而不能為也光薨奸人今不可少留矣此臣之所以言陛下當果於去奸也朝廷輕重天下安危生靈休戚在用人而已今天下將觀陛下用人以卜否泰此臣之所以言陛下當審於進賢也去奸進賢皆能有以協天下之望則百姓復何疑而憂哉惟陛下圖之天下幸甚貼黄自古人臣因妒賢嫉能之心而遂害國事者無世無之臣觀光之賢上則見信於陛下下則見信於百姓人人自恥以不及也臣恐此後必有妒光者隂以妄言毁短光之所為以疎陛下之心俟間隙一開則將入其邪說行其奸謀以壞善政此陛下不可不察也臣生平未嘗與光交接又未嘗受光恩非私於光也惟恐小人或誤陛下耳今天下事大定矣民安且樂矣此治道之成而聖功之著也惟在陛下持之益堅信之益篤勿有所移則天下幸甚中外之人皆望大禮後罷張璪軰二三邪佞無狀之人何意璪軰未去而先失一忠臣此中外之心以為歎恨之深者也今因璪軰自有請願陛下早賜從之别命忠賢以重朝廷以為國家倚賴以慰服天下之心尤不可更容遲久玷辱廟堂使蒼生失望四夷不安也六年岩叟簽書樞宻院事乞用君子保泰道上奏曰臣聞論者曰致天下之泰難守天下之泰易臣獨曰天下之泰致之易守之難葢方其未也莫不急於求賢渇於聞諫得一善惟恐未之能行見一不善惟恐未之能去潛心於隠微而用意於人之所不到兢兢業業不敢暇豫故卒至於安樂而無事此天下之泰所以致之易也既泰矣曰我尚何求哉心日益驕志日益怠謂賢者足矣而忽於求謂善言盡矣而厭於聽謂患之隠者為不足慮謂事之微者為不足防奸生而不知禍變而不悟故卒至於敗亂而莫之救此天下之泰所以守之難也易曰君子安而不忘危存而不忘亡治而不忘亂又既濟之象曰君子以思患而豫防之此皆聖人戒懼於治安無患之時者也伏惟陛下臨御七年於兹進賢去佞協天下之公興利除害同百姓之欲無滛刑無横斂不聞一夫有怨嗟之聲奸宄不作兵革不試時和嵗豐海内寜謐以古驗今可謂泰矣陛下又所以守之者有道無宫室之好無聲色之玩無畋逰之樂無神仙之惑無干戈之喜私謁不行苞苴絶跡百王之蔽乃無一焉進學勤政寒暑不渝徳日以新天下之勢固已不憂矣而臣尚區區若此亦何心哉以謂今日之治不易至此臣愚誠過計竊憂朝廷恬於無事稍怠初心或容小人乘間而隳我㤗道為陛下惜爾夫小人而無能不足畏也惟小人而材然後可畏正在陛下審問之深考之明辨之謹遏之不使小人得以雜其間必擇端良忠信不二之君子而用之則今日之所以保泰道者至矣備矣陛下以純一之徳守於上羣臣以純一之意守於下使泰道日長而無窮天下無患臣不勝大願岩叟拜樞宻直學士簽書院事入謝太皇太后曰知卿才望不次超用岩叟又再拜謝進曰太后聽政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失復少進而西奏哲宗曰陛下今日聖學當深辨邪正正人在朝則朝廷安邪人一進便有不安之象非謂一夫能然葢其類應之者衆上下蔽䝉不覺養成禍胎爾又進曰或間有以君子小人參用之說告陛下者不知果有之否此乃深誤陛下也自古君子小人無參用之理聖人但云君子在内小人在外則泰小人在内君子在外則否小人既進君子必引類而去若君子與小人競進則危亡之基也此際不可不察兩宫深然之岩叟又論劉摯蘓轍上䟽曰臣伏見右僕射劉摯以人言避位於今累日中外之議惶惑不寜竊以摯自陛下垂簾之初首當言路條陳政事排斥奸邪無所顧避天下知其忠故不次登用天下之人莫不以為當而大奸在外含怒蓄怨欲食其肉者非一二矣今朝廷清明天下安靜固出於兩宫虛心求治開誠納諌之效然一時戮力盡忠之臣摯居其最實陛下同心一體可保終始無變之人也自非罪狀顯著衆所不容豈可因一二偏詞輕示遐棄臣恐適足快羣奸之意而失衆正之心非所以為國家計也臣毎患朝廷之上享陛下髙爵厚禄者雖多而與陛下同心協意者則少今就少之中又將退斥臣反覆念慮竊以為憂蘓轍素有時名元祐以來排邪助正竭力亦多今若止因一舉官失當便行罷逐恐於陛下進退大臣之體有所未允況言者别有所懷未易可測臣不知披肝瀝膽事陛下之日久者為可信邪足一踐言路未得其腹心者為可信邪安知其間無朋邪挾私而隂與羣姦為地者陛下何不稍緩其事試加考察將必有所見知臣言之不妄古人有云天子重大臣則人盡其力輕去就則物不自安願陛下曲加含忍以全終始之遇且使小人不能有以闚陛下臣遭遇陛下非常之知不與衆人比既有所見不忍負恩黙黙自守臣本欲候來日垂簾面奏以當行事齋戒不獲登對須至冒昧天威進此狂瞽惟陛下裁擇幸甚貼黄臣度言者欲盡塞衆正之口不過以朋黨加之先惑聖意然自古奸人之欲排陷善良者莫不皆為此無形之說以肆誣㒺陛下博覽書史必能深察歴代名臣奏議卷一百三十七
