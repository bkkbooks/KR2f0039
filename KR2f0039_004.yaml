body:
  text: 歷代名臣奏議卷四明楊士竒等撰君德宋光宗臨御初方求讜論太保致仕史浩進封事曰臣恭讀訓詞不勝威懼臣聞重華揖遜文命祗承面授之規不踰數語親傳之妙夫豈多岐惟精惟一以執中惟幾惟康而弼直直乃人之主也中亦人皆有之然喜怒哀樂方泯乎未發之時怵惕惻隱不萌乎乍見之際豈可以言語得豈可以形象求操捨繫於存亡休拙分於勞逸指其大要名之曰心是故謀國之言必以正心為主心是百行之本心為萬化之原天地之災祥陰陽之舒慘日星之明晦禾黍之豐凶綱紀之弛張風俗之薄厚人材之邪正外域之從違雖萬變之差殊由一心之感召收之不外方寸用之彌滿六虛胸中一不正焉天下不可為矣所以帝舜當倦勤之日神禹於嗣德之初首發要言誠知急務勿謂書生之末學俗儒之常談也洪惟夀皇久御萬邦黎獻之臣陛下夙正一人元良之位百祥並萃二紀有餘燕翼詒謀龍濳藴德過庭承詩禮之訓至寢問晨暮之安金口所宣玉音不閟精微之理涵養之方既已悟於耳聞又復得之身教尹京之政民間盡服神明參決之機天下隂蒙福利此豈師資之善誘實由父子之密傳伏諒淵衷洞照靈府瑩如止水之不撓皎如明鑑之無塵妍醜攸分鬚眉莫遁過此以往奚必他求由是而之莫非此道故大學曰心正而後身修身修而後家齊家齊而後國治國治而後天下平董仲舒曰正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不一於正要其極摯義則昭然宜在睿明講之熟矣而況夀皇拔尤取頴俱收英彥之流端為陛下遵制揚功丕闡治安之具朝廷之上臺閣之間輔贊彌縫論思獻納一歸之正以復於君寧有闕遺下問間退猶且海嶽不厭涓塵之助綸綍俯逮田野之臣遂使陳人亦承清問耄矣無能為也言之得無訒乎然念飛蜂走蟻之微尚識尊君之義食芹負暄之賤不忘享上之忠當聖主推誠納諫之秋無昔人逆耳嬰鱗之懼臣學誠淺陋材亦荒唐雖乏寸長願殫一得是敢不量僣越上瀆威嚴臣竊謂人之有心亦如弩之有栝發於此者不過毫釐之眇應於彼者奚啻胡粵之殊論人主之宅心與匹夫而異轍匹夫守之不正則禍止於一已人主守之不正則害及於萬方夏癸商辛秦皇隋煬驕奢暴虐淫亂荒亡皆由一念朕兆於初萌不得其正及至百姓􅕚頞而相告雖悔何追是以舜受堯言禹承舜告必於歷數在躬之後始揚危微至妙之辭臣曩塵建邸之具僚叨輔隆興之初政抱其所學得遂逢辰故非是道而不陳偶幸斯言之適契不圖晚嵗獲觀德化之成又值真人出繼離明之照敢以不移之論著為得效之方伏望聰明特垂采納蓋以心正則本立本立而道生推而行之末自遂矣踐阼之始圖治當先建官以輔儲皇求賢而用吉士則萬邦以正矣奬拔取乎靜退抑黜及乎浮華則羣臣以寧矣精擇守臣確許久任則江淮重地荆襄上遊邊防可修矣寬給楮幣下紓版曹則大江東西重湖南北月舂可罷矣力求正諫深斥流言則正人安居邪黨退聽習俗可變矣博選謀臣次求勇將則車馬必修器械必備恢復可圖矣迎刃勢如破竹善刀見無全牛兹乃土苴緒餘自然桴鼓響應蓋本既立矣末則隨之當知萬事雖繁專在一心所運一心既云克宅萬事何憂不成自昔願治之君率能明見此理崇高之勢不敢恃富貴之資不能淫兢兢無曠庶官翼翼昭事上帝若馭六馬若保赤子是心也如臨深淵如履薄氷亦是心也是故不邇聲色不殖貨利懼其驕吾心而弗正也不營土木不衣綺繡懼其侈吾心而弗正也不寶珠玉不育禽獸懼其汨吾心而弗正也不親近幸不昵佞人懼其蠱吾心而弗正也不貪遊宴不務畋獵懼其蕩吾心而弗正也不事窮誅不興大獄懼其陷吾心而弗正也所守如是其應維何能使上而風雨時三光全下而草木茂五榖熟甘露屢降靈芝叢生麟鳯在郊龜龍在沼仁聲洋溢和氣充盈四海九州羣黎百姓如處化國如登春臺百工師師多士濟濟六服承德四夷嚮風極地際天儲祥隤祉措皇基於不拔衍聖夀於無疆歷祚綿綿子孫蟄蟄邈乎億載不足以為逺巍乎六合不足以為容也孰謂一心之正不可為即政之權輿乎惟我國家用為矩範夀皇得之烈祖陛下得之夀皇何所更張惟勤祖述蓋興衰撥亂觀時樂天修文德以服逺人裕後昆而作家法此心之正不約而同陛下當念念不忘孜孜求策先自治以固本後繼志而廣聲收效虞夏同符增光日月可冀如此則夀皇付託之意得陛下纂隆之勳成入躬重闈戲綵之歡出享萬國垂衣之治曰夀曰富兩宫並受於繁禧以孝以功千古永彰於絶德乃知正心於始果可以平天下而正四方臣久在田間不知時務加之精神已憊言語無倫姑誦舊聞仰奉明詔退惟狂斐甘俟刑誅紹熙元年給事中兼侍講尤袤入對言願上謹天戒下畏物情內正一心外正五事澄神寡欲保育太和虛已任賢酬酢庶務不在於勞精神耗思慮屑屑事為之末也三年起居舍人陳傅良上劄子曰臣待罪右史日侍清光恭覩陛下大昕視朝天顔肅穆垂衣拱手尊嚴若神凡所施行悉中機會凡所延見曲盡謙勤未嘗有一話一言匆猝過差一趨一步俄傾失錯可謂動容周旋中禮盛德之至者矣近者車駕過宫日分與引班直換授之時百官有司伺候移日竟成中輟各自引退臣切惑焉何者平居暇時曽無過舉何獨至於六飛戒嚴百辟就列却乃深處九重都不省記近在旬月頓違常度者哉而軍民籍籍妄生謗議轉相倡和無所不有臣雖至愚固知陛下之不如所云也反覆思維乃得其故蓋自往嵗之冬聖意嘗有不能釋然者矣為之震怒至於愆和嘗發威斷痛有行遣由此宫掖之內人人自危宦官嬪御皆有歸過君父之心往往故作緣由欲開間隙每至期會上撓沖襟所以或於臨軒而爽興居之節或於命駕而虧號令之信陛下天資仁厚不察其為誤已臣所以深惜陛下無故而得怠荒之謗也臣聞人主之心當與天同今夫太虛清明天之體也將以潤物則為雨露將以動物則為風雷將以成物則為霜雪俄而開霽天體湛然纎翳不留三光如故若夫人主喜則為賞怒則為刑刑賞既行更何疑滯心宇泰定即天德也豈容鬱鬱有所不快自古帝王蓋有處世故之難遭人倫之變者矣要以宗廟社稷付託為至隆天下蒼生關繫為至重矣莫不先定其心期於克濟是故父母未順舜有南風之歌兄弟不咸周有棠棣之燕是皆轉禍為福身致泰和不聞以此自纍方寸今陛下上有重慶之親以慈儉聞四海下有盛年之子以孝敬聞兩宫三朝纍世曠古所無歷觀載籍之傳最得聖人之幸而又邊鄙不聳年榖屢豐一時賢才略在朝列只守成業已謂小康若懷逺圖可以大治而又以九州之富無供養有闕之虞以萬乘之尊無使令不足之恨志所欲為胡鄉不可則陛下果何所不快於心歟況夫怨不在明患生所忽方其因循但曰細故寖以悠久遂成後憂則尤不可不慮何者一國之勢譬如一身氣血標本貴在貫通少有壅底便生疾恙若乃咫尺君門杳如萬里今日遷延某事明日阻節某人日復一日莫以為怪人心益玩主勢益輕脫有姦憸乘時為利則中外之情不接威福之柄可移雖是擅傳指揮將亦無從覺察或放散儀衛或隔退臣寮或鬬諜宫闈或激怒軍旅萬一有此臣恐陛下孤立而外庭無以效區區矣然則陛下何不務自節宣以養氣體務自寬大以怡精神出則從順動之宜居則享燕間之福而直為此悒怏徒速無故之謗且貽萬一之憂哉臣嘗謂愛君之至莫如詩人見於南雅樂只君子之辭不一而足至於不能自樂則風之山有樞雅之魚藻皆以為刺作詩之旨豈是容悅誠以一人有慶兆民賴之非其已之私也臣不勝拳拳願附於詩人之義惟陛下留神幸甚幸甚四年傅良又上劄子曰臣聞天不可俄度也而示人易地不可俄測也而示人簡是故天地之神而萬物有所恃者以其易簡也帝王之德配於天地亦若是而已共惟陛下臨御于今五年省刑薄斂天下皆知其為仁兼聽廣納天下皆知其為恕而近日以來忽事獨斷尋常指揮動出意表天聽甚高人言難入群臣惶懼莫知所為以臣愚昧熟慮而究觀之則陛下本心端不如此何者臺諫對班多是隔下間有論奏亦無施行人以為陛下怒臺諫矣然經筵侍講妙選法從而黃艾首預識擢陛下何嘗怒臺諫乎給舍封駁旋被改除雖蒙留中不即處分人以為陛下怒給舍矣然王府翊善付以元子而黃裳終見信用陛下何嘗怒給舍乎留正無故乞解機政出郊數月猶未豫決人以為陛下怒大臣矣然隨班上夀之請朝奏而夕報可至欲使以左相為上公陛下何嘗怒大臣乎甚者或以致仕而恤典不下則紛然竊議曰陛下惡人言死彼李端友備數館客卒於邸中賻贈隨至然則陛下豈惡人言死耶或以乞去而亟請不獲則又紛然竊議曰陛下惡人言去彼辛棄疾召為大卿即去為帥至欲以次對寵其行然則陛下豈惡人言去耶臣故曰熟慮而究觀之則陛下本心端不如此終歸於仁恕而已臣聞天度有常而或寒暑乖錯晦明反繆者必有干隂陽之和者矣而天度固自若也聖德罔愆而或喜怒失節舉措過差者必有誤聰明之治者矣而聖德亦自若也以是言之則不怒臺諫不怒給舍不怒大臣皆陛下本心也而況於惡人言死惡人言去豈陛下之心哉而又況自夏徂冬稍闕過宫之禮遂謂陛下以疑阻虧孝養又豈陛下之心哉夫不察聖心而見其形以苦諫而力爭之是宜天聽甚髙人言難入也雖然羣臣孰不希寵何苦自絶雨露之恩孰不畏罪何苦自干雷霆之譴而孜孜半年爭此數事陛下亦盍反求而徐察之乎若陛下於此數事反求而徐察之曰吾心寬大本無所怒今若有所怒然何歟毋乃以某人嘗言之故歟吾心和平本無所惡今若有所惡然何歟毋乃以某人嘗言之故歟吾心孝敬本無所疑今若有所疑然何歟毋乃以某人嘗言之故歟茍有其人茍言其事則是誤陛下者也所以誤陛下者將以孤陛下也夫不察陛下之心而以形迹諫爭者羣臣之罪也陛下本心端不如此而不察人之誤已以致於此或者亦聖人之過乎陛下誠以本心之所存而徐察之則知人之誤已者矣知所以誤已則外廷之黨論可破外廷之黨論可破則兩宫之情意可通外廷之黨論破兩宫之情意通天下尚何事耶以此圖大功可也不暇逺圖以此為小康垂拱而責成可也垂拱而責成則鐘鼓絲竹樂與今同尊爼袵席樂與今同臺池鳥獸樂與今同無不可也然則陛下何直為此鬱鬱使天下徒日夜洶洶也臣最微賤最荷恩寵不勝忠愛之心為陛下白發其端而不敢盡言惟至明至聖為社稷大計為富貴崇高逺慮而加省焉則天下幸甚傅良又上劄子曰臣頃因奏事妄意窺測以陛下之心務在無為而厭多事雖蒙矜納不謂違忤然言之未悉不足感動今請申明之臣聞人主之德當與天同今天生成萬物皆六子之職也而天不與其勞此之謂無為若夫一晝夜之運周天三百六十五度四分度之一者則必天德也假如天德不健而一晝夜三百六十五度之間或差頃刻則其始也以早為晏其積也以春為秋由是而六子之功廢六子之功廢則萬物不遂矣今夫平治天下皆羣臣之職也而君不與其勞此之謂無為若夫兢兢業業一日二日應萬幾之煩者則必君德也假如君德不強而一日二日萬幾之際或廢一二則其始也宜速者遲其積也宜行者罷由是而羣臣之官曠羣臣之官曠則天下不理矣天德不健而六子之功廢則萬物不遂君德不強而羣臣之官曠則天下不理謂之無為無乃反多事乎夫將以無為反以多事其故何也人主不自強而讒間迎合之計中也是故因其厭省覽也則有以好名之説中傷忠讜因其憚改作也則有以生事之説沮壞勞績凡若此皆讒間也因其近聲色也則有以勿問外人之説固結宫禁因其樂燕飲也則有以勿親小事之説竊弄威福凡若此皆迎合也甚者諱惡災異雖水旱螟蝗之變而不以告禁止張皇雖盜賊夷狄之警而不以聞且夫讒間之計中則君子日踈迎合之計中則小人日親而其極至於天變不告邊警不聞如是而天下不多事者未之有也由是言之不求於實而眩於無為之名特姦臣持祿保妻子者之利非有國家者之福也然則人主果何便於此而墮姦臣之計乎恭惟陛下天資英明學力剛健遇事即斷罔或留難有言必中靡容熒惑君德如此足以上當髙宗宏濟艱難之志光紹夀皇總攬權綱之業矣踐阼以來其見於明效大驗如不信近習而請託苞苴之弊息不采遊言而察探羅織之獄衰不尚獨斷而宰相執政之啓擬行不事繁文而百官有司之職守定則又漢唐以來君德所不及也臣猶慮聖心務在無為而進自強之論誠欲陛下充此德濟此治效於其所已行達之於其所不行者而已恭以陛下天資英明學力剛健誠以其所已行達之於其所不行特反掌之易耳臣竊見間者擢用同姓為大臣有以故事爭之者陛下勿疑也雖大臣自以紹興聖訓逡巡不敢就職而詔旨丁寧不可回奪二三大璫解罷省事俄以片紙出禁中雖左右朝夕之人欲籲哀乞憐而不可得此則陛下之所已行者也至於蠢爾小臣白身補授被封駁者再矣而陛下久不忍決監司郡守差除不當臺臣論列至於數四蓋逾月而後付出此則陛下之所不行者也然則陛下非不能行直偶不行矣臣故曰誠以其所已行達之於其所不行特反掌之易耳此臣之所以拳拳也傅良又上劄子曰臣聞人莫難於養其心而人主之養其心為尤難恭惟本朝列聖養心之道備矣臣不敢逺引亦不敢精深言之姑誦臣少壯時身所見聞髙宗夀皇兩朝時事每自退朝於起居食息之暇無非以禮樂刑政之具務自檢束一日之內每事有常以何時刻延見儒臣以何時刻省閲章奏以何時刻親方册或遊戲翰墨也然後以其餘景燕衎尊爼娛嬉苑囿至於暮夜又必宣召宿直官從容晤語間以觴詠如是者皆三二十年寒暑不渝忽一日不如是即內侍以近醫藥為請而中外惶惑矣夫以堯父舜子稽古學道度越漢唐之君而克勤小物課為日程拘拘不廢何也意者雖聖人不可以不持養之故也臣幸遭逢備員近侍每見陛下臨朝之際莊敬肅穆儼然若神雖執禮名家無以竊議于以仰窺聖心持養必有道矣而比來傳聞往往以為玉音所發或異尋常機務之間稍失次第廷臣震灼莫曉其故妄意窺度其説多端以臣愚見或者陛下言動偶有此差誤耳共惟至聖至明動循法則而又春秋鼎盛剛健日新何繇言動有此差誤無乃起居食息之暇所以自持養者愆其常度而延見儒臣之時少歟省閲章奏不屑加意歟或親方册遊戲翰墨等事暫置弗講歟不然則燕衎尊爼娛嬉苑囿之樂惟意所適而無節歟又不然則是燥溼隂陽之冦或傷其和而忽忽不樂以得此也陛下幸因臣言試自省察萬一有之不可不反求之也孔子以終日無所用心為難而孟子論心亦曰出入無時莫知其鄉操存而舍亡則心之不可以無所繫也如此伏願陛下法髙宗夀皇之所行存孔孟之所戒以其日力定為常度非徒以親政蒞民亦所以尊生介夀惟赦其狂僣留神財察社稷幸甚臣不勝忠愛之情光宗時彭龜年論剛斷得失疏曰臣恭惟陛下自即大阼五年于今廣覽兼聽隆寬盡下自古願治之主克已自勵勉強欲為而不能者陛下為之無難焉真所謂有能致之資者也然縉紳之間竊議聖德猶以剛斷不足為恨羣臣進對必有以是告陛下者臣不知其説為如何但見陛下期年以來施為稍異若示人以不可測者政事舉措稍不循節奏進退臣下頗不事禮貌意所欲用雖給舍屢繳而不可回意所不欲雖臺諫彈擊而不可動宦寺涖職于中禁而不用誥命內廷取財於總司而特免録黃如此之類未易悉數其始羣臣爭之而不能得其終陛下行之而不復疑一時操縱自我豫奪自我仰窺聖意必自以為能駕御臣下而權綱在我矣然而紀綱隳廢亷耻刓滅陛下雖快一時之意而不知實為異日之憂蓋紀綱隳廢則國制亡亷耻刓滅則士氣奪國制亡則禍亂所由作士氣奪則緩急不足恃此臣所甚懼也夫人君而無剛斷誠不足以宰制萬物統御萬方然所謂剛斷者豈以事自已出人不我違之謂哉司馬光曰聞人之言而能别其是非故謂之聰見人之行而能辨其邪正故謂之明去是而捨非去邪而用正故謂之剛姦不能惑佞不能移故謂之斷然則剛斷者蓋謂於是非邪正之中有所辨别而能執持者是也寧有是非不問邪正不分而獨任已見以為剛斷者乎不知誰為此説臣深恐其誤陛下也臣竊觀今日陛下所為不過以勢屈羣下使之從已而已夫人主其威雷霆也其重萬鈞也震之以威壓之以重夫誰敢不從然陛下無徒喜其從也從者未必非禍違者未必非福孔子曰如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎此不可不察也陛下勿謂今日恬嬉無事可以肆意臣仰觀天象則變異屢作俯察人情則輕浮易動官府無嚴重之勢小人有陵慢之心無異駕腐舟泛滄海所幸風濤未作爾正紀綱以立國制勵廉耻以作士氣臣謂陛下朝夕在念猶恐不及而況可敗之耶乃若陛下剛斷不足臣亦憂之然此不可以強作也臣願陛下講學以明理循理以考事理既明於胸中而不可惑則斷自明於事外而不可移此三代盛王所謂勇智而後世賢后所謂明斷也唯陛下察焉龜年又上愛身寡欲務學三事疏曰臣聞古者史為書瞽為詩工誦針諫大夫規誨士傳言庶人謗凡天下之言無不可達於上近世唯宰相日得獻替于天子侍從臺諫之言其進已有限矣卿監而上雖有轉對然嵗或不得再見也至於百官輪對大率近三嵗始一周爾言之得達于上如此其難而當言者又不切當焉稱為人臣出入周行乎臣則不敢臣之欲有言於陛下者有三曰愛身曰寡欲曰務學然治國莫急於愛身愛身莫切於寡欲寡欲莫先於務學其實則一而已耳何謂治國莫急於愛身古者人君立三公之官師道之教訓傅傅之德義保保其身體後世宰相實兼三公之貴而不任三公之責道之教訓傅之德義僅委之經筵至於保身體之事雖世之賢者未嘗留意也人君退朝之後不過女子小人以姑息之愛奉其君爾夫姑息之愛身體之賊也而可不慮乎恭惟國家大業未復大讎未雪夀皇聖帝坐薪嘗膽未酬此志舉神器而付之陛下政欲親見聖子身致太平陛下不辦十分憂勞豈易克集此事自天下言之陛下誠不可不愛身也夀皇聖帝退處重華怡神養氣有陛下任其付託之重雖無復一毫天下之憂然父母愛子至老猶切人之情也陛下朝夕起居之宜飲食疏數之節夀皇能頃刻置念已乎自陛下言之尤不可不愛身也故曰治國莫急於愛身何謂愛身莫切於寡欲外作禽荒內作色荒甘酒嗜音峻宇雕牆有一于此未或不亡自古人君致亂之道非一然大要不出是數者而已陛下自登大位六飛時動後宫嬪御寵遇絶少宫禁興造外亦罕聞不可謂欲不寡矣但道塗之言或謂宫掖之間宴飲爽節夫酒之傷性敗德固不待言臣竊讀本草酒性大熱是以凝寒則不氷沃火則益炎醖酒之地雪霜不積推是數者天下之熱未有加於酒者也竊聞聖體嘗苦瘍疾此非其致之之由耶抑又有大可慮者酒之為害不特不嗜飲者病之嗜飲者亦病之何也自其既醒必悔所以知其飲之過度非其本性然也蓋酒與女子小人相似近之則不可逺非不欲逺也既近之則逺之將不能也臣嘗觀不嗜飲酒之人每飲則昏嗜飲之人不飲則昏飲而昏者氣為主也故有酒則氣亂不飲而昏者酒為主也故無酒則氣奪是一日不飲則榮衛脈絡若不可支蓋酒已勝氣氣不能自主其身故至于此因循陷溺不至沈湎不已聖之與凡雖曰不同而人之氣體未嘗有異陛下宫中無事小小宴飲固不至此然臣區區愚忠政恐其不已而或至於是則非陛下愛身之道也故曰愛身莫切於寡欲何謂寡欲莫先於務學臣聞善惡之理相為消長此盛彼衰不能兩大所以禹惡旨酒而好善言善言既親旨酒斯逺臣觀祖宗親近儒學之深意乃是消弭人欲之微權每以夜分之時率召經筵之士不獨欲究義理之粹蓋亦大為逸豫之防蓋聞古今之禍亂則警懼自生聞閭閻之艱苦則憂慮必切退即間宴必無過淫竊聞近日宣召經筵多在晝漏臣不知遊息深宫之際何以為存養夜氣之方欲護清明孰如義理臣故曰寡欲莫先於務學恭惟陛下聖性虗靜義理昭明視臣所言何啻白黑漢儒所謂陛下聖性得之願加聖心焉臣愚欲望陛下精擇名儒置之講席日與之講論經理夜與之商確古今自此聖學日以髙明聖德日以光大既有義理之可樂自然物欲之難移復於宴飲之間漸為裁抑之限視尋常御酒之數十分中減一二漸減至三四如此數月必大有益不特身之能愛而德亦無不懋矣保國寧家孰大於是唯陛下留神龜年又上疏曰臣聞書曰惟天聰明惟聖時憲聖憲天者也故天命有德五服五章哉天討有罪五刑五用哉無一事而不與天同也昊天曰明及爾出王昊天曰旦及爾遊衍無一息而不與天通也洪範以五事次五行而驗之以庶徵要之以五福六極豈強為是牽合哉猶人之一身氣作於內則動於容貌形於顔色者皆是物也容有二乎恭惟陛下愛人如天之溥博臨事如天之專直陟降左右與天為一和氣致祥宜如影響然自去秋以來大異數見星變地震生毛雨土赤眚作於夜黑子見於日大率相去數日輒有一事當是時人皆皇皇然為陛下憂之而臣則不以為憂何也見天之不忘陛下者甚切也董仲舒曰國家將有失道之敗天乃出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君欲止其亂也無異父兄之於子弟雖譴怒訶責若甚可畏其意但欲使之成人耳茍能因是以恐懼修省乃進德之實地也此臣所以不以為憂也及至十一月望日車駕過宫人情歡豫其晝晴寒夜忽飛雪又兩日而日中黑子頓消當是時人皆欣欣然為陛下喜而臣則不敢以為喜何也臣於此見天與陛下吻合無間陛下動靜語默豈可少有不合於天乎神宗皇帝嘗禱雨而應富弼奏曰修德致雨其應如此萬一於德有損其災應豈有緩耶此臣所以不敢為陛下喜也臣懷此欲告陛下久矣兹蒙異恩擢置右史脫略資格躐而進之荷天之龍無以為報唯念所居之官以記注人君言動為職陛下一言動之善臣皆得記之以為世法陛下一言動之不善臣亦得記之以為世戒作而不記臣固不敢辱其職然書而不法臣亦豈忍舉其職而使陛下貽萬世之辱哉記曰王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正夫正天道也古之王者能守天之正道政以巫史卜筮瞽侑諸臣實左右之少有不正諸臣皆得警懼於王非諸臣固欲拘檢於王也王實藉之以自拘檢其身也後之史官君舉必書謂之善於其職則可謂之忠於其君則未可近世記注之官許以直前使得獻替此意蓋甚美也與其必書以懲其失於後孰若熟諫以救其失於先乎此臣區區之心也臣愚欲望陛下反躬自省動循天道欲如天之剛則無所牽制不屈於欲欲如天之健則兢兢業業不敢怠荒如天之中則每事循理不倚一偏如天之正則一出至公盡絶私意由是一而不二則為天之純由是養之益和則為天之粹由是而無所不致其極則為精而與天渾然矣陛下端拱無為而守之於上臣等靖共厥職而欽承於下君臣之間雍雍熙熙豈不休哉萬一陛下未能以道制欲則雖欲諸臣箝口結舌以茍取容亦有所不可蓋人主天也人主有一毫不與天相似而其臣不諫則為不能以天事其主此乃不忠之大者臣不敢也唯陛下察焉翊善羅點嘗召對便殿上言近者中外相傳或謂陛下內有所制不能遽出溺於酒色不恤政事果有之乎上曰無是點曰臣固知之竊意宫禁間或有攖拂之事姑以酒自遣耳夫閭閻匹夫處閨門逆境容有縱酒自放者人主宰制天下此心如青天白日當風雨雷電既霽之餘湛然虗明豈容復有纎芥停留哉劉光祖上奏曰臣幸以迂拙日侍清光凡人主一言一動職所當記而螭坳逺於黼座二府大臣常日奏事陛下曰俞曰咈事之可否形於玉音心之精微見諸宸訓者既不得備聞退而直書以為信史所可記者猶有侍從臺諫請對百官輪對監司守臣陛對凡上殿班次內引奏事各關本省以所得聖語書之而比年以來一切關申别無所得聖語習成定例使謨旨鬱而不彰心聲無所著見只如臣初以司農少卿到闕引見首進五事針讀至思針陛下俟臣讀畢徐云要只從原頭理會臣對云臣千百言不如陛下原頭一語望陛下致力於此則貌言視聽四者俱治矣退欲以所得聖語申省則曰近例不然於是例亦云無之臣今以記注為職若不申明則雖有似此王言亦無自而紀載自今欲望陛下於羣臣進退之際雖所踈逺如所親近雖所嚴憚如所欵密或以玉音褒嘉慰勞或以聖意戒諭訓勉是曰是非曰非可曰可否曰否使天下聳然知人主好惡豫奪之所在仍令奏事臣寮凡得聖語即以具申本省不得一例將有聖語亦申曰别無庶幾主道昭明史筆傳載以垂萬世雖然外朝之言動皆可得而知也宫中之言動不可得而知也可得而知者固所當謹不可得而知者尤所當謹也謹於所不見不聞之地則所見所聞之地從容中道不待謹而自合謹於所見所聞之地而肆於所不見不聞之地人將窺而議之一以傳十十以傳百播之四方轉相增飾吁可畏也臣因申明本職冒言及此惟陛下留神幸甚寧宗即位初吏部侍郎彭龜年上人主當理情性疏曰臣聞人主莫大於理情性理情性而王道畢天下可得而治矣昔漢元帝即位之初匡衡首以此為言曰治性之道必審已之所有餘而強其所不足蓋聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛強者戒於太暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進夫治性繫於人主而衡乃及巧偽之徒者蓋正直之人知君性之偏則以為懼從而救正之巧偽之人知君性之偏則以為喜從而逢迎之故欲治性者必知天欲知天者必知人若能知巧偽之人而不為其所惑則性可得而治矣如衡可謂知言者也臣仰惟陛下聖性質直至誠無偽此三代令王之所難得而漢唐以來賢主之所未有者唯是傷於太急臣侍潛邸講讀之暇每以為言亦蒙陛下和顔開納不以為非今既踐大寶則嚬笑之間治亂所繫尤與昔日不同今日若急則所傷多矣易稱君德曰學以聚之問以辨之寬以居之仁以行之書稱舜曰御衆以寬稱湯曰克寬克仁寬與急為對者也君德尚寬則急非君德矣舜湯稱寬則急非舜湯所尚矣蓋言急則難信行急則難久令急則難從政急則難繼此安可不戒臣竊觀陛下自臨御以來每事從容唯近日進退人材之際微傷於急則人已不安矣及察其黜陟先後則若有成畫操縱取舍則若有機數傷急之中又損陛下質直之性臣恐有巧偽之徒誤陛下也臣嘗敬讀舉官之詔曰不植黨與此言何為有哉此必有所自矣自古小人欲空人之國者必進朋黨之説陛下亦記潛邸所講元祐紹聖之事乎夫能言人之黨者此人必有黨但欲黜君子之黨而後其黨始可進耳此語一出令人寒心陛下臨政未兩月而小人已能以此惑陛下則必是因聖性之急耳急則輕信輕信則易惑易惑則小人之計行矣臣願陛下自此遇事母臨之以急而寬以察之有如聰明必能照見情偽則知近日之舉為是為非當不待辨而自判矣臣備員勸講其職以養君德為先偶有愚見不敢不盡其言狂率罪當萬死臣下情不勝殞越俟命之至嘉定三年工部貟外郎楊簡上奏曰臣不勝起敬起恭有請于陛下陛下已自信陛下已有大道乎臣竊恐陛下謙沖未必自信舜曰道心明心即道動乎意則為人心孔子曰心之精神是謂聖孟子曰仁人心也此心虛明無體廣大無際日用云為無非變化故易曰變化云為虛明泛應如日月之光無思無為而萬物畢照陛下巳自有此大道有此光明而昨者吳曦之變韓伌胄之變近又羅日願之變又有江淮湖湘之寇何也臯陶曰兢兢業業一日二日萬幾謂心思微動不勝其多故曰萬後儒謂之萬事非也舜禹尚兢兢業業陛下宜法此兢兢業業非有所思為也平常日用無作好無作惡無怠無荒而融明無不照知微起乎意則昏蔽則放逸陛下聖性淡然無所嗜好宜清明無所不照舉無失䇿而猶有禍變如前所云者臣妄意恐意微動如雲氣之興故日月之光或有不照之處舜禹相戒猶以精一為難願陛下兢兢業業無起意孔子曰毋意不起意則此心光明所照自然知柔知剛知賢知不肖洞見治亂之幾似是而非之言不可得而惑隱微之情自無所不燭常清常明可以弭禍亂消天變祈天永命其幾在此此非世儒所能知也惟陛下兢業毋忽嘉定中都官郎官袁燮上奏曰臣恭惟仁聖在上涵育羣生無有遐邇同一覆載施恩務從其厚用刑寧過乎輕無愧於古聖人用心矣孟軻有言以不忍人之心行不忍人之政治天下可運於掌上明效大驗何其速也今陛下求治不為不久而稽其效驗尚爾遲遲何可不思其故歟臣聞古者大有為之君所以根源治道者一言以蔽之曰此心之精神而已心之精神洞徹無間九州四海靡所不燭故書曰光被四表格于上下又曰帝光天之下二帝之精神也曰明明我祖萬邦之君德日新宣重光三王之精神也二帝三王終日乾乾自強不息故能全此精神以照臨天下明並日月不遺微小至于今仰之漢之宣帝唐之太宗雖未極純懿而能勉強振作興起治功爛然可觀而史皆以厲精稱之亦可謂英主矣陛下視今之治具已畢張乎未乎民生已舉安乎未乎更化以來招延俊彥隨才授職責其功效治具似已張矣而頽綱未至於盡舉宿弊未免於猶在則難以謂之畢張都城之內財貨流通米價至平閭閻熙熙逺過曩日民生似亦安矣而逺方之民凋弊乎財賦之煩愁苦乎刑戮之慘雖當豐嵗猶不聊生則難以謂之舉安陛下尊居宸極臨制萬方惟所欲為其誰能禦今也雖有仁心仁聞而大有為之效猶未至於昭明彰著嵗月蹉跎所就止此豈不深可惜歟臣願陛下毋以寬裕溫柔自安而必以發強剛毅相濟朝夕警策不敢荒寧以磨厲其精神監觀往古延訪英髦以發揮其精神日進而不止常明而不昏則流行發見無非精神矣謹所從出出則必行宣布四方無不鼓舞號令之精神也褒一有德而千萬人恱戮一有罪而千萬人悚賞罰之精神也有正直而無邪佞有恪恭而無偷墮有潔清而無貪濁布滿中外炳乎相輝人才之精神也民間逋欠不可催者悉蠲之中外冗費凡可省者盡節之其源常浚其流不竭財用之精神也將盡威恩以馭其衆士致死力以衛其長勇而知義一能當百軍旅之精神也黎元樂其生業習俗興於禮遜五榖屢豐百嘉咸遂民物之精神也明主精神在躬運乎一堂之上而普天之下事事物物靡不精神豈非帝王之盛烈歟昔我藝祖躬上聖之資當宇縣分裂之際整齊乾坤如再開闢端門軒豁無有壅閉謂左右曰此如我心小有邪曲人皆見之矣大哉聖謨此二帝三王所以日用其力者乎詩曰周雖舊邦其命維新新者精神之謂也陛下誠能以藝祖為法則我宋之維新亦當常如創業之初矣一元之氣周流磅礴化成萬物日新無已天地之精神也惟陛下省察燮又上奏曰臣聞天下有大體人君有大德先其大者而衆善從之則天下可以大治暗於大而明於小難乎其致治矣陛下尊居宸極餘二十年無聲色之奉無遊畋之娛無耽樂飲酒之過不事奢靡不殖貨利不行暴虐凡前代帝王失德之事陛下皆無之可謂有聖君之資矣然影者形之符響者聲之答君德者形聲也治效者影響也陛下視今之治效為如何哉以言乎財計則未裕以言乎兵力則未強以言乎人才則忠實可仗者寡以言乎民生則愁苦無聊者衆明聖在上而是數端者未滿人意如此人皆疑之以臣管見或者君人之大節猶有可議者歟易曰大哉乾元萬物資始又曰大哉乾乎剛健中正純粹精也語曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也乾惟其大所以能首出庶物堯惟其大所以能光宅天下大則足以兼小小則烏能兼大是故君子大之為貴古人有言曰大節非也小節是也吾無觀其餘矣夫小節亦豈可略哉蓋慮夫君人者安於小而不志於大故抑揚其辭以恢廣人主之心云爾竊聞近者禁中銀器頗有遺失掌者不虔加以責罰法當然爾而陛下惻然憫念易之以錫朴素如此可謂儉矣不忍以器物纍人俾貪者息心而掌者無責可謂仁矣臣願陛下充而大之自一身之儉充而至於中外冗費靡所不節自一念之仁充而至於四海九州皆歸吾仁豈不恢恢乎其大哉齊宣王不忍一牛之觳觫以羊易之孟子勉之曰古之人所以大過人者無他焉善推其所為而已故推恩足以保四海唐開成之主舉衫袖以示近臣曰此衣三浣矣栁公權針之曰貴為天子富有四海當進賢退不肖納諫諍明賞罰則可以致雍熙服浣濯之衣乃末節爾由是觀之人君於小大之辨可不嚴哉天下大器也惟大君為能舉之伏惟陛下恢洪志氣無自菲薄篤信聖人之言力行先王之道立大規模成大功業以隆我宋不拔之基豈非大君之所為哉古人耻君不及堯舜中常之主猶欲引於當道況陛下天資粹美聖心淵靜足以與古帝王匹休而猶有未及為者此臣所以發於忠憤不能自默也孔子曰為仁由已而由人乎哉惟陛下自強不息日進無疆宗社幸甚天下幸甚寧宗時煥章閣侍講朱熹上奏曰臣竊聞之天下之事有常有變而其所以處事之術有經有權君臣父子定位不易事之常也君令臣行父傳子繼道之經也事有不幸而至於不得盡如其常則謂之變而所以處之之術不得全出於經矣是則所謂權也當事之常而守其經雖聖賢不外乎此而衆人亦可能焉至於遭事之變而處之以權則唯大聖大賢為能不失其正而非衆人之所及也故孔子曰可與立未可與權蓋言其難如此而夷齊季札之徒所以輕千乘之國以求即乎吾心之所安寧殞其身亡其國而不敢失其區區之節者亦為此也乃者天運艱難國有大咎天變為之見於上地變為之作於下人情為之哀恫怫鬱而皆有離叛散亂之心方此之時宗廟社稷危於綴旒是則所謂天下之大變而不可以常理處焉者也是以太皇太后躬定大策皇帝陛下寅紹丕圖未及號令之間不越須臾之頃而鄉之危者安離者合天下之勢翕然而大定此亦可謂處之以權而庶幾乎有以不失其正者矣然自頃至今亦既三月而天變未盡消地變未盡弭君親之心未盡歡學士大夫羣黎百姓或反不能無疑於逆順名實之際至於禍亂之本又已伏於冥冥之中特待時而發耳臣雖至愚亦知竊為陛下憂之而未知其計之所出故嘗反覆以思而參以所聞則尚猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懷而已爾嗚呼此則所謂道心微妙之全體天理發用之本然而所以行權而不失其正之根本也誠即是心以充之則孔子所謂求仁得仁而無怨孟子所謂終身欣然樂而忘天下者臣有以知陛下之不難矣借曰天命神器不可以無傳宗廟社稷不可以無奉則轉禍為福易危為安亦豈可以舍此而他求哉充吾未嘗求位之心則可以盡吾負罪引慝之誠充吾未嘗忘親之心則可以致吾溫凊定省之禮始終不越乎此而大倫可正大本可立矣陛下誠能動心忍性深自抑損所以自處常如前日未嘗有位之時內自宫掖燕私之奉服食器用之須不敢一毫有所加於潛邸之舊外至百辟多儀之享恩澤匪頒之式不敢一旦而全享乎萬乘之尊專務積其誠意期以格乎親心然後濬發德音痛自克責嚴飭羽衛益勤問安視膳之行十日一至而不得見則繼以五日五日一至而不得見則繼以三日三日而不得見則二日而一至以至于無一日而不一至焉俯伏寢門怨慕號泣雖勞且辱有所不憚然而親心猶未底豫慈愛猶未復初逆順名實之疑不渙然而氷釋則臣不信也若夫災異之變禍亂之幾有未盡去則又在乎陛下凝神恭默深監古先日與大臣講求政理可否相濟惟是之從必使發號施令無一不出乎朝廷進退人材無一不合乎公論不為偏聽以啓私門則聖德日新聖治日起而天人之應不得違釁孽之萌不得作矣今日之計莫大於此惟陛下深留聖意而亟圖之若復因循日復一日所以行權者遂失其正則臣恐禍變之來不但禮樂不興刑罰不中而已也人心易離天命難保厥監不逺深可畏懼臣山野戇愚不識忌諱罪當萬死惟陛下寬之中書舍人陳傅良上請對劄子曰人主心術必有所尚何謂所尚先定其志而後力行之者是也臣不暇逺引前古且以髙宗德業為陛下誦之方高宗艱難百戰之初欲復大讎欲定中原欲還謁九廟則其志尚在恢復及大母已歸徽廟之梓宫已還南北之勢已成高宗之責少塞而天下亦倦於用兵矣則其志尚在和好方志在恢復則用趙鼎用張浚自退朝之後延見臣下省閲章奏遊戲翰墨至於燕私皆恢復之謀也及志在和好則用秦檜自退朝之後延見臣下省閲章奏遊戲翰墨至於燕私皆和好之事也高宗所以享國之久動無過舉者以有定尚不雜不怠而已雖然此臣借以為喻之説而非勸陛下之説也今陛下春秋鼎盛鋭意於學而又聖稟純素絶無嗜好臣切以為陛下之心方如止水方如明鑑以此為堯舜以此為三王無不可者臣獨未知陛下之心所尚者何事欲先定者何志耳不主一事則將並進人之言而無適從不先定一志則將泛泛然日復一日而無用力之地且夫人主天下之利勢也富貴尊榮之所自出也儻陛下將聽並進之言而無適從泛泛然日復一日而無用力之地臣恐有乘間而入陛下之心者矣陛下此心方如止水方如明鑑可以為堯舜可以為三王或萬一有先入者得陛下之心而用之臣恐陛下聖明雖鋭意於學無他嗜好而此心已有所偏著也故臣私憂過計欲勸陛下且以拯民窮為所尚此志先定則陛下始有用力之地自退朝之後以此意引見臣下以此意省閲章奏至於遊戲翰墨至於燕私此憂此念造次不忘臣切以為是亦陛下養心之法不雜不怠充而大之堯舜三王之治可由是而致也何者以救民窮為所尚即是仁心仁心即是堯舜三王之心孟子嘗言之臣嘗發明之陛下嘗深信之矣著作郎吳泳輪對言願陛下養心以清明約已以恭儉進德以剛毅發強毋以旨酒違善言毋以嬖御嫉莊士毋以靡曼之色伐天性杜漸防微澄源正本使君身之所自立者先有其地夫然後移所留之聰明以經世務移所舍之精神以強國政移所用之心力以恤罷民移所當省之浮費以犒邊上久戍之士則不惟可以消弭災變攘除姦凶殄滅寇賊雖以是建久安長治之策可也袁説友上言曰臣嘗觀夫子之言曰為君難又曰如知為君之難也不幾乎一言而興邦乎大哉聖人之言深切乎帝王用心至到之地也仰惟陛下以春秋方盛之年履九五崇髙之位固欲長享天下之奉而安守天下之尊也然則為君於上而所謂難者雖一嚬笑之細而無所不寓陛下盍亦知人君之所謂難者乎臣請為陛下略陳之夫貴為無敵富為無倫富貴之盛為君者獨有也生殺自我豫奪自我慶賞刑威為君者獨專也有此富貴專此刑罰天下之事宜若無有難者嗚呼是豈知為君之道哉人主以一念慮之間知吾之所謂難者無一而可忽是故不敢易其難而畏其難則富貴刑賞我可有而不敢恃不以為難而忽其難則富貴刑賞我可得而不能守蓋知其難則畏畏則無一而不謹不知其難則忽忽則無一而不縱陛下試觀自古賢君聖主凡守此大寶居此大位而可以忽而縱者為之耶君人者大則政刑號令而開於治亂安危之機微則言動趣向而繫於教化表儀之本細則聲音笑貌而達於視效觀瞻之地小有不謹則悔吝隨至浸以不善則災害有作大而悖理傷道則亂亡不可禦矣此必至之驗也非如天下之人其善否得失獨繫於一身一家而已陛下亦嘗思前日之在潛邸與今日之履大位其難易果如何方陛下潛龍之時養聖人之德儲天下之望其一身之所形見而或有善否得失者未必盡關於目前之安危治亂而天下之議論責望其屬於王邸者亦未必如是之切且亟也今陛下上承祖宗社稷之付託下為四海生靈之宗主萬目之所觀瞻萬務之所關繫萬口之所責備其為甚艱舉足皆是凡政刑號令言動趣向聲音笑貌是三者一有過差小而議論責望大而利害休戚又大而安危治亂皆所由出也陛下當此之時其視潛邸之日一難一易固自判然矣試以堯舜觀之其君臣都俞之間且曰后克艱厥后又曰惟帝其難之方且兢兢業業知其艱且難者而不敢自安蓋以為君之難動有所關繫故堯則不敢以位為樂而舜則猶有已憂也由漢以下知此難者惟唐太宗其言曰創業之難既已往矣守成之難與諸公謹之又曰人主惟一心而攻之者衆少懈而受其一則危亡隨之此其所以難也太宗以聰明絶人之資其圖回天下若不足道而念慮發言之間且知為君之難反覆憂懼如此此貞觀之治後世所不可及本朝太祖皇帝嘗謂近臣曰爾謂帝王可容易行事耶仁宗皇帝嘗下詔曰當念守文之難敢忘置器之重祖宗念為君之難其形諸詔誥者不敢一毫有易心故能垂裕於萬世此又陛下之家法也雖然知其難而圖其易顧豈無説於此乎臣願陛下不以有位為樂而以保位為憂思其如是之難而圖其為説之易一念之發則以為難曰是善乎否也一行之出則以為難曰是得乎否也居隱顯則一其心不以隱而加忽處細大則一其行不以細而弗察小而聲音笑貌推此難之之心而不以妄發微而言動趣向推此難之之心而不以輕舉大而政刑號令推此難之之心而不以自用在暗室屋漏之中常若議者之在其後當積日纍月之久不敢一日安其心惟善是修惟不善是去惟人言是畏惟過失是憂其難在事難之在心則有治無亂有安無危陛下享國萬年而端命上帝譬如人之一身康強無疾而能惕焉難之飲食起居必畏必謹則疾疢何自而生彼恃其強者易其所難縱飲食恣起居不病則已病則雖欲救之何及哉臣蒙國恩職在獻納幸遇陛下始初清明之政虗心聽納之時用敢盡竭愛君之言仰裨聖聽唯陛下勿以為迂闊而詳察焉天下厚幸衛涇上奏曰臣聞天之愛人君甚欲扶持而安之人君之體天意者既至則天心之愛人君者無窮此自然不易之理也臣恭惟陛下頃繇初潛受天眷佑賢聖仁孝聞於天下祗若慈訓丕承大寶二年于兹天意益彰感召彌速自初行大典每舉常儀鑾輿所臨若有隂相至於雨暘順序年穀薦登四方無虞邊陲不聳自昔人君臨政願治慨想而未能致者髣佛類見之豈惟中外臣庶冀觀太平陛下覩此景象寧不自喜臣嘗考之往古驗之當今竊有所懷願質之聖心焉大抵天之愛人君者至則所以望之者亦至唯此心對越每思副其所望則天人相與寖昌茍玩其所愛不自省循則天心之愛或有時不可恃而譴咎傷敗之來未必不基於此由是觀之則凡天意之順從嘉祥之協至人君未易晏然自處也今天心之愛陛下可謂甚至不識陛下所以體天意者其已至歟抑猶有未至歟臣竊謂此天俾陛下以大有為之時所以望陛下者任大守重固當精思熟慮實休咎禍福之所判也臣不敢逺引泛論請以仁祖及夀皇近事言之仁祖臨御三數年間水旱仍臻天變數起可謂多事然在位四十二載深仁厚澤滲漉四海而丕烈懿範垂詔萬世號稱本朝全盛之時夀皇初受內禪變故尤多連嵗飢荒邊疆犯順若不能一朝居者然二十八年之久方內乂寧生民休息雖大志未就迄底小康有光髙宗中興之治夫嘉祥之應不亟見於慶歷元祐之盛時而眚異之來適以厲乾道淳熙之志業則今日天意順從如前所陳者殆未可測蓋甚可畏而未暇自喜也陛下將何以處之乎昔楚莊王天不見妖地不出孽則禱於山川曰天其忘余歟兹在陛下省之於心反之於身揆之於行事而已臣不勝拳拳願陳其愚涇又奏曰臣猥以庸愚承乏宰掾自惟空餐方祈外補忽蒙誤恩俾司記注日侍清光在臣可謂僥踰而內視闕然念終無以補報敢忘冒昧布其愚忠幸陛下垂聽臣竊惟自昔人主非不願治而君德未免有虧或失之猜忌或失之暴虐或縱聲色或崇貨利或事奢侈此心一有所溺臣下莫能救正治亂之分實由於此今陛下寬仁天覆聖敬日躋清心而寡欲好賢而樂諫凡臣所謂前數者之患無毫髮之纍矣以如是之聖質而有意於治功帝王之盛要不難致而陛下踐阼以來三年於此四海之內延頸跂踵以聽維新之政而卒未有以大慰服天下之望何也毋乃聖心或未加乎臣聞人主一心固不可有所溺尤不可無所用也天位雖不可以為樂而尤不可不知天位之至重也天命雖繇其自至而尤當知天命之可畏也崇髙富貴雖不可恃而人主之利勢不可以無所據也若曰吾既不以位為樂而視之若可輕吾安於天命之自然而不畏其難保崇髙富貴不足以動吾心而舉天下臣民事物之衆一切不以經意此非帝王所以出而撫世御俗之道也臣昨在逺外傳之道塗咸謂陛下臨朝淵默寡言於事少所可否臣始聞之而未敢信已而備數朝列兩嘗賜對臣雖不能無惑而猶不敢謂盡然也及待罪史官分立柱下今踰兩月每覩陛下尊居黼座延見羣臣自宰執之敷陳侍從之獻納臺諫之論奏以至中外庶官之進對奏篇無慮纍牘前席或至移時陛下霽色溫顔兼聽廣覽雖靡聞厭倦而聖志謙虛深自退託未嘗有所咨訪有所質問多唯唯默默而容受之進言者不得極其説秉筆者無所載其美已事而退皆若有不自得之意臣實懼焉夫陛下所以未欲形於言者豈隂拱自晦徐觀默察有所待而后發耶則陛下臨政在御不為不久機務之變可以槩見矣將深思熟慮抑畏謹重恐言之或未審耶則輔弼禁近之臣皆股肱耳目陛下所親信委任而小大臣子孰無愛戴君父之心設有未當豈不竭誠效忠安敢懷情而不自盡庸何損於盛德耶蘇軾有云人君之言與士庶不同言脫於口而四方傳之捷於風雨故太祖太宗之世天下皆諷誦其語言以為聳動之具陛下果何嫌何疑而憚於言耶臣是以妄議陛下之未加聖心也人徒曰天不言而四時行焉百物生焉不知天未嘗不言也昔聖人作易六十四卦而獨以乾為首乾天德也亦所以言君德也它卦皆隂陽相雜而乾獨純陽成卦蓋天之德純乎剛惟剛故能首出庶物宰制羣動噓焉而春夏吸焉而秋冬威焉而雷霆恩焉而雨露闔闢變化無不自我故曰天行健君子以自強不息人君法天不言必與天同德而后可也儻泊然於天下一無所用其心而惟託於不言則是啓頽墮之端樂因循之習忘逺大之慮忽經久之圖以是而求治功之進猶適楚而北轅鑿氷而取火也陛下承列聖二百四十年之基業膺太上皇付託之重臣誠愚戇竊揣陛下聖質有祖宗之風仁慈恭儉無失德過行真大有為之主時可為而不為優遊俯默偷安嵗月臣恐志士解體人將窺測陛下淺深其所關繫殆非細事此臣區區私憂過計懷不能已輒因史事為陛下極言之也臣伏願陛下念宗社之甚重防禍亂於未形毋恃聖質之美必加聖心自今以始於聽納之間留神省察奮發德音特出英斷二三大臣相與都俞吁咈務歸於至當凡百執事有所是非可否咸決以至公庶幾下情畢通事幾洞照行之以剛健積之以悠久將見志氣之發如日星之昭明號令之行如雷風之震蕩聽斷之勤如四時之不息德業日新令聞日彰何事之不可成何功之不可立保皇圖於有永耀史册於無窮端本澄源特在陛下此心而已臣不勝惓惓愛君憂國之誠不自覺其狂僭惟陛下財幸宗正少卿柴中行上奏曰陛下初政則以剛德立治本更化則以剛德除權姦今者顧乃垂拱仰成安於無成夫剛德實人主之大權不可以久出而不收覆轍在前良可鑒也歷代名臣奏議卷四
