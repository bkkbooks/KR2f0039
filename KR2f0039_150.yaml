body:
  text: 歷代名臣奏議卷一百五十眀楊士奇等撰用人宋理宗親政即以考功貟外郎洪咨䕫為禮部貟外郎召入見乞養英明之氣及論君子小人之分帝問今日急務對以進君子而退小人開誠心而布公道且言在陛下一念堅凝又問在外人物對以崔與之護蜀而歸閒居十年終始全德之老臣若趣其來可為朝廷重真德秀魏了翁皆陛下所簡知當聚之本朝紹定六年翰林學士知制誥真德秀上奏曰臣側聞中外之論皆謂今日賢材滿朝而治效不立議論盈庭而弊事不修憂時者為之歎息異意者為之姗侮豈所謂賢者非賢而衆議之紛紛舉不足采耶臣竊謂人材有大小之殊而善用者取長略短皆足以有濟議論有同異之别而善聽者去非從是皆足以有補子産相鄭擇能而使之馮簡子能斷大事子太叔美秀而文公孫揮能知四國之為而又善為辭令裨諶謀野則獲子産皆因其所長而任之用能卓然自立於晉楚二彊國之間堂堂天朝人材豈下於鄭者願詔大臣日加延訪使敷陳所藴而考察其行能條舉衆弊而分委以經畫課其效之成否隨之以黜陟焉如此則可用之人出矣漢昭帝時吏民上書言便宜有異輒下杜延年平處復奏神宗皇帝詔中外上言得失委司馬光張方平同詳定選擇及哲廟嗣位臣民皆上封事亦令光與執政看詳此皆故事之可法者也近覩御筆令將端平奏議繕寫成册以進羣言繁多無所決擇文書盈几何由遍觀願倣先朝已行之典命兩制近臣或兩省都司官二三人付之看訂删去浮辭剟取要語仍各從其類繕録成秩凡關於君德帝學者進入禁中備陛下之覽閲關於朝政邊防者送三省密院偹大臣之采擇繼今臣下章奏悉用此法茍當於理無不施行如此則可用之言見矣用人聽言各有其實何治之不立而弊之不修耶若夫悠悠泛泛玩愒歲月以虛譽用人而無以核其能否以虛文聽言而無以訂其是非臣恐弊事日滋治效愈邈其患未知所終也懇切有陳伏祈聖察德秀為禮部侍郎上奏曰臣聞敵國外患自昔有之根本安強形勢鞏固則敵雖盛而不足憂根本單虛形勢削弱則敵雖微而有足懼臣觀今日近有金患遠有䝉古狡焉窺覦意在叵測而淮堧之變尤駭聽聞羣情方搖未易底定蓋嘗深思熟計竊以為聚正人端士於朝廷使之盡言補過者此內固根本之方也布賢牧良將於方維使之養民訓兵者此外固根本之要也根本強則形勢張矣古之有國者以人材為輕重故一干木足以藩魏一季良足以安隨厥效甚明不可誣已今朝廷之上紳緌濟濟夫豈乏人然敏鋭之士多於老成政事之才富於經術慷慨敢言者少故正論罕聞亷退自重者少故士風弗競陛下嗣服之初嘗以耆艾而褒傅伯成楊簡矣以儒學而褒柴中行矣近復以恬退而用趙蕃劉宰矣海內聞風孰不欽歎然前乎三臣雖加異數而聘召未聞是有優賢之名而無用賢之實也至於直亮敢言有如陳宓徐僑者非特召擢未加雖褒寵且莫之及此議者所為弗滿也陛下誠欲收用賢之效臣願處伯成簡於內祠置中行於經幄若宓若僑擢之言論之地且益求其類而招徠之使華髮舊德之良清名峻節之彥峩冠委佩畢萃於朝廷陛下開心見誠俾之條陳闕失大臣虛懷無我與之商確事宜毋縻以好爵而言論不從毋隆以虛文而情意弗浹則賢者之所有皆為朝廷有矣如是而內之根本弗強非所慮也趙簡子將保晉陽必先有以寬其民之力李牧將攻胸奴必先有以養其兵之鋭今四方長人之官撫字不聞而叨懫日甚萬金之産或一朝而白奪纍世所積或微罪而沒官夏秋之賦輸納至於再三關市之征苛細及於毫末鞭笞雜下而燕笑自如膏血已殫而溪壑未滿以此貿官職以此廣田廬於是乎民貧至骨矣諸道總戎之帥訓肄不勤而掊克是務自偏裨以至士卒其家資稍厚者必使之治貨財非優之也蓋幸其負課而掩有也其廩給稍豐者必以之供役使非親之也蓋利其捐金而求免也軍中相語以酒壚藥局為籍資産之梯媒謂當其事者必不能自免也回易房廊為陷子孫之坑穽謂其身雖死而監督至於無窮也主帥剝偏裨偏裨剝隊伍有日給千錢而不足衾絮者有月廩數斛而不飽糟糠者以此飾苞苴以此買歌舞於是乎兵貧至骨矣嗚呼兵民俱病一至斯極此何時而莫之救耶臣願陛下明詔輔臣一新黜陟用亷仁之守而去貪殘任賢能之將而斥暴橫使之視民如子恤軍如家崇飲氷食蘗之風均挾纊投醪之惠俾人有生意而士有奮心如此而外之根本弗強非所患也漢人有言本強則精神折衝本弱則招殆致凶為邪謀所陵臣觀方今之勢可謂弱矣司馬光嘗謂祖宗苦身焦思以變衰唐之俗陛下髙拱熟視以成後魏之風邇日之事何以異此不亟圖之則紀綱日以陵夷風采日以銷鑠駸駸焉將有不可復振者此臣所以痛心疾首思有以為陛下告也今區區所陳實轉弱為強之本惟朝廷不以為迂而采用之則其效有可以歲月期者詩曰心之憂矣不遑假寐臣不勝惓惓德秀為户部尚書上奏曰臣前二疏略盡愚忠中夜以思復懼有所未盡者敢不空臆言之臣竊惟今日廟謨不可無一定之法羣臣不可無相濟之和自頃偏師失利陛下特發英斷薄責帥臣姑令以功贖過蓋得秦穆用人之意而置司於泗密邇東淮仰窺聖算沈深默悟進取之難漸為收斂之計大臣至公無我不膠先入之言從容回斡蓋有不可曉然示人者然臣尚慮將帥恥於無功或云洛陽雖失東南之兩都自如或云敵將已斃河南之戍兵盡去或云䝉古有內變未能報東門之師凡若是者若可喜而實未然也昨者洛邑之屯望風輒遁汴雎之守其能堅乎一將雖亡豈無他將戍兵暫去寧保不來惟幸內變之或然則可牽制而未動然敵謀多詐每能以此誑人方尼雅滿聚衆來南亦有林牙復興之報若廟朝不審遽信所聞猶豫之間計不早定必待敵至然後圗之則遲緩未免失機倉猝而不及審慮曷若及今酌理勢之所宜務規模之先立按為定論毋或轉移以之應敵庶有餘裕臣所以謂廟謨不可無一定之法也先聖有言君子和而不同所貴乎君子者以其叶心而共濟非以其阿意而相從也比者更張以來登延衆彥將追元祐之風而群賢持論頗有不一之患故兵議既興有以先發制人為說者有以量時度力為言者彼是此非莫能相一而臣顧以為喜者蓋同異紛紜之中實至當之論所由出故也然朝廷之上初未嘗以同異為好惡而縉紳之列乃或以同異為愛憎臣則憂之夫主於先發制人者為國也主於量時度力者亦為國也意見不同同於為國盍亦平心商榷惟是之從可也奚必以異已而相嫉乎元祐中廪廪向治矣惟羣賢自為矛盾小人得以乘之稔成紹聖之禍今雖未至於斯可不預防其漸臣願陛下戒諭羣臣各盡忠益事求適當不必茍同見有異同勿相疑忌成衆賢和朝之美取同心報國之功此臣所以謂羣臣不可無相濟之和也臣志在納忠喋喋無已仰祈聖察德秀謝奬亷吏奏劄曰臣今月十六日伏準尚書省劄子八月十五日三省同奉御筆近真某奏事朕因訪問亷吏某以知袁州趙䈣夫對朕惟奬亷所以律貪亦庶幾化貪為亷之效以惠吾民趙䈣夫可除直祕閣與監司差遣劄送臣者伏念臣比叨召札入對便朝具陳生靈耗斁之由皆本州縣貪殘之故淵衷有惻天語載詢欲知亷吏之姓名以備聖時之采擇念頃過宜春之境頗嘗聆守土之賢百口自隨惟祿是仰一介弗取其節可稱遂以所聞冒陳于上退而竊省尚有當言若崔與之帥成都但載歸艎之圗籍楊長孺守長樂罔侵公帑之圭銖皆最為當世所推乃不能悉數以對方重愚臣之怵惕忽傳宸筆之褒揚當九重厲精思治之秋正四方視儀聼唱之日一守臣之䝉擢殆若細微百執事之鄉風孰不興起祗承命告倍切欣愈汙吏革心實關公道瞽言獲用豈曰私榮願承眀詔之作新更廣宸聰而咨訪循良未舉盍宏封密之規貪濁當懲可廢烹阿之典乃若澄源而正本尤先昭德以塞違使清光之化首倡於朝廷而亷恥之俗交興於中外庶幾民生日厚邦本弗搖此下臣獻替之微忠抑初政施行之急務敢因奏謝僭有敷陳伏乞睿察起居郎魏了翁論除授之間公聽並觀如元祐用人上疏曰臣伏準正月己巳詔書令臣舉賢能才識之士又準辛卯詔書令臣悉心啓迪毋有所隱顧一介疏賤旬月之間洊被詔墨竊窺聖意固欲兼采衆知急聞直言然臣嘗妄議下之從上也不從其所令而從其所行夫使耆俊在服忠言日聞直不見疏才不招忌則聲氣之合有不待勸勉而至者不然闒茸得志阿諛成風愛賢而不親禮善而不用則稍知自好者將望望然去之矧所謂真才碩能者乎熙寧元豐之間非無君子也自王安石吕惠卿逐異已以快其私元氣銷靡若不復見一旦哲宗踐祚崇慶垂簾振而新之則大小胥奮於是司馬光文彥博吕公著在相位吕大防韓維劉摯范純仁在政府鮮于侁蘇轍孫覺梁燾范祖禹朱光庭傅堯俞吕陶為臺諫蘇軾在翰苑范百祿曾肇劉攽蘇轍在詞掖而經筵講讀官則傅堯俞韓維范祖禹趙彥若崇政殿說書則程頤召而不至則范鎮也史官則陸佃曾肇朱光庭黃庭堅自餘此類不可殫紀然而所謂元祐諸賢之盛則非借才於異代也有作新觀感之實德有丁寧惻隱之真意故數月之間精采頗異乃爾雖然此特元祐初年也七八年間大抵若此其間調亭既入雖若稍不逮初然正論卒勝世號宣仁為女主中堯舜寧不信然臣愚欲望陛下試取臣言參稽史册內以稟承慈訓外以申命大臣自今除授之間公聽並觀如元祐用人使才器分量無一不當其位則實意所孚善類皆為時而出詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或乂陛下幸毋以乏才忽之臣不勝區區了翁為吏部尚書乞趣詔崔與之參預政機上奏曰臣伏覩陛下親攬大政特頒手書首以亷隅砥厲臣節百司庶府聞命踴躍大邦小侯望風胥勸然而終以染濡熏習之久回遹之謀淪浹肌髓鄙夫壬人頑頓寡恥貪吏債帥誅求亡厭此風終未殄也乃者陛下特攽御筆逺自廣南召崔與之參預政機除書一攽中外胥慶而與之方以年邁疾侵固請謝事夫當仕有官職而以其官召之則不得以疾為解陛下所以詔諭之者非不切至而與之重於一出特為晚節計耳與之初辭宗伯再辭天官今又力辭政府古所謂大臣者與之庶幾有焉今若賴其沈靜亷退之節表正羣工亦足以革競鎮浮亷頑立懦臣愚欲望陛下親御宸翰以趣其行勉以君臣之大義喻以家國之深憂庶其幡然而來協助親政則陛下意鄉所形必有聞風興起者矣臣無任區區端平初帝嘗訪廣東經略安撫使崔與之以政事之孰當罷行人才之孰當用舍與之力疾上奏曰天生人才自足以供一代之用惟辨其君子小人而已忠實而有才者上也才雖不髙而忠實有守者次也用人之道無越於此蓋忠實之才謂之有德而有才者也若以君子為無才必欲求有才者用之意嚮或差名實無别君子小人消長之勢基於此矣陛下厲精更始擢用老成然以正人為迂濶而疑其難以集事以忠言為矯激而疑其近於好名任之不專信之不篤或謂世數將衰則人才先已凋謝如真德秀洪咨夔魏了翁方此柄用相繼而去天意固不可曉至於敢諫之臣忠於為國言未脫口斥逐隨之一去而不可復留人才豈易得而輕棄如此陛下悟已往而圖方來昨以直言去位者亟加峻擢補外者早與召還使天下眀知陛下非疏逺正人非厭惡忠言一轉移力耳陛下收攬大權悉歸獨斷謂之獨斷者必是非利害胸中卓然有定見而後獨斷以行之似聞獨斷以來朝廷之事體愈輕宰相進擬多沮格不行或除命中出而宰相不與知立政造命之原失其要矣大抵獨斷當以兼聽為先儻以不兼聽而斷其勢必至於偏聽實為亂階威令雖行於上而權柄潛移於下矣端平中中書舍人袁甫直前奏事劄子曰臣恭惟陛下軫國步之多艱憂更化之未效特發睿斷並命宰輔陛下此心上通於天中外臣民疇不鼓舞臣竊謂宰輔之職固貴乎專亦戒乎太專不專則責不歸一太專則失於獨運陛下知左揆之忠直無他腸而恐其勤勞太過不可以無助也於是置右弼以佐之陛下之心不過如是而寡見淺識者妄窺形似謂聖意將有所移矣陛下察右弼之老成有素望必能長慮却顧共圖國事也於是使濟左揆之所不及陛下之心不過如是而旁睨竊聽者又揣摩意見謂聖心將偏有所重矣並命二相可謂至當而紛紛之論如此臣謂陛下英斷奮發雖莫過於此舉而二相之事陛下乃莫難於此時何難爾難於塤箎之相應金石之相宣如有虞濟濟之盛時也雖然是不難天下萬事莫善於公莫不善於私房𤣥齡問正主芘民之道於王通通曰先遺其身能遺其身然後能無私無私然後能至公至公然後以天下為心矣世之為大臣者未嘗不自謂能遺其身也然身若何而可遺必方寸洞然無一毫之私意而後能遺其身必不市恩不修怨不相傾相軋而後能遺其身必天下之所謂君子者進而用之天下之所謂小人者黜而遠之凡親故夤緣私相援引隂相囑托者一切屏去而後能遺其身若夫任私意矜小智徇偏見聼邪說胸中膠膠擾擾非真有國爾忘家公爾忘私之心則何足以為至公臣之所謂公者非曰外焉示公而已也貌似同心而中生矛㦸烏在其為公耶是故專制擅決者固不足以為公而徘徊猶豫善避形迹者似公而亦非公也勇往好勝者固不足以為公而謙遜畏抑務為小心者似公而亦非公也何則宰輔者國家之柱石柱石不牢大廈將顛而何謙遜畏抑之有且非獨大臣之身為然也彼與之謀議者豈無素相厚善托以心腹之人哉若其中立不倚徇義忘利者侃然正色為謀必忠是固有益而無損矣如其內懷顧望各有所主則造作語言緣飾事端讒間之隙既開交鬭之風滋熾於是朋黨之論興矣用一人焉彼以為此之黨此以為彼之黨而人主始莫知所適從矣行一事焉彼以為此之私此以為彼之私而人主始惑於聼聞矣無事之時倡為此論猶慮簧鼓是非徒亂人意況當中外搶攘事變蜂起之際乎方今至大至急之務亦多端矣楮輕物貴民不聊生一也軍情動搖志在好亂二也䝉古窺我將謀大舉三也閫外諸帥不相協和四也凡此者皆付之悠悠泛泛不肯出力為公家遠計而朝夕所從事不過互相猜疑迭求勝負久而習慣愈激愈甚眀主臨朝慨歎惟曰其奈朋黨何士大夫相與私議亦曰其如朋黨何此正唐人所謂去河北賊易去朝中朋黨難今雖未見其形而兆已先見矣先見之兆不務防微待其彰著不可掩乃欲從而救之不亦難乎本朝朋黨之論惟韓琦當國有以消平調一之遂使兩黨之迹渙然氷釋琦既罷相黨論復起諸賢斥逐無虛日而小人忌琦者獨少其後扶持善類琦力為多臣願以此事為大臣勉元祐之初聿新庶政惟元豐舊黨分布中外多起邪說以搖撼在位吕大防倡調停之說宣仁聖烈皇后疑不能決蘇轍抗章謂大臣若正已平心為安民靖國之計則人心自定雖有異黨誰不歸心宣仁是之臣願以此語為陛下獻雖然抑臣又有深於此者蓋人主之英斷不自外生當由心出臨朝之時尊嚴若神未足為英主也要必無纎芥嗜好汨其澄眀之性則發為英斷自然有不可玩者如其齊莊於路朝而舒肆於燕私酒色觀遊便僻側媚凡所以營惑耳目感移心志者有一於此則國家大事其精力必有所不及其志慮必有所不周大臣見其然也亦且憂懼悶鬱之不暇而況權勢之相逼黨與之相擠日夜圖回各求其自全之計國事將誰與任責耶大臣既不任責則人主之腹心耳目不得不寄於所親信之人凡在左右者幸其有可乘之隙則㸃白為黑以紫亂朱將何所不至哉然則探本窮源又在陛下正身以率下而已舜之歌曰股肱喜哉元首起哉此責在大臣也臯陶之賡歌曰元首眀哉股肱良哉此責在人主也臣竊觀今日並命二相之後而有一人焉不能平心以徇公則將先之以猜疑而終之以朋黨有猜疑之萌則股肱不可謂之喜聽朋黨之說則元首不可謂之眀臣非敢為是過慮也誠見今日通國上下惟知患在䝉古而不知憂伏蕭牆惟知變在兵寇而不知禍起縉紳是以懇懇愚忠不知忌諱惟陛下與二相深思舜臯陶之言而亟圗之天下幸甚宗社幸甚聖語甫奏曰陛下並命二相天下莫不欣悅為二相者所當各盡公心勿徇己私則可以上副陛下委任之意讀至陛下置右弼俾助左揆之所不及玉音云朕意正是如此外間何為有紛紛之論某奏天下事有一必有兩兩則易於不一惟英王有以一之漢文帝嘗並相陳平周勃矣一則智謀一則重厚有文帝在上雖是二相而歸於一唐太宗嘗並相房𤣥齡杜如晦矣一則善謀一則善斷有太宗在上雖是二相而亦歸於一然則今日何慮紛紛之論惟在陛下一人而已讀至莫善於公莫不善於私玉音云極是某奏主意所向人情之所趨也主意向左彼則趨而左主意向右彼則趨而右陛下不可不察人情之所趨趨之之初未遽見有大害趨而不已分朋植黨自此始矣讀至讒間之隙既開交鬭之風滋熾而朋黨之論於是乎興玉音云此事極可慮又云朕嘗宣諭大臣云朕並命兩相正賴協心共濟國事卿等宜深體此意某奏陛下聖諭極當讀至人主之英斷不自外生當由心出某奏臣在講筵每奏陛下此心所宜常常清眀不可少有昏蔽陛下責宰輔以協心須是陛下先自正心可也今亦是敷述此意讀至大臣既不任責則陛下之腹心耳目不得不寄於所親信之人凡在左右者幸其有可乘之隙則㸃白為黑以紫亂朱將何所不至某奏陛下於此不可不著精神若使大臣不任責而左右得以乘其間彼之巧謀詭計於不知不覺之中入陛下之胸腹此其利害不小玉音云此果是利害不可不察某奏陛下之言及此宗社之福也讀畢玉音又問自除二相不至有嫌疑否某奏陛下以赤心委任二相二相俱賢何至遽生嫌疑但臣所謂人情之所趨各有偏徇若陛下無以一之却恐嫌疑從此生且如目今中外多事可謂甚矣左揆一向辭避右揆又一向畏遜若各事形迹深恐擔閣國家事無人承當緩急之際將若之何某又奏近日廣寇已平亰口叛卒不用招安盡行誅𠞰國威稍申又雨澤霑足雨後快晴一飽可望但䝉古可憂須及今勉二相如救焚拯溺速作措置玉音云人情好亂誠為可慮某奏陛下所以當日新盛德剛健不已者正將以弭禍亂之萌也若陛下不進德大臣又不任責以好亂之人情激成事變直易易耳陛下以臣此劄宣示兩相俾其力行一箇公字玉音云卿議論極當便當示兩相遂退甫又上奏曰臣竊惟前歲之夏猥以淺學獲侍經帷玉音下問漢元帝親近儒生乃優游不斷孝宣之業衰焉用儒何為若此特不得真儒用之耳臣是時仰贊皇言之大且力陳元帝之時如蕭望之劉向之徒雖未足為真儒然亦忠愛懇惻赤心為國惟元帝聽信不專惑於讒間此所以優游不斷漢業寖衰陛下既俞臣之言矣臣竊見端平更化之始魁壘耆艾俊傑之彥濟濟在列陛下鋭意望治衆賢交進嘉謨曰敬天愛民曰講學納諫言制敵則曰勿和言救楮則曰節用此皆究極根源之地而陛下日聞衆君子之說以為如此可以坐致升平矣而算計見效茫如捕風內沮外訌楮輕物貴人情皇惑國勢阽危陛下以為端平君子未能有過於嘉紹而反不及焉於是心疑君子之無益於人國矣噫其果無益於人國耶抑名曰用君子而實未嘗盡其用耶夫所貴乎真君子者如精金良玉一心事君決無他念專意為國決不營私似迂闊也而實懇切似髙亢也而實敬畏似爭辨也而實和平果盡其用則有益於國大矣今陛下先懷無益之疑於是興拊髀之歎而窺陛下之意向者真以君子為誤國而微動陛下之悔矣夫誤而且悔則當求不誤者用之無使至於復悔可也奈何旁蹊曲徑趨者如市淫朋比德習以成風邊事繹騷一時憂窘及其暫退動色相賀心志一驕靡所不至前日私意之不敢逞者今則逞矣前日幸門之不敢啓者今則啓矣至於治國之要務禦敵之至計實政未嘗講實備未嘗修秋風一起憂窘又如初矣臣恐嘉熙之誤未必不如端平之誤而嘉熙之悔又未必不似端平之悔也然則其咎果安在歟臣嘗反覆深思竊謂上有堅凝之定力則下有堅凝之實效今泛泛悠悠如舟流之靡届昏昏憒憒如醉夢之未醒用君子矣而又使小人間之朝而進一說焉陛下以為可暮而進一說焉陛下復以為然是可謂之堅凝乎是可謂之定力乎臣以為莫若封植君子之根本使無纖罅微隙之可投專意責成勿搖浮議則必不至於誤且悔矣天下大物也陛下不能自治顓命一相一相不能獨任而博資衆賢此大公至正無偏無黨之道也惟在聖君賢相力持堅凝之志破君子無益之說勿疑其誤而易至於悔則為君子者乃可展布四體畢智竭忠而責其堅凝之效矣如使倏用驟變乍佞乍賢則羣臣且將狐疑莫有固志而陛下左顧右盻無足以稱任使者則臣恐陛下孤立於上矣昔仁宗朝張忭為中丞彈劾無所避上曰卿孤特乃能如是忭曰臣仰託睿聖是為不孤今陛下之臣持祿養交者多而赤心謀國者少陛下似孤立也信哉是言衆賢聚在本朝更相警戒互相輔翼非獨賢者之勢不孤而人主之勢亦不孤舉朝皆持祿養交之臣其徒實繁其根彌固小人不孤而人主則孤立矣臣願陛下察否泰之機辨君子小人之實無使積成孤立之勢可也大凡君子無近功小人無遠慮小人以為可安可樂者鴆毒也一中其毒身且危矣君子以為可安可樂者藥石也磨以歲月疾必瘳矣臣追憶陛下發漢元帝用儒之問有感於心是以罄竭愚衷冒犯天聽惟冀陛下勿至於屢誤屢悔而終收君子有益之功此實宗社無疆之休臣不勝惓惓聖語甫又奏乞陛下保護愛惜君子不可輕易動搖上曰端平更化之初賢者布在朝廷不曽做得一事衆弊膠轕愈不可為甫奏劄子正是極論此事以臣所見非是端平君子無益於人國乃是朝廷任用不篤未能使君子展盡所長耳陛下先疑君子無益於人國乘間者謂君子誤國今則陛下能不悔用君子此則大計利害讀至旁蹊曲徑淫朋比德與夫私意幸門等語甫奏陛下當於此警省若欲杜絶此弊須是有堅凝之志乃可且如去年天變陛下赫然奮發進退輔相大臣天下歌詠陛下聰眀剛斷今顓任一相圖濟艱難勿為小人轉移方可謂之堅凝讀至人主孤立等語甫奏仁廟可謂堯舜之主張忭尚謂之孤立蓋左右前後赤心為國者少而持祿養交者多此所謂孤立也陛下若終疑君子無益於人國則將屢誤屢悔迄成孤立之勢矣可不懼哉上甚開納讀畢上又論及楮券事問稱提如何某奏楮券到今已是築底别無良策朝廷且欲一時扛得價起不得已行此策昨日見邸報閩浙四郡守皆以價髙遷秩猶恐受賞者不能自保其往若萬一更欲行罰則斷斷不可何則天下長吏未必盡賢如朝廷責其不能奉行繩以峻罰為郡守者思欲逃責免禍暴酷之政一切施行民無所措手足矣故臣區區懇告陛下切勿用罰召怨以傷邦本上曰是甫為中書舍人兼崇政殿說書經筵進講故事曰元祐元年司馬光言朝廷詔近臣舉可任監司者待其不職亦可并坐舉者吕公著曰亦須執政審擇光曰自來執政只於舉到人中取其所善者用之韓維曰今不先審察待其不職而後罰之甚失理義公著曰除用多失亦由限以資格維又言光持資格太謹光言資格豈可少維曰資格但可施於叙遷若升擢人才豈可拘資格臣聞國朝之置監司深淂漢元封置部刺史之意劉安世嘗極論之以為秩低而權重秩低則其人激昻自進權重則得行其志此良法也祖宗盛時中外乂安州縣奉法田里無事實由監司得人之故見謂青齊福星者不特鮮于侁一人而已蓋監司與他官不同天下郡縣之吏朝廷除授豈得人人而察之寄按察之權於監司是擇監司者所以擇天下之守令也臣久在外服粗嘗諳歷大率監司之選必清威有時望而後足以激懦習必強敏有風力而後足以糾官邪必曉練有精神而後足以察奸弊此等人才真未易多得欲諸路監司俱得若人必不拘資格而後可臣於吕公著韓維之語實深有感焉以元祐盛時可謂賢才彚征之㑹而監司之任尚有除用多失之憂何哉蓋懲王安石用資淺之人專以資格為重故也司馬光之言曰安石執政始置提舉常平官又增轉運副使判官皆選資淺輕俊之士為之夫安石專用輕俊之士固不可茍有持重知大體聰眀識時務而資格未至者可坐視民生之愁困世道之陵夷而不亟選用之乎維之言曰資格但可施於叙遷若升擇人才豈可拘資格斯至論也今日楮輕物貴役重賦煩兵驕民窮寇盜間作求治之要莫切于擇監司而擇監司之要不當專限以資格漢部刺史以秩低而取之正以此耳今真才實能每有拘閡而不獲用乃甘心取夫軟熟茍且者而責之以攬轡澄清之舉則宜其廢職而害民也臣願陛下深思祖宗置監司之意玩繹吕公著韓維之言眀詔大臣妙選賢明監司勿盡限以資格使之分布諸道以振紀綱以銷禍亂不勝幸甚唐太宗大歷十四年以崔祐甫為門下侍郎同平章事初至德以後天下用兵諸將競論功賞故官爵不能無濫及永泰以來天下稍平而元載王縉秉政四方以賄求官者相屬於門大者出於載縉小者出於卓英倩等皆如欲而去及常衮為相思革其弊杜絶僥幸四方奏請一切不與而無所甄别賢愚同滯崔祐甫代之欲收時望推薦引拔常無虛日作相未二百日除官八百人前後相矯終不得其適德宗嘗謂祐甫曰人或謗卿所用多涉親故何也對曰臣為陛下選擇百官不敢不詳謹茍平生未之識何以諳其才行而用之上以為然臣聞用人之大弊有二其始皆以善為之而其流乃至於大不善不可不察也何謂大弊有二或失之寬或失之嚴失之嚴者繩墨太謹而無翕受兼容之量失之寬者規模太廣而有不避嫌疑之譏兹二者俱未能無弊也常衮為相承賄賂公行官爵冗濫之餘慮無以振頺綱而挽狂瀾故矯之以嚴崔祐甫代之懲衮之狹隘而賢智有鬱伊之歎故復矯之以寬夫矯之固善矣其奈嚴者拘而寬者縱知矯他人之弊而不知已自墮于一偏之弊故史之論衮雖嘉其杜絶僥幸而又謂其賢愚同滯則是幸門雖窒而正路未闢太嚴之害固應如是耳祐甫欲收時望作相未二百日除官八百人一時寧不甚快然考其所用多涉親故前後相矯一弊去一弊生豈非矯枉太甚之過乎善哉司馬之論曰用人無親疏新故之嫌惟賢不肖之為察又曰已不置毫髮私意於其間蓋私者天下之大蠧也不避親故之嫌者固私矣親故果賢以嫌而不用者亦私也遠嫌畏謗者固私矣必待已之所素識而後用之者亦私也何者俱未能克己故也擇人以代天工烏有所謂已哉茍以公為心當用則用當捨則捨付之天下而已何與焉三代王佐事業遠矣諸葛亮其庶幾乎郭攸之費禕董允向寵之徒森布朝列一時得人可謂盛矣然亮未嘗以已意而私黜陟也廖立李平用公論斥之而深足以折服其心雖遭廢棄略無怨色非無私何以能若是史臣評之曰開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰吁若亮之相業又豈衮與祐甫之所能及哉周威烈王六年齊威王召即墨大夫語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢人民給官無事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不闢人民貧餒昔日趙攻鄄子不救衛取薛陵子不知是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者於是羣臣聳懼莫敢飾詐務盡其情齊國大治強於天下臣謂齊威王烹阿封即墨之事人特見一時威權之奮發耳不知平日密察之功蓋有素也於即墨則曰吾使人視即墨於阿則曰吾使人視阿威王不輕信毁譽之說而必謹擇夫寄耳目之人其人果可信也吾然後使之是故賢否一定而賞罰不差近者朝廷有計田收劵之令臣奏疏凡三四甚為陛下惜此一舉何則科斂無名動搖人心非美事也況今日任牧民之寄者大而郡守小而縣令誰懷視民如子之心旁緣此令朘削脂膏姦胥黯吏又縱尋斧焉本根之傷多矣臣嘗於經筵舉威王之事為陛下反覆言之以為任陛下之耳目者在內則臺諫在外則監司陛下所使為臺諫監司者誠如威王之使人視阿即墨瞭然如見之目前而赫然加賞罰焉則封者無愧而烹者亦甘心矣如陛下一出此令之後聽諸路之守令肆其欺誕任其捶剝惟求取辦於一時不顧元氣之日耗臣竊為寒心焉強敵攻支體於外而陛下又自戕腹心於內厥今論者但知䝉古之可畏而不知履畝之令自生䝉古可畏尤甚若陛下寄耳目之人蚤夜密察吏不得肆其姦尚庶幾焉不然殆哉太祖髙宗創業中興艱難甚矣陛下其無忽前漢元帝紀贊曰帝少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優游不斷孝宣之業衰焉臣今月初九日獲侍清光於經筵陛下舉漢元帝好儒故事玉音云論者謂元帝特未得真儒而用之耳如得真儒而用之何患牽制文義優游不斷耶此論甚佳卿以為如何臣奏聖學髙眀如此可為宗社慶可為善類慶大凡真儒固鮮而識真儒者尤鮮譬之玉焉真玉未必無瑕人見其瑕也遂輕棄之不知雖曰有瑕不害其為玉何可棄也若石而無瑕不過石耳又奚足貴人才亦猶是也真賢實能豈無微過惟識真者不以小疵掩其大德如使寸寸而量銖銖而較則真儒不以小瑕而棄者幾希此惟在陛下眀知人之鑒以洞燭人才之底藴而已矣陛下欣然嘉納臣退而思之尚有未盡之遺論焉當元帝時劉向之剴切蕭望之之剛正雖未足為古之儒就漢世言之亦可謂儒之真者矣元帝非不知二賢之可用也向數有論奏深當上心則曰君且休矣吾將思之望之為師傅帝知其經明行修材任宰相夫既心知之則當篤任其人既曰將思之則當力行其言然向之精忠終不能奪王氏盜竊之權而望之一為恭顯所陷恥以其身就吏寧死而不悔嗚呼曾是而謂元帝好儒可乎論者謂帝特不得真儒而用之故有優游不斷之失不知有儒如蕭劉尚且外為尊敬之貌而內無信用之實卒使抱恨以終其身假令得古之真儒元帝能用之耶然則人主之病莫大乎柔弱柔弱而不斷則左右小人乘間投隙變亂是非君子不得一日安於朝廷之上此則漢元帝膏肓不治之疾而非漢無真儒之所致也有天下者尚鑒兹哉侍御史李鳴復奏曰臣聞內君子外小人為泰內小人外君子為否君子小人之進退治亂之所由分也舜有天下十六相在所舉四凶在所去可謂能知人矣而伯益猶告之曰任賢勿二去邪勿疑勿之為言戒辭也所以堅帝舜舉相去凶之念而使之不變也今陛下既知賢之當任矣臣願一此心而不二既知邪之當去矣臣願信此心而不疑二三大臣能勉其所當勉羣有司百執事能戒其所當戒而陛下又能味伯益之語堅帝舜之心則天下無不治矣臣不勝惓惓惟陛下垂察鳴復知紹興府奏曰臣嘗觀司馬光論修身之要有三曰仁曰眀曰武治國之要亦有三曰官人曰信賞曰必罰歷仕三朝皆以此為獻且曰臣平生力學所得至精至要盡在於是光端人也以不欺事主臣竊慕之臣向者待罪臺端妄論禦外之策莫過於和戰守理內之道無出於兵民財和戰守雖三而當以固守為重兵民財雖三而當以節財為急其區分條畫所以别其輕重之宜緩急之序者無慮數千言既又欲其言之必可行思其事之必可成也復以用人之說進謂稽諸既往揆之方來所以致內外之兼治當自得人始臣今去國朝夕思念所以獻之陛下者不敢易以他說和戰守固不一也然得其人則和可成戰可勝守可固兵民財固不一也然得其人則兵可強民可安財可裕特在吾君吾相所以責成委任者何如耳今朝廷之上論事之臣多任事之臣少好名之士常超乎同列務實之士每沈于下寮發言盈廷紛然聚訟若可刻期課效矣或付以事任則遲回羞沮􅏮乎若刀鋸鼎鑊之在前知所以言而不知所以行何益哉鳴佩造朝歡然聲價謂宜無職不舉矣及責以事功則誕慢迂闊茫乎如捕風逐影而莫究其迹名焉如彼而實則如此何益哉因其言而委之以行然後見其言之果有補於時因其名而責之以實然後信其人之真有用於世聽言觀人之法莫切於此邇者侍從臺諫卿監郎官被㫖薦士連章纍牘多至數十人少亦不下七八人朝廷已書之於籍矣上以實求下必以實應外而和戰守之應酬內而兵民財之經理正當於焉選之於焉用之司馬光有言用人之道采之欲博辨之欲精使之欲適任之欲專采之欲博者無求備於一人也辨之欲精者無使名冒實僞冒真也使之欲適者用不違其才也任之欲專者無使邪慝之人敗之也然後為之髙爵厚祿以勸其勤為之嚴刑重誅以懲其慢賞不私於好惡刑不遷於喜怒此人君之要道也光之言即臣之說也陛下誠於是焉而加意則所以禦外所以理內將井井有序而成效可求矣臣稟資愚魯寄跡孤危蒙陛下眷遇之隆覆存之篤慚無以報乍遠闕廷輒效司馬光舉其平日之所已陳者諄復言之陛下不以其為常談而垂聽焉宗社幸甚天下幸甚鳴復又奏曰臣昨嘗妄論禦外之策莫過於和戰守理內之道無出於兵民財其輕重之宜緩急之序已皆白言之然稽諸既往揆諸方來所以致內外之兼治未有不自得人始也今日之人方何如哉數十年來贓汙習成亷恥道喪孔子曰性相近也習相遠也又曰惟上智與下愚不移當柄臣氣焰熏灼之時逆長風而孤騫回狂瀾於既倒者固不能盡無若見義而謬為伯夷見利而甘為盜跖者滔滔皆是也今鵷行鷺序大半虛員督府名藩率多刓印朝廷欲辦一事舉一職倣徨四顧每難其人則人才之不足非今日所當加意乎雖然天下未嘗無才亦視夫上之人所以作成振起者何如耳用人之道其要有二一曰量才而授之以事二曰久任而責之以實昔司馬光嘗論官人之法其為說曰人之才性各有所長官之職業各有所守自古得人之盛莫若唐虞之際然稷契臯陶垂益伯夷夔龍各守一官終身不易茍使之更來迭去易地而居未必能盡善也光之意蓋謂收採天下之英俊隨其所長而用之則天下事將無不可為者今習俗蠧壞已汙者固不可使清而公道昭眀方來者豈宜併棄陛下舉監司則有詔舉將帥則有詔舉公亷明練堪任帥閫監司則又有詔內而侍從臺諫外而執政從官內而三衙環衛外而總管軍帥各搜羅推擇以供陛下之器使者不知其幾矣舉而不實試而不效懲之以連坐之法可也未用而逆疑其不可用已舉而過慮其不足舉悠悠歲月徒歎乏才辰乎不再豈不甚可惜哉陛下倘能宣諭大臣重加遴選勿限資格曉錢榖者使治財賦明政術者使為守長負智謀者使任將帥其他如禮樂刑政觸類而長莫不皆然下至醫卜百工亦隨其能而任之將見人心激昻各勤乃事而懲勸之法得以施之於後矣臣故謂量材而授之以事在今日所當行者此也光又嘗進理財之策其為說曰官久於其業而後眀工久於其事而後成是以古者世官相承以為氏先朝陳恕領三司十餘年至今稱能治財賦者以恕為首豈恕之材智獨異於人哉蓋得久從事於其職故也光之言非獨可為理財之法施之他職將無不可者今大化更新宿弊當革經久之政不講僥幸之風尚存陛下試思親政以來見之除授者凡幾任某人以某事所著者何績委某人以某職所成者何功不日而遷視官府如傳舍數期而去謂職業為假途僨軍而寵以美官豈足為勸剝下而使之佚罰何以示懲責任不專而幸心生黜陟不眀而玩心作以此圖治尚何怪事功之不立哉陛下倘能眀詔大臣任以是官必課以是績理財者使之究見源流而財必欲其裕治民者使之周知疾苦而民必欲其安主兵者使之精加訓練而兵必欲其強其他職任視此施行有功則增秩加賞而勿徙其官有罪則流竄刑誅而勿貸其罰將見人心震懾各盡所長而前日之委寄皆班班然有實效之可紀矣臣故謂久任而責之以實在今日所當行者此也且自古未嘗借才于異代也周宣王當王室板蕩之後側身修行任賢使能有伸山甫以出納王命有申伯以式是南邦有方叔召虎以綏靖四方則周未嘗無才漢宣帝當權臣擅命之餘厲精為治信賞必罰命丙魏以輔政命龔黃以治郡命趙充國以控制西羌則漢未嘗無才蓋天生一世人自足辦一世事激之則雲合響應沮之則巖隱穴藏吾君吾相果能舉之以公待之以信委之以事責之以實寵之以厚賞又威之以顯罰如是焉而猶有乏才之歎謂朝廷不尊萬事不理百姓不安四夷不服臣未之信也康誥稱文王之德曰庸庸祗祗威威顯民蓋用其可用敬其可敬刑其可刑古聖人為治之道初不外此惟陛下裁擇鳴復又上奏曰臣猥以孤蹤來從萬里䝉陛下特賜親擢俾玷邇聨大懼疏愚一無稱塞向以煩言而去國今以召㫖而造朝方圖入奏而赴堂治事之令已頒方切控辭而隨班引見之命已下遭遇有此戰兢實多臣竊見皇祐中文彥博為唐介論奏介貶别駕彥博出知許州其後彥博入朝因言介頃為御史言事多中臣病雖有風聞之誤然責之太過請復召用彥博之寬洪介之剛直當時兩賢之杜範唐璘曹豳趙涯皆嘗論臣者臺諫言事職也言之無罪聞之足以戒四臣之有言於陛下臣之藥石也今臣偶叨誤恩辭不獲命恐四臣者懷不自安欲望聖慈特出宸斷於範於璘召而再使之來於豳於涯留而弗使之去庶各修職業共濟事功開大公至正之門去分朋植黨之患特在陛下一轉移間耳淮東制置使李曾伯特薦陳通判等二十員狀奏曰臣共二淮邊㳙埃無補見具奉祠歸里之請未忘薦賢報國之忠即其周旋事任之間得於嘗試嚌啜之熟其有已為公朝之所識别本司之所薦辟不敢復贅乃若懷圭璋而滯邊瑣抱杞梓而困泥塗者蓋得二十人焉格於限貟未遑盡舉恐遺實用敢以名聞竊見宣教郎通判泰州軍事陳力修以經術飾吏以直道事人議論不凡器識宏遠從事郎充淮西江東總領軍馬錢糧所幹辦公事陳應先學造前修而益力文為後進之所宗退然一儒不競於物是二人者望實素孚宜備館學之選通直郎通判淮安州軍事李仲鼇軍旅之事生長見聞通敏之才閲厯詳熟文林郎充浙西兩淮發運使司幹辦公事鎮江府分司陳㝱炎閩士之平實見諸飛挽有治劇才文林郎差充淮西轉運司提轄催促綱運物斛官孫具㑹淮士之翹英采諸條陳有事功志是三人者佐藩條辦漕事幹略俱優足任邊方繁重之寄迪功郎淮東提舉司幹辦公事林月卿贊畫臺幕以肅給聞從事郎僉書招信軍判官㕔公事沈孫膚佐理邊城以公勤著迪功郎廬州舒城縣主簿章公權議論表偉時賢多以大魁期之今讀其文而信鸞棲枳棘人所共歎迪功郎濠州州學教授鄧益悃愊無華辭藻絢麗從事郎滁州州學教授孫子秀刻意問學操履端方迪功郎泰州州學教授林遷經眀行修甚宜厥官從事郎通州州學教授費弇決科稽古克世其家若乃氣節之克自植立言論之不為激隨俱能風猷相尚則迪功郎高郵軍高郵縣主簿余鼇文材俱懿學政兼優眀清謹於三尺惠愛洽於一同則迪功郎髙郵軍司法參軍周福孫從事郎真州揚子縣令茅􅠐其人也律己以嚴蒞事以敏讞獄以恕則從事郎林子顯從事郎泰州司理參軍李賁從政郎高郵軍録事參軍趙希照其人也此十五人者雖才行各有不同而器能皆適於用夫廣廈集衆材而成菁莪自微草而育如䝉睿慈悉賜甄録隨才器使必有可觀端平中監察御史吳昌裔論宰相不當指臺臣為朋比上奏曰臣聞世之盛也人主暢皇極之道以公天下世之變也人臣借朋比之說以空善人遠而漢唐之禍近則元祐之籍皆因朋黨遂至阽危厥鑒昭昭甚可畏也臣來自遠方濫班朝列簿正容臺蓋踰一年無左右以為之先容無臣鄰以為之延譽素位而行不願乎外乃去夏孟饗竊聞陛下宣諭宰執問臣姓名越三日除王府官又諭宰相謂臣可充此選臣一介疵賤不知何以誤䝉陛下簡記耶臣於去冬傳聞蜀邊孔棘三上祠請竟閟俞音忽蒙御筆除臣監察御史不知陛下又何所取臣而有此除擢耶臣感激恩遇欲報無所竊謂數十年來臺諫言人主者易言大臣者難攻及上身者猶能曠度有容議及宰相者往往罪在不測所以朝廷闕政不敢盡言臣於入臺之次日首言國朝臺諫之彈擊大臣次月輪事又言二相之私用親故以宰執之非才備位如陳卓者則劾而退之以宰士之庸人利口如余鑄顔耆仲等則擊而去之是皆采之公論一毫無所容心惟知忠於陛下之職分而已近者竊見左丞相鄭清之卧家不起從駕不出免牘屢陳有曰激成朋比又曰稔成朋比殆似指及臣等不知所謂朋比者比何人耶夫朋比二字乃善人之厲階非治世之美事也所貴乎宰臣者正欲堅融善意以渙其羣翕受人言以平其施今乃自為朋比之說以猜疑言事之臣蓋緣清之始也輕於用兵而國威喪終也折於從和而虜難滋根本盡搖智勇俱竭朝夕􅏮􅏮懷不自安惟恐人之議己又緣臣範首論何炳而其親朋懼臣清叟連抨朋人而其鄉黨懼臣繼論劉克莊等而其賓客懼故其徒倡為此說以動清之清之亦復持此說以惑陛下始於羣小之自謀成于纍疏之自辨故為形迹激作擠排不盡逐臺諫不止也夫宰相雖尊人臣也臺諫雖卑法官也今除吏盡由宰相惟有臺諫出於陛下親擢若宰相有闕失而禁臺諫使不言以一夫之私情廢天下之公法臣恐自此威權倒植耳目塗塞陛下雖有八枋之專而徒擁虛權於上矣是豈總覽之初意哉臣不避誅譴輒敢效歐陽修辨雪琦弼仲淹朋黨之論懇懇為陛下言之陛下若愛惜紀綱以臣等之言為是則乞將全臺論列速賜施行以消朋比之風若猶存體貌以臣等之言為僭亦乞將言事諸臣速賜處分以全進退之節毋使廟堂之上與公論為敵兆縉紳之禍而開危亂之萌天下幸甚宗社幸甚臣不勝拳拳昌裔同杜範乞留徐清叟疏曰臣等一介疏賤分察臺綱與殿中侍御史徐清叟同事自供職以來感激恩遇知無不言所上章奏動關國體每蒙陛下曲賜優容臣等誓欲糜捐以圗報稱今於二十九日忽聞御筆徐清叟除太常少卿臣等恍然莫測所謂豈因清叟近日三漸劄子言及貴近致激陛下之怒耶臣等竊見陛下自更政弦廣開言路凡言二邸言諸當路言及小人復用聨篇纍牘語涉疏狂雖在小臣靡不容受清叟既居臺二正色盡言是亦職分之宜不知其言之戇今陛下一旦出令俾遷他官此必有左右近臣懷諼挾私以此移主意而陷善良者奉常清官似不為小清叟得去亦所甘心然盛眀之朝乃使直臣以言事去職不惟於臺綱有損布之天下亦恐於聖德有虧一舉兩失臣等深切惜之用敢援祖宗朝臺臣留御史例欲乞聖慈亟回成命仍令清叟赴臺供職足以彰陛下改過不吝之美若以臣等之言為僭欲乞併與清叟俱黜庶幾不辱此臺有辭于世謹録奏聞又疏曰臣等昨於二十九日冒犯上疏乞留徐清叟仍任言職自謂上觸渝怒必取譴呵繼聞省劄俾權户部侍郎臣等仰見陛下初心不以直言為忤再加異數以示優恩上意益昭羣疑咸釋然臣等竊謂臺諫出處實關國家重輕故殿中侍御史馬遵罷而合臺請留殿中侍御史龔夬去而諫省同論或至八奏或至聯名此皆為治世之美事亦足彰列聖之盛德臣等雖愚不肖誤䝉親擢不敢不以先正事祖宗者事陛下故一再奏聞非私清叟也為陛下惜敢言之臣也非比同列也為陛下扶紀綱之地也陛下動遵成憲容受讜言未嘗因事黜一言者今以清叟言及貴近而出則自今不復有言貴近者矣言及小人而去則自今不復有言小人者矣豈不杜塞正路而自啓多門哉臣等謂遷之美官而使出不若復以言責而使留欲乞陛下矜清叟之盡言念臣等之惜體不嫌反汗特賜追還如唐開元之制令御史依舊視事以昭聖眀之德以光祖宗之功臣等洊瀆聖聰甘俟顯黜謹録奏聞又疏曰臣比者為徐清叟言事去職遂同杜範再疏留之非惟事體相關蓋亦職分當爾側聽纍日未蒙施行若以陛下為怒其言耶則露朝敷奏經筵宣諭詞㫖甚溫未嘗見天顔之含怒也以陛下為諱其直耶則宣示二邸戒敕諸璫中外竦服足以彰盛德之有容也然而供職三月遽令出臺同列聨章曾不反汗遂使盛世有諱直言之事眀主有出臺諫之名陛下即位以來未嘗有此過舉臣之愚陋深竊惑焉或謂顧復私親交迫於內左右近侍列拜於庭故不得已而出之宫禁事祕非臣所得而知或謂清叟嘗因造開兵端論及廊廟節帖奏疏專攻宰臣故欲借此以去之廟謨密運亦非臣所能測但見陛下和顔受諫倐變而雷霆清叟正色盡言忽奪風憲意者必有挾私交譖乘間密移觸人主之威而重臺臣之罪者臣知非陛下之本心也方清叟被命之始臣等不免固留今聞已出城闉何敢更有煩瀆惟臣與清叟同被親擢同論宰相三漸之疏實嘗聞之清叟既翻然引去而臣乃偃然獨留豈有面顔復司分察若非與之同出將恐自此孤危用敢陳情仰干淵聽欲望聖慈罷臣言職畀以叢祠俾得歸守故廬返修初服以全進退之誼實拜髙厚之恩臣言不欺有如皎日謹録奏聞昌裔又論楊恭等疏曰臣竊惟國家用人之塗有二資格所以待常才特用所以拔奇士法意兼取號為得人今有碌碌無奇而用不以次者臣采之公論得二人焉奉議郎幹辦行在諸司審計司楊恭品格凡庸資性貪刻自登仕籍不守官針為獄掾則以寡謹而劾為邑宰則以多贓而罷待年叙用自有憲章今未填邑債而辟幕官未赴州二而升計府去彈劾時僅二年耳人言籍籍咸謂超覦儒林郎主管尚書户部架閣文字王龍榮人品纖細資質善柔雖躐科名未有敡歷初為州幕甫踰一年改辟帥屬又止數月夤緣外梱遂入中都倉門之命甫頒而閣庫之除已峻閲其官簿蓋未書三考也近者趙輿之獄聞龍榮亦與其事詭遇求進士論恥之夫六院臺省之儲掌故文儒之選而以望輕資淺得簉其間且進不以正頗有鼫鼠之厲此豈所以清表著乎欲望聖慈將恭龍榮並賜罷黜以為輕躁奔競者之戒謹具覺察以聞貼黃論陳允迪等臣竊見陛下更化之初於郡守監司最嚴其選近來除授率多非人有出使罔功而領藩符治郡無狀而持憲節臣敢摘其尤者言之新知常德府陳允迪貪人也起身世家鮮克由禮曩餉湖廣肆為姦贓苞苴以奉權門囊槖以豐己欲捆載入召已玷臺評今聞里居索無生意而猶經營復用出守桃源桃源舊總所𨽻也不知允迪何以見湖北吏民乎新江東提刑林杲妄人也通譜林嫗嘖有煩言近守番陽恣為暴政奉行稅畝之令略無惜民之心至追印紙以督縣官枷吏卒以嚇閭里旬日取辦民産蕩然逮倚閣令頒而輸錢已足遂為己有不以實聞今乃僥幸恩除使風一道番陽乃建臺之地也不知杲何以見江東父老乎臣參伍見聞知其貪虐甚著欲望聖慈將允迪杲特罷新任别選良吏以惠兩路之民昌裔又論史宅之上疏曰臣聞人主之體臣以恩人臣之正主以義恩者所以懋功義者所以制命也仰惟陛下以忠信重祿勸士以恩厚隆禮馭臣慨念故相彌遠之勞不替始終待遇之意節以一惠秩以三師爵以真王至於以從槖及其孥以御筆保全其門户可謂過於恩矣然晉重耳之賞姦介推以為難與處叔孫昭子之不勞仲尼以為不可能彌遠貪天之功震主之勢柄國自擅黷貨無厭大臣議之於前小臣爭之於後原其心暴其過至於今而未衰者此非正義之在人心不可以恩勝乎近覩邸報史宅之除煥章閣待制知袁州除目之頒上下疑怪不知陛下姑欲以寵之耶將實以用之耶姑以寵之則宅之郿塢之金足以自潤銅山之錢足以自饒武安之甲第腴田足以自給不待得千里以為富也實以用之則宅之多欲寡謹必不能亷以表民怙侈宣驕必不能儉以固本豢安長傲必不能敬以臨事又安能導主德意以致之民也宜春州小地狹人安吏循韓愈蓋嘗臨之號為佳郡今以再世學為貪之子一日不更事之人強其不堪冒所非據得無有忝共理之寄乎況宅之方其父病時代擬除目如條及其病棘時僥覬恩賞如熺此皆陛下所習知者縱或未能如先朝之制聽謝事之文除職賦閒亦為優眷乃欲以郡政授之臣恐非所以愛之也昔大將軍光卒宣帝思報定策之功一家三人皆封為侯時張敞上書請罷三侯就第謂宜眀詔以恩不聽羣臣以義固爭而後許之向使宣帝非少恩之主漢廷有引義之臣君眀臣良仁至義盡必不至醖成他日霍氏之禍也今陛下錫命疏恩不失為厚而臣等竭節守義未能忘言欲望聖慈特將宅之袁州新命不嫌反汗待其控免即豫以祠至於宅之除授乞收回於造命之前庶幾上無過舉而下無煩言臣等狂瞽之忠不至屢瀆天聽謹具覺察以聞淳祐四年同知樞密院事趙葵疏奏今天下之事其大者有幾天下之才其可用者有幾吾從其大者而講眀之疏其可用者而任使之有勇略者治兵有心計者治財寬厚者任牧養剛正者持風憲為官擇人不為人而擇官用之既當任之既久然後可以責其成效又乞亟與宰臣講求規畫凡有關於宗社安危治亂之大計者條具以聞審其所先後緩急以圖籌策則治功可成外患不足畏厯代名臣奏議卷一百五十
