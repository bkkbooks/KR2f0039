body:
  text: 歴代名臣奏議卷四十四明楊士竒等撰治道宋徽宗時陳瓘奏曰臣聞堯曰咨爾舜天之歴數在爾躬允執厥中四海困窮天祿永終舜亦以命禹蓋歴數在躬則有天命也允執厥中則盡人事也天人兩得則四海不窮而天祿永固矣堯之所以命舜舜之所以命禹者如是則祖宗之所以命陛下者亦可知矣陛下奄有神器以天之歴數在聖躬也今所以保四海而固天祿者在允執厥中以奉天而已無過不及之謂中不髙不下之謂中不左不右之謂中如天之有北辰衆星之所拱也如地之有洛邑道里之所均也如五行之有土萬物之所以生也如五臓之有胃百骸之所以立也知其理而言之者儒生之所能也體其道而行之則非聖人不能也列子論出石入火之事以謂仲尼能之而能不為也能髙而不為髙可謂中矣故六經之道髙而不可不中者也豈唯六經為然哉老子之道可謂髙矣然以百姓心為心則取域中之大焉有去甚之說焉老尚如此況吾儒乎顯諸仁藏諸用一弛一張而不失乎中者然後足以經世也今天下學者求治道於莊老而於漢唐之事皆不取焉失於髙矣故不中也又天下之士一南一北彼用則此廢此用則彼廢失於偏矣故不中也不中則如車輪無轂不能轉物不能轉則為物所轉此自然之理也堯曰四句自有次敘故歴數在躬則當允執厥中允執厥中然後永保天祿瓘又進故事奏曰仁宗聽講詩至匪風曰誰能烹魚溉之釜􅑄仁宗曰老子謂治大國若烹小鮮其義𩔖此然則古人之興喻其情豈相遠也侍讀丁度對曰烹魚煩則碎治民煩則散非聖學之深何以見古人求治之意乎臣按古之聖君適當大有為之時者或創業或革弊不免有所煩也仁祖以清淨無為之道持盈守成四十二年終始如一盖得烹鮮之說而躬行之耳臣故曰漢文之術出於老子而仁祖之治多似漢文神考謂漢文吾無間然則紹述仁祖之意可知也博士周行已上言曰臣聞忠臣雖在畎畆不忘其君志士雖無其位而憂在天下何則君臣之義出於天性天下之人同於一體是以伊尹畊於有莘而自任以天下之重仲尼孟軻身為匹夫而汲汲皇皇彼皆遭非其時猶欲使其君為堯舜之君使其民為堯舜之民孔子亦曰如有用我者吾其為東周乎孟子亦曰豈徒齊民安天下之民舉安況臣生逢盛世身事明主豈不願陛下享天下之安天下同陛下之樂承祖宗深厚之徳澤固萬世無窮之基業而臣尤以為幸者以陛下性體帝堯之誠躬行周王之孝有大舜取人為善之大徳有成湯改過不吝之誠心加之以聦明文思之聖學允恭克譲之懿行是以手詔每下天下無不感恱雖逺方窮僻之民猶有不得盡被陛下之澤而經國之術猶有不得如陛下之意者豈非有司議法之過官吏行法之弊乎臣甞讀易得其說曰天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義今陛下有天地好生之徳居聖人大寶之位守之以仁行之以義而臣下未有稱陛下之㫖任天下之責者夫守位莫大於得人心聚人莫先於經國用此誠陛下今日之所㽞意而已行之矣然臣猶有區區之說者誠謂更化之際古人所難調一之道必有其要故臣謂得人心之說有四一曰廣恩宥二曰觧朋黨三曰用有徳四曰重守令為經國用之說有六一曰修錢貨之法二曰修茶鹽之法三曰修居養安濟漏澤之法四曰修學校之法五曰修吏役之法六曰修轉輸之法臣所謂廣恩宥者誠謂陛下前日聽任之過法度或有未便刑罸或有失中天下雖知陛下之徳而行法之吏不無失人之心臣願陛下曠然為盛徳之舉下責躬之詔其意若曰迺者失於聽任法度過差恐吾民至有陷於非辜賢者或有廢而未用人失其所澤不下宣因推應官吏軍民之在罪籍者無輕重悉使自新如此則天下之人孰不懽然交恱益知陛下之為聖前日有司之為過也臣所謂廣恩宥為得人心之術者此也夫然後除其黨籍勅戒有司應今赦以前不得復論繼今以後不得復以朋黨為言朋黨之論誠非國家之利也夫一人之身内有九族之衆外有婚姻之黨又有朋游之好一家十人十家百人百家千人以一人失職千人懐戚一口傳情萬口傳聲陛下誠能念其前事之已徃嵗月之已久所言失當者或出於忠誠之憤激所為繆戾者或出於愚暗之無知天下樂生之情同於昆蟲何所不愛陛下好生之徳同於天地何所不容臣願無問罪之輕重時之後先人之邪正悉因大霈一切釋之兩觧其黨應前任宰相執政者與之三京四輔前任侍從者與之帥府望郡前任臺省官者與之列郡餘官各隨資任聽其仕進已亡沒者悉復之有恩賜者悉還之如此則人無懐疑之心下無失職之嘆幽明咸被其澤賢愚各得其所回千人之憂戚為四海之懽聲臣所謂觧朋黨為得人心之術者此也臣所謂用有徳者臣誠謂天下之人有有徳者有有才者有才徳兼偹者操行無邪持心近厚所謂有徳也人所不能而已能之所謂有才也才徳兼偹者上也有徳而無才者次也有才而無其徳者又其次也無才無徳斯為下矣故曰賢者在位能者在職又曰任賢使能所謂賢者有徳之謂也所謂能者有才之謂也賢者在位則朝廷尊朝廷任賢則天下服夫為徳非一日之積也徳成而信於人者又非一日之積也誠願陛下博選耆艾參用舊徳蓋耆徳之人知古今之多閱世故之久必能為陛下稽古愛民必不為陛下妄作生事而又天下之所素知人心之所素服用之於一方則一方之民恱用之於朝廷則天下之民恱陛下能用民恱之人是陛下得民之恱也臣所謂用有徳為得人心之術者此也臣所謂重守令者誠謂天下一家萬民為本積縣為州積州為國縣不得人則為陛下失一縣人之心州不得人則為陛下失一州人之心國不得人則為陛下失天下人之心是人心者為州縣之根本州縣者為天下之根本今朝廷之上選賢用能而州縣之任未甞選也資考應吏部之格者可以得也朝廷以為不才而黜逐者可以得也夫朝廷以堂選為重吏部為輕而郡守縣令以吏部得之是州縣之任輕於朝廷也朝廷以進用為才黜責為不才而郡守縣令以黜責得之是朝廷輕郡守縣令之任也臣願立守令之法重州縣之任應今後朝廷之黜責者不得任郡守縣令朝廷之選用者必自郡守縣令選除如此則守令知自重而不敢害吾民民知上愛我莫不懐上徳臣所謂重守令為得人心者此也臣所謂修錢貨之法者其說有三一曰當十二曰夾錫三曰陜西鐡錢夫錢本無用而物為之用錢本無輕重而物為之輕重此聖智之術國之利柄也臣竊計自行當十以来國之鑄者一民之鑄者十錢之利一倍物之貴兩倍是國家操一分之柄失十分之利以一倍之利當兩倍之物又況夾錫未有一分之利而物已三倍之貴是以比嵗以来物價愈重而國用已屈為今之說者不過曰官既罷鑄聽其自為輕重又不過如慶厯之法以漸減其分數此二說皆不可也夫盜鑄當十得兩倍之利利之所在法不能禁也自行法以来官鑄㡬何私鑄㡬何矣官鑄雖罷私鑄不已也私鑄不已則物價益貴刑禁益煩而物出於民錢出於官天下租稅常什之四而糴常十之六與夫供奉之物器用之具凡所欲得者必以錢貿易而後可使其出於民者常重出於官者常輕則國用其能不屈乎此一不可也慶歴之法前日行之東南是也自十而為五自五而為三自三而為小鈔自十而為五民之所有十去其半矣自五而為三民之所有十去其七矣小鈔之法自一百等之至於一貫民之交易不能悉辨其真偽一也輸於官而不可得錢二也是以東南之民不肯以當三易鈔而盡銷為黄錢此前日已行之弊也然而所以得行者尚以改鑄之日未久散於天下者未多況今公私之鑄日久併於五路與亰師者日益多其可復如前日公私有五分七分之損乎此二不可也然而當十必至於當三然後可平夾錫必併之然後可行陜西鐵錢必通之然後可重臣之說欲官出進納誥勅與度牒紫衣師號見錢公據六等以收京師五路當十隨其錢數物直平易之其有竒零不及數者則隨其多寡填給公據許得貿易若自便於𣙜貨務筭請諸路末鹽鈔以一季為限於是悉以所得當十樁管逐路或上供京師隨其所用改為當三通於天下國家無所費而坐收數百萬緡之用其利一也公私無所損而物價可平其利二也盜鑄不作而刑禁可息其利三也然而六等之說所出既多則必停壅不售停壅不售則其直必減其直既減則公私或損臣欲進納前日之給綾紙宣帖者悉更為誥勅而度牒紫衣師號悉用黄紙自法行之後應官司惟得書填今来進納誥勅及黄紙度牒紫衣師號候畢方得書填舊降文字如此則無停壅之弊價輕之患矣此修當十錢之法也夾錫之弊其行未久輕於銅錢三之一十三當銅錢之十臣欲併於河北陜西河東三路陜西鐵錢之弊其積已多輕於銅錢一之十五臣欲通於河北河東兩路蓋錢以無用為用物以有用為用是物為實而錢為虚也故錢與物本無重輕始以小錢等之物既定矣而更以大錢則大錢輕而物重矣始以銅錢等之物既定矣而更以鐵錢則鐵錢輕而物重矣物非加重本以小錢銅錢為等而大錢鐵錢輕於其所等故也何則小錢以一為一而大錢以三為十故也銅錢以可運可積為貴而鐵錢不可運不可積為賤故也以其本無輕重而相形乃為輕重故臣之說欲併夾錫與鐵錢通行於河北陜西河東三路而禁使銅錢其三路所有銅錢許過銅錢路分行用其京東京西兩路夾錫錢許過鐵錢路分行用若河北陜西河東行使銅錢京東京西行使夾錫鐵錢與銅錢之入三路夾錫鐵錢之入餘路各論如私錢法如此則鐵錢與物復相為等而輕重自均矣陜西鐵錢㡬廢而可以復行其利一也銅錢不流於二邊其利二也邊人盜鑄而無所復用其利三也其或鐵錢尚輕物價尚貴又有二說以濟之鐵錢脚重轉徙道路不便於徃来一也拘於三路而不可通於天下不便於商賈二也臣欲各於逐路轉運司置交子如川法約所出之數樁錢以給之使便於徃来其說一也朝廷嵗給逐路糴買之數悉出見錢公據許於京師或其餘銅錢路分就請以便商賈其說二也前日鈔法交子之弊不以錢出之不以錢收之所以不可行也今以所收大錢樁留諸路若京師以稱之則交鈔為有實而可信於人可行於天下其法既行則鐵錢必等而國家常有三之一之利蓋必有水火之失盜賊之虞徃来之積常居其一是以嵗出交子公據常以二分之實可為三分之用此修夾錫鐵錢之法也臣所謂修茶鹽之法者臣欲并酒法而緫其鹽鈔筭請之數買茶搭息之數𣙜酤淨利之數坊塲買樸之數分天下五等而三之為上中下十有五等嵗各出緡若干一切弛其禁制使民自便國省官吏而嵗入有常其利一也户出緡錢至少而得以自便其利二也小民各安其業而商賈得通其利三也姦盜不作而刑罸可省其利四也臣所謂修居飬安濟漏澤之法者前日朝廷既甞修之矣然其利未廣其費尚多臣誠欲廣陛下之惠息縣官之費謂應天下鰥寡孤獨之無歸者疾病之無飬者死亡之無葬者宜令各許所在近便寺觀隨宜收飬葬薶每通計及若干人給度牒一道如此則生飬死葬者各得其便一利也天下寺觀各得度人二利也官無濫費而下獲實惠三利也徳澤益廣而可以久行四利也臣所謂修學校之法者誠謂前日之法太煩而難守費廣而難久官有一嵗四科塲之勞士有五嵗一應舉之患春季一試夏季一試秋季一試冬季一試官吏之勞紙札之費悉如貢舉之法是一嵗而有四科塲也豈非官以為弊乎一試入縣學一年然後赴嵗升再試入州學一年然後補内舎三試升内舎一年然後補上舎者嵗終然後入辟雍入辟雍者遇大比然後得推恩凡此數者每試必得必有考察必遇大比已五年矣而況試未必得得未必有考察貢未必遇大比是又有七年之久者有終身不得進者豈非士以為患乎臣欲廣陛下教飬之意而覈其實簡有司選試之法而省其費謂宜州置州學教授一員命官充之選有學行者視其資秩為請給人從之數縣置縣學教授一員舉人充之月給職錢五千學生之入縣學者不試不給食學生之入州學者初嵗一試外舎取文理通者不限以數比嵗再試内舎取外舎十之一三嵗再試上舎取外舎十之一於是貢于太學太學緫天下所貢之數而大比焉又取十之一乃奏名而官之應三舎生願在學與游學於外者聽其自便内舎以上官給食若在外犯公罪徒私罪杖雖贖及在學犯第二等以上罰者各不得預試每大比之後一再試如初法甞預貢者免試外舎至於試士之法其弊亦久人守一經無不出之題文為一格無甚髙之論以博學好古為迂闊以綴緝時文為捷徑是以老成久學之士未必得而後生淺聞之徒多預選臣謂宜革選試之法使人試五經大義各一條為第一塲子史時務筞各一道為第二塲宏詞為第三塲如此則髙才實學者無不遇之歎而新進寡學者無濫得之幸是為今日學校之所養者必為他日三舎之所選今日三舎之所選者必為他日朝廷之所用學校益廣一利也考選益精二利也士得自便三利也所費至省四利也臣所謂修吏役之法者其說有二以田募吏一說也以兵代役二說也以田募吏之法水田上等一頃中等一頃半下等二頃陸田上等二頃中等三頃下等四頃州縣每案募吏一人使世其職身歿聽以子孫家人承代試而後補犯枉法自盜贓者還其田别募隨其案之職務煩簡許保任書手一人至三人月給顧直三千犯枉法自盜贓者同罪餘罪輕重有差如此則吏得久其職而可以責任一利也人知自愛而重犯法二利也民不受弊三利也顧直可省四利也以兵代役之法應州顧散從縣顧手力悉易以廂軍廂軍不足以禁軍其教閱更代差出各如本法即不得下鄉幹當公事如此則顧役可省其利一也兵無冗食其利二也臣所謂修轉輸之法者臣誠以為領使太煩轉輸不一財散而費廣權分而勢輕臣欲悉減諸司官每路只置轉運司一員使轉輸財賦按察使一員使察㢘吏治皆以望重品髙者為之許各辟官屬分治其事如此則權一而事治其利一也官省而費輕其利二也凡此十說臣皆推原陛下仁聖之美意修廣今日已行之良法於當更之時順民恱之情定一代之典為萬世之利至於事之緩急行之先後法之纎悉儻蒙萬㡬之暇留神聽覽或有可采别具條對出自宸衷㫁而行之臣非敢懐邪而觀望希賣而幸進惟欲陛下受天命無窮之福天下安陛下和樂之政宗廟永寧社稷永固臣之至願也李復上奏曰臣聞聖人御天下也必以道而道者南面之術也其所謂道者豈但漠然而無所事哉其用至微其功至周皆隠於綱紀法度禮樂徳政之間使四海安然而無事至千萬世而無弊天下由之不知其所以然而然也古之致治者惟堯能之孔子稱之曰煥乎其有文章乃綱紀法度禮樂徳政之謂也巍乎其有成功乃天下安然無弊之効也蕩蕩乎民無能名乃不知其所以然而然也夫惟如是所謂道也後世無不稽焉前世自唐末至五季天下糜爛大壞有識者傷之至於不忍言國家之藝祖太宗潛而未躍熟稔昔者禍亂之所由起自膺天命凡立一法欲絶一蠧凡舉一政欲去一弊小大逺近皆有綱紀法度維持不以喜而妄與不以怒而妄罰使居官者修其職安其分而不敢妄作不敢茍恱無狂易儌幸之心百姓守其業樂其生無横擾困苦之患累聖循之迄今一百六十年天下晏然自三代而下未有若本朝平定之久也恭惟陛下即位已来延見臣下必訪治道四方聞之皆曰今唐堯在上矣臣願陛下思祖宗修立紀綱法度維持天下之意不取目前之虚美而求經久之逺慮使上下各安其分守職業具舉朝廷清明民物繁富弊無由而起蠧無從而生天下不知其所以然豈非配天廣地之業哉治道莫盛於此臣踈逺愚惷不知治體狂妄獻說惟赦之幸甚復又論虚名實敝上奏曰臣聞古先哲王之舉事也常艱於其始而深慮其終始雖可為後不可繼則不為蓋慮得其虚名而受其實敝天下四海雖甚大亦猶庶民之一家以一家之事推之乃天下之事爾臣甞觀舊史見前世不能深思逺慮輕動生患者其事甚衆不敢逺引以瀆聖聦以臣今親見所謂庶民之家者論之臣居有鄰人承其父業負郭有美田十餘頃衣食富足不能力穡篤治為人所怵喜多田之豪名罄索又營逺山之瘠田數十頃欲人稱其田之多也逺田無所得常以負郭資之嵗久因逺而困此求虚名而受實敝也陛下承祖宗積累之休無幽不燭無逺不察其多事輕動以求利者不能昧聖聦必久已察之矣固不待螻蟻之微獻其愚臣惓惓之誠更願終謹之幸甚左司諫江公望上奏曰天下大器置諸安則安置諸危則危此知置之之地未知運之之手天下神器為者敗之執者失之此知運之之手未知藏之之道藏天下於天下而不得遯此所以為道也天下有常安之地聖人操妙用之手至人藏不動之道不動常動動常不動運實不運不運常運安常不安不安常安此宰制天下之妙理管仲髣髴萬一以其君覇伊尹周公收拾土苴以其君王大舜神禹得之以其君帝孔子曰惟天為大惟堯則之與天同體得所以藏之之道禪之匹夫如攘芥揮涕之易得所以運之之手煥乎其文巍乎其功得所以繕全之理而置之者也自堯而下以人治天下以人治天下貶於道矣舜捨已從人禹惟不矜不伐湯執中文王翼翼武之斤斤以器之不可滿而先為可持之方成王持盈守成以器之已滿而見於能持之力道既貶矣器亦狹也嗟乎戰國之縱横秦漢之吞并有為之之敗執之之失矣故其妙不知所以藏其粗不知所以置天下無事亦幸爾今有器焉蠱而不飭蕩而不綱攲而不平漏而不苴置之能安以否身坐其中雖巨有力焉能運行以否一日為有力者負之以去謂之善藏以否器既如是天下亦然陛下以仁為樸以義為削以信為繩以智為巧以禮為繪政以制其用刑以支其蠧啾啾萬鳴蠢蠢群動同在一器虚而不實故衆實之所會靜而不動故群動之所止止而無止則動亦寂矣會無所會故實亦空矣虚實一體動靜同域莫得其隙莫窺其用陛下以此藏之孰能移也得之於天人非容心也視之若敝屣非有愛也承之於宗廟非敢忽也行一不義殺一不辜非敢為也人愛亦愛之人棄亦棄之示至公也上而公輔下而有司百執事或坐而論道或作而行之各當其力也不在一曲不滯一隅東顧西眄左提右挈如在掌握之上陛下以此運之孰能弊也不畏多難而以無難為憂不矜無過而以改過為美居安思危在治思亂以山河為金湯以邊人為赤子外之郡國若犬牙之相制内之宗族若盤石之鎮安建極於四達之塗躋民於仁夀之域陛下以此制之孰能危也藝祖神考能運而藏之者也仁宗能安而置之者也今舉以付陛下如何其勿思也臣之言若誕而不可考稽皆目前之至理非外取也張湛曰至妙之所會者更麤至髙之所適者反下臣以為知言惟陛下財擇公望又奏曰人君明目達聦所以通下情也前後有旒左右有纊所以防太察也太察則聞人之過下情不通則不聞已過聞人之過則姦生而刑滋不見已過則心塞而禍萌此周之厲王以防口而召亡漢之顯宗以耳目隠發為明而速亂也邏者之興推求其意不過以求瑕搜匿鈎致盜詐出於不備擿發如神此一酷京兆之俗才爾使京兆為之側目耳陛下以天下為度海内為家而為良京兆所不為伏惟陛下即政之三日一切罷去天下聞之翕然歸心開口張膽人人自安告訐不長風俗向厚比聞稍稍復置益舊額通為七十人一人量以十人為耳目十人之中一人又以十人為之散之通途永巷不啻數千百人矣夫婦醜詆之言仇隙怒傳之語増情飾状擿隠抉伏何所不至人人跼蹐各各疑慮親戚不敢誠朋友不敢信目不敢注視手不敢直指若此定非清世之美事也昔吳王孫權用吕壹軰舉罪糾姦纎介必聞深案醜誣排陷無罪以作威福歩隲力詆其非權尋誅壹覺悟尚早蓋小人因縁銜命不務奉公利在慿藉威勢杜絶人口公然作過使上聦不達威柄潛移刑及無辜睽睽萬目聞人之過不聞已過之所致也老子曰察見淵魚者不祥以察為明是誠不祥之兆也陛下豈不思畿甸之外非陛下之民乎人各有心能使之昏昏不喻朝廷之所為乎人各有口能使之嘿嘿不議陛下政事乎既不可揜於天下何獨察察於輦轂之下以為明哉語曰天下有道庶人不議信乎有道不可得而議也伏望陛下以道御天下使人蕩然不疑無得而議何為蹈吳之故轍而不知革彼猶能因言以誅壹軰孰謂陛下鑒此而不能之乎願黜獻議之人通舊額人數一切罷去除禍者必鋤其根植福者必封其本毋謂昔有額而不可去也其根尚存枝葉他日復生矣不可不察趙鼎臣對策曰臣聞天下之勢莫重於已安聖人之慮常切於既治古先盛王不以太平盈成為可樂而以長治為難不以垂裳拱揖為多暇而以居安為懼故衢室載放勛之問緫章志有虞之訪謀及卜筮學至芻蕘凡以不恃獨見之聦明而思得天下之忠言嘉謨以濟其治也不惟有以明已善而又有以取衆善不惟有以鑒已然而又有以防未然聖而益聖安而愈安蓋皆出於此矣恭惟陛下承休祖宗合徳天地仰奉太母之慈訓懋昭先帝之盛烈据已安之勢攬既治之俗猶於多士在廷親屈聖問勞謙退託質所未逮此誠陛下推堯舜之用心而使有若卜筮芻蕘者咸得預謀而備問也臣愚不肖草野狂戇妄殫所聞思補聖徳之萬一惟陛下赦其昧死臣不勝至願伏惟聖策推兩漢之政鑒方今之治愍大辟之尚衆念寒燠之或差此見陛下求治之深也臣聞善言古者驗於今善言天者驗於人陛下仁慈恭儉視民如傷置官立司裁省浮費而約賞節用首自宫掖則非特衣綈履革而已銖金尺帛不妄賜與臺池苑囿無所增飾則非特惜十家之産而已發内庫之金以賑凍餒散上供之粟以賙饑饉則非特除慘酷之科著胎養之令而已應天必以實見異必修徳此宜天地之氣交感旁暢遐邇之氓承風向化俗興禮義而年榖和熟以答陛下之休徳也然間有不能爾者雖臣甞疑焉請為陛下陳之臣聞人之怨咨欝於下然後天之舒慘變於上故水旱為沴本民情之未和由大辟之滋衆蓋民無常産因無常心則放僻邪侈無不為已及陷罪而刑之孟子謂之罔民此不可以不戒也臣竊謂方今有仁政而無仁吏故郡縣之政徒謹簿書有司之臣諱言教化化不下究則民起而觸憲網食不家給則人窮而為盜賊督郵之所獲追胥之所執嵗不下以千百數有司徒能据法以當其罪而未甞論陛下所以愛養元元之意且思有以教之此不亦有仁政而無仁吏邪刑罰積而嗟嘆興嗟嘆興而變沴作則夫寒暑差僭豈無自而致然哉昔東海一女子耳刑不以罪猶能感致暵旱況四海生齒之衆而曰死必當辜刑必應罪臣雖甚愚竊未敢謂之然也彼文章二帝因敝承峻濟以寛厚故民氣既協而天理亦應此其所以修而致之者惟陛下以教化為首務擇良有司而奉行之然後刑辟可清嗟嘆可平而頌聲和氣固将薫蒸旁薄發為嘉瑞則水旱之變又何見於盛世哉伏惟聖策慕無為之治敬何言之化又將明賢鄙而平徭賦定法令而清蠻貊革而正之務求勿擾此見陛下圗政之備也臣聞任官以資格則雖賢有所不申取人以言語則雖鄙有所幸進此其所以未明也惟陛下稽唐虞考績之典放周書黜陟之制如此則賢鄙明矣臣聞户板既久有虚名而增稅流亡不復有詭佃而不征貧以不足而重斂富以有餘而徼幸至於課功調役多寡隨之此其所以未平也惟陛下采師丹限田之議放唐人口分之法浸復古初毋尚一切如此則徭賦平矣臣聞之易於渙曰渙汗其大號於巽曰申命行事故先王之行令也堅如金石信如四時公如天地以陛下之聖布美意畫良法合於人情熟講而力行之雖萬世可無弊至於因時移易應變屈申是乃所以為神化不倦者又何患於屢更哉顧其所設施何如耳臣聞詩云薄伐玁狁至于太原其上策不過乎嚴守禦走集之利俾其欲寇不能願臣不許而已陛下臨御首詔疆吏毋得擅興侵畧斥候既明約束素定持重飬威隠然有不可犯之勢是以鬼章跳踉竊据邉壘而亟縛渠魁生致闕下蹈臨洮之城轔青唐之壌雲徹席卷天威四震此誠今日已成之効也臣願陛下謨謀嵓廊益稽逺畧采姚崇之意不賞邉功取士燮之言釋為外懼纎介視之則又何患於不誠而且未清哉伏惟聖策咨劭農之首務訪制禮之盛典欲人不趨利而務節欲士不憚勞而奏功此見陛下講化之勤也臣聞農盡其力在敦本而抑末禮制其宜當縁情而示訓雖然傳曰禮先王未之有可以義起也陛下徳為聖人位為天子則夫以義起禮固無便於此矣而復訪臣以制宜之時此臣所以遲疑而不知對也臣聞上好節誼則人不勸而自矜朝有爵賞則士雖勞而不憚則夫不趨利而樂奏功亦在陛下所以鼓舞之而已至如漢之久任可以課吏治隋之義倉可以禦凶年此善於今而可先者也兵釋之滋廣服用之無制此戾於古而為大者善者以漸而復行戾者以緩而除去為政之善宜必如此凡此數者是皆治國之大本方今之急務臣既言其畧矣而陛下復策臣以天下之廣黎元之衆慮有未萌而當預防者臣於此然後見陛下凡所以問臣者豈徒為無用之空文可喜之髙論哉又將深謀逺慮而及未然之得失顧臣之愚何足以識此雖然仰觀陛下即位以来仁深徳厚政良俗美務行寛大之令悉懲苛嬈之吏元元赤子蒙被天地父母之恩可謂至矣然臣切慮郡縣䟽逺之吏或不能明朝廷指意妄謂厭明察而樂簡易務為優游懦緩之治以至見非不舉聞惡不察趨競者矯以取名偷懦者習以蒙幸兹風一扇流為姑息此臣所大懼也願陛下懲其流而塞其源正其本以禁其末有若宣帝之政信賞必罰太宗之治屈已從諫此消弭之大略也臣愚不識忌諱復附于末惟陛下財幸御史中丞王安中奏曰臣聞治古之世君任道以用天下臣任法以為天下用蓋道不徒行必以道出法君不獨治必以人守法法行而下不能守君勞而臣不知勉三代以来未有若是而能治者也臣竊觀陛下有堯之仁有舜之孝有夏禹之勤儉有文王之小心而又席祖宗流澤之光承熈豐聖作之緒禮備樂成墜典畢舉天地順應年榖屢豐宜可以儲思於穆清玩心於昭曠而臨朝聽政每至旰食咨逮焦勞形于玉色退即便殿親御翰墨發號施令日以數十纎悉微隠必關聖慮雖天徳剛健勤于萬㡬然臣竊意陛下勢亦有未可自己者也何則本在於上末在於下要在於主詳在於臣臣甞觀今之為臣者矣所與共者天位所與治者天職所與食者天禄而精白一意以承休徳者為誰哉同寅協恭和衷以助理萬務者為誰哉以道事君而任天下之責者為誰哉情同者相求利同者相親挺特者不容睚眦者不貸廹挾自大之風積久未殄背公而狥私怙權而附黨見得而忘義售諛而醜正締合相傾之習于兹猶熾豈無尊君親上之士哉且相戒以保身豈無憂國愛民之士哉且相語以俟命則利孰與興弊孰與去政事孰與修紀綱孰與正陛下雖有尊賢籲俊紹庭陟降之意而平進之塗塞矣陛下雖有厲世摩鈍甄别流品之意而名器之施輕矣陛下雖有崇寛尚徳勤恤元元之意而膏澤之源壅矣陛下雖有躬儉節用裕民足國之意而財利之積耗矣朝廷除吏士或困於無津吏部注官衆又扼於無闕婣聮宛轉擇地而仕勞舊寒窶終嵗坐待平進之塞有如此者賞不必勸能官不必稱事胥史之賤至上大夫者多於王廷之士給使之冗至横列者雜於公室之臣名器之輕有如此者役不時興以差為募物不時須以配為市富者求易常産貧者無以自給民狃於犯法輙牟奪以封已吏幸於乗時輙並縁以為姦膏澤之壅有如此者天地之間其生有數四方之物其利有常既已聚諸此必竭於彼矧賦禄之厚其源既開興事之費其流既肆掌計之臣指應副之外無他策將漕之使侵封樁之外無餘術此可以為常哉其無事幸而已財利之耗有如此者以祖宗基業之隆以神考制作之盛承以陛下之聖而天下之事文具而効不至名美而實不副者將不止諸此臣姑舉其大者若夫有志之士寢食之所念慮四方萬里之逺朝夕之所繋望陛下天聦天明無所不燭盍亦循其本乎臣觀記禮者以大臣法小臣㢘為國之肥蓋言大臣有以正下小臣有以守已則仁賢至而國不空政事立而財用足禹之告舜曰慎乃在位又曰其弼直而繼之惟動丕應徯志蓋言審官而所使弼已者直則動必衆且大應至乃徯志所在而無違命穆王之命伯景亦曰昔在文武聦明齊聖小大之臣咸懐忠良其侍御僕從罔匪正人而繼之以下民祇若萬邦咸休蓋言得忠良正直之臣列於内外則號令必臧民用順治然則今日之務孰有先於此者乎臣願陛下開衆正之門立大公之道崇奬尊君親上憂國愛民之臣抑絶好同惡直背公狥私之風則國家之治忽生民之休戚群下之情偽將畢達於前而陛下躬以剛健之徳體天之道觀四時之運順盈虚消息之理化而裁之神而明之以通上下之志以適萬物之宜循名以責實約文而就質持之以久守之以衆則太平之化日隆無為之功可致家給人足刑措不用至於海隅蒼生罔不蒙福矣臣奮自踈逺蒙陛下親擢任以中執法區區之愚誠不敢為臆說以効尺寸之報凡臣所陳皆天下之所欲達于上者而猶其略也惟陛下留神裁幸劉元承論尚同之弊䟽曰臣伏覩獻嵗紀元之號曰政和蓋自神考稽古立政實創厥始繼繼承承至於今日斟酌損益克底于中此政和之實也然臣聞之和與同異可否相濟曰和可可否否曰同曩者朝廷立法之初意甚美也而議論之臣曽不為國家深惜惟務希合以濟其私徃徃順承太過浸失本意此尚同之弊也幸陛下神聖獨㫁親灑宸翰以勅有司參酌前後之宜悉從中制一代之典遂成完文庶政惟和適在今日夫同者憂其說之不合一已之私也和者惟義所在天下之公也願陛下明勅群吏各公乃心務輸忠實毋或循私以為雷同有所建立不憚可否參於至當以合乎孔子所謂不同之義則政和之効出前古矣詩曰不競不絿不剛不柔敷政優優百禄是遒此言湯政之和而獲天福也惟陛下留神天下幸甚太常少卿李綱上奏曰臣聞忠臣不避誅以正諫故能濟患難而圗安明主不以人而廢言故能協智力以自助臣愚忘生觸死願効區區之忠惟陛下留神幸察臣以太常職事贊導郊禋竊見陛下祼獻太廟十室聖心感動涕泗横流侍祠之臣仰助惻楚然臣以謂陛下念祖宗艱難之功必思所以持盈守成慕神考劬勞之徳必思所以繼志述事況於宗社之大本生民之大計得不深慮而熟察之乎臣伏觀陛下自臨御以来追紹先烈所以持盈守成繼志述事者無所不至逺欲攄祖宗之宿憤近欲成神考之貽謀因契丹之衰亡復燕山之故境此誠不世之功而甚盛之舉也然而謀事之臣動失機會統兵之將多違指蹤糧餉有飛輓之勞賂遺有貪婪之患金國敗盟羽書狎至常勝失守存亡未期自燕地以南無髙山深林險阻以為捍蔽自大河以北有頻年盜賊郡縣為之蕭然設使敵國之衆蝟結蟻聚侵邊徼而摩封疆將何以禦之此誠宗社危急之秋陛下側席求言而忠臣義士奮不顧身以報國家之日也竊聞有旨召侍從之臣聚議各具所見以聞有以見陛下焦勞慨然有納用羣䇿之意臣以庶僚踈賤不獲與議論之末竊自傷悼久抱孤忠考古揆今參之天人之際日夜念此至熟仰荷陛下知遇寧忍緘黙不言以圗補萬分之一敢忘越職犯分之罪冒進忱辭惟陛下赦其狂瞽而詳擇其中臣竊謂當今禦戎之急務雖在於選將勵兵多方捍敵然要須治其本原敵乃可制杜牧所謂上䇿莫如自治而以浪戰為最下策者誠為知言前者已不可悔後者猶可圗也臣謂治其本原者其說有五一曰正已以收人心二曰聽言以收士用三曰蓄財榖以足軍儲四曰審號令以尊國勢五曰施惠澤以弭民怨臣所謂正已以收人心者比年以来般運花石軸轤相銜營繕宫室斧斤不輟製造器用務極奢巧賜予之費靡有紀極燕遊之娛倍於曩時此皆上累大徳下失羣心蠧耗邦財斬刈民力積以嵗時馴致今日之患非偶然也孔子曰一日克已復禮天下歸仁焉又曰修已以安百姓堯舜其猶病諸凡此數事特皆陛下耳目玩好嬉戲之具於事為甚輕然而實害天下之大計於體為至重斥而罷之一念之頃㫁自聖心夫復何難此令朝行人心夕改所謂克已復禮而天下歸仁修已安人而比隆堯舜者陛下豈不優為之臣願陛下降明詔罷花石之運停營繕之工減製造之局省賜予之費節燕遊之娛凡應奉之物一切禁絶如已詔停罷前項數事更願以至誠惻怛之意加之深省前失無以事勢稍緩即復施行要在使衆必信上以昭聖徳下以收人心可乎臣所謂聽言以收士用者比年以来忌諱衆多人材鮮少諂䛕之說日進忠骾之言不聞譬猶一人之身衆病交攻不求瞑眩之藥而望厥疾之瘳不可得也夫中材之士正須崇奨乃敢展盡況復摧抑誰復納忠是以大臣以将順為任職而不肯諫小臣以畏縮為得計而不敢言侍從之列懐榮寵而謀身臺諫之臣舉細故以塞責習熟見聞馴致今日之患亦非偶然也書曰后從諫則聖傳曰武王諤諤以昌以陛下之明而招徕羣言廣諫益聖天下之事有不足為者臣間諸孔子曰我戰則克孟子曰聞以七十里而有天下未聞以千里而畏人者也況以天下之大而畏人乎哉方今賢士大夫或伏於下僚或遯於山澤以陛下無至誠聽用之意皆閉其言而弗出平日陛下所取謀而聽用者不過左右近習之臣陛下以今日之事思之果能有濟乎臣願陛下降明詔求忠讜之言延草茅之士許侍從同薦或自薦達便殿賜對不拘以時使之展盡底藴虚心以聽之言而是舉行其策而隨加擢用言而非亦加慰勞而勿復譴責仍於詔中明著悼徃年求言加罪之失凡百忌諱一切蠲除上以廣聖聦下以收士用可乎臣所謂蓄財榖以足軍儲者臣聞人以財而聚兵以食為天雖有良将銳卒非財莫能使也雖有金城湯池非榖莫能守也財榖之蓄平日猶不可緩況於用兵禦敵為持久之計哉比年以来用度無節侵耗日多財匱而府庫虚榖散而倉廪竭物力既耗人心驚疑如居風濤洶洶靡定今日所以給軍費不知陛下於何所取而足乎取之内帑而内帑有盡取之封樁而封樁已無取之闔闢斂散之術而𣙜貨之法已殫取之横賦暴斂之政而吾民之力已困正當苦節以為足用之計耳近者置司講議失本末先後之序凡所裁減𩔖皆毛舉僅及百分之一二而真所謂無名之費不急之務初未甞裁減也況於權臣貴戚近幸之臣開端援例以沮壊之有裁減之名無裁減之實怨謗紛然何補於事今日之勢廹矣屯兵數十萬糧餉錫賚其費不貲又将取於吾民如前日之免夫錢則四方盜賊圜視而起豈不趣禍亂哉臣願陛下深思熟計如臣前之所陳既罷花石營繕製造賜予燕遊應奉等事明詔有司将常日逐項錢物盡歸版曹别項樁管專給軍費御前不復取索有司不進關子有不如詔重寘于法又詔宰執文武百官俸給米麥減半宰執及觀察使待制以上官在京有物業者仍令各進家財以助國用事平旋行給還在京上户願進者聽優與官職又詔諸路漕臣以上供斛㪷及自御前撥降錢帛日下於淮浙沿流州軍髙價糴榖多方措置人船星夜起發以實中都㫁而行之勿為浮議所沮財榖充牣軍儲有餘則外患不難禦也臣所謂審號令以尊國勢者臣聞人主深居九重之中所以宰制萬邦役使群衆者莫大於號令號令者國之紀綱也其在天如風雷在人如血脉風雷不失其序則萬化成血脉不悖其理則四支運故人主之於號令必審諦而不妄發則威信立而國勢尊下之仰上如天惟其所命民之視君如心惟其所使此帝王御天下之常道也比年以来發號出令初莫之審朝令夕改初不必行宻降旁出而三省宻院不與知束以峻法而給舎不敢駮夫元豐釐正三省宻院之制皆所以奉行天子之號令者也二三大臣與夫給舎之官皆陛下親擇而信任之者也號令之出而二三大臣或不與議號令之行而給舎之官不得舉職是朝廷為虚設而政事之出所以多門也首尾衡決先後錯忤有司疑於趨赴四方無所適從陛下方以揔攬權綱為得計而不知國勢已卑矣臣願陛下深究神考設官之意每下號令必與二三大臣謀之無使非其人者得與其或未允聽給舎得以審駮令出惟行而無反汗之譏信賞必罰減去私意則州縣将吏兵民如身之使臂臂之使指外侮不難禦也臣所謂施惠澤以弭民怨者臣聞民之恃財以生猶魚之恃水以活也王者之澤被於民深譬如江湖散漫悠逺魚於此而相忘豈有他哉用之有節取之有道不奪其所以相生養者而已比年以来用度既廣取於民者常賦之外其目繁多絮帛則有和買預買有泛買有常平司和買有應副燕山和買米榖則有和糴有均糴有補發上供和糴有應副軍糧和糴有撥發輦運司和糴名曰預買無錢可敷名曰和糴其價每下又以官告度牒鈔書准折衆户共分皆為虚名無用之物此外又有茶鹽敷配課額贓吏猾胥因縁侵漁一家之産隨其髙下所出如此欲其不飢寒轉徙得乎東南之民耳目見聞水漕而陸輦者又皆花石應奉不急之物愚民無知以謂奪其父子兄弟夫婦所以相生養之具盡於錙銖而用之如泥沙以供浮費欲其不興怨謗何可得哉是以頃嵗江浙巨盜一呼從之者飇舉而雲集東北嘯聚至今為梗職此之由方今邉鄙震聳人心驚疑深慮窮民復起為盜則腹背受患何以支吾臣願陛下明詔州縣凡積嵗欠負並與放免近降措置財利指揮如鈔旁錢免行錢醋息錢之𩔖一切停罷庶使民心安妥而姦猾不得以揺之此不可緩之策也臣前所陳五事如䝉陛下詳察而施行之則所謂上策莫如自治者其大概已舉矣變危為安莫先於此至於選将勵兵多方捍敵之策臣請試為陛下陳其梗槩捍敵之策其說有十遣大臣之有智謀權畧素為天下之所信服者為大帥盡統諸将聽其節度推轂授師不從中制使兵勢不分一也選諸将之鷙勇有謀素為士卒之所信服者各将所部分據要害之地使緩急首尾相應可以抗敵将不足則募大小使臣武舉及第或曽立邉功者召問万畧擢而用之二也遣畿甸禁兵不足則揀擇雜役諸色廂兵之强壮者又不足則起河北及畿甸保甲又不足則募民之願為兵者務令數多張大形勢使虜莫測又以羽檄起天下兵盡赴京畿使無外重内輕之患三也恃河以為固旁近州縣屯宿重兵營壘相望以衛京師持重養威勿與之戰待其粮竭勢衰然後議之四也屯戍将兵糧餉錢帛皆自中都應副優加撫卹勿使闕乏别置将兵防䕶餉道五也並河州郡選擇守臣素有風力可委任者易去疲懦許以便宜事在朝無其人則召自外方起於閒廢務在協力公心推選六也募文武小官有膽智辭辯者授以髙爵奉使兵間卑辭重幣復約和好以緩師期使吾事可辦七也河北諸郡令堅壁清野人民入保使進無所獲糧餉有時而窮强敵之衆難以持久八也按地圗相形勢命並塞諸道控制要衝扼其歸路擾其餉道使退有所虞不敢深入九也夏戎窺伺中國久矣乗我之釁安知無跳踉之心今起西兵而召其将帥彼或諜知敢肆猖蹶又生一患則陜西河東諸路不可不虞十也凡此十策雖腐儒之常談然不可不察更願陛下召宿将知兵者與廟堂深計之昔漢文帝時匈奴大入邉乃命周亞夫等三将軍軍㶚上棘門細柳以俻胡文帝親勞之禮成而去臣願陛下命将帥統六師屯於近郊訓練士卒陛下親臨以講武振揚天聲以勵士氣鎮之以靜臨之以威兵固有先聲而後實者亦一策也夫夷狄敗盟侵犯邉境自古有之唐太宗時突厥頡利飲馬於渭水去長安不百里太宗與六騎幸渭上逆折之頡利遂遯本朝景徳中契丹犯澶淵去都城纔數驛真宗渡河親征契丹遂和何則師直為壯在我者理直而有偹士心奮勵氣固足以吞之臣願陛下先留意於自治者而以捍敵為餘事自治之策尤以收人心為先不可以為非今日用兵之急務也昔者太王居邠狄人侵之事之以皮幣珠玉犬馬而不得免太王曰狄人之所欲者吾土地也去之岐山之下居焉從之者如歸市非得人心則雖将避狄人誰與居況欲合衆智協衆力使将帥忘生卒伍用命士有死志民無離心以捍難制之虜為宗社蒼生之計哉願陛下無忽臣聞良藥苦於口而利於病忠言逆於耳而利於行前事之驗後事之元龜也臣昨於宣和元年任起居郎日因都城暴水變故甞具状奏乞陛下寅畏天戒招徕讜言仍乞因侍立直前奏事區區之意實有所懐以謂隂氣太盛恐有盜賊猖蹶夷狄慿陵兵革之事不可不戒有其兆而事未見難於顯言故欲面奏䝉謫降逺小監當雖抱愚𠂻不能自逹逮今七年而盜賊夷狄之患如此乃知天人之際不可誣也惟先格王正厥事上以動天意下以感人心天意人心去就之際間不容髮動天以實而不以文感人以行而不以言正在今日臣願陛下萬㡬之暇中夜以興仰思祖宗勤勞積累基構畀付之重俯為子孫蕃衍衆多萬世無窮之計留意於賤臣之言夫心之精微非書之所能盡也陛下清燕之間何惜榻前咫尺之地不使臣進對得盡其心以報盛徳伏望聖慈特降睿㫖許臣不隔班先次上殿及與衆聚議庶㡬蒭蕘之言或有涓埃之補臣雖死之日猶生之年非獨臣之幸乃天下之幸也干冒天威無任戰越惶懼之至綱又奏曰臣伏覩陛下近降詔㫖不係元豐官制事目増置官局等令大臣取索條畫措置以聞此有以見陛下深惟政本而有裁省官局之意也又詔内外官司立旁通格目令各修具元豐紹聖崇寜政和年分財用之所出入見在侵支實數以聞此有以見陛下深惟邦計而有均節財用之意也恭惟陛下躬聦明睿智之資撫承平熈洽之運繼神考之志述神考之事其所施設而已然者遵制揚功而率由之其所有意而未備者増光潤色而推廣之建立制作法度禮樂凡百王之所不敢睥睨者悉舉而行之以大有為於當世然則増置官局不得不多支費財用不得不廣實理之所當然也今紹述之道罔不完具政立而法度已彰矣教行而禮樂已著矣陛下儲神穆清宅心昭曠日隆於清靜無為之化則去其華而實之猶彼春夏斂為秋冬而嵗功成省官局之冗貟以嚴政本節財用之浮費以裕邦計亦理之所當然者是宜深軫淵衷命廟堂之臣議此以為先務也然臣竊謂一而不易者道也徙而不留者時也有天下者執道以御衆必有以體其常治天下者應時而造法必有以通其變陛下紹述神考之道措之徳業固将傳之無窮施之罔極以垂訓於萬世至於以熈豐之時而視今日則生齒之衆多事為之叢鉅豈特相倍蓰而已哉然則裁省均節固不能悉視於熈豐盍亦揆之以道度之以時損益盈虚惟義之適立為中制使無太過不及之患則實有在於今日之舉臣愚伏望聖慈親詔二三大臣審圗之熟慮之可否相濟於未然之前號令必行於已出之後斟酌調制適於厥中官局之可省者省之必務合於人心財用之可節者節之使無損於國體以道為公惟義理之為從成一代之宏規以昭陛下建用皇極之道天下不勝幸甚歴代名臣奏議卷四十四
