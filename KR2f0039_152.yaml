body:
  text: 歷代名臣奏議卷一百五十二明楊士竒等撰用人宋理宗時牟子才奏趙汝騰徐霖不當遷逐狀曰臣比因輪對有感時事輒論君子將散其幾有十履霜堅氷危慮并迫荷陛下欣垂採納至於元祐紹聖反覆之際留問再三所以為世道憂者至勤切也繇此一意可以凝國是可以熄邪說羣臣百僚交誦聖明曽未數日趙汝騰除翰林學士以遷去徐霖與在外差遣以逐去駭機忽發事變倐異與臣前所聞於陛下者如出兩轍臣竊惑焉陛下既知所以為世道憂則求所以保之可也不惟不能保而又自摧斫擯斷之臣以為必有誤陛下者而非陛下之本意也不然以陛下之聖明而有此何也唐德宗非不愛陸贄而終仇其盡言非不用蕭復而常惡其輕已至於盧杞姦邪則曰朕殊不覺裴延齡則更以為忠謂德宗性與小人合與君子殊德宗庸主也豈不然哉而陛下則聖明也惟聖明為能鍳忠邪别淑慝故臣竊有望於陛下也夫正邪無兩立之理陛下所為更化之意者以用賢也所為用賢之意者以去邪也用賢去邪無他道在陛下堅其初意而已霖之去內批甚駭汝騰之出臣莫知其端或謂有所營救而陛下疑之或謂有所抵觸而陛下怒之臣不能詳也陛下用汝騰為給事小人重足而立仄目而視久矣一二繳駁仇怒者衆飛語搖撼者有之詭辭浸潤者有之汝騰瑟縮不安已為去計四方之誚責者日至猶謂某人當論奏而不論奏某事當諫止而不諫止汝騰固知其勢之甚難而力之不可勝獨賴陛下聖明而為之主而陛下固弗肯主則惟有去且汝騰老矣不憚數千里冒被畏景來事陛下亦欲有所建立而徒取空名以歸豈其願哉勢有不得已焉耳若汝騰者善類之所主也其真純端亮無所矯飾疏明洞達無所回隱忠君憂國懇欵至忱如火熱氷寒出於天性況同姓之卿義同休戚決非欺陛下者獨其好賢太切嫉惡太甚故見一君子則極口稱譽不顧立黨之嫌見一小人則極力芟鋤不計報復之禍黨則多疑仇則多怨其所以去殆或以此然陛下可不亮其心乎徐霖固小人之所仇也自其力抗權姦方張之勢且不暇顧其軀命豈計名哉幸而不死因以得名亦陛下飬其氣節成就至此天下莫不聞之一旦論事小忤即呵斥摧挫無復禮意陛下毋乃擲其小疵而遺其大慮乎霖既敗為仇人笑而天下願忠之士搖手咋舌以霖為戒臣竊以為非便也霖雖狂狷不猶愈於鄉原乎鄉原者滔滔皆是而何惡於霖也霖所論事一是一非若坐之以要君則自昔所記鬻拳兵諫薛廣德欲頸血汚車輪朱雲折殿檻大呼等事則又甚矣臣以為霖狂則有之彼素恃陛下恩厚遂忘忌諱亦不料至於如此也彼豈不能紆徐為和因循嵗月以取好官何苦犯危難自餌讒口陛下亦察其心可乎汝騰善類之所主霖小人之所仇陛下始焉尊用二人固所以昭用賢去邪之意今一日盡去初意變矣衆賢解體羣邪得志事勢岌岌正復可憂故臣以為非陛下本意必有誤陛下者也惟聖明豁然捐去疑二察其心亮其忠汝騰必勿失之霖終保全之以亢善類以沮小人以凝初意以回世道幸甚幸甚或謂汝騰已出理無復還臣以為有司馬光故事在光以中丞論張方平移翰林學士抗疏力辭神宗手詔諭光稱其經術行義且謂茍以言事罪卿豈復遷卿美職於是取告敕付閣門趣光令受光奏謝罪請上殿後受告詔光受告後上殿所以保全者如此今陛下以此意降詔遣使趣之使受其舊職則汝騰豈不能為陛下一留哉霖則陛下既豫之郡矣然猶有愚見非為霖計也元祐中韓維以與范百祿爭論刑名事罷御劄至謂奏劾臣僚既無明文何異姦讒吕公著纍章力爭而中批之詞猶厲則請論不已及便殿反覆敷陳其言謂皇帝宜調平喜怒以復仁祖之政而維卒善罷其為人主心術之慮至矣霖小臣非敢方維特欲陛下反覆斯言而深鑒焉非特霖幸諸臣之幸也臣立朝自有本末上無附麗下無比周公論所激冒犯霆威無所避死子才又為趙汝騰辨葉大有劾章狀奏曰臣聞君臣父子之間天下誠實之所在也臣子告君父之言必以其實非其實而敢於誣蔑以告者是以私意而窺君父也嗚呼尊如君父而忍欺之則何事而不為欺邪臣竊見近者趙汝騰除翰林學士知制誥未供職間而諫議大夫葉大有急劾去之士論怪駭併為一談汝騰文學行義昭著天下立朝有謇諤之節居官有廉平之稱往嵗初間凡三十餘疏而後去今春受詔五閲月而後來其難進易退之風天下髙之今忽為大有誣奏逐去此衆議所以恟恟不平始大有為汝騰所繳奏臣猶疑其深溝髙壘為自全計或用鄭宷故智以老其鋒今乃發其褊心造為誣語以欺陛下陛下察大有之懷私念汝騰之無罪格奏不下所以愛惜人才存全事體可謂曲盡矣而大有不體陛下美意乃多録副本散布中外且欲揭之通衢此與紹聖元符揭之朝堂異世一心臣偶得其本參詳始末然後知其言汝騰特發於私意而遂忘其欺耳昔司諫江公望謂榻前一磚地是人臣對君父極言天下事去處唯上不欺天中不欺君下不欺心則可免戾大有欺天乎欺君乎抑欺心乎臣子之事君父官無尊卑大義一也大有長諫省而職在諫君臣為說書而職在正君烏有大有以汝騰不實之罪上欺君父而臣不以其實為陛下告乎大有言汝騰叨升郎闈冒直翰林殊失典故無一篇文字可觀臣聞近世詞臣無出汝談之右汝騰師事汝談為所推許其掌書命蔚然有汝談之風大有乃以無文訕之大有文采不耀每為江萬里所鄙笑徐霖在館嘗以其文氣疲薾痛為改竄大有為文如此而反汝騰之毀其曰無一篇文字可觀是欺陛下也大有言汝騰因趙善湘媚嵩之之父彌忠而丐恩乞憐方嵩之用事時初無氣節之可書臣聞汝騰直翰苑時行史嵩之督府轉官制中有精能履屐之間等語嵩之以為輕已遂不受三官而甚惡汝騰繇此得罪大有乃謂丐恩乞憐無氣節之可書是欺陛下也大有又謂汝騰兄弟卵翼於陳韡後排之如寇讎其身久館榖於以夫近攻之如路人夫陳韡之凶暴以夫之詭譎汝騰排之天下莫不以為快所謂卵翼館榖臣不能詳知但大有嘗為汝騰所舉其為卵翼館榖多矣一旦彎射羿之弓詆其所謂人面獸心將自指邪指汝騰耶是又欺陛下也大有謂故相清之察其不能文不畀視草之職鞅鞅失望逮其來斯毀清之為甚臣聞清之雅敬汝騰屢以官誘之中間常欲除直院汝騰不領其意議論寖異最後因日食正陽疏其賄政清之益怒陳垓密受風旨遂遭誣劾固不待再來而毀清之也大有謂其鞅鞅失望是欺陛下也大有又言汝騰詐曰清貧行李不辦不知其在鄱陽永嘉婺女時有未請俸料乎臣聞汝騰所守三郡皆有善政世號循吏而清廉一節尤為皎皎其歸也甚至無屋可居寄跡蕭寺無田可耕取仰祠祿閩士類能言之不特閩士人人能言之也大有乃謂三郡無未請之俸料且俸料乃赤旁所封之祿朝廷所以飬廉藉使盡取亦其當然大有誣蔑之詞至是窮矣是欺陛下也大有又謂汝騰大則稱長宗盟不容一老之遺次則破格相輔將襲二臣之後臣聞汝騰之繳以夫實采公論彼其盤錯已深一擊匪易而以為稱長宗盟計何其小也汝騰聲望豈去一以夫而後能稱長宗盟哉至於破格相輔尤為非據汝騰每謂宗姪不可為宰相雖汝愚為之猶不免禍蓋以是遏與籌之姦謀且其聲利素薄此來不過作數月留為國家定大計排大姦而已豈有意於襲二臣之後哉且大有既為諫長一武可居政府所以徘徊顧望而不肯去者原其本心正欲襲二臣之後而反以此議汝騰是欺陛下也大有又謂陛下灼見徐霖之首鼠斥之於外京師萬衆咸仰天日之清明汝騰以同謀而敗露乃誣奏而欺天臣聞大有嘗乞憐於汝騰詞甚哀苦而汝騰亦許其革面矣徐霖聞而非之頗誚責汝騰於是奏疏有乞盟大賢豈可救之之語汝騰讀之竦然觀此則非同謀可知而大有疑汝騰漏言使霖播之深恨汝騰遂謂同謀敗露誣奏欺天是又欺陛下也大有又言汝騰濡滯郊關愈聽譁徒又要私黨以代乞留買上書以為公議夫孟子不用三宿出晝屈原被放倣徨去郢豈若是淺丈夫悻悻然去則窮日之力哉且同列諸賢重惜其去扣閽求賢天理所激謂之買斷可乎草茅之士重惜其去作詩送别分誼當爾謂之譁徒可乎大有不明為士之誼遂以此為鉗制之術此何異腐鼠之嚇鵷雛也不知留行諸人可得而鉗制乎是又欺陛下也大有謂臣擢自丙午冬非清之之力也又素排嵩之之姦又無一事干與􅊸又未嘗黨垓滎攻一正人臣聞嵩之以牒試冒濫屈大有大有窮而無歸怨則有之若謂非清􅊸之黨則將誰欺清死籌去而遺毒餘烈至今為梗以大有為之死黨故也雖家置一喙殆難自解凡垓滎所論列皆是大有嗾使今乃欲避其名以欺天下此尤姦之大者臺諫中今無垓滎之可嗾遂自劾汝騰以泄其忿其陷害忠良之意至是愈不可掩且大有以不孝誣江萬里欲制獄以陷陳億子等二十士謂之不傷害君子可乎是亦欺陛下也凡大有所言臣參稽反覆無一之實其欺甚矣而又有大可畏者臣不可以終莫之辨也臣聞諫議大夫給事中俱𨽻後省皆紀綱之地今汝騰以社倉事論大有其職分也未聞言之是否紀綱所在大有所當懼思也乃視如不聞揚揚上殿復冒不韙顯劾汝騰則給舍可廢也紀綱可紊也且汝騰再召已七閲月使果有過惡胡不攻之於先而獨用此數日乎汝騰繳之彼亦劾之臣不知此一意也公乎私乎自來臺諫按劾雖小人行其胸臆猶有託焉未聞直述其私形之彈疏臣觀大有所論汝騰之文纍數百言無非自為辨數然則汝騰不得罪於君父不得罪於公論而獨以忤一大有用為罪狀播之逺邇姦雄小人所不敢為者而大有為之臣不知大有何所恃而敢爾也大有不過欲假陛下之威隆其權勢以恐遏天下使無敢復有議其姦者然不知祖宗三百年之臺諫專為大有設乎專以為大有報復之地乎生此厲階漸不可長此其一也自昔小人之攻君子莫不反用其鋒在元符指司馬光為姦邪在慶元則指朱熹為僞學雖以章蔡何劉諸人回山倒海之力猶不能移萬世之公議今大有目汝騰為頑夫為姧邪為凶輿臺皂𨽻口語籍籍其說之不足行固不待後世矣何能為有無哉獨其敢於變亂黑白熒惑睿明所謂小人而無忌憚者也又立黨之一說為穽於國中夫小人而欲亡人之國必先空君子之類君子無過惟坐之以朋黨而朋黨人主之所甚惡也黨錮之禍起而漢衰清流之禍起而唐亡大有胡忍而為此也且大有左挾以夫右挾與籌而內主垓滎獨無黨乎急於矯枉以稔流禍此其二也大有至謂近日水灾為甚皆汝騰鼓流俗唱浮論所致昔恭顯之流以地震為蕭望之劉向之罪日青無光為周堪張猛之咎其說傅㑹甚巧以元帝之暗猶察其妄至下詔切責之而大有乃敢以此言進於陛下不知大有以陛下為何如主也是以陛下為元帝之不如也且劉向所謂將同心以陷正臣者正為大有輩設耳言之獨不泚其顙乎國家不幸有大灾異正賴君臣上下交相規戒崇陽抑隂以弭變怒而大有忽唱為邪說移過玩變欺天誣人大有庸淺鄙陋未能知人況能知天邪論一興浸淫靡已此其三也若此三說臣竊料其意不止於去汝騰而已大有才本平凡氣質甚下少年僥幸不暇學問昧於聖賢命義之大戒妻妾宫室之念驅之於中利欲富貴之圖誘之於外而又有柔邪之資諂佞之口足以自媒世謂巧宦逮其得志文以姧深領袖臺端羽翼元惡上則以妾婦之順媚惑聖聽下則以鬼蜮之智隂戕善類傳坦之衣鉢為垓滎之指蹤論者以垓滎為梁成大以其公為小人小人而顯者也以大有為李知孝以其陰為小人小人而隱者也原情定罪浮於垓滎而一去一留是謂佚罰夫鷹化為鳩識者猶憎其目而欲冀其可誘為善不已踈乎今外議籍籍皆謂大有上殿之日面承密指退而草疏遂肆詆誣或又謂陛下積怒汝騰厭薄君子固留大有以排根以臣所見萬無或然皆大有專徇已私快圖報復遂使歸過君父謗流海宇在大有亦復何情大有每謂已決歸期非敢欺誑又謂若逐汝騰則拜辭君門退處畎畝去百大有不足以當一汝騰然泯其邪正混其是非猶諉曰兩罷也今汝騰除職豫郡而大有頑然自如轉石拔山有識痛恨以大有為臺諫則汝騰非給舍乎以汝騰為黨則大有非私乎以汝騰為無録黃不當繳駁則大有非當論事而反肆抨彈乎陛下見其務為唯阿謂之恭謹可托腹心見其好進讒諛謂之盡誠可寄耳目方且抗之以戰公議主之以彰聖斷而忠賢之去如土梗辨髦天位天職陛下獨可與一大有共之乎夫世變之趨如江河之日下雖天地鬼神有莫能移而欲赤手捧塊以礙之臣固知其不可也今小人之勢已成君子之禍將作然與泯默以陷淪胥之害寧盡言而就黨錮之誅用敢直疏其事無所回隱所謂立朝之大節事君之大誼臣知此而已他不暇計惟陛下亮其不欺子才又論救髙斯得徐霖李伯玉狀奏曰臣聞國於天地間必有與立者其惟君子乎君子進則國之所與立者存焉君子退則國之所與立者忽焉其理昭昭如燭照龜卜不可誣也伏自陛下更新大化收召時賢歐陽修所謂選之千官百辟之中而得此數人者莫不布在班列氣象翕然四海流聞足為盛事頃緣葉大有以私意攻趙汝騰遂致一時大起諍論交攻互擊上瀆聖聰賴陛下審察是非大有竟遂其去區處得當衆論無譁比日以來事體小定凡百有位豈無肺腸亦願各務靖共安其職業以彰陛下優容之德以成聖朝肅睦之風而髙斯得徐霖等忽為御史所劾雖御史意見與人異殊然此二人者皆號君子其大節表表可觀今乃文致其罪牽聨盡去是以或者議論紛然謂其似是而實非托汚而寄治蓋知陛下邇來積怒徐霖未已逢迎風㫖遂肆擠排而又并以此時中傷斯得不特快平日之積忿且以致諸人之必爭萬一有語言不倫舉動過當則又指為立黨目為好名或謂之訕上要君或謂之侵官越職用為罪狀激怒聖心諸人戇愚初不之悟連臂接跡如墮其機以臣觀之豈惟諸人不悟雖陛下明聖亦未察焉昔陳執中婢奴之死言者持之甚急范鎮乃以為非且以專治其私失論人體夫以鎮之待小人猶恕之如此今何獨無鎮之心乎況斯得素號剛方不畏強禦觀其平日論奏庶幾陳瓘鄒浩之特操似未可以此少之也若王益柔傲歌之作王拱辰一網盡去韓琦亦以為非且謂攻益柔豈為傲歌意蓋有在琦之於小人深阻之如此今何獨甘於拱辰乎況霖之為狂夷考其行有得於曽晳琴張之遺意亦未可以此少之也所幸陛下灼見群情大為容覆斯得既除職與郡徐霖亦畀以寬科是陛下雖勉行臺臣之言而終有保全君子之意一時氣類莫不歡然以為世道之回猶可望也而伯玉復以罪去未免憂疑夫以內批而逐臣寮此豈盛時美事韓維之去吕公著爭之朱熹之去趙汝愚留之皆以內批施行而為宰相執奏彼豈不知將順之美豈不識朋比之嫌而輒犯天威力伸論救蓋謂人君舉動實係觀瞻稍失和平有傷事體且於君德關繫非輕故寧犯不測之誅而不欲置其君於有過之地陛下夙存寬大優禮羣工止緣積怒於徐霖遂有指揮之乘快乘快不已順以為常至于再三殆似手滑而宰相憚於忤旨俯首奉行比之公著汝愚大為有愧且李伯玉本無過尤偶以論奏之章有關風憲之體伯玉草茅質直不暇周詳但見都司彈糾之條謂即祖宗可行之事遂因輕舉上觸威顔逐鹿而不見泰山當時蓋有所蔽不然覆車未逺伯玉何苦蹈之況伯玉心事真純制行平實豈肯比周為黨蓋亦忠憤所驅在於明時似可矜諒昨所下御筆詞㫖嚴峻聞者愕眙皆謂陛下有髙視宇內之意輕視臣下之心而欲一切震之以威臣愚以為過矣夫聖人推忱而任理虛已以盡人以天地日月為心何嘗有好惡之私以風雨霜露為教何嘗有喜怒之迹昔我仁祖撫育臣民四十一年率用此道故逐唐介而旋召介斥范仲淹而復用仲淹其他逆耳之言亦皆所過者化而且謙恭寅畏終始不渝用能固結人心扶植元氣以為燕翼之地所謂數世之仁也恭惟陛下天德清明同符仁祖獨於好惡之際喜怒之間猶願反之聖心深加懲艾霽嚴威於電激霆砰之際持定見於衡平鑑空之時諒斯得徐霖之孤忠察伯玉戇愚之無罪縱未如仁祖之用介於既斥用仲淹於既貶亦當察其萋斐賜以包荒特回反汗之仁用祇不逺之復繼自今日益恢至公毋以好惡亂是非之真毋以喜怒汨性情之正毋以朋黨加忠賢之罪毋以獨運崇一已之威毋以辨詰窮言者之辭毋以疑二來讒邪之口毋以憸人任紀綱之責毋以御筆快斥逐之私庶幾聖德日新異端潜泯上無變容動色之事下無疾聲大呼之尤公道光融豈不甚偉臣職在經筵事當正救不敢雷同拱默以茍容其身冒犯天威無所逃罪貼黃臣久具此奏蓋皆平心而論非有矯激不過願陛下存大體霽威嚴而已既壅於上聞徒抱憂愛今獲覲清光若吐而復茹則是昧其本心欺陛下矣謹復以元奏上徹聖聰惟陛下幸察子才乞留徐霖狀奏曰臣頃因誤渥汙玷班行待罪奉常叨榮三館黏黐未去愧負初心今月八日入局見校書郎徐霖去國後所申祕書省狀因而詢問乃知臣霖應詔言事論及諫議大夫京兆尹之罪三辭不獲遂申都省徑出國門此等舉措雖駭觀聽然與口去而心留陽受而隂辭者不可同日而語三館之士見其所為莫不擊節於是聨名合辭為王留行繼而得之傳聞則謂昨來宰相親以柬槧勉而留之既而遣宰士尹煥即其寓止慰而留之昨又聞御筆下廟堂諭意留之既又扎委大著姚希得前路挽留之君相不下士久矣今吾君吾相謙勤勉勞至于再三可謂待士有禮矣可謂不鄙薄人言矣士而聞此莫不奮厲況臣霖親受寵渥豈不欲黽勉就職以稱陛下留行之意然再三思之數十年來風俗不美者皆緣世俗有所謂禮數之說有所謂祠請之說所以轉相倣效公然言之不愧不怍今臣霖飄然徑去不以富貴利逹動其心此其所謂過人逺甚觀其申省之詞有以如言去而復留稱辭而又受甘伏簡書是猛省截斷斷無復回之理矣況兼所論諫議大夫有失出詔獄黨蔽姧臣之罪京兆尹有李昴英所言森列可畏之事則是與此二臣為敵矣夫與人為敵而自出弱辭自行狹路而使敵有可攻之隙其何以勝天下之公議耶此臣所以敢謂臣霖決不復回也陛下若果有意留之惟有亟罷諫議大夫京兆尹之職則可以使之必回不然霖之去萬牛不可挽矣其或霖之去果不可回則遷擢之間或與改合入官或與之近郡添倅以華其歸則臣今日之去豈不足以風厲諸臣而霖春秋方富又豈不能進用於他日以重王國耶惟陛下擇斯二者乃若諫議大夫京兆尹之所為未問其有罪無罪合公議與不合公議只以廉耻一節激厲之彼豈不內自愧省勇於一去以存全國家之大體耶切聞京兆尹宣押歸府之後不復治事騰章乞祠則是猶知廉耻也獨諫議大夫乞留徐霖之疏乃反自以為是更無一語求退其逆疑陛下未必施行則是全無廉耻也夫禮義廉耻國之四維所以維持人心者此也所以維持世道者此也諫議大夫以己律人者也而先自壞所以維持人心維持世道之具而欲以此糾正官邪其誰能服況其資質柔佞心術回邪道路之人皆能言之若國家飬此不捕之猫留此不鳴之鴈祇足汙辱臺省耳欲望陛下出自聖意别選骨鯁之士以振諫議大夫之職其於天下所補不細又豈飬廉耻厚風俗而已哉所有京兆尹陛下既以民訟不可留滯復令日下治事則乞嚴行宣諭俾之洗心滌慮改過自新免致再有人言則京師衆大之區兩浙旱荒之地有所賴利矣臣本蜀人職聨三館與臣霖素非親知於諫議大夫京兆尹亦無仇怨陛下亮臣之心赦臣之罪特賜施行公議幸甚子才延和殿面對第一劄子曰臣一介踈慵待罪博士比因愚戇洊乞退間將期獲展於素心乃遂繳謄於二奏旋申前請汔閟俞音致令孤子之蹤尚玷班聨之末兹緣參告適值對班幸天表之再瞻豈愚言之敢愛臣聞區别是非者天下之公言包容賢否者當今之邪說自昔言者每當國論危疑之秋欲混邪正為一說昭然號於天下曰皇極曰大中以為包含依據之的而不知經之所謂皇極者非此之謂也蓋皇者君也極者至也言人君之身居至極之地以為天下之標準周公所謂以為民極者是也自漢儒誤以大中二字而訓之而後世遂以為寬洪廣大之言又以大中為含洪姑息善惡不分之目如元祐之調停元符之建中慶元之建極皆是也然嘗論之君子小人不可並用君子小人之說不明而是非顛倒賢否貿亂其餘毒遺烈往往以之斫喪元氣殘害國家蠧壞善類而不自知也元祐更化以來姧邪失職居外日夜伺便規求復入吕大防輩乃欲合兩黨而用之其意將以消平舊怨也而蘇轍則謂邪正不可兼用兼用必至交爭此元祐調停之說也自此說一行未幾而李清臣以吏書入矣又未幾蒲宗孟以兵書進矣又未幾而鄧溫伯之徒復以外藩起矣雖瑣瑣繳駁諫官論列事得暫止然此路一開終不能遏小人之進激而為紹聖反覆之禍則此說實為之非斫喪元氣之斧斤乎元符末年瓘浩雖來章蔡未去邪正雜揉朋黨交攻元祐之黨嫉視熙豐之人紹聖之人忿怒元祐之黨曽布一旦以大中至正之道改元建中其意蓋欲以元祐兼紹聖而行之也而曽肇則謂當先分别君子小人然後可以行大中至正此元符建中之說也自此說一行而鄧洵武以愛莫助之圖進矣又未幾而溫益錢遹之徒據要津矣又未幾而蔡京為左丞且拜右僕射矣雖旌别淑慝有詔紛亂憲章有戒然此機既抉終不足以止小人之來激而為宣靖危亂之禍則此說實為之非殘害國家之鴆毒乎慶元中柄韓專國擯逐善類至標道學之目以為攻詆之資羽翼既張忠諫受禍權臣稍厭前事或者附㑹又立為建極之說以示廣大含容之公一時君子雖幸學禁之稍寬而見逺識微之士則深憂邪正之相揉此慶元建極之說也自此說一行小人懼其事之變也復嗾言者以辨治為請矣未幾而僞師之葬嚴行約束矣又未幾而習僞攻僞之禁申致其嚴矣雖廢退之士先後復官而復讎之說一進終不能止小人之言激而為開禧用兵之禍則此說實為之非蠧壞善類之蟊賊乎是三說者雖其為意各有不同大抵皆以含糊鶻突為說是以忠邪並世薰蒸變化荃蕙化為蕭茅嘉榖化為稊稗人類殄絶世道陵夷所謂斫喪元氣殘害國家蠧壞善類之禍靡不有之是非天之作孽也人才之辨不明而其禍必至於此也陛下以聰明之才當艱難之㑹其於人才進退之間嘗致其謹矣然天下之才有君子有小人其名既殊其類又别嘗即其情狀而觀之大率不過數端其言剛正不撓無所阿徇者君子也辭氣卑佞伺候顔色覘窺意向切切然貪進務入者小人也光明正大踈暢洞逹魁壘傑特無纎芥可疑者君子也依阿淟涊回互隱伏閃倏狡獪睢盱鄙賤枉道茍合者小人也君子小人情態昭晰固若黑白之了然而其似是而非似非而是者言與行違迹與心異者則尤人之易惑也今不問賢否不察疑似而一槩以大度包容之曰我調停也我建中也我建極也豈不誤人國家哉故皇極大中之說其始則包君子小人而為一其極則君子受其禍小人受其福其始則納天下國家於無事其極則天下受其危而國家受其菑故一小人之進若未甚害也及其久也呼儔引類根據朝廷交通宫闈劫制人主然則當正邪交攻欲定未定之前而進皇極大中之說者陛下其可不察其說之所以然哉今君子少而小人多矣自甲辰改紀以來臣漢弼死臣範死臣元杰死今臣大宗臣應起又死矣臣性傳去臣泌去臣斯得去臣琰去臣昴英去臣萬里去臣公許去臣韶去臣似去臣瀹去臣霖去臣潜去今臣汝騰臣伯玉臣鉞又將去矣君子之勢落落如晨星曉月之孤又借皇極大中之說為邪黨游說之地則君子盡去而陛下之國空矣國空無人則陛下孤立于其上矣陛下其亦省察于此乎省察之道無他在致謹於用人之際而已繼自今立政用人有若清臣溫伯孟宗等輩其勿徇偏見勿惑人言而為其所怵則天下大勢決不如元祐之變紹聖也有若洵武遹益蔡京輩其勿搖異說勿顧身禍而為其所惑則天下大勢決不如元符之變宣靖也又有若何淡京鏜劉德秀胡紘等輩勿聽怪論勿怵私情而為其所賣則天下大勢决不如慶元之變開禧也謹之未擇之前遏之未來之頃彼皇極大中之說將日銷月鑠而國是定于一矣惟陛下留神子才為起居郎因灾異進對劄子曰臣嘗肅容稽首伏讀國史至景祐中京師地震直史館葉清臣上疏有曰頃范仲淹余靖以言事被黜天下之人齰舌不敢議朝政者行將二年願陛下深自咎責詳延正直敢言之士庶幾明威降鑒而善應來集也書奏數日仲淹輩得近徙臣有以見仁宗皇帝祇畏天威優容讜直未嘗以遂非為心也又讀至范仲淹既徙潤州讒者恐其復用遽誣以事語入上怒亟命置之嶺南參知政事程琳獨為上開說明其誣枉上意解仲淹訖得免臣又有以見仁宗皇帝照破姦讒消平誣枉未嘗以終怒為心也夫人才天下之元氣公議國家之精神所恃以為天下國家此而已今清臣一言而仲淹有近徙之命程琳一言而仲淹破讒誣之疑雖執政大臣如王隨陳堯佐等輩亦不能沮抑而齟齬之此四十二年之治所以獨為本朝之冠也猗歟盛哉陛下纂圖御極幾三十餘年矣容諫尊賢一念每以仁祖為法比者更化登崇俊良澗谷諸臣悉膺聘召氣象翕然向慶歷矣乃有直臣不容相繼逺引如臣汝騰則以奪瑣闥去臣霖則以論事不合去臣斯得臣願質則以泰來之劾去臣伯玉則以都曹論臺臣去臣棟則以奪中書去臣鉞則以謁告去越明年臣夢炎則以乞郡去臣遇順則以論貴戚之卿去自是以來上之人則以常人吉士為國下之人則以譁競朋比為的彰然立赤幟以鉗天下之口以拂天下之公論然風雨如晦雞鳴喈喈忠志之士未嘗不以譁競朋比為忌而不言國事之非也雖至愚如臣亦有救解直臣之說消平喜怒之說獨相之初不可不謹重之說避殿之後不可復賀雪之說君相之體不可獨運之說大德浸衰不可不修省之說姧邪不可比肩之說君子小人消長之說蜀上流當立三大屯之說貴戚之卿不可帥鉞之說喜靜惡激喜順惡拂之說御筆不可不收回之說蜀亡不可不急救之說大姧不可復用之說多言數窮取惡已甚揆以時義所合汰歸纍章陳詞有志未遂而臣之微意亦欲於未去之時深為君子謀所以冒萬死吐露於陛下之前者正以臣汝騰等排姧論事雖或過於激或流於狂或失於不中節然要其本心則皆忠於愛君忠於衛社稷忠於扶世道者今綿歷已跨二年而疑謗猶未盡釋幾若與之相忘於江湖之表豈諸臣他有過尤不足以供一時之用耶以臣察之諸臣以清白為質以正平為則以修姱為能以芳菲為服媚以博謇為好尚以中正為矩矱未嘗有所過尤也曰然則何為而棄梗乎曰謡諑好妒既妄謂蛾眉之善淫而靈修浩蕩又不察民心之屈抑此朋比譁競之譛所以入人之膚蠱人之心至于今而未解也上之人不過曰吾方以安靜為主彼乃以譁競為說不思每有除拜衆言輒紛紛當時反以為好事似未可以譁競訾之也吾方以獨運為政彼乃以朋比為心不思上自以為是諸大夫莫敢矯其非識者乃以順㫖雷同深負為臣之義似未可以朋比疑之也動搖山嶽之地既以譁競朋比之說媒糵於其先進退百官之朝復以主靜喜順之說隂制於其後此諸臣所以屈心抑志寧鬱邑而不伸死直忍尤寧䫲頷而不遂也且非特諸臣也後之以直道忤時者大抵皆如是也臣每一念此為之動色以相哀馮心而長喟臣既不能隨諸臣以去已為遁尾之厲若貪榮戀寵僥幸復留而不能為諸臣出一語以解久結不解之憤其視東漢之世願膏鈎黨之鼎者何止去三十里哉臣既以書抵宰臣又當天變洊臻之時盛夏常寒之際復效葉清臣程琳輩開解仁祖之意為陛下底裏言之欲望宸聰開悟聖斷果決念人才無終棄之理察世道有當反之機特舉仁祖所以近徙范仲淹等故事抆拭已去諸臣節次擢用使見為監司郡守者畀以收召以需逺次者畀以見次郡見食祠廪者畀以近次郡在謫籍者畀以祠廪被謫降者復其元官而畀以廪祿在選調者特與改秩而畀以外任一如仁祖節級近徙之制不惟上可以回天心而弭天變下可以允公議而服人心雖諸臣得路亦將永肩乃心盡展所學以扶宗社以福蒼生其所裨益豈淺淺哉臣一無能解每念報國獨惟薦賢用敢以諸臣抑屈久困之狀祈哀於陛下若猶未以臣言為然是永錮諸臣終非盛世之美事臣愚至是其技已窮惟有痛自咎責寧屈微臣之身以贖諸臣之過而已拳拳此心天地鬼神實臨之惟陛下幸赦詔免諸州守臣上殿奏事右丞相葉夢鼎言祖宗謹重牧守之計將赴官必令奏事蓋欲察其人品及面諭以廉律已愛育百姓其至郡延見吏民具宣上意庶幾求無負臨遣之意今不逺數千里而來咫尺天顔而不得見其非立法之本意又乞容受直言進少保度宗咸淳八年起居舍人髙斯得上言曰臣竊惟尚書本秦官漢承秦置其始皆用士人為之武帝晚來逰宴後庭始用宦者至成帝增置尚書五人復用士人然不過掌圖書章奏之事其任猶輕及光武時事歸臺閣尚書之任始為優重出納王命敷奏萬機蓋政令之所由宣選舉之所由定賞罰之所由出斯乃文昌天府衆務淵藪內外所折衷逺近所禀仰故李固云尚書猶天之有北斗為天喉舌斟酌元氣運乎四時信乎其為天下樞要也其長官則有令有僕射漢或以大將軍領尚書事或以師傅録尚書事其下有左右丞有六曹尚書蓋以萬機之繁故衆建官屬以綜理之章帝時韋彪上疏謂天下樞要在於尚書間者多從郎官超升此位彪特指六曹尚書耳若録公及令僕乃百僚之長非彪之所指也是時諸尚書多以苛刻為能故彪云天下樞要在尚書今超升此位者徒曉習文法察察小慧而無大能臣以居天下樞要之地必忠厚純實知國家大體者然後可以綜理萬務補弊救偏為國家輯安靜和平之福銷苛嬈刻核之風也今之彌綸省户者固亦得人然韋彪所言或尚有之又徘徊觀望不敢剸決使樞要之地壅底不通此今日之大患也聖問所及敢不吐其狂愚伏乞睿照九年斯得又上奏曰臣聞人君以眇然一身臨四海九州之大而欲含氣之屬視聽之類咸樂其生豈一手一足之所致哉故建萬國親諸侯使之協比其民拊循和輯不困不傷然後司牧之職盡而無負於上天之畀付矣唐虞嶽牧三代封建皆由此道雍熙泰和之治嗚呼盛哉自罷侯置守以來英君誼辟欲有為於天下者未嘗不以此為先務漢之文帝孝宣唐之太宗明皇是已臣請置三君而以聖問之所及者論之開元之初明皇厲精為治承則天殘酷之餘慨念民生新免毒螫思有以撫摩而綏靖之故孜孜以遴選牧守為急開元十三年帝自擇諸司長官有聲望者吏部侍郎許景先兵部侍郎寇泚尚書左丞楊承令大理卿源光裕等十一人為刺史詔宰相諸王御史以上祖道洛濵盛具奏太常樂帝親御翰墨以十韻詩賜之德意宣備恩光赫奕牧民之吏歆豔歎息人君意向如此宜乎四海之內鄉風而聽隨流而化開元三十年之治比迹文景庶幾成康豈幸而致哉惜乎始勤終怠一惑女德初心遽移天寶之後牧守不復親擇貪暴橫行為百姓苦唐業衰矣臣嘗謂人主欲治天下當先治其心君心一正衆欲盡除聾者司視瞽者司聽一意於民寧有進鋭退速之患哉盡此道者惟我孝宗皇帝乎在位二十八年不邇聲色不殖貨利富貴崇髙之奉一毫不入於心故夙寤晨興盡思極神惟憂民而已嘗曰朕一日須行天下一兩遭而於精擇郡守尤極留意選德殿置金漆大屏列天下郡守姓名其間朝夕省閲輔臣進擬必問其行治才術窮極根柢懼大臣之私也除目必列鄉貫於前嘗謂王淮等曰郡守之任卿等宜精擇若至朕前有所揀退則怨歸於朕矣至於臧否之法尤極其精命監司嵗終具所部郡守定其治狀分為三等曰臧曰否曰平臧者陟之否者絀之平者置而不問帥守不以時上雖嘗相位者亦不免於罰乾淳之治吏稱民安終始如一豈區區唐帝之所可同日而道哉今日宅生之寄選諸所表亦既盡心爾矣然田里之間猶有歎息愁恨之聲視乾淳盛際不能無愧故臣略舉陛下家法大槩為獻惟陛下留神金世宗時蕭貫為翰林修撰上書論比年之弊人才不以器識操履巧于案牘不涉吏議者為工用人不務因才授官惟泥資叙名器不務慎與人多僥幸守令不務才實民罹其害伏望擢真才以振澆俗核功能以理職業慎名器以抑僥幸重守令以厚邦本然後政化可行百事可舉矣同知青州防禦事常德暉上書言曰吏部格法止叙軍勞雖有材能拘滯下位刺史縣令多不得人乞密加訪察然後廉問今酒稅使尚選能吏縣令可不擇人乞以能吏當任酒稅使者任親民之職上是其言謂宰相曰朕思庶職多不得人中夜而寢或達旦不能寐卿等注意選擇朕亦密加體察赫舍哩良弼對曰女真契丹人須是曽習漢人文字然後可方今大率多為黨與或稱譽於此或見毁於彼所以難也上曰朕所以密令體察也熙宗天眷二年從容謂侍臣曰朕每閲貞觀政要見其君臣議論大可規法翰林學士韓昉對曰皆由太宗溫顔訪問房杜輩竭忠盡誠其書雖簡足以為法上曰太宗固一代賢君明皇何如昉曰唐自太宗以來惟明皇憲宗可數明皇所謂有始而無終者初以艱危得位用姚崇宋璟惟正是行故能成開元之治末年怠于萬幾委政李林甫姦諛是用以致天寶之亂茍能慎終如始則貞觀之風不難追矣上稱善又曰周成王何如主昉對曰古之賢君上曰成王雖賢亦周公輔佐之力後世疑周公殺其兄以朕觀之為社稷大計亦不當非也章宗時上封事者言提刑司可罷禮部侍郎張暐上疏曰陛下即位因民所利更法立制無慮數十百條提刑之設政之大者若為浮議所搖則內外無所取信唐開元中或請選擇守令停採訪使姚崇奏十道採訪猶未盡得人天下三百餘州縣多數倍安得守令皆稱其職然則提刑之任誠不可罷擇其人而用之生民之大利國家之長䇿也因舉漢刺史六條以奏上曰卿言與朕意合宣宗貞祐三年權監察御史完顔蘇呼奏曰臣聞興衰治亂有國之常在所用之人如何耳用得其人雖衰亂尚可扶持一或非才則治安亦亂矣向者糾軍之變中都帥府自足勦滅朝廷乃令伊喇托卜嘉等招誘之使帥府不敢盡其力既不能招愈不可制矣至於伯特文格之叛帥府方議削其權而朝廷傳旨俾領義軍文格由是益肆改除之命輒拒不受不臣之狀亦顯矣帥府方且收捕而朝廷復赦之且不令𨽻帥府國家付方面於重臣乃不信任顧飬叛賊之奸不知誰為陛下畫此計者臣自外風聞皆出髙琪之意惟陛下裁察上曰汝言皆是文格之事朕所未悉誠如所言朕肯赦之乎且汝何以知此事出於髙琪蘇哷曰日見文格牒永清副提控劉溫云所差人張希韓至自南亰道副樞平章處分已奏令文格𨽻大名行省勿復遵中都帥府約束溫即具言於帥府然則罪人與髙琪計結明矣上頷之蘇哷續奏曰髙琪本無勳勞亦無公望向以畏死故擅誅呼沙呼蓋出無聊耳一旦得志妒賢能樹奸黨竊弄國權自作威福去嵗都下書生樊知一者詣髙琪言乣軍不可信恐終作亂遂以刀杖決殺之自是無復敢言軍國利害者宸聰之不通下情之不達皆此人罪也及乣軍為變以黨人托卜嘉為武寧軍節度使往招之已而無成則復以為武衛軍使托卜嘉何人且有何功而重用如此以臣觀之此賊變亂紀綱戕害忠良實有不欲國家平治之意昔東海時呼沙呼跋扈無上天下知之而不敢言獨臺官烏庫哩德升張行信彈劾其惡東海不察卒被其禍今髙琪之奸過於呼沙呼逺矣臺諫職當言責迫於凶威噤不敢忤然內外臣庶見其恣橫莫不扼腕切齒欲一剚刃陛下何惜而不去之耶臣非不知言出而患至顧臣父子迭仕聖朝久食厚祿不敢偷安惟陛下斷然行之社稷之福也貞祐四年完顔蘇哷再任監察御史奏言臣近被命體問外路官廉幹者擬不差遣若懦弱不公者罷之具申朝廷别議擬注臣伏念彼懦弱不公之人雖令罷去不過止以待闕者代之其能否又未可知或反不及前官蓋徒有選人之虛名而無得人之實跡古語曰縣令非其人百姓受其殃今若後官更劣則為患滋甚豈朝廷恤民之意哉夫守令治之本也乞令隨朝七品外路六品以上官各舉堪充司縣長官者仍明著舉官姓名他日察其能否同定賞罰庶幾其可議者或以閡選法紊資品為言是不知方今之事與平昔不同豈可拘一定之法坐視斯民之病而不權宜更定乎宣宗時涇州觀察使張行信奏曰近聞保舉縣令特增其俸此朝廷為民之善意也然自關以西尚未有到任者逺方之民不能無望豈舉者猶寡而有所不敷耶乞詔內外職事官益廣選舉以補其闕使天下均受其賜且丞簿尉亦皆親民而獨不增俸彼既不足以自給安能禁其侵牟乎或謂國用方闕不宜虛費是大不然夫重吏祿者固使之不擾民也民安則國定豈為虛費誠能裁減冗食不飬無用之人亦何患乎不足今一軍充役舉家廪給軍既物故給其子弟感恱士心為國盡力耳至於無男丁而其妻女猶給之此何謂耶自大駕南巡存贍者已數年張頥待哺以困農民國家糧儲常患不及顧乃久飬此老幼數千萬口冗食虛費正在是耳如即罷之恐其失所宜限以嵗月使自為計至期而罷復將何辭上多採納焉元光元年九月上謂宰臣曰有功者雖有微過亦當貸之無功者豈可貸耶然有功者人喜謗議凡有以功過言於朕者朕必深求其實雖近侍為言不敢輕信亦未嘗徇一已之愛憎也尚書右丞相髙汝礪因對曰公生明偏生暗凡人多徇愛憎不合公議陛下聖明故能如是耳二年正月復乞致政上面諭曰今若從卿始終之道俱盡於卿甚安在朕亦為美事但時方多故而朕復不德正賴舊人輔佐故未能遂卿髙志汝礪固辭竟不許因謂曰朕每聞人有所毁譽必求其實汝礪對曰昔齊威王封即墨大夫烹阿大夫及左右之嘗毁譽者由是羣臣恐懼莫敢飾非齊國大治陛下言及此治安可期也元太宗時太原路轉運使吕振副使劉子振以贓抵罪帝責中書令耶律楚材曰卿言孔子之教可行儒者為好人何故乃有此輩對曰君父教臣子亦不欲令陷不義三綱五常聖人之名教有國家者莫不由之如天之有日月也豈得緣一夫之失使萬世常行之道獨見廢於我朝乎帝意乃解世祖至元十四年召相威拜江南諸道行臺御史大夫乃上奏曰陛下以臣為耳目臣以監察御史按察司為耳目倘非其人是臣之耳目先自閉塞下情何由上達帝嘉之世祖時東平布衣趙天麟上太平金鏡策曰臣聞夫龍之為物也千變萬化無適不宜大則乘風雲震雷電奮迅其頭角翕闢其爪牙沛霖雨以灑八荒潤禾苗以濟羣下小則陶侃之梭張華之劒釋聞之蛇壺公之杖或躍在淵或蟠于泥此蓋既能大而又能小者也夫鵬之為物也化質於北溟運程於南海背逾千里之大翼若垂天之雲擊洋水之三千摶扶搖而九萬以之搶榆枋則不及斥鷃以之捕狐兔則不及鵰鸇此蓋能大而不能小者也夫雞之為物也朝逰庭除夕宿塒文備一身之采武鬪一時之命至於淩晨三唱風雨不移毫釐不失若以鵬及希有比之則霄壤懸矣此蓋能小而不能大者也物既如此人奚不然故為委吏而㑹計當為乘田而牛羊壯者宣父也範圍天地有教立焉為萬世帝王之師拯六合生靈之溺者亦宣父也非龍而何哉孟公綽可以為趙魏老不可以為滕薛大夫黃霸長於治郡而功名損於相位即小大之殊也龍乎龍乎豈可以常得乎伯夷聖之清桞下惠聖之和猶且失於一偏孟子謂之隘與不恭然則人之周於道備於事者千載一二人耳其具體而微乎微者或嘗有之亦已希矣由此觀之舉世英賢多皆一節為人上者取一節可也董子云量材而授官其此之謂與今國家選法腹外三年為一考腹內二年半為一考自非負罪之員皆有進而無退臣謹按虞書云三載考績三考黜陟幽明言舜之考官如是也又按漢史云文帝時吏居官者或長子長孫其二千石亦安官樂職言文帝之任人如是也臣以為方今選法宜以賢能為先不宜以日月為上不革此弊則是公卿之位咸可纍考幸超而希之也且人才有大有小例以初仕者職小則淹滯英才例以久宦者職遷則施為安得皆稱哉切恐郡縣之官以茍且存心有更張之事則計之曰三年之後吾將去此何用勞吾心哉因循而已矣見賄賂之物則思之曰一旦交代未獲即除何以為家費哉營資而已矣又況郡縣之民迎新送故甚為勞費其弊將至於無如之何矣或者以郡縣之官久則擅權生事錢榖之官久則私弊難制臣謂此言非也若循三德八才而用之則皆才德應官之人矣人情大可見莫不慕榮貴但在國家錫之殊寵用當其才然亦有不遷之之道焉言當加爵而不即移其職也伏望陛下量其短長察其可否細木常使為桷大木常使為杗凡內外官員三年第一考為初考上等加官階二級中加一級下則仍舊階而上中下三等皆復守其本職六年再考如初考而復守本職九年終考如再考然後黜陟其職也凡考法令廉訪司官重甘保結考其行實而牒司路以達于上司銓定階次籍記倚閣凡三考黜陟其事業循常者依纍次官階而除之以次第所宜其才德超異者雖階次甚卑而待之以不次之位如是則居官守祿者既思階次之超升而盡其公道又懼憲職之知覺而滅其私心庶幾乎選法有以定矣天麟又論禮大賢䇿曰臣聞色斯舉矣舉則獨善其一身翔而後集集則澤加於天下者聖賢之士也知輔世貴德而下於一介之德務好善忘勢而屈其萬乘之勢者聖明之主也故丹山彩鳳不可以常網而羅之滄海長鯨不可以常竿而釣之寰區薄海不可以常士而治之命世大賢不可以常禮而招之今聖明溥班明詔博訪碩人斯蓋取士之一節未盡舉逸之大方也夫賢有放情江海佚志山林隱於朝野賤役之中混於市井編氓之內和乎表而存乎裏遺其世而亨其身此豈賢者之本心哉蓋由不得已而然也彼且志深道義心藐功名以德言為衣而弗榮軒冕之服以道腴為味而弗嗜膏粱之饌所耻者德未及古人而已矣所行者盡其在我者而已矣及乎耳聞丹詔意慕清朝彈貢禹之塵冠空彥倫之蕙帳奔趨魏闕啓沃堯心陛下卑辭而得之屈已以崇之乞言而行之推誠以任之使夫未至之流皆欣欣而曰吾王之道兮與吾道同吾王之心兮與吾心契鸞一鳥也尚克薦祥芝一草也猶能表瑞矧伊人矣能無感哉於是商山皓髮襲步武以呈光稷下鴻儒連茅茹而現景昔者堯尊一舜而得十六舜舜尊一禹而得九禹者由斯道也其或據爵以驕之傲而慢之或震之以天威或置之而不問使夫已進者因事而乞骸骨未進者懲類而甘藜羮雖復麻經遞降幣帛交馳誰肯鳴英倡俊以先服王室之勞哉此所以燕昭不憚於敬築金臺而蜀主不難於親顧茅廬也輕賢而賢者不至非賢者之虛飬髙而樂貧賤蓋防其道之不果行也在上之待賢以殊禮非在上之徒自輕而欽寒素蓋由其道之在于彼也故道者人君之師也道之所在恐不獲及亦既見止亦既遘止豈暇計貴賤輕重之云哉縱未或盡至亦足以激厲風俗如惠然咸來則可以同熙帝載得賢之道何莫由斯今國家鼎安方域囊括封疆國保於民民保於賢宜乎顒顒之士輻湊金門濟濟之徒並生王國然而內有御史外有憲司大臣之抵罪尤頻官吏之坐贓猶衆設明刑而不息垂峻令而自如凡以官不得人故也古之十室尚有忠信今之萬國寧無賢才伏望陛下謙虛自守體貌無遺霽英威而新之又新和天倪而行所未行接下思恭育才為樂重胎夭以致特角之麟受馬骨以致千里之駿載昭邦憲置彼周行如此則皇基永固庶職無瘝神祗安樂而戩榖彌臻閭里和寧而室家相慶矣天麟又論清閥閲曰臣聞治國之方得賢為首齊家之本教子為先立身之法務學為貴此三者天理之極人事之大也三代之隆人生八嵗自王公以下至於庶人之子弟皆入小學而教之灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子公卿大夫元士之適子皆入大學而教之以窮理正心修已治人之道所以備委任也今國家廕叙宦門之子弟上至朝臣下及外職莫不各有其格也其用之則不計賢愚其崇之則有踰才德若其資禀峭異學問優長乃足以負荷寵光增崇階陛儻有幼習驕氣家振豪風借勢吹聲行空顧影耀衣服之鮮靡競僕馬之繁華走犬飛鷹彎弓挾彈豈識聖賢之道哉於是父兄既不能教之以義方又有使習吹彈歌舞之藝從而矜衒其踈麗妙絶也厥後行文經營資廕職司王事不亦難哉及陷乎罪正欲置於法邪則子文之治猶在不可以忘之而使人臣解體也正欲原其罪邪則欒黶之惡已彰不可以宥之而使後人自恣也終亦寧忘已往之臣而顧將來之警以置其人於法矣則不若初不廕之之為愈也夫犂牛之子騂色者固當用之矣靈犀之子秃角者其可用之乎婁敬委輅脫挽而建漢畿之安叔孫通起於枹鼓而立漢廷之儀寧戚飯牛車下而顯齊孫叔敖舉於海上而霸楚此四人者雖無閥閲而皆有實用也故王者之用人如工師之用木巖阿有可用之材不以巖阿之地卑而棄之危嶺有無用之材不以危嶺之地髙而用之也君子之教子如豪家之有玉不以玉為己有貴價而不使玉人雕琢之不以子為己有貴基而不令嚴師教訓之也志士之好學如貪夫之喻利真知利可喻而喻之雖得利既多而不厭也欲令宦門之子弟勤學在乎君君令已行在乎父兄父兄付于明師其學在乎子弟矣伏望陛下載宣天㫖令有司試閥閲子孫弟姪不限人數問以時務伍件漢楷書寫略如試䝉古進士定其髙下等第及當廕之資格既又據三德八才纍等第資格之官階而用之凡閥閲免鄉府省三試直赴御試凡學術荒踈及不能赴試者姑令學焉待其中選而用之凡閥閲三舉不第恩賜出身量用凡已進者則有考幽明之法在焉臣又以居官者皆化下民者也有子弟而不能化何以化民哉更望陛下載宣天㫖凡見任宦官之家子孫弟姪八嵗以上三十以下不通經書而父兄不令習經書不曉文法而父兄不令習文法者委憲職糾察見任官而罰之使居官者懼憲職之糾察而欽師以教其子弟矣為宦門子弟者知富貴之不可幸希須先學而後獲則甘嗜於學問矣國家得天下之英材而樂育之以備他日之用可無遺恨矣天麟論束利官曰臣聞誠之所感可透金石莭之所持可􅓸霜雪皆天資卓厲人力難加設或中下之流已有參差之品故見利而思義者上也捨軀而就利者下也伏惟宇宙中人甚多莫非從化之徒亦在率之而已今國家屢誅嗜利之臣用謝士民之意至如官階內外爰分清濁之班人物髙低遂有賢愚之辨處貨利之司者定惟粗豪之人而清肅其心者皆掩身以避之領商計之務者但選市井之族而廉幹其德者皆因名以棄之則是未居于職已防汙濫之辱其身名既用伊人先約資財之償其失陷致使當職之人肆情征取上失在公之委任而虛其位下為私室之經營而枉其心愈治之而姧詐愈生愈防之而計數愈歉然財貨係于諸課而為國家之大本不可一日廢焉矯枉者不能不過于直也伏望陛下載宣天㫖令有司定制凡倉場庫務之諸官舊係省部出付身者今並宜以敕牒分品次之髙低視城郭之可否而設之凡錢榖官係舊隨路出付身者並以行省劄付增崇其職凡錢榖官舊無俸祿者今並宜依品次量多寡以給之凡中外官員不拘門格或憲職或民官皆量材以充錢榖官考滿銓功過以黜陟凡利官既或髙爵又䝉重祿又得齒於臨民之官又思以後遷升之益自然相率而廉幹矣其或故犯憲綱不盡心於正職者則自作孽而已奚足恤哉十年不齒然後降等量材而用之可也其或誤犯憲綱非力所及者則眚灾而已矣止徴其所當償既足而隨即降等量材用之可也若然則利官得人利源通暢上有禆於國用下不損於民資矣臣又以方今倉場庫務官一年交代意者因恐虧陷之多積弊於中久而難救故也若循舊制則雖一月一代其弊益生何則蓋立制以相繩無厚禮以相厭真利以相引也且一年一代而主出付身者將行文照驗之不暇又何暇辨其人之廉與不廉幹與不幹哉更望陛下載宣天㫖令有司定制凡錢榖官三年一考而易之凡錢榖官曽無虧缺委隨處廉訪司每年四季四度案覆凡有虧缺者則令隨處廉訪司就行别擬廉幹之人代其犯者之職申上用之拘犯者而徴所償既足則申上定之若然則自無虧課之人設或有之亦不至於數多而難以徴矣至元十四年中書左丞許衡論生民利害上疏曰十四年五月二十一日史中丞傳奉聖㫖據當今害民的公事利民的公事交同姚丞旨兩個一處文書裏寫來者欽此臣等所見謹條以奏生民休戚係於用人之當否用得其人則民賴其利用失其人則民被其害自古論治道者必以用人為先務用既得人則其所為善政者始可得而行之以善人行善政其於為治也何有皇帝陛下念及生民實天下之幸但朝廷用人失於太寬委任之初不知審擇使善惡邪正混然無别既授以政而居民之上矣中間固有暴擾侵漁之害其勢然也今不求其本直欲改其事之一二以為便民之舉將見一弊才去一弊復生後日改行之事其害民者未必不甚於前也徒見紛更恐終無益臣等伏願皇帝陛下順考古道簡用實材重御史按察之權嚴糾彈考核之任使賢者日進不肖者日退則天下之民何患不安矣臣等區區拙見如此惟聖主裁之仁宗每與李孟論用人之方李孟曰人材所出固非一途然漢唐宋金科舉得人為盛今欲興天下之賢能如以科舉取之猶勝於多門而進然必先德行經術而後文辭乃可得真材也帝深然其言決意行之文宗在集慶潜邸欲創天靈寺令有司起民夫江南行臺監察御史伊竒爾台言曰太子為好事宜出錢募夫若欲役民則朝廷聞之非便也至是文宗悉召江南行臺監察御史俾皆入為監察御史而欲黜伊竒爾台策丹諫曰當陛下在潜邸時御史盡心為陛下言乃忠臣也今無罪而黜之非所以示天下乃除伊竒爾台僉憲湖南順帝時蘇天爵奏曰嘗謂糾劾貪邪在乎公天下之好惡辨明誣枉所以著一人之是非好惡既公則惡黨消而奸弊息是非既著則善類伸而治化興欽惟世皇肇立臺憲登明選公欲四海人才之來集揚清激濁務一時公論之持平比者風紀之司論列涉于輕易或因察識之未審故致辨論之多端自昔國家皆有國是國是既定則邪正判而公道行國是不明則是非雜而人心惑宋宰相王曽語諫官韓琦曰近見章疏所陳甚佳髙若訥多是擇利范希文未免近名要須純意為國家事斯其諫論之良法歟夫天生人才足周一世之用作而成之則才常有餘沮而棄之則才恆不足矣然公族貴胄必生於閥閲之家而謀士軼才或出於山林之下故伊尹聘于有莘傅說起于板築孰曰出身之卑賤豈論家世之寒微此古者數路用人未嘗滯于一也夫法令朝廷所定廷尉天下之平或笞或杖受宣者必申禀于中臺或降或黜無例者必定擬于刑部是慎重于守法不敢輕于用刑今動輒曰省院臺勿用則當用者宣政資政之選乎是降為雜職矣又曰有選衙門勿用無選者孰敢用乎是不復得叙矣且職官犯贓猶有一貫至三百貫之分至論其罪則有殿降叙不叙之别豈有一遭論列或犯在革前或事涉疑似輒坐雜職任用之科終身不叙之罪豈法之平允哉且犯罪者至于流逺家屬尚留于京師被劾者未至當刑起遣即歸于鄉里蓋緣無事可尋強生于掇拾潔白素著特為之汙染致使髙尚之人聞而退藏有志之士亦為斂避當路興乏全才之嘆後世有國無人之譏其於世道甚有關係夫孰賢孰否在君子固自信而不疑去泰去甚當言者宜核實以詳審今始者一人糾言其罪次者一人辨明其非三人共列于一堂何以酬酢乎庶政縱使不行報復豈能消弭讎嫌夫史官定千古之褒貶臺諫判一時之是非褒貶公則後世之人信是非明則天下之人勸今或好惡淪于所偏邪正因以失實輕則訐人之隂私甚則誣人之父祖是以清濁混淆善惡錯亂朝是而暮非春劾而夏辨奏請有煩于聖聽辨論實撓于臺端事至于斯當究其理大抵為治莫先於擇人擇人貴在于守法蓋諸人呈言並無罪責者所以通上下之情臺諫論事務得其實者所以重耳目之寄若不申其賞罰何以端其本原舉人不當今有連坐之科論事不實古有抵罪之禁今後論言人者必須赦後為坐果犯贓罪並從臺憲追問其餘罪名仍須法司定擬如此則事不至于反覆法必底于允平奏請不煩于聖聽毀譽弗紊于朝章刑政肅而國體尊是非明而人心服公論幸甚天下幸甚歷代名臣奏議卷一百五十二
