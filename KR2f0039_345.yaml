body:
  text: 歷代名臣奏議卷三百四十五明楊士竒等撰四裔宋哲宗元祐元年門下侍郎司馬光論西夏劄子曰臣伏見神宗皇帝以夏國主趙秉常為臣下所囚興兵致討奮揚天威震動沙漠敵攜其種落竄伏河外諸將收其邉地建米脂義合浮圖葭蘆吳堡安疆等寨此蓋止以藉口用為已功皆為其身謀非為國計臣竊聞此數寨者皆孤僻單外難於應援田非肥良不可以耕墾地非險要不足以守禦中國得之徒分屯兵馬坐費芻糧有久戍逺輸之纍無拓土闢境之實此衆人所共知也三師既收靈州不克狼狽而歸卒疲食盡失亡頗多西人知中國兵力所至自此始有輕慢之心是以明年邊臣築永樂城敵潜師掩襲覆軍殺將塗炭一城久之又舉一國之衆攻圍蘭州期於必取將士堅守僅而得全敵自是鋭氣小挫不敢輕犯邉矣臣聞此數寨之地中國得之雖無所利敵中失之為害頗多何則深入其境近其腹心常慮中國一朝討襲無以支吾不敢安居是以必欲得之不肯棄捨一年前敵嘗專遣使者詣闕深自辨訴請臣服如故其志無他止為欲求其舊境而巳朝廷既許其臣服敵來請舊境朝廷乃降指揮其前則云所以興舉甲兵本欲執取罪人救拔幽辱非有意侵取疆埸土地而已其後乃云兵將已得些小邉土聊示削罰豈可更有陳乞還復之理此則朝㫖首尾已自相違又興師本為振拔秉常拒命者國人之罪豈可更削秉常之地於理差似未安王者以大信御四海羌戎雖微恐未易以文辭欺也於是敵既失望憤怒怨懟移文保安軍辭理不遜云今來賀正旦人使難議發遣自是正旦生辰乃至陛下繼明皆不遣使入賀其不臣大矣然而去嵗四遣使者詣闕弔慰祭奠告其母喪并進遺物理雖不備稍示屈服臣竊料敵意不出於三一者猶冀朝廷萬一赦其罪戾返其侵疆二者陽為恭順使中國休怠隂伺間隙入為邉患三者久自絶於王國其國中貧乏使者往來得賜賚之物且因為商販耳昔衛二於晉晉取戚田及衛人既服郤缺曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德遂歸戚田於衛今西人所為如此朝廷既不能拒絶勿受其使又不能招納與之更始彼來則迎送館穀以賔客待之不來則一無所問日復一日將踰二年臣竊意朝廷謂西人勢巳衰弱心實內附故來則不拒去則不追置之度外不以為虞殊不思𢾗年前王師大舉深入將士所過烈於猛火割其疆場屢請而不還彼怨毒欲讎報之心窺窬欲乘釁之意日夜不忘若渴者不忘飲盲者不忘視也譬如有虎狼在屋側垂頭熟寢人豈可見其不動狎而侮之循其頭躡其尾邪臣每思之終夕寒心以臣愚慮於今為之止有二䇿一者返其侵疆二者禁其私市何謂返其侵疆凡天子即位天地一新滌瑕蕩穢小大無遺昔趙他自稱南越武帝倔强嶺南漢文帝即位赦其大罪遣單使往諭之他稽首請服纍世為臣李繼遷俶擾西陲十有餘年關中困弊真宗皇帝即位赦其大罪割靈夏等數州除其子趙德明為定難軍節度使由是邉境安寧者四十年此乃前世及祖宗之成法非無所依據也今秉常之罪不大於繼遷也米脂等寨不多於靈夏也陛下誠能於此踰年改元之際特下詔書數其纍年不來賀正旦生辰及登寶位等不備之禮嘉其弔慰祭奠告國母喪進遺物之勤曠然推恩盡赦前罪自今巳後貢獻賜豫悉如舊規廢米脂義合浮圖葭蘆吳堡安疆等寨令延慶二州悉加毁徹除省地外元係夏國舊日之境並以還之其定西城蘭州議者或謂本花麻所居趙元昊以女妻之羈縻役屬非其本土欲且存留以為後圖猶似有名禦敵國者不一而足俟其再請或留或與徐議其宜亦無所傷至於㑹州尚在化外而經略司遽稱熙河蘭㑹敵常疑中國更有闢境之心不若改為熙河岷蘭經略司如此則西人忽被德音出於意外雖禽獸木石亦將感動况其人類豈得不鼓舞抃蹈世世臣服者乎議者或曰先帝興師動衆所費億萬僅得數寨今復無故棄之此中國之耻也昔漢元帝棄珠崖詔曰朕日夜惟思議者之言羞威不行則欲誅之通於時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉遂弃之此乃帝王之大度仁人之用心如天地之覆燾父母之慈愛盛德之事何耻之有國家方制萬里今此尋丈之地惜而不與萬一西人積怨憤之氣逞凶悖之心悉舉烏合之衆投間伺隙長驅深入覆軍殺將兵連禍結如嚮日繼遷元昊之叛逆天下騷動當是之時雖有米脂等千寨能有益乎不唯待其攻圍自取固可深耻借使敵有一言不遜而還之傷威毁重固巳多矣故不若今日與之為美也此國大事伏望陛下留神熟慮更與執政詳議以聖意斷而行之不可後時失此機㑹悔將無及何謂禁其私市西夏所居氐羌舊壤地所産者不過羊馬氊毯其國中用之不盡其勢必推其餘與他國貿易其三面皆戎狄鬻之不售惟中國者羊馬氊毯之所輸而茶綵百貨之所自來也故其民如嬰兒而中國乳哺之矣寶元慶厯之間元昊負恩僭亂屢犯邉境大入則大利小入則小利中國未嘗蹈其境破其軍禽其將屠其城有害於社稷也而首尾六年元昊遣使因緣邉吏卑辭納欵頓顙稱臣雖其惡積罪盈欲懷音革面原其私心未必不貪中國之財思私市之利故也舊制官給客人公據方聽與西人交易傳聞近歲法禁踈闊官吏弛慢邉民與西人私交易者日夕公行彼西人公則頻遣使者商販中國私則邉鄙小民竊相交易雖不獲歲賜之物公私無乏所以得偃蹇自肆數年之間似恭似慢示不汲汲於事中國由資用饒足與事中國時無以異故也陛下誠能却其使者責以纍年正旦生辰及登寶位皆不來賀何獨遣此使者拒而勿內明敕邉吏嚴禁私市俟其年嵗之間公私困弊使自謀而來禮必益恭辭必益遜然後朝廷責而赦之許通私市待之如初然邉民與西人交易為日積久習玩為常一旦禁之其事甚難何則若以常法治之則有司泥文動循繩墨追問證左逮捕傳送之人停匿之家奏裁待報動涉半年如此則徒使邉民麗刑者衆獄犴盈溢而私市終不能禁也夫三尺之限空車不能登峭峻故也百仞之山重載陟其上陵夷故也今必欲嚴禁邉民與西人私市須權時别立重法犯者必死無赦本地分吏卒應巡邏者不覺透漏官員衝替兵士降配仍許人告捉獲者賞錢若干當日內以官錢支給更不以犯事人家財充如此則緣邉六路各行得一兩人則庶幾可以聳動人耳目令行禁止人不敢犯矣然人存政舉此事全在邉帥得人昔龐籍為河東經略使下令禁邉民與西人私市有熟户犯禁籍斬於犯處妻孥皆送淮南編管一境􅏮然無敢犯者其後施昌言為環慶路經略使亦禁私市西人發兵壓境昌言遣使問其所以來之故西人言無他事只為交易不通使者懼其兵威輒私許之法遂復壞若邉帥未能盡得其人則此法恐未易可行不若前䇿道大體正萬全無失也光又乞未禁私市先赦西人劄子曰臣於今月三日上言以西人未服中國不得無憂而邉備不敢少弛不自揆其狂妄獻二䇿上䇿欲因天子繼統曠然赦之歸其侵地與之更始下䇿欲嚴禁私市俟其屈服然後赦之然禁私市甚難立法極嚴又邉帥得人然後能行不若前䇿之道大體正萬全無失也今竊聞執政用臣下䇿止令禁私市又立法不嚴邉帥未盡得人若邉吏拘文獲一漏百私市㴞滔如故或此路禁絶而彼路放行如隄防一存一亡將何所益如此適足以激怒西人使益發悖心安肯屈服萬一微犯邉境或表牒中形不遜語至時朝廷轉難處置悔之無及不若用臣上䇿早相彌縫縱未欲還其侵地且下詔書責而赦之使彼此安心時難得而易失不可忽也況本欲因天子繼統蕩滌其罪今日行之巳為太晚若更遷延則赦之無名兹事繫國安危若俟執政論議僉同恐失機㑹誤國大事伏望聖意獨斷行之勿復有疑天下幸甚若有執政立異議乞令其人自入文字若依從其議他日因此致引惹邉事當專執其咎光又乞先赦西人劄子曰臣於今月十二日上言乞以天子繼統曠然更始宜下詔數西人之罪而赦之縱未還其侵地且行此䇿以安邉境至今聞執政議尚未決臣之愚意以為封內未安未可圖外故欲急行臣前䇿以羈縻西人且可數年邉鄙無事朝廷得休息戎兵安養百姓待國力完備家給人足然後奮揚天威討二柔服何所不可若行臣前䇿可以萬全行臣後䇿有得有失豈可弃上䇿而用下䇿捨萬全而就有失也太平興國中李繼遷反西陲不解甲者十餘年關中困竭寶元慶厯之間趙元昊叛屢入為寇覆軍殺將自是中國虛耗不復富實今國家理財未得其道民力困窮於下府庫窘乏於上又新遭大喪山陵才畢自去年十月初以來不雨雪旱勢甚大若萬一激怒西人微出一不遜語則并臣前䇿亦不可行矣今因天子即位未久西人外迹未有不順故臣願朝廷旦夕汲汲行之機㑹難得時不可失此臣所以惓惓進言不巳者也若萬一激怒西人致生邉患兵連禍結士卒殄盡於鋒鏑生民困竭於轉餉餓殍蔽地盜賊蜂起為國家慮豈不危哉而執政方以為西人微弱不敢復動數遣使來誠心內附置之度外不以為虞今復因執先禁私市之議又立法不嚴邊帥不才者不先易去行之太早不能中節一旦禍生所忽邉鄙震驚乃始歸罪西人豈不害國事乎臣於今月三日所上言措置兩邉事雖畫二䇿固以還其侵地責而赦之為上䇿嚴禁私市待其數年貧困來服然後赦之為下䇿所謂絶私市非立法至嚴帥臣智勇此法恐未易可行不若前䇿道大體正萬全無失非臣前後返覆靜言庸違也朝廷比來擢臣於冗散之中使預聞國論蓋亦誤謂臣微有益於國家非徒採其虛名也臣之不敢終辭亦欲竭盡疲駑少酬大恩非茍貪於祿位也今盡忠謀國而為衆所挫臣尚留此有何所用此國大事伏望陛下早審察二議從其長者若聖意以臣言為然乞御批依臣前䇿若降付三省樞密院執政仍有固守已見爭之最力者乞如臣前奏令自入文字言先禁私市保得他日必不致引惹邉事如其不然身執其咎光又乞不拒絶西人請地劄子曰臣近具劄子奏乞於今月八日隨執政延和殿進呈文字復䝉聖慈遣中使封還令依前降指揮臣不敢再三固違聖㫖然臣區區之心所以欲於八日入對者竊見夏國宥州有牒稱巳差人詣闕計㑹所侵疆土城寨竊慮其日進呈上件文字此乃邉鄙安危之機生民休戚之本不可不察臣自今年二月初以來纍曽上言乞因新天子即位西人恭順之際早下詔書赦其罪戾待遇如故如此則控縱在我天子之體正休兵息民中外之心安不幸夏人有一語不遜一騎犯邉則此詔不可復下無何臣在病假不得面論人心不同為衆所奪日復一日遷延至今彼先遣使來直求侵地指陳兵端辭意寖慢前所議詔書巳不可下矣既失此機㑹即日使至應答亦難若悉從其所請則彼益驕而無厭若悉拒而不從則邉患由此而起今就二者之中寧為百姓屈巳少從所請以紓邉患不可激令憤怒致興兵犯塞以困生民所以然者靈夏之役本由我起新開數寨皆是彼田今既許其內附豈可猶靳所侵地而不與彼必曰我自天子新即位卑辭厚禮以事中國庶幾歸我侵疆今猶不許則是恭順無益不若以武力取之彼小則上書悖慢大則攻陷新城當是之時不得已而與之其為國家之耻無乃甚於今日乎以小喻大譬如甲奪乙田未請而與之勝於請而後與若更請而不與則彼必興鬪訟矣此是非利害明如白黑臣竊慮進呈之際羣臣猶有見小忘大守近遺逺惜此不毛無用之地結成覆軍殺將之禍兵連不解為國家憂伏望陛下決自聖志勿聽浮言為兆民計文彥博輔佐四朝熟知敵情此可謂軍國重事願陛下詢彥博以決之光又乞撫納西人劄子曰臣先於二月中曽上言乞因新天子繼統下詔悉赦西人之罪與之更始雖未還其侵疆且給嵗賜待之如故此道大體正萬全無失既而執政所見各有異同沮難遷延遂屏弃不行臣竊聞今來西人已有關報定使副詣闕賀登寶位國家若於此際又不下詔開而納之萬一西人蓄怨積憤肆其悖心或有一騎犯邉或於表牒中有一語不遜當是之時雖欲招納乃是畏其陸梁傷威毁重何耻如之臣之前䇿亦不可行矣伏望陛下令三省樞密院將臣三月三日十二日十六日并今來所上文字一處進呈臣愚欲為國家消患於未萌誠惜此機㑹夙夜遑遑廢寢忘食陛下若俟詢謀僉同然後施行則執政人人各有所見臣言必又屏弃凡邉境安則中國安此乃國家安危之機伏望陛下察臣所言甚易行而無後害可使中外兩安為利甚大斷自聖志勿復有疑取進止韓維論息兵弃地上奏曰臣竊見先帝時大興甲兵西討夏國始以問罪為名既亦收其土地遂致夏人有辭違失恭順邉境之俗以不報仇怨為耻今其國力漸復必來攻取故地若不幸復為奪去則先帝纍年勞師所得一旦失之巳為可耻若興師攻戰則邉隙自此復開兵連禍結未有已時臣竊思兵之不可不息者三地之不可不弃者五請為陛下陳之伏惟皇帝春秋尚富太皇太后深處九重豈嘗習聞軍旅之事萬一寇兵犯塞調撥兵應接不暇或恐震驚上心焦勞聖慮此兵之不可不息一也自靈州之役永洛之敗關陜之力凋耗士風未復今若再興大役必有失律違命散而為盜賊者外虞方作內患又起臣恐朝廷之憂不在夏國此兵之不可不息二也綿地千里屯兵數十萬必藉沈謀重望之臣為之統御忠義英勇之將出當戰鬪幹事宣力之臣促辦錢糧厯數見在之臣復推近事之驗恐未足以充此任者又器械皆捐弃之餘帑庾有乏絶之憂此兵之不可不息三也先帝以秉常受朝廷爵命而圖安擅行囚廢故發兵問罪今梁氏巳死秉常復位所為恭順有蕃臣之禮若復其故地則神宗問罪之名不為虛語嗣皇賜地之意實成先志此地之不可不弃一也朝廷自得熙河之地嵗費緡錢五六百萬以上所得愈多所費愈廣拓地之無利亦巳明矣此地之不可不弃二也議者或以為蘭州趨夏人巢穴至近最為形勝自餘亦有要害可以增置城壁弃之非便陛下欲再興師旅收復靈夏之地則存之可也若無此意勞人費財以奉空虗之地則是又添一熙河也陛下以清淨為心仁惠為政竊恐此事不當更興於今日此地之不可不弃三也遼夏二國世有婚姻且有脣齒之勢萬一遼國移書援先帝興師之意以梁氏死秉常復位為其請所失之地則先得我之義理而奪我之機㑹矣此時朝廷欲與地則是聽遼國之命而恩歸於彼若不與則是彰先帝之過虧大國之信而邉患復興矣此地之不可不弃四也中國之所以為可貴者為有禮義恩信也異域之可賤者以其多欲寡信也今操可貴以臨所賤則中國尊與其所欲以成吾所不欲則逺人服此地之不可不弃五也臣聞古公亶父居邠為敵國所攻欲得地與民民皆怒欲戰古公不忍乃去邠而居於岐山之下邠人舉國扶攜老弱從公於岐山之下旁國聞古公行仁亦多歸之古公周之先也其後世因其仁愛得民至於文武遂有天下今乃奪人之地又欲殺人之父兄而守之與古公異矣陛下試計修德行仁之效與用兵拓地之利孰為多少誠能於此時特降明詔盡以向者所得之地賜還夏國則其君長荷陛下之恩意人民感朝廷之惠澤至於鄰敵聞中國之行仁政吾民與兵知人主之惜民命其歡欣之聲戴荷之心將有甚焉伏惟陛下鑒古公之修德亮愚臣之忠計發自誠心斷而行之臣料不獨夷狄感悅上天鑒德助順亦且福祐無疆矣書曰惟德動天又曰至諴感神矧兹有苖此皆前代帝王行之巳有成效願陛下勿疑若夫計巳往之費吝難保之地耗金帛動兵甲以爭不可知之勝負而且有後患皆世俗之常談豈足為陛下道哉維又乞息兵棄地劄子曰臣近具奏聞陳論兵之不可不息者三地之不可不棄者五利害甚明極有義理竊恐邉防之機陛下或未盡經聖慮乃不避喋喋再有陳述且思當今所宜無出此䇿碩陛下詳覽而深思之若爭地用兵則向後患禍不可知矣陛下若發誠心以息兵愛民為意自足以動天感人亦不須待其來請地然後賜之也又古人以大度待逺人但當自計利害不當與之校也臣竊謂朝廷今日未是用兵勞人之時前代聖王屈於逺人非一皆是此意今之所處義理甚高非有屈也又臣今所言須及時為之乃可若夏國興兵來犯塞北敵貽書為請地則失我機㑹不可用矣古人修德行仁不計一時利害何則修德行仁之功大世俗所計利害小相去如天地之逺又臣此䇿可以實先帝問罪之意廣陛下行仁之德內慰士民之心外消逺人之患碩聖意速行天下幸甚司諌王岩叟論西人請地狀奏曰臣纍月前嘗上疏論天下之大害曰莫如熙河蘭㑹之坐弊中國碩陛下早圖之今聞西人入朝以請地為事陛下念生靈安樂逺久之計深以此事屬謀國大臣而聞大臣議論參差無一定之䇿竊度聖心惑之未有以處臣以謂聽言之道必以事觀之則一言可決國家未開拓以前唯以信義為重外國之心不敢輕侮故邉患少邉患少故民力紓民力紓故人心安人心安故兵威彊兵威彊所以能制外國而不坐弊中國開拓以來以有限之財供無窮之費以無窮之費貪無用之地國力已困而不可支人心巳危而不可保兵威已沮而不可恃於此時當修復信義為天下休息計豈可固執更增後日之患也昔漢桑𢎞羊輩請田輪臺之田以威西國武帝下詔深陳既往之悔曰前有司奏請欲益民賦三十助邉用是重困老弱孤獨也今又請逺田輪臺是擾勞天下非所以愛民也今朕不忍聞乃封丞相田千秋為富民侯以明休息富養也今議者欲請留蘭臯而田之何以異此惟陛下鑒武帝之所以悔於終者早悔之幸甚至宣帝時魏相請罷車師之田元帝時賈捐之請弃朱崖郡唐相狄仁傑亦請弃四鎮立斛瑟羅為可汗又請弃安東却立高氏李德裕亦請勿保安西是數人皆一時之賢豈不為國家惜威靈重弃其地哉蓋不欲貪外耗內疲竭生靈狗虛名受實弊遺國家之患也今窮荒之地于國家之勢不以得為强不以失為弱識者皆曰去大患以自全乃所以强耳夫得地不如養民防人不如守已今因其有請而與之足以示懷柔之恩結和平之信又失此時後日兵連禍結中國厭苦而為腹心之患陛下雖欲舉而弃之將不能矣臣度議者不過曰十餘年間竭天下之力而得之寧忍一旦弃之乎此不知經逺者之論也夫巳耗之民財已傷之民命既非悔可追矣而後日之患猶不處之於今則當何時而已耶又不過曰恐啓無厭之求益生邉患不如勿與此不知自處者之慮也夫彼求者無名則我報者有辭無名之求勢當自屈且彼雖異域既巳與之寧不知恩尚何無厭之請耶若有恩以結之猶恐其來則無恩以與之將如何哉臣聞開邉之初其費不可以數言罷兵之後嵗嵗常費猶不減數百萬一有騷動其將奈何陛下須念此皆出於中原生靈膏血夫中原者陛下據之以制四逺者也而以生靈膏血塗窮荒不毛之地欲為垂世長久之計豈不誤哉此事萬萬無可疑惟陛下留神早賜睿斷天下幸甚元祐中殿中侍御史吕陶乞早定蘭㑹議上疏曰臣聞朝廷之安危不繫於疆土之廣狹中國之盛衰不在于逺人之違順取與守難易不同其術內與外輕重各異其宜知守之為難則不敢易於所取知內之為重則不忍輕以事外此得失成敗之機也昔之聖人大有為於天下者莫不欲震耀皇武以威四逺空其巢穴絶其種類使之竄伏奔走而惟令之從其規模權略豈非恢宏深逺哉然天下之勢或至於不能成者此雖可為後世惜亦可為後世利也臣恭聞太祖皇帝嘗出幽州圖以示趙普普對曰此必曹翰所為翰往必可得幽州然陛下既得幽州則以何人代翰太祖於是默然持圖歸內臣又聞太宗皇帝太平興國中既平汾晉車駕遂北征欲乘勝取范陽王師所至皆克捷降者亦衆竟以士卒疲頓轉輸回逺乃班師而歸雍熙中又嘗詔欲親征㑹有岐溝之敗而止夫以二聖之睿謀英算徘徊指顧而四海混合豈獨一幽州而不能取哉蓋不欲以大定之天下而耗其力以事一方也恭惟神宗皇帝聖智高廣有削平敵國之志既取熙河又復蘭㑹方將一舉而滅西夏不幸弃四海矣則今日之計固宜權其輕重審其難易而決其豫奪也夫元元之疲瘵可謂甚矣陛下深知其然加意惠飬仁澤流行非特一事夙夜焦勞既勤且至然而邉鄙有深憂國家有大費則生民何時休息哉所謂蘭州定西城龕谷寨者久在封域之外一旦取而有之地不可耕而食人不可收而使廢垣頽壘如狐兔之穴輦金帛以具版築而郡縣力困於饋挽驅士卒以嚴戍守而肝腦或至於塗地今日運鏹數百乘明日致粟數百鍾然後有纍月之用環而視之則帑廪又空矣平居無事一嵗之費凡二百萬緡烽候忽驚安可勝計坐耗中國莫甚於斯如火銷膏不自知覺非朝廷之福也臣嘗觀有唐之盛其君臣不勤逺略不賞邉功者蓋不欲使國家掠虛名而生民受實害爾儻得無用之地終則捨之或因而封其酋長俾之自守請舉一二以明之太宗既擒頡利剖其故地置都督以統之擢酋長為郎將者五百人又嘗克平九姓册李思摩為可汗使率所部建牙於河北又嘗以鐵勒回紇等十三部內附遂置六府七州各以酋帥為都督刺史蓋叛則誅之服則懷之得推亡固存之義無費財勞人之役何必利其土地然後為勝哉魏鄭公褚遂良溫彥博狄仁傑輩皆持此議莫不欲肥中國而綏生民也以今天下民力凋弊之後太母垂簾保祐聖君措置萬事尤宜安靜以享太平之福彼窮邉荒徼無用之地固當割弃以賜其酋長如唐故事因而封之一則全恩信懷柔之體二則息饋運轉輸之勞三則免攻戰死亡之憂朝廷大利莫過於此然則大臣之議遲遲而不決者必曰先帝神武聖機有鞭笞四逺之意復數百年陷沒之地其功可謂大矣今輒弃之無乃隳大功損盛德乎臣愚竊謂不然夫中國之待逺人惟恩威二柄而已方其未服則威以屈其力及其既從則恩以懷其心於是取與之權我嘗兩得於內而逆順之勢彼不能逃乎其外先帝昔取之者威也故其力屈陛下今與之者恩也故其心懷然則何纍於功德哉亦足以成先帝之志矣向日大臣不能堅守誓書沮折敵使乃捨緣邉數百里襟要之地而與北敵矣豈數百里之襟要則可捐而數城之孤虛則不可弃乎且彼數百里者存之未有損去之未有益而遂去之此一州二寨者去之則為利存之則為害而反存之又非通論也況守之與弃義不相須可與不可一歸於必有必可守之䇿然後有必不可弃之理今一州二寨之地久陷異域一日復歸於我則事將至於必爭爭則有勝負是未可必守也處未必可守之勢持必不可弃之論臣恐異時之悔有甚於今日矣昔貞觀既平髙昌披其地為郡縣號西昌州魏鄭公諫以謂不出十年隴右且空既而置安西都護府調兵徙罪人以戍褚遂良諫以謂宜擇髙昌可立者立之召其首領悉還本土書皆不報其後突厥寇西州太宗悔不用褚魏之計抑可為今日監也臣願陛下參酌古今之迹早決蘭州之議無使重困生民久生邉患則天下幸甚諫議大夫范純仁乞誅果莊狀曰臣近日親聞宣諭欲留果莊在邉以招其子臣等奏對不若且令到京再䝉德音三省密院且更商量止鬼章於㳂路所到處别聼指揮臣有管見巳曽録與文彥博巳下看詳亦合上瀆聖聰具畫一條件如左一朝廷獲罪人若畏其子弟之强防其讎嫌而不誅則典刑廢矣如梁乙逋之輩假設獲之若有强子弟則亦將費豢養矣若止欲存果莊而招其子則有逐件利害一若存果莊以招其子必曰我父之存由我輩在我若皆往則父子俱死如此固無束身歸朝之理若使復統部族效力伸報則果莊常宜存在忽然死亡則適足為其怨叛之資却貽後日之患一果莊本非君長止緣誘殺景思立而覆其軍干犯先朝罪大而告于裕陵設若留之有用尚恐不快神明之怒今留之無益則告陵之典乃是虗行一果莊今巳七十餘嵗設使可系其子之心亦無多日況更囚處異鄉憂愁寂寞其死朝夕可待既死之後其子必却歸怨朝廷雖諭以善終亦必不信兼是解紛向罪人之子深損朝廷威重若任其疑怪則彼必曰既誤我降而殺我父則將怨叛有名一存果莊若不稍使寬足則必無聊而死若使之寬足則戰士當星霜矢石之苦皆有不如之歎一果莊自先朝以來前後殺害中國兵將畨漢人民萬數極多死者寃憤莫伸其家孤寡窮獨之人恨不臠食其肉今得朝廷生獲日望藁街之戮以快存殁之寃而得存養供飼過於有功之人徒使激憤幽明有傷和氣一朝廷賞功雖不繫果莊存歿然用命死戰之人見朝廷將其所獲怒而誅之則其心喜快若釋而飬之則其心憤鬱今大寇未平尤當體察將士之情一果莊之獲本由熙河蕃將怨其害巳故對遊師雄憤怒請行今既冒死獲之使其不得甘心亦恐惰其鬪志一交趾方欲妄起事端若果莊戮於京師則四方易得傳聞交人亦將寢謀兼使其他邉人尊畏中國一阿里庫見令嘉勒沁來求果莊俟得然後納貢若存果莊近邉不惟阿里庫以不如所請遷延為名未肯納貢兼其詞巳曰果莊在漢在邉一般若今留之在邉厚加奉養恤其羸瘠則正行阿里庫之言彼將市恩於果莊之子何暇復感朝廷哉一誅果莊則上可伸先帝之怒其次可正朝廷之法使逺人知畏又其次可雪踏白南川之讎增戰士之勇快人神之憤又可使阿里庫知朝廷果於誅惡不敢侮慢邀求早肯納貢此一舉而數利從之也純仁為尚書右僕射論不當許阿里庫與果莊相見疏曰臣竊見昨日文彥博與樞密院堅欲令阿里庫來使與果莊相見欲其子結斡磋得知父在審實可以繫纍其心臣愚以為不然果莊是西蕃驍將身繫其國輕重未擒之前敢與中國相抗既擒之後遂便狼狽納欵則其要藉果莊灼然可見然其謝罪之始既已推過本人雖與劉舜卿蕃字中曽乞放還未敢便於朝廷陳請今若得與其使相見其心必猜朝廷别有意謂歸國却須生心或請放果莊歸國如夏國乞還城寨之類至時必須堅拒却致嫌怨復生若更於不與之間忽然病死則必謂朝廷因其請而殺之尤可為阿里庫舉兵之名則是今日使見未必為利適足為他日之害也又況大國舉動當使逺方難測使其知存足以示恩使其知亡不能生怨今區區欲恱其子悉使見我之情恐生輕慢之心亦似有虧大體若陛下以大臣之言須至依從則乞候將來常貢之使因事漸通消息則亦足以使知陛下容貸之恩伏望聖慈更將臣言子細審詳庶於幾事無害果莊就擒已久彼國自已絶望故於納欵蕃字之內一切歸罪果莊若却使之相見深恐復生覬望之心結斡磋等既知朝廷顯示其父必以得見為期後若不遂其心而死却恐嫌隙再生更乞聖意深加詳察純仁又論不當授果莊陪戎校尉疏曰果莊自先朝作過陷沒將卒最多近日南川之圍殺害邉人亦衆百里之地為之一空邉人素重怨讎發憤往報偶得擒獲昭告裕陵阿里庫失其强臣亦便納欵既釋先朝宿憤亦快天下人心陛下曲示至慈特貸其死足使族類懷感巳是國家權宜今更命之以官於事却恐過當伏惟陛下視民如子賞罰至公今殺匹夫者必就大刑殺衆人者乃獲爵位不惟刑賞倒置有紊典常兼恐被害之家寃憤難訴人情天道兩皆有違伏望聖慈特以臣言子細詳察又言果莊曽授團練使仍賜金帶尚自不顧恩義謀叛殺害邉人今一校尉何足以收其子心若朝廷久逺要與一官可俟他日不必太速以違人心兼已具劄子奏入昨日同樞密院進呈依巳得㫖與官則恐臣言未能上動天聽臣以備位宰執叨預朝廷國之刑賞尤當盡心竊緣果莊俘獻之日親受聖㫖令招喚其子歸漢或納質之時與貸生命後來果莊並不曽肯依詔㫖寫蕃字招喚口稱我惟一死如此悖慢違命朝廷尚貸其死巳是優恩今更與官恐傷信令所有樞密院關到聖㫖未敢施行兼劉舜卿回報溫希沁文字正用果莊曽陷邉將及昨來犯邉且歸罪果莊圗得不見阿里庫罪過為解今却與果莊官爵即是今來朝廷不以為果莊之罪不唯赦阿里庫無名兼使邉臣失辭令後難為應答又欲使阿里庫人使略見果莊止欲使知生存審實今既有文字來乞則是彼國已知果莊之存今來人使自亦不消使見却恐誘引别生覬望勘㑹捉到西蕃大首領果莊昨引見日奉聖㫖候親書蕃字招喚得結斡磋等歸漢或納質時與貸生命仍免囚禁令於茶場安下其果莊後來雖寫到蕃字到熙州及阿里庫亦遣使詣闕謝罪兼朝廷已降回詔訖乞賜詳察龍圖閣直學士判慶州范純粹乞不妄動以觀成敗之變奏曰臣准樞密院劄子諸路探報自秉常身死梁氏族人侵擅國事遂致諸部酋豪往往不伏變亂交攻日相屠害雖不住據逐處奏報終未見的確事情緣自來賊中事宜多是歸順人口通說事必真實慮兩界近上酋首因此變亂離析各懷去就或欲據元有州城自守遙託朝廷應援或欲率其部族直謀歸漢願為近塞藩籬若從而開納即慮展轉生事難保成功若一切拒之又慮反為他國所有為國患轉甚未審於當今邉情合如何處置致不失事機右三省同奉聖㫖令河東鄜延環慶涇原秦鳯熙河蘭㑹路帥臣密切指揮㳂邉官吏若有投來西人如審驗得委知次第即仰相度可否收留仍更切厚與賞物募人逺探所有西界首領若謀歸嚮中國仰詳前項所問各以目今邉情向去利害縷細詳究措置條畫實封入急遞聞奏親自收掌不得下司今劄付臣准此右臣除已依朝命施行外伏詳詔㫖所問蓋邉防機事而繫中外安危之本者如臣之愚顧何足以語此然臣蚤膺任使久在邉陲採托審料粗若有得伏見陜西諸路邉防自元豐用兵之後未即解嚴乃者秉常失職諸酋並奮相與吞噬未有寧日方其自顧之不暇尚能為中國患耶在朝廷正宜安不妄動用觀成敗之變今詔㫖以謂近上酋首或欲據元有州城自守遙託朝廷應援夫外裔輾轉飄忽盛衰無常先王列於荒服之外弃而不擾縻而弗絶御戎之䇿無以過此今彼酋豪於變亂艱危之時欲以內附為名而請朝廷為應援茍可而許之臣不知一日急難有請則朝廷將真應而援之乎應援之舉名正而理勝乎邉兵之衆樂援而恱行乎不為之援則害大信乎凡此數者皆不可不慮也聖朝方以安靜治天下息兵止殺重農務本太平之迹始於今日尚何此䇿之議哉又詔㫖以謂或欲率其部族直謀歸漢願為藩籬昔漢武帝時降戎數萬仰給縣官天子出御府禁藏以贍之後日之害大不可救是知邊境為欵附之名則中國受勞弊之實也今㳂邉諸路自元豐以來所納降羌無慮二萬口而老稚無用者十有七八增耗邉廩為害已大其心之向背未可知故平日間有引而去者則警急之際安知其非謀也然則降羌之無益中國亦已明矣況彼之存亡興衰有未可知者異時彼事既定復有君長必曰前日某部某族某人之亡歸中國者我國叛人也奈何受之我今請之則朝廷將若為處乎豈不理屈而勢沮乎此又不可不慮也或謂彼既附我奈何不受何辭以却之臣以謂不然彼之部酋若有以梁氏之禍來告者若請兵於朝廷者若據地而願附者若挺身以降者朝廷當使邉臣諭之曰若主不幸爾乃臣子當盡死節之義善為若主討賊而巳尚何來告耶何但欲脫身而內附耶我之邉兵方備他盜耳不為爾捕寇也夫如是則中國豈不甚尊而名體豈不甚正乎如此則彼於異時必曰我變亂患禍之中朝廷不乘我之不幸而存我有德接我有道尚得志而負之乎夫如是則朝廷之義豈不甚勝而彼之德我豈不甚重歟又詔㫖以謂若一切拒之慮為他國所有臣觀戎人之性以種族為貴賤故部酋之死其後世之繼襲者雖稚弱之子亦足以服老長之衆何哉風俗然也唯秉常父子有國綿久國人歸心焉今諸路諜者之言雖曰秉常之死不明梁氏之族侵擅國事此特目今之勢然耳若謂遂能滅李氏之宗而有其國則臣未之信也蓋一國之衆豈無豪傑推李氏族子以繼後者乎豈遂甘心為梁氏屬乎臣以謂借使李氏遂有絶滅之禍尚當爭奪反覆屠戮相仍曠日持久然後定也夫困獸猶鬪者冀其或生也彼有力者方互為爭奪各將以衆自守乘隙而奮觀釁而動大必并小强必吞弱縱未敢統一諸部豈不據一隅以自全固願束手為他國虜乎臣知他國未能遽有者斷可識也借有亡命避患而他附者不過逋逃之餘種耳顧何足道哉夫外敵相吞并者中國之利也若天祐聖世遂使此羌卒至離析凡力等而勢均者各據土地自為一部則於時庶幾有思附大國者矣雖然大河之南橫山之地必附于中國大河之北賀蘭之封必附于契丹酒泉武威之地必牽於西域蓋勢力逺邇之異也昔呼韓裂為五單于丐奴分南北庭自是漢之邉候遂無匹馬之蹤我之所利正願如此故臣所謂在朝廷今日唯安不妄動用觀成敗之變者蓋謂此也夫中國者禮義之所由出也臣願朝廷靜占往鑒處以禮義參稽古昔無蹈後患深敕諸邉將吏使積粟養士勵兵戒嚴從容無為坐觀其變應夏國酋領及部族生口有欲歸漢者並依前降詔㫖一切約回決無收受以全中國尊大之體以破邊人反覆之謀如此則詔㫖所謂目今邉情向去利害者臣愚妄意竊以為盡之矣若夫一得一失小利小權私已喜功為國生事者非臣所知也伏惟聖慈特賜省察五年純粹為環慶路安撫使論息兵失於欲速疏曰臣伏見熙延兩路與夏國所劃封疆至今未決外議謂朝廷務在息兵失於欲速故狂寇要索日益滋彰雖聖朝懷來四逺固為上䇿若邉臣不究利害但務委隨則國體事機不無虧失何以言之二聖臨御之始夏人來朝繼而秉常計衰乾順嗣立使者往返五六賈販貿易隨巳豐富雖修好甚恭蓋亦為自資之計耳在朝廷固宜開納容彼自新然于處畫土疆未經決議當徐觀向背以察姦謀而朝廷即遣使人往加封册欲速之意為賊所窺果致侮慢使人不即稱謝起兵入寇延渭被殘反覆不恭宜在誅絶後日復有所請但可一委邉臣與之要約示以閒暇使望望焉唯恐朝廷之拒而不納也則輕重之權豈不在我乎所謂要約者凡疆界之地與夫後日之可慮者皆當條畫具盡必使異日莫得而變也事既審決邉人始以謝罪請盟之狀聞於朝廷然後明詔中外貸其既往之罪聽其乞盟之請歸吾陷賊之人賜汝既許之地如是則朝廷之體豈不甚尊而制寇之䇿豈不甚簡歟昨不為此計而聞其有請即許造朝此又欲速之意為賊所窺者也使人既至朝廷凡朝夕議論往復酬對寧不知皆廟堂謀臣之言乎是顧接太重而許可太輕此又欲速之意為賊所窺者也朝廷既許以陷敵之衆易新造之壘人有品色多寡之異地有形勢逺邇之差約當素明謀當素定定必皆著見於書然後受人割地兩相付與而彼尚何能為乎今謀不素定約不素明彼以疲殘百餘人塞命而已我乃不復較問亟以四壘付之則彼計固已行矣聞四壘付之即已平徹而熙延二境始議畫疆固不晚乎欲速至是其理固然外議但見朝廷旌賞邉臣竊意朝廷謂事巳平無足慮者豈以其目今貢奉不爽謂其無事乎彼貢奉不爽者是覆為賈販計耳恐不足恃也前日事之已然者固不可追今日事之可為者若審計而徐圖之未晚也如聞夏賊於塞門金城之地重有邀求之請聲言與西鄰為合從之謀將以動我外議恐朝廷不以為重而輕弃之信如是則欲速亦已甚矣朝廷所以謂金城塞門為不可弃者非以兩孤壘之為利也謂其形勢險阻足以藩籬邉徼土田沃壤足以贍給邉兵也利害所繫他壘莫比故獨不在給賜之限今畫疆之議乃欲茍目前之小休弃形勢之要地舍數千户巳耕之土斷數百里斥堠之衝屏蔽無餘出門遇敵道路梗塞運餉難虞孤壘僅存我將安用譬猶欲保一身而捐去四體是大不可也然則前日詔㫖所不豫之地徒虗名耳且彼之所求我必與之臣不知真足以厭其所欲而不為他日之患乎失要害之地濟無厭之求虧國體勢墮賊計謀飬虎開端不可不謹臣伏思邉隅設誓逮今十有餘年不為不久也朝廷不惜十年之費不憚十年之勞而務為堅守者何哉為形勢人民惜也今日之議信如所傳是能久而不能近也前日諸路大舉雖覆巢之計尚能為之今安以待敵而屑就如此是能大而不能小也能大而不能小能久而不能近棄前功於垂成開後艱於不測臣竊為朝廷惜之臣願朝廷舍其淺近計於久長其所取豫並以元降詔書從事如其偃蹇置而不問但飭邉吏嚴備如昔希功造事則固所不可護邉待敵則宜無甚難以區區內亂之小羌尚能與中國久抗乎期以嵗年決可竟事在朝廷不惑而巳臣聞自陜以西議者靡不知此而莫有為朝廷言者是亦以出位為誡耳雖朝廷前此議論邉事專委鄜延他路邉臣無得干預而臣任忝帥寄職在論思今以所得衆人之論妄進狂說則亦未為出位也伏惟聖心採擇不勝大幸歷代名臣奏議卷三百四十五
