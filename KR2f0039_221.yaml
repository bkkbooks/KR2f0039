body:
  text: 歷代名臣奏議卷二十二百一明楊士竒等撰兵制宋哲宗即位初守門下侍郎司馬光乞罷將官上狀曰臣伏以州縣者百姓之根本長吏者州縣之根本根本危則枝葉何以得安故自古以來凡置州郡必嚴其武備設長吏必盛其侍衛非以重其權驕其人也乃所以安百姓衛朝廷也秦懲周室幹弱枝強之弊既滅六國以為天下不復用兵雖分三十六郡置郡守更以御史監之隳名城銷兵器束以竒法舉動施為皆不得自專是以陳勝吳廣以匹夫奮臂大呼郡縣莫能制多殺長吏以應之雖由其殘虐取亡亦守令無權無兵之所致也晉武帝平吳亦以為天下既一兵無所用悉去州郡兵陶璜山濤皆言州郡武備不可廢帝不聽及永寧以後盜賊群起州郡無備不能擒制天下遂大亂夫兵者所以威不軌而昭文德誰能去兵州縣無虞則國家安矣州縣不守則國家危矣臣竊見國朝以來置總管鈐轄都監監押為將帥之官凡州縣有兵馬者其長吏未嘗不兼同管轄蓋知州即一州之將知縣即一縣之將故也先帝欲征伐四夷患諸州兵官不精勤訓練士卒懈弛于是有建議者請分河北陜西河東京東京西等路諸軍若干人為一將别置將官使之專切訓練其逐州總管以下及知州知縣皆不得關預及有差使量留羸弱一軍及剩貟以充本州官白直及諸般差使其餘禁軍皆制在將官專事教閲臣愚以為職事修舉在於擇人不在設官茍得其人雖總管等皆能訓練士卒不得其人雖將官亦何所為况今之將官即嚮之為總管等者也豈為總管等則不能舉職為將官乃能舉職乎此徒變易其名無益事實非惟無益兼復有害凡設官分職當上下相維如身之使臂臂之使指紀綱乃立今為州縣長吏及總管等官而于所部士卒有不相統攝不得差使殆如路人者至于倉庫守宿街市巡邏亦皆乏人雖于條許差將下兵士而州縣不得直差須牒將官將官往往占護不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄哉又頃嵗以來自轉運使知州以下白直及迎送之人日朘月減出入導從大為蕭條供承荷擔有所不給觀望削弱無以威服吏民臣略舉目覩一事以證其餘西京城郭周數十里卑薄頽缺犬豕可踰又瀍洛二水交貫其中每夜諸門扃鐍雖嚴而灘流之際人皆可以平行往來其屬水南北巡檢下所管兵士除出軍外餘數不多通判以下諸官白直來往防送倉庫守宿街市巡邏盡出其間嚮者先帝違豫敕西京留守親詣嵩山起建道場其將下禁軍充白直者于條皆不得出城經宿所敢留者剩貟七八人而已西京天子别都也其守禦不固如此留守前宰相重官也其侍衛單寡如此況僻小州縣其守禦之備侍衛之衆可知矣萬一有凶狡之賊驅烏合之衆突入城邑或劫質戕賊長吏以焚燒廬舍殺掠吏民將何以制之哉此特天下太平之久習俗淳厚羣心安固敵不測虛實膽智怯弱故未敢為之耳豈可忽略謂之必無而不為之備哉今獨緣邉州軍城隍完固士卒衆多可以守禦自餘腹內州縣既無深溝髙城又乏士卒群盜猝至何以責其竭節守義不棄城竄匿或以酒食迎賊以甲兵獻賊斂民財以賂賊者乎群盜尚爾況外裔傾國大舉長驅而來者哉易曰君子安不忘危存不忘亡治不忘亂兵法曰不恃敵之不我犯恃我之不可犯國家豈可恃即目平寧晏然髙枕不以為慮謂其必不敢來乎臣愚以為河北陜西河東京東京西等路腹內州縣宜以漸候豐年農間之際委提點刑獄與本處長吏相度各修築所治之城州城稍髙縣城次之不必廣大所以然者髙則難踰小則易守故也其緣邉屯駐兵士遇春夏無事之際委經略安撫使與轉運使公共商量減放歸住營州軍或于內地就糧勿聽怯懦將帥多有虛占以自守衛其腹內軍量其大小緊慢大藩常留千餘人小州亦留數百人不得差發往别州軍見兵不足即行招添悉罷將官其逐州縣禁軍並委長吏與總管等官同共提舉教閲及諸多差使其有不能精勤致士卒懈弛者委提點刑獄常切按察聞奏嚴行責降仍令逐縣各選有勇力武藝之人充弓手以守衛城邑討捕盜賊其州縣吏所給白直迎送之人皆如嘉祐編敕以前之數如此力可以守然後遇寇盜之至責其棄城等罪而誅之彼亦甘心矣光又奏曰臣竊見先帝以契丹驕傲侵據漢唐故地有征伐開疆之志故置保甲今開封府界及河北陜西河東三路皆五日一教閲京東西兩路保甲養馬仍各置提舉官權任比監司既而有司各務張皇以希功賞其提舉官專護本局不顧他司事干保甲州縣皆不得關預管內百姓不得處治其巡檢指使保正保長競為侵擾蠶食無厭稍不如意擅行捶撻其保丁習于逰惰不復務農或自為劫掠或侵陵鄉里其本家耕種耘穫率皆妨廢供送不辦率斂無窮資産耗竭無以為生弱者流移四方壯者亡為盜賊行之數年先帝浸知其弊申敕州縣令保甲應有違犯并巡教官指使違法事件並許州縣覺察施行及陛下踐祚聽政首令京東西路保甲養馬並依元降年限收買其剩買過數目並以充次年之數又令開封府界三路團教已及半年經朝廷按閲者每月併教兩日未經按閲者併教三日陜西團教未及半年者每月兩次併教三日又令見教人身材弱小或久來疾病及本家止有一丁病患不堪營作并第五等已下地土不及二十畝者並許州縣保明提舉司審驗放免又令一縣不得放免過二分此皆聖澤矜寬民力于保甲勞費雖什減五六然保甲保馬向去點擇買養補填尚猶如舊其巡教指使保正保長名目猶在于所轄保甲恐不免須有陵逼侵漁其四時教閲雖減日數未免妨農臣愚以為此保甲若使之逐捕賊盜則近已有指揮巡檢縣尉及弓手兵級人數並令依保甲未上畨以前人數復置其保甲更不令管勾捕盜若使之攻討四夷則此皆畎畝白徒教閲雖熟未嘗見敵與敵人戰鬬必望風奔潰登極詔書戒敕邉吏令不得侵擾外界務要靜守疆場然則此保甲保馬的實有何所用徒令府界及五路農民不堪愁苦幸賴社稷之靈適值纍年豐稔猶流民甚多盜賊充斥若遇明道年之蝗康㝎年之旱至和年之水則其為國家大患豈可盡言近者群盜王沖乘保馬諸處行劫置保馬本欲逐盜今更為盜資又獲鹿縣保甲斫射毆傷提勾孫文巡檢張宗師以下陵上是乃大亂之源漸不可長凡保甲保馬有害無利天下之人莫不知之臣不知朝廷何憚而久不廢罷伏乞斷自聖志盡罷諸處保甲保正保長使歸農依舊置耆長壯丁巡捕盜賊户長催督稅賦其所養保馬揀擇勾收太僕寺量給價錢分配兩騏驥院坊監及諸軍召提舉官還朝其勾當公事巡檢指使並送吏部與合入差遣如此則開封府界及五路之民孰不歡呼鼓舞荷戴聖德若以保甲中武藝已成之人可惜使之歸農即乞令逐縣户數每五十户置弓手一人略依緣邉弓箭手法許蔭本户田二頃與免二稅或稅輕者與免若干石斗稅及户下諸般科役本户田不足聽蔭戚田務在優假使人勸慕然後召募本縣鄉村户有勇力武藝者投充弓手計即令保甲中有勇力武藝者必多願應募若一人缺額有二人以上爭投者即委本縣令佐揀試武藝髙強者充若見充弓手人有勇力武藝衰退許他人指名比較若勝于舊者即令充替如此則不須教閲武藝自然常得精熟一縣之中其勇壯者既充弓手其羸弱者雖使之為盜亦無能為患仍委本州及提點刑獄常切按察令佐有取捨不公者重加刑典若無人投名乞更議優法若尚召募不足即且于鄉村户上依舊雇人候有投名者即令充替若弓手數多即令分畨更互在縣祇應一年一替其餘各分定地分巡捕賊盜每獲賊勘得赦後住止及窩藏去處其本地分嚴行科責及令出賞錢與獲賊之人其賊發地分更不作三限科校只令捕賊給賞如此則賊發之處捕盜之人不復掩蔽住止窩藏之處捕盜人不肯庇匿盜賊無所容身自然稀少知陳州韓維上宣仁皇后論保甲馬曰臣竊聞陛下濬發德音斥宋用臣等出就外省罷其所領職事黜吳居厚使離本道責以掊剋擾民中外喧傳曉然知陛下憂國愛民之深意莫不欣悅相賀臣雖在哀戚之中不覺失聲歡呼然臣尚有愚懇不敢不盡以上聞臣竊恐議者以嗣君新即位且當循守父道三年無改此大不然伏惟太皇太后于大行皇帝為母儀于今上皇帝有祖母之尊此時稱制臨政蓋為社稷大計事有不便弛以利民考古相時理無不可臣以為萬一有敢為此論上惑天聽者若非姦人沮害聖政即是俗儒不識時變願陛下切勿聽之臣近去都下日嘗具奏陳陛下深察盜賊所起之原罷非業之令寬訓練之程蓋為保甲保馬發也何則農民以稼穡為生使之出錢市馬已非其願又守護灌飼素昧其方萬一死損復更償買昔時一馬直錢二三十千者今貴至百千矣農民如此未有已時愁歎之聲聞于道路近嵗保甲以築垣為場號為團教一丁在官訓練更須一丁供饋飲食家闕耕作身受勞苦不無怨懟夫使失業怨懟之人操兵習器為擊刺之事豈無可慮近者又聞京西保馬頗為群盜掠取換易乘騎如其外廄河北保甲漸亦作過陵暴良民州縣幾不能禁此患在耳目之前臣恐更易措置不可緩也且臣非謂國馬遂可不飬但官置監牧可矣非謂民兵遂可不教但于農隙一時訓練可矣孟子曰天時不如地利地利不如人和人和可勝天地可不務乎臣伏望太皇太后陛下更留聖慮詳酌施行左司諫朱光庭上奏曰臣伏見朝廷近降指揮河東陜西保甲自來年正月一日罷教只于冬三月輪畨教閲此誠安民之急務也內有兵器一節臣方自外來不知朝廷己未處置伏緣自教閲保甲以來兵器未嘗禁止今既許三時務農從事于耒耜田畝之間則兵器豈可依舊蓄于私家竊恐緩急有所資藉起而為盜為患不細欲望朝廷速行指揮三路保甲自罷教日將應教閲兵器不問官給自置並令納官為置庫如法收貯俟冬教日旋行給付教罷即復行拘收如官已拘收之後民間輒復私置者乞依法禁止施行所貴小人無所資藉亦銷弭盜賊之一端也臣又聞朝廷已降指揮州縣招置弓手今來保甲有事藝精熟之人欲乞充弓手其逐縣舊役弓手亦乞委令佐揀擇內有瘦軟者將應募保甲替換如是則弓手盡得強勇之人可以擒制盜賊如允所乞伏望聖慈早賜施行知慶州范純仁上奏曰臣伏覩進奏院狀報七月六日奉聖旨府界三路保甲自來年正月以後並罷團教止令每嵗農間月分依義勇舊法赴縣教閲一月所有差官置場準備軍器及教閲法式畨次按賞費用等仰樞密院取索會校措置條畫與三省同共立法取旨施行臣愚竊以先帝留神訓練保甲今已是纍年其間甚有人材武藝超出群衆者乞並給盤纏赴闕委殿前司揀閲其間人材事藝可及諸班者與等第于諸班至散直殿侍安排如不願者委逐路安撫都總管司合量材于敢勇效用或弓箭手軍貟十將內安排更不願者即于本鄉保甲守闕副都保正或依弓箭手例特置正副都頭指揮使都虞候都指揮使等階級及立定年限遷轉候至都指揮使與換近下班行則人人皆有進身之望有所顧藉不肯輕易犯法其間武藝尋常惰于作業者即委郡縣覺察仍許父母尊長陳告與刺充本土禁軍上可以增壯禁衛次可使強民有歸下可絶敗羣遊惰之人及免凶年飢嵗聚為寇盜如此則聖制曲盡久逺無弊兹古人所以慮事于未然弭患于未萌也天下幸甚純仁又上奏曰臣伏覩提舉保甲司牒準樞密院劄子指揮鈐束保甲子弟不令聚集飲博即遇間暇于本家閲習事藝竊緣保甲每月雖蒙指揮併教兩日或三日比之自來全少然未免往來聚集有妨農務蓋子弟慣入鎮市漸喜遊惰託以修葺弓弩箭器或期約同保私閲為名不肯專意生業官司及父兄終難鈐束覺察自古三時務農一時講武又曰皆于農隙以講事此古人不易之法所以東作西成得盡其力三年之食可足武藝不廢民力不窮三代興王同此道也蓋農事播種斂穫不可少有失時常若寇盜之至苟一日愆期或致終嵗之闕則職在勸農者所當申陳也臣亦欲乞應三路教閲保甲計一嵗合教日數并就農間之月其餘月分並歸農業則官司與父老易為拘管不唯農不失時亦因併教多日事藝必得精熟監察御史王岩叟上奏曰臣近以三路第四第五等保丁多貧乏乞依義勇舊法免冬教及畿內舊無義勇今亦乞罷保甲未蒙施行臣竊以道有弛張故法有損益不可以為常要在酌民之言因時之宜而損益之為國家長久之計耳臣見保甲之法陛下每損之則民心每加喜民心之加喜國計之益以為利也按義勇舊法三丁方取一丁而保甲兩丁便取其一比義勇立法為甚密而得兵為甚多臣今不敢請取丁如義勇但乞如義勇免下户冬教而已冬教雖免而姓名猶存于籍亟召則亟得非釋然放之也臣昨為民官每親見下户保丁赴團教不以習技為難而常以艱食為苦未嘗不疾首蹙頞以應一日之教況無衣無褐隆冬大寒當一月之久乎陛下推臣之言以觀其情之樂否也人情之所不樂而必為之非天下之所以望于陛下者也又畿內之民素倚京師以為重浸潰仁恩而安于無事自與保甲以來往往切切偶語曰三路教民固將緩急當護邉之用也我曹豈亦將驅而為此乎臣誠知國家無意至此徒使人心常疑而不自寧何益也議者皆以謂罷之便伏望陛下省臣前奏今去起教月分不逺早賜指揮施行以慰人心岩叟又乞廢罷保甲奏曰臣昨在河北為知縣親見保甲之患非止一端及蒙恩召為御史即詳具保甲利害條列劄子欲求面奏而未到闕間已承朝廷有指揮止令冬教一月暨臣赴臺供職適主兵察竊見新降保甲法尚存提舉教閲一司及改逐縣巡教官為監教官乃知朝廷未察所以為保甲之患者大本猶在臣須至以先所具到劄子上進仰冀陛下委曲知保甲之害蓋由提舉一司官屬不體朝廷之本心倚法用情奉行深刻所至百姓一聞其名自己疾首蹙頞無安樂意今雖曲為之防須亦别自生姦終恐為害不已伏望陛下深察民情廢提舉保甲一司及監教官但令州縣及安撫司主之使百姓安心于為生以樂聖政不勝幸甚若不罷提舉保甲司及逐縣監教官則是保甲無事之時猶遭脅制未免侵漁終年不減騷擾之患此朝廷不可不察也且一司官屬三路不下數百貟虛負廪祿亦非久逺可行之理今猶指揮自十月至正月分四畨教閲臣竊見民間十月場圃未終正月夫役將興農緒亦起此時教習未免有妨唯是分為兩畨于十一十二兩月教畢民情頗為利便不消分作四畨臣深曽體訪備得其情伏望朝廷更加詳度若罷提舉官司自于保甲都保不減在國家民兵之勢無所虧損又人人既得平居泰然以為生則國家一日用之必樂于為用伏乞陛下勿以為疑早發睿斷以安百姓如每年自京差指使往逐處同共監視教閲竊慮粗勇之人挾恃朝廷所差妄作氣勢搔擾生事只乞令安撫司差那使臣為便岩叟又論保甲之害奏曰臣竊以保甲之法行之纍年朝廷固已知人情之所共苦而前日下詔蠲疾病汰小弱釋第五等田不及二十畝者省一月之六教而為三日之併教甚大惠也然其司尚存其患終在今臣蒙恩由河北知縣擢置御史敢以其所目見而身自厯之者為陛下言不敢隱其實以欺朝廷亦不敢飾其事以罔成法惟陛下垂聽幸甚朝廷知教民以為兵而不知教之太苛而民不易堪知别為一司以總之而不知擾之太煩而民以生怨教之欲以為用也而使之至于怨則恐一日用之者不能如吾意矣不可不思也民之言曰教法之難不足以為苦也而羈縻之虐有甚焉羈縻不足以為苦也而鞭笞之酷有甚焉鞭笞不足以為苦也而誅求之無已有甚焉方耕而輟方耘而罷方幹而去此羈縻之所以為苦也其教也保長得笞之保正又笞之巡檢之指使與巡撿者又交撻之提舉司之指使與提舉司之幹當公事者又互鞭之提舉之官長又鞭之一有逃避縣令又鞭之人無聊生每相與言曰恨不死爾此鞭笞之為甚苦也創袍市巾買弓修箭添弦換包指治鞍轡蓋涼棚畫象法造隊牌緝牌架僦椅卓團典紙墨看廳人雇直均菜緡納秸粒之類其名百出不可勝數故其父老之諺曰兒曹空手不可以入教場非虛語也都副兩保正大小兩保長平居于家婚姻喪葬之問遺秋成夏熟絲麻榖麥之邀求遇于城市一飲一食之責望此迫于勢而不敢不致者也一不如意則以藝不應法為名而捶辱之無所不至又所謂巡檢者指使者多由此塗以出貪而冒法不顧後禍有踰于保正保長者此誅求之所以為甚苦也又有逐養子出贅壻再嫁其母而兄弟析居以求免者有毒其目斷其指炙烙其肌膚以自致于殘廢而求免者有盡室以逃而不歸者有委老弱于家而保丁自逃者保丁者逃則法當督其家出賞鈔十千以募之使其家有所出當未至于逃至于逃則困窮可知而督取十千何可以得故縣縣皆常有數十百家老弱嗟咨于道路哀訴于公庭如臣之愚且知不忍使陛下仁聖見之當何如也又保丁之外平户之家凡有一馬皆令借供逐場教騎終日馳驟往往至于飢羸殘壞而就斃誰復敢言或其主家偶因出處一誤借供遂有追呼笞責之害又或其家官逋督迫不得已而易之則有抑令還取之苦故人人以有馬為禍此皆提舉司官吏倚法以生事重為百姓之擾者也臣竊惟古者未嘗不教民以戰也而不聞其有此何則因人之情而為之法爾夫緣情以推法則愈久而愈行倚威以行令則愈嚴而愈悖此自然之理也獸窮則搏人窮則詐自古及今未有窮其下而能無危者也臣觀保甲一司上下官吏無毫髮愛百姓之意故百姓視其官司不啻虎狼積憤銜怨人人所同比者保丁執指使逐巡檢攻提舉司幹當官大獄相繼今猶未已雖民之愚顧豈忘父母妻子之愛而喜為犯上之惡以取禍哉蓋激之至于此極爾臣以謂蓄而益深安知其發有不甚于此者情狀如此不可不先事而處以保大體為安靜計夫三時務農一時講武先王之通制也臣愚以謂一月之間併教三日不若一嵗之終併教一月農事既畢無他用心自安于講武而無憾遂可罷提舉司廢巡教官一以𨽻州縣而俾逐路安撫司總之每俟冬教則安撫司旋擇教官分詣諸邑與令佐同教于城下一邑分畨當一月起發則與正長論階級罷教則與正長不相誰何而百姓獲優遊以治生無終年逃遁之苦無侵漁苛虐之患無爭陵犯上之惡矣且武事不廢威聲亦全豈不易而有功哉惟陛下深計逺慮斷在必行以省多事以為生靈安樂之惠以為國家安靜之福天下幸甚岩叟于元祐八年又乞保甲併用冬教奏曰臣伏見近降保甲畫一指揮仍舊逐嵗遣使按閲者竊敢為朝廷論其害臣每見使者所嚮其騎從之盛風聲之峻供億之繁承迎之厚郡縣為之騷然一小郡坊市户有旋染縑帛五六百匹為供張之具者推此一事其餘可知雖非使者使之如此則州郡望風畏憚不敢不然故所至人情甚以為害又其所按保下雖各得銀絹三五匹兩而備按閲飲食衣服之費自己不輕既得之為衆人耗蠧又亦不少所存以歸能有幾許臣深曽體問皆云若國家冬教使不失農時則家之所得自可有餘天恩深厚非一按閲賜賚之比也竊考其情蓋不以得一時之賞為足而以安終年之業為樂也況所謂賜賚者却秖是出于保丁人家所納錢數內耳所謂取諸其懷而與之割其肉而啖之孰若不取不割之為兩得也臣愚伏望聖慈因冬教以為恩罷逐年按閲之煩省役錢封樁之擾一以安靜養其力而舒其心斯民幸甚元祐元年右司諫蘇轍上奏曰臣聞薄賦斂散蓄聚若以致貧而民安其生盜賊不作縣官食租衣稅廪有餘粟帑有餘布久而不勝其富也厚賦斂奪民利若以致富而民所入有限所害無窮大者亡國小者致寇寇若一起盡所得之利不償所費之十一久而不勝其貧也臣未敢逺引陳勝吳廣龐勛黃巢之類只如淳化中李順慶歷中張海熙寧中廖恩此數火盜賊計其燔燒官寺劫掠倉庫以致發兵命將轉輸糧食耗失兵械募士賞功之費大率不下數百萬貫但得事了豈敢言費然方其未發有能建言乞捐數十萬貫以消其變則上下爭執如惜支體不肯割截此天下之大迷古今之通患也故臣願于元豐庫或內藏庫乞錢三十萬貫上以為先帝收恩于既往下以為社稷消患于未萌伏願陛下權禍福之重輕較得喪之多少斷而行之毋使有司吝于出納以害大計河北之民喜為剽劫所從來尚矣近嵗創為保甲驅之使離南畝教之使習凶器一夫在官一家資送窮苦無聊靡所不至椎埋為姦十人而九號為保甲莫敢誰何若更一年不罷則廣勝之事可立而待也今雖已罷而弓刀之手不可以復執鋤酒肉之口不可以復茹蔬既無所歸勢必為盜今河北寇賊成群訪聞皆是保甲餘黨若因之以飢饉則變故之作不可復知近嵗富弼知青州是時河北流民百萬轉徙京東弼既設方略振活其老幼而招其壯悍者為軍不待朝旨皆刺指揮二字其後皆為徑兵百萬之衆無一人為盜者弼為人臣便宜行事猶能若此況陛下富有四海而元豐及內庫錢物山積莫可計數只如近日內降睿思殿金銀一色令别庫收貯者自約及百餘萬貫皆是先帝多方收拾以備緩急支用不取于民聖算深逺非凡所及若積而不用則與東漢西園錢唐之瓊林大盈二庫何異于先帝聖德不為無損故臣願乞三十萬貫為招軍例物選文武臣寮有才幹者各一二人分往河北逐路于保甲中招其強勇精悍者為禁軍隨其人才以定軍分本州無闕則自近及逺或押上京不過一二萬人則河北豪傑略盡矣其間武藝絶倫舊日以補班行者押赴闕試驗有實以補內六班之闕或以補本貫及鄰近門額軍貟但當嚴賜指揮候了日當遣人覆按有不如法重坐官吏臣聞先帝本謂保甲可用欲隱兵于農以漸消正兵是以禁軍多有闕額今保甲既罷正使無事猶合補填況如前件所陳者惟陛下深察果斷而力行之轍又論京畿保甲冬教等事狀曰臣竊見仁宗朝河北河東初置義勇至英宗朝推行其法漸及陜西皆以地接邊陲有守禦之備每嵗冬教一月民雖以為勞而邉防之計有不得已及熙寧中更置保甲使京畿三路之民日夜教習二聖臨御知其不便率皆罷去民得歸秉耒耜盜賊因此衰息歌舞聖德無有窮已惟有冬教一月之法三路以被邉之故民習為常不敢辭訴至于京畿諸縣纍聖以來為輦轂所在素加優厚今乃與三路邉郡為比一例冬教情所未安伏乞聖慈深念根本之地所宜寬恤特與蠲免兼訪聞京畿三路見今皆修蓋冬教場屋宇州縣頗以為勞臣昔守官河北竊見義勇冬教並不置教場屋宇每遇教日皆權于係官屋宇及寺院等處安泊别無闕事朝廷若允臣所奏免畿內冬教則其教場屋宇已自不修如三路冬教乞下逐路監司相度只如目前權于係官屋宇及寺院等處安泊無有不便如别無不便亦乞罷修以寬民力四年尚書右丞王存上奏曰臣伏見范純仁劄子奏畿內保甲乞今後更不教閲臣竊詳先帝教閲畿內保甲思慮深矣蓋以京師之地四達而平非有重山峻嶺之險金城湯池之固所以維御四方威制敵國為根本之固者以宿衆營衛嚴也慶歷治平間禁廂之籍至百餘萬新城裏外連營相望其後論者以兵冗費廣供餽不給乃議併營裁決其後中外禁軍五十八萬為額而京師兵籍益削于是三路添籍民兵畿內亦置保甲四時教閲使人為勝兵平日不費縣官錢糧緩急得為武備此先帝之意也但當時教閲之法太密官吏之責太苛以此人情有所不安陛下即位之初罷三時之閲止冬間一教教閲條制事伎精熟者十日便放稍精熟者二十日生踈者止于一月每教至旬日往往放者太半如是災傷放稅五分又即權免此法既寬人情未有所害前此洊飢法當權免今嵗豐稔若遂不教即其法遂廢甚可惜也大率民兵之法創置則難放罷即易先帝不憚艱難而為之數年之間人既就緒一旦無故而廢之深為可惜臣非不知附會時論可以干百姓之譽但職任至此為國家長久之慮不敢默默耳伏望聖慈再三思慮不勝幸甚哲宗時陳次升奏曰臣訪聞河北路禁軍例多老病怯弱不任征役蓋招軍官司上下通同作弊或以老小為丁壯或以病患為強健招刺之後年甲具載兵籍每嵗揀選惟據籍點檢而已未嘗以籍考其年顔嵗數虛實是以老病者常多而強壯者常少徒費軍糧無濟于用況邉庭糧草最為難得禦戎備寇要在兵強今所養之兵既非可用倉卒之際恐致敗事此不可不慮也伏望聖慈嚴敕本路招軍官司今後所招兵士務要強壯的實年甲及責監司每嵗揀軍必以兵籍考其年甲顔貌若有不實即行按發無令老病怯弱之人虛占兵籍侵耗邉儲如敢依前不切用心揀選官當行重責庶使官吏知畏守禦有備天下幸甚畢仲遊上言曰為國者患在因喜事之人開進取之説而不知無以善其後或者乘已厭之機為可廢之論而不戒異日之非常二者循環相從迭為用舍可以資一時之策而非天下長久不易之道也傳曰天生五材民並用之廢一不可孔子亦曰足食足兵民信之矣則兵何可略略之則天寶之市人將復入于六軍之中矣老子曰兵者凶器不得已而用之而三代以來亂亡相尋鮮不以兵則兵何可長長之則蒙恬之役重興于後世故兵不可長亦不可略藏之于不用之地若無兵及其用則若雷霆風雨之驟至不知所從來者兵之道也蓋惟三代之時則有此兵矣昔周之兵寓于比閭族黨州鄉别于鄰里鄼鄙縣遂成于五兩卒旅至五師為軍之大法其不用也則為六鄉之民用之也則為六軍之衆而將之者又皆出于六鄉之吏故平日不知兵之所在而兵行則無敵于天下其後管仲相齊粗得三代之遺意亦分國為鄉寓軍于政比其居以軌里連鄉之法五家為軌故五人為伍而率之以軌長十軌為里故五十人為小戎而率之以里有司四里為連故二百人為卒而率之以連長十連為鄉故二千人為旅而率之以鄉良人五鄉一率故萬人為一軍有中軍之鼓有國子之鼓有髙子之鼓以教士三萬人亦橫行于諸侯之國管仲而下無足道者惟唐府兵之制無事則耕于野有事則出于征事辦輒罷兵散于府將歸于朝而天下無宿兵之費雖云三代之兵益逺亦略得管仲之遺意故猶足道本朝黥市人為卒賦斂齊民以養之齊民之力十耗其七八及其戰也才足以備行伍而不足以禽將破敵故神宗皇帝為伍保之法欲使民知戰而足以破敵禽虜也蓋聞太宗皇帝之北征獨取三晉之民得十萬衆命曰義軍而咸平亦詔陜西户出一丁以戍邉命曰保毅著于籍者至六萬八千則土兵之議亦不可以伍保為嫌而不講今若取天下户絶之産與官田棄地募人耕鑿蠲其賦役使家出一人以為兵户絶之産嵗嵗有之而有官田棄地開之則亦無窮其有中民之户丁多地少而願為兵者可益授以地略依唐府衛之制畨上宿衛或為州縣之守禦教之戰陳擊刺坐作進退之節耕于野者則春秋大閲而已勿重擾之久以嵗月則府衛之制漸復而營卒亦漸省以除天下之大費所謂非常者令下之日已可禁禦而十年之後將亦如三代之無敵李豸上竒正論曰臣聞天下之事有能以勝不能有術以勝無術皆有能矣能之精者又勝焉皆有術矣術之多者又勝焉借以羿與般而譬之羿善射般善工學射者有彀的善工者有規矩特其大略也般之所以巧又有巧焉故學羿之射既與羿之巧均則有勝羿之心焉必曰吾與乃技相若羿不勝其忿而鬬羿果相若則為羿之過失于盡其巧而傳之故卻視般之教示以巧而不盡其所以巧者誠為自勝之計也兵始于黃帝法成于太公黃帝而上兵未設以有兵勝無兵太公而上法未備以有法勝無法太公而後何其紛紛耶用兵者既頻學兵者既衆一定之法不足以相勝故管仲穰苴孫武吳起尉繚留侯孔明李靖之徒始出而論竒正竒正者因古以御時依體以立用千變萬化以制勝兵策用之之法可觀也而所以用之者不可見也戰之理可踰也而所以戰者不可陳也勝之道可制也而所以勝者不可傳也彼用兵之書布在方册既已人人皆可習矣用兵之法試于行陳既已人人皆能布矣人人皆習我亦習焉人人皆能我亦能焉是亦衆人也以衆人敵衆人尚何議先勝故竒正之理古人議而不辨竒正之法古人論而不議竒正之變古人存而不論非不論也不可論也不可論故不弊而常新以俟後世君子俾因襲致用可以神遇而不可以智知可以道運而不可以迹究法猶奕之局也兵猶奕之棊也竒正猶奕之智也智無一揆棊無定形觀其黑白不相容新故不相仍咫尺數路情狀萬變勝負得失在于一子然則竒正之形所以使敵人前後不相及衆寡不相待貴賤不相救上下不相扶亦一二䇿而已故四為正四為竒黃帝握機之文也一術為正一術為竒曹公新書之義也前向為正後卻為竒太宗所以勝宋老生也先合為正後出為竒曹公所以辨孫武也方為正圓為竒步為正騎為竒受于君者為正將所自出者為竒固曰妙矣然人既用之則為故智不足襲蹈何哉不惟黠慧者知之而愚者亦知之故當益為變化以出意外所謂形人而我無形致人而不致于人者非陳迹相沿而能勝也茍惟正此固亦粗矣能求竒正之義于意外古今幾人哉故學兵雖衆不足畏之誠以勝之又勝者猶在人也臣觀唐太宗與李靖論竒正之理所謂無不正無不竒又曰竒亦勝正亦勝善夫能知變通故其論左右逢原莫非竒正之變其言曰以竒為正以正為竒吾之竒使敵視之以為正吾之正使敵視之以為竒因其漢長于弩而蕃長于馬則為之法使馬亦有正弩亦有竒變其號而易其服也則為之法使蕃而示之以漢為竒漢而示之以蕃為竒方其陳之散也以合為竒方其陳之合也以散為竒觸類長之變而通之使竒正相生生生不窮竒正相變變變不測惟欲多方誤敵乖其所之豈復膠柱哉卻視孫子所謂以正合以竒勝猶為膠柱矣李靖論韓擒虎以謂但能識正為正竒為竒不知竒正之相變知竒正之相變者其知神之幾乎故早晏者天之隂陽左右者人之隂陽竒正者天人相變之隂陽相生也無窮如天地相因也無竭如江河相濟也終而復始如日月相成也死而復生如四時味止于五五味之變不可勝食聲止于五五聲之變不可勝聽色止于五五色之變不可勝視兵雖竒正竒正之變不可勝窮巧歷不能盡其數聖智不能極其端此之謂兵妙或曰竒正固有宜分合固有變如之何以訓偏裨如之何以教士卒臣曰簡其節目異其號令正為一法竒為一法或進或退各以何别或分或合各以何驗吾以號令使之號令所指變亦隨之既一吾之耳目又變敵之耳目兵惟知有號令不知為竒正車果何出騎果何來徒果何從敵人雖知吾有竒正不知竒正所在士卒雖為吾用知吾以竒正取勝不知竒正何先方料吾以正而吾忽以竒方意吾以竒而吾止以正不惟敵之不知而士卒亦莫之知孫子曰見勝不過衆人之所知非善之善也戰勝而天下曰善非善之善也知吾有制勝之形而不知吾所以制勝之形非善之善不足以與于此或曰竒正之情何如臣曰兵家之要貴我專而敵分為竒正者在我故專應竒正者在敵故分以知吾之有竒正也則備我備前則後寡備左則右寡備我者所以寡彼也無所不備者無所不寡也我專為一彼分為十以十擊一者也我專則安彼分則擾以安擊擾者也勝負之理不言可喻故能正不能竒守將也能竒不能正鬭將也守將可以用竒劫鬬將可以用正老能竒能正乃國之輔今夫以武為業動纍億萬鬭力勇而已鮮知兵之法學兵之法動纍數千分行陳而已鮮窮兵之理窮兵之理動纍數十分強弱而已鮮知竒正借或有人但能知竒為竒正為正而已鮮知竒正之變臣故曰兵法貴勝勝之所以勝以竒正法可傳而竒正不可傳學兵雖衆不足畏者以勝之所以勝者猶在人也或曰羊叔子之平吳也不為掩􅊞之計尅日而後戰奈何專論竒正哉臣曰乃所以為竒正也償禾縱俘歸禽饋藥竒正之用也懷其心逮祜死而王濬舟師東下一舉而俘其主夷其社孰知夫正在荆州而竒在益州耶兹竒正之大者也人君俾賢將之用竒正必若羊叔子則成功必大矣殿中侍御史吕陶奏曰自三代之衰井田破壞軍賦之法大變而兵農不一農不可使之為兵而兵不可復之為農天下始有養兵之弊而生民之力多耗于此其間有為之君善計之臣深思逺慮講求法制以救天下之弊而收其利宏規大略載于方册可得而見者不過開屯田置府兵使之無事則耕而食也今天下之兵猥過百萬養之之弊甚于前古而民力遂至大困天下之田皆耕而農夫無以食天下之桑皆蠶而織婦無以衣轉輸饋挽之勞及于上農而猶不給厚賦重斂而持之為定制山澤之利毫毛皆歸于公而無遺關征市榷類賈人之貪競而不知愧以交劑募商旅輸粟于邉而給之倍直國家財用日益窘生民日益困養兵之弊可謂極矣昔開元之初邉費嵗不過二百萬緡至天寶之末兵已失制大盜群起而費乃七倍乎元和長慶之際掎角之師犬牙雜處大都通邑無不有兵數猶未滿百萬賦租所入止可贍足其半今天下闢田雖廣計户雖多而兵籍又踰長慶之數濫恩寬惠積行而不可暴革平居無事衣食帑廪莫能少休賦稅貨幣之入用于軍者什嘗八九而猶不足豈特天寶之費哉如之何國用不窘而生民不困也欲為古之屯田乎則古之為屯者多減戰士以耕間田衆至于數萬而廣及于千里今之兵固不可驅而使之耕而昔之所謂屯田者抑亦堙廢而無幾其利不可一日而獲也欲復古之府兵乎則古之為府者皆出于民故不戰之時耕而自養今之兵既不可使之耕矣又安得而府哉其法不可一日而變也昔之所以救養兵之弊者莫大于此兩端語今之勢而皆不可驟用則養兵之敝果無以救矣竊嘗聞之有興利以除害有去害以就利為術不同而為功則一要在使天下蒙其利焉且夫欲興二利者以去養兵之害也今勢既不可而未能興則胡不反求其端而去其所以害者哉夫能去其害而使生民免于重困則天下孰不曰利矣今養兵之弊甚于前古者蓋兵多而費廣也兵多而費廣者召募之格濫而不程其武力也簡閲之法踈而疲病有未黜也死亡輒補而不敢不足也深惟藝祖受命之初國家之兵十有二萬東征西伐賴而成功及太宗皇帝削除僭叛中外混一始有三十餘萬之數章聖在御四海富殖欲強主威以制敵人之命故又增其籍至五六十萬自慶歷已來遂及百萬之冗此其衆寡可見昔祖宗之初屢有戰伐之事而兵少今安間固守而兵多者不獨精冗之異也蓋今三路師屯甚衆而四方郡縣出戍頗勞也師屯甚衆而出戍頗勞則其勢不得不濫募以完其數也疲病者未可遽出而死亡者宜輒補也夫勢有急緩而理有損益計今三路之兵不過四十萬固不可一日而闕至于四方之戍多止于千人而少才一二百扞禦之效未必可責而徒有往返之費臣愚以為諸非要害之地可少減其出戍夫出戍既減則兵不闕用兵不闕用則召募之格可以嚴而程其武力也簡閲之法可以精而疲病必黜也死亡者可以不盡補而無慮不足也三者相恭而要以數嵗則冗兵之去不亦多乎冗兵既去之多則徐觀其變而議所以應之然後可以定萬世之制也臣伏思國家患兵之冗而久未變易者懼其徒類大盛乘而亂生也茍以向之三説不變常不動衆而隂奪其勢何亂之為哉雖國家亦坐享其利而不之覺也然議者猶曰減四方之戍則武備弛廢非所以安郡縣矣斯又不然且生民之治亂不在于此也豈千兵之防百卒之聚而可以致郡縣之安歟顧朝廷臨撫之道何如耳陶又奏曰兵多而雜不如其少而精雜則弱精則強強則用之易以勝弱則用之易以敗此兵法之所辨而人情之共知也今天下方患兵之太多而國費不足以取濟故臣為説以獻欲隂奪其勢而稍稍汰之三説既行而冗兵盡汰則天下之兵皆可以精乎臣愚亦知其未能然也彼三説者可以去冗食而未可得精兵也夫精兵生于去冗冗食既去而兵未能精者何也御之失其道也御之失其道者姑息有餘而講練不足也姑息有餘則驕講練不足則惰既驕且惰非去冗之可救也夫凶悍不義之徒凡數十萬成軍著籍目曰禁旅聚之京師三輔以為擁衛散之四方郡縣以為屯守此天子所恃以安敵人所望而畏寇盜所知而息者也然而天下久無事法度弛廢國威不申士氣不振溫衣飽食竭民之膏血而自謂宜然濫恩橫賚動踰紀極而不能厭滿其意悖慢之態日益滋長而上下恬不為異平居終日搖搖然惟賜與之望不幸有非常之事則羣聚而議賞典之厚薄小慊于心則出不遜語以駭惑衆聽其甚者至以禋燎之賜物估過重而起犯州吏大率知可愛之恩不知可畏之法有偷生之色無敢死之氣雖四時閲習以預戒先備而紀律不甚嚴明器用不甚堅鋭坐作進退之節有類嬉戲特文具而事舉耳非所以感動鬭志而奮揚天威也以之衛天子則不可恃以為安以之制敵人則不畏以之捍寇盜則不息卒有一日之警而驅以掃蕩羣醜斬刈蓬蒿其可望成功乎臣故曰御之失其道也昔唐之章武誅削僭叛以強國勢元和之際謂中興矣而穆宗嗣立暗于御兵之道務以姑息為本即政之始傾竭府庫以賞士卒雖人獲巨萬而橫賜猶不敢已是故軍旅益驕法令益失姦臣悍將迭乘其危而唐祚遂底于亡及夫後唐之莊宗亦以豪雄蓋世之才南嚮而圗中原僅得天下之半然而不知御兵之道失于禁戢每田獵近郊衛士有丐恩賞者必如所欲以給之是以賞賚不節威令不行而卒至于亂由此言之則御兵之道豈不難乎有兵而不能御者不可適用而可以召亂也方安間無事之時詳計密慮而執其至要則遽急有為之際豈涉于顛危哉昔我祖宗皆以睿謀英略禦遏四海險暴之萌而立成富強不拔之勢深知兵旅之事而善御以權術不以噢咻為恩而人皆有戴惠之心不以暴怒為威而人皆有畏罪之意何則恩無常得而威有不測以加也法制案定而偹預謹嚴也川班訴賞則誅之索求凶迹而鉗錮踰年也侍衛將校雖領刺史有罪則杖降仕伍以任力役諸軍不逞者籍為四等分而徙之雖賜赦不宥也大講近郊親閲便殿者嵗月率常也較擊刺騎射之藝而黜其無勇也取禁兵之伉健為親軍而以罷軟補郡卒也選氣質端謹勇而知禮者訓以挽強而弧矢之利竒異驚聽也拳勇絶技皆籍記之而以次遷用也陛下神聖明斷有祖宗之風而思社稷之大計則御兵之道固宜祇憲先烈而奉循故事也選將帥提法令而授之節濫恩以寬生民之力峻罪典以完固主威萬政之餘留神講練間集六師閲試武力進能退否以立軍政則天下驕惰之兵聳動警懼而百倍其氣天聲可以薄四海而異域不能窺中國之隙豈不偉哉陶又曰天下之兵精而不驕則中國之武備完矣安得良將而付之邪國之無良將久矣豈真無其材乎四海九州之廣大謀臣猛士之衆多髙爵重祿養而用者紛紛于天下智信忠義可以捍社稷之難剛毅勇果可以致身而死節蓋有之耳惟國家任之未得其道而志有所不申才有所不盡功有所不成也古者因井田以制軍賦兵出于農而將出于六鄉之大夫所主之兵皆其鄉之民而所附之將乃其鄉之吏居處相安動作相應禍福相濟休戚相均故其兵皆常信服而可與之同其生死至于齊桓欲速得志于諸侯亦作內政以寓軍令三分其國而使賢人為之里君而作三軍之帥卒伍定于里而軍政成于郊人相保家相受耳目足以相聞見而歡欣足以相死故其兵皆有節制而守則固戰則勝今之兵雖不出于農與古大異惟其所以為兵而欲禁暴禦侮之意則亦何異于古哉然而將無常兵兵無常將出師數萬而以生殺存亡之柄授人于倉卒之中把旄賜鉞建靈旗以啓行而三軍之士不知其誰何莫敢仰視其面而欲與之同其死生攻取戰捷不亦難乎古之能辦疆埸之事者蓋非責以嵗月之勞要之遲久而務有以克敵也李牧趙充國之迹斷可知矣今乃不然備邉守塞要害重地而以為武臣更踐之塗遲止再嵗速或纍月若寓居于傳舍而指期以去則敵情安能知軍政安能立深謀逺略安䁩施乎古之取將不獨貴其節義智勇雖或貪冒不法亦録其材而用之萬一抵罪則天子以功覆過不繩以法所以養其豪縱敢為之氣而使之盡智能竭死力也陳湯魏尚之事舉可知矣今乃不然邉鄙武人而一切責以小亷細謹有毫毛之失而使文吏議其罪刀筆挫于前網羅施于後則倜倘不羈之士踰義反常以立竒效豈可得乎古者捐兵與人而軍中之事聽其處決與奪之權不從中御而求其成功蓋雖天子之詔有所不聞者矣今乃不然暴師千里之外而日有稟聽于朝廷敵人在境而一兵不敢輒發則乘機決勝安所望乎古者推赤心而待之以不疑情志相通而上下相信無間色可窺無流言可動故能專誠一意以求報其上蓋有謗書之篋而人君未嘗惑者矣今乃不然重兵要地方仰其臨制而浮説橫議茍可眩于群聽則輒為罷徙取信責成不甚異乎此五者皆任將之大敝臣故曰未得其道也昔太祖太宗之初天下未盡寧四逺未盡服故博求通選得李漢超輩十有四將分治三邉之地逺或二十載而近亦十年雖非古之素將而皆久其任則視其兵如家人子弟而足為之用征𣙜回圖之利恣其所取驍勇之士聽其自募而養軍中之政許以便利裁決或毁之則付以奏牘或訟之則使受而快意當此之時諸將皆懷服恩義竭忠致力以靖天下之難而朝廷遂無四方之憂此任將致兵得其道之明驗大效也今天下名為無事而其實將至于用兵故臣願陛下于無事之時設用兵之備虛心廣聽以求諸將或命之保任而收特異之才或觀之踐歷而任已試之效别三路之兵為數部而各𨽻以將使兵有常主而將有常用則平居素信而危遽可以責其力戒數易以盡其經營之心寬文法以養其馳騁之氣事涉幾會則不必牽制于中旨茍非大過慎以間言輒罷至誠以結之隆禮以遇之則必有良將為陛下用而寧天下服四夷何愧于祖宗之世歟不逆為慮而一日任之雖有智者不能善其後康定之戰可以懲而監也陶又曰君子小人之不同類而勢各有勝此天下之情可見而治亂之所由生也人之樂從其類者善惡皆然耳其類相從則其勢必勝在君子則為治于小人則為亂此物理之常也有天下者莫不惡亂而好治然則小人固不可使之勢勝矣其勢茍勝則推類而從而天下禍亂之本遂萌而不可遏盍預慮先計以杜其變乎兵者聚天下之小人而授以不仁之器責以殺戮之事也制御之道一失則資不仁之心而倡殺戮之禍況助其將勝之漸而開其相從之端哉昔唐之中世兵紀壞敗而方鎮多變者蓋小人勢勝而推類以從之故也帳下之兵小有拳勇則任為爪牙而親信積日纍勞至于禆將乃為三軍之所屬目一旦威不能懼恩不能恱攘臂大呼起為亂首殺監軍遷主帥而數萬之衆甘心以歸焉不然則其軍自叛而求以為長朝廷亦因而錫之爵命豈其人素有忠義智信足以感服三軍之士邪蓋衆人之心以為吾類之可從而遂推之也雖朝廷亦不得已而與之矣夫素無忠義智信之人而為三軍所屬目則安能禁其藉而生變哉此助其勝而開其從之敝耳梁崇義者羽林之射生也來瑱既誅戍卒倚以為將連結羣盜擁衆二萬而有襄漢七州之地田承嗣者盧龍之禆校也為僕固懷恩之援刺史魏州而遷節度隂圖自固得衆十萬而致魏衛數世之患王智興者李洧之衙卒也以軍抗納乃為徐將逐崔羣而處其位也朱克融者劉總之之軍校也在鎮日久內張洪靖而統其務也昭義之裴志清河陽之王惟恭涇州之田希鑑魏博之田興鎮州之王庭湊汴州之李㝏幽州之陳行泰皆以牙將奪帥而授節豈非拔卒之易而導兵之叛乎天下方患兵之驕而無術以制則固宜稍抑其勢矣自西鄙用師甘陵平亂南寇繼起軍校以矢石之勞而進擢者凡幾人也三嵗遞遷禁衛之長以罷權而陟髙位也便殿閲武取其匹勇而處以右列也此三者欲以勸勵軍功而不知久之將弊矣何者不究其智識謀慮之何若而驟賞之濫也雖忠純厚重間有其人而凶暴愚暗多以幸得也朝為𨽻夫暮享貴爵則固未能革其素行矣而乃假之兵柄委以捍邉其甚者副一道之經制又其甚者帥禁旅而為天子之衛殊可駭也今之所謂防團刺史者布列要郡矣臣恐十數年之後補擢愈衆在在處處皆分任之而天下之兵權多其手足以動其徒類之心而重勞國慮也至和之末都邑大水萬衆訩訩公卿相視而失色者其故何哉昔太宗皇帝深明兵旅之事而通其情故閲擇軍校參驗勳績先循謹而後武健嘗謂不更事任而䁩蹻捷者未可以為帥領雖有一夫之勇亦何足用至于章聖則又能觀其詞氣而知其志操品第所長而試之邉寄其于名器事權豈輒付之哉由是而言則慎功賞精補擢者亦今日制兵之急務也陶又曰古之人創立法制皆可以宜民而後世行之者少其故何也非法制之不足經逺後世不能謹守而用之多從而廢壞也古之法既已廢壞則時異事變不可得而復用矣得其近于古者而用之斯可也有近古之法可益于當世而又不能講修循奉以用于天下使之漸至廢壞而乃求考三代之空文掇拾漢唐之故事欲變常動衆大有興作以補斯世之弊不已迂乎此與夫家有良田而不勤三時之務以圖斂穫必得井牧溝洫之制而後耕者何異矣蓋天下之情難于更新而易于􅊞故將有所為而遽變其耳目則震駭驚懼而不從因其素所習熟之勢而漸以驅之則為力不勞而享利甚博故也然則有可用之法者不可使之廢有可因之勢者不可捨而謀他方今之事固有類此矣天下皆知兵之為弊而欲救之者必曰復府兵也府兵之法廢壞已久臣愚竊知其不可復矣田不足以處兵而兵不可使之耕也然有近于府兵者可舉其法而用之三路之民兵是也晉魏秦雍自古干戈百戰之地山川氣勢剛徑猛健土風豪勇有捨生取義之俗武卒鋭士著稱前世國家之興亦嘗籍而為兵矣陜右之振武保毅河朔之忠烈宣勇河東之廣鋭神武其初皆民而遂兵之嘗有戰鬬之勞于祖宗之世此民兵已試之效也今三路義男之籍凡數十萬集而拘之者蓋纍年矣非一日恐之而驟募也田事既隙常有講閲之令行陳之出入金鼓之進退粗識其略皆知其欲使之戰也武力勇鋭亦有超然于倫類可以赴敵而禦暴者田疇廬舍各安其居父母昆弟各得其養其心皆自愛重而不忍為不義茍為術以誘之而致其力則必有敢死立勝之功非若四方凶悍之徒群聚而異情驕惰而不用命也所謂法之可用而勢之可因以驅者此也兵説有之凡人之所以守戰至死而不怨其上者親戚墳墓之所在也田宅富厚足居也不然則州黨宗族足懷樂也不然則慈愛之于民也厚無所往得之也皆為兵之數今夫親戚墳墓之所在田宅富厚之足居州黨宗族之足懷則民兵之情有餘于此矣若乃慈愛于民厚無所往則上之人猶有不足于此焉何者取之于農而拘之以為兵列以部伍而教以殺伐是將使之戰也則撫而待之宜有加于農矣今平居無毫毛之惠銖兩之報以示寬假一旦有不幸則欲蹈白刃以效死彼之心安所利而樂為哉郡縣之吏又多棄略其事而少嘗經意此民兵所以名存而實去也豈非有法而不善用以至于廢有勢而不能因以就其功歟昔秦人有并吞六國之志使其民所以要利于上者非戰不可得故能斬捕甲首則自復其役小者相長其鄰里大者或優以爵祿是以四世有勝謂之數而不謂之幸後世見秦之速亡而遂譏其使民之不以義亦已過矣茍能為術以使天下而享其利皆善使者也顧其利之何如耳國家有民兵而欲講修其法以強中國又何愧哉臣願以義勇為上下之籍精其閲習而課其藝能擇其武壯健勇而中于式度者處之上籍或蠲不急之役或寬過重之斂以慰其為兵之心以閉其奔走不已之漸則人人要利而競勸舉三路之農夫半為異時之精兵而不可勝用抑亦善使天下之術歟歷代名臣奏議卷二百二十一
