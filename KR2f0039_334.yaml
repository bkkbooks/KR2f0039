body:
  text: 歴代名臣奏議卷三百三十四明楊士竒等撰禦邉宋高宗建炎元年尚書右僕射李綱上言曰臣聞居於山者必高垣墻固柴栅以虞虎狼之害居於野者必盛僮僕厲甲兵以防盜賊之患今日之患害巳深矣曾不為防虞之計而裂地厚賂以予之譬猶割肉以啖餓虎而欲止其搏噬出財以畀彊禦而欲止其侵陵豈可得哉臣所謂三年然後兵可用者謂大舉以報今日之耻也至於守備則自今以往當日為虞害防患之計不可蹔輟夫金人既已得其所欲挾二聖卷六宫而北之矣逼脅邦昌使僭位號其意亦豈果在邦昌哉特迫於時月不得不歸知天下之戴趙氏必將有主而陛下總兵于外必為臣民之所推故留此以為中國舋端其意不難知也語曰鞭雖長不及馬腹夫以四方萬里之逺而金人欲以力經營之故其力之所及者靡不悉取而其力之所未及者留舋以為異日之圖此必至之理也為今日守備之䇿當以河北河東之地建藩鎮立豪傑使自為守朝廷量以兵力援之而於㳂河㳂淮㳂江置帥府要郡以控扼修城池備器械屯兵聚糧堅壁清野教車戰以禦其奔衝習水戰以擊其濟渡使進無所掠退不得歸則其勢必不敢深入至於陵邉隅破城邑則不能保其必無也但能備禦今冬不至越軼使國勢漸定人心稍安則自此得益修軍政吾無患矣臣愚料之金人秋冬之交決須再來仍分為兩道由河東來者自京西以擾關中與夏人連謀欲窺川陜由河北來者自京東以擾淮南與髙麗連謀欲窺江浙則京西陜右京東淮南不可不為之防當擇大帥屯重兵以經略之譬猶治病當視脉息察邪氣之所入預遏絶之不然待其既至而後治則無及已惟陛下熟計而幸察紹興間綱為江西安撫制置大使乞㳂淮漢修築城壘劄子曰臣伏覩手詔車駕將乗兹春律駐蹕建康此誠至當甚盛之舉也臣昨奉詔書條具邉防利害嘗論駐蹕建康為措置之宜所當先者然其說謂淮南有藩籬之固則建康可都宜命諸將移重兵於江北料理營田葺治城壘則藩籬可成今大將既已移屯矣營田既已施行矣楚泗既已修築城壘矣惟是㳂淮如廬壽㳂漢江如襄鄧等處尚未措畫臣願陛下降詔劉光世岳飛乗士卒之暇以漸脩築如韓世忠之於楚張俊之於盱眙楊沂中之於泗使名城堅壘緜亘相望以張國勢以讋敵心又命朝廷選通知古今臣僚按行淮漢深考古跡要害控扼之地如濡須塢牛渚圻之類築壘屯兵益務自固使藩籬無侵突之虞貔虎有蓄鋭之利以守則固以戰則勝此今日之上䇿也夫守戰一道也能固守而後能進戰是守者進之基也譬如奕棊之家凡欲勝人先須自固此言雖小可以喻大今陛下既已㫁自淵衷不貳不疑駐蹕建康以承天意矣伏望聖慈益脩戰守之備以建中興之功天下不勝幸甚臣以衰病見丐閒散不勝臣子愛君憂國之誠輙復自竭冒昧以聞或有可採亦臣仰報聖恩之萬一也干瀆天聰臣無任惶懼戰越之至二年綱為觀文殿學士上言荆湖國之上流其地數千里諸葛亮謂之用武之國今朝廷保有東南控馭西北如鼎澧岳鄂若荆南一帶皆當屯宿重兵倚為形勢使四川之號令可通而襄漢之聲援可接迺有恢復中原之漸建炎中御史中丞許景衡奏乞救援順安軍䟽曰臣伏覩順安軍為金兵圍城危急奏乞差軍救援并乞糴買本錢未聞朝廷措置施行又二狀為久闕正官亦䝉批送吏部依條差注竊謂邉奏告急乞兵救援及糴買糧草正在朝廷疾速應副豈可頃刻濡滯也極邉州郡方當軍興係是重難去處今闕正官亦須破格立賞然後人肯注擬若令吏部依條差注亦恐人不願就也竊聞河北並邉州郡若安肅廣信皆已䧟没唯有順安尚能固守不屈此宜朝廷特加奬勵若有申請尤當疾速施行今來二事或如常程文字或只付之有司不䝉特與措置朝廷果欲棄河北耶又本軍所奏城中芻糧向盡只可支持一月度至今日恐已不能固守兼得諸道路之言順安近已殘破若果如所聞則亦已矣不然更望睿明詳覽本軍所奏下三省樞密院疾速應副人馬糴買本錢及措置破格差官填闕免令一城官吏生靈盡為強寇殺戮驅虜也景衡又奏乞備江岸把扼劄子曰臣契勘方今駐蹕淮甸而大江上流所當設備雖真州已有范瓊一軍其向上宣化渡和州烏江與江西金陵馬家渡采石相對並是險阨去處各合立寨栅脩戰船置水軍精選巡檢閲習弓弩以戒不虞只如前日張遇羣賊順流而下若㳂江逐處皆有守禦之備亦豈能便據金山梗絶江渡耶覆轍未逺後患可憂伏望睿㫖行下所屬相度前項險阨去處増置巡檢水軍及守禦之具亦思患豫防之意也或恐臣所聞關津未至詳盡則乞所屬從長講究施行三年趙元鎮上奏曰臣伏見比來臣寮上殿奏陳利害并羣臣應詔條具及二府大臣延見賔客獻陳己見江淮監司郡守前後申請防秋要切之務不過控扼上流防托淮甸固䕶江浙一帶自四月迄今百有餘日慮之固已無遺䇿大率以兵為先而分兵固守占據地形習熟其山川險易之宜以為出入邀襲之計要在前期而遣則軍行從容民不駭愕今已秋矣未見分兵而出也一旦邉報有警敵騎南來風勁馬驕倐至泗上則淮甸震驚聲摇江左陛下其能安居於此乎或謂俟杜充至然後分遣今道路梗澁充若久之未至終將不遣邪儻預為撥發各使按堵俟充之至盡以付之有何不可自來出兵例皆留滯今日上畫一明日請器甲今日支借請錢糧明日散起發犒設般挈老小編排舟船動有十日半月之事比至按隊渡江各到屯泊去處又須旬餘非可傳箭而集舉鞭而行也待其有警而後發不亦晚乎是時上下惶駭軍情憂疑將有去留嚮背之意安在其為控禦哉若以謂淮甸上流自有兵將分擘已定不須遣兵則幸也茍或不然臣實憂之後時之悔其可再邪臣願降㫖開具上自荆襄下及楚泗屯泊地分所屯兵馬大將謂誰置司處所先聲後實未必皆然多作條畫揭示一牓姑以安士民之念亦使敵人知吾有備所謂伐謀也元鎮又論防秋利害上奏曰臣竊惟東晉之遷國勢微弱惟其設淮上之備以嚴外户扼荆襄之要保有上流是以能建都江左歴年之久今車駕駐蹕建康則荆淮之防托㳂流之斥候誠為急務斥候之不明以措置不専勸賞不立也自來委之軍中及㳂路州縣而軍或散亡城亦自守倉皇阻絶力所不暇今欲自御營及諸軍州縣各選募使臣兵級立定人數信賞必罰不任出戰城守之責専令探報如此則人得盡力而事不失實矣防托之不謹以事出倉卒不能預備也自來俟有警急乃始調發而陣未成列兵刃已交退無所歸披靡逃潰今欲前期選閲受成而出各使分擘逺近占據形勢習熟其山川險易之宜以為出入邀襲之計廣積芻糧嚴設塹栅出而掩擊入而拒守如此則前有以阻遏而後能牽制矣雖然防托之任正惟其人未得其人計將安出臣竊謂黄帝時諸侯相侵伐暴虐百姓於是習用干戈以征不享然而遷徙往來無常處以戈兵為營衛所以能戰炎帝伐蚩尤逐葷粥以去天下之不順者今陛下欲久留此耶願如臣所陳謹斥候防托之備慎將帥委任之選保無後患堅守不動為長逺之計可也茍或未然則維揚之禍可不鑒哉臣願陛下深懲既往之失常為去就之謀以六宫所止為行宫以車駕所至為行在吏部注授並依八路户部金帛貯之諸州凡宗廟祭祀禮文法物及六曹百司之閒慢者並歸之行宫而差除陞擢號令賞罰出於行在隨駕之兵不在多選擇萬餘以備儀衛其餘兵將分布江淮預設控扼既有以分軍食又有以相應援行在官兵既省則用度易足進退簡便或駐江浙或臨淮甸延見父老省察風俗旌别善惡搜揚人材召集軍兵振耀威武使敵人知有預備而莫測巡幸定居之所則恐未敢再謀窺伺然後别遣能臣出使關陜收六郡良家子募為効用優諸路弓箭手足其闕額以至蠲私田之税如弓箭手法推之全陜諸郡因其民俗復唐府兵之制待以嵗月訓練精熟則四方之事庶有可為者且關中四塞之國周以龍興秦以虎視漢髙祖所以卒能并強楚成帝業者以其先得關中之地是知古先帝王欲大有為於天下莫不在此今固未可幸陛下它日圖之紹興間元鎮又上奏曰臣契勘即日防秋是時臣雖夙夜惕厲思所以廣為隄備第念事勢相形利害安危固有緩急輕重儻非先事建明逺瀆聖聽恐一旦措手無及恭惟清蹕見駐臨安二浙閩中為近輔江東淮甸為要藩自行朝達鎮江建康屯宿重兵無慮十萬距京師約三千里非不深且逺可恃以安然江西一路北際陳蔡廬壽西連潭衡荆襄比他路邉靣最為濶逺偽齊見遣兵將力守光州為備數年頗聞農種漸廣自汴由陳蔡至光纔三百里復與蘄黄接界亦粗有糧可因臣䇿偽齊萬一㑹合金人再來南侵當數路並進而鎮江建業既已有備必由光州直擣蘄黄旬日便到江上虜船造栰乗間南渡聲摇江湖人心摧於傷弓當鳥驚魚散支吾不暇將見行朝亦不得奠枕則建康鎮江雖屯重兵固已無益於事矣況己酉冬敵騎已嘗出武昌岸徑趨興國縁山疾馳數日傳洪州城下前車之戒未逺則江西今日利害安危豈不重且急乎臣計本司見管軍馬共一萬六千餘人皆是招收烏合之衆除輜重火頭等外可使出戰僅及萬人才足以屯防近裏州縣隄備盜賊豈堪前當大敵近奉聖㫖留岳飛全軍先分萬兵駐九江士馬精勁似可倚仗臣愚見尚有二患邉靣濶而偽境近則師不可不益師旅増而贍給廣則財不可不聚謂如江州興國軍西抵岳鄂皆據大江上游曲折千里控扼要害受敵處多自湓浦以上江漸狹隘至霜降水落則一箭可及一葦可航非若下流深濶多阻未易侵越也今計岳飛兵數二萬一千有餘除火頭輜重守寨疾病人外實得戰士一萬五六千人忽有警急迎敵保城臨時應機猶恐分布不給兼岳鄂人馬無多安能使犄角應援臣欲乞朝廷更摘那數頭項堪任出入將兵時暫付臣相兼使用又本路州縣屢經兵火殘毁繼以連嵗討賊大兵往來民力彫弊官用空虛今既留岳飛全軍復丐益師則軍儲愈窘若止仰漕計必致闕誤臣欲乞朝廷廣行支降錢物及就撥本路應于諸司上供錢帛并𣙜貨務見在及日後收樁之數並行付臣斡旋相兼支遣仍乞選户部官一員前來與漕臣協議應副庶幾兵勢稍強財用粗足可以待敵且免臨時擾攘失措之患臣材識庸暗所見止此伏望聖慈察其勢迫計窮早賜睿㫖詳酌施行元鎮又乞下湖北帥司隄備賊馬上奏曰臣昨據本路制置使岳飛申諸處探報李成劉麟㑹合金人有直趨蘄黄渡江之計臣以本路正當衝要控扼江浙實係行朝利害不敢隱黙節次具奏庶幾中外預得為備不至倉卒失措自十一月二十日已後探報少緩而臣不即以聞者以敵情不測萬一所傳不審有失隄防或致衝突之患當料其有不料其無勿恃其不來恃吾有以待之也今李成尚留漢上雖未聞追襲之耗而經營襄鄧用意不淺葢輕兵追襲為患速而小占據上流為患緩而大計朝廷已有措置非臣愚慮所及縁上流既失即自漢陽而下㳂江諸郡皆順流可至之地不可一日弛備非特防秋而已臣已奏禀乞支降錢物打造戰船不唯本路合行計置竊恐㳂江諸路亦當如此兼聞光州順昌府各儲糧十數萬今則未見動息觀其意向必有所用臣除不住移文制置使岳飛及本司所遣兵馬逺布耳目益嚴防守并召募硬探直往襄陽已來伺察敵情外所有漢陽沌口係漢江下流湖北帥司所𨽻更望聖慈特降睿㫖嚴切戒約過為隄備庶免意外不虞之患紹興初監察御史明槖言湖南邉郡及二廣之地舊置溪峒歸明官比年寖廣其員及諸州措置隘砦闕人把拓又令管押兵夫素不習知法令率貪婪無厭況管押又皆鄉民甚為邉患遭困苦折辱者往往無所赴愬議者欲俾帥臣籍其姓名每三年一遷易如州縣官故事或云止循舊添差并罷管押兵夫宜令二廣湖南帥臣處置適宜無啟邉禍以害逺人四年六月張浚論敵情及備禦利害上言曰臣聞山東警報曉夕深思未見敵人大舉之意臣竊惟世忠進兵淮上號稱十萬劉豫父子勢已窘蹙必多遣偽使求援於敵向使敵之大兵外示衰弱養鋭不動秋髙馬肥一舉而至淮甸是為可憂然其勢亦須再調生兵簽發百姓方敢深入何則去嵗失意而去人心離怨茍非増益重兵安肯輙至也今我師自屯淮楚偽地騷然修城郭起丁役設馬栅運糧餉葢劉豫欲以安其民人使無背叛之心凡此皆臣之所樂聞而深喜者比又報敵之大兵已至沂州臣所未喻借使有之豈不為我之利乎夫盛夏興師中國所難敵人為之其失多矣敵之所恃者馬方此大暑不獲休養則秋冬安可復用此一利也敵以騎射為能當夏之時筋膠解緩豈能害物此二利也北人性不能熱堅甲重兵皆非所用之時此三利也為我之計正當休兵持重日為過淮聲勢困弊其人仰惟陛下聖算神機必有所處臣愚無識知豈能測度姑叙所見恐或有補聖慮萬一區區僭冒伏幸睿照髙宗時浚又論戰守利害上言曰臣智識暗陋所見不明惟有愚忠庶幾仰報儻或畏避隱黙負愧天地誠不忍為臣竊惟敵人盛夏舉兵拂天違時朝廷發明詔議征伐固天下所願者臣愚以為今敵竭國而來其勢方鋭可以計圗難以力破若速於用兵則戰有勝負時有利鈍糧有繼絶曠日持久變生不虞曷若俾諸帥結從連衡於近淮要害之地據利便擇形勢就餉運以促其勢堅壁清野時遣間諜坐觀舋隙使之進不得決戰守不能久聚俟其智力俱困而圖之天下可定矣帝王之師以全取勝貴謀而賤戰正今日之先務也惟陛下察大易不密之戒矜愚臣憂國之私斷自聖意天下幸甚浚奉祠居永州論和議利害上言曰臣於正月十五日恭覩大霈之頒再三熟讀通夕不寐翌日作書呈參知政事孫近大槩以敵若尚強和安可信其勢遂衰和為可惜竊料聖心髙明姑且為此内以激將士之憤外以觀敵國之情不然事日委靡何以立國燕雲之舉其鑒不逺他日之悔復何可追臣愚區區過計竊以謂敵自宣政以來挾詐反覆傾我國家葢非可結以恩信待以仁義者今日事之虚實姑置未論借令敵中有故上下分離天屬盡歸河南遂復我必徳其厚賜謹守信誓數年之後人情益解士氣漸銷彼或内變既平指瑕造隙肆無厭之欲發難從之情其將何詞以對顧事理之可憂又有甚於此者陛下焦心勞慮積意兵政精神感格將士漸孚一旦北靣事敵聽其號令游談之士取功於一時勲績之臣置身於無用比肩宥宻接武求盟小大將帥孰不解體陛下且欲經理河南而有之臣知其無與赴功而共守者矣矧夫敵計莫測自古所傳異時策馬渡河風塵畢起倉卒之間孰肯赴敵葢自堯舜以來人主奄有天下非兵無以立國非武無以定亂國立而勢起亂定而治生然後干戈可戢道徳可行未聞委質强鄰可以削平禍難逺而石晉近而叛豫著人耳目歴歴可想夫中原之地未易輕守也譬諸人身至虚風邪乗之手足偏廢不能運動必其精於自養元氣日強氣之所到肢體乃舉藉外物以扶持難乎其經久而及逺矣昔魯仲連不欲尊秦為帝且曰秦無已而帝則將變易諸侯之大臣彼且奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宫梁王安得晏然而已乎葢小之事大不幸而交於虎狼無道之國彼力屈則姑且矜容力強則肆為吞并春秋之時楚懐王入覲于秦一往不返逮今千載之下為之痛心由辨之不早也漢高祖起兵之四年侯生侍太公吕后以歸軍皆稱萬嵗已而羽解而東歸漢王引兵西歸張良陳平諌曰今漢有天下大半而諸侯皆附楚兵罷食盡此天亡之時不因其機而取之所謂養虎自遺患也漢王從之古人争天下必審夫機會時不再來追咎莫及髙祖知羽之寡恩少義其和不可恃也又知夫從我將士日夜望尺寸功求其顯著人心之不可沮也故雖再敗固陵甘心不悔兹二事者足以為今之戒矣臣日夜思念此國之大事也陛下獨不與二三將帥熟謀之而從約之遽肆赦之速用世儒之常説答猾敵之詭秘措置失叙思之寒心臣不自量為陛下再計嗣今以往使其遷延生事姑緩一時謝絶使人可也明告以利害詳喻以曲直可也萬有一如太公吕后之歸便當博詢諸帥奬礪將士外存和議之名内圖恢復之實逼之以大勢使其人心終至於乖離示之以威武使其内舋不能以遽息始臣而終服之如唐太宗之所以待頡利者庶乎國家可立焉臣罪戾之餘一意養親深不欲論天下事顧惟利害至大至重不忍緘黙以負陛下之知罪之聽之惟陛下命紹興間户部尚書章誼乞守臣措置土豪狀奏曰臣竊聞劉光世奏金人忽生南渡之意又聞通州使臣劉鑄奏金人來年正月初一日渡江又聞江隂軍探報北岸有船數千隻臣參驗三人之説則金人南渡之計決矣葢金人去嵗嘗以冬月渡江矣陛下御輕舟乗風遵海而南彼方﨑嶇山陛當建康屢戰之師踰錢塘城守之阨且復再渉重江是以追兵不得以速進也今時則異於此矣大駕駐蹕㑹稽北直通泰彼將方舟結筏徑渡三江之口騎兵舟師水陸兼進又自立春之後風起東方海行之舟有類退鷁覆却可慮敵誠出此則我之所保水失乗桴之便陸有追騎之虞堕敵計中矣臣以是思之則三人之報不可忽正月之渡為可信不知朝廷亦嘗慮此乎使三人之報不實則大幸矣使其不妄則正旦逼矣將何以待之耶臣聞臨安府守臣李光願統浙西土豪為國屏翰朝廷何不聽用其䇿稍假事權使勵其衆藉為禦侮非唯臨安一府也二浙諸郡江東江西一切委自守臣速行措置明降詔㫖喻以力戰堅守之意降去退保之令有能竭節城守扼險破敵與夫懐私退避並緣為姦之人來年事平之後大明賞戮如此則金人雖欲南渡有所不敢設其敢渡諸郡之兵且戰且守或犄或角日夜追逐數萬之衆可立盡也一戰而勝敵人終身懲艾陛下國勢立而疆土復矣臣不勝區區愛君憂國之誠惟陛下留神聽納與將相大臣速圖之誼又乞令張浚措置防秋然後班師上奏曰臣聞江淮招討使張浚之師自破李成斬孫建馬進之後盜賊震恐知尊朝廷如張用孔彦舟之徒皆願聽節制乗此機㑹可以措置江湖淮甸之間使兵皆𨽻將帥使將皆有職任分布要害之地委以戰守之事各令漕臣給其糧餉嚴罰重賞責以來效如此則防秋之事大槩略舉矣然後張浚可以班師别聽陛下之指授今聞朝廷許之入覲徑自淮西循江而下竊恐奉詔遄歸其於江湖淮甸之間有合措置事務不暇經略則數路之廣盜賊復得屯聚軍兵無以彈壓雖留岳飛一軍以為聲援終恐兵少望輕緩急難濟伏望睿明更賜裁酌不勝幸甚誼又論守江之䇿上奏曰臣近者伏見朝廷分三大使宣撫淮南湖北之地皆跨有大江邉臨淮泗既可以應援東北來歸之人又可以捍禦敵人南侵之勢内資富庶之邦外撫殘破之郡誠計之得也然欲進圖收復必須退有據依今東北方藉經營之勞而江南實為固守之地設使黠敵憑陵盜賊羣聚但不能踰大江而東則國勢鞏固如木之有本水之有源崇髙廣大可坐而致臣去年為郎時嘗為宰相畫守江二䇿不䝉施用後卒奔走臣觀今日守江之議尚不可廢輙繕寫投進連粘在前伏望睿明鑒照如有可採乞降付外廷相度令三大使措置施行誼又論具舟師為守江之備上奏曰臣竊見朝廷自靖康以來聚天下之兵以抗金人初戰燕山次戰太原初守汴京後守淮甸然而守則不堅戰則不利累年於兹矣至于今日知歩騎之非敵懼易野之難守是以東踰大江保兹川險勢雖甚迫而理實可安朝廷所以屈體為此者謂金人利於鞍馬而南方長於舟檝使金人捨其所利而我得用其所長則勝負有在是朝廷之本謀也今則不然専恃長江之險不設舟師之備萬一金人東侵方舟結筏皆可濟師舉帆直指如履平地則向之川險既不可保而南方之所長亦不獲用日蹙一日將安所之乎且朝廷之所恃者北則淮南則江今縱不能守淮且欲阻江為險則舟師不可不備也今之議者或欲聚兵於江北或欲分兵於江南此議者未之思耳夫聚兵於江北是欲與金人戰也中國既已屢戰而屢北則戰非所利矣又欲分兵於江南者是欲守也長江數千里金人果得浮舟以濟則我不知所守矣故嘗謂此二説皆未之思也唯多具舟師中流以守則金人雖有良將勁兵輕車駿馬數踰百萬亦必臨流歎息而退將安用之伏望招選才能之士多具中流之師則江南諸郡雖無守備之兵亦可髙枕而卧矣小貼子竊聞金人已有登萊沂密之地萬一自此數郡乗舟而來則通州狼山之險實為咽喉要害之所當有舟師以為備禦温台明越常熟福山皆由此路以往伏乞照察誼再論舟師水戰之利上奏曰臣契勘目今朝廷暫駐浙東襟帶江海實憑川險以却敵騎然則巨浸湍流葢今日之長城也樓船戰艦葢長城之樓櫓也舟師戰士鑿工没人葢長城之守卒也火船火筏彊兵毒矢葢長城禦攻之具也設有江城萬里則尺寸之地不容於不守今有巨浸湍流顧豈可無守禦之備哉守禦之備莫如舟師用舟師之䇿莫如中流以守且金人攻城長於用砲我之舟師中流以守則矢石有所不及金人野戰長於用騎我之舟師中流以守則騎兵不能奔衝是二者固可以奪金人之所長矣又況金人將必欲與我戰乎是必造舟維梁結筏渡騎然後可也造舟結筏不在大江之濵則無艤駐之地必於大江之滸則有焚蕩之虞若是則進不得戰矣金人將長臨大江以困我乎自春徂夏自夏及秋雨潦將降騎兵有䧟没之憂氣令炎燠逺人有疫癘之苦若是則退不能守矣在彼者進退失據而我中流之師未嘗勞也伏望特賜討論盡發平陸之兵迭為舟師之用並海㳂江若州若縣多具中流之師以為守禦之備不勝幸甚五年房州司刑張嵲上䟽曰金人去冬深渉吾地王師屢捷一朝宵遁金有自敗之道非我幸勝之也今士氣稍振乗其鋭而用之固無不可然兵疲民勞若便圖進取似未可遽臣竊謂為今日計當築塢堡以守淮南之地興屯田以為久戍之資備舟楫以阻長江之險以我之常待彼之變又荆襄壽春皆古重鎮敵之侵軼多出此塗願速擇良將勁兵戍守其地以重上流之勢六年知鼎州張觷言鼎澧辰沅靖州與溪峒接壤祖宗時嘗置弓弩手得其死力比縁多故遂皆廢闕萬一蠻夷生變將誰與捍禦今雖各出良田募人以補其額率皆豪強遣僮奴竄名籍中乗時射利無益公家所宜汰去别募溪峒司兵得三百人俾皆練習足為守禦給田募人開墾足供軍儲詔荆湖北路帥司相度以聞帥司言營田四州舊置弓弩手九千一百一十人練習武事散居邉境鎮撫蠻夷平居則事耕作緩急以備戰守深為利便靖康初調發應援河東全軍䧟沒今辰沅澧靖等州乏兵防守竊慮蠻夷生變叵測若將四州弓弩手減元額定為三千五百人辰州置千人沅州置千五百人澧州靖州各置五百人分處要害量給土田訓練以時畊戰合度庶可備禦以所餘閒田募人畊作嵗收其租其於邉防財賦兩得其便可為經久之計詔從之八年提舉臨安府洞霄宫葉夢得奏金人移軍稍前乞講民兵水軍二事劄子曰臣聞淮寇尚未覆滅近者復移屯稍前有欲戰之意道路所傳未知虚實臣嘗論自陛下決策親征逆折其鋒意其雖有奔突之志無所可施者以為王威既振雖凶頑無知成敗所在自當知難而退今乃昏迷尚懐搏噬臣伏思之葢敵法甚嚴彼既受命萬里入寇暴師三月傷折已多若無功而還總帥者必不免刑戮故欲竭力以戰以決去就若僥倖小勝固可以藉口或遂敗衂亦足為辭此姦謀所從出也不然知我有備請命於其酋欲歸而不獲尚狃往時兇暴之氣責之深入懼而不敢不前又其不然則是欲引去畏我躡其後張此虚勢以為隂遁之計耳果出於前二者則不可不過為深防臣聞兵法曰上兵伐謀又曰兵家先聲而後實今朝廷拒敵必勝之策既付之諸將矣備禦之道凡脩其實者宜無不盡故臣不敢復言而前妄議民兵水軍二事雖若迂緩區區之意葢謂施之今日則足以廣先聲而伐其謀與平時議者不同試復申之所謂民兵者孰不知驅畎畝耒耜之徒使捍虎狼不可禦之敵為不可哉且方此擾攘之際又重勞吾民亦不能無擾然臣非欲恃此以為戰也葢兵有以多為用者古者用師必設疑兵則増大其勢惟恐其不盛苻堅犯晉望見八公山上草木皆成人形猶足以懼東漢虞詡謀武都羌至有添竈日增倍之以示彊今傍江之人利害既切於已往往不待驅率私自結約保守鄉里者所在而有州縣把隘防托及給軍役之類亦皆出於保伍莫非民兵也所患者特無所統一散漫雜處而敵不知故臣願權暫命官因以部伍團結為之紀律畨次迭出耀之江上與正兵相為先後豈不愈於望草木而示添竈乎一可示敵以衆張大吾軍二可増吾正兵之氣相為形援三則布列旁逺之地萬一衝突出吾不備亦愈於無人今敵已師老必不更能久留不過為旬月之計農事未興民未必告病也若水軍則諸大將所統固各有之矣臣竊慮其以歩騎兵為急而未盡講或置而未用或不常閲習或彼此節制不及緩急不相為用則雖多而無所益故臣亦欲㑹而為一及官私舟既未通行亦可權時拘截専為一軍於建康鎮江兩州㳂江要害之地分布擺拽俟其欲用則與騎歩兵合謀並進日者偽四太子回軍至吴江禆將陳思恭驟以舟師襲之敵衆驚亂幾至於潰適近村有應之者素非所約思恭疑為敵兵遂不果終其役若使軍有所統晝夜講習號令方略進退闔散悉皆預為約束一則可以示敵使知畏有加於前二則事藝精熟人日從事其間安於為用三則可擇驍勇之士伺敵之間乗風水便利以收竒功葢敵既與我夾江相持其要在江則水軍為上騎兵次之歩兵又次之尤當深察也今敵如止為隂遁之計稍已退却臣言固無所用如尚猖獗志在衝突則將歩騎正兵外更益之以此恐或可以佐萬全臣不避狂愚復畢其説更望聖慈裁擇疊冒天威臣無任激切屏營之至髙宗時夢得為兩浙西路安撫使乞措置瀕海州縣防秋狀奏曰右臣備員一道兵民之寄當朝廷艱難之時外難未平所仰四方相與維持者其責尤重不敢偷安尸素茍且目前故自到官以來日夜盡瘁庶幾稍有寸補不至上誤使令竊見金敵雖已遁去包藏祸心洊食上國之意恐未遽弭登萊兩州宻邇其境而兩浙諸州例與海道相連自登萊航海逺不過數日可至浙西諸縣如杭州鹽官秀州華亭海鹽常州江隂平江府崑山常熟浙東諸縣如越州餘姚上虞明州象山定海奉化昌國温州樂清台州寧海黄巖皆切近於海臣去歳守南京嘗得宣撫司探報聞敵欲取山東路入兩浙作過是時彼方有意再犯王畿勢固未暇及此然又見其未嘗無此謀也近有東道總領司嘗被驅虜使臣歸為臣言敵知其為兩浙人頗問山川道里形勢甚詳又其所誘留人多有東南篙工水手從事舟楫之間者皆為陳説計䇿及夸大蘇杭富實臣益知敵人貪婪之心不無所在今兩河蹂踐之餘内至近甸金帛子女掠取殆盡使其谿壑之欲誠未厭足則去嵗宣撫司探報豈得不慮哉兩浙風俗輕而易動有自來矣又連遭方臘倪從慶之變人懐危疑常不安居加以險僻頑民隂間伺隙潰散冗卒居多嘯聚樂禍喜亂未易制禦今環兩浙之地瀕於海者十幾四五議者謂敵以鐡騎衝突為長澤國水鄉非其便利此以其竭國來冦論之可也若志但在金帛子女則姑以千百之衆脅吾驅虜之人以為鄉導聲言欲雜出於數州之間以圖侵掠則未至而吾民先已驚遁矣況樂禍喜亂之徒望風乗勢或應之以合謀或假之以自奮則其憂有不可勝言者何必直須敵之盡至乎晉之孫恩竊入上虞唐之袁晁發自臨海近日方臘山谷一夫亦能破六州二十七縣皆已事之驗然所以為備禦之策不過城池器用兵卒糧食四事而已今防秋僅有兩月事勢已迫毎事必俟朝廷措畫則勢不及待所以分憂捍患盡其力而為之惟在守令而未見其可當此任者臣雖誤當帥事法有常守又浙東非所部不敢輙有侵越若遂拱黙不言緩急或有誤事雖即誅死何足償責輙敢冒昧陳列欲望聖慈詳酌特降睿㫖先次遴擇瀕海諸郡守臣各得其人分命監司徧行巡察及諸屬邑凡令長有不可委仗者許得權宜移易罷黜别加選辟量立賞典以為激勸應所合指畫事除城郭已有近降指揮外其餘如脩治器械訓練弓兵皆嚴為近限責以實効無令文具僻逺之地巡尉與弓兵或可増添元額許一靣差補將來如有調發須量以分數存留無闕守備錢榖移用亦當樁管應用無至侵奪至於分布防托之宜闔散戰守之節斥堠幾察之要鄰比應援之期皆須熟議素講預有一定之謀相為表裏平居持重鎮撫不至於勞民有警隨事酬酢皆可以禦敵軍聲士氣稍達於海外使彼望而知畏而吾境内之姦亦有以逆折其心而不敢萌則逺近人心恃以不恐朝廷亦可一意西北而忘東顧之慮干冒聖聰不勝惶懼激切屏營之至謹錄奏聞伏候𠡠㫖夢得為江南東路安撫制置大使又論防江利害劄子奏曰臣聞兵有可勝之理而無必勝之道孔子曰我戰則克夫以至仁伐不仁孰敢與為敵此理之所可勝者也然猶曰必也臨事而懼好謀而成而不貴盡用其勇者是無必勝之道也故堯舜伐有苖而至于三成王周公征淮夷而至于四雖終至於克服殄滅然其初猶有待而後成者葢不以所可勝決其所必勝聖王之功也伏見黠敵敗盟罪惡已盈天地所不能庇覆鬼神所不能容忍陛下謙慎寛慈包藏涵養之久至使溢而自覆玩而自焚今猖獗以來攻城無所得掠地無所據烏珠新敗亡而去諸將偏師所指捷奏交上是誠滅亡送死之日也秋期已至我所可勝者雖其理甚明然敵人姦詐用意不測其為必勝者亦不可不審臣誤蒙聖恩總帥一道留鑰所寄王室是賴敢不思効其職竊惟今日之計不過有三其大曰過河次曰戍淮又次曰保江日者既命四大帥以三京兩河招撫招討矣若乗此屢勝之後敵果沮撓我師分道並進直抵京師追逐過河遂定故疆何往不可若猶恃其烏合之衆濟師於國竊據京師閉關旅拒乍出乍沒我不可盡鬭吾民則諸帥分屯淮上徐觀其舋我既未敢直前彼亦未敢遽下者必且戍淮若昏迷不悟尚懐衝突竭國逺來無所忌憚我師未可遽與争鋒則退而阻險以待其師老力疲然後為之所者必且保江過河不可必而戍淮戍淮不可必而守江此勢所不得已在我未為失策也至於保江則盡矣江若不必守則後何以繼乎天生巨險所以限南北非河與淮之比曹操之彊孫權首敗之赤壁其後權徙治秣陵操復連年再攻濡須權至以水軍挑戰卒不敢發徹軍而還及其子丕遣曹休張遼等併軍同下權遣吕範等以舟師拒之三年丕出廣陵望而歎曰魏雖有武騎千羣無所用也乃退後魏拓跋珪南侵止於翺翔淮上惟宋元嘉末一至瓜歩壊民廬舍及伐葦為筏聲言欲渡亦睥睨太息而不能越則江豈有可犯者乎惟是漢末劉繇守曲阿畏懦無能故為孫䇿乗之長驅奄有三吴與近嵗杜充隂懐異志擁衆數萬散而不屬以誤大事爾竊嘗考之吴所以能禦曹丕宋所以能禦拓跋珪者無他術焉臨江為疑城自石頭至江乗築圍作薄落上施假樓浮之江中使魏人遥望知畏者權之䇿也盡户發丁分守津要使之逰邏上接于湖下至蔡洲陳艦列營周亘江瀕自采石至暨陽六七百里者宋之䇿也則知險不能自固古之為守者初無竒秘不可及之事我之人力勝而彼不能奪彼之人力勝則我不勝守而所謂人力勝不勝者在其所施設用意不用意之間而已故臣竊不自揆妄意今過河之䇿朝廷已付之將帥而長江守禦參古驗今使州縣協力講脩其職預為萬一之備者臣之職也敢不以身先之其道不必便有興作但措置有定議控扼有定所上下知所戒而不敢忽逺近知所恃而不敢怠正使敵即掃蕩猶足外為聲援以佐大軍設有緩急皆無逃吾之術内則吾拱手以待其斃可也是以輙敢先事有言昔曹丕既退孫權以情語蜀使曰孤土地邉外間隙萬端長江巨海皆當防守丕觀舋而動惟不見便寧得忘此復有他圖夫以丕不敢犯為得計而以丕不見便為可虞此孫權之所知也而況於今日乎所有防守職事朝廷前後方略約束案籍具在臣已撿㑹擇其所當施行者畫一條例别具奏陳而迂踈之見淺陋之識復以冒達天聽伏惟聖慈貸其萬死少加採擇夢得又奏論舉行保社分守地分劄子曰契勘本路與淮西雖隔大江其實相為表裏自古用兵貴於後重以為根本所以師出必宿重兵於後今朝廷既以張浚領淮西宣撫於前則本道正當其後張浚見屯本府平居固賴以為形勢萬一有警張浚兵起赴所部則本府兵備單弱便為虚空之地縱或朝廷分留張浚兵防托客主異勢號令無統理難使喚臣昨紹興初待罪本道郡人懲王􅊅奔潰之失無以自固坐遭剽掠屠戮痛入骨髓皆願隨所居鄉村自結為保社家出人丁分立隊伍逓相部轄官為之籍其姓名以待有警則部轄人各帥其屬分地為守以自保其室家因遂從之略得八九萬人自後敵未嘗犯境官司亦未嘗行今民間以其法久廢皆欲少加整緝臣已漸次檢舉施行外竊縁近世凡言民兵利害者多是以民為兵公家取以為用使之逺去閭里或科率錢物騷動百端徇名忘實徒為重害與此不同自兵興以來江淮之民有逃避不及自結為山寨水寨者多得保全只如本府轄下五縣昨敵人過江皆被殘酷惟句容縣一鄉自保赤山並無侵害故今户口比他縣獨多況今不移所居而自為守禦或謂恐因之聚為盜賊亦不然此前日妄亂召募烏合之衆為把隘防托措置無法失其所歸之過今乃土著主户皆有家産物業使自保其父母妻子安有此慮至於官中初無所費而坐有十萬民兵之名内可以與正兵相權為淮西後重之計外可藉先聲以威敵境此其効不為小補夢得又奏金人敗盟乞下三大將措置捍禦劄子曰臣今月二十一日准壽春府探報敵騎侵犯東京前鋒已至拱州應天府未明虚實尋已兩具奏聞續覩淮西宣撫司探報與臣一同并有錄白到偽牓必亦具奏臣竊惟敵情變詐不測葢有自來昨張通古來使之後雖歸我舊疆朝廷尋遣王倫等報聘既留王倫不遣莫將繼行又不即迎曠日持久包藏禍心人固疑之今果猖獗乃以盛夏弓解馬疲之時遽至王畿其志必是秋冬欲如往年深入觀我所為徐為進退故先入京師休養士馬復占昨來留下米斛仍因二麥成熟苛歛拘收積聚糧食至秋深長驅南下為必衝突之計若我有以禦之則因所積之糧且堅壁相持萬一我有間隙可乗則鼓行而前惟所欲為陛下聖謀宏逺慎終圖始必皆素有定議臣備員疆吏職思其憂不敢不為過計妄意議者或謂敵勢頻年衰弱去夏腹心自相誅戮懼為我所窺故特為此謀以自抗暫至京師未必更能前進我不可為之震擾或以為莫將奉使未回敵欲取我嵗幣貪婪不貲及邀求禮數狂悖非分以我未即順從故以重兵壓境劫脅以幸得志我始疑之不可便與争鋒若果出此則固無足慮我但持重勝之以理可矣如其不然出我所料之外一旦横行而我無預備則事至豈可旋為之謀哉何者敵素有易我之心謂其衰弱則非臣所得知若邀求狂悖則前已見於事矣安能保其必止於東京葢敵之南侵者凡再建炎三年陛下巡海上杜充迎降諸將數十萬人望風潰散故乗勢得以入浙其易我者一也紹興五年以劉豫為鄉導再復大入陛下進臨平江諸將並㑹雖楊沂中迎敵一戰破之然不能繼為圖使師老從容得去其易我者二也今不稍更前轍赫示王威督責中外日夜併手共為及至秋冬尚恐不及若更少緩使得料我但如平日其氣愈盛其鋒愈鋭則何所不可肆哉臣聞上兵伐謀臣不知敵欲復舊疆朝廷姑且聽之耶欲堅守以俟則中原兵力寡弱城池器械皆未嘗料理未可遽與之較若姑且聽之則莫若先伐其謀亟下中原諸州乗其兵未集盡將見管米斛并民間二麥特為措置或令般運或令焚棄勿為彼有縱有不及勝於不為彼所恃者先已失圖我却部分諸將犄角連衡分據要地示以欲戰之形姑以和議應之佯為小屈使彼曲我直而内實嚴為守備纎悉周盡今諸將兵訓練日久各精熟蓄鋭思奮人懐踊躍聞敵亦自知之張皇六師亦先王用兵之術所不能免如敵縱未即知畏豈不内懐疑阻我益商度軍食分置㳂流諸郡我之所積者日廣彼之所仰者日耗進不得前退不得守雖欲久留勢有不可而後我或欲優柔㴠容尚存和議以奉迎太母欲乗其弊定與決戰使彼懼而歸我太母茍出於一無不可行伏望聖慈特賜睿察參酌累年方略反覆熟議無使我在其術内古者師克在和不在衆雖有良將茍非同心未易成功漢陳平號智略無遺方諸吕為變周勃以太尉握重兵猶無以為䇿得陸賈之言奉金交歡始能坐勝唐以九節度兵圍史思明於相州李光弼郭子儀在其間而計慮不同人各自異卒為思明所敗今大兵所恃惟韓世忠張俊岳飛三將臣欲乞朝廷先定大計更命三將各具所見如何則守如何則戰守以何道戰以何術孰當鋒居前孰勒兵殿後如何以為聲援如何以為䇿應一一條上取所可行者就以付之各盡其謀更相究知以責功効仍下詔慰勉俾務輯睦茍無同異躬率部曲一以社稷為心古之言兵者以謂如常山之蛇擊其首則尾應擊其尾則首應而艱難相濟譬之同舟遇風雖秦越且無異心況位兼將相比肩並立者哉此武王有臣三千人同一心所以勝紂之億萬人也臣智識淺陋不明逺略濫守陪都外固邉圉敢不竭盡忠欵少効區區之愚冒瀆天威臣無任惶懼隕越之至夢得又奏措畫防江八事狀奏曰臣伏見金人敗亡逺遁尚猶竊據東京近者雖諸道收復故疆迤邐漸近王畿秋冬掃滅可待然臣所部控扼大江為國藩籬與他路事體不同其職守所當舉不敢不過為隄備内以屏翰王室外為大軍聲援使敵人望風知畏以稱陛下萬全之舉謹取㑹本司及屬部州軍自敵人侵犯中原前後被受朝廷指揮有合檢舉預行講究事其大要有八逐一開具合取自聖裁今具下項一曰申飭邉備檢㑹紹興三年十一月樞宻院劄子節文具下樞宻院奏諸路防秋各有屯守養鋭蓄力規畫已定奉聖㫖令都督府及諸路將帥加意防守増修邉備精練士卒明審間探嚴兵待敵勿致疎虞臣契勘邉防之事其目不一雖大號令一當聽禀朝廷然有司之守見於常法自當夙夜上下協力振舉兵法曰善戰者先為不可勝以待敵之可勝不可勝在已可勝在敵不可勝者守可勝者攻又曰用兵之法無恃其不來恃吾有以待之無恃其不攻恃吾所不可攻昔齊師侵魯疆吏來告桓公曰疆埸之事慎守其一而備其不虞姑盡所備事至而戰又何謁焉此古守疆之道也然桓公知其説而不能行春秋書公追戎于濟西説者以為公不能預備戎至而不知逮其去而後始追之故書以為戒然則為其所不可勝恃其所不可攻者其可斯須忽乎昨和議之後兵革少息㳂流諸郡例多廢弛畏慎者恐渉生事但保目前怠惰者竊幸茍安豈思日後故敵兵初聞人人畏駭皆有遷避奔走之意雖有官守者亦顧望相持及兀术敗走軍聲驟振捷奏交上則復皆謂江淮決保無事不必更為過計常情所及安知逺慮夫戰勝者易驕謀中者易怠常勝之家難與慮敵光武之所深憂竊慮亦合明降指揮監司守令下及巡捕之官各脩其職常若寇至有合申明事務以時上聞無得循習坐廢職業二曰分布地分檢㑹紹興四年十月樞宻院兩次劄子備坐下劉光世吕祉奏分定劉光世所管沿江地分上流自池州東流縣管下佛池洲至江州界下流自太平州當塗縣管下磁姥山接連建康府界皆是光世所管鎮江府承楚一帶係韓世忠所管續除張俊浙西江東宣撫使本府界係張俊所管臣契勘本路自池州至鎮江府皆是沿江地分共一千餘里昨來既係劉光世張俊兩軍分守故敵人侵淮甸凡經三月有餘卒不敢窺江岸今來張俊雖屯太平州近者又聞岳飛分兵下守池州略有舊制然逐人既領三京河南北兩路招討將來進師中原逐旋起發前去即沿江諸州並皆空虚都無指準昔匈奴入上郡雲中漢文帝以令免屯飛狐蘇意屯勾注張武屯北地以捍其外而内以保京師者復以周亞夫次細柳劉禮次霸上徐厲次棘門分要害之地以相表裏唐代宗時吐蕃回紇入寇至奉天以郭子儀屯涇陽分布麾下各當一靣以李忠臣屯渭橋李光進屯雲陽馬璘郝廷玉屯便橋以次前拒故皆無患今諸將方圖中原不容更分其餘力兼使守江若但令預先以今來地界依舊分畫使有定處如遇進討迤邐追破敵人瀕江自在腹内不必過慮萬一或須退守則引兵而歸各着部分便可堅壁固守臨時不致紛擾故曰善戰者其勢險其節短紛紛紜紜鬭亂而不可亂竊慮亦合明降指揮略如前日預行約束張示形勢可使敵人傳聞知我有備亦足慰安逺民三曰把截要害檢㑹紹興四年九月樞宻院劄子備坐樞宻院奏沿江采石渡罔沙夾馬家渡一帶分命劉光世韓世忠各遣軍馬擇地屯泊各有差定兵將住泊去處後來韓世忠移屯鎮江府續差張俊䇿應兩路其本府靖安石歩至東陽下蜀接連浙西亦係張俊差定兵將住泊去處臣契勘本府及太平池州三處戎馬可以過處甚多前件所具止是大略今據取㑹到太平州界内即有荻港渡三山大信渡等池州界内即有丁家洲楊山清溪李河鴈汊趙屯港口等皆是自來置巡檢𦂳切守把今所管土軍毎處各不及百人其餘不置巡檢猶有二三十所既不可徧守亦須量度地里逺近於其要㑹别行屯戍使緩急上下應援得及則力不足者知所倚仗昔蘇峻作亂自和州渡江孔坦勸王導早守江口陶回為庾亮言峻知石頭有重戍不敢直下必向小丹陽南道歩來亮不能從峻果由此路徑至都城其後諸將戰不利郗鑒度賊必入吴即於丹徒立大業曲阿庱亭三壘賊果來攻大業不克而敗其地今皆在本府及鎮江界内可考而知葢攻其所不備兵之要務以此推之凡可衝犯豈可不防杜充惟不知此故雖有數萬衆聚而為一初無部分向着一旦望風奔潰今日安得不戒竊慮亦合明降指揮下諸將及守臣逐一相度凡可過渡去處擇其𦂳慢或兵或民預定戍守之所以待臨時分撥為決不可犯之計以防意外之患四曰約束舟船檢㑹紹興三年十月樞宻院劄子淮東安撫司申明已責委江都泰興兩縣約束沿江鄉村人户遇有戎馬𦂳急預行摇駕舟船離岸等事令沿江州縣依此施行臣契勘長江之險非黄河與淮之比河淮不唯皆狹河峻急所向不可當淮水淺而易渉獨江勢深濶平緩自春秋劉項以來齊楚燕趙用兵越淮與河皆浮梁可濟未嘗深計至長江惟孫策乗漢末亂離無與為敵故能乗間長驅徑入三吳及蘇峻狂悖掩晉不備遂抵都城自孫權定都秣陵之後逮晉宋及梁自北來犯者茍有守備皆薄江而止莫敢睥睨中間雖曹操嘗至濡須曹丕嘗至廣陵魏太武嘗至瓜歩亦逡巡顧視反不敢輕進況今烏珠之衆乎守禦之計未論其他但能嚴斷舟檝簰筏彼自無以為計今可乗以渡者非止舟楫其木筏與蘆荻柴束皆可為用公私舟船固不可以數計而商販木筏類皆聚于北岸真州所在山積蘆荻亦是出産去處若便行禁止則有騷擾之弊若緩急旋圖則勢必無及惟當先命有司籍見公私舟船數目曉諭遇有緩急則許令所在一靣拘收盡過南岸不惟可絶敵人劫奪占據若或不得已至於水戰則舟皆吾艦人皆吾兵不必更廣製造及别籍水軍真州木筏蘆荻並限以八月前盡數發入鎮江及浙西其江州向上木簰八月後並權住不得放下已過者候到本府盡令解拆竊慮亦合明降指揮重立刑禁責付守臣收執以待臨時施行但嚴禁無故輕舉阻節往來人自不擾五曰團結鄉社撿准紹興五年樞宻院劄子具下樞宻院奏節文内召募土豪鄉兵把隘奉聖㫖㳂江州軍守臣逐路宣撫安撫司疾速講究其土豪鄉兵並先行籍定人數以備緩急使喚即不得因而勾集致有騷擾至紹興六年六月樞宻院劄子坐下臣寮上言縁諸路帥憲司夏秋之交不復詢問有無盜賊循例檢舉於界首各立寨栅聚集保伍因而決撻妨廢生業遂降聖㫖除沿海地分外其餘州縣不得亂有勾集臣契勘自古兵民皆有所統周官在民者五家而上謂之比閭族黨在軍者五人而上謂之卒伍師旅同出一法此雖常談然用衆之道未有散而不屬能號令開闔者也今軍固有部分行伍而民之在鄉村者亦有保伍在坊郭者亦有保甲但承平日久未嘗資民為用故施之不過租税盜賊之間而已軍興以來士不知古一變而為鄉兵之論於是遂欲驅農畝耒耜之民與正兵參用不教而責之戰無事而聚之役食無常廪用無常器朝廷既不得已從之遂致人言因有再降指揮竊詳詔令但戒不問有無盜賊妄亂勾集若所當用豈可因噎廢食今所謂團結者非民兵之謂也特以保伍舊法少加損益令自相糾率各集強壯推擇所信服以為首領官為立條約假借名目約見在多寡之數籍而不用揭以示衆無事但藏其籍有警按籍下令各守其地正兵控守之餘令彌縫其所不及外張聲勢以自保其鄉里而已民雖至愚若懲往嵗之弊不幸冦得踰江強者奔迸逺徙骨肉離散弱者坐受殺戮同於雞犬資用剽劫室廬焚蕩孰若上下相維各奮其力使不得犯我之為愈乎民能保其土則國能保其險理之必然者也周制用民不過一人以餘為羨卒至田與追胥尚猶竭作宋文帝禦魏太武盡户發丁雖公卿子弟亦皆從役此雖不可為法亦可見其所以能自全者竊慮亦合明降指揮許令守臣預行計論量為措置以圖民利上佐國勢有蹈前失重寘典刑六曰明審斥堠檢准紹興四年十二月樞宻院劄子勘㑹斥堠全藉寅夜舉放煙火務要不失捍禦昨劉光世在池州駐劄將管下沿江地分並置烽火所有建康府浙西沿江一帶並無烽䑓斥堠奉聖㫖令江東浙西安撫司措置施行臣契勘用兵斥堠不惟敵勢厚薄軍行逺近所待以前知兼亦慮姦人唱為浮言動摇民聽逺無以驗或致有悮朝廷設施晉袁耽守歴陽石季龍遊騎十餘匹至耽遽以為言遂至朝野危懼王導以宰相假黄鉞出征已乃知其妄石勒在葛陂軍士飢死亡過半至有勸之納欵者元帝㑹天下兵守之而不知乃縱使去後遂不可復制此斥堠不明之過也昨建炎間敵騎已至江上本府守臣猶誤以為李成遂至失守斥堠探伺條目固多烽火最為𦂳急魏王基攻西陵為今峽州孫權遣戴烈陸凱拒之暮舉火西陵鼓三終達吴郡古之用兵葢如此今敵人近在東京瀕江相去無數百里其動息尚不能的實盡知日近攻圍順昌前後累戰多是事已方得關報至今人數多寡議者猶有異同則緩急何以取信所有傳送逓角比者戒約雖已嚴然事待奏而後知亦恐緩慢至於間探亦須所在嚴立賞罰廣布耳目相與參照非臣所得獨與惟是烽火本府昨自承指揮上元江寧句容共置烽䑓三十餘處通連浙西不為無補今大軍屯泊淮上與前日事體不同淮北動息尤宜速聞舊制沿邉三路烽火皆有成法人多知之若令更加條具取其簡易可行者付之於外逺近同為一體不至乖牾竊慮亦合明降指揮令自淮南廬壽以來增置烽臺通江南岸舊管去處専委郡縣候戎馬警動即舉以施行七曰措置積聚檢准建炎四年七月樞宻院劄子檢㑹三年六月聖㫖節文鄉村居民自來顧戀産業若必行清野之法竊恐盜賊未至民情先摇若置而不問又恐佐敵資糧反為民害仰守令監司更切措置多印文榜直説事因使民間通曉務求安全外有糧斛草薪之類難於般移亦須預行措置臣契勘敵人前後侵犯敢肆深入皆是資糧於我故恬無所憚昨自偽立劉豫之後盜有土疆認為已有其抄掠劫奪取之於民固已有限與前不同是以紹興六年至於淮甸無成而歸亦坐糧乏自困之一也近脩和議中原諸州積糧甚多皆是賊豫苛歛裒克以為猖獗之備可見姦謀臣初聞警即嘗具陳請首欲措置葢正為此今來從偽諸郡以次收復倉廪所餘無幾淮北雖近秋成本不産稻將來為我師過淮之備縱敵得之不能般輦前來亦不足計惟有淮南地分水田尚多今秋所入安得不預圖善用兵者不必全抗以力劉項相拒滎陽成臯之間必計敖倉得失陔下之敗正以彭越田横往來絶楚糧道張良陳平知其食盡以為天亡唐初羣盜紛起亦倚洛口諸倉為重事之利害彼此均同我欲討彼當須先講糧道則彼來侵我豈能無食可全所有淮北地分將來准備大軍進討合用糧斛有司自宜别有措畫其淮南直至江岸廬壽滁和皆前日敵人宿師之地若能依險自為山寨之類即趣令各擇利便早定其所般輦糧斛以備入保其大軍屯駐亦須計𣙜委自兩路漕臣以次津發但令前後相繼不至乏絶不可多存若有人無糧縱能輕入何敢久駐其餘金帛馬草之類皆依倣並行竊慮亦合明降指揮飭江東淮南當職官吏同為措置敵若知此與清野何異實為上䇿八曰戒覈官吏檢㑹前降指揮内一項敵人去冬深入其諸州郡守臣等不能召募忠義勇敢人兵留處城中悉力捍禦共為死守之計又不能措置般移糧食遷徙人民擇深山大澤率衆固守束手端坐敵人既至則以一身逃遁致使一城生靈枉遭塗炭奉聖㫖下江浙諸州如敢依前失行措置止以一身逃避者當明正典刑臣契勘朝廷措置既已備具號令既已明審唯在守之以人承平之時一官不治止廢一官一邑不治止廢一邑利害無所相關至於用兵則環千里之地成敗得失皆相與為先後譬之一身手足耳目各有所司茍廢其一身與之俱故不可使一官不脩其職一人不盡其力昨承平既久玩習成風例不肯以身任責茍簡文具姑應目前一遭警急皆望風先遁逺出疆界遂使生靈陷於塗炭井邑鞠為丘墟及至事定徐還往往反以收復論功事既出倉猝且所干人衆難以盡責因得原釋昔陳豨反代趙周昌奏常山二十五城亡其二十城漢髙祖曰守尉反乎對曰不上曰是力不足亡罪日近新疆敵人驟至城守之計初無素備有官守者棄而來歸朝廷推此以廣仁心茍免降屈貸而不問猶之可也若江南諸郡入有城郭出有兵將所恃有民所資有食咫尺行闕動干大勢豈可不責之以必守乎而人情習慣妄恃寛典尚無慷慨激昻之志夫守以兵者必責之將守以民者必責之吏兵不可使一卒怯而輕退將必先之民不可使一夫懼而輕散吏必先之將能死敵然後兵能死戰吏能死職然後民能死守竊慮亦合明降指揮應備禦之事既已備具將來或有警急輙棄官守妄作縁故逃避出界之人並依軍法從事必罰無赦庶無玩令稍知事君之義右上件所陳皆是朝廷已行之命臣但將案籍檢舉參驗古事稽察人情擇其可以施行責付官吏者講之於無事之時行之於有警之日寧可有備而不用不可當用而無備是用輙敢塵犯天威伏惟陛下寛貸而曲赦之臣無任惶懼激切屏營之至謹錄奏聞伏候勅㫖貼黄臣聞兵家先聲後實臣所陳皆是朝廷已行命令州縣職事所當為但欲檢舉申飭上下協心行之得人使敵人望風知畏不敢輕動而已並無勞民費財之弊昔孫權以葦荻為疑城殆同兒戲而曹丕逺懼符堅淝水之敗望見八公山草木皆成人形而遁去今若預令將士分守其地鄉社團集有所傳之四逺以張國威即廣軍聲過於葦荻草木逺甚伏乞睿察臣今來所陳正是本道職事不敢兼及旁路然界分逺近上連下接如淮東沿海事體一同利害均一如䝉採取即淮東浙西亦合依此施行伏乞睿察夢得為户部尚書奏乞徙敵人必經由州縣居民劄子曰臣竊見冬候漸深金人往來倐忽無常未能保其不南牧先事預備當有萬全不可勝之計臣前嘗妄議敵反用吾術若欲以中國攻中國故凡人馬糧草器械城池皆因我以為用今必禁之使不得行其謀亦在反用其術而已古之外域善待中國者莫若藏其輜重人畜逺引深避而不爭鋒漢武帝初命衛霍連年伐匈奴所至斬首拓地無不如意者以匃奴兵力與漢相當而較勝負故也其後匃奴覺悟作空地避漢之計至公孫賀趙破奴引師深入二千里不見敵而還遂困大漢於是不出兵者幾十年元豐間神宗皇帝鋭意必討西夏經營累歳遂詔五路並入是時天下皆意夏人必可蕩滅然終無成功者亦以夏人盡空其地去之而我無與敵也臣愚竊惟今敵南侵之路不過京東京西與沿汴三處若度其必經由州縣徙其居人令先埋瘞斛㪷錢物各以金銀輕齎四散擇深僻之地逺自藏匿雖馬草並皆盡野燒焚無得存留但能空地數百里彼脅諸國而來者不過以利誘之以結其心乗我潰散以作其勢使所至州縣皆空無所得自巳失望其衆久不見敵則勢亦隨挫設其腹心必欲擾我者若行三日人無糧馬無草凡欲因我為利者皆無所得則雖欲前進可乎議者或恐以動衆不可為是大不然夫擾民動衆戒於承平可也今敵衆所至剽劫之害金珠玉帛盡從攘奪則與藏瘞而存之孰利屠剥之虐父子兄弟盡從殘滅則與奔趨而去之孰重民雖無知必有辨於此者此誠不戰屈人之䇿伏望聖慈特賜睿察命大臣叅酌詳議如有可取乞疾速宻付所在監司州縣將帥令明以利害禍福喻民使保萬全不唯伐敵之謀亦吾保民之計無大於此歴代名臣奏議卷三百三十四
