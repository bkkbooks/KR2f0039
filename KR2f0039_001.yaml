body:
  text: 歷代名臣奏議卷一明楊士竒等撰君德周武王踐阼三日召師尚父而問焉曰黃帝顓帝之道存乎曰在丹書王欲聞之則齊矣齊三日王端冕師尚父亦端冕奉書而入王東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉弗敬則不正枉者滅廢敬者萬世王聞書之言惕若恐懼魯哀公問於孔子曰吾聞君子不博有之乎孔子對曰有之哀公曰何為其不博也孔子對曰為其有二乘哀公曰有二乘則何為不博也孔子對曰為行惡道也哀公懼焉有間曰若是乎君子之惡惡道之甚也孔子對曰惡惡道不能甚則其好善道亦不能甚好善道不能甚則百姓之親之也亦不能甚詩云未見君子憂心惙惙亦既見止亦既覯止我心則恱詩之好善道之甚也如此哀公曰善㦲吾聞君子成人之美不成人之惡微孔子吾焉聞斯言也㦲齊桓公謂鮑叔曰寡人欲鑄大鐘昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍談二年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之㑹以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不讓非仁也背太公之言而侵魯境非義也壇場之上詘於一劒非武也姪娣不離懷衽非文也凡為不善遍于物不自知者無天禍必有人害天處甚髙其聽甚下除君過言天且聞之桓公曰寡人有過乎幸記之是社稷之福也子不幸教幾有大罪以辱社稷楚惠王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾也王曰我食寒葅而得蛭念譴之而不行其罪乎是法廢而威不立也非所以使國聞也譴而行其誅乎則庖宰食監法皆當死心又不忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親惟德是輔君有仁德天之所奉也病不為傷是夕也惠王之後蛭出故其久病心腹之疾皆愈天之視聽不可不察也魏武侯浮西河而下中流顧謂吳起曰美㦲乎河山之固此魏國之寶也吳起對曰在德不在險昔三苖氏左洞庭右彭蠡德義不修而禹滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不德武王伐之由此觀之在德不在險若君不修德舟中之人盡敵國也武侯曰善武侯謀事而當羣臣莫能逮朝而有喜色吳起進曰今者有以楚莊王之語聞者乎武侯曰未也莊王之語奈何吳起曰楚莊王謀事而當羣臣莫能逮朝而有憂色申公巫臣進曰君朝而有憂色何也莊王曰吾聞之諸侯自擇師者王自擇友者霸足巳而羣臣莫之若者亡今以不穀之不肖而議於朝且羣臣莫能逮吾國其幾於亡矣吾是以有憂色也莊王之所以憂而君獨有喜色何也武侯逡巡而謝曰天使夫子振寡人之過也天使夫子振寡人之過也漢成帝即位光祿勳御史大夫匡衡上疏戒妃匹勸經學威儀之則曰陛下秉至孝哀傷思慕不絶於心未有游虞弋射之宴誠隆於慎終追逺無窮巳也竊願陛下雖聖性得之猶復加聖心焉詩云焭焭在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之夲也臣又聞之師曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好仇言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世以來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬逺技能竊見聖德純茂専精詩書好樂無厭臣衡材駑無以輔相善義宣揚德音臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於夲性者也故審六藝之指則天人之理可得而和草木昆蟲可得而育此永永不易之道也及論語孝經聖人言行之要宜究其意臣又聞聖王之自為動靜周旋奉天承親臨朝享臣物有節文以章人倫蓋斂翼祗栗事天之容也溫恭敬遜承親之禮也正躬嚴恪臨衆之儀也嘉惠和說饗下之顔也舉錯動作物遵其儀故形為仁義動為法則孔子曰德義可尊容止可觀進退可度以臨其民是以其民畏而愛之則而象之大雅云敬慎威儀惟民之則諸侯正月朝覲天子天子惟道德昭穆穆以視之又觀以禮樂饗醴乃歸故萬國莫不獲賜祉福蒙化而成俗今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動靜之莭使羣下得望盛德休光以立基楨天下幸甚上敬納其言東漢光武為大司馬時引兵東北拔廣阿披輿地圗指示鄧禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內淆亂人思明君猶赤子之慕慈母古之興者在德厚薄不以大小也建武四年隗囂使馬援往觀公孫述援與述舊同里閈相善以為既至當握手歡如平生而述盛陳陛衛以延援禮饗官屬甚盛欲授以封侯大將軍位賔客皆樂留援曉之曰天下雌雄未定公孫不吐哺走迎國士與圗成敗反修邉幅如偶人形何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如専意東方囂乃使援奉書雒陽初到良久中黃門引入帝在宣德殿南廡下袒幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧說客耳援曰天下反復盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也桓帝延熹二年帝問侍中爰延朕何如主對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黃門與政則亂是以知陛下可與為善可與為非帝曰敬聞闕矣拜五官中郎將靈帝中平五年望氣者以為京師當有大兵兩宫流血帝欲厭之乃發四方兵講武於平樂觀陳三匝而還問討虜校尉蓋勳曰吾講武如是何如對曰先王耀德不觀兵今寇在逺而設近陳不足昭果毅祇黷武耳帝曰善恨見君晚羣臣初無是言也蜀先主時羣臣議欲推漢中王稱尊號前部司馬費詩上疏曰殿下以曹操父子逼主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔髙祖與楚約先破秦者王及屠咸陽獲子嬰猶懷推讓况今殿下未出門庭便欲自立邪愚臣誠不為殿下取也魏文帝問羣臣三不欺于君德孰優大尉鍾繇司徒華歆司空王朗對曰臣以為君任德則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任德感義與夫導德齊禮有恥且格等趨者也任察畏罪與夫導政齊刑免而無恥同歸者也孔子曰為政以德譬如北辰居其所而衆星拱之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在于權衡非徒低昻之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者強仁校其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也強仁者不得巳者也三仁相比則安仁優矣易稱神而化之使民宜之若君化使民然也然則安仁之化與夫強仁之化優劣亦不得不相縣絶也然則三臣之不欺雖同所以不欺異矣則純以恩義崇不欺與以威察成不欺既不可同概而比量又不得錯綜而易處吳烏程侯鳯凰元年中書令賀邵諫曰臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至陛下嚴刑法以禁直辭黜善士以逆諫口杯酒造次死生不保是以正士摧方庸臣茍媚人執反理之評士吐詭道之論遂使仕者以退為幸居者以出為禍非所以保洪緒也何㝎妄興事役發江邉戍兵以驅麋鹿老弱飢凍大小怨歎傳曰國之興也視民如赤子其亡也以民為草芥今法禁轉苛賦調益繁呼嗟之聲感傷和氣且國無一年之儲家無經月之蓄而後宫坐食萬有餘人北敵注目伺國盛衰長江之限不可久恃茍不能守一葦可航也願陛下豐基強本割情從道則聖祖之祚隆矣晉孝武帝時中郎將王坦之上表曰臣聞人君之道以孝敬為本臨御四海以委任為貴恭順無為則盛德日新親仗賢能則政道雍睦昔周成漢昭並以幼年纂承大統當時天下未為無難終能顯揚祖考保安社稷蓋尊尊親親信納大臣之所致也伏惟陛下誕竒秀之姿禀生知之量春秋尚富􅍱道未曠方順訓導以成天德皇太后仁淑之體過於三母先帝奉事積年每稱聖眀臣願奉事之心便當自同孝宗太后慈愛之隆亦不必異所生琅邪王餘姚主及諸皇女宜朝夕定省承受教誨導習儀刑以成景仰恭敬之美不可以屬非至親自為疏疑昔肅祖崩殂成康幼冲事無大小必咨丞相導所以克就聖德實此之由今㒒射臣安中軍臣沖人望具瞻社稷之臣且受遇先帝綢繆繾綣並志竭忠貞盡心盡力歸誠陛下以報先帝愚謂周旋舉動皆應咨此二臣二臣之于陛下則周之旦奭漢之霍光顯宗之於王導沖雖在外路不云逺事容信宿必宜參詳然後情聽獲盡庶事可畢又天聽雖聰不啓不廣羣情雖忠不引不盡宜數引侍臣詢求讜言平易之世有道之主猶尚誡懼日昃不倦况今艱難理盡慮經安危祖宗之基繫之陛下不可不精心務道以申先帝堯舜之風可不敬修至德以保宣元天地之祚表奏帝納之後周武帝保定三年養老於太學以太傅燕國公于謹為三老帝訪治道于謹謹對曰木從繩則正后從諫則聖明王虛心納諫以知得失天下乃安又曰去食去兵信不可去願陛下守信勿失又曰有功必賞有罪必罰則為善者日進為惡者日止又曰言行者立身之基願陛下三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下慎之隋文帝時有人告大都督邴紹非毀朝廷為憒憒者上怒將斬之工部尚書長孫平進諫曰川澤納汙所以成其深山嶽藏疾所以就其大臣不勝至願願陛下𢎞山海之量茂寬裕之德鄙諺曰不癡不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖德上於是赦紹因敕羣臣誹謗之罪勿復以聞唐太宗貞觀初有上書請去佞者太宗謂曰朕之所任皆以為賢卿知佞者誰耶對曰臣居草澤不的知佞者請陛下佯怒以試羣臣若能不畏雷霆直言進諫則是正人順情阿㫖則是佞人帝謂封德彞曰流水清濁在其源也君者政源人庶猶水君自為詐欲臣下行直是猶源濁而望水清理不可得朕常以魏武帝多詭詐深鄙其為人此豈可堪為教令謂上書人曰朕欲使大信行于天下不欲以詐道訓俗卿言雖善朕所不取也太宗嘗從容謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右僕射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而㑹周室雖微六國無罪秦氏専任智力蠶食諸侯平定雖同人情則異太宗曰不然周既尅殷務𢎞仁義秦既得志専行詐力非但取之有異抑亦守之不同祚之修短意在兹乎太宗又謂侍臣曰為君之道必須先存百姓若損百姓奉其身猶割股以啖腹腹飽而身斃若安天下必須先正其身未有身正而影曲上理而下亂者朕每思傷其身者不在外物皆由嗜欲以成其禍若耽嗜滋味玩恱聲色所欲既多所損亦大既妨政事又擾生人且復出一非理之言萬姓為之解體怨讟既作離叛亦興朕每思此不敢縱逸諫議大夫魏徴對曰古者聖哲之主皆近取諸身故能逺體諸物昔楚聘詹何問其理國之要詹何對以修身之術楚王又問理國何如詹何曰未聞身理而國亂者陛下所明實同古義貞觀二年太宗謂侍臣曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懷畏懼昔舜戒禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功又易曰人道惡盈而好謙凡為天子若唯自尊崇不守謙恭者在身儻有不是之事誰肯犯顔諫奏朕每出一言行一事必上畏皇天下懼羣臣天髙聽卑何得不畏羣公卿士皆見瞻仰何得不懼以此思之但知常謙常懼猶恐不稱天心及百姓意也魏徴曰古人云靡不有初鮮克有終願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣堯舜所以太平實用此法六年太宗謂侍臣曰朕聞周秦初得天下其事不異然周則惟善是務積功纍德所以能保七百之基秦乃恣其奢淫好行刑罰不過二世而滅豈非為善者福祚延長為惡者降年不永朕又聞桀紂帝王也以匹夫比之則以為辱顔閔匹夫也以帝王比之則以為榮此亦帝王深耻也朕每將此事以為鍳戒常恐不逮為人所笑魏徴對曰臣聞魯哀公謂孔子曰有人好忘者移宅乃忘其妻孔子曰又有好忘甚於此者丘見桀紂之君乃忘其身願陛下每以此為慮免後人笑八年太宗謂侍臣曰言語者君子之樞機談何容易凡在衆庶出一言不善則人記之成其恥纍况是萬乘之主不可出言有失其所虧損至大豈同匹夫我常以此為戒隋煬帝初幸甘泉宫泉石稱意而怪無螢火敕云捉取多少於宫中照夜所司遽遣數千人採拾送五百輿於宫側小事尚爾况其大乎魏徴對曰人君居四海之尊若有虧失古人以為如日月之蝕人皆見之實如陛下所戒慎九年太宗謂魏徴曰頃讀周齊史末代亡國之主為惡多相類也齊王深好奢侈所有府庫用之略盡乃至關市無不稅斂朕常謂此猶如饞人自食其肉肉盡必死人君賦斂不已百姓既弊其君亦亡齊主即是也然天元齊主若為優劣徴對曰二主亡國雖同其行則别齊主愞弱政出多門國無綱紀遂至亡滅天元性凶而強威福在已亡國之事皆在其身以此論之齊主為劣十六年太宗問魏徴曰朕克巳為政仰企前列至如積德纍仁豐功厚利四者常以為稱首朕皆庶幾自勉人苦不能自見不知朕之所行何等優劣徴曰德仁功利陛下兼而行之然則內平禍亂外除戎狄是陛下之功安諸黎元各有生業是陛下之利由此言之功利居多惟德與仁願陛下自彊不息必可致也太宗時太上皇幸兩儀殿內外羣臣奉見太上皇還西宫太宗從至大安宫還顧謂長孫無忌等曰今天下無事侍太上皇與公等同宴可謂至樂然朕若與公等忘政事但歡宴蓋非常安之法魏徴對曰陛下酣宴之後猶不忘庶政古者堯舜禹湯所以太平實用此道太宗因曰古之人君處廊廟居逸樂臣下一事失所便棄前功解免黜放急遽如此徴對曰人君發怒于一臣將行刑罰而能念其舊功者鮮矣陛下今發德音臣等幸甚太宗曰朕常思自古有天下者皆欲子孫萬代政化過於堯舜及其所行則與堯舜相反如秦始皇亦是英雄之主平定六國已後才免其身至子便失其國桀紂幽厲亦皆喪亡朕為此不得不懼且天下百姓傾耳側目唯看善惡朕豈得不自思之魏徴對曰自古以來人君為難秖為出言即成善惡若人君出言欲聞已過其國即興若出言欲人從已其國即喪古人云一言可以興邦一言可以喪邦正為如此但天下人皆自進于陛下以榮其身若正人即欲以正道輔佐佞人即欲以邪道自媚工巧者則進竒服異器好鷹犬者即欲勸令畋逰所欲自進者不覺為非皆言為是若陛下常守正道則姦人不能自效如開其路則人人欲遂其心矣太宗曰然太宗謂侍臣曰朕觀隋主文集博物有才亦知恱堯舜之風醜桀紂之行然而行事即與言相違何也魏徴對曰自古稱人主之善在有君人之量能任使人智者為之謀勇者為之戰雖聰明聖哲以黈纊冕旒垂耳目隋主雖有俊才無人君之量恃才驕物所以至于滅亡太宗曰然昔漢武征役不息户口減半中途能改還得傳祚子孫向使隋主早悟亦不至滅亡也太宗又謂侍臣曰齊文宣何如人魏徴對曰非常顛狂然與人共爭道理自知短屈即能從之臣聞齊時魏愷先任青州長史嘗使梁還除光州長史不就楊遵彥奏之文宣帝大怒召而責之愷曰臣先任青州大藩長史今有使勞更無罪過反授小州所以不就乃顧謂遵彥曰此漢有理因令捨之太宗曰往者盧祖尚不肯受官朕遂殺之宣帝雖顛狂尚能容止此事朕所不如也祖尚不受處分雖失臣之禮朕即殺之大是傷急一死不可再生悔所無及宜復其官䕃徴容貌不逾中人而有膽略善回人主意每犯顔苦諫或上怒甚亦為之霽威上嘗得佳鷂自臂之望見徴來匿懷中徴奏事故久鷂竟死懷中嘗謁告上冢還言于上曰人言陛下欲幸南山嚴裝巳畢而竟不行何也上笑曰初實有此心畏卿嗔故中輟耳太宗謂右僕射李靖等曰人君之道唯在寬厚非但刑戮乃至鞭撻亦不欲行比每人嫌朕大寬未知此言可行否魏徴對曰古來帝王以殺戮肆威者實非久安之策臣等見隋煬帝初有天下亦大威嚴而官人百姓造罪非一今陛下仁育天下萬姓獲安臣下雖愚豈容不識恩造太宗曰公等假以為非朕終不改此志太宗又嘗謂侍臣曰朕每日坐朝欲出一言即思此一言於百姓有利益否所以不能多言給事中兼知起居事杜正倫進曰君舉必書言存左史臣職當兼修起居注不敢不盡愚直陛下若一言乖于道理則千載纍于聖德非止當今損于百姓願陛下慎之太宗大恱賜綵百段幽州總管府記室兼直中書省張藴古奏上大寶針其詞曰今來古往俯察仰觀惟辟作福為君實難宅普天之下處王公之上任土貢其所求具僚和其所唱是故兢懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸罪於巳因心於人至眀無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居髙聽卑勿謂何害積小成大樂不可極極樂成哀欲不可縱縱欲成災壯九重於內所居不過容膝彼昏不知瑤其臺而瓊其室羅八品於前所食不過適口唯狂罔念丘其糟而池其酒勿內荒於色勿外荒於禽勿貴難得之貨勿聽亡國之音內荒伐人性外荒蕩人心難得之物侈亡國之聲淫勿謂我尊而傲賢侮士勿謂我智而拒諫矜巳聞之夏后授饋頻起亦有魏帝牽裾不止安彼反側如春陽秋露巍巍蕩蕩推漢髙大度撫兹庶事如履薄臨深戰戰栗栗用周文小心詩云不識不知書曰無偏無黨一彼此於胸臆捐好惡於心想衆棄而後加刑衆恱而後命賞弱其強而治其亂伸其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自具如水如鏡不示物以情物之鑑者妍蚩自露勿渾渾而濁勿皎皎而清勿汶汶而暗勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心乎湛然之域逰神於至道之精扣之者應洪纎而效響酌之者隨深淺而皆盈故曰天之清地之寧王之貞四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終爰述金鏡窮神盡聖使人以心應言以行苞括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹唯人所召自天祐之爭臣司直敢告前疑太宗嘉之賜帛三百段仍授以大理寺丞太宗問給事中孔頴達曰論語云以能問於不能以多問於寡有若無實若虛何謂也孔頴達對曰聖人設教欲人謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶以為少仍就寡少之人更求所益已之雖有其狀若無已之雖實其容若虛非惟匹庶帝王之德亦當如此夫帝王內藴神明外須𤣥默使深不可知故易稱以蒙養正以明夷蒞衆若其位居尊極炫耀聰明以才陵人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗曰易云勞謙君子有終吉誠如卿所說詔賜帛二百段太宗每與公卿言及古道必詰難往復散騎常侍劉洎上書諫曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對極尊徒思自強不可得也陛下降恩㫖假怒顔凝旒以聽其言虛襟以納其說猶恐羣下未敢對揚况動神機縱天辨飾辭以折其理援古以排其議欲令凡蔽何階應答臣聞皇天以無言為貴聖人以不言為聖老君稱大辨若訥莊生稱至道無文此皆不欲煩也是以齊侯讀書輪扁竊議漢皇慕古長孺陳譏此亦不欲勞也且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所致欲其長久匪由辨博但當忘彼愛憎慎兹取舍每事敦朴無非至公若貞觀之初則可矣至於秦政強辨失人心於自矜魏文宏才虧衆望於虛說此才辨之纍皎然可知伏願略兹雄辨浩然養氣簡彼緗圗淡焉怡悅自固萬夀於南嶽齊百姓於東户則天下幸甚皇恩斯畢上飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由斯道形神心氣非此為勞今聞讜言虛懷以改太宗嘗謂侍臣曰傳稱去食存信孔子曰人無信不立昔項羽既入咸陽巳制天下向使能行漢髙之仁信誰能奪邪房𤣥齡對曰仁義禮智信謂之五常廢一不可能勤行之甚有禆益殷紂狎侮五常而武王伐之項氏以無仁信為漢祖所奪皆誠如聖旨著作郎郤崇表請編次太宗文章為集太宗謂崇曰朕若制事有益於人者史則書之足為不朽若不師古亂政壞物雖有詞藻終貽後代笑非所須也祇如梁武帝父子及陳後主隋煬帝亦大有文集而所為多不法宗社皆須㬰傾覆凡人主唯在德行何必要事文章耶竟不許太宗嘗曰隋煬帝性好猜防専言邪道大忌胡人乃至謂胡床為交床胡瓜為黃瓜築長城以備胡終被宇文化及使令狐行達殺之又誅戮李金才及諸李殆盡卒何所益且居天下者唯正身修德而巳此外虛事不足在懷太宗又嘗謂羣臣曰朕為人主兼行將相事豈不是奪公等名舜禹湯武得稷卨伊吕而四海安漢髙祖有蕭曹韓彭而天下寧兹事朕皆兼之給事中張行成退上疏曰有隋失道天下沸騰陛下撥亂反正拯人塗炭何周漢君臣所能比數雖然盛德含光規模宏逺左右文武誠無將相材奚用大庭廣衆與之量校損萬乘之尊與臣下爭功㦲帝嘉納之帝又問侍臣曰自古帝王雖平中夏不能服夷狄朕才不逮古人而成功過之何也羣臣稱頌功德上曰不然朕所以能及此者止由五事耳自古帝王多疾勝巳者朕見人之善若巳有之人之行能不能兼偹朕常棄其所短取其所長人主往往進賢則欲置諸懷退不肖則欲推諸壑朕見賢者則敬之不肖者則憐之人主多惡正直隂誅顯戮無代無之朕踐阼以來正直之士比肩於朝未嘗黜責一人自古皆貴中華賤夷狄朕獨愛之如一故其部落皆依朕如父母此五者朕所以成今日之功也肅宗嘗從容與侍謀軍國元帥長史李泌語及李林甫欲敇諸將克長安日發其冢焚骨揚灰泌曰陛下方定天下奈何讎死者彼枯骨何知徒示聖德之不𢎞耳且方今從賊者皆陛下之讎也若聞此舉恐沮其自新之心上不恱德宗時渾瑊破朱泚走之奉天圍解從臣皆賀汴滑兵馬使賈隱林進言曰陛下性太急不能容物若此性未改雖泚敗亡憂未艾也上甚稱之敬宗遊幸無常昵比羣小視朝月不再三大臣罕得進見浙西觀察使李德裕上言曰臣聞詩云心乎愛矣遐不謂矣此古之賢人所以篤於事君者也夫迹踈而言親者危地逺而意忠者忤然臣竊念拔自先聖偏荷寵光若不愛君以忠則是上負靈鑑臣頃事先朝屬多隂沴常獻大明賦以諷頗䝉先朝嘉納臣今日盡莭明主亦猶是心昔張敞之守逺郡梅福之在遐徼尚竭誠盡規不避尤悔况臣嘗學舊史頗知官針雖在踈逺猶思獻替謹稽首上丹扆六針具列於後仰塵睿覽伏積兢惶一宵衣先王聽政昧爽以俟雞鳴既盈日出而視伯禹大聖寸隂為貴光武至仁反支不忌無俾姜后猶去簮珥彤管記言克念前志二正服聖人作服法象可觀雖在宴逰尚不懷安汲黯莊色能正不冠楊阜毅然亦譏縹紈四時所御各有其官非此勿服惟辟所難三罷獻漢文罷獻詔還騄駬鑾輅徐驅安用千里厥後令王亦能恭已翟裘既焚筒布則毁道德為麗慈儉為美不過天道斯為至理四納誨惟后納誨以求厥中從善如流乃能成功漢成沉湎舉白浮鍾魏明侈汰淩霄作宫中雖不忤而善不從以規為瑱是謂塞聰五辨邪居上處深在察微萌雖有讒慝不能蔽明漢之孝昭睿過周成上書知詐照奸得情燕蓋既折王猷洽平百代之後乃流淑聲六防微天子之孝敬遵王度安必思危乃無遺慮亂臣猖蹶非可遽數𤣥黃莫辨觸瑟始仆柏谷微行豺豕塞路覩貌獻飱斯可誡懼文宗嘗顧鄭覃曰覃老矣當無妄試論我猶漢何等主覃曰陛下文宣主也帝曰渠敢望是領度支李石欲彊帝志使不怠因曰陛下之問而覃之對臣皆以為非顔回匹夫耳自比於舜陛下有四海春秋富當觀得失於前日引月長以齊堯舜奈何比文宣而又自以為不及惟陛下開肆厥志不以文宣自安則大業濟矣後唐明宗時水運軍將於臨河縣得一玉杯有文曰傳國寶萬嵗杯明宗甚愛之以示中書侍郎馮道道曰此前世有形之寶爾王者固有無形之寶也明宗問之道曰仁義者帝王之寶也故曰大寶曰位何以守位曰仁明宗武君不曉其言道已去召侍臣講說其義嘉納之宋真宗咸平三年田錫知泰州召歸進經史子集要語奏曰臣聞古者帝王盤盂皆銘几杖有誡起居必覩夙夜不忘故湯之盤銘曰德日新日日新太公之金匱云武王欲造起居之誡乃銘於几杖曰安無忘危存無忘亡孰惟二者後必無凶墨子曰堯舜禹湯書其事於竹帛篆之盤盂曰君子福大而愈懼爵隆而益恭逺察近視俯仰有則矧黃帝輿几皆銘焉曰吾居民之上惴惴恐不及武王户席必訓焉席之銘曰無行可悔户之銘曰難得而易失聖人修德罔怠然佩服鑑戒終日不忘故至德大業永保天下也臣又嘗讀唐書見髙宗命黃門侍郎趙智講孝經於百福殿因謂之曰大旨朕知之矣即舉此經要切處言之以禆不逮智曰天子有爭臣七人雖無道不失其天下微臣敢以此言上獻帝大悅又憲宗聽政之暇採漢史三國以來經濟要事撰書十四篇號曰前代君臣事跡書之六扇屏風置於御座之右出入觀省之臣每覽經史子集因取其要語總一十卷輒用進獻可書於屏置之御座出入觀省所冀聖德日新與堯舜禹湯文武比隆也景德間崇文院檢討陳彭年獻大寶針曰二儀之內最靈者人生民之中至大者君民既可畏天亦無親所輔者德所歸者仁恭已御下輝光益新載籍斯在謀猷備陳內綏萬姓外撫百蠻治亂所始言動之間觀之則易處之甚難由是先哲喻彼投艱茍能慮未乃可防間審求逆耳無惡犯顔既庶而富教化乃施慈儉之政富庶之基鰥寡孤獨人之所悲發號施令宜先及之黃髮鮐背心實多知左右侍從何尚於兹瞻言百辟咸代天工儻無虛授可建大中克彰慎柬惟藉至公知人則哲聽德則聰才固難備道亦少同葑菲罔捨杞梓乃充不扶自直惟蓬在麻非揀莫見惟金在沙參備顧問必辨忠邪獻替以正禆益無涯自匿草澤亦有國華訪此髦士可拒朋家三章之立庶民作程欽㦲恤㦲可以措刑七伐之建姦孽是平本仁本義可以弭兵是為齊禮亦曰好生有教無類自誠而明宗廟社稷饗之以恭宫室苑囿誡之在豐春搜秋獮不廢三農擊石拊后用格神宗使人以悅乃克成功治國以政罔或不從濟濟多士用之有光硜硜小器謀之弗臧忠言致益豈讓膏梁六藝為樂寧後笙簧任賢勿二堯所以昌改過不吝湯所以王六合至廣萬彚攸多風俗靡一嗜欲相摩如馭朽索若防決河左契斯執六轡遂和導之以德民免嬰羅不懈于位俗乃偃戈先王之訓罔不咸然吾君之治亦取斯焉小心翼翼終日乾乾三靈降鑑百祿無愆由兹率土永戴光天巍巍洪業億萬斯年仁宗至和二年翰林學士歐陽修上奏曰臣聞自古有天下者莫不欲為治君而常至於亂莫不欲為明主而常至於昏者其故何哉患於好疑而自用也夫疑心動於中則視聽惑於外視聽惑則忠邪不分而是非錯亂是非錯亂則舉國之臣皆可疑盡疑其臣則必自用其所見夫以疑惑錯亂之意而自用則多失失則其國之忠臣必以理而爭之爭之不切則人主之意難回爭之切則激其君之怒心而堅其自用之意然後君臣爭勝於是邪佞之臣得以因隙而入希旨順意以是為非以非為是惟人主之所欲者從而順之夫為人主者方與其臣爭勝而得順意之人樂其助巳而忘其邪佞也乃與之并力以拒忠臣夫為人主者拒忠臣而信邪佞天下無不亂人主無不昏也自古人主之用心非惡忠臣而喜邪佞也非惡治而好亂也非惡明而欲昏也以其好疑自用而與臣下爭勝也使為人主者豁然去其疑心而回其自用之意則邪佞逺而忠言入則聰明不惑而萬事得其宜使天下尊為明主萬世仰為治君豈不臣主俱榮而樂哉與其區區自執而與臣下爭勝用心益勞而事益惑者相去逺矣臣聞書載仲虺稱湯之德曰改過不吝又戒湯曰自用則小成湯古之聖人也不能無過而能改過此其所以為聖也以湯之聰明其所為不至於繆戾矣然仲虺猶戒其自用則古之人主惟能改過而不敢自用然後得為治君明主也臣伏見宰臣陳執中自執政以來不叶人望纍有過惡招致人言而執中遷延尚玷宰府陛下憂勤恭儉仁愛寬慈堯舜之用心也推陛下之用心天下宜至於治者久矣而紀綱日壞政令日乖國日益貧民日益困流民滿野濫官滿朝其亦何為而致此由陛下用相不得其人也近來宰相多以過失因言者罷去陛下不悟宰相非其人反疑言事者好逐宰相疑心一生視聽既惑遂成自用之意以謂宰相當由人主自去不可因言者而罷之故宰相雖有大惡顯過而屈意以容之彼雖惶恐自欲求去而屈意以留之雖天災水旱飢民流離死亡道路皆不暇顧而屈意以用之其故非他直欲阻言事者爾言事者何負於陛下哉使陛下上不顧天灾下不恤人言以天下之事委一不學無識諂邪狠愎之執中而甘心焉言事者本欲益於陛下而反損聖德者多矣然而言事者之用心本不圗至於此也由陛下好疑自用而自損也今陛下用執中之意益堅言事者攻之愈切陛下方思有以取勝於言事者而邪佞之臣得以因隙而入必有希合陛下之意者將曰執中宰相不可以小事逐不可使小官動搖甚者則誣言事者欲逐執中而引用他人陛下方患言事者上忤聖聰樂聞斯言之順意不復察其邪佞而信之所以拒言事者益峻用執中益堅夫以萬乘之尊與三數言事小臣角必勝之力萬一聖意必不可回則言事者亦當知難而止矣然天下之人與後世之議者謂陛下拒忠言庇愚相以陛下為何如主也前日御史論梁適罪惡陛下赫怒空臺而逐之而今日御史又復敢論宰相不避雷霆之威不畏權臣之禍此乃至忠之臣也能忘其身而愛陛下者也陛下嫉之惡之拒之絶之執中為相使天下水旱流亡公私困竭而又不學無識憎愛挾情除改差繆取笑中外家私穢惡流聞道路阿意順旨専事逢君此乃諂上傲下愎戾之臣也陛下愛之重之不忍去之陛下睿智聰明羣臣善惡無不照見不應倒置如此直由言事太切而激成陛下之疑惑爾執中不知廉恥復出視事此不足論陛下豈忍因執中上纍聖德而使忠臣直士卷舌於明時也臣願陛下豁然回心釋去疑慮察言事者之忠知執中之過惡悟用人之非法成湯改過之聖遵仲虺自用之戒盡以御史前後章疏出付外廷議正執中之過惡罷其政事别用賢材以康時務以拯斯民以全聖德則天下幸甚臣以身叨恩遇職在論思意切言狂罪當萬死嘉祐中知諫院司馬光陳論三德劄子曰臣伏蒙聖恩不以臣無似擢臣為諫官臣自幼學先王之道意欲有益於當時是以雖在外方為他官猶願竭其愚心陳國家之所急况今立陛下之左右以言事為職陛下仁聖聰明求諫不倦羣臣雖有狂狷愚妄觸犯忌諱陛下皆含容寬貸未嘗加罪誠微臣千載難逢之際茍不以此時傾輸胸腹之所有以副陛下延納之意則不可以自比于人死有餘罪矣臣竊惟人君之大德有三曰仁曰明曰武仁者非嫗煦姑息之謂也興教化修政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂也知道義識安危别賢愚辨是非此人君之明也武者非彊亢暴戾之謂也惟道所在斷之不疑姦不能惑佞不能移此人君之武也故仁而不明猶有良田而不能耕也明而不武猶視苖之穢而不能耘也武而不仁猶知穫而不知種也三者兼備則國治彊闕一焉則衰闕二焉則危三者無一焉則亡自生民以來未之或改也臣不勝區區觸死忘生竊見陛下天性慈惠慎微接下子育元元泛愛羣生雖古先聖王之仁殆無以過然自踐阼以來垂四十年夙夜孜孜以求至治而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不肖不能宣揚聖化將陛下之於三德萬分之一亦有所未盡歟臣聞春秋傳曰賞慶刑威曰君臣幸得以修起居注日侍黼扆之側伏見陛下推心御物端拱淵默羣臣各以其意有所敷奏陛下不復詢訪利害考察得失一皆可之誠使陛下左右前後股肱耳目之臣皆忠實正人則如此至善矣或出於不意有一姦邪在焉則豈可不為之寒心哉夫善惡是非相與混殽若待之如一無所别白或知其善而不能賞知其惡而不能罰則為善者日懈為惡者日勸善者懈惡者勸雖有堯舜禹湯文武之君稷契伊吕周召之臣以之求治猶鑿氷而取火適楚而北行也伏惟陛下少垂聖思以天授之至仁廓日月之融光奮乾剛之威斷善無微而不録惡無細而不誅則唐虞三代之隆何逺之有此臣愚淺所見不敢不陳仁宗時天下久無事參知政事宋綬慮宴樂有漸乃上言人心逸於久安而患害生於所忽故立防於無事銷變于未萌事至而應不亦殆歟勵羣司不以承平自怠又上馭下之道有三臨事尚乎守當機貴乎斷兆謀先乎密能守則奸不能移能斷則邪不能惑能密則事不能撓願陛下念之至若深居燕閒聲味以調六氣節宣以順四時保養聖躬宗社之休也知制誥田況嘗面奏事論及政體帝頗以好名為非意在遵守故常況退而著論上之其略曰名者由實而生非徒好而自至也堯舜三代之君非好名者而鴻烈休德倬若日月不能纎晦者有實美而然也設或謙弱自守不為恢閎睿明之事則名從而晦矣雖欲好之豈可得耶方今政令寬弛百職不修二虜熾結淩慢中國朝廷恫矜下民橫罹殺掠竭瀝膏血以資繕備而未免侵軼之憂故屈就講和為翕張豫奪之術自非君臣朝夕恥憤大有為以遏後虞則勢可憂矣陛下若恐好名而不為則非臣之所敢知也陛下儻奮乾剛明聽斷則有英睿之名行威令懾姦宄則有神武之名斥奢泰革風俗則有崇儉之名澄冗濫輕㑹斂則有廣愛之名恱亮直惡諂媚則有納諌之名務咨詢逹壅蔽則有勤政之名責功實抑偷幸則有求治之名今皆非之而不為則天下何所望乎抑聞聖賢之道曰名教忠誼之訓曰名節羣臣諸儒所以尊輔朝廷紀綱人倫之大本也陛下從而非之則教化微節義廢無恥之徒爭進而勸沮之方不行矣豈聖人率下之意耶判許州賈昌朝召對邇英閣帝問乾卦昌朝上奏曰乾之上九稱亢龍有悔悔者凶災之萌爻在亢極必有凶災不言凶而言悔者以悔有可凶可吉之義修德則免悔而獲吉矣用九見羣龍無首吉聖人用剛健之德乃可决萬機天下久盛柔不可以濟然亢而過剛又不能久獨聖人外以剛健決事內以謙恭應物不敢自矜為天下首乃吉也手詔優答英宗即位初知諌院司馬光乞簡省細務不必盡關聖覽劄子曰臣聞臯陶贊於舜曰元首明哉股肱良哉庶事康哉蓋言人君明則百官得其人百官得其人則衆事無不美也又曰元首叢脞哉股肱惰哉萬事隳哉蓋言人君細碎無大略則羣臣不盡力羣臣不盡力則萬事皆廢壞也此二者治亂之至要也荀子曰明主好要暗主好詳主好要則百事詳主好詳則百事廢壞為人君者自有職事固不當詳察細務也然則人君之職謂何臣愚以為量材而授官一也度功而加賞二也審罪而行罰三也材有長短故官有能否功有髙下故賞有厚薄罪有大小故罰有輕重此三者人君所當用心其餘皆不足言也臣伏見國家舊制百司細事如三司鞭一胥史開封府補一廂鎮之類往往皆須奏聞崇政殿所引公事有軍人武藝國馬芻秣之類皆一一躬親閲視此蓋國初艱難權時之制施於今日頗傷煩碎陛下龍興撫運聖政惟新臣愚以為宜令中書樞密院檢詳中外百司自來公事須申奏取旨及後殿所引公事其間不繫大體非人君所宜身親者悉從簡省委之有司陛下養性安身以専念人君之三職足以法天地之易簡致虞舜之無為誠天下幸甚治平二年光又奏曰臣聞書曰面稽天若詩曰文王陟降在帝左右蓋言王者為天之子不敢不朝夕小心祗畏其命如在其上如在其左右也是故洪範九疇以五行為本言王者當祗順五行之性內謹五事以治身外修八政以治國正五紀以承天序折衷於皇極之道登用三德之人又參合以龜筮之謀察風雨寒燠之來以省得失知休咎導迎五福避逺六極此萬世不易之道也臣不勝狂愚忘生觸死伏見陛下即位以來災異甚衆日有黑子江淮之水或溢或涸去夏霖雨涉秋不止京畿東南十有餘州廬舍沉於深淵浮苴棲于木末老弱流離捐瘠道路妻兒之價賤於犬豕許潁之間親戚相食積尸成丘既而歷冬無雪暖氣如春草木早榮繼以黑風今夏癘疫大作彌漫數千里病者比屋喪車交路至秋幸而豐熟百姓欣然庶獲蘇息未及收穫而暴雨大至一晝之間川澤皆溢溝渠逆流原隰丘陵悉為洪波一苖半穗蕩無孑遺都城之內道路乘桴城闕摧圮官府倉廪軍壘民居覆沒殆盡死於壓溺者不可勝紀耆耋之人皆言耳目所記未嘗覩聞此乃曠古之極異非常之大災陛下安得不側身恐懼思其所以致此之咎乎臣性愚學淺不足以窺測天意竊以書曰天聰明自我民聰明天明畏自我民明威又曰天視自我民視天聽自我民聽然則災異之來不在于他茍人心和恱則天道無不順矣詩曰亹亹文王令聞不已又曰如圭如璋令聞令望古之聖王未有不先其令名而能行其政於天下者也臣伏見陛下踐阼之初上自宰輔次及朝臣下逮閭閻細民士伍廝養無不翕然同辭稱頌聖德如出一口皆云方今皇族奉朝謁者八百餘人陛下仁孝聰明為之首冠知人疾苦識其情僞節儉愛物剛果能斷既美先帝知人之明又慶已身逢時之幸涕泣共談悲喜相半臣愚以為昔漢惠帝無子而得文帝仁儉謙恭百姓富饒幾致刑措昭帝無子而得宣帝勤惠明斷吏良民樂號稱中興然則國無嗣子而旁親入繼未必不為天意福祐社稷而光啓聖賢也私心自幸又甚於衆人俄而聖躬有疾上下之人思殺身為牲粉骨為藥庶祈早瘳以觀聖政不意數月之後道塗之議稍異於前頗有謗言不專稱美逮乎周嵗之外則頌者益寡謗者益多臣竊伏於闕門之外日聞衆論不勝悵恨痛心疾首晝而忘食夕而忘寢為陛下深思其故終不能明意者陛下於舉動循守之間萬一有所未思乎敢以愚慮言之蓋有三焉惟陛下寬其罪使得畢其辭竊以皇太后仁明之德爰自先朝布聞四方加之保育聖躬在於襁褓陛下入承大統不可謂全非皇太后之力當陛下初得疾之時外間傳言皇太后於先帝梓宫之前為陛下叩頭祈請額為之傷如此豈可謂無慈愛之心於陛下哉不幸為讒賊之人交相離間遂使兩宫之情介然有隙就使皇太后有不慈于陛下陛下為人之子安可校量曲直遂生忿恨而于愛恭之心有所不備乎傳曰大德滅小怨先帝擢陛下於衆人之中自防禦使升為天子唯以一后數公主屬於陛下而梓宫在殯已失皇太后之歡心長公主數人皆屏居閒宫希曽省見臣請以小喻大設有閭里之民家有一妻數女及有數畝之田一金之産老而無子養同宗之子以為後其人既沒其子得田産而有之遂踈母棄妹使之愁憤怨歎則鄰里鄉黨之人謂其子為何如人哉以匹夫而為此行猶見貶於鄉里況以天子之尊為四海所瞻仰哉此陛下所以失人心之始也先帝天性寬仁重違物意晚年嬰疾厭倦萬幾遂以天下之事􅊖委之兩府兩府或見有所偏或意有所私取捨黜涉未必皆當又巧設幸門進拔所愛超資越級欺罔衆人抑壓孤寒無所伸訴及陛下即位皆謂必能奮發乾剛昭明君德收取威福復還王室進賢退愚賞善罰惡使海內廓然立見太平而陛下益事謙遜深自晦匿凡百奏請不肻與奪動循舊例不顧事情謹於細務忽於大體知人之賢不能舉知人不肖不能去知事之非不能改知事之是不能從大臣専權甚於先朝率意差除無所顧忌或非材而驟進或有罪而見寬此天下所以重失望也臣聞書曰木從繩則正后從諫則聖是以堯稽于衆舍已從人舜好問而好察邇言禹聞善言則拜湯用人猶巳改過不吝此四聖人者豈其才智之不足㦲然猶孜孜汲汲下詢愚賤之人者蓋以四海之廣萬幾之衆非一人所能獨知必資天下之耳目思慮然後能曲盡其理也陛下聖質雖美亦當取法於堯舜禹湯而即政以來或意有所見執之不移如堅守嚴城禦敵外寇使羣臣之言皆無自而入殆非所以納百川而成巨海也孔子曰人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎是故明君之於聽納無彼無我無親無踈無先無後惟其是而巳矣若重我所有而輕彼所陳信其所親而疑其所賤主先入之言而拒後來之議則雖有是者亦不可得而見矣夫人心之所好者視醜以為美所惡者視善以為惡茍能以平心察之則是非易見矣書曰有言逆于汝心必求諸道有言遜于汝志必求諸非道若必待合于聖意則恱而從之不合則怒而棄之臣恐讒諂日進方正日踈殆非所以增社稷之福也又國家置臺諌之官為天子耳目防大臣壅蔽朝廷政事皆大臣相與裁定然後施行而臺諫或以異議干之陛下當自以聖意察其是非可行則行可止則止今乃復付之大臣彼安肻以已之所行為非而以他人所言為是乎此乃陛下所以獨取拒諫之名而大臣坐得専權之利者也夫以君相之重何啻泰山賤臣之輕何啻雞卵乃欲相與校其勝負臣固知其不敵矣是以四方懷忠之士願效區區者皆望風不進結舌沮氣此天下所以又失望也凡此三者在列之臣皆知其不可而上畏嚴誅下避怨怒莫敢以此極言聞於陛下使海內憤鬱之氣積而不發宜其有以感動天地之和矣臣聞天意保佑王者故為之下災異以譴告之若王者恐懼修省則非徒免一時之害又將有福祿隨之商之太戊武丁周之成宣是也若傲忽不顧非徒為害於一時又將有危亡之禍漢之成哀桓靈是也今災異之來意者皇天亦將保佑陛下以成商周之美乎臣願陛下上稽天意下順人心於此三者皆留聖念奉事皇太后愈加孝謹務得歡心諸長公主時加存撫無令失所總攬大柄勿以假人選用英俊循名責實賞功罰罪捨小取大剗塞弊幸一新大政延納讜言虛心從善皆行之以至誠非特為空言而巳夫至誠可以動金石而況人乎不誠不足以感匹夫而況天乎詩云無曰髙髙在上陟降厥士日監在兹天雖至髙視聽甚邇人之所為發於中心則天已知之固不待見其容貌形於聲音也陛下果能盡誠於此則聖德日新令名四逹人心既恱天道自和百穀蕃昌嘉瑞並至蠻夷率服福流子孫矣臣自知不才無補朝廷然不敢遂自塞默復有所陳惟陛下裁察臣光昧死再拜上疏英宗時起居舍人傅堯俞上奏曰臣聞自古受命之君未有不上對天意而下順人心者也夫受命者非他天意所嚮而人心所歸耳其所以上對下順者亦非他恭儉仁孝耳臣伏見陛下越自藩邸入繼大統中外欣戴若厯試之久者可以驗人心之歸矣踐阼之初過哀生疾臣民傾耳未聞德音將越三時而天下晏然無一事者可以驗天意之嚮矣然臨朝淵默未决政事不知陛下務為謙抑耶將起居之間尚有所未適耶以為未適則當親近藥物如曰謙抑則亦已至矣伏望陛下察昊穹眷祐之深念先帝顧託之重思皇太后援助之勞顧天下瞻望之極宣暢言意總覽萬機出則親禮大臣委曲以通其志延見近侍講摩以輔其闕入則奉養母后順承乎顔色撫育諸主務隆乎慈愛恭以久其德儉以豐其財簡去思慮一歸至誠夫誠之至金石為開矧嚮陛下之天意而歸陛下之人心詎有不通者乎思慮之煩適足害正維至誠以定其心大公以措諸事靜者勿撓而來則應之尚何思慮之多也行此足以受多福泮羣疑茍異于是非臣所知臣雖甚愚誠恐天意不可以久咈人心不可以久鬱四聖大業百年神器願陛下念之毋忽小臣無狀輒獻孤忠干冒天威伏俟斧鉞給事中王疇上疏曰董仲舒為武帝言天人之際曰事在勉彊而已勉彊學問則聞見廣而智益明勉彊行道則德日進而大有功陛下起自列邸光有天命然而祖宗基業之重天人顧享之際所以操心治身正家保國者尤在於勉彊力行也陛下昔在宗藩已能務德好學語言舉動未嘗越禮是天性有聖賢之資自疾平以來于兹半嵗而臨朝髙拱無所可否羣臣關白軍國之政者日益至其請人主財決者日益多然猶聖心盤桓無所是非者何也得非以初繼大統或慮未究朝廷之事故謙抑而未遑耶或者聖躬尚未寧而不欲自煩耶抑有所畏忌而不言耶茍為謙抑而未遑則國家萬務日曠月廢其勢將趨於禍亂無疑也若聖躬未能寧則天下之名醫良工日可召於前而方技不試藥石不進養疾於身坐俟嵗月非求全之道也茍有所畏忌而不言則又過計之甚也今中外之事無可疑畏臣嘗為陛下力言之矣陛下何不坦心布誠廓開大明以照天下外則與執政大臣講求治體內則於母后請所未至延禮賢俊咨訪忠直廣所未見逹所未聞若陛下朝行之則衆心夕安矣况陛下向居藩邸日夕于側者惟一二講學之師與左右給事之人耳修身行已德業日新而知者無幾則是為善多而得名常少也然而終能德成行尊美名逺聞此先帝之所以屬心也今處億兆之上有一言動則天下知之簡冊書之比之於昔是善行易顯而美名易成也然而尚莫之聞者是不為爾非不能也有始有終者聖賢之能事在陛下勉彊而巳歷代名臣奏議卷一
