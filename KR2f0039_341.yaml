body:
  text: 歷代名臣奏議卷三百四十一明楊士竒等撰四裔唐髙祖武德三年謂左右曰名實須相副髙麗雖臣於隋而終拒煬帝何臣之為朕務安人何必受其臣溫彥博等諫曰遼東本箕子國魏晋時故封內不可不臣中國與外域猶太陽於列星不可以降乃止五年突厥寇并州命太子建成秦王世民禦之唐主謂羣臣曰和戰孰利鄭元璹曰戰則禍深不如和利封德彛曰突厥恃兵革之衆有輕中國之意若不戰而和示之以弱明年將復來臣愚以為擊之既勝而後與和則恩威兼著矣唐主從之六年并州總管劉世讓除廣州總管將之官唐主問以備邉之策世讓對曰突厥比數為寇良以馬邑為之中頓故也請以勇將戍崞城多貯金帛募有降者厚賞之數出騎兵蹂其禾稼敗其生業不出嵗餘彼無所食必降矣唐主然其計曰非公誰為勇將命世讓戍崞城突厥患之七年突厥入寇或說上曰突厥所以屢寇關中者以子女玉帛皆在長安故也若焚長安而不都則敵冦自息矣上欲從之秦王世民諫曰異域為患自古有之陛下以聖武龍興所征無敵奈何為此舉貽四海之羞為萬世之笑乎願假數年之期臣請係頡利之頭致之闕下若其不效遷都未晚上曰善八年西突厥統葉護可汗遣使請昏上以問裴矩對曰今北寇方彊國家且當逺交而近攻臣謂宜許其昏以威頡利俟數年之後徐思其宜耳上從之太宗即位梁師都所部離叛國浸衰弱乃朝於突厥勸令入寇於是頡利突利二可汗合兵十餘萬冦涇州頡利進至渭水便橋之北遣其腹心執矢思力入見以觀虗實思力盛稱二可汗將兵百萬今已至矣乃請返命上讓之曰吾與汝可汗靣結和親贈遺無算今汝可汗背盟入寇於我無愧汝為彼臣理宜諌止何得全忘大恩自誇強盛我今先斬汝矣思力懼而請命蕭瑀封德彛請禮而遣之上曰不然今者放還必謂我懼乃遣囚之上乃自與髙士廉房𤣥齡等六騎徑詣渭水上與頡利隔水而語責以負約突厥大驚皆下馬羅拜俄而諸軍繼至旌甲蔽野頡利見思力不返而上輕出軍容甚盛有懼色上麾諸軍使却而布陳獨留與頡利語蕭瑀叩馬固諌上曰突厥所以敢傾國而來者聞我家國新有內難又聞朕新即位謂我不能抗禦也我若示之以弱彼必放兵大掠不可復制故朕輕騎獨出示若輕之震曜軍容使知必戰彼既深入必有懼心與戰則克與和則固制服突厥在此舉矣是日頡利來請和詔許之斬白馬與盟于便橋之上突厥引兵退蕭瑀請曰突厥未和之時諸將爭欲戰陛下不許而彼自退其策安在上曰突厥之衆多而不整君臣之志唯賄是求昨其逹官皆來謁我我若醉而縛之因擊其衆伏兵邀其前大軍躡其後覆之如反掌耳然吾即位日淺國家未安一與彼戰結怨既深彼既懼而修備則吾未可以得志也故卷甲韜戈啖以金帛彼得所欲志必驕惰然後養威俟舋一舉可滅也將欲取之必固與之此之謂也瑀謝不及頡利獻馬三千匹羊萬口上不受詔歸所掠中國戶口貞觀初突厥政令煩苛國人不恱加以兵革嵗動連年饑饉內外離叛言事者多請擊之上問羣臣蕭瑀以為擊之便右僕射長孫無忌曰寇不犯塞而棄信勞民非王者之師也上乃止突厥寇太原且遣使和親帝問計羣臣咸請許之可紓戰內史舍人封倫曰不然彼有輕中國之心謂我不能戰若乘其怠擊之勢必勝勝而後和威德兩全今雖不戰後必復來臣以為擊之便詔可頡利政亂薛延陀回紇等叛之頡利不能制㑹大雪羊馬多死民大飢鴻臚卿鄭元璹使還言於上曰北敵興衰專以羊馬為候今突厥民飢畜瘦將亡之兆也羣臣多勸上乘間擊之上曰背盟不信利災不仁乘危不武縱其種落盡叛六畜無餘朕終不擊必待有罪然後討之武候將軍張公謹副李靖經略突厥條可取狀於帝曰頡利縱欲肆凶誅害善良昵近小人此主昏於上可取一也别部同羅僕骨回紇延陀之屬皆自立君長圖為反噬此衆叛於下可取二也突利被疑以輕騎免拓設出討衆敗無餘欲谷喪師無托足之地此兵挫將敗可取三也北方霜早廪糧乏絶可取四也頡利疏突厥親諸部其性翻覆大軍臨之內必生變可取五也華人在北者甚衆比聞屯聚保據山險王師之出當有應者可取六也帝然所謀竇靜為夏州都督禽頡利詔處其衆河南靜上書曰敵衆生長兵革賦性彊悍不可與河內之民並居也衣食仰給不恃耕桑今損有為之民資無知之衆得之無益於治失之不害於化況首邱未忘則一旦變生犯我王略矣不如因其破亡假以賢王一號妻之宗女披其土地部落使權弱勢分易為羈制則世為藩臣矣貞觀八年突厥來降者十餘萬詔議所宜中書令溫彥博請如漢建武時置降胸奴留五原塞全其部落以為扞蔽祕書監魏徴建言突厥世為中國仇今其來降不即誅滅奈何以河南居之魏時有敵人分處近郡劉石之亂卒傾中夏陛下必欲引之居河南所謂飬虎自遺患也彥博又曰臣聞聖人之道無所不通突厥餘魂以命歸我收居內地教以禮法選其酋長遣居宿衛畏威懷德何患之有且光武居河南單于於內郡以為漢藩翰終于一代不有叛逆太宗竟從其議自幽州至靈州置順拓化長四州都督以處之其人居長安者近且萬家十二年太宗幸九成宮突利可汗弟中郎將阿史那結社率隂結所部并擁突利子賀羅鶻夜犯御營事敗皆捕斬之太宗自是不直突厥悔處其部衆於中國還其舊部於河北建牙於故定襄城立李思摩為乙彌泥熟侯利苾可汗以主之因謂侍臣曰中國百姓天下之根本四夷之人乃同枝葉擾其根本以厚枝附用求乂安未之有也初不納魏徵言遂覺勞費日甚幾失久安之道帝與侍臣議安置突厥之事中書令溫彥博對曰隋文帝勞兵馬費倉庫樹立可汗令復其所欲河南河北任情居住各有酋長不相統屬力散勢分安能為害給事中杜楚客進曰北人存心叵測難以德懷易以威服今命其部落散處河南逼近中華久必為患至如鴈門之役雖是突厥背恩自由隋主無道中國以之喪亂豈得云興復亡國以致此禍逺不間近前哲眀訓存亡繼絶列聖通規臣恐事不師古難以長久太宗嘉其言方務懷柔未之從也自突厥頡利破後諸部落首領來降者皆拜將軍中郎將布列朝廷五品已上百餘人殆與朝士相半唯拓跋不至又遣招慰之使者相望於道涼州都督李大亮以為於事無益徒費中國上疏曰臣聞欲綏逺者必先安近中國百姓天下根本四夷之人猶如枝葉擾其根本以厚枝附而求乂安未之有也自古眀王化中國以信馭外域以權故春秋云逺人殊族不可厭也諸夏親眤不可棄也自陛下君臨區宇深根固本人逸兵強九州殷富四夷自服今者招致突厥雖入提封臣愚稍覺勞費未悟其有益也然河西民庶鎮禦藩夷州縣蕭條戶口鮮少加因隋亂減耗尤多突厥未平之前尚不安業胸奴微弱以來始就農畝若即勞役恐致妨損以臣愚惑請停招慰且謂之荒服者故臣而不內是以周室愛民攘夷竟延七百之齡秦王輕戰事邊故三十載而絶滅漢文帝養兵靜守天下安豐孝武揚威逺略海內虛耗雖悔輪臺追已不及至於隋室早得伊吾兼統鄯羌且既得之後勞費日甚虛內致外竟損無益逺尋秦漢近觀隋室動靜安危昭然備矣伊吾雖已臣附逺在藩磧民非夏人地多沙鹵其自豎立稱藩附庸者請羈縻受之使居塞外必畏威懷德永為藩臣蓋行虛惠而收實福矣近日突厥傾國入朝既不俘之於江淮以變其俗乃置於內地去京不逺雖則寬仁之義亦非久安之計每見一人初降賜物五匹袍一領酋帥悉授大官祿厚位尊理多糜費以中國之帑賦供無厭之貪求其衆益多非中國之利也太宗不納十四年侯君集平髙昌之後太宗欲以其國為州縣魏徵曰陛下初臨天下髙昌王先來朝謁自後數有商人稱其遏絶貢獻加之不禮大國詔使王誅載加若罪止文泰斯亦可矣未若因撫其民而立其子所謂伐罪弔民威德被於外遐為國之善者也今若利其土壤以為州縣常須千餘人鎮守數年一易每來往交替死者十有三四遣辦衣資離别親戚十年之後隴右空虛陛下終不得髙昌撮穀尺布以助中國所謂散有用而事無用臣未見其可太宗不從竟以其地置西州仍以西州為安西都護府每歲調發千餘人防遏其地黃門侍郎禇遂良亦以為不可上疏曰臣聞古者哲后臨朝眀王創制必先華夏而後邊逺廣諸德化不事遐荒是以周宣薄伐至境而反始皇逺塞中國分離陛下誅滅髙昌威加西域收其鯨鯢以為州縣然則王師初發之嵗河西供役之年飛芻挽粟十室九空數郡蕭然五年不復陛下每歲遣千餘人而逺事屯戍終年離别萬里思歸去者資裝自須營辦既賣菽粟傾其機杼經途死亡復在方外兼遣罪人增其防遏所遣之內復有逃亡官司捕捉為國生事髙昌塗路沙磧千里冬風氷冽夏風如焚行人去者遇之多死易云安不忘危理不忘亂設令張掖塵飛酒泉烽起陛下豈能得髙昌一人斗粟而及事乎終須發隴右諸州星馳電擊由斯而言此河西者方以腹心彼髙昌者他人手足豈得縻費中華以事無用陛下平頡利於沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺萌更樹君長復立髙昌非無前例此所謂有罪而誅之既服而存之宜擇髙昌可立者微給首領遣還本國負戴洪恩長為藩翰中國不擾既富且寧傳之子孫以遺後代疏奏不納至十六年西突厥遣兵寇西州太宗謂侍臣曰朕聞西州有警急雖不足為害然豈能無憂乎往者初平髙昌魏徵禇遂良勸朕立麴文泰子弟依舊為國朕竟不用其計今日方自悔責昔漢髙祖遭平城之圍而賞婁敬袁紹敗於官渡而誅田豐朕恆以此二事為誡寧得忘所言者乎帝常御瑶池殿顧謂侍臣曰西蕃通來幾時魏徵對曰禹貢云西至流沙又云西戎即叙不明境域所至漢武帝置燉煌張掖等郡自此以後漸通西域帝又曰朕聞漢武帝時為通西蕃中國百姓死者大半此事著在史籍不能具道但隋後主欲開葱䫈已西鎮守俱未當死者繼於道路如聞流沙已西仍有隋破壞車轂其邉即有白骨狼籍北築長城東渡遼水征伐不息人無聊生天下叛之聚而為盜煬帝安然恣其所欲遂至滅亡秖為不聞其過朕以此事永為鑒誡今與諸公共理百姓但有不可行即向朕言勿得靣從茍相恱譽且朕素無學術未聞政道一日萬機不能盡經耳目所有處斷恐獨見不明致有失所所以委公等公等善相輔弼使兆庶得所此乃長保富貴䕃及子孫若尸祿曠官茍貪榮利必加黜辱終不容捨朕既以漢武帝隋後主為龜鏡公等亦須常將此事相規諫也羣臣並拜謝徵進曰陛下思𢎞至化砥礪羣下臣等敢不竭股肱之力但恐識度愚淺無益萬分臣聞漢武帝承五代之資天下無事府庫充實士馬彊盛遂思騁其欲以事四夷聞蒟醬而開卭僰貪良馬而通大宛老弱疲於轉輸丁壯死乎軍旅海內騷然户口減半至於國用不足府庫空虛乃𣙜估鹽鐵征稅關市課算舟車告緡賣爵侵漁百姓萬端俱起外內困窮無以給邉費議以營田代卒冀以助軍迄於暮年方始覺悟下哀痛之詔封丞相為富民侯僅以壽終幾及大亂煬帝恃其彊盛思欲追蹤漢武戎車屢動人不聊生十餘年間亡身戮國陛下威加海外無逺不臻深惟二主以為殷鑒所謂一人有慶兆民賴之臣等奉以周旋不敢失墜太宗曰朕遇千慮一失必望有犯無隱太宗時遣使者至西域立葉護可汗未還又遣使賫金帛諸國市馬徵曰今立可汗未定即詣諸國市馬彼必以為意在馬不在立可汗可汗得立必不懷恩諸蕃聞之以中國薄義重利未必得馬而先失義矣魏文帝欲求市西域大珠蘇則以為惠及四海則不求自至求而得之不足貴也陛下可不畏蘇則言乎帝遂止貞觀十六年帝謂侍臣曰北敵代為寇亂今延陀倔彊須早為之所朕熟思之惟有二䇿選徒十萬擊而虜之滌除凶醜百年無事此一策也若遂其來請與之姻媾朕為蒼生父母茍可利之豈惜一女北敵風俗多由內政亦既生子則我外孫不侵中國斷可知矣以此而言邉境足得三十年來無事舉此二䇿何者為先司空房𤣥齡對曰遭隋室大亂之後戶口大半未復兵凶戰危聖人所慎和親之策實天下幸甚帝曰善許以新興公主下嫁召突利失大享羣臣侍陳寶器奏慶善破陳盛樂及十部伎突利失頓首上千萬嵗壽詔夷男親迎帝將幸靈州以成昏事夷男大喜詫曰我鐵勒部人耳上以我為可汗公主以女我乘輿為我幸邉誰與我榮乃搜賦諸下羊馬為資或說夷男曰可汗與唐皆一國主奈何往朝有如見執尚可悔夷男曰不然吾聞唐天子有德四方共臣之藉獨留我磧北亦須有主然舍我而求他非計也下乃不敢言薛延陀真珠可汗使其姪來納幣獻羊馬契苾何力上言薛延陀不可與昏上曰吾許之矣可食言乎何力對曰願且遷延敕夷男使親迎彼必不敢來則絶之有名矣上從之乃詔幸靈州召真珠可汗㑹禮真珠欲行其臣曰不可往必不返真珠曰天子聖眀逺近朝服今親幸靈州以愛主妻我我得見天子死不恨矣薛延陀何患無君又多以羊馬為聘經沙磧耗死過半乃責以聘禮不備絶之薛延陀請婚帝已納其聘復絶之遂良曰信為萬事本百姓所歸故文王許枯骨而不違仲尼去食存信貴之也延陀曩一俟斤耳因天兵北討蕩平沙塞威加諸外而恩結於內以為餘寇不可無酋長故璽書鼓纛立為可汗負抱之恩與天無極數遣使請婚於朝陛下既開許為御北門受獻食今一朝自為進退所惜少所失多虧信逺人方生嫌恨殆不可以訓戎兵勵軍事也且龍沙以北部落牛毛中國擊之不能盡亦猶可北敗芮芮興突厥亡延陀盛是以古人虛外實內懷之以德使為惡在夷不在華失信在彼不在此也惟陛下裁幸不納貞觀十七年遣太常丞鄧素使髙麗素還請於懷逺戍增兵以逼髙麗上曰逺人不服則修文德以來之未聞一二百戍兵能威絶域者也十八年帝將伐髙麗其莫離支貢白金黃門侍郎禇遂良諫曰莫離支虐殺其主九夷所不容陛下以之興兵將事弔伐為遼山之人報主辱之耻古者討弒君之賊不受其賂昔宋督遺魯君之郜鼎桓公受之於太廟臧哀伯諫曰君人者昭德塞違今滅德立違而置其賂於太廟百官象之又何誅焉武王克商遷九鼎於洛邑義士猶或非之而況將昭違亂之賂器置諸太廟其若之何夫春秋之書百王取則若受不臣之筐篚納弒君之朝貢不以為愆何所致伐臣謂莫離支所獻自不合受帝從之謂其使者曰蓋蘇文弒逆汝曹不能復讎更為游說以欺大國罪孰大焉悉以屬大理十九年髙麗王髙藏及莫離支蓋蘇文使獻二美女帝謂其使曰朕憫此女離其父母兄弟於本國若愛其色而傷其心我不取也並却還之本國帝謂羣臣曰蓋蘇文殺君攘國朕取之易耳不願勞人若何司空房𤣥齡曰陛下士勇而力有餘戢不用所謂止戈為武者司徒長孫無忌曰髙麗無一介告難宜賜書安慰之隱其患恤其存彼當聼命貞觀中突厥俟利苾可汗有衆十萬不能撫御其衆悉南度河請處於勝夏之間上許之羣臣皆曰陛下方逺征遼左而置突厥於河南距京師不逺豈得不為後慮願留鎮洛陽遣諸將東征上曰突厥亦人矣其情與中國不殊以德洽之則可使如一家且彼不北走薛延陀而南歸我其情可見矣俟利苾既失衆輕騎入朝上以為右武衛將軍康國歸附上謂侍臣曰前代帝王大有務廣土地以求身後之虛名無益於身其人甚困假令於身有益於百姓有損朕必不為況求虛名而損百姓乎康國既來歸朝有急難不得不救兵行萬里得無勞於人若勞人求名非朕所欲所謂歸附不須納也上又謂侍臣曰天道福善祻淫事猶影響昔啓人亡國來奔文帝不吝粟帛大興士衆營衛安置乃得存立既而彊富當須子子孫孫不忘報德才至失脫即起兵圍煬帝於鴈門及隋國亂又恃彊深入遂使昔安立其國者身及子孫並為頡利破亡豈非背恩忘義所至也羣臣咸曰誠如聖㫖武后時四夷質子多在京師如論欽陵阿史德元珍孫萬榮皆因入侍見中國法度及還並為邉害左補闕薛登諫曰臣聞戎夏不雜古所戒也故斥居塞外有時朝謁已事則歸三王之法也漢魏以來草襲衣冠築室京師不令歸國較其利害三王是而漢魏非拒邉長而質子短昔晉郭欽江統以夷人處中夏必為變武帝不納卒有永嘉之亂伏見突厥吐蕃契丹往因入侍並被奬遇官戎秩步黌門服改氊罽語習楚夏窺圖史成敗􅍄山川險易國家雖有冠帶之名而心非誠服患必在後昔申公奔晋使子狐庸為吳行人教吳戰陳使之叛楚漢遷五部胸奴於汾晋卒以劉石作難竊計秦并天下及劉項用兵人士凋散以冒頓之盛乘中國之虛而髙祖困厄平城胸奴卒不入中國者以其生長磧漠謂穹廬賢於城郭氊罽美於章紱既安所習是以無窺中國心不樂漢故也元海五部散亡之餘而能自振者少居內地明習漢法鄙單于之陋竊帝王之稱使其未嘗內徙不過劫邉人繒綵麯糵歸隂山而已今皇風所覃含識革靣方由余效忠日磾盡節然臣慮備豫不謹則敵寇稱兵不在方外非貽謀之道臣謂願充侍子可一切禁絶先在國者不使歸蕃則夷人保疆邉邑無爭武后不納時吐蕃九姓叛詔田揚名發金山十姓討之十姓君長以三萬騎戰有功遂請入朝后責其嘗不奉命擅破回紇不聽麟臺正字陳子昂上西蕃邉州安危事三條疏曰臣聞聖人制事貴於未亂所以用成功光濟天下大業臣伏見國家頃以北蕃九姓亡叛有詔出師遣田揚名發金山道十姓諸兵自西邉入臣聞十姓君長奉詔之日若報私讐莫不為國家剋剪凶醜遂數州之內自率兵馬三萬餘騎經途六月自食私糧誠是國家威德早申蕃戎得效忠赤今者軍事已畢情願入朝國家乃以其不奉璽書妄破回紇部落責其專擅不許入朝便於梁州發遣各還蕃部臣愚見竊為國家危之深恐此等自茲成隙何以言之國家所以制有十姓者本為九姓強大歸服聖朝十姓微弱勢不能動所以委命臣妾為國忠良今者九姓叛亡北蕃喪亂君長無主莫知所歸回紇金水又被殘破磧北諸姓已非國家所有今欲犄角亡叛維持邉疆唯倚金山諸蕃尚為形勢有司不察此理乃以田揚名妄破回紇之罪坐及十姓諸豪拒而遣還不許朝覲臣愚以為非善御逺人制於未亂之長策也夫蕃戎之性恍惚無常親之則順疑之則亂蓋易動難安古所莫制也今阻其善意逆其歡心古人所謂放虎遺患不可不察且臣昨在甘州日見金山軍首領擬入朝者自蕃中至已負其功見燕然軍漢兵不多頗有驕色察其志意所望殊髙與其言宴又詞多不順今更不許入朝謁疑之以罪與回紇部落復為大讎此則內無國家親信之恩外有回紇報讎之患若使心多顧忌懷不自安亡叛沙漠則河西諸蕃道恐非國家所有且諸蕃相攻中國之福今回紇已破既往難追十姓無罪不宜自絶今者妄破回紇有司已罪揚名在於蕃情足以為慰十姓首領國家理合羈縻許其入朝實為得計今北蕃既失十姓不安廟勝之策良恐未爾事既機速伏乞早為圖之臣伏見今年五月敕以同城權置安北府此地逼磧南口是制胸奴要衝國家守邉實得上策臣在府日竊見磧北歸降突厥已有五千餘惟後之來者道路相望又甘州先有降戶四千餘惟奉敕亦令同城安置磧北喪亂先被饑荒塗炭之餘無所依仰國家開安北府招納歸降誠是聖恩洪流覆育異域然臣竊見突厥者莫匪傷夷殘羸饑餓並無人色有羊馬者百無一二然則一作其所以㩦幼扶老逺來歸降實將以國家綏懷必有賑贍望一作冀恩覆獲以安存故其來者日以益衆然同城先無儲畜雖有降附皆未優矜蕃落嗷嗷不免饑餓所以時有劫掠自相屠戮君長既不能相制以此盜亦稍多甘州居者鈔竊尤甚今安北府見有官羊及牛六千頭口兵糧粟麥萬有餘碩安北初置庶事草創城孤兵少未足威懷國家不贍恤來降之徒空委此府安撫臣恐降者日衆盜者日多蕃心不附必為禍亂夫人情莫不以求生為急今不以此粟麥不以此羊牛大為其餌而不救其死人無生路安得不為羣盜乎羣盜興則安北府城必無全理府城一壞則甘涼以北恐非國家所有後為邉患禍未可量是乃國家故誘其為亂使其為賊非所謂綏懷經逺之長䇿也且磧北諸蕃今見大亂亂而思理生人大情國家既開綏撫之恩廣置安北之府將理其亂者以慰喻諸蕃取亂存亡可謂聖圖𢎞逺矣然時則為得事則未行何者國家來不能懷去不能制空竭國用為患於邉取亂之䇿有失於此況夷人代有其雄與中國抗衡自古所病倘令今有勃起遂雄於邉招集遺散收強撫弱臣恐喪亂之衆必有景從此亦國家之大機不可輕而失也機事不密則害成聖人之至戒今北蕃未定降者未安國家不早為良圖恐坐而生變乞得靣奏指陳其利害邉境幸甚幸甚武后方謀開蜀山由雅州道剪生羌因以襲吐蕃子昻上書以七驗諫止之曰臣聞亂生必由於怨雅州羌未嘗一日為盜今無罪䝉戮怨必甚怨甚則蜂駭且亡而邉邑連兵守備不解蜀之禍搆矣東漢喪敗亂始諸羌一驗也吐蕃黠獪抗天誅者二十餘年前日薛仁貴郭待封以十萬衆敗大非川一甲不返李敬𤣥劉審禮舉十八萬衆困青海身執賊廷關隴為空今乃欲建李處一為上將驅疲兵襲不可幸之吐蕃舉為賊笑二驗也夫事有求利而得害者昔蜀與中國不通秦以金牛美女啖蜀侯侯使五丁力士棧褒斜鑿通谷迎秦之饋秦隨以兵而地入中州三驗也吐蕃愛蜀富思盜之矣徒以障隧隘絶頓餓喙不得噬今撤山羌開阪險使賊得收奔亡以攻邉是除道待賊舉蜀以遺之四驗也蜀為西南一都㑹國之寶府又人富粟多浮江而下可濟中國今圖僥幸之利以事西羌得羌地不足耕得羌財不足富是過殺無辜之衆以傷陛下之仁五驗也蜀所恃有險也蜀所安無役也今開蜀險役蜀人險開則便寇人役則傷財臣恐未及見羌而姦盜在其中矣異時益州長史李崇真託言吐蕃寇松州天子為盛軍師趣轉餉以備之不三年巴蜀大困不見一賊而崇真姦贓已巨萬今得非有姦臣圖利復以生羌為資六驗也蜀士尫孱不知兵一敵持矛百人不敢當若西戎不即破滅臣見蜀之邉垂且不守而為羌夷所暴七驗也國家近廢安北拔單于棄龜兹疏勒天下以為務仁不務廣務養不務殺行太古三皇事今狥貪夫之議誅無罪之羌遺全蜀患此臣所未諭方山東饑關隴弊生人流亡誠陛下寧靜思和天人之時安可動甲兵興大役以自生亂又西軍失守北屯不利邉人駭情今復舉輿師投不測小人徒知議邊僥之利非帝王至德也善為天下者計大而不計小務德而不務刑據安念危值利思害願陛下審計之子昂又為喬補闕論突厥表曰臣某言臣以專䝉叨幸近侍陛下不以臣不肖特敕臣攝侍御史監護燕然西軍臣自違闕庭涉歷秋夏徒居邉僥無尺寸之功臣誠暗劣孤負聖明然臣久在邉隅夙夜勤灼莫不以蕃事為念比按察巳北突厥離亂事迹參驗委曲窮問往來竊有以得其真莫不自為鯨鯢遞相吞食流離殘餓莫知所歸臣誠愚不識事機然竊以往古之變考驗於今乃知天亡凶醜之時陛下收功之日然臣聞難得而易失者時也易遇而難見者機也聖人所貴去禍於未萌今陛下體上聖之資開太平之化胸奴為中國之患自上代所苦矣今天降其灾以授陛下百代之業在於今時臣請以秦漢已來事迹證明之伏願陛下少留聖聽尋繹省察天下幸甚臣聞秦始皇之時併吞六國制有天下按劔叱咤八荒奔馳然胸奴強梁威不能伏牧馬河內以侵邉疆始皇赫然使䝉恬將四十萬衆北築長城因以逐寇取其河南之地七百餘里當時燕齊海岱贏糧給費徭役困苦人以不堪故長城未畢而閭左之戍已為其患二世而亡莫不始於事邊也至漢興髙帝受命率羣臣一作雄乘利便以三十萬衆窘困白登七日被圍僅而獲免自是歷呂太后至孝文帝單于傑驁益淩漢家文帝徒以遜辭致獻金帛但求其善和而已不敢有圖賈誼所以哭之痛文帝以天子一作下之盛而卑事戎夷以倒懸天下也至景帝時邉受其患於是漢武帝踐阼以承六代鴻業屬乎文景𤣥默之化海內乂安太倉之粟紅腐而不可食內府之錢貫朽而不可校財力雄富士馬精強忿一胸奴之驕慢將報先帝之辱遂使王恢韓安國將四十萬衆以馬邑誘單于師出徒費竟無毫髮之功於是大命六師專以擊戎一作伐戎為務首尾二十餘年中國騷然大受其弊至於國用不足軍興不給租及六畜算及船車盜賊羣興京師起亂竟不能制單于之命一日而臣服之漢宗衰殘幾自覆社稷也故漢武晚年厭兵革之弊乃下哀痛之詔罷輪臺之田封丞相為富民侯將以蘇中國也至宣帝代罕復出師屬胸奴數窮天降其禍虛閭權渠單于病死右賢王屠耆代立骨肉大臣自不相服又立閭渠單于子為呼韓耶單于擊殺屠耆諸名王貴人各自分立為單于更相攻擊以至大亂殘虐死者計萬億數畜産耗減十至八九人以饑餓相燔燒以求食於是寄命無所諸名王貴人左伊秩訾且渠當戶以下將衆五萬稽首來降於是北方晏然靡有兵革之事直至哀平之際邉人以安臣竊以此觀胸奴之形察天時之變盛衰存亡機事可見也然則胸奴不滅中國未可安臥亦已明矣夫以漢祖之武武帝之雄謀臣勇將勢盛雷電窮兵黷武傾天下以事之終不能屈一王伏一國宣帝承衰竭之後撫瘡痍之人不敢灼然為一作冇出征一作師之意然而未有遺矢之費而臣僕於單于其故何哉蓋盛衰有時理亂有數故曰聖人修備以待時是以正天下如拾遺陛下肅恭神明德動天地今上帝降胸奴之灾孽遺陛下之良時不以此時順天誅建大業使良時一失敵人復興則萬代為患後雖悔之亦不及矣古語曰天與不取反受其殃一作咎今天意厚矣陛下豈可違之哉臣比在同城接居延海西逼近漢南口其磧北突厥來入者莫不一一臣所慰察比者歸化首尾相仍㩦幼扶老已過數萬然其瘡痍羸憊皆無人色饑餓道死頗亦相繼先右一作九姓中遭大旱經今三年野皆赤地少有生草以此羊馬死耗十至七八今所來者皆是稍能勝致始得度磧磧路既長又無水草羊馬因此重以死盡莫不掘野鼠食草根或自相食以活喉命臣具委細問其磧北事皆異口同辭又耆老云自有九姓來未嘗見饑餓之甚今者同羅僕固雖為逆首僕固都督早以伏誅為亂之元既自喪滅其餘外小醜徒侵暴自賊耳本無逺圖多獵葛復自相讐人被塗炭逆順相半莫知所安回紇諸部落又與金州橫相塗戮羣生無主號訴嗷嗷臣所以願陛下建大䇿行逺圖大定北敵不勞陛下指麾之間事業可致則千載之後邉鄙無憂一作虞中國之人得安枕而臥豈不在陛下一斷哉且胸奴為中國患非獨秦漢之間臣竊惟先帝時衛公李靖蓋中庸之一老臣假一作藉先帝之威用廟勝之䇿當頡利可汗全盛之日因機逐便大破敵庭遂繫其侯王裂其郡縣六十年將於今矣使中國晏然無斥候之警書之唐史傳之無窮至今天下謂之為神況陛下統先帝之業履至尊之位突厥狂悖大亂邉陲皇天遺陛下以鴻業之時陛下又得先帝之跡德之大者其何以加若失此機事以過往使李靖豎子獨成千載之名臣愚竊為陛下不取也伏見去月日敕令於同城權置安北都護府以招納亡叛扼胸奴之喉愚臣伏慶陛下見機於萬里之外得制胸奴之上䇿臣聞隗囂言漢光武見事於萬里之外制敵應變未嘗有遺今陛下超然神鑒逺照實所謂聖眀之見覩於無形也臣比任一作住同城周觀其地利又博問諳知山川者莫不悉備其地東西及北皆是大磧磧並石齒水草不生突厥嘗所在一作大入道莫過同城今居延海澤接張掖河中間堪營田處數百頃水草畜牧足供具萬人又甘州諸屯犬牙相接見所蓄粟麥積數十萬田因水利種無不收轉軍一作運到同城甚省功費又居延河海多有魚鹽此可謂強兵用武之國也陛下若調選天下精兵採拔名將任以同城都護臣愚料之不用三萬陛下大業不出數年可坐而取成臣比者看國家興兵但循於常軌主將不選士卒不練徒知驅市人以戰耳故臨陳對寇未嘗不先自潰散遂使敵人乘利輕於國威兵愈出而事愈屈蓋是國家自過計於敵耳故非小醜能有異圖臣竊以為陛下今日不更為之圖以激厲天下忠勇但願以今日之兵今日之將冀收功於異日難矣臣不勝踴躍之至聖歷三年拜諾曷宣超左豹韜貟外大將軍襲故可汗號餘部詣涼甘肅瓜沙等州降宰相張錫與右武衛大將軍唐休璟議徙其人於秦隴豐靈間令不得畔去涼州都督郭元振以為吐谷渾近秦隴則與監牧雜處置豐靈又邇默啜假在諸華亦不遽移其性也前日王孝傑自河源軍徙耽爾乙句貴置靈州既其叛乃入牧坊掠羣馬瘢夷州縣是則遷中土無益之成驗往素和貴叛去於我無損但失吐谷渾數十部豈與句貴比耶今降徒非彊服皆突矢刃棄吐蕃而來宜當循其情為之制也當甘肅瓜沙降者即其所置之因所投而居則情易安磔數州則勢自分順其情分其勢不擾於人可謂善奪戎心者也嵗遣鎮遏使者與宣超兄弟撫護之無令相侵奪生業固矣有如叛去無損中國詔可武后時吐蕃乞和其大將論欽陵請罷四鎮兵披十姓之地乃以郭元振充使因覘敵情還上疏曰利或生害害亦生利國家所患唯吐蕃與默啜耳今皆和附是將大利於中國也若圖之不審害且隨之欽陵欲裂十姓地解四鎮兵此動靜之機不可輕也若直遏其意恐邉患必甚於前宜以策緩之使其和望勿絶而惡不得萌固當取捨審也夫患在外者十姓四鎮是也患在內者甘涼瓜肅是也關隴屯戍向三十年力用困竭脫甘涼有一日警豈堪廣調發耶善為國者先料內以敵外不貪外以害內然後安平可保欽陵以四鎮近已畏我侵掠此吐蕃之要然青海吐渾密邇蘭鄯易為我患亦國家之要今宜報欽陵曰四鎮本扼諸蕃走集以分其力使不得併兵東侵今委之則蕃力益彊易以擾動保後無東意當以吐渾諸部青海故地歸於我則俟斤部落還吐蕃矣此足杜欽陵口而和議未絶且四鎮久附其倚國之心豈與吐蕃等今未知利害情實而分裂之恐傷諸國意非制御之算后從之又言吐蕃倦徭戍久矣咸願解和以欽陵欲裂四鎮專制其國故未歸欵陛下誠能嵗發和親使而欽陵常不從則其下必怨設欲大舉固不能斯離間之漸也后然其計中宗時郭元振為金山大總管時烏質勤之將闕啜忠節與婆葛交怨相侵元振奏請闕啜入宿衛詔許之闕啜遂行經略副使周以悌說之且教以重賂宰相無入朝闕啜即勒兵擊于闐元振知之上疏曰國家往不與吐蕃十姓四鎮而不擾邉者蓋其諸豪泥婆羅等屬國自有㩦二故贊普南征身殞寇庭國中大亂嫡庶競立將相爭權自相剪屠士畜疲癘財力困窮顧人事天時兩不諧契所以屈志於漢非實忘十姓四鎮也如其有力後且必爭今忠節忽國家大計欲為吐蕃鄉導主人四鎮危機恐從此啓吐蕃得志忠節亦當在賊掌股若為復得事我哉往吐蕃於國無有恩力猶欲爭十姓四鎮今若效力樹恩則請分于闐疏勒者欲何理抑之且其國諸蠻及婆羅門方自嫌阻藉令求我助討者亦何以拒之是以古之賢人不願外域妄惠非不欲其力懼後求無厭益生中國事也臣愚以為用吐蕃之力不見其便又請阿史那獻者豈非以可汗子孫能招綏十姓乎且斛瑟羅及懷道與獻父元慶叔僕羅兄俀子俱可汗子孫也往四鎮以他匐十姓之亂請以元慶為可汗矣卒亦不能招來而元慶沒賊四鎮淪陷忠節亦嘗請以斛瑟羅及懷道為可汗矣十姓未附而碎葉幾危又吐蕃亦嘗以俀子僕羅并拔布為可汗矣亦不能得十姓而皆自亡滅此非他其子孫無惠下之才恩義素絶故也豈止不能招懷且復為四鎮患則冊可汗子孫其效固試矣獻又逺於其父兄人心何繇即附若兵力足取十姓不必要須可汗子孫也又請以郭䖍瓘搜兵稅馬於拔汗那往䖍瓘已嘗與忠節擅入其國臣時在疏勒不聞得一甲一馬而拔汗那挾忿侵擾南導吐蕃將俀子以擾四鎮且䖍瓘往至拔汗那國四靣無助若履虗邑猶引俀子為敝況今北有婆葛知䖍瓘之西必引以相援拔汗那倚堅城而抗于內突厥邀伺于外䖍瓘等豈能復如往年得安易之幸哉疏奏不省𤣥宗開元三年突厥默啜為拔曵國所殺其下多降既而稍稍叛去原州都督王晙上言突厥向以國亂故欵塞與部落無間延傃北風何嘗忘之今徙處河曲使內伺邉罅久必為患比者不受要約兵已屢動擅作蜂區閉障行李敵脫南牧降帳必與連衡以相應接表裏有敵雖彭韓孫吳無所就功請至農隙令朔方軍大陳兵召酋豪告以禍福啖以金繒且言南方麋鹿魚米之饒並遷置淮右河南寬鄉給之程糧雖一時之勞然不二十年漸服諸華料以充兵則皆徑卒議者若謂降敵不可以南處則髙麗舊俘置沙漠之西城傍編夷居青徐之右何獨降人不可徙歟臣復料議者必曰故事置于河曲前日已寧今無獨異且往者頡利破亡邉鄙安定故降户得以久安今敵未殄滅此降人皆戚屬固不與往年同已臣請以三䇿料之悉其部落置內地獲精兵之實閉強敵之患此上䇿也亭障之下蕃華參處廣屯戍為備擬費甚人勞下䇿也置之朔塞滋成禍萌此無䇿也不然前至河氷且必有變書未報而敵巳叛𤣥宗時吐蕃金城公主請文籍四種𤣥宗詔祕書寫賜正字于休烈上疏曰吐蕃國之寇經籍國之典也戎之生心不可以無備昔東平王求史記諸子漢不與之以史記多兵謀諸子雜詭術也東平漢之懿戚尚不示征戰之書今西戎國之寇讐安可貽以經典且吐蕃之性慓悍果決善學不回若逹於書則知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於春秋則知用師詭詐之計深於文則知往來書檄之制此何異假寇兵資盜糧也臣聞魯秉周禮齊不加兵吳獲乘車楚屢奔命喪法危邦可取鑒也公主下嫁異國當用夷禮而反求良書恐非本意殆有姦人勸導其中若陛下慮失其情示不得已請去春秋夫春秋當周德既衰諸侯盛彊征伐競興情僞於是乎生變詐於是乎起有以臣召君取威定霸之事誠與之國之患也敵固貪婪貴貨易土正可錫以錦綵厚以金玉無足所求以資其智疏入詔中書門下議侍中裴光庭曰吐蕃不識禮經孤背國恩今求哀稽顙許其降附漸以詩書陶以聲教斯可致也休烈但見情僞變詐於是乎生不知忠信節義亦於是乎在帝曰善遂與之中書令張九齡賀奚契丹並自離二廓清有期狀曰右適髙力士宣示臣等張守圭奏契丹及奚並自離二兼安祿山復有殺獲賊數將盡觸緒猜攜邉鎮勤兵伺隙而動誅翦有日廓清可期此皆天威逺臨逋醜自滅臣等不勝慶躍之至答曰比未窮巢穴有慎佳兵果自猜攜人神所棄折衝樽爼遙可圖之所賀知九齡又賀誅奚賊可突干狀曰右髙力士宣示張守圭所上逆賊契丹屈烈及可突干等首級此等惡稔喪敗將及故天誘其衷既降又二而感義之士惡其翻覆背恩之賊既已誅鋤幽障廓清中外俱靜計其餘噍永無動搖陛下邉任先擇聖謀獨斷克禀成命樹此戎功且知河朔無轉輸之勞林胡為賦稅之地臣等忝在樞近預聞逺績捷書之至喜倍恆情謹奉狀陳賀以聞謹奏答曰用兵之上者修政於廟堂折衝千里之外此之謂也小寇適降復為翻動邉軍除翦有國常刑朕方事籍田而今獻捷當鑄劍㦸以為農器悉也九齡又賀破突厥狀曰右張守圭表奏突厥四萬騎前月二十五日至能訖離山契丹涅禮等前後斬獲俘馘數十萬突厥可汗弃甲逃亡奚王李歸國及平盧軍將等追奔逐北計日殱滅更聞奏者伏以突厥新立輕事用兵彼之威衆在於一舉又兩蕃與其結隙交搆未深在於邉隅猶軫天算陛下料其終始指授規模知其舉種盡來本自無䇿勞師襲逺必合成擒使蕃騎先鋒漢軍堅壁坐觀成敗自戰蠻夷今契丹才交突厥已破計其奔北必至喪亡縱脫身獲全亦舉衆皆弃北敵震懾從此氣衰東人保邉永不攜二寬徭罷柝自此可期斯皆聖德逺覃皇威遐振事無遺䇿舉不失圖臣忝跡樞近親承睿略抃躍之至倍百恆情謹奉狀陳賀以聞謹奏答曰兩蕃歸我因用禦邉北敵猖狂欲有侵率何則馳騁之騎突厥頗強弓矢之功契丹稱徑彼強也歷逺已弊此徑也襲近而摧勢自不敵況違天意廟堂良算亭障稜威故合而有成豈朕之獨斷所賀知九齡又賀東北纍捷狀曰右今日劉思賢至奉宣聖㫖垂示臣等破賊所由兼見守圭表奏具承契丹纍捷伏以聖武所加制勝者無失天威不抗犯順者自亡突厥負衆背恩窮凶逺襲兩蕃懷德視死如歸三軍奉國從命如指遂使一戰便剋已聞殺傷無算慟哭而奔則知主將必死且蠻夷相伐我則不勞疆場有虞義亦奚失固知無愆信於漠北有大造於燕陲此實獨斷神謀事皆有預萬全之䇿永靜邉隅薄伐之師匪勞中夏凡在黎庶孰不欣躍臣等沗預樞近倍百恆情無任慶恱之至答曰東歸兩蕃不孤含育北制強敵且知威信自相攻伐稍警邉陲屢有奔亡非無逆順朕之早預故亦常圖今乃歸功得無同體九齡又賀依聖料赤山北無賊及突厥要重人死狀信安郡王禕承王忠副警固牒云赤山有賊狀曰右先得前件牒云九月三日奚探見賊無數前坐日臣等靣奉聖㫖料此必安祿山所將之兵奚疑是賊便有此牒也臣等當時又奏突厥舉國大來微有輸失便去竊料此意恐其有謀陛下又云必應彼有要重人死所以即去今日幽州節度判官監察御史張曉至云今月十一日從幽州發來赤山元自無賊奚所見者正是安祿山下兵馬又云契丹有蕃落人走來云突厥之兵馬平章事第一人死所以狼狽即去在路每日於衙帳前哭此並聖心懸照有如目擊臣等親奉睿算及此符同萬里無差不勝驚喜無任踴躍之至仍望宣付史館答曰朕臨御有年更事多矣天人之際先意後合此亦賊意可量非朕謀之必中將有可紀任付史館九齡又賀突厥小可汗必是傷死狀曰右牛仙童宣敕送前件契丹令問委曲者臣等借問突厥退散所由其伊吐干被擒將隨五日因夜却走回每日實見突厥諸將皆於衙帳前哭及整正靣是實據此必是小可汗傷死若其不然不合如此審觀伊吐干情狀亦即不敢妄言必其不虛乃是天敗比其歸至本處固應更有餘殃北敵破亡必自此始也陛下聖德無逺妖沴自銷不勞師徒已清朔漠臣等獲奉廟算不勝抃躍無任喜慶之至九齡又賀聖料突厥必有亡徵其兆今見狀曰右林招隱宣敕示臣等張守圭云契丹婦女屈將從突厥出來知可汗死是實又云黃頭突厥與默啜突厥爭言氣兵馬欲鬪驚軍屈將然得走來者參驗前後從突厥來者說事多同況此婦人尤為指實死既非謬天實誅之且諸蕃之中北部為桀不待征戰而自取殱夷此誠天助有道坐清妖祲陛下嘗有聖料者知其必有亡徵今云兵馬自爭其兆已見佇聽其敗但只納降亭障息兵將自此始不勝欣慶之至九齡又賀蓋嘉運破賊狀曰右髙力士宣奉敕示臣等王尚客奏狀知蓋嘉運至突厥施店密城逢賊便鬪多有殺獲且凶黨大衆見在邉城方擬經春圖為邉患忽聞嘉運此入復有破傷必其驚忙當有攜散皆是聖略先定萬里懸同尚客所言合符前㫖臣等不勝慶躍之至答曰方隅暫警乃圖其事不出意外且有殺傷雖復嘯聚邉城故應知難而退鼎臣恭佐何獨朕躬所賀知代宗永泰元年吐蕃遣使請和詔元載等與之盟上問郭子儀子儀對曰吐蕃利我不虞若不虞而來則國不可守矣乃遣兵戍奉天大歷八年元載嘗為西州刺史知河西隴右山川形勢言於上曰四鎮北庭既治涇州無險要可守隴山髙峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水美平涼在其東獨耕二縣可給軍食故壘尚存吐蕃棄而不居每嵗夏吐蕃畜牧青海去塞甚逺若乘閒築之二旬可畢移京西軍戍原州移郭子儀戍涇州為之根本分兵守石門木峽漸開隴右進逹安西據吐蕃腹心則朝廷可髙枕矣并圖地形獻之㑹田神功入朝上問之對曰行軍料敵宿將所難奈何用一書生語欲舉國從之乎載尋得罪事遂寢德宗建中元年命回紇使者突董盡帥其徒歸國輜重甚盛至振武留數月求資給踐果稼人甚苦之留後張光晟欲殺之奏曰回紇諸部自相魚肉陛下不乘此際除之乃歸其人與之財正所謂借冦兵齎盜糧者也請殺之上不許興元元年翰林學士陸贄賀吐蕃尚結贊抽軍回歸狀奏曰右欽溆奉宣聖㫖適得渾瑊奏比日尚結贊頻使人計㑹擬自領兵馬剋期同收京城緣春來蕃軍多有疾疫近得探報尚結贊等並抽兵退歸不知逺近朕意緣吐蕃士馬強盛又以和好之義自請將兵助國討賊朝夕望其成功今忽抽軍退歸甚失准擬渾瑊李晟等諸軍兵馬並不至絶多若無蕃軍應援深慮被賊衝突卿試料量事勢如何者臣質性孱昧不習兵機但以人情揆之時亦偶有所得自承此㫖欣賀實深竊謂蕃戎退歸乃是社稷遐福昨日已附欽溆口奏訖伏恐未盡愚欵尚勞聖憂謹復披陳庶解疑結彼吐蕃者倡率同類侵軼為心貪而多防狡而無耻威之不格撫之不懷雖或時有盛衰大抵常為邉患隂詐難禦特甚諸夷陛下但舉建中已來近事准之則戎心難知固可明矣頃者方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求寖多翻覆靡定託因細事嘖有煩言首尾凡歷四年要約竟未堅決立碑才畢復請改移猜矯多端於斯可驗逮至盜驚都邑駕幸郊畿結贊捴戎在邉因請將兵赴難陛下推誠允納厚賂招徠逗留持疑竟不時進無濟討除之用但攜將帥之心懷光遽至猖狂頗亦由茲促禍及皇輿再駕移蹕漢中陛下猶望蕃兵以寧內難親倚之情彌厚屈就之事亦多未見輸心曽不知感翻受朱泚信使意在觀變推移頻與諸軍剋期至時皆不赴㑹致令羣帥進退憂虞欲捨之獨前則慮其懷怨乘躡欲待之合勢則苦其失信稽延既姦且驕曷望成績非唯變態難測且又妨擾實深戎若未歸寇終不滅臣請復為陛下根本其說則人情物理昭然皆可得而察焉向者謀誘蕃兵本是使臣失䇿陛下急於戡亂嘉彼效誠唯恐後時不暇詳議遽降優詔促令進軍逺近聞之莫不危駭將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺之擒百姓畏蕃戎之來有財必盡為所掠是以順於王化者其心不得不怠陷於寇境者其勢不得不堅怠我之師堅寇之衆戎心變詐復未可量以此益兵但招其損耳以此靖國適資其亂耳一昨蕃戎未退臣又竊有過憂流聞結贊好謀恐其潜蓄姦計儻或幸朝廷播越之際乘賊泚窮蹙之時輕犯近郊若升虛邑耀兵牧馬不却不前外奉國家內通凶逆兩峙誘脅之勢俱納贈遺之資旁觀戰爭坐乘衰弊如此則王師不得伐叛蒸黎不得寧居賊必耗亡我亦困竭京甸所有勢無孑遺千里丘墟得將安用是乃戎有萬全之利我有不測之危臣所以痛心傷神晝驚夕惕者慮其意及於此也所賴天奪其魄神降之災覩機若瞑遘厲自遁實昊穹悔禍之應列聖垂祐之期廓清妖氛慶必非逺何以知其然也且賊泚之亂始於暴兵困徵役之繁興乘衛禁之闕備誘扇羣慝遂謀大姦逆天僣君躬肆攻逼凡有血氣皆知惋嗟矧伊忠良孰不痛憤獨惡無與何能久存加以聖德日新改過不吝布革弊之詔𢎞恤隱之懷天下黎元翕然遷善易心改觀厭亂思安和風既揚昏祲自斂蠢茲狂悖久合殱夷頃屬懷光昏迷緩師養寇吐蕃干撓生事惑人故使義士無施厲階猶梗今懷光别保蒲絳吐蕃逺避封疆形勢既分腹背無患瑊晟諸帥才力得伸又各士馬非多資糧向竭若不降賊即須建功此輩寵任已崇貴位已極建功則寵增而位固降賊則名辱而身危況賊之凶愚滅亡可必賊之孤劣剪撲非難孰肯捨固而就危違寵而從辱棄垂成之業臣將滅之敵哉既牽於利害之情理不同惡又迫於單乏之急勢難久居勢理相驅安能無戰渾瑊統戴休顔韓遊瓌乘其西北李晟率駱元光尚可孤攻其東南同病相資自當合力但願陛下慎於撫接以奮起忠勇之心勤於砥礪以昭蘇逺近之望中興大業旬月可期不宜尚眷眷於外兵之助以失將士之情也臣愚不任懇悃之至輒以私懷忖度謹冒昧以聞謹奏上發吐蕃以討朱泚許以安西北庭之地與之及泚誅吐蕃來求地上欲與之李泌曰安西北庭人性驍悍控制西域五十七國及十姓突厥又分吐蕃之勢使不得併兵東侵奈何拱手與之且兩鎮之人勢孤地逺盡忠竭力為國家固守近二十年誠可哀憐一旦棄之戎狄彼必深怨中國他日從吐蕃入寇如報私讎矣況日者吐蕃觀望不進隂持兩端大掠而去何功之有衆議亦以為然上遂不與之貞元三年回紇使使者獻方物請和親帝畜前恚未平謂宰相李泌曰和親待子孫圖之朕不能已泌曰陛下豈以陕州故憾乎帝曰然朕方天下多難未能報且毋議和泌曰辱少華等乃牟羽可汗也知陛下即位必償怨乃謀先苦邉然兵未出為今可汗所殺矣今可汗初立遣使來告垂髮不翦待天子命而張光晟殺突董等雖幽止使人然卒完歸則為無罪矣帝曰卿言則然顧朕不可負少華等奈何泌曰臣謂陛下不負少華少華負陛下且北部君長身赴難陛下在藩春秋未壯而輕度河入其營所謂冒垂堂之戒也為少華等計當先定㑹見禮臣猶危之奈何孑然赴哉臣昔為先帝行軍司馬方葉護來先帝祇使宴於府及議征討則不見也葉護邀臣至營帝不許使好謂曰主當勞客客反勞主邪東收京師約曰土地人衆歸我玉帛子女豫回紇戰勝葉護欲大掠代宗下馬拜之回紇乃東向洛臣猶恨以元帥拜葉護於馬前為左右過然先帝曰王仁孝足辦朕事下詔慰勉葉護乃牟羽諸父也牟羽之來陛下以元子不拜於帳下而可汗不敢少有失於陛下則陛下未嘗屈矣先帝拜葉護全京城陛下乃不拜可汗固伸威於敵何恨焉然計香積陕州事以屈己為是乎伸威為是乎藉令少華等以陛下見可汗閉壁五日與陛下張飲天下豈不寒心哉而天助威神使其心馴服牟羽毋捧陛下以貂裘叱左右促命騎躬送出營此少華等負陛下也假令牟羽為有罪則今可汗已殺之立者乃牟羽從父兄是為有功渠可忘之邪且回紇可汗銘石立國門曰唐使來當使知我前後功云今請和必舉部南望陛下不之答其怨必深上謂李晟馬燧曰朕素怨回紇今聞泌言自覺少理卿以為如何皆對曰誠如泌言泌曰臣以為回紇不足怨向來宰相乃可怨耳回紇再復京城今可汗又殺牟羽復有何罪吐蕃幸國之災陷河隴數千里之地又入京城使先帝䝉塵於陕此乃百代必報之讐為可怨耳上曰今與之為怨已久今往與之和得無復拒我為異域之笑乎對曰臣請以書與之約為臣子往來不過二百人印馬不過千匹無得攜中國人及商胡出塞五者皆能如約則主上必許和親如此威加北荒旁讋吐蕃足以快陛下平昔之心矣上從之既而回紇可汗遣使上表廷命上大喜謂泌曰回紇何畏卿如此對曰此乃陛下威靈臣何力焉上因問招雲南大食天竺之計對曰回紇和則吐蕃已不敢輕犯塞矣雲南苦吐蕃賦役未嘗一日不思復為唐臣也大食在西域為最強與天竺皆慕中國代與吐蕃為仇臣故知其可招也遂遣其使者歸許以公主妻之貞元三年吐蕃卑辭厚禮求和於馬燧燧信其言為之請於朝李晟言於上曰吐蕃無信不如擊之韓滉曰今兩河無虞若城原鄯洮渭使晟及劉𤣥佐等守之河湟二十餘州可復也上欲從之㑹滉卒張延賞與晟有隙數言和親便上亦素恨回紇欲與吐蕃擊之遂從燧延賞計貞元三年渾瑊與吐蕃盟于平涼吐蕃劫盟初瑊之發長安也李晟深戒之以盟所為備不可不嚴張延賞言於上曰晟不欲盟好之成故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃召瑊切戒以推誠待敵勿為猜疑瑊奏吐蕃決以辛未盟延賞集百官稱詔示之曰李太尉謂和好必不成今盟日定矣晟聞之泣曰吾生長西陲備諳邊情所以論奏但耻朝廷為吐蕃所侮耳上始命駱元光潘原韓遊瓌屯洛口以為瑊援是日上視朝謂諸相曰今日和戎息兵社稷之福栁渾曰吐蕃殊域也非盟誓可決今日之事臣竊憂之李晟曰誠如渾言上變色曰栁渾書生不知邉計大臣亦為此言耶皆頓首謝是夕韓遊瓌表言敵劫盟者兵臨近鎮上大驚謂渾曰卿書生乃能料敵如此其審邪憲宗時回紇使者再朝遣伊難珠再請昏未報可汗以三千騎至鸊鵜泉於是振武以兵屯黑山治天德城備敵禮部尚書李絳奏言曰回鶻盛彊北邉空虛一為風塵則弱卒非抗敵之夫孤城為不守之地儻陛下懷此增甲兵飭城壘中夏長䇿生人大幸也臣觀今日處置未得其要夫邉憂有五請歷言之北狄貪沒唯利是視比進馬規直再嵗不至豈厭繒帛利哉殆欲風髙馬肥而肆侵軼故外攘內備必煩朝廷一可憂兵力未完斥候未明戈甲未備城池未固飭天德則敵必疑虛西城則磧道無倚二可憂夫城保要害攻守險易當謀之邉將今乃規河塞之外裁廟堂之上敵猝犯塞應接失便三可憂自修好以來山川形勝兵戍滿虛敵皆悉知賊掠諸州調發在旬朔外其係纍人畜在旦夕內比王師至則敵已歸寇能久留役亦轉廣四可憂西北二陲素相攻討故邉無虞今回鶻不市馬若與吐蕃結約解仇則將臣閉壁憚戰邉人拱手受禍五可憂又淮西吳少陽垂死可乘其變諸道興發役且十倍臣謂宜聽其昏使守蕃禮所謂三利也和親則烽燧不驚城堞可治盛兵以畜力積粟以固軍一也既無北顧憂可南事淮右申令於垂盡之寇二也北部恃我戚則西戎怨愈深內不得寧國家坐受其安寇掠長息三也今舍三利取五憂甚非計或曰降主費多臣謂不然我三分天下賦以一事邉今東南大縣賦歲二十萬緡以一縣賦為昏資非損寡得大乎今惜昏費不與假如王師北征兵非三萬騎五千不能扞且馳也又如保十全之勝一歲輒罷其饋餉供擬豈止一縣賦哉帝不聼元和三年山南東道節度使于頔憚上英威為子季友求尚主上以普寧公主妻之李綘諫頔殊族季友庶孽不足以辱帝女上曰此非卿所知頔大喜上因使人諷之入朝頔遂奉詔文宗太和五年吐蕃請和約弛兵而大酋悉怛謀舉維州入之劒南於是李德裕上言韋臯經略西山至死恨不能致今以生羌三千人燒十三橋搗敵之虛可以得志帝使羣臣大議請如德裕䇿僧孺持不可曰吐蕃綿地萬里失一維州無害其彊今修好使者尚未至遽反其言且中國禦戎守信為上應敵次之彼來責曰何故失信養馬蔚茹川上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為況天子乎上以為然詔德裕以其城及悉怛謀等歸之吐蕃吐蕃誅之境上武宗㑹昌中時回鶻先為黠戞斯所破烏介可汗挾公主牙塞下種族大飢以弱口重器易粟於邉退渾党項利虜掠因天德軍使田牟上言回紇叛將嗢沒斯等侵迫塞下願以部落兵擊之議者請可其奏德裕曰窮鳥入懷猶當活之況回紇於國屢建大功今為鄰國所破以窮來歸未輒擾邉遽伐之非漢宣帝待呼韓之義不如與之食以待其變陳夷行曰資盜糧非計也不如擊之便德裕曰沙陀退渾不可恃也夫見利則進遇敵則走此輩之常態孰肯為國家用邪天德兵素弱以一城與徑敵角無不敗請詔牟無聽諸戎計帝於是貸粟三萬斛㑹嗢沒斯殺赤心以降赤心兵潰去於是回紇勢窮數丐羊馬欲藉兵復故地又願假天德城以舍公主帝不許乃進逼振武保大柵杷頭峯以略朔川轉戰雲州刺史張獻節嬰城不出回紇乃大掠党項退渾皆保險莫敢拒帝益知向不許田牟用二部兵之效乃復問以計德裕曰杷頭峯北皆大磧利用騎不可以步當之今烏介所恃公主爾得健將出竒奪還之王師急擊彼必走今鋭將無易石雄者請以藩渾徑卒與漢兵銜枚夜擊之勢必得帝即以方略授劉沔令雄邀擊可汗於殺狐山敗之迎公主還回紇遂敗進位司徒黠憂斯遣使來且言攻取安西北廷帝欲從黠戞斯求其地德裕曰不可安西拒京師七千里北廷五千里異時繇河西隴右抵玉門關皆我郡縣往往有兵故能緩急調發自河隴入吐蕃則道出回紇回紇今破滅未知黠戞斯果有其地邪假令安西可得即復置都護以萬人往戍何所興發何道饋挽彼天德振武於京師近力猶苦不足況七千里安西哉臣以為縱得之無用也昔漢魏相請罷田車師賈捐之請棄珠崖近狄仁傑亦請棄四鎮及安東皆不願貪外以耗內此三臣者當全盛時尚欲棄割以肥中國況久沒甚逺之地乎是持實費市虛事滅一回鶻而又生之帝乃止德裕又請遣使訪問太和公主狀奏曰右伏以元和中回鶻纍請和親憲宗不許至長慶初穆宗以北敵代結姻好中國無虞邉境晏然生人受福所以割慈下嫁用示懷柔今回鶻國已破亡公主未知所在若不遣使訪問慰其艱危彼中必謂國家降主北庭本非愛惜便懷輕易之意永無敬重之心非止甚傷其情實亦負於公主臣等商量望令苗稹將一二十輕騎齎詔書先至嗢沒斯處令其轉差人送入至公主所在若嗢沒斯便受朝㫖固表恭順之心若辭拒此行足彰背叛之跡因此偵察無所隱情伏希聖㫖特賜省察德裕又論田牟請許党項讎復回鶻嗢沒斯部落狀奏曰右臣等雖不習兵鈐昧於邉事然酌其物理情實可知伏希聖慈特賜詳覽比者陛下常慮回鶻國中離散未是實情今據我阿泥及伊難珠合等書云此間更無活處即是實耗又回鶻安孝順云赤心宰相問漢國中看你回鶻好無足知依倚大國意甚勤懇今若許田牟徇党項貪利之心不自量力犯必死之彼絶歸欵之誠事捷亦損耗甲兵大虧恩信不成則永為邉患取笑四夷況窮鳥入懷尚須矜憫逺人慕義曽未犯邉自六月至今未嘗捉烽戍一人奪党項一物披誠欵塞望闕哀鳴昨者所獻表章詞懇意順棄而不納先務誅夷此不可一也若回鶻國中無釁種落皆安嗢沒斯叛逆而來即須拒絶可汗既自失國牙帳已無攜挈傷殘寄命他所嗢沒斯等迫於饑困各欲求生田牟執稱背國亡命是去年為惡徒黨都似與德彛雪屈為党項報讐察其用情殊非體國此不可二也漢宣帝五鳯中胸奴大亂議者多曰胸奴為害日久可因其壞亂舉兵滅之蕭望之對曰宜遣使吊問救其災患四夷聞之咸貴中國之仁義其後南單于果自臣服六十年邉境無事今縱不能扶其微弱豈宜因此幸災此不可三也伏望且詔太原振武排比騎兵於邉上戒嚴防其侵軼待犯國家城鎮然后以武力驅除若只以黨項退渾小有劫奪任部落自相仇報亦未可助以甲兵常令大信不渝懷柔得所彼雖蠻貊必合感恩待張賈使回足知情實仍望詔田牟不得擅出詭計妄邀竒功兼詔仲武不得納將吏惑詞為國生事如䝉允許伏望付翰林約此意處分又曰比者只待張賈使回今到已數日須早發遣緣回鶻已入邉界未測多少天德兵力寡少須務懷柔伏以自古禦戎只有二道一是厚加撫慰二是以力驅除此事利害較然前古皆有明效漢宣帝厚撫呼韓代享其利邉境六十年無事漢武力制胸奴海內疲弊生人減半今嗢沒斯若不稍加恩意令盡歡心須至以力驅除必恐永為邉患假使其衆殘破摧伏不難亦須先加以恩不令疑二古人云將欲取之必固與之正謂此也臣等商量縱不與糧食接借其賜物恐不可太薄若止於所賜特勒宰相實恐發遣未得須是稍令優厚於朝廷苦無費損可以保全朝野羣情皆望如此伏希聖慈特賜察納黠戞斯阿熱遣使行三嵗至京師武宗大恱班渤海使者上以其處窮逺能修職貢命太僕卿趙蕃持節臨慰其國詔宰相即鴻臚寺見使者使譯官考山川國風德裕上言貞觀時逺國皆來中書侍郎顔師古請如周史臣集四夷朝事為王㑹篇今黠戞斯大通中國宜為王㑹圖以示後世有詔以鴻臚所得繢著之三年德裕言維州據髙山絶頂三靣臨江在戎界平川之衝是漢地入兵之路初河隴盡沒惟此獨存吐蕃潜以婦人嫁此州門者二十年後兩男長成竊開壘門引兵夜入遂為所陷號曰無憂城從此得以併力西邉慿陵近甸韋皋欲經略河隍須此城為始急攻數年卒不可克臣到西蜀空壁來歸南蠻震懾山西八國皆願內屬可减八處鎮兵坐收千里舊地且維州未降前一年吐蕃猶圍魯州豈顧盟約當時不與臣者望風疾臣詔送悉恆謀等令彼自戮臣纍表陳論乞埀矜捨答詔嚴切竟令執還將吏對臣無不隕涕蕃帥即以此人戮於境上絶忠欵之路快凶虐之情乞追奬忠魂各加褒贈詔贈悉怛謀為右衛將軍宣宗時􅰵陽判官李義山為節度使王茂元奏吐蕃交馬事宜狀右臣得所由狀報吐蕃請於鳯翔交馬者臣伏以吐蕃衆則頑獷心唯馳突不思率服但逞姦欺國家務以懷柔極其撫御敦惠好於匪類擇使命於本朝容養甚𢎞錫賚非薄昔魏酬倭國止於銅鏡紺文漢遺單于不過犀毗綺夾並一介之使將萬里之恩豈若陛下選彼周行取於宗屬而敢淹停曠日留止彌年久巳回車又請交馬視其詭詐難以保明深算機宜未可容許臣又見蕃中來人說云其首領素已年侵更兼心疾不恤其衆連誅舊臣差徵無時凶荒纍歲以此遂違盟約仍致逗留今恐事出多端致由羣下上欺聖德旁損廟謨翻覆難知善惡未决竊計君奕合有表章伏望更敕羣臣商量且命界首止絶儻須存逺馭要示殊恩但言彼蕃來往不時邉將奏論甚切亦無妨國體未阻戎心臣自擁節旄亟踰星琯修裝器械蓄積糧儲又時巡訪川原討尋蹊隧每當衝要必有隄防增築故城穿濬新塹遍箱鹿角未易可當木柿魚膏不曽虛棄雖臨搖落免有冦攘忖彼物情未能動衆其若便侵亭障自起烟塵臣且率勵當軍猶可獨當一靣況其鄰道悉是強兵敢忘充國之請行不慮張宗之辭難伏乞聖恩鑒臣鐵石納臣芻蕘使其畏懾威靈挫平奸宄臣不勝憤激懇迫之至懿宗即位南詔豐祐卒子酋龍立僣號遣兵陷播州咸通二年同平章事杜悰上言南詔彊盛西川兵食單寡未可輕與之絶且應遣使吊祭諭以新王名犯廟諱故未行册命待其更名謝恩然後遣使僖宗時南詔酋龍卒子法立請和親吏部侍郎崔淡等上言不可從髙駢劾淡沮議西川節度使崔安潜上言蠻蓄悖亂心不識禮義安可以賤𨽻尚貴主失國家大體淡等議可用臣請募義征子率十戶一保願發山東鋭兵六千戍諸州比五年蠻可為奴久之帝手詔問安潜和親事答曰雲南姚州譬一縣中國何資於彼而遣重使加厚禮彼且妄謂朝廷畏怯無能為脫有它請陛下何以待之且天宗近屬不可下小蠻夷臣比移書不言舅甥黜所僣也有如蠻使者不復至當遣諜人伺其隙可以得志晋髙祖天福六年成德節度使安重榮執契丹使者上表稱吐谷渾兩突厥渾契苾沙陀各帥部衆歸附党項等亦納契丹告牒言為彼所淩暴願自備十萬衆與晋共擊契丹陛下屢敕臣承奉契丹勿自起釁端其如天道人心難以違拒大抵斥晋主父事契丹竭中國以媚無厭之敵又為書遺朝貴云已勒兵必與契丹決戰晋主患之時鄴都留守劉知逺在大梁泰寧節度使桑維翰密上疏曰陛下免於晋陽之難而有天下皆契丹之功不可負也今重榮恃勇輕敵吐渾假手報仇皆非國家之利不可聼也臣觀契丹士馬精彊戰勝攻取其君智勇過人其臣上下輯睦牛馬蕃息國無天灾此未可與為敵也且中國新敗士氣雕沮又和親既絶則當發兵守塞兵少則不可以待寇兵多則饋運無以繼之我出則彼歸我歸則彼至臣恐禁衛之士疲於奔命鎮定之地無復遺民今天下粗安蒸民困弊靜而守之猶懼不濟其可妄動乎契丹與國家恩義非輕信誓甚著彼無間隙而自啓釁端就使克之後患愈重萬一不克大事去矣議者以嵗輸繒帛謂之耗蠧有所卑遜謂之屈辱殊不知兵連禍結財力將匱耗蠧孰甚焉武吏功臣過求姑息屈辱孰大焉臣願陛下訓農習戰養兵息民俟國無內憂民有餘力然後觀釁而動則動必有成矣又鄴都富盛國家藩屏今主帥赴闕軍府無人乞陛下略加巡幸以杜姦謀晋主謂使者曰朕比日以來煩悶不決今見卿奏如醉醒矣歷代名臣奏議卷三百四十一
