body:
  text: 歷代名臣奏議卷二百三十四明楊士竒等撰征伐宋孝宗隆興二年張浚上言曰臣伏奉今月十八日午時親筆處分臣已恭禀聖訓王之望等言泗州利害所當講明今欲且令謹守俟至秋初專責主事者俾權歸於一聖諭切當事機臣見遵依施行向北斥堠緣馬軍極少差使不敷泗上地勢平坦恐步卒當彼馬騎不能遽還近陳敏等建議欲於臨淮縣築堡屯步兵三百人為斥堠庶幾緩急可以相應臣見審度措置又舟楫尚少誠如聖慮臣見委劉寶打造一百隻委運使黃仁榮應副材料工匠臣望陛下因宰執奏事宣諭令仁榮一到鎮江躬親應副臣見别具奏聞次他日舟船既辦分差忠勇軍駕放自不闕人每舟以強弓弩手二十人載其上施放火箭足可禦敵伏乞睿照臣伏䝉聖訓諸將見和議成與不成之間語言反覆此正中其病臣即以宣示劉寶吳超劉光時范榮等莫不悚懼知愧然而以臣觀之將帥難得英偉之才況人情之常不免觀望以此語言不一理當戒敕惟陛下示以好惡明正表儀俾各悉心奉公不求偷合苟容以報國家夫死者人之所難陛下以天下為念不肯自求一已之安表而率之猶恐習成舊態各不盡力矧夫朝廷上下導之以和孰不捨難就易以幸一日安全也此是社稷大計在陛下為重在羣臣為輕自非陛下毅然獨斷與天同心申之以號令齊之以賞罰舉天下之大制命在我誰為陛下出力者至於挺身任事盡節向前一有差跌則衆口交攻禍患不測而以資結託平生畏避碌碌度日者例獲大官且無後悔兹望陛下深察必使賞罰之間上當天心下合人情即後來諸將易於遣使伏望陛下更致聖思幸甚臣又伏䝉聖諭敵人八九月之間必竭力而來在陛下以社稷宗廟之重理宜過為之備臣聞太公佐周以伐紂伊尹相湯以伐桀彼皆深通天人之際審桀紂之無道知其民之思治有所不動動無不成又況湯武之君德修于已而二臣用心上達於天計䇿圖謀若有神相蓋非偶然也臣學識駑下揆事度變安足以望前賢萬一臣竊觀金人無道弒主再世天怒人怨破滅無疑而臣所憂有大焉者今風俗習成上下相䝉惟知富貴不知有他上違天理下虧臣節此風不改借使金人已亡內患外變且將相仍而起矣而其責實在陛下臣故願陛下正心修已急收人才以應天心以活萬姓使事事誠實感格天人聖德日新兵革自息理之決然更無可疑詩曰鼓鐘于宫聲聞于外惟陛下敬之謹之天下幸甚臣子栻過䝉聖慈奬借臣不勝感激之至惟是臣父祖皆以賢良方正科出身臣以艱難之時勉强事功不謂讒謗交攻幾至亡身以及家族獨荷陛下眷遇之隆父子感涕恨無以報惟望陛下察三至之言終始保全使免大戾浚又奏邊事曰臣今月行次常州約十四五日間可以渡江臣自離行闕內外之議及以書抵臣者多欲臣只於維揚暫駐無至極邊意恐敵人因此舉兵或至生事大率世俗所見是非顛倒往往如此仰惟陛下聖智髙明卓越羣倫不待臣言固已洞照而臣嘗所經歷敢畢陳之臣聞漢兵利於夏是以宣王有六月之師敵兵利於冬是以北敵率秋髙而舉方初冬時敵以虗聲臨我使我調發謹備不得休息及至春夏我得天時乃欲斂兵藏跡使彼一無可虞安居養牧以俟深秋復來侵擾此豈計哉今日之事陛下以人才未得財用未備未能恢張聖略親總六師蓋亦出於不得已也至於脅之以聲示之以勢使彼羽檄交馳使命奔走羣情疑恐多設備具增兵益馬虛廢糧食逮至秋高不能措置舉動庶幾立國之計要不可忽也臣故願陛下汲汲夫人才之用合志同心以待機㑹臣到維揚歇泊三兩日間即一到楚泗謹先密具奏知伏乞睿照浚奏川陕事宜曰臣竊惟自昔三國鼎立惟吳蜀相與為脣齒故魏擊吳則蜀應擊蜀則吳應今二國之勢我盡得之而川陕之師荷戈接戰亦既幾年陛下慨然軫念屢發詔㫖使之措置牽制偶舟師稽遲張子蓋復以久病事容齟齬然而自今以往圖之安可緩也且夫蜀人之不欲吳璘出師於陕猶吳人之不欲王師輒越江淮也彼各以鄉里家屬為重勢有不得不然而事機之來緩急輕重利害甚大非審思力斷順天人之心其安能有濟哉兵家之事難以遙度它日或有處分至吳璘只望詳述利害令璘隨宜措置蓋恐逺地所傳未信或至違誤伏乞睿照浚論東西牽制奏曰臣仰荷陛下委任至重不敢愛死庶報萬分顧臣雖愚非不知坐保江淮圖安目前為可以免戾而區區每思牽制此敵於東方者非有他也顧以敵萃精兵於關陕東方空虛不及兹時有以撓之用觀人心之變而坐待敵人回師併力以事兩淮竊恐國家之悔為無及矣臣日近奏禀山東海舟利害亦非敢冒昧為之蓋欲先張聲勢屯泊於海州一帶招收壯勇窺伺機㑹庶幾使敵有後顧之憂而人心易離不能深入其與束手不為俟敵勢之張為有間矣臣衰老多病豈復僥幸萬一功名之心惟是受國厚恩朝思夕惟不忍只為目前之計以蹈後禍伏惟聖度髙逺灼見事機如以臣所慮為有可采即乞特賜親筆處分令臣執守措置不然亦乞明以諭臣使之遵守伏乞聖慈特賜睿㫖不勝幸甚浚又奏敵勢及海道進取等事疏曰臣契勘敵人南向之兵在靈壁虹縣近發回宿州南京者無慮數千騎雖姦詐百出情未可量要之徑兵多在陕西而宿亳南京一帶不過近四萬餘人潁昌襄城亦不過二萬餘人比聞復出文榜欲以三月及八月因草地茂盛來窺淮南以臣度之敵若無西北牽制之患則今嵗秋成糾合大兵圖我淮甸理無可疑臣日夜思所以待之之計私以為敵之事力素強倘非出竒搗虛乘其不意使各有懷顧巢穴之心則攘却之功未易可為也臣自去冬即具奏乞東西相應之舉與故鎮江都統張子蓋反復計度當時所任將佐所差舟楫所募忠義之人議已素定㑹子蓋卧病連月而福建海舟踰期不來致使川陕之師獨當一面失此機㑹誠可歎息也今敵兵疲弱非往昔比而民心懷宋日甚一日山東虛實可坐而料三月以後南風順便海舟之發適當其時因東人思奮之心而用之事可圖矣伏奉二十三日處分令臣以逸待勞觀釁而動敢不遵禀臣愚見以為淮上大兵當務持重獨海道之舉不可不亟為不然彼將無所顧忌秋髙馬肥得以驅脅蕃漢一肆所為矣陛下圖之天下幸甚浚又論牽制事宜奏曰臣等誤膺重寄夙夜恐懼思有以報稱萬一況事關利害一失機㑹後悔難及臣等不敢隱默顧望上負聖知伏惟聖慈特賜鑒察臣等竊惟兵家之事必以謀勝古人用師彼出則我守彼歸則我入故晉悼公三駕而楚不能與爭漢髙祖用轅生之說出兵宛葉以分楚力卒勝垓下諸葛亮祁山之師連嵗數出竟以困魏而王朴安邊策亦曰備東則擾西備西則擾東奔走之間可以知其虛實蓋敵人事力之強必左制右牽以乘其弊而後可圖也若欲拱手不為制命於敵雖幸目前之安終必貽患於後矧勢陵事格有不得而暫安者乎臣等受命以來自惟當此財匱兵疲民困力弱之際苐當審擇險要以守為主而事貴權時理難固執揆之今日有不得而但已者竊聞陕西吳璘之師曽未幾月與敵人大戰者已至于再臣等私以為此不可不為之深思蓋使此敵得志於西則氣焰必熾脅制蕃漢聚兵邊陲迫我臣屬事固難處使敵脫有敗績則必形勢支離上下攜二幾不可失使敵留屯列守求以困我則磨以嵗月變故多端然則敵之勝負與夫持久不決皆有大利害存乎其間倘坐視不問貽憂異時恐非計之得也臣等愚慮欲先發舟師奄出海道以搖山東而令張子蓋駐兵盱眙楚泗之間李顯忠駐兵夀春花靨之間蓄鋭休卒用觀其變先立不敗之地俾敵人首尾奔命之不暇見利則趨知難則守而潜遣忠義結約中原機㑹蓋有可言者敵聞我重師臨邊其精鋭往關陜者又不敢輒呼之使還人心憂顧必致疑惑而我師之在德順者知吾有牽制之舉將士之情孰不奮作益堅鬬志若皇天悔禍敵之弱勢畢露無餘則豪傑響應理無可疑陛下徐御六飛來臨建業力圖恢復誠千載一時也議者或謂此敵若復能竭國而來吾將何以應之惟完顔亮十年圖謀一旦舉十萬之衆深涉吾地身殞衆遁士馬物故甚衆使亮復生亦必不能再舉全師於今日况葛王北有契丹之擾西有陜右之敵分兵州郡處處屯守其不能遽以全師復來明矣今我諸軍久屯淮上耳目所接斥候固明萬一此敵或冒昧一來小則率衆抗禦足遏其鋒大則斂兵清野以伺其便其權固常在我而初無所損也仰惟太上皇帝宵衣旰食屈已為民而敵計多端終不自革太上皇帝肅將天命大駕順動凶渠就隕天之佑德蓋已可見而親舉大器授之聖子恭惟陛下體太上付託之重慨祖宗王業之艱恤生民塗炭之苦念金人讎耻之大未嘗一日而忘于心事幾至此誠不可忽臣等中有所見倘若隱默則其欺天負君之罪雖死奚及惟是智識淺短安敢自以為當伏望陛下默運宸算特賜處分不勝幸甚孝宗時起居郎胡銓進故事曰隋文受周禪令賀若弼平江南禽陳叔寶先是弼請㳂江防人交代必集歷陽大列旗幟陳人以為大兵至既知防人交代其衆復散後不復備及是弼以大兵濟江陳人弗覺遂平陳臣聞兵法曰兵出詭道又曰兵以竒勝何謂詭變詐百出以計取敵曰詭弼請㳂江防人交代必集歷陽是也何謂竒出其不意使人莫測曰竒弼以大兵濟江陳人弗覺是也中國由正道外域由詭道中國以正勝外域以竒勝由正道者常不得志由詭道者常得志以正勝者常少以竒勝者常多此自古及今中國所以多見陵於外國也建炎戊申敵人請和聲言提兵百萬有事河北初無窺維揚意宰相黃潜善汪伯彥真以為不吾襲也既而以精兵萬人直搗揚州而汪黃安坐中書初不知敵兵之至也一旦六飛䝉塵倉皇出奔幾不免虎口自靖康迄今凡四十年敵人未嘗不由詭道未嘗不以竒勝而我終不悟也前車覆後車戒前事之失後事之師竊聞道路之言敵人欵我以和潛師窺伺或言多造戰艦由海道以進或言實粟塞下由間道以來雖未必可信然弼之㳂江防人必集歷陽前事之驗也敵人之計安知不出於此乎陛下前日奮然下詔謂和決不可成有識咸鼓舞以謂聖神逺慮洞見敵人之情有如蓍蔡近者邊臣遣兵官孫造往返境上疲於奔命竟不能得敵人要領其愆期爽約亦可見矣臣願陛下堅守前日和不可成之詔力修政事十年生聚十年教訓如越之圖吳則社稷幸甚生靈幸甚虞允文上言曰臣被奉元降指揮委臣體訪事宜臣據吳璘及諸處探報多言敵人遣使督責陕西監軍哈希又益以兵使必爭熙河秦鳳涇原三路新復州縣此亦理之必然蜀士大夫多以今嵗防秋官軍分戍皆在新邊數百里之外地廣兵稀入寇之路不一與去嵗守蜀口險隘事體大段不同萬一敵騎奔衝或有透漏則官軍在逺救應不及而內無扞禦之備意欲退守蜀之舊疆臣竊以為不然蓋敵中方亂敵兵在中原者不多哈希不過簽諸州百姓以為軍勢爾人皆有不得已之心而無久練必勝之用亦何足深畏也三路之地取之既難棄之或易則新附之民必大失望異時進兵深入何以責西人傒望而響應也臣見與吳璘商量措置拘收姚仲人馬别立陳隊并教習興元義士以待用又於成都府等路搜集威強兵以待緩急調發而臣之愚慮乃以鞏州一城未下為憂蓋腹心之疾未去則秋深寇至其於戰守必至相妨臣再三貽書吳璘而璘之意亦與臣合比日分中軍人馬二千遣其子挺往初抵城下敵識認是官軍一城皆震擾即其日有四甲兵白晝縋而下具言城中饑虛皆有求哀乞降之意約旦夕可復此州則官軍得以全力而保險决可仰寬西顧之憂也才俟鞏州捷至别具事宜奏知伏乞睿照允文又論今日事機可戰奏曰臣愚無當世之用誤䝉陛下號召凡今日事機所不能盡曉謹博詢廣采少裨萬一我今與敵又非特古所謂中國與四夷有內外首足之辨而已也女真與我乃真不共戴天之讎其當必報乃天地之大經春秋之大義自建炎以來四十年間天下之人有口者類能言之不待臣復縷析而索言之矣所甚切者羣士夫之言曰陛下英武沈毅料敵制勝出於天授而敵主昏庸權移於臣下一可戰也二聖禪授之德升聞而金人篡弒之禍相接天命不二二可戰也敵人衆叛親離有骨肉相攻之禍而吾四封之內無盜賊嘯聚之憂三可戰也中原百姓咸思祖宗德澤身在敵境心在本朝四可戰也自前年金人用兵中原豪傑無逐鹿之心而率衆內附今皆居吾境上聚為市落棄其墳墓田業不去五可戰也朝廷自收復陕西三路得兵得馬得糧得形勢之地六可戰也敵中管軍酋領絶不知兵所至浪戰而國家宿將尚有可用之人七可戰也敵中去嵗久旱蝗飛蔽野而梁洋秦鳳之間蝗不入境嵗事大熟可以卜見天心八可戰也彼久盛當衰此久弱當振天道自然之理今適其時九可戰也臣觀天人之㑹誠有可戰之機但朝廷規摹未定議論未一措置未當未有可戰之實爾如張空拳以戰則後日之禍將有不可勝言者伏願陛下與二三大臣熟議而深思之盡力於戰備無為因循之計而後可以萬全天下幸甚允文又應詔論進討勝勢兵糧將帥奏曰臣准金字牌遞賜臣及王彥御劄一封伏䝉聖恩諭以敵勢衰弱將來必有機㑹可乘命張浚作書與臣等預定籌畫天開聖哲天啓淵衷此宗社生靈無疆之休也臣既非其才亦非其任不足以窺逺圖奉明詔而清問下及千載之遇臣何敢無說以自獻臣竊觀今日天下之勢豈無可乘之機敵兵雖多而其心已離官軍雖少而其用常分離固可圖而分亦未容取勝此三數年來楚漢之雌雄所以未決也自古帝王圖回天下其兵之用必有先後重輕之序漢髙祖起山東而未嘗與羣雄爭山東光武起南陽而未嘗以其身一日留南陽唐太宗起太原而未嘗分其勝兵以守太原各因其時各順其勢以取關中以取河北者天下勝勢所在也勝勢得而天下定矣其間不過遣一偏一禆分餘兵以略地而其勝兵終合為一勢全力固餘兵得以倚重而成功方策歷歷可考也臣不知士大夫之論以今日之勢當孰先今日之兵當孰重且自陜而西自山以東綿亘數千里之地如將曰諸道並進鼓行而前漫浪一戰僥幸一勝或容有之然相去遼絶首尾莫應若差跌一敗則進退倉皇危疑之論錯出而一人之心有不能自保者蓋非常之原知之者少非常之功忌之者衆倘朝廷之上或是或非將帥之間或進或退則誤國大計其禍有不可勝言者比年之事可以鑑矣識者之論以為恢復之圖當先定其規模無朝從而暮橫無旦是而夕非一勝不為之喜一敗不為之懼浮言莫搖羣讒莫毁則萬全之功庶幾其可立也今敵兵之在境上雖或聚或散去來不常而逡巡纍月委曲求和則虛弱之形可以畢見當西師收復三路所得之糧以五六十萬計吳璘之兵在德順蜀無一粒之粟過河池王彥之兵在商虢蜀無一粒之粟過上津今河南汝蔡襄郟之間敵之積粟亡慮十數萬亦何患無可因之糧若官軍以全力而進則或取汝取蔡或由商虢以搗河東或由嵩鄧以窺河洛以敵騎之實處張我之虗聲以敵營之虛處為我之實事則何攻不克何取不獲若兵力不全臣謂雖克之必不能守雖獲之必不能有也至於諸將之才互有短長要當使功使過使亷使貪多儲以待用其怯而謀身者雖通顯必棄其勇而徇國者雖卑賤必用如倚辦一二人而責其進取則氣必驕偃蹇自肆要我之事不一而功必不就矣臣愚欲望陛下先與腹心大臣熟計之以臣之說而審究之議論一則規模定規模定則事功立此宗廟生靈無疆之休也抵突天威伏深震懼祕書省正字趙汝愚乞力行自治之計奏曰臣竊惟祖宗創業之艱難垂二百年罹兵革之亂神州陸沉有識之士言之切齒陛下天錫勇智慨然發憤勞形苦心志在恢復誠社稷生靈之幸然臣竊觀天下之勢以謂國家之與敵人不幸強弱不同蓋可以德攻而未易以力取也今夫興師動衆鼓行以北自一邑取一州自一州取一道轉鬬而前是以力戰天下也敵人未滅必將驅逐精鋭之衆以與我爭其勢不奪不饜往年唐鄧海泗之戰是已萬一智均力敵曠日持久智力外竭資儲內虛加以水旱洊臻盜賊乘之而起蓋有甚可憂者陛下不可謂必無是事也兵法曰先為不可勝以待敵之可勝臣愚伏願陛下含忿忍耻力為自治之計於是虛懷納諫以輔其德任賢使能以治其政開布大信以繫中原固結之心務農訓兵以隆根本不拔之勢國既富矣兵既強矣方且能而示之不能用而示之不用嚴飭邊將俾毋以小利數驚動邊境使敵不猜不懼日成驕惰苟且之政然後觀時俟釁以順而動乘破竹之勢以取之其為力易矣臣所懼者將有大言無實之人不量事勢竊窺陛下之意迎合取寵爭言速戰之為利臣愚誠不足以明勝敗之數或者敵更懼而修德則陛下之所欲愈速而愈緩矣臣不勝惓惓參知政事史浩條具弊事奏曰臣今月十六日午刻恭領聖㫖下詢臣曰前日集議宰執獨無奏章侍從臺諫所言孰為至當令臣條具臣祇奉威命震懼于心倉卒之間不知所措臣竊觀聖問仰見淵衷既定宏規復咨羣議此實帝王之度量豈容蠡管之測窺臣頃因陛下即位之初嘗陳今日禦戎之計謂藩籬不可不固扃鐍不可不嚴藩籬固則內之政事可修扃鐍嚴則外之姦細難入先為守備是乃良規若夫議戰與議和則亦在彼不在此彼戰則戰彼和則和和不忘戰姑為雪耻之後圖戰不忘和乃欲緩師而自治此度今年之事力故立一時之權宜既匪成謀未為定論苐當堅壁力禦攻衝謹俟乘機以圖恢復倘聽淺謀之士時興不教之師寇去則論賞以徼功寇至則斂兵而遁迹使彼無辜之赤子皆為橫死之游魂取快一朝含怨萬世謂之恢復豈不痛傷然念祖宗版圖久汚異域之俗祖宗陵寢鞠為荆棘之場為人子孫可忘食息正須勵志於名實賞罰責成於將相公卿假以嵗時復其境土鋒乘破竹勢順建瓴是為弔民伐罪之師不作鼠竊狗偷之態此陛下之素志亦愚臣之舊聞彼侍從臺諫之流真議論文章之粹蘭菊有春秋之異藥石俱砭劑之良固匪能言而不能行實可敬而不可慢雖衛多君子知國勢之愈隆然楚有得臣念敵情之未保是宜練兵而選將常若拯溺以救焚臣願陛下采其所陳亟為之備臣適當短晷素乏長謀姑以狂辭仰酬清問覬因一得少補萬分浩論用兵劄子曰臣昨晚恭領御筆論僞境元帥所答張浚書誠如聖訓然以臣愚見陛下經廢弛之後目今兵力寡弱財賦單匱若嵗嵗設備敵人聲東擊西長淮千里大江綿亙皆是敵境處處用備人人不得休息譬如兩虎共鬬勢不俱生二器相擊薄者先穿若不因其來稍加思慮臣恐自此無時寧息臣觀敵情彼亦厭兵但以本朝時縱無謀之將前去侵伐不得已來應我若能因其厭苦乘勝逐北掃清中原是一機㑹若猶未也須當料吾甲兵如何財用如何取之當自何處守之當用何人使吾備不弛吾力益壯他時觀釁而動有何不可蓋敵國未有長盛之理破滅有期但當小忍以俟之爾以陛下之英明神武豈患不得天下但顧今日兵力未壯民力未蘇財力未足而遽捨內以事外雖得天下未見其利也宜因此徐召張浚來議此事臣之識淺不過如此不足以仰裨聖算惟陛下恕之浩又上奏曰臣恭覩陛下特發英斷進討山東以為恢復故疆牽制川陜之謀臣獲侍清光親奉睿㫖不勝欣抃然亦有惓惓之愚不敢隱默竊以傳聞之言多謂敵兵困於西北不復顧山東加之苛虐相承民不堪命王師若至可不勞而取審如此說則弔伐之兵本不在衆偏師出境百城自下不世之功何患不成萬一未至盡如所聞敵人尚敢旅拒遺民未能自拔則我師雖衆功亦難必而宿師于外守備先虛我猶知出兵山東以牽制川陜彼獨不知警動兩淮荆襄以解山東之急耶為今之計莫若戒敕宣撫司以大兵及舟師固守江淮控制要害為不可動之計俟有餘力方可遴選驍勇有紀律之將使之以竒制勝若徐鄆宋亳等以次撫定之兩淮無致敵之慮然後漸次那大兵前進如此則進有闢國拓土之功退無勞師失備之患實天下至計也蓋山東去敵巢萬里彼雖不能守未害其疆兩淮近在畿甸一城被寇盡地陷沒則朝廷之憂復如去嵗此臣所以夙夜憂懼寢不能瞑而為陛下力陳其愚也且富商巨室未嘗不欲利也然賈于逺者率不肯以多資付之其意以為山行海宿要不可保若傾囊而付之一有所失悔其何及哉此言雖小可以喻大願陛下留神察焉臣比者誤䝉聖慈使攝事樞管攻守大計實任其責伏惟陛下照其愚忠速降處分知烏程縣余端禮上言曰謀敵決勝之道有聲有實敵弱者先聲後實以讋其氣敵彊者先實後聲以俟其機漢武乘胸奴之困親行邊陲威震朔方而漠南無王庭者讋其氣而服之所謂先聲而後實也越謀吳則不然外講盟好內修武備陽行成以種蠡隂結援於齊晉教習之士益精而獻遺之禮益密用能一戰而霸者伺其機而圖之所謂先實而後聲也今日之事異於漢而與越相若願隂設其備而密為之謀觀變察時則機可投矣古之投機者有四有投隙之機有搗虛之機有乘亂之機有承弊之機因其內釁而擊之若胸奴困於三國之攻而宣帝出師此投隙之機也因其外患而伐之若夫差牽於黃池之役而越兵入吳此搗虛之機也敵國不道因其離而舉之若晉之降孫皓此乘亂之機也敵人勢窮躡其後而蹙之若髙祖之追項羽此乘弊之機也機之未至不可以先機之已至不可以後以此備邊安若太山以此應敵動如破竹惟所欲為無不如志知信州王師愈奏曰臣竊謂定天下雖不可憚用兵保天下亦不可輕用兵二者唯審其勢焉可也昔者漢之髙祖光武唐之太宗皆倔起草昧艱難故奮不顧身以爭一旦之命其勢不得不日夜淬礪擊搏進取以定大業天下之人亦厭於亂離不惜肝腦塗地出力以佐上之人蓋覬一旦功業成就息肩乎平治也是以留侯勸髙祖必從思歸之士還定三秦且曰民志已定則難用者此也及事勢已定人民樂生則非有萬全不可輕舉矣昔者宋元嘉自恃富强且曰河南我之故地橫挑强魏當時羣臣雖知其不可不敢言惟沈慶之言之而不見信至王𤣥謨輩皆誕謾欺罔至有聞其言欲封狼居胥之意卒之三大舉皆無成先之以到彥之次之以王𤣥謨三之以蕭思話使二十餘年元嘉富庶之盛淮南赤地千里人無遺育禍有不可勝言者此不可不鑑也夫妄自菲薄引喻失義諸葛亮固深言於蜀橫挑强鄰經營分表蔡謨亦深垂戒於晉二者皆當今所當念也為今日恢復之計不可一息忘恢復之師不可一朝舉臣恐羣臣獻計有誤陛下謂今日可以用兵者故願陛下審處其勢也夫以祖宗二百年經理封疆淪入於異域兩朝北狩不返天下切齒五十年矣有志之士孰不願比死而一洗之然時異事變南北之勢已定民庶之志戀生彼無必取之形我無必勝之勢若釁隙一開兵連禍結力竭于內民不聊生其變故固多端矣昔者寶元慶歷之間當天下全盛之時以中國全力制一元昊小夷西鄙數年不解甲兵威方震而民力已困京東西盜賊紛起幸元昊納欵不暇與之嚴正名分遽屈意從之務以息民救內當時英賢滿朝戰士如林豈不能因時乘利以伸中國威靈誠勢有所不可也今敵情雖輾轉難信然我既與之約誓矣犬豕背棄信義猶有天殃况以中國禮義之所從出豈可自棄信以始禍階縱一舉能遂滅之聖哲猶以為重況以今日兵力未必能制其死命耶若彼自欲送死則我所以待之固有辭矣故臣願陛下審處其勢無輕開兵端則社稷生靈幸甚翰林學士承㫖洪遵論制敵定計劄子曰臣嘗謂自昔大有為之君與其謀臣規摹舉措必有一定之說類非嘗試萬一僥幸為之故其大功之成若合符節無毫釐差者臣敢以一二言之漢高帝之用韓信也其志見於登壇之初至於北舉燕趙東擊齊南絶楚之糧道而西㑹於滎陽無一不如其志者光武之用耿弇也其志見於從幸舂陵之時至於先定漁陽取涿郡收富平東平齊地無一不如其志者高光之能用忠謀而信弇之自信其說蓋如此天下後世徒見其功成志得殊不知其規摹先定非一旦偶然者臣竊謂國家攻守之計宜有定論姑以兩淮言之前此督糗糧運芻秣調器仗汲汲然以恢復為念及得金諜則倉皇奔遁焚室廬驅士女為清野計則是今日之論未一也臣愚欲望聖慈與帷幄大臣深謀逺慮凡所以固圉制敵者先為之備無恃敵之不至恃吾有以待之規摹既定備禦既固緩急之際誠足以致勝矣惟陛下留神天下幸甚司農卿李椿上奏曰臣竊觀易之六十四卦惟既濟一卦六爻皆相應剛柔正而位當可謂至善矣故曰既濟而聖人之戒則曰思患而豫防之蓋居安慮危之意也傳曰重門擊柝以待暴客蓋取諸豫豫者有備無患之謂也臣竊謂兩敵相對强弱大小譬之奕者之有高低焉奕之高者之著則低者應之不足低者之著則高者應之有餘此則勝負之可料也然則低者自知則先數著焉髙者後著則適相當矣若著數多髙者雖髙亦不勝矣又或髙低相若又能先著則取勝必矣奕者見其先著之多自料不能敵則亦不敢下著矣兩敵相對豈不然哉此聖人之戒所以貴乎豫也臣竊聞今春敵中加無禮於使人未知朝廷何以備之伏惟廟謀神算必有所處固不當宣泄于外然則敵試我也彼必有定論在應之如何耳侍御史王十朋上疏曰臣聞宿州之師全軍退守觀時識變深得進退之機然而異議小人與聖意素不合者往往幸災樂禍倡為浮議以動搖大計以離間陛下素所委任之臣使其說果行殆非宗社之福昔唐憲宗伐蔡戰數不利羣臣爭請罷兵錢徽蕭俯之徒言尤確苦㑹高霞寓戰却宰相揣帝厭兵欲赦賊以探上㫖帝曰一勝一負兵家常勢若師常利則古何憚用兵耶今但論帥臣勇怯兵強弱措置如何詎可一敗便沮成計乎於是左右不能容其間斷然用一裴度卒能成平蔡之功臣願陛下以剛大為心毋以小衄自沮察小人之意勿為浮議所搖敦遣中使慰勞將士且令解甲休息養鋭俟時大臣如裴度者益加委任以固其心勿使異議知錢徽蕭俯之徒得以肆其讒間況陛下今日之師為祖宗陵寢而舉為徽宗欽宗復讎而舉為二百年境土而舉與古之帝王好大喜功開邊生事者萬萬不同陛下隱之於心俯仰無怍小人異議亦何足恤哉投機而進知難而退側身修行任賢使能政事益加修軍旅益加治財用益加蓄以待天時人事之至可也顧在陛下斷之如何耳王質上書曰臣觀陛下即位以來初欲繫單于而獻之廟社今乃坐困於二僞帥而不能抗初欲焚庭犂幕復秦漢全盛之幅員今乃併淮南而失之初欲驟奮雄張立乎漢武帝唐太宗之上今乃國勢有南唐之蹙陛下試遷慮回思則平日施設舉措為是為非為當為否至此可見富國有捷法強兵有要術管仲吳起商鞅諸葛亮王猛略得區區之訣皆能以嵗月取效今未暇亟言亦未能遽行直謂虎狼不可守門户宜速驅使去敵帥北摧鄂斡數十萬之衆南却宿州七八萬之師不旬月而獲海泗唐鄧廬夀濠楚數千里之地殆非庸人所度劉寶郭振之流皆非其對陛下勿輕信人言謂無能為臣往還淮南久聞邳州汴京大治舟船知其圖水陸兼進之舉而東阻海北阻泗清口潁河之利不全長淮之勢不通不敢輕出移書三四移文六七使介兩三往來輕削臣禮重失海泗必欲得而後和其意在此朝廷不深探其情便謂誠然倉卒委棄既得之則水利快便自清口而下者入滿浦自潁河而下者入洪澤我無力以捍淮隂蔽山陽退保真揚之間彼舟船得淮河運渠之利騎兵占天長清流之勝吾真揚之師何以能立彼徘徊展轉列保據要而未肯深進者冬深旱久淮水低運河涸舟船不得以迫江面雖得真揚徒睥睨而不能徑渡去巢穴愈逺致糧餽愈艱何益又復遣人議和迢遞往來是特延引日月以待春水生運河深江潮應閘口通則騎兵徑驅蹙真揚之戍舟楫隨進迫真揚之閘與我爭長江之利淮西之敵不能久留淮東之敵負水利之便無糧道之憂可以持久弊我要當亟求驅逐之策完顔亮提百萬之師長江在前舟楫不具故格於采石頓於揚州慮懲前日之失是以有今日之為今朝廷有二幸幸其不入幸其自去且彼據形勢之地有可圖東南之理何憚而不入成師以出一㦸不頓而坐制吾命何虞而自去朝廷若謂其本無用兵之意特欲見脅以成和恐遷延疑誤有如臣之所料今制敵之竒實在荆襄一自唐州搗潁昌以趣汴一自鄧州搗汝州以趣洛往者完顔亮盡萃其徒於瀕江吳拱李道成閔合十萬之師端坐㳂漢曽不能少掣其後而成閔倉皇奔歸赴救徒耗死者大半宿州之長驅德順之深入荆襄空屯數萬之旅飽食竟日終不能出汴洛之舉以分宿州德順之勢故哈希得專志以蹙德順赫舍哩得併力以退宿州今敵專嚮淮南瞰江面以窺國都又虛荆襄之力而弗應方且強驅民丁迫守江岸舉烽於樓設炮於竿築壘而建女墻掘壕而施釣板發坑以陷馬植樁以礙舟其形狀可耻堂堂之國不作丈夫之規而常事小兒之戲使敵見之愈足納侮安能示威蓋哈希將士部曲其巢穴多在河中富森赫舍哩將士部曲其巢穴多在汴宋汴洛一動關河震驚淮南之敵回顧而有後憂其勢必退不退則心遙迹孤擊之可以得志臣不復引兵法陳史傳蓋攻其所必救奪其所必爭此用兵之勝策自完顔亮南侵淮東之師敗於瓜洲淮西之師衄於楊林去嵗又狼狽於宿州惟荆襄之師適當劉蕚之庸屢得敵人之利士氣全軍具備王宣之猛趙撙之審相濟所長皆可以為善將宿州之役荆襄有掎角之令二師鼓舞三軍踴躍既而止之咸相顧失色今敵盛兵以疑荆襄蓋亦慮有腹心之搗勝兵多從僞帥以趣淮南唐鄧陳蔡之敵未必皆精揚聲十餘萬亦未必滿數往懲汝蔡之傷有憚荆襄之意用吾全氣乘彼憚意今吾荆襄之衆不下萬人留三分之一以備諸要其餘徑搗直驅不獨可以退淮南之敵恐因可以成河南之事政使未有大功能掣之使退而後議和則辭令有氣而禮節有筋骨不至於厚幣遣使唾去而弗納陛下有此竒而不發非陛下不知亦非陛下不能臣竊料未有任事之人肯承陛下之意敵事不捷則已有禍蓋自張浚無成廢罷朝廷皆以言兵為亂人撤藩仆關蕩然示之以無有而坦然交之以不疑夫是以至此之憑陵今日刃侵於胸火逼於膚死中求活法當尋出竒之計而況理有必然勢有必中非妄舉輕擲如前日之比陛下若以臣言為然則斷自宸衷勿搖浮議行之何惜掣敵之竒投於無用之地臣非不能緣􅎖巧語鋪張繁文陛下何所用此且心危情迫有所不暇惟陛下憐其忠而赦其簡陋幸甚戶部侍郎王之望上奏曰臣聞人主之論兵與將相不同審虛實量彼已運竒正之略定攻守之計法令修明威信兼舉使士卒用命常畏我而侮敵此將帥之事也察時變之宜講自治之術選授將帥明信賞罰收羣策用善謀而不惑於是非同異之際此宰相之任也人主則不然惟奉承天意而已乾之九五曰聖人先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎此人主之道也春秋書王或曰天王或曰天子必繫王以天者言王者行事必當禀之於天是以傳稱帝堯曰惟天為大惟堯則之詩稱文王曰不識不知順帝之則凡天下之事未有違天而能濟者況於兵邪臯陶曰天討有罪五刑五用哉此之謂也自用兵來或戰或和或攻或守論議多矣亦有以天意為陛下言之者乎國無小大逆天則危兵無強弱順天則捷是故帝王之兵必觀天意湯誓曰夏王有罪天命殛之豫畏上帝不敢不正湯誥曰天道福善禍淫降災于夏肆台小子將天命明威不敢赦武王伐商作泰誓曰商罪貫盈天命誅之豫弗順天厥罪惟鈞又曰天有顯道厥類惟彰今商王受自絶于天爾奉豫一人行天之罰以湯武而攻桀紂決勝何疑而猶必察天天意順矣然後敢舉人知湯武之師為不可敵而不知其所以然者天實與之也天之所與孰能抗之故易曰湯武革命順乎天而應乎人漢髙祖起於匹夫身滅秦項宜其以威武自任然常曰吾以三尺劍取天下豈非天哉其征冒頓上天見異月暈七重髙祖不悟困於平城者七日髙帝知天意之所在終身不議胸奴漢業遂安武帝用王恢之謀伏三十萬衆於馬邑以致單于單于入塞百里幾為漢獲適鴈門尉巡邊卒與敵遇保於亭下單于攻亭得之知漢有謀亟遁而免曰吾之得尉矢也以為天王唐莊宗為晉王時討張文禮于鎮州契丹救之晉敗其師于新晉是嵗沙河冰薄敵皆陷溺天大雨雪人馬多死阿保機指天而言曰天未使我至此乃引而去以此觀之一彼一此或勝或負事之成不成罔有不由於天者周世宗南征北伐威震海內兵不血刃略取三關方乘破竹之勢謂幽燕不日可得人謀善矣而事竟不就太祖御極深逹天意雖悉平諸國而終置北敵於度外非智勇之不足也及太宗因太原之克進討幽薊失利而歸敵始有輕中國心至真宗時遂傾國入寇為澶淵之役是時承平既久武備不修敵勢盛强中外震恐而天發一矢斃其酋帥豈人力也哉臣請以天意論今日之事自靖康以後神州陸沈大駕南巡三十餘年矣誰不欲報父兄之讐復祖宗之土以光堯皇帝之聖武當天下樂推之初徘徊淮泗間不忍南渡者久之馴致維揚之敗於是始幸江表立中興之基曷嘗一日忘中原哉勢未可也敵人挾百勝之强窮其兵力欲包舉南夏而屯聚之衆屢銼於我卒不得已而受盟是非愛我而存全之也亦勢有所不能耳臣竊觀天意南北之形已成矣未易相兼我之不可絶淮而北猶敵之不能越江而南也在東昏時漸有敗盟之端未幾自斃敵帥凶悖決意并吞氣凌風雲衆如山海較其強弱可為寒心然欲取蜀則困於散關欲涉漢則敗於襄陽欲渡江則折於采石釁起蕭墻一夕灰燼敵之南侵其禍如此我師數十萬東西並舉豈不可以制敵守疆圉則粗安圖攻取則必衄川陜之師殱於德順江淮之衆潰於符離我之北伐其禍又如此敵之克我也固無先勝之謀我之破敵也亦非素定之策皆其自敗事出偶然若有鬼神隂制其變此無他殆皇天之意不與其相侵軼也且文臣如張浚一世所宗武臣如吳璘諸將莫及其所謀畫未必皆非卒至於幾成而壞亦可以言天矣天意既爾陛下得不奉承之乎然臣所謂奉承天意者不必曰與敵和也和不和權不在我胡可必乎為今之計不和不戰自守而已移戰攻之力以自守何患不固自守而固然後隨機制變擇利而應之可戰則戰戰無不克可和則和和無不久惡所往而不善豈欲汲汲然求合於敵以偷嵗月之安哉或曰如此則中原何時而復邪臣曰孟子有云成功則天彊為善而已聖人稱祈天永命則天命固有可回之理陛下誠能修德以動天天心悔禍何患恢復之無時苟非其時不可為也唐太宗受禪之初頡利將百萬衆卒至渭上帝以六騎逆折其鋒而與之盟謂蕭瑀曰突厥衆而不整可汗在水西而酋帥皆來謁我我若醉而縛之設伏於前以大軍躡其後取之如反掌耳顧我新即位為國者要在安靜一與敵校殺傷必多彼敗未及亡懼而修德與我為怨其可當邪後聞其盛夏降霜赤氣滿野五日並出三月連明以為天亡之兆遂命李靖等討之捷書踵至帝謂羣臣曰往國家初定太上皇跪而臣之朕常痛心疾首思刷耻於天下今天誘諸將所向輒克朕其遂有成功乎俄而靖俘頡利以獻斥境至於大漠初敵至渭上有可攻之勢帝務安靜縱之使還待其天怒惡稔乃一舉而滅之時貞觀已四年帝即位蓋五稔矣陛下英明睿斷無愧太宗而仁孝恭儉過之實皇天之所眷佑若厲精嘗膽要之以持久之誠貞觀之功不難致也何遲數年而急於進取以失萬全之利哉雖然唐太宗猶未足為陛下道也臣請言舜禹之事有苗弗率舜咨禹徂征禹乃誓師以行而苗民逆命益贊于禹曰惟德動天無逺弗届滿招損謙受益時乃天道帝耕于歷山祗載見瞽瞍夔夔齊栗瞽亦允若至誠感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬而有苗格方苗民之逆命也伯益贊禹不曰濟師不曰講武而逺引天道又稱舜事瞽瞍以至和而感于神明其說頗類迂闊然禹拜昌言而為之振旅舜敷文德而寢其徂征七旬之間有苗自格天道可信其效如此仰惟陛下堯父舜子孝慈交洽光於有虞萬萬日者憤强鄰之肆擾赫然興師則有苗弗率咨禹徂征之意也文武大臣宣其忠力奮兵致討則伯禹誓師之舉也時事不利敵益猖獗則苗民逆命之比當此之時在朝廷之臣若有能如伯益之贊禹者則大臣當法伯禹之義受其昌言陛下當師虞舜之仁修其文德轉禍為福因敗為功將相一心中外輯睦導迎善氣以致至和之感彼區區之敵焉有不格者乎格不格未可知但吾先為不可勝以待敵之可勝則在我者固已有泰山之安矣陛下復何疑乎臣䝉聖知再塵法從親逢不世之主其臯陶益稷之所以事舜者不敢不陳黼座之前惟陛下采其千慮之愚而審處之天下幸甚光宗時周南上論曰臣聞以兵之勝負為國之強弱不知為國者也善為國者不以兵其次因兵之不可用而能見強弱之實自中原失守我以偏方一隅當敵之衆大卒乘不如其多土地不如其廣財力不如其盛六七十年矣中間養兵息民幾三十年未有振起之形而敵亦不能盡得我之虛實往往過計以待我故比者兵出之初敵境亦為之響振及一敗塗地形見勢屈至於誅戮首事頭行萬里遣使行成然則積三十年之休養一出而喪之而遂成今日單弱不振之形非其舉動輕率之故與繼自今以往世有言兵者必唾且罵或遂以為妖誕不祥之人必矣嗟夫已事之失圖是則然矣亦孰知夫一出之不審亦未可以終弱我歟夫使為國者一出而遂至於終為人之下則亦無具甚矣方紹興之末年敵之弱我甚矣及宿師再出而衄我又褫氣於是敵以重兵壓我我不免撤備而就和則弱之勢又甚於前日矣然而卒正尊名卒損嵗幣卒為兄弟之國何耶蓋敵之弱我者特在於兵出無功之一事而吾國之君臣舉措與夫孝宗皇帝之政德如日方升較然而不可欺者敵固不得而揣量其輕重也嘗怪夫宋元帝誤聽人言北伐不勝而遂不可收拾也夫到彥之輕舉妄動之失是固然矣然使元帝因此而究見天下强弱之實則兵之損耗者不過一事而已自江左與元魏對立而為南北其間民生之得所法令之必行其不逮北方逺甚者尚多有之一敗之後徐思南北賦役取於百姓者孰為輕重刑賞之施於臣庶者孰為當否人才之收畜於上者孰為少多教化禮樂之墜失於民俗者孰為失得是則雖碻磝滑臺相繼不保汲汲為之未為無再振之地也奈何以兵藉口一敗不勝則君臣上下氣折消沮甘心為萎弱之國遂無復自强之意而卒至於不可復為也是雖誅戮王𤣥謨到彥之之徒亦何益哉夫遇跌而加畏者慮也因敗而為功者智也古之善為國多在於失策之後今日大勢使徒以已事之失推之於勝負之末則智者亦何以措其巧夫惟因兵之不可用而知強弱之實則始有可得而論者矣蔡戡論和戰奏曰臣聞國之大事和與戰而已好偷者必曰和可安也而不知和不可久恃好進者必曰戰可勝也而不知戰不可輕舉是故人無一定之謀國無至當之策以和則茍安以戰則幸勝二者國之大事而漫浪如此宜其陛下宵衣旰食羣臣朝思夕惟而不置也且以前事言之若和可久安耶既盟之後自宜息兵偃革講信修睦為夷夏無疆之休雖卑辭厚幣有所不惜然而金主之來侵擾淮甸睥睨長江人心憂惶國勢危蹙幸而上天垂祐敵帥授首不然安危之機未可知也若戰可必勝耶王師所指自當長驅中原恢復土宇以舒祖宗在天之憤雖勞師費財在所不顧然而符離之役大臣不審事機諸將多違節度成師以出棄甲而來幸而敵勢自弱凶徒亦潰不然成敗之勢亦未可知也戰也和也率漫浪而為之自非九廟之威靈兩宫之神聖德動天地恩結人心寧有今日乎臣竊為今日之計當以戰為實務以和為權宜和非誠和也必隂為可戰之備戰不徒戰也宜先為必勝之資戰固不可速亦不可緩以中原人心觀之太緩則恐失可乘之機以今日事勢言之欲速則未有必勝之道臣區區管見如此不得不為陛下盡言也臣在輩流中最䝉陛下親擢臣感慨發憤思有以報萬一伏自分閫山南號為重寄然事權則歸宣司兵馬則𨽻諸將雖有二千里方面之責實不得有為於其間臣聽理民事之餘亦不敢仰辜陛下使令之意唯是多捐金帛密詢敵情凡能言敵人之虛實中原之向背與夫曩日出師之得失者莫不委曲誘之使言博采審聽頗得其要臣所謂以中原人心觀之戰不可緩者蓋女真本一小國并有契丹中原之地類多契丹中原之人遺種所存蓋亦無幾後來生於中原者父雖敵種母實華人彼方之情視其母尤親背其父之訓驕縱懦弱習與性成非復昔日女真也女真向者恃强憑凌大國盡滅契丹而籍其地虐其民契丹之人怨之至骨則契丹非我敵矣而況中原赤子苦於苛政上下暌離日懷聖化至云朝廷豈不念我輩國家二百年之民而使久陷敵境至於此極也凡有此中間探往往相與隱蔽通情告之每恨王師之不出雖前此出師失律干紀無所不至亦未嘗怨及朝廷唯俟王師再舉人自為戰誓滅此敵其間通於事變者乃云以多寡論之豈是中原陷敵乃是敵陷中原言之及此人心可知矣若不因中原愛戴之誠乘機制勝萬一草間豪傑崛起恐不復為我臣所謂戰不可緩者此也臣前所謂以今日之事勢言之戰不可速者蓋戰之所恃者將也將之所恃者兵也將之能否三軍之存亡係焉兵之强弱一國之利害係焉故將帥不可不擇而軍士不可不精也今之所謂將者或拔於行伍而驟用或取其家世而因任或以積日纍月次第而遷或以片言一長偶合而得未聞有尺寸之效積素之威可以服人心而叶衆論甚者懵不曉兵機漫不治軍政惟知刻剝軍人聚斂財賄內以供庖𫝊之費外以充苞苴之資凡可以久兵權便私計者無不為也尺籍伍符虗實相半老弱居其一工匠居其一俳優居其一輿𨽻胥史居其一詭名冒籍者無所不有則是朝廷養兵萬人所可用者數千人而止耳至於軍籍刓缺往往掠市人而刺之非其本心唯去是計其間不逞無賴之徒利於所得朝應募而夕逃遁為主將者無以誰何姑任其去來而已治兵如此將何所用之它日豈不誤陛下大事臣所謂戰不可速者此也臣願陛下甘言厚禮外示和親選將厲兵內修武備凡自治之道汲汲而為之唯恐其不速出師之期徐徐而計之不嫌其少緩分遣二三大臣盡護諸將擇久經事任洞達兵機者付之閫外之寄綜核軍實無使老弱無用之人竄名其間將帥既擇軍士既精紀律既明教閲既熟度可用而用之更宜密遣間諜諭中原之民以朝廷未嘗一日忘之之意攜二其心分散其衆使華夏相疑上下相咎許之城邑以堅其志察其好惡以順其心彼勢既暌我衆可用王師一舉固當所向無前譬之破竹之勢數節之後迎刃自解若更如前日輕付之閫外之寄不謀而用之不知事機漫浪之人臣未見其可也兵法曰先為不可勝以待敵之可勝今敵人有可勝之機而我未有必勝之理日月難得機㑹易失惟陛下亟圖之歷代名臣奏議卷二百三十四
