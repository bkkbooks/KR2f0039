body:
  text: 歷代名臣奏議卷六十五明楊士竒等撰治道遼興宗重熙四年詔天下言治道之要天成軍節度使蕭罕嘉努對曰臣伏見比年以來髙麗未賔珠卜猶強戰守之備誠不容已乃者選富民防邉自備糧糗道路修阻動淹嵗月比至屯所費已過半隻牛單轂鮮有還者其無丁之家倍直傭僦人憚其勞半途亡竄故戍卒之食多不能給求假于人則十倍其息至有鬻子割田不能償者或逋役不歸在軍物故則復補以少壯其鴨渌江之東戍役大率如此況渤海女直髙麗合從連衡不時征討富者從軍貧者偵候加之水旱菽粟不登民以日困蓋勢使之然也方今最重之役無過西戍如無西戌雖遇凶年困弊不至於此若能徙西戍稍近則往來不勞民無深患議者謂徙之非便一則損威名二則召侵侮三則棄耕牧之地臣謂不然珠卜諸部自來有之曩時北至臚朐南至邉境人多散居無所統一惟往來抄掠及太祖西征至於流沙珠卜望風悉降西域諸國皆願入貢因遷種落內置三部以益吾國不營城邑不置戍兵珠卜纍世不敢為寇統和問皇太妃出師西域拓土既逺降附亦衆自後一部或叛鄰部討之使同力相制正得馭逺人之道及城哈屯開境數千里西北之民徭役日增生業日殫警急既不能救叛服亦復不恆空有廣地之名而無得地之實若貪土不已漸至虛耗其患有不勝言者況邉情不可深信亦不可頓絶得不為益捨不為損國家大敵惟在南方今雖連和難保他日若南方有變屯戍遼邈卒難赴援我進則敵退我還則敵來不可不慮也方今太平已久正可恩結諸部釋罪而歸地內徙戍兵以增堡障外明約束以正疆界每部各置酋長嵗修職貢叛則討之服則撫之諸部既安必不生釁如是則臣雖不能保其久而無變知其必不深入侵掠也或云棄地則損威殊不知殫費竭財以貪無用之地使彼小部抗衡大國萬一有敗損威豈淺或又云沃壤不可遽棄臣以為土雖沃民不能久居一旦敵來則不免內徙豈可指為吾土而惜之夫帑廪雖隨部而有此特周急部民一偏之惠不能均濟天下如欲均濟天下則當知民困之由而窒隙節盤逰簡驛傳薄賦斂戒奢侈期以數年則困者可蘇貧者可富矣蓋民者國之本兵者國之衛兵不調則曠軍役調之則損國本且諸部皆補役之法昔補役始行居者行者類皆富實故纍世從戍易為更代近嵗邉虞數起民多匱乏既不任役事隨補隨缺茍無上户則中戶當之曠日彌年其窮益甚所以取代為難也非惟補役如此在邊戍兵亦然譬如一抔之土豈能填尋丈之壑欲為長久之便莫若使逺戍疲兵還於故鄉薄其徭役使人人給足則補役之道可以復故也臣又聞自昔有國家者不能無盜比年以來羣黎凋弊利於剽竊良民往往化為凶暴甚者殺人無忌至有亡命山澤基亂首禍所謂民以困窮皆為盜賊者誠如聖慮今欲芟夷本根願陛下輕徭省役使民務農衣食既足安習教化而重犯法則民趨禮義刑罰罕用矣臣聞唐太宗問羣臣治盜之方皆曰嚴刑峻法太宗笑曰寇盜所以滋者由賦斂無度民不聊生今朕內省嗜欲外罷遊幸使海內安靜則寇盜自止由此觀之寇盜多寡皆由衣食豐儉徭役重輕耳今宜徙哈屯城於近地與西南副都部置烏克德里隗烏古等部聲援相接罷黑嶺二軍并開保州皆𨽻東京益東北戍軍及南京總管兵增修壁壘候尉相望繕完樓櫓浚治城隍以為邉防此方今之急務也願陛下裁之道宗咸雍間耶律氏上時政其略曰君以民為體民以君為心人主當任忠賢人臣當去比周則政化平陰陽順欲懷逺則崇恩尚德欲強國則輕徭薄賦四端五典為治教之本六府三事實生民之命淫侈可以為戒勤儉可以為師錯枉則人不敢詐顯忠則人不敢欺勿泥空門崇飾土木勿事邊鄙妄廢金帛滿當思溢安必慮危刑罰當罪則民勸善不寶逺物則賢者至建萬世磐石之業制諸部強橫之心欲率下則先正身欲治逺則始朝廷上稱善金熙宗時翰林待制兼右諫議大夫程宷上奏曰臣聞善醫者不視他人之肥瘠察其脈之病原而已善計天下者不視天下之安危察其紀綱理否而已天下者人也安危者肥瘠也紀綱者脈也脈不病雖瘠不害脈病而肥者危矣是故四肢雖無故不足恃也脈而已矣天下雖無事不足矜也綱紀而已矣尚書省天子喉舌之官綱紀在焉臣願詔尚書省戒勵百官各揚其職以立綱紀如吏部天官以進賢退不肖為任誠使升黜有科任得其人則綱紀理而民受其賜前代興替未始不由此者世宗大定中上命六品以上官十日以次轉對戶部郎中李仲略乃進言曰凡救其末不若正其本所謂本者厚風俗去冗食養財用而已厚風俗在乎立制度禁奢僣去冗食在乎寵力農抑遊惰養財用在乎廣儲蓄時斂散商賈不通難得之貨工匠不作無用之器則下知重本下知重本則末息矣同知西京留守事曹望之上書論便宜事其一論山東河北明安穆琨與百姓雜處民多失業陳蔡汝潁之間土廣人稀宜徙百姓以實其處復數年之賦以安輯之百姓亡命及避役軍中者閲實其人使還本貫或編近縣以為客戶或留為佃戶者亦籍其姓名州縣與明安事干涉者無相黨匿庶幾軍民協和盜賊彌息其二論薦舉之法虛文無實宰相拔擢及其所識不及其所不識內外官所舉亦輒不用或指以為朋黨遂不敢復舉宜令宰執嵗舉三品二人御史大夫以下內外官終秩舉二人自此以下以品殺為差等終秩不舉者遇轉官勒不遷三品者削後任俸三月其舉者已改除吏部以類品第季而上之三品闕則於類第四品中補授四品五品以下視此為差其待以不次者宰執具才行功實以聞舉當否罪當如律廉介之士老於令幕無舉主者七考無贓私罪者準朝官三考勞敘吏部每季圖上外路職官姓名路為一圖大書贓汙者於其名下使知畏慎外任五品以上官改除令代之者具功過以聞年六十以上者終更赴調有司察其視聽精力老疾不堪釐務給以半祿罷遣其三論守邊將帥及沿邊州縣官漁剝軍民擅興力役宜嵗遣監察御史周行察之邊部有訟招討司無得輒遣白身人徴斷宜於省部有出身女真契丹人及縣令丞簿中擇亷能者因其風俗略定科條務為簡易徴斷羊馬入官籍數如邊部遇飢饉即以此賑給之招討及都監視事宜限邉部饋送駝馬招討司女直人戶或擷野菜以濟艱食而軍中舊籍馬死則一村均錢補買往往鬻妻子賣耕牛以備之臣恐數年之後邊防困弊臨時賑濟費財十倍而無益早為之所則財用省而邉備實矣官給軍箭用盡則市以補之皆朽鈍不堪用可每嵗給官箭一分以補其闕邉民闕食給米地逺負重往往就倉賤賣而去可計口支錢則公私兩便陜西正副宜如明安穆琨用土人一員隊將亦宜參用土人久居其任增弓箭田復其賦役以廉吏為提舉舉察總管府以下官農隙校閲以嚴武備則太平之時有經略之制矣章宗明昌初鋭意於治平參知政事徒單鎰上書其略曰臣竊觀唐虞之書其臣之進言於君曰戒哉懋哉曰吁曰都既陳其戒復導其美君之為治也必曰稽於衆舍已從人既能聽之又能行之又從而興起之君臣上下之間相與如此陛下繼興隆之運撫太平之基誠宜稽古崇德留意於此無因物以好惡喜怒無以好惡喜怒輕忽小善不恤人言夫上下之情有通塞天地之運有否泰唐陸贄嘗陳隔塞之九弊上有其六下有其三陛下能慎其六為臣子者敢不慎其三哉上下之情既通則大綱舉而羣目張矣泰和三年太常卿侯摰上章言九事其一曰省部所以總天下之紀綱今隨路宣差便宜從宜往往不遵條格輒劄付六部及三品以下官其於紀綱豈不紊亂宜革其弊其二曰近置四帥府所統兵校不為不衆然而弗克取勝者蓋一處受敵餘徒傍觀未嘗發一卒以為援稍見小却則棄戈遁去此師老將怯故也將將之道惟陛下察之其三曰率兵禦寇督民運糧各有所職本不可以兼行而帥府每令雜進纍遇寇至軍未戰而丁夫已遁行伍錯亂敗之由也夫前陳雖勝而後必更者恐為敵所料耳況不勝哉用兵尚變本無定形今乃因循不改覆轍臣雖素不知兵妄謂率由此失其四曰雄保安肅諸郡據白溝易水西山之固今多闕員又所任者皆柔懦不武宜亟選勇猛才幹者分典之其五曰漳水自衛至海宜沿流設備以固山東使力穡之民安服田畝其六曰近都州縣官吏往往逋逃蓋以往來敵中失身者多兼轉輸頻併民力困弊應給不前復遭責罰秩滿乃與他處一體計資考實負其人乞詔有司優定等級以别異之其七曰兵威不振罪在將帥輕敵妄舉如近日李英為帥臨陳之際酒猶未醒是以取敗臣謂英既無功其濫注官爵並宜削奪其八曰大河之北民失稼穡官無俸給上下不安皆欲逃竄加以潰散軍卒還相剽掠以致平民愈不聊生宜優加矜恤亟招撫之其九曰從來掌兵者多用世襲之官此屬自幼驕惰不任勞苦且心膽懦怯何足倚辦宜選驍勇過人衆所推服者不考其素用之上略施行焉宣宗貞祐二年權監察御史完顔蘇埒上書言事略曰昔東海在位信用讒諂踈斥忠直以致小人日進君子日退紀綱紊亂法度益隳風折城門之關火焚市里之舍蓋上天垂象以警懼之也言者勸其親君子逺小人恐懼修省以答天變東海不從遂至亡滅夫善救亂者必迹其亂之所由生善革弊者必究其弊之所自起誠能大明黜陟以革東海之政則治安之效可指日而待也陛下龍興不思出此輒議南遷詔下之日士民相率上章請留啓行之日風雨不時橋梁數壞人心天意亦可見矣此事既往豈容復追但自今尤宜戒慎覆車之轍不可引轅而復蹈也又曰國家不可一日無兵兵不可一日無食陛下為社稷之計宫中用度皆從貶損而有司復多置軍官不恤妄費甚無謂也或謂軍官之衆所以張大威聲臣竊以為不然不加精選而徒務其多緩急臨敵其可用乎且中都惟其糧乏故使車駕至此稍獲安地遂忘其危而不之備萬一再如前日未知有司復請陛下何之也三年劉炳中進士第即日上書條便宜十事其一曰任諸王以鎮社稷臣觀往嵗王師屢戰屢却率皆自敗承平日久人不知兵將帥非才既無靖難之謀又無效死之節外託持重之名而內為自安之計擇驍果以自隨委疲懦以臨陳陳勢稍動望塵先奔士卒從而大潰朝廷不加詰問輒為益兵是以法度日紊倉庾日虛閭井日凋土地日蹙自大駕南巡逺近相望益無固志吏任河北者以為不幸逡巡退避莫之敢前昔唐天寶之末洛陽潼關相次失守皇輿夜出向非太子回趨靈武率先諸將則西行之士當終老於劒南矣臣願陛下擇諸王之英明者總監天下之兵北駐重鎮移檄逺近戒以軍政則四方聞風者皆將自奮前死不避折衝厭難無大於此夫人情可以氣激不可以力使一卒先登則萬夫齊奮此古人所以先身教而後威令也二曰結人心以固基本天子惠人不在施豫在於除其同患因所利而利之今艱危之後易於為惠因其欲安而慰撫之則忠誠親上之心當益加於前日臣願寬其賦役信其號令凡事不便者一切停罷時遣重臣按行郡縣延見耆老問其疾苦選廉正黜貪殘拯貧窮恤孤獨勞來還定則效忠徇義無有二志矣故曰安民可與行義危民易與為亂惟陛下留神三曰廣收人材以備國用備嵗寒者必求貂狐適長塗者必當騏驥河南陜西車駕臨幸當有以大慰士民之心其有操行為民望者稍擢用之平居可以勵風俗緩急可以備驅䇿昭示新恩易民觀聽隂係天下之心也四曰選守令以安百姓郡守縣令天子所恃以為治百姓所依以為命者也今衆庶已弊官吏庸暗無安利之才貪暴昏亂與姦為市公有斗粟之賦私有萬錢之求逺近囂囂無所控告自今非才器過人政迹卓異者不可使在此職親勳故舊雖望隆資髙不可使為長吏則賢者喜於殊用益盡其能不肖者愧慕而思自勵矣五曰褒忠義以勵臣節忠義之士奮身效命力盡城破而不少屈事定之後有司略不加省棄職者顧以恩貸死事者反不見録天下何所慕憚而不為自安之計邪使為臣者皆知殺身之無益臨難可以茍免甚非國家之利也六曰務農力本以廣蓄積此最強兵富民之要術當今之急務也七曰崇節儉以省財用今海內虛耗田疇荒蕪廢奢從儉以紓生民之急無先於此者八曰去冗食以助軍費兵革之後人物凋喪者十四五郡縣官吏署置如故甚非審權救弊之道九曰修軍政以習守戰自古名將料敵制勝訓練士卒故使赴湯蹈火百戰不殆孔子曰以不教民戰是謂棄之兵法曰器械不利以其卒與敵也卒不服習以其將與敵也將不知兵以其主與敵也主不擇將以其國與敵也可不慎哉十曰修城池以備守禦保障國家惟都城與附近數郡耳北地不守是無河朔矣黃河豈足恃哉書奏宣宗異焉四年陳規上章言陛下以上聖寬仁之姿當天地否極之運廣開言路以求至論雖狂妄失實者亦不坐罪臣忝耳目之官居可言之地茍為緘默何以仰酬洪造謹條陳八事願不以人微而廢之即無可採乞放歸山林以懲尸祿之罪一曰責大臣以身任安危今北兵起自邉陲深入吾境大小之戰無不勝捷以致神都覆沒翠華南狩中原之民肝腦塗地大河以北莽為盜區臣每念及此驚怛不已况宰相大臣皆社稷生靈所繫以安危者豈得不為陛下憂慮哉每朝奏議不過目前數條特以碎末互生異同俱非救時之急者況近詔軍旅之務專委樞府尚書省坐視利害泛然不問以為責不在已其於避嫌周身之計則得矣社稷生靈將何所賴古語云疑則勿任任則勿疑又曰謀之欲衆斷之欲獨陛下既以宰相任之豈可使親其細而不圖其大者乎伏願特出睿斷若軍伍器械常程文牘即聽樞府專行至于戰守大計征討密謀皆須省院同議可否則為大臣者知有所責而天下可為矣二曰任臺諌以廣耳目人主有政事之臣有議論之臣政事之臣者宰相執政和陰陽遂萬物鎮撫四夷親附百姓與天子經綸於廟堂之上者也議論之臣者諌官御史與天子辨曲直正是非者也二者豈可偏廢哉昔唐文皇制中書門下入閣議事皆令諌官隨之有失輒諌國朝雖設諌官徒備員耳每遇奏事皆令回避或兼他職或為省部所差有終任不覿天顔不出一言而去者雖有御史不過責以糾察官吏照刷案牘巡視倉庫而已其事關利害或政令更革則皆以為機密而不聞萬一政事之臣專任胸臆威福自由或掌兵者以私見敗事機陛下安得而知之伏願遴選學術該博通曉世務骨鯁敢言者以為臺諫凡事關利害皆令預議其或不當悉聽論列不許兼職及充省部委差茍畏徇不言則從而黜之三曰崇節儉以答天意昔衛文公乘狄人滅國之餘徙居楚丘才革車三十兩乃躬行儉約冠大帛之冠衣大布之衣季年致騋牝三千遂為富庶漢文帝承秦項戰爭之後四海困窮天子不能具鈞駟乃示以敦朴身衣弋綈足履革舄未幾天下富安四夷咸服國家自兵興以來州縣殘毁存者復為土寇所擾獨河南稍完然大駕所在其費不資舉天下所奉責之一路顧不難哉賴陛下慈仁上天眷佑蝗災之餘而去嵗秋禾今年夏麥稍得支持夫應天者要在以實行儉者天必降福竊見宫中及東宫奉養與平時無異隨朝官吏諸局承應人亦未嘗有所裁省至於貴臣豪族掌兵官莫不以奢侈相尚服食車馬惟事紛華今京師鬻明金衣服及珠玉犀象者日增於舊俱非克己消厄之道願陛下以衛文公漢文帝為法凡所奉之物痛自撙節罷冗員減浮費戒豪侈禁戢明金服飾庶皇天悔禍太平可致四曰選守令以結民心方令舉天下官吏軍兵之費轉輸營造之勞皆仰給河南陕西加之連年蝗旱百姓洊飢行賑濟則倉廪懸乏免征調則用度不足欲其實惠及民惟得賢守令而已當賦役繁殷期會促迫之際若措畫有方則百姓力省而易辦一或乖謬有不勝其害者況縣令之弊無甚於今由軍衛監當進納勞效而得者十居八九其桀黠者乘時貪縱庸懦者權歸猾吏近雖遣官廉察治其姦濫易其疲軟然代者亦非選擇所謂除狼得虎也伏乞明敕尚書省公選廉潔無私才堪牧民者以補州府官仍清縣令之選及責隨朝七品外任六品以上官各保堪任縣令者一員如他日犯贓並從坐其資歷已係正七品及見任縣令者皆聽寄理俟秩滿升遷復令監察以時巡按有不法及不任職者究治之則實惠及民而民心固矣五曰博謀群臣以定大計比者徙河北軍戶百萬餘口于河南雖革去冗濫而所存猶四十二萬有竒嵗支粟三百八十餘萬斛致竭一路終嵗之斂不能贍此不耕不戰之人雖無邉事亦將坐困況兵事方興未見息期耶近欲分布沿河使自種殖然遊惰之人不知耕稼群飲賭博習以成風是徒煩有司徴索課租而已舉數百萬衆坐糜廪給緩之則用闕急之則民疲朝廷惟此一事已不知所處又何以待敵哉是蓋不察於初不計其後致此誤也使初遷時去留從其所願則欲來者是足以自贍之家何假官廪其留者必有避難之所不必強遺當不至今日措畫之難古昔人君將舉大事則謀及乃心謀及卿士庶人卜筮乞自今凡有大事必令省院臺諌及隨朝五品以上官同議為便六曰重官賞以勸有功陛下即位以來屢沛覃恩以均大慶不吝官爵以激人心至有未滿一任而併進十級承應未出職而已帶驃騎榮祿者冗濫之極至於如此復開鬻爵進獻之門然則被堅執鋭效死行陳者何所勸哉官本虛名特出於人主之口而天下之人極意趨慕者以朝廷愛重耳若不計勳勞朝授一官暮升一職人亦將輕之而不慕矣已然之事既不可咎伏願陛下重惜將來無使公器為尋常之具功賞為僥幸所乘又今之散官動至三品有司艱於遷授宜於減罷八資內量增階數易以美名庶幾歷官者不至於太驟而國家恩權不失之太輕矣七曰選將帥以明軍法夫將者國之司命天下所賴以安危者也舉萬衆之命付之一人呼吸之間以決生死其任顧不重歟自北兵入境野戰則全軍俱殁城守則闔郡被屠豈皆士卒單弱守備不嚴哉特以庸將不知用兵之道而已古語云三辰不軌取士為相四夷交侵拔卒為將今之將帥大抵先論出身官品或門閥膏梁之子或親故假托之流平居則意氣自髙遇敵則首尾退縮將帥既自畏怯士卒夫誰肯前又居常裒刻納其饋獻士卒因之以擾良民而莫可制及率之應敵在途則前後亂行頓次則排門擇屋恐逼小民恣其求索以此責其畏法死事豈不難哉况今軍官數多自千戶而上有萬戶有副統有都統有副提控十羊九牧號令不一動相牽制竊聞國初取天下元帥而下惟有萬戶所統軍士不下數萬人專制一路豈在多哉多則難擇少則易精今之軍法每二十五人為一穆昆四穆昆為一千戶穆昆之下有佛寧一人旗鼓司火頭五人其任戰者才十有八人而已又為頭目選其壯健以給使令則是一千戶所統不及百人不足成其隊伍矣古之良將常與士卒同甘苦今軍官既有俸廪又有劵糧一日之給兼數十人之用將帥則豐飽有餘士卒則飢寒不足曷若裁省冗食而加之軍士哉伏乞明勑大臣精選通曉軍政者分詣諸路編列隊伍要必五十人為一穆昆四穆昆為一千戶五千戶為一萬户謂之散將萬人設一都統謂之大將總之帥府數不足者皆併之其副統副提控及無軍虛設都統萬戶者悉罷省仍敕省院大臣及內外五品以上各舉方略優長武勇出衆材堪將帥者一二人不限官品以充萬戶以上都統元帥之職千戶以下選軍中有謀略武藝為衆所服者充申明軍法居常教閲必使將帥明於竒正虛實之數士卒熟于坐作進退之節至於弓矢鎧仗須令自負習於勞苦若有所犯必刑無赦則將帥得人士氣日振可以待敵矣八曰練士卒以振兵威昔周世宗常曰兵貴精而不貴多百農夫不能養一戰士奈何朘民脂膏養此無用之卒茍健懦不分衆何以勸因大搜軍卒遂下淮南取三關兵不血刃選練之力也唐魏徴曰兵在以道御之而已御壯健足以無敵于天下何取細弱以增虛數比者凡戰多敗非由兵少正以其多而不分健懦故為敵所乘懦者先奔健者不能獨戰而遂潰此所以取敗也今莫若選差習兵公正之官將已籍軍人隨其所長而類試之其武藝出衆者别作一軍量增口糧時加訓練視等第而賞之如此則人激厲爭效所長而衰懦者亦有可用之漸矣昔唐文皇出征常分其軍為上中下凡臨敵則觀其強弱使下當其上而上當其中中當其下敵乘下軍不過奔逐數步而上軍中軍已勝其二軍用是常勝蓋古之將帥亦有以懦兵委敵者要在預為分别不使混淆耳興定二年平章事胥鼎以宣宗多親細務非帝王體乃上奏曰天下之大萬幾之衆錢榖之冗非九重所能兼則必付之有司天子操大綱責成功而已況今多故豈可躬親細務哉惟陛下委任大臣坐收成算則恢復之期不逺矣上覽其奏不悅謂宰臣曰朕惟恐有怠而鼎言如此何邪髙琪奏曰聖主以宗廟社稷為心法上天行健之義憂勤庶政夙夜不遑乃太平之階也興定間中都副留守郭文振上疏曰揚子雲有言御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵有天下者審所御而已河朔自用兵之後郡邑蕭然並無官長武夫悍卒因緣而起以為得志僭越名位瓜分角競以相侵攘雖有內除之官亦不得領其職所為不法可勝言哉乞行帥府擅請便宜妄自誇張以尊大其權包藏之心蓋可知也朝廷因而撫之假權傳授至與各路帥府力侔勢均不相統屬陜西行省總為節制相去遼逺道路梗塞卒難聞知故飛揚跋扈無所畏憚鄰道相望莫敢誰何自平陽城破已來河北不置行省朝廷信臣不復往來布揚聲教但令曳刺行報而已所司勞以酒食悅以貨財借其聲譽共欺朝廷姦幸既行遂至驕恣變故之生何所不有此臣所以夙夜痛心而為之憂懼也乞分遣公廉之官遍詣訪察庶知所在利害之實伏見澤潞等處芻糧猶廣人民猶衆地多險阻乞選重臣復置行省皆聽節制上下相維可臂指使之則國勢日重姦惡不萌矣元世祖在潛邸聞李冶賢遣使召之既至問天下當何以治之對曰夫治天下難則難於登天易則易於反掌蓋有法度則治控名責實則治進君子退小人則治如是而治天下豈不易於反掌乎無法度則亂有名無實則亂進小人退君子則亂如是而治天下豈不難於登天乎且為治之道不過立法度正紀綱而已紀綱者上下相維持法度者賞罰示懲勸今則大官小吏下至編氓皆自縱恣以私害公是無法度也有功者未必得賞有罪者未必被罰甚則有功者或反受辱有罪者或反獲寵是無法度也法度廢紀綱壞天下不變亂已為幸矣世祖遣趙璧召姚樞至大喜待以客禮詢及治道乃為書數千言首陳二帝三王之道以治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善逺佞次及救時之弊為條三十曰立省部則庶政出一綱舉紀張令不行於朝而變於夕辟才行舉逸遺慎銓選汰職員則不專世爵而人才出班俸祿則贓穢塞而公道開定法律審刑獄則收生殺之權於朝諸侯不得而專丘山之罪不致茍免毫髮之過免罹極法而寃抑有伸設監司明黜陟則善良姦窳可得而舉刺闕徴斂則部族不橫於誅求簡驛傳則州郡不困於需索修學校崇經術旌節孝以為育人才厚風俗美教化之基使士不偷於文華重農桑寬賦稅省徭役禁遊惰則民力紓不趨於浮偽且免習工技者嵗加富溢勤耕織者日就飢寒肅軍政使田里不知行營之擾攘周匱乏恤鰥寡使顚連無告者有飬布屯田以實邉戍通漕運以廪京都倚債負則賈胡不得以子為母破稱貸之家廣儲畜復常平以待凶荒立平準以權物估卻利便以塞幸塗杜告訐以絶訟原各疏弛張之方其下本末兼該細大不遺世祖竒其才動必召問至元四年樞為中書左丞或言中書政事大壞帝怒大臣罪且不測者樞上言太祖開創跨越前古施治未遑自後數朝官盛刑濫民困財殫陛下天資仁聖自昔在潛聽聖典訪老成日講治道如邢州河南陜西皆不治之甚者為置安撫經略宣撫三使司其法選人以居職頒俸以飬廉去汚濫以清政勸農桑以富民不及三年號稱大治諸路之民望陛下之拯已如赤子之求母先帝陟遐國難並興天開聖人纘承大統即用歷代遺制內立省部外設監司自中統至今五六年間外侮內叛繼繼不絶然能使官離債負民安賦役府庫粗實倉廪粗完鈔法粗行國用粗足官吏遷轉政事更新皆陛下克保祖宗之基信用先王之法所致今創始治道正宜上答天心下結民心睦親族以固本建儲副以重祚定大臣以當國開經筵以格心修邊偹以防虞蓄糧餉以待歉立學校以育才勸農桑以厚生是可以光先烈成帝德遺子孫流逺譽以陛下才略行此有餘邇者伏聞聰聽日煩朝廷政令日改月異如木始栽而復移屋既架而復毁逺近臣民不勝戰懼惟恐大本一廢逺業難成為陛下之後憂國家之重害帝怒為釋元世祖即位首召經略使史天澤問以治國安民之道天澤即具疏以對大略謂朝廷當先立省部以正紀綱設監司以督諸路霈恩澤以安反側退貪殘以任賢能頒俸秩以養廉禁賄賂以防姦庶能上下丕應內外休息帝嘉納之中統元年郝經上立政議曰臣經言前嵗從扞牧圉至于武昌聞先皇帝上仙以為天命厯數在於陛下至治可期於是欲有所言而遽旋斾臣經亦以負薪之憂道路匍匐今年三月始逹順天而陛下應天龍飛詔令使宋倉卒入對陛辭而出和爾濟蘇傳聖旨令條奏當今宜行事理倚馬起草為便宜新政畀仲謙和爾濟蘇等使譯奏所欲言者猶有未盡今既渡淮入宋引領北望顧瞻魏闕每為自誦有君如此可遂無言乎於是作立政議雖尸祝代庖極為僭越有所不計臣聞所貴乎有天下者謂其能作新樹立列為明聖德澤加於人令聞施於後也非謂其志得意滿茍且而已也志得意滿茍且一時與草木並朽而無聞是為身者也於天下何有有志於天下者不貴也為人之所不能為立人之所不能立變人之所不能變卓然與天地並沛然與造化同雷厲風飛日星明而江河流天下莫不貴之而已不以為貴以為已所當為之職分也古之有天下者莫不然後之有天下者亦莫不當然天下一大器也用之久則必弊窳殘缺甚則至於破碎分裂置而不修則委而去之耳生民萬物者器之所中者也器弊而委則其中者亦必壞爛而不收有志於天下者則為之倡率其群而修之琢而俾之完扶持而置之安藻飾而新之滌蕩而潔之使其中者可以食可以藏可以積豐可以饜而飫為器之主而天下王之安富尊榮而享天下彼志得意滿茍且一時者見器之所有而不見器之殘缺染指垂涎放飯流啜始則􅑎然終則哆然既飫而足并其器與其餘舉而棄之不知餒之復至也至於神器乏主中藏盡亡而天下餒者衆於是羣起而爭其餘天下亂矣夫紀綱禮義者天下之元氣也文物典章者天下之命脈也非是則天下之器不能安小廢則小壞大廢則大壞小為之修完則小康大為之修完則太平故有志於天下者必為之修而不棄也以致治自期以天下自任孶孶汲汲持扶安全必至於成功而後已使天下後世稱之曰天下之禍至某君而除天下之亂至某君而治天下之亡者至某君而存天下之未作者至某君而作配天立極繼統作帝熙鴻號於無窮若是則可謂有志於天下矣由漢以來尚志之君六七作於漢則曰髙帝曰文帝曰武帝曰昭帝曰宣帝曰世祖曰明帝曰章帝凡八帝於三國則曰昭烈一帝於晉則曰孝武一帝於元魏則曰孝文一帝於宇文周則曰武帝一帝於唐則曰髙祖曰文皇曰玄宗曰憲宗曰武宗曰宣宗凡六帝於後周則曰世宗一帝於宋則曰太祖曰太宗曰仁宗曰高宗曰孝宗凡五帝於金源則曰世宗曰章宗凡二帝是皆光大炳烺不辱於君人之名有功於天下甚大有德於生民甚厚人之類不至於盡亡天下不至於皆為草木鳥獸天下之人猶知有君臣父子夫婦昆弟人倫不至於大亂綱紀禮義典章文物不至於大壞數君之力也嗚呼上下數千載有志之君僅是數者何茍且一時者多而致治之君鮮也雖然是數君者獨能樹立功成治定揄揚於千載之下豈不為英主也哉其視壞法亂紀斁彛倫毒海內覆宗社碌碌以偷生孑孑以自蔽甘為慵懦者可為憫笑也國家光有天下綿歷四紀恢拓疆宇古莫與京惜乎攻取之計甚切而修完之功弗逮天下之器日益弊而生民日益憊也蓋其幾一失而其弊遂成初下燕雲奄有河朔便當創法立制而不為既并西域滅金源蹂荆襄國勢大張兵力崛阜民物稠夥大有為之時也茍於是時正紀綱立法度改元建號比隆前代使天下一新漢唐之舉也而不為於是法度廢則紀綱亡官制廢則政事亡都邑廢則宫室亡學校廢則人材亡廉耻廢則風俗亡紀律廢則軍政亡守令廢則民政亡財賦廢則國用亡天下之器雖存而其實則無有賴社稷之靈祖宗之福兵鋒所向無不摧破穿徹海嶽之鋭跨􅓸宇宙之氣騰擲天地之力隆隆殷殷天下莫不懾伏當太宗皇帝臨御之時耶律楚材為相定稅賦立造作𣙜宣課分郡縣籍戶口理獄訟别軍民設科舉推恩肆赦方有志於天下而一二不逞之人投隙扺罅相與排擯百計攻訐乘宫闈違豫之際恣為矯誣卒使楚材憤悒以死既而牽連黨與倚疊締構援進宵人畀之以政相與割剝天下而天下被其禍荼毒宛轉十有餘年生民顒顒莫不引領望明君之出先皇帝初踐寶位皆以為致治之主不世出也既而下令鳩括符璽督察郵傳遣使四出究核徭賦以求民瘼汚吏濫官黜責逮遍其願治之心亦切也惜其授任皆前日害民之尤者舊弊未去新弊復生其為煩擾又益劇甚而致治幾又失也今皇帝陛下統承先王聖謨英略恢廓正大有一天下之勢自金源以來綱紀禮義文物典章皆已墜沒其緒餘土苴萬億之能一存若不大為振澡與天下更始以國朝之成法援唐宋之故典參遼金之遺制設官分職立政安民成一王法是亦因仍茍且終於不可為使天下後世以為無志於天下歷代綱紀典制至今而盡前無以貽謀後無以取法壞天地之元氣愚生民之耳目後世之人因以竊笑而非之痛惜而嘆惋也昔元魏始有代地便參用漢法至孝文遷都洛陽一以漢法為政典章文物燦然與前代比隆天下至今稱為賢君王通修元經即與為正統是可以為監也金源氏起東北小夷部曲數百人渡鴨緑取黃龍便建位號一用遼宋制度收二國名士置之近要使藻飾王化號十學士至世宗與宋定盟內外無事天下晏然法制修明風俗完厚真德秀謂金源氏典章法度在元魏右天下亦至今稱為賢君燕都故老語及先皇者必為流涕其德澤在人之深如此是又可以為監也今有漢唐之地而加大有漢唐之民而加多雖不能便如漢唐為元魏金源之治亦可也恭惟皇帝陛下睿稟仁慈天錫智勇喜衣冠崇禮讓愛飬中國有志於為治而為豪傑所歸生民所望久矣但斷然有為存典章立綱紀以安天下之器不為茍且一時之計奮揚乾剛應天革命進退黜陟使各厭伏天下不勞而治也今自踐祚以來下明詔蠲苛煩立新政去舊汙進茂異舉用老成緣飾以文附會漢法斂江上之兵先輸平之使一視以仁兼愛兩國天下顒顒莫不思見德化之盛至治之美也但恐害民餘蘖扳附姦邪更相援引比佽以進若不辨之於早猶夫前日也以有為之姿據有為之位乘有為之勢而不為有為之事與前代英主比隆陛下亦必愧怍而不為書曰罔不在厥初易曰履霜堅冰至詩曰如彼雨雪先集惟霰春秋書元年春王正月皆謹之於初辨之於早也有有為之志而不辨姦邪於早而卻之則鑠剛以柔蔽明以晦終不能以有為蓋彼姦人易合難去誘之以甘言承之以怡色賂之以重寶便辟迎合無所不至不辨之於早而拒之皆墮其計授之以柄而隨之耳昔王安石拜參吕獻可即以十罪章之溫公謂之太早獻可曰去天下之害不可不速異日諸君必受其禍安石得政宋果以亡溫公曰吕獻可之先見范景仁之勇決吾不及也夫月暈而風礎潤而雨理有所必然雖天地亦可先見况於人乎方今之勢在於卓然有為斷之而已去舊汙平治天下舍我其誰若齊能用豫則豈徒齊民安天下之民舉安以齊王猶反手也又謂萬鍾於我何加焉富貴不能淫貧賤不能移威武不能屈乃為大丈夫則亦伊尹之傳也故伊尹而下以天下自任者孟子一人漢室傾頽羣雄競起天下之士莫不徼幸功利反復於智數詐力汲汲以爭天下獨孔明髙卧南陽抱膝長吟視天下不足為躬耕隴畝若將終身焉則亦伊尹耕莘之志也及昭烈三往知其仁誠敬讓可以有為遂起而委質焉則亦伊尹幡然而改也既從昭烈慨然以興復漢室為己任及永安顧命則曰臣竭股肱之力加之以忠貞繼之以死則亦伊尹佐太甲之事也至於內治既修將以外攘以圗報效臨發上疏精忠懇盡藹然三代君臣復見伊訓太甲之書其將兵薄伐出入巖阻一以節制不為浪戰申明賞罰開布公道不規近利恢張逺圖秦漢而下復見王者之師其駐兵五丈原懿終不敢出則已定勝至其臨沒懿按視營壘亦嘆服以為天下竒才則孟子以來以天下自任者又秖一人耳論者乃以為自比管樂管蕭亞匹將略非所長又謂不當復漢不可以詐力雜仁義去中原入巴蜀非其地當如陳平用金間魏君臣或者又以魏為正統而書伐罪之師為入寇嗟乎孔明其可若是班乎乃以是期孔明而又以是立新政創法制辨人材綰結皇綱藻飾王化偃戈卻馬文致太平陛下今日之事也毋以為難而不為毋以為易而不足為投幾挈會比隆前王政在此時毋纍於宵人不惑於羣言兼聽俯納賁若一代號為英主臣之願也臣草茅愚昧既被知遇而又逺離軒陛日以隔越迫於事幾故不辟斧鉞冒觸神威庶姦黨少卻綱紀粗立雖萬死無恨經又奏曰竊聞天所畀與而能奉承是謂應天畀與而弗之應是謂棄天天可棄乎故凡有天下國家者雖一民尺土莫敢忽而不治非惟應天亦所以奉天也國家光有天下五十餘年包括綿長亘數萬里尺箠所及莫不臣服惜乎綱紀未盡立法度未盡舉治道未盡行天之所與者未盡應人之所望者未盡允也比年以來關右河南北之河朔少見治具而河朔之不治者河東河陽為尤甚近嵗河陽三城亦在湔濯分裂頓滯者獨河東而已夫河東表裏山河形勝之區控引夷夏瞰臨中原古稱冀州天府南靣以蒞天下而上黨號稱天下之脊故堯舜禹三聖更帝迭王互為都邑以固鼎命以臨諸侯為至治之極降及叔世五伯迭興晉獨為諸侯盟主百有餘年漢普以來自劉元海而下李唐後唐石普劉漢皆由此以立國金源氏亦以平陽一道甲天下故河東者九州之冠也可使分裂頓滯極于困弊反居九州之下乎竊惟國家封建置度不獨私強本幹與親賢共享示以大公既分本國使諸王世享如殷周諸侯漢地諸道各使侯伯專制本道如唐藩鎮又使諸侯分食漢地諸道侯伯各有所屬則又如漢之郡國焉尊卑相維強弱相制與衆共有進退比次不敢相踰條貫井井如農夫之畔分撥公賦使為私食則亦一代之新制未為失也平陽一道𨽻巴圖大王又兼真定河間道內鼓城等五處以屬籍最尊故分土獨大戶數特多使如諸道祇納十戶四斤絲一戶包銀二兩亦自不困近嵗公賦仍舊而王賦皆使貢金不用録絹雜色是以獨困於諸道河東土産萊多於桑而地宜麻專紡績織布故有大布卷布板布等自衣被外折損價直貿易白銀以供官賦民淳吏質而一道課銀獨高天下造為器皿萬里輸獻則亦不負王府也又必使貢黃金始白銀十折再則十五折復再至二十三十折至白銀二兩得黃金一錢自賣布至於得白銀又至於得黃金則十倍其費空筐篚之紡績盡妻女之叉釧猶未充數搒掠械繫不勝苦楚不敢逃命則已極矣今王府又將一道細分使諸妃王子各征其民一道州郡至分為五七十頭項有得一城或數村者各差官臨督雖又如漢之分王王子諸侯各衣食官吏而不足況自貢金之外又誅求無藝乎於是轉徙逃散帝王之都邑豪傑之淵藪禮樂之風土富豪之人民荒空蕪沒盡為窮山餓水而人自相食始則視諸道為尊乃今困弊之最也國家血戰數十年以有此土何獨加意於陜右河南及河陽置河東而不問坐視其顛連宛轉而不恤獨非國家之赤子乎是天畀此中土之冠而裂去不受也可乎哉願下一明詔約束王府罷其貢金止其細分使如諸道選明幹通直者為之總統㑭持其綱維一其號令輕斂簿賦以飬民力簡靜不繁以安民心省官吏以去冗食清刑罰以布愛利明賞罰以奠黜陟設學校以勵風俗敦節義以立亷恥則分裂者一頓滯者舉九州之冠可正致治之樞可以風四方而動天下克受天之所畀天復萬萬無窮而畀之也經本澤人旅食他方二十餘年不得一拜松楸守先世之弊廬故願治之心比之他人為尤急天庭遼邈漫為瞻臆太行山色黯然凋瘁引領翹首望之而已居位操勢有以仁天下者可無意乎此非布衣所當言故援引杜牧之例名曰罪言干冒鈇鉞謹附使者以聞布衣陵川郝經言歷代名臣奏議卷六十五
