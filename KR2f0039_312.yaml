body:
  text: 厯代名臣奏議卷三百十二明楊士竒等撰灾祥宋理宗淳祐十二年牟子才為兵部侍郎上疏曰臣猥以朴學獲侍經帷講說之餘䝉垂清問咨訪世事勤勤懇懇略無倦容此明主可與忠言之時也兹聞水潦為敗綿十數州奔告于朝日日相繼臣雖至愚極陋其敢隱默不言謹條變異之因上瀆淵𠂻之聽臣聞隂陽之氣流行天地之間舒慘焉而為寒燠明潤焉而為雨暘均則和戾則沴雖云天運有數實與人事相符聖人居泰則裁成輔相以保其和遇災則恐懼修省以求其應用能導迎善氣變災為祥否則隂疑於陽而陽不能勝必激而為災為沴矣按孔子作春秋書大水者八而不明災異之應至班固著漢五行志乃取董仲舒劉向之說推究其事或謂弒父弒君或謂兵連禍結或謂淫泆過度或謂百姓愁怨或謂丹楹刻桷或謂政在大夫雖事以類求微近於鑿然天人之理實相貫通迪逆之機常相影響詎可岐為二致泥其感應哉臣於春秋每獨善宋方宋大水魯使吊焉對曰孤實不敬天降之災又以為君憂拜命之辱且一水之變而鄰國至於遣使相弔其君至於負罪引慝如此臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉可謂善於論興亡明於論感應矣嗚呼宋其罪已而興者歟至於漢唐則有李尋宋務光之流亦能指陳外親大臣後庭近習為水災之應述其警戒深切著明而其君不能因言致省推求象類以隂盛為虞往往禍亂接跡如傳所記者何可勝嘆然則國家興衰不在於災異而在於人君之省不省明矣天人之際可不懼哉恭惟陛下膺圖御厯于今二十有九年仁心之所感格善政之所薰陶自宜天降嘉祥諸福畢至乃六月中浣諸道大水同日並發為變異常得之傳聞見之申奏今日而報嚴衢信山澗發洪溪流暴漲雨八晝夜不止城內外如行江漢矣明日而報台婺處之水發山源出溪谷而濤頭髙數丈矣又明日而報邵武延平之水輸灌建寧而城市莽為巨壑矣大抵冒沒城郭淹浸田苗損壞廬舍摧陷井邑抉蕩隄防漂流儲峙官吏溺者什之一二百姓溺者什之六七軍士溺者什之三四而湖南北之水江東西之水聞之道塗無以異於閩浙一郡之水猶為災異今東南諸郡而水毁過半焉此豈尋常細故可得而玩耶且陛下父母天地而隂陽錯逆矣主山川而摧裂湧決矣君社稷而邑陷城圯矣子萬民而暴災殞溺矣咸謂陛下駭于巨故震愓在懷必有大悔悟大修省以攬塞變異也臣夷考國朝敬天愛民無如仁宗在位四十二年雨災水災間見疊作帝乃詔避殿詔減膳詔改元詔損尊號詔求直言詔寬寃獄詔問疾苦詔發倉廪詔息征徭詔蠲租賦至誠惻怛惕然若傷茍有益於救災皆施行而無吝可謂遇災而懼矣陛下所宜取法也獨奈何其不然耶而臣深憂靜察則駸駸乎且宣和矣宣和之水暴至京城起居郎李綱上書以為變異不虛發必有感召之因災害非易禦必有消去之䇿綱之意蓋謂實德不修實政不講可謂切中當時之病詔乃以水衡失職波流泛濫即非災異綱竟坐狂絀諱人言玩天變甚矣而今日之證候實似之雖水未及都城然去嵗水災疊作意謂陛下必能悔悟以銷變矣而漫不經意今則日甚一日矣去嵗水災尚逺意謂陛下必能警省以弭災矣而恬不見怪今則日近一日矣夫災異之來日甚一日日近一日而猶不能恐懼修省焉則宣和都城之水將必突然陛下之前矣臣非好危言以恐陛下也隂氣勃戾感召有端豈必水哉蓋將有盜賊之憂外患之虞迫逼而不可慮悍而不可支者宣和自元年之既水御筆內批之絡繹猶故也神霄寶録之崇奉自如也花石應奉之科擾無禁也師成童貫之流結怨東南召釁西北不五六載冦入中國以隂召隂理所必至也夫陽明盛則德性用隂濁勝則物欲行故其不能明白洞達以迪其德性之和而惟晦昧黤黯以行其物欲之私者意之所感則為惑昵為䝉蔽為柔邪為暗僻為朋比為憸讒皆隂也氣之所應則為滯淫為扎瘥為襖祲為苦盩為昏墊為沈晦皆隂也豈必水哉宣和惟不去私欲之偏是以激隂濁橫流之害今日又將忽隂沴之戒則必蹈亂亡相尋之轍矣臣不佞敢冒死為陛下條陳之其目有五曰啓私謁而大公至正之理未昭溺近習而清靜純一之德未著崇土木而恭儉簡朴之化未形庇小人而公平廣大之見未顯失人心而仁厚忠恕之澤未洽此五者根原於一心之微而流行於四海之大極而至於隂濁肆行災害間作敗壞國家而已也且宣和之失在於降御筆以專恩威也陛下天資髙明豈不知監然牽聨愛欲紛糾事為往往以獨見之偏撓中書政本之地陛下之意豈不曰恩舊之相迭操政枋而威權幾至於下移今恩舊雖歇而威權不可以不收自是心一起而獨運萬機之政安然行之而無吝矣宗親之除授戚屬之遷擢外親之特命雖邸第祈求恩舊請託有非聖心之得已者而輕重厚薄實出於陛下處分也如廢法何天庭之奏狀臺府之兩造有司之瑣務雖宫媪經營腐夫干預有非聖心之所樂者而曲直是非實出於陛下裁制也如撓政何他如內批之宣諭章疏之節貼臺牒之懲戒是皆亡國之證候而宸翰絡繹詞氣峻嚴軺使往來施行急遽陛下曽不以掣肘外庭為疑是國家機括所在無出於此數事而陛下悉躬親行之臣恐行之不已意輕丞相之譏兼行將相之失復見於今日祗以開私謁之門啓捷出之徑耳此隂濁之政有類於宣和也宣和之失在於溺近習而忘逺慮也陛下至公無私豈不知監然情與愛遷事為私奪往往有蹈其覆轍者矣且宫庭屋漏之間夫孰無謹獨之學竊意陛下所以待宫妾者必有道矣然聲實流聞由中及外天下妄謂陛下微有惑溺雖閲理至深觀變已熟萬無此失而人言如此至謂一令萱死不知幾令萱之復生一飛燕來安保百飛燕之不進道途流傳雖未必實而虧損聖德之大無出於此雖家置一喙不可得而解矣蜵蜎蠖濩之中夫孰無省察檢防之念竊意陛下待閹尹者亦必有道矣然陪侍習熟工於揣摩或亦微有所預往往時以一二事取信於外故趨者瀾倒雖聖性髙明照燭此輩未能盡竊威福之柄然玩而弗慮聲生勢長趨附浸多過咎浸積內則懼陛下之嚴誅益思伺察詆排以撡公議之戈㦸此隂濁之政有類於宣和也宣和之失在於崇土木以備遊幸也陛下性好恭儉豈不知監然居養所移未能無愛往嵗嘗建龍翔矣嘗飾苑囿矣以卑宫之主視之不翅過矣既又以為未足無故創為新寺之役雖云經費取辦御前大抵施為率從科抑規橅浸廣工役繁興斬丘木而先朝后妃將相之墓無所庇藏廣進助而畿輔江浙膏腴之田半歸白奪方且包撤民居疏鑿溪港窮奢極侈無有已時黔黎敢怒而不敢言閭巷敢怨而不敢指貂璫捨此無以擅其利內司捨此無以足其欲遂致轉展工程悠揚嵗月如聞此役未了又將轉而他圖某所之道觀方興某所之祠廟又起廟堂遵奉委曲施行百姓聞之心摧膽折自古人君興土木者自春秋史記歷代以來並皆書為過失以示萬世今災異如此而斧斤之聲不絶於耳此皆小人圗一旦之利而致人主於有過之地此隂濁之政有類於宣和也宣和之失在於用小人以仇公議也陛下能辨忠邪豈不知監而心之所倚乃拳拳於小人之黨庇賄相再用濁亂朝廷凡五六載此宰相之凶也公議方以削美諡為請而陛下念之終不忘老姦蹲踞㧻害忠良凡數四載此臺諫之凶也公議方以鐫責為請而陛下眷之終不忘猥瑣之尹因怙寵以召閙所當却退也今不却退而反升之貪酷之守因貪婪而召變所當竄斥也今不竄斥而反庇之下至一黥胥之賤既麗于刑矣而復脫之縲紲之中一皂𨽻之賤既聲其罪矣而反芘之主萃之地君子不幸而為小人所擊則一斥不反不免有收其田里之譏小人有時而為君子所排則左遮右掩不免有保全愛惜之意遂使隂氣盤結於兩間惡儔蕃殖於散地或處畿輔或逃海濵皇惑人心動搖國是此隂濁之政有類於宣和也宣和之失在於滅天理而失人心也陛下銷患於未形豈不知監而謀慮之微乃不及於深綿眇密之中甚可懼也天下有道公議在朝廷天下無道公議在草茅言之是耶則遷善改過言之非耶則皇自敬德皆所以觸人君進德之機養天下敢言之氣也一或仇視則僇辱隨之去嵗嘗黥士矣而其過在京兆今嵗嘗僇士矣而其責在朝廷上乘快指揮未免有今日陡如此之憂下惡傷其類嘗恐有異時或手滑之慮雖小夫狂生坐愚至此所可惜者朝廷舉動耳遂使京畿視效幾至於與士為敵而其心常求以勝士郡國聞風甚至於與士為仇而其極遂至於殺士吁士何負於國家而意向一偏其祻遂至於如此哉王以小民承天永命是天下之變不在宗族不在諸侯不在奸雄盜賊而惟在於小民之身有以安之則化叛離為欣合無以安之則轉榮懷而為􅑾杌其間不能以寸而害利霄壤甚可畏也國家自寶紹以來內郡之民未有叛心也端平之稅畝淳祐之括田不翅足矣而去嵗經界一事為害尤深祖吕惠卿手實之故智倣李椿年砧基之陋規誅求慘毒租稅重敷妖孽椓民一至此極邉逺未始有離心也清野之轉徙軍需之科敷亦云擾矣而今嵗鈔騎為害尤深空山寨儲蓄之利盡㳂淮摧殘之民渚鴻未定離散可憐林燕無巢歸棲何所嗚呼民何負於國家而釁孽一起其祻遂至於此哉此隂濁之政有類於宣和也夫水隂物也而其所以為災則起於隂濁勝而陽明之理有虧物欲行而德性之和不用宣和之證候則背陽明趨隂暗者也而今日之證候則無異乎宣和宣和之災異則以隂濁感隂沴者也而今日之災異亦無異乎宣和感召之政與宣和相合符隂沴之災視宣和為有過臣願陛下側身修行監宣和之所以失而一以仁宗為法使立政造事之際全德性而得陽明之純虧物欲而無隂沴之勝則天怒可回天災可弭而民命可續矣臣又聞天聖間京城大水宰執方晨朝未入俄有㫖放朝王曽亟附奏曰天變甚異皆臣等燮調無狀豈可退安私室恬然自處亟請入見陳所以備禦之道其後謝絳抗疏亦謂陛下進用丞弼極一時選而政道未茂天時未順豈輔佐不明耶抑委任不篤耶必若使之宜推心責成以極其效謂之不然則更選賢者是災異之來大臣任其咎可也今日暴水為災坊門貽誚大臣固已乏寅亮之德乖調燮之方矣所宜局地上章引咎塞變坦然自恕則亦何詞休沐更私罷朝夙退外示容與無異他時方且唘擬差除相為抆拭上玩至戒以欺聖明此則臣之所未喻也若謂徒崇虛文無益於事則所謂實者竟復如何臣竊以為莫大於協寅恭除壅蔽夫和氣致祥災氣致異而不和之象乃在大臣一堂之內矛盾交馳一念之間水火鬪進乏和𠂻之義無協一之規形諸四方安有肅睦若使好惡得其正用舍得其真不為茍同猶足相濟萬一各持異見各徇私情以喜怒為好惡以愛憎為用舍則必至於政令舛忤而是非亂於上黨與交盛而邪正亂於下豈不糾紛盩戾變怪愈滋哉此則寅恭之義所當協也災異求言具有故實所以下通抑鬱而內警闕遺陛下樂聞忠嘉初無厭憚獨大臣惡人議已畏人多言沮不舉行輿情共鬱大臣平日自許以賢未必多有愆尤廣為奸利何用抑遏以至於斯今召怨干和者非止一端産災胎變者非止一事若非人言則君門九重何由自逹若非導諫則草茅一介誰肯盡言今縱壅遏下情遮蔽耳目竊恐天變不悟人怨不知弗慮弗圖變起不測駭而謀之豈有及哉此則壅蔽之患所當除也使大臣能自省其非深懲二患協寅恭以補燮調之失除壅蔽以消祻變之原而又亟為救菑補敗之圖行之以至誠懇惻之意毋諱護以沮吾君為善之意毋艱難以隔吾民欲達之情務惠及飢纍以召和氣則所謂實者猶庶幾於萬一也臣隱憂熏心冒進狂瞽非敢沽激惟陛下亮其愚忠子才又上火災封事曰臣伏覩近降詔書以鬱攸挻災令中外臣僚並許實封直言闕失毋有所隱者臣日者經席再唘猥以獨班獲升緝熙嘗推明復卦大義仰致聖德修省之助復於貼黃略述火災之由而未備也方將欲有所言而陛下罪已求言之詔已下其忍吐而復茹不告陛下乎臣頃所上水疏有曰九郡之水非逺也若以逺而忽之則所謂逺者將突然陛下之前矣臣非好為危言以恐陛下蓋欲陛下知所警懼化災異而為休祥也然下詔方爾而撥田賜額之事已喧闐於新寺矣遣使方爾而內燕排當之事已迭舉於宫闈矣夫災異如此而陛下忍玩之是樂憂也是恝然於吾民也豈陛下以其逺而不足以動吾心耶夫逺而九郡近而京畿均陛下之民也傷居爾體痛在朕躬均陛下之體也而皆棄置不問天於是始移其所謂水者而震之以火焉移其所自逺者而警之於近焉四明之火方盛大而紹興之火已襲之至日之火方信宿而御街之火又繼之自是而後蓋無夕而不火矣或曰塗撤不先綆缶不具水潦不畜火道不表正徒不儲是以火不可救或又曰宰執尹漕殿步帥之意欲先救龍翔救邸第而後救民居是以火不可救是則然矣是徒知以火政為解而不知所以致此者固有出於火政之外也然則所以致此者何事乎臣前所謂啓私謁溺近習崇土木庇小人失人心者是也使陛下當是時以臣言為然稍知悔悟警懼舉此五者洗而清之豈不能變災為祥易禍為福耶愚臣言之於前陛下玩之於後而近又加甚焉此回祿之災所以迭發於京師衆大之區使陛下目此巨異而痛加修省也愚臣至是安敢緘默取容不為陛下復舉崇觀政宣之證而鋪陳之乎且私謁之唘莫御筆為甚也去李綱去陳瓘斥唐庚斥吕頥浩政宣間之御筆也今繳駁貴近者奪瑣闥之權疏排大姦者奪宰旅之職顧刻御史者奪都曹之階為王留行者奪司諫之任以若所為不政宣乎臣觀私謁之害其初蓋出於手滑手滑不已而近日所為又加於前是玩天災也玩天災者天必怒而降之祻焉此火之所由作也近習之溺惟閹寺為甚王黼童貫隂懷異志搖撼國本梁師成朱勔隂賊於內結怨於外此宣和之近習也今表裏𠂻私造謀詭袐廣開營繕以唘侈心甚至與賊𨽻為窟穴以抗臺諫之衡與富民為道地以為直臣之穽多張羅網如罩飛蟲廣布腹心有同鬼蜮所為若此不宣和乎臣觀近習之害其初不過順適上意而已順適不已而近者所為又過於前是玩天變也玩天變者天必怒而降之禍焉此火之所以作也土木者亂之本也建延福建和陽建寶録建保和此政和三年事也今襲慶之架造未輟而中興觀之工役又新延祥之塗塈未竟而西太乙之工役復起墓木之斫伐可禁也不惟不能禁而主萃者又與已去之姦雄互爭幾失國家之體邸第之包占可禁也不惟不能禁而度地者又預指某户民屋之當撤幾動小民之心所為如此不政和乎臣觀土木之害其初起於祗神示崇祀事而已為之不已而近者所為又過於前是玩天變也玩天變者天必怒而降之祻焉此火之所以作也小人者公議之仇也蔡攸一小人耳信之庇之鄭居中一戚屬耳用之保之大觀二年事也今諫長為君子所仇則委曲保護以全其歸御史與善類為敵則尊奬扶持以張其氣棊枰一動全局危搖誰之過歟劉安世元祐諫官也刻楊畏之反覆至於纍疏今不能亟刻而授人以樽寧不反害孔文仲清江人也刻程頥而旋悔至於歐血今刻其人而襲其位能無泚顙所為若此不大觀乎臣觀小人之害其初不過仇視公議而已仇視不已而近者所仇又過於前是玩天變也玩天變者天必怒而降之禍焉此火之所以作也人心之失禍亂之源也錢寶為輕鈔法日壞花石為擾和買倍增此崇觀間事也今銅鏹之弊在泄漏在鉟銷源日益耗而民悴楮劵之弊在僞造在增印直日益下而民窮水毁之鄉檢放不實中熟之郡和糴已興告訐獻田廣行包占雖深山窮谷亦為之擾望青採斫驅抑搬移嚴霜飛雪曽不之恤所為如此不崇觀乎臣觀人心之失其初不過奪民之利而已奪之不已而近日所為又甚於前是逆天也逆天者天必降之祻焉此火之所以作也夫啓私謁溺近習崇土木庇小人失人心是五者若無與於天災也而一失而為九郡之水再失而為京城之火捷如影響甚可畏也陛下於此時亦知所鑒乎私謁之不禁已激而為水火之災陛下知戒天災則當痛自懲艾曰今而後不復乘快乘怒矣遇有當行則與二三大臣開誠布公審訂熟議然後形之奎畫如此則天知陛下之心必能為陛下弭未來之災矣今火後所行乃大不然內批以今日廷紳氣習澆蕩文辭浮淺為可厭其說是矣締觀聖意大率欲使羣臣緘口縮舌噤無一言而後已以先朝諸老文氣和平㫖趣簡切為可法其說當矣然詳觀聖意不過使羣臣宛轉唯阿不為矯激而後已導諛習諂則其諂熏灼宇宙今又浚開其源使之益諂則其諂兹甚是御筆之私猶前日也以此回天天可回乎是之謂筆眚近習之不防已激而為水火之災陛下知畏天戒則當痛自切責曰今而後不以左右近習為耳目矣遇有役使但令達章奏備掃除以供禁中之役而不任之以事如此則天知陛下之心必能為陛下弭未然之變今火後所為乃大不然漁獵猥瑣之訟則傳宣內㫖以激不平之怒羅絡微細之事則張大聲勢以賈屈抑之怨盤據深久者窟幸門而不止表裏姦蠧者梯媚道以自通鋪張地圗意氣揮霍叱咤相福人誰敢違則近習之恣橫猶前日也以此回天天可回乎是之謂人殃土木之不禁已激而為水火之災陛下遇災而懼則當痛自懲戒曰今而後不復從事於營繕矣遇有補葺關於宗社而不得免者如春秋書城築之類則當斟酌國力相度事宜不得已而後為之役皆書時如此則天知陛下之心必能為陛下弭方來之變今火後所行乃大不然開拓天街疏通火巷意非不美而細民歡言則曰此為龍翔增築設也開浚渠溝儲積塗潦慮非不逺而市井竊議則曰此為邸第隄防計也驪山作徒昭應斤斧駕言暫止其勢方張是土木之害猶前日也以此回天天可回乎是謂木妖小人之庇護已激而為水火之災陛下以天災為可懼則當痛自改悔曰今而後不復庇護小人矣凡有仁賢可信則當垂情任用䔍意搜揚不可混以憸壬如此則天知陛下之心必能為陛下消他日之異今火後所行乃大不然陽遷隂奪以成小人難拔之形倐召旋阻以疑諸賢欲來之志已去之臣留者纍六七疏以全恩禮不知能如范純仁救蘇轍虞允文救陳俊卿之諄䔍乎未去之姦言者連十許章以排姦惡不知能如歐陽修移書責髙若訥縣令陳并上疏言董敦逸郭知章之切至乎好人之所惡惡人之所好是否泰易位邪正倒植則疑君子而庇小人猶前日也以此回天天可回乎是之謂人孽人心之不回已激而為水火之災陛下以天變為可畏則當痛自修省曰今而後不復以小民為草芥矣遇有當恤者惻隱以達其仁哀矜以孚其惠不可蹙奪其生理如此則天知陛下之心必能為陛下除他日之沴矣今火後所行乃大不然㑹價低垂至為民病也今雖有稱提之令而不能寬商稅以召和氣銅鏹日荒至為民害也今雖嚴鉟銷之禁而不能平物價以救目前雖有內帑見緡之賜而散豫多不均何以慰嗸嗸鴻鴈歸棲無所之民雖有諸庫支犒之賞而俵散猶未遍何以慰焦頭爛額併日宣勞之人下至竹章木箇百姓所賴以蔽風雪作生計者也而邸第之豪譁然占奪市井之人不敢爭殘廬破屋百姓所賴以幸朝夕活凍餓者也而指揮之嚴遽欲毁拆無告之民何所訴則人心皇皇猶前日也以此回天天可回乎此之謂政癖夫九郡之水天以是警陛下是陛下修省之一機也陛下玩之不已固已激而為前日之災燔御街之火天復以是警陛下是又陛下修省之機也陛下若又玩之則將激而為其他之變異矣天豈可玩變豈可常哉且臣究觀往牒殆為火德將敗之證臣請痛哭為陛下終言之商丘之地唐自閼伯商伯相土以來實主大辰而祀大火我宋受命興於商丘氣運相因實感炎德太祖建號髙宗中興應天順人皆在於此故火德興王則火潜伏而處晦火德衰敗則火濫炎而並起昔晉士弱謂商人閲其禍敗之釁常始於火然則火之為象其有關於國家運祚之興亡明矣今一見而為辛卯之災再見而為丁酉之災三見而為今日之災況一夕而至於三數見乎楚滅陳之嵗晉史趙曰陳顓帝之族也嵗在賁火是以卒滅今在析木之津猶將復由明年陳災鄭禆竈曰陳水屬也火水妃也以五成嵗五及賁火而後陳卒亡夫陳大皥之墟也火屬也宣和之水與崇寧之火稠見疊作是火王中微既激而為靖康之變今夏之水與今冬之火前後相襲是火德浸衰豈不激將來之變乎此臣所為懼也陛下儻見以宗廟社稷為念大加悔悟毋謂上天為至逺而必求有以感格之毋以五事為無相關而必求有以平和之使崇觀政宣不佳之政消靡無餘而又上念國嗣未立下思姦邪窺覘舉臣前後之疏及諸臣之疏深省亟悟早正皇儲以系天下之心則猶可挽回況資善落成已近龍樓問安之地教諭遴選已得范仲朱震之流舉而施行亦無難事惟望陛下深入睿思亟於明年改元講行此禮使匕鬯主乎宗社羽翼橫於四海問寢問膳藹然有文王世子孝仁禮義之風則天人相與宋室其興又何卒滅乎豈如史趙裨竈之所謂乎臣言至此血淚俱盡惟陛下念之以開我宋寶祐億萬年無疆之休子才又上奏曰臣聞陽失其節則火極隂生陽則火夫大臣燮理隂陽者也固無所辭其責矣然已失之則求所以救之可也昔子産相鄭而火亦曷嘗委之天而不求之人哉今觀春秋傳所紀謂火作子産使循羣屏攝登大徙主拓警司宫府人庫人各警其事司馬司寇列居火道懼而有備君子是以知其政既則除于國北禳于𤣥𡨕回祿祈于四鄘又大為社以振除之災而能戒君子是以知其禮書焚室而寬其征豫之材而又簡兵大搜子太叔之廟將毁焉子産朝過之復使止之憂而不傷君子以是知其仁若是者大臣救災者之所宜法也日者之火揖遜救焚且亦幸而無他變耳脫有駭焉者臣不知其何以處之也其無政甚矣雖從事禜禳僅講虛禮而恤災之事則實未有哀矜惻怛之意也今乃忽出指揮自某所至某所將盡塹之以為河港又自某家至某家將盡墟之以為火巷已燬拆者奪之未燬拆者去之既燬拆而再造者又撤之嗚呼天已災之而人又出此以屬之何其忍也何其重不幸也無告之民怨誹載路廟堂所宜念天變之方新痛人怨之已極力伸懇請緩議施行是雖出於宣諭而未必不可挽回也而乃憚於咈逆噤無一語夫子産書焚室而寬其征未聞毁其室而奪之地也子産於子太叔之廟猶不忍毁之未聞其忍於顛連之赤子而莫之恤也亦安在乎其為仁也哉且百姓之言籍籍皆曰此為龍翔爾為邸苐爾則尤不可以不力爭也茍徒順上意令出惟行使怨叢於君父而祻結於國家不獨愧子産而已也晏子告其君有曰征斂無度宫室日更內寵之妾肆奪于市外寵之臣僭令於鄙民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖善祝豈能勝億兆人之詛嗚呼晏子之愛其君者如此是亦有愧晏子也陛下堯舜主也而二三大臣忍不以子産晏子所以事其君者事陛下乎臣冒愚忠不識避忌寶祐二年子才為起居郎因災異上奏曰臣嘗讀史見前代災異數見所感雖不同而所應亦有異然未有不趨於亡也按漢建寧以後五十有二年日食三十四地震十大水五螟蝗四星孛九大雨雹三大雨水二大疫三地裂青蛇見御坐上大風雨雷電南宫靈臺菑侍中寺雌雞化為雄黑氣墮於溫德殿庭中青蛇見於玉堂殿庭中自六月雨至九月自四月不雨至十月皆一夫春秋二百四十二年古今菑異之頻數未有甚於此時也而究其所以然則皆召於行事之實今五十二年之中所見菑異乃反過之楊賜以為皇天垂譴告之象蔡雍以為諸異皆亡國之怪是豈無所感召而然耶夷考其時有西邸賣官之事有苑囿土木之役有黨人五屬之禁有閹尹專國之謀有黃巾北宫之寇有鮮卑寇邉之擾有奸雄窺鼎之謀此無他其氣皆屬乎隂其類皆纒乎隂屬乎隂則其氣盤結於上下而不可解纒乎隂則其類布滿於上下而不能解故二氣五行之流布日月星辰之運行風雨霜露之凝結雷雹虹電之作止山川草木之變化遇之則為殃為眚為菑為怪為變異為祅祲捷乎如影響之於形聲蓋有不期然而然者臣讀史至此未嘗不扼腕痛恨於東漢之季年也今國家之證候不幸而類此蓋自貴德賤貨之風不見於上而天下率以進奉一說為博富貴利達之具自茅茨土階之儉不著於上而左右率以土木二字為耗財蠧民之藉自顯忠遂良之德不崇於上而諛佞諸臣每以譁競朋比為媒糵忠賢之地罔匪正人之論隱而廢壞紀綱暬御者反以宣諭節貼為尋常茍子不欲之風泯而負乘致寇盜賊者每以貪官汚吏為藉口復境進屯中國所當舉也自此政不修而敵國外患反慿藉此以為蹙國驅民之計任賢使能朝廷所當行也自疑忌相乘而奸雄之徒反竊笑此以為睥睨神器之資此天命所以去而無惠顧我國之心天變所以形而無仁愛吾君之意也故熒惑挻菑方躔斗宿而太白又晝見矣火星逆行方犯權星而日暈又躔壁宿矣榆火更新甫降飛雪而夏霜又隕麥矣日近妖怪時見形象而訛言又狎至矣最是六陽浸大一隂未生反作妖孽雷天之號令也自四月以來天地閉塞未聞震􅊒之聲日君之象也自四月以來常噴雲飛雨未見陽明之象風物假大之時資以為長養也自四月以後風來西北率多肅殺之威寒物歸根之時所資以為芽蘖者也自四月以後隂氣乘陽率多常寒之罰漢末之菑異則疊見五十餘年之中今日之菑異則駢集於三四五月之內豈造物運行常囿於數而為是適然者歟要必有以為之感召也感召者何臣前所陳七事是也請為陛下先言漢之所以失而後言今日之所當監可乎按光和元年初開西邸賣官又按中平二年帝造萬金堂於西園引司農金錢繒帛牣積堂中又令牧守茂才孝廉遷除皆責助軍修宫錢以大漢堂堂之天下所少者非財也乃汲汲焉如窶人聚財之計一時羣工噤無一語惟呂彊上疏極諫以為中尚方領諸郡之寶中府積天下之繒西園引司農之藏調廣民困費多獻少奸吏困其外百姓受其敝而帝不之省於是天下蕩然以財賄為可以致富貴穢德彰聞惡聲流播此非佳證也今日之證不幸而類此蓋自宫掖創進奉之局而排金門入紫闥者類皆浩瀚無涯之財自左右有宣諭之說而䀨省部撓臺府者類皆兩造不平之事嘗退觀陛下近事一二如收換文之御批以懲假托空黥徒之窟穴以洗奸利天下皆知陛下本心非急於財利者然請托之謗猶未洗然者以左右近習朝夕營求不能不為聖德之纍也錢神為妖隂氣為沴變異之召其以是乎按光和三年作罣圭靈昆苑又按五年起四百尺觀又繕修南宫玉堂鑄銅人夫以大漢積貯之厚其力豈不能修一囿然楊賜以為先王造囿芻牧皆來先帝上林奢約得所今廢田園驅居人蓄禽獸殆非保赤子之義而帝不之省於是小人哆然趨之以為無害侈心一萌祻本遂大此非佳證也今日之證不幸而類此蓋自卑宫露臺之儉不傳而修路寢修應門皆極山節藻梲之工飛廉桂宫之羡未消而館太一廣龍翔皆極輪奐翬飛之制然猶曰壯麗以示威重也禊祓以事禬禱也至於靈臺之飾則侈靡以自奉矣妃守之建則溺愛以自損矣嘗退觀陛下之本心如捐水衡之積而不取大農之藏未嘗無意於崇儉也左右之言一入遂至窮奢極欲而不能已也如封前代妃嬪之域申功臣墓木之禁是其本心未嘗忍於斫伐也七萃之言一售遂至斬秃丘隴而不知止也木妖民怪隨寓為沴變異之作其以是乎按建寧二年復治鈎黨殺前司𨽻校尉李膺等百餘人又按五年殺永昌太守曹鸞更考黨人禁錮五屬夫以大漢巍巍之天下而日與志士仁人相讎至禁錮以制其出入殺戮以絶其後裔此非佳證也今日之證雖未至於此然犯顔敢諫之士半在草萊率作興事之夫或居槃澗上方以朋比為用捨以靜激為去取故所捨所去未必皆不肖所用所取未必皆忠賢藉令縶維以永今朝亦不過斯須之貌敬此其所為雖未必至於殺前司𨽻校尉殺永昌太守而要其用心之微往往過於更考黨人而禁錮其屬也忠義齰舌憤氣縈紆變異之作其以是乎按中平元年殺中常侍呂彊侍中向栩郎中張鈞二年封宦者張遜等十二人為列矦三年以宦者趙忠為車騎將軍五年以小黃門蹇碩為上軍校尉袁紹等七校尉皆統於碩夫宫闈腐夫至不足齒間有忠者則殺之與討賊者則爵之以壯健武略稱者則親任之此非佳證也今北司之勢不幸而類此其作威福也則以僮奴之賤而逐天子之臺臣以交結之豐而庇帥臣之童孺其好貨財也則通日進月進之賂而恩寵或致於僥踰操獻田獻錢之訟而正理率至於抑屈中書政本之所由系也宣諭迅速則指揮叱咤雖屈大臣之體而不顧七萃殿司之所得轄也救焚紛拏則瓦石拋擲雖傷主帥之額而不恤淩犯階級莫此為甚使典兵枋又將何如惡毒流布於里閭威勢震懾於中外人皆知北司有可以致富貴之勢而不知人主實操可致之權人皆知北司有可以奪命令之理而不知朝廷實握宰制之枋其口含天憲手握王爵雖十常侍之橫行八校尉之布置曽不是過氣勢翕霍威震恣行災異之作其以是乎按中平元年黃巾賊張角等起先零及涼州羣盜北宫伯玉等反明年寇三輔初平三年黃巾寇兖州夫天下之禍不生於外皆生於內護軍司馬傅燮上疏以為邪正不宜共國亦猶冰炭不可同器宜思四罪之舉速行讒佞之誅則善人思進奸凶自息而帝不之省此非佳證也今日之內患不幸而類此荻浦之寇未息而長興又擾擾矣平江之盜甫平而宜興又道梗不通矣分據要地剽掠平民舟楫為之不通行人為之俘虜人皆曰捕鹽之令嚴而民無所措手足也貪吏之毒流而民或不能心服也政令之不得其平而民或激而為亂也是則然矣而愚臣則以為邪正雜揉是否顛倒奸贓辱臺之臣不戮而尚志之士反見屈於明時驕奢誤國之帥不屈而好修之士反見惡於當世騃孺叨榮於從槖貪帥流毒於名都朝廷行事既無以當其心郡縣長吏又有以激其忿人懷笑侮家蓄憤悶一嘯呼而鋤耰棘矜皆得讎其上一結約而江泖溝港皆得嗾其類釁發蕭墻而禍連四海此傅燮之所以憂隂氣積稔怨氣充盈菑異之來其以是乎按建寧六年鮮卑寇幽并自是寇三邉寇遼西寇酒泉寇幽并入北地無嵗無之蔡雍建議謂邉陲之患手足之疥搔中國之困胸背之瘭疽方今郡縣寇賊尚不能禁況此虜而可伏乎此非佳證也今國家之患不幸而類此山東之兵既窟於舊海而常為一葦趨浙之謀秦鞏之兵復城築於舊利而日有進屯圗蜀之計二兵相望志不在小而漠北之敵又遣和議之使臨我邉疆夫舉大兵以侵伐我之土地而遣使以要我之金帛是其為心蓋以戰為實務而以和為紿計也若姑聽其和以為餌則彼利我鈍未必能出六總管絶漠之師而受黃金鵝之獻也若委順其和以為信則彼詭我正未必不墮平涼劫盟之計而失涇隴邠汧之地也妖氛障日殺氣干霄災異之來其以是乎按初平二年袁紹逐冀州牧韓馥自領州表曹操為東郡太守三年黃巾寇兖州殺刺史劉岱曹操入據之遣使上書自古奸雄窺伺見我國有疵則乘權藉勢託公行私收人心之涣而後遂其所圖此非佳證也今日之勢不幸而類此蓋大奸屈伏海濵日夜幸亂以來逞其操持國枋之心或飛金羽玉以買遊士或託友嗾僕以結士夫人見天下之勢浮遊而未定也遂謂仔肩重任無出此奸故稱功頌德具見於玉堂䇿試之文擬陳十極求達於排雲呌閽之際惟冀君心之易轉豈思國事之可憂奸儔竄伏近畿巧於交結或貽書故吏延譽京師或密嗾舊胥浚明線道人見京兆之任一嵗而數易也遂謂彈壓要權無踰此輩故達官貴要每薦引於黼座之前刑臣腐夫亦稱道於禁廷之密但冀黈聽之潛轉豈知宗社之或危隂類纒綿異氣充塞災異之來其以是乎臣歷觀東漢之末證候如此變異如此使當時將相大臣忠足以結人主之知謀足以制天下之動必能上義下利以懲天邸之失必能清心寡欲以止土木之役必能開誠布公以除鈎黨之禁必能深思逺慮以遏閹尹之勢必能愛護根本以弭黃巾之寇必能厲兵秣馬以息鮮卑之難必能觀時達變以遏奸雄之謀惜乎陳蕃竇武雖能同心戮力以奬王室而不能濟之以謀雖能聘召名賢以參政事而不能待之以定自是厥後劉嚻唐珍張皓等輩嘗執國枋矣然其失在於輸西園之錢忠諫如陽琳切直如楊賜才學如荀爽雖以時望所推躐居顯位然皆不免於祻由是七事之失不能救正菑異之來不能消弭漢業由是而遂衰漢鼎因之而遂失非當時大臣之罪歟今天下不幸而有七事之愆若不大加悔艾痛自繩削則一祖十二宗之託其何以永天命於無疆惟休之地乎故臣願上而九重力行好事勿遂前非下而廟堂力進忠言勿順上㫖監西園之失而貴德尚義以化天下監霛昆之失而崇朴尚儉以先天下監黨禁之失而登崇俊良以福天下中常侍之縱橫可監也不宜復蹈故轍以成虎視之形黃巾之寇鈔可監也不宜復循舊規以稔蕭墻之禍鮮卑之盜邉可監也不宜復示弱形以起幸亂之想如此則陽明用而天理日明隂濁消而人欲日止將見天無變異民無扎瘥三光全而寒暑平矣不然無同心戮力之美而有彌縫宫府之心無聘召名賢之舉而有喜用敏鋭之意無忠諫切直才學之稱而有窽言順適小智自私之失則天心已變而難回天災已銷而復作豈不重東漢末年之憂哉臣區區朴忠睹此巨異輒瀝忠臣之臆一紓魯女之悲積憤所形血淚俱下惟陛下以社稷為念特采擇焉三年子才又論雷雨變異疏曰臣聞一心之中人主對越穹蒼之地也心主乎敬天必祐之心極於肆天必警之感應之機捷如影響之應形聲非天心果有異也敬肆之念一分而災祥之應隨至甚可畏也去載明禋陛下致謹於宫庭之間惟恐少有失墜故行事之夕恭謝之旦霽景舒明祐順洊至天下萬姓咸曰陛下一念謹畏如此故天應於上人悅於下此時此意雖堯舜湯文所為不是過也使陛下緝熙此心常常謹畏無一毫少有間斷則天心眷祐常如饗帝之時矣陛下狃目前之安乃不知自警日引月長而侈心漸生欲念漸起至於今春而侈欲一念如火炎炎有加無已乃者燈夕宫中排當夜以繼日得之傳聞見謂熾盛有獻琉璃亭子者有獻琉璃蒲萄架者有獻琉璃木犀棚者竒形異狀未易具述水陸之珍鮮畢集先時之花果駢臻教坊隊子街市傀儡出入宫門嘈雜喧填至不可算此等所為已難訓後猶曰嬉戲云爾最是號召京師之娼妓羣唱迭和各盡其藝於蟺淵蠖濩之宫此何為者耶雖傳聞之辭間有未實然上自百官族姓下至閭閻小夫竊議聖德不一而足雖欲止之不可也夫娼優下賤天下至穢濁至猥媟之物世以匪人目之謂其非復人道也稍自好者猶不敢近孰謂萬乘之尊宫庭之奧而使此曹冶容盛飾爭為竒技淫巧之事以博一笑耶陛下六宫固不乏人何乃下采至此耶是舉也不特祖宗無此家法雖宣政濁亂之世亦未嘗有此等舉措也此必貂璫等輩愚惑陛下以至于此貂璫小人不識大體何足多責所可惜者陛下三十餘年清靜無欲之主一旦為其所誤遂使平生素履隳壞于此耳陛下貴為人主侈然有輕視天下之心自謂一世莫已若是以無所畏懼縱情極欲而不知上天雖逺未嘗不在陛下左右陟降間也歌席甫散春饗戒嚴欲念未衰敬心安在哉故乘輿已駕天氣尚和逮至中途雨忽隨至事已還內晴色又開一雨一晴變態於俄頃之間天若有意焉此距燈夕才隔宿也逮至二十一日洊雷忽震隱隱有聲越翼日夜漏下二十刻震霆大作終夕軒轟天威所臨􅏮乎可畏此距燈夕才五日也由是觀之一念稍侈而天以雷雨之變應之其不可侈肆如此雖然人主不貴無過而貴改過過者天心所必警改過者天心之所常祐此理昭昭不可誣也繼自今其厲夕惕之心益冰堅之戒申敕左右亟行止絶勿使貂璫無知之言再惑黈聰娼妓穢濁之類復汙宫禁如此則天意必回祐順必致亦祈天永命之一大機也不然天怒未已將降大災以困吾國非止一雷雨之變而已也臣忠愛陛下非敢幸災亦欲陛下稍稍覺悟止絶此念耳歷代名臣奏議卷三百十二
