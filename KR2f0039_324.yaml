body:
  text: 厯代名臣奏議卷三百二十四明楊士竒等撰禦邊宋仁宗時知延州龐籍論范仲淹攻守之䇿上疏曰臣近奉詔詳范仲淹所上攻守之策及范仲淹近遣本州推官張問至具述延慶之間合力出兵之議臣竊謂虜衆之舉齎粮不過十日而利於速戰短於攻城彼攻我城則常多死傷我速與戰則屢成挫衂若諸寨有樓櫓矢石芻粮水泉之具即委之使攻既齎無久粮野無所掠就使十日不退我以重兵乗之觀舋而動誠得全師禦戎之體萬一它路力不能支須至用仲淹之䇿然由徳靖出師路㳂洛河渉春泥濘歩騎難進若久留賊界人心多摇川谷之險皆可以邀擊我軍意外之慮恐不能盡如豫筭或宼深入患大亦不免與仲淹合謀而入擇地而攻也仲淹所陳守用土兵則安東兵則危今土兵之數無多而難於招募東兵亦未可去也且當撫馴訓練興營田減冗費為持乆寛民之計賊来則力禦之有隙則間之以俟其弊且西羌之俗嵗時以耕為事畧與漢同近年屢有㸃集人多失業每入宼邉郡計其掠獲僅足償所費人尚不多若堅壁清野使無所得則勢必益窮心必益怨嵗月之間舋變必生心危勢動然後招納之策始可行焉仰料朝廷固不吝財貨以安方隅但深思極慮事體有大於此者耳康定元年仲淹為陕西都轉運使乞嚴邉城實關内上奏曰臣聞兵家之用在先觀虚實之勢實則避之虚則攻之今縁邉城寨有五七分之備而關中之備無三二分若昊賊知我虚實必先脅邉城不出戰則深入乗關中之虚小城可破大城可圍或東阻潼關隔兩川貢賦㳂邉懦将不能堅守則朝廷不得髙枕矣為今之計莫若且嚴邉城使持久可守實關内使無虚可乗西則邠州鳳翔為環慶儀渭之聲援北則同州河中府扼鄜延之要害東則陕府華州據黄河潼關之險中則永興為都㑹之府各須屯兵三二萬人若宼至使邉城清野不與大戰關中稍實豈敢深入復命五路修攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所售二三年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上策也又聞邉臣多請五路入討臣切計之恐未可以輕舉也太宗朝以宿将精兵北伐西討艱難嵗月終未收復縁大軍之行粮車甲乗動彌百里虜騎輕捷邀擊前後乗風揚沙一日數戰進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也況今承平嵗久中原無宿将精兵一旦興深入之謀保難制之勝臣以謂國之安危未可知也然則唐漢之時能拓疆萬里者盖當時授任與今不同既委之以兵又與之賦稅而不求速効故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不關有司之責觀變乗勝如李牧之守邉可謂善破虜矣惟陛下深計而緩圗之慶厯元年仲淹為陕西安撫副使知延州論夏賊未宜進討疏曰臣聞昨賊界投来山過甞在西界掌兵言其精兵纔及八萬餘皆老弱不任戰闘始賊衆深入盖為官軍以分地自守既不能獨禦賊鋒又不能併力掩殺彼得其便繼為邉患其虜劫生口牛羊亦不曽追奪故安然往来如蹈無人之境今延州東路合隄防之處已令朱吉與東路廵檢駐軍延安寨其西路亦委王信張建侯狄青黄世寧在保安軍每日訓練及令西路廵檢劉政在徳青寨張宗武在政縣宻令分布兵馬候賊奔衝放令入界㑹合掩擊若數路並入且併衆力禦敵或破得一處即便邀擊别路其環慶路已遣通判馬端往報縂管司令一如鄜延路設俻如此則可以乗勝而破賊也今須令正月内起兵則軍馬粮草動踰萬計入山川險阻之地塞外雨雪暴露僵仆使賊乗之所傷必衆況鄜延路已有㑹合次第不患賊先至也賊界春暖則馬瘦人飢其勢則易制及可擾其耕種之務縱出師無大獲亦不至有它虞自劉平陷沒之後修城壘運兵甲積粮草移士馬大為攻守全勝之策非為小利而動如重兵輕舉萬一有失将何繼之則必關朝廷安危之憂非止邉患之謂也茍自今賊至不擊是臣之罪也兵法曰戰道必勝主曰無戰必戰可也戰道不勝主曰必戰不戰可也臣昨於九月末至鄜延路便遣葛懐敏朱觀入界掩襲族帳盖與今来時月不同非前勇而後怯今若承順朝㫖不能持重王師為後大患雖加重責不足以謝天下茍伺春暖舉兵猶未為失策且元昊稔惡以来欲自尊大必被奸人所誤謂國家太平日久不知戰闘之事又謂邉城無備所向必破所以恣桀慢之心侵擾不已今邉鄙漸飭度其已失本望況已下敕招攜族帳首領臣亦遣人探問其情欲通朝廷柔逺之意使其不僭中國之號而修時貢之禮亦可俯從今鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷廣天地包荒之量存此一路今諸将勒兵嚴備賊至則擊但未行討伐容臣示以恩意嵗時之間或可招納如先行攻掠恐未能擒其聚落如白豹之功官軍既退戎類復居狼心重報増其怨毒邉患愈滋無時敢暇若天兵屢動不立大功必為夷狄所輕臣又近召張亢到延州熟議亦稱願與戎人相見於界上臣所以乞存此一路者一則懼春初盛寒士氣愈怯二則恐隔絶情意偃兵未期若施臣之鄙計恐是平定之一端茍嵗月無效遂舉重兵取綏宥二州擇其要害而舉之屯田營田作持久之計如此則横山一帶蕃漢人戸去賊昊相近者漢兵威迫可以招降或即奔竄則是去西賊之一臂拓疆制勝無輕舉之失也仲淹又改知慶州上攻守二策䟽曰臣竊觀西事已来每議攻守未見適中或曰必行進討以期平定臣謂諸路進討則兵分将寡氣不全盛絶漠風沙迷失南北饋運輜重動有抄掠賊之巢穴夐阻河外非竒将不能襲至若宼邉常併兵来擾一路每有朝㫖令入界牽制其如将帥方畧非有素定茫然輕進不知所圗但求虚弱之處以剽竊為功既不能大振兵威又不能少分賊勢此進討牽制之無效也或曰宜用守策来則禦之去則勿逐臣觀今之守邉多非土兵不樂久戍又無營田必煩逺饋久戍則軍情危殆逺饋則民力将竭嵗月綿久恐生他患此守禦之末策也臣荷國重寄曽無寸勞夙夜營營思有所補而才踈迂昧終無發明今採邉人而成末議固不敢謂其可用亦不敢望其必行在朝廷以衆議參之擇其可否如無所取乞賜寢罷今具下項攻守之議依聖㫖指揮交付梁適齎回赴闕議攻臣謂進討未利則又何攻臣切見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延州慶州經過道路使兵勢不安策應迂逺自来雖曽攻取無招降之意据守之謀漢兵纔回邉患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在於此可用歩兵三萬騎兵五千鄜延路歩兵一萬二千騎兵三千涇原路歩兵九千騎兵一千環慶自過馬歩一萬除宮軍外蕃兵更可十八千人軍行入界當先布號令生降者賞殺降者斬得精强者賞害老幼婦人者斬拒者併力以戮之服者厚利以安之逃遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以据其地如舊城以險而増修非守地則别擇要害之處以錢召帶甲之兵熟戸强壮兼其士役昨奉朝㫖令修緣邉城寨臣以兵方穡事将係官閑雜并勸令近上人户以雇夫錢散與助土兵士食錢其帶甲兵士翕然情願諸寨並以畢工俟城寨堅牢當留土兵以守之方諸舊寨必倍其數使范全趙明以安撫之范全令為麒麟副使慶州北都巡檢趙明令為東頭供奉官柔逺寨都廵檢使必嚴其戒曰賊大至則眀斥候召援兵金湯東去徳靖寨四十里西去東谷縣六十里西南柔逺寨八十里白豹西去柔逺寨十里南去慶州一百五十里堅壁清野以困之小至則扼險設伏以待之居常髙估入中及置營田以助之如此則分彼賊勢振此兵威通得延慶兩路軍馬易為應援所用主兵官員使臣勇夫身死者居其前王信狄青劉極范全劉貽孫張建侯可用策應者居其次任守王信逹王遇王文張宗武譚嘉震王守恩使臣中可當一隊者参於前隊張信張忠郭逹張懐忠有心力幹事者營立城寨周美張璨李緯楊鄜劉兼濟張繼勲臣觀後漢段紀明以騎五千歩萬人車三千兩錢五十四億三冬三夏大破諸羌又觀唐馬燧引戰車行則帶甲兵止則為營陣或塞險以遏奔衝臣以此路山坡大車難進當用小車二十兩銀絹錢二十萬以賞有功将吏及歸降蕃部并就糴芻粟亦稍足用其環州之西鎮戎之東復有胡蘆泉一帶蕃部與明珠滅藏相接阻環州鎮戎經過道路明珠滅藏之居北接戎疆多懐觀望又延州南安去故綏州四十里在銀夏川口今延州兵馬東渡黄河北入嵐石却西渡黄河倒来麟府策應盖以故綏州一帶賊界阻斷經過道路已上三處内鄜府一路臣不曽到彼更乞下本處訪問及畫圗即見山川道路次第也如此處下一處城寨平定則更圗一處為據守之策比之朝去暮還此稍為便稳議守臣觀西戎居絶漠之外長河之北倚逺恃險未易可取建官置兵不用祿食每舉衆犯邉一毫之物皆出其下風集雲㪚未甞聚養中國則不可逺戍之兵久而不代負星霜之苦懐鄉國之望又日給廪食月給庫緡春冬之衣鞋饋輸滿道不絶國用民力日以屈乏羣情愁怨須務姑息此中原積兵之憂異於外國也臣謂戎虜縦降塞垣鎮守當務經逺古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中令帶甲之士随宜墾闢故不甚勞大功克舉數年之中所在積粟倉廪皆滿唐置屯田天寶八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其地之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之嘆臣昨在延州見青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邉寨皆可使弓手土兵以守之因置營田據畝定課兵獲羨餘中糶于官人樂其勤公收其利則轉輸之患久可息矣且使其徙家寨下重田利習地勢顧父母妻子而堅其守比之東兵不樂田利不習地勢復無懐戀者功相逺少田處許蕃部進納荒田以遷資酬奨或量給與價直儻朝廷許行此道則委臣與擇官員約古之義酌今之宜行於邉陲庻幾守愈久而備愈充雖敵人時為邉患不能困我中國此臣所以言假土兵弓手之力以置屯田為守制也然臣觀前漢髙帝之盛中有蕭張決勝千里下有百戰之師以四十萬人之衆困于平城乃約匈奴和親至髙后文景代代如之不絶其好而匈奴慮變往往犯塞殺戮吏民不勝其酷至於書問傲慢下視中國而人主以生民之故屈已含容不為之動孝文即位将軍陳武請議征討以益封疆孝文曰兵凶器也雖克所願動必耗病謂百姓逺方何今匈奴内侵軍吏無功邉民父子荷兵日久朕動心痛傷何日忘之未能銷距願且堅兵設候結和通使休寧北陲為功多矣且無議兵故百姓無内外之徭得息肩於田畝天下富實雞鳴犬吠煙火萬里可謂和樂者乎司馬遷以文帝能和樂天下協於大樂故著于律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圗其久而民力不匱然後取文帝和樂之徳無孝武哀痛之悔則天下幸甚二年仲淹再議攻守䟽曰臣切惟國家太平日久而一旦西戎背徳陵犯邉鄙公卿大夫争進計策而未能副陛下憂邉之心且議攻者謂守則示弱議守者謂攻必速禍是二議卒不能合也臣前至延安所謂復諸寨為守禦之備次則幸其休兵輙遣一介示招納之意朝廷以羣言之異未垂采納今臣領慶州日夜思之乃知攻有利害守有安危何則盖攻其逺者則害必至攻其近者則利必随守以土丁則安守以東兵則危臣謂攻逺而害者如諸路深入則将無素謀士無素勇或風沙失道或雨雪彌旬進則困大河絶漠之限退則有乗危扼險之憂臣謂攻近而利者在延安慶陽之間有金湯白豹之阻本皆漢寨陷為賊境隔延慶兵馬之援為蕃漢交易之市姦商往来物貨叢聚此誠要害之地如别路入宼數百里外應接不及則當逺為牽制金湯白豹等寨可乗虚取之因險設陣布車横塹不與馳突擇其要地作為城壘則我無不利之虞至於合水華池鳳州平戎柔逺徳靖六寨兵甲糧斛可就屯泊固非守備之煩也環州定邉寨鎮戎軍乾興寨相望八十餘里二寨之間有胡蘆泉今属賊泉為義渠朝那二郡之交其南有明珠滅藏之族若進兵據胡蘆泉為軍壁北斷賊路則二族自安宜無異志又朝那之西秦亭之東有水洛城亦為之限今策應之兵由儀隴二州十驛始至如進修水洛斷賊入秦亭之路其利甚大非徒通四路之勢因以張三軍之威也臣謂守以土兵則安者以其習山川道路之利懐父母妻子之戀無久戍之苦無數易之弊臣謂守以東兵則危者盖費厚則困于財戍久則聚其怨財困則難用怨聚則難保民力日窮士心日離他變之生出於不測臣所謂攻宜取其近而兵勢不危守宜圗其久而民力不匱招納之策可行於其間今奉詔宜令嚴加捍禦觀舋而動與鄰道協心而共圗之又覩赦文謂彼無驕動則我不侵掠臣恐賊寇一隅逺在數百里外應援不及須為牽制之策以沮賊氣至時諸路重兵豈能安坐如無素定之畫又無行營之備恐當牽制之時茫然無措雖見利而莫敢進觀舋而莫敢動寇勢愈盛邉患愈深叛亡之人日助賊筭不可不大為之謀也願朝廷於守策之外更備攻術彼寇其西我圗其東彼寇其東我圗其西寧有備而不行豈當行而無備也所謂備者必先得宻㫖許抽将帥便宜從事并先降空名宣敕之類恐可行之日奏請不及臣前曽遣人入界通往来之問或更有人至不可不答如朝廷先降宻㫖令往復議論嵗年之間當有成事若謂邉将之耻未雪而不欲俯就臣恐諸路更有不支其耻益大賊或潜結諸蕃并勢合謀則禦之必難且兵馬精勁西戎之所長也金帛豐富中國之所有也禮義不可化干戈不可取則當任其所有勝其所長此霸王之道也臣前知越州每嵗納稅絹十二萬和買絹二十萬一郡之入凡三十萬儻以啖戎是費一郡之入而息天下之弊也時文彦博經畧涇原帝以涇原傷夷欲對徙仲淹遣王懐徳喻之仲淹謝曰涇原地重苐恐臣不足當此路與韓琦同經畧涇原並駐涇州琦兼秦鳳臣兼環慶涇原有警臣與韓琦合秦鳳環慶之兵掎角而進若秦鳳環慶有警亦可率涇原之師為援臣當與琦練兵選将漸復横山以斷賊臂不數年間可期平定矣願詔龐籍兼領環慶以成首尾之勢秦州委文彦博慶州用滕宗諒捴之孫沔亦可辦集渭州一武臣足矣帝采用其言仲淹又論元昊請和不可許者三大可防者三上疏曰臣等久分戎寄未議策勲上玷朝廷俯慙鄙懐心究利害目擊勝負三年于兹備詳本末今元昊遣人赴闕将議納和其来人已稱六宅使伊州刺史觀其命官之意欲與朝廷抗禮臣恐不改僭號意朝廷開許為鼎峙之國又慮尚懐隂謀卑詞厚禮請稱兀卒以緩國家之計臣等敢不為朝廷思經久之策防生靈之患哉臣等謂繼遷當時用計脫身竊弄凶器徳明外示納欵内實養謀至元昊則悖慢侮常大為邉患以累世奸雄之志而屢戰屢勝未有挫屈何故乞和雖朝廷示招納之意契丹邀通好之功以臣等料之實因累年用兵蕃界勞擾交鋒之下傷折亦多所獲器械鞍馬皆歸元昊其下胥怨無所厚獲其横山蕃部㸃集最苦但漢兵未勝戎人重土不敢背賊勉為驅馳爾今元昊知衆之疲聞下之怨乃求息肩養銳以逞兇志非心服中國而来也臣等謂元昊如大言過望為不改僭號之請則有不可許者三如卑辭厚禮從兀卒之稱亦有大可防者三何謂不可許者三自古四逺在荒服之外聖帝明王恤其邉患柔而格之不吝賜與未有假天王之號者也何則與之金帛可節儉而補也鴻名大號天下之神器豈私假於人哉唯石晉藉契丹援立之功又中國逼小纔數十州偷生一時無卜世卜年之意故薦號於彼壊中國大法而終不能厭其心遂為吞噬遽成亡國一代君臣為千古之罪人自契丹稱帝滅晉之後參用漢之禮樂故事勢強盛常有輕中國之心我國家富有四海非石晉逼小偷生之時元昊世受朝廷爵命非有契丹開晉之功此不可許者一也又諸處公家文字并軍民語言皆呼昊賊人知逆順去就之分尚或逋亡末由禁止今元昊於天都山營造所居已逼漢界如更許以大號此後公家文字并軍民語言當有西帝西朝之稱天都山必有建都郊祀之僭其陜西戎兵邊人負過必逃其地盖有歸矣至於四方豪士稍不得志則攘臂而去無有逆順去就之分彼多得漢人則禮樂事勢與契丹並立夾困中國豈復有太平之望邪此不可許者二也又議者皆謂元昊戎人也無居中國之心欲自尊於諸蕃尔臣等謂拓拔珪石勒劉聦苻堅赫連勃勃之徒皆戎人也並居中原近則李克用父子沙陁人也進據太原後都西洛皆漢人進謀誘而致之昨定川事後元昊有偽詔諭鎮戍兵民有定關輔之言此其驗盖漢家之叛人不樂處異域中心謀侵據漢地所得城壘必使漢人守之如契丹得山後諸州皆令漢人為之官守或朝廷假元昊僭號是将啟之斯為叛人之助甚矣此不可許者三也何謂大可防者三元昊以累世姦雄之資一旦僭逆初遣人至猶稱臣奉表及劉平之陷賊氣乃驕再遣賀九言至上書朝廷便不稱臣其辭頓慢而後屢勝當有大言過望乃人情之常也若卑辭厚禮便肯從兀卒之稱皆隂謀也是果以山界之困暫求息肩使中國解兵三四年間将帥懈慢士伍驕堕邉備不嚴戎政漸弛却如前暴發則中國不能支梧此大可防者一也又從徳明納欵之後經謀不息西擊吐蕃回鶻拓疆數千里至元昊事勢稍盛乃稱尊悖禮背負朝廷結連北部情跡盡見大為邉患偶未深入今復起詐端以欵我兵而休息其衆又欲併力專志併吞唃廝囉等諸蕃去秦州一帶籬落為将来再舉之利縁元昊初叛之時親攻延州是本有侵陷郡國之志今復彊盛豈便息心且朝廷四十年恩信所被一朝反側豈有發既叛之謀蓄未挫之銳而能久守盟信者乎此大可防者二也又從徳明納欵後来使蕃漢之人入京師賈販憧憧道路百貨所歸獲中國之利充于窟穴賊因其事力乃興兵為亂今兹五年用度必困乃卑辭厚禮迎合我意欲復圗中國之利待其給用既畢却求舋興兵以快本意狼子野心固難馴伏今若通和或再許靈夏蕃漢之人依前出入京師深為不便縁自前往来叛状未彰情無蠧害今既為強敵之虜稔禍未已必窺伺國家及夾帶亡命入蕃或與姦人别有結連或使刺客竊發驚擾朝廷又此類必所在恣縱甚於昔時有事何以處置此大可防者三也臣等乞朝廷俟元昊所遣人至觀其所請彼如大言過望堅求僭稱則乞朝廷答云上畏天地宗廟不可私許大號壊中國之法彼卑辭厚禮止是求兀卒之稱則按唐單于可汗故事有許之之理亦預防其隂謀嚴飭邉臣修葺城寨訓練軍馬儲蓄粮草以俻虚詐俟一二年間見其表裏及邉備牢固方可那減戍兵於近裏屯泊縁西戎自古翻覆朝廷不可休兵以啟不虞之變如求割熟戸則乞答云靈夏甚有漢戸能割歸朝廷否況横山蕃部安於内附一旦驅之則驚擾生事必不為西界之用彼如求至京師依前来出入賈販則乞答云昨来戰闘之後甚有軍民沒陣其子孫骨肉銜怨至深必恐道塗之中多有讎殺致西界相疑更却生事只於邉上建置㩁場交易有無各得其所彼如邀我自今而後罷修城寨則乞答云邉界熟戸生有讎怨常相侵害須藉城寨駐兵方能鎮静使各安居尔若自餘更有非禮之求朝廷或難應副即且拒之不必從也但厚遣来人善詞回答使遷延往来即逾四月賊不能舉矣至秋則無足畏也何以言之臣等觀朝廷信賞必罰今已明白帥臣奉詔得以便宜又舊将漸升前弊稍除将責實効約束将佐不令輕出訓練軍馬率多變法但今極邉城寨或未堅全新集之兵未可大戰若賊今春便来以臣等計之尚可憂慮然大軍持重竒兵襲擊宜無定川之負也如候秋而来則城寨多固軍馬已練或堅壁而守或據險而戰無足畏矣臣等已議一二年間訓兵三四萬使號令齊一陣伍精熟又能使熟戸蕃兵與正軍参用則横山一帶族帳可以圗之降我者使之納質厚其官賞各令安居籍為熟戸拒我者以精兵加之不從則戮我軍鼓行山界不為朝去暮還之計元昊聞之若舉國而来我則退守邉寨足以困彼之衆若遣偏師而来我則據險以待之蕃兵無粮不能久聚退散之後我兵復進使彼復集每嵗三五出元昊諸廂之兵多在河外頻来應敵疲於奔命則山界蕃部勢窮援弱且近於我自求内附内選酋豪以鎮之足以斷元昊之手足矣然乞朝廷以平定大計為意當軍行之時不以小勝小衂黜陟将帥則三五年間可集大功仍詔中國臣寮不得諱言邉事以沮永圗我太祖太宗統闢四海創萬世之基業今以三五年之勞再定西陲豈為晚邪契丹聞國家深長之謀必懼而保盟不復輕動然後中國有太平之期矣臣等所以言彼賊非禮之求不必從者盖有此議也或曰今王師不利者數四而未思戢兵何也臣等謂不然國家太平日久将不知兵兵不習戰以致不利非中國事力不敵四逺非今之軍士不逮古昔盖太平忘戰之弊尔今邉臣中有心力之人鑒其覆轍各思更張将有勝賊之計昔漢楚之戰不以多負罷兵而終有天下安祿山之亂所向無前郭子儀日夜謀慮王師復振而終滅大盜今國家以天下全盛之勢豈有偶勝偶負而自謂中國不可振而邊陲不可禦邪斯惑之甚矣或曰兵不可久久則民困而財匱臣等謂不然争勝逐利之師則有巧遲拙速之異如其外禦四逺則自古未甞廢兵是以山海之利皆歸邉用抑為此也況即目邉上城壘經今春修葺漸以險固兵民力役自當減罷又每嵗春夏之交軍馬甚可抽退於數百里間就食芻粮亦足省入中之費減饋運之勞庶乎民不困而財不匱非如西事之初人人畏懼未測虜情所屯軍馬不敢少退臣等更思興利減費之筭以為之助臣等早䝉聖奨擢貳清班西事以来供國麄使三年塞下日勞月憂豈不願聞納和少圗休息非樂職矢石之間盖見西賊強梗未衰挾以變詐若朝廷處置失宜他時悖亂為中原大禍豈止今日邉患哉臣等是以不敢念身世之安忘國家之憂須罄芻蕘少期補助其元昊来人到闕伏望聖慈於納和禦侮之間審其處置為聖朝長久之慮天下幸甚仲淹又奏乞揀選往邉上屯駐兵士疏曰臣竊見去年以来自京差撥禁軍往陜西邉上屯戍内有諸處鄉軍雇到經販之人并向南諸處廂軍揀上添填逐指揮内有小弱怯懦之人道路指笑及到邉上不堪披帶教閲虚破禁軍諸般請受支賜今来又差發兵士五千人往秦州添屯并續有諸軍發往邉上替換欲乞指揮下殿前馬歩軍司應在京及畿内諸軍今来并向去合起發往邉上兵士並須逐指揮依次勾来本司子細揀選下小弱不堪披帶之人更不令發往邉上其揀下小弱人數内元係在京諸司庫務并外路廂軍如却願歸本處舊指揮者並令送還内有身材比舊等様小三兩指却少壮得力者即不得揀下所有年老病患之人即等第與剰貟安排其逐指揮人貟年老疾患不得力者亦便揀選别與安排却於本指揮向下人貟十将内揀選得功并武藝髙強人升一兩資權管勾當候轉貟日依本資施行如本指揮人貟十将内無可選揀即於以次指揮内選揀令權管補填勾當所貴在路便有幹了軍貟部轄各得齊整不至依前作過其所差兵士本營在外州軍府者即委逐處長吏都監監押依此揀選起發仍乞指揮諸路部署司将去年秋後差到屯駐駐泊并今後差到兵士並依此揀選施行訖逐旋開坐聞奏仲淹又乞散直等處揀有武勇心力人䟽曰臣竊知散直并下班殿侍内甚有經厯喫得辛苦之人可以邉上使喚乞特降指揮下殿前司於散直下班殿侍内揀選或有心力並具姓名聞奏當議再行揀選内曽有過犯人如武勇出倫亦别具姓名聞奏本班人貟不得抑遏漏落當行勘斷其揀到人數别分等第内上等人及識文字者差在闕人員處權管勾當三周年無過犯得力者令逐處保明奏取㫖使與轉三班差遣權管與依轉員例遞遷安排有功勞者特行升擢大叚勝於年老轉員之人有誤戰敵縁西北事大常須先選人在軍中使喚以備邉事五年仲淹為參知政事奏陜西河北攻守䟽曰臣䝉聖恩非次奨擢待罪兩府日夜憂迫恐負陛下委用之意臣等誠無所長但塞下初還粗知邉事不敢有隐臣等聞三代以還皆有邊陲之患以至侵淩中國被于渭洛齊晉逐之於前秦漢驅之於後中原始清人倫乃叙逮於西晉之弱各部紛爭天寶之末石晉之際中國不幸皆罹其害自周世宗北征之後雖疆土未復夷夏稍分我祖宗奕世修俻大庇生民今西北二方復相交搆夾困中國元昊率先叛命兵犯延安次犯鎮戎煞傷軍民曽無虚嵗中國之兵討伐未利而北敵舉十萬衆謂元昊是舅甥之邦責中國不當稱兵此交搆之跡更何疑哉國家以生民之故增物帛以續盟好彼既獲利方肻旋師今乗西夏通順之議又欲主盟邀功自尊大元昊屢戰勝且倚北部事勢雖求通順實欲息肩亦如北部大獲厚利候其物力稍豐可以舉衆則必長驅深入有吞并關輔之志何以知之昨定川之戰我師不利彼作偽詔誘脅邉人欲定關中其謀不細盖漢多叛人陷於窮漠衣食嗜好皆不如意必以苻堅劉元海元魏故事日夜游説元昊是知非獨元昊意在侵漢實漢之叛人日夜為賊之謀也朝廷若從其通順則北敵邀功自為主盟下視中國邀求無厭多方困我而終於用兵矣若拒絶其意則元昊今秋必復大舉北敵亦必遣使問我拒絶元昊之故或便稱兵塞外張勢脅我國家至時寧不疑懼必於陜西選将抽兵移于河北未戰而西陲已虚元昊乗虚而来必得志於關輔此二敵交搆之勢何以禦之臣等思度是和與不和俱為大患然則為今之謀者莫若擇帥練兵處置邉事日夜計畧為用武之策以和好為權宜以戰守為實事彼知我有謀有備不敢輕舉則盟約可久矣如不我知輕負盟約我則乗彼之驕可困可擊未必能為中國之患也臣等請畫一言之一和䇿臣觀西戎蓄禍積有嵗年徳明在時已聞僭擬元昊方壮遂肆兇驕外倚北戎内淩中國屢戰屢勝未甞挫衂而乃輙求通順實圗休息所獲者大利所屈者虚稱然猶干請多端姦謀未測國家以生靈為念不可不納如唐髙祖太宗應天順人百戰百勝猶屈於突厥當戎王始亡為之舉哀廢朝三日遣百寮詣舘吊其来使其屈禮之甚也又太宗騎六騎於渭上見頡利與語復親與之盟頡利既退左右勸擊之太宗謂我擊彼敗懼而修徳後患必深乃周旋俯就使之驕怠一旦遣李靖擒之威震四極此盛王之謀也陛下如唐髙祖太宗隆禮敦信以盟好為權宜選将練兵以攻守為實事彼不背盟我則撫納無倦彼将負徳我則攻守皆宜如此則結好之策未有失也二陜西守策元昊自来通順之時嵗受恩賜朝廷撫納甚厚未甞有失尚猶時擾邉境殺戮将吏暨叛命以来累次大舉曽無沮敗乃求通順實蓄隂謀非屈伏之志也朝廷若以權宜許之更當嚴作守備然陜西久屯大兵供費殫竭減兵則守俻不足不減則物力已困臣等請縁邉城寨愈加繕完使戎虜之心無所窺伺又久守之計須用土兵各諳山川多習戰闘比之東兵戰守功倍然縁邉次邉土兵數少分守不足更當於要便城寨招置土兵若近裏土兵願改𨽻邉寨者即遷其家而團集之況昨来慶州創起大順城欲置振武保㨗兵兩指揮仍於永興華耀土兵中召其願守塞者而應募甚衆何則關内諸州土兵多在邉上或得代歸營而數月之間復出逺戍豈徒星霜之苦極傷骨肉之恩征夫不保其家離婦頗多犯法人情不免久則怨起如得并遷其家於縁邉住營更免出軍父母妻子樂於完聚戰則相救守則相安或謂若土兵攜家居于塞下則全分請給其費尤多不然土兵月給差少人素號精強使之戍邉於東兵數復可自今於逐路漸為増益二年已来方能整齊有非一朝可驟改也又陜西新刺保捷土兵其中尫弱不堪戰陣者宜沙汰之使歸于田畝既省軍費復増農力然後東兵三分中一分屯邉以助土兵之勢一分移入次邉或屯關輔以息饋餉之困一分歸京師以嚴禁衛之防彼如納欵未變則東兵三分中可更減退又縁邉無稅之地所招弓箭手必使聚居險要每一兩指揮共修一堡以完其家與城寨相應彼戎小至則使属戸蕃兵暨弓箭手與諸寨土兵共力禦捍彼戎大舉則二旬之前必聞舉集我之沿邉軍馬盡可勾呼駐於堅城以待敵之進退縁邉山岅重複彼之重兵必循大川而行先求疾速俟其得勝使我師沮而不出方敢散兵虜掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中糧草無所給牛羊無所獲不數日人馬困弊彼之重兵更不敢越險又未能決勝必不得已而散兵虜掠我於山谷村落中伏精銳以待之彼散掠之兵輕而寡弱可擊可逐使散無所掠聚不得戰欲長驅深入我則使諸将出竒以躡其後欲全師以歸我則使諸城出兵以乗其弊彼将進退有禍不三兩舉勢必敗亡此守䇿之要也三陜西攻䇿元昊巣穴實在河外河外之兵懦而罕戰惟横山一帶蕃部東至麟府西至原渭二千餘里人馬精勁慣習戰闘與漢界相附每大舉入宼必為前鋒故西戎以山界蕃部為強兵漢家以山界属戸及弓箭為善戰以此觀之各以邉人為強理固明矣所以秦漢驅逐西戎必先得山界彼則逺遁然後以河為限宼不深入儻元昊歸欵則請假和䇿以待之如未通順或順而翻覆則有可攻之䇿非窮兵黷武角勝於絶漠之外也臣等甞計陜西四路之兵緫數㡬三十萬非不多也然各分守城寨故每嵗戰兵大率不過二萬餘人坐食芻糧不敢舉動嵗嵗設俻常如宼至不知賊人之謀果犯何路賊界則不然種落散居衣食自給忽尔㸃集併攻一路故貔貅之衆動號十餘萬人以我分散之兵拒彼專一之勢衆寡不敵遂及散敗且彼為客當勞而反逸我為主當逸而反勞我若復用此計彼勞我逸則取勝必矣臣等請於鄜延環慶涇原路各選将佐三五人使臣一二十人歩兵二萬騎兵三千以為三軍以新定陣法訓練嵗餘候其精勇然後觀賊之隙使三軍掠于横山更進兵降者納質厚賞各令安土拒者併兵急擊必破其族假若鄜延一軍先出賊必大舉来應我則退守邉寨或據險要不與大戰不越旬日彼自困彼勢将潰歸則我環慶之軍復出焉彼若再圗㸃集来拒王師則又有涇原之師乗間而入使賊奔命不暇部落攜怨則我兵勢自振如宥州綏州金湯白豹折薑等寨皆可就而城之其山界蕃部去元昊且逺求援不及又我以堅城據之以精兵臨之彼既樂其土復逼以威必須歸附以圗安全三五年間山界可以盡取此春秋時吳用三師破楚之䇿也元昊若失横山之勢可謂斷其右臂矣矧漢唐之舊疆豈今日之生事也四河北備䇿臣等於陜西縁邉頗究利害所陳三䇿必可施用而國家禦敵之計在北為大臣等敢不經心且北戎久強在後唐日以兵四十萬送石髙祖至洛陽立為天子而還遂與石晉為父子之邦邀求無厭晉不能支一旦舋起長驅南牧直抵京師虜石少主及當時公卿盡室而去幽燕遂陷為中原敗績之耻尚未能雪國家以生靈之故與之結和将休兵養民有所待也及天下無事人人懐安不復有征戰之議前年北敵驟變詭謀稱兵燕薊有背盟之變割地之請國家倉卒無備難於用兵遂増重賂以續前好彼既獲利方肻旋師今乗元昊通順之議又欲邀主盟之功其勢愈重茍不大為之備禍未可量臣等固請朝廷力行七事以防大患一宻為經畧二再議兵屯三專於選将四急於教戰五訓練義勇六修京師外城七宻定討伐之謀一宻為經畧者自河朔罷兵以来㡬四十年州郡因循武事廢弛凡謀興葺則罪其引惹昨朝廷選差轉運使盖欲革去舊弊預為之防然既有本職則日為冗事所嬰未暇周慮請選有材識近臣假以都轉運使之名暫往經畫使親視邉壘精究利害凡邉計未備者皆條上而更置之不出半年歸奏闕下更令中書樞宻院子細詢訪熟議經久之計若敵情驟變則我有以待之矣二再議屯兵者自来真定府定州髙陽關分為三路其所轄兵馬未甚整齊乃有一州兵馬却属兩路之處又未曉本路将来於何處控扼合用重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣往彼宻為經畧方可預定法制臨時不至差失或事宜未動亦當相度兵馬合那減於何處駐泊使就芻糧以省邉費庶免先自匱乏至用兵之日重困生民三專於選将者委樞宻院於閤門祗候使臣已上選人三班院使臣中選人殿前馬歩軍司於軍旅中選人或有智畧或有材武堪邊上試用者逐旋進呈據選到人數以籍記之候本路有闕則從而差授如此則三二年間得人多矣四急於教戰者於陜西四路抽取曽押戰隊使臣十數人更授以新議八陣之法遣往河北閱習諸軍使各知竒正循環之術應敵無窮五訓練義勇者今河北所籍義勇雖約唐之府兵法制三時農務一時教戰然未建府衛之官而法制不行號令不一須别選知州知縣縣令可治兵者并増置将校使人人各知軍中之法應敵可用斯則強兵制勝之本矣六修京師外城者後唐無備契丹一舉直䧟洛陽石晉無備契丹一舉直䧟京師故契丹之心於今驕慢必謂邉城堅而難攻京師坦而無備一朝稱兵必謀深入我以京師無備必促河朔重兵與之力戰戰或不勝則敵馬益驕更無顧慮直叩澶淵張犯闕之勢至時遣使邀我欲以大河為界我既無備将何以禦從之不可拒之必難又振逼京師何以為計若京城堅完則戒河朔重兵不與之戰彼不能戰則無乗勝之氣欲謀深入則前有堅城後有重兵必将沮而自退退而不整則邀之可也是則修京城者非徒禦寇誠以伐深入之謀也漢惠帝時起六里内男女城長安二年而畢唐明皇時城長安九十日畢考法於古擇利于今京城之修盖無疑矣然須二年成之則民不勞苦人不驚駭矣七宻定討伐之謀者彼幽燕數州人本漢俗思漢之意子孫不忘太宗皇帝既克河東乗勝北討數州吏民望風請命惟幽州未破我軍虚驚班師以来嵗月緜逺如天限其北無復輕議一昨盟好已摇安保其往當訓兵養馬宻為方畧以待其變未變則我不先舉變則我有後圗指彼數州決其收復使彼思漢之俗復為吾民成太宗皇帝赫怒之志雪石晉千古之耻則陛下之功如天如日著于無窮矣仲淹又奏元昊求和所争疆界乞更不問䟽曰臣竊觀史籍見前代帝王與外國結和通好禮意甚重非志不髙而力不足也盖懼邉事不息困耗生民用兵久之必生他變而為社稷之憂如漢髙帝唐太宗身經百戰大服天下不敢黷武而屈事外國者正為此也及其國力強盛将帥得人則長驅破敵以雪天下之耻今北敵西戎合謀并力夾困中原西兵數年未能平定近方遣使往復以議通順而延州塞門并河東豐州之地舊有属戸居之則為我利自元昊驅掠西去遂為隙地中國利害不繫於此今衆議須欲復得塞門以全疆土借如祖宗朝北陷易州西失靈夏及其和好皆畧而不言耻以前失之醜而求無用之地今西戎貪恡不足與争但名體已順餘可假借以成和好然後重議邉事退移兵馬減省糧草綏我生民勤我稼穡選将練士使國富民強以待四逺之變此帝王有道之術社稷無窮之福也如欲與敵國理曲直決勝負以耗兆民以危天下語之則易行之實難臣備位二府當思安危大計不敢避人謗議上下共説累陛下包荒之徳以重増宵旰之憂臣不勝懇迫惶恐之至仲淹又奏乞宣諭大臣定河東捍禦䇿䟽曰臣竊見契丹遣使来朝廷言欲西征今邉上探報皆稱契丹大發兵馬討伐呆家族并夾山部落及稱亦與元昊兵馬相煞又報元昊亦已㸃集左廂軍馬既是二國舉動大兵必有大事以臣料之夾山等蕃部小族豈二國盡舉大兵攻討此可疑一也又元昊自来惟倚契丹侵淩中原今無大故何敢便與契丹相絶而舉兵相持此可疑二也自古聖賢議論皆稱異域無信今朝廷便欲倚慿此可疑三也前来契丹邀中國進納物帛欲屈伏朝廷元昊僭號擾邉屢擒将帥如盟信可保何至此今日之舉又可疑四也河東地震數年占書亦主城陷今二國之兵萃於彼方此又可大疑五也又邉上探得契丹遣使二道至南山寧化軍岢嵐軍後面覷歩谷口道路此又可大疑六也設或二國不守盟信卒然奔衝以數十萬衆乗不備而来河東軍馬不多名将極少衆寡不敵誰敢決戰此大可憂一也契丹素善攻城今探得㸃集床子弩并砲手皆攻城之具與昔時不同況元昊界無城可攻如却入漢界併攻此兩城破而屠之則其餘城乗風可下此大可憂二也萬一此度却未奔衝以取中國之信使安於疑為後舉之䇿此大可憂三也今乞聖慈顧問大臣如契丹可以保信必不入宼亦不與元昊連衡則乞今日同署一奏納於御前使中外安静不更憂疑他日或誤大事責有所歸如大臣不敢保信則乞指揮大臣今日更不歸廳便畫禦捍之䇿抽何路軍馬用何人将帥添若干錢帛據何處要害如此定䇿猶恐後時不能當二敵之勢或更因循度日直候大宼入境然後為謀則河東一傾危逼宗社臣待罪兩府義當極論不敢有隐繫聖斷處之仲淹又奏為契丹請絶元昊進貢利害疏曰臣竊見契丹来書稱朝廷曽請契丹止遏元昊今聞名體未順遂舉兵討伐又請朝廷絶元昊進貢契丹安肻為朝廷特舉大兵以討元昊此不可信一也若自與元昊有隙必行討伐其人使即合堅請阻絶元昊何却只問楊守素往来次第是無必討之意此不可信二也余靖等今有見契丹親信須指揮夏州令楊守素入南朝勾當必是動有關報今来北使却言北朝並不知子細此不可信三也萬一契丹必有深隙須行討伐必堅要阻絶元昊豈暇問於南朝名體順不順顯是契丹虚稱為朝廷西征駐重兵於雲朔如元昊以誓書未立入宼河東亦足相為聲援得至則享厚利如元昊更不入宼納誓書于朝廷則契丹自為因行討伐使元昊入貢以此為功而駐兵雲朔以邀重報是契丹進退有利而俱為我害也臣謂朝廷今日答書則易将報必難而專於致賂欲滿其志則契丹大兵起肻虚舉而善退願朝廷孰慮此事先且大議俻邉之䇿然後遣使往来使其知我有備無必勝之理則亦可以遏其邀功求報之心縱背盟好亦有以待之少減生靈之禍仲淹又奏乞罷㕘知政事知邉郡䟽曰臣近與韓琦上言陜西邉畫畧陳八事須朝廷遣使便宜處置方可辦集又近覩手詔下問合用何人鎮彼西方兩府已奏見選人進呈即今西人議和變詐難信成與不成大須防将来之患臣久居邉塞下誠無寸功如言鎮彼西方保於無事則臣不敢當但稍知邉情願在驅䇿雖無竒効可平大患惟期夙夜經畫措置兵馬財賦及指蹤諸将同心協力以禦深入之虞今防秋事近恐失於後時願聖慈早賜指揮罷臣叅知政事知邉上一郡帶安撫之名足以照管邉事乞更不帶招討部署職任元年右正言孫沔論范仲淹答元昊書上䟽曰臣伏自前月以来聞中外言昊賊使髙延徳持書至延州有歸伏朝廷之意范仲淹以書諭之令去僭號方可納欵仍聞大臣頗有異議或言忠義可賞者或言專命可戮者此數人皆平斷天下事何是非智識其相逺悖如是又臣寮上言者多相矛盾竊恐衆論紛撓以致惑亂視聽臣朝夕思之未知孰得今偶有所見揣昊賊情偽之計原邉臣得失之謀其理有三敢悉陳之萬一上合聖聦亦愚人之極慮也一者以西陲蕃戸久来貿鬻羊馬藥物嵗數百萬至於米䀋飲食皆資於内地自昊賊背逆凡二年謹察邉防禁絶交易彼又驅率闘戰殺害父子量其蕃族怨望者衆矣今忽来歸順者盖知中國必未納其姦謀将紿其族類必曰我為爾請和通其有無朝廷未允耳此将以激怒其衆使為邉患也二者近聞昊賊入宼涇原騎十餘萬此亦慮我知其盡銳離於巣穴而以别路攻其不備故使延徳偽来貢欵而緩我鄜延一路之兵也三者范仲淹夙負時望多士歸慕今處邉任得将士心軍民受賜中外所聞故昊賊未測其才謀因用延徳為反間以謀撓我師使疑而退黜之賊得其計矣臣又謂仲淹移書有利害者三焉一者賊請歸欵以我不許為激衆之謀今仲淹答而許之則賊之䇿不得行此亦我權其利也二者賊以計緩我鄜延一路入攻之兵則我本無深討之䇿雖其詐来之意於邉境之慮亦無害也三者賊謀撓我師而仲淹答其書雖於軍政無損實亦自蹈先機今大臣果謂其專命或言其可斬者若有姦謀深利此言使賊知之因致悖慢之言偽為交結之意起市虎拾塵之說設並馬草具之事冀朝廷疑仲淹而朋比有嫉害者從而媒糵之大則受誅滅之罪小則必竄逐其身使國家一朝失賢三軍無帥去邉地之長城開賊衆之大路此實可憂之甚者也臣又見前嵗王徳用被罪廢黜本其事發之因亦由臣寮以䜟記之言形貌之肖章奏交上何止於三使曽参被殺人之名而不得自明也盖徳用至公之節得軍中之情有緫統之望為逺人所知驟獲憂疑忽然廢弃使邉鄙無大将而朝廷終不敢起徳用豈非昊賊以宻謀挾邪而中害良善也今仲淹盡誠許國立義忘軀獨處逺徼不顧危亡求之品流罕有倫擬在陛下聖哲推其本心令得盡節則天下之幸也臣恐昊賊即設姦計復答其書矯陷仲淹暗合臣説則望陛下念之以辯其詐使賢材不為賊所欺逐則昊賊亡滅可立俟矣或曰蕃宼小醜安有逺圗臣對曰預備則無患過慮則少失若昊賊實欲歸欵料之雖過於事無損即如前嵗賊使六十餘人峨冠變服托以貢奉宣言僭稱之意時宰執謀議固無異術但下詔削奪遣還而惟知制誥吴育上言以聖朝太平既久兵戰不習乞且因而撫之然後備邉練将以議攻取為便當日柄臣皆誚其怯今二年連陷将帥覆沒兵衆豈復可以小宼待之然欲行吳育之䇿而未能也況仲淹以書移賊自是閫外事宜若昊賊因而歸順亦國家軍事之利於朝廷有何累哉今韓琦督戰無功敗軍殺将尚不欲黜削恐傷國體況仲淹以計䇿或有得失且於事未有大過豈宜輙加其罪諒陛下神機聖斷盡在䇿中不待言而後知也臣與琦仲淹皆故舊深知今論事之際必盡公言決安危之計非愛憎之心也伏望陛下萬機之暇乙夜詳覽幸甚歴代名臣奏議巻三百二十四
