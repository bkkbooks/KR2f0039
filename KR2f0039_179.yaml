body:
  text: 歷代名臣奏議卷一百七十九明楊士竒等撰去邪宋哲宗時劉安世論王子韶差除不當疏曰臣伏聞朝廷以王子韶為太常少卿採之僉言咸謂未允輒據公議上逹天聽按子韶姿性憸佞行已無恥熙寧初士大夫有十鑽之諺目子韶為衙內鑽蓋以其造請公卿之門不憚寒暑交結權要子弟巧於自媒如刀錐之銛鋭也及吕公著為御史中丞遂薦子韶以備臺官隂持兩端見利忘義是時王安石用事方行青苗之法子韶每進對之際則迎合上意未嘗有一語敢指政事之失及對公著則復肆誕謾以謂屢嘗奏疏言新法之非便蓋欲上下欺罔兩獲其利先皇帝聖鍳明哲洞照奸心子韶詐窮情得遂被黜責其後復除荆湖南路轉運判官為言者疏其前後過犯及不葬父母之事因而報罷元祐初擢領劇曹又為御史論其亡狀尋令外補今少常之任素號清選前日之居此官者或遂遷侍郎或就拜給諫大用之漸多假此途豈容匪人輒爾冒處伏望陛下慎重名器斥逺佞邪收還子韶誤恩别擇賢者庶無虛授輿議厭服安世又論王子韶疏曰右臣嘗論奏王子韶除太常少卿不當今已纍日未奉指揮臣聞子韶熙寧中嘗按錢塘祖無擇事承望王安石風指巧為搆陷縉紳之間至今不以為直及任御史茍務容恱上諛人主下欺官長先皇帝察其頗僻黜為上元知縣清議不齒于兹有年中間雖移湖南運判及遷吏部郎中尚為言者所劾皆即報罷今少常之任資望愈重一歷此地遂升要津豈容匪人可冒優選議者謂子韶頗有文學不忝新命此亦姑息之論非公言也國家設官分職本以待天下之才如子韶者反覆奸邪見於己試人物汚下衆所鄙薄既不能納忠於先朝豈復能盡節於陛下雖區區之記問或有可稱而大義已虧餘何足道今若不究本末妄置清途臣恐幸門遂開小人道長甚非朝廷之福惟陛下重惜名器為官擇人檢㑹臣前奏事理特降指揮收還子韶之命别授賢者以慰輿議安世又論王子韶疏曰右臣近已兩具狀論奏王子韶除太常少卿不當至今未奉指揮按子韶人品冗末性復憸邪熙寧中為御史之日見利忘義反覆迎合其後呂公著陳襄質於上前矯詐悉露先帝疾其誕謾乃詔之曰外要黨正之名內懷朋奸之實遂奪言職逺貶江左止此一節已見棄於清議而況交結權勢子弟不恥自媒挾持私怨搆祖無擇之大獄諂事吕嘉問復得提舉折納差遣操行卑汚實鮮倫比昨除湖南運判及遷吏部郎中當時御史猶以為非處子韶之宜劾奏而罷豈兹少常之任反可輕授除目𫝊播甚駭物聽臺諫論列方俟進止子韶略無忌憚遽已視事其處心積慮不過以謂朝廷若用言者之論則已嘗就職縱使罷去恩例尚優機巧徼幸一至於此方陛下厲精求治辨别邪正之際尤不可使此輩輒汚清途伏望聖慈特垂省察收還子韶之命以為奸人之戒不勝幸甚安世又論王子韶曰右臣近以三具狀論奏王子韶除太常少卿不當至今未覩施行近者風聞三省奏事之際嘗䝉宣諭以辨别君子小人為戒輔弼大臣既被聖訓謂宜夙夜交警慎簡庶寮而謬引奸慝塵汚清選考之衆論皆謂執政之間與子韶有舊者憐其獨未顯逹是以力為主張臣竊謂大臣不遺故舊之心則善矣至於屈天下之公議而伸一己之私恩則非所以為朝廷之計也昨者王汾除諫議大夫御史止言其詼諧口吃之類一二小事猶且報罷豈若子韶奸邪反覆見於已試柔屈不恥老而益甚遽躋華貫實辱簮紳況汾以小過而棄捐子韶負大罪而拔擢用捨之道顯非至公伏望聖慈檢會臣三奏事理追還子韶誤恩别改閒慢差遣庶無虛授以服天下安世又論王子韶疏曰右臣近四具狀論列王子韶差除不當比聞已有指揮别與差遣今早伏覩除目授衛尉卿反復思之不得其說須至辨析上煩天聽臣纍奏子韶罪狀皆天下之所共知未嘗有一語輒涉疑似朝廷使之追改則是不以臣言為妄前日太常之命既非所宜今七寺正卿又在太常少卿之上豈可因人彈劾更得超遷豫奪重輕悉皆倒置是非好惡衆且何觀開羣小僥幸之門啓大奸窺伺之隙政事如此臣竊憂之伏望陛下捴覽權綱慎重名器懲子韶之朋附亟令外補或謂即今苦無顯過則乞依舊以衛尉少卿處之惟斷自宸衷無惑衆口庶幾公道不至淪廢安世又論王子韶疏曰右臣近嘗再論王子韶本因人言遂罷少卿之任却除衛尉正卿理有未允乞行追寢以厭公議今既纍日不䝉指揮臣聞王子韶者以謂官制後來太常少卿最為清選今若不容子韶冒處而七寺卿列乃是粗官捨彼豫此别無僥幸臣請有以折之勘㑹太常少卿之美遷者或為侍郎或為給諫前日之李常趙瞻梁燾鮮于侁趙君錫是也七寺卿則不然崔台符楊汲自大理孔宗翰由鴻臚韓宗道自太府不作給諫便拜侍郎安得謂之粗官而少貶於太常也況太常少卿係從五品諸寺正卿乃從四品子韶自到衛尉方及一年才擢少卿又正卿列平日不掛貶議之人尚有驟遷之避以子韶之罪惡顯著而力排公議必欲超擢朝廷政事豈宜如此臣自忝諫列進言多矣然未嘗以決不可行之事要君近名惟是公道陵夷小人寖盛是以不避煩瀆天聽須至再三論辨況陛下厲精求治長育人才去一老奸無損於國惟祈睿斷早賜施行安世又論路昌衡狀曰右臣伏見朝廷以路昌衡為直祕閣權知廣州竊惟南海之地控制蠻獠風俗輕悍易動難安祖宗以來擇帥尤重必有綏懷之德濟以肅服之威使之統臨乃能鎮靜臣按昌衡人品鄙下資性殘刻昔為安陽知縣以隂事將發而尋醫昨任陕西監司以舊怨劾吏而無實治余行之獄則著酷烈之名居親母之喪則有非僻之行清議不齒為日已久方陛下嗣膺大寶驅逐羣邪昌衡與蹇周輔輩均號酷吏在所廢斥而素為蔡確鷹犬極力主張屢竊要官衆謂幸兔今嶺表之寄事任非輕豈兹小人可稱簡拔臣聞見昌衡罪惡事狀甚多姑欲追止誤恩未敢悉塵天聽伏望陛下深詔輔弼别議掄材非惟交廣之人免被虐政又俾曲濫之吏少沮凶威仰冀睿明特賜採納不勝幸甚安世又論路昌衡疏曰右臣近嘗論列路昌衡除知廣州不當初聞尚書省勾收告命縉紳莫不欣恱今日乃知却有指揮命進奏院依例發下三數日內豫奪反覆中外疑惑實損國體臣按昌衡天資削刻狡獪誕謾昔熙寧中知相州安陽縣不修士檢醜聲流聞本路監司將行按發昌衡遽乞尋醫因得幸免然而內疑指使劉龜年暴揚其事後來陕西用兵龜年適在秦州夕陽鎮為監押昌衡乃指名抽差部押糧草欲緣軍興中以危法而泄其私怒是時龜年具此因依訴於趙濟遂留而不遣其事喧騰無不知者臣又聞昌衡執親之喪寓居南京曽無哀戚之容反為非僻之行有武人劉振孫者候其微服出入倡家遂痛驅之為人所救僅得逃逸及昌衡為陕西轉運副使振孫又知寧州挾其舊怨勇於報復乃用匿名之書移振孫為原州都監且匿名文字於法不當受理而昌衡違法受之振孫事狀甚輕曾無免所居官之罪借令當移亦無降等之理昌衡任情刺舉不畏公議一路澄清之寄將何賴焉臣又聞昌衡治余行之獄輒廢録問違經亂法天下以為酷吏然而行之舊游王圭之門昌衡既於案牘之間隱落其事又密告於王以市私恩仍與蔡確陰相交結故圭確用事之日寖盜華要陛下即政之初澄汰奸慝昌衡以死黨在朝獨免廢放嵗月未幾頻易劇任當時士論固已上譏廊廟下責臺諫今海南之地控制百蠻推擇帥才尤宜慎重以昌衡之罪惡如彼而朝廷委付若此臣恐豺狼之性毒烈貪㬥必不能為陛下布宣惠澤鎮安逺民異日生事悔將無及伏望聖慈速降睿旨收還昌衡誤恩别擇良守以式南國豈勝幸甚安世又論路昌衡疏曰右臣近兩曽具狀論列路昌衡除知廣州不當今日雖聞已有指揮易守潭州而貼職誤恩尚未追改考之公議咸謂未安須至開陳上黷聽覽臣前章所奏昌衡罪惡固已詳悉而情理之尤不堪者莫甚於執親之喪而為非僻之行昔陳夀居父憂之中使婢和藥當時士論尚且鄙棄豈若昌衡不念顧復之德肆行奸穢之事臣聞父子之道天性也事親孝則忠可移於君今昌衡違犯名教絶滅人理於所厚者其薄如此陛下亦安用之況所貼職名本為南海重寄欲寵其行前命既罷即合追寢兼長沙守臣從來亦無盡帶館職之例使昌衡捨烟瘴之逺得湘潭之便又貼直閣坐制一方天下奸慝何所懲沮惟陛下留神省察速降睿旨追還昌衡新命别與閒慢差遣庶幾善惡明辨少厲薄俗安世又論路昌衡疏曰右臣近纍具論奏路昌衡前後罪狀不堪擢用及已罷廣州當追貼職至今未奉指揮臣之所言得於公議章纍十數遷延五月是非可否終無定論內外疑惑實害政體況潭州守臣自來亦無必帶館職之例豈可因緣差誤輕授小人伏望聖慈審察事理明詔執政早令追改使朝廷判别邪正之道信于天下如昌衡輩誠何足惜惟陛下斷之不疑豈勝幸甚安世又併論王子韶路昌衡疏曰右臣近已纍狀論列王子韶路昌衡差除不當至今未䝉施行議者謂子韶記問該博昌衡吏事強敏其才可用不欲終廢臣竊惑焉朝廷取人固必有道若大節已善或有小疵才難求全理當掄擢傳所謂不以一眚掩大德者是也其或素行邪僻大義已虧雖有小才固無足取此少正卯之行僞而堅言僞而辨學非而博順非而澤所以不能逃孔子之誅也按子韶上罔先帝下欺長二為臣不忠清議所棄昌衡執親之喪曽無哀戚肆行邪穢絶滅天性為子不孝典法所誅豈謂斯人反䝉褒進再三惟慮不得其說臣竊謂朝廷差除固有當否言者議論不無是非既不以子韶為太常少卿又追還昌衡廣州之命則前日所差為不當臣之言為是矣繼而罷少常者更遷衛尉正卿免南海者依舊貼職以為潭帥則臣之議論孰是孰非朝廷差除孰當孰否數日之間反覆如此傳播天下豈不疑惑昔魏太祖有言曰荀令君之進善不進不休荀軍師之去惡不去不止今昌衡子韶可進之善少可去之惡大黜之有厲於薄俗用之無補於聖時何為遂非憚於追改臣聞三軍可以奪帥匹夫不可以奪志臣雖愚陋敢忘素守惟陛下無恤反汗之嫌自遺飬虎之患檢㑹臣纍奏事理早賜指揮安世又論王子韶路昌衡疏曰臣近以王子韶路昌衡差除不當前後共十一次論列未䝉施行議者謂君命已行難於反汗臣竊以謂不然國家良法善政天下以為便者大臣當為陛下協力守之不可變也至於進退人物間有差失但不吝於改過猶無害於得人今朝廷政事之可守者往往不能固執初議屢有變更以惑亂天下之視聽至於引用奸惡以致人言則反遂非自用不恤公議而徒以不欲反汗為說臣所未喻議者又謂言者好求人之過而執政惟用人之才臣亦以為不然古今用人誠難求備要當録其大而略其細則無棄人矣今子韶之為臣不忠昌衡之為子不孝清議之所共疾典法之所不赦雖區區之所記問吏事有足稱者然而可取之善小可棄之惡大用之有害於名教黜之無損於聖朝而大臣謂之用才亦已過矣臣聞近日除吏之際每患言者彈駮以謂數有追改則恐差除不行臣竊謂朝廷不知其不可而使之則罪在耳目之官茍知其惡而不去則咎將誰執與其用人之後惡臺諫之多言曷若未用之前少加審慎而使人無可言者乎臣非敢以所論未行忿而求勝直欲以天下之公議上逹聖聰庶幾退斥奸邪奬進良善為國家開衆正之路立太平之基而已惟陛下察臣之志力主公道罷子韶昌衡之命以為天下臣子之戒安世又論王子韶路昌衡疏曰右臣近以王子韶路昌衡差除不當前後共十二次論列未䝉施行臣條奏二人罪惡固已詳悉皆中外之所共知非敢以疑似難明之事而妄加之也朝廷取其小才而遺其大惡茍無私意何以至此臣所以反復論奏不能自屈者特以聖明在上與天下之公論為可恃爾伏望陛下力主正道更加詳察以臣所言子韶昌衡事狀下御史臺體量如皆有實非臣厚誣即乞特降睿旨疏其罪惡而顯黜之以戒天下之為臣不忠為子不孝者若有一事稍涉虛妄臣亦不敢苟避罔上之戮惟祈聖鍳早決是非使枉直不至於兩存奸慝不容於幸進愚臣願望實在於此安世又論王子韶路昌衡疏曰右臣昨以王子韶路昌衡差除不當前後共十三次論列日近雖䝉朝廷以子韶出守滄州而昌衡之命猶未追改臣既任言責實畏公議纍煩天聽蓋非獲已竊謂二廣之地控制百蠻祖宗以來選委尤重然而嶺南瘴毒人所憚行故凡命帥恩例特厚或貼以職或進其官悉有舊章可以推考今昌衡為子不孝為吏酷虐附㑹王圭蔡確屢興大獄違經亂法天下怨疾得免廢棄已為厚幸比叨擢用尋致人言既罷五羊之行猶冒直閣之寵捨烟瘴之逺得湘潭之便使昌衡自為之計不過如此況因彈劾而所授反優於前日輕重倒置何所懲勸臣聞惟名與器不可以假人今館職帥權世謂髙選若容邪黨輒爾濫處臣恐朋邪羣小以苟得相矜而正人端士以同受為耻陛下厲世磨鈍之具遂為虛名此尤不可以不慎也伏望聖慈檢會臣纍奏事理追寢昌衡過嶺貼職處之散地非惟使不孝酷虐之類無以覬幸誤恩亦足示朝廷之好惡風化天下安世為左諫議大夫又論鄧溫伯差除不當疏曰臣伏見朝廷除鄧溫伯為翰林學士承旨初則中書舍人繳還詞頭繼又給事中兩次封駮臣竊謂至公之朝必無遂非之理遷延纍日未敢論列比聞傳報前命復下縉紳相顧莫不失色何者陛下即位以來未嘗沮抑公論今兩省給舍舉職如此蓋是僉議以為失當朝廷略不聽納持之益堅臣再三思之不得其說及觀告詞乃知陛下以攀附之故遂加恩寵臣獨疑其不然須至辨正前代創業之主經綸草昧乃有豪傑之士用為佐命之臣謂之攀附可也繼體之君或由儲二或自藩邸春宫王府咸備寮屬以其有保傅之恩調護之效謂之攀附亦可也恭惟陛下初自妙齡未遑出閣誕膺天命遽踐宸極中間溫伯雖曽暫掌箋記何嘗得望清光而遂以攀附加之循名考實顯為非據況溫伯奸邪反覆天下所知隂假王言內交蔡確此實有罪苟逭典刑更被誤恩尤駭物聽伏冀陛下審察清議斥逺佞人收還詔除以慰衆望安世又論鄧溫伯差除不當疏曰臣近嘗論奏鄧溫伯除翰林學士承旨不當至今未奉指揮臣謹按溫伯資禀奸邪貪附權利熙寧中王安石吕惠卿勢均力敵更相傾陷溫伯始終反覆出入兩黨巧邪側媚情態萬狀元豐間蔡確用事悉心附託召自成都置之翰苑及陛下纂承天極褒賞輔弼溫伯草王圭麻制則曰預定議於禁途為確命詞則曰尤嘉定議之功臣聞太皇太后之立孫神宗皇帝之與子上當天意下符人望聖心先定不假外謀考經稽古無一不合確實何力敢貪天功就如奸人之言出於大臣之策亦當先推上相方及次輔而溫伯陰受邪說稍絀王圭乃於確制特為溢美重輕顛倒欺惑天下蓋小人之深計將徼幸於異日溫伯預聞其事故欲以此張本原心定罪宜䝉顯戮茍逃誅竄已出大恩豈可塵汚玉堂奉承密旨況中書舍人繳納詞頭給事中再曽封駮成命之下則御史全臺兩省諫官並有論列陛下即位以來用人多矣至於衆論沸騰物情駭動未見如今日之甚者以此卜之則公議所棄不可不去也伏望聖慈察君子小人消長之機為宗廟社稷永逺之慮早出臣奏付外施行不勝惓惓之懇安世又論鄧溫伯差除不當疏曰臣近已兩曽論奏鄧溫伯差除不當至今未奉指揮臣聞朝廷之務莫先於用人君子進則治之本也小人用則亂之階也王者深居於九重不能盡知臣下之邪正是以設諫官御史之職俾司耳目之任而採中外之公議是非可否惟衆之從故蔽賢之言不能害君子黨奸之論無以助小人明君無所用心而賢不肖自辨知人則哲其道不過於此今溫伯奸邪反覆惟利是視交結蔡確臣節不忠自聞詔除甚駭物聽臺諫論列乞寢成命今已纍日未聽俞旨事繫消長不避誅譴伏望陛下以臣纍奏付外施行勿以奸人先入之語而廢天下至公之論豈勝幸甚安世又論鄧溫伯差除不當疏曰臣前日以職事進對因及治亂安危之大計伏䝉聖慈特賜開納感激抃蹈莫能自勝最後論鄧溫伯差除不當陛下諭臣曰卿等須體朝廷之意天下事豈可盡由臺諫亦當出自宸衷臣雖已具義理開陳退而深思猶有未盡輒布悃愊上瀆天聽惟陛下不憚煩而試聽之臣嘗讀國語以謂天子聽政使公卿至於列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是三代之前上則公卿大夫朝夕得以納忠下則百工庶民猶執藝事以諫故忠言嘉謀日聞於上而天下之情無幽不燭無逺不通所為必成所舉必當者諫諍之效也後世之士不務獻納於君而多為自全之謀正論逺猷鮮有入告於是設貟置職而責之以諫矣夫進言者日益少而聽言者不加勤此天下之治所以終愧於先王之盛時也神宗皇帝考古揆今更新官制以朝廷者政事之所自出乃用有唐六典之法置舍人於中書省凡詔令之未安法度之未便皆得抗議庶協厥中萬一差失則設給事中於門下省委之封駮猶恐人之謀慮不能盡善則又命諫官議論御史糾彈上下維持綱紀完密誠使此地率皆得人交修職業而朝廷不治者未之有也今天下方制萬里獲覩陛下之清光者億兆之中僅有一二就獲覩之中得接言議者又千萬無一焉自二聖臨御以來羣臣無非次之對上則六七執政下則四五言官而已陛下所與謀議者其寡少如此臣若更以體朝廷為事知公議之不可而不以告於陛下則黎民疾苦萬務闕失邪正之消長中外之情僞何以盡逹於聖聽乎昔唐太宗之朝三日不諫則責侍臣蓋高卑之勢既已遼絶上下之情常苦不通虛已招來猶或不至儻示厭薄人誰盡忠書稱堯之德則曰稽于衆舍己從人語舜之功則曰明四目逹四聰序禹之所以興則曰益贊于禹禹拜昌言述湯之所以王則曰用人惟已改過不吝惟其諫而能聽聽而能改此堯舜禹湯之所以聖也伏望陛下開廣聰明延納忠讜言或逆耳則求諸道語或遜志則知其惡任賢勿二去邪勿疑使懷奸者無隙可乘履正者樂告以善陛下廣覽兼聽日新聖德與堯舜禹湯並驅爭先不其偉歟臣待罪諫垣曽乏善狀惟是盡誠無隱庶幾報塞大恩更願陛下察其愛君之心恕其狂妄之罪少賜採擇不勝幸甚安世又論鄧溫伯差除不當疏曰臣近以四次論奏鄧溫伯差除不當至今未奉指揮臣不敢逺引前古上煩天聰止以祖宗故事更為陛下開陳庶幾愚忠或䝉採納臣伏觀太祖以和㠓貴家子能業文甚寵待之欲詔入翰林謂近臣曰㠓眸子眊眊然胸中必不正不可以居近侍其命遂寢景德三年樞密院議次補禁軍列校王繼英奏曰藩邸給事之人尚在外職者皆聚議騰謗謂臣䝉蔽不言於上致其留滯真宗曰此等皆不自省修苟求僥幸本以因緣際㑹儻加升擢必須有名方塞輿議先朝時有一散從官李榮在藩日曽預給使後十餘年但𨽻名尚食局嘗隨流輩預選先帝見而詢之乃知榮也止遷隊長嵗餘漸擢為小校蓋國家爵位不可輕授也臣每讀至此輒廢書歎息何者祖宗不吝爵位惟以待天下之賢茍非其人未嘗輕假名器豈特畏下之議已蓋將貽謀於後世也且藩邸之吏預有執事之勤雖軍校之微猶不欲無名與之況玉堂禁近萬萬於此者乎祖宗之朝尤重學士每欲命人必審其才器之邪正蓋將求賢以自輔非専取其文藝而已如和㠓者固未見過惡之迹但觀其眸子疑非端士遂不復用則選掄之意豈欲以小人在側邪今溫伯奸邪反覆皆有顯狀出入安石惠卿之黨盜取榮寵晚附蔡確輕用王言貪天之功徼幸異日非特和㠓之比也但以暫掌箋記遂竊攀附之名俾長禁林奉承密旨又非小校之類也臣竊謂太祖雖愛和㠓之才恐非正人乃輒寢翰苑之命陛下知溫伯之奸慝而置於論思之地太宗真宗於合推恩人猶不輕授陛下未嘗出閣溫伯本非宫寮今乃無名假寵如此臣竊為陛下惜之陛下亦當為祖宗惜之也況詞頭初下中書舍人已嘗繳納成命既降給事中再具封還朝廷皆不聽從然後御史全臺兩省諫官相繼論列茍粗合於公議豈至於此紛紜伏望陛下上體三聖之心下為萬世之法因溫伯之辭免收還新命使小人之道不能寖長以為朝廷異時之患天下幸甚安世又論鄧溫伯差除不當疏曰臣向者纍具論列鄧溫伯差除不當乞行追寢未奉指揮間臣以疾在告不復再進章疏日近竊聞溫伯將受新命臣雖伏枕危殆日夕憂悶何者陛下即位以來振起正道登用賢俊天下之情翕然歌頌今溫伯之奸邪反覆中外所知攘奪太皇太后社稷之功以歸蔡確此戴天履地者之所共疾况臣誤被恩擢列職諫省豈敢容縱奸慝以為朝廷異日之患乎自唐以來為翰林學士承旨鮮有不登宰輔日近蘇頌是也今溫伯既至此地異日豈敢保其不至執政邪臣大病之餘三次勞復自度疾勢恐不得再望清光若奸人不去朝廷臣雖死目不瞑矣臣不能自書謹口授臣男具録上進惟陛下哀而聽之貼黃臣聞溫伯差除本不出聖意止由大防留身薦引故有是命然大防之意非特欲成就溫伯以自結於羣奸而已蓋昨來都司擬定任永夀酬賞不當臺諫官屢有彈劾大防切齒惡之無以泄其忿怒是以明知溫伯之罪公然提拔意謂言者必須力爭則欲假此為名以逐臣等皆是宰相之陰謀願陛下聖明深賜省察又若謂溫伯曾掌箋記欲示恩禮即乞朝廷優與職名處之藩鎮則陛下所以待溫伯者不為不厚而小人寖長之勢可消惟乞出聖斷早賜施行安世又論章惇强買朱迎等田産事狀曰右臣近以章惇用賤價買百姓抵當田産致朱迎等經戶部陳訴尋具論列乞行按劾比蒙朝廷下江淮發運司考驗虛實竊聞本司所委體量官止於崑山縣取索公案看詳遂具回奏以謂買田之事雖有實狀而於條法别無違礙臣竊謂奸吏附會權勢暴虐良民必不肯於案牘之間明著逼脅之迹往往假託公道捃托它故使無辜之民不勝刑禁然後命狡獪之吏取責情願出賣之狀則是外無違法之形而內有奪民之實也今若信其文具而不原其本意則逺民屈抑終無所伸須至辨明以破其妄檢准編敕節文侍從官待制以上不得廣置産業與民爭利臣前章所言者止據朱迎等四戶爾訪聞發運司體量到乃有二十一戶是舉蘇州之內官賣田産皆惇所有也自來州縣估計抵當物業止約一半之直蓋官司防異日失陷之弊不敢盡用本價今惇利其甚賤公違條制劫持州縣侵害細民爭利之罪孰大於此臣又檢准律文祖父母父母在而子孫别籍異財者徒三年若祖父母父母命别籍者徒二年子孫不坐臣謂惇用其子承事郎援之名投狀承買使惇初不預聞則援宜得罪將惇自為之則咎將誰執況朱迎等狀內陳其矯妄之事條目甚多此四人者粗有裹糧故不逺數千里求直於省部其餘貧病之徒不能自給斂手去業遂至流亡陛下可不念之乎臣聞西漢軹有儒生侍使者坐客譽郭解生曰解專以奸犯公法何謂賢解客殺此生吏以責解解實不知殺者殺者亦竟莫知為誰吏奏解無辜御史大夫公孫𢎞議曰解布衣為任俠行權以睚眦殺人解不知此罪甚於解知殺之當大逆無道遂族解臣竊謂惇嘗為執政非特郭解匹夫之比也州縣畏惇之勢迫逐平民使之失職而惇不顧國法並以賤價易其田宅又非郭解之不知也今若以奸吏舞文粗能應法害民之實略而不問恐非春秋誅意不誅事之義伏望陛下詳閲朱迎等四狀事理特降指揮劾本縣官吏挾情不公之狀按惇矯詐亂政之罪明正典刑以戒天下其蘇州及本路監司不受朱迎等辭訴亦乞並行黜責所貴權豪知畏逺民安堵安世又論曰右臣伏見去年十二月內蘇州崑山縣人戶朱迎等經戶部論訴章惇強以賤價買百姓抵當産業遂具論列乞正其罪自後蒙朝廷委發運司考驗虛實今年正月間本司體量奏到事狀雖依違滅裂不盡本情然其大槩己見朱迎等所訴不至誣罔如惇用其子承事郎援之名投狀承買官賣田産共二十一戶皆有按據最為要切臣以謂章援不告其父私成交易則當得别籍異財之罪若惇假託名目則自有降等之法兼諸育狀內亦指定下狀之日援方在京就試則惇之矯詐又甚明白遂以合用敕律奏聞必謂便可議罪今已纍月未䝉施行上下畏惇一至於此按惇閒居里閈不與政事而氣焰凶暴官司嚴憚寧屈陛下之法不敢逆惇之意使惇有權得行其志則天下之弊將如何哉今體量到事迹既皆有實無可疑緩而故為留滯臣恐有與惇隂為地者更相搜摘細故㑹問往復則明堂赦恩必遂原免然則大奸何幸而平民何不幸也伏望聖慈詳此事理明敕三省早令結斷其州縣監司不受朱迎等訴狀亦乞特行降黜所貴亂政跋扈之臣屈法阿私之吏知有典刑易為制御逺民屈抑有所伸雪安世又論曰右臣伏自去年十二月後來纍曽劾奏章惇劫持州縣不顧國法強以賤價買百姓抵當物業遂致朱迎等四人不逺數千里赴訴省部後來䝉朝廷下發運司體量已有實狀而遷延半載未䝉施行臣前月二十二日延和殿再具奏列伏蒙宣諭便令結斷又今踰月未覩指揮臣竊以惇氣焰凶悖陵暴寡弱詐以男名廣置田産公然别籍殊無忌憚罪狀顯著曾非隱伏而尚書省曲為留滯以幸赦宥甚非所以稱陛下仁愛元元之意伏望特降睿旨早正典刑庶幾亂政跋扈之臣不至幸免逺民屈抑有所伸雪安世又與諫議大夫梁燾左司諫吳安詩同論章惇疏曰右臣等伏見章惇在蘇州日强以賤價買朱迎等抵當田産自去年十一月後來右正言臣安世纍曽論列䝉朝廷下江淮發運司體量皆有實狀日近竊見敕斷罰銅十斤臣等按惇嘗備執政固宜奉法循理尊君愛民而氣焰凶暴劫持州縣貪利無厭使人失職原其不畏國法之意蓋有陵蔑朝廷之心而所責太輕未厭公議況惇與蔡確黃履邢恕素相交結自謂社稷之臣天下之人指為四凶若不因其自致人言遂正典刑異日却欲竄逐深恐無名伏望聖慈特賜詳察明降指揮候惇服闋特行廢置所貴奸豪屏息永絶後患安世又同論章惇疏曰右臣等昨以劾奏章惇强用賤價奪民之産朝廷體量得實止斷贖銅十斤罰不當罪尋具論列今已踰月未䝉施行臣等按惇用其子承事郎援之名承買朱迎等田産而下狀之日惇父尚在檢准名例律疏謂祖父母父母在子孫無自專之道而有異財别籍情無至孝之心名義以之俱淪情節於兹並棄稽之典禮罪惡難容二事既不相須違者並當十惡推原法意正為惇設為子事父而用意如此不孝孰大焉至於悖慢帷幄之前殊無人臣之禮交結蔡確造播奸言貪天之功徼幸異日為臣事君而處心如此不忠莫甚焉臣等按惇之罪實人倫之所共棄王法之所必誅投之四荒始能塞責贖金輕典衆謂失刑伏望聖慈深賜省察依日近邢恕例不候服闋預降責命所貴邪正明辨奸慝知畏安世又同論章惇疏曰右臣等近已纍具論奏章惇罪名未正欲乞别議竄黜至今未䝉施行臣等伏見監司郡守以下不受朱迎訴狀並行責降令丞違法授給田産亦已衝替檢准編敕莭文衝替比徒一年臣等竊謂原心定罪故有重輕據事約法亦分首從今干繫官吏皆因惇而致罪而反處徒坐惇係首惡之人乃止贖銅十斤事理顛錯亦已太甚況下狀之日惇父尚在而别籍異財事狀著明考按律文罪入十惡愚民冒犯猶有常刑惇為大臣天下所望而虧損名教絶滅義理止從薄罰何以示懲臣等竊謂聖人制法惟務至公若行於匹夫而廢於公卿伸於庶民而屈於貴近此乃姑息之弊政非清朝之所宜行也按惇父在而别籍合徒三年既犯十惡即議請減贖一切不用未委前日所斷援引是何律令伏望陛下深賜省察出臣等此章詰問執政如律文别有衝改臣等妄言即乞明行罔上之戮若大臣别無異說即乞出臣等章疏以正惇罪仍依近降聖旨不用赦原但能稍正典刑庶幾不屈清議惟冀出於宸斷早賜指揮安世又同論章惇疏曰臣等向者數曽論奏章惇罪名未正今已纍月未䝉施行臣等按惇於元祐三年二月十四日用其子援之名承買諸育抵當田産至五月十六日方丁父憂即是投狀之日惇父見在推考事實别籍甚明據律定刑罪入十惡則議請減贖一切不用雖經赦宥無得原者庶人之愚或有抵冒朝廷行法未始少私惇位大臣為民所望而絶滅義理貪利無親止令贖金是亂典憲臣等竊謂君子犯義小人犯刑古之聖賢以為深戒若謂惇為君子耶今則犯義矣以惇為小人耶今又犯刑矣二者均不能逃聖人之誅則朝廷何憚於惇而廢祖宗之法伏望陛下出臣等此章送刑部定奪若律文曽經衝改引用不當即乞正臣等妄言之責如勘㑹惇投狀月日係丁憂之前委是父在别籍異財即乞依律斷罪所貴法令畫一天下信服安世又論章惇疏曰右臣伏自去年十二月後來十次論奏章惇買田不法等事雖䝉朝廷莭次施行而惇之罪名今猶未正遷延周嵗竟至經恩公論難安須煩天聽臣聞議者以謂從來大臣不欲與衆庶交易故託子弟以立文契臣以為不然祖宗之制惟戒從官以上不得廣營産業與民爭利苟非殖貨太甚則是法所不禁若身為大臣欲避好利之名而使子弟侵刻下民乃是陽為應法而隂縱貪鄙欺君犯義無大於此借如或者之說須無父兄方可别立名目今惇父尚在而下狀之日乃用其子上虧孝敬下失義方庶人之愚猶不至此大臣之體固若是乎議者又謂惇已不帶職及有旨候服闋日與宫觀差遣足以示懲不必深責臣亦以為不然惇之不得職名自是朝廷以其無禮於兩宫黜之外補故不用執政善去之例後來惇以便親為請遂得提舉洞霄宫方陛下聖政日新奸邪屏息如惇等輩自知罪惡貫盈必求退縮將來終制方且自陳而乃以宫觀授之正是中惇之意恐不足以當今來所犯之典刑也臣伏見兩浙監司及蘇州崑山縣官吏以畏惇之威奉法不謹朝廷體量得實並已斷遣輕者贖金重者衝替檢准編敕節文衝替比徒一年臣竊謂原心定罪固有巨細據事約法亦分首從今有司依阿廢職誠不可恕然皆因惇以致罪而反處徒坐又元降聖旨不許原赦即是干繫官吏獲譴反重於惇矣惇以前執政之勢劫持州縣殘害平民貪利無親不畏國法既係首惡之人乃止罰銅十斤即是惇所得之罪反輕於干繫官吏矣倒置如此公議謂何臣聞自責罰本路監司後來至今訟者不已蓋惇平日恃權暴橫人不敢校既知朝廷特為伸理是以競來赴訴為民之害如此之極何可貸也伏望聖慈以臣劾奏著之責辭或令降官或俾分務但能不失有罪足以稍正國體惟冀出於宸斷早賜指揮安世為寶文閣待制樞密都承旨又應詔言事曰臣伏自去嵗疾病得請崇福曽未數月復䝉召用雖聖恩博大不遺小才而臣朴拙愚暗未有以報塞萬一坐耗厚祿日負憂愧至於當今之要務朝廷之闕政每有聞見屢欲論列而既去言路不敢出位伏覩今年四月七日尚書省劄子勘㑹近臣自許言事三省同奉聖旨令御史臺行下臣忝備從官親承詔命事繫國體義當盡規願陛下留神而聽之臣聞朝廷除吕惠卿中散大夫光祿卿分司南京物議沸騰輿情震駭伏惟陛下初踐宸極務從人欲以惠卿蔡確之徒殘民蠧國辜負任使為四海所疾是以相繼貶逐屏之逺方雖匹夫匹婦之愚莫不曉然知二聖之心本為天下生靈驅除患害非有好惡之私也謂宜永投荒裔終身不齒而惠卿自移宣城方踰再嵗考之常法猶未當叙不識何名遽復卿列議者謂蔡確之母見在京師干訴朝廷願還其子大臣未敢直從其請故以惠卿嘗試兩宫若惠卿之命遂行則將藉以及確確既復用則章惇之類如蝟毛而起為天下國家計者其得安乎臣伏觀國朝會要第二百三十七卷太宗皇帝雍熙二年五月二十四日中書門下言有嘗任職官遣謫在外者昨經赦宥望令歸闕責其後效帝不許謂宰相曰朝廷致理當任賢良君子小人宜在明辨大抵人君宜先自正其身亦如治家家長不正家亦亂矣故聽讒邪之言則骨肉至親坐成離間豈能致肥家睦族之道歟大小雖殊其致一也今海島瓊崖逺處甚有竄謫之人郊禋以來豈不在念蓋此等為行巇嶮若小得志則復結朋黨恣其毁譽如害羣之馬豈宜輕議哉臣竊謂祖宗仁德均被動植及其制馭小人則一切斷之以義惟陛下善繼善述不愆不忘保守初政堅如金石萬機之暇屢省先訓異日或有大臣尚持姑息之論巧為道地假借大奸伏望陛下以太宗之至言靣折其妄使中外羣小不能窺伺朝廷之間隙搖動正道天下幸甚御史中丞劉摯彈四凶疏曰臣竊伏以陛下臨御以來運動政幾以時弛張述成先帝制治立法之意使光昭于天下利興害除四方鼓舞至於清明朝廷分别邪正斥逺奸佞鋤去彊梗皆妙慮神斷優遊閒暇不出於喜怒不見於言色而天下之善惡已辨是非已正矣何其盛歟然於此時臣竊怪天地之和氣尚或未應忠臣義士之論尚或未平此其故何也臣嘗究之蓋天下之元惡猶有稽誅天下之大奸猶有漏網而國法猶有未正此中外所以猶未厭也國之失政莫大於使奸惡幸而免今論其大者則前日之四三宦官是也臣待罪風憲雖知觸權幸言出而患入然臣有言責貪報恩遇則何恤乎身之危哉謹為陛下言之王中正元豐四年將王師二十萬由河東入界計其隨軍齎運役兵民夫通數十百萬衆矣中正徘徊於境上殆半月而後出翺翔乎疆外頓沙漠而不進公違詔書不赴興靈㑹師之約天寒大雪士卒饑凍坐使物故十之七八古之將帥固有無功而還者然猶當保完師旅歸報於國今精兵徑騎一無所施自取狼狽死亡殆盡按之軍法宜即顯誅中正略不自劾請罪而先帝以天地之量無所譴訶又遣使賜豫問勞然後中正徐徐求閒局厚俸自佚而去此國法未正者一也李憲之於熙河貪功生事一出欺罔朝廷之威福柄令持於其手官吏之廢置用舍出於其口監司帥守而下事憲也如父兄而憲之頥指氣役之也如奴𨽻縣官財用聽其取與內之府庫金帛轉輸萬里外之生靈膏血漁斂百端傾之於憲如委諸壑出沒吞吐神鬼莫見而一切不㑹於有司興靈之役憲首違戒約避㑹師之期乃頓兵以城蘭州遺患今日及永洛之圍憲又逗留不急赴援使數十萬衆肝腦塗地罪盈惡貫不失於總兵一路此國法不正者二也宋用臣奮其私智以事誅求𣙜奪小民衣食之路瑣細毫末無所不為使盛朝之政幾甚於弊唐除陌間架搨地之事傷汙國體不恤怨讟其出入將命捷若風火務以巧中取恱事無不諧動畫密旨故擅作威福侵淩官司冒昧貨財更無案籍都城為之憔悴啇旅所以不行瘡痍蠧害至今棼然而莫能理然亦不失享祿於善地此國法不正者三也石得一領皇城司夫皇城司之有探邏也本欲知軍事之機密與夫人奸惡之隱匿者而得一以殘刻之資為羅織之事縱遣伺察者所在棊布張穽而設網家至而戶到以無為有以虛為實上之朝士大夫下之富家小人飛語朝上而暮入於狴犴矣有司無古人持平守正之心以謂是詔獄也成之則有功反之則有罪故淩辱箠訊慘毒備至無所求而不得無所問而不承被其隂害不可勝數於是上下之人其情惴惴朝夕不敢自保而相顧以目者殆十年皆得一發之今不失厚俸安坐此國法不正者四也是四人者權勢鋒㷔震灼中外毒流於民怨歸於國宰相執政知而不以告于上諫官御史懼而不敢論其非幸而出於聖人在上之時以先帝神武英氣鎮壓其奸不然其為祻患豈不若漢唐之宦官哉以堯之聖不免四凶之在朝至舜起而後誅投之孔子為魯司寇七日而誅少正卯先帝未及肆其誅於市朝而以遺陛下陛下所宜以舜之事自任今閲嵗時尚未聞以典刑詔有司臣未諭也伏乞聖慈以臣章付外議正四罪暴之天下而竄殛之以明國憲以服天下謹具彈劾以聞摯又劾太原擅興疏曰右臣竊以國家之患莫大於發政行令而人敢違人臣之罪莫大於邀功罔上而為國生事記曰不從令者死於律擅興千人者誅蓋自古失御臣之道使其淩上召亂而後患有不勝言者多必繇此然則法令不可不嚴而人主不可不察也臣伏覩去年三月六日陛下登極赦書莭文應緣邊州郡仰長吏巡檢使臣鈐轄兵士及邊上人戶不得侵擾外界靜守疆埸勿令搔擾命令既下邊境之上風塵頓息蕃夷之情感服內靣當此之時知太原府吕惠卿輒於四月中旬被受赦敕之後連遣部將折克行訾虎相次以數萬人入西界討蕩所得首級皆是淺邉老弱虛夸以為功而官軍人騎死傷甚衆未幾西人復仇以五月犯塞疆臣戰沒士卒陷亡臣以謂勞師動衆奏功不實以至搆怨邊隅猶皆未足論也而其公違詔敕擅出師旅實無人臣之禮則其罪不可以不治臣謹按惠卿遭遇㬥起初不以道幸嘗備位執政不深惟大義報國乃欲造非常之功圖再進用且邉陲本自無事又陛下新即位銜恤慎始豈遑用武故上循祖宗以來踐阼故事加惠邉鄙禁相侵擾丁寧戒諭所以休息軍民慰安夷夏詔號宣布明若日月可謂至恩盛德人情孰不欣戴而惠卿以前兩府居帥守之任所宜與國家同休戚將順聖意以鎮方靣乃敢用貪功幸進之志為此亂階夫違棄制詔虧臣子之道其罪一也當陛下諒隂之中謀動干戈其罪二也受神宗遺詔未逾月而忘哀疚之情覬幸功賞為大不忠其罪三也致新天子命令失信於四夷其罪四也開邊隅之隙至今警備未得安靖其罪五也夫惠卿天下知其為奸人也方命擅兵天下之大惡臣恐防微杜漸朝廷不當涵飬而不慮也昔漢之王恢欲徼一時之幸於胸奴故建馬邑之役孝武許之是恢奉詔以從事也然終以謀出於恢故下恢吏不赦使自殺馮奉世使外域以便宜擊莎車立功萬里終以擅命不侯蓋古之御人慎兵法義如此若惠卿則非如恢之請命也又非如奉世之止於擅命也被新詔後敕禁約甚明而廢格不顧是叛命者也方陛下嗣政之始以威福信義懷寧天下之時而第一命令為強悍之臣叛違而不從若朝廷無所誅詰上下不敢誰何臣知陛下異日有大政號將不足以令天下而信四夷奸臣之逆命心輕國憲者將接迹而動矣臣位中執法職在糾治奸慝伏請以臣章付外議正惠卿罪狀考古之義依律處分以伸大公之法為奸雄之戒謹具彈劾以聞摯再劾蔡確疏曰臣聞周書君陳曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德此言人臣之義有善則稱其君雖謀出於已亦必曰吾君之德者上下相成忠厚之至也伏見宰臣蔡確辭位求退其所上表無引咎之意有論功之言自陛下臨御以來美政盛事民所歌頌者確皆鋪列條叙以為已功中外傳之靡不怪笑夫收拔耆舊之臣置諸左右乃陛下至明獨見以天下公望用之而確乃以為已之所引罷去有司漁利剝下苛細之法而絀逐汚吏乃陛下仁心惠德以蘇疲民而確又以為已之所請至於申戒邊埸不使生事分遣使者求民疾苦修法令以完先朝之政包同異以行大公之道此中外皆知出於陛下聖謀睿慮實新政之甚善者而確乃一切認之掠為已事貪天之功欺示天下其意謂此數者陛下不能知之因已請而知之陛下不能行之因已請而行之其於輕慢君父欺罔臣庶違道干譽至於如此凡確之所引數事者確果曽有所建請乎蓋不可知也確在言路為執政前後久矣不言之於先朝而言之於今日此何意也果有建請固大臣職爾如君陳之歸美於上可也而叙于求退之表又何意也夫不言之于先帝此不忠之罪也言之于今日此取容之計也叙之於表謂我有功則是陽為求去實欲陛下疑以為功而留之因欲求免於公議此持上罔下之謀也古之人有言於上退則削其藁不欲使人知善之出於己所以推逺權焰避掠美干名之譏不知此則何足以為大臣乎確無禮不恭朋邪懷二無廉恥之莭昧進退之義又自去冬大旱至今確為上相身任其責其罪惡之著無補朝廷今既逼於公論不得已而求去正當痛自咎責踧踖傴僂為懇切必退之詞乃大臣去就之體今確誇功揚已露行行不平之氣為臣如此不謂之大奸大邪則可乎伏望以確表并臣此章付之三省議確之惡重行竄逐以正典憲使天下為人臣者知事上之道摯又論蔡確十罪疏曰右臣近具狀乞罷宰臣蔡確至今未蒙施行緣臣備員御史以觸邪指佞為職今宰臣奸險有犯公議臣若失職誰敢言者伏見祖宗以來所用相臣考慎選擇必取天下有德有望之人故內則廟社安外則夷夏畏下則衆庶伏其功名事業照于天下至今稱之未嘗有法獄之吏聚斂之人詭譎之才陰賊之行天下所嫉而使在相位如確者也臣所以不避再三干冒天聽確之當去其罪非一公違陛下敕命不赴神宗發引內宿為大不恭其當去一也山陵使回明有歷代及國朝故事而略不引罷廢禮貪位其當去者二也皇帝陛下之立乃天人之所助而太皇太后之德也確輒自稱定策貪天之功其當去者三也在中書二年不將差除與三省合奏及身遷門下隂使言者申請招權營私其當去者四也其弟犯法蹇周輔承勘兩次皆滅裂平治其事故今日周輔父子有罪言路纍有彈奏而確力主之不罷其任屈公法報私恩其當去者五也執政臣寮已經覃恩遷轉無故又進一官妄引嘉祐治平不可用之故事欺謾聖聽不顧廉恥其當去者六也與章惇死黨相結一柔一剛一合一離欲以銷磨同列牽制善政中外皆知其術其當去者七也自去年十月至今並無雨雪驕陽肆虐天下大旱民情惶惶實由確奸邪所召況位居上相正任其責其當去者八也確在熙寧元豐間鍛錬寃獄排逐善良引薦奸僞變更祖宗政令以誅求民財確在言路在司農在執政首尾身任其事見法令未便何嘗聞有一言論列裨補惟是阿諛護持以謀進用及至今日自見其非乃稍稍語於人曰在當時豈敢言也此確之意欲於今日固其名位故反將歸曲先帝是可謂大不忠矣朝廷以髙爵重祿尊飬輔臣欲何用哉豈有可言而不言也假如言之而不聽當以死繼之假如畏懼而不敢言則當辭事而去乃臣子之常分也當時詭隨及時移事改方為自全之計而賣過歸咎是可謂大不忠矣事先帝不忠則安肯盡忠於陛下也哉此其罪惡尤大其當去者九也近者奉使山陵回隨行屬官故事自皆推恩而確乃特薦髙遵惠張璡韓宗文乞從優恩上欲以恱聖意旁欲以餌同列賴陛下至聖至公照其狡計而議遂不行中外聞之莫不欣快陛下觀此用心則確之邪正不難知也此一事尤喧物論而罪尤大者其當去者十也確之罪惡如此羣議沸騰臣愚區區之言略已自竭而聖度包容一切不以為意在聖慈不失恩於確則可也其如朝廷之輕重天下之安危生民之祻福人情之去就在確之罷不罷爾則所繫豈不大也今忠臣義士當盛明之時人人皆願自效而確猶在位誰敢明目張膽盡心於朝廷哉正人不得立則陛下之善政不得行天下之敝法不得改今大旱纍月燥風慘日自冬入春宿麥已槁疾疫將作內外之情驚惶不安皆由大奸在朝廷天示譴告伏望聖慈深察事勢以天下為念早發聖斷罷確職任使之外補以答天變以召和氣以慰公議以新改元之政天下幸甚摯又劾河北漕臣論河事反覆疏曰臣竊以天下至廣非朝廷視聽之所能及故分建監司以寄耳目凡一方利害休戚唯監司之言是聽也使監司皆忠慎不欺則其言可信一有誕謾輕易邀功徇私之論則朝廷將受其罔而下將有受其祻者矣伏見河北轉運司昨者妄建河議欲為迎陽故道之役以奪大吳新河之勢乞許一靣經畫謂如此則新河下流數十州縣盡免水患叙述果敢其言藹如也及聞朝廷遣使按視而本司遽復變而為孫村之說欲便施工今春了畢既而使者到部情見理得於是李南公范子竒翻然又盡以前所議為非其略曰故道隄岸盡已坼去靈平掃岸深占河身上下扼束必為大患又曰迎陽下瞰京師孫村水勢不順兩處回河事莭委實不便臣按南公等正月十八日狀稱今來躬親相視乃是前此纍作奏請之時都未嘗親至河上而遽以非常之利害不資之勞費輒爾上聞欲以僥幸有成設使萬一朝廷以監司之言為可信而過聽其計豈不誤大事歟夫臣子之分建䇿進說茍其志在陳獻利便則後遂有當否固無足深咎者然如南公等身任職司其言為朝廷所信今日河事又在所部咫尺之近固宜考見底裏然後為言而乃慣習欺罔妄圗功利及見朝廷選遣近臣知其必究事實自以前議莽鹵恐得罪咎故不待使者同行閲視之畢本司已自奏陳公然反覆輕侮君父轉大議是非如反掌視一方安危如兒戲夫事上之道唯恭與誠故書馬不足古人猶憂其譴死上書不實敕律明坐以大罪南公等前之言乃出於輕發妄作非恭慎也後之奏乃欲以奸計求免非忠實也不有顯絀何以申明典憲少戒欺謾反覆奸僞之人伏望指揮正南公等罪狀特賜竄謫庶協羣議謹具彈劾以聞摯又劾章惇疏曰右臣竊以傳曰有德進則朝廷尊又曰仁者宜在髙位不仁而在髙位是播其惡於衆也伏見知樞密院事章惇資性佻薄素無行檢廟堂議政無大臣之體專以驕强輕肆作俳謔之語以􅓸侮同列誇示左右其語播于都下散及四逺傳以為笑比來聖旨增損政令之未完善者惇則必出異意沮持其事方宋用臣驕橫不法惇在政府而與之厚善納其所遺酒醪雖更赦宥臣以謂大臣不廉犯大義之責不當如小臣論赦令前後也謹按惇夤緣遭遇幸得備位近輔不深惟朝廷高爵厚祿稍自矜重以道義圗報而淩轢諧戲不可謂德閉善害政不可謂仁而交非其人又從而以貨取之可謂無廉隅矣可謂播其惡於衆矣方且揚揚髙步人皆指而議之殆非所以尊朝廷厲羣下也伏請聖斷罷惇政事以見公論摯又劾黃隱疏曰臣伏以國之教化出于學校學之廢興蓋繇師長故聖人既建庠序必立之官茍非博通經術而有德行者則不能使學士誠服而心悅之祖宗以來莫不慎其選任而仁宗慶歷中最號得人如胡瑗孫復石介實為之首育材之效後世有考焉神宗崇儒重道大建學制訓發經典以幸多士恩施甚厚今在學學者衆多與古爭盛而師儒之位豈可以非其人伏見國子司業黃隱學不足以教人行不足以服衆於學之政令唯考校課試遷補職掌最繫奬勸不可不公而隱違法徇私事皆有狀以致大喧物論多於生員試卷之末立詞說出榜以示衆變棄義理疑惑學者陰附權要奬進浮薄故使學衆不伏怨情訩訩至有騰為嘲謗之詞者議者謂近時學官之肆為私枉無若隱之甚者按隱本無術業使在此官非其所長恐不足以表率士類奉宣教法無以稱陛下首善造士之意伏請罷隱職任除一外官以安學者故相王安石經訓經旨視諸家義說得先儒之意亦多故先帝以其書立之於學以啓迪多士而安石晚年溺於字說釋典是以近制禁學者毋習此二者而已至其所頒經義蓋與先儒之說並行而兼存未嘗禁也隱猥見安石政事多已更改輒爾妄意迎合𫝊會欲盡廢安石之學每見生員試卷引用隱輒排斥其說此學者所以疑惑而怨之深也夫安石相業雖有間然至於經術學誼有天下公論在豈隱之所能知也朝廷既立其書又禁學者之習此何理哉伏望速賜罷隱以允清議以一風俗右司諫王覿奏乞責降蔡確疏曰臣等伏見軍器少監蔡碩盜用官錢乞取貨賂計贓共及萬緡論法當坐極典碩前宰相確之親弟也初碩奏以錢二十萬緡計置軍器物料仍乞從本監舉官分領其事乃是碩之措意本欲與其私黨共為奸利事下工部勘當工部乞吏部選官確方執國政不用工部之議而徇碩之本謀欺罔聖聰頒降朝旨特依本監所請舉官碩乃得引用竇長裕劉仲昕付之官錢同為侵盜遂至贓汚狼籍夫宰相者正身齊家以表儀百官進善退惡以佐佑天子者也確不能防間其弟使不犯法已是罪人而況廢省部之申陳假朝廷之號令使碩得自引私黨濟其奸謀此而恕之孰不可忍確今以觀文殿大學士守輔郡有玷名器伏望聖慈特行貶黜以慰公議貼黃臣等本欲候朝廷斷蔡碩之後論確罪狀今竊聞蔡碩案已具多日確不從工部之議而使碩得引用私黨以成其奸見於奏牘事理已明則確之罪狀不待斷碩之後而可見也伏望聖慈詳酌早賜施行覿又風聞朝廷欲下詔書以安邪黨乞行寢罷疏曰臣風聞外議謂朝廷以近者放黜一二大奸十數巨蠧恐人情之不安將降詔書以安之又將戒言事官凡臣寮舊惡不得復言臣固未詳虛實誠出於此恐四方有識之士輕議朝廷也夫人君之聖得如虞舜則無以過矣然舜之御羣臣乃在於黜陟幽明而天下咸服當是時不聞人情不安而亦不聞有詔書以安其黨類也人臣之賢得如孔子則亦無以過矣然孔子之為魯司冦攝行相事七日誅少正卯而魯國治當是時不聞人情不安而亦不聞有命令以悅其朋黨也蓋人君之所以御下者黜陟二柄而已陟一善而天下之為善者勸黜一惡而天下之為惡者懼則是黜陟之效也豈以其為惡者懼而朝廷亦為之懼哉惟至於誅叛臣伐叛國而以其脅從者多汙俗既衆則必下惟新之詔施曠蕩之恩而一洗之茍不至於此則何疑而降詔乎伏自陛下臨政以來開廣言路黜幽陟明公議莫不以為宜人情莫不以為恱所逐一二大奸十數巨蠧其門人故吏皆與其人比肩事主者誰肯甘心以黨與自名不過中心愧懼而不敢襲故態以為惡而已是乃朝廷黜陟之效見於此矣遽然下詔臣切駭之若臣寮之舊惡使言事者皆不得言尤非臣之所諭也且惡有顯晦罪有輕重若陛下聖意必欲安邪黨之心則凡人之曖昧之惡詿誤之罪言事者及之則寢而不報可也如惡之昔晦者由衆言而既明罪之甚大者因進用而已著置於君側則欺君委以事權則敗事彼言事者方且遵奉詔旨默而不言則果朝廷之福乎居言責而稍知職分者尚可以安其職乎臣伏望陛下斷自聖心如大臣之論果有以詔書為請使熟議焉可止也或詔書已成願陛下留中而勿出乃天下之幸也干冒睿聽臣無任戰汗之至貼黃言事臣寮言人之不善小則結怨於終身大則為仇於纍世豈所欲哉但以既居其職不敢上負朝廷以廢職事如果有詔書杜言者之口則以不得言責為恥者漸當引去緘默不言者充位而已則臣恐陛下之憂不在邪黨之不安而在邪黨之日熾也臣竊為朝廷惜之惟聖慈詳酌覿又論執政張璪疏曰臣伏覩今月八日詔書蕩滌隱疵濶略細故以開詿誤自新之路天下幸甚然臣竊觀自古仁聖之君莫過於堯舜而堯之為治其大要乃在於哲而惠也舜之為治其先務乃在於難任人也惟其哲而惠故巧言令色不得騁其私惟其難任人故懷奸挾詐者不得遂其惡於是堯乃得以致黎民懷之而舜乃得以致蠻夷率服也伏惟皇帝陛下太皇太后陛下臨政以來登進忠賢放黜奸惡可謂哲而惠矣可謂難任人矣惟能不倦以終之則黎民懷之豈減於堯而蠻夷率服何愧於舜哉今者下寬大之詔推曠蕩之恩凡有誤先帝任使之人一切不問者聖意蓋以謂罪顯惡巨者皆已去矣彼隱疵細故猶治焉則非所以包荒含垢之義也故渙然施惠而一洗之以慰安羣衆之心臣雖至愚尚復何疑而過計議論以蹈羣衆怨怒之機乎臣但見詔與事違名與實異人情之所共駭故不敢默默為取容之計今復為陛下一論之詔曰罪顯者已正惡巨者已斥陛下亦嘗深察乎罪顯者果已皆正耶惡巨者果已皆斥耶若猶未也則民之具瞻何可欺世之公論何可誣也彼碌碌一官不當權要罪顯而未正惡巨而未斥者固不足算而廟堂之上執政之間陛下日與之謀謨可否天下之幾政者猶有其人焉張璪是也故詔下以來智識之士莫不惋憤嘆息以謂罪顯惡巨之人方在君側而謂之罪已正惡已斥則欺罔蔽惑之患可從而知矣雖在畎畝猶當疾首蹙額而為朝廷憂況如臣者待罪言責為陛下耳目之官乃忍鉗口結舌而安處乎彼張璪之奸邪欺罔臣自今年二月以來纍有封事具陳其狀并竊聞言事臣寮論列者非一陛下不惟置而不察方且明詔中外以既無罪顯惡巨之人而餘皆一切不問矣璪得乘此以自負而膠固其邪黨臣恐自今以往邪黨無射隼之憂而朝廷有飬虎之患也不唯如是而已且使天下有以窺蠧朝廷以謂左右大臣罪顯惡巨如張璪而陛下猶不知之則四方萬里之逺百官羣吏之衆何以廣覽兼聽而坐照其奸邪臣竊以謂陛下不去璪無以解天下之惑無以破羣邪之黨無以隆朝廷之勢也惟聖慈深察而詳擇焉天下幸甚冒瀆睿聽臣無任戰汗之至覿又論蔡確韓縝等居中罔上劄子曰臣向者嘗有封事論吕惠卿在太原違赦出兵等事已䝉朝廷施行在惠卿罪惡固自不一然惟是違赦出兵於國家安危治亂所繫尤重臣於前疏已嘗乞兼治經歷官司之罪是時臣以所聞出兵本末未甚詳悉故未敢繼有論列今竊聞去年二月二十七日劄子三省樞密院同奉聖旨令陕西河東經略制置使司各選差近上冬官統制沿邊將副兵馬若敵馬近邊屯聚審度敵勢擇利施行臣契勘去年二月二十七日正是神宗違豫多日人情憂恐之時不審三省樞密院如何得同奉聖旨擇利用兵三月十六日劄子檢㑹去年二月指揮春耕是時令陕西河東逐路經略司選擇將官差兵馬三五千人忽往倐來覓便討殺三省樞密院同奉聖旨所有將兵使臣兵馬並須斟酌敵衆數目不須拘以三五千人相度多少將帶前去痛行討殺臣今契勘三月十六日正是神宗上仙二十七日聖情悲哀之時不審三省樞密院如何同奉聖旨用兵討殺伏緣其時三省樞密院臣寮七人內蔡確韓縝章惇張璪四人皆惠卿之死黨惠卿雖在外欲有所為則四人者合謀一意而莫之逆也其餘備員固寵之人安能獨正其事哉蓋去年春間四人者專秉國政惠卿乘此時隂有所求無不如欲於二月二十七日既降擇利用兵指揮又於三月十六日復降不拘三五千人指揮惠卿乃得出兵二萬餘衆深入西界其意不過欲偶有微功則黨人可以援引而庶幾復至於大用而已非四人者居中用事敢為欺罔同惡相濟則其肆意妄為豈至於是哉故前項兩次朝旨遍下河東陕西諸帥而惟惠卿敢於此時大出師旅者恃其與執政大臣隂相為謀而無所畏忌也若確縝惇等至今尚在廟堂與璪盡得騁其凶德則何所為而不可哉賴宗廟社稷之靈陛下奮發英斷罷確縝惇政事而置之外郡矣惟璪尚當重任陛下若不速去璪使得漸為奸黨之地則臣恐確縝惇璪內外交搆之患不止如前日與惠卿廢赦用兵之事而已惟聖慈詳酌貼黃去年二月二十七日三月十六日三省樞密院取聖旨因依陛下必能記憶也大凡指撝邊帥用兵國之大事安危所係也奏陳之際豈容草草元豐七年神考當國家無事之時其時耕耰之兵尚限以三五千人今更不拘以數者蓋惠卿欲之而已彼確縝惇璪委天下安危之計而徇其私黨豈以國事為恤哉況計其出兵既多則其為大事又可知矣若其時三省樞密院奏陳之際不為大事而僅同細務則璪等欺罔之情狀可見也覿又乞再誅竄吕惠卿疏曰臣等伏見近降朝旨以臣寮上言吕惠卿罪惡責授惠卿中散大夫守光祿卿分司南京竊以執鯨鯢於漏網稍正邦刑蓄虎豹於近郊終貽後患謹按惠卿在熙寧中恣行不義創立弊法上以詿誤朝廷下以賊害海內詐窮力詘黜居藩郡猶復妄希功賞輕用甲兵結怨西戎胎憂先帝罪狀顯白已不容誅至於私行險詖人所不為始與安石結刎頸之義終與王氏為尋戈之仇忠信蔑然詭變難測今雖自知罪大不容於世然猶詐稱疾病潜伺間隙譬如蝮蛇猛獸雖暫爾弭伏而凶性終在遇便即發若不深為圈檻投畀無人之境臣等恐其防間稍緩竊出害人不然臣等豈不知降四官落一職為分司官在於常人豈為輕典乎蓋以堯之四凶魯之少卯既非常人不當復用常法治也況復皇帝陛下即位之初明降赦書戒敕邊吏不得侵擾外界務要靜守疆埸是時惠卿任河東帥被遇先帝恩德最深自聞遺制略無哀戚日夜㸃集兵馬為入界討蕩之計及其遷延未發恐為敵所覺知遂令兵馬司借赦書不得侵擾之文曉諭將佐以􅍁敵計仍於四月十五日具奏上件事由於二十一日出界夫登極赦書國之大信所以綏靖中國懷來四夷人臣奉行敢有輕議今惠卿公然違戾出師伐國而又借用其文設詐欺敵侮玩朝廷殊無忌憚推其心則出於無君論其罪則入於大不敬積其前後所犯皆在不赦朝廷縱欲貸而不誅只乞檢臣等前奏投之四裔以禦魑魅臣等與惠卿初無仇怨但以為國去凶義不可已惟陛下特賜裁斷覿又論責授武昌軍節度副使潭州安置章惇隂邪慘酷竊㺯威柄乞行顯戮疏曰臣聞滔天圯族治世之所必誅亂政虐威聖人之所不赦豈容凶德久汚明時近者特進章惇責授武昌軍節度副使潭州安置臣伏讀録黃臣寮上言及制命大槩謂惇為性殘刻每晨朝奏事凡陳開道之言無非殺伐之事公然不顧敕牒以己之平昔仇怨故託謗訕宗廟或稱謀危上躬竄斥南荒投之死地編類章疏看詳訴理受祻者一千餘家拔擢門下小人布列內外以隂邪慘酷更相唱和造作危獄竊㺯威柄由惇凶殘有司觀望凡士民曖昧語言加以釘手足剝皮膚斬頸拔舌之刑至於道路以目不敢偶語並行有悮聖時有傷和氣遂致連年水旱灾變百姓饑死者數十萬計自古奸臣少惇比者臣竊謂惇之罪狀固難具述但以録黃所列豈在歡鯀之下夫盜天刑而報私怨是欺天也凡陳開道之言無非殺伐之事是迷國也造作危獄竊㺯威柄是無君也公然不顧敕牒是不臣也凡士民曖昧之言加以釘手足剝皮膚斬頸拔舌之刑是豺狼也安有欺天迷國無君不臣豺狼之人而可特屈常刑待以輕典何以謝銜寃而死者何以慰天下之望昔堯以四凶遺舜所以成帝舜之大功先朝以凶惇遺陛下之英斷陛下聖德寬大每務含容雖欲恕其顯戮亦當投之四裔以為萬世之戒豈宜置之善地久鬱群情伏望聖慈早賜詳酌施行覿又奏為乞出林希外任事疏曰臣竊聞起居郎林希召試中書希雖薄有文藝素號憸巧當王圭用事之際希諂奉之無所不至與其不肖子弟日相親昵及韓縝作相希復為其鷹犬今中書侍郎張璪傾邪著聞士人之稍重者莫不恥逰其門而希與之深相交結不畏譏議何可使代言禁掖入侍近班兼聞希已有乞免召試伏望聖慈指撝除希一外任差遣所重朝廷名器不濫邪正有别覿又乞與刑部郎中王振逺小差遣候敕旨事疏曰臣近有封事言刑部郎中大理少卿王振憸巧刻深最為楊汲崔台符所愛信汲台符鍛錬之獄多振力也當與汲台符同黜安可復用尋又聞言事臣寮彈振者頗多朝廷雖已罷振少卿而仍舊以振為刑部郎中臣竊謂郎官當選才望刑部須用明慎之人振何足以當此方其初入刑曹朝廷既不知其宿奸言者亦未㬥其隱慝振得僥幸少安無足深駭今衆論交攻大惡已著尚安可汚辱文昌蕪穢憲部伏望聖慈特降指撝出振外任一逺小差遣以慰物論歷代名臣奏議卷一百七十九
