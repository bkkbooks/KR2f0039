body:
  text: 歴代名臣奏議卷三百六明楊士竒等撰灾祥宋髙宗紹興六年地震秘書正字張嵲上奏曰比年以來賦斂繁重征求百出流移者擠溝壑土著者失常業地震之異殆或為此願深思變異之由修政之闕致民之安黄次山上奏曰臣聞日食地震陽㣲隂盛也隂盛則静者動陽㣲則明者晻推類言之則妻者夫之隂也子者父之隂也四夷者中國之隂也小人者君子之隂也陛下春秋富盛嬪嬙稀簡幃幄之私行義未過二年之間大異重至意者四裔伺隙而君子小人之際尚煩聖慮乎今承板蕩之餘履顛沛之勢財不足自富兵不足自强天下喁喁未絶望於中興者徒以陛下克己自强大臣同心事國悔過求言而善類稍進也近日士論頗謂朝廷甘受佞人而外欽正士聲音之拒禮貌之衰有得之於言意之表者此非陛下之福也自古求治之君當軸之臣夫豈惡治安而樂危殆薄君子而厚小人然多不免焉者何也君子難親小人易狎也願陛下以父兄為意大臣為人主受言厲諤諤之風恢蕩蕩之德逺浮諂近端方搢紳之間衆不可蓋其有公忠自奮敢獻異同不可狎而親者宜隆寛褒直俾充本朝不宜盡聽其求髙舉逺引不留自助也人主父天母地子養元元父虧明母震動子訛言相恐古人猶懼況食於三朝震其國都元元飢餓自相魚肉而不思消伏之計乎惟陛下奮乾剛之威大臣擴包荒之度㧞進英俊以强本朝此抑隂崇陽應變之至權也震食之異庶幾可銷標季之運庶幾可復兵革之憂庶幾可弭陛下召臣千里誠冀有補萬分廢承天之至言指米鹽之細故末殺災異熒惑聖聦則非臣之忠也故不敢不盡愚衷江西安撫制置大使李綱以地震應詔條陳八事狀曰臣伏覩近降詔書以地震求言雖芻蕘之㣲亦得上達況臣嘗備近司荷恩隆厚受知特深茍有所見其敢隱黙輒罄狂瞽冐塵天聦伏望聖慈特賜睿覽謹條具奏聞一臣聞地道積隂以静為德理不當動動必有變春秋二百四十二年間地震五聖人必謹而書之者志變也漢唐以來或頻年震或一年數震變不虚發其感召之因皆有所自可考而知乃者六月乙巳地震于駐蹕之所陛下克謹天戒降詔求言誠得警懼修省之道然臣聞應天以實不以文天人一道初無殊致唯以至誠可相感格臨變而懼變已則忘有畏天之言無畏天之實皆不足以銷弭變故導迎吉祥凡以無至誠惻怛之意故也夫外患兵革女子小人皆為隂類願陛下致察於數者之間每事致戒則化災為祥何難之有昔成湯遇旱禱于桑林以六事自警而雨澤時至天人之際應若影響不可誣也臣願陛下以應詔上封事者特加省覽其言可採降㫖亟推行之不必加賞夫忠義之士有愛君憂國之心者但以言聽計行為志豈待賞而後勸哉至於草茅疎逺不識忌諱論議激訐亦望容貸以來直言日慎一日不以天地之變為出於偶然如日月之蝕既過則怠於修省此乃所以為應天之實也天下不勝幸甚一臣竊聞諸道塗車駕將有建康之幸既降㫖以趣營繕又具例以勅百司此誠甚盛之舉然日俟一日未聞下戒行之詔豈猶有所疑而未決邪夫建康在東南為形勝之地在今日為不可不駐蹕之所臣嘗條具奏聞屢矣天時地利人事皆當捨臨安而幸建康比者地震不在諸郡而在臨安不在他所而在宫禁此無他天意欲陛下有所遷動避危以趨吉而已夫懐與安實敗名昔公子重耳安於齊子犯謀醉而遣之自齊適秦秦伯納諸晉遂成霸業今陛下久駐蹕臨安躊躇未遷無乃有安之之意邪不然天意何以丁寧告戒之若此此天時之不可不幸建康者一也臨安褊迫偏霸之地非用武之國又有海道不測之虞曷若建康襟帯江湖控引淮浙龍蟠虎踞自古稱為帝王天子之宅此地利之不可不幸建康者二也諸將重兵已皆分屯淮泗陛下時乘六龍躬率六師進臨建康則將士之氣百倍其勇號令賞罰皆出睿斷人人願戰前無堅敵與夫深居而遥制豈可同日而語哉此人事之不可不幸建康者三也臣願陛下斷自宸衷不貳不疑投龜而決早降詔㫖以慰士民之心庶幾中興之運不日可致伏望留神幸察一臣竊觀古之善治兵者必多其將之員數而少給之兵所以為臂指聨屬易相運動之術漢光武之二十八將是也又必重内輕外以為强本弱枝表裏相濟之術唐府衛之兵是也祖宗制兵每將不過五千人其不𨽻將者每指揮不過五百人有事則臨行陣無事則歸營壘此得所謂多將員而少給兵之法盡屯天下重兵於京畿足以制四方州郡之兵又設禁旅拱衛王室此得所謂重内輕外之意海内平定幾二百年靡有兵革職此之故今陛下震皇武以圖恢復之烈盡以重兵分𨽻諸大將多者至十數萬人平居已不能運掉而況於倉卒擾攘之際乎宿衛單弱初無正兵緩急何以衛宸極而禦外侮此臣之所以夙夜寒心者也雖陛下恩信足以結之威德足以服之手撝指顧莫不從令然立國之道當為長久之䇿恐不應如此臣愚伏願陛下常留聖意偏裨中有可用者親加識擢漸付以兵使自成頭項以備緩急驅䇿或収召舊人或選擇將士廣置禁旅更畨宿衛使為天子正兵考漢唐之舊制遵祖宗之成憲稍復前規銷弭後患以早致中興之功天下不勝幸甚一臣聞兵法欲致人而不致於人此猶棊家之争先法耳故善棊者之置子必能制於數路善兵者之禦敵必能禁其四出今諸將大兵列屯淮泗又以宰相督之可謂重矣敵人之勢亦必聚其士卒以抗王師則京西一帶必有力不暇及之處願詔劉光世專事陳蔡岳飛專事唐頴使敵人分兵以拒我則淮泗之力紓使不能分兵則乘間擣虚吾無遺䇿矣今劉光世軍已進合淝而岳飛大軍尚留武昌未進誠恐緩不及事坐困錢糧未見其可伏望聖慈特降詔㫖督促其行庶幾不失機㑹今冬可無衝突之虞願加睿察一臣聞行師用衆糧餉為先雖有堅甲利兵非粟無以戰雖有髙城深池非粟無以守有國有家者無三年之蓄曰不足而況於月支日給乃旋為之計乎去歲旱災之廣綿地數千里穀斗有至千餘錢者常賦損於減放漕計困於轉輸常平義倉匱於賑濟公私枵然皆無儲蓄使今秋復繼之以水旱其何以堪所幸天道佑順雨暘時若遂成有年江浙閩廣悉皆登豐目今米價已減將來穡事告成粒米定須狼戾此誠朝廷廣糴儲蓄之秋也昔趙充國討先零嘗謂塞下糴四十萬斛賊豈敢動哉由是觀之國以兵為命兵以食為天何可少緩夫穀太賤則傷農乘登豐之歲以善價廣糴官有儲蓄而農不告病是行一事而兩利也朝廷近降糴本付轉運司限數収糴固為得䇿然轉運司不過分降諸州諸州不過分降諸縣諸縣不過分配人户强委之直而責其粟則是有和糴之名無和糴之實非計之得也臣愚伏望聖慈特降睿㫖令諸路州郡以轉運司所分糴本專委官吏置塲收糴其初即以善價取之民間量増分數嚴立約束使無邀阻糜費則人户商旅自然樂輸數百萬斛不難辦也始時民間唯患交子恐難行用今朝廷既改交子之法以為關子即與見錢無異自可通行唯官告勅牒須勸誘上户使之入納亦乞令州縣以勸誘到見錢付之糴塲使之收糴庶幾革近年科糴之弊公私兩濟天下不勝幸甚一臣竊見朝廷近年以來委辦州縣或製造器用或收買物色期限太嚴督責太峻州縣官吏不敢申明如期應命但欲塞責而不為長久之計遂使公私皆受其弊而卒無補於實用如福建之剏海舟製造滅裂尋即損壞廣南之置耕牛道里遼逺率多斃踣此皆所費不貲無益於事不可不察也夫創造不精曷若買舟之可久逺致多斃曷若厚價以招來雖有所費蓋不得已如其不然所傷實多方朝廷用兵之際財賦窘迫豈可不計較愛惜而耗蠧於無用之地哉臣愚伏望聖慈特降睿㫖今後朝廷抛降製造収買物色或期限太迫或土産非宜並許州縣申陳利害從長相度以聞朝廷更加審察而施行之庶幾公私兩便無虚費而有實利天下不勝幸甚一臣竊見朝廷前此數年專以退避為䇿亦不責州郡以捍守又降詔㫖許令保據山澤以自固城壁守具率皆不治循習既久往往以修城壁為生事建議官吏反受罪責如連南夫以守泉州城委官體究裴廪以修衡州城重加貶黜州郡望風畏縮無敢復議修城者夫以偷惰茍且之習而重之以朝廷威令其誰敢復冒罪責而建長久之計乎臣恐自此州郡城壁壕塹頽毁湮塞不復修矣今與僭逆之寇壤地相接無數百里之逺而㳂江表裏數十州郡朝廷所恃以為籓籬者蕩無城池可恃以守卒然敵騎驚近邊摩封疆不知何以禦之此臣之所不能曉也臣愚伏望聖慈特降睿察令朝廷熟議如捍禦之計非城池不可即乞降㫖明告中外以昨來罪責官吏自縁騷擾非以修城之故應㳂江州郡侯今冬農隙許之漸次修築城池建置樓櫓之類朝廷特與應副庶幾自保之計既備進討之䇿可行天下不勝幸甚一臣竊覩近降指揮禪林僧徒貧病不能貼納者先以常住代支續令拘收還納自非出自聖慈曲加矜恤何以及此然臣竊謂僧徒中有財利者多是律僧營生與俗無異雖重取之何所不可其禪林中僧真實學道之人一缾一鉢隨時粥飯往往無餘今使之貼納非唯貧病無自而出亦有害其學道之心聖慈既加矜恤許令常住代納固已深慰物情伏望特降指揮委州縣體究實係貧病無可貼納之人令本寺常住代支更不拘收還納庶幾學道之流得以安心浄業此亦仁政之一端也伏乞睿察綱又上奏曰臣聞和氣致祥乖氣致沴天人之際應若影響不可誣也政令和平合於民心天應以福雨暘時若而為豐歲此和氣致祥之符也政令乖戾咈於民心天應以災水旱極備而為凶年此乖氣致沴之符也豐凶之本乃在人主心術朝廷注措之間宗社之安危生靈之休戚繫焉可不懼乎前年江湖閩浙嘗若大旱流移失業殍踣相望陛下軫慮之深不遑暇食親灑宸翰勸誘賑濟其所全活不知其幾千萬人至誠動天報以休應曰雨而雨曰暘而暘歲大豐穰民以安樂自經一稔之後上下恬嬉不復勤恤民隱朝廷意民間之有蓄積百色誅求上供不以實數而以虚額和糴不以本錢而以關子絲蠶未生已督供輸禾穀未秀已催裝發州縣困於轉輸文移急於星火官吏愁歎閭里怨咨感動天心旱災復作江湖淮浙所被甚廣歲且艱食人情驚疑如居風濤洶洶靡定然則陛下欲消弭災異導迎吉祥不必他求但如前日之用心自然感召和氣休應立臻則旱暵必復為豐年矣昔周宣遇災而懼側身脩行欲銷去之而王化復行雲漢之詩是也安知旱暵之災不為中興之資乎願詔朝廷益修政事凡所以賑救民災給足軍食者早正素備無待倉猝取具於臨時也方今强敵慿陵僭竊窺伺屯兵淮滸以為控扼欲進則未能欲退則不可開口待哺於縣官者數十萬人平時運餉已極勞費歲一不稔將何以給之夫今日之患欲民力寛則軍食闕矣欲軍儲裕則民財匱矣二者如鐵炭之低昻此首重則彼尾輕非有術以權之使斂不及民而軍食足不可得而均也孟子曰無政事則財用不足今屯兵之數不多於前時而養兵之費十倍於往日死生去來無籍可稽上功行賞無實可考轉資遷秩者動以萬計廩禄之費又不知其幾何也開端者不可復斂放行者不可復收日益月加無時而已天地之生財有時人力之理財有限而度量不立於其間養兵之費有増無減坐致耗屈竭取於民謂之有政事可乎此臣之所以日夜為陛下寒心者也夫政事立然後財用足財用足然後軍食給軍食給然後民力寛民力寛然後天心格天心格然後和氣可召而為豐年此臣所以願陛下救今日之弊以修政事為先也臣仰察天時俯揆人事今日誠為危急存亡之秋惟陛下念宗社生靈之重圖為善後長久之䇿留神邦本天下幸甚臣以衰病屢乞閒散將歸山林不勝憂國之情輙復自竭陳其大畧以瀆天聽如聖心尚有所疑願賜清問得以展盡底藴為陛下詳言之誓罄狂瞽仰酬大恩髙宗時左正言鄧肅上奏曰臣伏觀十三日赤氛夜起横貫斗柄士夫驚嘆莫知所自況職在言路者又當如何竊考自古天變人主所以謝之者不過避正殿減常膳而已陛下自登寶位未嘗輒居正殿而飲食菲薄幾同臣下其所以事天者蓋亦無所不至矣而天變若未息焉其故何也蓋嘗考康定元年春三月京師大風晝冥經刻是夜東南有黒氣横亘數丈赤兵氣也黒殺氣也用兵之時豈免兵氣廼於殺氣則為變尤大矣然仁宗之時則朝廷無事人物繁庶其致治之道過於成康是果天變不足慮乎蓋仁宗皇帝應天以實而不以文此天變所以不能為災也陛下切切願治之心固無愧於祖宗矣然風俗頽壊為日滋久雖欲正之不能遽革故今日綱紀未肅賞罰未信叛臣未去姦贓未滅比之仁廟猶有愧焉此臣愚所以痛心疾首而不能自已也臣愚欲望陛下下責己之詔來切直之言號令必行無使壅遏所以肅綱紀功過並録以稽邪正所以信賞罰按偽籍以考張楚之臣不使輒居侍從臺諫則叛臣逺矣驗刑書以責貪汚之吏不使分布内外要職則姦贓滅矣如是則陛下應天之實亦無愧於仁廟雖有殺氣亦不害四十餘年平治況止於兵氣而已耶蓋天心不逺人心是已有德於人則無愧於天不必於人心之外更求天也五季之末康澄嘗有言曰為國家者有不足懼者五有深可畏者六隂陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼賢人藏匿深可畏四民遷業深可畏上下相循深可畏㢘恥道䘮深可畏毁譽亂真深可畏直言蔑聞深可畏蓋天變不常所以戒人君倘能自慎何足懼耶人事不修所以兆禍亂茍不知戒斯不亦可畏哉陛下於其所可畏者日加慎焉則所謂不足懼者又何能為陛下累乎惟陛下察之陳長方代人上殿劄子曰臣觀自古中興之君未嘗不有災祥以警戒之豈天之獨私於是耶蓋亦愛之深耳在商髙宗則有鼎雉之異在周宣王則有旱暵之虐然二君遇災修省故其功德由是以興恭惟陛下念雨澤愆期至誠惻怛形于詔令下至閭巷垂髫戴白之民莫不歌詠盛德謂陛下焦勞閔雨之心商宗周宣蔑有加矣然而方今斗米不啻千錢尚且踊貴未已萬一雨至後時饑饉之患有所不免流離之民聚為盜賊勢不得不慮臣愚欲望先勅有司經畫邦計逆為之備使儲蓄素定無至乏絶近降詔書之外凡一毫末未便於民者並令罷去以成陛下中興之政雖聖心焦勞格于上下必無雨澤後時之患臣妄言之蓋亦為國先慮不勝區區而已監察御史龔茂良應詔上奏曰水至隂也其占為女寵為嬖佞為小人専制崇觀政和小人道長内則憸腐竊弄外則姦回充斥於是京城大水以至金人犯闕今進退一人施行一事命由中出人心譁然指為此軰臣願先去腹心之疾然後政事闕失可次第言矣樞宻檢正尤袤上奏曰天地之氣宣通則和壅遏則乖人心舒暢則恱抑欝則憤催科峻急而農民怨關征苛察而商旅怨差注留滯而士大夫有失職之怨廩給朘削而士卒有不足之怨奏讞不時報而久繫囚者怨幽枉不獲伸而負累者怨强暴殺人多特貸命使已死者怨有司買納不即酬價負販者怨人心抑欝所以感傷天和者豈特一事而已方今救荒之䇿莫急於勸分輸納既多朝廷吝於推賞乞詔有司檢舉行之髙宗以彗星見詔求直言吏部侍郎晏敦復上奏曰昔康澄以賢士藏匿四民遷業上下相徇㢘恥道消毁譽亂真直言不聞為深可畏臣嘗即其言考已然之事多本於近習及姦邪以巧佞轉移人主之意其惡直醜正則能使賢士藏匿其造為事端則能使四民遷業其委曲彌縫則能使上下相徇其假寵竊權簧鼓流俗則能使㢘耻道消其誣人功罪則能使毁譽亂真其壅蔽聦明則能使直言不聞臣願防㣲杜漸以助應天之實起居郎胡寅上奏曰臣竊以雨暘順序係乎政事故漢明親決寃獄則甘雨應期東海殺一孝婦則三年大旱此其大畧也不修人事而祈禱求福非聖人之道先王之政也宣諭官以敷君德求民瘼為職乃以龍母五子求加封爵其陋甚矣又況封為夫人爵稱侯伯施之於人然後相稱龍母五子夫何物哉舍彼介鱗襲我冠裳無乃反常失禮為後世笑乎伏望聖斷特賜寢罷仍降指揮監司郡縣當以愛民為急若政平訟理民無愁嘆和氣所召必有豐年更不得陳乞廟額崇修淫祀以為不先勤民獨致力於神者之戒所有龍母五子封爵詞命臣未敢撰行孝宗隆興中起居郎胡銓應詔上奏曰臣聞位卑而言髙罪也立乎人之本朝而道不行耻也臣近奉聖㫖以秋陽亢旱飛蝗在野星變數見朕心懼焉意者政令多有所闕賞罰或至不當朕雖側身求應以實卿等各思革正積弊勿徇佞私務塞災異之原稱朕寅畏之意臣伏奉聖訓中夜以興思所以對欲遂言之則懼位卑言髙之罪欲嘿而已則又惡立乎人之本朝而道不行之耻退自惟念與其忍耻以生曷若獲罪以死況聖明在上容受狂直萬無獲譴以死之理臣何忌而不言伏讀聖訓曰秋陽亢旱飛蝗在野星變數見朕心懼焉臣有以見陛下遇災而懼畏天戒之切也謹按春秋書不雨書旱夫旱亦不雨奚又書旱得非旱比不雨加甚乎且春秋書旱必於夏秋不雨皆於春冬周之夏秋則建午建未建申皆其月也是時天或不雨則盛炎曝物立致枯槁故詩云旱既太甚赫赫炎炎不雨雖無是酷然甚者亦兼旱焉如文二年自十二月不雨至于秋七月十年十三年自正月不雨至于秋七月是也雖皆歴夏抵秋而不言旱者蓋事起春冬不可書旱已書不雨則不可中變言旱故但提其月而緫言之欲人觀文則知旱居其間且見其災之久也若不為災經自不書故經無書一時不雨者不為災也雖莊三十一年書冬不雨者蓋譏莊公冬不雨猶不恤民力明年春又城小榖也其他不雨必踰時而後書為災之深淺覩文則辨焉云冬十月不雨王正月不雨夏四月不雨六月雨者則見夏無麥而秋猶有救也僖公二年云自十有二月不雨至于秋七月文公二年自正月不雨至于秋七月者文公十年十三年是一歲之望盡失也八月雖雨已後時而無益故畧而不書不為災者但書時莊三十一年為災輕者書首月僖二年三年重者緫始末而言文二年十年十三年書法如此正欲别為災之輕重而傳云不雨不為災夫萬物須雨而生須雨而成一時愆亢猶有所損且不雨有幾彌年者三文公二年十年十三年安可謂不為災乎穀梁謂一時不雨為閔雨歴時不雨為不閔雨且僖公果有志於民則必不愛牲幣懇請禱祈經亦必書如詩之雲漢以著其善今但云不雨則憂民之意於何見乎陛下深閔秋陽亢旱誠得春秋書不雨之㣲㫖然宣王憂旱之誠不過禱于先祖以及山川鬼神蓋祀典之正非若今徼福于佛老氏為異端之教也臣願陛下熟觀春秋不雨之㫖躬行周宣憂旱之誠以應天可也飛蝗在野臣又請以春秋明之謹按魯隱五年書螟釋蟲云蟲食苖心曰螟食葉曰螣食節曰賊食根曰蟊李廵曰食禾心曰螟言其姦冥冥難知也食禾葉者言其假貸無厭故曰螣也食節者言其貪狼故曰賊也食根者言稅取民貨財故曰蟊也孫炎曰皆政貪所致因以為名郭璞以食處為名陸機疏云舊說螟螣賊蟊一種蟲也如言寇賊姦宄内外言之耳㑹義曰穀民之司命也春秋書災異雖螟之為害必詳而録之此亦重民命之至也漢平帝時天下大蝗河南二十餘縣皆被其災獨不入宻縣界建初七年郡國螟傷稼犬牙縁界獨不入中牟今州縣吏貪墨殘民去朝廷逺者萬里近亦數百里陛下不得而見也怨嗟之聲陛下不得而聞也故天出災異自淮以南蝗飛蔽天以告陛下爾守令之間豈無一人如宻縣中牟者乎臣願陛下嚴戒監司守令有貪墨殘民者必罰無赦是應天以實也星變數見臣又請以春秋明之謹案魯文十四年有星孛入于北斗劉向以為君臣亂於朝政令虧於外則上濁三光之精五星嬴縮變色逆行甚則為孛北斗人君象孛星亂臣類也時中國既亂吳楚並侵兵革縱横之應也魯昭十七年有星孛于大辰劉向以為時楚疆宋衛陳鄭皆附之此皆孛彗流炎所及之效也魯哀十三年冬十一月有星孛于東方董仲舒劉向以為其後楚滅陳之應是春秋星變皆以吳楚陵中國也今年正月壬辰其日歲旦風從乾位來風為號令廼號令不時之沴戊午雪隂盛陽㣲之沴三月丙申日有背氣如仰瓦其夜大雨雹癸卯夜月入太㣲己酉日復有背氣丁巳立夏其日風從艮位來五月癸卯夏至風亦從艮位來皆與正月壬辰同占七月丙申太白經天法曰晝見午上星家謂去日四十七度差逺故見臣謂不然易曰日中見斗豈亦謂去日逺也其夜月入氐壬寅夜月掩壘壁陣星又流星出天市癸卯夜月入羽林軍乙巳日左有珥丙午夜流星出天市巴星癸丑夜流星出織女又月犯井丙辰夜流星出輦道此皆春秋之所畏也又如六月庚寅朔日有食之此又變之大者臣謹案隱三年二月己巳日有食之其後戎執天子之使莊二十五年六月辛未朔日有食之宿在畢主邊兵内犯象後狄滅邢衛二十六年十二月癸亥朔日有食之時戎侵曹三十年九月庚午朔日有食之後狄滅邢徐取舒楚滅弦僖五年九月戊申朔日有食之後楚伐鄭狄滅温楚伐黄十二年三月庚午朔日有食之時楚滅黄狄侵衛鄭十五年五月日有食之後秦獲晉侯楚敗徐于婁林文元年二月癸亥日有食之晉滅江楚滅六文十五年六月辛丑朔日有食之楚滅舒蓼宣八年七月甲子日有食之既楚莊遂彊諸夏觀兵周室十年四月丙辰日有食之後楚滅蕭成十七年十二月丁巳朔日有食之後楚滅舒庸襄二十四年八月癸巳朔日有食之比食又既象陽將絶乃中國衰微之象也楚子果從諸侯伐鄭二十七年十二月乙亥朔日有食之八年之間日食七作禍亂將重起昭七年四月甲辰朔日有食之後楚滅陳滅蔡三十一年十二月辛亥朔日有食之時吳滅徐楚圍蔡定十二年十一月丙寅朔日有食之後楚滅頓越敗吳定十五年八月庚辰朔日有食之周室大壊荆蠻主諸夏之象也明年中國諸侯從楚圍蔡以楚為京師由是推之日食皆為隂盛陽衰微之應也臣願陛下熟觀春秋書日食星變之㫖躬行宋景一言之善以應天可也臣伏讀聖訓曰意者政令多有所闕賞罰或至不當臣又有以見陛下遇災而懼畏天戒之切而修政事以恭禦厥罰也臣又請以春秋明之謹按魯昭七年四月甲辰朔日有食之晉士文伯謂晉侯曰不善政之謂也國無政不用善則自取讁于日月之災故政不可不謹也是天變繫於政令之闕也明矣魯莊三年王使榮叔來錫桓公命啖氏云莊王寵簒逆以黷三綱不能法天正道故去天字以貶之斯言當矣夫聖王礪世之術惟賞罰而已賞當功則錫命一人而萬邦懐若師之九二是也若宜罰而賞則寵一簒弑而亂臣賊子迹接而起矣然則去天字以貶之以明賞罰天之公理也是天變繋於賞之不當也明矣今政令之闕有十監司牧守數易一也州縣差役不公二也孤寒困於舉將三也吏員太冗四也任子太濫五也朝令夕改六也衣服無章七也獄訟多寃八也酷吏殘民九也部胥阨塞衣冠十也至如賞罰不當殆有甚焉如近日宿州諸將臣竊謂賞太重罰太輕昔太祖皇帝親征晉陽契丹來援太祖令何繼筠分精騎數千拒之石嶺關斬首千餘級其後遂平并州其功可謂大矣止拜建武軍節度而已李漢超從太祖平李重進關南之功亦大矣及卒太宗皇帝止贈太尉忠武軍節度而已宿州之役比之晉陽關南之功不啻九牛之一毛而諸將超拜官爵加繼筠漢超數等有如平北敵恢復中原不知何以賞之昔周世宗屢為劉旻所敗遂大燕將士斬敗將何徽樊愛能等七十餘人軍威大震果敗旻于髙平取淮南定三關夫一日戮將七十豈復有將可用而世宗終能恢復如此得非巽懦者去則勇敢者出耶太祖初有天下嘗謂唐莊宗姑息將士朕則不然惟有劔耳諸將股栗削平僭亂㨗如破竹自靖康板蕩將四十年國勢不競日就委靡豈有他哉罰不必行將不用命近者宿州之敗士死于敵及為庸將所誤而死者數千人積屍如邱暴胔滿野而誤國敗軍之將乃以宿州所得之金厚賂權貴巧為㳺說以自解偃然安處善地而戮不加焉籍没不行誅戮不加上天見變昭然明甚臣願陛下信賞必罰以太祖為法號令將士以五代為戒斷然必行正心誠意以應天可也臣伏讀聖訓曰朕雖側身求應以實卿等各思革正積弊勿徇佞私務塞災異之原稱朕寅畏之意臣又有以見陛下遇災而懼畏天戒之切而去華務實求直言以自警也臣又請以春秋明之謹案魯莊七年四月辛卯夜常星不見夜中星隕如雨劉向以為天垂象以視下將欲人君防惡逺非以自全安也如人君有賢明之材畏天威命若髙宗謀祖已成王泣金縢改過修正立信布德存亡繼絶修廢舉逸裁什一之稅復三日之役節用儉服以惠百姓則諸侯懐德士民歸仁災消而福興矣嗚呼向之言可謂深切著明求應以實者也人君如堂人臣如陛堂岌乎其髙其情與下遼絶固難以喻陛隤乎其卑其情與上遼絶固難以通豈上下之情不可合也其患有十焉上之患七下之患三愎諫以拒人飾辭以文過作威以臨下恃智以衒物矜慧以取勝自廣以狭人耻過而作非君之患也便僻善柔便佞臣之患也愎諫以拒人晉惠是也飾辭以文過文皇是也作威以臨下漢宣是也恃智以衒物德宗是也矜慧以取勝顯宗是也自廣以狹人漢武是也耻過而作非靈帝是也人主有一于此則便僻之臣進矣善柔之臣逞矣便佞之臣奮矣如此而欲臣下各思革正積弊勿徇佞私是猶植曲木而望其影之直也不亦難乎自古聽言納諫莫如堯舜惡直醜正莫如桀紂堯舜闢四門明四目逹四聦雖有共鯀不能塞也桀紂醢諫臣梅伯剖直臣比干雖有關龍逢三人不能救也秦二世以趙髙為腹心劉項横行而不得聞漢成帝殺王章王氏移鼎而不得聞靈帝殺陳蕃天下横潰而不得聞梁武信朱异賊臣斬關而不得聞隋煬帝信虞世基李宻稱帝而不得聞唐明皇逐張九齡安史胎禍而不得聞陛下自即位以來號召逐客時與臣同召者張燾辛次膺王大寳王十朋今燾已去矣次膺去矣十朋去矣大寳行又將去惟臣在爾今臣復以瞽言妄發是臣又將去也人臣上書不激切不能起人主意激切即近訕謗昔辛甲七十五諫劉安世論胡宗愈至二十四章諫者不饜其黷而聽者不饜其煩今言一出而亟遷疏朝奏而夕罷言者不得盡其意聞者莫不駭其遷張震王十朋之去朝士莫不扼掔結舌以言為諱而欲塞災異之源稱寅畏之意臣知其必不能也臣願陛下熟觀春秋之㫖亟改前日之弊推誠務實以應天可也臣伏讀聖訓曰劄與侍從臺諫兩省官照㑹仍依今月十二日已降指揮各條具時政闕失聞奏臣終有以見陛下至誠憂災思聞時政闕失而惕厲以自改也臣聞之詩曰衮職有闕惟仲山甫補之傳曰命百官官箴王闕夫古之聖帝明王衮職不云無闕而欲補其闕王政不云無闕而欲箴其闕大哉言虖此亦陛下欲聞闕失之意也臣終請以春秋明之謹案魯莊三十年九月庚午朔日有食之明年三築臺聖人書以惡之謂其不畏天戒而勞民也今天變屢見而土木之役踵相躡怨讟嗷嗷口衆我寡臺諫不敢指陳侍從不敢睥睨陛下處蜵蜎蠖濩之中必不能盡知也陛下天資仁儉寧肯知而不戒耶臣又聞道路之言諸軍隂遣悍卒白晝於市井捉人手執竹筳以度人長短有及則者即三數卒擁入軍中謂之拖軍怨憤之聲所不忍聞村民相戒不敢入市輦轂之下有此寃抑況千萬里之外乎臣又聞陛下即位之初大赦天下文臣自承務郎以上各轉一官斯言一傳天下鼓舞今乃以一人之言格二百員朝請大夫轉行之命夫議赦之日知其太濫削之可也勿許轉行可也大赦既行始以為濫而格之失大信於天下復有大於此者乎傳曰主聖臣直語曰邦有道危言危行邦無道危行言遜夫非主之聖則臣不容直非邦有道則言不敢危惟陛下上法堯舜留神財擇乾道間銓以災異應詔上奏曰臣聞主聖臣直非主聖則臣何敢直邦有道危言危行非邦有道則言安敢危臣八月一日伏准省劄七月三十日三省同奉聖㫖政事不修災異數見江浙水澇有害秋成朕自八月一日避殿減膳思所以應天之實可令侍從臺諫卿監郎官館職疏陳闕失及當今急務毋有所隱臣伏讀聖訓見陛下畏天憂民聞過思治之切也夫謂政事不修災異數見是畏天之切也謂江浙水澇有害秋成是憂民之切也令臣等疏陳闕失是聞過之切也又及當今急務是思治之切也臣幸䝉大問敢不上體陛下懇惻之意而索言之臣聞春秋書雨雪水火皆謂之大何也雨雪常也以大然後為害水火常也以大然後為災今江淛水澇逺及襄漢與春秋大水何異推原厥咎豈無所自哉臣嘗攷漢董仲舒劉向鮑宣谷永之疏皆歸於宦官女寵小人夷狄之盛此四者在廷之士類能言之臣不暇逺引以瀆天聽然聖明在上必無此等借曰有之安得不致隂沴臣願陛下監鍾離意之奏如商湯之自責覽仍叔之語如周宣之側身以恭禦厥罰可也謹案食貨志禹有九年之水而國無捐瘠墨子七患亦云禹有七年之水而民不凍飢何也備先具也今數路水潦曽不逾時而穀已翔踊民已流殍國之無備甚矣臣願亟詔遭水州軍多方賑䘏使民被實惠無至流移亦救災憂民之先務也臣聞衮職有闕惟仲山甫補之說詩者謂衮指君也君職有闕仲山甫能彌縫而補之則補君職之闕者大臣之事今陛下不以責大臣而令臣等疏陳闕失是欲聞過之切也臣嘗學詩至小雅六月論闕詳矣其大略云小雅盡廢則四夷交侵臣每讀至此未嘗不掩卷太息也臣願陛下監鹿鳴和樂之缺而待遇臣下盡誠監四牡君臣之缺而進退大臣以禮監皇華忠信之缺而遴擇使臣監常棣兄弟之缺而敦睦大倫監伐木朋友之缺而肇修人紀監天保福禄之缺而寅畏天命監采薇征伐之缺而精選將帥監出車功力之缺而愛惜名器監杖杜師衆之缺而揔覈軍實監魚麗法度之缺而謹守成憲監南陔孝友之缺而訓厲風俗監白華㢘耻之缺而旌表孝㢘監華黍蓄積之缺而損節浮靡陛下所謂缺失者尚有大於此者乎當今急務莫急於備邊北有金人之患西有川蜀之慮金人之患宜詔兩淮宣諭嚴為守備如趙充國圖先零之䇿川蜀之慮宜擇大臣有威望素為吳璘信服者以迮之臣聞道路之言皆謂今之大臣有威望素為吳璘信服者無出張浚宜起浚帥長沙或鎮荆襄以遥制川蜀臣聞沈介前在成都為吳璘靳侮五十四州之人岌岌然有是乎借曰有之陛下亦安得髙枕而卧也臣竊聞敵人恐喝我求索無厭臣謂今日和議有可為痛哭者十臣請為陛下極言之今日之患兵費太廣養兵之外又増歲幣民力益屈何以堪之可為痛哭者一也海泗唐鄧之人不下數十百萬一旦與之是陛下無故驅數十百萬生靈置之死地可為痛哭者二也海泗今日之藩籬咽喉也彼得海泗且決吾藩籬以瞰吾室絶吾咽喉以制吾命則兩淮決不可保兩淮不保則大江決不可守大江不守則江淛決不可安可為痛哭者三也中原謳吟思歸之人日夜引領陛下拯溺救焚如赤子之望慈父母也一與敵和則中原絶望後悔無及可為痛哭者四也自頃秦檜用事力主和議生民膏血竭於敵廷之供億朝廷威勢屈於鄰國之詭謀民愁盜起齊述一變殺數萬人郡國二十四同時大水今和議雖未必成民皆曰又將竭吾膏血瘠中國以肥敵矣歸正人嗷嗷然曰又將如秦檜時執我北還以膏敵人之鈇鑕矣兩淮之人嗷嗷然曰又將如前日疲於敵使之徃來而奔命不暇矣可為痛哭者五也秦檜力排不附和議之士九十餘人賢士大夫國之元老相踵引去檜末年遣張常先汪尹錫網羅張浚胡寅等三十七人欲竄海島頼上天悔禍檜即隕命而三十七人者幸脫虎口然趙鼎王庶李光鄭剛中曽開李彌遜常同魏矼髙登吳元美楊煇吳師古等或死嶺海或死罪籍寃憤之氣徹天今日和議萬一或成則不附時議之士復蹈前日之禍必矣此可為痛哭者六也紹興戊午和議既成檜建遣路允廸等二三大臣往南京等州交割歸地一旦叛盟刼執允廸等遂下親征之詔敵復請和其反復如此檜猶不悟卒有逆亮之變驚動輦轂行朝居民一空覆轍不逺陛下不戒臣恐後車又將覆也此可為痛哭者七也頃者敵人移書盡取歸正之人檜一切還之如江西程師回趙良嗣等聚族數百人幾至謀變今敵必復如前日盡索歸正人與之則必反側生變不與則敵決不肯但已夫反側生變則蕭墻之禍深敵决不肯但已則必别啓釁端卒有逆亮之謀陛下何以待之此可為痛哭者八也自檜當國二十年空竭國力海内乾耗迄今府庫無旬月之儲自此復和蠧國害民殆有甚焉者矣此可為痛哭者九也真宗皇帝時宰相李文靖公沆賢相也嘗謂王旦云我死公必為相切勿與北敵講和吾聞出則無敵國外患如是者國常亡若與敵和中國自此必多事矣旦殊不以為然既而遂和十餘年間祥瑞天書土木之役不息東封西祀海内乾耗旦始悔不用李文靖之言夫祖宗全盛之時尚以和議為不可況今日國勢委靡如此而復唱此議使上下解體士氣惰怯溺於懐安之酖毒國之老成如張浚張闡王大寶王十朋金安節黄中陳良翰相躡黜逐詩云雖無老成人尚有典刑韓愈云言老成人重於典刑也是可輕乎此可為痛哭者十也陛下乾剛獨斷如太祖皇帝臣願堅守和不可成之詔力行其志自彊不息則冦敵何足患哉天變水災亦當消縮不勞聖慮矣臣又聞真宗皇帝咸平元年正月甲申彗出營室北避殿減膳彗十有四日而滅夫真宗皇帝所以致彗滅之速其應天之實蓋在於心之精㣲而不止於避殿減膳而已也陛下聖訓謂避殿減膳思所以應天之實臣願以咸平應天之實事事而思之懇懇而行之則民心恱而天意解矣洪适以水災應詔上奏曰臣聞災變之發率多縁類而起漢儒一一牽合則有附㑹不經之失然理之當者亦不可因噎廢食而曲為之說臣謹按漢書五行傳云隂氣勝故其罰常雨水傷百穀姦軌並作魯莊公十一年秋大水董仲舒以為魯宋比年為乘丘鄑之戰百姓愁怨隂氣盛故二國俱水厥後水災皆歸之軍興民怨所致國家自數載以來兵民死于戎事肝腦塗地者不鮮父母妻子啼號之聲未絶也陛下有兼愛南北之心而强敵變詐干戈未可得而戢今水不潤下江湖逆溢田疇溝澮與河渠連而為一已秀之禾不得而穫下民嗸嗸未有生意官無積藏安得人人而飽之霖潦彌月勢猶未已隂氣可謂盛矣陛下畏天愛民至誠惻怛明詔廷臣使之盡言堯舜之用心也臣愚以謂隂勝陽之沴敵人闖于外姦宄蟄于内也今外之所以禦外侮者朝廷有潛筭小臣不敢輕議而區區愚慮竊恐季孫之憂不在顓㬰臣入對之始及輪進故事皆以歸正人為憂繼因晩召亦嘗奏陳仰勤天問矣數旬以來漸已萌芽臣幸因奉詔敢復詳言向之為美談者皆曰中原遺黎望王師之來則簞食壼漿願削左衽所以襁負而至又其思慕聖德之切者臣在江淮之間二年所聞殊異於是蓋山東仍年旱蝗耕者無所得食故扶老擕幼南來偷生又聞趙王世隆之徒聚衆攻剽彼國指名蹤捕亦以荒歲故牽連親戚相率來歸其意蓋欲王師恢復因得乘勢横行逞其所欲上可以得官爵次可以得金帛子女不失歸其故鄉既來之後大失素望更相嘆恨而將帥所部又役使罵辱無以得其歡心去夏賈和仲以督府之令驅其孥累數萬口冐暑而來絶海遇風已葬魚腹而婦人老穉數百同舟蒸欝相摶疾病枕籍死者不暇瘞埋既抵所屯雖計口給粟不能充飢愁怨之氣上干隂陽之和實在於此初到京口則掘山中草根以代蔬茹數月之後三五成羣掇拾棄菜敗蘆于市㕓之間其計無聊何以久處此臣目擊耳聞者如此其人之在山東皆有室廬南畆生生之具自若也今父子數口雜于方丈之舍上雨旁風無以蔽障甚者寢處于泥淖之中以他人視之不可一朝居也雖使禽鳥豈不思歸欲歸無計則姦宄之謀不得已而作今日誅甲明日誅乙必草芟獸獮然後已況邇來北方已有招納之榜又有訹誘之人其黨聚於江浙兩域散於淮甸諸郡去帝城不逺亦復有之一呼相應憂未艾也或曰叛者已治是大不然譬之急湍奔流勢必赴壑於其中間築土以拒之終於衝軼横潰而止耳臣之管見以謂其人赳赳可用大勝江浙所募若使人給家足無飢寒匱乏之患樂補軍籍之缺誠為大利若其懐土不忘則宜優其歸費送以舟楫使之踰淮而去則可以窒患於未萌施恩於不報怨氣可弭天災可消或曰縱之使去不若遷之别壤以離其黨是又不然此輩捐生業棄墳墓逺來歸我亦招誘者誤之今遷之别壤居上者誰有仁民之心官又無以贍之客居窮處速其死爾是無罪而殺之也可不念哉當今隂盛之患在外者猶可隨機而應在内者莫急於此蓋浙西非盜賊窟穴雖流徒困殍必無弄兵之事臣私憂過計伏望聖鑒曲賜采擇而區處之至於譏切時政毛舉小事言而難行徒以沽名賣直則臣所不敢冒犯天威臣不勝戰汗知湖州王十朋上奏曰臣聞聖人以無難而畏賢君以無災而懼國多難而天有災此天心仁愛人君以災異而警懼之欲其恐懼修省舉天下而措之安也昔堯有九年之水湯有七年之旱周宣王外有四夷之交侵内有太甚之旱魃天災國難有若不易支持者然堯以帝湯以王宣王以中興者豈非天以災難啓之二三帝王能修德以應之耶恭惟陛下即位以來六年于兹矣躬攬權綱厲精政事雖漢宣帝光武無以加然天災流行無歲無有旱于夏澇于秋饑饉洊臻疾疫繼作去八月海溢于温死者以數萬計今歲川蜀荆南赤地千里邇者天作淫雨害于粢盛江浙之間被害尤甚陛下遇災而懼遣官分禱疏決滯獄減放房緍詔答大臣歸過於己可謂能恐懼修省矣臣來自逺不知左右前後論思獻納之臣亦嘗有以修德之說獻忠于陛下否乎書曰惟德動天無逺弗届詩曰皇天親有德享有道堯湯宣王之所以應天者蓋在乎是臣竊謂陛下宜法堯之盡道湯之自責宣王之側身修行早夜孜孜惕然自念曰天道不逺災異胡為而來哉豈吾心有所未正意有所未誠欲明明德於天下者有所未至乎忠直者未用諂䛕者未去有以害吾之治乎聚斂之臣未斥姦贓之吏未除有以蠧吾之民乎議法或失之深用刑或失之過有以傷吾之仁乎㫖酒之嗜聲色之邇毬馬馳騁之娛有以累吾修身之德乎責己以誠應天以實而無事乎虚文孔子曰丘之禱久矣蓋言出入起居之間罔不欽顛沛造次之際必於是不在乎區區禱祈祭祀也如是不惟可以弭災難於一時古先帝王之治効功業當復見於今日孰謂災異非天所以開陛下耶臣學識淺陋惟陛下採擇汪應辰論災異劄子曰臣伏見去歲冬温無雪近方立春而震電雨雹不三日間繼以大雪謹按春秋魯隱公九年周三月癸酉大雨震電庚辰大雨雪説者謂雷未可以出電未可以見雷電既已出見則雪不當復降八日之間再有大變葢俶甚也春秋二百四十二年變異重仍唯此一事不復再見況今者當冬温無雪之後既震電又雨雹又未及三日再有大變則非特春秋所書之比也詩曰敬天之渝又曰畏天之威伏望陛下精思熟慮諏訪正論脩省庶事以盡敬畏之實臣不勝惓惓歴代名臣奏議卷三百六
