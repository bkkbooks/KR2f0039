body:
  text: 歷代名臣奏議卷二百五十四明楊士竒等撰賦役漢武帝時外事四夷內興功利役費並興而民去本董仲舒説上曰古者稅民不過什一其求易共共讀曰供使民不過三日其力易足民財內足以養老盡孝外足以事上共稅下足以畜妻子極愛故民説從上至秦則不然用商鞅之法改帝王之制除井田民得賣買富者連田阡陌貧者無立錐之地又顓川澤之利管山林之饒荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一歲屯戍一歲力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歲之中屯戍及力役之事三十倍多於古也更音工衡反田租口賦鹽鐵之利二十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁無聊亡逃山林轉為盜賊赭衣半道斷獄歲以千萬數漢興循而未改古井田法雖難卒行宜少近古卒讀曰猝限民名田以贍不足名田占田也各為立限不使富者過制則貧弱之家可足矣塞并兼之路鹽鐵皆歸於民去奴婢除專殺之威薄賦斂省繇役以寬民力然後可善治也東漢靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦樂安太守陸康上疏諫曰臣聞先王治世貴在愛民省徭輕賦以寧天下除煩就約以崇簡易故萬物從化靈物應德末世衰主窮奢極侈造作無端興制非一勞割自下以從茍欲故黎民吁嗟隂陽感動陛下聖德承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圖夫十一而稅周謂之徹徹者通也言其法度可通而行也故魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望魏武帝始制新科下州郡又收租稅綿絹長廣守何夔以郡初立且師旅之後不可卒繩以法乃上言曰自喪亂以來民人失所今雖小安然服教日淺所下新科皆以明罰敕法一大化也所領六縣疆域初定加以飢饉若一切齊以科禁恐或有不從教者有不從教者不得不誅則非觀民設教隨時之意也先王辨九服之賦以殊逺近以三典之刑以平治亂愚以為此郡宜依逺域新邦之典其民間小事使長吏臨時隨宜上不背法下以順百姓之心比及三年民安其業然後齊之以法則無所不至矣帝從其言晉武帝太元十三年以范寧為豫章太守寧臨發上疏曰今邊烽告急而倉庫空匱古者使民歲不過三日今之勞擾殆無三日之休至有生兒不復舉養鰥寡不敢嫁娶臣恐社稷之憂厝火積薪不足喻也又言中原士民流寓江左歲久安業謂宜正其封疆户口皆以土斷又人性無涯奢儉由勢今并兼之室亦多不贍由用之無節爭以靡麗相高故也禮十九為長殤以其未成人也今以十六為全丁十三為半丁傷天理困百姓謂宜二十為全丁十六為半丁則人無夭折生長滋矣帝多納用之宋文帝時司徒王𢎞上言曰舊制民年十三半役十六全役當以十三以上能自營私及公故以充役而考之見事猶或未盡體有強弱不皆稱年且在家自隨力所能堪不容過苦移之公役動有定科循吏隱恤可無其患庸宰守常已有勤劇況值苛政豈可稱言乃有務在豐役增進年齒孤逺貧弱其敝尤深至令依寄無所生死靡告一身之切逃竄求免家人逺討胎孕不育巧避羅憲實亦由之今皇化惟新四方無事役召之應存乎消息十五至十六宜為半丁十七為全從之南齊武帝永明中會稽豐登商旅往來倍多常歲西陵牛埭稅官格日三千五百元懿如即所見日可一倍盈縮相兼略計年長百萬浦陽南北津及柳浦四埭乞為官領攝一年格外長四百許萬西陵戍前檢稅無妨戍事餘三埭自舉腹心世祖敕示會稽郡此詎是事宜可訪察即啓隨王東中郎長史顧憲之議曰尋始立牛埭之意非茍逼僦以納稅也當以風濤迅險人力不捷屢致膠溺濟急利物耳既公私是樂所以輸直無怨京師航渡即其例也而後之監領者不達其本各務已功互生理外或禁遏别道或空稅江行或撲船倍價或力周而猶責凡如此類不經埭煩牛者上詳被報格外十條並蒙停寢從來喧訴始得暫弭案吳興頻歲失稔今兹尤饉去之從豐良由飢棘或徴貨貿粒還拯親纍或携老弱陳力糊口埭司責稅依格弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振廪蠲調而元懿幸災榷利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非惟新加無贏並皆舊格猶闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨元懿稟性苛刻已彰往效任以物上譬以狼將羊其所欲舉腹心亦當虎而冠耳書云與其有聚斂之臣寧有盜臣此言盜公為損蓋微斂民所害乃大也今雍熙在運草木含澤其非事宜仰如聖旨然掌斯任者應簡廉平廉則不竊於公平則無害於民矣愚又以便宜者蓋謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地者率皆即日不宜於民方來不便於公名與實反有乖正體凡如此等誠宜深察時詔折租布二分取錢車騎將軍竟陵王子良啓曰臣一月入朝六登玫陛廣殿稠人裁奉顔色縱有所懷豈敢自達比天眚亟見地孽亟臻民下妖訛好生噂􅊱榖價雖和比室飢嗛縑纊雖賤駢門裸質臣一念此每入心骨三吳奧區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務在裒尅圍杗品屋以準資課致令斬樹發瓦以充重賦破民財産要利一時東郡使民年無常限在所相承準令上直每至州臺使命切求懸急應充猥役必由窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為恆事守長不務先富民而唯言益國豈有民貧於下而國富於上邪又泉鑄歲逺類多翦鑿江東大錢十不一在公家所受必須輪郭遂買本一千加子七百猶求請無地捶革相繼尋完者為用既不兼兩回復遷貿會非委積縱令小民每嬰困苦且錢帛相半為制永久或聞長宰須令輸直進違舊科退容姦利八屬近縣既在京畿發借徴調實煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兖豫二藩雖曰舊鎮往屬兵虞纍棄鄉土密邇寇庭下無安志編草結庵不違涼暑扶攜聚落靡有生向俱稟人靈獨絶溫飽而賦斂多少尚均沃實謂凡在荒民應加蠲減又司市之要自昔所難頃來此役不由才舉並條其重資自許以衒前人增估求俠後人加稅請代如此輪回終何紀極兼復交關津要共相脣齒愚野未間必加陵誑罪無大小橫沒資載凡求試榖帛類非廉謹未解在事所以開容後魏孝文帝時徐州刺史荀虎上疏曰臣聞先王建不易之軌萬代承之聖主垂不刋之制千載共仰伏惟陛下道洽羣生恩齊造化仁德所覃迹超前哲逺崇古典留意治方革前王之弊法申當今之宜用定貢賦之輕重均品秩之厚薄庶令百辟足以代耕編户享其餘畜巍乎煥焉不可量也臣竊尋居邊之民蒙化日淺戎馬之所資計素微小户者一丁而已計其徴調之費終歲乃有七縑去年徴責不備或有貨易田宅質妻賣子呻吟道路不可忍聞今淮南之人思慕聖化延頸企足十室而九恐聞賦重更懷進退非惟損皇風之盛慮傷慕義之心且臣所居與南連接民情去就實所諳知特宜寬省以招未至其小郡太守數户而已一請止六尺絹歲不滿匹既委邊捍取其必死邀之士重何吝君輕今班制已行布之天下不宜忤冒以亂朝章但猥藉恩私備位蕃嶽憂責之地敢不盡言孝明帝時諫議大夫張普惠以天下民調幅度長廣尚書計奏復徴綿麻恐其勞民不堪命上疏曰伏聞尚書奏復綿麻之調尊先皇之軌夙宵惟度欣戰交集何者聞復高祖舊典所以欣惟新懼可復而不復所以戰違法仰惟高祖廢大斗去長尺改重稱所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上稅綿八兩布上稅麻十五斤萬姓得廢大斗去長尺改重稱荷輕賦之饒不適於綿麻而已故歌舞以供其賦奔走以役其調天子信於上億兆樂於下故易曰悅以使民民忘其勞此之謂也自兹以降漸漸長闊百姓嗟怨聞於朝野伏惟皇太后未臨朝之前陛下居諒暗之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長稱重斗大革其所弊存其可存而特放綿麻之調以悅天下之心此所謂悅之不以道愚臣所以未悅者也尚書既知國少綿麻不惟法度之易民言之可畏便欲去天下之大信棄已行之成詔追前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而羣官共竊之愚臣以為於理未盡何者今宫人請調度造衣物必度忖稱量絹布匹有尺丈之盈一猶不計其廣絲綿斤兼百銖之剩未聞依律罪州郡若一匹之濫一斤之惡則鞭户主連三長此所以教民以貪者也今百官請俸人樂長闊并欲厚重無復準極得長闊厚重者便云其州能調絹布精闊且長橫發美譽以亂視聽不聞嫌長惡廣求計還官者此百司所以仰負聖明也今若必復綿麻者謂宜先令四海知其所由明立嚴禁復本幅度新綿麻之典依太和之稅其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右藏令依今官度官稱計其斤兩廣長折給請俸之人總常俸之數計俸所出以布綿麻亦應其一歲之用使天下知二聖之心愛民惜法如此則高祖之軌中興於神龜明眀慈信照布於無窮則孰不幸甚伏願亮臣悾悾之至下慰蒼生之心唐太宗初即位詔關中免二年租賦關東給復一年又有敕已役已納並遣輸了明年總為準折魏徴諫曰臣伏見八月九日詔率土皆復一年老幼相歡式歌且舞在路又聞有敕丁巳配役即令役滿折造餘物亦遣輸了待至明年總為準折道路之人咸失所望此誠非平分萬姓均同七子然下民難與圖始日用不知皆謂國家追悔前言二三其德臣竊聞天之所輔者仁人之所助者信陛下初膺大寶億兆觀德始發大號便有二言生八表之疑心失四時之大信如國有倒懸之急猶必不可為況以泰山之安而輒行此事為陛下為計者於財利則小益於德義則大損臣誠智識淺短竊為陛下惜之武后時鳳閣舍人崔融上奏曰伏見有司請稅關市事條不限工商但是行人盡稅者臣謹按周禮九賦其七曰關市之賦竊惟市縱繁巧關通末遊欲令此徒止抑所以咸增賦稅臣謹商度今古料量家國竊將為不可稅謹件事迹如左伏惟聖旨擇焉往古之時醇朴未散公田籍而不稅關防譏而不征中代已來澆風驟進桑麻疲弊稼穡辛勤於是各徇通財爭趨作巧求徑捷之速忘歲計之餘遂使田業日荒倉廪不積蠶織休廢弊縕闕如飢寒猥臻亂離斯瘼先王懲其若此所以變古隨時依本者恆科占末者增稅夫關市之稅者謂市及國門關門者也惟斂出入之商賈不稅來往之行人今若不論商人通取諸色事不師古法乃在情悠悠末代於何瞻仰濟濟盛朝自取嗤笑雖欲憲章姬典乃是違背周官臣知其不可者一也臣謹按易繫稱庖羲氏沒神農氏作日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成羣生奉順天德治國安人之本也士農工商四人有業學以居位曰士闢土殖榖曰農作巧成器曰工通財鬻貨曰商聖王量能授事四人陳力受職然則四人各業久矣今復安得動而搖之蕭何又云人情一定不可復動班固又云曹參相齊齊國安集大稱賢相參去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎參曰不然夫獄市者所以并容也今若擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人無所容竄久且為亂秦人極刑而天下叛孝武峻法而刑獄繁此其效也老子曰我無為而人自化我好靜而人自正參欲以道化其本不欲擾其末臣知其不可者二也四海之廣九州之雜關必據險路市必慿要津若乃富商大賈豪家惡少輕死重義結黨連羣喑嗚則彎弓睚眥則挺劒小有失意且猶如此一朝變化定是相驚乘兹困窮或致騷動便恐南走越北走燕非唯流迸齊民亦自攪亂殊俗又如邊徼之地寇賊為鄰守戍之旅歲月相繼儻因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏愈空臣知其不可者三也孟軻又云古之為關也將以禦暴今之為關也將以為暴今行者皆稅本末同流且如天下諸津舟航所聚旁通巴漢前指閩越七澤十藪三江五湖控引河洛兼包淮海𢎞舸巨艦千軸萬艘交貿往還憧憧永日今若江津河口置鋪納稅則檢覆檢覆則遲留此津才過彼鋪復止非唯國家稅錢更遭主司僦賂船有大小載有多少量物而稅觸途淹久統論一日之中未過十分之一因此擁滯必致吁嗟一朝失利則萬商廢業萬商廢業則人不聊生其間或有輕譟任俠之徒斬龍刺蛟之黨鄱陽暴虐之客富中悍壯之夫居則藏鏹出便竦劒加之以重稅因之以威脅一旦獸窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳也三王之後厥有著云秦漢相承典章大備至如關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以霸略英才去之而勿取也何則關為禦暴之所市為聚人之地稅市則人散稅關則暴興暴興則起異圖人散則懷不軌夫人心莫不背善而樂禍易動而難安一市不安則天下之市心搖矣一關不安則天下之關心動矣況澆風久扇變法為難徒欲禁末遊規小利豈知失玄默亂大倫魏晉眇小齊隋齷齪亦所謂不行斯道者也臣知其不可者五也今之所以稅關市者何也豈不以國用不足邊寇為虞一行斯術冀有殷贍然也微臣敢借前箸以籌之伏惟陛下當聖期御玄籙沈璧于洛刻石于嵩鑄寶鼎以窮姦坐明堂而布政神化廣洽至德潛通東夷暫驚應時平殄南蠻才動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭候靜謐比為患者惟苦二蕃今吐蕃請命邊事不起即目雖尚屯兵久後終成弛拆獨有默啜假息孤恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵大朴愛人力惜人財王侯舊封妃主新禮所有支斷咸令削減此陛下以躬率先堯舜之用心也且關中河北水旱數年諸處逃亡今始安輯儻加重稅或慮相驚況承平歲積薄賦日久俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文王曰帝王富其人霸王富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍算商客加斂平人如此則國保富強人免憂懼天下幸甚臣知其不可者六也陛下留神繫表屬想政源冒兹炎熾早朝晏坐一日二日機務不遺先天後天靈心密應時政得失小子何知卒陳瞽辭伏紙惶懾中宗景龍中宗楚客紀處訥武延秀韋溫等封户多在河南河北諷朝廷詔兩道蠶産所宜雖水旱得以蠶折租黃門侍郎張廷圭言兩道倚大河地雄奧股肱走集宜得其歡心安可不恤其患而殫其力若以桑蠶所宜而加别稅則隴右羊馬山南椒漆山之銅錫鉛鍇海之蜃蛤魚鹽水旱皆免寧獨河南北外於王度哉願依貞觀永徽故事準令折免詔可肅宗時高適出為蜀彭二州刺史始上皇東還分劒南為兩節度百姓弊于調度而西山三城列戍適上疏曰劒南雖名東西川其實一道自卭關黎雅以抵南蠻由茂而西經羌中平戎等城界吐蕃瀕邊諸城皆仰給劒南異時以全蜀之饒而山南佐之猶不能舉今裂梓遂等八州專為一節度歲月之計西川不得參也嘉陵比困夷獠日雖小定而痍痏未平耕紡亡業衣食貿易皆資成都是不可得役亦明矣可稅賦者獨成都彭蜀漢四州而已以四州耗殘當十州之役其弊可見而言利者枘鑿萬端窮朝抵夕千案百牘皆取之民官吏懼譴責及鄰保威以罰秩而逋逃益滋又關中比飢士人流入蜀者道路相繫地入有訖而科斂無涯為蜀計者不亦難哉又平戎以西數城皆窮山之顛蹊隧險絶運糧束馬之路坐甲無人之鄉為異域言不足利戎狄為國家言不足廣土宇奈何以彈丸地而困全蜀太平之人哉若謂己戍之城不可廢已屯之兵不可收願罷東川以一劒南併力從事不爾非陛下洗蕩關東清逆亂之急也蜀人又擾則貽朝廷憂帝不納德宗初門下侍郎楊炎疾賦役法敝乃請為兩稅法以一其制凡百役之費一錢之斂先度其數而賦於人量出制入户無主客以見居為簿人無丁中以貧富為差不居處而行商者在所州縣稅三十之一度所取與居者均使無僥利居人之稅秋夏兩入之俗有不便者正之其租庸雜徭悉省而丁額不廢其田畝之稅率以大歷十四年墾田之數為準而均收之夏稅盡六月秋稅盡十一月歲終以户賦增失進退長吏而尚書度支總焉帝善之貞元間詔定兩稅既而厲疫水旱户口減耗賦役日重帝以問宰相陸贄贄因上疏請釐革其害其一論兩稅之弊須有釐革曰國朝著令賦役之法有三一曰租二曰調三曰庸古者一井之地九夫共之公田在中藉而不稅私田不善則非吏公田不善則非民事頗纎微難於防檢春秋之際已不能行故國家襲其要而去其煩丁男一人授田百畝但歲納租粟二石而已言以公田假人而收其租入故謂之租古者任土之宜以奠賦法國家就因往制簡而一之每丁各隨鄉土所出歲輸若絹若綾若絁共二丈綿三兩其無蠶桑之處則輸布二丈五尺麻三斤以其據丁户調而取之故謂之調古者用人之力歲不過三日後代多事其增十之國家斟酌物宜立為中制每丁一歲定役二旬若不役則收其庸日準三尺以其出絹而當庸直故謂之庸此三道者皆宗本前哲之規模參考歷代之利害其取法也逺其立意也深其斂財也均其域人也固其裁規也簡其備慮也周有田則有租有家則有調有身則有庸天下為家法制均一雖欲轉徙莫容其姦故人無搖心而事有定制以之厚生則不隄防而家業可久以之成務則不校閲而衆寡可知以之為理則法不煩而教化行以之成賦則下不困而上用足三代創制百王是程雖維御損益之術小殊而其義一也天寶季歲祿山叛亂海內波搖兆庶雲擾版圖隳於避地賦法壞於奉軍建中之初再造百度執事者知弊之宜革而所作兼失其源知簡之可從而所操不得其要舊患雖減新沴復滋救跛成痿展轉增劇凡欲拯其宿弊須窮致弊之由時弊則但理其時法弊則全革其法而又揆新校舊慮逺圖難規略未詳悉故不果行利害非相縣固不茍變所為必當其悔乃亡若好革而不知原始要終斯皆以弊易弊者也至如賦役舊法乃是聖祖典章行之百年人以為便兵興之後供億不恆乘急誅求漸隳經制此所謂時之弊非法弊也時有弊而未理法無弊而已更掃庸調之成規創兩稅之新制立意且爽彌綸又踈竭耗編氓日日滋甚夫作法裕於人未有不得人者也作法裕於財未有不失人者也陛下初膺寶位思致理平誕發德音哀痛流弊念徵役之頻重憫蒸黎之困窮分命使臣敷揚惠化誠宜損上益下嗇用節財窒侈欲以蕩其貪風息冗費以紓其厚斂而乃搜摘郡邑劾驗簿書每州各取大歷中一年科率錢榖數最多者便為兩稅定額此乃採非法之權令以為經制總無名之暴賦以立恆規是務取財豈云恤隱作法而不以裕人拯病為本得非立意且爽者乎夫財之所生必因人力工而能勤則豐富拙而兼墯則窶空是以先王之制賦入也必以丁夫為本無求於力分之外無貸於力分之內故不以務穡增其稅不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其庸則功力勤如是然後能使人安其居盡其力相觀而化時靡遁心雖有墮遊不率之人亦已懲矣兩稅之立則異於斯唯以資産為宗不以丁身為本資産少者則其稅少資産多者則其稅多曽不悟資産之中事情不一有藏於襟懷囊篋物雖貴而人莫能窺有積於場圃囤倉直雖輕而衆以為富有流通蕃息之貨數雖寡而計日收贏有廬舍器用之資價雖高而終歲無利如此之比其流實繁一槩計估算緡宜其失平長偽由是務輕費而樂轉徙者恆脫於徭稅敦本業而樹居産者每困於徵求此乃誘之為姦驅之避役力用不得不弛風俗不得不訛閭井不得不殘賦入不得不闕復以創制之首不務齊平但令本道本州各依舊額徵稅軍興已久事例不常供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸既成新規須懲積弊化之所在足使無偏減重分輕是將均濟而乃急於聚斂懼或蠲除不量物力重輕惟以舊額為準舊重之處流亡益多舊輕之鄉歸附益衆有流亡則已重者攤徵轉重有歸附則已輕者散出轉輕高下相傾勢何能止又以謀始之際不立科條分遣使臣凡十餘輩專行其意各制一隅遂使人殊見道異法低昻不類緩急不倫逮至復命于朝竟無類會裁處其於踳駮胡可勝言利害相形事尤非便作法而不以救微防患為慮得非彌綸又踈者乎立意且爽彌綸又踈凡厥疲人已嬰其弊就加保育猶懼不支況復亟繚棼絲重傷宿痏其為擾病抑又甚焉請為陛下舉其尤者六七端則人之困窮固可知矣大歷中紀綱廢弛百事從權至於率稅少多皆在牧守裁制邦賦既無定限官私懼有闕供每至徵配之初例必廣張名數以備不時之命且為施惠之資應用有餘則遂減放增損既由郡邑消息易協物宜故法雖久刓而人未甚瘁及總雜徵虛數以為兩稅恆規悉登地官咸繫經費計奏一定有加無除此則人益困窮其事一也本懲賦斂繁重所以變舊從新新法既行已重於舊旋屬征討國用不充復以供軍為名每貫加徵二百當道或增戎旅又許量事取資詔敕皆謂權宜悉令事畢停罷息兵已久加稅如初此則人益困窮其事二也定稅之數皆計緡錢納稅之時多配綾絹往者納絹一匹當錢三千二三百文今者納絹一匹當錢一千五六百文往輸其一者今過於二矣雖官非增賦而私已倍輸此則人益困窮其事三也諸州稅物送至上都度支頒給羣司例皆增長本價而又繆稱折估抑使剝徵姦吏因緣得行侵奪所獲殊寡所擾殊多此則人益困窮其事四也稅法之重若是既於已極之中而復有奉進宣索之繁尚在其外方嶽頗拘於成例莫敢闕供朝典又束以彛章不許别稅綺麗之飾紈素之饒非從地生非自天降若不出編户之筋力骨髓將安所取哉於是有巧避微文曲承睿旨變徵役以召雇之目換科配以和市之名廣其課而狹償其庸精其入而粗計其直以召雇為目而捕之不得不來以和市為名而迫之不得不出其為妨抑特甚常徭此則人益困窮其事五也大歷中非法賦斂急備供軍折估宣索進奉之類者既並收入兩稅矣今於兩稅之外非法之事復又並存此則人益困窮其事六也建中定稅之始諸道已不均齊其後或吏理失宜或兵賦偏重或癘疾鍾害或水旱􅥐災田里荒蕪户口減耗牧守茍避於殿責罕盡申聞所司姑務於取求莫肻矜恤遂於逃死闕乏稅額纍加見在疲氓一室已空四鄰繼盡漸行增廣何由自存此則人益困窮其事七也自至德訖于大歷二十年餘兵亂相乘海內罷弊幸遇陛下紹膺寶運憂濟生靈誕敷聖謨痛矯前弊重愛人節用之旨宣輕徭薄賦之名率土蒸黎感涕相賀延頸企踵咸以為太平可期既而制失其中斂從其重頗乖始望已沮羣心因之以兵甲而煩暴之取轉加繼之以獻求而靜約之風浸靡臣所知者才梗槩耳而人益困窮之事已有七焉臣所不知何啻於此陛下儻追思大歷中所聞人間疾苦而又有此七事重增於前則人之無聊不問可悉昔魯哀公問於有若曰年飢用不足如之何有若對曰盍徹乎哀公曰二吾猶不足如之何其徹也有若曰百姓足君孰與不足百姓不足君孰與足孔子曰有國有家者不患寡而患不均不患貧而患不安蓋均而無怨節而無貧和而無寡安而無傾漢文恤患救災則命郡國無來獻是以人為本以財為末人安則財贍本固則邦寧今百姓艱窮非止不足稅額類例非止不均求取繁多非止來獻誠可哀憫亦可憂危此而不圖何者為急聖情重慎每戒作為伏知貴欲因循不敢盡求釐革且去華去甚亦足小休望令所司與宰臣參量據每年支用色目中有不急者無益者罷廢之有過制者廣費者減節之遂以罷減之資回給要切之用其百姓稅錢頃因軍興每貫徵二伯者下詔停之用復其言俾人知信下之化上不令而行諸道權宜加徵亦當自請蠲放如是則困窮之中十緩其二三矣供御之物各有典司任土之儀各有常貢過此以往復何所須假欲崇飾燕居儲備賜與天子之貴寧憂乏財但敕有司何求不給豈必旁延進獻别徇營求減德示私傷風敗法因依縱擾為害最深陛下臨御之初已𢎞清淨之化下無曲獻上絶私求近歲已來稍渝前旨今但滌除流誤振起聖猷則淳風再興賄道中寢雖有貪叨之輩曷由復肆侵漁州郡羡財亦將焉往若不上輸王府理須下紓疲人如是則困窮之中十又緩其四五矣所定稅物估價合依當處月申百姓輸納之時纍經州縣簡閲事或涉於姦黨過則不在户人重重剝徵理甚無謂望令所司應諸州府送稅物到京但與色樣相符不得虛稱折估如濫惡尤甚給用不充唯罪元納官司亦勿更徵百姓根本既自端靜枝葉無因動搖如是則困窮之中十又緩其二三矣然後據每年見供賦稅之處詳諭詔旨咸俾均平每道各令知兩稅判官一人赴京與度支類會參定通計户數以配稅錢輕重之間大約可準而又量土地之沃瘠計物産之少多倫比諸州定為兩等州等下者其每户配錢之數少州等高者其每户配錢之數多多少已差悉令折衷仍委觀察使更於當管所配錢數之內均融處置務盡事宜就於一管之中輕重不得偏併雖或未盡齊一決當不甚低昻既免擾人且不變法粗均勞逸足救凋殘非但徵賦易供亦冀逋逃漸息俟稍寧阜更擇所宜其二請兩稅以布帛為額不計錢數曰夫國家之制賦稅也必先導以厚生之業而後取其什一焉其所取也量人之力任土之宜非力之所出則不征非土之所有則不貢謂之通法歷代常行大凡生於天地之間而五材之用為急五材者金木水火土也水火不資於作為金木自産於山澤唯土爰播植非力不成衣食之源皆出於此故可以勉人功定賦入者唯布麻繒纊與百榖焉先王懼物之貴賤失平而人之交易難準又立貨泉之法以節輕重之宜斂散弛張必由於是蓋御財之大柄為國之利權守之在官不以任下然則榖帛者人之所為也錢貨者官之所為也人之所為者故租稅取焉官之所為者故賦斂捨焉此又事理著明者也是以國朝著令稽古作程所取於人不踰其分租出榖庸出絹調雜出繒纊布麻非此族也不在賦法列聖遺典粲然可徵曷嘗有禁人鑄錢而以錢為賦者也今之兩稅獨異舊章違任土之通方效算緡之末法不稽事理不揆人功但估資産為差便以錢榖定稅臨時折徵雜物每歲色目頗殊唯計求得之利宜靡論供辦之難易所徵非所業所業非所徵遂或增價以買其所無減價以賣其所有一增一減耗損已多且百姓所營唯在耕織人力之作為有限物價之貴賤無恆而乃定稅計錢折錢納物是將有限之産以奉無恆之輸納物賤則供稅之所出漸多多則人力不給納物貴則收稅之所入漸少少則國用不充公私二途常不兼濟以此為法未之前聞往者初定兩稅之時百姓納絹一匹折錢三千二三百文大率萬錢為絹三匹價計稍貴數則不多及乎頒給軍裝計數而不計價此所謂稅入少而國用不充者也近者百姓納絹一匹折錢一千五六百文大率萬錢為絹六匹價既轉賤數則漸加向之蠶織不殊而所輸尚欲過倍此所謂供稅多而人力不給者也今欲不甚改法而粗救災害者在乎約循典制而以時變損益之臣謂宜令所司勘會諸州府初納兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數仍依庸調舊制各隨鄉土所宜某州某年定出稅布若干端某州某年定出稅絹若干匹其有絁綿雜貨亦隨所出定名勿更計錢以為稅數如此則土有常制人有常輸衆皆知上令之不遷於是一其心而專其業應出布麻者則務於紡績供綿絹者則事於蠶桑日作月營自然便習各修家技皆足供官無求人假手之勞無賤鬻貴買之費無暴徵急辦之弊無易常改作之煩物甚賤而人之所出不加物甚貴而官之所入不減是以家給而國足事均而法行此宜稍循令典之舊規固非創制之可疑者也然蚩蚩之俗罕究事情好騁異端妄行沮議臣請假為問答以備討論陛下誠有意乎憐愍蒼生將務救恤但埀聽覽必有可行議者若曰每歲經費所資大抵皆約錢數若令以布帛為額是令支計無憑答曰國初約法已來常賦率由布帛輸二甲子制用不愆何獨當今則難支計且經費之大其流有三軍食一也軍衣二也內外官月俸及諸色資課三也軍衣固在於布帛軍食又取於地租其計錢為數者獨月俸資課而已制祿唯不計錢故三代以食人衆寡為差兩漢以石數多少為秩蓋以錢者官府之權貨祿者吏屬之常資以常徇權則豐約之度不得恆於家以權為常則輕重之柄不得專於國故先王制祿以食而平貨以錢然後國有權而家有節矣況今餽餉方廣倉儲未豐盡復古規或慮不足若但據羣官月俸之等隨百役資課之差各依錢數少多折為布帛定數某官月給俸絹若干匹某役月給資布若干端所給色目精粗有司明立條例便為恆制更不計錢物甚賤而官之所給不加物甚貴而私之所稟不減官私有準何利如之生人大端衣食為切有職田以供食有俸絹以供衣從事之家固足自給以兹制事誰曰不然夫然則國之用財多是布帛定以為賦復何所傷議者若曰吏祿軍裝雖頒布粟至於以時斂糴用權物價重輕是必須錢於何取給答曰古之聖人所以取山澤之藴材作泉布之寶貨國專其利而不與人共之者蓋為此也物賤由乎錢少少則重重則加鑄而散之使輕物貴由乎錢多多則輕輕則作法而斂之使重是乃物之貴賤繫於錢之多少錢之多少在於官中盈縮官失其守反求於人人不得鑄錢而限令供稅是使貧者破産而假資於富有之室富者蓄貨而竊行於輕重之權下困齊人上虧利柄今之所病諒在於斯誠宜廣即山殖貨之功峻用銅為器之禁茍制持得所則錢不乏矣有糶鹽以入其直有𣙜酒以納其資茍消息合宜則錢可收矣錢可收固可以斂輕為重錢不乏固可以散重為輕弛張在官何所不可慮無所給是未知方議者若曰自定兩稅以來恆使計錢納物物價漸賤所納漸多出給之時又增虛估廣求羡利以贍庫錢歲計月支猶患不足今若定供布帛出納以平軍國之資無乃有闕答曰自天寶以後師旅數起法度消亡肅宗撥滔天之災而急於功賞先帝邁含垢之德而緩於糾繩由是用頗殷繁俗亦靡弊公賦已重别獻繼興别獻既行私賂竟長誅求刻剝日長月滋積纍以至于大歷之間所謂取之極甚者也今既總收極甚之數定為兩稅矣所是别獻之類復在數外矣間緣軍用不給已嘗加徵矣近屬折納價錢則又多獲矣比於大歷極甚之數殆將再益其倍焉復幸年榖屢豐兵車少息而用常不足其故何哉蓋以事逐情生費從事廣物有劑而用無節夫安得不乏乎茍能黜其情約其用非但可以布帛為稅雖更減其稅亦可也茍務逞其情侈其用非但行今重稅之不足雖更加其稅亦不足也夫地力之生物有大數人力之成物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難下無困窮理化既衰則乃反是量出為入不恤所無故魯哀公問年飢用不足如之何有若對以盍徹桀用天下而不足湯用七十里而有餘是乃用之盈虛在節與不節耳不節則雖盈必竭能節則雖虛必盈衛文公承滅國之餘建新徙之業革車不過三十乘豈不甚殆哉而能衣大布冠大帛約已率下通商務農卒以富強見稱載籍漢文帝接秦項積久傷夷之弊繼高吕革創多事之時家國虛殘日不暇給而能躬儉節用靜事息人服弋綈履革舄却駿馬而不御罷露臺而不修屢賜田租以厚蒸庶遂使户口蕃息百物阜殷乃至鄉曲宴遊乘牝牸者不得赴會子孫生長或有積數十歲不識市鄽御府之錢貫朽而不可校太倉之粟紅腐而不可食國富於上人安於下生享遐福沒垂令名人到于今稱其仁賢可謂盛矣太宗文皇帝收合板蕩再造寰區武德年中革車屢動繼以災歉人多流離貞觀之初洊屬霜旱自關輔綿及三河之地米價騰貴斗易一縑道路之間餒殍相籍太宗敦行儉約撫養困窮視人如傷勞徠不倦百姓有鬻男女者出御府金帛贖還其家嚴禁貪殘慎節徭賦弛不急之用省無事之官黜損乘輿斥出宫女太宗嘗有氣疾百官以大內卑溼請營一閣以居尚憚煩勞竟不之許是以至誠上感淳化下敷四方大和百榖連稔貞觀八年以後米斗至四五錢俗阜化行人知義讓行旅萬里或不齎糧故人到于今談帝王之盛則必先太宗之聖功論理道之崇則必慕貞觀之故事此三君者其經始豈不艱窘哉皆以嗇用愛人竟獲豐福是所謂能節雖虛必盈之效也秦始皇據崤函之固藉雄富之業專力農戰廣收材豪故能芟滅暴強宰制天下功成志滿自謂有太山之安貪欲熾然以為六合莫豫違也於是發閭左之戌徵太半之賦進諫者謂之宣謗恤隱者謂之收恩故徵發未終而宗社已泯漢武帝遇時運理平之會承文景勤儉之積內廣興作外張甲兵侈汰無窮遂至殫竭大搜財貨算及舟車逺近騷然幾至顛覆賴武帝英姿大度付任以能納諫無疑改過不吝下哀痛之詔罷征伐之勞封丞相為富民侯以示休息邦本搖而復定帝祚危而再安隋氏因周室平齊之資府庫充實開皇之際理尚清廉是時公私豐饒議者以比漢之文景煬帝嗣位肆行驕奢竭耗生靈不知止息海內怨叛以至於亡此三君者其所慿藉豈不豐厚哉此皆以縱欲殘人竟致蹙喪是所謂不節則雖盈必竭之效也秦隋不悟而遂滅漢武中悔而獲存乃懲與不懲覺與不覺其於得失相逺復有存滅之殊安可不思安可不懼今人窮日甚國用歲加不時節量其勢必蹙而議者但憂財利之不足罔慮安危之不持若然者則太宗漢文之德曷見稱秦皇隋煬之敗靡足戒唯欲是逞復何規哉幸屬休明將期致理急聚斂而忽於勤恤固非聖代之所宜言也其三論長吏以增户加稅闢田為課績曰夫欲施教化立度程必先域人使之地著古之王者設井田之法以安其業立五宗之制以綴其恩猶懼其未也又教之族墳墓敬桑梓將以固人之志定人之居俾皆重遷方可為理厥後又督之以出鄉遊墮之禁糾之以板圖比閲之方雖訓導漸微而檢制猶密歷代因襲以為彛章其理也必謹於隄防其亂也必慢於經界斯道崇替與時興衰人主失之則不可御寰宇守長失之則不可釐郡邑理人之要莫急於兹頃因兵興典制弛廢户板之紀綱罔緝土斷之條約不明恣人浮流莫克禁止縱之則湊集整之則驚離恆懷幸心靡固本業是以賦稅不一教令不行長人者又罕能推忠恕易地之情體至公徇國之意迭行小惠竟誘姦氓以傾奪鄰境為智能以招萃逋逃為理化捨彼適此者既謂新收而獲宥倐忽往來者又以復業而見優唯懷土安居首末不遷者則使之日重斂之日加是令地著之人恆代墯遊服役則何異驅之轉徙教之澆訛此由牧宰不克𢎞通各私所部之過也及夫廉使奏課會府考功但守常規不稽時變其所以為長吏之能者大約在於四科一曰户口增加二曰田野墾闢三曰稅錢長數四曰徵辦先期此四者誠吏職之所崇然立法齊人久無不弊法之所沮則人飾巧而茍避其網法之所勸則人興偽以曲附其文理之者若不知維御損益之宜則巧偽萌生恆因沮勸而滋矣夫課吏之法所貴户口增加者豈不以撫字得所人益阜蕃乎今或詭情以誘其姦浮苛法以析其親族茍益户數務登賞條所誘者將議薄征已遽驚散所析者不勝重稅又漸流亡州縣破傷多起於此長吏相效以為績安忍莫懲齊人相扇以成風規避轉甚不究實而務增户口有如是之病焉所貴田野墾闢者豈不以訓導有術人皆樂業乎今或牽率黎蒸播植荒廢約以年限免其地租茍農夫不增而墾田欲廣新畝雖闢舊畬反蕪人利免租頗亦從令年限才滿復為汙萊有益煩勞無增稼穡不度力而務闢田野有如是之病焉所貴稅錢長數者豈不以既庶而富人可加賦乎今或重困疲羸力求附益捶骨瀝髓隳家取財茍媚聚斂之司以為仕進之路不恤人而務長稅數有如是之病焉所貴徵辦先期者豈不以物力優贍人皆樂輸乎今或肆毒作威殘人逞欲事有常限因而促之不量時宜唯尚強濟絲不容織粟不暇舂矧伊貧虛能不奔迸不恕物而務先徵辦有如是之病焉然則引人逋逃蹙人艱窘唯兹四病亦有助焉此由考核不切事情而泛循舊轍之過也且夫户口增加田野墾闢稅錢長數徵辦先期若不以實事驗之則真偽莫得而辨將驗之以實則租賦須加所加既出於人固有受其損者此州若增客户彼郡必減居人增處邀賞而稅數有加減處懼罪而稅數不降倘國家所設考課之法必欲崇於聚斂則如斯可矣將有意乎富俗而務理豈不刺謬歟當今之要在於厚人而薄財損上以益下下茍利矣上必安焉則少損者所以招大益也人既厚矣財必贍焉則暫薄者所以成永厚也臣愚謂宜申命有司詳定考績往貴於加者今務於減焉假如一州之中所稅舊有定額凡管幾許百姓復作幾等差科每等有若干人户每户出若干稅物各令條舉都數年别一申使司使司詳覆有慿然後録報户部若當管之內人益阜殷所定稅額有餘任其據户均減率計減數多少以為考課等差其當管稅物通比校每户十分減三分者為上課十分減二分者次焉十分減一分者又次焉如或人多流亡加稅見户比校殿罰法亦如之其百姓所出田租則各以去年應輸之數便為定額每歲據徵更不勘責檢巡增闢者勿益其租廢耕者不降其數足以誘導墾植且免妨奪農功事簡體𢎞人必悅勸每至定户之際但據雜産校量田既自有恆租不宜更入兩稅如此則吏無茍且俗變澆浮不督課而人自樂耕不防間而衆皆安土斯亦當今富人固本之要術在陛下舉而行之其四論稅期限迫促曰夫建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而斂其餘財遂人所營恤人所乏借必以度斂必以時有度則忘勞得時則易給是以官事無闕人力不殫公私相全上下交愛古之得衆者其率用此歟法制或虧本末倒置但務取人以資國不思立國以養人非獨徭賦繁多敻無蠲貸至於徵收迫促亦不矜量蠶事方興已輸縑稅農功未艾遽斂榖租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬所繫遲速之間不過月旬之異一寬稅限歲歲相承遲無所妨速不為益何急敦逼重傷疲人頃緣定稅之初期約未甚詳衷旋屬征役多故復令先限量徵近雖優延尚未均濟望委轉運使與諸道觀察使商議更詳定徵稅期限聞奏各隨當土風俗所便時候所宜務於紓人俾得辦集所謂惠而不費者則此類也其五請以稅茶錢置義倉以備水旱曰臣聞仁君在上則海內無餒殍之人豈必耕而餉之爨而食之哉蓋以慮得其宜制得其道致人於歉乏之外設備於災沴之前是以年雖大殺衆不恇懼夫水旱為敗堯湯被之矣隂陽相寇聖何禦哉所貴堯湯之盛者在於遭患能濟耳凡厥哲后皆謹循之故王制記虞夏殷周四代之法乃云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也周官司徒之屬亦云掌鄉里之委積以恤艱厄縣鄙之委積以待凶荒王制既衰雜以權術魏用平糴之法漢置常平之倉利兼公私頗亦為便隋氏立制始創社倉終於開皇人不飢饉貞觀初戴胄建積榖備災之議太宗悅焉因命有司詳立條制所在貯粟號為義倉豐則斂藏儉則散給歷高宗之代五六十載人賴其資國步中艱斯制亦弛開元之際漸復修崇是知儲積備災聖王之急務也語曰百姓足君孰與不足百姓不足君孰與足此言君養人以成國人戴君以成生上下相成事如一體然則古稱九年六年之蓄者蓋率土臣庶通為之計耳固非獨豐公庾不及編氓記所謂雖有凶旱水溢人無菜色良以此也後代失典籍備慮之旨忘先王子愛之心所蓄糧儲唯計廪庾犬彘猒人之食而不知檢溝壑委人之骨而不能恤亂興於下禍延於上雖有公粟豈得而食諸故立國而不先養人國固不立矣養人而不先足食人固不養矣足食而不先備災食固不足矣為官而備者人必不贍為人而備者官必不窮是故論德昏明在乎所務本末務本則其末自遂務末則其本兼亡國本於人安得不務頃以寇戎為梗師旅亟興惠恤之方多所未暇每遇隂陽愆候年不順成官司所儲祇給軍食支計茍有所闕猶須更取於人人之凶荒豈遑賑救人小乏則求取息利人大乏則賣鬻田廬幸逢有年才償逋債斂穫始畢糇糧已空執契擔囊行復貸假重重計息食每不充儻遇洊飢遂至顛沛室家相棄骨肉分離乞為奴僕猶莫之售或行丐鄽里或縊死道途天災流行四方代有率計被其害者每歲常不下一二十州以陛下為人父母之心若垂省憂固足傷惻幸有可救乏之道焉可捨而不念哉今賦役已繁人力已竭窮歲汲汲永無贏餘課之聚糧終不能致將樹儲蓄根本必藉官司助成陛下誠能為人備災過聽愚計不害經費可垂永圖近者有司奏請稅茶歲約得五十萬貫元敕令貯户部用救百姓凶飢今以蓄糧適副前旨望令轉運使總計諸道户口多少每年所得稅茶錢使均融分配各令當道巡院主掌每至榖麥熟時即與觀察使計會散就管內州縣和糴便於當處置倉收納每州令録事參軍專知仍定觀察判官一人與和糴巡院官同勾當亦以義倉為名除賑給百姓已外一切不得貸便支用如時當大稔事至傷農則優與價錢廣其糴數榖若稍貴糴亦便停所糴少多與年上下準平榖價恆使得中每遇災荒即以賑給小歉則隨事借貸大飢則録奏分頒許從便宜務使周濟循環斂散遂以為常如此則蓄財息債者不能耗吾人聚榖幸災者無以牟大利富不至侈貧不至飢農不至傷糴不至貴一舉事而衆美具可不務乎俟人小休漸勸私積平糴之法斯在社倉之制兼行不出十年之中必盈三歲之蓄𢎞長不已升平可期使一代黎人永無餒乏此堯湯所以見稱於千古也願陛下遵之慕之繼之齊之茍能存誠蔑有不至其六論兼并之家私斂重於公稅曰國之紀綱在於制度商農工賈各有所專凡在食祿之家不得與人爭利此王者所以節材力勵廉隅是古今之所同不可得而變革者也代理則其道存而不犯代亂則其制委而不行其道存則貴賤有章豐殺有度車服田宅莫敢僭踰雖積貨財無所施設是以咸安其分罕徇貪求藏不偏多故物不偏罄用不偏厚故人不偏窮聖王能使禮讓興行而財用均足則此道也其制委則法度不守教化不從唯貨是崇唯力是騁貨力茍備無欲不成租販兼并下錮齊人之業奉養豐麗上侔王者之尊户蓄羣黎𨽻役同輩既濟嗜欲不虞憲章肆其貪婪曷有紀極天下之物有限富室之積無涯養一人而費百人之資則百人之食不得不乏富一家而傾千室之産則千家之業不得不空舉類推之則海內空乏之流亦已多矣故前代致有風俗訛靡氓庶困窮由此弊也今兹之弊則又甚焉夫物之不可掩藏而易以閲視者莫著乎田宅臣請又措其宅而勿議且舉占田一事以言之古先哲王疆理天下百畝之地號曰一夫蓋以一夫授田不得過於百畝也欲使人無廢業田無曠耕人力田疇二者適足是以貧弱不至竭涸富厚不至奢淫法立事均所謂制度今制度弛紊疆理隳壞恣人相吞無復畔限富者兼地數萬畝貧者無容足之居依託強豪以為私屬貸其種食賃其田廬終年服勞無日休息罄輸所假常患不充有田之家坐食租稅貧富懸絶乃至於斯厚斂促徵皆甚公賦今京畿之內每田一畝官稅五升而私家收租殆有畝至一石者是二十倍於官稅也降及中等租猶半之是十倍於官稅也夫以土地王者之所有耕稼農夫之所為而兼并之徒居然受利官取其一私取其十穡人安得足食公廪安得廣儲風俗安得不貪財貨安得不壅昔之為理者所以明制度而謹經界豈虛設哉斯道浸亡為日已久頓欲修整行之實難革弊化人事當有漸望令百官集議參酌古今之宜凡所占田約為條限裁減租價務利貧人法貴必行不在深刻裕其制以便俗嚴其令以懲違微損有餘稍優不足損不失富優可賑窮此乃古者安富恤窮之善經不可捨也右臣前月十一日延英奏對因敘賦稅煩重百姓困窮伏奉恩旨令具條疏聞奏今且舉其甚者謹件如前臣聞於書曰無輕人事惟難無安厥位惟危此理之所以興也又曰厥後嗣王生則逸不知稼穡之艱難此亂之所由始也以陛下天縱聖哲事更憂危夙夜孜孜志求理致往年論及百姓必為悽然動容每言朕於蒼生支體亦無所惜臣久叨近侍亟奉德音竊謂一代黔黎必躋富夀之域昨奏人間疾苦十分才及二三聖情已甚驚疑皆謂臣言過當然則愁怨之事何由上聞煦育之恩何由下布典籍所戒信而有徵一虧聖猷實可深惜臣又聞於書曰非知之艱行之唯艱竊唯陛下所以驚疑於微臣之言者但聞之未熟耳此乃股肱耳目之任仰負於陛下誠所謂知之非艱尚未足深纍聖德也今則既知之矣願陛下勿復艱於所行居安思危億兆幸甚謹奏歷代名臣奏議卷二百五十四
