body:
  text: 歴代名臣奏議巻三十明楊士竒等撰治道宋仁宗天聖七年羣牧判官龐籍答詔論時政奏曰臣幸辱班聮獲當次對輙陳管見仰瀆纊旒内揣狂愚當從震殛臣聞服忠義者皆懐愛君之意被恵養者咸蓄報恩之心故有委輅納忠嬰鱗陳諫義烈所激無故殞身而況生逢盛隆身事明聖丁寕詔㫖責其盡言非臣韜黙之秋實臣罄勵之日也恭惟皇帝陛下倚祖宗之淳熙承慈聖之保祐積徳彌盛涉道日深罄天咸寕而自謂未乂在理必照而退託不明招尊鯁臣虚受讜議不吝過舉恩廣日新此前王之所難而陛下之所易實九廟無疆之福四海永安之基也臣是敢竭至陋之識揣當今之宜可補助聖治之萬一者條之如左伏以推誠任人則布腹心而事上懐疑待下則顯形迹以避嫌腹心布則下無隠情形迹顯則義乖至理夫古今之事固有形近私而實公者祁奚内舉其子而見褒前典亦有形近公而實私者王莽親戮其息而終成大盜是故王者察臣之心而任之推己之誠而信之則内竭其公外宣其力矣是以唐虞之朝興羣臣之遜而不為比周東漢之世立三互之法而無救衰弱故推誠之益如彼而懐疑之損若此謹按唐文皇之世或言魏元成阿黨者按驗無状温彦博奏其不存形迹逺避嫌疑元成奏曰君臣上下同遵此路則邦之興亡或未可知文皇矍然改容曰吾巳悔之故貞觀之冶與三代同風又憲宗之時皇甫湜應制舉䇿語切直王涯是其舅時為翰林學士任當覆䇿不以舅甥之嫌而收之為貴倖者所怒及貶涯虢州司馬以湜之盛才而尚不免親累故元和之政不至於太平此乃推誠懐疑之効也臣愚切窺今日似懐疑而待下矣羣臣似皆存形迹以避嫌矣陛下疑羣臣之私也臣下必有挾私徇情以致陛下之疑者也臣又謂當考其状實退之罪之可也未聞任之而疑疑之而任也書曰任賢勿貳又曰疑謀勿成此之謂也而言事之臣知陛下之有疑也當以理道分判公私昭然不惑使朝廷推至誠廣至公蕩然無猜以至於大同也夫宓子賤古之一縣令耳推誠於下而吏不忍欺況國家精擇信臣置之左右茍推心任之自非回邪姦佞孰不竭心仰醻倚属也安可謂推誠不可行於今乎臣切度今之言事者𩔖皆迎揣上意指似是之事以成其疑是致上之益疑也則其意似欲陛下悉疑於下自取信於聖心以利其身也不然夫豈不知疑之害治也臣恐防疑不巳則上不知所信畏避不巳則下無所推公公信兩虧事将安決伏惟陛下至聖至明臣碩陛下推至誠廣至公察情偽以臻太平之治臣又聞萬機之務所應至衆四海之大所緫至廣必在乎立畫一之法守不紊之條持其權綱擥其要命此帝王所以不勞而制天下也是故以一制衆則多至而益整以繁應廣則雖久而必亂故曰法不一則朋黨生若然則發號施令可得二三哉臣伏見去年十月十七日及二十七日宣傳聖㫖令群牧司借支帶甲馬二疋并随行草料與新差保州廵檢都監楊懐愍本司為准大中祥符五年宣頭節文今後應有臣僚及使臣脚下巳有官馬因差遣並不得乞借官馬礙此條貫遂具劄子扵十二月二日進呈得㫖只令賜馬一疋自備草料樞宻院出降宣頭之次至三日又傳聖㫖却令借帶甲馬二疋随行十七日内為一小事四降聖㫖三令借馬二疋一令賜馬一疋本司不知所從遂再具進呈當月十六日批降聖㫖云巳賜與馬其劄子更不行方敢依准宣頭指揮且樞宻院是陛下樞宻發命之司也得㫖畫依方降宣命於外頒行之次陛下又以傳宣衝之以在京之司職連大臣則可以進呈更改若踈逺之地使何所依從夫一州之守一邑之宰若政令不一尚有受其弊者況一人之威天下之大茍命令二三安得不慮乎且號令如汗汗出而不返者也故曰安危在出令安危所繫得不謹乎蜀相諸葛亮有云宫中府中皆為一體陟罰臧否不宜異同此實先代名臣之言也矧今寰宇之大咸遵一軌豈宜號令之發自啓多門萬一處置大事亦如此比恐致不虞以成後悔此遂事既往誠不當言臣碩陛下謹號令於此後耳臣又聞守文之體必遵於制度御下之方在謹於憲法制度定則貴不敢驕盈賤不敢踰越憲法正則寛不赦有罪猛不及無辜釋此二者雖堯舜不能治天下也唐文宗甞言為國之道致治甚難宰相李石對曰朝廷法令行則易此要言妙道也故法行則君主重法廢則朝廷輕輕重之理安危之機乎夫祖宗垂憲軌迹具在固不可改也所可改者請以醫者諭之夫藥所以攻疾也若疾證巳移不應但守故藥必更方易劑随其所移而攻之則疾應而痊矣法所以塞姦也若姦源巳遷不應但守故法必更條易科随其所遷而塞之則姦息而政明矣其不可改者亦請以醫者諭之夫三部之脈四時之氣五藥之性針灸之法更歴古今孰可變改也若制度之設尊君卑臣同文一軌防踰僭塞僥倖雖前王後帝亦不可改易也凡人見法令之有改者遂謂制度之皆可易也此世之所以多違越之人也恭惟國家以聖繼聖典章開具垂之無窮自中書樞宻院下至百司政教所行皆有成憲守而勿失可致治平況祥符中敕文應臣僚上殿奏事不得批依奏并批送合属中書樞宻等處以先帝睿明昇平在運小大之政無不洞曉尚不欲便行依可而必令有司奏覆者蓋恐破改舊制開啓倖門故也抑又先帝之深意不獨自守法度而巳誠欲垂之訓典冀陛下遵之也臣伏見頃來傳宣内降嵗有増多夫求丐之人若事合舊典理非所創則雖下有司不憂不行其背違定制創起新例者下於有司必法而不可行故須求傳宣内降期於必遂是則因一傳降廢一制度傳降不巳嵗月寖深臣恐制度存者無幾制度削則紀綱壊紀綱壊則上下之分何所檢局此臣所以日夜為朝廷惜之也臣碩陛下事無大小皆送有司覆奏則事機必當而典制常存矣然帝王行法必從近始使左右貴戚畏而不犯犯而不捨則天下孰敢輕重哉夫左右之臣貴宻之戚出入禁闥綢繆寵遇凡常之見所望惟恩望恩不巳驕怨漸積諸葛亮所謂寵之以位位極則賤順之以恩恩竭則慢夫有賤位之心繼有慢恩之意未有不猖獗踰檢縱肆無憚者矣過惡既盈然後寘之文法此前代之亡身覆族者皆由驕之太過制之不早故也所謂将欲福之適足禍之不若以義而斷其恩以法而制其漸知有過不捨則大過不生矣知無故不賞則僥望自息矣諸葛亮所謂威之以法法行則知恩限之以爵爵加則知榮是也使其操履自守常有懼禍之心寵渥所被必懐感恩之意永保元吉與國同休豈非王者待左右親戚之至仁乎孰若養癕疽使至決潰也臣頃為開封府兵曹參軍伏見王世融因毆本府客司軍将仇保法當贖銅物勅勒任且仇保京府一走吏耳世融貴戚之子也陛下責其横恣越法停官此實國家用法之至當而保全戚里之深心也若陛下制馭左右貴戚皆如世融則何患法不行而人不畏乎況此數年事耳固未忘於聖心近聞作坊料物庫監官連宫掖之戚侵盜官物事發而逃三司按捕之次降㫖不令窮究此非臣本職得自風傳萬一有之未為美事陛下何不使推窮其事付之於法俟其知過後或因赦文稍加收叙或以衣食豢養不使任職若因而悛改是陛下再造其身也此乃公法不屈私恩亦隆臣切惑聖斷異於曩時也計過則此重而彼輕也論属則彼親而此踈也議罪則彼加法而此貸刑也臣恐中外有或效之者繩之以法是同罪異罰矣因而寛之是法憲廢矣昔漢武帝時隆慮公主病因以金千斤錢千萬為子昭平君豫贖死罪上許之隆慮公主卒昭平君驕醉殺人廷尉請論武帝曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙帝廟乎又下負萬民乃可其奏哀不能止且隆慮帝妹也昭平帝壻也復巳許其贖死而終不貸貰者蓋食言之媿小而廢法之失大也故臣碩陛下謹法制以齊中外也謹覽詔文云規朕躬之過失臣伏惟陛下體仁聖之姿躬孝睦之徳鑒照古昔包舉蓺文屏絶㳺畋不邇聲樂奨用忠直斥逺佞邪此天下家曉而戸知也然日月不能無薄蝕之過唐堯不能無哲恵之難故懐多福者小心累大徳者細行臣是敢竭愚慮塞明詔又云陳宰政之闕遺伏以執政之本在内銓擇庶官在外安集百姓今官吏非其人而曠弛之政漸盛考課不得其實而升黜之典或濫夫官吏之體奉公束手以為要胥史之性舞文規利以為資官吏不嚴則胥史縱胥史縱則法令壊法令壊則民受弊此必然之理也夫欲外律郡國當先自京師故曰京邑翼翼四方是則今京任之官以寛縱法制為大體以姑息胥史為美名此巳相沿積習矣或有以公繩下者則羣胥百計而動揺之誠能動揺則來者為戒雖有公心幹略安敢施為乎伏見祥符縣令檢下稍峻群胥相率逃去尋而罷其縣事是動揺之計行矣況近年來任京職者多徇其私便罕責於才實按局廢弛蠧弊増深而今之奉公稍矯前失朝廷不責狡胥之隂計而戒官吏之峻整臣恐自此孰敢盡公操法束縛羣下乎百司觀之孰不效之乎百司之胥既效之而危其上百司之官亦戒之而縱其下上危下縱乆而成風此為胥史謀則得矣為公家謀何有哉使四方聞之莫可則矣臣碩朝廷速變此風無使成俗要在擇人而任責之行法無聽羣黨動揺之也又考課之制備存令典景行功罪不容隠私今内外之官雖有課歴率無實状蓋由刺舉之官或昧於察㢘或徇於私曲推勞舉過多失公實意有發擿則果能成贓情在容掩則吞舟漏網考課之司但據課歴以入升殿之科無縁察其真偽夫剛正之吏彊猾所以為仇則孤立而多患貪黷之夫姦智足以自衛則有黨而寡禍故有幹㢘在公而偶罹文法者考司即為有過而降殿之典行矣誅剥害民而贓状不露者考司即為無瑕而升賞之恩及矣如此則降之或在非辜既無以戒惡賞之或在有罪又無以觀能實由任選之道不精阿縱之法不嚴察舉之官不懼故也臣碩朝廷立嚴制去此弊風此乃銓擇之闕也又國之用度節儉為先節儉行於上則府庫實於内雖逢灾沴之數水旱之因上有賑救之備則民無流亡之悲今財賦益屈而土木之功不息浮冗之費日増儲蓄寡備而荒殄之民屢困賙恤之恩不時此輔臣固當苦言陳罷土木削浮冗以存濟之此乃安集之闕也儻陛下不輕小臣之言曲加裁擇誠能察情偽審號令謹法制然後責輔臣之公正者推擇天下才行而任之嫌疑之私既去至公之風自行名實不亂賞罰必當官曹嚴整紀綱振張則詔㫖所謂回邪朋比阿私恣横請託貪殘宜自息矣止土木之功去浮冗之費則失業之民有以濟矣臣聞明王聖主好聞其過忠臣孝子言無隠情至於諱有司悼後害皆非人臣之節也敢效百慮冀補萬分幸當責言之辰㒺避論輸之律實祈英睿照其悃誠八年侍御史知雜事劉随上章獻皇后乞還政䟽曰臣恭惟皇太后天資聖明手扶宗社爰自先朝不豫萬機倦勤皇帝養徳東朝選賢咨善太后預聞政事參決居多洎皇帝膺龍躍之期年尚冲幼太后承顧託之命心如金石垂簾以對群臣盡力以報先帝戎夷率服華夏乂安終始不渝中外咸仰於國家顯隆平之舉於皇帝極慈愛之情天地之功全母子之道備光輝於簡册垂億萬年然天下治矣王業崇矣皇帝長矣太后勤矣而猶祁寒盛暑勞苦聖躬一日萬機煩於聽斷臣聞虚心以致遐夀澄神以保太和是以神仙夀同天地者不勞心而役神也臣愚欲乞今後軍國常務並逐日專取皇帝處分所貴清神養素延聖母萬夀之期内侍問安成皇帝孝治之徳天下幸甚景祐五年制䇿曰朕䝉積累之休蒞幅貟之廣寅畏天命以康元元思欲恢祖宗之逺圖追皇王之極摯躋俗於仁夀之域陶民於禮義之化兢兢業業不敢怠遑焦心勞志十有七年于兹矣而明不燭逺智不通幽奉承明訓惟恐失墜故深詔有司詳延天下特起之士冀聞忠讜實至之言以補朕之不逮子大夫卓出群萃褎然造庭必有宏謀以塞虚佇國家誕膺寳命奄甸中區三聖繼明萬邦作乂除殘而革暴蠲苛而薄賦稼政脩禮文縟愛人甚於赤子縻賢同夫白駒竒傑魁壘之士列位于朝循良慈恵之長分政于外求治若此可謂勤且至矣然而革之前載猶或異論法制寖講未協厥中經費實繁而未得其節樂未諧於韶濩刑未措於成康官司或昧於㢘平風俗頗虧於素朴夷貊雖率化而時或有陵犯邉鄙者嵗時雖嘉靖而時有警戒變異者将朕之不徳使之然耶抑物之有數適當爾耶子大夫其精心極慮無有所隠古之制度可用於今今之章程有盭於古並宜條列勿事猥并立樂之方何以格神祇而來瑞物祥刑之要何以空囹圄而致和氣至於遴柬多士懋建庶官咸有前規可為來範唐氏考功之格善最悉陳漢家刺部之儀科條具舉士民之𩔖愚衆賢寡奢僭相尚習以成風不嚴而化其術安在蠢爾微寇何以革其非心漠然大鈞何以致其順序且道者萬世無敝而前經有忠文相救之說法者百王不易而舊典著輕重異用之宜戴記為國有九經所宜銓次周官辨地以五物咸為敷陳式副諮詢且觀殫洽固将施之於行事匪獨取之於虚文悉意以陳無撓執事張方平對䇿曰臣聞昔漢氏始舉賢良文學士而䇿以當時之大政凡治亂之故施捨之宜使以經對所得善者輙施之於政故文景之朝制度興作比隆三代得人之盛由此其選也今陛下上承先志遐稽治古祗惕乎安安之難戒慎乎事事之備數詔多聞之士延至大廷臨問以保邦制理之道以通天下之志以成天下之務兹誠抱器而有心於生民者發舒其憤碩之㑹臣不佞學不足以通天人之變識不足以達古今之務而竊有志焉乃今承之靦然塞舉大問所及豈臣愚所能通者雖然敢不以承學所聞謹昧死上愚對臣伏讀聖䇿見陛下寅畏天命以康兆民為心奉承謨訓以恢逺圖為志期躋俗於仁夀思陶民於誼禮而退託於不逮以求忠讜之言斯以見陛下虚懐於聽受之勤也伏以聖䇿有除殘去暴之言及蠲苛薄賦之念列愛人縻賢之道叙列位分政之良斯又見陛下勤恤小民之依以深察其微隠勵精庶政之紀以博用乎賢才此帝堯之協和萬邦周文之思皇多士而猶慊然興歎逖懐治古請為陛下廣其義焉昔聖王之所以能見天下於户牖之間運萬化於股掌之上者非為一人之明且智可徧見而盡察也使聦明者竭其視聽知力者盡其謀能則事無所遺政無不舉矣欲事無所遺在乎廣言路欲政無不舉在乎正有司臣聞書稱舜之徳曰詢于衆伊尹曰匹夫匹婦弗獲自盡人主㒺與成厥功古之興王咨嗟戒慎莫不箴勅其羣下俾補察其政故在輿有旅賁之規位宁有官師之典倚几有誦訓之諫臨事有瞽史之導猶衆楚人之求其齊言不可得也古之明君思興治道曷有不先廣視聽以平王度者乎昔漢魏相白去尚書副封以防壅蔽而宣帝得以知萬機之微為漢明主唐太宗著司門式云其無門籍人有論奏者皆令監門司馬引對不許闗礙又制大臣入論事輙令諫官同入或對問之言有虧理道随即争之此唐文帝致太平之迹也今朝廷司過拾遺之職惟御史諌臣凡厥庶官無得出位而言者臣碩陛下深留聖慮逺惟治方益進端亮骨鯁之士以旦夕承弼清閒之餘對臨之際訪之古訓爰及政事則嘉謀日聞于黈纊誠士各薦其見聞夫如是則何逺而不燭乎臣聞夫子曰必也正名乎春秋之義君不尸小事臣不專大名故尊主其要卑任其勞人君佚於任使仰成而治三公論道九卿分職羣有司各事其事以故庶務百職本末條理今夫津官亭吏一命之微米鹽貨利毫杪之細莫不闗決衡石經煩清衷三公下任卿大夫之勞卿大夫勞領羣有司之事職分名局不歸臺省政失其本事忘甚舊惟陛下考理之要清化之源莫若謹諸闗柅執其機轄委任三吏切摩治本使夫緫百揆者則謀建庶官之長列庶官之長者則各選衆職之任付之柄而要其效盡其材而責其成官守典司無相侵紊有廢厥職必正于罰如此則陛下以無為用天下羣吏莫不各有為而為天下用要在于上詳在于下上下正則天下治矣夫如是又何幽而不通乎方且優㳺嵓廊之上拱揖羲軒之庭不為而功成不勞而治定易曰知臨大君之宜此之謂也伏以聖䇿曰今竒傑魁壘之士列位于朝循良慈恵之長分政于外求治若此之勤猶未格于前載者臣伏讀至于再而竊有惑矣臣誠深歎陛下有英睿之度而臣弼乏将明之材因循蔽欺偷取一切不能作法於治不能革弊於細獨貽陛下兢兢之憂也誠使朝皆竒傑則朝廷重而百度正外皆循良則上下交而其志通雖甚盛徳何以加此又何前載之愧乎以臣之愚正謂朝位鮮魁壘之器外官寡慈恵之師未足以副聖心愛人縻賢之念爾雖然竒傑乃間世而出循良非比肩而有亦在人主推擇而聳勸之爾何以言之列位于朝者忠邪不可不辨也分政于外者牧宰不可不重也臣聞伊尹戒太甲曰左右惟其人周穆王命伯冏為太僕正曰僕臣正厥后克正僕臣諛厥后自聖㫖哉聖賢之究治本也堯舜禹大聖智者然猶相與歎以不知人為憂此九徳所以為帝謨也至于夫子亦以為知人之難堯舜其猶病諸夫知人之所以難者以其巧言令色之賊實也夫世之治亂君之昏明臣之忠邪所更而有雖治世明君不能使其立朝居位舉忠賢而無邪佞者也由能親忠賢而踈邪佞者爾雖亂世昏君亦未必立朝居位舉邪佞而無忠賢者也由其近邪佞而逺忠賢者爾故堯舜之庭稷契班乎共鯀幽厲之朝蘇衛儕乎榮暴顧上所親而近者孰恱焉夫欲辨朝位之忠諛者考其所朋之迹而志行見矣察其施作之謀而材智詳矣忠荘而端直者斯則雪霜之松栢矣諂從而容恱者斯亦疾風之蓬累矣進斯人也原其譽之所自退斯人也察其毀之所出㧞茅以彚必有𩔖也如此則列位之縻賢頗得竒傑魁壘之士矣臣聞民政之本在乎牧宰而朝廷之選任其制甚輕銓審補除初無差擇計階而授循資而遣或罷弱昏亂狠頑貪忍流毒于下窮枉無告刺守奪于權利坐視其弊而莫之聞者地相接已夫本既失之姑正其末猶愈於不正也昔在兩漢雖有刺史督州而又時遣使四出察羣吏之治故前漢則有繡衣直指傳行四方得專免二千石後漢則有美俗清詔之名以按郡國唐雖有採訪按察之職而亦時遣郎官御史出㢘外事誠國家舉用漢唐之典精選臺閣之臣才識深明風度方重者時遣分道以察郡縣守令能否之迹具善惡而入報示賞罰於必行如此則牧宰之官心知勸懼郡縣之政稍以澄清夫是則治民分政者頗得循良慈恵之長矣聖䇿曰法制寖講而未協厥中經費實繁而未得其節樂未諧於韶濩刑未措於成康官師或昧於㢘平風俗頗虧於素樸此以見陛下無微不講無小不慮者也夫法制所以未中以其命令之數易經費所以未節以其用度之無蓺樂未諧於韶濩以其工師之失職刑未措於成康以其貨利之亂制官師或昧於㢘平以其澄勸之義廢風俗頗虧於素樸以其分度之禮踰臣請為陛下悉數以終之臣所謂法制所以未中以其命令之數易者聞之書曰慎乃出令令出惟行夫命令者國之綱紀政之隄防綱紀一弛則萬目随解隄防一傾則横流莫制故為國之本為政之原信為大也比者命令布下尋復衝改是以郡縣承用者駮姦吏巧因縁為市民無所措手足而多犯于有司揆大體而論之此損政之深者倘朝廷出令事干大政必集議而後行下于多方必一定而無變略其苛細删諸重累俾萬姓咸曰大哉王言又曰一哉王心如此則法制允當協于中理矣臣所謂經費之未節以其用度之無蓺者伏以承平之日久是故因循之弊生日知其所増嵗不知其所減此費之所以煩也陛下幸加恵思所以撙節之理臣謂宜以約處之而巳宫室臺榭足以順隂陽之候旌旗羽衛足以昭文物之容苑囿池蘌足以備㳺豫之行音官樂部足以具燕享之禮自餘土木之不急者舉罷容衛之罕用者勿飾寛池囿之利下賦於貧民省音樂之伎稍斥其冗食減後苑之工巧息匠司之營繕慎無名之好賜約無功之匪頒罷緇黄之厚施節一切之横費以緩天下水旱之賦以為國家帑廪之實以濟疲農工女稼穡之勤以整老弱孤寡飢勞之殃如此則徳澤被于天下而經費有節矣臣所謂樂未諧於韶濩以其工師之失職者昔舜命九官夔實典樂漢史叙得人之盛而儒雅質直無協律並列又漢制卑者之子不得舞宗廟之酎歴代而下樂府令丞多用士人夫均聲考律其義微矣故師胥瞽矇古所甚重也今夫執伎以事上者歴象則有司天之監醫藥則有翰林之署至于琴奕書畫一藝之微者莫不厚賦廪稍間䝉寵賜太樂諸工真古者大夫士之職也謂宜略依司天為之官次補用知鍾律之士以充其選擇取儒師為之令丞使習其精義通其鍾吕雖名異於韶濩而可以薦天地享祖宗其用一也臣所謂刑未措於成康以其貨利之亂制者伏以國家之在宥天下一統治平徳教加於蒸人其陶化益深矣陛下臨御區極欽恤庶慎急深故之罪寛縱出之罰有慘怛之愛有忠利之教而刑未之措獄繫猶繁其故何由蓋上籠貨物漁財利之路多筦𣙜封占之法宻間之以權豪富室侵奪貧細吏務因循或引賕賄不能抑強扶弱是以小人業蹙窮而思濫者衆矣誠朝廷慎擇守宰摧抑豪猾稍寛利路以優齊人刋定律令除文致毛細之法務從簡易便於遵守使民不敢欺冒而試法吏無以輕重而侮文則刑雖未盡措而羅穽寛矣臣所謂官司或昧於㢘平以其澄勸之義廢者按周典小宰以六計弊羣吏之治雖治行不同而同主於㢘故馭吏之法麗重惟貨而受賕􅔰禁相繼有焉意者官刑稍以寛弛部長多故縱歟夫貪吏侵刻下民善事上官腹心爪牙各有施設及貫盈滅趾官以墨敗而又赦令屢下亟䝉釋觧丹書未乾已冀收叙此所謂官刑稍以寛弛者也今夫令宰有濫黷之迹而守倅縱不考驗守倅有貪暴之政而司官隠不上聞及乎惡積而不可掩事播而不可逭罪正不察厥罰至輕倘使諸統設之司及于聮事之職贓罪相坐以重其累則人自為計下無容姦矣夫峻刑苛禁誠非治世善化之意然今風俗流溢踰軌者衆不嚴官制何以立法猶乎馭駻突而不利于銜䇿且奔踶而衝蹶矣古所謂惟齊非齊者謂此道也臣所謂風俗頗虧於素樸以其分度之禮踰者書曰惟民生厚因物有遷違上所令從厥攸好故君人者章好以示民俗慎惡以御民滛夫風化之所起必由上以達下内而及外且萬邦表則在乎王國今夫彫飾巧偽之器竒邪纎靡之服陳鬻于市流于四方詐偽姦欺聚為淵藪按周官以儀辨等則民不越以度教節則民知足古之制民者使之雖富不異服無故不食珎納幣無過五兩合親不踰一肉故王道之端必自制節始也謂宜益條其僭侈之弊惟事事為之分度所示制令期于必信如此則争奪踰靡之俗革禮義敦厚之教行矣聖䇿曰夷貊雖率化而時有陵犯邉鄙者嵗時雖嘉靖而時有儆戒變異者兹又以見陛下過虞寇聚之漸祗畏天戒之重也然陵犯之擾雖特儌裔之小醜變異之來兹乃隂陽之大事何陛下問之後乎彼群蠻依嵠峒之險恃林嶺之阻窺伺無備潜出攘掠結集如蟻蜂飛迸如鳥獸守臣無状自投亡地然此之區區者亦何足以累國威煩聖慮哉臣謂邉事之重其在西北乎北戎通好於我餘三十年自漢氏巳來夷夏之和而能堅守信誓如今之久者未之有也非惟懐我恩信利我聘幣抑當我盛徳之世無釁可乘夫以利相結者利盡則交踈以勢相合者勢解則難作故有備無患謂之善無恃不來在乎多筭又西陲雖受羈縻姑息蓋久自國家失朔方棄靈武置戍内地控扼益蹙雖貢職外謹而巢穴内堅鄙上之防不可不戒且自唐氏中世以降兵農之業離文武之權分而政事不齊國謀相乖矣今之邉事根本在於廟堂措置施設固非下臣所得而詳然三軍之命繫於主帥是以擇将之重兵事之本臣請因平寇之問著于後篇以言之深惟陛下以天日髙明之徳承祖宗淳耀之靈夙興視朝中昃勤聽勅天之命臨此下人無疆惟休亦無疆惟恤宜乎自天降休百嘉來應而災異數作謫變仍見上天勤勤之意諒不徒發而必有所屬也間者殞星如雨流擾失次地震定襄裂而湧泉雷不收聲泄于窮冬又正月以來日䝉少光輙或數日不解臣鄙儒昧於天官之學竊考春秋之義及前志天文五行之占其咎皆由乎陽徳微弱隂道專縱下為阿比盜用威柄者也夫隂之為象臣道也妻道也邊圉之道也天意若曰将俾陛下察左右之姦正宫闈以禮謹邉防之備者乎夫人君之道所以配乾而法天者蓋取乎乾體之剛天行以健也剛故中正無邪健故運行不息洪範曰惟辟作福惟辟作威春秋之義譏大夫之專者夫臣下能竊威福之柄亦不專在乎執政當國者茍信聽之或過則欺誣之随生蟻漏壊堤炬遺燎原杜漸防微在慎厥始此所謂察左右之姦者也若夫防戚黨之侵預絶女謁之請求御進取周典之文均選循漢氏之制戒留連之害政事省幽怨以延和氣此所謂正宫闈以禮者也若夫将校之列思其智勇可任者為誰卒伍之衆察其銳驍無前者有幾邉壘守将孰有扞城之材帷幄謀臣孰有折衝之筭至于儲峙輸發之術兵械精完之數有一未備非先勝之道也此所謂謹邉防之備者也夫是三者惟在陛下存神而逺照凝慮而深思利柄勿以假人主威貴乎獨運雖篋櫝已固扃鐍不可不嚴雖垣墉既脩闗楗不可不設用乾剛以弭隂異謹人事以應天心如此則災異不足消休祥不足致也且聖䇿俾臣精心極慮無有所隠臣既冒陛下斯舉矣敢悼後害而為身謀者歟亦在陛下寛狂妄之誅以來天下至當之言焉聖䇿曰古之制度可用於今今之章程有盭於古並宜條列勿事猥并臣謹按春秋之義譏變古易常者而又善變之正者蓋國之善制不可輕變其未至者變之可也伏以先制舊法彼此一時事體權宜各有云設誠大制度或大典章為世規摹著在甲令故當守而弗失謹以奉行至於凡小事為因時消息或迹存而理異或法久而姦生必踐而行以為無改於祖宗之道此所謂膠柱而鼓瑟刻舟而求劒者易曰窮則變變則通通則乆故復而不厭久而不弊之謂道昔先王之作為爵禄賞罰以親攬其柄是以為天下之主見勞授賞則衆譽不能進無功見惡行誅則衆讒不能退無罪若政無大小人無善惡進退用捨一取諸舊是爵禄賞罰不在人主而在例也與奪之柄於陛下何有臣碩陛下革弊去蠧無不忍之愛㧞才賞忠無踈賤之隔大稽諸古小度于今使天下之耳目常新萬務之本原必正無曰引例合義而巳如此則古之制度斯用於今今之章程自合於古矣帝王之制不亦光大乎聖䇿曰立樂之方何以答神祇而來瑞物祥刑之要何以空囹圄而致和氣臣前所謂謹工師之職齊貨利之制者備矣夫樂作而順氣成象則和和則瑞物至矣故夔曰於予撃石拊石鳥獸蹌蹌簫韶九成鳳凰來儀刑得中則清清則和氣應矣故周官曰以刑教中則民不虣夫是則和氣其有不通乎聖䇿曰遴柬多士懋建庶官咸有常規可為來範唐氏考功之格善最悉陳漢家刺部之儀科條具舉臣按唐六典考功考課之法有四善一曰徳義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈善状之外有二十七最獻可替否拾遺補闕為近侍之最銓衡人物柬擢才良為選司之最揚清激濁褒貶必當為考校之最禮制儀式動合經典為禮官之最音律克諧不失節奏為樂官之最決斷不滯與奪合理為判事之最部統有方警守無失為宿衛之最兵士調習戎装充備為督領之最推鞫得情處斷平允為法官之最讐校精審明於刋定為校正之最承㫖敷奏吐納明敏為宣納之最訓導有方生徒充業為學官之最賞罰嚴明攻戰必勝為将帥之最禮義興行肅清所部為政教之最詳録典正詞理兼舉為文史之最訪察精審彈舉必當為糾正之最明於勘覆稽失無隠為勾檢之最職事脩理供承強濟為監掌之最功課皆充丁匠無怨為役使之最耕耨以時收穫成課為屯官之最謹於蓋藏明於出納為倉庫之最推步盈虚究理精宻為歴官之最占候醫卜効驗居多為方術之最譏察有方行旅無壅為闗津之最市鄽不擾姧濫不行為市司之最收養肥碩蕃息孳多為牧官之最邉境肅清城隍脩理為鎮防之最𩔖其善最校定内外文武官吏之課為九等焉漢刺史以六條察所部二千石其略曰豪右兼并占田過制曰二千石納引賕賄曰喜怒任情曰選署不平曰子弟請託曰違公不比此科條之目也聖䇿曰士民之𩔖愚衆賢寡奢僭相尚習以成風不嚴而化其術安在夫戒奢防僭之術臣既略陳于前矣蓋民之為名謂其冺然無知辨者愚之衆也所禀蓋然其動静趣習惟上是視故曰君子之徳風小人之徳草草上之風必偃言下化上之速也在易履卦象曰君子以辨上下定民志故上下誠辨則民志斯定矣其在節卦象曰節以制度數議徳行夫數度有等則貴賤章别徳行見奨則賢愚自分此則節之本也陛下念民習侈屢以為問有以見聖意之深憫乎末俗之不厚也間者頒下詔㫖戒服用之尤溢者媮靡少損矣然未足以稱陛下淳儉之教意者民之所効者其本未正歟春秋之義法之所建必自貴者始陛下誠欲清天下之弊其自諸戚里豪貴大臣之家以先之上徐趨而下奔走不嚴而化此其術也聖䇿曰蠢爾微寇何以革其非心漠然大鈞何以致其順序者夫裔夷微孽臣既列于前篇矣其擇将之事請得復盡焉今禁衛千幕環絡京甸什伍相長偏禆相承六軍之重統乎元帥而皆起奔走之勤舊積恩澤以稍遷以軀力為武以引強為材智不足以達機變恵不足以撫部伍冒没寵利優㳺太平輕肥相夸坐受姑息設不幸遐陬有嘯聚之寇邉隅有侵牧之擾雖受成于上指蹤在人非惟師律之不臧智勇之無恃是其肯委易得之富庶冒難死之鋒刃乎故将不知兵主不擇将無功厚賜無勞厚禄皆法所忌者也向者朝廷念将帥之材難是以擇搢紳之能者然其所得率多善奔走人事以為寵利之路而巳其鈐略才藝不謂無之然固鮮焉誠國家因為科條損益其制使夫衣冠之應詔者為設機宜十問以䇿之必有稽於軍志精合於時體者為通擢之理戎參于列校其方略智勇固未之盡抑猶愈於徒進者也至於和大鈞致大順兹由民心下和則和氣上應爾時使薄斂以富之緩刑弛力以佚之制節謹度以平之擇吏審令以安之是以政和則民和民和而後隂陽和隂陽和則大鈞調而順氣序矣聖䇿曰且道者萬世無弊而前代有忠文相救之說法者百王不易而舊典著輕重異用之宜者夫董生推道蓋探其本而言荀卿論刑蓋有所激而發彼三代之弊雖有忠文相救之說至于法天順人之意其可改乎此則萬世無弊之本也彼治亂之世雖有輕重異用之宜至于遏惡扶善之用其可殊乎此則百王不易之制也聖䇿曰戴記為國有九經所宜銓次周官辨地以五物咸為敷陳夫為國有九經者脩身則不惑尊賢則道立親親則諸父昆弟無怨禮大臣則不悖體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懐諸侯則天下畏之此為國之九經也周官大司徒之職以土㑹之法辨五地之物生一曰山林其動物宜毛物其植物宜皁物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黒而津三曰丘陵其動物宜羽物其植物宜覈物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晢而瘠五曰原隰其動物宜臝物其植物宜叢物其民豐肉而痺此五地之物也聖䇿曰固将施之於行事匪獨取之於虚文兹以見陛下虚己以諮詢留聽於葑菲者也臣材識迂鄙不通于政至于所發亦庶㡬有以上當聖心者陛下不廢其言擇其近是者粉澤而用之使天下知國家設科取士之道不為虚名則豈惟臣之獨被寵靈也哉固國家之盛美者巳臣昧死上對慶歴五年張方平為御史中丞上言曰臣觀古今治亂之變在上下之勢離合而巳上下之勢合事無大不成上下之勢離事無小不敗況近司輔臣股肱同體協恭和衷豈容乖異竊聞中書奏事争辨御前連日紛譁中外喧駭其於事理必有曲直伏以中書政本其所擬議即為命令無作好惡是謂皇極各徇所執何以適治歴代敗亂之兆皆由朝廷立彼此之論而巳彼此立則朋黨分朋黨分則勝負生勝負生則攻奪作攻奪作則敗亂之所以起臣碩聖心深鑒於此縁中書議論之事頗宻外傳不審不敢以為言故陳理亂大體而巳時方平又上言曰臣甞讀漢書至晁錯之事惟錯謀䇿宏逺達於權義有致君經世之志戮於姦讒之口而史氏不能褒發其忠更議以變古易常之說臣竊憤厲反覆較錯凡所辨議悉國家危事亂經将以圖安建治皆合覇王之軌不可不正遷之謬譏甞試論之古不可變耶則是三代無革弊救失之理而漢所用法當循亡秦也忠恭之異尚質文之殊用禮不相襲樂不相沿固三王之罪矣用寛大革苛慘固髙祖之過矣夫以文景之世追視漢初之政沿革既多豈錯先甞變易哉稽遷㫖意則是顛而弗扶危而弗持興亡倚天成敗推數括囊結舌浮沈容身者為智矣此乃夫子深鄙以為焉用彼相可為具臣者也故論者稱遷是非謬於聖人其斯誠矣益使後人務茍且而惡立事貴因循而重改作沮有心之銳為無功之辭其於教義不重虧歟臣甞論之夫為邦之道有制有權制為之本權為之勢節之以禮行之以信齊之以刑斷之以義此不可易之法故為之制長則縈之短則引之重則損之輕則益之此不可常之理故為之權其不可易者不為艱危急卒而變之其不可常者不為安寕平泰而慢之其本正雖危必安其勢傾雖治必亂然人之大情危必思安治必忘亂均乎二者處權為難非通才達義適時知變者孰能與於此乎易曰變則通通則乆故樂而不亂復而不厭之謂道夫事逺必弊法乆必衰原其始初各有云設時遷俗易迹在理非聖人執權盍即回革使天下之耳目常新萬務之本源必正彼立法垂制不在人君乎言為典刑動為律度茍無愆於大義寕一取乎舊章在商中宗嚴恭寅畏天命自度治民祇懼不敢荒寕在周宣王聿求賢臣憂勤戒慎以振絶緒嘉靖庶邦並建中興之業夫豈悉履湯武之迹哉在漢孝武引㧞俊乂文藝隆起武功震耀雄材大略為漢盛主又豈咸踐文景之教哉且事茍便俗豈憚乎觧絃而更張政茍戾時何固乎守株而求雉故夫不知達權推變之理而牽易常循舊之說者是拘生腐儒按文泥俗凝塞治道此聖智之所常患者也臣敢旁採世務僅若小敝者列之以禆萬分焉立政之本在信命令臣聞制天下之動者主乎一齊天下之衆者存乎信王言惟作命百官承式兆民從乂其難其慎惟新厥徳天下至大也兆庶至衆也民心至動也萬務至煩也統之有宗㑹之有元使衆而不惑繁而不亂非信何以一之故曰徳惟一動㒺不吉徳二三動㒺不凶天何言哉四時行焉萬物育焉惟其信之謂也故王者居上以制下宅中而圖大慮善而動非禮勿言動則可法法必可以繼言則可行行必可以復賞罰政命紀律條貫惟事事乃其有訓非信何以成之傅說曰惟口起羞言教令輕發所以召亂帝舜曰惟口出好興戎謂王者之言天下善惡所繫也故凡為人上自一話一言㒺不戒慎一動一静㒺不寅畏又況設為法制布于四方之大者歟書曰慎乃出令令出惟行弗惟反故命令者國之綱紀政之隄防綱紀一弛則萬目随觧隄防一傾則横流莫制故令必信則上得其正下安其事令不信則吏侮乎法民慢其禁弊雖微於安静之初害必大於急虞之際且匹庶而無信衆必棄之士而無信友必踈之卿大夫而無信家必敗王者而失信天下必危故人可以去食而無信不立三軍可以奪帥而非信不行為國之本為政之經信為大也比見朝廷詔令或尋即遷改或乆而自廢吏易之而奉行不固民忽之而茍慢多違揆大體而論之此損政之深者蓋國家切於求理急於聽受一人唱之即行一人沮之即止本末故為枘鑿前後自相矛楯是使民無所措手足而多犯於有司者也臣伏碩自今凡諸臣有請創端釐舊事干大政必集議而後行下于多方必一定而無變略其毛細簡其苛蕪勿以辯言亂舊經勿以小忠害大徳無稽之言勿聽弗詢之謀勿庸俾萬姓咸曰大哉王言又曰一哉王心自然民協于中四方風動疇敢復慢孰不恱從嗚呼弗慮胡獲弗為胡成慎厥初圖有終惟明明后邦其永孚于休致理之要在廣言路臣聞趨利違害去危圖安者世之大情遺身徇時忘家存國者人之難事故夫從容於舒逸眷戀乎富貴泥乎情之樂者舉世而是感激乎忠義顧重乎名節處乎事之難者絶世而希哲后興王深推此理故開懐接納勤心率勵無言不受擇善而從竒䇿逺猷必加酬賞犯顔忤意曲為矜容愚淺者固在恕中踈誕者姑置度外如鑑之照各盡其衆形如衡之平無爽乎一物緫羣智以為智因衆心而為心通其情偽分其邪正而君人之道舉矣伊尹曰匹夫匹婦弗獲自盡人主㒺與成厥功盤庚曰無敢伏小人之攸箴此則詢于芻蕘下及庶賤者也況於士民乎況於卿大夫乎臣聞之屋漏在上知之在下政事有闕必訪旁議詩曰惟彼二國其政不獲惟此四國爰究爰度晉文聽輿人之誦克興覇功子産採鄉校之謗卒成善政衆所善者我則行之衆所惡者我則改之政以無瑕事以合義是為國者之藥石為政之量準也譬之庶人治一家之政其里人邑子有見其田萊不闢家事不脩則勉之以敦業厚生勸功利用之說見其羞服玩用不中禮起居出入不以時則誡之以制節謹度周身嗇用之善居常則勵之以孝悌和睦之美緩急則展之以救賙分勞之助者是必其族姻親愛意在相厚者也其有語焉不以義㳺焉不以時間誘其子弟使不循於法離諜其僕妾使不親其上是必素甞仇恨或挾姦伺便有所利之者也彼為一家之長者将孰恱焉是必恱其相厚者謂有益其家也是必怨其仇而利之者也謂有損其家也今為天下乃不然忠良而相厚者飜以為怨讒邪而利之者飜以為恱是固不若庶人之治一家能審損益之正矣嗚呼歴代之昏君暴主不能自入於道徳之門者可知之矣由其臣有利之者歟歴代之亂臣賊子不能自立於忠孝之路者可知之矣由其主有以召之者歟故君臣之誠不盡則天下之患必生理之然矣臣竊惟陛下體乾剛之徳奮震耀之斷奨㧞孤介聽納下議帝堯之詢于衆大禹之不自矜成湯之從諫弗咈文王之徽柔懿恭道兼前王光被四表小臣愚鄙安足以識聖徳之大者然甞覽載籍頗識理亂之道見乎英叡之君忠正之臣恭畏戒慎咨嗟相戒莫不以博采下言周知衆情而興治徳驕佚之主姦利之下阿諛順欲牽合迎意莫不以壅遏忠直漸取衰敝而至危亂故深碩陛下揭日月之明無幽蔀而不照廣江海之度無㳙流而不納秕稗不以近俗而見棄葑菲不以下體而不採招來讜論以廣聽徳音漢魏相白去尚書副封以防壅蔽而宣帝得以知萬機之微為漢明主唐太宗躬勤政理明於聽受著司門式云其無門籍人有論奏者皆令監門司馬引對不許關礙又制大臣入論事輙令諫官同入或對問之言有虧理道随即諍之此唐太宗致太平之本也臣聞人之才有通塞識有淺深諍而合義自為深益諍或非當苐可置之故春秋傳曰文公逆祀去者三人定公順祀叛者五人去者謂三諫不從去之以禮此諫而是者也叛者謂諫不合道去不以義此諫而非者也是故臣之論事容有當否在人主明擇其善可從而從若乃闢忌諱之門斷謇諤之路公為蔽拒之意以沮忠義之心臣雖甚愚竊所不取伏碩陛下覽成湯盤庚之令典考漢宣唐宗之善制務進有心之士時聞造膝之對益為寛大配洪覆於上穹不自聦明託視聽於四逺以通天下之志以成天下之務則七世之廟傳裕於無疆蒸民之生率同於慶賴矣姑息之賞臣聞惟名與器君之重柄信賞必罰國之大經故以徳詔爵度材居位計勞賦禄量罪議刑百王之通制也二典三謨五誥衆誓春秋一王之法周官六典之訓功懋懋賞其義同歸故車服以庸二帝所以褒徳衣裳在笥有商所以禮賢爰及成周具存彛制寰内卿士甸外侯伯則有九儀之命以異尊卑之數八柄之法以馭予奪之權其好賜匪頒之式蓋所以将宴喜之厚意非尊寵大臣者也昔者周公輔成王致太平既營洛宅社于新邑庶邦冢君駿奔咸覲召公欲因大㑹顯周公之功乃出取幣入以王命錫之纔束帛爾則知聖人尚徳貴禮不黷貨利訓天下以恭儉而巳及王室衰亂戰國紛擾兵拏禍結務相吞勝競為賞法以激用命故秦設武功爵二十級以授戰士齊立賜金之令魏行給復之制以首争首而享苴茅連從約衡至取封君干賞蹈利遂以成俗乃至楚漢歴世之王各乗間釁互行窺圖得之為英傑失之為姦叛莫不威之以斧鉞寵之以軒冕是猶鬻販賈賣之道刼質誘略之術豈先王尊教化褒功徳法天秩而制禮之意歟至於唐氏天寳幽陵之亂建中奉天之逼而爵賞刑罰窮矣財賦不足以頒賚而職官之賞行焉職官不足以補授而檢試之號立焉吏胥輿皂假春坊憲署之秩卒旅冗校僭三公八座之稱彛章蕩然官紀大紊五代相蹂亂靡有定呴濡姑息務相加厚姦臣驕将磨牙擇肉指帑藏為外府視藩嶽為别第人君之御國如燕巢幕上固無暇剗深固之弊迹立宏逺之規摹也伏惟我有宋之集靈命而宅天極也經綸屯昧削平亂略丕冒無外緝熙光明故歴世之相轥轢所以為我而驅除茍衆政之有因循固宜鑑彼而創艾臣竊見賞典之謬姑息之軌猶有存焉疑朝廷俟議者之所發也善乎前賢之論爵賞也以為立國之道惟義與權誘人之方惟名與利名近虚而於教為重利近實而於徳為輕凡所以裁是非立法制者則存乎其義至於參虚實揣重輕消息盈虚使人不倦者則存乎其權專實利不濟之以虚則耗匱而物力不給專虚名不副之以實則誕漫而人情不趨故國家之制賞典錫賚財賦秩廪所以裁實也差號品異章服所以飾虚也秩之載于甲令者有職事官焉有散官焉有勲官焉有爵號焉其掌務而受俸者以序才能以位賢徳此所謂施實利而寓之虚名者也其勲散爵號大抵止於服色資廕而巳以馭崇貴以甄功勞此所謂假虚名而佐其實利者也虚實交相飬故人不黷賞輕重互相制故國不廢權彼夫胥史臺輿部曲卒校雖執簡曵綬而無貴異之實假名虚號而無緫攝之柄罪不足以論贖徭不足以庇復於下則在無䘮無得之際於國則有虧名害義之深是故損下之虚益上之實固權收利政之大方子曰必也正名乎夫豈惟名之不正而巳哉固有理之重者臣請備言焉自天下乂寕四鄙撤警人安其業逾三十年是國家全盛之時公私豐餘之日而帑廪無數年之積閭巷有半菽之民得非由於費也廣故為斂也重乎以是觀之設不幸遐陬有蜂蟻之擾連境有水旱之沴邉徼有立功之衆郡縣有施勞之人虚名先盡於無事之初實利不足於有為之際臨危而畫發機已晚矣且兵驕将惰無甚于今未嘗臝股肱扞患難而號列功臣未甞識亭障出營壘而賞盈私槖作法於治敝猶不救治而無法何救艱難方今可謂乗治作法之期是宜悉去五代姑息之失而乃虚實之用巳竭權義之制未立此臣輙用感憤者也臣聞衆之去就視乎君心事之重輕繫於國制重之則衆斯慕輕之則人必略故明主之為國譬猶執權衡謂其可以輕重乎天下之事制衆之去就也慎惜之斯重矣泛用之斯輕矣今虚名之在人可謂泛而輕者授之既不以為寵罷之固不足為怨而乃不加意慎惜作法貴重謀所以為佐實利而用者子曰民可使由之不可使知之管子曰宻事端則上神自古明君良臣講議理道未有不以輕重消息之術為政者也若其守一定之制昧通乆之變過時失㑹後徒噬臍乃以動衆為虞易常為戒若是而能通天下之志成天下之務者臣不敢知也恩貸之罰臣聞洪範三徳平康正直言用正直之徳以治平寕之世也蓋剛柔並用威恵相濟之謂正直剛而不柔則非綏懐之道恵而㒺威則成姑息之弊且子産有寛猛之說而謂寛則使民易犯不若猛以為政荀卿有輕重之論而謂輕則令人無畏不若重之近理夫子産仁人荀卿正士其言刑法乃後寛而尚猛是重而非輕彼豈樂苛慘而貴殺伐哉誠審乎治法之宜爾也書曰威克厥愛允濟愛克厥威允㒺功何謂平世主尊臣卑本重末輕朝無權強士無偽行民篤其業食節用時樂事勸功尊君親上風俗敦厲禮義興行綱紀文章脩整淳重此之謂平世若其有不及於此者未得謂之平也且夫以一國之法譬一身之治平則致養疾必攻焉安佚舒泰而不以時發伸宣導則必有壅滯虚實之疾生焉發伸宣導既失其節疾焉而不時攻延属于腠理浸滛乎血脉而又怠于針熨煎劑之救滋入乎膏肓則雖扁鵲之伎雅無施矣然初由恃乎安佚舒泰故也故刑罰者因循之藥石保息者承平之粱肉巳平而用刑罰是以藥石致養因循而復保息是以粱肉攻疾也臣實愚惷不達理要竊揆時政属累盛之世治用中典徳化醇醲仁澤深厚民頗流靡事或恩貸其尤著者罰用於下而不用於上賞行於上而不行於下若不整厲銜䇿箝勒鞬輈則且和鑾失節僨突敗御矣昔舜因天討有四罪之誅湯制官刑著十愆之誡周官八議其議貴之辟蓋謂請讞于王禮曰刑不上大夫蓋謂不虧傷其體皆非謂不入罰科也故内則有放奪殺刺之典外則有絀爵削地眚伐之制漢氏之法則有免罷謫徙完舂輸作之令是故爵位者天下之砥石先王所以勵世磨鈍賢則處之不賢則避之才則用之罪則罰之自古馭臣之通制也古者位重則憂大禄厚則責深今也位重則無憂禄厚則免責故臣曰罰用於下而不用於上賞行於上而不行於下也臣伏碩陛下英威發斷髙明深燭鑒前王之治軌訪良臣之忠議更立大訓裁其過倖賞茍在功不以踈近而殊賞罰誠有罪不以尊卑而異罰如此則國典正於上官制立於下貽範永世見英主革弊立制之明焉謹論歴代名臣奏議巻三十
