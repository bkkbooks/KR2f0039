body:
  text: 歴代名臣奏議卷二百七十九明楊士奇等撰律厯唐太宗貞觀初李淳風上言曰舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黄道之驗也暨于周末此器乃亡漢洛下閎作閎儀其後賈逵張衡等亦各有之而推驗七曜並行赤道按冬至極南夏至極北而赤道常定於中國無南北之異盖渾儀無黄道久矣太宗異其説因詔為之至七年儀成十四年太宗將親祀南郊以十一月癸亥朔甲子冬至而李淳風新術以甲子合朔冬至乃上言曰古厯分日起於子半十一月當甲子合朔冬至故太史令傅仁均以減餘稍多子初為朔遂差三刻司厯南宫子明太史令薛頥等言子初及半日月未離淳風之法較春秋已來晷度薄蝕事皆符合國子祭酒孔頴達等及尚書八座叅議請從淳風又以平朔推之則二厯皆以朔日冬至於事彌合且平朔行之自古故春秋傳或失之前謂晦日也雖癸亥日月相及明日甲子為朔可也從之十八年淳風又上言仁均厯有三大三小云日月之蝕必在朔望十九年九月後四朔頻大詔諸解厯者詳之不能定𤣥宗開元九年僧一行受詔改治新厯欲知黄道進退而太史無黄道儀率府兵曹叅軍梁令瓚以木為㳺儀一行是之乃奏黄道㳺儀古有其術而無其器昔人潛思皆未能得今令瓚所為日道月交皆自然契合於推歩尤要請更鑄以銅鐵十一年儀成一行又曰靈臺鐵儀後魏斛蘭所作規制朴畧度刻不均赤道不動乃如膠柱以考月行遲速多差多或至十七度少不減十度不足以稽天象授人時李淳風黄道儀以玉衡旋規别帯日道傍列二百四十九交以攜月㳺法頗難術遂寢廢臣更造㳺儀使黄道運行以追列舎之變因二分之中以立黄道交於奎軫之間二至陟降各二十四度黄道内施白道月環用究隂陽朓朒動合天運簡而易從可以制器垂象永傳不朽於是𤣥宗嘉之自為之銘初李淳風造厯定二十四氣中晷與祖沖之短長頗異然未知其孰是及一行作大衍厯詔太史測天下之晷求其土中以為定數其議曰周禮大司徒以土圭之法測土深日至之景尺有五寸謂之地中鄭氏以為日景於地千里而差一寸尺有五寸者南戴日下萬五千里地與星辰四㳺升降於三萬里内是以半之得地中今頴川陽城是也宋元嘉中南征林邑五月立表望之日在表北交州影在表南三寸林邑九寸一分交州去洛水陸之路九千里盖山川回折使之然以表考其弦當五千乎十二年測交州夏至在表南三寸三分與元嘉所測畧同使者大相元太言交州望極纔髙二十餘度八月海中望老人星下列星粲然明大者甚衆古所未識乃渾天家以為常没地中者也大率去南極二十度以上之星則見又鐵勒回紇在薛延陀之北去京師六千九百里其北又有骨利幹居澣海之北北距大海晝長而夜短既夜天如曛不暝夕胹羊髀纔熟而曙盖近日出没之所僧一行作新厯較經史所書氣朔日名宿度可考者皆合十五年草成而一行卒詔特進張說與厯官陳𤣥景等次為厯術七篇略例一篇厯議十篇𤣥宗顧訪者則稱制㫖明年說表上之其說皆足以為將來折衷畧其大要著於篇者十有二其一厯本議曰易天數五地數五五位相得而各有合所以成變化而行鬼神也天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律厯天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此見天地之心也自五以降為五行生數自六以往為五材成數錯而乘之以生數衍成位一六而退極五十而増極一六為爻位之統五十為大衍之母成數乘生數其筭六百為天中之積生數乘成數其筭亦六百為地中之積合千有二百以五十約之則四象周六爻也二十四約之則太極包四十九用也綜成數約中積皆十五綜生數約中積皆四十兼而為天地之數以五位取之復得二中之合矣蓍數之變九六各一乾坤之象也七八各三六子之象也故爻數通乎六十策數行乎二百四十是以大衍為天地之樞如環之無端盖律厯之大紀也夫數象微於三四而章於七八卦有三微策有四象故二微之合在始中之際焉蓍以七備卦以八周故二章之合而在中終之際焉中極居五六間由闢闔之交而在章微之際者人神之極也天地中積千有二百揲之以四為爻率三百以十位乘之而二章之積三千以五材乘八象為二微之積四十兼章微之積則氣朔之分母也以三極參之倍六位除之凡七百六十是謂辰法而齊於代軌以十位乘之倍大衍除之凡三百四是謂刻法而齊于德運半氣朔之母千五百二十得天地出符之數因而三之凡四千五百六十當七精返初之㑹也易始于三微而生一象四象成而後八卦章三變皆剛太陽之象三變皆柔太隂之象一剛二柔少陽之象一柔二剛少隂之象少陽之剛有始有壯有究少隂之柔有始有壯有究兼三才而兩之神明動乎其中故四十九象而大策之用周矣數之德圎故紀之以三而變於七象之德方故紀之以四而變于八人在天地中以閱盈虚之變則閏餘之初而氣朔所虛也以終合通大衍之毋虧其地十凡九百四十為通數終合除之得中率四十九餘十九分之九終嵗之弦而十分復初之朔也地於終極之際虧十而從天所以逺疑陽之戰也夫十九分之九盈九而虛十也乾盈九隠乎龍戰之中故不見其首坤虛十以導潛龍之氣故不見其成周日之朔分周嵗之閏分與一章之弦一蔀之月皆合於九百四十盖取諸中率也一策之分十九而章法生一揲之分七十六而蔀法生一蔀之日二萬七千七百五十七以通數約之凡二十九日餘四百九十九而日月相及於朔此六爻之紀也以卦當嵗以爻當月以策當日凡三十二嵗而小終二百八十五小終而與卦運大終二百八十五則參伍二終之合也數象既合而遯行之變在乎其間矣所謂遯行者以爻率乘朔餘為十四萬九千七百以四十九用二十四象虛之復以爻率約之為四百九十八微分七十五太半則章微之中率也二十四象象有四十九蓍凡千一百七十六故虛遯之數七十三半氣朔之毋以三極乘參伍以兩儀乘二十四變因而并之得千六百一十三為朔餘四揲氣朔之毋以八氣九精遯其十七得七百四十三為氣餘嵗八萬九千七百七十三而氣朔㑹是謂章率嵗二億七千二百九十萬九百二十而無小餘合于夜半是謂蔀率嵗百六十三億七千四百五十九萬五千二百而大餘與嵗建俱終是謂元率此不易之道也策以紀日象以紀月故乾坤之策三百六十為日度之準乾坤之用四十九象為月弦之檢日之一度不盈全策月之一弦不盈全用故策餘萬五千九百四十二則十有二中所盈也用差萬七千一百二十四則十有二朔所虛也綜盈虛之數五嵗而再閏中莭相距皆當三五弦望相距皆當二七升降之應發斂之候皆紀之以策而從日者也表裏之行朓朒之變皆紀之以用而從月者也積筭曰演紀日法曰通法月氣曰中朔朔實曰揲法嵗分曰策實周大曰乾實餘分曰虛分氣策曰三元一元之策則天一遯行也月策曰四象一象之策則朔弦望相距也五行用事曰發斂候策曰天中卦策曰地中半卦曰貞悔旬周曰爻數小分母曰象統日行曰躔其差曰盈縮積盈縮曰先後古者平朔月朝見曰朒夕見曰朓今以日之所盈縮月之所遲疾損益之或進退其日以為定朔舒亟之度乃數使然躔離相錯偕以損益故同謂之朓朒月行曰離遲疾曰轉度毋曰轉法遲疾有衰其變者勢也月逶迤伸屈行不中道進退遲疾不率其常過中則為速不及中則為遲積遲謂之屈積速謂之伸陽執中以出令故曰先後隂含章以聽命故曰屈伸日不及中則損之過則益之月不及中則益之過則損之尊卑之用暌而及中之志同觀晷景之進退知軌道之升降軌與晷名舛而義合其差則水漏之所從也捴名曰軌漏中晷長短謂之陟降景長則夜短景短則夜長積其陟降謂之消息逰交曰交㑹交而周曰交終交終不及朔謂之朔差交中不及望謂之望差日道表曰陽厯其裏曰隂厯五星見伏周謂之終率以分從日謂之終日其差為進退其二中氣議曰歴氣始于冬至稽其實盖取諸晷景春秋傳僖公五年正月辛亥朔日南至以周厯推之入壬子蔀第四章以辛亥一分合朔冬至殷厯則壬子蔀首也昭公二十年二月己丑朔日南至魯史失閏至不在正左氏記之以懲司厯之罪周厯得己丑二分殷厯得庚寅一分殷歴南至常在十月晦則中氣後天也周厯蝕朔差經或二日則合朔先天也傳所據者周厯也緯所據者殷厯也氣合于傳朔合于緯斯得之矣戊寅歴月氣專合于緯麟徳歴專合于傳偏取之故兩失之又命厯序以為孔子脩春秋用殷歴使其數可傳於後考其蝕朔不與殷歴合及開元十二年朔差五日矣氣差八日矣上不合於經下不足以傳於後代盖哀平間治甲寅元歴者託之非古也又漢太史令張壽王說黄帝調厯以非太初有司劾官有黄帝調歴不與壽王同壽王所謂乃殷歴也漢自中興以來圖䜟漏泄而考靈曜命歴序皆有甲寅元其所起在四分厯庚申元後百一十四嵗延光初中謁者亶誦靈帝時五官郎中馮光等皆請用之卒不施行緯所載壬子冬至則其遺術也魯歴南至又先周厯四分日之三而朔後九百四十分日之五十一故僖公五年辛亥為十二月晦壬子為正月朔又推日蝕宻於殷厯其以閏餘一為章首亦取合於當時也開元十二年十一月陽城測景以癸未極長較其前後所差則夜半前尚有餘分新厯大餘十九加時九十九刻而皇極戊寅麟德厯皆得甲申以𤣥始厯氣分二千四百四十三為率推而上之則失春秋辛亥是減分太多也以皇極厯氣分二千四百四十五為率推而上之雖合春秋而失元嘉十九年乙巳冬至及開皇五年甲戌冬至七年癸未夏至若用麟德厯率二千四百四十七又失春秋己丑是減分太少也故新厯以二千四百四十四為率而舊所失者皆中矣漢㑹稽東部尉劉洪以四分踈闊由斗分多更以五百八十九為紀法百四十五為斗分減餘太甚是以不及四十年而加時漸覺先天韓翊楊偉劉智等皆稍損益更造新術而皆依䜟緯三百嵗改憲之文考經之合朔多中較傳之南至則否𤣥始厯以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未達也更因劉洪紀法増十一年以為章嵗而減閏餘十九分之一春秋後五十四年嵗在甲寅直應鍾章首與景初厯閏餘皆盡雖減章閏然中氣加時尚差故未合于春秋其斗分幾得中矣後代厯家皆因循𤣥始而損益或過差大抵古厯未減斗分其率自二千五百以上乾象至于元嘉厯未減閏餘其率自二千四百六十以上𤣥始大明至麟德厯皆減分破章其率自二千四百二十九以上較前代史官注記惟元嘉十三年十一月甲戌景長皇極麟德開元歴皆得癸酉盖日度變常爾祖沖之既失甲戌冬至以為加時太早増小餘以附㑹之而十二年戊辰景長得己巳十七年甲午景長得乙未十八年己亥景長得庚子合一失三其失愈多劉孝孫張胄元因之小餘益强又以十六年己丑景長為庚寅矣治厯者糾合衆同以稽其所異茍獨異焉則失行可知今曲其一而少者失三多者失五是捨常數而從失行也周建德六年以壬辰景長而麟德開元厯皆得癸巳開皇七年以癸未景短而麟德開元厯皆得壬午先後相戾不可叶也皆日行盈縮使然凡厯術在於常數而不在於變行既叶中行之率則可以兩齊先後之變矣麟德已前實録所記乃依時厯書之非候景所得又比年候景長短不均由加時有早晏行度有盈縮也自春秋以來至開元十二年冬夏至凡三十一事戊寅厯得十六麟德厯得二十三開元厯得二十四其三合朔議曰日月合度謂之朔無所取之取之蝕也春秋日蝕有甲乙者三十四殷厯魯厯先一日者十三後一日者三周厯先一日者二十二先二日者九其偽可知矣莊公三十年九月庚午朔襄公二十一年九月庚戌朔定公五年三月辛亥朔當以盈縮遲速為定朔殷厯雖合適然耳非正也僖公五年正月辛亥朔十二月丙子朔十四年三月己丑朔文公元年五月辛酉朔十一年三月甲申晦襄公十九年五月壬辰晦昭公元年十二月甲辰朔二十年二月己丑朔二十三年正月壬寅朔七月戊辰晦皆與周厯合其所記多周齊晉事盖周王所頒齊晉用之僖公十五年九月己夘晦十六年正月戊申朔成公十六年六月甲午晦襄公十八年十月丙寅晦十一月丁夘朔二十六年三月甲寅朔二十七年六月丁未朔與殷厯魯厯合此非合蝕故仲尼因循時史而所記多宋魯事與齊晋不同可知矣昭公十二年十月壬申朔原輿人逐原伯絞與魯厯周厯皆差一日此丘明即其所聞書之也僖公二十二年十一月己巳朔宋楚戰于泓周殷魯厯皆先一日楚人所赴也昭公二十年六月丁巳晦衛侯與北宫喜盟七月戊午朔遂盟國人三厯皆先二日衛人所赴也此則列國之厯不可以一術齊矣而長歴日子不在其月則改易閏餘欲以求合故閏月相距近則十餘月逺或七十餘月此杜預所甚繆也夫合朔先天則經書日蝕以糾之中氣後天則傳書南至以明之其在晦二日則原乎定朔以得之列國之厯或殊則稽於六家之術以知之此四者皆治厯之大端而預所未曉故也新厯本春秋日蝕古史交㑹加時及史官候簿所詳稽其進退之中以立常率然後以日躔月離先後屈伸之變稽損益之故經朔雖得其中而躔離或失其正若躔離各得其度而經朔或失其中則參求累代必有差矣三者迭相為經若權衡相持使千有五百年間朔必在晝望必在夜其加時又合則三術之交自然各當其正此最微者也若乾度盈虚與時消息告譴於經數之表變常於潛遯之中則聖人且猶不質非籌厯之所能及矣昔人考天事多不知定朔假蝕在二日而常朔之晨月見東方食在晦日則常朔之夕見西方理數然也而或以為朓朒變行或以為厯術踈闊遇常朔朝見則増朔餘夕見則減朔餘此紀厯所以屢遷也漢編訢李梵等又以晦猶月見欲令蔀首先大賈逵曰春秋書朔晦者朔必有朔晦必有晦晦朔必在其月前也先大則一月再朔後月無朔是朔不可必也訢梵等欲諧偶十六日月朓昏晦當滅而已又晦與合朔同時不得異日考逵等所言盖知之矣晦朔之交始終相濟則光盡明生之限度數宜均故合於子正則晦日之朝猶朔日之夕也是以月皆不見若合於午正則晦日之晨猶二日之昏也是以月或皆見若隂陽遲速軌漏加時不同舉其中數率其日十三度以上而月見乃其常也且晦日之光未盡也如二日之明已生也一以為是一以為非又常朔進退則定朔之晦二也或以為變或以為常是未通於四三交質之論也綜近代諸厯以百萬為率齊之其所差少或一分多至十數失一分考春秋纔差一刻而百數年間不足成朓朒之異施行未幾旋復踈闊由未知躔離經朔相求耳李業興甄鸞等欲求天驗輙加減月分遷革不已朓朒相戾又未知昏明之限與定數故也楊偉採乾象為遲疾隂陽歴雖知加時後天蝕不在朔而未能有以更之也何承天欲以盈縮定朔望小餘錢樂之以為推交㑹時刻雖審而月頻三大二小日蝕不唯在朔亦有在晦二者皮延宗又以為紀首合朔大小餘當盡若每月定之則紀首位盈當退一日便應以故嵗之晦為新紀之首立法之制如為不便承天乃止虞􅒠曰所謂朔在㑹合茍躔次既同患於頻大也日月相離何患於頻小也春秋日蝕不書朔者八公羊曰二日也穀梁曰晦也左氏曰官失之也劉孝孫推俱得朔日以丘明為是乃與劉焯皆議定朔為有司所抑不得行傅仁均始為定朔而曰晦不東見朔不西朓以為昏晦當滅亦訢梵之論淳風因循皇極皇極宻於麟徳以朔餘乘三千四十乃一萬除之就全數得千六百一十三又以九百四十乘之以三千四十而一得四百九十八杪七十五太强是為四分餘率劉洪以古厯斗分太强久當後天乃先正斗分而後求朔法故朔餘之母煩矣韓翊以乾象朔分太弱久當先天乃考朔分而後覆求度法故度餘之母煩矣何承天反覆相求使氣朔之母合簡易之率而星數不得同元矣李業興宋景業甄鸞張賔欲使六甲之首衆術同元而氣朔餘分其細甚矣麟德厯有捴法開元厯有通法故積嵗如分月之數而後閏餘偕盡考漢元光以來史官注記日蝕有加時者凡二十七事麟德厯得五開元厯得二十二其四沒滅略例曰古者以中氣所盈之日為沒沒分偕盡者為滅開元厯以中分所盈為沒朔分所虛為滅綜終嵗沒分謂之策餘終嵗滅分謂之用差皆歸于揲易再扐而後掛也其五卦候議曰七十二候原于周公時訓月令雖頗有増益然先後之次則同自後魏始載于厯乃依易軌所傳不合經義今改從古其六卦議曰十二月卦出於孟氏章句其說易本於氣而後以人事明之京氏又以卦爻配朞之日坎離震兊其用事自分至之首皆得八十分日之七十三頥晉井大畜皆五日十四分餘皆六日七分止於占灾𤯝與吉凶善敗之事至於觀隂陽之變則錯亂而不明自乾象厯以降皆因京氏惟天保厯依易通統軌圖自八十有二節五卦初爻相次用事及上爻而與中氣皆終非京氏本㫖及七畧所傳按郎顗所傳卦皆六日七分不以初爻相次用事齊厯謬矣又京氏減七十三分為四正之候其說不經欲附㑹緯文七日來復而已夫陽精道消靜而無跡不過極其正數至七而通矣七者陽之正也安在益其小餘令七日而後雷動地中乎當據孟氏自冬至初中孚用事一月之策九六七八是為三十而卦以地六候以天五五六相乘消息一變十有二變而嵗復初坎離震兊二十四氣次主一爻其初則二至二分也坎以隂包陽故自北正微陽動於下升而未達極於二月凝涸之氣消坎運終焉春分出於震始據萬物之元為主於内則羣隂化而從之極于南正而豐大之變窮震功究焉離以陽包隂故自南正微隂生於地下積而未章至于八月文明之質衰離運終焉仲秋隂形於兊始循萬物之末為主於内羣陽降而承之極於北正而天澤之施窮兊功究焉故陽七之靜始於坎陽九之動始于震隂八之靜始于離隂六之動始于兊故四象之變皆兼六爻而中節之應備矣易爻當日十有二中直全卦之初十有二節直全卦之中齊厯又以節在貞氣在悔非是其七日度議曰古厯日有常度天周為嵗終故係星度于節氣其説似是而非故久而益差虞喜覺之使天為天嵗為嵗乃立差以追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年盖近之矣考古史及日官候紀之端在虛一度及今開元甲子却三十六度而乾策復初矣日在虛一則鳥火昴虛皆以仲月昏中合于堯典劉炫依大明厯四十五年差一度則冬至在虛危而夏至火已過中矣梁武帝據虞􅒠厯百八十六年差一度則唐虞之隆日在斗牛間而冬至昴尚未中以為皆承閏後節前月却使然而此經終始一嵗之事不容頓有四閏故淳風因為之說曰若冬至昴中則夏至秋分星火星虛皆在未正之西若以夏至火中秋分虛中則冬至昴在已正之東互有盈縮不足以為嵗差證是又不然今以四象分天北正𤣥枵中虛九度東正大火中房二度南正鶉火中星七度西正大梁中昴七度緫晝夜刻以約周天命距中星則春分南正中天秋分北正中天冬至之昏西正在午東十八度夏至之昏東正在午西十八度軌漏使然也冬至日在虛一度則春分昏張一度中秋分虛九度中冬至胃二度中昴距星直午正之東十二度夏至尾十一度中心後星直午正之西十二度四序進退不逾午正間而淳風以為不叶非也又王孝通云如嵗差自昴至壁則堯前七千餘載冬至日應在東井井極北故暑斗極南故寒寒暑易位必不然矣所謂嵗差者自與黄道俱差也假冬至日躔大火之中則春分黄道交於虛九而南至之軌更出房心外距赤道亦二十四度設在東井差亦如之若日在東井猶去極最近表景最短則是分至常居其所黄道不遷日行不退又安得謂之嵗差乎孝通及淳風以為冬至日在斗十三度昏東壁中昴在巽維之左向明之位非無星也水星昏正可以為仲冬之候何必援昴於始覿之際以惑民之視聽哉夏后氏四百三十二年日却差五度太康十二年戊子嵗冬至應在女十一度書曰乃季秋月朔辰弗集于房劉炫曰房所舎之次也集㑹也㑹合也不合則日蝕可知或以房為房星知不然者且日之所在正可推而知之君子慎疑寧當以日在之宿為文近代善厯者推仲康時九月合朔已在房星北矣按古文集與輯義同日月喜會而隂陽輯睦則陽不疚乎位以常其明隂亦含章示沖以隠其形若變而相傷則不輯矣房者辰之所次星者所次之名其揆一也又春秋傳辰在斗柄天策焞焞降婁之初辰尾之末君子言之不以為繆何獨慎疑於房星哉新厯仲康五年癸巳嵗九月庚戌朔日蝕在房二度炫以五子之歌仲康當是其一肇位四海復脩大禹之典其五年羲和失職則王命徂征虞􅒠以為仲康元年非也國語單子曰辰角見而雨畢天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒韋昭以為夏后氏之令周人所因推夏后氏之初秋分後五日日在氐十三度龍角盡見時雨可以畢矣又先寒露三日天根朝覿時訓爰始收潦而月令亦云水涸後寒露十日日在尾八度而本見又五日而駟見故隕霜則蟄蟲墐户鄭康成據當時所見謂天根朝見在季秋之末以月令為謬韋昭以仲秋水始涸天根見乃竭皆非是霜降六日日在尾末火星初見營室昏中於是始脩城郭宫室故時儆曰營室之中土功其始火之初見期于司理麟德厯霜降後五日火伏小雪後十日晨見至大雪而後定星中日且南至氷壯地坼又非土功之始也夏厯十二次立春日在東壁三度於太初星距壁一度太也顓頊厯上元甲寅嵗正月甲寅辰初合朔立春七曜皆直艮維之首盖重黎受職於顓頊九離亂德二官咸廢帝堯復其子孫命掌天地四時以及虞夏故本其所由生命曰顓頊其實夏厯也湯作殷厯更以十一月甲子合朔冬至為上元周人因之距羲和千祀昏明中星率差半次夏時直月節者皆當十有二中故因循夏令其後吕不韋得之以為秦法更考中星斷取近距以乙夘嵗正月己巳合朔立春為上元洪範傳曰厯記始於顓頊上元太始閼䝉攝提格之嵗畢陬之月朔日己巳立春七曜俱在營室五度是也秦顓頊厯元起乙夘漢太初厯元起丁丑推而上之皆不值甲寅猶以日月五緯復上元本星度故命曰閼䝉攝提格之嵗而實非甲寅夏厯章蔀紀首皆在立春故其課中星揆斗建與閏餘之所盈縮皆以十有二節為損益之中而殷周漢厯章蔀紀首皆直冬至故其名察發斂亦以中氣為主此其異也夏小正雖頗踈簡失傳乃羲和遺跡何承天循大戴之說復用夏時更以正月甲子夜半合朔雨水為上元進乖夏厯退非周正故近代推月令小正者皆不與古合開元厯推夏時立春日在營室之末昏東井二度中古厯以參右肩為距方當南正故小正曰正月初昏斗杓懸在下魁枕參首所以著參中也季春在昴十一度半去參距星十八度故曰三月參則伏立夏日在井四度昏角中南門右星入角距西五度其左星入角距東六度故曰四月初昏南門正昴則見五月節日在輿鬼一度半參去日道為最逺以渾儀度之參體始見其肩股猶在濁中房星正中故曰五月參則見初昏大火中八月參中則曙失傳也辰伏則參見非中也十月初昏南門見亦失傳也定星方中則南門伏非昏見也商六百二十八年日却差八度太甲二年壬午嵗冬至應在女六度國語曰武王伐商嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿舊說嵗在己夘推其朏魄廼文王崩武王成君之嵗也其明年武王即位新厯孟春定朔丙辰於商為二月故周書曰維王元祀二月丙辰朔武王訪于周公竹書十一年庚寅周始伐商而管子及家語以為十二年盖通成君之嵗也先儒以文王受命九年而崩至十年武王觀兵盟津十三年復伐商推元祀二月丙辰朔距伐商日月不為相距四年所說非是武王十年夏正十月戊子周師始起於嵗差日在箕十度則析木津也晨初月在房四度於易雷乘乾曰大壯房心象焉心為乾精而房升陽之駟也房與嵗星實相經緯以属靈威仰之神后稷感之以生故國語曰月之所在辰馬農祥我祖后稷之所經緯也又三日得周正月庚寅朔日月㑹南斗一度故曰辰在斗柄壬辰辰星夕見在南斗二十度其明日武王自宗周次于師所凡月朔而未見曰死魄夕而成光則謂之胐朏或以二日或以三日故武成曰維一月壬辰旁死魄翌日癸巳王朝歩自周于征伐商是時辰星與周師俱進由建星之末厯牽牛須女渉顓頊之虛戊午師度盟津而辰星伏于天黿辰星叶光紀之精所以告顓頊而終水行之運且木帝之所繇生也故國語曰星與日辰之位皆在北維顓頊之所建也帝嚳受之我周氏出自天黿及析木有建星牽牛焉則我皇妣太姜之姪伯陵之後逄公之所慿神也是嵗嵗星始及鶉火其明年周始革命嵗又退行旅於鶉首而後進及鳥帑所以返復其道經綸周室鶉火直軒轅之虛以爰稼穡稷星繫焉而成周之大萃也鶉首當山河之右太王以興后稷封焉而宗周之所宅也嵗星與房實相經緯而相距七舎木與水代終而相及七月故國語曰嵗之所在則我有周之分也自鶉及駟七列南北之揆七月其二月戊子朔哉生明王自克商還至于豐於周為四月新厯推定望甲辰而乙巳旁之故武成曰維四月既旁生魄粤六日庚戌武王燎于周廟麟德厯周師始起嵗在降婁月宿天根日躔心而合辰在尾水星伏於星紀不及天黿又周書革命六年而武王崩管子家語以為七年盖通克商之嵗也周公攝政七年二月甲戌朔己丑望後六日乙未三月定朔甲辰三日丙午故召誥曰惟二月既望六日乙未王朝歩自周至于酆三月惟丙午朏越三日戊申太保朝至于洛其明年成王正位三十年四月己酉朔甲子哉生魄故書曰惟四月哉生魄甲子作顧命康王十二年嵗在乙酉六月戊辰朔三日庚午故畢命曰惟十有二年六月庚午胐越三日壬申王以成周之衆命畢公自伐紂及此五十六年胐魄日名上下無不合而三統歴以己夘為克商之義非也夫有效於古者宜合於今三統歴自太初至開元朔後天三日推而上之以至周初先天失之盖益甚焉是以知合於歆者必非克商之嵗自宗周訖春秋之季日却差八度康王十一年甲申嵗冬至應在牽牛六度周歴十二次星紀初南斗十四度於太初星距斗十七度少也古歴分率簡易嵗久輙差達歴數者隨時遷革以合其變故三代之興皆揆測天行考正星次為一代之制正朔既革而服色從之及繼體守文疇人代嗣則謹循先王舊制焉國語曰農祥晨正日月底于天廟土乃脉發先時九日太史告稷曰自今至于初吉陽氣俱蒸土膏其動弗震不渝脉其滿𤯝穀乃不殖周初先立春九日日至營室古厯距中九十一度是日晨初大火正中故曰農祥晨正日月底于天廟也於易象升氣究而臨受之自冬至後七日乾精始復乃大寒地統之中陽洽於萬物根柢而與萌芽俱升本在地中之象升氣已達則當推而大之故受之以臨於消息龍德在田得地道之和澤而動於地中升陽憤盈土氣震發故曰自今至於初吉陽氣初蒸土膏其動又先立春三日而小過用事陽好節止於内動作于外矯而過正然後返求中焉是以及于艮維則山澤通氣陽精闢户甲坼之萌見而莩穀之際離故曰不震不渝脉其滿𤯝穀乃不殖君子之道必擬之而後言豈億度而已哉韋昭以為日及天廟在立春之初非也於麟德歴則又後立春十五日矣春秋桓公五年秋大雩傳曰書不時也凡祀啟蟄而郊龍見而雩周歴立夏日在觜觽二度於軌漏昏角一度中蒼龍畢見然則當在建巳之初周禮也至春秋時日已潛退五度節前月却猶在建辰月令以為五月者吕氏以顓頊歴芒種亢中則龍以立夏昏見不知有嵗差故雩祭失時然則唐禮當以建巳之初農祥始見而雩若據麟德歴以小滿後十三日則龍角過中為不時矣傳曰凡土功龍見而畢務戒事火見而致用水昏正而栽日至而畢十六年冬城向十有一月衛侯朔出奔齊冬城向書時也以嵗差推之周初霜降日在心五度角亢晨見立冬火見營室中後七日水星昏正可以興板幹故祖沖之以為定之方中直營室八度是嵗九月六日霜降二十一日立冬十月之前水星昏正故傳以為得時杜氏據晉歴小雪後定星乃中季秋城向似為太早因曰功役之事皆捴指天象不與言歴數同引詩云定之方中乃未正中之辭非是麟德歴立冬後二十五日火見至大雪後營室乃中而春秋九月書時不已早乎大雪周之孟春陽氣靜復以繕城隍治宫室是謂發天地之房方於立春斷獄所失多矣然則唐制宜以𤣥枵中天興土功僖公五年晉侯伐虢卜偃曰克之童謡云丙之辰龍尾伏辰袀服振振取虢之旂鶉之賁賁天策焞焞火中成軍其九月十月之交乎丙子旦日在尾月在策鶉火中必是時策入尾十二度新歴是嵗十月丙子定朔日月合尾十四度於黄道日在古歴尾而月在策故曰龍尾伏辰於古距張中而曙直鶉火之末始將西降故曰賁賁昭公七年四月甲辰朔日蝕士文伯曰去衛地如魯地於是有灾魯實受之新歴是嵗二月甲辰朔入常雨水後七日在奎十度周度為降婁之始則魯衛之交也自周初至是已退七度故入雨水七日方及降婁雖日度潛移而周禮未改其配神主祭之宿宜書於建國之初淳風駮戊寅歴曰漢志降婁初在奎五度今歴日蝕在降婁之中依無嵗差法食於兩次之交是又不然議者曉十有二次之所由生然後可以明其得失且劉歆等所定辰次非能有以覩隂陽之賾而得於鬼神各據當時中節星度耳歆以太初歴冬至日在牽牛前五度故降婁直東壁八度李業興正光歴冬至在牽牛前十二度故降婁退至東壁三度及祖沖之後以為日度漸差則當據列宿四正之中以定辰次不復係於中節淳風以冬至常在斗十三度則當以東壁二度為降婁之初安得守漢歴以駮仁均耶又三統歴昭公二十年己丑日南至與麟德歴及開元歴同然則入雨水後七日亦入降婁七度非魯衛之交也三十一年十二月辛亥朔日蝕史墨曰日月在辰尾庚午之日日始有讁開元歴是嵗十月辛亥朔入常立冬五日日在尾十三度於古距辰尾之初麟德歴日在心三度於黄道退直于房矣哀公十二年冬十有二月螽開元歴推置閏當在十一年春至十二年冬失閏巳久是嵗九月己亥朔先寒露三日於定氣日在亢五度去心近一次火星則大尚未當伏至霜降五日始潛日下乃月令蟄蟲咸俯則火辰未伏當在霜降前雖節氣極晩不得十月昏見故仲尼曰丘聞之火伏而後蟄者畢今火猶西流司歴過也方夏后氏之初八月辰伏九月内火及霜降之後火已朝覿東方距春秋之季千五百餘年乃云火伏而後蟄者畢向使冬至常居其所則仲尼不得以西流未伏明是九月之初也自春秋至今又千五百嵗麟德歴以霜降後五日日在氐八度房心初伏定増二日以月蝕衝校之猶差三度閏餘稍多則建亥之始火猶見西方向使宿度不移則仲尼不得以西流未伏明非十月之候也自羲和以來火辰見伏三覩厥變然則丘明之記欲令後之作者參求微象以探仲尼之㫖是嵗失閏寖久季秋中氣後天三日比及明年仲冬又得一閏悟仲尼之言補正時歴而十二月猶可以螽至哀公十四年五月庚申朔日蝕以開元歴考之則日蝕前又増一閏魯歴正矣長歴自哀公十年六月迄十四年二月纔置一閏非是戰國及秦日却退三度始皇十七年辛未嵗冬至應在斗二十二度秦歴上元正月己巳朔晨初立春日月五星俱起營室五度蔀首日名皆直四孟假朔退十五日則閏在正月前朔進十五日則閏在正月後是以十有二節皆在盈縮之中而晨昏宿度隨之以顓頊歴依月令自十有二節推之與不韋所記合而頴子嚴之倫謂月令晨昏距宿當在中氣致雩祭太晩自乖左氏之文而杜預又據春秋以月令為否皆非是梁大同歴夏后氏之初冬至日在牽牛初以為明堂月令乃夏時之記據中氣推之不合更以中節之間為正廼稍相符不知進在節初自然契合自秦初及今又且千嵗節初之宿皆當中氣淳風因為說曰今孟春中氣日在營室昏明中星與月令不殊按秦歴立春日在營室五度麟德歴以啟蟄之日廼至營室其昏明中宿十有二建以為不差妄矣古歴冬至昏明中星去日九十二度春分秋分百度交至百一十八度率一氣差三度九日差一刻秦歴十二次立春在營室五度於太初星距危十六度少也昏畢八度中月令參中謂肩股也晨心八度中月令尾中於太初星距尾也仲春昏東井十四度中月令弧中弧星入東井十八度晨南斗二度中月令建星中於太初星距西建也甄耀度及魯歴南方有浪弧無東井鬼北方有建星無南斗井斗度長弧建度短故以正昏明云古歴星度及漢洛下閎等所測其星距逺近不同然二十八之宿體不異古以牽牛上星為距太初改用中星入古歴牽牛太半度於氣法當三十二分日之二十一故洪範傳冬至日在牽牛一度減太初星距二十一分直南斗二十六度十九分也顓頊歴立春起營室五度冬至在牽牛一度少洪範傳冬至所起無餘分故立春在營室四度太祖沖之自營室五度以太初星距命之因云秦歴冬至日在牽牛六度虞􅒠等襲沖之之誤為之說云夏時冬至日在斗末以嵗差考之牽牛六度乃顓頊之代漢時雖覺其差頓移五度故冬至還在牛初按洪範古今星距僅差四分之三皆起牽牛一度􅒠等所說亦非是魯宣公十五年丁夘嵗顓頊第十三蔀首與麟德歴俱以丁巳平旦立春至始皇三十三年丁亥凡三百八十嵗得顓頊歴壬申蔀首是嵗秦歴以壬申寅初立春而開元歴與麟德歴俱以庚午平旦差二日日當在南斗二十二度古歴後天二日又増二度然則秦歴冬至定在牛前二度氣後天二日日不及天二度微而難覺故吕氏循用之及漢興張蒼等亦以為顓頊歴比五家踈闊中最近宻今考月蝕衝則開元冬至上及牛初正差一次淳風以為古術踈舛雖弦望昏明差天十五度而猶不知又引吕氏春秋黄帝以仲春乙夘日在奎始奏十二鍾命之曰咸池至今三千餘年而春分亦在奎反謂秦歴與今不異按不韋所記以其月令孟春在奎謂黄帝之時亦在奎猶淳風歴冬至斗十三度因為黄帝時亦在建星耳經籍所載合於嵗差者淳風皆不取而專取於吕氏春秋若謂十二紀可以為正則立春在營室五度因當不易安得頓移使當啟蟄之節此又其所不思也漢四百二十六年日却差五度景帝中元三年甲午嵗冬至應在斗二十一度太初元年三統歴及周歴皆以十一月夜半合朔冬至日月俱起牽牛一度古歴與近代宻率相較二百年氣差一日三百年朔差一日推而上之久益先天引而下之久益後天僖公五年周歴正月辛亥朔餘四分之一南至以嵗差推之日在牽牛初至宣公十一年癸亥周歴與麟德歴俱以庚戌日中冬至而月朔尚先麟德歴十五辰至昭公二十年己夘周歴以正月己丑朔日中南至麟德歴以己丑平旦冬至哀公十一年丁巳周歴入己酉蔀首麟德歴以戊申禺中冬至恵王四十三年己丑周歴入丁夘蔀首麟德歴以乙丑日昳冬至吕后八年辛酉周歴入乙酉蔀首麟德歴以壬午黄昏冬至其十二月甲申人定合朔太初元年周歴以甲子夜半合朔冬至麟德歴以辛酉禺中冬至十二月癸亥晡時合朔氣差三十二辰朔差四辰此踈宻之大較也僖公五年周歴漢歴唐歴皆以辛亥南至後五百五十餘嵗至太初元年周歴漢歴皆得甲子夜半冬至唐歴皆以辛酉則漢歴後天三日矣祖沖之張胄元促上章嵗至太初元年沖之以癸亥鷄鳴冬至而胄元以癸亥日出欲令合於甲子而適與魯歴相㑹自此推僖公五年魯歴以庚戌冬至而二家皆以甲寅且僖公登觀臺以望而書雲物出於表晷天驗非時史億度乖丘明正時之意以就劉歆之失今考麟德元年甲子唐歴皆以甲子冬至而周歴漢歴皆以庚午然則自太初下至麟德差四日自太初上及僖公差三日不足疑也以嵗差考太初元年辛酉冬至加時日在斗二十三度漢歴氣後天三日而日先天三度所差尚少故洛下閎等雖後昏明中星歩日所在猶未覺其差然洪範太初所揆冬至昏奎八度中夏至昏氐十三度中依漢歴冬至日在牽牛初太半度以昏距中命之奎十一度中夏至房一度中此皆閎等所測自差三度則劉向等殆已知太初冬至不及天三度矣及永平中治歴者考行事史官注日常不及太初歴五度然諸儒守䜟緯以為當在斗初故賈逵等議石氏星距黄道規牽牛初直斗二十度於赤道二十一度也尚書考靈耀斗二十二度無餘分冬至日在牽牛初無牽牛所起文編訢等據今日所去牽牛中星五度於斗二十一度四分一與考靈耀相近遂更歴從斗二十一度起然古歴以斗魁首為矩至牽牛為二十二度未聞移牽牛六度以就太初星矩也逵等以末學僻於所傳而昧天象故以權誣之而後聽從他術以為日在牛初者由此遂黜今嵗差引而退之則辛酉冬至日在斗二十度合於宻率而有驗於今推而進之則甲子冬至日在斗二十四度昏奎八度中而有証於古其虛退之度又適及牽牛之初而沖之雖促減氣分氣符漢歴猶差六度未及於天而麟德歴冬至不移則昏中向差半次淳風以為太初元年得本星度日月合壁俱起建星賈逵考歴亦云古歴冬至皆起建星兩漢冬至日皆後天故其宿度多在斗末今以儀測建星在斗十三四度間自古冬至無差審矣按古之六術並同四分四分之法久則從天推古歴之作在漢初却較春秋朔並先天則非三代之前明矣古歴南斗至牽牛上星二十一度入太初星距四度上直西建之初故六家或以南斗命度或以建星命度方周漢之交日已潛退其襲春秋舊歴者則以為在牽牛之首其考當時之驗者則以為入建度中然氣朔前後不逾一日故漢歴冬至當在斗末以為建星上得太初本星度此其明據也四分法雖踈而先賢謹於天事其遷革之意俱有效於當時故太史公等觀二十八宿踈宻立晷儀下漏刻以稽晦朔分至躔離弦望其赤道遺法後世無以非之故雜候清臺太初最宻若當時日在建星已直斗十三度則壽王調歴宜允得其中豈容頓差一氣而未知其謬不能觀乎時變而欲厚誣古人也後百餘嵗至永平十一年以麟德歴較之氣當後天二日半朔當後天半日是嵗四分歴得辛酉蔀首已減太初歴四分日之三定後天二日太半開元歴以戊午禺中冬至日在斗十八度半弱潛退至午前八度進至辛酉夜半日在斗二十一度半弱續漢志云元和二年冬至日在斗二十一度四分之一是也祖沖之曰四分歴立冬景長一丈立春九尺六寸冬至南極日景最長二氣去至日數既同則中景應等而相差四寸此冬至後天之驗也二氣中景日差九分半弱進退調均畧無盈縮各退二日十二刻則景皆九尺八寸以此推冬至後天亦二日十二刻矣東漢晷漏定於永元十四年則四分法施行後十五嵗也二十四氣加時進退不等其去年止極逺者四十九刻有餘日中之晷頗有盈縮故治歴者皆就其中率以午正言之而開元歴所推氣及日度皆直子半之始其未及日中尚五十刻因加二日十二刻正得二日太半與沖之所筭及破章一百年間輙差一日之數皆合自漢時辛酉冬至以後天之數減之則合於今歴嵗差斗十八度自今歴戊午冬至以後天之數加之則合於賈逵所測斗二十一度反復僉同而淳風冬至常在斗十三度豈當時知不及牽牛五度而不知過建星八度耶晉武帝大始三年丁亥嵗冬至日當在斗十六度晉用魏景初歴其冬至亦在斗二十一度少太元九年姜岌更造三紀術退在斗十七度曰古歴斗分彊故不可施於今乾象斗分細故不可通於古景初雖得其中而日之所在乃差四度合朔虧盈皆不及其次假月在東井一度蝕以日檢之乃在參六度岌以月蝕衝知日度由是躔次遂正為後代治歴者宗宋文帝時何承天上元嘉歴曰四分景初歴冬至同在斗二十一度臣以月蝕檢之則今應在斗十七度又土圭測二至晷差三日有餘則天之南至日在斗十三四度矣事下太史考驗如承天所上以開元歴考元嘉十年冬至日在斗十四度與承天所測合大明八年祖沖之上大明歴冬至在斗十一度開元歴應在斗十三度梁天監八年沖之子員外散騎侍郎暅之上其家術詔太史令將作大匠道秀等較之上距大明又五十年日度益差其明年閏月十六日月蝕在虚十度日應在張四度承天歴在張六度沖之歴在張二度大同九年虞􅒠等議姜岌何承天俱以月蝕衝歩日所在承天雖移岌三度然其冬至亦在岌三日承天在斗十三四度而岌在斗十七度其實非移祖沖之謂為實差以推今冬至日在斗九度用求中星不合自岌至今將二百年而冬至在斗十二度然日之所在難知驗以中星則漏刻不定漢世課昏明中星為法已淺今候夜半中星以求日衝近於得宻而水有清濁壺有増減或積塵所擁故漏有遲疾臣等頻夜候中星而前後相差或至三度大畧冬至逺不過斗十四度近不出十度又以九年三月十五日夜半月在房四度蝕九月十五日夜半月在昴三度蝕以其衝計冬至皆在斗十一度自姜岌何承天所測下及大同日已却差二度而淳風以為晉宋以來三百餘嵗以月蝕衝考之固在斗十三四度間非矣劉孝孫甲子元歴推太初冬至在牽牛初下及晉太元宋元嘉皆在斗十七度開皇十四年在斗十三度而劉焯歴仁壽四年冬至日在黄道斗十度於赤道斗十一度也其後孝孫改從焯法而仁壽四年冬至日亦在斗十度焯卒後胄元以其前歴上元起虛五度推漢太初猶不及牽牛乃更起虛七度故太初在斗二十三度永平在斗二十一度並與今歴合而仁壽四年冬至在斗十三度以驗近事又不建其前歴矣戊寅歴太初元年辛酉冬至進及甲子日在牽牛三度永平十一年得戊午冬至進及辛酉在斗二十六度至元嘉中氣上景初三日而冬至猶在斗十七度欲以求合反更失之又曲循孝孫之論而不知孝孫已變從皇極故為淳風等所較嵗差之術由此不行以太史注記月蝕衝考日度麟德元年九月庚申月蝕在婁十度至開元四年六月庚申月蝕在牛六度較麟德歴率差三度則今冬至定在赤道斗十度又皇極歴嵗差皆自黄道命之其每嵗周分常當南至之軌與赤道相較所減尤多計黄道差三十六度赤道差四十餘度雖每嵗遯之不足為過然立法之體宜盡其原是以開元歴皆自赤道推之乃以今有術從變黄道其八日躔盈縮畧例曰北齊張子信積候合蝕加時覺日行有入氣差然損益未得其正至劉焯立盈縮躔衰術與四象升降麟德歴因之更名躔差凡隂陽往來皆馴積而變日南至其行最急急而漸損至春分及中而後遲迨日北至其行最舒而漸益之以至秋分又及中而後益急急極而寒若舒極而燠若及中而雨暘之氣交自然之數也焯術於春分前一日最急後一日最舒秋分前一日最舒後一日最急舒急同于二至而中間一日平行其說非是當以二十四氣晷景考日躔盈縮而宻於加時其九九道議曰洪範傳云日有中道月有九行中道謂黄道也九行者青道二出黄道東朱道二出黄道南白道二出黄道西黒道二出黄道北立春春分月東從青道立夏夏至月南從朱道立秋秋分月西從白道立冬冬至月北從黒道漢史官舊事九道術廢久劉洪頗採以著遲疾隂陽歴然本以消息為竒而術不傳推隂陽歴代在冬至夏至則月行青道白道所交則同而出入之行異故青道至春分之宿及其所衝皆在黄道正東白道至秋分之宿及其所衝皆在黄道正西若隂陽歴交在立春立秋則月循朱黒道所交則同而出入之行異故朱道至立夏之宿及其所衝皆在黄道西南黒道至立冬之宿及其所衝皆在黄道東北若隂陽歴交在春分秋分之宿則月行朱道黑道所交則同而出入之行異故朱道至夏至之宿及其所衝皆在黄道正南黑道至冬至之宿及其所衝皆在黄道正北若隂陽歴交在立夏立冬則月循青道白道所交則同而出入之行異故青道至立春之宿及其所衝皆在黄道東南白道至立秋之宿及其所衝皆在黄道西北其大紀皆兼二道而實分主八節合于四正四維按隂陽歴中終之所交則月行正當黄道去交七日其行九十一度齊於一象之率而得八行之中八行與中道而九是謂九道凡八行正於春秋其去黄道六度則交在冬夏正於冬夏其去黄道六度則交在春秋易九六七八迭為終始之象也乾坤定位則八行各當其正及其寒暑相推晦朔相易則在南者變而居北在東者徙而為西屈伸消息之象也黄道之差始自春分秋分赤道所交前後各五度為限初黄道増多赤道二十四分之十二毎限損一極九限數終于四率赤道四十五度而黄道四十八度至四立之際一度少彊依平復從四起初限五度赤道増多黄道二十四分之四每限益一極九限而止終于十二率赤道四十五度而黄道四十二度復得冬夏至之中矣月道之差始自交初交中黄道所交亦距交前後五度為限初限月道増多黄道四十八分之十二毎限損一極九限而止數終于四率黄道四十五度而月道四十六度半乃一度彊依平復從四起初限五度月道差少黄道四十八分之四每限益一極九限而止終于十二率黄道四十五度而月道四十三度半至隂陽歴二交之半矣凡近交初限増十二分者至半交末限減十二分去交四十六度得損益之平率夫日行與嵗差偕遷月行與交限而變遯伏相消朓朒相補則九道之數可知矣其月道所交與二分同度則赤道黑道近交初限黄道増一十四分之十二月道増四十八分之十二至半夜之末其減亦如之故於九限之際黄道差三度月道差一度半盖損益之數齊也若所交與四立同度則黄道在損益之中月道差四十八分之十一月道至損益之中黄道差二十四分之十二於九限之際黄道差三度月道差四分度之三皆朓朒相補也若所交與二至同度則青道白道近交初限黄道減二十四分之十二月道増四十八分之十二至半夏之末黄道増二十四分之十二月道減四十八分之十二於九限之際黄道與月道差同盖遯伏相消也日出入赤道二十四度月出入黄道六度相距則四分之一故於九道之變以四立為中交在二分增四分之一而與黄道度相半在二至減四分之一而與黄道度正均故推極其數引而伸之毎氣移一候月道所差増損九分之一七十二候而九道究矣凡月交一終退前所交一度及餘八萬九千七百七十三分度之四萬二千五百三少半積二百二十一月及分七千七百五十三而交道周天矣因而半之將九年而九道終以四象考之各據合朔所交入七十二候則其八道之行也以朔交為交初望交為交中若交初在冬至初候而入隂歴則行青道又十三日七十六分日之四十六至交中得所衝之宿變入陽歴亦行青道若交初入陽歴則白道也故考交初所入而周天之度可知若望交在冬至初候則減十三日四十六分視大雪初候隂陽歴而正其行也其于晷漏中星畧例曰日行有南北晷漏有長短然二十四氣晷差徐疾不同者句股使然也直規中則差遲與句股數齊則差急隨辰極髙下所遇不同如黄道刻漏此乃數之淺者近代且猶未曉今推黄道去極與晷景漏刻昏距中星四術返覆相求消息同率旋相為中以合九服之變其十一日蝕議曰小雅十月之交朔日辛夘虞􅒠以歴推之在幽王六年開元歴定交分四萬三千四百二十九入蝕限加時在晝交㑹而蝕數之常也詩云彼月而食則維其常此日而食于何不臧日君道也無胐魄之變月臣道也逺日益明近日益虧望與日軌相㑹則徙而浸逺逺極又徙而近交所以著臣人之象也望而正於黄道是謂臣干君明則陽斯蝕之矣朔而正於黄道是謂臣壅君明則陽為之蝕矣且十月之交於歴當蝕君子猶以為變詩人悼之然則古之太平日不蝕星不孛盖有之矣若過上未分月或變行而避之或五星潛在日下禦侮而救之或渉交數淺或在陽歴陽盛隂微則不蝕或德之休明而有小青焉則天為之隠雖交而不蝕此四者皆德教之所由生也四序之中分同道至相過交而有蝕則天道之常如劉歆賈逵皆近古大儒豈不知軌道所交朔望同術哉以日蝕非常故闕而不論黄初已來治歴者始課日蝕踈宻及張子信而益詳劉焯張胄元之徒自負其術謂日月皆可以宻率求是專於歴紀者也以戊寅麟德歴推春秋日蝕大最皆入蝕限於歴應蝕而春秋不書者尚多則日蝕必在交限其入限者不必盡蝕開元十二年七月戊午朔於歴當蝕半彊自交趾至于朔方候之不蝕十三年十二月庚戌朔於歴當蝕太半時東封泰山還次梁宋間皇帝徹饍不舉樂不盖素服日亦不蝕時羣臣與八荒君長之來助祭者降物以需不可勝數皆奉壽稱慶肅然神服雖等術乖舛不宜如此然後知德之動天不俟終日矣若因開元二蝕曲變交限而從之則差者益多自開元治歴史官每嵗較節氣中晷因檢加時小餘雖大數有常然亦與時推移每嵗不等晷變而長則日行黄道南晷變而短則日行黄道北行而南則隂歴之交也或失行而北則陽歴之交也或失日在黄道之中且猶有變况月行九道乎杜預云日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不蝕者或有頻交而蝕者是也故較歴必稽古史虧蝕深淺加時朓朒隂陽其數相叶者反覆相求由歴數之中以合辰象之變觀辰象之變反求歴數之中𩔖其所同而中可知矣辨其所異而變可知矣其循度則合于歴失行則合于占占道順成常執中以追變歴道逆數常執中以俟變知此之說者天道如視諸掌畧例曰舊歴考月蝕淺深皆自張子信所傳云積候所得而未曉其然也以圓儀度日月之徑乃以月徑之半減入交初限一度半餘為闇虛半徑以月去黄道每度差數令二徑相掩以驗蝕分以所入日遲疾乘徑為泛所用刻數大率去交不及三度即月行没在闇虛皆入既限又半日月之徑減春分入交初限相去度數餘為斜射所差乃考差數以立既限而優㳺進退於二度中間亦令一徑相掩以知日蝕分數月徑踰既限之南則雖在隂歴而所虧𩔖同外道斜望使然也既限之外應向外蝕外道交分準用此例以較古今日蝕四十三事月蝕九十九事課皆第一使日蝕皆不可以常數求則無以稽厯數之踈宻若皆可以常數求則無以知政教之休咎今更設考日蝕或限術得常則合于數又日月交㑹大小相若而月在日下自京師斜射而望之假中國食既則南方戴日之下所虧纔半月外反觀則交而不蝕歩九服日晷以定蝕分晨昏漏刻與地偕變則宇宙雖廣可以一術齊之矣其十二五星議曰嵗星自商周迄春秋之季率百二十餘年而超一次戰國後其行寖急至漢尚微差及哀平間餘勢乃盡更八十四年而超一次因以為常此其與餘星異也姬氏出自靈威仰之精受木行正氣嵗星主農祥后稷憑焉故周人常閱其禨祥而觀善敗其始王也次于鶉火以達天黿及其衰也淫于𤣥枵以害鳥帑其後羣雄力爭禮樂隕壞而從衡攻守之術興故嵗星常贏行於上而侯王不寧於下則木緯失行之勢宜極於火運之躔理數然也開元十二年正月庚午嵗星在進賢東北尺三寸直軫十二度於麟德歴在軫十五度推而上之至漢河平二年其十月下旬嵗星在軒轅南耑大星西北尺所麟德歴在張二度直軒轅大星上下相距七百五十年考其行度猶未甚盈縮則哀平後不復每嵗漸差也又上百二十年至孝景中元三年五月星在東井鉞麟德歴在參三度又上六十年得漢元年十月五星聚于東井從嵗星也於秦正嵗在乙未夏正當在甲午麟德厯白露八日嵗星留觜觽一度明年立夏伏于參由差行未盡而以常數求之使然也又上二百七十一年至哀公十七年嵗在鶉火麟德厯初見在輿鬼二度立冬九日留星三度明年啟蟄十日退至栁五度猶不及鶉火又上百七十八年至僖公五年嵗星當在大火麟德厯初見在張八度明年伏于翼十六度定在鶉火差三次矣哀公以後差行漸遲相去猶近哀公以前率常行遲而舊歴猶用急率不知合變故所差彌多武王革命嵗星亦在大火而麟德歴在東壁三度則唐虞已上所差周天矣太初三統歴嵗星十二周天超一次推商周間事大抵皆合驗開元注記差九十餘度盖不知嵗星後率故也皇極麟德歴七周天超一度以推漢魏間事尚未差上驗春秋所載亦差九十餘度盖不知嵗星前率故也天保天和歴得二率之中故上合於春秋下猶宻於記注以推永平黄初間事逺者或差三十餘度盖不知戰國後嵗星變行故也自漢元始四年距開元十二年凡十二甲子上距隠公六年亦十二甲子而二歴相合於其中或差三次於古或差三次於今其兩合於古今者中間亦乖欲一術以求之則不可得也開元歴嵗星前率三百九十八日餘二千二百一十九杪九十三自哀公二十年丙寅後每加度餘一分盡四百三十九合次合乃加杪十三而止凡三百九十八日餘二千六百五十九杪六而與日合是為嵗星後率自此因以為常入漢元始六年也嵗星差合術曰置哀公二十年冬至合餘加入差已來中積分以前率約之為入差合數不盡者如歴術入之反求冬至後合日乃副列入差合數増下位二筭乘而半之盈大衍通法為日不盡為日餘以加合日即差合所在也求嵗星差行徑術以後終率約上元以來中積分亦得所未盡若稽其實行當從元始六年置差歩之則前後相距間不容髪而上元之首無忽微空積矣成湯伐桀嵗在壬戌開元歴星與日合于角次于氐十度而後退行其明年湯始建國為元祀順行與日合于房所以紀商人之命也後六百一筭至紂六祀周文王初禴于畢十二祀嵗在己夘星在鶉火武王嗣位克商之年進及輿鬼而退守東井明年周始革命順行與日合于栁進留于張考其分野則分陕之間與三監封域之際也成王三年嵗在丙午星在大火唐叔始封故國語曰晉之始封嵗在大火春秋傳僖公五年嵗在大火晉公子重耳自蒲奔狄十六年嵗在壽星適齊過衛野人與之塊子犯曰天賜也天事必象嵗及鶉火必有此乎復于壽星必獲諸侯二十三年嵗星在胃昴秦伯納晉文公董因曰嵗在大梁將集天行元年實沈之星晉人是居君之行也嵗在大火閼伯之星也是謂大辰辰以善成后稷是相唐叔以封且以辰出而以參入皆晉祥也二十七年嵗在鶉火晉侯伐衛取五鹿敗楚師于城濮始獲諸侯嵗適及壽星皆與開元歴合襄公十八年嵗星在陬訾之口開元歴大寒三日星與日合在危三度遂順行至營室八度其明年鄭子蟜卒將葬公孫子羽與裨竈晨㑹事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是嵗在降婁中而曙禆竈指之曰猶可以終嵗嵗不及此次也開元歴嵗星在奎奎降婁也麟德歴在危危𤣥枵也二十八年春無氷梓慎曰嵗在星紀而淫於𤣥枵禆竈曰嵗棄其次而旅於明年之次以害鳥帑周楚惡之開元歴嵗星至南斗十七度而退守西建間復順行與日合于牛初應在星紀而盈行進及虛宿故曰淫留𤣥枵二年至三十年開元歴嵗星順行至營室十度留距子蟜之卒一終矣其年八月鄭人殺良宵故曰及其亡也嵗在陬訾之口其明年乃及降婁昭公八年十一月楚滅陳史趙曰未也陳顓頊之疾也嵗在鶉火是以卒滅今在析木之津猶將復由開元歴在箕八度析木津也十年春進及婺女初在𤣥枵之維首傳曰正月有星出于婺女禆竈曰今兹嵗在顓頊之墟是嵗與日合于危其明年進及營室復得豕韋之次景王問萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般殺其君之嵗嵗在豕韋弗過此矣楚將有之嵗及大梁蔡復楚凶至十三年嵗星在昴畢而楚弑靈王陳蔡復封初昭公九年陳灾禆竈曰後五年陳將復封嵗五及鶉火而後陳卒亡自陳灾五年而嵗在大梁陳復建國哀公十七年五及鶉火而楚滅陳是年嵗星與日合在張六度昭公三十一年夏呉伐越始用師於越也史墨曰越得嵗而呉伐之必受其凶是嵗星與日合于南斗二度昔僖公六年嵗隂在夘星在析木昭公三十二年亦嵗隂在夘而星紀故三統歴因以為超次之率考其實猶百二十餘年近代諸歴欲以八十四年齊之此其所惑也後三十八年而越滅呉星三及斗牛已入差合二年矣夫五事感於中而五行之祥應于下五緯之變彰于上若聲發而響和形動而影隨故王者失典刑之正則星辰為之亂行汨彛倫之序則天事為之無象當其亂行無象又可以歴紀齊乎故襄公二十八年嵗在星紀淫于𤣥枵至三十年八月始及陬訾之口超次而前二年守之漢元鼎中太白入于天苑失行在黄道南三十餘度間嵗武帝北廵守登單于臺勒兵十八萬騎又誅大苑馬大死軍中晉咸寧四年九月太白當見不見占曰是謂失舎不有破軍必有亡國時將伐呉明年三月兵出太白始夕見西方而呉亡永寧元年正月至閏月五星經天縱横無常永興二年四月丙子太白犯狼星失行在黄道南四十餘度永嘉三年正月庚子熒惑犯紫微皆天變所未有也終以二帝䝉禍天下大亂後魏神瑞二年十二月熒惑在匏𤓰星中一夕忽亡不知所在崔浩以日辰推之曰庚午之夕辛未之朝天有隂雲熒惑之亡在此二日庚午辛未皆主秦辛為西夷今姚興據咸陽是熒惑入秦矣其後熒惑果出東井留守盤旋秦中大旱赤地昆明水竭明年姚興死二子交兵三年國滅齊永明九年八月十四日火星應退在昴三度先歴在畢二十一日始逆行北轉垂及立冬形色彌盛魏永平四年八月癸未熒惑在氐夕伏西方亦先期五十餘日雖時歴踈闊不宜若此隋大業九年五月丁丑熒惑逆行入南斗色赤如血大如北斗噐光芒震耀長七八尺於斗中句己而行亦天變所未有也後楊𤣥感反天下大亂故五星留逆伏見之効表裏盈縮之行皆係之於時而象之於政政小失則小變事微而象微事章而象章己示吉凶之象則又變行襲其常度不然則皇天何以隂隲下民警悟人主哉近代筭者昧於象占者迷於數覩五星失行皆謂之歴舛雖七曜循軌猶或謂之天灾終以數象相䝉而喪其實故較歴必稽古今注記入氣均而行度齊上下相距反復相求茍獨異於常則失行可知矣凡二星相近多為之失行三星以上失度彌甚天竺歴以九執之情皆有所好惡遇其所好之星則趣之行疾捨之行遲張子信歴辰星應見不見術晨夕去日前後四十六度内十八度外有木火土金一星者見無則不見張胄元歴朔望在交限有星伏在日下木土去見十日外火去見四十日外金去見二十二日外者並不加減差皆精氣相感使然夫日月所以著尊卑不易之象五星所以示政教從時之義故日月之失行也微而少五行之失行也著而多今畧考常數以課踈宻畧例曰其入氣加減亦自張子信始後人莫不遵用之原始要終多有不叶今較麟德歴熒惑太白見伏行度過與不及熒惑凡四十八事太白二十一事餘星所差盖細不足考且盈縮之行宜與四象潛合而二十四氣加減不均更推易數而正之又各立嵗差以究五精運周二十八舎之變較史官所記嵗星二十七事熒惑二十八事鎮星二十一事太白二十二事辰星二十四事開元歴課皆第一云歴代名臣奏議卷二百七十九
