body:
  text: 厯代名臣奏議卷三百四明楊士竒等撰灾祥宋哲宗元祐四年御史中丞傳堯俞上奏曰臣伏覩旱勢太甚為害非輕聖心焦勞和氣未應臣聞應天以實不以文又聞萬方有罪在豫一人自古聖帝明王莫不引咎自責故以誠感格者多矣是以凡有災異或減膳不御正殿思譴責躬以消弭其變不惟民被其福而上德益光臣願陛下講尋故事以致憂勤之意擇日親出為人祈請及選朝臣謹重嚴恪者分詣五嶽四瀆名山大川精加祠禱仍詔所撰祝詞深自刻責務在感動人神庶幾必有顯應右諫議大夫范純仁論消復隂沴疏曰臣竊見去冬以來寒雪過常今已中春隂沴未解商賈束手不能營生貧困之民死者甚衆聖心憂勞修德禳變賑恤備至祈禱精䖍尚猶未有消復之應臣竊思之君子為陽小人為隂或慮朝廷之士君子少而小人多因致隂氣過盛而陽不能勝也伏望深詔三省選用正人在外者使復歸朝廷在京者拔居要近俾得聚㑹精神講求政要以禆聖治所謂舉直錯枉庶使民心恱服自然協氣應誠災異不作七年簽書樞密院事王巖叟上奏曰臣伏見去歲日食五月朔今歲月食三月望且食之既按十月之交詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫于日月之災故政不可不謹也又曰彼月而食則維其常此日而食于何不臧考吉凶之言則日月之食以為戒考維常之語則若專戒日食而不以月食為可畏蓋詩人之時事異於今今方兩宫同聽天下之政實日月並明之道俱不當有薄食之變也臣竊惟皇帝陛下以光明純粹之德淵默臨朝太皇太后陛下以仁義公恕之行發而為政蓋無一不當天心者然則何為謫見于月食之災臣殆恐隂邪道長有以䝉蔽盛明而聖心不以為疑故天見變異以示警戒此天心之仁愛陛下而欲全聖德之美也消復之應宜在此時願陛下用人之際則審邪正使必得其真聽言之際則察是非使必歸於當斥逺隂類深防䝉蔽之害以答天意臣愚不勝幸甚八年春多雪刑部侍郎豐稷上言曰今嘉祥未臻沴氣交作豈應天之實未充事天之禮未備畏天之誠未孚歟宫掖之臣有關豫政事如天聖之羅崇勳江德明治平之任守忠者歟願陛下昭聖德祇天戒總正萬事以消災變右正言鄒浩以京東大水上言曰今頻年水異繼作雖盈虛之數所不可逃而消復之方尤宜致謹書曰惟先格王正厥事不以為數之當然此消復之實也紹聖元年翰林學士范祖禹上畏天劄子曰臣伏見今月一日日食不盡如鈎見者駭懼以為數十年來日食之異未有如此之甚者也臣聞日食者隂侵陽臣侵君也自古隂盛陽微小人浸長虧損人君之明則謫見于天日為之食陛下初御前殿聽政月朔之日皇天見異以警聖心雖言語丁寧不過於此矣陛下所宜恐懼修省以答天戒深思變異之來殆由人事有以感致之務在安靜以寧人心夫天人之際相去不逺應如影響不可不畏能應之以德則災變而為福異變而為祥不能應之以德則重違天意何由消弭臣恐邪人佞臣欲寬陛下聖慮或言日食自有定數又云天道逺而難知此乃小人誤國之言非聖人畏天之意也惟陛下留神省察臣不勝灼怛憂國之至四年陳并上奏曰臣伏承詔書以彗星西見大赦天下許中外臣寮直言朝廷闕失此陛下敬天愛民罪已好諫之至也臣聞主聖臣直臣備員江外山縣窮僻之地心念朝廷不敢隨衆唯唯輒陳愚見商書曰惟吉凶不僭在人惟天降災祥在德天下之治安常以聽直言近正人公喜怒消朋黨明法度節財用謹興兵不事遊觀不邇聲色不急功利不惑佛老非獨治安也榮莫大焉天下之危亂常在於逆忠直近纎佞私好惡縱朋黨紊法度費財用好攻戰事遊觀惑聲色急功利尚佛老非特危亂也辱莫甚焉陛下禀堯舜聰明之資聖德學問日益光明求賢納諫聲聞中外然進用之人或緣不用已而執仇或觀望大臣而隂助或元祐持兩端竊位幸用之人伺意希合豈免偏私臣昨聞榜朝堂不得附㑹言事其熙寧元豐無問賢不肖其所行無問是不是則目為同心稍言非是便相語以指斥先帝則為乖背中書舍人葉濤謂觀文殿學士安燾為無甚過則以濤為非奪職知光州權中書舍人沈銖以户部侍郎吳居厚為聚斂掊刻之人繳還詞頭則以銖為踈羅織罰金夫詞臣以言而被責臣下又不得越職言事臺諫為陛下耳目官可以言而不言則是言路壅塞下情不通利害不達非太平之道也乃者彗星見于西按漢厯志有掃除之象又云其炎或短或長內為後宫之害外為諸夏之禍又記齊景公彗星見而泣晏子曰君無德於國穿池沼則欲深以廣也為臺榭則欲髙且大也賦斂如攘奪誅戮如仇讎彗星之出庸可懼也是時孟皇后廢天意驗於上必當以人事驗於下聖心恐懼徹膳避殿赦宥辜罪求言悔過中外聞之率皆鼓舞知陛下因變而增修其德如周宣之側身修行而弭災宋景公出人君之言而星退舍真皇咸平間有妖星見營室北詔令臣下極言得失仁皇以彗出亦嘗下詔求諫陛下今日所行以周宣宋景為不足學而稽祖宗之盛言路開闢聖政日新忠臣義士將接迹而出遭際有道誰惜危言然臣聞諂諛軟熟之言易於聽無益於治忠鯁法度之言逆於耳有補於時譬如良藥雖苦口而利於病焉臣不避斧鉞之誅竊謂缺失其大有四中宫廢居瑶華姬妾寵盛一也逐臣未見牽復臣下互立朋黨二也百官趨時而迎合臺諫觀望而不言三也廷臣好談兵邊將喜攻戰四也所謂中宫廢居瑶華姬妾寵盛者臣試言之陛下日象也皇后月象也日之與月天地隂陽相資之理而坤無以承乾則無以母儀天下一旦置之瑶華宫中外駭聞且舜使堯女能盡婦道文王以御始于寡妻今閭巷賤夫尚以出妻為恥況陛下為天地神明之主言而為天下後世法行而為天下後世則朝行乎一堂之上暮傳之四方萬里之逺夫婦之道體合乾坤理干風化豈可容易廢黜臣聞有過則誅若無過惡不過詰責詰責不已不過放之别館誘掖誨諭使之改悔設有忤㫖不過猜妬乃婦人之常情今幽置瑶華外宫以為罪大也則不置之死以為罪小也則不應終廢且未聞别降詔選后天下疑之臣亦竊以為疑慶厯中仁皇欲廢郭皇后為庶人司諫范仲淹諫曰后者所以長隂教而母萬國不宜以過失輕廢且人孰無過陛下當論后之失放之别館擇嬪妃老者侍之俟其悔而復宫書奏不納明日又率其屬伏閣論列上遣中貴人押往中書商量宰相順㫖以漢唐有廢后故事仲淹曰上天資堯舜相公奈何以前世弊法纍盛德御史中丞亦與宰相廷辨其非仲淹以言事出后廢瑶華宫其後上嘗密召郭后后欲宰相召百官立班受冊方拜命今陛下規摹所期直欲在堯舜之上豈宜復用漢唐下衰之時已弊之故事耶后決無大過也自可再冊后令復宫以協天人之願以正乾坤之位以著日月之象諒陛下非不知此遲遲未肯召者必左右毁之也必寵愛蔽之也內則閹宦嬖佞助言其非外則百執事之人順以為是下不能躋上於唐虞之盛而致陛下於有過之地以漢唐之弊法同其稱臣竊為陛下不取也願陛下俯回天鑒復正中宫之位使後日史冊全美天下幸甚所謂逐臣未見牽復臣下互立朋黨者臣試言之陛下以妖星譴告深自戒懼大施曠蕩之恩有罪之人咸得自新至於殺人情輕尚獲全宥滌濯收召和氣奈何被逐之臣尚未牽復人情未順天意亦乖元祐名曰垂簾其實陛下自總機務事皆奏可然後得行一時大臣念嘗為陛下左右輔相雖趨嚮乖背不為無過古人言投鼠忌器無祐之改更為形比先帝則今日有所行亦不無形比陛下理宜顧惜國體乘此大霈應逺竄舊臣召還近地漸復其職天下皆知其過陛下容而貸之是增益陛下天德之大內外諸臣不復分黨此一舉而數善得也臣元豐中擢進士第元祐中實不䝉召用今日亦不敢干進故言之無嫌蔡確之死當時士大夫私曰此太皇太后之意也臣下無復敢言今劉摯蘇軾之徒放之嶺表瘴癘之地吕大防死於半塗范純仁置之逺地其他棄逐紛紛不可勝數士大夫又曰上意也臣下又無復敢言是過則稱君善則稱已非所謂忠也夫人所學所守各自有趨嚮不能齊也在朝廷用不用如何爾舜之命禹欲征有苖益以為不可周公之東征羣臣異議獨十夫以為可王恢韓安國之論征伐張湯汲黯之同朝封倫魏證之論法度皆各有所見人擇其可而用之未聞加罪於異見之人陛下天容地受父生母育無一民非王民也無一臣非王臣也雷霆之怒不當於臣下計較如天地之於萬物溥施無報父母之於子有教無棄此天下陛下之天下陛下之天下乃祖宗之天下前後用事大臣乃藉利勢利器恃為已私公肆喜怒以得勝為快訩訩紛擾自為朋黨非天下福也臣願陛下召還逐臣選用正人改法行事姑務安靜朋黨既消則朝廷日尊人心既協則和氣日生天下幸甚所謂百官趨時而迎合臺諫觀望而不言者臣試言之唐太宗有房杜為相有王魏善諫近世如仁宗朝容納諫諍其甚切直者量行貶謫近不過三兩月逺不過半年例行牽復或遂召用如此則忠臣肯言義士感激無所顧忌所以得聞缺失保守太平陛下繼人主守成之大業堯父舜子重規疊矩文經武緯聖作明述可謂已盛已盈矣已盛者必善守已盈者必善持宜其憂勤兢畏以保無疆之休幸天誘陛下之清衷韜養聖資有不言之敏德不怒之神威終之以禮樂無以復加矣傳曰治天下之要莫若靜今用事言事之臣不求安靜以酬恩怨為急百官之中少識廉恥貪愛爵祿務肥妻子者紛紛如也其間尊君愛國以忠義名節自期千百之中無二三人且以近事言之王安石為相門下客常不下數百人安石罷相則移之吕惠卿之門惠卿貶黜則移之吳充王圭蔡確之門逮元祐則移之司馬光之門光死則移之吕大防之門大防出則又移今日執政之門宰相意在東則東意在西則西欲財利則財利欲邊事則邊事隨事變轉隨口上落今之人材卑汙如此甚可恐也能言元祐之非能順執政之意者薦之登對其次堂除不能言元祐之非不能順執政之意者送歸吏部雖有忠臣義士無因得言無路得進近者所用言事官非執政門人則其親故同里之人言人之善必視君相意㫖之所必喜言人之惡必視君相意㫖之所必惡助恩助仇至有章疏屢上不報而不決去就或以不敢言而求他職或以親老不可言而求外補臺諫削弱風憲不振良以所用非其人之所致也如侍御史董敦逸司諫郭知章乃是元祐用事之人在元祐則不言元祐之非所以能安其身逮紹聖之後爭言元祐所用所行無一事是乃獲安其身此兩面之人操兩可之說非所謂一心事上者也鄉原之徒君子切齒而二人偃然居之不自羞愧使陛下不聞過失助百官以報恩仇敦逸知章負天下甚矣如皇后廢而未復逐臣久而未還聚斂之臣復進閹宦用事內降妨公臺榭侈費民力殫窮邊帥生事士無廉恥釋老害教朝綱未正法度未清役法未均水旱頻仍略不聞力言縱言之不聽未見緣言事而出者低回茍祿以要大用今所力言者不過暴斥垂簾之事多形瑣碎之言一切迎合亦未容全是也仁皇初即位嘗詔內外不許言太后垂簾日事詔之大略曰太后保佑冲人十餘年間四海安靜紀綱不亂今言事者多挾情迎合罔識逺圖靡循理體今後不得輒有上言庶永先猷式敦教本此詔最為近厚紹聖以後臣嘗觀陛下有詔謂垂簾時事及元祐大臣有一切勿問之語與仁皇詔書意合然而進用之人既盛日與仇人為敵欲其必死而後已又希進干祿求媚取恱之人不言元祐之失則為背馳陛下雖有此詔其實臣下不行陛下之詔意中書樞密今所謂執政官有六人而閩人居其五先王之時取賢無方或取於漁鹽或取於耕築或取於仇讎未聞止於取一路也中書侍郎許將元祐為翰林學士一日獨班宣見明日除尚書右丞蔡確南行之日也今尚書右丞黃履在元祐為御史中丞凡涉數年不知所救何失所爭何事設言之不行則亦不可已尋以已事為他人所攻罷職不知履何以自處或以先朝嘗以善財利稱而今復用或以詞誥善罵而擢之要近如昨被責閹宦不唯牽復更加寵用此輩只宜備使令不當使豫中書政事願陛下察視多士惟賢是用潜消朋黨悉為王臣招致直言虛心悔省法度求當無問新舊天下幸甚所謂廷臣好談兵邊帥喜攻戰者臣試言之今急功利之人多無逺慮但務以雪恥為名挑剔起事徑入築城士卒不得休息轉輸絡繹於道臣恐勤兵勞衆雖得所侵舊境邊田無所用之所可憂者在乎內地也莫易於取之莫難於守之芻糧器械積之府庫適為其所資也以臣所見不若謹備自治以待之其太盛不軌之甚則戰戰之有名無有不勝其次俟其少衰當自歸服如趙充國之屯田以不戰勝之也陛下自免西顧之憂有榮無辱然後選忠厚政事智敏老成之人為之帥則得民之心一可當百兵懦馬飢用無紀律雖驅而使之戰百不當一今鍾傳江外書生始為閹人李憲門客因緣得官素號輕浮今以一方重事委之又以館職誘之可攻可戰有進有退不能臨事而懼好謀而成不唯無功恐辱國命熙寧初富弼議事不合罷相去之日告先帝曰陛下二十年莫說用兵王安石五事書一曰和戎是皆天下安靖肥富而後可以言兵也所謂莫說用兵者非不為兵備其意謂先帝熙寧初即位未久厯事未多天下未富未可輕用其民逮元豐間陜右五路進兵有靈武之不利永洛築城有徐禧之敗事先帝謂在廷輔臣曰作事如此之難邊奏至屢為泣下信乎邊事不可容易民之死生國之安危君之榮辱係焉不可不知也臣前謂太盛不軌則戰戰之有名無有不勝此自投禍也故取之易其次俟其少衰自當歸服此前世驗也凡言禦西戎之䇿多以斷西北交結之勢漢武帝命衛霍屢空其巢穴列為張掖酒泉武威燉煌等郡魏晉以下赫連等互據西河涼州之地奄有靈夏唐開西域始復其地置都護節度僖宗以後例授功臣五代擾攘封李仁福為西平王我太祖經略四方未暇逺略故彛興尚世襲領節鉞至四世外繼遷叛盡據夏宥銀綏之地淳化中始納欵歸服太宗易姓改名籍于宗正至道中復叛景德中又叛其子德明尚孤幼又值契丹北和無以為援懼我朝廷併取乃堅上表以示臣服真宗慈仁寬量不惜靈夏數州之地遂以為定難軍賜以西平王號使當時乘其勢衰力敗有攻必取建州邑置靈武安西都護府擇帥之賢者且制且撫則㳂邊鄜延環慶不復有今日之患其間元昊僭號遣楊守素入朝納旌節犯延州執劉平石元孫又入渭州界好水川殺葛懷敏輩臣以所見西羌叛服往來不常正如虎豹之性不足怪也德明之衰弱可以攻取而不取元昊之僭可以問罪而不問所以養成其惡也今西戎謂之盛則有罪謂之衰則不臣宜選帥訓兵謹備斥堠俟之歲月彼當自屈服歸疆然後置都護府廣開營田足食足兵攻守兩得以永國家之利天下幸甚臣所陳四說願陛下稍霽天威容納而行之負薪之賤或有廊廟之語陛下自視孰與成王賢且成王有周公旦為師召公奭為保又有閎散之徒朝夕講道明義為欲致其君於堯舜之上身不比嬖佞纎巧之小人耳不聞近習小利之邪說目不覩爭地兵戰之危事聲色者不得惑遊畋者不得作貨利者不得萌德已進矣尚猶有訪落之謀廟小毖之求助七月之陳王業公劉之戒民事無逸之戒盤遊無諫不從無言不聽而召公尚有不恱憂王之意如此乃能君臣相濟上下維持以成太平今近臣則爭曰陛下聖德已成羣臣皆所不及無用諫諍言事之臣又不過指斥一二差除小事與今日不得志之人於國家大利害天下之大本末未聞議論今左右倚為廟堂之柱石者為誰賴以為醫工之藥石者為誰為陛下之股肱耳目者為誰恭惟先皇帝德業茂盛播在四海陛下當思所以繼之之難不宜輕信偏聽容易持守詩書之所責備成王者謂文武之業難繼也仁宗皇帝所以享國四十餘年內外無事以能聽諫諍也唐陸贄好諫自謂上不負天子下不負所學言之茍利於國有補於君臣雖死不恨晉靈公冬寒鑿池宛春諫之若謂鑿池天寒以春言罷役則是怨歸於公恩歸於春靈公曰宛春有善寡人能用之春之善則寡人之善也遂罷役裴延齡佞人帝欲相之陽城等詣延英門論爭伏閣不去帝怒左右懼不測金吾將軍張萬福大言曰國家有直臣天下無慮矣吾年今八十與見盛事臣學術蹇淺言無文采發於孤忠言無忌諱願陛下萬機之暇少賜睿鑒幸而采擇念祖宗艱難之業除去四說之患若稽先王之道以措之當時非獨臣幸實天下之幸元符中刑部侍郎王覿上奏曰臣聞之詩曰畏天之威于時保之故成湯以旱災而彰罪已之德大戊以桑穀而享中宗之名鼎雉致髙宗之興風禾致成王之聖皆此道也董仲舒對䇿漢廷亦曰國家將有失道之敗天乃出災害以譴告之不知自省又出怪異以警懼之尚不知變傷敗乃至此天心之仁愛人君而欲止其亂也比者日官豫言將有日食之異陛下損常珍避正殿畏災之意見於政事以邀功黷貨之閫吏投之逺方以勞民蠧國之邊壘付之蕃將而又赦過宥罪與民更始斯足以慰人情而感天意矣故正陽之朔隂雲四布初無日蝕之象及有司觀渾儀驗晷刻之際雲稍開而有覩焉疑陛下之所以正厥事者雖已留神而猶有闕歟不然何變異之未盡消耶夫應天以實不以文臣伏望陛下敬用五事念休咎之所因延見羣臣訪安危之所繫進端方直諒之士拒讒佞傾邪之言文德來逺以久四夷之安儉德率下以廣九年之蓄矜民力之雕弊而與之休息愍風俗之澆薄而化以忠厚如此類者陛下深圖而力行之則何止於消伏變異而已哉太平之效無疆之休可以坐致也干冒冕旒退俟誅戮哲宗時侍御史劉摰上奏曰臣伏見自入冬以來並無雨雪亢陽為厲被災甚廣羣情嗸嗸驚憂四顧考原經典可謂大異夫人之氣與天地隂陽之氣相為出入流通而往來者也人情和於下則天道順於上人事乖於此則天變效於彼是謂天人相與之際也故聖人之事天也知其在上不逺應以類至則凡祈禳消伏以為末節小數而專修政事以應之竊以陛下委國仰成與之均休戚同榮辱者不在三省樞密院執政之臣乎今廟堂之上大臣八人情志乖暌謀謨不一無同心同德之節有分曹懷二之意故議政之際排抵依違相激相閉其語往往播在中外所以政令壅隔而不下文書稽滯而不行官爵濫於無名而不應於典故公道屈於貴近而獨施於疏逺私邪朋比上下隔并況當皇帝陛下淵默諒暗之日太皇太后陛下制出房闥之時朝廷政權盡在大臣而大臣不咸如此故天下但聞頗僻之事而不見和善之政政不和則人情不和人情不和則天地之氣繆沴而生此變也書曰肅時雨若五行傳以謂冬旱政舒緩之所致也今上下可謂不肅朝廷之政可謂驕慢廢㢮號令可謂二三不振矣古者災異水旱咎在燮理隂陽之官故䇿免三公以塞其譴今來歲以窮盡旱暵如此宿麥在野無潤澤之入春氣相乘有疫癘之變生民一歲之大命豈可不念之哉又一月已來日青無光風霾昏翳考之占驗皆非小變而上之人恬不以為怪此中外之所以恐懼而不寧也伏望聖慈深省上天警告之意俯察朝廷乖戾之變特詔大臣修飭政事凡賦斂之害人者法令之未安者大解而更張之至於決獄訟之私枉趣諸司之稽違進忠良退阿諛通壅蔽去疑二務以至誠實事上塞天譴下救生民則和氣之應將不旋日而得之矣臣不勝惓惓之心諫議大夫陳次升上奏曰臣聞易曰天垂象見吉凶聖人象之又曰觀乎天文以察時變則知古之聖王嚴恭寅畏以順承天天示之以異則反身修行下責躬之詔求直言者有之冊免三公者有之恭惟陛下近因星變徹常膳逺聲色罷游宴此盛德之舉雖舜帝之惟幾文王之小心何以加諸然而責躬之詔未下無以顯聖德天下直言未求無以禆聖政臣竊觀經史所載以災異之來必緣人事人事正於下天意應於上書曰惟先格王正厥事蓋謂此也伏願陛下頒尺一之詔求天下直言上以昭聖明之聽納下以盡臣庶之愚忠如此則朝政闕失得達於冕旒之前人事何患乎不修人事修則天意得天意得則災異自消矣次升又上奏曰臣觀書曰皇天無親惟德是輔傳曰皇天親有德享有道以此知有道德之君天必愛佑之時出災異以警戒之恭惟陛下聖德隆盛朝廷清明今有此變異者豈非天之所愛佑以此警戒乎竊聞陛下謙沖退托下詔損常膳避正殿罷秋宴求直言此盛德之舉社稷之福也然考之故事先朝有遇星變必頒恩以滌幽枉臣欲乞斷自聖衷施行庶使變異自消福祥日至不勝幸甚徽宗即位鴻臚寺丞韓宗武上奏曰臣伏覩詔書以日食正陽之月天下臣庶得以實封言事臣退而伏思以謂人君敬畏天象法古盛德夫日食星變山崩涌泉天地所以警戒宜以人事察其幾微自古危亂之國當其未危未亂必有事之先見者忠臣義士未嘗不發憤流涕道于當世之君事之微漸則人情所忽亂之既生又悔無所及臣竊惟近日之事亦有微漸而不可不察者夫大臣不畏公議私結朋黨小臣趨利附下遺忘朝廷國可危也人主怠於政事言路壅絶威柄下移怨讟上歸國可危也左右謀議無儒學輔拂之士守邊捍難無干城禦侮之臣國可危也開大境土外連邊患財用耗匱民力凋弊國可危也歲穀不登倉廩空虛民人流亡盜賊數起國可危也先帝踐祚之初母后共朝政出房闥委任大臣紹聖之後神考法度未及盡舉而根治朋黨追復私怨中外觀望言者同罪追貶竄逐流離道路正士廢黜耆老殱亡附下罔上相排擯以為進身捷徑縱有特立之士一二敢言者一身流放旋起大獄害及善類歸咎先帝虧損至德自侍從官至百執事非執政親黨不得進每一官闕輒闕不補豈以四海士人之富朝廷百官之衆空乏如是耶侍從官職在獻納頃年以來未嘗有一敢言事者畏大臣為身謀耳竊受重祿被服冠帶出入禁省朝廷何賴焉文章號令衰於前朝劇藩重邊多非其人狂士獻說驟冠三軍進築生事不計國費虛增首級妄邀厚賞猥稱招降陷沒驍將羌人所過供帳犒設道路騷然自陜以西斗米數百金泉法低昂無術以救重加困擾戎落不顧士馬疲弊夫關西天下之形勝也使民力內虛外遺邊患朝廷何以禦之邊境一搖陜右危矣河北山東天下之腹心也大河決溢飢饉相仍老幼扶携散而之四方者不可勝數其餓殍填委溝壑者以百萬計或至父子相食州縣無以賑給坐視其死亡或以郡守非其人朝廷罷去後來者率皆以私意除用或不及前人尚何賴其拊百姓為朝廷究陳利害河事雖廢責之水官至今未見圖利安之䇿堪受其任者執政大臣無憂國忘家為萬世之慮豈人有腹心之疾得髙枕而卧耶所恃以為安者北敵敦固盟好邊鄙不聳此豈中國可亡備耶易曰其亡其亡繫于苞桑自商號至伊陽六七百里山巖重復林木蔽密中間無郡縣城郭逃亡所聚不啻數千人萬一有桀惡者相扇而起其患豈小哉臣每見朝廷更革政令但人懷異意排去舊怨以立新黨徒為紛紛未有講究治具建不拔之基為國家者也國是未定殆為此也誠願明天子躬攬乾綱收還威柄公卿大臣圖畫政體當今所宜施行因求賢知足以濟務者隨才録用無間新舊敷言奏功考察名實中外之任更畨迭處使勳業著見朝廷尊光君臣同福海內被澤太平之烈豈不偉哉聖人以天下為度聰明惠澤如日月雨露顧不以小惠小察而自足也安不忘危治不忘亂不以天位崇髙幸天下無事而宴安也以四海之內一夫失所為憂不以侍御之好鍾鼓之娛為樂也大約人情泰然無患久則放佚生焉願陛下思大禹寸隂之戒慕漢文惜百金之費儲思留神日謹一日如太陽朝升至於豐融以照天下誦帝堯知人之哲稽洪範威福之正仁祖惻怛至誠以結天下之心神考勵精不息以舉天下之事此陛下之所宜法也臣在神宗皇帝時屢䝉清問未嘗敢獻一言今至白髮非以僥幸美官厚祿特以世受厚恩誠惜當平治之世不慮安危之機而徒為此紛紛也小臣謀國大體罪當砧鑕昧死以聞殿中侍御史陳師錫上奏曰臣恭聞今月六日駕幸懿親宅蔡王位觀芝草於龍德宫聖人所居明神相之德氣覆之發為禧祥以表休應宜屈萬乘以注清視臣伏見祖宗詔有司不得奏祥瑞蓋慮道未備德未盛雖祥圖瑞牒溢于史館可以為美終未為善唯賢者在位能者在職朝廷之祥瑞也隂陽氣和風雨時若日月光華星辰順度天地之祥瑞也百穀順成萬民和樂郡縣之祥瑞也四夷安靖五兵不試邊境之祥瑞也格此四瑞仰賴陛下以道治心以德為政而已心以道治則明政以德為則仁故能感人心而天下和平甘露降醴泉出麟鳳至朱草生理之自然物之遂性耳佞人乃謂之祥瑞也稱頌歸美以驕帝王之心祖宗所以戒之臣愚狂妄或有小補不避斧鉞之誅冒聞天聽伏乞政事之暇曲賜睿聽臣不勝拳拳之至右正言陳瓘論熒惑在房心之間狀曰臣近聞衆論火星之行頗失常度厯氐犯房今乃在房心之間臣竊考厯代天文志熒惑犯房將相惡之若房心之間則天子之明堂也臣雖不曉天文然而房心兩位最為易見恐太史占知有所隱避不敢盡奏臣不可以無言也臣伏聞仁宗之訓曰國家雖無大異亦當常自修警況因謫見乎自陛下即位以來正陽之月日有食之肆赦求言所以圖消復也而星變繼作厥異甚大安可以不思其故哉董仲舒曰國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也陛下聖德日躋切於致治上法祖宗內禀慈訓孜孜勉勉不敢遑暇而日星之變重有譴告非天心仁愛之深何以得此革否為泰轉災為祥在陛下一念之頃耳臣聞應天消變不在文采非祝禳之所能除也非末術之所能去也宋景公有仁人之言而能使熒惑退舍者非空言而已也根於誠心而發於言也咸平元年二月彗出營室北真宗謂宰相曰其祥安在吕端等言變在齊魯之分真宗曰朕以天下為憂豈獨一方邪其年十月遂用李沆為宰相王旦為參知政事此二人者天下之所謂賢也舉天下之賢而用之則可以解天下之憂真宗消變之術如此而已臣願陛下用真宗消災之術察朝廷未正之事勿牽衆論取決聖心躬攬之初大正厥事當使所用所弃皆合人心則合天心矣漢元之時蕭望之周堪張猛等與石顯許史之徒議論交戰邪正未決當此之時有夏寒日青之變而許史之徒以為堪猛用事之咎於是勢孤者危有力者勝臣嘗以謂天下大器也譬如一舟舟平則安舟偏則危自紹聖以來宰舟之人實右而虛左舟勢不平幾於傾覆觀者膽落亦已久矣自陛下即位以來好平惡偏損諸右而遷于左十損一二舟勢尚偏臣願陛下察用偏同濟之人採傍觀膽落之語廣諏博訪而審其所以然也且星文之變昭示天下已數日矣唯京師隂雨見之最晚則是逺方之所已知而陛下有未知也幸而䝉蔽忽開隂雲披剝垂象粲然警示陛下天心仁愛可見於此傳曰人之所欲天必從之决去姦佞改用忠良以合人心之所欲天意得矣臣故曰革否為泰轉災為祥在陛下一念之頃耳臣愚不知忌諱唯陛下裁赦幸甚貼黃淳化二年熒惑犯房其年宰相吕䝉正樞密使王顯參知政事王沔陳恕皆罷而改用寇準等太宗以是年大旱延近臣問時政得失樞密直學士寇準對曰天人之際應若影響大旱之證蓋刑有所不平頃者祖吉王淮皆侮法受贓吉既伏誅家且籍沒而淮參知政事沔之弟止杖于私室仍領濠州定逺主簿用法重輕如此亢暵之咎殆不虛發也太宗大悟明日見沔切責之是歲擢準樞密副使徙同知樞密院事今陛下左右之臣在紹聖中負誣神考讎毁宣仁而不能奉承哲宗繼述之意同心合謀非一人也願陛下躬攬之初速正其罪且無使有僥幸茍免之人則用法輕重不至於不平矣消弭天變莫大乎此臣願陛下以臣此語深加聖慮晉書天文志曰熒惑司天下羣臣之過臣竊聞仁祖嘗采前世災異有應者編次為十二卷御製序引名曰洪範政鑒遇有天變則考其所因以為修省之資今其書必在禁中臣願陛下法仁祖之寅畏留意修省以福天下瓘又進仁祖故事曰帝謂輔臣曰比臣僚有言星變者且國家雖無天異亦當常自修警况因謫見乎夫天之譴告人君使懼而修德亦猶人主知臣下之過先以戒飭使得自新則不陷於咎惡此天心之仁也臣瓘曰仁祖於臣下之過先以戒飭而許其自新此天德也故天所譴告終亦消復書曰惟先格王正厥事如斯而已矣瓘又論衛州進瑞麥狀曰臣訪聞衛州近進瑞麥有一莖數穗者仁祖之時眉州彭山縣嘗貢獻此瑞仁祖曰可謂真瑞矣於是賜田夫束帶以勸賞之臣竊見近年以來天下之俗爭言祥瑞而農夫憔悴南畝空虛大兵之後邊民相食河北流亡至今未復衛州亦河北之地而有秀麥之瑞是天以豐年之祥慰陛下之焦勞也乞於所進呈之日出於聖意依仁祖故事特降睿㫖庶使天下之民知陛下務農之意益助和氣以為永久生靈之福知成都路昌衡應詔上奏曰頻年以來西方用兵致興大役利源害政佞臣蔽主四者皆隂之過盛自陜以西民力傷殘人不聊生災異之變生於天地之不和起於人心之怨望故妖星出見大河橫決秋雨霖淫諸路饑饉殍死道路妻子棄捐破析資儲以應星火之令勤勞憔悴多不生還人心如此而欲其無怨難矣筠州推官崔鶠應詔上書曰臣聞諫爭之道不激切不足以起人主意激切則近訕謗夫為人臣而有訕謗之名此讒邪之論所以易乘而世主所以不悟天下所以卷舌吞聲而以言為戒也臣嘗讀史見漢劉陶曹鸞唐李少良之事未嘗不掩卷興嗟矯然有山林不反之意比聞國家以日食之異詢求直言伏讀詔書至所謂言之失中朕不加罪蓋陛下披至情廓聖度以來天下之言如此而私祕所聞不敢一吐是臣子負陛下也方今政令煩苛民不堪擾風俗險薄法不能勝未暇一二陳之而特以判左右之忠邪為本臣生於草萊不識朝廷之士特怪左右之人有指元祐之臣為姦黨者必邪人也使漢之黨錮唐之牛李之禍將復見于今日甚可駭也夫毁譽者朝廷之公議故責授朱崖軍司户司馬光左右以為姦而天下皆曰忠今宰相章惇左右以為忠而天下皆曰姦此何理也臣請略言姦人之迹夫乘時抵巇以盜富貴探微揣端以固權寵謂之姦可也包苴滿門私謁踵路隂交不逞密結禁廷謂之姦可也以竒伎淫巧蕩上心以倡優女色敗君德獨操賞刑自報恩怨謂之姦可也蔽遮主聽排斥正人微言者坐以刺譏直諫者陷以指斥以杜天下之言掩淹天之罪謂之姦可也凡此數者光有之乎惇有之乎夫有其實者名隨之無其實而有其名誰肯信之傳曰謂狐為狸非特不知狐又不知狸是故以佞為忠必以忠為佞於是乎有繆賞濫罰賞繆罰濫佞人徜徉如此而國不亂未之有也光忠信直諒聞於華夷雖古名臣未能逺過而謂之姦是欺天下也至如惇狙詐凶險天下士大夫呼曰惇賊貴極宰相人所具瞻以名呼之又指為賊豈非以其孤負主恩玩竊國柄忠臣痛憤義士不服故賊而名之指其實而號之以賊邪京師語曰大惇小惇殃及子孫謂惇與御史中丞安惇也小人譬之蝮蝎其凶忍害人根乎天性隨遇必發天下無事不過賊陷忠良破碎善類至緩急危疑之際必有反覆賣國跋扈不臣之心比年以來諫官不論得失御史不劾姦邪門下不駁詔令共持喑默以為得計昔李林甫竊相位十有九年海內怨痛而人主不知頃鄒浩以言事得罪大臣拱而觀之同列無一語者又從而擠之夫以股肱耳目治亂安危所係而一切若此陛下雖有堯舜之聰明將誰使言之誰使行之夫日者陽也食之者隂也四月正陽之月陽極盛隂極衰之時而隂干陽故其變為大惟陛下畏天威聽明命大運乾剛大明邪正毋違經義毋鬱民心則天意解矣若夫伐鼓用幣素服徹樂而無修德善政之實非所以應天也帝覽而善之右正言任伯雨上奏曰臣伏覩陛下自臨御已來德澤屢下和氣充塞曰雨而雨曰暘而暘四海九州罔不豐年天心人意如合符節固宜乖氣異象消伏不作然去年四月朔今年正月朔莫夜赤氣起於北方光焰亘天又有黑氣在下漸衝西方散而為白咎證之來其異如此天心之愛陛下欲陛下有所恐懼戒愼也且正歲之始建寅之月其卦為泰年方改元時方孟春月居正首日為壬戌是陛下本命而赤氣起於莫夜之幽以一日言之日為陽夜為隂以四方言之東南為陽西北為隂以五色推之赤為陽黑與白為隂以事推之朝廷為陽宫禁為隂中國為陽四裔為隂君子為陽小人為隂德為陽兵為隂今赤氣起於至隂之方又有黑氣下起此宫禁隂謀下千上之證也漸衝正西散而為白而白主兵此邉患竊發之證也臣謹按前漢五行志云視之不明是為不哲時則有赤眚赤祥又曰不明善惡親昵近習無功者受賞有罪者不殺時則有赤祥其說蓋出於洪範五事故唐世自大厯貞元寶厯間屢有赤氣之異唯文宗太和中為多是時宦官用事朋黨交結今日陛下以堯舜之資當千載盛明之時固非唐世衰末之比然天心愛陛下以災異為警戒不可不深思逺慮也臣伏願陛下收主柄抑臣下嚴敕宫禁以防慮幾微訓飭將帥以遏絶生事用忠良黜邪佞正名分殛奸惡事至必斷無以寬仁傷大義使隂邪小人無得生犯上之心則變異之起可轉為休祥矣臣疏賤小臣誤䝉陛下拔擢於衆人之後付以言責常恨粉身碎首未有補報若見災異畏罪不言不唯虛陛下聖神知遇孤負大恩抑恐有佞臣指為祥光瑞氣以欺聖聽使陛下畏天小心不得即日恐懼消變則臣之大罪膏斧鉞不足以謝言責伏惟陛下留神采聽天下幸甚貼黃稱臣所奏為言赤氣事按前漢五行志謂之赤眚乃災異之變唐世屢有此異史臣具載其狀亦謂之赤祥臣推考象類乃陽不制隂下干上之證伯雨又上奏曰臣聞天人之交不啻影響災祥之來必有象類故格王先正厥事而聖人惟能畏天嘗聞修德以弭災未有祈禳而消變六絰所載百世可知臣風聞近日內臣打量太一宫側欲建火星觀以禳赤氣之異臣始聞之深所不信亦既纍日傳者益衆臣為諫官當救其源聞雖未詳敢不先事犬馬之心懷不能已竊以陛下躬道德生知之資膺天人共與之運然即位已來災異屢降蓋天之於人君猶父之於其子愛之深則教之至數有災異或者欲陛下戒懼以愼厥初歟陛下固宜小心修德克已正事謹按洪範以五事配五行而說者謂視之不明是謂不哲時則有赤眚赤祥陛下當益廣聰明判别賢佞攬權綱以信賞罰專威福以殊功罪使皇明赫赫事至必斷則乖氣異象轉為休祥昔太戊有桑穀之妖髙宗有鼎雉之異皆能寅畏克正厥事成中興之功延過厯之年蓋未聞勞人費財留心土木也若使修德之效不及祈禳則聖人六絰何獨不載又若祈禳有感修德不應則無私上天乃可私禱人之所欲天必從之天豈厲民以求報哉陛下必若建此臣切妄計其費不下百萬矣陛下取之有司耶則帑藏空虛經費不足取之有司必且不辦取之內庭耶則括刷內庭亦已迫矣河北一路物貴人饑前年至今流移滿道朝廷熟視無力可救與其捐所急以事無用孰若回所用以恤所急如此則所費有名所惠成德人人鼓舞天下相慶皆以陛下損已便民道光前古人心說而天意得矣赤氣之異豈不轉而為祥哉臣伏願陛下逺稽格王仰測天意畏之以心愼之於事不泥世俗之論罷去祈禳之役則人情自孚上穹昭答矣伯雨又上奏曰臣伏見今月初一日夜赤氣未半月果有皇太后上仙之禍其為災變亦已明矣今來亳州兖州河中府奏言因建置道場獲此祥應且赤氣所起天下皆見如何敢移易方位增添景象公肆欺諛以愚羣聽竊以天人之際道固幽逺災祥之出殆不虛示豈佞夫纎人敗壞大體詭詞異說指災為祥以輕侮天命幻惑人主若縱而不治則姦諛相師此風不可滋長伏願陛下嚴賜黜責以戒百官翰林學士曽肇論日食赤氣之變疏曰臣伏見陛下即位之初首罷後苑工巧之技放免京城末作之人數百家使得衣食其業又罷皇城司探報公事以省刑獄滋彰之敝又罷逺方收買明珠翠羽之類宫室服玩淫侈過甚者屏而弗御數日之間內外歡呼震動都邑既又振拔滯淹申理無告流放竄逐皆得生還增耳目之官以廣視聽下不諱之詔以開言路仁心仁聞洋溢方外逺人聞風咸知敬慕宜其上應天心和氣充塞災害消弭符瑞日臻而乃連年日食皆在正陽之月今歲正旦赤氣亘天變不虛生必有所自意者陛下簡儉清靜之化或衰於前而宫室服玩之侈聲色技巧之好或萌於心歟抑刑獄滋彰之敝復生而閭里有不安者歟不然則朝廷上下忠邪賢不肖未辨而政令賞罰有未當歟抑左右前後有阿諛壅蔽竊弄威福之人而四方萬里銜寃失職之民有不得伸者歟此宜陛下反復循察一日三省萬一有纎毫之失固當痛自克責改過不吝使皆無之猶須戒謹乎其所不覩恐懼乎其所不聞博延忠良使之交警庶以答塞天變轉災為祥至於備邊鄙之虞防姦宄之發在於今日皆不可緩然蕭墻之內則所當先未有腹心和而四支有疾朝廷正而四逺不治者也在昔太戊以桑拱武丁以鼎雉中興商邦宣王以旱菑中興周室天人相與之際敏於影響災異之來未必不為福也董仲舒所謂天心仁愛人君欲止其亂乃出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至推此言之今日之變豈非天意欲以覺悟陛下增益聖德以為宗廟社稷無疆之福哉此誠陛下正心誠意恐懼修省之時也若夫避殿損膳寬宥縲繫此特厯世相承以為文爾非應天之實也惟陛下不以臣言為狂妄深思而力行之天下幸甚左司諫江公望乞因日食命百官轉對狀曰臣伏見神宗皇帝即位三月即詔內外文武羣臣直言時政至十一月再下詔書每遇起居日輪百寮轉對當是時日食來年正旦故神宗寅畏天威咨詢闕失以圖消伏以廣聰明甚盛之舉也今連年日食皆在正陽之月考之前志殆非小變陛下去歲已嘗下詔求言獨轉對之制闕而未講臣愚伏望因兹薄蝕特降德音每遇起居日輪百寮轉對庶幾上䖍天戒之丁寧下通人情之壅塞以追先志以廣聖德因之修舉故事正在此時伏乞留神詳察速賜施行御史中丞王覿上奏曰臣伏見今月十三日集禧觀災是日雖大雨久而後滅其災頗異陛下夜不俟旦申敕攸司於延福宫設醮謝咎足見聖心欲以修人事謹天變之盛意也臣聞之漢史曰賢佞分别官人有序則火性得讒夫昌邪勝正則火失其性濫炎妄起雖有師衆弗能救也是謂火不炎上又京房易傳曰上不儉下不節盛火數起故古先哲王見災而懼則正厥事今陛下既知天變之可畏必行所以應天之實也伏望更留聖意而審慮之賢佞果已分别乎官人果不失序乎讒夫果不昌乎佞果不勝正乎不儉不節者果已節儉乎天變緣類而至恐不虛發惟有以正厥事則變異可消而美祥可召矣大觀四年侍御史毛注上奏曰臣恭覩陛下恐懼修省小心翼翼雖夏后之謹天戒周王之畏天威不能過也以陛下憂勞若此臣誤任言責未知所以誅身之地遂不自揆仰瀆天聽敢罄區區之愚臣聞應天以實不以文惟善政修於下則天心應於上如文飾浮言非敢上進謹列政事之為當今急務者四冒昧以聞一曰省邊事二曰足財用三曰收士心四曰禁技巧古人備邊之䇿不過來則禦去則守以謂得地不足以耕得人不足以用近年以來邊臣貪功生事不顧朝廷之害惟僥幸一時之茍得昔所入貢者今必城為郡縣昔所羈縻者今盡納其土疆進築之勞轉輸之擾殫內地之金帛以事窮荒不可計之費士卒傷殞不可勝數而官吏冒賞莫知等級今黔南已有處分如夔路新邊之役宜在裁省廟堂謀謨當亦先定此省邊事宜在所先也天下財匱無甚於今日方平居無事之時官軍俸廩多或不給或倉卒以備不虞則計將安出執政大臣恬不為慮此臣所未諭也臣謂運鹽昔主於漕計以助歲給今則移於他司則漕計如之何而不匱常平昔積於郡縣以備凶荒今則直便而盡輸於京師則緩急以何移用鈔法不更則邊儲糴入終莫能平其價臣願陛下亟詔二三大臣選知財用之官盡講復元豐舊制若利柄昔主於漕司錢物昔積於州縣者宜悉還復罷科買之擾蠲不急之貢使外計稍足則朝廷泰然亡憂矣古人禱雨有以士失職為辭蓋天之視聽在民而士特為民之秀士或失職宜其有招於天譴也陛下修崇學校迥絶前古慮士有三年之淹而歲為之貢可謂盡善盡美士生斯時實為千載之遇宜失職非所患者然學校養士州有常額則額外之士無復預教養矣天下州郡士人之多者有至三五千人豫教養者惟四之一歲之入貢多不過三四十人少止三五人補闕以備數者歲惟止此則自餘無可進之地其失職疑已甚矣如留貢餘三二分暫存科舉以待學外之士則士心翕然有歸而終不為棄物和氣可襲而至是亦應天之一也古人以用漆器為之力諫者蓋防工技淫巧之漸也近年以來更增造作置局纍年後苑工匠亦無虛日以至花石綱船綿亘不絶作局則所需百出數郡為之騷擾花石則虛張事勢一路莫敢誰何驅迫保伍牽挽舟船道路怨嘆有傷和氣伏䝉已降睿㫖造作罷局花石停運臣慮監作董造之官利於自私夤緣奏請尚或循舊臣願陛下斷以必行速賜禁止敢有違詔重行放黜以至後苑工匠製作與京城土木營造有不急之務者並宜權暫住罷惡勞喜逸人情之常抑末敦本亦聖政之所先人心恱則天意解矣臣夙夜自勵思所以圖稱任使之萬一而智識淺暗終莫能深達政事之原惟陛下赦其狂而加擇焉政和七年尚書右丞許翰上奏曰謹考諸經傳神降而明出則其數為二其象為火火象在天經星二緯星一所謂熒惑緯星也東方之心南方之咮經星也熒惑遲疾逆順伏見之不常故不可以紀時若心與咮則有定次有常時是以帝王取節焉然堯典所謂日永星火以正仲夏豳詩所謂七月流火九月授衣凡稱火者皆心星也昔蓋自陶唐以來以心為火政之君矣何則均是火也而心為大辰是以咮為鶉火心為大火大火之所以為大者天以心為明堂故也昔陶唐氏之火正閼伯居商邱祀大火故辰為商星而我宋以珍光醇耀天明地德受命主之則明堂之政不可不謹於此大火以三月昏見於辰以九月伏於戍先王之火政視焉鄭以三月作火鑄刑器而士文伯知其將災周之三月今正月也大火未出而人作之則與天拂是以火出而災報之然則所謂出內火者謂大陶冶非常火也又火之變於天地之間能革物氣以日新其在易象木上有火曰鼎鼎者取新之卦也明堂之頌曰我將我享維羊維牛維天其右之羊牛之享蓋鼎實也是故明堂與鼎相因而成象相待而成禮相須而為國鎮矣鼎象木上有火是以先王四時以木變火焉而時各有所宜木所謂榆栁木之木也棗杏火之木也桑柘土之木也柞楢金之木也槐檀水之木也火之變各以其時則物之新皆得天地之正氣而人食飲焉此疾厲之所以不作也昔晉之遷有持洛陽火渡江者也世世傳之其火不滅火色變青至唐氣不復熱則知火之新舊氣性必異審矣此火不可不變之驗也師曠侍食於晉平公曰飯勞薪所炊平公使人視之果車輞也則是木實變火之氣性火實變物之臭味亦審矣此木不可不擇所宜之效也伏願明詔有司四時必放古法各變其所宜木以為國火而傳之臣庶若國有大陶冶則皆作於三月建辰之後而止於建戌以奉大辰之政而協景炎之運輔成明堂調鼎之治天下幸甚翰又上奏曰臣聞天人之際精祲相蕩象類相取無定方體惟所感變是以古先格王深觀乎天道而均調以人事在易之復曰先王以至日閉關商旅不行后不省方商旅者隂也后者陽也日之始至隂壯陽微故使閉關商旅不行以遏隂氣而后不省方深存而致養其一以定陽德冬至者一歲之始也先王終歲之事輔相天道類悉如此而易不可以遍舉故於復首一見之而世得以類推焉凡隂陽五行之變本原於易而降在洪範散在太元惟深思知化之時能使道通為一某嘗竊原天地之數考諸洪範而為之說曰形凝於西而觀生於東故木為貌聲動於東而節成於西故金為言木生火故貌可視也金生水故言可聽也二之照也麗乎有方比視逺之明也一之虛也通乎無方比聽德之聰也其證諸天也一潛而寒水氣之精也二軋而燠火氣之變也三和而雨木以水滋仁之愛也父子之道也四辨而暘金以火燥義之制也君臣之保也肅以欽恭乂以制從哲以正厥明謀以審厥聰不恭以肅則恣行而狂不從以乂則陵節而僭不明以哲則豫而無稽是故肅乂哲謀能使雨暘寒燠從時而不愆狂僭豫急能使雨暘寒燠常久而無節也思者風也思在五行為土而風以木氣在中蓋地以五五相守數之窮也而天三變而通之是以鼓舞之風發於大塊也變五以三故睿而通妙三於一故聖而化聖人精一入乎無思故能無不思也思而正勝則修而為聖其風時思而妄雜則亂而成䝉其風常思者君也四德之所恃以成者也土氣之溼水或使之也水潜於土故聖以一妙而御中也金氣之燥火或使之也火緼於金故乂者慶賞刑威唯二折天下而成方者也木之恭者水木之也火之明者木資之也水之聰者金瑩之也皆因而用之者也恭之作肅金斂之也明之作哲水斷之也聰之作謀土稽之也皆制而成之者也金土異此天地之數所以成五位之節者也是以其德重固其道制而用之而成於自用火克金而從木克土而睿金凝而作乂土化而成聖也是以聖人之相天也木不足則用恭木太過則撝肅金太過則用從金不足則撝乂火不足則用明火太過則撝哲水不足則用聰水太過則撝謀土太過則用睿土不足則撝聖木沴則制天下之狂金沴則禁天下之僭火沴則飭諸豫水沴則抑諸急土沴則祛諸䝉也其在周官有敘事有救政敘事所以治常也救政所以御變也何謂敘事月令所載是也又如春正月泰卦御之太元之氣其首為差為重為增為鋭為達為交聖人修其畫贊之德以道其化如秋七月否卦御之太元之氣其首為常為度為亥為昆為減為吟為守聖人修其畫贊之德以受其福也何謂救政庶證所驗是也又如木不足則聲尚角色尚青政尚仁毋殺鱗蟲毋傷新物赦小過解久禁以扶木氣木在太元其類為鱗為新為赦為解故也如金太過則聲尚徵色尚赤政尚禮息巫風戒猛政警邊城之變飭寇賊之防以抑金氣金在太元其類為巫祝為猛為邊為城為冦為賊故也歲時適平則有敘事無救政歲時有過不及而敘事救政兼舉焉古者王公坐而論道燮理隂陽寅亮天地必有以深造乎此其妙難知而其粗則有司可得而陳者也按易之傳戊戌之歲泰卦御之而正月又泰所御皇帝作興明堂以儀式刑文王之典日靖四方之義紹修古道資取化源肇自來歲戊戌正月之吉號詔天下以大振顯祖宗之烈光是謂裁成天地之道輔相天地之宜以左右民與泰合符謂宜因此盡舉洪範太元之說系諸易象與時損益定著月令為萬世法有司前期既具叙事又具一氣救政義類所宜告諸朝廷朝廷以時相觀庶政考合師言或創建新令或申敕舊法審則宜類參乎元精條列以上誕布而下使民由之以安以利而由其所以然必有以感移至神導迎和氣天下幸甚政和末歲旱帝以為念侍御史黃葆光上疏曰陛下德足以動天恩足以感人檢具治事常若不及而不能感召和氣臣所以不能無疑也蓋人君有屈己逮下之心而人臣無歸美報上之意者能致隂陽之變人君有慈惠惻怛之心而人臣無將順欽承之意者能致隂陽之變陛下恭儉敦朴以先天下而太師蔡京侈大過制非所以明君臣之分陛下以紹述為心而京所行乃背元豐之法彊悍自專不肯上承德意太宰鄭居中少宰余深依違畏避不能任天下之責此天氣下而地不應大臣不能尚德以應陛下之所求者如此厯代名臣奏議卷三百四
