body:
  text: 歷代名臣奏議卷三百五十明楊士竒等撰四裔宋寧宗嘉定四年著作佐郎真德秀奏曰臣竊惟今日北敵有必亡之勢三可為中國憂者二蓋自有天地以來邊境盛衰不常然未有昌熾百年而無憂變者也女真盤據中原九十載矣自其立國唯以刑威殺戮劫制上下非有歡然心服之素也持此而欲久存雖秦隋不能况區區無道之女真乎此其必亡者一方阿固達尼雅滿之徒崛興窮海之濵尚力喜爭雲屯霧集用彼國所長以憑陵諸夏故所嚮莫能當今數十年豢飬之餘亡復前日堅悍之氣而蒙古小國欻起而乘之干戈相尋情見力詘蓋今之女真即昔之亡遼而今之蒙古即鄉之女真也以垂亡困沮之勢既不足以當新勝之鋒而衆叛親離安知無他變乘之者此其必亡者二方其隆時用民力如犬馬戕民命如草菅人情携離亡一敢畔者積威約之素也今其潰散四出猶川決防不可遏止至用赦以安之瓦解土傾其形巳露豈待智者而後知哉此其必亡者三嗟夫元元赤子敵人戕之翼翼故都禾黍生之有志之士思欲一洗久矣而曩者病於機會之難逢間者敗於權姦之輕舉顧今何幸彼自阽危而臣復以為憂何也蓋傳有之自非聖人外寧必有內憂孟子亦曰無敵國外患者國常亡方陛下更化之初和議未堅邉警未撤君臣上下惕然有不敢康之心逮夫聘俯交馳遽巳狃目前之安而忘前日之患萬一此敵遂亡莫或余毒上恬下嬉自謂無虞則憂不在敵而在我矣此臣所謂可憂者一也事會之來應之實難毫釐少差禍敗立至設或外夷得志邀我以夾攻豪傑四起奉我以為主從之則有宣和結約之當戒張覺內附之可懲如將保固江淮閉境自守彼方雲擾我欲堵安以此為謀尤非易事此臣所謂可憂者二也今之議者大抵以為外裔之衰乃中國之利抑不思胸奴五單于之爭漢嘗獲其利矣拓拔氏河南之警顧反為蕭梁之害何耶蓋有國者不當問敵人之盛衰惟當計吾政之修否當漢宣時內有股肱之良外有爪牙之勇朝廷紀綱本末備具邊陲備禦斥候精明使胸奴盛強尚當賔服況於浸微弱之後乎若梁武則不然舍正道而溺異端棄人事而談空寂內則三蠧弄權輕作威福外則諸王忿鬩骨肉相圖保境靖民猶懼不足況欲乘人之敝以徼幸萬一之功哉繇是觀之使今日能為漢宣之所為則敵之存亡俱不足患抑猶未也多事之端方自此始臣愚竊獨憂之伏惟陛下日與二三大臣深求自治之䇿勿以懲羮之故而謂讎耻可忘勿為視蔭之謀而謂幸安可恃修實德以格天命敷仁政以結民心奬忠實以作興天下之材省科斂以培養天下之力至於某人可將某兵可用某城當繕某器當修無日不計于朝而申訓之庶幾國勢日尊敵人自慹則乘機取勝可以制蚌鷸之危養威俟時足以保金湯之固矣惟陛下毋以臣愚賤而忽其言十年袁燮上己見劄子曰臣區區愚忠二月三日獲對威顔具陳正月雷雪非常之變宜修邊防為戰守之計臣非敢為此臆説也按春秋魯隱公九年三月癸酉大雨震電庚辰大雨雪周之三月夏之正月也孔子以八日之間再有大變故謹而書之又臣恭覽國史紹興三十一年正月丁亥風雷雨雪一夕交作侍御史汪徹殿中侍御史陳俊卿皆以為隂盛陽微外國窺中國之象是冬金人果提兵大入今殘敵衰微雖非昔比而雷雪作孽無異曩時臣所以不得不先事言之纍月以來淮襄間幸稍寧息然敵人之心變詐萬端安知其不養力蓄鋭伺隙而作乎蜀被其害所過為墟雷雪之變既昭然矣秋冬之間又將若之何夫備禦有素雖強大之敵不足多畏茍安無䇿雖僅存之敵亦能肆毒而或者之論則曰我朝兼愛南北間不免於用兵而終歸於和好今亦和而巳矣豈必他求臣以為不然曩時戎人部落去中國甚逺糧運難繼故不敢輕動而和可以久今假息之地密邇于我利茍在焉猝焉而至豈復顧盟好哉不可一也汴都四平難以立國欲奪我險要為駐足之地首犯浮光肆及襄漢駸駸以至蜀觀其志願非專為嵗賜也彼無求和之意而我強欲與通和大有邀索何以堪之不可二也且所以欲和者圖省費爾往年四月聘使之還甫入吾界而犯順之兵亦以是日入難信如此和可恃乎戍可撤乎輸轉之費生劵之費猶自若也夫何省之有不可三也忠義之流排難解紛實賴其力既與敵為仇矣彼方仇之我則和之倒戈反噬莫與為禦不可四也堂堂大朝卑辭厚禮謹奉垂亡之敵自示削弱誰不侮之不可五也推此以往其不可者尚多有之夫既不可和則計將安之曰自古立國固有終不與戎人通好者石勒來聘晉焚其幣苻堅雖強晉不少屈而卒成淝水之功何獨今日欲通好歟毋溺於宴安而常軫淵氷之慮毋樂於順從而急聞藥石之言思天變之可畏懼國勢之將危無一日不修攻戰之具無一日敢忘侵侮之耻選擇將帥如恐不及練習士卒常若寇至而絶口勿言通和此則帝王之雄略也嗚呼財用未足兵力未強姑從和好似為體國以通和為戒若非體國者究其實而言之求和自我不保其往將有無窮之悔絶不通和事雖難辦是乃久安之䇿然則臣之愚忠為國慮也深矣雖然謀之寡不若謀之衆臣願陛下肆頒明詔博謀羣臣凡可以制服戎人者畢陳於前而擇其至當者亟施行之古者國有大疑謀及卿士至于庶人蓋所以廣其聰明也庶人猶且及之而況在廷之臣乎惟陛下留神則天下幸甚寧宗時衛涇論治內備外曰臣聞憂先於事故能無憂事至而憂無救於事臣觀中國之與北敵其勢決不能以兩立而較今日之事體恐不能如日前之久安無事所當先事而憂者也何以明之敵人盤據中原莫如元魏之久然考其傳序雖十六主而不克令終者十世始終雖百餘載而號稱全盛不過五六十年惟茲勍敵崛起東夷之崛穴奄有中原之土宇六十有四年靖康之禍考之前古又為巳甚誠宗社不磨之辱子孫必報之讎也髙宗皇帝至仁兼覆隱忍三十二年之間大志未獲伸至尊夀皇遵養時晦勤勞二十八年之久大業未獲就陛下以英武神聖嗣臨大寶宸謨廟略得於問安侍膳之餘凡髙宗未獲伸之志夀皇未獲就之業皆陛下今日所身任也彼立國既久未必懷不自安之心而戎心亡厭猶每有不相忘之意是則名為和好而實則仇讎名為息兵而實則觀釁復讎之舉直須時耳故曰其勢決不能以兩立自昔之有天下未有更一二君之身厯五六十年之久晏然無一日之危動者前代之君不暇悉論惟祖宗混一太平極治之世亦莫不然矧今以偏方之勢與敵約和自紹興以來五十餘年無大戰自隆興以來幾三十年無小鬭今之敵人非前之敵人比也故主歷嘗患難逮其得位志在偷安新君少不更事血氣方剛必有馳騖喜功之心國內稍安必謀外略間隙之生逺不過五六年耳故曰不能如日前之久安無事此明識逺見者所以為國深憂也今為偷安之説者乃曰敵運將終滅亡可待又曰彼有內難必不能動又曰童稚庸才不足多忌夫五行之數終於六十以其時考之固為已盈之運矣嗣主得國不以序羣下頡頏肘腋之變誠未可保然其新立之後措意造事類若有謀恐未易以庸才忽之彼果內難也果庸才也建炎紹興之間亦有之矣然一敵弊一敵出其勢愈熾曷嘗為中國利哉古人有言無恃其不來恃吾有以待之天下之事豈當計其在彼者亦顧其在我者如何耳使吾內治具舉外備素修敵雖強不足慮茍吾自治之䇿闕然不講左支右吾僅足以了目前敵雖弱猶有可憂何暇乘敵之隙哉臣誠願陛下奮發英斷規恢逺圖修德以感天心施惠以固民志不以小康為已足不以富貴為可娛念讎耻之未復念版圖之未歸念夀皇付託得人之望為甚深念中原遺黎思漢之心為久鬱卧薪嘗膽不忘北鄉聖志先定然後與二三大臣日夕孜孜講求大計委任而責成之國計未強所以足國計者何䇿民力方困所以寬民力者何道將偷而未練何以為擇將帥之方兵冗而未精何以為勵士卒之術君臣之間悉心悉意不存形迹休戚憂樂相與同之凡足以為內治外備之具無不修舉人事既盡天時自來則大讎可復大義可舉矣儻陛下立志不堅大臣不知任責百執事茍且以安祿位嵗月悠悠大計不立天下委靡日趨於弱一旦有變皆諉曰非我責獨以憂勞遺陛下臣恐後時之悔無及矣孟軻曰國家間暇及是時明其政刑雖大國必畏之矣國家間暇般樂怠敖是自求禍也臣愚不勝拳拳憂國愛君之私惟陛下赦其狂僭涇奉使回奏事劄子曰臣等猥以庸虗誤叨隆委將聘敵庭陛辭之日玉音宣諭令因而詢訪蒙古事宜不可張皇臣等竊謂覘國者春秋之法咨詢者使臣之事欽承聖訓夙夜究心道塗往來必加體問有如敵長荒淫無度主德之不修頻嵗水旱相仍天時之不順百姓科斂煩急人心之已離凡比年使者之所條陳近日廷臣之所論奏雖或未免過實而亦有所由來臣等得於見聞不過若此數事苐敵法素嚴今尤疑畏初至北境間有言者而未敢謂然及抵偽都正欲詢求而防間甚密深懼無以稱塞明詔今參考事迹復托其一二言之大抵北敵狃於宴安習成驕惰非復曩時之舊而蒙古生長西北其人驍勇剽悍地産壯馬加以新集之衆意氣方鋭倏來忽往捷於風雨契丹遺類蒙國諸戎挾其世讎環視而動左枝右梧之不暇雖侈宫室盛儀衛外示強大之形臣等見其在廷班行人才委靡上下窘蹙若有旦夕肘腋之變而所過河南州郡凋弊太甚供備牛馬取辦軍須十室九空殆同清野怨讟並作至有及汝偕亡之謡遺老尚存咸起徯我來蘇之望蓋非特中原之民素不懷附而蕃兵部落亦有離心公出怨言無復顧避河北河東纍行僉刷每戰輒敗或望風奔潰士馬物故糧械喪亡部送餽運至於乏使防護使客騎兵類多疲駑老弱今兩敵相持猶在亘撫等州而臨潢被圍踰時未解在邉之兵僅三十萬復期以九月決戰臣等回至涿州安肅軍屢見介使奔馳調發軍馬曾無虗日觀其事勢蒙古諸部雖未足以滅之而侵擾者衆轉鬭未休久而禍結兵連必至民愁盜起危亡之兆端在於斯天道好還敵運將盡豈非天開陛下以大有為之期邪然臣等區區愚衷有不能自已者觀人之國雖古不廢而自治之䇿尤今日所宜素講使吾治具畢張備禦無闕敵雖強不足畏儻偷安嵗月僅了目前一弱冦滅一強敵生猶未足以為喜也臣等伏願陛下奮發英斷規恢逺圖旰食宵衣急於自治強君德隆主威振紀綱守法度謹爵賞此自治之本也選將帥厲士卒蓄財用備器械審形勢此自治之末也君臣交修本末具舉平居暇日國勢奠安威望震疊有以繫中原思漢之心絶姦雄窺伺之望逮其機會之至則乘瓦解之勢興席卷之師一舉而版圖可歸讎耻可雪矣若不量其在我而徒欲乘敵之多事譬之賁育與有力者鬭未知孰勝有一人焉幸其不戒而搗其虗或不足以制賁育之命後患將若何傳曰盍姑內省德乎無闕而後動惟陛下留神幸甚涇又進故事曰漢文帝十六年冬胸奴寇邊上親勞軍勒兵申教令欲自征胸奴皇太后固要上乃止後元二年六月胸奴和親詔曰間者纍年胸奴並暴邉境夫久結難連兵中外之國將何以自寧今朕夙興夜寐勤勞天下憂苦萬民為之惻怛不安未嘗一日忘於心故遣使者冠蓋相望結轍於道以諭朕志於單于今單于反古之道計社稷之安便萬民之利新與朕俱棄細過偕之大道結兄弟之義以全天下元元之民和親以定始于今年弭兵者帝王之逺謀息民者國家之實利夫民猶支體也兵猶爪牙也支體充盈氣血強壯而後爪牙可用之禦侮自昔仁賢之君明智之臣非無剛健之志忠憤之謀審事量力終于屈志以保民待時而養晦者此非舉事而輒沮圖功而不竟也所以為國計者至深長也蓋民力之虗實乃命脈之根本傷耗慮在目前而事機之成否他時猶可圖也漢文帝其知此矣平城之仇嫚書之辱皆文帝之耳目所親聞見候騎𤇺火之警至通甘泉金絮采繒之奉頗疲縣官文帝豈一念慮忘此敵哉方十四年身御鞍馬鋭志親征真有長驅殄滅之意及其熟察中外事勢之詳載念水旱疾疫之變而堅忍和親確然不搖非與始謀自異也能發而能收者真慮國保民之善圖也其和親詔書曰朕憂苦萬民為之惻怛不安又曰計社稷之安便萬民之利以全天下元元之民可見其以民心為心而灼知國計之當出乎此也是以文帝弭兵而海內安富武帝興師而户口滅半其利如此其害如彼前事之驗後事之師可不監歟理宗紹定六年知泉州真德秀應詔上封事曰臣恭覩正月一日御筆令內外小大之臣悉上封事凡朝政得失中外利病盡言無隱者臣愚不肖往者陛下龍飛五位召自長沙一對便朝再侍經幄玉色晬然顧訪甚寵臣於是時仰窺聖學之髙明巳知為不世出之主矣狂踈妄發自速罪愆投迹山林繫念宸極一飯弗舍此心如丹陛下以天地之仁不棄小物復抆拭而使令之政雖捐軀未足論報而天佑我宋默啓聖心躬攬大權更張庶政乾動雷發觀聼一新方且勞謙弗居親御翰墨誕告中外凡曰臣子皆許盡言伏想薦紳之士洋洋動心直辭正論交進闕下況如臣者受恩思報其敢忘言而伏念旬時未知所以言者邇者竊聞京湖帥臣以八陵之圖來上陛下恭覽再三悲喜交集命卿監郎官以上詣省恭眂集議以聞蓋將稽按舊章遣使朝謁以慰一祖六宗之靈而逺方傳聞未知其的或謂敵人以河南歸我而朝廷因有經略中原之謀審如所傳是將復蹈宣和之轍也日夕恐懼不知所云及觀從臣集議之辭乃知朝廷之上務存審重遣使一節猶不敢輕經略之謀斷所不茍然臣區區猶以為憂者蓋強敵暴興接我疆場虎狼之敵近在藩垣應接少差事變難測臣自嘉定四年國信使余嶸歸自燕境適因面對論金人必亡者三中國當圖者二其後叨塵柱史宿直玉堂中夜以思惕然不寐亟陳祈天永命之説未幾銜命聘敵道梗莫前歸對延和深陳所以備敵之䇿既又直前奏事謂敵能越三關之阻以攻燕豈不能踰黃河一帶之水以趨汴盍圖自立之計以謹未然之防而一時憸人交相姍笑臣以孤直不勝衆諛因以便親丐外而去陛辭之日猶獻瞽言及在江東復上封奏舉宣和之十失願今日之深懲蓋臣愚忠知國家異日必與敵鄰既與之鄰安能無隙既與之隙不免交兵勢所必然理當豫慮故不敢徇衆人之所忽而獨陳私己之深憂欲於未雨之時大為徹桑之備距今二十有四年矣不幸故相諱聞人言獨任私智凡臣所陳一不訾省乃今中原無主遺黎思宋掃清河洛兹惟厥時而士無智愚僉曰未可者以二十餘年之間政出私門謀猶回遹隳祖宗之法度壞朝廷之紀綱民力朘剝而無餘人材衰颯而不振雖陛下赫然振起風采頓殊然非堅持一意行之十年未可以冀中興之效也然以今日之名義揆諸宣和固有不同者蓋宣和之於契丹與國也今日之於女真世讎也伐與國為非義滅世讎為當然幽燕之失敵取之於前代中原之失敵取之於本朝前代之憾可捐而祖宗之耻不可以不雪惟其名義之不同故或以規恢為當舉然名必有實之相副義非徒説之可行求之在我力未足為而欲借助於外援則臣未見其可也臣觀荆襄露布之上具述得蔡之由若盡出於我者然以微盧燕貉等語觀之是又不能不藉於敵何邪自有載籍以來與外裔共事者未嘗無禍惟周漢之興無求於彼而彼自樂從所謂多助之至天下順之者也若唐髙祖則求助於突厥矣肅宗則求助於回紇矣然伐隋之役主謀者太宗而奮力者諸將下西河破霍邑者太宗而非突厥也略扶風渡渭水者諸將而非突厥也入關之師二十萬而康稍利以兵至者才五百人豈嘗專恃之乎其復長安也郭子儀為主將李嗣業王思禮副之王師取勝於前而回紇始襲擊於後廣平王俶統蕃漢之兵十五萬而葉護以兵至者才四千人豈嘗專恃之乎髙祖肅宗惟求助於外裔是以有後日之禍惟不專恃於外裔故其禍未至於極焉乃若宣和則異於此童貫圖幽燕不能得而女真得之談稹圖雲中不能得而女真得之我師敗於蘭溝甸又敗於白溝又敗於燕城而女真之兵所至輒克我不能自取寸土而即彼以求之故嵗幣百萬之須吾不能卻也借糧之請犒師之請各以二十萬計吾不能拒也驅職官富戶以往而遺我空城吾不能爭也背雲中之約而自取之吾不能校也我無可恃之實而惟敵是恃故其禍至此而極臣尚忍言之哉今觀從臣所議蓋巳深得事宜獨慮帥臣既以為功欲其亟遂敵情未順必求好以悅之道塗尚梗必借力以通之如此則今之恃敵如昔恃金國家多事從此始矣夫敵人之性冒沒貪婪一與之接烏能中絶獨不觀宣和海上之盟乎方其齎詔市馬亦未決然與之共事也其後裕陵悔悟固嘗中輟而敵責元約欲止不能侵尋蹉跌稔成大咎今帥臣既遣小使與之往來又命師徒與之會合雖曰未嘗交通不可得巳若朝陵之行又復賴之臣恐無饜之求難塞之辭自此狎至雖竭吾力以奉之未足以飽敵人之欲也或謂故疆之復天實命之天與不取反受其咎臣以為不然當宣和之世契丹潰敗涿易來歸不可謂非天豫也而人謀弗臧適以賈禍今治化修明固非昔比然圖恢復之功必有恢復之人有恢復之人必有恢復之具謀臣勇將者恢復之人也聚財積粟者恢復之具也宣和之時羣邪用事寧有逺謀然西兵宿將盡萃闕下老成持重有如种師道驍悍敢戰有如楊可世而驅之即敵每向輒北今羣賢在列豈曰乏材大抵文致雖優往往弗間武略宣威制閫實難其人翰取翰守孰可以繼儲材待事所宜蚤圖而環視諸將亦未見有种楊比者以种與楊猶不克濟而況弗若者乎此臣之所甚憂者一也宣和承平熙洽公私富實可知用兵曽未幾時而改鹽鈔法科免夫錢所至騷然民不堪命版圖未復羣盜蝟興今之事力視昔何若權門有丘山之積公家無旬月之儲在在枵虗人人愁歎江湖閩浙寇警甫平民未懷生幸禍者衆拊之以循吏恤之以寬條疾痛呻吟庶幾少息而師期一起科斂必繁官吏緣此以誅求姦雄因之而煽動豈細故哉此臣之所甚憂者二也況於移江淮之甲兵以守無用之空城運江淮之金榖以治不耕之廢壤其費甚巨其力甚難富庶之效茫未可期根本之虗其弊立見方女真以燕城遺我也其臣有漏言者曰此可僅保三年蓋謂我之葺理粗成彼之奪攘必至及其背盟入寇果如所云強暴之情今昔豈異此又臣之所甚懼也伏惟陛下親政以來清明在躬志氣如神二三輔臣虗懷無我進退用捨多叶物情正塗方開善類吐氣此鄉治之機也但能持之以堅忍守之以兢畏姦聲亂色不汨清明幸臣懿戚不竊威福廟堂行事常公而無私臺諫言事有直而無枉君子得行其志而小人不敢為欺正論益以開明而邪説不容眩惑則雖慶厯元祐之治指日可期國家安榮社稷長逺為陛下計孰便於此若乃釋樂成之業而冀難必之功聼可喜之言而忘立至之患此又臣之所甚惜也臣雖懦庸亦知英主有為之志臣子所當奉承顧今更張俶爾百度闕然譬猶宿疢方瘳正須保養所當厚壅深培以固元氣不當輕舉妄動以搖本根願陛下日與輔臣籌之委常務於有司講安危之大計緩謁陵之禮而急扞塞之防修理內之政以為禦外之本凡可以自強其國者汲汲而圖之使吾之元氣實根本牢則形勢自張氣𦦨自著敵雖強暴豈能干有道之國哉然後審度事情為之應接或用祖宗交遼之典故或倣東晉絶敵之規模因時制宜期於適當至於中原舊物豈可弭忘必量吾力之能為然後隨機而善應與其藉敵以啓後患不若俟時姑固吾圉昔晉建元中北方潰亂商浩將謀討伐王羲之諫曰今雖有可喜之會而內求諸己所憂乃重於所喜功未可期遺黎殱盡莫若先為不可勝之基須根立藝舉謀之未晚既而洛陽有變浩遂帥師以往修復園陵王彪之亦言未宜輕進皆不見從浩果喪敗而歸晉室益以不競今雖未有此舉然二王之言可為龜鑑惟陛下審之重之毋使制閫之臣誤事如商浩而臣竊知言之名不勝大願貼黃臣竊見宣和平燕之議本自姦臣徽廟初無固必其始也布衣堯臣上書斥童貫蔡京妄開邉釁大臣乞加竄殛上曰言路蔽塞久矣豈可重罪即命以官此徽廟本心也故其時內而執政外而邉臣猶有以正論進者其後邪説浸淫上誤聖聼師行之日詔妄議北事者必罰無赦而宋昭以上書狂妄編竄海南於是言路絶而禍階成矣陛下盛德謙沖開道求諫羣臣仰體聖意當此大議必有昌言言之異同均於為國惟陛下悉加容納毋以沮事罪之理宗時侍御史李鳴復論敵使引見不必臨軒上奏曰臣竊聞敵使之來引見有日都司官條具欲陛下臨軒以接之道路傳聞虗實未可盡信若果有此恐於禮未安臣竊以謂更宜商確或曰臨軒擇士臨軒釋囚聖天子未嘗不臨軒也何獨於此而用其靳臣謂不然三嵗一取士宰執讀其程文呼名而進之謂公卿大夫由此其選也每嵗一釋囚宰執讀其情犯呼名而釋之謂清問下民不可不親也今泛使之來無國書可進如常儀引見賜之例物足矣必異其禮臨軒以接之何為也哉或者又曰彼使人也來自外國未知陛下為何如主也臨之以天威咫尺彼將心悅而誠服光武之於馬援是也臣又謂不然龍鳯之姿天日之表儼然人望而畏之帝王固自有真也何俟進移黼座而後足以悅其心乎下堂而見諸侯昔人以為失禮臨軒以見敵使今顧以為得禮乎且又有一説都司條具之始聞曾引臨軒釋放罪人為例萬一使人知之必謂陛下臨軒乃是以待罪人之例待已將以悅敵反以怒敵矣臣愚切以謂一如常儀為便乞陛下與二三大臣更加商確貼黃臣檢閲國史紹興三年金國元帥府遣使副李永夀王詡等到闕議事上特御後殿引見八年金國軍前遣烏凌噶思謀石慶充等來朝朝辭宣升殿烏凌噶思謀以下執禮甚恭然則北使之來御後殿引見則有之朝辭而宣其升殿則有之遷御座以受其禮則未之前聞也今引見敵使如欲使之稍近天顔當察其果有恭順之實候朝辭日特宣升殿以示恩意却有前朝故事可以遵行併乞睿照元世祖時東平布衣趙天麟上太平金鏡䇿宥不庭曰臣聞文德者養平之膏粱武威者定亂之藥石當太平之時而耀威振武所謂以藥石代膏粱之用其為害也實曰非輕是以定亂右武守成上文乃國家久長之計也方今龍飛九五臣服億兆太祖以神武開基受天眷命奄有區夏誕照多方先帝以聖德乘時繩其祖武蠻荆沐化異域來庭今陛下若稽上古之勳光紹前王之迹普惠黎庶屢降德音今臣幸生於太平之世竊見國家近年以來越山浮海征討不庭謹獻愚議惟陛下察之臣伏以殊方遼邈風壤特異天下有故則窺隙而先叛天下巳定則觀化而後服五帝之所不決羈三王之所不強臣然其見利則趨見害則避之心與中國之人一也若將糜之以辨計良圖震之以長搶大劒則彼方據險依阻罄力偷生遂使吾之軍士身膏異域之風沙及其納欵則吾之軍士亦已傷矣且吾之軍士皆中國之民也中國之民皆國家之赤子為民父母者因無用之地而傷其赤子亦獨何心哉臣固知斯非國家之本心但恐偶未之思而過聼下言或有此事也昔舜帝舞干羽於兩階而有苗格文王修德政於西土而崇國降臣亦非謂放牛歸馬不用兵也但中國迓衡則越裳不召而自來肅慎效誠而自至矣安用征討為哉伏望陛下載宣天旨明諭軍帥厲兵秣馬藩衛邊疆春夏屯田秋冬校武于其無事則備之而內守脫有不虞則應之而不逐殊方之屬欲來則聽其來不來則不以威脅之但務內崇文化發政施仁振我皇綱一我王度信我賞罰興我禮樂風以之移俗以之易上下和悅內外無虞體舜之無為希大庭之不宰欲致越裳肅慎之類亦豈難哉此蓋太平當務之資守成上文之理故曰元氣調而無不順之四時心術定而無不安之四支中國盛而無不來之四逺聖人極致委在於兹又金鏡䇿務柔服曰臣聞羣生有類萬物分方施仁於一類而同類咸臻擴化於一方而餘方並至此實王者仁化之聖也天道無私降生庶物得五行之全鍾二氣之正者其惟人乎彼四逺之外雖不沾先王之化聖人之治然其懷仁慕義好是懿德之心則無異焉中國者四逺之根抵也四逺者中國之枝幹也自萬殊而言之分雖不同以理一而推之其趣一也耀之以兵而欲其知畏則彼方奮其釜魚之餘命而挾怒以相敵矣結之以信而欲其來服則彼方將違其天日之明鑒而舒蠆以相陵矣諭之以言而欲其回心則彼方將背其盟誓之大約而恃強結援以輕中國矣然則何為而可哉莫若柔已服以感之而已矣柔之法奈何崇其道以臨之昭其禮以制之厚其誠以孚之寬其命以逸之定名分以曉之降優詔以撫之置諸度外以待之如是則使餘國未服者聞之而皆曰彼已服者既能托大國以自固而又無刻剝督責之苦吾屬奚為而獨逆皇天所輔有道之君哉自然相率而來服矣今國家六合羣辟奔執豆籩中華之區貢賦有常其邉裔巳服之域正宜行此柔之之道以盡感之之方又何須徒費錢糧犒賞以興當偃之師以征荒僻之地以勞不可下之民哉其所以柔之者非但感未服之國亦所以盡其在我者當然之理也郤缺有言曰叛而不討何以示威服而不柔何以示懷非威非懷何以示德臣是以知討以威之服以懷之皆所以示其德也或者以為四逺可以威威不可以德德臣愚以為不然成湯解三面之網文王息二君之訟漢南諸侯聞之而歸者四十餘國又聞至治之極鳥獸魚鱉咸若豈有不可以德德之人哉或者以為不服則巳既服而置諸度外不亦甚乎臣亦以為非也夫王者之臨下其理本於安人也非欲求土地之廣也隆周之時越裳自至周公猶以為德澤不加君子不享其質政令不施君子不臣其人豈冝殺人以求之哉然而方今或有是事者皆羣下不能副朝廷之意而曲説請行故也伏望陛下幸從臣議凡已服之國行柔之之道焉將見銘心刻骨荷乾坤再造之恩同類餘方仰父母一家之化矣祕書監趙良弼奉使日本還入見帝詢知其故曰卿可謂不辱君命矣後帝將討日本三問良弼言臣居日本嵗餘覩其民俗很勇嗜殺不知有父子之親上下之禮其地多山水無耕桑之利得其人不可役得其地不加富況舟師渡海海風無期禍害莫測是謂以有用之民力填無窮之巨壑也臣謂勿擊便帝從之歷代名臣奏議卷三百五十
