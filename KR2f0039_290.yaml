body:
  text: 歴代名臣奏議卷二百九十明楊士竒等撰寵倖漢文帝時大中大夫鄧通方隆愛幸丞相申屠嘉入朝而通居上傍有怠慢之禮丞相奏事畢因言曰陛下愛幸羣臣則富貴之至於朝廷之禮不可以不肅武帝元光五年上嘗置酒竇太主家主見所幸賣珠兒董偃上使之侍飲常從㳺戲馳逐觀雞鞠角狗馬上大歡樂之因為主置酒宣室使謁者引内偃中郎東方朔辟㦸而前曰董偃有斬罪三安得入乎上曰何也朔曰偃以人臣私侍公主一也敗男女之化亂婚姻之禮傷王制二也陛下富於春秋方積思於六經而偃以靡麗奢侈極耳目之欲乃國家之大賊人主之大蜮三也上黙然良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉滛亂之漸其變為簒上曰善詔更置酒北宫引偃從東司馬門入賜朔黄金三十斤偃寵由是日衰哀帝時息夫躬孫寵等因中常侍宋𢎞上書告東平王雲謀逆擢為吏二千石時侍中董賢愛幸於上上欲侯之傅嘉勸上因東平事以封賢宋𢎞更言因董賢以聞欲以其功侯之皆先賜爵關内侯頃之欲封賢等上心憚王嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史於是嘉與御史賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘䝉恩至今流言未觧陛下仁恩於賢等不已宜暴賢等本奏語言延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議暴平其事必有言當封者在陛下所從天下雖不説咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎於永先帝不獨䝉其譏臣嘉等材駑不稱死有餘責知順指不迕可得容身須㬰所以不敢者思報厚恩也上感其言而止時帝愛幸侍中董賢至封高安侯後數月日食舉直言丞相王嘉因奏封事曰臣聞咎繇戒帝舜曰亡教佚欲有邦兢兢業業一日二日萬幾箕子戒武王曰臣無有作威作福亡有玉食臣之有作威作福玉食害于而家凶于而國人用側頗辟民用僭慝言如此則逆尊卑之序亂隂陽之統而害及王者其國極危國人傾仄不正民用僭差不壹此君不由法度上下失序之敗也武王躬履此道隆至成康自是以後縱心恣欲法度陵遲至於臣弑君子弑父父子至親失禮患生何況異姓之臣孔子曰道千乗之國敬事而信莭用而愛人使民以時孝文皇帝備行此道海内䝉恩為漢太宗孝宣皇帝賞罰信明施與有節記人之功忽於小過以致治平孝元皇帝奉承大業温恭少欲都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬嘗幸上林後宫馮貴人從臨獸圏猛獸驚出貴人前當之元帝嘉美其義賜錢五萬掖庭見親有加賞賜属其人勿衆謝示平惡偏重失人心賞賜莭約是時外戚貲千萬者少耳故少府水衡見錢多也雖遭初元永光凶年饑饉加有西羌之變外奉師旅内振貧民終無傾危之憂以府藏内充實也孝成皇帝時諫臣多言燕出之害及女寵專愛耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長搒死於獄不以私愛害公義故雖多内譏朝廷安平傳業陛下陛下在國之時好詩書上儉莭徴來所過道上稱誦德美此天下所以回心也初即位易帷帳去錦繡乗輿席縁綈繒而已共皇寢廟比比當作憂閔元元惟用度不足以義割恩輙且止息今始作治而駙馬都尉董賢亦起宫寺上林中又為賢治大第開門鄉北闕引王渠灌園池使者䕶作賞賜吏卒甚於治宗廟賢母病長安厨給祠具道中過者皆飲食為賢治器器成奏御廼行或物好特賜其工自貢獻宗廟三宫猶不至此賢家有賔婚及見親諸官並共賜及倉頭奴婢人十萬錢使者䕶視發取市物百賈震動道路讙譁羣臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此堕壞奢僭放縱變亂隂陽災異衆多百姓訛言持籌相驚被髪徒跣而走乗馬者馳天惑其意不能自止或以為籌者策失之戒也陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣臣嘉幸得備位竊内悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎已之所獨鄉察衆人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情願卒陷罪辜亂國亡軀不終其禄所謂愛之適足以害之者也宜深監前世以莭賢寵全安其命於是上寖不説而愈愛賢不能自勝㑹祖母傅太后薨上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千户及賜孔鄉侯汝昌侯陽新侯國嘉封還詔書因奏封事諫上及太后曰臣聞爵禄土地天之有也書曰天命有德五服五章哉王者代天爵人尤宜慎之裂地而封不得其宜則衆庶不服感動隂陽其害疾自深今聖體乆不平此臣嘉所内懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財而富之損至尊以寵之主威已黜府藏已竭唯恐不足財皆民力所為孝文皇帝欲起露臺重百金之費克已不作今賢散公賦以施私惠一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常為之寒心今太皇太后以永信太后遺詔詔丞相御史益賢户賜三侯國臣嘉竊惑山崩地動日食於三朝皆隂侵陽之戒也前賢已再封晏商再易邑業縁私横求恩已過厚求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵㒺隂陽失莭氣感相動害及身體陛下寝疾乆不平繼嗣未立宜思正萬事順天人之心以求福祐奈何輕身肆意不念高祖之勤苦垂立制度欲傳之於無窮哉孝經曰天子有争臣七人雖無道不失其天下臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自劾愚戅數犯忌諱唯陛下省察哀帝時置酒麒麟殿上在酒所從容視董賢笑曰吾欲法堯禪舜何如中常侍王閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於無窮統業至重天子無戲言上黙然左右遣閎出閎遂上書曰昔文帝幸鄧通不過中大夫武帝幸韓嫣賞賜而已皆不在大位今董賢無功封侯列備鼎足横蒙賞賜空竭帑藏諠譁道路不當天心上不從亦不罪也哀帝發武庫兵送董賢及上乳母王阿含執金吾毋將隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乗輿不以給共養共養勞賜一出少府盖不以本藏給末用不以民力供浮費别公私視正路也古者諸侯方伯得專征伐乃賜斧鉞漢家邉吏職在距宼亦賜武庫兵皆任其事然後䝉之春秋之誼家不藏甲所以抑臣威損私力也今賢等便僻弄臣私恩㣲妾而以天下公用給其私門契國威器共其家備民力分於弄臣武兵設於㣲妾建立非宜以廣驕奢非所以示四方也孔子曰奚取於三家之堂臣請収還武庫東漢安帝建光元年帝乳母王聖因保飬之勤縁恩放恣至子女伯榮出入宫掖傳通姦賂司徒楊震上䟽曰臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熈方今九德未事嬖倖充庭阿母王聖出自賤㣲得遭千載奉飬聖躬雖有推燥居溼之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書誡牝鷄晨鳴詩刺哲婦䘮國昔鄭莊公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教夫女子小人近之喜逺之怨實為難飬易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舎㫁絶伯榮莫使往來令恩德兩隆上下俱美惟陛下絶婉孌之私割不忍之心㽞神萬機誡慎拜爵減省獻御損莭徴發令野無鶴鳴之歎朝無小明之悔大東不興於今勞止不怨於下擬蹤往古比德哲王豈不休哉奏御帝以示阿母等内倖皆懐忿恚而伯榮驕淫尤甚與故朝陽侯劉䕶從兄瓌交通瓌遂以為妻得襲䕶爵位至侍中震深疾之震復詣闕上䟽曰臣聞高祖與羣臣約非功臣不得封故經制父死子繼兄亡弟及以防簒也伏見詔書封故朝陽侯劉䕶再從兄瓌襲䕶爵為侯䕶同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無他功行但以配阿母女一時之間旣位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覧鏡旣往順帝之則安帝詔遣使者大為阿母脩第震為太尉上䟽曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色臣伏念方今災害發起彌彌滋甚百姓空虛不能自贍重以螟蝗羌虜鈔掠三邉震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門内第舎合兩為一連里竟街雕修繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校别部將作合數十處轉相廹促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豊王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招徠海内貪汙之人受其貨賂至有贓錮棄世之徒復得見用白黒溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足惟陛下度之順帝以乳母宋娥有議立功封為山陽君邑五千户又封大將軍梁商子冀襄邑侯尚書令左雄上封事曰夫裂土封侯王制所重高皇帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異永建二年封隂謀之功又有日食之變數術之士咸歸咎於封爵今青州飢虛盜賊未息民有乏絶上求禀貸陛下乾乾勞思以濟民為務宜循古法寧静無為以求天意以消災異誠不宜追録小恩虧失大典帝不聼雄復諫曰臣聞人君莫不好忠正而惡䜛䛕然而歴世之患莫不以忠正得罪讒䛕䝉倖者盖聼忠難從䛕易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習䛕者多故令人主數聞其美稀知其過迷而不悟至於危亡臣伏見詔書顧念阿母舊德宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生讒賊廢立之祻生為天下所咀嚼死為海内所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯争與為伍者以其有德也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本操失其常願臣愚以為凡人之心理不相逺其所不安古今一也百姓深懲王聖傾覆之祻民萌之命危於累卵常懼時世復有此𩔖怵惕之念未離於心恐懼之言未絶於口乞如前議嵗以千萬給奉阿母内足以盡恩愛之歡外可不為吏民所怪梁冀之封事非機急宜過灾戹之運然後平議可否㑹復有地震緱氏山崩之異雄復上䟽諫曰先帝封野王君漢陽地震今封山陽君而京城復震專政在隂其灾尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞灾異今冀已髙譲山陽君亦宜崇其本莭雄言數切至娥亦畏懼辭譲而帝戀戀不能已卒封之梁太后臨朝皇甫規舉賢良方正對策曰伏惟孝順皇帝初勤王政紀綱四方㡬以獲安復遭姦偽威分近習畜貨聚馬戲謔是聞又因縁嬖倖受賂賣爵輕使賔客交錯其間天下擾擾從亂如歸故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聼風聲未聞國家有所先後而威福之來咸歸權倖陛下體兼乾坤聰哲絶茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐大賊從横流血丹野庶品不安譴誡累至殆以姦重權重之所致也其常侍尤無状者亟便黜遣披掃凶黨収入財賂以塞痛怨以荅天誡今大將軍梁冀河南尹不疑䖏周召之任為社稷之鎭加與王室世為姻族今日立號雖尊可也實宜増収謙莭輔以儒術省去逰娯不急之務割減廬第無益之飾夫君者舟也人者水也羣臣乗舟者也將軍兄弟操楫者也若平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫德不稱禄猶鑿墉之趾以益其高豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出諂言甘心逸逰唱造不義亦宜貶斥以懲不軌令冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯糾察故使陛下專受諂䛕之言不聞户牖之外臣誠知阿䛕有福深言近祻豈敢隐心以避誅責乎臣生長邉逺希渉紫庭怖慴失守言不盡心桓帝時太尉楊秉奏中常侍侯覽貝瑗曰臣案國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿䛕取容者則因公褒舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穣侯擅秦何以尚兹案中常侍侯覽弟參貪殘元惡自取祻滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乗卒有竹中之難春秋書之以為至戒盖鄭詹來而國亂四佞放而衆服以此觀之庸可近乎覽宜極屏斥投畀豺虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬曰公府外職而奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡傳曰除君之惡惟力是視鄧通懈慢申屠嘉召通詰責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國靈帝時中常侍吕强上䟽曰臣聞諸侯上象四七下裂王土高祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹莭王甫張譲等及侍中許相並為列侯莭等宦官祜薄品卑人賤讒諂媚主佞邪徼寵放毒人物疾妬忠良有趙高之祻未被轘裂之誅掩朝廷之明成私樹之黨而陛下不悟妄授茅土開國承家小人是用又并及家人重金兼紫相繼為蕃輔受國重恩不念爾祖述修厥德而交結邪黨下比羣佞陛下惑其瑣才特䝉恩澤又授位乖越賢才不升素餐私倖必加榮擢隂陽乖剌稼穡荒䟽人用不康罔不由兹臣誠知封事已行言之無逮所以冐死干觸陳愚忠者實願陛下損改旣謬從此一止臣又聞後宫采女數千餘人衣食之費日數百金比榖雖賤而户有饑色案法當貴而今更賤者由賦發繁數以觧縣官寒不敢衣饑不敢食民有斯戹而莫之恤宫女無用塡積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宫致災況終年積聚豈無憂怨乎夫天生烝民立君以牧之君道得則民戴之如父母仰之如日月雖時有征税猶望其仁恩之惠易曰悦以使民民忘其勞悦以犯難民忘其死儲君副主宜諷誦斯言南靣當國宜履行其事又承詔書當於河間故國起觧瀆之館陛下龍飛即位雖從蕃國然旣䖏九天之高豈宜有顧戀之意且河間䟽逺觧瀆邈絶而當勞民單力未見其便又今外戚四姓貴倖之家及中官公族無功德者起造館舎凡有萬數樓閣連接丹青素堊雕刻之飾不可單言䘮𦵏踰制奢麗過禮競相放效莫肯矯拂榖梁傳曰財盡則怨力盡則懟尸子曰君如杅民如水杅方則水方杅圓則水圓上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諌晉平公曰梁柱衣繡民無褐衣池有棄酒士有渇死廐馬秣粟民有饑色近臣不敢諫逺臣不得暢此之謂也又聞前召議郎蔡邕對問於金商門而令中常侍曹莭王甫等以詔書喻㫖邕不敢懐道迷國而切言極對毁刺貴臣譏呵豎宦陛下不宻其言至令宣露羣邪項領膏脣拭舌競欲咀嚼造作飛條陛下回受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣以邕為戒上畏不測之難下懼劔客之害臣知朝廷不復得聞忠言矣故太尉段熲武勇冠世習於邊事垂髪服戎功成皓首歴事二主勲烈獨昭陛下旣已式序位登台司而為司𨽻校尉陽球所見誣脅一身旣斃而妻子逺播天下惆悵功臣失望宜徴邕更授任反熲家屬則忠貞路開衆怨以弭矣靈帝以張譲趙忠等十二人為中常侍封侯貴寵父兄子弟布列州郡所在貪殘黄巾旣作盜賊糜沸郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬人所以樂附之者其源皆由十常侍多放父兄子弟婚親賔客典據州郡辜㩁財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盜賊宜斬十常侍縣頭南郊以謝百姓又遣使者布告天下可不須師旅而大宼自消隋文帝仁夀二年大理卿梁毗見楊素專權恐為國患乃上封事曰臣聞臣無有作威作福其害于而家凶于而國今楊素幸遇愈重權勢日隆所私皆非忠讜所進咸是親戚子弟布列兼州連縣天下無事容息異圖四海有虞必為祻始陛下若以素為阿衡臣恐其心未必伊尹也伏願揆鑒古今量為䖏置俾鴻基永固率土幸甚書奏帝大怒収毗繫獄親詰之毗極言素擅寵弄權殺戮無道又太子及蜀王罪廢之日百寮無不震悚惟素揚眉奮肘喜見容色利國家有事以為身幸帝乃釋之唐中宗景龍元年蕭至忠上䟽曰恩倖者止可富之金帛不可以公器為私用今列位已廣干求未厭陛下數降不貲之澤近戚有無涯之請賣官鬻法公違憲章徒忝官曹無益時用上不聼𤣥宗開元十九年開府儀同三司王毛仲以嚴察幹力有寵與龍武將軍葛福順為婚吏部侍郎齊澣言於上曰福順典禁兵不宜與毛仲為婚且毛仲小人寵過生姦不早為之所恐成後患上然其言澣曰君不宻則失臣願陛下宻之退以語大理丞麻察察遽奏之上怒制澣察交構將相離間君臣皆貶嶺南憲宗時以吐突承璀討主承宗議者皆言古無以宦人統師者翰林學士知制誥李絳當制書固爭帝不能奪止詔宰相授敕承璀果無功還加開府儀同三司絳奏曰承璀䘮師當抵罪今寵以崇秩後有奔軍之將蹈利干賞陛下何以䖏之帝怒絳謝曰陛下憐臣愚䖏之腹心之地而惜身不言乃臣負陛下若上犯聖顔旁忤貴倖因而獲罪乃陛下負臣於是帝動容曰卿告朕以人所難言者疾風知勁草卿當之矣宋仁宗時後宫周氏董氏生公主諸閤女御多遷擢知諫院范師道上䟽曰禮以制情義以奪愛常人之所難惟聦明睿哲之主然後能之近以宫人數多而出之此盛德事也然而事有繫風化治亂之大而未以㽞意臣敢為陛下言之竊聞諸閤女御以周董育公主御寳白制並為才人不自中書出誥而掖庭覬覦遷拜者甚多周董之遷可矣女御何名而遷乎才人品秩旣高古有定員唐制止七人而已祖宗朝宫闈給侍不過二三百居五品之列者無幾若使諸閤皆遷則不復更有員數矣外人不能詳知止謂陛下於寵幸太過恩澤不節耳夫婦人女子與小人之性同寵幸太過則瀆慢之心生恩澤不莭則無厭之怨起御之不可不以其道也且用度太煩須索太廣一才人之奉月直中户百家之賦嵗時賜與不在焉況誥命之出不自有司豈盛時之事耶恐斜封墨敕復見於今日矣理宗寳祐三年兵部侍郎兼中書舎人牟子才繳呉子聦閤門事奏曰臣聞官不及私昵爵㒺及惡德所以重其官也閤門掌朝議之事客省四方館掌四方賔客之事是為華要禮均侍從舊來多用戚畹世族性行淑均者居之今天筆除授乃屬之呉子聦臣考子聦胄係旣非戚畹又非世族特以宫媪族子夤縁姻婭冐得此職不厭公論甚矣況子聦雖猥雜庸下而稔惡實深方其憑依城社之時盖有薫灼宇宙之勢凡所以交通關莭轉輸貨賂干撓府縣濁亂政經者無所不為至以爵禄為市而一種無耻之縉紳湊薄其門往往而售此皆公議所切齒非臣之私言也縁自比嵗稍失憑依而蹊尚存氣脉未㫁陛下奈何加之寵光是崇是長使復出為惡乎昔隆興初龍大淵知閤門事曽覿權知閤門事中書舎人張震周必大疊繳其命由是二人遂罷其後再除旋寝二人繼斥于外天下以是誦孝宗之明然二人者皆孝宗潜邸之舊非子聦比也欲望陛下以孝宗之法特降睿㫖罷子聦知閤事是亦官不及私昵爵㒺及惡德之義臣待罪西掖職分所關公論不容自難隐嘿所有録黄臣未敢書行子才又上奏曰伏凖宫苑使麥欽傳奉聖㫖宣諭臣呉子聦之除已一月矣今日方行繳奏子聦舊元為知閤門事在三年前此畨乃歸舊班想是未曽稽考可與書行仍具聞奏臣伏讀聖訓不勝皇懼臣照得呉子聦除知閤門事乃十一日御筆也今月二日黄甫過臣書行自祖宗以來給舎守百刻條限今回遲凡二十餘日而後至大有可疑臣竊意其必延引日月以待子聦之供職使臣不得而繳之今子聦朝供職而録黄暮下則子聦之計行矣給舎紀綱之地所以為國家憑藉扶持者在是乃使此軰得以行私計於其間或遲或速一惟其意則紀綱掃地矣況子聦係旣供職而後書黄若人人如此事事如此則何用給舍為哉臣昨具申都省乞契勘施行正欲治其稽遲之罪以振紀綱非是臣稽延二十餘日扵其供職之後方行繳奏也子聦舊雖除知閤一時給舎輕於放行遂使子聦謂恩寵為可憑肆然無忌輕視陛下之給舍輙紊祖宗之成憲今豈無他職可以䖏之而再此洿玷是知閤之職必子聦而後可何乏材如是耶陛下舎已從人如堯從諫弗咈如湯近者臺臣論列陛下一一從行畧無適莫獨於此人乃為委曲遷就殆非舎已從人從諫弗咈之義臣若奉明詔則臣負中外之責若不開陳則大臣受中外之責陛下若不俯從則恐夤縁攀附之徒聲生勢長適滋中外之紛紜也欲望陛下以堯湯之心為心亟賜從行不致私情愈熾公道湮㣲紀綱大壊天下幸甚所有録黄臣未敢書行謹同前奏再以奏聞歴代名臣奏議卷二百九十
