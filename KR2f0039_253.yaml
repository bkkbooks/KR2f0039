body:
  text: 歷代名臣奏議卷二百五十三明楊士竒等撰水利宋徽宗即位初左正言任伯雨論黃河狀曰臣竊以黃河為中國患二千歲矣若使人力可勝有利無害則昔人固已為之不應留以遺後世也自古竭天下之力以事河者莫如本朝徇衆人偏見欲屈大河之勢以從人者莫甚近世臣不敢逺引只如元祐末年小吳決溢議者乃譎謀異計欲立竒功以徼厚賞不顧地勢不念民力不惜國用力建東流之議當洪流中立馬頭設鋸牙梢芻材木耗費百倍力遏水勢使之東注淩虛駕空非特水行地上而已增堤益防惴惴恐決澄沙淤泥久益高仰一旦決潰又復北流此非隄防之不眘亦理勢之必至也昔禹之治水不獨行其所無事亦未嘗不因其變以導之故其為逆設之河必曰九河九者究也物窮則變此禹之治水所以示河流之無常而不可使從人力之道也蓋河流混濁泥沙相半流行既久迤邐淤澱則久而必決者勢不能無變也或東而北或北而東亦安可以人力制哉為今之策正宜因其所向寬立隄防約欄水勢使之不至於大段漫流若恐北流淤澱塘泊亦只宜因塘泊之岸增設隄防乃為長策風聞近日又有議者獻東流之計不獨比年災傷居民流散公私匱竭百無一有事勢窘急固不可為抑亦自高注下湍流奔猛潰決未久勢不可改設若興工公私徒耗甚非利民之舉實自困之道也伏願陛下特賜睿旨大觀元年中書舍人許光疑上奏曰臣向在姑蘇遍詢民吏皆謂欲去水患莫若開江濬浦蓋太湖在諸郡間必導之海然後水有所歸自太湖距海有三江有諸浦能疏滌江浦除水患猶反掌耳今境內積水視去歲損二尺視前歲損四尺良由初開吳松江繼濬八浦之力也吳人謂開一江有一江之利濬一浦有一浦之利願委本路監司與諳曉水勢精強之吏遍詣江浦詳究利害假以歲月先為之備然後興夫調役可使公無費財而歲供常足人不告勞而民食不匱是一舉而獲萬世之利也詔吳擇仁相度以聞二年都水使者吳玠上言曰自元豐間小吳口決北流入御河下合西山諸水至清州獨流寨三叉口入海雖深得保固形勢之策而歲月寖久侵犯塘堤衝壞道路齧損城寨臣奉詔修治隄防禦捍漲溢然築八尺之堤當九河之尾恐不能敵若不遇有損缺逐旋增修即又至隳壞使興塘水相通於邊防非計也乞降旨修葺從之政和二年七月兵部尚書張閣上言曰臣昨守杭州聞錢塘江自元豐六年泛溢之後潮汛往來率無寧歲而比年水勢稍改自海門過赭山即回薄巖門白石一帶北岸壞民田及鹽亭監地東西三十餘里南北二十餘里江東距仁和監止及三里北趣赤岸􅝕口二十里運河正出臨平下塘西入蘇秀若失障禦恐他日數十里膏腴平陸皆潰於江下塘田廬莫能自保運河中絶有害漕運詔亟修築之四年都水使者孟昌齡獻議導河大伾可置永逺浮橋謂河流自大伾之東而來直大伾山西而止數里方回南東轉而過復折北而東則又直大伾山之東亦止不過十里耳視地形水勢東西相直徑易曽不十餘里間且地勢低下可以成河倚山可為馬頭又有中灘正如河陽若引使穿大伾大山及東北二小山分為兩股而過合於下流因是三山為趾以繫浮梁省費數十百倍可寬河朔諸路之役朝廷喜而從之十一月都水使者孟揆上言曰大河連經漲淤灘面已高致河流傾側東岸今若修閉棗強上掃決口其費不資兼冬深難施人力縱使極力修閉東堤上下二百餘里必須盡行增築與水爭力未能全免決溢之患今漫水行流多鹹鹵及積水之地又不犯州軍止經數縣地分迤邐纒御河歸納黃河欲自決口上恩州之地水堤為始增補舊堤接續御河東岸簽合大河從之乙亥臣僚言禹迹湮沒於數千載之逺陛下神智獨運一旦興復導河三山長堤盤固橫截巨浸依山為梁天造地設威示南北度越前古歲無解繫之費人無病涉之患大功既成願申飭有司以日繼月視水向著隨為隄防益加增固每遇漲水水官漕臣不輟巡視詔付孟昌齡六年四月安撫趙霖上平江水利策其相度之説曰平江逐縣地形水勢利害各不相侔蓋浙西六州之地平江最為低下六州之水注入太湖太湖之水流入松江接青龍江東入於海而平地勢自南直北至常熟縣之半自東止崑山縣地西南之半水與太湖松江水面相半皆是諸州所聚之水泛濫其中平江之地雖下於諸州而瀕海之地特高於他處謂之堽身堽身之西又與常州地形相等東西與北三面勢若盤盂積水南入注乎其中所以自古沿海環江開鑿港浦者籍此疏導積中之水由是以觀則開治港浦不可不先也港浦既已浚則講經久不堙塞之法今瀕海之田懼鹹潮之害皆作堰埧以隔海潮裏水不得流外沙日以積此崑山諸浦堙塞之由也堽身之民每闕雨則恐裏水之減不給灌溉悉為堰埧以止流水臨江之民每遇潮至則於浦身鑿開小溝以供己用亦為堰斷以留餘潮此常熟諸浦堙塞之由也法當置閘然後可以限水之內外可以隨潮而啓閉浦既已開閘既已置而太湖松江之水與積水為一派沈沒民田者一遇風作則高浪萬頃愈泄愈來縱使諸浦㵼之泄之涓涓來之浩浩當斯之時障之不可疏之不可為之計者莫若順其性而狹其流乃為上策所謂上策者大築墟岸高圍民田而已如此則積水日削衆浦日耗矣大抵三説一曰開置港浦二曰置閘啓閉三曰築墟裹田三者闕一不可又各有先後緩急之序其開浦篇曰高田引以灌溉低田導以決泄者浦也古人大小縱橫設為港浦若經緯然按圖於舊得九十處或名港浦或名涇濱或謂之塘或謂之漕以詢究古迹得其為利之大者三十六浦區為三等上等工大而利博在前所先也中等工費可減上等三之二下等間於上中等之間或自大浦而分投别派工料之數又少損焉其置閘篇曰瀕海臨江之地形勢高仰古來港浦盡於地勢高處淤澱若一旦頓議開通地里遙逺未易施力以拒鹹潮今於三十六浦中尋究得古曽置閘者才四浦唯慶安福山兩閘尚存餘皆廢棄故基尚存古人置閘本圖經久但以失之近裏未免易湮治水莫急於開浦開浦莫急於置閘置閘莫利於近外若置閘而又近外則有五利焉江海之潮日兩漲落潮上灌浦則浦水倒流潮落浦深則浦水湍㵼逺處積水早潮退定方得隨流幾入浦口則晚潮復上亢末流入江海又與潮俱還積水與潮相為往來何緣減退今開浦置閘潮上則閉潮退則啔外水無自而入裏水日得以出一利也外水不入則泥沙不淤於閘內使港浦常得通利免為堙塞二利也瀕海之地仰浦水以溉高田每苦鹹潮多作堰斷若決之使通則害苗稼若築之使塞則障積水今置閘啓閉水有泄而無入閘內之地盡獲稼穡之利三利也置閘必近外去江海止可三五里使閘外之浦日有澄沙淤積假令歲事浚治地里不逺易為工力四利也港浦既已深闊積水既已通流則泛海浮江貨船木筏或遇風作得以入口住泊或欲住賣得以歸市出卸官司遂可以閘為限拘收稅課以助歲計五利也復有二説崑山諸浦通徹東海沙濃而潮鹹當先置閘而後開浦一也閘之側各開月河以堰為限遇閘閉小舟不阻往來二也築墟篇曰天下之地膏腴莫美於水田利倍莫盛於平江緣平江水田以低為勝昔之賦入多出於低鄉今低鄉之田為積水漫沒十已八九當時田墟未壞水有限隔風不成浪今田墟殆盡水通為一遇東南風則太湖松江與崑山積水盡奔常熟遇西風則常熟之水東赴者亦然正如盛盂中水隨風往來未嘗停息嘗陟崑山與常熟山之巔四顧水與天接父老皆曰水底十五年前皆良田也今若不築墟岸圍裹民田車畎以取水底之地是棄良田以為水也況平江之地低於諸州唯高大墟岸方能與諸州地形相應昔人築墟裹田非謂得以播殖也將恃此以狹水之所居耳崑山去城七十里通往來者至和塘也常熟去城一百五里通往來者常熟塘也二塘為風浪衝擊塘岸漫滅往來者動輒守風往來有覆舟之虞是皆積水之害今若開浦置閘之後先自南鄉大築墟岸圍裹低田使位位相接以禦風濤以狹水源治之上也修作至和常熟二塘之岸以限絶東西往來之水治之次也凡積水之田盡令修築墟岸使水無所容治之終也昨聞熙寧四年大水衆田皆沒獨長洲尤甚崑山陳新顧晏陶湛數家之墟高大了無水患稻麥兩熟此亦築岸之驗目今積水之中有力人户間能作小塍岸圍裹已田禾稼無虞蓋積水本不深而墟岸皆可築但民頻年重困無力為之必官司借貸錢榖集植利之衆併工戮力督以必成或十畝或二十畝地之中棄一畝取土為岸所取之田衆户均價償之其貸借錢穀官為置籍責以三年六限隨稅輸還此治積水成始成終之策若其當開之浦則崑山常熟共三十六浦除常熟之許浦及白茆福山二浦見今深闊水勢通快不須開治雖開三十三浦崑山十有一謂堀浦下張浦七了浦茜涇浦楊林浦六鶴浦顧徑浦川砂浦五嶽浦蔡浦浪港浦常熟二十有二謂黃泗浦奚浦西陳浦東陳浦水門浦崔浦耿涇浦魚潭浦塢溝浦瓦浦塘浦高浦金涇浦石撞浦六河浦北浦甘草浦千步涇司馬涇金涇錢涇黃鶯漕皆積久不浚當分為三等開修徽宗時趙鼎臣繳進河議奏狀曰臣伏以先事而言則言有難信之患後事而諫則事有不及之憂雖然忠臣慮國不謀其身孝子顯親思述其志言之先後一也顧當否何如耳伏念先臣某當元祐之末實為河北路轉運副使方是時水官建議回河蓋以纍年功之成者十既八九獨先臣居中罔敢阿徇請順水性導使北流進言於朝至於再四奮孤忠觸羣黨抗單言遏衆議讒鋒謗熖幾不獲免尚賴陛下哀憐照察曲賜全護遣使按視既施行矣不幸後來水官眩惑前議竟興力役斷塞北流奏功告成中外稱慶已而先臣以病賜歸退伏田里雖及困革不忘朝廷常慷慨謂臣曰河本無事妄人擾之耳今及如是恐不三數年河無安定之理誰當復為上言之乎臣飲淚泣血退書其語刻之肌骨銘在肺肝方是時豈暇規後效計將然乎徒以不欺之誠著自平昔雖時有用捨而志不可無故也伏見去年河已東決舉齊之西泛濫千里有司極力僅能塞之而積淤久高終不順快逮及今夏沛然北流決於闞村如建瓴水陛下哀矜元元愍悼墊溺臨遣諫議大夫賑災恤窮且俾臺郎共視河事仁恩德意逺近固浹流氓餓夫抃首涕泣雖未復故土瞻舊丘而人人悅欣咸自以為更生也臣竊悲先臣抱孤孑之志而事不獲申建忠藎之策而言未及用遽先朝露齎恨冥漠今日已決之闞村乃先臣之所願開者也今日既淤之東流乃先臣之所力爭者也往昔使萬有一如先臣之言則河患廣博雖不遽平而水得所歸功必有漸決不至於敗壞蕩徙如今日之貽朝廷憂也回河之役幾年矣薪芻之所費力役之所用臣不敢為朝廷惜也金粟之所耗爵賞之所頒臣不敢為朝廷惜也所重為朝廷惜者兩河數千里間有田不得種藝有廬不得歸宿死者轉體於溝壑生者寄命於道塗去歲既已若此今年又復如此謂之天災臣竊以為非歲之罪也恭惟朝廷清明議論公正方遣敵使出臨河防宜有成謀定策歸報於上然微臣區區猶抱遺説陳父書冒不測之誅而獻芻蕘之議者非以希榮於既往而干澤於方今也誠以河溢臯陸垂二十年已失之機事不及悔將善其後必謹於先而先臣之言曩實誤中奏草具在尚可推考儻蒙朝廷俯賜采覽鑒已然之得失察既往之成敗校短量長稽驗當否於以裨贊大策協成緒功使長河底平得效塵露雖結草之報未易加此此先臣之遺志而臣之所不敢忘者也然後退伏鈇鑕下見先臣使九泉之魂得以瞑目豈非臣之素心宿願者乎臣愚不足以知河事竊獨耳剽日久嘗聞諸先臣曰河之可以一言蔽者趨下而已自橫壠六塔商胡小吳宗城內黃百年之間水皆西決則地勢高下豈不可見今之大議不過東流與北流耳使河誠東而可以行則雖極天下之力而回之猶將請諸朝而不敢以為費也奈何地有高下之形水有逆順之勢今年雖塞明年且決來歲儻行後歲必淤借使神禹臨之亦將無如之何矣如或順而治之則庶幾數十年其無河患乎正今日之明效大驗也然議者每挾溏泊以為言不以近事觀之河既東徙而溏泊固已淤矣雖有司嘗欲濬治之蓋亦有所重為而未能也且其所侵害者獨滄與乾寧間耳使向之未嘗有溏泊則將無以為禦敵計乎臣有以知其不然也請得以事譬之據靈武之城則西戎稽顙決古北之口則北敵請命昔嘗恃此以為固矣今雖未能復之而西北二邊豈嘗一日乏守備乎此尚人事之所及而猶可以力勝者耳水之為物非有情也奈何與之競而不釋哉先臣之緣河事進言者甚多臣不敢以遍舉謹取最後乞治北流開闞村河門及申相度黃河利害所二狀繕寫投進伏望聖慈特賜睿覽降付有司看詳裁擇施行冒黷天聽無任隕越昧死待罪之至謹録奏聞李復乞開黃河中灘劄子曰臣某蒙恩差知鄭州於今月初四日到任首見差發人夫急於星火知大河漲溢原武等掃危急緊要修疊固護臣久知原武一帶堤掃比諸處不同為鄭北盡是積水陂湖相連直接國門又地勢高於京師若有決溢勢迅東下臣遂親至河上體度水勢次第今見大河於原武東二里以來中心有灘一道長三里餘闊一百餘步其灘已老問人云已十餘年沙土堅壯河漲為灘所激奔射南岸水勢甚緊枝梧費力臣見多方措置兩日稍見次第然今年補貼雖得稍定來年遇漲還作上軫宸慮下勞百姓臣今乞下都水監將中灘於中心東西開透令引放河身於河槽中心通流雖有暴水不偏著岸更無危急兼東西只是長三里有餘用工不多可絶後患今并畫到圖子隨狀進呈伏候敕旨王同上奏曰古者之治五行也必有五行之官其去民用尤近而逆其理則有敗害之端莫甚於水故官得其任則不憂乎水之敗害誠其勢也是以舜命益作虞以掌山澤周有川澤之禁而後世修之未嘗廢也由秦漢以來使任其事而為之水官則莫若都水之職其主灌溉陂池保守河渠自太常及三輔皆有其官至武帝之時尤增重之於是又有左右使者使統其任而居其事者莫不明於禹貢之學而習於知水之性故劉向以治書為三輔都水都尉平當以明禹貢領護河隄蓋其任職之人未嘗不修其事而又有水工之徒以佐知其利害是以秦漢之際言水事於書尤著而魏晉已來至於隋唐其官亦未嘗廢於魏則有都尉水衡之號晉宋齊皆曰都水臺或為水衡令及梁天監中始改曰太舟卿而主治舟航河隄隋唐之時又皆為都水使者或改曰監而舟楫河渠二署𨽻之然於水事或領或否矣故天下不喻於水而失其水之性使以憂中國者起矣國家比歲之間水之為害亦甚矣自京城之中民被其苦亦暴而衍溢者歷月不知所以泄之今國家懲前日之患而求於秦漢之故為之都水之任專其有司欲以知水之性此慮患之本也夫以患而設備求其功效而使之不為虛位則天下宜有明於水性若秦漢之間所謂水工者出矣茍得其水工而又以知水者居其任使之專其職而行於天下就視其水之利害得以備其故而治之不使數遷其任責之課最而信其黜陟則官得其人而分定則事益修矣故為今之慮水莫若如此欽宗時李光乞廢東南湖田劄子曰臣契勘東南地瀕江海水易泄而多旱歷代以來皆有陂湖畜水以備旱歲蓋湖高於田田又高於江海水少則泄田中水入海故無水旱之歲荒蕪之田也祥符慶歷間民始有盜陂湖為田者三司轉運使下書切責州縣復田為湖當時條約甚嚴謹水之畜泄則有閉縱之法禁民之侵耕則有賞罰之法近年以來所至盡廢為田潦則水增益不已旱則無灌溉之利而湖之田亦旱矣民既已承佃無復脫期所收租稅悉充御前而漕司暗虧常賦數至百萬而民之失業者不可勝計可謂兩失伏望聖慈速賜指揮盡罷東南廢湖為田者復以為湖庶幾凋瘵之民稍復故業不勝幸甚高宗紹興間大理寺丞周公環言臨安平江湖秀四州低下之田多為清水浸灌蓋緣溪山諸處併居太湖水分為二派東南一派由松江入於海東北一派由諸浦注於江其江泄水諸浦中惟白茅浦最大今為沙泥淤塞每歲暑雨稍多則東北一派水必壅溢遂致浸傷農田欲望令有司相視於農隙開決白茅浦故道俾水勢分派流暢實為四州無窮之利近年以來浙西常有水患公私交病崇寧紹興間疏導故迹尚可尋訪乃未有建明者四十二灣古云九里為一灣一灣低一尺二百四十里到三江口三百六十里到大海三江口江面闊九里地勢低於震澤三丈潮水來時水高三丈到震澤底定震澤即太湖也所以謂之平江三江口吳江水與湖水相會合之地謂之匯也二十八年兩浙轉運副使趙子潚知平江府蔣璨上言曰太湖者數州之巨浸而獨泄以松江之一川宜其勢有所不逮是以昔人於常熟之北開二十四浦疏而導之江又於崑山之東開一十二浦分而納之海三十六浦後為潮汐沙積而開江之卒亦廢於是民田有淹沒之患天聖間漕臣張綸嘗於常熟崑山各開衆浦景祐間郡守范仲淹亦親至海浦濬開五河政和間提舉官趙霖復嘗開濬今諸浦湮塞又非前比計用工三百三十餘萬錢三十三萬餘緡米十萬餘斛於是詔監察御史任古復視之既而古至平江言常熟五浦通江誠便若依所請以五千工月餘可畢詔以激賞庫錢平江府上供米如數給之二十九年子潚又言父老稱福山塘與丁涇地勢等若不濬福山塘則水必倒注於丁涇乃命併濬之孝宗乾道五年建康守臣張孝祥上言曰秦淮之水流入府城别為兩派正河自鎮淮新橋直注大江其為青溪自天津橋出柵寨門亦入於江緣柵寨門地近為有力者所得遂築斷青溪水口創為花圃每水流暴至則泛溢浸蕩城內居民尤被其害若訪古而求使青溪直道大江則建康永無水患矣既而汪徹奏於西園依異時河道開濬使水通柵門入從之先是孝祥奏淮水三源一自華山由句容一自廬山由溧水一自溧水由赤山湖至府城東南合而為一縈回綿亘三百餘里溪港溝澮之水盡歸焉流上水門由府城入大江舊上下水門展闊自兵變後砌疊稍狹雖便於一時防守實遏水源流通不快兼兩岸居民填築河岸添造屋宇若禁民不許侵占秦淮既復故道則水不泛溢矣又府東門號陳二渡有順聖河正分秦淮之水每遇春夏天雨連綿上源奔湧則分一派之水自南門外直入於江故秦淮無泛濫之患今一半淤塞為田水流不通若不惜數畝之田疏導之以復古迹則其利尤倍七年臣僚言丹陽練湖幅員四十里納長山諸水漕渠資之故古語云湖水寸渠水尺在唐之禁甚嚴盜決者罪比殺人本朝寖緩其禁以惠民然修築嚴甚春夏多雨之際瀦蓄盈滿雖秋無雨漕渠或淺但泄湖水一寸則為河一尺矣兵變以後多廢不治堤岸圯闕不能貯水強家因而專利耕以為田遂致淤澱歲月既久其害滋廣望責長吏濬治堙塞立為盜決侵耕之法著於令庶幾練湖漸復其舊民田獲灌溉之利漕渠無淺涸之患詔兩浙漕臣沈度專一措置修築淳熙九年知常州章沖上奏曰常州東北曰申港利港黃田港夏港五斗港其西曰竈子港孟瀆泰伯瀆烈塘江隂之東曰趙港白沙港石頭港陳港蔡港私港令莭港皆古人開導以為溉田無窮之利者也今所在堙塞不能灌溉臣嘗講求其説抑欲不勞民不費財而漕渠旱不乾水不溢用力省而見功速可以為悠久之利者在州之西南曰白鶴溪自金壇縣洮湖而下今淺狹特七十餘里若用工濬治則漕渠一帶無乾涸之患其南曰西蠡河自宜興太湖而下止開濬二十餘里若更令深逺則太湖水來漕渠一百七十餘里可免濬治之擾至若望亭堰閘置於隋之至德而徹於本朝之嘉祐至元祐七年復置未幾又毀之臣謂設此堰閘有三利焉陽羡諸瀆之水奔趨而下有以節之則當潦歲平江三邑必無下流淫溢之患一也自常州至望亭一百三十五里運河一有所節則沿河之田旱歲資以灌溉二也每歲冬春之交重綱及使命往來多苦淺涸今啓閉以時足通舟楫復免車畝灌注之勞三也詔令相度開濬十一年冬臣僚言運河之濬自北關至秀州杉青各有閘堰自可瀦水惟沿河上塘有小堰數處積久低陷無以防遏水勢當以時加修治兼沿河下岸涇港極多其水入長水塘海鹽塘華亭塘由六里堰下私港散漫悉入江湖以私港深而運河淺也若修固運河下岸一帶涇港自無走泄又自秀州杉青至平江府盤門在太湖之際與湖水相連而平江閶門至常州有楓橋許墅烏角溪新安溪將軍堰亦各通太湖如遇西風湖水由港而入皆不必濬惟無錫五瀉閘損纍年常是開堰徹底放舟更江隂軍河港勢低水易走泄若從舊修築不獨瀦水可以通舟而無錫晉陵間所有揚湖亦當積水而四傍田畝皆無旱暵之患獨自常州至丹陽縣地勢高仰雖有奔牛吕城二閘别無湖港瀦水自丹陽至鎮江地形尤高雖有練湖緣湖水日淺不能濟逺雨晴未幾便覺乾涸運河淺狹莫此為甚所當先濬上以為然孝宗時蔡戡乞浚開木渠奏曰臣聞江漢之間荆襄之地自古名卿才大夫建立事功以利當年而施後世者遺迹可考其間勳烈彰著至今不泯惟羊祜杜預稽之往牒羊祜減戍邏之卒墾田八百餘頃大獲其利祜之始至也軍無百日之糧及其季年乃有十年之積杜預修召信臣渠激用滍淯諸水浸原田萬頃餘分疆立石俾有定分公私同利衆庶賴之以是知古人經理其地不過廣屯田修水利二者最為急務不特為固圉之計所以成闢國之功南北既分襄陽號為重鎮朝廷謀帥選將不以輕畀殆今五六十年之間宜其算無遺策地無遺利民有餘資軍有餘糧然而曠土未盡闢水利未盡修糧運不繼則軍有乏絶之憂雨暘少愆則民有凍餒之患其故何也非今之人智力不如古也古人有志功名今人志在利祿古人專為國計今人先為身謀蓋無惑乎事功之不立襄陽之宜城有曰木渠後漢王寵所鑿溉田六千餘頃至曹魏時夷人聚萬家據其地而食之謂之柤中當時號為天下膏腴吳將朱然爭取之不克自是渠廢更八百八十餘年本朝治平中縣令朱紘按故地而鑿之三月而成溉田如古鄭獬記其事甚詳靖康之亂渠始湮塞逮今方五六十年是渠也延袤三百里故迹宛然所湮塞者木眼山之旁二三里而已渠中之水猶涓涓不絶惟是山林蔽翳人迹罕至居民無力開鑿官吏無意興修是渠所以殆廢也且廢於八百餘年而朱紘能鑿之不三月而成湮於五十餘年歲月未久浚導必易工費必省儻有人焉出力任之可不勞而辦矣本路帥漕嘗請于朝計其工費已有成數雖蒙行下正以因循茍且憚於興修歲復一歲無人以任是責臣愚欲望睿旨檢照前奏量給所費一二萬緡責付本路轉運司應辦如有不足本司可以那融支給仍委京西安撫荆鄂副都統司差撥軍民各千人分畨工作均給其直人必樂從副都統與漕臣往來董役於農隙日三兩月之間自可迄功渠成灌溉之利必不減昔向來荆榛蘆葦之場皆變而為沃衍膏腴之地然後分兵屯田而盡其利募民請佃而收其租雖暫勞而永逸小費而大獲實攻守之先務也光宗紹熙五年淮東提舉陳損之上言曰高郵楚州之間陂湖渺漫茭葑彌滿宜創立堤堰以為瀦泄庶幾水不至於泛溢旱不至於乾涸乞興築自揚州江都縣至楚州淮隂縣三百六十里又自高郵興化至鹽城縣二百四十里其隄岸傍開一新河以通舟船仍存舊堤以捍風浪栽柳十餘萬株數年後隄岸亦牢其木亦可備修補之用兼揚州墟鎮舊有隄閘乃泰州泄水之處其閘壞久亦於此創立斗門西引盱眙天長以來衆湖之水起自揚州江都經由髙郵及楚州寶應山陽北至淮隂西達于淮又自高郵入興化東至鹽城而極於海又泰州海陵南至揚州泰興而徹于江共為石䃮十三斗門七乞以紹熙堰為名鑱諸堅石淮田多沮洳因損之築堤捍之得良田數百萬頃奏聞除直祕閣淮東轉運判官寧宗嘉泰元年常州守臣李珏上言曰州境北邊揚子大江南並太湖東連震澤西據滆湖而漕渠界乎其間漕渠兩傍曰白鶴溪西蠡河南戚氏北戚氏直湖州港通于二湖曰利浦孟瀆烈塘橫河五瀉諸港通于大江而中間又各自為支溝斷汊曲繞參錯不以數計水利之源多於他郡而常苦易旱之患何哉臣嘗詢訪其故漕渠東起望亭西上吕城一百八十餘里形勢西高東下加以歲久淺淤自河岸至底其深不滿四五尺常年春雨連綿江湖泛漲之時河流忽盈驟減連歲雨澤愆闕江湖退縮渠形尤亢間雖得雨水無所受旋即走泄南入于湖北歸大江東徑注于吳江晴未旬日又復乾涸此其易旱一也至若兩傍諸港如白鶴溪西蠡河直湖烈塘五瀉堰日為沙土淤漲遇潮高水泛之時尚可通行舟楫若值小汐久晴則俱不能通應自餘支溝别港皆以堙塞故雖有江湖之浸不見其利此其易旱二也況漕渠一帶綱運于是經由使客于此往返每遇水澀綱運便阻一入冬月津送使客作壩車水科役百姓不堪其擾豈特溉田闕事而已望委轉運提舉常平官同本州相視漕渠并徹江湖之處如法濬治盡還昔人遺迹及於望亭修建上下二閘固護水源從之嘉定五年建康守臣黃度言府境北據大江是為天險上自采石下達瓜步千有餘里共置六渡一曰烈山渡籍于常平司歲有河渡錢額五曰南浦渡龍灣渡東陽渡大城堽渡岡沙渡籍于府司亦有河渡錢額六渡歲為錢萬餘緡歷時最久舟楫廢壞官吏篙工初無廪給民始病濟而官漫不省遂致姦豪冒法别置私渡左右旁午由是官渡濟者絶少乃聽吏卒苛取以充課徒手者猶憚來往而車擔牛馬幾不敢行甚者扼之中流以邀索錢物竊以為南北津渡務在利涉不容簡忽而但求征課臣已為之繕治舟艦選募篙梢使逺處巡檢兼監渡官於諸渡月解錢則例量江面闊狹計物貨重輕斟酌裁減率三之一或四之一自人車牛馬皆有定數雕榜約束不得過收邀阻乞覓裒一歲之入除烈山渡常平錢如額解送其餘諸渡以二分充修船之費而以其餘給官吏篙梢水手食錢令監渡官逐月照數支散有餘則解送府司然後盡絶私渡不使姦民踰禁從之十二年臣僚言鹽官去海三十餘里舊無海患縣以鹽竈頗盛課利易登去歲海水泛漲湍激橫衝沙岸每一潰裂常數十丈日復一日浸入鹵地蘆洲港瀆蕩為一壑今聞潮勢深入逼近居民萬一春水驟漲怒濤奔湧海風佐之則呼吸蕩出百里之民寧不俱葬魚腹乎況京畿赤縣密邇都城內有二十五里塘直通長安閘上徹臨平下接崇德漕運往來客船絡繹兩岸田畝無非決壞若海水徑入于塘不惟民田有鹹水淹沒之患而裏河隄岸亦將有潰裂之憂乞下浙西諸司條具築捺之策務使捍堤堅壯土脈充實不為怒潮所衝從之寧宗時衛涇奏曰臣聞飢穰之數在歲有天時在人有地利天時之水旱固所不免地利之廢修亦不容無責焉竊見承平之時京師漕粟多出東南江浙居其太半中興以來浙西遂為畿甸尤所仰給旁及他路蓋平疇沃壤綿亘阡陌多江湖陂塘之利雖小有水旱不能為災自豪右兼并之家既衆始借墾闢之説并吞包占創置圍田其初止及陂塘陂塘多淺水猶可也已而侵至江湖今江湖所存亦無幾矣夫江湖之水自常情觀之似若無用由農事言之則為甚急江湖深廣則瀦蓄必多遇水有所通泄遇旱可資灌溉儻或狹隘則容受必少水則易溢未免泛濫之憂旱則易涸立見焦枯之患事理曉然州縣之官皆可以舉職然豪宗巨族必有所慿藉其勢力足以陵駕公府非得健吏莫敢誰何浸淫滋廣江湖之利日朘月削無復曩時之舊圍田增租所入有幾而平歲倍收之田一罹旱潦反為不耕之土常賦所損可勝計哉農人失業襁負流離其害又豈特在民而已矧惟國朝成憲應江河山野陂澤湖塘池濼與衆共者不得禁止及請佃承買官司常切覺察如許人請佃承買并犯人糾劾以聞及瀦水之地輒許人請佃承買人各以違制論立法之意可謂明白前者臣寮纍嘗奏請朝廷非不施行凡係積水草蕩今後並不許請佃雖陳乞撥賜亦許守臣執奏此乾道五年九月指揮也差官檢視應停蓄水利河道有湮塞壅遏去處照舊來界至悉行開掘仍每歲巡察此淳熙三年六月指揮也令浙西諸郡約束屬縣如有給據官民户買佃江湖草蕩圍築田畝許人户越訴置之重憲仍委監司糾劾此淳熙八年七月指揮也凡有陂塘自令下之後尚復圍裹斷然開掘犯者論如法給據與不告捕者併坐罪此淳熙十年四月指揮也是皆匾榜大書人所共覩其他藏於案牘者當不止此奈何條畫雖備奉行不虔或易名而請佃或已開而復圍或謂既成之業難於破壞或謂垂熟之時不可毀撤是知千百畝之田為可惜而不知百萬畝之田尤可惜不忍於強橫之一夫而忍於貧弱之百姓上澤沮格而不下究下情蔽塞而不上通此則有司之罪也臣恭惟陛下愛護本根訪民疾苦詔旨屢頒不為虛文如以臣言為然乞賜睿斷行下户部檢坐條法及纍降指揮申嚴要束本路監司州縣常令遵守仍委御史臺覺察法不徒立務在必行惟陛下留神裁擇幸甚貼黃臣所奏圍田止為妨民水利抑又有可慮者凡圍田去處多在荒僻之鄉必立莊舍佃户聚居既廣行包占又欲侵奪側近民産多蓄無賴惡少及刑餘罪人號為佃户實是姦民幸遇豐年粗得無事歲收稍不能給數十為羣江湖商賈村野居民即被剽掠甚至殺傷間或敗露在官具有案牘可考竊恐飢荒之歲遂為淵藪若行禁戢姦民無所聚集亦潛消盜賊之一策伏乞睿照涇又奏曰臣嘗考國家承平之時京師漕粟多出東南而江浙居其太半中興以來浙西遂為畿甸尤所仰給歲獲豐穰霑及旁路蓋平疇沃壤綿亘阡陌有江湖瀦泄之利焉大抵二浙地勢高下相類湖高於田田又高於江海水少則汲湖水以溉田水多則泄田水由江而入海惟瀦泄兩得其便故無水旱之憂而皆膏腴之地自紹興末年始因軍中侵奪瀕湖水蕩工力易辦創置堤埂號為埧田民田已被其害而猶未至甚者瀦水之地尚多也隆興乾道之後豪宗大姓相繼迭出廣包強占無歲無之陂湖之利日朘月削已亡幾何而所在圍田則遍滿矣以臣耳目所接三十年間昔之曰江曰湖曰草蕩者今皆田也夫陂湖之水自常情觀之似若無用由農事言之則為甚急陂湖廣衍則瀦蓄必多遇旱可以灌溉江流深浚則通泄必快遇水不至泛溢儻瀦水之地或至狹隘則容受必少旱即易涸立見焦枯水源既壅而江流填淤則疏泄甚艱水即易溢蕩為巨浸事之利害豈不較然易知州縣監司所當禁戢然圍田者無非形勢之家其語言氣力足以陵駕官府而在位者每重舉事而樂因循故上下相蒙恬不之怪而圍田之害深矣議者又曰圍田既廣則增租亦多其於邦計不為無補殊不思緣江並湖民間良田何啻數千百頃皆異時之無水旱者圍田一興修築塍岸水所由出入之路頓至隔絶稍覺旱乾則占據上流獨擅灌溉之利民田坐視無從取水逮至水溢則順流疏決復以民田為壑設若圍田僥幸一稔增租所入有幾而常歲倍收之田小有水旱反為荒土常賦所損可勝計哉所謂增租既不繫省額州縣得以移用徒資貪黷之吏耳此其輕重得失又不待智者而後辨也矧惟祖宗成憲炳若日星應江河山野陂澤湖塘池濼與衆共者不許占據及請佃承買官司糾劾以聞諸瀦水之地謂衆共溉田者輒許人請佃承買并請佃承買人各以違制論立法之意可謂明白前者臣寮纍嘗奏請朝廷非不施行臣姑疏其一二諸路如有承買瀦水地者悉與改正此紹興二十八年指揮也凡係積水草蕩今後並不許請佃雖陳乞撥賜亦許守臣執奏此乾道五年九月指揮也詔兩浙漕臣及提舉常平官并逐州守臣常切覺察如官民户及寺觀圍築田畝填塞水道具名以聞此淳熙三年六月指揮也詔州縣輒敢給據與官民户及寺觀買佃江湖草蕩許人户越訴重置典憲仍委監司糾劾此又淳熙三年八月指揮也詔浙西諸郡應官民户舊來圍田去處明立標記給榜曉諭不得於標記外再有圍裹此淳熙十一年八月指揮也其他條約未易悉數夫以陳説之衆多立法之詳備是宜圍田之害悉絶而瀦泄之利盡復曩時之舊可也然歷年浸久陂湖之為田者不止民田之被害者滋甚其已圍者牽於姑息固不復論標記之外增創圍裹者有之因民詞訴已毀撤而復修築者有之易名為天荒而請求給佃者有之寺觀僧道尤無忌憚是豈果不可禁戢哉吏治茍簡而法令不行之過也積習而不知變姦猾蒙利良農失業其害又豈特在民而已臣伏見乾道間孝宗皇帝一旦宣諭輔臣曰聞浙西自有圍田即有水患屢有人理會多為權勢所梗已而令漕臣王炎相視有張子蓋圍田九千餘畝湮塞水勢立命開掘仍戒敕不得再犯淳熙中因姚述堯言傳法寺僧請佃明州定海縣鳳栖沈窖兩湖八百畝可溉田二萬六千餘畝即令仍廢為湖英斷如此孰不悚懼其奉行不虔者特有司之罪而斯民疾苦則有所赴訴矣臣仰惟陛下恭儉愛民率繩祖武詔令之下不為虛文如以臣言為然乞賜睿旨行下户部檢坐條法及纍降指揮申嚴約束斷自今以後凡陂湖草蕩並不許官民户及寺觀請佃圍裹如輒敢干求陳訴者具名聞奏置之於罪本路監司州縣常切遵守或有違戾委御史臺彈治庶幾法不徒立豪強戢斂農民安於田畝此亦固根本之一説也惟陛下留神幸甚貼黃臣照對自紹興間行經界之後至今五六十年生齒日繁豈復有可耕之田荒而不治其目今所存江湖陂澤實皆衆共水利必不可以為田者如蒙睿斷施行仍乞行下本路監司約束應今歲被水圍田向去只許據昨來標記四至埤補塍岸不得因而侵占比近水地其有自昨來標記之後續行圍裹妨害衆共水利去處既因水淹沒更不得再行修築如違許被害民户越訴仰監司委清強官相視具奏取旨施行伏乞睿照貼黃臣又照得所在圍田雖是形勢之家包占然田間利害形勢之家本無從得知多是鄉村豪強富室意在假託聲焰侵擾良民或略用工本廣行侵占因以為已利操執書契請屬獻納此尤不可不治乞委監司州縣覺察如因圍田民户詞訴即與根究元獻田人姓名重作施行伏乞睿照青田縣主簿陳耆卿上疏曰臣聞水在地中猶人之有血脈一日壅塞必有受其病者故水利一事憂民者多疚心焉或曰去歲泛溢之災繩連郡國敗屋殺稼所在相望其害未見其利也雖然天災流行國家代有於泛濫則見其害於旱暵則見其利因泛濫而不為旱暵備殆因噎廢食爾夫稼民之命也水稼之命也春夏之交丁壯蝟集至有爭涓滳以殞其軀者東浙田多依山而本郡蓋其一也巖谷嶢埆渠塘鮮少故灌溉之事不可一日廢夫水疏之則流堙之則竭其疏之也必有源其堙之也必有故彼細民之所爭者涓滴爾毆死者止一身爾強宗右族疆畎盈野每每奄瀦澤以自豐而不顧他人之瘠其所殺寧有算哉十雨五風未見其害也猝有旱魃龜拆立見富人之苗自若而貧者委地矣上之人乃始皇皇於禱祈逮其無年則又皇皇於賑恤亦已晚矣故今州縣之間多以水利為不急之務夫既以為不急之務則往日之已塞者愈塞而未塞者亦塞矣近日之方浚者不浚而未浚者無時可浚矣為計不蚤欲罪歲得乎臣愚欲乞播告外臺遴選官吏遍行根括甚蕪沒不治或為大姓所雄據者極力疏導俾還其初至於陂澤未成而可經營沾丐者亦必廣為濬鑿以幸焦稿毋苛擾毋具文脫遇歲旱民有倚賴縱不能轉歉為豐而利澤亦過半矣金章宗明昌二年二月上諭平章政事守貞曰王汝嘉田櫟專管河防此國家之重事也朕比問其曽於南岸行視否乃稱未也又問水決能行南岸乎又云不可知且水趨北久矣自去歲便當經畫今不稱職如是耶可諭旨令往盡心固護無致失備及講究所以經久之計稍涉違慢當併治罪三月行省并行户工部及都水監官各言河防利害事都水監元擬於南岸王村宜村兩處開導河勢緣北來水勢去宜村堤稍緩唯王村岸向上數里臥捲可以開決作一河且無所犯之城市村落又擬於北岸墻村疏決依舊分作兩清河入梁山故道北清河兩岸素有小堤不完後當築大堤尚書省謂以黃河之水勢若於墻村決注則山東州縣膏腴之地及諸鹽場必被淪溺設使修築壞堤而又吞納不盡功役至重虛困山東之民非徒無益而又害之也況長堤已加固護復於南岸疏決水勢已寢決河入梁山濼之議水所經城邑已勸率作護城堤矣先所修清河舊堤已遣罷之監丞田櫟言定陶以東三掃棄堤不當修止言決舊壓河口以導漸水入堤北張彪白塔兩河之間凡當水衝屯田户須令遷徙臣等所見止當堤前作木岸以備之其間居人未當遷徙至夏秋水勢泛溢權令避之水落則當各復業此亦户工部之所言也宣宗貞祐三年四月單州刺史延札天澤言守禦之道當決大河使北流德博觀滄之境今其故堤宛然猶在工役不勞水就下必無漂沒之患而難者若不以犯滄鹽場損國利為説必以浸沒河北良田為解臣嘗聞河側故老言水勢散漫則淺不可以馬涉深不可以舟濟此守禦之大計也若曰浸民田則河徙之後淤為沃壤正宜耕墾收倍于常利孰大焉若失此計則河南一路兵食不足而河北山東之民皆瓦解矣詔命議之四年三月延州刺史烏蘇克錫克言近世河離故道自衛東南而流由徐邳入海以此河南之地為狹臣竊見新鄉縣西河水可決使東北其南有舊隄水不能溢行五十餘里與清河合則由濬州大名觀州清州柳口入海此河之故道也皆有舊隄補其缺罅足矣如此則山東大名等路皆在河南而河北諸郡亦得其半退足以為禦備之計進足以壯恢復之基又言南岸居民既已籍其河夫修築河堰營作戍屋又使轉輸芻糧賦役繁殷倍於他所夏秋租稅猶所未論乞減其稍緩者以寬民力事下尚書省宰臣謂河流東南舊矣一旦決之恐故道不容衍溢而出分為數河不復可收水分則淺狹易渡天寒輒凍禦備愈難此甚不可元成宗大德元年河決蒲口臺檄令河北河南肅政廉訪使尚文按視防河之策文建言長河萬里西來其勢湍猛至盟津而下地平土疏移徙不常失禹故道為中國患不知幾千百年矣自古治河處得其當則用力少而患遲事失其宜則用力多而患速此不易之定論也今陳留抵睢東西百有餘里南岸舊河口十一已塞者二自涸者六通川者三岸高於水計六七尺或四五尺北岸故堤其水比田高三四尺或高下等大槩南高於北約八九尺堤安得不壞水安得不北也蒲口今決千有餘步迅疾東行得河舊瀆行二百里至歸德橫堤之下復合正流或強湮遏上決下潰功不可成揆今之計河西郡縣順水之性逺築長垣以禦泛濫歸德徐邳民避衝潰聽從安便被患之家宜於河南退灘地內給付頃畝以為永業異時河決他所者亦如之信能行此亦一時救荒之良策也蒲口不塞便朝廷從之歷代名臣奏議卷二百五十三
