body:
  text: 歴代名臣奏議卷二百二十七明楊士竒等撰征伐漢元帝時珠厓反發兵撃之諸縣更叛連年不定上與有司議大發軍待詔賈捐之建議以為不當撃上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠厓内屬為郡久矣今背畔逆節而云不當撃長蠻夷之亂虧先帝功徳經義何以䖏之捐之對曰臣幸得遭明盛之朝䝉危言之䇿無忌諱之患敢昧死竭卷卷臣聞堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之徳地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不强治也故君臣歌徳含氣之物各得其宜武丁成王殷周之大仁也然地東不過江湖西不過氐𦍑南不過蠻荆北不過朔方是以頌聲並作視聽之𩔖咸樂其生越裳氏重九譯而獻此非兵革之所能致及其衰也南征不還齊桓捄其難孔子定其文以至乎秦興兵逺攻貪外虛内務欲廣地不慮其害然地南不過閩越北不過太原天下潰畔禍卒在扵二世之末長城之歌至今未絶賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行日三十里朕乗千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋来獻當此之時逸逰之樂絶竒麗之賂塞鄭衛之倡微矣夫後宫盛色則賢者𨼆䖏佞人用事則諍臣杜口而文帝不行故諡為孝文廟稱大宗至孝武皇帝元狩六年太倉之粟紅腐而不可食都城之内貫朽而不可校乃探平城之事錄冒頓以来數為邊害籍兵厲馬因富民以攘服之西連諸國至于安息東過碣石以𤣥莵樂浪為郡北郤匈奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐡酒𣙜之利以佐用度猶不能足當此之時宼賊並起軍旅數發父戰死於前子鬬傷於後女子乗亭障孤兒號扵道老母寡婦飲泣巷哭遥設虛祭想魂乎萬里之外淮南王盜寫虎符隂聘名士闗東公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有闗東闗東大者獨有齊楚民衆乆困連年流離離其城郭相枕席扵道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之於大海之中快心幽㝠之地非所以救助飢饉保全元元也詩云蠢爾蠻荆大邦為讎言聖人起則後服中國衰則先畔動為國家難自古而患之乆矣何況廼復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中霧露氣溼多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠厓有珠犀瑇瑁也棄之不足惜不撃不損威其民譬猶魚鼈何足貪也臣竊以徃者𦍑軍言之暴師曽未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況扵勞師逺攻亡士無功乎求之徃古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠厓專用恤闗東為憂對奏上以問丞相御史大夫陳萬年以為當撃丞相于定國以為前日興兵撃之連年護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今闗東困乏民難揺動捐之議是上廼從之下詔罷珠厓馮奉世上奏曰羌人近在境内背畔不以時誅亡以威制逺蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決徃者數不料敵而師至扵折傷再三發軵則曠日煩費威武虧矣今敵兵無慮三萬人法當倍用六萬人然𦍑人弓矛之兵耳器不犀利可用四萬人一月足以決丞相御史兩将軍皆以為民方收斂時未可多發萬人屯守之且足奉世曰不可天下被飢饉士馬羸耗守戰之備乆廢不簡鄰敵皆有輕邊吏之心而𦍑首難今以萬人分屯數䖏敵見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見𦍑乗諸種並和相扇而起臣恐中國之役不得止於四萬非財幣所能解也故少發師而曠日與一舉而疾決利害相萬也固争之不能得有詔益二千人王莾欲發三十萬衆齎三百日糧窮追匈奴因分其地立呼韓邪十五子莽将嚴尤諫曰臣聞匈奴為害所從来乆矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王時獫狁内侵至于涇陽命将征之盡境而還其視敵人之侵譬猶蟁蝱之螫敺之而已故天下稱明是為中策漢武帝選将練兵約齎輕粮深入逺戌雖有克獲之功敵輒報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是為下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里轉輸之行起扵負海疆境既完中國内竭以䘮社稷是為無䇿今天下遭陽九之戹比年飢饉西北邊尤甚發三十萬衆具三百日粮東援海岱南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊埶不可用此一難也邊既空虚不能奉軍糧内調郡國不相及屬此二難也計一人三百日食用糧十八斛非牛力不能勝牛又當自齎食加二十斛重矣邊地沙鹵多乏水草以徃事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也邊地秋冬甚寒春夏甚風多齎鬴鑊薪炭重不可勝食糒飲水以厯四時師有疾疫之憂是故前代北伐不過百日非不欲乆勢力不能此四難也輜重自随則輕銳者少不得疾行敵徐遁逃勢不能及幸而逢敵又累輜重如遇險阻銜尾相随敵要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆撃且以創艾敵人莽不聽尤言轉兵榖如故天下騷動東漢光武初晝卧温明殿耿弇入請間曰吏士死傷者多請歸上谷益兵王曰王郎已破河北略平復用兵何為弇曰王郎雖破天下兵革乃始耳今使者從西方来欲罷兵不可聽也銅馬赤眉之屬數十軰軰數十百萬人所向無前聖公不能辦也敗必不乆王起坐曰卿失言我斬卿弇曰太王哀厚弇如父子故敢披赤心王曰我戯卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜如去虎口得歸慈母今更始為天子而諸将擅命扵山東貴戚縱横扵都内元元叩心更思莽朝是以知其必敗也公功名已著以義征伐天下可傳檄而定也天下至重公可自取毋令他姓得之建武三年彭寵反於漁陽帝欲自征之大司徒伏湛上䟽諫曰臣聞文王受命而征伐五國必先詢之同姓然後謀扵羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇庸崇國城守先退後伐所以重人命俟時而動故參分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邊外且漁陽之地逼接邊疆敵人困廹必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵将至當已收之矣大軍逺渉一千餘里士馬罷勞轉糧艱阻今兖豫青冀中國之都而宼賊縱横未及從化漁陽以東本備邊塞地接外域貢稅微薄安平之時尚資内郡況今荒耗豈足先圖而陛下舎近務逺棄易求難四方疑怪百姓恐懼誠臣之所惑也復願逺覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏竟不親征九年帝使来歙悉監護諸将屯長安大中大夫馬援為副歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧今四州新破兵人疲饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之扵是詔扵汧積榖六萬斛十九年妖賊單臣傅鎮等相聚入原武城自稱将軍詔大中大夫臧宫圍之不下帝召公卿諸侯王問方畧皆曰宜重其購賞東海王陽獨曰妖巫相刼勢無乆立其中必有悔欲亡者但外圍急不得走耳宜小延緩令得逃亡逃亡則一亭長足以擒矣帝然之即敕宫徹圍緩賊賊衆分散遂㧞原武斬臣鎮等光武時隗囂發兵拒漢馬援乃上䟽曰臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所耻也故敢觸冒罪忌昧死陳誠臣與隗囂本實交友初囂遣臣東謂臣曰本欲為漢願足下徃觀之於汝意可即專心矣及臣還反報以赤心實欲導之扵善非敢譎以非義而囂自挾姦心盜憎主人怨毒之情遂歸扵臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術得空胸腹申愚䇿退就隴畝死無所恨帝乃召援計事援具言謀畫時匈奴飢疫自相分争帝以問臧宫宫曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十七年宫乃與楊虛侯馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盜縁邊被其毒痡内國憂其抵突乃今人畜疫死旱蝗赤地疲困之力不當中國一郡萬里死命縣在陛下福不再来時或易失豈宜固守文徳而堕武事乎今命将臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡天水隴西𦍑人撃其右如此北敵之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立扵聖世詔報曰黄石公記曰柔能制剛弱能制强柔者徳也剛者賊也弱者仁之助也强者怨之歸也故曰有徳之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者其樂不乆而亡舎近謀逺者勞而無功舎逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣徳者强有其有者安貪人有者殘殘滅之政雖成必敗今國無善政灾變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓㬰且北敵尚强而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大宼豈非至願茍非其時不如息人自是諸将莫敢復言兵事者明帝永平十五年謁者僕射耿秉數上言請撃匈奴上令竇固等共議之耿秉曰昔匈奴并左袵之屬故不可得而制孝武既得河西四郡及居延朔方羌人分離唯有西域俄復内屬故呼韓邪單于請事欵塞其勢易乘也今有南單于形勢相似然西域尚未内屬北敵未有釁作臣愚以為當先撃白山得伊吾破車師通使烏孫諸國以斷其右臂伊吾亦有匈奴南呼衍一部破此復為折其左角然後匈奴可撃也上善其言章帝即位初焉耆龜兹攻沒都護陳睦北匈奴圍已校尉闗寵寵上書求救詔公卿㑹議司空倫以為不宜救司徒鮑昱曰今使人扵危難之地急而棄之外則縱蠻夷之暴内則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為宼陛下将何以使将又二部兵人裁各數十匈奴圍之厯旬不下是其寡弱力盡之効也可令敦煌酒泉太守各将精騎二千以赴其急帝然之和帝即位初朔部大亂加以飢蝗降者前後而至南單于将并北庭㑹帝崩竇太后臨朝其年七月單于上言臣累世䝉恩不可勝數孝章皇帝聖思逺慮遂欲見成就故令烏桓鮮卑討朔部斬單于首級破壊其國今所新降虚渠等詣臣自言去嵗三月中發虜庭北單于創刈南兵又畏可令鮮卑遯逃逺去依安侯河西今年正月骨都侯等復共立單于異母兄右賢王為單于其人以兄弟争立並各離散臣與諸王骨都侯及新降渠帥雜議方略皆曰宜及朔部分争出兵討伐破北成南并為一國令漢家長無北念又今月八日新降右須日逐鮮堂輊從北庭逺来詣臣言北方諸部多欲内顧但耻自發遣故未有至者若出兵奔撃必有響應今年不徃恐復并壹臣伏念先父歸漢以来被䝉覆載嚴塞明候大兵擁護積四十年臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之義願發國中及朔方諸部新降精兵遣左谷蠡王師子左呼衍日逐王須訾将萬騎出朔方左賢王安國石大且渠王交勒蘇将萬騎出居延期十二月同㑹北地臣将餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵衆單少不足以防内外願遣執金吾耿秉度遼将軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害兾因聖帝威神一舉平定臣國成敗要在今年已勅諸部嚴兵馬訖九月龍祠悉集河上惟陛下裁哀省察太后以示耿秉秉上言昔武帝單極天下欲臣虜匈奴未遇天時事遂無成宣帝之世㑹呼韓来降故邊人獲安中外為一生人休息六十餘年及王莽簒位變更其號耗擾不止單于乃畔光武受命復懐納之縁邊壤郡得以還復烏桓鮮卑咸脅歸義威鎮西夷其效如此今幸遭天授朔部分争以夷伐夷國家之利宜可聽許秉因自陳恩分當出命效用太后從之永元元年以秉為征西将軍與車騎将軍竇憲率騎八千與度遼兵及南單于衆三萬騎出朔方撃北敵大破之帝議遣車騎将軍竇憲與征西将軍耿秉撃匈奴侍御史魯恭上䟽諫曰陛下親勞聖思日昃不食憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在扵一舉數年以来秋稼不熟人食不足倉庫空虛國無畜積㑹新遭大憂人懐恐懼陛下躬大聖之徳履至孝之行盡諒隂三年聽扵冡宰百姓闕然三時不聞警蹕之音莫不懐思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事逺方誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯況扵人乎故愛人者必有天報昔大王重人命而去邠故獲上天之祐夫外域者四方之異氣也蹲夷踞肆與水草相逐若雜居中國則飛揚難制轉輾無常是以聖王之制覊縻不絶而已今邊境無事宜當脩仁行義尚扵無為令家給人足安業樂産夫人道乂扵下則隂陽和扵上祥風時雨覆被逺方敵國重譯而至矣易曰有孚盈缶終来有他吉言甘雨滿我之缶誠来有我而吉已夫以徳勝人者昌以力勝人者亡今匈奴為鮮卑所殺逺臧扵史侯河西去塞數千里而欲乘其虚耗利其微弱是非義之所出也前太僕祭彤逺出塞外卒不見一敵而兵已困矣白山之難不絶如綖都護䧟沒士卒死者如積迄今被其辜毒狐寡哀思之心未弭仁者念之以為累息奈何復欲襲其迹不顧患難乎今始徴發而大司農調度不足使者在道分部督趣上下相廹民間之急已甚矣三輔并涼少雨麥根枯焦牛死日甚此其不合天心之效也羣僚百姓咸曰不可陛下獨柰何以一人之計棄萬人之命不卹其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩休罷士卒以順天心書奏不從安帝永初元年涼州先零種羌反畔遣車騎将軍鄧隲討之故左校令河南龐參扵徒中使其子俊上書曰方今西州流民擾動而徴發不絶水潦不休地力不復重之以大軍疲之以逺戌農功消扵轉運資財竭於徴發田疇不得墾闢禾稼不得收入搏手困窮無望来秋百姓力屈不復堪命臣愚以為萬里運糧逺就羌戎不若総兵養衆以待其疲車騎将軍隲宜且振旅留征西校尉任尚使督涼州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍然後畜精銳乗懈沮出其不意攻其不備則邊人之仇報奔北之耻雪矣建光元年髙句驪王宫死𤣥莬太守姚光上言欲因其䘮發兵撃之陳忠曰宮前傑黠光不能討死而撃之非義也宜遣使弔問因責譲前罪赦不加誅取其後善帝從之順帝永和二年日南象林儌外蠻夷區憐等數千人攻象林縣燒城寺殺長吏交阯刺史樊演發交阯九真二郡兵萬餘人救之兵士憚逺役遂反攻其府二郡雖撃破反者而賊勢轉盛㑹侍御史賈昌使在日南即與州郡并力討之不利遂為所攻圍嵗餘而兵榖不繼帝以為憂明年召公卿百官及四府掾屬問其方畧皆議遣大将發荆揚兖豫四萬人赴之大将軍從事中郎李固駮曰昔荆揚無事發之可也今二州盜賊盤結不散武陵南郡蠻夷未輯長沙桂陽數被徴發如復擾動必更生患其不可一也又兖豫之人卒被徴發逺赴萬里無有還期詔書廹促必致叛亡其不可二也南州水土温暑加有瘴氣致死亡者十必四五其不可三也逺渉萬里士卒疲勞比至嶺南不復堪鬭其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人禀五升用米六十萬斛不計将吏騾馬之食但負甲自致費便若此其不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎将尹就討益州叛羌益州諺曰冦来尚可尹来殺我後就徴還以兵付刺史張喬喬因其将吏旬月之間破殄宼仇此發将無益之效州郡可任之驗也宜更選有勇略仁恵任将帥者以為刺史太守悉使共住交阯今日南兵單無榖守既不足戰又不能可一切徙其吏民北依交阯事静之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破敵之功皆可任用昔太宗就加魏尚為雲中守哀帝即拜龔舎為太山太守宜即拜良等便道之官四府悉從固議即拜祝良為九真太守張喬為交阯刺史喬至開示慰誘並皆降散良到九真單車入賊中設方畧招以威信降者數萬人皆為良築起府寺由是嶺外復平順帝時西羌反叛征西将軍馬賢與護𦍑校尉胡疇征之而稽乆不進武都太守馬融知其将敗上䟽乞自効曰今西域諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等䖏䖏留滯羌人百里望塵千里聽聲今逃匿避回漏出其後則必侵宼三輔為民大害臣願請賢所不可用闗東兵五千裁假部隊之號盡力率厲埋根行首以先吏士三旬之中必克破之臣少習學藝不更武職猥陳此言必受誣罔之辜昔毛遂廝養為衆所蚩終以一言克定從要臣懼賢等專守一城賢攻扵西而羌出扵東且其将士必有髙克潰叛之變朝廷不能用又陳星孛參畢參西方之宿畢為邊兵至扵分野并州是也西北諸部殆将起乎宜備二方尋而隴西羌反烏桓宼上郡皆卒如融言時西羌衆大合攻燒隴西朝廷患之上計掾皇甫規乃上䟽求名自効曰臣比年以来數陳便宜羌戎未動䇿其先反馬賢始出頗知必敗誤中之言在可考校臣毎惟賢等擁衆四年未有成功懸師之費且百億計出扵平人回入姦吏故江湖之人羣為盜賊青徐荒飢襁負流散夫羌戎潰叛不由承平皆因邊将失扵綏御乗常守安則加侵暴茍競小利則致大害微勝則虛張首級軍敗則𨼆匿不言軍士勞怨困扵猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能乆敗則經年臣所以搏手叩心而増嘆者也願假臣兩營二郡屯列坐食之兵五千出其不意與護羌校尉趙沖共相首尾土地山谷臣所曉習兵勢巧便臣已更之可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗将非官爵之不髙年齒之不邁臣不勝至誠沒死自陳時帝不能用桓帝詔問護羌校尉段熲曰先零東羌造惡反逆而皇甫規張奐各擁强衆不時輯定欲熲移兵東討未識其宜可參思術略熲因上言曰臣伏見先零東羌雖數叛逆而降扵皇甫規者已二萬許落善惡既分餘宼無幾今張奐躊躇乆不進者當慮外離内合兵徃必驚且自冬踐春屯結不散人畜疲羸自亡之勢徒更招降坐制强敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動惟當長矛挾脅白刄加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從横之勢而乆亂并涼累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寜無期臣庶竭駑劣伏待節度帝許之悉聽如所上靈帝初竇太后臨朝中郎将張奐上言東羌雖破餘種難盡破羌将軍段熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以備陳愚慮思為永寜之筭而中郎将張奐說虜强難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事勢相反遂懐猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空静血流汙野傷和致灾臣伏念周秦之際西北為害中興以来羌宼最盛誅之不盡雖降復叛今先零雜種累以反覆攻沒縣邑剽略人物發塜露尸禍及生死上天震怒假手行誅昔邢為無道衛國伐之師興而雨臣動兵渉夏連獲甘澍嵗時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宫縣邑更相通屬非為深險絶域之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平宼虚欲修文戢戈招降獷敵誕辭空説僣而無徴何以言之昔先零作宼趙充國徙令居内煎當亂邊馬援遷之三輔始服終叛至今為梗故逺識之士以為深憂今傍郡户口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘扵良田養虺蛇扵室内也故臣奉大漢之威建長乆之䇿欲絶其本根不使能植本規三嵗之費用五十四億今適期年所耗未半而餘宼殘燼将向殄滅臣毎奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便靈帝熹平六年鮮卑檀石槐宼三邊護烏桓校尉夏育上言鮮卑宼邊自春以来三十餘發請徴幽州諸郡兵出塞撃之一冬二春必能禽滅朝廷未許先是護羌校尉田晏坐事論刑被原欲立功自效乃請中常侍王甫求得為将甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎将大臣多有不同乃召百官議朝堂議郎蔡邕議曰書戒猾夏湯伐鬼方周有獫狁蠻荆之師漢有闐顔瀚海之事征討殊𩔖所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也武帝情存逺略志闢四方南誅百越北討羌人西伐大宛東并朝鮮因文景之蓄藉天下之饒數十年間官民俱匱至乃興鹽鐡酒𣙜之利設告緍重稅之令民不堪命起為盜賊闗東紛擾道路不通繡衣直指之使奮鈇鉞而並出既而覺悟乃息兵罷役丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫以世宗神武将相良猛財賦充實所拓廣逺猶有悔焉況今人財並乏事劣昔時乎自匈奴遁逃鮮卑强盛據其故地稱兵十萬才力勁健意智益生加以闗塞不嚴禁網多漏精金良鐡皆為賊有漢人逋逃為之謀主兵利馬疾過扵匈奴昔段熲良将習兵善戰有事西羌猶十餘年今育晏才䇿未必過熲鮮卑種衆不弱于曩時而虛計二載自許有成若禍結兵連豈得中休當復徴發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊陲之患手足之蚧搔中國之困胷背之瘭疽方今郡縣盜賊尚不能禁況此逺方而可伏乎昔髙祖忍平城之耻吕后棄慢書之詬方之扵今何者為甚天設山河秦築長城漢起塞垣所以别内外異殊俗也茍無䠞國内侮之患則可矣豈與蟲螘狡宼計争徃来哉雖或破之豈可殄盡而方今本朝為之旰食乎夫專勝者未必克挾疑者未必敗衆所謂危聖人不任朝議有嫌明主不行也昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也如使越人䝉死以逆執事厮輿之卒有一不備而歸者雖得越王之首而猶為大漢羞之而欲以齊民易逺人皇威辱外域就如其言猶已危矣況乎得失不可量邪昔珠崖郡反孝元皇帝納賈捐之言而下詔曰珠崖背畔今議者或曰可討或曰棄之朕日夜惟思羞威不行則欲誅之通于時變復憂萬民夫萬民之飢與逺蠻之不討何者為大宗廟之祭凶年猶有不備況避不嫌之辱哉今闗東大困無以相贍又當動兵非但勞民而已其罷珠崖郡此元帝所以發徳音也夫䘏民救急雖成郡列縣尚猶棄之況障塞之外未嘗為民居者乎守邊之術李牧善其略保塞之論嚴尤申其要遺業猶在文章具存循二子之䇿守先帝之規臣曰可矣帝不從遂遣夏育出髙栁田晏出雲中匈奴中郎将臧旻率南單于出鴈門各将萬騎三道出塞二千餘里檀石槐命三部大人各率衆逆戰育等大敗䘮其節傳輕重各将數千騎奔還死者十七八三将檻車徴下獄贖為庶人光和三年巴郡板楯復叛宼掠三蜀及漢中諸郡帝遣御史中丞蕭瑗督益州兵討之連年不能尅帝欲大發兵乃問益州計吏考以征討方略漢中上計吏程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羌入漢川郡縣破壊得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種軰勿復南行至建和二年羌復大入實賴板楯連摧破之前車騎将軍馮緄南征武陵雖受丹陽精兵之銳倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過扵奴虜亦有嫁妻賣子或乃至自頸割雖陳寃州郡而牧守不為通理闕庭悠逺不能自聞含怨呼天叩心窮谷愁苦賦役困羅酷刑故邑落相聚以致叛戾非有謀主僣號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服獻帝時奮武将軍公孫瓉怒袁紹殺其從弟越遂出軍屯槃河将以報紹乃上䟽曰臣聞皇羲已来君臣道著張禮以導人設刑以禁暴今車騎将軍袁紹託承先軌爵任崇厚而性本滛亂情行浮薄昔為司𨽻值國多難太后承攝何氏輔朝紹不能舉直措枉而專為邪媚招来不軌疑誤社稷至令丁原焚燒孟津董卓造為亂始紹罪一也卓既無禮帝主見質紹不能開設權謀以濟君父而棄置節傳迸竄逃亡忝辱爵命背違人主紹罪二也紹為勃海當攻董卓而黙選戎馬不告父兄至使大傅一門纍然同斃不仁不孝紹罪三也紹既興兵渉歴二載不恤國難廣自封植乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼廹韓馥竊奪其州矯刻金玉以為印璽毎有所下輒皂囊施檢文稱詔書昔亡新僣侈漸以即真觀紹所擬将必階亂紹罪五也紹令星工伺望祥妖賂遺財貨與共飲食尅㑹期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勲首共造兵勲降服張楊累有功效而以小忿枉加酷害信用讒慝濟其無道紹罪七也故上谷太守髙焉故甘陵相姚貢紹以貪惏横責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為傅婢地實微賤據職髙重享福豐隆有茍進之志無虚退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓掃除陵廟忠勤王室其功莫大紹遣小将盜居其位斷絶堅糧不得深入使董卓乆不伏誅紹罪十也昔姬周政弱王道陵遲天子遷徙諸侯背畔故齊桓立柯㑹之盟晉文為踐土之㑹伐荆楚以致菁茅誅曹衛以章無禮臣雖闒茸名非先賢䝉被朝恩負荷重任職在鈇鉞奉辭伐罪輒與諸将州郡共討紹等若大事克㨗罪人斯得庻續桓文忠誠之效遂舉兵攻紹時詔州郡一時罷兵安東将軍陶謙上書曰臣聞懐逺柔服非徳不集克難平亂非兵不濟是以涿鹿版泉三苗之野有五帝之師有扈鬼方商奄四國有王者之伐自古在昔未有不揚威以弭亂震武以止暴者也臣前初以黄巾亂治受策長驅匪遑啟處雖憲章勅戒奉宣威靈敬行天誅毎伐輒克然妖宼𩔖衆殊不畏死父兄殱殪子弟羣起治屯連兵至今為患若承命解甲弱國日虚釋武備以資亂損官威以益冦今日兵罷明日難必至上忝朝廷寵援之本下令羣凶日月滋蔓非所以强榦弱枝遏惡止亂之務也臣雖愚蔽忠恕不昭抱恩念報所不忍行輒勒部曲申令警備出芟强宼惟力是視入宣徳澤躬奉職事兾效微功以贖罪負又曰華夏沸擾扵今未弭包茅不入職貢多闕寤寐憂嘆無日敢寜誠思貢獻必至薦羞獲通然後銷鋒解甲臣之願也蜀先主初法正說曰魏曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮而力不足也必将内有憂偪故耳今䇿淵郃才略不勝國之将帥舉衆徃討必可克之克之之日廣農積榖觀釁伺隙上可以傾覆宼敵尊奨王室中可以蠺食雍涼廣拓境土下可以固守要害為持乆之計此盖天以與我時不可失也先主乃進兵後主時大司馬蒋畹以為昔諸葛亮數闚秦川道險運艱竟不能克不若乗水東下乃多作舟船欲由漢沔襲魏興上庸㑹舊疾連動未時得行而衆論咸謂如不克㨗還路甚難非長䇿也於是遣尚書令費禕中監軍姜維等喻指琬承命上䟽曰芟穢弭難臣職是掌自臣奉辭漢中已經六年臣既闇弱加嬰疾疢規方無成夙夜憂惨今魏跨帶九州根蔕滋蔓平除未易若東西并力首尾犄角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果俯仰惟艱實忘寝食輙與費禕等議以涼州地塞之要進退有資賊之所惜且羌人乃心思漢如渴又昔偏軍入羌郭淮破走筭其長短以為事首宜以姜維為涼州刺史若維征行銜持河右臣當帥軍為維鎮繼今涪水陸四通惟急是應若東北有虞赴之不難由是琬遂還往涪疾轉劇魏太祖初主簿司馬懿言曰劉備以詐力虜劉璋蜀人未附而逺争江陵此機不可失也今克漢中益州震動進兵臨之埶必瓦解聖人不能違時亦不可失也太祖曰人苦無足既得隴復望蜀邪劉曄曰劉備人傑也有度而遲得蜀日淺蜀人未恃也今破漢中蜀人震恐其勢自傾因而􅐦之無不克也若小緩之諸葛亮明扵治國而為相闗羽張飛勇冠三軍而為将蜀民既定據險守要則不可犯矣今不取必為後憂不從太祖時代郡大亂以裴潜為代郡太守烏丸王及其大人凡三人各自稱單于專制郡事前太守莫能治正太祖欲授潜精兵以鎮討之潜辭曰代郡户口殷衆士馬控絃動有萬數單于自知放横日乆内不自安今多将兵徃必懼而拒境少将則不見憚宜以計謀圖之不可以兵威廹也時曹仁為闗羽所圍太祖遣徐晃救之不解太祖欲自南征以問羣下羣下皆謂王不亟行今敗矣桓階獨曰大王以仁等為足以料事勢否也曰能大王恐二人遺力邪曰不然則何為自徃曰吾恐虜衆多而晃等勢不便耳階曰今仁等䖏重圍之中而守死無貳者誠以大王逺為之勢也夫居萬死之地必有死争之心内懐死争外有强救大王案六軍以示餘力何憂扵敗而欲自徃太祖善其言駐軍於摩陂賊遂退時将軍許攸擁部曲不附太祖而有慢言太祖大怒先欲伐之羣臣多諌可招懐攸共討强敵太祖横刀扵膝作色不聽長史杜襲入欲諫太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是邪臣方助殿下成之若殿下計非邪雖成宜改之殿下逆臣令勿言之何待下之不闡乎太祖曰許攸慢吾如何可置乎襲曰殿下謂許攸何如人邪太祖曰凡人也襲曰夫惟賢知賢惟聖知聖凡人安能知非凡人邪方今豺狼當路而狐狸是先人将謂殿下避强攻弱進不為勇退不為仁臣聞千鈞之弩不為鼷鼠發機萬石之鐘不以莛撞起音今區區之許攸何足以勞神武哉太祖曰善遂厚撫攸攸即歸服時袁尚攻兄譚扵平原譚使辛毗詣太祖求和太祖将征荆州次于西平毗見太祖致譚意太祖大恱後數日更欲先平荆州使譚尚自相弊他日置酒毗望太祖色知有變以語郭嘉嘉白太祖太祖謂毗曰譚可信尚必可克否毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定扵已也今一旦求救扵明公此可知也顯甫見顯思困而不能取此力竭也兵革敗扵外謀臣誅扵内兄弟讒䦧國分為二連年戰伐而介胄生蟣蝨加以旱蝗饑饉並臻國無囷倉行無裹糧天災應扵上人事困扵下民無愚智皆知土崩瓦解此乃天亡尚之時也兵法稱有石城湯池帶甲百萬而無粟者不能守也今徃攻鄴尚不還救即不能自守還救即譚踵其後以明公之威應困窮之敵擊疲弊之宼無異迅風之振秋葉矣天以袁尚與明公明公不取而伐荆州荆州豐樂國未有釁仲虺有言取亂侮亡方今二袁不務逺略而内相圖可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登人自知亡而改脩厥徳失所以用兵之要矣今因其請救而撫之利莫大焉且四方之宼莫大扵河北河北平則六軍盛而天下震太祖曰善乃許譚平文帝初即位以賈詡為太尉帝問詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者尚徳化陛下應期受禪撫臨率土若綏之以文徳而俟其變則平之不難矣吳蜀雖蕞爾小國依岨山水劉備有雄才諸葛亮善治國孫權識虚實陸遜見兵勢據險守要汎舟江湖皆難卒謀也用兵之道先勝後戰量敵論将故舉無遺䇿臣竊料羣臣無備權對雖以天威臨之未見萬全之勢也昔舜舞干戚而有苖服臣以為當今宜先文後武文帝不納黄初元年劉曄為侍中吳孫權遣使求降帝以問曄曄對曰權無故求降必内有急權前襲殺關羽取荆州四郡備怒必大興師伐之外有强宼衆心不安又恐中國承釁而伐之故委地求降一以却中國之兵二則假中國之援以彊其衆而疑敵人權善用兵見䇿知變其計必出扵此今天下三分中國十有其八吳蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲其内蜀攻其外我襲其内吳之亡不出旬月矣吳亡則蜀孤若割吳半蜀固不能乆存況蜀得其外我得其内乎帝曰人稱臣降而伐之疑天下欲来者心必以為懼其一不可孤何不且受吳降而襲蜀之後乎對曰蜀逺吳近又聞中國伐之便還軍不能止也今備已怒故興兵撃吳聞我伐吳知吳必亡必喜而進與我争割吳地必不改計折怒救吳必然之勢也帝不聽遂受吳降即拜權為吳王曄又進曰不可先帝征伐天下兼其八威震海内陛下受禪即真徳合天地聲暨四逺此實然之勢非卑臣頌言也權雖有雄才故漢驃騎将軍南昌侯耳官輕勢卑士民有畏中國心不可强廹與成所謀也不得已受其降可進其将軍號封十萬户侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之義也我信其偽降就封名之崇其位號定其君臣是為虎傅翼也權既受王位却蜀兵之後外盡禮事中國使其國内皆聞之内為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寳随時貢獻不敢失臣禮也無故伐我必欲殘我國家俘我民人子女以為僮𨽻僕妾吳民無縁不信其言也信其言而感怒上下同心戰加十倍矣又不從遂即拜權為吳王權将陸遜大敗劉備殺其兵八萬餘人備僅以身免權外禮愈卑而内行不順果如曄言時上幸宛征南大将軍夏侯尚等攻江陵尚欲乘舟将歩騎入渚中安屯作浮橋南北徃来議者多以為城必可㧞侍中董昭上䟽曰武皇帝智勇過人而用兵畏敵不敢輕之若此也夫兵好進惡退當然之數平地無險猶尚艱難就當深入還道宜利兵有進退不可如意今屯渚中至深也浮橋而濟至危也一道而行至狭也三者兵家所忌而今行之賊頻攻橋誤有漏失渚中精銳非魏之有将轉化為吳矣臣私慼之忘寝與食而議者怡然不以為憂豈不惑哉加江水向長一旦暴増何以防禦就不破賊尚當自完奈何乗危不以為懼事将危矣惟陛下察之上軍大将軍曹真征朱然于江陵辛毗行軍師還封廣平亭侯帝欲大興軍征吳毗諫曰吳楚之民險而難禦道隆後服道洿先叛自古患之非徒今也今陛下祚有海内夫不賔者其能乆乎昔尉佗稱帝子陽僭號歴年未㡬或臣或誅何則違逆之道不乆全而大徳無所不服也方今天下新定土廣民稀夫廟筭而後出軍猶臨事而懼況今廟筭有闕而欲用之臣誠未見其利也先帝屢起銳師臨江而旋今六軍不増扵故而復循之此未易也今日之計莫若脩范蠡之養民法管仲之寄政則充國之屯田明仲尼之懐逺十年之中彊壮未老童齓勝戰兆民知義将士思奮然後用之則役不再舉矣帝曰如卿意更當以虜遺子孫耶毗對曰昔周文王以紂遺武王惟知時也苟時未可容得已乎帝竟伐吳至江而還時三公奏曰臣聞枝大者披心尾大者不掉有國有家者之所慎也昔漢承秦弊天下新定大國之王臣節未盡以蕭張之謀不備錄之至使六王前後反叛已而伐之戎車不輟又文景守成忘戰戢役驕縦吳楚養虺成虵既為社稷大憂盖前事之不忘後事之師也吳王孫權幼豎小子無尺寸之功遭遇兵亂因父兄之緒少䝉翼卵煦伏之恩長含鴟梟反逆之性背棄天施罪惡積大復與關羽更相覘伺逐利見便挾為卑辭先帝知權姦以求用時以于禁敗扵水災筭當討羽因以委權先帝委裘下席權不盡心誠在惻怛欲因大䘮寡弱王室希託董桃傳先帝令乗未得報許擅取襄陽及見驅逐乃更折節邪辟之態巧言如流雖重譯累使發遣禁等内包隗囂顧望之姦外欲緩誅支仰蜀賊聖朝含宏既加不忍優而赦之與之更始猥乃割地王之使南面稱孤兼官累位禮備九命名馬百駟以成其勢光寵顯赫古今無二權為犬羊之姿横被虎豹之文不思盡力致死之節以報無量不世之恩臣毎見所下權前後章表又以愚意採察權㫖自以阻帶江湖負固不服狃􅏸累世詐為成功上有尉英布之計下誦伍被屈彊之辭終非不侵不叛之臣以為晁錯不發削弱王侯之謀則七國同衡禍乆而大蒯通不決襲厯下之䇿則田横自慮罪深變重臣謹考之周禮九伐之法平權凶惡逆節萌生見罪十五昔九黎亂徳黄帝加誅項羽罪十漢祖不捨權所犯罪釁明白非仁恩所養宇宙所容臣請免權官鴻臚削爵土捕治罪敢有不從移兵進討以明國典好惡之常以静三州元元之苦明帝即位孫資進爵樂陽亭侯時諸葛亮出在南鄭議者以為可因大發兵就討之帝意然以問資資曰昔武皇帝征南鄭取張魯陽平之役危而後濟又自徃㧞出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石穴耳言其深險喜出淵軍之辭也又武皇帝聖扵用兵察蜀賊棲扵山巖視吳虜竄扵江湖皆撓而避之不責将士之力不争一朝之忿誠所謂見勝而戰知難而退也今若進軍就南鄭討亮道既險阻計用精兵又轉戰鎮守南方四州遏禦永賊凡用十五六萬人必當復更存所發興天下搔動費力廣大此誠陛下所宜深慮夫守戰之力力役參倍但以今日分兵命大将據諸要險威足以震懾强宼鎮静疆場将士虎睡百姓無事數年之間中國日盛吳蜀二虜必自罷弊帝由是止太和元年征蜀鍾繇以散騎常侍上䟽曰夫䇿貴廟勝功尚帷幄不下殿堂之上而決勝千里之外車駕宜鎮守中土以為四方威勢之援今大軍西征雖有百倍之威扵關中之費所損非一且盛暑行師詩人所重實非至尊動軔之時也四年大司馬曹真征蜀王肅上䟽曰前志有之千里饋糧士有饑色樵蘓後㸑師不宿飽此謂平塗之行軍者也又況扵深入阻險鑿路而前則其為勞必相百也今又加之以霖雨山坂峻滑衆逼而不展糧懸而難繼實行軍者之大忌也聞曹真發已踰月而行裁半谷治道功夫戰士悉作是敵偏得以逸而待勞乃兵家之所憚也言之前代則武王伐紂出關而復還論之近事則武文征權臨江而不濟豈非所謂順天知時通扵權變者哉兆民知聖上以水雨艱劇之故休而息之後日有釁乗而用之則所謂恱以犯難民忘其死者矣六年公孫淵數與吳通帝使汝南太守田豫自海道幽州刺史王雄自陸道討之散騎常侍蒋濟諫曰凡非相吞之國不侵叛之臣不宜輕伐伐之不能制是驅使為賊也故曰虎狼當路不治狐狸先除大害小害自已今海表委質不乏職貢而議者先之正使克之無益扵國倘不如意是為結怨失信也不聽豫等徃皆無功青龍元年征東将軍滿寵上䟽曰合肥城南臨江湖北逺夀春敵攻圍之得據水為勢官兵救之當先破敵大軰然後圍乃得解敵徃甚易而兵徃救之甚難宜移城内之兵其西三十里有竒險可依更立城以固守此為引敵平地而掎其歸路扵計為便䕶軍将軍蔣濟議以為既示天下以弱且望烟火而壊城此為未攻而自㧞一至扵此刼略無限必以淮北為守帝未許寵重表曰孫子言兵者詭道也故能而示之以弱不能驕之以利示之以懾此為形實不必相應也又曰善動敵者形之今敵未至而移城却内此所謂形而誘之也引敵逺水擇利而動舉得扵外則福生扵内矣尚書趙咨以寵䇿為長詔遂報聽青龍中吳圍合肥時東方吏士皆分休征東將軍滿寵表請中軍兵并召休将士湏集撃之劉劭議以為敵衆新至心專氣鋭寵以少人自戰其地若便進撃不必能制寵求待兵未有所失也以為可先遣歩兵五千精騎三千軍前發揚聲進道震曜形勢騎到合肥䟽其行隊多其旌鼓曜兵城下引出敵後擬其歸路要其糧道敵聞大軍来騎斷其後必震怖遁走不戰自破矣帝從之時幽州刺史毋丘儉上䟽曰陛下即位以来未有可書吳蜀恃險未可卒平聊可以此方無用之士克定遼東光祿大夫衛臻曰儉所陳平戰國細術非王者之事也吳頻嵗稱兵宼亂邊境而猶案甲養士未果尋致討者誠以百姓疲勞故也且公孫淵生長海表相承三世外撫夷戎内脩戰射而儉欲以偏軍長驅朝至夕卷知其妄矣儉行軍遂不利時欲伐吳詔揚烈将軍王基量進趣之宜基對曰夫兵動而無功則威名折扵外財用窮扵内故必全而後用也若不資通川聚糧水戰之備則雖積兵江内無必渡之勢矣今江陵有沮漳二水溉灌膏腴之田以千數安陸左右陂池沃衍若水陸並農以實軍資然後引兵詣江陵夷陸分據夏口順沮漳資水浮榖而下知官兵有經乆之勢則拒天誅者意沮而向王化者益固然後率合蠻夷以攻其内精卒勁兵以討其外則夏口以上必㧞而江外之郡不守如此吳蜀之交絶交絶而吳禽矣不然兵出之利未可必矣扵是遂止大司馬曹真伐蜀遇雨不進少府楊阜上䟽曰昔文王有赤烏之符而猶日昃不暇食武王白魚入舟君臣變色而動得吉瑞猶尚憂懼況有灾異而不戰竦者哉今吳蜀未平而天屢降變陛下宜深有以專精應答側席而坐思示逺以徳綏邇以儉間者諸軍始進便有天雨之患稽閡山險以積日矣轉運之勞擔負之苦所費以多若有不繼必違本圖傳曰見可而進知難而退軍之善政也徒使六軍困扵山谷之間進無所略退又不得非主兵之道也武王還師殷卒以亡知天期也今年凶民饑宜發明詔損膳減服技巧珍玩之物皆可罷之昔邵信臣為少府扵無事之世而奏罷浮食今者軍用不足益宜節度帝即召諸軍還齊王嘉平四年征南大将軍王昶征東将軍胡遵鎮南将軍毋丘儉等表請征吳朝廷以三征計異詔訪尚書傅嘏嘏對曰昔夫差勝齊陵晉威行中國不能以免姑蘓之禍齊閔辟土兼國開地千里不足以救顛覆之敗有始不必善終古事之明效也孫權自破蜀兼平荆州之後志盈欲滿罪戮忠良誅及𦙍嗣元凶已極相國宣文侯先識取亂侮亡之義深建宏圖大舉之䇿今權已死托孤扵諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新惠内外齊慮有同舟之懼雖不能終自保完猶足以延期挺命扵深江之表矣昶等或欲泛舟徑渡横行江表收民略地因糧扵宼或欲四道並進臨之以武誘間擕貳待其崩壊或欲進軍大佃偪其項領積榖觀釁相時而動凡此三者皆取賊之常計也然施之當機則功成名立茍不應節必貽後患自治兵已来出入三載非掩襲之軍也賊䘮元帥利存退守若撰飾舟楫羅船津要堅城清野以防卒攻横行之計殆難必施賊之為宼㡬六十年君臣偽立吉凶同患若恪蠲其弊天去其疾崩潰之應不可卒待今邊壤之守與賊相逺賊設羅落又持重宻間諜不行耳目無聞夫軍無耳目校察未詳而舉大衆以臨巨險此為希幸徼功先戰而後求勝非全軍之長䇿也唯有進軍大佃最若完牢可詔昶遵等擇地居險審所錯置及令三方一時前守奪其肥壤使還耕塉土一也兵出民表宼鈔不犯二也招懐近路降附日至三也羅落逺設間搆不来四也賊退其守羅落必淺佃作易之五也坐食積榖士不運輸六也釁隙時聞討襲速決七也凡此七者軍事之急務也不㩀則賊擅便資㩀之則利歸扵國不可不察也夫屯壘相偪形勢已交智勇得陳巧拙得用䇿之而知得失之計角之而知有餘不足虜之情偽将焉所逃夫以小敵大則役煩力竭以貧敵富則斂重財匱故敵逸能勞之飽能飢之此之謂也然後盛衆厲兵以震之參惠倍賞以招之多方廣似以疑之由不虞之道以間其不戒比及三年左提右挈虜必冰散瓦解安受其弊可坐筭而得也昔漢氏歴世常患匈奴朝臣謀士早朝晏罷介胄之将則陳征伐搢紳之徒咸言和親勇奮之士思展搏噬故樊噲願以十萬之衆横行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸将有陳越江陵險獨歩虜庭即向時之𩔖也以陛下聖徳輔相忠賢法明士練錯計扵全勝之地振長䇿以禦之虜之崩潰必然之數故兵法曰屈人之兵而非戰也㧞人之城而非攻也若釋廟勝必然之理而行萬一不必全之路誠愚臣之所慮也故謂大佃而偪之計最長時不從嘏言其年十一月詔昶等征吳五年正月諸葛恪拒戰大破衆軍扵東關歴代名臣奏議卷二百二十七
