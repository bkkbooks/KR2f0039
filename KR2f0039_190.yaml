body:
  text: 歷代名臣奏議卷一百九十明楊士竒等撰勤政東漢光武每旦視朝日側乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黃老飬性之福願頥愛精神優遊自寧帝曰我自樂此不為疲也唐貞觀十二年太宗謂侍臣曰朕讀書見前王善事皆力行不怠其所任用公輩數人誠以為賢然致理比於三五之代猶為不逮何也魏徵對曰今四夷賔服天下無事誠曠古所未有也然自古帝王初即位者皆欲勵精為政比迹於堯舜及其安樂也則驕奢放逸莫能終其善人臣初見任用者皆欲匡主濟時追蹤於稷契及其富貴也則思苟全官爵莫能盡其忠莭若使君臣常無懈怠各保其終則天下無憂不理自可超邁前古也太宗曰誠如卿言敬宗縱弛日晏坐朝山南西道莭度使兼平章事裴度諫曰比陛下月率六七臨朝天下人知勤政河朔賊臣皆聳畏近開延英益稀恐萬機奏稟有所壅閼夫頥飬之道當順適時候則六氣平和萬夀可保道家法春夏蚤起取雞鳴時秋冬晏起取日出時蓋在陽勝之以隂在隂勝之以陽今方居盛夏謂宜詰旦數坐廣加延問漏及己午則炎赫可畏聖躬勞矣帝嘉納為數視朝敬宗晏朝紫宸入閣久不出羣臣立屏外至頓仆諫議大夫李渤見宰相曰昨論晏朝事今益晚是諫官不能移人主意渤請出閣待罪會喚仗乃止退上疏曰今日入閣陛下不時見羣臣羣臣皆布路跛倚夫跛倚形諸外則憂思結諸內憂倦既積災釁必生小為旱孽大則為兵為亂禮三諫不聽則逃之陛下新即位臣至三諫恐危及社稷宋真宗咸平三年知兖州韓援上言曰臣伏覩近詔舉行轉對在外文武羣臣未預次對者各許上章奏事此蓋陛下克勤念慮旁採芻蕘幅貟之間蹈詠斯極伏惟陛下膺運圖大握樞御極行一事必遵典禮發一言必訪古今三載遏密之中過形哀毁萬機聽覽之後未嘗怠遑每春澤稍愆宿麥未秀必親臨祠觀備薦蕭薌減御膳以焦勞走使車而旁午並禱羣望盡降五刑昭感上穹必獲嘉應雖有祲沴安能為災然臣輒以葑菲窺測蒼昊退循僭越難避鼎鑊死罪近者微有亢旱頗傷稼政天其或者得無以太祖太宗二聖在天陛下春秋鼎盛兆民樂業萬國來王萬一聖心忽生驕佚故暫加災眚以警睿聰昔魏徵對唐太宗曰貞觀之初聞善若驚五六年間猶恱以從諫自兹厥後漸惡直言此蓋譏其漸怠於政也則知勤儉難守驕佚易生人之常情也玄宗開元十五年以後深居髙視倦于臨御內寵嬪嬙外事征伐連起詔獄無辜誅夷遂至大盜猖獗中原板蕩蓋亦升平之後驕怠致然也臣伏覩先帝福祚延洪享國長久孜孜勤儉未嘗一日曠於萬機自端拱以來益勵精為理臣嘗權鹽鐡判官得與本使上殿奏事一日先帝從容謂臣等曰大凡於職不可不勤朕每見殿庭兵卒能剩掃一席地剩汲一瓶水必記其姓字夫如是則有以見先帝勤勞庶政片善無遺願陛下守太祖之丕圖遵太宗之遺訓兢兢業業無怠無荒臣又聞之圖治者在乎逺佞人杜讒口書曰堲讒説殄行震驚朕師詩曰取彼譖人投畀豺虎臣觀今日朝廷自公相以下悉皆方正無邪佞之徒然事生隱微宜防未兆以陛下聰明神智必無驕佚之虞然願罔倦燭幽勿使小人乘間而進日謹一日雖休勿休居安慮危在治防亂則天下幸甚景德三年以刑部貟外郎直昭文館陳充上奏曰臣竊以古先哲王嗣守大業逺則漢武帝近則唐玄宗英智天資聰明神授雖茂功克建而至德未周蓋以享國年深在位時久倦於勤儉或至怠荒不恤民人多耗國用子孫繼統無以取法令德方䇿布翰無以備書大猷覽其始終良可歎惜恭以皇帝陛下君臨寰宇富有春秋無一日晏坐朝無一時倦聽政言必合道動必由禮無聲伎之好無畋逰之娛未嘗興土木之功未嘗納珍竒之貢訓練士卒也務寧邊鄙不衒於武威編修典籍也用廣採掇思益於文德巍巍然蕩蕩然信無得而名者矣方今天下庶官錢榖刑獄兵農賦租咸遵詔條悉協程式至使小有壅遏自可懲革如人之腠理平適膚革充盈偶生微痾不患難療臣以為方今天下但恭勤而守之足彰社稷之慶黔黎之幸也然則日謹一日雖休勿休存諸格言斯用垂訓伏慮陛下以時當寧泰情有變遷安居九重倦覽萬務近習可畏間邪頗難尚書曰惟王不邇聲色道德經曰馳騁畋獵令人心發狂史記曰由余見秦宫室大奢歎曰使鬼為之則勞神矣使人為之則苦民矣尚書曰珍禽竒獸不育於國四者人君之大戒也其或小人乘此而競進聖治因兹而闕修則追思漢武帝唐玄宗英智聰明而至德未周以為前鑑乃小臣之所以愛君者也周易曰天行健君子以自強不息夫天道運行無有止息是以四時推移萬物生成也聖人之道宜取法上天勤而不息是以政教克舉華夏以寧者也臣伏讀敕命朝廷之闕遺朕躬之過失並形封奏得以指陳今者朝無闕遺君無過失預伸忠欵必恕罪尤願陛下長採斯言靜思闕義治不忘亂安不忘危則九夷向化百世受祉無出於斯而已矣至如指一小事以為利濟陳一短見以為周通臣所不為也仁宗景祐元年監察御史裏行孫沔上言曰臣伏聞隱憂而道著功成而德衰涉難則思深而圖全居安則志滿而自逸上自三王之世兩漢之主撥亂者咸臻於至治憂勤者多致於中興荒淫怠政喪亂相隨晉魏以降虐懦無紀臣不敢逺引古義願以唐事明之文皇開基武定大難招籲羣儒確論理體閲弓矢則知政教之微諭金冶以來獻替之道房魏諸賢夙夜盡瘁貞觀之風終始無玷洎于髙宗藉此治平性務寬簡事稽裁決外綱隳而無忌逺黜內嬖盛而二張用事許李諂上禍厲是階二十餘年變周因武至於明皇治亂尤異開元之治內難方平久在民間深知國害濫官弊事思盡革去故任姚崇宋璟為相庶務畢舉遂致化成天寶之後聽斷稍怠寵幸勃興竒巧厭溺夷入亂華威不克愛故因林甫國忠盜位綱條不倄以至奔幸此三主事迹一時龜鑑布在書傳可得知聞皆由世亂則思於恭勤時平則敗於逸樂勢使之然由來者漸故易曰亡者保其存者也亂者有其治者也詩曰靡不有初鮮克有終傳曰有始有卒者其惟聖人乎伏惟陛下纂紹寶圖務敦淵靜韜晦英謀竭伸孝愛而內闈輔政朝制弗經宦寺弄權海宇側目女謁交馳大道不行而陛下山藏無遺日覆不昭洎莊憲上仙萬機獨斷躬親大政勵精為治投閹寺之巨黨罷內降之私恩升擢正臣黜退竊位每旦聽政舊邦惟新庭宇再清幅貟欣戴將以執之如金石行之為軏輗希陶唐之風襲文景之迹為一代之宏規冠千篇之良史豈不大哉比及周嵗頗異曩時內寵艷興中宫傾易楊尚恃恩權勢特盛事由請行言自政出君子小人腹誹竊議幸賴陛下神明議斷廢黜外宫雖謹正家之道未遑經國之宜功業弗彰簡編安在恭聞昔者太祖應天奮陸救生民於塗炭太宗耀德開基平列國之干戈真宗倄文守位下武和戎崇儒議禮封禪告成神德聖功形詩播樂三朝盛事萬祀流光今陛下自幹蠱十年豈常專已歡言三載足以變風未聞可久傳被無窮纍歲已來和氣稍鬱水旱相仍螽螟屢生粟麥不登田疇幾廢九夏多寒三冬無雪星變上天河決東郡疾病流離生靈困憊民乏兼日之食廪無卒嵗之儲既庶而富曷其若是正當不足之時豈曰無為之化陛下不可謂無兵革乃號太平政奉簡書便為端拱竊恐禍生所忽亡有其存漸至陵夷無時逸豫有唐天寶可謂覆車前春伏見詔書布下每旦親政故天下之民謂吾君為憂勤率仁之化翹足可待去秋以聖體愆和臣心啓沃愛君有從宜之制雙日伸不坐之請交泰之誠遽臻有喜宴安之戒豈可為常且一月之中適減其半慶辰嘉莭休沐受釐三分之日復廢其一是則一嵗之中率無百餘日視事宰臣上殿奏可待對止餘數刻天下萬務得不曠哉雖云漢帝五日一朝則有伏蒲入閣據厠與語示無間也唐制三日一坐則有便殿更番浴堂延對信不怠也今退朝之後深宫之中侍左右者刀鋸虧殘之餘恱耳目者綺羅艷冶之色扃鑰九重呌閽千仭宸禁晝嚴乘輿天逺固未見欵召名臣清問外事詢祖宗之綱紀質朝廷之得失徒修簡易之名未益承平之化臣恐其未可也況今之政失於寬而蔽於姑息今之士弛於務而幸於因循是飬其惰也夫天下之本者在民民之豪者皆兼并而貧者無置錐之業天下之大者在兵兵之下者負飢寒而驕者不敢役郡守縣令臧否無别冗食千萬蠧耗靡窮邪佞退而復興忠諫黜而未用此害之大者也設欲止之於未發救之於將然莫若振綱舉目杜漸防微勤儉為先剛斷為急權之一去安可再得豈宜崇尚寬大自從清宴若謂怡神飬性之方且非耄期倦勤之際臣復以為不然也今陛下春秋鼎盛氣志如神釋習常之弊加致治之心勤禹湯克己之規敷文武立教之旨振三祖之基為百世之法則垂鴻自我豈不盛歟願因嵗首正朝之始霈然下令誕告多方每旦恭已辨色居位推擇大臣講求古道降以溫顔俾之極論精思品藻督責賢否外則逐刺史縣令無狀老懦貪殘之輩以利於民內則罷公卿大夫不才諂佞詭誕之士以肅於朝掖庭之中簡去幽曠以來錫羡之慶宦寺之內抑損重任以防昵近之私發號施令必審其有害賞功罰罪必思其未平則可使教敦于上民悅于下足以招天地之協氣致國家之豐隆皆目前可見之事惟陛下力行而已三王為可侔十聖未足擬何為恃當年而樂自足哉臣迹甚孤危言無忌諱妄陳愚瞽甘俟誅夷然念優處憲臺過受豐祿恩自上隆食出民力豈可偷安不思盡莭苟一言而萬死實以為榮干犯天威臣無任激切待罪之至英宗治平元年知諫院吕誨乞親決政事疏曰臣恭聞近日聖體平復中外均慶然萬機之事未聞親決議者謂陛下遜避有所待焉果如是恐未為順敢不為陛下委曲而陳之且以兩漢而下母后臨朝者衆皆嗣君沖幼親為輔翊並坐簾帷之下專其聽斷幼君既長有復辟之議今日之事有異於是先帝拔陛下於公族之中以賢且長付託之意正為今日也當陛下違豫之時非皇太后內輔則政無所寄大臣建䇿於國中也然而陛下臨朝御前殿百官朝罷兩府大臣方至內東門是綱領柄權皆在於手陛下自未專決何所待也臣伏望宸衷感悟無以此為怠唯內勤孝飬率中宫盡禮則婦姑之情相接母子之愛益親躬修政務操守威福日與近臣講求治道事無過舉體斯為順自然皇太后慰安恩意無間燕適深宫優遊清靜含飴弄孫不復關政豈非皇太后之心哉臣區區罄于是矣英宗時知諫院傳堯俞上奏曰臣聞乾剛坤柔上下之定分君倡臣和古今之通義恭惟陛下德稟健粹學該治亂日旰論道淵默思政所謂有可致之位而挾可致之資然親政以來過事謙挹神明之斷未甚聞於天下夫舜禹稷卨尚相誡敕今輔弼雖賢安得事事皆善古所謂委任責成者非謂若是與非一切徇之也大臣之言是陛下從之宜也其非是者陛下偶以為然姑行之可也既已知其非矣又從而徇之則人主之柄安在雖愚夫愚婦有不可欺此神明之斷所以未甚聞於天下也今禫服未終天下謂陛下信默不言耳從此踰月畢三年之制威福之權倘尚循故轍人將以深淺測陛下伏望議政之際君臣各盡其意非非是是毋相面從間於燕間與羣臣相接總覽衆議以裁處其當罔有適莫務存大公則柄在陛下而威斷伸矣臣雖亡狀竊揣陛下資性有祖宗之風真勤儉有為之主夫有為者當為於可為之時今四海延頸以待德音不知何憚何嫌而不為也時難得而易失惟陛下不徒悔於他日則天下幸甚神宗時彭汝礪上奏曰夫乾天下之至健也而其德行常易夫坤天下之至順也而其德行常簡所以成物者至誠而已天地之間其精結而為日月而日月之更為晝夜其氣運而為四時而四時之代於終始其形流而為萬物而萬物迭為盛衰消息未嘗或息焉故曰天地之道可一言而盡之也而人君者成位於上下成能於終始其所以範圍之道彌綸天地之化輔相天地之宜其所以通天下之志成天下之務定天下之業亦在於至誠而已宋興百餘年天下狃於治安苟簡而萬幾廢矣陛下之興日夜自強不息思欲逺至於三代而天下之士亦皆勉焉而日孳孳皆以言責得與聞朝廷議論以事觀之疑若少加意焉蓋有獄久而不決者有言已進而不省者而後臣知其少怠也如朱炎輩盛南仲陳􅼱等多無罪案成下大理寺今踰十月而終未見與奪臣是以知刑獄有滯而未決者也臣去年十一月以書進陛下踰月而復見而書之所陳終未留一夜之觀臣是以知言之有進而不省者也夫事固有大於盛南仲之獄而臣之言誠無足以煩聖慮然以此觀之知至誠之心減於疇昔凡人言者皆曰天下安且治矣而可以無事此非忠臣也今自朝廷觀之法度有所未立其下皆偷安者自府寺觀之政事有所未立而吏多冒法自民觀之窮困者未蘇而流移者未安集自四夷觀之而凌犯之罪未誅窺覦之心未塞自財用觀之民力方屈國費方迫自學校觀之忠信未成而道德未一臣所謂陛下當日夜加勵思所以補苴凋瘵之術如此其幾也遂玩之以為安治而少怠焉臣恐天下之心復弛矣哲宗元祐二年平章軍國重事文彥博進無逸圖奏曰臣伏觀周公作無逸以戒成王後代聖君皆奉為至戒以成治道以克永世臣又觀唐史見宰相崔植對穆宗云玄宗初得姚崇宋璟為宰相二人者夙夜孜孜致君于道璟嘗手寫尚書無逸一篇為圖以獻玄宗置之內殿出入觀省記念在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圗朽壞始以山水圖代之自後既無座右針規又信姦臣用事天寶之末稍倦於勤王道於斯缺矣今陛下虛心求治伏望以無逸為元龜穆宗善其對臣恭惟皇帝陛下聰明稽古嚮學思道間日御邇英延儒臣講讀經史臣又觀邇英北壁有仁祖朝講官王洙所寫無逸圖臣慮禁中或未有此圖輒敢寫録四軸並一卷上進望於殿內張挂置於几案以便聖覽臣愚不勝區區之至四年中書舍人彭汝礪上奏曰臣伏惟自古天下廢興存亡見於書者甚備其成未嘗不以憂勤其失未嘗不以怠忽陛下即位蒞政其仁民愛物之心發於詔令見於行事厚矣日月益久然終不能近古殆誠意未加而已聽言之道必觀以事今察於天地常寒星變河流未息察於財用公私單乏浮費益滋察于有司因循苟簡之弊日甚察於風俗廉耻忠厚之風幾喪役法既變民人益困邊備浸弛強敵方侮選舉法壞士迷所向而進言者曰今大安且治是非欺則諛天下大器置之安則安置之危則危安危之幾一朝一夕一言一動之間而已蓋自古人主饗國既久無至誠惻怛之心上下偷安趣過目前綿綿延延日月以甚固雖無惡政虐刑加於百姓而天下未嘗不亂此不可不察也陛下因仁民愛物之心加之以至誠在所可為而必斷在所可法而不惑在所可聽而必從在所可改而無咎如此則百官有司莫不奮勵承詔災異弊病非所患矣臣雖不肖猶日夜洗心以俟故以至誠之論終之徽宗大觀中吏部侍郎慕容彥逢上奏曰臣備位詞掖幸以權記注職事日侍清光伏覩陛下辨色視朝延見羣臣雖雪霰風霧凜洌異常辰正奏隔上殿班傳旨特引嘗近已初乃罷盛寒疇咨玉色無倦十六日入冬至假陛下御延和引上殿十一班十七日又引十班皆人人顧問曲盡事情告戒丁寧切中機會莭假內批降臣寮章疏及有他處分差除絡繹不絶臣職在奉行捧讀悚激方是時羣臣賜告偃息于家而陛下夙夜省覽憂國愛民未嘗暇逸陛下以天縱之聖而勤政若此蓋將訓迪有司永垂憲度而日歷之所紀邸報之所傳循舊襲常舉其大略而已自非進得陪侍軒墀退得與聞幾政何以盡知其詳臣愚欲望聖慈以臣所陳降付史館及進奏院昭示天下傳之無窮俾中外官吏乃至民庶聞風胥勸罔不克勤上副陛下宵衣旰食之誠孝宗時禮部貟外兼崇政殿説書范成大上奏曰臣聞治天下之道非以無其具之為患而以有其具而不責其成功之為患也譬猶工匠雖有械器雜然前陳而不課其成器之效則與無械器者何異夫興事造業發號出令之初何嘗不長慮却顧殫智竭力再三熟復而後有所為哉推而放之之久則必有偏而不舉尼而不行與夫沮抑於下而弗使見功者一聽其自然不復過而問焉則嚮之所謂殫智竭力而為之者終於徒勞而無補此所以治具雖多而治功愈逺也大抵末俗之陋樂宴安而憚改作習委靡而忘振起譬猶王良之御駑馬審其銜勒而謹握之猶可維持以行跬步稍弛則蹶躓隨之矣故曰一日二日萬幾無曠庶官天工人其代之此言一日曠官則萬事之幾必有廢失者况其久乎故善治之主不敢一日不用其才焉孜孜業業執其所以為治具者晝夜提䇿之曰吾前日興某利其果興矣乎前日去某害其果去矣乎利宜興而未興害宜去而未去無乃吾法制有未善者乎抑亦有沮抑於下而使法制不得行者乎及其利已興矣害已去矣則又曰其果能久而弗變矣乎雖變而猶可通之以盡利乎夫如是則有所不為為無不成而成亦不壞矣堯舜之治莫要乎二典二典莫盛於賡歌治至於君臣作歌以相戒宜不作不急之語而臯陶之揚言但曰率作興事謹乃憲欽哉屢省乃成欽哉蓋興事之初不謹憲度固無可行之理憲度謹矣而必繼以屢省者蓋事不加省則雖成而必隳屢之為言不一而足之謂朝省之暮又省之今日省之眀日又省之不知何時而已也二典之治百聖所師臯陶之謨後世莫及撮其樞要初不逺於人情而無髙世離俗甚髙難行之説今聖主將大有為以躡堯舜之迹觀臯陶之歌思過半矣侍御史王十朋上疏曰臣竊以今日邊事未靖正君臣相與有為日不暇給時也竊見朝廷尚循平時故事假故稍多有妨機務臣欲乞陛下未明坐朝日晏而退至於假故之日宜常御便殿不拘早晚引見宰執侍從臺諫羣臣賜以從容訪問時務事有可採即時施行仍敕朝廷不可似常時作假宰執日入朝堂百僚各任其職庶幾事務不廢共致中興不勝幸甚趙汝愚上奏曰臣伏觀唐世人主莫不其始甚勤其終則怠其進甚鋭其退亦速若德宗文宗始皆慨然有削平僭亂之志特以用非其人故功不果遂二君不能於此自反圖任忠賢以收後效雖元勳舊德見於已試若陸贄裴度皆不獲見用而甘心委靡廢放不復自振此固無足稱者若夫玄宗憲宗皆剛明果斷卓然為一代英主自始即位克己用人不數年間功成治定何其易也及其驕縱之心一生則忠言易疏甘言易入於是罷張九齡相李林甫用皇甫鎛棄裴度而盛德大業俱不克終矣其間惟一太宗能用人納諫始終不倦故貞觀之治獨盛於唐而魏徵諄諄然猶陳十漸之戒書曰謹厥終惟其始又曰終始惟一時乃日新嗚呼艱哉臣仰惟陛下臨蒞以來二十餘載仁孝之行愈久而愈彰勤儉之誠彌積而彌勵至於詢求闕失奬勸忠良比嵗孳孳日恐不逮凡聖德之所成就者視初即位蓋益髙明光大矣雖成湯之日新又新文王之純亦不已不足進於是也臣嘗究此道其實千古同符順而行之則以治以安逆而用之則有危有亂陛下聖學髙逺洞照古今灼知聖帝明王未有不由斯道而能致隆平者也臣愚伏願陛下篤信而勿疑力行而勿倦尊有德以正朝廷之本容直諫以來天下之言自然士氣作成庶職修舉王功帝業為無不成矣惟陛下留神幸甚光宗時趙汝愚上奏曰臣嘗歷觀天下之事物蓋未有久而不壞者也然流水不腐户樞不蠧者何哉運動故也惟我國家自祖宗開創以來蓋歷二百三十有餘年如大厦然嵗月深矣中更變亂庶事非復舊制今又六十餘年矣臣竊觀事勢固有偏而不起之處興滯補弊正有賴於今日臣仰惟陛下以神禹之資而受重華付託之重是宜憂勤夙夜興起治功使功光祖宗業垂後裔而羣臣進言有勸陛下以中外無事優遊安靜者是皆人臣苟安之利而非國家長久之福也臣誠愚戅不達治體然更歷數郡首尾十年自蜀至閩身行萬里所見閭閻之內民實困窮郡縣之間吏多貪濁風俗玩弊上下苟偷邊備空虛事力單弱將帥掊克而不恤其下士卒愁怨而不聽其上病弊百出不可盡言誠恐一旦有邊鄙之虞水旱之變軍旅數起盜賊繁興雖有智者無以善其後此正賈誼所謂厝火積薪之下火未及然而因謂之安者也臣愚伏願陛下思王業之艱難念民生之不易慨然發憤志於有為凡前數者之弊勤而思之如飢者之望食病者之望藥朝夕砥礪以圖安強之效雖陛下有一日之勞而子孫享萬年之福宗社幸甚不然臣恐玩嵗愒日棟橈梁折曽風雨之不庇矣臣不任惓惓愛君憂國之誠遂忘其狂瞽陛下留神幸甚寧宗時衛涇進故事曰唐憲宗嘗曰惟太宗玄宗之盛朕不佞欲庶幾二祖之道德風烈何行而至此乎李綘曰陛下誠能正身勵己尊道德逺邪佞進忠直與大臣言敬而信無使小人參焉與賢者遊親而禮無使不肖與焉去官無益於治者則材能出斥宫女之希御者則怨曠銷將率擇士卒勇矣官師公吏治輯矣法令行而下不違教化篤而俗必遷如是可與祖宗合德號稱中興夫何逺之有言之不行無益也行之不至無益也帝曰美哉斯言朕將書諸紳即詔綘與崔羣錢徽韋洪景白居易等搜次君臣成敗五十種為連屏張便坐帝每閲視顧左右曰而等宜作意勿為如此事臣聞詩稱文武始於憂勤終於逸樂言圖治於始而享成於終逸樂非宴安之謂也仲虺之告湯曰慎厥終惟其始伊尹之告太甲曰終始惟一時乃日新蓋始勤終怠者人之常情故自昔君臣相與警戒未嘗不致謹於斯也憲宗元和初鋭意有為慨慕貞觀開元之盛李綘告以正身勵己進忠逺佞敬大臣親賢者擇將率而任官師行法令而崇教化初非驚世駭俗之説亦無甚髙逺難行之論而皆修身治國之要道古今不易之至理又謂言之不行行之不盡為無益帝既嘉納又詔搜次君臣成敗列之連屏以便觀覽且每顧左右戒以勿為如此事惟帝因綘之言心知驚懼故一時委用忠賢不惑羣議削平僭叛威令幾於復振其剛明果斷雖天資之美亦憂勤之效也使帝盡行其言殆不止於度越二祖而已奈何淮西既平浸至驕侈信任非人程異皇甫鎛之徒或以羡餘或以賄賂相次而進凡綘所言於帝者漫不之省遂使升平之業遽自墜壞史臣有不克終之歎言之不行行之不盡卒蹈綘之戒豈非此心怠忽之所致哉人君臨政願治儻因憲宗之所以得鑒憲宗之所以失聽言之際尊其所聞行其所知充而至於高明光大一政令之施設注措一人材之進退用舍本之以至正持之以至公兢兢業業謹終于始而勿為逸豫怠驕之念所移奪則唐虞三代之治可以馴致唐之三君奚足論乎理宗時李韶為禮部侍郎上疏曰臣生長淳熙初猶及見渡江盛時民生富樂吏治修舉事變少異政歸私門紹定之末元氣索矣端平更化陛下初意豈不甚美國事日壞其人或罷或死莫有為陛下任其責者考論至是天下事豈非陛下所當自任而力為乎左氏載史墨言魯公世從其失季氏世修其勤蓋言所由來者漸矣陛下臨御日久宜深思熟念威福自已誰得而盜之哉舍此不為悠悠玩愒乃幾於左氏所謂世從其失者知南劍州徐元杰上奏曰臣叨恩收召獲對清光不敢以故事具文之言對惟陛下垂聽焉臣竊惟天下可慮之勢譬之舟泛滄溟非不歷驚波怒濤之險幸狂飈之粗息宜同心而共濟可也茍以恬靜自紓偃仰少憩視罅漏之滲而弗窒睹維楫之亡而弗救于于然略無誕先登岸之意正恐天大以風其何以支方今之弊無以異此臣聞敵國外患之有無正所以係國之存亡也自古不恃敵之不來恃吾有以待之國勢必尊嚴內治必整飭君臣上下凡見之於嚴訓胥告者惟曰常謹其在我而已是以唐虞盛時四夷來王實本於無怠無荒之忱蠻夷率服不外乎端德難壬之化當時廷臣告語首欲其警戒於無虞之日帝之作歌非夸詡也􅏮􅏮乎敕天之命而不敢安臯陶之揚言非溢美也懇懇乎興事謹憲而不敢怠不特此爾上之所以告者曰惟時則不玩於惜隂也曰惟幾則不忽於謹微也下之所以復者首之以念哉而致其慮終之以欽哉而堅其忱不徒為明良喜起之賡必嚴於叢脞惰隳之戒夫以泰和氣象猶諄切規警如此今果何時視為已安已治而悠悠玩愒得乎陛下與二三大臣以宗社為心是正勵志復讎卧薪嘗膽汲汲於生聚教訓之時也是正憂治危明寢薪厝火皇皇然痛哭流涕之時也陛下一警悟及此則夫發憤立志責躬救過以先羣下者是又今日之良機也然立志最易消靡救過常易因循嘆白日之如飛痛事功之何及慨蒼天之罔極懷報稱之何窮體認乎天地眷祐之隆感念乎祖宗付託之重悼襄漢之未葺憤淮蜀之未靖陛下必有志於撥亂二三大臣亦必相與堅定夫修攘之規摹而燕安江沱玩敵噬臍者不可不鑒也亂離斯瘼之在念勞來還定之關憂陛下必有志於平治二三大臣亦必相與恢拓夫𢎞濟之事業而民亦勞止謂可少康者不可不戒也臣聞前乎十年聖語嘗曰即位以來未曽為祖宗辦一事是蓋聖志英烈質天地神明而無愧惜其工夫經理之次第不能反而求之以乖陛下之初心而法家拂士所以規切時政者又不能諄勤惻怛以開明夫上下有為必遂之志舉世之耆艾骨鯁為之擯棄淪落而無餘者則亦甚可惜也雖然事無難易有志竟成鑒舊圖新辦此心爾陛下以不負天地祖宗為心必示人以豫違汝弼之旨二三大臣以不負陛下為心必諭人以勤攻吾闕之求自是而倡之則內外小大之臣亦必洗心滌慮莫不有官師相規之義故夫謹法守之奉者勿求多於道揆之常井然周官法度之中隱然關睢麟趾之意至公血忱對越之實德相與每事而發見凡有動於血氣之私必深省而自窒之刻厲堅苦負荷之定力相與叶心而扶持少有鄰於便安之適惟深戒而隄防之如是則自上而下無一念而不以天下國家為事無一事而不以天地祖宗為心是蓋古者君臣相與克艱之義不惟逸豫惟以亂民其旨如此陛下與二三大臣信能持此之志堅如金石救此之過疾如雷風則舉天下之事勢自莫不徐就吾之條理矣雖然臣所謂立志者志於與治同道回承平之氣脈也臣所謂救過者救其與亂同事起積壞之膏肓也况夫上而天命之靡常所以祈天而永命者在是下而人心之可畏所以感人而結心者在是臣觀聖人之作春秋其於魯宣之時書滅赤狄書大有年又必書災異而迭見於先後其意蓋亦深矣此古大臣所以日奏四方水旱盜賊之變以警􅘨上心者非過慮也蓋有所警􅘨則不敢玩忽入而謹之於存飬者皆所以事天出而推之於寵綏者亦所以相帝無敢戲豫敬天怒也而賔筵媟近或以汨清明之氣而售其欺者不可以不防治民祗懼畏天命也而田里愁嘆得以稔乖戾之證而莫之聞者不可以不察以世教所當身任也必修明乎三綱五常以為扶持有永之道以國事所當時飭也必兢業乎一日萬機以寓寅畏自度之敬以至莭無藝之費用罷不急之工役去無益之崇尚庶幾簡靜足以宅聖志憂勤足以玉聖躬推而見於酬酢運量之際無往非剛健粹精之德兹皆人事之所當盡而天理之所必契者陛下其深念之捨是則應天以文何以迓續乎天命夫人心不同如其面然公是所在千萬人一心也昔者烹阿大夫封即墨大夫齊國大治人人各盡其忱唐之朝廷舉措得宜自有以深服乎將帥士卒之心陛下責吏治有詔戒邊帥有詔風飛雷厲之下草偃蟄奮宜無留難然以臣觀之人心垢玩積習深矣士大夫志富貴而不志功業革其面而不革其心錮於患得患失之己私而愛民愛君之心事無復有矣陛下及是之時勇有立志開忠直之路塞邪枉之門聚賢人君子以肅羽儀擇監司帥守以嚴按察詔二三大臣以包荒馮河之力量于以崇難進易退之風凡忠良明知有欲為而未遂者必意氣感動而招徠責三邊將帥以備塞禦戎之事功于以行信賞必罰之令凡偏裨行伍有軼羣而超衆者必公共搜舉而躐用之如是則內外之所信向蓋不但可以作新吏治而已捨是則動人以言何足以感服乎天下今天下大勢有可以興起之機陛下與二三大臣當悠長以思惟至公血誠可以感召和氣惟刻厲堅苦可以成就良心則臣所謂發憤立志責躬救過者雖天且弗違而况於人乎况敵國外患乎臣草茅書生不識忌諱深念受恩罔極無補涓埃齋心積忱以對越之心對陛下志於感動不覺言多惟陛下不以故事具文視之則宗社幸甚天下幸甚洪舜俞進故事曰憲宗嘗與宰相論治道於延英殿日旰暑甚汗透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官耳故樂與卿等共談為理之要殊不知倦也臣聞人心不可以兩用有所慕則有所忘好善者忘酒樂德者忘色八年于外急於拯四海之溺而忘其家日昃不食勤於合萬民之和而忘其身所重在此則所輕在彼也方時疸暑人孰不惟寬涼之是慕憲宗鋭於圖治議政延英日且旰矣汗透御衣而不顧蓋忘其為暑也謙虛以盡大臣之情而無取乎宫人宦官之與處奮勵以講中興之要而不求乎深宫廣厦之自逸社稷生靈之念日切於中凡人情之所共樂者無不忘之其肻以天下之未安為一身之適乎况是時名相皆足以穆天縡經國體所議必非不急細務徒留旰食之聽者堂堂兩河已盡在規畫中矣彼避暑九成而忘其親生涼殿閣而忘其民心移於物惟欲是縱賢君所當戒也金世宗時參知政事張汝霖因朝日論事上前世宗謂曰朕觀唐史見太宗行事初甚厲精晚年與羣臣議多飾辭朕不如是也又曰唐太宗明天子也晚年亦有過舉朕雖不能比迹聖帝明王然常思始終如一今雖年髙敬慎之心無時或怠汝霖對曰古人有言靡不有初鮮克有終有始有卒者其惟聖人乎魏徵所言守成難者正謂此也上以為然歷代名臣奏議卷一百九十
