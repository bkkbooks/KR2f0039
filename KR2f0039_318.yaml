body:
  text: 厯代名臣奏議卷三百十八明楊士竒等撰弭盜宋英宗治平元年知諫院司馬光論除盜劄子曰臣竊聞降敕下京東京西災傷州軍如人戶委是家貧偷盜斛斗因而盜財者與減等斷放未知虗的若果如此深為不便臣聞周禮荒政十有二散利薄征緩刑弛力舍禁去幾率皆推寬大之恩以利于民獨于盜賊愈更嚴急所以然者蓋以饑饉之嵗盜賊必多殘害良民不可不除也頃年嘗見州縣官吏有不知治體務為小仁者或遇凶年有劫盜斛斗者小加寬縱則盜賊公行更相劫奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降敕文預言偷盜斛斗因而盜財者與減等斷放是勸民為盜也百姓乏食官中當輕徭薄賦開倉賑貸以救其死不當使之自相劫奪也今嵗府界京東京西水災極多嚴刑峻法以除賊盜猶恐春冬之交飢民嘯聚不可禁禦又況降敕以勸之臣恐國家始于寬仁而終于酷暴意在活人而殺人更多也凡號令之出不可不慎毫釐之失為害實多若才知其失隨即更張猶勝于有害及民迷而不復者也伏望陛下速令收還此敕嚴責京東京西轉運司及州縣應災傷之處多方擘畫斛斗救濟飢民若有一人敢劫奪人斛斗者立加擒捕依法施行如此則衆知所畏不敢輕犯所以保全愚民減省刑獄之道也二年侍御史趙瞻論京東盜賊疏曰臣伏見羣盜殺害輔郡之官吏繫囚叛起京畿之獄此皆前古祻亂之萌朝廷腹心之慮為最急務而政府唯不過發關移為督責之狀州郡亦不過備遊僥為期㑹之迹而已文書一報恬為無事但用習常茍求接問未有為國家窮淵藪積奸之源塞萬一不測之計也謹按兩漢故事膠東盜賊起宣帝即用張敞為膠東相渤海左右郡盜賊起丞相御史即舉龔遂為太守潁川盜賊起光武即以寇恂為太守南山羣盜起大將軍王鳯即薦王尊行京兆尹事據兩漢時盜賊奏至天子與大將軍丞相御史擢舉守臣復尚蠲去繁文假以一切而後激勸吏民鎮安風俗莫不即著成效也平時國家列官校任即一路有安撫總管鈐轄兵馬一郡有知州丞尉提舉巡檢一縣有令尉此皆盜賊之司也今一旦不逞之人數十相聚遂至賊殺官吏顧諸備位誰有受斯責者環視俟變無一援救其間甚者則必有罪其死戰之忠以為貪功辱命然則是無有公家竭力之人矣且昔用一郡守則盜賊屏息今聫縣數十員而尤不能禁者何哉蓋昔之責以實效而今之官司取空文也今盜一發符牒四走則曰吾有文書下一路矣帥府則曰吾有文書下郡矣按具則吾無責也郡則曰吾有文書下巡邏令尉矣關白即吾無責也令尉則曰吾有文書下坊里保伍矣期㑹則吾無責也此其由來得非自朝廷之守空文邪使因循巽愞之吏傳執曹桉而與趣公疾惡之人挈度計校是終無以成實效也今知曹州王知賢不能禁盜賊致成徒黨知濮州戚舜元年力衰老素無才術唯此二州為賊所聚臣今欲乞先于曹濮專責知州通判且令條陳方略更明賞罰許其規畫悉就討捕督以近限約以重劾如其逗遛無所建明即下有司責以無狀别委輔臣舉用才吏京東應諸旁郡悉可依此更張且須成績乃議酬擢處置之宜俾先圖上朝廷更為裁擇官吏自無茍簡足以肅清內郡震帖逺方臣愚不勝懇激之至神宗熙寧七年太常博士直史館權知密州軍州事蘇軾論河北京東盜賊奏曰臣伏見河北京東比年以來蝗旱相仍盜賊漸多今又不雨自秋徂冬方數千里麥不入土竊料明年春夏之際寇攘為患甚于今日是以輒陳狂瞽庶補萬一謹按山東自上世以來為腹心根本之地其與中原離合常係社稷安危昔秦并天下首取三晉則其餘强敵相繼滅亡漢髙祖殺陳餘走田橫則項氏不支光武亦自漁陽上谷發突騎席卷以并天下魏武帝破殺袁氏父子收冀州然後四方莫敢敵宋武帝以英雄絶人之資用武厯年而不能并中原者以不得河北也隋文帝以庸夫穿窬之智竊位數年而一海內者以得河北也故杜牧之論以為山東之地王者得之以為王霸者得之以為霸猾賊得之以亂天下自唐天寶以後姦臣僭峙于山東更十一世竭天下之力終不能取以至于亡近世賀德倫挈魏博降後唐而梁亡周髙祖自鄴都入京師而漢亡由此觀之天下存亡之權在河北無疑也陛下即位以來北方之民流移相屬天灾譴告亦甚于四方五六年間未有以塞大異者至于京東雖號無事亦當常使其民安逸富强緩急足以灌輸河北瓶竭則罍恥脣亡則齒寒而近年以來公私匱乏民不堪命今流離饑饉議者不過欲散賣常平之粟勸誘蓄積之家盜賊縱橫議者不過欲增開告賞之門申嚴緝捕之法皆未見其益也常平之粟纍經振發所存無幾矣而饑寒之民所在皆是人得升合官費丘山蓄積之家例皆困乏貧者未䝉其利富者先被其災昔季康子患盜問于孔子孔子對曰茍子之不欲雖賞之不竊乃知上不盡利則民有以為生茍有以為生亦何苦而為盜其間凶殘之黨樂祻不悛則須敕法以峻刑誅一以警百今中民以下舉皆闕食冒法而為盜則死畏法而不盜則飢飢寒之與弃市均是死亡而賖死之與忍飢祻有遲速相率為盜正理之常雖日殺百人勢必不止茍其陛下至明至聖至仁至慈較得喪之孰多權祻福之孰重特于財利少有所捐衣食之門一開骨髓之恩皆遍然後信賞必罰以威克恩不以僥幸廢刑不以災傷撓法如此而人心不革盜賊不衰者未之有也元豐元年十月軾為尚書祠部員外郎直史館權知徐州軍州事上書曰臣以庸材備員冊府出守兩郡皆東方要地私竊以為守法令治文書赴期㑹不足以報塞萬一輒伏思念東方之要務陛下之所宜知者得其一二草具以聞而陛下擇焉臣前任密州建言自古河北與中原離合常係社稷存亡而京東之地所以灌輸河北瓶竭則罍恥脣亡則齒寒而其民喜為盜賊為患最甚因為陛下畫所以待盜賊之策及移守徐州覽觀山川之形勢察其風俗之所上而考之于載籍然後又知徐州為南北之襟要而京東諸郡安危所寄也昔項羽入關既燒咸陽而東歸則都彭城夫以羽之雄略捨咸陽而取彭城則彭城之險固形便足以得志于諸侯者可知矣臣觀其地三靣被山獨其西平川數百里西走梁宋使楚人開關而延敵材官騶發突騎雲縱真若屋上建瓴水也地宜宿麥一熟而飽數嵗其城三靣阻水樓堞之下以汴泗為池獨其南可通車馬而戲馬臺在焉其髙十仞廣袤百步若用武之世屯千人其上聚櫑木炮石凡戰守之具以與城相表裏而積三年糧于城中雖用十萬人不易取也其民皆長大膽力絶人喜為剽掠小不適意則有飛揚跋扈之心非止為盜而已漢髙祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州數百里間耳其人以此自負凶桀之氣積以成俗魏太祖以三十萬人攻彭城不能下而王智興以卒伍庸材恣睢于徐朝廷亦不能討豈非以其地形便利人卒勇悍故耶州之東北七十餘里即利國監自古為鐵官商賈所聚其民富樂凡三十六冶冶戶皆大家藏鏹巨萬常為盜賊所窺而兵衛寡弱有同兒戲臣中夜以思即為寒心使劇賊致死者十餘人白晝入市則守者皆弃而走耳地既産精鐵而民皆善煆散冶戶之財以嘯召無賴則烏合之衆數千人之仗可以一夕具也順流南下辰發巳至而徐有不守之憂矣使不幸而賊有過人之才如吕布劉備之徒得徐而逞其志則京東之安危未可知也近者河北轉運司奏乞禁止利國監鐵不許入河北朝廷從之昔楚人亡弓不能忘楚孔子猶小之況天下一家東北二冶皆為國興利而奪彼與此不己隘乎自鐵不北行冶戶皆有失業之憂詣臣而訴者數矣臣欲因此以征冶戶為利國監之捍屏今三十六冶冶各百餘人採礦伐炭多飢寒亡命强力鷙忍之民也臣欲使冶戶每冶各擇有材力而忠謹者保任十人籍其名于官授以卻刃刀槊教之擊刺每月兩衙集于知監之庭而閲試之藏其刃于官以待大盜不得役使犯者以違制論冶戶為盜所擬久矣民皆知之使冶出十人以自衛民所樂也而官又為除近日之禁使鐵得北行則冶戶皆恱而聽命姦猾破膽而不敢謀矣徐城雖險固而樓櫓敝惡又城大而兵少緩急不可守今戰兵千人耳臣欲乞移南京新招騎射兩指揮于徐此故徐人也嘗屯于徐營壘材石既具矣而遷于南京異時轉運使分東西路畏餽餉之勞而移之西耳今兩路為一其去來無所損益而足以為徐之重城下數里頗産精石無窮而奉化廂軍見闕數百人臣願募石工以足之聽不差出使此數百人者常採石以甃城數年之後舉為金湯之固要使利國監不可窺則徐無事徐無事則京東無虞矣沂州山谷重阻為逋逃淵藪盜賊常入徐州界中陛下若採臣言不以臣為不肖願復三年守徐且得兼領沂州兵甲巡檢公事必有以自效京東惡盜多出逃軍逃軍為盜民則望風畏之何也技精而法重也技精則難敵法重則致死其勢然也自陛下置將官修軍政士皆精鋭而不免于逃者臣嘗考其所由蓋自近嵗以來部送罪人配軍者皆不使役人而使禁軍軍士當部送者當牒即行往反常不下十日道路之費非取息錢不能辦百姓畏法不敢貸貸亦不可復得惟所部將校乃敢出息錢與之歸而刻其糧賜以上下相持軍政不修博奕飲酒無所不至窮苦無聊則逃去為盜臣自至徐即取不係省錢百餘千别儲之當部送者量逺近裁取以三月刻納不取其息將吏有貸息錢者痛以法治之然後嚴軍政禁酒博比朞年士皆飽暖練熟技藝等第為諸郡之冠陛下遣敕使按閲所具見也臣願下其法諸郡推此行之則軍政修而逃者衰亦去盜之一端也臣聞之漢相王嘉曰孝文帝時二千石長吏安官樂職上下相望莫有茍且之意其後稍稍變易公卿以下轉相促急司𨽻部刺史發揚隂私吏或居官數月而退二千石益輕賤吏民慢易之知其易危小失意則有離畔之心前山陽亡徒蘇令從橫吏士臨難莫肻伏莭死義者以守相威權素奪故也國家有急取辦于二千石尊重難危乃能使下以王嘉之言而考之于今郡守之威權可謂素奪矣上有監司伺其過失下有吏民持其長短未及按問而差替之命已下矣欲督捕盜賊法外求一錢以使人且不可得盜賊凶人情重而法輕者守臣輒配流之則使所在法司覆按其狀劾以失入惴惴如此何以得吏士死力而破姦人之黨乎由此觀之盜賊所以滋多者以陛下守臣權太輕故也臣願陛下稍重其權責以大綱濶略其小過凡京東多盜之郡自青鄆以降如徐沂齊曹之類皆慎擇守臣聽法外處置强盜頗賜緡錢使得以布設耳目蓄飬爪牙然緡錢多賜則難常少又不足于用臣以為每郡可嵗别給一二百千使以釀酒凡使人葺捕盜賊得以酒豫之敢以為他用者坐贓論賞格之外嵗得酒數百亦足以使人矣此又治盜之一術也然此皆其小者其大者非臣之所當言欲默而不發則又私自念遭值陛下英聖特逹如此若有所不盡非忠臣之義故昧死復言之昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多吳楚閩蜀之人至于京東西河北河東陜西五路蓋自古豪傑之場其人沈鷙勇悍可任以事然欲使治聲律讀經義以與吳楚閩蜀之士爭得失于毫釐之間則彼有不仕而已故其得人常少夫惟忠孝禮義之士雖不得志不失為君子若德不足而才有餘者困于無門則無所不至矣故臣願陛下特為五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察亷以次遷補或至二千石入為公卿古者不專以文詞取人故得士為多黃霸起于卒史薛宣奮于書佐朱邑選于嗇夫丙吉出于獄史其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎮皆選列校以掌牙兵是時四方豪傑不能以科舉自達者皆爭為之往往積功以取旄鉞雖老姦巨盜或出其中而名卿賢將如髙仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多矣王者之用人如江河江河所趨百川走焉蛟龍生之及其去而之他則魚鱉無所還其體而鯢鰍為之制今世胥史牙校皆奴僕庸人者無他以陛下不用也今欲用胥史牙校而胥史行文書治刑獄錢榖其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用用者不可刑故臣願陛下採唐之舊五路監司郡守共選土人以補牙職皆取人材心力有足過人而不能從事于科舉者祿之以今之庸錢而課之鎮稅場務督捕盜賊之類自公罪杖以下聽贖依將校法使長吏得薦其才者第其功閥書其嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出于此塗而姦猾之黨可得而籠取也其條目委曲臣未敢盡言惟陛下留神省察昔晉武平吳之後詔天下罷軍役州郡悉去武備惟山濤論其不可帝見之曰天下名言也而不能用及永寧之後盜賊蜂起郡國皆以無備不能制其言乃驗今臣于無事之時屢以盜賊為言其私憂過計亦已甚矣陛下縱能容之必為議者所笑使天下無事而臣獲笑可也不然事至而圖之則已晚矣干犯天威罪在不赦軾代李琮論京東盜賊狀曰臣伏見自來河北京東常苦盜賊而京東尤甚不獨穿窬祛篋椎埋發塜之姦至有飛揚跋扈割據僭擬之志近者李逄徒黨青徐妖賊皆在京東凶愚之民殆已成俗自昔大盜之發必有釁端今朝廷清明四方無虞而此等常有不軌之意者殆土地風氣習俗使然不可不察也漢髙祖沛人項羽宿遷人劉裕彭城人黃巢宛胊人朱全忠碭山人其餘厯代豪傑出于京東者不可勝數故凶愚之人常以此藉口而其材力心膽實亦過人加以近年更改貢舉條制掃除腐爛專取學術其秀民善士既以改業而其朴魯强悍難化之流抱其無用之書各懷不逞之意朝廷雖敕有司别立字號以收三路舉人而此等自以世傳朴學無由復踐場屋老死田里不入彀中私出怨言幸災伺隙臣每慮及此即為寒心揚雄有言御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵而班固亦論劇孟郭解之流皆有絶異之姿而惜其不入于道德茍放縱于末流是知人之善惡本無常性若御得其道則向之姦猾盡是忠良故許子將謂曹操曰子治朝之能臣亂世之姦雄使韓彭不遇漢髙亦與盜賊何異臣竊嘗為朝廷計以謂窮其黨而去之不如因其材而用之何者其黨不可勝去而其材自有可用昔漢武嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰者其黨固不可盡也若朝廷因其材而用之則盜賊自消而豪傑之士可得而使請以唐事明之自天寶以後河北諸鎮相繼僭亂雖憲宗英武亦不能平觀其主帥皆卒伍庸才而能于六七十年間與朝廷相抗者徒以好亂樂祻之人背公死黨之士相與出力而輔之也至穆宗之初劉總入朝而河北始平總知河北之亂權在此輩于是盡籍軍中宿將名豪如朱克融之流薦之于朝冀厚與爵位使北方之人羡慕向進革其亂心而宰相崔植杜元頴皆庸人無逺慮以為河北既平天下無事克融輩久留京師終不録用飢寒無告怨忿思亂㑹張𢎞靖赴鎮遂遣還幽州而克融等作亂復失河朔今陛下鑒唐室既往之咎當收京東河北豪傑之心臣伏見近日沂州百姓程棐告獲妖賊郭進等竊聞棐之弟嶽乃是李逄之黨配在桂州豪俠武健又過于棐京東州郡如棐嶽者不可勝數此等弃而不用即作賊收而用之即捉賊其理甚明臣願陛下精選青鄆兩帥京東東西職司及除兖單濰密淄齊曹濮知州論以此意使隂求部內豪猾之士或有武力或多權謀或通知術數而曉兵或家富于財而好施如此之類皆召而勸奬使以告捕自效籍其姓名以聞于朝所獲盜賊量輕重酬賞若獲真盜大姦隨即録用若只是尋常劫賊即纍其人數酬以一官使此輩歆艷其利以為進身之資但能拔擢數人則一路自然競勸貢舉之外别設此科則向之遺材皆為我用縱有姦雄嘯聚亦自無徒但每州搜羅得一二十人即耳目遍地盜賊無容足之處矣厯觀自古竒偉之士如周處戴淵之流皆出于羣盜改惡修善不害為賢而況以捉賊出身有何不可若朝廷隨才試用異日捍邊隅立功名未必不由此塗出也非陛下神聖英武不能決行此策臣雖非職事而受恩至深有所見聞不敢瘖默謹録奏聞伏候敕㫖彭汝礪奏曰臣竊聞京東河北東西羣盜不禁朝廷數月經置知所以係聖念深矣臣伏惟河北土地堅固風俗尚氣好勝寧死于盜賊以死于飢餓為恥其喜亂蓋天性也陛下仁儉朝廷清明非有可窺之間隙而豪凶不道烏合蟻附白晝殺人于市以食攻劫縣鎮掠奪妻孥此亦聖慮之所宜加察㳙㳙不已將不可隄防矣臣備數言責不勝日夜之憂謹具畫一事件少冀裨補臣伏思盜賊之勢可以智勝不可以力制也以國家粟米之多兵革之堅利而不能以一日殄絶狗偷鼠竊之盜亦不能無之也比雖聞巡檢縣尉許不依常例舉差巡檢縣尉已指蹤制勝蓋猶不與焉臣讀史觀漢京兆盜賊驚擾王尊不出關而治渤海多劫掠龔遂下車而化然則使逐處有人則不能縱之至此矣臣欲乞早賜選差仁明智略之吏出領諸郡稍寬繩法使隨宜處之幾早殄絶以銷未形之患臣竊聞河朔比數不登民至賣妻鬻子以食遷徙者相踵死者相枕籍有司不知還定安集而頭㑹箕斂然則民至相聚為盜者非獨民之罪也吏亦有罪焉自北而來纍為臣言去年秋不雨冬亦少雪麥根多不入土春夏之初民食恐不足朝廷不早加恤貧弱者或以賊為依而黨與寖多矣臣欲乞專使體量稍寬諸般色役以安貧弱夫使善民懷惠而無解散之心姦人畏威而有不敢為之志賊之勢易見衰止矣劉摯上言曰天下雖有極治之政而不能使民不為盜雖然能禁其為盜而已三代兩漢以來比追胥嚴捕察其法張弛時雖有不同要皆謹於搜逐奸惡以安善良者也國家于盜賊其防禁固已明具而近時捕法一二有可言者舊制盜發地分應職在伺察捕索之人皆給百日以為三限每限不獲抵罪有差蓋使身任其責心有所畏然後肻協心出力略張耳目求賊以自免故官司頗得其用今新敕雖不獲賊有罪然乃將兩限科校聽各罰錢曰以充捕賞其次仍許收贖而鄉村耆長壯丁近且廢罷代以保甲保甲之法保內被盜止出賞錢更無認限決罰之法小人之情不以刑懼勢驅之使有不得已者則何事肻僇力為公家索賊耶其所輸錢又不過資取衆人夤緣自利正其所便中書舍人曽鞏上言曰臣伏以周禮以五家為比使之相保推之至于五州為鄉因其民以用之于田役追胥之事管仲于齊亦以五家為軌推之至于五鄉為軍以有三軍之制蓋生民之業資于衣食則為農資于備禦則為兵其所恃之理然也後世言兵者以謂九夫為井此八陳之法所由出也五家為軌此師旅之法所由出也以臣考之所以然者非三軍之政取法于鄉田蓋古者生民之業兵農非異務也自經界既廢而兵農始殊秦漢之際大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游僥三老掌教化嗇夫職聽獄訟收賦稅游徼循禁盜亦比閭族黨卒伍追胥之遺事也今保甲之制自五家為保推之至于有大小保長有都副保正職承文書督盜賊與比閭有長鄉亭有嗇夫遊徼非異意也臣昨守亳州亳為多盜重法之地臣推保甲之法以禁盜賊幸不至繆戾誠不自揆欲于保甲巡檢縣尉之法所以防慮盜賊者有所推廣以稱朝廷立法之意一諸處自來盜賊並是外來浮浪行止不明之人或是本處素來無賴之人保甲之法使五家為保蓋欲察舉非違之事一保五家若有一家藏匿外來浮浪行止不明之人或一家有素來無賴之人即五家無由不知而法禁之中不責其顔情蓋芘則人於鄉里誰肻告言若為設禁防使不告官者因事發露則有相坐之刑人情自愛誰肻茍容此乃本立保伍察非違之意也所察舉者藏匿惡人之家所以為人除患固非開告訐之路傷鄰里之義也若藏匿之家自不能掩則惡人何所容入盜賊不禁而自熄理之所可必也欲乞外來浮浪行止不明之人保內不得舍止本處素來無賴之人保內須以姓名申官官為籍記係籍之人凡有出入並須告知本保若保內舍止外來浮浪行止不明之人犯人嚴斷同保不糾科不言上之罪保內本處無賴之人同保不以姓名申官及係籍之人出入不告本保本保不糾亦並科不言上之罪犯人嚴斷所貴有所關防可以暗銷盜賊況自來州縣亦往往有禁絶舍止浮浪及籍記惡人之處可以斷得盜賊别無擾煩兼保甲條諸保內有外來人如行止顯有不明即收領送官則是法意蓋已及此今來所乞只是申明更欲詳備伏乞裁酌施行一伏見熙寧六年保甲條法保內如遇有盜賊畫時告報大保長已下同保人戶即時前去救應追捕如入别保即遞相擊鼓應接襲逐元豐二年詳定上條莭文諸保內賊盜畫時集本保追捕如入别保遞相告報襲逐臣竊以謂元條及詳定互有詳略若合而用之則彌綸之意無所不備今所乞指揮諸保內賊盜畫時集本保追捕如入别保即遞相擊鼓報應襲逐並置鋪屋及鼓仍輪保丁巡宿如此則保伍之內既不得容止惡人巡宿之法又備如有賊發則合力追捕措置無所不盡于本置保甲之意委曲備具亦古者井田守望相助後世置鄉亭徼巡盜賊之遺法也一伏見熙寧敕莭文諸巡檢常于地分內巡警廨宇所在州給與印厯逐季㸃檢臣欲乞相度指揮重法地分巡檢縣尉常於地分內巡警每旬具所到地分申州仍給與行程印厯每季本州將旬申與印厯委官㸃磨違者取勘施行州不督察監司按劾以聞如此則制置捕盜之官事體均一理在必行不容茍簡之人得以廢法使捕盜之官分巡不止保甲候望轉相承接盜賊所向輒遇譏察竊發之謀必自衰熄或有伺間不逞之人亦易敗獲右司諫蘇轍奏請罷右職縣尉劄子曰臣伏見舊法縣尉皆用選人自近嵗民貧多盜言事者不知救之于本遂請重法縣尉地分並用武夫自改法以來未聞盜賊為之衰少而武夫貪㬥不畏條法侵漁弓手先失爪牙之心搔擾鄉村復為人民之患臣竊惟捕盜之術要在先得弓手之情次獲鄉村之助耳目既廣網羅先具稍加方略易以成功舊用選人雖未能一一如此而頗知畏法則必愛人使之出入民間于勢為便不必親習騎射躬自格鬭然後能獲賊也今改用武夫未必皆敢入賊而不習法律先已擾民訪聞河北京東淮南等路凡用武夫縣分民甚患之欲乞復令吏部依舊只差選人所貴吏民相安不至驚擾知洋州文同上奏曰臣竊見本州守治之所正居漢水之上川陸平衍廣袤千里東北諸山縈帶聫屬徑路盤屈隙穴深逺上通荆楚旁出岐雍其中所産濟人急用之助品目甚衆旦夕贏輦道路不絶閭巷井邑百貨填委實四方商賈貿易畢至之地衣被秦蜀有足仰者漢唐之際已名重郡然而至今有所不能稱是者城池庳漫全不如事不知幾年滅裂為此苫茅纍土宛若鼠戲缺漏頺落殆不可睹奸庸取罪常在跳越倉庫所寄僅同空曠臣自至此即謀增葺患無兵夫不能施手每一慮至此沈吟終日伏以國家設州郡列官府具儲蓄養士卒大抵本以為民故如此其備也夫何此州當襟喉要害之處而顧無壁壘壕塹之防以保護之譬之于人也筋骨雖云完固而皮革日已爛墮將何以為負恃而能使其中安且久耶一體既虧身不宜矣伏望朝廷慰念黎庶軫恤遐逺特降中㫖許令修築度其工力了不至大庶使郡國制度無有一物廢闕亦有備無患之深計也臣又竊見管內三縣疆境絶為曠濶髙山深林蔓衍重復直與巴達金鳳永興鳳翔等處脣齒相密其逺者有至五六百里近者亦不下三四百里中間有如子午駱谷之類斜通直達徑路不少私商暗旅出入如織通奸隱罪萃為淵藪嵓谷之民孱愞畏事迫于衆勢遂爾囊橐所居幽僻人不敢問既因全無防守所以難為檢遏臣愚常此過慮忽爾蜂驚鼠駭妄肆螫齧散走巢窟肆出為暴呼集除蕩形影不及亦須數日為之擾擾往日光化軍近年慶州叛賊悉趨此路謀行于蜀是時西南郡邑聞風震聳賴以朝廷威靈元元之幸而卒以就敗然而此州既為凶盜纍伺其隙是後恬然不為之備至今耆氓宿吏語議及此則無不人人咨嗟嘆惋是知如此與他州别郡封壤按聚隘厄奔衝之處平時常宜預設保禦之方其或事有萬一臨時取具必然手足錯亂不相救應前無兵而後無城未免一方人心不得不使之旦夕恐懼而莫如之何也臣今欲乞朝廷特賜詳酌更添置武寧一指揮或且先于諸處那屯三五百人常令住此不許亡出以備緩急驅使如此則上可以紓朝廷之憂下可以慰百姓之望臣職在守土理當建述此二事者伏望睿慈不罪其狂瞽而留意焉哲宗元祐元年門下侍郎司馬光乞罷保甲招置長名弓手狀曰臣竊見府界及三路保甲雖罷團教猶冬教一月于民有損于官無益不若盡罷之便何則比于團教之時民間勞費雖十減六七然猶有三四此所謂于民有損也朝廷每嵗遣使按閲所費金帛以百萬計而終無所用之此所謂于官無益也臣以為不若盡罷之便自置保甲以來盜賊倍多所以然者鄉村無賴子弟乍涉城市聞見紛華自恃身為保丁坐索本家供給飲博逰蕩習以成性今雖罷團教不肻復歸南畝服田力穡逸欲既深資用不足既家藏利兵又身挾武藝由是邀結黨友羣行攻劫父兄不能禁州縣不能制此自然之勢也是以數年以來年不甚飢而府界二路盜賊縱橫入縣鎮殺官吏若遇蟲蝗水旱大飢之嵗將若之何此不可不為之慮也以臣愚見莫若盡罷府界及諸路保甲據逐縣主戶數目盜賊多少委提㸃刑獄相度每若干戶置長名弓手一人與免戶下租稅支移折變及夫役諸般差徭科配一無所預務為優假使人歆慕每十人置莭級一員五十人置十將一員百人置員寮一員二百人以上置指揮使副指揮使各一員雖不及二百人亦置指揮使副指揮使名目盡𬋩一縣弓手以為賞功資級其莭級始初且令本縣令佐依上名下次或選有部轄者權管候有長行捉殺到强盜一人即補充正莭級替下權管之人自後每捉殺到强賊一人依此遷一級若未有闕且為守闕不得管人候有闕日補正其纍功勞遷至正指揮使滿三年以上又曽捉殺到强盜三人從來不曽犯贓罪者仰本縣官吏結罪保明申州本州官吏結罪保明申奏乞朝廷與于三班借差內安排若遇有强惡賊人朝廷臨時别立賞格者不在此限如此則保甲中勇健之士見前有出官之望來應募者必多除第一第二等戶物力髙强合充重役不得應募外其餘但于本縣有戶籍田産不以等第髙下並許投充長名弓手永無解役之期若一人闕額有二人以上爭投者即委令佐揀試武藝髙强者充如此則本縣勇健者皆充弓手其餘懦弱者雖使之為盜亦無能為患若見充長名弓手人有勇力武藝衰退者許令外人指名比較若勝于舊者即令充替如此則不須教閲武藝自然長得精熟仍委本州及提㸃刑獄常切覺察令佐有取捨不公者取勘依法施行若應募未滿見今鄉差弓手之數即且令鄉差弓手相兼祇應候招到長名弓手一人即替鄉差弓手一人歸農其鄉差弓手願投長名者亦聽若長名弓手及百人以上即令分一半作兩畨二百人以上每百餘人分作一畨並年終交替其上畨者隨縣尉逐捕盜賊自莭級以上各令管所轄之人若所轄之人有小可過犯許一靣區分不得過小杖十下若所轄之人敢陵犯本轄人員者杖一百毆者徒一年雖權管亦同本轄人員若于所轄人處取受財物並依律科罪犯贓罪杖者若係管轄權管即降充長行下名若係正人員即降一資自後每捉殺到强盜兩人始當一人罪至徒者不以權正並降充長行下名自後每捉殺到强盜三人始當一人雖許遷資並係額外不得管人不得出官若遇下畨則不相管轄亦無階級其下畨者自十將以下各隨所居之處與耆長同覺察本管地分內曽有為强盜之人及􅌪藏之家凡為强盜者不等于本管分作過須在他處蓋恐纍及本地分捕盜人無所自容故也其本地分捕盜人往往知之莫肻發舉盜既得財分贓則絶迹逺遁其賊發地分捕盜人雖欲擒捕莫知其處官中雖立三限科校終無所益由此賊發地分捕盜人每有賊發莫肻申舉若變主懦弱則多方抑塞不令聲賊變主强梁則共陪所失之財勸和使休是致羣盜無所忌憚日益昌盛又告捕得賊多被賊人讎報焚燒莊舍屠害老小其賞錢豈宜留滯而往往為州縣沮難有司靳惜動有經年請領不得使之解體欲乞今後應賊發地方凡捕盜人更不立三限科校捕盜官亦不批罰只以擒賊多少論其功賞若敢抑塞隱蔽從嚴法施行仍每州各隨大小賊盜多少借官錢數千貫專充告捕賞錢每獲强盜勘得從來住止􅌪藏去處候斷遣已了委本州長吏當日先以官錢支給告捕之人即移牒出賊州縣勾追住止窩藏地分捕盜人科不覺察罪弓手杖一百耆長杖八十壯丁笞四十先籍沒賊人及窩藏家財産償所支賞錢外其不足之數令捕盜人等均攤限一月催足津般赴給賞州軍補填官錢若路逺難以津般則各于本州官錢內關牒折兊其强惡賊人朝廷特于常法外多立賞錢者自以省錢充不在捕盜人均攤之限如此則盜賊無所容身必思改過自新若果行此法府界三路既免教閲勞費之患無賴子弟又有所歸投得以羈縻諸路正鄉村之名復國家舊制勇健之士前有仕進之望爭討賊立功不待教閲而弓手武藝自然不敢衰退不須㸃差而鄉兵自足兼有所用人雖衆多而上下有綱紀不敢相侵暴賊發地分捕盜人不知賊處免虛受刑責出賊地分為纍及身不敢蔽匿景跡之人被盜之家無人抑塞有所伸訴賊盜窮窘無所容身稍冀衰息六年禮部侍郎范祖禹奏曰臣聞昔季康子患盜問于孔子孔子對曰茍子之不欲雖賞之不竊季康子又問政于孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃臣始讀書蓋嘗疑之以為聖人之言主于教化而己行之未必有近效也及觀唐太宗初即位與羣臣論止盜或請重法以禁之太宗哂之曰民之所以為盜者由賦繁役重官吏貪求飢寒切身故不暇顧亷耻耳朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法耶自是數年之後海內升平路不拾遺外戶不閉商旅野宿焉臣觀太宗之政如此乃始知聖人之言不欺後世行之必有近效也夫以區區之魯國季康子為相孔子猶勸之不欲所以止盜而況天子之于天下乎季康子魯之執政猶不可以言殺當欲善而已而況天子之于天下乎自古用重法以止盜者莫如五代之漢漢髙祖即位之年患四方盜賊衆多敕盜賊無問贓多少皆抵死仍分命使者逐捕宰相蘇逄吉草詔意云應賊盜其本家并四鄰同保皆全族處斬衆以為盜猶不可族况鄰保乎逄吉固爭不得已但省去全族二字由是鄆州捕賊使者張令柔殺平隂縣十七村民其法可謂重矣然盜賊不為衰止漢室不四年而亡夫唐太宗之政如彼漢髙祖之法如此有天下者當以盛唐為法乎當以季漢為法乎至周太祖時竊盜贓滿三匹者猶棄市太祖皇帝代虐以寬稍輕盜法纍聖仁厚哀矜庶獄遞加減貸故竊盜遂無死刑然今編敕所定盜贓猶重于律三倍蓋承五代刑罰世重減之極輕猶至于此豈可更增重乎臣伏見熙寧四年中書檢正官奏請開封府東明考城長垣等縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兖鄆沂等州淮陽軍别立盜賊重法其後又有他州奏請乞比東明等處行重法者有重法之地又有犯法之民夫溥天之下莫非王土食土之毛誰非君民今獨視此州縣如逺方異域之人别立盜法自行法以來二十餘年不聞盜賊衰止但聞其愈多耳老子曰法令滋彰盜賊多有又曰民常不畏死奈何以死懼之夫上以善待民乃可望民為善以應上若其不應罪在民也上以惡待民則民為惡以應上乃其理也何足怪其多乎古者開夜食之源立教化之官先之以莭儉示之以敦朴倉廪實而知禮莭衣食足而知榮辱則自不為盜有邪僻之民然後從之以刑豈有不治其本而專禁其末不清其源而欲塞其流也若以重法為權時之宜行之數年而盜少于前固當除之復用中典若盜益多于前則是重法不足止盜甚明其可除去無疑也又重法之地皆舉知縣必擇彊健之吏被此選者奉法除盜視民如讎一切以擊斷為稱職此豈平世所宜為乎臣愚欲乞悉除重法改重法地分為舉知縣地分夫天下縣令皆不可不擇獨此諸縣先已舉吏則不可廢民多奸猾尤須良吏以治之選吏以養民不命吏以敵民也及今四方人情少安改峻法為平法庶可以變惡俗為善俗止用常典足以禁奸其刑亦不輕矣若行重法不已盜賊益多臣將見此數十州之民無樂生之心一有凶年飢饉則為等死之計羣起而為大盜雖有重法又可禁乎惟陛下無以孔子之言為迂無以唐太宗之治為難無以教化為不急無以峻法為足恃則民皆可使為善矣哲宗時右司諫蘇轍乞招保甲充軍以消盜賊狀曰臣聞薄賦斂散蓄聚若以致貧而民安其生盜賊不作縣官食租衣稅廪有餘粟帑有餘布久而不勝其富也厚賦斂奪民利若以致富而所入有限所害無窮大者亡國小者致寇寇盜一起盡所得之利不償所費之十一久而不勝其貧也臣未敢逺引陳勝吳廣龐勛黃巢之類只如淳化中李順慶歷中張海等熙寧中廖恩此數火盜賊計其燔燒官寺劫略倉庫以至發兵命將轉輸糧食耗失兵械募士賞功之費大率不下數百萬貫但得事了豈敢言費然方其未發有能建言乞捐數十萬貫以消其變則上下爭執如惜支體不肻割截此天下之大迷古今之通患也故臣願于元豐庫或內藏庫乞錢三十萬貫上以為先帝收恩于既往下以為社稷消患于未萌伏願陛下權祻福之重輕較得喪之多少斷而行之毋使有司吝于出納以害大計河北之民喜為剽劫所從來尚矣近嵗創為保甲驅之使離南畝教之使習凶器一夫在官一家資送窮苦無聊靡所不至椎埋為奸十人而九號為保甲莫敢誰何若更一年不罷則勝廣之事可立而待也今雖已罷而弓刀之手不可以復執鋤酒肉之口不可以復茹蔬既無所歸勢必為盜今河北寇賊成羣訪聞皆是保甲餘黨若因之以饑饉則變故之作不可復知近嵗富弼知青州是時河北流民百萬轉徙京東弼既設方略振活其老幼而招其壯悍者為軍不待朝㫖皆刺指揮二字其後皆為徑兵百萬之衆無一人為盜者弼人臣便宜行事猶能若此況陛下富有四海而元豐及內庫錢物山積莫可計數只如近日內降睿思殿金銀一色令别庫收貯者自約及百餘萬貫皆是先帝多方收拾以備緩急支用不取于民聖算深逺非凡所及若積而不用則與東漢西園錢唐之瓊林大盈二庫何異于先帝聖德不為無損故臣願乞三十萬貫為招軍例物選文武臣僚有才幹者一二人分往河北逐路于保甲中招其彊勇精悍者為禁軍隨其人才以定軍分本州無闕則自近及逺或押上京不過一二萬人則河北豪傑略盡矣其間武藝絶倫舊日以補班行者押赴闕試驗有實即以補內六班之闕或以補本貫及鄰近闕額軍員但當嚴賜指揮候了日當遣人覆按有不如法重坐官吏臣聞先帝本謂保甲可用故欲隱兵于農以漸消正兵是以禁軍多有闕額今保甲既罷正使無事猶合補填況如前所陳者惟陛下深察果斷而力行之今冬春大旱二麥不熟事勢如此恐不可緩侍御史劉摯論盜賊疏曰臣竊以天下雖有極治之政而不能使民不為盜也然要能禁其為盜而己厯世以來法嚴則盜衰法寬則盜盛國朝自近嵗差役用募法而官弛捕盜之禁保甲行教法而民滋為盜之心前來滑州之單安商州之王沖以村野之人逃亡之卒一有呼嘯遂能橫行蹂踐鄉縣殺害官吏以至煩遣兵將重為騷擾大勞大費僅能散撲皆由防禁寬縱賞罰不明而寒飢猖狂之人附之者衆故也近日制㫖既薄斂輕賦稍還其夜食之路又復置弓手及縣尉巡檢而察捕賞罰並從舊典所以防備奸惡安養善良之意可謂甚厚然訪聞州縣不甚究心召募弓手至今殊未就緒巡檢兵級多未差填見今河北陜西京東西所在常有盜賊攘劫鈔竊殆無虛日鄉野閭井人頗不安蓋前來保甲巡檢指使既有更不管勾指揮則其意固已不在于捕盜而新復官吏又未就職此盜之所以乘間而作纍嵗已來民間豐稔今尚如此自去冬大旱二麥失望積榖之家觀望不發人已艱食臣慮將來寇盜更有甚于今日欲乞指揮逐路監司為備盜之計督促州縣速招弓手及差撥巡檢兵級嚴責近限早令數足以時訓齊准備緩急及再乞指揮吏部所差注巡檢縣尉略加選擇催遣赴任畢仲游上言曰臣伏見開封府盜賊條禁至多而禦盜之方其大莭有未備者以外路州軍言之捕盜之官在城內則都監監押城外則巡檢縣尉蓋不可易之官也今京城外巡檢縣尉與外州軍略同而京城內巡檢之職寓于馬軍步軍帥臣與四廂主者雖主徼巡于國中而尋常盜賊舊不干預自來開封府承例令使臣人員等密行緝捕獲賊有賞而不獲無甚譴罰人微責輕往往反與盜賊為市而諸廂小使臣雖帶督察盜賊其實分管估計家業取問病人口詞并檢驗救火等雜務不類捕盜之官理如未盡臣愚欲乞於馬步軍帥及四廂主巡檢之下别增置廂巡檢六員其二在舊城內其四在新城內四壁使諸司使副或大使臣為之𨽻於開封府得以職事舉薦按劾仍倣外州軍都監監押功過殿最之法而增損之使專治巡檢職事亦不廢開封緝捕公人則京師盜賊知有專一責任之官自然人戶安居奸盜屏息輦轂之治不為無助仲遊又奏曰捕盜之法遇有賊必立重賞購人緝捕立賞既重則宜人人鬪用智力以應賞格然則州縣每有盜賊更一二十火未見有賊因賞而敗者此非重賞不足以捕盜蓋州縣給賞須拘條格每有人捕賊到官留連勘鞠近者一兩月逺者須半年一嵗等候獄成然後檢坐條格支給賞物其該賞之人捕賊到官經隔嵗月未有所得或者過狀陳訴遷延詰難方始得賞又其甚者則勾追往返取問捕賊因依拘繫一兩月費用錢物方始得賞其人居家各有生計因官司勾追理㑹賞格往往暫廢經紀設使賞格不行反成失所故皆謂官司立賞雖重及至獲賊未必如數皆得縱得所賞亦留滯别有妨廢以此人人無意捉賊雖見榜揭視為空文今欲乞令州縣各預儲賞錢在逐處收掌遇有盜賊曉示數目召人緝捕如獲到官見得委是賊人别無虛僞未勘得賊人情狀先取問捉獲因依不候結解令州縣先次保明給賞與捕緝之人不得淹延追擾如此即小人雖不知義理但見捕賊入官别無留滯便得重賞更相傳告宜有勸慕人人鬪用智力捕賊以應賞格故立賞在信行賞在速立賞不信行賞不速不足以使衆非唯今日之當為蓋亦古人之常事也劉攽上奏曰臣昨因轉對獻議欲以盜賊罪至極刑而遇恩赦及以按問自首減死者加以刖刑事下有司不䝉施行臣竊聽衆論以謂肉刑慘烈驚駭人聽故不可用臣以謂不然臣所議刖刑非施之常民以禁盜賊爾又非施于常盜以馭當死而遇減者如此亦何慘刻之有凡民能為盜賊必其强壯凶悍有過人之資其犯至死罪者又必其桀黠無道者也雖遇恩有寬貸豈其有自新反善之意幸創痛完復則重為惡譬蠚蟲之被傷而復完者其毒人必深臣故願加之刖刑才廢其一足完全其生不去鄉里然雖有暴虐害物之心而材武絶衆不得復用于以懲奸絶惡其益不輕乞重下有司詳定指揮髙宗建炎三年張浚上言曰臣竊謂當今盜賊竊發理宜誅伐使無遺類然事有出于權宜而不可輕舉者臣聞盜賊之徒多河北京東失業之人義不歸敵偷生中國若欲盡殺之是必使之盡歸敵人而後已又御前之師儻百戰百勝固無足道萬一稍挫鋭于盜賊則王師之勢愈弱何以捍禦敵人臣謂不如臨之以聲勢如差某軍行且令駐軍未發先遣辨士往諭之來則徙其老弱于江南分屯少壯于淮甸以待防秋他日國勢茍立何施而不可者惟陛下留意建炎中御史中丞許景衡奏乞措置杭州軍賊疏曰臣契勘杭州軍賊比已招降今訪聞逐人雖已拜命尚閉城門未曽解甲仍稱薛昻已有申請須候朝廷回降指揮方肻開門即未知薛昻如何奏請朝廷曽未報應也竊原仁聖之意不欲進兵討賊正恐濫及無辜所以招降仍加爵命者蓋謂一城生齒也而羣賊反側未安却以待報為名故作遷延今閉門已五十餘日一城生齒飢餓狼狽日俟朝廷之報若不速賜撫循不唯失招降之初指竊恐淹久别致生事杭為東南重地而風土輕脫易于從亂不可不慮也臣愚欲望睿明檢㑹薛昻所奏若只是乞放羣賊之罪招降之後有司不得殺戮則乞詳酌依其所請再降敕榜專差使臣星夜前去開諭羣賊速令開門以救一城垂死之命實天慈終始之賜也景衡論捉殺鎮江賊劄子曰臣聞鎮江府羣賊聞官軍且至頗有逃遁之計其一路係本府下熟驛前此已曽鈔虜今來官軍若繇真州渡江以往則此路無虞矣其一路東走常州昨者己曽許以金帛犒設其無備為可知若更前進則不獨浙西諸州為可慮深恐杭賊合謀如臣前日所策也契勘揚州管下柴虛鎮亦名口岸渡江後四十里至常州最為捷徑如䝉裁酌别遣人馬繇此路以往遏其奔衝則賊勢亦窘矣如前日官軍方事奮擊則今所遣者亦可夾攻庶幾朝夕殄滅今車駕駐蹕于此而賊在比境非所以振國威也伏乞速降指揮即行措置使凶徒就擒江渡通快誠今日之急務也景衡又奏乞招捉軍賊疏曰臣契勘杭州軍賊以䝉詔書招降已拜恩命而不解甲復閉城門間緣隂霧輒出城戰破官軍虜執提㸃刑獄官訪聞秀州守城復入招降即未見得後來如何奏報逆黨反復如此神人所不容今來若已招安開城門在朝廷不欲失信當一切赦其罪惡不然所宜痛治以戒將來也提㸃刑獄官屯守城外乃為賊虜劫則其方略可知矣豈可復倚仗耶今杭州閉門已七十五日殺傷之外飢餓而死者已不勝其多生靈無辜誠可憐憫如秀州守臣不曽奏到招降次第伏望聖慈明詔三省樞密院即行措置如合捉殺亦乞精選將卒疾速前去杭為東南都㑹其俗輕脫易于從亂今城門久閉援兵不至若被誘脅則皆從賊其勢益張為害大矣豈獨殺傷餓􅥌為可憐哉如拯溺救焚不可時刻濡滯也臣以言責既有所聞不免喋喋浼聖聽蓋事有不得已者伏乞裁擇速降指揮景衡又論捉殺杭州鎮江軍賊劄子曰臣昨論奏杭州鎮江府軍賊事乞朝廷措置施行臣曉夕思之若二賊止于閉城自守官軍疾速掩殺可無他虞蓋杭為二浙之腹心而鎮江為咽喉今二賊同惡皆據要地若不速行措置則閲日滋久奸計愈多萬一交通消息一日合謀而起則浙西諸州皆為賊所據矣此在朝廷不可不深慮而早為之區處也兼訪聞辛道宗下軍賊自到平江府吳江即肆焚劫比至本府城下守臣初欲犒設既而徇郡人之請必欲擊賊初戰雖敗繼能乘城矢石交擊晝夜不息賊遂遁去使他郡皆如平江則無可慮者聞所過常秀州皆厚斂金帛以為犒設而已設有緩急果何賴哉今錢伯言己除鎮江守及遣將兵前去外唯杭州閉關幾八十日一城生齒若不從賊必皆垂死之命也而招降捉殺二說至今未決欲望朝廷擇其一而處之母使合謀而起為意外之變也其平江府官吏能堅壁拒賊伏乞聖慈行下核實褒賞不獨養其後來鋭氣亦所以為列郡之勸也景衡又奏乞不招安建州軍賊劄子曰臣訪聞建州兵變殺傷漕臣及二三命官見閉城門抄虜居民本州奏請招降自非出于迫脅當是循􅊞近例蓋招降之說乃是出于便宜非止寇之良策也前日杭州之事勢非獲己今若踵而行之則是縉紳橫被殺傷而逆賊反受爵命賞罰顛倒莫甚于此蓋自去嵗福州兵變朝廷不曽窮治遂致江寧杭州相繼而作今日建州設更招安則習以成俗此祻未易息也況福建鎗仗手自是徑兵可以殄滅顧朝廷用之何如耳臣愚欲乞聖慈詳酌不須别遣兵將只乞指揮本路鈐轄提刑司令糾集將兵及鄰州鎗仗手許以厚賞疾速措置捉殺除首惡同謀之外其餘脅從更不究治仍不管逗留關誤庶幾革招降之弊他州不敢視效景衡又奏曰臣聞建州兵變事昨日急于奏禀思慮未審其言有所未盡須至再具敷奏以備采擇臣乞更不招降只令捉殺則召募鎗仗手預合犒設其勇于入賊有功者亦合量借官資以俟奏功正授獲級者第賞仍令先次告報脅從之人喻以朝廷寬貸之意以上並乞令帥臣監司公共措置仍許便宜施行契勘閉城今已一月比及指揮到彼則又須一月不唯玩寇長奸而一城生齒日遭虜劫設或遲久則盡為賊誘其勢益張未易制也伏望睿慈詳酌速降指揮令差來人星夜齎持前去以究仁聖軫恤逺民之意樞密院編修官胡銓奏曰臣伏見江西州軍自金人侵犯之後未嘗一年間無寇而䖍州數縣號為賊淵每一出寇則大焚殺至傷三四千人驅掠子女牛馬不可數計州縣官吏往往多遭其害連年跳梁無所忌憚遂至散剽廣南諸州殺令破縣甚至攻城官司熟視無可奈何幸其去則遣烏合之卒名為追捕因緣剽虜又作一賊監司郡守諱言部中有寇不敢備申朝廷至其大段猖獗方始陳奏已無及矣況今清蹕進駐建康江東西實陛下關中而江西安撫司兵不滿千守備䟱濶有如䖍寇乘吾防秋又復竊發陛下未得置之度外臣愚欲望朝廷宜及防秋以前增遣一將付之帥司令於虔吉兩界之間措置招捉仍令萃一路之兵以為聲援須務戢盜不得因而騷擾庶使逺方細民安土樂業獲見中興之治不勝幸甚髙宗時殿中侍御史張守上奏曰臣聞叛而伐之服而舍之德刑並舉帝王之略也伏見陛下臨御以來建康丹陽錢塘之寇次第勦除國威逺暢固足以慰一方之憤快將士之心然皆始于招諭則皆貰其愆尤授之祿秩使改過以自效且示陛下寬仁之大德也然德音未絶于耳而兵屬其頸矣計其罪戾固葅醢不足以塞責但卷甲退聽之時正如掌上嬰兒殺之不武雖或其初無朝廷招安之文其後有長惡不悛之迹然豈能遽使天下戶曉哉方今四方寇盜尚多聞有欲降而反側猶豫者往往以江寧杭潤之戮為詞也況陛下赤子弄兵潢池豈皆本心苐困于誅求迫于寒餓脅于凶逆不得已者固不少矣既已招安當示以大信待以不疑聽其自新遲之嵗月俟其復出為惡則與衆棄之其誰曰不然側聞江寇亦已就降臣以謂國勢未强兵力單敝不免用招安之策以平羣盜倘循前轍為害不細欲望聖慈詔諭三省密院以及將士應賊已就招安不得輒殺仰稱聖明所以伐叛捨服招攜懷逺之意守知建康府乞措置丁家洲劄子曰臣自到任詢訪本路公私利害大小緩急隨宜施行其大且急者惟江賊出沒作過為往來商賈士庶之患見今府院禁勘賊火多是江中殺人劫盜蓋緣江流去岸稍逺雖有捕盜官司難于巡察內有丁家洲在池州下太平州繁昌縣上長八十餘里洲分為二江流出其中及兩旁洲上並無居民去兩岸人家亦逺為從來盜賊盤結之地他處口岸被賊舟船多是昏夜見無宗伴獨宿乘不備以取之如丁家洲往往白晝劫掠每得一舟必盡殺其人取其財沈舟水中官司無從根究於是商賈行上水則自蕪湖結甲而上行下水則自江州湖口結甲而下少者亦須十數舟而後敢行經過此處而或一二舟稍後即遭劫掠前舟回視駭愕而不敢赴救又以被害舟船不見蹤緒則同伴雖欲投訴官司無以驗實或反為己纍往往不復陳告州縣無由知之深恐日久為害不細朝廷向來雖于洲上置巡檢聞亦相去濶逺又土兵全闕亦無舟船巡檢既不能誰何賊亦無所忌憚則是置巡檢司有名無實竊見沿江諸處見有屯駐水軍若令都統制就近輪差將官統一二百人及船十餘隻于丁家洲駐劄一月一替既奪其巢穴則無從盤結又知大軍屯戍則不逞之輩自然銷弭伏望睿慈詳酌施行章誼上奏曰臣竊見邵青張琪兩項賊兵捕竄日久猶未伏誅頗聞朝廷已有指揮更不招安此誠有誅無赦之義然三農穡事垂成邉邑防秋密邇賊徒所向不患無食而我之將士追捕撲滅不得暫息可無權宜制勝之策哉臣觀朝廷纍年以來其于盜賊止是誅其首惡赦其餘黨今來邵青張琪手下人兵亦是赤子何可盡殺雖其渠魁罪在不赦自餘脅從徒黨乞降指揮許之自新庶幾反仄之人得復舊業而聖主好生之德所被彌廣不勝幸甚誼又奏曰臣聞建州南劒州兩處盜賊未息朝廷專倚辛企宗一軍控制一路誠可彈壓然臣謂兩處盜賊其起殊塗則今日措置亦宜異術蓋范汝為自招安之後首破劉時舉之兵故余勝等作亂聲言欲為劉時舉報怨三家結仇各慮報復是以兵不肻散此建州盜賊之所自起也李捧辛企宗之兵壓賊而戍日月漸久糧餉漸艱建劒既為盜區無可供餽故錢米百費取之漳汀泉福邵武之間行船者泝流而上負擔者一趼不息齊民騷動無以自全遂相團結以避征役此南劒州將樂縣盜之所自起也所起不同而欲一切齊之以兵則祻亂不息以臣所見如范汝為之衆非有重兵彈壓使離其巢穴散其黨與則建州境內之人終不自安劉時舉余勝之黨終不敢復業至于將樂之盜本因賦斂之煩力役之困若朝廷速行措置使范汝為之衆可起辛企宗之兵可還朝廷仍復遣官宣諭有所蠲除則其餘弄兵之人可使棄兵而就耕矣臣聞福建官私空匱上下艱食朝廷今有益兵而不疾決則財力愈困比者朝廷委福建漕臣發米十萬石轉至行在若盡數存留使贍大軍仍于盜發之地量行賑糶候至賊平徐議補發則人情欣然便就安帖實聖主之大惠也如臣所言仰合國論伏望早降詔㫖以安反側不勝幸甚誼又奏曰臣伏見朝廷昨遣朝請郎謝嚮招安建州范汝為之兵存留彊壯無業可歸者萬人以備使喚其慮逺矣文書奏報往返數月就招之兵欲行則未有所之已散之人還鄉則指為賊黨失此機㑹于是喜亂之徒如劉時舉者聚兵自衛以討捕汝為為名聲迹相聞遂相屠戮不以逆順為彊弱但以衆寡為勝負矣今聞劉時舉既敗之後領其餘黨南趨邵武范汝為戰勝之餘恃其兵彊武斷于鄉曲朝廷方遣辛企宗正兵三千交割謝嚮一萬之衆若其聽命固為善矣或敢旅拒將如之何竊惟李捧所以不能制范汝為者以李捧兵寡于汝為也謝嚮所以能招范汝為者以汝為乃謝嚮之部曲也今令謝嚮之兵盡交與辛企宗然而企宗之兵何異于李捧切慮汝為懷謝嚮之小惠而未肻行輕企宗之兵寡而不聽命萬一出此福建兵革之祻未有平寧之日也兼聞劉時舉見在邵武軍光澤縣有衆萬人又南劒州順昌縣賊徒余勝等一項衆亦數千朝廷果欲消患于未形則莫若命謝嚮為企宗之副而與之偕行别遣能臣招撫劉時舉余勝之兵使之歸業如此則范汝為一軍近憚企宗正兵之威逺懼時舉余勝來歸之衆無不聽命矣福建數郡盜賊連結如此且復半年安撫提刑司曽無措置為陛下分東顧之憂者其人材不足以副朝廷委任之意亦可見矣今不遣能臣早加綏撫使數州之人廢農桑之業因之以饑饉臣恐盜賊不息疆土日蹙非國家之福也伏望聖慈特賜施行不勝幸甚王元渤論弭盜之術曰臣竊謂弭盜之術有二小盜宜求所以安之勿思所以勝之大盜宜求所以勝之勿思所以安之何者小盜鼠竊千百為羣或因規利貨財或緣不忍小忿順而接之宜有悛革若官軍不知出此必欲窮誅勝之不足增威不勝反成窺侮是以龔遂之臨渤海安赤子以稱良虞詡之在朝歌殺降者而生恨臣故曰盜之小者宜求所以安之勿思所以勝之也若乃大盜株連踰州跨邑嘯聚不逞攻劫善良此敵國之所視以卜我興衰寇賊之所憑以相為脣齒若不講明軍律選練羣鋒斷之以必取之謀示之以不赦之意使彼羣醜必底滅亡則將大盜不除小寇是效州州相煽轉發祻梯安能風示逺方擴清宇內成中興之漸覬奠枕之安乎臣故曰盜之大者必思所以勝之勿思所以安之也今者羣盜之中江州為最昔憲宗已平淮蔡河朔遂朝然方師未有功羣言屢至賴憲宗明斷以有蔡功臣恐江州之寇稍成遷延官軍淹時或有小衄則必有言其外順之藝謂可懷柔者臣願朝廷斷而行之勿恤羣言必殄此賊以為四方之戒也厯代名臣奏議卷三百十八
