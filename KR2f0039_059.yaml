body:
  text: 歷代名臣奏議卷五十九明楊士竒等撰治道宋寧宗時知澧州曹彥約上奏曰臣伏讀正月二十三日詔書求言於搢紳之彥芻蕘之微以為厥今百度未釐三邊未靖人才乏而未究搜揚之術民力困而未明惠養之方救此弊端寧無良策乃若針規主失指摘官邪人所難言朕皆樂聽臣讀至此未嘗不聳動太息識陛下望治之切也竊惟陛下嗣登大寶十有五年內無宫室苑囿之美外無弋獵狗馬之好以此為治宜將上咸五帝下登三王然而姦臣所以怙勢公論所以靡容屏蔽聰明排斥忠直致使更化再踰於月律求言罕見於奏封有如詔書所云者則為治之道豈固有所扞格而不可至哉祖宗設求言之法其於人主之一身審矣臺諫之職所以議論是非給舍之官所以紏駁章奏侍從之有已見則論思者可以無廢職史官之有直前奏事則記注者可以無隱情至於講讀之侍燕閒兩制之備顧問朝殿之有輪對暇日之進故事莫不啓沃帝心助成聖學下至於主兵官之有倚仗子樞屬之有承㫖公事外任官之有朝見朝辭草茅韋布之有封章亦皆互相發明無有壅蔽朝思夕惟可因否革與二三大臣謀謨而力行之造命於上者謂之萬機著見於下者謂之百度順此而行何治之不致陛下在潜邸時尊儒重道講論經理無有厭斁龍飛之初每欲延見舊學咨詢治道收召名儒虛懷聽納當此之時天下仰望謂髙宗孝宗之治指日可見自慶元改元之後當寧恭默大臣奏事不聞有所折衷小臣奏事不聞有所訓飭士大夫絶念謂陛下無意於政矣今者大明公道詔求直言治病於己病之後改過於悔過之時是宜明哲天臨姦蠧睍消然而外郡章奏纍月不下軍機急速踰月不行省部之事未免稽留廟堂之務失於叢脞內而京局外而州縣奉行不䖍絶意治功置郵傳命稽違程式無前日專權之患而有上下不任責之憂此則勉强之道未行而瞑眩之藥未進也木本無蠧根不茂則蠧有時而生人本無疾氣不盛則疾有時而作人主於剛健之時明君人之道審為政之理則姦邪無自而執柄近習無自而用事惟夫玩時愒日不以稼穡艱難為憂居安忘危不以祖宗積纍為念則賢人君子必皆遂其難進之心憸人佞夫復有以堅其患失之意利害莫從而上逹福威因得以下移百度未釐常必有此今不開公正之門鑒偏信之弊而獨拘拘譾譾守常執固以簿書為實政以歲月為無用此何時也而固為是不切之政耶陛下閔百度之未釐則必以持守為難以逸豫為戒大臣造膝必與之反覆詳盡羣下進見必為之謙虛接納至於軍國庶政亦以委任責成算計見效正不在於懲沸而吹􅐽也臣聞兵所以撥亂亦所以起亂因亂而撥之者其兵直無亂而起之者其兵曲古人之用兵一皆為民而已彼其困於鋒鏑之慘弊於轉餉之勞父子不得以相見兄弟妻子不得以相保聞撥亂之聲則必欣欣喜色而相告此簞食壺漿之禮所以至而奚為後我之言所以發也若其耕田鑿井以為樂仰事俯育以為安身不履行陳老不見兵革聞起亂之聲則必疾首蹙額而相告此豈言語之所能詔告而刑罰之所能驅迫哉是故聖王重兵生民厭兵老師宿儒不敢談兵武夫悍將不敢佳兵順乎天而應乎人如此而已彼首兵議者何所見而為之耶謂國論已定歟則朝行而夕改矣謂國勢已振歟則兵冗而將驕矣謂國用已備歟則帑無十年之財廪無一年之蓄謂敵人已弱歟則起兵百萬而空虛之證不見開邊三年而中原之豪傑未歸兵已連而不解和已議而難成遂致貽憂君父流毒百姓三邊之未靖將何術之可救也疾痛未深可以導引轉禍患未成可以言語感今起兵釁而失地利求和議而竭國力誅首謀不足以厭其心頻遣使不足以得其意事勢急矣非可以常說解也主國是者貴持重決大議者尚操略夫使恃强則欲戰畏弱則請盟寒氣至而厲甲兵暖氣效而㢮邊備則庸人妄夫皆足以有為何貴乎豪傑之士應酬萬變而不窮也敵雖頑梗而兵機變詐乃其素講非如中國之人習熟禮義遇有緩急取兵事而徐議之耳彼其大舉於丙寅以威聲脅我疲弊於丁卯以和議欵我察其情實豈不以歲幣為利惟其所問輒應所求輒得以我為易與而直以無道行之若又處之不得其宜行之不得其道必將違其本心縱蛇豕之欲而未已也夫語殺人者未必殺人以其謀之淺也然而人或不畏則怒而殺人畏之已甚則逞而殺人殺不殺在彼備不備在我實利實害不繫乎畏不畏也勿謂求之太過可以得其心拒之太峻無以制其命彼誠欲來非可以盟誓沮彼誠不來非可以言語化其和也則不來為正兵來為竒兵其不和也反是此靖康之和立變於頃刻之間紹興之和反覆於數年之後事有商鑒不可泯沒則兵之用否不在於急和明矣陛下念三邊之未靖莫若遲留小使督責邊備內為不必和之實外不沒可和之名使之不測事端君臣相怨假以數月便見真僞設復大舉則其民固已怨矣欲進而此已戒嚴欲退而彼有叛兵辛巳之勝可復見於今日也人才之未盡非搜揚之所能得也昔者堯舜繼軌元愷至湯武革命伊吕耦有如是之時則必有如是之用不借於異代久矣以賢馭能則人才衆以能馭賢則人才寡非衆寡有時而不同亦進退有時而消長也是故中才滿天下真才不百一茍其有所抱負思欲自效於一世則其居易以俟時藏器而後動上之人不思有以縱㬰之喜材術而鄙禮義重奔競而輕恬退則識時之士必有相攜持而去者矣禮不重無以致純儒爵不吝無以慰志士忠佞並進則忠者退賢不肖混淆則賢者羞此當饋所以無益於興嗟而臨朝者有時而嘆息也十五年來士大夫之心術壞矣上焉者不愛其身以言語得罪或削籍而逺屏或卧家而待盡次焉者偷生仰祿以職業自見或諄諄於田里或切切於簿書是皆中人以上有所持守為時奮發可以倚仗其他則出入權門假借聲勢茍不至扇揚凶焰撰造釁端卑君而尊臣殘下而慢上不過貪位慕祿趨事赴功當大明旁燭之時各安分守亦足以湔拔使令未至甚害惟是廉耻道喪風俗不美謁見者以伺候為常致書者以畫一為重隔越初任便求堂除鄙薄外庸躐進朝路致使蒞職者無著效居官者無固志以州縣為假涂以表著為捷徑茍不反其道而用之正恐廉靖之士耿介之人入山惟恐不深避世惟恐不速矣近歲朝士補外終更者少貴要起廢驟進者多選人入朝不數年可以除莭亰官外任率十年不可以得郡矧今邊陲多事士大夫宣力暴露之賞不可以望解帶解閣之厚扞禦之秩不可以比𣙜務茶場之多正當比量重輕斟酌緩急久任者却與內徙再任者更與優遷使被堅執鋭者無怨辭貪進嗜利者無幸位則人才不乏矣抑又有可言者古人於一世人物要必盡其才而用之反覆謀議惟恐其不熟默觀審察惟恐其不稱聽其言而信其行觀所由而察所安故能任之以事而無不成責之失職而無敢怨近日之事則有甚不然者宣威之臣賦上明命用舍利害所繫非細今或紿以諭民却使撫兵始不知謀終使任事欲加之罪其能無辭將帥之臣人命所恃兵將相知猶恐不濟今乃擢為郡守本無尺籍分撥它屯驟使臨陳欲責之效其何能必甚至身為執政不與廟謨並列樞府不知兵事朝廷用人一至於此雖有俊傑未免茍且歲月以公府為傳舍以伴食為保身不然則有髙蹈隱迹者耳陛下念人才乏而未究搜揚之術莫若均內外之任制遲速之法驟用恬退屏斥僥幸至於廊廟之任閫外之寄事大體重不輕所豫則人才皆至矣人君以天為心以民為體斬殺不時不可以為孝言動非禮不可以為仁中興惠養九十年兼愛南北豈不知大讐未報正統未明為民受屈循至今日自兵興以來百姓之失業者可勝計也曩時農夫今應募而荷戈矣曩時壯丁今死戰而暴骨矣大江以北莽為戰場淮襄關外半為丘區人煙稀少十無一二而米斗踴貴其直數千秋熟尚逺人情可慮兵之害民如此其酷也邊民喜亂失其良心或假託忠義肆為盜賊或結集鄉閭侵擾對境居南界者以北界為犬豕居北界者視南界為仇讐剽及牛馬掠及婦女邊臣坐視不敢孰何要功生事者又欲作戰勝申奏僥幸推賞引惹邊釁屠戮平民無大軍可以迎敵無城郭可以禦侮輾轉退保莫有限齊江北之民何所告訴束擔維舟日謀竄逸廢生生之具失耕農之業加之調發不常和糴方急已去者流為盜賊未去者苦於飛挽如此不已亦恐召釁稔禍不特强敵之可畏也既不能兼愛南北又無以感動中原復古本意相去愈逺古人征討叛虐兵不血刃爭奪城邑市不改廛所謂師出以律否臧亦凶而況和戰者朝廷之微權整暇者邊臣之守職無事則櫜弓卧矢敵人開戶有事則整兵而相向先鼓而後行事至而戰不從中御至於和戰大議事關國體若使勢不容已決意用兵必須大啓元戎弔民伐罪行一不義皆所不為若欲復尋舊盟尤當邊鄙不聳何至魚肉生民背天理而違古道使斯民至於此極也昔者河南之民被祖宗德澤不忍使其子弟終於左衽父詔兄語朝思夕念望恢復之期念須㬰無死則以中國之仁厚有以勝其慘刻中國之禮義有以别其風俗也是以臨邊而語則自謂漢民交鋒而戰則常至倒戈每敵有長驅之心則未嘗無後顧之患若使結怨境上不能息肩中原遺黎自為勍敵對境之間岌岌乎不可以朝夕矣是故不安江北不足以服河南不服河南不足以制强敵陛下念民力困而未明惠養之方則必明詔大臣講求邊政博詢羣臣選求邊吏以版築儲峙為急務以誅亂禁暴為初政屯大軍以防姦民明黜陟以戢姦吏則民力少蘇矣百度之未釐三邊之未靖人才之所以乏民力之所以困臣固略言之矣至於所謂針規主失指摘官邪臣雖不才親逢求言之主豈敢無說以處此也求言者治之形也用言者治之脉也漢光武建武詔書第五倫知其聖主唐德宗奉天詔書淄青軍士為之泣下言語感人其效如此本朝徽宗欽宗用之宜足以收召和氣而諄復昭回曽不及事然後知宿痏積弊根盤莭錯利刃敏手猶恐不及是必審造命者如救頭去害政者如決癰坐便殿如受國書對羣臣如遇大敵此心所存對越上帝及其見於行事特其緒餘播於詔告特其發見有雍容和緩之意無匆遽淺迫之謀如日用飲食不改常度如深居簡出不啓外侮此古之聖賢所以於穆而不已獨立而不懼也臣在逺方不識事宜但聞攬權之初威聲震赫朝廷不及知禁近不得與竄殛大臣歸過兵釁驟賞偏將峻及廉車事出一時邈無前比然而人心未駭士論未譁皆謂改弦易轍必將取前日弊政而一洗之既而屢遣小使不少暇逸屢詔集議不立成算邊陲之間易肆欺侮朝廷之上茫無執持事叢於更化之前而效未著於更化之後發威王之憤不足以擊魏衛赫文王之怒不足以遏徂莒則是規橅未定議論不一後之視今猶今之視昔也人徒見春事已深羽書稍緩茍寬目前便謂奠枕不知水潦一去秋風便高和議茍成敵情難測設使誅求未巳干戈復尋敗軍之將不保其復勇棄甲之軍不保其不潰糧運不保其能繼器械不保其適用廟堂之上將何說以濟也始謂權臣專制使執政之臣不得與議今議已與矣比前日何如也始謂權臣撓政使宣威之臣不得行法今法得行矣比前日何如也債帥之當易者幾處虛籍之當汰者幾許官吏之任責者幾人新政之望效者幾事長策急務未見毫末而簿書期㑹益以㢮緩陛下有罪已之心至使天下針規主失行綜核之政又欲使天下指摘官邪不知人主用人一失其柄則針規主失尚可逃譴指摘官邪其罪反大甚而臺諫給舍繫天下之公議顧乃朋邪結託為執政之私人漸不可長至有竊天下威福而不敢問者拔本塞源非一朝之故也古人以議執政為美談故政成而人頌其德後世以議執政為獲戾故政弊而人指其過祖宗盛時成憲具在文彥博之權方重唐介數其罪而不疑韓琦之勢方炎王陶攻其短而不避法家拂士君子之良師也危言激論朝家之藥石也茍使大臣當國皆得以言其非則過小而易悔事近而易復有策免而無誅夷有待罪而無貶斥手足腹心之喻復見而徴招角招之樂作矣浸失本意此事未久大臣當軸惴惴然恐天下議已鉗制言路頥指給舍甚至假制誥以導私意因批答以報私恩推頌功勳極于元聖討論典故不由舊章一旦聖鑒所臨與衆共棄然後枚數其罪𣲖别其姦人人得以肆言事事得以詳論主失官邪莫甚於此陛下誠厭習俗胡不取祖宗之法而施行之選用臺諫必使百官雜舉不使大臣干於其間斷自聖裁惟意所欲至於講讀之官可以非時見內宿之官可以夜分召或賜坐於燕閒或前席於宣室下民之問詢及芻蕘邇言之察不間踈逺則主失官邪氷散霜釋矣臣誠知陛下所謂官邪不止乎此竊以為事勢方急非卑官小吏之所暇問也又況立法者在朝廷行法者不在天下一時之所立萬世之所行皆朝廷也烏有朝廷壞法歸罪於天下而更立法以勝之此不公之甚也是故薦舉之有請求非薦舉之法也請求遍天下而謂薦舉之法當變誰之罪也官吏之有權攝非官吏之法也權攝遍天下而謂官吏之法當變誰之罪也押綱𨽻州郡而州郡不得專廂軍屬州郡而州郡不得使以至銓試之有代筆太學生之有詭名舍法之有異恩銓法之有堂帖是豈逺方寒士之所得為哉今不必純法上古求過於祖宗之時但只如紹興乾道淳熙間上下相維亦足以致治此在陛下宵衣旰食勤勤懇懇不以去權臣為成功不以和戎為得計坐薪嘗膽日與羣臣商確求其所未至勉其所當行庶乎其可矣不然則日復一日月復一月內無善政外有强讎坐享太平又不得如今日也昔趙普戒太宗曰邪諂之輩蒙蔽聖聰非次興兵出于偏聽太宗無是事也蘇轍戒仁宗曰歌舞飲酒歡樂失節坐朝不聞咨謀便殿無所顧問仁宗無是事也忠直之士自古所同誠實愛君不知其罪仰惟陛下求言之切臣不敢不盡其愚惟陛下赦其僭監察御史謝方叔上疏曰秉剛德以回上帝之心奮威斷以回天下之勢或者猶恐近習便嬖之人有以私陛下之聽而恱陛下之心則前日之畏者怠憂者喜慮者玩矣左右前後之人進憂危恐懼之言者是納忠於上也進宴安逸樂之言者是不忠於上也凡有水旱盜賊之奏者必忠臣也有諂諛蒙蔽之言者必佞臣也陛下享玉食珍美之奉當思兩淮流莩轉壑之可矜聞管弦鍾鼓之聲當思四蜀白骨如山之可念又言崇儉德以契天理儲人才以供天職恢逺略以需天討行仁政以答天意帝恱中書舍人陳傅良上奏曰臣聞人主有大舉動必有以新天下之耳目而大慰民望共惟陛下始自宅恤移御廣內此大舉動也正天下顒顒望治之時伏想聖心先定將有仁聲德意之事感恱士夫兼被黎庶者矣臣不肖輒有管見一二仰裨聖明惟陛下財幸一乞三宫各置使領以盡孝養之道一乞降詔問民疾苦仍申警見行賑濟州縣官吏諭以賞罰一乞自宰臣以至侍從管軍次第宣引從容賜坐訪以軍國機務以示責成之意一乞撫問㳂邊諸將并帥臣仍量加錫賚一乞增置諫官一乞收拾恬退滯淹之士一乞稍出內帑錢以助版曹經費少寬催理已上特臣區區愚慮所及未足以廣宣主德如蒙采納見之施行則嗣此有樂告陛下以治安之策者矣臣不勝拳拳知邵武軍徐範召赴行在言功利不若道德刑罰不若恩厚雜伯不若純王異端不若儒術諛佞不若直諫便嬖不若正人奢侈不若詩書盤遊不若莭儉玩好不若宵衣旰食窮黷不若偃兵息民是非兩立明白易見幾微之際大體所關積習不移治道舛矣著作郎吳泳上言誦往哲之遺言進謀國之上策實不過曰內修政事而已然所謂內修者非但車馬器械之謂也衮職之闕所當修也官師之曠所當修也出令之所弗清所當修也屯兵之地弗嚴所當修也直言敢諫之未得其職所當修也折衝禦侮之弗堪其任所當修也陛下退修於其上百官有司交修於其下朝廷既正人心既附然後申警國人精討軍實合內修外攘為一事神州赤縣皆在吾指顧中矣太常博士徐清叟入對疏言陛下親政以來精神少振而氣脉未復條目畢舉而紀綱未張公道若伸而私意之未盡克者則亦風化之先務勸戒之大權與夫選用之要術猶有闕略而未之講明者爾何謂風化之先務曰原人倫以釋羣惑者是已何謂勸戒之大權曰惜名器以示正義者是已何謂選用之要術曰因物望而進人才者是已時新進者多逞小才害大體太學正張虙轉對言立國有大經人主當以靜制天下之動今日之治或有鄰於鍥薄而咈人心傷國體者宜有以革之使祖宗之意常如一日可也遷國子博士時金垂亡因論自治之道謂天下之治必有根本城郭所以禦敵也使溝壑有轉徙之民則何敵之能禦儲峙所以備患也使枵腹盻盻不得食則何患之能備今日之吏能知守邊之務者多而能明立國之意者少繕城郭聚米粟恃此而不恤乎民則其䇿下矣陳耆卿代上殿劄子曰臣聞天下非大弊極壞之足憂而小康之可懼孟軻曰國家閒暇及是時明其政刑雖大國必畏之矣又曰今國家閒暇及是時般樂怠傲是自求禍也夫同一閒暇爾聖主乘之則自修庸主乘之則自肆果自肆也雖大治且不保況小康哉臣仰惟皇帝陛下兢業勤儉配古帝王踐阼二十有三年而更化且七年矣曩時權姦內蝕据我乾斷今無之曩時僭叛外訌撓我坤維今無之曩時寇盜起於南芟鋤不息今無之曩時戎禍亂於北拏結不解今無之人孰不曰此閒暇時也陛下亦嘗思之乎昔之於敵也惟憂其不亡而今也反憂其亡憂其不亡者恐其盛而與吾角也憂其亡者恐其餘息忽盡而有崛起者之為吾鄰也然則外若閒暇而中有隱憂之勢焉及是時而自肆可乎臣之所以告陛下者非止曰搜兵選將高城深池以為備禦策也自治一語今為書生常談而自古聖賢未有能捨是以躋于理者要其大較曰用人聽言而已用人如資耳目股肱聽言如通脉絡脉絡壅底則股肱耳目有作而不隨之勢自更化以來求言凡幾進言凡幾去歲小大廷紳慷慨激烈爭言時政或以為指斥太過臣曰未害也惟聖主為能受盡言言之是可為國家福言之非可為國家賀賀者非賀其言之已甚賀其言之雖甚而上之人能來之且容之也雖然其甚者宜容也其切且當者不當止於能容或謂陛下不酌可否槩而容之聖度雖寬物望未愜夫亦於羣臣奏對之間擇其稍可行者次第施設以收士大夫之心可也至若用人一事陛下與二三大臣權衡於上誕開公道痛絶私謁有德者用之有才者亦用之正與翕受敷施同一軌轍而上之意向難測下之體認易偏用一精明之吏則有以苛察迎之者矣用一剛强之吏則有以峻刻迎之者矣用一能理財之吏則有以聚斂迎之者矣見影疑形見葉疑根上未必有是而下不以為無是此又公朝所宜察也臣愚欲望陛下更與二三大臣籌度仍降睿㫖布告中外俾知所以招徠讜直奬用忠厚之意庶幾上而朝廷下而郡國莫不曉然向方以惟上之聽脉絡既通耳目股肱既運元氣既固邉圉蓋客邪爾惟陛下亟圖之吏部尚書游似入侍經幄帝問唐太宗貞觀治效何速如是似對曰人主一念之烈足以旋乾轉坤或謂霸圖速而王道遲不知一日歸仁期月而可王道曷嘗不速一念有時間斷則無以挽回天下之大勢至於憂勤既切宸念而佐理非人亦何以布宣九重之實乃托太宗事以陳且謂太宗矜心易啓漸弗克終僅止貞觀之治陛下嗣服十有五年艱危之勢滋甚回視太宗治效敏速相越乃爾意者親儒而從諫敬畏以檢身未若貞觀之超卓乎莭用以致愛選廉以共理未若貞觀之切至乎願陛下益加聖心起居舍人真德秀上奏曰臣不佞昔在辛未之冬嘗因進對妄論北敵有必亡之勢者三可為中國憂者二今其强敵外攻大臣內畔部曲廢殞骨肉分爭敗亡之形蓋甚前日臣愚竊謂此正天命離合之機國家多事之始可以為憂而未敢以為幸也夫敵人窺伺河洛餘八十年中原遺民墮在鬵炭臣知天意慘然者久矣詩曰皇矣上帝臨下有赫監觀四方求民之莫言天厭商亂而求民之定也又曰維此二國其政不獲維彼四國爰究爰度言夏商之後無足當天意者於是博求之四方也既又曰乃眷西顧此維與宅言諸侯之德無以易文王者故天命之為中夏主也今天厭夷德甚於獨夫受之時而堂堂中原實宋舊物陛下誠能進修聖德一如文王發政施仁一如文王上帝監觀當必有眷焉南顧之日則雖因時俟釁光復土宇臣猶以為易若夫天時雖應而人事未修補苴目前慮弗及逺不幸一敵滅一敵生甚者姦雄乘隙而奮風塵蒙霧六合震動雖欲燕安江沱姑全金甌之業臣猶以為難蓋嘗深惟今日之勢必也君臣上下皆以祈天永命為心然後可以安元元固社稷銷未形之變迓將至之休臣不揆狂愚敢條為六事以獻惟陛下財擇臣聞劉向有言曰祥多者其國安異衆者其國危天地之常經古今之通誼也臣竊究其指以為不然蓋祥多而恃未必不危異衆而戒未必不安顧人主應之者如何耳伏觀今歲以來咎徴洊至二月宜燠而飛雪沍寒其令如冬六月宜暑而積隂驟􅋽其令如秋地宜安靜而有震搖之變水宜潤下而有漂涌之灾則隂陽猶失莭也乃九月丁巳星隕于晝其占主益十月戊戌流星出昴其占主吳則象緯猶告愆也有一于斯皆宜警懼而況重之以震霆之異乎昔景祐五年雷發孟春仁宗皇帝即下求言之詔凡聖躬闕遺臣下阿枉與夫政教刑獄之失薦紳百僚咸得悉言所以通下情召和氣也今陛下自視何如仁宗冬雷之警甚於春孟而求言之詔未頒政令否臧何由悉見四方利病何由盡聞羣臣邪正何由遍察雖震懼之言不絶于口憂勞之念日切于心臣猶以為未也夫天之愛陛下如慈父誨陛下如嚴師䙝而弗嚴則愛有時而弛玩而弗戒則誨有時而倦惟陛下考祖宗之已行思所以通人情察民𨼆進忠直屏佞諛使善政日新至和自應此祈天永命之一事也昔商周君臣更相啓告不曰率乃祖攸行則曰監于先王成憲由古暨今未有作聰明改法度而天下久安者臣觀三代而下治體純粹莫如我朝德澤深厚亦莫如我朝蓋其立國不以力勝仁理財不以利傷義御民不以權易信用人不以才勝德聖子神孫世守一道故雖彊不如秦富不如隋機變之巧不如齊晉材能之盛不如武宣然其恩結乎人心富藏乎天下君民相孚而猜忌不作材智不足而忠信有餘社稷長逺賴此而已陛下聖德謙沖未嘗輕改成憲臣猶竊慮或者患國勢未張而欲振以威刑患財用未豐而欲益以聚斂謂誠信不如權譎謂忠厚不如刻深有一于兹皆伐國之斧斨蠧民之螟螣也惟陛下察截截之諞言守悶悶之家法舍一時之近效恢長世之逺圖此祈天永命之二事也昔管仲有云下令於流水之源者順人心也鼂錯亦曰三王法令合於人情而後行之夫二子以功利之徒刑名之學且猶知此而況不為二子者乎漢世用法之嚴莫如武帝然欲重皮幣而皮幣不可行欲禁私鑄而私鑄不為止豈非人心不服則法有所不足恃耶夫法令之必本人情猶政事之必因風俗也為政而不因風俗不足言善政為法而不本人情不可謂良法陛下亦知近日人情之休戚乎昔有唐定制非叛逆不籍其家德宗欲籍竇參而陸贄爭之憲宗欲籍楊憑而李絳爭之今閭巷細民小有詿誤輒罄其資而沒之官有人心者寧忍為此往者明詔丁寧毋得擅籍朝廷德意未嘗不歸於厚而貪官汚吏倚法以削者猶自若也䘖寃已甚之人間能奔訴省部經營展轉僅獲給還而違詔擅籍者終未聞薄懲一二貪猾之吏何憚弗為羣情囂囂不自聊賴弱者至父子相隨赴井以自斃彊者至欲剚刃守臣以自快民愁如此而承流宣化者動以人情安便為言是不特欺其民且欺其君矣孰謂清明之朝而可罔以非道哉書曰民情大可見小人難保臣願陛下軫不見是圖之戒思不虐無告之言令之未便者勿憚於改為吏之不良者勿使之佚罰收人心解天意孰大於斯此祈天永命之三事也昔趙簡子以尹鐸為晉陽鐸請曰將為繭絲乎抑為保障乎簡子曰保障哉鐸往損其戶數異時智氏之難卒賴之為安今之有司知為保障慮者固不乏而繭絲自營者皆是也日者近甸海塘一役敷樁篠至十六萬調丁夫至八千人窮瘠之民豈易堪此四方郡國科民出鏹少者日亦千緡江右守臣至有隂增常賦以自潤者久而弗已豈邦本之利哉夫安富恤貧王者之政也而今郡縣之官往往有嫉視富民之意多方破壞不盡不止獨不思富之與貧相須而濟今有餘之家窘於科斂摧於告訐皆蒿然有不自存之態於是賖貸之路窮而貧民益困矣古者君與民為生故有省耕省斂之政今毋望其能如古也惟民自為生官勿撓之足矣而逺方縣邑至有令民日用錢穀米鹽之數悉書而上之官者其請厯于官也有給厯錢其驗視于官也有繳厯錢瘠民以肥吏大率皆此類也年方屢登變且未作脫有饑儉為慮可勝計邪臣願陛下霈然下詔申敕有司削非法之征徭禁不時之科率以紓民力以阜民生此祈天永命之四事也臣聞式敬由獄者蘇公所以長王國虐用五刑者苖民所以殄厥世昔我藝祖皇帝承五季極亂之餘赤子遺民存者什一於是立奏案之法以革藩侯專戮之弊頒折杖之格以除獄官過用之刑至仁如天覃及百世列聖因之為法益備急故入之罪寬過失之誅故范祖禹謂國家以仁繼仁哀矜于民帥用中典為百三十年太平之本陛下天姿寬恕同符祖宗好生之德對越無愧而臣區區思所以將順者有三一曰今之理寺實名天獄民有不幸入其地者如赴坑穽其視官吏如畏鬼神非他狴犴比也間者蕃舶之誅株連頗衆幽鬱所感淫雨為菑秋官有陳繼命趣決有以見陛下欽恤之心臣願自今非事體至重毋輕下大理設不獲已猶當限奏當之期嚴枝蔓之禁書曰何敬非刑何度非及惟聖明垂意二曰廷尉天下之平命官設屬宜常參用儒者俾三尺之外得傅以經誼本之人情庶幾漢廷斷獄之意三曰酌情處斷所以重帥權非列城所得用便宜斬戮軍興一切之政非平世所可行臣觀比來􅎊相承效儻或不幸有嗜殺之人操擅誅之柄惟意所欲民奚辜焉願亟制其萌以杜藩鎮之禍三者誠行則上足以承天心下足以拯救民命延洪國脉其在兹乎此祈天永命之五事也國家待遇臣子忠恕為心故有罰罪之科有宥過之典夫追命居住視古流放之刑其在聖朝未嘗輕用比緣官吏玩令間或舉行誼在懲姦本非獲已罰當其罪人自無詞側聞刺舉之官或乖審謹奏劾來上未盡至公乃者朝廷蓋嘗原貫一二矣臣願因詔有司博參物論若其倚法牟利贓狀灼然在臣何敢遽議或緣材術短拙措置乖方本無嫚令之心例遭曠職之罰者揆諸人情宜在可貸之域又郊霈之行今將朞歲湛恩汪濊草木為春而士大夫名麗丹書間有未被湔滌者其間罪稔惡盈名隳莭喪清議所棄自無足云若夫情有可矜法所當宥而有司因循未及舉行者願詔憲曹條上之而廟論審裁之非獨恢洪至恩亦以明布大信此祈天永命之六事也昔周至成王天下既極治矣而召公作誥一則曰祈天永命二則曰祈天永命若不能以朝夕安者蓋天命靡常聖賢所畏而況今乎然嘗反覆召誥一篇其綱目不過二事曰敬德曰小民而已蓋國之將興不在彊兵豐財而在君德國之將亡不在敵國外患而在民心此召公所以勤勤於戒王而臣復推演之為陛下告也或者以為胡運衰微天所以福我也夫呼韓日逐之爭信為天之右漢矣髙澄侯景之隙獨非天之禍梁乎今敵之存亡大勢可睹雖吾量時度力動以覆車自懲然失火亡猿勢有相及應酬一誤何事不生安危之機殆難預卜為今之計獨有力行好事以答天心天茍相焉何鄉不濟伏惟陛下念王業之難安惜天時之易失日與輔相惟懷永圖屈已而受盡言親賢而逺不肖凡所以維持天命者汲汲而圖之使人心日附根本日彊則進可以成功退足以自守抑猶未也雖受渭上之朝納河湟之土憂方大耳況事變之來有非意料所及者乎詩曰宜鑒于殷駿命不易願陛下留神毋忽著作郎任伯起上奏曰臣聞革天下之弊者不可無任怨之人亦不可不保全任怨之人夫天下之弊皆起於人情之私今也因其弊而革之必有拂夫人情者矣拂乎人情怨之所聚也怨之所聚禍之所基也人之常情鮮不懼禍往往熟視天下之弊逡巡退避而莫之革是豈果無任怨之人哉蓋在上之人不能保全之勢使然耳臣故曰革天下之弊者不可無任怨之人亦不可不保全任怨之人者此之謂也昔者西漢彊大至景帝時有臣朝錯始議削地諸侯歡譁錯曰不如是則天子不尊宗廟不安及七國稱兵以錯藉口袁盎之言一入東市之誅即行此議者所以哀錯為漢任怨且恨景帝不能保全之也然則有國家者誠得錯等而用之天下之弊何患其不能革乎臣請言今日之弊一曰冗官二曰冗兵三曰冗吏四曰恩賞太濫五曰費用太廣古者官有常貟貟有常數昔唐太宗省內外官定制為七百三十貟曰吾以此待天下賢才足矣今官誥院所出誥命歲以萬計銓曹一官之闕率五六人共守之況入仕之塗日雜僥幸之門日啓人人能言其弊然而莫之能省者無任怨之人故也古者兵貴其精不貴其多周世宗嘗曰農夫百未能養甲士一且健懦不分衆何以勸乃大簡諸軍精鋭者升之上軍羸弱者斥之故士卒精彊征伐四方所向皆捷今內而三衙外而諸路老弱疲惰虛費衣糧者甚多武勇壯健可備緩急者甚少人人能言其弊然而莫之能汰者無任怨之人故也朝廷嘗議減吏額矣何為至今而莫之果行也蓋其連蔓根株交通關節張皇事勢胥動以浮言因循姑息以至于此不惟以有限之財養無用之人又且姦蠧日滋賄賂成市漢司馬遷有言刻木為吏議不對蓋疾之也而況實繁有徒乎人人能言其弊然而莫之能減者無任怨之人故也昔唐蔣伸言於宣宗曰近日官頗易得人思徼幸宣宗驚曰如此則亂矣對曰亂則未亂但徼幸者多亂亦不難近年以來人思茍得每國家講一典禮行一慶霈莫不過生僥覬皆有取必于上之心曰是則有例得之不以為恩不得則以為怨是豈無可以痛抑之者乎人人能言其弊然而莫之能抑者無任怨之人故也昔唐鄭覃有言凡金銀幣帛出自蒼生膏血不可使無功之人過沾賜與縱內藏有餘亦當莭儉勿容易而散之則四方有事得以支備免令重斂百姓朝廷近年支用日廣一日之間濫費不可勝計是豈無可以痛莭之者乎人人能言其弊然而莫之能莭者無任怨之人故也此五者之弊坐視而不革臣不知更數年之後陛下其何以立國然則講究條具不恤羣議而痛革之二三大臣不得不任其怨然則委信不疑力排羣議而保全之則在陛下而已昔在仁宗朝嘗議裁減任子及展年磨勘發議之始士大夫相顧以為必致怨謗莫敢以身任之者惟韓琦富弼得君之專毅然不顧成法一立至今賴之臣願陛下以仁宗為法二三大臣以韓琦富弼為法則何弊之不革天下幸甚歷代名臣奏議卷五十九
