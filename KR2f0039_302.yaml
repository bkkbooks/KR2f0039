body:
  text: 歷代名臣奏議卷三百二明楊士竒等撰災祥宋神宗熙寧元年翰林學士吕公著論淫雨地震疏曰臣伏見夏秋之交淫雨為沴乃甲申地震京師天威不逺譴告甚明此誠陛下抑畏修省之時也臣竊考自昔人君每有變異或因恐懼而致福或以簡誣而致敗蓋古之王者知禍福無不自已故側身修行以求消復則天之應也敏若影響此所謂恐懼以致福者也至於後世乃以為天地災眚皆有常數或專修外事或歸過於下則是坐視天災無復自飭此所謂簡誣以致敗者也恭惟陛下以聖德在位將興太平然而災害重仍殆有以警懼陛下臣愚以為必須歷考庶事正所未正則災可轉而為福書曰惟德動天無逺弗屆言至誠之道修於已則足以感神人也又曰天聰明自我民聰明君能感人然後可以動天也蓋人之情偽最為難知上雖以至誠待下猶恐有不應者是以古之王者臨朝接物莫不以此為大務故衆多之臣皆思盡誠以應之而不敢挾機以事其君國耳忘家主耳忘身上下如一至誠無間如此而天意弗豫變異不消者未之有也在易之咸曰君子以虛受人夫衆人之言不一而至當之論難見君子者能不自用而欲合天下之公議猶恐未能盡天下之善也然而論議者固有其言不正而可喜其理似是而實非者不幸而先入之則後雖有至當之論亦難於必受也是以古之王者去偏聽獨任之弊而不主先入之語故能慮無遺策而不為邪説所亂昔顔淵問為邦孔子曰逺佞人蓋佞人之在君側也先意承旨惟恐不合於君則其勢必久而愈親賢者之在君側也直言正行惟恐不合於義則其勢必久而愈踈此孔子所以欲逺之書曰常厥德保厥位厥德靡常九有以亡言天子者臣下所稟令不常其德則人無所錯手足是以古之王者思為可久之德而事不輕發方其令之未出也無所不謹則令之既出也無所不行書曰三載考績三考黜陟幽明夫以堯舜之聰明其於羣臣之能否必至於三考九載而後黜之者蓋以知人至難而功用復不可遽見若徒以一事之得失一人之毁譽不待乎久不究其他因以定臣之賢不肖而進退之則所處未必盡當所處未當則復有更易更易既多則人懷茍且之心而世無安治之實矣昔商宗遭鼎雉之異而祖已訓諸王曰惟先格王正厥事夫災變之來固不虛發而天意所指蓋亦難知惟王者能因事修飭以答明戒則精祲之交安有不逹然自漢儒以來言災異者始穿鑿經意附會時政人君若聽其所言專備一事脫非災變所為起則得不違天心乎臣是以竊慕祖已之義不敢為漢臣之説伏望陛下省留聖意未行者勉而行之既行者勉而終之則天下幸甚八年公著提舉太乙宫論彗星疏曰臣伏覩今月十三日詔書許中外臣寮直言朝政闕失者臣世受國厚恩陛下蒞政之初首被選擢自外藩召入翰林故在左右日口陳手奏數進愚忠頗蒙採納今雖散處間外其於愛君憂國惓惓之心未嘗敢忘伏見陛下祇畏天戒焦勞懇惻實天下幸甚臣聞晏子曰天之有彗以除穢也考之傳記皆為除舊布新之象皇天動威固不虛發意者陛下之仁恩德澤猶未布於天下而政令施設所以厲民者衆乎何其譴告之明也陛下既有恐懼修省之言必當有除穢布新之實然後可以應天動民消伏變異伏惟陛下留神幸察臣竊觀陛下自即位以來早朝晏罷勵精庶務其規模蓋宏逺矣固將致堯舜三代之治以光太祖之業豈特區區守文之主哉然臨朝願治為日已久在廷之士益乖戾而不和中立敢言者罹讒而放逐阿諛附勢者引類而升進其外則郡縣煩擾民不安業畎畝愁歎上干和氣擕老挈幼流離道路官倉庫廪所在闕乏又無以廣賑濟至於骨肉相食轉死於溝壑者多矣上下相蒙左右前後莫敢正言者陛下有欲治之心而無致治之實者何哉殆任事之臣負陛下之髙志也何以言之邪正賢不肖蓋素定也今則不然前日舉之以為天下之至賢後日逐之以為天下之極惡前後紛紛玷黷聖慮者蓋不一矣其於人才既反覆而不常則於政事亦乖戾而不審斷可知也陛下獨不察乎況如一二人者方其未進用之前天下固知其姦邪小人也但取其一時附會故極力推進此所以終纍陛下則哲之明者也自昔人君委任而責成者蓋有之矣如齊之桓公是也為其勞於求賢而逸於任使也今則不然水旱不時人民困乏則無以分陛下焦勞敵人桀驁疆場有事則陛下不免於旰食又況加之以天變地震之異乎未見陛下任人之得也古之為政而初不順於民者亦有之矣鄭之子産是也子産之為政也一年而輿人誦之曰孰殺子産吾其與之三年又誦之曰子産而死誰其嗣之今陛下垂拱仰成七年于兹矣輿人之誦亦未異於七年之前也陛下雖慮亦及此而終未幡然者殆左右之臣蒙蔽陛下使天下之事不得聞也臣伏思陛下自即尊位以來上奉兩宫仁孝篤至下逮諸王纍朝貴主無不極於恩禮春秋方富而無聲色之過孝友恭儉發自天性宫中之事人無間言而德澤獨不被於民者何哉臣聞安危在出令治亂在所任故臯陶戒舜曰在知人在安民願陛下以知人安民為先除穢布新以答天戒則轉災為福不旋踵而應矣臣昨者朝廷嘗蒙訪逮當時議者謂祖宗制度不可少變朝廷用人必循資級臣固曰不然何則興滯補弊者乃人主之先務任賢使能亦不宜專較歲月但一出於至公當則可爾臣今所言亦非謂今日法令皆不可行也陛下誠能開廣聰明延納正直公聽並盡天下之議事之善者固當存之其未善者則當損之茍為非便不為已行而憚改言有可取不以異議而見廢如此則不勞陛下神明不驚衆人耳目而庶事條理百姓安定然後可以足兵食禦外侮矣臣伏自去國六年未嘗有一言仰逹聖聰至於私居接人亦未嘗輕議時政今日所以輒進愚悃者誠恐陛下不於此時感悟則後日雖欲改為非竒謀髙䇿亦未易為也程頥代吕公著應詔疏曰伏覩今月十三日詔敕以彗出東方許中外臣寮直言朝廷闕失臣自言事得罪久去朝廷無所補報退就間冗尚敢區區以言自進者誠見陛下寅畏天命有恐懼修省之意草萊之人尚思效其忠懇況臣世荷國恩久參侍從雖罪釁之餘敢不竭其愚誠以應明詔臣伏觀前史所載彗之為變多矣鮮有無其應者蓋上天之意非徒然也今陛下既有警畏之心當思消弭之道且以今日之變孰為而來書曰天視自我民視天聽自我民聽豈非政之所致歟如曰非政之由則經為誣矣臣復何言詔之所求亦為虛設若以為政之所致則改以順天在陛下而已晏子所謂可祝而來亦可穰而去也傳曰天之有彗以除穢也又曰所以除舊布新臣願陛下祇若天戒思當除者何事而當新者何道如曰舊政既善無所可除則天為誣矣臣復何言若以為當求自新則在陛下思之而已自非大無道之世何嘗不遇災而懼然而能自新者蓋寡大率蔽於所欲惑於所任明不足以自辨也視是而為非以邪而為正敗亡至而不寤天亦不能戒也豈其惡存而好亡憎治而喜亂哉亦惑而不能辨爾臣以為辨之非艱顧不得其道也誠能省已之存心考已之任人察已之為政思已之自處然後質之人言何惑之不可辨哉能辨其惑則知所以應天自新之道矣臣請為陛下辨之所謂省已之存心者人君因億兆以為尊其撫之治之之道當盡其至誠惻怛之心視之如傷動敢不慎兢兢然惟懼一政之不順於天一事之不合於理如此王者之公心也若乃恃所據之勢肆求欲之心以嚴法令舉條綱為可喜以富國家強兵甲為自得鋭於作為快於自任貪惑至於如此迷錯豈能自知若是者以天下徇其私欲者也勤身勞力適足以致貪敗夙興夜寐適足以招後悔以是心而致善治者未之聞也願陛下內省於心有近於是者乎茍有之則天之所戒也當改而自新者也所謂考已之任人者謂夫王者之取人以天下之公而不以已求其見正而不求其從欲逆心者求諸道巽志者察其非尚孜孜焉懼或失也此王者任人之公也若乃喜同而惡異偏信以害明謂彼所言者吾之所大欲也恱而望之信而惑之至於甚惡而不察恣欺而不悟推是而往鹿可以為馬矣願陛下考已之任人有近於是者乎茍有之則天之所戒也當改而自新者也方陛下思治之初未有所偏主好惡取舍一以公議天下謂之賢陛下從而賢之者衆矣進之於朝亦多矣及乎既有為也皆以不合而去之更用後來之人皆昔未嘗以為賢者也然後議論無違始之所賢者皆愚始之未嘗賢者皆賢此為天下之公乎已意之私乎自論議無違之後逆耳怫心之言亦罕聞矣夫以居至尊之位負出世之資而不聞怫逆之言可懼之大者也知人之難雖至明不能無失然至於朝食則為不世之賢暮隙則有無窮之罪顛錯亦已甚矣在任人之道當改亦明矣所謂察已之為政者為政之道以順民心為本以厚民生為本以安而不擾為本陛下以今日之事方於即位之初民心為歡恱乎為愁怨乎民生為阜足乎為窮蹙乎政令為安之乎為擾之乎億兆之口非不能言也顧恐察之不審爾茍有不察則天之所戒也當改而自新者也所謂思已之自處者聖人謂亡者保其存者也亂者有其治者也陛下必不以斯言為妄自古以來何嘗有以危亡為憂而至危亡者乎惟其自謂治安而危亡卒至者則多矣不識陛下平日自處以天下為如何聖心所自知也茍有憂危恐懼之心常慮所任者非其人所由者非其道唯恐不聞天下之言如此則聖王保天下之心也上帝其鑒之矣或以為已安且治所任者當矣所為者至矣天下之言不足恤矣如此則天之所戒也當改而自新者也所謂質之人言者當有其方欲詢之於衆人乎衆人之言可使同也欲訪之下民乎下民之言亦可為也察之以一人之心而蔽之以衆人之智其可勝乎是不足以辨惑而足以固其蔽爾臣以為在外一二老臣事先朝數十年久當大任天下共知其非欺妄人也知其非覆敗邦家者也臣願陛下禮而問之宜可信也及天下所謂賢人君子陛下聞之於有為之前而不在今日利害之間者亦可訪也以是數者參考之則所當改者何事所當新者何道固可見矣天下之人一聞詔音莫不鼓舞相慶謂陛下必能上應天心召迎和氣臣以為唯至誠可以動天在陛下誠意而已昔在商王中宗之時有桑穀之祥髙宗之時有雊雉之異二王以為懼而修政遂致王道復興皆為商宗百世之下頌其聖明近世已來引咎之詔自新之言亦常有之儻人君不由於至誠則天下徒以為虛語其能感天心弭災變乎臣願陛下因此天戒奮然改為思商宗之休實鑑後代之虛飾不獨消復災沴於今日將永保丕基於無窮天下幸甚熙寧元年殿中侍御史裏行錢顗上奏曰臣伏以今月甲申至辛卯京師連日地震者五竊觀人事以考變異皆隂盛陽微之象也故易傳曰凡災異所生各以其政變之則除消之亦除古之王者或因天地譴告則必責躬修德祇畏省懼思所以致之之咎務所以改之之理日新庶政以答天變故詩曰惟此文王小心翼翼昭事上帝聿懷多福此之謂矣臣竊思國家以來災變不一日月薄食星辰陵犯天雨毛雹害稼始則蝗旱作孽終則秋霖為沴河北諸郡大河決潰地復震裂廬舍摧塌人民壓溺幾以萬數其餘百川涌溢天下被水患者十有五六殊可駭愕雖春秋所記災異未有若此之甚也陛下臨御未久精心萬機以至德深仁愛育元元躬有日昃之勞而無暇豫之樂然猶嘉氣尚凝隂陽繆盩豈廟堂之燮理有非其人乎天下郡縣刑獄有所寃濫者乎深宫之中女謁有過盛者乎左右近習有竊弄威權者乎三陲蠻夷兵革有所隂謀者乎中外姦臣有潛懷不順者乎讒人昌而下情有不通者乎土木盛而興不急之役者乎號令數易而賞罰有所不當者乎賦役重困而民心有所愁嘆者乎水災地震二者應驗尤急豈非隂盛陽微之極也伏望陛下深思逺慮以杜未萌陛下無謂堯湯水旱為天數也日月之食為三辰之行也彼箕子之陳洪範劉向之傳五行皆非空言也要在應之以誠感之以德宋景公小國之諸侯爾有不忍移過之言熒惑為之退舍况陛下之聖明其肯忽之哉臣願陛下詢求至言矯革前弊密推至誠以應天變何災之不除何福之不至也臣叨居言職不敢緘默翰林學士鄭獬上奏曰去歲自京師而至于海隅地皆震今歲自京師而北至于朔方又大震迄今不已城郭陷入地民廬悉摧仆長河決溢灌深冀間兹豈細故哉地震者隂盛而迫於陽其發必有所肇而不為虛應考之古而驗于今似可究其涯略漢和帝永元二年郡國十三震説者謂竇太后由房闥而制天下今二宫非竇氏之比則不為宫闥發也建光元年郡國三十五震或地拆裂壞城郭説者謂中常侍江京樊豐擅天子權今內省非江京樊豐之比則不為寺人發也晉元帝太興元年震説者謂王敦擁兵陵上哀帝興寧二年震説者謂桓溫跋扈顓朝今大臣非王敦桓溫之比則不為執政者發也是數者無所當則殆將有兵禍乎光武時郡國四十二震而武溪蠻反晉成帝時豫州震而蘇峻亂近者仁宗時欣代間大震而元昊不庭用此以較之則非兵而何臣之所憂不在河北而在陜西何者河北雖被災而南方大稔流離之民相攜而南亦可就穀此惟煩朝廷戒敕所在務為存恤不令餒死於草莾則無慮矣至於陜西則自城綏以來至今兩議不決首尾一年凡自京師所餉縑金已費四百萬至於發卒乘器甲轉芻糧雜出於民者尚不在此數即不知國家以四百萬縑金而與羌人爭何事耶雖得一綏州而所費如此其利害亦概可見矣事不早決何止於此則將見國力殫于內民財屈於外怨黷並起姦人搖之其將奈何此不可不深慮也如聞羌人率其螻蟻之衆窺我境上料其裹糧畜牧必未能久駐殆將遁矣然而數出兵而無所攻取者此所以困我彼來則我不可不應兵師既發糧芻既集彼復解而去異時則又來使我奔走為備之不暇此正墮其術內也則朝廷亦宜破其姦謀以靜自守不為之動彼無所得而退我無所失而守若是者彼來雖數而我備有餘也夫世之治久而之亂不過百年世之亂久而之治亦不過百年此大勢也本朝自藝祖平定四方已來將百年矣治亂之際正在陛下臣以為治今之難難於祖宗之時何則自安史之亂至於五代之末四方之強諸侯已沒其立者皆孱子弱孫勢與數俱窮故太祖太宗一起而掃刈之若去菅草然易於力也至于真宗仁宗之初民已離兵革喜見太平故收功報成垂拱而天下治亦其易也今陛下非開基之日過已盛之時萬事浸以衰弊此所以難於為力而甚於祖宗之時也則豈得不深思逺慮講求所以致治之術乃欲以玩敵國取武功茍有差跌則遂成衰亂之勢可不慎哉如羌人引衆而遁則陛下斷之正論早與通好涵養生靈俾之安處則天災自息雖曰有震搖亦不能以勝我矣宰相富弼上奏曰臣伏見近歲以來災異頻數天文變於上地理震於下人情恐懼物論紛紜臣被詔至都復用為相雖蒙給假治疾未遑朝見而坐於私室如在氷淵況蒙纍遣使臣促令陛對驚惶隕越寢食不安然偶於災異之間或聞有説者不近正道臣甚憂之比俟入見日面具開陳又恐差緩蓋救患不可不急施惠不可後時臣夙夜揣摩事無大於此者今遽以狂瞽上瀆冕旒切望聖慈更賜裁擇伏聞陛下自始即位躬親萬機每有凶災憂形玉色孜孜詢訪以求聞失此真得修講朝政答謝天譴之道也然臣竊知纍有人奏請凡百災變皆繫時數不由人事者不知有之乎若誠有之此乃姦人諂佞之説上惑聖聰臣所謂不近正道者也陛下明睿英哲必不信納又慮姦人口才捷給能以甘辭致陛下或時信之信則恤災救患答謝天譴之意有時而怠怠則虧陛下之德損陛下之政不為宗社生民之福無甚於此焉臣上所云天變地震此天下皆知之皆見之大可懼者也昔仲尼作春秋不書祥瑞而獨書災異者蓋欲以警戒人君使恐懼修德以應天地之變不聞以災異歸之於時數也至西漢董仲舒傳仲尼春秋之學對武帝策曰臣觀天人相與之際甚可畏也國家將有失道之敗天乃出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至董仲舒為西漢羣儒之首所陳災異謂盡由朝政而致豈虛語哉亦不聞以災害怪異歸之於時數也夫上天之變幽眇髙邈下民或有不見而不知者若數路地震之異河北特甚則人皆見之而親被其害不可諱也因而人民流散捨棄墳墓骨肉而適他土去如鳥獸茫茫不知所止餓凍病疾死於道路者不少甚可痛惜也孟子對梁惠王曰塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也王無罪歲斯天下之民至焉孟子獨得聖人之道為最深而勸梁惠王專尚仁政不可罪歲是亦足以為後世法陛下宜深信而行之可以回災異為嘉祥變禍患為純嘏致宗社生民之福豈有窮也其姦人虧德損政諂佞不正之語必不可令眩惑於其間也又臣少時讀書頗嘗探尋天人之理竊怪有唐韓愈柳宗元劉禹錫三子談天皆不得其要臣今試陳其梗概夫太極既判遂生兩儀形而上者曰天形而下者曰地天地之間蓋載者曰萬物萬物至衆不出乎動與植而已植物不靈不能有所運用造作惟動物有命比植物為靈然亦未能為善惡知喜怒獨夫人又動而有靈者也可以為善可以為惡者是人人自為者也自為善自為惡者皆小焉天地亦隨而應之以禍以福故書曰作善降之百祥作不善降之百殃易曰作善之家必有餘慶作不善之家必有餘殃蓋祥與殃秖及其人與家者也夫所謂可以喜可以怒者非人之喜怒也天下人之喜怒天下人之喜怒實繫乎帝王之所為而然也帝王所為之政和則天下人喜人喜則其心亦和和氣既生充于上下天地自然以和氣應之天地氣和則隂陽順百穀成衣食自豐夭橫不作故民躋富夀常懷樂康雖欲使之為亂而叛去必不可得也若帝王之政不和則天下之人不喜不喜則悲愁怨怒心亦不和不和之氣既生天地自然以不和之氣應之天地之氣不和則隂陽不順百穀不成衣食不豐夭橫並作故民皆窮困離散父母兄弟妻子不能相保其不思為亂而叛去者未之有也天下之喜怒所以能感動天地致禍於國家如此之可必者何也本緣天地萬物通是一氣所生無有纎間惟是氣之清者為天氣之濁者為地清濁之餘氣散於天地之間是為萬物萬物之最靈者為人以此觀之天地萬物同為一類則最靈之人豈不能以衆喜衆怒之氣感動天地而致福致禍於國家者乎是故先聖以萬物中獨以人配天地謂之三才是知人者與天地本同而末異體均而氣通不可輕視虛用之也為帝王者宜先以仁政調和人心使之安樂自固而不叛去以為國家永永之福捨此而望天地順成天下無事決不可得也尚書洪範九疇八曰庶徴謂人君行肅乂哲謀聖五善道則雨晹燠寒風五氣時而為其休徴乃百穀用成俊民用章家用平康也人君行狂僭豫急蒙五惡道則雨晹燠寒風五氣常而為其咎徴乃百穀用不成俊民用微家用不寧也夫雨晹燠寒風雖先後説之實則一也然而可以為休可以為咎者只繫乎人君為善為惡而遂分也洪範者二帝三王所行之常道也後之君人者常信而師尚之不可謂陳迹不信用也信之則為福不信則為禍書又曰天視自我民視天聽自我民聽又曰天聰明自我民聰明天明畏自我民明威夫天本無心無耳目亦無喜怒愛威作書者假視聽聰明以為之説故易曰聖人以神道設教者是也其實只緣天地人本是一氣善惡動靜必然相應合若符契間不容髮無謂天人形體隔絶至逺便謂兩不相干而不以為信也氣既相貫氣動則應人有喜怒天應如響亦猶冬至一陽生夏至一隂生其氣眇然人不可得而見惟以葭灰驗之無不刻期以應天下人喜怒之氣能感動天地之氣亦皆刻期而應也是故治天下者直宜以仁政恱民心和民氣使其氣自通於天地日星山澤又皆有神靈主之則必能默觀君人者所為善惡及人之善惡助其自然之氣降福降禍豈不尤速耶豈不尤可懼耶以此益見天地災變不可盡歸之於時數而不修人事以應之然可以歸之時數者故時亦有焉獨堯水湯旱是也夫堯湯之為君必不使人心有不和之氣以感動天地而致其水旱也蓋堯湯大聖人其佐亦賢上下協心戮力無一夫不獲無一物失所故其水旱不得已可以歸之於時數也然雖有水旱之災而不聞有重役橫斂勞民驚衆之事亦不聞有流移播散凍餒死亡於道之人惟聞常有九年之蓄民無菜色而天下奉堯湯亦如無水旱之時愛之如父母敬之如神明人心熙熙和氣不減乃是雖遭水旱而民不被其害國不憂其危也自秦漢以降則不然凡有災變怪異皆由時君世主不能舉直錯枉用賢退不肖復有不能行善道施仁政恱民心和民氣此其以人事致天地災異必然之理也必不可歸之於時數也災異既作又不能恐懼修省行消復之道坐視蒼生赤子棄墳墓離鄉土父母妻子兄弟奔逃播徙不能相保守往往君自君臣自臣民自民不相為恤而不加救拯民既如此被其害而不悲愁怨怒以思為亂者鮮矣民既怨怒思亂而國不危者又鮮矣彼既上下乖戾不能同心協力以致災變害民而危亡其國乃妄欲比堯湯水旱以已之所致災異歸於時數是欺天欺民之甚也胡可信耶天地者至大至厚至靜不可動搖之物也古今固亦有震動之時隨其所震大小逺近必災患以應之然未嘗聞數路皆震也震且不一有日或十數震者也又不一日而止有至今踰半年尚震而未止者也是豈不為大災害耶大怪異耶此陛下正當窮究致震之由推至誠行至德思所以厭塞其變以謝天之譴告焉不然則恐董仲舒所謂傷敗乃至者必將不能免也陛下即位未久而天下但聞聖德勤儉恭孝不聞有過此變非由陛下而致然陛下若不為祖宗任其事則天地之變誰復可以任之哉陛下既任其事則固宜兢兢業業夙夜憂勤登用正人興行正道思與天地合其德而濟之以不懈使天下皆知陛下恐懼修省視民如傷恱其心和其氣則天地之氣亦和而應之茍如此何患災異之不息人民之不安乎其姦人謀身害國罪在殺無赦其所説願陛下絶之不復留於心術而稍有所惑其為宗社之福邦家之慶必不出乎此也若陛下萬一惑其所説以災異歸於時數而聖懷坦然不以為懼有司之不職者不加擇政事之不平者不加治萬民窮困失所者不加恤天下人心必益愁怨而不喜則隂陽之氣何由而和天地之變何由而息也大凡姦佞之人阿諛巧詐善移人主之意其説雖目前可喜而終無益於世其大指已逹者不過欲持身固祿未逹者不過欲希進厚已而都不以生靈禍福國家安危為念也是可謂大忍人也大姦邪也夫違天賊民背公棄理臣故曰罪在殺者也此須陛下詳觀其語熟察其意復以其人前後所為而參考之則邪正自見必不能逃聖鑒矣臣蒙陛下召作宰相以疾尚未能一對天表而不避忤犯輒敢懇懇如此之切者何哉蓋觀今災變不與常等實恐姦人以脂韋善柔之説移陛下憂勞之志安陛下克責之心而致陛下不專心於救患恤災以誤陛下至大之事也惟聖慈深賜裁察非臣之幸乃天下之幸宗廟社稷之幸二年弼又上奏曰臣於今月一日率百寮拜第二表上陛下尊號及請聽樂今日早蒙降第二批答所上尊號不允已斷來章在廷數千人無不相顧稱歎謂古之帝王雖甚盛德者無以過之陛下即位未久萬方歌頌者不可勝道今又作此一事人益恱服茍美利之德相繼不絶自中及外由士大夫以至黔庶轉相告報則何憂乎天地災變不息臣實內極欣忭賀陛下非常之美也然聽樂批答不許而未有斷章指揮臣切慮聖慈未欲遽拂羣情更容上一二表而止又慮陛下用服除常典不得已且從衆請此臣所以更竭愚管切有所陳也初二日臣與曾公亮已下共聞宣諭以久旱未雨尚欲避殿自責臣退而慚惕無地容身然臣雖萬千其數憂懼以及於死終不若陛下一人內發至誠側身修省則立可以感動上下神祇也昔周成王不知周公之聖天大雷電以風拔木偃禾王悟出郊即時天雨反風歲則大熟宋景公時熒惑守心公有三善辭熒惑亦即時退度是知人君修德消變天應如響只恐誠意有所未至耳伏自去秋以來災變特異人情恐駭于今不寧在於尋常譴告尚須損膳徹樂豈於今來反欲於降聖節日令百寮稱觴上夀而有聽樂作歡之理哉聖意以北使在館且欲循用常禮臣謂當此之際正是陛下以中國之大天子之尊推行至德以彰示四方之時也臣見仁廟康定元年日食正旦在日者之説最為不祥臣時作諫官立上章乞避殿撤樂以應天變其賀正北使只令就館宴設而參知政事宋庠力勸仁宗不納臣議臣别日面奏云昨朝廷已却遣人使北恐彼國舉行此禮則大為中國之羞也久之奉使者回果云是日彼主傳宣日蝕皇帝不聽樂只令就館宴南使仁宗思臣前奏深以為悔然事已不及矣今來聽樂之請伏望陛下亦如尊號拒而不從并聖節上夀亦乞權罷則上可以答復天譴下可以慰恱人望陛下至誠至德孰曰不能感動天地亦所以使契丹知中國天子所為與尋常相逺萬萬也弼又上奏曰臣今日與曽公亮以下議於十五日拜表陛下御正殿聽樂復膳此實臣子之至意也臣等不可不請陛下不可不從然竊觀陛下近日戒懼謙損深自刻責雖古之聖帝明王無以過此陛下答上天不可謂不至上天報應陛下不可謂不速夫避殿減膳徹樂此三大事誠合典禮然陛下濬發之至惟於誕日特罷稱觴最為至切者蓋此事諂佞易為進説上下易為取惑而陛下聰哲英悟斷然不疑促降詔書即日宣布獨此一事所以遽能感動天地當日得雨幽靈降格如在目前聖意天心合如影響人情欣恱和氣頓生矧今戎使目覩中國異事尤為陛下非常之慶也然臣之極為喜者又甚於此何哉緣纍年災變實為至多地震朔方益可驚駭時覽奏報至今未已天有常道必不虛發臣大為朝廷憂之今陛下一發至誠行所難行之事上天立有報答明白卓越昭示天下乃知天意諄諄未厭宋德更俟陛下恐懼修省常若不及逺離姦佞親近忠良恭畏上天始終不改即災異可弭而太平可致也此臣所以為極喜又甚者也伏願陛下未以今日雨澤為喜當以纍年災變為懼兢兢業業日謹一日凡百舉動常為義理之所存對接上天近若咫尺祇畏惕厲夙夜無忽如誕日甘澤之應者自此必常有焉茍異於斯漸生逸豫則天意人事實未可知蓋修德致雨其速如此萬一於德有損其災應豈有緩耶惟陛下念之不忘乃天下之幸也今上表所請或令再三而允所貴始末相應也弼又上奏曰臣於今月十四日因具劄子奏欲上表請陛下聽樂復膳還御正寢因進愚慮乞陛下未以今日感應為喜而當以纍年災變為懼益修聖德以答天意十五日晚夜漏上後伏蒙陛下特賜內降一封親灑宸翰密布淵旨捧讀之次驚喜交極其略曰置之枕席銘諸肺腑終老是戒夫狂瞽之見何足當聖意如此之厚昔漢文帝集上書囊為殿帷唐明皇寫無逸圖置於內殿憲宗以自古君臣善惡事迹畫於屏風施諸便殿臣校之今日陛下過於三主逺甚何也上書囊乃天下議論所貯無逸篇乃周公之辭屏風畫君臣事迹乃古先衆戒所聚今陛下只以臣一妄庸人所説而遽已置之枕席是所謂市骨始隗之意若果有真賢出而為朝廷謀謨天下之事則陛下待之將如何耶臣故曰陛下過三主逺甚者以此也又曰更願允不替今日之志則天災不難弭太平可立俟也此臣尤所惕懼戰汗逹旦不寐終日不食臣本何人徒荷陛下誤聽付以大柄臣前在政府氣壯志鋭尚何所補今者且病氣志凋耗陛下復何望焉然臣不敢不勉惟曰力疾少副陛下所以用之之意苐恐才業空踈尚不驅逐目前之務況營致治乎又況弭天災立太平乎惟是圖報之心死而後已豈有替於今日哉然臣向者已嘗為陛下粗陳其一二臣只能舉朝廷得失告諸陛下而止矣必欲變禍為福反災為祥須在陛下信納主張而力行修至德而盡至誠則方能感動天地招來善應書曰皇天無親惟德是輔民心無常惟惠之懷又曰民罔常懷懷于有仁鬼神無常享享于克誠陛下上事天下安民修至德推至誠此皆必然日行之事不可斯須而離也離之則弭天災致太平也逺矣又不止於逺董仲舒所謂天出災害而不知省出怪異而不知變傷敗乃至者臣恐必將有焉更望陛下憂勤厲翼夙夜不懈皇天鑒于上生民應於下則陛下可奠枕而卧垂衣而治矣犬馬之懇筆舌難盡八年弼為使相致仕應詔論彗星疏曰臣伏念向緣衰疾加之年已及格不能奔走職事遂求致政伏蒙聖慈俯從愚懇退處衡茅之下杜門自守屏絶私務朝夕待盡而已近日忽聞特宣大赦出於非常又聞别降手詔許中外臣寮直言朝政闕失洛城士庶歡呼鼓舞喧于道路聲徹幽逺推是而往則天下之人無不感動矣臣伏覽赦詔二文始以彗星東出昭示譴告陛下仰觀天變恐懼疚懷濬發德音恩霈寰海臣固知一出聖斷必無左右之助也臣再詳陛下手詔乃陛下親筆非學士所作以至比年災異如山摧地震旱蝗之類前後包括一一歸咎於己辭旨哀痛深切明白忠義之士讀之莫不感泣而又避正殿減常膳設齋醮屏侍御前代帝王禳災弭患責躬罪已之法陛下盡行之矣所以上天降鑒知陛下發於至誠故星變不旋踵而滅臣溫衣飽食坐享安佚災禍之至殊無干及一見聖詔驟發即日感動天地譴異消伏速如影響臣尚能踴躍欣蹈不知紀極彼天下之人身被災害家罹荼毒流落破散不能相保者其為歡喜感戴當何如也人心既喜和氣充塞則天意不得不早回天災不得不遄息此理固然也臣竊知去年久旱陛下曽降手詔許臣寮上封論事人方喜恱日俟朝廷施設而不知何人者上纍聖德遽成反汗於是天下大失所望臣近於三月中仰答聖問略曽引及今天變益大詔命益切陛下萬必不復蹈前車之誤況云朝政闕失朕將虛心以改此足見聖意畏天愛民其已至矣然臣竊聞外議皆云天下弊病甚衆官家多應不知人人咸願條列逹于天聽冀幸有所剗革邇已大發聖詔許其開陳忠憤者必能不避誅戮仰竭肝膽悉以上聞也臣願陛下盡取羣奏不遺踈賤萬機之暇一一親閲擇其衆説所合者斷在不惑力賜施行踐虛心以改之辭應天文尤大之變使澤及普率急若置郵則人心恱天道順天人相應立致和平國家享無疆之休者正在此時也豈復有災眚出見而上駭聖慮哉萬一姦詐互入宸聽少惑俾夫忠告為妄説恩詔為空文利澤不出於上人心復愁於下則天將曰是以虛辭答我迄無實效必回今日之喜為異日之怒災變之作當又甚於前日之彗者矣但以近事證之此乃必然之理非臣輒敢狂率也惟望陛下深賜裁察為宗廟社稷生靈計不勝天下大幸弼又上奏曰臣未致仕前雖有舊病筋力粗可驅䇿尚不能從官今致仕已數年衰老益甚退伏草野未嘗與人相接榮辱禍福都不干預而輒敢以狂瞽之説妄陳天聽者實見陛下仰觀星變恐懼修省若不自容也又聞天下生民窮困已甚無所伸訴恐成嘯聚為腹心之患也亦慮手詔或致中廢天譴未息則後來别生災害也臣所以不顧身之老病而疆作此奏庶幾有所補助而報陛下大恩之萬一也緣臣間居終日與野老相見民間弊病盈塞耳目皆是實事然所説者尚未盡一二伏乞聖慈略賜省鑒而少留聖意焉臣又輒敢煩陛下親閲羣奏者若委臣寮置局必恐不能上體聖意憂勞之切羣奏中利害有所不盡亦恐所委臣寮更存顧望尚或隱蔽或陳巧説妄有沮難則誤聖君畏天愛民不吝改悔之意也臣固無他腸所憂者如此惟望陛下特賜矜察幸甚熙寧二年右正言供諫職孫覺上奏曰臣竊見朝廷自今歲以來四方有年大河北流二邊不警上下歡焉相慶以為陛下側躬修德任賢去邪興滯補弊於萬事之先故上天報之以德而動如聖意發祥薦祉皇子挺生此固宗社無窮之休朝廷莫大之福然臣竊聞楚莊王天不見妖地不出孽則禱於山川曰天其忘余歟此能求過於天安不忘危故能成霸功臣觀朝廷之上未可謂皆賢四方幽隱未可謂無事號令施為未可謂盡當西北二陲未可謂受賜鰥寡孤獨未可謂有養陛下中天地而立盡有四海之廣治教政刑粗略如此天之報貺乃如極治之時此豈所謂飢者易為食渴者易為飲歟人情既爾天意亦猶是耶恐諂諛之人進容悅之論淺聞之士伐太平之功陛下如信而矜之則臣憂天幸不可以為常禍故多藏於隱微而發於人之所忽也伏願陛下安不忘危存不忘亡日新盛德而勤儉過於平時損宴遊嗇浮費不邇聲色不殖貨利若楚莊無災以為戒懼垂法後嗣傳之無窮則華夷蠻貊草木昆蟲莫不幸甚昭文相曽公亮上奏曰臣準降到建州崇安縣草澤楊緯進狀稱今年三月所居之西空中有黃龍蜿蜒於晦冥之間於其下獲一瑞木厥狀猶龍至七月風雨晦冥如初復有飛龍騰驤見木龍之尾翼連足在焉畫到圖一面乞宣取奉聖旨可指揮福建轉運使令指揮建州於楊緯本家取索上件所陳木龍看驗若實非偽造如所圖樣即差齎擎赴闕進呈并圖樣降下臣等竊詳南方山木偶類鳥獸狀者頗多不足以異伏覩真宗至道三年詔書節文以刑清俗阜為嘉祥以歲稔時和為上瑞至於毛羽表異草木效靈豈涼德之所堪亦前聖之不取諸州今後不得以珍禽竒獸及諸瑞物等來獻又覩仁宗慶歷四年詔曰諸珍禽竒獸及諸瑞物等不得以進獻臣等欲望踐行纍詔更不宣取知華州吕大防上奏曰臣今月某日中使馮宗道至伏奉聖旨令臣照管山摧處見存人户以次存恤施行次第聞奏訖臣纍日以來伏思聖慮深逺憂及逺民以致疲病矜寡皆有恩意雖堯舜用心宜不過此然臣之愚忠有私憂者三過計者一輒敢條列如左一山變之地當谷起嶺山髙者五十餘步臣謹按十月之詩曰燁燁震電不寧不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲水之為患至於懷襄而山之傾摧固亦其理然詩人猶以為大變哀其時人不懲其禍今不震電而驚不因水而摧不圯於其下而徙之於逺岸之髙者不止於為谷谷之深者不止於為陵方之詩人所紀尤為竒怪唐世亦有新豐赤水山阜移涌之變方武氏僭亂固不足論方今聖治日新厲精庶政災沴之作尤為可駭此臣所憂者一也一山變之地有大石自立髙四丈周一百七十餘尺臣謹按漢昭帝時泰山有大石自立髙丈五尺大四十八圍説者以為石隂類小人特起之象觀今之變則過於前史所載此臣所以私憂者二也一數年以來人情洶洶皆言有陽九之會臣謹按班固歷志所述經歲四千五百六十災歲五十七推數者取以為據臣以為天命難知孔子罕言固非衆人之所能知然閭巷之民無所忌憚竊語相傳謂之必有竊恐姦猾小人乘此天地之變人情不安之際狂圖妄作徼幸萬一此臣之所私憂者三也一三路京東人情豪悍最宜防備臣伏覩三路緣邊則有城池兵械作可恃之具至於內地州郡守具素墮將帥之臣未至選擇三路京東守臣密付方略以備不虞為名令葺治城池講葺守備其州縣政事但涉撓動人情者一切緩之以待他日庶使姦猾好亂之人無所窺其隙萬一如有緩急亦吾有以待其變矣此臣之所過計者四也右謹具如前臣伏聞畏天之威于時保之此先王之所以興也我生不有命在天此後王之所以壞也太戊有桑楮之祥其書曰伊陟贊于巫咸作咸乂四篇太戊贊于伊陟作伊陟原命髙宗有鼎雉之異其書曰惟先格王正厥事桑楮共生飛鳥之集未為大異然君臣相勸戒至於數四原天命修政事以應之豈古明王祇畏之道當如此乎伏惟聖神昭鑒洞察古今不待瞽狂之言乃極事理之要惟乞仰承天威俯酌時變為社稷至計天下幸甚七年司馬光應詔言朝政闕失狀曰右臣準西京牒準三月三十日詔敕朕涉道日淺暗于致治政失厥中以干隂陽之和乃自冬迄春旱暵為虐四海之內被災者廣間詔有司損常膳避正殿冀以塞責消變歷日滋久未蒙休應嗷嗷下民大命近止中夜以興震悸靡寧永惟其咎未知攸出意者朕之聽納不得於理歟獄訟非其情歟賦斂失其節歟忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆歟何嘉氣之久不效也應中外文武臣寮並許實封直言朝政闕失朕將親覽考求其當以輔政理三事大夫務悉心交警成朕志焉臣伏讀詔書喜極以泣昔成湯以六事自責今陛下以四事求諫聖人所為異世同符凡詔書所言皆即日之深患陛下既知之羣臣夫復何云曾子曰尊其所聞則髙明矣行其所知則光大矣陛下誠知其如是復能斷志無疑不為左右所移則安知今日之災沴不如大戊之桑穀髙宗之雊雉成王之雷風宣王之旱魃更為宗廟生民之福乎然自詔下以來臣不知中外之臣亦有以當今之急務生民之疾苦力為陛下别白言之者乎蓋必有之矣而臣未得聞也臣竊不自揆伏念父子受國厚恩備位侍從嚮在朝廷屢以狂瞽塵浼聖聰間以衰疾自求間官不敢復預國家之議四年於兹矣幸遇陛下發不世之詔問以朝政闕失斯實千載一時古人雖在畎畝猶不忘君况居位食祿者乎是以不敢畏當塗避衆怒愛微軀保妻子心知時事之可憂而塞默不言也竊觀陛下英睿之性希世少倫即位以來鋭精求治耻為繼體守文之常主髙欲慕堯舜之隆下不失漢唐之盛擢俊傑之才使之執政言無不聽計無不從所譽者超遷所毁者斥退垂衣拱手聽其所為推心置腹人莫能間雖齊桓公之任管仲蜀先主之任諸葛亮殆不及也執政者亦委心竭力以副陛下之欲耻為碌碌守法循故事之臣每以周公自任是宜百度交正四民豐樂頌聲旁洽嘉瑞沓至乃其效也然六年之間百度紛擾四民失業怨憤之聲所不忍聞災異之大古今罕比其故何哉豈非執政之臣所以輔陛下者未得其道歟所謂未得其道者在於好人同已而惡人異已是也陛下既全以威福之柄授之使之制作新法以利天下是宜與衆共之捨短取長以求盡善而獨任已意惡人攻難羣臣有與之同者則擢用不次與之異者則禍辱隨之人之情誰肯棄福而取禍去榮而就辱於是天下之士躁於富貴者翕然附之爭勸陛下益加委信順從其言嚴斷刑罰以絶異議如是者往往立取美官比年以來中外執事權者皆此屬矣其懷忠直守廉耻者皆擯斥廢棄或罹罪譴無所容立至於臺諫之官天子耳目所以規朝政之闕失糾大臣之專恣此陛下所當自擇而亦使執政擇之彼專用其所親愛之人或小有違忤即加貶逐以懲後來必得佞諛之尤者然後使為之如是則政事之愆謬羣臣之姦詐下民之疾苦逺方之寃抑陛下何從得聞見之乎又奉使詢訪利害於四方者亦其所親愛之人皆先稟其意指憑其氣勢以驅迫州縣之吏善惡繫其筆端升黜由其脣吻州縣之吏承迎奉順之不贍何暇與之講利害立同異哉其入奏則云州縣守宰咸以為便經久可行陛下但見其文書粲然可觀以謂法之至善詢謀僉同豈知其在外之所為哉或者更增為條目務求新巧互陳利病各事改張使畫一之法日殊月異久而不定吏民莫知所從蓋由襲故則無功出竒則有賞彼皆進身之私計非有益國便民之言也又令使者督責所在監司監司督責州縣上下相驅競為苛刻奉行新法稍不盡力則謂之非才不職及沮壞新法立行停替或未熟新法誤有違犯皆不理赦降去官與犯贓者罪同而重於犯私罪者州縣之吏唯奉行文書救免罪戾之不暇民事不復留心矣又潛遣邏卒聽市道之人謗議者執而刑之又出榜立賞募人告捕誹謗朝政者臣不知自古聖帝明王之政固如是耶昔堯稽于衆舍己從人舜戒羣臣豫違汝弼汝無面從退有後言此其所以為帝王稱首者也秦惡聞其過殺直諫之士禁偶語之人及其禍敗行道之人皆知之而已獨不知此所以為萬世戒者也子産相鄭鄭人遊于鄉校以論執政然明請毁之子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也何今之執政異於古之執政乎齊景公謂梁丘據曰惟據與我和夫晏子對曰據亦同也焉得為和和如羮焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之今朝廷之臣對揚啓沃亦有異於梁丘據者乎衛君言計非是而羣臣和者如出一口子思曰以吾觀衛所謂君不君臣不臣者也人主自臧則衆謀不進事是而臧之猶却衆謀況和非以長惡乎夫不察事之是非而悅人贊已暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以在民上民不與也若此不已國無類矣子思言於衛侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生今執政主新法羣下同聲賢之有以異於衛國之政乎是以士大夫憤悶鬱結視屋竊歎而口不敢言庶人飢寒憔悴怨嗟號泣而無所控告此則陛下所謂忠謀讜言鬱於上聞而阿諛壅蔽以成其私者也茍忠讜退伏阿諛滿側而望百度之正四民之樂頌聲之洽嘉瑞之臻固亦難矣方今朝之闕政其大者有六而已一曰廣散青苖錢使民負債日重而縣官實無所得二曰免上户之役斂下户之錢以養浮浪之人三曰置市易與細民爭利而實耗散四曰中國未治而侵擾四夷得少失多五曰結保甲教習凶器以疲擾農民六曰信狂狡之人妄興水利勞民費財若其他瑣瑣米鹽之事皆不足為陛下道也捨其大而言其細捨其急而言其緩外有獻替之迹內懷附會之心是姦邪之尤者臣不敢為也凡此六者之為害人無貴賤愚智莫不知之乃至陛下左右前後之臣日譽新法之善者其心亦知其不可但欲希合聖心附會執政盜貴冨耳一旦陛下之意移則彼之所言亦異矣臣今不敢復費簡扎敘利害以煩聖聽但願陛下勿詢阿諛之黨勿徇權臣之意斷志罷之必有能為陛下言其詳者矣此六者之中青苖免役錢為害尤大夫力者民之所生而有也穀帛者民可耕桑而得也至於錢者縣官之所鑄民不得私為也自未行新法之時民間之錢固已少矣富商大賈藏鏹者或有之彼農民之富者不過占田稍廣積穀稍多室屋修完耕牛不假而已未嘗有積錢巨萬於家者也其貧者藍縷不蔽形糟粳不充腹秋指夏熟夏望秋成或為人耕種資采拾以為生亦有未嘗識錢者矣是以古之用民各因其所有而取之農民之役不過出力稅不過穀帛及唐末兵興始有稅錢者故白居易譏之曰私家無錢爐平地無銅山言責民以所無也今有司為法則不然無問市井田野之民由中及外自朝至暮唯錢是求農民值豐歲賤糶其所收之穀以輸官比常歲之價或三分減二於斗斛之數或十分加二以求售於人若值凶年無穀可糶吏責其錢不已欲賣田則家家賣田欲賣屋則家家賣屋欲賣牛則家家賣牛無由可售不免伐桑棗撤屋材賣其薪或殺牛賣其肉得錢以輸官一年如此明年將何以為生乎故自行新法以來農民尤被其患農者天下之本農既失業餘民安所取食哉今貨益重物益輕年雖飢穀不甚貴而民倍困為國計者豈可不少思其故哉此皆斂錢之咎也北盡塞表東被海涯南踰江淮西及卭蜀自去歲秋冬絶少雨雪井泉溪澗往往涸竭二麥無收民已絶望孟夏過半秋種未入中户以下大抵乏食採木實草根以延朝夕若又如是數月將如何哉當此之際而州縣之吏督迫青苖助役錢不敢少緩鞭笞縲紲唯恐不逮婦子皇皇如在湯火之中號泣呼天無復生望臣恐鳥窮則啄獸窮則攫民困窮已極而無人救恤羸者不轉死溝壑壯者不聚為盜賊將何之矣若東西南北所在嘯聚連羣結黨日滋月蔓彌漫山澤蹈藉城邑州縣不能禁官軍不能討當是時方議除去新法將奚益哉緑林赤眉黃巾黑山之徒自何而有皆疲於賦斂復值飢饉窮困無聊之民耳此乃宗廟社稷之憂而廟堂之上方晏然自得以為太平之業八九已成此臣所為痛心疾首晝則忘食夜則忘寢不避死亡欲默不能者也易復之初六曰不逺復無祗悔元吉言過而能改雖悔不大也其上九曰迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征言迷而不復凶且有災於君道尤不利也昔秦穆公敗於殽作秦誓曰唯古之謀人則曰未就豫忌唯今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆蓋悔棄老成之逺慮用利口之淺謀以取覆敗而思補其過也故能終雪前耻強霸西戎漢武帝征伐四夷中國虛耗賊盜羣起及喪二師之軍乃下哀痛之詔曰乃者以縛馬書遍示丞相御史二千石諸大夫郎為文學者皆以虜自縛其馬不祥甚哉公車方士太史太卜皆以為吉今計謀卦兆皆反謬蓋始寤公卿方士之諂諛對不以誠致誤國事有悔于心也故禁苛暴止擅賦力本農天下復安自國家行新法以來天下之人心祈口禱唯冀陛下之覺悟而拯救其失以蘇疲民如望上天之膏澤日復一日以至于今及今改之猶可救也過是則民力屈竭一旦渙然離散乃始勞心安集豈不難哉竊觀陛下詔書寅畏天災深自咎責丁寧懇惻以求至言是陛下已知前日之失而欲有所改為也若徒著之空文而於新法無所變更是猶臨鼎哀魚之爛而益薪不已將何補哉陛下誠能垂日月之明奮乾剛之斷放逺阿諛勿使壅蔽自擇忠讜為臺諫官收還威福之柄悉從已出詔天下青苖錢勿復散其見在民間逋欠者計從初官本分作數年催納更不收利息其免役錢盡除放差役並依舊法罷市易務其所積貨物依元買價出賣所欠官錢亦除利催本罷拓土闢境之兵先阜安中國然後征伐四夷罷保甲教閲使力田服穡所興修水利委州縣相度凡利少害多者悉罷之如此則中外歡呼上下感悅和氣薰蒸雨必霑洽矣彼阿諛之人附會執政者皆緣新法以得富貴若陛下以為非而捨之彼如魚之失水必力爭固執而不肯移願陛下勿問之也臣竊聞陛下以旱暵之故避殿撤膳其焦勞至矣而民終不預其澤不若罷此六者立有溥博之德及於四海也又聞京師近雖獲雨而畿甸之外旱氣如故王者以四海為家無有逺近皆陛下之赤子願陛下雖徇羣臣之請御正殿復常膳猶應兢兢業業憂勞四方不遽自寬以為無復災也又諸州縣奏雨往往止欲解陛下之焦勞一寸則云三寸三寸則云一尺多不以其實不可不察也又聞青苖之法災傷及分則倚閣其間官吏不仁者至有抑遏百姓止放四分以下稅此尤可罪者也臣在冗散之地若朝廷小小得失臣固不敢預聞今坐視百姓困於新法如此將為朝廷深憂而陛下曽不知之又今年以來臣衰疾􅎊增恐萬一溘先朝露齎懷忠不盡之情長抱恨於黃泉是以冒死一為陛下言之儻陛下猶棄忽而不之信此則天也臣不敢復言矣干冒宸扆臣無任懇切惶懼之至厯代名臣奏議卷三百二
