body:
  text: 歷代名臣奏議卷一百二十明楊士竒等撰禮樂統言禮宋英宗時程頤代彭思永論濮王典禮疏曰臣伏見近日以僕王稱親事言事之臣奏章交上中外論議沸騰此蓋執政大臣違亂典禮左右之臣不能開陳理道而致陛下聖心疑惑大義未明臣待罪憲府不得不為陛下明辨其事竊以濮王之生陛下而仁宗皇帝以陛下為嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之適子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為姪此天地大義生人大倫如乾坤定位不可得而變易者也固非人意所能推移茍亂大倫人理滅矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更稱濮王為親是有二親則是非之理昭然自明不待辨論而後見也然而聖意必欲稱之者豈非陛下大孝之心義雖出繼情厚本宗以濮王是生聖躬曰伯則無以異於諸父稱王則不殊於臣列思有以尊大使絶其等倫如此而已此豈陛下之私心哉蓋大義所當典禮之正天下之公論而執政大臣不能將順陛下大孝之心不知尊崇之道乃以非禮不正之號上纍濮王致陛下於有過之地失天下之心貽亂倫之咎言事之臣又不能詳據典禮開明大義雖知稱親之非而不知為陛下推所生之至恩明尊崇之正禮使濮王與諸父夷等無有殊别此陛下之心所以難安而重違也臣以為所生之義至尊至大雖當専意于正統豈得盡絶于私恩故所繼主於大義所生存乎至情至誠一心盡父子之道大義也不忘本宗盡其恩義至情也先王制禮本緣人情既明大義以正統緒復存至情以盡人心是故在喪服恩義别其所生蓋明至重與伯叔不同也此乃人情之順義理之正行于父母之前亦無嫌間至於名稱統緒所繫若其無别斯亂大倫今濮王陛下之所生義極尊重無以復加以親為稱有損無益何哉親與父同而所以不稱父者陛下以身繼大統仁廟父也在於人倫不可有二故避父而稱親則是陛下明知稱父為決不可也既避父而稱親則是親與父異此乃姦人以邪説惑陛下言親義非一不正為父臣以為取父義則與稱父正同決然不可不取父義則其稱甚輕今宗室踈逺卑幼悉稱皇親加於所生深恐非當孝者以誠為本乃以疑似無正定之名黷於所尊體屬不恭義有大害稱之於仁廟乃有嚮背之嫌去之於濮王不損所生之重絶無小益徒亂大倫臣料陛下之意不必須要稱親止謂不加殊名無以别於臣列臣以為不然推所生之義則不臣自明盡致恭之禮則其尊可見况當揆量事體别立殊稱要在得盡尊崇不愆禮典言者皆欲以髙官大國加於濮王此甚非知禮之言也先朝之封豈陛下之敢易爵秩之命豈陛下之敢加臣以為當以濮王之子襲爵奉祀尊稱濮王為濮國太王如此則敻然殊號絶異等倫凡百禮數必皆稱情請舉一以為率借如既置嗣襲必伸祭告當曰姪嗣皇帝名敢昭告於皇伯父濮國太王自然在濮王極尊崇之道於仁皇無嫌二之失天理人心誠為允合不獨正今日之事可以為萬世之法復恐議者以太字為疑此則不然蓋繫于濮國下自於大統無嫌今親之稱大義未安言事者論列不已前者既去後者復然雖使臺臣不言百官在位亦必繼進理不可奪勢不可遏事體如此終難固持仁宗皇帝在位日久海宇億兆涵被仁恩始陛下嗣位之初功德未及天下而天下傾心愛戴者以陛下仁廟之子也今復聞以濮王為親含生之類發憤痛心蓋天下不知陛下孝事仁皇之心格于天地尊愛濮王之意非肯以不義加之但見誤致名稱所以深懷疑慮謂濮王既復稱親則仁廟不言自絶羣情訩懼異論喧囂夫王者之孝在乎得四海之歡心胡為以不正無益之稱使億兆之口指斥謗讟致濮王之靈不安于上臣料陛下仁孝豈忍如斯皆由左右之臣不能為陛下開明此理在於神道不逺人情故先聖謂事死如事生事亡如事存設如仁皇在位濮王居藩陛下既為冢嗣復以親稱濮王則仁皇豈不震怒濮王豈不惻懼是必君臣兄弟立致釁隙其視陛下當如何也神靈如在亦豈不然以此觀之陛下雖加名稱濮王安肯當受伏願陛下深思此理去稱親之文以明示天下則祖宗濮王之靈交歡於上皆當垂祐陛下享福無窮率土之心翕然慰恱天下化德人倫自正大孝之名光於萬世矣夫姦邪之人希恩固寵自為身謀害義傷孝以陷陛下今既公論如此不無徊徨百計搜求務為巧飾欺罔聖聽枝梧言者徼冀得已尚圖自安正言未省而巧辨已至使陛下之心無由而悟伏乞將臣此章省覽數遍裁自宸衷無使姦人與議其措心用意排拒人言隱迹藏形隂贊陛下者皆姦人也幸陛下察而辨之勿用其説則自然聖心開悟至理明白天下不勝大願時議追崇濮安懿王侍御史趙瞻爭曰仁宗既下明詔于陛下議者顧惑禮律所生所養之名妄相訾難彼明知禮無兩父二斬之義敢裂一字之詞以亂厥真且文有去婦出母者去已非婦出不為母辭窮直書豈足援以斷大議哉臣請與之庭辨以定邪正已而皇太后手書尊王為皇瞻嘆曰向者太后切責大臣議乃得罷今邪臣與中官交締歸過至尊而自為之地吾與首議之臣不並生矣因復力陳會假太常少卿接契丹賀正使入對英宗問前事對曰陛下為仁宗子而濮王又稱皇考則是二父二父非禮英宗曰御史常見朕欲皇考濮王乎瞻曰此乃大臣之議陛下未嘗自言英宗曰是中書過耳朕自數歲時先帝養為子豈敢稱濮考瞻曰臣請退諭中書作詔以曉天下時連日晦冥英宗指天示瞻曰天道如此安敢妄為褒尊朕意已決無庸宣告瞻曰陛下祗畏天戒不以私妨公甚盛德也及使還聞吕誨等諌濮議皆罷去乞與同貶不報趣入對英宗曰卿欲就龍逄比干之名孰若效伊尹傅説哉瞻皇懼言臣不敢奉詔使朝廷有同罪異罰之譏神宗元豐元年知秦州吕大防請定婚嫁喪祭之禮疏曰臣伏見朝廷厲新庶政舉以三代先王為法而獨于典禮制度似未及漢唐之盛昨聞特下明詔置局考定禮文得失有以見聖慮髙明急所先務臣之愚素未欲聞於朝者庶得申于今日矣臣竊觀今之公卿大夫下逮士民其婚喪葬祭皆無法度惟聽其為而莫之禁夫婚嫁重禮也而一出於委巷鄙俚之習喪祭大事也而率取于浮圖老子之法至于郡縣公私禮之大節古所謹重者一切茍簡略無義理臣謹按開寶通禮乃太祖皇帝所立本朝一代之典臣歷觀四方惟於淄州常見之以備考試舉人而已禮之不行無甚於此周禮八則禮俗以馭其民蓋謂庶民則可參之以俗而士以上當専用禮也臣愚欲乞詔諭禮官先擇開寶通禮論定而明著之以示天下違者有禁斷以必行雖未能下逮黎庶而小人所視足以成化況臺省官視事州縣祭社稷釋奠之類已略用禮矣推此而為之亦非絶俗難行之事又今之所行者於禮之中才舉數事以漸善俗義在于此伏惟陛下留神財省立萬世法天下幸甚神宗時集英殿修撰李復上疏曰臣聞聖王制世莫重于禮事不由於禮無巨細皆不可行三代之禮至周而備今考諸載籍所傳者十無二三前世江都開元皆常纂綴舊文而行之當時折衷執於古者泥而不通順其時者陋而無法學禮者有所不取後世無可稽焉傳曰治定制禮國朝承平一百六十年髙出唐虞豈三代可擬一代禮典今猶未講至使好禮之士有家自為禮者荀況云禮莫大於聖王是惟聖人乃能制禮惟王者乃能行禮記曰非天子不議禮不制度不考文臣願詔有司上自郊廟社稷下至三祀一祀與夫冠婚喪葬賓軍辨其等威裁其文物不僭不逼據于古而不泥宜於今而不陋著為一代之典其士庶所當行則頒之郡縣使通知焉事有制度燦然可觀四夷百蠻承風取則為治世甚盛之舉豈勝幸甚金君卿上奏曰周制諸侯雖有功皆為侯伯七命而已其爵無至公者故王之子弟及異姓之有大功德而封爵不過侯但得進地齊魯之國皆以侯爵而受上公之地若列土侯伯有功德者則加一命為牧惟二王後與三公加命為上公者得服衮冕故禮記王制云三公一命按正義云三公八命身著鷩冕若加一命則為上公與王者之後同而著衮冕按衮冕十二章日月星辰山龍華蟲六者畫於衣宗彛虎蜼也藻火粉米黼黻六者皆繡於裳鄭康成注周禮司服云王者相變至周以日月星辰畫於旌旗所謂三辰旗旗昭其明也冕服九章康成既以周之衮服無日月星三章復又注郊特牲王被衮以象天云謂日月星辰之章此魯禮也設魯侯祀天之衮服有三辰之章周之天子以衮冕享先王安得只有九章豈天子之衮九章而魯侯之衮十二章也然郊特牲直言王被衮既稱王豈得謂之魯禮且康成之説别無經據但以郊特牲云旗十有二旒龍章日月以象天也左氏傳曰三辰旗旗昭其明也由是而言至周以日月星畫於旌旗而天子衮服遂無此三章君卿今按諸經傳衮冕之制皆不云至周去日月星辰之章即是周之天子衮冕當備十二章而太常之旗亦畫日月星辰於其上豈可謂已畫於旌旗而服章遂廢也若十二章不獨施之于衮其他服器參用之如三辰之旗亦畫龍章若康成之説即是衮之龍章亦可廢也何謂獨去三辰也王之扆與巾皆以黼即是衮之黼章可去也若古虎蜼施於宗彛即衮之服何為復施虎蜼也但天子衮服備此十二章其旌旗亦畫三辰之章耳由是知天子備章為然二王之後洎三公加一命者服衮冕九章餘公侯並鷩冕七章此周家之制也自秦滅禮樂服初用玄以從冕旒自是周制亡矣漢興禮服未備至世祖踐修三雍正兆七郊孝明帝遂就大業初服旒冕赤舄鉤屨以祀天地明堂皆冠旒冕衣裳玄上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章卿已下用華蟲七章以承大祭永平二年初詔有司采周官禮記尚書臯陶篇乘輿服從歐陽氏説公卿已下從大小夏侯氏説冕皆廣七寸長尺二寸前圓後方朱緑裏玄上前垂四寸後垂三寸係白玉珠為十二旒三公諸侯七旒青玉為珠卿大夫五旒黑玉為珠皆有前無後各以其綬彩色為組纓旁垂黈纊郊天地宗祀明堂則冠之近得周制魏晉而降其制不經其國公之爵置自隋冕用青珠九旒侯伯則鷩冕唐制皇太子衮冕白珠九旒諸臣衮冕青珠九旒鷩冕七旒第二品之服五代而下天子衮冕十二章諸臣之服有九旒冕九章八旒冕七章七旒冕五章六旒冕三章本朝因舊文參定新制乘輿備章為得其禮諸臣之服九章親王中書門下三公奉祀則服之七旒冕五章九卿奉祀則服之五旒冕同七旒冕之制而衣裳無章四品已下為獻官則服之其次平冕無旒太祝奉禮服之自九旒冕而下皆奉祀之服若侍祠太廟會諸臣一品二品服五梁冠其次三梁兩梁冠各以其品服之以今之制王爵同三師三公正一品則當服九旒冕以奉朝會祥符中贈文宣王初諡議欲以為帝而以周之王無帝號由是只因唐制封王而第加美諡焉又有唐開元封諡之初已正南面而坐被王者衮冕之服則是王之封諡與漢而下王爵殊矣今都郡縣文宣王之廟像或用九旒冕九章如周之上公漢之諸侯王之服或服十二旒王者之冕采章錯亂不次今所詳定請以文宣王冕服備十二章黜康成之義用本朝制度如漢唐故事其十哲之服緣祥符追贈之初議以為公則是如公侯五等之公時宰臣欲顔子於十哲中稍優其秩因請以兖公顔子為國公費侯子騫為郡公殊不知禮秩降于公矣且國公之爵位在三師三公宫太嗣王郡王之下為從一品郡公位猶在宫太之列且異于周制上公之尊今兖國公之冕設用九卿之服七旒冕五章則又降於周禮公侯之服如用周禮公侯之服鷩冕緣今配享先儒之列若王肅杜預皆贈三公當用今三公衮冕之服豈可以兖國公之服反在王杜之下故今請以兖國公用衮冕九旒九章視本朝三公之服如周禮上公之制子騫已下九人瑕丘侯曾子等皆用鷩冕七旒七章視周禮公侯之服殿中侍御史滿中行上奏曰臣伏見文德正衙之制尚存常朝之虛名襲橫行之謬例有司失於申請未能釐正兩省臺官文武百官赴文德殿東西相向對立宰臣一貟押班聞傳不坐則再拜而退謂之常朝遇休假并三日以上應內殿起居官畢集謂之橫行自宰臣親王以下應見謝辭者皆先赴文德殿謂之過正衙然在京釐務之官例以别敕免參宰臣押班近年已罷而武班諸衛本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱內殿宰臣已下既已日參而文德常朝仍復不廢舛謬倒置莫此為甚至于橫行參假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也有司失於申請未能釐正欲望特賜指揮先次罷去哲宗元祐元年右司諫朱光庭上奏曰臣聞孔子之言曰立於禮書曰天秩有禮自我五禮有庸哉則是禮者與天地並而不可斯須廢也自三代已後其禮遂亡漢唐規矩不足道也今聖政日新講修治具臣愚以謂為治之道無先于禮蓋人情之檢柙王政之綱維莫不由此夫禮廢而不講久矣今天下之人自丱角已衣成人之服則是何嘗有冠禮也鄙俗雜亂不識親迎人倫之重則是何嘗有婚禮也火焚水溺隂陽拘忌歲月無限死者不葬葬者無法五服之制不明重輕則是何嘗有喪禮也春秋不知當祭之時祭日不知早晚之節器皿今古之或異牲牢生熟之不同則是何嘗有祭禮也冠昏喪祭禮之大者莫知所當行之法朝廷之上未嘗謙修但沿襲故事而已曾未盡聖人之藴公卿士大夫之間亦未嘗講修但各守家法而已何以為天下之法車輿服食器用玩好法禁不立僭侈尤甚富室擬於王公皂𨽻等於卿士風俗如此一出於無禮而然也臣今欲乞陛下詔執政大臣各舉明禮官參議五禮上自朝廷所行之制度下至民庶所守之規矩纎悉講明究極先聖人之藴以古參今酌人情之所安天下可通行以為法者著為一代之大典垂諸象魏頒諸四海以正人倫以變禮俗此則三王之舉也臣願陛下勉之而巳記曰王者治定制禮恭惟祖宗以來纍聖相承仁功德澤洋溢天下固可以謂之治定矣伏自陛下盛德臨御興滯補弊朝廷日益清明此明王當制禮之時也願陛下不以臣言為微特賜留神以幸天下貼黃朝廷盛化無逺不被然而五禮之制多出沿襲未盡講修人不知其所止其間冠婚喪祭之禮尤當先講修以示天下俾得遵行以為規矩然朝廷之上與公卿士大夫之家皆未有成法伏望聖慈令明禮之臣與禮官委曲講修以厚風俗太常博士顔復上奏曰臣資材俚陋幸因儒術備位禮官充職以來推道揆分守之要庶舉萬一上報器使因思竭中瘁外參古稽今以贊朝廷日興之儀不若一明禮實庶補風教以趨大治則臣分職之心無負愧者臣謂治世之禮發乎威儀撙節之間至民保皇極家無異尚化行於上俗成於下不可謂名見而實不虛也不然好之雖篤崇之雖華皆以循名失實之譏無少益於治體當王者盛時以人情莫不本良心而後安故行禮未嘗外民大而郊廟禋祼之節小而閭里酺祟鬼神之儀邇而朝覲聘問之度逺而庠序射享飲食之事盛而搜苖獮狩類禡之制卑而農畝頒禽獻豜之則崇而加元服降王姬登賢養老之容下而比族冠婚正齒位讀邦法書孝姻之序內而賑災賻囏之惠踈而私室送終之式雖隆殺不同致其恭明其敘發其和復其本汲汲以為嵗月日時當行之事而不敢斯須曠怠其志意一也上躬帥之下説隨之如指臂相縈如源流相通渾然無少間隙是以德風大成和氣充牣災害不生刑罰不試知天下有禮之實矣三代而後沿襲茍簡禮樂之存虛名而已間有不世之君致時之臣恢明考類煩密光輝止於郊廟朝廷之上崇植風猷張大聲采不及都門之外歸于畏之大嚴勉勉不敢置爾皆不知其義以安之輔世道民之效漠不可期其實之喪久矣國家太平百年規模宏逺下視漢唐太常之禮成書定簡何止千篇歲舉郊廟朝會侍臣有司考復論難貫附六經取會沿革上下數千年其制富贍精緻凡事不匱彬彬然可師而士民之禮踵歷代之咎未降彛制下無矜式使有志之士動虛名失實之歎此甚可為治朝惜也雖然民之至情雖不教不勉自見蓋天畀之源本善不可蔽禦不教則失中失中則流祭享之禮不教則流於祝禬佛齋婚姻之禮不教則流於委巷俚習賓客之禮不教則流於遊衍嬉樂師田之禮不教則流于夷風暴俗喪紀之禮不教則流於道釋數術國之正禮格而不下民之良心奪於異習而加愚欲風淳而治隆如北行而之粵緣木而求魚勢無可得臣之愚誠欲乞皇帝陛下太皇太后陛下特發德音下詔禮官會萃經史古今儀式至諸家祭法歲薦時享家範書儀之類可取者髙而不難近而不迫成士民五禮不必冕辨以為冠韠韍以為衣爼豆以為器儷皮以為幣馭車而行坐席而食就其便安以班郡縣緩驅以令使樂而不駭勸曉以文使徐而知義誘掖本心則善之思思則辨辨則安安則起居動息造次顛沛莫不在忠順孝弟仁義之間人皆有士君子之器至化成矣王者牧民設刑以輔禮今律民之書一字有易則置郵而下郡縣士民常禮以至無書本末重輕不稱從可明矣惟陛下留神則天下幸甚二年禮部侍郎陸佃上宣仁皇后論文德殿受册疏曰臣伏惟太皇太后陛下自同聽斷以來保護聖躬裁決萬務敬天愛人動懷謙畏至公至明度越前古尚慮臣下未能將明聖意一切檢用章獻明肅皇后故事弗加討論萬一典禮闕失或纍盛德故臣雖愚陋輒慕古人事上篤於愛敬之意竊見天聖中翰林學士李維等常上章獻明肅皇后御崇政殿受册儀注復改御文德緣文德外朝在紫宸垂拱之外故至今公議猶以維等取定儀注得禮之中惜其不果施行方當太皇太后陛下至誠虛心每事求當乘此嘉會或蒙收採特詔有司改御崇政殿受册明內外之辨自我神母垂訓萬世不勝大幸況於盛德至仁有光無損臣職在禮官茍有所懷義當罄竭仰瀆聖慈臣無任惶懼隕越之至中書舍人曾肇上宣仁皇后論文德殿受册疏曰臣伏聞已降敕命將來太皇太后受册依章獻明肅皇后故事臣伏考故事皇帝於大安殿發册今大慶殿皇太后於文德殿受册今來詔旨遵用舊典臣子之議復何所言然臣伏見太皇太后自聽政以來止於延和殿垂簾視事受契丹人使朝見亦止御崇政殿未嘗出踐外朝豈非以聽決萬機出於權宜垂簾視事蓋非得已而外朝者天子之正寧太皇太后崇執謙德不欲臨御以為天下後世法耶推此言之受册外朝殆非太皇太后之意特以故事當然耳竊詳故事天聖二年兩制定皇太后受册於崇政殿仁宗出自聖意特詔有司改文德殿此蓋人主一時之制非臣下之所得議也今皇帝述仁宗故事以極崇奉之禮孝敬之誠可謂至矣臣竊謂太皇太后儻於此時特下明詔發揚皇帝孝敬之誠而固執謙德屈從天聖二年兩制之議止於崇政殿受册則皇帝之孝愈顯太皇太后之德愈尊天地神靈孰不歡喜華夏蠻貊孰不推仰兩誼俱得顧不美歟伏惟太皇太后聰明睿聖慈仁恭儉功德之被天下堯舜禹湯不能逺過非獨秦漢以來母后之所不及則雖日御外朝亦不為過而臣乃於一受册之際猶以為言者誠見太皇太后執心謙沖至公至正動容周旋必務中禮非如漢唐母后私於其身必不以受册外朝為己之欲臣愚故願因此增廣盛德使天下曉然知聖心所在垂之萬世以為典則而後之言禮者必曰母后不踐外朝自太皇太后始豈非希世之髙行哉臣伏見昨者太皇太后志在愛人毅然獨斷令即英宗神御殿後建祖宗神御殿詔旨深切聞者感動至於垂涕此自古明智之君未必能為而太皇太后行之無毫髮吝則知今日退就便殿受册必非所難此臣所以敢言而不疑也夫一日出踐外朝事至微也然臣竊有私憂過計者不得不極言之章獻太后非獨受册文德而已元日御會慶殿受朝賀南郊禮成御會慶殿受賀長寧節御會慶殿百官上夀其後又入太廟行恭謝之禮此皆天聖明道故事竊恐有司以次行之不足以仰稱太皇太后為宗廟社稷權宜聽政之心克己復禮謙恭抑損之盛德臣之私憂過計實在於此也太皇太后博覽古今詩書以來母后得失蓋無不知則於此舉必能自擇豈待臣言而後思然臣待罪侍從以論思為職茍有所見不敢默默肇又論坤成節百官上夀奏疏曰臣伏見太皇太后陛下近深自抑損特發德音不欲臨御外朝退就崇政殿受册詔書一下中外嗟嘆忠義之士至於感泣況臣待罪侍從常獻瞽言不謂偶合聖心特加收採非惟陛下克己復禮之聖又以知陛下虛心納諫之明士生此時不能竭忠盡智裨補萬一茍有所見懷而不言則竊位欺天何所逃責此臣之所以不避冒瀆之誅傾寫肝膽置於上前儻一言有補萬死無悔臣竊聞近日有司建議坤成節於崇政殿上夀其升殿賜酒并文武百官拜表班次並比附天聖三年故事施行臣伏考天聖三年故事宰臣樞密三司使學士知制誥待制節度使留後觀察使契丹使班于殿廷上夀如禮賜酒三行百官詣內東門拜表稱賀至天聖九年始御會慶殿百官上夀如乾元節之儀蓋自天聖三年至八年以前凡六年盡如三年之制足以見當時君臣守禮畏義之心可謂至矣今者三省樞密院乃不全用天聖三年故事及今有司之議特降朝旨令文武百官諸軍將校隨班行上夀禮此臣之所未諭也太皇太后昨降詔書以謂不敢自同章獻太后出臨外朝就崇政殿受册竊詳聖意務從抑損今乃令百官將校皆赴崇政殿廷立班上夀則是天聖八年以前之所未有禮更增於舊在陛下謙恭抑損之志前後本末似不相稱臣愚以謂此殆非太皇太后之意特執政大臣失於不思爾伏惟太皇太后陛下躬前世母后不可及之盛德有休息百姓覆育萬物之大功受四海九州歡心愛戴之備養其為尊榮亦已極矣豈待百官將校旅列於庭然後為貴哉臣愚故願特詔有司一用天聖三年長寧節故事比附施行使天下之人知陛下謙恭抑損之志前後如一本末相稱書之史册垂法萬世豈不美哉書曰不矜細行終纍大德為山九仞功虧一簣惟陛下留意無忽貼黃臣竊見崇政殿廷不至寬廣遇雨又須經繇延和殿前簷赴坐竊聞議者謂百官不赴則夏國使人亦不得與上夀賜酒臣愚以謂天聖中非無夏國使人自可遵用故事若以其外夷逺來奉貢特許入與上夀賜酒出自恩旨宜亦可為更自聖意裁酌五年給事中范祖禹乞看詳陳祥道禮書劄子曰臣竊以國家之用典禮為急典禮之學制度尤難太祖皇帝時命國子司業兼太常博士聶崇義考正禮圖采唐張鑑等舊圖凡六本撰成三禮圖二十卷奏之太祖下詔嘉奬令太子詹事尹拙等集儒學三五人更同參議又下工部尚書竇儀裁定其三禮圖畫於國子監講堂臣伏見太常博士陳祥道専意禮樂二十餘年近世儒者未見其比著禮書一百五十卷詳究先儒義説比之聶崇義圖尤為精審該洽昨臣僚上言乞朝廷給紙扎差書吏畫工付祥道録進今聞已奏御降付三省臣愚欲乞送學士院及兩制或經筵看詳如可施行即乞付太常寺與聶崇義圖相參行用必有補朝廷制作徽宗大觀中侍讀兼議禮詳議官慕容彥逢理會三禮圖奏曰臣竊惟功成作樂治定制禮方今六府既修三事既和燕及皇天休貺並至功可謂成矣治可謂定矣講明禮樂以幸天下其在今日伏覩見行三禮圖係國初聶崇義撰集其間車服器用之制與元豐頒行經義時有不同自國子監建三禮堂暨州縣學校率繪其圖以示學者乃至有司所掌名物猶雜用其制未稱陛下統一道德之意臣愚欲望聖慈特詔儒臣考據經義改定舊圖俾有遵承及付國子監頒行徽宗時通判李新乞州郡講習五禮新儀奏曰臣恭覽五禮新儀制作之妙追蹤三代陛下聖學髙逺以作者之聖詔訓禮局講求裁定典章儀物粲然有文自我作古凡伯夷之所典周孔之所制經而三百曲而三千未若今日煥明詳備者也三代而下寥寥千載禮之廢壞綿蕝無據時君未遑講明其失或求諸野腐儒曲學相與辨議幾若聚訟豈特百年而興是有待於至治之世而後可興者也禮書既成頒及天下戴白垂髫喜見太平之盛典臣常謂吉凶二禮士民所嘗用今州郡將新儀指摘出榜書寫墻壁務為推行之迹而茍簡滅裂增損脫漏誦讀不行未越旬時字畫漫滅不可復考民庶所行既未通知至與新儀違戾或僭或陋實非民庶之過臣欲乞諸州並許公庫鏤板儀曹旬以某禮行下屬縣置籍抄録季行檢示粉壁及察民間所行之禮過與不及州委教授縣則有出身官旦望就學講習新儀監司歲終保明具奏察其勤弛而加勸懲之如此則上下皆知禮風俗日以厚矣太常卿葛勝仲上奏曰臣等竊考左丘明傳春秋以禮為釋經之例某人某事曰禮也某人某事曰非禮也若此類甚衆而其他記禮特詳韓宣子見周禮在魯則知周之所以王齊仲孫湫見魯秉周禮則知魯未可動臣等於是知為天下國家者不可一日廢禮如此莊公有非禮之舉則其人諫以必書周王有非禮之宴則戒其臣以勿籍於是又知先王之時凡禮文之事無不載之簡册也周王享士會設殽蒸焉士會不知其義歸而講求三代之典禮以修晉法昭公如椘孟僖子為介至鄭不能相儀及椘不能答郊勞歸乃講學茍能禮者必從之於是又知古之有官君子恥不知禮蓋如此也魯昭公如晉自郊勞至贈賄無失禮女叔齊曰是儀也不可謂之禮禮所以守其國行其政令無失其民者也趙簡子見太叔問揖遜周旋之禮焉子太叔曰是儀也非禮也夫禮上下之紀天地之經緯民之所以生也二子可謂知禮樂之本末矣然制度文為雖禮之末捨此則安上治民之意無以寓則所謂禮之文者豈可不載述以詔後哉區區春秋之時猶謹禮如此况在承平盛大之世乎本朝太祖皇帝始命大臣約唐之舊為開寶通禮天聖中王皥等又為禮閣新編其後賈昌朝等復加編定名曰太常新禮嘉祐中歐陽修等為太常因革禮百篇自建隆迄嘉祐搜裒紀述罔有遺逸而自治平之後蓋缺焉恭惟皇帝陛下天縱睿智照臨萬邦既已體神出道而制為一世之禮掩迹三代矣其在有司亦欲著明而不沒爰命禮官編次因革之實自治平至政和四年續為一書十四部展條目皆視歐陽修之舊臣恭承神旨相與撰次上進臣等愚昧懵學大懼不足仰稱明制姑不敢廢職守而已干冒天威無任待罪隕越屏營之至勝仲又上元圭繅籍絢組議曰承政和二年十一月十五日敕中書省尚書省送到劄子禮部昨擬定元圭繅籍絢組并圖本係按周禮儀禮經旨兼討論諸儒訓説參酌議定實相為表裏竊慮亦合頒示中外使明知聖朝制作皆傳經考古欲附於元圭議册之末雕印頒給仍連元劄子十二月十四日奉聖旨依按周官典瑞云王執鎮圭繅籍五采五就則圭必有繅籍又按玉人云天子圭中必鄭氏謂以組約其中央則圭必有絢組繅籍之制鄭氏謂有五采文所以薦玉木為中幹用韋衣而畫之五就五匝也又注儀禮亦云雜采為繅以韋衣木板又賈公彥疏云木板廣袤亦與圭同然後用韋衣之乃畫於韋上一采為一匝五采為五匝一匝為一就就成也又崔靈恩三禮義宗云繅籍者以韋衣木板為之大小皆如其玉又周官行人桓圭九寸繅籍亦九寸信圭七寸繅籍亦七寸則繅籍如其玉明矣又聶崇義禮圖云既以采色畫韋衣於板上前後垂之又有五采組繩為繫上以玄為天下以絳為地絢組之制按儀禮聘禮諸侯朝天子圭與繅皆九寸其間諸侯朱緑纁八寸皆玄纁繫長尺絢組賈公彥云彼組不問尊卑皆用五采長尺以為繫所以束玉使不落鄭氏注云采成文曰絢上以玄下以絳為地謂地者當是織絍之經上以玄縷下以絳縷為之而以五采相雜為緯成文聶崇義不曉其説徒見其有為地二字謬以為象地遂增玄為天之説誤矣况經傳未嘗以絳色象地宜以鄭氏為正且玄圭繅籍絢組制度莫傳然希世至寶所以崇飾而襲藏者雖極天下之美麗而為之茍不傳經稽古則不足以為稱今欲約周禮圭繅籍絢組之制下有司創造舊三禮圖畫本繅籍采色之次並無意義兼用朱丹相間乃成六色其絢組五色段次多寡不同即不見上玄下絳之制今定繅籍合以木板為中幹用韋衣而畫之五采各一匝黃居中君象也黑為外衆色入焉有為復於無為之義也青為始赤次之白又次之四時之序也其絢組各長尺上以玄為經下以絳為經用五采為緯錯織成文玄圭絢組亦合上以玄為經下以絳為經用五采為緯錯織成文按古絢組雖合長尺緣在繅籍則左右足用今玄圭中必恐合隨宜製造髙宗時趙元鎮論駐蹕戎服疏曰臣伏見陛下比自渡江及幸吳越每經郡邑必御戎服親部伍誠欲震耀神武激勵將士示以同甘苦之意然而人君之舉動不可以簡約自卑朝廷之規模不可以權宜自削恭聞朝夕駐蹕行宫臣愚欲乞詔有司益禁旅乘輿服御正人君之威儀羽衛導從備朝廷之典禮應如平日巡幸故事稍加整肅雖不能庶幾萬一亦足以張國威消姦宄慰逺民望幸觀瞻之願孝宗隆興間起居郎胡銓上講筵禮序曰臣聞君以禮為重禮以分為重分以名為重名以器為重古之有天下者不患分不定不患名不正不患器不守而常患不能隆禮而已矣茍能隆禮則分也名也器也皆得其當而天下可運諸掌茍不隆禮則分也名也器也皆失其當而天下亂矣何謂禮曰上下之紀天地之經緯也而民實則之則天之明因地之性生其六氣用其五行氣為五味發為五色章為五聲淫則昏亂民失其性是故為禮以奉之為六畜五牲三犧以奉五味為九文六采五章以奉五色為九歌八風七音六律以奉五聲為君臣上下以則地義為夫婦外內以經二物為父子兄弟姑姊甥舅婚姻以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震耀殺戮為溫慈惠和以效天之生殖長育是故審則宜類以制六志審行信令􅍔福賞罰以制死生乃能協於天地之經緯是以長久故趙簡子曰甚哉禮之大也晏子曰禮之可以為國也久矣與天地並是不亦君以禮為重呼何謂分君臣上下君子小人中國夷狄是也南蒯枚筮遇坤之比曰黃裳元吉子服惠伯謂上美為元下美則裳言上下之不可亂趙簡子問史墨季氏出君之罪史墨對以在易卦雷乘乾曰大壯言乾為天子震為諸侯而在乾上君臣易位大亂之道也司馬光説文王序易以乾坤為首言君臣之位猶天地之不可易程頥易傳説坤六五臣居君位之象此皆嚴君臣上下之分也在易一陽之長雖甚微而聖人善之故一君子用而天下皆相賀一隂之生雖甚微而聖人畏之故一小人用而天下皆相吊此皆嚴君子小人之分也易以自我致戎為戒而以三年克鬼方為憊言夷狄當外而不內賈誼以中國為首夷狄為足而以首反居下足顧居上為亂亡之基此皆嚴中國夷狄之分也是不亦禮以分為重乎何謂名爵號是也名近虛於教為重利近實於教為輕則名所以弼教也名位不愆為民所信則名所以出信也名以弼教則教非名不立名以出信則信非名不行是不亦分以名為重乎何謂器車服是也器以藏禮則器者禮之所以寓小人而乘君子之器盜斯奪之則器者君子之所乘昔仲叔于奚請繁纓以朝仲尼聞之曰惜也不如多與之邑惟器與名不可以假人趙簡子問於史墨曰季氏出其君而民服焉而莫之或罪也史墨曰是以為君謹器與名不可以假人是不亦名以器為重乎謹按禮經篇目凡四十有九大扺不出此三者而已如天子七廟諸侯五天子祭天地諸侯祭社稷天子祭天下名山大川諸侯祭山川之在其地者天子犆礿祫禘祫嘗祫蒸諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿天子社稷皆太牢諸侯少牢天子殺則下大綏諸侯殺則下小綏天子之田象日月諸侯法雷天子之三公之田視公侯天子之卿大夫之田視伯子男之類此君臣上下之分也如君子中庸小人反中庸之類此君子小人之分也如千里之內曰甸千里之外曰流此中國夷狄之分也如次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫之類此名之别也如大路繁纓一就次路繁纓七就天子龍衮諸侯黼大夫黻士玄衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三之類此器之别也分也名也器也禮之大體也臣故曰上下之紀天地之經緯也仰惟陛下欽明文思濬哲文明同乎堯舜固非謏聞淺學所能窺測至於修五禮以覲諸侯典三禮以咨四嶽亦駸駸乎唐虞之盛矣然猶鋭意稽古禮文之事特降一札俾愚臣専講戴記一經豈徒欲玩夫三百三千之繁文呻其占畢而已哉於曲禮見愛而知其惡憎而知其善之義於檀弓見事君有犯而無隱之義於王制見天子齋戒受諫之義月令見百工咸理無或作為淫巧以蕩上心之義於文王世子見三公不必備唯其人之義於禮運見禹湯文武成王周公謹禮之義於禮器見忠信可以學禮之義於郊特牲見天子貴誠之義於內則見道合則服從不合則去之義於玉藻見天子搢珽方正於天下之義於明堂位見夷狄外而不內之義於大傳見舉賢使能之義於少儀見人臣有諫無訕之義於學記見三王四代惟其師之義於樂記見為君謹其好惡之義於經解見發號出令而民説之義於哀公問見君為正則百姓從政之義於仲尼燕居見力禮樂而天下太平之義於孔子間居見王者奉三無私以勞天下之義於坊記見禮以坊德之義於中庸見至誠配天之義於表記見大舜中心安仁之義於緇衣見惡惡好賢之義於深衣見規矩準繩之義於投壺見揖遜之義於儒行見崇儒重道之義於大學見正心誠意之義於鄉飲見王道易易之義於射義見擇士與祭之義於燕禮見君臣上下之義於聘義見君臣相與之義於冠婚喪祭之篇見養生喪死追逺之義然則聖學髙妙誠非管窺蠡測所能髣佛其萬一夫豈涓埃能有益於崇深乎而陛下親屈至尊孳孳聽納移日不饜真得堯舜三王之用心臣昨蒙賜對便殿臣時論及武夫悍將宜令知禮以革暴慢之習側聞玉音有及於唯禮可以已之之語臣退而書之竊謂晏嬰雖以此言告齊景而齊景終不能行陛下不惟聞而樂之又能舉以為訓一言可以興邦陛下有焉臣愚願力行其説辨其分謹其名守其器勿輕以假人則社稷之福也孔子曰名器政之大節也若以假人與人政也政亡則國家從之弗可止也已仰瀆宸聰臣無任隕越之至銓又論為國以禮疏曰臣聞為國以禮春秋魯慶父之亂齊小白問仲孫魯可取乎仲孫對曰不可魯秉周禮周禮所以本也國將亡本必先顛而後枝葉從之魯不棄周禮未可動也大哉禮乎道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊此所以為國家之根本故曰為國以禮大哉言乎臣處嶺海二十餘年無所用心惟知學禮至於險阻艱難之際每得其力以此知不學禮無以立誠非虛語陛下起臣於草茅顧野人區區愛君之誠何以為獻惟此而已然禮經三百威儀三千未易僂數惟先正司馬光冠婚喪祭之儀簡而易行臣愚欲望陛下特詔禮官討論擇其要而易行者布之民間使耆儒宿學轉相傳授而武夫悍將亦令通行庶幾尊君親上奉先思孝人皆曉然知上意之所在則天下不足治矣難臣者則以謂方時多虞武夫悍將惟長槍大劔為急何暇議禮臣請有以折之昔晉文欲用其民子犯以民未知禮未生其恭為言於是大搜以示之禮及城濮之戰晉侯登有莘之墟以觀師則曰少長有禮其可用也重耳以有禮而致城濮之勝子玉以無禮而致城濮之敗繇此觀之禮尤武夫之所急冒瀆天聰臣無任隕越之至淳熙間袁説友上奏曰臣竊見今來都下一切衣冠服製習外國俗官民士庶浸相效習恬不知恥事屬甚微而人心所嚮風化所本豈可不治烏有堂堂天朝方懷讎未報恨不寢皮食肉而乃使效習敵讐之俗以亂吾中國之耳目哉臣朝夕所憤悶不平者茲不暇縷姑以最甚者言之紫袍紫衫必欲為紅赤紫色謂之順聖紫靴鞋常履必欲前尖後髙用皂革謂之不到頭巾製則辮髮低髻為短統塌頂巾棹篦則雖武夫力士皆插巾側如此等類不一而足豈特習以為儀略無愧色兼又身披異服而敢執事禁庭者識者見之不勝羞恨竊恐此而不禁將耳目習熟人忘憤心其於大計實有利害臣愚欲望陛下亟發宸斷盡行禁戢宣諭臨安府守臣日下多方約束嚴行止絶前項異服等如有違戾許人告首支給厚賞犯人取旨編配施行其染并手作人亦編管他郡及其他鼓吹歌舞習彼之俗者亦根究名色禁止庶幾中國益尊人心知所敬慕或曰是亡益也今內治外攘之計已具大勳日月可兾矣服製變易誠亦何加損哉臣則以為不然匹夫報仇聞其名則心怒而弗聽見其人則唾罵而不顧况肯服其服而同其習耶王導之惡庾亮且欲以扇蔽西風之塵蓋其惡之惟恐其汚己也今大讎未復大恥未刷小大臣子惟當憤國蒙辱不顧九死思以蹀血北庭犁其巢穴以副陛下二十年卧薪嘗膽之志顧乃衣冠服製盡習其俗曾不能如匹夫之報復而下愧區區之王導哉臣不取也臣願陛下凡中國怒氣所寓雖一服製之微亦當較計使國人知懷憤悱皆奮厲激發見一異服如惡惡臭則氣之所攖烏有弗濟者惟陛下慨然而發憤焉實天下幸甚孝宗時范成大論朝市儀注劄子曰臣聞禮之有儀禮之細也然儀猶不立則何禮之足云今者黃旗紫蓋暫駐東南朝市之制當倣京邑所以隆上都而觀萬國者安得而不肅哉臣伏見文武百僚正衙朝會及德夀宫朝賀之類退至宫殿等門奔趨不暇紛蹂闐咽緣內之仗衛外之從人自相交閧至無路可行貴臣近列冠笏敧傾有不能自持者入公門鞠躬如也過位色勃如也足躩如也謂君雖不御坐過君之位者猶當恭肅今於駕興班退失容如此則朝廷之儀有當申嚴者伏乞睿旨行下所屬每遇朝集將退縱有他處期會但少紓頃刻令編攔人寬出班路使搢紳各依次序安行趨出以申鞠躬足躩之義臣又伏見車駕行幸前後禁衛各有重數今乘輿才過駕後圍子每重只四五人不能呵衛禁嚴法物及供奉班聫乃與行路人混為一區雖袒裼負戴者亦得並行禁圍之中漢文帝號稱寬恕縣人來聞蹕猶匿橋下必不敢闌入仗內如今之縱弛則扈從之儀有當申嚴者伏乞睿旨行下所屬乘輿行幸增修鈎陳壁壘之制量添駕後衛卒必俟屬車禁衛盡絶方許民庶通行臣又伏見在京街道車馬相遇皆有先後定制今行都九衢之中不問尊卑貴賤務相排軋兩不遜避甚或給使技胥及白身之輿馬下至擔夫荷卒皆與朝臣爭道莫之誰何古者齒路馬及蹙路馬之芻者皆有誅非貴馬也貴君馬所以尊君也而况君之朝臣乎則街道之儀有當申嚴者伏乞睿旨下所屬檢照條法凡車馬相遇有當避道有當分道有當斂馬側立之類一如儀制否者許被犯官司解送懲治以上三者雖禮之細而實關事體所以觀國之光在是誠不可忽臣繆掌邦禮未敢及其重大謹按衆目之所不安者姑舉一二伏望聖慈責之攸司以嚴禮禁趙汝愚乞編類隆興以後聘使儀禮疏曰臣等竊惟行人之官責任甚重欲求稱職必在擇人人固須才事當有據嘗考周禮行人之職掌賓客之禮儀名位尊卑皆有禮籍禮俗政事自為一書神宗皇帝嘗以遼國和好盟誓聘使禮幣儀式皆無考據始命蘇頌修成一書名曰華夷魯衛録今兩國通好姑務息民凡所遣之使人皆是臨時選擇事非素習初匪世官或有疑慮責成吏手安危所繫事體非輕欲望聖慈特命儒臣自隆興以後聘使往來之禮吉凶慶吊之儀編類成篇以為準式使已用之文粲然可覩後來之事酌之而行可以息爭端可以定疑慮今後遇遣國信使副及接送館伴使各授一編使之檢用誠非小補元世祖中統元年宴羣臣於上都行宫有不能釂大巵者免其冠服監察御史魏初上疏曰臣聞君猶天也臣猶地也尊卑之禮不可不肅方今內有太常有史官有起居注以議典禮記言動外有髙麗安南使者入貢以觀中國之儀昨聞錫宴大臣威儀弗謹非所以尊朝廷正上下也疏入帝欣納之世祖時東平布衣趙天麟上䇿曰臣聞上古聖人之立制也仰則觀象於天俯則觀法於地紀綱萬事雕琢羣情有等有差無豐無殺俾華實之相副庶儀則之可行至於日用之間咸有天然之道降及後世損益相須代代殊文其理一也今國家官階各異服色惟三貫一統於中央該二儀而混一裳衣幅舄冠冕佩環盡削兹文咸遵近世是故有紫有紅有緑有碧者實唐朝之公服也意或水一火二木三金四者用四方之間色也今又舉三等之色而遺其碧者從當時之宜也至於玉犀金角之飾帶金銀錫鍇之殊節象板以為簡銀銅以為章此在公之品級也嘗悉分其天下之儀刑猶為未備昔周室獨章於隧道仲尼嘗惜於繁纓蓋將以杜僭越之門絶凱覦之望定後民之心志塞奢侈之淵源究而論之可謂大矣夫中者乾坤之極致人物之妙機不及則逼下而為固太過則踰上而不遜若夫中無定體事在合宜不可以並迹而平心不可以膠權而稱物此乃中之至也臣謂山節藻梲復室重簷黻繡編諸肩繪日月皆古天子宫室衣服之制也今市井富民臧獲賤類皆敢居之服之此臣所以惜之也臣又按車馬者古之命物也今六合為一冀代馬多天下之人皆得乘之亦無傷也然大夫不敢徒行是以有車今市井之家往往以驂服駕車而乘之與士大夫無異此臣所以惜之也臣又按上自省臺下及州府吏人前世皆因黛色以别之今猶闕焉出入公庭與庶人無異此臣所以惜之也臣又按僧尼道士之服自有其宜今此等或不遵本教雜混常俗以致風化遂傷倫流難辨此臣所以惜之也臣又按古之五十者方得衣帛七十者方得食肉今之富人墻屋被文繡鞍轡飾金玉婢妾曵絲履犬馬食菽粟每召賓客一筵之費其直不資競相推尚比古者亦以奢矣古人之儉是以多寡例均貧人甚希今人之奢是以兼并風行貧人愈困此臣所以惜之也方今之弊在於下民之心太過攝御之方未及須為格例以移之庶乎貧富各得其正伏望陛下略從前古用御方今凡房室車馬之類明立節制截自令下之後並不得干冒僭越凡僭制在令前者隨即改之凡吏員及僧尼道士各從其服色服之凡墻室鞍轡器皿衣服勿用金銀璧貝文繡珠翠之飾凡違令者有司以違制論其可也幸從臣言則奢者雖家積萬金亦無所矜其紛華榮耀之氣而貪婪之志自皆止矣僭者雖懷驕恣亦無所啓其望外僥幸之心而陵犯之念自皆息矣奢僭既絶而廉讓由興亷者守潔於已讓者推遜於人聖人謂能以禮讓為國乎何有夫奢僭尚存而欲禮讓之化行兩者交戰斷不能也故臨民者貴於明節制順帝時蘇天爵上奏曰朝覲會同國家大禮班制儀式不可不肅夫九品分官所以著尊卑之序四方述職所以同逺近之風蓋位序尊嚴則觀望隆重朝廷典憲莫大於斯邇年以來朝儀雖設版位品秩率越班行均為衣紫從五與正五雜居共曰服緋七品與六品齊列下至八品九品蓋亦莫不皆然夫既踰越班制遂致行立不端因忘肅敬之心殊失朝儀之禮今後朝賀行禮聽讀詔赦先儘省部院臺正從二品衙門次及諸司局院各驗職事散官序列正從班次濟濟相讓與與而行如有踰越品秩差亂位序者同失儀論以懲不恪庶幾貴賤有章儀式不紊上尊朝廷之典禮下聳中外之觀瞻至正十九年帝以天下多故詔却天夀聖節朝賀左丞相太平暨文武百官上奏曰天夀節朝賀乃臣子報本實合禮典今謙讓不受固陛下盛德然今軍旅征進君臣名分正宜舉行不允壬申皇太子復率羣臣上奏曰朝賀祝夀是祖宗以來舊行典故今不行有乖於禮帝曰今盜賊未息萬姓荼毒正朕恐懼修省敬天之時奈何受賀以自樂乙亥御史大夫托里特穆爾復奏曰天夀朝賀之禮蓋出臣子之誠伏望陛下曲徇所請若朝賀之後內庭燕集特賜除免亦古者人君減膳之意仍乞宣示中書使內外知聖天子憂勤惕厲至於如此帝曰為朕闕於修省以致萬姓塗炭今復朝賀燕集是重朕之不德當候天下安寧行之未晚卿等其母復言卒不聽右統言禮歷代名臣奏議卷一百二十
