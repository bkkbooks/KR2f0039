body:
  text: 歷代名臣奏議卷一百十六明楊士竒等撰風俗齊景公好婦人而丈夫飾者國人盡服之公使吏禁之曰女子而男子飾者裂其衣而斷其帶裂衣斷帶相望而不止晏子見公曰寡人使吏禁女子而男子飾者裂其衣斷其帶相望而不止者何也對曰君使服之於內而禁之於外猶懸牛首於門而求買馬肉也公胡不使內勿服則外莫敢為也公曰善使內勿服不旋月而國莫之服也魏武帝時和洽為丞相掾屬毛玠崔琰並以忠清幹事其選用先尚儉節洽上言曰天下大器在位與人不可以一節儉也儉素過中自以處身則可以此格物所失或多今朝廷之議吏有著新衣乘好車者謂之不清長吏過營形容不飾衣裘弊壞者謂之亷潔至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壺飱以入官寺夫立教觀俗貴處中庸為可繼也今崇一概難堪之行以檢殊塗勉而為之必有疲瘁古之大教務在通人情而已凡激詭之行則容隱偽矣明帝泰和六年司徒董昭上疏陳末流之弊曰凡有天下者莫不貴尚敦朴忠信之士深疾虛偽不真之人者以其毁教亂治敗俗傷化也近魏諷則伏誅建安之末曹偉則斬戮黃初之始伏惟前後聖詔深疾浮偽欲以破散邪黨常用切齒而執法之吏皆畏其權勢莫能糾擲毁壞風俗侵欲滋甚竊見當今年少不復以學問為本專更以交遊為業國士不以孝弟清修為首乃以趨勢遊利為先合黨連羣互相褒嘆以毁訾為罰戮用黨譽為爵賞附已者則嘆之盈言不附者則為作瑕釁至乃相謂今世何憂不度耶但求人之道不勤羅之不博耳又何患其不知已矣但當吞之以藥而柔調耳又聞或有使奴客名作在職家人冒之出入往來禁奧交通書疏有所探問凡此諸事皆法之所不取刑之所不赦雖諷偉之罪無以加也帝於是發切詔斥免諸葛誕鄧揚等吳大帝時姚信集乞旌表鬱生以勵婦節上疏曰臣聞唐虞之政舉善而教旌德擢異三王所先是以忠臣烈士顯名國朝淑婦貞女表迹家閭蓋所以闡崇化業廣殖清風使茍有令性幽明俱著茍懷懿姿士女同榮故王蠋建寒士之節而齊王表其異義姑立殊絶之操而魯侯髙其門臣竊見故鬱林太守陸績女鬱生少履貞持之行幼立匪石之節年始十三適同郡張白侍廟三月婦禮未卒白遭罹家禍遷死異郡鬱生抗聲昭節義形於色冠蓋交橫誓而不許奉白姊妹􅕑巇之中蹈履水火志懷霜雪義心固於金石體信貫於神明送終以禮邦士慕則臣聞昭德以行顯行以爵茍非名爵則勸善不嚴故士之有誄魯人志其勇杞婦見書齊人哀其哭乞蒙聖朝斟酌前則上開天聰下垂坤厚褒鬱生以義姑之號以厲兩髦之節則皇風穆暢士女改視矣西晉武帝咸寧中傅咸為車騎司馬以世俗奢侈上書曰臣以為穀帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤𨽻乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土曠人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相髙尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝嘆曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣武帝時風俗趨競禮讓陵遲諫議大夫庾峻上疏曰臣聞黎庶之性人衆而賢寡設官分職則官寡而賢衆為賢衆而多官則妨化以無官而棄賢則廢道是故聖王之御世也因人之性或出或處故有朝廷之士又有山林之士朝廷之士佐主成化猶人之有股肱心膂共為一體也山林之士被褐懷玉太上棲於丘園髙節出於衆庶其次輕爵服逺恥辱以全志最下就列位惟無功而能知止彼其清劭足以抑貪汙退讓足以息鄙事故在朝之士聞其風而悅之將受爵者皆恥躬之不逮斯山林之士避寵之臣所以為美也先王嘉之節雖離世而德合於主行雖詭朝而功同于政故大者有玉帛之命其次有几杖之禮以厚德載物出處有地既廊廟多賢才而野人亦不失為君子此先王之𢎞也秦塞斯路利出一官雖有處士之名而無爵列於朝者商君謂之六蝎韓非謂之五蠧時不知德惟爵是聞故閭閻以公乘侮其鄉人郎中以上爵傲其父兄漢祖反之大暢斯否任蕭曹以天下重四皓於南山以張良之勳而班在叔孫之後蓋公之賤而曹相咨之以政帝王貴德於上俗亦反本於下故田叔等十人漢廷臣無能出其右者而未嘗干祿于時以釋之之貴而結王生之襪於朝而名愈重自非主臣尚德兼愛孰能通天下之志如此其大者乎夫不革百王之弊徒務救時之政文士競智而務入武夫恃力而爭先官髙矣而意未滿功報矣其求不已又國無隨才佐官之制俗無難進易退之恥位一髙雖無功而不見下已負敗而後見用故因前而升則處士之路塞矣又仕者黜陟無章是以普天之下先競而後讓舉世之士有進而無退大人溺於動俗執政撓於羣言衡石為之失平清濁安可復分昔者先王患向之所以取天下者今之為弊是故功成必改其物業定必易其教雖以爵祿使下臣無貪陵之行雖以甲兵定功主無窮武之悔也臣愚以為古者大夫七十懸車今自非元功國老三司上才可聽七十致仕則士無懷祿之嫌矣其父母八十可聽終養則孝莫大於事親矣吏歷試無績依古終身不仕則官無秕政矣能小而不能大可降還蒞小則使人以器矣人主進人以禮退人以禮人臣亦量能授爵矣其有孝如王陽臨九折而去官潔如貢禹冠一免而不著及知止如王孫知足如疏廣雖去列位而居東野與人父言依於慈與人子言依於孝此其出言合於國檢危行彰於本朝去勢如脫屣路人為之隕涕辭寵如金石庸夫為之興行是故先王許之而聖人貴之夫人之性陵上猶水之趣下也益而不已必決升而不已必困始於匹夫行義不敦終於皇輿為之敗績固不可不慎也下人並心進趣上宜以退讓去其甚者退讓不可以刑罰使莫若聽朝士時時從志山林往往間出無使入者不能復出往者不能復返然後出處交泰提衡而立時靡有爭天下可得而化矣梁武帝天監中徐勉為侍中時人間喪事多不遵禮朝終夕殯相尚以速勉上疏曰禮記問喪云三日而後斂者以俟其生也三日而不生亦不生矣自頃以來不遵斯制送終之禮殯以期日潤屋豪家乃或半晷衣衾棺椁以速為榮親戚徒𨽻各念休反故屬纊才畢灰釘已具忘狐鼠之顧步愧燕雀之徊翔傷風滅理莫此為大且人子承衾之時志悶心絶喪事所資悉關他手愛憎深淺事實難原如覘或爽存沒違濫使萬有其一怨酷已多豈不緩其告斂之晨申其望生之冀請自今士庶宜悉依古三日大斂如有不奉加以糾繩以勵末俗帝可其奏後魏文成帝時中書侍郎髙允以髙宗纂承平之業而風俗仍舊婚娶喪葬不依古式乃上奏曰前朝之世屢發明詔禁諸婚娶不得作樂及葬送之日歌謡鼓舞殺牲燒葬一切禁斷雖條旨久頒而俗不革變將由居上者未能悛改為下者習以成俗教化陵遲一至于斯昔周文以百里之地修德布政先於寡妻及於兄弟以至家邦三分天下而有其二明為政者先自近始詩云爾之教矣民胥效矣人君舉動不可不慎禮云嫁女之家三日不息燭娶婦之家三日不舉樂今諸王納室皆樂部給妓以為嬉戲而獨禁細民不得作樂此一異也古之婚者皆揀擇德義之門妙選貞間之女先之以媒聘繼之以禮物集僚友以重其别親御輪以崇其敬婚姻之際如此其難今諸王十五便賜妻别居然則所配者或少長差舛或罪入掖庭而作合宗王妃嬪藩懿失禮之甚無復此過往年及今頻有檢劾誠是諸王過酒致責迹其元起亦由色衰相棄致此紛紜今皇子娶妻多出宫掖令天下小民必依禮限此二異也萬物之生靡不有死古先哲王作為禮制所以養生送死折諸人情若毁生以奉死則聖人所禁也然葬者藏也死者不可再見故深藏之昔堯葬穀林農不易畝舜葬蒼梧市不改肆秦始皇作為地市下固三泉金玉寶貨不可計數死不旋踵尸焚墓掘由此推之堯舜之儉始皇之奢是非可見今國家營葬費損巨億一旦焚之以為灰燼茍靡費有益於亡者古之人奚獨不然今上為之不輟而禁下民之必止此三異也古者祭必立尸序其昭穆使亡者有憑致食饗之禮今已葬之魂人直求貌類者事之如父母燕好如夫妻損敗風化瀆亂情禮莫此之甚上未禁之下不改絶此四異也夫饗者所以定禮儀訓萬國故聖王重之至乃爵盈而不飲殽乾而不食樂非雅聲則不奏物非正色則不列今之大會內外相混酒醉喧譊罔有儀式又俳優鄙藝汙辱視聽朝廷積習以為美而責風俗之清純此五異也今陛下當百王之末踵晉亂之弊而不矯然釐改以厲頽俗臣恐天下蒼生永不聞見禮教矣隋文帝時比部侍郎李諤見禮教凋弊公卿薨亡其愛妾侍婢子孫輒嫁賣之遂成風俗乃上書曰臣聞追遠慎終民德歸厚三年無改方稱為孝如聞朝臣之內有父祖亡沒日月未久子孫無賴便分其妓妾嫁賣取財有一於兹實損風化妾雖微賤親承衣履服斬三年古今通式豈容遽褫衰絰強傅鉛華泣辭靈几之前送付他人之室凡在見者猶致傷心况乎人子能堪斯忍復有朝廷重臣位望通貴平生交舊情若弟兄及其亡沒杳同行路朝聞其死夕窺其妾方便求聘以得為限無亷恥之心棄友朋之義且居家理治可移於官既不正私何能贊務上覽而嘉之五品以上妻妾不得改醮始於此也諤又以屬文之家體尚輕薄遞相師效流蕩忘反於是上書曰臣聞古先哲王之化民也必變其視聽防其嗜欲塞其邪放之心示以淳和之路五教六行為訓民之本詩書禮易為道義之門故能家復孝慈人知禮讓正俗調風莫大於此其有上書獻賦制誄鐫銘皆以褒德序賢明勳證理茍非懲勸義不徒然降及後代風教漸落魏之三祖更尚文詞忽君人之大道好雕蟲之小藝下之從上有同影響競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚惟務吟詠遂復遺理存異尋虛逐微競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱唯是風雲之狀世俗以此相髙朝廷據兹擢士祿利之路既開愛尚之情愈篤於是閭里童昏貴遊總丱未窺六甲先製五言至於羲皇舜禹之典伊傅周孔之説不復關心何嘗入耳以傲誕為清虛以緣情為勳績指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由棄大聖之軌模構無用以為用也損本逐末流遍華壤遞相師祖久而愈扇及大隋受命聖道聿興屏出輕浮遏止華偽自非懷經抱質志道依仁不得引預搢紳參廁纓冕開皇四年普詔天下公私文翰並宜實録其年九月泗州刺史司馬幼之文表華豔付所司治罪自是公卿大臣咸知正路莫不鑽仰墳集棄絶華綺擇先王之令典行大道於兹世如聞外州遠縣仍踵弊風選吏舉人未遵典則至有宗黨稱孝鄉曲歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏職舉送天朝蓋由縣令刺史未行風教猶挾私情不存公道臣既忝憲司職當糾察若聞風即劾恐挂網者多請勒諸司普加搜訪有如此者具狀送臺諤又以當官者好自矜伐復上奏曰臣聞舜戒禹云汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功言偃又云事君數斯辱矣朋友數斯疏矣此皆先哲之格言後王之軌轍然則人臣之道陳力濟時雖勤比大禹功如師望亦不得厚自矜伐上要君父况復功無足紀勤不補過而敢自陳勳績輕干聽覽世之喪道極於周代下無亷恥上使之然用人惟信其口取士不觀其行矜誇自大便以幹濟蒙擢謙恭靜退多以恬默見遺是以通表陳誠先論已之功狀承顔敷奏亦道臣最用心自衒自媒都無慙恥之色強干橫請唯以乾沒為能自隋受命此風頓改耕夫販婦無不革心况乃大臣仍遵弊俗如聞刺史入京朝覲乃有自陳勾檢之功喧訴階墀之側言辭不遜髙自稱譽上黷冕旒特為難恕凡如此輩具狀送臺明加罪黜以懲風軌上以諤前後所奏頒示天下四海靡然向風深革其弊唐太宗貞觀初承隋大亂風俗薄惡人不知教御史大夫韋挺上疏曰父母之恩昊天罔極創巨之痛終身何已今衣冠士族辰日不哭謂為重喪親賔來弔輒不臨舉又閭里細人每有重喪不即發問先造邑社待營辦具乃始發哀至假車乘雇棺椁以榮送葬既葬鄰伍會集相與酣醉名曰出孝夫婦之道王化所基故有三日不息燭不舉樂之感今婚嫁之初雜奏絲竹以窮宴歡官司習俗弗為條禁望一切懲革申明禮憲六年太宗謂房玄齡曰比有山東崔盧李鄭四姓雖纍葉陵遲猶恃其舊地好自矜大稱為士大夫每嫁女他族必廣索聘財以多為貴論數定約同於市買甚損風俗有紊禮經既輕重失宜禮須改革乃詔吏部尚書髙士亷等刊正姓氏剪其浮華定其真偽忠賢者褒進悖逆者貶黜士亷等以崔幹為第一等太宗謂曰我與山東崔盧李鄭舊既無嫌為其世代衰微全無官宦猶自云士大夫婚姻之際則多索財物或才識庸下而偃仰自髙販鬻松檟依託富貴我不解人間何為重之且大丈夫有能建德立功爵位崇重善事君父忠孝可稱或道義素髙學藝宏博此亦足為門户可謂天下大丈夫今崔盧之屬唯矜遠葉衣冠寧比當朝之貴公卿以下何假多輸錢物兼與他氣勢向聲背實以得為榮我今定氏族者誠欲崇樹今朝冠冕何因崔幹猶為第一等只看卿等不貴我官爵邪不須論數代以前止取今日官品人材作等級宜一量定用為永則遂以崔幹為第三等及書成頒之天下復詔羣臣曰氏族之美實繁於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗陵替燕趙古姓多失衣冠之緒齊韓舊族或乖禮義之風名不著於州閭身未免於貧賤自號髙門之胄不敦匹敵之儀問名唯在於竊資結縭必歸於富室乃有新官之輩豐財之家慕其祖宗競結婚姻多納貨賄有如販鬻或自貶家門受屈辱於姻婭或矜誇舊望行無禮於舅姑積習成俗迄今未已既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸以懲革唯此弊風未能盡變自今以後明加告示使識嫁娶之序務合典禮稱朕意焉又謂侍臣曰佛道設教本行善事豈遣僧尼道士妄自尊崇坐受父母之拜損壞風俗悖亂禮經宜即禁斷仍令致拜於父母羣臣皆曰誠如聖旨中宗時左臺侍御史度支員外郎兼博士唐紹上言曰比羣臣務厚葬以俑人象驂眩耀相矜下逮衆庶流宕成俗願按令切敕裁損凡明器不許列衢路惟陳墓所婚家盛設障車擁道為戲樂邀貨捐資動萬計甚傷化紊禮不可示天下事雖不從議者歎美南唐嗣主時太常博士陳致雍上奏曰臣竊聞中書商量不許旌表吉州孝子瞿處圭等門閭事伏以上古之時人民淳素故可無為而治三季澆薄無常行或可激勸而成則旌表門閭是其旨也中書舍人張緯不知大體屢興僻論以為鄉閭之民茍避徭役旌表則遞相倣效止塞則永絶其源此茸吏無識者之所談非大臣佐天子興教化之良術也且有旻來孝義著聞者絶鮮陛下之德所感相繼有廬墓者三人而不以為人化所滋翻慮其遞相倣效若相率為賊則實害於時相倣行孝又何傷於政懲惡本欲人懼賞善本欲人勸倘的相倣效則是陛下敦勸之有驗也如不倣效又用旌表何為今朝野之間不義不孝者何嘗不有風俗若此正是陛下急於敦勸之秋或小吏出此無稽之言猶大臣必須懲絶况居清切之司當顧問之地首創斯議謬莫甚焉噫為人臣子者上有君下有親何思沮人之為孝夫王政之基無先於學人倫之本莫大於孝去年停貢舉巳沮陛下教人之為學此時於激勸又沮陛下教人之行孝將順其美一何踈哉伏惟皇帝陛下至德格于上玄廣愛刑于四海邪見詭説必不能上惑聰明然臣雖不才而所務者大所思者遠恐或有一可之言是以不敢不奏蜀主王建時劉纂上疏曰下之從上如風偃草以仁義理法化之則為謹願之行以驕奢淫佚化之則為狂薄之俗今一國之人皆效醉粧臣恐邦基頽然如人之醉而不可枝持也宋真宗時陳洪進子陳文顯為青齊廬壽西京水南北陜州四州都巡檢使與諸弟不睦御史中丞李維清抗疏曰文顯等並分符竹委以方面一門榮盛當世罕儔先人之墳土未乾私室之風規大壞弟兄列訟骨肉為仇官奉私藏同居異㸑屢經赦宥久積人言文顯首起訟端當律文尊長之坐乞置散秩以警浮俗詔曰文顯等頗傷名教合置邦刑以其父有忠勳未忍捐棄宜賜戒諭許其改過儻無悛革當正簡書令御史臺告諭之仁宗天聖三年大理寺丞范仲淹上奏曰臣聞國之文章應於風化風化厚薄見乎文章是故觀唐夏之書足以明帝王之道觀南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而將落前代之季不能自救以至于大亂乃有來者起而救之故文章之薄則為君子之憂風俗之壞則為來者之資惟聖帝明王之相救在乎已不在乎人易曰窮則變變則通通則久亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風况我聖朝千載之會惜乎不追三代之髙而尚六朝之細然文章之列何代無人蓋時之所尚何能獨變大君有命孰不從風可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚九年侍御史知雜事劉隨奏乞戒止奔競疏曰臣聞風俗信厚草木被于仁恩世道澆漓郡國所以愁歎仁恩洽則邦國益固愁歎甚則王室下衰三代以來理亂之政布在經史垂誡後王是故歷代聖君因時立制治于未亂安于未危其術何也在於法令必行賞罰公當止塞徼求之路興行禮遜之風如此則忠賢得以盡誠姦佞無由妄進百司舉職列郡向方徇公滅私天下無事自古稱垂拱而治者用此道也伏以皇上御厯三后繼明建不拔之洪基張率仁之景化兩宫臨御萬國歡康禮重大臣延納端士欽恤庶獄儉約豐財小大必親上下無壅此皆上古帝王之能事也近年文武之列內外庶官則有志務徼求公行請託對見旒扆或灑涕以期恩勞效纎微或自矜而無愧或茍且進用或規避遠官或干犯有司違之則動生謗議或唐突執政違之則頗扇是非即有寄任藩宣位望崇重或表章不遜或奏請無厭况於無事之時尚懷悖慢若當要用之際寧盡公忠至于按察之司宴安顧望以養姦為大體以舉職為近名以巧詐為俊賢以恬退為愚拙以至貪殘之吏黷于貨財老疾之徒罔知止足務進者都忘于亷恥營私者不顧於典刑雖教導以彌勤而奔競之猶甚若無約束寖壞紀綱慮傷忠厚之風殊非國家之利伏望特頒明詔遍示臣僚俾知戒懼之心共贊熙隆之運茍無悛改當遂奏陳置彼簡書用肅有位嘉祐七年知諫院司馬光上謹習疏曰臣以駑蹇之質再為諫官荷陛下寵祿之優責任之重夙夜震恐不遑寧處思極竭愚忠以報塞萬一顧瑣瑣細務皆不足以煩瀆聖聽竊以國家之治亂本於禮而風俗之善惡繫於習赤子之啼無有五方其聲一也及其長則言語不通飲食不同至有死莫能相為者是無他焉所習異也至於古今亦然有服古之衣冠於今之世則駭於州里矣服今之衣冠於古之世則僇於有司矣衣冠烏有是非哉習與不習而巳矣夫民朝夕見之其心安焉以為天下之事正應如此一旦驅之使去此而就彼則無不憂疑而莫肯從矣昔秦廢井田而民愁怨王莽復井田而民亦愁怨趙武靈王變華俗效胡服而羣下不悅後魏孝文帝變胡服效華俗而羣下亦不悅由此觀之世俗之情安於所習駭所未見固其常也是故上行下效謂之風薰蒸漸漬謂之化淪胥委靡謂之流衆心安定謂之俗及夫風化已失流俗已成則雖有辨智弗能諭也強毅不能制也重賞不能勸也嚴刑不能止也自非聖人得位而臨之積百年之功莫之能變也周易履之象曰君子以辨上下定民志故天子之令必行於諸侯諸侯之令必行於卿大夫士卿大夫士之令必行於庶人使天下之勢如身之使臂臂之使指莫不率從詩曰勉勉我王綱紀四方此禮之本也昔三代之王皆習民以禮故子孫數百年享天之祿及其衰也雖以晉楚齊秦之強不敢暴蔑王室豈其力不足哉知天下之不已與也於是乎翼戴王命以威懷諸侯而諸侯莫敢不從所以然者猶有先王之遺風餘俗未絶於民故也其後日以衰薄下陵上替晉平公之世魯子服回如晉還謂季孫意如曰晉之公室將遂卑矣六卿強而奢傲將因是以習習實為常能無卑乎其後趙魏韓氏卒分晉國習於君臣之分不明故也降及漢氏雖不能若三代之盛王然猶尊君卑臣敦尚名節以行義取士以儒術化民是以王莽之亂民思劉氏而卒復之赤眉雖羣盜猶立宗室以從民望王郎矯託名氏而燕趙響應董卓之亂袁紹以誅卓為名而州郡雲合曹操挾獻帝以令諸侯而天下莫能與之敵操之心豈不欲廢漢而自立哉然沒世不敢為者畏天下之人疾之也自魏晉以降人主始貴通才而賤守節人臣始尚浮華而薄儒術以先王之禮為糟粕而不行以純固之士為鄙朴而不用於是風俗日壞入於偷薄叛君不以為耻犯上不以為非惟利是從不顧名節至于有唐之衰麾下之士有屠逐元帥者朝廷不能討因而撫之拔於行伍授以旄鉞其始也取偷安一時而已及其久也則衆庶習於聞見以為事理當然不為非禮不為無義是以在上者惴惴焉畏其下在下者睽睽焉伺其上平居則酒肉金帛甘言屈體以相媚悅得間則銛鋒利刃狠心詭計以相屠膾成者為賢敗者為愚不復論尊卑之序是非之理陵夷至於五代天下蕩然莫知禮義為何物矣是以世祚不永遠者十餘年近者四五年敗亡相屬生民塗炭及大宋受命太祖太宗知天下之禍生於無禮也於是以神武聰明躬勤萬幾征伐刑賞斷於聖志然後人主之勢重而羣臣懾服矣於是翦削藩鎮齊以法度擇文吏為之佐以奪其殺生之柄攬其金穀之富選其麾下精鋭之士聚諸京師以備宿衛制其腹心落其爪牙使不得陸梁然後天下諸侯之分明而悖亂之原塞矣於是節度使之權歸於州鎮員之權歸於縣又分天下為十餘路各置轉運使以察州縣百吏之臧否復漢部刺史之職使朝廷之令必行於轉運使轉運使之令必行於州州之令必行于縣縣之令必行於吏民然後上下之敘正而紀綱立矣於是申明軍法使自押官以上各有階級以相臨統小有違犯罪皆殊死然後行伍之政肅而士用命矣此皆禮之大節也故能四征不庭莫不率服汛掃九州以陟禹之迹至于真宗重之以明德繼二聖之志夙夜孜孜宣布善化銷鑠惡俗以至于今治平百年頑民殄絶衆心咸安此乃曠世難成之業陛下當戰戰栗栗守而勿失者也臣竊見陛下有中宗之嚴恭文王之小心而小大之政多謙讓不決委之臣下誠使所委之人常得忠賢則可矣萬一有姦邪在焉豈不危甚矣哉古人所謂委任而責成功者擇人而授之職業叢脞之務不身親之也至于爵祿廢置殺生豫奪不由已出不可也洪範曰惟辟作威惟辟作福臣之有作威作福害于而家凶于而國威福之柄一失於人而習以為常則不可復收矣此明主之所慎也又頃以西鄙用兵權置經略安撫使總一路之兵得以便宜從事及西事已平因而不廢其河東一路總二十二州軍嚮時節度使之權不能及矣唐始置沿邊八節度亦如是而已以其權任太重故後世有跋扈之臣洛誥曰毋若火始焰焰厥攸灼敘弗其絶言慎其微也又將相大臣典諸州者多以貴倨自恃轉運使欲振舉職業往往故違戾而不肯從夫將相大臣在朝廷之時則轉運使名位固相遠矣及在外為知州則轉運使統諸州職也烏得以一身之貴庇一州之事轉運使不得問哉漢刺史以六百石吏督察二千石豈以名位之貴賤哉又自景祐以來國家怠於久安樂因循而務省事執事之臣頗行姑息之政於是胥吏歡譁而斥逐御史中丞輦官悖慢而廢退宰相衛士凶逆而獄不窮姦澤加於舊軍人罵三司使而法官以為非犯階級疑於用法朝廷雖特誅其人而已停之卒復收養之其餘有一夫流言於道路而為之變令推恩者多矣凡此數者殆非所以習民於上下之分也夫朝廷者四方之表儀也朝廷之政如是則四方必有甚者矣於是元帥畏遍裨偏裨畏將校將校畏士卒姦邪怯懦之臣至有簡省教閲使之驕惰保庇羸老使之繁冗屈撓正法使之縱恣詆訾粟帛使之憤惋甘言諂笑靡所不至於是士卒翕然譽之而歸怨於上矣彼既為之則此效之下既言之則上從之前既行之則後襲之茍彼為而此不效下言而上不從前行而後不襲則怨怒聚於其身而禍亂生矣長此不已日滋月益民之耳目習而安之此有以異唐之季世乎後魏孝明帝時征西將軍張彜子仲禹上封事欲抑損武人不預清品羽林虎賁千餘人焚彜第殺彜父子官為收捕凶強者八人斬之其餘大赦以安之懷朔鎮人髙歡時奉使至洛陽見之歸而散家財以結客曰朝政如此事可知矣於是始有飛揚之志由是觀之紀綱不立則姦雄生心矣夫祖宗苦身焦思以變衰唐之俗而陛下髙拱熟視以成後魏之風此臣之所為陛下痛惜也臣愚以為陛下當奮剛健之志宣神明之德凡群臣奏事皆察其邪正辨其臧否熟問深思求合於道然後賞罰黜陟斷而行之則天下孰不曠然悅喜詩曰君子如怒亂庶遄沮君子如祉亂庶遄已蓋言無所臧否之為患大也經略安撫使有征討之事則置之無事則當廢之儻未能廢則軍事迫急不暇奏知者使專之可也其餘民事皆委之州縣一斷於法或法重情輕情重法輕可殺可徙可宥可赦並聽本州申奏決之朝廷何必出於經略安撫使哉轉運使規畫號令行下諸州而諸州違戾不從者朝廷當辨其曲直若事理實可施行而州將恃貴勢故違之者當罪州將勿罪轉運使將校士卒之於州縣及所統之官或公卿大臣有悖慢無禮者明著階級之法使斷者不疑將帥之官有廢法違道以取悅於下歸怨於上者當隨其輕重誅竄廢黜公正無私御衆嚴整者當量其才能擢用褒賞如是則上之人難動而下用命矣上之人難動而下用命此所以尊朝廷也上下已明綱紀已定然後修儒術隆教化進敦篤退浮華使禮義興行風俗純美則國家保萬世無疆之休猶倚南山而坐平原也仁宗時帝嘗御天章閣召公卿出手詔問當世急務知永興軍葉清臣上奏曰陛下欲息奔競此繫中書若宰相裁抑奔競之流則風俗惇厚人知止足宰相用憸佞之士則貪榮冒進激成渾波向有職在管庫日趨走時相之門入則取街談巷言以資耳目出則竊廟謨朝論以警流輩一旦皆擢職司以酬所任比日人士競踵此風出入權要之家特有三尸五鬼之號乃列館職或置省曹且臺諫官為天子耳目今則不然盡為宰相肘腋宰相所惡則捃以微瑕公行擊搏宰相所善則從而唱和為之先容中書政令不平賞罰不當則箝口結舌未嘗敢言人主纎微過差或宫闈小事即極言過當用為訐直供職未逾嵗時遷擢已加常等宋禧為御史勸陛下宫中畜犬設棘以為守衛削弱朝體取笑四夷不加訶譴擢為諌官王達兩為江西湖南轉運使所至苦虐誅剝百姓徒配無辜特以宰相故舊不次拔擢遂有河北之行如此是長奔競也張方平上僣俗論曰臣聞古先聖人其制民之法詳矣始則經土立井分鄰畫伍為比閭族黨之法保受救賙之義辨之以四業任之以九貢以同風俗以齊豐寡將以驅之趨本勵之無遊故使不畜者祭無牲不耕者祭無盛不蠶者不帛不樹者不椁不績者喪無縗猶慮驅而勵之未從也又為罰焉故使宅不毛有里布田不耕出屋粟民無職事出夫家之征惰遊棄本者縞冠素紕垂綏以耻之已事其事矣又懼其侈而慢也故使雖富不異服無故不食珍納幣無過五兩合親不踰一卣老少異糧長壯殊役則是衣服飲食喪祭嫁娶之事莫不為之法制矣而後家有孰黨有庠術有序比為之長閭為之胥教訓敦勉繩非糾怠是以民之生業均平而國之禮義興起矣自秦民毁井田立阡陌賞勵貨殖寵縱兼并至有專地跨乎丘甸籠利占乎山澤強弱相伏富貧相役四維盡棄淫刑以逞王道蕩壞遂不可復其流虐遺弊蓋至今焉于後天下或合或離承運立統凡十七姓平國治世惟漢與唐以文景之盛德文明之英才朝廷之政既修天下之俗已泰民知自重刑辟希省可謂既富庶而教之之時也不能圖建逺猷為之制節故豐大及身而已天寶之敗仍親取焉今我治朝一統寰域日出月入咸被聲教自稚及耋不知驚擾導之以禮樂漸之以德義作法于治今實其時然天下務穡寡而遊冗煩末俗逸而誠農困通貨貿遷者倅騎從後坐廛射利者大第相倚食享列鼎服備四時曲堂便房伎妾夾侍四方新異咄嗟畢到與夫躬執耒耜寒耕暑耘水旱憂於前租庸逼於後奴妾不售溝壑為家其勞佚如何哉臣聞周官以度教節則民知足夫飲食男女人之大欲死生貧苦人之大惡故欲惡者人情之大端而制節者理人之大柄民知分限規繩之不可踰則貪奪僭侈之心息仁義亷讓之意興是故王道之端必自制節始也其在易履卦之象則曰履以辨上下定民志故知上下誠辨則民志斯定民志誠定則暴亂侵爭之患何由作乎向者頒下明詔誡天下服用之尤僭者而靡流之俗知勸矣夫齊一變至于魯魯一變至于道言理教之當以漸成也臣聞孝弟本於朝廷禮義始乎京師在詩晉國之篇以為其民憂深思遠猶有陶唐氏之遺風故繫之唐風且陶唐氏之不為政久矣其德教在民雖百世而不易非以其嘗所臨治被化尤厚者乎今京師者宫室所在王教所先宜乎其風俗敦厚質固以表正萬邦使八紘取則逺人知慕是當以道德為富而不以繁華為盛今乃子女玉帛多於郢國魚龍撞索過乎漢都雕飾淫巧之器竒邪纎靡之服陳鬻于市流于四方詐偽姦欺聚為淵藪虧損皇道熒亂民心臣愚以為宜益條節務從朴素事為之制物為之法掩塞末路摧省遊人其兼并豪猾僭上剝下為蠧猶多宜深撙約使循律度勿令侵急小人以奉無厭之欲則天下之鰥寡孤獨困窮無告者得一息之寬矣方平又上奏曰臣聞下輕其上賤人圖柄則國家搖動俗用不靜春秋之義以貴治賤不使卑陵尊左氏傳曰下陵則上替陵替之漸不可長也竊惟近嵗以來時風寖敝是非起於憎愛毁譽移於朋黨貴而尊者畏訕誣之見及故待下之逾謹賤而卑者恃詆訾之可行故奉上之禮益倨更相姑息遂成此俗法制因兹不振堂陛由是益削且軍國圖議三事之職將相進退人主之柄即措置有乖於理體謨猷不允於人望朝廷固有邇臣列位諫官御史得言者衆必有獻納豈容小人妄兹干議近如王預仕人卑品婁徹草澤狂生投匭上封恣斥朝政唐貞觀中監察御史徐師合上書論執政不可兼數職太宗曰此人妄有毁謗欲離間我君臣流師合於嶺外師合官為監察所言未為切害太宗流之蓋所以重朝廷謹風俗也臣忝列諌官以言事為職豈欲杜塞群論蔽虧聰明顧此等纎邪無益於政優容之不足以廣言路崇長之足以損善俗伏乞降出預徹等所上封奏觀其義理若顯為欺罔侮黷國經即未能深示刑章乞且投畀遐徼庶使行險之人知所懲沮神宗時監察御史裏行彭汝礪上奏曰臣聞天下之事其出無窮而相禪於無所終始之者疑若甚勞而古之人君乃至於無為者能得其本而已以四方為遠故所正者惟京師以一國為大故所正者惟其家以萬民為衆故所正者惟百官又以國家百官之富不可勝治也故所正者惟其身而已所守者約而所施者博此古之要道也陛下有仁孝之行恭儉之德至誠惻怛之心至於此非難也而臣自京師觀之淫麗之文勝淳厚之朴衰謾誕之風長正信之俗微非所以觀遠方也自宫邸觀之公侯放於驕淫而不禁婦妾習於侈靡而不嚴非所以示國人也自官府觀之相尚以取譽相引以趨勢相傾以就利為上者殘其下為屬者持其長而非所以法萬民也陛下欲為漢唐則固軼於漢唐矣欲至三代而於此未正焉臣以為未也蓋古之人修身以正天下而其俗既成之後雖抱衾之賤妾知自克以義而非止於關雎之后妃也雖衰世之公子篤於信而非止於麟趾之盛時也雖江漢之匹夫皆知無思犯禮而非止於京邑之近也雖牛羊之賤吏知有所不忍而非獨公卿大夫之賢也以古準今何其寥寥哉其弊亦必有在矣陛下試反而思之其躬行之未篤歟其昔者奢侈之弊因循而未革歟亦教之未至而制之不嚴歟所求於士者止以語言而不以德歟所取於臣急於利歟不然何風俗之難回也陛下有聖人之才有崇高富貴之勢嚬呻俯仰再撫四海之外惟無為而已為之無不可至也臣觀四方之學其言語態度短長巧拙必問京師如何不同則以為鄙焉凡京師之物其衣服器用淺深闊狹必問宫中如何不同則以為野焉以此知以質厚示之則無不從而質厚也異時皇族未嘗知經術也及陛下以經術造之而莫不欲為經術異時士人未嘗知法律也及陛下以法令進之而無不言法令以此知能以德禮示之則無不從而為德禮也夫天生蒸民有物有則所謂質厚也德禮也皆其所固有者也因性之所固有而順導之蓋無難焉在陛下加之意而已君子之德風小人之德草草上之風必偃此無足疑也小臣以疏遠妄及陛下之家事以卑賤冒言妄及百官之嗜好以聖學之廣淵而道尋常之務以聖學之日新而言已塵之迹雖臣亦自知其疏闊也考之於古竊以為幾焉惟陛下念之哲宗初即位左司諫蘇轍上奏曰臣伏見皇帝陛下以至孝純仁承統踐阼太皇太后陛下以聰明睿智親攬庶政二聖協德以幸天下曾未期嵗而敝事稍去寬政復行元元之民免於流離之患蒙更生之福海內釋然無意外之憂不勝幸甚伏惟陛下恭勤祇畏發於天性猶復選於羣臣增廣諫員求直言以自助天下之士聞風相慶臣實何人得於今日備位於此然臣聞帝王之治必先正風俗風俗既正中人以下皆自勉以為善風俗一敗中人以上皆自棄而為惡中人自勉於善則人主耳目衆多易與為治中人自棄於惡則臣下朋黨蕃殖易以為非蓋邪正盛衰之源未有不始於此者也昔真宗皇帝臨馭羣下奬用正人一時賢俊爭自託于明主孫奭戚綸田錫王禹稱之徒既以諫諍顯名則忠良之士相繼而起其後耄期厭事丁謂乘間將竊國命而風俗已成朝多正士謂雖懷姦慝而無與同惡謀未及發旋即流放仁宗皇帝仁厚淵默不自可否是非之論一付臺諫孔道輔范仲淹歐陽修余靖之流以言事相髙此風既行士恥以鉗口失職當時執政大臣豈盡皆賢然畏忌人言不敢妄作一有不善言者即至隨輒屏去故雖人主寬厚而朝廷之間無大過失及先帝嗣位執政大臣變易祖宗法度下至小民皆知其非而卿士大夫從風而靡則風俗之變於此見矣是時惟有吕誨范鎮等明言其失二人既已得罪臺諫有以一言及之者皆紛然逐去由是風俗大敗無一人復正言者天祐皇室啓迪聖德臨政未幾而以言路為急天下竦然思見祖宗遺俗然臣自至闕廷聞臺諫封事一切留中不出既不施行又無黜責臣不勝憂疑夫朝廷所以待臺諫者不過二事言當則行不當則黜其所上封事除事干幾密人主所當獨聞須至留中其餘並須降出行遣上所以正朝廷之紀綱使無廢職業下所以全人臣之名節使無負公議若當而不行不當而不黜則上下茍且亷恥道廢風俗衰陋國將從之臣願陛下永惟邪正盛衰之漸始於臺諫修其官則聽其言言有不當隨事行遣大者可黜小者可罷使風俗一定忠言日至陛下垂拱於上羣臣肅雍於下則太平之治可立而待也惟陛下留神省察天下幸甚元祐元年殿中侍御史孫升上奏曰臣伏以先王修心治性之道載於六藝學士大夫有窮年沒世不能究其倣佛至於治家居官修身事上不盡其誠不合於義者多矣况所謂道德性命之奧乎比來京都士大夫顧不自信其學乃求問於浮屠之門其為愚惑甚矣臣訪聞慧林法雲士大夫有朝夕遊息於其間而又引其家婦人女子出入無間參禪入室與其徒雜擾昏暮而出恬然不以為怪此於朝廷風化不為無損伏望聖慈特降指揮應婦人不得以參請為名輒入禪院如違止坐夫子仍令開封府於諸禪院門曉示庶幾士大夫之家稍循禮法不辱風化八年侍講學士范祖禹上旌孝劄子曰臣先修神宗皇帝實録伏見元豐六年資州奏資陽縣民支漸於熙寧中喪母纍年始克葬因廬墓側日三時號慕肘行膝步自負土起墳初有雙白雀徘徊松上明年有一狸馴墳側觀漸上土又明年夏每當午培墳日色炎盛輒有隂雲蔽覆即遇霖雨方負土時亦暫霽止又有異烏一目如丹至漸哭嘗悲鳴向漸夜有二狐狸呼繞如巡警之狀久之有烏羣集內一白烏獨日至漸培墳處回旋後又有五色雀萬餘隨漸行哭十日而去漸已年七十每號慟涕淚如雨日唯食脫粟飯不盥手濯足所衣苴麻至爛碎鬚髮亦皆斷亂見者為之惻楚所居鄰人勾氏之子自娶妻即棄其親不養觀漸至行即夫婦感慟即日迎其親還舍朝夕奉侍不少懈漸精誠格物諸祥屢至變其里俗乞旌賞之詔賜粟帛臣今因修正史再牒資州會問支漸事迹恐有未盡及要見本人存亡據資州今年七月回申資陽縣追到支漸取問漸見年八十與妻阿王同嵗夫妻各無疾恙漸自培墳三年歸家後於元祐五年內白髮退落再生黑髮及四齒已落復生今身體輕健二時飲食如舊臣竊謂支漸以匹夫行孝能感天祐助報以壽考康寧之福在於朝廷理宜奬勸伏況先帝已賜粟帛付之史官今漸八十告存伏望聖慈特授漸一長史助教或更優與名目旌其至行可以激勵風俗有補孝治之化哲宗時畢仲遊乞理會河東土俗埋葬劄子曰臣見河東土風淳固盜賊希少人民耕田力作衣食至薄而罕敢為非比之他方獄司刑罰十無二三然其俗勤於養生怠於送死非士大夫之家中民以下親戚喪亡即焚其尸納之缸中寄放僧寺與墓户之家類不舉葬蓋雖上户亦有不葬而焚之者乃刺史縣令不為條教而勸勉有所不至之過也中間本路臣僚嘗擘畫奏請官置圍地令寺院僧人守視收葬有主無主骨殖仍得朝旨每嵗或間嵗度僧一人至今不廢甚大惠也但寺院既附城郭即所收葬骨殖恐止及城郭之內與近鄉人户如僻小州軍窮鄉遠道之民未舉葬者勢或不能相及又官圍地有限葬且無餘兼肯於官圍地雜葬者多是小民之家中户以上既安風俗不自舉葬又耻與小民雜葬官圍之中往往依舊焚燬不葬風俗未變也臣願明敕本路守令隨其土俗制為葬埋之法務從省儉但不焚毁而棺斂藏諸地下即可稍事華飾非晉俗所能堪也中民以上如此以善意勸勉勿純驅以刑罰使人人自葬其親戚下户無主骨殖即任從官圍掩瘞其間家力可以舉葬養生勤送死怠安於故俗不從朝廷詔令與州縣條教尚敢焚燬或年嵗深遠不葬者裁之以法使於愧恥之外知有科禁則河東不葬之俗庶幾可革存亡幽顯各得其所自然和氣可召風俗尤美乞朝廷加意劉涇上奏曰臣聞先王以厚俗為本俗不厚則本不固此天下所由亂也方三王盛時政俗俱朴上下之接如膠漆親戚之間如室家而伐木行葦之詩忠厚為辭歷幾千年而波澤之流無有窮已秦起於孤絶斧肉六國遂奄九有攻守同道一切以殘忍濟而政弊俗惡出子分贅遂成氣習父子母婦不能保其綢繆殺伐不義起於謦咳之間胡越生於同堂合席之上賈誼有借父耰鋤慮有德色母取箕帚立而誶語之説自秦漢以來大抵風俗厚者易守而享厯長風俗薄者難守而享厯短夫禮義忠信所以維持大物者盍可斷廢哉細民罔罔惟利是嗜巢分穴析不翅禽蟻而運大物者反緩風俗汲汲以富國強兵為根株使異政殊俗如此則相招以趨死地而已國雖富何恃而守兵雖強何守而不亡也哉陛下以天性事兩宫以人倫友仲季孝友之化可謂蟠極無愧舜矣然百年之風俗未厚如三王而平居無憂輒倣秦人之殘薄睽乖者殆是也傳習安固自以為康莊而一鄉小國孝慈之家無幾焉矯極過秦則至身剔肌膚以自鳴孝夫以盛德之流行謂宜淪其肺膺而為秦轉漢尚以滋太息者法過而恩衰事勝而情惡故也今法母改適於夫為義絶而其子非有犯則各相義絶於夫以懲寡妻不節之愆有犯同母以懲惡子不情之罪固善矣然至使父死母弱其子誘使之改從母不出畿而兄弟遂以不母遇焉析生異炊以和養其妻子他日其母丐於其門餌以芻豢之餘食者鮮矣一陷於誘餌而流離孤弱不遇日暮而母子相失可以愁絶此與秦俗何算焉天下不知幾幾而江淮之間尤為橫惡使母不能安其室而去尚誅以不子况誘而弄之哉所謂同居接繼至能養成前夫之子者於法得資給之此已足救孱薄之俗也而獨於改適貧不能生棄其夫而歸者子母追復合雖已析生異炊皆還之俱貧不能自存者非如此則惡子奪其私而弱母得其所矣蓋人情不安室而去則雖貧孰肯棄其夫凡棄其夫而歸者必非其本心而惡子之穽者矣父子既無親繼之相疑而母子乃有復合之相愛豈不善哉陛下孝友至矣而臣言及此乃陛下矍然回車勝母之閭者也徽宗初即位監察御史遊酢上論士風之壞疏曰臣聞天下之患莫大於士大夫無耻士大夫至於無恥則見利而已不復知有義如入市而攫金不復見有人也始則衆笑之少則人惑之久則天下相與而效之莫之以為非也士風之壞一至於此則錐刀之末將盡爭之雖殺人而謀其身可為也迷國以成其私可為也草竊姦宄奪攘矯虔何所不至而人君尚何所賴乎古人有言禮義亷恥謂之四維四維不張國非其有也今欲使士大夫人人自好而相髙以名節則莫若朝廷之上倡清議於天下士有頑頓無恥一不容於清議者將不得齒於縉紳親戚以為羞鄉黨以為辱夫然故士之有志於義者寧飢餓不能出門户而不敢喪節寧厄窮終身不得聞逹而不敢敗名亷恥之俗成而忠義之風起矣人主何求而不得哉惟陛下留意徽宗時禮部侍郎張叔夜上論士風不振劄子曰臣竊以天下官吏非不衆廩祿非不厚所宜奉承命令究心政術砥礪名節以副陛下惠養元元修明法度之意而乃務於茍簡趣辦目前以恤民隱者為迂儒以親庶務者為俗吏見利茍進而人不以為非忘公自營而心不以為愧懷祿養交慢令曠職士氣不振節義不立衆志相扇懼成風俗雖然未可以此期天下之士亦幸陛下留神采聽或下詔丁寧以訓飭之或因事奬進以激勸之則士風可革欽宗靖康元年監察御史余應求上論風俗由大臣倡導疏曰臣聞大公至正之道不行於時久矣人懷私意士失常心亷恥道喪名節不立諂諛相夸詐誕成風以全身保位為賢以竭忠盡節為愚以奔競進取為能以恬退自守為拙以刻剝辦事為有才以重厚長者為無用廢直道而徇私情背公家而任已恩財賄交通於權門侈靡濫溢於私室憎亷潔為矯詐惡正直為介僻敢言者謂之狂妄正論者謂之迂闊奮不顧身者衆必沮之賢有才者則妒忌之背君忘國不啻路人卑賤之態甚於狗彘禮教陵夷風俗大壞日益滋甚莫可禁止原其所以致此者實用事大臣非其人無以倡導之故也夫大臣者百僚之表萬民之視效也大臣欺君而罔上故小臣誕謾以求合大臣持祿以固寵故小臣僥幸以求進大臣貪冒而不法故小臣並緣而為姦大臣聲色以自娛故小臣奢縱以相高夫公卿士大夫所為若爾欲望士行之正直風俗之純厚豈不難哉作而興之理若有待陛下以甚盛之德照臨百官進用忠良退斥浮偽開公正之路杜邪枉之門抑僥幸之求受讜直之言節儉以化天下憂勤以帥羣辟破朋黨以消小人用忠厚以進君子勿昵於嬖幸勿徇於私謁勿間於讒諂大公至正之道復見於今日矣昔者文王節儉正直在位化之羔羊之詩是也今搢紳之徒下至民庶莫不化陛下節儉之德矣至於在位皆正直臣猶以為未也蓋朝廷之上名器未謹號令未孚好惡未明賞罰未當因緣僥幸者未盡斥姦贓狼籍者未盡誅冒恩濫賞者未盡裁抑諂諛頗僻者尚或隂肆其謀躁進茍合者尚或得請其私背公死黨之習未除附下罔上之風猶在此而不革何以為治願下明詔申嚴訓飭一有不悛重置于理庶幾士風丕變民俗歸厚以副陛下維新之政欽宗時李綱論用人材以激士風劄子曰臣聞人主所以共治天下者莫大於人材所以陶成天下者莫先於士風人材貴於衆多故濟濟多士文王以之寧士風貴於淳厚故古者長民從容有常則民德以之歸厚二者天下之大本不可不察也陛下廣學校以作成之重爵祿以官使之天下之士雲蒸而霧集人材可謂衆多矣至於士風猶有可議者在於朝廷有以勸沮之而已狃於虛枉而務虛偽此士風所以未厚也欲士無浮華之習莫若舉惇朴以鎮之急於進取而事奔競此士風所以未厚也欲士無奔競之操莫若崇靜退以率之夫衷實惇朴靜退之士非內有所養而見善明用心剛者不能也內有所養而見善明用心剛者以類而進則立朝必有可觀者臨利害必有不可奪者又豈徇情於流俗之間為哉臣愚伏望聖慈親灑宸翰詔二三大臣進用人材必以激勸士風為先務奬衷實而察虛偽舉惇朴而黜浮華崇靜退而抑奔競則士風厚而天下之俗舉歸於忠厚之域矣此宗社無窮之計也許翰上言曰臣聞國家之基繫風俗之盛衰風俗之變視大臣之進退祖宗以來大臣有體入則弼廟堂出則奠藩鎮進退之度昭然可觀比年大臣重去位而輕守節既解政機猶復顧望躊躇闕廷以幸復用故蔡京王黼盤踞都城如古柏根不可動移數十年間風俗大壞禮義亷耻之節亡而寵祿姑息之欲勝此既往不可追已矯而正之要在今日伏自陛下即位以來則白時中李邦彥王孝迪蔡懋相繼罷政皆領內祠不去朝著此蹈京黼之轍迹違祖宗之法令臣竊度邦彥方受恩旨必將禮辭伏願陛下因此罷之則時中等亦將自請上不失國家寵遇之恩下以全大臣進退之義明示大正以定國經天下幸甚歷代名臣奏議卷一百十六
