body:
  text: 歷代名臣奏議卷一百五明楊士竒等撰仁民周文王作靈臺及為池沼掘地得死人之骨吏以聞於文王文王曰更葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求主遂令吏以衣冠更葬之天下聞之皆曰文王賢矣澤及朽骨又況於人乎或得寶以危國文王得朽骨以喻其意而天下歸心焉文王問於吕望曰為天下若何對曰王國富民霸國富士僅存之國富大夫亡道之國富倉府是謂上溢而下漏文王曰善對曰宿善不祥是日也發其倉府以振鰥寡孤獨武王問於太公曰治國之道若何太公對曰治國之道愛民而已曰愛民若何曰利之而勿害成之勿敗生之勿殺與之勿奪樂之勿苦喜之勿怒此治國之道使民之義也愛之而已矣民失其所務則害之也農失其時則敗之也有罪者重其罰則殺之也重賦斂者則奪之也多徭役以罷民力則苦之也勞而擾之則怒之也故善為國者遇民如父母之愛子兄之愛弟聞其飢寒為之哀見其勞苦為之悲武王克殷召太公而問曰將奈其士衆何太公對曰臣聞愛其人者兼屋上之烏憎其人者惡其餘胥咸劉厥敵使靡有餘何如王曰不可太公出邵公入王曰為之奈何邵公對曰有罪者殺之無罪者活之何如王曰不可邵公出周公入王曰為之奈何周公曰使各居其宅田其田無變舊新唯仁是親百姓有過在豫一人武王曰廣大乎平天下矣凡所以貴士君子者以其仁而有德也魯哀公問政於孔子對曰政有使民富且夀哀公曰何謂也孔子曰薄賦斂則民富無事則逺罪逺罪則民夀公曰若是則寡人貧矣孔子曰詩云愷悌君子民之父母未見其子富而父母貧者也齊桓公之平陵見家人有年老而自養者公問其故對曰吾有子九人家貧無以妻之吾使傭而未返也桓公取外御者五人妻之管仲入見曰公之施惠不亦小矣公曰何也對曰公待所見而施惠焉則齊國之有妻者少矣公曰若何管仲曰令國丈夫二十而室女子十五而嫁公問管仲曰王者何貴曰貴天桓公仰而視天管仲曰所謂天者非謂蒼蒼莽莽之天也君人者以百姓為天百姓與之則安輔之則彊非之則危背之則亡詩云人而無良相怨一方民怨其上不遂亡者未之有也景公覩嬰兒有乞於途者公曰是無歸夫晏子對曰君存何為無歸使養之可立而以聞公遊於夀宫覩長年負薪而有飢色公悲之喟然歎曰令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之不室者論而供秩焉景公曰諾於是老弱有養鰥寡有室公嘗賞賜及後宫文繡被臺榭菽粟食鳬鴈出而見殣謂晏子曰此何為死晏子對曰此餒而死公曰嘻寡人之無德也何甚矣晏子對曰君之德著而彰何為無德也景公曰何謂也對曰君之德及後宫與臺榭君之玩物衣以文繡君之鳬鴈食以菽粟君之營內自樂延及後宫之族何為其無德也顧臣願有請於君由君之意自樂之心推而與百姓同之則何殣之有君不推此而苟營內好私使財貨偏有所聚菽粟布帛腐於囷府惠不遍加于百姓公心不周乎國則桀紂之所亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德公布之於天下則湯武可為也一殣何足恤哉邾文公卜徙於繹史曰利於民不利於君君曰苟利於民寡人之利也天生蒸民而樹之君以利之也民既利矣孤必與焉侍者曰命可長也君胡不為君曰命在牧民死之短長時也民苟利矣吉孰大焉遂徙於繹楚人有獻魚楚王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也楚王曰子不知漁者仁人也蓋聞囷倉粟有餘者國有餓民一本作下民多飢後宫多幽女者下民多曠夫餘衍之蓄聚於府庫者境內多貧困之民皆失君人之道故厨庖有肥魚廄有肥馬民有餓色是以亡國之君藏於府庫寡人聞之久矣未能行也漁者知之其以此諭寡人也且今行之於是乃遣使恤鰥寡而存孤獨出倉粟發幣帛而振之漢髙祖十二年相國蕭何為民請曰長安地狹上林中多空地棄願令民得入田毋收槀為禽獸食上大怒曰相國多受賈人財物乃為請吾苑乃下相國廷尉械繫之數日王衛尉侍前問曰相國何大罪陛下繫之暴也上曰吾聞李斯相秦皇帝有善歸主有惡自與今相國多受賈豎金而為民請吾苑以自媚於民故繫治之王衛尉曰夫職事苟有便於民而請之真宰相事陛下奈何乃疑相國受賈人錢乎且陛下距楚數嵗陳豨黥布反陛下自將而往當是時相國守關中搖足則關以西非陛下有也相國不以此時為利今乃利賈人之金乎且秦以不聞其過亡天下李斯之分過又何足法哉陛下何疑宰相之淺也髙帝不懌是日使使持節赦出相國武帝拜卜式為中郎式初不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊嵗餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去毋令敗羣上竒其言欲試使治民拜緱氏令緱氏便之魏文帝時御史大夫王朗上疏曰兵起以來三十餘年四海蕩覆萬國殄瘁賴先王芟除寇賊扶育孤弱遂令華夏復有綱紀鳩集兆民於兹魏土使封鄙之內雞鳴狗吠達於四境蒸庶欣欣喜遇升平今逺方之寇未賔兵戎之役未息誠令復除足以懷逺人良宰足以宣德澤阡陌咸修四民殷熾必復過於曩時而富於平日矣易稱勑法書著祥刑一人有慶兆民賴之慎法獄之謂也昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無寃死之囚丁壯者得盡地力則無饑饉之民窮老者得仰食倉廩則無餒餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之纍壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其業威罰以抑其强恩仁以濟其弱振貸以贍其乏十年之後既笄者必盈巷二十年之後勝兵者必滿野矣明帝時殺禁地鹿者身死財産沒官有能覺告者厚加賞賜廷尉髙柔上疏曰聖王之御世莫不以廣農為務儉用為資夫農廣則榖積用儉則財畜畜財積榖而有憂患之虞者未之有也古者一夫不耕或為之飢一婦不織或為之寒中間已來百姓供給衆役親田者既減加頃復有獵禁羣鹿犯暴殘食生苖處處為害所傷不資民雖障防力不能禦至如滎陽左右周數百里嵗略不收元元之命實可矜傷方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下覽先聖之所念愍稼穡之艱難寬放民間使得捕鹿遂除其禁則衆庶永濟莫不悅豫矣柔又上疏曰臣深思陛下所以不早取此鹿者誠欲使極蕃息然後大取以為軍國之用然臣竊以為今鹿但有日耗終無從得也何以知之今禁地廣輪且千餘里臣下計無慮其中有虎大小六百頭狼有五百頭狐萬頭使大虎一頭三日食一鹿一虎一嵗百二十鹿是為六百頭虎一嵗食七萬二千頭鹿也使十狼日共食一鹿是為五百頭狼一嵗共食萬八千頭鹿鹿子始生未能善走使十狐一日共食一子比至健走一月之間是為萬狐一月共食鹿子三萬頭也大凡一嵗所食十二萬頭其鵰鶚所害臣置不計以此推之終無從得多不如早取之為便也吳大帝時徴役繁數重以疫癘民戶損耗行騎都尉駱統上疏曰臣聞君國者以據疆土為彊富制威福為尊貴曜德義為榮顯永世𦙍為豐祚然財須民生彊賴民力威恃民勢福由民殖德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寧后非衆無以辟四方推是言之則民以君安君以民濟不易之道也今彊敵未殄海內未乂三軍有無已之役江境有不釋之備徴賦調數由來積紀加以殃疫死喪之災郡縣荒虛田疇蕪曠聽聞屬城民戶浸寡又多殘老少有丁夫聞此之日心若焚燎思尋所由小民無知既有安土重遷之性且又前後出為兵者生則困苦無有溫飽死則委棄骸骨不反是以尤用戀本畏逺同之於死每有徴發羸謹居家重纍者先見輸送小有財貨傾居行賂不顧窮盡輕剽者則迸入險阻黨就羣惡百姓虛竭嗷然愁擾愁擾則不營業不營業則致窮困致窮困則不樂生故口腹急則奸心動而攜叛多也又聞民間非居處小能自供生産兒子多不起養屯田貧兵亦多棄子天則生之而父母殺之既懼干逆和氣感動隂陽且惟陛下開基建國乃無窮之業也彊鄰大敵非造次所滅疆場常守非朞月之戍而兵民減耗後生不育非所以歷逺年致成功也夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝是以聖王重焉禍福由之故與民消息觀時制政方今長吏親民之職惟以辦具為能取過目前之急少復以恩惠為治副稱陛下天覆之仁勤恤之德者官民政俗日以雕弊漸以陵遲勢不可久夫治疾及其未篤除患貴其未深願陛下少以萬機餘閒留神思省補復荒虛深圖逺計育殘餘之民阜人財之用參曜三光等崇天地臣統之大願足以死而不朽矣帝感統言深加意焉嘉禾六年謝淵謝宏等各陳便宜欲興利改作以事下上大將軍右都護陸遜遜議曰國以民為本彊由民力財由民出夫民殷國弱民瘠國彊者未之有也故為國者得民則治夫之則亂若不受利而令盡用立效亦為難也是以詩歎宜民宜人受祿于天乞垂聖恩寧濟百姓數年之間國用少豐然後更圖烏程侯皓徙武昌揚土百姓泝流供給以為患苦又政事多謬黎元窮匱左丞相陸凱上疏曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者其樂不久而亡夫民者國之根也誠宜重其食愛其民民安則君安民樂則君樂自頃年以來君威傷於桀紂君明暗於奸雄君惠閉於羣孽無灾而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖而諸公卿媚上以求愛困民以求饒導君於不義敗政於淫俗臣竊為痛心今鄰國交好四邉無事當務息役養士實其廪庫以待天時而更傾動天心搔擾萬姓使民不安大小呼嗟此非保國養民之術也臣聞吉凶在天猶影之在形響之在聲也形動則影動形止則影止此分數乃有所繫非在口之所進退也昔秦所以亡天下者但坐賞輕而罰重政刑錯亂民力盡於奢侈目眩於美色志濁於財寶邪臣在位賢哲隱藏百姓失業天下苦之是以遂有覆巢破卵之憂漢所强者躬行誠信聽諫納賢惠及負薪躬請岩穴廣采博察以成其謀此往事之明證也近者漢之衰末三家鼎立曹失綱紀晉有其政又益州危險兵多精强閉門固守可保萬世而劉氏與奪乖錯賞罰失所君恣意於奢侈民力竭於不急是以為晉所伐君臣見虜此目前之明驗也臣暗於大理文不及義智慧淺劣無復冀望竊為陛下惜天下耳東晉孝武帝時豫章太守范寧上疏曰臣聞道尚虛簡政貴平靜坦公亮於幽顯流子愛於百姓然後可以經夷嶮而不憂乘休否而常夷先王所以致太平如此而已今四境晏如烽燧不舉而倉庾虛耗帑藏空匱古者使人嵗不過三日今之勞擾殆無三日休停至有殘形翦髮以要復除生兒不復舉養鰥寡不敢妻娶豈不怨結人鬼感傷和氣臣恐社稷之憂積薪不足以為喻臣久欲粗啓所懷日復一日今當永離左右不欲令心有餘恨請出臣所啓事付外詳擇安帝時劉毅以喪師乞解任降為後將軍尋轉衛將軍開府儀同三司江州都督毅上表曰臣聞天以盈虛為運政以損益為道時否而政不革人凋而事不損則無以救急病於己危拯塗炭於將絶自頃戎車屢駭干戈溢境所統江州以一隅之地當逆順之衝自桓𤣥以來驅蹙殘敗至乃男不被養女無匹對逃亡去就不避幽深自非財殫力竭無以至此若不曲心矜理有所釐改則靡遺之歎奄焉必及夫設官分職軍國殊用牧養以息務為大武略以濟事為先兼而領之蓋出於權事因藉既久遂似常體江州在腹心之內慿接揚豫藩屏所倚實為重復昔胡寇縱逸朔馬臨江抗禦之宜蓋權爾耳今江左區區戶不盈數十萬地不踰數千里而統旅鱗次未獲減息大而言之足為國耻況乃地在無虞而猶置軍府文武將佐資費非要豈所謂經國大情揚湯去火者哉自州郡邉江百姓遼落如郵亭險閡畏阻風波轉輸往復恆有淹廢又非所謂因其所利以濟其弊者也愚謂宜解軍府移鎮豫章處十郡之中厲簡惠之政比及數年可有生氣且屬縣凋散示有所存而役調送迎不得止息亦謂應隨宜并合以簡衆費刺史庾悅自臨蒞以來甚有恤隱之誠且綱維不革自非綱目所理尋陽接蠻宜示有遏防可即州府千兵以助郡戍後魏太武帝時南州大水百姓阻飢尚書令巨鹿公劉潔奏曰臣聞天地至公故萬物咸育帝王無私而黎民戴賴伏惟陛下以神武之姿紹重光之緒恢隆大業育濟羣生威之所振無思不服澤之所洽無逺不懷太平之治於是而在自頃邉寇內侵戎車屢駕天資聖明所在克殄方難既平皆䝉酬錫勳髙者受爵功卑者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食它所臣聞率土之濵莫非王臣應加哀矜以鴻覆育今南摧彊寇西敗醜虜四海晏如人神協暢若與兆民共享其福則惠感和氣蒼生悅樂矣世祖從之於是復天下一嵗租賦宣武帝時侍中源懷表奏曰景明以來北蕃連年灾旱高原陸野不任營殖唯有水田少可菑畝然主將參僚専擅腴美瘠土荒疇以給百姓因此困弊日月滋甚諸鎮水田請依地令分給細民先貧後富若分付不平令一人怨訟者鎮將已下連署之官各奪一時之祿四人已上奪祿一周北鎮邉蕃事異諸夏往日置官全不差别沃野一鎮自將已下八百餘人黎庶怨嗟僉曰煩猥邉隅事鮮實少畿服請主帥吏佐五分減二詔從之隋高祖以山東民多流冗遣使按檢又欲徙民北實邉塞皇太子勇上書諫曰竊以導俗當漸非可頓革戀土懷舊民之本情波迸流離蓋不獲已有齊之末主暗時昏周平東夏繼以威虐民不堪命致有逃亡非厭家鄉願為羈旅加以去年三方逆亂賴陛下仁聖區宇肅清鋒刃雖屏瘡痍未復若假以數嵗沐浴皇風逃竄之徒自然歸本雖北夷猖獗嘗犯邉烽今城鎮峻峙所在嚴固何待遷配以致勞擾臣以庸虛謬當儲二寸誠管見輒以塵聞上覽而嘉之唐太宗即位初民部尚書裴矩奏民遭突厥暴踐者戶請給絹一匹上曰朕以誠信御下不無虛有存恤之名而無其實戶有大小豈得雷同給賜乎於是計口為率貞觀中上謂侍臣曰凡事皆須務本國以人為本人以衣食為本凡營衣食以不失時為本夫不失時者唯在人君簡靜乃可致耳若兵戈屢動土木不息而欲不奪農時其可得也王圭曰昔秦皇漢武外則窮極兵戈內則崇侈宫室人力既竭祻難遂興彼豈不欲安人乎失所以安人之道也亡隋之轍殷鑒不逺陛下親承其弊知所以易之然在初則易終之實難伏願慎終如始方盡其美太宗曰公言是也夫安人寧國唯在於君君無為則人樂君多欲則人苦朕所以抑情損欲尅已自勵耳帝又嘗謂黃門侍郎王圭曰隋開皇十四年大旱人多飢乏是時倉庫盈溢竟不許賑給乃令百姓逐糧隋文不憐百姓而惜倉庫比至末年計天下儲積得供五六十年煬帝恃此富饒所以奢華無道遂致亡滅煬帝失國蓋亦由其父凡理國者務積於人不在盈其倉庫古人云百姓不足君孰與足但使倉庫可備凶年何須儲蓄後嗣若賢能自保其天下如其不肖多積倉庫徒益其奢侈危亡之本也太宗曰隋煬帝求覓無已內則淫蕩於聲色外則勦人以黷武遂至滅亡朕覩此但以清靜撫之今百姓自言安樂豈知朕之力也魏徴對曰堯舜擊壤而歌亦云帝力何有於我哉只將此事以為太平百姓亦不知由主上安之也太宗曰朕今安養百姓豈求其知但論理亂在時君耳徴對曰此事非知之難終行之難太宗曰隋時百姓假有財物豈能自保自我有天下以來存心撫養無所科差人人皆得營産業守其資財即我所賜向使我徴求無已雖數賞賜亦不如不得魏徴對曰堯舜在上百姓亦云耕田而食鑿井而飲含哺鼓腹而云帝有何力於其間哉今陛下如此含養百姓可謂日用而不知矣又奏曰昔晉文公出畋逐獸碭入大澤迷不知所出其中有漁者文公謂曰我若君也道安從出我且厚賜汝漁者曰臣願有獻文公曰出澤而受之於是送出澤文公命曰子之所欲教寡人者何也願受之漁者曰鴻鵠保大海之中厭而數移徙之小澤則必有繒丸之憂黿鼉保淵厭而出之淺渚則必有網羅釣射之憂今君逐獸碭入至此何行之大逺也文公曰善謂從者記漁者名漁者曰君何以名為君其尊天事地敬社稷固四國慈愛萬人薄賦斂輕租稅者臣亦與焉君不尊天事地不敬社稷不固四國外失禮於諸侯內逆人心一國流亡漁者雖有厚賜不得保也遂辭不受太宗曰卿言是也太宗曰今人與古人同邪魏徴對曰人多以古人淳朴今人澆薄以臣量之勢亦相似太宗曰今之人固不及古古之君臣為化唯以百姓心為心近代帝王唯損百姓以適其欲朕今與公等雖不及古然須以百姓為心不得有損於物而自奉也太宗問拓設使人曰拓設兵馬今有幾許對曰見有四千餘兵舊有四萬餘人太宗曰為君之道必須先存百姓若損百姓以奉其身如割脛以自啖腹飽而身斃又曰身安天下安必須先正其身未有表正而影曲上理而下亂者朕每思傷其身者不緣外物皆由嗜欲以成其祻若耽嗜滋味玩悅聲色所欲既多所須亦大既妨政事又擾生人且復出一非理之言萬姓為之解體怨讟既作離叛亦興朕每思此不敢放逸魏徴對曰古者聖哲之王亦近取諸身逺體諸物昔楚聘詹何曰未聞身理而國亂者陛下所明實古之大義高宗永徽中來濟兼太子賔客進爵為侯帝嘗從容問馭下所宜濟曰昔齊桓公出逰見老人命之食曰請遺天下食遺之衣曰請遺天下衣公曰吾府庫有限安得而給老人曰春不奪農時即有食夏不奪蠶工即有衣由是言之省繇役馭下之宜也高宗時造蓬萊上陽合璧等宫復征討四夷京師養廄馬萬匹帑廥寖虛知左史張文瓘諫曰王者養民逸則富以康勞則怨以叛秦漢廣事四夷造宫室至二世土崩武帝末年户口減半夫制治於未亂保邦於未危人罔常懷懷于有仁臣願撫之無使勞而生怨隋監未逺不可不察帝善其言賜繒錦百段為減廄馬數千武后時詔市河南河北牛羊荆益奴婢置監登萊以廣軍資監察御史張廷圭上書曰今河南牛疫十不一在詔雖和市甚於抑奪併市則價難準簡擇則吏求賄是牛再疫農重傷也高原耕地奪為牧所兩州無復丁田牛羊踐暴舉境何賴荆益奴婢多國家戶口奸豪掠買一入於官永無免期南北異宜至必生疾此有損無益也抑聞之君所恃在民民所恃在食食所資在耕耕所資在牛牛廢則耕廢耕廢則食去食去則民亡民亡則何恃為君羊非軍國切要假令蕃滋不可射利后乃止武后將建大像於白司馬坂成均祭酒平章事李嶠諫造像雖俾浮屠輸錢然非州縣承辦不能濟是名雖不稅而實稅之臣計天下編戶貧弱者衆有賣舍帖田供王役者今造像錢積十七萬緡若頒之窮人家給千錢則紓十七萬戶飢寒之苦德無窮矣中宗景龍二年中書舍人李乂諫曰江南鄉人採捕為業魚鱉之利黎元所資江湖生育無限府庫供支易殫與其拯物豈若憂人且鬻生之徒惟利斯視錢刀日至網罟年滋施之一朝營之百倍未若回救贖之錢物減貧無之徭賦活國愛人其福勝彼代宗大歷元年冬十月上生日諸道節度使獻金帛器服珍玩駿馬為夀共直緡錢二十四萬常衮上言節度使非能男耕女織必取之於人斂怨求媚不可長也請却之上不聽德宗貞元十二年京兆尹李實言於上曰今嵗京兆雖旱而禾苗甚美由是租稅皆不免人窮至壞屋賣瓦木麥苗以輸官優人成輔端為謡嘲之實奏輔端誹謗朝政杖殺之監察御史韓愈言京畿百姓窮困今年稅物徴未得者請俟來年遂坐貶陽山令憲宗時宣徽五坊小使方秋閲鷹狗所過撓官司厚得餉謝乃去下邽令裴寰才吏也不為禮因構寰出醜言送詔獄當大不恭宰相武元衡婉辭諍帝怒未置裴度見延英言寰無辜帝恚曰寰誠無罪杖小使小使無罪且杖寰度曰責若此固宜第寰為令惜陛下百姓安可罪帝色霽乃釋寰時浙西擒李錡伏法准舊例籍其家財産業送上都翰林學士裴洎李絳等上言曰李錡凶狡叛戾僭侈誅求刻剝六州之人積成不道之告陛下哀憫無告為之弔伐變愁怨之氣為發生之和歌舞聖時負戴恩德其李錡家所積錢帛皆斂於人或有酷發寃濫之徒斃其身取其貨或有枉法徴剝之吏加其罪納其財前後事狀布聞逺邇聖恩本以叛亂誅討蘇息一方今輦運錢帛播聞四海非所以戒遏亂略惠綏困窮也伏望天慈下痛哀之詔降雨露之澤將逆人財物並以賜本道代浙西百姓今年租賦則萬姓欣戴四海歌詠上覽狀嘉歎久而從之時擢李渤為庫部員外郎㑹皇甫鏄輔政務剝下佐用度而渤奉詔弔郤士美喪在道上言渭南長源鄉戶四百今才四十閺鄉戶三千而今千它州縣大抵類此推其敝始於攤逃人之賦假令十室之逃則均責未逃者若抵石于井非極泉不止誠由聚斂之臣割下媚上願下詔一賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣又言道路茀不治驛馬多死憲宗得奏咨駭即詔出飛龍馬數百給畿驛武宗㑹昌中李德裕上奏曰恤貧寬疾著於周典無告常餼存於王制國家立悲田養病置使專知開元五年宰臣宋璟蘇頲奏所稱悲田乃關釋教此是僧尼職掌不合定使專知請令京兆按此分付其家𤣥宗不許至二十二年十月斷京城乞兒悉令病坊收管官以本錢收利以給之今緣諸道僧尼盡以還俗悲田坊無人主領必恐貧病無告轉致困窮臣等商量緣悲田出於釋教並望更為養病坊其兩京及諸州各於録事耆夀中揀一人有名行謹信為鄉閭所稱者專令勾當其兩京望給寺田十頃大州鎮望給田七頃其它諸州望委觀察使量貧病多少給田五頃三二頃以充粥飰如州鎮有羡餘官錢量與置本收利最為穩便若可如此方圓不在更給田之限各委長吏處置訖聞奏後唐明宗嘗問中書侍郎馮道曰天下雖豐百姓濟否道曰榖貴餓農榖賤傷農因誦文士聶夷中田家詩其言近而易曉明宗顧左右録其詩常以自誦宋太宗太平興國三年溫仲舒拜工部郎中樞密直學士知三班院秋彗星見召對别殿仲舒以為國家平太原以來燕代之交戍守年深殺傷剽掠彼此迭見大河以北農桑廢業戶口減耗凋弊之餘極力奉邉丁壯備徭老弱供賦遺廬壞堵不亡即死邪人媚上猶云樂輸加以兵卒踐更行者辛苦居者怨曠願推恩宥以綏民庶太宗嘉納之太宗嘗燈夕設宴宰相吕䝉正侍上語之曰五代之際生靈凋喪周太祖自鄰南歸士庶皆罹剽掠下則火光上則彗孛觀者恐懼當時謂無復太平之日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人䝉正避席曰乘輿所在士庶走集故繁盛如此臣嘗見都城外不數里饑寒而死者甚衆不必盡然願陛下視近以及逺蒼生之幸也上變色不言䝉正侃然復位同列多其直諒至道一年太常博士直史館陳靖上言先王之欲厚生民莫先於積榖而務農鹽鐵𣙜酤斯為末矣按天下土田除江淮湖湘兩浙隴蜀河東諸路地里敻逺雖加勸督未遽獲利今京畿周環二十三州幅員數千里地之墾者十才二三稅之入者又十無五六復有匿里舍而稱逃亡棄耕農而事游惰賦額嵗減國用不充詔書纍下許民復業蠲其租調寬以嵗時然鄉縣擾之每一戶歸業則刺報所由朝耕尺寸之田暮入差徭之籍追胥責問繼踵而來雖䝉蠲其常租實無補於捐瘠況民之流徙始由貧困或避私債或逃公稅亦既亡遁則鄉里檢其資財至於室廬什器桑棗材木咸計其直或鄉官用以輸稅或債主取以償逋生計蕩然還無所詣以兹浮蕩絶意歸耕如授以閒曠之田廣募游惰誘之耕墾未計賦租許令别置版圖便宜從事酌民力豐寡農畝肥磽均配督課令其不倦其逃民歸業丁口授田煩碎之事並取大司農裁決耕桑之外令益樹雜木蔬果孳畜羊犬雞豚給授桑土僭擬井田營造室居使立保伍養生送死之具慶弔問遺之資並立條制候至三五年間生計成立即計戶定征量田輸稅若民力不足官借糴錢或以市餱糧或以營耕具凡此給受委於司農比及秋成乃令償直依時價折納以其成數關白户部帝覽之喜令靖條奏以聞真宗時知處州楊億上奏曰臣獲領郡符合求民瘼苟自圖於緘默是上負於憂勤儻有救於瘡痍亦無辭於鼎鑊臣竊見龍泉縣松瞿小梅松源三處酒坊一年共趂辦額錢一阡玖貫捌伯一拾玖文足並是勾當人自備麴米本柄醖造沽賣收趂上件淨利錢數納官自來州司枷項差勒人員軍將須管甘認勾當並皆破貨家業及身命償官并均攤干繫人填納臣自到任所深訪其由蓋是往年王師討伐江南龍泉乃其境上錢俶多調發卒士防遏邉陲此時𣙜酤甚獲其利縣民張延熙貪婪無識遂入狀添起虛額買襆勾當自江南平定錢俶進納土疆書軌既同幅員無外所遣丁卒皆已罷歸遂致酤賣不行課利虧失元買襆户並盡底破賣家産填納不足只有身命償官州司又不敢陷失舊額須至差勒平民以至籍入家財通納身命蠧傷和氣流患生人百姓亦嘗詣闕披陳詔下三司相度雖行刺問尋便供申所司唯聚斂是圖陸沈無報瘡痍益甚寃痛彌深又況龍泉縣連接七閩彌亙千里山川險絶閭舍稀踈所是三處酒坊並皆越在草莽數間小屋僅庇風霜雖有𣙜酤之名全無醖釀之具蓋是勾當之人相承敗闕興創不成須至破賣田園遭離刑辟見今勾當人並係徴缺司枷項徴督每三數日一度就科蓋省司之益峻課程官吏之懼於書罰縱加決責何以徴填擠溝壑而可期扣閶闔而無路臣備見此事深究其由自以受兩朝之聖知忝百城之憂寄有所聞見豈敢緘藏雖獲罪以猶言庶期死而得請伏望皇帝陛下念逺民之塗炭採微臣之芻蕘更詢相府之訏謨勿令計司之關決儻謂狂瞽之有實所侵功利以非多舊額之中減其大半人乃受賜天實聽卑茍事下於有司必謹守於舊制王澤既壅民病愈滋雖龔黃臨之亦不能為理臣伏見陛下踐阼之始盡放天下逋缺寰海之內歌舞太平雖甚盛德無以加此又自守郡之後夤奉詔書莫不以優恤為先未嘗以課利為急百姓既足長府自然有餘一人向隅滿堂為之不樂臣忝預諫列獲佩郡章早受特達之知敢辭進越之罪祈天俟命伏切愚𠂻干犯宸嚴無任戰汗兢惶激切之至仁宗景祐四年蘇舜欽上疏曰臣聞矜孤養老邦家之大政恤貧寬疾冊書之格言竊見前代皆置悲田養病坊唐至長安中命使專領亦選名德僧徒兼掌其事縣官出錢收利籍而用之開元中丞相宋璟上言乞罷中㫖不從㑹昌沙汰僧尼李德裕以悲田出於釋氏遂易名而增修國家富有四海生齒實繁山澤之間舉無遺利賦稅之外復有逺倉或水旱為災則流亡相屬遇慈惠之吏必率斂而飼養逢苟且之政必枕藉而死亡本非墯慵多值歉乏又京城之內丐乞者多飢寒所侵往往殘廢或自折支體困入埿塗號呼里閭呻吟道路聚為祲厲甚傷化風陛下仁被草木惠及昆蟲惟此天窮未霑王澤臣欲乞依有唐故事創置悲田養病坊州郡並以曹官領之仍於髙年擇信行可稱者三兩人與僧官同切管句三京給田十頃望鎮州七頃諸州軍等第給田以充粥食有羡餘官錢置本收利以備醫藥十嵗已下八十已上仰州縣察訪無家可歸者亦令看養如此則大益仁化無虧國風頌聲喧𫝊上資聖算和氣浹洽可召豐年參知政事范仲淹上奏曰臣聞淳化中太宗皇帝以邉户飢荒多賣人口入蕃頗憫惻之特遣使以物貨收贖各還父母此人君之盛德也近年緣邉漢户被西戎虜不少今既通人使乞出聖意以內帑物帛委邉臣漸次收贖陷蕃漢户人口各還其家使父母子孫再得完聚則不惟邉上生民恩淪骨髓必也至德動天降祐王室書之史䇿光于後代乞不降出慶歷二年右正言歐陽修論乞止絶河北伐民桑柘劄子曰臣風聞河北京東諸州軍見修防城器具民間配率甚多澶州濮州地少林木即今澶州之民為無木植送納盡伐桑柘納官臣謂農桑是生民衣食之源租調繫國家用度之急不惟絶其根本使民無以為生至於供出賦租將來何以取足臣伏思兵興以來天下公私匱乏者殆非敵人為患全由官吏壞之其誅剝疲民為國斂怨蓋由郡縣之吏不得其人故臣前後纍乞澄汰天下官吏者蓋備見其弊如此也今澶州之民驟罹此苦豈非長吏非才處事乖繆所致兼聞澶州民桑已伐及三四十萬株竊慮它郡盡皆效此伏乞早賜指揮禁絶其合用材木仍乞下轉運司令相度漸次那容準備其澶州人户經伐桑者乞差官檢覆量多少與權免將來絲綿紬絹之稅竊以軍國所須出自民力必欲外禦契丹之患常須優養河朔之民若使道路怨嗟人心離叛則內外之患何以枝梧伏望聖慈特賜留意皇祐二年知諫院包拯上奏曰臣伏覩明堂赦書應今日以前天下缺負官物并於干繫保人名下催納元非侵欺盜用或雖是侵盜見今本家并干繫保人內委無抵當者並令屬及轉運司保明聞奏其纍經官吏保明三司未與除放者限赦到一月內令本處先具自來保明度數申本路轉運司疾速保明繳連聞奏當議並與除放此誠陛下憂恤元元如是之至也然臣歷觀前後赦文凡有恩貸無不周悉而有司往往廢格不即遵行臣竊聞真宗咸平年中親御便殿放三司所引諸色違缺凡四千一百六人計物八萬三千數蓋先帝以恩詔每宥逋責有司必究問本末或縲係追逮益為煩擾故命以籍引對而面釋之大哉先帝憂民軫物之心唯恐不及伏望陛下特降指揮委三司將應係諸色逋缺人各具因依一一類聚備録申奏並令引見詳酌除放如此則恩出於上弊絶於下矣拯又上奏曰臣伏聞先帝時冬十二月雷震司天監奏主國家發惠布澤未及黎庶上召輔臣謂之曰此上天所以警朕也且河北關西戍兵未息民人勞止又三司轉運使率擾之事名類實繁大者宜即減省小者悉蠲除之將來改元赦書卿等宜盡采民弊著為條目務澤及黎庶也大哉先帝愛民之心如是之至以陛下求治之心亦先帝之心也臣竊聞見陜西用兵之後朝廷急於饋運多所經畫丁夫征賦有常數矣若踰之則盡為無名之率其它酒稅錢榖之類亦有定額矣而貪於寵利者唯務聚斂掊克於下前後務以相勝前者增幾十萬以圖厚賜後者則又增幾十萬以圖優賞日甚一日何窮之有而民力困且竭矣所以瘡痍天下于今未息用是觀之其實豈為國乎若果為國豈不以愛民為念哉禮曰與其有聚斂之臣寧有盜臣則先王顧生民何如哉今雖用度微窘而諸州旱潦相繼亦當寬養黎庶固其大本大本不固則國家從何而安哉況朝廷比下詔令未嘗不以寬民恤物為先而有司往往不即遵行是陛下有憂民之心而民無繇知使王澤壅於上民情欎於下此皆向者有司之失恐非所以流布愷悌慰安元元之深㫖也臣欲乞應自西事以來一切權宜之事因循未釐革者將來明堂赦書盡采餘弊著之條目悉與改正為定制若民間夏秋二稅除依例輸外不得非橫支移折變茶鹽酒稅課利一切依舊額趂辦勿許擅用有增減諸色缺負自來每遇恩貸不以存亡必根究本末但務追攝罕得除放乞令今後於理合該蠲免者更不縲繫逮捕重為煩擾並令疾速檢㑹除放若有司稽違必嚴行黜責如此則上可以遵先帝之意下可以救當世之患俾四方之人知陛下曠蕩之澤實及於下則海內幸甚拯又論歷代并本朝户口疏曰臣近者獲登雲陛親奉德音詢及本朝并唐編户多少之數臣雖粗陳梗槩不足以上對清問退而遍考諸史盡見歷代本末竊以三代雖盛其户口記籍莫得其詳國史所起惟兩漢最備謹按前漢元始二年人户千二百二十三萬三千及後漢光武兵革漸息之後戶四百二十七萬六百三十永夀三年增至一千六十七萬九百六十此兩漢極盛之數也三國鼎峙干戈日尋版籍嵗減當時才百四十餘萬耳晉自武帝平吳之後編户二百四十五萬九千八百自後南北幅裂戶無常數少者不盈百萬多者不過三倍隋文帝平一天下至大業二年户八百九十萬七千五百三十六及乎唐之初年人户不滿三百萬至髙宗永徽元年漸增至三百八十萬明皇天寶十三載已前最為全盛只及九百六萬九千一百五十四自安史構亂之後屠戮生靈幾盡乾元已後僅滿一百至二百萬耳至武宗㑹昌年中其間相距百餘嵗才增至四百九十五萬五千一百五十一降及五代戰伐相蹂日益耗散是時四分竊據之地逐處户口各有數十萬太祖皇帝建隆之初有户九十六萬七千三百五十三自後取劒南平嶺表下江左闢湖湘所得户口方逾百萬至開寶九年漸加至三百九萬五百四户太宗皇帝至道二年已增至四百五十一萬四千二百五十七真宗皇帝天禧五年又增至八百六十七萬七千六百七十七陛下御宇已來與民休息至天聖七年凡計編户一千一十六萬二千六百八十九至慶歷二年增至一千三十萬七千六百四十八戶八年又增至一千九十六萬四千四百三十四臣以謂前代户口之目三代已降跨唐越漢未有若今之盛者也臣聞蚩蚩生聚蕃息衰耗一出於時政之所陶化是故明主知其然也則必薄賦斂寬力役救荒饉三者不失然後幼有所養老有所終無夭閼之傷無庸調之苦此乃陛下日慎一日以致其盛若遂與之休養則可封之俗不異二帝之世矣拯權三司使又請罷天下科率疏曰臣伏見自西寇已來急於饋運常賦之外調發相繼天下民力殆已竭矣且先朝當契丹未請盟之時宿兵兩路干戈日尋詎聞有今之騷動乎蓋郡縣長吏鮮得其人或遇非次配率競效苛刻貪官猾吏緣以為奸乘釁誅求不知紀極轉運提刑又不能察其臧否各徇顔情而已且民者國之本也財用所出安危所繫當務安之為急安之在精擇郡守縣令及漸絶無名之率爾若乃橫斂不已人懷危慮或因嵗之飢饉以吏之殘酷相應而起塗炭海內此乃心腹之患況已萌之兆可不深慮乎臣欲乞今後應係軍須所用之物並令三司預先計度於出産州軍置場收買或非次急切須至配率者亦乞勘㑹各於出産路分専委逐處長吏於形勢物力户內等第均配仍委知州通判親自監納兼令轉運提刑専切提舉體量稍有違越並乞重行朝典所貴重困之民漸獲蘇息仁宗御邇英閣讀正稅養民篇覽歷代户口登耗之數顧謂侍臣曰今天下民籍幾何知審官院梅詢對曰先帝所作蓋述前代帝王恭儉有節則户口充羡賦斂無藝則版籍衰減炳然在目作監後王自五代之季生齒凋耗太祖受命而太宗真宗休養百姓天下戶口之數蓋倍於前矣因詔三司及編修院檢閲以聞歷代名臣奏議卷一百五
