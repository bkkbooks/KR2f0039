body:
  text: 歴代名臣奏議卷二百六十五眀楊士竒等撰理財宋神宗熈寧初三司使田况獻内帑策曰王者官天下家六合風化普暨孰非王土經産雜出悉為邦賦故守之以至徳推之以大公調度所共皆有蓺極國計之外不聞私積周禮内府受九貢以待邦之大用外府供百物以待邦之小用以此故有内外之異非天子之私藏也若或任聚斂之臣規藴蓄之厚雖恭儉之主嗇用而致然扵徳音無所益也况繼統之君席有其富或肆侈靡以遺患乎唐明皇踐阼之初鋭意扵理躬履儉徳述宣醲化後之言治者比開元如貞觀逮乎末年乃恃泰寜内縱奢樂權臣怙寵巧説媚上以謂賦税所收則歸之有司以濟用度進獻所入當納扵天子以奉宴私明皇悦之遂為瓊林大盈之庫王鉷每嵗進錢百億皆云不出租庸侵牟黎元厚餌冦盗厥後韋臯李兼杜亞劉賛之徒競為貢奉曲祈恩寵至扵裴肅窮賈鬻之利以遷㢘察嚴綬傾軍府之資以拜刑曹末俗流風遂而莫禦陸贄嘗為徳宗備陳其失可謂切至端嚴之論也國家開疆窮朔南建號侔周漢舟車所逹上給中都而計利之司稽求繁廣斫及圭撮嵗求倍蓰加以鳴社慶辰升煙大祀冊禮昭縟容典交修九州之民無不咸獻其力四海之内各以其職來祭裒扵公賦輸之内帑雖異乎唐室方貢之物然亦非邦計之羡餘也徃嵗軍須不充計臣致請内出錢帑謂之假貸職掌之者旋復追索經逺之士咸以為非且王者之扵貨財豈有内外國家之有天下豈有公私使外足而内不足君孰與不足私足而公不足君孰與足昔漢文之享御也施利澤省繇費民有餘力國有滯財孝武得以因其資而騁嗜奔慾翫兵黷武用既殫費埶不可已扵是桑羊孔僅之徒専務功而𣙜酟算緡坐市販物鹽鐡釱趾株送補郎之法流弊扵千古矣嚮非髙祖文帝之徳洽著扵前昭帝霍光之勤休息扵後則生民虚耗未易集也靈帝之時多蓄私藏中上方斂諸郡之寳中御府積天下之繒民困調繁且為導行之費漢家業衰扵此矣漢室尚爾矧陳隋之末世乎是府庫之積不為私也章矣今縱未能盡出所積以付逌司亦當眎豐凶之年恤疲羸之俗去出納之吝通内外之財俟乎下民寛饒大計盈給然後内扵别藏斂其餘貲亦不為過也抑又聖人大寳曰位見扵易繫天子不私求財存乎書法盖寳乎位則它物非足寳私乎財則何不為私以是而言所本尤大若夫心獨捨近謀逺則無窮之慶及扵萬嗣矣熈寧二年判大名府韓琦乞罷青苖及諸路提舉官奏曰准轉運及常平廣惠司牒支俵青苖錢每十戸以上結成一保須第三等以上有物力人充甲頭第五等并客戸不得過一貫五百文第四等每戸不過三貫文第三等每戸不過六貫文第二等每戸不得過十貫文第一等每戸不得過十五貫文如所支錢外更有剰數其第三等以上人戸委本縣量度物力扵今来所定錢數外更添數支給若更剰錢如坊郭人戸實有自己物業可充抵當願借請官錢者仍五家以上結為一保依鄉村青苖例支錢借不得過物業抵當所直價錢之半其逐縣即不得避出納之煩令諸色人扇揺人戸却稱不願請領仰逐縣官吏用心曉告如不願請領即具結罪文状入馬逓中赴當司以慿選差清强官徃彼曉諭人戸如却願請領其本縣干繫人必别作行遣如事理稍重必具事由申奏應夏秋收成合納所請過價錢斛斗如物價稍貴願納見錢者當議扵市價上減樸錢數仍比附元請價錢上十分中不得過三分假令一戸請過錢一貫文如送納見錢不得過一貫三百文臣切以國之頒號令立法制必信其言而使民受實惠則四方觀聽孰不欣服伏詳熈寧二年詔書務在優民不使兼并乗其急以邀倍息凡此皆以為民而公家無所利其入謂合先王散恵興利抑民兼并之意也今乃鄉村自第一等而下皆立借錢貫三等以上更許増添坊郭戸有物業抵當者依青苖例支借且鄉村上三等并坊郭有物業戸乃從來兼并之家也今皆多得借錢每借一千令納一千三百則是官放息錢與初詔抑兼并濟困乏之意絶相違戾欲民信服不可得也又鄉村保須有物力人為甲頭雖云不得抑勒而上戸既有物力必不願請官吏防保内下戸不能送納豈免差充甲頭以備代陪復峻責諸縣人不願請即令結罪申報若選官曉諭却有願請者則干繫人别作行遣或具申奏官吏懼提舉司勢可升黜又防選官曉諭之時豈無貧下浮浪願請之人茍免捃拾須行散配且下戸見官中散錢誰不願請然本戸夏秋各有税賦又有預買及轉運司和買兩色紬絹積年倚閣借貸麥種錢之𩔖名目甚多今更増納此一重出利青苖錢愚民一時借請則甚易至納時則甚難故自制下以來一路官吏上下惶惑皆謂若不抑散則上戸必不願請近下等第與無業客户雖或願請必難催納将來必有行督索及勒干繫書手典押耆長戸同保人等均陪之患大凡兼并者所放錢雖取利稍厚縁有逋欠官中不許受理徃徃舊債未償其半早已續得貸錢兼并者既有資本故能使相因嵗月漸而取之今官貸青苖錢則不然須夏秋隨税送納灾傷及五分已上方許次料催還若連兩料灾傷則必官無本錢接續支給官本因而寖有失陷其害眀白如此更有縁此煩費虚擾之事不敢具述去嵗河朔豐熟常平倉糴米斗錢不過七十五至八十五以来若乗時收斂遇貴出糶不唯合扵古制而無失陷之弊兼民被實恵亦足收其羡贏今諸倉方有糴入而提舉亟令住止盖盡要散充青苖錢指望三分之利收為已功縣邑小官敢不奉行豈暇更卹貽民久逺之患㢤諸路所行必料大率如此朝廷若謂陕西嘗放青苖錢官有所得而民以為便此乃轉運司因軍儲有闕遇自冬渉春雨雪及時麥苖滋盛決見成熟行扵一時則可也今乃差官置司為毎嵗春夏常行之法而取利三分豈陕西權宜之比㢤兼初詔且扵京東淮南河北三路先行此法候成次第即令諸路施行今此三路方憂不能奉行而遽扵諸路徧差提舉官以至西川廣南亦皆置使伏惟陛下自臨御以来夙夜憂勞勵精求治况承祖宗百年仁政之後民浸徳澤唯知寛卹未嘗過擾但躬行莭儉以先天下常莭浮費漸汰冗食自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑㢤欲望聖眀更賜博訪若臣言不妄乞盡罷諸路提舉官只委提㸃刑獄官依常平舊法施行時上親袖𤦺奏出示執政曰𤦺真忠臣雖在外不忘王室朕始謂可以利民不意乃害民如此出令不可不審且坊郭安得青苖而使者亦强取之乎王安石進曰茍從其所欲雖坊郭何害因難𤦺奏曰陛下脩常平法所以助民至扵收息亦周公遺法也且如桑𢎞羊籠天下貨賄以奉人主私欲此乃所謂興利之臣也今陛下置官為天下理財非以佐私欲則安可謂之興利之臣乎上曰坊郭俵錢如何曽公亮陳升之皆以為不當俵安石曰坊郭所以俵錢者以常平本多農田所須已足而有餘則因以賑市人乏絶又以廣常平儲也廣常平儲所以備百姓之凶荒不知扵義有何所害公亮曰坊郭上等戸則無所用之下等戸則難扵輸納安石曰既取情願則無所用者自不俵既有保甲則難扵納者自不能請矣升之曰但恐州縣避難索之故抑配上戸耳安石曰抑配誠恐有之然俟其有嚴行黜責一二人則其弊自絶如河北路則恐不可抑配聞韓琦自諷諭諸縣言百姓皆不願投状唯一縣初以為不便而為司録陳紘者説譬曰若朝廷更選人體問而百姓反稱情願則柰何扵是乃不敢投状儻河北一路有一人不願則韓琦必受其状以聞今琦自入奏乃無此則百姓不以為不便提舉官不敢抑勒可知矣然上終以韓琦所説為疑安石曰臣以為此事至小利害亦易眀直使州縣抑配上戸俵十五貫錢又必令出三分息錢一尸所倍止三貫錢因廣常平儲蓄以待百姓凶荒則比之前代科百姓出米為義倉米未為不善況又不令抑配有何所害而上煩聖心過慮臣論此一事已及十數萬言然陛下尚不能無疑如此事尚為異論所惑則天下何事可為上曰要須盡人言料文彦博吕公著亦以為不可但腹非而已韓𤦺獨肻来説真忠也安石曰事誠當盡人之情偽事之是非若扵情偽是非不能深察唯務多納人言則恐非但常平事不可為事事皆無可為者翌日安石遂稱病不出詔以琦奏付三司制置條例司是時制置三司條例司言羣臣數言常平新法不便今畫一申眀乞敕諸路安撫轉運提㸃刑獄提舉官曉諭所屬官吏使知法意一言者謂元敕云公家無所利其入今河北提舉官乃令取息三分失信扵百姓本司今按周禮泉府之官乃云貸者取息有至二十而五凡國家之財用取具焉今常平新法豫給青苖錢但約熟時酌中物價熟時物貴即許量減市價納錢即是未定合納實數故河北約束州縣納錢不得過三分京西陜西等路大抵不過二分而已凡此盖為量時價㫖揮未有約定實數恐納時倍歸州縣量減錢不多致虧損百姓即非法外擅為侵刻也就諸路所約惟河北最多然云不過三分即非定取三分之息若物價低平即有當納本色不收其息或止收一二分息時多少相補比周禮貸民取息立定分數已不為多近又令預給價錢若遇物價極貴亦不得過三分既比周禮所取尤少扵元條欲廣儲蓄量減時價㫖揮不相違戾固無失信之理又周禮國事財用取具扵泉府之官賖貸之息今常平不領扵三司専以振民乏絶比周公之法乃不以取具國事之財用故云公家無所利其入一言者謂上三等戸及城郭有物力戸即從來兼并之家今乃立定貫石許之貸借非抑兼并之意又河北每保須上三等戸一人上等戸必不願請官吏既防貧戸不能送納豈免差充甲頭以備代陪又提舉官峻責州縣如民不願請即結罪申報若選官曉諭却願請即當别作行遣州縣官吏懼提舉官曉諭或須散配本司今案鄉村上三等城郭有物力戸亦有闕乏之時從人舉債豈皆是兼并之家今貸貧民有餘則以給此等戸免令就私家取一倍之息乃是元敕抑兼并之意河北每保須上三等戸一人者盖以檢防浮浪之人若有上戶肻與同保即自不許支給何須更行散配若謂上三等戸必不願請須差作甲頭即自是抑勒違法況今年開封諸縣甚有三等戸願請即非抑勒以近驗逺事理可知至扵提舉司約束止闗防因循避事壊法之人即非廹遣須令抑配若提舉官或急扵求利諷州縣抑配即諸路有安撫轉運提㸃刑獄其為朝廷委任皆在提舉官之上若有州縣官員故欲隳壊新法或曲徇提舉官意指抑勒百姓當糾舉依法施行及具事状奏聞豈宜以官吏違法之故遂欲廢一言者謂百姓各有本戸税賦及豫買納絹又生此一重豫給青苖錢則人戸不易本司今案百姓税賦之外逐路承例科斂名目誠多然當闕乏時不免私家舉債出息常至一倍此所以貧者愈困也今貸與常平本錢廼齊其艱急又令約熟時斛斗物價貴賤然後令納見錢此元本不得過二分是免扵兼并之家舉一倍之息民戸有何不易一言者謂但躬行莭儉常莭浮費自然國用不乏何必使興利之臣四出以致逺近之疑本司今案先王之政未嘗不以食貨為始張官置吏大抵多為農事也近世以來農人尤為困苦朝廷但有徭役加之初無嵗時備預之法近自京畿陂防溝洫多有不治乃至都城側近徃徃綿地數百里棄為汙莱父子夫婦流離失業四方荒僻不問可知一方水旱則死者相枕籍而流移者填道路如前嵗河北一飢則不免漕江淮之米以救之然扵人之流亡餓殍未有補也至有非汎用度或不免就上等戸强借錢物百姓典賣田産物業以供暴令此亦可謂國用乏矣至扵差使困苦農民使之失職則士大夫之所共見不待論説而後可知故陛下即位詔書丁寧以務農理財免人役為政事之急方今置提舉常平廣恵倉官兼管當農田水利差役事者凡以此而已固非使之朘削百姓以佐人主私費豈得謂之興利之臣而致逺近之疑一言者謂今常平千餘萬緡散作青苖錢民所欠負財力既竭加以水旱之灾不得不為之倚閣因郊赦除之十年之後千餘萬緡散而不收矣常平舊法自合古制而無失陷之弊不當變改本司今案常平新法豫給價錢並令公人認識又須十戸以上為一保如河北又須保内有三等戸一人自来豫買紬絹及青苖錢蠶鹽其法闗防未能備具如此乃不聞有拖欠除放則常平新法自非官吏故欲沮壊不容獨致失陷官物今新法之中兼存舊法但以舊法廣儲蓄抑兼并振貧弱之方尚為未備又無専領官司所以諸路利多糴貴價斗斛至有經數年出糴不行無補振救又糶糴之時官吏奸弊百端故須約周禮賖貸増脩新法専置一司提舉覺察非廢舊法違古制也一言者謂新法不當示之條約眀言利息本司今案周官貸民眀言以國服為息盖聖人立法惟示信扵天下取之以道非以為私扵理何嫌而不可眀示條約一言者謂坊郭戸既無苖不貸借本司今案常平舊法亦糶與坊郭之人今若給散農民有餘仍不許坊郭之人貸借是令常平有餘積餘藏而坊郭之人獨不被朝廷振救乏絶之恵也周禮貸民之法無都邑鄙野之限今新法乃約周禮太半已試之法非専用陕西豫散青苖條貫也今新法方行官吏不能體朝廷立法之意不肻公共推行或以錢斛抑配與人或利在易為催納専貸與物力髙强戸或留滯百姓不為及時給納故縱公吏乞取致百姓枉有糜費或不量民物力給與錢斛太多致難催納不能闗防辨察令浮浪之人為一保冒請官物致難催納或拖延不為及時催納却非理科校公人百姓之𩔖自是州縣官吏弛慢因縁為奸不可歸咎扵法乞令逐路安撫轉運提㸃刑獄提舉官常切覺察依條施行命官具案取㫖重行黜罰安撫轉運提㸃刑獄提舉官失扵舉覺致朝廷察訪得實亦當量罰第行朝典從之時琦判相州又上奏曰臣近以河北路差官置司春夏放青苖錢眀取三分之利有傷國體上下皆知不便而以制置條例司是大臣主領但人人腹誹不敢公言臣被顧三朝又職當安撫實不忍雷同黙黙遂詳陳利害本末乞加博訪所兾陛下洒然開悟亟更改使天下歌舞聖眀不為盛徳之累老臣獻忠之心豈有它也今䝉制置司以臣所言皆為不當條件疏駮乞申敕諸路及直㫖揮進奏院以中書曉諭劄子頒行天下臣詳制置司疏駮事件多刪去臣元奏要切之語唯舉大槩専用偏詞曲為沮難及引周禮國服之息為説文其謬妄上以欺㒺聖聽下以愚弄天下之人将使無敢復言其非者臣不勝痛憤須至再有辨列欲望親覽然後降付中書樞宻院看詳送御史臺集百官定議如臣言不當甘從竄殛若制置司處置乖方天下必受其弊即乞依臣前奏盡罷諸路提舉官只委提㸃刑獄司依常平舊法施行以慰衆心一制置司云周禮泉府之官民之貸者取息有至二十而五國之財用取具焉今常平新法比周禮貸民取息立定分數已不為多遇物價極貴亦不得過三分即比周禮所取尤少臣切以周公立太平之法必無剥民取利之理但漢儒以去聖之逺解釋或有異同按周禮泉府掌以市之征布斂市之不售貨之滯扵民用者以其價買之物揭而書之以待不時買者各從其抵臣謂周制民有貨財在市而無人買或有積滯而妨民用者則官以時價買之書其物價以示民若有急求者則以官元買價與之此所謂王道也經又云凡賖者祭祀無過旬日䘮紀無過三月鄭衆釋云賖貰也以祭祀䘮紀故從官貰買物賈公彦䟽云賖與民不取利也經又云凡民之貸與其有司辨之以國服為之息鄭衆釋云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出為息也假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償臣所謂周制有從官借本賈者亦不以求民之利但令變所貸錢輸國服即以為息也此所謂王道也而鄭康成釋云以其扵國服事之税為息也扵國事受園廛之田而貸萬泉者則朞出息五百臣謂周禮園廛二十而税一近郊十一逺郊二十而三甸稍縣都皆無過十二惟漆林之征二十而五漆林自然所生非人力所作故税重康成乃約此法謂從官貸錢若受園廛之地貸萬錢者出息五百公彦因而䟽解謂近郊十一者萬錢期出息一千逺郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千臣謂如此則須漆林之所取貸萬錢息二千五百也然當時未必如此今放青苖錢凡春貸十千半年之内便令納利二千秋再放十千至嵗終又令納利二千則是貸萬錢者不間逺近之地嵗令出息四千也周禮至逺之地出息二千今青苖取息尚過周禮一倍則制置司言比周禮取息已不為多亦是欺㒺聖聽且謂天下之人皆不能辨也且古今異制貴扵便時周禮所載有不可施扵今者其事非一若謂泉府一職今可施行則上所言以官錢買在市不售及民間積滯之貨俟民急求則依元買價與之民有祭祀䘮紀就官中借物限旬日三月還官而不取其利制置司何不将此周公太平已試之法盡申眀而行之豈可獨舉注䟽貸錢取息之一事以詆天下之公言㢤鄭康成又注云王莽時貸以治産業者但計贏所受息無過嵗什一公彦䟽解云莽時雖計本多少為定及其催科惟所贏多少假令萬金嵗贏萬泉催一千贏五千催五百餘皆據利催什一臣謂王莽時官貸本萬錢嵗終贏得萬錢止令納一千若贏錢更少則納息更薄比今扵青苖錢取利尤為寛少而王莽之後上自兩漢下及有唐更不聞有貸錢取利之法今制置司遇堯舜之主不以二帝三王之道上禆聖政而貸錢取利更過王莽之時此天下不得不指以為非而老臣不可不辨也況今天下田税已重固非周禮什一之政則又隨畝更有農具牛皮鹽錢趜鞋錢之𩔖凡十餘名件謂之雜錢每遇夏秋起納官中更以紬絹斛斗低估價直令民以此雜錢折納又每嵗散官鹽與民謂之蠶鹽折納絹帛更有預買和買紬絹如此之𩔖不可悉舉皆周禮田税什一之外加斂之物取利已厚傷農已深奈何更引周禮國服為息之説謂放青苖錢取利乃周公太平已試之法此則誣汙聖典蔽惑睿眀老臣得不太息而慟哭也一制置司云提舉官約束州縣納錢不得過三分二分盖恐納時斛㪷倍貴州縣量減錢數不多若物價低平即有合納本色不收其息臣亦謂此論之不實也然小麥㝡為不禁停蓄之物自来常平倉不糴盖恐積留損壊今嵗雨雪及時麥價必賤提舉官必不肻令民納本色盖納下本色則無由變轉若扵轉運司兑換價錢則諸處軍糧支小麥絶少必難兑換則占壓本錢下次無錢散與民戸臣以此知制置司提舉官本無令民納斛斗之意故開此許納見錢一門将来止令言民願納錢息不容納本色則民須至糶麥納錢豈不殃害百姓惟陛下早悟臣言一制置司云鄉村上三等及城郭有物業戸亦有闕乏之時從人舉債豈是兼并之家臣切以鄉村上三等及城郭有物業之戸非獨知是從来兼并之家此天下之人共知也今制置司以為非兼并之家者止欲多散青苖錢與之而得利亦多也其如敕意本務拯濟困乏却以錢放與此等戸則天下眀知朝廷専以取利為意實傷國體制置司若謂周官有貸民之法取之以道扵理無嫌在今兼并之家例開質庫置課塲若恐取民倍息以傷貧細則所在皆可官自開置以抑兼并然自前世以来惡其太近衰削不忍為之今青苖錢一事無乃近扵此乎又云每保須上三等戸一人者盖以檢防浮浪之人此則抑勒之勢不假臣言而自眀矣又云若謂上三等戸必不肻請領至差作甲頭即自是抑勒違法此又殊不察事勢人情有不得已而為之者且青苖之法内有大臣力主事在必行外有専差之官唯以散錢數多為職辦州縣官吏徃徃變抑勒而為情願者盖事勢不得不懼而人情不得不從也監司之官其扵事勢人情亦何異此九重髙逺豈得盡知惟陛下早賜辯察制置司云先王之政未嘗不以食貨為始張官置吏大抵多為農事也近世以来農人猶為困苦朝廷非泛用度或不免就上等戸强借錢物百姓典賣田産物業以供暴令今置提舉常平廣恵倉官兼農田水利差役使者凡以為此固非使之朘削百姓以佐人主私費亦豈得不謂之興利之臣而致逺近之疑臣詳制置司眀舉貸錢取利之法謂取之以道扵理無嫌則非興利而何至扵東南所差均輸之官亦皆興利之臣也且西川四路鄉村民多大姓一姓所有客戸動是三五百家自来衣食貸借仰以為生今若差官置司更以青苖錢與之則客扵主戸處從来借貸既不可免又須出此一重官中利息其它百姓固不願請青苖錢又廣南路土曠人稀水鄉之俗粗足生計今亦置官司貸錢取利故扵逺民尤為不便豈得不謂之致逺近之疑國家幅員至廣一方水旱時所不免然未嘗不假貸糧種盡救荒之政以濟䘏之故能飢饉者復蘇流庸者復安自祖宗以来可謂仁政充洽矣而未嘗就上等戸强借錢物唯是英宗及陛下即位之初天下各有優賞朝廷自京師應副未及間故有三兩路州軍嘗措借扵坊郭富民然亦即時輦還今制置司指為暴令以頒布天下是唯知主張青苖之法而不顧毁讟之甚誠可駭也一制置司云常平舊法亦糶與坊郭之人周禮貸民無都邑鄙野之限今新法乃約周禮太平已試之法即非専用陕西青苖條貫也臣詳制置司此説尤為不實盖自来常平倉遇嵗不稔物價稍髙合減元價出糶之時鄉村則下諸縣取逐鄉近下等戸姓名印給闗子令執赴倉每戸糴與三石或兩石坊郭則每日糴與浮居戸每口五斗或一斗故民受實恵甚濟飢乏即未嘗見坊郭有物力戸乃来零糴常平倉斛斗者此盖制置司以青苖為名欲多借錢與坊郭有物業之人以望得利之多假稱周禮太平已試之法以謂無都邑鄙野之限以文其曲説唯陛下深詳其妄一臣近以内藏庫絹二十萬匹為河北常平本錢轉運常平倉司遂申制置司募請人依青苖錢法制置司劄子依所申施行坊郭戸願者亦聽真定府請絹三萬匹未及般取常平倉司差殿侍康承丙詣屬縣催促真定以為張皇騷優戒承丙毋下縣牒常平倉司追還牒臣照㑹臣遂録奏庶朝廷見其為害之深却准中書劄子康承丙本皮公弼等乞充差使幹當兼累令提㸃刑獄司覺察所散青苖錢不得勒令或有抑配便令止絶具當職官姓名奏劄與臣知臣勘㑹轉運司昨配賣絹與坊郭戸每匹估價錢一千五百三十理一千六百限半年納錢下等戸猶有破賣家財方能貼納者今提舉官以絹二十萬匹每匹上等作一千三百五十每千取利二分每匹已是一千六百一十下等作一千三百并利亦是一千五百六十並隨税納是百餘日納足與轉運司賣價全不相逺即與農民豈不為害更差使臣督廹給散縣邑小官茍免過咎以抑配為情願何可辨眀且制置司雖大臣主領然終是定奪之所今直指揮許散絹與鄉村戸依青苖法納錢及令坊郭戸願請者亦聽則自来未有定奪之司事不闗中書樞宻院不奉聖㫖直可施行者如是則中書之外又有一中書也中書行事亦須進呈或候畫可未嘗直處分惟陛下察其専也如是則知在外守職臣寮誰敢不從願早賜辨察使事歸政府庶扵國體為便二年右正言李常論青苖䟽曰臣伏見陛下焦勞旰食憂恤黎元求所以富安休養之道而獻議之臣措置失當設法遣使布滿天下始稱補助耕斂終言利息分數致百姓疑懼騷然不寧不復信朝廷有愛民之心直謂巧為掊剋而已陛下雖欲推不忍之至誠百姓何由而知之臣聞作法扵涼其弊猶貪今作法扵貪復何善之有臣深察物情博訪民俗皆謂雖一切取民之願尚不免悞其易扵得財侈扵妄費不計後日輸官之難臨時廹蹙況今官吏務為功效百端㒺民其尤甚者使善良避請納之費虚認貫百以輸二分之息臣考之三代下至近古未聞欲求治平輔養元元而為法如此之弊者今百姓之室空匱已甚苛朘巧削日入扵困窮困窮之至為盜而已矣陛下御天下之日未久徳澤之所以浸漬生民未深而輔佐之臣作為此法使毒流海内小大驚扇疾視其上不蚤沮止恐非社稷之福此臣所以早夜憂懼惓惓不已累冒鈇鉞之誅上干天聽願一切寝罷以安輿情至今未䝉指揮伏望聖慈悉降臣前後論青苖錢劄子付有司施行常論青苖第二状曰臣謹按前漢書食貨志言王莽每有所興造必依古傳經文國師公劉歆言周有泉府之官收不售與欲得即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有貸賖樂語有五均傳記各有斡焉今開賖貸張五均設諸斡者所以齊衆庶抑并兼也遂扵長安及五都立五均官更名長安東西市令及洛陽邯鄲臨淄宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商能採金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之又以周官税民凡田不耕為不殖出三夫之税城郭中宅不植蓺者為不毛出三夫之布民浮游無事出夫布一匹其不能出布者冗作縣官衣食之諸取衆物鳥獸魚鼈百蟲扵山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及它方技商販賈人坐肆列里區謁舍皆各自占所為扵其所之縣官除其本計其利十一分之而以其一為貢敢不自占自占不以實者盡沒入所采取而作縣官一嵗諸司市常以四時中月實定所掌為物上中下之賈各自用為其市平毋拘它所衆民賣買五榖布帛紬綿之物周扵民用而不售者均官有以考檢厥實用其本賈取之毋令折錢萬物昻貴過平一錢則以平賈賣與民其賈低賤減平者聽民自相與市以防貴廋者民欲祭祀䘮紀而無用者錢府以所入工商之貢但賖之祭祀無過旬日䘮紀無過三月民或乏絶欲貸以治産業者均受之除其費計所得受息毋過嵗什一吏用苛暴立威旁縁犯禁侵刻小民富者不得自保貧者無以自存起為盗賊及莽未誅而天下戸口減半矣伏觀班固述王莽事其詳如此其所施置盖皆畧本先王而其初為説非不美也及乎繆戾至使百姓無聊揺手觸禁富者不得自保貧者無以自存而起為盜賊卒以敗亡者何也志扵利故也夫茍志扵利雖純法三王其法則猶不可行況徒用其言以欺世耶孔子曰放扵利而行多怨此眀驗也今青苖法與王莽事無以異寖違愛民之初意一切以利為言而不顧此臣所以知不復可行而願罷也臣愚實懼陛下未盡省覧班固所載之始末謹繕冩其畧不憚上煩天聽伏望聖慈萬機之暇特賜反覆觀覽而深鑒之其青苖法伏乞早降詔㫖寝罷天下幸甚易曰不逺復無祗悔元吉此之謂也三年常等論王廣㢘青苖取息奏曰臣等伏見河北提舉常平廣恵倉王廣㢘近至京師倡言青苖新法已曉諭河北取三分之利又聞制置條例司欲取其法行之天下臣切以為過矣臣畧聞其斂散之法云下戸恐其負之不敢輙給其上戸則十有七八願者若爾則與立法之意相違戾矣新法以摧兼并恵貧弱為意而下戸不及又以贍上等之有餘則是助大賈蓄家以乗民之不給也何以為輕重盈虚之術乎况朝廷詔令云凡皆以為民而公家無所利其入是亦先王散恵興利以為耕斂補助裒益多寡而抑民豪奪之意也今纔數月而取利二分則與詔㫖甚相乖戾異時姦吏旁縁與聚斂之臣刻剥日滋則雖倍稱之息未可知也劉歆為新莽開賖貸設五均其弊至扵亡國但云計贏所得受息毋過嵗什一周禮凡民之貸者以國服為之息康成之注亦引莽制以為解今使人什三則又過亡新二矣既許其一嵗再貸則其息遂至于什六下何以堪之㢤詩曰曽是掊克斂怨以為徳以陛下之睿聖有意扵三代之隆若生財有道用財有莭臣恐天下之財充牣委積而不可勝校而廣㢘小人造端以籠天下之利一旦生民重賦至扵無聊而怨及扵上為害豈淺㢤臣愚伏望陛下寘廣㢘扵理可懲擅命之吏眀詔有司推法之本意諭所遣提舉官勿以强民一切隨其所願倘䝉聖慈昭然辨其難以遽行止且試之河北陕西數路不勝幸甚天下至大生靈至衆不可以倉卒治也常又論王廣淵和買抑配取息奏曰臣近聞京東轉運使王廣淵以陳汝義所進羡餘錢五十萬貫隨和買絹錢俵散今却令每貫納見錢一貫五百扵常税折科放買之外又取此二十五萬貫大凡挟轉運使之勢臨郡縣以鞭笞彊百姓出息錢雖倍稱猶可雖然此而不懲臣恐姦利小人交以掊克為事不思窮閻敗室日益困窮陛下徳政不復下浃而祻亂起矣今中下之户有田不過二頃二頃之收不過百斛數口之家一嵗之食過半而輸租糞田吉凶疾病之費悉資扵榖粟今又彊之使出錢錢非農夫所常有者不以粟易則賣田土而得之或奪其食或廢其生生之業如此而望民俗安堵冦賊不作難矣竊聞御史程顥已常言乞付有司施行常又論青苖奏曰臣聞易曰何以守位曰仁何以聚人曰財理財正辭禁民為非曰義繇伏羲以来治天下者未有不以仁守位以財聚人以義理財者也知非仁不可以守位則凡法度之設號令之施茍不仁不可用矣知非財不可以聚民則夫家之衆鰥寡之窮食不足不可保矣知非義不可以理財則租賦之入斂散之方失其宜不可行矣自設網罟作耒耜至井牧田野十一而税之其為法必本扵仁其養民必厚扵財其理財必主扵義上下交足而治道成矣故孟子言為國必曰信仁賢有禮義然後有政事有政事則財用足然則政事不僉謀扵仁賢不悉由扵理義則不可以行也理財用而不由仁與義則上匱而下窮矣故古之人曰王人者将道利而布之上下者也後世聖人不作仁澤滅息暴君汙吏知厚上而刻下剥民以縱欲賦斂已重徭役已極不思公上用財之道日廣以自莭損巧斂以求適志故自幽厲以來詩書所載莫不譏重賦懲過取主愛民以為言不患其不能益上而患其刻下也故曰百姓足君孰與不足又曰財散則民聚財聚則民散又冉求賦粟倍它日則孔子欲鳴鼓而攻之曰與其有聚斂之臣寧有盜臣昔者夏桀率遏衆力率割夏邑後世言暴斂者必稽之曰大桀小桀商紂厚賦税以實鹿臺之財盈鉅橋之粟周厲王用榮夷公専天下之利秦收太半之賦竭天下之資以奉其政其後漢威靈下至隋唐其惡政弊法尚足道㢤此皆法度號令不本扵仁租税賦斂不要於義而不能散利保民以取滅亡敗亂之眀效也臣實至愚粗分義理但知阜俗厚下恤鰥寡助乏絶為先王之道不知㒺民欺世事刻剥困生靈為治世之䇿而又愚昏不敏不敢以非義逆詐初不謂王安石以文學名世行義得君乃不本仁以出號令考義以理財賦而佐陛下為此病民斂怨之術詔命之始尚謂其誠有意扵惻怛斯民稽古立法及其黨援掊克小人宣言取利分數方悟其畧假先王之遺跡而志在聚斂臣始以朝廷好惡為憂而直議其法必不可行既而小大驚疑逺近騰沸日見其弊人得非之方是之時曽公亮陳升之趙抃皆位冠百寮身輔大政首主厥議曽無執守臺諫官或以職事隔絶或隂竊符同而四海萬里䝉毒莫訴陛下不以臣為不才寘之諫争之列不識欲其雷同結舌姑以備位耶抑亦使其竭誠畢慮救正闕失也臣扵安石雖有故舊之義茍懐私而不言誰肻為朝廷言者今安石不思詩人刺掊克所以斂怨易象著益下所以民悦與夫强恕改過捨已從人之為君子之道而日與其徒吕恵卿等隂籌竊計欲文厥過思以頬舌取勝公議寧復以社稷安危為慮者切聞以正論者為同乎流俗憂國者為震驚朕師以百姓愁歎為出自兼并之言以卿士僉論為生乎怨嫉之口而又妄取經據傳㑹其説謂周人國事之財用取具扵息錢而不知泉府實受廛人之五布臣考之周官凡周所以佐國用者有九賦斂財賄有九貢致邦國之用又以九式均莭之大府以闗市之賦待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待䘮紀幣餘之賦以待賜予而不言貸民之息待邦用者今曰周之國事取具息錢亦已㒺矣上以惑陛下之聰眀下以欺天下之耳目而貽咲後世可為痛悼可為太息抑臣觀周禮所以必貸民者盖先王推至仁愛物回旋曲折之深意也所以使出息者不使其幸得而惰扵業也周人井牧其田野其六鄉使五家為比則有比長五比為閭則有閭胥五閭為族則有族師五族為黨則有黨正五黨為州則有州長五州為鄉則有鄉士大夫六遂亦然其小大相臨上下相察使相保愛使相𦵏埋匹夫匹婦受田百畝鰥寡孤獨復有常餼又十一而税之宜無一人不足者矣唯死䘮疾病冠昏之𩔖乃其不幸而不得濟者間有貧不能周扵用扵是命泉府之官掌其祭祀䘮紀者有賖而服田者有貸方是之時民日被上之仁愛上悉知民之有無下如子之怙其父上如父之育其子鄉遂閭井之間不足而貸者嵗亦無㡬人嗚呼先王之扵民回旋曲折之意可謂盡矣此所謂保民若赤子所謂無一夫不獲者也故孟子能具道平治時之事曰春省耕以補不足秋省斂以助不給又稱夏之諺曰吾王不游吾何以休吾王不豫吾何以助又知補助之仁不獨周為然也今則不然田無多少之限民無貧富之常吏不識其民民不信其上租税之入非賄賂不可輸也催科之嚴非鞭笞不能辦也税斂重數民畏公家如鳥獸之避網罟政令不一吏殘其民猶弋獵之待鳥獸離居散處非有比閭族黨之相伍也非有胥長師正之相統也而又愚瞽頑嚚不能逺計其貧下無賴習為逋逃之人知千百為羣十五為保執一紙之劵而空手得錢則不願者亦寡矣及其出賄賂齎粮食與市廛博易妄用之外實能持錢至其家而致力扵畎畝之間者亦無㡬矣迨其償也百畝之收二税徭役之外有支移有折變有配買有和市有貸糧有麥本今又出青苖之本利至時不足則賣其衣食之資又不足則賣牛具又不足則賣田疇又不足則賣妻孥或逃去鄉井或羣起為盜賊矣此臣前日劄子所以言雖一切取民便不免使其易扵得財侈扵妄費不計後日輸官之難而臨時廹蹙者也今取其願猶且如是況希合小人與畏罪之吏措置乖方者其為患百十倍扵是與其貸扵兼并者異也凡百姓所以貸扵兼并者盖皆其隣里近村之人其来貸也誠皆窮乏飢餓不得已者也茍可以適朝昏備農事則不徃貸矣其貸與之家亦皆日見其實為乏絶素有誠信真以贍妻孥資耕穫者也茍欲以侈口腹事飲愽為利陷法之事則不貸之矣以是觀之嵗貸扵人者亦無㡬矣然則青苖之法適所以悮妄費不思之窮民爾今法言利之卒所以病之也昔者子産以乗輿濟人扵溱洧之上孟子曰恵而不知為政以其人人而悦之也今為法不免扵人人而病之可乎又况志在扵蓄積者乎今黨蔽掊克小人公言利息紛如而欲天下之吏不希合而强民臣不信也王廣淵者昔條例司稱以公幹才眀之人也前日使試義倉之法乃至邀遮齊州輸税之民使先詣義倉然後納税扵是冒言民便其法臣恐天下官吏上畏朝廷下畏使者或事希合置二税而督青苖然後以鞭笞督其租賦蚩蚩之衆何以堪之臣恐不一再貸而天下潰矣古之人曰匹夫専利猶謂之盜王而行之其猶鮮矣孔子曰放扵利而行多怨詩曰民之多僻無自立辟又曰民之貪亂寧為荼毒方今税役苛重百姓空匱雖官廩有未充之憂公帑有不足之慮不思莭用愛人重本抑末而欲矯誣以射利譬猶割膚體以啗口腹其不可眀矣昔魏文侯租賦倍扵常日或有以賀者文侯曰今戸不加多而租賦嵗倍譬之反裘而負薪者徒惜其毛而不知皮盡而毛無所附矣此善諭也故書曰民惟邦本本固邦寧又曰怨豈在眀不見是圖予臨兆民懔乎若朽索之御六馬可不畏㢤今陛下欲勸農桑興水利省徭役復常平此先王不忍之心也而獻議之臣直以此優優蔽惑天聽茍有志扵朝廷社稷者莫不以為憂勤也詩曰民亦勞止汔可小康恵此中國以綏四方臣願陛下詔天下悉罷青苖法謹擇轉運使而久天下縣令之任俾諸路各上十數年之間為縣而有績状在民者稍易今不才之令而授所謂農田水利徭役常平之法使各講求施設而寛假之淹以嵗月而考課其績則四海萬里無不被陛下之徳澤者抑臣聞之昔魯欲用田賦季孫使冉有訪諸孔子孔子曰若欲行其法則周公之典在若茍而行之又何訪焉臣之至愚其惓惓之義深冀陛下鑒觀先哲之言究察受敝之俗决以獨斷罷扵一朝别講治道垂福黔首倘姑取其聚斂之意茍而行之則臣言為迂踈僻滯之甚者而妄譏時政擅廢朝參數違聖㫖罪釁大矣豈宜更使居位早行竄逐不勝幸甚常又上議曰臣聞易曰王臣蹇蹇匪躬之故臣自惟狂瞽冒拂天威固已數然其縷縷之誠所以不已者切服大易之義知有犯無隠不知其身之可保也然臣非不知朝夕䝉誅不忍輙有伏藏不盡之意為無窮之恨請一二陳之惟陛下裁擇臣伏見陛下即位未㡬起王安石扵江湖之上曽未數對遂參機務方是之時中外相慶以為三代之隆可以立俟也安石乃首建制置三司條例天下之人始議其身任大政而専有司之事然善士猶或恕之謂其先公家之所不足将佐陛下以仁義理財賦莭儉先天下交物以道奉養以禮重損浮費圖實廩庾凡教化之事猶有待也已而均需之議造青苖之法天下之人固已大駭而善士猶未之深議謂其志在便民均一有無逺希先王補耕助斂以為扵理無嫌及降詔取利牽合經㫖謂周公資用扵國服之息利害已白而持之不改雖善士不復以為是直謂其誑惑朝廷愚瞽海内所以議論交起不可抑止者其故何也義與利之為道異也始稱放古以行義故君子猶或恕之終則不顧以嗜利雖衆人莫之與也及發七難以拒言者其辭迂其理僻天下之人益知其所存盡於此不復有義理之實徒欲文過求勝豈以生靈存亡之命社稷安危之機為計㢤今條例司扵浮費無所莭損日造㒺民之法均輸官不能通天下之有無百端以射利提舉官奉青苖之令納民扵困窮陛下固嘗謂溥天騰沸黎民騷擾矣夫政莫酷扵剥民以無度祻莫大扵知過而不改古之所以亡國䘮天下未有不漸扵此者噫今日之弊豈難濟㢤改之而已昔者周公盖有過矣孟子曰其為過也人皆見之及其更也人皆仰之孔子則自訟其過矣曰丘也幸茍有過人必知之又曰過則勿憚改又曰過而不改是為過矣安石不知慮此陛下又從而不悟何也臣亦畧聞其所以遂非而不改者有三焉不堪怨仇與士大夫之所譏議而不改一也狭中自信悦諂䛕惡誠直遂不以為非而不改二也慿依小人日滿其門進退榮悴繫扵事之興廢競為諂辭以悦之忿言以怒之使其持之益堅期扵必勝不問義理之所在因以不改三也此三者皆安石自為也所以受敝者陛下之百姓也所以當慮者陛下之社稷也此臣所以切為陛下惑也陛下仁眀睿智早聞道要未壯御宇享祖宗久安之基視圖按籍惻然悼黔首之未乂延見卿士慨然歎人才之不足方欲盡收天下之英俊共講治平之術創為可繼之業今乃相與守區區之弊法又欲卿士大夫阿意順㫖而奉行之其不然者從而竄逐之非獨安石負陛下任使之意陛下亦負天下所以用安石之初心矣臣不知陛下甘其所以得利而力行之耶徒悦其順適心意而惡違忤之耶抑曲徇安石而茍為之耶臣請陳此三者凡苛朘巧削之不可臣前論列多矣不待再講而後眀也今陛下深居九重豈盡知百姓之困苦謂其比户温飽倉有餘粟箧有餘帛可以任權數而採取之耶四海一家皆陛下之赤子而欲效管仲以千里之齊㒺隣國之人耶又況術踈䇿陋為之輙有後灾乎今中下之戸農桑之所得纔足以輸税者徃徃皆是也嵗惡不入不食草根木皮者寡矣尚忍以巧斂之法而虐之乎今陛下甘其所以得利臣姑以利言之凡百姓之有兩税猶人之有終身之病也夏税之輸常至九月十月秋税之輸常至眀年四五月秋税未絶夏税又起催矣毎催理不足縣令懼踰限之責必强人吏代納然後以鞭笞追還之非為令者懈慢不職民貧不可以廹遽取辦故也兩税病民如是青苖錢又可及時以斂之乎且十八路之廣一嵗之間必有三路罹蟲蝗水旱之灾者則其逋亡倚閣失陷之數不為少也又況不幸遭大飢饉捐瘠流離起為盜賊所謂本利者復何有㢤假如一嵗貸錢千萬為利纔二百萬臣恐二百萬之利不足以償失陷之數尚可望其息錢以資國用耶且以利言之不足以得利較然甚著矧悖義傷化殘民害物斂怨召亂不可一二道㢤陛下雖甘其利而力行之其無益可謂眀矣今朝廷患財用之不足未聞陛下莭儉先天下而一宫殿之費或以百萬計一宴遊之費或以數萬計而欲錙銖取扵困窮之民偏聽獨任非順適心意之言不取又将悉誅而去之是欲上下雷同小大阿黨而無一言異者陛下謂如此為朝廷之福耶非也孟子曰入無法家拂士則國常亡又稱文王之徳者曰以諤諤昌凡古之所謂衆賢和扵朝與舜命九官濟濟然和之至者非雷同阿黨能順適人主之心意之謂也昔齊景公謂梁丘據曰據與我和晏子曰是同也非和也公曰和與同異乎曰和如羔焉君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否古之君臣以獻可替否為和非雷同之謂也君臣之間既不可雷同如此卿士大夫進則陳力就列退則逰從講習又可得而阿黨㢤周公之事召公嘗不悦矣孔子之舉子路嘗愠見矣子夏之言子張嘗不取矣昔趙宣子用韓厥為軍馬司厥戮其僕宣子以為可賀左雄薦周舉為尚書舉劾其罪雄自為知人吕公著孫覺與王安石皆平日相友善之人也豈欲一旦遽相絶㢤盖朝廷之事不可以私好廢公議不得以枉道為阿黨也是朝廷之所樂得安石所當願聞也前日孫覺之奉詔出按非以其法為可行也已而避免豈有它㢤直以為不俟徃而知其法不可行也陛下原其心為有罪者耶吕公著陛下任為御史中丞矣臣雖不知其言之詳然祻亂之機危亡之漸御史中丞且不得言孰得而言者今摘其造辟之言以為罪臣恐上下顧避大小觀望交事鉗黙陛下聰眀不復廣矣陛下雖罪孫覺為反覆公著為誣藩鎮天下之人皆謂陛下為其忤㫖又為其忤安石之意也倘陛下之意皆不為前所陳二者姑欲曲狥安石而茍行之則復有大駭深憂者安石狭中自信寖違義理以必行為期以取勝為事無復以生靈之存亡社稷之安危為念凡異已者必致之罪而擠去之同已者無問能否而進擢之臣不知陛下負扆南靣傳祖宗百年之業而總四海九州之命為其遂非角勝之資以慶賞刑誅之柄為其立朋報怨之具深為陛下不取也近者司馬光移書安石條例之司常平之使曰可罷則天下之人咸被其澤曰不可罷則天下之人咸被其害方今生民之憂樂國家之安危係安石之一言爾誠如光言則是行與否雖陛下不得専矣况安石忽事而輕信徒有忿克之心因其性蔽而隂導之者吕恵卿也今安石喜怒好惡事之用舍唯恵卿之聽則是生民之憂樂國家之安危亦不獨係安石之一言又係扵恵卿矣嗚呼古之陪臣執國命政逮大夫者豈異此也司馬光固非狂悖不思以出此言也陛下将不以為慮耶噫社稷大寳也生靈重事也盖不可忽易守也昔詩人傷周室之大壊不過曰曽是强禦曽是掊克曽是在位曽是在服陛下試察此四者扵今為少耶詩曰不自為政卒勞百姓又曰盜言孔甘亂是用餤臣願陛下燭之以獨智斷之以心術博取輿論曲循至理純取先王之道改謀長世之䇿無為盗言之孔甘殘弊百姓以階亂豈獨臣之幸社稷生靈之幸也孔子曰不曰如之何如之何者吾末如之何也已矣盖言智者察扵未萌眀者見扵未形不使無可奈何之悔至大駭而後圖之也臣鄙野之人分甘貧賤自去夏以来四乞外任不䝉俞允誤被責任復不獲避自顧狂妄譏訕為多今復發憤懣悉肺腑愚直之誠期死而後已設陛下終不以其言為然願懲任使之失早賜竄戮不勝幸甚歴代名臣奏議卷二百六十五
