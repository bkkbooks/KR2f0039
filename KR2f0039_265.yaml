body:
  text: 歷代名臣奏議卷二百六十五眀楊士竒等撰理財宋神宗熙寧初三司使田况獻內帑策曰王者官天下家六合風化普暨孰非王土經産雜出悉為邦賦故守之以至德推之以大公調度所共皆有藝極國計之外不聞私積周禮內府受九貢以待邦之大用外府供百物以待邦之小用以此故有內外之異非天子之私藏也若或任聚斂之臣規藴蓄之厚雖恭儉之主嗇用而致然于德音無所益也况繼統之君席有其富或肆侈靡以遺患乎唐明皇踐阼之初鋭意于理躬履儉德述宣醲化後之言治者比開元如貞觀逮乎末年乃恃泰寧內縱奢樂權臣怙寵巧説媚上以謂賦稅所收則歸之有司以濟用度進獻所入當納于天子以奉宴私明皇悅之遂為瓊林大盈之庫王鉷每嵗進錢百億皆云不出租庸侵牟黎元厚餌冦盜厥後韋臯李兼杜亞劉贊之徒競為貢奉曲祈恩寵至于裴肅窮賈鬻之利以遷廉察嚴綬傾軍府之資以拜刑曹末俗流風遂而莫禦陸贄嘗為德宗備陳其失可謂切至端嚴之論也國家開疆窮朔南建號侔周漢舟車所逹上給中都而計利之司稽求繁廣斫及圭撮嵗求倍蓰加以鳴社慶辰升煙大祀册禮昭縟容典交修九州之民無不咸獻其力四海之內各以其職來祭裒于公賦輸之內帑雖異乎唐室方貢之物然亦非邦計之羡餘也往嵗軍須不充計臣致請內出錢帑謂之假貸職掌之者旋復追索經逺之士咸以為非且王者之于貨財豈有內外國家之有天下豈有公私使外足而內不足君孰與不足私足而公不足君孰與足昔漢文之享御也施利澤省繇費民有餘力國有滯財孝武得以因其資而騁嗜奔欲玩兵黷武用既殫費藝不可已于是桑羊孔僅之徒専務功而𣙜酟算緡坐市販物鹽鐡釱趾株送補郎之法流弊于千古矣嚮非髙祖文帝之德洽著于前昭帝霍光之勤休息于後則生民虛耗未易集也靈帝之時多蓄私藏中上方斂諸郡之寶中御府積天下之繒民困調繁且為導行之費漢家業衰于此矣漢室尚爾矧陳隋之末世乎是府庫之積不為私也章矣今縱未能盡出所積以付逌司亦當視豐凶之年恤疲羸之俗去出納之吝通內外之財俟乎下民寬饒大計盈給然後內于别藏斂其餘資亦不為過也抑又聖人大寶曰位見于易繫天子不私求財存乎書法蓋寶乎位則它物非足寶私乎財則何不為私以是而言所本尤大若夫心獨捨近謀逺則無窮之慶及于萬嗣矣熙寧二年判大名府韓琦乞罷青苖及諸路提舉官奏曰準轉運及常平廣惠司牒支俵青苖錢每十戶以上結成一保須第三等以上有物力人充甲頭第五等并客戶不得過一貫五百文第四等每戶不過三貫文第三等每戶不過六貫文第二等每戶不得過十貫文第一等每戶不得過十五貫文如所支錢外更有剩數其第三等以上人戶委本縣量度物力于今來所定錢數外更添數支給若更剩錢如坊郭人戶實有自己物業可充抵當願借請官錢者仍五家以上結為一保依鄉村青苖例支錢借不得過物業抵當所直價錢之半其逐縣即不得避出納之煩令諸色人扇搖人戶却稱不願請領仰逐縣官吏用心曉告如不願請領即具結罪文狀入馬遞中赴當司以慿選差清強官往彼曉諭人戶如却願請領其本縣干繫人必别作行遣如事理稍重必具事由申奏應夏秋收成合納所請過價錢斛斗如物價稍貴願納見錢者當議于市價上減朴錢數仍比附元請價錢上十分中不得過三分假令一戶請過錢一貫文如送納見錢不得過一貫三百文臣切以國之頒號令立法制必信其言而使民受實惠則四方觀聽孰不欣服伏詳熙寧二年詔書務在優民不使兼并乘其急以邀倍息凡此皆以為民而公家無所利其入謂合先王散惠興利抑民兼并之意也今乃鄉村自第一等而下皆立借錢貫三等以上更許增添坊郭戶有物業抵當者依青苖例支借且鄉村上三等并坊郭有物業戶乃從來兼并之家也今皆多得借錢每借一千令納一千三百則是官放息錢與初詔抑兼并濟困乏之意絶相違戾欲民信服不可得也又鄉村保須有物力人為甲頭雖云不得抑勒而上戶既有物力必不願請官吏防保內下戶不能送納豈免差充甲頭以備代陪復峻責諸縣人不願請即令結罪申報若選官曉諭却有願請者則干繫人别作行遣或具申奏官吏懼提舉司勢可升黜又防選官曉諭之時豈無貧下浮浪願請之人茍免捃拾須行散配且下戶見官中散錢誰不願請然本戶夏秋各有稅賦又有預買及轉運司和買兩色紬絹積年倚閣借貸麥種錢之類名目甚多今更增納此一重出利青苖錢愚民一時借請則甚易至納時則甚難故自制下以來一路官吏上下惶惑皆謂若不抑散則上戶必不願請近下等第與無業客户雖或願請必難催納將來必有行督索及勒干繫書手典押耆長戶同保人等均陪之患大凡兼并者所放錢雖取利稍厚緣有逋欠官中不許受理往往舊債未償其半早已續得貸錢兼并者既有資本故能使相因嵗月漸而取之今官貸青苖錢則不然須夏秋隨稅送納災傷及五分已上方許次料催還若連兩料災傷則必官無本錢接續支給官本因而寖有失陷其害眀白如此更有緣此煩費虛擾之事不敢具述去嵗河朔豐熟常平倉糴米斗錢不過七十五至八十五以來若乘時收斂遇貴出糶不唯合于古制而無失陷之弊兼民被實惠亦足收其羡贏今諸倉方有糴入而提舉亟令住止蓋盡要散充青苖錢指望三分之利收為已功縣邑小官敢不奉行豈暇更恤貽民久逺之患哉諸路所行必料大率如此朝廷若謂陕西嘗放青苖錢官有所得而民以為便此乃轉運司因軍儲有闕遇自冬涉春雨雪及時麥苖滋盛決見成熟行于一時則可也今乃差官置司為每嵗春夏常行之法而取利三分豈陕西權宜之比哉兼初詔且于京東淮南河北三路先行此法候成次第即令諸路施行今此三路方憂不能奉行而遽于諸路遍差提舉官以至西川廣南亦皆置使伏惟陛下自臨御以來夙夜憂勞勵精求治况承祖宗百年仁政之後民浸德澤唯知寬恤未嘗過擾但躬行莭儉以先天下常莭浮費漸汰冗食自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑哉欲望聖眀更賜博訪若臣言不妄乞盡罷諸路提舉官只委提點刑獄官依常平舊法施行時上親袖琦奏出示執政曰琦真忠臣雖在外不忘王室朕始謂可以利民不意乃害民如此出令不可不審且坊郭安得青苖而使者亦強取之乎王安石進曰茍從其所欲雖坊郭何害因難琦奏曰陛下修常平法所以助民至于收息亦周公遺法也且如桑𢎞羊籠天下貨賄以奉人主私欲此乃所謂興利之臣也今陛下置官為天下理財非以佐私欲則安可謂之興利之臣乎上曰坊郭俵錢如何曽公亮陳升之皆以為不當俵安石曰坊郭所以俵錢者以常平本多農田所須已足而有餘則因以賑市人乏絶又以廣常平儲也廣常平儲所以備百姓之凶荒不知于義有何所害公亮曰坊郭上等戶則無所用之下等戶則難于輸納安石曰既取情願則無所用者自不俵既有保甲則難于納者自不能請矣升之曰但恐州縣避難索之故抑配上戶耳安石曰抑配誠恐有之然俟其有嚴行黜責一二人則其弊自絶如河北路則恐不可抑配聞韓琦自諷諭諸縣言百姓皆不願投狀唯一縣初以為不便而為司録陳紘者説譬曰若朝廷更選人體問而百姓反稱情願則奈何于是乃不敢投狀儻河北一路有一人不願則韓琦必受其狀以聞今琦自入奏乃無此則百姓不以為不便提舉官不敢抑勒可知矣然上終以韓琦所説為疑安石曰臣以為此事至小利害亦易眀直使州縣抑配上戶俵十五貫錢又必令出三分息錢一尸所倍止三貫錢因廣常平儲蓄以待百姓凶荒則比之前代科百姓出米為義倉米未為不善況又不令抑配有何所害而上煩聖心過慮臣論此一事已及十數萬言然陛下尚不能無疑如此事尚為異論所惑則天下何事可為上曰要須盡人言料文彥博吕公著亦以為不可但腹非而已韓琦獨肻來説真忠也安石曰事誠當盡人之情偽事之是非若于情偽是非不能深察唯務多納人言則恐非但常平事不可為事事皆無可為者翌日安石遂稱病不出詔以琦奏付三司制置條例司是時制置三司條例司言羣臣數言常平新法不便今畫一申眀乞敕諸路安撫轉運提點刑獄提舉官曉諭所屬官吏使知法意一言者謂元敕云公家無所利其入今河北提舉官乃令取息三分失信于百姓本司今按周禮泉府之官乃云貸者取息有至二十而五凡國家之財用取具焉今常平新法豫給青苖錢但約熟時酌中物價熟時物貴即許量減市價納錢即是未定合納實數故河北約束州縣納錢不得過三分京西陜西等路大抵不過二分而已凡此蓋為量時價旨揮未有約定實數恐納時倍歸州縣量減錢不多致虧損百姓即非法外擅為侵刻也就諸路所約惟河北最多然云不過三分即非定取三分之息若物價低平即有當納本色不收其息或止收一二分息時多少相補比周禮貸民取息立定分數已不為多近又令預給價錢若遇物價極貴亦不得過三分既比周禮所取尤少于元條欲廣儲蓄量減時價旨揮不相違戾固無失信之理又周禮國事財用取具于泉府之官賖貸之息今常平不領于三司専以振民乏絶比周公之法乃不以取具國事之財用故云公家無所利其入一言者謂上三等戶及城郭有物力戶即從來兼并之家今乃立定貫石許之貸借非抑兼并之意又河北每保須上三等戶一人上等戶必不願請官吏既防貧戶不能送納豈免差充甲頭以備代陪又提舉官峻責州縣如民不願請即結罪申報若選官曉諭却願請即當别作行遣州縣官吏懼提舉官曉諭或須散配本司今案鄉村上三等城郭有物力戶亦有闕乏之時從人舉債豈皆是兼并之家今貸貧民有餘則以給此等戶免令就私家取一倍之息乃是元敕抑兼并之意河北每保須上三等戶一人者蓋以檢防浮浪之人若有上戶肻與同保即自不許支給何須更行散配若謂上三等戶必不願請須差作甲頭即自是抑勒違法況今年開封諸縣甚有三等戶願請即非抑勒以近驗逺事理可知至于提舉司約束止關防因循避事壞法之人即非迫遣須令抑配若提舉官或急于求利諷州縣抑配即諸路有安撫轉運提點刑獄其為朝廷委任皆在提舉官之上若有州縣官員故欲隳壞新法或曲徇提舉官意指抑勒百姓當糾舉依法施行及具事狀奏聞豈宜以官吏違法之故遂欲廢一言者謂百姓各有本戶稅賦及豫買納絹又生此一重豫給青苖錢則人戶不易本司今案百姓稅賦之外逐路承例科斂名目誠多然當闕乏時不免私家舉債出息常至一倍此所以貧者愈困也今貸與常平本錢乃齊其艱急又令約熟時斛斗物價貴賤然後令納見錢此元本不得過二分是免于兼并之家舉一倍之息民戶有何不易一言者謂但躬行莭儉常莭浮費自然國用不乏何必使興利之臣四出以致逺近之疑本司今案先王之政未嘗不以食貨為始張官置吏大抵多為農事也近世以來農人尤為困苦朝廷但有徭役加之初無嵗時備預之法近自京畿陂防溝洫多有不治乃至都城側近往往綿地數百里棄為汙萊父子夫婦流離失業四方荒僻不問可知一方水旱則死者相枕籍而流移者填道路如前嵗河北一飢則不免漕江淮之米以救之然于人之流亡餓殍未有補也至有非泛用度或不免就上等戶強借錢物百姓典賣田産物業以供暴令此亦可謂國用乏矣至于差使困苦農民使之失職則士大夫之所共見不待論説而後可知故陛下即位詔書丁寧以務農理財免人役為政事之急方今置提舉常平廣惠倉官兼管當農田水利差役事者凡以此而已固非使之朘削百姓以佐人主私費豈得謂之興利之臣而致逺近之疑一言者謂今常平千餘萬緡散作青苖錢民所欠負財力既竭加以水旱之災不得不為之倚閣因郊赦除之十年之後千餘萬緡散而不收矣常平舊法自合古制而無失陷之弊不當變改本司今案常平新法豫給價錢並令公人認識又須十戶以上為一保如河北又須保內有三等戶一人自來豫買紬絹及青苖錢蠶鹽其法關防未能備具如此乃不聞有拖欠除放則常平新法自非官吏故欲沮壞不容獨致失陷官物今新法之中兼存舊法但以舊法廣儲蓄抑兼并振貧弱之方尚為未備又無専領官司所以諸路利多糴貴價斗斛至有經數年出糴不行無補振救又糶糴之時官吏姦弊百端故須約周禮賖貸增修新法専置一司提舉覺察非廢舊法違古制也一言者謂新法不當示之條約眀言利息本司今案周官貸民眀言以國服為息蓋聖人立法惟示信于天下取之以道非以為私于理何嫌而不可眀示條約一言者謂坊郭戶既無苖不貸借本司今案常平舊法亦糶與坊郭之人今若給散農民有餘仍不許坊郭之人貸借是令常平有餘積餘藏而坊郭之人獨不被朝廷振救乏絶之惠也周禮貸民之法無都邑鄙野之限今新法乃約周禮太半已試之法非専用陕西豫散青苖條貫也今新法方行官吏不能體朝廷立法之意不肻公共推行或以錢斛抑配與人或利在易為催納専貸與物力髙強戶或留滯百姓不為及時給納故縱公吏乞取致百姓枉有糜費或不量民物力給與錢斛太多致難催納不能關防辨察令浮浪之人為一保冒請官物致難催納或拖延不為及時催納却非理科校公人百姓之類自是州縣官吏弛慢因緣為姦不可歸咎于法乞令逐路安撫轉運提點刑獄提舉官常切覺察依條施行命官具案取旨重行黜罰安撫轉運提點刑獄提舉官失于舉覺致朝廷察訪得實亦當量罰第行朝典從之時琦判相州又上奏曰臣近以河北路差官置司春夏放青苖錢眀取三分之利有傷國體上下皆知不便而以制置條例司是大臣主領但人人腹誹不敢公言臣被顧三朝又職當安撫實不忍雷同默默遂詳陳利害本末乞加博訪所兾陛下灑然開悟亟更改使天下歌舞聖眀不為盛德之纍老臣獻忠之心豈有它也今蒙制置司以臣所言皆為不當條件疏駮乞申敕諸路及直旨揮進奏院以中書曉諭劄子頒行天下臣詳制置司疏駮事件多刪去臣元奏要切之語唯舉大槩専用偏詞曲為沮難及引周禮國服之息為説文其謬妄上以欺罔聖聽下以愚弄天下之人將使無敢復言其非者臣不勝痛憤須至再有辨列欲望親覽然後降付中書樞密院看詳送御史臺集百官定議如臣言不當甘從竄殛若制置司處置乖方天下必受其弊即乞依臣前奏盡罷諸路提舉官只委提點刑獄司依常平舊法施行以慰衆心一制置司云周禮泉府之官民之貸者取息有至二十而五國之財用取具焉今常平新法比周禮貸民取息立定分數已不為多遇物價極貴亦不得過三分即比周禮所取尤少臣切以周公立太平之法必無剝民取利之理但漢儒以去聖之逺解釋或有異同按周禮泉府掌以市之征布斂市之不售貨之滯于民用者以其價買之物揭而書之以待不時買者各從其抵臣謂周制民有貨財在市而無人買或有積滯而妨民用者則官以時價買之書其物價以示民若有急求者則以官元買價與之此所謂王道也經又云凡賖者祭祀無過旬日喪紀無過三月鄭衆釋云賖貰也以祭祀喪紀故從官貰買物賈公彥疏云賖與民不取利也經又云凡民之貸與其有司辨之以國服為之息鄭衆釋云貸者謂從官借本賈也故有息使民弗利以其所賈之國所出為息也假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償臣所謂周制有從官借本賈者亦不以求民之利但令變所貸錢輸國服即以為息也此所謂王道也而鄭康成釋云以其于國服事之稅為息也于國事受園廛之田而貸萬泉者則期出息五百臣謂周禮園廛二十而稅一近郊十一逺郊二十而三甸稍縣都皆無過十二惟漆林之征二十而五漆林自然所生非人力所作故稅重康成乃約此法謂從官貸錢若受園廛之地貸萬錢者出息五百公彥因而疏解謂近郊十一者萬錢期出息一千逺郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千臣謂如此則須漆林之所取貸萬錢息二千五百也然當時未必如此今放青苖錢凡春貸十千半年之內便令納利二千秋再放十千至嵗終又令納利二千則是貸萬錢者不間逺近之地嵗令出息四千也周禮至逺之地出息二千今青苖取息尚過周禮一倍則制置司言比周禮取息已不為多亦是欺罔聖聽且謂天下之人皆不能辨也且古今異制貴于便時周禮所載有不可施于今者其事非一若謂泉府一職今可施行則上所言以官錢買在市不售及民間積滯之貨俟民急求則依元買價與之民有祭祀喪紀就官中借物限旬日三月還官而不取其利制置司何不將此周公太平已試之法盡申眀而行之豈可獨舉注疏貸錢取息之一事以詆天下之公言哉鄭康成又注云王莽時貸以治産業者但計贏所受息無過嵗什一公彥疏解云莽時雖計本多少為定及其催科惟所贏多少假令萬金嵗贏萬泉催一千贏五千催五百餘皆據利催什一臣謂王莽時官貸本萬錢嵗終贏得萬錢止令納一千若贏錢更少則納息更薄比今于青苖錢取利尤為寬少而王莽之後上自兩漢下及有唐更不聞有貸錢取利之法今制置司遇堯舜之主不以二帝三王之道上禆聖政而貸錢取利更過王莽之時此天下不得不指以為非而老臣不可不辨也況今天下田稅已重固非周禮什一之政則又隨畝更有農具牛皮鹽錢趜鞋錢之類凡十餘名件謂之雜錢每遇夏秋起納官中更以紬絹斛斗低估價直令民以此雜錢折納又每嵗散官鹽與民謂之蠶鹽折納絹帛更有預買和買紬絹如此之類不可悉舉皆周禮田稅什一之外加斂之物取利已厚傷農已深奈何更引周禮國服為息之説謂放青苖錢取利乃周公太平已試之法此則誣汙聖典蔽惑睿眀老臣得不太息而慟哭也一制置司云提舉官約束州縣納錢不得過三分二分蓋恐納時斛斗倍貴州縣量減錢數不多若物價低平即有合納本色不收其息臣亦謂此論之不實也然小麥最為不禁停蓄之物自來常平倉不糴蓋恐積留損壞今嵗雨雪及時麥價必賤提舉官必不肻令民納本色蓋納下本色則無由變轉若于轉運司兑換價錢則諸處軍糧支小麥絶少必難兑換則占壓本錢下次無錢散與民戶臣以此知制置司提舉官本無令民納斛斗之意故開此許納見錢一門將來止令言民願納錢息不容納本色則民須至糶麥納錢豈不殃害百姓惟陛下早悟臣言一制置司云鄉村上三等及城郭有物業戶亦有闕乏之時從人舉債豈是兼并之家臣切以鄉村上三等及城郭有物業之戶非獨知是從來兼并之家此天下之人共知也今制置司以為非兼并之家者止欲多散青苖錢與之而得利亦多也其如敕意本務拯濟困乏却以錢放與此等戶則天下眀知朝廷専以取利為意實傷國體制置司若謂周官有貸民之法取之以道于理無嫌在今兼并之家例開質庫置課場若恐取民倍息以傷貧細則所在皆可官自開置以抑兼并然自前世以來惡其太近衰削不忍為之今青苖錢一事無乃近于此乎又云每保須上三等戶一人者蓋以檢防浮浪之人此則抑勒之勢不假臣言而自眀矣又云若謂上三等戶必不肻請領至差作甲頭即自是抑勒違法此又殊不察事勢人情有不得已而為之者且青苖之法內有大臣力主事在必行外有専差之官唯以散錢數多為職辦州縣官吏往往變抑勒而為情願者蓋事勢不得不懼而人情不得不從也監司之官其于事勢人情亦何異此九重髙逺豈得盡知惟陛下早賜辨察制置司云先王之政未嘗不以食貨為始張官置吏大抵多為農事也近世以來農人猶為困苦朝廷非泛用度或不免就上等戶強借錢物百姓典賣田産物業以供暴令今置提舉常平廣惠倉官兼農田水利差役使者凡以為此固非使之朘削百姓以佐人主私費亦豈得不謂之興利之臣而致逺近之疑臣詳制置司眀舉貸錢取利之法謂取之以道于理無嫌則非興利而何至于東南所差均輸之官亦皆興利之臣也且西川四路鄉村民多大姓一姓所有客戶動是三五百家自來衣食貸借仰以為生今若差官置司更以青苖錢與之則客于主戶處從來借貸既不可免又須出此一重官中利息其它百姓固不願請青苖錢又廣南路土曠人稀水鄉之俗粗足生計今亦置官司貸錢取利故于逺民尤為不便豈得不謂之致逺近之疑國家幅員至廣一方水旱時所不免然未嘗不假貸糧種盡救荒之政以濟恤之故能飢饉者復蘇流庸者復安自祖宗以來可謂仁政充洽矣而未嘗就上等戶強借錢物唯是英宗及陛下即位之初天下各有優賞朝廷自京師應副未及間故有三兩路州軍嘗措借于坊郭富民然亦即時輦還今制置司指為暴令以頒布天下是唯知主張青苖之法而不顧毁讟之甚誠可駭也一制置司云常平舊法亦糶與坊郭之人周禮貸民無都邑鄙野之限今新法乃約周禮太平已試之法即非専用陕西青苖條貫也臣詳制置司此説尤為不實蓋自來常平倉遇嵗不稔物價稍髙合減元價出糶之時鄉村則下諸縣取逐鄉近下等戶姓名印給關子令執赴倉每戶糴與三石或兩石坊郭則每日糴與浮居戶每口五斗或一斗故民受實惠甚濟飢乏即未嘗見坊郭有物力戶乃來零糴常平倉斛斗者此蓋制置司以青苖為名欲多借錢與坊郭有物業之人以望得利之多假稱周禮太平已試之法以謂無都邑鄙野之限以文其曲説唯陛下深詳其妄一臣近以內藏庫絹二十萬匹為河北常平本錢轉運常平倉司遂申制置司募請人依青苖錢法制置司劄子依所申施行坊郭戶願者亦聽真定府請絹三萬匹未及般取常平倉司差殿侍康承丙詣屬縣催促真定以為張皇騷優戒承丙毋下縣牒常平倉司追還牒臣照會臣遂録奏庶朝廷見其為害之深却準中書劄子康承丙本皮公弼等乞充差使幹當兼纍令提點刑獄司覺察所散青苖錢不得勒令或有抑配便令止絶具當職官姓名奏劄與臣知臣勘會轉運司昨配賣絹與坊郭戶每匹估價錢一千五百三十理一千六百限半年納錢下等戶猶有破賣家財方能貼納者今提舉官以絹二十萬匹每匹上等作一千三百五十每千取利二分每匹已是一千六百一十下等作一千三百并利亦是一千五百六十並隨稅納是百餘日納足與轉運司賣價全不相逺即與農民豈不為害更差使臣督迫給散縣邑小官茍免過咎以抑配為情願何可辨眀且制置司雖大臣主領然終是定奪之所今直指揮許散絹與鄉村戶依青苖法納錢及令坊郭戶願請者亦聽則自來未有定奪之司事不關中書樞密院不奉聖旨直可施行者如是則中書之外又有一中書也中書行事亦須進呈或候畫可未嘗直處分惟陛下察其専也如是則知在外守職臣寮誰敢不從願早賜辨察使事歸政府庶于國體為便二年右正言李常論青苖疏曰臣伏見陛下焦勞旰食憂恤黎元求所以富安休養之道而獻議之臣措置失當設法遣使布滿天下始稱補助耕斂終言利息分數致百姓疑懼騷然不寧不復信朝廷有愛民之心直謂巧為掊剋而已陛下雖欲推不忍之至誠百姓何由而知之臣聞作法于涼其弊猶貪今作法于貪復何善之有臣深察物情博訪民俗皆謂雖一切取民之願尚不免誤其易于得財侈于妄費不計後日輸官之難臨時迫蹙況今官吏務為功效百端罔民其尤甚者使善良避請納之費虛認貫百以輸二分之息臣考之三代下至近古未聞欲求治平輔養元元而為法如此之弊者今百姓之室空匱已甚苛朘巧削日入于困窮困窮之至為盜而已矣陛下御天下之日未久德澤之所以浸漬生民未深而輔佐之臣作為此法使毒流海內小大驚扇疾視其上不蚤沮止恐非社稷之福此臣所以早夜憂懼惓惓不已纍冒鈇鉞之誅上干天聽願一切寢罷以安輿情至今未蒙指揮伏望聖慈悉降臣前後論青苖錢劄子付有司施行常論青苖第二狀曰臣謹按前漢書食貨志言王莽每有所興造必依古傳經文國師公劉歆言周有泉府之官收不售與欲得即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有貸賖樂語有五均傳記各有斡焉今開賖貸張五均設諸斡者所以齊衆庶抑并兼也遂于長安及五都立五均官更名長安東西市令及洛陽邯鄲臨淄宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商能採金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不植藝者為不毛出三夫之布民浮遊無事出夫布一匹其不能出布者冗作縣官衣食之諸取衆物鳥獸魚鱉百蟲于山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及它方技商販賈人坐肆列里區謁舍皆各自占所為于其所之縣官除其本計其利十一分之而以其一為貢敢不自占自占不以實者盡沒入所采取而作縣官一嵗諸司市常以四時中月實定所掌為物上中下之賈各自用為其市平毋拘它所衆民賣買五榖布帛紬綿之物周于民用而不售者均官有以考檢厥實用其本賈取之毋令折錢萬物昻貴過平一錢則以平賈賣與民其賈低賤減平者聽民自相與市以防貴廋者民欲祭祀喪紀而無用者錢府以所入工商之貢但賖之祭祀無過旬日喪紀無過三月民或乏絶欲貸以治産業者均受之除其費計所得受息毋過嵗什一吏用苛暴立威旁緣犯禁侵刻小民富者不得自保貧者無以自存起為盜賊及莽未誅而天下戶口減半矣伏觀班固述王莽事其詳如此其所施置蓋皆略本先王而其初為説非不美也及乎繆戾至使百姓無聊搖手觸禁富者不得自保貧者無以自存而起為盜賊卒以敗亡者何也志于利故也夫茍志于利雖純法三王其法則猶不可行況徒用其言以欺世耶孔子曰放于利而行多怨此眀驗也今青苖法與王莽事無以異寖違愛民之初意一切以利為言而不顧此臣所以知不復可行而願罷也臣愚實懼陛下未盡省覽班固所載之始末謹繕寫其略不憚上煩天聽伏望聖慈萬機之暇特賜反覆觀覽而深鑒之其青苖法伏乞早降詔旨寢罷天下幸甚易曰不逺復無祗悔元吉此之謂也三年常等論王廣廉青苖取息奏曰臣等伏見河北提舉常平廣惠倉王廣廉近至京師倡言青苖新法已曉諭河北取三分之利又聞制置條例司欲取其法行之天下臣切以為過矣臣略聞其斂散之法云下戶恐其負之不敢輒給其上戶則十有七八願者若爾則與立法之意相違戾矣新法以摧兼并惠貧弱為意而下戶不及又以贍上等之有餘則是助大賈蓄家以乘民之不給也何以為輕重盈虛之術乎况朝廷詔令云凡皆以為民而公家無所利其入是亦先王散惠興利以為耕斂補助裒益多寡而抑民豪奪之意也今才數月而取利二分則與詔旨甚相乖戾異時姦吏旁緣與聚斂之臣刻剝日滋則雖倍稱之息未可知也劉歆為新莽開賖貸設五均其弊至于亡國但云計贏所得受息毋過嵗什一周禮凡民之貸者以國服為之息康成之注亦引莽制以為解今使人什三則又過亡新二矣既許其一嵗再貸則其息遂至于什六下何以堪之哉詩曰曽是掊克斂怨以為德以陛下之睿聖有意于三代之隆若生財有道用財有莭臣恐天下之財充牣委積而不可勝校而廣廉小人造端以籠天下之利一旦生民重賦至于無聊而怨及于上為害豈淺哉臣愚伏望陛下置廣廉于理可懲擅命之吏眀詔有司推法之本意諭所遣提舉官勿以強民一切隨其所願倘蒙聖慈昭然辨其難以遽行止且試之河北陕西數路不勝幸甚天下至大生靈至衆不可以倉卒治也常又論王廣淵和買抑配取息奏曰臣近聞京東轉運使王廣淵以陳汝義所進羡餘錢五十萬貫隨和買絹錢俵散今却令每貫納見錢一貫五百于常稅折科放買之外又取此二十五萬貫大凡挾轉運使之勢臨郡縣以鞭笞強百姓出息錢雖倍稱猶可雖然此而不懲臣恐姦利小人交以掊克為事不思窮閻敗室日益困窮陛下德政不復下浹而祻亂起矣今中下之户有田不過二頃二頃之收不過百斛數口之家一嵗之食過半而輸租糞田吉凶疾病之費悉資于榖粟今又強之使出錢錢非農夫所常有者不以粟易則賣田土而得之或奪其食或廢其生生之業如此而望民俗安堵冦賊不作難矣竊聞御史程皓已常言乞付有司施行常又論青苖奏曰臣聞易曰何以守位曰仁何以聚人曰財理財正辭禁民為非曰義繇伏羲以來治天下者未有不以仁守位以財聚人以義理財者也知非仁不可以守位則凡法度之設號令之施茍不仁不可用矣知非財不可以聚民則夫家之衆鰥寡之窮食不足不可保矣知非義不可以理財則租賦之入斂散之方失其宜不可行矣自設網罟作耒耜至井牧田野十一而稅之其為法必本于仁其養民必厚于財其理財必主于義上下交足而治道成矣故孟子言為國必曰信仁賢有禮義然後有政事有政事則財用足然則政事不僉謀于仁賢不悉由于理義則不可以行也理財用而不由仁與義則上匱而下窮矣故古之人曰王人者將道利而布之上下者也後世聖人不作仁澤滅息暴君汙吏知厚上而刻下剝民以縱欲賦斂已重徭役已極不思公上用財之道日廣以自莭損巧斂以求適志故自幽厲以來詩書所載莫不譏重賦懲過取主愛民以為言不患其不能益上而患其刻下也故曰百姓足君孰與不足又曰財散則民聚財聚則民散又冉求賦粟倍它日則孔子欲鳴鼓而攻之曰與其有聚斂之臣寧有盜臣昔者夏桀率遏衆力率割夏邑後世言暴斂者必稽之曰大桀小桀商紂厚賦稅以實鹿臺之財盈巨橋之粟周厲王用榮夷公専天下之利秦收太半之賦竭天下之資以奉其政其後漢威靈下至隋唐其惡政弊法尚足道哉此皆法度號令不本于仁租稅賦斂不要於義而不能散利保民以取滅亡敗亂之眀效也臣實至愚粗分義理但知阜俗厚下恤鰥寡助乏絶為先王之道不知罔民欺世事刻剝困生靈為治世之䇿而又愚昏不敏不敢以非義逆詐初不謂王安石以文學名世行義得君乃不本仁以出號令考義以理財賦而佐陛下為此病民斂怨之術詔命之始尚謂其誠有意于惻怛斯民稽古立法及其黨援掊克小人宣言取利分數方悟其略假先王之遺迹而志在聚斂臣始以朝廷好惡為憂而直議其法必不可行既而小大驚疑逺近騰沸日見其弊人得非之方是之時曽公亮陳升之趙抃皆位冠百寮身輔大政首主厥議曽無執守臺諫官或以職事隔絶或隂竊符同而四海萬里蒙毒莫訴陛下不以臣為不才置之諫爭之列不識欲其雷同結舌姑以備位耶抑亦使其竭誠畢慮救正闕失也臣于安石雖有故舊之義茍懷私而不言誰肻為朝廷言者今安石不思詩人刺掊克所以斂怨易象著益下所以民悅與夫強恕改過捨已從人之為君子之道而日與其徒吕惠卿等隂籌竊計欲文厥過思以頰舌取勝公議寧復以社稷安危為慮者切聞以正論者為同乎流俗憂國者為震驚朕師以百姓愁歎為出自兼并之言以卿士僉論為生乎怨嫉之口而又妄取經據傳會其説謂周人國事之財用取具于息錢而不知泉府實受廛人之五布臣考之周官凡周所以佐國用者有九賦斂財賄有九貢致邦國之用又以九式均莭之大府以關市之賦待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫而不言貸民之息待邦用者今曰周之國事取具息錢亦已罔矣上以惑陛下之聰眀下以欺天下之耳目而貽笑後世可為痛悼可為太息抑臣觀周禮所以必貸民者蓋先王推至仁愛物回旋曲折之深意也所以使出息者不使其幸得而惰于業也周人井牧其田野其六鄉使五家為比則有比長五比為閭則有閭胥五閭為族則有族師五族為黨則有黨正五黨為州則有州長五州為鄉則有鄉士大夫六遂亦然其小大相臨上下相察使相保愛使相葬埋匹夫匹婦受田百畝鰥寡孤獨復有常餼又十一而稅之宜無一人不足者矣唯死喪疾病冠昏之類乃其不幸而不得濟者間有貧不能周于用于是命泉府之官掌其祭祀喪紀者有賖而服田者有貸方是之時民日被上之仁愛上悉知民之有無下如子之怙其父上如父之育其子鄉遂閭井之間不足而貸者嵗亦無幾人嗚呼先王之于民回旋曲折之意可謂盡矣此所謂保民若赤子所謂無一夫不獲者也故孟子能具道平治時之事曰春省耕以補不足秋省斂以助不給又稱夏之諺曰吾王不遊吾何以休吾王不豫吾何以助又知補助之仁不獨周為然也今則不然田無多少之限民無貧富之常吏不識其民民不信其上租稅之入非賄賂不可輸也催科之嚴非鞭笞不能辦也稅斂重數民畏公家如鳥獸之避網罟政令不一吏殘其民猶弋獵之待鳥獸離居散處非有比閭族黨之相伍也非有胥長師正之相統也而又愚瞽頑嚚不能逺計其貧下無賴習為逋逃之人知千百為羣十五為保執一紙之劵而空手得錢則不願者亦寡矣及其出賄賂齎糧食與市廛博易妄用之外實能持錢至其家而致力于畎畝之間者亦無幾矣逮其償也百畝之收二稅徭役之外有支移有折變有配買有和市有貸糧有麥本今又出青苖之本利至時不足則賣其衣食之資又不足則賣牛具又不足則賣田疇又不足則賣妻孥或逃去鄉井或羣起為盜賊矣此臣前日劄子所以言雖一切取民便不免使其易于得財侈于妄費不計後日輸官之難而臨時迫蹙者也今取其願猶且如是況希合小人與畏罪之吏措置乖方者其為患百十倍于是與其貸于兼并者異也凡百姓所以貸于兼并者蓋皆其鄰里近村之人其來貸也誠皆窮乏飢餓不得已者也茍可以適朝昏備農事則不往貸矣其貸與之家亦皆日見其實為乏絶素有誠信真以贍妻孥資耕穫者也茍欲以侈口腹事飲博為利陷法之事則不貸之矣以是觀之嵗貸于人者亦無幾矣然則青苖之法適所以悮妄費不思之窮民爾今法言利之卒所以病之也昔者子産以乘輿濟人于溱洧之上孟子曰惠而不知為政以其人人而悅之也今為法不免于人人而病之可乎又况志在于蓄積者乎今黨蔽掊克小人公言利息紛如而欲天下之吏不希合而強民臣不信也王廣淵者昔條例司稱以公幹才眀之人也前日使試義倉之法乃至邀遮齊州輸稅之民使先詣義倉然後納稅于是冒言民便其法臣恐天下官吏上畏朝廷下畏使者或事希合置二稅而督青苖然後以鞭笞督其租賦蚩蚩之衆何以堪之臣恐不一再貸而天下潰矣古之人曰匹夫専利猶謂之盜王而行之其猶鮮矣孔子曰放于利而行多怨詩曰民之多僻無自立辟又曰民之貪亂寧為荼毒方今稅役苛重百姓空匱雖官廩有未充之憂公帑有不足之慮不思莭用愛人重本抑末而欲矯誣以射利譬猶割膚體以啖口腹其不可眀矣昔魏文侯租賦倍于常日或有以賀者文侯曰今戶不加多而租賦嵗倍譬之反裘而負薪者徒惜其毛而不知皮盡而毛無所附矣此善諭也故書曰民惟邦本本固邦寧又曰怨豈在眀不見是圖豫臨兆民凛乎若朽索之御六馬可不畏哉今陛下欲勸農桑興水利省徭役復常平此先王不忍之心也而獻議之臣直以此優優蔽惑天聽茍有志于朝廷社稷者莫不以為憂勤也詩曰民亦勞止汔可小康惠此中國以綏四方臣願陛下詔天下悉罷青苖法謹擇轉運使而久天下縣令之任俾諸路各上十數年之間為縣而有績狀在民者稍易今不才之令而授所謂農田水利徭役常平之法使各講求施設而寬假之淹以嵗月而考課其績則四海萬里無不被陛下之德澤者抑臣聞之昔魯欲用田賦季孫使冉有訪諸孔子孔子曰若欲行其法則周公之典在若茍而行之又何訪焉臣之至愚其惓惓之義深冀陛下鑒觀先哲之言究察受敝之俗決以獨斷罷于一朝别講治道垂福黔首倘姑取其聚斂之意茍而行之則臣言為迂踈僻滯之甚者而妄譏時政擅廢朝參數違聖旨罪釁大矣豈宜更使居位早行竄逐不勝幸甚常又上議曰臣聞易曰王臣蹇蹇匪躬之故臣自惟狂瞽冒拂天威固已數然其縷縷之誠所以不已者切服大易之義知有犯無隱不知其身之可保也然臣非不知朝夕蒙誅不忍輒有伏藏不盡之意為無窮之恨請一二陳之惟陛下裁擇臣伏見陛下即位未幾起王安石于江湖之上曽未數對遂參機務方是之時中外相慶以為三代之隆可以立俟也安石乃首建制置三司條例天下之人始議其身任大政而専有司之事然善士猶或恕之謂其先公家之所不足將佐陛下以仁義理財賦莭儉先天下交物以道奉養以禮重損浮費圖實廩庾凡教化之事猶有待也已而均需之議造青苖之法天下之人固已大駭而善士猶未之深議謂其志在便民均一有無逺希先王補耕助斂以為于理無嫌及降詔取利牽合經旨謂周公資用于國服之息利害已白而持之不改雖善士不復以為是直謂其誑惑朝廷愚瞽海內所以議論交起不可抑止者其故何也義與利之為道異也始稱放古以行義故君子猶或恕之終則不顧以嗜利雖衆人莫之與也及發七難以拒言者其辭迂其理僻天下之人益知其所存盡於此不復有義理之實徒欲文過求勝豈以生靈存亡之命社稷安危之機為計哉今條例司于浮費無所莭損日造罔民之法均輸官不能通天下之有無百端以射利提舉官奉青苖之令納民于困窮陛下固嘗謂溥天騰沸黎民騷擾矣夫政莫酷于剝民以無度祻莫大于知過而不改古之所以亡國喪天下未有不漸于此者噫今日之弊豈難濟哉改之而已昔者周公蓋有過矣孟子曰其為過也人皆見之及其更也人皆仰之孔子則自訟其過矣曰丘也幸茍有過人必知之又曰過則勿憚改又曰過而不改是為過矣安石不知慮此陛下又從而不悟何也臣亦略聞其所以遂非而不改者有三焉不堪怨仇與士大夫之所譏議而不改一也狹中自信悅諂諛惡誠直遂不以為非而不改二也慿依小人日滿其門進退榮悴繫于事之興廢競為諂辭以悅之忿言以怒之使其持之益堅期于必勝不問義理之所在因以不改三也此三者皆安石自為也所以受敝者陛下之百姓也所以當慮者陛下之社稷也此臣所以切為陛下惑也陛下仁眀睿智早聞道要未壯御宇享祖宗久安之基視圖按籍惻然悼黔首之未乂延見卿士慨然歎人才之不足方欲盡收天下之英俊共講治平之術創為可繼之業今乃相與守區區之弊法又欲卿士大夫阿意順旨而奉行之其不然者從而竄逐之非獨安石負陛下任使之意陛下亦負天下所以用安石之初心矣臣不知陛下甘其所以得利而力行之耶徒悅其順適心意而惡違忤之耶抑曲徇安石而茍為之耶臣請陳此三者凡苛朘巧削之不可臣前論列多矣不待再講而後眀也今陛下深居九重豈盡知百姓之困苦謂其比户溫飽倉有餘粟篋有餘帛可以任權數而採取之耶四海一家皆陛下之赤子而欲效管仲以千里之齊罔鄰國之人耶又況術踈䇿陋為之輒有後災乎今中下之戶農桑之所得才足以輸稅者往往皆是也嵗惡不入不食草根木皮者寡矣尚忍以巧斂之法而虐之乎今陛下甘其所以得利臣姑以利言之凡百姓之有兩稅猶人之有終身之病也夏稅之輸常至九月十月秋稅之輸常至眀年四五月秋稅未絶夏稅又起催矣每催理不足縣令懼踰限之責必強人吏代納然後以鞭笞追還之非為令者懈慢不職民貧不可以迫遽取辦故也兩稅病民如是青苖錢又可及時以斂之乎且十八路之廣一嵗之間必有三路罹蟲蝗水旱之災者則其逋亡倚閣失陷之數不為少也又況不幸遭大飢饉捐瘠流離起為盜賊所謂本利者復何有哉假如一嵗貸錢千萬為利才二百萬臣恐二百萬之利不足以償失陷之數尚可望其息錢以資國用耶且以利言之不足以得利較然甚著矧悖義傷化殘民害物斂怨召亂不可一二道哉陛下雖甘其利而力行之其無益可謂眀矣今朝廷患財用之不足未聞陛下莭儉先天下而一宫殿之費或以百萬計一宴遊之費或以數萬計而欲錙銖取于困窮之民偏聽獨任非順適心意之言不取又將悉誅而去之是欲上下雷同小大阿黨而無一言異者陛下謂如此為朝廷之福耶非也孟子曰入無法家拂士則國常亡又稱文王之德者曰以諤諤昌凡古之所謂衆賢和于朝與舜命九官濟濟然和之至者非雷同阿黨能順適人主之心意之謂也昔齊景公謂梁丘據曰據與我和晏子曰是同也非和也公曰和與同異乎曰和如羔焉君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否古之君臣以獻可替否為和非雷同之謂也君臣之間既不可雷同如此卿士大夫進則陳力就列退則逰從講習又可得而阿黨哉周公之事召公嘗不悅矣孔子之舉子路嘗愠見矣子夏之言子張嘗不取矣昔趙宣子用韓厥為軍馬司厥戮其僕宣子以為可賀左雄薦周舉為尚書舉劾其罪雄自為知人吕公著孫覺與王安石皆平日相友善之人也豈欲一旦遽相絶哉蓋朝廷之事不可以私好廢公議不得以枉道為阿黨也是朝廷之所樂得安石所當願聞也前日孫覺之奉詔出按非以其法為可行也已而避免豈有它哉直以為不俟往而知其法不可行也陛下原其心為有罪者耶吕公著陛下任為御史中丞矣臣雖不知其言之詳然祻亂之機危亡之漸御史中丞且不得言孰得而言者今摘其造辟之言以為罪臣恐上下顧避大小觀望交事鉗默陛下聰眀不復廣矣陛下雖罪孫覺為反覆公著為誣藩鎮天下之人皆謂陛下為其忤旨又為其忤安石之意也倘陛下之意皆不為前所陳二者姑欲曲徇安石而茍行之則復有大駭深憂者安石狹中自信寖違義理以必行為期以取勝為事無復以生靈之存亡社稷之安危為念凡異已者必致之罪而擠去之同已者無問能否而進擢之臣不知陛下負扆南靣傳祖宗百年之業而總四海九州之命為其遂非角勝之資以慶賞刑誅之柄為其立朋報怨之具深為陛下不取也近者司馬光移書安石條例之司常平之使曰可罷則天下之人咸被其澤曰不可罷則天下之人咸被其害方今生民之憂樂國家之安危係安石之一言爾誠如光言則是行與否雖陛下不得専矣况安石忽事而輕信徒有忿克之心因其性蔽而隂導之者吕惠卿也今安石喜怒好惡事之用舍唯惠卿之聽則是生民之憂樂國家之安危亦不獨係安石之一言又係于惠卿矣嗚呼古之陪臣執國命政逮大夫者豈異此也司馬光固非狂悖不思以出此言也陛下將不以為慮耶噫社稷大寶也生靈重事也蓋不可忽易守也昔詩人傷周室之大壞不過曰曽是強禦曽是掊克曽是在位曽是在服陛下試察此四者于今為少耶詩曰不自為政卒勞百姓又曰盜言孔甘亂是用餤臣願陛下燭之以獨智斷之以心術博取輿論曲循至理純取先王之道改謀長世之䇿無為盜言之孔甘殘弊百姓以階亂豈獨臣之幸社稷生靈之幸也孔子曰不曰如之何如之何者吾末如之何也已矣蓋言智者察于未萌眀者見于未形不使無可奈何之悔至大駭而後圖之也臣鄙野之人分甘貧賤自去夏以來四乞外任不蒙俞允誤被責任復不獲避自顧狂妄譏訕為多今復發憤悶悉肺腑愚直之誠期死而後已設陛下終不以其言為然願懲任使之失早賜竄戮不勝幸甚歷代名臣奏議卷二百六十五
