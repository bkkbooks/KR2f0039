body:
  text: 歴代名臣奏議卷一百四十四明楊士竒等撰用人宋孝宗隆興二年張浚次平江奏論人才曰臣初十日自平江府門外起發屢得雨澤物價不貴據諸處報閘水已通糧運畢集建康鎮江𣙜貨兩務日納二萬餘緡俟臣回自取見錢糧的確數目别具聞奏伏乞聖慈少寛念慮臣今日得知泰州范愉申到被虜脱歸人曽充敵寨軍曹司備知敵中人馬錢糧數目與向来范常田換并近日于崇之所供申數目一同仰惟陛下聖知自天神機獨照敵之强弱形勢盡在目中所患乏同心同徳之助而文詞之士識見淺陋無肯為陛下竭死力任重責者向若智者獻謀勇者効命通財計者究心於經畫練邊事者盡節於封陲先其所急後其所緩一意圖事有死無二如創業之時馬上求治陛下何憂夫事之不濟哉臣願陛下急収人才為吾羽翼必使議論歸一讒説莫間以揆今日之變天下幸甚廷臣上言謂國朝視文武為一體故有武臣以文學換授文資文臣以材畧智謀換右職當邊寄者盖文武兩塗情本參商若文臣總幹戎事不換武階則終以氣習相忌冇不樂從者矣今兵塵未息方厲恢復之圖願博採中外有材智權畧可以臨邊可以制閫者倣舊制改授從之乾道以後又選大将之家能世其武勇者武舉及第武藝絶倫可為将佐者會廷臣言曰方今國家之兵東至淮海西至川蜀殆百餘萬其間可為将帥者不在其上則在其下而朝廷未知振其氣表其才也今文臣有三人舉主則為之循資再任五人則為之改秩而武臣無有焉古語曰三辰不軌擢士為相蠻夷不恭㧞卒為将宜令都統制視監司者嵗舉武臣二人視郡守者嵗舉一人以智勇俱全為上善撫士卒專有膽勇者次之不拘将校士卒優以奨擢被舉人有臨戰不用命者與文臣犯入已贓者同併坐舉主帝可其奏仍著為法隆興間起居郎胡銓上疏曰臣聞人主髙拱一堂之上而天下之事無不知人之賢不肖無不察事之利害無不聞豈他術哉不過曰委任一相而已矣夫一相豈能盡知天下之事盡察人之賢不肖而盡決夫事之利害哉不過曰人之賢者進之人之不賢者退之言之善者用之不善者罷之事之利則行之害則去之故賢相能兼衆人之善而賢主能兼宰相之善然世之治也宰相尚能而遜其下羣賢竭智以事其上上下有禮而治功成由不争也謂之懿徳世之亂也宰相稱其功以加衆人衆人伐其技以憑其上是以上下無禮而亂虐生由争善也謂之昏徳自古天下國家廢興存亡之端而未嘗不係乎斯二者也夫留侯漢朝第一也坐籌畫䇿天造地設漢庭無能出其右者然樊噲諫沛公無止秦宫沛公不從留侯曰噲言善願聽之婁敬説漢王都闗中上疑之留侯曰婁敬之言是也於是上即日車駕西都闗中夫韓淮隂猶耻與噲為伍而婁敬脱輓輅一妄庸人耳而留侯亟推其言於漢王可不謂大賢哉魏相亦中興賢宰也其謀謨廟堂之上必有大過人者然讀趙充國二疏傳則亦用衆臣之長耳充國欲罷兵留屯計可謂迂矣相推其言以為可必用帝乃從其計疏廣為太子傅平恩侯許伯建議使其弟舜監䕶太子家廣曰太子師友必於天下英俊不宜獨親外家相免冠謝上曰此非臣等所及宣帝由是聽之夫用兵大議也太子國本也魏相不以二臣為輕議而更以為可從孝宣中興丙魏有聲豈不由推賢揚善而致然哉區區之愚仰惟裁擇乾道中秘書省正字林光朝上疏曰臣聞之道塗竊謂陛下即位以来每有人才不足之歎昨者御便殿對宰臣論及用人之道雲章奎畫聚而成書臣以正字名官一代謨訓所當紬繹幸因賜對得以吐狂愚之説願陛下少垂聽焉陛下有虞舜之孝有夏禹之儉有文王之勤勞又其經營土宇整頓人物有唐太宗之明天下以是數者歸之陛下盖以其實状也非虛名也陛下温顔聽納如此不憚煩不應有人才不足之歎此臣所未喻也夫以天地所養雨露所滋雜然百物古猶今也百物之在天下何嘗不足古今天下豈有人才闕然不足之時耶人君自處常若不足則人才斯有餘矣若自以為有餘則安得不起人才不足之歎乎髙帝自以為有餘則四皓不肯出光武自以為有餘則嚴子陵不肯仕若以謂天下之大不得此數人者是未足為輕重然舜所得纔五人耳禹得一臯陶文王得夫二老者帝王之世人才非不足而其未易得也又如此陛下嘗有意於唐太宗之事太宗所得者房𤣥齡杜如晦一時人物又皆夤緣房杜得以盡其所長是貞觀之時未嘗以人才不足為患也臣因論太宗之事偶於此又得一説天下人才有遭逢成就在乎上之人今天下以鄭國公魏徴為純臣若無一事可議者方其遨遊於李宻竇建徳二者之間使如是終身無所遇合則安得為全人以是知豪傑之士琢削鐫磨或有待乎上之人陛下何遽以人才不足為患也芻蕘之言多不切事情惟陛下裁赦冐犯天威不任隕越淳熈中光朝為中書舎人繳奏謝廓然賜出身除殿中侍御史詞頭状曰臣昨䝉陛下記録孤逺召臣於嶺外遭遇臨雍夤緣從槖臣之僥冒亦已太過當此晚節非有好名干進之疑事或可言雖死何憾臣竊聞王安石欲以李定為監察御史裏行宋敏求知制誥不敢具草今月二十六日送到録黄一道謝廓然可賜出身除殿中侍御史此在公論冇所未安臣職當書行若畏禍忍耻不得已書之他日陛下必然有所悔則臣為欺君者臣之殘年尚在人數中豈應負此名此臣所以不避誅斥而畧陳大槩臣備數詞掖凡再行謝廓然詞未嘗不備述上意以謝廓然為能吏今陛下賜以太常之第命以御史之官是科目太凡名器太輕非所以開張正塗誘来讜論也前日嘗欲以李大正為六察官未㡬復寝豈謂科目出於至公不以輕予人也謝廓然之所長者可以治財賦理獄訟至於耳目之司紀綱之地則有所不可六部寺監所係者一職惟御史府所係者國體天下以為可畏者諫官御史也非御史可畏畏公議也安得如范純仁吕大防者除書之下公議自定茍或人人皆可為御史則公議不立公議不立則天下亦何畏哉是國體輕重在於此不可不早定也中書號令所自出令出惟行弗惟反今此一件臣若書行不知中書所當繳者為何事然天子擇言事之官而臣以本職有所可否則為犯雷霆之威無復生全臣已闔門待罪所有録黄臣未敢書行乾道三年虞允文奏論用人久任利害疏曰皇帝御選徳殿命臣俊卿臣允文臣克家入奏事已乃賜坐從容論今日治道上顧謂臣等用人必當其才必久其任其效乃著臣等對各有指臣某昩死奏誠如陛下聖訓然自古才難知而用之亦難惟公其選則才無不當久其任則職無不舉虞舜氏命官置牧之意具載於書其嚴如此上曰良是命臣等各述所對将刻之屏障君臣交修垂永永戒臣等拜手退敬推原本始上稱明詔臣觀舜典八百一十二言命官之序周悉重複臯陶以刑契以教夷䕫以禮樂禹則播九州告水功各司一職不相亂也三年而考其績九年而黜陟之水土平刑政舉庶功畢奏考其當時選用之際上則為之堲讒説難任人下則徃哉欽哉濟濟相遜不求責於力分之外不茍簡於授受之初其選公故能當其才而可久其任庶政惟和萬邦以穆叔季而降君臣之間非不知此至分職任事帥背此而馳抑亦有繇也哉授者無委能之意受之者有偷合之心或才不才之並處而媢忌生或君子小人之參用而機謀勝一王尊之賢佞不察於愛憎兩曽參之是非亦失於疑似甚者朋邪醜正險陂害成溺於親昵而用其偏壓以權勢而防其進風尚既薄人偽益滋隂植䣊與而伺候短長巧出語言而變亂白黒私謁日勝公道日曖用之無適當之才任之無可久之效此自古及今害治之大者危亡之相尋可畏可懼而不可不察也且羿非射則無術秋舎奕則無藝倉扁棄醫則無活人之功盖執一而求與百俱廢矣故武王之治位事惟能孔子之言使人以器如因其能隨其器久任而責成之失之者亦鮮矣昔在慶歴樞宻副使臣弼上言欲輯三朝典故文字編成一書寘在二府俾為模範因乾徳任官之詔為之釋曰先朝臺省之任必取才望相當能稱其職者以三年為滿所以人無躁進之心官有宿守之業近者除授數月即遷人知速去官無成績犇競之風由此而甚嗚呼弼誠知治體者也臣不佞竊於今日有感於斯言臣某謹書允文又上言曰臣聞論相繫之人主而擇相當以天下故宰相者天下之選也選不以天下而用於一人之私意所相非所任所任非所相而天下之心必有所不服矣舜之舉臯陶湯之舉伊尹所以必選於衆而不仁者自逺也陛下登大位今七年勤於論相數置而亟免者已七八輩豈陛下所樂為哉意者論相之初擇之不審也以陛下之聖則天縱以陛下之智勇則天錫以陛下之所立規模則天授羣臣何敢望清光萬分之一而敢冒當輔相之位故泯黙就職奉行文書尚皇皇然鰓鰓然冇不勝任之憂其欲求免於譴訶亦難矣舜之相臯陶湯之相伊尹方册所載一君一相之間道與氣合禮與情備上下相須驩欣交通無形迹疑忌之嫌治功之成髙出千古豈有他哉以聖賢明良之會相侔而不相逺也荀卿論人主之道有曰身能相能者王其相須盖如此昔魏武侯與羣臣謀事羣臣不能及罷朝有喜色吳起諫以楚荘王之言曰世不絶聖國不乏賢今寡人與羣臣謀事而羣臣不及有楚國殆矣之歎至唐太宗與臣僚論事有不出太宗意者太宗退而憂之景徳之間真宗與陳堯叟更論前代求治之君盖嘗舉其事以相為戒也如臣不才視近嵗數輩相有不能企而及者多矣學不足以自信明不足以自防一身之孤不足以自保而欲使臣輔陛下天之所縱所錫所授者求其能審國是斷國論强國勢立功立事以副陛下簡㧞之意臣雖甚愚自知其不可也臣願陛下舉舜湯所以選者思楚荘王唐太宗之所憂者法真宗皇帝君臣所以相戒者旁求非常之才以應非常之運擇之於未用之前信之於既用之後使之議論天下之事陛下虛心而察納之使之負荷天下之責陛下端已而責成之論議負荷不岐為二而是非自定利害自明重輕之勢不分毁譽亂真之禍不作則治功必進治效必成四海之大惟陛下意所欲為而實非臣之所能也改命更擇以幸天下臣敢以死請伏惟財幸乾道五年汪應辰進杜黄裳李徳裕告君故事曰唐憲宗與宰相論自古帝王或勤勞庶政或端拱無為互有得失何為而可杜黄裳對曰王者上承天地宗廟下撫百姓四夷夙夜憂勤固不可自暇自逸然上下有分紀綱有序茍選天下賢才而委任之有功則賞有罪則刑選用以公賞刑以信則誰不盡力何求不獲哉故明主勞於求人而逸於任人至於簿書獄市煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳飱皆無補於當時取譏於後来其耳目形神非不勞也所務非其道也夫人主患不推誠人臣患不竭忠茍上疑其下下欺其上将以求理不亦難乎武宗以李徳裕為相徳裕言於帝曰致理之要在於辨羣臣之邪正夫宰相不能人人忠良或為欺罔主心始疑於是旁詢小臣以察執政如徳宗末年所聽任者唯裴延齡輩宰相書勅而已此政事所以日亂也陛下誠能選擇賢才以為宰相有姦罔者立黜去之常令政事皆出中書推心委任堅定不移則天下何憂不理哉臣竊以唐自天寳後惟憲宗武宗能修政事復振威令觀杜黄裳李徳裕所以告其君者可謂得其要矣二帝能信用其言宜其有成功也六年周必大上言曰臣聞立政圖事人才為急然而平居選擇則易緩急求之實難又況一官易效通才難得優趙魏者不可為滕薛有文事者未必有武備自非儲蓄素廣品目素定一旦任違所長用過其量譬之以驥捕䑕使蚉負山小大雖殊其失一也仰惟陛下内修政事外靖邊陲今日先務孰有大於此者臣願深詔執事雜舉中外文武之才不限員數不拘資序區分所能總為一籍若馭軍若臨邊若經理財賦若行視利害若監司若郡守推𩔖以徃詳議格目仍於其間各紀所長假令某人可馭軍也又須别列其孰智孰勇孰當為偏禆孰當為統帥某人可治郡也又須辨其孰中和孰健決或使之撫雅俗或使之治繁劇人為一格格儲數人繼此有得接續来上藏之禁中副在二府無事之日預加審覈遇有任使按圖而取比之既寒索裘已渴浚井其為利害盖相逺矣七年必大為禮部侍郎又論人才上言曰臣聞帝王用人之道二不次而任者大才也循次而升者常才也誠使鷹揚如太公先覺如伊尹一旦㧞於耕釣之間寘諸輔佐之列人亦孰以為過若乃佞而託於忠偽而託於誠私而託於公茍不察焉其害深矣孔子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行古猶如此況後世乎仰惟陛下知人則哲如帝堯立賢無方如成湯人才小大固不逃於聖鑒然乃者嘗遣使理財矣又嘗遣使按軍矣方被命之初截截幡幡似若可聽及責成效蔑如也此無它用之過其量賞之不待功彼既冒受寵榮則懼誕謾獲罪於是多方以掩其過妄作以盖厥愆雖以陛下之明隨加譴斥然而兵民已被其侵擾財用已為其蠧耗噬臍之悔可勝計乎臣願陛下於用人之際因言以考其實試可而後遷彼知爵禄不可僥倖取也必将趨事赴功少副陛下總核之政而真才實能見矣淳熈二年必大為右文殿修撰論久任上言曰臣伏觀自昔人君大抵始於憂勤久則豫怠非固欲其如此馴致焉耳陛下則不然臨御大寳十四年于兹自强不息新而又新可謂度越百王光於載籍是宜功成治定坐臻無為之效然而大欲未得彌軫宵旰者何也人主有急治之心羣臣無任事之實故也臣試舉當今要務一二而言之陛下既擇内外将帥之官矣而士卒勇怯甲兵堅窳未免悉闗於淵聽既擇内外主計之臣矣而調度盈虚水旱備豫往往猶煩於聖慮以至興一利除一害小大之臣舉未有獨當其責者不過遵守成算奉行文書而已事成則例遷爵秩兼受賜予不成則猥曰委任不專非我罪也縱加之罰率用輕典是以初為茍且之計而終懐幸免之心使陛下之善政良法舉為虚文翫嵗愒日殊未有以少副憂勤者非以此歟臣願陛下勞於用人逸於仰成凡任以是職必責以是事久其嵗月盡其才力底績而賞使之勸瘝官而罰使之懼一人雍容于上百職交修于下如此而功弗成效弗著臣不信也揚雄曰於事則逸於道則勞陛下念焉必大改敷文閣待制上言曰臣謂官冗久矣而今為甚盖上有名器寖輕之弊則下有淹滯失職之嗟惟其寖輕故勸沮之法壊惟其失職故茍且之心生何謂勸沮之法壊古之設官專待賢能故賢者得之則勸而不賢者以不得為沮能者得之則勸而不能者以不得為沮今也不然進士以藝任子以世雜流以嵗月固未嘗考其賢與不賢能與不能也應格斯與之耳然則勸沮之法安得不壊何謂茍且之心生今分職有限而入流無窮一官闕則十數人守之其在吏部者大率十餘年僅成一任凡徃来之費待闕之資皆仰給於三年之俸故貪者益貪懦者益懦低首下心便文自營以冀官滿而去尚何敢與上官抗論是非為下民辨白枉直哉且不特吏部注授為然也所謂堂除乃㧞擢人才之地今郡守皆除三政倅貳闕至八年凡卓然才智之士自為朝廷所知者固所不問姑以中人論之三十而仕七十告老若十年而為一官則平生不過四任而已然則茍且之心安得不生臣願陛下明詔三府力裁入流之數以清其源毋艱既仕之路以遏其流庶㡬數年之後其弊稍革而人材見矣三年必大為兵部侍郎論用人二弊上言曰臣嘗觀司馬光歴年圖序以為人君之道一用人是也自三代兩漢以迄於唐用得其人罔不興用匪其人罔不亂布在方册昭然可考陛下聖學髙明深燭此理故自即位以来内度於聖心外採諸衆論求人惟恐不及用才惟恐不盡下至占一善名一藝者咸表而出之固嘗上嘉虞舜製論而刋諸石矣然屢省乃成尚未能仰副聖心者何也深惟其原殆有二弊一曰上下之分未嚴二曰義利之説未明何謂上下之分未嚴夫任賢使能人主之柄也助人主進賢退不肖大臣之任也近世則不然一官或闕自衒者紛至始則不度能否悉力以求之求而不得則設計以取之示之好惡而莫肯退聽限之資格而取必不已未聞朝廷有所懲戒也如此而望其宿道嚮方胡可得哉何謂義利之説未明居是官思是職者義也背公而營私者利也今中外求官者不知其㡬人未得之則計職務之繁簡廪稍之厚薄既得之則指日而望遷援比而欲速所謂公家之事姑應簿書期會而已初未嘗為旬嵗計也如此而望其趨事赴功斯亦難矣夫十室之邑必冇忠信況以天下之大豈謂無人臣所以為是言者誠以風俗之薄厚繫士大夫之向背若二弊不去則風俗日壊國家何賴焉臣願陛下明詔執政大臣深思向来致弊之由共圖今日革弊之術使士風稍振百官舉職庶㡬不失陛下用人之本意羔羊之詩曰召南之國化文王之政在位皆節儉正直斯致治之樞要也四年必大又奏曰臣聞舜之時稷播百榖契敷五教臯陶作士后䕫典樂終身守其官未之或易所謂三載考績三考陟明不過遷爵秩加服章而已是以任久而責專志定而功成後世人才既不如古仕於朝者又遷擢靡常今嵗為某職来嵗任某事一或不然輙興滯留之歎徃徃用過其量處非其據職業多曠績用弗成為臣者既以被譴而國家亦不能収用人之效兹今昔之通患也臣愚欲望聖慈於任使百官之際益留宸念始也審度才力隨其大小付之以事而勿使躐等終也考覈功效或増秩或賜服而勿使數易盖不躐等則僥倖之望息而速進之念絶不數易則營職之心勉而厭倦之意消自然下安其分上獲其利豈曰小補哉淳熈元年參知政事龔茂良上言曰官人之道在朝廷則當量人才在銓部則宜守成法法本無弊例實敗之法者公天下而為之者也例者因人而立以壊天下之公者也昔之患在於用例破法今之患在於因例立法諺稱吏部為例部今七司法自晏敦復裁定不無疎畧然守之亦可以無弊而狗情廢法相師成風盖用例破法其害小因例立法其害大法常靳例常寛今法令繁多官曹冗濫盖繇此也望令裒集參附法及乾道續降申明重行考定非大有牴牾者弗去凡渉寛縱者悉刋正之庶㡬國家成法簡易明白賕謝之姦絶冒濫之門塞矣於是重修焉孝宗時正字趙汝愚論謀國者必有腹心之臣上疏曰臣聞古之欲謀人之國者必有所謂腹心之臣齊威公之管仲越勾踐之范蠡漢髙祖之良平唐太宗之房杜是數君臣者其相與謀也皆竭誠盡意無復嫌疑如父子兄弟之謀其家自為一定之計故其施也有序其動也有期非僥倖萬一者之所為也陛下英明神武将大有為於天下至於腹心之任臣獨疑之陛下臨蒞以来其所顯用者多矣其間深謀宻畫外廷不可得知然而逺者不過二三年近纔數月而罷去来紛紛邈無定論盖亦有可議者矣豈非相與之誠或有所未至乎非惟人懐自疑之心專事形迹以求茍免而吏下知其無權亦從而慢之雖欲自力不可得也将何以責其謀國之效哉臣愚伏願陛下眷求賢哲察而後信之夫輕信於前者必重疑於後為其因失而致戒也惟察之深然後能信之篤陛下誠能察人於未試之先而信賢於既用之後使大小之臣咸得以才自盡則陛下何功不立何事不成臣謂今日清源正本之典實在於是惟陛下擇焉汝愚為集英殿修撰帥福建又申乞甄叙商榮付安撫司自効附奏曰契勘本路阻山瀕海常有盜賊不時出沒正在平居収蓄人材以備緩急一旦之用某伏見保義郎商榮昨自偽境仗義来歸忠勇絶人累著勞效先任楚州磨盤廵檢日嘗過北界収復州縣朝廷以其生事責送建寧府拘管據商榮供具到脚色盖是當時主将有實使之然者榮惟懐忠義而不知朝廷事體遂致輕鋭觸犯憲章原其本情實為可憫今来拘管已十有三年累經赦宥若不稍加甄叙竊恐無以激昻士氣欲望敷奏将榮權付本司自効随宜支破請給候将来立功效日别與陳乞差遣汝愚又奏按知金州秦嵩状曰臣嘗讀前史伏觀秦漢以来謀臣良士凡言制御邊陲之術者莫不以謹擇邊吏為首其選重矣究其為術雖若不同而大槩有五其一曰以㢘律己化服異𩔖二曰智勇絶人威震敵國三曰謹固封疆不起邊釁四曰撫摩邊民厚固根本五曰愛養士卒盡其死力能此五者則雖有彊敵亦可以坐制矣今有人焉受朝廷邊陲重寄而罪惡盈積畧無善状臣不敢以被詔命朝夕去此顧惜人情遂置而不問惟聖明裁擇臣伏見知金州秦嵩所在貪汙贓状狼籍衆共指議不可具陳昨知黎州常遣諸寨土丁入蕃界採臙脂木以為什器一日又遣土丁二十七人過大渡河採斫板木遂為青羌所執者五人死者二人㡬至生事今任金州不住遣人於黎州販賣近販金珠過大安軍而為税官所覺収税至數百緡則其貨物之多從可知矣望其以㢘律己化服異𩔖可乎嵩始壮時猶可幸其一割之用今聞久病不能良行毎出見賔客輙用兩人扶掖比丁家難衰悴可知而尚爾經營志在茍得望其能智勇絶人威震敵國可乎嵩在黎州既緣採板木生事土丁五人為青羌拘執不還嵩一時計無所出遂厚賂奴兒結俾徃青羌調䕶其事已而盡得所執土丁及所斫板木以歸嵩既茍逃譴責而奴兒結亦自以為功欲徙居於安静舊寨深入漢地數十百里據沈黎之門户而嵩遂許之不能拒也是時羌中豪猾隨而至者三十餘人白水諸村附從者亦數十人雄視一方深據要害於是蜀人上下憂懼欲逐之不可欲逺之不能遂為沈黎腹心之害非賴留正以計殺之則大為邊患其勢未已今仰憑陛下威靈邊事寧息然數年之間勞師動衆費耗百出推原亂階則嵩實為之也今任金州亦未嘗以邊事為意歸正人逃亡盜賊出没皆縱而不問望其能謹固封疆不起邊釁臣知其不能矣上津一縣本𨽻商州去金州絶逺通邑人户纔二千家而歸正人實居其半政賴守令加意存撫猶恐不及而嵩專事掊克畧無顧恤之意每嵗令副尉奚文欽将茶隨門賖俵至秋熟時每茶一斤折納粟麥三斗或四斗有償納不足者則来嵗從而算息息復増息每嵗轉加臣聞上津一縣二千餘家而總欠金州茶錢三萬餘貫稍稍豐熟則督責盈門纔遇饑荒則逃移北界本司案牘前後具存望其能撫摩邊民厚固根本臣知其不能矣嵩在黎州日役軍役數十百人入山採打竹木木為柴薪竹為火炬轉賣公庫収錢入已瑣碎如此其他可知轉運司支降諸軍糴米本錢毎石五道嵩但以布帛雜物準錢一道配與諸寨土丁科糴粟米支散軍糧取其餘利諸軍怨之至今切齒如此而望其愛養士卒盡其死力臣又知其必不能矣臣竊惟金州北鄰大敵而居四蜀之衝其地望不為不重又安撫一司錢物甚富朝廷本以待邊防之計諸司未嘗檢覈不幸相繼累政多不得人變化出没無從稽考竭民膏血盡以為贓吏封殖貨賂之資可為傷痛又金州民事多與戎司相闗聞嵩有親戚在軍中濫充将佐故凡事皆俯首聽命畧不能為百姓主持人情怨嗟無所赴告伏望聖慈将秦嵩特賜黜責稍紓兩郡軍民之憤遴選有資望文臣與圖共理一方幸甚汝愚又薦部内知縣黄謙林闕李信甫趙彦繩疏曰臣等伏以一邑之宰最為近民而親使其能以體國愛民為心者是誠可嘉臣等任一道之責自惟無以補報朝廷果有㢘能循良之吏為陛下撫字百里治状有聲輙隠黙不以上聞臣等豈容無罪竊見知建寧府建陽縣黄謙持身有道為政有方自視事以来留心撫字前後士民列状條其政績者非一據其所陳自有建陽莫之與比臣等初未之信及體訪覈實但見其政平訟理民無愁歎百姓愛之如愛父母況建陽劇邑財賦素窘最號難治黄謙本儒者毎旦未明即起治事夙夜盡公未嘗少懈終始二年殆如一日以此人心悦服租賦樂輸而官用充衍餘財與前政補欠數萬緡而餘力與諸生講論經學亦可謂之通材矣知泉州晉江縣林闕㢘靖介潔獨立有守曩曽知平江府崑山縣方赴任間前官任内有積逋累萬計州郡欲使之認納林闕不忍以貽民害毅然不奪寧甘心棄官而去其重義輕禄有如此者臣等考其今之邑政以律身奉公為先以厚風俗為本吏職民宜不擾而辦境内豐殖安其田里公事一切任理不為權勢所移人推其公竟亦不敢干之以私徃来者交口稱之誠可謂端方之士矣知福州懐安縣李信甫學冇源流夙敦愷悌心如準衡無所偏黨故其見於踐履施於政事惟務安靖不為表暴以民隠為急以公調為緩身任逋責斂不及民慈祥之政洽於一同比以微恙在告旬浹士民羣集縣庭為之禱祈却之不去其得民情若此知建寧府崇安縣趙彦繩天性明逹優於治縣首務革去宿弊以寛民力如除科鹽之害杜督逋之患又務觀農以敦本置學糧以養士公私不勞辦集士民為之稱快聽訟必使兩造案前委曲難問有如父子以故事無寃枉今之縣令難乎其人此四人者為福建八郡諸邑之冠欲望聖慈特加顯擢以為良吏之勸以慰四邑百姓之心汝愚又薦陳葵趙幼聞王聞詩上奏曰臣昨權吏部侍郎日準尚書省劄子奉聖㫖令臣薦舉才行兼備未經擢用者二三人臣後因賜對嘗奏知緣薦舉文字是臣始初奏請在臣不無妨嫌乞免薦舉是時恭奉聖訓令臣候将来人才日奏来臣自後䝉恩補郡不敢妄有奏陳今臣已到任一年有餘自惟疎庸别無補報所見一路州縣小官中實有才行兼備未經擢用之人可以仰答明詔者臣若復畏忌知而不言臣則有罪臣伏見從政郎南外睦宗院宗學教授陳葵天資粹温充以門學其言約而義富其履卑而行尊自登第二十餘年棲遲選調安貧守道未嘗干舉臣觀其人經明行修表裏純茂如良金美玉可為清廟之器從政郎福州候官縣丞趙幼聞器資端亮識度寛宏恬淡優游不急仕進凡勢利之際衆人所共趨者幼聞獨退然引避若無意於世者至公家有利病則未嘗不首出為臣言之臣觀其人忠信篤實可臨大節承務郎前福州連江縣丞王聞詩故太子詹事十朋之子内行修飭頗有父風出而臨民不茍於事故事公卿之子凡到堂者𩔖得優異差遣況十朋為陛下舊學清名直節當世貴重而其子能敦尚志節兩任秖就吏部注授差遣逮今任既滿且復經年蕭然里居衣食不繼乃有不復榮仕之意臣觀其人㢘靖修潔可勵風俗如䝉朝廷擢用之後将来不如所舉臣甘坐謬舉之罪汝愚又薦進士劉伯熊常垍上奏曰臣等恭覩淳熈十五年九月八日明堂赦文内應士人有節行才識學術素為鄉里推重不求聞達者委帥臣監司同加捜訪連銜結罪保明聞奏臣等仰惟皇帝聖徳格天禋禮告備必形睿㫖廣捜遺逸孜孜訪問常如弗及臣等仰奉明詔精意考擇今有其人敢不論薦臣等伏見簡州鄉貢進士劉伯熊學術淹通制行淳古屢該免解不復就舉屏居著論不求聞逹澹然味道之腴無書不覽其所為文言約理盡霑丐後學蜀士大夫多出其門且其孝友信義不但聞於一鄉至論當世之務靡不通貫成都府鄉貢進士常垍蚤嵗頴悟嘗與薦名之列後亦該免不復就試隠居山林已三十餘年草衣蔬食不改其度足跡未嘗至城市著書立言有補風教一邦之人皆敬而愛之欲乞遵用赦書優加褒擢庶㡬山林博習之士不至湮汨無聞非惟表盛世捜揚之禮亦以為異時風俗之勸其於聖政實非小補汝愚乞諸軍各置參謀官状奏曰臣伏觀自古所命将帥皆用王之卿士極詩書禮樂之選近至唐世凡雄邊重鎮亦無不選任名臣其功名顯著者徃徃入為宰相其後如裴度李徳裕亦皆所至茂著勲績惟我國家累世承平将帥之任不逮前古此非天之降材於今獨異亦由選任之際文武大分以至是耳故雖有慷慨功名之士皆無由習知軍旅之事而專於武勇者則例以儒生迂闊視為無用此緩急之際朝廷所以有乏才之歎也臣伏見唐之諸鎮皆許辟召儒生學士並參戎幕若裴度在淮西用韓愈為行軍司馬此固不論若烏重嗣奮自行伍亦能以禮羅致石洪温造二人皆一時名士賔主之間能兩無疑阻者良由當世之法文武並用士大夫聞見習熟故久自安之耳今沿江諸軍舊例有許置主管機宜文字及幹辦公事去處其職本在階級之外頗得唐之遺制然皆奪於權要或狃於私情選任太輕士亦羞鄙望其髙識逺慮遂能參理戎務協賛軍謀難矣臣愚欲望聖明參稽古制思為國家長久之計於三衙及鎮江建康鄂渚興州屯軍多處每軍特置參謀官一員如江池之𩔖元未置主管機宜文字處與増置機宜文字一員使之與聞軍事然非稍優其禮則士不屑為非精選其人則無益於事如䝉睿慈特賜採納其合理資任人從請給之屬並乞下有司詳議施行庶㡬他日異材間出為國家用誠非小補汝愚又乞罷諸軍承受上奏曰臣仰惟陛下神聖聰明比隆堯舜渙發大號斥逺巨姦朝野聞之莫不鼓舞以服陛下之斷以頌陛下之明幸甚臣聞安危有本成敗有機撫機而失後必有悔陛下赫然奮發明斷臣謂陛下此舉威行萬里中外将士孰不人人聳懼朝廷之所為若朝廷乘此事機一新天下之觀聽革除蠧弊委任忠良四方聞風易於感格此其勢甚順也臣所願者惟在陛下加之意而已矣臣竊觀今日之弊其最大者無如諸軍置承受其始秖緣諸軍有奏報文字或有滯留之弊故各置承受務要速達然而因循既久姦弊實多外以壅隔諸軍之情内以潜窺陛下之意傳聞諸軍凡有奏請文字皆先取決於承受承受視以為可則進呈承受以為不可則退去或進或退有司皆無由稽察非若章奏通進二司皆有文據可㸃檢也故軍中雖有著實利害皆無由自達而陛下聖意微有喜怒彼必先事知之於是将帥禍福輕重之權隂受制於承受而貨賂之風掊克之政行矣雖陛下聖明在上每事體察而軍情戎務固有不容盡知者也臣伏觀祖宗時雖有走馬承受之名然實非今日之制盖祖宗時三路沿邊走馬承受皆在本路置司遇有機速公事方許馳傳入奏朝見訖亦不得在京遷延久住其使臣皆是三班院選差雖間有差内侍去處其見本路帥臣之禮祇許依屬官例其視今日事體輕重豈不萬萬甚相逺耶臣伏見行在百司凡有奏發急速文字皆經由通進司畫時進入陛下勤勞不倦無不朝奏暮報何獨至於諸軍奏請而反有滯留之弊哉此其情盖可見也陛下誠能明立章程嚴為賞罰斷而行之顧何不可臣愚伏望申嚴訓戒今後諸軍除常程文字並依舊赴章奏房投進外凡有機速文字並許實封畫時赴通進司投進通進司即時别項進入或有合降付三省宻院商量文字亦乞明詔大臣先次将上取㫖施行其諸軍承受並乞住罷庶絶上下壅隔之弊然後収還将帥之權俾為輔相之責盖将帥者三軍之司命國家安危之所繫也其賞罰進退之權雖歸之人主而蒐選考察之事當責在大臣昔漢之髙祖光武唐之太宗聰明英武過於羣臣何啻百倍至於任使諸将収采人物亦皆訪於蕭何鄧禹房杜數公若大臣平居恬然不以人材為意臣恐一旦邊陲有警不幸諸将或乖人意不審陛下此時誰與謀者此臣所以不得不深憂而過計也至於承㫖一司比来權任甚重解絃易轍實在此時選任之間尤宜詳審歴考累朝故事盖許文武並用臣採之輿論得之公言咸謂前侍從中亦有老誠忠實曽在督府諳曉軍政徧歴宰掾深識事宜者惟陛下博訽衆志斷自宸𠂻極一時授受之公示四方好惡之意自然本朝増重士氣激昂化貪為㢘易懦為勇富强可待克復有期乃若姑蹈故常憚於改作非惟玩嵗愒日無益於事亦恐此機一失後益難為力也昔齊威王即位既九年諸侯並侵齊國不治一日發憤烹阿大夫及左右嘗譽之者於是羣臣聳懼莫敢飾詐務盡其誠齊國大治强於天下此非其嚴有足稱者盖其乘勢便利遂能一意行之有若順風行舟故用力少而見功多也使威王今日烹一阿大夫明日復用一阿大夫臣恐徒為是紛紛終無益於齊之治亂矣今之事勢實𩔖於此臣伏思累日不能黙黙偶值經旬假故未敢請對而愚衷廹切恐失事機謹遵用八月壬子詔書實封入奏惟陛下裁擇幸甚袁説友論實才上奏曰臣聞聖人之用人不務愛其始之所似可喜而每信夫終之所果可用盖天下之才貴乎實而不貴乎名也髙標大言自立名字足以驚眩當世而譏評時政則又恐上軋下鼓動震喝若纚纚可愛豈不似可喜哉然終之成就迄於荒忽澶漫不適於用而沽激矯訐自足以取名矣至於實才之在天下非有喬傑卓鷙之行以自表立往往自為可用能行之學以致力於事功誠實之地顧以虚名者視之殆無一可喜然實之所在要其成就於後者必有績用恵利之可書是以聖人之用人知其始若可喜者為不足進而終之果可用者為必可恃則有以黜虚偽之名崇務實之士而實才之用始足以辦天下矣仰惟陛下臨御今十八年焦勞求賢以起平治而事功之立猶未能盡副宵旰之念何哉夫實才之與虚名其相去已不侔矣而士大夫好名之弊甚於好利好利者其弊止於一身而好名者将欺天欺君欺人自欺之不暇人而至於所欺者如此則大用而禍大小用而禍小是豈為國家福哉大抵士之在朝振職以治内可也實之不務而或摸稜以固位姑息以養譽者反以得立朝之名州郡之職練兵而愛民可也實之不務而或掊斂以稱最結託以求譽者反以得作郡之名右選之職熟韜鈐而尚智謀可也實之不務而或文雅以緣飾言語以媒譽者反以得兼資之名昕朝賜對詳利害而計實用可也實之不務而或訐詈以為直矯飾以沽譽者反以得讜言之名相師成風以為當然而弗之變使人主焦勞獨運於其上而百職浮靡掠名於其下坐縻嵗月而功效弗立抑可惜也今之人才固未盡至於此然以陛下求賢甚勞願治甚切而大勲之集尚未足以當聖意者臣恐隆虚名之弊猶有以累陛下之知人也今欲曠然大變使人皆有趨事赴功之心不事大言不務好名不為矯行以恪意於實用實効之地此只在陛下一好惡爾臣竊觀仁宗皇帝謂張士遜曰今之士多不能補益時政又揚君之過以釣虚名朕甚惡之大哉聖人之謨訓也故雖一耀州縣令張龜年亦以其賦調先期犴獄無擾即下詔褒用於是實材輩出項輩相望仁宗之治軼迹三代者其機在此臣愚欲望陛下於用人之際凡文武之臣内外之職悉别以名實而考其始終度其人有志於實用而不事矯訐沽名者則浸以任使若其大言無當敢為誇辭駕虚名以動主聽者一毫不以假借仍申諭大臣於進退百寮一以實材為急陛下一好惡之頃大臣一進退之際将不出嵗月皆視儀聽唱靡然嚮風懲虚名而務實用誰不能為國家辦事者則天下之大事舉矣惟陛下財幸中書舎人崔敦詩奏乞以公道用人疏曰臣聞國家之治忽繫乎公論廢存之間盖所謂公論者非可以强名衆心之所謂當然乃天道也臣嘗觀孟子論進賢舎不才之法曰左右皆曰可勿聽諸大夫皆曰可勿聽國人皆曰可然後察而用之左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察而殺之盖左右之言常得自售其私諸大夫之論猶恐未協於衆至於國人之論舉國之所謂當然是謂至公是謂大同未有不得夫用舎之當者也臣仰惟本朝祖宗法天立道廟堂之上持公論以調萬化之平縉紳之間伸公論以廣九重之聽是以治功之盛超冠古昔爰自熈寧大臣變更法度于時士大夫欲排羣議以行私説一切指公論為流俗自是名節不競馴至弊敗臣嘗以為公論所在治道是由人主者天下公論之主也臣恭惟陛下逺撫旁招兼聽一視朝廷無私黨天下無壅情王道蕩蕩過乎三代之盛然而聖人之徳又當新而不窮臣子之心毎有加而無己臣伏願陛下建大中之極開旁燭之明深詔大臣施舎廢置必詳觀輿議之歸明勅近臣是非善惡必悉考僉言之當要使公論在上昭然明白亦俾中外知聖意之所向則天下幸甚翰林學士承㫖洪遵舉監司郡守上奏曰臣伏覩右朝奉郎權知辰州軍州事張允之儒雅醖藉長於治民前守臨江今知盧溪周旋兩郡皆以治最聞可謂循良之吏使當一路必能激濁揚清奉行徳意右承議郎充江淮荆浙福建廣南路都大提㸃坑冶鑄錢司主管文字郭沰疏通修潔臨事不茍嘗為廬州合肥令治效顯著泉司為屬前後三仕鼓鑄之事尤所諳曉部使者惜其去薦之因任授以一郡必有可觀允之及沰係見今可任之人右承議郎新差通判明州軍州事吳松年名臣之子敏於詞翰踐更事任積有能聲緣未歴親民之官故無績状可書至於㢘勤公明乃其天資異時可備刺舉之選右通直郎知平江府吳江縣張晙學古入官奉公不撓為令吳江當舟車之衝外應軍須内究民事以至大駕行幸趣辦無闕斡旋蕞邑民間無秋毫之擾異時付之郡寄必能趨事赴功松年及晙係将来可任之人臣今舉到張允之等四員保任終身如後不如所舉甘與同罪謹録奏聞遵知建康府薦梁公永程渭老劄子曰臣竊見右宣教郎知建康府溧水縣梁公永愛民戢吏有循良之風剖決優游庭無滯訟催科不擾夏秋二税率先辦集前後士民舉留者甚衆右從事郎知池州建徳縣程渭老敏於臨事有剸劇之才去年秋境内旱災躬行阡陌檢放皆實捄荒之政靡所不講比之旁邑流亡最少百姓徳之臣所領縣四十有三其可稱者絶無而僅有欲望聖慈特加旌擢庶㡬風動一路以為能吏之勸遵又奏舉卲宏淵劄子曰臣一介踈逖陛下付以方面劇寄夙夜惟念常懼無以酬報萬一茍有管見不敢緘嘿臣竊謂今日先務選将厲兵莫此為急仰惟陛下鋭意中興留神軍政汲汲求人惟恐不及天下幸甚臣伏見邵宏淵驍勇有謀為時宿将驍雄之目著聞中外昨在湖湘立功鼎人徳之血食至今逆亮犯順宏淵提孤軍抗方張不制之敵真揚免於塗炭兩郡為之立廟其人雖六十餘而矍鑠强健不廢鞍馬之習久處散地公論惜之欲望天慈斷自聖意收拭録用庶㡬緩急之際可以倚仗臣觸冒宸嚴無任戰灼之至遵又奏舉趙撙郭剛劄子曰臣比以悍卒奸禁專輙行誅上章自劾干瀆天聽伏䝉聖慈灼見曲賜原貸臣遥望闕廷無任感激之至臣竊見馬帥趙撙到軍以来盡革前日刻剥之政軍士舊逋一切蠲放按視軍馬勤於教閲約束諸将不得役使令下之初人人悦服建康都統制郭剛留意軍政一嵗有餘葺治器甲為之鼎新不時於諸軍練教紀律嚴明轅門敬畏将帥得人實為今日先務臣備員數閫寄有所聞知不敢自嘿僭冒淵聰臣不勝震懼之至謹具奏聞伏乞睿照中書舎人史浩上奏曰臣等恭惟陛下龍飛御極曽未淹旬首擢臣等寘之從列深惟際會竊自省循陛下天縱聖學雖出生知然而就傅以来二十餘年太上皇帝遴選儒臣俾為輔導及其成效盖有自来譬如多稼有年既耕而種既種而穫夫豈一日之力哉臣等晚備誦説聖質已成初無涓塵禆益而猥䝉厚恩先諸舊學心實不安此而不言使陛下未發晉文求介推世祖召嚴光之令臣實有妨功蔽賢之罪欲望聖慈特降明詔凡曽侍潜邸臣寮依累朝故事第加恩典浩為觀文殿大學士兼侍讀上奏曰臣聞誤國之罪莫大於蔽賢報君之忠無踰於薦士臣嘗承乏經帷薦士職也敢失其職以速官刑又況臣千載一時遭遇聖明從始暨終自頂至踵受陛下生成之恩特出倫等欲報之心宜何如哉臣今老矣智慮荒落不足以寄陛下腹心筋力衰疲不足以任陛下股肱然區區報國之誠雖老不能忘去朝夕思念唯有進達賢才異日倘有毫分之補庶㡬臣之志願償一二焉重惟内之庶尹百僚已經選用外之監司帥守已經臨遣臣皆不敢寘論於其間若夫懐才抱識沈伏下僚而未能自達者據臣所知尚十餘人明州鄞縣主簿薛叔似學窺往聖志慕前修試吏之始已有能譽若任之以事當無施而不可新紹興府司理叅軍楊簡性學通明辭華條達孝友之行閫内化之施於有政其民必敬而愛之新建寧府崇安縣主簿陸九淵淵源之學沈粹之行輩行推之而心悟理融出於自得新無為軍軍學教授石宗昭學問操履文采政事四者皆過人而深自韜晦無好異之失新寧國府府學教授陳謙材術既髙文章尤美推其所用必能稱職新鄂州推官葉適資禀甚髙博記能文其學進而未已前江東安撫司幹辦公事崔惇禮學問該通辭藻華瞻與其弟惇詩相埒識者惜其未用新江隂軍江隂縣尉袁燮學問醇明性資端厚守正而無矯激久在庠序士子推服添差通判常州趙善譽宗子之秀學問文采俱有可觀吏材尤髙不在彦逾下前撫州州學教授張貴謨文學吏治務求實用試之以事必有益於時監臨安府囬易庫胡拱故禮部尚書沂之子沈厚似沂而拱行尤峻安恬守道不願人知前衡州州學教授舒璘性資誠慤好學不倦而練達世故材實有用新紹興府府學教授舒烈性質和粹操履端固平居雖簡易而遇事有守明州州學教授王恕博通性理諳曉民事時輩推其為可用之材監潭州南嶽廟湛循性資和裕學問通明頃中甲科不求榮進而為親請祠時輩推之臣所知見處下僚未經先達薦引者凡一十有五人如䝉聖慈以臣言為不妄即乞睿㫖降付中書省籍記姓名隨才録用歴代名臣奏議卷一百四十四
