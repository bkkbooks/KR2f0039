body:
  text: 歷代名臣奏議卷三十七明楊士竒等撰治道宋神宗熙寧四年殿中丞直史館判官告院權開封府推官蘇軾上書曰臣聞之益戒于禹曰任賢勿二去邪勿疑仲虺言成湯之德曰用人惟已改過不吝秦穆喪師於崤悔痛自誓孔子録之自古聰明豪傑之主如漢髙帝唐太宗皆以受諫如流改過不憚號為秦漢以來百王之冠也孔子曰君子之過如日月食焉過也人皆見之更也人皆仰之聖賢舉動明白正直不當如是邪所用之人有邪有正所作之事有是有非是非邪正兩言而足正則用之邪則去之是則行之非則破之此理甚明猶飢之必食渴之必飲豈有别生義理曲加粉飾而能欺天下哉書曰與治同道罔不興與亂同事罔不亡陛下自去嵗以來所行新政皆不與治世同道立條例司遣青苖使斂助役錢行均輸法四海騷動行路怨咨自宰相以下皆知其非而不敢爭臣愚蠢不識忌諱乃者上疏論之詳矣而學術淺陋不足以感動聖明近者故相舊藩鎮侍從雜然爭言不便以至臺諫二三人本其所與締交唱和表裏之人也然猶不免一言其非者豈非物議沸騰事勢迫切而不可止歟自非見利忘義居之不疑者孰肯終始膠固不自湔洗如吳師孟乞免提舉胡宗愈不願檢詳如逃垢穢惟恐不脫之人情畏惡一至於此近者中外歡言陛下已有悔悟意道路相慶如蒙大賚實望陛下於旬日之間渙發德音洗蕩乖僻追還使者而罷條例司今者側聽所為蓋不過使監司體量抑配而已比之未悟所較幾何此孟子所謂知兄臂之不可紾而姑勸以徐知鄰雞之不可攘而月取其一帝王改過豈如是哉臣又聞陛下以為此法且可試之三路臣以為此法譬之醫者之用毒以人之死生試其未效之方三路之民豈非陛下赤子而可試以毒乎今日之政小用則小敗大用則大敗若力行而不已則亂亡隨之臣非敢過為危論以聳動陛下也自古存亡之所寄者四人而已一曰民二曰軍三曰吏四曰士此四人者一失其心足以生變今陛下一舉而兼犯之青苖助役之法成則農不安均輸之令出則商賈不行而民始憂矣併省諸軍迫逐老病至使戍兵之妻與士卒雜處其間貶殺軍分有同降配遷徙淮甸僅若流放年近五十人人懷憂而軍始怨矣內則不敢取謀於元臣侍從而專用新進小生外則不責成於守令監司而專用新青苖使者多置間局以擯老成而吏始解體矣陛下臨軒選士天下謂之龍飛榜而進士一人首削舊恩示不復用所削者一人而已然士莫不悵恨者以陛下有厭薄其徒之意也今用事者又欲漸消進士純取明經雖未有成法而小人招權自以為功更相扇搖以謂必行而士始失望矣今進士半天下自二十以上便不能誦記注義為明經之學若法令一行則士各懷廢棄之憂而人材短長終不在此昔秦禁挾書諸生皆抱業以歸勝廣相與出力而亡秦者豈有他哉亦以失業而亡所歸也故臣願陛下勿復言此民憂而軍怨吏解體而士失望禍亂之源有大於此者乎今未見也一旦有急則致命之士必寡矣方是之時不知希合茍容之徒能為陛下收板蕩止土崩乎去嵗諸軍之始併也左右之人皆以為樂併告陛下近者放停軍人李興告虎翼吏率錢行賂以求不併則士卒不樂可知矣夫諂諛之人茍務合意不憚欺罔者類皆如此故凡言百姓樂請青苗錢樂出助役錢者皆不可信陛下以為青苖抑配果可禁乎不惟不可禁乃不當禁也何以言之若此錢放而不收則州縣官吏不免責罰若此錢果不抑配則願請之户後必難收索前有抑配之禁後有失陷之罰為陛下官吏不亦難乎故臣以為既行青苖使則不當禁抑配其勢然也人皆謂陛下聖明神武必能徙義修慝以致太平而近日之事乃有文過遂非之風此臣所以憤悶太息而不能已也昔賈充用事天下憂恐而庾純任愷戮力排之及充出鎮秦涼忠臣義士莫不相慶屈指數日以望惟新之化而馮紞之徒更相告語曰賈公逺放吾等失勢矣於是相與獻謀而充復留則晉氏之亂成於此矣自古惟小人為難去何則去一而其黨破壞是以為之計謀遊説者衆也今天下賢者亦將以此觀陛下為進退之決或再失望則知幾之士相率而逝矣豈皆如臣等輩偷安懷祿而不忍去哉猖狂不遜忤陛下多矣不敢復望寬恩俯伏引領以待誅殛軾又上䇿略五其一曰臣聞有意而言意盡而言止者天下之至言也蓋有以一言而興邦者有三日言而不輟者一言而興邦不以為少而加之毫毛三日言而不輟不以為多而損之一辭古之言者盡意而不求於言信已而不役於人三代之衰學校廢缺聖人之道不明而其所以猶賢於後世者士未知有科舉之利故戰國之際其言語文章雖不能盡通於聖人而皆卓然近於用出於其意之所謂誠然者自漢以來世之儒者忘已以徇人務為射䇿決科之學其言雖不叛于聖人而皆泛濫於辭章不適於用臣嘗以為鼂董公孫之流皆有科舉之纍故言有浮於其意而意有不盡於其言今陛下承百王之弊立於極文之世而以空言取天下之士繩之以法度考之於有司臣愚不肖誠恐天下之士不獲自盡故嘗深思極慮率其意之所欲言者為二十五篇曰略曰别曰斷雖無足取者而臣之區區以為自始而行之以至於篇終既明其略而治其别然後斷之於終庶幾有益於當世臣聞天下治亂皆有常勢是以天下雖亂而聖人以為無難者其應之有術也水旱盜賊人民流離是安之而已也亂臣割據四分五裂是伐之而已也權臣專制擅作威福是誅之而已也四夷交侵邊鄙不寧是攘之而已也凡此數者其於害民蠧國為不淺矣然其所以為害者有狀是故其所以救之者有方也天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也國家無大兵革幾百年矣天下有治平之名而無治平之實有可憂之勢而無可憂之形此其有未測者也方今天下非有水旱盜賊人民流離之禍而咨嗟怨讟常若不安其生非有亂臣割據四分五裂之憂而休養生息常若不足於用非有亂臣專制擅作威福之弊而上下不交君臣不親非有四夷交侵邊鄙不寧之災而中國皇皇常有外憂此臣之所以大惑也今夫醫之治病切脈觀色聽其聲音而知病之所由起曰此寒也此熱也或曰此寒熱之相搏也及其他無不可為者今且有人恍然而不樂問其所苦且不能自言則其受病有深而不可測者矣其語言飲食起居動作固無以異於常人此庸醫之所以為無足憂而扁鵲倉公之所以望而驚也其病之所由起者深則其所以治之者固非鹵莽因循茍且之所能去也而天下之士方且掇拾三代之遺文補葺漢唐之故事以為區區之論可以濟世不已踈乎方今之勢茍不能滌蕩振刷而卓然有所立未見其可也臣嘗觀西漢之衰其君皆非有暴鷙淫虐之行特以怠惰弛廢溺於宴安畏期月之勞而忘千載之患是以日趨於亡而不自知也夫君者天也仲尼贊易稱天之德曰天行健君子以自強不息由此觀之天之所以剛健而不屈者以其動而不息是以萬物雜然各得其職而不亂其光為日月其文為星辰其威為雷霆其澤為雨露皆生於動者也使天而不知動則其塊然者轉腐壞而不能自持況能以御萬物哉茍天子一日赫然奮其剛明之威使天下明知人主欲有所立則智者願效其謀勇者樂致其死縱橫顛倒無施而不可茍人主不先自斷於中羣臣雖有伊吕稷契無如之何故臣獨以人主自斷而欲有所立為先而後論所以為立之要云其二曰天下無事久矣以天子之仁聖其欲有所立以為子孫萬世之計至切也特以為發而不中節則天下或受其病當寧而太息者幾年於此矣蓋自近嵗始柄用二三大臣而天下洗心滌慮以聽朝廷之所為然而數年之間卒未有以大慰天下之望此其故何也二邊之大憂未去而天下之治終不可為也聞之師曰應敵不暇不可以自完自完不暇不可以有所立自古創業之君皆有敵國相持之憂命將出師兵交於外而中不失其所以為國是故其兵可敗而其國不可動其力可屈而其氣不可奪今天下一家二國且未動也而吾君吾相終日皇皇焉應接之不暇竊為執事者不取也昔者大臣之議不為長久之計而用最下之䇿是以嵗出金繒數十百萬以啖二國此其既往之咎不可追之悔也而議者方將課罪當時之失而不求後日之計亦無益矣臣雖不肖竊論當今之弊蓋古之為國者不患有所費而患費之無名不患費之無名而患事之不立今一嵗而費千萬是千萬而已事之不立四海且不可保而曽千萬之足云哉今者二虜不折一矢不遺一鏃走一介之使馳數乘之傳所過騷然居人為之不寧大抵皆有非常之辭無厭之求難塞之請以觀吾之所答於是朝廷恟然大臣會議既而去未數月邊遽且復告至矣由此觀之二國之使未絶則中國未知息肩之所而況能有所立哉臣故曰二虜之大憂未去則天下之治終不可為也中書者王政之所由出天子之所與宰相論道經邦而不知其他者也非至逸無以待天下之勞非至靜無以制天下之動是故古之聖人雖有大兵役大興作百官奔走各執其職而中書之務不致於紛紜今者曽不得嵗月之暇則夫禮樂刑政教化之源所以使天下回心而嚮道者何時而議也千金之家久而不治使販夫豎子皆得執劵以誅其所負茍一朝發憤傾囷倒廪以償之然後更為之計則一簪之資亦足以富何遽至於皇皇哉臣嘗讀吳越世家觀勾踐困於會稽之上而行成於吳凡金玉子女所以為賂者不可勝計既反國而吳之百役無不從者使大夫女女於大夫士女女於士春秋貢獻不絶於吳府常竊怪其以蠻夷之國承敗亡之後救死扶傷之餘而賂遺費耗又不可勝計如此然卒以滅吳則為國之患果不在費也彼其內外不相擾是以能有所立使范蠡大夫種二人分國而制之范蠡曰四封之外種不如蠡使蠡主之凡四封之外所以待吳者種不知也四封之內蠡不如種使種主之凡四封之內所以強國富民者蠡不知也二人者各專其能各致其力是以不勞而滅吳其所以賂遺於吳者甚厚而有節也是以財不匱其所以聽役于吳者甚勞而有時也是以本不搖然後勾踐得以安意肆志焉而吳國固在其掌中矣今以天下之大而中書常有邉鄙之憂宜其內治有不辦者故臣以為治天下不若清中書之務中書之務清則天下之事不足辦也今夫天下之財舉歸之司農天下之獄舉歸之廷尉天下之兵舉歸之樞密而宰相特持其大綱聽其治要而責成焉耳夫此二者豈少於邉事哉誠以為不足以纍中書也今之所以待二國者失在於過重古者有行人之官掌四方賓客之政當周之盛時諸侯四朝蠻夷戎狄莫不來享故行人之官治其登降揖讓之節牲芻委積之數而已至於周衰諸侯爭強而行人之職為難且重春秋時蔡聘於晉叔向命召行人子員子朱曰朱也當御叔向曰秦晉不和久矣今日之事幸而集秦晉賴之不集三軍暴骨其後楚伍貟奔吳為吳行人以謀楚而卒以入郢西劉之興有典屬國故賈誼曰陛下試以臣為屬國請必係單于之頸而制其命伏中行説而笞其背舉胸奴之衆惟上所令今若依倣行人屬國特建一官重任而厚責之使宰相於兩制之中舉其可用者而勿奪其權使大司農以每嵗所以餽於二邊者限其常數而豫為之備其餘者朝廷不與知也凡吾所以遣使於邊與吾所以館其使者皆得以自擇而其非常之辭無厭之求難塞之請亦得以自答使其議不及於朝廷而其間暇則收羅天下之俊才治其戰攻守禦之䇿兼聽博採以周知敵國之虛實凡事關於境外者皆以付之如此則天子與宰相特因其能否而定其黜陟其實不亦甚簡歟今自宰相以下百官泛泛焉莫任其責今舉一人而授之使日夜思所以待二國宜無不濟者然後得以安居靜慮求天下之大計唯所欲為將無不可者其三曰臣聞聖王之治天下使天下之事各當其處而不相亂天下之人各安其分而不相躐也然後天子得優遊無為而制其上今也不然邉鄙抗衡本非中國之大患而每以纍朝廷是以徘徊擾攘卒不能有所立今委任而責成使西北不過為未誅之寇則中國固吾之中國而有所不可為哉於此之時臣知天下之不足治也請言當今之勢夫天下有二患有立法之弊有任人之失二者疑似而難明此天下之所以亂也當立法之弊也其君必曰吾用某也而天下不治是某不可用也又從而易之不知法之弊而移咎於人及其用人之失也又從而尤其法法之變未有已也如此則雖至於覆敗死亡相繼而不悟豈足怪哉昔者漢興因秦以為治刑法峻急禮義消亡天下蕩然恐後世無所執守故賈誼董仲舒咨嗟嘆息以立法更制為事後世見二子之論以為聖人治天下凡皆如此是以腐儒小生皆欲妄有所變改以惑亂世主臣竊以為當今之患法令雖有所未安而天下之所以不大治者失在於任人而非法制之罪也國家法令幾變矣天下之不大治其咎果安在哉曩者大臣之議患天下之士其進不以道而取之不精也故為之法曰中年而舉取舊數之半而復明經之科患天下之吏無功而遷取髙位而不讓也故為之法曰當遷者有司以聞而自陳者為有罪此二者其名甚美而其實非大有益也而議者欲以此等致天下於大治臣竊以為過矣夫法之於人猶五聲六律之於樂也法之不能無姦猶五聲六律之不能無淫樂也先王知其然故存其大略而付之於人茍不至於害民而不可不去者皆不變也故曰失在任人而已夫有人而不用與用而不行其言行其言而不盡其心其失一也古之興王一人而已湯以伊尹武以太公皆捐天下以與之而後伊吕得捐其一身以經營天下君不疑其臣功成而無後患是以知無不言言無不行其所欲用雖其親愛可也其所欲誅雖其讎隙可也使其心無所顧忌故能盡其才而責其成功及至後世之君始用區區之小數以繩天下之豪俊故雖有國士而莫為之用夫賢人君子之欲有所樹立以著不朽於後世者甚於人君顧恐功未及成而有所奪祗以速天下之亂耳鼂錯之事斷可見矣夫奮不顧一時之禍決然徒欲以身試人主之威者是亦其所挾者不甚大也斯固未足與有為而沈毅果敢之士又必有待而後發茍人主不先自去其不可測而示其可信則彼孰從而發哉慶歷中天子急於求治擢用賢者天下日夜望其成功方其深思逺慮而未有所發也雖天子亦遲之至其一旦發憤條天下之利害百未及一二而舉朝喧譁以至於逐去曽不旋踵此天下之士所以相戒而不敢深言也居今之世而欲納天下於至治非大有所矯拂於世俗不可以有成也何者天下獨患柔弱而不振怠惰而不肅茍且偷安而不知長久之計臣以為宜如諸葛亮之治蜀王猛之治秦使天下悚然人人不敢飾非務盡其誠凡此者皆庸人之所大惡而讒言之所由興也是故先主拒關張之間而後孔明得以盡其才苻堅斬樊世逐仇騰黜席寶而後王猛得以畢其功夫天下未嘗無二子之才也而人主思治又如此之勤相須甚急而相合甚難者獨患君不信其臣臣不測其君而已矣惟天子一日慨然明告政事之臣所以欲為者使知人主之深知之也而內為之地然後敢有所發於外而不顧不然雖得賢臣千萬一日百變法天下益不可治嵗復一嵗而終無以大慰天下之望豈不亦甚可惜哉其四曰天子與執政之大臣既已相得而無疑可以盡其所懷直已而行道則夫當今之所宜先者莫如破庸人之論以開功名之門而後天下可為也治天下譬如治水方其奔衝潰決騰湧漂蕩而不可禁止也雖欲盡人力之所至以求殺其尺寸之勢而不可得及其既衰且退也駸駸乎若不足以終日故夫善治水者不惟有難殺之憂而又有易衰之患導之有方決之有漸疏其故而納其新使不至於壅閼腐敗而無用嗟夫人知江河之有水患也而以為沼沚之可以無憂是烏知舟楫灌溉之利哉夫天下之未平英雄豪傑之士務以其所長角奔而爭利惟恐天下一日無事也是以人人各盡其材雖不肖者亦自淬厲而不至於怠廢故其勇者相吞智者相賊使天下不安其生為天下者知夫大亂之本起於智勇之士爭利而無厭是故天下既平則削去其具抑逺天下剛健好名之士而奬用柔懦謹畏之人不過數十年天下靡然無復往時之喜事也於是能者不自激發而無以見其能不能者益以弛廢而無用當是之時人君欲有所為而左右前後皆無足使者是以紀綱日壞而不自知此其為患豈特英雄豪傑之士趦趄而已哉聖人則不然當其久安於逸樂也則以術起之使天下之心翹翹然常自喜於為善是故能安而不衰且夫人君之所恃以為天下者天下皆為而已不為夫使天下皆為而已不為者開其利害之端而辨其榮辱之等使之踴躍奔走皆為我役而不自知夫是以坐而收其功也如使天下皆欲不為而得則天子誰與共天下哉今者治平之日久矣天下之患正在於此臣故曰破庸人之論開功名之門而後天下可為也今夫庸人之論有二其上之人務為寬深不測之量而下之士好言中庸之道此二者皆庸人相與議論舉先賢之言而獵取其近似者以自解説其無能而已矣夫寬深不測之量古人所以臨大事而不亂有以鎮世之躁蓋非以隔絶上下之情養尊而自安也譽之則勸非之則沮聞善則喜見惡則怒此三代聖人之所共也而後之君子必曰譽之不勸非之不沮聞善不喜見惡不怒斯以為不測之量不已過乎夫有勸有沮有喜有怒然後有間而可入有間而可入然後智者得為之謀才者得為之用後之君子務為無間夫天下孰能入之古之所謂中庸者盡萬物之理而不過故亦曰皇極夫極盡也後之所謂中庸者循循然為衆人之所能為斯以為中庸矣此孔子孟子之所謂鄉原也一鄉皆稱原人焉無所往而不為原人同乎流俗合乎汙世曰古之人何為踽踽涼涼生斯世也為斯世也善斯可也謂其近於中庸而非故曰德之賊也孔子孟軻惡鄉原之賊夫德也欲得狂者而見之狂者又不可見欲得狷者而見之曰狂者進取狷者有所不為也今日之患惟不取於狂者狷者而皆取於鄉原是以若此靡靡不立也孔子子思之所從受中庸者也孟子子思所授以中庸者然皆欲得狂者狷者而與之然則率勵天下而作其怠惰莫如狂者狷者之賢也臣故曰破庸人之論開功名之門而後天下可為也其五曰其次莫若深結天下之心臣聞天子者以其一身寄之乎巍巍之上以其一心運之乎茫茫之中安而為泰山危而為纍卵其間不容毫釐是故古之聖王不恃其有可畏之資而恃其有可愛之實不恃其有不可拔之勢而恃其有不忍叛之心何則其所居者天下之至危也天子恃公卿以有其天下公卿大夫士以至於民轉相屬也以有其富貴茍不得其心而欲羈之以區區之名控之以不足恃之勢者其平居無事猶有以相制一旦有急是皆行道之人掉臂而去尚安得而用之哉古之失天下皆非一日之故其君臣之歡去已久矣適會其變是以一散而不可復收方其未也天子甚尊大夫士甚賤奔走萬里無敢後先儼然南靣以臨其臣曰天何言哉百官俯首就位斂足而退兢兢惟恐有罪群臣相率為久安之計賢者既無所施其才而愚者亦有所容其不肖舉天下之事聽其自為而已及乎事出於非常變起於不測視天下莫與同其患雖欲分國以與人而且不及矣秦二世唐德宗蓋用此術以至於顛沛而不悟豈不悲哉天下者器也天子者有此器者也器久不用而置諸篋笥則器與人不相習是以扞格而難操良工者使手習知其器而器亦習知其手手與器相信而不相疑夫是故所為成也天下之患非經營禍亂之足憂而養安無事之可畏何者懼其一旦至於扞格而難操也昔之有天下者日夜淬厲其百官撫摩其人民為之朝聘會同燕饗以交諸侯之歡嵗時月朔致民讀法飲酒蠟臘以遂萬民之情有大事自庶人以上皆得至於外朝以盡其詞然猶以為未也而五載一巡狩朝諸侯於方嶽之下觀見其老者賢士大夫以周知其天下風俗凡此者非為茍勞而已將以馴致服習天下之心使不至於扞格而難操也及至後世壞先王之法安於逸樂而惡聞其過是以養尊而自髙務為深嚴使天下拱手以貌相承而心不服其老生腐儒又出而為之説曰天子不可以妄有言也史且書之後世且以為譏使其君臣相顧而不相知如此則偶人矣天下之心既去而悵悵然抱其空器不知英雄豪傑已議其後臣嘗觀西漢之初髙祖創業之際事變之興亦已繁矣而髙祖以項氏創殘之餘而又與布信之徒角馳於中原此六七公者皆以絶人之姿據有土地甲兵之衆其勢足以亂然天下終以不搖卒授於漢傳十數世矣而至於元成哀平四夷嚮風兵革不試而王莾一豎子乃舉而移之不用寸兵尺鐵而天下屏息莫敢或爭此其故何也創業之君出於布衣其大臣將相皆有握手之歡凡在朝廷者皆嘗試嚌啜以知其才之短長彼其視天下如一身茍有疾痛其手足不期而自救當此之時雖有近憂而無後患及其子孫生於深宮之中而狃於富貴之勢尊卑闊絶而上下之情疏禮節繁多而君臣之義薄是故不為近憂而常為逺患及其一旦固已不可救矣聖人知其然是以去苛禮而務至誠黜虛名而求實效不愛髙位重祿以致山林之士而欲聞切直不隱之言者凡皆以通上下之情也昔我太祖太宗既有天下法令簡約不為崖岸當時將相皆得從容終日歡如平生下至士庶人亦得以自效故天下誦其言至今非有文采緣飾而開心見誠有以入人之深者此英主之竒術御天下之大權也方今治平之日久矣愚以為宜日新盛德以鼓動天下久安怠惰之氣故陳其五事以備採擇其一曰將相之臣天子所恃以為治者宜日夜召論天下之大計且以熟觀其為人其二曰太守刺史天子所寄以逺方之民者其罷歸皆當問其所以為政民情風俗之所安亦以揣知其才之所堪其三曰左右扈從侍讀侍講之臣本以論説古今興衰之大要非以應故事備數而已經籍之外茍有以訪之無傷也其四曰吏民上書茍少有可觀者宜皆召問優慰以養其敢言之氣其五曰天下之吏自一命已上雖其至賤無以自通於朝廷然人主之為豈有所不可哉察其善者卒然召見之使不知其所從來如此則逺方之賤吏亦務自激發為善不以位卑祿薄無由自通於上而不修飾使天下習知天子樂善親賢恤民之心孜孜不倦如此翕然皆有所感發知愛於君而不可與為不善亦將賢人衆多而姦吏衰少刑法之外有以大愧天下之心焉耳策别曰臣聞為治有先後有本末嚮之所論者當今之所宜先而為治之大凡也若夫事之利害計之得失臣請得列而言之蓋其總四其别十七一曰課百官二曰安萬民三曰厚貨財四曰訓兵旅課百官者其别有六一曰厲法禁昔者聖人制為刑賞知天下之樂乎賞而畏乎刑也是故施其所樂者自下而上民有一介之善不終朝而賞隨之是以下之為善者足以知其無有不賞也施其所畏者自上而下公卿大臣有毫髮之罪不終朝而罰隨之是以上之為不善者亦足以知其無有不罰也詩曰剛亦不吐柔亦不茹夫天下之所謂權豪貴顯而難令者此乃聖人之所借以徇天下也舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人為能擊天下之大族以服小民之心故其刑罰至於措而不用周之衰也商鞅韓非峻刑酷法以督責天下然其所以為得者用法始於貴戚大臣而後及於迹賤故能以其國霸由此觀之商鞅韓非之刑法非舜之刑而所以用刑者舜之術也後之庸人不深原其本末而猥以舜之用刑之術與商鞅韓非同類而棄之法禁之不行姦宄之不止由此其故也今州縣之吏受賕而鬻獄其罪至於除名而其官不足以贖則至於嬰木索受笞箠此亦天下之至辱也而士大夫或冒行之何者其心有所不服也今夫大吏之為不善非特簿書米鹽出入之間也其位愈尊則其所害愈大其權愈重則其下愈不敢言幸而有不畏強禦之士力而排之又幸而不為上下之所抑以遂成其罪則其官之所減者至於罰金蓋無幾矣夫過惡暴著于天下而罰不傷其毫毛鹵莾於公卿之間而纎悉於州縣之小吏用法如此宜其天下之不心服也用法而不服其心雖刀鋸斧鉞猶將有所不避而況於木索笞箠哉方今法令至繁觀其所以防姦之具一舉足且入其中而大吏犯之不至於可畏其故何也天下之議者曰古者之制刑不上大夫大臣不可以法加也嗟夫刑不上大夫者豈曰大夫以上有罪而不刑歟古之人君責其公卿大臣至重而待其士庶人至輕也責之至重故其所以約束之者愈寬待之至輕故其所以隄防之者甚密夫所貴乎大臣者惟不待約束而後免於罪戾也是故約束愈寬而大臣益以畏法何者其心以為人君之不我疑而不忍欺也茍幸其不疑而輕犯法則固已不容於誅矣故夫大夫以上有罪不從於訊鞫論報如士庶人之法斯以為刑不上大夫而已矣天下之吏自一命以上其蒞官臨民茍有罪皆書於其所謂歷者而至於館閣之臣出為郡縣者則遂罷去此真聖人之意欲有以重責之也奈何其與士庶人較罪之輕重而又以其爵減耶夫律有罪而得以首免者所以開盜賊小人自新之塗而今之卿大夫有罪亦得以首免是以盜賊小人待之歟天下惟其無罪也是以罰不可得而加如知其有罪而特免其罰則何以令天下今夫大臣有不法或者既以舉之而詔曰勿推此何為者也聖人為天下豈容有此曖昧而不決故曰厲法禁自大臣始則小臣不犯矣其二曰抑僥幸夫所貴乎人君者豫奪自我而不牽於衆人之論也天下之學者莫不欲仕仕者莫不欲貴如從其欲則舉天下皆貴而後可惟其不可從也是故仕不可以輕得而貴不可以易致此非有所吝也爵祿出乎我者也我以為可豫而豫之我以為可奪而奪之彼雖有言者不足畏也天下有可畏者賦斂不可以不均刑罰不可以不平守令不可以不擇此誠足以致天下之安危而可畏者也我欲慎爵賞愛名器而囂囂者以為不可是烏足恤哉國家自近嵗以來吏多而闕少率一官而三人共之居者一人去者一人而伺之者又一人是一官而有二人者無事而食也且其蒞官之日淺而間居之日長以其蒞官之所得而為間居仰給之資是以貪吏常多而不可禁此用人之大弊也古之用人者取之至寬而用之至狹取之至寬故賢者不隔用之至狹故不肖者無所容記曰司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之然則是取之者未必用也今之進士自二人以下者皆試官夫試之者豈一官之謂哉固將有所廢置焉且國家取人有制䇿有進士有明經有諸科有任子有府史雜流凡此者雖衆無害也其終身進退之決在乎召見改官之日此尤不可以不愛惜慎重者也今之議者不過曰多其資考而責之以舉官之數且彼有勉強而已資考既足而舉官之數亦以及格則將執文墨以取必於我雖千百為輩莫敢不盡與臣竊以為今之患正在於任文太過是以為一定之制使天下可以嵗月必得甚可惜也方今之便莫若使吏六考以上皆得以名聞於吏部吏部以其資考之逺近舉官之衆寡以次第其名然後使一二大臣雜治之參之以其才器之優劣而定其等嵗終而奏之以詔天子廢置度天下之吏每嵗以物故罪免者幾人而增損其數以所奏之等補之及數而止使其豫奪亦雜出於賢不肖之間而無有一定之制則天下之吏不敢有必得之心將自奮勵磨淬以求聞于時而向之所謂用人之大弊者將不勞而自去然而議者必曰法不一定而以才之優劣為差則是好惡之私有以啓之也臣以為不然夫法者本以存其大綱而其出入變化固將付之於人昔者唐有天下舉進士者羣至於有司之門唐之制惟有司之信也是故有司得以搜羅天下之賢俊而習知其為人至於一日之試則固已不取也唐之得人於斯為盛今以名聞於吏部者每嵗不過數十百人使一二大臣得以訪問恭考其才雖有失者蓋已寡矣如必曰任法而不任人天下之人必不可信則夫一定之制臣亦未知其果不可以為姦也其三曰決壅蔽所貴乎朝廷清明而天下治平者何也天下不訴而無寃不謁而得其所欲此堯舜之盛也其次不能無訴訴而必見察不能無謁謁而必見省使逺方之賤吏不知朝廷之髙而一介之小民不識官府之難而後天下治今夫一人之身有一心兩手而已疾痛苛癢動於百體之中雖其甚微不足以為患而手隨至夫手之至豈其一一而聽之心哉心之所以素愛其身者至深而手之所素聽於心者至熟是故不待使令而率然以自至聖人之治天下亦如此而已百官之衆四海之廣使其關節脈理相通為一叩之而必聞觸之而必應夫是以天下可使為一身天子之貴士民之賤可使相愛憂患可使同緩急可使救今也不然天下有不幸而訴其所寃如訴之於天有不得已而謁其所欲如謁之於鬼神公卿大臣不能究其詳悉而付之於胥吏故凡賄賂先至者朝請而夕得徒手而來者終年而不獲至於故常之事人之所當得而無疑者莫不務為留滯以待請屬舉天下一毫之事非金錢無以行之昔者漢唐之弊患法不明而用之不密使吏得以空虛無據之法而繩天下故小人得以無法為姦今也法令明具而用之至密舉天下惟法之從所欲排者有小不如法而可指以為瑕所欲與者雖有所乖戾而可借法以為解故小人以法為姦今天下所為多事者豈事之誠多耶吏欲有所鬻而未得則新故相仍紛然而不決此王化之所以壅遏而不行也昔桓文之霸百官承職不待教令而辦四方之賔至不求有司王猛之治秦事至纎悉莫不盡舉而人不以為煩蓋史之所記麻思還冀州請於猛猛曰束裝行矣至暮而符下及出關郡縣皆已被符其令行禁止而無留事者至於纎悉莫不皆然苻堅以戎狄之種至為霸王兵強國富垂及升平者猛之所為固宜其然也今天下治安大吏奉法而不敢顧私而府史之屬招權鬻法長吏心知而不問以為當然此其弊有二而已事繁而官不勤故權在胥吏欲去其弊也莫如省事而厲精省事莫如任人厲精莫如自上率之今之所謂至繁天下之事關於其中訴者之多而謁者之衆莫如中書與三司天下之事分于百官而中書聽其治要郡縣之錢幣制於轉運使而三司受其會計此宜若不至於繁多然中書不待奏課以定其黜陟而關預其事則是不任有司也三司之吏推析贏虛至于毫毛以繩郡縣則是不任轉運使也故曰省事莫如任人古之聖王愛日以求治辨色而視朝茍少安焉而至於日出則終日為之不給以少而言之一日而廢一事一月則可知也一嵗則事之積者不可勝數矣欲事之無繁則必勞於始而逸於終晨興而晏罷天子未退則宰相不敢歸安於私第宰相日昃而不退則百官莫不震悚盡力於王事而不敢宴遊如此則纎悉隱微莫不舉矣天子求治之勤過於先王而議者不稱王季之晏朝而稱舜之無為不論文王之日昃而論始皇之量書此何以率天下之怠耶臣故曰厲精莫如自上率之則壅蔽決矣其四曰專任使夫吏之與民猶工人之操器易器而操之其始莫不齟齬而不相得是故雖有長材異能之士朝夕而去則不如庸人之久且便也自漢至今言吏治者皆推孝文之時以為任人不可以倉卒而責其成效又其三嵗一遷吏不為長逺之計則其所施設一切出于茍簡此天下之士爭以為言而臣知其未可以卒行也夫天下之吏惟其病多而未有以處也是以擾擾在此如使五六年或七八年而後遷則將有十年不得調者矣朝廷方將減任子清冗官則其行之當有所待而臣以為當今之弊有甚不可者夫京兆府天下之所觀望而化王政之所由始也四方之衝兩河之交舟車商賈之所聚金玉錦繡之所積故其民不知有耕稼織紝之勞富貴之所移貨利之所眩故其民不知有恭儉廉退之風以書數為終身之能以府史賤吏為鄉黨之榮故其民不知有儒學講習之賢夫是以獄訟繁滋而姦不可止為治者益以茍且而不暇及於教化四方觀之使風俗日以惡薄未始不由此也今夫為京兆者戴星而出見燭而入案牘笞箠交乎其前拱手而待命者足相躡乎其庭持詞而求訴者肩相摩乎其門憧憧焉不知其為誰一訊而去得罪者不知其得罪之由而無罪者亦不知其無罪之實如此則刑之不服赦之不悛獄訟之繁未有已也夫大司農者天下之所以贏虛外計之所從受命也其財賦之出入簿書之交錯縱橫變化足以為姦而不可推究上之人不能盡知而付之吏吏分職乎其中者以數十百人其耳目足以及吾之所不及是以能者不過粗知其大綱而不能者惟吏之聽賄賂交乎其門四方之有求者聚乎其家天下之大弊無過此二者臣竊以為省府之重其擇人宜精其任人宜久凡今之弊皆不精不久之故何則天下之賢者不可以多得而賢者之中求其治繁者又不可以人人而能也幸而有一人焉又不久而去夫世之君子茍有志於天下而欲為長逺之計者則其效不可以朝夕見其始若迂闊于其終必將有所可觀今期月不報政則朝廷以為是無能為者不待其成而去之而其翕然見稱于人者又以為有功而擢為兩府然則是為省府者能與不能皆不得久也夫以省府之繁終嵗不得休息朝廷既以汲汲而去之而其人亦莫不汲汲而求去夫吏胥者皆老于其局長子孫於其中以汲汲求去之人而御長子孫之吏此其相視如客主之勢宜其姦弊不可得而去也省府之位不為卑矣茍有能者而老于此不為不用矣古之用人者知其久勞於位則時有賜豫勸奬之以厲其心不聞其驟遷以奪其成效今天下之吏縱未能一槩久而不遷至于省府亦不可以倉卒而去吏知其久居而不去也則其欺詐固已少衰矣而其人亦得深思熟慮周旋于其間不過十年將必有卓然可觀者也其五曰無責難無責難者將有所深責也昔者聖人之立法使人可以過而不可以不及何則其所求於人者衆人之所能也天下有能為衆人之所不能者固無以加矣而不能者不至于犯法夫如此而猶有犯者然後可以深懲而決去之由此而言則聖人之所以不責人之所不能者將以深責乎人之所能也後之立法者異於是責人以其所不能而其所能者不深責也是以其法不可行而其事不立夫事不可以兩立也聖人知其然是故有所取必有所捨有所禁必有所寬寬之則其禁必止捨之則其取必得今夫天下之吏不可以人人而知也故使長吏舉之又恐其舉之以私而不得其人也故使長吏任之他日有敗事則以連坐其過惡重者其罰均且夫人之難知自堯舜病之矣今日為善而明日為惡猶不可保況於十數年之後其幼者已壯其壯者已老而猶執其一時之言使同被其罪不已過乎天下之人仕而未得志也莫不勉強為善以求舉惟其既已改官而無憂是故蕩然無所不至方其在州縣之中長吏親見其廉謹勤幹之節則其勢不可以不舉彼又安知其終身之所為哉故曰今之法責人以其所不能者謂此也一縣之長察一縣之屬一郡之長察一郡之屬職司者察其屬郡者也此三者其屬無幾耳其貪其廉其寬猛其能與不能不可謂不知也今且有人牧牛羊者而不知其肥瘠是可復以為牧人歟夫為長而屬之不知則此固可以罷免而無足惜者今其屬官有罪而其長不即以聞他日有以告者則其長不過為失察而去官者又以不坐夫失察天下之微罪也職司察其屬郡郡縣各察其屬此非人之所不能而罰之甚輕亦可怪也今之世所以重發贓吏者何也夫吏之貪者其始必詐廉以求舉舉者皆王公貴人其下者亦卿大夫之列以身任之居官者莫不愛其同類等夷之人故其樹根牢固而不可動連坐者常六七人甚者十餘人此如盜賊質劫良民以求茍免耳為法之弊至於如此亦可變矣如臣之䇿以職司守令之罪罪舉官以舉官之罪罪職司守令今使舉官與所舉之罪均縱又加之舉官亦無如之何終不能逆知終身之廉者而後舉特推之于幸不幸而已茍以其罪罪職司守令彼其勢誠有以督察之臣知貪吏小人無容足之地又何必於舉官焉艱之其六曰無沮善昔者先王之為天下必使天下欣欣然常有無窮之心力行不倦而無自棄之意夫惟自棄之人則其為惡也甚毒而不可解是以聖人畏之設為髙位重祿以待能者使天下皆得踴躍自奮扳援而來惟其才之不逮力之不足是以終不能至於其間而非聖人塞其門絶其塗也夫然故一介之賤吏閭閻之匹夫莫不奔走於善至於老死而不知休息此聖人以術驅之也天下茍有甚惡而不可忍也聖人既已絶之則屏之逺方終身不齒此非獨不仁也以為既已絶之彼將一旦肆其毒以殘害吾民是故絶之則不用用之則不絶既已絶之又復用之則是驅之於不善而又假之以其具也無所望而為善無所愛惜而不為惡者天下一人而已矣以無所望之人而責其為善以無所愛惜之人而求其不為惡又付之以人民則天下知其不可也世之賢者何常之有或出于賈豎賤人甚者至於盜賊往往而是而儒生貴族世之所望為君子者或至於放肆不軌小民之所不若聖人知其然是故不逆定於其始進之時而徐觀其所試之效使天下無必得之心亦無必不可得之道天下知其不可以必得也然後勉強於功名而不敢僥幸知其不至於必不可得也然後有以自慰其心久而不懈嗟夫聖人之所以鼓舞天下之人日化而不自知者此其為術歟後之為政者則不然用人以必得而絶人以必不可得此其意以為進賢而退不肖然天下之弊莫甚於此今夫制䇿之及等進士之髙第皆以一日之間而決取終身之富貴此雖一時之文而未知其臨事之能否則其用之不已大遽乎天下有用人而絶之者三州縣之吏茍非有大過而不可復用則其他犯法皆可使竭力為善以自贖而今世之法一陷於罪戻則終身不遷使之不自聊賴而疾視其民肆意妄行而無所顧惜此其初未必小人也不幸而陷于其中途窮而無所入則遂以自棄府史賤吏為國者知其不可闕也是故嵗久則補以外官以其所從來之卑也而限其所至則其中雖有出羣之才終不得齒於士大夫之列夫人出身而仕者將以求貴也貴不可得而至矣則將惟富之求此其勢然也如是則雖至於鞭笞戮辱而不足以禁其貪故夫此二者茍不可以遂棄則宜有以少假之也入資而仕者皆得補郡縣之吏彼知其終不得遷亦將逞其一時之欲無所不至此誠不可以遷也則是用之之過而已臣故曰絶之則不用用之則不絶此三者之謂也安萬民者其别有六一曰敦教化夫聖人之於天下所恃以為牢固不拔者在乎天下之民可與為善而不可與為惡也昔者三代之民見危而授命見利而不忘義此非必有爵賞勸乎其前而刑罰懲乎其後也其心安於為善而忸怩于不義是故有所不為夫民之有所不為則天下不可以敵甲兵不可以威利祿不可以誘可殺可辱可飢可寒而不可與叛此三代之所以享國長久而不拔也及至秦漢之世其民見利而忘義見危而不能授命法禁之所不及則巧偽變詐無所不為疾視其長上而幸其災因之以水旱加之以盜賊則天下枵然無復天子之民矣世之儒者常有言曰三代之時其所以教民之具甚詳且密也學校之制射鄉之節冠昏喪祭之禮粲然莫不有法及至後世教化之道衰而盡廢其具是以若此無耻也然世之儒者蓋亦嘗以此等教天下之民矣而卒以無效使民好文而益偷飾詐而相髙則有之矣此亦儒者之過也臣愚以為若此者皆好古而無術知有教化而不知名實之所存者也實者所以信其名而名者所以求其實也有名而無實則其名不行有實而無名則其實不長凡今儒者之所論皆其名也昔武王既克商散財發粟使天下知其不貪禮下賢俊使天下知其不驕封先聖之後使天下知其仁誅飛廉惡來使天下知其義如此則其教化天下之實固已立矣天下聳然皆有忠信廉耻之心然後文之以禮樂教之以學校觀之以鄉射而謹之以冠昏喪祭民是以目擊而心諭安行而自得也及至秦漢之世專用法吏以督責其民至于今千有餘年而民日以貪冒嗜利而無耻儒者乃始以三代之禮所謂名者而繩之彼見其登降揖讓盤辟俯僂之容則掩口而竊笑聞鐘鼓管磬希夷嘽緩之音則驚顧而不樂如此而欲望其遷善逺罪不已難乎臣愚以為宜先其實而後其名擇其近於人情者而先之今夫民不知信則不可與久居於安民不知義則不可與同處於危平居則欺其吏而有急則叛其君此教化之實不至天下之所以無變者幸也欲民之知信則莫若務實其言欲民之知義則莫若務去其貪往者河西用兵而家人子弟皆籍以為軍其始也官告以權時之宜非久役者如是當復爾業少焉皆刺其額無一人得免自寶元以來諸道以兵興為辭而增賦者至今皆不為除去夫如是將何以禁小民之詐欺哉夫所貴乎縣官之尊者為其恃於四海之富而不爭於錐刀之末也其與民也優其取利也緩古之聖人不得已而取則時有所置以明其不貪何者小民不知其説而惟貪之知今雞鳴而起百工雜作匹夫入市操挾尺寸吏且隨而稅之扼吭拊背以收絲毫之利古之設官者求以裕民今之設官者求以勝民賦斂有常限而以先期為賢出納有常數而以羡息為能天地之間茍可以取者莫不有禁求利太廣而用法太密故民日趨於貪臣愚以為難行之言當有所必行而可取之利當有所不取以教民信而示之義若曰國用不足而未可以行則臣恐其失之多於得也其二曰勸親睦夫民相與親睦者王道之始也昔三代之制畫為井田使其比閭族黨各相親愛有急相賙有喜相慶死喪相恤疾病相養是故其民安居無事則往來歡欣而獄訟不生有寇而戰則同心併力而緩急不離自秦漢以來法令峻急使民離其親愛歡欣之心而為鄰里告訐之俗富人子壯則出居貧人子壯則出贅一國之俗而家各有法一家之法而人各有心紛紛乎散亂而不相屬是以禮讓之風息而爭鬭之獄繁天下無事則務為欺詐相傾以自成天下有變則流徙渙散相棄以自存嗟夫秦漢以下天下何其多故而難治也此無他民不愛其身則輕犯法輕犯法則王政不行欲民之愛其身則莫若使其父子親兄弟和妻子相好夫民仰以事父母旁以睦兄弟而俯以恤妻子則其所賴以生者重而不忍以其身輕犯法三代之政莫尚於此矣今欲教民和親則其道必始于宗族臣欲復古之小宗以收天下不相親屬之心古者有大宗有小宗故禮曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也古者諸侯之子弟異姓之卿大夫始有家者不敢禰其父而自使其嫡子後之則為大宗族人宗之雖百世而宗子死則為之服齊衰九月故曰宗其繼别子之所自出者百世不遷者也别子之庶子又不得禰别子而自使其嫡子為後則為小宗小宗五世之外則無服其繼禰者親兄弟為之服其繼祖者從兄弟為之服其繼曽祖者再從兄弟為之服其繼髙祖者三從兄弟為之服其服大功九月而髙祖以外親盡則易宗故曰宗其繼髙祖者五世則遷者也小宗四有繼髙祖者有繼曽祖者有繼祖者有繼禰者與大宗為五此所謂五宗也古者立宗之道嫡子繼為宗則其庶子之嫡子又各為其庶子之宗其法止於四而其實無窮自秦漢以來天下無世卿大宗之法不可以復立而其可以收合天下之親者有小宗之法存而莫之行此甚可惜也今夫天下所以不重族者有族而無宗也有族而無宗則族不可合族不可合則雖欲親之而無由也族人而不相親則忘其祖矣今世之公卿大臣賢人君子之後所以不能世其家如古之久逺者其族散而忘其祖也故莫若復小宗使族人相率而尊其宗子宗子死則為之加服犯之則以其服坐貧賤不敢輕而富貴不敢以加之冠昏必告喪葬必赴此非有所難行也今夫良民之家士大夫之族亦未必無孝悌相親之心而族無宗子莫為之糾率其勢不得相親是以世之人有親未盡而不相往來冠昏不相告死不相赴而無知之民遂至於父子異居而兄弟相訟然則王道何從而興乎嗚呼世人之患在於不務逺見古之聖人合族之法近於迂濶而行之期月則望其有益故夫小宗之法非行之難而在乎久而不怠也天下之民欲其忠厚和柔而易治其必自小宗始矣其三曰均户口夫中國之地足以食中國之民有餘也而民常病於不足何哉地無變遷而民有聚散聚則爭於不足之中而散則棄於有餘之外是故天下常有遺利而民用不足昔者三代之制度地以居民民各以其夫家之衆寡而受田于官一夫而百畝民不可以多得尺寸之地而地亦不可以多得一介之民故其民均而地有餘當周之時四海之內地方千里者九而京師居其一有田百同而為九百萬夫之地山陵林麓川澤溝瀆城郭宫室塗巷三分去一為六百萬夫之地又以上中下田三等而通之以再易為率則王畿之內足以食三百萬夫之衆以九州言之則是二千七百萬夫之地也而計之以下農夫一夫之地而食五人則是萬有三千五百萬人可以仰給於其中當成康刑措之後其民極盛之時九州之籍不過千三萬四千有餘夫地以十倍而民居其一故榖常有餘而地力不耗何者均之有術也自井田廢而天下之民轉徙無常惟其所樂則聚以成市側肩躡踵以爭尋常挈妻負子以分升合雖有豐年而民無餘蓄一遇水旱則弱者轉於溝壑而強者聚為盜賊地非不足而民非加多也蓋亦不得均民之術而已夫民之不均其弊有二上之人賤農而貴末忽故而重新則民不均夫民之為農者莫不重遷其墳墓廬舍桑麻果蔬牛羊耒耜皆為子孫百年之計惟其百工技藝遊手浮食之民然後可以懷輕資而極其所往是故上之人賤農而貴末則農人釋其耒耜而遊於四方擇其所樂而居之其弊一也凡人之情怠於久安而謹於新集水旱之後盜賊之之餘則莫不輕刑罰薄稅斂省力役以懷逋逃之民而其久安而無變者則不肯無故而加恤是故上之人忽故而重新則其民稍稍引去聚於其所重之地以至於衆多而不能容其弊二也臣欲去其二弊而開其二利以均斯民昔者聖人之興作也必因人之情故易為功必因時之勢故易為力今欲無故而遷徒安居之民分多而益寡則怨謗之門盜賊之端必起於此未享其利而先被其害臣愚以為民之情莫不懷土而重去惟士大夫出身而仕者狃於遷徙之樂而忘其鄉昔漢之制吏二千石皆徙諸陵今之計可使天下之吏仕至某者皆徙荆襄唐鄧許汝陳蔡之間今士大夫無不樂居於此者顧恐獨往而不能濟彼見其儕類等夷之人莫不在焉則其去惟恐後耳此所謂因人之情夫天下不能嵗嵗而豐也則必有飢饉流亡之所民方其困急時父子且不能相顧又安知去鄉之為戚哉當此之時募其樂徙者而使所過廩之費不甚厚而民樂行此所謂因時之勢然此二者皆授其田貸其耕耘之具而緩其租然後可以固其意夫如是天下之民其庶乎有息肩之漸也其四曰較賦役自兩稅之興因地之廣狹瘠腴而制賦因賦之多少而制役其初蓋甚均也責之厚賦則其財足以供責之重役則其力足以堪何者其輕重厚薄一出於地而不可易也户無常賦視地以為賦人無常役視賦以為役是故貧者鬻田則賦輕而富者加地則役重此所以度民力之所勝亦所以破兼并之門而塞僥幸之源也及其後世嵗月既久則小民稍稍為姦度官吏耳目之所不及則雖有法禁公行而不忌今夫一户之賦官知其為賦之多少而不知其為地之幾何也如此則增損出入惟其意之所為官吏雖明法禁雖嚴而其勢無由以止絶且其為姦常起於貿易之際夫鬻田者必窮迫之人而所從鬻者必富厚有餘之家富者恃其有餘而邀之貧者迫於飢寒而欲其速售是故多取其地而少入其賦有田者方其貧困之中茍可以緩一時之急則不暇計其他日之利害故富者地日以益而賦不加多貧者地日以削而賦不加少又其姦民欲以計免於賦役者割數畝之地加之以數倍之賦而收其少半之直或者亦貪其直之微而取焉是以數十年來天下之賦大扺淆亂有兼并之族而賦甚輕有貧弱之家而不免於重役以至於破敗流移而不知其所往其賦存而其人亡者天下皆是也夫天下不可以有僥幸也天下有一人焉僥幸而免則亦必有一人焉不幸而受其弊今天下僥幸者如此之衆則其不幸而受其弊者亦從可知矣三代之賦以什一為輕今之法本不至於什一而取然天下嗷嗷然以賦斂為病者豈其嵗久而姦生偏重而不均以至於此歟雖然天下皆知其為患而不能去何者勢不可也今欲按行其地之廣狹瘠腴而更制其賦之多寡則姦吏因緣為賄賂之門其廣狹瘠腴亦將一切出於其意之喜怒則患益深是故士大夫畏之而不敢議而臣以為此最易見者顧弗之察耳夫易田者必有契契必有所直之數其所直之數必得其廣狹瘠腴之實而官必據其所直之數而取其易田之稅是故欲知其地之廣狹瘠腴可以其稅推也久逺者不可復知矣其數十年之間皆足以推較求之故府猶可得而見茍其稅多者則知其直多其直多者則知其田多且美也如此而其賦少其役輕則夫人亡而賦存者可以有均矣鬻田者皆以其直之多少而詰其賦重為之禁而使不敢以不實之直而書之契則夫自今以往者貿易之際為姦者其少息矣要以知凡地之所直與凡賦之所宜多少而以稅參之如此則一持籌之吏坐於帳中足以周知四境之虛實不過數月而民得以少蘇不然十數年之後將不勝其弊重者日以輕而輕者日以重而未知其所終也其五曰教戰守夫當今生民之患果安在哉在於知安而不知危能逸而不能勞此其患不見於今將見於他日今不為之計其後將有所不可救者昔者先王知兵之不可去也是故天下雖平不敢忘戰秋冬之隙教民田獵以講武教之以進退坐作之方使其耳目習於鐘鼓旌旗之間而不亂使其心志安於斬刈殺伐之際而不懾是以雖有盜賊之變而民不至於驚潰及至後世用迂儒之議以去兵為王者之盛節天下既定則卷甲而藏之數十年之後甲兵頓弊而人民日以安於逸樂卒有盜賊之警則相與恐懼訛言不戰而走開元天寶之際天下豈不大治惟其民安於太平之樂酣豢於遊戲酒食之間其剛心勇氣消耗鈍眊痿蹶而不復振是以區區之祿山一出而乘之四方之民獸奔鳥竄乞為囚虜之不暇天下分裂唐室固以微矣蓋嘗試論之天下之勢譬如一身王公貴人所以養其身者豈不至哉而其平居常苦於多疾至於農夫小民終嵗勞苦而未嘗告疾此其故何也夫風雨霜露寒暑之變此疾之所由生也農夫小民盛夏而力作窮冬而暴露其筋骸之所衝犯肌膚之所浸漬輕霜露而狎風雨是故寒暑不能為之毒今王公貴人處於重屋之下出則乘輿風則襲裘雨則御蓋凡所以慮患之具莫不備至畏之太甚而養之太過小不如意則寒暑入之矣是故善養身者使之能逸而能勞步趨動作使其四體狃于寒暑之變然後可以剛健強力涉險而不傷夫民亦然今者治平之日久天下之人驕惰脆弱如婦人孺子不出於閨門論戰鬬之事則縮頸而股栗聞盜賊之名則掩耳而不願聽而士大夫亦未嘗言兵以為生事擾民漸不可長此不亦畏之太甚而養之太過歟且夫天下固有意外之患也愚者見四方之無事則以為變故無自而有此亦不然矣今國家所以奉西北之虜者嵗以百萬計奉之者有限而求之者無厭此其勢必至於戰戰者必然之勢也不先於我則先於彼不出於西則出於北所不可知者有遲速逺近而要以不能免也天下茍不免於用兵而用之不以漸使民於安樂無事之中一旦出身而蹈死地則其為患必有所不測故曰天下之民知安而不知危能逸而不能勞此臣所謂大患也臣欲使士大夫尊尚武勇講習兵法庶人之在官者教以行陳之節役民之司盜者授以擊刺之術每嵗終則聚之郡府如古都試之法有勝負有賞罰而行之既久則又以軍法從事然議者必以為無故而動民又悚以軍法則民將不安而臣以為此所以安民也天下果未能去兵則其一旦將以不教之民而驅之戰夫無故而動民雖有小恐然孰與夫一旦之危哉今天下屯聚之兵驕豪而多怨陵壓百姓而邀其上者何故此其心謂天下之知戰者惟我而已如使平民皆習於兵彼知有所敵則固已破其姦謀而折其驕氣利害之際豈不亦甚明歟其六曰去姦民自昔天下之亂必生於治平之日休養生息而姦民得容於其間蓄而不發以待天下之釁至於時有所激勢有所乘則潰裂四出不終朝而毒流於天下聖人知其然是故嚴法禁督官吏以司察天下之姦民而去之夫大亂之本必起於小姦惟其小而不足畏是故其發也常至於亂天下今夫世之所憂以為可畏者必曰豪俠大盜此不知變者之説也天下無小姦則豪俠大盜無以為資且其治平無事之時雖欲為大盜將安所容其身而其殘忍貪暴之心無所發泄則亦時出為盜賊聚為博奕群飲於市肆而呌號於郊野小者呼雞逐狗大者椎牛發塜無所不至捐父母棄妻孥而相與嬉遊凡此者舉非小盜也天下有釁鉏耰棘矜相率而剽奪者皆向之小盜也昔三代之聖王果斷而不疑誅除擊去無有遺類所以擁護良民而使安其居及至後世刑法日以深嚴而去姦之法乃不及於三代何者待其敗露自入於刑而後去也夫為惡而不入於刑者固已衆矣有終身為不義而其罪不可指名以附於法者有巧為規避持吏短長而不可詰者又有因緣幸會而免者如必待其自入於刑則其所去者蓋無幾耳昔周之制民有罪惡未麗於法而害於州里者桎梏而坐諸嘉石重罪役之期以次輕之其下罪三月役使州里任之然後宥而舍之其化之不從威之不格患苦其鄉之民而未入於五刑者謂之罷民凡罷民不使冠帶而加明刑任之以事而不齒於鄉黨由是觀之則周之盛時日夜整齊其人民而鋤去其不善譬如獵人終日馳驅踐蹂於草茆之中搜求伏兔而搏之不待其自投於網羅而後取也夫然故小惡不容於鄉大惡不容於國禮樂之所以易化而法禁之所以易行者由此之故也今天下久安天子以仁恕為心而士大夫一切以寬厚為稱上意而懦夫庸人又有所僥幸務出罪人外以邀雪寃之賞而內以待隂德之報臣是以知天下頗有不誅之姦將為子孫憂宜明敕天下之吏使以嵗時糾察凶民而徙其尤無良者不必待其自入於刑而間則命使出按郡縣有子不孝有弟不悌好訟而數犯法者皆誅無赦誅一鄉之姦則一鄉之人悅誅一國之姦則一國之人悅要以誅寡而悅衆則雖舜亦如此而已矣天下有三患而蠻夷之憂不與焉有內大臣之變有外諸侯之叛有匹夫羣起之禍此三者其勢常相持內大臣有權則外諸侯不叛外諸侯強則匹夫羣起之禍不作今者內無權臣外無強諸侯而萬世之後其或可憂者姦民也臣故曰去姦民以為安民之終云厚貨財者其别有二一曰省費用夫天下未嘗無財也昔周之興文王武王之國不過百里當其受命四方之君長交至於其廷軍旅四出以征伐不義之諸侯而未嘗患無財方此之時關市無征山澤不禁取於民者不過什一而財有餘及其衰也內食千里之租外收千八百國之貢而不足於用由此觀之夫財豈有多寡哉人君之於天下俯已以就人則易為功仰人以援已則難為力是故廣取以給用不如節用以廉取之為易也臣請得以小民之家而推之夫民方其窮困時所望不過十金之資計其衣食之費妻子之奉出入於十金之中寬然而有餘及其一旦稍稍畜聚衣食既足則心意之欲日以漸廣所入益衆而所欲益以不給不知罪其用之不節而以為求之未至也是以富而愈貪求愈多而財愈不供此其為惑未可以知其所終也盍亦反其始而思之夫嚮者豈能寒而不衣飢而不食乎今天下汲汲乎以財之不足為病何以過此國家創業之初四方割據中國之地至狹也然嵗嵗出師以誅討僭亂之國南取荆楚西平巴蜀而東下并潞其費用之衆又百倍於今可知也然天下之士未嘗思其始而惴惴焉患今世之不足則亦甚惑矣夫為國有三計有萬世之計有一時之計有不終月之計古者三年耕必有一年之蓄以三十年之通則可以九年無飢也嵗之所入足用而有餘是以九年之蓄常間而無用卒有水旱之變盜賊之憂則官可以自辦而民不知若此者天不能使之災地不能使之貧四夷盜賊不能使之困此萬世之計也而其不能者一嵗之入才足以為一嵗之出天下之産僅足以供天下之用其平居雖不至於虐取其民而有急則不免於厚賦故其國可靜而不可動可逸而不可勞此亦一時之計也至於最下而無謀者量出以為入用之不給則取之益多天下晏然無大患難而盡用衰世茍且之法不知有急則將何以加之此所謂不終月之計也今天下之利莫不盡取山陵林麓莫不有禁關有征市有租鹽鐵有𣙜酒有課茶有算則凡衰世茍且之法莫不盡用矣譬之於人其少壯之時豐健勇力然後可以望其無疾以至於夀考今未五六十而衰老之候具見而無遺若八九十者將何以待其後耶然天下之人方且窮思竭慮以廣求利之門且人而不急則以為費用不可復省使天下而無鹽鐵酒茗之稅將不為國乎臣有以知其不然也天下之費固有去之甚易而無損存之甚難而無益者矣臣不能盡知請舉其所聞而其餘可以類求焉夫無益之費名重而實輕以不急之實而被之以莫大之名是以疑而不敢去三嵗而郊郊而赦赦而賞此縣官有不得已者天下吏士數日而待賜此誠不可以卒去至於大吏所謂股肱耳目與縣官同其憂樂者此豈亦不得已而有所畏耶天子有七廟今又飾老佛之宫而為之祠固已過矣又使大臣以使領之嵗給以巨萬計此何為者也天下之吏為不少矣將患未得其人茍得其人則凡民之利莫不備舉而其患莫不盡去今河水為患不使濱河州郡之吏親行其災而責之以救災之術顧為都水監夫四方之水患豈其一人坐籌於京師而盡其利害天下有轉運使足矣今江淮之間又有發運祿賜之厚徒兵之衆其為費豈可勝計哉蓋嘗聞之里有畜馬者患牧人欺之而盜其芻菽也又使一人焉為之廄長廄長立而馬益癯今為政不求其本而唯治其末自是而推之天下無益之費不為不多矣臣以為凡若此者日求而去之自毫釐以往莫不有益惟無輕其毫釐而積之則天下庶乎少息也其二曰定軍制自三代之衰井田廢兵農異處兵不得休而為民民不得息肩而無事於兵者千有餘年而未有如今日之極者也三代之制不可復追矣至於漢唐猶有可得而言者夫兵無事而食則不可使聚聚則不可使無事而食此二者相勝而不可並行其勢然也今夫有百頃之間田則足以牧馬千駟而不知其費聚千駟之馬而輸百頃之芻則其費百倍此易曉也昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邊境有事諸侯有變皆以虎符調發郡國之兵至於事已而兵休則渙然各復其故是以其兵雖不知農而天下不至於弊者未嘗聚也唐有天下置十六衛府兵天下之府八百餘所而屯於關中者至有五百然皆無事則力耕而積榖不惟以自贍養而又有以廣縣官之儲是以兵雖聚於京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚於京畿三輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以兼受其弊而莫之分也天下之財近自淮甸而逺至於吳蜀凡舟車所至人力所及莫不盡取以歸於京師晏然無事而賦斂之厚至于不可復加而三司之用猶苦其不給其弊皆起於不耕之兵聚於內而食四方之貢賦非特如此而已又有循環往來屯戍於郡縣者昔建國之初所在分裂擁兵而不服太祖太宗躬擐甲胄力戰而取之既降其君而籍其疆土矣然其故基餘孽猶有存者上之人見天下之難合而恐其復發也於是出禁兵以戍之大自藩府而小至于縣鎮往往皆有京師之兵由此觀之則是天下之地一尺一寸皆天子自為守也而可以長久而不變乎費莫大於養兵養兵之費莫大於征行今出禁兵而戍郡縣逺者或數千里其月廩嵗給之外又日供其芻糧三嵗而一遷往者紛紛來者纍纍雖不過數百為􅒰而要其歸無以異於數十萬之兵三嵗而一出征也農夫之力安得不竭餽運之卒安得不疲且今天下未嘗有戰鬬之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息間居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而噪呼此何為者也天下一家且數十百年矣民之戴君至於海隅無以異於畿甸亦不必舉疑四方之兵而專信禁兵也曩者蜀之有均賊與近嵗貝州之亂未必非禁兵致之臣愚以為郡縣之土兵可以漸訓而隂奪其權則禁兵可以漸省而無用天下武健豈有常所哉山川之所習風氣之所咻四方之民一也昔者戰國嘗用之矣蜀人之怯懦吳人之短小皆嘗以抗衡於上國夫安得禁兵而用之今之土兵所以鈍弊劣弱而不振者彼見郡縣皆有禁兵而待之異等是以自棄於賤𨽻役夫之間而將吏亦莫之訓也茍禁兵漸省而以其資糧益優郡縣之土兵則彼固以歡欣踴躍出于意外戴上之恩而願效其力又何遽不如禁兵耶夫土兵日以多禁兵日以少天子扈從捍城之外無所復用如此則內無屯聚仰給之費而外無遷徙供億之勞費之省者又已過半矣訓兵旅者其别有三一曰蓄材用夫今之所患兵弱而不振者豈士卒寡少而不足使歟器械鈍弊而不足用歟抑為城郭不足守歟廪食不足給歟此數者皆非也然所以弱而不振則是無材用也夫國之有材譬如山澤之有猛獸江河之有蛟龍伏乎其中而威見乎其外悚然有所不可狎者至于鰍蚖之所蟠牂豚之所牧雖千仭之山百尋之溪而人易之何則其見於外者不可欺也天下之大不可謂無人朝廷之尊百官之富不可謂無材然以區區之二邊舉數州之衆以臨中國抗天子之威犯天下之怒而其氣未嘗少衰其詞未嘗少挫則是其心無所畏也主憂則臣辱主辱則臣死今朝廷之上不能無憂而大臣恬然未有拒絶之議非不欲絶也而未有以待之則是朝廷無所恃也緣邊之民西顧而戰栗牧馬之士不敢彎弓而北嚮吏士未戰而先期於敗則是民輕其上也外之蠻夷無所畏內之朝廷無所恃而民又自輕其上此猶足以為有人乎天下未嘗無才患所以求才之道不至古之聖人以無益之名而致天下之實以可見之實而較天下之虛名二者相為用而不可廢是故其始也天下莫不紛然奔走從事於其間而要之以其終不肖者無以欺其上此無他先名而後實也不先其名而唯實之求則來者寡來者寡則不可以有所擇以一旦之急而用不擇之人則是不先名之過也天子之所向天下之所奔也今夫孫吳之書其讀之者未必能戰也多言之士喜論兵者未必能用也進之以武舉而試之以騎射天下之竒才未必至也然將以求天下之實則非此三者不可以致以為未必至而棄之則是其必然者終不可得而見也往者西京之興其先也惟不以虛名多致天下之才而擇之以待一旦之用故其兵興之際四顧惶惑而不知所措於是設武舉購方略收勇悍之士而開猖狂之言不愛髙爵重賞以求強兵之術當此之時天下囂然莫不自以為知兵也來者日多而其言益以無據至於臨事終不可用執事之臣亦遂厭之而知其無益故兵休之日舉從而廢之今之論者以為武舉方略之類適足以開僥幸之門而天下之實才終不可以求得此二者皆過也夫既已用天下之虛名而不較之以實至其弊也又舉而廢其名使天下之士不復以兵術進亦已過矣天下之實才不可以求之於言語又不可以較之於武力獨見之於戰耳戰不可得而試也是故見之於治兵子玉治兵於蒍終日而畢鞭七人貫三人耳蒍賈觀之以為剛而無禮知其必敗孫武始見試以婦人而猶足以取信於闔閭使知其可用故凡欲觀將帥之才否莫如治兵之不可欺也今夫新募之兵驕而難令勇悍而不知戰此真足以觀天下之才也武舉方略之類以來之新兵以試之觀其顔色和易則足以見其氣約束堅明則足以見其威坐作進退各得其所則足以見其能凡此者皆不可強也故曰先之以無益之虛名而較之以可見之實庶乎可得而用也其二曰練軍實三代之兵不待擇而精其故何也兵出於農有常數而無常人國有事要以一家而備一正卒如斯而已矣是故老者得以養疾病者得以為間民而役於官者莫不皆其壯子弟故其無事而田獵則未嘗發老弱之民師行而餽糧則未嘗食無用之卒使之足輕險阻而手易器械聰明足以赴旗鼓之節強鋭足以犯死傷之地千乘之衆而人人足以自捍故殺人少而成功多費用省而兵卒強蓋春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其偏師而獵其遊卒斂兵而退未有僵尸百萬流血於江河如後世之戰者何也民各推其家之壯者以為兵則其勢不可得而多殺也及至後世兵民既分兵不得復而為民於是始有老弱之卒夫既已募民而為兵其妻子屋廬既已託於營伍之中其姓名既已書於官府之籍行不得為商居不得為農而仰食於官至於衰老而無歸則其道誠不可以棄去是故無用之卒雖薄其資糧而皆廩之終身凡民之生自二十以上至于衰老不過四十餘年之間勇鋭強力之氣足以犯堅冒刃者不過二十餘年今廪之終身則是一卒凡二十年無用而食於官也自此而推之養卒十萬則是五萬人可去也屯兵十年則是五年為無益之費也民者天下之本而財者民之所恃以生也有兵而不可使戰是謂棄財不可使戰而驅之戰是謂棄民臣觀秦漢之後天下何其殘敗之多耶其弊皆起於分民而為兵兵不得休使老弱不堪之卒拱手而就戮故有以百萬之衆而見屠於數千之兵者其良將善用不過以為餌委之啖賊嗟夫三代之衰民之無罪而死者其不可勝數矣今天下募兵至多往者陜西之役舉籍平民以為兵加以明道寶元之間天下旱蝗次及近嵗青齊之飢與河朔之水災民急而為兵者日以益衆舉籍而按之近世以來募兵之多無如今日者然皆老弱不教不能當古之十五而衣食之費百倍於古此甚非所以長久而不變者也凡民之為兵者其類多非良民方其少壯之時博奕飲酒不安於家而後能捐其身至其少衰而氣沮蓋亦有悔而不可復者矣臣以謂五十已上願復而為民者宜聽自今以往民之欲為兵者皆三十以下則收限以十年而除其籍民三十而為兵十年而復歸其精力思慮猶可以養生送死為終身之計使其應募之日心知其不出十年而為十年之計則除其籍而不怨以無用之兵終身坐食之費而為重募則應者必衆如此縣官長無老弱之兵而民之不任戰者不至於無罪而死彼皆知其不過十年而復為平民則自愛其身而重犯法不至於叫呼無賴以自棄於凶人今夫天下之患在於民不知兵故兵常驕悍而民常怯盜賊攻之而不能禦盜賊掠之而不能抗今使民得更代而為兵兵得復還而為民則天下之知兵者衆而盜賊之心將有所忌然獨有言者將以為十年而代故者已去而新者未教則緩急有所不濟夫所謂十年而代者豈舉軍而並去之有始至者有既久者有將去者有當代者新故雜居而教則緩急可以無憂矣其三曰倡勇敢臣聞戰以勇為主以氣為決天子無皆勇之將而將軍無皆勇之士是故致勇有術致勇莫先乎倡倡莫善乎私此二者兵之微權英雄豪傑之士所以隂用而不言於人而人亦莫之識也臣請得以備言之夫倡者何也氣之先也有人人之勇怯有三軍之勇怯人人而較之則勇怯之相去若莛與楹至於三軍之勇怯則一也出於反覆之間而差於毫釐之際故其權在將與君人固有暴猛獸而不操兵出入於白刃之中而色不變者有見虺蝪而却走聞鐘鼓之聲而戰栗者是勇怯之不齊至於如此然閭閻之小民爭鬬戲笑卒然之間而或至於殺人當其發也其心翻然其色勃然若不可以已者雖天下之大勇無以過之及其退而思其身顧其妻未始不惻然悔也此非必勇者也氣之所乘則奪其性而忘其故故古之善用兵者用其翻然勃然於未悔之間而其不善者沮其翻然勃然之心而開其自悔之意則是不戰而先自敗也故曰致勇有術致勇莫先乎倡均是人也皆食其食皆任其事天下有急而有一人焉奮而爭先而致其死則翻然者衆矣弓矢相及劍楯相交勝負之勢未有所決而三軍之士奮屬目於一夫之先登則勃然者相繼矣天下之大可以名劫也三軍之衆可以氣使也諺曰一人善射百夫決拾茍有以發之及其翻然勃然之間而用其鋒是之謂倡倡莫善乎私天下之人怯者居其百勇者居其一是勇者難得也捐其妻子棄其身以蹈白刃是勇者難能也以難得之人行難能之事此必有難報之恩者矣天子必有所私之將將軍必有所私之士視其勇者而隂厚之人之有異材者雖未有功而其心莫不自異自異而上不異之則緩急不可以望其為倡故凡緩急而肯為倡者必其上之所異也昔漢武帝欲觀兵於四夷以逞其無厭之求不愛通侯之賞以招勇士風告天下以求奮擊之人然卒無有應者於是嚴刑峻法致之死地而聽其以深入贖罪使勉強不得已之人馳驟於死生之地是故其將降其兵破敗而天下幾至於不測何者先無所異之人而望其為倡不已難乎私者天下之所惡也然而為已而私之則私不可用為其賢於人而私之則非私無以濟蓋有無功而可賞有罪而可赦者凡所以愧其心而責其為倡也天下之禍莫大於上作而下不應上作而下不應則上亦將窮而自止方西戎之叛也天子非不欲赫然誅之而將帥之臣謹守封略收視內顧莫有一人先奮而致命而士卒亦循循焉莫肯盡力不得已而出爭先而歸故西戎得以肆其倡狂而吾無以應則其勢不得不重賂而求和其患起於天子無同憂患之臣而將軍無心腹之士西師之休十有餘年矣用法益密而進人益艱賢者不見異勇者不見私天下務為奉法循令要以如式而止臣不知其緩急將誰為之倡哉䇿斷曰二邊為中國患至深逺也天下謀臣猛將豪傑之士欲有所逞於西北者久矣聞之兵法曰先為不可勝以待敵之可勝向者臣愚以為西北雖有可勝之形而中國未有不可勝之具故竊嘗以為可特設一官使獨任其責而執政之臣得以專治內事茍天下之弊莫不盡去紀綱修明食足而兵強百姓樂業知愛其君卓然有不可勝之備如此臣固將備論而極言之夫天下將興其積必有源天下將亡其發必有門聖人者唯知其門而塞之古之亡天下者四而天子無道不與焉蓋有以諸侯強逼而至於亡者周唐是也有以匹夫橫行而至於亡者秦是也有以大臣執權而至於亡者漢魏是也有以蠻夷內侵而至於亡者二晉是也使此七代之君皆能逆知其所由亡之門而塞之則至於今可以不廢惟其諱亡而不為之備或備之而不得其門故禍發而不救夫天子之勢蟠於天下而結於民心者甚厚故其亡也必有大隙焉而一日潰之其窺之甚難而取之甚密曠日持久然後可得而間蓋非有一日卒然不救之患也是故聖人必於其全盛之時而塞其所由亡之門蓋臣以為當今之患外之可畏者西北之國而內之可畏者天子之民也西北之國不足以為中國之大憂而其動也有以召內之禍內之民實執存亡之權而不能獨起其發也必將待外之變先之以他國而繼之以吾民臣之所謂可畏者有此而已昔者敵國之患起於多求而不供供者有倦而求者無厭以有倦待無厭而能久安於無事天下未嘗有也故夫二邊之患特有逺近耳而要以必至於戰敢問今之所以戰者何也其無乃出於倉卒而備於一時乎且夫兵不素定而出於一時當其危疑擾攘之間而吾不能自必則權在敵國權在敵國則吾欲戰不能欲休不可進不能戰而退不能休則其計將出於求和求和而自我則其所以為媾者必重軍旅之後而繼之以重媾則國用不足國用不足則加賦於民加賦而不已則凡暴取豪奪之法不得不施於今之世矣天下一動變生無方國之大憂將必在此蓋嘗聞之用兵有權權之所在其國乃勝是故國無大小兵無強弱有小國弱兵而見畏於天下者權在焉耳千鈞之牛制於三尺之童弭耳而下之曽不如狙猿之奮擲於山林此其故何也權在人也我欲則戰不欲則守戰則天下莫能支守則天下莫能窺昔者秦嘗用此矣開關出兵以攻諸侯則諸侯莫不願割地以求和諸侯割地而求和於秦秦人未嘗急於割地之利若不得已而後應故諸侯常欲和而秦常欲戰如此則權固在秦矣且秦非能強於天下之諸侯秦惟能自必而諸侯不能是以天下百變而卒歸於秦諸侯之利固在從也朝聞陳軫之説而合為從暮聞張儀之計而散為橫秦則不然橫人之欲為橫從人之欲為從皆使其自擇而審處之諸侯相顧而終莫能自必則權之在秦不亦宜乎向者寶元慶歷之間河西之役可以見矣其始也不得已而後戰其終也逆探其意而與之和又從而厚餽之惟恐其一日復戰也如此則賊常欲戰而我常欲和賊非能常戰也特持其欲戰之形以乘吾欲和之勢屢用而屢得志是以中國之大而權不在焉欲天下之安則莫若使權在中國欲權之在中國則莫若先發而後罷示之以不憚形之以好戰而後天下之權有所歸矣今夫庸人之論則曰勿為禍始古之英雄之君豈其樂禍而好殺唐太宗既平天下而又嵗嵗出師以從事於夷狄蓋晚而不倦暴露於千里之外親擊髙麗者再焉凡此者所以爭先而處強也當時羣臣不能深明其意以為敵國無釁而我則發之夫為國者使人備已則權在我而使已備人則權在人當太宗之時四夷狼顧以備中國故中國之權重茍不先之則彼或以執其權矣而我又鰓鰓焉惡戰而樂罷使敵國知吾之所忌而以是取必於吾如此則雖有天下吾安得而為之唐之衰也惟其厭兵而畏戰一有敗衄則兢兢焉縮首而去之是故姦臣執其權以要天子及至憲宗奮而不顧雖小挫而不為之沮當此之時天下之權在於朝廷伐之則足以為威舍之則足以為恩臣故曰先發而後罷則權在我矣臣聞用兵有可以逆為數十年之計者有朝不可以謀夕者攻守之方戰鬭之術一日百變猶以為拙若此者朝不可以謀夕者也古之欲謀人之國者必有一定之計勾踐之取吳秦之取諸侯髙祖之取項籍皆得其至計而固執之是以有利有不利有進有退百變而不同而其一定之計未始易也勾踐之取吳是驕之而已秦之取諸侯是散其從而已髙祖之取項籍是間踈其君臣而已此其至計不可易者雖百年可知也今天下晏然未有用兵之形而臣以為必至於戰則其攻守之方戰鬭之術固未可以豫論而臆斷也然至於用兵之大計所以固執而不變者臣請得以豫言之夫西邉北邉皆為中國之患而西邉之患小北邉之患大此天下之所明知也管仲曰攻堅則瑕者堅攻瑕則堅者瑕故二者皆所以為憂而臣以為兵之所加宜先於西故先論所以制御西戎之大略今夫鄒與魯戰則天下莫不以為魯勝大小之勢異也然而勢有所激則大者失其所以為大而小者忘其所以為小故有以鄒勝魯者矣夫大有所短小有所長地廣而備多備多而力分小國聚而大國分則強弱之勢將有所支大國之人譬如千金之子自重而多疑小國之人計窮而無所恃則致死而不顧是以小國常勇而大國常怯恃大而不戒則輕戰而屢敗知小而自畏則深謀而必克此又其理然也夫民之所以守戰至死而不去者以其君臣上下歡欣相得之際也國大則君尊而上下不交將軍貴而吏士不親法令繁而民無所措其手足若夫小國之民截然其若一家也有憂則相恤有急則相赴凡此數者則小國之所長而大國之所短也大國而不用其所長使小國常出於其所短雖百戰而百屈豈足怪哉且夫大國則固有所長矣長於戰而不長於守夫守者出於不足而已譬之於物大而不用則易以腐敗故凡擊搏進取所以用大也孫武之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之自敵以上者未嘗有不戰也自敵以上而不戰則是以有餘而用不足之計固已失其所長矣凡大國之所恃吾能分兵而彼不能分吾能數出而彼不能應譬如千金之家日出其財以罔市利而販夫小民終莫能與之競者非智不若其財少也是故販夫小民雖有桀黠之才過人之智而其勢不得不折而入於千金之家何則其所長者不可以與較也西戎之於中國可謂小國矣向者惟不用其所長是以聚兵連年終莫能服今欲用吾之所長則莫若數出數出莫若分兵臣之所謂分兵者非分此之謂也分其居者與行者而已今河西之戍卒惟患其多而莫之適用故其便莫若分兵使其十一而行則一嵗可以十出十二而行則一嵗可以五出十一而十出十二而五出則是一人而嵗一出也吾一嵗而一出彼一嵗而十被兵焉則衆寡之不侔勞逸之不敵亦已明矣夫用兵必出於敵人之所不能我大而敵小是故我能分而彼不能此吳之所以肄楚而隋之所以狃陳歟夫御戎之術不可以逆知其詳而其大略臣未見有過此者也其次請論北方之勢古者胸奴之衆不過漢一大縣然所以能敵之者其國無君臣上下朝覲會同之節其民無榖米絲麻耕作織紝之勞其法令以言語為約故無文書符傳之繁其居處以逐水草為常故無城郭邑居聚落守望之助其旃裘肉酪足以為養生送死之具故戰則人人自鬭敗則驅牛羊逺徙不可得而破蓋非獨古聖人法度之所不加亦其天性之所安者猶沐猴之不可使冠帶怒馬之不可以被羈紲也故中行説教單于無愛漢物所得繒絮皆以馳草棘中使衣袴弊裂以示不如旃裘之堅善也得漢食物皆去之以示不如湩酪之便美也由此觀之中國以法勝而胸奴以無法勝聖人知其然是故精修其法而謹守之築為城郭塹為溝池大倉廩實府庫明烽燧逺斥堠使民知金鼓進退坐作之節勝不相先敗不相棄此其所以謹守其法而不敢失也一失其法則不如無法之為便也故夫各輔其性而安其生則中國與敵本不能相犯惟其不然是故皆有以相制敵人之不可從中國之法猶中國之不可從敵人之無法也今夫佩玉服韍冕而垂旒者此宗廟之服所以登降揖讓折旋俯仰為容者也而不可以騎射今夫外域而用中國之法豈能盡如中國哉茍不能盡如中國而雜用其法則是佩玉服韍冕垂旒而欲以騎射也昔吳之先斷髮文身與魚鱉龍蛇居者數十世而諸侯不敢窺也其後楚申公巫臣始教以乘車射御使出兵侵楚而闔廬夫差又逞其無厭之求闕溝通水與齊晉爭強黃池之會強自冠帶吳人不勝其弊卒入於越夫吳之所以強者乃其所以亡也何者以異域之資而貪中國之美宜其可得而圖之哉西晉之亡也胸奴鮮卑氐羌之類紛紜於中國而其豪傑間起為之君長如劉元海苻堅石勒慕容俊之儔皆以絶異之姿驅駕一時之賢俊其強者至有天下太半然終於覆亡相繼逺者不過一傳再傳而滅何也其心固安於無法也而束縛於中國之法中國之人固安於法也而苦其無法君臣相戾上下相厭是以雖建都邑立宗廟而其心岌岌然常若寄居於其間而安能久乎且人而棄其所得於天之分未有不亡者也契丹自五代南侵乘石晉之亂奄至京邑覩中原之富麗廟社宫闕之壯而悅之知不可以留也故歸而竊習焉山前諸郡既為所并則中國士大夫有立其朝者矣故其朝廷之儀百官之號文武選舉之法都邑郡縣之制以至於衣服飲食皆雜取中國之象然其父子聚居貴壯而賤老貪得而忘失勝不相讓敗不相救者猶在也其中未能革其詭譎譸張之性而外牽於華人之法此其所以自投於陷穽網羅之中而中國之人猶曰今之胸奴非古也其措置規畫皆不與其時相似以為不可得而圖之亦過計矣且夫天下固有沈謀隂計之士也昔先王欲圖大事立竒功則非斯人莫之與共秦之尉繚漢之陳平皆以樽俎之間而制敵國之命此亦王者之心期以弭天下之禍而已彼契丹者有可乘之勢三而中國未之思焉則亦足惜矣臣觀其朝廷百官之衆而中國士大夫交錯於其間固亦有賢俊慷慨不屈之士而詬辱及於公卿鞭撲行於殿陛貴為將相而不免囚徒之恥宜其有惋憤鬱結而思變者特未有路耳凡此皆可以致其心雖不為吾用亦以間迹其君臣此由余之所以入秦也幽燕之地自古號多雄傑名於圖史者往往而是自宋之興所在賢俊雲合響應無有逺邇皆欲洗濯磨淬以觀上國之光而此一方獨陷於非類昔太宗皇帝親征幽州未克而班師聞之諜者曰幽州士民謀欲執其帥以城降者聞乘輿之還無不泣下且敵人以為諸郡之民非其族類故厚斂而虐使之則其思內附之心豈待深計哉此又足為之謀也使其上下相猜君民相疑然後可攻也語有之曰鼠不容穴銜窶藪也彼僣立四都分置守宰倉廩府庫莫不備具有一旦之急適足以自纍守之不能棄之不忍華夷雜居易以生變如此則中國之長足以有所施矣然非特如此而已也中國不能謹守其法彼慕中國之法而不能純用是以勝負相持而未有決也夫外域者以力攻以力守以力戰顧力不能則逃中國則不然其守以形其攻以勢其戰以氣故百戰而力有餘形者有所不守而敵人莫不忌也勢者有所不攻而敵人莫不備也氣者有所不戰而敵人莫不懾也茍去此三者而角之於力則中國固不敵矣尚何云乎惟國家留意其大者而為之計其小者臣未敢言焉軾又上奏曰書曰臨下以簡御衆以寬此百世不易之道也昔漢髙祖約法三章蕭何定律九篇而已至於文景刑措不用歷魏而晉條目滋章斷罪所用至二萬六千三百七十一條而姦益不勝民無所措手足唐及五代止用律令國初加以注疏情文備矣今編敕續降動若牛毛人之耳目所不能周思慮所不能照而法病矣臣愚謂當熟議而少寬之人主前旒蔽明黈纊塞聰耳目所及尚不能盡而況察人於耳目之外乎今御史六察專務鈎考簿書責發細微自三公九卿救過不暇夫詳於小必略於大其文密者其實必踈故近嵗以來水旱盜賊四方流亡邊鄙不寧皆不以責宰相而尚書諸曹文牘繁重窮日之力書紙尾不暇此皆苛察之過也不可以不變易曰理財正辭禁民為非曰義先王之理財也必斷之以正辭其辭正則其取之也義三代之君食租衣稅而已是以辭正而民服自漢以來鹽鐵酒茗之禁稱貸權易之利皆心知其非而冒行之故辭曲而民為盜今欲嚴刑妄賞以去盜不若損利以豫民衣食足而盜賊自止夫興利以聚財者人臣之利也非社稷之福省費以養財者社稷之福也非人臣之利何以言之民者國之本而刑者民之賊興利以聚財必先煩刑以賊民國本搖矣而言利之臣先受其賞近嵗宫室城池之役南蠻西夏之師車服器械之資略計其費不下五千萬緡求其所補卒亦安在若以此積糧則沿邊皆有九年之蓄西夷北邊望而不敢近矣趙充國有言湟中榖斛八錢吾謂糴三百萬斛羌人不敢動矣不待煩刑賊民邊鄙以安然為人臣之計則無功可賞故凡人臣欲興利而不欲省費者皆為身謀非為社稷計也人主不察乃以社稷之深憂而循人臣之私計豈不過甚矣哉厯代名臣奏議卷三十七
