body:
  text: 歷代名臣奏議卷一百二十四明楊士竒等撰禮樂喪禮山陵宋哲宗元祐三年八月翰林學士蘇軾上奏曰臣近准鈐轄教坊所關到秋燕致語等文字臣謹按春秋左氐傳曰昭公九年晉荀盈如齊卒於戲陽殯於絳未葬晉平公飲酒樂膳宰屠蒯趨入酌以飲工曰汝為君耳將司聰也辰在子卯謂之疾日君徹燕樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之汝弗聞而樂是不聰也公說徹樂又按昭公十五年晉荀躒如周葬穆后既葬除喪周景王以賔燕叔向譏之謂之樂憂夫晉平公之於荀盈蓋無服也周景王之於穆后蓋朞喪也無服者未葬而樂屠蒯譏之朞喪者已葬而燕叔向譏之書之史册至今以為非仁宗皇帝以宰相富弼母在殯為罷春燕傳之天下至今以為宜今魏王之喪未及卒哭而禮部太常寺皆以為天子絶朞不妨燕樂臣竊非之若絶朞可以燕樂則春秋何為譏晉平公周景王乎魏王之親孰與卿佐逺比荀盈近比富弼之母輕重亦有間矣魏王之葬既以隂陽拘忌别擇年月則當准禮以諸侯五月為葬期自今年十一月以前皆為未葬之月不當燕樂不可以權宜郊殯便同已葬也臣竊以陛下篤於仁孝必罷秋燕不待臣言但至今未奉㫖揮緣上件教坊致語等文字今合於燕前一月進呈臣既未敢撰亦不敢稽延伏乞詳酌如以為當罷只乞自陛下聖意施行更不降出臣文字臣忝備侍從叨陪講讀不欲使人以絲毫議及聖明故不敢不奏八年軾又狀奏曰臣伏見元祐五年秋頒條貫諸民庶之家祖父母父母老疾無人供侍子孫居喪者聽尊長自陳驗實婚娶右臣伏以人子居父母喪不得嫁娶人倫之正王道之本也孟子論禮色之輕重不以所重狥所輕喪三年為二十五月使嫁娶有二十五月之遲此色之輕者也釋喪而婚㑹鄰於禽犢此禮之重者也先王之政亦有適時從宜者矣然不立居喪嫁娶之法者所害大也近世始立女居父母及夫喪而貧乏不能自存並聽百日外嫁娶之法既已害禮傷教矣然猶或可以從權而冒行者以女弱不能自立恐有流落不虞之患也今又使男子為之此何義也哉男年至於可娶雖無兼侍亦足以養父母矣今使之釋喪而婚㑹是直使民以色廢禮耳豈不過甚矣哉春秋禮經記禮之變必曰自某人始使秉直筆者書曰男子居父母喪得娶妻自元祐始豈不為當世之病乎臣謹按此法本因卭州官吏妄有起請當時法官有失考論便為立法臣備位秩宗前日又因邇英進讀論及此事不敢不奏伏望聖慈特降指揮削去上條稍正禮俗元符三年哲宗崩徽宗即位詔山陵制度並如元豐七月十一日啓菆二十日靈駕發引八月八日葬永泰陵九月一日以升祔畢羣臣吉服如故事太常寺言太宗皇帝上繼太祖兄弟相及雖行易月之制實斬衰三年以重君臣之義公除已後庶事相稱具載國史今皇帝嗣位哲宗實承神考之世已用開寶故事為哲宗服衰重今神主已祔百官之服並用純吉皇帝服御宜如太平興國二年故事禮部言太平興國中宰臣薛居正表稱公除以來庶事相稱獨命徹樂誠未得宜即是公除後除不舉樂外釋衰從吉事理甚明今皇帝當御常服素紗展腳幞頭淡黃衫黑犀帶請下有司裁製宰臣請從禮官議乃詔候周期服吉時詔不由門下徑付有司給事中龔源言喪制乃朝廷大事今行不由門下是廢法也臣為君服斬衰三年古未嘗改且陛下前此議服禮官持兩可之論陛下既察見其奸其服遂正今乃不得已從之臣竊為陛下惜開寶時并汾未下兵革未弭祖宗櫛風沐雨之不暇其服制權宜一時非故事也源坐黜知南康軍於是詔依元降服喪三年之制徽宗時左正言任伯雨上言曰臣伏見持服人奉議郎李譓奪服除京西路轉運判官應副山陵此事雖小關於體者甚大臣為諫官不敢緘默竊以祖宗故事朝廷有大事邊鄙有大兵革將相大臣名德侍從乃有奪服者然亦不得已爾今山陵事務人人可辦臺省寺監豈無可用之才何至小官奪服以駭人耳目若四夷聞之豈不有乏才之恥古人謂天下之事多為不識事體之人壞之朝廷事體所宜愛惜臣伏願陛下追還成命下三省别差官髙宗時徽宗皇帝寧德皇后訃至朝廷用故事以日易月知永州胡寅上疏曰臣聞三年之喪自天子至於庶人一也古之聖帝明王躬率天下者明於父子之親君臣之義由堯舜逮漢初其道不變其間欲短喪者有之而聖人不許責宰我曰豫之不仁子生三年然後免於父母之懷豫也有三年之愛於其父母乎公孫丑欲使齊宣王為朞喪曰猶愈乎已孟子譬之紾其兄臂而徐徐云耳兄臂不可紾徐徐是亦紾也親喪不可短為朞是亦短也此皆聖賢大訓載在方冊以示後世者也及漢孝文自執謙德用日易月至今行之子以便身忘其親臣以便身忘其君心知其非而不肯改以臣觀之孝文固有罪矣孝景冒奉遺詔陷父於失禮自陷於不孝乃千古薄俗之首也自常禮言之猶且不可況變故特異如今日者又當如何恭惟大行太上皇帝大行寧德皇后䝉塵沙漠永訣不復實由尼堪是有不共戴天之讎考之於禮讐不復則服不除寢苫枕戈無時而終所以然者天下雖大萬事雖衆皆無以加於父子之恩君臣之義故也伏觀十二月二十五日聖㫖沿國朝故典以日易月臣竊以為非矣自常禮言之猶須大行有遺詔然後遵承今也大行詔音不聞而陛下降㫖行之是以日易月出陛下意也大行幽厄之中服御飲食人所不堪疾病粥藥必無供億崩殂之後衣衾斂藏豈得周偹正棺卜兆知在何所茫茫沙漠瞻守為誰伏惟陛下一念及此荼毒摧割倍難堪忍推原本因皆自尼堪怨讐之切切於聖情情動於中必形於外苴麻之服其可二十七日而遂釋乎縱未能遵春秋復讐之義俟讎殄而後除服猶當革漢景之薄喪紀以三年為斷不然以終身不可除之服二十七日而除之是薄之中又加薄焉必非聖心之所安也昔滕定公薨滕文公欲行三年喪問於孟子孟子曰親喪固所自盡也自盡者言已之親已當竭其哀痛非他人所能止也滕文公用其言曰是誠在我至今美之未聞以為過也晉武帝為文帝服喪雖從權除服而猶素冠蔬食如居喪者羊祜欲請帝遂服三年裴秀傅元難於復古且以君服不除而臣下除之是有父子無君臣也其議遂止當時未有以孟子之言曉之者然武帝至孝感慕遂以蔬素終三年故司馬光曰漢文師心不學變古壞禮後世帝王不能篤於哀戚之情而羣臣諂諛莫肯釐正晉武以天性矯而行之可謂不世之賢君而裴傅庸臣習常玩故不能將順其美惜哉夫有父之親有君之尊服莫重焉豈為難於復古與臣下不行而自廢人子所當為之大事乎方滕之百官皆不欲也文公猶以為疑孟子曰上有好者如風下之從者如草啜粥面深墨即位而哭百官莫敢不哀者以身先之故也文公篤信而力行顔色戚哭泣哀於是時四方來弔者皆恱其得禮何則舉措合於人之良心良心不可滅故也今在陛下斷之於心身自行之裴秀傅元之言曽何足恤乎陛下違離大行十有一年雞鳴問寢以天下養既不足以當大事矣獨有三年之服少稱孝思尚可自勉耳夫中國所以異於外國以有父子君臣也陛下一舉而恩義皆盡外國有人焉豈不心服乎吳王夫差每出必使人謂己曰汝忘越王之殺汝父乎則對曰唯不敢忘陛下衰服在躬痛苦隨之甚於夫差外國有人焉豈不知畏乎雖宅憂三祀而軍旅之事皆當決於聖裁則諒暗之典有不可舉蓋非枕塊無聞之日是乃枕戈有事之辰故魯侯有周公之喪而徐夷並興東郊不開則以墨衰即戎孔子取其誓命後世晉王克用薨梁兵壓境莊宗決勝於夾寨周太祖殂契丹入冦世宗接戰於髙平古今莫不以為孝今六師戒嚴誓將北討萬幾之衆孰非軍旅陛下聽斷平決得禮之變卒哭之後以墨縗臨朝合於孔子所取其可行無疑也武夫悍卒介胄之久不無倦心獨可以至恩大義感動而使之前日詔書令大將偏稗發哀成服識者無不稱善此乃漢祖為義帝縞素之節得馭軍之本制勝之大幾矣陛下更以身率之深有以感動於人仁者為此增思慕大行之心智者為此畫報讐雪恥之䇿勇者為此奮百死無一還之氣天下匹夫匹婦皆可率而效命於龍荒之外自古所謂君臣之義父子之恩悉歸於陛下巍然為萬世帝王之師不亦善乎昔子思之論喪禮也曰必誠必信勿有悔焉蓋人子之喪親非可再為者也今日行禮一有未盡是為不誠不信他日追悔尚何及耶喪居三年雖若久矣自孝子當之若白駒之過隙惟恐日月之逝也亦何久之有如合聖意便乞直降詔㫖云恭惟太上皇帝寧德皇后誕育眇躬大恩難報欲酬罔極百未一伸鑾輿逺征遂至大故訃音初至痛貫五情想慕慈顔杳不復見怨讐有在朕敢忘之雖軍國多虞難以諒暗然衰麻枕戈非異人任以日易月情所不安興自朕躬服喪三年即戎衣墨況有權制布告中外昭示至懷其合行典禮令有司集議來上如敢沮格是使朕為人子而忘孝之道當以大不恭論其罪陛下親御翰墨自中降出一新四方耳目以化天下天地神明亦必佑助臣不勝大願臣雖守外郡不當論事然職列禁嚴獻納論思均有責焉且其所述皆前聖賢之論非出私意陛下學問髙明孝思深切遭此大變振古所無雖貴為天子富有天下由舜而論僅同敝屣夫何足以解憂者必將有取於此言是以不敢緘默謹昧萬死薦之聰聽張浚論終行喪禮事曰臣昨日伏䝉聖慈特遣中使宣諭欲終行喪禮且緩聽政之期仰惟聖情哀慕大孝格天凡在臣子孰不感涕臣竊惟天子之孝與士庶不同必也仰思所以承宗廟奉社稷若規規然以堅守孝節為事顧何以副委託之重哉今日之事利害所繫則又有大於此者梓宫未返天下塗炭至讐深恥亘古所無陛下揮涕而起斂髮而趨一怒而安天下之民臣猶以為晚也至若易月之制聽政之期臣嘗考之故事揆以人情皆為得中伏望聖慈痛自抑損早賜矜從臣不勝至願浚又論易月之制曰臣竊惟陛下至孝之性出於天成思養親之弗及痛梓宫之在逺雖躬行終身之喪臣知其猶未稱陛下孝思之深也惟是易月之制若聖慈堅欲不允則出而勞師臨戎訓閲士卒皆為非禮陛下固當不得已以徇羣臣之請獨異時視朝之服比故事更令淡白仍寬其制多以疏厚之帛為之供帳服用並去采飾悉從朴素以示天下追慕痛念之意蓋太上皇帝在位二十六年天下䝉被厚澤今不幸而崩於沙漠之北故天下之責望於陛下也深陛下勉從羣請止以軍旅多事思所以雪大恥圖恢復安宗廟救百姓而身行於宫中者喪禮如制可以感格天心可以俯慰人望臣纍被聖訓知聖心之所以自處者於孝道已盡尚慮陛下疑易月為非制故不憚煩瀆上浼宸聽伏幸裁覽時徽宗未祔廟太常少卿吳表臣奏行明堂之祭翰林學士朱震因言王制喪三年不祭惟天地社稷為越紼而行事春秋書夏五月乙酉吉禘於莊公公羊傳曰譏始不三年也國朝景德二年真宗居明德皇后喪既易月而除服明年遂享太廟合祀天地於圜丘當時未行三年之喪專行以日易月之制可也在今日行之則非也章誼乞從隆祐太后遺誥服朞制奏曰臣等伏覩四月十四日大行隆祐皇太后遺誥方時艱難合行禮儀難以備舉皇帝服朞以日易月仍不候除服聽朝御政又奉四月十五日手詔朕以繼體之重當從重服以稱孝思之意臣等恭讀大行皇太后遺誥則謙慈之心周密之慮固已合於禮經宜於時事有司訓典未易改易陛下追崇恩禮務極孝誠尚以朞制為輕洊降重服之詔雖改薄從重將以風勵四方實為盛德之事然捨輕從重校之先王禮儀有紊隆殺之節大行隆祐皇太后遺誥服朞之制已應禮典伏望皇帝陛下少抑聖情俯就中制以為天下後世之訓誼又奏曰臣伏覩大行隆祐皇太后遺誥皇帝不候除服御朝聽政勿以吾故妨廢軍國事務臣等有以見皇太后丁寧諄復之意為備盡矣陛下聖性自天朝夕追悼未即臨朝頗妨萬微於兹纍日軍書邊瑣有合條達國是民言或須奏稟今以仁孝之至情而忘天下之大計恐無以厭四海望治之心奉太母遺世之訓伏冀皇帝陛下體宗廟付託之重念生靈仰戴之誠少寬聖心勉稽禮典以日易月既已克用舊章則聽政御朝亦乞俯從輿望庶幾遵奉徽音亟臻至治臣不勝懇切之至誼又乞議定􅓖宫禮物節省給賜浮費奏曰臣竊見朝廷近差總護橋道頓遞二使又差按行使夫監領修奉等官所以營奉大行隆祐皇太后􅑼宫之禮無不具盡有以見皇帝陛下仁孝之誠情文相稱厚物偹官以伸大報實至德也臣伏見陛下祇率羣臣日臨服次舉音哀慟感泣左右則孝愛之情著矣至於亟下詔音欲從重服罷朝踰旬未忍聽政則追奉之禮嚴矣又復布惠澤於寰區寬繫囚於囹圄則四海九州恩施之報溥矣唯是河洛阻修陵邑未啓是以修奉􅑼宫權殯近甸凡可以衛護梓宫之禮慰安仙聖之靈者固宜嚴敕有司不可闕矣若比之列聖皇太后園陵之禮工役之大財費之廣道路之遙兵衛之設固當備於異時遷奉之日不容一朝盡舉而豫行也臣伏讀大行隆祐皇太后遺誥以謂方時艱難合行禮儀難以備舉則國母所以諄諭聖主者固已昭然矣其在臣工亦宜仰體至懷協承美意然臣觀纍日以來有司以公用支費為名所取銀絹緍錢之數已不可勝計臣竊恐護喪執事之人不知他時遷奉之費便欲扳援故事干冒請給蠧耗國用朝廷財力所不能辦無益孝思有纍大業也臣聞有司以今年季秋明堂蕆事禮大用廣經營未就若今日浮費不節則將來用度不繼減損則兵必怨聚斂則民不堪有一於此則不足以安宗廟定社稷非為孝治之本也臣伏望陛下明詔大臣議定禮典應於􅑼宫祇奉禮物悉從崇厚自餘給賜浮費悉行減薄庶遵先后慈儉之訓仰稱陛下追奉之誠不勝幸甚誼又乞減罷總護頓遞二使給賜奏曰臣近曽奏稟乞明詔大臣議定大行隆祐皇太后􅑼宫應于禮典悉從崇厚自餘給賜浮費悉行減罷庶遵先后慈儉之訓仰稱陛下追奉之誠未䝉施行今來忽奉聖㫖總護頓遞使受敕并了畢各支賜銀絹四百匹兩詔音初降中外駭聞不知二使所受何名而得此也若謂省記園陵故事耶則今太母􅑼宫未可以比昔時之園陵蓋亦明矣園陵乃在京師數百里之外其山川之險則有過關越澗之虞其日月之賖則有風雨泥淖之阻其道路之遙則有次舍暴露之勞其徒役之衆則有周防彈壓之慮至於宫嬪從衛之多服飾齎送之厚朝昏獻享之儀啓􅑼復土之節皆祇勤夙夜殫極思慮然後僅以集事當是之時朝廷閔勞大臣勸誘羣𨽻隨其等級勞賚匪頒則庸或有之然亦未聞如此之厚也今􅑼宫去城數十里之近方之園寢每事不同實任其勞者浙部漕臣越州守令與夫一行兵民而已總護橋道頓遞二使不過受其成事指喻官屬而已領事之初固已支請錢糧寄造酒醴以為公用犒設之資日增食錢别給驛劵以益官吏廩給之費種種備厚蓋不乏矣今乃援園陵之例冒金帛之多無名而受受而不辭忘亷遜之風開茍得之路豈樞機侍從之臣所宜為哉總護橋道二使既已冒受則按行修奉之官提舉幹辦之屬亦將引領視俲希望無已朝廷將何以給之誠使廣費多用而有益於􅑼宫祇奉之禮則臣不復敢論唯其無補孝誠而徒費帑藏在臣不得而不言也况今鄰敵未賔盜賊未息江淮招討一司淮南安撫一使擒冦捕虜糧餉不資朝廷日夕經畫尚慮不繼而又明堂大禮近在秋杪財費未充民力已困臣子於此不能效力乃復冒受茍得亦何心哉伏望睿明照察特罷二使給賜指揮以塞臣下貪婪之欲俾遵太母慈儉之戒以隆陛下經國之本天下幸甚光宗時知閣門事趙汝愚奏請車駕過宫執喪成禮疏曰臣等謹瀝血投誠仰告陛下邦國不幸大行夀皇聖帝奄棄羣臣臣等不任哀痛昨早後殿奏事陛下面許臣等只候審問關禮等子細即便過宫玉音甚確臣等退就祥曦殿門外等候久之未有處分臣等哀情迫切相繼屢有文字控請及繳進慈福夀聖皇太后御札令臣等遂請車駕過宫雖䝉奏知畫降御寶付外亦未聞鑾駕之出至日景過午又緣大暑大行梓宫不可遲緩臣等不得已先詣重華哭臨宣布遺誥了當雖賴陛下威靈一夕內外幸而無事然自古及今未有聞父喪而不奔赴者今陛下聖德愈虧人情愈怨縱禍亂未作臣等竊為陛下危之臣等伏惟大行皇帝已擇用此月十一日小斂十三日大斂成服陛下若不及此時速往執喪成禮少用人子之情不知何時而遂可往耶陛下既失此時而不往則陛下將終不成服乎陛下既有父之喪而終不成服不審將服何服而視朝以見羣臣乎故事成服聽政御殿皆有節次今禮節盡廢不審陛下將用何日復視朝乎縱陛下一切不問不審北使將來弔祭陛下亦可堅辭固拒而不出乎陛下若預思北使之來不可不往受弔祭則今日之奔赴亦何可緩也臣等受恩深重義當圖報深見今日利害如在目前不避死亡仰瀆天聽伏望聖明特賜詳覽速降指揮來日絶早過宫以成小斂之禮猶可以少慰人情少紓禍亂臣不任哀切懇請之至汝愚又奏曰臣等屢乞宣對面陳悃愊又繼入文字陳說利害而天聽髙邈殆如不聞今有司卜用十三日大斂成服陛下若失此時不出則是永無可出之時矣遺詔皇帝成服三日聽政今陛下既未成服不知何時遂可聽政耶禮法蕩然紀綱盡壞開闢以來所未嘗有臣等適備員輔近痛心疾首無地自容兩日以來市井之間興訛造謗無所不有千怪萬狀不可聽聞臣等一身不敢愛死所可恨者太祖太宗創業艱難髙宗中興十年百戰今勢纍卵誠可痛爾伏望聖明早賜開寤速降指揮來日過重華宫大斂成服庶幾可以收拾人心少延國祚若更失此機㑹則陛下之事去矣臣等䝉國厚恩不避誅戮控瀝血誠冒瀆威聽不任哀號隕越之至寧宗開禧三年成肅皇后夏氏崩殯於永阜陵正北吏部尚書陸峻言伏覩列聖在御間有諸后上仙緣無山陵可祔是致别葬若上仙在山陵已卜之後無有不從葬者其他諸后葬在山陵之前神靈既安並不遷祔惟元德章懿二后方其葬時名立未正續行追冊其成穆皇后孝宗登極即行追冊改殯所為攢宫典禮已備與元德章懿事體不同所以更不遷祔竊稽前件典禮秖緣喪有前後勢所當然其於禮意却無隆殺今來從葬阜陵為合典故從之寧宗時待制侍講朱熹乞討論喪服劄子曰臣聞三年之喪齊疏之服飦粥之食自天子逹於庶人無貴賤之殊而禮經敕令子為父嫡孫承重為祖父皆斬衰三年蓋嫡子當為父後以承大宗之重而不能襲位以執喪則嫡孫繼統而代之執喪義當然也然自漢文短喪之後歷代因之天子遂無三年之喪為父且然則嫡孫承重從可知己人紀廢壞三綱不明千有餘年莫能釐正及我大行至尊夀皇聖帝至性自天孝誠內發易月之外猶執通喪朝衣朝冠皆以大布超越千古拘攣牽制之弊革去百王衰陋卑薄之風甚盛德也所宜著在方冊為世法程子孫守之永永無斁而間者遺誥初頒太上皇帝偶違康豫不能躬就喪次陛下實以世嫡之重仰承大統則所謂承重之服著在禮律所宜一遵夀皇已行之法易月之外且以布衣布冠視朝聽政以代太上皇帝躬執三年之喪而一時倉卒不及詳議遂用漆紗淺黃之服不惟上違禮律無以風示天下且將使夀皇已革之弊去而復留已行之禮舉而復墜臣愚不肖誠竊痛之然既往之失不及追改唯有將來啓殯發引禮當復用初喪之服則其變除之節尚有可議欲望陛下仰體夀皇聖孝成法明詔禮官稽考禮律預行指定其官吏軍民男女方喪之禮亦宜稍為之制勿使過為華靡布告郡國咸使聞知庶幾漸復古制而四海之衆有以著於君臣之義實天下萬世之幸理宗淳祐間侍左郎官徐元杰上奏曰臣昔事先師文忠公真德秀時嘗語臣曰君臣交際之禮惟拳拳納忠不至於詆訐則得告上之體臣佩服師說惟守朴忠不敢孤陛下選擇之恩臣私竊自念戊戌告歸分甘山林抗疏而辭謝陛下恩除者屢矣去冬被命循牆弗俞深惟君臣之義所不容廢故勇於一來嘗私謝大臣曰盡事天之敬而事君推報國之忱而報德是臣之所以不負陛下者即所以不負大臣也故圗報大臣者在於隨事納忠不在於承意順㫖況陛下廣諫諍之路恢容受之量事適有所當言可以寓愛助而存天理其忍緘默不以顯告陛下哉臣前日晉侍經筵親承聖問以大臣史嵩之起復之事三學上書卿曽見否臣奏雖聞有書未之見也竊窺聖意豫憂邊事故有此命臣又嘗妄奏陛下出命太早所以啓人之疑然人言不可沮抑且須靜以處之陛下自盡陛下之禮大臣自盡大臣之禮玉音曰俞臣又何所容喙及見學校之書使人痛哭流涕感嘆拂膺何士論之不少恕也大臣讀聖賢之書畏天命畏人言前此雷變之頃觀其纍疏避位諄切及於雙親喜懼之年今家庭之變哀戚終事禮制有常臣竊料其何至於忽送死之大事輕出以犯清議哉臣聞大臣年十四五時憤托胄之權奸建白諸父請密圗之此父在觀其志自少時已知有大義今父沒觀其行大倫所在果何待士論而後知前日昕庭出命之易士論所以凛凛者實以陛下為四海億兆萬姓綱常之主大臣身任道揆扶翊綱常者也孝經曰天子有爭臣七人雖無道不失其天下况有道之世市議道謗其可咈哉天地間惟道理最大人言之所以必爭者顧惜此耳昔孟子謂壯者以暇日修其孝弟忠信可撻秦楚之堅甲利兵至論敵國外患之有無則以為吾國存亡之所係然則外患非所當警內治要審所先有天保以上諸詩之本領則采薇以下諸詩之事功特舉而措之耳數十年來人皆忽此只於末上理㑹所以力勞而效寡視儒生正論為迂濶君子愛人以德今當保惜一代之臣而成就三年之禮國事所最急者元台重任夷夏觀瞻三省綱維靡容渙散陛下如以宗社生靈為念以綱紀法度為心必咨於大臣曰當今內外執政法從之臣孰為有才孰為有德孰可舉以自代參酌輿論而後爰立舉之得人則四海九州受大臣之賜即大臣之在任也聖德髙明靜觀事勢如以邊境為可慮則遣使就問計可也如以備禦貴講求則使之預料便宜一一圗上可也將帥牧御之才錢榖甲兵之事姑仍舊貫而經理之亦可也如此則大臣於家庭無虧缺於朝廷有勳勞富鄭公弼五疏而終辭起復之命者又豈容以專美哉夫世道未嘗狹也大臣積慶之家也前者有餘而不盡用後者愈用而不勝窮鄭國彌忠修齡巨福生榮死哀命圭公衮使節侯封人知詫千載一時之盛而不知其早嵗清修平生恬淡翕者張之天報如此今大臣福祿聲光鮮克儷美又何缺焉不惟陛下當愛惜之而大臣亦當自愛惜之端憂几筵勿過哀毁其於讀禮之次無非閲理之時仰探千古之聖賢將大後來之勳業正於此基之夫欲富好貴人之常情不以其道則君子有所不處建功立業君子之盛心志於道義則功業有所不足道況道義有所未安而過眼空花之富貴自昔滓汚簡冊熏穢宇宙者不知其幾逹人大觀之幾自了凡物皆朽惟名義為不朽今京城之內人心皇皇士論籍籍自聞大臣有起復之命雖未知其避就之何如凡有父母之心莫不失聲涕零是果何為而然人心天理誰實為之興言及此非可使聞於敵人也陛下烏得而不悔悟大臣烏得而不堅忍臣兹因輪對僭瀝血忱懇懇納忠何敢詆訐特為陛下愛惜民彛為大臣愛惜名節所以望大臣者不止於今日知臣罪臣天地鬼神昭布森列不可誣也臣以經筵既承清問輒又出位言此不當更塵班綴伏乞陛下奮發神斷罷臣職任畀臣叢祠臣謹退而閉門掃却以俟陛下誅斥之命臣罪當萬死山陵漢文帝時張釋之為中郎將從帝行至霸陵上居外臨廁厠岸之邉側也時慎夫人從上指視慎夫人新豐道曰此走邯鄲道也走音奏趨也使慎夫人鼓瑟上自倚瑟而歌意悽慘悲懷顧謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉斫音側略反左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中無可欲雖亡石槨又何戚焉文帝稱善成帝永始元年營起昌陵解萬年自詭昌陵三年可成卒不能就羣臣多言其不便者下有司議皆曰昌陵因卑為髙度便房猶在平地上客土之中淺外不固卒徒萬數然脂夜作取土東山與榖同賈故陵因天性據真土處勢髙敞旁近祖考前又已有十年功緒宜還復故陵勿徙民便詔曰朕執德不固謀不盡下過聽萬年言昌陵三年可成作治五年天下虛耗百姓罷勞客土疏惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵反故陵勿徙吏民令天下毋有動搖之心帝營起昌陵數年不成復還歸延陵制度泰奢光祿大夫劉向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故聖賢之君博觀終始窮極事情而是非分明王者必通三統明天命所授者傳非獨一姓也孔子論詩至於殷士膚敏祼將於京喟然歎曰大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉萌與氓同無知之兒蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效效謂徴驗也故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨廁廁側近水也一說霸陵山北頭廁近霸水帝登其上以望逺也意悽愴悲懷顧謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹厚衣之以薪言積薪以覆之也衣音於既反後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟隂丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬㑹稽不改其列不改樹木百物之列也殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宫祈年館下樗里子葬於武庫皆無丘隴之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳墓謂壙穴也墳謂積土也曰丘東西南北人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其髙可隱隱於靳反謂人立可隱肘也而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相吕不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭莊襄五王皆大作邱隴多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇三墳其髙五十餘丈周回五百餘里石椁為遊館人膏為燈燭水銀為江海黃金為鳬雁珍寶之藏機械之變作機發木人之屬盡其巧變也令匠作機弩矢有所穿也輒射之棺槨之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣周章陳勝之將項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿鑿謂所穿冡臧者音在到反牧者持火照求羊失火燒其藏椁自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧豎之禍離遭也豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚邱隴彌髙宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也及魯莊公刻飾宗廟多築臺囿後嗣再絶謂子般閔公皆殺死也春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙埤下也音婢積土為山發民墳墓積以萬數營起邑居期日迫卒卒讀曰猝功費大萬百餘大萬億也大巨也死者恨於下生者愁於上怨氣感動隂陽因之以饑饉物故流離以十萬數物故謂死也流離謂亡其居處也臣甚惛焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不說以示衆庶則苦之若茍以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏逹蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈此方丘壠說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之橅宜從公卿大臣之議橅音規摹之摹以息衆庶書奏上甚感向言而不能從其計東漢光武建武二十六年春正月初作夀陵將作大匠竇融上言園陵廣袤無慮所用帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉今所制地不過二三頃無為山陵陂池裁令流水而已章帝欲為原陵顯節陵起縣邑東平王蒼聞之遽上疏諫曰伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問涅陽主疾古姓涅陽主光武女竇固之妻也使還乃知詔書已下竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝明皇帝大孝無違奉承貫行貫行謂一皆遵奉也至於自所營創尤為儉省謙德之美於斯為盛臣愚以園邑之興始自彊秦古者邱隴且不欲其著明古者墓而不墳故言不欲其著明豈況築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動搖百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修邱墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以纍聖心臣蒼誠傷二帝純德之美不暢於無窮也惟䝉哀覽帝從而止靈帝熹平元年竇太后崩宦者積怨竇氏曹節王甫欲用貴人禮殯帝不可於是發喪成禮節等欲别葬太后而以馮貴人配祔詔公卿大㑹朝堂令中常侍趙忠監議太尉李咸時病扶輿而起搗椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者瞻望中官莫肯先言廷尉陳球曰皇太后以盛德良家母臨天下遭時不造援立聖明因遇大獄遷居空宫家雖獲罪事非太后今若别葬誠失天下之望且馮貴人無功於國何宜上配至尊李咸曰臣本謂宜爾誠與意合於是公卿以下皆從球議節甫猶爭之咸復上疏曰章德虐害恭懷安思家犯惡逆而和帝無異葬之議順朝無貶降之文今長樂尊號在身親嘗稱制援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝從之普愍帝時三秦人尹桓解武等數千家盜發漢霸杜二陵多獲珍寶帝問驃騎大將軍索綝曰漢陵中物何乃多耶綝對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一供賔客一充山陵漢武帝享年久長比崩而茂陵不復容物其樹皆已可拱赤眉取陵中物不能減半於今猶有朽帛委積珠玉未盡此二陵是儉者耳亦百世之誡也東晉哀帝即位初穆帝山陵將用寶器太常江逌諫曰以宣王顧命終制山陵不設明器以貽後則景帝奉遵遺制逮文明皇后崩武皇帝亦承前制無所施設惟脯糒之奠瓦器而已昔康皇帝𤣥宫始用寶劔金舄此蓋太妃罔己之情實違先㫖纍世之法今外欲以為故事臣請述先㫖停此二物書奏從之隋文帝時獻皇后崩上令蕭吉卜擇葬所吉歷筮山原至處云卜年二千卜世二百具圗而奏之上曰吉凶由人不在於地髙緯父葬豈不卜乎國尋滅亡正如我家墓田若不吉朕不當為天子若云不凶我弟不當戰沒然竟從吉言吉表曰去月十六日皇后山陵西北雞未鳴前有黑雲方圎五六百步從地屬天東南又有旌旗車馬帳幕布滿七八里并有人往來檢校部伍甚整日出乃滅同見者十餘人謹按葬書云氣王與姓相生大吉今黑氣南東王與姓相生是大吉利子孫無疆之候也上大悅唐髙祖崩太宗詔山陵一準漢長陵故事厚送終禮虞世南上書曰臣聞古之聖帝明王所以薄葬者非不欲崇髙光飾珍寶具物以厚其親然審而言之髙墳厚隴珍物畢備此適所以為親之纍非曰孝也是以深思逺慮安於菲薄以為長久萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諌大夫劉向上書其言深切皆合事理其略曰孝文居霸陵悽愴悲懷顧謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興釋之所言無窮計也孝文寤焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝歷年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為夀陵作終制其略曰昔堯葬夀陵因山為體無封無樹無立寢殿園邑為棺槨足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金銀銅鐵一以瓦器自古及今未有不亡之國無不掘之墓長亂以來漢氏諸陵無不發掘至及燒取玉匣金縷骸骨并盡乃不重痛哉若違詔妄有變改吾為戮尸於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文此制可謂逹於事矣向使陛下德止如秦漢之君臣則緘口而已不敢有言伏見聖德髙逺堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以猶戚戚也今為邱隴如此其內雖不藏珍寶亦無益也萬代之後但見髙墳大墓豈謂無金玉也臣之愚計以為漢文霸陵既因山勢雖不起墳自然髙廣今之所卜地勢即平不可不起宜依白武通所陳周制為三仭之墳其方中制度事事減少事畢之日刻石於陵側明邱封大小髙下之式明器所須皆以瓦木合於文帝不得用金銀銅鐵使萬代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日已依霸陵今為隴又以長陵為法非所宜也伏願陛下深覽古今為長久之慮臣之赤心唯願萬嵗之後神道常安陛下孝名揚於無窮耳書奏不報世南又上疏曰漢家即位之初便營陵墓近者十餘嵗逺者五十年方始成就今以數月之間而造數十年之事其於人力亦以勞矣又漢家大郡都五十萬戶即日人衆未及往時而工役與之一等此臣所以致疑也太宗詔有司議獻陵制度房𤣥齡等曰漢長陵髙九丈原陵髙六丈今九丈則太崇三仭則太卑請依原陵之制從之貞觀十年長孫皇后崩上念后不已於苑中作層觀以望昭陵嘗引魏徴同登使觀之徴熟視之曰臣昏眊不見上指示之徴曰臣以為陛下望獻陵若昭陵則臣固見之矣上為之毁觀中宗神龍元年將以太后合葬乾陵給事中嚴善思上疏曰神明之道體尚幽𤣥今欲啓之恐致驚黷況合葬非古宜於陵旁更擇吉地不從代宗大歷十年獨孤皇后崩上悼痛詔近城為陵以朝夕臨望右補闕姚南仲上疏曰臣聞人臣宅於家帝王宅於國長安乃祖宗所宅其可興鑿建陵其側乎夫葬者藏也欲人之不得見也今西近宫闕南迫大道使近而可視歿而復生雖宫以待之可也如令骨肉歸土魂無不之雖欲自近了復何益且王者必據髙明燭幽隱先皇所以因龍首而建望春也今起陵目前心一感傷纍日不能平且匹夫向隅滿堂不樂况萬乘乎天下謂何陛下諡后以貞懿而終以䙝近臣竊惑焉今國人皆曰后陵在邇陛下將日省而時望焉斯有損聖德無益先后欲寵反辱惟陛下熟計疏奏帝嘉納進五品階以酬讜言德宗立詔元陵制度務極優厚當竭帑藏奉用度刑部員外郎令狐峘諫曰臣伏讀漢劉向論山陵之誡良使咨欷何者聖賢勤儉不作無益昔舜葬蒼梧弗變其肆禹葬㑹稽不改其列周武葬畢陌無丘壠處漢文葬霸陵不起山墳禹非不忠啓非不順周公非不悌景帝非不孝其奉君親皆以儉觳為無窮計宋文公厚葬春秋書華元為不臣桓魋為石槨夫子以為不如速朽由是觀之有德者葬薄無德者葬厚章章可見陛下仁孝切於聖心然尊親之義貴合於禮先帝遺詔送終之制一用儉約不得以金銀緣飾陛下奉先志無違物若務優厚是咈顧命盩經誼臣竊懼之今赦令甫下諸條未出望速詔有司從遺制便詔答曰朕頃議山陵荒哀迷謬以違先㫖卿引據典禮非唯中朕之失亦使朕不遺君親於患敢不聞義而從奉以終始雖古遺直何以加焉德宗時司勳郎中權德輿上昭陵議曰右奉進止寢宫在山上置來多年曽經野火燒爇摧毁略盡其宫尋移在瑶臺寺左側今屬通年欲議修置緣舊宫本在山上元無井泉每緣供水稍逺百姓非常勞弊今欲於見住行宫處修造所冀久逺便人乂為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏臣聞古宗廟之制前有廟廟列昭穆後有寢寢陳衣冠自秦漢已來始因陵立廟有寢宫便殿雖廟居陵傍而無必在山上不在山下之定制且禮文所貴宜也稱也祀事所資敬也潔也伏以昭陵因山太宗所建宫在山上以便當時自野火延燒行宫山下亦已久矣今若伐木縮板程功就險神道貴靜或非所宜則與置陵之初事體為異況舊制既毁新宫是修考於便地可以經久所謂宜稱也又井泉在下汲引為易享獻之禮是資嚴恭本於明德惟馨亦在吉蠲為饎故禮之言祭也水曰清滌言其潔清滌濯也又曰不敢用常䙝味所以交於神明也因兹列井以備薦羞所謂潔而敬也凡舉事必以制度當否為大而以人力勞逸為細若於事為當又無所勞不亦順昭陵愛人之心乎不亦叶陛下從宜之禮乎今列聖寢宫有在山下者矣然則致敬來格之義豈以山上山下而為逺近耶臣愚以為但在柏城之內則不云逺陛下精誠慎重詢及庶僚徒獻所聞伏增戰越謹議時昭陵寢宫為原火延燔而客祭瑶臺佛寺又故宫在山上乏水泉作者憚勞欲即行宫作寢詔宰相百官議吏部員外郎楊於陵議曰園寢非三代制自秦漢以來附陵置寢或逺或邇則無聞焉韋𤣥成等議園陵於興廢初無適語且寢宫所占在柏城中距陵不逺使諸陵之寢皆有區限故不可徙若止柏城則故寢已燔行宫已久因以治飾亦復何嫌或曰太宗創業寢宫不輒易是不然夫陵域宅神神本靜今大興荒廢囂役密邇非幽穸所安改之便太常博士韋彤曰先王建都立邑不利則為之遷況有故耶今文寢災徙而宫之非無故也神安於徙因而建寢於禮至順又它陵皆在柏城隨便營作不越封兆力省易從帝重改先帝制還宫山顛武宗㑹昌中李德裕上奏曰奉宣宣懿皇太后祔光陵同𤣥宫及不移福陵只祔廟何者為便商量奏來者右臣等伏以園寢已安神道貴靜光陵因山久固僅二十年福陵近又修崇足彰嚴奉今若再因合祔須啓二陵或慮聖靈不安未合先㫖又以隂陽避忌亦有所疑不移福陵實合禮意伏以照臨在天光靈未逺合食清廟於禮無違足以申陛下大孝之心表先后昭配之德既遵舊典尤愜衆情臣等商量祔太廟不移福陵實為允便臣等不任感切之至歷代名臣奏議卷一百二十四
