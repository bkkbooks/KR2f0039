body:
  text: 歷代名臣奏議卷一百三十一明楊士竒等撰用人唐髙祖武德元年河南州縣相繼降唐劉武周降將尋相等多叛去諸將疑尉遲敬德囚之屈突通殷開山言於秦王世民曰敬德若叛豈在尋相之後邪遽命釋之引入卧內賜之金曰丈夫意氣相期勿以小嫌介意吾終不信讒言以害忠良公宜體之必欲去者以此金相資表一時共事之情也世民以五百騎行戰地世充帥步騎萬餘猝至圍之單雄信引槊直趨世民敬德躍馬大呼橫刺雄信墜馬翼世民出圍更帥騎兵還戰屈突通引大兵繼至世充大敗僅以身免世民謂敬德曰公何相報之速也自是寵遇日隆武德中杜如晦為秦王府兵曹參軍俄遷陜州揔管府長史房玄齡曰府寮去者雖多蓋不足惜杜如晦聰明識達王佐才也若大王守藩端拱無所用之必欲經營四方非此人莫可秦王自此彌加禮重寄以心腹遂奏為府屬嘗參謀帷幄太宗即位玄齡為中書令奏言秦府左右未得官者共怨前宫及齊府左右處之先已帝曰古稱至公者蓋謂平恕無私丹朱商均子也而堯舜廢之管叔蔡叔兄弟也而周公誅之故知君人者以天下為心無私於物昔諸葛亮孔明小國之相猶曰吾心如稱不能為人作輕重況我今理大國乎朕與公等衣食出於百姓百姓人力已奉於上而上恩未被於下今所以擇賢才者蓋為求安百姓也用人但問堪否豈以新故異情凡一靣尚自相親況舊人而頓忘也才若不堪亦豈以舊人而先用今不問能不能而直言其怨嗟豈是至公之道耶魏徵為太子洗馬帝召責之曰汝離間我兄弟何也徵慷慨自若從容對曰皇太子若從臣言必無今日之禍帝為之斂容厚加禮異擢拜諌議大夫馮立為東宫率帝數之曰汝昨者出兵來戰大殺傷我兵將何以逃死立飲泣而對曰立出身事主期以效命當戰之日無所顧憚因歔欷悲不自勝帝慰勉之授左屯衛中郎將太宗時御史大夫杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彛對曰設官分職各有所司果有愆違御史自應糾舉而淹所言大為煩碎淹默然上問淹何故不復論執對曰德彛所言真得大體臣誠心服不敢遂非上悅曰公等各能如是朕復何憂尚書左僕射杜如晦奏言監察御史陳師合上拔士論兼人之思慮有限一人不可總知數職以論臣等帝謂戴胄曰朕以至公理天下今任玄齡如晦非為勳舊以其有才行也此人妄事毁謗止欲離間我君臣昔蜀後主昏弱齊文宣狂悖然國稱理者以任諸葛亮楊遵彥不猜之也朕今任如晦等亦復如法流陳師合于嶺外魏徵為祕書監有告謀反帝曰魏徵昔吾之讎止以忠於所事吾遂拔而用之何乃妄生讒構竟不問徵遽斬所告者帝謂侍臣曰化及與玄感即隋大臣受恩深者子孫皆反其故何也岑文本對曰君子乃能懷德荷恩玄感化及之徒並小人也古人所以貴君子而賤小人帝曰然太宗嘗謂侍臣曰朕每日夜恆思百姓間事或至夜半不寐惟恐都督刺史堪養百姓以否故於屏風上録其姓名坐卧恆看在官如有善事亦具列於名下朕居深宫之中視聽不能及逺所委者惟都督刺史此輩實理亂所係尤須得人帝又謂侍臣曰為政之要惟在得人用非其才必難致理今所任用必須以德行學識為本諫議大夫王圭曰人臣若無學業不能識前言往行豈堪大任漢宣帝時有詐稱衛太子聚觀者數萬人衆皆致惑雋不疑斷以蒯瞶之事宣帝曰公卿大臣當用經術明於古義者此則固非刀筆俗吏所可比擬帝曰信如卿言帝又謂侍臣曰朕看古來帝王以仁義為治者國祚延長任法御人者雖救一時敗亡亦促既見前王成事足定元龜今欲專以仁義誠信為治望革近代之澆薄也圭對曰天下凋喪日久陛下承其餘弊𢎞道移風萬代之福但非賢不理惟在得人帝曰朕思賢之情豈捨夢寐給事中杜正倫進曰世必有才隨時所用豈待夢傅説逢吕尚然後治乎帝納之帝又謂岑文本曰梁陳名臣有誰可稱復有子弟堪招引否文本奏言隋師入陳百司分散莫有留者唯尚書僕射袁憲獨在其主之傍王世充將受隋禪羣僚表請勸進憲子國子司業承家託疾獨不署名此人父子足稱忠烈承家弟承序今為建昌令清貞雅操實繼先風由是召拜晉王友兼令侍讀尋授𢎞文館學士帝曰百官之內應有堪用者朕未能知之不可造次為天下主誠亦難朕今行一事則為天下所觀出一言即為天下所聽用得好人為善者皆勸誤用惡人不善者競進賞當其勞無功者自退罰當其罪為惡者誡懼故知賞罰不可輕行用人彌須審悉侍中魏徵對曰舉選之事自古為難故考績黜陟察其善惡今欲求人必須先訪其行審知其善然後任之假令此人不能濟事只是才力不及不為大害誤用惡人假今強幹為患極多但亂代為求其材不顧其行太平必須材行俱兼始可任用也帝曰夫人之身假令無病不免有疥癬及時有小惡處用人求偹理實為難徵對曰自古為政但舉大體堯舜之時非全無惡但為惡者少桀紂之代非全無善但為惡者多譬如百尺之木豈能無一枝節今官人居職豈能全不為非但犯罪者少即是大化所司奏淩敬乞貧之狀帝責徵等濫進人徵曰臣等每蒙顧問常具言其長短有學識強諫爭是其所長愛生活好經營是其所短今淩敬為人作碑文教人讀漢書因兹附託回易求利與臣等所説不同陛下未用其長惟見其短以為臣等欺罔實不敢心服帝納之徵頻論止足之分帝未之許徵曰羣臣委任既久許其避退權用之次觀其能否既得預察羣才又無獨任之謗使善人得進長廉讓之風若能行之於今足為將來永法帝曰信如公言然論者猶有同異時至京下當别議帝嘗坐於丹霄門外之西堂引徵及右僕射李靖中書令溫彥博等入宴言及羣臣才行謂靖等曰朕自為王至於今日官人或上書獻計勸朕為善者多矣日月稍久官職漸大志意即移言論漸少無不衰倦唯魏徵與朕為善官職益髙志節彌厲見朕一事失所甚於己身有過朝夕孜孜終始如一自即位以來唯見此一人而已是以敬之重之同於師傅不以人臣處之其後每謂房玄齡等曰魏徵被我拔擢特異其報我亦深矣君與我契闊艱辛多歷年所勞苦之極人莫能加然自即位以來輔弼我躬安我社稷成我今日功業為天下所稱君不得與魏徵比矣徵多病辭職帝曰公獨不見金在礦何足貴邪善冶煆而為器人乃寶之朕方自比於金以卿為良匠而加礪焉卿雖疾未及衰庸得便爾帝又謂羣臣曰為政者豈待堯舜之君龍益之佐自我驅使魏徵天下乂安邊境無事時和歲稔其忠益如此先是將發十六道黜陟大使畿內道未有其人帝親定之問房玄齡等曰此道事最重誰可先使右僕射李靖對曰畿內事非魏徵莫可帝作色曰朕欲向九成事亦不小寧遣魏徵耶朕每行不欲與其相離者適為其見朕是非必無所隱今從公等語遣去朕若有得失公等能止邪乃令李靖充使魏徴從往九成宫帝又與羣臣論及十六國諸王優劣曰苻永固何獨為所稱房玄齡對曰為任使得人則見稱無其人則不見稱當時為有王景略帝謂羣臣曰此猶朕之有魏徵徵拜謝焉徵既亡帝使人至其家得書一紙始半藁其可識者曰天下之事有善有惡任善人則國安用惡人則國弊公卿之內情有愛憎憎者惟見其惡愛者止見其善愛憎之間所宜詳慎若愛而知其惡憎而知其善去邪勿疑任賢勿猜可以興矣侍御史馬周上疏曰理天下者以人為本欲令百姓安樂在刺史縣令縣令既衆不可皆賢若每州得良刺史則合境蘇息天下刺史悉稱聖意則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢德欲有遷擢為將相必先試以臨民或從二千石入為丞相及司徒太尉者朝廷必不可獨重內臣外刺史縣令遂輕其選又刺史多武夫勳人或京官不稱職始出補外折衝果毅身力強者入為中郎將其次乃補邊州而以德行才術擢者十不能一所以百姓未安殆由於此帝因謂侍臣曰刺史朕當自簡擇縣令詔京官五品已上各舉一人治書侍御史劉洎以為左右丞相宜特加精簡上疏曰臣聞尚書萬機實為政本伏尋此選授任誠難是以八座比於文昌二丞方於管轄爰至曹郎上應列宿苟非稱職竊位興譏伏見比來尚書省詔敕稽停文案壅滯臣誠庸劣請述其源貞觀之初未有令僕于時省務繁雜倍多於今而左丞戴胄右丞魏徵並曉達吏方質性平直應彈舉無所回避陛下又假以恩慈自然肅物百司匪解抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勳親在位器非其任功勢相傾凡在官僚未循公道雖欲自強先懼囂謗所以郎中豫奪惟事咨稟尚書依違不能斷決或糾彈聞奏故事稽延按雖理窮仍更盤下去無程限來不責遲一經出手便涉年載或希旨失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否互相姑息惟事彌縫且選衆授能非才莫舉天工人代焉可妄加至於懿戚元勳但宜優其禮秩或年髙及耄或積病智昏既無益於時宜當置之以間逸久妨賢路殊為不可將救兹弊且宜精簡尚書左右丞及左右郎中如並得人自然綱維偹舉亦當矯正趨競豈惟息其稽滯哉疏奏尋以洎為尚書左丞髙宗時魏元忠遷監察御史帝嘗從容曰外以朕為何如主對曰周成康漢文景也然則有遺恨乎曰有之王義方一世豪英而死草萊議者謂陛下不能用賢帝曰我適用之聞其死顧已無及元忠曰劉藏器行副於才陛下所知今七十為尚書郎徒歎彼而又棄此帝默然慙武后時麟臺正字陳子昻上軍國利害疏曰臣伏見陛下憂勞天下百姓恐不得所又發明詔將降九道大使巡察天下諸州兼申黜陟以求人瘼甚大惠也天下百姓幸甚臣竊以為美矣未盡善也何以言之陛下所以降明使豈非欲令天下黎元衆庶知陛下夙興夜寐憂勤念之邪欲天下賢良忠孝知陛下夙興夜寐思任用之邪欲使天下姦人暴吏亦知陛下夙興夜寐務欲除之耶陛下聖意必若以此而發使乎則愚臣竊見陛下之使有未盡善也若愚臣所謂使者先當雅合時望務為衆人所推仁愛足以存恤孤惸賢明足以進拔幽滯剛直足以不避強禦明智足以照察姦非然後使天下姦人畏其明而不敢為惡也天下強禦憚其直而不敢為過也天下英竒慕其德而樂為之用也天下孤寡賴其仁而欣戴其恩也夫如是然後可以論出使矣故輶軒未動於京師天下翕然皆己知矣今陛下使猶未出朝廷行路市井之人皆以為非任朝廷有識者亦不稱之夫天子之使未出魏闕朝廷之人皆已輕之何況天下之衆哉夫欲黜陟求瘼豈可得也陛下所以有此失者在不選人亦輕此使非天下之大任故陛下遂大失至於此也宰相復以為尋常但奉詔而行之茍以出使為名不求任使之實故使愈出而天下愈弊使彌多而天下彌不寧其故何哉是朝廷輕其任也輕其任則不擇人不擇人則使非其實使非其實則黜陟不明刑罰不中朋黨者進貞直者退徒使天下百姓修飾道路送往迎來無益於聖教耳臣久為百姓實委知之陛下欲令天下黎庶知陛下夙興夜寐憂勤政化不可得也故臣以陛下大失在於此也夫欲正其末者必先端其本清其流者必先潔其源自然之符也國家兹弊亦已久矣今陛下若不重選此使妙得其人天下黎元必謂陛下尚行尋常之政不能革此弊也則賢人必不出貪吏必得志惸獨必哀吟天下百姓無荷賴於陛下此使也臣不勝有願願陛下與宰相更妙選朝廷百官素有威重名節為衆人所推者陛下因大朝日親御正殿集百僚公卿設禮儀以使者之禮見之於是告以出使之意殷勤警戒無敢忒愆遂授以旌節而發遣之先自京師而訪豺狼然後攬轡登車以清天下若如是臣必知陛下聖教不旬月之間天下家見而户習也昔堯舜氏不下席而天下理者蓋黜陟幽明能折中耳今陛下方開中興之化建萬代之功天下瞻望冀見聖政此之一使是陛下為政之大端也諺曰欲知其人觀其所使不可不慎也若陛下必知不可得其人則不如不出使出使煩數無益於化但勞天下之人是猶烹小鱗而數撓之耳伏惟陛下察焉子昻又上論牧宰疏曰臣伏惟陛下當今所共理天下欲致太平者豈非宰相與諸州刺史縣令耶陛下若重此而理天下乎臣見天下理也若陛下輕此而理天下乎臣見天下不得理也何者宰相陛下之腹心刺史縣令陛下之手足未有無腹心手足而能獨理者也臣竊觀當今宰相已略得其人矣獨刺史縣令陛下尚猶輕之未見得其人是以腹心雖安而手足猶病而天下至今所以未得大利耳臣竊惟刺史縣令之職實陛下政教之首也陛下布德澤下明詔將示天下百姓必待刺史縣令為陛下謹宣之故得其人則百姓家見而户聞不得其人但委棄有司而挂牆壁耳陛下欲使家興禮讓吏朂清勤不重選刺史縣令將何道以致之耶愚臣竊見陛下未有舟楫而欲濟江河不可得也臣比在草茅為百姓久矣刺史縣令之化臣實委知國之興衰莫不在此職也何者一州得賢明刺史以至公循良為政者則千萬家賴其福若得貪暴刺史以徇私苛虐為政者則千萬家受其禍矣夫一州禍福且如此況天下之衆豈得勝道哉故臣以為陛下政化之首國之興衰在此職也臣伏見陛下憂勤政理欲安天下百姓無使疾苦然猶未以刺史縣令為念何可得哉臣何以得知陛下未以刺史縣令為念臣竊見吏部選人補一縣令如補一縣尉耳但以資次考第從宦遊歷即補之不論賢良德行能以化人而拔擢見用者縱吏部侍郎時有不知此弊而欲超越用人則天下小人已囂然相謗矣所以然者習於常而有驚怪也所以天下庸流一雜賢不肖莫分但以資次為選不以才能得職所以天下淩遲百姓無由知陛下聖德勤勞夙夜之念但以愁怨以為天子之令遣如此也自有國來此弊最深而未能除也豈不甚哉昔漢宣帝有言曰朕之所共理天下者豈非良二千石乎故宣帝之時能委任矣伏願陛下與宰相深思妙選以救正此弊使天下之人稍得以安臣有計然甚鄙近未能著之於書願陛下興念明宰相圖之以安天下幸甚幸甚武后時魏元忠為張易之兄弟所構獄方急蘇安恆獨申救曰王者有容天下之量故濟其心能進天下之善故除其惡不然則鬼神馮怒隂陽紛舛陛下始革命勤秉政樞博逮謀猷天下以為明主暮年厭怠讒佞熾結水火相災百姓不親五品不遜天下以為暗君邪正糅進獄訟寃劇何昔是而今非邪居安忘危之失也竊見元忠廉直有名位宰相履忠正邪佞之徒嫉之若讎易之兄弟無功無德但以馮附不閲數期位勢隆極指馬獻蒲先害善良自元忠下獄人人偶語謂易之交亂且及四國烈士撫髀忠臣鉗口懼易之之權恐先諫受戮虛死無名況賊虜方強賦斂重困而自縱讒慝搖變遐邇臣恐四夷低目窺覘為邊鄙患百姓託義以清君側逐鹿之人叩關而至陛衛左右從中以應爭鋒朱雀之門問鼎大明之宫陛下何以謝之臣今計者莫若收雷電之威解恢恢之網復爵還位君臣如初則天下幸甚陛下縱不能斬佞臣塞人望且當抑奪榮寵翦其羽翅無使驕橫為社稷之憂疏奏易之等大怒遣刺客邀殺之賴鳯閣舍人桓彥範等悉力營解乃免明堂災沂州刺史韋承慶上疏諫曰以文明垂拱後執政者未滿歲率以罪去大抵皆惡逆不道夫構大厦濟巨川必擇文梓艅艎若亟毁而敗則是架朽木乘膠船也臣謂陛下求賢之意切而取人之路寬故一言有合而付大任夫以堯舉舜猶歷試諸難況庸庸者可超處輔相以百揆萬幾畀小人哉書聞不報證聖初詔九品以上陳得失獲嘉主簿劉知幾上言君不虛授臣不虛受妄受不為忠妄施不為惠今羣臣無功遭遇輒遷至都下有車載斗量杷推碗脫之諺又謂刺史非三載以上不可徙宜課功殿明賞罰后嘉其直長安中武后謂狄仁傑曰安得一竒士用之仁傑曰陛下求文章資歷今宰相李嶠蘇味道足矣豈文士齷齪不足與成天下務哉后曰然仁傑曰荆州長史張柬之雖老宰相材也用之必盡節於國即召為洛州司馬它日又求人仁傑曰臣嘗薦張柬之未之用也后曰遷之矣曰臣薦宰相而為司馬非用也乃授司刑少卿遷秋官侍郎韋嗣立拜鳯閣侍郎同鳯閣鸞臺平章事時州縣非其人后以為憂李嶠唐休璟曰今朝廷重內官輕外職每除牧守皆訴不行非過纍不得遣請選臺閣賢者分典大州自近臣始后曰誰為朕行嗣立曰內典機要非臣所堪請先行以示羣臣后悅以本官檢校沂州刺史中宗神龍中蕭至忠授中書侍郎同中書門下平章事上疏陳時政曰求治之道首于用賢茍非其才則官曠官曠則事廢事廢則人殘歷代所以陵遲者此也今授職用人多因貴要為粉飾上下相蒙茍得為是夫官爵公器也恩幸私惠也王者止可以金帛富之梁肉食之以存私澤也若公器而私用之則公義不行而勞人解體私謁開而正言塞日朘月削卒見凋弊今列位己廣冗貟復倍陛下降不資之澤近戚有無涯之請臺閣之內朱紫充滿官秩益輕恩賞彌數才者不用用者不才故人不效力官匪其人欲求治固難矣又宰相要官子弟多居美爵並宰才藝而更相諉託詩云私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長此言王政不平而衆官廢職私家子列試榮班徒長其佩爾臣願陛下愛惜爵賞官無虛授進大雅以樞近退小人於間左使政令惟一私不害公則天下幸甚且貞觀故事宰相子弟多居外職非直抑強宗亦以擇賢才爾請自宰相及諸司長官子弟並授外官共寧百姓表裏相統帝不納韋嗣立為兵部尚書論職官多濫上疏曰臣聞設官分職量才置吏此本於理人而務安之也故書曰在知人在安民知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何畏乎有苖者是也此明官得其人而天下自理矣古者取人必先採鄉曲之譽然後辟於州郡州郡有聲然後辟於五府才著五府然後升之天朝此則用一人所擇者甚悉擢一士所歷者甚深孔子曰譬有美錦不可使人學製此明用人不可不審擇也用得其才則治非其才則亂治亂所繫焉可不深擇之哉凡今之取人有異此道多未甚試效即頓遷擢夫競趨者人之常情僥幸者人之所趣而今務進不避僥幸者接踵比肩布於文武之列有文者用理內外則有回邪贓汚上下敗亂之憂有武者用將軍戎則有庸懦怯弱師旅喪亡之患補授無限員缺不供遂至員外置官數倍正闕曹署典吏困於祇承府庫倉儲竭於資俸國家大事豈甚於此古者懸爵待士唯有才者得之若任以無才則有才之路塞賢人君子所以遁迹銷聲常懷歎恨者也且賢人君子守於正直之道逺於僥幸之門若僥幸開則賢者不可復出矣賢者遂退若欲求人安化洽復不可得也人若不安國將危矣陛下安可不深慮之玄宗時姚崇嘗於帝前序次郎吏帝左右顧不主其語崇懼再三言之卒不答崇趨出內侍高力士曰陛下新即位宜與大臣裁可否今崇亟言陛下不應非虛懷納誨者帝曰我任崇以政大事吾當與決至用郎吏崇顧不能而重煩我邪崇聞乃安由是進賢退不肖而天下治宣義郎左拾遺內供奉張九齡上封事曰臣所以上事以臣愚見並當時尤切不敢飾詞伏願陛下親覽可否之宜幸甚幸甚臣伏以陛下自克清內難光宅天下常欲躋人於富壽致國於太平聖慮每勤德音屢發然猶黎人未息水旱為憂臣竊伏思之有由然矣臣聞乖政之氣發為水旱天道雖逺其應甚速昔者東海枉殺孝婦旱者久之一吏不明匹婦非命則天為之旱以昭其寃況今六合之間元元之衆莫不懸命於縣令宅生於刺史陛下所與共理此尤親於人者也多非其任徒有其名致旱之由豈惟孝婦一事而已是以親人之任宜得其賢用才之道宜重其選而今刺史縣令除京輔近處雄望之州刺史猶擇其人縣令或備員而已其餘江淮隴蜀三河諸處除大府之外稍稍非才但於京官之中出為州縣者或是緣身有纍在職無聲用於牧宰之間以為斥逐之地或因時附會遂忝髙班比其勢衰且無他責入謂之不稱京職亦乃出為刺史至於武夫流外積資而得官成於經久不計於有才諸若此流盡為刺史其餘縣令已下固不可勝言蓋氓庶所繫國家之本務本務之職反為好進者所輕承弊之人每遭非才者所擾陛下聖化從此不宣皆由不重親人之選以成其弊而欲天下和洽固不可得也古者刺史入為三公郎官出宰百里莫不互有所重勸其所行臣竊怪近俗偏輕此任今朝廷卿士入而不出於其私情遂自得計何則京華之地衣冠所聚子弟之間身名所出從容附會不勞而成一出外藩有異於此人情進取豈忘於私但立法制之不敢違耳原其本意固私是欲今大利在於京職而不在於外郡如此則智能之士欲利之心日夜營營寧肯復出為刺史縣令而陛下國家之利方賴智能之人此輩既自固而不行在外者又技癢而求入如此則智能之輩常無親人之責陛下又未格之以法無乃甚不可乎故臣愚以為欲理之本莫若重刺史縣令此官誠重智能者可行正宜懸以科條定其資歷凡不歷都督刺史有高第者不得入為侍郎列卿不歷縣令有善政者亦不得入為臺郎給舍即雖逺處都督刺史至於縣令以次差降以為出入亦不得十年頻任京職又不得十年盡任外官如此設科以救其失則內外通理萬姓獲寧如積習為常遂其私計陛下獨宵衣旰食天下亦未之理也又古之選用賢良取其稱職或遙聞而辟召或一見而任之是以士修素行不圖僥幸羣小不逮亦用息心以故姦偽自止流品不雜今天下未必理於上古而事務日倍於前誠為不正其本而設巧於末所謂末者吏部條章動盈千百刀筆之吏辨析毫釐節制搶攘溺於文墨胥吏之猾又緣隙而起臣以為始造簿書以備用人之遺忘耳今反求精於案牘不急於人才亦何異遺劍中流而刻舟以記去之彌逺可為傷心凡有稱吏部之能者則曰從縣尉與主簿與縣丞斯選曹執文而善知官次者也惟據其合與不合不論賢與不肖大略如此豈不謬哉陛下若不以吏部尚書侍郎為賢必不授以職事尚書侍郎既以賢而受委豈復不能知人知人之難雖自古所謹而拔十得五其道可行今則執以格條貴於謹守幸其心能自覺者每選於所拔亦有三人五人若又專固者則亦一人不拔據資配職自以為能為官擇人初無此意故使時人有平配之議官曹無得賢之實朱紫同色清濁不分是於聖朝有何裨益故臣以為選部之法弊於不變變法之易在陛下渙然行之假如今之銓衡欲自為意亦限行之已久動必見疑遂用因循益為浮薄今若刺史縣令精核其人即每年當管之內應有合選之色先委考其才行堪入品流然後送臺臺又推擇據所用之多少為州縣之殿最一則州縣慎於所舉必取入官之才二則吏部因其有成無多庸人之數縱有不任送者妄起怨端且猶分謗於外臺不至喧譁於南省今則每歲選者動以萬計京師米物為之空虛豈多士若斯蓋渝濫至此而欲仍舊致理難於改制祗益文法煩碎賢愚渾雜就中以一詩一判定其是非適使賢人君子從此遺逸斯亦明代之闕政有識者之所歎息也又天下雖廣朝臣雖衆而士之名賢誠可知也若使毁譽相亂聽受不明事將已矣無復可説如知其賢能各有品第每一官缺而不以次用之則是知而不為焉用彼相借如諸司清要之職當用第一之人及其要官缺時或以下等叨進以故時議無高無下惟論得與不得自然清議不立名節不修上善則守志而後時中人則躁求而易操其故何哉朝廷若以令名進人士子亦以修名獲利而利之所出衆則趨焉已而名利不出於清修所趣多歸於人事其小者茍求取得一變而至阿私其大者許以分義再變而成朋黨斯並教化漸漬使之必然故於用人之際不可不第髙下若髙下有次不可妄干天下士流必刻意修飾思齊日衆刑政自清此皆興衰之大端焉不可不察易曰履霜堅氷至言聖人之見終始之徵矣臣今所言上刺史縣令等事一皆指實縱臣所欲變法不合時宜伏望更發睿圖及詢於執事作為長算振此頽風使官修其方人受其福天下幸甚伏惟陛下聰明神武動以聖斷正當可為之運未行反本之法微臣企竦竊有所望伏願少留宸眷稍覽愚誠必無可施行棄之非晚不勝塵露禆補之誠肅宗至德元年北海太守賀蘭進明詣行在上命房琯以為御史大夫琯以為攝御史大夫進明入謝上怪之進明因言與琯有隙且曰晉用王衍為三公祖尚浮虛致中原板蕩今房琯專為迂闊大言以立虛名所引用皆浮華之黨真王衍之比也陛下用為宰相恐非社稷之福且琯在南朝佐上皇使陛下與諸王分領節制仍置陛下於沙塞空虛之地又布私黨於諸道分統大權其意以為上皇一子得天下則已不失富貴此豈忠臣所為乎上由是踈之代宗大歷十四年常衮言於上曰陛下久欲用李泌昔漢宣帝欲用人為公卿必先試理人請且以為刺史使周知人間利病俟報政而用之初天下用兵官爵冗濫元王秉政賄賂公行及衮為相思革其弊四方奏請一切不與而無甄别賢愚同滯崔祐甫欲收時望作相未二百日除官八百人前後相矯終不得其適上嘗謂祐甫曰人或謗卿所用多涉親故何也對曰臣為陛下選擇百官不敢不詳慎茍平生未之識何以諳其才行而用之上以為然德宗興元元年蕭復奉使自江淮還與李勉盧翰劉從一俱見上勉等退復獨留言於上曰陳少遊任兼將相首敗臣節韋臯幕府下僚獨建忠義請以臯代少遊鎮淮南使善惡著明上然之貞元十六年義成節度使盧羣卒賈耽曰凡就軍中除節度使必有愛憎向背喜懼者相半故衆心不安自今願陛下只自朝廷除人庶無他變十八年浙東觀察使裴肅既以進奉得進齊總掌後務刻剝以求媚又過之擢為衢州刺史給事中許孟容封還詔書曰衢州無他虞齊總無殊績忽此超奬深駭羣情若有可録願明書勞課然後超改以解衆疑詔遂留中上召孟容奬之德宗時門下侍郎趙憬陳前世損益當時之變獻審官六議一議相臣曰中外知其賢者用之能者任之責材之偹為不可得二議庶官曰臣嘗謂拔十得五賢愚猶半陛下曰何必五也十二可矣故廣任用明殿最舉大節略小瑕隨能試事用人之大要也三議京司闕官曰今要官闕多間官員多要官以材行間官以恩澤是選拔少優容衆也宜補闕員以育人材四議考課曰今內庶僚外刺史課最尤者擢以不次善矣臣謂黜陟宜責歲限若任要重未當遷者加爵或秩其餘進退宜示遲速之常若課在中考如限者平轉而歷試之即無茍且之心滯淹之慮五議遺滯曰陛下委宰輔舉才不遍知也則訪之庶僚又不遍知也訪之衆人衆聲囂然十譽之未信一毁之可疑臣謂宜采士論以譽多者先用非大故者勿棄六議藩府官屬曰諸使辟署務得才以重府望能否已試則引而置之朝無俾久滯帝皆然之翰林學士陸贄薦袁高等狀曰臣近因奏對言及任人陛下纍歎乏才惘然憂見於色臣退而思省且喜且慙所喜者樂陛下急於求賢明君致理之資也所慙者耻近侍不能薦士微臣竊位之罪也輒自揣擇思舉所知猶懼鑒識不明品藻非當反覆參校未果上聞昨蒙宣示中書進擬量移官今臣審看可否者因悟貶降之輩其中甚有可稱臣以素所諳知兼聞公議此狀之內僅得十人狀所不該又有三四或因連纍左黜或遭讒忌外遷互有行能咸著名迹置之清列皆謂良材若但準例量移及令仍舊出守固非陛下愛賢之意亦乖海內望理之心儻蒙特恩追赴行在試垂訪接必有可觀録用棄瑕既符德號振淹求舊亦闡大猷謹録薦陳庶偹採擇其餘差序逺近並具别狀以聞贄又論替換李楚琳狀奏曰右欽溆奉宣聖旨李楚琳不可久在鳯翔欲候朕到日簡擇一人替楚琳充節度使楚琳别與一官便隨朕歸京既有迎駕諸軍威勢甚盛因此替換亦是權宜卿宜商量穩便否者臣聞王者有作先懷永圖謀必可傳事必可繼不因利以茍得不乘便而幸成故能上下相安而理可長久也彼楚琳者固是亂人乘國難而肆逞其姦賊邦君而篡居其位按以典法是宜汚瀦既屬多虞不遑致討乃分之以旄鉞又繼之以寵榮逮至南巡頗全外順道途無壅亦有賴焉雖朝命纍加蓋非獲已然王言一出則不可渝縱闕君臣之恩猶須進退以禮今若因行幸之威勢假迎扈之兵甲易置以歸是同虜執以言乎除亂則不武以言乎務理則不誠禍變繁興為日久矣負釁居位豈唯一人以此時巡後將安入以此撫御誰其感懷昔漢高偽遊韓信見獲功臣繼叛天下幾危征伐紛紜以至沒代其徼幸之不可也如此陛下得不為至戒哉議者謂之權宜臣又未諭其理夫權之為義取類權衡衡者稱也權者錘也故權在於懸則物之多少可準權施於事則義之輕重不差其趣理也必取重而舍輕其逺禍也必擇輕而避重茍非明哲難盡精微故聖人貴之乃曰可與適道未可與立可與立未可與權言知幾之難也今者甫平大亂將復天衢輦路所經首行脅奪易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權以任數為智君上行之必失衆臣下用之必陷身歷代之所以喪亂而長姦邪由此誤也夫以韓信才略當時莫儔且負嫌猜已遭告訐縱之足以亂區宇除之可以安國家幸而成擒猶謂失䇿當時被攻戰之害百代流詭詐之譏況楚琳卒伍凡材厮養賤品因時擾攘得肆猖狂非有陷堅殪敵之雄出竒制勝之略頗同狐鼠乘夜睢盱晨光既升勢自跧縮今郊畿已乂武衛方嚴汧隴鎮壓於其西邠涇扼制於其北顧是岐下若居掌中以楚琳瑣劣之資處掌中控握之地縱令蹢躅何惡能為願陛下姑務含𢎞普安反側促駕遄止録功犒勤敷肆眚之恩布惟新之令然後徴韋臯楚琳俾入分文武之職擇元勳宿望命出總岐隴之師則彼承詔欣榮奔走不暇安敢蠆介復勞誅鋤措置得宜萬無一跌何遽過動不為後圖仰希睿聰試更詳慮謹奏贄又答論蕭復狀奏曰右欽溆奉宣聖旨卿所奏蕭復事朕已具悉假使更無别意終是不識事宜今巡行諸道轉恐事多乖失緣孟曍年老今欲除蕭復為福建觀察使便令赴任去就亦應得所卿意以為何如者伏以將相之任所委皆崇中外迭居亦是常理然君臣有禮進退不可以不全理體有宜本末不可以不稱頃盜興都邑駕適郊畿陛下悔征賦之殷繁念黎元之困悴誕降慈旨深示憫傷特遣大臣普詢疾苦本期還報將議優蠲衆情顒顒日望上逹今若未終前命遽授逺藩則是膏澤將布而復收渙汗已發而中廢事既失望人何以觀斯乃進退之禮不全本末之宜不稱謂為得所臣實疑之儻慮事乖方不欲淹留在外則當諭以詔旨促其歸程逺郡巡歷未周但令副介分往待其復命親訪物情革弊垂恩用符德號使務既畢能否益彰徐擇所宜以圖進退庶於事體允得厥中謹奏贄為中書侍郎同中書門下平章事議汴州逐劉士寧事狀奏曰右希顔奉宣聖旨適得李萬榮奏劉士寧因出遊獵三軍將士遂閉城門不放入發遣令赴朝廷萬榮安撫軍州今已寧帖卿等宜知悉者伏以劉士寧昏荒暴慢惡貫久盈聖情愛人久為含忍親離衆叛自取奔亡不勞師徒克靖方鎮恭承宣諭欣賀實深然梁宋之間地當要害鎮壓齊魯控引江淮得其人則安則強失其人則危則弱今士寧見逐雖是衆情萬榮總軍且非朝旨此亦安危強弱之機也陛下審之慎之或恐奏事之人茍私所奉之將妄陳體勢輒欲徼求承前授任失宜多為此輩所誤假使心無詐罔其如識乏經通與之籌量鮮不撓敗今軍州既定足得安詳望且選一朝臣馳往宣勞更淹旬日徐察事情見情而後圖之則冀免有差失候至來日續更面陳謹先狀以聞謹奏贄又論朝官缺員及刺史等改轉倫序狀奏曰右臣聞於經曰濟濟多士文王以寧又曰無曠庶官天工人其代之蓋謂士不可不多官不可不偹敦付物以能之義闡恭已無為之風此理道得失之所由也夫聖人之於愛才不唯側席求思而已乃復引進以崇其術業歷試以發其器能旌善以重其言優祿以全其操歲月積久聲實並豐列之於朝則王室尊分之於土則藩鎮重故詩序太平之君子能長育人才書比梓人之理材既勤朴斫惟施丹雘禮著造士易尚養賢蓋以人皆含靈唯所誘致如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汚泥疏濬則川沼是以書籍所載歷代同途祚屬殷昌必時多俊乂運鍾衰季則朝乏英髦當在衰季之時咸謂無人足任及其雄才御宇淑德應期賢能相從森若林會然則興王之良佐皆在季代之棄才在季而愚當興而智乃知季代非獨遺賢而不用其於養育奬勸之道亦有所不至焉故曰人皆含靈唯所誘致漢髙稟大度故其時多魁傑不羈之材漢武好英風故其時富瓌詭立名之士漢宣精吏能故其時萃循良核實之能逮乎哀平桓靈昵比小人踈逺君子故其時近習操國柄嬖戚擅朝權是知人之才性與時升降好之則至奬之則崇抑之則衰斥之則絶此人才消長之所由也臣每於中夜竊自深惟朝之乏人其患有七不澄源而防末流一也不考實而務博訪二也求精太過三也嫉惡太甚四也程試乖方五也取舍違理六也循故事而不擇可否七也夫多少相繆非嘉量不平輕重相欺非縣衡不定用之茍不得其道則主者實病而權量無尤故按名責實者選吏之權量也宰相者主權量之用也宰相之主吏猶司府之主財主吏在序進賢能主財在平頒秩俸假使用財失節則司之者可以改易而秩俸不可以不頒主吏乖方則宰之者可以變更而賢能不可以不進其行甚易其理甚明頃者命官頗異於是常以除吏多少準量宰相重輕宰相承寵私則援引雖濫而必進宰相見踈忌則擬議雖當而罕俞是使羣材仕進之窮通唯繫輔臣恩澤之薄厚求諸理道未謂合宜夫與奪者人主之利權名位者天下之公器不以公器徇喜心不以利權肆忿志不以寡妨衆不以人廢官或其阻執事而擁羣材所謂不澄源而防末流之患也經曰無以小謀亂大作無以嬖人疾莊士蓋務大者不拘於小纍謀小者不達於大猷嬖者或行異於莊莊者必性殊於嬖理勢相激宜其不同進賢援能諒君子之事遏惡揚善非小人所能君子以愛才為心小人以傷善為利愛而引之則近黨傷而沮之則似公近黨則不辨而遽疑似公則不覆而先信是以大道每隳於橫議良才常困於中傷失士啓讒多由於此所謂不考實而務博訪之患也夫人之器局有圓方大小之殊官之典司有難易間劇之别名稱有虛實之異課績有升降之差將使官不失才才不失序在乎制法以司契擇人而秉鈞制之不得厥中則其法可更而其契不可亂也擇之不當所任則其人可去而其秉不可奪也如或事多錯雜任靡適從而但役智以求精勞神而救弊則所救愈失所求愈粗故書曰元首明哉股肱良哉庶事康哉元首叢脞哉股肱惰哉庶事隳哉頃之輔臣鮮克勝任過蒙容養茍偹職員致勞睿思巨細經慮每有缺官須補或緣將命藉才宰司慎擇上聞必極當時妙選聖情未愜復命别求執奏既不見從則又降擇其次如是至于再至于三所選漸髙所得轉下或斷於獨見罔詢僉諧或擢自旁求不稽公議權衡失柄進取多門等差不倫聲實相反此所謂求精太過之患也臣聞耀乘之珠不能無纇連城之璧不能無瑕矧伊有情寧免愆吝仲尼至聖也猶以五十學易無大過為言顔子殆庶也尚稱不逺而復無祇悔為美況自賢人以降孰能不有過失哉珠玉不以瑕纇而不珍髦彥不以過失而不用故玄元之教曰常善救人則無棄人文宣亦云赦小過舉賢才齊桓不以射鈎而致嫌故能成九合之功秦穆不以一眚而掩德故能復三敗之辱前史序項籍之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不可屬國曰聞人之過終身不忘然則棄瑕録用者霸王之道記過遺才者衰亂之源夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改修則復進既不廢法亦無棄人雖纎芥必懲而才用不匱故能使黜退者克勵以求復登進者警飭以恪居上無滯疑下無蓄怨俾人於變以致時雍陛下英聖統天威莊肅物好善既切計過亦深一抵譴責之中永居嫌忌之地夫以天下士人皆求宦名獲登朝班千百無一其於修身勵行聚學樹官非數十年間勢不能致而以一言忤犯一事過差遂從棄捐沒代不復則人才不能不乏風俗不能不偷此所謂嫉惡太甚之患也臣聞君子約言小人先言君子之道暗然而日章小人之道的然而日亡孔子曰始吾於人也聽其言而信其行今吾於人也察其言而觀其行又曰舉直措諸枉則民服舉枉措諸直則民不服然則舉措不可以不審言行不可以不稽呐呐寡言者未必愚喋喋利口者未必智鄙朴忤逆者未必悖承順愜可者未必忠故明主不以辭盡人不以意選士凡制爵祿與衆共之先論其材乃授以職所舉必試之以事所言必考之於成然後茍妄不行而貞實在位矣如或好善而不擇所用悅言而不驗所行進退隨愛憎之情離合繫異同之趣是由捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬此則所謂程試乖方之患也天之生物為用罕兼性有所長必有所短材有所合亦有所暌曲成則品物不遺求偹則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良御適險易之宜故駑驥無失性物既若此人亦宜然其於行能固不兼具前志所謂千年一聖五百年一賢者才難不其然乎夫惟聖人方體全德賢之為目猶有未周且以未周之才彌五百年而有一造次求偹曷由得人若夫一至之能偏稟之性則中人以上迭有所長茍區别得宜付授當器各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而已帝王之盛莫盛於唐虞臣佐之盛莫盛稷禹稷禹之比無非大賢然猶各任所能不務兼偹故尚書序堯舜命官之美自稷禹咎益以降凡二十二人所命典司不踰一職用能平九土播百穀敷五教序五刑禮樂興和蠻夷率服洎鳥獸魚鱉亦罔不寧蓋由舉得其人任得其所鑒擇職授審之於初不求責於力分之外不沮撓於局守之內是以事極其理人盡其材君垂拱於上臣濟美於下功焯當代名施無窮及其失也則升降任情首末異趣使人不量其器與人不由其誠以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則責望過當不恕其所不能是以職司之內無成功君臣之際無定分此所謂取捨違理之患也今之議者多曰內外庶官久於其任又曰官無其人則闕之是皆誦老生之常談而不推時變守舊典之糟粕而不本事情徒眩聰明以撓理化古者人風既朴官號未多但别愚賢匪論資序不責人以朝夕之效不計事於尺寸之差不以小善而褒升不以一眚而罪斥故虞書三載考績三考黜陟幽明是則必俟九年方有進退然其所進者或自側微而納于百揆雖久於任復何病哉漢制部刺史秩六百石郡守秩二千石刺史髙第者即遷為郡守郡守髙第者即入為九卿從九卿即遷為亞相相國是乃從六百石吏而至台輔其間所歷者三四轉耳久在其任亦未失宜近代建官漸多列級逾密今縣邑有七等之異州府有九等之差同謂省郎即有前中後行郎中員外五等之殊並稱諌官則有諫議大夫補闕拾遺三等之别洎諸臺寺率類於斯悉有當資各須循守若依唐虞故事咸以九載為期是宜髙位常苦於乏人下寮每嗟於白首三代為理損益不同豈必樂於變易哉蓋時勢有不得已也至如鯀堙洪水績用靡成猶終九年然後殛竄後代設有如鯀之比者豈復能九年而始行罰乎臣固知其必不能也行罰欲速而進官欲遲以此為稽古之方是猶却行而求及前人也頃者臣因奏事論及內外序遷陛下乃言舊例居官歲月皆久朕外祖曾作祕書少監一任經十餘年董晉將順睿情遂奏云臣於大歷中曾任祠部司勳二郎中各經六考陛下之意頗為宜然以臣蠢愚實有偏見凡徵舊例須辨是非是者不必渝非者不必守况於舊例之內自有舛駁之異哉先聖之初權臣用事其於除授類多徇情有一月屢遷有積年不轉逮至中歲君臣搆嫌姑務優柔百事凝滯其於選授尤所艱難始以頗僻失平繼以疑阻成否至使彛倫闕敘庶位多淹是皆可懲曷足為法夫核才取吏有三術焉一曰拔擢以旌其異能二曰黜罷以糾其失職三曰序進以謹其守常如此則髙課者驟升無庸者亟退其餘績非出類守不敗官則循以常資約以定限故得殊才不滯庶品有倫參酌古今此為中道而議者暗於通理一槩但曰宜久其任得非誦老生之常談而不推時變者乎夫列位分官緝熙帝載匪唯應務兼亦養才是以職事雖有小大間劇之殊而俱不可曠缺者蓋偹於時而用耳故記曰天子以騶虞為節樂官偹也唯經邦贊國之任則非有盛德不可以居故記曰設四輔及三公不必偹惟其人議者昧於明徵一槩但曰官無其人則闕得非守舊典之糟粕而不本事情者乎今內外羣官考深合轉陛下或言其已有次第須且借留或謂其未著功勞何用數改是乃循默者既以無聞而不進著課者又有成績而見淹雖能否或差而沈滯無異人之從宦積小成髙至於內列朝行外登郡守其於更歷多已長年孜孜慎修計日思進而又淹逾考限亟易星霜顧懷生涯能不興歎殊異登延之義且乖勸勵之方夫長吏數遷固非理道居官過久亦有弊生何者時俗常情樂新厭舊有始卒者其唯聖人降及中才罕能無變其始也砥礪之心必切其久也因循之意必萌加以盈無不虧張無不弛天地神化且難常全人之所為安得皆當是以分分而度至丈必差銖銖而稱至鈞必謬蒞職既久寧無咎愆或為姦吏所持或坐深文所糾偶以一跌盡隳前功至使理行不終能名中缺豈非上失其制而推致以及於斯乎故聖人愛人之才慮事之弊採其英華而使之當其茂暢而奬之不滯人於己成之功不致人於必敗之地是以鋭不挫而力不匱官有業而事有終此理之中庸故書以為法遷轉甚速則人心茍而職業不固甚遲則人心怠而事守浸衰然則甚速與甚遲其弊一也陛下俯徇浮議謂協典謨久次當進者既曰務欲且留缺員須補者復曰官不必偹則才彥何由進益理化孰與交修此所謂循故事而不擇可否之患也伏惟陛下憂勤務理夢想思賢體陶唐有虞聰明之德以敷求法太宗天后英邁之風以拔擢然而得人之盛尚愧前朝底乂之功未光當代良以七患未去三術未行而又睿察太深宸嚴太峻常人才器曷副天心故雖獲超升亦驟從黜廢人物殘瘁抑斯之由而議者莫究致弊之端但思革弊之策反以廣於進用為情故以梗於除授為精詳以避謗為奉公之誠以擲瑕為選士之要乃至稱毁紛糅美惡混并凡有遷升必遭掎托聖德廣納不時發明小人多言益敢隂詐以是眩惑目無全人進用之意轉疑汲引之途漸隘舊齒既凋敗幾盡下位或滯淹罕升故令官序失倫人才不長資望漸薄砥勵浸微髙卑等衰殆不相續臣以竊位屬當序才懼曠庶官亟黷宸扆昧識不足以周物微誠不足以動天徒勤進善之心轉積妨賢之罪慙惶交慮焚灼盈懷凡除吏者非謗刺之所生必怨咎之所聚宰臣獲戾多起於兹屢屢上干何所為利但以待罪鈞轄職思其憂兼迫於感恩願效之誠不得不冒昧言之耳其於裁擇用舍惟陛下圖之謹奏贄又論除裴延齡度支使狀奏曰右緣班宏喪亡臣今日面取進止今當此選總有四人杜佑盧徴李衡李巽並曾掌判財賦各有績用可稱資望人才亦堪奬任聖旨以淮南未可移動盧徴又近改官令臣擇一人與江西追取李衡者臣以支計之司當今所切常須銜制黠吏不可斯須闕人待追李衡數月方到或恐綱條弛紊錢物隱欺李巽近追到城請授給事中且令權判若處理稱職除户部侍郎如材不相當則待李衡到别商量處分既免曠廢於事又得閲試其能兩人之中必有可取陛下纍稱穩便許依所奏施行臣又退更詳思以為無易於此希顔適宣進止李巽知度支恐未相當且空與給事中朕更思量司農少卿裴延齡甚公清有才宜令判度支便進擬狀來其李衡亦從追取者伏以周制六官實司理本冢宰制國用量入為出司徒掌邦賦敷教恤人今之度支兼此二柄準平萬貨均節百司有無懋遷豐敗相補利害關黎元之性命費省繫財物之盈虛加以饋餉邊軍資給禁旅刻吝則生患寬假則容姦若非其人不可輕授裴延齡僻戾而好動躁妄而多言遂非不悛堅偽無恥豈獨有識深鄙兼為流俗所嗤頃列班行已塵清貫更居要重必斁大猷是將取笑四方貽殃兆庶尸祿之責固宜及於微臣知人之明亦恐傷於聖鑒伏願重循前議俯察愚誠更於四人之中選擇取其尤者庶諧僉屬不紊朝經延齡妄誕小人任之交駭物聽臣雖熟知不可猶慮所見未周趙憬眼疾漸瘳後日即合假滿待其朝謁乞更參詳去邪勿疑天下幸甚謹奏贄又論齊映齊抗官狀奏曰右希顔奉宣進止卿等所進齊映替李衡緣江南與湖南接近齊映齊抗既是當家同任方面事非穩便宜别商量者齊映齊抗同姓别房既非五服之親則與衆人無異聖朝推誠致理未嘗先事示疑曩之李臯李兼鄰接方鎮今之韓潭全義密邇軍城此例甚多無足為慮但以中朝要職常苦乏人至如映抗良才並當臺閣妙選臣等先請授映禮部聖旨令且向外商量儻許移鎮江西亦是漸加恩奬齊抗文學足用精敏罕儔掖垣之駮議司言南宫之掌賦承轄俾居其任皆謂當才若蒙追赴闕庭試加顧問察言稽行必有可觀可否之宜伏候敕旨帝嘗親擇吏宰畿邑而政有狀召宰相語皆賀帝得人兵部侍郎同中書門下平章事柳渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖德臣當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之憲宗元和三年翰林學士白居易論王鍔欲除官事宜狀奏曰右臣竊聞王鍔見欲除平章事未知何故有此商量臣伏以宰相者人臣極位天下具瞻非有清望大功不合輕授王鍔既非清望又無大功若加此官深為不可昨日裴均除平章事內外之議早已紛然今王鍔若除則如王鍔之輩皆生冀望之心矣若盡與則典章大壞又未感恩若不與則厚薄有殊或生怨望幸門一啓無可奈何臣又聞王鍔在鎮日不恤凋殘唯務差稅淮南百姓日夜無憀五年誅求百計侵削錢物既足部領入朝號為羡餘親自進奉凡有耳者無不知之今若授同平章事臣恐四方聞之皆謂陛下得王鍔進奉而與宰相也臣又恐諸道節度使今日已後皆割剝生人營求宰相私相謂曰誰不如王鍔邪故臣以為深不可也其王鍔歸鎮與在朝伏望並不除宰相臣尚未知所聞信否貴欲先事而言或恐萬一已行即言之無及伏惟聖鑒俯察愚衷謹具奏聞謹奏居易又奏論元稹左降狀曰右伏緣元稹左降事宜昨李絳崔羣等再已奏聞至今未聞宣報伏恐愚誠未懇聖慮未回臣更細思事有不可所以塵黷至於再三臣內察事情外聽衆議元稹左降不可者三何者元稹守官正直人所共知自授御史以來舉奏不避權勢只如奏李公佐等之事多是朝廷親情人誰無私因以挾恨或假公議將報私嫌遂使誣謗之聲上聞天聽臣恐元稹左降已後凡在位者每欲舉事先以元稹為戒無人肯為陛下當官執法無人肯為陛下嫉惡繩愆內外權貴親黨縱橫有大過大罪者必相容隱而已陛下從此無由得知其不可者一也昨者元稹所追勘房式之事心雖奉公事稍過當既從重罰足以懲違况經謝恩旋又左降雖引前事以為責詞然外議喧喧皆以為元稹與中使劉士元爭廳自此得罪至於爭廳事理已具前狀奏陳况聞劉士元踏破驛門奪將鞍馬仍索弓箭嚇辱朝官承前以來未有此事今中官有罪未見處置御史無過却先貶官逺近聞知實損聖德臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被淩辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞其不可者二也臣又訪聞元稹自去年已來舉奏嚴厲在東川日枉法收沒平人資産八十餘家又奏王紹違法給劵令監軍神柩及家口入驛又奏裴玢違敕旨徵百姓草又奏韓臯使軍將封杖打殺縣令如此之事前後甚多屬朝廷法行悉有懲罰計天下方鎮皆怒元稹守官今貶為江陵判司即是送與方鎮從此方便報怨朝廷何由得知臣聞德宗時有崔善貞密告李錡必反德宗不信送與李錡李錡大怒遂掘坑縱火燒殺崔善貞未數年李錡果反至今天下為之痛心臣恐元稹左降後方鎮有過無人敢言皆欲惜身永以元稹為戒如此則天下有不軌不法之事陛下無由得知此其不可者三也若無此三不可假如朝廷誤左降一御史蓋是小事臣何敢煩黷聖聽至於再三乎誠以所損者微所關者大以此思慮敢不極言陛下若以臣此言為忠又未能别有處置必不得已則伏望且令追制改與一京司間官免令元稹却事方鎮此乃上裨聖政下愜人情伏望細察事情斷在聖意謹具奏聞謹奏居易又論太原事三件一曰右嚴綬輔光太原事迹其間不可逺近具知臣前日對時已子細面奏今奉宣輔光已替嚴綬續追此皆聖鑒至明左右不能惑聽合於公議斷自宸衷內外人心甚為愜當其嚴綬早須與替不可更進緣與輔光久相交結軍中補署職掌比來盡由輔光今見别除監軍八人乍失依託或恐嚴綬相黨曲為妄陳軍情事宜之間須過防慮伏望聖恩速令貞亮赴本道便許嚴綬入朝二曰右貞亮元是舊人曾任重職陛下以太原事弊使替輔光然臣伏聞貞亮先充汴州監軍日自置親兵數千任三川都監日專殺李康兩節度使事迹深為不可違性自用所在專權若貞亮處事依前即太原却受其弊雖將追改難以成功其貞亮發赴本道之時恐須以承前事切加約束令其戒懼此事至要伏惟聖心不忘三曰右范希朝前在振武威令大行至今蕃戎望風畏伏況又勤儉信實所在士卒歸心今若太原要人無出希朝之右伏恐聖意慮其有年臣又訪聞希朝筋力猶堪驅使但且令鎮撫必愜軍情待其一二年間威制成立然後擇能者即必易守成規則雖老年事須且用其靈武比太原雖小亦是要鎮如納臣愚見伏恐便須擇人與希朝相代謹具奏聞謹奏居易又論嚴綬狀曰奉宣令依中書狀撰制除嚴綬江陵節度使右臣伏以趙宗儒衆稱清介有恆嚴綬衆稱怯懦無耻二人臧否優劣相懸宗儒自到江陵雖無殊政亦聞清淨境內頗安縱要改移即合便擇勝宗儒者且嚴綬在太原之事聖聰偹聞天下之人以為談柄陛下罷其節制追赴朝廷至今人情以為至當今忽再用又替宗儒臣恐制書下後無不驚歎兼邪人得計正人憂疑大乖羣情深損朝政臣前後奉宣撰制若非甚不可者亦不敢切論今此除授實甚不可伏望聖意更賜裁量其制未敢便撰伏待聖旨謹奏居易又論孟元陽狀曰奉宣令依中書狀撰制除孟元陽右羽林軍統軍仍封趙國公食邑三千户右臣伏以孟元陽溵水有功河陽有政自到澤潞戎事頗修但以老年事須與替比諸流輩事迹不同今所除官合加優奬昨者范希朝在太原日昏耄不理人情共知及除統軍衆猶謂屈今元陽事迹不同希朝又除統軍恐似更屈雖加封爵悉是虛名況元陽功效忠勤天下有數今以無能者一例除改無所旌别臣恐今日已後無以勸人以臣所見若改除金吾大將軍輕重之間實為得所只如柳惟晨李簡之輩有何功業合比元陽猶居此官動逾年嵗伏望聖慈以此裁量其制未敢依中書狀便撰謹奏帝嘗問前古王者所以治亂門下侍郎同中書門下平章事杜黃裳知帝鋭於治恐不得其要因推言王者之道在修己任賢而已操執綱領要得其大者至簿書獄訟百吏能否本非人主所自任昔秦始皇帝親程決事見嗤前世魏明帝欲按尚書事陳矯不從隋文帝日昃聽政衛士傳飱太宗笑之故王者擇人任而責成見功必賞有罪信罰孰敢不力孔子之稱帝舜恭已南面以其能舉十六相去四凶而至無為豈必刓神疲體勞耳目之察然後為治哉帝以黃裳言忠嘉納之皇甫鎛言利幸於帝隂藉左右求宰相户部侍郎崔羣數言其佞邪不可用既入對及開元天寶事羣因推言其極曰安危在出令存亡繫所任玄宗故初得姚崇宋璟盧懷慎蘇頲韓休張九齡則治用宇文融李林甫楊國忠則亂故用人得失所係非輕人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡相專用李林甫此理亂之所分也願陛下以開元為法以天寶為戒社稷之福也上命學士自今奏事必取崔羣連署然後進之羣曰翰林舉動皆為故事必如是後來萬一有阿媚之人為之長則下位直言無從而進矣帝嘗御浴堂北廊召學士李絳對上從容言曰朕觀前王任多賢才所以理即今日都無賢才可任何故也絳對曰自古及今帝王未有不任賢則理用邪則亂明著史傳不敢偹陳夫聖主理當代之人祇選當時之賢極其才分便可致理豈借賢於異代以理今日之人近代北齊任楊遵彥則理用髙阿那肱則亂隋代任髙熲則理用楊素則亂國家任房元齡杜如晦魏徵王圭姚崇宋璟則理用李義府許敬宗李林甫楊國忠則亂事狀橫於目前理亂存於史策夫致賢之路歷代不同大凡王者不以至尊輕待臣下不以已能蓋於凡器折節下士卑躬禮賢天下仰知聖意賢能之人方出是巖穴無晦迹之儔朝廷有佐時之器矣上曰何以知其必賢而任之乎對曰聖問至當誠為難知堯舜亦以知人為難況近代澆薄真偽不分固不易知也然以事小驗之必十得七八矣任官清廉無貪穢之迹當事堅正無阿容之私章疏諌諍無希望依違之茍在左右獻納無邪佞愈悅之辭言必及逺大行不顧財利如此則可謂近於賢矣若言必諂諛動關名利但攻人之短不揚人之美求己之售不量己之分觀望主意以希合為心逢迎君意以恩幸為志為主招怨為身圖利斯可謂之小人也驗之以行事參之輿議然後用之委用以後名聲相副則當任之既任之則當久之使代天下之績久而化成然後聖君垂拱而天下治矣賢者行理端直身寡黨援拔擢賢彥則小人怨謗杜塞邪徑則姦人搆陷制度畫一則貴戚毁傷忠正進用則諛佞攻擊夫用賢豈容易哉自非聖主明君懸鑒情偽不使毁謗得行疑似生隟盡其材器極其智用然後政化可得而興故齊桓公任管夷吾一則仲父二則仲父齊國大理是任之不疑也管仲對桓公曰既任君子而以小人參之此最害霸也古人以求賢不至則賢者不出故喻以蝸蚓之餌以求吞舟之鱗設釡鍾之祿以致濟代之器不可得也陛下但以數事驗之以言校之以實採之於衆任之以權則賢不肖得矣伏惟聖智詳察上曰卿言得之盡於此矣帝於延英殿謂宰臣曰古人言官不必偹惟其人卿各有親故則必有冗食者卿當與朕惜官以𢎞公道吉甫奏曰臣每用一官未嘗不訪於公議有堪奬進然敢奏陳至於親故不敢援引權德輿曰臣寡親故亦不敢進用今奉宣示更不敢有違聖旨絳曰至公之道實無親疏惟觀其人才與職位相當若有才雖是親故亦合進用昔建中初德宗臨御天下崔祐甫為相半年之內除官八百餘員德宗謂祐甫曰卿除授太多又聞多是親故何也祐甫對曰所問當與不當不看多之與少其是臣親故方諳知其才器尚不敢用其不諳者安敢與官德宗賞其言衆以謂所對公當至今人稱之天后朝命官猥多當時有車載斗量之語及至元中致朝廷赫赫有名望有事績者多是天后所進之人有言拔十失五猶得其半若拱默避情故之嫌使聖朝闕濟濟多士之美是依違容悅之臣非聖主至公委任之道也若才位實乖情故可驗臣豈敢逃責以妨賢路上曰如卿所言至公之道不論多少祗在至當爾卿當我倚任勿責斯言帝又問玄宗開元時致治天寶則亂何一君而相反耶絳曰治生於憂危亂生於放肆玄宗嘗歷試官守知人之艱難臨御初任用姚崇宋璟勵精聽納故左右前後皆正人也洎林甫國忠得君專引傾邪之人分總要劇於是上不聞直言嗜欲日滋內則盜臣勸以興利外則武夫誘以開邊天下騷動故祿山乘隙而奮此皆小人啓導從逸而驕繫時主所行無常治亦無常亂帝曰凡人舉事病不通於理追咎其失古人處此有道耶絳曰事或過差聖哲所不免天子有諫臣所以救過上下同體猶手足之於心膂交相為用但矜能護失常情所蔽聖人改過不吝願陛下以此處之御史中丞柳公綽與宰臣不協為所隂中帝對李絳忽云柳公綽逐突臺中公事不理我與一逺郡刺史以勵後人何如絳遂奏曰自柳公綽為中丞公議皆云稱職性素強直不依附於人衆傳掌權之人有忌者輒欲去之伏望聖意審詳根由上大悅曰誠如此且任之如有闕敗去之何晚元和七年以元義方為鄜坊觀察使義方媚事吐突承璀李吉甫欲自托於承璀擢義方為京兆尹李絳惡而出之義方入謝因言絳私其同年許季同以為京兆少尹故出臣鄜坊專作威福明日上以詰絳曰人於同年固有情乎對曰同年乃四海九州之人偶同科第情於何有且陛下不以臣愚備位宰相宰相職在量才授任若其人果才雖在兄弟子姪之中猶將用之況同年乎避嫌而棄才是乃便身非徇公也上曰善遂趣義方之官十三年以皇甫鎛程異同平章事裴度崔羣極諫其不可上不聽度恥與小人同列求退不許乃上疏曰鎛異皆錢穀俗吏佞巧小人陛下一旦置之相位中外駭笑況鎛在度支專以豐取刻與為務中外仰給之人無不思食其肉比者裁損江西糧料幾至潰亂程異雖人品庸下然心事和平可處繁劇不宜為相臣若不退天下謂臣無恥臣若不言天下謂臣負恩今退既不許言又不聼臣如烈火燒心衆鏑叢體所可惜者淮西蕩定河北底寧承宗斂手削地韓𢎞輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墮壞使四方解體乎上以度為朋黨不之省上謂宰相曰人臣當力為善何乃好立朋黨度對曰方以類聚物以羣分君子小人志趣同者勢必相合君子為徒謂之同德小人為徒謂之朋黨外雖相似內實懸殊在聖主辨其所為邪正耳憲宗時韓愈論孔戣致仕狀奏曰右臣與孔戣同在南省為官數得相見戣為人守節清苦議論平正今年才七十筋力耳目未覺衰老憂國忘家用意深逺所謂朝之耆德老成人者臣知戣上疏求致仕故往看戣戣為臣言已蒙聖主允許伏以陛下優賢尚齒見戣頻上二疏言詞懇到重違其意遂即許之此誠陛下仁德之至然如戣輩在朝不過三數人實可為國家愛惜自古以來及聖朝故事年雖八九十但視聽心慮茍未昏錯尚可顧問委以事者雖求退罷無不殷勤留止優以祿秩不聽其去以明人君貪賢敬老之道也禮大夫七十而致仕若不得謝則必賜之几杖安車七十求退人臣之常禮若有德及氣力尚壯則君優而留之不必年過七十盡許致仕也詩曰雖無老成人尚有典刑此言老成人重於典刑不可不惜而留也今戣幸無疾疹但以年當致仕據禮求退陛下若不聽許亦無傷於義而有貪賢之美況左丞職事亦極清簡若戣尚以繁要為辭自可别授秩崇而務少者今中外之臣有年過於戣尚未得退戣獨何人得遂其願人皆求進戣獨求退尤可賢重臣所領官無事不敢請對蒙陛下厚恩茍有所見不敢不言伏望聖恩特垂察納愈又舉張籍狀曰登仕郎守祕書省校書郎張籍右件官學有師法文多古風沈默靜退介然自守聲華行實光映儒林臣當司見闕國子監博士一員生徒藉其訓導伏乞天恩特授此官以彰聖朝崇儒尚德之道謹録奏聞伏聽敕旨愈為兵部侍郎舉韋顗自代狀曰中散大夫守大理少卿驍騎尉韋顗右伏準建中元年正月五日制常參官上後三日舉一人自代者前件官學識該達器量𢎞深朝推直道代仰清節顯映班序十五年餘夷險一致風猷益茂屈居少列未副羣情文昌政本侍郎官重尚德之舉顗宜當之乞回臣所授庶弭官謗愈為京兆尹舉馬總自代狀曰銀青光祿大夫檢校尚書右僕射兼户部尚書馬總臣伏以近者京尹用人稍輕所以市井之間盜賊未斷郊野之外疲瘵尚多前件官文武兼資寬猛得所纍更方鎮皆有功能若以代臣實為至當謹録奏聞謹奏穆宗長慶二年以裴度為司空東都留守諌官爭上言時未偃兵度有將相全才不宜置之散地上乃命度入朝六年或告泗州刺史薛謇有異馬不以獻事下度支使巡官往驗未返上遲之使品官劉泰昕按其事判度支盧坦曰陛下既使有司驗之又使品官繼往豈大臣不足信於品官乎臣請先就黜免上乃召泰昕還敬宗即位王廷湊屠牛元翼之家帝羞惋歎宰輔非其人使凶賊熾肆學士韋處厚上疏曰臣聞汲黯在朝淮南寢謀干木處魏諸侯息兵王霸之理以一士止百萬之師一賢制千里之難裴度元勳巨德文武兼偹若位巖廊委參決必使戎虜畏威幽鎮自臣管仲曰人離而聽之則愚合而聽之則聖治亂之本非有他術陛下當饋而歎恨無蕭曹今一裴度擯棄于外所以馮唐知漢文帝有頗牧不能用也帝感悟寶歷九年王璠等奏李德裕厚賂仲陽隂結漳王圖為不軌上怒甚路隋曰德裕不至如此果如所言臣亦應得罪乃以德裕為賓客分司而以隋代之不得面辭而去文宗太和三年路隋平章事言於上曰宰相任重不宜兼金榖瑣碎之務如楊國忠元載皇甫鎛皆姦臣所為不足法也上以為然於是裴度辭度支上許之四年上以鹽鐡推官姚朂能鞫疑獄命權知職方員外郎韋溫奏郎官朝廷清選不宜以賞能吏上乃以朂檢校禮部郎中仍充舊職楊嗣復曰溫志在澄清流品若有吏能者皆不得清流則天下之事孰為陛下理之恐似衰晉之風然上素重溫終不奪其所守宣宗召翰林學士令狐綯與論人間疾苦帝出金鏡書曰太宗所著也卿為我舉其要綯擲語曰至治未嘗任不肖至亂未嘗任賢任賢享天下之福任不肖罹天下之禍帝曰善朕讀此嘗三復乃已綯再拜曰陛下必欲興王業捨此孰先詩曰惟其有之是以似之進中書舍人襲彭陽男遷御史中丞再遷兵部侍郎河陽判官李商隱為節度使王茂先奏舉韓琮等四人充判官狀曰韓琮右件官早中殊科素推雅度弦柔以直濟伏而清頃佐憲臺且丁家難當喪而齒未嘗見既祥而琴不成聲逮此變除未蒙拔擢臣頃居鎮守琮已列賓僚謀之既臧剛亦不吐願稽中選榮借外藩伏請依資賜授憲官充臣節度判官假瓌右件官言思無邪學就有道屢為從事嘗佐正人加其富有文辭精於草𨽻雋而且檢通而不流臣所部稍逺京都每繁章奏敢兹上請乞以自隨伏請依資賜授憲官充臣節度掌書記裴蘧右件官魯國名儒雍鄉右族松寒更翠馬老不迷臣昔忝鑿門辟為記室屬辭而夙構無異論兵而故校多歸委以前籌見其餘地伏以前任大理評事已三十三箇月比於流輩已是滯淹伏請特授憲官充臣觀察支使夏侯曈右件官藏器於身為仁由己齊莊難犯徑挺不搖臣任切拊循務繁稽勾思留仙尉以重賓階伏請依資改授一官充臣節度巡官以前件狀如前臣四朝受任三鎮叨榮慕碣石之築宫廣延儒雅效西河之擁篲樂得賢才韓琮等並無所因依不由請託久諳才地堪列幕庭伏希殊私盡允誠請謹録奏聞天平節度使令狐楚奏舉杜勝等狀曰臣切見杜勝右件官流慶相門策名詞苑當仁罕讓見義敢為符彩極髙涯涘難挹臣前任已奏為判官臨事而每見公方與語而必相𢎞益今臣寄分團練任切訓齊將奉廟謨實在賔彥伏請賜守本官充臣團練判官趙晳右件官洛下名生山東茂族仁寶甚富天爵極髙妙選文場亟任侯國圭璋特達蘭杜芬馨今臣廉問大藩澄清列部藉其謀畫共贊朝經伏請賜守本官充臣觀察判官李潘右件官侯國馳聲賓階擅美口含言瑞身出禮門臣前任已奏為判官遇下而和易不流臨事而貞方有執今臣職參國政務切軍須實假平均以同計畫伏請賜本官充臣觀察支使盧涇右件官博涉曲經該覆流略自孔壁所壞汲塜之藏三篋能知五車盡讀加之文采兼以器能前者為臣屬僚嘗在州推獄明斷而不容吏敝哀矜而莫有人寃今者團練之司稽巡是切直思奬勸非敢用情伏請依資賜授法官充臣都團練巡守以前件狀如前伏以長人者必以吏分勞逸開幕者亦用士為重輕若不樹人何以報國況臣素無勳效謬竊寵榮至於賢材敢吝筐篚前件官並推賓彥堪贊藩條伏希殊私盡允誠請謹録奏聞後晉髙祖天福二年太府少卿邊光範上書曰臣聞唐太宗有言朕居深宫之中視聽不能及逺所委者惟都督刺史則知此官實繫治亂尤須得人今則刺史或因緣世祿或貢奉家財或微立軍功或但循官序實恐撫民無術御吏無方以此牧民而民受其賜鮮矣望選能吏以蘇民瘼用致升平奏入留中不出三年詔百僚各上封事中書舍人竇貞固疏曰臣聞舉善為明知人則哲聖君在位藪澤豈有隱淪昭代用材政理固無紊亂求賢若渴從諫如流鄭所以譽子皮魯所以譏文仲為國之要進賢是先陛下方樹丕基宜求多士乞降詔百僚令各司議定一人有何能識堪何職官朝廷依奏用之若能符薦引果謂當才所奏之官望加奬賞如乖其舉或涉徇私所奏之官宜加殿罰自然官由德序位以才升三人同行尚聞擇善十目所視必不濫知臣職在論思敢陳狂狷書奏帝深嘉之命所司著為令典後周世宗好拔竒俊有自布衣及下位上書言事者多不次進用兵部尚書張昭疏諫曰昔唐初劉洎馬周起於徒步太宗擢用為相其後柳璨朱朴方居下僚昭宗亦加大用此四士者受知於明王然太宗用之而國興昭宗用之而國亡士之難知如此臣願陛下存舊法而用人當以此四士為鑒戒世宗善之周世宗顯德元年以違衆議破北漢兵自是政無大小皆親決百官受成而已河南府推官髙錫上書諫曰四海之廣萬幾之衆雖堯舜不能獨治必擇人而任之今陛下一以身親之天下不謂陛下聰明睿智足以兼百官之任皆言陛下褊迫疑忌舉不信羣臣耳不若選能知人公正者以為宰相能愛民聽訟者以為守令能豐財足食者使掌金榖能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失為政之本乎不從六年世宗嘗問相於兵部尚書張昭昭薦李濤世宗愕然曰濤輕薄無大臣體卿薦之何也對曰陛下所責者細行也臣所舉者大節也昔張彥澤虐殺不辜濤纍疏以為不殺必為國患漢隱帝之世濤亦上疏請解先帝兵權夫國家安危未形而能見之此真宰相器也歷代名臣奏議卷一百三十一
