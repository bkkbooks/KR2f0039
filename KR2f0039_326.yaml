body:
  text: 歷代名臣奏議卷三百二十六明楊士竒等撰禦邉宋仁宗慶歷二年歐陽修知諫院論韓琦范仲淹乞賜召對陳邊事奏曰臣伏見自西鄙用兵以來陛下聖心憂念每有臣僚言及西事必皆傾心聽納今韓琦范仲淹久在陜西備諳邊事是朝廷親信委任之人況二人才識不類常人其所見所言之事不同常式言事者陛下最宜加意訪問自二人到闕以來只是逐日與兩府隨例上殿呈奏尋常公事外有機宜大處置事並未聞有所建明陛下亦未曽特賜召對從容訪問況今西事未和邊陲必有警急兼風聞北敵見在涼甸與大臣議事外邊人心憂恐伏望陛下因無事之時出御便殿特召琦等從容訪問使其盡陳西邊事宜合如何處置今琦等數年在外一旦歸朝必有所陳但陛下未賜召對此二人亦不敢自請獨見至如兩府大臣每有邊防急事或令非時召見聚議或各令互述所見或只召一兩人對見商量此乃帝王常事祖宗之朝並亦如此不必拘守常例也三年修乞令韓琦居中范仲淹在外上奏曰臣風聞如定等不久放還竊緣比來議論必未諧和須慮驕賊猖狂忿兵攻寇凡關防邊備正要枝梧伏覩朝旨已差范仲淹田況等為宣撫使今日風聞韓琦去仲淹已作參政欲自請行不知是否以臣愚見不若且遣仲淹速去琦與仲淹皆是國家委任之臣才識俱堪信用然仲淹於陜西軍民恩信尤為衆所推服今若仲淹外捍寇兵而琦居中應副必能共濟大事庶免後艱若陛下以新用仲淹責其展效則且令了賊一事俟邊防稍定不兩三月自可還朝既先弭於外虞可漸修於闕政今邊事是目下之急不可遲緩以失事機伏望斷自宸衷趣仲淹速去以備不虞修又論乞令宣撫使韓琦等經略陜西劄子曰臣竊聞已降中書劄子抽回韓琦田況等歸闕昨來琦等奉命巡邊本為西賊議和未決防其攻寇要為禦備今西方再來方有邀請在於事體必難便從邊上機宜正須處置仍聞韓琦田況各有奏狀言邊防有備請朝廷不須怯畏每事曲從竊以勝敗之間安危所擊料琦等如此奏來則邊事可知自有枝梧不至敗誤臣謂且令琦等在彼撫遏則朝廷與賊商議自可以持重不須屈就今議方未決中道召還則是使賊知朝廷意在必和自先弛備況事無急切何必召歸其召韓琦劄子伏乞速賜指揮抽回且令琦等在彼經略以俟西賊和議如何修又論乞詔諭陜西將官劄子曰臣風聞昊賊今次人來辭意極不遜順所請之事必難盡從事既不成則元昊必須作過朝廷須合先為禦備竊慮沿邊將帥見西人入朝惟望通好便生懈怠萬一西賊驟出忿兵擊吾弛惰則立見敗事乞速詔邊臣密諭與西賊辭未遜順必不通和之意各使先知絶其顧望早為準備庶不敗事仍慮邊將謂朝廷此時議雖未合若後次更來必須和好因此便無討賊之志仍乞便因詔諭示以激厲之言云朝廷以昊賊罪大意在討除今不許其和好者蓋以外有爾輩在邊必望破賊成功之意使其不生退心臣見唐武宗英武之主所任宰相李德裕最號有材當時用兵征伐指揮將帥處置事宜動以詔書約束勸厲故終成功業國家用兵以來未聞以賞罰號令激動人心使其竭力者此最宜留意修又論河北守備事宜劄子曰臣伏見朝廷方遣使與西賊議通和之約近日竊聞邊臣頻得北界文字來問西夏約和了與未了茍實如此事深可憂臣以謂天下之患不在西戎而在北敵縱使無此文字終須貽患朝廷契丹通好僅四十年無有纎介之隙而輒萌姦計妄有請求竊以彼固貪婪性本無饜遇強則伏見弱便欺見我無謀動皆屈就謂我為弱知我可欺故添以金繒未滿其志更邀名分抑使必從無事而來尚猶如此若更因西事攬以為功别有過求將何塞請此天下之人無愚與智共為朝廷寒心者也今若果有文字來督通和之事則臣謂敵人狂計其迹已萌不和則詰我違言既和則論功責報不出年嵗恐須動作茍難曲就必至交兵至於選將練師既難卒辦禦戎制勝當在機先臣竊怪在朝之臣尚偷安靜自河以北絶無處置因循弛慢誰復挂心豈可待敵使在廷寇兵壓境然後計無所出空務張皇而已哉今國家必謂兩意雖乖尚牽盟誓邊防處置未敢張皇以臣思之莫若精選材臣付與邊郡使其各圖禦備密務修完此最為得也況今邊防處置百事乖方惟有擇人最為首務今北邊要害州軍不過十有餘處於文武臣僚中選擇十餘人不為難得各以一州付之使其各得便宜如理家事完城壘訓兵戎習山川蓄糧食凡百自辦不煩朝廷經度以兹預備尚可枝梧至如鎮定一路最為要害張存昔在延州以不了事罷去今乃委以鎮府王克基凡庸輕巧非將臣之材而任定州其餘州郡多匪其人臣欲乞陛下特詔兩府大臣取見在邊郡守臣可以禦敵捍城訓兵待戰者留之其餘中常之材不堪邊任者悉行換易若秋風漸徑敵舋有端陛下試思邊鄙之臣誰堪力戰朝廷之將誰可出師當臣初授諫職之時見朝廷進退大臣陛下鋭意求治必謂羣臣自此震懾百事自此修舉西北二事最為大者自當處置不待人言及就職以來已數十日而政令之出漸循舊弊惟言事之臣拾遺補闕者勉強施行其一二至如講大利害正大紀綱外制四夷內紓百姓凡廟堂帷幄之謀未有一事施行於外者臣忝司諫諍豈敢不言伏望陛下不忘社稷之深耻無使敵國之交侵駿發天威督勵臣下仍乞詢問兩府大臣西鄙和與不和能保契丹别無辭説否茍有所説能以廟謀竒算沮止之否茍無謀以止之則練兵選將備邊待寇賊至而後圖能不敗事否臣願陛下勿謂去嵗六符之來可以賄解今而有請則事難從矣勿謂纍年西賊為患習以為常若此事一動則天下搖矣臣所言者社稷之大計也願陛下留意而行之修又論西賊占延州侵地劄子曰臣竊聞元昊近於延州界上修築城壘強占侵地欲先得地然後議和故楊守素未來而占地之謀先發又聞邊將不肯力爭此事所繫利害甚大臣料賊意見朝廷纍年用兵有敗無勝一旦計無所出厚以金帛買和知我將相無人便欲輕視中國一靣邀求賂遺一靣侵占邊疆不惟驕賊之心難從實亦為國之害不細今若縱賊於侵地立起堡寨則延州四靣更無捍蔽便為孤壘其賊盡據要害之地他時有事延州不可保守若失延州則關中遂為賊有以此而言則所侵之地不可不爭何況西賊議和事連北敵今人無愚智皆知和為不便但患國家許物已多難為中悔若得别因他事猶可絶和何況此侵地是中國合爭之事豈可不爭臣謂今欲急和而不顧利害者不過邊臣外憚於禦賊而內欲邀議和之功以希進用耳故不肯擊逐羌人力爭侵地蓋小人無識只茍目前榮進之利不思國家久逺之害是國家屈就通和只與邊臣為一時進身之利而使社稷受無涯之患陛下為社稷計豈不深思大臣為社稷謀豈不極慮伏望聖慈遣一使往延州命龐籍力爭取昊賊先侵之地不令築城堡寨若緣此一事得絶和議則社稷之福也臣仍慮西賊來人尚有青鹽之説此事人人皆知不可許亦慮小人無識急於就和者尚陳鹽利以惑聖聰伏望聖慈不納浮議修又論水洛城事宜乞保全劉滬等上疏曰臣近風聞狄青與劉滬爭水洛城事枷禁滬等奏來竊以邊將不和用兵大患況狄青劉滬皆是可惜之人事體須要兩全利害最難處置臣聞水洛城自曹瑋以來心知其利患於難得未暇經營今滬能得之則於滬之功不小於秦州之利極多昨韓琦等自西來聞有論奏非以水洛為不便但慮難得而難成今滬能得之又有成之之志正宜專委此事責其必成而狄青所見不同遂成舋隙其間利害臣請詳言國家近年邊兵屢敗常患大將無權今若更沮狄青釋放劉滬則不惟於狄青之意不足兼沿邊諸將皆挫其威此其不便一也臣聞劉滬經營水洛城之初奮身展效不少先以力戰取勝然後誘而服從乃是黨留諸族畏滬之威信今忽見滬先得罪帶枷入獄則新降生户豈不驚疑若使翻然復叛則今後邊臣以威信招誘諸族誰肯聽從不惟水洛城更無可成之期兼沿邊生户永無可招之理此其不便二也自用兵以來諸將為國立事者少此水洛城不惟自曹瑋以來未能得之亦聞韓琦近在秦州嘗欲經營而未暇今滬奮然力取其功垂就而中道獲罪遂無所成今後邊將誰肯為國家立事此其不便三也臣又聞水洛之戌雖能救援秦州而須藉渭州應副今劉滬既與狄青異議縱使水洛築就他時萬一緩急狄青怒滬異已又欲遂其偏見稍不應副則水洛必須復失此其不便四也緣此之故遂移青於别路則是因一小將移一部署此其不便五也此臣所謂利害甚多最難處置者也臣謂今宜遣一中使處分魚周詢等速令和解務要兩全必先密諭狄青曰滬城水洛本有所稟非是擅為役衆築城不比行師之際滬見利堅執意在成功不可以違節制加罪滬宜釋放朝廷不欲直放恐挫卿之威卿自釋之使感卿惠若他時出師臨陳有違進退之命者任卿自行軍法然後密諭滬曰汝違大將指揮自合有罪朝廷以汝於水洛展效望汝成功故諭青使赦汝責爾卒事以自贖俟水洛功就則又戒青不可因前曽異議堅執不修惟幸夫之遂已偏見今後水洛緩急尤須極力應副萬一小有疏失則是汝挾情故陷之必有重責如此則水洛之利可成蕃户之恩信不失邊將立事者不懈大將之威不挫茍不如此未見其可蓋罪滬既不可罷水洛城又不可沮狄青又不可事關利害伏望聖慮深思修又上疏曰臣伏見朝廷近為修水洛城事雖已差魚周詢等就彼相度風聞周詢近有奏來為水洛蕃族見狄青枷取劉滬等因致驚騷周詢却乞將帶滬等往彼以此足驗劉滬能以恩信服彼一方朝廷必知水洛為利而不欲廢之非滬守之不可然滬與狄青尹洙已立同異難使共了此事臣謂必不得已寧移尹洙不可移滬尚慮議者必謂不可因小將而動大將今若但移洙而不動狄青即不是特移大將矣若却移路分更升差遣或召拜他官茍不類前後因事移替之人即不是因滬被移矣如此則於洙無損於滬獲全其功於邊防利便三者皆獲其利若曲為尹洙狄青却將立功將校輕沮則其害有三大凡文武官常以類分武官常疑朝廷偏厚文臣假有二人相爭實是武人理曲然武人亦不肯服但謂執政盡是文臣遞相黨護輕沮武士況今滬與洙爭而滬實有功效其理不曲若曲罪劉滬則沿邊武臣盡鼓怨怒其害一也自有西事以來朝廷擢用邊將極多能立功效者絶少惟范仲淹築大順城种世衡築青澗城滬築水洛耳臣亦聞三者惟滬尤為艱辛是功不在二人之下今若曲加輕沮則今後武臣不肯為朝廷作事其害二也滬若不在水洛則蕃族恐他人不能綏撫别致生事則今後邊防永不能招緝蕃部其害三也今三利三害其理甚明但得大臣公心不於尹洙曲有黨庇則不與邊防生患此繫國家利害甚大伏望聖意斷而行之修又論西北事宜上疏曰臣昨在河東聞北敵事宜説者多端而少實其役兵動衆修城掘壕凡所興為則有蹤迹昨三月四月之間於北界地名大栁谷銀甕口與蕃族相殺契丹纍敗折却主將數人見今抄點中軍秋冬必大交戰此亦説者多同而不虛惟云夾山部落叛歸元昊契丹與西賊相攻又云西賊見在河灣會劄寨兵馬尤多或云二敵詐謀欲合而攻我此一事則説者雖多而以人情料之皆不可信自西賊叛我以來更事契丹甚謹蓋已與中國交爭則屈已事鄰乃其常理二敵自來未聞舋隙而忽納夾山小族反與契丹立為大敵但恐元昊黠羌不為此事以此言之不可信也契丹若寇邊鄙當先自河北不應便出河東若云出吾不意則兵舋未成必未突然入吾險地是北敵必不攻河東矣西賊二年之間纍次遣人通好國家過當許物已多今盟約垂成而忽聞契丹數百里之路﨑嶇勞師入吾險固以此而言是西賊必不攻河東此其不可信者也然北戎抄點人馬聲張已久今漸向秋必已聚集邊臣但見敵兵聚在界上不得不至驚疑惟在朝廷料敵制謀養威持重不為輕發使敵不可窺則得計矣其密為禦備次第臣今具管見畫一如後一據今事宜不問北敵攻夾城與元昊但不過邊人自相攻耳然敵兵在我境上不可不為支準惟當持重以待未宜便若寇至而大集窮邊虛成自擾但訓兵練卒於并欣嵐憲屯結以俟太原去欣州一日半可至欣州去代州一日半可至嵐州去岢嵐一日中可至憲州亦然今以兵屯欣并而應援代州屯嵐憲而應援岢嵐賊至則使代州岢嵐堅壁清野待其師老徐以欣嵐等兵擊之此用兵之法也如此則兵來不失應敵不來不至虛驚其代州岢嵐但用去年防秋兵數可矣惟治器械擇將帥此非倉卒可辦宜急為之具一河東沿邊州軍器械全然不堪臣昨到彼見逐處弓弩無十數枝可施用者問其何故云為省司惜筋膠支請不得縱支得卭角短筋碎不堪使用久無物料修治是致廢壞臣亦知京中筋膠角絶少然若遍支與諸州軍即恐不及欲乞且只支與沿邊州軍仍乞選差幹事官逐州自遣一員上京支請便令自監修補其諸州木羽箭臣曽逐色用草人被甲去三十步以硬弩射之或箭幹飛掉不至或箭頭卷折不入此乃臨陳誤事之物十無一二堪者惟舊竹箭雖翎損鏃生秀射之亦能入甲又數目不多亦乞委官揀點修換一代州知州康德輿老懦不濟事臣方欲到京奏乞替却近知已差張元然德輿却充并代鈐轄只此職亦非德輿所堪乞與一近裹小處知州鈐轄别選差人一代州諸寨主監押三十餘員內無三四人能幹而曉事者伏乞早行替換仍乞於近日臣寮準密院劄子舉到堪充將領人內差充寨主監押一岢嵐軍地接草城川口無險可恃而城小壕淺須合增城浚壕乞降指揮下河東那打白草廂軍及本軍係役兵士早併力修葺臣曽狀奏乞米光濬且令知軍蓋光濬已知彼中次第當事宜之際若李緯乍到恐處事未盡合宜又緯必非岢嵐久住之人其米光濬伏乞檢會臣前奏施行修又論麟州四議疏曰臣昨奉聖旨至河東與眀鎬商量麟州事緣臣未到間鎬已一靣與施昌言等先有奏議尋準樞密院劄子備録鎬等所奏令臣更切同共從長相度臣遂親至河外相度利害與明鎬等再行商議乞那減兵馬人數可以粗減兵費已具連署奏聞此外臣别有短見合盡條陳其利害措置之説列為四議一曰辨衆説二曰較存廢三曰減寨卒四曰委土豪如此則經久之謀庶近禦邊之䇿謹具畫一如後一曰辨衆説者臣切詳前後臣寮起請其説有四或欲廢為寨名或欲移近河次或欲抽兵馬以減省饋運或欲添城堡以招輯蕃漢然廢為寨而不能減兵則不若不廢茍能減兵而省費則何害為州其城壁堅完地形高峻乃天設之險可守而不可攻其至黃河與府州各才百餘里若徙之河次不過移得五七十里之近而棄易守難攻之天險以此而言移廢二説未見其可至如抽減兵馬誠是邊議之一端然兵冗不獨麟州大弊乃在五寨若只減麟州而不減五寨與不減同凡招輯蕃漢之民最為實邊之本然非朝廷一力可自為必須委付邊臣許其久任漸推恩信不限嵗年使得失不繫於朝廷之急而營輯如其家事之專方可收其逺效非二年一替之吏所能為也臣謂減兵添堡之説近之而未得其要二曰較存廢者今河外之兵除分休外尚及二萬大抵盡河東二十州軍以贍二州五寨為河外數百邊户而竭數百萬民財賊雖不來吾已自困使賊得不戰疲人之䇿而我有殘民斂怨之勞以此而思則似可廢然未知可存之利今二州五寨雖云空守無境之人然賊亦未敢據吾地是尚能斥賊於二三百里外若麟州一議移廢則五寨勢亦難存兀爾府州便為孤壘而自守不暇是賊可以入據我城堡耕牧我土田夾河對岸為之巢穴今賊在數百里外沿河尚費於防秋若使夾岸相望則泛舟踐氷終嵗常憂寇至沿河內郡盡為邊戍以此而慮則不可不存然須得存之之術三曰減寨卒者臣勘會慶歷三年一年用度麟州用糧七萬餘石草二十一萬餘束五寨用糧一十四萬石草四十萬餘束其費倍於麟州於一百二十五里之地列此五寨除分兵歇泊外尚有七千五百人别用二千五百人負糧又有并欣等十州軍百姓輸納外及商旅入中往來其冗長勞費不可勝言逐寨不過三五十騎巡綽伏路其餘坐無所為蓋初建五寨之時本不如此寨兵各有定數建寧置一千五百人其餘四寨各止三百至五百今之冗數並是後來增添臣謂今事宜稍緩不比建寨之初然且約舊數尚不至冗費臣請只於建寧留一千人置一都巡檢其鎮川中堠百勝三寨各留五百其餘寨兵所減者屯於清塞堡以一都巡檢領之緣此堡最在近東隔河便是保德軍屯兵可以就保德軍請糧則不煩輸運過河供饋若平日路人宿食諸寨五百之卒巡綽有餘或些小賊馬則建寧之兵可以禦捍若賊數稍多則清塞之兵不失應援蓋都不去百里之內非是減兵但那移就食而已如此則河外省費民力可紓四曰委土豪者今議麟州者存之則困河東棄之則失河外若欲兩全而不失莫若擇土豪委之自守麟州堅險與兵二千其守足矣況所謂土豪者乃其材勇獨出一方威名既著敵所畏服又能諳敵情偽凡於戰守不至乖謀若委以一州則其當自視州如家繫已休戚其戰自勇其守自堅又其兵既是土人與其風俗情接人賴其勇亦喜附之則蕃漢之民可使漸自招集是外能捍賊而戰守內可輯民以實邊省費減兵無所不便比於命吏而往凡事仰給於朝廷利害可倍也必用土豪非王吉不可吉見在建寧寨蕃漢依吉而耕於寨側者已三百家其材勇則素已知名況其官序自可知州一二年間視其後效茍能善守則可世任之使長為捍邊之守右臣所陳乃是大計伏望聖慈特賜裁擇若可以施行則紓民減費之事容臣續具條列三年集賢校理余靖奏論元昊請和當令權在我疏曰臣切聞賊昊差私置官入境相次到闕欲與朝廷通和事伏以息兵減費逺人順命國家大臣至於邊將咸欲息肩以休士卒臣愚料之以謂挫契丹之氣折西羌之鋭不如不和最為得䇿假如元昊貪我財貨甘心臣伏比之為禍大於今日臣請别白言之伏自國家用兵五年已來三經大戰軍覆將死財用空虛天下嗷嗷困於供給今乃因契丹一介之使馳其號令遂使二國通好君臣如初吾數年之辱而契丹一言解之若契丹又遣一介有求於我以為其謝其將何詞以拒之若國家又有所惜必將興師責我謂之背約則北鄙生患二境受敵矣矧西戎自僣名號未嘗挫折何肻悔禍輕屈於人今若因其官屬初來未有定約但少許之物無滿其意堅守名分以抑其僣雖賜之甘言彼必不屈則吾雖西鄙受敵而北方未敢動也何以知之昨梁適使北之時彼主靣對行人遣使西邁意氣自得自言指呼之間便令元昊依舊稱臣則是契丹之威不能使西羌屈伏彼自喪氣豈能來責故臣謂今之不和則吾雖西鄙受敵而契丹未敢動也若便與西戎結盟則我之和好權在北敵中國之威於是盡矣契丹責我則二鄙受敵其憂深矣伏願陛下與執政大臣密謀而深思之無令陷彼計中則天下社稷幸甚必不得已而與貨財須作料錢公使名目便將靈鹽銀夏作兩鎮則賜豫倍於往時而君臣名分不改矣或欲速成和好而屈名分則天下共耻之雖強兵在境有血戰而已矣若他年賊自有舋來求和者權在我而不必拒之也惟陛下裁之靖又乞韓琦兼領大帥鎮秦州狀曰臣準五月七日詔勑節文今後三館臣寮如有邊防要切機宜及朝廷大事並令具實封奏臣竊聞已降敕命差韓琦等充涇原等四路都部管韓琦范仲淹並於涇州駐劄仍差文彥博知秦州者臣聞兵之勇怯在乎將勝敗在於氣竊見賊昊侵軼邊鄙以來大戰者三矣延安之役人猶勇鬪好水之師陷敵伏中㝎川之敗不戰而走此皆賊乘屢勝之氣而吾將勇怯之分也臣觀賊昊雖曰小羌其實黠虜其所舉動咸有次序必先剪我枝附壞我藩籬先攻易取之處以成長勝之勢金明之族最近賊庭故先取之豐州之地援兵難集故次取之涇原將帥軟懦故又取之此乃賊知先後之計也臣竊料沿邊諸郡最富最實者秦州耳賊所以盤旋未敢攻秦州者三焉邈川尚強雜羌未附而韓琦為守也此賊昊之所畏朝廷之所恃也今可憂者邈川唃族為賊所侵漸已挫折一恃去矣其餘雜羌附漢者未必全歸賊者未必誅向我堅者往往族滅而不能救今雖受我封賜賊兵若至其肻死力而援我乎此二恃去矣若使韓琦且守秦州招懷部落撫以恩信訓勵士卒聳以忠果猶須擇材勇以為鬪將庶幾全輯三恃使賊有所畏可也今乃專委文彥博許懷德守此一路臣深為朝廷憂之臣亦非敢橫議沮事但以三軍所恃者將耳韓琦數年在邊雖未成功羌賊知名士卒信服今一旦使文彥博代之恩信未洽緩急有難兵將肻用其命乎且彥博新進懷德無聞羌賊固將輕之矣今雖以韓琦范仲淹在涇原遙節制諸路以為聲援但益秦州之憂耳賊若出其上策以一軍守瓦亭則涇渭之師不得南矣以一軍趨隴坻則岐隴之兵不復西矣以一軍直搗秦州而援兵不至族羌外附則秦州非我之有也賊若出其下策前驅雜羌所在掠奪則吾之救兵雖可至勝負未可知也若謂賊輕去巢穴以為不然此所以出我不意也臣以為當今之計不若急遣韓琦兼領大帥歸鎮秦州增兵故關以扼衝要諸路有急不妨應援此最安危之機也益涇州之戍以當兵衝以成輔車之勢一大將居之足矣更宜擇材勇以代懷德亦最急也賊自屈強以來未嘗挫折若得勇將以摧其鋒則庶可屈伏矣朝廷措置大事臣妄言其間甘俟鼎鑊靖又奏論狄青不可獨當一路狀曰臣近奏狄青知渭州尹洙知晉州不協物議未蒙朝旨者臣切謂若非大臣全無憂邊之心即是微臣當坐罔上之罪二者之間必有一焉臣伏思陜西四路惟涇原山川寬平易為衝突若戎馬之勢不遏則為關中之憂關中之憂則天下之憂也故國家自有西事以來以涇原為統帥之府前嵗葛懷敏喪師之後朝廷欲差范仲淹往彼綏輯尚先遣中使諭之以意其時仲淹不敢獨當此任乞差韓琦同往朝廷遣韓琦范仲淹同共經略又差張亢知渭州狄青同為一路部管琦等雖名四路招討其實只是營度涇原亢領州寄青為鬪將即是朝廷憂涇原如此之深也及至去年召琦仲淹赴闕又使中使問仲淹何人可以為代於是差鄭戬替韓琦仲淹充四路招討尹洙代張亢知渭州至秋又差韓琦田況往彼宣撫則固知朝廷未嘗忘涇原也今年已罷鄭戬歸永興又移尹洙知晉州遂令狄青一身兼領三人職事且仲淹號為最曉邊事不敢獨當孫沔亦是朝廷精選而託疾不行是涇原有可憂之勢豈青匹夫獨能當之仲淹豈忘之乎大臣必謂韓琦仲淹二年涇原成規可守故專任狄青足以了事臣實以為不然伏自懷敏覆沒之後兵氣沮喪未有小勝百姓遭劫掠之餘雖欲歸復而生業未備幸賊未至而謂全實議和未定而早懈怠抽減將帥軍民之心尚何所望而敢自安乎且向來於生户界中修一城寨尚有劫奪殺傷不能相保賊馬若至誰復安心是大臣全無憂邊之心明矣初緣昨者狄青尹洙倉猝行事上煩朝廷臣竊料朝廷之意謂此二人徇偏見之情以倡和故換孫沔在青之上欲令庶事在所商量今來只因孫沔稱病遂將涇原路兵馬專令狄青進止豈天下之廣更無一竒才可以知渭州與青共事者是大臣不思之甚也況始因行事猝暴朝廷不欲問罪遂得專兵柄不知是何賞罰且緣青驟自行間未著大功蒙恩超擢又其為性率暴鄙吝偏裨不伏所以劉滬敢罵尹洙乳臭狄青一介耳今來以青獨當一路豈不憂偏裨不伏而敗國家之事乎雖傳聞仲淹請行若朝廷從之不過夲州駐劄大節須别得渭州知州與青緩急商量戰守之勢又況龐籍守延猶與王信等同事今來反不及青獨當最難一路無乃籍等羞與為伍以懷怨望乎朝廷乏賢一至於此伏乞陛下詢問大臣如或將來賊馬衝突涇原狄青果能保必勝之勢不貽朝廷之憂則臣甘先就誅竄以當罔上之罪四年靖改起居注論契丹請絶元昊貢獻事上疏曰臣伏覩契丹人使耶律元衡今月二十四日朝見訖中外臣寮但聞報西征事又知河東邊奏甚急無不憂懼雖北邊事宜云征夾山部落且夾山小族而契丹舉國征之事勢甚大恐似别有謀者臣切思之朝廷於西北大事前後處置失錯所以敵人乘舋肆其憑陵今者使來必此之故切緣元昊世稱藩臣一旦僭叛招攜出討當自圖之而乃屈中國之威假契丹之援借人之勢權在他人此謀始之失也臣去年在契丹彼主親與臣言梁適去時云伺西事了遣人來謝及以元昊表示臣俾知元昊畏服之意又與臣言乾元節信使回日請仔細報來及臣歸朝首言此事只緣吕夷簡病退梁適差出便乃隱諱云無此言暨乾元節信使蕭忠孝來問館伴張錫錫終不與言元昊商量次第朝廷當昊叛時則遣使告之及其和約欲就則問而不對必疑朝廷有異議矣此始末不同之失也臣今月十六日曽具奏陳欵其所謀四事一曰借邊兵二曰借邊粟三曰假數年之物四曰絶元昊之和遙度敵情在此而已必若假借財物拒之有詞唯與元昊絶和最難處置臣切計之遜詞以謝北敵緩詞以欵西戎茍紓嵗月之禍誠當今可行之策也然臣愚慮兵之禍自此起不宜處置更有失錯今若徇北敵而絶西戎亦有兵禍納西戎而違北敵亦有兵禍二敵連謀共為矛盾之勢北人才去西人必來拒納之間動皆有礙擇禍就輕守之以信使曲不在我即得其要矣必若棄元昊以為外虞堅絶其約使契丹不能反覆而邀功此最久安之策恐謀者不能終之且元昊所以抗中國者僭尊號改年名不稱臣不奉表此其屈強之勢也今皆捨去而歸我矣三年謀之而一朝絶之及其既去北敵使至將又招之凶狠之性豈不懷忿此起兵之禍也契丹所以取重於中國者亦欲成和好之事專與奪之權也今西戎偃蹇而不從朝廷沉吟而不報及其使我絶之而遽即成之桀驁之氣豈不懷怒此亦起兵之祻也然而彼欲舉兵而使我絶約皆契丹之狡謀耳臣切料北敵因弋獵之勢為舉兵之名欲邀成功以德於我若報之曰天下之民一也本朝之兵尚不忍令其戰鬪以趨死傷之禍況鄰國之兵冒白刃而不憂其傷非所以兼愛南北寧失一小蕃不可煩兄弟之國蕭偕回日曽逹此誠且未嘗乞師無煩大舉若元昊自有舋隙違忤北朝今日出師非復預議又元昊使來每稱北朝之意早緣名體未順難以從之近者稱本朝正朔去羌人僭偽之號而稱臣矣只以事要久逺故須往復商量今若事體準前固當拒絶但業已許其每事恭順則受其來歸若來而拒之則似失信且中國以信自守故能與四海會同儻失信於西人誰復信其盟約若北朝怒其叛而伐之南朝因其服而捨之共成德美亦春秋之義也彼雖無知固當聞此而悛心矣唯重幣輕使以結之使其有邀功之心則必緩圖我之患臣又聞前嵗契丹解甲後幽州亦遭劫掠財物迫奪婦女發掘墳墓燕人苦之今河東近邊恐有衝突須作隄備以戒不虞臣嘗觀契丹氣陵中國捃拾事緒以起舋端歸於強弩相射利劒相擊而已不可不早備也唯陛下圖之靖又論元昊所上誓書上疏曰臣竊聞國書到闕議者紛紛以不靖深入為書中微詞不敢與元昊誓書緩行封册之禮以觀其變此皆遊談之過也臣昨在契丹預聞書意彼主親與臣言如行封册之請遣使深入軍前恐契丹軍馬到彼誤有殺傷即别無微意臣又詳觀二國形勢唯有速行封册使元昊得以專力東向與契丹爭鋒二國兵連不解此最中國之利設若二國交兵雖有勝負契丹不能止我之和謀已先定故也假如契丹戰勝元昊伏罪則我與元昊通和契丹自以為功又如契丹戰敗則我與元昊通和在前自非觀望加以契丹意在讎賽元昊豈復妄怨於我此皆理之必然者也儻或朝廷懷猶豫之意謀不早定則事久變生非我之利切以元昊天生凶狡非獨今日知之且以契丹強盛尚敢侮慢況於中國數戰屢勝徒誘於利乃肻和耳豈是心服若知我逗遛以待其變則翻然屈伏於契丹而專力肆忿為患於我未必輕於契丹也臣之愚慮以謂封册元昊在二國勝負未分以前則元昊有以為恩契丹無以為詞今若謀慮未㝎二國交兵萬一契丹戰敗而遣使堅來止我之和則何詞以拒之不如先降敕命差㝎夏國封册使俾其知之以堅西賊之心專敵契丹此則鬪二敵之策也惟早圖之三年賈昌朝上備邊六事奏曰臣竊惟太祖初有天下鑒唐末五代方鎮武臣土兵牙校之盛盡收其權當時以為萬世之利及太祖所命將帥率多攀附舊臣親姻貴胄賞重於罰威不逮恩而猶仗神靈稟成算出師禦寇所向有功自此已來兵不復振近嵗因僥幸子弟飾廚傳沽名譽不由勳效坐取武爵者多矣其末不過利轉遷之速俸賜之厚爾禦侮平患何望於茲然乘邊鄙無事尚得以自容昨西羌之叛驟擇將領鳩集士衆士不素練固難指蹤將未得人豈免屢易以屢易之將御不練之士故戰必致敗此削方鎮兵權過甚之弊也且親舊恩幸已任軍職者便當為將兵謀戰法素不知曉一旦付千萬士卒之命使庸人致之死地此用親舊恩幸之弊也臣謂守鎮之地無數更易管軍并刺史以上官秩宜審其所授以待有功如楊崇勳李昭亮輩恩幸之人尚在邊任宜速别擇人代之此臣所陳救弊之端也方今備邊之尤切者凡六事其一曰馭將帥古帝王以恩威馭將帥於內將帥以賞罰馭士卒於外故軍政行而大功集乾德中詔王全斌等伐蜀是冬大雪太祖皇帝著暖帽被貂裘御講武殿氊幄顧左右曰今日此中寒不能御況伐蜀將士乎即脫所服裘帽遣中使馳騎往賜全斌此御以恩也又曹彬李漢瓊田欽祚等討江南召彬立於前漢瓊等立於後援匣劒曰副將而下不用命者得以專戮之漢瓊等股栗而退此御以威也今命將帥心先疑二非近侍不信非姻舊不委錫與金帛巨萬而心無感悅者以例所當得也蓋向來錫與一皆用例如舉兵之際須特出非常然後可以動其心也又陜西四路自部管而下鈐轄都監巡檢之屬軍政必相參謀計之未成事已先漏彼可則我否上行則下戾雖有主將不專號令故動則必敗也請自今命將去疑二推恩意捨其小節責以大效爵賞威刑皆得便宜從事偏裨而下有不聽令者以軍法論至於管𣙜賦稅府庫之物皆得而用之如太祖監方鎮過盛雖朘削武臣之權然邊將一時賞罰及財用則皆聽其專有功則必賞有敗則必誅此所以馭將之道也其二曰復土兵今河北河東強壯陜西弓箭手之屬皆土兵遺制也且敵國居苦寒沙磧之地惡衣食好馳射自古御寇却敵非此不可然河北鄉兵其廢已久陜西土兵屢為賊破其存者十無二三臣以為河北河東強壯除已詔近臣詳定法制外每因閲習則視其人武力兵技之優劣又擇其家丁夫之壯者以代老弱每鄉為軍其能絶類者籍記其名姓而遞補之陜西蕃落弓箭手貪召募錢物利月入糧俸多就點刺混為營兵今宜優復田疇安其廬舍使力耕死戰世為邊用則可以減屯戍而省供餽為不易之利內地州縣增置弓手亦當約如鄉軍之法而閲試之其三曰訓營卒太祖下令諸軍食無肉衣無帛營舍之門有鬻酒肴者則逐去之士卒有服繒綵者則詰責之異時被甲鎧冒風霜攻苦服勞無不一以當百今營卒驕惰臨敵無勇此殆素所資用之過也舊例三年轉資謂之落權正授者雖未能易此制即不須一例使為部管鈐轄宜於其間擇實有才勇可任將者授之又今之兵器類多詭狀造之不精且不適用虛費民力宜按八陳之法依五兵之用以時教習之使啓殿有次序左右有形勢前却相附上下相援令之曰失一隊將則合隊皆誅何患衆不為用乎其四曰制敵人今敵人蕩然與中國通北方諸國則臣契丹其西諸國則臣元昊而二敵合從以犄角中國之勢就使西戎來服不免與之重賄是朝廷嵗遺二敵不可勝計古之備邊西則金城上郡北則雲中鴈門今自滄之秦綿亘數千里非有山海峻深之阻獨恃州縣鎮戍爾凡嵗所供贍又不下數千萬以天下嵗入之數才可取足而一榖不熟則或至狼狽也契丹近嵗兼用燕人治國建官一同中夏昊賊據河南列郡而行賞罰善於用人此中國之患也宜度西戎諸國如沙州唃廝明珠滅藏之族近北如黑水女真髙麗新羅等處皆舊通中國今為二敵隔絶可募人往使誘之來朝如此則二敵必憾於諸國矣憾則為備為備則勢分此中國之利也其五曰綏蕃部且屬户者邊陲之屏翰也如延有金明府有豐州皆戎人內附之地朝廷恩威不立撫馭乖方比為強敵脅從而塞上諸州藐焉孤壘蕃部既壞土兵亦衰恐未有破敵之期請令陜西諸路緣邊知州軍皆帶安撫蕃部之名多設方略務在招集財賦法令得以自專擇其族盛而有勞者以為酋帥如河東折氏庶可為吾藩籬之固矣其六曰明探候古者守封疆出師旅居則有行人覘國戰則有前茅慮無其審謹若此太祖命李漢超鎮關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠領𨽻州郭進控西山武守琪守晉陽李溥謙守隰州李繼筠鎮昭義趙贊領延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武管𣙜之利悉輸軍中仍聽貿易而免其征稅召募勇士以為間諜蕃夷情狀無不預知者二十年間無西北之憂善用將帥精於覘候之所致也今西鄙刺事者所遺不過數千錢但略涉境上盜聽傳言塞命而已故敵情賊狀與夫山川道路險易之利勢絶而莫通夫踐不測之戎入萬死之地覘伺微密探索機會非有重賂厚賞孰肻自效乎願鑒藝祖將帥之制邊臣財用一切委之專使養勇士為牙爪而臨戰自衛無殺將之辱募死力為覘候而坐知敵情免陷兵之耻也歷代名臣奏議卷三百二十六
