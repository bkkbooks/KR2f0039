body:
  text: 歷代名臣奏議卷二百七十七明楊士奇等撰國史宋髙宗時起居舍人張孝祥上奏曰臣聞神宗皇帝相王安石用私意作日録一時政事美則歸已陳瓘以死爭之著為尊堯集日録辨等書忠臣義士感激增氣恭惟陛下躬履艱難濟登休治寶慈與儉仁民愛物聖德之盛固已聿追先烈而故相信任之專禮遇之隆又非特如安石受知於神祖也臣竊謂政事舉措號令設施一皆蔽自聖斷故相或能將順贊襄而已臣懼其作時政記亦如安石專用已意掠美自歸掩陛下之聖明私羣臣之褒貶日厯之官因取其說著於簡策大非尊戴君父傳信萬世之義臣實恐懼仰惟陛下既遴選史臣付以論撰欲望駿發明詔再取去嵗已前臣寮修過日歷詳加是正審訂事實貶黜私說發明聖德庶幾作宋一經􅊞六為七垂之無窮天下幸甚起居郎兼中書舍人劉才邵上奏曰自昔有天下國家者所以記言動制作示勸戒以貽後世莫不有史動則左史書之若春秋是也言則右史書之若尚書是也至於禮樂刑政因革損益因時不同則後之人從復修之以備參訂若禮經所載是也三者之法相須以成闕一不可唐虞三代之盛典章文物炳然見於簡牘之間豈無所自而然哉至左丘明采諸國之史因經立傳而言動所記合為一書司馬遷網羅古今以作史記遂變編年之法班固而下因祖述之一代典章雖見於志而以理難詳載遺落者多至唐正元間蘇冕始為㑹要考其纂述之意豈非小補由此觀之後之為史者實録以存春秋編年之法正史以循遷固記事之舊而㑹要以追法禮經之意豈可偏廢哉恭惟國家聖聖相承制作明備陛下光昭先功欽若成憲纍朝大典既已全備惟是㑹要肇自於建隆續修於熙寧凡三百卷而元豐元年已後近因邇臣建白已頒明詔命館職之臣載加讎校矣然自元祐元年以後尚未修纂臣愚欲望聖慈特降睿㫖許令館職讎校舊本畢日接續編類史館修撰常同上疏論神哲二史曰章惇蔡京蔡卞之徒積惡造謗痛加誣詆是非顛倒循致亂危在紹聖時則章惇取王安石日録私書改修神宗實録在崇寧後則蔡京盡焚毁時政記日厯以私意修定哲宗實録其間所載悉出姦人之論不可信於後世恭惟宣仁保佑之德豈容異辭而蔡確貪天之功以為已力厚誣聖后收恩私門陛下即位之初嘗下詔明宣仁安社稷大功令國史院托實刋修又復悠悠望精擇史官先修哲宗實録候書成取神宗朱墨史考證修定庶毁譽是非皆得其實上深嘉納起居舍人洪遵乞經筵編聖語狀曰臣恭惟陛下身濟大統系隆中興萬機之暇刻意稽古大昕退朝來臨便坐延見儒臣紬繹經史兢兢業業惟以典學為務而臣不肖幸得備數記注周旋細氈之側實為榮遇但左右二史􅊞㳂近例旅進旅退於徽言善行缺然無所紀述大懼曠職不足以稱聖天子隆儒監古之意臣竊聞景祐中崇政殿說書賈昌朝以經筵一言一事總而成書號曰邇英延義二閣記注獻于仁宗皇帝而章得象等被命相踵修纂纍聖丕承其書具在臣愚欲望睿慈遵用故事應經筵中侍臣升絀封章進對燕㑹賜與講讀問答命載筆之臣斷自今年八月秋講為始悉行編録以邇英記注為名仍敕講讀官今後奏對之間靣得天語即時以實具報無得隱漏庶幾一代盛典大書特書詒諸億世與時政記日厯起居注相為表裏金匱石室之藏有以考信誠非小補臣固陋無識昧死陳愚惟陛下財赦遵又乞修起居注劄子曰臣恭惟陛下勵精庶政光啓中興功德巍巍視古聖王不足進於前是宜史冊大書特書為萬世無窮休臣待罪柱下幸獲纂輯聖謨入直以來不敢少懈但緣向者權臣用事記注之官多缺不補而起居注自紹興九年以後前後積壓今未修者殆十五年諸處循習遇本省取㑹貼子不肯如期報應竊慮嵗月浸逺難以考究檢准紹興令門下中書後省貼子取索急速者限一日供餘三日欲望聖慈特降睿㫖申嚴舊法使之報應以時不致違滯仍乞令兩省除見修起居注按月進入外所有紹興九年以來因循未畢者每一月帶修兩月庶幾天德地業赫然與日星並傳臣不勝幸願遵為吏部侍郎又乞修續㑹要劄子曰臣聞監于先王成憲其永無愆書曰丕顯哉文王謨丕承哉武王烈詩曰儀式刑文王之典然則祖宗之訓垂裕方來俾之憑藉扶持有天下者所不可後恭惟國家聖聖相承重規疊矩度越古昔延閣所藏金匱石室所載固已暴白天下至於大號令大政事撮其機要以類相從則國朝㑹要最為詳密于以施之朝廷達之天下凡典禮設張之事莫不一出於此自元豐成書之後政和中亦嘗續修而視諸故府但有吉禮百餘卷不能五分之一頃者顯仁皇后上仙討論典故有未登載者不免倉卒講求雖公卿大夫參合考議而事成一時豈能盡善今國家閒暇願及是時一新墜典區區管見不必設置司存只令國史院總其事擇館閣官三數人掌之斷自熙寧以迄于今名之曰國朝續㑹要館職月給已有校正㑹要食錢微有所增亦未為過成書奏御然後推賞庶幾聖朝制度更相發揮垂億萬年寶為大訓臣不勝至願龍圖閣直學士知湖州汪藻乞修日厯疏曰臣昨待罪禁林嘗於經筵靣奏本朝實録自艱難以來金匱石室之藏無復存者伏觀列聖自哲宗皇帝而上皆有成書流傳人間頗有其本朝廷已訪而藏之御府矣若太上皇帝淵聖皇帝及陛下建炎改元至今三十餘年並無日厯乞詔有司纂述未見施行臣竊惟自古無國無史史未嘗一日無書晉謂之乘楚謂之檮杌魯謂之春秋以此見無國無史也春秋以事繫日以日繫月以月繫時以時繫年必四時具謂之編年以此見史未嘗一日無書也漢法太史公位丞相上天下計書先上太史公副上丞相唐及本朝宰相皆兼史官其重如此故書榻前議論之辭則有時政記録柱下見聞之實則有起居注類而次之謂之日厯修而成之謂之實録所以廣記備言垂一代之典也若曠三十年之久漫無一字之傳將何以示來世乎此其不可不纂述一也韓宣子適魯見易象與春秋曰周禮盡在魯矣吾今乃知周公之德與周之所以王則國家守文者不可無史蕭何入秦先收丞相御史律令圖書藏之沛公具知天下厄塞户口多少彊弱處民所疾苦以何得秦圖書也則國家創業者不可無史今陛下躬受天命雖名中興實兼創業守文之事乃一代典章殘缺如此恐於理未安此其不可不纂述二也恭惟太上皇帝聰明睿哲之資孝友溫恭之德疇咨臣下言必成文裁決事機動皆合道在位二十餘年未嘗刑一無罪殺一不辜涵養生靈耕桑萬里視唐虞三代無不及焉淵聖皇帝恭儉憂勤招延聽納雖登至尊之日淺而膏澤浹於人心止緣姦臣誤朝馴致遐狩今若無書紀實恐千載之後徒見一朝陵遲之禍亟不知二聖積纍之功深兹事非輕羣臣當任其責此其不可不纂述三也自古史官無所不録況三十年之間朝廷之施設豪傑之謀謨政事之廢興人材之進退禮文之因革法度之罷行嵗事之豐凶羌戎之服叛有本有末有源有流一法弛而不書則一法熄一事略而不載則一事隳且當時羣臣間有在者以為忠賢耶不條其懿行安知其可嘉以為邪佞耶不條其宿姦安知其可棄茍因散逸遂廢其書豈孔子及闕文之義哉此其不可不纂述四也公羊傳曰所見異辭所聞異辭所傳聞異辭孔子作春秋於定哀則其事詳於隱莊則其事略聖人猶爾況其他乎中原失平三見閏矣及今耳目相接尚可追求更數年間事將堙沒雖有良史莫知所憑況比年風俗之衰公論不立士大夫取豫皆出愛憎因一事為一人而著書行世者多矣若不乘時訂正則數世之後信以傳信疑以傳疑是非渾殽白黑顛倒小人之說行而君子受其誣矣可不懼哉此其不可不纂述五也臣政和中為著作佐郎修太上皇帝日厯東觀凡例臣與聞焉今所領州又幸經兵火之餘獨不殘燬視諸故府案牘具存如御筆手詔賞功罰罪之文尚斑斑可考失今不輯臣實惜之古之有國家者雖顛沛中史官不廢況今邊烽稍息群盜屏除正朝廷搜補闕遺之時也伏望睿慈許臣議政之餘將本州所有御筆手詔賞功罰罪文字截自元符庚辰至建炎己酉三十年間分年編類仍量給官錢市紙札纂書工之類繕寫進呈以備修日厯官採擇藻又進書劄子曰臣嘗聞作史之法始於編年故春秋二百四十二年之間凡事未嘗不謹嵗月時日而書之蓋人君之治天下其大而見於史者不過政事弛張人材升黜弛張有本有末升黜有先有後不以嵗月時日繫之將安所考乎於此而有秋毫之差不惟不足取信來世凡所謂邪說私意者皆得肆行而亂吾是非之實祖宗豐功盛德亦將鬱而不伸故國朝置著作局專修日厯既取輔相時政記為據又責諸司供報凡供報不實者坐之其嵗月時日可謂信而不差矣然抵牾者亦時有焉蓋業巨事叢其理然也自乘輿南渡以來史官無一字之傳當時大臣時政記既不可復得而諸司所謂案牘者盡委於兵火朝廷每舉一事率幽冥而莫知其原往往臨時取决於胥史之口謂之省記況史官欲得其嵗月之真哉故臣於紹興二年待罪湖州日力具奏陳以為及今聞見尚新宜亟加搜訪失今不輯後必悔之䝉恩即以委臣臣伏思一代巨典權輿於此若歸之兵火以為無可奈何趣具目前謂之成書亦可顧今嵗月見於殘編斷簡者幸斑斑可尋必欲編摩措之列聖實録之間而無愧者非難在加之意而已故設為四類以求之一曰年表二曰官閥三曰政迹四曰凡例何謂年表以祖宗實録考之輔相之拜免臺諫之去留六曹寺監長二之遷移三京二十八帥之委任皆事干政體者書之不可少差而徽宗臨御二十六年間除目以千萬計日異而月不同非嵗為旁通何以見之何謂官閥以祖宗實録考之朝臣自館職而上差除悉書文臣自卿監武臣自刺史宗室自小將軍而上皆當立傳而徽宗臨御二十六年間當書差除者八千餘人當立傳者二千餘人差除必首尾相續方無缺遺立傳必始終相參方無舛誤非人為纍歷何以見之何謂政迹以祖宗實録考之內而百度之廢興外而四逺之服叛皆當叙其源流以書如黨論舍選禮制河防方田市易茶鹽錢幣之類皆百度之源流當叙者也青唐之棄地復地金人之請盟背盟西夏之進築髙麗之遣使之類皆四逺之源流當叙者也何謂凡例以祖宗實録考之有一月之例有一季之例有一年之例有三年之例缺一不録不為全書如占星象奏烖祥賜髙年旌孝弟與夫縣鎮之廢置神祠之加封率於月尾書之一月之例也原廟四時酌獻百官春秋大宴雖有定月而卜日不同一季之例也大遼夏國賀正旦生辰及押賜夏國禮物官皆當書其姓名嵗終户部奏天下主客户口增耗刑部奏天下斷過大辟宗正奏宗子命名授官皆當書其人數一年之例也郊祀明堂夏祭貢舉前期降詔郊祀肆赦殿試正奏名特奏名武舉進士䇿問皆當書其全文大禮差五使三獻官后妃封贈三代臣僚蕃國加恩宣麻貢院差知舉及殿試官諸文武進士釋褐皆當書其人數榜首皆當書其姓名受誓戒宿齊恭謝飲福皆當書日正進士釋褐三名前注授諸班直轉員皆當書其恩數三年之例也其例之不可以年月見者猶不與焉臣自紹興二年承指揮編次字字綴緝七年于兹本欲畢區區之愚每類各為一書以備史官採擇既功力浩渺非嵗月可成又恭聞近開史院修徽宗皇帝實録事體宏大非臣踈外敢為今於每類各修成一門除凡例一門已具重修元符庚辰以後三年詔㫖節次進呈訖今修到年表門具元符建中崇寧年臣僚旁通六冊官閥門具宰相十三人執政三十三人纍歷十冊政迹門具青唐棄地復地本末金人請盟背盟本末十二冊共二十八冊投進通前總八百冊伏乞聖慈特賜省覽庶知臣所編嵗月時日皆多方訂正務得其真未嘗一字無據也翰林學士周麟之上奏曰臣恭惟皇帝陛下駿惠先猷丕昭孝治近以實録院修進徽宗皇帝實録慶大典之崇成第史官之勞效凡撰次編摩之士下逮掌故例霑醲賞恩至渥也繼又以故翰林學士汪藻嘗修元符以來詔㫖等書八百餘卷於實録最為有力特加褒贈優恤其子陛下此舉可謂深合公論明燭幽隱矣然臣伏見紹興初嘗降指揮搜訪先朝文字投獻之家與斟酌髙下推恩今來實録成書竊慮二十餘年間臣僚子弟有以其父祖逮事先朝所得聖語等來獻事繫國體可以為萬世法者不可不少加甄録伏望聖慈申詔有司檢㑹元降指揮令實録院開具人數考核事實擇其顯著者量與推恩以示勸奬是亦信賞不遺之義也麟之又上奏曰臣仰惟皇帝陛下以天德地業再造區宇見獨朝徹聖欽日躋雖古之所謂盛帝顯王無以加此臣頃在東觀以修纂日厯為職因得歷覽陛下臨御以來三十餘年間事業之富謀斷之偉謨訓之大布在方冊赫然與日月爭光臣窺天之智狹而戴上之情切嘗考其間所載聖語大抵詳於前而略於後臣深求其故蓋由頃嵗左右史多缺起居注不修三省樞密院時政記於聖語亦或濶略而不致其詳近者陛下總攬權綱修廢振弊更化之道粲然一新睿謨明訓發於九重密勿之間而風動乎天下贊襄之輔獻納之臣內外進對之官所得多矣臣區區之愚欲乞申嚴舊制自今凡與奏對備録所聞毋致漏逸使史官皆得以具載仍令記時政者尤務其加詳以此授之國史著之日厯作宋一經􅊞舊六為七用傳信于億萬世臣不勝至願麟之又論禁傳寫先朝實録疏曰臣伏見國朝會要嘉祐四年史館修撰歐陽修言史之為書以紀朝廷政事得失及臣下善惡功過宜藏之有司往時史官書成進入則焚其藁乞詔龍圖閣别寫一本下編修院以備討閲從之然則史事在祖宗朝其嚴如此豈容輕示人也今者徽宗皇帝實録成書奏篇既上儲於內閣中外士大夫欣聞盛事咸思以先覩為快臣竊惟先帝之盛德休烈良法美意布在方冊固當廣其傳以昭示天下後世然其間所載多涉國體與今日政論有相關者臣愚欲望聖慈申嚴舊制令副本之在有司者必謹其藏仍不許諸官司關借謄寫及臣僚之家私自傳誦庶可以嚴宗廟尊朝廷遵祖宗之成憲孝宗隆興間起居郎胡銓論左右史四弊疏曰臣誤䝉親擢承乏左史自供職以來檢討記注故事竊見今之史職廢壞者非一其尤甚者有四焉一曰進史不當二曰立非其地三曰前殿不立四曰奏不直前何謂進史不當臣聞唐褚遂良知起居注太宗問人君得觀之否對曰史記善惡以為戒庶幾人主不為非法不聞帝王躬自觀史魏謨為起居舍人文宗遣中使取記注欲觀之謨謂史官書事以存鑒戒陛下所為善無畏不書不善天下之人亦有以記之帝止遂良與謨可謂能守官矣至國朝梁周翰李宗諤為左右史乃建言每月起居注願先奏御後付史館國史書之曰進起居注自周翰等始豈不愧唐二子哉慶厯中歐陽修為起居注嘗論其失曰自古人君皆不自閲史今撰述既成必録本進呈前事有諱避史書雖欲書而不敢乞自今起居注更不進本仁宗皇帝從之厥後佞臣執筆乃復進史㳂􅊞不革遂至于今欲望陛下遵仁宗之訓革周翰之失自今記注不必進呈庶使人主不觀史之美不專在於李唐二君也何謂立非其地臣按唐制每皇帝御殿則左右二史夾香案而立善惡必書其後許敬宗李義府用事動必懷姦懼為史官所記遂廢左右侍立之職凡謀議皆不與聞文宗復貞觀故事每入閣命左右執筆立於螭頭之下由是宰相奏事得以備録故開成之政詳於史書國朝故事天子坐朝則記注臣立於御座之後歐陽修以謂起居者當視人君言色舉動而書若立於後則無以盡見乃徙立於御座之前至修罷職修注者乃復立於其後今立於殿之東南隅言動未嘗或聞可謂立非其地有愧於修多矣臣又聞元豐三年修起居注王存奏欲追貞觀故事使左右史得盡聞天子德音儻二府自有時政記即乞自餘臣僚登對許記注侍立神宗皇帝曰人君與臣下言必關政理所言公公言之自非軍機何必祕密蓋人臣奏對或有頗僻或肆讒慝若史官書之則無所肆其姦矣大哉王言然未及施行至今議者惜之今史徒有左右之名而不知天子言動之實羣臣奏對並以無所得聖語關報職記注者但不過録諸司供報公文而已何名曰史邪臣欲乞陛下復歐陽修侍立故事庶幾言色舉動皆得以書如宰執造膝之日自有時政記亦乞如王存所請凡餘臣奏對許令侍立亦足以伸神宗之志也何謂前殿不立臣歷觀自古左右史未嘗不侍立於天子之側亦未嘗有前後之分唐制但云左右史分立於殿下螭頭之側和墨濡翰皆就螭之坳處有命則臨陛俯聽對而書之不聞後殿立而前殿不立也又聞歐陽修奏請自今前後殿上殿臣僚退令少留殿門俟修注出靣録聖語以此知國朝舊制前後殿皆侍立矣夫人主之言不獨後殿有之而前殿無也宰執奏事百官進對之言不獨後殿有之而前殿無也今獨後殿侍立而前殿不與義果安在邪夫後殿侍立雖立非地然獨立焉亦愛禮存羊之意前殿不立是餼羊亦去而禮意俱亡矣今左右史分日而立無言動之異臣欲乞於前後殿皆分日侍立庶幾一言一動皆得以書以備一朝之典謨光千載之史冊誠非細事何謂奏不直前臣聞唐文宗謂魏謨曰事有不當毋嫌論奏謨對曰臣頃為諫官故得有所陳今則記言動不敢侵官帝曰兩省屬皆可議朝廷事而毋辭也故國朝左右史皆許直前奏事雖以奏史事為名而朝廷事亦可議焉蓋亦文宗命魏謨之意也熙寧中修起居注張琥奏曰近日緣例頒牒閣門然後上殿竊見樞密承㫖每於侍立處尚得奏事起居注既得侍立或有敷奏乞便靣陳詔從之臣自領職之後初欲直前奏事閣門以臣不預牒却之臣又嘗預牒矣又謂今日無班次臣每見閣門奏事未嘗以班次為拘左右史職言動當日有敷奏乃必欲預牒閣門又欲必有班次則事有當奏而不得奏其為失職多矣臣又聞皇祐中御史唐介論宰相文彥博仁宗怒之時蔡襄為起居注直前論救事出一時又曷嘗預牒閣門與必俟班次耶況今來後殿奏對未嘗無班次如是則記注之臣雖有直前之名而無可奏之時矣臣欲乞自今左右史奏事令直前不必預牒閣門及以有無班次為拘也臣所陳四事皆近日記注失職之大者臣濫居是職敢不盡言伏望陛下考古驗今循名責實斷然行之不勝幸甚乾道中編修官林光朝奏曰臣以才識短暗叨居史官執筆之後竊謂古之作史者是皆據事實而書之文獻不足雖孔子無如之何吳競令狐德棻撰武德以來國史韋述因二家所作參之以後事列為紀傳當是時圖牒具在不過特書屢書之及開元而下文字散逸于休烈請遍求實録及起居注并他書若干篇其後所得僅一二篇耳如栁芳所問髙力士內廷可書之事今有唐歷四十卷以開元時事較之貞觀其用力何止十倍也臣竊惟四朝國史業巨事叢自上章創議欲以神宗皇帝哲宗皇帝兩朝正史候將來徽宗皇帝實録已定却别行撰述即置國史院續次臣僚又以靖康繼宣和之後首尾相關當作一書通前書為四朝國史此實當代甚盛之典也然筆削之重逡巡十年欲問成編未見涯際昨來得㫖又令重修徽宗皇帝實録以前者訛舛無所取信耳目所接尚可更定今延閣所藏有太祖太宗真宗三朝國史實為一書往年修太祖太宗兩朝正史起景德四年迄於大中祥符九年是逺至十年而後成書也其後修真宗正史自天聖五年至八年是又歷四年而後成書是書相望何止二十年而後合為一書也今神宗哲宗兩朝實録纎悉具備而紀志列傳尚或斷缺崇寧大觀百度更張獨有汪藻所録元符以來詔㫖而造膝之論不在此書此即唐人令狐氏所聚詔冊以備一時之闕耳其他書又多踈略自非徽宗實録裒綴已定之後即紛然載筆者何從措一辭也以臣之愚見四朝大典簡編浩汗欲乞聖慈許先次修神宗哲宗兩朝正史及徽宗實録令同日進呈徽宗實録已定之後即通欽宗實録續次修纂為四朝國史正如景德天聖作兩項撰述而後合為一書則雖以日月計之可也如臣之言髣佛為可采即乞付國史院同共參酌越分而言不任戰栗之至淳熙五年吏部侍郎周必大論史事劄子曰臣以非才被命纂修四朝正史賴同僚協力裒類事實粗見功緒今當下筆之際事體尤難竊觀前朝國史雖是衆人分撰然當時案牘可以稽據是非可以詢問責成一手不至訛舛粵自南渡以來文籍殘缺往往搜求散軼考證同異若非參合衆智深慮不相照應抵牾者多臣嘗與衆議分手撰述每遇一志一傳成篇並令在院官互相修潤庶幾首尾貫穿體製歸一無思慮不周之患如合聖意乞即特降指揮以憑遵守孝宗時端明殿學士范成大上奏曰臣聞追孝莫大於顯親顯親莫大於述事恭惟髙宗皇帝御歷三紀休功盛德陛下既已著之於聖政之編矣至退處德壽之後天旋日用豈無可紀如漢禁中起居注唐諸王所修內起居注之類向來闕此等一書使二十五年之間堯言堯行不得盡聞於世甚可惜也竊意陛下曩者久奉大養從容北宫慶溢庭闈事兼國家必有授受之謨訓諒多慈愛之話言以至嵗時燕喜曠儀盛事無非載籍之所未聞皆當志其大略以侈萬古今事雖已往日月尚新陛下孝思永慕見於羮墻恐有可以記憶者又參之以東朝東宫之所聞見與夫宫禁老成之所流傳特命親王悉加記録以付史氏則陛下述事之孝傳無窮而施罔極矣臣嘗考虞書堯典一篇紀陶唐行事備矣而魯論有堯曰咨舜之訓孟子有放勳勞來之言及莊列所記逰汾觀華康衢等事皆在堯典之外則知虞舜之世述堯遺事必有他書不止於僅存之一典而已伏惟陛下自留聖心成大又論三朝國史劄子曰臣聞自古有國有家雖盛衰不同而未嘗無一代之史䇿以小喻之譬如士庶之家大則有家法小則有日記雖倥偬弗暇給之時決不可一日而闕非若其他翰墨文詞空言無用之比也恭惟國家五朝正史久已大成而神宗皇帝哲宗皇帝徽宗皇帝三朝史書始於紹興二十八年開院纂緝糜費帑廪九年於此惟帝紀略備之外其餘邈然無涯不惟舊聞失墜無書可考亦緣是非褒貶易招悔吝朝廷既不督課有司幸於因循加以席未及暖遷徙而去甚或提綱無官秉筆全闕動經旬月無復誰何人徒見館宇邃嚴吏胥旁午皆謂煌煌天朝必備史䇿而不知文具如此臣竊檢照景德中修太祖太宗兩史十年而成天聖中修真宗史四年而成熙寧中修仁宗英宗兩史六年而成今之三史若只用目前規摹更數十百年亦恐汗青無日何則自熙寧初元至今百年見聞所逮尚難追記只更一二十年殘編斷簡漸就散逸故家遺俗無可詢究雖悔向來之因循欲決意成之亦不可復得文謨武烈恐遂湮晦何以仰稱陛下追孝清廟羮墻祖宗之心臣每念至此震栗汗下伏望特賜聖裁亟命朝廷討論史事立之課程剋以期限其熙寧以來舊事本院無書可考者許關取祕閣四庫所藏及搜訪士大夫家所存干照文字網羅參訂仍擇儒館優閒之臣數人增兼編擇庶得併工分力結局有期成書之後薦之宗祐于以上慰三后在天之靈燕寧歡喜介福家邦與天無極此臣所謂繫國體重大前者親目其弊今又再司其職不敢緘默且陛下家事也伏望特留聖慮成大又論記注聖語劄子曰臣聞帝者莫盛於堯舜其事逺而其書存二典所記都俞吁咈之詞可以端拜而議因其詞知其所以聖不然則雖堯舜之盛無傳焉後世設官以記言㫖意深矣恭惟陛下天縱神聖求治甚勤露朝便坐日有謨訓凡紀綱法度之說性命道德之藴有漢唐之君不得與於斯者是宜史不絶書以詔萬古臣䝉恩待罪柱下竊考記注所載十不一二蓋緣進對臣僚循習故常例以無所得聖語為報紹興間史官屢有建明三曽出榜朝堂而不報者自若也其報到者又務為簡略或止片言一字且漫不及所奏因依抽毫執簡終無纂述臣甚懼焉按令文親聞聖語應記注事不報後省者違制論又應報聖語而違者修注官具申尚書省若報到無聖語者月終類聚以聞雖有此法前後未嘗申嚴及不曽舉行類聚以聞之令宜其諸所記注多違舊章臣愚欲望聖慈下臣此奏付閣門內侍省遇有對班坐條告報并許史官依令舉行將報到無聖語者月終類聚奏聞萬機之燕略賜考察庶幾大哉王言無敢隱匿聖謨洋洋匹休二典天下萬世幸甚成大又論侍立劄子曰臣近因奏陳記注不得盡紀聖語伏䝉宣諭正以史官侍立太逺令臣討論典故臣竊見今來左右史侍立乃在正殿東南隅朵殿之上漠然並無所聞誠乖書言記動之義謹按唐制凡御殿則二史侍立於殿上御座左右執筆以記言動其紫宸入閣天子臨軒即立螭頭逼階傾耳而聽之或殿上或螭頭皆得密聞王言即時記録證據甚明許敬宗李義府李林甫為政時其制方廢文宗復之至今以為盛舉文宗嘗與宰相論當世奢靡時史官執筆螭頭帝謂曰適所議論卿記録未以此見雖立殿階螭頭之下尚得有聞而記述況侍殿上耶本朝初復起居院梁周翰等討論典故雖未精詳然亦但云直於崇政殿以記言以至國史職官志諸書所載亦只云便殿侍立而無今來東朵殿之說所謂朵殿本無經見若謂與正殿一體即容設置供奉官員閣于幕次憩坐自如則不可全謂之殿也如果與正殿事體不同不應立左右者却立於彼此可謂失記注之地矣又按王容季所載稱本朝故事侍立於御坐後歐陽修請侍立於御坐之前修罷復立於後此事雖不見㑹要然世傳之久矣㑹要獨載修乞令上殿臣僚退少留殿門俟修注官出靣録聖語仁宗從之臣竊料國朝修注官雖立殿上所謂立於御坐後者聞見亦自不審所以修有留臣僚於殿門靣録聖語之請而又有移立御坐前之說要之唐制為詳而本朝之制為略其原出於建置之初梁周翰等討論不精之故當時尚無朵殿之說今則不知閣門如何相承却止令立於朵殿隆興元年左史胡銓等建言立非其地閣門御史臺討論典故故欲令起居郎舍人起居訖升殿宰執并臺諫奏事權暫東朵殿侍立候臣僚奏事時依講筵例於御坐前侍立其意以為宰相奏事所得聖訓中書門下自有時政記并臺諫論事亦恐難遽漏泄其他臣僚奏對初何妨嫌而使記注之官不得記述以詔萬世誠為漏典臣竊見行在百司皆得舉職獨左右史職記言動而職實不舉王言既不得聞而臣僚奏對又例以無所得聖語為報則是記言之職有名無實所謂記動者凡行幸出入號令設施之類只憑諸司關報而國史日厯所亦同被受已先修纂則後省記注幾成長物二史之官號為職清地近班綴從臣而瘝官曠職如此臣所以夙夜慙懼不皇寧居伏望聖慈參酌前古盛際特賜檢㑹乾道元年閣門御史臺已討論到典故斷自聖心特制史官侍立之地以為聖代成法光宗紹熙元年禮部郎中兼實録院檢討陸遊上奏曰臣伏見真宗皇帝至道三年冬修太宗實録至明年咸平元年八月而畢甫九閲月修書者錢若水柴成務宗度吳淵楊億五人而已書成又詔重修太祖實録至眀年六月而畢亦甫九閲月修書者王元之梁灝趙安仁李宗諤四人而已臣竊考之太祖討澤潞取揚州平吳滅蜀定荆楚下五嶺太宗撫有吳越蕩定汾晉用師薊門問罪夏臺皆大舉動業廣事叢議論煩委兵機戎政攻守餽餉功罪黜陟之事可謂夥矣至於制禮作樂明刑治厯修廢官舉墜典革五季之弊復漢唐之盛側席求治可謂勤矣宜其摹寫日月形容造化雖纍嵗不成而奏書之速不淹三時上足以慰羮墻之思下足以厭薦紳之望非獨此數人者畢精竭思之力也意者當時命令重刑賞必尊君體國之俗成凡史官紬繹之所須者上則中書密院下則百司庶府以至四方萬里郡國之逺重編纍牘如水赴海源源而集然後以耳目所接察隧碑行述之諛辭以衆論所存刋野史小說之謬妄取天下之公去一家之私而史成矣九閲月而奏書臣誠未見其為速也臣乞身纍年忽䝉聖恩起之山澤之間使與聞大典既不纍以他職又特寬其朝謁責委之意可謂重矣然臣之愚慮有欲陳者未敢遽以仰瀆天聽而略具梗槩於前欲乞聖慈明詔大臣俟臣供職有所陳請擇其可者出自朝廷主張施行如臣不能自力曠職守負聖知則竄殛之刑所不敢避四年起居舍人兼中書舍人陳傅良論史官劄子曰臣嘗具奏竊見唐大順二年二月敕吏部侍郎栁玭等修宣宗懿宗僖宗實録始丞相監修國史杜遜能以三朝實録未修乃奏吏部侍郎栁玭右補闕裴廷裕左拾遺孫泰駕部員外郎李徹太常博士鄭光庭等十五人修之踰年竟不能編一字臣以此知史事至重不宜以他官兼領今史院檢討皆是兼局更出迭入有同傳舍至修撰亦以從臣兼之往往多近上眷渥之人率不淹久去掌機政大槩一年之間方議立條例均分卷帙而出院多矣則一朝巨典無由就緒事大體重豈容空過嵗月提領大臣須至取㫖立限奏篇臣恐未免逐急牽課取具臨時草草逃責而無以發明盛德大業傳信萬世要亦非秉筆者稽古之罪而其勢必至此者無專官故也近年李燾洪邁以待制相繼修史不領他事而後四朝國史方及成書以臣愚見兩制臣僚位望已貴若委以史事見謂冷局不過一二年間朝廷須更遷除雖曰專官未必久任今職名中有祕閣修撰右文殿修撰并舊有史館校勘等正是三館修書官名目自郎察卿監補外之人皆得除授若將此二三職名置為史官以二年為任自史館校勘之類供職稍遷祕閣修撰又稍遷為右文殿修撰在院少亦已五七年俟有勞績雖就遷次對如李燾洪邁兼領可也則是史官與郎察卿監可以馴至從班事體略同有專官之效無冷局之嫌庶幾大典責成有人況在祖宗朝雖諫議大夫以上皆帶出為寄祿官而以供職諫院者為諫官則今以修撰為貼職而以供職史院者為史官蓋舊章也有何不可臣愚不自度妄論史事唯陛下財幸五年起居舍人彭龜年乞申飭奏事臣僚録所得聖語報記注官疏曰臣聞古者王前巫而後史史官侍于王所當不逺也唐貞觀初仗下議政史官猶得執筆記之于前本朝元豐中嘗議臣僚前後殿登對許記注官侍立著其所聞關於治體者元祐中復令邇英講讀罷臣僚留身奏事亦許記注官侍立近時此等制度皆已不舉獨有臣僚對罷録所得聖語報記注官一莭爾然前後因循或稱無所得聖語是致載筆之書多所逸遺陛下明謨睿斷隱而弗彰史官失職莫此為甚臣竊見本朝歐陽修嘗奉請自今後前後殿上殿臣僚退令少留殿門俟修注出靣録聖語臣愚欲望聖慈用修之言特加申飭每遇前後殿臣僚奏事退許當日侍立官就殿門録所得聖語其有內引者令移文取㑹庶幾記注得以備載俾聖謨洋洋嘉言孔彰無愧三代不勝幸甚龜年又奏曰臣竊見起居注每於車駕過宫日分必書某日車駕詣重華宫兹福宫起居如不出即書云恭承壽皇聖㫖免到宫如一月不出即四次如此書只如陛下去年半年不出即如此書幾三十次恐非所以示後自此望車駕每月一再朝北內宣諭云誰如此書對云起居注乃繫日之書每日陛下舉動皆合記況是車駕講定省之禮安得不書宣諭云既是壽皇有㫖教不來只直書對云雖是壽皇有㫖免到宫陛下却豈可不去今日以雨泥免豈無晴日今日以暑熱免豈無涼日今在朝士大夫見車駕不過宫尚不知因由何況天下今日獲親事左右者尚不知因由何況書之史冊以貽萬世恐纍盛德臣獲居近列唯望陛下盛德日新凡所記注使皆足以垂法萬世乃是臣之志願足矣若萬一書之史冊或反貽後之譏議臣實不忍也寧宗嘉定二年祕書郎真德秀上奏曰臣伏見近者諫臣抗章論及史事明詔亟俞其請蓋將勒成大典以示方來非小補也臣以非材備數文館玉牒㑹要皆預討論敢緣所職妄有陳述臣恭惟陛下賢聖仁孝自昔著聞甲寅之秋肇履大位蓋出於光皇付託之誠憲聖擁佑之力而大臣實奉行之授受之間粲然明白秉史筆者固宜鋪張其實以詔萬世而臣伏觀玉牒㑹要所書大抵承迎托胄之意而誇大其功欺天罔人莫此為甚昔紹聖中姦臣用事被宣仁以奪嫡之謗加蔡確以定策之名顛倒是非終危宗社今陛下恭膺祖宗神器之重而簡冊所記顧歸功一擯贊之小臣傳之萬世何以為法況凡受恩之人豈無報復之念儻不亟加辨正異時或得藉口以逞其私紹聖崇寧之禍可鑒也臣側聞嘉定元年二月議臣有請命史官取紹熙五年以後至開禧三年以前史院文字并日厯時政記凡涉誣罔悉行改正陛下既俞之矣歷時寖久必已成書臣願特降睿㫖命國史實録院具所修事莭上之朝廷看詳允當即頒下玉牒㑹要所參照重行修纂上以光聖朝揖遜之美下以杜姦黨窺覦之漸天下幸甚臣又聞熙寧中王圭建言國朝㑹要朝廷檢尋故事未嘗不用此書然止修至慶厯三年又當時亟欲成書及欲廣其部帙故其間尚有遺事而所載頗多吏文恐不足行逺乞自慶厯四年以後續修其舊書因而略加增損庶成一代之典制可其奏逮書成自建隆迄元豐僅三百卷紀載最為有法後莫能及臣伏觀皇帝㑹要自紹熙末至嘉泰初才八年耳而為卷已百五十殆欲廣其部帙之過觀圭所修臣僚論奏止撮其要今或全篇紀録一字靡遺至於文移行遣語涉俚近者亦或未遑刪潤臣恐難於傳逺如圭所慮也又嘉泰二年以來凡八載矣朝廷行事可紀甚衆必俟有㫖進修然後併力編摩倉猝欲速寧無茍簡曷若從容纂次之為得臣願特降睿㫖命提舉大臣申飭其屬其未進者亟加修纂已進者稍加損益如神祖可王圭之奏庶幾清朝巨典煥然一新臣之所陳若緩實切且皆職守所在故敢不避煩黷冒昧以聞十五年司封郎中魏了翁論實録缺文疏曰臣曩者濫貟東觀蓋嘗伏讀金匱玉板之藏每惟祖宗實録自東都以前凡一百六十八年不過一千餘卷而南渡以後髙宗孝宗皇帝兩朝實録僅六十餘年遂至一千卷以三十六年事為五百卷猶之可也而二十七年為卷亦如之意其廣記備言無所脫遺而臣偶因當時所遭隨事檢閲則有不盡然往往一月而釐為二三卷往往州縣細故亦動是千餘言至事關大體顧反脫略且如開禧元年敵使趙之傑要陛下起受國書臣時以館職獲陪朝著之後偶記乾道六年虞允文為相敵使烏凌噶天錫倨慢與此相似時則允文前奏大駕還內放仗罷朝臣與在列誦言其事所冀速達有頃聞陛下徑還禁中一如乾道故事臣謂宰執必有援此以開陳者矣乃聞韓托胄為宰執言此謝郭然為之不知郭然秉政尚後此十餘年也臣既退朝即取乾道國史實録㑹要聖朝日厯諸書遍加披閲則於此事或全無所載或略及一二而實録則仍循常比書垂拱殿賜茶酒不知是日茶酒未嘗設也又書知閣事王抃上疏詔明日引使人朝見乃似專美於抃而抃詞止議受書之儀亦不及放仗罷朝事此實録之闕文有如此者是嵗蘇師旦除安逺軍莭度使明年六月師旦抵罪詞臣以草制罷去或謂內制未有封駮故事臣因記乾道七年三月己卯張說除僉樞張栻等言其不可旋即反汗八年二月乙卯申命則周必大以直學士院繳還批詔且乞以宣徽命說臣即檢閲實録諸書則己卯事無所載止於是月戊子書莭度使萬壽觀制不書事始已當修正至八年乙卯事則又逸去夫主聖則臣直此最是先朝美事而前後皆不書此又見實録之闕文有如此者開禧二年秋八月倪思與李壁爭論明堂嚴父配天事朝論莫知所決臣因記淳熙三年三月丙午朔祕書監李燾奏乞舉行宗祀明堂之禮歷引神宗皇帝聖語及錢公輔司馬光李受諸儒之說嘗下羣臣議雖不果行然實録不當全脫其事至淳熙六年趙雄為相竟白行之實録亦所不書元降明堂詔書亦未嘗登載而閲樂等事亦皆失實又以見實録之闕文有如此者臣因是三事每嘆孝宗皇帝明謨偉斷卓越前代者不可勝紀而臣偶記所聞輒逢脫略夫卷帙猥繁若此而紀載脫略乃爾若不及今距乾淳未逺文字未盡淪失老師宿齒故家遺裔尚可訪問亟與搜羅㑹粹則因循浸久必致是非失實無以傳示方來臣伏覩實録院見遵詔㫖改修孝宗光宗兩朝實録增入列傳臣愚欲望睿㫖併下本院令史官將兩朝實録重加㸃校儻有闕失如上所陳者即採訪增入其冗濫重復及吏文不經去處悉與刪削庶幾文省而事詳足以垂憲貽後仰副陛下寅念祖烈之意理宗淳祐十二年祕書少監兼修注官髙斯得進修史故事曰淳熙十年七月丁丑李燾奏臣䝉恩庇職史館事有當奏取聖裁者謹列于後一從來修書必立年限今四朝正史開院已二十四年三次展限矣所幸紀及志並已奏篇未了者止諸臣列傳耳列傳既有底本稍加之意似不難了乞自今更與展限明年春季庶幾史官各務協心不致有淹日月一裕陵諸臣列傳已經四次修改泰陵三次祐陵兩次靖康一次若舊本有誤處及有各添處即當明著其誤削去合添處仍具述所據何書考按無違乃聽修換仍録出為考異不然則從舊更勿增改所有諸臣合立傳而事迹無可尋討者且附合附處不必強立庶幾後來尋討得見則不妨别立大抵只要信而有證一臣聞操楫佐轅技不兩工故史官必久居其任少兼他職乃可責成若兼職太多用志必分雖髙才任職多多益辦然人之精力有限正恐詳於此則略於彼今史官猶有闕員自今差除乞選兼職少者委任之庶幾専力速成大典從之臣嘗伏讀國史竊見祖宗修書故事帝紀志傳必一書成乃修一書未嘗有並修兩書者蓋國家大典關係至重非專心致志為之則不能紀載得實傳信後世且以神哲徽欽四朝正史言之乾道中史官李燾上帝紀既而補外及再還朝乃命修列傳故燾初至有此三項奏請列傳垂成而燾卒所謂展限來年春季者竟不果就遂召洪邁卒成之十三年十一月乃克登進曰紀曰志曰傳次第而修首尾二十七年四朝大典始備孝宗皇帝豈不欲其速具哉而責成有漸如此以燾良史之才無出其右亦不敢自詭並修志傳而二書之進後先相距其逺又如此以是言之崇成巨典其可以易言哉臣伏見國史院被㫖修纂髙孝光寧四朝志傳限來年三月登進臣叨與載筆茍有管見不敢默已且詔修四朝志傳為日久矣趙以夫始專其事不知亟加纂輯乃欲先合九朝正史為一而後以四朝續之用力舛差遂墮汗漫迄以夫之去四朝志傳竟無一字汝騰繼之當其任矣而乃引嫌力辭尤焴又繼之亦復控避久乃就職更三史官虛度嵗月幾及兩載實為可惜九月以來乃方分命僚屬然規模不立人情渙散既不照舊例奏請先立年限又不考故事分志傳為兩次以百餘年間歷史官二百八十餘人所不能成之書自詭速成於數月之內抑何其輕易乎夫神哲徽欽諸臣列傳至燾之時已經四修三修兩修一修可謂易於成書矣猶且踰四年而後奏篇今髙孝光寧諸臣當立傳者人數猶未能定雜糅踈漏絶無倫次院吏所供初草大抵徒具私家所供志狀全未經史官考按增入他書又安得有所謂四修三修兩修一修者乃欲趣辦於四五月之間臣知其茍且滅裂務應期限希恩賞而不以傳信決矣雖然列傳粗有張本者也乃若諸志則從前未有片紙纂次今始創為其間天文地理選舉禮樂之屬猶可編類綴緝惟兵財二者乃百餘年建國之實政本末閎闊功力浩瀚非可鑿空為之者豈數月之所能辦乎兼史院官例多兼職往往一時繁劇之任叢于厥身有如燾所謂精力有限詳此略彼者而望其專力總領速成大典難矣臣非唱為異論茍欲遷延以逃瘝曠蓋考諸故實昭然不誣乃敢援據以為陛下告欲望聖慈宣諭提舉官及此編摩未定之初檢照孝宗皇帝修書故事改命史院官專一編纂四朝正史諸志候奏篇畢續行纂次列傳庶幾修書次第既合舊典又使諸史官用志不分成篇可準不致茍且滅裂貽笑後世金世宗時伊喇傑上書言朝奏屏人議事史官亦不與聞無由紀録上以問宰相石琚與右丞唐古安禮對曰古者史官天子言動必書以警戒人君庶幾有畏也周成王翦桐葉為圭戲封叔虞史佚曰天子不可戲言言則史書之以此知人君言動史官皆得記録不可避也上曰朕觀貞觀政要唐太宗與臣下議論始議如何後竟如何此政史臣在側記而書之耳若恐漏泄幾事則擇慎密者任之朝奏屏人議事記注官不避自此始元世祖至元中翰林學士承㫖王鶚上奏曰自古帝王得失興廢可考者以有史在也我國家以神武定四方天戈所臨無不臣服者皆出太祖皇帝廟謨雄斷所致若不乘時紀録竊恐久而遺亡宜置局纂就實録附修遼金二史又言唐太宗始定天下置𢎞文館學士十八人宋太宗承太祖開創之後設內外學士院史冊爛然號稱文治堂堂國朝豈無英才如唐宋者乎成宗時翰林國史院檢閲官袁桷上修遼金宋史搜訪遺逸條列事狀曰臣猥以非才備貟史館幾二十年近復進直翰林仍兼史職茍度嵗月實為罔功伏覩先朝聖訓屢命史臣纂修遼金宋史因循未就推原前代亡國之史皆係一統之後史官所成若齊梁陳隋周五代正史李延壽南北史房元齡等晉書或稱御撰或著史臣此皆唐太宗右文稽古數百年分裂事志悉得全備至宋倣依唐世爰設官局以成唐書是則先朝屢命有合太宗文明之盛桷生長南方遼金舊事鮮所知聞中原諸老家有其書必能搜羅㑹粹以成信史竊伏自念先髙叔祖少傅正獻公燮當嘉定間以禮部侍郎祕書監專修宋史具有成書曽祖太師樞密越公韶為祕書著作郎遷祕書丞同預史事曽叔祖少傅正肅公甫吏部尚書商俱以尚書修撰實録譾薄弱息獲際聖朝以繼先躅宋世九朝雖有正史一時避忌今已易代所宜改正昔司馬遷班固皆以父子相傳遂能成書劉知幾劉餗劉贊咸以家世舊聞撰成史通史例輒不自揆庸用條析兼本院宋朝名臣文集及雜書紀載悉皆遺缺亦當著具書目以備采擇者順帝時蘇天爵論修功臣列傳疏曰古者史官所以論著君臣善惡得失以為監戒者也欽惟聖朝龍興朔方滅金平宋遂一華夏而閥閲勳舊之臣謀猷材能之士茍不載之簡䇿何以垂示方來夫祖宗大典既嚴金匱石室之藏而功臣列傳獨無片簡隻字之紀誠為闕典然自大德以來史臣屢請采輯有司視為泛常迄今未盡送官當職昔嘗備貟史官謹具四事以備采擇一史有二體編年始於左氏紀傳始於太史公考一時之得失則編年為優論一人之始終則紀傳為備要之二者皆不可闕近代作為實録大抵類乎編年又於諸臣薨卒之下復為傳以繫之所以備二者之體也我國家至元間初撰祖宗實録于時諸臣多在及元貞初詔修世祖實録命中外百司大小臣僚各具事迹録送史館蓋欲紀述一代之事寓修諸臣列傳然以進史日期太迫諸臣事實不完遷延至今竟不果作向修經世大典臣事之見于簡冊者十居二三矧今翰林職專筆削若復曠日引年不復紀載將見勳舊盛烈泯沒無聞為史官者無所逃其責矣此列傳之必當修也一昔司馬遷為太史令網羅天下放佚舊聞遺文古事靡不畢集於是據左氏國語采世本戰國䇿述楚漢春秋究天人之際通古今之變成一家之言宣布于世其文直其事核不虛美不隱惡故謂之實録焉夫史固欲其核實事尤貴於網羅今史館修書不過行之有司俾之采録或功臣子孫衰替而無人供報或有司憚煩而不盡施行事之卒不能具者此也今史官先當取具國初以來至於某年中間功臣當立傳者若干人各具姓名或即其子孫宗族或即其親舊故吏或即其居官之所指名取索其人自當具報不許有司因而煩擾又諸公遺文各處或已刋行開具模印未刋板者令有司即其家抄録校讐無訛申達史館嚴立程限違者罪及提調官吏庶幾事無所遺汗青有日矣一官品固有髙低人材則無貴賤且作史者本欲紀載賢能以為後世之法初豈别其貴賤而輒以為等差故趙周既貴姓名止見于當時黃憲雖微善行永傳于後世近自金元以來始以官至三品者行事登于史是使忠烈隱逸之士凡在下位者皆不得書又何以勸善乎其法之謬以至如此今二品以上雖有官封别無事迹自可削去三品以下或守令之賢政績可紀或隱逸之善著述可傳或人子事親若王祥之孝感或義士赴難若南霽雲之殺身並宜登載于編以為將來之勸一史之為書善惡並載蓋善者所以為勸惡者所以為戒也故春秋成而亂臣賊子懼後世史臣亦云誅姦諛于既死發潛德之幽光今修史條例止見采取嘉言善行則姦臣賊子之事將不復登于書歟彼姦臣者固不恤其書與否也今從而泯滅之是使姦計暴行得快于一時無所垂戒于後世彼又何憚而不為惡乎且如阿哈瑪特僧格特克實道拉實之流皆當明著其欺罔之罪弒逆之謀庶幾姦邪之徒有所警畏然諸家所具事迹多出於孝子慈孫之言門人故吏之手恐有不實又當參以刑曹之過簿吏部之行止如此則善惡備書而無虛美隱惡之譏矣歷代名臣奏議卷二百七十七
