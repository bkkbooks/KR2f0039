body:
  text: 歷代名臣奏議卷二百三十六明楊士竒等撰任將趙孝成王立七年秦與趙兵相距長平時趙奢已死而藺相如病篤趙使廉頗將攻秦秦數敗趙軍趙軍固壁不戰秦數挑戰廉頗不肯趙王信秦之間秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代廉頗藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王不聽遂將之將行其母上書言于王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以豫軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金歸藏于家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣王曰母置之吾已决矣母因曰王終遣之即有如不稱妾得無隨坐乎王許諾魏樂羊為將而攻中山其子在中山中山之君烹其子而遺之羮樂羊坐其幕下而啜之盡一杯文侯謂覩斯贊曰樂羊以我之故食其子之肉贊對曰其子之肉尚食之其誰不食樂羊既罷中山文侯賞其功而疑其心漢髙祖為漢王時入蜀韓信亡楚歸漢滕公言於漢王拜為治粟都尉漢王未之竒也信數與蕭何語何竒之至南鄭諸將行道亡者數十人信度何等已數言上上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上大怒如失左右手居一二日何來謁上上且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者上曰若所追者誰何曰韓信也上復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無雙王必欲長王漢中無所事信必欲爭天下非信無所與計事者顧王策安所决耳王曰吾亦欲東耳安能鬱鬱久居于此乎何曰王計必欲東能用信信即留不能用信終亡耳王曰吾為公以為將何曰雖為將信必不留王曰以為大將何曰幸甚于是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒耳此乃信所以去也王必欲拜之擇良日齊戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚漢文帝十四年馮唐為中郎署長事文帝文帝輦過問唐曰父老何自為郎家安在唐具以實對文帝曰吾居代時吾尚食監髙祛數為我言趙將李齊之賢戰于巨鹿下今吾每飯意未嘗不在巨鹿也父知之乎唐對曰尚不如廉頗李牧之為將也上曰何以唐曰臣大父在趙時為官卒將善李牧臣父故為代相善趙將李齊知其為人也上既聞廉頗李牧為人良說而搏髀曰吾獨不得廉頗李牧時為吾將吾豈憂胸奴哉唐曰主臣陛下雖得廉頗李牧弗能用也上怒起入禁中良久召唐讓曰公奈何衆辱我獨無閒處乎唐謝曰鄙人不知忌諱當是之時胸奴新大入朝那殺北地都尉昂上以敵寇為意乃卒復問唐曰公何以知吾不能用廉頗李牧也唐對曰臣聞上古王者之遣將也跪而推轂曰閫以內者此郭門之閫也門中橛曰閫寡人制之閫以外者將軍制之軍功爵賞皆決于外歸而奏之此非虛言也臣大父言李牧為趙將居邊軍市之租皆自用饗士賞賜決于外不從中覆也委任而責成功故李牧乃得盡其智能遣選車千三百乘彀騎萬三千百金之士十萬直百金言重是以北逐單于破東部滅淡林西抑彊秦南支韓魏當是之時趙幾霸其後㑹趙王遷立其母倡也王遷立乃用郭開讒卒誅李牧令顔聚代之是以兵破士北為秦所禽滅今臣竊聞魏尚為雲中守其軍市租盡以饗士卒私養錢五日一椎牛饗賔客軍吏舍人是以胸奴遠避不近雲中之塞虜曽一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍五符吏卒斬首以尺籍書亦什伍之符約莭度也終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得廉頗李牧弗能用也臣誠愚觸忌諱死罪死罪文帝說成帝時光祿大夫執金吾辛慶忌坐小法左遷雲中太守後徴為光祿勳時數有災異丞相司直何武上封事曰虞有宫之竒晉獻不寐晉獻公欲伐虞以宫之竒在寢不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形厭抑也未有禍難之形豫勝之也厭音於葉反司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒卒讀曰猝謂暴也士不素厲則難使死敵是以先帝建列將之官近戚主內異姓距外故姦軌不得萌動而破滅誠萬世之長䇿也光祿勳慶忌行義修正柔毅敦厚謀慮深遠前在邊郡數破敵獲虜外夷莫不聞乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞東漢光武時更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何于關中無復西顧之憂所以得專精山東終成大業今河內帶河為固户口殷實北通上黨南迫洛陽寇恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河內太守行大將軍事光武謂恂曰河內完富吾將因是而起昔高祖留蕭何鎮關中吾今委公以河內堅守轉運給足軍糧率厲士馬防遏他兵勿令北度而已時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣馮異代禹討之車駕送至河南賜以乘輿七尺具劒敕異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必略地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修敕無為郡縣所苦異頓首受命引而西所至皆布威信𢎞農羣盜稱將軍者十餘輩皆率衆降異馬援在交趾嘗餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譛之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀光武怒援妻孥惶懼不敢以喪還舊塋裁買城西數畒地槀葬而已權葬故稱槀賔客故人莫敢豫㑹前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功採其一美不求備於衆故髙祖赦蒯通而以王禮葬田橫大臣曠然咸不自疑夫大將在外讒言在內微過輒記大功不計誠為國之所慎也故章邯畏口而奔楚燕將據聊而不下燕將攻下聊城人或讒之於燕燕將懼誅因保守聊城不敢歸豈其甘心末規哉悼巧言之傷類也末規猶下計也竊見故伏波將軍新息侯馬援拔自西州欽慕聖義間關險難觸冒萬死孤立羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉謂援使隗囂也寧自知當要十郡之使徼封侯之福邪八年車駕西討隗囂國計狐疑衆營未集援建宜進之䇿卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民饑困寄命漏刻援奉詔西使鎮慰邉衆乃招集豪傑曉誘羌戎謀如涌泉藝如轉規遂救倒懸之急存幾亡之城兵全師進因量敵人隴冀略平而獨守空郡守音式授反兵動有功師進輒克誅鋤先零緣入山谷猛怒力戰飛矢貫脛又出征交址土多瘴氣援與妻子生訣無悔吝之心遂斬滅徴側克平一州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南渡江海觸冒害氣僵死軍士名滅爵絶國土不傳海內不知其過衆庶未聞其毀卒遂三夫之言橫被誣罔之讒韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎王曰否三人言王信乎曰寡人信龎共曰夫市無虎明矣然三人言誠市有虎今邯鄲去魏逺於市謗臣者過三人願王熟察之家屬杜門葬不歸墓怨隙並興宗親怖栗死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑高祖賞與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢榖問哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也魯聽季孫之說而逐孔子詩云取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊此言欲令上天而平其惡惟陛下留思竪儒之言無使功臣懷恨黃泉臣聞春秋之義罪以功除公羊傳曰夏滅項孰减之齊滅之曷為不言齊滅為桓公諱也以桓公嘗有繼絶存亡之功故君子為之諱也聖王之祀臣有五義禮記曰夫聖王之制祀也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海內之望臣年已六十常伏田里竊感欒布哭彭越之義前書曰彭越為梁王欒布為梁大夫使於齊越以諫反梟首洛陽詔有收視者捕之布使還奏事越頭下祠而哭之冒陳悲憤戰栗闕庭南陽太守杜詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃兵修文羣帥反旅海內合和萬世䝉福天下幸甚唯胸奴未譬聖德威武二垂陵虐中國邊民虛耗不能自守臣恐武猛之將雖勤亦未得解甲櫜弓也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於內郡然後即戎出命不敢有恨臣愚以為師克在和不在衆陛下雖垂念北邉亦當頗泄用之昔湯武善御衆無故忿鷙之師陛下起兵十有三年將帥和睦士卒鳬藻今若使公卿郡守出於軍壘則將帥自厲士卒之復比於宿衛則戎士自百何者天下已安各重性命大臣以下咸懷樂土不讎其功而厲其用無以勸也陛下誠宜虛缺數郡以俟振旅之臣重復厚賞加於久役之士如此緣邉屯戍之師競而忘死乘城拒塞之吏不辭其勞則烽火精明守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才遭陛下創制大業賢俊在外空乏之間超受大恩收養不稱奉職無效久竊祿位令功臣懷愠誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩䝉恩尤深義不敢茍冒虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析圭授爵所不辭也惟陛下哀矜帝惜其能遂不許之章帝時中郎將鄭衆為耿恭已下洗沐易衣冠上疏曰耿恭以單兵固守孤城當胸奴之衝對數萬之衆連月踰年心力困盡鑿山為井煮弩為糧出於萬死無一生之望前後殺傷胸奴數千百計卒全忠勇不為大漢耻恭之節義古今未有宜䝉顯爵以厲將帥及恭至雒陽鮑昱奏恭節過蘇武宜䝉爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羌為共丞餘九人皆補羽林靈帝時鎮賊中郎將朱俊與荆州刺史徐璆及南陽太守秦頡合兵萬八千人圍黃巾賊帥趙宏自六月至八月不拔有司奏欲徴俊司空張溫上疏曰昔秦用白起燕任樂毅皆曠年歷載乃能克敵俊討潁川以有功效引師南指方略已設臨軍易將兵家所忌宜假日月責其成功帝乃止俊因急擊宏斬之魏明帝時司馬懿將伐遼東散騎常侍何曽上疏曰臣聞先王制法必全於慎故建官受任則置副佐陳師命將則立監二宣命遣使則設介副臨敵交刃又參御右蓋以盡思謀之功防安危之變也是以在險當難則權足相濟隕缺不豫則才足相代其為國防至深至逺及至漢氏亦循舊章韓信伐趙張耳為二馬援討越劉隆副軍前世之迹著在篇志今太尉奉辭誅罪精甲鋭鋒步騎數萬道路迥阻且四千里雖假天威有征無戰寇或潜遁消引日月命無常期人非金石逺慮詳備誠宜有副今北軍諸將及太尉所督皆為寮屬名位不殊素無定分統御之尊卒有變急不相鎮攝存不忘亡聖達所裁臣愚以為宜選大臣名將威重宿著者成其禮秩遣詣北軍進同謀略退為副佐雖有萬一不虞之變軍主有儲則無患矣帝不從吳周瑜病因上疏曰當今天下方有事役是瑜乃心夙夜所憂願至尊先慮未然然後康樂今既與曹操為敵劉備近在公安邉境密邇百姓未附宜得良將以鎮撫之魯肅智略足任乞以代瑜瑜隕踣之日所懷盡矣烏程侯建衡元年陸禕初為黃門侍郎出領部曲拜偏將軍凱亡後入為太子中庶子右國史華核表薦禕體質方剛器幹彊固董率之才魯肅不過及被召當下徑還赴都道由武昌曽不回顧器械軍資一無所取在戎果毅臨財有節夫夏口賊之衝要宜選名將以鎮戍之臣竊思惟莫善於禕晉武帝時劉元海於魏已為任子在洛陽文帝深待之泰始以來王渾又屢言之于武帝帝召與語大悅之謂王濟曰劉元海容儀機鑒雖由余日磾無以加也濟對曰元海儀容機識實如聖㫖然其文武才幹賢於二子逺矣陛下若任之以東南之事吳㑹不足平也帝稱善孔恂楊珧進曰臣觀元海之才當今懼無其比陛下若輕其衆不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥上黨李喜曰陛下誠能發胸奴五部之衆假元海一將軍之號鼓行而西可指期而定孔恂曰李公之言未盡殄患之理也喜勃然曰以胸奴之徑悍元海之曉兵奉宣聖威何不盡之有恂曰元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止東晉元帝太興二年著作郎虞預以寇賊未平當須良將上疏曰臣聞承平之世其教先文撥亂之運非武不剋故牧野之戰呂望杖鉞淮夷作難召伯專征玁狁為暴衛霍長驅故隂陽不和擢士為相三軍不勝拔卒為將漢帝既定天下猶思猛士以守四方孝文志存巨鹿馮唐進說魏尚復守詩稱赳赳武夫公侯干城折衝之佐豈可忽哉況今中州荒弊百無一存牧守官長非異域之族類即寇竊之幸脫陛下登阼威暢四逺故令此等反善向化然奔軍降徒輕薄易動强冦未殄益使難安周撫陳川相係背叛徐龕驕黠無所拘忌放兵侵掠罪已彰灼昔葛伯違道湯獻之牛吳濞失禮錫以几杖惡成罪著方復加戮龕之小醜何足不滅然豫備不虞古之善教矧乃有虞可不為防為防之術宜得良將將不素簡難以應敵夀春無鎮祖逖孤立前有徑虜後無係援雖有智力非可持久願陛下咨之群公博舉於衆若當局之才必允其任則宜奬厲使不顧命旁料冗猥或有可者厚加寵待足令忘身昔英布見慢恚欲自裁出觀供置然後致力禮遇之恩可不隆哉誠知山河之量非塵露可益神鑒之慮非愚淺所測然匹夫嫠婦猶有憂國之言況臣得廁朝堂之末䝉冠帶之榮者乎後魏明元帝時并州冦數萬家南掠河內遣將軍公孫表等率師討之敗績太宗問羣臣曰并寇縱暴人衆不少表等已不能制若不早誅則良民大受其禍今既盛秋不可為此小盜而復興衆以廢民業將若之何𤣥伯對曰表等諸軍不為不足但失於處分故使小盜假息耳寇衆雖盛而無猛健主將所謂千奴共一膽也宜得大將軍為賊所服信者將數百騎就攝表軍以討之賊聞之必望風震怖夀光侯建前在并州號為威猛羣醜畏服諸將莫及太宗從之孝明帝時四中郎將兵數寡弱不足以襟帶京師任城王拓跋澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶𢎞農郡北中帶河內郡選二品三品親賢兼稱者居之省非急之作配以強兵如此則深根固本強幹弱枝之義也靈太后初將從之後議者不同乃止澄又奏曰固本宜强防微在豫故雖有文事不忘武功況今南蠻仍獷北部頻結來事難圖勢同往變脫暴勃忽起振動關畿四府羸兵何以防擬平康之世可以寄安遺之久長恐非善䇿如臣愚見郎將領兵兼總民職省官實祿於是乎在求還依前增兵益號將位既重則念報亦深軍郡相依則表裏俱濟朝廷無四顧之憂姦宄絶窺覦之望矣卒不納孝武帝時天下多事尚書右民郎路思令乃上疏曰臣聞國之大事唯祀與戎戎之有功在於將帥三代不必别民取治不等五伯不必異兵各能剋定有湯武之賢猶須伊望之佐堯舜之聖尚有稷契之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靜之至難竊以比年以來將帥多是貴寵子孫軍幢統領亦皆故誼託附貴戚子弟未經戎役至於銜杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當鋭强壯居後以衛身兼復器械不精進止不集任羊質之將驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃將又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賚之輕金帛日賜帑藏空虛民財殫盡致使賊徒更增膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舍臣聞孝行出於忠貞節義率多果決德可感義夫恩可勸死士今若捨上所輕求下所重黜陟幽明賞罰善惡搜徒簡卒練兵習武甲密弩强弓調矢徑謀夫既設辨士先陳曉以安危示其禍福如其不悛以我義順之師討茲悖逆之豎豈異礪蕭斧而伐朝菌鼓洪爐而燎毛髮雖愚者知其不旋踵矣敢以愚短昧死陳誠唐高宗儀鳳中吐蕃數盜邉太學生魏元忠上封事洛陽宫言命將用兵之要曰天下之柄有二文武而已至制勝御人其道一也今言武者先騎射不稽之權略言文者首篇章不取之經綸臣觀魏晉齊梁才固不乏然何益治亂哉養由基射能穿札不止鄢陵之奔陸機識能辨亡無救河橋之敗斷可見已夫才生於世世實須才何世而不生才何才而不資世故物有不求未有無物之嵗士有不用未有無士之時也志士在富貴與賤貧皆思立功名以傳于後然知已難而所遇罕士之懷琬琰就煨塵抱棟幹困溝壑者悠悠之人直覩此士之貧賤安知其方略哉故漢拜韓信舉軍驚笑蜀用魏延羣臣觖望此富貴者易為善貧賤者難為功也昔漢文帝不知魏尚賢而囚之知李廣才而不用乃歎其生不逢時夫以廣之才天下無雙時方嵗事胸奴而卒不任故近不知尚廣之賢而逺想廉頗李牧馮唐是以知其有而不能用也此身為時主所知不得盡其才也晉羊祜謀舉吳賈充荀朂沮之祜歎曰天下事不如意十常七八以二人不同終不大舉此據立功之地而不獲展其志也布衣之人懷竒抱䇿而望朝奏夕召豈易得哉臣願歷訪文武五品以上得無有智如羊祜武如李廣而不得騁其才者乎使各言其志毋令久失職又言人無常俗政有治亂軍無常勝將有能否兵為王者大事存亡繫焉將非其任則殄人敗國齊段孝𤣥有言持大兵如擎盤水一致蹉跌求止可得哉周亞夫堅壁以挫吳楚司馬懿閉營而困諸葛亮此皆全軍制勝不戰而卻敵是知大將臨戎以智為本今之用人類將家子或死事孤兒進非幹略雖竭力盡誠不免於傾敗若之何用之且建功者言其所濟不言所來言其所能不言所藉若陳湯呂䝉馬隆孟觀悉出貧賤而勳伐甚高不聞其家世將帥也故隂陽不和揠士為相蠻貊不廷擢校為將今以四海之廣億兆之衆豈無卓越之士臣恐未之思乎又賞者禮之基罰者刑之本禮崇則謀夫竭其能賞厚則義士輕其死刑正故君子朂其心罰重則小人懲其過賞罰者軍國之綱紀政教之藥石吐蕃本非彊敵而薛仁貴郭待封至棄甲喪師脫身以免國家寬政罪止削除網漏吞舟何以過此雖陛下顧收後效然朝廷所少豈此一二人乎夫賞不勸謂之止善罰不懲謂之縱惡臣誠疏賤干非其事豈欲間陛下君臣生薄厚哉正以刑賞一虧百年不復故國無賞罰雖堯舜不能為今罰既不行賞復難信故議者皆謂比日征行虛立賞格而無其實蓋忘大體之臣恐賚勳庸竭府庫留意錐刀以為益國所謂惜毫釐失千里者也且黔首雖微不可以欺安有寓不信之令設虛賞之格乎自蘇定方平遼東李績破平壤賞既不行勳亦淹廢歲月紛淆真僞相錯臣以吏不奉法慢自京師僞勳所由主司過也其則不逺近在尚書省中然未聞斬一臺郎戮一令史使天下知之陛下何照逺而不照近哉神州化首文昌政本治亂攸在臣故冒死而言夫明鑑所以照形往事所以知今臣請借近以為諭貞觀中萬年尉司馬𤣥景舞文飾智以邀乾沒太宗棄之都市後征高麗總管張君乂不進擊賊斬之旗下臣以為僞勳之罪多于𤣥景仁貴等敗重於君乂使早誅之則諸將豈復有負哉慈父多敗子嚴家無格虜且人主病不廣大人臣病不莭儉臣恐陛下病之于不廣大過在于慈父斯日月一蝕也又今將吏貪暴所務口馬財利臣恐戎狄之平未可旦夕望也凡人識不經逺皆言吐蕃戰前隊盡後隊方進甲堅騎多而山有氛瘴官軍逺入前無所獲不積榖數百萬無大舉之資臣以為吐蕃之望中國猶孤星之對太陽有自然之大小不疑之明暗異域雖無知亦知愛其性命豈有前盡死而後進哉由殘迫其人非下所願也必其戰不顧死則兵法料敵能鬬當以知算取之何憂不克哉向使將能殺敵橫尸蔽野斂其頭顱以為京觀則此虜聞官軍鐘鼓望塵卻走何暇前隊皆死哉自仁貴等覆師喪氣故虜得跳梁山谷又師行必藉馬力不數十萬不足與虜爭臣請天下自王公及齊人挂籍之口人稅百錢又弛天下馬禁使民得乘一大馬不為數限官籍其凡勿使得隱不三年人間畜馬可五十萬即詔州縣以所稅口錢市之若王師大舉一朝可用且虜以騎為彊若一切使人乘之則市取其良以益中國使得漸耗虜兵之盛國家之利也高宗善之𤣥宗天寶六載李林甫欲杜邉帥入相之路以朔部不知書乃奏言文臣為將怯當矢石不若用寒族朔部朔部則勇決習戰寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死上悅其言始用安祿山天寶十四載安祿山請以蕃將三十二人代漢將韋見素因極言祿山反已有迹所請不可許上不悅竟從祿山之請楊國忠見素後復言于上曰臣有策可坐銷祿山之謀若除祿山平章事召詣闕以賈循吕知誨楊光翽分領范陽平盧河東莭度則勢自分矣上從之已草制而不發𤣥宗時特進蓋嘉運破突騎施還詔為河西隴右莭度使因令經略吐蕃嘉運以新立功日酣遨未赴屯尚書左丞相裴耀卿言于帝曰嘉運精徑勇烈誠有餘然臣見其誇言驕色竊憂之恐不足與立事今盛秋防邊日月已薄當與軍中士卒相見若不素講雖決在一時恐非制勝萬全之義且兵未及訓不能知法士未懷惠不可共心使幸而有功非師出以律之善又萬人之命倚於將示不得已故鑿凶門而出今酣呶朝夕胖肆自安非愛人憂國者不可不察茍不易帥宜嚴詔申約以督其行帝乃促嘉運詣部卒無功還代宗大歷六年副元帥李抱玉上言凡所掌之兵當自訓練今自河隴逹于扶文綿亙二千餘里撫御至難若吐蕃兩道俱下臣保固汧隴則不救梁岷進兵扶文則寇逼關輔首尾不贍進退無從願更擇能臣委以山南使臣得專備隴坻詔從之大歷十四年崔寧在蜀十餘年至是入朝吐蕃與南詔合兵三道入寇諸將不能禦州縣多陷上憂之趣寧歸鎮楊炎言于上曰蜀地富饒寧據有之貢賦不入與無蜀同若其有功則義不可奪是蜀地敗故失之勝亦不得也不若留寧發范陽戍兵雜禁兵往擊之何憂不克因得納親兵于其腹中蜀將必不敢動然後更授他帥使千里沃壤復為國有是因小害而收大利也上遂留寧德宗時翰林學士陸贄上奏曰曲環所領一軍悉是朱泚部曲或頃在鳳翔所管或本從河朔同來後因汴宋用兵權抽赴彼應援所以行營將士猶舉幽隴為名今之元凶乃其舊帥岐下則楚琳助亂薊門則朱滔黨姦獨此偏師摽然河上其營幕則寄于他土其家屬則陷于匪人又屬汴路姦虞浚城陷覆糧餉屢絶資裝久殫士卒常情固難安處是宜潰歸舊管否則散適樂郊而曲環撫之悉無離叛孤軍自守亦不茍從處危能安聞難輒赴甚推齊肅纍著功勳近日將帥之中罕有如環之比考其才莭絶有過人但緣羇寓多時窮匱轉甚繼陳章奏言極酸辛告急朝廷則力未能救求哀郡府則人莫見憂覽其辭情可為流涕若失于應接則終以危亡良將義從實在深惜願陛下不以常人遇之不以常事遣之方今勢可相資唯有江左完實恐須密敕韓滉切令贍恤此軍器甲衣糧咸使周足因賜劉洽手詔亦委加意保持若得自存必有成績非艱難無以表特操非英聖不能全異才有功見知人必悅勸臣不勝區區為國奬善拯危之意謹啓事以聞謹奏贄又論兩河及淮西利害狀曰內侍朱冀寧奉宣聖㫖緣兩河寇賊未平殄又淮西凶黨攻逼襄城卿識古知今合有良䇿宜具陳利害封進者臣質性凡鈍聞見陋狹幸因乏使簮組升朝洊承過恩文學入侍每自奮勵思酬奬遇感激所至亦能忘身但以越職干議典制所禁未信而言聖人不尚是以循循默默尸居榮近日日以愧自春徂秋心雖懷憂言不敢發此臣之罪也亦臣之分也陛下天縱聖德神授英謀明照八表思周萬務猶慮闕漏下詢芻蕘此堯舜舍已從人好問而好察邇言之意也臣每讀前史見開說納忠之士乃有泣血碎首牽裾斷鞅者皆以進議見拒懇誠激忠遂至發憤踰禮而不能自止故也況今勢有危迫事有機宜當聖主開懷訪納之時無昔人逆鱗顛沛之患儻又上探微㫖慮匪悅聞傍懼貴臣將為沮議首尾憂畏前後顧瞻是乃偷合茍容之徒非有扶危救亂之意此愚臣之所痛心切齒于既往是以不忍復躬行于當世也心藴忠憤固願披陳職居禁闈當備顧問承問而對臣之職也寫誠無隱臣之忠也謹具件如後惟明主循省而備慮之豈有微臣獨荷容納之恩實億兆之幸社稷之福也臣本書生不習戎事竊惟霍去病漢將之良者也每言行軍用師之道顧方略何如耳不在學古兵法是知兵法者無他見其情而通其變則得失可辨成敗可知古人所以坐籌樽爼之間制勝千里之外者得此道也臣才不逮古人而頗窺其意是敢承詔不默輒陳狂愚伏以剋敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用兵不足恃與無兵同將不為用與無將同將不能使兵國不能馭將非止費財玩寇之弊亦有不戢自焚之災自昔禍亂之興何嘗不由于此今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或有傍遭詿誤內蓄危疑蒼黃失圖勢不得止亦未必皆是處心積慮果為姦逆以僭帝稱王者也況其餘衆蓋並脅從茍知全生豈願為惡若招攜以法悔禍以誠使來者必安安者必久斯道積著人誰不懷縱有野心難馴臣知其從化者必過半矣舞干格苖豈獨虛言假使四五凶渠俱禀梟鴟之性其下同惡復有十百相從是皆卒伍庸流闒茸下品其志好不過聲色財貨之樂其材用不過蹴踘距踴之能其約從締交則迭相侮詐以為智謀其御衆使人則例質妻孥以為術數斯乃盜竊偷安之伍非有姦雄特異之資以陛下英神志期平一君臣之勢不類逆順之理不侔形勢之大小不倫師徒之衆寡不敵然尚曠嵗持久師老費財加算不止于舟車徴卒殆窮于閩濮笞肉捶骨呻吟里閭送父别夫號呼道路杼軸已甚興發已殫而為將帥者尚曰財不足兵不多此微臣所以千慮百思而不悟其理也未審陛下嘗徴其說察其由乎股肱之臣日月獻納復為陛下察其事乎臣愚無知實所深惑遂乃過為臆度輒肆討論以為剋敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用今以陛下效其明聖群帥畏威雖萬無此虞然亦不可不試省察也陛下若謂臣此說蓋虛體耳不足徴焉臣請復為陛下效其明徴以實前說田悅唱亂之始氣盛力全恆趙青齊迭為脣齒陛下特詔馬燧委之專征抱真李芃聲勢相援于時士吏畏法將帥感恩俱藴勝殘盡敵之誠未有爭功邀利之釁故能纍摧堅陳深抵窮巢元惡幸脫於俘囚凶徒幾盡於鋒刃臣故曰剋敵之要在乎將得其人馭將之方在乎操得其柄此其明效也田悅既敗力屈勢窮且皆離心莫有固志乘我師勝捷之氣躡亡虜傷夷之餘比於前力難易百倍既而大軍遂駐遺孽復安其後餽運日增師徒日益于兹再稔竟不交鋒量兵力則前者寡而今者多議軍資則前者薄而今者厚論氣勢則前者新集而今者乘勝度攻具則前者草創而今者繕完計凶黨則前者盛而今者殘揣敵情則前者鋭而今者挫然而勢因時變事與理乖當易而反難當進而中止本末殊趣前後易方順理之常必不如此臣故曰將非其人者兵雖衆不足恃操失其柄者將雖材不為用此自昔必然之效但未審今茲事實得無近於此乎在陛下熟察而亟救之耳固不在益兵以生事加賦以殄人無紓目前之虞或興意外之患人者邦之本也財者人之心也兵者財之蠧也其心傷則其本傷其本傷則枝幹顛瘁而根柢蹶拔矣惟陛下重慎之愍惜之今師興三年可謂久矣稅及百物可謂繁矣陛下為之宵衣旰食可謂憂勤矣海內為之行齎居送可謂勞弊矣而寇亂有益翦滅無期人搖不寧事變難測是以兵貴拙速不尚巧遲速則乘機遲則生變此兵法深切之戒往事明著之驗也夫投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也是以勞心於服逺者莫若修近而其遠自來多方以救失者莫若改行而其失自去若不靖於本而務救於末則救之所為乃禍之所起也修近之道改行之方易于舉毛但在陛下然之與否耳儻或重難易制姑務持危則當校禍患之重輕辨攻守之緩急臣謂幽薊恆魏之寇勢緩而禍輕汝洛滎汴之虞勢急而禍重緩者宜圖之以計今失于屯戍太多急者宜備之以嚴今失於守禦不足何以言其然也自祿山稱亂首起薊門中興已來未暇芟蕩因其降將即而撫之朝廷置河朔於度外殆三十年非一朝一夕之所急也田悅纍經覆敗氣沮勢羸偷全餘生無復逺略武俊蕃種有勇無謀朱滔卒材多疑少決皆受田悅誘陷遂為猖狂出師事起無名衆情不附進退惶惑內外防虞所以才至魏郊遽又退歸巢穴意在自保勢無他圖加以洪河太行禦其衝并汾洺潞壓其腹雖欲放肆亦何能為又此郡凶徒互相劫制急則合力退則背憎皆是茍且之徒必無越軼之患此臣所謂幽薊恆魏之寇勢緩而禍輕希烈忍于傷殘果於吞噬據蔡許富全之地益鄧襄鹵獲之資意殊無厭兵且未衄東寇則轉輸將阻北窺則都城或驚此臣所謂汝洛滎汴之虞勢急而禍重代朔邠靈之騎士自昔之精騎也上黨盟津之步卒當今之練卒也悉此彊徑委之山東勢分於將多財屈於兵廣以攻則曠嵗不進以守則數倍有餘各懷顧瞻遞欲推倚此臣所謂緩者宜圖之以計今失於屯戍太多李勉以文吏之材當浚郊奔突之㑹哥舒曜以烏合之衆扞襄野豺狼之群陛下雖連發禁軍以為繼援纍敕諸鎮務使協同睿㫖殷憂人思自效但恐本非素習令不適從奔鯨觸羅倉卒難制首鼠應敵因循莫前此臣所謂急者宜備之以嚴今失於守禦不足陛下若察其緩急審其重輕使懷光帥師救襄城之圍李芃還鎮為東都之援汝洛既固梁宋亦安是乃取有餘救不足罷關右賦車籍馬之擾減山東飛芻挽粟之勞無擾則禍亂不生息勞則物力可濟非止排難於變切亦將防患於未然徴發既停守備且固足得徐觀事勢更選良圖此於紓亂解紛抑亦計之次也議者若曰河朔群盜尚未殱夷儻又減兵必更生患此蓋好異不思之說耳臣請有以詰之前歲伐叛之初唯馬燧抱真李芃三帥而已以攻必剋以戰必强是則力非不足明矣洎遲留不進乃請益師於是選神策鋭卒以繼之而李晟往矣猶曰未足復請益師於是徴朔方全軍以赴之而懷光往矣幾遣加半之戍竟無分寸之功是則師不在衆又明矣然而可託以為解者必曰王師雖益賊黨亦增曩獨田悅寶臣今兼朱滔武俊臣請再詰以塞其辭曩之田悅寶臣皆蓄鋭養謀劇賊之方彊者也尋而田悅喪敗寶臣殱夷雖復朱滔武俊加于前亦有孝忠日知乘其後是則殘勢不滋於曩日王師有溢于昔時又明矣曩以太原澤潞河陽三將之衆當田悅朱滔武俊三寇之兵今朱滔遁歸武俊退縮唯此田悅假息危城設使我師悉歸彼亦才能自守況留抱真馬燧足得觀釁討除是則減兵東征勢必無患又明矣留之則彼為冗食徙之則此得長城化危為安息費從省舉一而兼數利惟陛下圖之謹奏贄又奏曰賊泚稽誅保聚宫苑勢窮援絶引日偷生懷光總仗順之師乘制勝之氣鼓行芟翦易若摧枯而乃寇奔不追師老不用諸帥每欲進取懷光輒沮其謀據茲事情殊不可解陛下意在全護委曲聽從觀其所為亦未知感若不别務規略漸相制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懷光偶論此事臣遂泛問所宜懷光乃云李晟既欲别行某亦都不要藉臣猶慮有翻覆因美其軍盛强懷光大自矜誇轉有輕晟之意臣又從容問云昨發行在之日未知有此商量今者從此却回或恐聖㫖顧問事之可否決定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏别賜懷光手詔示以移軍事由其手詔大意云昨得李晟奏請移軍城東以分賊勢朕緣未知利害本欲委卿商量適㑹陸贄從彼宣慰回奏云見卿論叙軍情語及于此仍言許去事亦無妨遂敕本軍允其所請卿宜授以謀略分路夾攻務使叶齊剋平寇孽如此則詞婉而直理順而明雖蓄異端何由起怨臣初奉使諭㫖本緣糧賜不均偶屬移軍事相諧㑹又幸懷光詭對且無阻絶之言機宜合并若有幽贊一失其便後何悔追伏望聖聰速垂裁斷謹奏贄又奏曰懷光當管師徒足以獨制凶寇逗留未進抑有他由所患太强不資傍助比者又遣李晟李建徽楊惠元三莭度之衆附麗其營無益成功秖足生事何則四軍接壘群帥異心論勢力則懸絶高卑據職名則不相統屬懷光輕晟等兵微位下而忿其制不從心晟等疑懷光養寇蓄姦而怨其事多淩已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全强者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊寇未平新患方起憂歎危切實堪疚心太上消慝於未萌其次救失於始兆況乎事情已露禍難垂成委而不謀何以寧亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然他日雖有良圖亦恐不能自拔拯其危急唯在此時今因李晟願行便遣合軍同往託言晟兵素少慮為賊泚所邀藉此兩軍迭為掎角仍先諭㫖密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳者也夫制軍馭將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏策得其要契其時然後舉無敗謀措無危勢今者屯兵而不肯為用聚將而罔能叶心自為鯨鯢變在朝夕留之不足以相制徒長厲階析之各競於擅能或建勳績事有必應斷無可疑解鬬不可以不離救焚不可以不疾理盡于此惟陛下圖之贄又奏曰欽漵奉宣聖㫖省卿所奏蕃軍退歸及關中體勢理皆切當甚慰朕懷然渾瑊李晟等諸軍須有商量規畫令其進取朕見欲遣使宣慰卿宜審細條疏速奏來者臣聞將貴專謀兵以竒勝軍機遙制則失變戎師禀命則不威是以古之賢君選將而任分之于閫誓莫干也授之以鉞俾專斷也夫然故軍敗則死衆戰勝則策勳不用刑而師律貞不勞慮而武功立其於委任之體豈不博大哉其于責成之利豈不精核哉自昔帝王之所以夷大艱成大業者由此道也其或疑於委任以制斷由已為大權昧於責成以指麾順㫖為良將鋒鏑交于原野而決策於九重之中機㑹變于斯須而定計于千里之外違令則失順從令則失宜失順則挫君之嚴失宜則敗君之衆用捨相礙否臧皆凶上有掣肘之譏下無死綏之志其於分畫之道豈不兩傷哉其於經綸之術豈不都謬哉自昔帝王之所以長亂繁刑喪師蹙國者由此道也茲道得失兵家大樞當今事宜所繫尤切蓋以寇盜充斥乘輿播遷人心有觀變之搖王室無自固之重秦梁回繚千里而遙臨之以威則力勢不制授之以䇿則阻逺不精頃者驟降詔書教諭群帥事無大小悉為規裁及乎章表陳誠使臣復命進退遲速率乖聖謀豈皆樂于違忤哉亦由傳聞與指實不同懸算與臨事有異故也設使其中或有肆情奸命者陛下能於此時戮其違詔之罪乎臣竊恐未能也陛下復能奪其兵而易其將帥乎臣亦恐未能也是則違命者既不果行罰從命者又未必合宜徒費空言秖勞睿慮匪唯無益其損實多何則時方艱屯下陵上替凡在執干戈而衛社稷者皆自謂勳業由已義烈發心安于專行病于羈制陛下宜俯徇斯意因而委之遂其所安護其所病敦以付授之義固以親信之恩假以便宜之權待以殊常之賞其餘細故悉勿關言所賜詔書務從簡要慎其言以取重深其託以示誠言見重則君道尊託以誠則人心感尊則不嚴而衆服感則不令而事成其勢當令智者騁謀勇者奮力小大咸極其分賢愚各適其懷將自效忠兵自樂戰與夫迫于驅制不得已而從之者志氣何啻百倍哉夫君上之權特異臣下者唯不自用乃能用人其要在順于物情其契在通于時變今之安契頗具于茲儻䝉究思或有可取謹奏憲宗元和四年上令左軍中尉吐突承璀統神策軍討王承宗莭制諸道兵馬翰林中縷陳從古無令中人統鎮師徒諸道受其莭制者師出不律軍必無功前後諫論一十八度後宰相論亦不允遂依上㫖乃令學士李絳撰白麻其日絳又進狀稱事實不可適有進㫖召學士梁守謙上手執一紙文書云宰相悉言可任承璀而學士不肯如何遂令中書出敕踰嵗承璀果無功旋師更寵授開府儀同三司依前中尉絳謂諸學士曰絳謬䝉恩奬超越諸公當悉報恩不顧獲罪今吐突啓用兵之端無擒敵之效傷人費財貽國大耻虧損聖德汚辱史策此事須上論不敢回避履危之際絳自上疏不敢有纍諸公遂上疏極諫其略曰且其擾改師徒陷沒將校衆請群議必謂陛下正其刑典懲之後來今返極寵榮重加崇秩已後更有敗軍失律之將蹈利干賞之夫則何以處之若誅之則罪同而罰異王法之不一也若捨之則保身而玩敵國典之不行也伏望心割不忍之恩舉不刋之典責無功之罪追不次之榮使備邉之將有所懲勸當危之士無復顧望實天下幸甚翰林學士白居易上奏論吐突承璀職名曰自昨日來臣與李絳等已頻論奏又奉宣令依前定者臣實深知不可豈敢順㫖便休伏望聖慈更賜詳察臣伏以國家故事每有征伐專委將帥以責成功近年以來漸失舊制始加中使命為都監頃者韓全義討淮西之時以賈良國為都監近日髙崇文討劉闢之時以劉貞亮為都監此皆權宜且為近例然則興王者之師徴天下之兵自古及今未有令中使專統領者今神策軍既不置行營莭度使即承璀便是制將又充諸軍招討處置使即承璀便是都統豈有制將都統而使中使兼之臣恐四方聞之必輕朝廷四夷聞之必笑中國王承宗聞之必增其氣國史記之後嗣何觀陛下忍令後代相傳云以中官為制將都統自陛下始伏乞聖慮以此思之臣又兼恐劉濟茂昭及希朝從史乃至諸道將校皆耻受承璀指麾心既不齊功何由立此是資承宗之計而挫諸將之勢也伏乞聖慮又以此思之臣伏以陛下自春宫以來則曽驅使承璀歲月既久恩澤遂深望陛下念其勤勞貴之可也陛下憐其忠赤富之可也至於軍國權柄動關於治亂朝廷制度出自於祖宗陛下寧忍徇下之情而自隳法制從人之欲而自損聖明何不思於一時之間而取笑於萬代之後今臣忘身命瀝肝膽為陛下痛言者非不知逆耳非不知危身但以螻蟻之命至輕社稷之計至重伏乞聖慮又以此思之陛下必不得已事須用之即望改為都監且狥舊例雖威權尚重而制度稍存天下聞之不甚驚聽如䝉允許伏望速宣與中書改為諸軍都監臣不勝憂迫懇切倣徨之至吐突承璀率師出討王承宗既而兵老不決居易又上言陛下討伐本委承璀外則盧從史范希朝張茂昭今承璀進不決戰已喪大將希朝茂昭數月乃入賊境觀其勢似隂相為計空得一縣即壁不進理無成功不亟罷之且有四害以府帑金帛齊民膏血助河北諸侯使益富彊一也河北諸將聞吳少陽受命將請洗滌承宗章一再上無不許則河北合從其勢益固與奪恩信不出朝廷二也今暑溼暴露兵氣熏蒸雖不顧死孰堪其苦又神策雜募市人不忸于役脫奔逃相動諸軍必搖三也回鶻吐蕃常有遊偵聞討承宗歷三時無功則兵之彊弱費之多少彼一知之乘虛入寇渠能救首尾哉兵連事生何故蔑有四也事至而罷則損威失柄秖可逆防不可追悔亦會承宗請罪兵遂罷憲宗時白居易又論孫璹狀曰伏以鳳翔右輔之地控壓隴蜀乂近國門最為重鎮承前已來多擇有功勳德望者為之莭使昨者孫璹忽除此官臣緣素未諳知不敢輕議可否及制下之後甚不愜人心孫璹雖久從軍不聞有大功效自居禁衛亦無可稱至於姓名衆未知有縱有才略堪任將帥猶宜且試於小鎮不容便授此重藩豈唯公議之間以為過當亦恐同類之內皆生幸心況今聖政日明朝綱日舉每命一官一職人皆側耳聽之則除授之間深宜重慎今孫璹已受成命未可遽又改移待到鳳翔觀其可否已後不可不審伏惟聖聰留察居易又論張奉國狀曰奉國當徐州用兵之時已有殊效及李錡作亂之日又立大功忠莭赤誠海內推服近來將校少有比倫已䝉聖恩授金吾大將軍以示奬勸以臣所見更宜與一方鎮以感動天下忠臣之志以摧懾天下姦臣之心何者奉國之事無人不知方鎮之榮無人不愛若奉國更得莭度使天下聞知人皆為貪寵榮誰不爭效忠順萬一若一方有事一帥負恩則麾下偏裨競為奉國亂臣賊子不敢不息一則明勸忠貞一則暗銷禍亂聖人機柄正在於斯今奉國聞已有年亦宜速用事不可失臣深惜之然以奉國未曽為理人官恐未可便授大鎮若近邉次莭度有要替處奉國最為得宜謹具奏聞謹奏敬宗寶歷元年朝廷得劉悟遺表議者多言上黨內鎮與河朔異不可許李絳上疏曰兵機尚速威斷貴定人情未一乃可伐謀劉悟死已數月朝廷尚未處分中外人意惜此事機所幸劉從諫未嘗久典兵馬而昭義素貧必無優賞其衆必不盡與從諫同謀但速除近地一將令兼程赴鎮使從諫未及布置新使已至潞州則軍心自有所繫矣今朝廷久無處分彼軍不曉朝廷之意猶豫之間若有姦人為之畫策虛張賞設軍士覬望尤難指揮伏望速下明敕宣示軍衆奬其從來忠莭賜新使繒五十萬匹使之賞設續除從諫一刺史必無違拒臣常熟計利害決無即授從諫之理時李逢吉王守澄計議已定竟不用絳等謀宋太宗淳化二年李惟清遷給事中充鹽鐵使遂以帳式奏御太宗曰費用若此民力久何以堪如何減省即便裁度惟清曰比開寶軍興之際其數倍多蓋以將帥未得其人邉事未寧屯兵至廣也臣聞漢有衛青霍去病唐有郭子儀李晟西北望而畏之如此則邉事息而支用減矣望慎擇將帥以有威名者俾安邉塞庶莭費用上曰彼一時此一時也今之西北變詐與古不同選用將帥亦須深體今之機宜韓彭雖古之名將以彼時之見制今之敵亦恐不能成功今縱得人未可便如古委之此乃機事卿所未知也真宗咸平元年右司諫孫何上奏曰臣逺祖武有言曰將者人之司命國家安危之主蓋得其人則用無弱卒戰無堅敵失其人則禍有不測宗社攸寄黎民所賴其委任而尊崇之也故有築壇告廟而授者有推轂分閫而遣者軍功爵賞皆決於外參佐僚屬許之自辟昔趙衰舉郤縠於晉侯曰敦詩書而說禮樂晏嬰薦穰苴於齊侯曰文能附衆武能却敵非謂彎弧擊劒䝉輪拔棘矜匹夫之勇決一旦之命也歷代將帥多出儒者臣不敢援引三代請以炎漢之後言之光武有鄧禹先主有諸葛亮西晉有羊祜杜預東晉有祖逖謝𤣥苻堅則有王猛後魏有崔浩梁則有謝艾隋則有高熲至於唐室儒將尤多若郭元振之鎮隴右狄仁傑之帥河北裴度之平淮蔡溫造之定興元此數臣者皆有尊主庇民之功善始令終之德一時武臣未有出其右者朱梁後唐以馬上為治文武之柄離為二文者專治茟硯耻言軍旅之事武者狃習戈㦸罕有帷幄之謀交相是非坐觀成敗今塞北有未賔之狄河西有强項之羌偶未成擒病在此耳夫善師不陳上將伐謀事權宜專號令貴一古者元戎之外餘皆偏裨悉授指蹤且無顧望近代加以副二參以監臨事有嫌疑動相牽制而為將者又多武人崛起軍候稍遷恩不足以懷四逺威不足以御群校鮮有司馬之兵法韓信之謀畫亞夫之持重關公之勇敢或逗遛而玩寇或險果而輕敵强敵假息事皆由此歷觀前代之備邉也或振旅薄伐或整兵深入或取贍於軍市或因糧於敵境或以屯田周給或以輕齎自隨而士皆宿飽師出無敵亦有旁招小國近撫諸蕃或厚賂以結其心或反間以收其效不困已之士卒不竭已之饋餉計中術內使之挫衄朝錯有言曰用蠻夷攻蠻夷中國之長算故陳湯因烏桓而郅支滅任延藉西域而胸奴敗未聞空荒之地使者旁午動息之間贏糧景從臣嘗竊算國家士人之衆土地之廣已百倍於羌虜而兵戈屢動未能垂藁街之首輦運交馳未能撤榆塞之警其故何哉蓋選將之術任人之道或有所未盡者也今之莭度使昔之大行臺今之都部管昔之大總管將帥列銜至今猶帶度支營田等使者蓋元戎之任無不統攝也原其責成之道欲使民不告勞師有必勝且耕且戰足食足兵也爰近代始有供軍糧料之名隨軍轉運之目使額既衆適從無所司計者不知尺籍伍符之數握兵者不恤飛芻挽粟之苦群口交沸互相督責託稱上㫖而實戾成算動必中覆而大費官帑陛下何惜上將之旗鼓通侯之印綬不於文資大臣擇訪委以莭制而使此二敵時聳邉方唯祀與戎斯為大事唯名與器必在得人改而更張正在今日伏願陛下洞開城府妙選公卿勿俾武人擅其權勿使中使撓其事閫外之漕挽一以付之境內之租賦榷利一以與之使其有牛酒而犒軍有黃金而傾敵舊所謂監陳先鋒之類咸取偏將為之仍令禀其莭度果用是道臣見幽薊之故地河湟之舊墟三年之內皆為國家郡縣與夫列校齊驅近臣迭往不可同年語矣難者或曰利器不可以示人大柄不可以歸下此又膠柱之常談也夫為國者患賢之不得不患權之分保民者患邉之不寧不患將之重苟得其人則可以寄社稷之事況疆埸之任乎茍非其人則州縣之職亦不可委況貔貅之衆乎陛下若謂今之武臣宣力已久不可勃然改革自可伺其秩滿俟其員缺互以儒將代之統兵酬其前勞改授近地況文武參用典故具存亦非聖朝創立此制太祖以不殺之略降巴蜀平升潤下荆湖太宗以非常之謀取并汾朝吳越來漳泉豐功厚利炳在信史天其或者留此二敵啓發神武待陛下而蕩平剪滅之不可稽誅如此之久也斯事機要非小臣所當議然備位諫列受詔讜言茍此際不能罄竭狂瞽即尸祿曠官甚矣瀝懇章奏惟陛下特達而行之真宗時李迪為翰林學士召對龍圖閣命迪草詔徐謂迪曰曹瑋在秦州屢請益兵未及遣遽辭州事苐怯耳誰可代瑋者迪對曰瑋知唃廝囉欲入寇且窺關中故請益兵為備非怯也且瑋有謀略諸將皆非其比何可代陛下重發兵豈非將上皇聖號惡兵出宜秋門邪今關右兵多可分兵赴瑋帝因問關右兵幾何對曰臣向在陜西以方寸小冊書兵糧數備調發今猶置佩囊中帝令自探取目黃門取紙筆具疏某處當留兵若干餘悉赴塞下帝顧曰真所謂頗牧在禁中矣未久唃廝囉果犯邉秦州方出兵復召迪問曰瑋此舉勝乎對曰必勝居數日奏至瑋與敵戰三都谷果大勝帝曰卿何以知瑋必勝迪曰唃廝囉兵遠來使諜者聲言以某日下秦州㑹食以激怒瑋瑋勒兵不動坐待敵至是以逸待勞也臣用此知其勝帝益重之時議者欲以金繒啖契丹使攻元昊御史中丞賈昌朝曰契丹許我有功則責報無窮矣力止之乃上言曰太祖初有天下監唐末五代方鎮武臣土兵牙使之盛盡收其威權當時以為萬世之利及太宗時將帥率多舊人猶能伏威靈禀成算出師禦寇所向有功近歲恩幸子弟飾厨傳釣名譽多非勳勞坐取武爵折衝攻守彼何自而知哉然邉鄙無事尚得自容自西羌之叛士不練習將不得人以屢易之將馭不練之士故戰則必敗此削方鎮太過之弊也況親舊恩幸出即為將素不知兵一旦付以千萬人之命是驅之死地矣此用親舊恩幸之弊也今楊崇勳李昭亮尚任邉鄙望速選士代之方鎮守臣無數更易刺史以上宜慎所授以待有功此救弊之一端也歷代名臣奏議卷二百三十六
