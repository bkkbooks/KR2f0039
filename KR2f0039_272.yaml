body:
  text: 厯代名臣奏議卷二百七十二明楊士竒等撰理財宋孝宗時王質論州郡財賦殿最賞罰劄子曰臣竊謂方今天下之財患在於散而不能收隠而不能出能收其散出其隠據度内之財自可了目前之事臣愚不知生財大計獨以為禁姦懲慢謹藏嗇出猶為庻㡬且一州之中姦欺逋慢漁取有司之利蟻漏公上之財者不知其㡬精神思慮一有不到則財賦随去臣嘗竊喻如手中摶沙放手即散隙中觀騁轉眼即失此物一去則百事盡廢今陛下郡國布在宇内臣竊料其間上下煎熬支吾不前者居其太半此其財賦亦未嘗無或逋滯不集或滲漏不見逋滯不集者促迫不得其法則逋滯無可集之期滲漏不見者捜索之不得其處則滲漏無可塞之理因仍而不救則至大壊凡今陛下郡國其已壊者不知其㡬其將壊者又不知其㡬恐遲數年不復有可為之地其於陛下國事所係非輕臣所管州最為鄙陋窮薄之處又適當倒廢敗壊之餘陛下溥愽髙明固所具知而臣二年之間補發舊欠十萬有竒綱運上供州郡支遣五十萬有竒而終任見在又二萬有竒以此知世不可謂無財而散漫不收隠匿不出者以嵗計之不知其㡬何以天下計之又不知其㡬何方其散且隠也則此物或隂落姦欺之便或委為廢棄之物及其收且出也則一物成一用一用濟一事以嵗計之其所濟不知其㡬何以天下計之其所濟又不知其㡬何臣蠢愚寡陋安知為政徒悉臣之心窮臣之力收拾一郡之財粗辦二年之事而況郡國之大有什百於此人才之能有千萬於臣者乎近時一二儒臣所至之處輙稱沛然則陛下宇内之財果不可謂無也有人然後有政事有政事然後有財賦人廢而政事弛政事弛而財賦始不可見矣陛下凡臨遣守臣莫逃聖鑒然不賞罰殿最則無以為勸沮臣願陛下明詔監司凡本路守臣如綱運上供無拖欠州郡官吏軍兵支請無積壓或拖欠積壓者每嵗各擇其尤一二人以聞陛下躬出剛斷顯行黜陟能者有以自喜而愈不惜力不能者自知其不可為必求引避又將有自量力不敢試郡以謀茍禄者不待沙汰而庸者去不勞選舉而材者出自此州郡可以各自支持陛下可以少思省慮雖未能大治可漸冀小康伏惟陛下財擇中書舎人崔敦詩奏乞究和糴之弊䟽曰臣竊聞朝廷已降指揮諸州和糴盖以年榖屢豐粒米狼戾臣竊窺陛下之意豈惟廣儲蓄以強國固將重榖粟以惠農其為徳意可謂曲盡臣竊謂和糴之弊其大有二二弊不去反為民害不可不察其一州郡乾没之弊盖朝廷既已給降本錢諸州乃有占吝不將盡數置場收糴却差委所信任僚屬受納冬苗許以薦舉啗以饋遺令以㪷面極力大量既收斂贏餘以充和糴遂乾没本錢以為私用此其弊一也其二縣道科擾之弊盖州縣既承認朝廷之所糴數目乃以其數科撥下屬縣分糴縣之於州非錢不行計㑹符移則有使用請降本錢則有剋除洎至得錢下縣已不及元定價直無由收糴於是不免科敷上户或至中户止據所請到錢令認數入納此其弊二也今指揮初下議者皆以二弊必至重為民害是使田野豐登返有愁歎之苦朝廷徳意遂為姦貪之資臣愚欲望睿慈專委清强監司徃来廵行覺察如有上件違戾即許按劾重賜黜責施行斷在必行斯民幸甚崔敦禮代人上殿論郡縣財用劄子曰臣竊惟天下之事無小大無輕重必有賞罰加焉然後能者勸怠者奮有所建立故不勞而功易集未有賞罰之不加而能集事者而況理財之大計而可於此忽乎臣伏見陛下自即位以来勵精圖治至於足國裕民之計尤軫宸𠂻凡所規畫罔不備具而獨未見明立殿最以示勸懲臣愚欲望聖慈明詔有司立為定制應諸州長吏合管財用專責漕臣以其始至之成數校其終更之増虧果増耶於是從而劾實之茍非刻剥以聚斂姦欺以虚樁則必優加以亷能之賞果虧耶於是從而劾實之茍非有添屯軍馬非有水旱災傷則必重之以廢弛之罪如是則州縣之間莫不樂事勸功各奮其能將見國用之足暴暴如山岳浩浩如江海其効豈小補哉袁說友上寛恤茶商䟽曰臣謂比者兩路之盜皆出於茶商因成嘯聚此徒本亦良民豈願流為盜賊自取死亡必有大不得已起於貧窮然後為此朝廷要當講求兩路茶商利害稍從寛恤或恐有利於公而不利於私者或取利太多而荼户不得以自贍者或禁之無術而徒苛虐以害其商者與夫荼引之貴賤胥吏之乞覓廵捕之邀求無厭州縣之額外科擾凡此之𩔖宜降明詔命兩路荼鹽司同帥臣公共體量事勢熟究利害須公私兩便在荼商可以安業而公家不失所利並令畫一條具取㫖施行擇其果可長乆而便民者速與行下庶㡬少安荼商之心潜弭盜竊之志員興宗議虚額䟽曰臣聞天下有經常之法有權宜之法何謂權宜之法四川折估是也盖常法則可以乆行權宜之法雖可行而不可乆乆行則其法必弊若從其弊而漸革之則其害乃可去也臣請言四川折估虚額為四川宿弊之說盖折估之始起於趙開之申謀開常言鹽酒為四川之利因民所産定為官課郡縣之間鹽户酒户有上下之不同故納錢納引有多少之不一方其設法之始均科於蜀蜀中地力甚全民力甚裕是以開在紹興之初雖川陜多事一跬歩而能運百貨一咳唾而能濟三軍非開之才獨能辦此當時蜀産浩浩亦有以致此也譬若少壯果悍之人使其負百斤行千里雖日行而日不蹷盖其筋力足為之用也自開之後利源漸廢蜀之有司既無開之才惟效開之短鹽利則累年而必取不知地力有時而竭不可以必取也酒利則拘數而欲敷不知酤賣有時而㣲難望其必敷也譬如華顛癃老之人復欲責其負重而行千里以同於少壯其力果能勝乎臣見近時蜀之有司無術於此惟出茍且大則施刑禁小則行笞箠彼知為已取民以逃責不知為朝廷逭責以愛民其用心果何如也是致比年四川郡縣之間鹽户酒户貧乏可念或有户竄而名存或有力均而額重或勒鄰里承煎而首尾俱壊或預那儧撥而前後皆貧或委吏推排而吏又不公或誘人渲淘而仍増新額浚逼萬狀其弊無他有司務趂折估知取其利不見其害故也至最甚者驅催不足累嵗闕䧟遂積虚額額則虚立而長在錢則從何而可追蜀之有司日移一令月行一牒多許所欠州軍通融撥舊欠然諸州官緡各有定額臣不知使之通融者以何窠名令之補撥者以何物色有司心固知其不可但昧心而力行之爾賴陛下至明至哲照見廣逺邇者下四川緫所増造錢引三百萬以備虚額西民聞之式歌且舞此聖主欲割費便民大除宿蠧之秋也然賤臣尚恐蜀之有司猶暗大體簡忽詔㫖雖今有除放之文恐蜀未遂蠲減之利臣愚伏望陛下特命中朝剛果開亮之臣外稽軍實遍約吏費别緫四川實支之數使逐嵗所取合所用所用合所取如此折估可以議減虚額可以漸去也然議者必謂四川實收之數不及實支之多是以難議臣請得以難之盖四川諸處未甞無濫費特患未節爾有如諸司送往迎来折送多至數千緡者府州諸色頭子諸州贓罰輙入公庫亦有至千百計者郡縣籍没田産郡縣闕額職田大郡中郡嵗月亦至數千百計者其他浮泛之用不經甚衆曷若減此不急之用而補虚額之闕急者乎浮費一減既補實支之闕補雖未盡亦少濟矣萬一朝廷續有給降四川錢引尤大惠也況陛下既得剛果之臣體訪浮費削去冗目又稽軍實何慮虚額之不能減乎又前日頒下三百萬之數併乞分令成都等路州縣從某年至某年並與鹽酒户各減實數三分之一或四分之一庶幾民間通知逐户均減名下所欠不致諸司州縣臨時欺隠依舊含糊有分俵催科之弊也兼乞令蜀中逐處州縣各納實收實支之數于户部四川緫所又併納焉其諸司自今復有苛刻於實收外增加取民者請論如法若困敗州縣自紹興之初雖係折估實收之數元額日漸不敷者亦乞量與捐減如是則事出朝廷恩洽四逺矣興宗議節財奏曰臣聞天之生民以君而司牧之故君人者養民者也百吏者推君之令而同養斯民者也民者䝉君之愛養而出力以事其上者也上既育物以食下下復勉力以事上則上下俱利矣臣觀三代之君率多節已以愛人故人常有餘隋唐之世率多取人而徇已故人常不足財力至此非獨時之弊法之弊亦由乎用物少節之弊也用物少節則知出而不知入知求而不知約無為後日之計者此陸䞇之徒所以有裁節之說也臣請舉小以喻大今有一縣之令下收萬家租稅之額上有諸司期㑹之廹善為令者必先示以閒暇預計所入之豐約以權一縣之難易内決於心外集於事早夜思之曰吾邑嵗入為租幾何為緡幾何月合趂辦者是何色額合裨補者有何事件夫如是則官緡可以及期雖至期而足手不亂是其慮之先定量入為出之說也若夫不善為令則造端散亂當後而先當先而後所斂之數無定期所撥之物無常準縣必不治事亦随闕然則天下之財果在乎預計之節出之所謂驟取而濟用不若謹用而緩取之為易也多費以臨民不若愛民而費省之為愈也悠悠千載於此清而革之者則必存乎其人矣恭惟陛下即位至今道肩三代始則罷四方羨餘之入又甞減諸處浮游之用賜予羣臣莫不有節塗金飾翠莫不有禁陛下愛民謹用之事躬行既有方矣然邇者軍旅之後州縣一嵗之入纔供一嵗之用未暇乎三嵗之積也呉蜀之産各供呉蜀之用未能為江淮之助也豈諸路監司郡守知取而不知其術乎陛下比令逐路求省費用講究實有可革弊事聞奏無事文具諸路終未有卓然之說上當聖意者小臣其敢黙黙也臣於前二議甞指陳州縣廂軍之冗及吏員之冗是最害財之大者若州縣員闕合有撙節去處自今乞為量置如一路兩轉運添差鈐轄之𩔖是也吏俸嵗入千緡上下减百吏則異時嵗減百萬緡矣此一利也諸軍逃亡而額存有虚破請給者廂軍羸幼不堪衆役有濫請受者異時兩項並覈其實以百萬之衆淘汰一二萬不致他慮矣若以二萬為數他日一兵嵗減百千一年即減二百萬緡矣此二利也吏既有俸又有職田之入聞朝廷大議借取三年而用之其實可以減之也此三利也江淮禁銅鐵越界而四川鐵錢既已應副淮上有司宜盡力不辭然今蜀中所用鐵器多是暗銷鐵錢願更申明此禁亦救四川錢荒之一耳此四利也如四利既講則浮費可以日削國財可以漸裕陛下躬行堯禹約已於其上有司遵法覈實於其下其又何憂臣觀太祖太宗之初南得荆楚東得并潞其費百出所以優贍不乏者竊迹前事大抵兵不冗員不濫用不浮故也先儒范鎮甞言仁宗曰天下大計宜常較出入常定經制願詔大臣使具太祖初賦入若干兵若干官若干太宗時賦入若干兵若干官若干真宗時賦入若干兵若干官若干與今賦入之數官之數約取中道以立經制十分為率以幾分為給兵吏幾分給郊廟幾分備水旱為之十年則可以致治矣凡鎮之說即臣量入為出之說也伏望陛下不以蟣虱小臣之言特賜聖鑒使臣前項所述四利稍見記録雖然爝火居日月之旁爝火為不明庸言陳聖哲之前庸言為不智陛下天日之照如此尚何待小臣之說也傳曰狂夫之言聖人擇焉臣是以列此也趙汝愚乞選通練公方之士與諸路漕臣講求所部財用奏曰臣聞人君之於百姓朝廷之於郡縣要如心腹之於四體膚髪其相去雖若甚逺而其中脉絡貫通血氣流暢故慈惠惻怛之意纔發於方寸而汪濊滲漉之澤已浹於四方萬里之逺矣此無他以其上下一體而所欲同也仰惟陛下恭儉本於天性仁厚發於至誠即位以来垂二十年凡夜之所思旦之所行無非節用愛人為事遂至天聽昭格年榖屢豐强敵革心境外無事是宜下天上施家給人足仰稱陛下憂勤之意而比嵗州縣事力單弱財竭於上民困於下風俗衰敝巧偽實繁盜賊滋多刑辟者衆陛下雖有仁政而澤不下及陛下雖有徳意而民不盡知良由人自為功官自為政上下不相顧恤而陛下之赤子始告病矣陛下聖明灼知其弊嵗在已亥浚發徳音令諸路漕臣各計其所部盈虚之數而損益之期以實惠及於斯民甚大惠也臣屏居一方不能盡知諸路所行次第然臣竊謂此重事也既非數月間所能盡見底藴又慮本末未舉首尾中斷州縣欺蔽猶為虚文臣愚伏望陛下申告在位俾上自朝廷下逹郡縣人知陛下聖意堅決固欲為此以康濟斯民於是選擇通練公方之士數人使與諸路漕臣相為表裏猶須假以嵗月之乆俾得悉意講求然後制均節之宜定取予之數庶㡬乎内外恊心上下兼足永為根本不㧞之計臣不勝惓惓知静江府范成大論透漏銅錢劄子曰臣聞東南蕃夷舶船嵗至中國舊止以物貨博易近年頗以見錢為貴廣泉四明及並海州郡錢之去者不可勝計紹興三十年甞大立法禁五貫之罪死随行錢物全給告人罪賞之重至此極矣而終弗敗獲盖溟渤荒渺客程飄忽誠有法禁所不能及者訪聞一舶所遷或以萬計泉司嵗課積聚艱窘而散落異國終古不還誠可為痛惜而深恨也今法禁既不可制盍亦循其本而捄之乎臣愚欲望明詔試令有司條具每嵗市舶所得除官吏糜費外實裨國用者幾何所謂蕃貨中國不可一日無者何物若資國用者無幾又多非吾之急須則何必廣開招接之路且以四明論之蕃舶所齎止扵青甆銅器螺頭松實及板木之𩔖而已皆非中國不可無之物而誘吾泉寳以去利害重輕不較而判臣甞試妄議以為明州一處蕃舶豈不可以權住姑塞漏錢之一穴其它可以𩔖舉此㧞本塞源不爭而善勝之道今無法以必禁又以為蕃貨不可無則當坐視泉寳四散而去勿惜恨可也惟陛下與大臣熟計而圖之知信州王師愈上奏曰臣聞州郡者國之源也州郡足則每嵗供輸扵國者罔不足或有水旱之灾盜賊之警師旅之興亦有以為之備州郡不足則供輸扵國者已匱乏扵和平之時一有水旱盜賊師旅之用未有不惶惶而失措是以善富國者必以足州郡為先務也比来州郡乃大不然嵗之所入有限而用度無義困扵太守之數易困扵禁軍之起發増揀汰養老之人以困之又有不時之需以困之廓廓無事安平如今日凡所以供輸扵國者猶愆期而不能辦甚者如卒伍之衣粮揀汰養老人之請給𩔖多積壓無以支散頻致喧閙仰瀆天聽況水旱盜賊師旅之備乎州郡窘乏甚矣豈不為深可慮㢤救是弊者不在它求誠能乆郡守之任㝎飬老之員踈禁軍之起發省不時之需則州郡之力自然而蘇息不待積嵗之久自然足用州郡足則國未有不足此富國之要術也惟陛下留神幸甚光宗紹熈元年吏部員外郎陳傅良上奏曰臣恭惟陛下嗣位之初詔㫖丁寧皆為寛民力而下臺諫待従置局講究而臣猶以為民窮未捄何也誠以裁抑細微或蠲空張之數而已議結局未有以稱明詔大慰民望也臣来自逺方不知朝廷之費宫掖之奉嵗當幾何以所親見則天下之力竭扵養兵而莫甚扵江上之軍故每欲省賦朝廷以為可則版曹以為不可版曹以為可則總領所以為不可總領所欲以為可矣奈何都統司不可也陛下亦熟念之歟則以都統司謂之御前軍馬雖朝廷不得知總領所謂之大軍錢粮雖版曹不得與故也扵是乎中外之勢分而職掌不同則彼此不能以相謀事權不一則有無不能以相濟施行不專則前後不能以相守故雖欲寛民力其道無繇且夫承平關陕已行之乆中興韓岳未罷之前養兵亦甚盛矣而不見其不足誠在今日稍仍舊貫使都統司之兵與向者在制置司時無異總領所之財與向者在轉運司無異則中外為一體中外一體則寛民力可得而議矣凡事斷之而有異論勿斷可也行之而有後患勿行可也往者元祐至扵宣和甞罷新法矣則有紹述之說起而為梗靖康至于紹興甞用兵矣則有講和之說起而為梗故上之號令相反而不䏻定下之朋黨相傾而不䏻合若夫寛民力誰獨無是心㢤斷之而無異論行之而無後患莫過此者而何疑不決陛下誠斷之則今之大臣皆足以立經陳紀二三大臣誠推行之則今之人才皆足以受令承教方當年糓屢豐邉鄙不聳失此閒暇後将何及詩云譬彼舟流不知所届臣不勝拳拳光宗時淮東運副虞儔被召上殿劄子曰臣甞謂事體既定不可復有紛更民聽已孚不可自為疑阻盖紛更扵既定之餘則事體愈見其齟齬疑阻扵已孚之後則民聽莫知所適従故一法立則一弊生利未興而害先見矣此今日兩淮鐵錢交子之說也伏自兩淮行使鐵錢之後以其不便扵商旅之齎行也扵是始有請行交子之議自交子之既行也然後兩淮之人始以為便臣自前年叨帥淮西繼移東漕足跡所經厯耳目所聞見未甞有以交子為不便者日中為市百貨貿易銅鐵交㑹各有㝎直縱其間小有低昻皆出扵斯民之情願初非官司強為之也比来兩淮年榖屢豐物價又平商賈皆願出扵市行旅皆願出扵塗人情物態方熈熈然莫不樂其生而安其業胡可大體既㝎又從而復有紛更民聽已孚又從而自為疑阻乎且如四川鐵錢錢引行之二百餘年公私流通未有議其為不便者良由事體素㝎民聽具孚故也臣願陛下執此堅若金石行此信如四時不以小有偏而不舉之䖏而為浮議所揺則淮民亦享安静之澤不其幸歟蔡戡乞代納上供銀奏状曰臣一介么麽誤䝉陛下使令猥當一路之寄臣扵去年八月十四日陛辭面奉玉音令臣到官興利除害不得循常守故臣佩服聖訓夙夜以之臣自去年十二月入境初見寮吏與夫士庶首訽民間疾苦異口一詞莫不以科買上供銀一事為擾臣深求其故盖縁本路諸州每年所發上供銀除減放外目即計錢一十五萬二千一百六十九貫文省自来均下一十四州府扵嵗入係省等錢内置場買銀起發後縁諸州累經盜賊人户逃移賦入無㡬諸州遂将所買上供銀科敷人户買納每年轉運司雖䝉朝廷扵廣州賣鈔錢内支撥五萬貫文省貼助充本往往實惠初不及民並依舊例盡行科買甚者藉此為名過數抑斂以供州縣它用官吏並縁為姦催科輸納之際其擾有不可勝言坐是富者日貧貧者日困或轉徙它鄉或相聚為盜所在戸口稀少盜賊公行職由此也前後監司守臣陳請不一朝廷雖送户部勘當户部往往難扵施行近因知英州葛霖奏請見䝉行下本路諸司指定逐司遂陳請乞除廣州每發上供金銀等及十三州府進奏天申節并大禮銀並依數起發外又不願支請廣州賣鋪庫逐年撥降錢數欲將十三州府上供銀三萬四千三百餘兩盡數放免已具狀供申朝省未奉回降指揮臣深慮户部必以蠲除上件銀兩有虧經費未肯施行臣向甞面奏昨来本司前提舉官葛世顯曽扵存留鹽本錢外獻錢二十九萬文省陛下却而不受此錢見今樁管在都鹽倉臣欲到官契勘常平米數或有移用欠折即將上件錢收糴補足或與本路貧民下户代納積欠苗稅伏䝉陛下宣諭卿如此用心甚好臣自交割已後一面委官盤量常平米斛已有近地數州申到往往逐年兊換必無陳腐欠折借使移用到收成日自可補足兼本路州縣追催稅賦急扵星火不容更有積欠所是前項都鹽倉錢二十九萬貫未有支遣積而不散亦恐啓小人覬覦之心臣愚欲望聖慈斷自宸衷將此錢數并廣州賣鈔庫每年應副轉運司作買銀本錢五萬貫截自今年更不支撥付轉運司並從本司措置自淳熈六年為始均作三年買銀起發所有諸州逐年買撥上供銀欲乞權罷三年雖未能便行放免亦足以少寛民力又於户部經費初不相妨如䝉聖慈特從所請即乞行下庶㡬十三州數十萬户室家相保安於田里而無科敷抑勒之擾流離凍餓之苦咸知聖澤所及不間逺邇甚大惠也臣不勝萬幸彭龜年論湖北京西楮幣䟽曰臣竊惟國家興剏㑹子所以濟錢幣之乏若官司有以權之使之流通不壅然後緩急可恃臣聞湖廣緫領所㑹子當来立法止是許於湖北京西界内行使其襄漢戍兵月得料錢全靠客旅貿易其㑹子止到鄂州便着兊使而官司無以權之遂使坐賈之人乗其急遽低價以售用是一貫㑹子止可得五百左右見錢㑹子既輕商旅不行故戍兵所得㑹子愈難變轉而㑹子益輕矣萬一緩急豈不害事欲望聖慈行下湖廣緫領所多方措置須使見錢㑹子官私流通便商旅興販之利免戍卒折閱之怨不勝幸甚龜年乞寝罷賣田指揮䟽曰臣聞溥天之下莫非王土古者制田唯有歸受之法民既壯則受之既老則歸之如此而已未有舉在官之田與民交手為市者也唐許民賣永業田識者猶議其非古況官自賣乎臣竊聞近日斥賣官田此令一出四方之人交口竊議臣甚為朝廷惜此舉措也臣照得在法官田唯許下五等人户請佃所以優之也官户及上三等户不許所以防其侵細民求生之路也今一旦舉而出賣令之曰價髙者得小民雖有見耕之田無錢可買豪民積鏹千萬尋常睥睨小民之田恨不盡取而官司乃為之開其門闢其塗細民之田將盡歸豪民矣昔任其勞而墾治者細民之力也今享其成而膏潤者豪民之利也豪民以錢易田不歸恩於朝廷而細民一旦失田必歸怨於朝廷朝廷但以減二分價為優見佃之人不知見佃之人有錢則方可獲此利無錢則坐視有錢者取田去爾能使之不怨矣乎議者必謂今日國家匱乏一日出此可得數百萬緡豈不甚利此特小丈夫狷淺之見何足以謀國哉夫數百萬緡或可以積致人心一散不可以復收其輕重得失何如耶仰惟陛下自即位以来減月樁損經緫制輕折估寛和買仁心仁聞固已四逹然或者猶謂僅能寛州縣之力未必州縣能寛百姓也今賣田之令一出則害徑及百姓矣為人臣不能為人君固百姓之心而乃為人君離百姓之心此臣所甚憂也臣聞向来斥賣官田多以百姓不便而止臣謂與其使之不便而後止則所損已多矣不若不行之為愈也臣愚欲望聖慈特賜睿斷將賣田指揮早與寢罷以安人心以固國本不勝幸甚辛棄疾上䟽曰臣竊見朝廷行用㑹子以来民間争言物貨不通軍伍亦謂請給損減以臣觀之是大不然盖㑹子本以便民其弊之所以至此者盖由朝廷用之自輕故耳何謂本以便民世俗徒見銅可貴而楮可賤不知其寒不可衣飢不可食銅楮其實一也今有人持見錢百千以市物貨見錢有般載之勞物貨有低昻之弊至㑹子卷藏提擕不勞而運百千之數亦無虧折以是較之豈不便於民哉何謂朝廷用之自輕徃時應民間輸納則令見錢多而㑹子少官司支散則見錢少而㑹子多以故民間㑹子一貫換六百一二十足軍民嗷嗷道路嗟怨此無他輕之故也近年以来民間輸納用㑹子見錢中半比之向来則㑹子自貴盖換錢七百有竒矣此無他稍重之故也古謂將固取之必固予之豈不信哉臣以謂今諸軍請給㣲薄不可復令虧折故願陛下重㑹子使之貴於見錢若平居得㑹子一貫可以變轉一貫有餘所得雖㣲物情自喜緩急之際不過多印造㑹子以助支散百萬財賦可一朝而辦也臣甞深求其弊夫㑹子之所以輕者良以印造之數多而行使之地不廣今所謂行使㑹子之地不過大軍之所屯駐與畿甸之内數郡爾至扵村鎮鄉落稍逺城郭之處已不行使其他僻逺州郡又可知也臣愚欲乞姑住印造正以見在數泄之諸路先明降指揮自淳熈二年以後應福建江湖等路民間上三等户租賦並用七分㑹子三分見錢輸納民間買賣田産價錢悉以錢㑹中半仍明載於契或有違戻許兩交易并牙人陳訴官司以準折受理僧道輸納免丁錢亦以錢㑹中半以臣計之諸路所入㑹子之數雖不知其多寡姑以十萬為率論之其已輸於官者十萬藏之於家以備来年輸納者又十萬商賈因而以㑹子興販往来于路者又十萬是因逺方十萬之數而泄畿内㑹子三十餘萬之數也況其數不止於此哉㑹子之數有限而求㑹子者無窮其勢必求買於屯駐大軍去處如此則㑹子之價勢必踴貴軍中所得㑹子比之見錢反有贏餘顧㑹子豈不重哉行一二年諸路之民雖於軍伍市井收買亦且不給然後多行印造令諸路置務給賣平其價直務得見錢而已則民間見錢將安歸哉此所謂將固取之必固予之之術也然臣所患者法行之初僻逺州郡㑹子尚少髙其㑹子之價紐作見錢令人户準折輸納及其解發却以見錢於近裏州郡收買取其贏餘以資妄費徒使民間有増賦之名而㑹子無流通之理臣愚欲乞責之諸道緫領轉運立為條目以察部内之不奉法者竢得其人嚴寘典憲以示懲戒如此則無事之時軍民無㑹子之弊緩急之際朝廷無乏興之憂其利甚大寧宗時知潭州真徳秀奏復潭州酒稅狀曰臣至愚極陋誤䝉聖恩擢付一路入境之初訪求民瘼即聞𣙜酒一事重為潭人之害既又詳加考訂乃知積弊已極不容不更舊法具存不容不復臣敢䟽其本末以聞竊惟酒之有𣙜本朝家所藉以佐經費其来尚矣然可行於江浙諸路而不可行於廣南福建者盖瘴鄉災嶠疾癘易乗非酒不可以禦嵐霧而民貧俗獷其勢不能使之必沽於官故特弛其禁以從民俗之所便若重湖以南雖非閩廣之比然其宻鄰桂筦旁接連賀風土氣候徃徃相似故今全永郴道等州或聽民自釀而輸稅於官或於夏秋正賦併輸酒息未有専行禁𣙜如江浙諸路者也獨潭州在城或稅或𣙜前後屢變考諸故牘稅酒之法實起於紹興元年是時兵革未息城市蕭條幕府適有練達之人建議于州募醖户造酒城外而募拍户賣之城中入城之時數罌以稅官無尺薪斗米之費而坐獲利入民無逮捕抑配之擾而得飲醇美其後名公鉅卿相繼典州皆因而不改旁郡如衡依倣其法亦迄今遵行至乾道二年劉珙討平郴寇増置親兵又乞屯軍郴桂一時調度百出亦不敢輕變稅法但増置糯米場添創南北楚三樓量從官賣稍分醖户之利而已及辛棄疾之来剏置飛虎一軍欲自行贍養多方理財取辦酒課乃始獻議于朝悉從官賣明年權給事中芮煇奏言潭州自行稅酒法人甚安之官不費一錢而日有所入今變稅為𣙜皆謂不便人多移徙虚市一空始行之初所得雖多今止及半而米麴之本官吏之給盡在其中夫以小利易大不便猶不可況初無可得之利且彼方新經陳峒猖獗之後又可遽擾之乎孝宗皇帝亟從其說降㫖徃罷令本州照乆例施行是年冬帥臣李椿到官椿於吏事最為詳練亦奏臣乆居湖外備諳土俗稅酒之為民便已乆而棄疾改之當剏造營寨房廊日役夫匠甚衆所入雖不下七八百緡夫匠一散已不及初其後愈見虧額㑹計所得除抱認諸司錢及贍給官吏虚有廢罷醖户之名實無所益請依舊放行醖户稅賣而帥司樓店亦且開沽俟稅課登羨日止朝廷從之官司所醖既少姦弊易防故酒常佳而易售民户安意稅賣無抵法冒禁之憂故雖稍取其贏而不怨自是官酒與民酒並行著為定例莫之能改及開禧二年趙善恭又欲盡籠其息不待奏聞遽行官𣙜醖户失業犯法者多甫及數年其弊遂極曹彦約到任是時官賣之額日朘月減幕府相視束手無策彦約之議大槩以為若行𣙜酒則利在官吏而百姓䝉其害一為稅酒則利在百姓而官吏有所不便此議一起每指以為難行皆官吏自為之計非為公家計為百姓計者也以嘉定三年官賣本息計之雖名收二十萬八千五百八十七貫有竒而米麴柴水本錢與官吏食錢却計一十二萬二千三百八十二貫除本收息僅有八萬六千二百五貫是一日所得止二百五十餘貫若官賣一分稅酒二分則日稅之額不過一百六十餘貫當不難辦於是復行淳熈八年已降之㫖參用淳熈十年官私俱醖之議許城外百姓自行造酒般運入城上秤收稅每酒一斤稅錢七文不稅而入謂之私酒若城外以至禁地不可關防即分地分緊慢改為旗望户欲来者許之承撲欲退者許之自陳此外惟南北楚樓每嵗量造三分之一仍從官賣其常平等處課額亦準舊例徑於息錢内取撥分𨽻自是潭俗頗還舊觀既而安丙来自西蜀視事之初即議改𣙜且限三日打併投醪江流見者撫膺椎罌破缶在在嗟怨括馬供磨騷及編氓伐木為薪至空嶽麓而不之卹也倡優當壚嘈雜郡齋糟糠豢豕充斥後圃凡酒家一孔之利鈎抉靡遺酒貴米賤既相遼絶重法以禁亦不為止捜邏之卒旁午逵道連坐之人填溢犴圄富者至加籍没貧者令衆監償異服荷校纍纍於市中下之家閱月踰時不知酒味小有讎嫌動相誣訐人人重足屏迹糯米收糴責之州縣雖窮荒之邑艱歉之嵗坐數抛下無得免者監勒牙儈科率舟船所至騷然人不堪命其害不止一州且及一路矣後政帥臣葉時鄒應龍皆有意復舊竟以弗果然則改絃更張稍蘇民困此政㣲臣今日之責也且紹興初元至今凡九十餘載稅法中雖暫改然其行之之乆通前後七十餘年𣙜法之行或四三年或五六年即復大都不過二十餘年耳由是觀之稅之與𣙜孰便孰否其大畧可覩矣自曹彦約復行稅法衞涇繼之每嵗所入浄息率不下八萬餘貫眎昔之𣙜無大相過是不科糴不抑配不搜捕薪水之費官吏之給皆拾去其七而確然一定之息踵門自至顧何所憚而不為哉本司每嵗諸軍供給賞犒之費誠為不貲若以一嵗所入截長補短痛加莭約亦可僅自給外此而求多焉必曰不𣙜不可然盈虚相較其實無幾徒為國家斂怨一道況淳熈八年指揮初無衝改為臣子者乃輙廢格君命行其胸臆臣雖至愚竊所不忍謹已日下措置復行稅酒舊法所慮人㣲望輕不足鎮壓異議既行之後他時或有變更則為醖户者重罹蕩析之禍是臣實誤之也用敢冒昧奏聞欲望聖慈仰體孝宗皇帝嘉惠湘民之至意特降睿㫖從臣所請臣當琢石鐫刻立之通衢以為本州一定不易之制俾潭之百姓歌詠聖恩永永無極臣不勝大願貼黄臣竊見荆湖之地峒猺錯居風俗獷戾動揺則易綏輯則難乾道間因官司敷賣乳香激成郴桂之變厥監非邈人所共知本司以安撫一道為職正當禁止州縣擾民之政以銷患未形乃因𣙜酒之故嵗嵗行下科糴糯米所酬之直未必能及時價所支之錢未必盡到人户況又有追催之苦有陪備之費其為咨怨盖不待言擾民之事首自為之州縣效尤其將何責倘非亟復稅法則嵗造二十萬緡之酒用糯至多茍不科糴何所取辦萬一有姦民扇揺其間是因小利而致大患也臣日夜念此至熟是以斷然行之不疑伏乞睿照袁說友上奏曰臣聞有一事必有一弊未有事乆而無弊者而救弊之䇿要當各随其受弊所不同者叅酌衆論而力行之盖事有在此為弊而在彼亦弊者以彼此不同之弊而不叅酌衆論以為之策雖今日弊革而明日復弊矣國家頃置官㑹所以與銅錢相濟其有無而為之用也今渉三十餘年而其弊不一其最甚者官㑹日輕銅錢日少欲重官㑹而民間兊易不能及所兊之數官㑹何由而可重欲易銅錢而民間見錢收拾日難不能為稱提之用銅錢何由而可易如此者盖又十餘年朝廷患之士大夫言之而救弊之䇿亦間舉矣既降指揮官司上供民間輸納並令錢㑹中半此欲重官㑹也又降指揮民間以㑹子輸納不得勒令貼納見錢此亦重官㑹也又降指揮令户部支撥見錢下臨安府置場以實數兊便此亦重官㑹也又降指揮令封樁庫日出見錢數千緡亦下臨安府兊便又令諸州支撥見錢於本州置場兊便此亦重官㑹也是數䇿者不可謂之不能救弊矣然大抵如臣前所謂今日弊革而明日復弊每不能稱提於乆逺爾今自累月来竊聞都下官㑹又復虧折一千官㑹雖得七百二三十見錢而砂毛減輕錢一千之内率有二三十焉是實得七百以下也零㑹則折閱又甚矣然亦未至如外郡之尤弊也今近在輔郡如浙西之湖秀浙東之婺越盖兊一千而得六百七十八十矣而砂毛減輕亦在焉稍逺而衢信又逺而建劒逺而江東西則一千止得六百以下矣愈逺則愈輕愈輕則愈不用官㑹之弊至此甚矣若更不求其䇿則日輕一日私既不能行公亦不可用銅錢愈少官㑹愈壊豈不為寒心哉今若止欲以都下官㑹而為之策此固可以一說論獨以外之逺近諸郡其地既不同其說必各異此難以一槩之說救之臣故欲各随其受弊所不同者叅酌衆論而力行之正以此也臣愚欲望聖慈深以内外官㑹日輕為慮下臣此奏於江浙東西福建五路守臣候指揮到日限半月各随本州事宜詳考官㑹兊便不至虧折將来日乆不至復弊一一留意的確具申尚書省𩔖聚足日並下檢正都司同户刑部看詳諸州所申或可行於彼或彼此皆可行掇其䇿畫之最善者再行畫項具申尚書省取㫖施行庶幾叅酌衆論各随其宜或能救弊於乆逺儻官㑹日重得與銅錢相濟其有補於國計豈細事也惟陛下留神駕部員外郎李鳴復上奏曰臣至愚極陋每病世之言治者務為空談不䆒實用故首以三者之政為陛下言之然政之切於時者不止此也記曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也陛下試思今之為國其有九年之蓄乎其無九年之蓄乎今日之國計版曹實司之分版曹之責任者内則司農外則四緫領是也臣家于蜀甞䆒觀蜀之緫計矣蜀賦緫入之數以緡錢計之嵗約二千二百餘萬向也和議未絶烟塵不警尚可支吾今也邊戍倍増用度益廣每難酬應朝廷以其數之不敷也嵗降七百萬以助其費此其大畧也臣邇者負丞農扈亦甞䆒觀農寺之出納矣農寺嵗催之額米以石計凡一百三十餘萬錢以緡計凡一百六十餘萬以既入之錢糴未足之米緫約二百餘萬而後可以敷嵗支之數此亦其大畧也蜀之所産未足以供一嵗之用農寺之所催僅可以為一嵗之出求其儲積以備不時之須盖無有也𩔖而推之湖廣緫計猶是也淮東西緫計亦猶是也此所謂經費也經費之外卒有緩急取辦於朝廷之樁管耳朝廷之樁管散在他所者不得而知也其米斛之在京城者可得而言也曰兩豐儲曰中下界其倉凡四以石計之緫不過二百萬水旱之科撥嵗寒之賑濟閏月之貼降皆於焉取之此猶曰常程也最可慮者江西湖南粒米狼戾之地昔號樂土今為盜區虎豹横行鴻鴈未集賦輸不入綱運轉虧諸緫所以匱乏告甞截大農之綱以周其急矣寇賊未平漕運未至則其告匱必不能自已也農寺以貼降請甞撥樁管之數以償其虧矣截撥之令不容不行則其求償又當與之俱也移東而補西已非䇿之得已若捉衿而肘見不知計又安施識者殆澟􅏮焉可不急為之圖也哉漢至文帝可謂富庶矣有臣如賈誼猶以倉廪未實為憂觀其言曰漢之為漢幾四十年公私之積猶可哀痛即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以饋之誼之憂憂於未然者也臣之憂憂於已然者也去嵗浙右之地皆以稔告朝廷和糴視舊有加廟筭深長動中事㑹獨惜夫任是責者不務大體競為淺謀錙銖必較則負販之徒安能奔走以聽命網羅交設則藏積之家不免懐疑而待價名為和糴實𩔖科糴始欲趂時終於失時然猶幸其可以為國計之助他不足問也今日之勢迫矣所積有限而所以仰給者無窮將何以為計臣願陛下軫念事變之来急為根本之慮體堯湯先備之美意思祖宗應變之成規今年出内庫絹以助軍費未踰年出内庫錢絹以助糴軍糧又明年出内庫錢絹紬綿以助糴軍儲捐所有餘補所不足有仁宗故事在遵而行之推而廣之任之者得人則施之者有道將見國豐而裕無功不成士飽而嬉有戰則克于以寛一時可憂之勢于以隆萬世不㧞之基其於時政實非小補知成都曹彦約上奏曰臣竊謂今日財用之弊不可不深致意也問之朝廷則窘於應辦問之州縣則窘於支遣以為在緫餉歟則今日之緫餉非昔比也以為在戎司歟則今日之戎司不一律也臣始守漢陽軍當湖北最窘處適敵騎入境催科縮手猶且支遣解發不改常度竊自妄論以為財計之難理者作縣而已天下之作縣者雖易亦難天下之作郡者雖難亦易是十年以前州郡猶可為也越二年而攝事湖廣緫餉乃見其不可為矣般江州之銀劵以足襄陽運徳安之鐵鏹以實随棗移東就西截短補長支撑數月僅不廢事及正官交割後其用益窘有請于朝乆無畫降其人至投繯自殺以救得免矯制展官㑹界分二百萬乃始集事是十年以前緫餉已不可為也又二年而得守長沙亦當應辦之時朝廷之科撥未至而諸郡之綱運尚闕帥司移文本州未免那兊其間小小名色不復責償值朝廷秤提官㑹則多出庫錢以便百姓然而二年之後比交割元數猶有増羨是七年以前州郡猶可為也又二年而得節制利州兼領郡事則知利州之事已不得如長沙時矣用兵之後事力更改有節度使寄居奉祠則嵗費増數千緡矣有緫管鈐轄路分添差作闕則嵗費又増萬緡矣黽勉盡瘁僅了元額又二年而得守豫章則知豫章之事又不得如利州時矣調發既多則酒課不辦𣙜場不通則稅課漸减雖撙節用度不至虧數而其所以為經費者甚岌岌也戎司之事雖不曽親厯而利州置司所在亦或剽聞矣管軍二萬四千人而交承錢物不過二三萬緡支吾不行至有奪前政宅庫之物以為公用者被㫖廵邊廻避戍卒支犒有以葬妻為名迂行小路者是數年以来不特州郡不可支遣而為戎司者亦有窮陋至甚者矣千里承流之地日夜辦財萬竈飽師之地日夜慮財牛酒日至之地日夜乏財使士大夫旁皇愕眙以為天下事無一可為者其故何也朝廷之財臣不得而盡知但見招募軍兵修築城壘額外和糴遍滿天下是用財之處比前日為多也楮劵不足加以増印度牒不足助以告勅是生財之路比前日為廣也國用司本意所以蓄嵗幣之數耳沒入平民漸生枝葉安邊所本意所以藉權姦之産耳變及征𣙜頗動觀聽大寧監之塩利已竭而轉運司之増羨不已宕昌之馬價未償而茶馬司之獻納不廢是取財之道比前日為苛也民力極矣不可以増賦矣上下煎熬一至於此將何以救之哉故臣甞論之天下之財本足以了天下之用位置分畫要得其所截截條目不可移易成周之財以九賦斂之以九式均之自邦中以至幣餘各有常賦自祭祀以至好用皆有常式漢以吏禄公用賦於民不以封君湯沐為經費唐以世業口分授於民不以留州送使為上供古人經理天下大率如此本朝列聖立法尤更詳備臣獨怪紹興隆興之間敵人深入朝廷調發雖費若河海而州縣常賦無窘迫之態百姓安業無怨懟之患大郡交割之數有緡錢之積多至百萬者小郡見管亦有數十萬者若民間積粟之富則又徃徃稱此上户多者十萬斛中産亦數千斛上恬下熈相安於無事當淳熈紹熈時其俗未改近者公私之計窮陋萬狀官吏搏手不可一朝居百姓怨苦皆無一飽望窮愁如此恐不足以當變故也一旦敵騎侵陵盜賊竊發上下相視茫然無䇿時事至此不可以為休證皆云開禧以来兵議纔起取常平義倉以供綱運則救荒無先備撥官告度牒茶塩引為糴本則交易無見價軍器之有製造弓兵之有調發樁積之有水脚招軍之有賞犒非時泛用一切取辦荷朝廷出豁雖許於交承錢内支破而州郡積漸至無遺蓄矣調發有劈劵則月粮有倍費功賞有轉資則食錢有添請拆洗有徃来之費暴露有特喝之賞便宜從事一切取辦若朝廷應副稍不如期而轉餉移兊始虧舊額矣戎司之事雖不欲窮問本末然而窘於開禧之後而不窘於開禧之前亦必有以致此也望陛下與大臣議之立為定制以官兵之常數責州郡而不責以非時之須以嵗時之常用責諸司而不責以不測之費緫所之有應兊者悉與抛降使之任乏興之罪課利之有増羨者不許申奏使之備循環之費其有一切調發之用則朝廷自任其責當科降者即與科降不必徒為勘當當支撥者速與支撥不使無故滯留如八月當和糴則七月先科降十月當調發則九月先支撥乆監司郡守之任以寛其迎送嚴刻剥羨餘之禁以沮其觀望使有志者可以募士可以養兵謹重者可以備水旱可以修城郭設有緩急亦得以仰成而取辦至於戎司之事尤當知其事力寛其利源上可以慰其心下可以饗其士伸縮自如可以展布其為氣象有太平盛觀矣若夫大農之不繼則在陛下有以圖回而斡旋之耳側聞紹興和議則以内帑了嵗幣中間用兵則以内帑激將佐聞髙宗聖訓以為内帑所有専以用兵宫中則未甞妄費也烈祖中興之法昭若日星可不舉而行之乎雖然又有一說焉軍政在戎帥則緫領之奉使者為急務軍政在宣制則緫領之奉使者為贅員不可不察也盖軍政在戎帥則民事不得而與知命王人以緫領其事無可疑者軍政在宣制則財賦之輕重當出其手緫領之職特一子司耳今欲招一軍而聽命於朝論移一屯而分劵於緫所使朝論疲於應酬視為常事緫所耻於督辦逓相萋斐宣制之事臣以為不可為也誠能使四緫所之財聽命於宣制如張浚之用趙開就糧摺運惟意所欲如胡世將之處呉玠不膠柱調瑟不鑿空取辦或欲減一軍以寛用度或欲増一軍以臨邊塞効用之有竒傑者可陞為背嵬民兵之有精悍者可選為効用審緩急之宜量出入之數使為宣制者得以專之而他司不得以撓之非有大變革不必俟命而後行非有大調發不得乞錢而後舉則州縣制緫皆得以自用其財而大農之財亦可得而稽考矣其或食閫外之禄不肯專閫外之政有功則歸利於已有誤則歸過於朝㣲有措畫則乞錢以示重費稍有寛餘則回納以示㢘儉今世之人皆以為善處已矣以臣愚觀之直謂之不任事可也臣既有㣲見不敢有隠於陛下惟陛下赦其僣厯代名臣奏議卷二百七十二
