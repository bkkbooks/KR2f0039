body:
  text: 歷代名臣奏議卷一百十九明楊士竒等撰禮樂統言禮隋文帝初即位將改周制乃下詔曰宣尼制法云行夏之時乘殷之輅奕葉共遵理無可革然三代所尚衆論多端或以為所建之時或以為所感之瑞或當其行色因以從之今雖夏數得天歷代通用漢尚於赤魏尚於黃驪馬玄牲已弗相踵明不可改建寅歲首常服於黑朕初受天命赤雀來儀兼姬周已還於兹六代三正迥回復五德相生總以言之並宜火色垂衣已降損益可知尚色雖殊常兼前代其郊丘廟社可依衮冕之儀朝會衣裳宜盡用赤昔丹烏木運姬有大白之旗黃星土德曹乘黑目之馬在祀與戎其尚恆異今之戎服皆可尚黃在外常所著者通用雜色祭祀之服須合禮經宜集通儒更可詳議太子庶子攝太常少卿裴正奏曰竊見後周制冕加為十二既與前禮數乃不同而色應五行又非典故謹按三代之冠其名各别六等之冕承用區分璪玉五采隨班異飾都無迎氣變色之文惟月令者起於秦代乃有青旗赤玉白駱黑衣與四時而色變全不言於辨冕五時冕色禮既無文稽於正典難以經證且後魏已來制度咸闕天興之歲草創繕修所造車服多參胡制故魏收論之稱為違古是也周氏因襲將為故事大象承統咸取用之輿輦衣冠甚多迂怪今皇隋革命憲章前代其魏周輦輅不合制者已敕有司盡令除廢然衣冠禮器尚且兼行乃有立夏衮衣以赤為質迎秋平冕用白成形既越典章須革其謬謹按續漢書禮儀志云立春之日京都皆著青衣秋夏悉如其色逮於魏晉迎氣五郊行禮之人皆同此制考尋故事惟幘從衣色今請冠及冕並用玄惟應著幘者任依漢晉制曰可開皇初思定典禮太常卿牛𢎞奏曰聖教陵替國章殘闕漢晉為法隨俗因時未足經國庇人𢎞風施化且制禮作樂事歸元首江南王儉偏陋一臣私撰儀注多違古法就廬非東階之位凶門豈設重之禮兩蕭纍代舉國遵行後魏及齊風牛本陋殊不尋究遙相師祖故山東之人浸以成俗西魏以降師旅弗遑賓興之禮盡未詳定今休明啓運憲章伊始請據前經革茲敝俗詔曰可虞世基奏曰後周故事升日月於旌旗乃闕三辰而章無十二但有山龍華蟲作繪宗彛藻火粉米黼黻乃與三公不異開皇中就裏欲生分别故衣重宗彛裳重黼黻合重二物以就九章為十二等但每一物上下重行衮服用九鷩服用七今重此三物乃非典故且周氏執謙不敢負於日月所以綴此三象唯施太常天王衮衣章乃從九但天子譬日德在照臨辰為帝位月主正后負此三物合德齊明自古有之理應無惑周執謙道殊未可依重用宗彛又乖法服今準尚書豫欲觀古人之服日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡具依此於左右髆上為日月各一當後領下而為星辰又山龍九物各重行十二又近代故實依尚書大傳山龍純青華蟲純黃作會宗彛純黑藻純白火純赤以此相間而為五采鄭玄議己自非之云五綵相錯非一色也今並用織成於繡五色錯文準孔安國衣質以玄加山龍華蟲火宗彛等並織成為五物裳質以纁加藻粉米黼黻之四衣裳通數此為九章兼上三辰而備十二也衣褾領上各帖升龍漢晉以來率皆如此既是先王法服不可乖於夏制徴而用之理將為允墨勑曰可承以單衣煬帝嘗大備法駕嫌屬車太多顧謂部郎閻毗曰開皇之日屬車十有二乘於事亦得今八十一乘以牛駕車不足以益文物朕欲減之從何為可毗對曰臣初定數共宇文愷參詳故實據漢胡伯始蔡雍等議屬車八十一乘此起於秦遂為後式故張衡賦云屬車九九是也次及法駕三分減一為三十六乘此漢制也又據宋孝建時有司奏議晉遷江左惟設五乘尚書令建平王宏曰八十一乘議兼九國三十六乘無所準憑江左五乘儉不中禮但帝王文物旗旒之數爰及冕玉皆同十二今宜準此設十二乘開皇平陳因以為法令憲章往古大駕依秦法駕依漢小駕依宋以為差等帝曰何用秦法乎大駕宜三十六法駕宜用十二小駕除之毗研精故事皆此類也唐太宗貞觀二年中書舍人髙季輔上疏曰竊見密王元曉等俱是懿親陛下友愛之懷義髙古昔分以車服委以藩維須依禮儀以副瞻望比見帝子拜諸叔諸叔即亦答拜王爵既同家人有禮豈合如此顛倒昭穆伏願一垂訓誡永修彛則太宗乃詔元曉等不得答吳王恪魏王泰兄弟拜十三年禮部尚書王圭奏言準令三品以上遇親王於路不合下馬今皆違法申敬有乖朝典太宗曰卿輩欲自崇貴卑我兒子耶魏徴對曰漢魏以來親王班皆次三公以下今三品並天子六尚書九卿為諸王下馬王所不宜當也求諸故事則無可憑行之於今又乖國憲理誠不可帝曰國家立太子者擬以為君人之修短不在老幼設無太子則母弟次立以此而言安得輕我子耶徴又曰殷人尚質有兄終弟及之義自周以降立嫡必長所以絶庶孽之窺覦塞祻亂之源本為國家者所深慎之太宗遂可王圭之奏髙宗時楊炯上公卿已下冕服議曰古者太昊庖犧氏仰以觀象俯以察法造書契而文籍生次有黃帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至于以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黑殷人尚白周人尚赤至于山龍華蟲宗彛藻火粉米黼黻此又百代可知之道謹按虞書曰豫欲觀古人之象日月星辰山龍華蟲作繪宗彛藻火粉米黼黻絺繡由此言之則其所從來有尚矣夫日月星辰光明照下土也山者布散雲物象聖王澤霈下人也龍者變化無方象聖王應時而教也華蟲者雉也雉身被五彩象聖王體兼文明也宗彛者虎也雖以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹飪象聖王至德日新也粉米者人恃以生象聖王為物之賴也黼能斷割象聖王臨事能決也黻者兩已相背象君臣可否相濟也逮周氏乃以日月星辰為旌旗之飾又登龍於山登火于宗彛於是乎制衮冕以祀先王九章者法陽數也以龍為首章衮者卷也龍德神思應變潛見表聖王深識逺知卷舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公有賢才能守耿介之節也又制毳冕以祭四望也四望者嶽瀆之神也虎雖山林所生明其象也制絺冕以祭社稷之神也粉米由之成象其功也又制玄冕以祭羣小祀也百神異形難可遍擬但取黻之相背異名也夫以周公之多才也故治定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃自此之出矣天下之服能事又於是乎異矣表狀請制大明冕十二章乘輿服之者謹按日月星辰者已施於旌旗矣龍山火米者又不踰于古矣而云麟鳳有四靈之名玄龜有負圖之應雲有紀官之號水有盛德之祥此蓋别表休徴終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黃玉紫盡南宫之粉壁不足寫其形狀罄東觀之鉛黃無以紀其名實固不可畢陳於法服也雲者從龍之氣也茄者藻之自生也又不假别為章目此盡不經之甚也又鸞冕八章三公服之者也鸞者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨刑曹之職也熊羆者猛獸也適可以旌武臣之力也又稱藻為水草而無法象引張衡賦云帶倒茄于藻井披紅葩之狎獵請為蓮花取其文彩者夫茄者蓮也若以蓮代藻變古從今既不知草木之名亦未達文章之意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈惟顛倒衣裳抑亦自相矛楯此又不經之甚也又黼冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也若夫禮惟從俗則命為制令為詔乃秦皇之故事猶可以適于今矣若夫義取隨時則出稱警入稱蹕乃漢國之舊儀獨可以行於代矣亦何取於變周公之軌物改宣尼之法者哉武后垂拱初詔問羣臣調元氣當以何道麟臺正字陳子昂因是勸后興明堂即上言臣聞之于師曰元氣天地之始萬物之祖王政之大端也天地莫大於隂陽萬物莫靈于人主政莫先於安人故人安則隂陽和隂陽和則天地平天地平則元氣正先王以人之通於天也於是養成羣生順天德使人樂其業甘其食美其服然後天瑞降地符升風雨時草木茂遂故顓頊唐虞不敢荒寧其書曰百姓昭明協和萬邦黎民於變時雍乃命羲和欽若昊天厯象日月星辰敬授人時和之得也夏商之衰桀紂昏暴隂陽乖行天地震怒山川鬼神發妖見災疾疫大興終以滅亡和之失也逮周文武創業誠信忠厚加於百姓故成康刑措四十餘年天人方和而幽厲亂常苛慝暴虐詬黷天地川冢沸崩人用愁怨其詩曰昊天不惠降此大戾不先不後為虐為瘵顧不哀哉近隋煬帝恃四海之富鑿渠決河自伊洛屬之揚州疲生人之力泄天地之藏中國之難起故身死人手宗廟為墟逆元氣之理也臣觀祻亂之動天人之際先師之説昭然著明不可欺也陛下含天地之德日月之明眇然逺思欲求太和此伏羲氏所以為三皇首也昔者天皇大帝攬元符東封太山然未建明堂享上帝使萬世鴻業闕而不昭殆留此盛德以發揮陛下哉臣謂和元氣睦人倫捨此則無以為也昔黃帝合宫有虞總期堯衢室夏世室皆所以調元氣治隂陽也臣聞明堂有天地之制隂陽之統二十四氣八風十二月四時五行二十八宿莫不率備王者政失則災政順則祥臣願陛下為唐恢萬世之業相國南郊建明堂與天下更始按周禮月令而成之乃月孟春乘鸞輅駕蒼龍朝三公九卿大夫于青陽左個負斧扆馮玉几聽天下之政躬籍田親蠶以勸農桑養三老五更以教孝悌明訟恤獄以息淫刑修文德以止干戈察孝廉以除貪吏後宫非妃嬪御女者出之珠玉錦繡雕琢伎巧無益者棄之巫鬼淫祀熒惑於人者禁之臣謂不數期且見太平云中宗時左庶子劉子玄上朝服乘車議曰伏以古者爰自大夫已下皆乘車而以馬為騑服魏已降迄乎隋代朝士又駕牛車歷代經史具有其事不可二而言也至如李廣北征解鞍憩息馬援南伐據鞍顧盼斯鞍馬之設行於軍旅戎服所乘貴于便習者也按江左官至尚書郎而輒輕乘馬則為御史所彈又顔延之罷官後好騎馬出入閭里當代稱其放誕此則専車憑軾可服朝衣單馬御鞍宜從褻服求之近古灼然之明驗也自皇家撫運沿革隨時至如陵廟巡謁王公册命則盛服冠履乘彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乘車貴賤所行通用鞍馬而已臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乘馬夫冠履而出只可配車而行今乘車既停而冠履不易可謂惟知其一而未知其二也何者褒衣博帶革履髙冠本非馬上所施自是車中之服必也襪而升鐙跣以乘鞍非惟不師古道亦自取驚今俗求諸折中進退無準且長𥚑廣袖襜如翼如鳴珮紆組鏘鏘奕奕馳驟於風塵之內出入於旌棨之間儻馬有驚逸人從顛墜遂使屬車之右遺履不收清道之傍絓驂相續固以受嗤行路有損威儀今議者皆以祕閣有梁武帝南郊圖多有衣冠乘馬者此則近代故事不得謂無其文臣按此圖是後人所為非當時所撰且觀代間有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫昭君入胸奴而婦人有著帷帽者夫芒屩出于水鄉非京華所有帷帽創于隋代非漢宫所作議者豈可徵此二畫以為故實者乎由斯而言則梁氏南郊之圖義同於此又傳稱因俗禮貴緣情殷輅周冕規模不一秦冠漢珮用捨無恆况我國家道軼百王功髙萬古事有不便理資變通其乘馬衣冠竊謂宜從省廢臣懷此異義其來自久日不暇給未及榷揚今屬殿下親從齒胄將臨國學凡有衣冠乘馬皆憚此行所以輒進狂言用申鄙見睿宗景雲中諫議大夫源乾曜上奏曰聖王教天下必制禮以正人情君子三年不為禮禮必壞三年不為樂樂必崩古之擇士先觀射禮非取一時樂也夫射者别邪正觀德行中祭祀辟冦戎古先哲王莫不遞襲比年以來射禮不講所司吝費而舊典為虧臣愚謂所計者財所虧者禮故孔子不愛羊而存禮也大射謂春秋不可廢德宗貞元十三年栁冕兼御史中丞福建觀察使自以久疏斥又性躁狷不能無恨乃上表乞代且推明朝覲之意曰臣竊感江漢朝宗之議鹿鳴君臣之宴頌聲之作王道本始國家自兵興不遑議禮方牧未朝宴樂久缺臣限一切之制例無朝集目不覩朝廷之禮耳不聞宗廟之樂足不踐軒墀之地十有二年於茲矣夫朝會禮之本也唐虞之制羣后四朝以明黜陟商周之盛五歲一見以考制度漢法三載上計以會課最聖唐稽古天下朝集三考一見皆以十月上計京師十一月禮見會尚書省應考績事元日陳貢棐集於考堂唱其考第進賢以興善簡不肖以黜惡自安史亂常始有専地四方多故始有不朝戎臣恃險或不悔過臣忝牧圉之寄憤不朝之臣思一入覲率先天下使君臣之義親而不疏朝覲之禮廢而復舉誠恐負薪溘先朝露覲禮不展臣之憂也比聞諸將帥亡殁者衆臣自憚何德以堪久長鄉國人情之不忘也闕庭臣子所戀也朝覲國家大禮也三者臣之大願表纍上其辭哀切德宗許還武宗會昌中李德裕上言曰伏見禮記云君子將營宫室宗廟為先廄庫為次宫室為後又韋彤五禮精義對曰古之制廟必中門之外吉凶大事皆告而行所以親而尊之不自専也今令城外置廟稍異禮文書於史䇿必虧聖政伏以朱雀門至明德門凡有九坊其長興坊是皇城南第三坊便有朝官私廟實則逼近宫闈自威逺軍向南三坊俗稱闈外地至間僻人鮮經過於此置廟無所妨礙臣等商量今日以後皇城南六坊內不得置私廟其朱雀街緣是南郊御路至明德門夾街兩面坊及曲江側近亦不得置餘圍外深僻坊並無所禁所貴不違禮意感恱人心臣等頻奉聖旨有事許再三論奏輒罄所見庶禆聰明宋太宗淳化二年諫議大夫張洎上奏曰臣準中書劄子奉聖旨入閣圖宜令史館修撰楊徽之等四人將舊圖比對錯誤文字改正修畢却送閣門者臣伏以朝廷典憲簡册具存近代因循多違舊式今陛下以入閣圖慮文字錯誤再令比對即知聖念于臨朝儀注謹重至矣臣幸因詔旨敢貢管窺沿襲之宜惟明主裁酌竊以今之乾元殿即唐之含元殿也在周為外朝在唐為大朝冬至元日立全仗朝萬國在此殿也今之文德殿即唐之宣政殿也在周為中朝在漢為前殿在唐為正衙凡朔望起居及册拜妃后皇子王公大臣對四夷君長試制䇿科舉人在此殿也今之崇德殿即唐之紫宸殿也在周為內朝在漢為宣室在唐為上閣隻日常朝之殿也昔東晉太極殿有東西閣唐置紫宸上閣法此制也且人君恭己南面向明而理紫宸黃屋至尊至重故巡幸則有大駕法從之盛御殿則有鈎陳羽衛之嚴故雖隻日常朝亦猶立仗前代謂之入閣儀者蓋隻日御紫宸上閣之時先於宣政殿前立黃麾金吾仗俟契勘畢喚仗即自東西閣門入故謂之入閣今朝廷且以文德正衙權宜為上閣甚非憲度况國家丕承正統宇內治平凡百憲章悉從損益惟視朝之禮尚屬因循竊見長春殿正與文德殿南北相對殿前地位連橫街亦甚廣博伏請改創此殿以為上閣作雙日立仗視朝之所其崇德殿即唐之延英殿是也為雙日常時聽斷之所庶乎臨御之式允叶前經今輿論乃以入閣儀注為朝廷非常之禮甚無謂也臣竊按舊史中書門下御史臺謂之三司為侍從供奉之官今常朝之日侍從官先入殿廷東西立定俟正班入一時起居其侍從官則東西對拜甚失北面朝謁之禮今請準舊儀侍從官先次入起居畢在左右分行侍立於丹墀之下故謂之蛾眉班然後宰臣率正班入起居庶免侍從官有東西對拜之失得遵正禮臣又聞古之王者躬勤庶務其臨朝之疏數視正事之繁簡唐始受命五日一朝景雲初年復修貞觀故事自天寶兵興之後四方多故由肅宗而下咸隻日臨朝雙日不坐其隻日或遇大寒盛暑隂霪泥濘亦放百官起居其雙日宰臣以下奏覆公事即時特開延英召對或蠻夷入貢勳臣歸朝亦特開紫宸引見陛下自臨大寶十有五年未嘗一日不雞鳴而起聽天下之政雖剛健不息固天德之常然而遊焉息焉亦聖人之謨訓儻君父焦勞于上臣子緘默于下或不能隕身碎首引大體以爭則忠亮之心有所不至矣臣欲望陛下依前代舊規隻日視朝雙日不坐其隻日遇大寒盛暑隂霪泥濘亦放百官起居其雙日大官進食之後於崇德崇政兩殿召對宰臣常參官以下及非時蠻夷入貢勳臣歸朝亦特開上閣引見並請準前代故事處分臣聞易曰聖人久於其道而天下化成茍動靜有常恬和相養憂勤宵旰則當躬政於冕旒端拱穆清則可怡神於元默夫如是聖君嚮明御極之治勞逸相均髙明配天博厚配地悠久而無疆矣臣向承朝命叨居館職邦國儀注合預參詳當文思有截之時獻虛薄無庸之説儻禆萬一雖死猶生四年正月以南郊禮成大宴含光殿直史館陳靖上言古之饗宴者所以省祻福而觀威儀也故宴以禮成賓以賢序風雅之作茲為盛焉伏見近年內殿錫宴羣臣當坐於朵殿兩廊者拜舞方畢趨馳就席品列之序紏紛無别及至尊舉爵羣臣起立先後不整俯仰失節欲望自今令有司預依品位告諭其有踰越班次拜起失節喧譁過甚者並令紏舉又惟飫賜之典以寵武夫大烹之餘故為盛饌計一飯所費可數人之屬厭而將校輩或至終宴之時尚有欲炙之色蓋執事者失於察視不及潔豐而使然也伏望並申嚴制至道元年三月御史中丞李昌齡亦言廣宴之設以均飫賜得齒髙會宜乎盡禮而有位之士鮮克致恭當紏其不恪又供事禁庭當定員數籍姓名以謹其出入酒殽之司或虧精潔望分命中使巡察並從之仁宗天聖七年章獻太后將以冬至受朝天子率百官上夀祕閣校理范仲淹極言之且曰奉親于內自有家人禮顧與百官同列南面而朝之不可為後世法翰林學士宋祁上奏曰臣伏見宣德門前御道南至天漢橋久來設梐枑禁止行人須立條制許近上臣僚于道上行馬近覩御史臺禮院重更定奪應出節者為近上臣僚竊謂宣德門比周之外朝朱雀門是唐之皇城中有御路號天子馳道凡在臣庶不合得行漢制皇太子尚不敢擅絶馳道蓋尊君卑臣上下有體故也今朝廷制度簡于唐漢京都御路止此一處臣欲望自宣德門至朱雀門外朝之地皇城之內表其中街以為馳道應臣庶車馬並禁往來惟隨從乘輿不在禁限議者或謂契丹人使已曾許馳道行馬難于改作臣謂天子制度臣子共當崇戴彼之使臣亦陛下之臣也設令彼有疑問則令主客者具以實對質之事體無所妨礙乞再下有司詳定參知政事宋庠論入閣儀奏曰臣近因與宰臣進呈吳育文字伏奉德音詢及入閣故事臣雖與諸臣等略陳梗槩然理有未詳退而講求敢此條悉夫入閣者是唐家隻日於紫宸殿受常朝之儀也謹按唐有大內有大明宫宫在大內之東北世謂之東內謂大內為西內自髙宗以後天子多在大明宫此宫制度尤為華備宫之正南門曰丹鳳門門內第一殿曰含元至大朝會則御之對北第二殿曰宣政謂之正衙朔望大册拜則御之又對北第三殿曰紫宸謂之上閣亦曰內衙隻日常朝則御之據唐制凡天子坐朝必須立仗于正衙殿或乘輿止御紫宸即喚正衙仗自宣政殿兩門入是謂東西閣門也若以國朝之制相為比况則今之宣德門唐丹鳳門也大慶殿唐含元殿也文德殿唐宣政殿也紫宸殿唐紫宸殿也今或欲求入閣本意施于儀典即須先立仗于文德之庭如天子止御紫宸即喚仗自東西閣門入如此則差與舊儀相合但今之諸殿比于唐制南北不相對值以此為殊耳故後來論議因有未明又按唐自中葉以還雙日及非時大臣奏事别開延英殿賜對若今假日御崇政延和是也乃知唐家每遇坐朝之日即為入閣而叔世離亂五朝草創大昕之制更從易簡正衙立仗因而遂廢其後或有行者常人之所罕見乃復謂之盛禮甚不然也今之相傳入閣圖者是官司記常朝之制如閣門有儀制敕合班雜坐圖之類何足為希闊之事哉况唐開元舊禮本無此制至開寶中諸儒增附新禮始載月朔入閣之儀又以文德殿為上閣差舛尤甚蓋當時編撰之士討求未至太宗朝儒臣張洎亦有論奏頗為精洽臣伏恐朝廷他日修復正衙立仗欲乞送付兩制使預加商榷改正舊儀雖非要務亦所以刋誤文備成式也庠又乞御前殿朔日立仗羣臣朝服奏曰臣聞告朔之義周家尤重在昔宣聖愛羊存禮漢沿周制合朔朝會故雖優借大臣許朝朔望唐制立仗羣臣背闕傘入會藝祖受命論次開寶通禮亦著月朔入閣之儀則朔日者為政之端辰講禮之盛節國家因五代之亂承千年之統始勝殘去殺務從簡易雖制度既定而謙讓未遑五日一參靡分朔望禁衛單少威儀粗率禮典弗振則朝廷不尊國容寖廢則臣下不肅臣愚以為羽衛之設非矜華侈所以重主威也朝會之作非専拜揖所以飾治體也臣願陛下上考成周仲尼之法下稽炎漢李唐之盛近守太祖開寶之禮明詔執事祗案成規每遇朔日坐前殿朝羣臣旗斿細仗以次陳設公卿朝服如儀而罷如此則臣道肅而主道尊于以示四夷風萬國警民耳目不可闕也夫禮有以素為貴謂其誠慤有以文為貴謂其采章伏望陛下露臣此言使博士禮官得確論可否講求故實如曰便禮即奉而行之使重熙顯猷執競丕業由陛下之馴致也庠又論車駕儀衛奏曰臣竊見車駕每有行幸自非郊廟大禮具陳鹵簿外其常日導從唯前有駕頭後擁扇繖而已殊無典禮所載公卿奉引之盛其侍從百司官下至厮役皆雜行道中步輦之後但以親事官百許人執檛以殿謂之禁衛諸班徑騎頗與乘輿相逺而士庶觀者率隨扈從之人夾道馳走喧呼不禁所過有旗亭市樓皆垂簾外蔽士民憑髙下瞰了無忌憚邏司街使亦不呵止威令弛闕習以為常非所謂旄頭先驅清道後行之慎且自黃帝以神功盛德猶假師兵為營衛則防微禦變古今一體按漢魏以降有大駕法駕小駕之儀至唐又分殿中諸衛黃麾等仗名數次序各有施設國朝承五姓荒殘之弊事從簡略每鳴鑾遊豫盡去戈戟旌旗之制儀衛寡薄頗同藩鎮此皆制度放失憚于改作之咎欲望聖慈専委一二博學近臣檢討前代儀注及鹵簿今來乘輿常時出入體式於三駕諸仗內斟酌儀物增嚴條禁上以示尊極次以防未然革去因循宜在兹日至和元年直集賢院劉敞論溫成皇后立忌奏曰臣伏聞敕旨為溫成皇后立忌禮官請對不許臣竊惑之凡朝廷常務百司小事猶當上稽舊典下探衆論何况宗廟大禮至尊至重豈可以一時之寵獨決聖心義有僭失貽笑萬世虧損盛明悔不可追今議者乃云有邪臣密啓眩惑聖聰導陛下以非禮勸陛下以拒諫若此無實尚非美事設有其實罪亦大矣當伏兩觀之誅以謝天下且自太祖以來后廟四室皆陛下之妣也猶不立忌奈何以溫成私昵之愛變古越禮則是貴妾于妣尊嬖于嫡上無以事宗廟下無以教後嗣恐祖宗神靈不樂于此非陛下奉先思孝之意也昔成湯改過不吝故稱聖王格于皇天願陛下母篤於嬖近之寵母安於邪佞之説母變先帝之舊典母枉宗廟之正禮回易意慮割情去私詢于司存追寢過命使萬萬億年無復譏議天下幸甚臣以無能忝備儒館禮樂之失臣得預焉御史中丞孫抃等上奏曰臣等昨聞朝廷欲為后廟四室并章惠皇后各立小忌已具劄子論奏至今尚未降出臣等伏覩太祖太宗真宗三朝故事皇后不祔太室者皆不立忌此國家大典禮大制度陛下不可不遵守且孝惠孝章淑德章懷章惠是陛下三世尊屬别廟崇奉多歷年所即未嘗有此擬議今因循之間遽爾更改中外聞聽咸謂陛下因溫成而遂追及先朝諸后布之詔命則取四方之譏書之史䇿則貽萬世之誚陛下臨御天下踰三十載聖功神德卓若堯舜今忽録此一事遂成非錯俾盛美光大有愧于疇昔陛下安忍如是欲望特降聖旨集百官議定然後行下制敕所貴禮典詳協以順天人之心嘉祐四年同知太常禮院韓維上奏曰臣所領職以同知禮院為名禮有不正知而不言則負朝廷所以命臣之意而失臣所以事上之禮也故敢不避誅殛而言臣誠見溫成皇后廟樂牲器僭比祖宗稽之禮經則先聖之所不道質于故事則本朝之所無有臣竊聞其時臣下有以唐武惠妃事上惑聖明者惠妃之殁雖常立廟然至乾元之後祀享即絶自當時已知其非禮豈足為聖明法哉臣近奏疏願因親祫宗廟特詔有司裁損其制以全陛下廣孝愛禮之美封章奏御纍日寢而不下臣竊惑之陛下無謂數楹之屋兩簋之器施之未損于治蓋聖人所以異等威明風教以觀示天下者禮存之於此也如不以臣言為信則并臣前章付中書門下使大臣參議事有可采乞早賜施行仁宗時張方平上論曰臣聞昔在帝舜命伯夷秩宗以典三禮命夔典樂以教胄子爰及夏商制作損益不相沿襲周監二代文物全備事為之制曲為之防數度紀律具於六典於是教化浹洽訟獄衰息後之孱王其所守者惟祭與號而天下尚知宗周以其典禮攸出根本所繫雖齊桓晉文立威定霸必挾王命以令四方猶賜胙而下拜請隧而不許降及末世韓魏之分晉田氏之得齊咸因諸侯請命于周有封籍于文武之廟而後敢正名稱爵通於天下則知疆域之大士民之衆甲兵之強威勢之盛不可以犯典禮之重也不然者以齊晉之視安烈匹夫擒之爾後至戰國兵拏祻大九法盡斁三綱咸解諸侯先焚削舊禮之篇籍而遂僭用王章焉然其維持邦國八百餘年雖危不亡將絶復續非禮何以存之漢初承秦滅學蕩無條貫叔孫通採拾遺散草蕝儀法而後君臣之位正郊祀之禮修宗廟以尊朝廷以嚴理道克興暴亂不作至於設官分職綱紀天下本末條理教民成俗使諸侯軌道咸歸于極則未暇也孝文接統治致太平賈誼勸上宜定制度興禮樂而當時將相大臣皆介胄武人不知治體沮寢其議漢氏當文景之世可謂盛矣百姓樂業家給人足五都之貨殖七遷之豪舉驅扇浮靡汰蕩亡度閭閻之僭乃過徹侯夫以文帝之恭儉務德具王道而微者所不至於王一息爾其失由乎富庶而不能教也逮乎武帝招延材雋其文章儀物信美哉而制度典禮終不克建于後兵刑齊用財貨益急嚮非叔孫之法維持之殆矣由是言之叔孫氏之功垂于漢不在蕭曺之下也中興之後稍復增緝立明堂靈臺辟雍小學行宗祀養老之禮和安之世漸以陵遲桓靈不君王制大壞厥後吳魏異政南北殊俗世用多故文獻不足唐平隋亂太宗因開皇五禮修正頒行顯慶之初異同遽起開元之末討論甫定竊詳周官凡制度施設悉係之羣職人存則法舉上修則下存事為典常者則謂之禮不恭其事者輒董以刑表裏相成本末為用經國治民同條共貫漢唐作者有異於是徒能類其篇目而不屬諸典司止具乎朝廷之儀不該乎天下之務吏民約束乃别著乎刑書子曰道之以政齊之以刑民免而無恥夫訓民正俗不在乎禮典而在乎刑書此乃備其末而廢其本縱其初而要其失故後王之道所以異乎三代者也我國家接衰唐之絶緒承五季之紕政德厚流光海宇大定為承平者逾六十年宜乎必世後仁可以勝殘去殺然風俗猶未歸厚刑罰尚頗繁密故由禮樂未明數制未立王道有所壅而不備者也考定鍾律序正雅頌布明詔于天下誡庶民之僭忒此固朝廷深維治世之本欲清教化之原思納人於軌物者也臣聞之書曰伯夷降典折民惟刑言先以典禮教民而不専用乎法也是故禁於未發之謂禮救於已失之謂刑禁之于未發者謂大為之防使無越者救於己失者謂養成其俗而後革之子曰道之以禮樂而民和睦是故設法而革于既失不若立禮以防於未然也今小大之吏凡理民之術莫不以簿書督責為急務文巧苛深為善職聚斂侵漁集以為功剝刻貧民竭其膏血錐刀毫忽人盡爭之此乃驅之使相吞食逼之使為盜亂又何暇孝友禮義之勸廉恥遜讓之貴乎故夫知理化之大體稍能使民回心而鄉道類非俗吏所能知者今凡羣臣之上計議條令之下四方非刑名之科即財利之事民不聞乎德教而惟利與刑之聞故法出而姦生令下而詐起茍取一切無憂深思逺之慮由乎所以漸引其心術者末也方今聖主勵精於上賢輔講道于下兆民安業四夷來庭是可以闢九筵而布政立圜水而宣德益廣天下之庠序俾習射之禮隆雅頌之聲分命大臣集諸儒碩生因前聖之遺制考舊禮之沿革定慤當之一説以折衷於諸家芟其繁重以便遵用自國家損益之法至吏民等級之度成皇家之大典立百世之宏規且王者受命必有制作是故質文互變忠恭殊尚改正朔易徽號别服色異器械所以新天下之耳目振舊物之頽廢又况禮樂之大固無沿襲之理矣今天下學士所習者前代之餘制廷列羣臣所引者往朝之故事我大宋繼天而王久曠大儀小臣鄙愚竊懷憤悵蓋太平之期難值英哲之主間出臣不勝踴躍於下以至斐然不量僭陳大議蓋為明時重惜也謹採末論稍近乎政教之本者存數條焉謹論方平又上車服論曰臣聞為國以禮莫大乎制度制度成立則上下之分定尊卑之序别爭奪之患塞僭亂之害除夫如是其理天下猶示諸掌乎傳曰夫名以出禮禮以體政政以正民是以政成而民聽易則生亂在易節卦象曰節以制數度議德行若夫以德詔爵以才居位是為議德行名位不同禮亦異數是為制數度故虞書曰車服以庸又曰五服五章哉周官則有五儀九命以正諸侯之位以等諸臣之爵自國家封方之度宫室門庭之式宗廟祭祀之法賓客交接之道鍾石羽籥之列几筵爼豆之數冕服圭籍珮組之飾車乘旗斿纓旄之制牢積饗食之品祼酢問勞之節惟事事乃其有制而後邦國有倫也是故觀其采章則人望而畏辨其文紀而衆不敢黷有德者一物可以旌賞有功者一辭可以寵榮王者南面而治惟名與器而已漢世車服頗存周舊自士已上帶裳冠寫而皆乘車以馬為騑服異其輪輻衡軛轓幰帷裳以彰等級之度自江左至隋儀物未替而中原永嘉之後五胡雜處先王典禮褻亂無遺元魏髙齊增為竒詭輿裳制度于古無説隋氏一統稍復舊儀車服等衰差為四品有常服公服朝服祭服其三公朝服進賢三梁冠絳紗單衣白紗中單皂領褾白練裙襦絳蔽膝革帶金飾鈎䚢方心曲領紳帶玉鏢劍山蒼玉佩綬烏皮舄笏用象牙乘車油幰朱網是時內外百官文物有序貴賤士庶較然殊别至煬帝數事巡幸屢興師役百官行從皆服袴褶始詔隨車駕涉逺者皆戎衣以五色表貴賤焉唐侍臣服令雖略比隋制蓋陪祭朝享元會大事乃具服其宴見進對折上巾紫襴袍環帶鞶囊佩烏皮靴而已始有乘馬之服蓋車不復御矣相承至今焉臣聞古先聖人制禮之意為冠冕以莊其首為履舄以重其趨行步則有衝牙之聲登車則有和鸞之節是故斯須而必在禮矣夫貂而騎趙武靈所為胡服也靴胡履也合袴胡袴也傳曰棄衮冕而南冠以出不亦簡彛乎尊卑無章民何效焉茍曰便而已矣天下庸得不馳騁而狂亂者歟今郊祀大禮天子駕玉輅而王公百辟皆法服騎從此禮之尤失者也臣觀漢儀雖守令之卑皆有從車唐景龍中皇子將行釋奠於太學有司草儀注從臣皆衣冠乘馬時議者以為馬本用於軍旅戎服而乘貴于便習長裙廣袖紆組鳴玉非馬上所宜其儀遂寖况國之盛禮天下所觀是宜示之以尊卑顯之以秩序而以輔相之重雜于騶騎之羣豈所以彰朝廷之尊嚴者哉又巾履靴笏自公卿大臣以為朝服而卒校胥史為制一等其羅縠綺紈織文絺繡自人君至於庶人同施均用其居室器玩之汰則豪人大賈踰于貴戚臣聞周官曰以儀辨等則民不越臣愚以為宜約前世之禮文詳定方今之制度大臣復依漢晉乘車駟馬增異冠服卿大夫士以品式差降之貴則備物卑則略焉其卒校胥史盍稍撙省其製令有所殊異不相疑雜則上下不相褻朝廷之道尊等級自隆居然崇陛之象紀章自辨無復假器之譏矣福建路轉運使蔡襄上奏曰臣伏聞陛下為溫成皇后立忌臣竊謂聖人制禮所以明輕重尊卑之節過與不及皆曰失禮故太常設官職在檢詳陛下臨御天下三十餘年動遵典法聖德之盛明如天日近者溫成皇后薨逝事不下禮官詳檢既已施行雖有過當無由追改今又立忌考之於禮未為適中伏以孝章淑德章懷四后於陛下為伯祖妣為皇妣其屬之尊如此向來奉慈皆不立忌溫成皇后生則為妃後乃追册於陛下為卑幼之列不應立忌伏望聖慈追還敕命庶乎天下之人知陛下以禮斷情合於中道知太常禮院蘇頌請重修纂國朝所行五禮疏曰臣竊惟方今聖治日新百度修舉其在朝政固無可措言者然詔旨開納不容自默輒敢以平昔所懷一二狂瞽仰塞明詔臣伏見國朝以來制作禮樂上采三代下迄有唐損益節文簡册具載而前後禮官纂集類無法制或直載一時所行或雜牘歲月條目相錯本末不倫臣竊考之六經在禮有三種之别周官著有司典領之事儀禮載升降隆殺之節戴記敘古今因革之文雖聖賢作述之不同而語其歸趣實相為表裏也後世言禮者皆不出此三體漢晉洎隋雖代有作者而茍簡一時法制無取唐明皇命學士等因貞觀顯慶所修五禮討論刪改集成一百五十卷是為大唐開元禮行於纍朝設於科舉傳其學者則有義鑑義羅之類比于近代之書最為詳悉故今世漢晉洎隋皆無傳而開元禮獨不廢者以其法制存焉故也太祖皇帝特詔儒臣劉溫叟盧多遜扈蒙等祖述其書傳以今事仍加增損足成二百卷是為開寶通禮又有義纂一百卷以發明其旨要仍依開元禮設科取士逮今官司遵用斯為不刋况之六經儀禮之别也然此特一經也在於有司典領之事古今沿革之文猶闕而不立故舉行之際尚或未備自開寶以後百年之間纍聖躬行聲明寖盛非有繼述後世何觀嘉祐初太常歐陽修奏請編撰彼時臣任博士職預纂修常以恭謝一門分為三目其一自降御札公卿百司奉行辦備之事謂之有司其二自前期陳設至祼獻禮畢謂之儀注其三采古今曲臺論議更創之制謂之沿革以此一門為例他悉倣之修己議定具草會臣罷禮官領他職復奏姚闢蘇洵繼掌其事闢洵離析舊文更立新體撰成一百卷是為太常因革禮雖號簡要幾同鈔節固可以備有司之檢閲誠未足以發揚聖朝制作之盛也臣伏覩陛下留意典章修舉廢墜前歲詔命近臣詳定禮文自郊廟至於羣臣朝會與夫燕享器服之名數舞樂之形容考古揆今審求至當皆三代之所放失漢唐之所闕遺斷自清衷舉行殆遍固當著於典訓與六經並行為萬世矜式也臣不勝願幸欲望再命諸儒討論國朝以來自開寶通禮至近歲詳定禮文以有司及儀注沿革依三禮隨類分門著為大宋元豐新禮付之太常頒於學官使博士弟子講習大義或施於科舉則數歲之後必有詳練疏通之人上副拔擢可以為朝廷講議之官庶幾天下向風皆知禮教謙恭撙節不學而能於變時雍可跂而待也英宗即位初殿中侍御史司馬光上論後殿起居劄子曰臣竊見國家從來以垂拱崇政為便殿乘輿每旦先御垂拱退御崇政是以侍從近臣已於垂拱起居者非有職事奏對更不復至崇政近歲以來乘輿間日一御垂拱有司不詳事體本末遂令學士待制及兩省官只赴垂拱不赴崇政起居近以山陵未畢乘輿不御垂拱將近旬月學士以下遂廢起居之禮豈有名為侍從近臣而動踰旬月不得瞻望黼扆臣恐朝廷之儀由此相承寖益訛謬欲乞今後應乘輿不御前殿並令學士待制及兩省官赴後殿起居或以為太煩即令兩日一次起居治平元年光知諌院又上論階級劄子曰臣聞治軍無禮則威嚴不行禮者上下之分是也唐自肅代以降務行姑息之政是以藩鎮跋扈威侮朝廷士卒驕橫侵逼主帥下陵上替無復綱紀以至五代天下大亂運祚迫蹙生民塗炭祖宗受天景命聖德聰明知天下之亂生於無禮也乃立軍中之制曰一階一級全歸伏事之儀敢有違犯罪至于死于是上至都指揮使下至押官長行等衰相承粲然有敘若身之使臂臂之使指莫敢不從故能東征西伐削平海內為子孫建久大之業至今百有餘年天下太平者皆由此道也近歲以來中外主兵臣僚往往不識大體好施小惠以盜虛名軍中有犯階級者務行寬貸是致軍校大率不敢鈐束長行甘言恱色曲加煦嫗以至懦怯兵官亦為此態遂使行伍之間驕恣悖慢寖不可制上畏其下尊制於卑所謂下陵上替者無過於此臣聞聖王刑期于無刑今寬貸犯階級之人雖活一人之命殊不知軍法不立漸成陵替之風則所繫乃億兆之命也臣愚欲望陛下特降詔旨申明階級之法戒敕中外主兵臣僚令一遵祖宗之制如敢有輒行寬貸曲收衆心者嚴加罪罰以警其餘庶幾綱紀復振基緒永安二年光又言濮王典禮劄子曰臣聞聖人舉事與衆同欲故能下協人心上順天意洪範曰三人占從二人言蓋國有大疑則決之于衆自上世而然矣臣伏見鄉者詔羣臣議濮安懿王合行典禮翰林學士王圭等二十餘人皆以為宜準先朝封贈期親尊屬故事凡兩次會議無一人異辭所以然者蓋欲奉濮王以禮輔陛下以義也而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖聽不顧先王之大典蔑棄天下之公議使宗室疏屬皆已受封贈而崇奉濮王之禮至今獨未施行此衆人所以怫鬱而未為稱愜者也或者恐陛下未能決知二議是非臣請更為陛下别白言之政府言儀禮令文五年月敕皆云為人後者為其父母即出繼之子於所繼所生皆稱父母臣按禮法必須指事立文使人曉解今欲言為人後者為其父母之服若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣按宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖考以其與昭帝昭穆同故也光武起布衣誅王莽親冒矢石以得天下名為中興其實創業雖自立七廟猶非大過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎政府若以二帝不加尊號於其父祖引以為法則可矣若謂皇考之名亦可施于今日則事理不侔矣設使仁宗尚御天下濮王亦萬福當是之時命陛下為皇子則不知謂濮王為父為伯若先帝在則稱伯沒則稱父臣計陛下必不為此行也以此言之濮王當稱皇伯又何疑矣今舉朝之臣自非挾姦佞之心欲附會政府誤惑陛下者皆稱濮王稱皇考為不可則衆志所欲亦可知矣陛下何不試察羣臣之情羣臣誰不知濮王於陛下為天性至親若希旨迎合不顧禮義過有尊崇豈不於身有利而無患乎所以區區執此議者但不欲陛下失四海之心受萬世之譏耳以此觀之羣臣之忠佞邪正甚易見矣臣願陛下上稽古典下順衆志以禮崇奉濮安懿王如王圭等所議此亦和天人之一事也光為宰相韓琦等議濮安懿王合行典禮狀曰伏以出於天性之謂親緣於人情之謂禮雖以義制事因時適宜而親必主於恩禮不忘其本此古今不易之常道也伏惟皇帝陛下奮乾之健乘離之明擁天地神靈之休荷宗廟社稷之重即位以來仁施澤浹九族既睦萬國交歡而濮安懿王德盛位隆宜有尊禮陛下受命先帝躬承聖統顧以大義後其私恩慎之重之事不輕發臣等忝備宰弼實聞國論謂當考古約禮因宜稱情使有以隆恩而廣愛庶幾上以彰孝治下以厚民風臣等伏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙逰縣君任氏合行典禮詳處其當以時施行光與翰林學士王圭等議濮安懿王典禮狀曰臣等謹按儀禮喪服為人後者傳曰何以三年也受重者必以尊服服之為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者言皆如親子也又為人後者為其父母傳曰何以期也不二斬也特重于大宗降其小宗也又為人後者為其昆弟傳曰何以大功也為人後者降其昆弟也以此觀之為人後者為之子不敢復顧私親聖人制禮尊無二上若恭愛之心分施於彼則不得専一於此故也是以秦漢以來帝王有自旁支入承大統者或推尊父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法况前代入繼者多宫車晏駕之後援立之䇿或出母后或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡拔聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖于陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承者皆先帝之德也臣等愚淺不達古今竊以謂今日所以崇奉濮安懿王典禮宜一準先朝封贈期親尊屬故事髙官大國極其尊榮譙國太夫人襄國太夫人仙逰縣君亦改封大國太夫人考之古今實為宜稱光又論濮安懿王稱安懿皇疏曰臣聞諸道路未知信否或言朝廷欲追尊濮安懿王為安懿皇審或如此竊恐不可陛下既為仁宗後於禮不當顧私親臣先時言之以熟不敢復煩聖聽今臣不知陛下之意固欲追尊濮王邪前世帝王以旁支入繼追尊其父為皇者自漢哀帝為始其後安帝桓帝靈帝亦為之哀帝追尊其父定陶恭王為恭皇今若追尊濮安懿王為安懿皇是正用哀帝之法也陛下有堯舜禹湯不以為法而法漢之昏主安足以為榮乎仁宗恩澤在人淪於骨髓海內之心所以歸附陛下者為親愛仁宗之命為之子也今陛下既得天下乃加尊號于濮王海內聞之孰不解體又安足以為利乎夫生育之恩昊天罔極誰能忘之陛下不忘濮王之恩在陛下之中心不在此外飾虛名也孝子愛親則祭之以禮今以非禮之虛名加於濮王而祭之其於濮王果有何益乎三者無一可而陛下行之臣竊惑之此蓋政府一二臣自以鄉者建議之失已負天下之重茍欲文過遂非不顧於陛下之德有所虧損陛下從而聽之臣竊以為過矣臣又聞政府之謀欲託以皇太后手書及不稱考而稱親雖復巧飾百端要之為負先帝之恩虧陛下之義違聖人之禮失四海之心政府之臣祇能自欺安能欺皇天上帝與天下之人乎臣願陛下急罷此議勿使流聞達於四方則天下幸甚臣今雖不為諌官然鄉日已曾奏聞身備近臣遇國家有大得失不敢不言四年五月光又乞宰臣押班一依舊制疏曰臣伏覩五月七日敕文準四日手詔今後宰臣赴文德殿押班自春分後或遇辰牌上秋分後遇辰正牌上垂拱殿視事未退止令傳報宰臣更不過令御史臺一面放班餘日並依祥符敕命指揮永為定制所有前降下太常禮院詳定文字更不施行者臣竊見從來垂拱殿視事比至中書樞密院及其餘臣寮奏事畢春分以後少有不過辰初秋分以後少有不過辰正陛下臨御以來惟近因服藥曾於辰牌以前駕起入內自餘皆在辰牌以後然則自今以往無事之日宰臣永不赴文德殿押班也臣竊惟文德殿為天子正衙宰臣為百寮師率百寮既在彼常朝則宰臣理當押班斯乃前世之舊規自祖宗以來未之或改今陛下即政之始事非有大利害者恐未須更張伏望陛下特降聖旨令宰臣一依國朝舊制押班若陛下以前者已降手詔必欲限以時刻者即乞自春分後遇辰牌上秋分後遇已牌上並依今月四日指揮施行猶庶幾此禮不至遂廢歷代名臣奏議卷一百十九
