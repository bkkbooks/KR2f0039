body:
  text: 歷代名臣奏議卷一百四十五明楊士竒等撰用人宋孝宗時蔡戡論用人上奏曰臣聞為治莫如求賢求賢莫如變俗俗所趨向視上之好惡而已自古人君未嘗借材於異代所用者不過當世之人在人君作而成之祖宗盛時韓范文富余尹歐蔡比肩於朝故能成四十二年太平之治固萬世不拔之基元祐初載司馬光吕公著范純仁吕大防劉摯蘇轍輩相繼用事一時侍從臺諫之臣皆天下選故後世謂元祐之治有嘉祐風非天之降才獨萃於此時蓋祖宗所以作成之者固有道也祖宗之制莫重制科其次則進士髙第制科第三等進士第一人初授職官或知縣代還升通判再任滿方試館職制科第四等進士第二人以下及諸科任子從可知矣祖宗以文學取之故以州縣試之欲其諳練民事而適於用也今則不然進士髙第雖授外任闕期未及召命已下詞科出身今日拜命明日升朝又有初非異科不歷外任夤緣交結徑登朝籍曽不數年持節擁麾而去州縣之事懵然不曉材者猶不免付之胥吏經年纍月習而後知不材者終身憒憒惟吏是從民被其害不可勝言甚非祖宗立法之意祖宗之制凡執政侍從未有不歷省府而後大用蔡齊進士第一亦先為三司使歐陽修一代名儒亦先知開封府然後為執政蘇軾制科異等亦先為開封府推官吕公著素有時名亦先除户部判官然後為侍從其他名公巨卿莫不如此祖宗求之以名用之以實故人皆可用而事無不立也今則不然凡中詞科舉進士者蓋有不離闕廷不歷繁劇自館閣升左右史入禁近大率十年可致卿相下視六部七寺號曰冗局簿書獄訟目為鄙事不屑為之往往不通世務不達吏道天下無事尚可充員萬一緩急鮮不敗事甚非祖宗用人之意臣謂今日卿士大夫屬袂於下不為無人陛下當饋每有才難之歎蓋非乏材也作成人材未得其道也臣願陛下特賜睿旨討論祖宗舊制因時斟酌之凡制科詞科及進士三人用近日李垕例特與添差職官任滿方許收召其餘進士任子必歷州縣差遣六考以上仍有宰執侍從監司郡守舉薦召對而後除職事官凡館職學官太常宗正等將作軍器監官必兼劇曹其問才學之士可以大用者必歷省府邊藩次第而至卿相舍是則守一官效一職終身無榮進之望天下之士既知聖意所在莫不洗滌磨礪各奮所長以赴功名之會祖宗得人之盛將復見於今日戡又論委官差人侵擾州縣上奏曰臣恭惟國家設官分職上下相繩大小相維如臂之使指故內則省部外則諸司州縣凡有文移次第而下符檄所至敢不聽從比年以來文移既繁期會無信前後相牾新故相仍州縣疲於應酬不無違滯於是委官差人相望絡繹公私煩擾不可勝言所委之官憑藉權勢妄作威福陵轢守宰鞭箠吏胥州縣奉承惟恐不至公庫非時宴餉驛劵計日批支凡所干求惟命是應少不如意謗罵隨之甚者搜摘隱微造作言語還司之後公肆詆誣譛訴既行隂被其害前者未去後人復來旁午道塗充滿驛舍又有使臣承局計囑文移托追索之名為取給之具所在州縣常有數人此曹無知惟利是視茍不厭其所欲迫脅吏輩慢侮官曹踰月纍旬坐待不去州縣之擾莫甚於斯臣愚欲望睿旨嚴飭有司凡省部追索州縣金榖以次移之諸司諸司移之屬郡屬郡移之屬縣凡有慢令者亦以次而劾之大者罷黜小者鐫秩諸司有追索於屬郡屬郡冇追索於屬縣亦如之輒委官差人侵擾部內者必置諸罰庶幾此弊頓革州縣之吏得以展布四體趨事赴功仰副陛下願治之意戡又論用人不當上奏曰臣聞自古人君立事用人未有違衆自任而能成功者也未問事之是非人之賢否先觀衆心之向背如何書曰謀及乃心謀及卿士謀及庶人謀及卜筮夫謀而至於庶人可以已矣又且質諸鬼神不聞逆多從少而其事可立也孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之夫國人皆曰賢可以已矣又且察其人焉不聞國人皆曰不可而其人可用也故人心之所不欲雖有良法聖人不能必行人心之所不與雖有典故聖人不敢必用蓋違衆而立事事雖可立亦必不濟違衆而用人人雖可用亦必無功而況事未必是人未必賢詎可輕咈人心乎古之稱堯者曰稽於衆舍己從人稱舜者曰舍己從人樂取諸人以為善堯舜聖之盛者天下後世不可及矣宜其任已而自用也方且舍己從人蓋謂一己之聰明或有所偏不若天下之聰明為公也恭惟陛下體堯蹈舜冠德百王方欲規恢逺圖紹復大業人心向背不可不察夫立一事而人心不欲必其事之不可立也用一人而人心不與必其人之不可用也強人心而為之非徒無功臣恐適所以害之也臣願陛下法堯舜舍己從人之美稽箕子謀及庶人之言詳孟軻國人皆賢之説於立事用人之際博採公議俯徇人心人心之所同即天意之所在能順人心則合天意以此立事何事不立以此圖功何功不成惟陛下所欲為耳戡又乞遴選監司上奏曰臣聞漢制部刺史秩六百石位下大夫掌奉詔條察二千石居所部久舉為守相夫以小制大以卑臨尊輕重若不相準然當時所遣非御史丞相史則諫大夫博士皆朝廷要官也夫嘗仕朝廷則德意具悉而知所以欽承嘗為要官則名望素重而知所以自愛秩卑則樂進賞厚則勸功故漢部刺史得人為多其後更置州牧秩真二千石行之未久功效陵夷姦軌不禁卒仍其舊國朝選任監司略循漢制多以朝臣為之雖執政侍從為郡太守皆得廉按其權顧不重歟比年以來此選寖輕往往自守二循次而至監司不復選擇故其名望不足以服衆風采不足以動人州縣亦多易之部內一有達官要人趨走奉承唯恐或後職業之不修獄訟之不理寃抑之不伸莫敢過問甚則饋遺相往來酒食相追逐一為所啖夫復何言此監司之所以失職州縣之所以被害也而況川廣去朝廷最逺所賴外臺耳目之寄激濁揚清戢姦惠良以稱臨遣之意茍非其人上下蒙蔽逺民何所控訴乎今諸路監司不過五十人臣愚欲望睿慈明詔大臣選朝廷要官有風力才幹者更迭用之庶幾監司得人廉按稱職州縣之間無復有貪暴偷惰之吏天下幸甚王質奏論使材二疏一曰無責全材臣嘗論曰聖人之用天下常使人欣欣有自喜之心下自一介之吏等而升之人各自顧負荷可用於世才者常思奮其才智者常思泄其智一旦茍可以施為則激昻馳騁惟恐後時而不發當此之時天子優遊於上而天下之人奔走於下大者則為之勞心以集大事小者則為之勞力以濟其職孜孜矻矻以自逞其能疲弊辛苦終其身而不倦甚者蹈白刃觸湯鑊冒患難而不知辭惟夫自以為無用於世則氣消意壞雖有才智久而散緩腐敗以至於枵然而無用夫天下之才智可作而不可沮也世之良弓激而發之一寸之鏃可使有千步之勢弛而放之與仆株朽木同故聖人常以有用引天下以為無用而自絶則其可用蓋無幾矣臣嘗歎息唐八司馬皆天下雄豪偉特之才如栁宗元劉禹錫其所藴藏蓋百分未試其一故其陵厲軒昻之氣雖憂深憔悴之中猶自見其文章議論而不可沒其精華果鋭盤屈而低折不得已而暴露於荒州僻郡之間蓋亦有過人者而程異晚年復振則唐之財用遂霈然此豈可以不惜也蓋嘗讀洪範之書以為皇極之道廣大而不狹寬厚而不苛而堯舜禹湯文武所以用天下之術頗可以推見於此何者有猷者有謀略也有為者有膽力也有守者有志節也有謀略者能畫有膽力者能辦有志節者能立此不可不念也故曰汝則念之雖然有謀略者或至於詐而不知正有膽力者或至於縱而不知法有志節者或至於執而不知懼蓋非天下之中道矣雖然茍未麗於惡者亦不可以不受也故曰不協於極不罹於咎皇則受之嗟夫皇極之道非聖人孰能行之荀彧崔浩張華王猛之謀略杜黃裳李德裕張柬之郭崇韜之膽力申屠嘉張昭竇武何進之志節此固硜硜者有所不録也臣聞昔者太祖皇帝以大度致天下之士深知趙普之貪曹翰之橫而包涵覆蓋未嘗見於辭色故趙普曹翰俱得以為名臣自雍熙端拱之後用法愈詳而責人愈密蓋其弊至於今有二一曰記舊惡而不開其新二曰録其暫失而不責其後效且天下之士誰能無援而進者陛下以天下之權付之宰相凡取豫黜陟皆出其手而今之議者曰某人故相黨也臣愚不知誰非其黨歟既斥其尤則其他自可以淬磨洗濯而與之更始故臣以為莫若棄其舊而開其新夫人一辭令之不當一措置之不審雖大智有所不免而何必銖稱寸量於其間銖稱寸量則自公卿大夫以下至於州縣之丞尉其破碎而不全者甚多而非可以一二數也故臣以為莫若略其暫失而責其後效故夫天下之勢要使輕重兩適其平而已臺諫者列善惡之實而致諸天子天子者權善惡之宜而置諸士大夫是以能平輕重之勢何者臺諫列善惡之實而處之以公故人無邪心天子權善惡之宜而行之以恕故人無棄才此所謂並行而不相悖者然臣之論非所施於大姦慝也二曰無拘定制臣嘗論之曰聖人之於天下惟其我取必於人而人不能取必於我是以天下惟聖人之為聽何者我取必於人則權在我人取必於我則權在人人主之所為奔走於天下者權也以奔走天下之具而委之於人則欲富者富欲貴者貴如執券取償其勢不得不應隨其所欲而應之則我之富貴有限而彼之所欲無窮置而不應則閧然有不平於其心浮躁者則怨怒而形於色辭而長厚者亦不免歎息滯悶而不能一日釋其意以為天子爵祿彼當豫我而我當得也倚之以必豫而不豫以為吝計之以必得而不得以為枉故人主多負謗於天下而天下多不盡力於其君所貴夫聖人者不牽於天下之私情而附合於天下之公論彼天下之私情孰不欲富孰不欲貴而聖人一以公論槩乎其間必其有可以得富貴之理然後遺之以富貴之資故得之則釋然有以自慰其意而不得者亦慊然有以自愧自慰以當天下欲為之心而自愧以作天下不為之氣臣嘗讀西漢百官年表以為武帝規模法度固不若古帝王之粹而其役用天下皆聖人不言之妙術也張歐為中尉九年而遷而寧成之遷四年韓安國之遷一年商丘成為大鴻臚十二年而遷而田千秋之遷一年田廣明之遷五年故臣以為武帝之用人有不可以遲速推漢制宰相之闕則取諸三公三公之闕則取諸九卿然而石慶之死御史大夫當遷而不遷而太僕公孫賀得之公孫賀之死御史大夫商丘成當遷而不遷而涿郡太守劉屈氂得之御史大夫延廣之罷九卿當遷者甚衆無何取諸濟南太守之王卿御史大夫公孫𢎞之相九卿當遷者甚衆無何取諸河東太守之番係故臣謂武帝之用人有不可以次第度彼武帝者以為吾之爵祿而使天下以意揣而情窺則吾爵祿之權將折而歸諸天下是故示之以不可知之端而引之以不可窮之緒使天下惟知愛之而為為之而力而終莫敢有所歆羡邀持於其問此固武帝之所以為雄材大略也邇者大臣之議患夫在朝廷者居之數月則悄悄然已有欲進之心居之滿嵗則汲汲然遂有必進之意又少遲之則􅏮􅏮然不可留也是以故嵗之詔定日月以為遷易之限曰將以沮躁進者之心也患夫在朝廷者不量淺深不度髙下無故而遷不愧不得而得不遜也是以故嵗之詔循序以為進擢之格曰將以塞僥幸之路也此二者其意則甚公而其名則甚美然臣之所慮者士大夫取必於朝廷之爵祿而朝廷又自開其必取之門臣之所不識也夫天下惟不可為此必然之説也為此必然之説則人將有必然之心今將致其力者則先令之曰行百里豫百金而未至於百里百金固不可得也至於百里雖跛蹩者亦無以却之矣其初欲以致有力者而其終不能却跛蹩此必然者之過為今日之計莫若參其才之優劣揆其績之髙下廢置豫奪雜出於必然之間使天下之人知之而不能名名之而不能議然後有以深服天下之心而致天下之力夫使天子之爵祿而日月可以馴致資序可以必得雖童子皆能逆計之矣而烏能以鼓舞天下哉質又論馭臣勿窮恩上疏曰臣嘗論之聖人之服天下惟其我無望於人而人不能無望於我夫是以能鼓舞天下才俊豪傑之士至於奔走勞苦終其身而不厭夫天下之才俊豪傑所為奔走勞苦終其身而不厭者何也有所深慕而不可以遽取有可得之方而無必得之理欲進則有所格欲退則有所不忍捨聖人默然其顧盻顰笑而天下爭先為役而聖人漠然終未嘗有所求於天下夫使天下才俊豪傑之士稍有所長則挾其所習以邀其上軒然自以為天子不可一日無我也而天子盻盻然惟其欲之為徇慊然亦自以為天下不可以一日而無斯人也天子以為天下不可以一日而無斯人則斯人亦以為天子不可以一日而無我夫如是則黃帝堯舜不能以號召天下嗟夫天下誠不可無才俊豪傑之士也而不可使之失機故聖人駕馭才俊豪傑之士廉於用恩而信於用法大抵以為我之所賴於爾者輕而爾之所托於我者重我可以無爾而爾不可以無我然聖人之所以憑藉而倚伏者甚重而不輕也是之謂機昔者髙祖倔起於匹夫之微而與秦楚爭天下所藉以為心膂爪牙者惟二三豪傑是賴然髙帝銖分寸量未嘗有以大慰其心下某城則得某邑破某敵則錫某爵否則終嵗不遷至於以一齊而授韓信猶靳靳而不肯豫彼髙帝非有所嗇以為我之官爵有時而窮土地有時而盡也要使有時而窮者常若無窮有時而盡者常若無盡使夫豪傑之士相與回旋曲折於無窮盡之中而莫自知此固髙帝之所以為善將將者也唐明皇寵一安祿山自營州都督十遷而至宰相自平盧一軍五增而兼三道之兵祿山之才未盡而爵祿已窮矣臣聞之習鷹者搏擊之權在鷹而飲食之權在人故鷹之於人常不惜其博擊之力以易其飲食之資而人之於鷹常重惜其飲食之資以邀其擊搏之力而後能用鷹有淺丈夫者惴惴然惟恐其不可使也則雉兔雞鼠日陳於前其不揚去者鮮矣而安能為盡力於擊搏哉明皇之於祿山是養鷹而飽者也臣嘗論祿山逆計萌於天寶之中年然而隱忍涵養以爵祿之窮而後發是故役使天下豪傑之士必使彼之才有盡而我之爵祿不可窮今之為大將平居無事為天子統會士卒而已非有攻城略地之功汗馬之勞也然而無故而進某階加某職夫今之為大將者類非小官也馴致不已不數月可以極人臣之位昔者曹彬克江南太祖皇帝惜一節度使不與拳拳留之以待巴蜀之平狄青交廣逐儂智髙議者欲寵以樞密使獨宰相龎藉以為西北猶未平後有大功何以賞之蓋其深謀逺慮以為寧使之常有所不足而不可使之自安於有餘今無故而窮之何也且天下未嘗無緩急也窮之於無事之時則何以使之於有事之際乎臣懼其才未足而爵祿先窮也樞密院檢詳文字李椿上奏曰臣仰惟陛下宵衣旰食勵精求治親攬權綱進退人材宜乎內外咸康亟臻至治以稱陛下焦勞圖回之志而外則吏強官弱民志不伸田野未闢物價翔踴州縣窘匱百姓窮苦遊手不戢盜賊時有內則主勞於上臣逸於下百寮茍且多為身謀直言不聞相徇成俗命令數更未適攸當其故何哉臣愚竊意陛下腹心無謀畫之臣規模無一定之計故百僚茍且相徇成俗者不識陛下之規模也命令數更未適攸當者腹心無臣以謀陛下之事也陛下非不求謀畫腹心之臣以圖至治蓋求之未有其人也然則多士在朝寰宇之廣豈無其人足以為國家用者臣愚竊意陛下用人進之欲速退不盡禮進之欲速故多不勝其任退不盡禮則真才實能隱晦而不出矣臣愚欲望陛下審擇其人以用之陛下聞其賢矣置之左右與之論天下之事其剖析如流者固易見也其遲疑不決者亦易見也陛下知其才矣察其操守觀其志趣皆不逃聖鑒矣既賢且才則與之謀畫治天下一定之規模使百僚知所趣嚮莫敢茍且內外弊風俱不勞而變矣陛下圖治之心遂矣臣疏逺小臣唯知盡忠不知忌諱僭擬狂妄之誅惟陛下寬之以來忠讜之言天下幸甚椿又轉對曰臣竊謂人材不可不擇天下本非乏材也顧作成之如何耳陛下臨御以來收拾人物多出親擢至郡守監司兵將官其參辭悉令陛對大開言路雖微賤之士皆得論事陛下未嘗憚煩焦心勞思以圖治功宜乎多士在廷盡忠竭力共濟國事四海福康使陛下端拱無為不勞而治斯可矣比者泛使之來未測其意大小之臣以至細民俱懷疑懼而不聞一士為陛下謀者臺諫侍從亦皆緘默袖手以觀賴陛下神聖獨斷自有以服之人情乃寧享陛下髙爵厚祿者不為不多而一有小事而莫能有毫髮之助可不謂人材乏乎至如州縣闕乏當申之於漕司計度之以有餘補不足漕司不足則當申之省部科撥足矣至於煩陛下遣中使宣問又差奉使會計纍月往來僅能罷一人易一人且諸路數百州一一溷瀆聖躬如此可不謂人材乏乎先儒以為天生一世人自足以了一世事今非無人也但不任其職也何以不任其職風俗使然也風俗若何主勞而臣逸也陛下親攬權綱聖主之事也謂如近日陛下逐臺諫罷執政可以銷朋黨破姦邪正紀綱保善類羣臣莫不厭服陛下之英斷所謂親攬權綱如是而已可也若會計州縣之收支譏察小臣之微罪臣願陛下不必經聖慮也提綱振領舉其大者則小者莫不舉也臣仍願陛下嚴禁臣寮遊權幸親近之門為士大夫而遊近幸之門臣知陛下必深惡之然勢或使然也陛下每惡腐儒及為巧佞所誤致陛下於進退人材之際無所取信則必求所以密察之術以密察人不自膚近何從而知之故得罪而不由中書者或以謂近習所察也得進而不由中書者或以謂權幸所薦也未必實然萬一有此理也規進之士不知義命唯進是求或以苞苴或以諂諛交結附麗寖以成風人材所以委靡臣仰惟陛下聖明之朝而目覩此風實痛惜之臣流落寒士隻影孤立本無才術誤蒙陛下擢用行年六十有四疾病在身來日無幾茍有所見畏忌而不言是臣負陛下恩遇也臣切切之心無由上達天聰今因轉對得露愚誠臣又願陛下選擇有人望負道德之重者進用之使負道德之士進退人材議論得失必不忍負陛下而任私意矣以公道用人以名節取士則士風振而人材出矣晉琅琊王初過江東王導輩以未有人望歸之以為憂故收拾東土之望顧榮賀循紀瞻卞壼之流進用之遂能立國蓋人望者國之基本也其可忽諸然則何以知負道德之重者以唐明皇之所以用宋璟仁宗皇帝之所以用富弼則易知之矣臣狂瞽之言冒犯天威死有餘罪臣不任戰懼待罪伏乞睿照椿兼檢正乞擢用北人上奏曰臣愚庸無取屢蒙陛下親擢廷對之際親承玉音以臣北人所以召用則臣荷陛下特達之知且知陛下不忘中原之意也仰惟陛下欲用北人豈不以其性多忠實豈非惡傾巧之人所以進忠實之士則臣固當以忠實事陛下不敢求竒巧圖迎合以希覬官爵庶幾有以上稱陛下用北人之本旨臣竊惟伏自太上皇帝南渡艱難之時任吕頥浩所以能誅逆臣破羣寇扶宗社立紀綱可謂有大勳勞及叛臣挾敵勢侵犯淮甸太上皇帝用趙鼎遣諸將破敵軍而後國勢張宗社固天下翕然歸重此二臣者皆北人也當時若非二臣決未必能立此功業自二臣遷廢死亡其家皆破碎北人立朝者殆鮮況北人南來今五十年矣所存無幾其近年歸正之士又亦屈指可數且北人性多拙直孤立以拙直孤立處之機巧奔競風波之內其何能立也不唯不能立臣亦慮必將有受害者矣又有流落失所之士飢寒切身俯仰於人干求進望不復有北方直實之氣味者不可不察也故陛下雖有用北人之意未有以上副聖心所欲也臣嘗聞晉琅琊王初過江東王導輩以未有人望歸之以為憂故收拾東土之望顧榮賀循紀瞻卞壼之流進用之遂能立國臣願陛下兼收並進惟賢是用惟道德是尊不必曉然露欲用北人之意庶不失東南士心亦足以保全雕殘流落北方之士果有剛敏材器如吕頥浩學術方正如趙鼎者願陛下尊而用之然後有以稱陛下用人之心也伏乞睿照椿兼尹京又奏曰臣伏聞漢陳平以智稱不以德稱者也任宰相不答刑獄錢榖之對號知宰相之職所以能成不世之勳唐稱賢相前有房杜後有姚宋表表在人耳目於今稱美房杜不言功蓋舉皆得宜故無功可稱姚崇薦郎吏明皇仰視不答以謂言郎吏非宰相事崇聞歎服後世稱其得體宋璟自南海至都下不與中使交談當時為人歸重至今􅏮然可尊不惟五人之能是文帝太宗明皇用人得其道也故能成刑措貞觀開元之治非偶然也仰惟陛下睿智仁明上希堯舜賢於文帝太宗明皇逺矣十餘年間焦勞求治躬攬權綱三帝之勤政未足上擬聖德之倣佛而考實其治則未及漢唐全盛之時何哉主勞於上臣逸於下天下之事無任責之人故用力多而見功寡其以此也臣每自逺方來與士大夫處但聞得失升沈之計罕聞憂國為民之言以奉公者為野以真實者為愚習以成風上下茍且故政無大小皆待陛下躬自與決才無能否皆待陛下親行進退至於出納之吝上浼聖躬士大夫惟知圖進不復以國家治亂關於心所以未臻至治也易曰君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也食君之祿不留意於此烏足以為士君子哉臣愚願陛下飭大臣戒百寮各使不忘聖人之戒明安危存亡治亂之理盡心臣道各率乃職毋勞君父以圖自逸共禆聖政日躋至治天下幸甚椿又曰臣聞晉室之南渡也王導實佐之始至江東深以東南人望為念故收拾顧榮紀瞻等用之所以能立國南北雖分而能保其正統者得人心故也仰惟國家仁厚之政洽於民心雖遭艱難阻隔而人情不忘歸仰非東晉可以比擬伏自陛下臨馭以來未嘗一日忘中原故孜孜以人材為念中原之士尤荷選擇至如臣之愚亦蒙異眷洊被超擢臣仰體陛下聖慮以北人稟性忠實者多所以收用期於忘身徇國以圖治具德至渥也臣自念生長河朔賦性愚拙流寓江湖五十餘年每歎人材之難得蓋緣士風之不振願陛下惟才是用不拘南北兼北人至此無幾況陛下兩宫身居南土不可不固結其心惟臣言之無嫌承平全盛之時北人立朝尚以疏直不得行其志矧今日絶無而僅有陛下雖欲全之適所以尤難其全矣此臣所以痛心疾首願陛下深思逺慮選才於公論毋取於交結信任其忠實毋取於詭隨庶幾士風漸革真才輩出不患不能輔佐聖時以圖至治也臣不勝皇懼待罪衛涇奏論人才疏曰臣聞人君臨制天下所與建功立業者惟人才是賴然自古及今未有儲之不廣養之不素而能備大有為之用者也仰惟陛下臨御日久博觀今日人材熟矣以為果有餘也果未足也以為不足則內而朝廷外而郡縣百司庶府其在任者員備而無缺其待選者倍蓰而又多以為有餘則因循玩嵗而職業不舉委靡從俗而士行不修執政大臣所以圖回於廟堂左右侍從所以論思於邇列皆陛下所親信委任非臣疏賤所得知也至於當世知名之士一時簡記之臣皆陛下異時之所拔擢録用陛下亦嘗致察於斯乎其自任以重輔導君德不汲引親舊以為黨與不棄遺疏逖以誤信用足以當腹心之任者幾人昌言正色别白賢否務存大體而不責苛細務振紀綱而不望風旨足以任耳目之司者幾人持節刺舉肅清所部不結權要以自售不借孤寒以示公足以膺臨遣之寄者幾人勸課農桑使民安業不為姑息以要譽不肆貪暴以害民足以稱牧養之責者幾人一旦邊陲有警羽檄交馳臨機料敵彈壓三軍之衆威聲德望鎮撫中外之心足以備緩急之用者幾人聖明在上天涵地育臣不敢謂舉無其人也聞之議者竊謂今之士大夫徇利而不顧義矜名而不務實習成軟熟則謂之得體稍知激昻則指為生事公清鯁亮者苦落落而難合脂韋容悅者常齪齪以自媒忠誠篤實者以迂闊而見疏貪鄙巽懦者以僥求而幸進是以氣節頽敗而不立風采銷萎而無餘庸庸垂紳默默尸位若大若小渾然一律前至者冒寵而無耻後來者效尤而何憚賈山曰士修於家而壞於天子之庭此之謂也風俗成矣國家何賴而況邪徑未塞羣小爭趨苞苴賄賂之公行干託請求之無厭附炎逐臭希寵爭榮陛下以至公之心而猶牽於毁譽之偏私以至明之見而未免於人情之曲徇邪正之辨未盡昭白是非之論未盡公當頽弊風俗沮壞人材莫甚於此臣願陛下光昭聖德奮自宸𠂻念國勢之所以未張思人材之所以未振廣薦賢之路必惟賢者而後任盡任賢之道毋使不肖參其間窒其邪枉之門時出非常之斷崇奬骨鯁之士則諛默之風自革簡拔靜退之人則躁進之徒自逺廣寬容之度毋疑人臣之為近名養敢言之氣毋使人臣之懷畏罪儲之日廣養之日厚風俗丕變賢能輩出一旦取而器使之唯陛下所志而曰人材不足者臣不信也將見主威以隆國體以固靜足以強根本動足以復土疆何弊之不革何事之不成何功之不立哉惟陛下留神省察豈惟臣之幸天下之幸也涇繳徐柟祠録上奏曰臣竊惟御史耳目之司朝廷紀綱所繫惟無私乃能體國正己斯可律人必振揚風采砥礪廉隅然後風憲尊嚴百辟整肅伏見朝奉郎徐柟素乏聲稱誤膺簡拔自頃入臺凡所論奏多不厭塞衆望其劾翁點也反為點上章詆毁指其所言率挾私意柟雖苦詞辨數訖無以自解識者固已譏其辱臺所宜引避乃偃然自安已而蘇師旦之敗交通之迹尤為彰露物議甚喧亦可以言去就矣而柟包羞居職如罔聞知纍月以來一無建明日惟覬望遷擢此其風采銷靡廉耻道喪尚足以稱陛下糾繩之任乎近因縱容親戚販鬻私酒暨場務捕獲動以千計付之有司公行可也乃力與庇護甚至縱令僕廝爭奪紛競都人聚觀請屬守臣必欲釋放遂至徹聞天聽陛下曲全事體猶頒與郡之命今因其引疾畀以祠祿陛下所以待柟可謂厚矣而柟不自愛重上負陛下久尸要任敗壞臺綱若不别白言之切慮中外莫知其故反疑陛下輕去臺臣有纍聖德臣愚欲乞睿斷將徐柟祠祿指揮特賜寢罷俾之循省庶幾上以彰陛下黜陟之公下以釋搢紳疑似之論不勝幸甚臣雖時暫兼攝不敢隱默隳廢職守所有録黃臣未敢書讀謹録奏聞涇又繳兵部郎官劉炳除江西提舉上奏曰臣竊惟常平使者之任分一道刺舉之權若昔先朝選掄特重在外必登最郡課綽有治聲在內必服勤郎省著聞朝迹始與兹選是為拔擢儻授非其人則公論不置臣伏見新除江西提舉劉炳試州逺外資望甚淺夤緣收召遂廁朝列繼以宣司辟置咨議超躐郎選以寵其行而炳天資暗愚材術疏短職在禆贊補報蔑如進退之間義當自審顧方入部就職偃然安居物議沸騰乃謀去就復徼幸使節迄遂所欲丐外之章不知引咎猶謂非不欲趨事赴功敢為大言欺罔衆聽學士大夫宜知禮義廉耻行不顧言當如是乎縱朝廷寬大不欲加罪使之善去幸矣況炳為丞未久為郎又才數日凡郎曹久次而去者亦不過得節是宜幽黜而反被拔擢人雖置而不問炳獨不知愧乎臣愚欲望聖慈特發睿斷將劉炳新除江西提舉指揮特賜寢罷且與待闕州軍差遣庶幾朝廷不至過豫在炳受之亦安乃所以全其進退之節不勝幸甚所有録黃臣未敢書行謹録奏聞衛博上殿劄子曰臣聞人主無它職以進退大臣為職大臣無它職以佐天子進退百執事為職在列之臣有一賢焉以復於上而進之可也有一不肖焉以復於上而退之可也知賢而進之知不肖而退之大臣之職然矣近世以來廟朝之論進賢則有聞矣於不肖者之退則未之或聞也職業之不修行誼之不立冗瑣之冒進貪邪之自植非彈擊之來上廉問之發舒則清議不加憲章不及者有之沿襲之風從來久矣聖人在上朝廷清明小大之臣罔不精白以承休德固不容不肖者濫吹其間然於大臣所以佐人主進賢退不肖之職豈宜有偏而不舉之弊臣愚欲望聖慈明詔在廷各恭乃事厲乃行一乃心俾二三大臣精校而審核之以揚進退之任庶幾賢不肖之别不致混淆真材實能奮迅而出有以上副陛下厲精求治之意博又上劄子曰臣聞人各有能有不能羿之射精矣而不能敵秋之奕造父之馭至矣而不能舉烏獲之任鏤冰者不可使琢玉刻朽者不可以鑽堅瞽之樂刖之門宫之守雖聖人不能廢其用夔之樂垂之工臯陶之理雖大舜不能更其任所貴乎量才授職因事賦官者正在是爾今之仕者自一命而至於公卿自箠楚簿書而至於稽古禮文之事莫不欲擅其能茍以一藝自名一能自售者非特其心歉然不滿而人固亦小之此古之所以職業設而萬事治後之所以職業設而萬事隳方且喟然有乏材之歎則亦厚誣天下之士矣仰惟陛下焦心望治虛己任人士有尺寸之長未嘗不録舜之所以為舜陛下蓋得之矣雖然張湯官御史大夫而仍兼治獄劉晏位宰相而不去鹽鐵度支此特漢唐近事堂堂聖朝豈固因循軌轍而分處昔人之下哉臣愚欲望聖慈詔執事大臣無責人以全技無強人以不能明習典章者則使之居臺閣善調盈虛者則使之主國計治獄者必法理之士分閫者必智勇之臣録所長護所短久任而責成之將見百工熙庶績凝䇿勳乎三五之上矣侍御史王十朋上奏曰臣聞古之為民師帥者能以德化人則人耻於為盜能以威服人則人不敢為盜能以智略屈人則可以除一時之盜三者皆無焉則何以為民師帥共理天下乎臣竊見廣賊海寇久未撲滅上勞聖慮者蓋繇帥守不得其人既不能使之懷德畏威又無智略以勦除之也朝廷不詰其致亂之由懲其不職之罪又從而遷為大藩因而久任亦可謂失刑矣臣竊見知明州韓仲通不能防禦海寇致昌國定海諸縣皆被其毒而海道為之不通初有捕致海寇者仲通從而縱之遂致其徒益熾昌國令嘗獻謀於郡仲通忽而不聽四明人莫不切齒朝廷既不罷黜之又除知紹興府仲通不能治一郡其可以典大藩帥一路乎知靜江府俞良弼不能弭雷化之盜遂致蔓廷而二廣為之騷然運使鄧酢用虔吉茶商以禽淩鉞良弼忌酢併與茶商等皆不奏功致茶商憤然嘯呼而起醜黨數千人陷沒州縣殺戮官軍守臣有死者其勢方熾朝廷不能正良弼之罪乃因而久任之安能使鼠竊狗偷輩即時殄滅乎仲通刻薄小人昔為秦檜鷹犬其惡備見於白簡臣不復論之議者猶謂其有粗才可以任使及治四明最無善狀專用公帑交結黨援海盜猖獗略無計畫其才亦可見矣良弼雖無仲通之惡然聞其老繆不事事況二廣去朝廷為最逺斯民所恃以為命者惟師帥之臣爾良弼為大帥而盜賊充斥如此何以安逺人乎臣欲乞睿斷罷仲通紹興之除奪良弼靜江之帥别擇有用之才以代之將見海廣二寇不誅而自滅矣十朋又上疏曰臣聞有旨令龍大淵往兩淮撫諭者仰見聖心憂念將士故遣左右心腹之臣為勞來旋歸之使或出於大淵不憚勞苦慨然請行亦可嘉也然命令初下議者囂然咸謂自古遣使或巡行天下或撫諭軍民皆於士大夫中遴選人才如漢之八使用張綱等唐之十一使用庾何等是也太上皇建炎紹興間亦嘗遣使撫諭矣或用臺察或用郎官出於遴選時號得人今大淵雖為潛藩舊臣議者謂非出於朝廷遴選之公銜命撫師有輕國體又慮大淵之出聞者謂是陛下所親信之人州縣必希意而將迎諸軍或望風而交結萬一復致人言如前日臺諫給舍之論列豈不重貽聖憂亦非所以保全大淵也臣以謂王師之還陛下已降詔慰撫之矣今只委張浚勞來安集之不必更遣撫諭之使切恐將士以宿州不利而還未測朝廷之意忽聞使命之出心必懷疑不如寢而勿行以安反側不然乞命宰相於朝列中擇其忠實通曉者敦遣之以重光華之使以塞中外之議不勝幸甚十朋為著作郎上疏曰臣聞人主之職莫大於論相尤宜遴選於嗣位之初論相得人則可以相與大有為遴選於嗣位之初斯可以慰天下惟新之望昔舜之受命也選於衆而首舉臯陶湯之革命也選於衆而首舉伊尹髙宗中興也首求諸野而爰立傅説成王訪落也首以師保而並處周召漢髙祖首相蕭何而成創業之功唐太宗首相房杜而致貞觀之治明皇首相姚崇憲宗首相杜黃裳武宗首相李德裕我太祖之有天下也宰相雖因周舊其自圖任也則首用趙普仁宗即位之始則相王曽又以李迪張知白魯宗道為宰執皆正人也英宗因舊相韓琦曽公亮而委任之又起富弼為元樞用歐陽修為參政治平之治最號得人神宗又因治平宰相而委任之及韓琦既去則代以富弼元祐垂簾之際首用司馬光又起文彥博於已老平章軍國重事又相吕公著又並相吕大防范純仁元祐人才於兹為盛歷代帝王與我祖宗任用大臣皆極一時之選又皆遴擇於新政之初足以厭伏天下人心君臣相與有為各成一代之勳業人主之職其有大於此乎恭惟太上皇授陛下以大寶之位又以一相遺之虛右揆以待陛下自擇天下莫不拭目以觀此舉臣願陛下擇諸內外千官百辟之中孰有清德雅望負王佐才者孰有兼資文武可以救時活國者必諸大夫國人皆曰賢天下蒼生望其起者然後用之可也茍惟不然寧虛位以俟之不可使庸人鄙夫僥幸而得以失天下之望非特此也人主之職雖在於論相至若侍從臺諫亦不可不親自識擢宰相得人則內可以奠安宗社外可以鎮服四夷又得賢侍從以論思獻納真諫官以拾遺補過才御史以糾肅姦邪如是則內之百執事外之監司郡縣皆可以得人陛下端拱一堂之上羣天下人才如意而任使之內修外攘中興之功不日可冀矣十朋代越帥王尚書上疏曰臣聞唐杜牧論兵謂上䇿莫如自治夫內修政事蓋自治之䇿也任賢使能又自治之要者昔漢以汲黯寢淮南之謀晉以謝安破苻堅之衆唐以陸贄濟奉天之難我國家寶元慶歷間西夏叛命仁宗皇帝以經略安撫之任付之范仲淹韓琦軍中有一韓一范西賊破膽之謡兵不大用而元昊已服今我與敵強弱不敵惟當以人才勝之茍得仗節死義如汲黯輩則謀當自寢風流雅望如謝安輩則敵當自退忠謀讜論如陸贄之徒則難當自解兼資文武宏材偉略如韓范二臣則敵當自服所謂一士止百萬之師一賢制千里之難者也臣又聞范仲淹初以言事得罪仁宗尤為宰相吕夷簡所惡斥逐於外及西方用事仁宗思用仲淹夷簡亦力薦之仲淹果能成功夷簡不失為賢今邊境未寧正是側席求賢之日臣願陛下以仁宗之心為心大臣以吕夷簡之事為法相與任用天下之賢才以為排難解紛之計仍詔侍從臺諫監司郡守各舉人才勿遺疏賤朝奏暮召如恐不及如是則異人輩出可以供陛下之任使矣夫猛虎在山藜藿不採國有人焉難當自消自治之術莫大於此知畨陽王師愈論養人才上奏曰臣聞致治者必資於人材願治之君輔治之臣皆能知之皆能言之然而每患人材之難得者豈天下果乏材也哉自古成大業者未嘗借材於異代況我國家聲教所暨不為不廣受天地之中以生者今猶古也顧所以養之取之用之如何耳鄧林之木信美矣必培其本根茂其枝幹斯能成可用之質大匠覩其質而採伐之斫削其朴斯能成堪任之器因其小大度其長短或為杗桷莫不各適其宜然後大廈可成矣凡用人材者亦若是嘗觀有周之時菁菁者莪在彼中阿豈非樂育於其始乎追琢其章金玉其相豈非作成於其中乎疏附先後奔奏禦侮各當厥職非器使之效乎此所以濟濟多士獨稱於有周也今之用人似恐不然一時俊乂稍有稱於世忌嫉者衆不指其小瑕則索其舊愆或誣以昧昧難明之過必使之困躓而後已吁是誠何心哉況夫人之所稟賦負材術者不能無可議之失尚氣節者未必有應變之具必欲求全肆毁奚可哉茍或見用又且不度其力小而責以任重不假以嵗月而責其速效宜乎歷年之久治效之未成也臣愚欲望聖慈逺鑑有周之隆近察鄧林之木凡曰人材始則保護愛惜之次則磨礱作成之終則隨器久任之其不能成事功者臣未之信也管見瞽言冒黷天威戰兢之至師愈又奏曰臣聞自漢罷侯置守秩二千石任共理之寄其祿厚矣其任專矣其權重矣故當時郡守多有治功著於方册逮至武帝置刺史以臨之秩止六百石蓋欲以小制大稍殺其權未至太輕其任之專固自若也人亦奮勵以成治功惟我國朝待遇守臣禮固甚厚祿亦不薄二年成資添置監郡任已不專矣又置監司以臨之權已輕矣雖欲自奮已不若兩漢之肆近嵗以來二年成資者十無二三監司統監其員益衆郡守之權輕無如是之甚者且以江東一路言之止九郡耳有兩總領兩運使兩提刑又有安撫提點提舉各一員是則一人守郡臨之者九人十羊九牧猶未足以況也至若監司置司之郡益又甚焉豈非長官尊大為郡守者欲行一事欲下一令動輒掣其肘而吏卒撓政未可槩舉稍加繩治交鬪釁隙郡守必至斥去而後已監司縱有賢者欲懲其弊而吏卒之徒耻其不勝必多方為計使監司墯其術中而不自知吁可歎也哉安平之時已難於成事功涵容調護尚可愒日或有盜賊之警兵革之用必致敗事甚失建侯作屏之意臣愚欲望聖慈明詔宰執凡監司之郡必擇宰執侍從及曽任臺諫有風力者為之守其位望頗重庶可展其所長不然止令監司兼領郡事必久其任責以治效至若會府帥臣之權頗與之均尚庶幾焉師愈直煥章閣知長沙論作邑之難上奏曰臣聞字民之官莫親於縣令陛下愛育斯民如保赤子重縣令之選嚴黜陟以别善否德至渥也為縣令者孰敢不仰體聖意恪修厥職然而官卑權輕法密責重上下皆得以鈴制害之者太衆乞為陛下詳陳之願少垂聽覽上焉有監司守倅始則驅之冒法以辦事末則置之深文以自解況又有私喜怒於其間無所分訴此其一也次則有屬官冇曹職官有本縣同官有寄居有過客多欲遂其私為賢令者豈能盡如其所欲往往撰造是非譛之監司守倅為監司守倅者略不加察從而罪之此其二也下則有本縣人吏有豪強上户有教唆把持健訟之猾民相為表裏又皆欲遂其私為賢令者豈肯徇其所欲於是人吏伺缺失豪強率錢帛教唆把持者議狀本裝點虛詞遣健訟者訟之輕則欲其逐去甚則使之敗官喪身破家而後已此其三也抑又有監司州府之案吏與夫承局排軍院虞候散從官平時持一紙引傲睨無禮下視縣令厚有所求稍不如其欲裝事端以譖訴監司守倅者聽之屬官曹職官助之其不被害者鮮矣此其四也陛下擇字民之官為甚重而上下小大害之者如此其衆雖使卓魯復生欲展其材詎可得乎是以作邑者莫不苦其難上官者亦皆知其難苐莫肯加恤耳甚負陛下任官愛民之意然而京朝官作邑尚敢不顧其害與衆為敵間有善政至若選人作邑抑又難焉選人非無賢材然而皆懷寸進之心皆為改官之計鮮不彌縫上下以干虛譽甚者兑易官錢以買舉狀相習成風上下知其所急者在此尤得以制之故選人作邑為尤難也臣愚欲望聖慈罷選人作邑盡令京朝官為之庶可革其希進之弊責以字民之效仍敕監司帥守凡知縣顯然姦贓無狀者依公按劾重置典憲誠不足恤其謬懦不材者逐之亦無害唯是清強賢令為上下所不喜者當保護愛惜之或為人所誣當直其寃庶幾賢材可行其志字民之效著矣歷代名臣奏議卷一百四十五
