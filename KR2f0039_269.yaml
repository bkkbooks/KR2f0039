body:
  text: 厯代名臣奏議卷二百六十九明楊士奇等撰理財宋神宗熙寧初蘇轍論蜀茶五害狀曰右臣伏見朝廷近罷市易事不與商賈爭利四民各得其業欣戴聖德無有窮已唯有益利秦鳳熙河等路茶場司以買賣茶虐害四路生靈又以茶法影蔽市易販賣百物州縣監司不敢呵問為害不細而朝廷未知禁止臣聞五代之際孟氏竊據蜀土國用褊狹始有𣙜茶之法及藝祖平蜀之後放罷一切橫斂茶遂無禁民間便之其後淳化之間牟利之臣始議掊取大盜王小波李順等因販茶失職窮為剽劫凶焰一扇兩蜀之民肝腦塗地久而後定自後朝廷始因民間販賣量行收稅所取雖不甚多而商賈流行為利自廣近嵗李把初定茶法一切禁止民間私買然猶所收之息止以四十萬貫為額供億熙河至劉佐蒲宗閔提舉茶事取息太重立法太嚴逺人始病是時知彭州吕陶奏乞改法只行長引令民自販茶每茶一貫出長引錢一百更不得取息得旨依奏民間聞之方有息肩之望又却差孫逈李稷入川相度始議極力掊取因建言乞許茶價隨時增減茶法既有增减之文則取息依舊由是息錢長引二說並行而民間轉不易矣而稷等又益以販鹽布乃能增額及六十萬貫及李稷引陸師閔共事又增額至一百萬貫師閔近嵗又乞於額外以一百萬貫為獻朝廷許之於是奏乞於成都府置都茶場客旅無見錢買茶許以金銀諸貨折博遂以折博為名多遣公人牙人公行拘欄民間物貨入場賤買貴賣其害過於市易又以本錢質典諸物公違條法欺罔朝廷蓋茶法始行至今法度凡四變矣每變取利益深民益困弊然供億熙河止於四十萬貫其餘以供給官吏及非理進獻希求恩賞而害民之餘辱國傷教又有甚者夫逐州通判本以按察吏民諸縣令佐亦以撫字百姓而計算息錢均與牙儈分利至於監茶之官發茶萬馱即轉一官知縣亦減三年磨勘國之名器輕以與人遂使貪冒滋彰廉耻不立深可痛惜又案盜賊之法贓及二貫止徒一年出賞五貫今民有以錢八百私買茶四十斤者輒徒一年出賞三十貫又遞鋪文字事干軍機及非常盜賊急腳遞日行四百里馬遞日行三百里違二日者止徒一年今茶遞往還日行四百里違一日輒徒一年立法太深茍以自便不顧輕重之宜蓋造立茶法皆傾險小人不識事體但以逺民無由伸訴而他司畏憚不敢辨理是以公行不道自始至今十餘年矣臣切聞朝廷近日察知其弊差官體量然猶恐未知其詳臣今訪聞稍得其實謹具條件五害如左其一曰益利路所在有茶其間卭蜀彭漢綿雅洋等州興元府三泉縣人戶以種茶為生自官榷茶以來以重法脅制不許私賣抑勒等第髙稱低估遞年減價見今止得舊價之半茶官又於每嵗秋成糴米髙估米價強俵茶戶謂之茶本假令米石八百錢即作一貫支俵仍勒出息二分春茶既發茶户納茶又例抑半價兼壓以大稱所損又半謂之青苗及至賣茶本法止許收息二分今多作名目如牙錢打角錢之類至收五分以上買茶商旅其勢必不肻多出價錢皆是減價虧損園户以求易售又昔日官未𣙜茶園戶例收晚茶謂之秋老黃茶不限早晚隨時即賣榷茶之後官買止於六月晚茶入官依條毁棄官既不收園戶須至私賣以陷重禁此園戶之害一也其二曰川茶本法止於官自販茶其法已陋今官吏緣法為姦遂又販布販大寧鹽販瓷器等物并因販茶還腳販解鹽入蜀所販解鹽仍分配州縣多方變賣及折博雜物貨為害不一及近嵗立都茶場緣折博之法拘欄百貨出賣收息其間紗羅皆販入陕西奪商賈之利至於買賣之餘則又加以質當去年八九月間為成都買撲酒坊人李安典糯米一萬貫每斗出息八錢半年未贖仍更出息二分其他非法類皆如此今四方䝉賴聖恩罷去市易抵當之弊而蜀中茶官獨因緣茶法潛行二事使西南之民獨不䝉惠澤此平民之害二也其三曰昔官未𣙜茶陕西商旅皆以解鹽及藥物等入蜀販茶所過州軍已出一重稅錢及販茶出蜀兼帶蜀貨㳂路又復納稅以此省稅增羡今官自販茶所至雖量出稅錢比舊十不及一縱有商旅興販諸處稅務畏憚茶官又利於分取息錢例多欺詐以稅為息由此省稅益耗假有作稅錢上歷嵗終又不撥還轉運司但添作茶官嵗課公行欺罔又茶官違法販賣百物商旅不行非唯稅虧兼害酒課蜀中舊使交子唯有茶山交易最為浩瀚今官自買茶交子因此價賤此省課之害三也其四曰蜀道行於溪山之間最號嶮惡般茶至陕西人力最苦元豐之初始以成都府路廂軍數百人貼鋪般運不一二年死亡略盡茶官遂令州縣和雇人夫和雇不行即差稅戶其為騷優不可勝言後遂添置遞鋪十五里輒立一鋪招兵五十人起屋六十間官破錢一百五十六貫益以民力僅乃得成今已置百餘鋪矣若二百鋪皆成則是添兵萬人衣糧嵗費二十萬貫見招填不足旋貼諸州廂軍逐州闕人百事不集又茶遞一人日般四馱計四百餘斤回車却載解鹽往還山行六十里稍遇泥潦人力不支逃匿求死嗟怨滿道至去年八九月間劒州劒陽一鋪人全然走盡㳂路號茶鋪為納命場此遞鋪之害四也其五曰陕西民間所用食茶蓋有定數茶官貪求羡息般運過多出賣不盡逐州多虧嵗額遂於每斤增價俵賣與人元豐八年鳳州准茶官指揮每茶一斤添錢一百其餘州郡准此可見又茶法初行賣茶地分止於秦鳳熙河今遂東至陕府侵奪蠟茶地分所損必多此陕西之害五也五害不除蜀人泣血無所控告臣乞朝廷哀憐逺民罷放𣙜法令細民自作交易但收稅錢不出長引止令所在場務據數抽買博馬茶勿失朝廷武備而已如此則救民於網羅之中使得再生以養父母妻子不勝幸甚如朝廷以為陕西邊事未寧不欲頓罷茶事即乞先弛𣙜禁因民販茶正稅之外仍收長引錢一嵗之入不下數十萬貫而商旅通行東西諸貨日夜流轉所得茶稅雜稅錢及酒課增羡又可得數十萬貫而罷置茶遞無養兵衣糧及官吏緣茶所費食錢息錢之類其數亦自不少則𣙜茶可罷灼然易見若異日西邊無事然後更罷長引錢如舊收稅而止然臣再詳師閔所營茶利雖使之裒斂一一如數止於二百萬貫無復贏餘矣若以前件茶引茶稅雜稅酒課利等錢約七八十萬貫折除即止約有利一百二十餘萬貫若更除茶遞養兵衣糧及官吏緣茶所費約三四十萬貫即是師閔百端非理􅓸虐細民止得八十萬貫假令萬一蜀中稍有饑饉之灾民不堪命起為盜賊或如淳化之比臣不知朝廷用兵幾何費錢幾何殺人幾何可得平定今但得七八十萬貫錢置此不慮臣切惑也兼臣訪聞陸師閔去年自成都移治永興仍取成都供給有本府衙前楊日新者為之賣酒至十一月中師閔自覺非法始移牒永興成都止就用永興供給其違法差衙前賣酒及多請過成都供給即不曽舉覺其貪冒無耻一至如此亦乞令所差官便行體量如是詣實乞重行黜謫以慰逺方積年之憤轍為中書舍人論處置川茶未當狀曰朝廷若罷益利路榷茶之法只𣙜陕西㳂邊諸郡不許客旅私販仍將㳂邊每嵗合用益利諸場茶色及斤重配在諸場令及時立限和買官買數足方許私下交易除㳂邊所榷地分外一任客人興販如此擘畫比之頃年全𣙜益利及陕西諸州其利有五益利茶户不被官場以賤大稱抑勒收買一也昔茶未有𣙜民間採茶凡有四色牙茶早茶晚茶秋茶是也採茶既廣茶利自倍自𣙜茶以來官中只要早茶其餘三色遂棄不採民失茶利過半今既通商則四色茶俱復採二也官所運茶止於邊郡所須比𣙜茶之日所運減半則茶遞役兵州郡雇腳皆得輕減三也陕西茶商既行岐雍之間民皆食賤茶四也益利諸州百貨通行酒稅課利理當自倍五也若比之今來有司所議但𣙜名山梁洋三處放行益利諸場茶貨其利有四名山梁洋三處𣙜法如舊而不𣙜之地犬牙相錯𣙜與不𣙜茶戶利害相遼例皆王民而咫尺之間不宜頓有此異一也𣙜與不𣙜地分不逺小人易以起動茶戶借如名山之西南出茶之地尚有雅州盧山榮經等處若放令此茶北出道過名山彼此相雜不可辨認若放令此茶由水路入嘉眉則名山之茶亦當從此走失寬則𣙜法自廢急則民遭誣罔橫被徒配二也官中所買只用早茶則牙茶晚茶秋茶亦為棄物民失厚利與頃嵗無異三也㳂邊諸州蕃部所要茶色各别今只將名山梁洋三色茶與之彼既未諳茶性必有不售四也若比之今來或人之說兼𣙜陕西裏外諸州據合用茶數於益利諸場和買官自般賣和買之餘成都路客人販茶不得過陕西其害有三盡奪茶利商賈不行百課不通酒稅課利自減一也運茶既多遞鋪役兵及州郡雇腳勞費與頃年無異二也岐雍之民仍食貴茶三也由此觀之朝廷若但和買邊郡合用茶數只於邊郡立𣙜法其餘率皆通商此法一行則上件三說之弊自除至於供給蕃部收買戰馬之利則與三說無異以此較之利害可見熙寧中權開封府推官蘇軾上言曰均輸徙貴就賤用近易逺然廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不眀言販賣既已許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而豫錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今先設官置吏簿書廪祿為費已厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以豫之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣帝方惑於王安石之說言皆不行時青苗法行屯田員外郎知山隂縣舜俞不奉令上疏自劾曰民間出舉財物取息重止一倍約償緡錢而榖粟布縷魚鹽薪蔌耰鉏釡錡之屬得雜取之朝廷募民貸取有司約中熟為價而必償緡錢欲如私家雜償他物不可得故愚民多至賣田宅質妻孥有識耆老戒其鄉黨子弟未嘗不以貫貸為苦祖宗著令以財物相出舉任從書契官不為理其保全元元之意深逺如此今誘之以便利督之以威刑方之舊法異矣詔謂振民乏絶而抑兼并然使十戶為甲浮浪無根者毋得給俵則乏絶者已不䝉其惠此法終行愈為兼并地爾何以言之天下之有常平非能人人計口受餉但權榖價貴賤之柄使積貯者不得深藏以邀利爾今散為青苗唯恐不盡萬一饑饉洊至必有乘時貴糶者未知將何法以制之官制既放錢取息富室藏鏹坐待鄰里逋缺之時田宅妻孥隨欲而得是豈不為兼并利哉雖分為夏秋二料而秋放之月與夏斂之期等夏放之月與秋斂之期等不過展轉計息以給為納使吾民終身以及世世每嵗兩輸息錢無有窮已是别為一賦以敝海內非王道之舉也熙寧十年和彭州吕陶上奏曰朝廷欲寬力役立法召募初無過斂民財之意有司奉行過當增添科出謂之寬剩自熙寧六年施行役法至今四年臣本州四縣已有寬剩錢四萬八千七百餘貫今嵗又須科納一萬餘貫以成都一路計之無慮五六十萬推之天下見今約有六七百萬貫寬剩在官嵗嵗如此泉幣絶乏貨法不通商旅農夫最受其弊臣恐朝廷不知免役錢外有此寬剩數目乞契勘見在約支幾嵗不至闕乏霈發德音特免數年或逐年限定不得過十分之一所貴民不重困陶又上奏曰臣今具本路置場買茶往熙河博賣并盡諸州茶貨入官便收三分利息旋行出賣致令細民失業枉陷刑憲大於逺方不便謹具畫一條例如後一臣伏以國家富有四海山澤之利多與民共自仁祖臨御以來深知東南數路茶法之害制詔有司一切弛放任令通商貨法流行德澤深厚聖時盛事髙出前世今天下茶法既通而蜀中獨行禁𣙜此蓋言利之臣不知本末茍於勞費而妄為之非所以安靜逺方之意況川峽四路所出茶貨比方東南等處十不及一日月所照文軌混同法無二門仁不異逺豈可諸路通商兩川却為禁地虧損治體莫甚於斯乃為害之大者故臣敢先言之伏望聖慈特寬茶禁所貴法令平一以幸逺方一本路既為置場買茶將往熙河等處并逐旋取利出賣之後更不許民間衷私買賣遂令諸色人告捕依編敕禁榷茶法斷罪州縣承此指揮後來纍有成都府邛州百姓馬吉等為衷私賣茶被人告捕有至徒罪各追賞錢一路之民遂生怨誹蓋緣立法大重有害於人大凡官中元有之物民間私侵其利方是犯禁只如解州有鹽民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園本是百姓兩稅田地不出五榖只是種茶賦稅一例折科役錢亦須均出自來採茶貨賣以充衣食伏緣此茶本非官地所産乃是百姓己物顯與解鹽晉礬事體不同一旦立法須令中賣與官或敢私下交易便成犯禁斤數稍重乃至徒刑仍沒納隨行物色别理賞錢恭惟陛下仁聖恤物之心必不如此伏乞别立條約以救苛刻之弊免使刑辟滋彰有傷和氣一本州導江縣蒲村堋口小唐興木頭等鎮各准茶馬司指揮盡數收買茶貨入官並已施行民之受弊大率均一惟導江縣一處尤為切害蓋緣本處是西山八州軍隘口自來通放入城郭部落博易買賣其蕃部别無見錢交易只是將到椒蠟草藥之類於鋪户處換易茶貨歸去食用謂之茶米或有疾病用此療治旦暮不可暫闕今來官中須要見錢出賣則蕃部難更將椒蠟等物入場博買若於鋪户處博易則官茶每斤取三分息錢鋪戶價例自然增長蕃部買賣便致阻隔況茂州軍興之後人情方始安帖豈宜更使茶貨不通别生邊事右謹具如前所有茶禁不通細民失業刑辟太重最於逺方不便事理並已條析如前臣切見熙寧七年朝廷差李把蒲宗閔入川相度買茶往熙河博馬等事當時使者急於進用不察事體遂認逐年息錢四十萬貫應副熙河後來運茶積滯嵗課不足即便擘畫却於彭漢二州逐年收買狹布各十萬匹名為折當腳錢其實將布上所得之息充入茶利自後又恐買布亦難敷及元數則乞却雇回船車般解鹽入川洎至鹽法難行則又乞將川中有茶去處並行收買前後乖錯非止一事只是欲竊功賞不恤民間弊病臣愚伏望聖慈特賜采察所貴逺方之俗被惠安生至如官吏費耗道途阻莭稅額虧損得不補失則臣不敢喋喋開陳以浼天聽伏乞以臣此奏下本路安撫轉運提刑司相度利害特賜施行神宗時薛向任發運使行均輸法於六路同修起居注范純仁言臣嘗親奉德音欲修先王補助之政今乃效桑羊均輸之法而使小人為之掊克生靈斂怨基禍安石以富國强兵之術啓迪上心欲求近功忘其舊學尚法令則稱商鞅言財利則背孟軻鄙老成為因循棄公論為流俗異已者為不肖合意者為賢人劉琦錢顗等一言便䝉降黜在廷之臣方大半趨附陛下又從而驅之其將何所不至道逺者理當馴致事大者不可速成人材不可急求積敝不可頓革倘欲事功亟就必為憸佞所乘宜速還言者而退安石答中外之望純仁為起居舍人知諫院又論發運均輸狀曰臣伏覩近降敕命委江淮發運司行均輸之法此蓋制置條例之臣不務逺圖欲希近效略取周禮賖斂之制理市之法而謂可以均平百物抑奪兼并以求陛下之信其實用桑羊商賈之術將籠諸路物貨買賤賣貴漁奪商人毫末之利以開人主侈大之心甚非堯舜三代務本養民之意也臣聞傳稱先王之化民曰陳之以德義而民興行先之以恭廉而民不爭導之以禮樂而民和睦示之以好惡而民知禁今使貪鄙之吏多引其類習商賈之態以市道誘民固異先王陳德義示好惡之意而欲民之興廉知禁不可得已且成湯不殖貨利孔子罕言利孟軻亦曰何必曰利聖賢非以財利為不可用也蓋惡其誘導民心以滋貪欲之風耳夫上之所好下必有甚焉詩曰爾之教矣民胥效矣茍國家得末利而敗風俗非治世之道也王者治財惟在務農桑禁遊惰開衣食之原莭無用之費上率下以儉下化上以勤上下勤儉則自然公私有餘矣今耕桑之人不勸衣食之原不廣朝廷不先莭儉百姓率多遊惰不務生財之道乃使小人扇好利之風而欲國家財用富足是猶緣木而求魚也不獨傷教無益之如此而又將有害之大者焉夫百姓者陛下之赤子也教養之道不可不至撫之以仁則孝愛生導之以利則爭奪起則其所施之法所任之人安得不慎哉今執政不眀引用小人使専利病而其人素有貪叨之行屢為欺罔之姦必將以羡餘恱朝廷以賄賂結權幸加以吏民貧弱官吏承風君門九重朝廷萬里有掊剋之患而不得訴有瘡痍之苦而不得伸怨憤一興何所不至陛下雖有子惠黎元之意天下何由而信之哉伏望陛下思聖人之訓黜霸者之術以農桑為衣食之本以殖貨為敗俗之端特降詔旨追改前敕以近者東南郡縣多被水灾其均輸未得施行則必中外生民咸仰盛德若謂已行之命不可遽止則乞先罷某人但委逐路監司只用常平舊法凡物之賤者貴價以斂之物之貴者賤價以發之無令抑配人民務求羡息亦足以均平物價沮抑兼并又何必過為更張以傷大德哉臣職叨言路義切愛君知而不敢不言言之不敢不盡惟望聖慈留神納聽不獨臣之幸甚實天下幸甚純仁又乞詔御史覺察轉運使刻剝為政狀曰臣切以天下財用出於耕桑耕桑出於民力民力有餘則財用足民力困弱則財用匱故傳曰百姓不足君孰與足如此則財用以民力為根本未有弱其根本而盛其枝葉者矣向聞京東轉運使因進羡財公私窘迫今又聞本路官將綿俵與人户每十三兩折和買絹一匹人户却須減價賣易如有斤兩折耗比給見錢甚有虧損及至納絹之日所陪益多及聞荆湖北路監司令民進納授官有人戶家財不能滿數者須令三四戶同共進納內只一户受官受官者既使他人助錢太為僥幸同納者無名被斂徒抱怨嗟陛下方患國用不足正宜愛惜根本今轉運使所為如此安得民力不傷孔子謂與其有聚斂之臣寧畜盜臣蓋謂盜臣止侵末財聚斂必傷根本伏望聖慈下逐路體量如實有上件事狀宜與重行責降仍乞詔御史臺覺察諸路轉運使有敢以刻剝為政者速行彈奏所冀民力漸蘇王道可行監察御史裏行劉摯乞復錢禁奏曰先王之制錢幣也所以御萬物通有無而調虛盈人主之所操天下之利勢也鼓鑄之權一制於公上而下不得私之其發散交易流布運用雖或積于公或藏于民轉移出入之不常而要皆為縣官之物使不出于中國用爾是以糜毁之奸散泄之弊不可以無禁也天下諸路監冶所鑄入于王府嵗亡慮數十百萬緡自國朝以來積而至此其數幾何謂宜公私沛然有餘裕矣然今都內之藏既不聞於貫朽而民間之匱時或謂之錢荒此何謂也其故大者在泄之於四夷而已曩時著令銅錢出中國界者云云數及一貫其罪抵死立重賞以購告捕而居停資給與夫官吏之失檢察者皆罪有差今熙寧制刪去此條而徒聞㳂邊有每貫稅之之令利之所在民不憚於冒法前日殺之猶莫能制况遂弛其令哉使四夷不勞而獲中國之利以為利三邊之所漏海舶之所運日積一日臣恐竭吾貨財窮吾工力不足以給之而區區之算稅權其得失何啻相萬哉夫錢以銅為本銅之必禁前世固已有禍福之論今朝廷方增置錢冶而刪去銅令官之所積日益發散民間得以買賣肆為器用以牟厚利蓋非獨失銅而已也而又至於銷毁法錢蓋緣錢者和煉之已精其工費尤簡變而為器有數倍之利然則既泄之又壞之欲錢之充溢不可校如古之盛理宜無有也故臣愚欲乞申嚴邊制以塞流散之路復立銅禁以蕃鼓鑄之本而息銷毁之患淮南轉運使蘇頌奏乞減定淮南鹽價疏曰臣伏見淮南一路財賦之數最為浩繁尤藉每嵗賣鹽額錢一百餘萬貫資助經費而近嵗已來連併不敷議者咸謂不能禁絶私販之人侵奪公利而致然耳且瀕海之地潟鹵所生而又宿亳諸州連接京東西通商地分販者不宿昔而獲厚利雖峻以刑誅亦不可禁絶加以私貨美而價賤官貨惡而價貴民間既利於私易則官鹽無由出賣得行往往只是抑配與坊郭人户及過往舟船如此課額何從而登辦也夫鹽味之於人日食而不可闕者非同茗酤用之有時也以一路生齒之繁食鹽者不可勝計而百萬之課前後登虧不同非昔之食者衆而今之食者寡也蓋未思所以制其本耳臣竊聞曩時數有建言者欲將一路官鹽設法減價出賣或有欲只減出産州軍價直者臣以謂逺近一槩減價誠未易遽行若且於出産地分通泰楚海州漣水軍及通商鄰境宿亳夀泗等州減定使公私之價不甚遼絶則民間樂買者必衆而私販之人自知利薄而重犯法矣茍度越一州而販入他州界則道路潛匿必艱於鄰境官司捕搦亦易為禁止也若行之三數年間課額稍登然後於近裏州軍一例裁減此誠移私貨官利之法也張方平上疏論國計事曰臣切惟天之生民以衣食為命聖人因是而為之均莭立君臣貴賤等威之分以止其爭且亂故禮也者文飾此者也刑也者防禁此者也凡所謂賞罰法令仁義廉耻皆緣此而後立者也衣食不足何禮刑之有哉內無以保其社稷外無以制其侮亂國非其國矣故貨食者人事之確論非髙談虛辭之可致者也今京師砥平衝㑹之地連營設衛以當山河之險則是國依兵而立兵待貨食而後可聚此今天下之大勢也臣在仁宗朝慶厯中充三司使嘉祐初再領邦計嘗為朝廷精言此事纍有奏議所陳利害安危之體究其本原冗兵最為大患略計中等禁軍一卒嵗給約五十千十萬人嵗費五百萬緡臣前在三司勘㑹慶厯五年禁軍之數比景祐以前增置八百六十餘指揮四十餘萬人是增嵗費二千萬緡也太祖皇帝制折杖法免天下徒初置壯城牢城備諸役使謂之廂軍後乃展轉增創軍額今遂與禁軍數目幾等此其嵗增衣糧幾何是皆出於民力則天下安得不困臣慶厯五年取諸路鹽酒商稅嵗課比景德計㑹録皆增及三數倍以上景德中收商稅四百五十餘萬貫慶厯中一千九百七十五萬餘貫景德中收酒課四百二十八萬餘貫慶厯中收一千七百一十萬餘貫景德中收鹽稅課三百三十五萬餘貫慶厯中收七百一十五萬餘貫但茶亦有增而不多爾天下和買紬絹本以利民初行於河北但資本路軍衣遂通其法以及京東淮南江浙景祐中諸路所買不及二百萬匹慶厯中乃至三百萬匹自爾時及今二十年但聞比校督責不聞有所寬減如此浚取天下豈復有遺利自古有國者貨利之入無若是之多其費用亦無若是之廣也昔唐室自天寶之亂肅代之後國力大窘禁軍乏餉畿甸百姓至挼穗以供兵食登都城門以望四方貢奉之至可謂危蹙已然患難既平則兵有時而解兵解則民力紓矣今中外諸軍坐而衣食無有解期天下困敝已如此而上下恬然不圖云救寶元康㝎中夏戎阻命西師在野既聚軍馬即須入中糧草在京支還交鈔銀錢物帛一嵗約支一千萬貫以上三司無以計置即須內帑供給慶厯二年三年連年支撥內庫銀紬絹只此兩次六百萬匹兩三司以補不足尋即支盡西事已㝎二紀于兹中間亦不聞有所處置者邦家不幸大變仍臻頒賚之餘府庫虛匱宿嵗舊積蓋無餘幾萬一因之以飢饉加之以寇戎臣恐智者難以善於後矣夫茍且者臣下及身之謀逺慮者陛下家國之計立事體大在陛下所憂無先於此財計之任雖三司之職日生煩務常程計度簿書期㑹則在有司至于議有繫於軍國之體事有關於安危之機其根本在於中書樞密院非有司可得預也今夫賦斂必降敕支給必降宣是祖宗規摹二府共司邦計之出入也今欲保大豐財安民固本當自中書樞密院同心協力修眀真宗已前舊典先由兵籍減省以次舉其為敝之大若宗室之制官人之法諸生事造端非簡便者裁而正之至于微末細故於國計盈虛不足為損益屬之有司可矣提其綱則衆目張澄其源則下流清易曰窮則變變則通通則久又曰變而通之以盡利莭卦之辭曰莭以制度不傷財不害民故傷財害民之事當為制度以莭之爾若但遵常守故齪齪細文避猜嫌顧形迹恤浮議而廢逺圖忽人謀而徼天幸日月逝矣嵗不我與後雖噬臍何嗟及矣臣服在近列荷恩三朝切見時事日以迫急不勝憂憤輒罄狂瞽惟陛下留神省察時銅鐵官多建言鑄錢事不盡行而又自弛錢禁民之銷毁與夫䦨出境外者為多方平諌曰禁銅造幣盜鑄者抵罪至死示不與天下共其利也故事諸監所鑄錢悉入于王府嵗出其竒羡給之三司方流布于天下然自太祖平江南江池饒建置爐嵗鼓鑄至百萬緡積百年所入宜乎貫朽於中藏充足於民間矣比年公私上下並苦乏錢百貨不通人情窘迫謂之錢荒不知嵗所鑄錢今將安在夫鑄錢禁銅之法舊矣令敕具載而自熙寧七年頒行新敕刪去舊條削除錢禁以此邊關重車而出海舶飽載而回聞㳂邊州軍錢出外界但每貫收稅錢而已錢本中國寶貨今乃與四夷共用又自廢罷銅禁民間銷毁無復可辨銷鎔十錢得精銅一兩造作器用獲利五倍如此則逐州置爐每爐增數是猶畎澮之益而供尾閭之泄也監察御史裏行彭汝礪上奏曰臣聞古之所謂理財者以義理之而已非謂奪而有之也如今所謂市易蓋幾於奪矣凡民之所用皆聚而待之凡民之所利皆取而専之道路之所販不得於私而必之於公市肆之所資不得售於私而必取於公又為假貸以招民於凍餒百姓為之怨傷愁苦而上之人方以此原本闕知東南為詳江以南其地利在茶浙江東西所利在物帛州鄉之類以此為生而商賈者資焉每嵗舟浮輦運絡繹於路官得其征以祿百官以養軍旅以事父母以育妻子視京師如歸焉今而市易既自遣使以専其利而商賈不行矣利入市易而三司之稅有損利歸公家而百姓之用不足其弊非難知也且市易之法非不善也誠使如詔書斂市之不售貨之滯於民者以其賈買之雖舉天下為之可也而其利亦無窮且如江東今年夏旱米斗三百銀每兩不至千浙東西今年絲每斤不至四百民在窮乏方無所售使有司因此時取之以待公家之乏利實在民而公家亦與焉今不知出此使牙儈小人日與市民爭毫髮絲粟之息此計之至不善也蓋昔之御商賈之法權其盛衰而已方其盛厚征以抑之方其衰簿稅以揚之未嘗専其利而有之也唐劉晏權萬貨輕重使天下無甚貴賤兵興數年斂不及民而用度足君子或賤之今為計晏下矣聞之冢宰制國用必以嵗之杪五榖皆入然後制國用量入以為出廪人以嵗之上下數邦用以知足否以治年之豐耗不足則詔王殺國用國家嵗比不登而稅賦之入比異時十失三四亦以此言於陛下乎天之豐歉無常而國之用有定以無常支有定此固已不給矣而開邊境鑿河渠興墟垾而所費益侵此亦無怪上下內外之俱告乏也臣願少罷一切力役視浮費而損之以需有嵗焉古者三年一郊以致誠於天地以天地之德為不可報也故牲幣服器一於簡而已自漢及唐浮文滋長矣而恩賞之例尤過於厚使尚文為是邪於救世則今當從質矣以尚豐為是邪於趨時則今當用約矣況未必當於禮也古者以義養君子以利養小人今軍伍之賞且以為因循難廢而羣臣幸以才藝數䝉陛下休命平時恩施厚矣於是時得封其祖考及其妻子施于子孫又以無功安受無名之賞此非不可莭也人皆曰養財有道為此者私憂過計矣夫養財固有道用之獨可無禮乎不止於平時而莭之而圖之於不及不於貴者而均之而變於其下亦不足以言仁智矣惟陛下察之判三班院曽鞏上奏曰臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於嵗杪蓋量入而為出國之所不可儉者祭祀也然不過用數之仂則先王養財之意可知矣蓋用之有莭則天下雖貧其富易致也漢唐之始天下之用嘗屈矣文帝太宗能用財有莭故公私有餘所謂天下雖貧其富易致也用之無莭則天下雖富其貧亦易致也漢唐之盛時天下之用嘗裕矣武帝眀皇不能莭以制度故公私耗竭所謂天下雖富其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庶而財用有餘且以景德皇祐治平校之景德户七百三十萬墾田一百七十萬頃皇祐户一千九十萬墾田二百二十五萬頃治平户一千二百九十萬墾田四百三十萬頃天下嵗入皇祐治平皆一億萬以上嵗費亦一億萬以上景德官一萬餘員皇祐二萬餘員治平并幕職州縣官三千三百餘員捴二萬四千員景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官之衆一倍於景德郊之費亦一倍於景德官之數不同如此則皇祐治平入官之門多於景德也則皇祐治平用財之端多於景德也誠詔有司按尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後各議其可罷者罷之可損者損之使天下之入如皇祐治平之盛而天下之用官之數郊之費皆同於景德二者所省者蓋半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而徔之如是而力行以嵗入一億萬以上計之所省者十之一則嵗有餘財一萬萬馴致不已至於所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每嵗之入存十之三耳蓋約而言之也今臣之所陳亦約而言之今其數不能盡同然要其大致必不逺也前世之於雕敝之時猶能易貧而為富今吾以全盛之勢用財有莭其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下沖靜質約天性自然乘輿器服尚方所造未嘗用一竒巧嬪嬙左右掖庭之間位號多闕躬履莭儉為天下先所以憂憫元元更張庶事之意誠至惻怛格于上下其於眀法度以養天下之財又非陛下之所難也臣誠不自揆敢獻其區區之愚陛下裁擇鞏又奏曰臣嘗言皇祐治平嵗入皆一億萬以上而嵗費亦略盡之景德官一萬餘員皇祐治平皆三萬餘員景德郊費六百萬皇祐治平皆一千萬以上是二者費皆倍於景德使皇祐治平入官之門多於景德者可考而知皇祐治平郊費之端多於景德者可考而知然後議其可罷者罷之可損者損之使嵗入如皇祐治平而祿吏奉郊之費同於景德則二者所省蓋半矣則又以類推而省之以嵗入一億萬計之所省者十之一則嵗有餘財一萬萬所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也陛下謂臣所言以莭用為理財之要世之言理財者未有及此也令付之中書臣待罪三班按國初承舊以供奉官左右班殿直為三班立都知行首領之又有殿前承旨班院别立行首領之端拱以後分東西供奉又置左右侍禁及承旨借職皆領于三班三班之稱亦不改初三班吏員止於三百或不及之至天禧之間乃總四千二百有餘至於今乃捴一萬一千六百九十宗室又八百七十蓋景德員數已十倍於初而以今考之殆三倍於景德略以三年出入之籍較之熙寧八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者嵗或過二百人或不及之則是嵗嵗有增未見其止也臣又略考其入官之繇條於别記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近於此者惟陛下試加考察以類求之蓋有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行使天下嵗入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家富盛如此則何求而不得何為而不成以陛下之聖質而加之勵精以變因循茍簡之敝方大修法度之政以幸天下詒萬世故臣敢因官守以講求其損益之數而終前日之說以獻惟陛下裁擇哲宗初即位資政殿大學士吕公著上奏曰臣伏見陛下自臨朝以來留神庶政以休息生民為念凡所施為皆中義理如罷導洛堆垜等局減放市易見缺息錢罷人户養馬放積缺租稅差官體量茶鹽法使者之刻剝害民如吳居厚霍翔王子京等內臣之生事斂怨如李憲宋用臣等皆從罷去中外聞之無不欣喜踴躍今來復䝉陛下不遺踈拙特降清問臣雖無狀敢不竭盡愚見臣伏思先帝初即位召臣充翰林學士當時親見先帝至誠求治嘗令臣草詔書以寬省民力為意自王安石秉政變易舊法羣臣有論其非便者則以為沮壞法度必加廢斥自是青苗免役之法行而取民之財盡保甲保馬之法行而用民之力竭市易茶鹽之法行而奪民之利悉若此之類甚衆今陛下既已深知其弊至公獨斷不為衆論所惑則更張之際當須有術不在倉卒且如青苖之法但罷逐年比較則官司既不邀功百姓自免抑勒之患免役之法當須少取寬剩之數度其差雇所宜無令下户虛有輸納上户取其財中户取其力則公私自然均濟保甲之法止令就冬月農隙教習仍只委本路監司提按既不至妨農害民則衆庶相得安業無轉為盜賊之患如此三事並須别㝎良法以為長久之利至於保馬之法先朝已知有司舉行之謬市易之法先帝尤覺其有害而無利及福建江南等路配賣茶鹽過多逺方之民殆不聊生俱非朝廷本意恐當一切罷去而南方鹽法三路保甲尤宜先革者也以上數事皆略陳大槩其他詳悉非書所能盡然臣所深慮者陛下必欲更修庶政使不驚物聽而實利及民莫若任人為急故臣前日輒獻愚誠乞陛下廣開言路選置臺諫官誠得中正之士布在要職使講求天下利害議所以更修之術朝廷上下協心同力斟酌而裁制之則天下不難為矣若不得其人則雖有欲治之意終不可以濟事功臣又切慮議事者以為若更張青苗助役等法則向去國用必至不足然自來提舉常平司等處錢物並係封樁自不許撥充軍國常費況今日正是息民省事之時既外不輕用兵革內無土木橫費自然國計易給兼罷得上件掊斂則民力已覺漸舒只如近日方罷導洛司堆垜場㳂汴稅額已有增數此古人所謂百姓足君孰與不足者也監察御史王巖叟論河北𣙜鹽之害疏曰臣切見河北二年以來新行鹽法考觀其文纎悉皆具所以用意於國家收利於公上不為不至然立法之初必以謂官不勞而法可行民無苦而利可得臣今觀之大異於此運載之車名為和雇而郡縣鎮寨或無可雇者則不免有配車於上户之擾主司移文則未知和雇郡縣應辦則其實均科一嵗之間或至數四其能勝乎載而至官官自賣之勢須準留以備消耗故買者又不免有分兩不足之弊平日商旅通行隨力大小乘時輦置鹽亦有餘民間不知有闕絶之患今車腳既艱運載不續則又不免有時時無數謂之良法固如此乎臣切度計議之人必曰止籠商賈之利以歸公家而無所增於民今則在在處處民間鹽價增貴一倍乃是既奪商賈之利又增居民之價以為息爾所以萬口咨嗟以謂不慣日食貴鹽如此又未嘗買之艱難如此也仍聞去城稍逺貧家下户往往不復食鹽至有以鹽比藥之語夫增價於民而收息於官以為異效其誰不能雖十倍之亦無難也顧於百姓何如爾伏惟河朔天下根本祖宗以來推此為惠願陛下不以損於民為利而以益於民為利復鹽法如故以為河北數百萬生靈無窮之賜貼黃稱慶厯六年嘗有臣寮擘劃鹽法一嵗之間止舊數可增錢五十九萬二千八百餘貫利之所得可謂厚矣仁宗曽不以為意而惻然發德音云朕慮河北軍民頓食貴鹽可且令依舊至今耆舊言之往往流涕其敕書刻石於北京今録本上進庶幾陛下得見仁宗之意體而法之以益盛德為社稷無疆之休又稱慶厯六年鹽稅額止一十九萬餘緡今若依元豐六年末推行榷法以前嵗收鹽稅為額自己三十三萬餘緡比舊亦增矣巖叟又奏曰臣伏覩朝旨差范諤相度河北轉運使范子竒所奏乞令鹽稅收十分稅錢事臣昨在河北亦知商賈有自請於官乞罷榷買而願納倍稅者此蓋出於商賈患榷買之奪其利而巧為此謀主計者但知能於商賈倍得稅緡以為利不知商賈將於民間復增賣價以為㝎也臣近因論河北鹽法榷買不便且録慶厯六年仁宗敕書繳進意謂得經聖覽不復更有此指揮今既未然理當再有論列伏以仁宗既不行三司榷買之法又不從都運司增稅之請直批云朕慮河北軍民頓食貴鹽可且依舊一言感人淪於骨髓刻之琬琰眀若日星方是時計嵗所增幾六十萬緡仁宗豈不為公家之利博且多邪意以謂藏之官不若藏之民圖於近不若圖之逺故特捐數十萬緡無窮之息以為數百家無窮之惠嵗月雖舊而恩意則新今陛下即位之始正宜復以祖宗一言感恱天下豈宜以小利失人心也夫小利得之易人心得之難陛下豈不惜邪借此使者復命以增為可行陛下遂將用其言而增之邪然則如仁宗敕書之語自河而北人人共知不可違而違之如陛下名義何臣誠知陛下初無此心特為朝議者未之思耳且以利害義非善謀也以怨易恩非忠告也要之前日之德音不可忘今日之歡心不可失至理在目了無可疑臣乞罷諤勿遣特以慶厯敕書申諭言者以昭陛下惠愛之心以塞計臣聚斂之意則不獨河北之人幸甚實天下幸甚元祐元年巖叟乞罷青苗奏曰臣等纍日前連章上言乞依臺諫官前後論列早賜罷支青苗錢事尚未䝉指揮施行臣等未諭聖意仰惟自青苗之法行天下困弊日甚一日不如昔時陛下靜則以堯舜之心為心動則以祖宗之法為法髙明博大無所不通必知行青苗以來百姓皇皇日甚一日天下之人議論沸騰者今十六七年矣必不肯復以為便力主而行之切聞有大臣妄進奸言惑亂聖聽謂恐國用不足覬陛下以此為富國之計便可見其無識今匹夫放債取利為之不已而終必自敗況為國乎富國有大道養民有大本豈有匹夫朝夕之事可為富國長久之計哉比者四民不循其分不安其業故所得者皆茍得所圖者皆茍圖今陛下即位以來四民得安其分得安其業天下之富自將有餘為士者不敢狂言妄作徼功幸進以生事於四方而耗公私之財嵗之所惜自己無窮此一富也為農者絶誅求之苦息調發之勞罷不急之役寬非時之擾天下從此無逃民四海從此無荒田耕桑以時常賦不闕嵗之所入不可勝計此一富也為工者不窮竭材用以治兵器不傾極功能以事土木崇儉尚朴而華靡纎巧無所陳於前日有所省月有所積而富不可勝用也為商者無均輸之政以害其生無市易之法以奪其利而後皆得自竭其計自運其財以流行於四方人人之得有餘而國家征稅之入無算此其富不可勝用也四者所得孰與青苗之息乎為陛下大臣不知以此開陛下之心而乃嵗初而出之嵗終而入之朝而出之暮而入之以求毫分之息以自利者匹夫富者之事也豈有為天下而為匹夫之事哉陛下只當思養民不須思富國若主於富國則民必自窮若志在養民則國將自富發之於心曽靡毫釐之差覩之於事遂爭千里之逺惟在審處之也伏望陛下檢㑹臣等前奏留神省納早賜施行岩叟請詔有司講究商賈利病奏曰伏以祖宗盛際四方之商賈交出於塗而萬貨無所滯公私共享其利優遊乎豐樂而不自知其後利専於公上商賈為之不行通都㑹邑至有寂寞之嘆非獨商賈之患也而上下均受其弊陛下即位之始首發德音廢導洛罷市易還民衣食之源以惠養困窮人人䝉福如遂更生有司固無復爭利之端矣然二年于今不為不久商賈猶病乎不通而國家未獲其益何也必法有蔽於中而講之未盡其術也伏望特詔有司深究利病以通天下之商賈下以祫百姓而上以資縣官庶幾人物熙然復及祖宗之盛臣愚不勝區區朝奉郎前知登州軍州事蘇軾狀奏曰臣切聞議者謂近嵗京東榷鹽既獲厚利而無甚害以謂可行以臣觀之蓋比之河北淮浙用刑稀少因以為便不知舊日京東販鹽小客無以為生大半去為盜賊然非臣職事所當言者故不敢以聞獨臣所領登州計入海中三百里地瘠民貧商賈不至所在鹽貨只是居民喫用今來既榷入官官買價賤比之竈户賣與百姓三不及一竈户失業漸以逃亡其害一也居民咫尺大海而令頓食貴鹽深山窮谷遂至食淡其害二也商賈不來鹽積不散有入無出所在官舍皆滿至於露積若行配賣即與福建江西之患無異若不配賣即一二年間舉為糞土坐棄官本官又被責専副破家其害三也官無一毫之利而民受三害決可廢罷切聞萊州亦是元無客旅興販事體與此同欲乞朝廷相度不用行臣所言只乞出自聖意先罷登萊兩州榷鹽依舊令竈户賣與百姓官收鹽稅其餘州軍更委有司詳講利害施行軾為朝奉郎試中書舍人時乞不給散青苗錢斛狀曰准中書録黃先朝初散青苗本為利民故當時指揮並取人户情願不得抑配自後因提舉官速要見功務求多散諷脅州縣廢格詔書名為情願其實抑配或舉縣勾集或排門抄劄亦有無賴子弟謾昧尊長錢不入家亦有他人冒名詐請莫知為誰及至追催皆歸本户朝廷深知其弊故悉罷提舉官不復立額考校訪聞人情安便昨於四月二十六日有敕令給常平錢斛限二月或正月只為人户欲借請者及時得用又令半留倉庫半出給者只為所給不得輒過此數至於取人户情願亦不得抑配一遵先朝本意慮恐州縣不曉朝廷本意將為朝廷復欲多散青苗錢榖廣收利息勾集抑配督責嚴急一如向日置提舉官時八月二日三省同奉聖旨令諸路提㸃刑獄司告示州縣並須候人户自執狀結保赴縣乞請常平錢榖之時方得勘㑹依條支給不得依前勾集抄劄強行抑配仍仰提㸃刑獄常切覺察如有官吏似此違法騷擾者即時取勘施行若提㸃刑獄不切覺察委轉運安撫司覺察聞奏仍先次施行者右臣伏見熙寧已來行青苗免役二法至今二十餘年法日益弊民日益貧刑日益煩盜日益熾田日益賤榖帛日益輕細數其害不可勝言者今廊廟大臣皆異時痛心疾首流涕太息欲已其法而不可得者況二聖恭已惟善是從免役之法已盡革去而青苗一事乃獨因舊稍加損益欲行紾臂徐徐月攘一雞之道如人服藥病日益增體日益羸飲食日益減而終不言此藥不可服但損其分劑變其湯使而服之可乎熙寧之法本不許抑配而其害至此今雖復禁其抑配其害故在也農民之家量入為出縮衣莭口雖貧亦足若令分外得錢則費用自廣何所不至況子弟欺謾父兄人户冒名詐請如詔書所云似此之類本非抑勒所致昔者州縣並行倉法而給納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無狀於給散之際必令酒務設鼓樂倡優或關撲賣酒牌子農民至有徒手而歸者但每散青苗即酒課暴增此臣所親見而為流涕者也二十年間因缺青苗至賣田宅雇妻女投水自縊者不可勝數朝廷忍復行之乎臣謂四月二十六日指揮以散及一半為額與熙寧之法初無小異而今月二日指揮猶許人戶情願請領未免於役法網民使快一時非理之用而不慮後日催納之患二者皆非良法相去無幾也今者已行常平糶糴之法惠民之外官亦稍利如此足矣何用二分之息以賈無窮之怨或云議者以為帑廪不足欲假此法以贍邊用臣不知此言虛實若果有之乃是小人之邪說不可不察昔漢宣帝世西羌反議者欲使民入榖邊郡以免罪蕭望之以為古者藏於民不足則取有餘則與西邊之役雖户賦口斂以贍其乏古之通議民不以為非豈可遂開利路以傷既成之化仁宗之世西師不解蓋十餘年不行青苗有何妨闕況二聖恭儉清心省事不求邊功數年之後帑廪自溢有何危急而以萬乘君父之尊負放債取利之謗錐刀之末所得幾何臣雖至愚深為朝廷惜之欲乞特降指揮青苗錢斛今後更不給散所有已請過錢斛候豐熟日分作五年十料隨二稅送納或乞聖慈念其纍嵗出息已多自第四等以下人户並與放免庶使農民自此息肩亦免後世有所譏議兼近日謫降吕惠卿告詞云首建青苗力行助役若不盡去其法必致姦臣有詞流傳四方所損不細門下侍郎司馬光論錢榖宜歸一疏曰臣切以洪範八政食貨為先故古者國用必使冢宰制之祖宗之制天下錢榖自常平倉𨽻司農寺外其餘皆總於三司一文一勺以上悉申帳籍非條例有㝎數者不敢擅支故能知其大數量入為出詳度利害變通法度分畫移用取彼有餘濟此不足指揮百司轉運使諸州如臂使指朝廷常選健吏精於理財者為三司官如陳恕林特李參之類皆稱職有名者也其餘非通曉錢榖者亦罕得叨居其任故能倉庫充溢用度有餘民不疲乏邦家乂安自改官制以來備置尚書省六曹二十四司及九寺三監各有職事將舊日三司所掌事務散在六曹及諸寺監應支用錢物五曹得以自專有司得符即時應副而户部不能制申發帳籍又不盡歸户部户部既不得總天下財賦無由盡知錢榖出內見在之數既不盡知何由量入為出又五曹及內外百官各具理財之法申奏施行户部不得一一關預無由盡究其間利害今之户部尚書舊三司使之任也而左曹𨽻尚書右曹不𨽻尚書天下之財分而為二視彼有餘視此不足不得移用天下皆國家之財而分張如此無專主之者誰為國家公共愛惜通融措置者乎譬人家有財必使一人專主管支用若使數人主之各務已分所有者多互相侵奪又人人得取而用之財有增益者乎故利權不一雖使天下財如江海亦恐有時而竭況民力及山澤所出有限劑乎此臣所以日夜為國家深憂者也今縱未能大有更張欲乞且令尚書兼領左右曹侍郎則分職而治其右曹所掌錢物尚書非奏請得旨不得擅支諸州錢榖金帛𨽻提舉常平倉司者每月亦須具帳申戶部六曹及寺監欲支用錢物皆須先關户部符下支撥不得一面奏乞直支應掌錢物諸司不見户部符不得應副其舊日三司所管錢榖財用事有散在五曹及諸寺監者並乞收歸户部若謂户部事多官少難以辦集即乞減户部冗末事務付閒曹比司兼領而通𨽻户部如此則利權歸一若更選用得人則天下之財庶幾可理矣監察御史上官均上奏曰臣聞財用出於一司則有無多少得以相通差繆攘盜得以稽察故財無妄出之費而國無不足之憂然後可以裕民之財力而仁澤被於天下矣周之太府掌九貢九賦九功之二受財貨之入所以待王之膳服賔客祭祀賜豫玩好之類皆總于太府嵗終㑹財賄之出入可謂財用出於一故有無多少得以相通差繆攘盜得以稽察而國無不足之憂自漢及唐其理財設官不若周之條理詳備其計入為出不若周之法制全密則上下鰓鰓然常以不給為患不亦宜乎先朝自新官制蓋有意合理財之局總於一司故以金部右曹案主行內藏受納寶貨資借拘催之事而奉宸內藏庫受納又𨽻太府寺然按其所領不過關報寶貨之所入為數若干其不足若干為之拘催嵗入之數而已至於支用多少不得以㑹計文籍舛繆不得以稽察嵗久朽腐不得以轉貿總領之者止中官數十人彼惟知謹扃鑰塗窗牖以為固密耳承平嵗久寶貨山積多不可校至於陳朽蠧敗謾不知省又安能鈎考其出入多少與夫所蓄之數哉臣切聞昨來內藏斥賣逺年縑帛每匹只二三百文夫自方郡之逺至內帑每縑之直須近二千餘斥賣之直止於十之一二此不貿貿易移用之弊矣夫不知理府庫之財而外求於民不知莭用之術而為多斂之計此有司之罪也臣以為宜因官制之意令户部太府寺於內藏諸庫得加檢察而轉貿其嵗久之貨幣則帑藏有盈羡之實而無棄敗之患國用足而民財裕矣監察御史陳次升上奏曰臣切以民財有限取之不可以過多邦賦有常用之不可以無莭熙寧以前上供錢物無額外之求州縣無非法之斂自後獻利之臣不原此意唯務刻削以為已功若減一事一件則據其所減色額責令轉運封樁上供别有增置合用之物又合自辦上供名件嵗益加多有司財用日惟不足既無家資之可助又無鄰粟之可貸必至多方以取於民非法之征其來乃自乎是且人主莫不有惻隱之心豈無愛民之意比年監司多以掊取相髙者蓋迫於嵗計不足其勢不得已而然也伏自陛下臨御以來輕徭役薄賦斂澄汰掊刻崇尚忠厚天下之人莫不咸被德澤歡欣鼓舞屬心內附拭目以觀太平之極致然而額外上供之數未除竊恐異日供應不辨官司則有失職之責茍欲避免侵漁之患復從而生未足以副陛下仁厚之德臣欲乞聖慈特降指揮勘㑹熙寧以來於舊上供額外創行封樁錢物並與放罷庶使官吏不至過有誅求而民無騷擾之害厯代名臣奏議卷二百六十九
