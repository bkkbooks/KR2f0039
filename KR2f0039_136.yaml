body:
  text: 歴代名臣奏議卷一百三十六明楊士奇等撰用人宋神宗熈寜元年翰林學士鄭獬論今世亦有房杜之才上奏曰臣比因賜對論及房喬杜如晦陛下問臣今世有此人否臣對以房杜者曠世無之茍所見未至則安知今世無有如房杜者哉臣退思陛下思得房杜用之此唐太宗之用心也而在陛下求之至與未至耳自古帝王何嘗求異世之士而用之當大業之際富貴乎廟堂之上者天下止知有宇文述虞世基而已又孰知有房杜也則房杜者乃隋室之棄士也及太宗龍躍乎太原於是二人者攀鱗而起左攜右挈遂定天下當是時天下灑然始知有房杜焉則今之處幽約甘藜糝者焉知其人不及房杜者耶顧陛下網之未宻搜之未至耳夫天下之士有材在己者思有為於世猶寒者之欲衣饑者之欲食其求用之心尤切於世主求賢之意而其迹無繇而至前或湮廢而不遂者可勝言哉惟有道之士以義自勝則雖老死於巖穴間無憾也至於雄傑之士則不然如其差跌則潛心世變幸有風埃之警遂躡而擾之故劉備久不跨馬而髀肉生見而流涕此其志豈斯須忘功業哉而欲漢室之不揺豈可得乎故世主必渠渠懇懇欲得賢而為我用者正為此也虚懷屈己以訪之髙爵厚禮以來之上之所好其下必有應者好之而未至不可遽曰今世無房杜髙宗思賢其精誠乃通乎夣寐於是得傅說焉此用心之顓也臣願陛下推此心繼之以不倦則必有如房杜者杖策而至矣言陋意拙惟陛下裁赦獬又論薦士及求直言䟽奏曰臣聞舉天下之事者不患乎知不及而常患乎力不足力不足則舉而不勝其勢必屈故知之而不能窮天下之理必任羣力而舉之茲所以汲汲而求賢也自陛下即位以來未聞卓然褒進一賢者天下之事猶如前日而欲起太平之治者難矣然陛下深拱九重固未能周知羣臣之能否夫天子所以寄耳目者公卿大夫也公卿大夫日與庶官接宜熟知其所為其下固有豪偉非常之士而未奮者臣願陛下降明詔俾按察官及兩制正刺史已上各許特薦文武官之有才能者舉如不實令御史劾奏請論以法如此則宜得實才陛下按其籍眡其所舉者衆則茲人必有過人者美官有缺因而次補之績效既明則又顯擢之不下席天下之賢能積於此矣臣又聞天下之事無窮雖堯舜之明而欲盡無窮之事臣知其必殆然卒所以能為堯舜者以其能兼聽無窮之言也事機出於彼羣言會於此雖至深至隠皆可羅列而陳於前矣傳曰舜好問其弗信己乎臣亦願陛下降明詔許中外臣僚草萊之士皆得上封事極言無諱陛下緫羣策而處之則明徹乎萬里之外矣豈惟得言哉又將以得士矣言如詣理或可賜對柔顔懌色以索其所蘊則天下之才何逃乎二者皆陛下基命之初急務也如可施用則乞付翰林草詔中書具為條約詔下之日必有畜才而待用者翹然而出矣敢冀陛下留意神宗時獬又論用材劄子曰臣以為今之急務莫急於得士士之材不材必試而后見臣觀陛下勞於求賢而疑於任使有兼采之名而無必用之實故天下治功未能興起者繇此乎夫求士必於其賢者其人茍賢矣進言曰某士可用也陛下乃以為未又參訪之他人他人以為非也則陛下沈豫往復終疑而不用也以疑心而欲覺天下士安得豪傑之徒犇走而盡力哉昔魏文公謂唐太宗曰貞觀之初賢者所舉即信而任之比來以衆賢舉而用以一人毁而棄不察其原而使讒佞得行也陸贄亦謂徳宗求才不如武后時非徒人薦士亦許自薦而徳宗賞鑒獨任難於公舉武后以易得人徳宗以精失士此皆世主疑於任人之弊也然而陛下不能遂用者豈聖意恐用非其才而招四方之指議乎故必審訪其真偽直須材而后試之如此則其擇愈詳其失愈遠矣何則人非美䏑安能飽衆人之口葢有愛憎忌疾者廁其間以仲尼之才將用於齊其勢易進也而晏子言遂逐之況幽昧一介之士欲求遇於天下之主其勢至甚難也而不知幾晏子攢頰而議是以天下士絶望於陛下而相與爭馳於大臣之門其志豈遂甘於背陛下哉蓋附陛下不如附大臣附陛下則不得用附大臣則得用其參據於要地者必多於陛下之所自擢其某人為某門下士可概而數也此陛下不能自信舉而棄之以資大臣之黨耳然而陛下用人而不精亦復何患乎天下之指議哉陛下之所持賞罰之柄者將焉用之昔之舜與鯀皆四岳之薦一為聖人一為凶人而堯且用之以四岳賢者也不用且恐失士及其試而績不成於是舜起而誅之是堯舜之進退豈不明白哉茍賢者進言曰其士可用陛下何不隨其所長而用之圖其新不計其素録其長不責其短兼收而並用之則天下豈有遺材如其有成績則賞而進之有敗事則罰斥之至於所舉陞黜亦如之不過數年其進而在上者必敦實材力之士其退而在下者必空踈躁妄之徒則又孰敢以虚名不材者以欺陛下哉獬又論責任有司劄子曰臣聞舉天下者繁治之則難周簡治之則易通此理然也凡天下一日有機事陛下必欲手挈而縷解之不亦難為力乎此陛下所以御朝至日旰或不暇食不避苦寒酷暑之淩薄曉夕不得休息而二府亦焦然相與駢聚而議其文牒之判字日不足則斂而歸諸私第至薄晚闔扉乃出至於繫安危之大計則又何暇賜清閑之對君臣從容講摩於都俞之間哉此其故是所以繁治之也是陛下未嘗明職分而以賞罰責下也故羣有司之事則取決二府二府之事則取決陛下如此則上愈勞而下愈不治大綱愈廢而小目愈繁從何而得優為之哉昔舜謂禹曰汝作司空平水土契為司徒敷五教臯陶作士五刑有服各任以職而舜無為若舜者可謂知為君哉唐太宗謂房喬曰公為僕射當助朕訪賢材比聞閱牒訟豈暇求人乎若太宗者真能責宰相哉臣以為天子者宜以安危大計責二府以庶事廢置責羣有司凡文治委之東府武治委之西府俾其定議以聞不得取決於上陛下畫可而行之行之而害天下則定議者受責羣有司之事不得取決二府據理以行行之而害於事則有司受責故上所治者彌簡而下所治者獨顓簡則易舉而明顓則不勞而通則萬事有所歸矣臣願陛下先詔二府凡事之叢冗不繫於利害者一切省之合歸於有司可顓而行也二府之事省則俾之顓慮以謀國慮之不精謀之不明行而害天下於是黜而去之提大柄以臨羣下此至要之術也則陛下可以髙拱乎巖廊之上以觀乎天下之治與萬民共承無疆之福豈不休哉熈寜元年左丞蒲宗孟上仕進抑塞書前夔州觀察判官蒲宗孟謹昧死百拜上書皇帝陛下臣聞聖人之持天下不幸而至於極弊大壞之際欲更變律令猶當以不可測之術不可知之權風動天下使天下安趨而樂從奔走而不知故未嘗倉卒亟暴為駭擾之法以逆人之欲拂人之情强人之所不喜違衆戾物以招怨取怒斂大憤起深憾而離天下之心也況不至於極弊大壞之際安可無故而為矯世動俗之事結怏怏不快於天下耶爰自邇時朝廷惡官多而吏道雜一切塞絶之如防㓂盜如捍讎敵如備狼虎惟患去之不盡而不患其有傷梗棘堤障其路苛文峻法離合其薦員增廣其年祀柅絶其遷升常恐其應條目而符格令合制度而契圈模以取一日之榮也自古厭士未有如今日之甚簡賤王官未有如今日之障也彰灼著明而鼔衣冠之怨未有如今日之暴也白衣下士至於吏部選人上及朝廷之所謂郎曹卿列無一人不被窒遏無一人不拂其所欲此皆前世好治之君孜孜降已貪求渇選賴而共與為理者而今日舉將去之不啻於屏丐人斥遣奴僕之易如之何使英偉自重之士竭謀盡慮為國家喜奮事功流風迹哉精才奇智之人素守㢘隅素謹徳行素重名節不忍捨簮紱而從負販有父母妻子之迫又不忍去而之山林持其不得已之心含恥强顔出入人上黾勉茍過此甚可歎向者大臣為法以節約進士經生之數舉天下而計之三年之間率多數十萬人而取三四百也又裁減任子之令朞歳而補者增為三歳三歳者增為再郊三丞告老之澤十八道使者遷任之寵例皆寢罷大較比舊每歳已有千餘人不占仕籍矣入仕之難既如此既仕之後又多為不可進之格以沮之故舉職官之令行而京官歳損者常百餘員朝廷猶以為未也召見引對之際又不用銓筦正律不循祖宗故事予奪無準出於臨時使天下有偶得偶失之歎惶惑驚擾以為不便而今年六月己未之詔又令天下通判之人率不得舉京官而轉運判官亦減其當舉之數士人何所恃而進也前無榮華以誘其心後無溫飽以足其衣食陛下尚欲責之治黎元養赤子不已踈乎不徒如此其甚者又有增年遷秩之法止郎限卿之令止郎而限卿是又何也堯舜已來未嘗有也古之爵禄王者所以厲世磨鈍而今之爵禄朝廷務以沮善而惰志豈聖人把持天下之術耶仕宦而有可止之時則人之為善有可止之心矣為善而可止則朝廷尚誰與共天下哉陛下豈不思入仕之人乎方今所貴而寵用者進士一科以進士言之使天下入仕者率三十而得仕四十而京官比及引年之日不過為陛下中行郎中耳然而其間幾何而至此其補奏而得仕誦書而入官者又豈人人四十而盡京官耶以此而較安在明為科條嚴設禁令止郎限卿以取萬載之譏乎此㝡清朝深失之議而治世無謂之法殆獻計者慮之不精求之不熟趨目前而忘遠圖思小利而不知無益逞一時之見動天下之心使怨府歸於朝廷釁根蟠於天下不足以懲弊革蠧秪以收憾而取怨矣腐儒小生不曉治體凡以謂天下之事皆當洗剔痛治然後可以置於太平遂陳快意之論恱耳之說以亂陛下視聽不知陛下新有大寳正當以至恩厚德結人而不宜為苛察拂戾之事駭擾天下也嗚呼最易得者天下之勢最難得者天下之心昔武王有亂臣十人同心同徳而周室以興紂有亂臣三千離心離德不能保天下夫人之心不可失也如此臣願陛下精意極慮不憚亟更而陳已之失喜進取惡擯棄人之常情也是以古之明王因其情之所喜順而誘之無不得其欲故知人之惡饑寒也與之禄使至於飽煖知人之惡貧賤也與之爵使至於富貴知人之惡擯棄也與之榮名使榮於進取惟其如是所以天下聰明才俊豪邁雄傑舉世不可屈服之人皆樂為之用喜為之盡力其故何耶是非有奇策異算蓋亦順其情而已今也舉違其情而欲與之共天下臣未見其可也願陛下勿為太過已甚之事廓然開其可進之路䟽其窒塞之源使轉運判官與列郡通判復得依舊舉官以誘州縣仕宦之心使郎無可止之期卿無可限之數以破清望官塞絶之歎使選人至於改官而資地應格者不奪於臨時以杜銓選惶惑之擾則天下榮望復在衣冠進路復通而仕宦復尊而朝廷復重矣治平之法減京官舉職官使京朝已上四年而磨勘持此之術行之十年仕途自清吏員自守何必巧為術以障之曲為防以蔽之乎百日之疾求一日以愈之必知不可而五六十年之弊乃欲盡去不已遽乎願陛下從容安意以待之倉卒亟暴恐非天下之福臣過計論事罪在不贖惟陛下裁赦臣宗孟昧死再拜二年右諫議大夫吕誨論王安石姦詐十事第二狀曰臣伏䝉宸慈差内臣李舜舉宣諭為言王安石事敢不上體聖意震恐無地況臣世受國恩家有忠範惟知死節以圖報効竊以我朝開基一百餘年四方無事前古未聞然太平之久事固有繫於聖慮者以是思之尤當謹於措置謀謨在於得人安危在所倚任圖任舊徳推廣恩信以至萬務講求利病在乎沈機黙運不當形迹因事制宜脩敝補廢上應天灾務以安靜乃今日之事也王安石者本以文章進豈意遽為輔弼惟逢迎陛下之意張皇一時之事祖宗法度首議變更天下利源皆欲揺動斥逐近侍盜弄威權傾危老臣欲速相位人情甚欝公議不容獨陛下未悟信任安石與之講求治道之要進退天下之士臣恐無益於盛時徒有累於知人陸象先曰天下本無事但庸人擾之賈誼曰天下大器也置之安處即安置之危處即危斯真廟堂之論可為保邦之術也臣伏望陛下深思社稷之重判别忠邪之人應天以篤實之誠置器審安危之地垂拱泰寜天下之福也安石進說少加澄省如臣者久居要職實無補報陛下不當奪生靈之資而益無用之臣雖聖度并容而公議不與敢偷安處以累公朝瀝懇而言惟祈鑒照監察御史裏行程灝乞留張載上疏曰臣伏聞差著作佐郎張載往明州推勘苖振公事竊謂載經術德義久為士人師法近侍之臣以其學行論薦故得召對䝉陛下親加延問屢形天奬中外翕然陛下崇髙儒學優禮賢俊為善之人孰不知勸今朝廷必欲䆒觀其學業詳試其器能則事固有繫教化之本源干政治之大體者儻使之講求議論則足以盡其所至夫推按詔一作訟獄非謂儒者之不當為臣今所論者朝廷待士之道爾蓋試之以治獄雖足以見其鈎深練覈之能攻摘斷撃之用止可試諸能吏非所以盡儒者之事業徒使四方之人謂朝廷以儒術賢業進人而以獄吏之事試之則抱道修潔之士益難自進矣於朝廷尊賢取士之體將有所失況苗振罪犯明白情狀已具得一公平幹敏之人便足了事伏乞朝廷别賜選差貴全事體謹具狀奏聞兼御史知雜事劉述乞留吕誨上奏曰臣伏覩罷御史中丞吕誨差知鄧州坐言事失實故也臣伏思本臺舊制御史所以許風聞言事者以事方萌芽未至形見及展轉詢採難以䆒知其詳能先時而言之則可以遏絶禍亂之原救藥事機之失其間固容有不審而於大體無甚害也今聞吕誨因言章辟光狂妄離間岐王以連及輔臣長短乃是誨盡忠於陛下以捄朝政之闕耳豈有他哉今遽然絀之士大夫相與驚歎甚為陛下惜此舉也陛下踐祚方三年已罷五中丞矣天下之人不知端末將謂陛下惡聞直言但欲人阿意順指耳豈惟汚損聖徳之不細實恐公忠之人由此解體奸邪之黨縁隙而進以白為黑以正為邪陛下覺悟而悔之已後時矣而況誨之為人公正峭直知無不為四方之士交口稱譽乃人之望也中司之任朝綱之所寄今乃轉為動揺自壞綱紀臣所未諭也臣愚伏望陛下察誨之無它矜誨之過小追還前詔俾復舊職上全國體下慰人望臣之至願也臣非不知斯言之入即取權臣之怒誠不忍孤陛下之任使耳臣不勝徬徨待罪之至神宗時王安石參知政事帝下詔專令中丞舉御史不限官髙卑趙抃爭之弗得劉述為吏部郎中上言舊制舉御史官須中行員外郎至太常博士資任須實歴通判又必翰林衆學士與本臺丞雜互舉蓋衆議僉舉則各務盡心不容有偏蔽私愛之患今專委中丞則愛憎在於一己若一一得人猶不至生事萬一非其人將受權臣屬託自立黨援不附己者得以中傷媒糵誣䧟其弊不一夫變更法度其事不輕止是參知政事二人同書劄子且宰相富弼暫謁告曾公亮已入朝臺官今不闕人何至急疾如此願收還前㫖俟弼出與公亮同議然後行之孫固知審刑院神宗問王安石可相否對曰安石文行甚髙處侍從獻納之職可矣宰相自有其度安石狷狹少容必欲求賢相吕公著司馬光韓維其人也凡四問皆以此對朱京擢監察御史時中丞及同僚多罷去京抗疏曰御史假之則重略之則輕今耳目之官屢進屢卻則言者不若靜黙為賢直者不若柔從為智偷安取容雖得此百數亦何益國耶起居舍人同知諫院范純仁奏乞詔還吕誨䟽曰臣竊見前御史中丞吕誨坐言事失實奪職降知鄧州縁誨賦性質直素秉忠義朝廷許其風聞言事誨亦得之不疑既有所聞遇事輙發論議雖有過當其情實可􅍭容又況陛下舉直錯枉遏惡揚善之時如誨之臣不宜謫去四方不知其罪無以奬勸正人伏望特回睿恩放罪詔還雖是已補中丞亦可别與職任留之左右實激忠良純仁又論孫永且令依舊知秦州狀曰臣前次上殿親承徳音以孫永守邊失策更且責其後效有以見聖心寛大使過責成深得秦繆公任孟明視之道矣今日却聞孫永降職移知和州以李師中代為秦帥臣竊以帥臣之職尤須久任方能諳熟邉事經緝逺略若因事屢更則不惟迎送勞人兼亦百事更變兵民之情不無煩擾兼臣舊與孫永李師中相識各粗知其性行孫永忠謹慎靜足可使之安守李師中實有材力急難可用然好進任術不能靖安其職若邊事稍寜必須躁動别圖進用如此則久長之效未必得如孫永欲乞且依前來聖訓孫永與降職且令依舊知秦州以責後效李師中且令在河東可徐觀其政績兼免移易勞人庶事煩擾純仁又論富弼䟽曰臣聞股肱惟人良臣惟聖則君之倚良臣猶人之須手足也手足不可舉則無以為人大臣不任事則無以為國故虞舜作歌戒其臣曰股肱喜哉元首起哉是股肱之臣喜於任用則元首之徳日以興起也陛下即位以來慎求輔相冢宰之位闕以逾年近得富弼委之大柄四方士民莫不鼓舞以謂聖主既得賢臣則徳澤日新太平可待而弼登用以來屢以舊疾謁告入則隨衆循舊不欲有為退則謝客杜門罕通人事雖陛下丁寜宣召而弼終未樂職竊以中書政事日有萬幾朝夕之間贊㐮是賴在陛下萬乘之尊尚以宗廟社稷之重惟日孜孜旰昃不暇而弼乃以養痾自便處之晏然臣逸君勞於義安忍或以謂陛下待弼恩禮雖厚而誠有所未至用弼雖重而任有所未專使弼不盡其才所以欝欝失職而迤邐求去也以臣思之竊謂不然且弼起自布衣仁宗擢為宰相先皇帝暨陛下倚為宿徳元老四方士民望弼為賢臣碩輔在弼報稱之義自應如何況陛下懼灾求治之時而弼位居冢席君臣之際不宜形跡當自任以天下之重盡陳其所欲為必曰方今何事可憂何人可任何利可興何弊可革何者為先務何者宜緩行然後審陛下用捨之意而弼之去就自明何必僶勉媕阿自為卷縮是非不欲明辨進退不敢顯言苐且移疾於家使人主厭於容養然後翻然決去方為善謀者哉臣必慮弼惑道家全神養氣之言徇曲士忘名忌滿之節不以天下之重易其愛身不以萬務之急妨其養性恤已則深於恤物憂疾則過於憂邦但能早退自全即為明哲之術殊聖人朝聞夕死之義而弼以為得此又弼之過計也且詩曰雖無老成人尚有典刑則是朝之老成過於典刑之重也易曰王臣蹇蹇匪躬之故則是人臣之分不以一身為恤也今弼若迤邐遂去則致陛下有不用老臣之迹弼亦有不能竭節匪躬之名不用老成則於聖徳有虧不能匪躬則於臣節無取則弼之處身致主兩皆失宜而望儀刑四方表率百辟難矣臣又自念弼與先臣素有契義在臣當有忠告之言而以待罪諌垣不敢私通書謁伏望聖慈將臣此奏宣示弼如臣妄詆大臣則乞重行貶責如以臣言為是則弼宜恐懼修省不可更如前日倚疾自便速當靖恭厥位同寅戮力竭致主安民之慮講興治補弊之術延訪多士採擇羣才上以副陛下倚毗下以副士民属望使虞舜之賡歌不獨見美於前世微臣不勝大願聞弼以足疾迎送有妨不見賓客則將何以詢訪事幾别識人材竊計弼雖在家養疾不過安坐靜室賓客既知弼有足疾必不責其迎送之禮若只坐與之語於弼有何所損亦乞聖慈宣諭此意純仁又論劉琦等不當責降第一狀曰臣今日忽聞詔令以臺官劉琦等言多失實事輒近名擅去官曹動喧朝聽等罪各落御史降充監當者聞命之際中外震驚葢人臣以率職為忠人君以納諌為美率職之臣獲罪則忠勤不勸納諫之風或闕則君徳有虧是以仁宗皇帝開廣言路優容諍臣執政不敢任情小人不能害政以致太平日久億兆歸心先皇帝容納直言未嘗變色是時吕誨等與臣為御史亦嘗擅納告身皆䝉慰諭封回自是誨等力求外補此陛下之所親見固為萬世之光陛下述事繼明思紹先烈而因二三執政不能以道事君教化或失其後先刑賞或乖於輕重中書藏其本末但致外議喧騰凡居言責之臣敢不即時論奏既許風聞言事即是過失得原而柄臣遂非捃摭其罪欲其畏避搐縮遇事不敢輒論雖於政府便安而陛下將何所賴且執政王安石以文學自負以議論得君專任已能不曉時事而又性頗率易輕信難回舉意發言自謂中理近以陛下切於求治安石不度己才欲求近功忘其舊學舍堯舜知人安民之道講五覇富國强兵之術尚法令則稱商鞅言財利則背孟軻鄙老成為因循之人棄公論為流俗之語異己者指為不肖合意者即謂賢能所以薦薛向為通才指吕誨為無用致陛下無從諫之美使時政有揠苖之憂臣常失望痛心故已屢有陳奏孟子曰不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也陛下有堯舜之資而安石議桑羊之術不恭甚矣四方百姓未安而安石欲使小人以擾之賊之甚矣加以曾公亮年髙不退廉節已虧且欲安石見容惟務雷同茍且舊則好拘文法今則一切依隨趙抃心知其非而詞辨不及安石凡事不能力捄徒聞退有後言此皆陛下大臣所為安得政令無失求諫尚恐不及何暇深責諍臣蓋以安石之心將欲果於興事所以深惡言者懲戒後來殊不知成湯罪已而興禹拜昌言曰聖周道既衰則有防川之蔽秦法雖暴而有敢怒之民陛下睿知聰明洞照古今豈可啓寵偏聽而失天下之心伏望陛下平氣虚懐深為國計將琦等責降告敕速賜追還安石不可久在中書必恐任性生事宜速解其機務或且置之經筵足以答中外之心弭未然之患如是則商湯改過之美可復見於今帝堯從欲之仁不獨稱於古臣不勝大願然臣久居諫列智慮不明不能救止未然遂致聖政有失雖陛下不憚改作而臣之職事已隳豈敢復在諌垣輒以居家待罪自今月十日更不供職伏乞重行貶竄以戒百官貼黄今後政府臣寮每欲主張親知但只先同議論後至簽敕之時别作回避則言者無由奏彈陛下豈可不察劉述方被勘劾恐執政陷以稽遲之罪劉述既見事有未安自當不敢行下本是盡心職事却䝉執政深怒況王安石舊作中書舍人糾察在京刑獄亦曾繳納詞頭不肯入謝今日不存忠恕以至於此亦乞陛下詳察第二狀曰臣昨日上言乞追還劉琦等責降誥敕臣已居家待罪以俟竄殛然有愛君之心尚冀一伸伏縁臺官為天子耳目將使警察百辟以防權倖之非今琦等一言柄臣便䝉落職監當若指君父之過則將何法以加之況自先皇帝已來人主未嘗自有過失皆因大臣舉措不謹玷累朝廷且君父既為人所玷累則忠臣孝子寜忍不言陛下不察其心更加貶竄不惟自摧耳目乃使忠孝莫伸方今多士盈庭大半趨附執政陛下更以法令驅之使畏大臣則其任性恣行何所不至陛下雖欲制馭必傷終始之恩所以人主雖當仰成執政而督察之任委之臺官俟有過愆則使彈擊下以使大臣知懼上以全君臣之恩此是從古以來馭臣之要道也陛下將臣此奏反覆䆒詳特與追還二人以正朝廷之失則臣死之日猶生之年熈寜三年直舍人院吕大防論御臣之要上奏曰臣伏見陛下求治之意可謂至矣四方孤遠卑賤之吏或一善可稱或一詞可録不問其秩之髙下皆傳召而見之燕閒從容盡其所蘊聖心退託猶以為未至又詔百官之在朝者各封上其所欲言而以次對於廷下自爾以來且將數年伏惟陛下觀天下之人才不為不多而閲天下之事理不為不衆矣然人才多則賢不肖並進而難知事理衆則可與不可雜至而易惑恭惟聖鑒之明固無遁照然區區之愚竊謂古今人主之臨涖動則皆稱御葢天下者車也羣臣者馬也法度者轡策也要在人主善御之而已御得其要則車安而馬習轡緩而策簡御失其要則車危而馬敝轡急而策煩人主之所以貴要者無他在此而已臣愚以謂御臣之要必先退纎柔而進樸直略言詞而責行實然後為得臣竊見近年被召見用之臣其善事固不少矣而以浮辯巧說而進者或有之臣竊原其理蓋有二途或以一切逢迎徼倖速進及考其成敗則不足經逺或援引古義以證已見不度宜適而謂今世可行者雖所以言者異而敗事蠧理其害則同此陛下不可不熟察也自古雖聖人在上未嘗不以巧言為戒者蓋美言之於人易眩而難察易聽而難行故雖堯舜在上亦以巧言令色為畏以靜言庸違為患以壬人讒說為憂況其下者哉以此論之故宜專進崇實忠良之士以奉成聖化雖言有拂戾行有簡直乍若不合者亦在陛下容養而成就之漢武帝愛司馬遷嚴助之才華而尊汲黯卜式唐太宗好許敬宗李義府之文章而信任王珪魏徵此明主之鑒有以區處之矣以陛下之文明致治將躋於二帝三王之盛而知人之辯必不在漢唐二主之後也知審官院蘇頌同李大臨等繳李定詞頭第一劄子曰臣等檢㑹熈寜三年七月六日奉聖㫖今後臺官有闕委御史中丞奏舉不拘官職髙下令兼權如所舉非其人令言事官覺察聞奏臣四月二十八日上殿面奉聖㫖將上件條貫赴舍人院商量草除李定官制者臣等尋將上件條貫赴院同共看詳蓋為從前臺官須得於太常博士以上中行員外郎以下奏舉稱職後來為朝行中難得資序相當之人故朝廷特開此制云不拘官制髙下者只是不限博士與中行員外郎耳即非謂選人亦許奏舉也所謂兼權者如舊官資序不相當三丞以下未可為監察故且令上權前行員外郎以上不可為侍御故令下兼詳此皆不為選人設也若不拘官職髙下并選人在其間則是秀州判官亦可以權裏行不必更改中允也以此言之選人不可超授臺官明矣至如程顥王子韶等並已先轉京官因中丞薦舉方䝉特遷中允上權監察今李定是初等職官資序若特與改官只合轉大理寺丞且選人特改京官已是優異若更授超朝籍處之憲臺恩命重疊陞擢非常先朝已來未有此比未知李定有何所長而可當此殊命也臣等所以喋喋有言不避斧鉞之誅者非他也但為愛惜朝廷之法制而遵守有司之職業耳且爵禄賞罰進退黜陟皆陛下得以專之無所不可者若事下有司則具有條制當官者須奉行而固執也大抵條例戒於妄開今日行之他日遂為故事若有司因循漸致隳紊誠恐倖門一開則仕途奔競之人皆有倖求希望不次之擢朝廷名器有限焉得人人而滿其意哉前世所以謹重爵賞不以假人雖有奇才異倫亦須試以職事俟有成效然後超擢者以此也兼臣等前來論列雖不具記上件條貫亦只指陳選人超授臺官為過當耳如宋敏求言去歳驟用京官而遷之今又以幕職官便陞朝著而峻處糾繩之地竊恐即循官制之舊未壓羣議臣大臨言秀州判官除授監察御史裏行不惟超越資序未壓羣言抑亦有乖國朝從來法制臣頌言去歳詔㫖專令中丞舉官雖不限資品猶以京秩薦授人所以無言者以前有詔令故也詳此與今來檢舉到不拘官職髙下條制亦不至違戾以此臣等所以須至再執守初議也臣等非不知再拒嚴㫖獲罪不輕但以意在盡公不敢自為反覆上誤朝廷耳所有臣大臨昨日當草薛昌朝除官制初亦疑慮未得允當既而思之昌朝雖非御史之薦朝廷特除縁是京官為有程顥王子韶近例所以不敢違拒非如李定選人之比也欲望聖慈更加詳察臣等惓惓之誠所有李定除官制臣等未敢具草第二劄子曰臣今月二十一日准中書劄子右諫議大夫知制誥宋敏求奏今月十九日當直中書刑房送到前秀州軍州事判官李定特除太子中允權監察御史裏行詞頭伏以御史之官國朝以來其任頗重去歳驟用京官而選之今又以幕職官便陞朝著而峻處糾繩之地臣恐弗循官制之舊而未厭羣議所有詞頭未敢具草奉御批速送别官命草臣伏以國朝近制進補臺官皆詔御史中丞知雜與翰林學士更互於太常博士以上中行員外郎以下曾任通判官中奏舉充三院其未歴通判者即須特㫖方許薦為裏行儻非其人或至連坐所以慎重臺閣之選也去歳詔㫖專令中丞舉官雖不限資品猶以京秩薦授縁已有前詔故人無間言今定自支郡幕職官入居朝廷糾繩之任超越資序近歳未有臣恐有違官法無益治朝敏求所以惓惓而進言者納忠而舉職也議者或曰唐世自諸侯幕府入登臺省者多矣而定之此除豈為過耶臣以謂不然在唐方鎮盛時有奏辟郎官御史以充幕府者由此幕府連茹增重祖宗深鑒此弊一切釐改州郡僚佐皆從朝廷補授大臣出鎮或許辟官亦皆隨資注擬滿歳遷秩並循銓格非復如唐世之比而今之三院事任又重於昔時況定官未終更非時召對不由銓考擢授朝列不縁御史之薦直寘憲臺雖朝廷急於用才度越常格然隳紊法制必致人言所益者小所損者大再詳敏求前奏頗得允當所有李定除官制未敢具草第三劄子曰臣今月二十三日准中書劄子節文尚書工部郎中知制誥李大臨狀所有李定除官制内有未便奉聖㫖令蘓頌依前降指揮撰詞臣竊以官品有髙下職事有閒劇皆所以待才能之士擢授有資級保任有常法亦所以抑奔競之塗由古以來兹道不易祖宗之朝或有自起孤逺而登顯要者葢天下初定士或棄草萊而不用故不得不廣搜揚之路自真宗仁宗以來每有除授雖幽人異行亦不至超越資品葢承平之代事有紀律故不得不循用資品選授之法今朝廷清明俊乂並用進任臺閣動有成規而定以遠州幕官非有積累之資明白之効偶因召對一言稱㫖便授臺官政府既已奉行有司不能抗議使制命遂行四方聳聞仕進之間豈無觖望況今天下之廣英豪之衆他日或更有非常之人又過於此夤縁進見奏對稱㫖則復以何官處之寖漸不已誠恐髙官要職或可以岐路而致事有萬一不可不防臣所以區區建言者上以遵朝廷之法制下以盡有司之職業耳謹按六典中書舍人之職凡詔㫖制勅皆按典故而起草制勅既行有誤則奏而正之故前後舍人論列差除用典故而䝉改正者非一今三院御史須中丞學士薦舉朝臣乃典故也或不應此其敢無言去歳以京官除授所以無言者以前有詔令故也今若先立定制許於幕職官中選擢三院則臣等復有何言而敢違拒邪況定之此制前日敏求大臨洎臣皆知不應近制是以各有論奏今再被詔㫖若便奉行是臣故違官守自作二三上累聖明孰任其責竊謂威福之柄人主得以自專官守有責臣下得以固執若朝廷以定才實非常則當特與改官别授職任隨資超用無所不可不必棄越近制處之憲綱若臣上懼嚴誅靦顔起草誠慮門下封駮不肯放過縱門下不舉則言事之臣必須重有論列或定畏議固執不敢祗受是臣一廢職事而致論議互起煩瀆聖聽則臣之罪戾死有餘責所有李定除官制未敢具草第四劄子曰臣今月一日准中書劄子節文李定除太子中允監察御史裏行詞頭奉聖㫖劄與蘓頌所除李定係是特㫖不礙近條令疾速撰詞臣為詳自來本院凡有中書送到詞頭並是當制舍人奉行惟是當制日曾封還詞頭其詞頭再下若元封還之官却再當日即轉送以次官命詞昨日中書劄子送舍人院是臣當制所以獨具劄子奏陳今日輪當李大臨直日上件劄子合是本官奏行却專送臣處顯見不依得自來更直承受體例是同一職事而差使有異臣豈敢越次承受若云因臣論列除改不合條例便送臣處分縁上件論奏是與李大臨一狀同議事體不殊却不依常例送本院輪次承受其劄子已具狀繳納中書門下伏乞依自來體例施行去訖兼臣與李大臨等前後論列李定差除未得允當葢是遵守朝廷之法制奉行有司之職業初等職官超授朝列兼權御史不應近制所以未敢具草今來中書劄子稱係是特㫖除授不礙近降條制臣切謂若果出聖意拔擢即須是非常之人名聲顯聞於時然後可以厭服羣議為朝廷美事不然則進用之路自有階漸耳昔馬周為常何作奏條陳得失二十餘事皆當世切務唐太宗拔於布衣近世張知白上書言事論議卓越真宗皇帝拔於河陽職官此二臣者可謂有顯狀矣逢時遇主可謂非常矣然周猶召直門下省明年方用為御史裏行知白召對稱㫖亦命試舍人院然後授以正言非如定逺州職官素無聲稱偶因孫覺論薦一賜召對便䝉超授縱有竒謀碩畫亦未顯著於時豈足以上稱不次之擢但用其言不試以實天下才辨之士聞之皆思趨走勢要以希薦用此門一開未必為國家之福也故前代用人之法必加詳試俟見成效然後陞擢者亦所以防僥倖之路也今臣不避誅戮再貢瞽言者誠見陛下容受直言可不思獻納少冀裨補耶其李定特㫖除授欲望陛下早賜采納羣議或詢近臣若謂定之才果足以副陛下特㫖之擢則臣自當受妄言之罪萬一臣言不虛即乞再加詳酌或别授一官寘之京師俟他時見其實狀進用未晚如此不惟臣等職事得舉兼亦可以養成定之才資免貽異日之論議也臣不勝夙夜惓惓納忠之至然臣已是五次論列累拒詔命罪在不赦戰恐待罪不敢遑寜知制誥宋敏求繳李定詞頭上奏曰臣今月十九日當直中書刑房送到前秀州軍事判官李定特除太子中允權監察御史裏行詞頭伏以御史之官國朝以來其任頗重雖列属三院各有等差至於肅政外朝紀綱所寄號為清峻選擇葢均舊制須太常博士經兩任通判方許舉奏入臺蓋以歴任既深則更事益多朝廷之儀得以詳熟景祐初以資任難有相當者遂計奏舉博士以上通判未滿任者為御史裏行去歳驟用京官而遷之今又以幕職官便陞朝著而峻處糾繩之地臣竊恐弗循官制之舊而未厭羣議所有詞頭未敢具草知制誥李大臨繳李定詞頭奏曰臣以今月二十二日准中書劄子令看詳宋敏求蘇頌所奏委得公當伏以御史之職糾正内外自國朝故事每有員闕必用太常博士已上官然後補之仍須曾歴通判方許舉薦今李定秀州判官除監察御史裏行不惟超越資序未厭羣言抑亦有乖國朝從來法制敏求頌之所陳蓋亦有補於朝廷伏望早賜詳酌所有李定除官制未敢具草大臨又奏曰臣今月三日准中書劄子送下蘇頌繳納李定除太子中允監察御史裏行詞頭奉聖㫖所除李定出自特㫖並不礙近制令舍人院疾速撰詞輪次是臣當制切縁臣與蘇頌前後累次論列屢煩聖聽非不知狂率僭易罪當萬死然猶喋喋不已者無它也蓋以職在近列參贊書命詔勅未便理合奏論既有所懷豈敢緘黙竊以李定自初等職官超授御史不次遷擢舊例所無若云差除特自聖㫖不礙近制大凡朝廷爵賞之出稍有優異皆可謂之特㫖或事有未當豈可以特㫖之故而不許當官者以職事而論列耶以陛下之聖度聰明容納必無不許之理以此臣得以盡所懷而終言之且定自處仕塗未聞有卓然稱譽為時所推若謂之有經術行誼則召對數刻之間陛下豈能盡見其所蘊之深淺也若陛下以其辨論可取急於任用則遷之以一官可也徐觀其所為然後别加遷擢可也不當遽然置在憲臺駭動物聽於定未安於國體亦有所損故前頌之所論唐太宗用馬周先置門下省眀年方為御史裏行國朝用張知白亦先試於舍人院然後授以正言蓋為此也今定之除既未厭羣議若制命一出豈免門下之封駮臺諫之章疏耶臣當此時雖欲自劾請罪亦無及矣縱陛下容恕不加誅責然臣復何靣目以處陛下之左右耶以此須至先事建言儻䝉聽察不惟在臣職業粗得所守亦於朝廷萬分裨益臣不勝兢惶隕越待罪之至其李定除官制未敢具草伏望聖慈更賜詳酌神宗時校書郎晁補之奏舉趙元緖狀曰伏見本府居住朝奉郎新差監在京物料庫趙元緖父故太子少師致仕概在仁宗朝曾與韓琦曾公亮歐陽修同執政時仁宗初命英宗領宗正槩言宗正非所以為重乞立為皇子後預顧命定策立英宗嗣大寳功施社稷同時勲臣之子皆䝉次第褒擢多已通顯而槩之嗣子獨沈常調簮組之傳不絶如綫元緒刻意承家學問自立吏事足稱勘㑹知揚州蘇頌知應天府何正臣權京東轉運副使吕溫卿皆嘗論概之功薦元緖之才可備任使未䝉施行臣竊覩英宗在東宫答槩書云首定大策固已措時於久安世䝉顯休方當與國而長懋槩之有勲王室事固灼著其墳墓居第在宋歳時闕人照管伏望聖慈檢㑹前後臣僚奏乞特賜甄録其子元緖與一南京差遣庶以廣國家求舊念功之美意而勸臣子之為忠孝者監察御史陳師錫上奏曰臣聞堯舜禹稷之相遇其朝夕都俞勸戒不過於任賢勿貳去邪勿疑蓋為君之先務在此也夫知任賢矣而任之之意不專賢不可得而任矣知去邪矣而遲疑不斷雖有去邪之意邪亦不可得而去矣昔齊桓公問管仲曰吾欲酒腐於爵肉腐於俎得無害覇乎管仲曰此極非其善者然非害覇也任賢而使小人間之害覇也又曰郭何以亡管仲曰以其善善而惡惡桓公曰善善而惡惡何以亡管仲曰善善而不能用惡惡而不能去郭由是亡由此言之人君不得任賢去邪之道大不可以王小不可以覇守而不變將至於亡其能覇且王乎管仲且猶知此況不為管仲者乎宋興百五十餘載矣號稱太平享國長久遺民至今思之者莫如仁宗皇帝臣竊嘗考致治之本亦不過於開納直言善御羣臣賢必進邪必退自明道中初親覽萬幾見政事之多僻知輔佐之失職自宰相吕夷簡樞密使張耆參副夏竦陳堯佐范雍晏殊等一日皆罷去天下已服其英斷矣寳元之初地震冬雷用諫官韓琦之言而宰相王隨及同列陳堯佐盛度韓億石中立同時見黜嘗用夏竦為樞密使諫官歐陽修論其姦邪即日罷竦判河陽晏殊為宰相諫官蔡㐮言其不恤邊事廣置田宅即日出殊知潁州其後不次擢用杜衍范仲淹富弼韓琦以致慶歴嘉祐之治為本朝甚盛之時逺過漢唐幾有三代之風若仁宗牽於偏聽優柔不斷臺諫備位言不見用賢善不進朋姦不去則安能享四十二年太平之福乎臣願陛下逺思堯舜禹稷任賢去邪之道中采齊桓管仲善善惡惡之戒近法仁祖納諫御臣之意則太平之盛指日可見臣以疎逺樸陋誤䝉收擢敢竭所聞上裨萬一伏望陛下留神省察倘䝉加意豈獨一介小臣之幸實社稷生民之福也黄廉為監察御史裏行建言成天下之務莫急於人才願令兩制近臣及轉運使各得舉士詔各薦一人繼言寒逺下僚既得名聞於上願令中書審其能而表用則急才之詔不虛行於天下矣知杭州陳㐮薦吳師仁劄子曰新制已前嘗選請到本州進士吳師仁在學充教授體訪得本人履行淳正器識髙逺嘗肄業太學名聞縉紳應舉不第退歸田里甘貧守道專治誠明義理之學而不為異端之說自充教授以來夙夜孜孜誨誘不倦曾未數月學者翕然向風知所勸激使之久處必有成就人才美厚風俗伏望聖慈特賜收采令充本州州學教授熈寜中㐮為侍御史知雜事又論大臣皆以利進上奏曰臣竊聞已有制命除韓絳樞密副使兼參知政事絳以才望序遷固未為過然朝廷所以用絳之意似乎不厚矣陛下始用王安石參預大政首為興利之謀先與知樞宻院事陳升之同領制置三司條例司未幾升之用是遷為丞相而絳又領之曾不數月今又以絳參預政事則是中書選任大臣皆以利進自古致治之朝未有此事也書曰兹惟三公論道經邦燮理隂陽官不必備惟其人此輔相之任也大戊之興也則有伊陟臣扈格于上帝巫咸乂王家髙宗之興也則有甘盤𫝊說而商祀配天成王之立也則周公為師召公為保興作禮樂遂致太平之功不聞以利責之也唐憲宗剛明果斷能立事功以藩鎮漸平肆意侈欲程异皇甫鎛探知其㫖以誅剥財利說之故憲宗獨排物議而以异鎛為相裴度素所親信雖極言論列終亦不悟季年昏惑曾庸主之不若信乎利之蔽人也如此君人者之所任與其所好足以為戒矣今陛下執政之臣凡以利進者三人矣雖聖徳髙明不足以致惑亦不可以不謹也臣欲乞罷絳參知政事今後中書選任大臣必求道徳經術之賢以處之而不得以利進如陛下不欲追寢已行之命即乞將制置條例司與青苗補助之法只歸三司及責之守令相度施行庶不害於王政而足以全大臣之節矣㐮知諫院乞召還范純仁狀曰臣伏覩近降中書劄子内聖㫖就差知河中府兵部員外郎直集賢院范純仁充成都府路轉運使劄付御史臺者比聞御史中丞吕公著右正言知諫院孫覺皆有文字乞留純仁要劇差遣未䝉俞㫖純仁向以諫官言事議論有所不合於義難處懇求外官陛下深示矜容不獲已而與之善郡中外之論已惜其去謂無歳月之久必當召還供職今復使之遠適人情殊駭在陛下之意不過藉其風力安慰遠民然内外資望之臣可以當此一路者猶足選擇如純仁者忠義勁正乃陛下耳目之官嘗以言事被逐而志無所奪輕利信道不為茍且之計求之今日豈易得哉衆口一辭皆以為不當去伏望聖意早賜召歸要近以厭人望非特臣之私言也謹具狀奏聞㐮又依赦文舉陳烈狀曰准御史臺牒准熈寜十年九月七日勅奉聖㫖應内外官待制以上各於文臣内舉才行堪任陞擢官一員令中書審察如所舉不謬取㫖隨材用試即不得舉已係帶職及兩府自已親戚者臣伏見前授安州司戸參軍充國子監直講陳烈心仁氣剛才智卓越學聖人之言而必踐其行稽先王之法而必適於時博通羣經尤明於典禮之奥其為文章淵源浩博肆筆而成求之宿儒未有比者慶歴初嘗與鄉貢試於禮部罷歸田里無復仕進安貧力學積四十年著書數萬言未見其止仁宗朝嘗因近臣論薦及本部監司長吏髙其風節數以名聞累降召命以學官起之辭而不至世以為潔身獨行之士是非知烈者也烈之所學皆孔孟之志觀其事業足以有為自以身載聖賢之道不為茍進可以禮致而不可以利畜如斯而已矣伏思陛下享御以來博延髦雋得人之盛跨越百王如烈之賢不為難致欲望陛下特以禮命召至闕廷賜對清閒親降聖問使陳二帝三王之術六經四子之要與夫當世之務以著於篇必有以上稱陛下尊賢重德之舉今保舉堪充清要不次任使如䝉朝廷擢用後不如所舉臣甘坐面欺之罪謹具狀奏聞㐮又彈李南公除京西運判不當狀曰臣伏准中書劄子太常博士李南公已降勅命就差權發遣京西路轉運判官依舊提舉本路常平廣恵倉兼管勾農田水利差役事劄付御史臺者南公資力甚淺學術無聞雖小有才不足以驟加劇任近為制置司奏辟專以青苗之法為便迎合柄臣曽未赴官遽遷此命雖理權發遣資序其實與轉運使副事權均一使廉按一路所繫不輕非有資望之人豈宜越次輕授況青苗取利之法臣已累次論列乞行寢罷未䝉指揮今來更令轉運判官專領其事外持使者之權内與制置司相為響應足以公行率剥坐致餘贏在於愛民誠為未便所有南公轉運判官之命欲乞追還别與差遣試之以事如其的有顯効然後擢而任之庶使輕揚巧佞之人無由妄進仍乞以臣前後乞罷青苗劄子早賜降付中書裁決施行謹具狀奏聞㐮判尚書都省乞選擇縣令劄子曰臣備位銓衡膺㫖授之寄伏見吏員冗雜無所銓品非國家清源正本之道臣固未敢别有改更但以縣令一職最為親民之尤者上以宣導王澤下以阜安百姓茍非其人則百里䝉其害此固不得不慎擇也自仁宗天聖間舉之令制始行是時天下翕然以為良法雖窮荒至陋之邑皆號得人然臣觀之猶以為未至何則蓋天下之邑至多而被舉之員不足間以常調入令之人衮同差注故未能均得良吏也臣今相度欲乞應係選人知縣縣令處有闕並以奏舉人充仍詔諸路職司長吏今後奏舉縣令須是實有才行政術可以字民者即不得徇私妄有保薦親舊勢要不職之人如有繆舉專委御史臺覺察彈奏每至舉狀到銓委自判銓臣僚將逐人歴任内勞績及舉主人數並具手實校量銓次籍為上下二等仍令諸路轉運司勘㑹轄下州軍將所管逐縣户口多少公事繁簡亦為二等擇其素號繁難不治之邑及京朝官知縣久闕正官之處取係上等手實人以次授之其次等人即與以次縣分作兩等差注如奏舉員數不足即於常調合入令録資序人中選歴任内有京職官縣令舉主三人兊拆令狀與奏舉人一例入等差注如内有賢能之士偶然舉主未足不該入等者然其才術可當繁劇即委判銓同罪保舉入逐等差注每歳判銓二員所舉各不得過十二人其有素行乖越人品猥懦昏耄癃疾之人雖各入等亦委判銓體量降等與常調差注其奏舉入令人並乞與免見職司長吏廷參其資序仍次幕職官之下而在録事參軍之上如到任後政績有聞及舉主五人以上合該磨勘者候得替到銓日其任劇縣者即與截中次等縣者與先次引見如别無治迹及舉主不足自依常選人例施行稍或繆濫違闕不如舉狀者即坐所舉之人如此則天下邑無小大逺近及繁難不治之處舉皆得人偏逺之民咸被聖澤此實陛下安養元元之首務也如以臣言為可采伏乞降付銓司令臣與同判官商議合行條約未盡事件子細具析以聞歴代名臣奏議卷一百三十六
