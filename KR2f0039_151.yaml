body:
  text: 歴代名臣奏議卷一百五十一眀楊士奇等撰用人宋理宗淳祐中太常寺主簿髙斯得言大臣貴乎以道事君今乃獻替之義少而容悦之意多知恥之念輕而患失之心重内降當執奏則不待下殿而已行濫恩當裁抑則不從中覆而遽命嫉正而芘邪喜同而惡異任術而詭道樂媮而憚勞陛下虚心委寄所責者何事而其應乃爾時范鍾獨當國過失日章故斯得及之十二年斯得為秘書少監兼侍立修注進故事曰哀帝時鮑宣上疏曰今朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動衆心憂國如饑渴臣未見也厚外親小童及幸臣董賢等在公門省户下陛下欲與此共承天地安海内甚難夫官爵非陛下之官爵乃天下之官爵陛下取非其官官非其人而望天説民服豈不難哉宜急召故大司空何武師丹故丞相孔光故左將軍彭宣皆智謀威信可與建教化圖安危龔勝為司直郡國皆謹選舉可大委任也陛下前以小不忍退武等海内失望陛下尚能容亡功徳者甚衆曾不能忍武等耶順帝時李固上疏曰安國者以積賢為道陛下初登大位聘南陽樊英江夏黄瓊廬陵楊厚㑹稽賀純四海欣然歸服聖德厚等在職雖無奇卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然為時惜之一日朝㑹見諸侍中並皆年少無一宿儒大人可顧問者誠可歎息宜召還厚等以副羣望臣嘗觀舜之命官曰咨汝二十有二人欽哉惟時亮天功臯陶之陳謨亦曰無曠庶官天工人其代之夫人君代天理物朝廷之上庶官所治皆天事也其可一時之不亮一官之或曠哉然曠官有二無其人曠也非其人亦曠也舜之所命禹宅百揆棄后稷契作司徒臯陶作士垂共工益作虞伯夷典禮夔典樂龍作納言既不虚其位又皆當其才得人之盛卓冠千古嗚呼尚矣後世朝廷之官類多曠廢非果乏才也有而不能用耳哀帝時鮑宣言朝臣亡有大儒骨鯁白首耆艾魁壘之士論議冠古今喟然動衆心憂國如饑渴者至於使外親小童在公門省户下可謂曠官之甚也然何武師丹彭宣龔勝之倫蓋當時號為骨鯁耆艾者乃以排外家丁傅廢斥不用順帝時李固言朝㑹見諸侍中並皆年少無一宿儒大人可備顧問者亦可謂曠官之甚矣然樊英黄瓊楊厚賀純之徒蓋當時號為宿儒大人者乃以忤權臣梁冀病免而歸二君有才不用乃使不才者充位備數以妨賢俊其曠天工也甚矣雖然二漢之官非其人而曠也今日之病則不但非其人而又至於無其人焉尚書六員不置其一侍郎八員闕其五大小卿監十七員闕其九二府掾屬九員闕其六郎曹二十餘員闕其半謂天下果乏才耶則祖宗以来如慶歴元祐乾道淳熙之際人才輩出布滿朝廷皆取諸當世而足不借之於異代也何獨今日而無之乎采諸公論在外諸臣可備侍從卿監都曹郎吏之選者固有其人奈何正學直道與時落落謀人之國者觀望上意寧使朝廷空虚而不肯召用其負一世之望觝排小人不勝項背相望而去者視之亦不甚惜使鮑宣李固見之能不以何武師丹黄瓊楊厚梗棄為歎乎然而今日所甚病者又在於二相矛盾私意相持坐視朝廷曠官廢事歴歳踰時曾不知恤陛下亦未嘗少加訓敕使之留意於選任也舜臯陶以天工相戒固如是乎臣願陛下深詔大臣妙選時髦速補衆職之闕庶幾併志合謀共熙帝績不至取國空無人之誚天下幸甚淳祐間徐元杰進故事曰唐杜如晦傳如晦長於斷房𤣥齡善於謀兩人深相知故能同心濟謀以佐佑帝當時語良相必曰房杜云臣聞自古人臣莫難於遭時而得君尤莫難於同時而得君然同時得君矣或未能真切同心輔君以共治正恐天下之事不壊於專則壊於避其何以副天下之望哉故人臣非相得之難而相知之為難相知既深則相信而不疑不相知之深則相悦而莫克相濟心之同不同率以是基之昔者周公作誥於召公不悦之日周召似不深相知者然周公挽留之辭切召公終為之動是周公之所以知召公者如此召公其不知周公乎觀書如無逸如周官如立政如君奭諸篇凡其格君致治大畧可睹太宗以英眀之姿出而撥亂立極杜如晦為相而房𤣥齡同之天下新定臺閣制度憲章容典率二人討裁傳稱如晦長於斷𤣥齡善於謀必歎美之曰兩人深相知故能同心濟謀以佐佑帝終之以語良相者必曰房杜史氏可謂至論矣夫人臣辦天下之事者才也而所以能辦天下之事者心也𤣥齡如晦皆有講學之力河汾王通告𤣥齡以正主庇民之道必能遺其身而後能無私又斷之曰至公然後能以天下為心及稱如晦則曰若逢眀主於萬民其猶天乎至比之春生夏長秋斂冬成極於萬類咸宜百姓日用不知之驗異時二人得君以共治皆此心此學之推此史氏又稱之曰宰相所以代天者也輔贊彌縫而藏諸用使斯人由之而不知而進之於古眀哲之域向非二臣充其無私猶天之心寧免屑屑於形迹之粗拘拘於肝鬲之外雖已同患難而濟其治不思同安逸以慮其危計目前瑣細之利害而宗社生靈悠長之遠慮邈然不以是介心則何以維繫有唐三百年之天命而至於規模宏遠如是哉吁臣於是益歎𤣥齡如晦非同心濟謀之難而相知之深真可謂之難也夫以太宗天下新定之餘氣勢翕合股肱協同猶必一乃心力而後有濟今天下視唐為何如耶以臣觀之蓋同舟遇風之時也前乎制柁者非其人舟弊漏而日湊淺幸以聖主而得賢臣間關運動若將出淺而入洪矣而篙工棹卒叫呼未齊維楫失亡謾不之救渗漏四溢又弗之窒今焉兩分制柁之責坐舟中者皇皇然望其出手撐駕率衆工而謀共濟顧乃悠悠泛泛莫知所之脱有風濤之虞其不淪胥以敗者幾希𤣥齡如晦之事載在方筞視周召為庶幾蓋今日元臣宿望所素習聞者也相知夙深同心協濟臣敢以是為今日勉雖然𤣥齡如晦史臣稱之以良相宜矣自古君眀則臣良虞書之歌曰元首眀哉股肱良哉庶事康哉陛下眀侔日月燭臨羣工廼若命相之初宸奎寳畫寵錫道揆者曰開誠心布公道集衆思廣忠益所以責望股肱者至矣臣又於此益願陛下申飭此意日月以是警勸之矧今所最急者莫切於邊防國用之實政惟在乎蒐求實才各副任使課責實效上寛顧憂此二揆所當夙夜究心躋世于理可也然切念夫稍愆和豫者許寛調攝之期可宣勤勞者戒勿嫌疑之避惟國事之大者俾商畧共圖若常程除授期㑹調度之務許令二三執政相與隨宜而區處必也審量中外之人物參錯邊庭之事任凡已收召者用之必當其所尚多逸遺者汲汲聘用而無疑庶不至坐失事幾付歳月於虚擲少俟右揆體力康平之餘諭其疇昔相知之深勉其心德協同之報豈非宗社生靈之幸歟不然以儒者之道反無益於人之國家豈但為世俗竊笑而已哉臣興言及此不覺涕零天地鬼神昭布森列不可誣也惟陛下以是宣諭二三大臣使之同秉至公血誠之心以作羣工以覈庶政興滯補弊責實勸功今何如時不可緩矣易曰納約自牖臣恃聖德之眀敢因條奏故事而冒陳之惟陛下矜赦元杰應詔薦士上奏曰恭準聖㫖指揮自侍從至郎官各薦舉淳實敏眀堪充内外職事官者臣猥以疎庸綴陳邇列寂無報稱常切淩兢每惟内外之修攘莫重賢能之任使朝思夕念所以懇懇切切告之廟朝者初不敢厭其數凡舉世公論所推予之彦亦既莫不屢瀆天聽矣惟是才業之著于州縣者未悉以上聞氣節之著於卑官者又限於資格今即臣平日察知之深如京官如選人各以五貝為眀時薦臣謹第其人品細書其銜位姓名作四項條奏如左一臣伏見承議郎新通判邵武軍陳義和奮由學校見謂典刑頃分教泉南部使者陳韡欲以京剡上義和辭曰愚年踰五十矣他人誰肯相繼薦舉謝不受諸司聞而異之不旬月而舉剡溢格作邑晉江㢘靖公恕士民歌之及倅鐔津嘗攝郡事一日必葺救荒有政殆不減青州所活民命之數堂有垂白之母家事率稟命而行母子俱賢道途翕稱之臣與為代方敬其人之孝㢘且剛介而不屈於權勢每事必就問之不謂當路風聞之訛遽使之去臣為之泣别焉今猶待昭武平分之次士論稱鬱久矣宣教郎前知信州玉山縣蔡薦積心苦學抗志前脩初尉建昌已有植立弓兵畏愛警捕㤀疲三載居官境内奠枕其丞衡陽佐理聲績具見於當路之所稱逮為八桂糾曹盡心刑獄一郡無寃民薦敭及格試令玉山勞心諄諄視民猶子一箠不以妄施至於戢姦鋤暴殊不以強禦而沮前後舉陛陟舉科目舉旌擢者率二十餘剡臣亦嘗備數薦之矣宣教郎新擬知福州古田縣事鄭偘有文藝而充以器識交名勝而博於見聞從容詞翰之間有古作者氣象其為鹽場官也措置規模吏卒為竦及兼僉幕剖決如流至今士民稱之逮居沿海制幕識慮精詳且有婉畫事之可否見必立決寧甘犯時之所忌不忍茍徇以病民契舊滿朝恬然不以希進為意臣謂此三人才識氣節宜甄録陞擢可以備異時風憲之選一臣伏見朝奉郎通判潭州軍州事趙崇栗才具疏通心事平實臣雖不識其人聞其政於宰鉛邑之時邑廩場兵八百人前後每困於月支之不及人户以預借為苦經理有道公私通融不煩文移㒺或不給蓋其為政有本末待士有禮遜謹庠序之教而興以孝弟凡士習科舉之業崇栗率以旬課考覈焉士民化之勤修文行而獄訟日以簡寡今倅長沙凡郡綱軍政之所係善贊帥長密商畧之帥亦傾心採納其善是以庶務關決墜舉曠修邦人歌别駕之功往来士夫類能言之宣教郎新知臨安府臨安縣王亞夫生長名門多識往行才學器識卓爾不凡初為㑹稽倉官考柅姦欺盡瘁稱職檄兼幕屬贊畫尤長帥府以部内多凋弊之邑一一試之攝宰亞夫以撫字之意行於催科之中所去見思旗幟遮道及為閩清令莫不舉偏補弊各適其宜邑多大家不阿不撓良善為之吐氣且其素以恬静自持不挾書不干進當路聞風而争舉之臣與之交嘗謂臣曰平心敬物世間事無不可為者臣以是尤敬之臣謂二人者才學實切於實用宜拔擢奨任以備他日都曹之選一臣伏見從事郎監行在省倉上界門趙希懻名父之子宗胄之賢自其為海鹽簿領時究心銷注曉夕㤀疲藹然有亷平之譽當路名賢知其局藴之宏深乞加旌擢者殆不容口今為省倉門官尤嚴於吏卒出入往来之禁檢柅欺弊密切究心薦舉及格蓋非有求而得者臣在都曹嘗欲薦之已為他人所先矣從政郎監行在編估局詹文杓孝行著於家庭賢譽藹於鄉井奮身庠序光價翕騰分教瑞陽文風為之丕變今為京局䟽導貨滯檢柅吏欺尤能以職業自見臣與同里知其平實無華雅有志向非矜眩騖外者之比臣以為是二人者可以備二令掌故採擇之需一臣伏見廸功郎特差監行在贍軍激賞庫葉采學有淵源文有氣骨平居雅有膽畧人多以後来陳韡期之由其婦翁李方子所得於晦庵朱熹之真傳故能服膺古訓而勿失今職居筦庫勉竭㤀勞捧檄僉畿多所及物時賢皆以亷勤公介稱之采方志於向上事業暇則手不釋卷異乎馳逐京塵者多矣廸功郎新建昌軍軍學教授盧鉞奮身庠序卓然以名節自持方其流俗頽波率先以天理民彛之不可亂者為之啟奏忠誠懇惻奮不顧身而一以國之安危存亾者晝夜慟哭臣與素昧近甫識之盖嘉其志敬其人汲汲然薦引之廸功郎新信州上饒縣主簿湯漢家學相先文價蚤定其所交遊者皆前輩老師宿儒也不惟著述具有法度至於操履亦有榘儀近世名賢率尊尚之或奬薦之奏名别頭大對天陛昌言無隱犯時忌而不顧其辭大畧謂上下相習於欺大欺則大得志小欺則小得志蓋箴切當時之膏肓今待次勾稽奉朝命主象山書院相與諸生日由乎博文約禮之地是雖未及乎民而所以及於士者亦不貲矣臣以為是三人者謂宜度越拘攣或陟之文學掌故或改畀以見次教官豐殖長養以待異時之顯用豈不足以壯國之精神臣生而愚戇一無他長惟有愛敬賢材不翅饑渴今所薦引劑量久之既已眀著其所長亦可知其績用況樸實亷敏萬口不誣如蒙聖慈擢用後或不如所薦臣甘重坐繆舉之罰劉克莊進故事曰杜衍為相尤抑絶僥倖凡内降與恩澤者一切不與每積至十數則封還之或詰責其人上謂歐陽修曰外人知杜衍封還内降耶吾居禁中每以杜衍不可告之而止者多於所封還也其助我多矣臣按内降非盛世事也詩咏后妃以無私謁為賢桑林禱旱以婦謁盛自責蓋自昔未嘗無是事但古先哲王理慾眀界限嚴能防其微杜其漸爾降及叔季非惟不能防杜又且開扃破鐍以導其来西園賣官斜封墨敕至今遺臭故諸葛亮有合宫府為一體之論唐人有不經鳯閣鸞臺何名為敕之歎我朝家法最善雖一熏籠之微必由朝廷出令列聖相承莫之有改其後老蔡用事患同列異議始請細札以行之初猶處分大事既而俯及細微後不勝多至使小臣楊球張補代書謂之東廊御筆汔成禍亂臣嘗竊論祖宗盛時内降絶少間出一二則有論列者有繳駁者有執奏者誨純仁等寧謫而不以濮議為是茂良必大寧去而不與兩知閣並立衍寧罷而不肯求容權倖之間此所以為極治之朝也臣采之輿言謂邇日蹊隧旁啓廟堂積輕中外除授間有不由大臣啓擬近臣薦進者顯仕率貴游之子專城多恩澤之侯畿郡調守上煩宸斷小臣改秩或出中批既累至公亦傷大體求者予者奉行者皆以為常不以為異遂使天下之人以誨純仁茂良必大之事責望有司以衍之事責望大臣以仁宗禁中之語責望眀主臣竊為陛下君臣惜之本朝名相多矣惟衍號為能卻内降者豈有他道㢤臣嘗考之其拜也在慶厯四年九月其免也在眀年正月當國僅三數月噫此衍之所以能直道而行乎臣故謂小臣能以去就為輕雖大事可論大臣能以去就為輕雖内降可執横恩可寢人主能以朝廷紀綱為重貴近干請為輕則堂陛尊而命令肅矣惟陛下留神權司封郎官許應龍論量材進故事曰太宗嘗語宰相曰統制諸夏自有道理内外官吏當量才任使如匠者創屋棟梁榱桷咸不可闕天下至廣不能獨理致治之道全在任人茍得其人何患不理孝宗御製用人論曰人君以任使百官為事百官則分職以治其事用得其宜則百職舉而庶事立用失其宜則百職廢而庶事隳蓋人才有能有不能固不可以一槩論也擇不厭精任不厭久小有以成小而天下無廢事大有以成大而天下無廢政如是則太平之基可立先王之治可追矣臣聞天下無不可為之事而患乎無可用之才何世不生才何才不資世臨政願治之主孰不以人才為急也然或資之以成功或任之而敗事其必有故矣蓋可用者用之則足以勝其任而無事之不集不可用者而輕用焉則舉措必乖其宜而何功之可成是以英眀之君不慮夫事功之難立而惟慮夫真才之難得兼收而博采詳觀而諦審必其人之果智也而後使之謀事果勇也而後使之禦敵持重者委之備邊塞通練者委之治軍賦綏御有方者委之弭盜賊劑量輕重各當其任以之圖事何向不濟請以漢宣帝之事眀之今觀其時膠東有流離之民潢池有弄兵之宼關東之漕運重費西羌之烽燧時警事緒膠轕若未易經理也然帝之所以處此者惟於人才之間切切乎可不可之辨任將則問其誰可擇守則令舉可用謀事則反覆詰難度其計之可必用者始從而聽信之則帝之所以用人者蓋考之詳而擇之精矣故賑饑則著勞来之效糴穀則省轉漕之費渤海之盜安之而自弭先零之衆緩之而自降理内禦外無不如意得人之效蓋可覩矣恭惟陛下以聰眀之資紹延洪業厲精思治側席求賢將欲内修外攘以措天下於泰山之安然疆埸之防尚費經畫垂亡之敵猶未掃除蠻獠雖欲降而招撫未定饑民雖稍蘇而瘡痍未瘳若是之𩔖所當深思而熟計然使無人以任其責則悠悠歳月曷覩成效無亦擇可用之才而使之畢力以圖功乎邊郡之舉將帥之薦或延訪於廟堂或奏辟於諸司其所以求才之意可謂至矣然知人之道自古所難闊論髙談者若善謀輕舉妄動者若敢為露才揚已者若多多而益辦視時遷就者若隨機而應變茍輕信而遽用之則非惟不足以圖事而反至於生事不特不能以成功而或至於喪功則必眀目而逹聦詳考而精擇以言進者則察其所行以質其言以名取者則攷之以實以驗其名以能舉者則試之以事以觀其能若然則毁譽不足以亂其真虛誕莫得以肆其欺奚患乎不得人哉雖然用人於閒暇之時與用人於緩急之際不可以一律拘也蓋當緩急之際擢之未峻則無以使之勸任之不專則無以責其成何者邊陲之地非内郡比況當多事之時人所憚往茍無髙爵重禄以誘之孰肯犯難而不辭閫外之寄所係甚重安危之機變於瞬息茍不假之以事權則動皆掣肘何以乗機而制變故擢之峻則感激思奮任之專則事權歸一夫如是以戰則克以守則固尚何外患之足慮哉然非精擇之於其始而徒曰峻擢之可以使人也而輕予之以不次之官豈無大言無實者得以竊吾之爵禄乎不知其才之果長可以責其後效而徒曰使功不如使過則敗衂之將其將奚用乎此尤所當察者惟陛下留神應龍又論用人進故事曰昔司馬光進言謂設官分職以待賢能大者道德器識以弼諧教化其次明察惠和以拊循州縣其次方畧勇果以捍禦外侮小者刑獄錢榖以供給役使豈可專取文藝之人欲理萬事耶然則四方之人雖於文藝或有所短而其所長有益扵國家之用者安可盡加棄斥使終身不仕耶又曰人各有所長或優於德而嗇於才或長於此而短於彼雖臯陶稷契尚各守一能況於中才安可求備故孔門以四科取士若專引知識則嫌於挾私難服衆心若止循資序則官匪其人何由致治乞朝廷設十科以舉士臣聞天下固有不一之才人主當無執一之見蓋人才之在天下若十指然小大長短雖若不齊而皆適於用兼收並蓄待用無遺則皆有以自見而天下無不舉之事茍用一而廢一則互相傾軋必有分朋植黨之弊昔臯陶謂翕受敷施九德咸事則俊乂在官可以撫五辰而凝庶績奈何後世之君不知出此文帝好清靜而豪傑之士難合武帝用才智而道德之士見遺宣帝尚刑名而儒學之士不用皆由所尚之偏故天下之才不能以盡用要之人主當與天同量栽培傾覆生育長養各隨其稟賦之自然而無容心於其間茍好惡之私先累於其中則人才髙下必不能隨宜器使而急於求進者必至迎合黨同而伐異俱欲求勝非惟不足以成事而清流濁流之患實基於此司馬光論任人欲取道德器識眀逹勇果刑獄錢榖者並用之而長於此短於彼者不可求備此乃官使人才之要術也嗟夫人才不同彼此異見其来非一日矣足一躡軍門視文士如仇讐首一戴儒冠輕武弁如草芥矯矯特立則以靜重為茍容處事詳審則以剛直為沽譽長於吏才則以明經術者為腐儒專於學問則以了官事者為俗吏少俊則以老成為遲鈍寛厚則以嚴明為苛刻各分黨與判乎其不相入也人主用才惟求以辦吾事濟吾治而已安可主一而廢一哉陛下建用皇極無黨無偏耆德者召之文學者用之吏事者任之或長於將畧或精於財計或以循良稱或以讜直名莫不擢用固無一毫好惡之私然求賢之詔屢下剡薦之牘交馳而人心多私罕以實應靖退不競者無由自逹单寒寡援者未免見遺臣願陛下開衆正而逹四聦使任薦舉者悉參公論舉能其官則錫以進賢之賞稱匪其人則加以謬舉之罰如此則真才實能皆為吾用而何事不立中興之烈可指日以冀耳惟陛下與大臣亟圖之應龍又進故事論久任曰英宗朝吳申言近年以来官吏數易王舉元自三司副使一年之中凡歴四使沈立自知滄州未及半年已更三任蘇寀累任皆不及一年哲宗朝上官均言太守以一郡為傳舍吏民以太守為使客送故迎新紛紛道路太守不暇整治其紀綱吏民豈有信服其政事耶臣以為奉行朝廷之法令而利澤天下者内則係百官長貳外則係監司郡守内外不得人則不足以稱職得人而屢易則不足以舉職職不舉則政事廢弛而下受其弊雖有才吏與不才者相去無幾朝廷雖有良法美意是為徒法而已臣謂久任而責成功此用人之良法也夫人才各有所長因其長而任之遲之以歳月則可以自見茍數遷數易則人無固志事多茍且況更代之際意向或有不同施設未免相反蒞事方新蠧弊不能盡知胥吏必生欺誕内外之治所以不能並舉者職此之由也今内而百司庶府不問人才之能否惟以職任為資歴理財未幾則又易而典禮眀刑未久則復使之典教一人之身無官不可為久而不遷則懐淹滯之歎如此則百事何由舉祗見其因循歳月耳外而監司太守或一歳而再遷或甫至而復易迎新送舊交錯於道人知吏之不久不率其政令吏知去之不遥不究其心力是以民瘼未蘇吏治不振其弊有不可勝言者矧邊陲之寄尤不容不久雖以三歳為期然邇日以来移彼易此殆無虚月縱有諳熟兵畧留意邊備之人然效未成而已去兵卒何由而閑習備守何由而堅固今多事之秋將欲興起治功其可不以久任為先乎内則量能而授官長於財計者則所遷者皆理財之職明於法理者則所擢者皆法理之任至於他官亦莫不然克稱其職則優加旌擢使之知勸不必遽易以強其所不能仕於外者因其有風采則使之持節因其有政事則付以典郡庶各盡其才以圖績效治最上聞則遷秩畀職以示甄别逮其既久則擢之以不次之職以酬其累歳之勞夫有功見知則説孰不勉勵以稱上意吁此非難轉移者特在乎堅守而不變耳雖然任人固不可不久而擇人尤不可不精茍非其人則癃老者必至廢職疎謬者必至誤事而貪黷苛刻者必至為無窮之害必詳考之於其初而後可以久任於其後此又澄源正本之論惟陛下與大臣亟圖之應龍又進故事論均内外曰昔大中祥符中張知白上言昔唐李嶠嘗云安人之方須擇郡守竊見朝廷重内官輕外任每除授牧伯皆避命致訴比遣外任多是貶累之人風俗不澄皆由於此望於臺閣妙選賢良分典大州共臻庶績淳熙間臣僚上言伏見今之士大夫以州縣為滯路以朝廷為徑途此内重外輕之所由致欲望聖慈鑒斯久弊特留宸慮均中外仕進之路凡郡邑之吏有治行名迹純實不欺無間疎逺不次擢用以風厲天下孰有不勸者乎臣謂重内輕外此吏治所以不振也夫人之情有功而見知則説非才而任事則必有瘝曠之虞今之持節把麾者多不安於外而慕於内内則遷擢之必速而爵位之易崇外則績效之雖彰而褒遷之未必及故因循茍且玩歳愒日而治效蔑聞況仕於内者或不愜物論致遭彈撃往往畀以外任夫仕於王朝職閒事簡尚不勝任乃使之分一郡一道之寄事叢如毛決不能理豈不為民之病乎茍於臺閣妙選賢良使之更迭以示重外之意復於監司郡守擇其有聲績者寘之朝列以示褒表至於廷紳之貶黜者則處以直館而不任以民事夫碌碌亡庸者既不復用則有志事功者孰不黽勉以見知如是則吏稱其職而民安其業蓋有不難致者矣應龍又進故事論名實曰真宗時王旦有識畧善鎮定大事其於用人不以名譽必求其實茍賢且才矣必久其官衆以宜為某職然後遷之士雖咈於己者亦不以私廢仁宗朝司馬光言致治之道在於任官且謂奸計之臣衒奇以譁衆養交以市譽居官未久聲聞四逹朝廷或以衆言而賞之則虚偽者無不爭進矣其失在於國家采名不采實夫以名行賞則天下飾名以求功臣聞漢宣帝不審膠東相之偽是後俗吏多為虚名齊威王能察阿大夫之譽於是人人不敢飾非夫徇名而不責實此今之大弊也且邊陲未寧國論未定兵增而財愈匱惠䙝而威不振正當嚴綜核之政圖興起之功任人則必求其可用之實而雜偽以假真者所當辨論事則必求其可行之實而大言無當者所當察崇奬忠正抑遠虚浮行之以公守之以堅則分朋植黨妄相稱譽者莫得以肆其欺矯情飾貌急於媒進者不能以揜其跡如此則上下相安皆求以實自見而天下無不舉之事矣王旦謂用人必求其實而司馬光謂采名不采實則虚偽者無不爭進真至當之論也二公皆我朝之賢臣勱相國家以致昇平其大要不外乎此然則今日欲振起事功以復祖宗之盛可不以是為先歟夫名固國家之所當尚而士大夫之所當慕也恥沒世而名不稱君子以德名為幾名茍不立必同流合汙無復氣節為人上者不可不加砥礪然必因名以考其實因實以責其效則任人而必獲實才議事而必得實用茍外事表暴而中實無有更相標榜而實不副名蹈常襲故而不達時宜矯枉過正而徒欲立異施之於政則扞格而難行若是者是特虚名耳果何益於國家之大計㢤是必聽言而觀行使偽不得以亂真庶可收實才之用而立太平之基茍是非不審徒以其好名而一切厭之則其心未服異論迭起賢否混淆非惟不足以成事而清流濁流之患或兆于此是必審思之明辨之則衆正之路開羣枉之門塞濟濟布列無非真才庶績咸熙萬邦咸寧可指日以冀耳洪舜俞進故事曰眀道中執政除親舊二人為正言司諫上謂曰祖宗法臺諫官須出宸選若大臣自除則大臣過失無敢言者治平二年以范純仁為殿中侍御史吕大防為監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人為之至是闕兩員舉者未上内出純仁大防姓名而命之臣聞臺諫天子耳目之官耳以司吾之聦目以司吾之明而人執之可乎張行成無先容舉為殿中侍御史柳公權有諍臣風屈為諫議大夫萬乗親擢邇臣莫與夫如是則任耳目之寄者激昻振厲思稱主知周而無所比正而無所阿朝政之得失廟論之是非相業之修廢不吐不茹悉以上聞不至於懐私恩徇偏見以亂天下之公我朝祖宗法臺諫官須出宸選正以是也異時唐介論文彦博王陶彈韓琦以二輔臣之賢猶不為之少隱況下於文韓者乎雖然臺諫不由進擬固足攬馭臣之枋要必人主有至明之見而後能奮獨斷以聳衆望否則不謀之外廷謀之左右親䁥附下㒺上抑又甚矣大明在上邪正洞燭得范純仁吕公著而内出姓名得歐陽脩余靖王素而御筆親除斯無愧累朝之盛牟子才除起居舎人進對直前奏劄曰臣聞君子之於小人猶隂之於陽不能以相無而消長有常亦非人之所能損益也先儒以為聖人作易於其不能相無者既以健順仁義之屬眀之而無所偏主至於消長之際淑慝之分未嘗不致其扶陽抑隂之助蓋陽屬君子隂屬小人固不可相無亦不可相亂固不可相亂尤不可相暴泰之為卦内健而外順内陽而外隂内君子而外小人所以深致内外之辨使之界限一明不相淆亂君子得其位可進以有為小人得其欲雖退而無怨故聖人名之以泰泰之為言安也言君子小人各得其所而不相害乃所以為安也自古惟堯舜之時足以當之三代而下治亂靡常然不過由此二道用君子則去小人用小人則去君子未聞君子小人而參用者也用君子則治用小人則亂亦未聞君子小人參用而可以久安而無亂者也然則有天下國家而欲久安而無亂者必自辨君子小人始不眀君子小人之辨而冺其異同混其賢否而曰吾將以是為安也直幸而已矣非聖人所為致泰之道也臣抑嘗讀國朝元祐之事而竊有感焉夫元祐之所以為元祐者用君子而退小人也元祐之所以為紹聖則君子小人並用故也方元祐之四五年當時言者已澟然以邪正之不辨為憂朱光庭則謂用人之際當以善與利二者之間加眀察使正臣日進而邪臣永退范祖禹則謂憸人在前則害政事在下則害風俗大則傾覆邦家小則殘敗善𩔖不當使之在位為他日患蘇轍則謂君子小人勢如氷炭同處必爭一爭之後小人必勝君子必敗不可惑於浮議引與共事王巖叟則謂小人無能斯不足畏小人而材然後可畏當眀辨力遏毋使小人得以雜其間其言皆深切著眀反覆詳盡而於泰之一卦莫不援以為據蓋以為保泰之道在乎此而墮泰之道亦在乎此是豈私憂過計㢤使當時盡用其言絶禍萌敦治本雖百年元祐可也奈何調停之説雖賢如吕大防范純仁劉摰亦且惑之楊畏鄧温伯李清臣皆小人之雄而引之腹心俾得乗間抵巇隂唱邪説紹述之論起而君子不能以一日安其後黨錮禍成雖大防純仁摰亦皆不免報復之禍則調停之論蓋亦疎矣遂使國家當其禍敗至於宣靖之事不可勝悔而光庭祖禹轍巖叟之流獨受知言之名可不為痛哭流涕者㢤伏惟陛下臨政願治垂三十年宜可以為元祐矣而乃岌岌乎紹聖且宣靖宜可以為泰矣而乃駸駸乎為姤為遯陛下亦嘗思其故乎陛下未嘗不用君子而不純於用君子未嘗不去小人而不盡於去小人故其勢不免參而用之夫君子小人勢不兩立參而用之則是正邪相軋而使之日鬭於下豈有安靖之理哉陛下試觀三十年間君子小人幾進幾退幾僨幾起幾勝幾負相尋至今未有止極者皆以此也陛下見其如此不察其故以為是紛紜華競者皆君子之過也而小人又擠而陷之以為必去其𩔖而後可靖國則益誤矣故始於君子小人並用而卒至於君子日空小人日盛臣竊惟小人不去其害之大者有三焉累君德也害治體也敗善𩔖也敢為陛下悉言之小人性本巧惡又敢欺誣其狡獪之術足以逢迎而為悦其淫詖之辭足以譸張而為幻變黑為白指鹿為馬以之惑人主之視聼而亂其是非甚至借人主之喜怒以成其威福恥為正論而厚誣其君為不可以責難隂進邪謀則歸過於上以自逃於公論遂使謗議流聞聲光不著此則欺誣之説有累於君德也小人性本傾危又好反覆勢在彼則始趨而終背勢在此則始背而終趨閃倐游颺蹤跡詭秘巧險側媚情態乖張其狀似三變柔行巽入善為模稜軟語卑詞曲相容悦其狀似兩来操三變之心行兩来之術而視勢之所趨為向背此反覆之説有害於治體也小人性本刻薄又喜激發上惡譁競則曰是好名也是多言也上惡朋比則曰是某黨也是交結也上惡誕妄則曰是欺罔也是浮矯也駕虚翼偽造謗興訛其譛貝錦其言巧簧陽為納忠隂實激怒其術一售其勢遂成梟心虺志無所不為此激發之説有害於善𩔖者也此三害者千岐萬轍為變多端不懼上之悔患務行其言不恤國之憂危務伸其志不虞君子之困敗務遂其説為禍之烈如此而可使之一日參乎君子之間耶今通國之所謂小人者陛下亦知去之矣臣以為非去之之難而辨之之難去一小人是一小人也安知一小人之去無一小人之進辨之則幾矣夫君子小人如數一二如别蒼素辨之無難者是在陛下之心耳陛下如能致知格物以明此心賤貨貴德以一此心眀目達聦以廣此心使此心之體如衡之平如鑑之空既不失其好惡本然之真又有以得其是非當然之則所謂君子小人之情狀固無所逃乎陛下之前而陛下又即其賢否枉正之所在而為用舎進退之分焉柔邪巧佞阿意承㫖者必斥剛方鯁亮犯顔苦口者必容輕儇便給狡慧削刻者必遠而莊重靖嘉温純樸茂者必親出入多岐隂有所主者必屏忠信不二孤立無朋者必用去其庸猥卑雜而存其耿介挺特去其狠戾駔獪而任其宏毅惠和懲其躁競無恥而擢其靖退有守黜其隂黙深阻而取其疏明洞逹不以鄉愿而易狂狷不以嬖人而嫉莊士不以美疾而疏藥石則忠邪之位定而内外之限眀豈不能致元祐泰亨之治㢤今上而論思獻納多忠雋忠正之臣次而給舎臺諫皆端亮純實之士下而百司庶尹又能時發讜言於靖共正直之餘陛下宜鑑鏡其心勿以小人參乎其間而二三執政亦宜去係累之私昭平明之治融朋黨之意絶反覆之慮一以開誠心布公道之言而為進君子退小人之地思元祐諸老拳拳之憂鑒紹聖以往紛紛之事務使邪不暴正隂不勝陽以成泰内之治豈不韙歟不然實未有以知人才之孰忠孰邪而姑聽其一時之乍賢乍佞則臣謂用者不必用去者未嘗去而所謂安者乃禍亂之所伏也臣隠憂所發冒進瞽言不勝拳拳子才乞留察院徐經孫奏狀曰臣昨日忽聞察院徐經孫輕車出關不勝駭愕退竊自歎以為臺諫天子耳目之官既以耳目寄之凡所論列皆當聽行以求廣其耳目矧今人才日衰公論日壅陛下方欲扶持振起以幸惠世道而數月以来妄庸之流乃皆乗藉氣勢以抗天下之公議遇順以此去經孫復以此去通國籍籍皆謂以一不肖而去二臺官何陛下重於去一不肖而輕於壊祖宗三百年臺諫㢤臣且不知車載斗量世何乏斯人復何益於陛下而所以累陛下者如此也陛下髙見逺識超越古今而或者乃輒以妖邪庸鄙之論肆言君父之前而無所忌甚至以厭玩而矯誣夫謂其君不能者謂之賊此中外之所共切齒而彼方以議論不足聽流品不足别之言逆遏公論使天下無有復言其奸者是必有教之者也臺諫一言之而輒去則其計得而其勢張矣臣竊窺陛下聖明必不以其言為是而於紀綱之地亦必不忍摧抑阻遏使至此極也區區之愚惟望陛下主持公道存全事體詔追經孫復還言職亟屏邪説以厭輿論庶幾去留輕重之間不至有偏則或可救一二於末流也昔仁宗朝唐介以論文彦博逐已而彦博亦罷去元老大臣仁德之重而猶不免於兩罷陛下亦何愛於此㢤臣待罪兩制伏見未三月間兩逐言者非盛世美事不敢冺黙而無一言謹瀝愚忠上裨黈聦之萬一輕觸蕭斧惟陛下幸赦子才又繳黄蜕狀奏曰臣聞玉堂給札故事也祖宗盛時率以来天下之英才觀其論議以定一時之國是非細故也比奉詔㫖召試湯漢黄蜕二人臣待罪禁林偶當發筞私切惟念十數年所問之題或言度數或言古史或言錢榖之瑣屑或言禮樂之繁簡皆非當世要務輒不自揆撰述四條以静激順拂用舎得失為問而抑揚開闔不為枝辭意甚坦白其所闗皆當今國論大節目使答筞者隨問指陳固可以空臆盡言極論時弊而無所回撓諱護今觀臣蜕所對以借學經靖順之誤為執事大人之譏最切中今日之病與臣所問喜靜惡激喜順惡拂之語尤相發明至於論君子小人分數消長早晚講不當併為一國家紀綱不可廢其言皆是也惟是揄揚大姦一節用意包藏最咈天下之公議臣讀之至此口呿汗下為駭愕且蜕之言曰淳祐初元一相當國雖牢籠把握之人議其姦然擔當開拓得去毅然與人主論是非則於大臣身上事本不為過嗚呼信斯言也是杜富韓范其人也其抆拭大姦可謂至矣然嘗論之古之專任宰相者謂其能總攬庶務凝定國勢非使之牢籠把握以固權利也今大姦以挾數用術為刼制人主之具而人主不之覺以邪謀秘計為愚弄人主之資而人主不之悟彼之所以得罪天下者此爾而謂人議其姦可乎古所謂擔當開拓得去者謂其徳足以任重致逺量足以翕受敷施非謂小有才而無忌憚也今大姦不能捍禦外患而專假和議為買靜之鎡基而自謂有才不能開誠布公專任私意為謀國之張本而自謂有術彼之所以得罪於天下者此爾而謂擔當開拓得去可乎古所謂毅然敢與人主論是非者謂其能區處忠邪剖析義理也今大姦以信任羣小椓喪王國為是而廢棄忠賢一念則不以為非也以刻薄政事朘削元氣為是而封培忠厚一脉則深以為非也彼之所以得罪於天下者此爾而謂能與人主論是非可乎古之所謂大臣者謂其能以道事君不可則止也今大姦以功利之説富國強兵之資而勇於自利以權謀之術操制天下之本而巧於自謀公論已沸而不知退事勢已窮而復欲求彼之所以得罪於天下者此爾而謂能盡大臣之事可乎夫誤國之罪莫大於此彼以一身而㑹其惡此固陛下之所深惡而天下公論之所不容也陛下自甲辰改紀屏而斥之明示意向以弗復用十餘年間通國上下無敢齒之者而臣蜕乃輙犯不韙嘘久寒之灰而重然之蜕非病狂喪心臣不知其所以為言何也其不出於大姦之嗾使必出於一時之觀望彼大姦之心無一日不在鉅鹿下又重之以人物𦕈然之秋姦黨屬目之際一旦給札之士奮然推稱其才量以為可以當天下之大事此猶稱卓莽而譽盜跖固卓莽盜跖之所歡欣而鼔舞也萬一有怵其邪説或動宣室之思信其邪謀遂下追封之詔則天下之事去矣邇日以来外論閧然以為大姦復出此必大姦自謂嗾餌之説得行其徒譁然附之遂以為此言出公論之推許而陛下且將信而復用之也陛下荷祖宗之託所以為貽謀燕翼計者甚至決不忍輕怵其説舉天下而付之一擲然此論易於蠱惑若非陛下深長其思堅定其守則必為邪説所揺必為小人所亂其所關係甚大臣蜕副本初傳之日縉紳暨六館之士一詞憤之臣蜕懼人之議己也則亟更定元本改人議其姦一句為莫揜其姦改大臣身上事本不為過一句為反有非君子所可及者蜕之心跡至是益周章矣夫譽大姦而誤主聽其罪固不勝誅竄元本而欺天下其心尤不可恕然蜕尚敢於欺陛下何不敢於欺天下㢤臣行將告歸本不欲多言以重仇怨而縉紳六館之士往往咎臣以為不當無所可否存之以惑觀聽至危言切責以為黨姦臣竊觀蜕含糊於當世之事而果決於譽姦相之能誇詡擔當開拓之才以潛移上意覆䕶牢籠把握之罪而追仇議者公論在人自不可泯苐改本既出是非並行或恐外以逃公論之抵排而隂實為姦人之道地果如人言則臣罪大矣用敢冒昧陳其顛末庶陛下知大姦之不可用而邪論之不可信也昔髙宗皇帝謂輔臣曰試館職人當取實有文學議論若召試傋禮非祖宗取人之意近日三人試卷朕嘗親覽如沈長卿輩尚懐朋附又不實陳實事大哉王言真召試取人之良規也臣謂今日臣蜕之言即沈長卿尚懐朋附不指實事之意也欲望陛下以髙宗皇帝為法深察朋附之言堅定凝固寘大姦於度外則宗社幸甚厯代名臣奏議卷一百五十一
