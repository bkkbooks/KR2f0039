body:
  text: 歴代名臣奏議卷二百九十八明楊士竒等撰灾祥齊武帝始親政水旱不時車騎将軍竟陵王子良宻啟曰臣思水潦成患良田沃壤變為汙澤農政告祥因高肆務播植既周繼以旱虐黔庶呼嗟相視褫氣夫國資於民民資於食匪食匪民何以能政臣每一念此寝不便席本始中郡國大旱宣帝下詔除民租今聞所在逋餘尚多守宰嚴期兼夜課切新税力尚無從故調於何取給政當相驅為盜耳愚謂逋租宜皆原除少降停恩微紓民命自宋道無章王風陵替竊官假號駢門連室今左民所檢動以萬計漸漬之來非復始適一朝洗正理致沸騰小人之心㒺思前咎申之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或飢當加優養愚謂自可依源削除未宜便充猥役且部曹檢校誠存精宻令史好黠鮮不容情情既有私理或枉謬耳目有限羣狡無極變易是非居然可見詳而後取於事未遲明詔深矜獄圄恩文累墜今科網嚴重稱為峻察負罪離諐充積罕户暑時欝蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或由於此皇明載逺書軌未一縁淮帶江數州地耳以魏方漢猶一郡之譬以今比古復為逺矣何得不愛其民緩其政救其危存其命㢤湘區奥宻蠻宼熾彊如聞南師未能挫戮百姓齊民積年塗炭疽食侵滛邊虞方重交州夐絶一垂實惟荒服恃逺後賔固亦恒事自青德啟運欵關受職置之度外不足絓言今縣軍逺伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又縁道調兵以足軍力民丁烏合事乖習銳廣州積嵗無年越州兵糧素乏加以發借必致恇擾愚謂叔獻所請不宜聽從取亂侮亡更俟後㑹雖緩嵗月必有可禽之理差息發動費役之勞劉楷見申以助湘中威力既舉蟻宼自服後魏孝文帝太和二十年七月以久旱不雨輟膳三旦百寮詣闕引在中書省帝在崇虚樓遣舍人問曰朕知卿等至不獲相見卿何為而來揚州大中正王肅對曰伏承陛下輟膳已經三旦羣臣焦怖不敢自寧臣聞堯水湯旱自然之數須聖人以濟世不由聖以致災是以國儲九年以禦九年之變臣又聞至於八月不雨然後君不舉膳昨四郊之外已䝉滂㴻唯京城之内微為少澤蒸民未闕一餐陛下輟膳三日臣庶惶惶無復情地帝遣舍人答曰昔堯水湯旱頼聖人以濟民朕雖居羣黎之上道謝前王今日之旱無以救恤應待立秋克躬自咎但此月十日已來炎熱焦酷人物同悴而連雲蔽日髙風蕭條雖不食數朝猶自無感朕誠心未至之所致也肅曰臣聞聖人與凡同者五常異者神明昔姑射之神不食五榖臣常謂矯今見陛下始知其驗且陛下自輟膳以來若天全無應臣亦謂上天無知陛下無感一昨之前外有滂澤此有宻雲臣即謂天有知陛下有感矣復遣舍人答曰昨内外貴賤咸云四郊有雨朕恐此輩皆勉勸之辭三覆之慎必欲使信而有徴比當遣人往行若果雨也便命太官欣然進膳豈可以近郊之内而慷慨要天乎若其無也朕之無感安用朕身以擾民庶朕志確然死而後已是夜㴻雨大降宣武帝正始元年夏五月有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問太常卿崔光光表答曰臣謹按漢書五行志宣帝黄龍元年未央殿路軨中雌雞化為雄毛變而不鳴不将無距元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴将永光中有獻雄雞生角劉向以為雞者小畜主司時起居小臣執事為政之象也言小臣将乘君之威以害政事猶石顯也竟寧元年石顯伏辜此其效也靈帝光和元年南宫寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕邕對曰貎之不恭則有雞禍臣竊推之頭為元首人君之象也今雞一身已變未至於頭而上知之是将有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黄巾賊遂破壊四方疲於賦役民多叛者上不改政遂至天下大亂今之雞状雖與漢不同而其應頗相𩔖矣向邕並博逹之士考物驗事信而有證誠可畏也臣以邕言推之翅足衆多亦羣下相扇助之象雛而未大脚羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉凶明君覩之而懼乃能招福闇主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴關預政事殆亦前代君房之匹比者南境死亡千計白骨横野存有酷恨之痛歿為怨傷之魂義陽屯師盛夏未返荆蠻狡猾征人淹次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事羣生憔悴莫甚於今此亦賈誼哭歎谷永切諫之時司宼行戮君為之不舉陛下為民父母所宜矜恤國重戎戰用兵猶火内外怨弊易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聦明之鑒警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕宴宗或闕時應親肅郊廟延敬諸父檢訪四方務加休息爰發慈㫖撫賑貧瘼簡費山池減撤聲飲晝存政道夜以安身博采芻蕘進賢黜佞則兆庶幸甚妖弭慶進禎祥集矣帝覽之大恱光為撫軍将軍時又上奏曰去二十八日有物出於太極之西序勅以示臣臣按其形即荘子所謂蒸成菌者也又云朝菌不終晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣欝長非有根種柔脆之質凋殞速易不延旬月無擬斧斤又多生墟落穢溼之地罕起殿堂髙華之所今棟宇崇麗墻築工宻糞朽弗加沾濡不及而茲菌歘構厥状扶疎誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修德者咸致休慶所謂家利而恠先國興而妖豫是故桑榖拱庭太戊以昌雊雉集鼎武丁用熙自比䲭鵲巢於廟殿梟鵩鳴於宫寝菌生賔階軒坐之正準諸往記信可為誡且南西未静兵革不息郊甸之内大旱跨時民勞物悴莫此之甚承天子育者所宜矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之忻彊朝御之膳養方富之年保金玉之性則魏祚可以永隆皇夀等於山岳矣孝明帝正光二年崔光為司徒侍中時獲秃鶖鳥於宫内詔以示光光表曰䝉示所得大鳥此即詩所謂有鶖在梁解云秃鶖也貪惡之鳥野澤所育不應入殿庭昔魏氏黄初中有鵜鶘集於靈芝池文帝下詔以曹恭公逺君子近小人博求賢俊太尉華歆由此遜位而讓管寧者也臣聞野物入舍古人以為不善是以張臶惡鵀賈誼忌鵩鵜鶘蹔集而去前王猶為至誡況今親入宫禁為人所獲方被畜養晏然不以為懼準諸徃義信有殊矣且饕餮之禽必資魚肉菽麥稻粱時或餐啄一食之費容過斤鎰今春夏陽旱榖糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衛侯好鶴曹伯愛鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願逺師殷宗近法魏祖修德延賢消災集慶放無用之物委之川澤取樂琴書頥養神性帝覽之大悦孝武帝永熙中有風雹之變詔訪讜言瀛州刺史王椿上疏曰伏奉詔書以風雹厲威上動天睠訪讜辭於百辟詔輿誦於四海宸𠂻懇切偹在絲綸祇承兢感心焉靡庴伏惟陛下啟籙應期馭育萬物承綴旒之艱運纂纎絲之危緒忘餐日昃求衣未明俾上帝下臨愍兹荼蓼永濟溝壑而滄浪降戾作害中秋上帝照臨義不虚變竊惟風為號令皇天所以示威雹者氣激隂陽有所交爭殆行令殊節舒急失中之所致也昔澍雨千里實縁教祀之誠炎精三舍寧非善言之力譴不空發徴豈謬應誰謂盖髙實符人事伏願陛下留心曲覽垂神逺察禮賢登士博舉審官擢申滯怨振窮省役使夫滋水沒川之彦畢居朝右儀表丹青之位未或虚加圜土絶五毒之民揆日息千門之費巖巖廊署無不遇之士忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薰風之曲無論鴻鴈之歌豈不天人幸甚鬼神咸忭唐太宗貞觀六年帝謂侍臣曰朕比見衆議以祥瑞為美事頻有賀表如朕本心但使天下太平家給人足雖無祥瑞亦可比徳於堯舜若百姓不足夷狄内侵縱有芝草遍街衢鳯凰棲苑囿亦何異於桀紂常聞石勒時有羣吏燃連理木煮白雉肉喫豈得稱為明主邪又隋文帝深愛祥瑞遣秘書監王劭著衣冠在朝堂對考使焚香以讀皇隋感瑞經舊嘗見傳説此事實以為可笑夫為人君當須至公理天下以得萬國之歡心昔堯舜在上百姓敬之如天地愛之如父母動作興事人皆樂之發號施令人皆悦之此是大祥瑞也自此以後諸州所有祥瑞並不用申奏羣臣皆曰誠如聖㫖八年隴右山崩大蛇屢見山東及江淮多大水太宗問侍臣秘書監虞世南對曰春秋時梁山崩晉侯召伯宗而問焉對曰國主山川故山崩川竭君為之不舉樂降服乘縵而祝幣以禮焉梁山晉所主也晉侯從之故得無害漢文帝元年齊楚地二十九山同日崩大水出令羣國無來獻施惠於天下逺近歡洽亦不為災後漢靈帝時青蛇見御坐晉惠帝時大蛇長三百歩見齊地經市入朝中案蛇宜在草野而入市朝所以為怪耳今蛇見山澤盖深山大澤必有龍蛇亦不足怪又山東足雨雖則其常然隂潜過久恐有寃獄宜斷省繫囚庶或當天意且妖不勝德唯修德可以銷變太宗以為然因遣使者賑恤饑餒申理獄訟多所原宥時有彗星見於南方長六尺經百餘日乃滅太宗謂侍臣曰天見彗星由朕之不德政有虧失是何妖也世南對曰昔齊景公時有彗星見公問晏子晏子對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星為公誡耳景公懼而修德後十三日而星没陛下若德政不修雖麟鳯數見終是無益但使朝無闕政百姓安樂雖有災變何損於德願陛下勿以功髙古人而自矜大勿以太平漸久而自驕逸若能慎終如始彗星縱見未足為憂太宗曰吾之理國良無景公之過但朕年十八便為經綸王業北剪劉武周西平薛舉東擒竇建德王世充二十四而天下定二十九而居大位四夷降服海内乂安自謂古來英雄撥亂之主無見及者頗有自矜之意此吾之過也上天見變良為是乎秦始皇平六國隋煬帝富有四海既驕且逸一朝而敗吾亦何得自驕也言念於此不覺惕惕而震懼魏徴進曰臣聞自古帝王未有無災變者但能修德災變自消陛下因有天變遂能誡懼反覆思量深自剋責雖有此變必不為災也十一年大雨榖水溢衝洛城門入洛陽宫平地五尺毁宫寺十九所漂七百餘家太宗謂侍臣曰朕之不德皇天降災将由視聽弗明刑罰失度遂使隂陽舛謬雨水乖常矜物罪己載懐憂惕朕又何情獨甘滋味可令尚食斷肉進蔬食文武百官各上封事極言得失中書侍郎岑文本上封事曰臣聞開撥亂之業其功既難守已成之基其道不易故居安思危所以定其業也有始有卒所以崇其基也今雖億兆乂安邊隅寧謐既承䘮亂之後又接凋弊之餘户口減損尚多田疇墾闢猶少覆燾之恩著矣而瘡痍未復德教之風被矣而資産屢空是以古人譬之種樹年紀綿逺則枝葉扶疎若種之日淺根本未固雖壅之以黑壤暖之以春日一人揺之必致槁枯今日之百姓頗𩔖於此常加含養則日就滋息蹔有征役則随日凋耗凋耗既甚則人不聊生人不聊生則怨氣充塞怨氣充塞則離叛之心生矣故帝舜曰可愛非君可畏非民孔安國曰人以君為命故可愛君失道人叛之故可畏仲尼曰君猶舟也人猶水也水所以載舟亦所以覆舟是以古人云哲王雖休勿休日慎一日良為此也伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆為念明選舉慎罰賞進賢才退不肖聞過遽改從諫如流為善在於不疑出令期於必信頥神養性省畋獵之娱去奢從儉減工役之費務静方内而不求闢土載櫜弓矢而無忘武備凡此數者雖為國之常道陛下所常行臣之愚昧唯願陛下思而不怠則至道之美與三五比隆億載之祚随天地長久雖使桑榖為妖龍蛇作孽雉雊於鼎耳石言於晉地猶當轉禍為福變災為祥況雨水之患隂陽常理豈可謂天譴之而繫聖心哉臣聞古人有言農夫勞而君子養焉愚者言而知者擇焉輒陳狂瞽伏待斧鉞帝深納其言太宗時飛雉數集宫中帝問是何祥也禇遂良曰昔秦文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寳雞祠漢光武得其雄起南陽有四海陛下本封秦故雌雄並見以告明德帝恱曰人之立身不可以無學遂良所謂多識君子哉髙宗時晉州地震不息帝問侍中張行成對曰天陽也君象地隂也臣象君宜動臣宜静今静者顧動恐女謁用事大臣隂謀又諸王公主參承起居或伺間隙宜明設防閑且晉陛下本封應不虚發伏願深思以杜未萌帝然之時隕石十八于馮翊髙宗問曰此何祥也朕欲悔往修來以自戒若何太傅于志寧對曰春秋隕石于宋五内史過曰是隂陽之事非吉凶所生物固有自然非一繫人事雖然陛下無災而戒不害為福也武后延載元年以杜景佺為檢校鳯閣侍郎同鳯閣鸞臺平章事時后嘗季秋出棃華示宰相以為祥衆賀曰陛下德被草木故秋再華周家仁及行葦之比景佺獨曰隂陽不相奪倫瀆即為災故曰冬無愆陽夏無伏隂春無淒風秋無苦雨今草木黄落而木復華瀆隂陽也竊恐陛下布德施令有所虧紊臣位宰相助天治物治而不和臣之咎也頓首請罪后曰真宰相久視二年三月大雨雪鳯閣侍郎蘇味道等以為瑞率羣臣入賀監察御史王求禮譲曰宰相燮和隂陽而季春雨雪乃災也果以為瑞則冬月雷渠為瑞雷邪味道不從既賀者入求禮即厲言於朝曰今陽氣僨升而隂冰激射此天災也主荒臣佞寒暑失序邉隅不靖盜賊繁興正官少偽官多百司非賄不入使天有瑞何感而來哉羣臣震恐后為罷朝中宗神龍元年大水詔文武九品以上官直言極諫右衛騎曹參軍宋務光上書曰后王樂聞過㒺不興拒諫㒺不亂樂聞過則下情通下情通則政無缺此所以興也拒諫則羣議壅羣議壅則上孤立此所以亂也臣嘗觀天人相與之際有感必應其間甚宻是以教失於此變生於彼易曰天垂象見吉凶聖人象之竊見自夏以來水氣勃戾天下多罹其災洛水暴漲漂損百姓傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗自陛下御極郊廟山川不時薦見又水者隂𩔖臣妾之道氣盛則水泉溢頃虹蜺紛錯暑雨滯霪隂勝之沴也後廷近習或有離中饋之職以干外政願深思天變杜絶其萌又自春及夏牛多病死疫氣浸淫傳曰思之不睿時則有牛禍意者萬幾之事陛下未躬親乎晁錯曰五帝其臣不及則自親之今朝廷賢佐雖多然莫能仰陛下清光願勤思法宫凝就大化以萬方為念不以聲色為娱以百姓為憂不以犬馬為樂臣聞三五之君不能免淫亢顧備禦存乎人耳災興細微安之不怪及禍變已成駭而圖之猶水決治防病困求藥雖復僶俛尚何救㢤夫塞變應天實繁人事今霖雨即閉坊門豈一坊一市能感發天道㢤必不然矣故里人呼坊門為宰相謂能節宣風雨天工人代乃為虚設又數年以來公私乏竭户口減耗家無接新之儲國乏俟荒之蓄陛下近觀朝市則以為既庶且富試踐閭陌則百姓衣馬牛之衣食犬彘之食十室而九丁壮盡於邊塞孀孤轉於溝壑猛吏奮毒急政破資馬困斯佚人窮斯詐起為姦盜從而刑之良可歎也今人貧而奢不息法設而偽不止長吏貪冒選舉以私稼穡之人少商旅之人衆願坦然更化以身先之凋殘之後緩其力役久弊之極訓以敦龎十年之外生聚方足臣聞太子者君之貳國之本所以守噐承祧養民賛業願擇賢能早建儲副安社稷慰黎元姻戚之間謗議所集積疑成患憑寵生災愛之適以害之也如武三思等誠不宜任以機要國家利噐庸可久假於人秘書監鄭普思國子祭酒葉舜能挾小道淺術列朱紫取銀黄虧國經悖天道書曰制治於未亂保邦於未危此誠治亂安危之秋也願陛下逺佞人親有德乳保之母妃主之家以時接見無令媟黷景龍二年武平一上表曰臣縁修起居注太史監毎季有牒臣伏見從去嵗以來屢有災異熒惑入羽林太白再經天太陽虧月犯大角臣伏按舊史文志咸非休吉之感或為咎徴之兆臣聞災不妄生變不虚設象見於上人應於下其理昭彰有如影響陛下嗣膺鴻業寅畏上𤣥故皇天不言以災眚譴誡詩曰敬天之怒不敢驅馳又曰惟此文王小心翼翼昭事上帝聿懐多福臣伏見陛下孝愛因心敦崇戚族澤濡后氏恩洽外家位以慈周榮因惠假臣當宗親階越三等家有數侯既沗國姻復叨枝屬朱輪華轂金牓瑶簮過東漢之梁鄧邁西京之許史光輝焜煌古今所絶誠陛下荘於親寵降於慈貸臣未息譏謀深近囂黷恩彌崇而議彌積位逾厚而舋逾擁臣又聞月滿必虧日盈則蝕春秋有交謝之理星律有輪環之次時不再來榮難久藉昔永淳之後藩維搆孽王室多難先聖考運從權時居寳歴臣諸房等地惟宗子爵列扞城竊禄䟽封屢廻星紀今皇明復辟聖政惟新自合恭守園廬遥承雨露庇影椒房之末階親槐里之餘今乃再假寵靈驟貽奨渥姻從日茂爵封如初但見昇崇無聞損降髙班厚位遂超涯極以此或隂氣僭陽乾文告變且頃年以來河洛汎溢東都西京俱有水潦葢以隂氣太盛所致昔王家驕貴梅福上書竇氏專權丁鴻進諫臣伏思古來后妃之始自吕霍上官閻董之氏皆以恩寵過深驕盈過溢一朝傾覆竟無噍𩔖易曰不逺而復又曰鼎折足覆公餗伏願思抑損之宜運長逺之䇿或令安車就第剖符臨州逺之以機權錫之以閑逸上恭乾乾之惕下全親親之道則肅彰國圖殷鑒後葉臣舋招酷罰待斃苦壤聖心不弃窮穢備官史冊哀緒莫申餘隂無幾精魂屢竭昭恤末流如將有補明時不矜荒殆伏乞假名外郡遂禮私庭冀存識爽少訓靦冒臣瞻光視漏豈復支久既因災眚誠兼宗國俯揆殘骸退深殞越𤣥宗開元初大旱關中饑詔求直言禮部侍郎張廷珪上疏曰古有多難興國殷憂啟聖葢事危則志銳情苦則慮深故能轉禍為福也景龍先天間凶黨構亂陛下神武汛掃氛垢日月所燭無不濡澤明明上帝宜錫介福而頃隂陽愆候九榖失稔關輔尤劇臣思天意殆以陛下春秋鼎盛不崇朝有大功輕堯舜而不法思秦漢以自高故昭見咎異欲日慎一日永保太和是皇天於陛下睠顧深矣陛下得不奉若休㫖而寅畏㢤誠願約心削志考前王之書敦素樸之道登端士放佞人屏後宫減外廐場無蹴鞠之玩野絶從禽之樂促逺境罷縣戍矜惠惸獨蠲薄徭賦去滛巧捐珠璧不見可欲使心不亂或謂天戒不足畏而上帝馮怒風雨迷錯荒饉日甚則無以濟下矣或謂人窮不足恤而億兆攜離愁苦昏墊則無以奉上矣斯安危所繫禍福之原奈何不察今受命伊始華夷百姓清耳以聽刮目以視冀有聞見何遽孤其望哉開元四年山東大蝗民祭且拜坐視食苗不敢捕紫微令姚崇奏曰詩云秉彼蟊賊付畀炎火漢光武詔曰勉順時政勸督農桑去彼螟蜮以及蟊賊此除蝗誼也且蝗畏人易驅又田皆有主使自救其地必不憚勤請夜設火坎其旁且焚且瘞乃可盡古有討除不勝者特人不用命耳乃出御史為捕蝗使分道殺蝗汴州刺史倪若水上言除天災者當以德昔劉聦除蝗不克而害愈甚拒御史不應命崇移書誚之曰聦偽主德不勝祅今祅不勝德古者良守蝗避其境謂修德可免彼将無德致然乎今坐視食苗忍而不救因以無年刺史其謂何若水懼乃縱捕得蝗十四萬石時議者喧譁帝復以問崇對曰庸儒泥文不變事固有違經而合道反道而適權者昔魏世山東蝗小忍不除至人相食後奏有蝗草木皆盡牛馬至相噉毛今飛蝗所在充滿加復蕃息且河南河北家無宿藏一不獲則流離安危繫之且討蝗縱不能盡不愈於養以遺患乎帝然之宰相姚崇遣使分道捕蝗諫議大夫韓思復上言曰夾河州縣飛蝗所至苗輒盡今游食至洛使者徃來不敢顯言且天災流行庸可盡瘞望陛下悔過責躬損不急之務任至公之人持此誠實以答譴咎其驅蝗使一切宜罷𤣥宗然之五年帝将幸東都而太廟壊姚崇建言廟本苻堅故殿不宜罷行國子祭酒舒國公褚無量鄙其言以為不足聽乃上疏曰王者隂盛陽微則先祖見變今後宫非御幸者宜悉出之以應變異舉畯良撙奢靡輕賦慎刑納諫争察諂諛繼絶世則天人和㑹災異訖息帝是崇語車駕遂東七年日食帝素服俟變録囚多所貸遣賑䘏災患罷不急之務侍中宋璟曰陛下降德音卹人隠末宥輕繫惟流死不免此古所以慎赦也恐議者直以月蝕修刑日蝕修德或言分野之變冀有揣合臣以謂君子道長小人道銷止女謁放讒夫此所謂修德也囹圄不擾兵甲不瀆官不苛治軍不輕進此所謂修刑也陛下常以為念雖有虧蝕將轉而為福又何患乎且君子耻言浮於行願動天以誠無事空文帝嘉納十四年六月大風詔羣臣陳得失太子左庶子吳競上疏曰自春以來亢陽不雨乃六月戊午大風拔樹壊居人廬舍傳曰敬德不用厥災旱上下蔽隔庶位踰節隂侵於陽則旱災應又曰政悖德隠厥風發屋壊木風隂𩔖大臣之象恐陛下左右有姦臣擅權懐謀上之心臣聞百王之失皆由權移於下故曰人主與人權猶倒持太阿授之以柄夫天降災異欲人主感悟願深察天變杜絶其萌且陛下承天后和帝之亂府庫未充冗員尚繁户口流散法出多門賕謁大行趨競彌廣此弊未革實陛下庶政之闕也臣不勝惓惓願斥屏羣小不為慢游出不御之女減不急之馬明選舉慎刑罰杜僥倖存至公雖有旱風之變不足累聖德矣代宗時朱泚軍中猫䑕同乳表其瑞詔示宰相常衮衮率羣臣賀中書舍人崔祐甫獨曰可弔不可賀詔使問状對曰臣聞禮迎猫為其食田䑕以其為人去害雖細必録今猫受畜於人不能食䑕而反乳之無乃失其性耶猫職不修其應若曰法吏有不觸邪疆吏有不扞敵臣愚以為當命有司察貪吏戒邊候勤徼廵則猫能致功鼠不為害帝異其言德宗貞元十九年大旱中書舍人權德輿因陳闕政曰陛下齋心減膳閔惻元元告於宗廟禱諸天地一物可祈必致其禮一士有請必聽其言憂人之心可謂至已臣聞銷天災者修政術感人心者流惠澤和氣洽則祥應至矣畿甸之内大率赤地而無所望轉徙之人斃踣道路慮種麥時種不得下宜詔在所裁留經用以種貸民今兹租賦及宿逋逺貸一切蠲除脫不蠲除亦無可斂之理不如先事圖之則恩歸於上矣給事中許孟容亦因旱上疏曰陛下齋居損膳具牲玉走羣望而天意未答豈豐歉有定隂陽適然乎竊惟天人交感之際繫教令順民與否今户部錢非度支嵗計本備緩急若取一百萬緡代京兆一嵗賦則京圻無流亡振災為福又應省察流移征防當還未還役作崇錮當釋未釋負逋饋送當免免之沈滯鬰抑當伸伸之以順人奉天若是而神弗祐嵗弗稔未之聞也穆宗嘗問禮部尚書韋綬所以振災邀福者綬對曰宋景公以善言退法星三舍漢文除秘祝敕有司祭而不祈此二君皆受自至之福書美前史如失德以却災媚神以丐助神而有知且因以譴也時帝不德故託諷焉文宗太和六年大旱詔詢所以致雨者司門員外郎李中敏上言曰雨不時降夏陽驕愆苗欲槁枯陛下憂勤降德音俾下得盡言臣聞昔東海誤殺一孝婦大旱三年臣頃為御史臺推囚華封儒殺良家子三人陛下赦封儒死然三人者亦陛下赤子也神䇿士李秀殺平民法當死以禁衛刑止流宋申錫位宰相生平饋致一不受其道勁正姦人忌之陷不測之辜獄不參驗銜恨而沒天下士皆指目鄭注臣知數寃必列訴上帝天之降災殆有由然漢武帝國用空竭桑𢎞羊興筦榷之利然卜式請烹以致雨況申錫之枉天下知之何惜斬一注以快忠臣之䰟則天且雨矣帝不省懿宗時羅隠上疏曰嵗貢賤臣隠既以文不得意且抱犬馬之疾於長安夏五月京畿旱癸巳日聞詔大京兆用噐水鑪香蒲蕭絳幡輩致於坊市門将所以用舊法而召雨也臣踴起病榻間以為明天子憂人雖舜禹不如是之勤幸甚幸甚臣又聞水旱與天地同出茍時或然不可以倉卒除去今秦地旱已逾月矣而陛下禱祠亦已頻矣天之髙地之厚五嶽之綿亘四瀆之宏逺陛下命百執事啟祈外何嘗不以心祝之雖莖槁苖乾而百姓不怨嗟者其感陛下之誠深也今以蒲蕭輩為請者豈陛下謂其靈於嶽瀆者乎夫嶽瀆視陛下之公輔裂陛下之土田茍陛下憂則嶽瀆亦宜憂矣受祭據封者尚未能為陛下出力彼蒲蕭輩復何以動天臣為陛下不取也臣又聞天之有雨澤猶陛下有渥恩雨澤可以委曲干之則陛下渥恩亦可以委曲干之矣臣聞天子有左右史将所以記事記言然後付太史氏臣必恐其得以容易編牘今冒死請追癸巳日詔茍若陛下落十六聖之教訓雖五種栖野而百姓不暇掇豈蒲蕭輩之所及乎昔殷湯之代民不以旱為災仁聖之君在上也今旱未及殷代而陛下憂已過矣臣請因旱以賀萬姓俾其知陛下心蜀主王建時李安道上災異疏曰倉廪者國之本糧食者人之命固其本則邦寧重其命則人富今粒食中皆生蜂蠆切疑在位貪鄙奪民農時戕害人命故天生災異以為警告又蟲皆曵米而行恐邊鄙不寧干戈忽起饋挽相繼人不堪命伏願少精聖慮與大臣恐懼修省以消災異後漢隠帝時宫中大風發屋㧞木吹鄭門扉起十餘歩而落帝召司天監趙延義問以禳祈之術對曰臣之職在天文時日祈禳非所習也然王者欲弭災異莫如修德帝曰何謂修德對曰請讀貞觀政要而法之宋太宗雍熙六年右補闕知睦州田錫應詔論火災疏曰臣伏念臣才謀不迨於古人職次沗居於諫省敢不常思補報用答休明六年九月十三日詣閣上書昧死言事陛下於是下御札俾人直諫降勅書奨臣敢言七年十二月十二日又再上奏疏入逓而不知逹與未逹直言雖求用而不知行與未行今日陛下有所因方渇聞至言有所為方切待直諫引咎自戒修德彌新臣謂責在近臣而不在聖躬罪在臣輩而不在陛下日近陛下有朝令夕改之事由制敕所行時有未當而無人封駮者給事中之過也給事中若任得其人制敕若許之封駮則所下之敕無不當所行之事無不精事無不精則垂為典彛敕無不當則徧為格式豈有朝令夕改之弊豈有不精不當之虞也臣所以謂責在近臣而不在聖躬也臣又見陛下有捨近謀逺之事由言動所為未合至理而無人敢諫諍者是左右拾遺補闕之過也今遺補是侍從之臣而不得在左右職分當獻替之事而未有上封章自此國家舉事有不便於時遺補不敢諫朝廷法令有不合於道遺補不敢言加以時久昇平天下混一致陛下謂昇平自得資陛下以功業自多日遷月移浸成聖性左取右奉無非睿謀所以陛下出一言乃以謂湯武可偕陛下行一事乃以謂堯舜可繼自纉大位於今九年四方未寧萬國雖静然刑罰未甚措水旱未堪調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理方欲為民求福報天之功有事於太山展禮於上帝人謀雖克天意未從火於禁中将覺悟於英主詔下海内遂布告於輿人近臣聞陛下感悟之言寧不惕厲諫官閲陛下憂勤之詔誰不彷徨臣所以謂過在近臣不在聖躬罪在諫官不在陛下臣死罪死罪然臣兩度上疏而陛下不用一二今臣在外而陛下委之以分憂碌碌随衆憂曠瘝之靡暇皇皇有志思諫諍之未能今幸天啟聖心神賛皇運感陛下虚佇待犯顔之諫致陛下專精求逆耳之言臣是以再罄愚衷復伸鄙見臣所謂陛下有朝令夕改者試舉其一二以明之置而尋廢者農師禁而不嚴者車服也臣所謂陛下有捨近謀逺者試舉其一二以明之宰相不得用人而委員郎差遣近臣專受責而求令録封章也自此章奏必多聽用必廣聽用既廣則條制必繁條制既繁則依從者少既依從者少則是法令不行法令不行則由規畫不當有如前年勅下令鄰近州府互差司理判官至今年敕下却令本州仍舊差置又如前年敕下應征科官吏限前得了即與超陞限外未了即當降黜即不以縣有大小之分稅有難易之征土田沃瘠之不同嵗時豐稔之不等風俗勤惰之各異官吏能否之各殊而一槩以程限所拘一例以陛降為定自後未聞限外欠者降一官限前了者陞一人此無乃垂之空言示之寡信乞今後凡有所奏或有所陳幸陛下察而審之令大臣議而行之葢臣下言之則謂封章陛下行之則出為法令法令可簡而不可使繁制度可永而不可屢變變易不定是彰思慮之不精繁多難依是令手足之無措也尚書曰臨下以簡又曰得師者王今宰臣若賢願陛下信而用之宰臣非賢願陛下擇可用而任之何以置之為具臣而疑之若衆人也百官若舉其職願陛下聽而用之百官未稱其職願陛下量其才而用之何以置之為偹員而待之若冗秩也臣謂百職若舉則萬事從而自理百官未修則萬務從而亦隳必若任而疑之則上下非一心疑而用之則君臣非一體何則疑能生謗謗能生疑疑從謗生則父子之道或偶虧於慈孝謗因疑起則君臣之際或變成於怨尤魏文侯焚謗書陛下固當知之令狐楚有辨謗論陛下時宜覽之若然則保得臣下始終全得君上恩信方謂君為元首臣作股肱端拱二年錫知制誥論旱災疏曰臣今奉敕差在太一宫用青詞文設醮行祈雨者竊以時雨愆亢聖慮焦勞自秋渉冬諸寺及廟雖徧祠禱未彰感通以致陛下親降乗輿躬詣諸廟寺觀有以見仁主憂民之㫖聖人卹物之心雖災沴流行何代蔑有而帑廪儲積可備不虞然自今嵗以來天見星祅秋深雷震繼以旱暵之沴可虞饉饑之災此實隂陽失和調燮倒置上侵下之職而燭理未盡下知上之失而規過未能所以成兹咎證彰乎降鑒或天文示變或沴氣生祅昨陛下以天垂謫告之文御樓行赦德音朝發祅星夕消天不言而感報昭彰神幽賛而應答遄速今以粟麥未種甘雨未降人心不寧農望已失或聞小小宼盜聚散靡常嗷嗷蒸黎憂畏實甚愆陽既盭於寒沍厥疾乃生於癘疵民或流亡榖必翔貴尚賴陛下聖德宗廟慶靈蠢爾獯戎騷邊稍息惠然諸國底貢交修不然人心一揺盜計斯得何以静潢池弄兵之嘯聚何以禦代馬南牧之奔衝惟是秋冬久無雪雨此乃天意尚欲垂戒聖心諒亦深思豈刑繫之間尚未平允法令之設尚爾煩苛或力役未悉矜蠲或奢靡未盡撙節言路雖啟蹇諤者未必一一聽從王道雖行孤苦者未必人人受賜或刑賞過於常理或喜怒失於厥中嘉言納忠見破於横議任賢待下或難於至誠若然則雖旰食勞懐宵衣軫念孜孜萬務適足勞於聖躬翼翼小心尚未臻於至化今舉大畧上犯宸嚴禮曰王言如絲其出如綸書曰謹乃出令令出惟行今朝廷所言或異於是謀始稍虧於審謹令出無愧於改更以是知急速機務寧無錯行臣之愚衷豈敢逭於誅戮臣之遭遇安忍負於聖明是以因事上言庶禆萬一伏望陛下因此時旱更降詔書引咎責躬以答天戒進德覃慶以安民心蠲減征徭簡約科禁搜察淹滯登進才良猛士守方無使黜賢召怨朝臣典郡正宜選廉任能或旌别勤勞或省閲浮泛振廪通貨以救餓殍加估收儲以備闕乏蕃戎蹂踐之處士庶陥歿之家哀亡卹存憫其餘苦掩骼置奠慰彼沈寃閭里再命於復除孤寡量優其給賜儉約奉己以合禮謹静息民以安邊詳延忠鯁之臣詢究災祥之理弭災求理正在此時變沴致祥屬當今日若旱沴不已嵗歉相仍盜聚葦蒲伺隙而動敵乗饉塞幸災為虞是則國家之慮實深朝廷之憂非淺也太保兼侍中趙普上奏曰臣昨覩御批劄子云所謂彗星謫見引證古今莫知所措自旦及暮實不遑寧每以恤寡矜孤卿等應知朕意又云千思萬慮莫測其由者臣等伏捧指蹤同承聖㫖兢惶戰懼各不勝任其間老臣冣負深過三十年之重位但愧叨塵一千載之明君将何輔弼謬列三台之首慙無一日之長自知政術疎遺寧免祅星謫見撓至尊之懐抱皆臣下之作為都縁䝉蔽聦明隐藏苦疾被虐者無由披訴偷安者不敢指陳雖衆議以明知奈皇情而莫測隠蔽之咎惟臣冣多甘俟嚴誅仰期得罪今則人心頗欝上象仍差起狂夫思亂之謀生敵人犯邊之計天時人事不比尋常惟有今年倍須保䕶㐲審陛下初知妖異親諭德音便欲徧與覃恩優加賞賜發此一言之善須増萬福之祥全由惠物之心必有變災之望纔經旬朔似有改移竊聞司天臺内妄陳邪佞之言深惑聖明之德猥云妖異合滅契丹臣竊慮俱是諂諛未明真偽乞加詢問須見實情乞問司天臺内所有前件奏陳未委按何經典臣今将所按經典逐件進呈伏望陛下親賜看詳便知可否臣聞五星二十八宿至於五嶽四瀆皆居中國不在四夷而又尚書萬方有罪罪在朕躬豈可謂契丹封疆不屬萬方之數臣今老邁豈㑹隂陽惟将正理叅詳復以前書證驗三墳五典必可依憑今録到故事五件謹具分柝如後一按漢書天文志及諸書云嵗星辰見東方行疾則不見遲則變為祅星石氏云為欃槍為棓音棒又曰彗星者所謂掃星也其本𩔖星其末𩔖彗也小者數寸長者或竟尺彗状如箒亦為孛孛然或如紛絮形状雖異其殃一也皆是逆亂凶悖非常惡氣之所生也見則為兵為喪除舊布新之状不有大亂必有大兵天下合謀暗閉不明破軍流血死人如麻哭聲徧天下干戈並出四夷來侵餘災不盡為水旱飢疫凶惡之事不可具載又云凡關天象變異下方必災殃如人臟腑生疾必先形於面色象不虚發惟聖德可以消除一按左傳云齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不諂不貳其命若之何禳之且天之有彗以除穢也君無穢德又何禳焉若德之穢禳之無益詩曰惟此文王小心翼翼昭事上帝聿懐多福厥德不回以受方國君無違德方國将至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民将流亡祝史之為無能補也公説乃止其後齊國果有田氏簒奪之禍一按晉書天文志魏文帝黄初六年五月壬戌熒惑入太微又按蜀志先主傳明帝問黄權曰天下三分鼎立何地為正對曰當驗天文即可知也往者熒惑守心而魏文帝殂吳蜀無事此其驗也一按梁書武帝大通元年熒惑犯南斗武帝跣足下殿走以厭之是年後魏孝明帝殂武帝嘆曰索虜亦應天道一按唐書云高宗緫章元年四月有彗見於五車上避正殿減常膳令内外五品已上上封事及言得失許敬宗上言雖孛而光芒小此非國眚不足上勞聖慮請御正殿復常膳高宗不從敬宗又曰星孛而東北王師問罪此高麗将滅之證上曰我為萬國之主豈得推過於小蕃㢤二十日而星滅臣今撿尋故事聞逹宸聦抑将師古之文聊證順情之説伏望陛下勤求理道獨出前王雖然彗星呈祅自有皇天輔德臣所願者除舊布新之事專乞陛下親行變災為福之祥乃為陛下已有如此則商高宗之桑楮遂至中興周武王之資財須行大賚伏望陛下恭承天戒大慰物情明施曠蕩之恩更保延長之祚葢縁凡關世事否泰相随倚伏盈虚豈能常定聖朝開國已三十年國富兵强近古無比諸方僭偽並受驅除無一國不亡無一人敢敵可謂鞭撻宇宙震懾華夷若非聖徳神功何以當兹盛事又聞物忌太盛前聖不欲恣情今則垂象頻差兆民未泰争戰勞役寧有了期雖哲后修仁本意固無於虧闕而羣生造業随縁應有於感招倘時運以相逄於聖賢而不免堯水湯旱乃是明時臣又竊聞陛下自覩星文深勞帝念轉積動天之德思覃及物之恩則知多難興王但傳聞於往昔殷憂啟聖方式見於見今可謂何福不生何災不滅臣今更有誠懇思逹冕旒仍須面具敷陳不敢形於翰墨伏恨言詞蹇澁氣力衰羸歩履猶艱未任拜跪自從發動多有風涎如或一息不來便憂一詞難措以兹情抱惟有感傷乞於閑暇之時伏望略賜宣唤貴将微細皆具奏聞兼縁臣自知久負過愆因此合專陳首伏以臣謬将鄙陋虚受恩榮既不能致主安民又不能除姦殄宼叨據秉鈞之任忽招如彗之妖方抱恥於朝廷實難安於禄位伏見前代毎逄天變必先冊免三公今遇盛時乞行嚴憲明加黜責用激忠良真宗咸平二年京西轉運副使朱台符應詔論彗星旱災疏曰臣伏准詔令内外文武臣並直言極諌宻䟽以聞此乃陛下祗畏上穹憂勤庶政懼一物之失所俾下情之盡逹廣視逺聽求治深切之㫖也臣雖不佞奉明詔承德音有所藴蓄豈敢緘黙而不言乎臣聞皇天無親王者無私上下合符有如影響若王政缺於下則天譴見於上自然之理也切惟陛下受先帝之顧命膺兆民之樂推大孝彰聞小心畏謹動遵禮法不愆舊章所宜得天必獲嘉應而踐祚以來三年之内彗星一見時雨再愆者豈非凶醜未盡服政令未盡順天所以示兹警戒也夫災變之來必以𩔖應故彗星見者兵之象也時雨愆者澤未流也何以知其然今契丹未賔西𦍑作梗荆蠻有猖狂之宼江浙多飢饉之民慮其來犯邊陲變為賊盜蜂屯蟻聚之衆須使討平䑕竊狗偷之羣亦勞逮捕此彗星之所以見也陛下即位肆赦臨朝聽政覃恩而宥罪施惠而及物然未蠲免殘租許行㩁利山海之貨悉歸於上酒税之饒不流於下元元之民未盡䝉渥澤此時雨之所以愆也陛下宜深惟二者之所以然設備以禦之修政以厭之不然則事有可慮者琴瑟不調者必更絃而改張之聖朝享國四十年括地一萬里經啟非不久統御非不衆而治或未至政或有闕意者法術制度尚有可改而更張者乎臣雖不敏輙敢條奏其事陛下垂意而覽臣聞農者國之本也其利在粟多兵者國之命也其功在戰勝此二者存亡所繫也方今之患在農少而粟不多兵多而戰未勝農少則田或未墾兵多則用常不足故儲蓄空虚而聚斂煩急矣民財盡歸於國國用盡入於軍所以民困而國貧也夫周公之制用積九年此堯舜水旱而民所以無飢色也今郡國闕三月之粮貧民無終嵗之食稼不一熟則有飢死之民軍儲自贍不足何暇賑貸之乎且地方百里每畝取粟一斛嵗計得粟五百四十萬斛今甸服之内凡方百里者百所曽不能供足軍食而區區運粮於江淮間終嵗所得不過百里之出者由是而論有以見農政之不修也臣愚以謂陛下宜詔三事大臣輔相天地爕和隂陽使風雨弗迷水旱不作省徭役以寛其力勸游惰以増其衆男悉心於畎畝女盡力於蠶桑種必刈穫養必紡績不出數年自然家有餘食而人有兼衣賈誼有言曰積貯者天下之大命也茍粟多而財有餘何為而不成以攻則克以守則固以戰則勝懐敵附逺何招而不至今驅民而歸之農皆著於本土使天下各食其力末技游手之民轉而歸南畝則人樂其所矣此農政之修也國家養兵百萬士馬精强噐甲堅利可謂無敵於天下矣然自距馬失律以還夏廷逆命之後軍聲不震廟勝無聞一紀于兹䝉耻未雪何者将帥弗用命而委任不專也卒既驕惰而不習知邊事也有以見軍政之不修也夫将帥者王之爪牙登壇授鉞鑿門推轂閫外之事将軍裁之所以克敵而制勝也近代動相牽制不許便宜兵以竒勝而節制於陣圖事惟變適而指蹤以宣命勇敢無所施智謀無所用是以動而奔北也孫武曰不知軍之可以進而謂之進不知軍之可以退而謂之退是則糜軍此之謂也臣愚以謂疑則勿用用則勿疑謹擇其人專委其任有功者寵以爵位有罪者威以斧鉞明示刑賞斷在必行孰敢不用命哉古者井田之法兵則民也民則兵也出則戰入則耕人各自供官無所贍今農人不知戰戰士不知農離為二途絶不相用臣愚以為古制不可全取宜叅驗當今便利酌中而漸制之況江浙舊有義軍秦隴見屯强壮執柯取則其事可行以天下土地之饒士民之衆各于郡縣量置義軍本户略與復除嵗時少加賞賜動則就便召發静則任從營養陛下於王畿千里之内蓄兵十萬以制之天下孰敢動揺哉州縣本城随宜㝎額溢剰者不令招置老病者盡放歸休果行此道則天下之兵減大半矣縁邊人物氣禀崆峒便於弓馬勇於闘戰盖天性也措置之術如上所陳妙選有文武才畧之士為吏以統之仍以厚利召募願為正軍者随郡大小差厥數以備城守止於趙魏之間少屯王師以䇿其後亦足減戌卒之大半矣且耕且戰足食足兵削調斂之煩苛免飛輓之勞苦此軍政之修也臣愚以為不任人無以安邊不安邊無以省兵無以惜費不惜費無以寛民不寛民無以致治捨此數事雖有智者不能為陛下計之矣刺史縣令親民之官有民人焉有社稷焉盖三代之諸侯也故漢宣帝曰與我共治者其惟良二千石乎光武亦曰郎官上應列宿出宰百里茍非其人民受其弊誠重之也頃者不除刺史止以知州代之其差委也上自僕射尚書下至京官奉職率多輕受未盡當任權不足以威吏民禄不足以惠貧乏政皆茍且事出因循意者國家以刺史之官為武夫之任有支賜公使之費奏薦僧尼之例重難其事而不以授人乎孔子曰名不正則言不順言不順則事不成今文武登朝官諸司使副不啻千餘員代不乏才豈無循吏但未選任之耳臣愚以謂宜詔執事精練名實明揚俊賢各以檢校官出為刺史但不得支賜公使奏薦僧尼其縣令乃子男之任與民冣親切者也邇來除授率多冗徒諸司吏人分據大邑識暗則莫能燭理禄微則鮮克持廉州縣之職大抵相𩔖欲其盡誠以奉上極力於字民其可得乎臣愚以謂宜詔有位舉爾所知申命銓司惟才是擇諸司吏人不得處大縣不得為長吏凡牧宰者復俸户増其月入受空土為其職田俾其衣食足以卹家車服足以示衆專其任以勸效委其權以行事漸崇教導專務勸課毎嵗久用令文考課之法以户口増減墾田多少定其殿最而黜陟焉如是則人民受利矣簡易者事不黷節儉者財有餘今建置之過也官吏森羅於郡邑差命之煩也使者旁午於道路廪禄之費耗驛劵之供給何可勝數無名之賞賜不急之造作亦無限量土木窮其麗工巧極其滛他費百端動計千萬故兩税之外悉取山海之貨酒𣙜之饒而用猶不足也加以教化未甚明租賦未甚均刑獄未甚簡藩蘺之倚未甚固帷幄之謀未甚臧法有滋章之條吏無惻隠之實其餘背理傷道便文自營非為公家忠計者不可一二徧舉也陛下亟宜詔問大臣以當世之務如上所陳湯沐而櫛治之瞑眩而針砭之使百度正彛倫叙生靈泰社稷安上下協和章程明宻建皇極之道立太平之基陛下坐九重負斧扆南靣而聽斷端拱而無為垂子孫之貽謀光祖宗之大業豈不休哉臣愚以為當今之急莫若修兵農之政擇牧宰之官節軍國之用弛筦㩁之利稽古以行道随時而立法易權宜之制定久長之䇿陛下撫一統之運居萬方之尊號令必行禁止必舉兹數者易如反掌耳傳曰雖有鎡基不如待時雖有智慧不如乗勢今誠陛下立聖功之時興王道之勢矧陛下躬臨大寳已三年矣今之天下古之天下也今之人民古之人民也歴代陳跡簡册具存三王已前逺而難見魏晉而下陋不足數陛下自視當今事勢何如漢唐之盛時哉有土者不可以言貧有民者不可以言弱以陛下神聖聦明資之以天下之大而未能比隆於漢唐竊為陛下惜之伏惟陛下全王業之艱難握帝圖之宏逺誕布惟新之政博求無隠之言臣備位周行宣風外計管穴之見曷窺於髙明芻蕘之言願預於詢採臣又念御札云善者必加甄賞短者亦為優容臣不閑忌諱輒進狂瞽理誠短矣幸陛下優容之是年知黄州王禹偁上奏曰臣際㑹昌辰沗冒通籍況在分憂之任豈忘報禄之心凡有見聞皆合論奏然而言關災異事渉機宜茍非不諱之朝即恐犯時之忌今者不避逆耳用明匪躬仰冀聖恩稍寛死罪臣本州去年十一月城南長圻村兩虎夜闘一虎死食之殆半當時即欲宻奏便值鑾駕北征既非吉祥嬾聞行在臣但只隄防盜賊撫卹軍民而已又今年八月十三日十四日夜羣雞忽鳴至今時復夜鳴未止又十月十三日雷聲自西北起與盛夏無殊臣伏讀洪範五行傳及春秋災異史記天官書兩漢五行天文志等以此詳校虎者毛蟲屬金金失其性則有毛蟲之祅又云虎相食者其地當大饑雞者羽蟲屬火火失其性則有羽蟲之祅又云雞夜鳴主兵革昔人聞雞夜舞是矣雷者震也屬木木失其性則有冬雷之祅又云發雷之地饑饉此皆得於儒學不在禁書然事有數年而後應者亦有終不應者要在臣下無隠帝王盡知或修德以答天心或設備以防時難故詩曰敬天之怒不敢戲豫易曰觀乎天文以察時變只如咸平元年彗星出吕端等請臣作避位表臣具言星見虚危齊分請於青齊間設備以應天戒端等俱以為然不知自後作何措置臣縁不在司言之地不敢侵官去年敵兵犯邊果入齊地是天以文象告人人不自知備也端雖物故李沆以下皆見臣言今黄州有此災祥不能依前寝黙雖祅不勝德終無累於聖明而遇事敢言亦粗申於忠鯁今年禾小稔日下無虞然亦恐應在他時即合先有制置伏望陛下恕臣拙直察臣愚衷于淮甸之間防飢荒之事假令災祥不驗猶勝臨事無偹矣臣又念古之循吏政感神靈宋均猛虎渡江臣則有虎相食啗魯恭雉馴桑下臣則有羣雞夜鳴百里嵩甘雨随車臣則有冬雷暴作此皆臣化人無状布政失和合寘常刑亦當自劾又慮他人陳奏臣則有昧蔽之愆冒犯聖慈無任僭越六年侍御史知雜事田錫上奏曰臣伏覩去秋以來霖雨作沴近畿諸處水潦為災雖聞檢覆蠲免租税又聞相度低下開決溝渠雖憂恤之心似有所濟而利害之半莫知適從古者不奪農時慮妨營種或遇歉嵗即念困窮故有賑貸粮儲除放徭役免令凋瘵不至流亡今國家為少闕軍兵防備邊戌遂於曹單宋亳陳蔡汝頴之間㸃集鄉村揀選强壮得五七萬人訪聞始降宣命指揮只令在本城防守及至奏聞都數即並抽赴京師昨近臣何以商量如此失信令下民皆懐怨望豈得無詞況陛下常好讀書有儒臣時得侍講春秋謂君命無二又曰信不由中諒在聖聦盡逹微㫖豈有命令既宣於羣下而誠信不由於厥中若外國差人在京探事事無鉅細境外既必盡知知而圖謀邊上未得安静其所謀者謂古者以民為邦本食為民天今國家取丁壮為兵以失邦本以災傷去食寧有民天粮儲何止無餘邊備亦恐不濟以此得計以此乘時此外國所謀之小者也其所謀之大者以關西去年秋稼不登京東今嵗春種已失國家營救之不暇廟堂圖慮之未精欲以新集未慣之兵授非材無勇之将僥倖求勝輕敵寡謀此外國所謀之大者也加以自春以來多隂少晴毎遇朔風其來數日不定變陽春和平之令為邊塞動静之占臣不曉古書不知兵畧但以經史所言之事求災祥可見之證以愚意裁量望聖慈採納雖兵者凶噐不得已而用之民為邦本不得已而取之今五七萬人並離農畝日近更差使臣揀㸃豈無物議憂虞以災沴之餘宼盜若起適足為敵國之利有勞宵旰之懐撿災傷乃是虚名行賑貸且非實事斯乃今日之務冣急而非時之患可憂也臣謂非十年不足以聚蓄財貨非十年不足以生育黎元二十年間治之得其宜則無慮治之失其宜則有患非二十年尚未能蓄聚財貨生育黎元況臨事欲制置乎望陛下思今日之急務慮非時之所憂示信以結之善謀以成之若信不由中事出慮外必恐國家多難自今日始臣受先朝拔擢不敢不言臣受陛下指揮不敢不奏景德三年右正言京東轉運使張知白上奏曰臣伏覩司天監奏周伯星現請宣付史館羣臣詣闕稱賀者臣聞人君之德可以動天至仁積於中則休氣應於外祥瑞之出皆有所因諒感應之攸致非徒然爾故天人相與之際其道甚大頃者河朔之間連年地震陛下知上天之垂戒考前王之格言以為隂氣過盛則積而當然地者其道卑柔其體安静今動而不止誠有所謂且念國家開剏已來基業洪大干戈之役皆不得已而用之然而太平興國至咸平而來二十年内邊防多虞華戎之人㡬殞百萬兵者其義主殺殺者其事屬隂隂氣之盛不亦宜乎伏念致治之源惟息兵為大務前年契丹之來議欲通好陛下不矜兵力之強不恃邦威之盛姑以安民在念惡殺為事不阻其誠許以盟約由是動植遂其生全億兆知其休息然後發德音施惠澤賑貧民省寃獄敷求時病精選良吏側身思道引咎於已益兢兢焉翼翼焉思答天譴得不感羣心招和氣㢤故未踰朞年有是福應所謂德動於天而辰象昭瑞也昔桑楮共生於朝七日大拱太戊修仁桑楮遂枯祅不勝德見驗久矣今陛下修德可謂至矣非獨弭祅災復能致瑞應斯實我朝之盛美過前代逺矣然而皇王之道在乎戒謹休祥洊至而講德愈隆不恃太平之基而驕盈不矜大寳之位而荒怠懼亂者治必興焉思危者安必久焉斯前代之明鑒也古之君天下也患不恤黎元之疾苦患不知軍旅之勤勞患奢侈畋逰之無度患聲樂之不節患政事之不勤患壅蔽之不除患諫諍之不納今陛下薄賦斂省征徭勸農桑務稼穡恤黎元之疾苦矣優恩撫士厚賞懋功解衣哺食推心置腹知軍旅之勤勞矣宫室臺榭不以竒衺害工服御乗輿不以雕飾過制所貴惟榖帛所寳惟賢才絶侈靡之風矣弋獵之娱弃捐而不顧禽荒之戒祗畏而無㤀澤被蟲魚仁及鳥獸去畋逰之暴矣樂府新聲國伶妙伎存而勿廢用之有時善逺於聲樂矣觀書乙夜求衣未明躬決萬機将周十稔雖隆暑沍寒無愆於一日雖飄風暴雨不廢於崇朝克勤於政事矣明四目逹四聦辨讒邪杜權倖使下情上逹決壅蔽之方已流聞於天下矣延直臣啟言路詢求讜議樂聞上失納諌之規固超絶於百代矣斯不亦天下幸甚陛下誠能寳兹數事雖休勿休則瑞星不出臣亦賀鴻祚無窮而青史有光矣茍異於是則瑞星雖出臣亦不敢同衆人之賀矣夫善言古者必有證於今善言天者必有證於人自古以還仗富强之基居隆盛之運怠於政事以啟危亂者不可勝紀況今西北兩隅雖罷征戰之役然而比夫古者屈膝稱臣欵塞内附則亦事異而體殊矣得不虞哉臣以謂一星為瑞善則善矣若倚之而責承平之效則慮羣心小弛而警備之方因而不謹矣恭惟聖德之大無不周知臣聞三才者人居其中乃天地之和氣人心和則隂陽和隂陽和則日月星辰咸順其晷雪霜風雨不失其時則知陛下一言之善必上動於天心一事之美必上關於天道人君言動視聽必上法於天法天之義誠深矣大矣臣雖懵昧然稽之於大易粗知之矣夫乾之體六陽備焉乾之用萬物生焉人君之象也非聖人孰能行之孔子稱其象曰天行健君子以自强不息葢天之運行其道不止終古如一未常懈倦茍怠於一息差於一刻則六氣大紊萬物咸病王者之道亦當如是今陛下法天之義亦已至矣行健之德無不備矣復能念此乾元終始不易則萬方受無疆之賜萬乗享無窮之休臣愚陋無取渉道誠淺然佩名教服儒素考之方䇿得之師傳知君親之義至重治道之要至大故不敢避刑辟愛身名黙而自守狂夫之詞聖人採之或足以副朝廷之謀開諫諍之路伏冀天慈收一益於萬分之中則臣不勝至幸大中祥符元年龍圖閣待制戚綸上奏曰臣伏覩詔書受天書者臣謹按稽載籍歴考秘文仰惟帝德之厖鴻握乾符而臨御見天人之相接驗靈鑒之垂祥然未覩昭晣炳焕若今之明著者也伏惟陛下道掩百王功高三古躅二聖之丕業啟萬世之鴻基烝烝之孝日躋翼翼之心無怠勤行企道恭黙思元寛仁為布政之規慈儉示固身之寳巍巍盛德不可形容亹亹令猷固難擬議武王齋戒思見丹書之言漢武䖍祈遥啟竹宫之拜繇是上天即鑒瑞牒爰臻遐垂弈葉之祥昭示臨民之戒於鑠景命奚九齡之足稱赫弈鴻休伊七百之何筭臣叨逄景運獲睹嘉祥為太平之民已知大幸遇希世之事實繫前聞敢載伸言誠由過慮萬一有補是為愛君竊以流俗之人古今一揆恐託國朝之嘉瑞寖生幻惑之狂圖或詐託於神靈或偽形於木石妄陳符瑞廣述機祥以人鬼之妖詞亂天書之真㫖少君欒大之事往往有之伏望陛下端守元符凝神正道叅内境修身之要資五千致治之言建皇極以御人寰寳大和而延聖筭仰答天貺俯惠蒸黎三年龍圖閣待制孫奭上奏曰臣聞五載廵狩虞書常典觀民設教羲易明文何須紫氣黄雲始能封嶽嘉禾異草然後省方今乃野雕山鹿並形奏簡秋旱冬雷率皆稱賀将以欺上天則上天不可欺将以愚下民則下民不可愚将以惑後世則後世必不信腹非竊笑有識盡然上玷皇明不為細也天禧三年奭知河陽上奏曰臣伏見朱能者姦險小人偶塵驅使驟為侯伯皆由妄言祥瑞而陛下崇信之以至屈至尊以迎拜歸秘殿以奉安中外臣僚及黎庶靡不痛心疾首不敢直言臣所以不避死亡之誅敢言之者誠以佩荷國恩思報萬一聽之罪之惟在聖斷昔漢文成将軍以帛書飯牛陽言牛腹有竒書殺視得書天子識其手跡而斬之後有五利将軍妄言方多不讎坐誅漢武以能誅文成五利前史謂之雄才先帝時有侯莫陳利用者始以方術暴得寵用一旦發其姦誅於鄭州至今輿誦謂之英斷唐明皇得靈寳苻上清䕶國經寳勝等皆王鉷田同秀所為明皇不能顯戮怵於邪説自謂德實動天神必福我夫老君聖人也儻實降語應不妄言今按唐史自安史亂離乗輿播越兩都盪覆四海沸騰豈天下太平乎明皇雖僅得歸闕復為李輔國刼遷西内卒以餒終此豈聖夀無疆長生久視乎夫明皇以睿哲之資處高明之位禍患猥至曽不聞知良由在位多年驕亢成性謂人莫已若謂諫不足聽心玩居常之安耳熟導䛕之説復又内惑寵嬖外任姦回曲奉鬼神過崇妖妄今日見老君于閣上明日見老君於山中大臣尸禄以将迎端士畏威而緘黙既惑左道即紊政經民心用離浸不復振及至禄山兆亂輔國刼遷老君寧肯禦兵寳符安能排難身危名辱負愧包羞大命既傾前功併棄今朱能所為頗似王鉷等事願陛下逺思漢武之雄才近法先帝之英斷中鑒明皇之召禍庶幾災害不生禍亂不作享萬世無疆之休時宫禁火災左僕射王旦馳入帝曰兩朝所積朕不妄費一朝殆盡誠可惜也旦對曰陛下富有天下財帛不足憂所慮者政令賞罰之不當臣備位宰府天災如此臣當罷免歴代名臣奏議卷二百九十八
