body:
  text: 歴代名臣奏議卷一百三十二明楊士竒等撰用人宋太祖時符彦卿鎮大名頗不治太祖以王祜代之俾察彦卿動靜祜以百口明彦卿無罪且曰五代之君多因猜忌殺無辜故享國不永願陛下以爲戒彦卿由是獲免太宗雍熈四年陳王元僖薦趙普上言曰臣伏見唐太宗有魏𤣥成房𤣥齡杜如晦明皇有姚崇宋璟魏知古皆任以輔弼委之心膂財成帝道康濟九區宗祀延洪史策昭煥良由登用得其人也今陛下君臨萬方焦勞庶政宵衣旰食以民爲心歴考前王誠無所讓而輔相之重未偕曩賢況爲邦在於任人任人在乎公正公正之道在於賞罰斯爲政之大柄也茍賞罰匪當淑慝莫分朝廷紀綱漸致隳紊必須公正之人典掌衡軸直躬敢言以辨得失然後彛倫式序庶務用康伏見山南東道節度使趙普開國元老參謀締構厚重有識不妄希求恩顧以全禄位不私徇人情以邀名望此真聖朝之良臣也竊聞憸巧之軰朋黨比周衆口嗷嗷惡直醜正恨不斥逐遐徼以快其心何者葢慮陛下之再用普也然公讜之人咸願陛下復委以政啓沃君心羽翼聖化國有大事使之謀之朝有宏綱使之舉之四目未察使之明之四聰未至使之達之官人以材則無竊禄致君以道則無茍容賢愚洞分玉石殊致當使結朋黨以馳騖聲勢者氣索縱巧佞以援引儕類者道消沈㝠廢滯得以進名儒懿行得以顯大政何患乎不舉生民何患乎不康匪踰朞月之閒可臻清靜之治臣知慮庸淺發言魯直伏望陛下旁采羣議俯察物情茍用不失實邦國大幸藉田禮畢太宗欲相吕䝉正以其新進藉普舊德爲之表率冊拜太保兼侍中帝謂之曰卿國之勲舊朕所毗倚古人恥其君不及堯舜卿其念哉端拱二年太保兼侍中昭文殿大學士趙普薦張齊賢可任爲相上奏曰臣叨受寵榮致招殃咎昨縈疾苦全是困危承聖主之憫憐切加救療念微臣之衰朽難以扶持近者雖獲朝參尚無氣力料兹病苦那得久長疑大限以非遥恨深恩之未報儻歸泉壤實負穹蒼臣是以斟酌物情體量時事今有合關顧慮須至敷陳䖍傾無隱之誠願固太平之業況國家山河至廣郡縣尤多寰中之文軌雖同塞上之干戈未息勞民動衆寧有了期歲久年深别憂生事防微逺慮必資通變之才定難扶危宜退諂諛之軰此時機務須藉正人去年醜虜侵邊生靈受弊萬乘軫焦勞之慮千官無翊賛之功最是微臣偏懷愧耻即目同僚共事無非謹審清廉唯於獻替之時並執謙恭之禮稍存緘黙寧濟急須宜求抱義之人必有分憂之士臣竊覩工部侍郎張齊賢早居鄉曲流布令名開寳年中西京知府焦繼勲河南縣令盧振等當時同上奏章並以賢良稱舉從來履行本是真純後來御試登科遐方奉命親民涖事頗著廉平數年前特受聖知昇於宻地公私識此盡謂當才不期歲月未多出爲外任臣在鄧州日雖聞消息未測縁由日來微有𫝊聞或云奏對過當凡言大事須有悔尤其如義士忠臣不顧身之利害姦邪正直久逺方知如裴度爲相之日正色當朝捐軀佐國公家之事知無不爲而能黜退姦邪不避權勢致其朋黨疾之如讎雖讒毁競生頻遭罷免而忠勤顯著轉重功名平蔡州五十年賊臣並因裴度之功李林甫居相位十七年不曾忤㫖唯將諂佞自固恩榮黨惡容姦承顔順意安禄山顯有悖逆並不隄防以致敗國亡家皆因悖逆所致林甫既死斵棺棄屍況明皇帝文武聰明唐朝英主良由委任非當爲患實多唯有用人不可不謹則知抱忠良者豈肯依違懷諂佞者唯思茍且若非察言觀行何以知見否臧張齊賢素藴機謀兼全德義從來差遣未盡器能慮淹經國之才堪副濟時之用伏乞皇帝陛下留居左右歴試艱難緩急之時堪期得力如當重委必立殊功臣所以潜貢管窺望垂天鑒更希詢訪免誤安排冀分宵旰之憂同建久長之䇿臣之此狀特乞留中所貴全繫君恩免貽衆怒僭踰之罪無以自逃真宗咸平元年知虢州謝泌乞用宿舊大臣以小人爲戒上奏曰臣伏覩詔書以近日不逞之徒所陳述者皆閭閻猥媟之事臣聞古先哲王詢于芻蕘察於邇言者葢慮視聽壅蔽故採此以達于物情亦罕聞用其言不察其實而遽行其事也易曰小人勿用必亂邦也先朝時侯莫陳利用陳廷山鄭昌嗣趙賛之徒喋喋利口人心惟危頼先帝聖聰尋各誅剪然爲患已深矣此皆陛下偹見之也自陛下臨御以來盡去此軰是以天下咸知日月之明乾坤之大詩云靡不有初鮮克有終望陛下行之久而惟新唐明皇初用姚宋則治晚用林甫國忠則亂此亦望陛下深加聖慮臣聞工欲善其事必先利其器古者輔聖帝佐明王建萬世之基立不拔之策者必倚老成之人至於成康刑措葢從周召之謀文景清靜亦用蕭曹之畫明皇太平復是姚宋之䇿夫精練國政斟酌王度未聞市井之徒塵走之吏可當其任也陛下深察前古用小人則亂用大臣則治然後小人不敢萌心而大賢得以畢力也咸平中轉運使劉綜上言天下州郡長吏審官皆據資例而授未爲得人自今西川荆湖江浙福建廣南知州或地居津要或户口繁庶之處望親加選任其執政舊臣及給舍以上知州處亦擇官通判又京朝官當任逺官者率以父母未葬爲辭意求規免請自今父母委未葬者許請告營辦審官投狀並明言父母已葬方許依例考課違者並罷其官天禧元年擢右正言魯宗道奏言守宰去民近而無以區别能否今除一守令雖資材低下而考任應格則左司無擯斥故天下親民者黷貨害政十常二三欲裕民而美化不可得矣漢宣帝除刺史守相必親見而考察之今守佐雖未暇親見宜令大臣延之中書詢考以言察其應對設之以事觀其施爲才不肖皆得進退之吏部之擇縣令倣此庶得良守宰宣助聖化矣帝納之真宗時知處州楊億薦韓永錫上奏曰臣忝分朝寄獲總郡符官吏之間合知其能否闕庭之逺敢避於薦論臣伏見前監本州縉雲縣茶塩酒稅三班借職韓永錫早以明經曾干場屋晚不擇禄遂齒班行一自監臨六遷寒燠檢身奉上挺夙夜匪懈之誠守道安貧勵風雨弗渝之操士流推慕名跡藹然臣詢於羣倫偹知行實筦𣙜之任不足盡才州縣之間可使從政儻預字人之選必成循吏之名臣竊覩淳化四年選進士諸科舉人充班行曾降宣命如兩任六考無遺闕許與文資安排永錫考秩之間與詔書而未應臨蒞之際實官業之甚優伏望聖慈特與文資昇奬徇私黷貨保其不爲有此臣當連坐仁宗天聖五年左正言劉隨上奏曰臣伏見宰臣王曾因染微痾拜章求退深自刻責歴懇再三兩宫盛慈未賜允許聽於羣議亦所不安中外具瞻早期仍舊臣職居諌列亦合敷陳伏縁進退大臣治亂攸繫忠良進用則天下皆喜憸邪進用則天下皆懼譬之兵器回柄與人茍非温厚端良未可容易輕授葢君子得柄則裁成景化折衝禦侮以安天下唐明皇用姚崇是也小人得位則中傷良善剸割任情以危天下唐德宗用盧杞是也且君子小人各有其黨君子之黨起則禮樂興行仁義是蹈長轡逺御邦家用寧唐太宗之世是也小人之黨起則姦邪欺罔請託害政詐作威福以亂天下唐順宗之世是也是以知進退宰臣不可不謹臣觀王曾厚重寡言公忠有守先朝超擢參預鈞衡兩宫聖明俾專機務炎涼屢換畏謹益恭人無間言僉謂賢相而況齒髪未暮疾病可瘳願解四輔之班似爲一身之利雖知止不殆宜避遜於崇髙而憂國如家未可輕於去就伏望聖慈深加敦喻勿受封章病恙稍平復令視事舉先朝之甲令以宰司之職業侵權撓政者許其寘法黜幽陟明則委以公行振舉綱條彌綸庶務輔佐聖德以成太平豈不美哉臣竊慮聖慈憫其懇誠或遂來請必若將求宰執思量未易其人中外大臣豈無希望然授其柄政雖簡於聖心得位持權亦防於難制丁謂之類是也臣雖甚寡識亦嘗品量以曾之厚重鎮俗張知白之孜孜奉國吕夷簡之能斷大事魯宗道之事君無隱斯並先帝柬求兩宫登用驅䇿既乆勤勞一心羣議公言未宜改易所有王曾伏願頻降中使偹宣慈㫖候其疾損速赴朝參如此則眷注之情益彰於信用補報之效必盡於才謨輿論若斯謹達天聽寳元元年直史館同知禮院宋祁上奏曰臣伏以陛下躬至聖開大明數引近臣延謀急政退託不敏開敢言之路日昃便坐以須告猷夫人君據安而念危則終不危操治而慮亂則終不亂何則幾微之兆成敗之端森然前判於胷中矣臣向已被詔對所欲言事聞於上未合明聽陛下赦其無狀再降德音似欲竭盡下情以裨萬一顧臣敢無辭而對人臣之所以有朋黨者何也由忠邪之不早判耳且君子得位必引其類使協濟忠力不爲私也小人獲進亦引其類使扇動聲勢不爲公也君子指小人所引固曰朋黨小人指君子所引亦曰朋黨君子常少小人常多此人君所以易惑而難辯也陛下何不質之以事驗之以言其言也隂賊忌害巧爲迎合聽之似可用察之而無實小人也其言也質直蹇正多所補益聽之似逆耳察之而有實君子也又以其言騐其人之行事事與言合者爲忠事與言反者爲邪不黜其邪不進其忠則朋黨終不除矣臣下之所讒佞得行者何也由朝廷聽言之路太廣也夫正人能言邪人亦能言古者稱言之無罪者謂有道之言也若邪人憑虛以害有位架妄以間忠臣亦以爲不可加罪則是以言喪邦矣且邪人縁隙投詐寄事造姦詆人必以難騐之文傷人必以似是之語使進不得自辨於主退有以離間於君於是正人幽憤有功抑退如此者陛下雖加罪焉可也正人則不然毅焉中立侃焉正論引古今之宜根刑政之本質之衆則無害措之事則可行不為勢傾不爲利奪如此者陛下雖加賞焉可也故大闢言路而正言不賞妄言不罰則讒佞終不去矣今議者皆曰朝廷誠安且治臣以爲不然夫三患未去安得爲治直亂之未作耳請試言之夫與賢人謀事而與不肖者斷一患也重選大臣而輕任之二患也大事不圖而小事是急三患也何則賢人必爲國計而不肖者專爲身謀爲國計者必持至公故言直而援少爲身謀者專挾己私故喻巧而援多人君不能察之則姦詐行矣於是言長利者則破之以小害使終不能爲利圖大功者急之以近效使終不得立功善令方下而謬令移之矣公議始行而私議奪之矣且不肖之人已不能忠而忌人之納忠已爲不善而能敗人之爲善改白作黒以是爲非若朝廷已知其姦不能斥去郭公所以戒亡也已知其賢而與不肖者並任之劉向所以獲罪也此方今患之最切者也夫大臣左輔右弼參賛權綱朝訪夕對彌縫漏闕既以爲忠且賢而擢之材且能而任之矣是宜待之以無二責之以一心今或指纎瑕采飛語小則被疑大則賜罷朝爲臯夔暮爲檮杌遂令家無全節人無全行何其有道之世而賢者之乏耶誠任之失其理矣徒使繼至者瞻前畏後偷合取容事存形跡日防猜阻捨國事而不慮茍身謀以自安大臣如此陛下何頼焉且君視臣如手足彼將以手足爲報君視臣如路人彼亦將以路人爲報此患之次也聚天下莫急於財鎮天下莫切於兵制四夷莫神於機任天下莫謹於官今財已匱而不肯計兵甚冗而不能擇機至而不敢謀官濫而不知選而執事者但且計小利害責小經費羣對而旅前取㫖而奉行日循一日歲偷一歲陛下又不念此寧是朝廷福耶此患之又次也假如萬一邊境有事盜賊相扇甲兵宿野糧饋在路此時三患不去誰能出身爲國與陛下共此安危耶誰能執節慷慨與陛下前死不顧耶臣故曰非能治也直亂之未作耳陛下誠能詔中書門下使擇天下之冗官稍清流品詔樞宻院去天下之冗兵寖明紀律斷自宸慮必取成功不使渙汗復收匪石中轉則縣官之財有數年之饒爲萬一不虞之偹策之善者也臣智識庸暗不足上當清問輕率狂狷惟陛下裁貸其誅祁又薦張定方狀曰右臣伏以良工搆材爲厦明主搆士爲國而材須求集士待舉知然後落成展采功與時立伏見應沈淪草澤科張定方年三十八歲識慮沈敏氣直行危文尚體要不工聲病渉知韜畧兼明遁式甘足貧槁久無仕心昨爲鄉黨敦勸入應詔舉六論程藝非其素心有司報罷怡然引去閉闗却掃不干州閭立言忼慨指擿民弊臣知壽州日以禮致問延至公門觀其議論卓焉切至因取其所著書得却狄復戎戰書等篇質多采少紀實求當臣亦指文索事與相辨詰觸機應變籌䇿有餘非但角空言競華論而已臣以爲如定方等軰不可多得或䝉召赴上都程其所長授一職事官令往西北邊郡必能研究術畧參賛帥臣討論營陣商確攻守至於撥煩幹蠱又其緒餘臣既知其人不敢有蔽謹録定方所著三軸并封上如有可采伏乞特賜收試果無所取臣甘茍言之罪仁宗時呂夷簡執政進用者多出其門吏部員外郎范仲淹上百官圖指其次第曰如此爲序遷如此爲不次如此則公如此則私況進退近臣凡超格者不宜全委之宰相夷簡不悅康定元年仲淹知延州乞督責管軍臣寮舉智勇之人狀曰臣竊見邊上將帥常患少人今髙繼嵩纔亡人情頗駭恐鎮戎不能守禦却須藉朱觀往彼朱觀既去則鄜延路又闕敢勇之將國家奄有四海未必乏才豈天地生人厚於古而薄於今葢選之未精用之未至今諸軍諸班必有勇智之人多被管軍臣僚人員等逓互彈壓不得進用坐至衰老如朱觀元是軍班出身因歴邊任方得將名伏望聖慈專督管軍臣僚等於諸班中搜羅智勇之人各舉一名不以將校長行或試以武藝或觀其膽畧出衆便可遷轉於邊上任使如將來頗立戰功則明賞舉主或屢敗軍事亦當連坐所貴諸路漸次得人不致頻有那移免使戎狄謂大國乏才愈增驕氣況西北二方將帥之闕實非細事乞國家常爲預偹早加遷擢慶歴中仲淹爲陜西經畧安撫使奏乞擇臣僚令舉差知州通判䟽曰臣等竊以天下郡邑牧宰爲重得其人則致理失其人則召亂推擇之際不可不慎國家承平以來不無輕授應知州通判縣令因舉薦擢任者少以資考序進者多才與不才一塗並進故能政者十無二三謬政者十有七八國家詔令程式天下一體何則能政之處民必蒙福謬政之下民常受弊非國家法令之殊葢牧宰賢愚之異也今四方多事民日以困窮將思爲盜復使不才之吏臨之賦役不均刑罰不當科率無度疲乏不䘏上下相怨亂所由生若不急於求人早革其弊誠國家之深憂也然自來雖曾詔臣僚各舉所知或舉主非賢則多謬薦臣等欲乞聖慈特降詔書委中書樞宻院臣僚各於朝臣中薦堪充舉主者三人候奏到姓名即逐人各賜勅一道令於通判内舉成資已上一員充知州知縣内舉成資已上一員充通判簿尉中舉有出身三考以上無出身四考一員充職官知縣或於職官令録中舉五考以上之人充京官知縣仍於勅明言所薦之人若將來顯有善政其舉主當議旌賞若贓汙不理苛刻害民並與同罪所貴生民受賜宼盜自息仲淹又奏乞於職官令録中舉充京官知縣疏曰臣近與韓𤦺上言乞擇舉主令逐人於通判中舉知州一員於知縣中舉通判一員於簿尉中舉職官知縣一員已蒙降勅至宻院入逓次臣看詳勅頭名署臣等上言於理未便欲乞只作朝廷憂勞之意特選臣僚舉官其體甚重仍乞於簿尉中舉職官知縣一員下添入或於職官令録中舉五考以上之人充京官知縣計添一十九字庶無遺才仲淹又奏舉胡瑗李覯狀曰臣聞臣之至忠莫先於舉士君之盛德莫大於求賢㤗通之朝豈敢隱黙臣竊見前宻州觀察推官胡瑗志窮墳典力行禮義見在湖州郡學教授聚徒百餘人不惟講論經㫖著撰詞業而常教以孝悌習以禮法人人嚮善閭里歎伏此實助陛下之聲教爲一代之美事伏望聖慈特加恩奬升之太學可爲師法又建昌軍應茂才異等李覯邱園之秀實負文學著平土書明堂圖鴻儒碩學見之欽愛講貫六經莫不贍通求於多士頗出倫軰搜賢之日可遺於草澤無補風化伏望聖慈特令敦遣延於庠序仍索所著文字進呈則見非常儒之學仲淹又同韓𤦺奏舉雷簡夫狀曰臣等竊見秘書省校書郎簽書㤗州觀察判官㕔公事雷簡夫昨蒙朝廷敦遣起於草澤佐幕以來偹見通敏求之多士得爲異才欲乞聖慈特加奬擢與轉一官就差充邊郡通判庶觀能效可進榮階若不如所舉臣等甘當同罪仲淹又同𤦺奏乞酬奬張信狀曰臣等竊見環慶教押軍陳奉職張信自殿侍在邊上累次與西賊鬭敵前在延州趙瑜等手下作前隊殺退蕃賊得趙瑜等銀椀衣服後來趙瑜等並轉三資張信即未曾酬奬其人氣豪膽勇武力過人爲一時之猛士在指使中少見其比欲乞朝廷特與改轉一侍禁送种世衡手下管押軍隊分擘與禁軍一兩指揮專切教習獨作一隊爲竒兵使喚必能身先士卒以立勝功仲淹又奏舉許元張去惑狀曰臣竊覩國家用兵以來急於財利雖百姓大困更難刻剥三軍不足又須經營莫若求通敏之才省枉費之用庶幾下不生怨上不乏須臣切見殿中丞監在京𣙜貨務許元才力精幹達於時務伏望聖慈指揮取索𣙜貨務勾當過有勞績特與超轉一官差充江淮制置發運判官必能減省冗費疏通利源不害生民胥助軍國又臣切見張去惑素有時材不避艱苦昨慶州修大順城建事之初日有宼至人情畏懼却求中輟遂差張去惑徃彼勸諭將佐晝夜興功衆乃同心方能集事兼於寧州專管修城或創修山城功料浩瀚並以了畢防城戰具皆能精辦臣昨冐罪舉本人乞改一官充陜西轉運判官已奉朝㫖依奏候有闕即差今來陜西省罷轉運判官其張去惑自合别與差遣伏望聖慈差監在京𣙜貨務替許元勾當臣所舉此二人若不能辦濟臣甘失舉之罪仲淹又奏舉杜杞充館職狀曰臣聞書曰先王坐以待旦旁求俊乂葢天下治亂繫之於人得人則治失人則亂故先王盡心焉臣伏覩朝廷兩府任人多擢於兩制詞臣必由於館殿是館殿爲育材之要府豈宜賢俊不充至於衰索唐太宗置𢎞文館延天下賢良文學之士令更宿直聽朝之暇引入内殿講論政事至夜乆方罷今館閣臣僚率多清貧僑居桂玉之地皆求省府諸司職任或聞在館供職者惟三兩人甚未稱陛下長養羣材之意臣竊見虞部員外郎杜杞太常丞章岷祕書丞尹源祕書丞張掞殿中丞王益柔殿中丞吕士昌大理寺丞蘇舜欽大理寺丞楚建中環州軍事判官姚嗣宗國子監直講孫復或文詞雅逺可潤皇猷或經術精通能發聖藴伏望聖慈委中書相度其間聲實已著者乞不限資任先次召試各補館職或有未協公議者乞加詢采更候悉其才行即賜施行今後館閣臣僚供職經二年不就諸司職任者乞特與恩例差遣庶令英俊之逰日玩典籍不親米塩之務專修經緯之業長育人材無尚於此臣切聞太宗皇帝慕唐文皇之英風特建祕閣與三館並崇聽朝之餘時或逰幸此祖宗盛事不爲不重今館閣供職員数至少臣方敢上言所舉雖多皆縉紳有聞之士更在朝廷取擇臣謂天下至大聖人其難之綱紀或隳雖治必亂俊哲所聚雖危必安今邊鄙尚虞旰昃未暇正宜廣搜時彦大修王度以固其本之時也惟聖慈留意三年仲淹爲參知政事論轉運得人許自擇知州上奏曰臣竊見古者内置公卿士大夫助天子司察天下之政外置岳牧方伯刺史觀察使採訪使統領諸侯守宰以分理之内外皆得人未有天下不大治者也今轉運按察使古之岳牧方伯刺史觀察採訪使之職也知州知縣古之諸侯守宰之任也内官雖多然與陛下共理天下者唯守宰最要耳比年以來不知選擇非才貪濁老懦者一切以例除之以一縣觀一州一州觀一路一路觀天下則率皆如此其間縱有良吏百無一二是使天下賦稅不得均獄訟不得平水旱不得救盜賊不得除民既無所告訴必生愁怨而不思叛者未之有也民既怨叛姦雄起而收攬之則天下必將危矣今民方怨而未甚叛去宜急救之救之之術莫若守宰得人欲守宰得人請詔二府通選轉運使如不足許權擢知州人既得人即委逐路自擇知州不任事者奏罷之仍令權擢幕職官如是行之必舉皆得人凡權入者必俟政績有聞一二年方真授之雖以精擇尚慮有不稱職者必有降黜直俟人稱職而後己仍令乆其官守勿復數易其有異政者宜就與升擢之若然官修政舉則天下自無事矣朝廷唯總其大綱而振舉之可也仲淹又奏乞許元張去惑下三司相度任使疏曰臣近與宰臣上殿因議財用不足䝉賜德音謂宜選諸路轉運便臣尋面對云轉運司得平和之人則可得刻剥之人則百姓受弊尋奉聖㫖民惟邦本不可侵擾臣退而思之以江淮制置發運司為財賦之要地最宜得人使二員互換上京所轄諸州不暇廵歴臣切見監在京𣙜貨務内殿中丞許元智識通敏可幹財賦復能愛民不為侵刻遂舉充江淮制置發運判官又著作佐郎通判寧州張去惑昨在邊陲實經煩使遂舉監在京𣙜貨務替許元此二人臣曾舉充陜西轉運判官已奉聖㫖依奏候有闕日與差既是轉運判官資地今來舉充上件職任未至過越切見朝臣宋緘陳執禮為因王欽若妻并宋綬妻陳乞在京監當有臺官上言不當已奉聖㫖改差臣在樞宻院日所舉許元張去惑勾當錢穀雖與前人陳乞事體不同亦慮三司别有長才可舉伏望聖慈指揮三司副使相度此二人之才如不堪上件任使即别舉朝臣庶協公議仲淹又奏葛宗古䟽曰臣竊知延州西路都廵檢使葛宗古為侵用公使錢入已奏案已上朝廷臣昨奏陳邊上得力將佐葛宗古實在其數今恐審刑大理寺斷入極典縱䝉朝廷寛貸亦須降充近下班行必然挫屈更無勇戰之氣臣伏覩刑統節文諸監臨主守以官物私自貸人及貸之者無文記以盜論有文記准盜論立判案減二等即充公廨及用公廨物若出付市易而私用者各減一等坐之議曰即充公廨謂以官物廻充公廨今朝廷支賜臣僚公使錢既已支付逐處更不係省帳拘管不收出剩亦無磨勘其公使錢顯是廻充公廨之物私用者自有上項正條兼元無條貫今將私用公使錢入已為監主自盜之法只是法寺近例斷遣不敢從輕遂至入罪切慮今後有公使錢處官員因循之間為人捃拾多陷除名死罪之坐誠為法之一弊公朝固當正之伏望聖慈宣喚新判大理寺杜曾令上殿指陳侵用公使錢正條付中書參酌免有枉濫其葛宗古弓馬精强復有膽勇在鄜延路中最爲驍果今來朝廷選將之際此人實恐難得乞從正條定罪然後議其末減康定元年知諫院富弼乞令宰相兼樞宻使上奏曰臣伏見自來兵機公事全委宻院今邊鄙多故不同往時若無更張必有敗闕況事干治亂執政豈可不知文武二途自古一致臣竊觀周史宰相魏仁浦曾兼樞宻使國初范質王溥亦以宰相參知樞宻院事臣今欲乞依故事亦令宰相兼樞宻使所貴同心協力各無猜嫌共議安邊必能集事慶歴三年弼又乞韓𤦺范仲淹更任内外事上奏曰臣伏聞近降勅命除陜西四路招討經畧使韓琦范仲淹並授樞宻副使仰認聖意只從公論不聽讒毁擢用孤逺天下之人皆謂朝廷進用大臣常如此日則太平不難致也然議者惟云進用大臣雖則美矣其如西寇未殄亦須藉才若二人俱來或恐闕事羣論皆願一名召來使處内一名就授樞副之命且令在邊表裏相應事無不集以臣愚慮亦謂羣衆所說甚得允當然近日或聞有異議者謂樞宻副使不可令帶出外任恐他時武官援此為例深不穩便此乃横生所見巧為其説沮陛下獨斷之明害天下至公之論臣謂立此異議者必知韓𤦺范仲淹以西事方急堅辭此職既未肯從命而來又不令帶出外任是欲惑君聽抑賢才姦邪用心一至於此況先朝累曾有大臣帶兩府職任應急出外事畢還朝不聞後來有武臣援以為例臣願陛下無信異說專採公論一名召來使處於内一名就授樞副之職且令在邊或許二人一歲一更均其勞逸亦甚穏便内外協濟無善於此臣旦夕來聞韓𤦺范仲淹已有奏報西事未了懇辭恩命朝廷乘此處分深合事宜臣不勝懇懇激切之至弼為樞宻副使薦張昷之等可充轉運使副狀曰臣近曾兩奏乞令中書樞宻院通選諸路轉運使副令逐路轉運選轄下知州逐州選部内知縣縣令若此三種官一一得人則天下自然無事朝廷不勞而治矣然欲知民細微利病須要好縣官欲得好縣官須先擇好知州欲得好知州須先擇好轉運使副須是輔弼大臣用心至公精加㨂選親戚故舊者不得葢蔽可去者必去之仇讎踈逺者不得抑塞可用者必用之去之者勿避其怨謗用之者勿求其感激不邀恩於已不推過於人若能如此則天下賢者才者可以盡為朝廷之用何患不得諸路轉運二三十人而已伏縁國家之事莫非至公須是輔弼大臣用心精選當黜則黜則退黜之人以謂朝廷公行自然無怨人既無怨事乃平貼若有大臣不存公共之心推事與人則退黜者以謂朝廷本不退我只是某人私相見排遂生怨怒架造讒謗君聽既惑事乃破壞此於朝政為害之大者也今既委逐路轉運使副升黜一路知州其權甚重其事亦大須是有才識能分别善惡仍須推心至公而行事果敢然後可當轉運之任今逐路見任及新差下未到任轉運使副共二十八員其間的有才識能分别善惡推心至公行事果敢者無三人而已其餘雖别無顯過可黜奈何碌碌常才緩急無用其間亦有作過之人但未敗露或以敗不行若不更張必難集事臣今來於衆論得九人皆謂堪充轉運使副可以委付選擇轄下知州必得盡公不負朝廷差委謹具名次如左三司塩鐵副使張昷之知雜御史魚周詢史館修撰王質知諫院王素三司判官沈邈知濰州董儲江南東路提㸃刑獄楊紘權三司判官杜杞權三司判官燕度右九人皆搢紳之選今來且充諸路轉運乆而皆可㧞擢任使更乞令兩府同共銓量施行内董儲是宰臣晏殊逺親然其人實有才用但年齒稍髙而心力不退不可以大臣親嫌而廢也臣又慮諸處現任轉運使副例各未滿或别無顯過恐中書以謂替罷無名臣今欲乞特降詔書告諭天下偹陳轉運使職任非輕自來有失精選致職事廢弛物論大以為非昨據樞宻副使富弼上䟽乞澄汰天下不才轉運使副使下中書樞宻院令同共用心推擇中外有才識堪任轉運使副臣僚今據兩司條奏到某人已下若干人堪充轉運使副已令差赴逐路充職幹當務在稱職以副朝廷委任之意又據兩司條奏到見任轉運使副某人以若干不聞顯効並仰中書門下就便别與差遣若降此詔告諭天下則退者以兩府公黜自當無詞進者以兩府選差孰敢不勉如此行遣不是無名使天下之人耳目一變謂朝廷進善退惡政令清明守官者各知恐懼不敢因循豈不美哉豈不善哉仁宗時宋庠奏曰聖詔曰牧守之職以惠綏吾民而罕聞奏最將帥之任以威服四夷而艱於稱職豈制度未立不能通變於時邪豈簡擢靡臻不能勸勵于下邪臣等竊觀舊史欲治之主未嘗不留意守宰以寧方内慎求將帥以清戎索矧陛下秉至聖之德御乆安之世靖民防患孰先於此謹按朝廷列郡四百地踰前代參建官吏分督政條其間知州實匪輕選大者則領以公相次者寄以從官自餘逺邇由卿監郎官而下莫不惟材是擇考績序遷一有踰違並從案劾或降或罷無所私焉臣等以謂選任之官如此粗足若欲人皆召杜政必龔黄質於前聞恐難盡善然重内輕外今古常情臣等敢不更務采掄審加勸沮或申明約束或廉察風謡奏最之科庶幾可復然不得謂制度不立矣若乃將帥之舉宥宻是司國朝之規名分難越儻或竒材㧞於羣萃勇略著於邊疆任用之間亦當公論然亦不得謂簡擢不臻矣慶厯中知諫院蔡襄乞罷呂夷簡商量軍國事上奏曰臣伏見前宰臣呂夷簡被病以來兩府大臣三次詣夷簡家議事及守司徒罷相之後朝廷有㫖令商量軍國大事今月二日宰臣章得象以下又詣其家評論西事臣切謂夷簡病時陛下於内中開設道場及賜手詔錫與至多眷注之心當世無比臣謂陛下假人以恩則可假人以禮則不可何哉陛下春秋方盛固宜親决萬幾却令宰臣樞宻詣夷簡决事臣恐天下四夷聞之謂陛下如何主也兩府大臣輔陛下而治天下者今乃並笏受事於夷簡之門里巷之人指㸃竊笑臣恐天下四夷聞之謂大國乏材而無上下之分雖陛下特隆恩眷優待老臣正得為君之道而夷簡不能上承陛下之意而無引避推讓之心夫為人臣端居私家屈大臣而自便於理安乎況夷簡謀身忘公養成天下今日之患遂致二邊連構百姓困窮萬手所指無敢言者上天降鑒祖宗垂靈輒以病觧而陛下尚令參決大政是陛下至今未之悟也臣切以陛下即位之初夷簡便為參知政事其後數年漸至宰相出陳州半年復入又出許州一年有餘移領魏府召歸作相首尾二十年間不居政府纔二年有餘耳前後雖有王曾李廸張士遜陳堯佐王随等更迭為相而歴年之深無如夷簡輔政以來所言之事陛下一皆聽信而施行之出藩未幾還當大政以病居家兩府問事得主之深無如夷簡輔政既乆得主又深固當敦風敎正庶官安百姓鎮四夷今乃不聞功業但爲私計豈不負陛下眷遇之意也夫開直言旌讜論者宰相之體也夷簡執政以來屢貶言者凡三四次如曹修古叚少連孔道輔楊偕孫沔范仲淹余靖尹洙歐陽修等或謫千里或抑數年或縁私恨假託人主威權以逐忠賢以洩已怒殊不念陛下虛受惡名此不忠之大者又使天下之人父敎其子兄敎其弟咸以直言為諱此乃絶忠讜之嘉謨成本朝之闕政其過一也夫奬懿行厲廉節宰相之方也古之聖人敎人之道先以名節為本若不使好令名則何惡不為何善不毁縱不陷於惡亦不免碌碌因循為闒茸之人也夷簡為性不臧欲人附已見為善介特而自立者皆以好名希求富貴以汚之善人耻此徃徃退縮以避好名干進之毁是以二十年來人人不肯尚廉隅厲名節淺者因循闒茸深者靡惡不爲都無愧恥但能阿附夷簡夷簡悉力䕶之姧邪不敗浸成此風習以為俗又使天下之人皆以逐利為智能逺勢為愚鈍此乃廢廉恥之節成奔競之風其過二也夫善則稱君過則稱已宰相之行也夷簡一恩之施皆須出我門下或先露其事使人預知或先抑其事然後與行若不可行者小則歸怨同列大則稱奉聖㫖以是阿附者多隂為羽翼使天下之人迷大公之論有朋黨之議其過三也夫進賢退不肖者宰相之職也臣見數年以來審官院京朝官吏部銓選人樞宻院三班院使臣授官之後例皆待闕一年二年以此計之冗官至多而曾不裁損竒材異績不聞奬㧞貪墨昬耄之人曾經免罷責罰及來雪理務施小惠多與收録使天下貪廉混淆善惡無别其過四也夫富國恤民宰相之事也自闗陜兵興以來修完城壘饋運芻粟科配百端悉出州郡内則帑藏空虛外則民力殫竭嗟怨嗷嗷聞於道路不幸有水旱之災其變不可量也葢由不選材能充三司使副使發運使轉運使但務收取人情用為資歴纔至數月即又遷移循環奔走日求升進欲以興財利寛民力其可得乎其過五也夫懷忠誅逆宰相之略也邊鄙無事之時臣僚或陳備邊之䇿或述禦宼之方皆為虛妄引惹或降差遣或與衝替邊臣因此唯尚姑息是以士卒不練器械不完黠羌窺我强弱輒懐異志夷簡當國之後山外之敗任福以下死者數萬人豐州之戰失地喪師鎮戎之役葛懷敏以下死者又數萬人葢由遣命將帥或分或合法制不立上下不和大戰則大敗小戰則小敗使生靈肝血塗染砂磧父子夫婦存歿冤痛廟堂之上成算安在其過六也夫暢國威制鄰敵宰相之謀也自西師敗歿之後北敵乘隙遣使入朝輙違先帝之盟妄請闗南之地歲增金帛僅二十萬而猶勒兵壓境堅求納字淩脅中國大為耻辱度其禍福譬若疽瘡但未潰耳制敵之術為患日深其過七也夷簡出入中書且二十年不為陛下興利除害茍且姑息以至事事隳壞如此臣謂夷簡若實有智謀執政從來只務固寵不肯施設是不忠也若竭盡智謀區處顛倒是不材也不材不忠二者必當一責尚貪威勢不能力讓或聞夷簡乞令政府一兩人至家商議大事足驗夷簡退而不止之心也臣又見故相王旦執政僅二十年後以病退只帶宫觀使名不復與聞邦政故事甚明其夷簡伏乞朝廷特罷商量軍國大事庶使兩府大臣專當責任無所推避陛下於夷簡正君臣之分存終始之恩伏乞陛下斷而行之以全國體三年襄乞令韓𤦺范仲淹更任内外事上奏曰臣伏見陜西路招討使韓𤦺范仲淹等各除樞宻副使並以西寇未寧懇辭恩命朝廷再賜手詔督令赴闕臣竊料𤦺等必再有陳論辭免於未決之間而異同之説有三焉曰使𤦺仲淹偕來也曰一處乎内一處乎外也曰皆留在邊也使之偕來者此朝廷之本意葢陛下推獨斷之明採至公之論以二人乆處邊陲詳知本末致之宥宻思有變更將以求破賊之計耳然論者之説曰邊臣最苦者奏報文字或有稽緩或即裁制動不如意所以乆無成功今得邊臣而任之則細大可知表裏相應也用兵不勝由軍制未立無部分統轄之法若不更變未見可勝之期今得邊臣而任之可責以更變之術所以宜一處乎内也西宼雖已請盟而戎心不可倚信𤦺等素習兵事上下之情通浹今盡還朝新帥鄭戬山川之險易未知軍旅之部伍未練若賊乘我機便忽有奔突必難制禦此所以宜一留於外也曰皆留在邊者此沮抑之論也惡𤦺仲淹者若於陛下前百般毁短之陛下必不信矣若稱其材德而言陛下不得不疑也必謂仲淹等威名已著羌戎畏甚今將去邊必有侵擾臣謂不然仲淹作招討使羗戎既畏其威名今在樞府正議兵謀其畏必甚矣若謂闗中民情素所倚賴今既還朝衆所失望臣又謂不然在陜西民既倚賴今在樞府必陳利病而行之所賴者愈大以是校之情僞甚明然或者謂二人孰宜處於内外臣以物議言之二臣之忠勇其心一也若以才謀人望則仲淹出韓𤦺之右處内者謀之而處外者行之故仲淹宜來𤦺當留邊於理甚當也其韓𤦺范仲淹伏乞朝廷不聽辭避各授恩命上以明陛下任賢之堅意下以協衆庶之公論也襄又論用韓𤦺范仲淹不宜使後有讒間不盡所長上奏曰臣伏見去月以來陛下拔任諫官都下翕然稱慶又數日罷夏竦樞宻使用韓𤦺范仲淹作樞宻副使制命一出士大夫賀於朝庶人喜於路至有飲酒呌號以為樂者謂陛下去邪任忠可刻日以觀太平矣臣聞易㤗之彖辭曰内君子而外小人君子道長小人道消否之彖辭曰内小人而外君子小人道長君子道消然則君子進則天下泰小人進則天下否陛下退一邪臣進一賢人而舉國歡欣者豈以一邪一賢獨能闗天下利害乎葢以一邪退則其類退一賢進則其類進衆邪並退衆賢並進而天下不泰者無有也雖然臣竊憂之頃年莊獻明肅太后初棄六宫陛下親臨庶政一日出令邪臣沮氣天下觀聽洒然快意期於一變以臻大治自後數年方内無事左右之臣易於襲常而恬於茍安陛下憂勤之心且亦少懈已而西羌背違舉兵宼邊遣將興師屢戰屢敗饋運賦斂百姓困窮北朝乘勢窺我彊弱遣使求地京師震駭幸而增賂以得暫息四海嗷嗷日憂一日以將來之患當如何也然猶指忠賢之士而屬望焉幸而進用庶其叶力而大有為以解焦勞之急陛下奮發剛斷博採物論拔而任之人人懽欣而臣獨切憂者誠恐進用之後或有讒間或拘舊例使之不盡所長而去則天下必有遺材之恨所損不細矣當今天下之病臣請譬諸病者其安時調養適宜固不病矣其在皮膚醫者能早去之病且安矣此二者皆已不及而病在肢體正待良醫之時陛下又選任良醫儻信任不疑聽其設施非徒愈病又致民於壽考苟於此時使良醫不得盡其術則天下之病愈深雖有和扁之妙難責速效矣願陛下思祖宗社稷之重矜四海生民之困憤西北二虜之恥發乾剛夬決之道拔賢材收衆䇿不憚改作以成大功天下幸甚襄為起居注乞罷王舉正用范仲淹上奏曰臣伏以當今之務至要至切者莫若擇執政之臣執政之臣茍容不材欲百職修舉者無有也切見參知政事王舉正材能最下乆忝大用柔懦緘黙無補於時天下之人指目羌虜為患兵戈未寧生民窮困國賦貧蹙陛下豈不念祖宗社稷之重國家安危之計而令舉正碌碌偹員自陛下擢用韓𤦺范仲淹以來人人日期大任韓𤦺范仲淹見已到闕若以處置邊事韓𤦺足以當之乞移仲淹參知政事其舉正伏乞退罷以叶公議襄又奏曰右臣近論述參知政事王舉正柔懦緘黙無補於時特乞罷退樞宻副使范仲淹才名德望素著於人乞參知政事或者以謂若用仲淹參知政事却令舉正復入樞府朝廷於大臣不失進退之體臣切謂舉正軟懦無能豈可却令入樞府雖中書總天下之事重於樞宻院專講兵謀豈可用不才之人也臣聞人主御羣臣稱職者用之不職者去之舉正預政以來有何建明著於時論儻不以罪斥而以恩罷其為幸也大矣伏惟陛下天資仁厚不忍失一大臣之意奈何羌虜皆横生民已困兵戈未寧水旱不節嗷嗷四海思望休息急於用才之日陛下雖欲存小惠宰輔雖欲芘同列豈不悞國家大計乎伏望陛下發乾剛出聖斷退舉正用仲淹以荅天下之望臣為諫官論列大臣先當議其才與不才若舉正過惡未欲盡言願朝廷早以禮去之無令醜迹暴揚於事為便四年襄又奏乞留歐陽修狀曰臣竊見知制誥知諫院歐陽修授龍圖閣直學士河北都轉運使臣等已有論列乞罷河北之任依舊知諫院至今未蒙朝命臣等伏念事有重輕度才而處才有長短適用為宜朝廷安危之論繋於天下則為重河北金穀之司繫於一方則為輕修之資性善於議論乃其所長至於金穀出入之計勤幹之吏則能為之任修於河北而去朝廷於修之才則失其所長於朝廷之體則輕其所重伏惟陛下增置諫員以來外人不計諫官之能否但知陛下有開納之美一旦驟榮修之身便令逺去外人不知朝廷任用之意但以修好切直不容於時臣等非私於身寔為朝廷惜任人之體伏乞陛下罷修龍圖閣直學士河北都轉運職任令依舊知制誥知諫院事仁宗時襄請叙用孫沔狀奏曰右臣伏見分司南京孫沔以罪譴謫臣以守官海域去京師至逺事至傳聞不得真實然觀貶降之重及有履穢之詞皆謂孫沔知杭州日有趙氏事沔誠有之固當重責然沔之治杭州剗除蠧弊擊擿豪强令行禁止與浮屠大族日為讎敵其間雖有過當然風俗混淆至今衰息所為如是雖至愚之人必能自察沔雖闊略然老於人事以嚴明自處而輙為不法至此使一日罷去小人共怨何恃而得安全是明目而投陷穽孰肯為哉臣恐審問體量之際未得其實臣聞趙氏與父同日下審問所其父一夕而死所以道路之言皆謂搒掠以成其事古者大臣不理沈寃沔以嘗副樞宻待罪而已臣恐繼今以後大臣有罪不能自明由沔而始頃年儂賊宼鈔二廣近侍至多獨沔被譴瘴毒惡地干戈危處沔親當之是亦有勞矣今以累赦之餘三州按索安能無過沔且老摧落之餘豈復自振然臣子之分惡名難受伏乞陛下哀憐念已用之效察難明之咎湔洗拂拭有所任用必能修省以報陛下天地再生之施襄又奏乞選擇翰林學士不用資序劄子曰臣風聞臣僚上言為翰林學士員闕乞未添補臣竊謂暫減員數不若精選才賢有唐以來此職最為清近朝夕閑宴與天子論議天下之事如陸贄李絳皆不世之才所論者足以開悟人主聰明賛成天下之業今來只循資序隨例補選或行迹奸邪或才識暗懦中書據名除改莫敢抑退況兹一職動是兩府之資茍不擇人豈陛下選任忠良之意臣欲乞今後翰林學士闕員中書不得依資差除伏望出於聖衷選人任用庶乎奸邪暗懦之人無由濫進歴代名臣奏議卷一百三十二
